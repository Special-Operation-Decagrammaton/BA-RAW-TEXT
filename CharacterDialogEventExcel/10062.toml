[translation]
10062-10320 = "기다리고 있었습니다.\n선생님."
10062-10330 = "어떤 지형이나 기후에서도"
10062-10340 = "완벽한 보좌를 \n약속드리겠습니다."
10062-10350 = "안심하고 저한테 \n맡겨 주세요."
10062-10360 = "……그렇지 않으면,\n서운합니다."
10062-10370 = "저를 기다리게 하셨군요,\n선생님. 괜찮습니다."
10062-10380 = "삐지지 않았습니다.\n선생님이 돌아오시면"
10062-10390 = "절대로 곁을 떠나지 않겠다는\n생각도 하지 않고 있으니,"
10062-10400 = "안심하세요."
10062-10410 = "하늘이 있고 땅이 있고,\n아스마 토키가 있습니다."
10062-10420 = "……의미는 없습니다. \n말해본 것뿐입니다."
10062-10430 = "춥지 않냐는 질문을\n자주 받는데요,"
10062-10440 = "괜찮다고 대답하고 \n있긴 하지만 사실은 추워요."
10062-10450 = "그러니까 선생님,\n따뜻하게 해 주십시오."
10062-10460 = "저의 임무는\n기지의 관리와 경비입니다."
10062-10470 = "다시 말해서 선생님께\n붙어서 행동하는 것입니다."
10062-10480 = "……논리가 이상하다고요?\n선생님도 아직 멀었네요."
10062-10490 = "단도직입적으로\n말씀드리겠습니다."
10062-10500 = "지금 선생님은\n저에게 집중해야 합니다."
10062-10510 = "이유는, 이 자리에 있는\n사람이 선생님과\n저뿐이기 때문입니다."
10062-10520 = "선생님, 손을 이쪽으로.\n제가 따뜻하게\n해 드리겠습니다."
10062-10530 = "……! ……손이……\n차갑지 않다니……!?"
10062-10540 = "큭…… 역시 그때\n선생님의 장갑을\n숨겨 두었어야 했어요."
10062-10990 = "돌아오셨습니까. \n그러면 수집해 주신 샘플을\n이쪽으로 부탁드리겠습니다."
10062-11000 = "분석에는 대량의 '물질'이\n필요합니다. 즉, 선생님이\n나설 차례라는 것입니다."
10062-11010 = "선생님,\n차라도 드시겠습니까?"
10062-11020 = "이것은, 빙하를\n녹인 물로 내린 것입니다."
10062-11030 = "……고대의 맛이\n……날지도 모릅니다."
10062-11040 = "예전에, 리오 님이\n이것과 비슷한 실험을\n하신 적이 있었습니다."
10062-11050 = "이 임무에 조금,\n그리움을 느끼네요."
10062-11060 = "선생님은 엄청난 것을\n훔쳐 갔습니다……\n그것은…… 제 마음입니다."
10062-11070 = "……그렇게 당황하지\n말아 주십시오.\n말해본 것뿐이니까요, 네."
10062-11080 = "……'그걸' 해줬으면\n좋겠다구요? 정말,\n괜찮으시겠습니까……?"
10062-11090 = "알겠습니다…… 뿅."
10062-11100 = "지금 샘플을 분석하는\n중입니다. 즉, 저는\n한가하다는 것입니다."
10062-11110 = "……무엇을 하셔야 할지,\n선생님이라면 아시겠죠?"
10062-11120 = "무슨 일이 있어도\n선생님을 지키겠습니다."
10062-11130 = "그것만이, 제가 여기에\n있는 이유이기 때문에."
10062-11140 = "좋은 선택이십니다."
10062-11150 = "저도 그것이\n좋다고 생각합니다."
10062-11160 = "선생님께 도움이 된다면\n여기 있습니다.\n자유롭게 가져가세요."
10062-11170 = "선생님이 선택한 것이니,\n가치가 있음에 틀림없습니다."
10062-11180 = "물론 저에게는\n미치지 못합니다만."
10062-11190 = "바로 준비하겠습니다.\n조금만 기다려주십시오."
10062-12320 = "여기는…… 히마리 부장이\n「다소의 조정」을\n실행한 장소입니다."
10062-12330 = "난수와 확정……\n선생님은 어느 쪽을\n선택하시겠습니까?"
10062-12340 = "행운을 시험해 볼 수\n있는 거네요."
10062-12350 = "불운은 제가 뽑을 테니,\n선생님에게는 행운이\n찾아올 것입니다."
10062-12360 = "반대가 아니면 싫다구요…?\n그렇, 습니까?"
10062-12370 = "히마리 부장과\n리오 님의 차이를,\n점점 알게 되었습니다."
10062-12380 = "어느 쪽이 옳은지는,\n저는 아직 모릅니다만……"
10062-12390 = "두 분을 생각하면, 왠지…\n말로 표현할 수 없는\n감정이 북받쳐 올라옵니다."
10062-12400 = "어딘가에서 들은\n이야기입니다만……"
10062-12410 = "인생에는 작은 행운이\n필요하다고 합니다."
10062-12420 = "그렇지 않다면,\n힘들고 어려운 길을\n가게 될 테니까요."
10062-12430 = "어떤 결과가 나오든,\n저는 선생님의\n편이 될 겁니다."
10062-12440 = "그러니까 선생님께서도\n제 편이 되어\n주셔야 합니다."
10062-12450 = "저, 이 임무가\n끝나면…… 선생님과\n행복하게 살 겁니다."
10062-12460 = "플래그……?\n뭔가요, 그건."
10062-12470 = "선생님 마음이 내키는 대로\n선택해 주십시오.\n그것이 정답이니까요."
10062-12480 = "오, 짝짝짝짝짝짝."
10062-12490 = "……방금은,\n제 최선의 축하입니다."
10062-12500 = "어떠셨습니까?\n감동받으셨나요?"
10062-12510 = "대단하십니다. 선생님.\n이 기세를 몰아\n한 번 더 어떠십니까?"
10062-12520 = "2등 당첨을 축하합니다."
10062-12530 = "1등 상 내용이요?\n하루 종일 제가 신변을\n보좌해드리는 티켓입니다."
10062-12540 = "그 불굴의 정신……\n저도 본받고 싶습니다."
10062-12550 = "……이렇게 순수한 눈으로\n존경을 전해오는 학생,"
10062-12560 = "훌륭하다고\n생각하지 않으십니까?"
10062-12570 = "신속하게 칭찬해 주세요."

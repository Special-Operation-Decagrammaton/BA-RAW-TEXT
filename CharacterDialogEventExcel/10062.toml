[translation]
10062-10320 = "ฉันกำลังรออยู่เลยค่ะ คุณครู"
10062-10330 = "ไม่ว่าจะสภาพพื้นที่\nหรือสภาพอากาศแบบไหน"
10062-10340 = "ฉันสัญญาว่าจะสนับสนุน\nอย่างสมบูรณ์แบบค่ะ"
10062-10350 = "วางใจและปล่อยให้เป็น\nหน้าที่ของฉันได้เลยค่ะ"
10062-10360 = "ถ้าไม่อย่างนั้นละก็...\nฉันจะเสียใจนะคะ"
10062-10370 = "คุณครูทำให้ฉันต้องรอนะคะ\nไม่เป็นไรค่ะ คุณครู"
10062-10380 = "ฉันไม่ได้งอนเลยค่ะ\nถ้าคุณครูกลับมา"
10062-10390 = "ฉันไม่ได้คิดที่จะไปเกาะติด\nแบบไม่ยอมห่างไปไหนหรอก"
10062-10400 = "สบายใจได้ค่ะ"
10062-10410 = "มีสรวงสวรรค์ มีพื้นพสุธา\nและมีอะซุมะ โทคิค่ะ"
10062-10420 = "ไม่ได้มีความหมาย\nพิเศษอะไรหรอกค่ะ\nฉันแค่ลองพูดเฉยๆ ค่ะ"
10062-10430 = "มีคนถามฉันบ่อยๆ ค่ะ\nว่าฉันหนาวหรือเปล่า"
10062-10440 = "ถึงฉันจะตอบไปว่าไม่หนาว\nแต่ที่จริงแล้วก็หนาวอยู่ค่ะ"
10062-10450 = "เพราะงั้นคุณครู...\nช่วยทำให้ฉันอุ่นขึ้นด้วยนะคะ"
10062-10460 = "ภารกิจของฉันคือ\nดูแลความปลอดภัย\nและจัดการฐานค่ะ"
10062-10470 = "หรือสรุปก็คือการอยู่ใกล้ๆ คุณครูและคอยปฏิบัติ\nงานค่ะ"
10062-10480 = "ตรรกะแปลกๆ งั้นเหรอคะ...?\nคุณครูยังต้องฝึกอีกเยอะนะคะ"
10062-10490 = "ฉันขอเข้าประเด็นเลย\nแล้วกันนะคะ"
10062-10500 = "ตอนนี้คุณครู\nต้องให้ความสนใจฉันก่อนค่ะ"
10062-10510 = "เหตุผลก็เพราะว่าคนที่\nอยู่ที่นี่กับคุณครูตอนนี้\nมีแต่ฉันกับคุณครูเท่านั้นค่ะ"
10062-10520 = "คุณครู ยื่นมือมาทางนี้สิ\nฉันจะช่วยทำให้คุณครู\nอุ่นขึ้นเองค่ะ"
10062-10530 = "...! มือ… ไม่ได้มือเย็นเลยเหรอเนี่ย…!?"
10062-10540 = "อึก... คิดแล้วเชียวว่าตอนนั้น\nน่าจะหยิบถุงมือของคุณครู\nมาซ่อนเอาไว้ค่ะ"
10062-10990 = "กลับมาแล้วเหรอคะ ถ้างั้นรบกวนนำ\nตัวอย่างที่เก็บมามาไว้ด้านนี้เลยค่ะ"
10062-11000 = "การวิเคราะห์จะต้องใช้ 'วัตถุ'\nจำนวนมากค่ะ หรือก็คือถึงเวลา\nที่คุณครูต้องออกโรงแล้วค่ะ"
10062-11010 = "คุณครูอยากดื่มชา\nสักหน่อยมั้ยคะ?"
10062-11020 = "นี่เป็นชาที่ชงจากน้ำ\nที่นำแผ่นน้ำแข็งมาละลายค่ะ"
10062-11030 = "อาจให้รสชาติ...\nของความเก่าแก่ก็ได้ค่ะ"
10062-11040 = "เมื่อก่อนท่านริโอะก็เคยทำการ\nทดลองที่คล้ายๆ กันนี้เหมือนกันค่ะ"
10062-11050 = "ภารกิจนี้ทำให้รู้สึก\nหวนคิดถึงอยู่นิดหน่อยนะคะ"
10062-11060 = "คุณครูได้ขโมยสิ่งที่ยิ่งใหญ่ไปแล้วค่ะ\nนั่นก็คือ... หัวใจของฉันค่ะ"
10062-11070 = "อย่าทำหน้าตกใจแบบนั้นสิคะ...\nก็แค่ลองพูดดูเท่านั้นเองค่ะ"
10062-11080 = "อยากให้ทำ 'ท่านั้น' งั้นเหรอคะ?\nจะไม่เป็นไรจริงๆ งั้นเหรอคะ...?"
10062-11090 = "เข้าใจแล้วค่ะ... ดึ๋ง"
10062-11100 = "ตอนนี้อยู่ระหว่างวิเคราะห์ตัวอย่างค่ะ\nหรือก็คือตอนนี้ฉันกำลังว่างค่ะ"
10062-11110 = "ตอนนี้ควรจะทำอะไรดี...\nถ้าเป็นคุณครูก็คงจะรู้ใช่มั้ยล่ะคะ?"
10062-11120 = "ไม่ว่าจะเกิดอะไรขึ้น\nฉันจะปกป้องคุณครูเองค่ะ"
10062-11130 = "เพราะนั่นเป็นเหตุผลเดียว\nที่ฉันอยู่ที่นี่ค่ะ"
10062-11140 = "เลือกได้ดีมากค่ะ"
10062-11150 = "ฉันเองก็คิดว่าชิ้นนั้นดีเหมือนกันค่ะ"
10062-11160 = "ถ้าเป็นประโยชน์กับคุณครูละก็\nเชิญตรงนี้เลยค่ะ\nเลือกไปได้ตามสบายเลยค่ะ"
10062-11170 = "นี่เป็นของที่คุณครูเลือก\nเพราะงั้นมันต้องมีมูลค่าอย่างแน่นอนค่ะ"
10062-11180 = "แน่นอนว่าสำหรับฉัน\nมันอาจจะไม่เหมาะสักเท่าไรค่ะ"
10062-11190 = "ฉันจะเตรียมให้ทันทีเลยค่ะ\nกรุณารอสักครู่นะคะ"
10062-12320 = "ที่นี่คือ... สถานที่\nที่ท่านฮิมาริใช้ตอนที่\nปรับเปลี่ยนบางอย่างนิดหน่อยค่ะ"
10062-12330 = "การสุ่มและการการันตี...\nคุณครูเลือกแบบไหนเหรอคะ?"
10062-12340 = "ลองเสี่ยงโชคดูได้\nสินะคะ"
10062-12350 = "ฉันจะเลือกโชคร้ายไว้เอง\nเพราะงั้นขอให้คุณครู\nเลือกได้โชคดีนะคะ"
10062-12360 = "ให้กลับกันจะดีกว่าเหรอคะ...?\nอย่างนั้นเหรอคะ?"
10062-12370 = "ค่อยๆ รับรู้ถึงความแตกต่าง\nของหัวหน้าฮิมาริกับท่านริโอะ\nได้แล้วละค่ะ"
10062-12380 = "แต่ฉันก็ไม่รู้หรอกค่ะ\nว่าฝ่ายไหนเป็นฝ่ายถูกกันแน่..."
10062-12390 = "ไม่รู้ทำไม พอคิดถึงทั้งสองคนนั้น...\nก็รู้สึกถึงอะไรบางอย่างที่\nอธิบายออกมาเป็นคำพูดไม่ได้เลยค่ะ"
10062-12400 = "ฉันเคยได้ยินมา\nจากที่ไหนสักแห่งค่ะ"
10062-12410 = "ว่าในชีวิตคนเราต้องการ\nโชคดีเล็กๆ น้อยๆ เหมือนกันค่ะ"
10062-12420 = "ถ้าไม่อย่างนั้นละก็...\nจะเผชิญกับเส้นทาง\nที่เหนื่อยและยากลำบากได้ค่ะ"
10062-12430 = "ไม่ว่าผลลัพธ์จะเป็นอย่างไร\nฉันก็ยังคงอยู่\nข้างคุณครูเสมอค่ะ"
10062-12440 = "เพราะงั้นคุณครูเอง\nก็ต้องอยู่ข้างฉัน\nเหมือนกันนะคะ"
10062-12450 = "เอ่อ หลังจบภารกิจนี้...\nฉันอยากมีชีวิตที่มีความสุข\nกับคุณครูค่ะ"
10062-12460 = "โชคร้าย...?\nอะไรกันคะ"
10062-12470 = "คุณครูเลือกของที่ต้องการ\nได้เลยค่ะ สิ่งที่คุณครูเลือก\nคือคำตอบที่ถูกต้องค่ะ"
10062-12480 = "ว้าว แปะๆๆ"
10062-12490 = "เมื่อกี้ฉัน...\nแสดงความยินดีสุดๆ แล้วนะคะ"
10062-12500 = "เป็นยังไงบ้างคะ?\nประทับใจรึเปล่าคะ?"
10062-12510 = "สุดยอดเลยค่ะ คุณครู\nรักษาฟีลแบบนี้ไว้ให้ดี\nแล้วลองอีกรอบดีมั้ยคะ?"
10062-12520 = "ยินดีด้วยที่ได้รางวัลที่ 2 ค่ะ"
10062-12530 = "รางวัลที่ 1 คืออะไรงั้นเหรอคะ?\nตั๋วผู้ช่วยพิเศษข้างกาย\nตลอดวันจากฉันค่ะ"
10062-12540 = "จิตใจที่ไม่ย่อท้อแบบนั้น...\nฉันอยากเอาเป็นแบบอย่างบ้างเลยค่ะ"
10062-12550 = "จากใจของนักเรียน\nที่แสดงความนับถือ\nด้วยแววตาที่บริสุทธิ์แบบนี้..."
10062-12560 = "ไม่คิดว่ามันยอดเยี่ยม\nเลยเหรอคะ?"
10062-12570 = "ช่วยชมอีกสิคะ"

[translation]
10132-180 = "老、老師……？！\n這、這件衣服，\n果然很奇怪吧……？"
10132-190 = "老、老師，\n您來了嗎……？"
10132-200 = "這、這身衣服，\n就是那個…… "
10132-210 = "什、什麼……？到底\n發生\n什麼事了……？"
10132-220 = "舞台上很奇怪。"
10132-230 = "明明得到了\n比以往更多的關注……"
10132-240 = "卻感到異常的\n孤單……"
10132-250 = "大家……！\n我，回來了……！"
10132-260 = "我，\n真的適合\n這件衣服嗎……？"
10132-270 = "果、果然還是太高調了對吧，\n老師……？"
10132-280 = "呼嗚嗚，\n忍者不該\n這樣的……"
10132-290 = "漂、漂、漂、\n漂亮……？！"
10132-300 = "呼……"
10132-310 = "這、這件衣服"
10132-320 = "把它想成是\n一種變裝術的話……\n或許也不是不行……"
10132-590 = "我、我把該做的\n任務整理了一下……"
10132-600 = "雖然都是不簡單的任務……"
10132-610 = "但老師一定辦得到的！"
10132-620 = "我、我整理的東西\n有什麼問題嗎……？ "
10132-630 = "咦？這、這種事，\n任務裡沒有啊……"
10132-640 = "果、果然……！"
10132-650 = "我就知道\n老師一定做得到！"
10132-660 = "太厲害了！老師果然也有\n忍者的才能……！ "
10132-670 = "辛、辛苦了……！\n真是精彩的結尾！"

[translation]
10132-180 = "서, 선생님……?!\n이, 이 옷,\n역시 어색하죠……?"
10132-190 = "오, 오셨나요,\n선생님……?"
10132-200 = "이, 이 옷은\n그러니까……. "
10132-210 = "뭐, 뭐죠……? 대체\n무슨 일이 벌어지고\n있는 거죠……?"
10132-220 = "무대 위는 이상해요."
10132-230 = "분명 어느 때보다\n많은 관심을 받는데……"
10132-240 = "이상할 정도로\n외로워요……."
10132-250 = "모두들……!\n저, 돌아왔어요……!"
10132-260 = "저는, 정말로\n이 옷에 잘 어울리는\n사람일까요……?"
10132-270 = "너, 너무 눈에 띄죠,\n선생님……?"
10132-280 = "후으으,\n닌자가 이러면\n안 되는데……."
10132-290 = "예, 예, 예,\n예쁘다고요……?!"
10132-300 = "흐우우우……."
10132-310 = "이, 이 옷도"
10132-320 = "일종의 변장술이라\n생각한다면……\n괜찮을지도……."
10132-590 = "해, 해야 할 임무들을\n정리해 봤어요……."
10132-600 = "쉽지 않은 임무들이지만……"
10132-610 = "선생님은 할 수 있어요!"
10132-620 = "제, 제가 정리한 것에\n문제라도 있나요……? "
10132-630 = "예? 이, 이런 건\n임무 중에 없었는데……."
10132-640 = "여, 역시……!"
10132-650 = "선생님은\n해내실 줄 알았어요!"
10132-660 = "굉장해요! 역시 선생님에게도\n닌자의 재능이……! "
10132-670 = "수, 수고하셨습니다……!\n멋진 피날레였어요!"

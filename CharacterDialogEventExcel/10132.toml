[translation]
10132-180 = "老師……！？\n這套禮服……\n果然，很奇怪吧……？"
10132-190 = "歡迎回來，老師……"
10132-200 = "呃，這副打扮是，\n那個……"
10132-210 = "究竟……發生了\n什麼事呢……？"
10132-220 = "舞台上面……\n真是不可思議。"
10132-230 = "明明被許多人看著……"
10132-240 = "卻有著，令人感到\n孤單的瞬間……"
10132-250 = "大家……！\n我，回來了……！"
10132-260 = "我……真的配得上\n這套衣服嗎……？"
10132-270 = "果然，很顯眼，\n對吧……？"
10132-280 = "嗚嗚……\n我，明明是忍者……"
10132-290 = "漂，漂，漂漂漂亮，\n是嗎……！？"
10132-300 = "呀嗚嗚嗚……"
10132-310 = "這套衣服，"
10132-320 = "只要想成，\n是變裝之術的話……"
10132-590 = "我把該做的事，\n整理了一下……"
10132-600 = "雖然每樣都不簡單……"
10132-610 = "不過是老師的話，\n一定……！"
10132-620 = "那個……我整理的東西……\n有什麼問題嗎……？ "
10132-630 = "老師……？\n請問，怎麼了嗎……？"
10132-640 = "不，不愧是您……！"
10132-650 = "我始終相信，\n老師能辦到的……！"
10132-660 = "真厲害……！莫非老師，\n也有忍者的才能……！？"
10132-670 = "辛苦了……！\n是個精彩的結尾！"

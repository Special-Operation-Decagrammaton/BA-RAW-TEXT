[translation]
20022-210 = "สวัสดีค่ะคุณครู!\nขอพรอะไร\nในวันปีใหม่เหรอคะ?"
20022-220 = "ฉันก็จะขอพร\nข้างๆ คุณครูเองค่ะ"
20022-230 = "ไม่หนาวเหรอคะ?\nทานอาหารร้อนๆ\nสักหน่อยดีมั้ยคะ?"
20022-240 = "คะ คุณครู?\nมีเรื่องอะไรเหรอคะ?"
20022-250 = "สกู๊ตเตอร์คันนี้\nก็ใช้ในหลายๆ อย่างค่ะ"
20022-260 = "ถ้าเกิดไม่มีเจ้านี่ละก็...\nจะทำยังไงนะ?"
20022-270 = "ฉันอยากลองทำ\nอาหารปีใหม่อย่างอื่น\nนอกจากโอเซจิดูบ้างค่ะ"
20022-280 = "ค่ะ ถ้ากินหมดนั่นละก็...\nน้ำหนักคงขึ้นแน่ๆ ค่ะ"
20022-290 = "อาจไม่ถึงกับเป็น\nพรวันปีใหม่..."
20022-300 = "แต่ปีนี้ขอให้ไม่เกิดเรื่องอะไร\nกับห้องชมรมโภชนาการค่ะ..."
20022-340 = "สวัสดีค่ะคุณครู!\nขอพรอะไร\nในวันปีใหม่เหรอคะ?"
20022-350 = "ฉันก็จะขอพร\nข้างๆ คุณครูเองค่ะ"
20022-360 = "ไม่หนาวเหรอคะ?\nทานอาหารร้อนๆ\nสักหน่อยดีมั้ยคะ?"
20022-370 = "ค่ะ คุณครู?\nมีอะไรรึเปล่าคะ?"
20022-380 = "สกู๊ตเตอร์คันนี้\nก็ใช้ในหลายๆ อย่างค่ะ"
20022-390 = "ถ้าเกิดไม่มีเจ้านี่ละก็...\nจะทำยังไงนะ?"
20022-400 = "ฉันอยากลองทำ\nอาหารปีใหม่อย่างอื่น\nนอกจากโอเซจิดูบ้างค่ะ"
20022-410 = "ค่ะ ถ้ากินหมดนั่นละก็...\nน้ำหนักคงขึ้นแน่ๆ ค่ะ"
20022-420 = "อาจไม่ถึงกับเป็น\nพรวันปีใหม่..."
20022-430 = "แต่ปีนี้ขอให้ไม่เกิดเรื่องอะไร\nกับห้องชมรมโภชนาการค่ะ..."
20022-440 = "ค่ะ... ตั้งแต่นี้ไป...\nฉันจะแสดงฝีมือทำอาหาร\nให้ชมเองค่ะ!"
20022-450 = "ฉันจะพยายามเต็มที่...\nเพราะงั้นถ้าคุณครูคอยดู...\nก็จะขอบคุณมากเลยค่ะ"
20022-460 = "ไม่รู้ทำไมถึงกลายเป็น\nเรื่องใหญ่โตไปซะแล้ว แต่ว่า...\nเรื่องที่ฉันทำก็ไม่ได้เปลี่ยนไปค่ะ"
20022-470 = "ก็แค่ทำให้ดีที่สุด\nเท่านั้นเองค่ะ"
20022-480 = "นอกจากนั้น... คุณครู\nก็อยู่ข้างๆ ด้วย...\nเลยค่อนข้างอุ่นใจค่ะ!"
20022-490 = "จบลงไปได้ด้วยดี\nค่อยโล่งใจหน่อยค่ะ"
20022-500 = "คือว่า... อาหารของฉัน...\nถูกปากหรือเปล่าคะ?"
20022-510 = "คุณครู เชิญเลยค่ะ\nคุณพ่อค้าหลายๆ คน\nช่วยเตรียมของให้น่ะค่ะ"
20022-520 = "นี่เป็นครั้งแรกที่ฉันมาดูแล\nร้านค้าค่ะ แหะๆๆ"
20022-530 = "ไม่เป็นไรค่ะ\nไม่ต้องห่วงนะคะ"
20022-540 = "ถ้าเป็นเรื่องจัดการคลังละก็\nฉันมั่นใจค่ะ"
20022-550 = "คะ? อาหารพิเศษจาก\nชมรมโภชนาการงั้นเหรอคะ?"
20022-560 = "คือว่า... ถ้าไม่ติดอะไร\nให้ฉันทำให้มั้ยคะ?"
20022-570 = "อ๊ะ ถ้าอย่างนั้น...\nช่วยรอสักครู่นะคะ"
20022-580 = "อันนั้นเป็นสินค้าแนะนำ\nเลยนะคะ!"
20022-590 = "อ๊ะ... ค่ะ\nอันนี้หรือเปล่าคะ?"
20022-600 = "ถูกใจรึเปล่าคะ?\nแล้วมาอีกนะคะ!"
20022-610 = "ทั้งงานเทศกาล และงานแข่ง\nทำอาหารก็จบลงแล้วค่ะ"
20022-620 = "ฉันยังมีสิ่งที่ต้องเตรียม\nสำหรับพรุ่งนี้อยู่ค่ะ\nคุณครูค่อยๆ เลือกชมก่อนนะคะ"

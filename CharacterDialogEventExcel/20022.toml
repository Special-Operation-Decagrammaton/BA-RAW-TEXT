[translation]
20022-210 = "你好，老師！\n新年的願望\n已經決定好了嗎？"
20022-220 = "我也會在身旁\n一起祈禱的！"
20022-230 = "會不會冷呢？\n要不要吃點\n溫暖的食物？"
20022-240 = "是，老師？\n有什麼事嗎？"
20022-250 = "這輛摩托車\n有很多用途唷。"
20022-260 = "如果連這個\n都沒了的話…\n該怎麼辦…"
20022-270 = "御節料理以外\n的新年料理，\n我也想挑戰看看！"
20022-280 = "不過，要是把做出來\n的料理全部吃光…\n好像會變胖…"
20022-290 = "新年的願望…\n雖然不是這個，"
20022-300 = "不過希望今年\n供餐廚房能平安…"
20022-340 = "你好，老師！\n新年的願望\n已經決定好了嗎？"
20022-350 = "我也會在身旁\n一起祈禱的！"
20022-360 = "會不會冷呢？\n要不要吃點\n溫暖的食物？"
20022-370 = "是，老師。\n有什麼事嗎？"
20022-380 = "這輛摩托車\n有很多用途唷。"
20022-390 = "如果連這個\n都沒了的話……\n該怎麼辦……"
20022-400 = "御節料理以外\n的新年料理，\n我也想挑戰看看！"
20022-410 = "不過，要是把做出來\n的料理全部吃光……\n好像會變胖……"
20022-420 = "新年的願望……\n雖然不是這個，"
20022-430 = "希望今年\n供餐廚房能平安……"
20022-440 = "是……\n現在正是展現\n廚藝的時候呢！"
20022-450 = "我，會努力的……\n如果你能在一旁守望，\n我會很開心的。"
20022-460 = "總覺得好像變成一件\n不得了的事情了，但是\n我該做的事並沒有改變。"
20022-470 = "盡己所能，僅此而已。"
20022-480 = "而且……有老師\n陪在身邊，就像\n有一百個人的力量一樣！"
20022-490 = "能順利結束真是太好了。"
20022-500 = "那個……我的料理，\n合你的口味嗎？"
20022-510 = "老師，歡迎光臨。\n商店街的人準備了\n各式各樣的東西哦！"
20022-520 = "我還是第一次\n擔任店員呢。耶嘿嘿。"
20022-530 = "沒關係的唷，用不著擔心。"
20022-540 = "對於倉庫的管理\n我有一定的自信。"
20022-550 = "咦？供給部的\n特製料理是嗎……？"
20022-560 = "不介意的話，\n我來幫你做吧？"
20022-570 = "啊，那個的話\n請稍等一下。"
20022-580 = "那個是最推薦的商品！"
20022-590 = "那個……好的，\n是這個對吧？"
20022-600 = "還喜歡嗎？\n請一定要再來哦！"
20022-610 = "慶典和料理大賽都結束了呢。"
20022-620 = "我還要為明天\n做些準備……\n老師請慢慢來吧。"

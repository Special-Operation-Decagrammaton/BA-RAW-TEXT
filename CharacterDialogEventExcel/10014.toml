[translation]
10014-10 = "是慶典唷，主公！\n來，要從哪裡開始玩呢？"
10014-20 = "主公主公！\n慶典真令人期待呢！"
10014-30 = "伊樹菜會隨時\n在身邊服侍！"
10014-40 = "哼～哼哼～哼哼～♪\n伊樹菜哐哐，\n哐～哐哐～♪"
10014-50 = "唔，這個氣息……\n是主公呢！"
10014-60 = "您是來找\n伊樹菜的對吧！\n耶嘿嘿！"
10014-70 = "糰子、仙貝、\n御好燒……！"
10014-80 = "好多想和主公\n一起吃的東西！"
10014-90 = "伊樹菜，準備萬全！\n會一邊守護主公，\n一邊導覽慶典的！忍忍！"
10014-100 = "到時候\n請再陪伊樹菜一起參加吧！主公！"
10014-110 = "哼~哼哼哼~哼♪\n伊樹菜伊樹菜忍忍~♪"
10014-120 = "啊？這個氣息…\n是主公耶！"
10014-130 = "您是來找伊樹菜的嗎？\n耶嘿嘿！"
10014-140 = "糰子、仙貝、\n大阪燒…！"
10014-150 = "好多都是我想和主公\n一起吃的東西！"
10014-160 = "伊樹菜，準備完成！\n我會一邊守護主公，\n一邊帶主公參觀慶典！忍忍！"

[translation]
10014-10 = "งานเทศกาลค่ะ นายท่าน!\nเริ่มจากไปเที่ยวที่ไหนก่อนดีคะ?"
10014-20 = "นายท่าน! นายท่าน!\nงานเทศกาลน่าตื่นเต้นมากเลยค่ะ!"
10014-30 = "อิซุนะ! จะอยู่ข้างๆ\nเหมือนเป็นเงาตามตัวเลยค่ะ!"
10014-40 = "ลัล~ ลัลลัลล้า~ ลา♪\nอิซุนะ อิซุนะหน่าน้า~"
10014-50 = "อ๊ะ? เสียงแบบนี้...\nนายท่านนี่นา!"
10014-60 = "มาหาอิซุนะเหรอคะ?\nฮิฮิ!"
10014-70 = "ดังโงะ.. เซ็มเบ...\nโอโคโนมิยากิ...!"
10014-80 = "มีของกินอร่อยๆ ที่อยากกิน\nกับนายท่านเต็มไปหมดเลยค่ะ!"
10014-90 = "อิซุนะ พร้อมลุย!\nอิซุนะจะคอยปกป้องนายท่าน\nพร้อมกับพาชมงานเทศกาลเองค่ะ นินนิน~!"
10014-100 = "เอาไว้ถึงตอนนั้น ไว้ไปเที่ยว\nกับอิซุนะอีกครั้งนะคะ นายท่าน!"
10014-110 = "ลัล~ ลัลลัลล้า~ ลา♪\nอิซุนะ~ อิซุนะ~ ลัลล้า~♪"
10014-120 = "อ๊ะ? เสียงแบบนี้...\nนายท่านนี่นา!"
10014-130 = "มาหาอิซุนะเหรอคะ?\nฮิฮิ!"
10014-140 = "ดังโงะ.. เซ็มเบ...\nโอโคโนมิยากิ...!"
10014-150 = "มีของกินอร่อยๆ ที่อยากกิน\nกับนายท่านเต็มไปหมดเลยค่ะ!"
10014-160 = "อิซุนะ พร้อมลุย!\nอิซุนะจะคอยปกป้องนายท่าน\nพร้อมกับพาชมงานเทศกาลเองค่ะ นินนิน~!"

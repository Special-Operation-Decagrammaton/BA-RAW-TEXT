[translation]
20011-390 = "Oh, it's you. Did you make a New Year's wish? What was it?!"
20011-400 = "S-S-Sensei?! ...What do you mean you're here for me?!"
20011-410 = "Oh... Sorry. Just forget it."
20011-420 = "It's the new year, but it's still pretty wild!"
20011-430 = "Well, I do think it's good that it's so lively."
20011-440 = "*sigh* The Kurokame Gang, the Kaitenger... Why are these things happening one after another?"
20011-450 = "Will my part-time job pay me without any issues?"
20011-460 = "We've been flustered since the beginning of the new year, but things seem to be calming down."
20011-470 = "Great job, Sensei. Want to go back together and eat some osechi?"
20011-480 = "How many times do I have to tell you?! I'm not cosplaying!"
20011-490 = "I'm wearing it for my part-time job!"
20011-500 = "Wh-What, Sensei? You're staring at me weird..."
20011-510 = "I-I know what it looks like, but I really am working hard!"
20011-520 = "When my shift ends, I want to go get a warm meal with Ayane and the others..."
20011-530 = "Huh? You want me to say it one more time? Again?"
20011-540 = "Ugh... Fine! This is the last time though, okay?!"
20011-550 = "...E-Evil spirits, begone! There! Are you happy now?"
20011-860 = "Oh, Sensei. Are you here to pick your omikuji? They're over here."
20011-870 = "How about picking out an omikuji?"
20011-880 = "...Are you sure you can promote omikuji like this?"
20011-890 = "Oh, the New Year's event is over, but you can still pick out an omikuji."
20011-900 = "Here, Sensei!"
20011-910 = "T-Try your luck, Sensei!"
20011-920 = "My heart is starting to pound for some reason...!"
20011-930 = "It's okay if you get a bad result. I'm a miko!"
20011-940 = "D-Don't laugh like that! I was just being supportive!"
20011-950 = "Oh, you got a great blessing!! That's amazing, Sensei!"
20011-960 = "If you pick out a great blessing, you get a special prize! Here!"
20011-970 = "You picked a blessing, Sensei! Congratulations!"
20011-980 = "On that note, here is a prize given by the lucky miko!"
20011-990 = "A modest blessing? That's not bad, right?"
20011-1000 = "Here, this is for Sensei and your modest blessing!"
20011-1010 = "Huh? A small blessing?"
20011-1020 = "Don't be disappointed, Sensei. Here, let me give you this!"
20011-1030 = "It's a future blessing... I guess it kind of suits you..."
20011-1040 = "Oh, I didn't mean it in a bad way. Anyway, take this. It's the prize for picking a future blessing."
20011-1050 = "C-Curse?! Ah, hahaha... That's...that's f-fine!"
20011-1060 = "Here, I'll give you this, so don't worry about it, okay?"

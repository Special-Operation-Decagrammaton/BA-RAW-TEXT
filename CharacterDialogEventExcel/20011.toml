[translation]
20011-390 = "อ๊ะ เชิญเลย คุณครู\nทำไมเหรอ? ขอพรวันปีใหม่\nไปแล้วงั้นเหรอ?"
20011-400 = "คะ... คุณครู\nทะ... ทำไมถึงอยู่ที่นี่!?\nหรือว่าคิดจะแกล้งฉันน่ะ...!?"
20011-410 = "อา... โทษทีนะ\nลืมมันไปเถอะ..."
20011-420 = "ถึงจะบอกว่าเป็นปีใหม่ก็เถอะ\nแต่วุ่นวายจริงๆ เลยน้า~"
20011-430 = "มีพลังล้นเหลือน่ะ\nมันก็ดีอยู่หรอกนะ"
20011-440 = "เฮ้อ... ทั้งพวกแก๊งคุโรคาเมะ\nแล้วก็พวกไคเทนเจอร์...\nทำไมถึงโผล่มาไม่หยุดเลยนะ"
20011-450 = "ฉันจะทำงานพาร์ทไทม์\nจบได้อย่างราบรื่นไหมนะ?"
20011-460 = "ถึงจะมีเรื่องฉุกละหุก\nตั้งแต่ต้นปีก็ตาม\nแต่ท่าทางจะสงบลงแล้วละนะ"
20011-470 = "ทำได้ดีมากคุณครู\nพอกลับไปแล้ว\nเราไปกินโอเซจิกันไหม?"
20011-480 = "ถะ... ถึงจะบอกไปหลายครั้งแล้ว\nก็เถอะ ว่านี่มันไม่ใช่ชุดคอสเพลย์นะ!"
20011-490 = "ฉันแค่แต่งชุด\nสำหรับทำงานพิเศษต่างหาก!"
20011-500 = "อะไรน่ะ? คุณครู\nทำไมถึงยิ้มอรุ่มเจ๊าะ\nมองฉันแบบนั้น..."
20011-510 = "ถะ... ถึงจะเห็นแบบนี้\nแต่ฉันก็ตั้งใจทำงานอยู่นะ?"
20011-520 = "พอเสร็จงานพาร์ทไทม์แล้ว\nฉันอยากจะชวนอายาเนะจัง\nแล้วก็พวกรุ่นพี่มากินอะไร\nฉลองกันหน่อย..."
20011-530 = "เอ๋? อยากให้ฉัน\nพูดให้ฟังอีกสักครั้ง\nงั้นเหรอ?"
20011-540 = "เอ่อ... ขะ... เข้าใจแล้ว!\nเข้าใจแล้วน่า!\nแค่พูดก็พอใช่ไหมล่ะ!"
20011-550 = "ขะ... ขับไล่วิญญาณร้าย...!\nเอ้า! พะ... พอแล้วใช่ไหม!??"
20011-860 = "อ๊ะ คุณครู มาเสี่ยงทาย\nโอะมิกุจิเหรอ?\nโอะมิกุจิอยู่ตรงนี้ไงล่ะ"
20011-870 = "มาลองเสี่ยงทาย\nโอะมิกุจิกันไหมคะ...!"
20011-880 = "โอะมิกุจิน่ะ...\nพูดโฆษณาแบบนี้\nได้ด้วยเหรอ?"
20011-890 = "อ่า... ถึงเทศกาลฉลองปีใหม่\nจะจบไปแล้วแต่ว่า...\nยังมาเสี่ยงทายโอะมิกุจิได้อยู่นะ"
20011-900 = "นี่ไงคุณครู!"
20011-910 = "มะ...มาลองทดสอบ\nดวงของตัวเองได้เลยคุณครู!"
20011-920 = "ทำไมถึงรู้สึก...\nตื่นเต้นแบบนี้นะ...!"
20011-930 = "แต่ก็นะ... ถึงผลที่ออกมา\nจะไม่โอเคก็ไม่เป็นไรหรอก\nยังมีฉันที่เป็นมิโกะอยู่ด้วยทั้งคนนะ!"
20011-940 = "ยะ... อย่าหัวเราะสิ!\nฉันตั้งใจพูดแบบนั้นเลยนะ!"
20011-950 = "เอ๋ โชคดีมากงั้นเหรอ!?\nสุดยอดเลยนะ คุณครู!"
20011-960 = "ถ้าได้โชคดีมากละก็\nจะได้รางวัลพิเศษด้วยนะ!\nเอาละ!"
20011-970 = "เสี่ยงได้คำว่าโชคดีด้วยละ\nคุณครู! ยินดีด้วยนะ!"
20011-980 = "หรือก็หมายความว่านี่ก็คือ\nของรางวัลที่มิโกะ\nแห่งความโชคดีมอบให้ไงล่ะ~!"
20011-990 = "โชคดีปานกลาง...\nอื้อ ก็ไม่ได้แย่เลยนี่นา"
20011-1000 = "สำหรับโชคดีปานกลาง\nฉันจะให้ของรางวัลชิ้นนี้!"
20011-1010 = "หืม? โชคดีเล็กน้อย?"
20011-1020 = "อย่าผิดหวังไปเลยนะคุณครู\nถ้างั้นฉันจะให้ของชิ้นนี้\nกับคุณครูก็แล้วกัน"
20011-1030 = "โชคดีตามกรรมงั้นเหรอ...\nจะบอกว่าสมกับเป็นคุณครูดีมั้ยนะ..."
20011-1040 = "อ๊ะ ไม่ได้พูดถึงในความหมาย\nที่ไม่ดีนะ! ยังไงก็รับนี่ไปสิ\nรางวัลเสี่ยงทายได้โชคดีตามกรรมน่ะ"
20011-1050 = "ชะ... โชคร้าย!?\nเอ่อ... แหะๆ...\nมะ...ไม่เป็นไร!"
20011-1060 = "เอาละ! ฉันจะให้ของชิ้นนี้นะ!\nหือ? ไม่ต้องคิดมากหรอกนะ"

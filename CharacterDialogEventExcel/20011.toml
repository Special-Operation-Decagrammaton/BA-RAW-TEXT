[translation]
20011-390 = "啊，歡迎你，老師。\n已經許好新年的願望了嗎？"
20011-400 = "老，老師，\n你怎麼會在這裡！？\n難，難道是\n特地來找我……！？"
20011-410 = "沒事，抱歉，當我沒說……"
20011-420 = "雖然說是新年，\n還真是亂哄哄的呢～"
20011-430 = "不過，我覺得\n充滿活力也是件好事就是了。"
20011-440 = "唉……不管是黑龜組\n還是凱坦澤……\n為什麼會這樣\n接二連三地……"
20011-450 = "打工費，能順利\n收到嗎……？"
20011-460 = "雖然新年一開始\n就手忙腳亂的，\n不過也慢慢\n安定下來了吧。"
20011-470 = "辛苦了，老師。\n要不要一起回去\n吃御節料理？"
20011-480 = "雖，雖然已經\n說過很多次了，\n這不是Cosplay！"
20011-490 = "而是正式的打工用服裝！"
20011-500 = "怎，怎麼啦，老師？\n那樣一直盯著我看……"
20011-510 = "我，我只是在\n認真地工作而已。"
20011-520 = "打工結束之後，\n真想找綾音醬和前輩們\n一起邊吃邊逛啊……"
20011-530 = "咦？希望我可以\n再講一次？又來了？"
20011-540 = "唔……知道了，\n知道了啦！\n我講就是了！"
20011-550 = "……惡，惡靈退散！\n好了，這樣滿意了嗎！？"
20011-860 = "啊，老師。\n你是來抽御神籤的嗎？\n御神籤在這邊唷。"
20011-870 = "要不要來隻\n御神籤呀～！"
20011-880 = "……話說御神籤\n是可以用這種方式\n宣傳的東西嗎？"
20011-890 = "啊，新年的活動\n已經結束了，不過\n還是可以抽御神籤哦。"
20011-900 = "來，老師！"
20011-910 = "新年的試手氣唷，\n要決定運氣囉，老師！"
20011-920 = "莫名地\n興奮起來了……！"
20011-930 = "嘛，就算出現不好的\n結果也沒關係。你想想，\n反正有我這個巫女在……！"
20011-940 = "……不，不要笑成那樣啦！\n我可是很努力才說出來的！"
20011-950 = "咦，大吉！？\n很厲害嘛老師！"
20011-960 = "抽到大吉的話，\n可以獲得\n特別的獎品哦！來！"
20011-970 = "是吉哦！\n老師，恭喜你！"
20011-980 = "那麼接下來，\n就由幸運巫女\n來送出獎品～！"
20011-990 = "中吉啊～嗯，\n還不錯吧？"
20011-1000 = "那麼就給抽到\n中吉的老師這個！"
20011-1010 = "嗯？小吉？"
20011-1020 = "別失望，老師。\n來，我會給老師這個的。"
20011-1030 = "末吉啊……\n該說總覺得很符合\n老師的形象嗎……"
20011-1040 = "啊，不，\n我沒有不好的意思！\n總之收下這個吧，\n是末吉的獎品。"
20011-1050 = "兇，兇！？\n啊，啊哈哈……\n那個，沒，沒關係的！"
20011-1060 = "來，這個給你！\n別放在心上，好嗎？"

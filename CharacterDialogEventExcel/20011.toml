[translation]
20011-390 = "아, 어서 와. 선생님.\n어때? 새해 소원은\n이미 빌었어?"
20011-400 = "서, 선생님.\n어째서 여기에!?\n호, 혹시 일부러 나를…!?"
20011-410 = "아, 미안, 잊어줘…."
20011-420 = "새해라고는 하지만,\n어째 소란스럽네~"
20011-430 = "뭐, 활기가 넘치는 건\n좋다고 생각하지만."
20011-440 = "하아…. 검은거북파라던가,\n카이텐져라던가….\n왜 이렇게 꼬리에\n꼬리를 물고…."
20011-450 = "아르바이트비, 무사히\n받을 수 있으려나?"
20011-460 = "새해 초장부터\n허둥지둥했지만,\n슬슬 진정되는 모양이네."
20011-470 = "고생했어, 선생님.\n같이 돌아가서\n오세치라도 먹을래?"
20011-480 = "누, 누누이 말했지만,\n이거 코스프레가 아니니까!"
20011-490 = "제대로 아르바이트용을\n입고 있는 거니까!"
20011-500 = "뭐, 뭐야? 선생님.\n그렇게 지그시\n쳐다보고 있고…"
20011-510 = "이, 이래 봬도 성실하게\n일하고 있는 중이거든?"
20011-520 = "아르바이트가 끝나면,\n아야네 쨩이랑 선배들을\n불러서 기념으로 뭐라도\n먹고 싶은걸…."
20011-530 = "어? 다시 한번\n말해줬으면\n좋겠다고? 또?"
20011-540 = "으으… 아, 알았어!\n알았으니까!\n해주면 되잖아!"
20011-550 = "…아, 악령퇴산-!\n자, 이제 됐지!?"
20011-860 = "아, 선생님. 오미쿠지를\n뽑으러 온 거야?\n오미쿠지라면 여기 있어."
20011-870 = "오미쿠지 뽑기 한 번\n어떠신가요-!"
20011-880 = "…오미쿠지라는 거,\n이런 식으로\n홍보해도 되는 거야?"
20011-890 = "아, 새해맞이 이벤트는\n이미 끝나버렸지만, 아직\n오미쿠지라면 뽑을 수 있어."
20011-900 = "자, 선생님!"
20011-910 = "자, 자신의 운을\n시험해보는 거야 선생님!"
20011-920 = "어쩐지 두근거리기\n시작하는걸…!"
20011-930 = "뭐, 안 좋은 결과가\n나와도 괜찮아.\n자, 무녀인 내가 있잖아…!"
20011-940 = "…그, 그렇게 웃지 마!\n일부러 말했는데!"
20011-950 = "어, 대길이라고!?\n굉장하잖아! 선생님!"
20011-960 = "대길을 뽑으면,\n특별한 상품을\n받을 수 있다고! 자!"
20011-970 = "길한 운세래,\n선생님! 축하해!"
20011-980 = "그런 의미에서 여기,\n행운의 무녀가\n주는 상품이야~!"
20011-990 = "중길인가-, 응,\n괜찮지 않아?"
20011-1000 = "자, 중길을 뽑은\n선생님에겐 이걸 줄게!"
20011-1010 = "응? 소길?"
20011-1020 = "실망하지 마, 선생님.\n자, 선생님에겐\n이걸 줄게."
20011-1030 = "말길이라니…\n선생님답다고 해야 할지…."
20011-1040 = "아, 나쁜 뜻으로 말한 건\n아니고! 아무튼 이거 받아,\n말길 당첨 상품."
20011-1050 = "휴, 흉!?\n아, 아하하…,\n그게, 괘, 괜찮아!"
20011-1060 = "자! 이거 줄 테니까!\n신경 쓰지 마, 응?"

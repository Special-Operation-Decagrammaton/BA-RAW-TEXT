[translation]
10072-150 = "RABBIT小隊首次的\n遠征作戰啊……\n心情有點興奮。"
10072-160 = "現在正是\n我們SRT出馬的時候！"
10072-170 = "真可疑……這個村子\n絕對有什麼問題。"
10072-180 = "雖然不是很想\n支援那些\n討人厭的居民……"
10072-190 = "不過市民的協助\n也是特殊部隊的工作啊。"
10072-200 = "幸好解開了誤會。\n這樣蝦子不足的問題\n也解除了呢。"
10072-210 = "RABBIT2，準備完畢！\n隨時都能出發！"
10072-220 = "我姑且也打扮得像\n普通的觀光客一樣了……"
10072-230 = "看起來……\n應該不會很奇怪吧？"
10072-240 = "那個……老師，\n我的肚子上沾到\n什麼東西了嗎？"
10072-250 = "我，其實\n不是很喜歡海產。\n因為很難保存。"
10072-260 = "啊啊不過，像魷魚乾\n之類的乾貨的話……\n我也很喜歡！"

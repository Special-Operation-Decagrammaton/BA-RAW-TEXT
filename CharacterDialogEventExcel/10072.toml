[translation]
10072-150 = "RABBIT 소대의\n첫 원정 작전인가……\n살짝 가슴이 두근거리는걸."
10072-160 = "이번에야말로,\n우리 SRT가\n나설 차례라고!"
10072-170 = "수상해…… 이 마을,\n무조건 뭔가\n숨기고 있어……"
10072-180 = "저 불친절한\n주민들을 돕는 건\n영 내키지 않지만……"
10072-190 = "대민 지원 업무도\n특수부대 활동의\n일환이니까."
10072-200 = "오해가 잘 풀려서\n다행이네.\n이제 새우가 부족할\n걱정은 할 필요 없겠어."
10072-210 = "RABBIT 2, 준비 완료!\n언제든지 들어갈 수 있어!"
10072-220 = "음, 일단은 평범한\n관광객처럼\n차려입어 보았는데……"
10072-230 = "수상해 보이진……\n않겠지?"
10072-240 = "저기…… 선생님,\n내 배에 뭐라도 묻었어?"
10072-250 = "사실 개인적으로 해산물은\n그다지 좋아하지 않아.\n보존이 까다로우니까."
10072-260 = "뭐, 말린 오징어 같은\n건어물이라면……\n나도 좋아해!"

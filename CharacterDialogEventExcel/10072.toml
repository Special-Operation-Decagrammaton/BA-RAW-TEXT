[translation]
10072-150 = "อาจเพราะนี่เป็นการเดินทางไกล\nเพื่อออกปฏิบัติการครั้งแรก...\nก็เลยตื่นเต้นนิดหน่อยน่ะ"
10072-160 = "คราวนี้ถึงเวลา\nออกโรงของ SRT แล้ว!"
10072-170 = "แปลกจัง… หมู่บ้านนี้\nจะต้องมีอะไรซ่อนอยู่แน่ๆ..."
10072-180 = "ถึงฉันจะไม่อยาก\nไปช่วยพวกชาวบ้าน\nที่ไม่เป็นมิตรนั่นเลยก็เถอะ..."
10072-190 = "แต่การช่วยเหลือพลเมือง\nก็เป็นภารกิจอย่างหนึ่ง\nของหน่วยรบพิเศษเหมือนกัน"
10072-200 = "ค่อยยังชั่วหน่อย\nที่คลายความเข้าใจผิดได้\nคราวนี้ก็ไม่ต้องกังวล\nเรื่องมีกุ้งไม่พอแล้วละ"
10072-210 = "RABBIT 2 เตรียมพร้อม!\nพร้อมเข้าปฏิบัติการทุกเมื่อ!"
10072-220 = "อืม ตอนนี้ก็เปลี่ยนมาใส่\nชุดธรรมดาเหมือนกับ\nนักท่องเที่ยวคนหนึ่งแล้ว..."
10072-230 = "ไม่ได้ดูแปลกๆ ใช่รึเปล่า?"
10072-240 = "นี่... คุณครู ที่หน้าท้อง\nของฉันมีอะไรติดอยู่รึไง?"
10072-250 = "ส่วนตัวแล้วฉันไม่ได้\nชอบอาหารทะเลขนาดนั้นหรอก\nมันเก็บรักษายากน่ะ"
10072-260 = "ก็นะ ถ้าเป็นพวกปลาหมึก\nตากแห้งละก็...\nฉันเองก็ชอบเหมือนกัน!"

[translation]
10033-10 = "저 와카모,\n당신을 붙잡기 위해\n찾아왔답니다."
10033-20 = "제게서 도망치려고 해도\n소용없다는 걸,"
10033-30 = "그 몸에,\n듬뿍 가르쳐드리지요."
10033-40 = "아아…… 느껴져요……\n어디서든, 선생님의\n기척이……!"
10033-50 = "후후후, 이대로 저를\n떨쳐낼 수 있으리라\n생각하셨나요?"
10033-60 = "아아, 귀여우셔라♥"
10033-70 = "아아, 선생님.\n어디에 계신 건가요?"
10033-80 = "비록, 폭염과 화약 연기가\n자욱하다고 해도……"
10033-90 = "네에, 저 와카모….\n절대로 놓치지\n않을 거랍니다♥"
10033-100 = "과연, 이것이\n말로만 듣던"
10033-110 = "「숨바꼭질」\n이라는 놀이인가요?"
10033-120 = "우후훗. 이런 여흥.\n싫어하지 않는답니다."
10033-130 = "쫓아가서,\n잡으면 되는 거지요?"
10033-140 = "기대되는걸요."
10033-150 = "만약 제게 잡힌다면\n그때엔… 후후,\n각오해주세요♥"

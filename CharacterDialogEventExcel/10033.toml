[translation]
10033-10 = "วาคาโมะผู้นี้ มาที่นี่\nเพื่ออยู่ใกล้ๆ คุณแล้วค่ะ "
10033-20 = "ถึงจะพยายามหนีไปจากฉัน\nก็ไม่มีประโยชน์หรอกค่ะ  "
10033-30 = "ฉันจะสั่งสอน...\nให้คุณท่านได้ทราบเองค่ะ"
10033-40 = "อา... คุณท่าน...\nฉันรู้สึกได้ถึง...\nการที่คุณท่านอยู่ใกล้ๆ ค่ะ"
10033-50 = "ฮุฮุฮุ คงคิดว่า\nถ้าเป็นแบบนี้\nจะสลัดฉันหลุดงั้นเหรอคะ?"
10033-60 = "อา... น่ารักที่สุดเลย♥"
10033-70 = "อ๊ะ คุณครู\nจะไปไหนเหรอคะ?"
10033-80 = "ถึงกลิ่นดินปืนและระเบิด\nจะรุนแรงแค่ไหน..."
10033-90 = "ค่ะ วาคาโมะผู้นี้...\nจะไม่ปล่อยให้คุณ\nหลุดมือไปเป็นอันขาด ♥"
10033-100 = "นี่ก็คือ...\nการเล่นซ่อนแอบ"
10033-110 = "ที่เคยได้ยินมา\nใช่หรือเปล่าคะ?"
10033-120 = "ฮุฮุ เรื่องสนุกแบบนี้\nฉันก็ไม่ได้เกลียดหรอกค่ะ"
10033-130 = "แค่ไล่ตาม\nแล้วจับให้ได้ก็พอใช่ไหมคะ?"
10033-140 = "น่าตื่นเต้นจังเลยค่ะ"
10033-150 = "ถ้าฉันจับได้ละก็...\nตอนนั้น... ฮุฮุ\nเตรียมตัวให้ดีนะคะ♥"

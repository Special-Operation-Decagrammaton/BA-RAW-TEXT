[translation]
10033-10 = "I, Wakamo, am here to capture you."
10033-20 = "No matter how hard you try, you can't run from me."
10033-30 = "I'll make sure you learn that today."
10033-40 = "Ahhh... I can feel your presence...no matter where I am!"
10033-50 = "Heehee. Did you think you could get rid of me, just like that?"
10033-60 = "Ah, you're so cute. ♥"
10033-70 = "Oh, Sensei. Where are you?"
10033-80 = "You can't hide behind the smoke of explosions and gunpowder..."
10033-90 = "That's right. I, Wakamo, will never let you go. ♥"
10033-100 = "Is this what people call..."
10033-110 = "...hide-and-seek?"
10033-120 = "Heehee. I don't mind this kind of entertainment."
10033-130 = "I'm supposed to chase and catch you, right?"
10033-140 = "I'm looking forward to it."
10033-150 = "Ready or not, here I come. ♥"

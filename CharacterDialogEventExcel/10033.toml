[translation]
10033-10 = "若藻我，\n前來抓住閣下了♥"
10033-20 = "試圖從我身邊逃走\n是沒用的……"
10033-30 = "我會好好地\n教會您的身體的♥"
10033-40 = "啊啊……感覺到了……\n從某處傳來\n老師的氣息……！"
10033-50 = "呵呵呵，難道\n您以為能把我甩掉嗎？"
10033-60 = "啊啊，真可愛……♥"
10033-70 = "啊啊，老師……\n您現在身在何處呢？"
10033-80 = "即使，是在火焰\n與炸藥的煙霧之中……"
10033-90 = "若藻我……也絕對\n不會看丟閣下的♥"
10033-100 = "原來如此，\n這就是在時下最流行的"
10033-110 = "名為「捉迷藏」\n的遊戲嗎？"
10033-120 = "唔呵呵，這種\n餘興我並不討厭。"
10033-130 = "只要追上去，\n抓住就好了，對吧？"
10033-140 = "真是讓人期待。"
10033-150 = "如果被我抓到的話，\n屆時……呵呵，\n請做好覺悟哦♥"

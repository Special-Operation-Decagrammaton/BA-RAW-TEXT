[translation]
10139-10 = "지금부터\n로어 추적 작전을\n시작하겠습니다."
10139-20 = "기다리고 있었습니다,\n선생님."
10139-30 = "바로 브리핑을\n시작하겠습니다.\n이쪽으로."
10139-40 = "FOX 소대의\n작전 본부에\n어서오세요."
10139-50 = "사라진 사람들은\n어디로\n가버린 걸까요……?"
10139-60 = "SRT의 이름으로\n임무를 수행하는 것도\n정말 오랜만이네요."
10139-70 = "이렇게라도\n저희의 오명을\n씻어낼 수 있다면……"
10139-80 = "최선을 다하겠습니다."
10139-90 = "샬레와의 합동 작전……"
10139-100 = "여러모로\n기대가 되네요, 후훗."
10139-110 = "작전 시작 전에\n간단하게 요기라도\n어떠신가요?"
10139-290 = "아, 선생님."
10139-300 = "혹시 괜찮으시면,\n물자 정리를 도와주시겠어요?"
10139-310 = "지난 작전에서 쓰고\n남은 탄약이……"
10139-320 = "아, 어서 오세요.\n선생님."
10139-330 = "뭔가 제가 도울 일이\n있을까요?"
10139-340 = "으햑?!"
10139-350 = "귀, 귀는 예민하니까……\n만지지 말아 주세요……"
10139-360 = "훌륭한 선택이네요."
10139-370 = "감사합니다."
10139-380 = "물자의 교환이라면\n언제든지 불러주세요."
10139-390 = "샬레의 지원은\n언제나 큰 도움이 되네요."

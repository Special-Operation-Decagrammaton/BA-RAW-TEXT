[translation]
10031-10 = "Welcome, Sensei. I've been waiting for you."
10031-20 = "With a new year, comes new business."
10031-30 = "Heehee. I can hire you for a temp role, Sensei."
10031-40 = "Your hands are freezing, Sensei!"
10031-50 = "Proper rest is even more important when you're busy."
10031-60 = "I didn't expect the commotion to get this boisterous. *sigh* It's unexpected..."
10031-70 = "...Coming this far actually makes me want to do it more."
10031-80 = "Since this is how it is, Problem Solver 68 will stay until the end!"
10031-90 = "Sensei, you'll be cooperating as well, right?"
10031-100 = "It ended up being KAITEN FX Mk.1! What the heck?!"
10031-110 = "It's so ridiculous. I don't even know what to say..."
10031-120 = "*sigh* Well, it's no use crying over spilled milk..."
10031-130 = "Sensei, I'm tired. Do you want to grab a meal next time?"
10031-140 = "I came to wish for the business development of Problem Solver 68 for the new year."
10031-150 = "How did this happen...?"
10031-160 = "New year, new Problem Solver 68!"
10031-170 = "Sensei! We're going to make this the best year yet!"
10031-180 = "Don't worry, Sensei. As long as Problem Solver 68 is together..."
10031-190 = "...we can overcome any obstacle."
10031-200 = "Huh? P-P-Plans?! No... I-I didn't have anything in particular..."
10031-210 = "*sigh* It devolved into utter chaos."
10031-220 = "If any of our employees were hurt..."
10031-560 = "Welcome, Sensei. Work preparations are complete."
10031-570 = "Problem Solver 68 has prepared a lot for the new year."
10031-580 = "Take your time and choose."
10031-590 = "*sigh* The chaos has finally died down."
10031-600 = "Heehee. But we're still open for business."
10031-610 = "So take your time looking around, Sensei. ♪"
10031-620 = "Heehee, what do you think? Aren't they such catchy, cool items?"
10031-630 = "These are all the hidden powers of Problem Solver 68! ♪"
10031-640 = "Sensei, is there anything that catches your attention?"
10031-650 = "...A photo of everyone in Problem Solver 68 wearing kimonos?"
10031-660 = "W-We wouldn't have something like that!!"
10031-670 = "You have good taste, as expected. Well done, Sensei."
10031-680 = "Wow, good choice! I knew it."
10031-690 = "It's a really good item, so use it well."
10031-700 = "I can't believe you chose that. Not bad. You're fit to be my business partner, Sensei."
10031-710 = "Oh, that one's cool, right? I've been wanting to buy one for the office..."
10031-720 = "N-No! I'm not saying you have to buy me one!"

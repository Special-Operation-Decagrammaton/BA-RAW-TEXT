[translation]
10031-10 = "어머, 선생님.\n기다리고 있었어."
10031-20 = "새해 벽두부터 해결해야 할\n일이 생긴 참인데"
10031-30 = "후후, 선생님도\n도와주지 않겠어?"
10031-40 = "선생님의 손,\n너무 차가운 거 아니야?"
10031-50 = "…아무리 일이 많다고\n해도 제대로\n쉬지 않으면 안 된다고?"
10031-60 = "이렇게나 소동이\n커질 줄이야…\n하아, 예상 밖이네…"
10031-70 = "…여기까지 오면\n오히려 오기가 생긴달까."
10031-80 = "우리 흥신소 68,\n이렇게 된 이상\n끝까지 어울려주겠어!"
10031-90 = "아, 물론 선생님도\n협력해 줄 거지?"
10031-100 = "결국\n「KAITEN FX Mk.1」\n이라니, 대체 뭐냐고?!"
10031-110 = "이젠, 어이가 없어서\n말도 안 나온다니까…"
10031-120 = "하아…. 뭐, 이미 끝난\n일을 가지고 이러쿵저러쿵\n해도 소용없고…."
10031-130 = "선생님, 피곤하기도 하고\n이다음에 밥이나\n먹으러 갈까?"
10031-140 = "새해를 맞이해,\n흥신소 68의 사업 발전을\n빌려고 했을 뿐인데…."
10031-150 = "어째서 이렇게 된 거지…."
10031-160 = "올해는 우리 흥신소 68이\n새롭게 다시\n태어나는 해야."
10031-170 = "자아, 힘내서\n최고의 해로 만들자고!"
10031-180 = "걱정 마, 선생님. 우리들\n흥신소 68이 함께라면,"
10031-190 = "어떤 장애물이라도\n이겨낼 수 있어."
10031-200 = "…응? 계획? 아, 아니,\n그런 건 아직, 따,\n딱히 없는데…."
10031-210 = "후우, 뭔가 큰\n소동이 됐는데."
10031-220 = "…우리 직원들, 다치거나\n하진 않았겠지?"
10031-560 = "어서 와, 선생님.\n일을 위한 준비는 완벽해."
10031-570 = "우리 흥신소 68이 새해를 위해\n여러가지를 준비했어."
10031-580 = "느긋하게 골라보라고."
10031-590 = "후우…. 난리법석이던 행사도\n겨우 진정되었네."
10031-600 = "후후, 그래도 아직\n이곳은 영업 중이야."
10031-610 = "자아, 차분히 둘러보라고.\n선생님♪"
10031-620 = "후후, 어때?\n눈이 휘둥그레질 정도로\n멋진 물건들이지?"
10031-630 = "이것도 전부 우리\n흥신소 68의 저력이라고~♪"
10031-640 = "선생님, 어때 신경 쓰이는\n물건은 없어?"
10031-650 = "…우리 흥신소 68 모두가\n기모노를 입고 찍은 사진?"
10031-660 = "이, 있을 리가 없잖아.\n그런 거!?"
10031-670 = "과연, 보는 눈이 있는걸,\n선생님. 훌륭해."
10031-680 = "어머, 그걸 고르다니\n역시 선생님이네."
10031-690 = "엄청 좋은 물건이니까,\n제대로 써달라고?"
10031-700 = "그걸 선택하다니, 제법이잖아.\n선생님. 그래야 역시 내 동업자지."
10031-710 = "좋지? 그거! 나도 하나쯤\n사다가 사무실에…."
10031-720 = "앗, 아니야. 사달라고\n조르는 게 아니라……!"

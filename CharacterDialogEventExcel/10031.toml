[translation]
10031-10 = "โอ๊ะ คุณครู\nกำลังรออยู่เลย"
10031-20 = "มีเรื่องให้จัดการ\nตั้งแต่ปีใหม่เลยนะ"
10031-30 = "ฮุฮุ คุณครู...\nจะช่วยฉันใช่ไหม?"
10031-40 = "มือของคุณครู...\nมันเย็นไปรึเปล่าน่ะ?"
10031-50 = "ถึงงานจะยุ่งขนาดไหน\nแต่ห้ามละเลย\nการพักผ่อนเด็ดขาดเลยนะ"
10031-60 = "ฉันไม่คิดเลย...\nว่าเรื่องวุ่นวายมันจะ\nลุกลามใหญ่โตแบบนี้น่ะ..."
10031-70 = "มาถึงขนาดนี้แล้ว...\nชักอยากลุยให้จบแล้วสิ"
10031-80 = "ในเมื่อเป็นแบบนี้แล้ว\nหน่วยรับจ้างสารพัด 68...\nก็จะลุยไปให้ถึงที่สุด!"
10031-90 = "อ๊ะ แน่นอนว่าคุณครูเอง\nก็จะให้ความร่วมมือด้วยใช่ไหมล่ะ?"
10031-100 = "สุดท้ายก็กลายเป็น KAITEN\nFX Mk.1 แล้วงั้นเหรอ?\nมันคือตัวอะไรกันละเนี่ย?!"
10031-110 = "ไม่มีเหตุผลเอาซะเลย\nพูดไม่ออกเลย..."
10031-120 = "เฮ้อ... มาถึงตอนนี้แล้ว\nจะเอาเรื่องที่ผ่านไปแล้ว\nมาบ่นยืดยาวก็ไม่มีประโยชน์อะไร..."
10031-130 = "คุณครู ฉันเหนื่อยแล้วละ\nตอนนี้เราไปหาอะไรกิน\nกันดีไหม?"
10031-140 = "ฉันแค่ขอพรให้กิจการ\nของหน่วยรับจ้างสารพัด 68\nรุ่งเรืองขึ้นในปีใหม่นี้เองนะ..."
10031-150 = "ทำไมถึงเป็นแบบนี้นะ..."
10031-160 = "ในปีใหม่นี้\nหน่วยรับจ้างสารพัด 68 ของเรา\nถือว่าได้เกิดใหม่แล้ว"
10031-170 = "เอาละ มาฮึดสู้ดูสักตั้ง\nแล้วทำให้ปีนี้\nเป็นปีที่สุดยอดกันเถอะ!"
10031-180 = "ไม่ต้องห่วงนะ คุณครู\nถ้าอยู่กับพวกเรา\nหน่วยรับจ้างสารพัด 68 ละก็…"
10031-190 = "ไม่ว่าจะเจออุปสรรคอะไร\nเราก็เอาชนะได้หมดแน่นอน"
10031-200 = "เอ๊ะ...? แผนการ?\nมะ... ไม่ใช่… ระ... เรื่องนั้น\nฉันยังไม่ได้คิดไว้เลย..."
10031-210 = "ฮู่ว... ดูเหมือนจะมี\nเรื่องวุ่นวายครั้งใหญ่เกิดขึ้นแล้ว"
10031-220 = "สมาชิกของพวกเรา\nไม่มีใครบาดเจ็บใช่ไหม?"
10031-560 = "เข้ามาสิคุณครู การเตรียมการ\nทำงานมันสมบูรณ์แบบมากเลยละ"
10031-570 = "หน่วยรับจ้างสารพัด 68 ของเราเตรียมของ\nสำหรับปีใหม่เอาไว้หลายอย่างเลยละ"
10031-580 = "ค่อยๆ เลือกดูก็ได้นะ"
10031-590 = "ฮู่ว... งานเทศกาลที่วุ่นวาย\nก็สิ้นสุดลงแล้วสินะ"
10031-600 = "ฮุฮุ แต่ว่า\nร้านแลกของยังเปิดอยู่นะ"
10031-610 = "เอาละ ค่อยๆ เลือกดูไปนะ\nคุณครู ♪"
10031-620 = "ฮุฮุ เป็นยังไงล่ะ? มีแต่ของที่สุดยอด\nจนต้องอ้าปากค้างเลยใช่ไหม?"
10031-630 = "นี่ก็คือศักยภาพทั้งหมดของ\nหน่วยรับจ้างสารพัด 68 เรายังไงล่ะ~♪"
10031-640 = "คุณครู\nมีของที่สนใจบ้างไหม?"
10031-650 = "รูปถ่ายตอนที่พวกเราทุกคน\nใส่ชุดกิโมโนเหรอ?"
10031-660 = "จะ... จะไปมีได้ยังไงกันเล่า\nของแบบนั้นน่ะ!?"
10031-670 = "ตาแหลมจริงๆ นะคุณครู\nเลือกได้ยอดเยี่ยมมากเลย"
10031-680 = "โอ๊ะ เลือกชิ้นนั้นเหรอ\nสมกับเป็นคุณครูจริงๆ เลยนะ"
10031-690 = "มันเป็นของที่ยอดเยี่ยมมากๆ\nใช้อย่างทะนุถนอมด้วยล่ะ"
10031-700 = "เลือกชิ้นนั้นเหรอ ยอดเยี่ยมจริงๆ\nคุณครู สมกับเป็นหุ้นส่วนของฉันเลย"
10031-710 = "ชิ้นนั้นก็สุดยอดเลยนะ ฉันซื้อสักชิ้น\nแล้วเอาไปไว้ที่สำนักงานดีไหมนะ..."
10031-720 = "ปะ...เปล่านะ! ไม่ได้หมายความว่า\nจะให้ซื้อให้สักหน่อย...!"

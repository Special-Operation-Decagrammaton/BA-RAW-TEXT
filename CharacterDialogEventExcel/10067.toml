[translation]
10067-240 = "มาแล้วเหรอคะคุณครู"
10067-250 = "ฉันเตรียมภารกิจแฝงตัว\nเสร็จแล้วค่ะ"
10067-260 = "เตรียมตัวพร้อมแล้วค่ะ\nออกคำสั่งได้ทุกเมื่อเลยค่ะ"
10067-270 = "ค่ะ คุณครู\nมีเรื่องอะไรเหรอคะ?"
10067-280 = "ชุด... ชุดนี้\nให้ความรู้สึก\nโดยตรงเลยนะคะ..."
10067-290 = "...แต่ก็แน่นอนอยู่แล้ว\nผ้ามันบางน่ะค่ะ"
10067-300 = "ชุดบันนี่น่ะเหรอคะ?"
10067-310 = "ฉันชอบเพราะว่า\nมันมีข้อได้เปรียบ\nที่ต่างจากชุดเมดค่ะ"
10067-320 = "ฉันดูเข้ากับ\nบันนี่งั้นเหรอคะ?"
10067-330 = "อืม... ขะ... ขอบคุณค่ะ\nไม่คิดเลยนะคะ\nว่าจะได้รับคำชมด้วย..."
10067-350 = "มาแล้วเหรอคะคุณครู"
10067-360 = "ฉันเตรียมภารกิจแฝงตัว\nเสร็จแล้วค่ะ"
10067-370 = "เตรียมตัวพร้อมแล้วค่ะ\nออกคำสั่งได้ทุกเมื่อเลยค่ะ"
10067-380 = "ที่นี่เหมือนมีความลับ\nอะไรซ่อนไว้เลยค่ะ"
10067-390 = "ฉันเข้าใจ\nความรู้สึกสับสนค่ะ\nแต่ก็เชื่อใจฉันด้วยนะคะ"
10067-400 = "ฉันอยู่ข้างคุณครู\nทุกเมื่อเลยค่ะ"
10067-410 = "โล่งอกไปทีนะคะ\nที่ทุกอย่างเรียบร้อยดี"
10067-420 = "จากบทเรียนนี้ ฉันจะ\nพยายามให้มากขึ้นเพื่อเป็น\nสายลับที่สมบูรณ์แบบค่ะ"
10067-430 = "ค่ะ คุณครู\nมีเรื่องอะไรเหรอคะ?"
10067-440 = "ชุด... ชุดนี้\nให้ความรู้สึก\nโดยตรงเลยนะคะ..."
10067-450 = "...แต่ก็แน่นอนอยู่แล้ว\nผ้ามันบางน่ะค่ะ"
10067-460 = "ชุดบันนี่น่ะเหรอคะ?"
10067-470 = "ฉันชอบเพราะว่า\nมันมีข้อได้เปรียบ\nที่ต่างจากชุดเมดค่ะ"
10067-480 = "ฉันดูเข้ากับ\nบันนี่งั้นเหรอคะ?"
10067-490 = "อืม... ขะ... ขอบคุณค่ะ\nไม่คิดเลยนะคะ\nว่าจะได้รับคำชมด้วย..."
10067-680 = "คุณครูนี่เอง\nภารกิจวันนี้อยู่ทางนี้ค่ะ"
10067-690 = "ภารกิจก็เป็นหนึ่งใน\nสิ่งสำคัญที่ต้องทำค่ะ"
10067-700 = "วันนี้ก็ค่อยๆ\nก้าวไปทีละก้าวนะคะ"
10067-710 = "หน้าที่แต่ละวันที่มากไป\nบางครั้งก็เป็นภาระได้นะคะ"
10067-720 = "ไม่เป็นไรค่ะ ฉันจะเป็น\nกำลังใจให้คุณครูเองค่ะ"
10067-730 = "ภารกิจกับสายลับ\nเป็นสิ่งที่แยกจากกันไม่ได้ค่ะ"
10067-740 = "...แปลว่าตอนนี้คุณครู\nก็เป็นเหมือนสายลับอีกคนค่ะ"
10067-750 = "เสร็จภารกิจวันนี้แล้วค่ะ\nทำได้ดีมากค่ะคุณครู"
10067-760 = "ขนาดฉันยังคิดว่านี่เป็น\nงานที่ลำบากทีเดียวค่ะ"
10067-770 = "คุณครูยอดเยี่ยมจังเลยนะคะ"

[translation]
10067-240 = "老師，您來了嗎。"
10067-250 = "潛入任務，\n準備已經完成。"
10067-260 = "準備已就緒。\n請隨時下達指示。"
10067-270 = "是，老師。\n有什麼事嗎？"
10067-280 = "唔…這件衣服，\n感覺會直接地\n傳過來呢…"
10067-290 = "…畢竟布料很薄\n這也是當然的…"
10067-300 = "兔女郎裝，是嗎？"
10067-310 = "和女僕裝\n有不同的優點，\n我覺得很棒。"
10067-320 = "兔女郎的樣子\n很適合我，是嗎？"
10067-330 = "嗯…那個，\n非常，感謝。\n我沒想過，\n會被稱讚…"
10067-350 = "老師，您來了嗎。"
10067-360 = "潛入任務，\n準備已經完成。"
10067-370 = "準備已經就緒。\n請隨時下達指示。"
10067-380 = "這個地方，好像\n隱藏著什麼祕密呢。"
10067-390 = "我能理解\n您混亂的心情。\n但是請相信我。"
10067-400 = "我一直都\n是老師的夥伴。"
10067-410 = "全部都順利\n解決真是太好了。"
10067-420 = "我會根據這次的教訓，\n以更完美的特務為目標\n努力前進的。"
10067-430 = "是，老師。\n有什麼事嗎？"
10067-440 = "唔……這件衣服，\n感覺會直接地\n傳過來呢……"
10067-450 = "……畢竟布料很薄，\n這也是當然的……"
10067-460 = "兔女郎裝，是嗎？"
10067-470 = "和女僕裝\n有不同的優點，\n我覺得很棒。"
10067-480 = "兔女郎的樣子\n很適合我，是嗎？"
10067-490 = "嗯……那個，\n非常，感謝。\n我沒想過，\n會被稱讚……"
10067-680 = "原來是老師啊。\n今天的任務就是這些。"
10067-690 = "任務是重要事項之一。"
10067-700 = "今天也一步一步\n確實地進行吧。"
10067-710 = "每天被賦予的工作，\n有時也會成為負擔。"
10067-720 = "沒問題的，\n我會成為老師的助力。"
10067-730 = "特務和任務\n有著切也切不斷的關係。"
10067-740 = "……也就是現在的老師，\n同時也是特務的意思。"
10067-750 = "今天的任務，完成。\n您辛苦了，老師。"
10067-760 = "在我看來那也是\n非常辛苦的行程。"
10067-770 = "不愧是您，老師。"

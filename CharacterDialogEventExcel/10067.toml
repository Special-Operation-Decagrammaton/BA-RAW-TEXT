[translation]
10067-240 = "선생님 오셨군요."
10067-250 = "잠입 임무,\n준비는 완료했습니다."
10067-260 = "준비는 되어 있습니다.\n언제든지 지시를."
10067-270 = "네. 선생님.\n무슨 일이신지요?"
10067-280 = "웃… 이 옷은,\n감각이 다이렉트로\n전해지네요…"
10067-290 = "…소재가 얇으니까\n당연하겠지만요…"
10067-300 = "바니 슈트, 말인가요?"
10067-310 = "메이드복과는\n다른 이점이 있어서,\n좋다고 생각합니다."
10067-320 = "바니 모습,\n잘 어울린다, 고요?"
10067-330 = "음… 그, 감사, 합니다.\n칭찬받을 줄은,\n생각지도 못했네요…"
10067-350 = "선생님 오셨군요."
10067-360 = "잠입 임무,\n준비는 완료했습니다."
10067-370 = "준비는 되어 있습니다.\n언제든지 지시를."
10067-380 = "여기에는, 뭔가 비밀이\n숨어있을 것 같군요."
10067-390 = "혼란스러운 기분은\n이해합니다.\n하지만 저를 믿어 주세요."
10067-400 = "저는 언제든지\n선생님 편입니다."
10067-410 = "모두, 차질없이\n정리되어 다행입니다."
10067-420 = "이번 교훈을 바탕으로, 보다\n완벽한 에이전트를 목표로\n노력하도록 하겠습니다."
10067-430 = "네. 선생님.\n무슨 일이신지요?"
10067-440 = "웃… 이 옷은,\n감각이 다이렉트로\n전해지네요…"
10067-450 = "…소재가 얇으니까\n당연하겠지만요…"
10067-460 = "바니 슈트, 말인가요?"
10067-470 = "메이드복과는\n다른 이점이 있어서,\n좋다고 생각합니다."
10067-480 = "바니 모습,\n잘 어울린다, 고요?"
10067-490 = "음… 그, 감사, 합니다.\n칭찬받을 줄은,\n생각지도 못했네요…"
10067-680 = "선생님이시군요.\n오늘의 미션은, 이쪽입니다."
10067-690 = "미션은 중요 사항 중\n하나입니다."
10067-700 = "오늘도 한 걸음씩,\n차근차근 나아갑시다."
10067-710 = "매일 부과되는 일과란,\n때로 부담스러운 것이기도 하죠."
10067-720 = "괜찮습니다, 제가 선생님의\n힘이 되어 드리겠습니다."
10067-730 = "에이전트와 미션은\n떼려야 뗄 수 없는 관계."
10067-740 = "…즉 지금의 선생님은,\n에이전트이기도 하시다는 것이죠."
10067-750 = "오늘의 미션, 컴플리트입니다.\n수고하셨습니다, 선생님."
10067-760 = "제가 보아도 상당히\n힘든 일정이었습니다."
10067-770 = "선생님은 역시 대단하십니다."
10067-800 = "선생님이시군요.\n오늘의 미션은, 이쪽입니다."

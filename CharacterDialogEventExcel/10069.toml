[translation]
10069-10 = "아, 선생님 기다리고 있었어.\n어때? 산해경은?"
10069-20 = "미아가 되지 않아서\n다행이네."
10069-30 = "산해경의 길은\n복잡하니까."
10069-40 = "요즘 어깨가 뻐근해서……\n누가 주물러주지 않으려나."
10069-50 = "선생님이라든가……\n힐끔……"
10069-60 = "하하 그렇게 간지럽혀도,\n아무것도 안 나온다고?"
10069-70 = "연구 중인 요리라면,\n얼마든지 내놓겠지만."
10069-80 = "손님에게는 언제나\n최고의 요리를 제공한다고!"
10069-90 = "뭐…… 연구중인 요리는,\n이야기가 조금 다르지만."
10069-100 = "선생님은 나에게 있어서,\n무엇이든 될 수 있는 사람이야."
10069-110 = "손님이면서 동료이기도 하고,\n그리고…… 음……"
10069-120 = "미안. 이야기는\n여기까지만."
10069-200 = "물품 관리는 안심하고 맡겨."
10069-210 = "그만큼 중요한 건,\n상품 진열과 배치.\n자, 천천히 보라고."
10069-220 = "「구인공휴일궤」라는\n말이 있으니까."
10069-230 = "음, 무슨 일이야?\n뭐 신경 쓰이는 점이라도 있었어?"
10069-240 = "……다음 번까지는,\n제대로 구입해 둘 테니까."
10069-250 = "매번 감사합니다-!\n하하. 점포를 보는 건\n오랜만인걸."
10069-260 = "그걸로 할래? 좋아.\n상품의 질에는,\n자신이 있다고."
10069-270 = "매진되기 전에 골라 보라고.\n재입고를 기다리는 것만큼\n괴로운 일은…… 없으니까."
10069-280 = "그건 모르는 사이에\n선생님 자신이\n상품이 되어 있다는 소리야."
10069-290 = "자, 선생님.\n운을 시험해 볼 시간이야."
10069-300 = "자, 골라 봐. 골라 봐.\n뭐가 나올까?"
10069-310 = "후회하지 않게,\n여기서 전부 쓰고 가."
10069-320 = "상회의 일도 여러 가지가 있어.\n이것도 그 중 하나."
10069-330 = "무슨 일이든, 운은 중요해."
10069-340 = "대단해!\n이거, 진심으로 놀랐다고.\n축하해. 선생님."
10069-350 = "나까지 즐거워졌어."
10069-360 = "어디 보자…… 결과는……?\n뭐, 좋지 않아?"
10069-370 = "앗차…… 뭐, 뭐.\n너무 실망하지 마. 선생님.\n다음이라는 게 있으니까."

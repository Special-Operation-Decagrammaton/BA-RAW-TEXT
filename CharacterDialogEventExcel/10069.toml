[translation]
10069-10 = "啊啊，老師。\n我在等你唷。\n覺得山海經怎麼樣？"
10069-20 = "沒有迷路真是太好了。"
10069-30 = "畢竟山海經的路\n相當複雜啊。"
10069-40 = "最近肩膀有點僵硬……\n有沒有人願意\n幫我按摩一下呢。"
10069-50 = "像是老師之類的……\n（偷瞄）……"
10069-60 = "啊哈哈，\n就算那樣搔癢我，\n也什麼都不會出現的唷？"
10069-70 = "雖然研究中的料理\n要多少有多少……"
10069-80 = "不過會提供給客人的\n永遠只有最棒的料理！"
10069-90 = "嘛……如果是\n研究中的料理，\n就另當別論了。"
10069-100 = "在我眼裡的老師，\n是什麼都能成為的存在。"
10069-110 = "是客人，是夥伴，\n還是……嗯……"
10069-120 = "抱歉，這個話題\n到此為止。"
10069-200 = "物品管理就\n放心交給我們吧。"
10069-210 = "不過同樣重要的還有\n商品的配置及擺設。\n來，慢慢看吧。"
10069-220 = "畢竟人家不是常說\n「為山九仞，功虧一簣」嗎？"
10069-230 = "嗯？怎麼了？\n有什麼讓你在意的事嗎？"
10069-240 = "……在下次見面之前，\n 我會把東西準備好的。"
10069-250 = "謝謝惠顧～哈哈，\n顧店什麼的真是久違了呢。"
10069-260 = "你要那個嗎？可以唷。\n我對商品的品質還是很有自信的。"
10069-270 = "在賣光之前做出選擇吧。\n沒有什麼是比等商品進貨……\n更痛苦的事了。"
10069-280 = "那就代表在不知不覺間，\n老師自己變成商品了哦。"
10069-290 = "來，老師。\n試手氣時間到了唷。"
10069-300 = "來，選吧選吧。\n會抽到什麼呢？"
10069-310 = "為了避免後悔，\n在這裡全部用光吧。"
10069-320 = "商會也是有\n各種工作的啊。\n這也是其中之一。"
10069-330 = "不管什麼事，\n運氣都很重要。"
10069-340 = "好厲害！\n連我也嚇了一跳。\n恭喜你，老師。"
10069-350 = "連我也期待起來了。"
10069-360 = "我看看……結果是……？\n嘛，也不錯吧？"
10069-370 = "哎呀……嘛嘛，\n別那麼失望，老師。\n還有下次機會的。"

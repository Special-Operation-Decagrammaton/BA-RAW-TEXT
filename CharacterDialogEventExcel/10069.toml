[translation]
10069-10 = "อ๊ะ คุณครู กำลังรออยู่เลย\nซานไห่จิง เป็นยังไงบ้างล่ะ?"
10069-20 = "ค่อยยังชั่วหน่อยนะ\nที่ไม่หลงทาง"
10069-30 = "ก็ถนนหนทางของซานไห่จิงน่ะ\nมันซับซ้อนออกจะตายไป"
10069-40 = "ช่วงนี้รู้สึกปวดไหล่จัง...\nจะมีใครมาช่วยนวดให้บ้างมั้ยนะ..."
10069-50 = "อย่างเช่นคุณครู...\n(เหล่มอง)..."
10069-60 = "ฮ่าฮ่า! ถึงจะมาจักจี้ฉันแบบนี้\nก็ไม่มีอะไรหล่นออกมาหรอกนะ"
10069-70 = "ถ้าเป็นอาหารที่กำลังศึกษาอยู่ละก็\nฉันทำออกมาให้ชิมได้ทุกเมื่อแหละ"
10069-80 = "ไม่ว่าเมื่อไร ฉันก็จะทำ\nอาหารที่ดีที่สุดให้ลูกค้าไงล่ะ!"
10069-90 = "ก็นะ... แต่ถ้าเป็นอาหาร\nที่กำลังศึกษาอยู่ก็อาจจะ\nต่างไปนิดหน่อย"
10069-100 = "สำหรับฉัน คุณครูน่ะ...\nคือคนที่เป็นทุกอย่างให้แล้ว..."
10069-110 = "เป็นทั้งลูกค้า...\nแล้วก็เป็นเพื่อน...\nแล้วก็... อืม..."
10069-120 = "โทษที เรื่องนั้น\nเอาไว้เท่านี้แล้วกัน"
10069-200 = "เทพเต่าดำก็คือเรื่องการค้านะ"
10069-210 = "แต่สิ่งที่สำคัญที่สุดก็คือการจัดวางและ\nโชว์สินค้า เอาละ ค่อยๆ เลือกดูแล้วกัน"
10069-220 = "เหมือนคำกล่าวที่ว่า 'หากหยุดพัก\nจะไม่ถึงเป้าหมาย' ไงละ"
10069-230 = "อืม... มีเรื่องอะไรเหรอ?\nกังวลเรื่องอะไรอยู่รึเปล่า?"
10069-240 = "...ฉันจะซื้อเตรียมเอาไว้\nจนถึงคราวหน้าเอง"
10069-250 = "ขอบคุณมากค่ะ-! ฮ่าฮ่า ฉันไม่ได้\nมาดูแลร้านแบบนี้นานแล้ว"
10069-260 = "จะเอาอันนั้นเหรอ ก็ดีนะ ฉันมั่นใจ\nเรื่องคุณภาพสินค้านะ จะบอกให้"
10069-270 = "เลือกดีๆ ก่อนของจะหมดละให้รอจน\nของมาเติมน่ะ มันทรมานใจจะตาย..."
10069-280 = "หมายความว่าคุณครูกลายเป็นสินค้า\nไปซะเองโดยไม่รู้ตัวยังไงล่ะ"
10069-290 = "เอาละ คุณครู\nได้เวลาทดสอบดวงกันแล้ว"
10069-300 = "เอาละ เลือกเลยสิ เลือกเลย\nจะสุ่มได้อะไรกันนะ?"
10069-310 = "ใช้ให้หมดที่นี่เลยนะ\nจะได้ไม่ต้องเสียใจ"
10069-320 = "งานของทางย่านการค้า\nก็มีอยู่หลายๆ อย่าง"
10069-330 = "และนี่ก็เป็นงานสำคัญอย่างหนึ่ง"
10069-340 = "สุดยอดเลย!\nนี่มัน... น่าทึ่งสุดๆ ไปเลย\nยินดีด้วยนะ คุณครู"
10069-350 = "ฉันเองก็สนุกเหมือนกัน"
10069-360 = "ไหนดูซิ... ผลก็คือ...?\nก็นะ... ไม่ดีรึไง?"
10069-370 = "โธ่เอ๊ย... อะไรกันๆ\nอย่าเสียใจไปเลยน่า คุณครู\nยังมีโอกาสคราวหน้าอีกนะ"

[translation]
10069-10 = "Oh, there you are, Sensei. How are you enjoying Shanhaijing?"
10069-20 = "I'm glad you didn't get lost."
10069-30 = "The streets of Shanhaijing are complicated."
10069-40 = "My shoulders have been so stiff lately... I need a massage."
10069-50 = "Maybe from you, Sensei...? *gulp*"
10069-60 = "Haha! You can't tickle the truth out of me, you know!"
10069-70 = "I can offer you one of the dishes I'm still studying, but..."
10069-80 = "I always provide the highest quality food to my guests!"
10069-90 = "And, well...if I'm still studying a dish, it might not be at that level yet."
10069-100 = "Sensei, you are very important to me."
10069-110 = "You're a customer, and a colleague, and...um..."
10069-120 = "Sorry, I've said too much..."
10069-200 = "You can leave product management to us."
10069-210 = "But so are presentation and the layout of your goods. Take your time and look carefully."
10069-220 = "It's important to always finish your work."
10069-230 = "Hm. What's wrong? Are you concerned about something?"
10069-240 = "...I'll buy the right one next time."
10069-250 = "Thank you as always! It's been a while since I saw the store. Haha."
10069-260 = "Do you want that one? A good pick. Quality guaranteed!"
10069-270 = "Make your purchase before it's sold out. There's nothing worse than waiting for the next shipment."
10069-280 = "All that means is you've become the product yourself without even knowing!"
10069-290 = "Now, Sensei. It's time to test your luck."
10069-300 = "Make a choice. I wonder what will come out."
10069-310 = "Spend it all here or you'll regret it later."
10069-320 = "This is just one of the many enterprises the Promenade is involved in."
10069-330 = "As with anything, luck is important."
10069-340 = "Amazing! What a surprise! Congratulations, Sensei."
10069-350 = "I'm really happy for you."
10069-360 = "Let's see here... The result is...? Well, it's still good..."
10069-370 = "Yikes... Well, well... Don't be too disappointed, Sensei. There's always next time."

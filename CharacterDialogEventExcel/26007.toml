[translation]
26007-260 = "เชิญค่ะ คุณครู\nไว้ใจเรื่องการเตรียมการได้เลยค่ะ!"
26007-270 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!\nมาพยายามด้วยกันเถอะค่ะ!"
26007-280 = "เอ๋? คุณครู...?\nทะ...ทำไมทำแบบนั้นล่ะคะ...?"
26007-290 = "มะ...มีอะไรเหรอคะ?\nมีแมลง... เกาะอยู่\nที่ไหนเหรอคะ?"
26007-300 = "อืม... คุณครู\nเรียกฉันเหรอคะ?"
26007-310 = "ขะ... ขอโทษค่ะ\nแต่ถ้ามองกันแบบนั้น\nฉันเขินนะคะ..."
26007-320 = "มะ...มีอะไรเหรอคะ?\nมีแมลง...\nเกาะอยู่ที่ไหนเหรอคะ?"
26007-330 = "อืม... คุณครู\nเรียกฉันเหรอคะ?"
26007-340 = "ขะ...ขอโทษค่ะ\nถ้าคุณครูจ้องกันแบบนั้น\nฉันเขินนะคะ..."
26007-350 = "ฉันจัดการ\nรายการที่ต้องการไว้แล้วค่ะ!"
26007-360 = "รายการข้างต้น\nคือรายการเป้าหมายค่ะ"
26007-370 = "การทำเป้าหมายสำเร็จไปทีละ\nรายการ ก็เพลินดีอยู่นะคะ"
26007-380 = "และการได้เขียนรายการแบบนี้\nก็น่าสนุกเหมือนกันค่ะ"
26007-390 = "ค่ะ ทำได้ดีมากค่ะ!"
26007-400 = "สมกับเป็นคุณครูเลยค่ะ!"
26007-420 = "เชิญค่ะ คุณครู\nไว้ใจเรื่องการเตรียมการได้เลยค่ะ!"
26007-430 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!\nมาพยายามด้วยกันเถอะค่ะ!"
26007-440 = "การเก็บกวาด\nก็เป็นเรื่องสำคัญนะคะ\nฉันจะช่วยเองค่ะ!"
26007-450 = "มะ...มีอะไรเหรอคะ?\nมีแมลง... เกาะอยู่\nที่ไหนเหรอคะ?"
26007-460 = "อืม... คุณครู\nเรียกฉันเหรอคะ?"
26007-470 = "ขะ... ขอโทษค่ะ\nแต่ถ้ามองกันแบบนั้น\nฉันเขินนะคะ..."
26007-480 = "มาพยายามด้วยกันเถอะค่ะ!"
26007-490 = "ถ้าพยายามมากขึ้นละก็\nคงทำได้สำเร็จแน่ค่ะ\nพยายามเข้านะคะ คุณครู!"
26007-500 = "เอ๋? คุณครู...?\nทะ...ทำไมทำแบบนั้นล่ะคะ...?"

[translation]
26007-260 = "辛苦了，老師。\n準備的話請交給我吧！"
26007-270 = "我一直在等你呢，老師！\n一起加油吧！"
26007-280 = "那個……老師？\n怎麼了嗎？"
26007-290 = "怎，怎麼了？\n有哪裡沾到\n蟲子了嗎……？"
26007-300 = "那個……老師，\n你剛才有叫我嗎？"
26007-310 = "不，不好意思，\n一直被盯著看的話，\n我會害羞……"
26007-320 = "怎，怎麼了嗎？\n有哪裡\n沾上蟲子了嗎……？"
26007-330 = "那個……老師，\n你叫我了嗎？"
26007-340 = "不，不好意思，\n一直被盯著看的話\n我會害羞……"
26007-350 = "我整理了目標的清單。"
26007-360 = "這邊就是現在的目標。"
26007-370 = "目標一個接一個達成，\n感覺真不錯呢。"
26007-380 = "光是這樣一起\n整理清單，\n就感覺很開心。"
26007-390 = "好的，辛苦老師了！"
26007-400 = "真不愧是老師呢！"
26007-420 = "辛苦了，老師。\n準備的話請交給我吧！"
26007-430 = "我一直在等你呢，老師！\n一起加油吧！"
26007-440 = "善後處理也很重要呢，\n我來幫忙！"
26007-450 = "怎，怎麼了？\n有哪裡沾到蟲子了嗎……？"
26007-460 = "那個……老師，\n你剛才有叫我嗎？"
26007-470 = "不，不好意思，\n一直被盯著看的話，我會害羞……"
26007-480 = "好，充滿幹勁地努力吧！"
26007-490 = "再加把勁感覺就能解決了呢。\n加油吧，老師！"
26007-500 = "那個……老師？\n怎麼了嗎？"

[translation]
10076-340 = "ถ้าเป็นเรื่องการเชียร์\nกับการอธิบายละก็\nไว้ใจฉันได้เลยค่ะ!"
10076-350 = "ฮูเร่~ ฮูเร่! คุณครู!\nพยายามเข้า... สู้เค้านะ\nคุณครู!"
10076-360 = "เป็นไงคะ? มีแรงฮึดขึ้นบ้างมั้ยคะ?"
10076-370 = "หืม? มีอะไรเหรอคะ?"
10076-380 = "สงสัยเรื่องอะไรอยู่\nหรือเปล่าคะ?"
10076-390 = "ถ้าอย่างนั้น ฉันก็จะ...!"
10076-400 = "ถะ...ถะ...ถ้าคุณครูมา\nแตะกันแบบนั้น..."
10076-410 = "มันน่าเขินอยู่นิดหน่อยนะคะ..."
10076-420 = "เฮือก!? ฮู่ว...\nคะ... คุณครูเองเหรอคะ?"
10076-630 = "ถ้าเป็นเรื่องการเชียร์\nกับการอธิบายละก็\nไว้ใจฉันได้เลยค่ะ!"
10076-640 = "ฮูเร่~ ฮูเร่! คุณครู!\nพยายามเข้า... สู้เค้านะ\nคุณครู!"
10076-650 = "เป็นไงคะ? มีแรงฮึดขึ้นบ้างมั้ยคะ?"
10076-660 = "รู้สึกถึงไฟที่ลุกโชนในตัวเลยค่ะ!\nสู้ๆ นะคะ!"
10076-670 = "ใกล้แล้วค่ะ!\nฉันจะเชียร์จนถึงที่สุดเลยค่ะ!"
10076-680 = "ฮู่ว! เหนื่อยจังเลยค่ะ!"
10076-690 = "แต่ว่าก็สดชื่นสุดๆ ไปเลยค่ะ!"
10076-700 = "หืม? มีอะไรเหรอคะ?"
10076-710 = "สงสัยเรื่องอะไรอยู่\nหรือเปล่าคะ?"
10076-720 = "ถ้าอย่างนั้น ฉันก็จะ...!"
10076-730 = "ถะ...ถะ...ถ้าคุณครู\nมาแตะกันแบบนั้น..."
10076-740 = "มันน่าเขินอยู่นิดหน่อยนะคะ..."
10076-750 = "เฮือก!? ฮู่ว...\nคะ... คุณครูเองเหรอคะ?"

[translation]
10075-10 = "좋아. 선생도 온 참이고.\n지금부터, 지식해방전선의 시간이야!"
10075-20 = "어서 와. 선생.\n여러 가지 일들이\n일어나고 있는 것 같고,\n밖으로 나갈까!"
10075-30 = "모처럼 소재를\n찾을 수 있는 찬스,\n놓칠 수는 없잖아?"
10075-40 = "이런 일이 될 거라고는,\n처음에는 생각도\n못 했는데 말야……"
10075-50 = "설마 이런\n전개가 되다니……"
10075-60 = "정말,\n인생 어떻게 될지\n모르는 거구만……"
10075-70 = "여러 가지 일이 있었지만,\n어떻게든 정리됐네."
10075-80 = "자료도 많이 모였고,\n결과적으로\n잘 됐다는 것으로!"
10075-90 = "불렀어?"
10075-100 = "나? ……바쁘지만\n바쁘지 않은,\n그런 상태지."
10075-110 = "모미지는\n등을 맡길 수 있는\n동료이자, 후배지!"
10075-120 = "취향은 뭐……\n사람마다 다른 법이고?"
10075-130 = "왜? 선생……\n혹시 한가해?"
10075-140 = "딱히, 놀아 줘도\n좋은데 말이지~?"
10075-150 = "가, 간지럽다니까……\n정말! 그쯤 해 둬!"
10075-580 = "미션!"
10075-590 = "원고 마감도, 일종의 미션이라고\n생각하고 도전하고 있어."
10075-600 = "맡겨진 이상, 확실하게 처리한다! \n그것이 지식해방전선이니까!"
10075-610 = "왜? 선생? ……불러 봤을 뿐이라고?"
10075-620 = "이야~ 그런 대사, 직구로 말하면\n나도 반응하기 곤란하단 말이지."
10075-630 = "이야기하자, 선생! 선생은 말하고 있어!\n나는 거기에서 소재를 찾을 테니까!"
10075-640 = "오, 대단해. 대단해!\n빈말이 아니야! 진심이라고!"
10075-650 = "자, 이 엄청나게\n진지한 눈을 보라고!"
10075-660 = "미션 컴플리트! 보상을 받아가세요~!"
10075-670 = "어때? 내 영업 미소."

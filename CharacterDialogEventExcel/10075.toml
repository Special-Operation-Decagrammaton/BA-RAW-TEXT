[translation]
10075-10 = "ดีละ ครูก็มาถึงแล้ว\nต่อไปนี้คือเวลาของชมรม\nแนวร่วมปลดปล่อยความรู้!"
10075-20 = "เข้ามาเลย ครู ตอนนี้น่าจะ\nมีเรื่องเกิดขึ้นเยอะเลยละ\nไปข้างนอกกันไหม!"
10075-30 = "นี่เป็นโอกาสในการหา\nแรงบันดาลใจเลยนะ\nจะพลาดได้ยังไงกันล่ะ?"
10075-40 = "ตอนแรกไม่ได้คิดเลย\nว่าจะกลายเป็น\nเรื่องแบบนี้ไปได้..."
10075-50 = "คิดไม่ถึงเลย\nว่าจะออกมาเป็นแบบนี้..."
10075-60 = "ไม่รู้เลยจริงๆ\nว่าชีวิตจะออกมา\nเป็นยังไง..."
10075-70 = "ถึงจะเกิดเรื่องขึ้นมากมาย\nแต่ยังไงก็จัดการให้เรียบร้อย\nจนได้นะ"
10075-80 = "ข้อมูลก็หามาได้เพียบเลย\nสรุปแล้วก็ถือว่า\nทำได้ดีเลยละ!"
10075-90 = "เรียกฉันเหรอ?"
10075-100 = "ฉันเหรอ? ...ก็ยุ่งอยู่หรอกนะ\nแต่ก็ดูเหมือนไม่ได้ยุ่งน่ะ "
10075-110 = "โมมิจิ\nเป็นทั้งเพื่อนและรุ่นน้อง\nที่ฉันไว้วางใจได้!"
10075-120 = "เรื่องรสนิยมก็... แต่ละคน\nก็ต่างกันออกไปนี่นะ?"
10075-130 = "ทำไมเหรอ? ครู...\nมีเวลาว่างไหม?"
10075-140 = "ฉันอยากให้มา\nเล่นกับฉันหน่อยน่ะ~"
10075-150 = "มะ... มันจั๊กจี้นะ...\nจริงๆ เลย! พอได้แล้ว!"
10075-580 = "ภารกิจ!"
10075-590 = "ฉันคิดและท้าทายตัวเองเสมอว่า\nการส่งต้นฉบับเป็นภารกิจอย่างหนึ่ง"
10075-600 = "ถ้าเป็นงานของฉัน ฉันจะจัดการแน่นอน!\nนั่นละชมรมแนวร่วมปลดปล่อยความรู้!"
10075-610 = "ทำไมเหรอ? ครู?\n...แค่ลองเรียกดูงั้นเหรอ?"
10075-620 = "นี่~ ถ้าพูดบทนั้นมาตรงๆ\nฉันก็ตอบโต้ลำบากน่ะสิ"
10075-630 = "มาคุยกันเถอะครู! ครูพูดของครูไปเลยนะ!\nส่วนฉันจะหาข้อมูลอยู่ตรงนั้น!"
10075-640 = "ว้าว สุดยอด! สุดยอดเลย! ไม่ได้พูดไป\nงั้นๆ นะ! ฉันหมายความแบบนั้นจริงๆ!"
10075-650 = "เอาละ มาดูสายตา\nคู่ที่จริงจังนี่สิ!"
10075-660 = "มิชชัน คอมพลีต!\nไปรับรางวัลได้เลยค่า~!"
10075-670 = "เป็นไงบ้าง? รอยยิ้มรับลูกค้าของฉันน่ะ"

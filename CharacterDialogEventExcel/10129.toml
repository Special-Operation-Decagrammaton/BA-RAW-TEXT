[translation]
10129-10 = "너, 너무 자세히 보면\n긴장하게 됩니다……."
10129-20 = "어디까지나 잠입을\n위해서입니다."
10129-30 = "예쁜 옷이라곤\n생각합니다만……."
10129-40 = "점점 더 관객분들이\n몰려드는 것\n같습니다만……."
10129-50 = "다들 좋아해\n주시는군요."
10129-60 = "어떤 형태로건 도움이\n되어 다행입니다."
10129-70 = "스스로 당당해질 수\n있게 되었습니다."
10129-80 = "감사합니다. 선생님."
10129-90 = "잠입은 끝났습니다만,\n순찰은 계속됩니다."
10129-100 = "앞으로도, 자주\n뵈었으면 좋겠습니다."
10129-110 = "잡아당기시면 안 됩니다!\n장식이 아닙니다!"
10129-120 = "6조 우선의\n마법으로, 으음……\n그리고……."
10129-130 = "대사가 익숙하지 않아서\n외우기 어렵군요."
10129-140 = "꺄악! 키, 키킥!!\n아, 아앗……!\n간지럽습니다…….!"
10129-150 = "저는 간지럼에\n약합니다……!"
10129-160 = "유원지의 이 분위기.\n좋아합니다."
10129-170 = "더없이……\n평화로워서요."
10129-380 = "어, 어서 오세요.\n선생님……."
10129-390 = "필요하신 게\n있으신가요……."
10129-400 = "기억에 남는 순찰이었습니다.\n감사합니다."
10129-410 = "필요하신 물건을\n찾으시면 좋겠습니다."
10129-420 = "편의점에서의\n일이 생각나네요."
10129-430 = "네, 이쪽이군요."
10129-440 = "여기 있습니다."
10129-450 = "항상 협력해 주셔서\n감사합니다."
10129-460 = "선생님께 도움이\n되길 바랍니다."
10129-560 = "오래된 기계로군요.\n작동하는지는\n모르겠습니다만……?"
10129-570 = "메달을 넣으면 작동하겠군요."
10129-580 = "레이사 씨, 즐기고 계신 것\n같아서 다행입니다."
10129-590 = "희귀도가 높은?\n카드가 나오면 좋겠군요."
10129-600 = "폐장 시간이 되었군요.\n남은 메달이 있는지\n확인해 보시지요."
10129-610 = "아까부터, 주변의\n시선이 느껴집니다만……."
10129-620 = "시선을 더 끌기 전에\n어서 뽑아보죠."
10129-630 = "무지개색이군요.\n좋은…… 건가요?"
10129-640 = "분홍색…… 이군요."
10129-650 = "금색이군요."
10129-660 = "푸른 하늘빛인가요.\n청량하네요."
10129-670 = "검은색……\n조금 불길하군요."

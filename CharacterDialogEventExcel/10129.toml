[translation]
10129-10 = "ถะ... ถ้าจ้องกันมากไป\nฉันจะประหม่านะคะ..."
10129-20 = "นี่ก็เพื่อการแฝงตัว\nเท่านั้นค่ะ"
10129-30 = "ถึงจะคิดว่าเป็น\nชุดที่สวยเลยก็เถอะ..."
10129-40 = "เหมือนผู้ชมจะ\nหลั่งไหลเข้ามา\nเยอะขึ้นเลยนะคะ..."
10129-50 = "ทุกคนดูชื่นชอบ\nกันจังเลยค่ะ"
10129-60 = "ไม่ว่าจะเป็นการช่วยรูปแบบไหน\nแต่ก็โล่งอกที่ได้ช่วยนะคะ"
10129-70 = "ทำให้ฉันมั่นใจ\nในตัวเองมากขึ้นเลยค่ะ"
10129-80 = "ขอบคุณนะคะ คุณครู"
10129-90 = "ภารกิจแฝงตัวเสร็จแล้ว\nแต่การลาดตระเวน\nยังดำเนินต่อไปค่ะ"
10129-100 = "ต่อไปก็หวังว่า\nจะได้เจอกันอีกบ่อยๆ นะคะ"
10129-110 = "อย่าดึงกันสิคะ!\nฉันไม่ใช่พร็อพนะคะ!"
10129-120 = "ตามมาตราที่ 6\nของกฎหมายเวทมนตร์ อืม...\nแล้วก็..."
10129-130 = "ฉันไม่ชินกับบทพูด\nก็เลยจำไม่ค่อยได้ค่ะ"
10129-140 = "ว้ายย! คะ... คิกคิก!!\nอ๊ะ... อ๊าย...!\nจั๊กจี้ค่ะ...!"
10129-150 = "ฉันเป็นคน\nบ้าจี้นะคะ...!"
10129-160 = "บรรยากาศนี้ของสวนสนุก\nฉันชอบจังเลยค่ะ"
10129-170 = "ก็เพราะมัน...\nสงบสุขมากเลยนี่คะ"
10129-380 = "ชะ... เชิญค่ะ\nคุณครู..."
10129-390 = "มีอะไรที่\nต้องการหรือเปล่าคะ..."
10129-400 = "เป็นการลาดตระเวนที่น่าจดจำเลยค่ะ\nขอบคุณนะคะ"
10129-410 = "หวังว่าจะเจอของ\nที่ต้องการนะคะ"
10129-420 = "นึกถึงเรื่องที่\nร้านสะดวกซื้อเลยนะคะ"
10129-430 = "ค่ะ ทางนี้เลยค่ะ"
10129-440 = "ค่ะ นี่ค่ะ"
10129-450 = "ขอบคุณที่ให้ความร่วมมือ\nกันตลอดเลยนะคะ"
10129-460 = "ขอให้เป็นประโยชน์\nกับคุณครูนะคะ"
10129-560 = "เป็นเครื่องที่เก่าเลยนะคะ\nแต่ฉันไม่รู้นะคะว่า\nยังใช้งานได้หรือเปล่า...?"
10129-570 = "ถ้าใส่เหรียญก็จะใช้งานได้สินะคะ"
10129-580 = "ค่อยยังชั่วหน่อยนะคะ\nที่คุณเรอิสะกำลังสนุกเลย"
10129-590 = "อยากให้ได้การ์ดระดับ\nหายากๆ จังเลยค่ะ"
10129-600 = "ถึงเวลาปิดแล้วสินะคะ\nลองเช็กดูนะคะว่า\nมีเหรียญเหลือหรือเปล่า"
10129-610 = "ฉันรู้สึกถึงสายตาที่มองมา\nจากรอบๆ ตั้งแต่เมื่อกี้แล้ว..."
10129-620 = "รีบเลือกเข้าเถอะค่ะ\nก่อนจะถูกจ้องไปมากกว่านี้"
10129-630 = "สีรุ้งสินะคะ\nมันดี... หรือเปล่าคะ?"
10129-640 = "สีชมพู... สินะคะ"
10129-650 = "สีทองค่ะ"
10129-660 = "สีเหมือนท้องฟ้าเลยนี่คะ\nสดชื่นจังเลยค่ะ"
10129-670 = "สีดำ...\nลางไม่ดีเท่าไรเลยค่ะ"

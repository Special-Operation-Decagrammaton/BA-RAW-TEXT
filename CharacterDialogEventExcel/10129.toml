[translation]
10129-10 = "這，這樣一直\n盯著我看的話，\n我會緊張……"
10129-20 = "這單純只是\n為了調查而穿的。"
10129-30 = "雖然我覺得這套\n衣服很可愛……"
10129-40 = "觀眾好像變得\n越來越多了……"
10129-50 = "大家都很開心呢。"
10129-60 = "無論形式如何，\n有幫上忙真是太好了。"
10129-70 = "我開始對自己\n正在做的事情，\n真正產生自信了。"
10129-80 = "謝謝您，老師。"
10129-90 = "潛入調查雖然結束了，\n將來也會繼續巡邏。"
10129-100 = "今後也請多多指教。"
10129-110 = "不，不可以拉扯！\n這不是裝飾品！"
10129-120 = "六條右旋的魔法，\n唔嗯……那個……"
10129-130 = "有好多不習慣的台詞……\n很難記住。"
10129-140 = "呀啊！嘻，嘻哈！\n嘻呀……！\n這樣很癢……！"
10129-150 = "我，我真的\n很怕癢……！"
10129-160 = "遊樂園的氣氛，\n我非常喜歡。"
10129-170 = "因為……非常和平。"
10129-380 = "歡，歡迎光臨。\n老師……"
10129-390 = "有想找的東西嗎……？"
10129-400 = "是個難忘的任務呢。\n非常謝謝您。"
10129-410 = "希望您能找到\n想要的東西。"
10129-420 = "讓人回想起了\n便利商店的事呢。"
10129-430 = "好的，在這裡。"
10129-440 = "好的，請收下。"
10129-450 = "感謝您一直以來的協助。"
10129-460 = "希望能幫上老師的忙。"
10129-560 = "是台老舊的機器呢。\n能順利運作嗎……？"
10129-570 = "投入這個似乎就能運作。"
10129-580 = "澪紗同學好像\n玩得很開心，\n真是太好了。"
10129-590 = "稀有度高？的卡片，\n要是能抽到就好了呢。"
10129-600 = "已經到閉園時間了呢。\n一起確認還有沒有\n沒用完的吧。"
10129-610 = "總覺得能感受到\n周圍傳來的視線……"
10129-620 = "在目光聚集之前，\n趕緊抽吧……！"
10129-630 = "是虹色呢。\n這是好東西嗎？"
10129-640 = "是粉紅色呢……"
10129-650 = "是金色呢。"
10129-660 = "是水藍色嗎。\n感覺很清爽呢。"
10129-670 = "黑色……有點不吉利呢。"

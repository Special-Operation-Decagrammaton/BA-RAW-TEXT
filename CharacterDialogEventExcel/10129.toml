[translation]
10129-10 = "I-I get nervous when you stare at me so closely..."
10129-20 = "This is all for the infiltration."
10129-30 = "Although, I do think this is a pretty outfit..."
10129-40 = "It feels like the crowd is getting bigger and bigger..."
10129-50 = "Everyone is happy with it."
10129-60 = "Regardless of how, I'm glad I could be of help."
10129-70 = "I was able to become more confident."
10129-80 = "Thank you, Sensei."
10129-90 = "The infiltration is over, but the patrol continues."
10129-100 = "I wish I could see you more often."
10129-110 = "Please don't pull! That's not a decoration!"
10129-120 = "With six-groove, right-hand twist rifling magic, um...and..."
10129-130 = "I'm not familiar with the lines, so it's hard to memorize them."
10129-140 = "Kyaaah! E-Eek!! A-Aah...! That tickles...!"
10129-150 = "I'm weak to tickling...!"
10129-160 = "I like the atmosphere at the amusement park."
10129-170 = "It's really...peaceful."
10129-380 = "W-Welcome. Sensei..."
10129-390 = "Is there anything you need...?"
10129-400 = "That was a memorable patrol. Thank you."
10129-410 = "I hope you can find what you need."
10129-420 = "This reminds me of what happened at the convenience store."
10129-430 = "Yes, this way."
10129-440 = "Here it is."
10129-450 = "Thank you for always cooperating with us."
10129-460 = "I'm glad it could be of help to Sensei."
10129-560 = "It's an old machine. I'm not sure if it still works, though..."
10129-570 = "I suppose it runs when you put in a medal."
10129-580 = "I'm glad Reisa is enjoying herself."
10129-590 = "I hope you get that one card... I think it's called \"rare\"?"
10129-600 = "It's almost closing time. Please check if you have any medals left."
10129-610 = "I've been feeling someone's gaze for a while..."
10129-620 = "Let's do this quickly, before we attract more attention."
10129-630 = "It's rainbow. Is this...a good thing?"
10129-640 = "It's...pink."
10129-650 = "It's gold."
10129-660 = "It's sky blue. How refreshing."
10129-670 = "Black... This feels a bit ominous."

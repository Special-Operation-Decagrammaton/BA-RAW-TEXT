[translation]
20053-10 = "ในสถานการณ์ที่ต้องแฝงตัว\nควรจะพกข้าวปั้น\nหรือว่าอาหารอัดเม็ดดีนะ"
20053-20 = "หืม? มาแล้วเหรอ?\nท่านอาจารย์!"
20053-30 = "ชุดดูดีเลยนะ\nท่านอาจารย์"
20053-40 = "ลุคแบบนี้ก็ดูแปลกใหม่ดี\nเหมือนกันนะ..."
20053-50 = "ว้ากกกก...!\nทำไมต้องมาเปิดฉากสู้กัน\nกลางงานแฟชั่นโชว์ด้วยเนี่ย?!"
20053-60 = "งือ... คิดถึงสึคุโยะ\nจังเลยน้า"
20053-70 = "จะสบายดีรึเปล่านะ...\nคงจะกินราเม็งเพลินๆ\nอยู่สินะ?"
20053-80 = "เอาละ...! เท่านี้\nชมรมวิจัยศาสตร์นินจา\nก็ฟื้นคืนแล้ว!"
20053-90 = "เอ้า! ท่านอาจารย์เอง\nก็รีบมาทางนี้เร็วเข้า!"
20053-100 = "น่าแปลกชะมัดเลย..."
20053-110 = "หืม? พูดแบบนั้นเดี๋ยวก็มีเรื่อง\nเกิดขึ้นจริงๆ หรอกงั้นเหรอ?"
20053-120 = "อื้อออ...\nเหมือนเสื้อตัวนี้\nมันรู้สึกแน่นๆ แปลกๆ น่ะ..."
20053-130 = "ชุดแบบนี้มันดีตรงไหน\nทำไมชอบใส่กันนัก...!"
20053-140 = "สิ่งที่ทำให้นินจา\nเป็นนินจาได้นั้น\nคืออะไรกันแน่...?"
20053-150 = "มันดู… ไม่เหมือนชุดเลย"
20053-160 = "ข้าน้อยจะแสดงให้เห็นเอง...!\nจะพิสูจน์ให้ดูว่า..."
20053-170 = "ชุดแบบนี้น่ะ\nมันขวางทางนินจา\nอย่างข้าน้อยไม่ได้หรอก...!"
20053-330 = "โอ้ มาแล้วเหรอ ท่านอาจารย์!\nเชิญเดินชมตามสบายนะ"
20053-340 = "แต่จะว่าไป\nสินค้าชิ้นนี้..."
20053-350 = "ข้าน้อยเตรียมของไว้ครบทุกอย่างแล้ว\nยกเว้นแต่ของที่ไม่มีล่ะนะ อะฮ่าฮ่า"
20053-360 = "ฮุฮุ รีบปิดร้านแล้วไปซื้อชุดเซ็ตนินจา\nคอมโบใหม่กินกันดีกว่า ท่านอาจารย์!"
20053-370 = "เลือกอย่างรอบคอบ\nแล้วซื้ออย่างทุ่มสุดตัว...!"
20053-380 = "นั่นคือเคล็ดวิชา\nในการเลือกซื้อสินค้าไงล่ะ...!"
20053-390 = "สักวันหนึ่งข้าน้อยจะเอาของสะสมจาก\nช่องเคล็ดลับวิถีนินจาสาว มิจิรุจจี้\nมาขึ้นชั้นให้ได้เลย...!"
20053-400 = "เยี่ยมเลย\nเลือกได้ดีมากเลยนะ"
20053-410 = "ใช่แล้ว ถ้าเป็นนินจาละก็\nจะต้องเลือกชิ้นนั้นอยู่แล้ว!"
20053-420 = "จะห่อกลับบ้าน\nหรือว่าจะกินที่นี่..."
20053-430 = "อ๊ะ ไม่ใช่อันนี้เหรอ"
20053-440 = "โอ้...! ใช่เลย! ชิ้นนั้นคือสินค้าแนะนำ\nของร้านเราเลยละ!"
20053-450 = "จริงๆ แล้วไม่ว่าชิ้นไหน\nก็เป็นสินค้าแนะนำทั้งนั้น!"
20053-460 = "ฮุฮุ เชิญเลย ท่านอาจารย์"
20053-470 = "พอดีเลยนะ ข้าน้อยเองก็\nกำลังเลือกราเม็งอยู่เหมือนกันน่ะ"
20053-480 = "อื้ม ดูเหมือนว่า..."
20053-490 = "ไม่ได้มีแค่กลิ่นหอม\nอย่างเดียวนะ ไปกันเถอะ!"
20053-500 = "ขอบคุณสำหรับอาหารค่ะ...\nตอนนี้กินต่อไม่ไหวแล้วละ..."
20053-510 = "เส้นกับซุปน่ะ เปรียบได้กับ\nนินจากับวิชานินจานั่นแหละ..."
20053-520 = "ท่านอาจารย์\nชอบราเม็งแบบไหนเหรอ?"
20053-530 = "คิดออกแล้ว...!"
20053-540 = "เป็นรสชาติที่ทำให้แรงบันดาลใจ\nวิชานินจาใหม่พุ่งพล่านเลยละ...!"
20053-550 = "ว๊ากกกก!...?!\nระ... รสชาติแบบนี้มัน...! "
20053-560 = "โอ้ว สุดยอดเลยแฮะ...?"
20053-570 = "มันก็ไม่เลวนะ...\nไม่แย่เลยละ...!"
20053-580 = "อึก นะ... นี่มัน\nราเม็งเหรอ...?"

[translation]
20053-10 = "What's better for an infiltration, onigiri or hyorogan...?"
20053-20 = "Hm? You're here, Honorable Sensei!"
20053-30 = "Nice outfit, Honorable Sensei."
20053-40 = "Seeing you in something like this is new..."
20053-50 = "Aaaah...! Why the heck is there a fight happening in a FASHION SHOW venue?!"
20053-60 = "...Mmm, I miss her. Tsukuyo."
20053-70 = "I wonder if she's doing well... Is she eating ramen properly?"
20053-80 = "Yes...! With this, the Ninjutsu Research Club is back!"
20053-90 = "Over here! Honorable Sensei, this way! Hurry!"
20053-100 = "I'm bored..."
20053-110 = "Hm? Situations always seem to happen every time I say that?"
20053-120 = "Ugh... I feel like this dress is a bit tight..."
20053-130 = "Why do people wear stuff like this?!"
20053-140 = "What makes a ninja, ninja...?"
20053-150 = "The outfit...doesn't seem to be it."
20053-160 = "I'll show you...! That my ninja way..."
20053-170 = "...won't be stopped by something like clothes!"
20053-330 = "Oh, you're here, Honorable Sensei! Take your time and look around."
20053-340 = "About this item..."
20053-350 = "We have everything except what we don't have! Nyahaha!"
20053-360 = "Fufu, let's close for the day and go get the new ninja meal, Honorable Sensei!"
20053-370 = "Choose carefully, buy boldly...!"
20053-380 = "This is a merch-purchasing technique...!"
20053-390 = "One day, I'll have \"A Girl's Ninja Scroll Michiruchi\" merch displayed here...!"
20053-400 = "Good. Good choice."
20053-410 = "Yeah, that's the correct choice for a ninja!"
20053-420 = "For here, or to go—"
20053-430 = "Ah, wrong place."
20053-440 = "Oooh...! Yes! That's our store's signature product!"
20053-450 = "Actually, everything here is!"
20053-460 = "Fufu, welcome, Honorable Sensei."
20053-470 = "I, too, happen to be choosing ramen."
20053-480 = "Hm. A nice smell..."
20053-490 = "...doesn't seem to be the only thing they've got! Let's go!"
20053-500 = "Thank you for the food... I'm completely stuffed..."
20053-510 = "Noodle and broth... That's like ninja and ninjutsu..."
20053-520 = "What's your favorite ramen, Honorable Sensei?"
20053-530 = "I feel it...!"
20053-540 = "The kind of taste that can inspire new ninjutsu!"
20053-550 = "Auuugh...?! Th-This flavor is...! "
20053-560 = "Ugh, not bad, huh...?"
20053-570 = "It's not bad. But that's all! It's just \"not bad\"...!"
20053-580 = "Ugh, i-is this even ramen...?"

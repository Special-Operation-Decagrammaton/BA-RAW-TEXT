[translation]
20053-10 = "帶去潛入任務的話，\n該選飯糰還是兵糧丸……"
20053-20 = "嗯？老師大人！\n歡迎你來！"
20053-30 = "老師大人……\n打扮得很讚嘛。"
20053-40 = "這種感覺也挺新鮮的呢。"
20053-50 = "啊～～！\n為什麼會在時裝秀\n打起來啊！？"
20053-60 = "好想見到月夜……"
20053-70 = "他過得好嗎……拉麵，\n希望他有好好吃……"
20053-80 = "忍術研究部，完全復活！"
20053-90 = "老師大人也是！\n這邊這邊！"
20053-100 = "總覺得有點閒呢……"
20053-110 = "嗯？\n你說講這種話\n絕對會出事？"
20053-120 = "嗚嗚……這套衣服，\n緊到很難活動……"
20053-130 = "大家到底喜歡它的\n哪一點啊……！"
20053-140 = "服裝並非\n忍者的條件……"
20053-150 = "既然如此，\n讓忍者之所以為\n忍者的是……！？"
20053-160 = "仔細看好了……！\n區區的禮服，"
20053-170 = "對忍者而言根本\n不構成任何阻礙，\n這樣的事實……！"
20053-330 = "歡迎，老師大人！\n慢慢看吧。"
20053-340 = "啊！不過關於這個商品，\n我個人覺得──"
20053-350 = "除了沒有的東西之外，\n什麼都有哦！呵呵呵！"
20053-360 = "哼哼～快點關門，\n去吃新的忍者套餐吧～！"
20053-370 = "選擇要慎重，\n購入要大膽……！"
20053-380 = "這就是購買周邊時的關鍵……！"
20053-390 = "總有一天，要在這裡擺上\n「少女忍法帖小小三千留」\n的周邊……！"
20053-400 = "哦哦～那個啊。\n是個好選擇嘛？"
20053-410 = "沒錯！是忍者的話\n就得選那個才行！"
20053-420 = "這個，要幫您加熱……"
20053-430 = "啊，說錯了。"
20053-440 = "哦哦……！\n那正是首推商品！"
20053-450 = "雖然全部都是首推就是了！"
20053-460 = "啊，老師大人也來啦！"
20053-470 = "……我？\n正在煩惱該選哪種。"
20053-480 = "嗯嗯～味道真香──"
20053-490 = "雖然也不只這樣啦！\n總之，走吧～！"
20053-500 = "多謝款待……\n已經什麼都吃不下了……"
20053-510 = "麵和湯……\n那正是忍者和忍術……"
20053-520 = "老師大人喜歡\n什麼樣的拉麵？"
20053-530 = "哦哦……！"
20053-540 = "是能啟發新忍術\n的味道……！！"
20053-550 = "唔喵……！？\n這，這個味道是……！ "
20053-560 = "嗯，挺不賴的嘛……？"
20053-570 = "雖然不差……不差……\n但真的就是這樣而已……"
20053-580 = "咦……這是拉麵嗎……？"

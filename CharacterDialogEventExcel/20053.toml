[translation]
20053-10 = "潛入的情況下\n該帶飯糰\n還是兵糧丸呢……"
20053-20 = "嗯？你來了啊，\n老師大人！"
20053-30 = "服裝很好看呢，\n老師大人。"
20053-40 = "這個樣子，\n又別有一種新鮮感呢……"
20053-50 = "嗚喵啊……！\n為什麼會在時裝秀場\n打起來啦？！"
20053-60 = "嗯，好想見\n月夜喔。"
20053-70 = "他過得好嗎……\n應該有好好吃\n拉麵吧？"
20053-80 = "好……！這樣一來⋯⋯\n忍術研究部，復活！"
20053-90 = "來！老師大人也\n快過來這邊！"
20053-100 = "總覺得有點無聊呢……"
20053-110 = "嗯？\n你說講這種話\n就一定會出事？"
20053-120 = "……嗚嗚嗚……\n這件衣服感覺\n莫名地緊繃……"
20053-130 = "大家到底為什麼\n都喜歡穿這種東西……！"
20053-140 = "是什麼\n讓忍者成為\n忍者的呢……？"
20053-150 = "服裝嗎……\n好像不是。"
20053-160 = "仔細看好了……！\n在忍者之道上"
20053-170 = "區區服裝什麼的，\n根本不構成\n任何障礙……！"
20053-330 = "哦哦來了啊，老師大人！\n請隨意參觀。"
20053-340 = "話說啊，\n關於這個商品……"
20053-350 = "除了沒有的東西之外，\n什麼都有準備！喵哈哈！"
20053-360 = "呼呼，快點關門\n一起去吃新出的忍者套餐吧，\n老師大人！"
20053-370 = "選擇要慎重，\n購買要果斷……！"
20053-380 = "這就是，\n購買周邊的忍術……！"
20053-390 = "總有一天，\n這裡也要擺上「少女忍法帖小小三千留」\n的周邊……！"
20053-400 = "不錯。\n很好的選擇。"
20053-410 = "對，是忍者當然\n就要這樣選！"
20053-420 = "請問要外帶，\n還是在這裡吃……"
20053-430 = "啊，不對。"
20053-440 = "哦哦……！沒錯！\n那就是我們店的\n推薦商品！"
20053-450 = "其實全都是\n推薦商品就是了！"
20053-460 = "呼呼，歡迎光臨，老師大人。"
20053-470 = "我也剛好\n正在選要哪一種拉麵。"
20053-480 = "哼嗯，好香……"
20053-490 = "……好像也不只有\n香味就是了！走吧！"
20053-500 = "我吃飽了……\n再也吃不下了……"
20053-510 = "麵和湯頭……\n就像是忍者和忍術……"
20053-520 = "老師大人\n喜歡什麼樣的拉麵？"
20053-530 = "湧現了……！"
20053-540 = "這是能讓人\n湧現新的忍術靈感的味道啊……！"
20053-550 = "嗚喵啊啊……？！\n這、這個味道……！ "
20053-560 = "嗚唔，挺有兩下子的嘛……？"
20053-570 = "不算差……\n但真的也就只是不差而已……！"
20053-580 = "呃，這、這是\n拉麵……？"

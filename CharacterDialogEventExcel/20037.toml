[translation]
20037-150 = "여어, 선생,\n고생이 많아."
20037-160 = "워터파크……\n일만 아니었음,\n좋아하는 장소인데……"
20037-170 = "다들 기운이 넘치네.\n놀러 와서 그런가?"
20037-180 = "자, 이제 곧\n퇴근 시간이야!"
20037-190 = "이런저런 일이 있었지만,\n어떻게든 끝났네.\n선생도 고생했어."
20037-200 = "워터 슬라이드?"
20037-210 = "아니, 무섭다기\n보다는……. 귀…\n귀찮다고 할까……."
20037-220 = "더워……\n이런 날에 일이라니,\n최악이야~"
20037-230 = "이런 뜨거운 날일수록\n당분 섭취는 중요하니까."
20037-240 = "그래서, 도넛은\n생필품이라는 거야."
20037-250 = "핫! 현, 현장 이상 무!\n……어라, 선생?\n놀랐잖아."
20037-480 = "교환하러 왔어?\n여러 가지 있으니\n살펴보라구."
20037-490 = "하~ 시원해~\n선생도 느긋하게\n있다 가."
20037-500 = "영업 종료~\n자, 이제 뒤풀이라도\n갈까, 선생?"
20037-510 = "아무리 선생이라도,\n공짜로는 줄 수 없지?"
20037-520 = "나 말고, 상품을 좀 봐~"
20037-530 = "우와?! 그런 게 있었어?"
20037-540 = "서, 선생님 보기보다 운이 좋구나?"
20037-550 = "축하해~ 이거, 1등이야."
20037-560 = "이걸로 전부 끝인가.\n이야, 우리 둘 다 고생했네."

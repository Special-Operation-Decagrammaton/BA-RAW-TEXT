[translation]
20037-150 = "呀，老師。辛苦了～"
20037-160 = "水上樂園……\n不是工作的話，\n還挺喜歡的說……"
20037-170 = "大家都很有精神呢～\n大概因為是來玩的吧。"
20037-180 = "好，\n快到下班時間了！"
20037-190 = "雖然發生了很多事，\n但總算是結束了。\n老師也辛苦了。"
20037-200 = "滑水道？"
20037-210 = "不，與其說是害怕……\n不如說是麻煩吧……"
20037-220 = "好熱啊……\n這種天氣還要工作，\n真是太糟了～"
20037-230 = "像這種炎熱的日子，\n糖分補給才格外重要呢。"
20037-240 = "沒錯，所以甜甜圈\n就是生活必需品。"
20037-250 = "哈！現，現場無異常！\n……咦，老師？\n嚇我一跳。"
20037-480 = "你是來換東西的嗎？\n這裡有很多品項可以看～"
20037-490 = "哈～啊，好涼快～～\n老師也慢慢放鬆\n一起享受吧。"
20037-500 = "營業結束～好了，\n老師，要不要去\n慶功一下？"
20037-510 = "就算是老師，\n也不能算你免費唷？"
20037-520 = "不是看我，\n要看商品啦～"
20037-530 = "哇！？原來有這種東西啊！"
20037-540 = "老，老師。\n你的運氣比我想的還要好呢？"
20037-550 = "恭喜～這是1等獎喔。"
20037-560 = "這樣就全部結束了吧。\n哎呀，我們兩人都很努力呢。"

[translation]
20037-150 = "นี่ ครู\nเหนื่อยหน่อยนะ"
20037-160 = "สวนน้ำ...\nฉันก็ชอบที่นี่นะ\nถ้าไม่ได้มาทำงานน่ะ..."
20037-170 = "ทุกคนกระตือรือร้นจังเลย\nคงเพราะว่ามาเที่ยวสินะ?"
20037-180 = "เอาละ ใกล้ถึง\nเวลาเลิกงานแล้ว!"
20037-190 = "ถึงจะเกิดเรื่องขึ้นมากมาย\nแต่ก็จบลงจนได้สินะ\nครูก็ทำได้ดีเหมือนกัน"
20037-200 = "สไลเดอร์สระน้ำเหรอ?"
20037-210 = "อ่า ไม่ได้กลัวหรอก\nต้องบอกว่า... ขะ...\nขี้เกียจเล่นมากกว่า..."
20037-220 = "ร้อนจัง... ต้องมาทำงาน\nในวันแบบนี้ แย่ที่สุดเลย~"
20037-230 = "ยิ่งเป็นวันที่ร้อนแบบนี้\nก็ยิ่งต้องเติมน้ำตาลนะ"
20037-240 = "เพราะแบบนี้ละ\nโดนัทถึงได้เป็นสิ่งสำคัญ"
20037-250 = "อ๊ะ! ทะ... ทุกอย่าง\nเรียบร้อยดี!\nเอ๋ ครู? ตกใจหมดเลย"
20037-480 = "มาแลกของเหรอ?\nมีของหลายอย่างเลย\nลองเลือกดูนะ"
20037-490 = "ฮ้า~ เย็นสบายจัง~\nครูก็พักที่นี่ก่อน\nแล้วค่อยไปนะ"
20037-500 = "ร้านปิดแล้ว~\nเอาละ ไปเลี้ยงฉลอง\nที่เสร็จงานกันเถอะครู"
20037-510 = "ต่อให้เป็นครู\nก็ให้ฟรีไม่ได้หรอกนะ"
20037-520 = "อย่ามองฉันสิ มองของนู่น~"
20037-530 = "ว้าว?! มีอะไรแบบนี้ด้วยเหรอ?"
20037-540 = "คะ... คุณครูดวงดีกว่าที่คิดนะเนี่ย?"
20037-550 = "ยินดีด้วยน้า~ ได้รางวัลที่ 1 เลย"
20037-560 = "น่าจะเสร็จหมดแล้วเนอะ\nเราเหนื่อยกันทั้งคู่เลยนะครู"

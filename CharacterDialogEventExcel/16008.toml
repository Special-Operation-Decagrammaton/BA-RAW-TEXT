[translation]
16008-10 = "今天似乎也很忙呢，老師。"
16008-20 = "雖然是剛剛才買的，\n要不要吃巧克力甜甜圈？"
16008-30 = "巡邏真麻煩……"
16008-40 = "呼，真是和平呢。"
16008-50 = "情人節這種\n熱鬧的氣氛，\n真不錯呢。"
16008-60 = "最重要的是……\n這段時期結束後，"
16008-70 = "賣剩的巧克力甜甜圈\n就會大量特價！"
16008-80 = "只要沒有發生\n相當嚴重的事，"
16008-90 = "我想應該沒有\n我們生活安全局\n出場的需要。"
16008-100 = "例如……"
16008-110 = "災厄之狐偷走\n裝甲車之類的。"
16008-120 = "哈哈，開玩笑開玩笑。\n那種事不會發生啦。"
16008-130 = "我想應該不會\n連我們生活安全局\n都要出動。"
16008-140 = "例如……"
16008-150 = "災厄之狐偷走\n裝甲車之類的。"
16008-160 = "哈哈，開玩笑開玩笑。\n那種事不會發生啦。"

[translation]
16008-10 = "오늘도 바빠 보이네, 선생."
16008-20 = "아까 산 거긴 하지만,\n초코 도넛이라도 먹을래?"
16008-30 = "순찰 하기 싫어……"
16008-40 = "후우, 평화롭구만."
16008-50 = "발렌타인 데이의\n이런 떠들썩한 분위기는,\n나쁘지 않아."
16008-60 = "무엇보다……\n이 시즌이 끝나면,"
16008-70 = "팔다 남은 초코 도넛을\n잔뜩, 저렴하게 판매하니까!"
16008-80 = "엄청난 소동이\n벌어지지 않는 한,"
16008-90 = "우리 생활안전국까지\n출동하는 일은 없을 거라고\n생각하지만……"
16008-100 = "예를 들자면"
16008-110 = "재액의 여우가 장갑차라도\n탈취한다던가……"
16008-120 = "하하. 농담이야, 농담.\n그런 일이 일어날 리 없잖아."
16008-130 = "우리 생활안전국까지\n출동하는 일은 없을 거라고\n생각하지만……"
16008-140 = "예를 들자면"
16008-150 = "재액의 여우가 장갑차라도\n탈취한다던가……"
16008-160 = "하하. 농담이야, 농담.\n그런 일이 일어날 리 없잖아."

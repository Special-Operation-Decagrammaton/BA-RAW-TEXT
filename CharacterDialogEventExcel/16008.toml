[translation]
16008-10 = "วันนี้ดูยุ่งจังเลยน้าครู~"
16008-20 = "ฉันเพิ่งซื้อโดนัทช็อกโกแลตมา\nจะกินสักชิ้นมั้ย?"
16008-30 = "ขี้เกียจลาดตระเวนจัง..."
16008-40 = "เฮ้อ สงบสุขดีจังเลย"
16008-50 = "ฉันชอบบรรยากาศครึกครื้น\nของวันวาเลนไทน์แบบนี้\nมากๆ เลยละ"
16008-60 = "แล้วยิ่งกว่านั้น...\nพองานเทศกาลจบลง... "
16008-70 = "โดนัทช็อกโกแลตที่เหลือ\nก็จะลดราคาเยอะเลยด้วย!"
16008-80 = "ถ้าไม่เกิดเรื่อง\nที่รุนแรงมากจริงๆ..."
16008-90 = "สำนักรักษาความปลอดภัย\nคงไม่ได้ออกโรงหรอก "
16008-100 = "ยกตัวอย่างเช่น"
16008-110 = "จิ้งจอกแห่งความพินาศ\nขโมยรถหุ้มเกราะไป..."
16008-120 = "ฮ่าฮ่า เรื่องแบบนั้น\nคงไม่ได้เกิดขึ้นง่ายๆ หรอก"
16008-130 = "สำนักรักษาความปลอดภัย\nคงไม่ได้ออกโรงหรอก"

[translation]
10092-300 = "你好慢唷，老師！\n快走吧！"
10092-310 = "啊，老師！\n這邊啦，這邊！"
10092-320 = "演奏已經開始囉！\n跟我來！"
10092-330 = "你說高潮嗎？\n交給我！"
10092-340 = "呼，真爽快。\n是吧，老師？"
10092-350 = "啊，怎，怎麼了啦！？\n用講的啦，用講的！"
10092-360 = "再捉弄我的話……！\n我要生氣囉！！"
10092-370 = "嗯？\n……叫我嗎？"
10092-380 = "想試試吉他嗎？\n來。"
10092-520 = "好了，好了！沒時間了！\n快拿去吧！"
10092-530 = "啊，老師！\n這邊啦，這邊！"
10092-540 = "留著也可惜對吧？"
10092-550 = "儘量把能拿走的拿走吧。"
10092-560 = "做，做什麼啦！？\n害我嚇了一跳！"
10092-570 = "就說別再捉弄我了！\n會害我嚇到！！"
10092-580 = "哼～嗯？\n還不錯嘛？"
10092-590 = "不錯的選擇呢。"
10092-600 = "不錯嘛。\n我也看上了那個。"
10092-610 = "就決定是它了嗎？\nOK。"

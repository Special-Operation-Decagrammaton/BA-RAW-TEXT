[translation]
10092-300 = "มาช้านะคุณครู!\nรีบไปกันเถอะ!"
10092-310 = "อ๊ะ คุณครู!\nทางนี้ ทางนี้!"
10092-320 = "การแสดงดนตรีเริ่มแล้ว!\nตามมาเลย!"
10092-330 = "ไคลแมกซ์งั้นเหรอ? วางใจได้เลย!"
10092-340 = "เฮ้อ โล่งจัง\nว่ามั้ยคุณครู?"
10092-350 = "อ๊ะ ทะ... ทำอะไรน่ะ!?\nก็บอกกันสิ บอกมา!"
10092-360 = "เลิกแกล้งกันได้แล้ว...!\nเดี๋ยวฉันโกรธนะ!! "
10092-370 = "หืม? เรียกฉันเหรอ...?"
10092-380 = "อยากลองจับกีตาร์เหรอ? รับไปสิ"
10092-520 = "เอาละๆ! ฉันไม่มีเวลานะ!\nรีบเอาไปสิ!"
10092-530 = "อ๊ะ! คุณครู!\nทางนี้ ทางนี้!"
10092-540 = "ถ้าเหลือทิ้งไว้ก็เสียดายแย่"
10092-550 = "เอาไปให้เยอะๆ เลยนะ"
10092-560 = "อะ... อะไรเนี่ย!?\nตกใจหมดเลย!"
10092-570 = "บอกให้เลิกแกล้งกันไง!\nฉันตกใจนะ!! "
10092-580 = "ฮึ่ม~? มันก็ดีไม่ใช่เหรอ?"
10092-590 = "เลือกได้ไม่เลวเลยนี่"
10092-600 = "ไม่เลวเลยนะ ฉันเองก็\nเล็งอันนั้นอยู่เหมือนกัน"
10092-610 = "จะเอาอันนั้นไปเหรอ?\nโอเค"

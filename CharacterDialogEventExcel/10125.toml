[translation]
10125-10 = "아르카나의 인도에\n이끌린 자여.\n이쪽입니다."
10125-20 = "자, 와일드헌트에\n잠든 비밀을……"
10125-30 = "함께 밝혀내 보죠."
10125-40 = "으으음, 이번 작전은\n사감대에 들키면\n안 되는데……."
10125-50 = "조금만 더!\n후회 없는 피날레를\n맞이하는 거예요!"
10125-60 = "다음에도……"
10125-70 = "마스터와 함께 훌륭한\n작품을 만들고 싶어요!"
10125-80 = "뉴후후, 마법에\n흥미가 있으신가요?"
10125-90 = "마스터, 점을\n봐 드릴까요?"
10125-100 = "물론 복채는\n필요 없어요."
10125-110 = "편히 말씀해 주세요!"
10125-120 = "모, 모자는\n건드리지 마세요."
10125-130 = "이건 마법사의\n상징이니까,\n벗겨지면 안 돼요!"
10125-140 = "앗, 그쪽은\n마법 각인이……!"
10125-150 = "계속 건드리면……\n폭발해 버릴지도.\n뉴후훗."
10125-280 = "자, 함께 마도구를\n입수해 보죠!"
10125-290 = "오오, 이 물품들……\n바라보기만 해도 마력이……!"
10125-300 = "이곳에서는 마도구를\n더 이상 모을 수 없게\n되었습니다만,"
10125-310 = "괜찮습니다!"
10125-320 = "마스터와의\n추억도, 마도구도."
10125-330 = "앞으로 잔뜩\n찾아낼 수 있으니까요!"
10125-340 = "마음에 드는 게\n있으셨나요?"
10125-350 = "마스터의 심미안,\n기대하고 있어요!"
10125-360 = "이야, 마력이\n가득한 도구네요!"
10125-370 = "역시 마스터!\n안목이 있으시네요!"
10125-380 = "그럼 바로\n시험해 볼까요!"
10125-390 = "앗, 저도 그게\n좋을 것 같다고 생각했어요!"

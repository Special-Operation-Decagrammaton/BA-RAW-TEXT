[translation]
10125-10 = "受阿爾克那\n引導之人啊……\n請到這邊來。"
10125-20 = "來，沉睡於\n狂獵的祕密……"
10125-30 = "就讓我們一起解開吧。"
10125-40 = "嗚嗚……拜託別被\n舍監隊發現……"
10125-50 = "還差一點！\n一起迎接無悔\n的終曲吧！"
10125-60 = "御者！再一起……"
10125-70 = "創造出精彩的藝術吧！"
10125-80 = "妞呵呵，\n對魔法有興趣嗎？"
10125-90 = "御者，要不要\n我幫你占卜？"
10125-100 = "當然不需要\n任何報酬。"
10125-110 = "請隨時跟我說！"
10125-120 = "帽，帽子不行啦。"
10125-130 = "這，這是\n魔法使的象徵……\n所以不能脫下來！"
10125-140 = "啊，那裡有\n魔法刻印……！"
10125-150 = "一直戳的話……\n可能會暴走哦。\n妞呵呵。"
10125-280 = "來，取得魔道具吧！"
10125-290 = "哦哦，這個商品陣容……\n光看就感覺魔力已經……！"
10125-300 = "雖然這裡已經不能\n再收集魔道具了，"
10125-310 = "不過沒關係！"
10125-320 = "與御者的回憶，\n還有魔道具，"
10125-330 = "接下來都能找到更多！"
10125-340 = "有看到喜歡的東西嗎？"
10125-350 = "御者的審美，\n我很期待！"
10125-360 = "這個能感受到\n強大的魔力呢……！"
10125-370 = "不愧是御者！\n眼光真好！"
10125-380 = "那麼，趕緊\n來試試看吧！"
10125-390 = "啊，我也覺得\n那個不錯！"

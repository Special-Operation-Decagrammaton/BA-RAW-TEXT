[translation]
10125-10 = "The one guided by the Arcana. This way."
10125-20 = "Now then, let us uncover the secret that lies beneath Wildhunt..."
10125-30 = "You and I, together."
10125-40 = "Umm, I can't let the Prefectural Council find out about my plan..."
10125-50 = "Just a little more! Let us welcome the finale with no regrets!"
10125-60 = "Next time too..."
10125-70 = "I want to create an incredible piece of art with you, Master!"
10125-80 = "Nyuhuhu, are you interested in magic?"
10125-90 = "Master, would you like me to read your fortune?"
10125-100 = "For free, of course."
10125-110 = "Just let me know!"
10125-120 = "P-Please don't touch my hat."
10125-130 = "This is the symbol of a magician, so it should never come off!"
10125-140 = "Ah, I made a magic engraving over there...!"
10125-150 = "If you keep touching it... It might explode. Nyuhuhu."
10125-280 = "Now then, let us get our hands on the magic tools!"
10125-290 = "Ooh, these items... I can feel their magic power just by looking at them...!"
10125-300 = "I can't get magic tools from here anymore..."
10125-310 = "...but that's okay!"
10125-320 = "Whether it's memories with you or magic tools..."
10125-330 = "...I'll have more and more of them in the future!"
10125-340 = "Was there anything to your liking?"
10125-350 = "I'm looking forward to seeing your style, Master!"
10125-360 = "Oh my, this item is full of magic powers!"
10125-370 = "I'd expect nothing less! You have good taste!"
10125-380 = "Let's test it out right now!"
10125-390 = "Ah, I thought that was a good one too!"

[translation]
10125-10 = "ผู้ถูกนำทางภายใต้\nการชี้นำของอาร์คาน่าเอ๋ย\nเชิญทางนี้"
10125-20 = "เอาละ มาเปิดเผย\nความลับที่หลับใหลอยู่ที่..."
10125-30 = "ไวลด์ฮันต์กันเถอะ"
10125-40 = "อืม... ปฏิบัติการครั้งนี้\nจะให้ฝ่ายดูแลหอพัก\nรู้ไม่ได้เด็ดขาด..."
10125-50 = "อีกนิดเดียวเท่านั้น\nเราก็จะได้พบกับบทสรุป\nที่จะไม่มีวันเสียใจภายหลัง!"
10125-60 = "คราวหน้า..."
10125-70 = "ฉันอยากสร้างสรรค์\nผลงานที่ยอดเยี่ยม\nร่วมกับมาสเตอร์อีกค่ะ"
10125-80 = "อุฮุฮุ สนใจ\nเรื่องเวทมนตร์เหรอคะ?"
10125-90 = "มาสเตอร์\nฉันดูดวงให้มั้ยคะ?"
10125-100 = "แน่นอนว่าฉัน\nไม่เก็บค่าครูหรอกค่ะ"
10125-110 = "บอกฉันได้เลยนะคะ!"
10125-120 = "ยะ... อย่าแตะ\nหมวกสิคะ"
10125-130 = "นี่เป็นสัญลักษณ์\nของนักเวทนะคะ\nห้ามถอดออกค่ะ!"
10125-140 = "อ๊ะ นั่นมัน\nอักขระเวท...!"
10125-150 = "ถ้ายังจับไม่เลิก...\nอาจจะระเบิดก็ได้นะ\nอุฮุฮุ"
10125-280 = "เอาละ มาทดลอง\nอุปกรณ์เวทกันเถอะ!"
10125-290 = "โอ้ ของพวกนี้\nแค่มองก็สัมผัสได้ถึงพลังเวท...!"
10125-300 = "ที่นี่คงจะรวบรวมอุปกรณ์เวท\nไม่ได้อีกแล้วละ"
10125-310 = "แต่ก็ไม่เป็นไรหรอกนะคะ!"
10125-320 = "ทั้งอุปกรณ์เวทและ\nความทรงจำกับมาสเตอร์"
10125-330 = "ก็ยังคงสร้างใหม่ได้มากมาย\nในอนาคตนี่ค่ะ"
10125-340 = "มีของที่ถูกใจ\nหรือเปล่าคะ?"
10125-350 = "ฉันคาดหวังความลึกซึ้ง\nในสุนทรียภาพของมาสเตอร์\nอยู่นะคะ!"
10125-360 = "อ่า เป็นอุปกรณ์ที่\nมีพลังเวทอยู่เต็มเปี่ยมเลยนะคะ!"
10125-370 = "สมกับเป็นมาสเตอร์จริงๆ\nสายตาเฉียบคมมากค่ะ!"
10125-380 = "ถ้างั้นมาทดลองใช้\nกันเลยมั้ยคะ?!"
10125-390 = "อ๊ะ ฉันก็คิดว่าชิ้นนั้น\nเป็นของที่ดีเหมือนกันค่ะ"

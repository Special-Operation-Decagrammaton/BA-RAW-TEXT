[translation]
10066-10 = "선생님 서둘러 주세요!\n이벤트예요, 이벤트!"
10066-20 = "아리스라면,\n언제든지 OK입니다!\n선생님은 준비\n다 하셨나요?"
10066-30 = "아직 메이드 극복 레벨은\n높지 않지만…"
10066-40 = "아리스, 노력하겠습니다!"
10066-50 = "선생님, 어디선가\n네루 선배를 발견하면\n바로 알려주세요."
10066-60 = "꼭이에요?\n아리스와의 약속입니다!"
10066-70 = "요리, 청소, 세탁!\n모두 메이드의\n기본입니다!"
10066-80 = "선생님도 퀘스트에\n참여하시겠습니까?"
10066-90 = "그, 그렇게 찔러도\n아무것도 드롭하지\n않는답니다…?"
10066-100 = "아리스는 몬스터가\n아니에요!"
10066-110 = "꼭이에요?\n아리스와의 약속입니다!"
10066-120 = "요리, 청소, 세탁!\n모두 메이드의\n기본입니다!"
10066-130 = "선생님도 퀘스트에\n참여하시겠습니까?"
10066-140 = "그, 그렇게 찔러도\n아무것도 드롭하지\n않는답니다…?"
10066-150 = "아리스는 몬스터가\n아니에요!"
10066-500 = "어서 오세요, 선생님!"
10066-510 = "메이드 용사는 가게를\n보는 것도 할 수 있습니다!"
10066-520 = "교환 아이템 재고는,\n넉넉합니다!"
10066-530 = "그런데 선생님이라면\n 전부 가져가실 수 있을 것 같네요."
10066-540 = "이벤트는 종료되었지만,\n아직 영업 중입니다."
10066-550 = "기간 한정이니 잊지 마세요.\n아리스와 약속한 거예요?"
10066-560 = "어서 오세요,\n아리스의 도구점에!"
10066-570 = "이곳에서는 모험에 도움이 되는\n아이템과 포션을 살 수 있어요!"
10066-580 = "음… 선생님, 스마일이요?"
10066-590 = "알겠습니다.\n스마일은 0크레딧이라고\n모모이가 말했습니다!"
10066-600 = "뽜밤뽜밤! 선생님이\n아이템을 구입했어요!"
10066-610 = "프리미엄 스마일을\n덤으로 드릴게요!"
10066-620 = "호호…\n손님 안목이 높으시네요."
10066-630 = "이럴 때 하는 대사예요!\n아리스, 익혔습니다!"
10066-640 = "여행자여,\n그것이 너의 선택인가…?"
10066-650 = "선생님 어때요?\n이 대사 말해보고 싶었어요!"
10066-660 = "아이템 창고 관리도\n메이드의 일입니다!"
10066-670 = "아리스,\n오늘도 열심히 할게요!"

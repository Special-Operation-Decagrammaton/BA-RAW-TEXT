[translation]
10123-360 = "今天也是平靜的一天呢。"
10123-370 = "……這只是比喻而已。"
10123-380 = "接下來就由我來引導。"
10123-390 = "不覺得現在才是"
10123-400 = "最有趣的時期嗎？"
10123-410 = "直到最後，\n我都不會鬆開油門。"
10123-420 = "雖然心情十分舒暢……"
10123-430 = "卻也有股不捨的感覺呢。"
10123-440 = "請用言語表達出來。\n用言語。"
10123-450 = "是什麼讓你這麼害羞呢？"
10123-460 = "要搔癢嗎？"
10123-470 = "呵呵。是老師的話\n我非常歡迎。"
10123-480 = "老師的另外一面……"
10123-490 = "也想看看呢。"
10123-500 = "只是因為是夏天，"
10123-510 = "所以才會打扮的\n比較清涼。"

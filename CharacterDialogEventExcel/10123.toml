[translation]
10123-360 = "오늘도 시원한 하루네요."
10123-370 = "……말이 그렇다는 거예요."
10123-380 = "지금부터는\n제가 안내해 드리죠."
10123-390 = "한창 즐거울 때네요."
10123-400 = "그렇지 않나요?"
10123-410 = "마지막까지 엑셀을\n풀지 않을 거예요."
10123-420 = "개운하기도 하고,"
10123-430 = "섭섭하기도 하네요."
10123-440 = "말로 하세요, 말로."
10123-450 = "뭐가 그리 부끄러우신가요?"
10123-460 = "간지럽히시는 건가요?"
10123-470 = "후후.\n환영이랍니다."
10123-480 = "선생님의 또 다른 모습도……."
10123-490 = "보고 싶네요."
10123-500 = "여름이라 가볍게"
10123-510 = "입은 것뿐이랍니다."

[translation]
10123-360 = "วันนี้ก็เย็นสบายจังเลยนะคะ"
10123-370 = "ฉันก็พูดไปงั้นละค่ะ..."
10123-380 = "จากนี้ไปฉันจะ\nเป็นคนแนะนำให้ค่ะ"
10123-390 = "เป็นช่วงที่กำลังสนุกเลยนะคะ"
10123-400 = "ว่ามั้ยคะ?"
10123-410 = "ฉันจะไม่ถอนคันเร่ง\nจนถึงที่สุดเลยค่ะ"
10123-420 = "ทั้งสดชื่น"
10123-430 = "แต่ก็เสียดายด้วยนะคะ"
10123-440 = "พูดออกมาเถอะค่ะ"
10123-450 = "เขินอะไรขนาดนั้นกันคะ?"
10123-460 = "จะจั๊กจี้กันเหรอคะ?"
10123-470 = "ฮุฮุ ยินดีเลยค่ะ"
10123-480 = "ด้านอื่นๆ ของคุณครู..."
10123-490 = "ฉันอยากเห็นมันจังเลยค่ะ"
10123-500 = "พอฤดูร้อนก็สบายๆ นะคะ"
10123-510 = "หมายถึงการแต่งตัวน่ะค่ะ"

[translation]
10127-10 = "歡迎，老師。\n我正好也把大綱寫完了。"
10127-20 = "能夠見到老師，\n讓我非常安心。"
10127-30 = "入學狂獵的時候，"
10127-40 = "我從來沒想像過居然\n會淪落到得做這種事情。"
10127-50 = "事態變得越來越\n複雜了呢……"
10127-60 = "……我可不能放棄。"
10127-70 = "故事必須完結才有意義。"
10127-80 = "能順利結束真是太好了。"
10127-90 = "……唉。\n這種委託，\n我已經受夠了。"
10127-100 = "啊……我的打字聲，\n是不是太吵了？"
10127-110 = "為什麼會被捲進\n這種事情裡呢……"
10127-120 = "那，那樣盯著我看……"
10127-130 = "呵呵。我很開心。"
10127-140 = "工作結束之後，還請\n務必來我們的宿舍玩哦。"
10127-410 = "歡迎你，老師。\n在這裡唷。"
10127-420 = "請把手給我。\n……要不要一起抽卡呢？"
10127-430 = "直到故事的結局……\n為了避免留下遺憾，\n請親眼見證下去吧。"
10127-440 = "有遇到什麼問題嗎？"
10127-450 = "有想抽的卡嗎？"
10127-460 = "太厲害了！\n這是連我也第一次\n親眼見到的卡唷！"
10127-470 = "運氣很好呢，老師！\n乘著這股氣勢，\n下一張也……！"
10127-480 = "普通，也有屬於\n普通的美學。"
10127-490 = "請不要氣餒，老師。\n不幸，是下一次\n幸運的前兆哦。"

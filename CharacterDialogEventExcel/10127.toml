[translation]
10127-10 = "เชิญค่ะ คุณครู\nฉันเพิ่งเขียนพล็อตเรื่อง\nเสร็จพอดีเลยค่ะ"
10127-20 = "พอได้เจอคุณครู\nฉันก็โล่งใจขึ้น\nมากเลยละค่ะ"
10127-30 = "ตอนเข้าเรียน\nที่ไวลด์ฮันต์"
10127-40 = "ฉันคิดไม่ถึงเลยค่ะ\nว่าจะได้มาทำงาน\nแบบนี้น่ะ..."
10127-50 = "สถานการณ์ค่อนข้าง\nพลิกผันเลยนะคะ"
10127-60 = "แต่ถึงยังไง...\nฉันก็ยอมแพ้ไม่ได้ค่ะ"
10127-70 = "ฉันต้องเขียนให้จบเรื่องนี่คะ"
10127-80 = "โล่งอกไปที\nที่จบลงด้วยดีนะคะ"
10127-90 = "แต่จากนี้ไป...\nฉันจะไม่รับงาน\nแบบนี้แล้วค่ะ เฮ้อ…"
10127-100 = "คะ? เครื่องพิมพ์ดีดของฉัน\nเสียงดังไปหรือเปล่าคะ...?"
10127-110 = "ฉันเข้ามาเกี่ยวข้องกับ\nเรื่องแบบนี้ได้ยังไงกันนะคะ..."
10127-120 = "ถ้ายังจ้องฉัน\nขนาดนี้ละก็..."
10127-130 = "ดีจังเลยนะคะ ฮุฮุ"
10127-140 = "ไว้เสร็จงานแล้ว\nแวะมาเที่ยวที่หอพัก\nของพวกฉันสิคะ"
10127-410 = "ยินดีต้อนรับค่ะ คุณครู\nเชิญทางนี้เลยค่ะ"
10127-420 = "ยื่นมือมาสิคะ คุณครู\nมาเลือกการ์ดด้วยกันนะคะ"
10127-430 = "ตอนจบสำคัญนะคะ\nมาดูตอนจบของที่แห่งนี้\nแล้วค่อยไปนะคะ"
10127-440 = "คะ?\nการ์ดมีปัญหาตรงไหนเหรอคะ?"
10127-450 = "มีการ์ดที่\nอยากได้มั้ยคะ?"
10127-460 = "นี่มัน...! เป็นการ์ดที่ฉันก็\nเคยเห็นแต่ในหนังสือ\nเท่านั้นค่ะ...!"
10127-470 = "ดวงดีจังเลยนะคะ คุณครู!\nงั้นก็ขอพึ่งดวงนี้\nแล้วไปต่อเลย..."
10127-480 = "ความธรรมดา\nก็มีสุนทรียศาสตร์\nในความธรรมดาของมันนะคะ "
10127-490 = "อย่าผิดหวังไปเลยค่ะ คุณครู\nบางทีโชคร้ายก็กลายมา\nเป็นโชคดีได้นะคะ"

[translation]
10127-10 = "어서 오세요, 선생님.\n마침 플롯 작성이\n끝났어요."
10127-20 = "선생님을 보니까,\n마음이\n훨씬 편해지네요."
10127-30 = "와일드헌트에\n입학했을 때,"
10127-40 = "이런 일을 하게\n될 거라고는 상상도\n못 했었는데……."
10127-50 = "상황이 꽤나\n꼬인 것 같네요."
10127-60 = "……그래도\n포기할 수는 없어요."
10127-70 = "완결은 내야 하니까."
10127-80 = "다행히\n잘 끝이 났네요."
10127-90 = "……그래도 앞으로는\n이런 의뢰 안\n받을래요. 후으으……."
10127-100 = "네? 제 타자기 소리가\n조금 시끄러웠나요……?"
10127-110 = "저, 어쩌다 이런 일에\n휘말린 걸까요……."
10127-120 = "그렇게 계속 저를\n빤히 쳐다보시면……"
10127-130 = "좋네요, 후후."
10127-140 = "일 끝나면,\n저희 기숙사로\n놀러 오세요."
10127-410 = "환영합니다, 선생님.\n이쪽으로 오세요."
10127-420 = "손 주세요, 선생님.\n함께 카드를 뽑아 봐요."
10127-430 = "결말은 중요하죠. \n후회 없이, 이곳에서의\n마지막을 보고 가세요."
10127-440 = "네?\n카드에 문제가 있나요?"
10127-450 = "노리시는 카드가\n있으신가요?"
10127-460 = "이건……! 저도\n책에서밖에 본 적이\n없는 카드예요……!"
10127-470 = "운이 좋네요, 선생님!\n그럼 이 흐름을 타고,\n계속……!"
10127-480 = "평범함은,\n평범함 나름의\n미학이 있죠 "
10127-490 = "낙담 마세요, 선생님.\n불운은 다음 행운을\n암시하기도 하니까요."

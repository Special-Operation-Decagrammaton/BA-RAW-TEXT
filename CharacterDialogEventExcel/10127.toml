[translation]
10127-10 = "Welcome, Sensei. I just finished writing the plot."
10127-20 = "Seeing you makes me feel at ease."
10127-30 = "When I first enrolled in Wildhunt..."
10127-40 = "...I never imagined I'd be doing something like this."
10127-50 = "Things have gotten complicated."
10127-60 = "...But I still can't give up."
10127-70 = "The story must be finished."
10127-80 = "Fortunately, everything ended well."
10127-90 = "...But still, I don't think I'll be accepting a commission like this again. Ugh..."
10127-100 = "Hm? Is my typewriter too loud...?"
10127-110 = "I wonder how I got involved in all this..."
10127-120 = "If you keep staring at me like that..."
10127-130 = "It's nice, fufu."
10127-140 = "You should come visit our dormitory when you're done with work."
10127-410 = "Welcome, Sensei. Please come this way."
10127-420 = "Give me your hand, Sensei. Let's pull a card together."
10127-430 = "Endings are important. Let's go watch the finale of this place without any regret."
10127-440 = "Hm? Is there something wrong with the card?"
10127-450 = "Is there a card you're looking for?"
10127-460 = "This is...! I've also only seen this card in books...!"
10127-470 = "You have good luck, Sensei! Let's keep this pace going...!"
10127-480 = "Ordinariness is an aesthetic of its own. "
10127-490 = "Don't get discouraged, Sensei. Misfortune can hint at future fortune."

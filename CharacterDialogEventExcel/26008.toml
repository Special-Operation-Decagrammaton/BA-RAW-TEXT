[translation]
26008-10 = "어서 오세요, 선생님!\n바다의 집 버전 백야당에\n오신 것을 환영합니다!"
26008-20 = "앗, 선생님?!\n아직 준비가,\n끝나지 않았는데요…?!"
26008-30 = "이, 일단!\n이쪽으로 오세요!"
26008-40 = "뭔가 원하는\n물건은 찾으셨나요?"
26008-50 = "백야당은 아직 더\n진화할 거예요!\n자! 잔뜩 힘내서 가보죠!"
26008-60 = "여러 점포를 동시에\n관리한다는 건 큰일이네요……"
26008-70 = "뭐어, 즐겁기도 하지만요!"
26008-80 = "잠ㄲ, 선생님! 저는\n파는 물건이 아니에요!"
26008-90 = "게다가 지금은\n영업시간이니까요……."
26008-100 = "뭔가 원하는\n물건은 찾으셨나요?"
26008-110 = "백야당은 아직 더\n진화할 거예요!\n자! 잔뜩 힘내서 가보죠!"
26008-120 = "여러 점포를 동시에\n관리한다는 건 큰일이네요……"
26008-130 = "뭐어, 즐겁기도 하지만요!"
26008-140 = "잠ㄲ, 선생님! 저는\n파는 물건이 아니에요!"
26008-150 = "게다가 지금은\n영업시간이니까요……."
26008-480 = "여러가지로, 바다에서\n도움이 되는 것들을\n준비하고 있어요!"
26008-490 = "혹시 안 쓰는 물건이\n있으시다면, 교환해 드릴게요!"
26008-500 = "아쉽게도 바다의 집 영업은 종료되었습니다…"
26008-510 = "…만! 괜찮아요,\n즐거웠던 추억은 영원하니까!"
26008-520 = "네, 네~\n지금 시즈코를 부르셨나요?"
26008-530 = "좋은 물건을 적정 가격에!\n장사의 기본이에요!"
26008-540 = "이용해 주셔서 감사합니다!"
26008-550 = "아, 좋네요!\n저도 추천하는 물건이에요!"
26008-560 = "만족스럽게 쇼핑하셨나요?\n입소문도 중요하니까,\n괜찮으면 널리 알려주세요!"
26008-570 = "네, 여기 있습니다!\n매번 감사해요!"

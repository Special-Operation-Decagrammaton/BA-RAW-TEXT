[translation]
26008-10 = "歡迎光臨，老師！\n歡迎來到海之家\n版本的百夜堂！"
26008-20 = "咦，老師！？還沒\n準備完成哦……！？"
26008-30 = "總，總之！\n這邊請！"
26008-40 = "有找到什麼\n想要的東西嗎？"
26008-50 = "百夜堂還會繼續進化唷！\n來，讓我們鼓起幹勁吧！"
26008-60 = "要同時管理\n複數的店舖，\n真辛苦呢……"
26008-70 = "不過也挺開心的就是了！"
26008-80 = "等等，老師！\n我不是商品哦！"
26008-90 = "而且現在，\n是營業時間……"
26008-100 = "有找到什麼\n想要的東西嗎？"
26008-110 = "百夜堂還會繼續進化唷！\n來，讓我們鼓起幹勁吧！"
26008-120 = "要同時管理\n複數的店舖，\n真辛苦呢……"
26008-130 = "不過也挺開心的就是了！"
26008-140 = "等等，老師！\n我不是商品哦！"
26008-150 = "而且現在，\n是營業時間……"
26008-480 = "各種在海邊能用的東西\n都很齊全唷！"
26008-490 = "如果有什麼不要的東西，\n也可以來交換！"
26008-500 = "很遺憾，海之家已經\n結束營業了…"
26008-510 = "…但！沒關係，\n快樂的回憶是永恆的！"
26008-520 = "嗨嗨～\n剛剛有叫靜子嗎？"
26008-530 = "用合理的價格賣好東西！\n這是做生意的基本！"
26008-540 = "謝謝您的光臨！"
26008-550 = "啊，選得好！\n它也是我推薦的商品！"
26008-560 = "對購買的產品滿意嗎？\n口碑也很重要，\n可以的話，請幫忙宣傳哦！"
26008-570 = "來，請收下！\n謝謝您一直以來的惠顧！"

[translation]
10085-160 = "หนาวจัง...\nอยากรีบกลับไปอยู่\nในอาคารที่อบอุ่นๆ แล้ว..."
10085-170 = "ให้มาแคมป์ปิ้งช่วงนี้เนี่ยนะ"
10085-180 = "รองหัวหน้าทำเกินไปแล้ว..."
10085-190 = "อยู่ที่นี่...\nไม่เห็นจะมี...\nอะไรให้ทำเลย..."
10085-200 = "มะ... มีหมีโผล่ออกมา\nแถวๆ นี้งั้นเหรอ...?"
10085-210 = "งั้นเราจะ\nอยู่ที่นี่กันได้เหรอ?"
10085-220 = "ถึงจะต้องลำบากอยู่บ้าง\nแต่การได้มาทำอะไรแบบนี้\nก็อาจจะไม่แย่ก็ได้..."
10085-230 = "ตะ... แต่ต้องนานๆ ทีนะ\nนานๆ ทีถึงจะมาน่ะ...!"
10085-240 = "ร้านสะดวกซื้อที่ใกล้ที่สุด...\nอยู่เลยเขาลูกโน้นไปเหรอ..."
10085-250 = "(สัญญาณ Wi-Fi...\nหายไปแล้วเหรอ?)"
10085-260 = "เครื่องดื่มชูกำลังแบบอุ่นๆ..."
10085-270 = "ปกติฉันคงจะไม่สนเลย\nแต่วันนี้อาจจะโอเคก็ได้"
10085-280 = "คุณครูก็คงเหนื่อยน่าดูนะ\nสิ้นปีทั้งที แต่โดนลากมา\nในที่แบบนี้ซะงั้น..."
10085-290 = "หืม? หืม? สถานการณ์แบบนี้\nก็สนุกเหมือนกันงั้นเหรอ?"
10085-300 = "คุณครูนี่นะ\nสนุกกับคนอื่นไปทั่วเลย"
10085-310 = "คุณครูก็มาเพราะ\nรองหัวหน้าไปขอไว้เหรอ? "
10085-320 = "ถ้าไม่ติดอะไรละก็\nมาช่วยอะไรฉันหน่อยได้มั้ย...?"
10085-330 = "วะ... ว้าก...?\nอ่า คุณครูนี่เอง..."
10085-340 = "ขอโทษนะ นึกว่าหมีออกมาน่ะ"
10085-350 = "ต้องเก็บกวาดให้เรียบร้อยก่อนไป"
10085-360 = "ไม่งั้นอาจโดนรองหัวหน้า\nเทศน์ใส่อีกชุดก็ได้"
10085-370 = "เรื่องเก็บรวบรวม... ถ้านี่เป็นเกม\nแค่คลิกครั้งเดียวก็คงเสร็จแล้ว..."
10085-380 = "หืม? ทำไมเหรอ?\nมีอะไรเปื้อนเสื้อฉันรึเปล่า?"
10085-390 = "อืม ถ้าเป็นอันนี้ไม่เป็นไรหรอก"
10085-400 = "อันนี้... ให้ฉันเหรอ?"
10085-410 = "ขอบคุณนะ งั้นฉันก็จะให้\nอันที่ฉันรวบรวมมาด้วยเหมือนกัน"
10085-420 = "รวบรวมมาได้ขนาดนี้เลยเหรอ?"
10085-430 = "คุณครูมีพรสวรรค์\nด้านแคมป์ปิ้งนะเนี่ย..."
10085-440 = "อ๊ะ คุณครู\nฉันกำลัง\nต้มแกงกะหรี่อยู่น่ะ"
10085-450 = "พอเห็นหม้อที่\nน้ำเดือดปุดๆ แบบนี้แล้ว..."
10085-460 = "รู้สึกอบอุ่นยังไงก็ไม่รู้..."
10085-470 = "ทำแกงกะหรี่เสร็จแล้ว..."
10085-480 = "แต่ถ้าอยากใส่วัตถุดิบ\nอะไรเพิ่ม ก็บอกฉันนะ"
10085-490 = "อืม... กำลังไปได้\nด้วยดีไหมนะ?"
10085-500 = "คุณครู มาชิมให้หน่อยสิ"
10085-510 = "เห็นว่ามีคนใส่ช็อกโกแลต\nเป็นรสชาติลับ\nในแกงกะหรี่ด้วยนะ"
10085-520 = "ถ้างั้นลองใส่\nเครื่องดื่มชูกำลัง\nดูดีมั้ย..."
10085-530 = "...!\nอร่อยจนอยากร้องขอชีวิตเลย"
10085-540 = "แกงกะหรี่ออกรสชาติ\nแบบนี้ได้ด้วยเหรอเนี่ย"
10085-550 = "อืม อร่อยมากเลย"
10085-560 = "ถ้าเทียบกับแกงกะหรี่สำเร็จรูป\nมันก็พอใช้ได้อยู่นะ"
10085-570 = "ระ... รสชาติมันก็ตราตึง\nอยู่หรอกนะ..."
10085-580 = "อึก... ขอโทษนะ\nอันนี้ฉันกินไม่ได้หรอก..."

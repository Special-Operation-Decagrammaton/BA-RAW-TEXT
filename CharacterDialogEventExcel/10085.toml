[translation]
10085-160 = "好冷……\n想趕快回到\n溫暖的室內……"
10085-170 = "竟然在這種時期露營……"
10085-180 = "副部長，真過分。"
10085-190 = "這裡……\n根本沒什麼……\n能做的事……"
10085-200 = "附，附近\n有熊出沒……？"
10085-210 = "待在這裡\n真的沒問題嗎？"
10085-220 = "雖然有點辛苦，\n但偶爾感受這種\n經驗也不……"
10085-230 = "我，我是說偶爾，\n真的偶爾就好……！"
10085-240 = "最近的便利商店……\n在那座山的另一邊……"
10085-250 = "（Wi-Fi……\n　消失了？）"
10085-260 = "熱的能量飲料……"
10085-270 = "平常不會考慮，\n但只限今天的話，\n或許還能接受……"
10085-280 = "老師也真辛苦呢。\n明明都年底了，\n還被抓來這種地方。"
10085-290 = "咦？現在的狀況\n也挺愉快的……？"
10085-300 = "……果然\n老師是陽角嗎。"
10085-310 = "……老師也是被\n副部長叫來的嗎？"
10085-320 = "不介意的話，\n幫我個小忙，可以嗎……？"
10085-330 = "唔，唔啊！\n……啊，老師……"
10085-340 = "抱歉，我以為是熊……"
10085-350 = "收拾必須確實完成。"
10085-360 = "不然之後副部長\n要是生氣可就不好了。"
10085-370 = "採集……如果這是遊戲，\n只要點一下就行了說……"
10085-380 = "怎麼了？\n衣服沾到什麼了嗎？"
10085-390 = "也對，這樣應該可行。"
10085-400 = "要給我這個？"
10085-410 = "謝謝，我也把\n收集到的給你。"
10085-420 = "已經收集這麼多了？"
10085-430 = "……老師你，原來\n有露營的才能啊……"
10085-440 = "啊，老師。\n我正在煮咖哩。"
10085-450 = "看著正在咕嘟\n咕嘟的鍋子……"
10085-460 = "莫名有種安穩的感覺……"
10085-470 = "咖哩已經準備好了……"
10085-480 = "如果其他想加入的\n材料就告訴我吧。"
10085-490 = "嗯……這樣\n能順利煮好嗎？"
10085-500 = "老師，\n可以幫我試試味道嗎？"
10085-510 = "為了增加咖哩的風味，\n似乎能加入巧克力……"
10085-520 = "……既然如此，\n加入能量飲料應該也……"
10085-530 = "啊…！\n超好吃的！"
10085-540 = "咖哩居然能有\n這種味道……"
10085-550 = "嗯，這個很好吃。"
10085-560 = "和即食咖哩相比，\n還算普通好吃吧。"
10085-570 = "是，是讓人\n印象深刻的味道呢……"
10085-580 = "唔……抱歉，\n這我沒辦法吃……"

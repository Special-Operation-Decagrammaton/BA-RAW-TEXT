[translation]
26013-170 = "海邊的慶典……\n我還是第一次參加。"
26013-180 = "老師，玩得開心嗎？"
26013-190 = "慶典期間，要是能\n平安無事就好了……"
26013-200 = "因為這麼愉快的時間，\n可是很稀有的。"
26013-210 = "慶典再一下就……"
26013-220 = "雖然說有開始就\n必然伴隨著結束……"
26013-230 = "還是有點遺憾呢。"
26013-240 = "慶典，結束了呢……"
26013-250 = "不過沒關係的。\n因為大海依舊很美麗。"
26013-260 = "能像這樣摸著沙子、\n追逐海浪……"
26013-270 = "大海真有趣呢。"
26013-280 = "野外舞台……\n好像很有趣。"
26013-290 = "老師，一起去看看吧。"
26013-300 = "因為是和大家一起，我覺得很開心。"
26013-310 = "當然「大家」之中\n也包含老師唷。"
26013-320 = "謝謝你帶我們來參加慶典。"
26013-330 = "老師也要好好享受哦。"
26013-670 = "嗨，老師。"
26013-680 = "來，這給你，\n是待辦清單唷。"
26013-690 = "……真多呢。\n一樣一樣來解決吧。"
26013-700 = "你叫我嗎～？"
26013-710 = "呵呵，要看的不是我是旁邊唷。"
26013-720 = "辛苦你了，老師。"
26013-730 = "老師，你很努力呢。\n連我也產生鬥志了。"

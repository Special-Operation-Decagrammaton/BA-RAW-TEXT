[translation]
26013-170 = "งานเทศกาลริมทะเล...\nเพิ่งจะเคยเห็น... ครั้งแรกเลย"
26013-180 = "คุณครู กำลังสนุกอยู่หรือเปล่า?"
26013-190 = "ในช่วงงานเทศกาล หวังว่า\nจะไม่มีเรื่องอะไรเกิดขึ้นนะ..."
26013-200 = "เวลาที่สนุกแบบนี้\nไม่ได้มีบ่อยๆ นี่เนอะ"
26013-210 = "งานเทศกาลใกล้จะจบแล้วสินะ..."
26013-220 = "ว่ากันว่าถ้ามีจุดเริ่มต้น\nก็ย่อมมีจุดสิ้นสุด..."
26013-230 = "แต่ก็น่าเสียดายอยู่นะ"
26013-240 = "งานเทศกาลจบแล้ว..."
26013-250 = "แต่ก็ไม่เป็นไรหรอก\nยังไงทะเลก็ยังสวยเหมือนเดิม"
26013-260 = "ได้แตะทราย\nได้ไล่ตามคลื่น..."
26013-270 = "ทะเลนี่สนุกจังเลยนะ"
26013-280 = "การแสดงกลางแจ้ง...\nน่าจะสนุกนะ"
26013-290 = "คุณครู เราไปดูด้วยกันเถอะ"
26013-300 = "พออยู่กับทุกคนก็สนุกนะ"
26013-310 = "แน่นอนว่า 'ทุกคน' ที่ว่า\nก็มีคุณครูรวมอยู่ด้วยนะ"
26013-320 = "ขอบคุณที่พาฉันมางานเทศกาลนะ"
26013-330 = "คุณครูก็ต้องสนุกไปด้วยนะ"
26013-670 = "สวัสดี คุณครู"
26013-680 = "เอ้า นี่\nรายการงานที่ต้องทำน่ะ"
26013-690 = "เยอะจังเลย... มาทำทีละอย่างกันเถอะ"
26013-700 = "เรียกฉันเหรอ?"
26013-710 = "ฮุฮุ อย่ามองฉันสิ มองข้างๆ โน่น"
26013-720 = "ทำได้ดีมากเลยคุณครู"
26013-730 = "คุณครู ขยันจังเลย\nฉันเองก็ได้แรงบันดาลใจบ้างแล้วละ"

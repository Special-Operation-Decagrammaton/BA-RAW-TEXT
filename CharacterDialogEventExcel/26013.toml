[translation]
26013-170 = "A festival by the beach... I've never experienced anything like this."
26013-180 = "Are you having fun, Sensei?"
26013-190 = "I hope nothing...interrupts the festival..."
26013-200 = "You don't experience this kind of excitement every day."
26013-210 = "The festival is almost over..."
26013-220 = "They say where there's a beginning, there's an end..."
26013-230 = "But it is a bit sad."
26013-240 = "The festival, it's over..."
26013-250 = "Still, it's okay. The sea is still beautiful."
26013-260 = "I can touch the sand, and follow the waves..."
26013-270 = "The sea is a joyful place."
26013-280 = "I think...the outdoor stage would be fun."
26013-290 = "Let's go watch it together, Sensei."
26013-300 = "I'm happy that everyone's here."
26013-310 = "Of course, you're included in 'everyone', Sensei."
26013-320 = "Thank you for bringing me to the festival."
26013-330 = "I hope you have fun too."
26013-670 = "Hi, Sensei."
26013-680 = "Here. It's a list of chores."
26013-690 = "...It's a long list. Let's finish them one by one."
26013-700 = "Did you call me?"
26013-710 = "Heehee. Don't look at me, look next to you."
26013-720 = "Well done, Sensei."
26013-730 = "You're so diligent. It's making me enthusiastic too."

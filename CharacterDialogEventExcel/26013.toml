[translation]
26013-170 = "바다의 축제…\n이런 건, 처음이야."
26013-180 = "선생님, 즐기고 있어?"
26013-190 = "축제 동안에는, 아무 일도\n일어나지 않았으면 좋겠어…"
26013-200 = "이렇게 즐거운 시간,\n좀처럼 없으니까."
26013-210 = "축제가 끝나가네…"
26013-220 = "시작이 있으면\n끝이 있다고 하지만…"
26013-230 = "조금, 아쉽네."
26013-240 = "축제, 끝나버렸네…"
26013-250 = "그래도 괜찮아.\n바다는 여전히 아름다우니까."
26013-260 = "모래를 만지고,\n파도를 쫓고…"
26013-270 = "바다는 즐겁네."
26013-280 = "야외무대…\n재밌을 거 같아."
26013-290 = "선생님, 같이 보러 가자."
26013-300 = "모두와 함께 와서 즐거워."
26013-310 = "물론 '모두' 안에는\n선생님도 포함이야."
26013-320 = "축제에 데려와 줘서 고마워."
26013-330 = "선생님도 즐기도록 해."
26013-670 = "안녕, 선생님."
26013-680 = "자, 이거,\n할 일 목록이야."
26013-690 = "…많네. 하나씩 끝내보자."
26013-700 = "불렀어?"
26013-710 = "후후, 나 말고 옆을 봐."
26013-720 = "수고했어, 선생님."
26013-730 = "선생님, 열심히네.\n나도 의욕이 생겼어."

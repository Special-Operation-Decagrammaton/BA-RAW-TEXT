[translation]
20010-230 = "สวัสดีค่ะคุณครู\nยินดีต้อนรับสู่\nออนเซ็น No.227 ค่ะ"
20010-240 = "วะ..ว้าย! คะ...คุณครู?!\nเอ๋? วันนี้จองที่พักเอาไว้\nแล้วอย่างนั้นเหรอคะ…!?"
20010-250 = "ได้ดูวิวที่สวยงาม\nพร้อมกับหาเงิน\nได้แบบนี้..."
20010-260 = "ออนเซ็นนี่ยอดเยี่ยมที่สุดเลยค่ะ!"
20010-270 = "มีอะไรเหรอคะคุณครู\nอุปกรณ์อาบน้ำ\nหมดแล้วเหรอคะ?"
20010-280 = "ฮุฮุ ตอนนี้ฉันไม่ใช่คนเดิม\nแบบเมื่อก่อน แล้วนะคะ!"
20010-290 = "ฮุฮุ เพราะว่าตอนนี้...\nฉันรู้สึกผ่อนคลาย\nมากเลยค่ะ..."
20010-300 = "หลังจากทานมื้ออาหารแล้ว\nพวกเราวางแผนจะกิน\nพุดดิ้งสักสองถ้วยเลยละค่ะ!"
20010-310 = "ออนเซ็นนี่ยอดเยี่ยมที่สุดเลยค่ะ!"
20010-320 = "มีอะไรเหรอคะคุณครู\nอุปกรณ์อาบน้ำ\nหมดแล้วเหรอคะ?"
20010-330 = "ฮุฮุ ตอนนี้ฉันไม่ใช่คนเดิม\nแบบเมื่อก่อนแล้วนะคะ!"
20010-340 = "ฮุฮุ เพราะว่าตอนนี้...\nฉันรู้สึกผ่อนคลายมากเลยค่ะ..."
20010-350 = "หลังจากทานมื้ออาหารแล้ว\nพวกเราวางแผนจะกิน\nพุดดิ้งสักสองถ้วยเลยละค่ะ!"
20010-360 = "ฉันเตรียมสิ่งของจำเป็น\nสำหรับบริการเอาไว้เยอะแยะเลยค่ะ!"
20010-370 = "ถ้ามีสิ่งของที่ไม่ได้ใช้ในออนเซ็น\nสามารถมาแลกเป็นไอเทมอื่น\nกับพวกเราได้นะคะ!"
20010-380 = "ถึงจะน่าเสียดาย...\nแต่ออนเซ็น No.227 ของเรา\nปิดให้บริการแล้วค่ะ..."
20010-390 = "คุณครู\nมีเรื่องอะไรหรือเปล่าคะ?"
20010-400 = "ถะ...ถึงจะเป็นคุณครูก็เถอะ\nแต่ก็คงจะให้ฟรีๆ ไม่ได้หรอกนะคะ"
20010-410 = "ขอบคุณที่มาใช้บริการแลกเปลี่ยนค่ะ"
20010-420 = "ไม่ว่าเมื่อไร...\nคุณครูก็ช่วยฉันอยู่เสมอ\nขอบคุณมากเลยค่ะ!"
20010-430 = "วันนี้ก็ขอบคุณที่มาใช้บริการนะคะ!"
20010-440 = "ขะ...ของดีๆ แบบนี้\nให้ฉันได้จริงๆ เหรอคะ?"

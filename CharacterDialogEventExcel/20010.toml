[translation]
20010-230 = "歡迎光臨。\n歡迎來到227號溫泉浴場！"
20010-240 = "啊哇哇！老，老師！？\n咦，請問今天\n有預約嗎……！？"
20010-250 = "不只能賺錢，\n還能飽覽許多\n漂亮的景色……"
20010-260 = "溫泉浴場，最棒了呢！"
20010-270 = "怎麼了嗎，老師？\n有什麼備品不夠了嗎？"
20010-280 = "呵呵……現在的我\n和從前的我已經完全\n不一樣了唷！"
20010-290 = "呵呵，\n現在的我\n游刃有餘到……"
20010-300 = "餐後的布丁\n可以吃兩個！"
20010-310 = "溫泉浴場，最棒了呢！"
20010-320 = "怎麼了嗎，老師？\n有什麼備品不夠了嗎？"
20010-330 = "呵呵……現在的我\n和從前的我已經完全\n不一樣了唷！"
20010-340 = "呵呵，\n現在的我\n游刃有餘到……"
20010-350 = "餐後的布丁\n可以吃兩個！"
20010-360 = "溫泉商品也\n準備了很多唷！"
20010-370 = "如果有用不到的東西，\n可以在這裡和\n別的商品進行交換！"
20010-380 = "雖然遺憾，但是\n227號溫泉浴場的營業\n已經結束了……"
20010-390 = "老師？\n怎麼了嗎？"
20010-400 = "就，就算是老師，\n免費給您也……！"
20010-410 = "謝謝惠顧！"
20010-420 = "一直以來\n很謝謝你，老師。"
20010-430 = "感謝您\n今天的惠顧！"
20010-440 = "這，這麼好的東西，\n我真的，可以收下嗎……？"

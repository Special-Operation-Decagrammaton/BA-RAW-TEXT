[translation]
20010-230 = "어서 오세요.\n227호 온천장에 오신\n것을 환영합니다!"
20010-240 = "아와와! 서, 선생님!?\n어라, 오늘 예약이 되어\n있으셨던가요……!?"
20010-250 = "돈도 벌고\n아름다운 풍경도 잔뜩\n볼 수 있다니…"
20010-260 = "온천장은 최고네요!"
20010-270 = "무슨 일이신가요,\n선생님? 무언가 부족한\n물품이라도 있나요?"
20010-280 = "후후…… 지금의 저는,\n지금까지와는 완전히\n다르니까요!"
20010-290 = "후후.\n지금의 저는 여유가\n넘쳐나기 때문에……"
20010-300 = "식사 후에\n푸딩을 두 개나\n먹을 예정이랍니다!"
20010-310 = "온천장은 최고네요!"
20010-320 = "무슨 일이신가요,\n선생님? 무언가 부족한\n물품이라도 있나요?"
20010-330 = "후후…… 지금의 저는,\n지금까지와는 완전히\n다르니까요!"
20010-340 = "후후.\n지금의 저는 여유가\n넘쳐나기 때문에……"
20010-350 = "식사 후에\n푸딩을 두 개나\n먹을 예정이랍니다!"
20010-360 = "온천 용품도 잔뜩\n준비하고 있답니다!"
20010-370 = "혹시 안 쓰는 물건이\n있으시다면 여기서\n다른 상품으로 교환해드릴게요!"
20010-380 = "아쉬운 일입니다만,\n227호 온천장의 영업은\n종료되었습니다……"
20010-390 = "선생님?\n무슨 일이신가요?"
20010-400 = "아, 아무리 선생님이라\n하더라도 공짜로\n드릴 수는 없거든요?"
20010-410 = "좋은 거래에 감사드립니다."
20010-420 = "언제나 도와주셔서\n감사합니다, 선생님."
20010-430 = "오늘도 이용해주셔서\n감사합니다!"
20010-440 = "이, 이런 좋은 물건을\n받아도 괜찮은 걸까요?"

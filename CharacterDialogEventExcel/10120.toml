[translation]
10120-390 = "ฮุฮุ มาทางนี้สิ\nคุณครู"
10120-400 = "เลือกนั่งได้ตามสบายเลยนะ"
10120-410 = "อีกไม่นาน\nการแสดงก็จะเริ่มขึ้นแล้วละ"
10120-420 = "อยากได้ขนมเยอะอีกหน่อย..."
10120-430 = "ไม่สิ ต้องฝึกซ้อมให้เยอะกว่านี้...!"
10120-440 = "เอาละ ตอนนี้ก็เข้าใกล้\nช่วงฟินาเล่อีกขั้นแล้ว...!"
10120-450 = "อ่า... สุดยอดเลยนะ\nทำได้ดีมากเลยคุณครู"
10120-460 = "หืม? มีอะไรเหรอคุณครู?"
10120-470 = "ถ้าคิดจะสะกิดกันละก็\nช่วยสะกิดตรงไหล่แล้วกัน..."
10120-480 = "พอได้ตีกลองก็เลยรู้ว่า\nมันเมื่อยไหล่น่าดูเลยแฮะ"
10120-490 = "ถึงจะสะกิดฉันยังไง\nก็ไม่มีมาการองให้หรอกนะ คุณครู"
10120-500 = "นั่งก่อนสิ คุณครู"
10120-510 = "ฉันจะแสดงให้ดูเอง\nว่ามือกลองน่ะเป็นยังไง...!"

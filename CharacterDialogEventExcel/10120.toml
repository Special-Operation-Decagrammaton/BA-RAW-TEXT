[translation]
10120-390 = "呵呵，真高興\n你來了，老師。"
10120-400 = "放輕鬆也沒關係。"
10120-410 = "演奏馬上就要開始囉。"
10120-420 = "還需要更多點心……"
10120-430 = "不，還需要\n更多練習……！"
10120-440 = "來吧，離謝幕\n只差一步了……！"
10120-450 = "……啊啊，很厲害唷。\n辛苦你了，老師。"
10120-460 = "嗯？怎麼了，老師？"
10120-470 = "要戳的話，\n這邊也麻煩了……"
10120-480 = "練習讓肩膀\n超僵硬的……"
10120-490 = "就算那樣戳，\n也不會跑出馬卡龍哦。"
10120-500 = "坐在那邊吧，老師。"
10120-510 = "鼓的真髓，\n就讓你見識見識吧……！"

[translation]
10055-450 = "야호- 선생님.\n혹시 괜찮다면 온천장의 일을\n도와주지 않을래?"
10055-460 = "잠깐 시간 괜찮아?\n탕에 들어가기 전에\n가볍게 움직여 보자고."
10055-470 = "노도카도 참 열심이라니까~"
10055-480 = "후후, 이번에 담근\n모르스는 정말 잘 익었는걸."
10055-490 = "……응? 나랑 같이\n목욕하고 싶어?"
10055-500 = "농담이야.\n그렇게 정색하진 마."
10055-510 = "수고했어.\n괜찮다면 모르스 한 모금…… 어때?"
10055-520 = "역시 선생님…… 모두에게\n인기가 많은 이유를 알겠네."

[translation]
10055-450 = "ยะฮู้ว คุณครู\nถ้าไม่ติดอะไร มาช่วยงาน\nของออนเซ็นหน่อยได้ไหม?"
10055-460 = "พอมีเวลาหน่อยไหม?\nฉันอยากชวนขยับร่างกาย\nก่อนจะลงไปแช่ตัวน่ะ"
10055-470 = "โนโดกะนี่ก็ขยันเหลือเกิน~"
10055-480 = "ฮุฮุ รอบนี้\nชามอร์สหมักมาได้ที่เลย"
10055-490 = "หืม...? อยากอาบน้ำ\nกับฉันเหรอ?"
10055-500 = "ล้อเล่นน่า\nอย่าทำหน้าจริงจังแบบนั้นสิ"
10055-510 = "ขอบคุณมากนะ\nถ้าไม่ติดอะไร ลองมอร์ส... สักกรึ๊บไหม?"
10055-520 = "สมกับเป็นคุณครูจริงๆ เลย\nรู้แล้วว่าทำไมคนอื่นถึงชอบกันนัก"

[translation]
10108-10 = "어서 오세요, 선생님!"
10108-20 = "설마 선생님께서 오실 줄은\n모르고 있었는데 말이죠."
10108-30 = "안녕하세요. 선생님."
10108-40 = "연말을 맞이해서 파자마\n파티를 열려 했는데……"
10108-50 = "다소 골치 아픈 문제가……"
10108-60 = "코~유~키~!!!"
10108-70 = "이번에는 정말로\n안 봐 줄 거니까요!"
10108-80 = "말리지 마세요!!!"
10108-90 = "어찌저찌\n해결되기는 했네요……"
10108-100 = "이것도 어떻게 보면\n이번에도 선생님 덕분이에요."
10108-110 = "코유키 말인가요?"
10108-120 = "……이번 한 번만\n봐 줄 생각이에요."
10108-130 = "아, 오셨군요. 선생님.\n괜찮으시다면…… 조금,\n쉬었다 가지 않으실래요?"
10108-140 = "네? 이런 제 모습도\n신선하게 느껴지신다고요?"
10108-150 = "가, 감사합니다. "
10108-160 = "선생님께\n그런 말씀을 들으니……"
10108-170 = "기쁘네요. 정말로요."
10108-180 = "새삼스럽게 제가\n여고생이라는 걸\n실감하셨다니…"
10108-190 = "그럼 평소에는 어떻게\n보고 계셨던 건가요?!"
10108-200 = "보드게임은 현실성이 있어\n즐겁지만 말을 관리하는 게\n조금 까다로운 것 같아요."
10108-210 = "더군다나 밀레니엄의 학생\n중에는 정리 정돈을 못 하는\n학생들이 제법 많은지라."
10108-220 = "저기, 선생님.\n허리를 찔러보시는 건\n그만두시겠어요…?"
10108-230 = "…살쪘다느니 그런 소리를\n하시면 진심으로\n화낼 거니까요."
10108-410 = "필요한 물건이 있으신가요?"
10108-420 = "연말을 맞아 비품을 정리하고\n있었으니 필요하신 게\n있다면 가져가세요."
10108-430 = "파자마 파티를 위해\n비품을 정리 중이랍니다."
10108-440 = "혹시 선생님께서도\n필요하신 게 있다면\n말씀해 주세요."
10108-450 = "안녕하세요, 선생님?"
10108-460 = "무언가 놓치신 것이\n있으시다면, 마지막까지\n꼼꼼하게 확인해 주세요!"
10108-470 = "어쩐지 파티를 준비하는 것\n뿐인데, 회계 업무의\n연장이 되어버린 느낌이네요…"
10108-480 = "그러고 보니\n샬레의 편의점에도"
10108-490 = "귀여운 아이 하나가\n매장을 관리하고 있었죠……"
10108-500 = "늘 매대 앞을\n떠나지 않던데, 휴식은\n제대로 취하고 있는 걸까요?"
10108-510 = "그것으로 하시겠어요?"
10108-520 = "합리적인 소비 시네요."
10108-530 = "영수증은…\n아, 제가 챙겨둘게요."
10108-540 = "나중에 샬레의 가계부에\n따로 기입해 두겠습니다."
10108-550 = "후후, 어쩐지 선생님의\n소비 패턴을\n분석할 수 있을 것 같네요."

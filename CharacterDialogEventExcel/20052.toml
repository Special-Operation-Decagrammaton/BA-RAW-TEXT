[translation]
20052-10 = "With no risk, there's no return."
20052-20 = "Now then, shall we get to business...?"
20052-30 = "I'll show you now."
20052-40 = "The skills of a Publishing Department that survived a harsh Red Winter!"
20052-50 = "Well..."
20052-60 = "It's probably closer to \"survival instinct,\" though."
20052-70 = "It's here... The momentum is here!"
20052-80 = "I can't call myself the Publishing Department President if I miss this!"
20052-90 = "...How did it come to this...?"
20052-100 = "I mean... I have the gist of what caused this..."
20052-110 = "But I can't give up just yet..."
20052-120 = "Wow... I was really concerned at one point!"
20052-130 = "What? You're glad things went well, but I should reflect on myself?"
20052-140 = "Um... Can we push that back to a later time...?"
20052-150 = "Creators are..."
20052-160 = "...good at creating things..."
20052-170 = "...but they're surprisingly uninterested..."
20052-180 = "...in the methods to spread their works..."
20052-190 = "The reason why books...why text is important..."
20052-200 = "...is because they are products with the \"potential\" to bring..."
20052-210 = "...maximum output with minimal input!"
20052-220 = "It's incredible to be able to create something."
20052-230 = "The same goes for having the talent to make it happen."
20052-240 = "..."
20052-250 = "Having such talent, it's great."
20052-260 = "I truly...believe that."
20052-270 = "I'm thankful to the Trinity students."
20052-280 = "Huh, why are you looking at me like that?"
20052-290 = "I'm serious."
20052-620 = "What do you think the basics of business are, Sensei? Naturally there's exchange... Trade..."
20052-630 = "And money, of course!"
20052-640 = "Welcome!"
20052-650 = "To the heart of business, where money and goods flow freely!"
20052-660 = "Heh, heh, heh. Please look around!"
20052-670 = "There might be hidden treasure waiting deep inside the shelves."
20052-680 = "Keep your eyes peeled until the end, Sensei."
20052-690 = "Ah, of course, you can also keep your eyes peeled for me, you know?"
20052-700 = "The price isn't going down even if you talk to me, okay?"
20052-710 = "Offering a discount would require tremendous business considerations..."
20052-720 = "...and even closed-door political negotiations."
20052-730 = "I never thought I'd see a day when I'd be doing business with you, Sensei."
20052-740 = "Yeah, seriously, life's full of surprises."
20052-750 = "Nice, nice!"
20052-760 = "Is there anything else you need?"
20052-770 = "I'm only telling you this here..."
20052-780 = "It's so thrilling to see the results with my own eyes!"
20052-790 = "Culture is money. That's the reality."
20052-800 = "In that regard, what you just purchased..."
20052-810 = "...could be considered cultural in a sense, you know?"
20052-820 = "I guarantee the quality, okay?"

[translation]
20052-10 = "리스크가 없다면\n리턴도 없는 법."
20052-20 = "그러면 어디, 사업을\n시작해 볼까요……?"
20052-30 = "지금이야말로,\n보여드리죠."
20052-40 = "붉은겨울에서\n살아남은,\n우리 출판부의 수완을!"
20052-50 = "……사실"
20052-60 = "생존 본능에\n가깝지 않은가\n싶기는 합니다만."
20052-70 = "왔어요……흐름이 온 겁니다!\n"
20052-80 = "이걸 놓치고도\n출판부장이라\n자처할 수는 없죠!"
20052-90 = "……어쩌다,\n이렇게 된 걸까요……"
20052-100 = "아뇨…… 사실 원인도\n짐작은 가긴\n하는데 말이죠……"
20052-110 = "그래도 아직은\n포기할 수\n없으니까요……"
20052-120 = "이야~ 한때는 어떻게\n되나 했다니까요!"
20052-130 = "네? 다행이지만\n반성도 조금 하라고요?"
20052-140 = "그…… 조금\n다음에 하면,\n안 될까요……?"
20052-150 = "창작자란 분들은\n말입니다."
20052-160 = "뭘 잘 만들기는\n하지만,"
20052-170 = "그걸 퍼트리는\n방법에는"
20052-180 = "의외로 관심이\n적단 말이죠……"
20052-190 = "책…… 텍스트가\n소중한 이유는"
20052-200 = "그것이 가장 적은\n인풋으로, 최대한의\n아웃풋을 이끌어낼"
20052-210 = "'가능성'이 있는\n상품이기 때문입니다!"
20052-220 = "뭔가를 만들어낼 수\n있다는 건\n멋진 일이죠."
20052-230 = "그걸 가능하게 할\n재능이 있는 것도요."
20052-240 = "……"
20052-250 = "좋죠,\n그런 재능."
20052-260 = "진심으로……\n그렇게 생각해요."
20052-270 = "트리니티 학생분들께는\n감사드리고 있습니다."
20052-280 = "에이,\n왜 그렇게 보세요."
20052-290 = "이거 진심이라고요."
20052-620 = "사업의 기본이란 건\n뭘까요, 선생님?\n역시 교류…… 교환……"
20052-630 = "물론 돈이겠죠!"
20052-640 = "잘 오셨습니다!"
20052-650 = "자금과 상품이 오가는,\n사업의 현장에!"
20052-660 = "힛. 힛. 히.\n어디 한번 둘러보시죠!"
20052-670 = "선반 깊숙한 곳에\n보물이 잠들어있는 일도\n있으니까요."
20052-680 = "끝까지 잘~ 봐주세요,\n선생님."
20052-690 = "아, 물론\n저를 자세히\n봐주셔도 좋구요?"
20052-700 = "제게 말을 걸어도,\n가격이 싸질 일은\n없다구요?"
20052-710 = "가격 할인을\n결정하기까지는 엄청난\n사업적 고려와……"
20052-720 = "……정치적 암투까지\n들어가곤 하는 경우가\n많거든요."
20052-730 = "선생님을 상대로 사업을\n하는 날이 오게\n될 줄은 몰랐어요."
20052-740 = "이야~ 정말이지,\n인생 살고 볼\n일이라니까요."
20052-750 = "좋네요, 좋네요!"
20052-760 = "또 필요하신 거\n없으신가요?"
20052-770 = "여기에서만 드리는\n말씀입니다만……"
20052-780 = "저는 결과물을\n제 눈으로 확인할 때\n가장 짜릿합니다!"
20052-790 = "문화는 돈이에요.\n이건 현실입니다."
20052-800 = "그런 의미에서 방금\n구매하신 것도……"
20052-810 = "어떤 의미로는, \n문화라고 할 수\n있을지도요?"
20052-820 = "품질은\n보증한다구요?"

[translation]
20052-10 = "沒有風險\n就沒有報酬。"
20052-20 = "那麼，開始\n處理事業吧。"
20052-30 = "就趁現在，\n讓您見識一下吧。"
20052-40 = "能在不毛之地赤冬\n存活下來的，\n我們出版部的手腕！"
20052-50 = "……與手腕相比，"
20052-60 = "生存能力這個詞，\n或許更加貼切呢。"
20052-70 = "來了呢……\n氣勢來了呢！"
20052-80 = "身為出版部長，\n這可是無論如何\n都要拿下的哦！"
20052-90 = "為什麼會變成這樣……"
20052-100 = "雖然……\n原因我好像也\n知道就是了……"
20052-110 = "還不能放棄唷……！"
20052-120 = "哎呀～剛才一度還不知道\n會變成什麼樣子呢……"
20052-130 = "能順利結束真是太好了～\n……咦，檢討會是嗎？"
20052-140 = "呃……那個改天再來……\n是不行的嗎……？"
20052-150 = "身為創作者的各位……"
20052-160 = "明明擁有創造\n事物的能力，"
20052-170 = "卻對將其推廣出去\n這件事──"
20052-180 = "不感興趣的例子，\n還挺多的呢……"
20052-190 = "書……\n文章是很重要的東西。"
20052-200 = "因為它是能以最低限度\n的投入，引出最大限度\n輸出的──"
20052-210 = "蘊藏著「可能性」\n的商品啊……！"
20052-220 = "從零開始創造某樣事物，\n是件很了不起的事。"
20052-230 = "將其化為可能的\n才能也是如此。"
20052-240 = "……"
20052-250 = "真不錯呢，那種才能。"
20052-260 = "我打從心底……\n這麼認為哦。"
20052-270 = "對於三一的各位學生們，\n我抱持著由衷的感謝哦？"
20052-280 = "……請別用\n那種眼神看我嘛。"
20052-290 = "我是真～的，\n打從心底這麼想的呀。"
20052-620 = "您覺得事業的基礎是什麼呢？\n物品……？交換……？"
20052-630 = "當然，是錢對吧！"
20052-640 = "您來得正好！"
20052-650 = "歡迎來到資金與商品\n流通的事業現場！"
20052-660 = "呣呵呵，那麼，\n還請慢慢挑選。"
20052-670 = "有時架子的深處\n也會沉睡著寶物。"
20052-680 = "還請務必仔～細\n看到最後唷，老師。"
20052-690 = "啊啊，當然要\n仔細看我也沒關係哦？"
20052-700 = "就算找我搭話，\n也絕對不會變便宜的哦？"
20052-710 = "在一項折扣決定之前，\n背後可是有數不清的交涉和……"
20052-720 = "……政治性的交易在進行呢。"
20052-730 = "我還真沒想像過呢，\n居然有一天會和老師您做生意。"
20052-740 = "哎呀～活久了\n什麼都能見到呢～"
20052-750 = "哦哦！\n眼光真不錯呢，老師！"
20052-760 = "那麼這件商品，\n可以的話要不要也考慮一下呀？"
20052-770 = "偷偷跟您說……"
20052-780 = "我在親眼確認成果物的瞬間……\n是最興奮的唷……！"
20052-790 = "知道嗎？老師。\n文化就是金錢。"
20052-800 = "也就是說，\n購買這個行為──"
20052-810 = "也能稱的上是一種文化活動。"
20052-820 = "品質我可以保證哦？"

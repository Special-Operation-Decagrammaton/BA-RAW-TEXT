[translation]
20052-10 = "ถ้าไม่ลองเสี่ยงดู\nก็คงไม่รู้ผลหรอกค่ะ"
20052-20 = "ไหนดูซิ... มาเริ่มทำธุรกิจ\nกันเลยดีมั้ยคะ...?"
20052-30 = "ถึงเวลาที่ฉันจะแสดง\nให้คุณครูได้เห็นแล้วค่ะ"
20052-40 = "ฝีมือของชมรมสื่อสิ่งพิมพ์\nผู้อยู่รอดในเรดวินเทอร์!"
20052-50 = "อันที่จริง..."
20052-60 = "ฉันคิดว่ามันใกล้เคียง\nกับสัญชาตญาณ\nการเอาตัวรอดมากกว่า"
20052-70 = "มาแล้วค่ะ… จังหวะนี้แหละ!"
20052-80 = "ถ้าปล่อยให้หลุดมือไป\nอย่าเรียกตัวเองว่า\nชมรมสื่อสิ่งพิมพ์เลยค่ะ!"
20052-90 = "ทำไม…\nถึงเป็นแบบนี้ได้นะคะ..."
20052-100 = "ไม่หรอกค่ะ... ที่จริงแล้ว\nก็พอจะเดาสาเหตุ\nได้อยู่แล้วละค่ะ..."
20052-110 = "แต่ยังไงตอนนี้\nก็คงจะยอมแพ้\nไม่ได้หรอกค่ะ..."
20052-120 = "เฮ้อ~ ตอนนั้นก็เป็นห่วงแทบแย่\nว่าจะเป็นยังไงต่อไปน่ะค่ะ"
20052-130 = "คะ? ถึงจะโชคช่วย\nแต่ก็ควรสำนึกผิดบ้าง\nงั้นเหรอคะ?"
20052-140 = "คือ... เอาไว้\nค่อยทำคราวหน้า\nไม่ได้เหรอคะ...?"
20052-150 = "พวกผู้คนที่ใช้\nความคิดสร้างสรรค์น่ะค่ะ"
20052-160 = "พวกเขาสร้างสรรค์\nอะไรดีๆ ออกมาก็จริง"
20052-170 = "แต่วิธีที่จะเผยแพร่\nผลงานพวกนั้นออกไป"
20052-180 = "กลับน้อยมาก\nจนน่าใจหายเลยค่ะ..."
20052-190 = "เหตุผลที่หนังสือ...\nตัวอักษรเป็นสิ่งสำคัญ"
20052-200 = "เพราะมันเป็นสินค้าที่\nลงแรงลงทุนน้อย\nแต่กลับมี 'ความเป็นไปได้'"
20052-210 = "ที่จะทำให้เกิดผลลัพธ์\nที่ยิ่งใหญ่ยังไงล่ะคะ!"
20052-220 = "การที่จะทำบางอย่างออกมาได้\nเป็นสิ่งที่วิเศษไปเลยนะคะ"
20052-230 = "และการมีพรสวรรค์ที่จะทำให้\nสิ่งนั้นเป็นไปได้ก็เช่นกันค่ะ"
20052-240 = "......"
20052-250 = "ดีจังเลยนะคะ\nพรสวรรค์แบบนั้นน่ะ"
20052-260 = "ฉันคิดแบบนั้น...\nจากใจจริงค่ะ"
20052-270 = "ฉันรู้สึกขอบคุณ\nเหล่านักเรียนของทรีนิตี้\nมากเลยค่ะ"
20052-280 = "อะไรกันคะ\nทำไมมองแบบนั้นล่ะคะ"
20052-290 = "นั่นพูดออกมาจากใจเลยนะคะ"
20052-620 = "พื้นฐานของธุรกิจคืออะไรกันแน่คะ คุณครู?\nจะเป็นเรื่องแลกเปลี่ยน... พบปะ... หรือเปล่านะ"
20052-630 = "คงเป็นเรื่องเงินอยู่แล้วสินะคะ!"
20052-640 = "ยินดีต้อนรับค่ะ!"
20052-650 = "ขอต้อนรับเข้าสู่ สมรภูมิธุรกิจที่มีทั้งเงิน\nและสินค้าหมุนเวียนแห่งนี้ค่ะ!"
20052-660 = "ฮิ ฮิ ฮิ\nเชิญเลือกดูได้เลยค่ะ!"
20052-670 = "ที่ที่ลึกที่สุดของชั้นวาง บางครั้งก็\nมีขุมทรัพย์หลับใหลอยู่ยังไงล่ะคะ"
20052-680 = "เลือกดูให้ครบทุกซอกทุกมุม\nเลยนะคะ คุณครู"
20052-690 = "อ๊ะ หรือว่าจะจ้องมองฉัน\nให้เต็มที่ก็ยินดีนะคะ"
20052-700 = "ถึงจะพยายามชวนคุย\nแต่ฉันไม่ลดราคาให้หรอกนะคะ"
20052-710 = "กว่าจะตัดสินใจลดราคาได้แต่ละครั้ง\nก็ต้องคิดให้ดี เพราะเรื่องพวกนี้"
20052-720 = "บ่อยครั้งก็มีเรื่องธุรกิจ การเมือง อำนาจมืด\nเข้ามาเอี่ยวด้วยไม่น้อยเลยละค่ะ"
20052-730 = "นึกไม่ถึงเลยค่ะว่า จะมีวันที่ฉัน\nต้องมาทำธุรกิจกับคุณครูแบบนี้"
20052-740 = "อ่า~ จริงๆ เลยนะคะ ชีวิตคนเรา\nมีอะไรให้ประหลาดใจได้ตลอดเลย"
20052-750 = "ดีจังเลยค่ะ ดีจริงๆ เลย!"
20052-760 = "ยังมีอย่างอื่นที่คุณครูต้องการ\nเพิ่มเติมอีกรึเปล่าคะ?"
20052-770 = "เรื่องนี้ฉันบอกคุณครู\nที่นี่เท่านั้นนะคะ..."
20052-780 = "สำหรับฉันตอนที่ได้เห็น\nผลลัพธ์ด้วยตาของตัวเอง\nคือช่วงเวลาที่ตื่นเต้นที่สุดเลยค่ะ"
20052-790 = "วัฒนธรรมก็คือเงินค่ะ\nนี่คือโลกแห่งความเป็นจริงค่ะ"
20052-800 = "เพราะงั้นของที่คุณครู\nเพิ่งซื้อไปเมื่อกี้..."
20052-810 = "ในอีกแง่หนึ่ง มันก็อาจจะ\nเรียกได้ว่า 'วัฒนธรรม' อย่างหนึ่ง\nก็ได้นะคะ"
20052-820 = "เรื่องคุณภาพเอง\nก็ไว้ใจได้เลยค่ะ"

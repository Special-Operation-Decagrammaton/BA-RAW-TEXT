[translation]
10088-120 = "待ってたよ、先生。\n何をすればいい？"
10088-130 = "…あ、ちょうど\n探してたんだ、先生。"
10088-140 = "意外と忙しいね。\n早く取り掛かろうか。"
10088-150 = "時間ギリギリだね。\nでも大丈夫、手伝うよ。"
10088-160 = "後片付けを始めるよ。"
10088-170 = "…うん？呼んだ？"
10088-180 = "先生…からかってる\n場合じゃないから。"
10088-190 = "はあ…遊ぶのは仕事が\n終わってからにして。"
10088-200 = "からかう事自体は\n別にいいんだけど…"
10088-210 = "今はやめてほしいかな。"
10088-220 = "補給が必要なんでしょ？\nここにあるよ。"
10088-230 = "必要な物があるならいって。\n取ってくる。"
10088-240 = "仕事は終わったけど……\n忘れものは無い？"
10088-250 = "ちゃんと教えてくれたら\n探してくるよ。"
10088-260 = "先生……それ、\nちょっとくすぐったい。"
10088-270 = "それが必要だったんだね。"
10088-280 = "ここにあったんだ。\n役に立つよ、きっと。"
10088-290 = "ちょうどいいものがあって\n良かった。"
10088-300 = "いい選択だね。"
10088-410 = "進行してるタスクを整理したよ。\n一緒に見よう、先生。"
10088-420 = "進捗状況を確認しに来たの？"
10088-430 = "先生……ちょっと……。"
10088-440 = "……先生と一緒に\n働くのって、いいね。"
10088-450 = "うん、解決。"
10088-460 = "悪くないね。"

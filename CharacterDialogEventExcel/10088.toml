[translation]
10088-120 = "我正在等你哦，老師。\n該怎麼做呢？"
10088-130 = "……啊，我正好\n在找你，老師。"
10088-140 = "意外的忙碌呢。\n加緊腳步吧。"
10088-150 = "時間很緊迫呢。\n但是別擔心，我會幫忙。"
10088-160 = "開始事後清理吧。"
10088-170 = "……嗯？你叫我嗎？"
10088-180 = "老師……現在不是\n開玩笑的時候。"
10088-190 = "唉……玩耍等\n工作結束再做吧。"
10088-200 = "捉弄我這件事本身\n倒是沒關係……"
10088-210 = "不過希望現在\n先別這麼做。"
10088-220 = "需要補給對吧？\n在這裡哦。"
10088-230 = "需要什麼就說一聲吧。\n我會拿過來。"
10088-240 = "雖然工作已經結束……\n沒有忘了什麼吧？"
10088-250 = "完整告訴我的話，\n我會去找找。"
10088-260 = "老師……\n那個，有點癢。"
10088-270 = "看來需要那個啊。"
10088-280 = "原來在這裡啊。\n會派上用場的，一定會。"
10088-290 = "幸好我碰巧有個好東西。"
10088-300 = "是個好選擇。"
10088-410 = "我整理了進行中的作業哦。\n一起來看吧，老師。"
10088-420 = "是來確認進行狀況的嗎？"
10088-430 = "老師……這樣有點……"
10088-440 = "……和老師一起\n工作，真不錯呢。"
10088-450 = "嗯，解決了。"
10088-460 = "挺不錯的呢。"

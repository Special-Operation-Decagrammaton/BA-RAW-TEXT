[translation]
10088-120 = "กำลังรออยู่เลย\nครู ให้ฉันทำอะไรดี?"
10088-130 = "อ่า... ฉันกำลัง\nตามหาอยู่พอดีเลย ครู"
10088-140 = "งานยุ่งกว่าที่คิดเลยนะ\nมารีบทำกันเถอะ ครู"
10088-150 = "เวลาแทบจะไม่พอแล้วนะ\nแต่ไม่ต้องกังวลหรอก ฉันจะช่วยเอง"
10088-160 = "จะเริ่มจัดการให้เรียบร้อยละนะ"
10088-170 = "หืม...? เรียกฉันเหรอ?"
10088-180 = "ครู... นี่ไม่ใช่เวลา\nมาแกล้งกันเล่นนะ"
10088-190 = "เฮ้อ... ถ้าจะเล่นน่ะ\nก็รอให้งานเสร็จก่อน"
10088-200 = "แต่ถ้าจะแกล้งกัน\nฉันก็ไม่ว่าอะไรหรอก..."
10088-210 = "ตอนนี้ฉันอยากให้หยุดได้แล้วละ"
10088-220 = "ต้องการเสบียงใช่มั้ย?\nนี่ไง"
10088-230 = "ถ้าอยากได้อะไรก็บอกนะ\nแล้วฉันจะเอามาให้"
10088-240 = "งานเสร็จแล้ว..."
10088-250 = "ว่าแต่ ลืมอะไรรึเปล่า?"
10088-260 = "ครู ทำแบบนั้น..."
10088-270 = "มันจั๊กจี้นิดหน่อยนะ"
10088-280 = "อยู่ตรงนี้นี่เอง\nฉันว่ามันจะช่วยได้แน่นอนเลย"
10088-290 = "โล่งอกไปทีนะที่มีอะไรดีๆ พอดี"
10088-300 = "เลือกได้ดีเลยละ"
10088-410 = "ฉันจัดการงานที่ทำอยู่ตอนนี้\nเรียบร้อยแล้ว มาดูด้วยกันสิครู"
10088-420 = "มาดูความคืบหน้าเหรอ?"
10088-430 = "ไม่รู้จักยอมแพ้เลยนะ ครูน่ะ"
10088-440 = "ได้ทำงานกับคุณครูนี่ดีจังเลย..."
10088-450 = "อืม คลี่คลายได้แล้ว"
10088-460 = "ไม่เลวเลยนะ"

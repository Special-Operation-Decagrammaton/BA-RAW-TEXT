[translation]
10088-120 = "I've been waiting for you, Sensei. What should I do?"
10088-130 = "...Ah, I was just looking for you, Sensei."
10088-140 = "It's surprisingly busy, isn't it? Shall we get to work?"
10088-150 = "Time is short. But don't worry, I'll help."
10088-160 = "I'll start cleaning up."
10088-170 = "...Huh? Did you call me?"
10088-180 = "Sensei... Now's not a time to goof off."
10088-190 = "*sigh* Playtime can wait until after work."
10088-200 = "I'm not bothered by your ribbing, but..."
10088-210 = "I'd appreciate it if you knocked it off."
10088-220 = "Do you need supplies? They're here."
10088-230 = "If there's anything else you want, just let me know. I'll grab it."
10088-240 = "Work's over, but...did you forget something?"
10088-250 = "If you did, just let me know. I'll find it."
10088-260 = "Hey, that tickles."
10088-270 = "That's what you needed."
10088-280 = "So that's where it was. It'll definitely be helpful."
10088-290 = "I'm glad we got this just in time."
10088-300 = "Good choice."
10088-410 = "I've organized our in-progress tasks. Let's review them together, Sensei."
10088-420 = "Here to check on our progress?"
10088-430 = "Sensei, please!"
10088-440 = "...It feels nice working with you, Sensei."
10088-450 = "Yeah. It all worked out."
10088-460 = "Not bad at all."

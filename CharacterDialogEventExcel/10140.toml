[translation]
10140-120 = "<로어 추적 작전>\n드디어 시작인가……"
10140-130 = "SRT의 이름에\n부끄럽지 않도록,\n전력을 다해주겠어!"
10140-140 = "더 이상의 피해자가\n늘어나기 전에……"
10140-150 = "서두르자, 선생님."
10140-160 = "작전 중에 먹는\n유부초밥……\n이게 또\n별미란 말이지……"
10140-170 = "무, 물론 이것 때문에\n작전을 기대하는 건\n아니지만!"
10140-180 = "귀신이든 사람이든……\n제멋대로 구는 건\n용서할 수 없어."
10140-190 = "잠깐!\n갑자기 남의 배는\n왜 찔러 보는 거야?!"
10140-400 = "어쩌지……"
10140-410 = "아, 선생님.\n마침 잘 왔어."
10140-420 = "수집한 단서를\n정리하는 중이었는데,\n좀 도와줄래?"
10140-430 = "왔구나, 선생님.\n바로 추리를\n시작하자고!"
10140-440 = "이 단서로\n추론할 수 있는\n진실은……"
10140-450 = "앗, 만지지 마!\n보기 쉽게\n정리해두었는데!"
10140-460 = "이 자료, 어디에서\n본 기억이 있는데……"
10140-470 = "대단해!\n완벽한 추리였어!"
10140-480 = "좋아!\n이것으로 증명 완료!"

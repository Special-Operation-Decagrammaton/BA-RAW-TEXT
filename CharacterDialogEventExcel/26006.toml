[translation]
26006-290 = "Oh, Sensei? Did you bring something to eat?"
26006-300 = "Thank you so much for the supplies!"
26006-310 = "We'll find some way to repay you!"
26006-320 = "The festival is already halfway over."
26006-330 = "Well, we don't have anything to do with it anyways..."
26006-340 = "Looks like Ivan Kupala will be over soon too."
26006-350 = "If you find anything else that might be delicious or useful..."
26006-360 = "Please bring it to us!"
26006-370 = "It's the last day of the festival, Sensei. Anything you're forgetting?"
26006-380 = "The festival is over, but we still need all the supplies we can get!"
26006-390 = "Spec Ops No. 227 is always low on sweets..."
26006-400 = "When do you think we can return to the main institute...?"
26006-410 = "Wow! That looks so tasty!"
26006-420 = "Can we really eat it?"

[translation]
26006-290 = "어라, 선생님?\n뭔가 먹을 것을\n가지고 오셨나요?"
26006-300 = "수고하셨습니다!\n가져다주신 지원 물자만큼"
26006-310 = "저희도 뭔가\n보답을 드릴게요!"
26006-320 = "축제도 벌써\n절반이나 지났네요."
26006-330 = "……뭐, 애초에\n저희와는 상관없는\n일이지만요."
26006-340 = "이반 쿠팔라도\n이제 얼마 남지 않았네요."
26006-350 = "뭔가 맛있어 보이는 음식이나,\n이곳에서의 생활에 도움이\n될 만한 물건이 있다면"
26006-360 = "꼭 가져다주세요!"
26006-370 = "오늘이 축제의 마지막 날이네요.\n…선생님,\n뭔가 잊으신 건 없으신가요?"
26006-380 = "축제는 끝났지만, 혹시 아직도\n갖고 계신 물건이 있다면\n저에게 꼭 가져다주세요!"
26006-390 = "227호 특별반은 언제나\n단 음식이 부족하단 말이죠……"
26006-400 = "언제쯤에야\n본교사로 돌아갈 수 있을지…."
26006-410 = "우와아……\n맛있어 보여……"
26006-420 = "네? 이거, 정말로\n받아도 괜찮나요?"

[translation]
26006-290 = "哦，老師？\n你是不是帶了\n一些吃的東西？"
26006-300 = "辛苦了！\n老師帶來的支援物資，"
26006-310 = "我們也會\n準備些東西來報答的！"
26006-320 = "慶典已經\n過了一半了呢。"
26006-330 = "…那個，\n雖然一開始\n就是和我們不相干的事情。"
26006-340 = "伊凡·庫帕拉\n也快要結束了呢。"
26006-350 = "如果有看到\n覺得好吃的食物，\n或是對這裡的生活有幫助的東西，"
26006-360 = "請務必帶來給我們！"
26006-370 = "今天是慶典的最後一天呢。\n…老師，\n沒有遺漏掉什麼吧？"
26006-380 = "雖然慶典結束了，\n但若是老師還有一些物品的話，\n請一定要帶給我！"
26006-390 = "227號特別班\n無時無刻都缺乏甜食啊…"
26006-400 = "什麼時候才能\n回到主校舍…。"
26006-410 = "哇啊啊…\n看起來好好吃…"
26006-420 = "什麼？這個東西\n我們真的可以收下嗎？"

[translation]
20012-170 = "辛苦了，老師。"
20012-180 = "有什麼需要的話\n請隨時跟我說。"
20012-190 = "……真是吵雜的現場呢。\n或許先做好準備比較好。"
20012-200 = "我想或許需要進行事後處理\n所以留在了這裡。"
20012-210 = "有什麼需要的話\n請隨時跟我說。"
20012-220 = "……保險起見，跟您說一聲。\n我並不是商品。"
20012-230 = "很抱歉，因為這是規定，\n所以沒辦法免費給您。"
20012-240 = "是個不錯的判斷。"
20012-250 = "那個似乎不錯呢。"
20012-260 = "我立刻準備。"
20012-270 = "好的，那麼\n請稍待片刻。"
20012-280 = "您辛苦了，老師。\n這是工作的清單，\n麻煩您了。"
20012-290 = "這是工作的進行狀況。\n請您進行確認。"
20012-300 = "……老師？\n請專注在工作上。"
20012-310 = "……很抱歉，但我\n沒辦法代替老師工作。"
20012-320 = "好的，已確認完畢。"
20012-330 = "似乎已經順利處理完畢了呢。"

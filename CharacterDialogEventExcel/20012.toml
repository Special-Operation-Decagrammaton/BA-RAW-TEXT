[translation]
20012-170 = "ขอบคุณมากค่ะคุณครู"
20012-180 = "หากมีของที่จำเป็น\nก็บอกได้เลยนะคะ"
20012-190 = "...งานเทศกาลวุ่นวายจังเลยนะคะ\nฉันคิดว่าเราควรเตรียมตัว\nให้พร้อมไว้ดีกว่าค่ะ"
20012-200 = "ฉันอยู่ที่นี่ เพราะต้องรายงาน\nการติดตามผลอยู่ค่ะ"
20012-210 = "หากมีของที่จำเป็น\nก็บอกได้เลยนะคะ"
20012-220 = "...ขออภัยที่ต้องพูดแบบนี้ค่ะ\nแต่ว่าฉันไม่ใช่สินค้าหรอกนะคะ"
20012-230 = "เนื่องจากมันมีกฎระบุไว้อยู่\nฉันคงให้ฟรีๆ ไม่ได้หรอกค่ะ"
20012-240 = "ตัดสินใจได้ไม่เลวเลยนะคะ"
20012-250 = "ฉันเห็นด้วยกับการตัดสินใจค่ะ"
20012-260 = "ฉันจะเตรียมไว้ให้พร้อมค่ะ"
20012-270 = "ค่ะ ช่วยรอสักครู่นะคะ"
20012-280 = "ยินดีที่ได้พบค่ะ คุณครู\nนี่เป็นรายการภารกิจครั้งนี้ค่ะ\nขอรบกวนด้วยนะคะ"
20012-290 = "นี่เป็นรายงานสถานการณ์ทำภารกิจ\nขณะนี้ค่ะ รบกวนตรวจสอบด้วยค่ะ"
20012-300 = "...คุณครู?\nช่วยตั้งใจทำภารกิจด้วยค่ะ"
20012-310 = "...ขอโทษค่ะ ฉันทำภารกิจ\nแทนคุณครูไม่ได้หรอกนะคะ"
20012-320 = "ค่ะ ตรวจสอบเรียบร้อยค่ะ"
20012-330 = "จัดการได้เรียบร้อยดีนะคะ"

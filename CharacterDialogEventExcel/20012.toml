[translation]
20012-170 = "수고하십니다. 선생님."
20012-180 = "무언가 하실 말씀이 있으시다면\n언제든 이야기해 주십시오."
20012-190 = "……어수선한 현장이군요.\n준비를 해 두는 편이\n좋을지도 모르겠습니다."
20012-200 = "후속조치가 필요할 것 같아\n남아있었습니다."
20012-210 = "필요하신 게 있으시면\n말씀해주십시오."
20012-220 = "……혹시나 해서\n드리는 말씀, 입니다만.\n저는 상품이 아니라서요."
20012-230 = "죄송하지만 규정이 있는지라,\n그냥 드릴 순 없습니다."
20012-240 = "나쁘지 않은 판단입니다."
20012-250 = "그게 좋을 것 같군요."
20012-260 = "바로 준비하겠습니다."
20012-270 = "네. 잠시만 기다려주십시오."
20012-280 = "반갑습니다. 선생님.\n이번 업무의 리스트입니다.\n잘 부탁드립니다."
20012-290 = "현재까지의 업무 진행 상황입니다.\n확인 부탁드립니다."
20012-300 = "……선생님?\n업무에 집중해 주십시오."
20012-310 = "……죄송합니다만, 제가\n일을 대신 해드릴 순 없습니다."
20012-320 = "네. 확인하였습니다."
20012-330 = "잘 처리되었습니다."

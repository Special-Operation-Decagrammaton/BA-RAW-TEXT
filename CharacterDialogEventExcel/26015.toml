[translation]
26015-840 = "아아~\n벌써 안 좋은 예감이\n들지 말임다~"
26015-850 = "뭐, 그래도\n선생님께서 계시니,"
26015-860 = "여차하면\n해결되겠지만요~"
26015-870 = "바다…… 바다라,\n이런 식으로 오게 될 줄은\n몰랐는데요."
26015-880 = "인생 어떻게 되는지\n모르는 법이네요~"
26015-890 = "미카 님……"
26015-900 = "뭔가 생각했던 거랑,\n좀 많이 다른 분이시네요."
26015-910 = "아, 좋은 의미로\n말입니다!"
26015-920 = "바다에 온 소감 말입니까?"
26015-930 = "음…… 뭐라고 할까."
26015-940 = "요 며칠을 생각하면,\n좀 싫어진 거 같슴다.\n하하!"
26015-950 = "벌써 돌아갈 때네요."
26015-960 = "어쩐지 시원섭섭……"
26015-970 = "……하지는 않고요."
26015-980 = "드디어 집에 간다!\n일 끝났다! 라는\n느낌임다, 하하!"
26015-990 = "파도치는 소리,\n갈매기 울음소리,\n소금 냄새…"
26015-1000 = "바다에 왔다는\n실감이 들긴 하네요."
26015-1010 = "이야~ 다들 되게\n신나 있네요~"
26015-1020 = "저도 저렇게\n즐길 수 있으면\n좋겠는데 말이죠."
26015-1030 = "아, 선생님.\n여기는 별일 없슴다~"
26015-1040 = "바다라고 해도,\n별일 없는 게\n최고지 말임다."
26015-1050 = "저, 선생님?\n저하고 있어도, 별로\n즐겁지는 않을 검다?"
26015-1060 = "함께 있는 게,\n저는…… 싫지 않지만."
26015-1330 = "아, 선생님!\n도와주러 오셨습니까?"
26015-1340 = "이야~ 혼자서 어떻게 하나 했는데,\n진짜 감사합니다."
26015-1350 = "하하, 난장판이네요~"
26015-1360 = "아, 선생님. 안녕하심까."
26015-1370 = "바로 부탁드려서 죄송하지만,\n좀 도와주실 수 있을까요……?"
26015-1380 = "사람 하나 살린다 생각하고요!"
26015-1390 = "하하……\n일이 산더미네요……."
26015-1400 = "뭐, 그래도 하나씩 하다 보면\n의외로 금방 해결되지 않을까요?"
26015-1410 = "……그 마음,\n자~알 알고 있습니다."
26015-1420 = "일이 너무 쌓여 있으면,\n그냥 외면하게 되죠……."
26015-1430 = "이걸로 한 건 해결이네요~\n수고하셨지 말임다~"
26015-1440 = "오오~\n되게 요령 좋으시네요?"
26015-1450 = "아…… 비꼬는 게 아니라,\n진심으로 감탄해서 하는 말임다."

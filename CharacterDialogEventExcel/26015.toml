[translation]
26015-840 = "อ่า~ รู้สึกสังหรณ์ใจ\nไม่ค่อยดีเลยค่ะ~"
26015-850 = "แต่ก็เอาเถอะ\nในเมื่อคุณครูอยู่ด้วย"
26015-860 = "งั้นก็คงคลี่คลาย\nไปได้ด้วยดีละนะคะ~"
26015-870 = "ทะเล... ทะเล\nไม่คิดเลยนะคะว่า\nจะได้มาด้วยเหตุผลนี้"
26015-880 = "เราไม่รู้เลยนะคะ\nว่าชีวิตจะเป็นยังไงบ้าง~"
26015-890 = "คุณมิกะ..."
26015-900 = "เป็นคนที่แตกต่างจาก\nที่ฉันคิดไว้เยอะเลยค่ะ"
26015-910 = "อ้อ ฉันหมายถึง\nในทางที่ดีนะคะ!"
26015-920 = "รู้สึกยังไงที่ได้มาทะเลน่ะเหรอคะ?"
26015-930 = "อืม... จะว่ายังไงดีนะ"
26015-940 = "ถ้าคิดถึงไม่กี่วันที่ผ่านมานี้\nฉันว่าฉันน่าจะไม่ชอบทะเลค่ะ\nฮ่าฮ่า!"
26015-950 = "ถึงเวลากลับแล้วสินะคะ"
26015-960 = "โล่งใจแต่ก็เสียดาย..."
26015-970 = "ซะที่ไหนล่ะคะ..."
26015-980 = "ในที่สุดก็ได้กลับบ้านแล้ว!\nงานเสร็จแล้ว!\nฉันรู้สึกแบบนี้ต่างหากค่ะ ฮ่าฮ่า!"
26015-990 = "เสียงคลื่นซัดสาด\nเสียงนกนางนวลร้อง\nกลิ่นเค็มของเกลือ..."
26015-1000 = "รู้สึกเหมือนมาถึงทะเล\nจริงๆ แล้วนะคะ"
26015-1010 = "ว้าว~ ทุกคนดู\nตื่นเต้นจังเลยนะคะ"
26015-1020 = "ฉันก็อยากสนุกได้แบบนั้น\nบ้างจังเลยค่ะ"
26015-1030 = "อ๊ะ คุณครู\nที่นี่ไม่มีปัญหาอะไรหรอกค่ะ~"
26015-1040 = "ถึงจะเป็นทะเล\nแต่การไม่มีปัญหาอะไร\nมันก็ดีที่สุดค่ะ"
26015-1050 = "เอ่อ คุณครูคะ?\nอยู่กับฉัน แต่ว่า\nดูไม่สนุกเท่าไรเลยนะคะ?"
26015-1060 = "ฉันก็... ไม่ได้ไม่ชอบ\nการที่ได้อยู่ด้วยกันหรอกนะคะ"
26015-1330 = "อ๊ะ คุณครู!\nมาช่วยฉันเหรอคะ?"
26015-1340 = "ว้าว~ ฉันกำลังคิดเลยว่าคนเดียว\nจะไหวมั้ย ขอบคุณมากนะคะ"
26015-1350 = "ฮ่าฮ่า วุ่นวายจังเลยนะคะ~"
26015-1360 = "อ๊ะ คุณครู สวัสดีค่ะ"
26015-1370 = "ขอโทษที่จู่ๆ ก็รบกวนนะคะ\nพอจะช่วยฉันหน่อยได้มั้ยคะ...?"
26015-1380 = "คิดเสียว่าช่วยชีวิตคนหนึ่งคนนะคะ!"
26015-1390 = "แหะๆ...\nงานกองเท่าภูเขาเลยนะคะ..."
26015-1400 = "ก็นะ... ถ้าทำไปทีละอย่างๆ\nเดี๋ยวก็คงทำเสร็จใช่มั้ยล่ะคะ?"
26015-1410 = "ฉันเข้าใจ...\nความรู้สึกนั้นดี~ เลยค่ะ"
26015-1420 = "ถ้ามีงานค้างเยอะมาก\nคนเราก็ย่อมลืมกันได้ค่ะ..."
26015-1430 = "จัดการได้อีกเรื่องแล้วนะคะ~\nขอบคุณที่ทำงานหนักค่ะ~"
26015-1440 = "โอ้ว~\nมีเคล็ดลับอะไรดีๆ สินะคะ"
26015-1450 = "อ่า... ฉันไม่ได้ประชดนะคะ\nฉันพูดเพราะชื่นชมจากใจจริงค่ะ"

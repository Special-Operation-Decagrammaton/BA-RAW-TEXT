[translation]
26015-840 = "Ah. I'm already getting a bad feeling."
26015-850 = "But since you're here..."
26015-860 = "...I'm sure things will work out, one way or another."
26015-870 = "The beach... I didn't expect I'd come to the beach like this."
26015-880 = "That's just how life is sometimes!"
26015-890 = "Mika..."
26015-900 = "She's not what I expected."
26015-910 = "Ah! I mean that in a good way."
26015-920 = "How do I feel about the beach?"
26015-930 = "Hmm... How should I put this?"
26015-940 = "If I think about the past few days, I don't think I've had the best impression. Haha!"
26015-950 = "It's already time to go back."
26015-960 = "That bittersweet feeling..."
26015-970 = "...I don't have it at all."
26015-980 = "I'm finally going home! Work's over! That's what I'm feeling! Haha!"
26015-990 = "The sound of waves crashing and seagulls crying, and the smell of salt..."
26015-1000 = "This really is the beach."
26015-1010 = "Oh my, everyone's very excited."
26015-1020 = "I wish I could feel the same way."
26015-1030 = "Ah, Sensei. There's not much going on right now."
26015-1040 = "Even at the beach, I'd be happiest if things were uneventful."
26015-1050 = "Um, Sensei? You know staying with me won't be that fun, right?"
26015-1060 = "Although I don't hate...being together."
26015-1330 = "Ah, Sensei! Did you come to help?"
26015-1340 = "Oh my, I was a little worried that I wouldn't be able to get it done alone. Thank you!"
26015-1350 = "Haha, what a mess."
26015-1360 = "Ah, Sensei. Hey there."
26015-1370 = "Sorry to pounce on you, but could you lend me a hand?"
26015-1380 = "You'd literally be saving my life!"
26015-1390 = "Haha... There's so much to do..."
26015-1400 = "Maybe we just have to tackle things one by one, and it'll go faster than we think!"
26015-1410 = "...I know that feeling reaaally well."
26015-1420 = "Once too much work piles up, you kinda just want to ignore it."
26015-1430 = "That's one problem solved! Good work!"
26015-1440 = "Ooh, you're quite skilled, aren't you?"
26015-1450 = "Ah... I wasn't being sarcastic! I was genuinely impressed."

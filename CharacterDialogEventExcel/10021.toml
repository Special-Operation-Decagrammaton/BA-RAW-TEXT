[translation]
10021-10 = "ทะเล… ฤดูร้อน..."
10021-20 = "หืม? อะไรน่ะ?\nมองอะไรน่ะ…"
10021-30 = "เชิญเลยคุณครู\nมีเรื่องที่ต้องทำเพียบเลยละ"
10021-40 = "ชุดว่ายน้ำชุดนี้...\nน่ารักจังเลย... ฮุฮุ..."
10021-50 = "คะ...คุณครู...?\nมายืนดูอยู่ตั้งแต่เมื่อไร...?"
10021-60 = "ยะ...หยุดมองได้แล้ว...\nแบบนี้ ฉันไม่ชินเท่าไรเลย..."
10021-70 = "ปะ...เปล่าหรอก ไม่เป็นไร...\nลืมที่ฉันพูดไปเมื่อกี้นี้เถอะ"

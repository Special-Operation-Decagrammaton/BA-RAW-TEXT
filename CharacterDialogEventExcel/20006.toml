[translation]
20006-70 = "ขอต้อนรับสู่โรงเรียน\nมัธยมซานไห่จิงนะ ครู!"
20006-80 = "ฮุฮุฮุ คงไม่ได้ลืมสัญญา\nวันนี้หรอกใช่มั้ย ครู?"
20006-90 = "ผู้ฝึกสอนชุน\nหายไปไหนนะ..."
20006-100 = "ฮุฮุฮุ วันที่ปรุงยาอายุวัฒนะสำเร็จ\nก็คงอีกไม่ไกลแล้ว!"
20006-110 = "แปลกจัง... ไม่ได้ใส่\nวัตถุดิบอื่นลงไปใน\n\"น้ำยาแห่งความอ่อนเยาว์\" แท้ๆ...."
20006-120 = "หรือว่าระหว่างที่ปรุงยาอยู่"
20006-130 = "จะมีขนของเนสึซึเกะ\nหล่นลงไปในนั้นด้วย?!"
20006-140 = "ขอต้อนรับสู่ห้องทดลองเฉพาะกิจ\nของท่านซายะ คุณครู!"
20006-150 = "ถ้ามีวัตถุดิบดีๆ สำหรับการวิจัย\nละก็... แพงแค่ไหนฉันก็จะซื้อ!"
20006-160 = "ห้องทดลองเฉพาะกิจนี้น่ะ\nแค่เปิดชั่วคราวเท่านั้น"
20006-170 = "เพราะงั้นถ้ามีวัตถุดิบวิจัยดีๆ ละก็\nรีบๆ เอามาแลกไปนะ"
20006-180 = "ช่วงนี้ย่านการค้ารอบๆ นี้\nดูน่าสงสัยมากๆ เลย..."
20006-190 = "สงสัยจะต้องรีบปิด\nห้องทดลองเฉพาะกิจนี้แล้วล่ะ"
20006-200 = "ห้องทดลองเฉพาะกิจ\nจะเปิดถึงแค่วันนี้เท่านั้นนะ"
20006-210 = "เพราะงั้นถ้ามีวัตถุดิบที่ต้องการ\nก็รีบๆ เข้าล่ะ"
20006-220 = "ห้องทดลองเฉพาะกิจ\nปิดทำการแล้วละ"
20006-230 = "แต่ถ้ามีวัตถุดิบเหลืออยู่ละก็\nส่งมาให้ท่านซายะดูนะ"
20006-240 = "ของทุกอย่างที่มีอยู่ในโลกนี้\nสามารถสร้างขึ้นได้ด้วยการวิจัย!"
20006-250 = "อืม... หินสีฟ้าที่คุณครูพูดถึง...\nท่านซายะเอง\nก็ไม่รู้จักเหมือนกัน..."
20006-260 = "เลือกได้ดีเลยนี่!"
20006-270 = "ฮุฮุ ขอบคุณนะ\nที่รวบรวมวัตถุดิบดีๆ มาให้"
20006-280 = "โอ้... เลือกได้ยอดเยี่ยมไปเลย!"

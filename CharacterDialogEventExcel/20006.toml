[translation]
20006-70 = "산해경 고급중학교에\n어서 오는 것이다, 선생!"
20006-80 = "후-후-후. 오늘 약속은\n잊지 않았겠지, 선생?"
20006-90 = "슌 교관은\n어디에 간 것이냐……."
20006-100 = "후-후-후. 불로불사의 영약을\n만들 날도 머지 않은 것이다!"
20006-110 = "이상하다……\n'회춘의 비약'에 다른 재료는\n들어가지 않았는데……."
20006-120 = "설마 비약을 끓이는 동안"
20006-130 = "네즈스케의 털이\n섞여 들어간건가?!"
20006-140 = "나님의 출장 연구소에\n어서 오는 것이다, 선생!"
20006-150 = "괜찮은 연단술 재료가 있다면\n나님이 비싸게 매입할게!"
20006-160 = "출장 연구소는 어디까지나\n임시니까."
20006-170 = "그러니 괜찮은 연단술 재료를 구하거든\n미리미리 바꿔가는 것이다."
20006-180 = "요새 주변 상회의 분위기가\n심상치 않은 것이다……."
20006-190 = "이 출장 연구소도\n빨리 문을 닫아야겠어."
20006-200 = "출장 연구소의 영업은\n오늘까지인 것이다."
20006-210 = "그러니 혹시\n필요한 재료가 있다면 서둘러."
20006-220 = "출장 연구소는\n영업 종료인 것이다."
20006-230 = "하지만 혹시라도 남은 재료가\n있다면 나님에게 보여줘."
20006-240 = "세상에 존재하는 모든 물질은\n연단술로 만들어낼 수 있는 것이다!"
20006-250 = "으음…… 선생이 말하는\n그 파란색 돌은 나님도\n잘 모르겠는데……."
20006-260 = "나쁘지 않은 선택이야!"
20006-270 = "후후, 좋은 재료를\n모아와줘서 고마워."
20006-280 = "오오, 탁월한 선택인 것이다!"

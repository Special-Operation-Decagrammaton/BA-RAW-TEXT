[translation]
10056-10 = "คุณครู! คริสต์มาสแล้วค่ะ!"
10056-20 = "ฉันเองก็ตื่นเต้น\nเหมือนกันเลยค่ะ"
10056-30 = "ขอให้มีของขวัญที่ชื่อว่า\nความสุขแก่ทุกคนด้วยเถอะ..."
10056-40 = "คริสต์มาสคราวนี้\nคุณครูมีแพลนอะไรมั้ยคะ?"
10056-50 = "ถ้าเกิดว่า... สะดวกละก็\nมา... กับฉันสองคน"
10056-60 = "ปะ... เปล่าค่ะ\nไม่มีอะไรค่ะ!"
10056-70 = "ค่ะ! ซานต้าเซรินะค่ะ!"
10056-80 = "มีอะไรให้ฉันช่วยมั้ยคะ?"
10056-90 = "ในวันคริสต์มาส ช่วยมาหา\nซานต้าเซรินะด้วยนะคะ"
10056-100 = "คุณครู? มีเรื่องอะไรหรือเปล่าคะ?"
10056-260 = "การบริจาคเพื่อการกุศล\nในวันคริสต์มาสสิ้นสุดแล้วค่ะ"
10056-270 = "รบกวนบริจาคให้\nคนที่ทุกข์ยากด้วยนะคะ!"
10056-280 = "การบริจาคเพื่อการกุศล\nในวันคริสต์มาสสิ้นสุดแล้วค่ะ"
10056-290 = "รบกวนตรวจสอบด้วยนะคะ\nว่ามีอะไรตกหล่นหรือเปล่า"
10056-300 = "คุณครู ขอให้ฉันได้ช่วยเถอะค่ะ"
10056-310 = "ฮานาเอะจัง จะเป็นอะไรไหมนะ..."
10056-320 = "ขอบคุณค่ะ\nส่วนนี่ก็ของขวัญค่ะ"
10056-330 = "เมอร์รีคริสต์มาส!\nขอให้เป็นวันที่ดีนะคะ!"
10056-340 = "เอาของมีค่าแบบนี้...\nมาบริจาคได้เหรอคะ?"

[translation]
10056-10 = "老師！聖誕節到了唷！"
10056-20 = "連我都\n興奮不已呢。"
10056-30 = "希望大家都能收到\n名為「幸福」的禮物……"
10056-40 = "今年的聖誕節，\n您有什麼計畫嗎？"
10056-50 = "那個……\n如果可以的話，\n我們兩人……"
10056-60 = "不，沒有，\n什麼都沒有！"
10056-70 = "沒錯！\n是聖誕老人芹奈唷！"
10056-80 = "有什麼需要幫忙的嗎？"
10056-90 = "聖誕節的時候，\n請呼叫\n聖誕老人芹奈唷！"
10056-100 = "老師？\n怎麼了嗎？"
10056-260 = "聖誕節的慈善募款\n在這裡！"
10056-270 = "請捐款給\n那些有困難的人！"
10056-280 = "聖誕節慈善募款\n結束了。"
10056-290 = "請確認有沒有未完成的事。"
10056-300 = "老師，\n請讓我幫點忙吧。"
10056-310 = "花繪醬，不要緊吧……"
10056-320 = "非常感謝。\n來，這是禮物唷。"
10056-330 = "聖誕快樂！\n祝你有美好的一天！"
10056-340 = "這麼貴重的東西……\n捐出來沒關係嗎？"

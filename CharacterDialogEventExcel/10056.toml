[translation]
10056-10 = "선생님!\n크리스마스가 왔어요!"
10056-20 = "저까지 가슴이\n두근거리네요."
10056-30 = "모두에게 행복이라는\n이름의 선물이 내리길……"
10056-40 = "이번 크리스마스, 뭔가\n예정이라도 있으신가요?"
10056-50 = "혹시…… 괜찮으시다면,\n저와 둘이서……"
10056-60 = "아, 아뇨.\n아무것도 아니에요!"
10056-70 = "네! 산타 세리나예요!"
10056-80 = "도와드릴 일이 있을까요?"
10056-90 = "크리스마스에는, 산타\n세리나를 찾아 주세요!"
10056-100 = "선생님?\n무슨 일이라도 있으세요?"
10056-260 = "크리스마스 자선 모금은\n이쪽입니다!"
10056-270 = "어려운 분들을 위해서\n기부 부탁드려요!"
10056-280 = "크리스마스 자선 모금은\n종료됐습니다."
10056-290 = "빠트린 것은 없는지 확인해 주세요."
10056-300 = "선생님, 뭐든지 돕게 해주세요."
10056-310 = "하나에 쨩, 괜찮을까……"
10056-320 = "감사합니다.\n자, 여기 선물이에요."
10056-330 = "메리 크리스마스!\n멋진 하루 되세요!"
10056-340 = "이렇게 귀중한 것까지……\n기부해 주셔도 괜찮으신가요?"

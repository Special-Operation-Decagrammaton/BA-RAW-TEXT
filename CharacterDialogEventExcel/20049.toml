[translation]
20049-860 = "아, 왔구나.\n아- …… 뭐,\n나름대로 즐기고 있어."
20049-870 = "바다는, 이런 곳이구나……."
20049-880 = "하아……\n조용히 지내고 싶어."
20049-890 = "어떻게든 해 줘.\n선생님."
20049-900 = "뭐야, 이 인파…….\n위험은 없는 것 같지만."
20049-910 = "끝난 건가……\n……그래. 나쁘지 않았어.\n이번만은 인정할게."
20049-920 = "왜 그래, 선생님."
20049-930 = "어차피 선생님이\n뭐라고 해도,\n재미있어 할 생각\n없으니까 말이지."
20049-940 = "(……평소보다,\n신선할지도)"
20049-950 = "뭐, 뭐야?\n왜 찌른 거야?\n나, 인형이 아니라고……!"
20049-960 = "……한가해?\n야외무대라도\n보고 오지 그래?"
20049-970 = "나? 관심 없는데……\n뭐, 선생님이\n가고 싶다면."
20049-980 = "같이 가 줄 테니까."

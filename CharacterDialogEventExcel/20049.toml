[translation]
20049-860 = "啊，你來啦。\n啊……嗯，\n還算有點開心吧。"
20049-870 = "大海，原來是\n這種地方啊……"
20049-880 = "哈啊……\n想安靜地過。"
20049-890 = "想想辦法吧，老師。"
20049-900 = "這個人潮是怎麼回事……\n雖然應該沒有危險。"
20049-910 = "已經結束了啊……\n……嗯，確實還不錯。\n我承認。不過僅限這次哦。"
20049-920 = "怎麼了？"
20049-930 = "不管老師怎麼說，\n我都沒打算享受。"
20049-940 = "（……好像比　平常新鮮一點）"
20049-950 = "怎，怎麼了？\n為什麼要戳我啊？\n我又不是布偶……！"
20049-960 = "……你很閒嗎？\n要不要去看舞台表演？"
20049-970 = "我？我沒興趣……\n不過，如果老師\n要去的話……"
20049-980 = "我就陪你去吧。"

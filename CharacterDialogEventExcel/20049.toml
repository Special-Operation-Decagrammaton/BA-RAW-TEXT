[translation]
20049-860 = "อ่า มาแล้วเหรอ\nอ๊ะ... ก็นะ\nฉันก็สนุกในแบบของฉันอยู่"
20049-870 = "ทะเล... เป็นที่แบบนี้เองสินะ..."
20049-880 = "เฮ้อ...\nอยากอยู่เงียบๆ จัง"
20049-890 = "ทำอะไรสักอย่างหน่อยสิ\nคุณครู"
20049-900 = "อะไรเนี่ย ฝูงชนพวกนี้...\nถึงจะดูไม่มีพิษมีภัยก็เถอะ"
20049-910 = "จบแล้วเหรอ...\nงั้นเหรอ... ก็ไม่ได้แย่เท่าไรนะ\nครั้งนี้ฉันขอยอมรับแล้วกัน"
20049-920 = "เป็นอะไรล่ะ คุณครู"
20049-930 = "ไม่ว่าคุณครู\nจะพูดยังไงก็ตาม\nฉันก็ไม่มีทางคิดว่า\nมันสนุกหรอกนะ"
20049-940 = "(แต่อาจจะสดชื่น...\nกว่าปกตินิดหน่อย)"
20049-950 = "อะ... อะไรเนี่ย?\nจู่ๆ มาจิ้มทำไม?\nฉันไม่ใช่ตุ๊กตานะ...!"
20049-960 = "ว่างเหรอ...?\nถ้างั้นก็ไปดูการแสดง\nที่เวทีกลางแจ้งสิ"
20049-970 = "ฉันเหรอ? ไม่เอาหรอก...\nแต่ก็เอาเถอะ ถ้าคุณครู\nอยากไปก็ได้อยู่หรอก"
20049-980 = "ฉันจะไปด้วยเอง"

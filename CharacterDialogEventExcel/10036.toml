[translation]
10036-100 = "辛苦了，老師！\n恭候多時了……！"
10036-110 = "希望\n平安與您同在……"
10036-120 = "那個……果然這種工作\n不太適合我嗎……？"
10036-130 = "……？老師？\n發生什麼事了嗎？\n有什麼需要的東西嗎？"
10036-140 = "那，那個……？\n發生什麼事了嗎……？"
10036-150 = "老師……？\n我的臉上沾到什麼\n奇怪的東西了嗎……？"
10036-160 = "雖然像這樣和老師說話\n很開心，但是那個……"
10036-170 = "是不是差不多\n該出發了……？"
10036-180 = "那個……果然這種工作\n不太適合我嗎……？"
10036-190 = "那麼，重新打起精神\n一起加油吧！"
10036-200 = "啊，稍微加緊腳步\n似乎會比較好呢……？"
10036-210 = "我，我會努力的！"
10036-220 = "到收尾時間了呢，\n我會全力幫忙的！"
10036-230 = "……？老師？\n發生什麼事了嗎？\n有什麼需要的東西嗎？"
10036-240 = "那，那個……？\n發生什麼事了嗎……？"
10036-250 = "老師……？\n我的臉上沾到什麼\n奇怪的東西了嗎……？"
10036-260 = "雖然像這樣和老師說話\n很開心，但是那個……"
10036-270 = "是不是差不多\n該出發了……？"
10036-280 = "其，其實，我事先把可能\n會需要的東西統整好了！\n再麻煩您確認了……！"
10036-290 = "如果需要整理或管理，\n請務必交給我……！\n這些請您過目！"
10036-300 = "似乎還剩下一點時間，\n要不要去確認一下呢？"
10036-310 = "那，那個，\n我究竟該怎麼做……？"
10036-320 = "不，不是看我，\n請您看這邊……！"
10036-330 = "啊，那個不錯呢！"
10036-340 = "好的，我也覺得\n那個東西很好。"
10036-350 = "不愧是老師！"
10036-360 = "呵呵，真是\n不錯的一次購物呢！"

[translation]
10036-100 = "수고하셨습니다, 선생님!\n기다리고 있었답니다!"
10036-110 = "부디, 평안이\n함께 하시기를……."
10036-120 = "……역시 제가 하면\n좀 어색한가요……?"
10036-130 = "선생님, 무슨 일\n있으세요? 뭔가\n필요한 거라도\n있으신가요?"
10036-140 = "저, 저기……?\n뭔가 하실 말씀\n이라도……?"
10036-150 = "선생님……? 제 얼굴에\n뭐라도 묻어 있나요…?"
10036-160 = "이렇게 선생님과\n이야기하는 것은\n즐겁지만, 저기,"
10036-170 = "슬슬 출발하는 편이……?"
10036-180 = "……역시 제가 하면\n좀 어색한가요……?"
10036-190 = "그럼, 다시 한번\n힘을 내볼까요!"
10036-200 = "아, 조금 서두르는 게\n좋을지도 모르겠네요……."
10036-210 = "여, 열심히 하겠습니다!"
10036-220 = "마무리 정돈 시간이네요.\n열심히 돕겠습니다!"
10036-230 = "선생님, 무슨 일\n있으세요? 뭔가\n필요한 거라도\n있으신가요?"
10036-240 = "저, 저기……?\n뭔가 하실 말씀\n이라도……?"
10036-250 = "선생님……? 제 얼굴에\n뭐라도 묻어 있나요…?"
10036-260 = "이렇게 선생님과\n이야기하는 것은\n즐겁지만, 저기,"
10036-270 = "슬슬 출발하는 편이……?"
10036-280 = "피, 필요하신 것들을 정리해 봤어요!\n편하게 확인해 주세요……."
10036-290 = "정리랑 관리라면, 꼭\n제게 맡겨 주세요……!\n이걸 봐주세요!"
10036-300 = "아직 약간 시간이\n남은 것 같은데요.\n확인해 보시겠어요?"
10036-310 = "저, 저기, 저는\n대체 어떻게 하면……?"
10036-320 = "제, 제가 아니라,\n이쪽을 봐 주시면……!"
10036-330 = "아. 그거 좋죠!"
10036-340 = "네, 저도 그게\n좋다고 생각해요."
10036-350 = "역시 선생님이시군요!"
10036-360 = "후훗, 좋은 쇼핑이었네요!"

[translation]
10036-100 = "ทำได้ดีมากค่ะ คุณครู!\nฉันกำลังรออยู่เลยค่ะ!"
10036-110 = "ขอให้มีความสงบสุข\nตลอดไปนะคะ..."
10036-120 = "ว่าแล้วเชียว ถ้าฉันทำแบบนี้\nคงจะแปลกๆ สินะคะ...?"
10036-130 = "คุณครูต้องการ\nอะไรรึเปล่าคะ\nมีของที่ต้องการรึเปล่าคะ?"
10036-140 = "อะ... เอ่อ...คุณครูมีเรื่องอะไร...\nจะพูดรึเปล่าคะ?"
10036-150 = "คุณครูคะ...? มีอะไรติด\nอยู่ที่หน้าฉันรึเปล่าคะ?"
10036-160 = "ที่จริงฉันเองก็รู้สึก\nสนุกมากที่ได้พุดคุย\nกับคุณครูแบบนี้แต่ว่า..."
10036-170 = "ระ...เราออกเดินทาง\nกันเลยดีมั้ยคะ...?"
10036-180 = "ว่าแล้วเชียว ถ้าฉันทำแบบนี้\nคงจะแปลกๆ สินะคะ...?"
10036-190 = "ถ้างั้นมาออกแรงเพิ่ม\nอีกหน่อยดีมั้ยคะ?!"
10036-200 = "ฉันคิดว่าพวกเรา...\nคงต้องรีบกันหน่อยแล้วค่ะ..."
10036-210 = "ฉะ...ฉันจะพยายามค่ะ!"
10036-220 = "ใกล้หมดเวลาแล้วนะคะ\nฉันจะช่วยคุณครูเองค่ะ!"
10036-230 = "คุณครูต้องการอะไรรึเปล่าคะ\nมีของที่ต้องการรึเปล่าคะ?"
10036-240 = "คะ...คือว่า...?\nคุณครูมีเรื่องอะไร...\nจะพูดรึเปล่าคะ?"
10036-250 = "คุณครูคะ...? มีอะไรติด\nอยู่ที่หน้าฉันรึเปล่าคะ?"
10036-260 = "ที่จริงฉันเองก็รู้สึก\nสนุกมากที่ได้พุดคุย\nกับคุณครูแบบนี้แต่ว่า..."
10036-270 = "ระ...เราออกเดินทาง\nกันเลยดีมั้ยคะ...?"
10036-280 = "ฉะ...ฉันลองจัดของที่จำเป็นไว้แล้วค่ะ!\nคุณครูลองดูได้ตามสบายเลยนะคะ..."
10036-290 = "ถ้าเป็นเรื่องการจัดของ\nเชื่อมือฉันได้เลยค่ะ…! ดูนะคะ!"
10036-300 = "ยังมีเวลาเหลืออยู่นิดหน่อย\nลองเลือกดูก่อนที่จะหมดเวลาดีมั้ยคะ?"
10036-310 = "คะ...คือว่าฉัน...\nคะ...ควรต้องทำยังไงดี...?"
10036-320 = "ยะ...อย่ามองฉันสิคะ\nชะ...ช่วยดูของด้านนี้หน่อยค่ะ…!"
10036-330 = "อ๊ะ ชิ้นนั้นก็ดีนะคะ!"
10036-340 = "ค่ะ ฉันเองก็คิดว่า\nดีเหมือนกันค่ะ"
10036-350 = "สมกับเป็นคุณครูที่สุดเลยค่ะ!"
10036-360 = "ฮิฮิ เลือกของได้ดีมากเลยค่ะ!"

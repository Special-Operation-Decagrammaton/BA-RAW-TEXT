[translation]
10105-10 = "您好，老師。"
10105-20 = "如果可以的話，\n我的舞台表演……\n希望您能來看！"
10105-30 = "準備好了嗎？"
10105-40 = "不久之後，\n演唱會即將開始！"
10105-50 = "演唱會\n還在繼續哦！"
10105-60 = "演唱會後半段，\n一起加油吧！"
10105-70 = "呼……\n全力以赴了！"
10105-80 = "老師玩得還開心嗎？"
10105-90 = "哎呀老師，\n您怎麼了嗎？"
10105-100 = "哇！\n請，請等一下！"
10105-110 = "現，現在，那個……\n因為流了點汗……"
10105-120 = "簽名……是嗎？"
10105-130 = "不，不好意思，\n我完全沒想到……！"
10105-140 = "我會帶來一場\n不留遺憾，\n最棒的表演！"
10105-440 = "在找什麼嗎？"
10105-450 = "請隨意挑選！\n我推薦的是……"
10105-460 = "請留意不要忘記東西哦！"
10105-470 = "老，老師……！？"
10105-480 = "不，不是我……是那邊……"
10105-490 = "呵呵，啊哈哈…！"
10105-500 = "是那個對吧。\n我覺得很不錯！"
10105-510 = "我也對那個很感興趣。"
10105-520 = "要那個嗎？\n好的，請收下。"
10105-530 = "是這個吧。\n好的，請收下。"

[translation]
10105-10 = "สวัสดีค่ะ คุณครู!"
10105-20 = "ถ้าคุณครูมีเวลาละก็\nมารับชมการแสดงของฉันก่อน\nแล้วค่อยกลับนะคะ!"
10105-30 = "เตรียมตัวพร้อมหรือยังคะ คุณครู?"
10105-40 = "ไลฟ์กำลังจะเริ่มแล้วนะคะ!"
10105-50 = "ไลฟ์จะยังคง\nดำเนินต่อไปค่ะ!"
10105-60 = "ไลฟ์ครึ่งหลังก็สู้ๆ นะคะ!"
10105-70 = "ฮู่ว! สดชื่นดีจริงๆ เลยค่ะ!"
10105-80 = "คุณครู... รู้สึกยังไงบ้างคะ?"
10105-90 = "ตายจริง คุณครู\nมีอะไรหรือเปล่าคะ?"
10105-100 = "ดะ... เดี๋ยวก่อนสิคะ!"
10105-110 = "ตะ... ตอนนี้\nฉันเหงื่อออก นะ... นิดหน่อย..."
10105-120 = "ลายเซ็น... เหรอคะ?"
10105-130 = "ฉะ... ฉันไม่ได้คิดถึง\nเรื่องนั้นมาก่อนเลย..."
10105-140 = "ฉันจะทำให้เป็นการแสดง\nที่ไม่รู้สึกเสียใจภายหลังเลยค่ะ!"
10105-440 = "กำลังหาอะไรอยู่เหรอคะ?"
10105-450 = "เลือกของที่ชอบได้เลยค่ะ!\nงั้นฉันขอแนะนำ..."
10105-460 = "ระวังอย่าลืม\nอะไรนะคะ!"
10105-470 = "คะ... คุณครู...?!"
10105-480 = "ทะ... ทางโน้นค่ะ... มะ... ไม่ใช่ฉัน..."
10105-490 = "ฮือออ~!"
10105-500 = "เลือกชิ้นนั้นสินะคะ\nเป็นความคิดที่ยอดเยี่ยมมากเลยค่ะ!"
10105-510 = "ฉันเองก็กำลังเล็ง\nของชิ้นนั้นไว้เหมือนกันค่ะ"
10105-520 = "จะเลือกชิ้นนั้นเหรอคะ?\nค่ะ เชิญเลยค่ะ"
10105-530 = "ชิ้นนี้ถูกมั้ยคะ?\nค่ะ นี่ค่ะ"

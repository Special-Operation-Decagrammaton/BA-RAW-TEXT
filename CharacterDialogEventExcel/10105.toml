[translation]
10105-10 = "안녕하세요 선생님."
10105-20 = "괜찮으시다면,\n저의 스테이지……\n보고 가 주세요!"
10105-30 = "준비 되셨나요, 선생님?"
10105-40 = "이제 라이브가 시작돼요!"
10105-50 = "아직 라이브는\n계속될 거예요!"
10105-60 = "라이브 후반전, 힘냅시다!"
10105-70 = "후우-! 개운했어요!"
10105-80 = "선생님은…… 어떠셨나요?"
10105-90 = "어머 선생님,\n무슨 일이세요?"
10105-100 = "자, 잠깐만요!"
10105-110 = "지, 지금은,\n조금, 그…… 땀이……."
10105-120 = "싸인……이요?"
10105-130 = "그, 그런 건\n생각해 본 적 없는데……."
10105-140 = "아쉬움이 남지 않는,\n그런 공연을 만들게요!"
10105-440 = "무엇을 찾으시나요?"
10105-450 = "마음에 드는 걸\n골라 보세요! 제 추천은……"
10105-460 = "잊으시는 게 없도록,\n주의해 주세요!"
10105-470 = "서, 선생님……?!"
10105-480 = "저, 저 말고…… 저쪽을……"
10105-490 = "흐으으~!"
10105-500 = "그걸 고르셨군요.\n너무 멋지다고 생각해요!"
10105-510 = "네, 저도 그걸\n보고 있었어요."
10105-520 = "그걸로 하시겠어요?\n네, 여기 있습니다."
10105-530 = "이거 맞으시죠.\n네, 여기 있습니다."

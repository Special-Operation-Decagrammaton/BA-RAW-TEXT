[translation]
10131-300 = "트리니티에\n방문하는 것은\n처음입니다만……"
10131-310 = "최, 최대한 폐를\n끼치지 않도록,\n노력해야겠네요."
10131-320 = "트리니티라는 장소,\n그리고 그곳에서\n탄생하는 이야기."
10131-330 = "후후. 저는\n양쪽 모두\n마음에 들어요."
10131-340 = "너무 모든 게 잘 되어서"
10131-350 = "약간\n불안한데 말이죠……"
10131-360 = "이야기의 한 막이라면,"
10131-370 = "이런 신에서 파란이\n생기는 법이니까요."
10131-380 = "왠지 이럴 것\n같았다니까요……"
10131-390 = "네…… 저라도\n정신 차려야죠……"
10131-400 = "다행이에요……\n정말로, 다행이에요."
10131-410 = "진심으로 감사드립니다.\n선생님."
10131-420 = "그리고……\n죄송합니다. 선생님."
10131-430 = "모두 친절하게\n대해 주셔서,\n마음이 놓였답니다."
10131-440 = "……그렇지만 역시\n저는, 그냥 평범한\n학생인데 말이에요……"
10131-450 = "부르셨나요, 선생님?"
10131-460 = "네?\n'그 웃음소리'요?"
10131-470 = "안 해요!\n적어도 여기서는요!"
10131-480 = "……저희 둘만\n있을 때라면,\n또 모르겠지만요……"
10131-490 = "자꾸 그렇게\n놀리는 거,\n그만둬 주세요."
10131-500 = "그렇지 않으면……!"
10131-510 = "선생님의 행동을\n하나하나 기록……"
10131-520 = "평론해\n드릴 테니까요?"
10131-530 = "'선생님은 오늘도\n미요시 타카네에게\n장난을 치고 있었다.'"
10131-540 = "'나는 이 사실을\n키보토스 전체에\n공표하기로 결심했다.'"
10131-550 = "후훗. 그렇죠?\n이해해 주셔서\n다행이에요."
10131-560 = "견문을 넓히는 것은,\n세상을 바라보는 시야를\n넓히는 것이죠."
10131-570 = "그건 어떤 의미에서,\n자신의 세계를\n확대하는 것이고요."
10131-580 = "그런데…… 이런 생각을\n하다 보니,"
10131-590 = "궁금해진 것이\n있는데요."
10131-600 = "선생님이라는\n세계는,"
10131-610 = "과연\n어떤 세계일까요……?"
10131-830 = "트리니티에 와 있지만,\n해야 할 일은\n잊어선 안 된답니다."
10131-840 = "……안 그러면 가끔\n전후 관계를\n고의로 망각하는"
10131-850 = "우리 부장님처럼\n될 수도 있으니까요……"
10131-860 = "체크 리스트를\n준비해 봤어요, 선생님."
10131-870 = "별것 아니랍니다."
10131-880 = "평론의 구성을\n생각하는 것과 거의\n비슷한 것이니까요."
10131-890 = "이야기라는 것은\n작은 장의 쌓임이죠."
10131-900 = "집필 과정은,"
10131-910 = "반드시 그 순서대로\n이루어지지는\n않을지도 모르지만요."
10131-920 = "하지만,\n최종적으로 어떠한\n형태로 정리되어"
10131-930 = "표출된다는 의미에서는."
10131-940 = "이런 과제를 착실하게\n해나가는 것과 \n비슷할지도 모르겠네요."
10131-950 = "반복되는 것들은\n무시당하기 쉽죠."
10131-960 = "일단,\n지루하잖아요……?"
10131-970 = "하지만 작은 노력을\n소홀히 하면,"
10131-980 = "언젠가 발목을 잡히는\n법이니까요."
10131-990 = "상냥한 잔소리,\n같았다고요?"
10131-1000 = "네, 네에…… 잔소리가\n많다는 것 정도,\n알고 있다고요."
10131-1010 = "평론가라는 건 결국, \n트집을 잡는\n잔소리꾼이니까요."
10131-1020 = "5점 만점!\n대단해요!"
10131-1030 = "성실하게 과제를\n해낸 분에게는,"
10131-1040 = "보상이 주어지는 것이\n당연하니까요."
10131-1050 = "자, 여기요.\n제가 준비해 봤어요."

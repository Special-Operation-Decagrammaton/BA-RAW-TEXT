[translation]
10131-300 = "ถึงฉันเพิ่งจะ\nเคยมาที่ทรีนิตี้\nเป็นครั้งแรก..."
10131-310 = "ฉะ... ฉันจะพยายามเต็มที่\nไม่ให้สร้างความลำบาก\nอย่างเด็ดขาดค่ะ"
10131-320 = "สถานที่ที่เรียกว่าทรีนิตี้\nและเรื่องราวต่างๆ\nที่อุบัติขึ้น ณ ที่นั้น"
10131-330 = "ฮุฮุ ฉันน่ะ\nชอบทั้งสองอย่างเลยค่ะ"
10131-340 = "ทุกอย่างราบรื่นดีมาก"
10131-350 = "จนรู้สึกสังหรณ์ใจไม่ดี\nนิดหน่อยเลยค่ะ..."
10131-360 = "ถ้าเป็นตอนที่ใกล้จะจบเรื่อง"
10131-370 = "เวลาแบบนี้มักจะเกิด\nเรื่องวุ่นวายขึ้นนี่คะ"
10131-380 = "ไม่รู้ว่าเพราะอะไร\nถึงคิดว่าจะเกิด\nเรื่องแบบนั้นค่ะ..."
10131-390 = "ค่ะ... อย่างน้อย\nฉันก็ควรต้องคุมสติให้ดีค่ะ"
10131-400 = "โล่งอกไปทีนะคะ...\nค่อยยังชั่วจริงๆ ค่ะ"
10131-410 = "ขอบคุณจริงๆ ค่ะ\nคุณครู"
10131-420 = "แล้วก็...\nขอโทษนะคะ คุณครู"
10131-430 = "ทุกคนปฏิบัติด้วยอย่างใจดี\nทำให้ฉันเบาใจมากเลยค่ะ"
10131-440 = "แต่ถึงยังไง ฉันก็เป็น\nแค่เพียงนักเรียนธรรมดาๆ\nคนหนึ่งเองนะคะ"
10131-450 = "เรียกฉันเหรอคะ คุณครู?"
10131-460 = "คะ?\n'เสียงหัวเราะแบบนั้น' เหรอคะ? "
10131-470 = "ไม่เอาค่ะ!\nอย่างน้อยก็\nขอไม่ทำที่นี่ค่ะ!"
10131-480 = "...แต่ถ้าเป็น\nตอนที่อยู่กันสองคน\nก็อาจจะทำก็ได้นะคะ..."
10131-490 = "ช่วยเลิกล้อเล่น\nแบบนั้นทีเถอะค่ะ"
10131-500 = "ถ้าไม่อย่างนั้นละก็...!"
10131-510 = "ฉันจะคอยบันทึกการกระทำ\nของคุณครูไว้ทุกฝีก้าวเลยค่ะ"
10131-520 = "ฉันจะช่วยเขียน\nคำวิจารณ์ให้ยังไงล่ะคะ"
10131-530 = "ในวันนี้คุณครูก็ยังคง\nกลั่นแกล้งมิโยชิ ทาคาเนะ\nอย่างไม่หยุดหย่อน'"
10131-540 = "ฉันตั้งใจแน่วแน่แล้วว่า\nจะเล่าความจริงเรื่องนี้\nให้ทั้งคิโวทอสได้รับรู้'"
10131-550 = "ฮุฮุ นั่นสินะคะ?\nค่อยยังชั่วหน่อย\nที่คุณครูเข้าใจนะคะ"
10131-560 = "การเปิดหูเปิดตาให้กว้างไกล\nก็คือการขยายมุมมองที่มีต่อโลก\nให้กว้างขึ้นนั่นเองค่ะ"
10131-570 = "และในความหมายหนึ่ง\nนั่นก็คือการเปิดโลกของตัวเอง\nให้กว้างใหญ่ขึ้นด้วยเช่นกันค่ะ"
10131-580 = "แต่ว่า… พอคิดแบบนี้แล้ว"
10131-590 = "ก็มีเรื่องที่สงสัยขึ้นมาน่ะค่ะ"
10131-600 = "โลกที่เรียกว่า 'คุณครู'\nแท้จริงแล้ว"
10131-610 = "จะเป็นโลกแบบไหนน่ะค่ะ...?"
10131-830 = "แม้จะอยู่ที่ทรีนิตี้ แต่ก็ห้ามลืม\nเรื่องที่ต้องทำเด็ดขาดค่ะ"
10131-840 = "ไม่อย่างนั้น ฉันอาจจะกลายเป็น\nเหมือนหัวหน้าที่ชอบทำเป็นแกล้งลืม"
10131-850 = "ว่าอะไรสำคัญไปซะก่อนน่ะค่ะ"
10131-860 = "ฉันทำรายการตรวจสอบ\nมาให้แล้วค่ะ คุณครู"
10131-870 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
10131-880 = "สำหรับฉันแล้วมันแทบจะไม่ต่างจาก\nการเรียบเรียงบทวิจารณ์เลยละค่ะ"
10131-890 = "สิ่งที่เรียกว่าเรื่องราวมันก็คือการร้อยเรียง\nบทเล็กๆ เข้าด้วยกันนั่นละค่ะ"
10131-900 = "แต่ขั้นตอนการเขียนจริงๆ"
10131-910 = "มันอาจไม่ได้เรียงตามลำดับแบบนั้น\nเสมอไปก็ได้นะคะ"
10131-920 = "แต่ว่า ถ้าในความหมายที่ว่า\nสุดท้ายมันต้องถูกสรุปออกมา"
10131-930 = "เป็นรูปธรรมแล้วละก็..."
10131-940 = "มันอาจจะคล้ายกับการที่เราค่อยๆ\nสะสมความสำเร็จจากภารกิจเล็กๆ\nไปพร้อมๆ กันก็ได้นะคะ"
10131-950 = "อะไรที่ทำจนเป็นปกติน่ะ...\nมักจะถูกมองข้ามได้ง่ายใช่มั้ยล่ะคะ"
10131-960 = "ก็นะ… มันเป็นเรื่องน่าเบื่อนี่คะ"
10131-970 = "แต่ถ้าเราละเลยความพยายาม\nเล็กๆ น้อยๆ ละก็"
10131-980 = "สักวันหนึ่งมันอาจจะย้อนกลับมา\nเป็นอุปสรรคได้เหมือนกันนะคะ"
10131-990 = "ที่ฉันพูดเมื่อกี้ มันฟังดูเหมือน\nการบ่นที่น่าเอ็นดูมากเลยงั้นเหรอคะ?"
10131-1000 = "ค่า ค่า... ฉันรู้อยู่แล้วละ\nว่าตัวเองเป็นคนที่ขี้บ่นค่ะ"
10131-1010 = "สุดท้ายแล้วนักวิจารณ์ก็คือพวกช่างติ\nที่ชอบหาเรื่องบ่นไปเรื่อยนั่นละค่ะ"
10131-1020 = "5 คะแนนเต็ม!\nสุดยอดเลยค่ะ!"
10131-1030 = "สำหรับคนที่ตั้งใจ\nทำภารกิจอย่างซื่อสัตย์น่ะ "
10131-1040 = "การได้รับรางวัลตอบแทน\nมันก็เป็นเรื่องธรรมดานี่คะ"
10131-1050 = "อ่ะ นี่ค่ะ\nฉันเตรียมมาให้แล้วค่ะ"

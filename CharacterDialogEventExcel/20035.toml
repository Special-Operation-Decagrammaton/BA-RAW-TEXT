[translation]
20035-10 = "歡迎回來，老師……\n歡迎來到百鬼夜行……"
20035-20 = "今天就由我來\n為老師導覽。"
20035-30 = "導覽員春日椿，\n會努力的。呼啊……"
20035-40 = "百鬼夜行如何……？\n有樂在其中嗎……？"
20035-50 = "如果有想去的地方，\n隨時可以告訴我……"
20035-60 = "如果是百鬼夜行的話，\n我可以幫你導覽……"
20035-70 = "慶典……很厲害吧？"
20035-80 = "百鬼夜行還有很多\n別的慶典……等你來哦？"
20035-90 = "呼咦……\n怎麼啦老師？"
20035-100 = "我看起來像在打瞌睡，\n所以就試著叫醒我？"
20035-110 = "唔……好癢……"
20035-120 = "但是，這種程度\n無法阻止我的修行哦……"
20035-130 = "一直這樣\n惡作劇的話……"
20035-140 = "就要一起躺在\n床上了哦……？"
20035-150 = "嗯……？反而\n希望那樣……？"
20035-160 = "難道你希望我\n關心你嗎……？"
20035-170 = "……就算不那麼做，\n 我也已經非常關心\n老師了呀……"
20035-800 = "不把每天的工作\n做好的話……"
20035-810 = "聽說就不能做好夢……"
20035-820 = "行程表已經確認過了……？\n那，我就來為你導覽吧。"
20035-830 = "唔嗯……不要那樣\n搖我，老師……"
20035-840 = "嗯……？沒有。\n我沒睡。就說我沒睡嘛……"
20035-850 = "我來為你導覽到\n下一個目的地，老師……"
20035-860 = "在那之前，先小睡一下……"
20035-870 = "那個，這裡……請收下吧。\n辛苦你了，老師。呵呵。"
20035-880 = "老師也很認真修行呢……"
20035-890 = "我也不能輸。呼嚕……"

[translation]
20035-10 = "เชิญเลย คุณครู...\nยินดีต้อนรับสู่เฮียกคิยาโคค่ะ..."
20035-20 = "วันนี้ฉันจะเป็นไกด์\nให้คุณครูเอง"
20035-30 = "ไกด์คาซึกะ สึบากิ\nจะพยายามนะคะ ฮ้าว..."
20035-40 = "เฮียกคิยาโคเป็นยังไงบ้าง...?\nกำลังสนุกอยู่ใช่มั้ย...?"
20035-50 = "ถ้ามีที่ที่อยากไป\nก็บอกฉันได้ตลอดนะ..."
20035-60 = "ถ้าเป็นเฮียกคิยาโค\nฉันพาทัวร์ได้หมดเลย..."
20035-70 = "เทศกาล...\nยอดเยี่ยมไปเลยใช่มั้ย?"
20035-80 = "ในเฮียกคิยาโคยังมี\nเทศกาลอื่นอีกเยอะแยะเลย...\nแล้วฉันจะรอนะ"
20035-90 = "เอ๋...\nมีอะไรเหรอคุณครู?"
20035-100 = "เหมือนฉันกำลังง่วงนอน\nก็เลยปลุกดูงั้นเหรอ?"
20035-110 = "งืม... จั๊กจี้นะ..."
20035-120 = "แต่แค่นั้นน่ะ\nขัดขวางการฝึกฝนของฉัน\nไม่ได้หรอก..."
20035-130 = "ถ้ายังจะแกล้งอยู่แบบนั้น..."
20035-140 = "ฉันจะพาไปนอน\nบนเตียงด้วยกันเลยนะ..."
20035-150 = "หืม...? ถ้าได้แบบนั้น\nก็ยิ่งดีเลยงั้นเหรอ...?"
20035-160 = "อยากให้ฉันใส่ใจ\nงั้นเหรอ...?"
20035-170 = "ไม่ต้องทำขนาดนั้น\nฉันก็ใส่ใจคุณครู\nอยู่แล้วนะ..."
20035-800 = "ถ้าไม่ตั้งใจทำงาน\nของวันนี้ละก็..."
20035-810 = "ว่ากันว่าจะไม่นอนฝันดีนะ..."
20035-820 = "เช็กกำหนดการแล้วหรือยัง...?\nงั้นฉันจะเป็นไกด์ให้เอง"
20035-830 = "งืม... อย่าปลุกกัน\nอย่างนั้นสิครู..."
20035-840 = "หืม...? เปล่านะ\nฉันไม่ได้หลับ บอกว่าไม่ได้หลับ..."
20035-850 = "ฉันจะพาไปยัง\nจุดต่อไปนะ คุณครู..."
20035-860 = "แต่ของีบก่อนไปสักหน่อย..."
20035-870 = "เอ้านี่... รับไปสิคะ\nทำได้ดีมากเลยคุณครู ฮุฮุ"
20035-880 = "คุณครูก็ตั้งใจฝึก\nเหมือนกันนะ..."
20035-890 = "ฉันยอมแพ้ไม่ได้แล้ว\nคร่อก zzZ..."

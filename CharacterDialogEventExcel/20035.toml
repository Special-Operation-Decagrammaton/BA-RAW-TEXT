[translation]
20035-10 = "Welcome, Sensei... Glad you made it to Hyakkiyako..."
20035-20 = "I'll be your guide today."
20035-30 = "Tour Guide Kasuga Tsubaki. I'll do my best. *yawn*..."
20035-40 = "How's Hyakkiyako been? Are you making the most of your time here?"
20035-50 = "If there's somewhere you want to go, let me know anytime..."
20035-60 = "If it's in Hyakkiyako, I can guide you there."
20035-70 = "That festival...was quite impressive, wasn't it?"
20035-80 = "There are other big festivals in Hyakkiyako too... So don't go without your tour guide."
20035-90 = "*yawn*... What's wrong, Sensei?"
20035-100 = "I was nodding off, so you tried to wake me?"
20035-110 = "Hmm...that tickles..."
20035-120 = "Something like that won't hinder my training..."
20035-130 = "If you keep acting like a bully..."
20035-140 = "I might just sleep in bed with you, Sensei..."
20035-150 = "Huh? You'd like that...?"
20035-160 = "I think you just want more attention..."
20035-170 = "...There's no need. I'm already giving you plenty of attention..."
20035-800 = "If you don't do your daily tasks diligently..."
20035-810 = "...you won't have sweet dreams."
20035-820 = "You checked your schedule? In that case, I'll be your guide."
20035-830 = "Ugh... Don't wake me up so rudely, Sensei..."
20035-840 = "Hmm? No, I didn't fall asleep. Really..."
20035-850 = "I'll guide you to our next destination, Sensei..."
20035-860 = "But before that, a quick nap..."
20035-870 = "Here, take this... You've earned it, Sensei. Heehee."
20035-880 = "You're quite diligent about your training..."
20035-890 = "But I won't be defeated... Zzz..."

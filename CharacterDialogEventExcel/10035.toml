[translation]
10035-10 = "啊，老，老師……"
10035-20 = "我，我\n一直在等你……"
10035-30 = "你來啦，老師……"
10035-40 = "沒，沒想到\n還能再見面……"
10035-50 = "啊，是，是的……\n你叫我嗎……？"
10035-60 = "怎，怎麼了嗎……？"
10035-70 = "噫……！？"
10035-80 = "那個……老師……\n差不多……\n該行動了……"
10035-90 = "那個……難道，\n找我有什麼事……？"
10035-100 = "要是能一直像這樣……\n待在身邊的話……"
10035-110 = "啊，是，是的……\n你叫我嗎……？"
10035-120 = "怎，怎麼了嗎……？"
10035-130 = "噫……！？"
10035-140 = "那個……老師……\n差不多……\n該行動了……"
10035-150 = "那個……難道，\n找我有什麼事……？"
10035-370 = "我，我試著整理了\n待辦清單……"
10035-380 = "就，就在這裡。\n麻煩老師了……"
10035-390 = "老，老師？\n這是，什麼意思……？"
10035-400 = "啊，不，\n請您別在意……"
10035-410 = "就，就算只是像這樣\n兩個人一起確認清單……\n總覺得，也很愉快呢……"
10035-420 = "啊，辛苦了……\n總算是順利解決了呢。"
10035-430 = "啊，這樣啊……\n那麼，我會去確認的。\n辛苦你了。"
10035-440 = "今，今天的工作，\n這樣就結束……了呢。\n謝，謝謝你，老師。"

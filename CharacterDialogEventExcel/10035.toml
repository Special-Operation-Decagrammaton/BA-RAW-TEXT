[translation]
10035-10 = "อ๊ะ คะ... คุณครู..."
10035-20 = "กะ... กำลังรอ\nอยู่เลยค่ะ คุณครู!"
10035-30 = "มาแล้วเหรอคะ คุณครู..."
10035-40 = "จะ...เจอกันที่นี่อีกแล้วนะคะ"
10035-50 = "เอ่อ... คะ...ค่ะ...\nเรียกฉันเหรอคะ...?"
10035-60 = "คุณครูมีอะไร...\nจะพูดรึเปล่าคะ?"
10035-70 = "เฮือกกก...!?"
10035-80 = "คือว่า... คุณครูคะ...\nฉันว่าตอนนี้เป็นเวลาดี\nที่จะเริ่มได้แล้วนะคะ..."
10035-90 = "คือว่า... คุณครู...\nมีอะไรจะพูดกับฉันรึเปล่าคะ...?"
10035-100 = "ถ้าได้เจอกันต่อไปเรื่อยๆ\nแบบนี้ก็คงดีนะคะ"
10035-110 = "เอ่อ... คะ...ค่ะ...\nเรียกฉันเหรอคะ...?"
10035-120 = "คุณครูมีอะไร...\nจะพูดรึเปล่าคะ?"
10035-130 = "เฮือกกก...!?"
10035-140 = "คือว่า... คุณครูคะ...\nฉันว่าตอนนี้เป็นเวลาดี\nที่จะเริ่มได้แล้วนะคะ..."
10035-150 = "คือว่า... คุณครู...\nมีอะไรจะพูดกับฉันรึเปล่าคะ...?"
10035-370 = "ฉันจัดเตรียมรายการ\nงานที่ต้องทำไว้ให้แล้วค่ะ"
10035-380 = "อยู่ทางนี้ค่ะ นี่เป็นงานที่รบกวน\nให้คุณครูช่วยทำให้ค่ะ..."
10035-390 = "หืม...? คุณครู...?"
10035-400 = "เปล่าค่ะ... ไม่เป็นไรค่ะ..."
10035-410 = "ช่วยกันจัดเตรียมรายการสองคน\nแบบนี้ก็สนุกดีนะคะ..."
10035-420 = "อ๊ะ... ค่ะ\nจัดการได้เรียบร้อยแล้วค่ะ..."
10035-430 = "อย่างนั้นเองเหรอคะ...\nค่ะ ฉันจะตรวจสอบเอาไว้ค่ะ..."
10035-440 = "งะ...งานวันนี้...\nเสร็จสิ้นเพียงเท่านี้ค่ะ...\nขอบคุณนะคะคุณครู..."

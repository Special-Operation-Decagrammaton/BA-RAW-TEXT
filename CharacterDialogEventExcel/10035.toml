[translation]
10035-10 = "아. 서, 선생님……."
10035-20 = "기, 기다리고\n있었어요……."
10035-30 = "오셨군요, 선생님……."
10035-40 = "또, 또 만났네요……."
10035-50 = "아, 네, 네…….\n부르셨어요……?"
10035-60 = "뭐, 뭔가 하실\n말씀이라도……?"
10035-70 = "히에엑……!?"
10035-80 = "저……. 선생님…….\n슬슬……. 시작\n하시는 게……."
10035-90 = "저……. 혹시 저한테\n하실 말씀이라도……?"
10035-100 = "계속 이렇게…….\n있을 수 있다면……."
10035-110 = "아, 네, 네…….\n부르셨어요……?"
10035-120 = "뭐, 뭔가 하실\n말씀이라도……?"
10035-130 = "히에엑……!?"
10035-140 = "저……. 선생님…….\n슬슬……. 시작\n하시는 게……."
10035-150 = "저……. 혹시 저한테\n하실 말씀이라도……?"
10035-370 = "하실 일들의 리스트를\n정리해 보았습니다……."
10035-380 = "이쪽이에요.\n선생님께 부탁드릴 일들입니다……."

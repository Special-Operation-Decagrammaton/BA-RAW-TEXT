[translation]
10104-10 = "歡迎您，老師。\n不久後，\n月影祭即將舉行。"
10104-20 = "感謝您的光臨。"
10104-30 = "山海經自豪的月影祭，\n還請您盡情享受。"
10104-40 = "雖然是意料之外\n的情況……"
10104-50 = "對玄龍門、玄武商會，\n以及山海經來說……"
10104-60 = "老師的存在\n是非常大的鼓勵。"
10104-70 = "我們順利\n舉辦了月影祭。"
10104-80 = "……那場騷動，\n就暫且不去理會吧。"
10104-90 = "您覺得祭典如何呢？"
10104-100 = "山海經和玄武商會，\n隨時等候著老師的光臨。"
10104-110 = "月影祭正是玄武商會\n展示實力的時候。"
10104-120 = "請老師慢慢享受。"
10104-130 = "……面對惡作劇，\n我會用肢體語言回應哦。"
10104-140 = "開玩笑的，老師。\n惡作劇的話，請您自便。"
10104-150 = "……但太頻繁的話\n會讓我有點困擾。\n還請適可而止。"
10104-160 = "有什麼事嗎，老師？"
10104-170 = "……咦？\n只是叫叫看而已……？"
10104-180 = "……一直這樣引起\n注意的話，遲早會\n沒人相信您的哦？"
10104-190 = "……雖然我會一直\n相信老師就是了。"
10104-200 = "我，我是被搔癢也\n不受影響的體質。"
10104-210 = "是，是真的。\n就算試也沒用的，\n所以，請您……！"
10104-220 = "啊，啊哈哈哈哈！"
10104-230 = "……真是的，\n就說請您住手了。"
10104-450 = "我算是擅長看店的人。"
10104-460 = "那麼……\n您今天要找什麼呢？"
10104-470 = "只要您開口，無論何處，\n玄武商會都會趕到。"
10104-480 = "……有朝一日，就算是\n奇普托斯的盡頭也一樣！"
10104-490 = "有沒有漏買什麼？"
10104-500 = "為了避免留下遺憾，\n還請慢慢欣賞到最後。"
10104-510 = "玄武商會的珍藏品？\n隱藏菜單……？"
10104-520 = "呃……\n沒有那種東西……"
10104-530 = "就算您露出那種表情也……"
10104-540 = "如果有缺少的東西，\n還請跟我說一聲。"
10104-550 = "……但如果是已經\n賣完的商品就沒辦法了。"
10104-560 = "來，是我推薦的商品。"
10104-570 = "這是要自用的嗎？\n還是送禮用的呢？"
10104-580 = "感謝您的惠顧！"
10104-590 = "……明明是經常說的話，\n對老師說總覺得很新鮮呢。"
10104-600 = "會長曾經說過──"
10104-610 = "如果無償獲得了某些東西，\n那麼那同時也代表自己\n成為了商品的意思。"
10104-620 = "不過如果老師\n是商品的話……"
10104-630 = "啊，不，沒什麼。"

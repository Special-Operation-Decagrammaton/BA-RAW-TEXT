[translation]
10104-10 = "เชิญค่ะคุณครู ใกล้จะเปิด\nเทศกาลเงาจันทร์แล้วค่ะ"
10104-20 = "ขอบคุณที่มานะคะ"
10104-30 = "ขอให้สนุกกับเทศกาลเงาจันทร์\nที่ซานไห่จิงภูมิใจนะคะ"
10104-40 = "ถึงจะเป็นสถานการณ์ที่คาดไม่ถึง..."
10104-50 = "แต่สำหรับมังกรดำ ย่านการค้าฯ\nและซานไห่จิงแล้ว..."
10104-60 = "การมีอยู่ของคุณครู\nเป็นแรงใจให้พวกเรามากๆ ค่ะ"
10104-70 = "เทศกาลเงาจันทร์เปิดได้\nอย่างราบรื่นเลยนะคะ"
10104-80 = "ส่วนเรื่องวุ่นวายนั่น เอาเป็นว่า\nอย่าเพิ่งใส่ใจเลยค่ะ..."
10104-90 = "งานเทศกาลเป็นอย่างไรบ้างคะ?"
10104-100 = "ซานไห่จิงกับย่านการค้าเทพเต่าดำ\nรอให้คุณครูมาเยือน\nทุกเมื่อเลยนะคะ"
10104-110 = "เทศกาลเงาจันทร์คืองานที่\nจะได้โชว์ฝีมือของ\nย่านการค้าเทพเต่าดำค่ะ"
10104-120 = "คุณครูพักผ่อนเถอะค่ะ"
10104-130 = "ถ้าแกล้งกัน ฉันจะตอบกลับ\nด้วยภาษากายนะคะ"
10104-140 = "ฉันล้อเล่นค่ะ คุณครู\nจะแกล้งฉันเท่าไรก็ได้ค่ะ"
10104-150 = "แต่ถ้าทำเยอะเกินไป\nฉันจะลำบากนะคะ\nเอาแต่พอดีเถอะค่ะ"
10104-160 = "มีเรื่องอะไรเหรอคะคุณครู?"
10104-170 = "คะ...?\nแค่ลองเรียกดู\nงั้นเหรอคะ...?"
10104-180 = "ถ้าเรียกร้องความสนใจ\nหลายๆ ครั้งแบบนี้\nระวังต่อไปไม่มีใครเชื่อนะคะ"
10104-190 = "แม้ว่าฉันจะเชื่อใจ\nคุณครูอยู่เสมอก็เถอะค่ะ..."
10104-200 = "ฉะ... ฉันไม่ค่อย\nบ้าจี้น่ะค่ะ"
10104-210 = "จะ... จริงนะคะ\nทำไปก็ไม่มีประโยชน์หรอกค่ะ\nเพราะงั้น หยุดนะ...!"
10104-220 = "อะฮ่าฮ่าฮ่าฮ่า!"
10104-230 = "หยุดเถอะค่ะ... ฉันขอละ"
10104-450 = "ฉันดูแลร้านได้ดีเลยค่ะ"
10104-460 = "ถ้างั้น... วันนี้\nอยากได้อะไรเหรอคะ?"
10104-470 = "เพียงแค่มาบอกกัน\nย่านการค้าเทพเต่าดำก็จะไปให้ค่ะ"
10104-480 = "สักวันหนึ่ง... แม้จะต้องไปถึง\nสุดขอบคิโวทอสก็ตาม!"
10104-490 = "ไม่ได้ลืมของอะไรใช่มั้ยคะ?"
10104-500 = "ค่อยๆ ดูของให้หมด\nจะได้ไม่เสียดายทีหลังนะคะ"
10104-510 = "ของลึกลับของย่านการค้าเทพเต่าดำ?\nเมนูที่ซ่อนอยู่...?"
10104-520 = "อืม... ของแบบนั้นไม่มีหรอกค่ะ..."
10104-530 = "ถึงจะทำสีหน้าแบบนั้นก็เถอะค่ะ..."
10104-540 = "ถ้าขาดเหลืออะไร\nก็บอกฉันได้ตลอดนะคะ!"
10104-550 = "แต่ของที่หมดแล้ว\nฉันก็ช่วยไม่ได้นะคะ..."
10104-560 = "ค่ะ นี่คือของที่ฉันแนะนำค่ะ"
10104-570 = "หาของไปใช้เองที่บ้าน\nหรือเอาไปเป็นของขวัญคะ?"
10104-580 = "ขอบคุณทุกครั้งเลยนะคะ!"
10104-590 = "ฉันพูดคำนี้อยู่บ่อยๆ แต่พอได้\nพูดกับคุณครู ก็แปลกใหม่ดีนะคะ"
10104-600 = "ท่านประธานก็พูดอย่างนี้บ่อยๆ ค่ะ"
10104-610 = "บอกว่าถ้าได้อะไรมาฟรีๆ\nคนนั้นก็คือของขวัญน่ะค่ะ"
10104-620 = "แต่ถ้าคุณครูเป็นของขวัญละก็..."
10104-630 = "ปะ... เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"

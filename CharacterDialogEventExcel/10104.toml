[translation]
10104-10 = "Welcome, Sensei. The Moonlight Festival will start soon."
10104-20 = "Thank you for coming."
10104-30 = "Enjoy Shanhaijing's Moonlight Festival."
10104-40 = "We didn't expect this situation, but..."
10104-50 = "For the Genryumon, Black Tortoise Promenade, and Shanhaijing..."
10104-60 = "...your presence is very encouraging, Sensei."
10104-70 = "The Moonlight Festival was a success."
10104-80 = "...Let's just ignore the disturbance for now."
10104-90 = "How was the festival?"
10104-100 = "Shanhaijing and the Black Tortoise Promenade are always waiting for you to visit, Sensei."
10104-110 = "The Moonlight Festival is the perfect time to show off the skills of the Black Tortoise Promenade."
10104-120 = "You should rest, Sensei."
10104-130 = "...I'll respond to pranks physically."
10104-140 = "I'm kidding, Sensei. Pranks are fine."
10104-150 = "It would only be a problem if it was too frequent, so please control yourself."
10104-160 = "What's going on, Sensei?"
10104-170 = "...What? You just wanted to chat?"
10104-180 = "...If you keep joking around like that, eventually no one's going to believe you."
10104-190 = "But I'll always believe you, Sensei."
10104-200 = "I-I'm not really ticklish."
10104-210 = "R-Really. There's no point in trying. So stop...!"
10104-220 = "Ahahaha!"
10104-230 = "...Please stop."
10104-450 = "Protecting the store is important."
10104-460 = "So...what are you looking for today?"
10104-470 = "If you ask us, the Black Tortoise Promenade will go anywhere."
10104-480 = "...To the ends of Kivotos, someday!"
10104-490 = "Did you forget anything?"
10104-500 = "I don't want you to regret anything, so please look around carefully."
10104-510 = "The Black Tortoise Promenade's secret item? A hidden menu...?"
10104-520 = "Um... There's no such thing..."
10104-530 = "Not even if you give me that look..."
10104-540 = "If anything's missing, please feel free to let me know."
10104-550 = "...But there's nothing we can do about sold out items."
10104-560 = "Yes, that's an item I recommend."
10104-570 = "Will you be using it at home, or giving it to someone?"
10104-580 = "Thank you so much!"
10104-590 = "People say that all the time, but saying it to you, Sensei...it sounds new."
10104-600 = "There's something the president used to say."
10104-610 = "If something's given to you for free, you've become the product."
10104-620 = "But if you're the product, Sensei..."
10104-630 = "N-Never mind. It's nothing."

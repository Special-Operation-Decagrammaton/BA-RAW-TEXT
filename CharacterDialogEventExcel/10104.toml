[translation]
10104-10 = "어서 오세요, 선생님.\n곧 월영제가 개최됩니다."
10104-20 = "와 주셔서 감사합니다."
10104-30 = "산해경이 자랑하는\n월영제를 즐겨 주세요."
10104-40 = "예상외의 상황입니다만…"
10104-50 = "현룡문, 현무상회,\n그리고 산해경에 있어서…"
10104-60 = "선생님의 존재는\n매우 격려가 됩니다."
10104-70 = "무사히 월영제를\n개최할 수 있었네요."
10104-80 = "…그 소동은, 일단,\n신경 쓰지 말기로 하죠.."
10104-90 = "축제는 어떠셨나요?"
10104-100 = "산해경과 현무상회는,\n언제든지 선생님의 방문을\n기다리고 있습니다."
10104-110 = "월영제야말로\n현무상회의 솜씨를\n보여줄 때입니다."
10104-120 = "선생님은 쉬고 계시죠."
10104-130 = "…장난에는 육체 언어로\n보답할 겁니다."
10104-140 = "농담이에요, 선생님.\n장난이라면, 얼마든지."
10104-150 = "…너무 자주 하면\n곤란하니까요.\n적당히 해주세요."
10104-160 = "무슨 일이시죠, 선생님?"
10104-170 = "…네?\n그냥 불러본 거\n뿐이라고요…?"
10104-180 = "…몇 번이고 그렇게\n주의를 끈다면,\n언젠가, 아무도\n믿지 않게 될걸요?"
10104-190 = "…저는 언제까지나,\n선생님을 믿습니다만."
10104-200 = "저, 저는 간지럼\n안 타는 체질이라서요."
10104-210 = "진, 진짜예요.\n해도 소용없어요,\n그러니까, 그만…!"
10104-220 = "아하하하하!"
10104-230 = "…정말, 그만해 주세요."
10104-450 = "가게를 지키는 건 잘하는 편입니다."
10104-460 = "그러면… 오늘은\n무엇을 찾으시나요?"
10104-470 = "말을 걸어 주시면 어디든지,\n현무상회는 가겠습니다."
10104-480 = "…언젠가는, 키보토스의\n끝까지라도!"
10104-490 = "놓치신 물건은 없으십니까?"
10104-500 = "후회 없도록, 부디 끝까지\n천천히 보아주세요."
10104-510 = "현무상회의 비장품?\n숨겨진 메뉴…?"
10104-520 = "음… 그런 건, 없는데요…"
10104-530 = "그런 표정을 지으셔도 말이죠…"
10104-540 = "부족한 것이 있으시다면,\n언제든 말씀 주세요."
10104-550 = "…매진된 상품은,\n어쩔 수 없습니다만."
10104-560 = "네, 제가 추천하는 물건입니다."
10104-570 = "여기 가정용이신가요,\n선물용이신가요?"
10104-580 = "매번 감사합니다!"
10104-590 = "…언제나 하고 있는 말일 텐데,\n선생님께 말씀드리니 왠지 신선하네요."
10104-600 = "회장님께서도 말씀하시곤 했죠."
10104-610 = "무언가가 공짜로 주어진다면, \n자기 자신이 상품이 된 것이라고요."
10104-620 = "그런데 선생님이 상품이라면…"
10104-630 = "아, 아닙니다. 아무것도요."

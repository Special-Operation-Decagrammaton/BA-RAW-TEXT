[translation]
10102-340 = "แหะๆ ไม่ว่าที่ไหน\nก็มีคนที่ดูสนุกสนาน\nเต็มไปหมดเลยนะคะ"
10102-350 = "ทะเล... งานเทศกาล..."
10102-360 = "บางทีตอนนี้อาจจะเป็น\nจุดที่ดีที่สุดในชีวิตของฉันก็ได้..."
10102-370 = "มีแต่เรื่องที่ฉันเพิ่งได้เจอ\nเป็นครั้งแรกนะคะ"
10102-380 = "งานเทศกาลที่ทะเล\nปกติเป็นแบบนี้เหรอคะ...?"
10102-390 = "ถะ... ถ้าฉันไม่สนุกกับงาน\nไปจนถึงจบงานละก็"
10102-400 = "ฉันอาจจะเสียดาย\nจนนอนไม่หลับก็ได้นะคะ...!"
10102-410 = "จบแล้วสินะคะ...\nมันจบแล้วค่ะ..."
10102-420 = "จากนี้ชีวิตของฉันคง\nไม่มีวันแบบนี้อีกแล้วสินะคะ"
10102-430 = "คะ? จะพาฉันมา\nทะเลอีกเหรอคะ?"
10102-440 = "แหะๆ ขอบคุณค่ะ"
10102-450 = "งั้นเอาไว้คราวหน้าค่อยไป\nรีสอร์ตติดทะเล..."
10102-460 = "เฮือก? มะ... มีงานอะไร\nจะสั่งฉันเหรอคะ?"
10102-470 = "แค่ลองเรียกดูเหรอคะ?\nทำไมล่ะ...?"
10102-480 = "อะ... อาสึโกะจัง\nกับคุณมิซากิ\nเหมาะกับชุดว่ายน้ำจังค่ะ..."
10102-490 = "คะ? ฉันก็ด้วยเหรอคะ?\nขอบคุณค่ะ..."
10102-500 = "ฉันเก็บสาหร่ายที่โดนซัด\nขึ้นมาบนชายหาดมาน่ะค่ะ..."
10102-510 = "คงกินไม่ได้ใช่มั้ยคะ...?"
10102-520 = "งานเทศกาลที่ทะเล\nก็สนุกดีอยู่หรอกค่ะ..."
10102-530 = "แต่ยิ่งเป็นแบบนี้ ตอนกลับไป\nใช้ชีวิตแบบเดิม คงเสียใจใช่มั้ยคะ..."
10102-540 = "แหะๆ ตรงนี้มีของขาย\nหลายอย่างเลยนะคะ"
10102-550 = "ถ้าซื้อให้ ฉันจะไม่\nปฏิเสธหรอกค่ะ แหะๆๆ..."
10102-560 = "มีของดีๆ เพียบเลย..."
10102-570 = "ร้านปิดแล้วสินะคะ"
10102-580 = "ถึงฉันจะไม่ได้ซื้อ แต่แค่ได้ดู\nก็สนุกแล้วค่ะ..."
10102-590 = "ฉะ... ฉันไม่รู้ว่า\nชิ้นไหนดีน่ะค่ะ..."
10102-600 = "คุณครูเลือกเอง\nน่าจะดีกว่านะคะ..."
10102-610 = "ฮะ... เฮือก?!"
10102-620 = "มะ... มีของแบบนั้น\nด้วยเหรอคะเนี่ย...!"
10102-630 = "ซื้อของแพงๆ ได้ง่ายแบบนั้นเลย...\nผู้ใหญ่เนี่ย สุดยอดไปเลยนะคะ..."
10102-640 = "หรือว่านั่นจะเป็นของขวัญ\nให้ฉันหรือเปล่าคะ...?"
10102-650 = "ถ้าใช่ก็ขอบคุณค่ะ\nแหะๆๆ..."
10102-660 = "อ๊ะ นั่นก็เป็นของที่\nฉันเล็งไว้เหมือนกันค่ะ แหะๆ"

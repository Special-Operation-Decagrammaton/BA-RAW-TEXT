[translation]
10102-340 = "Heehee. It's full of cheerful-looking people..."
10102-350 = "The sea... The festival..."
10102-360 = "This might be the peak of my life..."
10102-370 = "They're all new experiences for me..."
10102-380 = "Are beach festivals always like this...?"
10102-390 = "I-If I don't enjoy it until the end,"
10102-400 = "I might not be able to sleep...!"
10102-410 = "It's over... It's finished..."
10102-420 = "I'll never have a day like this again, will I?"
10102-430 = "What? You'll bring me to the ocean again?"
10102-440 = "Heehee. Thank you."
10102-450 = "How about we go to a resort next time...?"
10102-460 = "Eek! D-Do you need me to do something?"
10102-470 = "You called me for no reason? How come...?"
10102-480 = "A-A-Atsuko and Misaki look good in their swimsuits..."
10102-490 = "What? Me too? Thank you..."
10102-500 = "I picked up some seaweed that washed up on the beach..."
10102-510 = "We can't eat this, can we...?"
10102-520 = "I'm happy with the sea and the festival..."
10102-530 = "But I'll be so sad when I go back to my everyday life..."
10102-540 = "Heehee. They're selling all sorts of things."
10102-550 = "I won't refuse if you get me one, though. Heeheehee."
10102-560 = "So many pretty things..."
10102-570 = "The shop is closed."
10102-580 = "I didn't get to buy anything, but it was fun looking around."
10102-590 = "I-I don't know which ones are good..."
10102-600 = "So I think you should choose..."
10102-610 = "E-Eek!!"
10102-620 = "Th-They even sell things like that...!"
10102-630 = "You can buy such expensive things like it's nothing... Adults are amazing..."
10102-640 = "Could it be a present for me...?"
10102-650 = "If so, thank you. Heehee..."
10102-660 = "Oh, that one. I had my eye on that. Heehee."

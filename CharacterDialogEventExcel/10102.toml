[translation]
10102-340 = "耶嘿嘿，到處都有\n很多看起來\n很開心的人呢……"
10102-350 = "大海……慶典……"
10102-360 = "說不定現在就是\n我人生中的最高潮……"
10102-370 = "到處都是各種意義上\n我第一次經歷的事……"
10102-380 = "所謂的海邊慶典\n本來就是這樣的嗎……？"
10102-390 = "要，要是不享受到\n最後一刻的話……"
10102-400 = "說不定會後悔到\n睡不著覺的唷……！"
10102-410 = "結束了……\n全都結束了……"
10102-420 = "我的人生中恐怕再也不會\n遇到這樣的日子了吧……"
10102-430 = "咦？還會再帶\n我們來海邊是嗎？"
10102-440 = "耶嘿嘿，非常感謝。"
10102-450 = "那下次可以去\n渡假飯店之類的……"
10102-460 = "噫噫？有，有什麼\n工作要交給我嗎？"
10102-470 = "只是叫一下而已……？\n為什麼……？"
10102-480 = "敦，敦子醬和\n美咲同學都非常\n適合穿泳裝呢……"
10102-490 = "咦？我也很適合？\n謝謝你……"
10102-500 = "我在海邊撿了一些\n被海浪衝上岸的海藻……"
10102-510 = "這個應該不能吃吧……？"
10102-520 = "大海和慶典\n雖然都很有趣……"
10102-530 = "但果然越是這樣，\n回歸日常的時候，\n就會越痛苦吧……"
10102-540 = "耶嘿嘿，這裡\n有賣很多東西呢。"
10102-550 = "如果願意買給我的話，\n我也不會拒絕，耶嘿嘿。"
10102-560 = "有好多看起來不錯的東西……"
10102-570 = "商店已經結束了呢。"
10102-580 = "雖然我買不起，不過\n光是看看也很開心……"
10102-590 = "我，我也不太清楚\n什麼是好東西……"
10102-600 = "所以我覺得還是\n讓老師來挑比較好……"
10102-610 = "噫，噫耶耶！？"
10102-620 = "原，原來還有\n那種東西啊……！"
10102-630 = "昂貴的東西那麼輕易地就……\n大人還真厲害呢……"
10102-640 = "難道是要給我的禮物嗎……？"
10102-650 = "如果是的話\n就太感謝你了，耶嘿嘿……"
10102-660 = "啊，那個，是我也有\n注意到的東西。耶嘿嘿。"

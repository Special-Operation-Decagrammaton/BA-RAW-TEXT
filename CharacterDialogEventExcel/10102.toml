[translation]
10102-340 = "헤헤, 여기저기,\n즐거워 보이는 사람들이\n잔뜩이네요…"
10102-350 = "바다… 축제…"
10102-360 = "어쩌면 지금이 제 인생의\n최고점일지도…"
10102-370 = "여러모로 처음 겪는\n일들뿐이네요…"
10102-380 = "바닷가 축제는\n원래 이런 건가요…?"
10102-390 = "마, 마지막까지\n즐겨두지 않으면,"
10102-400 = "아까워서 잠이\n안 올지도 몰라요…!"
10102-410 = "끝났네요…\n끝나버렸네요…"
10102-420 = "이제 제 인생에 다시\n이런 날들은 없겠죠…"
10102-430 = "네? 다시 바다에\n데려와 주신다고요?"
10102-440 = "헤헤, 감사합니다."
10102-450 = "그럼 다음엔 호텔 리조트\n같은 곳이라도…"
10102-460 = "히엑? 뭐, 뭔가\n시키실 일이라도?"
10102-470 = "그냥 불러봤다고요?\n어째서…?"
10102-480 = "아, 아츠코 쨩이나\n미사키 씨는 수영복이\n잘 어울리네요…"
10102-490 = "네? 저도 그렇다고요?\n감사합니다…"
10102-500 = "해변으로 밀려온\n해조류를 건졌는데요…"
10102-510 = "이건 못 먹는 거겠죠…?"
10102-520 = "바다도 축제도\n즐겁긴 한데요…"
10102-530 = "역시 그럴수록 일상으로\n돌아갔을 때 괴롭겠죠…"
10102-540 = "헤헤, 여긴 여러 가지를\n팔고 있네요."
10102-550 = "사주신다면 거절하지는\n않겠습니다. 헤헤헤."
10102-560 = "좋아 보이는 물건이 잔뜩…"
10102-570 = "상점이 끝나버렸네요."
10102-580 = "전 못 샀지만, 구경하는 건\n재미있었어요…"
10102-590 = "저, 저는 뭐가 좋은지\n잘 몰라서…"
10102-600 = "선생님이 고르시는 게\n좋을 것 같은데요…"
10102-610 = "히, 히에엑?!"
10102-620 = "그, 그런 물건도\n있었네요…!"
10102-630 = "비싼 물건을 그렇게 쉽게…\n어른은 대단하네요…"
10102-640 = "혹시 제 선물인가요…?"
10102-650 = "그렇다면 감사합니다.\n헤헤헤…"
10102-660 = "아, 그거, 저도 눈여겨보던\n물건이네요. 헤헤."

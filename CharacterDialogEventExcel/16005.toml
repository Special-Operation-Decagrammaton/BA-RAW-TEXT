[translation]
16005-200 = "คะ...คุณครู!? นะ.. นี่มัน..?\nถะ... ถ้าอย่างนั้นก็...\nระ...รบกวนด้วยนะคะ...!"
16005-210 = "(แต่งตัวแบบนี้\nคุณครูจะคิดยังไงนะ...)"
16005-220 = "ฮะ... เฮือก...!!!"
16005-230 = "เอ่อ... คือ...\nอืม... คือว่า..."
16005-240 = "ฉะ...ฉันพร้อมแล้วค่ะ...\nคุณครู..."
16005-250 = "(ทำยังไงดี ทำยังไงดี\nทำยังไงดี... ทำยังไงดี...!?)"
16005-260 = "ซึ...ซึรุกิ!"
16005-270 = "จะบุกโจมตีแล้วนะคะ!"

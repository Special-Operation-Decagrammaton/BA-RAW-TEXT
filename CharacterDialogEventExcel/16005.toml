[translation]
16005-200 = "서, 선생님…!? 이, 이건….\n그, 그러니까….\n자, 잘 부탁드립니다…!"
16005-210 = "(이런 모습….\n선생님께서는\n어떻게 생각하실까….)"
16005-220 = "허, 헉…!!!"
16005-230 = "어… 그…\n으음… 그…"
16005-240 = "아, 선생님……\n저, 저는 준비 됐습니다…"
16005-250 = "(어떻게하지, 어떻게하지,\n어떻게하지, 어떻게하지…!?)"
16005-260 = "츠, 츠루기!"
16005-270 = "출격하겠습니다…!"

[translation]
16010-250 = "這個樣子，\n有點不習慣呢…"
16010-260 = "但如果是為了\n「晄輪大祭」的成功…"
16010-270 = "呵呵，\n希望會是一場\n歡樂的慶典。"
16010-280 = "加，加油，\n加油…！老師！"
16010-290 = "雖然是我做的衣服…\n但大家…都不在意嗎…"
16010-300 = "你說你很在意\n這件衣服的尾巴附近…？"
16010-310 = "雖然現在…\n不能說…"
16010-320 = "但之後，\n會偷偷告訴你構造…"
16010-330 = "燃燒熱情…\n果然很浪漫呢。"
16010-340 = "這副打扮，\n雖然還有點不習慣…"
16010-350 = "但如果是為了\n「晄輪大祭」的成功…"
16010-360 = "呵呵，\n希望會是一場\n歡樂的慶典。"
16010-370 = "（不管練習多少次，\n都不太習慣當應援團…）"
16010-380 = "「晄輪大祭」的準備\n已經接近尾聲了。\n還剩一點點…再加把勁吧。"
16010-390 = "謝謝你的幫忙，\n老師。"
16010-400 = "在慶典正式開始時，\n也要享受我們的應援唷。"
16010-410 = "加，加油，\n加油…！老師！"
16010-420 = "雖然是我做的衣服…\n但大家…都不在意嗎…"
16010-430 = "你說你很在意\n這件衣服的尾巴附近…？"
16010-440 = "現在…有點\n不方便說…"
16010-450 = "之後會再偷偷\n告訴你構造的…"
16010-460 = "燃燒熱情…\n果然很浪漫呢。"
16010-470 = "老師，歡迎光臨。\n我正在收集\n「晄輪大祭」需要的東西。"
16010-480 = "請把「晄輪大祭」\n需要的物資帶回這裡。"
16010-490 = "辛苦了，老師。\n如果有剩餘的物資，\n我可以幫你兌換。"
16010-500 = "嗯？怎麼了？"
16010-510 = "那個…之後再為你應援。\n現在有點…"
16010-520 = "嗯，真是好東西啊。\n謝謝你的幫忙。"
16010-530 = "雖然不成敬意…\n這是感謝協助的謝禮。\n希望你能收下。"
16010-540 = "這樣的話…我想大家都會高興的。"
16010-550 = "幫大忙了唷。\n謝謝你，老師。"

[translation]
16010-250 = "พอแต่งตัวแบบนี้...\nมันดูน่าอายนิดหน่อย..."
16010-260 = "แต่เพื่อความสำเร็จ\nของ <ฮาโลเฟสติวัล> แล้ว..."
16010-270 = "ฮุฮุ หวังว่าจะเป็น\nเทศกาลที่สนุกนะ"
16010-280 = "สะ... สู้ๆ\nสู้เขานะ... คุณครู...!"
16010-290 = "ชุดนี้ฉันทำขึ้นเอง...\nแต่คนอื่นจะคิดว่า\nมันมากไปมั้ยนะ..."
16010-300 = "รู้สึกกังวลเรื่อง\nหางของฉันเหรอ...?"
16010-310 = "จะให้พูดตอนนี้...\nก็ยังไงๆ อยู่..."
16010-320 = "ไว้ฉันจะแอบไป\nแก้ชุดให้ใหม่นะ..."
16010-330 = "ความปรารถนาของฉัน\nคือแพชชั่นที่แรงกล้า..."
16010-340 = "พอแต่งตัวแบบนี้...\nมันดูน่าอายนิดหน่อย..."
16010-350 = "แต่เพื่อความสำเร็จ\nของ <ฮาโลเฟสติวัล> แล้ว..."
16010-360 = "ฮุฮุ หวังว่าจะเป็น\nเทศกาลที่สนุกนะ"
16010-370 = "(ไม่ว่าจะฝึกแค่ไหน\nแต่ก็ยังไม่ชินกับ\nเชียร์ลีดเดอร์เท่าไรเลย...)"
16010-380 = "<ฮาโลเฟสติวัล> น่าจะ\nเตรียมใกล้เสร็จหมดแล้ว\nมาออกแรงสู้... อีกนิดเถอะ"
16010-390 = "ขอบคุณที่ช่วยนะ\nคุณครู"
16010-400 = "แล้วพวกฉันจะเชียร์\nในการแข่งกีฬานี้นะ"
16010-410 = "สะ... สู้ๆ\nสู้เขานะ... คุณครู...!"
16010-420 = "ชุดนี้ฉันทำขึ้นเอง...\nแต่คนอื่นจะคิดว่า\nมันมากไปไหมนะ..."
16010-430 = "รู้สึกกังวลเรื่อง\nหางของฉันเหรอ...?"
16010-440 = "จะให้พูดตอนนี้...\nก็ยังไงๆ อยู่..."
16010-450 = "ไว้ฉันจะแอบไป\nแก้ชุดให้ใหม่นะ..."
16010-460 = "ความปรารถนาของฉัน\nคือแพชชั่นที่แรงกล้า..."
16010-470 = "เข้ามาสิคุณครู ฉันเตรียมของ\nที่จำเป็นของฮาโลเฟสติวัลอยู่"
16010-480 = "ช่วยเอาของจำเป็นของ\nฮาโลเฟสติวัลไว้ทางนี้ให้ทีนะ"
16010-490 = "ทำได้ดีมากคุณครู ถ้ามีของอะไร\nเหลืออีก ฉันจะเอาไปแลกให้นะ"
16010-500 = "หือ? เกินไปงั้นเหรอ?\nก็นั่นน่ะสินะ..."
16010-510 = "เอ่อ... ถ้าเป็นเรื่องเชียร์\nฉันจะทำให้ทีหลัง คือว่าตอนนี้มัน..."
16010-520 = "อื้ม ของชิ้นนี้ดีเลย\nขอบคุณที่ช่วยนะ"
16010-530 = "ของตอบแทนเล็ก ๆ น้อย ๆ น่ะ...\nตอบแทนที่มาช่วยกัน ช่วยรับไว้หน่อยนะ"
16010-540 = "ถ้าเป็นอันนี้ละก็...\nทุกคนต้องชอบแน่ๆ"
16010-550 = "ช่วยได้มากเลยละ\nขอบคุณนะคุณครู"

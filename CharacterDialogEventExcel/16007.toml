[translation]
16007-100 = "Welcome to the Red Winter Academy Secretariat, Sensei."
16007-110 = "Did you find Cherino's special Matryoshka on the academy grounds?"
16007-120 = "Trade as much as you want here!"
16007-130 = "Are you enjoying the festival?"
16007-140 = "Tell me right away if you find the president's Matryoshka!"
16007-150 = "Aw, there's not much time left until the festival ends."
16007-160 = "What a shame..."
16007-170 = "Today is the last day of Ivan Kupala's festival."
16007-180 = "Take a close look around Red Winter Academy to make sure you don't forget anything!"
16007-190 = "The festival is over, but the remaining Matryoshka..."
16007-200 = "You can trade as many as you want here!"
16007-210 = "I designed that Matryoshka doll shaped like the president."
16007-220 = "Heehee. Cute, right?"
16007-230 = "I have this feeling when I see the little Matryoshka dolls inside the bigger ones..."
16007-240 = "It's a bit sad..."
16007-250 = "You've won a prize! Congratulations!"
16007-260 = "Oh, you've won! You are lucky as well, Sensei!"
16007-270 = "Heehee. You drew something really good. Please take good care of it!"
16007-280 = "It's an adorable gift. Just like Great Leader Cherino!"

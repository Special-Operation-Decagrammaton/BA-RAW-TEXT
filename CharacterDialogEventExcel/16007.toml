[translation]
16007-100 = "ยินดีต้อนรับสู่ สำนักเลขาธิการ\nสหภาพเรดวินเทอร์ค่ะ\nคุณครู"
16007-110 = "ไม่ทราบว่าคุณครูพบตุ๊กตา\nแม่ลูกดกแบบพิเศษ ของประธาน\nเชริโน่ในเขตโรงเรียนของเราไหมคะ?"
16007-120 = "นำมาแลกที่นี่ได้นะคะ!"
16007-130 = "คุณครู\nสนุกกับงานเทศกาลรึเปล่าคะ?"
16007-140 = "ถ้าคุณครูพบตุ๊กตาแม่ลูกดก\nของท่านประธานล่ะก็...\nรบกวนนำมาให้ฉันด้วยนะคะ!"
16007-150 = "งานเทศกาลครั้งนี้...\nอีกไม่นานก็จะจบลงแล้วนะคะ"
16007-160 = "น่าเสียดายจัง..."
16007-170 = "วันนี้เป็นวันสุดท้าย\nของงานเทศกาลอีวาน คูปาลาค่ะ"
16007-180 = "ตรวจสอบให้ละเอียด\nจะได้แน่ใจว่าไม่ลืมอะไรไว้นะคะ!"
16007-190 = "ถึงงานเทศกาลจะจบไปแล้ว\nแต่สามารถนำตุ๊กตาแม่ลูกดกที่เหลืออยู่"
16007-200 = "มาแลกที่นี่\nได้ตลอดเลยนะคะ"
16007-210 = "ตุ๊กตาแม่ลูกดก\nที่หน้าตาเหมือนท่านประธาน\nฉันเป็นคนออกแบบเองค่ะ"
16007-220 = "ฮุฮุ...\nน่ารักใช่ไหมคะ?"
16007-230 = "ตุ๊กตาแม่ลูกดกน่ารักๆ พวกนั้น...\nพอได้มองตุ๊กตาตัวน้อยๆ\nแบบนั้นแล้ว..."
16007-240 = "ก็รู้สึกปวดใจเหมือนกันนะคะ"
16007-250 = "ถูกรางวัลแล้วค่ะ\nยินดีด้วยค่ะ!"
16007-260 = "อุ๊ย ถูกรางวัลด้วยค่ะ!\nคุณครูนี่โชคดีจริงๆ เลยนะคะ"
16007-270 = "ฮิฮิ ตาถึงมากเลยค่ะ\nกรุณาใช้มันอย่างดีด้วยนะคะ!"
16007-280 = "ของขวัญที่น่ารักๆ\nเหมือนท่านประธานเลยค่ะ!"

[translation]
16007-100 = "赤冬學園事務局\n歡迎您的到來。\n老師。"
16007-110 = "您在學園用地尋找潔莉諾\n會長的特製俄羅斯娃娃\n嗎？"
16007-120 = "在這個地方\n可以進行交換！"
16007-130 = "慶典\n玩得愉快嗎？"
16007-140 = "會長的俄羅斯娃娃\n找到時，隨時可以\n來找我！"
16007-150 = "慶典現在\n快要結束了呢…"
16007-160 = "真可惜…。"
16007-170 = "今天是伊凡·庫帕拉\n慶典的\n最後一天。"
16007-180 = "為了防止有忘記帶走的物品，\n把赤冬學園\n仔細繞一下吧！"
16007-190 = "雖然慶典結束了，\n剩下的俄羅斯娃娃"
16007-200 = "可以在這裡\n進行交換。"
16007-210 = "那個有會長外型的\n俄羅斯娃娃\n是我設計的。"
16007-220 = "嘿嘿…\n可愛吧？"
16007-230 = "看著可愛的\n俄羅斯娃娃\n裂開的模樣…"
16007-240 = "總覺得很心痛。"
16007-250 = "中獎！\n恭喜你！"
16007-260 = "哇！中獎了！\n老師運氣不錯呢。"
16007-270 = "嘿嘿，抽到了不錯的物品呢。\n請珍惜使用！"
16007-280 = "是像潔莉諾會長一樣\n可愛的禮物呢！"

[translation]
10097-10 = "이것은 어디까지나\n사건의 조사를\n위한 잠입 작전……\n무사히 끝났으면 좋겠네요."
10097-20 = "RABBIT 1, 작전 준비를\n모두 마쳤습니다.\n선생님, 지시를."
10097-30 = "마지막으로\n새우가 듬뿍 들어간\n샌드위치를 먹은 것이\n언제였었는지……"
10097-40 = "(너무 들뜬 것처럼\n보이면 안 될 텐데……)"
10097-50 = "자리를 비우는 동안\n깡총이는,"
10097-60 = "발키리 생활안전국의\n학생 여러분께 돌봐달라고\n부탁드렸습니다."
10097-70 = "가끔은 깡총이가\nRABBIT 소대보다,"
10097-80 = "생활안전국 학생 여러분을\n더 좋아하는 것처럼 보여서\n서운할 때도 있답니다."
10097-90 = "RABBIT 소대의\n첫 원정 작전인가……\n살짝 가슴이 두근거리는걸."
10097-100 = "이번에야말로,\n우리 SRT가\n나설 차례라고!"
10097-110 = "RABBIT 2, 준비 완료!\n언제든지 들어갈 수 있어!"
10097-120 = "음, 일단은 평범한\n관광객처럼\n차려입어 보았는데……"
10097-130 = "수상해 보이진……\n않겠지?"
10097-140 = "저기…… 선생님,\n내 배에 뭐라도 묻었어?"
10097-150 = "사실 개인적으로 해산물은\n그다지 좋아하지 않아.\n보존이 까다로우니까."
10097-160 = "뭐, 말린 오징어 같은\n건어물이라면……\n나도 좋아해!"
10097-170 = "히이…… 공포 소설 속에\n나오는 어촌 마을 같아……"
10097-180 = "빨리 학교로\n돌아가고 싶어……"
10097-190 = "아니, 저희 학교는\n이미 없어졌었죠……"
10097-200 = "호, 호, 혹시 부르셨나요……?"
10097-210 = "(어쩌다가 이런\n외진 마을까지\n오게 되어버린 걸까……)"
10097-220 = "이 머리는 작전을\n나오기 직전에\n미야코 쨩이 땋아줬어요."
10097-230 = "후후…… 이거,\n귀여울지도……"
10097-240 = "참새도, 족제비도,\n갈매기도……"
10097-250 = "야생 동물들은\n어째서 제게 계속\n다가오는 걸까요……?"
10097-260 = "이곳이 새우로 유명한 야토우라 마을…"
10097-270 = "직접 와보는 건 처음이네."
10097-280 = "도대체 이 마을에서\n무슨 일이 벌어지고\n있는 거야?"
10097-290 = "안개 탓인가…?"
10097-300 = "여름인데도 조금\n서늘한 느낌이네…"
10097-310 = "으음, 확실히.\n어디선가 파멸의 향기가\n느껴지는 걸…"
10097-320 = "SRT의 작전이라지만,"
10097-330 = "그래도 여름 바다에 나오니\n조금은 기분 전환이\n되는 것 같네."
10097-340 = "이 튜브가 수상해 보인다고?"
10097-350 = "뭐, 평범하게\n물놀이할 때 쓰는\n튜브는 아니지. 후후…"
10097-620 = "이곳이 새우로 유명한 야토우라 마을…"
10097-630 = "직접 와보는 건 처음이네."
10097-640 = "도대체 이 마을에서\n무슨 일이 벌어지고\n있는 거야?"
10097-650 = "<깊은 곳의 존재들> 말이야…"
10097-660 = "그 소문이 사실이라면\n엄청나게 큰 폭탄에도\n견딜 수 있으려나?"
10097-670 = "그 쿠사야라는 거,\n발효만으로도 그렇게\n강렬한 향기가 나는 거야?"
10097-680 = "한 번 만들어\n보고 싶은 걸…\n쿠히히"
10097-690 = "후후. 이제 다시"
10097-700 = "맛있는\n바질 새우 샌드위치를\n맛볼 수 있으려나?"
10097-710 = "안개 탓인가…?"
10097-720 = "여름인데도 조금\n서늘한 느낌이네…"
10097-730 = "으음, 확실히.\n어디선가 파멸의 향기가\n느껴지는 걸…"
10097-740 = "SRT의 작전이라지만,"
10097-750 = "그래도 여름 바다에 나오니\n조금은 기분 전환이\n되는 것 같네."
10097-760 = "이 튜브가 수상해 보인다고?"
10097-770 = "뭐, 평범하게\n물놀이할 때 쓰는\n튜브는 아니지. 후후…"

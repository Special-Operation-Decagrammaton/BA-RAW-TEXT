[translation]
10097-10 = "這終究只是為了\n調查事件的潛入作戰……\n希望能順利結束。"
10097-20 = "RABBIT1，\n已完成作戰準備。\n老師，請下指示。"
10097-30 = "最後一次吃到\n放滿蝦子的三明治\n是什麼時候呢。"
10097-40 = "（小心不要\n讓人覺得\n很興奮……）"
10097-50 = "我們不在的這段期間，\n蹦蹦的照顧"
10097-60 = "交給了女武神\n生活安全局的大家。"
10097-70 = "有時，我覺得蹦蹦\n比起RABBIT小隊，"
10097-80 = "好像更喜歡\n生活安全局的大家，\n覺得有點難過……"
10097-90 = "RABBIT小隊首次的\n遠征作戰啊……\n心情有點興奮。"
10097-100 = "現在正是\n我們SRT出馬的時候！"
10097-110 = "RABBIT2，準備完畢！\n隨時都能出發！"
10097-120 = "我姑且也打扮得像\n普通的觀光客一樣了……"
10097-130 = "看起來……\n應該不會很奇怪吧？"
10097-140 = "那個……老師，\n我的肚子上沾到\n什麼東西了嗎？"
10097-150 = "我，其實\n不是很喜歡海產。\n因為很難保存。"
10097-160 = "啊啊不過，像魷魚乾\n之類的乾貨的話……\n我也很喜歡！"
10097-170 = "噫噫……\n簡直就像恐怖小說裡\n會出現的漁村一樣……"
10097-180 = "好想趕快回學園去……"
10097-190 = "啊，可是我們的\n學園已經……"
10097-200 = "難，難，難道\n你找我嗎……？"
10097-210 = "（為什麼會跑到這種\n偏僻的村莊呢……）"
10097-220 = "這個髮型，是都子醬在\n作戰出發前幫我綁的。"
10097-230 = "呵呵……這個髮型，\n好像有點可愛……"
10097-240 = "從麻雀、黃鼠狼\n到海鷗……"
10097-250 = "野生的動物們\n跑到我身邊的理由\n究竟是什麼呢……"
10097-260 = "這裡就是以蝦子聞名的夜戶浦村…"
10097-270 = "實際到這裡來\n好像還是第一次呢。"
10097-280 = "究竟，這個村子裡\n發生了什麼呢？"
10097-290 = "是因為霧的關係嗎……？"
10097-300 = "明明是夏天卻有點冷……"
10097-310 = "唔嗯。好像確實\n有股毀滅的氣息……"
10097-320 = "雖然說是SRT的作戰，"
10097-330 = "但夏天的海和平時不同，\n能轉換一下心情呢。"
10097-340 = "這個游泳圈很奇怪？"
10097-350 = "這個嘛，畢竟確實\n不是平時用的那種。\n咯嘻嘻……"
10097-620 = "這裡就是以蝦子聞名的夜戶浦村…"
10097-630 = "實際到這裡來\n好像還是第一次呢。"
10097-640 = "究竟，這個村子裡\n發生了什麼呢？"
10097-650 = "「深處的存在」……"
10097-660 = "如果那個傳聞是真的，\n會連超大的炸彈\n也抵擋的了嗎？"
10097-670 = "「臭魚乾」光是發酵\n就能散發出那種味道嗎？"
10097-680 = "好像，有點想試做\n一次看看……咯嘻嘻。"
10097-690 = "呵呵。這下終於……"
10097-700 = "可以吃到好吃的\n羅勒鮮蝦三明治了吧？"
10097-710 = "是因為霧的關係嗎……？"
10097-720 = "明明是夏天卻有點冷……"
10097-730 = "唔嗯。好像確實\n有股毀滅的氣息……"
10097-740 = "雖然說是SRT的作戰，"
10097-750 = "但夏天的海和平時不同，\n能轉換一下心情呢。"
10097-760 = "這個游泳圈很奇怪？"
10097-770 = "這個嘛，畢竟確實\n不是平時用的那種。\n咯嘻嘻……"

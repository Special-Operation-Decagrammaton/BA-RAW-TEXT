[translation]
10097-10 = "Today's mission is to infiltrate and investigate... I hope we don't run into any trouble."
10097-20 = "RABBIT 1, preparations completed. Sensei, your orders, please."
10097-30 = "When was the last time I had a shrimp sandwich...?"
10097-40 = "(I shouldn't look too excited...)"
10097-50 = "I've made arrangements for our absence."
10097-60 = "The students at the Valkyrie Public Safety Bureau will be watching Bun Bun while we're gone."
10097-70 = "I have to admit, I get a little jealous sometimes..."
10097-80 = "It's just that... Bun Bun seems to like the Public Safety Bureau students more than us sometimes."
10097-90 = "RABBIT Squad's first away mission... I'm getting excited."
10097-100 = "This is a chance for SRT to show our stuff!"
10097-110 = "RABBIT 2, preparations completed! We can enter at any time!"
10097-120 = "Well, I tried to dress like a normal tourist..."
10097-130 = "I don't look suspicious... Do I?"
10097-140 = "Hey... Sensei, is there something on my stomach?"
10097-150 = "I don't personally like seafood much. It's too difficult to preserve."
10097-160 = "I do like dried seafood though, like dried squid!"
10097-170 = "Eek... I-It's just like a fishing village from a h-horror story..."
10097-180 = "I-I just w-wanna go back to th-the school..."
10097-190 = "Oh, w-wait... I don't have a school t-to go back to..."
10097-200 = "D-Did you call me, by any chance...?"
10097-210 = "(How did we end up in such a remote village...?)"
10097-220 = "Miyako braided my hair b-before we came on this mission."
10097-230 = "Heehee... This could be cute..."
10097-240 = "Sparrows, weasels, seagulls..."
10097-250 = "Wh-Why do wild animals keep c-coming to me...?"
10097-260 = "This is Yatoura Village, renowned as the birthplace of shrimp..."
10097-270 = "This is my first time visiting in person."
10097-280 = "What exactly is going on in this village?"
10097-290 = "Is it because of the fog...?"
10097-300 = "It's summer, but there's a bit of a chill..."
10097-310 = "Hm, 100% percent. I can smell a sense of doom from somewhere..."
10097-320 = "Even though it's for an SRT operation..."
10097-330 = "It feels nice and refreshing to be out by the sea in the summer."
10097-340 = "You think this tube looks suspicious?"
10097-350 = "Well, it's not your everyday float used for water play. Heehee..."

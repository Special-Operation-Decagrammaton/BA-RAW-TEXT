[translation]
10097-10 = "นี่เป็นปฏิบัติการแฝงตัวที่\nแสนอันตราย เพื่อสืบข้อมูล\nเกี่ยวกับเหตุการณ์ที่เกิดขึ้น...\nหวังว่าจะผ่านไปได้ด้วยดีนะคะ"
10097-20 = "RABBIT 1 เตรียมพร้อม\nสำหรับออกปฏิบัติการแล้วค่ะ\nคุณครูคะ! ขอคำสั่งด้วยค่ะ!"
10097-30 = "ครั้งสุดท้ายที่ได้กิน\nแซนด์วิชสอดไส้กุ้งแน่นๆ\nแบบนี้คือเมื่อไรกันนะ..."
10097-40 = "(ไม่ควรทำตัวให้ดู\nหละหลวมแบบนี้เลยแท้ๆ...)"
10097-50 = "ตอนที่ฉันไม่อยู่\nก็เลยเอาเจ้าเปียงโกะ"
10097-60 = "ไปฝากให้ทางสำนัก\nรักษาความปลอดภัยของวัลคิรี่\nช่วยดูแลแทนน่ะค่ะ"
10097-70 = "บางครั้งฉันก็รู้สึกเสียใจนิดๆ\nที่ดูเหมือนว่าเจ้าเปียงโกะ"
10097-80 = "จะชอบคนของทางสำนักรักษา\nความปลอดภัยมากกว่า\nสมาชิกกองทหาร RABBIT อีกค่ะ"
10097-90 = "อาจเพราะนี่เป็นการเดินทางไกล\nเพื่อออกปฏิบัติการครั้งแรก...\nก็เลยตื่นเต้นนิดหน่อยน่ะ"
10097-100 = "คราวนี้ถึงเวลา\nออกโรงของ SRT แล้ว! "
10097-110 = "RABBIT 2 เตรียมพร้อม!\nพร้อมเข้าปฏิบัติการทุกเมื่อ!"
10097-120 = "อืม ตอนนี้ก็เปลี่ยนมาใส่\nชุดธรรมดาเหมือนกับ\nนักท่องเที่ยวคนหนึ่งแล้ว..."
10097-130 = "ไม่ได้ดูแปลกๆ ใช่รึเปล่า? "
10097-140 = "นี่... คุณครู ที่หน้าท้อง\nของฉันมีอะไรติดอยู่รึไง?"
10097-150 = "ส่วนตัวแล้วฉันไม่ได้\nชอบอาหารทะเลขนาดนั้นหรอก\nมันเก็บรักษายากน่ะ"
10097-160 = "ก็นะ ถ้าเป็นพวกปลาหมึก\nตากแห้งละก็...\nฉันเองก็ชอบเหมือนกัน!"
10097-170 = "งื้อ... ดูเหมือนหมู่บ้าน\nชาวประมงที่อยู่ในนิยาย\nสยองขวัญเลย..."
10097-180 = "อยากกลับไป\nโรงเรียนเร็วๆ จัง..."
10097-190 = "ไม่สิ... โรงเรียนของเรา\nไม่เหลืออยู่อีกแล้วนี่คะ..."
10097-200 = "มะ... ไม่ทราบว่า ระ...เรียกฉันเหรอคะ...?"
10097-210 = "(ทำไมถึงมาที่\nหมู่บ้านที่อยู่ห่างไกล\nแบบนี้ได้กันนะ...)"
10097-220 = "ผมทรงนี้...\nมิยาโกะจังถักให้\nก่อนที่จะออกมาปฏิบัติการค่ะ"
10097-230 = "ฮิฮิ... แบบนี้...\nก็อาจจะดูน่ารักก็ได้..."
10097-240 = "ทั้งนกกระจาบ ทั้งเพียงพอน...\nแล้วก็นกนางนวล..."
10097-250 = "ทำไมพวกสัตว์ป่า\nถึงชอบเข้าหาฉัน\nอยู่เรื่อยเลยนะคะ...?"
10097-260 = "ที่นี่คือหมู่บ้านยาโตอูระ\nที่โด่งดังเรื่องแหล่งกำเนิดกุ้ง..."
10097-270 = "เพิ่งเคยมาครั้งแรก\nเลยนะเนี่ย"
10097-280 = "มีเรื่องอะไรเกิดขึ้น\nในหมู่บ้านนี้กันนะ"
10097-290 = "เป็นเพราะหมอกหรือเปล่านะ...?"
10097-300 = "ฤดูร้อนแท้ๆ แต่รู้สึก\nเย็นสบายดีจัง..."
10097-310 = "อืม ฉันได้กลิ่น\nความพินาศ\nจากที่ไหนจริงๆ นะ..."
10097-320 = "ถึงจะมาทำปฏิบัติการของ SRT"
10097-330 = "แต่พอได้มาทะเลฤดูร้อน\nก็เหมือนได้เปลี่ยน\nบรรยากาศไปเลยเนอะ"
10097-340 = "ห่วงยางอันนี้\nดูน่าสงสัยงั้นเหรอ?"
10097-350 = "ก็นะ มันไม่ใช่\nห่วงยางที่เอาไว้\nเล่นน้ำทั่วไปหรอก ฮุฮุ..."
10097-620 = "ที่นี่คือหมู่บ้านยาโตอูระ\nที่โด่งดังเรื่องแหล่งกำเนิดกุ้ง..."
10097-630 = "เพิ่งเคยมาครั้งแรก\nเลยนะเนี่ย"
10097-640 = "มีเรื่องอะไรเกิดขึ้น\nในหมู่บ้านนี้กันนะ"
10097-650 = "เรื่องตัวตนแห่งห้วงลึกน่ะ..."
10097-660 = "ถ้าข่าวลือนั่นเป็นความจริง\nมันจะทนระเบิดลูกมหึมา\nได้มั้ยนะ?"
10097-670 = "คูซายะนั่นน่ะ\nแค่หมักก็มีกลิ่นแรง\nขนาดนั้นเลยเหรอ?"
10097-680 = "อยากลองทำดู\nสักครั้งจัง... ฮิฮิฮิ"
10097-690 = "ฮุฮุ ทีนี้..."
10097-700 = "จะได้ชิมแซนด์วิชกุ้งโหระพา\nอร่อยๆ อีกรอบมั้ยนะ?"
10097-710 = "เป็นเพราะหมอกหรือเปล่านะ...?"
10097-720 = "ฤดูร้อนแท้ๆ แต่รู้สึก\nเย็นสบายดีจัง..."
10097-730 = "อืม ฉันได้กลิ่น\nความพินาศ\nจากที่ไหนจริงๆ นะ..."
10097-740 = "ถึงจะมาทำปฏิบัติการของ SRT"
10097-750 = "แต่พอได้มาทะเลฤดูร้อน\nก็เหมือนได้เปลี่ยน\nบรรยากาศไปเลยเนอะ"
10097-760 = "ห่วงยางอันนี้\nดูน่าสงสัยงั้นเหรอ?"
10097-770 = "ก็นะ มันไม่ใช่\nห่วงยางที่เอาไว้\nเล่นน้ำทั่วไปหรอก ฮุฮุ..."

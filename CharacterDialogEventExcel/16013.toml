[translation]
16013-240 = "우물쭈물 거릴\n시간이 없어, 선생님!\n어서 가자!"
16013-250 = "내가 있는 이상,\n대충이라는 건 없으니까!"
16013-260 = "후훗, 순조롭네!"
16013-270 = "힘내!\n얼마 안 남았어!"
16013-280 = "혹시 모르니까\n한 번 더 확인해볼까?"
16013-290 = "히, 히익!?\n깜짝이야……\n놀랐잖아, 선생님!"
16013-300 = "아, 아까부터 뭐야...\n자꾸 부르지 말라구."
16013-310 = "아아, 정말!\n용건이 있으면\n제대로 말로 해줘!"
16013-320 = "응? 무슨 일이야?"

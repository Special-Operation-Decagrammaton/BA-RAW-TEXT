[translation]
16013-240 = "ไม่มีเวลามารีรอ\nอยู่นะคุณครู!\nรีบไปกันเถอะ!"
16013-250 = "อยู่กับฉันทั้งคน\nไม่มีอะไรที่ทำลวกๆ หรอก!"
16013-260 = "ฮุฮุ ไร้ปัญหา!"
16013-270 = "พยายามเข้านะ!\nเหลืออีกไม่เยอะแล้ว!"
16013-280 = "แค่เผื่อไว้ก่อนน่ะ\nลองตรวจสอบดูอีกรอบไหม?"
16013-290 = "ฮะ... เฮือก!?\nตกใจหมดเลย...\nฉันตกใจนะ คุณครู!"
16013-300 = "ทะ... ทำอะไรตั้งแต่เมื่อกี้แล้ว...\nอย่าเอาแต่เรียกสิ"
16013-310 = "อ่า... จริงๆ เลย!\nถ้ามีธุระอะไร\nก็บอกกันดีๆ สิ!"
16013-320 = "อื้อ มีอะไรเหรอ?"

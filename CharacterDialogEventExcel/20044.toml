[translation]
20044-10 = "ฉันไม่ค่อยรู้กติกา\nการแข่งเบสบอลเท่าไร..."
20044-20 = "แต่ความคึกคักที่ส่งต่อออกมา\nก็ทำให้ฉันใจเต้นไปด้วยนะคะ"
20044-30 = "บรรยากาศน่าตื่นเต้น\nจังเลยค่ะเทรนเนอร์"
20044-40 = "ระวังอาการ\nขาดน้ำด้วยนะคะ"
20044-50 = "ตอนนี้เหมือนจะ\nเกิดเรื่องที่ห่างไกลกับ\nจิตวิญญาณแห่งการ\nแข่งขันกีฬาเลยค่ะ"
20044-60 = "ต้องทำอะไรสักอย่าง\nแล้วค่ะเทรนเนอร์!"
20044-70 = "ความปรารถนาในชัยชนะ\nก็เป็นสิ่งสำคัญอยู่หรอก"
20044-80 = "แต่ถ้ามันมากเกินไป\nก็อาจก่อให้เกิด\nปัญหาอื่นได้ค่ะ"
20044-90 = "ฉันได้เรียนรู้\nอีกเรื่องเลยนะคะ"
20044-100 = "ทุกอย่างเหมือนจะ\nจบลงด้วยดีแล้วค่ะ"
20044-110 = "งั้นเรามาเทรนด้วยกัน\nเพื่อเป็นการฉลอง\nดีมั้ยคะ?"
20044-120 = "ตอนแรกฉันแค่ใส่ชุดนี้\nเพื่อไม่ให้เตะตาใครน่ะค่ะ...\nแต่ในแง่ของประสิทธิภาพ\nก็ไม่เลวเลยนะคะ"
20044-130 = "เรียกฉันเหรอคะ เทรนเนอร์?\nต้องการอะไรที่เย็นสดชื่นเหรอคะ?"
20044-140 = "เทรนเนอร์? เป็นอะไรไปคะ?\nอยากดูกล้ามเนื้อที่ขา\nของฉันเหรอคะ?"
20044-150 = "เชิญมาจับดู\nให้เต็มที่เลยค่ะ ฮุฮุ"
20044-160 = "น้ำหนักของเครื่องนี้น่ะเหรอคะ?"
20044-170 = "รู้สึกว่าน่าจะ\n25 กิโลนะคะ"
20044-180 = "เป็นน้ำหนักที่เหมาะกับ\nการออกกำลังกายแบบ\nใช้แรงน้อยแต่ทำซ้ำหลายครั้งค่ะ"
20044-400 = "มาแล้วเหรอคะ เทรนเนอร์"
20044-410 = "มาดูก่อนได้เลยค่ะ\nว่ามีของที่ถูกใจหรือเปล่า"
20044-420 = "พอได้ดูแลอุปกรณ์เทรนนิ่งบ่อยๆ"
20044-430 = "ฉันก็เลยปรับตัวให้เข้ากับ\nงานแบบนี้ได้เร็วเลยค่ะ"
20044-440 = "รบกวนตรวจสอบด้วยนะคะ\nว่าไม่ได้ลืมอะไรไป"
20044-450 = "นี่คงเหมือนกับอุปกรณ์เทรนนิ่งค่ะ\nทั้งคุณภาพ ปริมาณ การแสดงผลที่รวดเร็ว..."
20044-460 = "ทุกปัจจัยล้วนสำคัญหมดเลยนะคะ"
20044-470 = "ถึงใครจะว่ายังไง แต่ฉันก็เป็นหัวหน้า\nชมรมออกกำลังกายของมิลเลเนียมค่ะ"
20044-480 = "แม้ตอนนี้จะมาลองทำ\nงานพาร์ทไทม์ชั่วคราวก็เถอะ"
20044-490 = "ค่ะ นี่ค่ะ"
20044-500 = "ต้องการอะไรอีกมั้ยคะ?\nเทรนเนอร์?"
20044-510 = "ได้เลยค่ะ รอเดี๋ยวนะคะ"
20044-520 = "ฉันแถมเครื่องดื่มให้แก้วหนึ่งดีมั้ยคะ?"

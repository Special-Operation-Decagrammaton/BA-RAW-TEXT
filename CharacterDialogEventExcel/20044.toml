[translation]
20044-10 = "야구 경기의 규칙은\n정확히 모릅니다만……"
20044-20 = "전해지는 열기만으로,\n저까지 가슴이 뛰네요."
20044-30 = "엄청난 분위기로군요.\n트레이너."
20044-40 = "탈수 현상에는\n조심해 주세요."
20044-50 = "아무리 봐도\n스포츠 정신과는,\n거리가 먼 일이 벌어지고 \n있는 것 같습니다."
20044-60 = "무언가 해야 합니다,\n트레이너!"
20044-70 = "이기고 싶다는 열망은\n중요한 것입니다만,"
20044-80 = "그것이 지나치면\n또 다른 문제를\n일으키고 마는군요."
20044-90 = "한 가지\n배운 것 같습니다."
20044-100 = "모든 것이 무사히\n종료된 것 같습니다."
20044-110 = "그렇다면 그 기념으로,\n함께 트레이닝이라도\n어떠십니까?"
20044-120 = "일단은 눈에 띄지 않기 위해\n입은 복장입니다만……\n기능적인 측면에서도,\n괜찮네요."
20044-130 = "트레이너?\n부르셨나요?"
20044-140 = "트레이너? 왜 그러시나요?\n제 다리 근육을 확인하고\n싶으신 건가요?"
20044-150 = "그렇다면 얼마든지\n만져 보셔도 좋습니다.\n후후."
20044-160 = "이 드링크 장비 무게요?"
20044-170 = "체감상 25kg 정도\n되는 것 같습니다."
20044-180 = "저중량 고반복 운동을\n지속하기에는, 딱\n좋다고도 할 수 있겠죠."
20044-400 = "오셨군요. 트레이너."
20044-410 = "마음에 드는 물건이 있으실지,\n보고 가시죠."
20044-420 = "트레이닝 비품 관리를 하다 보니,"
20044-430 = "이런 일에도 그럭저럭\n빠르게 적응할 수 있더군요."
20044-440 = "잊어버린 것이 없을지,\n한 번 더 확인해 주세요."
20044-450 = "개수를 파악해서,\n빠르게 제공한다……"
20044-460 = "순발력을 기를 수\n있을 것 같네요."
20044-470 = "일을 하는 중이지만,\n바른 자세를\n의식하고 있습니다."
20044-480 = "저는 트레이닝부의\n부장이니까요."
20044-490 = "네. 여기 있습니다."
20044-500 = "더 필요한 것은 없으신가요,\n트레이너?"
20044-510 = "알겠습니다. 잠시만요."
20044-520 = "덤으로 음료수도 한 잔 드릴까요?"

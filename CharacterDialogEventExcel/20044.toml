[translation]
20044-10 = "雖然我不太清楚\n棒球的規則……"
20044-20 = "但這股熱情……\n連我都感到心胸澎湃了。"
20044-30 = "……真是驚人的熱情呢。"
20044-40 = "得小心脫水症狀才行。"
20044-50 = "與運動家精神\n相去甚遠的──\n某種不好的事情\n似乎正在發生。"
20044-60 = "我們走吧，指導員。"
20044-70 = "對勝利的執著\n如果超過限度……"
20044-80 = "就會引發預期之外\n的問題呢。"
20044-90 = "又學到了新的一課。"
20044-100 = "那麼指導員，\n既然事態已經\n有所收斂……"
20044-110 = "現在就開始訓練吧。"
20044-120 = "這套制服……\n也兼備機能性，\n真不錯呢。"
20044-130 = "指導員？\n你找我嗎？"
20044-140 = "……想確認我\n腿部的肌肉是嗎？"
20044-150 = "呵呵，如果是這樣的話，\n請不必客氣。"
20044-160 = "這台飲料機？"
20044-170 = "大約25kg左右吧。"
20044-180 = "對低負荷的訓練\n來說剛剛好。"
20044-400 = "歡迎，請慢慢看吧。"
20044-410 = "如果能找到喜歡的\n東西就好了呢。"
20044-420 = "盤點完成得\n比預期中還早。"
20044-430 = "因為跟訓練部的\n備品管理有點類似。"
20044-440 = "有沒有漏買什麼，\n請再確認一次吧。"
20044-450 = "掌握數量，\n並迅速提供……"
20044-460 = "感覺能鍛鍊爆發力呢。"
20044-470 = "即便在工作中，\n我也會留意正確的姿勢。"
20044-480 = "畢竟我可是\n訓練部的部長啊。"
20044-490 = "來，請收下吧。"
20044-500 = "還有其他需要的東西嗎？"
20044-510 = "我明白了。\n請稍等。"
20044-520 = "我正在免費發送飲料，\n要不要來一杯呢？"

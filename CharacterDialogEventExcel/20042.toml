[translation]
20042-700 = "เบื่อจัง..."
20042-710 = "ถ้าเอาเครื่องเล่นเกม\nง่ายๆ มาด้วย\nก็ดีน่ะสิ..."
20042-720 = "อยากรู้สึกถึงคลื่น\nแม่เหล็กไฟฟ้าได้จัง..."
20042-730 = "คิดว่าเป็นผ้าใบธรรมชาติ\nแล้ววาดอะไรดีมั้ยนะ"
20042-740 = "(อ๊ะ ลืมลบรูป...\nตรงผนังซะสนิทเลย)"
20042-750 = "(เอาเถอะน่า คงไม่มี\nเรื่องอะไรมากหรอก)"
20042-760 = "อืม เป็นประสบการณ์\nที่ไม่ได้แย่อย่างที่คิดนะ"
20042-770 = "โดยเฉพาะมิซึทากิ\nที่ทำกินตอนเย็น\nมันยอดเยี่ยมมากเลยละ..."
20042-780 = "ถ้ามีโทรศัพท์มาด้วย\nจะให้มาอีกครั้ง\nก็น่าจะได้นะ"
20042-790 = "นะ... แน่นอนว่าฉัน\nไม่ได้จะบอกว่า\nชอบการแคมป์ปิ้งหรอกนะ...!"
20042-800 = "ปะ... ปกติสิ้นปีจะมี\nรายการสนุกๆ เยอะเลย\nอดดูถ่ายทอดสดสินะเนี่ย..."
20042-810 = "รุ่นพี่จิฮิโระทำเกินไปแล้ว!"
20042-820 = "อ๊ะ ก้อนเมฆตรงนั้น...\nรูปร่างเหมือนเซิร์ฟเวอร์\nคอมพิวเตอร์เลย"
20042-830 = "มะ... ไม่ได้วางมือจาก\nคีย์บอร์ดนานเลย\nพออยู่นิ่งๆ มันก็\nคันไม้คันมือจังเลยนะ"
20042-840 = "คุณครู มีของเล่นอะไร\nที่ใช้มือเล่นได้บ้างหรือเปล่า?\nยางยืดหรืออะไรก็ได้!"
20042-850 = "คุณครูกำลังสนุก\nกับการออกแคมป์อยู่สินะ"
20042-860 = "งั้นฉันก็ลองสนุก\nดูด้วยดีมั้ยนะ?"

[translation]
20042-700 = "好閒哦……"
20042-710 = "要是有把攜帶型遊戲機\n帶過來就好了……"
20042-720 = "好像有點想\n感受到電磁波……"
20042-730 = "在自然的畫布上\n畫點東西吧。"
20042-740 = "（啊，壁畫……\n　忘記擦掉了）"
20042-750 = "（算了，反正應該\n　不會出什麼事吧？）"
20042-760 = "好像比想像中\n還好一點？"
20042-770 = "畢竟晚餐的水炊鍋\n還挺好吃的……"
20042-780 = "要是能帶手機來的話，\n好像會想再來一次。"
20042-790 = "當，當然我並沒有\n喜歡上露營哦……！"
20042-800 = "嗚嗚……居然看不了\n年底的特別節目……"
20042-810 = "千尋前輩好過分！"
20042-820 = "那朵雲……好像跟\n伺服器電腦有點像。"
20042-830 = "嗚嗚，好想敲鍵盤～\n太閒了啦～！"
20042-840 = "老師，你有帶什麼\n能用手玩的玩具嗎？\n就算是橡皮筋也可以！"
20042-850 = "老師好像還挺\n樂在其中的呢，\n露營。"
20042-860 = "那，我也來稍微\n試著享受一下吧！"

[translation]
16012-120 = "啊，呀齁～老師。\n感覺很熱鬧呢。\n要一起去看看嗎？"
16012-130 = "新年的時候\n有很多和平時\n不一樣的美食呢…"
16012-140 = "不知不覺\n就把錢花掉了。"
16012-150 = "哦？怎麼了嗎，老師？\n啊，難道…\n你想和我說話？"
16012-160 = "真是的，別那樣戳我！\n難得的和服會亂掉啦。"
16012-170 = "清洗…\n不，不是那個問題！"
16012-180 = "我可能更喜歡褶裙吧……\n畢竟活動起來很方便。"
16012-190 = "問我要不要\n把頭髮往上紮…？"
16012-200 = "那種髮型\n又不適合我…\n真的好嗎…"
16012-210 = "不知不覺\n就把錢花掉了。"
16012-220 = "哦？怎麼了嗎，老師？\n啊，難道……\n你想和我說話？"
16012-230 = "真是的，別那樣戳我！\n難得的和服會亂掉啦。"
16012-240 = "清洗……\n不，不是那個問題！"
16012-250 = "我可能更喜歡褶裙吧……\n畢竟活動起來很方便。"
16012-260 = "問我要不要\n把頭髮往上紮……？"
16012-270 = "那種髮型\n又不適合我……\n真的好嗎……"
16012-280 = "總覺得事情\n好像會變得很麻煩……"
16012-290 = "我的直覺，總是只有\n在不好的時候才會中……"
16012-300 = "雖然有預感\n會變成這樣……"
16012-310 = "不過，和老師一起\n總會有辦法的吧？"
16012-320 = "哈啊～累了累了。\n總算是順利結束，\n太好了。"
16012-330 = "御節料理很好吃，\n又有飽餐一頓！"
16012-840 = "這些，全～都是老師要做的嗎？\n總覺得很辛苦……"
16012-850 = "總之，有事的話就說一聲吧。"
16012-860 = "現在不是假裝從容的時候了！\n來，加油吧，老師。"
16012-870 = "嗯？你叫我？\n要買什麼給我嗎？"
16012-880 = "呵呵，開玩笑的。"
16012-890 = "我並不討厭熱鬧哦。\n不然也不會和\n美食研究會的大家在一起了吧？"
16012-900 = "什麼嘛，老師也是\n想做就做得到的嘛。"
16012-910 = "呵呵。這種台詞，\n我早就想講講看了。"
16012-920 = "如果只靠我一個人，\n我想應該辦不到……\n這就是大人的力量……"
16012-930 = "挺厲害的嘛。"
16012-940 = "今天的工作結束了嗎？"
16012-950 = "那就去吃點\n好吃的東西吧！"

[translation]
16012-120 = "아, 얏호- 선생님.\n왠지 시끄럽네.\n보러 가 볼래?"
16012-130 = "설날은 평소와는\n다르게 맛있는 것이\n많이 있단 말이지…"
16012-140 = "생각 없이\n돈을 써버리게 돼버려."
16012-150 = "어? 무슨 일이야, 선생님?\n아… 혹시…\n나랑 얘기하고 싶었어?"
16012-160 = "정말, 그렇게 찌르지 마!\n모처럼의 기모노가\n구겨지잖아."
16012-170 = "클리닝…\n아니 그런 문제가 아니야!"
16012-180 = "나는 하카마 쪽이\n좋으려나……\n움직이기 쉽기도 하고."
16012-190 = "머리도 땋아 올려 보라고…?"
16012-200 = "그런 게 나에게\n어울릴 리 없고…\n됐다고…"
16012-210 = "생각 없이\n돈을 써버리게 돼버려."
16012-220 = "어? 무슨 일이야, 선생님?\n아… 혹시…\n나랑 얘기하고 싶었어?"
16012-230 = "정말, 그렇게 찌르지 마!\n모처럼의 기모노가\n구겨지잖아."
16012-240 = "클리닝…\n아니 그런 문제가 아니야!"
16012-250 = "나는 하카마 쪽이\n좋으려나……\n움직이기 쉽기도 하고."
16012-260 = "머리도 땋아 올려 보라고…?"
16012-270 = "그런 게 나에게\n어울릴 리 없고…\n됐다고…"
16012-280 = "왠지 귀찮은\n일이 될 것 같은……"
16012-290 = "내 직감,\n안 좋을 때만\n맞으니까……"
16012-300 = "이렇게 될 것 같기는\n했는데 말이지……"
16012-310 = "뭐, 선생님도 같이 있고,\n어떻게든 되지 않을까?"
16012-320 = "아, 지쳤어. 지쳤어.\n어떻게든 잘 끝나서\n다행이야."
16012-330 = "오세치도 맛있었고,\n배부르게 먹었고!"
16012-840 = "이거 전~부 선생님 일이야?\n왠지 힘들 것 같아…"
16012-850 = "뭐, 도움이 필요하면 말해."
16012-860 = "여유를 부리고 있을 상황이 아니야!\n자, 힘내. 선생님."
16012-870 = "응? 불렀어?\n뭐 사줄거야?"
16012-880 = "후훗, 농담이야."
16012-890 = "시끌벅적한 걸 싫어하는 건 아냐.\n안 그랬다면, 미식연구회\n애들이랑 같이 못 다닐 거 아냐?"
16012-900 = "뭐야, 선생님도 하면\n할 수 있네."
16012-910 = "후훗. 이런 대사,\n말해보고 싶었어."
16012-920 = "나 혼자였다면\n불가능했다고 생각해……\n이것이 어른의 힘……"
16012-930 = "꽤 하잖아."
16012-940 = "오늘 할 일은 이걸로 끝?"
16012-950 = "그럼 뭔가 맛있는 거\n먹으러 가자!"

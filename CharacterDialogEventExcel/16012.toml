[translation]
16012-120 = "อ๊ะ ยะโฮ คุณครู\nข้างนอกเสียงดังกันน่าดูเลย\nเราออกไปดูด้วยกันมั้ย?"
16012-130 = "ช่วงวันปีใหม่มี\nของอร่อยๆ เยอะกว่า\nวันธรรมดาเยอะเลยนะ..."
16012-140 = "ดันใช้เงินไป...\nโดยไม่คิดซะแล้ว"
16012-150 = "เอ๋? มีเรื่องอะไรเหรอ คุณครู?\nอ๊ะ หรือว่า...\nอยากคุยกับฉันงั้นเหรอ?"
16012-160 = "อย่ามาสะกิดกันแบบนั้นสิ!\nไม่ได้ใส่ชุดกิโมโน\nมาตั้งนานแล้วนี่นา"
16012-170 = "ค่าซักรีด... ไม่สิ\nปัญหามันไม่ใช่เรื่องนั้นสักหน่อย!"
16012-180 = "ฉันเหมาะกับฮากามะ\nมากกว่านะ...\nเคลื่อนไหวสะดวกกว่า"
16012-190 = "ให้ม้วนผมขึ้นเหรอ...?"
16012-200 = "ทะ...ทรงผมแบบนั้น\nไม่เหมาะกับฉันหรอกน่า\nพอเลยๆ"
16012-210 = "ดันใช้เงินไป...\nโดยไม่คิดซะแล้ว"
16012-220 = "เอ๋? มีเรื่องอะไรเหรอ คุณครู?\nอ๊ะ หรือว่า...\nอยากคุยกับฉันงั้นเหรอ?"
16012-230 = "อย่ามาสะกิดกันแบบนั้นสิ!\nไม่ได้ใส่ชุดกิโมโน\nมาตั้งนานแล้วนี่นา"
16012-240 = "ค่าซักรีด... ไม่สิ\nปัญหามันไม่ใช่เรื่องนั้นสักหน่อย!"
16012-250 = "ฉันเหมาะกับฮากามะ\nมากกว่านะ...\nเคลื่อนไหวสะดวกกว่า"
16012-260 = "ให้ม้วนผมขึ้นเหรอ...?"
16012-270 = "ทะ...ทรงผมแบบนั้น\nไม่เหมาะกับฉันหรอกน่า\nพอเลยๆ"
16012-280 = "เหมือนมันชักจะน่ารำคาญ\nขึ้นเรื่อยๆ แล้วนะ..."
16012-290 = "ลางสังหรณ์เรื่องซวยๆ\nของฉันน่ะ...\nแม่นมากเลยนะ..."
16012-300 = "ก็นะ... คิดอยู่แล้วแหละ\nว่าอาจจะกลายเป็นแบบบี้"
16012-310 = "แต่ยังไงก็มีคุณครูอยู่ด้วย\nเดี๋ยวก็คงคลี่คลายเองนั่นแหละ"
16012-320 = "อา... เหนื่อยจัง... เหนื่อยสุดๆ\nสุดท้ายก็จบลงด้วยดี\nค่อยยังชั่วหน่อย"
16012-330 = "โอเซจิก็อร่อยสุดยอด\nกินไปซะพุงกางเลย!"
16012-840 = "นี่เป็นงานของคุณครูหมดเลยเหรอ?\nดูน่าจะเหนื่อยนะ..."
16012-850 = "ก็นะ...\nถ้าอยากให้ช่วยก็บอกล่ะ"
16012-860 = "ดูท่าจะไม่มีเวลาให้พักเลยแฮะ\nพยายามเข้านะ คุณครู"
16012-870 = "หืม? เรียกฉันเหรอ?\nจะซื้ออะไรให้เหรอไง?"
16012-880 = "ฮิฮิ ล้อเล่นน่า"
16012-890 = "ฉันไม่ได้ไม่ชอบเสียงดังหรอก\nถ้าไม่งั้นคงจะอยู่รวมกับพวกสมาชิก\nชมรมชิมอาหารไม่ได้กันพอดีน่ะสิ?"
16012-900 = "อะไรน่ะ ถ้าเป็นคุณครูละก็\nทำได้แน่ๆ"
16012-910 = "ฮุฮุ ฉันอยากลอง\nพูดแบบนี้มานานแล้ว"
16012-920 = "ถ้าให้ฉันทำคนเดียวคงทำไม่ได้แน่ๆ\nนี่สินะ พลังของผู้ใหญ่...\nนี่แหละพลังของผู้ใหญ่!"
16012-930 = "ไม่เลวเลยนี่นา"
16012-940 = "งานวันนี้เสร็จแล้วงั้นเหรอ?"
16012-950 = "ถ้างั้นไปหาอะไรอร่อยๆ\nกินด้วยกันเถอะ!"

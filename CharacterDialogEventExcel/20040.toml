[translation]
20040-1120 = "歡迎你，老師。\n想看什麼儘管看吧。"
20040-1130 = "這可是我們萬魔殿\n準備的派對。"
20040-1140 = "老師肯定會喜歡的。"
20040-1150 = "哎呀，進度\n似乎不太順利呢。"
20040-1160 = "算了，反正真琴醬\n會想辦法解決的吧？"
20040-1170 = "沒想到能在這裡\n得到老師的幫助。"
20040-1180 = "呵呵，拜託你囉，老師？"
20040-1190 = "派對就到此結束了。"
20040-1200 = "你看？就跟我說的一樣，\n總會有辦法的吧？"
20040-1210 = "哼嗯～一直\n那樣調戲我……"
20040-1220 = "有什麼需要嗎？"
20040-1230 = "老師你，\n想要什麼呢？"
20040-1240 = "呵呵，老師……\n試著對我施加催眠吧。"
20040-1250 = "當然這對我不管……"
20040-1260 = "嗯？不用了？"
20040-1270 = "呵呵，別那麼說嘛……\n來來來。"
20040-1280 = "再那樣心不在焉的話，\n可能會被真琴醬纏上哦？"
20040-1290 = "來，過來這邊吧。"

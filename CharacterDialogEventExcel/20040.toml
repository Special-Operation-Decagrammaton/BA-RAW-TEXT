[translation]
20040-1120 = "어서 와, 선생.\n보고 싶은 만큼\n마음껏 둘러보라구~"
20040-1130 = "우리 만마전이\n야심 차게 준비한\n행사니까,"
20040-1140 = "분명히 선생\n마음에도 쏙 들 거야."
20040-1150 = "어머,\n잘 풀리지 않나 보네."
20040-1160 = "뭐, 마코토 쨩이\n어떻게든 하지 않을까?"
20040-1170 = "여기서 선생의\n도움을 받게 될 줄이야."
20040-1180 = "후훗, 부탁할게, 선생?"
20040-1190 = "파티는 이걸로 끝."
20040-1200 = "어때? 내 말대로\n어떻게든 됐지?"
20040-1210 = "흐응, 자꾸\n건드리고 말이야…"
20040-1220 = "뭐 원하는 게 있어?"
20040-1230 = "선생은, 무엇을 원하실까?"
20040-1240 = "후훗, 선생…\n내게 최면을 걸어봐."
20040-1250 = "물론 내게는 듣지 않는…"
20040-1260 = "응? 괜찮다고?"
20040-1270 = "후훗, 그런 말 말고…\n자아."
20040-1280 = "선생, 그렇게 멍하니\n서 있다가는 마코토 쨩의\n음모에 휘말리고 말 걸?"
20040-1290 = "자, 이쪽으로 와."

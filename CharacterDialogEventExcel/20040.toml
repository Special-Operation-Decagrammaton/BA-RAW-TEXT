[translation]
20040-1120 = "เชิญเลย คุณครู\nเลือกดูได้ตามสบาย\nเลยนะ~"
20040-1130 = "นี่เป็นงานอีเวนต์ที่\nแพนเดโมเนียม โซไซตี้ของเรา\nตั้งใจเตรียมอย่างเต็มที่"
20040-1140 = "ครูจะต้องถูกใจแน่นอนเลยละ"
20040-1150 = "โอ๊ะ\nดูเหมือนจะไม่ค่อยได้ผลสินะ"
20040-1160 = "เอาเถอะ เดี๋ยวมาโคโตะจัง\nก็คงหาทางทำอะไรสักอย่างละมั้ง?"
20040-1170 = "ฉันคิดว่าจะได้รับ\nความช่วยเหลือจากครูที่นี่ซะอีก"
20040-1180 = "ฮุฮุ ขอฝากด้วยนะ ครู"
20040-1190 = "ปาร์ตี้... จบแล้วละ"
20040-1200 = "เป็นยังไง? มันเป็นไป\nตามที่ฉันบอกเลยใช่มั้ยล่ะ?"
20040-1210 = "หืม บอกว่าอย่ามา\nสะกิดกันบ่อยไงล่ะ..."
20040-1220 = "มีอะไรที่อยากได้รึไง?"
20040-1230 = "ครู อยากได้อะไรหรือไง?"
20040-1240 = "ฮุฮุ ครู...\nลองสะกดจิตฉันดูสิ"
20040-1250 = "แน่นอนว่ามันไม่ได้ผลกับฉัน..."
20040-1260 = "หืม? ไม่เป็นไรงั้นเหรอ?"
20040-1270 = "ฮุฮุ อย่าพูดแบบนั้นสิ\nเอาเลยๆ"
20040-1280 = "ครู ถ้ามัวแต่ยืนเหม่ออยู่แบบนั้น\nเดี๋ยวก็โดนดึงเข้าไปวุ่นวายกับ\nแผนการของมาโคโตะจังหรอก?"
20040-1290 = "เอาละ มาทางนี้สิ"

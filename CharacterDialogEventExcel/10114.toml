[translation]
10114-290 = "願意來到格黑娜學園……\n真的非常感謝！"
10114-300 = "還請度過一段\n愉快的時光哦。"
10114-310 = "哇！老師，你來啦！"
10114-320 = "這套制服……\n適，適合我嗎？"
10114-330 = "噫噫……嗚……"
10114-340 = "餅醬它……\n都怪我不好……\n得想想辦法才行……！"
10114-350 = "不能就這樣\n置之不理……"
10114-360 = "因為我，是\n格黑娜的學生！"
10114-370 = "我一度還想說\n不知道會變成怎樣……"
10114-380 = "多虧了老師\n才能順利解決！\n非常謝謝你！"
10114-390 = "因為咖啡廳的打工，\n所以穿上了制服。"
10114-400 = "不介意的話……\n要不要休息一下？"
10114-410 = "咖啡廳的工作，\n真的非常有趣。"
10114-420 = "不過因為很少\n做料理……"
10114-430 = "讓我覺得應該更努力\n做供給部的工作才行！"
10114-440 = "啊哈哈！老師！\n很癢耶……！"
10114-450 = "……呼，謝謝你。"
10114-460 = "託你的福，\n讓我稍微放鬆了。"
10114-470 = "恭候多時了，老師！\n這邊請！"
10114-480 = "需要幫您拿菜單嗎？"
10114-490 = "呵呵，老師。"
10114-500 = "在結束之前，\n還請慢慢享受！"
10114-510 = "打工時，我的動作\n經常會被誇獎……"
10114-520 = "是因為活用了\n供給部的經驗嗎？"
10114-530 = "是，老師。\n要點餐嗎？"
10114-540 = "光是能被老師叫來……"
10114-550 = "我就很開心了！"
10114-560 = "我明白了！\n馬上為您準備！"
10114-570 = "是那個對吧！\n我立刻幫您送去，請稍等。"
10114-580 = "庫存非常充足！\n無須擔心！"
10114-590 = "如果有缺少什麼的話，\n請隨時跟我說！"
10114-780 = "就算是咖啡廳，準備也很重要！\n這是跟供給部的共通點呢。"
10114-790 = "每日的工作……\n能一點一點地完成，我很喜歡。"
10114-800 = "接受點餐，運送料理……"
10114-810 = "這些就是服務生的「任務」。"
10114-820 = "老師，有需要\n我幫忙的事嗎？"
10114-830 = "真厲害！老師！\n來，請收下這個！"
10114-840 = "努力能獲得回報……\n真的很棒呢。"

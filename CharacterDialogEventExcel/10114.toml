[translation]
10114-290 = "게헨나 학원에\n어서 오세요, 선생님!"
10114-300 = "부디 즐겁고……\n안전한 시간이\n되셨으면 해요!"
10114-310 = "와아!\n선생님이 오셨어요!"
10114-320 = "어, 어떠신가요?\n제 옷…… 어울릴까요……?"
10114-330 = "히잉…… 히이잉……"
10114-340 = "팬 쨩이……\n제 책임이에요……\n제가 어떻게든 해야……!"
10114-350 = "아무리 그래도,\n게헨나 학원 역시\n제가 다니는 곳이에요!"
10114-360 = "이대로\n손 놓고 있지만은\n않을 테니까요!"
10114-370 = "정말 어떻게\n되나 했어요……"
10114-380 = "감사합니다. 선생님.\n선생님만 계시면, 뭐든지\n다 잘될 것 같아요!"
10114-390 = "카페 아르바이트를\n하게 되어서 어울리는\n복장을 입어 봤어요."
10114-400 = "괜찮으시다면,\n잠시 휴식이라도……\n어떠세요?"
10114-410 = "카페 아르바이트 일도\n신선하고 재미있네요."
10114-420 = "그렇지만 역시,\n요리를 수련한다는\n측면에서는"
10114-430 = "급양부 일이 더욱\n중요한 것 같아요."
10114-440 = "아하하하!\n정말, 선생님!\n간지럽다구요!"
10114-450 = "……후우, 감사드려요."
10114-460 = "조금, 긴장이 풀렸어요."
10114-470 = "기다리고 있었어요, 선생님!\n이쪽으로 오세요!"
10114-480 = "찾으시는 것이 있으신가요, 손님?\n메뉴판을 가져다드릴까요?"
10114-490 = "후훗. 선생님."
10114-500 = "마지막까지 충분히\n둘러보다 가세요!"
10114-510 = "몸놀림이 가볍다고 칭찬받곤 해요."
10114-520 = "급양부에서 했던 경험이,\n도움이 되나 봐요!"
10114-530 = "네, 선생님? 부르셨나요?"
10114-540 = "아무 이유 없이 부르셨어도,\n무언가 필요한 것이 있으셔도……"
10114-550 = "저는, 모두 좋아요!"
10114-560 = "그 품목 말씀이군요!\n조금만 기다려 주세요."
10114-570 = "저도 좋은 선택이라고 생각합니다!\n금방 마련해 드릴게요."
10114-580 = "재고는 충분하답니다.\n걱정 마세요!"
10114-590 = "혹시 부족한 것이 있으시다면,\n언제든 말씀해 주세요!"
10114-780 = "카페에서도 재료 준비는 중요하답니다!\n급양부 일과 공통점이 있네요."
10114-790 = "해야 할 일을 해낸다는 거, 저는 좋아해요.\n왠지 모르게 뿌듯하거든요."
10114-800 = "주문을 받고,\n메뉴를 가져다드리고……"
10114-810 = "그런 것들이 지금의 저에게 있어서, \n'미션'이 아닐까요?"
10114-820 = "부르셨나요, 선생님?\n도와드릴 것이 있을까요?"
10114-830 = "대단하세요, 선생님!\n여기, 이걸 받아 가시면 돼요!"
10114-840 = "노력한 만큼 보상이 돌아온다는 것은……\n정말, 멋진 것 같아요!"

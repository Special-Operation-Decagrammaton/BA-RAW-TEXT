[translation]
10114-290 = "ยินดีต้อนรับสู่\nสถาบันเกเฮนน่าค่ะ คุณครู!"
10114-300 = "ขอให้มีช่วงเวลาที่...\nสนุกและปลอดภัยนะคะ!"
10114-310 = "ว้าว!\nคุณครูมาแล้วสินะคะ!"
10114-320 = "ปะ... เป็นยังไงบ้างคะ?\nชุดของฉัน... เข้ากับฉันมั้ยคะ...?"
10114-330 = "แง... แงง..."
10114-340 = "แพนจัง...\nอยู่ในความรับผิดชอบ\nของฉันค่ะ... ไม่ว่ายังไงฉันต้อง...!"
10114-350 = "เพราะถึงยังไง\nสถาบันเกเฮนน่า\nก็เป็นโรงเรียนของฉันค่ะ!"
10114-360 = "ฉันจะไม่\nอยู่นิ่งๆ อย่างนี้หรอกค่ะ!"
10114-370 = "คิดว่าจะแก้ปัญหา\nไม่ได้แล้วเสียอีกค่ะ..."
10114-380 = "ขอบคุณนะคะ คุณครู\nพอมีคุณครูอยู่ด้วย ทุกอย่าง\nก็คลี่คลายได้ด้วยดีเลยค่ะ!"
10114-390 = "ฉันใส่ชุดที่เข้ากับ\nงานพาร์ทไทม์คาเฟ่\nที่ฉันได้ทำค่ะ"
10114-400 = "ถ้าคุณครูมีเวลา\nก็แวะมาพักผ่อน...\nสักหน่อยมั้ยคะ?"
10114-410 = "งานพาร์ทไทม์คาเฟ่\nก็แปลกใหม่และสนุกดีนะคะ"
10114-420 = "แต่ถ้าในแง่ของ\nการฝึกทำอาหาร\nแล้วละก็"
10114-430 = "งานของชมรมโภชนาการ\nสำคัญกว่าเยอะเลยค่ะ"
10114-440 = "อะฮะฮะฮ่า!\nจริงๆ เลย คุณครูคะ!\nมันจั๊กจี้นะคะ!"
10114-450 = "ฮู่ว... ขอบคุณค่ะ"
10114-460 = "หายเครียดขึ้นมาหน่อยแล้วค่ะ"
10114-470 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!\nมาทางนี้สิคะ!"
10114-480 = "อยากได้อะไรหรือเปล่าคะลูกค้า?\nให้ฉันเอาเมนูมาให้มั้ยคะ?"
10114-490 = "ฮุฮุ คุณครู"
10114-500 = "เชิญเลือกดูให้หนำใจ\nจนปิดร้านเลยนะคะ!"
10114-510 = "ฉันถูกชมบ่อยๆ ว่าคล่องแคล่วค่ะ"
10114-520 = "ประสบการณ์จากชมรมโภชนาการ\nเป็นประโยชน์เยอะเลยค่ะ!"
10114-530 = "คะ คุณครู? เรียกหาฉันเหรอคะ?"
10114-540 = "ต่อให้เรียกฉันอย่างไร้เหตุผล\nหรือมีของที่ต้องการจริงๆ..."
10114-550 = "ฉันก็ชอบทั้งหมดค่ะ!"
10114-560 = "ต้องการสิ่งนี้สินะ!\nช่วยรอสักครู่นะคะ"
10114-570 = "ฉันก็คิดว่าเป็นการเลือกที่ดีค่ะ\nจะรีบไปเตรียมมาให้นะคะ"
10114-580 = "มีของในสต๊อกเหลือเฟือค่ะ\nไม่ต้องกังวลนะคะ!"
10114-590 = "ถ้าขาดเหลืออะไร\nก็บอกฉันได้ตลอดนะคะ!"
10114-780 = "ในคาเฟ่ การเตรียมวัตถุดิบ\nก็เป็นสิ่งสำคัญ! เหมือนงาน\nชมรมโภชนาการเลยนะคะ"
10114-790 = "ฉันชอบการทำงานให้เสร็จ\nมันทำให้ฉันอิ่มเอมใจน่ะค่ะ"
10114-800 = "รับออเดอร์\nแล้วก็เอาอาหารมาเสิร์ฟ..."
10114-810 = "ตอนนี้งานแบบนั้นถือเป็น\n'ภารกิจ' ของฉันแล้วค่ะ"
10114-820 = "เรียกฉันเหรอคะ คุณครู?\nมีอะไรให้ฉันช่วยมั้ยคะ?"
10114-830 = "ยอดเยี่ยมเลยค่ะ คุณครู!\nนี่ค่ะ รับไปได้เลย!"
10114-840 = "การได้รางวัลสมกับที่พยายาม...\nเป็นสิ่งที่ยอดเยี่ยมไปเลยค่ะ!"

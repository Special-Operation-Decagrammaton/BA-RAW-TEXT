[translation]
10114-290 = "Welcome to Gehenna Academy, Sensei!"
10114-300 = "I hope you have a fun, SAFE stay!"
10114-310 = "Yay! Sensei is here!"
10114-320 = "Wh-What do you think? My clothes, do they...suit me?"
10114-330 = "Waah... Waaaah..."
10114-340 = "Pan-Pan is... It's my fault... I have to do something...!"
10114-350 = "But still, Gehenna Academy is my school too!"
10114-360 = "I'm not going to sit still and do nothing!"
10114-370 = "I was worried how it was going to turn out..."
10114-380 = "Thank you, Sensei. With you around, it feels like everything's going to be fine!"
10114-390 = "I ended up working part-time at a cafe, so I tried wearing a fitting outfit."
10114-400 = "If you don't mind, how about...a short break?"
10114-410 = "Part-time cafe work is a fresh and fun experience, too."
10114-420 = "But still, when it comes to practicing cooking,"
10114-430 = "the School Lunch Club's work feels more important."
10114-440 = "Ahahaha! Seriously, Sensei! That tickles!"
10114-450 = "...Phew, thank you."
10114-460 = "That helped me loosen up a bit."
10114-470 = "I've been waiting, Sensei! Come on, this way!"
10114-480 = "Is there anything you're looking for, customer? Would you like to see the menu?"
10114-490 = "Heehee, Sensei."
10114-500 = "Look around to your heart's content, for as long as you like!"
10114-510 = "People often compliment my swiftness."
10114-520 = "It seems like my experience with the School Lunch Club helped!"
10114-530 = "Yes, Sensei? Did you call me?"
10114-540 = "Even if you called me without a reason, or even if you wanted something..."
10114-550 = "I'm happy regardless!"
10114-560 = "Ah, so that's what you want! Please give me a moment."
10114-570 = "Good choice! I'll get it to you momentarily."
10114-580 = "We have plenty of supplies. Don't you worry!"
10114-590 = "If there's anything missing, please let me know anytime!"
10114-780 = "Ingredient preparation is important in a cafe too, of course! That's a common element with the School Lunch Club."
10114-790 = "I like doing what I'm tasked to do. For some reason, it makes me feel proud."
10114-800 = "Taking orders, bringing dishes..."
10114-810 = "Perhaps those are \"missions\" for me right now, you know what I mean?"
10114-820 = "Did you call for me, Sensei? Is there anything I can help with?"
10114-830 = "That's incredible, Sensei! Here, have this!"
10114-840 = "Being rewarded for all your hard work...it's really amazing!"

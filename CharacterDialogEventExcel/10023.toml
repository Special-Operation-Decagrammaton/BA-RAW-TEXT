[translation]
10023-140 = "왔구나, 선생.\n여름 합숙에 필요한 물건이라면,\n뭐든지 준비되어 있어."
10023-150 = "부장의 업무에 비하면\n이 정도의 일은 별 거 아냐."
10023-160 = "흠,\n괜찮은 물건이네."
10023-170 = "선생치고는 제법인걸"
10023-180 = "게헨나의 교표가 찍힌\n보급 상자를 주웠다면\n이곳에서 교환할 수 있어."
10023-190 = "합숙 기간도 이제 절반 밖에\n남지 않았네. 필요한 물건이\n있다면 미리 서둘러."
10023-200 = "합숙 기간도 얼마 남지 않았어.\n뭔가 필요한 게 있다면\n빨리 말하도록 해."
10023-210 = "오늘이 마지막 날인가.\n정말 다사다난한 휴가……"
10023-220 = "아니, 하계 합숙이었어."
10023-230 = "하계 훈련은 모두 끝났어.\n남은 물건은 없는지 확인해봐."
10023-240 = "……왜 여길 가만히\n보고 있는 거야?"
10023-250 = "공짜로는 못 줘."
10023-260 = "헤에……\n그런 게 있었구나.\n선생은 운이 좋네."

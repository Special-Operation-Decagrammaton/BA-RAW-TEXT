[translation]
10023-140 = "你來了啊，老師。\n夏季合宿需要的東西，\n全部都準備好了。"
10023-150 = "相較於委員長的工作，\n這點程度的事不算什麼。"
10023-160 = "嗯，\n是不錯的東西耶。"
10023-170 = "以老師來說算不賴了。"
10023-180 = "若是撿到印有格黑娜校徽的\n補給箱，\n在這個地方可交換。"
10023-190 = "合宿時間現在剩一半而已耶。若是有需要的物品，\n就要事先通知。"
10023-200 = "夏季合宿期間剩下不多了，\n如果有需要的物品，\n要快點告訴我。"
10023-210 = "今天是最後一天嗎？\n真是多災多難的休假…"
10023-220 = "不，是夏季合宿。"
10023-230 = "夏季訓練全都結束了。\n確認一下是否有剩餘的物品。"
10023-240 = "……為什麼在這裡不動，\n一直盯著看？"
10023-250 = "我不能免費送你。"
10023-260 = "嘿嘿……\n原來有這種東西啊？\n老師的運氣很好呢！"

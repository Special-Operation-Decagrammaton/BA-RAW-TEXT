[translation]
10023-140 = "มาแล้วเหรอ คุณครู\nเตรียมของจำเป็นสำหรับ\nค่ายฤดูร้อนพร้อมแล้วล่ะ"
10023-150 = "ถ้าเทียบกับงานของหัวหน้าแล้ว\nแค่นี้ไม่ใช่เรื่องใหญ่หรอก"
10023-160 = "อืม...\nของชิ้นนี้ก็ใช้ได้เลยนะ"
10023-170 = "ไม่เลวเลยนี่คุณครู"
10023-180 = "ถ้าเก็บกล่องเสบียง\nตราเกเฮนน่าได้ละก็\nเอามาแลกที่นี่ได้นะ"
10023-190 = "เวลาเข้าค่ายก็ผ่านมาครึ่งทางแล้ว\nถ้ามีของที่จำเป็นละก็\nรีบมาเลือกไปด้วยล่ะ"
10023-200 = "เวลาเข้าค่ายเหลือน้อยแล้ว\nถ้ามีของที่จำเป็นละก็\nรีบมาเลือกไปด้วยล่ะ"
10023-210 = "วันนี้เป็นวันสุดท้ายแล้วเหรอ\nเป็นวันหยุดที่สนุกจริงๆ..."
10023-220 = "ไม่สิ ค่ายฝึกฤดูร้อนต่างหาก"
10023-230 = "การฝึกฤดูร้อนจบแล้ว อย่าลืม\nตรวจดูว่าลืมอะไรไว้รึเปล่าด้วยล่ะ"
10023-240 = "ทำไมถึงเอาแต่\nยืนจ้องแบบนั้นล่ะ?"
10023-250 = "ฉันไม่แจกฟรีหรอกนะ"
10023-260 = "หืม... มีของแบบนั้นอยู่ด้วยเหรอ\nคุณครูนี่โชคดีจริงๆ นะ"

[translation]
10073-10 = "Over here, Sensei. Preparations for the investigation have been made."
10073-20 = "The summer is so hot... Even standing here doing nothing is exhausting..."
10073-30 = "Are we about halfway...?"
10073-40 = "Our investigation here will be over soon."
10073-50 = "Let's check just in case..."
10073-60 = "S-Sensei? Wh-What's wrong?"
10073-70 = "Is there something on my face...?"
10073-80 = "Even if you suddenly call me like that..."
10073-90 = "If you need anything, please just tell me..."
10073-100 = "Even though I don't really like being outside..."
10073-110 = "...it wasn't too bad, since I got to be alone with you."
10073-530 = "Now, let me summarize our investigation findings."
10073-540 = "We've come to learn many things."
10073-550 = "Hmm... Is there more to investigate?"
10073-560 = "There's nothing more to discover, not even if you investigated me...!"
10073-570 = "This...could be very meaningful."
10073-580 = "I knew I could count on you, Sensei."

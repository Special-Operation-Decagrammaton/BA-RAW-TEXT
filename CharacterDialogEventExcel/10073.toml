[translation]
10073-10 = "ทางนี้ค่ะ คุณครู\nฉันเตรียมการสำรวจไว้แล้วค่ะ"
10073-20 = "ฤดูร้อนนี่ ช่างร้อนอบอ้าว...\nแค่ยืนอยู่เฉยๆ ก็หมดแรงแล้วค่ะ…"
10073-30 = "ตอนนี้ เรามาถึง\nครึ่งทางแล้วไหมนะ…"
10073-40 = "อีกนิดเดียว การสำรวจที่นี่\nก็คงเสร็จแล้วละค่ะ"
10073-50 = "คะ.. แค่เผื่อไว้น่ะค่ะ...\nลองตรวจสอบดูสิคะ"
10073-60 = "คะ... คุณครู?\nทะ... ทำไมจ้องแบบนั้นล่ะคะ?"
10073-70 = "มีอะไรติดอยู่\nบนหน้าฉันเหรอคะ…"
10073-80 = "จะเรียกหาฉัน\nกะทันหันแบบนั้น…"
10073-90 = "ถ้ามีอะไรที่ต้องการ\nก็พูดบอกกันนะคะ…"
10073-100 = "ถึงฉันจะ\nไม่ชอบไปข้างนอก…"
10073-110 = "แต่ได้อยู่ด้วยกันสองต่อสอง...\nมันก็ไม่เลวนะคะ"
10073-530 = "ถ้างั้น เรามาสรุป\nการสำรวจดีไหมคะ"
10073-540 = "ได้รู้อะไรหลายอย่างเลยนะคะ"
10073-550 = "อืม... มีอะไรอยากสำรวจเพิ่ม\nอีกเหรอคะ?"
10073-560 = "สะ... สำรวจฉันไป\nก็ไม่ได้อะไรขี้นมาหรอกค่ะ...!"
10073-570 = "ของชิ้นนี้... น่าจะมี\nความหมายเลยนะคะ"
10073-580 = "คุณครูนี่เยี่ยมจริงๆ"

[translation]
10073-10 = "在這裡，老師。\n調查準備，已經完成了。"
10073-20 = "夏天，又悶又熱……\n光，光是站著，\n就很費力了……"
10073-30 = "這樣一來，\n就剩下一半了……"
10073-40 = "再過不久，\n這裡的調查\n也要結束了呢。"
10073-50 = "以，以防萬一……\n請確認一下。"
10073-60 = "老，老師？\n怎，怎麼了？"
10073-70 = "我的臉上，沾到\n什麼東西了嗎……？"
10073-80 = "就算突然，\n叫我也……"
10073-90 = "……有事的話，\n請用說的……"
10073-100 = "外面，雖然我\n不是很喜歡……"
10073-110 = "但可以兩人獨處……\n也不是什麼壞事。"
10073-530 = "那麼，來統整\n調查內容吧。"
10073-540 = "各種事情，都越來越明瞭了。"
10073-550 = "那個……還有什麼\n想調查的事嗎？"
10073-560 = "就，就算調查我，\n也不會有結果的唷……！"
10073-570 = "這個……\n似乎有某種意義呢。"
10073-580 = "不愧是您，老師。"

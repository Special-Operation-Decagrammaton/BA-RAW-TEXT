[translation]
26011-200 = "오셨군요, 선생님!\n그럼 바로 출발하죠!"
26011-210 = "기다리고 있었어요,\n선생님!"
26011-220 = "벌써 반이나 지났네요!?\n마지막까지 힘내죠!"
26011-230 = "슬슬 끝이 보이기\n시작하네요...!"
26011-240 = "마지막으로!\n다시 한번 보고 가실래요?"
26011-250 = "음? 선생님?\n왜 그러세요?"
26011-260 = "뭔가, 도와드릴까요?"
26011-270 = "……으음, 선생님,\n지금은 놀고 있을 때가\n아니에요."
26011-280 = "아휴! 선생님!\n집중! 집중이에요!"
26011-290 = "짜잔! 여러 가지\n준비해 봤어요!"
26011-300 = "여기에요, 선생님!\n마음에 드는 걸로 골라주세요!"
26011-310 = "남은 일은 없는지,\n체크, 체크하세요~!"
26011-320 = "어라? 뭐 찾으세요?"
26011-330 = "봐주셔야 하는 쪽은\n제가 아니라 저쪽인데요……."
26011-340 = "아, 그거요? 좋네요!"
26011-350 = "흐음! 안목이 높으시네요~\n……막 이러고!"
26011-360 = "그걸 찾으셨군요! 납득입니다!"
26011-370 = "오오~ 역시!\n저도 그게 좋다고 생각했어요!"

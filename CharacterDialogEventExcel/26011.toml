[translation]
26011-200 = "你來了啊，老師！\n那麼趕緊出發吧！"
26011-210 = "我在等你哦，老師！"
26011-220 = "只剩下一半了嗎！？\n繼續努力到最後吧！"
26011-230 = "差不多能看見\n終點了呢……！"
26011-240 = "最後！要不要\n再檢查一次呀？"
26011-250 = "咦？老師？\n怎麼了嗎？"
26011-260 = "需要我幫什麼忙嗎？"
26011-270 = "……呣呣，老師，\n現在不是玩樂的時候唷。"
26011-280 = "真是的！老師！\n專心！要專心唷！"
26011-290 = "鏘～！我準備了很多東西！"
26011-300 = "就是這些，老師！\n請挑選喜歡的東西吧！"
26011-310 = "有沒有沒做完的事，\n要檢查，檢查唷～！"
26011-320 = "咦？在找什麼嗎？"
26011-330 = "那個，想請你看的不是我，\n是那邊才對……"
26011-340 = "啊，那個！\n真不錯呢！"
26011-350 = "呼呣！眼光真不錯呢～\n……開玩笑的！"
26011-360 = "想找的東西是那個啊！\n可以理解！"
26011-370 = "哦哦～果然如此！\n我也覺得那個很棒！"

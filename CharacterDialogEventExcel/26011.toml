[translation]
26011-200 = "มาแล้วเหรอคะคุณครู!\nงั้นเราออกเดินทางกันเลยค่ะ!"
26011-210 = "ฉันกำลังรออยู่เลยค่ะ\nคุณครู!"
26011-220 = "ผ่านมาครึ่งทางแล้วนะคะเนี่ย!\nสู้ให้ถึงตอนจบเลยนะ!"
26011-230 = "เริ่มจะเห็น\nตอนจบแล้วสินะคะ...!"
26011-240 = "มาดูอีกครั้ง!\nเป็นครั้งสุดท้ายก่อนไปมั้ยคะ?"
26011-250 = "หืม? คุณครู?\nเป็นอะไรไปคะ?"
26011-260 = "ให้ฉันช่วยอะไรมั้ยคะ?"
26011-270 = "อืม... คุณครู ตอนนี้ไม่ใช่\nเวลามาเล่นสนุกอยู่นะคะ"
26011-280 = "โธ่! คุณครูเนี่ย!\nตั้งใจหน่อย! ตั้งใจหน่อยค่ะ!"
26011-290 = "ทาด๊า! ฉันเตรียมของมา\nเยอะเลยละค่ะ!"
26011-300 = "ตรงนี้ค่ะ คุณครู!\nชอบอันไหนก็เลือกไปนะคะ!"
26011-310 = "เช็กให้ดีนะคะ~\nว่ามีงานอะไรเหลือรึเปล่า"
26011-320 = "เอ๋? หาอะไรเหรอคะ?"
26011-330 = "คนที่คุณครูต้องสนใจ\nไม่ใช่ฉัน แต่เป็นทางนั้นต่างหาก..."
26011-340 = "อ้อ อันนั้นเหรอคะ? ดีเลยค่ะ!"
26011-350 = "ฮึ่ม! ตาแหลมนะคะเนี่ย~\n..อะไรกันเนี่ย!"
26011-360 = "หาเจอแล้วสินะคะ! ฉันเห็นด้วยค่ะ!"
26011-370 = "โอ้วว~ ต้องอย่างนี้แหละ!\nฉันก็คิดว่าอันนี้ดีเหมือนกันค่ะ!"

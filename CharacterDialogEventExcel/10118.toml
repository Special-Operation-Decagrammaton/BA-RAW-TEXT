[translation]
10118-160 = "파햐햐-! 준비됐어?"
10118-170 = "그럼 출바~알!"
10118-180 = "급한 호출이었는데도\n와줘서 고마워."
10118-190 = "지금 꽤 위기 상황이라~\n잘 부탁해, 선생님!"
10118-200 = "이거 괜찮은 거겠지?"
10118-210 = "뭐, 제동장치\n고장만 안 난다면!"
10118-220 = "아~ 이제 곧 결판이 날 것 같아!\n왠지 그런 기분!"
10118-230 = "햐~! 드디어 끝났다!!"
10118-240 = "어쨌든 꽤 괜찮았지? 푸햣~"
10118-250 = "왜? 무슨 일 있어?"
10118-260 = "별거 아니라고?\n나 참~ 나도 찌른다?"
10118-270 = "하아~ 어쩌다 이렇게 됐담."
10118-280 = "뭐, 어떻게든 되겠지…?"
10118-290 = "뭔가 재미있는 일은 없어?"
10118-300 = "긴장을 풀 수\n있을 만한 그런 거!"
10118-310 = "물론 긴장 같은 건\n안 했지만. 파햐햐~"
10118-320 = "앞으로도 하이랜더 철도를\n이용해 달라고!\n잘 부탁해, 선생님~"
10118-610 = "원하는 만큼 둘러봐."
10118-620 = "따로 찾는 게 있으면\n언제든 말해줘!"
10118-630 = "뭐, 어딨는지는\n전혀 모르겠지만. 파햐햐!"
10118-640 = "일은 마무리됐지만,\n갖고 싶은 게 있으면\n언제든지 와."
10118-650 = "응! 나 왜?"
10118-660 = "대신 골라달라고?"
10118-670 = "안 돼, 안 돼!\n직접 선택해야 의미가 있대."
10118-680 = "오~ 그건가! 좋은데~!"
10118-690 = "굿 초이스! 파햣."
10118-700 = "나도 갖고 싶은데, 그거."
10118-710 = "꽤 좋은 안목이잖아?"

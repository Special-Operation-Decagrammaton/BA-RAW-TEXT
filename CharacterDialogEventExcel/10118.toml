[translation]
10118-160 = "วะฮะฮ่า! พร้อมหรือยัง?"
10118-170 = "งั้นก็~ ไปกันเลย!"
10118-180 = "จู่ๆ ฉันก็เรียกมาแท้ๆ\nขอบคุณที่มานะ"
10118-190 = "สถานการณ์ค่อนข้างวิกฤตเลยละ~\nงั้นก็รบกวนด้วยนะ คุณครู!"
10118-200 = "แบบนี้คงไม่เป็นไรเนอะ?"
10118-210 = "เอาเถอะ แค่ระบบเบรก\nไม่พังก็พอแล้ว!"
10118-220 = "อ่า~ เหมือนจะได้ข้อสรุปแล้ว!\nรู้สึกจะเป็นแบบนั้นนะ!"
10118-230 = "เย้~! ในที่สุดก็เสร็จงานสักที!!"
10118-240 = "ไม่เลวเลยใช่มั้ยล่ะ? อะฮ่า~"
10118-250 = "ทำไมเหรอ? มีเรื่องอะไรหรือเปล่า?"
10118-260 = "ไม่ใช่เรื่องใหญ่อะไรงั้นเหรอ?\nให้ตายสิ~ เดี๋ยวฉันจิ้มบ้างนะ?"
10118-270 = "เฮ้อ~ กลายเป็นแบบนี้ไปได้เนอะ"
10118-280 = "แต่ก็น่าจะไม่เป็นอะไรหรอกเนอะ...?"
10118-290 = "ไม่มีอะไรสนุกๆ เลยเหรอ?"
10118-300 = "อะไรที่มันคลาย\nความตึงเครียดได้น่ะ!"
10118-310 = "แต่ว่าฉันก็ไม่ได้\nเครียดอะไรหรอกนะ วะฮะฮ่า~"
10118-320 = "ต่อไปก็มาใช้ทางรถไฟ\nไฮแลนเดอร์อีกนะ!\nรบกวนด้วยละ คุณครู~"
10118-610 = "เลือกดูได้ตามต้องการเลย"
10118-620 = "ถ้าอยากได้อะไรเป็นพิเศษ\nก็บอกได้ตลอดเลยนะ"
10118-630 = "แต่ฉันไม่รู้หรอกนะ\nว่ามันอยู่ที่ไหน วะฮะฮ่า!"
10118-640 = "ถึงงานจะเสร็จแล้ว แต่ถ้ามีของ\nที่อยากได้ก็มาหาได้ตลอดนะ"
10118-650 = "อื้อ! ฉันเหรอ?"
10118-660 = "ให้ฉันเลือกให้แทนเหรอ?"
10118-670 = "ไม่ได้ๆ!\nต้องเลือกเองสิ จะได้มีความหมาย"
10118-680 = "โอ้~ เอาอันนั้นเหรอ! ดีเลยนะ~!"
10118-690 = "กู๊ดช้อยส์! ฮะฮ่า"
10118-700 = "ฉันก็อยากได้อันนี้เหมือนกัน"
10118-710 = "ตาถึงเลยนะเนี่ย?"

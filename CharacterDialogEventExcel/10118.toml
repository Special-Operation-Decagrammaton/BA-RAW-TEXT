[translation]
10118-160 = "Pahyahya! You ready?"
10118-170 = "Then, DEPAAARTING!"
10118-180 = "It was super last minute, so thanks for coming!"
10118-190 = "The situation is what you'd call \"urgent.\" So I'll leave it to you, Sensei!"
10118-200 = "This is fine, right?"
10118-210 = "Well, as long as the brakes don't break!"
10118-220 = "Ahhh! It's all gonna be over soon! I just know it!"
10118-230 = "Hyaaah! It's finally over!"
10118-240 = "It worked out, right? Pahyahya!"
10118-250 = "Huh? What's wrong?"
10118-260 = "Nothing? Geez. I can poke you too, you know!"
10118-270 = "*sigh* How did it turn out this way?"
10118-280 = "Eh, it'll work out, riiight?"
10118-290 = "Anything fun going on?"
10118-300 = "Something to help with my nerves!"
10118-310 = "But I don't have any nerves! Pahyahyahya!"
10118-320 = "Keep riding with Highlander Railroad, 'kay? I'm looking forward to it, Sensei"
10118-610 = "Look around as much as you'd like."
10118-620 = "Just tell me if you can't find something you want!"
10118-630 = "I mean, not that I'd know where it is! Pahyahya!"
10118-640 = "Work's finally done, but you can swing by if you want anything else?"
10118-650 = "Yeah! What about me?"
10118-660 = "...You want me to pick for you?"
10118-670 = "No way! You gotta pick it yourself, or else it doesn't mean anything!"
10118-680 = "Oh, that one! Nice!"
10118-690 = "Good choice! Pahyahya!"
10118-700 = "I want that too."
10118-710 = "You've got good taste, don't you?"

[translation]
10118-160 = "噗哈哈！準備好了嗎？"
10118-170 = "準備出～發！"
10118-180 = "謝謝你這麼突然\n還願意過來。"
10118-190 = "現在情況相當不妙啊～\n拜託你囉，老師！"
10118-200 = "這個，沒問題吧？"
10118-210 = "算了，只要控制裝置\n沒問題就行了吧！"
10118-220 = "哦，差不多要結束了嗎？\n好像有那種感覺。"
10118-230 = "呀～！\n終於結束了～！！"
10118-240 = "還挺不錯的吧？\n噗哈哈～"
10118-250 = "怎麼了怎麼了？\n有什麼事嗎？"
10118-260 = "「什麼也沒有」？\n啊？那我也來戳一戳吧。"
10118-270 = "唉～怎麼會變成這樣呢。"
10118-280 = "算了，\n總會有辦法吧……？"
10118-290 = "有什麼有趣的事嗎～？"
10118-300 = "可以舒緩緊張的那種～！"
10118-310 = "雖然我也沒在\n緊張就是了。\n啊哈哈！"
10118-320 = "今後也請多多支持\n高地人鐵道！\n拜託你囉，老師♪"
10118-610 = "逛到滿意為止吧。"
10118-620 = "要找什麼東西的話\n就說一聲吧？"
10118-630 = "雖然我也不知道\n放在哪裡就是了。噗哈哈！"
10118-640 = "工作雖然結束了，\n如果有想要的東西就再過來吧。"
10118-650 = "咦，什麼什麼？"
10118-660 = "「希望我幫你挑」？"
10118-670 = "不行不行！\n自己選才有意義啦。"
10118-680 = "哦～那個嗎？\n不錯不錯～！"
10118-690 = "Good choice！噗哈。"
10118-700 = "我也很想要呢，那個。"
10118-710 = "品味還不錯嘛？"

[translation]
10109-240 = "안녕하세요, 선생님.\n이렇게 늦은 시간에"
10109-250 = "밀레니엄에서 뵙는 건\n오랜만인 것 같네요."
10109-260 = "좋은 밤입니다, 선생님.\n후후, 이 옷 말인가요?"
10109-270 = "오늘은 세미나의 부원들과\n함께 파자마 파티를\n준비하던 중이었어요."
10109-280 = "선생님, 뭔가 숨기고\n있는 건 없으신가요?"
10109-290 = "지이~"
10109-300 = "후후, 생각보다 즐겁게\n일이 흘러가네요."
10109-310 = "수고 많으셨습니다, 선생님."
10109-320 = "아직 피곤하지 않으시다면\n조금만 더 저희와\n어울려 주시겠어요?"
10109-330 = "…겨울밤은 기니까요."
10109-340 = "밤늦게까지 다 같이\n잠옷 차림으로 교정을\n돌아다니고 있노라니,"
10109-350 = "뭔가 나쁜 짓을 하는 것\n같아서 두근거리네요."
10109-360 = "보드게임의 룰은\n대부분 알고 있지만, "
10109-370 = "어쩐지 실제로 해 본\n경험은 많지 않네요."
10109-380 = "유우카 쨩, 말은\n그렇게 해도 꽤 들뜬\n것처럼 보이네요."
10109-390 = "저렇게 의욕적인 모습의\n유우카 쨩은 오랜만에\n보는 것 같아요."
10109-400 = "(리오 회장님도\n함께 파티에오셨다면\n좋았을 텐데…)"
10109-560 = "아, 선생님. 마침\n파티에 쓸 보드게임을\n정리하고 있었답니다."
10109-570 = "보드게임 정리를\n도와주시겠어요?"
10109-580 = "……생각보다 조금 많이\n어질러져 있네요."
10109-590 = "파티는 끝났지만,"
10109-600 = "관심 가는\n보드게임이 있다면\n말씀해 주세요."
10109-610 = "조금 늦긴 했지만…"
10109-620 = "그래도 선생님의\n부탁이라면 조금 더\n놀아볼까요?"
10109-630 = "보드게임에도 꽤나\n다양한 종류가 있네요."
10109-640 = "정말이지, 다들 정리는\n깔끔하게 해 두라고\n말했을 텐데…"
10109-650 = "아, 그쪽에\n있었던 모양이군요."
10109-660 = "혹시, 이 디자인은…"
10109-670 = "어머나, 흥미로워\n보이는 보드게임이네요."
10109-680 = "이건 어떻게 가지고\n노는 물건일까요?"
10109-690 = "네, 계속해서 다음\n정리 정돈을 진행하죠."
10109-700 = "아, 선생님. 괜찮으시다면"
10109-710 = "잠시 파티 준비를\n도와주지 않으시겠어요?"
10109-720 = "파자마 파티에서 각자 맡을\n역할들을 정리하고\n있던 중이었습니다."
10109-730 = "네, 말씀해 주세요."
10109-740 = "머리를 묶으면 편하기는\n한데, 어쩐지 목뒤가\n조금 서늘하네요…"
10109-750 = "……방금 것까지 세 번.\n계속 보고 계셨죠?"
10109-760 = "후후, 좋은 아이디어네요."
10109-770 = "역시 선생님이시네요.\n참고하겠습니다."

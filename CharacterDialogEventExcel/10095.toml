[translation]
10095-460 = "주인님이 오시기를\n기다리고 있었습니다.\n오늘도 잘 부탁드립니다."
10095-470 = "지금 좀\n메이드 같았죠!?"
10095-480 = "엄청난 대저택이네요……\n그만큼 할 일도\n많아 보이고요."
10095-490 = "하나씩, 하나씩\n해 나가다 보면\n어떻게든 되겠죠."
10095-500 = "선생님도, 함께니까요."
10095-510 = "부르셨나요, 선생님?"
10095-520 = "네. 메이드다운 일에는\n뭐가 있을지\n고민중이었어요."
10095-530 = "예? 그 자세로도\n충분하다고요……?"
10095-540 = "중요한 건,\n지금 할 수 있는 것부터\n하는 거예요."
10095-550 = "……여기서만 드리는\n말씀이지만,"
10095-560 = "그렇게 하지 않으면\n우리 부는 제대로\n돌아가지 않기 때문에……"
10095-570 = "다양한 경험은 창작의\n원동력이라고는\n하지만……"
10095-580 = "이건 조금……"
10095-590 = "환경, 의복, 요소……\n모든 조건이\n갖춰졌군요."
10095-600 = "그러면, 주인님.\n오늘도, 함께 하겠습니다."
10095-1110 = "주인님이 오시기를\n기다리고 있었습니다.\n오늘도 잘 부탁드립니다."
10095-1120 = "지금 좀\n메이드 같았죠!?"
10095-1130 = "엄청난 대저택이네요……\n그만큼 할 일도\n많아 보이고요."
10095-1140 = "하나씩, 하나씩\n해 나가다 보면\n어떻게든 되겠죠."
10095-1150 = "선생님도, 함께니까요."
10095-1160 = "여기선 도대체\n무슨 일이 일어나고\n있는 걸까요……"
10095-1170 = "안 돼 안 돼, 나라도\n정신 바짝 차려야지."
10095-1180 = "언니에게 전부\n맡겼다가는……!"
10095-1190 = "말 그대로……\n상상도 못할 일이\n일어나는 것이 인생,\n인 거네요."
10095-1200 = "그렇지만, 마지막까지\n수행하겠습니다.\n주인님."
10095-1210 = "부족한 부분이\n많겠지만,\n저를 의지해 주세요!"
10095-1220 = "우리가 그걸\n다 해 낸 거군요……."
10095-1230 = "지금도 믿기지 않네요.\n도중에는 뭐가 어떻게\n되는가 했는데……."
10095-1240 = "감사합니다. 선생님.\n모두 선생님 덕분이에요."
10095-1250 = "부르셨나요, 선생님?"
10095-1260 = "네. 메이드다운 일에는\n뭐가 있을지\n고민중이었어요."
10095-1270 = "예? 그 자세로도\n충분하다고요……?"
10095-1280 = "중요한 건,\n지금 할 수 있는 것부터\n하는 거예요."
10095-1290 = "……여기서만 드리는\n말씀이지만,"
10095-1300 = "그렇게 하지 않으면\n우리 부는 제대로\n돌아가지 않기 때문에……"
10095-1310 = "다양한 경험은 창작의\n원동력이라고는\n하지만……"

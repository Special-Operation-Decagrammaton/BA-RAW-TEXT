[translation]
10095-460 = "ฉันกำลังรอให้นายท่าน\nมาถึงอยู่เลยค่ะ\nวันนี้ก็ขอรบกวนด้วยนะคะ"
10095-470 = "ตอนนี้ฉัน\nเหมือนเมดใช่มั้ยคะ!??"
10095-480 = "คฤหาสน์หลังใหญ่จังเลยนะคะ...\nงานที่ต้องทำก็น่าจะมีอยู่เยอะ\nไม่แพ้กันเลยค่ะ"
10095-490 = "ถ้าทำทีละอย่างๆ\nไปเรื่อยๆ\nก็คงจะเสร็จละค่ะ"
10095-500 = "ก็ฉันมีคุณครูอยู่ด้วยนี่คะ"
10095-510 = "เรียกฉันเหรอคะ คุณครู?"
10095-520 = "ค่ะ ฉันกำลังครุ่นคิดว่า\nมีงานอะไรบ้าง\nที่เมดทำกันน่ะค่ะ"
10095-530 = "คะ? เท่าที่เป็นตอนนี้\nก็เพียงพอแล้วเหรอคะ...?"
10095-540 = "สิ่งที่สำคัญ\nคือการเริ่มทำตั้งแต่\nสิ่งที่ทำได้ตอนนี้ค่ะ"
10095-550 = "ฉันจะบอก...\nแค่ที่นี่นะคะ"
10095-560 = "ถ้าไม่ทำแบบนั้น\nชมรมของเรา\nก็อาจไปต่อไม่ได้..."
10095-570 = "ว่ากันว่าประสบการณ์ต่างๆ\nเป็นแรงกระตุ้น\nความคิดสร้างสรรค์..."
10095-580 = "ทั้งสภาพแวดล้อม"
10095-590 = "ทั้งสภาพแวดล้อม ชุด ปัจจัย...\nมีเงื่อนไขทุกอย่าง\nครบเลยนะคะ"
10095-600 = "นายท่าน\nถ้าอย่างนั้นวันนี้ฉันก็จะอยู่ด้วยค่ะ"
10095-1110 = "ฉันกำลังรอให้นายท่าน\nมาถึงอยู่เลยค่ะ\nวันนี้ก็ขอรบกวนด้วยนะคะ"
10095-1120 = "ตอนนี้ฉัน\nเหมือนเมดใช่มั้ยคะ!?"
10095-1130 = "คฤหาสน์หลังใหญ่จังเลยนะคะ...\nงานที่ต้องทำก็น่าจะมีอยู่เยอะ\nไม่แพ้กันเลยค่ะ"
10095-1140 = "ถ้าทำทีละอย่างๆ\nไปเรื่อยๆ\nก็คงจะเสร็จละค่ะ"
10095-1150 = "ก็ฉันมีคุณครูอยู่ด้วยนี่คะ"
10095-1160 = "ที่นี่กำลังเกิด\nอะไรขึ้นกันแน่คะ..."
10095-1170 = "ไม่ได้ ไม่ได้\nเราต้องตั้งสติสิ"
10095-1180 = "ขืนให้พี่โมโมอิ\nทำทั้งหมดละก็...!"
10095-1190 = "อย่างที่บอกเลยค่ะ...\nชีวิตก็คือการเกิด\nสิ่งที่คาดไม่ถึงสินะคะ"
10095-1200 = "แต่ฉันก็จะพยายาม\nจนถึงที่สุดเลยค่ะ\nนายท่าน"
10095-1210 = "ถึงจะยังบกพร่อง\nอยู่หลายเรื่อง\nแต่ก็พึ่งพาฉันได้เลยค่ะ!"
10095-1220 = "เราทำสิ่งนั้นกัน\nจนหมดเลยนะคะเนี่ย..."
10095-1230 = "ถึงตอนนี้ฉันยังไม่เชื่อเลยค่ะ\nระหว่างนั้นฉันคิดด้วยนะคะ\nว่านี่มันเกิดอะไรขึ้น..."
10095-1240 = "ขอบคุณค่ะ คุณครู\nเพราะได้คุณครูช่วยไว้เลยค่ะ"
10095-1250 = "เรียกฉันเหรอคะ คุณครู?"
10095-1260 = "ค่ะ ฉันกำลังครุ่นคิดว่า\nมีงานอะไรบ้าง\nที่เมดทำกันน่ะค่ะ"
10095-1270 = "คะ? เท่าที่เป็นตอนนี้\nก็เพียงพอแล้วเหรอคะ...?"
10095-1280 = "สิ่งที่สำคัญ\nคือการเริ่มทำตั้งแต่\nสิ่งที่ทำได้ตอนนี้ค่ะ"
10095-1290 = "ฉันจะบอก...\nแค่ที่นี่นะคะ"
10095-1300 = "ถ้าไม่ทำแบบนั้น\nชมรมของเรา\nก็อาจไปต่อไม่ได้..."
10095-1310 = "ว่ากันว่าประสบการณ์ต่างๆ\nเป็นแรงกระตุ้น\nความคิดสร้างสรรค์..."
10095-1320 = "แต่ว่าแบบนี้มัน..."
10095-1330 = "ทั้งสภาพแวดล้อม ชุด ปัจจัย...\nมีเงื่อนไขทุกอย่าง\nครบเลยนะคะ"
10095-1340 = "นายท่าน ถ้าอย่างนั้น\nวันนี้ฉันก็จะอยู่ด้วยค่ะ"

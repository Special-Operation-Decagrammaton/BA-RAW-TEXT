[translation]
10095-460 = "久候主人多時了。\n今天也請多多指教。"
10095-470 = "剛剛有點\n女僕的樣子吧！？"
10095-480 = "是間了不起的豪宅呢……\n要做的事似乎也很多。"
10095-490 = "只要一步一步\n確實地完成，\n應該會有辦法的。"
10095-500 = "畢竟老師也在。"
10095-510 = "你找我嗎，老師？"
10095-520 = "是。我正在煩惱\n什麼是女僕該做的工作。"
10095-530 = "咦？有這個\n態度就足夠了……？"
10095-540 = "重要的，是從現在\n能做到的事開始著手。"
10095-550 = "……這話我只在這裡說，"
10095-560 = "要是不那麼做的話，\n我們社團就會\n無法順利運作……"
10095-570 = "雖然說各種經驗\n都是創作的原動力……"
10095-580 = "但這個還是有點……"
10095-590 = "環境、服裝、要素……\n所有的條件都齊全了。"
10095-600 = "那麼，主人。\n今天也請讓我與您同行。"
10095-1110 = "久候主人多時了。\n今天也請多多指教。"
10095-1120 = "剛剛有點\n女僕的樣子吧！？"
10095-1130 = "是間了不起的豪宅呢……\n要做的事似乎也很多。"
10095-1140 = "只要一步一步\n確實地完成，\n應該會有辦法的。"
10095-1150 = "畢竟老師也在。"
10095-1160 = "這裡究竟發生了\n什麼呢……？"
10095-1170 = "不行不行，就算只有我\n也得打起精神才行。"
10095-1180 = "要是全都交給\n姐姐的話……！"
10095-1190 = "確實……\n人生總是會發生\n超乎想像的事呢。"
10095-1200 = "但是，我會修行到\n最後的，主人。"
10095-1210 = "雖然我仍有許多不足，\n還請依賴我吧！"
10095-1220 = "把那些全部完成了呢……"
10095-1230 = "我到現在還是不敢相信。\n途中還在想事情\n會變成怎樣……"
10095-1240 = "謝謝你。\n這全都多虧了老師。"
10095-1250 = "你找我嗎，老師？"
10095-1260 = "是。我正在煩惱\n什麼是女僕該做的工作。"
10095-1270 = "咦？有這個\n態度就足夠了……？"
10095-1280 = "重要的，是從現在\n能做到的事開始著手。"
10095-1290 = "……偷偷跟你說，"
10095-1300 = "要是不那麼做的話，\n我們社團就會\n無法順利運作……"
10095-1310 = "雖然說各種經驗\n都是創作的原動力……"
10095-1320 = "但這個還是有點……"
10095-1330 = "環境、服裝、要素……\n所有的條件都齊全了。"
10095-1340 = "那麼，主人。\n今天也請讓我與您同行。"

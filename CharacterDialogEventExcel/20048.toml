[translation]
20048-200 = "선생님, 오셨군요.\n일단 여기 앉으시죠."
20048-210 = "게으름에도 요령과\n노력이 필요한 법,"
20048-220 = "후후……. 제가 가르쳐 드리겠습니다."
20048-230 = "놓고 온 업무들이\n자꾸 눈에 밟히네요……"
20048-240 = "제가 없어도 정말\n괜찮은 걸까요……?"
20048-250 = "뭔가 자꾸 사건이\n터지는 것 같은데…… "
20048-260 = "단순히 제 착각이겠죠……?"
20048-270 = "돌아갈 시간이네요."
20048-280 = "언젠가 다시, 이곳을\n그리워하기 위해서."
20048-290 = "무슨 일이신가요, 선생님?"
20048-300 = "덥네요……"
20048-310 = "찬 음료가 필요하겠어요."
20048-320 = "으음, 아이스티는\n제외하고요."
20048-330 = "선생님도, 이 책에\n관심이 있으신가요?"
20048-340 = "선생님, 햇살이\n조금 따갑죠?"
20048-350 = "제 파라솔로\n들어오시지요."
20048-1070 = "천천히 둘러보시지요."
20048-1080 = "물건은 충분히\n준비되어 있답니다."
20048-1090 = "접객은 처음이군요."
20048-1100 = "그러니……\n잘 부탁드립니다, 선생님."
20048-1110 = "쇼핑은, 만족스러우셨나요?"
20048-1120 = "자, 이제 함께 돌아가요,\n선생님."
20048-1130 = "접객도 일종의 외교라고요……?"
20048-1140 = "과연, 그렇게 생각하니\n마음이 조금은 편해지네요."
20048-1150 = "진열, 계산, 선입선출……"
20048-1160 = "익숙한 단어들이 오늘따라\n낯설게 느껴지네요. "
20048-1170 = "탁월한 안목이군요,\n선생님."
20048-1180 = "잠시만 기다려주세요.\n포장해 드리겠습니다."
20048-1190 = "엣, 제 것도 고르라고요?"
20048-1200 = "후후, 마음만\n받도록 하겠습니다."
20048-1210 = "후후, 이제 조금은\n능숙해졌을까요?"

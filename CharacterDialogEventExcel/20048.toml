[translation]
20048-200 = "老師，歡迎您的到來。\n這邊請坐。"
20048-210 = "想要不著痕跡地\n偷懶是需要技術的。"
20048-220 = "呵呵……\n我告訴您訣竅吧？"
20048-230 = "留下的工作讓人\n有點擔心……"
20048-240 = "希望都有在\n順利進行……"
20048-250 = "各種事件接連\n不斷呢……"
20048-260 = "如果只是場\n惡夢就好了……"
20048-270 = "已經到回去的時間了嗎。"
20048-280 = "在這裡發生的事，\n有朝一日也會變成\n美好的回憶吧。"
20048-290 = "有什麼事嗎？"
20048-300 = "天氣真熱呢……"
20048-310 = "請人準備一些\n冰涼的飲料吧。"
20048-320 = "當然，是冰紅茶\n以外的種類。"
20048-330 = "哎呀老師，您對\n這本書有興趣嗎？"
20048-340 = "老師，在那邊的話\n皮膚會曬傷的。"
20048-350 = "請到這邊來。\n陽傘底下很涼快唷。"
20048-1070 = "還請慢慢參觀。"
20048-1080 = "庫存準備得十分充足。"
20048-1090 = "畢竟，這還是\n我第一次看店。"
20048-1100 = "希望您……多多包涵。"
20048-1110 = "購物，您還滿意嗎？"
20048-1120 = "那麼，差不多\n該回去了，老師。"
20048-1130 = "接待客人，其實\n也算是交涉的一種……？"
20048-1140 = "原來如此，聽您這麼說，\n緊張感好像稍微緩解了。"
20048-1150 = "接待、結帳、陳列……"
20048-1160 = "業務範圍比想像中\n還要廣泛呢。"
20048-1170 = "您真有眼光呢，老師。"
20048-1180 = "請稍等。\n我來為您包裝。"
20048-1190 = "咦！？我想要的東西……？"
20048-1200 = "呵呵，那我就\n收下您的心意吧。"
20048-1210 = "呵呵，感覺已經\n掌握看店的訣竅了。"

[translation]
10049-10 = "歡迎回來，老師。\n今天也請多指教囉。"
10049-20 = "好了，快點走吧。\n有很多事要做呢。"
10049-30 = "嗯，怎麼了？"
10049-40 = "不用擔心，\n我哪裡都不會去哦。"
10049-50 = "……就說很癢了。"
10049-60 = "啊啊真是的，好了！\n做你該做的事！"
10049-70 = "不用擔心，\n我哪裡都不會去哦。"
10049-80 = "……就說很癢了。"
10049-90 = "啊啊真是的，好了！\n做你該做的事！"
10049-100 = "來看看，\n會出現什麼呢？"
10049-110 = "來，\n多轉幾次吧？"
10049-120 = "咦，要我代替你轉嗎？"
10049-130 = "老師，不是看我，\n要看這裡啊。"
10049-140 = "哦……真厲害，\n恭喜。"
10049-150 = "看起來挺好的呢，嗯。"
10049-160 = "啊，總覺得\n出現了什麼很厲害的東西……"
10049-170 = "好好看看，\n還有沒有什麼\n要交換的東西吧。"

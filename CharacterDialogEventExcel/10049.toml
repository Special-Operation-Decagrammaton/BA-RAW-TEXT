[translation]
10049-10 = "เชิญเลยคุณครู\nวันนี้ก็ขอรบกวนด้วยนะ"
10049-20 = "เอ้า รีบไปกันเถอะ\nมีงานที่ต้องทำเยอะแยะเลยนะ"
10049-30 = "หืม? ทำไมเหรอ?"
10049-40 = "ไม่ต้องห่วงหรอกน่า\nฉันไม่ได้คิดจะหนีไปไหน\nอยู่แล้วด้วย"
10049-50 = "...ก็บอกว่ามันจั๊กจี้ไงล่ะ"
10049-60 = "โธ่เอ๊ย หยุดเถอะน่า\nไปทำงานต่อได้แล้ว!"
10049-70 = "ไม่ต้องห่วงหรอกน่า\nฉันไม่ได้คิดจะหนีไปไหน\nอยู่แล้วด้วย"
10049-80 = "...มันจั๊กจี้นะ"
10049-90 = "โธ่เอ๊ย หยุดเถอะน่า\nไปทำงานต่อได้แล้ว!"
10049-100 = "ไหนดูซิ จะได้อะไรนะ?"
10049-110 = "เอ้า ลองสุ่มดูกันเลยมั้ย?"
10049-120 = "หืม? จะให้ฉัน\nลองสุ่มแทนงั้นเหรอ?"
10049-130 = "คุณครู มองทางนี้สิ\nอย่ามัวแต่มองฉัน"
10049-140 = "โอ้... สุดยอดเลยนี่นา\nยินดีด้วยนะ"
10049-150 = "ได้ของดีเลยนี่นา อื้อ"
10049-160 = "อ๊ะ เหมือนจะได้อะไร\nที่สุดยอดมากๆ มาด้วยนะ..."
10049-170 = "ดูให้ดีๆ ด้วยล่ะ\nว่ามีอะไรที่ต้องแลกอีกรึเปล่า"

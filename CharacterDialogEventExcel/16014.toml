[translation]
16014-710 = "เชิญเลยค่ะคุณครู~!\nฮิฮิฮิ!"
16014-720 = "หาอะไรอยู่รึเปล่า~?\nอิบูกิจะช่วยเอง!"
16014-730 = "อิบูกิสนุกมากเลยที่ได้\nเต้นกับคุณครูในงานปาร์ตี้!"
16014-740 = "ไว้ไปด้วยกันใหม่นะ! สัญญาเลย!"
16014-750 = "หืม? อิบูกิไม่ได้มีไว้ขายนะ~?"
16014-760 = "อืม อิบูกิน่ะ!\nคิดว่าอันนั้นน่าจะดีนะ!"
16014-770 = "ขอบคุณที่มาใช้บริการค่า~!"
16014-780 = "ไว้มาใหม่นะ! คุณครู!"
16014-790 = "เอาไปเป็นของขวัญเหรอ…?\nหรือว่า... ให้อิบูกิ?"
16014-800 = "อันนั้นอิบูกิก็ชอบ!"
16014-810 = "ว้าว! อิบูกิเพิ่งเคยเห็นครั้งแรกเลย!\nมีของแบบนี้ด้วยเหรอเนี่ย!"

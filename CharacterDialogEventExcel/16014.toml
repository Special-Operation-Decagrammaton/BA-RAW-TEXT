[translation]
16014-710 = "歡迎你來，老師～！\n耶嘿嘿！"
16014-720 = "在找什麼東西嗎～？\n伊吹也來幫你！"
16014-730 = "伊吹，能跟老師在派對\n跳舞，真的很開心！"
16014-740 = "再一起來吧！\n約好了喔！"
16014-750 = "嗯？\n伊吹沒有賣唷～？"
16014-760 = "那個，伊吹我呀！\n覺得那個很棒！"
16014-770 = "謝謝您的光臨！"
16014-780 = "還要再來哦！老師！"
16014-790 = "是要送人的……？\n難道……要送給伊吹？"
16014-800 = "那個！伊吹也很喜歡！"
16014-810 = "哇！伊吹第一次看到！\n原來有那種東西啊！"

[translation]
16014-710 = "어서 오세요, 선생님~!\n에헤헷!"
16014-720 = "뭐 찾는 거 있어~?\n이부키도 도와줄게!"
16014-730 = "이부키, 선생님이랑 파티에서\n춤추는 거 너무 즐거웠어!"
16014-740 = "또 같이 오자! 약속이야!"
16014-750 = "응? 이부키는 안 파는데~?"
16014-760 = "음, 이부키는!\n저게 좋을 것 같아!"
16014-770 = "이용해 주셔서 감사합니다~!"
16014-780 = "다음에 또 와! 선생님!"
16014-790 = "선물용…?\n혹시… 이부키한테?"
16014-800 = "그거! 이부키도 좋아해!"
16014-810 = "와! 이부키, 처음 봤어!\n그런 것도 있었구나!"

[translation]
10047-210 = "아, 기다리고 있었어.\n선생님."
10047-220 = "……어라? 왜 기다렸더라?"
10047-230 = "어서 오세요,\n바다의 집에~"
10047-240 = "……맞나?"
10047-250 = "모두 바쁜 것 같으니까….\n선생님이랑 나랑, 놀까?"
10047-260 = "그러고 보니 카호가,\n위험해지면"
10047-270 = "바로 방범용 유탄을\n쏘라고 했어."
10047-280 = "아, 실은\n열사병 대책으로……."
10047-290 = "자, 말차맛 라무네."
10047-300 = "선생님도 마실래?"
10047-310 = "선생님? 불렀어? 나도 방금,\n마음속으로 불렀는데-"
10047-320 = "우연이네~"
10047-330 = "아, 기다리고 있었어.\n선생님."
10047-340 = "……어라? 왜 기다렸더라?"
10047-350 = "어서 오세요,\n바다의 집에~"
10047-360 = "……맞나?"
10047-370 = "다들 즐거워 보이네~\n응, 건강한 건 좋은 거야~"
10047-380 = "모두 열심히 하는 것 같네.\n그럼, 나도 힘내야지."
10047-390 = "응? 벌써 끝난 거야?\n그럼 선생님, 다 같이\n물놀이 하자?"
10047-400 = "모두 바쁜 것 같으니까….\n선생님이랑 나랑, 놀까?"
10047-410 = "그러고 보니 카호가,\n위험해지면"
10047-420 = "바로 방범용 유탄을\n쏘라고 했어."

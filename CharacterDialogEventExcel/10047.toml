[translation]
10047-210 = "กำลังรออยู่เลย\nคุณครู"
10047-220 = "เอ๋...? รอทำไมน่ะเหรอ?"
10047-230 = "ยินดีต้อนรับสู่\nร้านริมทะเล~"
10047-240 = "ใช่รึเปล่านะ?"
10047-250 = "ทุกคนดูยุ่งกันหมด...\nคุณครูมาเล่นด้วยกัน... กับฉันมั้ย?"
10047-260 = "พอมาคิดๆ ดูแล้ว คาโฮะน่ะ\nถ้าเกิดอันตรายขึ้นมาละก็..."
10047-270 = "คงจะยิงระเบิด\nรักษาความปลอดภัยทันทีเลยละ"
10047-280 = "อ่า ที่จริงมันมีไว้\nป้องกันโรคลมแดด..."
10047-290 = "อ่ะนี่ น้ำรามูเนะรสชาเขียว"
10047-300 = "คุณครูดื่มดูมั้ย?"
10047-310 = "คุณครู? เรียกฉันเหรอ?\nเมื่อกี้ฉันเองก็...\nเรียกคุณครูอยู่ในใจเหมือนกัน-"
10047-320 = "บังเอิญจังเลยนะ~"
10047-330 = "กำลังรออยู่เลย\nคุณครู"
10047-340 = "เอ๋...? รอทำไมน่ะเหรอ?"
10047-350 = "ยินดีต้อนรับสู่\nร้านริมทะเล~"
10047-360 = "ใช่รึเปล่านะ?"
10047-370 = "ทุกคนดูสนุกกันใหญ่เลย~\nอื้อ การมีสุขภาพแข็งแรง\nคือเรื่องที่ดีที่สุด"
10047-380 = "ทุกคนพยายามกันอย่างเต็มที่เลยน้า\nถ้างั้นฉันก็ต้องพยายามด้วย"
10047-390 = "หืม? จบแล้วเหรอ?\nถ้างั้นคุณครู... เราไป\nเล่นน้ำด้วยกันมั้ย?"
10047-400 = "ทุกคนดูยุ่งกันหมด...\nคุณครูมาเล่นด้วยกัน... กับฉันมั้ย?"
10047-410 = "พอมาคิดๆ ดูแล้ว คาโฮะน่ะ\nถ้าเกิดอันตรายขึ้นมาละก็..."
10047-420 = "คงจะยิงระเบิด\nรักษาความปลอดภัยทันทีเลยละ"
10047-430 = "อ่า ที่จริงมันมีไว้\nป้องกันโรคลมแดด..."
10047-440 = "อ่ะนี่ น้ำรามูเนะรสชาเขียว"
10047-450 = "คุณครูดื่มดูมั้ย?"
10047-460 = "คุณครู? เรียกฉันเหรอ?\nเมื่อกี้ฉันเองก็...\nเรียกคุณครูอยู่ในใจเหมือนกัน-"
10047-470 = "บังเอิญจังเลยนะ~"
10047-580 = "มีงานที่ต้องทำเยอะเลย~\nคุณครูเองก็เจอปัญหาใหญ่อยู่สินะ~"
10047-590 = "อ๊ะ คุณครู ได้ของที่เรียกว่า...\nรายการเป้าหมายมาแล้ว คุณครูอยากได้ไหม?"
10047-600 = "การจิ้มๆ แบบนี้ก็เป็นงานเหรอ?\nถ้างั้นฉันจะไปจิ้มๆ คุณครูบ้างนะ"
10047-610 = "จะอู้ไม่ได้น้า~\nเมื่อกี้หัวหน้านิยะบอกมา-"
10047-620 = "ว้าว- สุดยอดเลย...!"
10047-630 = "คุณครูพยายามมากเลยนะ\nดีมาก ดีมาก~"

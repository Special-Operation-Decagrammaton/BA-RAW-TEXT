[translation]
10047-210 = "啊，在等你唷，老師～"
10047-220 = "……咦？\n我在等什麼咧？"
10047-230 = "歡迎光臨，\n歡迎來到海之家～"
10047-240 = "……這樣對嗎？"
10047-250 = "大家好像都很忙……\n那就老師和我一起玩吧？"
10047-260 = "這麼說來佳穗有說，\n如果感到危險的話……"
10047-270 = "就立刻發射\n防犯用的榴彈。"
10047-280 = "啊，其實為了\n預防中暑……"
10047-290 = "來，抹茶彈珠汽水。"
10047-300 = "老師也來喝吧？"
10047-310 = "老師，你叫我嗎？\n我剛才也在心中\n呼喚了你。"
10047-320 = "真巧呢～"
10047-330 = "啊，在等你唷，老師～"
10047-340 = "……咦？\n我在等什麼咧？"
10047-350 = "歡迎光臨，\n歡迎來到海之家～"
10047-360 = "……這樣對嗎？"
10047-370 = "大家好像都很開心呢～\n嗯，有精神是好事。"
10047-380 = "大家好像都很努力呢。\n那，我也要努力。"
10047-390 = "咦，已經結束了嗎？\n那老師，大家一起玩水吧？"
10047-400 = "大家好像都很忙……\n那就老師和我一起玩吧？"
10047-410 = "這麼說來佳穗說，\n如果感到危險的話…"
10047-420 = "就立刻發射\n防犯用的榴彈。"
10047-430 = "啊，其實為了\n預防中暑……"
10047-440 = "來，抹茶彈珠汽水。"
10047-450 = "老師也來喝吧？"
10047-460 = "老師，你叫我嗎？\n我剛才也在心中\n呼喚了你。"
10047-470 = "真巧呢～"
10047-580 = "要做的事真多～\n老師也很辛苦呢～？"
10047-590 = "啊，老師。目標清單……？\n我拿到了這個東西。\n老師，想要嗎？"
10047-600 = "戳戳，也是工作嗎？\n那，我也要戳戳老師。"
10047-610 = "不可以偷懶～\n剛剛仁耶部長是這麼說的。"
10047-620 = "哇啊，好厲害……！"
10047-630 = "老師，很努力呢。\n好棒好棒。"

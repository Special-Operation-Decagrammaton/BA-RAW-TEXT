10047-580 = "할 일이 잔뜩이야~\n선생님도 큰일이네~?"
10047-590 = "아, 선생님. 목표 리스트……?\n라는 걸 받았어. 선생님, 갖고 싶어?"
10047-600 = "콕콕하는 것도, 일이야?\n그럼 나도 선생님한테\n콕콕 해줄게."
10047-610 = "땡땡이치면 안 돼~라고,\n아까 니야 부장이-"
10047-620 = "와아- 굉장해……!"
10047-630 = "선생님, 열심히 했네.\n착하다. 착해."

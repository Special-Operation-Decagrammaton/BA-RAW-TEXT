[translation]
10032-230 = "Found ya, Sensei! It's the new year and you're STILL working?! Hahaha!"
10032-240 = "Wow, wow, wow! I get to see Sensei right at the beginning of the new year?!"
10032-250 = "High five!"
10032-260 = "So, Sensei, what toy should we play with today?"
10032-270 = "Hanetsuki? Fukuwarai? Daruma otoshi! Heeheehee! ♪"
10032-280 = "Hmm, I'm kinda getting tired of playing with toys. I'm going to play with Sensei instead!"
10032-290 = "What do you think? It's a great idea, right?"
10032-300 = "Heehee. That was fun! You had fun too, right?"
10032-310 = "I hope this year is full of fun stuff, just like this!"
10032-320 = "It's time to bail Aru out of trouble! Again! Heehee. It's my favorite activity."
10032-330 = "Out of the blue, there's an offering box thief! I just love the chaos at the start of the new year!"
10032-340 = "Ugh! I hate doing nothing. I'm so booored. Let's find something to entertain ourselves, Sensei!"
10032-350 = "Another chaotic year is in the works!"
10032-360 = "Aru, Kayoko, and Haruka are all relying on you, Sensei! You better do your best! ♪"
10032-370 = "Huh? Me? Well, what do you think?"
10032-380 = "Hmmm? Tell me!"
10032-730 = "Welcome to Mutsuki's special exchange center!"
10032-740 = "Hello, Sensei! You have the lucky pouch, right? Let's open it up!"
10032-750 = "Sensei! Hello! The New Year's event is over, but..."
10032-760 = "It's still not enough! If there are any leftover lucky pouches, we should open all of them!"
10032-770 = "I wonder what's inside! *ba-dump* *ba-dump*"
10032-780 = "Huh? Why am I looking at it like that?"
10032-790 = "Well, because it's always fun to open lucky pouches!"
10032-800 = "Wow! I can't believe this was inside! I'm shocked! I envy you!"
10032-810 = "I want it too!"
10032-820 = "Yeah! It's a good item, Sensei!"
10032-830 = "This might all be thanks to me! You can be grateful. Heeheehee!"
10032-840 = "Oh, maybe you won something! Heeheehee. I mean, I did pick it for you."
10032-850 = "Think of it as an extension of me and cherish it, okay?"

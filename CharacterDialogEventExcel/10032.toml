[translation]
10032-230 = "อ๊ะ คุณครู เจอตัวแล้ว!\nถึงจะปีใหม่แล้ว แต่งานก็เยอะ\nเหมือนเดิมเลยนะ! คุณครู! "
10032-240 = "ว้าวววว! ได้มาเจอกัน\nตั้งแต่ปีใหม่แบบนี้\nน่าตกใจจริงๆ นะ! คุณครู!"
10032-250 = "เย้ ไฮไฟว์!"
10032-260 = "เอาละคุณครู วันนี้...\nเอาของเล่นอะไรมาเล่นกันดี?"
10032-270 = "ฮาเนะสึกิ?\nฟุคุวาราคิ?\nดารุมะโอโตชิ?\nฮุฮุฮุ~♪"
10032-280 = "อืมม~ เบื่อของเล่นแล้วละ\nตั้งแต่นี้ไป ให้คุณครูมาเล่น\nด้วยดีกว่า!"
10032-290 = "ว่ายังไง?\nเป็นความคิดที่ดีเลยใช่ไหม?"
10032-300 = "อา~ สนุกจังเลย!\nคุณครูก็สนุกใช่ไหม?"
10032-310 = "ถ้าตลอดปีนี้ มีแต่เรื่องสนุกๆ\nตลอดทั้งปีเลยก็คงจะดีนะ!"
10032-320 = "อ่ะฮ่า ท่าทางอารุจัง\nจะเจอเรื่องใหญ่เข้าแล้วน้า~\nแต่ว่าฉันก็สนุกแหละ\nเพราะงั้นไม่เป็นไรหรอก!"
10032-330 = "ตู้บริจาคโดนขโมยไป\nโดยไม่ทันรู้ตัวงั้นเหรอ~\nมีเรื่องวุ่นวายตั้งแต่ปีใหม่แบบนี้\nสุดยอดไปเลยน้า~!"
10032-340 = "อื้อ~! ว่าแล้วเชียว\nอยู่เฉยๆ มันน่าเบื่อนะ!\nไปกันเถอะ! คุณครู!"
10032-350 = "ปีนี้ก็ดูเหมือนว่า\nจะมีเรื่องวุ่นวาย\nเกิดขึ้นอีกเยอะแยะเลย"
10032-360 = "แต่อารุจัง คาโยโกะจัง\nแล้วก็ฮารุกะจังน่ะ\nหวังพึ่งคุณครูอยู่นะ\nเพราะงั้นก็ฝากด้วยล่ะ♪"
10032-370 = "หืม? ฉันเหรอ?\nนั่นสินะ คิดว่ายังไงล่ะ?"
10032-380 = "ยังไงดีน้า~?"
10032-730 = "ยินดีต้อนรับสู่จุดแลกของ\nของมุสึกิจังนะ~!"
10032-740 = "ว่าไง~! คุณครู!\nมีถุงโชคดีอยู่รึเปล่า?\nรีบเปิดดูเถอะ!"
10032-750 = "อ๊ะ คุณครู! ว่าไง~!\nถึงเทศกาลฉลองปีใหม่\nจะจบไปแล้ว..."
10032-760 = "แต่มันก็ยังไม่พอหรอกนะ!\nถ้ายังมีถุงโชคดีอยู่ละก็\nเปิดดูให้หมดเลยเถอะ!"
10032-770 = "นี่ๆ ได้อะไรงั้นเหรอ~?\nตื่นเต้นจัง!"
10032-780 = "หืม? ถามว่าทำไมเค้าถึง\nจ้องแบบนั้นน่ะเหรอ?"
10032-790 = "ก็นะ เวลาที่เปิด\nดูของในถุงโชคดีน่ะ\nมันน่าสนุกจะตายไป!"
10032-800 = "ว้าว! ในกล่องมีของแบบนี้\nอยู่งั้นเหรอ? มุสึกิ...ช็อก!\nน่าอิจฉาจุง~"
10032-810 = "เค้าก็อยากได้เหมือนกันนะ~"
10032-820 = "อื้อ! ของดีเลยนะเนี่ย!\nคุณครู!"
10032-830 = "อาจเป็นเพราะโชคจากเค้ารึเปล่า\nจะขอบคุณเค้าก็ได้นะ ฮึฮึ!"
10032-840 = "อ๊ะ ถูกรางวัลงั้นเหรอ? ฮิฮิฮิ\nสมแล้วที่เค้าเป็นคนเลือกให้"
10032-850 = "คิดซะว่าเป็นเค้า\nแล้วก็ใช้อย่างทะนุถนอมล่ะ~"

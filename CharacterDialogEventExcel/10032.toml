[translation]
10032-230 = "啊，老師，找～到你了！\n到了新年竟然還要工作，\n你還是老樣子呢，老師！"
10032-240 = "哇哦！沒想到剛過新年\n就能像這樣見到你，\n嚇我一跳呢，老師！"
10032-250 = "耶，擊掌！"
10032-260 = "來吧，老師，今天\n要玩什麼玩具呢？"
10032-270 = "羽根突、\n笑福面、\n打達摩！\n咯呵呵♪"
10032-280 = "唔嗯～玩也玩得\n有點膩了……\n差不多該開始\n玩老師了吧！"
10032-290 = "怎麼樣？\n不覺得是個好主意嗎？"
10032-300 = "啊～真開心！\n怎麼樣？\n老師也玩得很開心嗎？"
10032-310 = "要是今年也能像這樣\n充滿有趣的事情就好了！"
10032-320 = "啊哈，總覺得亞瑠醬\n好像很辛苦呢～\n算了，我倒是覺得有趣\n所以無所謂！"
10032-330 = "想不到居然會有\n賽錢箱小偷呢～\n才剛過新年就亂哄哄的，\n看來好像完全不會厭煩！"
10032-340 = "嗯～果然只是一直\n待著真的好無聊！\n走吧，老師！"
10032-350 = "雖然今年好像也會\n發生各式各樣的事情，"
10032-360 = "不過不管是亞瑠醬、\n佳世子醬還是遙香醬\n都很依賴老師哦♪"
10032-370 = "咦？我？呵呵，\n我反而想問，\n你覺得我是怎麼想的呢？"
10032-380 = "究竟是怎麼樣呢～？"
10032-730 = "歡迎來到無月醬的\n特別交換所～！"
10032-740 = "啊，老師！\n你有帶福袋吧？\n快點打開來看看吧！"
10032-750 = "啊，老師！\n你好呀～！\n雖然新年的活動\n已經結束了……"
10032-760 = "不過還不滿足對吧！\n如果還有剩下的福袋，\n就趕緊全都拆開吧！"
10032-770 = "那麼那麼，\n會出現什麼東西呢～？\n心動動！"
10032-780 = "嗯？問我\n為什麼一直盯著看？"
10032-790 = "你想想，開福袋這種事\n不管看幾次都很有趣不是嗎？"
10032-800 = "哇哦～！裡面\n居然有這種東西，\n無月醬也嚇了一跳！"
10032-810 = "真好真好～\n我也好想要～"
10032-820 = "啊，好像抽到了\n不錯的東西呢！老師！"
10032-830 = "這股幸運說不定\n也是託我的福哦？\n要感謝我也可以唷？咯呵呵！"
10032-840 = "啊，中獎了嗎？\n啊哈。畢竟我都\n特別幫你抽了。"
10032-850 = "要把它當成是我，\n好好愛惜哦？"

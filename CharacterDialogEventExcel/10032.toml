[translation]
10032-230 = "앗, 선생님. 찾았다!\n새해가 되어서도\n일이라니, 여전하네!\n선생님!"
10032-240 = "와-오! 새해가 되자마자\n이렇게 만나다니,\n깜짝 놀랐어! 선생님!"
10032-250 = "자, 하이파이브!"
10032-260 = "자, 선생님. 오늘은\n어떤 장난감을 가지고 놀까?"
10032-270 = "하네츠키?\n후쿠와라이?\n다루마 떨구기!\n쿠후훗♪"
10032-280 = "흐응~ 슬슬\n장난감도 질려버렸고.\n지금부터는 선생님을\n가지고 놀아야지!"
10032-290 = "어때?\n좋은 생각이지?"
10032-300 = "아~ 재밌었다!\n어때, 선생님도\n즐거웠어?"
10032-310 = "올해도 이런 식으로,\n즐거운 일이\n잔뜩이었으면 좋겠네!"
10032-320 = "아핫, 아루 쨩 왠지\n큰일인 모양이네~\n뭐, 나야 재미있으니까\n괜찮지만!"
10032-330 = "난데없이 새전함\n도둑이라니~ 새해부터\n이렇게나 시끄러운 게,\n정말 최고라니깐~!"
10032-340 = "으응~! 역시 가만히\n있기만 한 건 지루해!\n가자! 선생님!"
10032-350 = "이렇게 올해도\n여러 소동이\n일어날 거 같지만."
10032-360 = "아루 쨩도 카요코 쨩도\n하루카 쨩도. 모두\n선생님을 의지하고 있으니,\n잘 부탁해♪"
10032-370 = "응? 나?\n글쎄 어떨 거라고\n생각해?"
10032-380 = "어떨까나~?"
10032-730 = "무츠키 쨩의\n특별 교환소에 어서 와~!"
10032-740 = "안녕~! 선생님!\n복주머니, 가지고 있지?\n얼른 까보자!"
10032-750 = "앗, 선생님! 안녕~!\n새해맞이 이벤트는\n끝나버렸지만…"
10032-760 = "아직 완전 부족해!\n남은 복주머니가 있다면\n전부 까버리자!"
10032-770 = "자자, 어떤 게 나오려나~?\n두근두근!"
10032-780 = "응? 왜 그렇게\n보고 있느냐고?"
10032-790 = "그야, 복주머니를\n까는 건 몇 번을\n해도 재밌잖아!"
10032-800 = "와-오! 이런 게 들어있었다니\n무츠키 쇼크! 부럽다아~"
10032-810 = "나도 가지고 싶다아~"
10032-820 = "응! 좋은 물건이잖아!\n선생님!"
10032-830 = "이건 전부 내 덕분일지도?\n고마워해도 된다구? 쿠흐흣!"
10032-840 = "앗, 당첨이려나?\n아하핫. 모처럼\n내가 뽑아준 거니까."
10032-850 = "나라고 생각하고\n소중하게 써야 해~?"

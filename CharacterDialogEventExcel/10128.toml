[translation]
10128-150 = "ขอกล่าวทักทายค่ะ!\nฉันคือหัวหน้าฝ่ายธุรกิจ\nชมรมการค้าพิเศษ วากาสะ ฟุยุค่ะ!"
10128-160 = "ถ้าต้องการของอะไร\nก็มาสอบถามได้\nไม่ต้องเกรงใจนะคะ"
10128-170 = "ฮุ... ฮุฮุ... ฮุ..."
10128-180 = "งะ... งานแค่นี้น่ะ\nฉันรับมือไหว\nอยู่แล้วค่ะ"
10128-190 = "(ทำไมเป็นแบบนี้ล่ะ?\nทำอะไรผิดเนี่ย?)"
10128-200 = "(นี่มันพังแล้วใช่มั้ยคะ?\nใช่มั้ยคะ?\nใช่ใช่มั้ยคะ?!)"
10128-210 = "ฮุ... ฮุฮุ...\nคงต้องหลีกเลี่ยง\nงานแบบนี้ไปสักพักแล้วละค่ะ..."
10128-220 = "ค่ะ ใช่แล้วค่ะ\nฉันคือหน้าตา\nของชมรมเองค่ะ"
10128-230 = "แอบนัดพบ รับงาน\nแล้วก็เจรจากับลูกค้า..."
10128-240 = "ค่ะ นั่นคือ\nหน้าที่ของฉันค่ะ"
10128-250 = "แน่นอนว่าถ้าไม่มีการซัพพอร์ต\nจากมิโยะและริตสึจัง"
10128-260 = "ฉันก็คงเป็นแค่\nนักเรียนโรงเรียนศิลปะ\nธรรมดาๆ คนหนึ่งค่ะ"
10128-270 = "ศิลปะเป็นสิ่งที่...\nไม่ง่ายเลยนะคะ"
10128-500 = "มีเวลาและสินค้าในสต๊อก\nเหลือเฟือเลยค่ะ\nค่อยๆ ดูได้เลยนะคะ"
10128-510 = "มีของที่หาอยู่หรือเปล่าคะ?"
10128-520 = "ยังเหลือเวลาอีกหน่อย\nจนกว่าจะปิดร้านค่ะ\nค่อยๆ เลือกของดูนะคะ"
10128-530 = "มีของอื่นที่อยากได้\nต่างหากงั้นเหรอคะ?"
10128-540 = "งั้นมาบอกฉัน\nทางนี้สิคะ..."
10128-550 = "ฮะฮ่า! ถะ... ถึงจะจิ้มกันแบบนั้น\nแต่ก็ไม่ลดราคาให้หรอกนะคะ"
10128-560 = "สายตาเฉียบคมมากเลยค่ะ"
10128-570 = "ฉันก็เล็งสินค้านั้น\nอยู่เหมือนกันค่ะ"
10128-580 = "เปลี่ยนของและขอคืนเงิน\nไม่ได้นะคะ?"
10128-590 = "เลือกได้ยอดเยี่ยมเลยค่ะ\nอยากให้ห่อสินค้าให้ด้วยมั้ยคะ?"

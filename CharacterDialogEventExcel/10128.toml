[translation]
10128-150 = "我是特殊交易部的\n營業室長！若狹冬！"
10128-160 = "如果有什麼想要的東西，\n歡迎隨時找我商量。"
10128-170 = "呵，呵呵……"
10128-180 = "和平常一樣呢。\n沒有問題。"
10128-190 = "（怎麼會……？\n　到底是哪裡\n　出錯了……？）"
10128-200 = "（已經結束了？對吧？\n　果然結束了對吧！？）"
10128-210 = "呵……呵呵……\n這類的委託，\n暫時先別接了吧……"
10128-220 = "沒錯，特殊交易部的\n窗口負責人就是我。"
10128-230 = "進行接觸、承接委託，\n並讓客人滿意……"
10128-240 = "這就是我的職責。"
10128-250 = "要是沒有美代\n和律醬的支援，"
10128-260 = "我這種人\n就只是個普通的\n藝術學院生而已。"
10128-270 = "……藝術這種東西，\n其實還挺困難的呢。"
10128-500 = "庫存非常充足哦。\n還請盡情參觀選購。"
10128-510 = "找到想要的東西了嗎？"
10128-520 = "短時間內還沒問題哦。\n請慢慢參觀。"
10128-530 = "想要這裡沒有的東西……？"
10128-540 = "……那我們到那邊談吧。"
10128-550 = "哈哈！戳我也不會變便宜唷？"
10128-560 = "不愧是老師。\n眼光真不錯呢。"
10128-570 = "那個，是我最推薦的商品。"
10128-580 = "商品無法退換貨。\n敬請見諒。"
10128-590 = "好選擇。\n需要幫你包裝嗎？"

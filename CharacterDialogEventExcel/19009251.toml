[translation]
19009251-810 = "นี่คือการเริ่ม...\nในตำนานเลย"
19009251-820 = "นี่คือการเริ่ม...\nในตำนานเลย"
19009251-830 = "ไม่มีเวลามาลังเลแล้ว!\n\"Time is Money\" นะ\nคุณครู!"
19009251-840 = "เพลงก็เหมือนขนมมาดแลน\nมันต้องใช้เวลา\nกว่าจะสมบูรณ์ได้น่ะ"
19009251-850 = "เพลงที่สุดยอด...\nใกล้จะเสร็จสมบูรณ์แล้ว..."

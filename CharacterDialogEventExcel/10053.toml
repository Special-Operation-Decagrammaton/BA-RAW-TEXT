[translation]
10053-10 = "ยินดีต้อนรับสู่ฮาโลเฟสติวัล\nฉันเตรียมงานมาสุดฝีมือ\nเพื่อวันนี้เลยนะคะ!"
10053-20 = "ถึงจะเป็นกรรมการจัดงาน\nแต่ฉันก็จะลงแข่ง\nในบางรายการด้วยค่ะ"
10053-30 = "คุณครูคะ คุณครูต้องจับตาดู\nความทุ่มเทของฉันนะคะ"
10053-40 = "เช็กสภาพร่างกายเรียบร้อย\nเช็กอุปกรณ์ต่างๆ เรียบร้อย"
10053-50 = "แผนการฮาโลเฟสติวัล...\nช่างสมบูรณ์แบบ!"
10053-60 = "มีกลุ่มนักเรียนที่ดูเป็นตัวป่วน\nอะไรสักอย่างในตอนนี้ด้วย..."
10053-70 = "อ้อ ดาวที่อยู่บนแก้ม\nนี่น่ะเหรอคะ?"
10053-80 = "เมื่อกี้มากิ\nวาดให้ฉันน่ะค่ะ"
10053-90 = "พอดีเธอบอกว่าจะเพนต์หน้า\nให้เพราะเทศกาลไม่ได้มีกัน\nบ่อยๆ น่ะค่ะ"
10053-100 = "หรือว่ามัน...\nไม่ค่อยสวย\nงั้นเหรอคะ...?"
10053-110 = "แผนการฮาโลเฟสติวัล...\nช่างสมบูรณ์แบบ!"

[translation]
10053-10 = "歡迎來到「晄輪大祭」！\n我很努力地準備\n今天的活動唷！"
10053-20 = "雖然我是實行委員，\n但我打算親自參加\n幾個項目。"
10053-30 = "老師，我活躍的表現，\n請好好地看著唷？"
10053-40 = "狀態檢查完畢。\n裝備確認完畢。"
10053-50 = "「晄輪大祭」的計畫……\n很完美！"
10053-60 = "現在不知為何，\n有一群不安分的\n學生集團…"
10053-70 = "啊，你說我臉頰上的\n星星標誌嗎？"
10053-80 = "是剛才真紀\n給我畫的。"
10053-90 = "因為是難得的慶典，\n所以給我畫了\n臉部彩繪。"
10053-100 = "我果然看起來……\n有點興奮嗎……？"
10053-110 = "「晄輪大祭」的計畫……\n完美！"
10053-120 = "現在不知為何，\n有一群吵鬧的\n學生集團…"
10053-130 = "啊，你說我臉頰上的\n星星標誌嗎？"
10053-140 = "是剛才真紀\n幫我畫的。"
10053-150 = "說是難得的慶典，\n所以要幫我畫臉部彩繪。"
10053-160 = "我果然看起來……\n有點興奮嗎……？"

[translation]
10053-10 = "<황륜대제>에 어서 오세요!\n오늘을 위해서, 그동안\n열심히 준비했다고요!"
10053-20 = "일단은 실행위원이지만,\n몇몇 경기는 직접\n출전할 예정이라서요."
10053-30 = "선생님. 제 활약, 잘\n지켜봐 주셔야 해요?"
10053-40 = "컨디션 체크 완료.\n장비 체크 완료."
10053-50 = "황륜대제의 계획은……\n완벽해!"
10053-60 = "지금 뭔가 불온해 보이는\n학생 무리가…"
10053-70 = "아, 뺨의\n이 별 말인가요?"
10053-80 = "아까 마키가\n그려주었답니다."
10053-90 = "모처럼의 축제이니\n페이스 페인팅을\n해준다고 해서요."
10053-100 = "역시 조금……\n들뜬 것처럼\n보이려나요……?"

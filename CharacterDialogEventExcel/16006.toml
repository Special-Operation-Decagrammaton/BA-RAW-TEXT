[translation]
16006-280 = "อ๊ะ คุณครูนี่นา! เชิญเลย!\nยินดีต้อนรับสู่ร้านริมทะเล!"
16006-290 = "อ๊ะ คุณครู!\nกำลังรออยู่เลยล่ะ!"
16006-300 = "เราเปิดกิจการร้านริมทะเลผ่านมา\nได้ครึ่งทางแล้วล่ะนะ!\nมาใช้เวลาที่เหลือสนุกให้เต็มที่เถอะ!"
16006-310 = "ใกล้จะหมดแล้วล่ะ!\nพยายามเข้านะ!"
16006-320 = "วันนี้เปิดร้านวันสุดท้ายแล้วนะคุณครู\nเลือกของที่อยากได้ไปครบรึยัง?"
16006-330 = "ร้านปิดแล้วค่า~!\nขอบคุณที่มาอุดหนุนนะคะ!"
16006-340 = "...คิดอย่างนั้นเหรอ?\nฮุฮุ ไม่ต้องห่วงนะ\nยังมีเวลาเหลืออยู่นิดหน่อย!"
16006-350 = "ตรวจสอบให้ดีด้วยล่ะ\nว่าลืมอะไรรึเปล่า?"
16006-360 = "อื้อ! เชิญมองได้ตามสบายเลย ดูสิ!\nมีของอร่อยเยอะแยะเลย!"
16006-370 = "คือว่าคุณครู... นี่มัน...?"
16006-380 = "จริงๆ เลย~ บอกว่าให้ดูไอเทม\nในร้านไง ไม่ได้ให้มามองฉันนะ~!"
16006-390 = "อื้อ!... ถึงจะอ้อนขนาดนั้น\nยังไงก็ให้ฟรีไม่ได้หรอกนะ"
16006-400 = "โอ้! \nสมกับเป็นคุณครูจริงๆ!"
16006-410 = "เลือกอันนั้นเหรอ?\nอื้อ! อาจจะใช้ได้ก็ได้นะ"

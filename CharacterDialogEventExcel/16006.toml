[translation]
16006-280 = "啊！是老師！\n歡迎光臨，\n你來海之家真的是來對了-！"
16006-290 = "啊，老師！\n一直在等你呢！"
16006-300 = "海之家的營業時間\n也不知不覺過了一半了！\n 要享受到最後一刻才行！"
16006-310 = "馬上就結束了！\n加油！"
16006-320 = "今天是最後一天了，老師！\n想要的東西都拿好了嗎？"
16006-330 = "營業結束，辛苦了~~！"
16006-340 = "…騙你的！\n呵呵，其實\n還剩下一點點時間！"
16006-350 = "要不要確認一下\n有沒有忘記的東西？"
16006-360 = "嗯！盡情參觀吧！參觀！\n 也有很多好吃的！"
16006-370 = "那個…老師，那個… 嗯？"
16006-380 = "真是的～不要看我，\n看商品啦～！"
16006-390 = "嗚嗚…\n即使這樣戳戳，\n也不能免費提供嗎？"
16006-400 = "喔喔-！\n果然是老師！"
16006-410 = "選擇了那個嗎？\n嗯！說不定很棒呢！"

[translation]
16006-280 = "Oh, it's Sensei! Well, welcome to the Beach Shack!"
16006-290 = "Welcome, Sensei! I've been waiting for you!"
16006-300 = "We're almost halfway to the end of the day! Enjoy while you can!"
16006-310 = "The end is close! Keep at it!"
16006-320 = "Sensei! Today's the store's last day. Did you get everything you want?"
16006-330 = "We're closed! Thank you everyone!"
16006-340 = "Thought that was it? Heehee. Don't worry. There's still some time left!"
16006-350 = "Remember to check one last time if you forgot anything!"
16006-360 = "Yes! Take a gander! Lots of tasty things!"
16006-370 = "Hey, Sensei! This one... Huh?"
16006-380 = "Come on, don't look at me! Look around the shop!"
16006-390 = "Um! N-Nothing for free, even if you keep poking me!"
16006-400 = "Wow! I knew it, Sensei!"
16006-410 = "You chose that? Hmm... Good choice!"

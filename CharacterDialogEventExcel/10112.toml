[translation]
10112-390 = "아! 선생님!\n이쪽이야~!"
10112-400 = "주인님…… 이 아니라,"
10112-410 = "선생님!\n드디어 만났다~!"
10112-420 = "야호! 선생님!\n즐기고 있어~?"
10112-430 = "후훗, 마지막까지\n놀아보자구~! 주인님,\n아니, 선생님!"
10112-440 = "벌써 끝이라니,\n시간이 너무 빠르지?"
10112-450 = "하지만 너무너무\n즐거웠어!"
10112-460 = "선생님, 어디 가고\n싶은 곳 있어?\n안내할게~"
10112-470 = "응? 왜?\n아스나에게 부탁할\n일이라도 있어?"
10112-480 = "아하하, 간지러워~!"
10112-490 = "혹시 선생님,\n놀고 싶은 거야?"
10112-500 = "헤헤, 그럼 아스나도\n선생님 간지럽힐래! 자,\n이쪽으로 와! 얼른!"

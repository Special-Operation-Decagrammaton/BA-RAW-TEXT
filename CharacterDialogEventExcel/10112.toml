[translation]
10112-390 = "อ๊ะ! คุณครู!\nทางนี้~!"
10112-400 = "นายท่าน... ไม่สิ"
10112-410 = "คุณครู!\nในที่สุดก็ได้เจอกันแล้ว~!"
10112-420 = "ยะฮู้ว! คุณครู!\nกำลังสนุกอยู่มั้ย~?"
10112-430 = "ฮุฮุ มาสนุกกัน\nจนจบงานเลยนะ~! นายท่าน\nไม่สิ คุณครู!"
10112-440 = "งานจบแล้วเหรอเนี่ย\nเวลาผ่านไปไวจังเลยเนอะ?"
10112-450 = "แต่ว่าฉันก็\nสนุกมากๆ เลยละ!"
10112-460 = "คุณครู อยากไป\nตรงไหนหรือเปล่า?\nฉันจะพาไปเอง~"
10112-470 = "หืม? ทำไมล่ะ?\nมีเรื่องอยากขอให้\nอาสึนะทำให้เหรอ?"
10112-480 = "อะฮ่าฮ่า จั๊กจี้นะ~!"
10112-490 = "คุณครูอยาก\nเล่นสนุกเหรอ?"
10112-500 = "ฮิฮิ งั้นอาสึนะ\nก็จะจั๊กจี้คุณครูบ้าง! เอาละ\nมาทางนี้สิ! เร็วเข้า!"

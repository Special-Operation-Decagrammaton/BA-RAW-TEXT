[translation]
20051-180 = "老師！\n這邊哦！這邊！"
20051-190 = "哼哼，眼睛追不上\n我的速度了對吧？"
20051-200 = "自衛隊的超級魔法戰士！"
20051-210 = "Thermite～Pink！\n就是在下！"
20051-220 = "哇啊！\n客人真多呢！"
20051-230 = "哼哼哼……\n似乎沒有人察覺呢……"
20051-240 = "平凡的我，其實是\n自衛隊的超級王牌，"
20051-250 = "還是魔法少女\n這件事……！"
20051-260 = "雖然變身已經解除了……"
20051-270 = "不過魔法是不會結束的！\n耶嘿嘿！"
20051-280 = "是的！\n我是Thermite Pink！\n也是宇沢澪紗！"
20051-290 = "呵呵……\n我一直在練習的\n變身姿勢……"
20051-300 = "就在這裡表演給你看吧！\n首先是……"
20051-310 = "呀啊！？"
20051-320 = "剛，剛才……\n好像跟認識的人\n對到眼了……"
20051-330 = "這個嗎？\n是Thermite Pink的魔杖！"
20051-340 = "因為官方的魔杖\n有點貴……"
20051-350 = "所以，我就把自己的\n拿來裝飾了一下！"
20051-360 = "Thermite Pink！變身！"
20051-370 = "來！一起去守護和平吧！"
20051-470 = "咻嚕嚕～\n閃閃發光！！亮晶晶！"
20051-480 = "歡迎來到魔法市場～！"
20051-490 = "沒有半價貼紙哦！？\n因為這裡不是超市！"
20051-500 = "啊，這套衣服\n是非賣品哦！\n因為只有一件！"
20051-510 = "像紀念品店一樣，\n真有趣呢！"
20051-520 = "交易……換句話說，\n就是簽訂契約的意思！"
20051-530 = "這就是大人的財力……！\n就跟英雄一樣！"
20051-540 = "那個，感覺\n很像魔法道具！"
20051-550 = "是魔法購物呢！"
20051-680 = "哇！這是！可以\n抽卡的東西呢！\n太讓人懷念了！"
20051-690 = "只要像這樣！\n卡咯卡咯地轉就行了哦！"
20051-700 = "這種東西，\n居然還留著呢！"
20051-710 = "來吧老師！\n快點轉吧！"
20051-720 = "來，把剩下的全～部\n用來轉一轉吧！"
20051-730 = "會抽出什麼呢！\n好期待！"
20051-740 = "這裡真的很棒呢！\n要是這裡是\n我的家就好了……！"
20051-750 = "啊啊！那個是！\n終極稀有！？"
20051-760 = "是我也只抽過一次的\n超！稀有卡唷！？"
20051-770 = "哦哦！超級稀有！\n這是很少見的哦！"
20051-780 = "金色！！真不錯呢！\n亮晶晶的！"
20051-790 = "啊啊，啊……"
20051-800 = "那是槓龜卡片呢！\n我也是第一次看到實物！"

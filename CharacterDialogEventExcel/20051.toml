[translation]
20051-180 = "Sensei! Here, over here!"
20051-190 = "Fufu, I suppose you couldn't keep up with how fast I was?"
20051-200 = "The Vigilante Crew's super-magical warrior!"
20051-210 = "Thermite Pink is here!"
20051-220 = "Whoa! There are so many guests!"
20051-230 = "Fufufu... I don't think anyone's noticed yet..."
20051-240 = "That an ordinary person like me was actually the Vigilante Crew's super ace..."
20051-250 = "...and a magical girl!"
20051-260 = "The transformation is over..."
20051-270 = "...but magic isn't! Eheehee!"
20051-280 = "Yes! Thermite Pink here! Also known as Uzawa Reisa!"
20051-290 = "Fufu, I'll show you my transformation pose..."
20051-300 = "I've been practicing! For starters..."
20051-310 = "Kyaaah?!"
20051-320 = "I-I feel like I just made eye contact with someone I know..."
20051-330 = "This? It's Thermite Pink's magic wand!"
20051-340 = "The official wand is a bit pricy..."
20051-350 = "So I tried decorating it with stuff I have at home!"
20051-360 = "Thermite Pink! Transformation!"
20051-370 = "Now! Let's go protect peace!"
20051-470 = "Swoosh! Bam-bam!! Sparkle!"
20051-480 = "Welcome to the magic store!"
20051-490 = "We don't have half-off stickers, okay?! This isn't a supermarket!"
20051-500 = "This outfit is not for sale! I have no extras!"
20051-510 = "This feels nice. It's just like a souvenir shop!"
20051-520 = "Exchange... In other words, making a contract!"
20051-530 = "So this is the adult's wealth...! Like a hero!"
20051-540 = "This feels like a magic item for some reason!"
20051-550 = "So it's magical shopping!"
20051-680 = "Whoa! This is...! It's the thing you use to pull cards! I haven't seen one in so long!"
20051-690 = "You insert a medal, like this! And clink! Clank! There you go!"
20051-700 = "They still had these machines here!"
20051-710 = "All right, Sensei! Let's give it a spin!"
20051-720 = "Let's put in all the remaining medals and spin!"
20051-730 = "I wonder what we'll get! I'm excited!"
20051-740 = "This place is incredible! I wish this was my home...!"
20051-750 = "Aah!! Isn't that an ultra-rare one?!"
20051-760 = "I only pulled that once in my life before. It's a super-rare card!"
20051-770 = "Ooh! A super-rare card! These are hard to find!"
20051-780 = "Gold! That's nice! It's shiny!"
20051-790 = "Ah, ah..."
20051-800 = "That's a dud! This is actually my first time seeing one too!"

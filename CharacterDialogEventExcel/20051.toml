[translation]
20051-180 = "คุณครู!\nตรงนี้ค่ะ ตรงนี้!"
20051-190 = "ฮุฮุ ฉันเร็วเกิน\nจนตามไม่ทันสินะคะ?"
20051-200 = "ซูเปอร์ เมจิคัล วอริเออร์\nแห่งกลุ่มรักษาความสงบ!"
20051-210 = "เทอร์ไมต์ พิงค์เองค่ะ!"
20051-220 = "ว้าวว!\nมีคนมาเที่ยวเยอะจังเลยค่ะ!"
20051-230 = "ฮุฮุฮุ... เหมือนจะไม่มีใคร\nสังเกตได้เลยนะคะ..."
20051-240 = "ว่าฉันที่ธรรมดาคนนี้\nที่จริงเป็นซูเปอร์เอซ\nของกลุ่มรักษาความสงบ"
20051-250 = "และเป็นสาวน้อย\nเวทมนตร์ด้วย...!"
20051-260 = "ถึงจะกลับร่างเดิมแล้ว"
20051-270 = "แต่เวทมนตร์ก็ยัง\nไม่หมดหรอกนะคะ! ฮิฮิฮิ!"
20051-280 = "ค่ะ! เทอร์ไมต์ พิงค์เองค่ะ!\nรู้จักกันในชื่อ\nอุซาวะ เรอิสะด้วยค่ะ!"
20051-290 = "ฮุฮุ ท่าโพสตอนแปลงร่าง\nที่ฉันหมั่นฝึกซ้อมมา..."
20051-300 = "ฉันจะโชว์ให้เห็นที่นี่ค่ะ!\nก่อนอื่นก็..."
20051-310 = "อ๊าย!?"
20051-320 = "มะ... เมื่อกี้เหมือน\nได้สบตากับ\nคนที่รู้จักเลย..."
20051-330 = "อันนี้น่ะเหรอคะ? ไม้กายสิทธิ์ของ\nเทอร์ไมต์ พิงค์ยังไงล่ะคะ!"
20051-340 = "แท่งไฟออฟฟิเชียล\nมันค่อนข้างแพง..."
20051-350 = "ฉันก็เลยเอาอันที่มีที่บ้าน\nมาตกแต่งดูค่ะ!"
20051-360 = "เทอร์ไมต์ พิงค์! เปลี่ยนร่าง!"
20051-370 = "เอาละ! ไปรักษาความสงบสุขกันค่ะ!"
20051-470 = "ชูรูรู ปาปัมปาป๊าม!!!\nวิ้งวับ!"
20051-480 = "เชิญเข้าสู่ตลาดเวทมนตร์ค่ะ!"
20051-490 = "ไม่มีสติกเกอร์ครึ่งราคาหรอกค่ะ!\nที่นี่ไม่ใช่ซูเปอร์มาร์เก็ตนะคะ!"
20051-500 = "ชุดนี้ไม่ขายค่ะ!\nพอดีไม่มีสำรองน่ะค่ะ!"
20051-510 = "ดีจังเลยนะคะ เหมือนร้านขายของที่ระลึกเลย!"
20051-520 = "การซื้อขาย...\nก็คือการทำสัญญา!"
20051-530 = "นี่สินะความร่ำรวยของผู้ใหญ่...!\nเหมือนฮีโร่เลยค่ะ!"
20051-540 = "รู้สึกเหมือนเป็นไอเทมเวทมนตร์เลยนะคะ!"
20051-550 = "นี่ก็คือเมจิคัล ช้อปปิ้ง! สินะคะ!"
20051-680 = "ว้าว! นี่มัน!\nเกมเลือกการ์ดนี่คะ!\nไม่ได้เล่นมานานมากเลยค่ะ!"
20051-690 = "ใส่เหรียญเข้าไป\nแล้วก็หมุน! ครืดด! กึก!\nเท่านี้เองค่ะ!"
20051-700 = "ยังมีเครื่องแบบนี้\nอยู่อีกสินะคะเนี่ย!"
20051-710 = "เอาละ คุณครู!\nรีบหมุนดูสิคะ!"
20051-720 = "เอาละ ใส่เหรียญที่เหลือ\nให้หมด แล้วหมุนเลยค่ะ!"
20051-730 = "จะได้อะไรคะ!\nอยากรู้จังเลยค่ะ!"
20051-740 = "ที่นี่ยอดเยี่ยมจังเลยนะคะ!\nอยากให้ที่นี่\nเป็นบ้านของฉันจัง...!"
20051-750 = "อ๊ะ!! นี่มัน\nอัลตราแรร์!?"
20051-760 = "ฉันก็เพิ่งเคยหมุนออก\nแค่ครั้งเดียวเหมือนกันค่ะ\nเป็นการ์ดที่แรร์มากๆ เลยนะคะ!"
20051-770 = "โอ้ว! ซูเปอร์แรร์ค่ะ!\nหาไม่ได้ง่ายๆ เลยนะคะ!"
20051-780 = "โกลด์! ดีเลยค่ะ!\nวิบวับวิบวับเลย!"
20051-790 = "อ๊ะ... อ่า..."
20051-800 = "แบบนั้นคือการ์ดเน่าค่ะ!\nฉันเองก็เพิ่งเคย\nเห็นของจริงค่ะ!"

[translation]
20033-520 = "นี่คือร้านที่เปิดเป็นพิเศษ\nเป็นที่ระลึกให้ปาร์ตี้เกเฮนน่า"
20033-530 = "เข้ามาชมให้หนำใจเลยสิ หึหึ"
20033-540 = "นึกว่าใครที่ไหน ครูเองเหรอ\nคิดได้รึยังว่าจะซื้ออะไร?"
20033-550 = "คิกคิก น่าเสียดายนะ\nแต่ร้านค้าชั่วคราวเปิดถึงแค่เท่านี้"
20033-560 = "อย่าทำหน้าเหมือนเสียดายแบบนั้นสิ"
20033-570 = "ไว้รอบหน้าฉันจะขยายร้าน\nแล้วกลับมาอย่างสง่างามเลย คิกคิกคิก!"
20033-580 = "ของทุกชิ้นที่นี่ เป็นของที่\nแพนเดโมเนียม โซไซตี้เตรียมมา"
20033-590 = "อ้อ ที่เป็นอย่างนี้ได้\nเพราะเรามีกำลังทรัพย์ยังไงล่ะ"
20033-600 = "ยังเร็วไปที่จะตกใจนะ\nหึหึหึ"
20033-610 = "หืม? ของมันเป็นยังไงเหรอ?"
20033-620 = "คิกคิกคิก หรือว่าเป้าหมายของครู\nคือท่านมาโคโตะผู้นี้?"
20033-630 = "ไม่ได้มีธุระอะไรเป็นพิเศษ...?\nงั้นเหรอ?"
20033-640 = "โอ้ เลือกชิ้นนั้นเหรอ\nรสนิยมดีจังเลยนะ"
20033-650 = "นั่นเป็นของที่เรา\nก็แนะนำเหมือนกัน"
20033-660 = "คิกคิกคิก เลือกของดีเลยนะ"
20033-670 = "คิกคิกคิก วันนี้เรา\nอารมณ์ดีเลยละ"
20033-680 = "งั้นจะแถมของให้แล้วกัน! นี่คือหนังสือยื่น\nเสนอความร่วมมือกับแพนเดโมเนียม โซไซตี้!"
20033-690 = "อะไรนะ? ไม่ต้องการเหรอ?"
20033-700 = "อยากได้อันนี้เหรอครู\nหึหึ เป็นคนแปลกดีแฮะ"

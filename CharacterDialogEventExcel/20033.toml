[translation]
20033-520 = "這是為了紀念格黑娜派對\n特別開張的店鋪。"
20033-530 = "儘管看個過癮吧。嘻嘻。"
20033-540 = "……還想說是誰，原來是老師啊。\n要買的東西已經決定好了嗎？"
20033-550 = "嘻嘻，很可惜，\n臨時店鋪已經結束了。"
20033-560 = "別露出遺憾的表情。"
20033-570 = "下次會更把規模擴張，\n盛大且豪華地回歸，嘻嘻嘻！"
20033-580 = "這裡的東西全都是\n我們萬魔殿準備的。"
20033-590 = "啊啊，是因為我們有財力\n才有可能辦得到。"
20033-600 = "現在驚訝還太早囉。\n咯咯咯。"
20033-610 = "嗯？東西怎麼了嗎？"
20033-620 = "嘻嘻嘻，難道說，老師\n看上的是我真琴大人嗎？"
20033-630 = "……其實沒什麼事……？\n……這樣啊。"
20033-640 = "哦，居然會選那個。\n你審美的眼光，我就給予高度評價吧。"
20033-650 = "那是我推薦的東西。"
20033-660 = "嘻嘻嘻。\n你選了不錯的東西呢。"
20033-670 = "嘻嘻嘻，今天\n我心情很好。"
20033-680 = "送你一點贈品吧！\n是萬魔殿的合作提案書！"
20033-690 = "……什麼？\n你說……不需要？"
20033-700 = "你想要那個嗎，老師。\n嘻嘻，真是個怪人啊。"

[translation]
20033-520 = "It's a shop that was specially opened in honor of the Gehenna Party."
20033-530 = "Feel free to take a look around. Kihehe."
20033-540 = "...I was wondering who that was. Have you decided on your purchase, Sensei?"
20033-550 = "Kehe. It's a shame, but this is the end for this temporary store."
20033-560 = "Oh, don't look so down and out."
20033-570 = "We'll make the next one even larger and more luxurious! Kihehe!"
20033-580 = "All the goods here are items that the Pandemonium Society has prepared."
20033-590 = "Ahh, it was possible thanks to our vast financial power."
20033-600 = "We've just begun! Don't be surprised just yet. Kihehe."
20033-610 = "Hm? What did I do with the goods?"
20033-620 = "Kihehe. Are you plotting to take your place at my side?"
20033-630 = "You don't have any particular aim? Is that so...?"
20033-640 = "Oho, to think you'd choose that path. I applaud your skilled evaluation."
20033-650 = "I was going to recommend you take that one."
20033-660 = "Kihehe. Excellent choice."
20033-670 = "Kihehe. I am in a good mood today."
20033-680 = "I'll throw in a little bonus! Here's a cooperation proposal from the Pandemonium Society!"
20033-690 = "...Huh? You don't need it?"
20033-700 = "So that's what you wanted, Sensei? Kihehehe. You're a strange one."

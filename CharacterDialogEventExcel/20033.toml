[translation]
20033-520 = "게헨나 파티를 기념해,\n특별히 개점한 상점이다."
20033-530 = "맘껏 둘러보도록. 키킷."
20033-540 = "……누군가 했더니, 선생인가.\n구입할 물건은, 이미 정했나?"
20033-550 = "키킷, 아쉽지만,\n임시 상점은 여기까지다."
20033-560 = "그렇게 아쉬운 표정 짓지 말도록."
20033-570 = "다음엔 더욱 규모를 확장해서,\n성대하고 호화롭게 돌아올 테니까, 키키킥!"
20033-580 = "여기 있는 물건은 전부, 우리\n판데모니움 소사이어티가 마련한 것이다."
20033-590 = "아아, 우리에게 재력이\n있기에 가능했던 일이지."
20033-600 = "놀라긴 이르다고.\n큭큭큭."
20033-610 = "음? 물건은 어쨌지?"
20033-620 = "키키킷, 혹시, 선생의 목적은\n이 마코토 님 쪽인가?"
20033-630 = "…특별히 용무는 없다…?\n…그런가."
20033-640 = "호오, 그걸 고르다니.\n그 심미안, 높이 평가해 주마."
20033-650 = "그건 이 몸도 추천하는 물건이다."
20033-660 = "킥킥킥. 좋은 물건을 골랐군."
20033-670 = "키키킥, 오늘의 이 몸은\n기분이 좋군."
20033-680 = "덤을 주도록 하지!\n판데모니움 소사이어티의 협력 제안서다!"
20033-690 = "…뭐? 필요 없다고?"
20033-700 = "그게 갖고 싶었나. 선생.\n킥킥, 별난 사람이로군."

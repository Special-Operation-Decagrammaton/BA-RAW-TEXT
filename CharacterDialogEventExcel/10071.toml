[translation]
10071-10 = "這終究只是為了\n調查事件的潛入作戰……\n希望能順利結束。"
10071-20 = "RABBIT1，\n已完成作戰準備。\n老師，請下指示。"
10071-30 = "看來我們似乎影響到\n居民們的心情了……"
10071-40 = "該怎麼辦才好呢……？"
10071-50 = "呵呵……\n比起享受海水浴，\n這樣更像是我們\nSRT的夏天。"
10071-60 = "辛苦你了，老師。"
10071-70 = "雖然是為了作戰，\n不過難得來到海邊……"
10071-80 = "……可以占用\n老師一點時間嗎？"
10071-90 = "最後一次吃到\n放滿蝦子的三明治\n是什麼時候呢。"
10071-100 = "（小心不要\n　讓人覺得\n　很興奮……）"
10071-110 = "我們不在的這段期間，\n蹦蹦的照顧"
10071-120 = "交給了女武神\n生活安全局的大家。"
10071-130 = "有時，我覺得蹦蹦\n比起RABBIT小隊，"
10071-140 = "好像更喜歡\n生活安全局的大家，\n覺得有點難過……"
10071-530 = "你來了啊，老師。\n我整理了調查所需的清單。"
10071-540 = "……以上就是今天\n潛入作戰的目標。"
10071-550 = "有什麼事嗎？"
10071-560 = "那個……這件泳裝\n布料有點薄……"
10071-570 = "所以……\n那樣一直盯著我看……\n會讓我很在意的……"
10071-580 = "不愧是你，老師。\n我一直都很相信你。"
10071-590 = "非常感謝你的協助。\n真是幫大忙了。"

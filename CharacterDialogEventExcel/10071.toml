[translation]
10071-10 = "이것은 어디까지나\n사건의 조사를\n위한 잠입 작전……\n무사히 끝났으면 좋겠네요."
10071-20 = "RABBIT 1, 작전 준비를\n모두 마쳤습니다.\n선생님, 지시를."
10071-30 = "아무래도 주민 여러분의\n기분을 상하게\n만든 것 같습니다만……"
10071-40 = "어떻게 하면 좋을까요……?"
10071-50 = "후후……\n해수욕을 즐기는 것 이상으로,\n저희 SRT 다운 여름이 되었네요."
10071-60 = "수고 많으셨습니다, 선생님."
10071-70 = "작전 때문이긴 합니다만,\n모처럼 바닷가에\n나왔는데……"
10071-80 = "……잠깐 시간 내 주실 수\n있으신가요?"
10071-90 = "마지막으로\n새우가 듬뿍 들어간\n샌드위치를 먹은 것이\n언제였었는지……"
10071-100 = "(너무 들뜬 것처럼\n보이면 안 될 텐데……)"
10071-110 = "자리를 비우는 동안\n깡총이는,"
10071-120 = "발키리 생활안전국의\n학생 여러분께 돌봐달라고\n부탁드렸습니다."
10071-130 = "가끔은 깡총이가\nRABBIT 소대보다,"
10071-140 = "생활안전국 학생 여러분을\n더 좋아하는 것처럼 보여서\n서운할 때도 있답니다."
10071-530 = "어서 오세요, 선생님.\n조사를 위해 필요한 목록을\n정리했습니다."
10071-540 = "……이상이, 오늘 잠입 작전의\n타깃입니다."
10071-550 = "네, 무슨 일이신가요?"
10071-560 = "그…… 이 수영복은 원단이\n조금 얇은 것 같아서……"
10071-570 = "그, 그렇게 쳐다보시면……\n신경이 쓰이는데요……"
10071-580 = "역시 선생님이시군요.\n믿고 있었습니다."
10071-590 = "도와주셔서 감사합니다.\n큰 도움이 되었어요."

[translation]
10071-10 = "Today's mission is to infiltrate and investigate... I hope we don't run into any trouble."
10071-20 = "RABBIT 1, preparations completed. Sensei, your orders, please."
10071-30 = "I'm afraid I've upset the town residents..."
10071-40 = "What should I do?"
10071-50 = "Heehee... We really did this summer in full SRT-style, didn't we? It was more fun than a simple beach vacation, in a lot of ways."
10071-60 = "Great job, Sensei."
10071-70 = "I know we're here on a mission, but we are at the beach after all..."
10071-80 = "...Do you have some time for us?"
10071-90 = "When was the last time I had a shrimp sandwich...?"
10071-100 = "(I shouldn't look too excited...)"
10071-110 = "I've made arrangements for our absence."
10071-120 = "The students at the Valkyrie Public Safety Bureau will be watching Bun Bun while we're gone."
10071-130 = "I have to admit, I get a little jealous sometimes..."
10071-140 = "It's just that... Bun Bun seems to like the Public Safety Bureau students more than us sometimes."
10071-530 = "Welcome, Sensei. I've organized a list of things we'll need for the investigation."
10071-540 = "...This is the target for today's undercover operation."
10071-550 = "Yes. H-How can I help you?"
10071-560 = "Um... The fabric of this swimsuit is somewhat thin..."
10071-570 = "I-If you look at me like that... I don't know what to say..."
10071-580 = "As I'd expect, Sensei. I had faith in you."
10071-590 = "Thank you for your assistance. You were a huge help."

[translation]
10071-10 = "นี่เป็นปฏิบัติการแฝงตัวที่\nแสนอันตราย เพื่อสืบข้อมูล\nเกี่ยวกับเหตุการณ์ที่เกิดขึ้น...\nหวังว่าจะผ่านไปได้ด้วยดีนะคะ"
10071-20 = "RABBIT 1 เตรียมพร้อม\nสำหรับออกปฏิบัติการแล้วค่ะ\nคุณครูคะ! ขอคำสั่งด้วยค่ะ!"
10071-30 = "ไม่ว่ายังไงก็ดูเหมือนว่า\nจะไปทำให้ชาวเมือง\nเสียความรู้สึกเข้าซะแล้วละค่ะ..."
10071-40 = "จะทำยังไงดีคะ...?"
10071-50 = "ฮุฮุ... แค่ได้สนุกไปกับ\nการเล่นน้ำทะเล เท่านี้ก็สมกับ\nเป็นฤดูร้อนของ SRT แล้วละค่ะ"
10071-60 = "ขอบคุณที่ทำงานอย่างหนัก\nเลยนะคะ คุณครู"
10071-70 = "ถึงจะมาที่นี่เพราะเรื่องปฏิบัติการ...\nแต่ก็อุตส่าห์ได้มาถึงทะเลทั้งที..."
10071-80 = "...ฉันขอรบกวนเวลา\nคุณครูสักหน่อยได้มั้ยคะ?"
10071-90 = "ครั้งสุดท้ายที่ได้กิน\nแซนด์วิชสอดไส้กุ้งแน่นๆ\nแบบนี้คือเมื่อไรกันนะ..."
10071-100 = "(ไม่ควรทำตัวให้ดู\nหละหลวมแบบนี้เลยแท้ๆ...)"
10071-110 = "ตอนที่ฉันไม่อยู่\nก็เลยเอาเจ้าเปียงโกะ"
10071-120 = "ไปฝากให้ทางสำนัก\nรักษาความปลอดภัยของวัลคิรี่\nช่วยดูแลแทนน่ะค่ะ"
10071-130 = "บางครั้งฉันก็รู้สึกเสียใจนิดๆ\nที่ดูเหมือนว่าเจ้าเปียงโกะ"
10071-140 = "จะชอบคนของทางสำนักรักษา\nความปลอดภัยมากกว่า\nสมาชิกกองทหาร RABBIT อีกค่ะ"
10071-530 = "เชิญค่ะคุณครู\nฉันจัดเรียงรายการสิ่งของ\nที่จำเป็นสำหรับการสืบสวนไว้แล้วค่ะ"
10071-540 = "นะ...นี่คือเป้าหมาย\nของปฏิบัติการแฝงตัววันนี้ค่ะ"
10071-550 = "มีเรื่องอะไรงั้นเหรอคะ?"
10071-560 = "คือว่า... ผ้าที่ใช้ทำชุดว่ายน้ำชุดนี้\nมันค่อนข้างบางนิดหน่อย..."
10071-570 = "ถะ...ถ้าจ้องกันแบบนั้น\nมันรู้สึกน่าอึดอัดใจอยู่นะคะ..."
10071-580 = "สมกับเป็นคุณครูจริงๆ\nฉันเชื่อมือคุณครูค่ะ"
10071-590 = "ขอบคุณที่ช่วยค่ะ คุณครูช่วย\nพวกเราได้มากเลยค่ะ"

[translation]
10030-130 = "ค่ะ ฉันเตรียมพร้อมแล้วละค่ะ"
10030-140 = "ไว้ใจเรื่องการสนับสนุนได้เลยค่ะ"
10030-150 = "คุณครู...?\nชะ... ช่วยตั้งใจ\nกับภารกิจด้วยค่ะ...!"
10030-160 = "ที่มาใช้เวลาเอื่อยเฉื่อย\nอยู่ที่นี่แบบนี้..."
10030-170 = "ปะ...เปล่าค่ะ\nฉันก็ไม่ได้ไม่ชอบ\nหรอกค่ะ..."
10030-180 = "ให้ฉันช่วยเรื่องอะไรดีคะ\nคุณครู?"
10030-190 = "หยุดพูดล้อเล่นเถอะค่ะ\nคุณครู..."
10030-200 = "ปะ...เปล่าค่ะ\nฉันก็ไม่ได้ไม่ชอบหรอกค่ะ..."
10030-210 = "ให้ฉันช่วยเรื่องอะไรดีคะ\nคุณครู?"

[translation]
10040-200 = "인법연구부,\n출동이에요…!"
10040-210 = "분명, 어떻게든,\n되겠……죠?"
10040-220 = "이 사건은 저희가\n해결합니다!"
10040-230 = "지, 지금 그렇게\n하기로 해, 했으니까요…?"
10040-240 = "커, 커다랗기만\n해서 죄송해요오……"
10040-250 = "어째서 이런 일이……"
10040-260 = "인법연구부가 해결할,\n거예요…. 아마도……."
10040-270 = "자, 잘할 수 있을, 까요,\n제가……"
10040-310 = "인법연구부,\n출동이에요…!"
10040-320 = "분명, 어떻게든,\n되겠……죠?"
10040-330 = "이 사건은 저희가\n해결합니다!"
10040-340 = "지, 지금 그렇게\n하기로 해, 했으니까요…?"
10040-350 = "간단하게는, 해결되지\n않을 것, 같네요….\n힘낼, 게요…!"
10040-360 = "슬슬, 마무리될 것\n같은, 느낌이……."
10040-370 = "이것도 모두와, 선생님\n덕분, 이에요……."
10040-380 = "수고하셨습니다.\n선생님. 저…. 조금은\n도움이, 되었을까요……?"
10040-390 = "커, 커다랗기만\n해서 죄송해요오……"
10040-400 = "어째서 이런 일이……"
10040-410 = "인법연구부가 해결할,\n거예요…. 아마도……."
10040-420 = "자, 잘할 수 있을, 까요,\n제가……"
10040-630 = "닌자도구 등, 여러 가지를\n준비했으니까….\n골라 보세요…."
10040-640 = "무언가 필요하시다면, 이쪽에서.\n도움이 된다면, 좋겠는데요……."
10040-650 = "사건은 무사히, 끝났지만…….\n뭔가, 신경 쓰이신다면, 네.\n아직, 늦지 않았으니까요……."
10040-660 = "아…. 저기, 저는 그게,\n파는 물건이 아니라……."
10040-670 = "혹시, 방해, 되나요?\n죄송합니다.\n비켜 있을게요……."
10040-680 = "네, 훌륭한\n닌자도구라고,\n생각해요…!"
10040-690 = "조금이라도,\n도움이 되었으면…."
10040-700 = "감사, 합니다, 선생님."
10040-710 = "과연, 그거랑, 그거랑…….\n역시, 선생님, 이시네요!"

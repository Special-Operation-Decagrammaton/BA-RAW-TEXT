[translation]
10040-200 = "ชมรมวิจัยศาสตร์นินจา\nออกปฏิบัติการค่ะ...!"
10040-210 = "ไม่ว่ายังไงก็คง...\nทำได้ใช่มั้ย...คะ?"
10040-220 = "เรื่องพวกนี้\nพวกเราจะแก้ไขเองค่ะ!"
10040-230 = "ตะ...ตอนนี้เราตกลง\nว่าจะทำแบบนั้นค่ะ...?"
10040-240 = "ขะ...ขอโทษค่ะ\nที่ตัวโตแบบนี้..."
10040-250 = "บางทีเรื่องนี้…"
10040-260 = "ชมรมวิจัยศาสตร์นินจา\nจะคลี่คลายได้ค่ะ... อาจจะนะคะ..."
10040-270 = "อะ...อาจจะทำได้ดีก็ได้...ค่ะ\nคือฉัน..."
10040-310 = "ชมรมวิจัยศาสตร์นินจา\nออกปฏิบัติการค่ะ...!"
10040-320 = "ไม่ว่ายังไงก็คง...\nทำได้ใช่มั้ย...คะ?"
10040-330 = "เรื่องพวกนี้\nพวกเราจะแก้ไขเองค่ะ!"
10040-340 = "ตะ...ตอนนี้เราตกลง\nว่าจะทำแบบนั้นค่ะ...?"
10040-350 = "ตะ...แต่ว่าดูเหมือน\nจะแก้ไขไม่ได้ง่ายๆ เลยนะคะ...\nฉันจะพยายามค่ะ...!"
10040-360 = "ดูเหมือนจะเรียบร้อย...\nแล้วนะคะ..."
10040-370 = "นี่ก็เพราะได้คุณครู\nช่วยเอาไว้ค่ะ"
10040-380 = "ขอบคุณมากค่ะ\nคุณครู ฉัน... พอช่วยคุณครู...\nได้บ้างรึเปล่าคะ...?"
10040-390 = "ขะ...ขอโทษค่ะ\nที่ตัวโตแบบนี้..."
10040-400 = "บางทีเรื่องนี้..."
10040-410 = "ชมรมวิจัยศาสตร์นินจา\nจะคลี่คลายได้ค่ะ... อาจจะนะคะ..."
10040-420 = "อะ...อาจจะทำได้ดีก็ได้...ค่ะ\nคือฉัน..."
10040-630 = "เตรียมอุปกรณ์นินจาและของอื่นๆ\nพร้อมหมดแล้ว เชิญเลือกดูได้เลยค่ะ..."
10040-640 = "ถ้าต้องการอะไร\nแล้วพวกเราช่วยได้ก็คงดีนะคะ..."
10040-650 = "คลี่คลายเหตุการณ์ได้แล้วก็จริง...\nถ้าสนใจอะไรละก็...\nตอนนี้ยังไม่สายไปนะคะ..."
10040-660 = "อา... คือว่าตัวฉัน...\nไม่ใช่สินค้าที่วางขายนะคะ..."
10040-670 = "คือว่าฉันเกะกะหรือเปล่าคะ?\nขอโทษด้วยค่ะ ฉันจะหลีกทางให้นะคะ"
10040-680 = "ค่ะ ฉันว่ามันเป็นอุปกรณ์นินจา\nที่ยอดเยี่ยมมากเลยค่ะ...!"
10040-690 = "ถ้าฉันเป็นประโยชน์\nให้คุณครูได้สักนิดคงดีค่ะ..."
10040-700 = "ขอบคุณค่ะ คุณครู"
10040-710 = "ของชิ้นนั้น แล้วก็ชิ้นนี้...\nสมกับเป็นคุณครูจริงๆ เลยค่ะ!"

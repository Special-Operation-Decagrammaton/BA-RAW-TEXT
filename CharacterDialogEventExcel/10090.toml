[translation]
10090-180 = "（別，別慌張，\n　別慌張……！）"
10090-190 = "老師，各位！\n歡迎來到百鬼夜行！"
10090-200 = "為了讓大家在百鬼夜行，\n能夠留下最棒的回憶！"
10090-210 = "里浜海花，\n會全力以赴的！"
10090-220 = "老師……\n我現在還可以吧……？"
10090-230 = "嗚嗚嗚……希望行程\n不要差太多……"
10090-240 = "當，當然修正\n也是我的工作！"
10090-250 = "都怪妖怪劇團……！"
10090-260 = "但是……喜歡\n慶典的孩子裡，\n不會有壞孩子。"
10090-270 = "……對吧，老師？"
10090-280 = "啊，老師！\n願意陪到最後，\n真的非常感謝。"
10090-290 = "能有老師在，\n真是太好了！"
10090-300 = "我，能做得好嗎？\n我現在做得好嗎……？"
10090-310 = "嗚嗚嗚……謝謝你\n能這麼說……"
10090-320 = "果然……只要將一切\n都變成慶典的話……！"
10090-330 = "咦？剛才那句有點像\n慶典怪人會說的話？\n怎麼會……"
10090-340 = "不，請等一下。\n慶典怪人……\n可以用這個為題材……"
10090-350 = "有句話說只要一起\n什麼都不可怕。"
10090-360 = "雖然如此，但\n工作的準備是要\n大家齊心協力，"
10090-370 = "才能勉強在\n期限內完成的事。"
10090-380 = "下次……\n請再到百鬼夜行來吧。"
10090-390 = "到時候再讓你\n看看真正出色\n又優秀的慶典哦！"
10090-530 = "啊，老師……！"
10090-540 = "耶嘿嘿。沒錯。\n這是修學旅行的特別商店。"
10090-550 = "請盡情參觀選購！"
10090-560 = "有喜歡的東西嗎？"
10090-570 = "還是有什麼\n需要的東西？"
10090-580 = "請儘管跟我說吧！"
10090-590 = "修學旅行商店的\n營業結束了……"
10090-600 = "但是百鬼夜行的\n慶典現在才要開始！"
10090-610 = "嗯？嗯，沒問題的。\n流通、管理、營業。"
10090-620 = "因為在社長身邊\n一起經營著百夜堂。"
10090-630 = "自然而然就學會了。"
10090-640 = "並沒有那麼辛苦。\n我已經習慣了。"
10090-650 = "不過如果老師能來……\n就好了呢。耶嘿嘿。"
10090-660 = "要那個嗎？\n謝謝惠顧！"
10090-670 = "嗯，那是個好選擇！"
10090-680 = "哇啊！我想我\n應該也會選那個！"
10090-690 = "感謝您的使用。\n耶嘿嘿。"

[translation]
10090-180 = "(당, 당황하지 마,\n당황하지 마……!)"
10090-190 = "선생님, 여러분!\n백귀야행에 오신 것을\n환영합니다!"
10090-200 = "백귀야행에서,\n최고의 추억을 남기실 수 있도록!"
10090-210 = "사토하마 우미카,\n최선을 다하겠습니다!"
10090-220 = "선생님……\n지금 저, 괜찮았죠……?"
10090-230 = "으우우…… 일정이 너무\n어긋나지 않았으면 좋겠네요……"
10090-240 = "무, 물론 그걸 되돌리는 것도\n저의 일이겠지만요!"
10090-250 = "망량즈……\n요 말썽꾸러기들……!"
10090-260 = "그래도……\n축제를 좋아하는 아이들 중에,\n나쁜 아이는 없을 테니까요."
10090-270 = "……그렇겠죠, 선생님?"
10090-280 = "아, 선생님!\n마지막까지 함께 해 주셔서\n정말 감사드려요."
10090-290 = "선생님이 계셔 주셔서,\n정말로 다행이에요!"
10090-300 = "저, 잘 해낼 수 있을까요?\n잘 하고 있는 걸까요……?"
10090-310 = "으우우…… 그렇다고 말씀해\n주셔서 감사해요……"
10090-320 = "역시…… 모든 것을\n축제로 만들어 버리면……!"
10090-330 = "네? 지금은 뭔가 축제 괴인\n같은 대사였다고요? 그런……"
10090-340 = "아뇨, 잠깐만요. 축제 괴인……\n이걸 또 소재로 삼아서……"
10090-350 = "함께라면 어떤 것도\n두렵지 않다고 하죠."
10090-360 = "그렇다고 할까,\n일의 준비란 건\n다 같이 힘을 합쳐야,"
10090-370 = "간신히 마감 안에\n끝낼 수 있는 것이니까요."
10090-380 = "다음에 또……\n백귀야행에 와주세요."
10090-390 = "그땐 정말 멋지고\n대단한 축제를 보여드릴게요!"
10090-530 = "아, 선생님!"
10090-540 = "에헤헤. 맞아요.\n수학여행 특별 상점이랍니다."
10090-550 = "마음껏 둘러보고 가세요!"
10090-560 = "마음에 드신 물건이 있으신가요?"
10090-570 = "아니면 필요하신 물건이\n있으신가요?"
10090-580 = "뭐든 말씀만 해 주세요!"
10090-590 = "수학여행 상점의\n영업은 종료되었어요……"
10090-600 = "하지만 백귀야행의\n축제는 이제부터랍니다!"
10090-610 = "네? 네. 괜찮아요.\n유통, 관리, 영업."
10090-620 = "사장님 옆에서 백야당을\n같이 운영했어서요."
10090-630 = "자연스럽게 배웠어요."
10090-640 = "그렇게 힘들지는 않아요.\n익숙한걸요."
10090-650 = "그래도 선생님께서 와 주시니까……\n좋네요. 에헤헤."
10090-660 = "그것으로 하시겠어요?\n감사합니다!"
10090-670 = "네, 그거 좋은 선택이네요!"
10090-680 = "와아! 저 같아도\n그걸 골랐을 것 같네요!"
10090-690 = "이용해 주셔서 감사해요.\n에헤헤."

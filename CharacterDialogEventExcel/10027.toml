[translation]
10027-70 = "เตรียมพร้อมแล้วละ\nออกเดินทางกันเถอะคุณครู"
10027-80 = "ถึงเวลาทำภารกิจแล้วเหรอ?"
10027-90 = "ฉันเตรียมพร้อมอยู่ตลอดเลยละ"
10027-100 = "หืม? มีอะไรเหรอ?\nเรื่องเกี่ยวกับภารกิจเหรอ?"
10027-110 = "น่าจะต้อง...\nค่อยๆ ออกเดินทางกันนะ"
10027-120 = "ถ้าตัดสินใจได้แล้วก็บอกนะ\nฉันเตรียมพร้อมไว้ทุกเวลาอยู่แล้ว"
10027-130 = "หืม...?\nคุณครูเรียกฉันเหรอ?"
10027-140 = "ใกล้จะจบแล้วสินะ..."
10027-150 = "ไม่มีปัญหา\nทุกอย่างเตรียมพร้อมไว้แล้วละ"
10027-160 = "ต้องปิดฉากให้เด็ดขาด"
10027-170 = "ฉันจะช่วยเองนะคุณครู"
10027-180 = "หืม? มีอะไรเหรอ?\nเรื่องเกี่ยวกับภารกิจเหรอ?"
10027-190 = "น่าจะต้อง...\nค่อยๆ ออกเดินทางกันนะ"
10027-200 = "ถ้าตัดสินใจได้แล้วก็บอกนะ\nฉันเตรียมพร้อมไว้ทุกเวลาอยู่แล้ว"
10027-210 = "หืม...?\nคุณครูเรียกฉันเหรอ?"
10027-340 = "เป็นผลของการปฏิบัติการสินะ"
10027-350 = "ถ้างั้นก็มาดูรายละเอียดกันเลยไหม"
10027-360 = "เป็นงานที่เน้นประสิทธิภาพสินะ\nฉันไม่ถนัดเรื่องนับเลขเลย..."
10027-370 = "มันน่าจะยัง\nหาได้อีกอยู่นะคุณครู"
10027-380 = "หืม...?\nให้คิดเลขให้แทนงั้นเหรอ?"
10027-390 = "คะ...คุณครูน่าจะรู้เรื่องที่ฉัน\nคิดเลขไม่เก่งอยู่แล้วนี่นา...?!"
10027-400 = "ขอโทษนะ ฉันคงช่วยเรื่อง\nคิดเลขไม่ได้หรอก..."
10027-410 = "เลือกได้ยอดเยี่ยมมาก"
10027-420 = "เลือกอันนั้นเหรอ\nอื้อ เลือกได้ดีเลยนะ"
10027-430 = "อืม ฉันก็เห็นด้วยเหมือนกัน"
10027-440 = "สมกับที่เป็นคุณครูจริงๆ"

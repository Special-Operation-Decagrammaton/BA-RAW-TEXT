[translation]
10027-70 = "Preparations are complete. Let's move out, Sensei."
10027-80 = "Is it time for a mission?"
10027-90 = "Don't worry yourself. I'm always on standby."
10027-100 = "Hm? Did you have a question about the mission?"
10027-110 = "The operation will commence soon. We'll discuss afterwards."
10027-120 = "I'm ready whenever you are."
10027-130 = "...Hm? Were you asking for me, Sensei?"
10027-140 = "The end is approaching."
10027-150 = "Everything is ready on my side. Leave it to me."
10027-160 = "Must finish strong."
10027-170 = "I will help, Sensei."
10027-180 = "Huh? What is it? Is it related to the mission?"
10027-190 = "It's about time we start heading out, so let's talk about that later."
10027-200 = "Let me know when we're ready to go. I can go right away."
10027-210 = "...Huh? Did you call me, Sensei?"
10027-340 = "It's the mission results."
10027-350 = "Shall we check the contents?"
10027-360 = "It requires efficiency. If only I were any good at math..."
10027-370 = "Look, Sensei. We're not too late."
10027-380 = "Wait, you want me to calculate it for you?"
10027-390 = "B-But I told you I'm bad at math!"
10027-400 = "I-I can't solve something like this..."
10027-410 = "A great choice."
10027-420 = "So that's your choice. Now I get it."
10027-430 = "Yes, I agree."
10027-440 = "I knew I could count on you."

[translation]
10027-70 = "준비는 됐어.\n출발하자, 선생님."
10027-80 = "……슬슬 작전 시간인가?"
10027-90 = "괜찮아, 언제든 갈 수 있다."
10027-100 = "응? 무슨 일이지?\n작전과 관련된 일인가?"
10027-110 = "자, 슬슬 출발할\n시간이니까……\n그런 건 나중에."
10027-120 = "출발할 때 말해줘.\n이쪽은 준비되었으니까."
10027-130 = "……응?\n선생님, 지금 불렀나?"
10027-140 = "슬슬 끝이 보이기 시작했군……"
10027-150 = "내 쪽은 언제든 준비되었으니,\n맡겨 둬."
10027-160 = "마무리는 확실하게 해야지."
10027-170 = "내가 도와주겠어, 선생님."
10027-180 = "응? 무슨 일이지?\n작전과 관련된 일인가?"
10027-190 = "자, 슬슬 출발할\n시간이니까……\n그런 건 나중에."
10027-200 = "출발할 때 말해줘.\n이쪽은 준비되었으니까."
10027-210 = "……응?\n선생님, 지금 불렀나?"
10027-340 = "작전의 성과로군."
10027-350 = "일단 내용물을 훑어보도록 할까."
10027-360 = "이건 효율을 따져봐야겠어…….\n숫자를 다루는 건 서투른데……."
10027-370 = "선생님. 이거 봐. 아무래도\n아직 늦진 않은 모양이다."
10027-380 = "뭐, 대신 계산해 달라고……?"
10027-390 = "서, 선생님은 내가\n수학을 잘 못하는 걸,\n알고 있을 텐데……?!"
10027-400 = "미안, 계산 같은 건 좀\n도와줄 수 없다……."
10027-410 = "훌륭한 선택이다."
10027-420 = "그것을 골랐군.\n응. 좋다고 생각해."
10027-430 = "응. 나도 동의한다."
10027-440 = "역시 선생님이로군."

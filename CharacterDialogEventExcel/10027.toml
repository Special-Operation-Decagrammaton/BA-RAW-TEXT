[translation]
10027-70 = "準備已經完成。\n出發吧，老師。"
10027-80 = "……快到作戰時間了？"
10027-90 = "沒問題，\n我隨時可以出發。"
10027-100 = "……嗯，怎麼了？\n是和作戰有關的事嗎？"
10027-110 = "你看，快要到\n出發時間了……\n那種事等等再說。"
10027-120 = "要出發的時候和我說一聲。\n我已經準備好了。"
10027-130 = "……嗯？老師，\n你剛才叫我嗎？"
10027-140 = "差不多要結束了……"
10027-150 = "我這邊隨時都準備好了，\n交給我吧。"
10027-160 = "確實地完成到最後。"
10027-170 = "老師，\n有什麼可以幫忙的嗎？"
10027-180 = "……嗯，怎麼了？\n是要說關於作戰的事嗎？"
10027-190 = "好了，差不多\n到出發時間了……\n有事以後再說吧。"
10027-200 = "要出發的時候說一下。\n這邊已經準備好了。"
10027-210 = "……嗯？老師，\n你剛才有叫我嗎？"
10027-340 = "作戰的報酬嗎……"
10027-350 = "先大致確認一下\n內容物吧。"
10027-360 = "這個，如果不考慮效率的話……\n我不擅長處理數字……"
10027-370 = "老師，你看。\n好像還來得及。"
10027-380 = "咦，代為計算……？"
10027-390 = "老，老師知道我\n數學不好吧……！？"
10027-400 = "抱歉，計算之類的\n我幫不上忙……"
10027-410 = "啊啊，我覺得是個好選擇。"
10027-420 = "選了那個啊。\n嗯，我覺得很好。"
10027-430 = "嗯，還不錯。"
10027-440 = "不愧是老師，判斷得真好。"

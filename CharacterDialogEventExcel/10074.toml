[translation]
10074-330 = "差不多該\n開始了吧？"
10074-340 = "愉快的「夏日活動」\n要開始囉～"
10074-350 = "哎呀，已經到\n折返點了呢……？"
10074-360 = "越來越接近尾聲了呢。"
10074-370 = "……稍微，有點寂寞。"
10074-380 = "來確認一下\n有沒有遺失物吧。"
10074-390 = "嗯？有什麼事嗎？"
10074-400 = "哎呀，沒想到\n老師還有這一面呢♡"
10074-410 = "在這裡老師對我做的事情，\n我全～部都記得喔～？"
10074-420 = "回去之後…\n請做好覺悟♡"
10074-430 = "唔呵呵……♡"
10074-600 = "今後會發生什麼，\n真讓人期待呢。"
10074-610 = "呵呵。大家\n都在等著老師唷。"
10074-620 = "啊，在這種地方，\n做那種事……♡"
10074-630 = "呵呵，老師，\n有什麼事嗎？"
10074-640 = "哎呀，這真是相當……"
10074-650 = "努力是值得的呢～"

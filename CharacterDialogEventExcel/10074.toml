[translation]
10074-330 = "그럼,\n슬슬 시작해 볼까요?"
10074-340 = "즐거운 '여름 이벤트'의\n시작이에요~ 후후."
10074-350 = "어머, 이제 돌이키기\n어려워졌네요……?"
10074-360 = "끝이 가까워졌네요."
10074-370 = "조금은, 쓸쓸합니다."
10074-380 = "빠뜨린 게 있는지\n살펴볼까요?"
10074-390 = "음? 무슨 일이실까요?"
10074-400 = "어머, 선생님에게\n이런 면이 있었다니♡"
10074-410 = "여기서 선생님이 하신 거,\n다 기억하고 있다구요~?"
10074-420 = "돌아가면…\n각오해 주세요♡"
10074-430 = "후후후……♡"
10074-600 = "앞으로 무슨 일이 일어날지,\n기대되네요."
10074-610 = "후훗. 다들 선생님을\n기다리고 있어요."
10074-620 = "아, 이런 곳에서, 그런…♡"
10074-630 = "후훗,\n선생님 무슨 일 있었나요?"
10074-640 = "어머나, 이건 꽤……."
10074-650 = "열심히 한 보람이 있었네요"

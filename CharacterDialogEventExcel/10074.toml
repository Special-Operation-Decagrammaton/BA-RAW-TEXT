[translation]
10074-330 = "ถ้างั้นก็\nมาเริ่มกันเลยไหมคะ?"
10074-340 = "กิจกรรมฤดูร้อนแสนสนุก\nเริ่มขึ้นแล้วค่า~ ฮุฮุ"
10074-350 = "ตายจริง ตอนนี้จะให้กลับไป\nก็คงยากแล้วสินะคะ...?"
10074-360 = "ใกล้จะเสร็จแล้วสินะคะ"
10074-370 = "เหงาๆ อยู่หน่อยนะคะ"
10074-380 = "ลองดูกันไหมคะ\nว่าลืมอะไรไปบ้างหรือเปล่า?"
10074-390 = "หืม? มีเรื่องอะไรเหรอคะ?"
10074-400 = "ตายจริง คุณครูก็มี\nมุมแบบนี้กับเขาด้วยเหรอ♡"
10074-410 = "สิ่งที่คุณครูทำที่นี่น่ะ\nฉันจำได้หมดเลยละค่ะ~"
10074-420 = "ถ้ากลับไปละก็...\nเตรียมตัวไว้เลยนะคะ♡"
10074-430 = "ฮุฮุฮุ...♡"
10074-600 = "อยากรู้จังเลยนะคะ\nว่าต่อไปจะเกิดเรื่องอะไร"
10074-610 = "ฮุฮุ ทุกคนกำลัง\nรอคุณครูอยู่ค่ะ"
10074-620 = "อ๊า... มาทำในที่แบบนี้ได้ไง...♡"
10074-630 = "ฮุฮุ\nคุณครูมีเรื่องอะไรมาเหรอคะ?"
10074-640 = "ตายจริง นี่มัน..."
10074-650 = "คุ้มกับที่ตั้งใจมากเลยนะคะ"

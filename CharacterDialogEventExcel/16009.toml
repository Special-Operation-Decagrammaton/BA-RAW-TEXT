[translation]
16009-280 = "啊，老師大人！\n現在正是忍術研究部\n活躍的時候！"
16009-290 = "來，唰唰地\n漂亮解決事件吧！"
16009-300 = "唔哇，好像變成\n不得了的大騷動了……"
16009-310 = "老，老師大人，\n會沒事的吧？\n我相信你哦，吶？！"
16009-320 = "妖怪劇團在作亂，\n又被陰陽部施壓，"
16009-330 = "格黑娜的萬魔殿\n也很麻煩……\n到底想怎樣啊……"
16009-340 = "……噫呀！？\n老，老師大人！？\n你剛才做了什麼！？"
16009-350 = "突，突然戳我\n會害我嚇到的……！？"
16009-360 = "所謂忍者，\n就是不會放棄的人。"
16009-370 = "不斷衝刺直到最後，\n不管發生什麼\n都要完成任務……"
16009-380 = "我們忍術研究部\n也是一樣這點，\n就讓你見識一下吧！"
16009-390 = "漂亮地解決\n陰陽部的委託，"
16009-400 = "這次一定要被認可\n為正式的社團！"
16009-430 = "啊，老師大人！\n現在正是忍術研究部\n活躍的時候！"
16009-440 = "來，唰唰地\n漂亮解決事件吧！"
16009-450 = "唔哇，好像變成\n不得了的大騷動了……"
16009-460 = "老，老師大人，\n會沒事的吧？\n我相信你哦，吶！？"
16009-470 = "嗚啊，已經到\n這個時間了……\n這，來的及嗎……？"
16009-480 = "啊啊真是的，\n妖怪劇團有夠煩人……！"
16009-490 = "我直到最後\n都不會放棄的……！\n不管是忍術研究部的認可！"
16009-500 = "還是「少女忍法帖 小小三千留」\n的訂閱人數達到100人！"
16009-510 = "唔咦……\n終，終於結束了……？\n可以回去了？"
16009-520 = "呼啊……好想趕快\n回去看忍者電影……"
16009-530 = "那種完全不用思考的\nB級的那種……"
16009-540 = "妖怪劇團在作亂，\n又被陰陽部施壓，"
16009-550 = "格黑娜的萬魔殿\n也很麻煩……\n到底想怎樣啊……"
16009-560 = "……噫呀！？\n老，老師大人！？\n你剛才做了什麼！？"
16009-570 = "突，突然戳我\n會害我嚇到的……！？"
16009-580 = "所謂忍者，\n就是不會放棄的人。"
16009-590 = "不斷衝刺直到最後，\n不管發生什麼\n都要完成任務……"
16009-600 = "我們忍術研究部\n也是一樣這點，\n就讓你見識一下吧！"
16009-610 = "漂亮地解決\n陰陽部的委託，"
16009-620 = "這次一定要被認可\n為正式的社團！"

16009-470 = "우갹, 벌써 이런\n시간이…. 이거,\n늦지 않으려나…?"
16009-480 = "아, 정말, 망량즈\n녀석들 진짜 끈질겨…!"
16009-490 = "나는 마지막까지 포기\n하지 않아…! 인법\n연구부의 정식 인가도!"
16009-500 = "<소녀인법첩 미치룻치>\n의 구독자 수 100명\n달성도!"
16009-510 = "우에에에….\n가, 간신히 끝났다……?\n이제 돌아가도 돼?"
16009-520 = "후아아…. 빨리 돌아가서,\n닌자 영화나 보고 싶어…."
16009-530 = "아무 생각할 필요 없는\nB급 영화로…."

[translation]
16009-280 = "อ๊ะ ท่านอาจารย์...!\nตอนนี้ถึงเวลาชมรมวิจัย\nศาสตร์นินจาออกปฏิบัติการแล้ว!"
16009-290 = "เอ้า เอาละๆ!\nมาจัดการกันให้เสร็จเร็วๆ\nกันดีกว่า!"
16009-300 = "ว้าว... รู้สึกเหมือน\nจะเกิดเรื่องวุ่นวายครั้งใหญ่เลยนะ..."
16009-310 = "ทะ...ท่านอาจารย์ ไม่เป็นไรใช่มั้ย?\nพวกข้าน้อยเชื่อมั่นในท่านอาจารย์นะ หืม?!"
16009-320 = "พวกปีศาจออกอาละวาด\nแถมยังถูกพวกชมรมหยินหยาง\nกดดันอีก..."
16009-330 = "แพนเดโมเนียม โซไซตี้\nของเกเฮนน่า... น่ารำคาญจะตาย...\nตอนนี้อะไรเป็นอะไรชักสับสนแล้ว..."
16009-340 = "หา?! ทะ...ท่านอาจารย์?!\nตอนนี้ทำอะไรเนี่ย?!"
16009-350 = "ถะ...ถ้าจู่ๆ มาจิ้มกันแบบนี้\nมันตกใจนะ...?!"
16009-360 = "นินจาน่ะ...\nคือผู้ที่ไม่ยอมแพ้"
16009-370 = "จะวิ่งไปให้จนถึงที่สุด\nไม่ว่าจะเกิดเรื่องอะไรขึ้น\nก็จะทำภารกิจให้สำเร็จ..."
16009-380 = "ชมรมวิจัยศาสตร์นินจาของเรา...\nก็จะแสดงความมุ่งมั่น\nให้เห็นเอง!"
16009-390 = "จัดการภารกิจของชมรม\nหยินหยางให้เรียบร้อย"
16009-400 = "คราวนี้ก็คงจะได้\nรับการยอมรับ\nเป็นชมรมทางการซะที!"
16009-430 = "อ๊ะ ท่านอาจารย์...!\nตอนนี้ถึงเวลาชมรมวิจัย\nศาสตร์นินจาออกปฏิบัติการแล้ว!"
16009-440 = "เอ้า เอาละๆ!\nมาจัดการกันให้เสร็จเร็วๆ\nกันดีกว่า!"
16009-450 = "ว้าว... รู้สึกเหมือน\nจะเกิดเรื่องวุ่นวายครั้งใหญ่เลยนะ..."
16009-460 = "ทะ...ท่านอาจารย์ ไม่เป็นไรใช่มั้ย?\nพวกข้าน้อยเชื่อมั่นในท่านอาจารย์นะ หืม?!"
16009-470 = "วะ...ว้าก! เวลาล่วงเลยมา\nขนาดนี้แล้วเหรอ...\nมันไม่ช้าไปใช่มั้ยนะ...?"
16009-480 = "อ๊ะ เจ้าพวกปีศาจ...\nน่ารำคาญจริงๆ เลยเชียว...!"
16009-490 = "ข้าน้อยจะไม่ยอมแพ้\nจนถึงที่สุดเลย...!\nทั้งเรื่องขึ้นทะเบียนชมรม!"
16009-500 = "และเรื่องการเพิ่มผู้ติดตาม\nช่องวิดีโอ <วิถีนินจาสาว\nมิจิรุจจี้> ให้ได้ 100 คนด้วย!"
16009-510 = "วะฮะฮะฮะ...\nจบแล้วงั้นเหรอ...?\nตอนนี้ก็กลับได้แล้วใช่มั้ย?"
16009-520 = "เฮ้อ... อยากรีบกลับไป\nดูหนังนินจาจังเลย..."
16009-530 = "หนังเกรดบี...\nที่ดูแล้วไม่ต้องคิดอะไรมาก"
16009-540 = "พวกปีศาจออกอาละวาด\nแถมยังถูกพวกชมรมหยินหยาง\nกดดันอีก..."
16009-550 = "แพนเดโมเนียม โซไซตี้\nของเกเฮนน่า... น่ารำคาญจะตาย...\nตอนนี้อะไรเป็นอะไรชักสับสนแล้ว..."

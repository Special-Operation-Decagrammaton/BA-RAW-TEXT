[translation]
16009-280 = "앗, 선생 공!\n지금이야말로 인법\n연구부가 활약할 때야!"
16009-290 = "자, 샤샥! 하고\n깔끔하게\n해결해버리자고!"
16009-300 = "우와아, 뭔가 엄청난\n대소동이 되어버렸다…."
16009-310 = "서, 선생 공. 괜찮아?\n믿고 있으니까, 응?!"
16009-320 = "망량즈는 날뛰고 있지.\n음양부에선 압력이\n들어오지."
16009-330 = "게헨나의 만마전은\n엄청 귀찮지….\n이젠 뭐가 뭔지…."
16009-340 = "…햣?! 서, 선생 공?!\n지금 뭘 한 거야?!"
16009-350 = "가, 갑자기 찌르면\n깜짝 놀란다구……?!"
16009-360 = "닌자란,\n포기하지 않는 자."
16009-370 = "마지막까지 달리고,\n무슨 일이 있어도\n임무를 완수한다…."
16009-380 = "우리들 인법연구부도\n그렇다는걸,\n보여주도록 하겠어!"
16009-390 = "음양부의 의뢰를\n깔끔하게 해결하고,"
16009-400 = "이번에야말로\n정식 동아리로\n인정받을 거니까!"

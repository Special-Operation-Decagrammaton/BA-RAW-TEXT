20034-1010 = "不對，豐滿……\n好像也不是……"
20034-1020 = "對了！是好像\n發生了熱鬧的事。"
20034-1030 = "在各種意義上，\n都非常混亂★呢。"
20034-1040 = "雖然我並不討厭……"
20034-1050 = "不過這種事，或許\n有人會覺得困擾呢。"
20034-1060 = "新年的氛圍\n也沉靜下來了呢。"
20034-1070 = "御節料理，\n真～的很好吃★"

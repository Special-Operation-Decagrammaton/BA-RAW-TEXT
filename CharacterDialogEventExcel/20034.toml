20034-980 = "ว่ากันว่าถ้ากินของร้อนๆ\nตอนอากาศหนาว\nร่างกายจะอบอุ่นขึ้นนะคะ"
20034-990 = "มีโอเซจิมากมาย\nกำลังรอพวกเรา\nอยู่นะคะ~"
20034-1000 = "มีอะไรที่สดใหม่..."
20034-1010 = "ไม่สิ มีอะไรที่น่ากินไหมนะ...\nอันนี้ก็ไม่ใช่..."
20034-1020 = "ค่ะ! ดูเหมือนจะมี\nเรื่องวุ่นวายเกิดขึ้นนะคะ"
20034-1030 = "ดูเป็นเรื่อง\nโกลาหล★เลยนะคะเนี่ย"
20034-1040 = "ฉันไม่ได้ไม่ชอบหรอกค่ะ"
20034-1050 = "แต่ก็มีหลายคนที่\nไม่สะดวกกับเรื่องแบบนี้ค่ะ"
20034-1060 = "บรรยากาศปีใหม่\nกำลังจะจบแล้วสินะคะ"
20034-1070 = "โอเซจิอร่อยสุดๆ~ ไปเลยค่ะ★"

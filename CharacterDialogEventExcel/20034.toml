[translation]
20034-310 = "哇！老師！\n參拜，已經去過了嗎？"
20034-320 = "如果還沒的話……\n和我一起，如何呀？"
20034-330 = "寒冷的時候吃點東西，\n身體會變得暖和對吧？"
20034-340 = "來，許多御節料理\n正在等著我們唷～？"
20034-350 = "有什麼事嗎？老師？"
20034-360 = "哎呀，是在\n對我惡作劇嗎？\n老師～？"
20034-370 = "這樣好嗎？\n我的復仇……"
20034-380 = "可能，會有點特別唷？"
20034-390 = "老師，你覺得無聊嗎？"
20034-400 = "如果是我，應該\n不會讓老師無聊……"
20034-410 = "意下如何呢……？"
20034-420 = "只有老師太狡猾了。"
20034-430 = "好，我抓到了★\n不會再放開了唷～"

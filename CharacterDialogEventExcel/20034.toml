[translation]
20034-310 = "와아! 선생님!\n새해맞이 기원,\n이미 하셨나요?"
20034-320 = "아직이라면…\n저와 함께 어떠신가요?"
20034-330 = "추울 때 뭔가를 먹으면,\n몸이 따뜻해진다고\n하잖아요."
20034-340 = "자, 많은 오세치들이\n우리를 기다리고\n있다고요~?"
20034-350 = "무슨 일이신가요. 선생님?"
20034-360 = "어머, 저한테\n장난치시는 건가요?\n선생님~?"
20034-370 = "괜찮으시겠어요?\n저의 복수는…"
20034-380 = "조금, 특별할 수도\n있는데요?"
20034-390 = "선생님, 심심하신가요?"
20034-400 = "저라면, 선생님을\n심심하지 않게\n해드릴 수 있는데,"
20034-410 = "어떠신가요…?"
20034-420 = "선생님만, 치사해요."
20034-430 = "네, 잡았어요★\n이제 놓치지 않을 거예요~"

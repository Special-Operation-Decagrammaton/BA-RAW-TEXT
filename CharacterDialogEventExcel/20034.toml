[translation]
20034-310 = "ว้าว! คุณครู!\nขอพรวันปีใหม่\nไปแล้วหรือยังคะ?"
20034-320 = "ถ้ายังละก็...\nไปขอพรกับฉันไหมคะ?"
20034-330 = "ว่ากันว่าถ้ากินของร้อนๆ\nตอนอากาศหนาว\nร่างกายจะอบอุ่นขึ้นนะคะ"
20034-340 = "มีโอเซจิมากมาย\nกำลังรอพวกเรา\nอยู่นะคะ~"
20034-350 = "มีเรื่องอะไรเหรอคะคุณครู?"
20034-360 = "ตายจริง\nแกล้งฉันเล่นเหรอคะ?\nคุณครู~?"
20034-370 = "จะไหวเหรอคะ?\nพอดีการแก้แค้นของฉัน..."
20034-380 = "อาจจะพิเศษ\nอยู่นิดหน่อยนะคะ"
20034-390 = "คุณครูเบื่อเหรอคะ?"
20034-400 = "ฉันสามารถทำให้\nคุณครูหายเบื่อ\nได้นะคะ"
20034-410 = "ว่ายังไงล่ะคะ...?"
20034-420 = "คุณครูเนี่ย เจ้าเล่ห์จังนะคะ"
20034-430 = "ค่ะ จับได้แล้วค่ะ★\nจากนี้ฉันไม่ปล่อยไปแน่ค่ะ~"
20034-960 = "ว้าว! คุณครู!\nขอพรวันปีใหม่\nไปแล้วหรือยังคะ?"

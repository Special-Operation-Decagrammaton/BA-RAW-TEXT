20034-1030 = "여러 가지 의미로\n와장창★ 한 일이네요."
20034-1040 = "저는 싫어하지 않지만,"
20034-1050 = "이런 걸 어려워하는\n사람도 있을 테니까요."
20034-1060 = "설날 분위기도 끝나가네요."

[translation]
16017-330 = "คุณครู...\nขอบคุณที่มานะคะ..."
16017-340 = "ถะ... ถ้ามีผู้ใหญ่อยู่ด้วย\nก็จะวางใจได้น่ะค่ะ..."
16017-350 = "ทะ... ที่ไฮแลนเดอร์\nไม่ได้เป็นแบบนี้ตลอด\nหรอกค่ะ แค่ครั้งนี้มัน..."
16017-360 = "มะ... ไม่สิ\nส่วนใหญ่ก็เป็นอย่างนั้นนะ..."
16017-370 = "ตะ... แต่ถึงยังไง\nก็ไม่ถึงกับอลหม่านหรอกค่ะ\nน่าจะ... นะคะ"
16017-380 = "ฮือ... ระ... รู้สึกว่า\nจะเป็นงานที่น่ารำคาญ\nเอามากๆ เลยค่ะ..."
16017-390 = "ฉันจะเชื่อพวกผู้บริหารได้มั้ยนะ...\nอืม..."
16017-400 = "ฮู่ว... ตะ... แต่ถึงยังไง\nก็รู้สึกเหมือน\nใกล้จะเสร็จแล้วนะคะ..."
16017-410 = "ทะ... ทำสำเร็จจนได้ค่ะ..."
16017-420 = "คุณครูก็ทำได้\nดะ... ดีมากเลยค่ะ..."
16017-430 = "มะ... มีเรื่องอะไรเหรอคะ...?"
16017-440 = "เอ๋... ระ... หรือว่า\nฉันทำอะไรลงไปเหรอคะ...?"
16017-450 = "ทะ... ทำไม\nลางสังหรณ์ไม่ดีเลย..."
16017-460 = "คงไม่มีอะไรใช่มั้ยคะ...?"
16017-470 = "คะ... คนที่เป็นผู้บริหาร\nทำไมเป็นแบบนั้นกันหมดนะ..."
16017-480 = "ไม่รู้กันเลยว่า\nคนทำงานต้องเหนื่อยแค่ไหน..."
16017-490 = "ทะ... ทำไมถึง\nทำอย่างนั้นล่ะคะ..."
16017-500 = "จั๊กจี้นะคะ...\nตรงนั้นเป็นจุดอ่อนของฉัน..."
16017-720 = "ระ... รู้สึกเหมือน...\nจะยังไม่จบเลยนะคะ..."
16017-730 = "คะ... ค่อยยังชั่วนะคะ\nที่คุณครูอยู่ตรงนี้ด้วย..."
16017-740 = "ต้องบอกว่ามั่นใจ...\nหรือวางใจได้ดีนะ..."
16017-750 = "แหะๆ"
16017-760 = "ถะ... ถึงจะจิ้มฉันแบบนั้น\nฉันก็ช่วยอะไร\nไม่ได้หรอกค่ะ..."
16017-770 = "ตะ... ต้องทำอะไร\nสักอย่างสิ... อึก..."
16017-780 = "วะ... ว้าว..."
16017-790 = "นะ... นั่นไม่ใช่\nเรื่องง่ายเลยนะคะ..."

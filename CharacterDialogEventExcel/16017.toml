[translation]
16017-330 = "謝，謝謝您\n願意過來……"
16017-340 = "有，有大人在的話……\n讓人，比較安心。"
16017-350 = "平常並不是這樣的！\n只是這次比較特殊……"
16017-360 = "啊……不對，好像也\n不能這麼說就是了……"
16017-370 = "但，但也沒到\n修羅場這麼誇張……\n大概吧……我也不知道。"
16017-380 = "唔唔……總，總覺得\n好像變成麻煩的事了……"
16017-390 = "各位幹部……相信他們\n應該沒問題吧……？"
16017-400 = "呼……\n都，都走到這一步了，\n應該已經沒事了吧……？"
16017-410 = "唉……\n總算結束了……"
16017-420 = "老師也真的……\n辛苦了。"
16017-430 = "怎，怎麼了？"
16017-440 = "咦……難，難道\n我做了什麼嗎……？"
16017-450 = "總，總覺得\n有點可疑……"
16017-460 = "希望會沒事……"
16017-470 = "為，為什麼幹部們\n總是那樣呢……"
16017-480 = "一點也不關注\n現場的情況……"
16017-490 = "……怎，怎麼了嗎？"
16017-500 = "很，很癢耶……\n那邊，不太能……呀啊。"
16017-720 = "雖然不覺得\n會真的結束……"
16017-730 = "有，有老師在\n真是太好了……"
16017-740 = "該說是可靠……\n還是安心呢……"
16017-750 = "耶嘿嘿。"
16017-760 = "就，就算摸我\n也不會發生什麼哦！？"
16017-770 = "得，得想想辦法才行……\n唔唔……"
16017-780 = "哇，哇啊……"
16017-790 = "太，太厲害了吧！？"

[translation]
16017-330 = "선생님……\n와주셔서 감사해요……"
16017-340 = "아, 아무래도 어른이\n계시면 든든하니까……"
16017-350 = "하, 하이랜더가 항상\n이렇지는 않으니까요……!\n이번만 좀……"
16017-360 = "아…… 아니,\n대부분은 이렇긴 한데……"
16017-370 = "그, 그래도 마냥\n개판은 아니에요.\n아마…… 모르겠지만요."
16017-380 = "으으…… 왜, 왠지\n엄청 귀찮은 일이\n되어가는 것 같네요……"
16017-390 = "간부님들을 믿어도 될까요……\n으음……"
16017-400 = "휴우…… 그, 그래도\n얼추 마무리가 되어가는\n느낌이네요……"
16017-410 = "어, 어떻게든 끝났네요……"
16017-420 = "선생님도 너, 너무\n고생 많으셨어요……"
16017-430 = "무, 무슨 일이신가요……"
16017-440 = "엣… 호, 혹시\n제가 뭔가 했나요…?"
16017-450 = "왜, 왠지 느낌이\n안 좋은데……"
16017-460 = "별일 없겠죠……?"
16017-470 = "가, 간부라는 사람들은\n왜 다 저런 걸까요……"
16017-480 = "실무자들의\n괴로움을 몰라요……"
16017-490 = "……왜, 왜 그러시는\n건가요……"
16017-500 = "간지러워요……\n약한 부위인데……"
16017-720 = "뭐, 뭔가 엄청\n많이 남은 느낌이네요……"
16017-730 = "서, 선생님이\n계셔서 다행이에요……"
16017-740 = "든든하다고 할까……\n안심이 된다고 할까……"
16017-750 = "헤헤."
16017-760 = "저, 저를 그렇게\n누르셔도…… 딱히 도움말\n같은 건 안 나오니까요……"
16017-770 = "뭐, 뭐라도 해야\n할 텐데…… 으으……"
16017-780 = "와, 와아……"
16017-790 = "쉬, 쉬운 일이\n아니었는데……"

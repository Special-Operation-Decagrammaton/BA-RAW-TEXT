[translation]
20036-320 = "เอาละ คุณครู!\nเราไม่มีเวลาแล้ว!\nรีบไปกันเถอะ!"
20036-330 = "อ๊ะ คุณครู!\nทางนี้ ทางนี้!"
20036-340 = "หืม? ทำไมเหรอ?\nมีอะไรต้องทำเหรอ?"
20036-350 = "คุณครู...\nทำอะไรน่ะ?"
20036-360 = "แบบนั้นมัน\nสนุกเหรอ? หา?"
20036-370 = "เลิกทำอะไรแปลกๆ\nแล้วไปทำเรื่องที่\nต้องทำได้แล้ว! เร็วเข้า!"
20036-510 = "เอาละ คุณครู!\nเราไม่มีเวลาแล้ว!\nรีบไปกันเถอะ!"
20036-520 = "อ๊ะ คุณครู!\nทางนี้ ทางนี้!"
20036-530 = "หืม? ทำไมเหรอ?\nมีอะไรต้องทำเหรอ?"
20036-540 = "คุณครู...\nทำอะไรน่ะ?"
20036-550 = "แบบนั้นมัน\nสนุกเหรอ?\nหา?"
20036-560 = "เลิกทำอะไรแปลกๆ\nแล้วไปทำเรื่องที่\nต้องทำได้แล้ว! เร็วเข้า!"

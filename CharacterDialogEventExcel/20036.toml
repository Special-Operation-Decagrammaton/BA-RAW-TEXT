[translation]
20036-320 = "來吧，老師！\n已經沒時間了！\n我們快走吧！"
20036-330 = "啊，老師！\n這邊，這邊！"
20036-340 = "嗯？怎麼了？\n有什麼事要做嗎？"
20036-350 = "老師……\n你在做什麼啊。"
20036-360 = "那樣你覺得\n很有趣嗎？是嗎？"
20036-370 = "別光做奇怪的事了，\n做正事啦！快點！"
20036-510 = "來吧，老師！\n沒時間了！\n我們快走吧！"
20036-520 = "啊，老師！\n這邊，這邊！"
20036-530 = "嗯？怎麼了？\n有什麼事要做嗎？"
20036-540 = "老師……\n你在幹嘛啦。"
20036-550 = "你覺得那樣很有趣嗎？\n嗯？"
20036-560 = "別再做奇怪的事了，\n快做正事啦！快點！"

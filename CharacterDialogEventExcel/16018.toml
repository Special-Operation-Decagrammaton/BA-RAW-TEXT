[translation]
16018-810 = "Sensei, do you know what this is?"
16018-820 = "...It looks like a vending machine..."
16018-830 = "Looks like it only takes exclusive medals."
16018-840 = "I guess that means we can only use it here... So let's give it a shot."
16018-850 = "Huh, it's closing time. Let's use all our medals and leave."
16018-860 = "That picture... Aren't those their outfits?"
16018-870 = "They're not going to pop out of the frame or anything, right...?"
16018-880 = "Whoa, it's shiny... Is this what they call super rare?"
16018-890 = "That one's hard to find. Is it rare?"
16018-900 = "It's gold, so I guess it's good! Let's pull a bunch more!"
16018-910 = "Ugh, I have no clue...as to what's good and what's not."
16018-920 = "Huh? Black? That's my favorite color!"
16018-930 = "*huff* *huff* ...Just what is their deal?!"
16018-940 = "Magical girls? They're not actually magic, right?!"
16018-950 = "Wh-What are you doing?! Go do your job already!"
16018-960 = "(Sensei, you're too good of a person.)"
16018-970 = "I'm telling you this because I don't think you know."
16018-980 = "But it's really loud for me whenever someone pats my helmet."
16018-990 = "..."
16018-1000 = "Only a little bit, then. ...Seriously."
16018-1010 = "Yeah, that's more like it!"
16018-1020 = "Great! This is it!"
16018-1030 = "That's it for today! Easy peasy!"
16018-1040 = "This is light work!"

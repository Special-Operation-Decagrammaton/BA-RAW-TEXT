[translation]
16018-810 = "선생, 이게 뭔지 알아?"
16018-820 = "……자판기 같기도 하고……."
16018-830 = "전용 메달만\n사용할 수 있나 봐."
16018-840 = "뭐, 여기서 밖에\n못 쓸 테니……\n시험 삼아 한번 넣어보자."
16018-850 = "어라, 폐점 시간이네.\n남은 메달 다 쓰고 나가자."
16018-860 = "옆에 붙어있는 그림…….\n그 녀석들하고\n똑같은 옷이잖아?"
16018-870 = "설마 안에서\n튀어나오는 건 아니겠지……?"
16018-880 = "우와, 반짝반짝……\n이거 초레어라는 건가?"
16018-890 = "보기 힘든 녀석이네,\n레어한 건가?"
16018-900 = "금색이네, 좋은 건가 봐!\n잔뜩 뽑아보자!"
16018-910 = "끄응, 뭐가 좋고\n나쁜 건지……\n전혀 모르겠어."
16018-920 = "어? 검은색이네?\n내가 좋아하는 색이야!"
16018-930 = "헉, 헉…… 대체\n뭐 하는 녀석들이야?!"
16018-940 = "마법소녀라고?\n진짜 마법은 아니겠지?!"
16018-950 = "뭐, 뭐 하는 거야!\n얼른 할 일이나 하라구!"
16018-960 = "(선생은 사람이\n너무 좋은 게 탈이야.)"
16018-970 = "있지, 모르는 것\n같아서 말해주는데."
16018-980 = "헬멧을 쓰다듬으면\n귀가 시끄러워."
16018-990 = "……"
16018-1000 = "조금만이야\n……정말이지."
16018-1010 = "그래, 이 정도는 되어야지!"
16018-1020 = "대박이네, 이거지!"
16018-1030 = "오늘치 끝! 간단했네!"
16018-1040 = "이 정도는 쉽지!"

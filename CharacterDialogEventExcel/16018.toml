[translation]
16018-810 = "問你哦老師，\n你知道這是什麼嗎？"
16018-820 = "……看起來，像是\n自動販賣機的樣子。"
16018-830 = "好像只能用\n專用的代幣呢。"
16018-840 = "算了，反正也只能\n用在這裡……\n就試投一次看看吧。"
16018-850 = "哎呀，\n好像到關店時間了。\n把剩下的全部用掉吧。"
16018-860 = "旁邊貼的這張圖……\n不是跟那些孩子們\n一樣的衣服嗎？"
16018-870 = "應該不會從裡面\n突然跳出來偷襲吧……？"
16018-880 = "哇，在閃閃發亮……\n這是超級稀有的意思嗎？"
16018-890 = "是很少見到的東西呢。\n稀不稀有呢？"
16018-900 = "金色……呵呵，\n好像中獎了呢！\n還會有嗎？"
16018-910 = "唔嗯～哪個是稀有\n哪個是槓龜……\n完全搞不懂。"
16018-920 = "啊，黑色！\n是我喜歡的顏色！"
16018-930 = "哈啊，哈啊……不是，\n你們到底是誰啊！？"
16018-940 = "魔法少女……\n該不會跟我說你們\n真的會用魔法吧！？"
16018-950 = "……等等，在做什麼啦！\n快去做你們自己的工作！"
16018-960 = "（真是的……老師\n　美中不足的就是　人太好這點……）"
16018-970 = "唉……你可能不知道，\n所以姑且跟你說一聲。"
16018-980 = "頭盔被碰到的話，\n聲音會反射得超級吵。"
16018-990 = "……"
16018-1000 = "就一下下哦……真是的。"
16018-1010 = "要是不拿這些的話，\n就太不划算了呢！"
16018-1020 = "很厲害嘛！\n這就是我在等的哦！"
16018-1030 = "好，今天的額度結束！\n輕輕鬆鬆呢。"
16018-1040 = "這種程度，\n交給我就是小菜一碟啦♪"

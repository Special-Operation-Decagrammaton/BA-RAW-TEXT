[translation]
16018-810 = "ครู รู้มั้ยว่านี่อะไร?"
16018-820 = "เหมือนตู้ขายสินค้าเลย..."
16018-830 = "น่าจะใช้ได้แค่\nเหรียญเฉพาะนะ"
16018-840 = "ก็นะ ไหนๆ ก็\nใช้ได้แต่ที่นี่แล้ว...\nงั้นก็ลองดูสักหน่อยแล้วกัน"
16018-850 = "เอ๋ จะปิดแล้วเหรอ\nใช้เหรียญที่มีให้หมดกันเถอะ"
16018-860 = "รูปที่ติดอยู่ข้างๆ...\nชุดเดียวกับ\nเด็กพวกนั้นเลยนี่นา?"
16018-870 = "คงไม่โผล่ออกมาจาก\nข้างในนี้หรอกเนอะ...?"
16018-880 = "ว้าว ระยิบระยับจัง...\nนี่คือการ์ดแรร์เหรอ?"
16018-890 = "ไม่ได้เห็นบ่อยๆ เลย\nเป็นการ์ดแรร์สินะ?"
16018-900 = "สีทองนี่นา ดีแน่เลย!\nหมุนไปอีกเยอะๆ เลยนะ!"
16018-910 = "ฮึ่ม ใบไหนดี\nใบไหนเกลือนะ...\nไม่เห็นจะรู้เลยสักนิด"
16018-920 = "สีดำนี่นา?\nเป็นสีที่ฉันชอบเลยละ!"
16018-930 = "แฮ่ก... แฮ่ก...\nพวกนั้นคือใครกันแน่น่ะ?!"
16018-940 = "สาวน้อยเวทมนตร์งั้นเหรอ?\nไม่ใช่เวทมนตร์จริงๆ ใช่มั้ย?!"
16018-950 = "ทะ... ทำอะไรน่ะ!\nรีบทำงานเข้าสิ!"
16018-960 = "(ครูเป็นคนดีเกินไป\nจนเป็นปัญหาแล้วเนี่ย)"
16018-970 = "นี่ ฉันจะบอกให้\nเพราะน่าจะยังไม่รู้นะ"
16018-980 = "ถ้าลูบหมวกกันน็อก\nมันจะหนวกหูน่ะ"
16018-990 = "......"
16018-1000 = "แค่นิดเดียวนะ\nจริงๆ เลยเชียว..."
16018-1010 = "ใช่แล้ว ต้องแบบนี้ละ!"
16018-1020 = "ยอดไปเลยนะ นี่ละใช่เลย!"
16018-1030 = "เสร็จงานวันนี้แล้ว!\nงานกล้วยๆ นะเนี่ย!"
16018-1040 = "งานแค่นี้น่ะหมูๆ!"

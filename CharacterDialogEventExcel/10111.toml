[translation]
10111-180 = "เฮ้! ครู!\nทางนี้ ทางนี้!"
10111-190 = "โธ่ ครู\nทำไมมาช้าแบบนี้เนี่ย?"
10111-200 = "เอาละๆ!\nตั้งสติเข้า!"
10111-210 = "ทนอีกหน่อยนะ"
10111-220 = "ไว้เสร็จงานแล้ว\nฉันจะมาเล่นด้วย!"
10111-230 = "ฮ่า! สนุกจังเลยเนอะ\nว่ามั้ย?"
10111-240 = "หืม? เรียกฉันเหรอ?\nถ้าเรียกมาแล้วก็ต้องพูดสิ"
10111-250 = "หืม? แค่ลองจิ้มดูงั้นเหรอ?\nอะไรของเค้าเนี่ย..."
10111-260 = "เฮ้อ... ทำตัว\nเหมือนเป็นเด็กไปได้"
10111-270 = "ฉันจะจำไว้นะ\nต่อไปฉันจะมาจิ้มบ้าง\nเตรียมตัวโดนไว้เลย"

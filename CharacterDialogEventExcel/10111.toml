[translation]
10111-180 = "여! 선생!\n여기야, 여기!"
10111-190 = "아, 선생!\n왜 이렇게 늦었어?"
10111-200 = "자, 자!\n정신 바짝 차리자고!"
10111-210 = "조금만 참아,"
10111-220 = "다 끝나면\n놀아줄 테니까!"
10111-230 = "하-! 나름대로\n재밌었어, 그렇지?"
10111-240 = "어? 불렀어?\n불렀으면 말을 해야\n할 거 아냐."
10111-250 = "아앙? 그냥 한 번\n찔러봤다고?\n그건 또 무슨……."
10111-260 = "…하아, 어린애 같은\n짓하고 말이야."
10111-270 = "기억해 두겠어.\n다음엔 내가 찌를\n테니까, 각오하라고."

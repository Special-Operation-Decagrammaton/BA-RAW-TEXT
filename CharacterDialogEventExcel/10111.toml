[translation]
10111-180 = "喲～老師！\n這邊，這邊！"
10111-190 = "啊，這不是老師嗎！\n你遲到囉！"
10111-200 = "好了，\n打起精神來吧！"
10111-210 = "就剩一點了不是嗎？"
10111-220 = "結束之後會陪你玩的，\n再忍耐一下吧！"
10111-230 = "哈～！真開心！\n老師你呢？"
10111-240 = "怎麼啦？\n有事的話就趕緊說吧。"
10111-250 = "啊？\n只是戳戳看而已？\n什麼意思啊……"
10111-260 = "……唉，做那種\n像小孩一樣的事。"
10111-270 = "哈哈！\n下次就輪到我囉。\n做好覺悟吧。"

[translation]
26010-270 = "งื้อ... ดูเหมือนหมู่บ้าน\nชาวประมงที่อยู่ในนิยาย\nสยองขวัญเลย..."
26010-280 = "อยากกลับไป\nโรงเรียนเร็วๆ จัง..."
26010-290 = "ไม่สิ... โรงเรียนของเรา\nไม่เหลืออยู่อีกแล้วนี่คะ..."
26010-300 = "ชาวเมืองทุกคนที่นี่...\nน่ากลัวมากๆ...\nพอลองพูดคุยด้วย\nเพื่อจะสืบข้อมูล..."
26010-310 = "กะ...ก็รู้สึกอยากหนีไป\nจากที่นี่เลยค่ะ..."
26010-320 = "เมื่อกี้ได้กาแฟอุ่นๆ\nแก้วหนึ่งมาจาก\nไต้ก๋งเรือด้วยค่ะ"
26010-330 = "พอมาคิดๆ ดูแล้ว...\nอาจจะไม่ได้เป็นคน\nน่ากลัวแบบนั้นก็ได้..."
26010-340 = "ดูเหมือนว่าจะค่อยๆ...\nผูกพันกับหมู่บ้านนี้ขึ้นมา\nทีละนิดๆ แล้วละค่ะ"
26010-350 = "...แต่ถึงยังไง สำหรับฉัน\nโคะอุซางิ การ์เด้น\nก็ยังคงเป็นสถานที่\nที่รู้สึกอุ่นใจที่สุดค่ะ"
26010-360 = "มะ... ไม่ทราบว่า\nระ...เรียกฉันเหรอคะ...?"
26010-370 = "(ทำไมถึงมาที่\nหมู่บ้านที่อยู่ห่างไกล\nแบบนี้ได้กันนะ...)"
26010-380 = "ผมทรงนี้...\nมิยาโกะจังถักให้\nก่อนที่จะออกมาปฏิบัติการค่ะ"
26010-390 = "ฮิฮิ... แบบนี้...\nก็อาจจะดูน่ารักก็ได้..."
26010-400 = "ทั้งนกกระจาบ ทั้งเพียงพอน...\nแล้วก็นกนางนวล..."
26010-410 = "ทำไมพวกสัตว์ป่า\nถึงชอบเข้าหาฉัน\nอยู่เรื่อยเลยนะคะ...?"
26010-420 = "คือว่าถ้าเจอก้อนหินหรือเปลือกหอย\nสวยๆ ก็ช่วยเก็บมาให้ฉันด้วยนะคะ"
26010-430 = "อ๊ะ คุณครูสนใจมาช่วยฉัน...\nเก็บก้อนกรวดมั้ยคะ?"
26010-440 = "ดูเหมือนใกล้ถึงเวลา\nที่จะต้องกลับแล้ว..."
26010-450 = "แต่ว่าหลังจากนี้... ไว้มารวบรวม\nก้อนกรวดด้วยกันอีกนะคะ"
26010-460 = "เอ่อ คะ...คือว่า..."
26010-470 = "ถึงตัวตนของฉันจะจืดจาง\nเหมือนกับพวกก้อนกรวดก็จริง..."
26010-480 = "ถึงจะลูบๆ แบบนั้นแต่ยังไงตัวตน\nของฉันก็ไม่หายจืดจางหรอกค่ะ..."
26010-490 = "ก้อนกรวดพวกนี้...\nสวยมากๆ เลยค่ะ...!"
26010-500 = "ขอโทษด้วยนะคะ...\nที่ฉันมอบให้ได้แค่เท่านี้..."
26010-510 = "สีขาว… เป็นประกายแวววาว"
26010-520 = "ถึงมันอาจจะดูไม่น่ารักเท่าไร\nแต่ก็ช่วยรับมันไปได้รึเปล่าคะ...?"

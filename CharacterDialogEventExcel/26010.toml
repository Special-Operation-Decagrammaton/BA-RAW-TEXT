[translation]
26010-270 = "Eek... I-It's just like a fishing village from a h-horror story..."
26010-280 = "I-I just w-wanna go back to th-the school..."
26010-290 = "Oh, w-wait... I don't have a school t-to go back to..."
26010-300 = "The residents here are so s-scary...! I-I talked to them for the investigation..."
26010-310 = "I-I just wanna run away..."
26010-320 = "The c-captain gave me some warm coffee earlier."
26010-330 = "Maybe he's not as scary as I thought..."
26010-340 = "I think I'm starting to develop a f-fondness for this town."
26010-350 = "But still, Kousagi Park is where I feel most safe."
26010-360 = "D-Did you call me, by any chance...?"
26010-370 = "(How did we end up in such a remote village...?)"
26010-380 = "Miyako braided my hair b-before we came on this mission."
26010-390 = "Heehee... This could be cute..."
26010-400 = "Sparrows, weasels, seagulls..."
26010-410 = "Wh-Why do wild animals keep c-coming to me...?"
26010-420 = "If...you happen to find any p-pretty rocks or shells, p-please bring them to me."
26010-430 = "Sensei, will you c-collect pebbles? ...With m-me?"
26010-440 = "We should s-start heading back, but..."
26010-450 = "C-Can we collect pebbles t-together again?"
26010-460 = "Um, so does that mean..."
26010-470 = "I-I slip completely under everyone's notice...just like the p-pebbles..."
26010-480 = "Even touching me like that...w-won't help me stand out more..."
26010-490 = "This pebble is really pretty...!"
26010-500 = "I'm sorry... This is all I have to give you..."
26010-510 = "It's white...and shiny..."
26010-520 = "It's not much but...w-will you accept this...?"

[translation]
26010-270 = "噫噫……\n簡直就像恐怖小說裡\n會出現的漁村一樣……"
26010-280 = "好想趕快回學園去……"
26010-290 = "啊，可是我們的\n學園已經……"
26010-300 = "這裡的居民好可怕……\n每次為了調查\n跟他們搭話的時候……"
26010-310 = "我，我都會忍不住\n想逃跑……"
26010-320 = "剛才船長\n給了我一杯\n熱咖啡。"
26010-330 = "說不定……\n他沒有我想得\n那麼可怕……"
26010-340 = "對這個村子，\n我也稍微\n湧現了一些感情。"
26010-350 = "……不過\n果然對我來說，\n兔寶寶公園才是\n最能安心的地方。"
26010-360 = "難，難，難道\n你找我嗎……？"
26010-370 = "（為什麼會跑到這種\n　偏僻的村莊呢……）"
26010-380 = "這個髮型，是都子醬在\n作戰出發前幫我綁的。"
26010-390 = "呵呵……這個髮型，\n好像有點可愛……"
26010-400 = "從麻雀、黃鼠狼\n到海鷗……"
26010-410 = "野生的動物們\n跑到我身邊的理由\n究竟是什麼呢……"
26010-420 = "那個……有找到\n漂亮的石頭或貝殼的話，\n請帶回來給我。"
26010-430 = "啊，老師。\n要不要和我一起……\n收集小石頭呢？"
26010-440 = "差不多到\n該回去的時間了……"
26010-450 = "回去之後……還請再\n陪我一起收集小石頭哦。"
26010-460 = "咦，啊，那個……"
26010-470 = "雖然我知道\n我的存在感跟\n小石頭一樣薄弱……"
26010-480 = "不過就算老師那樣摸……\n我想存在感也不會\n因此增加的哦……？"
26010-490 = "這顆小石頭……\n真的很漂亮呢……！"
26010-500 = "對不起……\n我只有這種東西……"
26010-510 = "白白的……\n還會閃閃發亮……"
26010-520 = "雖然沒什麼特別的，即便如此……\n你也願意收下嗎……？"

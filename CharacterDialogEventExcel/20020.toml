[translation]
20020-10010 = "那麼，開始\n特異現象搜查部的\n活動吧。"
20020-10020 = "呵呵，我一直\n在等您哦，老師。"
20020-10030 = "……啊，現在正在\n分析數據，還請稍等。"
20020-10040 = "原來如此，\n真有趣……"
20020-10050 = "這個就像這樣，\n嗯……"
20020-10060 = "十字神名……\n是個麻煩的對手。"
20020-10070 = "雖然感覺\n會有風險……"
20020-10080 = "呵呵，更讓人\n覺得有趣了呢。"
20020-10090 = "似乎取得\n新情報了呢。"
20020-10100 = "那麼，這次會是\n怎麼樣的情報呢。"
20020-10110 = "下一個目標\n已經決定了呢。"
20020-10120 = "那麼，進入\n下一個階段吧。"
20020-10510 = "新的任務，\n以及新的環境……"
20020-10520 = "……來，開始吧。老師。"
20020-10530 = "老師，能請您\n助我一臂之力嗎？"
20020-10540 = "哎呀，即便是超天才\n清楚系病弱美少女，"
20020-10550 = "也是需要別人\n幫助的唷？"
20020-10560 = "您好，老師。"
20020-10570 = "這裡就是\n我們的新基地。"
20020-10580 = "條件的增加已經確認。"
20020-10590 = "能將變數抑制到\n什麼程度……\n慎重地進行吧。"
20020-10600 = "情報越多越好，\n但話雖如此……"
20020-10610 = "要是一次收到太多，\n倒也有點傷腦筋。"
20020-10620 = "有點累了呢……"
20020-10630 = "如果這種時候有能\n讓我撒嬌的老師在，\n那就太令人高興了。"
20020-10640 = "身為最強駭客，\n也是最強美少女的我，"
20020-10650 = "居然會缺少\n最強的夥伴，"
20020-10660 = "這是相當嚴重的事態。\n所以就由老師擔任我的……"
20020-10670 = "我什麼都沒說……\n剛才的請您忘了吧。"
20020-10680 = "進入了新的局面……\n該這麼說嗎？"
20020-11550 = "這個地方，正在對\n對老師蒐集回來的"
20020-11560 = "「物質」進行分析。"
20020-11570 = "歡迎回來，老師。\n哈啊……我等到都累了。"
20020-11580 = "樣本的收集有進展嗎？\n請您放在這邊。"
20020-11590 = "感謝您一直以來\n的協助，老師。"
20020-11600 = "那麼，究竟會\n得出什麼樣的情報呢？"
20020-11610 = "託您的福，調查相當順利。\n不過這個現象……真是耐人尋味呢。"
20020-11620 = "唉，沒想到分析\n竟然會落後……"
20020-11630 = "多麼奢侈的環境啊。"
20020-11640 = "探求，總是能\n讓人心胸澎湃。"
20020-11650 = "如果還能跟老師一同參與……\n呵呵，那就更不用說了。"
20020-11660 = "分析已經完成。\n請您儘管拿吧。"
20020-11670 = "解釋結果還滿意嗎？\n呵呵，歡迎下次再來。"
20020-11680 = "我為老師投注心血\n進行了分析。來，請收下。"
20020-11690 = "……公，公私我可是\n有分清楚哦，嗯嗯。"
20020-11700 = "老師負責收集樣本，"
20020-11710 = "我們則對其加以分析，\n並進行交付……"
20020-11720 = "「以物易物」成立了呢。"
20020-11730 = "感謝您的惠顧。\n……怎麼樣呀？"
20020-11740 = "超天才清楚系病弱美少女的\n一日店員服務。"
20020-12200 = "我試著調整了\n分析的方向。"
20020-12210 = "偶然與必然，\n絕對論與相對論……"
20020-12220 = "真是充滿魅力的題材。\n您不這麼認為嗎？老師。"
20020-12230 = "老師要不要也來\n試試運氣？"
20020-12240 = "占星術顯示\n今天的幸運色是……"
20020-12250 = "……咦？不用了……？"
20020-12260 = "機率跟統計，\n是決定大多數\n事物的要素。"
20020-12270 = "占星術自不用說，\n就連「抽籤」……\n也不例外。"
20020-12280 = "一切都該被掌控……\n這樣的論點，\n我個人是反對的。"
20020-12290 = "因為我認為\n與未知世界的遭遇……"
20020-12300 = "才是真正有價值的事。"
20020-12310 = "未知的領域……\n真是令人著迷。"
20020-12320 = "即便依靠科學\n解開了許多謎團……"
20020-12330 = "未知的領域依舊\n會持續存在。"
20020-12340 = "……不然的話，\n實在太無趣了。"
20020-12350 = "不知不覺間，\n我們將抵達目標……"
20020-12360 = "並且……又會目擊\n嶄新目標的誕生吧。"
20020-12370 = "恭喜您，老師。\n雖說結果是\n可以預期的……"
20020-12380 = "但實際體會成果的瞬間，\n仍然是值得高興的吧？"
20020-12390 = "哎呀，這就是\n所謂的「中獎」對吧？"
20020-12400 = "即便在統計學上，\n這是理所當然的結果……"
20020-12410 = "但從中感受到喜悅\n卻是我們的自由……"
20020-12420 = "真是太棒了，老師。\n我也很高興。"
20020-12430 = "之所以感到「特別」，\n是因為「普通」的存在。"
20020-12440 = "所以，請您務必珍惜\n「普通」哦，老師。"
20020-12450 = "……還有辛勞的\n超天才清楚系\n病弱美少女也順便。"

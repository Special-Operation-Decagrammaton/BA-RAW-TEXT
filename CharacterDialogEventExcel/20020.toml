[translation]
20020-10010 = "มาเริ่มภารกิจของชมรม\nปรากฏการณ์ลี้ลับเลยดีไหมคะ"
20020-10020 = "ฮุฮุ กำลังรออยู่เลยค่ะ\nคุณครู"
20020-10030 = "อืม... ตอนนี้ฉันกำลัง\nวิเคราะห์ข้อมูลอยู่ค่ะ\nกรุณารอสักครู่นะคะ"
20020-10040 = "อืม...\nดูน่าสนใจดีนะคะ..."
20020-10050 = "ถ้าทำแบบนี้แล้ว...\nอืม..."
20020-10060 = "เดคาแกรมมาทอน...\nเป็นศัตรูที่เข้าใจยากจริงๆ ค่ะ"
20020-10070 = "ถึงจะดูเสี่ยงไปอยู่บ้าง..."
20020-10080 = "ฮุฮุ แต่เพราะอย่างนั้น\nมันถึงได้ดูน่าสนใจขึ้นไงล่ะคะ"
20020-10090 = "ฉันได้ข้อมูล\nชุดใหม่มาแล้วค่ะ"
20020-10100 = "งั้นไปดูกันเลยไหมคะ\nว่ารอบนี้เป็นข้อมูลอะไร"
20020-10110 = "เป้าหมายต่อไป\nถูกกำหนดไว้แล้วละค่ะ"
20020-10120 = "เอาละ ฉันจะไปต่อ\nที่สเต็ปถัดไปเลยนะคะ"
20020-10510 = "ภารกิจใหม่\nและสภาพแวดล้อมใหม่ๆ..."
20020-10520 = "เอาละ...\nมาเริ่มกันเลยดีกว่าค่ะ คุณครู"
20020-10530 = "คุณครูจะมาช่วยฉันด้วยใช่มั้ยคะ?"
20020-10540 = "ตายจริง ต้องการความช่วยเหลือ"
20020-10550 = "จากสาวน้อยผู้มีรอยยิ้มสดใสฮีลใจ\nเหมือนยาวิเศษงั้นเหรอคะ?"
20020-10560 = "มาแล้วเหรอคะ คุณครู"
20020-10570 = "ที่นี่คือฐานแห่งใหม่ของ\nพวกเราค่ะ"
20020-10580 = "ยืนยันเงื่อนไขที่เพิ่มขึ้นมาค่ะ"
20020-10590 = "มาจับตาดูกันเถอะค่ะ\nว่าควบคุมตัวแปรไปได้อีก\nแค่ไหน..."
20020-10600 = "ยิ่งข้อมูลมากเท่าไร\nก็ยิ่งดีเท่านั้น แต่ว่านี่มัน..."
20020-10610 = "ถ้าให้มามากเกินไปในครั้งเดียว\nมันก็ลำบากนิดหน่อยนะคะ"
20020-10620 = "รู้สึกเหนื่อยนิดหน่อยค่ะ..."
20020-10630 = "เวลาแบบนี้ ถ้ามีคุณครู\nที่ยอมรับเวลาฉันงอแง\nก็คงจะดีไม่น้อยเลยนะคะ"
20020-10640 = "สำหรับฉันที่เป็นสาวน้อย\nผู้มีรอยยิ้มพิมพ์ใจ\nและสุดยอดแฮ็กเกอร์"
20020-10650 = "กลับขาดพาร์ทเนอร์\nที่ยอดเยี่ยมไปแบบนี้"
20020-10660 = "นับเป็นเหตุการณ์ที่สำคัญ\nอย่างยิ่งค่ะ เพราะงั้นคุณครู\nจะช่วยมาเป็น..."
20020-10670 = "ไม่มีอะไรหรอกค่ะ...\nช่วยลืมเรื่องที่พูดเมื่อสักครู่\nไปด้วยค่ะ"
20020-10680 = "ตอนนี้เข้าสู่เฟสใหม่แล้ว...\nคิดแบบนั้นได้หรือเปล่านะคะ"
20020-11550 = "กำลังวิเคราะห์ 「สาร」 ที่คุณครู"
20020-11560 = "รวบรวมมาเก็บไว้อยู่ที่นี่ค่ะ"
20020-11570 = "เชิญเลยค่ะ คุณครู\nฮู่ว... รอจนเหนื่อยเลยค่ะ"
20020-11580 = "เก็บตัวอย่างมาหรือยังคะ?\nรบกวนทางนี้ด้วยค่ะ"
20020-11590 = "ขอบคุณนะคะคุณครู\nที่คอยให้ความร่วมมือมาโดยตลอด"
20020-11600 = "จะได้ข้อมูลอะไรกันนะ"
20020-11610 = "ขอบคุณที่ทำให้การสำรวจราบรื่นค่ะ\nแต่ถึงอย่างนั้น... ปรากฏการณ์นี้...\nก็น่าสนใจไม่น้อยเลยนะคะ"
20020-11620 = "ฮ่า หรือว่าการวิเคราะห์\nจะตามไม่ทันกันนะ..."
20020-11630 = "นี่เป็นสถานการณ์\nที่เกินฝันมากเลยนะคะ"
20020-11640 = "การสำรวจครั้งใหม่ ไม่ว่าเมื่อไร\nก็เป็นสิ่งที่สนุกเสมอเลยนะคะ"
20020-11650 = "ถ้ามีคุณครูร่วมการสำรวจด้วยละก็...\nคงไม่มีอะไรสนุกกว่านี้แล้วละค่ะ"
20020-11660 = "วิเคราะห์เสร็จเรียบร้อยแล้วค่ะ\nเชิญนำไปได้เลยค่ะ คุณครู"
20020-11670 = "พึงพอใจกับ\nผลการวิเคราะห์หรือเปล่าคะ?\nฮุฮุ คราวหน้าไว้มาใหม่นะคะ"
20020-11680 = "ฉันจะวิเคราะห์สุดฝีมือ\nเพื่อคุณครูเลยค่ะ\nค่ะ ช่วยรับไว้ด้วยนะคะ"
20020-11690 = "ตะ... ต้องแยกแยะระหว่าง\nเรื่องงานกับเรื่องส่วนตัวค่ะ ใช่แล้วค่ะ"
20020-11700 = "คุณครูรวบรวมตัวอย่างมาให้"
20020-11710 = "พวกเราจะทำการวิเคราะห์\nและส่งผลให้..."
20020-11720 = "นี่เป็นความสำเร็จของ\n'การแลกเปลี่ยนสินค้า' กันสินะคะ "
20020-11730 = "ขอบคุณเสมอเลยนะคะ\nเป็นยังไงบ้างคะ...?"
20020-11740 = "บริการหน้าร้านประจำวัน\nของสาวน้อยผู้มีรอยยิ้มพิมพ์ใจ"
20020-12200 = "ฉันลองปรับทิศทางการ\nวิเคราะห์นิดหน่อยค่ะ"
20020-12210 = "ความบังเอิญกับความแน่นอน\nทฤษฎีสัมบูรณ์และสัมพัทธภาพ..."
20020-12220 = "เป็นข้อมูลที่มีเสน่ห์มากเลยค่ะ\nไม่คิดอย่างนั้นเหรอคะ? คุณครู"
20020-12230 = "คุณครูเองก็ลองทดสอบดวง\nดูสักหน่อยมั้ยคะ?"
20020-12240 = "ถ้าอิงตามโหราศาสตร์ละก็...\nสีนำโชคของวันนี้..."
20020-12250 = "คะ...?\nเรื่องนั้นไม่เป็นไรเหรอคะ...?"
20020-12260 = "ความน่าจะเป็นหรือสถิติ\nเป็นสิ่งที่ตัดสินสิ่งต่างๆ\nซะส่วนใหญ่นี่คะ"
20020-12270 = "สำหรับเรื่องดวงน่ะ...\n「การสุ่ม」ก็ไม่มี\nข้อยกเว้นหรอกนะคะ"
20020-12280 = "ฉันคัดค้านคำพูดที่บอกว่า\nทุกอย่างจะต้องถูกปิดกั้นค่ะ..."
20020-12290 = "เพราะฉันคิดว่า\nการเผชิญหน้ากับโลก"
20020-12300 = "ที่เรายังไม่เคยได้รู้จัก\nเป็นสิ่งที่มีคุณค่าค่ะ"
20020-12310 = "พื้นที่ที่ยังไม่ถูกค้นพบ...\nเป็นสิ่งที่ดึงดูดใจมากนะคะ"
20020-12320 = "ถึงแม้วิทยาศาสตร์\nจะไขปริศนาได้\nหลายอย่างแล้วก็ตาม"
20020-12330 = "แต่ก็ยังมีพื้นที่ที่ไม่ถูกค้นพบ\nเหลืออยู่อีกค่ะ"
20020-12340 = "ถ้าไม่อย่างนั้นละก็...\nมันคงจะน่าเบื่อน่าดูเลยนะคะ"
20020-12350 = "สักวันหนึ่งเมื่อพวกเรา\nทำเป้าหมายที่คิดไว้ได้สำเร็จ"
20020-12360 = "และ... ก็จะได้เห็นถึง\nการถือกำเนิดของเป้าหมาย\nที่สูงขึ้นในอีกระดับหนึ่งสินะคะ"
20020-12370 = "ยินดีด้วยค่ะ คุณครู\nถึงจะบอกว่าสามารถ\nคาดการณ์ผลลัพธ์ไว้ได้ก่อนแล้ว"
20020-12380 = "แต่ช่วงเวลาที่ได้สัมผัสกับความสำเร็จ\nก็น่าจะมีความสุขไม่ใช่เหรอคะ?"
20020-12390 = "ตายจริง นี่มันคือ\nสิ่งที่เรียกว่า 'ถูกรางวัล' ใช่มั้ยคะ?"
20020-12400 = "หากดูตามสถิติ\nถึงจะบอกว่าผล\nมันแน่นอนอยู่แล้วก็เถอะ"
20020-12410 = "แต่การที่จะดีใจในเรื่องนั้น มันก็เป็นสิทธิของพวกเรา..."
20020-12420 = "ยอดเยี่ยมมากค่ะ คุณครู\nฉันเองก็ดีใจเหมือนกันค่ะ"
20020-12430 = "สิ่งที่ทำให้รู้สึกได้ถึง 'ความพิเศษ'\nก็เพราะมี 'ความธรรมดา' อยู่ยังไงล่ะคะ"
20020-12440 = "เพราะงั้นช่วยรักษา 'ความธรรมดา'  ไว้อย่างดีด้วยนะคะคุณครู"
20020-12450 = "แล้วก็... สาวน้อยผู้มีรอยยิ้มฮีลใจที่กำลังทำงานหนักคนนี้ด้วยนะคะ"

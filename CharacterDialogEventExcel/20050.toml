[translation]
20050-280 = "เชิญเลย คุณครู!\nทางนี้!!"
20050-290 = "เหมือนจะเกิดเรื่อง\nซับซ้อนเลยนะ..."
20050-300 = "เอาเป็นว่า\nลองดูสักตั้งก่อนแล้วกัน!"
20050-310 = "งานแบบนี้\nเป็นครั้งแรกเลยละ..."
20050-320 = "แต่มิโยะจังก็น่าจะ\nวางแผนให้อย่างดีละเนอะ?"
20050-330 = "พวกเราเหมือนจะรับ\nงานบางอย่างที่ทั้งแปลก\nแต่ก็สนุกมาเลยละ...?"
20050-340 = "เสร็จแล้ว~"
20050-350 = "หืม? แต่ทำไมถึงอ่อนเปลี้ย\nเพลียแรงกันหมดเลยล่ะ?"
20050-360 = "ทำไมเหรอ คุณครู?\nหน้าของฉัน\nมีฝุ่นจากหินติดอยู่เหรอ?"
20050-370 = "ถ้าจิ้มกันบ่อยๆ\nเดี๋ยวฉันจิ้มคืนบ้างนะ?"
20050-380 = "ทะ... ทุกคนไม่ต้อง\nเครียดกันมากก็ได้นะ..."
20050-390 = "ไม่เป็นไร!\nชมรมการค้าพิเศษ"
20050-400 = "คิดหาวิธีได้\nได้ตลอดละ!"
20050-600 = "มีงานสนุกๆ เตรียมไว้\nเพียบ~ เลยละ คุณครู"
20050-610 = "ไม่มีอะไรที่เป็นไปไม่ได้หรอก!\nถึงมันจะยากก็เถอะ!"
20050-620 = "สมกับที่เป็นคุณครูเลย!\nสุดยอด!"
20050-630 = "รับรางวัลไปหรือยัง?\nอย่าลืมเสียล่ะ รับไปด้วยนะ!"
20050-640 = "หืม?\nสงสัยอะไรตรงไหนเหรอ?"
20050-650 = "ถึงจะเหนื่อย แต่ก็สนุกงั้นเหรอ?\nแหะๆ ฉันก็ด้วยนะ คุณครู"

[translation]
20050-280 = "어서 와, 선생님!\n이쪽이야!!"
20050-290 = "뭔가 복잡한 일이\n벌어진 것 같은데……"
20050-300 = "일단 뭐,\n부딪쳐 볼까!"
20050-310 = "이런 의뢰는\n처음인데……."
20050-320 = "뭐, 미요 쨩이 멋지게\n작전을 짜 주겠지?"
20050-330 = "우리, 뭔가 이상하고\n재밌는 의뢰를\n받아버린 걸 지도……?"
20050-340 = "끝나 버렸다~"
20050-350 = "응? 그런데 왜 다들\n축 늘어져 있지?"
20050-360 = "왜, 선생님?\n내 얼굴에\n돌가루라도 묻었어?"
20050-370 = "자꾸 찌르면,\n나도 찌를 거야?"
20050-380 = "다, 다들 너무\n심각해지지\n않아도 괜찮은데……."
20050-390 = "괜찮아!\n특수교역부는"
20050-400 = "늘 어떻게든\n방법을 찾아내니까!"
20050-600 = "즐거운 일들이 잔~뜩\n준비되어 있다고,\n선생님?"
20050-610 = "불가능한 건 없어!\n어려울 수는 있지만!"
20050-620 = "역시 선생님!\n대단해!"
20050-630 = "보상은 잘 챙겼어?\n이따 꼭 잊지 말고\n챙겨 가자!"
20050-640 = "응?\n궁금한 거라도 있어?"
20050-650 = "힘들지만 즐거웠다고?\n헤헤, 나도야, 선생님."

[translation]
20050-280 = "老師！這邊這邊～！"
20050-290 = "總覺得事情變得\n亂七八糟的呢……"
20050-300 = "算了，盡力試試看吧！"
20050-310 = "這種委託雖然是\n第一次接……"
20050-320 = "如果是美代醬的作戰，\n一定沒問題的！"
20050-330 = "這次的委託……\n好像還挺有趣的？"
20050-340 = "呀啊～\n結束了結束了～"
20050-350 = "……咦？\n大家都累癱了？"
20050-360 = "嗯，老師？\n我的臉上是\n沾到粉了嗎？"
20050-370 = "真是的～！\n那樣戳我的話……\n就換我反擊啦～！"
20050-380 = "大，大家……\n別那麼灰心嘛～"
20050-390 = "面臨任何危機都沒問題！\n特殊交易部……"
20050-400 = "總是能夠找到出路的唷！"
20050-600 = "有好多有趣的事唷～！\n嘿嘿，期待一下吧，老師！"
20050-610 = "雖然會碰上困難，\n但沒有什麼是不可能的～！"
20050-620 = "好厲害～！\n老師什麼都能做到耶～！"
20050-630 = "獎勵可不能忘記唷～"
20050-640 = "嗯？怎麼了？"
20050-650 = "雖然辛苦，但是很開心？\n耶嘿嘿，跟我一樣呢！"

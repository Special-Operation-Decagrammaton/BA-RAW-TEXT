[translation]
10017-10 = "ตั้งแต่นี้ไป...\nเริ่มการกวาดล้างได้!"
10017-20 = "ฮุฮุ\nถึงเวลาแห่งการปฏิวัติแล้ว!"
10017-30 = "งานเทศกาลอีวาน คูปาลา\nก็น่าตื่นเต้นเหมือนกัน!"
10017-40 = "หืม?\nต้องการให้เราช่วยงั้นเหรอสหาย?"
10017-50 = "ยังมีพวกนักเรียน\nที่สงสัยในอำนาจของหนวด\nอยู่อีกงั้นเหรอ..."
10017-60 = "กวาดล้างให้หมด กวาดล้าง!"
10017-70 = "เทศกาลอีวาน คูปาลาครั้งนี้...\nเราได้เตรียมพุดดิ้งยักษ์...\nแล้วก็..."
10017-80 = "พุดดิ้งยักษ์\nขนาดมหึมาเอาไว้ด้วย!"
10017-90 = "พอกวาดล้างเสร็จแล้ว\nเรามาแบ่งพุดดิ้งกินกันเถอะ"

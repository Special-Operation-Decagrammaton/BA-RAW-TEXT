[translation]
10017-10 = "지금부터\n숙청을 시작한다!"
10017-20 = "후후,\n혁명의 시간이다!"
10017-30 = "이번 이반 쿠팔라 축제도\n아주 기대가 되는군!"
10017-40 = "음?\n내 도움이 필요한가, 콤라드?"
10017-50 = "수염의 권위를 의심하는\n불순한 학생들이\n아직도 남아있다니…."
10017-60 = "모두 숙청이야, 숙청!"
10017-70 = "이번 이반 쿠팔라를\n위해 커다랗고…\n어, 그리고…"
10017-80 = "엄청나게 커다란\n푸딩을 준비했다네!"
10017-90 = "숙청이 끝나면\n다 같이 나누어 먹도록 하지."

[translation]
10126-160 = "歡迎來到\n神秘研……老師。"
10126-170 = "……學院的祕密，\n正在等著你哦。"
10126-180 = "沉睡的祕密……\n有很多唷？"
10126-190 = "警告，警告！\n活動即將結束！"
10126-200 = "……就是這樣。"
10126-210 = "辛苦了，老師。"
10126-220 = "這段回憶……\n我會帶到來世去的。\n咿嘻。"
10126-230 = "老師的手……\n好溫暖。"
10126-240 = "那隻烏鴉……\n是不認識的孩子呢。"
10126-250 = "你喜歡我嗎？"
10126-260 = "要好好……\n說出口哦？\n咿嘻……"
10126-270 = "想怎麼撫摸都可以……\n就像前世一樣。"
10126-400 = "為了老師……\n我整理了學院的祕密唷。"
10126-410 = "來……跟我一起解開吧。"
10126-420 = "居然能解開\n這個祕密……"
10126-430 = "老師真厲害呢。"
10126-440 = "辛苦了……\n大家也會很高興的。\n咿嘻。"
10126-450 = "在狂獵之中……\n還有許多不為人知的\n祕密唷。"
10126-460 = "你喜歡我嗎……？"
10126-470 = "好開心……咿嘻嘻！"

[translation]
10126-160 = "ยินดีต้อนรับสู่\nชมรมวิจัยรหัสยศาสตร์นะ... ครู"
10126-170 = "ความลับของสถาบัน...\nกำลังรออยู่..."
10126-180 = "ความลับที่ยังคงหลับใหลอยู่...\nมีเยอะมากเลยนะ"
10126-190 = "คำเตือน คำเตือน\nกิจกรรมใกล้จะจบลงแล้วค่ะ"
10126-200 = "เขาว่างั้นน่ะ..."
10126-210 = "เหนื่อยหน่อยนะ ครู"
10126-220 = "ฉันจะรักษาความทรงจำนี้ไว้...\nไปจนถึงชาติหน้าเลย ฮิฮิ"
10126-230 = "มือของคุณครู...\nอบอุ่นจัง"
10126-240 = "หืม? อีกาตรงนั้นน่ะเหรอ?\nฉันไม่รู้จักเด็กคนนั้นหรอก..."
10126-250 = "ชอบ...\nฉันเหรอ?"
10126-260 = "พูดมาให้ชัดๆ หน่อยสิ\nฮิฮิ..."
10126-270 = "ลูบได้ตามที่ต้องการเลย...\nเหมือนในชาติก่อนไง"
10126-400 = "ฉันจัดการความลับของสถาบัน\nเพื่อครูแล้วละ..."
10126-410 = "เอาละ... มาวิเคราะห์เจาะลึก\nความลับของสถาบันกันเถอะ"
10126-420 = "ไม่คิดเลยว่า\nจะไขความลับนี้ได้"
10126-430 = "ต้องอย่างนี้สิ ครู"
10126-440 = "ทำได้ดีมากเลย...\nทุกคนจะต้องดีใจแน่ๆ ฮิฮิ"
10126-450 = "ที่ไวลด์ฮันต์น่ะ... ยังมีความลับ\nอีกมากมายที่ยังไม่ถูกเปิดเผยอยู่"
10126-460 = "ชอบฉัน...\nสินะ...?"
10126-470 = "ดีใจจัง...\nฮิฮิฮิ"

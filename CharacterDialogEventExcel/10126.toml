[translation]
10126-160 = "오컬연에 온 걸\n환영해…… 선생."
10126-170 = "……학원의 비밀이,\n기다리고 있어."
10126-180 = "잠들어 있는 비밀들이……\n잔뜩 있다구?"
10126-190 = "경고. 경고.\n이벤트가 끝나갑니다."
10126-200 = "……라네."
10126-210 = "수고했어 선생."
10126-220 = "이 추억은……\n다음 생에도 간직할 거야.\n히힛."
10126-230 = "선생의 손은……\n따뜻하네."
10126-240 = "응? 그쪽의 까마귀?\n난 모르는 아이야……"
10126-250 = "내가……\n좋아?"
10126-260 = "제대로 말해달라구.\n히히……."
10126-270 = "마음껏 쓰다듬어도 돼……\n전생에서처럼."
10126-400 = "선생을 위해서……\n학원의 비밀을 정리했어."
10126-410 = "자……\n함께 학원의 비밀을\n파헤쳐보자."
10126-420 = "이 비밀을\n풀어낼 줄이야……"
10126-430 = "역시 선생."
10126-440 = "고생했어……\n모두가 기뻐할 거야.\n히히."
10126-450 = "와일드헌트에는……\n아직 알려지지 않은\n비밀이 잔뜩 있다구."
10126-460 = "내가……\n좋은 거구나……?"
10126-470 = "정말 기뻐……\n이히힛!"

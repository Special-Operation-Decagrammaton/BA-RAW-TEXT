[translation]
10113-10 = "Welcome to Gehenna, Sensei."
10113-20 = "I hope you have a safe stay here."
10113-30 = "..."
10113-40 = "I mean it."
10113-50 = "You're here, Sensei."
10113-60 = "I'm off duty today,"
10113-70 = "but I'm never going to let my guard down."
10113-80 = "This is quite an interesting corpse..."
10113-90 = "Excuse me."
10113-100 = "Ridiculous, but very interesting..."
10113-110 = "Excuse me for that too."
10113-120 = "...An URGENT SITUATION, it seems like."
10113-130 = "Rationally speaking, I should be hoping all of this blows over quickly."
10113-140 = "..."
10113-150 = "But I wish I could take in more of it first."
10113-160 = "That was a joke. Really."
10113-170 = "Emergency over."
10113-180 = "Good work, Sensei."
10113-190 = "Even when I'm on a day off, the Medical Emergency Club always has the same duty."
10113-200 = "This is my academy, a place where many things happen."
10113-210 = "...Overall, it's quite an enjoyable place for me."
10113-220 = "Do these clothes look good on me?"
10113-230 = "Hmm? You're not used to hearing me say that?"
10113-240 = "I just read it in a magazine someone recommended to me."
10113-250 = "But if I made you feel something, I'm glad."
10113-260 = "If you plan on visiting Gehenna on your next day off,"
10113-270 = "I would appreciate it if you'd get a hold of me first."
10113-280 = "That would be the safest way."
10113-600 = "Hello, Sensei. This is Himuro Sena."
10113-610 = "When it comes to unpredictability,"
10113-620 = "this place is something like an emergency."
10113-630 = "Welcome, Sensei."
10113-640 = "I hope that fortune and good health will always be with you."
10113-650 = "Was there anything else?"
10113-660 = "I'll support you until the end."
10113-670 = "Do you like coincidences, Sensei?"
10113-680 = "I tend to like them."
10113-690 = "They say it's better to be prepared for bad luck than to hope for good luck."
10113-700 = "Prevention is also important in emergency medicine."
10113-710 = "Leave it to me."
10113-720 = "Congratulations, Sensei."
10113-730 = "That looks interesting."
10113-740 = "I see, so that's the prize."
10113-750 = "Could I see it? I'm curious."
10113-760 = "Incredible, Sensei."
10113-770 = "Thank you for all your hard work."

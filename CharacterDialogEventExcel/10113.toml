[translation]
10113-10 = "歡迎蒞臨格黑娜學園。"
10113-20 = "願老師能度過\n平和的時光。"
10113-30 = "……"
10113-40 = "這是我的真心話。"
10113-50 = "你來啦，老師。"
10113-60 = "雖然今天並非上班日，"
10113-70 = "我也不會放鬆警戒。"
10113-80 = "這真是令人\n感興趣的屍……"
10113-90 = "失禮了。"
10113-100 = "相當有趣的……"
10113-110 = "這也同樣失禮呢。"
10113-120 = "差不多得加緊腳步了。"
10113-130 = "雖然希望能盡早平息……"
10113-140 = "……"
10113-150 = "可以的話，\n要是能再看到一些\n有趣的東西，什麼的。"
10113-160 = "……剛才是開玩笑的。\n真的是。"
10113-170 = "處理完畢了呢。"
10113-180 = "辛苦你了，老師。"
10113-190 = "無論休假與否，\n隸屬急救醫學部\n的事實都不會改變。"
10113-200 = "格黑娜學園\n會發生許多事件。"
10113-210 = "……是個\n挺歡樂的地方哦。"
10113-220 = "這套衣服，適合我嗎？"
10113-230 = "……聽到這種話\n覺得很新鮮？"
10113-240 = "雖然這是雜誌上\n寫的台詞……"
10113-250 = "能讓老師產生\n那種想法的話，\n這麼說也值得了。"
10113-260 = "下次來格黑娜的時候，"
10113-270 = "如果能聯絡我的話，\n我會很開心的。"
10113-280 = "這樣應該也是最安全的。"
10113-600 = "你好，老師。"
10113-610 = "就「不知道會發生什麼」\n這點來說，"
10113-620 = "急救處置跟這個地方\n或許有點類似呢。"
10113-630 = "你來啦，老師。"
10113-640 = "願幸運和健康與你同在。"
10113-650 = "還有沒做完的事嗎？"
10113-660 = "我也會陪同到最後的。"
10113-670 = "你喜歡偶然嗎，老師？"
10113-680 = "我的話，還挺喜歡的哦。"
10113-690 = "有句話說比起祈求幸運，\n更應該防備厄運。"
10113-700 = "在急救處置方面，\n防備也是很重要的。"
10113-710 = "請交給我吧。"
10113-720 = "恭喜你，老師。"
10113-730 = "是個不錯的東西呢。"
10113-740 = "原來如此。\n那就是中獎啊。"
10113-750 = "能讓我也看看嗎？\n我非常感興趣。"
10113-760 = "真厲害呢，老師。"
10113-770 = "真的辛苦你了。"

[translation]
10113-10 = "게헨나에 오신 것을\n환영합니다. 선생님."
10113-20 = "무탈한 시간을\n보내실 수 있기를\n기원합니다."
10113-30 = "……"
10113-40 = "진심입니다."
10113-50 = "오셨습니까, 선생님."
10113-60 = "비번인 날입니다만,"
10113-70 = "저는 언제든 경계를\n늦추지 않을 겁니다."
10113-80 = "이것은 제법\n흥미로운 시체……"
10113-90 = "실례."
10113-100 = "황당하고\n호기심 넘치는……"
10113-110 = "이것도 실례."
10113-120 = "위급한 상황이\n된 것 같군요."
10113-130 = "이성적으로는\n이 사태가 빠르게\n마무리되기를\n바라야 하겠습니다만."
10113-140 = "……"
10113-150 = "조금만 더,\n재미있는 광경을 볼 수\n있으면 좋겠습니다."
10113-160 = "지금은 농담입니다.\n믿어 주십시오."
10113-170 = "긴급 상황, 종료입니다."
10113-180 = "선생님께서도\n수고 많으셨습니다."
10113-190 = "휴일이든 아니든,\n응급의학부가 할 일은\n변치 않습니다."
10113-200 = "이곳은 저의 학원이고,\n참으로 많은 일들이\n일어나는 곳입니다."
10113-210 = "……종합적으로,\n저에게는 꽤\n즐거운 장소입니다."
10113-220 = "제 옷, 어울리나요?"
10113-230 = "제가 그런 말을 하다니\n신선하시다고요?"
10113-240 = "주위에서 권해 준\n잡지에서 읽은\n말입니다만."
10113-250 = "선생님이 저에게\n신선함을 느끼셨다니,\n보람이 있네요."
10113-260 = "혹시 다음 휴일에\n게헨나를 방문하실\n생각이 있으시다면."
10113-270 = "저에게 먼저\n연락을 주시면\n감사하겠습니다."
10113-280 = "그편이 가장\n안전할 테니까요."
10113-600 = "안녕하세요. 선생님.\n히무로 세나입니다."
10113-610 = "무엇이 나올지\n모른다는 점에서,"
10113-620 = "이곳은 응급 상황과\n비슷한 부분이\n있을지도 모릅니다."
10113-630 = "어서 오십시오. 선생님."
10113-640 = "행운과 건강이\n항상 함께\n하시기를 바랍니다."
10113-650 = "남은 것이\n있으신가요?"
10113-660 = "저 역시 마지막까지\n보조하겠습니다."
10113-670 = "우연을 좋아하시나요,\n선생님?"
10113-680 = "저는 나름대로\n좋아하는 편입니다."
10113-690 = "행운을 바라기보다는,\n불운을 대비하는 편이\n좋다고 하죠."
10113-700 = "예방 역시 응급의학의\n중요한 부분입니다."
10113-710 = "맡겨 주십시오."
10113-720 = "축하드립니다. 선생님."
10113-730 = "좋아 보이는 상품이군요."
10113-740 = "과연, 그것이 당첨 상품이군요."
10113-750 = "저에게도 보여 주실 수 있겠습니까?\n호기심이 생기는군요."
10113-760 = "대단하십니다. 선생님."
10113-770 = "정말 수고 많으셨습니다."

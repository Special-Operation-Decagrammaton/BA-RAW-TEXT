[translation]
10113-10 = "ยินดีต้อนรับสู่\nเกเฮนน่าค่ะ คุณครู"
10113-20 = "ขอให้ได้ใช้เวลา\nอย่างปลอดภัยนะคะ"
10113-30 = "..."
10113-40 = "ฉันพูดจริงนะคะ"
10113-50 = "มาแล้วเหรอคะคุณครู"
10113-60 = "วันนี้ฉันเวรออฟ"
10113-70 = "ฉันจะไม่การ์ดตก\nไม่ว่าจะตอนไหนค่ะ"
10113-80 = "นี่เป็นศพที่\nน่าสนใจทีเดียว..."
10113-90 = "ขอโทษค่ะ"
10113-100 = "ขอโทษที่ฉันเหลวไหล\nและอยากรู้อยากเห็น..."
10113-110 = "มากเกินเหตุด้วยค่ะ"
10113-120 = "เป็นสถานการณ์\nฉุกเฉินเลยนะคะ"
10113-130 = "ตามจรรยาบรรณแล้ว\nฉันควรหวังว่า\nสถานการณ์นี้จะ\nจบลงได้อย่างรวดเร็ว"
10113-140 = "..."
10113-150 = "แต่ฉันอยากดู\nทัศนียภาพที่สนุก\nต่ออีกหน่อยค่ะ"
10113-160 = "ล้อเล่นค่ะ\nเชื่อฉันเถอะนะคะ"
10113-170 = "สิ้นสุดสถานการณ์ฉุกเฉินค่ะ"
10113-180 = "คุณครูก็\nทำได้ดีมากเลยค่ะ"
10113-190 = "ไม่ว่าจะวันหยุดหรือวันไหนๆ\nงานของชมรมหน่วยแพทย์ฉุกเฉิน\nก็ไม่เปลี่ยนแปลงค่ะ"
10113-200 = "ที่นี่คือโรงเรียนของฉัน\nและเป็นที่ที่มีเรื่องเกิดขึ้น\nมากมายเลยค่ะ"
10113-210 = "โดยรวมแล้ว...\nเป็นสถานที่ที่\nน่าสนุกสำหรับฉันค่ะ"
10113-220 = "ชุดของฉัน... เข้ากับฉันมั้ยคะ?"
10113-230 = "รู้สึกแปลกใหม่\nที่ฉันพูดอะไรแบบนั้นเหรอคะ?"
10113-240 = "เป็นคำที่ฉันอ่านเจอ\nจากนิตยสารที่\nคนรอบตัวแนะนำให้น่ะค่ะ"
10113-250 = "แต่ถ้าคุณครูรู้สึกได้ถึง\nความแปลกใหม่จากฉัน\nก็คุ้มค่าอยู่นะคะ"
10113-260 = "ถ้าวันหยุดครั้งหน้า\nคุณครูจะแวะมาที่\nเกเฮนน่าละก็"
10113-270 = "อยากให้ติดต่อ\nมาบอกฉันก่อนค่ะ"
10113-280 = "แบบนั้นจะปลอดภัย\nมากที่สุดน่ะค่ะ"
10113-600 = "สวัสดีค่ะ คุณครู\nฮิมูโระ เซนะเองค่ะ"
10113-610 = "ในแง่ของการไม่รู้\nว่าจะได้อะไรแล้ว"
10113-620 = "ตรงนี้ก็ถือว่า\nก็มีส่วนคล้ายกับ\nสถานการณ์ฉุกเฉินนะคะ"
10113-630 = "ยินดีต้อนรับค่ะ คุณครู"
10113-640 = "ขอให้โชคและสุขภาพดี\nอยู่กับคุณครู\nไปตลอดนะคะ"
10113-650 = "มีอะไรเหลือ\nหรือเปล่าคะ?"
10113-660 = "ฉันจะเป็นผู้ช่วย\nจนเสร็จงานเลยค่ะ"
10113-670 = "ชอบความบังเอิญมั้ยคะ\nคุณครู?"
10113-680 = "ฉันค่อนข้าง\nชอบเลยค่ะ"
10113-690 = "ว่ากันว่าการรับมือกับโชคร้าย\nย่อมดีกว่าการคาดหวัง\nว่าจะโชคดีค่ะ"
10113-700 = "การป้องกันก็เป็นสิ่งสำคัญ\nเพื่อไม่ให้เกิดเหตุฉุกเฉินค่ะ"
10113-710 = "วางใจฉันได้เลยค่ะ"
10113-720 = "ยินดีด้วยนะคะ คุณครู"
10113-730 = "เป็นของที่ดูดีเลยค่ะ"
10113-740 = "สุ่มได้อันนี้สินะคะ"
10113-750 = "ขอให้ฉันดูด้วยได้มั้ยคะ?\nชักจะอยากรู้แล้วสิ"
10113-760 = "น่าทึ่งจังเลยค่ะ คุณครู"
10113-770 = "ทำได้ดีมากเลยค่ะ"

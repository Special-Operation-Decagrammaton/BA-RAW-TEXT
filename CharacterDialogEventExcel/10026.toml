[translation]
10026-10 = "喂！\n工作時間到囉，老師！"
10026-20 = "沒時間悠哉了，\n走吧！"
10026-30 = "有什麼事\n需要我幫忙嗎，老師？"
10026-40 = "哈哈！不錯嘛！"
10026-50 = "好了，\n現在不是磨蹭的時候。"
10026-60 = "為，為什麼要那樣\n一直盯著我看啊……\n來，趕快開始工作吧。"
10026-70 = "哈哈！還不壞嘛！"
10026-80 = "好了，\n現在不是磨蹭的時候。"
10026-90 = "為，為什麼要那樣\n一直盯著我看啊……\n好了，快點開始工作吧。"
10026-550 = "那麼～去清掃一下吧？"
10026-560 = "那麼，快開始吧！"
10026-570 = "怎麼？\n你在幫我加油嗎？\n哈！挺有趣的啊。"
10026-580 = "對我來說，\n這只是\n小菜一碟！"
10026-590 = "嘿，挺有品味的嘛？"
10026-600 = "會好好幹活的。"

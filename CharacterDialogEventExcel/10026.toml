[translation]
10026-10 = "자아-!\n일 할 시간이야, 선생!"
10026-20 = "지체할 시간 없다고.\n바로 시작하지!"
10026-30 = "뭔가 더 시킬\n일이라도 있어, 선생?"
10026-40 = "크하하하!\n나쁘지 않네!"
10026-50 = "꾸물거릴 시간 없다고."
10026-60 = "왜, 왜 계속 쳐다보는 거야.\n빨리 일이나 하자니까?"
10026-70 = "크하하하!\n나쁘지 않네!"
10026-80 = "꾸물거릴 시간 없다고."
10026-90 = "왜, 왜 계속 쳐다보는 거야.\n빨리 일이나 하자니까?"
10026-550 = "자~ 청소라도 하러 갈까?"
10026-560 = "자아, 빨리 시작하자고!"
10026-570 = "뭐야.\n격려해 주는 거야?\n하! 재미있네."
10026-580 = "나한테 걸리면,\n이 정도는\n식은 죽 먹기지!"
10026-590 = "헤에.\n제법 센스가 있잖아?"
10026-600 = "일은 확실하게 한다고."

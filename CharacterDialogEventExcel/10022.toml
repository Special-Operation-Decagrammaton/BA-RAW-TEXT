[translation]
10022-10 = "Welcome, Sensei. We're ready for summer camp. Let me know if you need anything."
10022-20 = "Oh, you're here, Sensei. Did you get to check the summer camp schedule?"
10022-30 = "So hot today... Stay hydrated."
10022-40 = "It's summer. The heat and humidity are leaving me lethargic..."
10022-50 = "...but it all comes with the territory of training."
10022-60 = "Dangers are always lurking at the beach."
10022-70 = "You never know when and where accidents will occur. Be careful."
10022-80 = "Um... You can call me if you need me."
10022-90 = "I never expected to spend summer camp training with you."
10022-100 = "That's...somewhat new and refreshing."
10022-110 = "This outfit is suitable for summer training."
10022-120 = "There's no sense in throwing out things that are still good."
10022-130 = "I just thought that this would be effective. That's all."
10022-330 = "The summer training camp will begin now."
10022-340 = "It's annoying, but it's part of training."
10022-350 = "It's hot and annoying..."
10022-360 = "I'm seeing real effects from the boot camp."

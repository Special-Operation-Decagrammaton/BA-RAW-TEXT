[translation]
10022-10 = "เข้ามาสิคุณครู ก็อย่างที่เห็น\nเตรียมการฝึกภาคฤดูร้อนสมบูรณ์\nแบบแล้ว มีอะไรก็บอกมาได้เลยนะ"
10022-20 = "อา... คุณครูเองเหรอ\nตรวจสอบแผนการฝึก\nภาคฤดูร้อนแล้วใช่มั้ย?"
10022-30 = "วันนี้ร้อนสุดๆ เลย\nเตรียมน้ำดื่มให้พร้อมด้วยล่ะ"
10022-40 = "ฤดูร้อนแล้วนะ\nทั้งร้อนแล้วก็ชื้น\nน่าหงุดหงิดไปหมดเลย..."
10022-50 = "ช่วยไม่ได้นะ เพราะทั้งหมดนี่\nก็เป็นส่วนหนึ่งของการฝึกสินะ"
10022-60 = "ที่ชายหาด\nมักจะมีอันตรายซ่อนอยู่เสมอ"
10022-70 = "อาจเกิดอุบัติเหตุ\nที่คาดไม่ถึงขึ้นเมื่อไหร่ก็ได้"
10022-80 = "อืม...\nถ้าเกิดอะไรขึ้นละก็\nเรียกฉันก็ได้นะ"
10022-90 = "การฝึกภาคฤดูร้อน...\nไม่คิดเลยว่าจะได้\nมาฝึกกับคุณครู..."
10022-100 = "รู้สึกแปลกๆ นิดหน่อยน่ะ..."
10022-110 = "ชุดนี้เป็นชุดที่เตรียม\nมาเพื่อการฝึกภาคฤดูร้อน..."
10022-120 = "ไม่ได้ซื้อชุดใหม่หรอก"
10022-130 = "ฉันคิดว่าเอาชุดเก่าที่มีมาใส่\nมันน่าจะมีประโยชน์\nมากกว่าน่ะ..."
10022-330 = "ตั้งแต่นี้ไป ค่ายฤดูร้อน\nกำลังจะเริ่มแล้วละ"
10022-340 = "ถึงจะน่ารำคาญ แต่นี่ก็เป็น\nหนึ่งของการฝึกนี่นา"
10022-350 = "ทั้งร้อน แล้วก็น่ารำคาญ..."
10022-360 = "ผลของการฝึก\nดูเหมือนจะเห็นได้ชัดเลยนะ"

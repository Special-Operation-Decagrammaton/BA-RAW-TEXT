[translation]
10022-10 = "어서 와. 선생. 보다시피,\n하계 합숙 훈련의 준비는\n완벽해. 뭐든지 말해줘."
10022-20 = "아아, 선생이구나.\n하계 합숙의 훈련 계획표는\n제대로 체크했어?"
10022-30 = "무더운 날이야.\n수분 보급에 주의해."
10022-40 = "여름이네…….\n무덥고, 나른하고,\n모든 게 귀찮지만……."
10022-50 = "이것도 훈련의 일환,\n어쩔 수 없지."
10022-60 = "바다에는 항상\n위험이 따르기 마련이야."
10022-70 = "언제 어디서 사고가 날지\n모르니까 조심해."
10022-80 = "그…….\n무슨 일이 있으면,\n날 부르면 되니까."
10022-90 = "하계 합숙 훈련.\n설마 올해는, 선생과\n함께일 줄이야……"
10022-100 = "……조금, 신선하네."
10022-110 = "이 수영복은 어디까지나,\n훈련을 위해 준비한 거고……."
10022-120 = "새걸 사지 않아도,"
10022-130 = "갖고 있던 걸\n입는 쪽이 효율적일까,\n싶어서……."
10022-330 = "지금부터 하계 합숙\n훈련을 시작하겠어."
10022-340 = "귀찮지만, 이것도\n훈련의 일환이니까."
10022-350 = "더워, 귀찮아……."
10022-360 = "확실히 합숙 효과가\n있었나 봐."

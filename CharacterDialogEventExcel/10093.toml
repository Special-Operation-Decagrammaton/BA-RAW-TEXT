[translation]
10093-400 = "是開心愉快的\n修學旅行呢！\n老師也準備好了嗎？"
10093-410 = "夜櫻綺羅羅，\n享受準備完畢～！"
10093-420 = "老師也在享受旅行嗎？"
10093-430 = "真讚！\n我也超享受的唷！"
10093-440 = "旅行結束\n雖然令人遺憾……"
10093-450 = "沒關係。開心的事\n之後還會有很多很多！"
10093-460 = "呼啊！直到最後都\n沒有空檔休息呢！\n超開心的！"
10093-470 = "期待的事？"
10093-480 = "新的地方、新的美食，\n還有最重要的……\n新朋友們吧！"
10093-490 = "我找到一個感覺能\n拍出好照片的地方，\n老師要不要一起去？"
10093-500 = "是在那裡的一棵\n超大的樹……！"
10093-510 = "嗯？怎麼了？\n發生了什麼\n有趣的事嗎？"
10093-520 = "啊哈哈！真巧呢！\n我也正在看著老師哦！"
10093-700 = "歡迎，老師！\n準備好了嗎？"
10093-710 = "會出現什麼呢～\n不覺得很期待嗎？"
10093-720 = "努力到最後吧，老師！"
10093-730 = "哪張會中獎呢～"
10093-740 = "反正不抽也\n不會知道，\n儘管抽吧！"
10093-750 = "哇！\n是超級稀有的卡片耶！\n老師好厲害！"
10093-760 = "是張好卡片呢！\n恭喜你！"
10093-770 = "雖然是常見的卡片……\n不過卡面很可愛，\n也不錯吧？"
10093-780 = "啊，這，這我\n倒是沒料到……"
10093-790 = "別，別失望！老師！\n還有下一次的！"

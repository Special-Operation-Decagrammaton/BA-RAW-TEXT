[translation]
10093-400 = "ทัศนศึกษาสนุกมากเลย!\nครูก็พร้อมแล้วหรือยัง?"
10093-410 = "โยซากุระ คิราระ\nพร้อมไปสนุกแล้วละ!"
10093-420 = "ครูสนุกกับการทัวร์อยู่มั้ย?"
10093-430 = "ดีเลย! ฉันเองก็กำลังสนุกสุดเหวี่ยงเลย!"
10093-440 = "น่าเสียดายจังเลย\nที่การทัวร์ครั้งนี้จบลง..."
10093-450 = "แต่ไม่เป็นไรหรอก\nเดี๋ยวก็มีเรื่องสนุกอื่นอีก!"
10093-460 = "เฮ้อ! ไม่ได้พัก\nจนถึงตอนสุดท้ายเลยสินะ!\nสนุกสุดๆ ไปเลย!"
10093-470 = "สิ่งที่ตั้งตารอเหรอ?"
10093-480 = "สถานที่ใหม่ๆ ของกินใหม่ๆ\nและที่สำคัญที่สุด...\nก็คือเพื่อนใหม่ไงล่ะ!"
10093-490 = "ฉันเจอที่ที่น่าจะถ่ายรูปสวย\nมาด้วยแหละ คุณครูคิดว่าไง?"
10093-500 = "ต้นไม้ต้นใหญ่ๆ\nที่อยู่ทางโน้นน่ะ...!"
10093-510 = "หืม? มีอะไรเหรอ?\nเจอเรื่องอะไรน่าสนุกๆ เหรอ?"
10093-520 = "อะฮ่าฮ่า! บังเอิญจัง!\nฉันก็มองครูอยู่พอดีเลย!"
10093-700 = "เชิญเลยครู!\nพร้อมรึยัง?"
10093-710 = "จะได้อะไรน้า~\nตื่นเต้นมั้ย?"
10093-720 = "สู้ๆ จนจบงานเลยนะครู!"
10093-730 = "จะได้ของชิ้นไหนน้า~"
10093-740 = "ถ้าไม่ลองสุ่มก็ไม่รู้นะ\nไม่ต้องลังเลแล้ว สุ่มเลย!"
10093-750 = "ว้าว!\nนี่มันการ์ดหายากนี่นา!\nสุดยอดไปเลยครู!"
10093-760 = "ได้การ์ดดีเลย!\nดีใจด้วยนะ!"
10093-770 = "พอดูไปดูมาบ่อยๆ แล้วมันก็...\nรูปมันก็น่ารักดีอยู่หรอกนะ?"
10093-780 = "อ๊ะ อะ... อันนี้ฉันคาดไม่ถึงแฮะ..."
10093-790 = "อย่าผิดหวังไปเลยนะครู!\nยังมีครั้งหน้าอีกนะ!"

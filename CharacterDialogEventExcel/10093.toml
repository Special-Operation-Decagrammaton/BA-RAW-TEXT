[translation]
10093-400 = "What a fun-filled field trip! Ready, Teach?"
10093-410 = "Yozakura Kirara, all set to have fun!"
10093-420 = "Are you enjoying the trip, Teach?"
10093-430 = "Awesome! I'm having a great time too!"
10093-440 = "It's sad that our field trip is coming to an end..."
10093-450 = "Don't worry! There'll be plenty of good times ahead!"
10093-460 = "Wow! Non-stop excitement from start to finish! It was an absolute blast!"
10093-470 = "What do I look forward to?"
10093-480 = "New places, new foods, and above all...new friends!"
10093-490 = "I found the perfect spot for photos. What do you think?"
10093-500 = "It's that massive tree over there!"
10093-510 = "Huh? What's up? Did you see something interesting?"
10093-520 = "Haha! What a coincidence! I was looking at you too, Teach!"
10093-700 = "Welcome, Teach! All ready?"
10093-710 = "I wonder what it'll be! Aren't you excited?"
10093-720 = "Stay strong until the very end, Teach!"
10093-730 = "I wonder what the winning prize will be!"
10093-740 = "Let's draw one right now! We won't know until we try!"
10093-750 = "Wow! A rare card! Amazing, Teach!"
10093-760 = "That's a good card! Congrats!"
10093-770 = "Even though it's a familiar sight...isn't the artwork so charming?"
10093-780 = "Oops. I-I didn't expect this..."
10093-790 = "Don't feel down, Teach! There's always next time!"

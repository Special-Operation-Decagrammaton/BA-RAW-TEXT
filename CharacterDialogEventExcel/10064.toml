[translation]
10064-560 = "辛苦了，老師。\n在會場也能遇見老師，\n真不錯呢。"
10064-570 = "已經參拜過了嗎？"
10064-580 = "雖然無法事事如願，"
10064-590 = "不過許願的時候，\n是自由的。"
10064-670 = "希望今年安穩的\n日子也能持續下去。"
10064-680 = "你說把買新專輯的錢\n全部用作香油錢\n沒關係嗎？"
10064-690 = "嘛……確實是\n有點逞強沒錯，"
10064-700 = "不過只要能看到\n社長的笑容，\n這還算便宜的。"
10064-710 = "遙香他，最近\n看起來好像很勞累。"
10064-720 = "沒事吧……"
10064-730 = "（……黑龜組啊。\n有股不好的預感）"
10064-1070 = "辛苦了，老師。\n在會場也能\n遇見老師，真不錯呢。"
10064-1080 = "已經參拜過了嗎？"
10064-1090 = "雖然無法事事如願，"
10064-1100 = "不過許願的時候，\n是自由的。"
10064-1110 = "才剛過年，\n情勢好像就不太對勁……"
10064-1120 = "賽錢箱小偷是……"
10064-1130 = "雖然我沒打算\n把麻煩事記在腦袋裡，"
10064-1140 = "但既然是社長的命令\n也沒辦法。"
10064-1150 = "唉，真是\n一場災難。"
10064-1160 = "最後還得\n對付那個\n奇怪的機器人……"
10064-1170 = "不過……也因此\n不會感到無聊。"
10064-1180 = "希望今年安穩的\n日子也能持續下去。"
10064-1190 = "你說把買新專輯的錢\n全部用作香油錢\n沒關係嗎？"
10064-1200 = "嘛……確實是\n有點逞強沒錯，"
10064-1210 = "不過只要能看到\n社長的笑容，\n這還算便宜的。"
10064-1220 = "遙香他，最近\n看起來好像很勞累。"
10064-1230 = "沒事吧……"
10064-1240 = "（……黑龜組啊。\n有股不好的預感）"
10064-1420 = "老師，你來得正好。\n有件事想請你幫忙。"
10064-1430 = "抱歉新年就這樣……\n能占用一點時間嗎？"
10064-1440 = "便利屋居然\n委託老師……"
10064-1450 = "和平時的立場相反，\n總覺得很新鮮。"
10064-1460 = "抱歉，我和無月不同，\n不習慣這種事……"
10064-1470 = "這種時候……那個……\n不知道該露出\n什麼表情才好……"
10064-1480 = "謝謝你的幫忙。\n來，這是便利屋68的謝禮。"
10064-1490 = "謝謝，老師。\n託你的福得救了。"

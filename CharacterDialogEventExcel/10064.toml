[translation]
10064-560 = "수고했어, 선생.\n행사장에서도 선생을\n만날 수 있어서 좋네."
10064-570 = "소원은 다 빌었어?"
10064-580 = "세상일이 생각대로는\n되지 않겠지만,"
10064-590 = "기원하는 시간만은,\n자유니까."
10064-670 = "올해도 평안한\n하루가 계속되기를."
10064-680 = "신작 앨범 구입에\n쓸 돈을 모두 새전으로\n써버렸는데, 괜찮냐고?"
10064-690 = "뭐…… 확실히\n조금 무리하기는 했지만."
10064-700 = "사장의 미소를 볼 수\n있다면, 그리 비싼\n값은 아니지."
10064-710 = "하루카, 최근에\n조금 무리한\n것처럼 보이던데."
10064-720 = "괜찮으려나……"
10064-730 = "(……검은거북파라.\n어쩐지 좋지 않은\n예감이 드는걸.)"
10064-1070 = "수고했어, 선생.\n행사장에서도 선생을\n만날 수 있어서 좋네."
10064-1080 = "소원은 다 빌었어?"
10064-1090 = "세상일이 생각대로는\n되지 않겠지만,"
10064-1100 = "기원하는 시간만은,\n자유니까."
10064-1110 = "뭔가, 정초부터\n말썽의 향기가……"
10064-1120 = "새전함\n도둑이라니……"
10064-1130 = "귀찮은 일에 머리를\n들이밀 생각은 없지만,"
10064-1140 = "사장의 명령이라면\n어쩔 수 없지."
10064-1150 = "하아, 정말\n재난이었네."
10064-1160 = "마지막에는\n이상한 로봇까지\n상대해야 했으니……"
10064-1170 = "하지만……\n덕분에 지루하진\n않았어."
10064-1180 = "올해도 평안한\n하루가 계속되기를."
10064-1190 = "신작 앨범 구입에\n쓸 돈을 모두 새전으로\n써버렸는데, 괜찮냐고?"
10064-1200 = "뭐…… 확실히\n조금 무리하기는 했지만."
10064-1210 = "사장의 미소를 볼 수\n있다면, 그리 비싼\n값은 아니지."
10064-1220 = "하루카, 최근에\n조금 무리한\n것처럼 보이던데."
10064-1230 = "괜찮으려나……"
10064-1240 = "(……검은거북파라.\n어쩐지 좋지 않은\n예감이 드는걸.)"
10064-1420 = "마침 잘 왔어, 선생. 도움을\n요청하고 싶은 일이 있어서."
10064-1430 = "새해부터 부탁을 해서\n미안하지만…\n잠깐 시간 좀 내줄 수 있을까?"
10064-1440 = "흥신소에서 역으로 선생에게\n의뢰를 하다니……"
10064-1450 = "뭔가 평소와는 달라서 새롭네."
10064-1460 = "미안. 무츠키와 달리\n이런 데 익숙하질 않아서……"
10064-1470 = "이럴 때는…… 그……\n어떤 표정을 지어야 할 지\n모르겠어……"
10064-1480 = "도와줘서 고마워. 이건\n흥신소 68에서 주는 사례야."
10064-1490 = "고마워, 선생.\n덕분에 살았어."

[translation]
20043-440 = "자 선생님! 새해야~!"
20043-450 = "미식 모험을\n시작해 볼까!"
20043-460 = "뭔가 먹고 싶은 거 있어,\n선생님?"
20043-470 = "나는 아주 많아!"
20043-480 = "나는 말이야.\n선생님이 맛있게\n먹고 있는 걸 그냥\n바라만 보고 있어도,"
20043-490 = "충분히 행복해!"
20043-500 = "선생님과 있는 시간은\n모든 게 새로워."
20043-510 = "새로운 맛을\n찾았을 때처럼, 말이지."
20043-520 = "어딘가에서 들었는데,\n모험은 같이\n떠나는 게 좋대."
20043-530 = "그러니까 미식 모험을\n떠날 때에는,\n선생님도 함께야!"
20043-540 = "나도 미식연구회의\n일원이라구!"
20043-550 = "새로운 맛을 찾는\n모험은 멈추지 않아!"
20043-560 = "그것이 나의 미식도!"

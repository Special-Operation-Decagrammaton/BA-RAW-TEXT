[translation]
20043-440 = "เอ้า คุณครู! ปีใหม่แล้วนะ~!"
20043-450 = "มาออกผจญภัย\nค้นหาอาหารเลิศรสกันมั้ย!"
20043-460 = "มีอะไรที่อยากกินรึเปล่า\nคุณครู?"
20043-470 = "ฉันมีของที่อยากกินเยอะแยะเลย!"
20043-480 = "ฉันน่ะ แค่เห็นคุณครู\nกินของที่อยากกิน\nอย่างเอร็ดอร่อย"
20043-490 = "ก็มีความสุขแล้วละ!"
20043-500 = "ช่วงเวลาที่ได้อยู่กับคุณครู\nก็รู้สึกแปลกใหม่ทั้งหมดเลย"
20043-510 = "ตอนที่ค้นหา\nรสชาติแปลกใหม่น่ะ"
20043-520 = "ฉันเคยได้ยินมาจากที่ไหนสักแห่ง\nว่าถ้าการออกไปผจญภัย\nด้วยกันเป็นสิ่งที่ดีน่ะ"
20043-530 = "เพราะงั้นตอนออกผจญภัย\nค้นหาอาหารเลิศรส\nคุณครูก็ต้องไปด้วยกันนะ!"
20043-540 = "ฉันเองก็เป็นสมาชิก\nชมรมชิมอาหารเหมือนกันนะ!"
20043-550 = "การผจญภัยค้นหารสชาติใหม่ๆ\nจะไม่หยุดอยู่แค่นี้หรอก!"
20043-560 = "นั่นละคือเส้นทาง\nอาหารเลิศรสของฉัน!"

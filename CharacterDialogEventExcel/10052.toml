[translation]
10052-160 = "그럼, 다함께\n<황륜대제>의 준비를\n시작해볼까요."
10052-170 = "개회식에 늦지 않도록\n서둘러 준비하죠!"
10052-180 = "키보토스의 이목이\n집중되는 축제인 만큼,"
10052-190 = "밀레니엄의 진가를\n보여줄 수 있도록\n최선을 다하겠습니다!"
10052-200 = "체육은 특기가\n아닙니다만…"
10052-210 = "이것도 일단은\n세미나의 업무니까요."
10052-220 = "(…모두가 축제를\n기대하고 있는 건\n아닌가 보네요…)"
10052-230 = "유우카 쨩이 나중에\n일어나면 분명 엄청나게\n잔소리를 하겠죠?"
10052-240 = "후후… 유우카 쨩의\n당황한 표정이\n벌써부터 기대가 되네요."
10052-250 = "수고 많으셨습니다,\n선생님. 모두가 힘을\n모아 준비했으니,"
10052-260 = "이번 <황륜대제>도\n분명히 즐거울 거예요."
10052-270 = "키보토스의 이목이\n집중되는 축제인 만큼,"
10052-280 = "밀레니엄의 진가를\n보여줄 수 있도록\n최선을 다하겠습니다!"
10052-290 = "체육은 특기가\n아닙니다만…"
10052-300 = "이것도 일단은\n세미나의 업무니까요."
10052-310 = "(…모두가 축제를\n기대하고 있는 건\n아닌가 보네요…)"
10052-320 = "유우카 쨩이 나중에\n일어나면 분명 엄청나게\n잔소리를 하겠죠?"
10052-330 = "후후… 유우카 쨩의\n당황한 표정이\n벌써부터 기대가 되네요."
10052-560 = "여기, 황륜대제 준비에\n필요한 업무 목록입니다."
10052-570 = "아, 마침 잘 오셨어요.\n선생님께 부탁드리고 싶은 일이\n있었거든요…"
10052-580 = "네? 무슨 일이신가요?"
10052-590 = "후후, 안 돼요.\n지금은 바쁘니…\n나중에 상대해 드릴게요."
10052-600 = "역시 선생님이시네요.\n공부가 되었습니다."
10052-610 = "훌륭한 일처리네요.\n감탄했습니다."

[translation]
10052-160 = "那麼，\n開始準備\n「晄輪大祭」吧。"
10052-170 = "為了不耽誤開幕式，\n加油吧！"
10052-180 = "因為是奇普托斯中\n相當引人注目的慶典，"
10052-190 = "為了呈現出\n千年的真正價值，\n我會全力以赴的！"
10052-200 = "我不擅長運動…"
10052-210 = "但這也是\n研討會的工作。"
10052-220 = "（…並不是所有人，\n都期待著慶典的到來…）"
10052-230 = "等優香醬醒來後，\n一定會嘮叨個沒完吧？"
10052-240 = "呵呵…\n還真是期待，\n優香醬慌張的樣子。"
10052-250 = "辛苦了，老師。\n因為大家同心協力準備，"
10052-260 = "這次的「晄輪大祭」\n一定也相當歡樂。"
10052-270 = "因為是在奇普托斯中\n備受矚目的慶典，"
10052-280 = "所以我們會盡力展現\n千年的真正價值！"
10052-290 = "我雖然不擅長運動…"
10052-300 = "但這終究也是\n研討會的工作。"
10052-310 = "（…並不是所有人\n　都期待著慶典啊…）"
10052-320 = "等優香醬醒來後，\n一定會嘮叨個沒完吧。"
10052-330 = "呵呵…優香醬慌張\n的樣子，現在就\n很期待看見了。"
10052-560 = "這是準備「晄輪大祭」\n所需的工作列表。"
10052-570 = "啊，來得正好。\n有工作想拜託老師…"
10052-580 = "咦？怎麼了嗎？"
10052-590 = "呵呵，不行唷。\n現在正忙著呢…\n以後會再好好陪你的。"
10052-600 = "真不愧是老師。\n我學到一課了。"
10052-610 = "做得真好啊。\n令人佩服。"

[translation]
26012-260 = "歡迎回來！\n老師喜歡滑水道\n還是波浪池呢？"
26012-270 = "中務桐乃，\n本次擔任救生員！"
26012-280 = "水上樂園裡\n竟然會有怪物，\n究竟是怎麼回事……！"
26012-290 = "這次輪到本官\n大顯身手了！"
26012-300 = "老師和遊客的安全\n就由本官守護！"
26012-310 = "雖然很擔心，\n但總算順利結束了！\n辛苦了！"
26012-320 = "為了穿泳裝，\n我暫時忍住了\n美食巡禮……"
26012-330 = "結果回過神來，\n已經完成了\n美食廣場巡禮……"
26012-340 = "要試試滑水道嗎？"
26012-350 = "本官推薦刺激度\n滿點的滑水道！"
26012-360 = "孩子們玩耍的模樣，\n真是太可愛了！"
26012-370 = "嗯？有需要本官\n幫忙的工作嗎？\n請儘管說！"
26012-570 = "今天的工作來了！\n雖然還挺多的，一起加油吧！"
26012-580 = "一個一個細心解決！\n本官也會加油的唷，老師！"
26012-590 = "啊哈哈！禁止搔癢救生員唷！"
26012-600 = "呵呵，不用那麼著急，\n本官會幫忙的！"
26012-610 = "不愧是老師！好厲害！"
26012-620 = "辛苦了，老師！"

[translation]
26012-260 = "เชิญค่ะ! ระหว่างสไลเดอร์\nกับสระคลื่น คุณครู\nชอบอะไรมากกว่าเหรอคะ?"
26012-270 = "นาคัตสึคาสะ คิริโนะ\nคราวนี้ได้มาเป็น\nไลฟ์การ์ดค่ะ!"
26012-280 = "สัตว์ประหลาดในสวนน้ำงั้นเหรอ\nมันเรื่องอะไรกันเนี่ย...!"
26012-290 = "คราวนี้ถึงเวลาที่\nฉันจะได้โชว์ฝีมือ\nแล้วสินะคะ!"
26012-300 = "ฉันจะดูแลความปลอดภัย\nของคุณครูกับลูกค้าให้เองค่ะ!"
26012-310 = "ฉันกังวลมากเลย\nแต่ก็จบลงด้วยดีนะคะ!\nทำได้ดีมากค่ะ!"
26012-320 = "ฉันหยุดตระเวนหาร้านเด็ด\nไปสักพัก เพื่อให้ใส่\nชุดว่ายน้ำได้เลยนะคะ..."
26012-330 = "พอรู้ตัวอีกที\nฉันก็ไปเดินมาทั่ว\nศูนย์อาหารแล้วค่ะ..."
26012-340 = "สไลเดอร์สระน้ำ\nเป็นยังไงบ้างคะ?"
26012-350 = "ฉันจะแนะนำสไลเดอร์\nที่หวาดเสียวที่สุด\nให้เองค่ะ!"
26012-360 = "เด็กๆ เล่นน้ำกัน\nน่ารักจังเลยนะคะ!"
26012-370 = "คะ? มีงานที่ต้องให้\nฉันไปทำเหรอคะ?\nบอกมาได้ทุกอย่างเลยค่ะ!"
26012-570 = "นี่คือสิ่งที่ต้องทำวันนี้ค่ะ!\nถึงจะแอบเยอะ แต่ฉันก็จะสู้ค่ะ!"
26012-580 = "ค่อยๆ ทำไปทีละอย่าง!\nฉันก็จะสู้นะคะคุณครู!"
26012-590 = "อะฮ่าฮ่า! ห้ามจั๊กจี้\nไลฟ์การ์ดนะคะ!"
26012-600 = "ฮุฮุ ต่อให้ไม่รบเร้ากันขนาดนั้น\nฉันก็จะช่วยอยู่แล้วค่ะ"
26012-610 = "สมกับเป็นคุณครูจริงๆ เลย!\nสุดยอดไปเลยค่ะ!"
26012-620 = "ขอบคุณนะคะคุณครู!"

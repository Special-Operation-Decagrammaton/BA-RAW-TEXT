[translation]
26012-260 = "Welcome! Sensei, which do you prefer, the slide or the wave pool?"
26012-270 = "Nakatsukasa Kirino, reporting as a lifeguard this time!"
26012-280 = "A monster at the water park? How is this possible...?!"
26012-290 = "This time, it's finally my turn to step up!"
26012-300 = "I'll ensure the safety of Sensei and the guests!"
26012-310 = "I was really concerned, but it all turned out well in the end! Great job!"
26012-320 = "I've even held back on food adventures, so I could wear my swimsuit..."
26012-330 = "When I came to my senses, I found myself on a food court pilgrimage..."
26012-340 = "How about a water slide?"
26012-350 = "I can recommend the most exhilarating one!"
26012-360 = "The kids playing are so cute!"
26012-370 = "Yes? Is there something you need? Just let me know if there's anything at all!"
26012-570 = "This is today's task list! It's a lot, but let's give it our all!"
26012-580 = "One at a time! I'll do my best too, Sensei!"
26012-590 = "Ahaha! Tickling the lifeguard is not allowed!"
26012-600 = "Heehee. Hold your horses. I'll help you out!"
26012-610 = "As expected, you're amazing, Sensei!"
26012-620 = "Great work, Sensei!"

[translation]
10106-150 = "อ่า~ อ่า~ อ่า อ่า~"
10106-160 = "อ๊ะ... คะ... คุณครู!?"
10106-170 = "ขอบคุณที่มานะคะ\nคุณครู"
10106-180 = "ซะ... ซากุระโกะ ดีใจมากเลยค่ะ"
10106-190 = "ผ่านมาครึ่งทางแล้วสินะคะ\nอืม..."
10106-200 = "มีคำกล่าวที่ว่า\nเวลาแห่งความสนุกนั้น\nผ่านไปในพริบตา..."
10106-210 = "แต่ฉันรู้สึกเหมือนกับว่า\nมันผ่านไปเร็วมากจริงๆ ค่ะ"
10106-220 = "ฮุฮุ รู้สึกเสียดายอะไรงั้นเหรอคะ?"
10106-230 = "บังเอิญจังเลยนะคะ… ฉันก็เหมือนกันค่ะ"
10106-240 = "หืม? ทำไมเหรอคะ?"
10106-250 = "จะ... จับมือ... เหรอคะ?"
10106-260 = "รู้สึกใกล้ชิดกับทุกๆ คน\nมากกว่าตอนที่\nใส่ชุดซิสเตอร์เลยค่ะ"
10106-270 = "ฮุฮุุ ชุดนี้ดีจังเลยนะคะ"
10106-280 = "เอ่อ...\nมีธุระอะไรหรือเปล่าคะ?"
10106-290 = "ถึงจะโดนเรียกหลายๆ ครั้ง\nแต่ฉันก็ไม่รู้ว่าควรจะ\nทำยังไงดีเลยคะ"
10106-300 = "มีท่าเต้นลับ\nที่กำลังฝึกอยู่ด้วยค่ะ..."
10106-310 = "ถะ... ถ้าคุณครูสะดวก\nจะลองชมสักหน่อยมั้ยคะ?"
10106-540 = "ฉันจัดรายการงาน\nของคุณครูเอาไว้แล้วค่ะ"
10106-550 = "มาแล้วเหรอคะ คุณครู"
10106-560 = "ว่าแต่ว่าคุณครู...\nตอนนี้เราอยู่กันแค่สองคนนะคะ"
10106-570 = "คะ? ปะ... เปล่านะคะ...\nฉันแค่พูดไปเฉยๆ เอง"
10106-580 = "ไม่ได้มีความหมายพิเศษ\nอะไร... เลย..."
10106-590 = "ชุดนั้นเหมาะดีงั้นเหรอคะ...?\nฮุฮุ ขอบคุณค่ะ"
10106-600 = "ค่ะ ตรวจสอบเรียบร้อยค่ะ"
10106-610 = "ดีจังเลยนะคะ"

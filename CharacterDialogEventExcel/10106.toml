[translation]
10106-150 = "아~ 아~ 아아~"
10106-160 = "앗… 서, 선생님!?"
10106-170 = "와주셔서 감사합니다,\n선생님."
10106-180 = "사, 사쿠라코, 기뻐요!"
10106-190 = "벌써 반이나 지났네요.\n으음……."
10106-200 = "즐거운 시간은 눈 깜짝할\n사이라고는 하지만…"
10106-210 = "너무나도 한순간에 지나가\n버린 것 같은 기분입니다."
10106-220 = "후후, 미련이 남으시나요?"
10106-230 = "우연이네요. …저도 그런데."
10106-240 = "응? 왜 그러시죠?"
10106-250 = "아, 악수……인가요?"
10106-260 = "수녀복을 입었을 때보다\n모두와 더\n가까워진 것 같아요."
10106-270 = "후훗, 이 복장도 좋군요."
10106-280 = "그…… 용무가\n있으신 걸까요?"
10106-290 = "몇 번이나 부르시면\n……그게, 뭘 하면\n좋을지 모르겠습니다."
10106-300 = "연습 중인 비장의\n안무가 있습니다만……"
10106-310 = "괜, 괜찮으시면 보시겠어요?"
10106-540 = "선생님의 업무를\n정리해 두었습니다."
10106-550 = "잘 찾아오셨습니다, 선생님."
10106-560 = "그러고 보니, 선생님…\n지금, 단둘이 있네요."
10106-570 = "네? 아, 아니…\n말 그대로의 의미고,"
10106-580 = "특별히 깊은 의미는\n없습니다…만…"
10106-590 = "그 옷, 잘 어울린다구요…?\n후후, 감사합니다."
10106-600 = "네, 확인하였습니다."
10106-610 = "아주 좋네요."

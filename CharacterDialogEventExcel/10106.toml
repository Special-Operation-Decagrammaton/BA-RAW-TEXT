[translation]
10106-150 = "Ahh. Ahh. Aahh."
10106-160 = "Ah... S-Sensei?!"
10106-170 = "Thank you for coming, Sensei."
10106-180 = "S-Sakurako is very happy!"
10106-190 = "We're already halfway there. Mmm..."
10106-200 = "People say that fun times pass in the blink of an eye..."
10106-210 = "But it truly feels like this ended too quickly."
10106-220 = "Heehee, do you have any regrets?"
10106-230 = "What a coincidence. ...I feel the same."
10106-240 = "Hm? What's wrong?"
10106-250 = "Ah... A handshake?"
10106-260 = "Compared to when I don the uniform of the Sisters, I feel this costume has helped me grow closer to everyone."
10106-270 = "Heehee, this costume is nice."
10106-280 = "Um... Do you have business with me?"
10106-290 = "If you call me over and over again... I'm not sure how I should react."
10106-300 = "I've been practicing my ultimate dance move."
10106-310 = "W-Would you like to see it?"
10106-540 = "I have organized your tasks."
10106-550 = "You came to the right place, Sensei."
10106-560 = "Now that I think about it, Sensei... It's just the two of us right now."
10106-570 = "Huh? N-No... It's just the current situation..."
10106-580 = "There's no deeper meaning to...it..."
10106-590 = "These clothes look good on me...? Heehee, thank you."
10106-600 = "Yes, confirmed."
10106-610 = "Great."

[translation]
10106-150 = "啊─啊─啊─啊─"
10106-160 = "啊……老，老師！？"
10106-170 = "非常感謝您\n特此前來，\n老師。"
10106-180 = "櫻，櫻子，\n很開心！"
10106-190 = "已經過去\n一半了呢……"
10106-200 = "雖說美好的時間\n總是轉瞬即逝……"
10106-210 = "但感覺實在太像\n一瞬間就過去了。"
10106-220 = "呵呵，\n覺得依依不捨嗎？"
10106-230 = "……真巧呢，\n我也是。"
10106-240 = "老師，\n請問有什麼事嗎？"
10106-250 = "握，握手……是嗎？"
10106-260 = "與穿修女服的時候相比，\n感覺和大家更親密了。"
10106-270 = "呵呵，這套服裝\n也是好東西呢。"
10106-280 = "那個……\n請問有什麼事嗎？"
10106-290 = "被叫了這麼多次……\n那個，讓我有點\n不知該如何是好。"
10106-300 = "我有個還在練習中的\n祕藏舞步……"
10106-310 = "不，不介意的話，\n您要看看嗎？"
10106-540 = "我將老師的工作\n進行了統整。"
10106-550 = "您來了呢，老師。"
10106-560 = "這麼說來，老師……\n現在是我們兩人獨處呢。"
10106-570 = "咦？不，不是的……\n我只有字面上的意思，"
10106-580 = "沒有什麼深層的……含意……"
10106-590 = "這套服裝，很適合我……？\n呵呵，感謝您的稱讚。"
10106-600 = "好的，\n這邊已經確認了。"
10106-610 = "好的，您做得很好。"

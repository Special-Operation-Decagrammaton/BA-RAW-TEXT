[translation]
20021-110 = "คุณครูคะ ในที่สุด\nก็ถึงวันคริสต์มาสแล้วค่ะ!"
20021-120 = "ตอนนี้ฉันก็\nอยู่ในโหมดคริสต์มาสค่ะ~!"
20021-130 = "คุณครูมีอะไร\nที่อยากได้รึเปล่าคะ?"
20021-140 = "ฉันจะเขียนจดหมาย\nบอกซานตาคลอสให้ค่ะ!"
20021-150 = "คุณครู ทำไมเป็นแบบนั้นล่ะคะ?\nมีเรื่องอะไรหรือเปล่าคะ?"
20021-160 = "ถ้ายังจ้องกัน\nอยู่แบบนี้ละก็..."
20021-170 = "ชุดนี้มันแปลกๆ เหรอคะ?"
20021-180 = "ทำไมเป็นแบบนั้นล่ะคะ?\nลืมอะไรไว้งั้นเหรอคะ...\nเอ๋ ไม่ใช่เหรอคะ?"
20021-190 = "อ๊ะ… ถ้ามาจิ้มกันบ่อยๆ..."
20021-200 = "ฉันก็จะ\nจิ้มคุณครูแรงๆ บ้างนะคะ!"
20021-210 = "ถ้ายังจ้องกัน\nอยู่แบบนี้ละก็..."
20021-220 = "ชุดนี้มันแปลกๆ เหรอคะ?"
20021-230 = "ทำไมเป็นแบบนั้นล่ะคะ?\nลืมอะไรไว้งั้นเหรอคะ...\nเอ๋ ไม่ใช่เหรอคะ?"
20021-240 = "อ๊ะ...\nถ้ามาจิ้มกันบ่อยๆ..."
20021-250 = "ฉันก็จะ\nจิ้มคุณครูแรงๆ บ้างนะคะ!"
20021-350 = "ชมรมอัศวินบรรเทาทุกข์\nกำลังจัดงานการกุศลอยู่ค่ะ!"
20021-360 = "อ๊ะ คุณครู! เชิญเลยค่ะ!\nสนใจเสี่ยงโชคดูสักหน่อย\nไหมล่ะคะ?"
20021-370 = "กิจกรรมการกุศล\nจบลงแล้วค่ะ!"
20021-380 = "ถ้ายังมีสลากอยู่\nฉันจะแลกให้ค่ะ!"
20021-390 = "คะ?\nมีปัญหาอะไรหรือเปล่าคะ?"
20021-400 = "วันนี้ซานต้าฮานาเอะ\nมาแจกจ่ายความสุขค่า~!"
20021-410 = "ว้าว ถูกรางวัลด้วยค่ะ!"
20021-420 = "ฮุฮุ หวังว่าจะถูกใจ\nของขวัญจากฉันนะคะ!"
20021-430 = "ว้าว...\nข้างในมีของพวกนี้เหรอเนี่ย...!"
20021-440 = "งานของวันนี้อยู่ทางนี้ค่ะ!"
20021-450 = "อย่าใจร้อนนะคะ\nค่อยๆ ทำทีละอย่างค่ะ!"
20021-460 = "ดูจากลิสต์แล้ว ใช่ตรงนี้ไหมนะ?\nเอ๋... ตรงไหนกันแน่นะ?"
20021-470 = "งานดูเยอะจังเลยนะคะ..."
20021-480 = "ถ้าผ่าตัดได้เลย\nก็คงจะดีนะคะ"
20021-490 = "สุดยอดเลย! สมกับเป็นคุณครูเลยค่ะ!"
20021-500 = "ทำได้ดีมากเลยค่ะคุณครู!\nฉันเองก็ดีใจค่ะ!"

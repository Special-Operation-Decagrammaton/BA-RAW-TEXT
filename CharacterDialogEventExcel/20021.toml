[translation]
20021-110 = "老師，\n聖誕節\n終於來了！"
20021-120 = "我也進入聖誕節\n模式了唷～！"
20021-130 = "老師有什麼\n想要的東西嗎？"
20021-140 = "我會寫一封信\n跟聖誕老人請求的！"
20021-150 = "老師，怎麼了？\n有什麼事嗎？"
20021-160 = "被那樣\n盯著看的話……"
20021-170 = "這樣子，很奇怪嗎？"
20021-180 = "怎麼了？\n忘了什麼東西嗎……？\n咦，不是嗎？"
20021-190 = "唔唔唔……\n像那樣到處\n摸的話……"
20021-200 = "我也會把\n老師\n摸回來的！"
20021-210 = "被那樣\n盯著看的話……"
20021-220 = "這副打扮，很奇怪嗎？"
20021-230 = "怎麼了？\n忘了什麼東西嗎……？\n咦，不是嗎？"
20021-240 = "唔唔唔……\n像那樣到處\n摸的話……"
20021-250 = "我也會盡情\n把老師摸回來的！"
20021-350 = "救護騎士團主辦的\n慈善活動現正舉辦中！"
20021-360 = "啊，老師！歡迎！\n要不要來抽個籤呀？"
20021-370 = "慈善活動\n結束了！"
20021-380 = "如果手上還有\n抽獎券的話，\n我來幫你兌換！"
20021-390 = "咦，\n有什麼事嗎？"
20021-400 = "今天的聖誕老人花繪\n會帶給你幸福唷～！"
20021-410 = "哇，中大獎了！"
20021-420 = "欸嘿嘿。\n如果你喜歡我的禮物，\n我會很高興的！"
20021-430 = "哇啊……！\n竟然有這樣的東西……！"
20021-440 = "以下是今天要做的事！"
20021-450 = "一件一件，不用著急！"
20021-460 = "那份清單，\n是在這裡對吧？\n……咦，是哪一個呢？"
20021-470 = "總覺得事情\n很多呢……"
20021-480 = "這個也能做手術的話\n就好了。"
20021-490 = "好厲害！不愧是老師！"
20021-500 = "辛苦了，老師。\n我也很開心！"

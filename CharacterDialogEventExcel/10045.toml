[translation]
10045-10 = "โย่ว~ ครู\nเหนื่อยหน่อยน้า~"
10045-20 = "ร้อนจังเลย ร้อน~\nร้อนจนเหมือน\nจะแห้งตายอยู่แล้ว..."
10045-30 = "ถึงจะอยู่เฉยๆ แบบนี้\nแต่ก็ร้อนจังเลย..."
10045-40 = "ครู~ สนใจตาลุงคนนี้\nหน่อยได้รึเปล่า?"
10045-50 = "มีปัญหาอยู่งั้นเหรอ?"
10045-60 = "อือฮึ...\nถึงจะเรียกแบบนั้น\nลุงก็ไม่มีอะไรให้หรอกนะ..."
10045-70 = "หรือว่าครูเองก็\nเหนื่อยเหมือนกันเหรอ?"
10045-80 = "ถ้าอย่างนั้น...\nเราไปพักงีบตรงนั้นกันดีมั้ย?"
10045-90 = "ง่วง~ จาง~ เลย~~"

[translation]
10045-10 = "呀～老師，辛苦了～"
10045-20 = "好熱……\n熱到感覺\n要被曬乾了……"
10045-30 = "明明沒有動\n卻好熱唷～"
10045-40 = "老師～\n來找大叔沒關係嗎？"
10045-50 = "會被罵的唷？"
10045-60 = "唔嗯……\n就算那樣戳，大叔身上\n也什麼都不會跑出來哦……"
10045-70 = "難道說，\n老師也累了嗎？"
10045-80 = "那要一起\n在那邊睡一覺嗎？"
10045-90 = "好～睏～～"
10045-100 = "會被罵的唷？"
10045-110 = "唔呼……\n就算那樣戳，大叔身上\n也什麼都不會跑出來哦……"
10045-120 = "該不會，\n老師也累了嗎？"
10045-130 = "那要一起\n在那邊睡一覺嗎？"
10045-140 = "好～睏……"

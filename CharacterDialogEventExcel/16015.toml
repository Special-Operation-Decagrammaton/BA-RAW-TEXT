[translation]
16015-10 = "おかえりなさい、先生！\nお待ちしておりました！"
16015-20 = "先生！よかったら練習の\n成果を見てください！"
16015-30 = "順調ですね！\n私も頑張ります！"
16015-40 = "最後まで頑張ります！\n見ていてください、先生！"
16015-50 = "はぁ……スッキリした！\n先生はいかがでしたか？"
16015-60 = "先生？……呼びました？"
16015-70 = "え、ええと……。"
16015-80 = "そんなに\nつつかれたら……。"
16015-90 = "く、くすぐったいです、\n先生……。"
16015-100 = "あはは……。"
16015-110 = "もう～！私もやり\n返しちゃいますよ？"
16015-690 = "こんにちは、先生！\nお待ちしておりました！"
16015-700 = "来てくださったんですね、先生！\n進行状況をまとめておきました！"
16015-710 = "せ、先生……？"
16015-720 = "わ、私じゃなくて\nあちらを見てください……"
16015-730 = "はい！こちらです！"
16015-740 = "確認完了です！"

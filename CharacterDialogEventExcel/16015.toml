[translation]
16015-10 = "เชิญค่ะคุณครู!\nฉันกำลังรออยู่เลยค่ะ!"
16015-20 = "คุณครู ถ้าสะดวกละก็...\nฉันจะแสดงผลลัพธ์\nของการฝึกให้ดูค่ะ!"
16015-30 = "ผ่านไปได้ด้วยดีเลยนะคะ!\nฉันเองก็พยายามให้มากขึ้นค่ะ"
16015-40 = "ฉันจะพยายามให้ถึงที่สุดเลยค่ะ!\nคอยดูให้ดีนะคะ คุณครู!"
16015-50 = "ฮู่ว... โล่งจัง!\nคุณครูเป็นยังไงบ้างคะ?"
16015-60 = "คุณครู? เรียกฉันเหรอคะ...?"
16015-70 = "อะ... เอ๋..."
16015-80 = "ถ้าเอาแต่จิ้มกันอย่างนี้..."
16015-90 = "จะ... จั๊กจี้นะคะ!\nคุณครู..."
16015-100 = "อะฮ่าฮ่า..."
16015-110 = "จริงๆ เลยเชียว~!\nเดี๋ยวฉันเอาคืนบ้างนะคะ!"
16015-690 = "สวัสดีค่ะคุณครู!\nฉันกำลังรออยู่เลยค่ะ!"
16015-700 = "มาแล้วเหรอคะคุณครู!\nฉันสรุปความคืบหน้าเอาไว้ให้แล้วค่ะ!"
16015-710 = "คะ...คุณครู...!"
16015-720 = "ยะ... อย่ามองฉันสิคะ ไปดูตรงนั้นค่ะ..."
16015-730 = "ค่ะ! อยู่ตรงนี้ค่ะ!"
16015-740 = "ตรวจสอบเรียบร้อยค่ะ!"

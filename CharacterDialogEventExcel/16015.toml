[translation]
16015-10 = "歡迎回來，老師！\n我一直在等你哦！"
16015-20 = "老師！可以的話，\n請看看我練習的成果！"
16015-30 = "很順利呢！\n我也會加油的！"
16015-40 = "我會努力到最後！\n請拭目以待，老師！"
16015-50 = "哇……真爽快！\n老師覺得如何？"
16015-60 = "老師？\n……你有叫我嗎？"
16015-70 = "那，那個……"
16015-80 = "被那樣\n戳來戳去的話……"
16015-90 = "很，很癢耶，\n老師……"
16015-100 = "啊哈哈……"
16015-110 = "真是的～！\n我要反擊回去囉？"
16015-690 = "你好，老師！\n我一直在等你！"
16015-700 = "你來了啊，老師！\n進度已經整理好了！"
16015-710 = "老，老師……"
16015-720 = "別，別看我，\n請看那邊……"
16015-730 = "好的！就是這些！"
16015-740 = "確認完成！"

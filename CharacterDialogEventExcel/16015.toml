[translation]
16015-10 = "어서 오세요, 선생님!\n기다리고 있었어요!"
16015-20 = "선생님! 괜찮으시다면\n연습의 성과를 봐주세요!"
16015-30 = "순조롭네요!\n저도 열심히 하겠습니다!"
16015-40 = "끝까지 열심히 하겠습니다!\n지켜봐 주세요, 선생님!"
16015-50 = "하아…개운해!\n선생님은 어떠셨나요?"
16015-60 = "선생님? ……부르셨나요?"
16015-70 = "에, 에에……."
16015-80 = "그렇게 자꾸 찌르시면……."
16015-90 = "가, 간지러워요.\n선생님……."
16015-100 = "아하하……."
16015-110 = "정말~!\n저도 똑같이 할 거예요!?"
16015-690 = "안녕하세요, 선생님!\n기다리고 있었어요!"
16015-700 = "오셨군요, 선생님!\n진행 상황을 정리해 두었어요!"
16015-710 = "서, 선생님……?"
16015-720 = "저, 저 말고 저쪽을 봐주세요……."
16015-730 = "네! 여기 있습니다!"
16015-740 = "확인 완료입니다!"

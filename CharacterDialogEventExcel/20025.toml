20025-1290 = "……전부,\n부숴버릴까요?"
20025-1300 = "아루 님께선……\n즐거우신 것 같아요……"
20025-1310 = "그건, 다행이네요.\n헤, 헤헤……"
20025-1320 = "드디어 소동이 잠잠해진\n모양이에요…… "

[translation]
20025-740 = "서, 서서서서, 선생님?!\n어, 어서 오세요!\n그리고, 죄, 죄송합니다!"
20025-750 = "……헤헤……\n여기서 선생님을\n뵙다니…"
20025-760 = "아, 아뇨! 특별히\n무슨 뜻이\n있는 게 아니라…!"
20025-830 = "네, 네엣?!\n무, 무무무무, 무슨\n일이신가요, 선생님?!"
20025-840 = "네…? 그냥…\n불러 보셨다고요?"
20025-850 = "그, 그런가요.\n에, 헤헤…."
20025-860 = "새해를 맞이해……\n흥신소의 여러분…\n선생님과 이렇게……"
20025-870 = "에헤헤……\n조금, 특별, 한\n기분이에요. "
20025-880 = "선생님, 역시 저, 저\n같은 거랑 있어도……\n그렇게 즐겁지는……"
20025-890 = "아니…… 라고요?\n그, 러신가요…."
20025-900 = "……가, 감사, 합니다.\n선생님."

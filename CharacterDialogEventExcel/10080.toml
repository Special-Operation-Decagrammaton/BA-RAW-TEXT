[translation]
10080-100 = "왔어, 선생님?\n그럼 시작해볼까?"
10080-110 = "뭐 도와줄까?"
10080-120 = "이건 우리의\n이야기니까, 협력할게☆"
10080-130 = "잘 돼가는 중이야?"
10080-140 = "슬슬 끝이 보이기\n시작했나?"
10080-150 = "못다한 일은 없는지,\n다시 한번 확인해 보는 게\n좋을 거야☆"
10080-160 = "헤에~?\n그렇게 나오는 거구나."
10080-170 = "해야 할 게\n따로 있으실 텐데?"
10080-180 = "…내 참을성에도\n한계가 있다구☆"
10080-190 = "어라라…….\n이거, 괜찮은 거야?"
10080-480 = "진행상황 한 번,\n확인해 볼까?"
10080-490 = "확인하러 왔구나.\n뭐 도와줄까?"
10080-500 = "포기, 라는 말을\n모르는 타입인가 봐?"
10080-510 = "헤에…….?"
10080-520 = "꽤 열심히 했네?\n칭찬해줄게☆"
10080-530 = "조금은 도움이 되지 않을까?"

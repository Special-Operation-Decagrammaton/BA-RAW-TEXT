[translation]
10080-100 = "มาแล้วเหรอคุณครู?\nงั้นมาเริ่มกันเลยมั้ย?"
10080-110 = "ให้ฉันช่วยอะไรดีล่ะ?"
10080-120 = "นี่คือเรื่องของเรา\nงั้นฉันจะร่วมมือนะ☆"
10080-130 = "กำลังไปได้ด้วยดีใช่มั้ย?"
10080-140 = "เริ่มจะเห็น\nจุดสิ้นสุดรึยังนะ?"
10080-150 = "ลองตรวจสอบดูอีกที\nว่ามีอะไรยังไม่เสร็จมั้ย\nก็น่าจะดีนะ☆"
10080-160 = "เอ๋~?\nเล่นอะไรแบบนี้นี่เองสินะ"
10080-170 = "มีงานอย่างอื่นที่ต้องทำ\nอยู่หรือเปล่า?"
10080-180 = "ความอดทนของฉันก็มีขีดจำกัดนะ☆"
10080-190 = "ตายจริง...\nแบบนี้ไม่เป็นไรเหรอ?"
10080-480 = "มาดูความคืบหน้า\nกันหน่อยมั้ย?"
10080-490 = "เข้ามาตรวจสอบสินะ\nให้ฉันช่วยอะไรดี?"
10080-500 = "เป็นคนที่ไม่รู้จัก\nคำว่ายอมแพ้เลยสินะเนี่ย?"
10080-510 = "เอ๋...?"
10080-520 = "ขยันไม่เบาเลยนะเนี่ย\nขอชื่นชมเลย☆"
10080-530 = "น่าจะเป็นประโยชน์อยู่บ้างนะ"

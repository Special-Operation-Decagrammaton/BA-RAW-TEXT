[translation]
10080-100 = "我在等你哦，老師。\n那麼就開始吧？"
10080-110 = "需要我幫點忙嗎？"
10080-120 = "這畢竟跟我們有關，\n我會幫忙的哦☆"
10080-130 = "還順利嗎～？"
10080-140 = "差不多能看見\n終點了嗎？"
10080-150 = "有沒有還沒做完的事，\n最好再確認一次哦☆"
10080-160 = "嘿～？居然\n做這種事啊？"
10080-170 = "不是還有其他\n該做的事嗎？"
10080-180 = "……我的忍耐\n也是有極限的喔☆"
10080-190 = "……哎呀哎呀。\n這樣沒問題嗎？"
10080-480 = "來確認一下進度吧。"
10080-490 = "是來確認的吧。\n需要我幫點忙嗎？"
10080-500 = "「放棄」這個詞，\n感覺你似乎不知道呢？"
10080-510 = "嘿～？"
10080-520 = "還挺努力的嘛？\n值得稱讚哦☆"
10080-530 = "多少有幫上忙嘛？"

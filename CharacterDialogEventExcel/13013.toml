[translation]
13013-160 = "선생님, 오셨군요!"
13013-170 = "에헤헤.\n계속 기다리고\n있었어요."
13013-180 = "안녕하세요. 선생님!"
13013-190 = "제가 할 수 있는 일이라면,\n무엇이든 말씀해 주세요."
13013-200 = "점점, 일이\n커져가는 것 같은……"
13013-210 = "하지만 분명, 괜찮겠죠?\n선생님……"
13013-220 = "이렇게 된 이상,\n되돌릴 수 없어요."
13013-230 = "지식해방전선은\n계속 나아갈 거예요!"
13013-240 = "어떻게든\n마무리되었네요……\n모두가 무사해서,\n정말 다행이에요."
13013-250 = "네, 선생님. 부르셨나요?"
13013-260 = "메루 선배는\n뭘 하고 있으려나요……"
13013-270 = "어디서 폭주하고 있지\n않으면 좋겠는데요."
13013-280 = "글을 읽는 것도,\n그림을 보는 것도\n정말 좋아해요."
13013-290 = "만화는 언제든지\n우리에게 여러 가지를\n알려 주거든요!"
13013-300 = "서, 선생님?\n그렇게 바라보시면……\n부끄러운데요……"
13013-310 = "뭔가 찾고 계신가요, 선생님?\n천천히 둘러보고 가세요."
13013-320 = "물건을 진열하거나\n전시하는 건 익숙하니까요.\n저한테 맡겨만 주세요!"
13013-330 = "바라시는 만큼 둘러 보고 가세요!"
13013-340 = "나중에 후회하게 되면, 아까우니까요."
13013-350 = "상점 관리요……?"
13013-360 = "아뇨, 도서관 관리에 비하면,\n이 정도는 괜찮죠."
13013-370 = "이 중에, 절판된 책의 초판이 섞여 있으면……\n저는…… 어떻게 해야……"
13013-380 = "앗! 이, 이건 결코\n사심 같은 게 아니라……!"
13013-390 = "아, 그걸 고르셨군요."
13013-400 = "잠시만 기다려 주세요……\n네, 여기요!"
13013-410 = "여기에서는 정해진 그 대사를……"
13013-420 = "'이야-! 보는 눈이 있으시군요, 손님!'"
13013-430 = "매번 감사합니다!"
13013-440 = "지금, 뭔가 프로 같았다고요?\n에헷. 에헤헷……"
13013-450 = "어서 오세요, 선생님!\n무엇으로 하시겠어요?"
13013-460 = "운세 확인인가요!"
13013-470 = "옆에서 보고 있어도\n될까요? 에헤헤."
13013-480 = "아, 뭔가 신경 쓰이는\n것이라도 있으신가요?"
13013-490 = "네, 선생님?\n무슨 일이세요?"
13013-500 = "필요할 때를 위한\n작은 행운을……"
13013-510 = "한번 말해 보고 싶었어요,\n이런 거!"
13013-520 = "우와, 당첨이에요!\n굉장해요!\n역시 선생님이시네요!"
13013-530 = "선생님은\n운이 좋으시군요……\n멋져요. 선생님!"
13013-540 = "잠시만 저에게도\n보여 주세요."
13013-550 = "으음…….\n이 정도면 괜찮아요!"
13013-560 = "후에엥……"
13013-570 = "너, 너무\n낙심하지 마세요.\n선생님. 제가 있잖아요!"

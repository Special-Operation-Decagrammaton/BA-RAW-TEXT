[translation]
13013-160 = "มาแล้วเหรอคะคุณครู!"
13013-170 = "แหะๆๆ ฉันกำลังรอ\nคุณครู อยู่เลยละค่ะ"
13013-180 = "สวัสดีค่ะ คุณครู!"
13013-190 = "ถ้าเป็นเรื่องที่ฉันทำได้ละก็\nบอกฉันได้ทุกอย่างเลยนะคะ"
13013-200 = "เหมือนว่าเรื่องจะ\nใหญ่ขึ้นเรื่อยๆ เลย..."
13013-210 = "แต่ว่ามันจะผ่านไปได้ด้วยดี\nใช่ไหมคะ? คุณครู..."
13013-220 = "ถ้าเป็นแบบนี้แล้วละก็\nไม่น่าย้อนกลับได้แล้วค่ะ"
13013-230 = "ชมรมแนวร่วมปลดปล่อยความรู้\nจะเดินหน้าต่อไปค่ะ!"
13013-240 = "ไม่ว่ายังไงก็จัดการเสร็จ\nจนได้นะคะ... โล่งอกไปทีค่ะ\nที่ทุกคนปลอดภัย"
13013-250 = "ค่ะ คุณครู เรียกฉันเหรอคะ?"
13013-260 = "รุ่นพี่เมรุ\nกำลังทำอะไรอยู่นะ..."
13013-270 = "หวังว่าจะไม่ไปหัวร้อน\nอยู่ที่ไหนนะคะ"
13013-280 = "ฉันชอบทั้งอ่านหนังสือ\nแล้วก็ดูรูปวาดเลยค่ะ\nชอบมากๆ เลย"
13013-290 = "หนังสือการ์ตูนน่ะ\nมีอะไรให้เราได้เรียนรู้\nอยู่ตลอดเลยค่ะ!"
13013-300 = "คะ... คุณครู?\nถ้าจะจ้องกันแบบนี้ละก็...\nฉันเขินนะคะ..."
13013-310 = "หาอะไรอยู่เหรอคะคุณครู?\nค่อยๆ เดินหาดูนะคะ"
13013-320 = "ฉันคุ้นเคยกับการจัดแสดงของและจัด\nนิทรรศการน่ะค่ะ วางใจได้เลยค่ะ!"
13013-330 = "เดินดูได้ตามที่ต้องการเลยนะคะ!"
13013-340 = "จะได้ไม่มาเสียดายภายหลังไงคะ"
13013-350 = "เรื่องจัดการร้านค้าน่ะเหรอคะ...?"
13013-360 = "ไม่ค่ะ ถ้าเทียบกับจัดการห้องสมุดแล้ว\nแค่นี้ไม่เท่าไรเลยค่ะ"
13013-370 = "ถ้าในนี้มีฉบับพิมพ์ครั้งแรกที่ไม่วางขาย\nอีกแล้วอยู่ด้วยละก็... ฉันจะทำยังไงดี..."
13013-380 = "อ๊ะ! นะ... นี่มัน\nไม่ใช่ความชอบส่วนตัวนะ...!"
13013-390 = "อ่า เลือกเล่มนี้มาสินะคะ"
13013-400 = "ช่วยรอสักครู่นะคะ...\nค่ะ นี่ค่ะ!"
13013-410 = "บทพูดที่กำหนดไว้ตรงนี้..."
13013-420 = "ว้าว! ตาถึงจังเลยนะคะคุณลูกค้า!'"
13013-430 = "ขอบคุณทุกครั้งเลยนะคะ!"
13013-440 = "ฉันดูเหมือนมืออาชีพอย่างนั้นเหรอคะ?\nแหะๆ แหะๆๆ..."
13013-450 = "เชิญค่ะคุณครู!\nจะรับอะไรดีคะ?"
13013-460 = "มาดูดวงเหรอคะ!"
13013-470 = "ขอฉันนั่งอยู่ข้างๆ\nได้ไหมคะ? แหะๆๆ"
13013-480 = "อ่า... มีเรื่องอะไรที่\nกวนใจอยู่หรือเปล่าคะ?"
13013-490 = "คะ คุณครู?\nมีเรื่องอะไรเหรอคะ?"
13013-500 = "โชคเล็กๆ\nสำหรับเวลาที่จำเป็น…"
13013-510 = "ฉันอยากลองพูด\nบทพูดแบบนั้นดูสักครั้งน่ะค่ะ!"
13013-520 = "ว้าว ถูกรางวัลด้วยค่ะ!\nสุดยอดไปเลยค่ะ!\nว่าแล้วเชียวว่าคุณครูต้องได้!"
13013-530 = "คุณครูเนี่ย\nโชคดีจังเลยนะคะ...\nเท่ระเบิดไปเลยค่ะ คุณครู!"
13013-540 = "ขอให้ฉัน\nได้ดูด้วยคนสิคะ"
13013-550 = "อืมม...\nประมาณนี้น่าจะได้ค่ะ!"
13013-560 = "แงง..."
13013-570 = "ยะ... อย่าเสียกำลังใจ\nให้มากเกินไปนะคะ\nคุณครู ฉันอยู่นี่ทั้งคนนะคะ!"

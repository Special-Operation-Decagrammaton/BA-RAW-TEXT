[translation]
13013-160 = "你來了啊，老師！"
13013-170 = "耶嘿嘿，\n我一直在等你。"
13013-180 = "你好，老師！"
13013-190 = "只要是我能做到的事，\n請儘管告訴我吧！"
13013-200 = "感覺事情好像\n越鬧越大了……"
13013-210 = "不過一定，\n會沒事的吧？\n老師……"
13013-220 = "事到如今，\n已經無法回頭了。"
13013-230 = "知識解放戰線\n將會繼續前進！"
13013-240 = "總算是\n平靜下來了呢……\n大家都平安無事，\n真是太好了。"
13013-250 = "是，老師。\n你找我嗎？"
13013-260 = "愛瑠前輩，現在\n在做什麼呢……"
13013-270 = "希望沒有\n在什麼地方暴走……"
13013-280 = "不管是讀文章，\n還是欣賞圖畫，\n我都非常喜歡。"
13013-290 = "漫畫總是能\n教會我們很多事！"
13013-300 = "老，老師？\n那樣盯著我看……\n我會很不好意思……"
13013-310 = "在找什麼嗎，老師？\n請慢慢看哦。"
13013-320 = "我已經很習慣陳列\n和展示物品了。\n請交給我吧！"
13013-330 = "請看到滿意為止吧！"
13013-340 = "要是之後後悔\n就太可惜了不是嗎。"
13013-350 = "商店的管理，是嗎……？"
13013-360 = "不會，和圖書館的管理相比，\n這種事不算什麼。"
13013-370 = "如果這裡面夾雜著\n絕版書的初版的話……\n我……該怎麼辦才好……"
13013-380 = "啊！這，這絕對\n不是出於私心……！"
13013-390 = "啊，你選了那個呢。"
13013-400 = "請稍等……\n來，請收下！"
13013-410 = "這個時候固定要說的台詞是……"
13013-420 = "「哎呀～！眼光真不賴呢，\n　這位客人！」"
13013-430 = "「感謝您的多次惠顧！」"
13013-440 = "剛才那樣，很像老手是嗎？\n嘿嘿，耶嘿嘿……"
13013-450 = "歡迎光臨，老師！\n想要什麼呢？"
13013-460 = "要試手氣嗎！"
13013-470 = "我可以在旁邊看嗎？\n耶嘿嘿。"
13013-480 = "啊，有什麼\n比較有興趣的嗎？"
13013-490 = "是，老師？\n有什麼事嗎？"
13013-500 = "「在需要的時候\n為你帶來一點\n小小的幸運」……"
13013-510 = "我很想說一次看看，\n這種類型的台詞！"
13013-520 = "嗚哇，中大獎了！\n真厲害！不愧是老師！"
13013-530 = "老師的\n運氣很好呢……\n真帥氣，老師！"
13013-540 = "請讓我也看一下吧。"
13013-550 = "呣呣……這也是\n能用的東西唷！"
13013-560 = "嗚咦咦……"
13013-570 = "請，請不要太灰心，\n老師。還有我在！"

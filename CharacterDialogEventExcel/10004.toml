[translation]
10004-980 = "อ่า คุณครู ฉันมีหลายเรื่องเลยที่\nอยากให้ช่วยคลี่คลายให้หน่อย"
10004-990 = "พอจะช่วยหน่อยได้มั้ย?"
10004-1000 = "เข้ามาสิ คุณครู"
10004-1010 = "ฉันมีเรื่องอื่นนอกเหนือจากปาร์ตี้\nที่ต้องทำในฐานะคณะกรรมการวินัย"
10004-1020 = "งานเป็นสิ่งที่ต่อให้ทำ\nมากเท่าไรๆ ก็ไม่หมดสักทีน่ะ"
10004-1030 = "หืม? รู้สึกเหมือนกันเลยงั้นเหรอ?\nฮุฮุ คุณครูก็เหนื่อยเหมือนกันสินะ..."
10004-1040 = "ฉันไม่คิดจะวางมือจากงานหรอก"
10004-1050 = "ก็ฉันเป็นประธานกรรมการวินัย\nของเกเฮนน่านี่นะ"
10004-1060 = "อ่า ขอบคุณนะ"
10004-1070 = "นี่เป็นการตอบแทนที่ช่วยกัน\nช่วยรับไว้ด้วยนะ"
10004-1080 = "คุณครูทำได้สมบูรณ์แบบจริงๆ\nขอบคุณที่ทำให้วางใจได้นะ..."
10004-1090 = "นี่เป็นการตอบแทนที่ช่วย รับไปสิ"

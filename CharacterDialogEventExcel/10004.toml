[translation]
10004-980 = "啊，老師。正好有些事\n希望能請你解決。"
10004-990 = "可以請你幫個忙嗎？"
10004-1000 = "歡迎回來，老師。"
10004-1010 = "有些與派對無關，\n身為風紀委員該做的事。"
10004-1020 = "工作這種東西，總是\n怎麼做都做不完呢。"
10004-1030 = "嗯？真的打從心底有同感？\n呵呵，老師也很辛苦呢……"
10004-1040 = "我沒打算丟下工作哦。"
10004-1050 = "因為我，\n是格黑娜的風紀委員長。"
10004-1060 = "謝，謝謝你。"
10004-1070 = "這是幫忙的謝禮。收下吧。"
10004-1080 = "不愧是老師，真完美。\n託你的福，感覺能放心了……"
10004-1090 = "這是幫忙的謝禮。來。"

[translation]
10004-980 = "아, 선생님. 마침 해결해 줬으면\n하는 일이 쌓여 있어."
10004-990 = "좀 도와줄 수 있을까?"
10004-1000 = "어서 와. 선생님."
10004-1010 = "파티와는 별개로\n선도부로서 해야 할 일이 있어."
10004-1020 = "일이라는 건, 늘 해도해도\n끝나지 않는 법이네."
10004-1030 = "응? 정말, 진심으로 공감한다고?\n후훗, 선생님도 고생이구나…."
10004-1040 = "일에서 손을 뗄 생각은 없어."
10004-1050 = "나는, 게헨나의 선도부장이니까."
10004-1060 = "아, 고마워."
10004-1070 = "이건 도와준 답례. 받아줘."
10004-1080 = "역시 선생님. 완벽했어.\n덕분에 안심할 수 있을 것 같아…."
10004-1090 = "이건 도와준 답례야. 자."

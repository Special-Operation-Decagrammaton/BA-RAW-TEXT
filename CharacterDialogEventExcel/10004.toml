[translation]
10004-980 = "Ah, Sensei. There's a whole pile of tasks to be done. I was hoping you'd lend a hand."
10004-990 = "Would you mind helping me out a little bit?"
10004-1000 = "Welcome, Sensei."
10004-1010 = "The party aside, there's something else I must do as part of the Prefect Team."
10004-1020 = "Seems the work is never done, no matter how much you finish."
10004-1030 = "Hm? You feel that in your bones? Heehee. So you work a lot, as well..."
10004-1040 = "I have no plans to stop working."
10004-1050 = "I am Gehenna's head prefect, after all."
10004-1060 = "Ah, thank you."
10004-1070 = "This is a small gift for your help. Please, take it."
10004-1080 = "Perfect. As expected of you, Sensei. I think I can rest easy now..."
10004-1090 = "This is a small gift for your help. Here."

[translation]
10101-10 = "งานที่จะทำต่อไปก็..."
10101-20 = "อ๊ะ ครู\nมีงานอะไรให้ฉันช่วยมั้ย?"
10101-30 = "ชะ... เชิญค่ะ!\nมากี่ท่านคะ?"
10101-40 = "อ๊ะ... ครูเองสินะ\nขอโทษที ฉันทักทายแบบนี้\nจนติดเป็นนิสัยแล้วน่ะ"
10101-50 = "งานพาร์ทไทม์\nยังไม่เสร็จเลย"
10101-60 = "มาตั้งใจทำ\nจนกว่างานจะเสร็จกันเถอะ"
10101-70 = "งานเทศกาลจบลงแล้วสินะ\nสนุกหรือเปล่า ครู?"
10101-80 = "งานนี้ก็สำเร็จได้ด้วยดีสินะ"
10101-90 = "ต้องขอบคุณครูเลยนะ\nฉันติดหนี้บุญคุณแล้วละ"
10101-100 = "ทะเล... กว้างใหญ่ไม่มีที่สิ้นสุด\nแล้วก็มีน้ำทะเลเยอะจนน่าตกใจเลย"
10101-110 = "น่าประทับใจจัง"
10101-120 = "ถ้ามีเวลามากกว่านี้อีกหน่อย\nก็คงทำให้การแสดงบนเวที\nสมบูรณ์แบบกว่านี้ได้นะ..."
10101-130 = "ลมทะเลเย็นสบายดีจัง"
10101-140 = "เหมาะกับการเดินคลายร้อนเลย"
10101-150 = "ฉันจะทำให้เต็มที่ ให้เป็น\nงานเทศกาลที่สนุกเลยละ"
10101-160 = "ครู หวังว่าครูก็จะสนุก\nกับงานเทศกาลด้วยนะ"
10101-750 = "อ๊ะ ครู ขอโทษนะ\nแต่มาช่วยฉันหน่อยสิ"
10101-760 = "ฉันทำคนเดียวไม่ไหวน่ะ"
10101-770 = "นี่คือรายการภารกิจของวันนี้\nครู มาช่วยหน่อยได้มั้ย?"
10101-780 = "ฉันหาเลี้ยงตัวเอง\nด้วยงานพาร์ทไทม์น่ะ"
10101-790 = "ฉันต้องใส่ใจ\nรายละเอียดของงานสิ"
10101-800 = "คะ... ครู?\nมีธุระกับฉันเหรอ?"
10101-810 = "รอดมาได้เพราะครูเลยนะ\nครูจัดการงานไวจัง"
10101-820 = "เสร็จแล้วเหรอเนี่ย...?"
10101-830 = "รับสิ่งนี้ไว้...\nเป็นของตอบแทนสิ"

[translation]
10101-10 = "Next up..."
10101-20 = "Oh, Sensei. Is there anything I can do to help?"
10101-30 = "W-Welcome! How many in your party?"
10101-40 = "...Oh, it's you, Sensei. I'm sorry. The greeting just automatically pops out."
10101-50 = "My part-time job isn't over yet."
10101-60 = "Let's stay awake until the end."
10101-70 = "The festival is almost finished. Did you enjoy it, Sensei?"
10101-80 = "I safely finished this job too."
10101-90 = "It's all thanks to you, Sensei. I owe you one."
10101-100 = "The sea...is endlessly large. It's an amazing amount of water."
10101-110 = "It's admirable."
10101-120 = "If only I'd had more time, I could have completed everything for the performance..."
10101-130 = "The sea breeze is nice and cool."
10101-140 = "It's perfect for cooling myself."
10101-150 = "I'll do my best to make it a joyful festival."
10101-160 = "I hope that you enjoy it too, Sensei."
10101-750 = "Oh, Sensei. I'm sorry, but can you lend me a hand?"
10101-760 = "I could use some help."
10101-770 = "This is the work I need to do today. Would you help me with it, Sensei?"
10101-780 = "I earn a living through part-time jobs."
10101-790 = "The agenda must be properly managed."
10101-800 = "S-Sensei? Do you need something?"
10101-810 = "You saved me. You're a fast worker."
10101-820 = "Have you finished organizing it already...?"
10101-830 = "Please take this...as a token of appreciation."

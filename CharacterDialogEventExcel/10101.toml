[translation]
10101-10 = "接下來的工作是……"
10101-20 = "啊，老師，\n需要我幫你什麼忙嗎？"
10101-30 = "歡，歡迎光臨！\n請問幾位……！"
10101-40 = "……啊，原來是老師啊。\n抱歉，出於反射就……"
10101-50 = "打工還沒有結束。"
10101-60 = "直到最後，\n都繃緊神經吧。"
10101-70 = "慶典也進入尾盤了。\n玩得開心嗎？老師。"
10101-80 = "這次的工作，也順利落幕了呢。"
10101-90 = "這都多虧了老師。\n我欠你一份人情。"
10101-100 = "大海……\n寬闊得像沒有盡頭，\n水也多得令人訝異呢。"
10101-110 = "令人佩服。"
10101-120 = "要是能再多一些時間，\n就能讓表演的完成度\n更高了……"
10101-130 = "海風真涼爽。"
10101-140 = "正好適合將熱冷卻下來。"
10101-150 = "為了讓慶典變得更有趣，\n我會全力以赴。"
10101-160 = "老師也請\n好好享受慶典吧。"
10101-750 = "不好意思，老師，\n麻煩助我一臂之力吧。"
10101-760 = "我一個人實在忙不過來。"
10101-770 = "這是今天的工作清單。\n老師，能請你幫忙嗎？"
10101-780 = "我現在靠著打工\n來維持生計。"
10101-790 = "所以工作的案件，\n必須得認真管理才行。"
10101-800 = "老，老師？\n找我有什麼事嗎？"
10101-810 = "多虧有你才能得救。\n老師真能幹啊。"
10101-820 = "已經處理好了嗎……？"
10101-830 = "謝禮是這個……\n你就收下吧。"

[translation]
10101-10 = "다음에 할 일은……."
10101-20 = "아, 선생,\n혹시 도울 일이 있나?"
10101-30 = "어, 어서 오세요!\n몇 분이신가요!"
10101-40 = "…아, 선생이었군.\n미안하다. 인사가\n몸에 배어서 그만."
10101-50 = "아르바이트는\n아직 끝나지 않았다."
10101-60 = "끝까지,\n정신 차리고 가자."
10101-70 = "축제도 막바지로군.\n즐거웠나? 선생."
10101-80 = "이번 일도 무사히 끝마쳤군."
10101-90 = "선생 덕분이다.\n은혜를 입었어."
10101-100 = "바다는… 끝없이 넓고,\n놀라울 정도로 물이 많군."
10101-110 = "감탄했다."
10101-120 = "조금 더 시간이 있으면,\n무대의 완성도를\n높일 수 있었을 텐데…"
10101-130 = "바닷바람은 시원하군."
10101-140 = "땀을 식히기에 안성맞춤이다."
10101-150 = "즐거운 축제가 될 수\n있도록, 최선을 다하겠다."
10101-160 = "선생도 부디 축제를\n즐겨줬으면 한다."
10101-750 = "아, 선생, 미안하지만\n조금 도와줬으면 한다."
10101-760 = "나 혼자서는 조금 버겁군."
10101-770 = "오늘의 업무 목록이다.\n선생, 도와주겠나?"
10101-780 = "아르바이트로 생계를\n유지하고 있는 몸이다."
10101-790 = "업무의 안건은,\n확실히 관리해야만 하지."
10101-800 = "서, 선생?\n나한테 볼일이라도?"
10101-810 = "덕분에 살았다.\n선생은 일 처리가 빠르군."
10101-820 = "벌써 정리한 건가…?"
10101-830 = "답례로 이걸…\n받아주겠나."

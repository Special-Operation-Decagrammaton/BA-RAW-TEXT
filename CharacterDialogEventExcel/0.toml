[translation]
0-10 = "เชิญค่ะ คุณครู\nตอนนี้กำลังดำเนินการ\nพื้นที่เขตชิราโทริ\nของ D.U. ค่ะ"
0-20 = "ที่นี่คือเขตชิราโทริ\nของ D.U. ค่ะ "
0-30 = "ไม่ว่าที่ไหน\nสถานการณ์ก็คล้ายกันค่ะ\nต้องรีบฟื้นฟูที่นี่ให้ได้โดยเร็วแล้วค่ะ"
0-40 = "งานฟื้นฟูดำเนินไป\nอย่างราบรื่นดีค่ะ"
0-50 = "ถ้าเป็นแบบนี้ต่อไปละก็\nอีกไม่นานก็คงกลับไป\nเป็นเหมือนเดิมได้แล้วค่ะ"
0-60 = "งานฟื้นฟูดูเหมือน\nจะเสร็จเรียบร้อยแล้วค่ะ"
0-70 = "ขอบคุณสำหรับ\nความทุ่มเทของคุณครูนะคะ"
0-80 = "งานฟื้นฟูเขตชิราโทริ\nเสร็จเรียบร้อยแล้วค่ะ"
0-90 = "ถ้าคุณครูสะดวกละก็...\nจะไปตรวจสอบพื้นที่\nด้วยกันไหมคะ?"
0-100 = "เรียกฉันเหรอคะ คุณครู?\nไม่ทราบว่า...\nมีเรื่องอะไร...?"
0-110 = "ด้วยความช่วยเหลือ\nของนักเรียนหลายๆ คน\nเลยฟื้นฟูได้ราบรื่นดีค่ะ"
0-120 = "โชคดีที่ไปขอให้\nทางชาเล่ต์ช่วยค่ะ"
0-130 = "จากที่เห็น...\nตอนนี้สุขภาพ\nดีขึ้นแล้วสินะคะ"
0-140 = "ค่อยยังชั่ว...หน่อยค่ะ"
0-150 = "อาคารที่พังทลายลงมา\nเราสามารถสร้างขึ้นใหม่ได้"
0-160 = "แต่ว่าสุขภาพที่เสียไป\nจะเรียกคืนมาไม่ได้ค่ะ"
0-170 = "เพราะงั้น...\nอย่าฝืนตัวเองเกินไปนะคะ"
0-180 = "อ๊ะ คุณครู เชิญเลย"
0-190 = "วัสดุที่เหลือ เก็บคืนเรียบร้อย~"
0-200 = "(เคี้ยวขนม) ง่ำๆ ง่ำๆ"
0-210 = "หืม...? คุณครูนี่นา?"
0-220 = "ฮุฮุ หรือว่า...\nคุณครูก็โดดงานมาเหรอ?"
0-230 = "เฮ้อ งานฟื้นฟูเมืองนี่\nวุ่นวายจริงๆ เลย..."
0-240 = "ถ้าตรงอาคารของ D.U.\nมีร้านขนมอยู่ก็คงจะดีนะ"
0-250 = "ถ้าเป็นแบบนั้นก็จะกินมันฝรั่งทอด\nรสไข่ปลาได้ตลอด...!"
0-260 = "ตั้งแต่เกิดมา...\nเพิ่งจะเคยงานยุ่งขนาดนี้เลย"
0-270 = "แต่ก็นะ ฉันติดหนี้คุณครูอยู่ แล้วพอได้\nขยับตัวแบบนี้บ้าง มันก็ไม่ได้แย่อะไร"
0-280 = "อยากได้อันนั้นเหรอ?"
0-290 = "ได้สิ เอาไปได้เท่าที่ต้องการเลย"
0-300 = "อันนั้น...\nฉันก็เล็งอยู่เหมือนกันนะ~"
0-310 = "เอ้าๆ เอาไปซะสิ แล้วไว้มาอีกนะ~"
0-320 = "ถ้าต้องการอะไรละก็\nหยิบๆ เปลี่ยนเอาได้เลย~"
0-330 = "อ๊ะ แล้วก็อย่าลืมจดลง\nในรายการบัญชีด้วยล่ะ"
0-340 = "สะ... สวัสดีค่ะ คุณครู"
0-350 = "วันนี้ก็มาพยายามไปด้วยกันนะคะ"
0-360 = "ถ้างานฟื้นฟู... ดำเนินไป\nตามแผนก็คงดีนะคะ"
0-370 = "คุณครูอยู่ที่นี่ทั้งคน...\nฉันไม่มีเรื่องที่ต้องกังวลหรอกค่ะ"
0-380 = "วัสดุซ่อมแซม\nมันกระจัดกระจายไปหมดเลย..."
0-390 = "ตอนเดินๆ อยู่ คุณครูเองก็\nระมัดระวังด้วยนะคะ"
0-400 = "ช่วงนี้ดูเหมือนว่ารุ่นพี่ริน\nจะฝืนร่างกายตัวเองมากเกินไป..."
0-410 = "ฉันเลยกังวลนิดหน่อยน่ะค่ะ"
0-420 = "สะ... เสร็จแล้วเหรอคะ?\nสมกับเป็นคุณครูเลยค่ะ!"
0-430 = "ทำได้ดีมากเลยค่ะ คุณครู! ถึงมันจะ\nเป็นของเล็กๆ น้อยๆ แต่ก็เป็นของ\nตอบแทนจากองค์การนักเรียนค่ะ...!"
0-431 = "...เสร็จแล้วเหรอ?\nงั้นจะไปเอารายการต่อไปมาให้นะ"
0-440 = "เอ๋ มีปัญหา\nอะไรรึเปล่า? "
0-450 = "ถ้ามีเรื่องยุ่งยากอะไร\nก็มาปรึกษาฉันได้ตลอดเลยนะ"
0-460 = "ก็ฉันอยู่ที่นี่\nเพื่อช่วยเหลือคุณครูนี่นา"
0-470 = "ช่วยตั้งใจหน่อยได้หรือเปล่า?"
0-480 = "เดี๋ยวสิ... ฉันหมายถึงงาน\nไม่ใช่ตั้งใจมองฉัน"
0-490 = "ไม่ต้องมาคอยระวังกัน\nขนาดนั้นก็ได้"
0-500 = "...ฉันเองก็เจ็บเป็นเหมือนกันนะ"
0-510 = "เอ่อ...\nฉันไม่เป็นไรหรอก"
0-520 = "ช่วยตรวจสอบทางนั้น\nให้หน่อยสิ"
0-530 = "ก็บอกแล้วไง\nว่าฉันไม่เป็นไรน่ะ..."
0-540 = "สุ่มได้อันนั้นงั้นเหรอ...\nสุดยอดเลยนะ คุณครู"
0-550 = "อืม ก็ไม่เลวเลยนะ"
0-560 = "ดูใช้ได้เลยนะ?"
0-570 = "ยังมีเวลาอยู่\nลองดูใหม่ก็ได้"
0-580 = "เอ๋? มีปัญหาอะไรรึเปล่า? "
0-590 = "ถ้ามีเรื่องยุ่งยากอะไร\nก็มาปรึกษาฉันได้ตลอดเลยนะ"

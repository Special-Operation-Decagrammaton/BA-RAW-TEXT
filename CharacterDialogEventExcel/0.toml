[translation]
0-10 = "您好，老師。\n這裡正在進行\nD.U.白鳥區的\n修復作業。"
0-20 = "這裡是\nD.U.白鳥區。"
0-30 = "雖然各處的狀況都很類似，\n這區的修復也得\n加緊腳步才行呢。"
0-40 = "修復正順利\n進行著呢。"
0-50 = "照這個情況，\n很快就能恢復\n原來的街道了吧。"
0-60 = "修復作業也快\n進入尾聲了。"
0-70 = "非常感謝\n老師的盡力協助。"
0-80 = "白鳥區的\n修復作業\n已經完成。"
0-90 = "可以的話，\n要不要一起\n確認現場呢？"
0-100 = "您找我嗎，老師？\n那麼，有什麼事…？"
0-110 = "多虧許多學生們的合作，\n復興狀況很順利。"
0-120 = "拜託夏萊\n是正確的。"
0-130 = "…看您的樣子，\n身體似乎\n沒什麼問題呢。"
0-140 = "…終於能放心了。"
0-150 = "崩塌的建築物\n還能重新建造，"
0-160 = "但失去的健康\n就不會再回來了。"
0-170 = "請千萬，\n不要勉強自己。"
0-180 = "啊，老師。\n歡迎你來。"
0-190 = "剩下的材料會回收唷～"
0-200 = "（喀滋）嚼嚼…"
0-210 = "嗯？這不是老師嗎。"
0-220 = "呵呵，難道\n老師也在偷懶？"
0-230 = "唉。都市\n修復什麼的真麻煩…"
0-240 = "D.U.的建築要是\n全都是點心就好了。"
0-250 = "這樣就隨時能\n吃到明太子口味…！"
0-260 = "這麼忙碌\n還是生平第一次呢…"
0-270 = "但是，畢竟曾經受人照顧，\n偶爾讓身體活動一下也不錯。"
0-280 = "需要那個嗎？"
0-290 = "可以唷～\n想拿就拿走吧。"
0-300 = "那個東西，我也\n挺喜歡的呢～"
0-310 = "好的好的。\n可以拿走了唷。\n下次再來～"
0-320 = "如果有需要的東西，\n就自己兌換吧～"
0-330 = "啊，要記得\n寫在帳簿上唷。"
0-340 = "您，您好，老師。"
0-350 = "今天也一起加油吧…"
0-360 = "修復作業，能依照\n計畫進行就好了呢。"
0-370 = "既然有老師在，\n就不需要擔心了。"
0-380 = "使用中的材料到處都是…"
0-390 = "請老師也要\n小心腳步。"
0-400 = "最近琳前輩\n似乎特別\n勉強自己……"
0-410 = "讓我有點擔心。"
0-420 = "已，已經結束了嗎？\n不愧是您，老師！"
0-430 = "辛苦您了，老師！\n雖然微不足道，\n這是聯邦學生會的謝禮…！"
0-431 = "……已經結束了嗎？\n那我把下份清單拿過來。"
0-440 = "哎呀，發生什麼事了嗎？"
0-450 = "如果有什麼煩惱的話，\n無論什麼事都來找我商量吧。"
0-460 = "畢竟我是為了輔佐老師\n才會在這裡的。"
0-470 = "能請你稍微專心一點嗎？"
0-480 = "不，不是專心看我，\n是專心工作……"
0-490 = "請不要那麼警戒我。"
0-500 = "……我也是會受傷的哦？"
0-510 = "那個…\n不用在意我的事了，"
0-520 = "請去那邊確認一下吧。"
0-530 = "都說了\n不用在意我的事了……"
0-540 = "竟然真的抽到了…\n真厲害呢，老師。"
0-550 = "還不錯呢。"
0-560 = "我覺得很好。"
0-570 = "事情還沒結束。\n繼續加油吧。"
0-580 = "哎呀，發生什麼事了嗎？"
0-590 = "如果有什麼煩惱的話，\n無論什麼事都來找我商量吧。"
0-600 = "畢竟我是為了輔佐老師\n才會在這裡的。"
0-610 = "能請你稍微專心一點嗎？"
0-620 = "不，不是專心看我，\n是專心工作……"
0-630 = "請不要那麼警戒我。"
0-640 = "……我也是會受傷的哦？"
0-650 = "那個…\n不用在意我的事了，"
0-660 = "請去那邊確認一下吧。"
0-670 = "都說了\n不用在意我的事了……"
0-680 = "是，辛苦你了，老師。"
0-690 = "這樣就解決了呢，謝謝你。"
0-700 = "今天的工作這樣就全部結束了。\n辛苦了，老師。"
0-710 = "哎呀，發生什麼事了嗎？"
0-720 = "如果有什麼煩惱的話，\n無論什麼事都來找我商量吧。"
0-730 = "畢竟我是為了輔佐老師\n才會在這裡的。"
0-740 = "能請你稍微專心一點嗎？"
0-750 = "不，不是專心看我，\n是專心工作……"
0-760 = "請不要那麼警戒我。"
0-770 = "……我也是會受傷的哦？"
0-780 = "那個……\n不用在意我的事了，"
0-790 = "請去那邊確認一下吧。"
0-800 = "都說了\n不用在意我的事了……"
0-810 = "是個好兆頭呢，\n感覺不錯。"
0-820 = "很順利呢，\n繼續進行吧。"
0-830 = "這……出乎意料啊。"
0-840 = "……原來這裡\n藏著這種東西。"
0-850 = "來，開始\n下一個任務吧。"

0-680 = "อื้ม ขอบคุณมากนะคุณครู"
0-690 = "เรื่องนี้ก็จัดการเสร็จแล้ว\nขอบคุณนะ"
0-700 = "เท่านี้ งานวันนี้ก็เสร็จแล้วละ\nขอบคุณมากนะ คุณครู"

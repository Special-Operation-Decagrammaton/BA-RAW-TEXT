[translation]
0-10 = "어서 오십시오, 선생님.\n이곳에서 D.U.의\n시라토리구 복구 작업을\n진행하고 있습니다."
0-20 = "여기는 D.U.의\n시라토리구입니다."
0-30 = "어느 곳이나 상황은\n비슷합니다만, 이곳 역시\n복구를 서둘러야겠군요."
0-40 = "복구는 순조롭게\n진행되고 있네요."
0-50 = "이대로라면,\n곧 원래 거리 모습으로\n돌아오겠지요."
0-60 = "복구 작업도\n끝이 보이네요."
0-70 = "선생님의 노고에\n감사드립니다."
0-80 = "시라토리구의\n복구 작업은\n완료되었습니다."
0-90 = "괜찮으시다면,\n함께 현장을\n확인해보시겠습니까?"
0-100 = "부르셨습니까, 선생님?\n그래서, 어떤\n용건으로…?"
0-110 = "많은 학생의 협력\n덕택에, 복구는\n순조롭군요."
0-120 = "샬레에\n부탁하길 잘했어요."
0-130 = "…그 모습을 보아하니,\n건강은 이제 괜찮으신가\n보군요."
0-140 = "…안심, 했습니다."
0-150 = "부서진 건물은\n다시 지을 수 있지만,"
0-160 = "잃어버린 건강은\n돌아오지 않으니까요."
0-170 = "결코,\n무리하지 마시길."
0-180 = "아, 선생. 어서 와."
0-190 = "남은 자재, 회수할게~"
0-200 = "(와작) 우물우물…"
0-210 = "응? 선생이잖아?"
0-220 = "후후, 혹시\n선생도 땡땡이?"
0-230 = "하아. 도시\n복구라니, 귀찮아…"
0-240 = "D.U.의 건물이 모두\n과자집이라면 좋을 텐데."
0-250 = "그렇다면 언제라도 명란 맛을…!"
0-260 = "이렇게 바쁜 건\n태어나서 처음이야…."
0-270 = "그래도 뭐, 신세진 것도 있고,\n가끔은 몸을 움직이는 것도\n나쁘지 않으니까."
0-280 = "그게 필요해?"
0-290 = "좋아. 필요한만큼 가져가."
0-300 = "그거, 나도 눈여겨\n보던 건데~."
0-310 = "자, 자.\n가져가도 좋아.\n다음에 또 와~."
0-320 = "필요한 게 있으면,\n알아서 바꿔 가~."
0-330 = "아, 장부에 적는 건\n잊지 말고."
0-340 = "아, 안녕하세요. 선생님."
0-350 = "오늘도 서로, 힘내요…."
0-360 = "복구 작업, 계획대로\n진행되면 좋겠네요."
0-370 = "선생님이 계시니까,\n걱정할 건 없지만요."
0-380 = "작업 자재가 여기저기에…."
0-390 = "선생님도 발밑을\n조심하세요."
0-400 = "요즘 린 선배는,\n특히 무리하고 있는\n것 같아서…."
0-410 = "조금 걱정이네요."
0-420 = "버, 벌써 끝내셨나요?\n역시 선생님이세요!"
0-430 = "수고하셨습니다, 선생님!\n사소한 것이지만,\n총학생회가 드리는 답례입니다…!"
0-431 = "…끝났어? 그럼 다음\n리스트를 가져올게."
0-440 = "어라, 뭔가\n문제라도 있어? "
0-450 = "곤란한 일이 있으면\n무엇이든 상담해 줘."
0-460 = "나는 선생님 보좌로\n여기 있는 거니까."
0-470 = "조금만 집중해주겠어?"
0-480 = "아니, 내가 아니라 일에…."
0-490 = "너무 그렇게\n경계하진 말아줘."
0-500 = "…나도 상처받는다고?"
0-510 = "저기… 나는 괜찮으니까,"
0-520 = "저쪽을 확인해야지."
0-530 = "그러니까\n나는 괜찮으니까…."
0-540 = "설마 그걸 뽑다니…\n대단하네, 선생님."
0-550 = "나쁘지 않아."
0-560 = "괜찮은 것 같은데?"
0-570 = "아직 남아있어.\n계속 가보자고."
0-580 = "어라, 뭔가 문제라도 있어? "
0-590 = "곤란한 일이 있으면\n무엇이든 상담해 줘."
0-600 = "나는 선생님 보좌로\n여기 있는 거니까."
0-610 = "조금만 집중해주겠어?"
0-620 = "아니, 내가 아니라 일에…."
0-630 = "너무 그렇게 경계하진 말아줘."
0-640 = "…나도 상처받는다고?"
0-650 = "저기… 나는 괜찮으니까,"
0-660 = "저쪽을 확인해야지."
0-670 = "그러니까 나는 괜찮으니까…."
0-680 = "응. 수고했어. 선생님."
0-690 = "이것도 해결이네. 고마워."
0-700 = "오늘의 일은 이걸로 정리된 것 같네.\n수고 많았어, 선생님."
0-710 = "어라, 뭔가\n문제라도 있어? "
0-720 = "곤란한 일이 있으면\n무엇이든 상담해 줘."
0-730 = "나는 선생님 보좌로\n여기 있는 거니까."
0-740 = "조금만 집중해주겠어?"
0-750 = "아니,\n내가 아니라 일에…."
0-760 = "너무 그렇게\n경계하진 말아줘."
0-770 = "…나도 상처받는다고?"
0-780 = "저기…\n나는 괜찮으니까,"
0-790 = "저쪽을 확인해야지."
0-800 = "그러니까\n나는 괜찮으니까…."
0-810 = "좋은 징조인걸.\n나쁘지 않아."
0-820 = "순조롭네.\n계속 확인해보자."
0-830 = "이건… 생각 외인걸."
0-840 = "…여기에 이런\n물건이 숨어있었구나."
0-850 = "자, 다음 임무를\n계속하자."

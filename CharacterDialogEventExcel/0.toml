0-810 = "คงเป็นลางดีสินะ\nก็ไม่ได้แย่เท่าไร"
0-820 = "ราบรื่นดีจริงๆ\nมาตรวจสอบกันต่อเถอะ"
0-830 = "นี่มัน... นึกไม่ถึงเลยนะ"
0-840 = "คุณครูชอบซ่อนของแบบนี้\nเอาไว้ที่นี่เองสินะ"
0-850 = "เอาละ\nมาทำงานต่อไปกันเถอะ"

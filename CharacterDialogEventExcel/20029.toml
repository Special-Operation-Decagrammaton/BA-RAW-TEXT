[translation]
20029-330 = "啊，歡迎回來，老師。"
20029-340 = "這裡是海之家唷。\n我們很努力地做了準備！"
20029-350 = "恭候您的光臨。\n老師。"
20029-360 = "呵呵。\n幫忙節慶營運管理部\n的各位也很開心呢。"
20029-370 = "老師？\n您叫我嗎？"
20029-380 = "隨時都可以叫我哦。"
20029-390 = "還挺熱的呢……\n請小心不要中暑，\n老師。"
20029-400 = "……萬一有緊急情況，\n我會照顧你的。"
20029-410 = "靜子醬……沒問題嗎？\n有點擔心。"
20029-420 = "要解決事件……\n感覺雖然有點困難，"
20029-430 = "不過只要大家合作，\n一定沒問題的吧。"
20029-440 = "現在或許就是展現\n修行成果的時候呢。"
20029-650 = "啊，歡迎回來，老師。"
20029-660 = "這裡是海之家唷。\n我們很努力地做了準備！"
20029-670 = "恭候您的光臨。\n老師。"
20029-680 = "呵呵。\n幫忙節慶營運管理部\n的各位也很開心呢。"
20029-690 = "渡假勝地狩獵…\n事情變得一發\n不可收拾了呢…"
20029-700 = "不，越是這種時候，\n越要打起精神。"
20029-710 = "要說從一開始\n就不擔心的話，\n那是騙人的……"
20029-720 = "這一切，都是\n多虧有老師在。"
20029-730 = "夏日大海的回憶……\n真是美妙的詞彙呢。"
20029-740 = "特別是今年，\n我的感受尤其強烈。"
20029-750 = "老師？\n您叫我嗎？"
20029-760 = "請隨時呼喚我哦。"
20029-770 = "還挺熱的呢……\n請小心不要中暑，\n老師。"
20029-780 = "…萬一有什麼緊急情況，\n我會照顧你的。"
20029-790 = "靜子醬…還好嗎？\n有點擔心。"
20029-800 = "要解決事件…\n感覺雖然有點困難，"
20029-810 = "但只要大家合作，\n一定沒問題的吧。"
20029-820 = "現在或許就是展現\n修行成果的時候呢。"

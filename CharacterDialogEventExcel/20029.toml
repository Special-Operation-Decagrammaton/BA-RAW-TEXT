[translation]
20029-330 = "아, 어서 오세요. 선생님."
20029-340 = "바다의 집이랍니다.\n열심히 준비했어요."
20029-350 = "기다리고 있었어요. 선생님."
20029-360 = "후후. 마츠리운영관리부\n여러분을 돕는 것도\n보람찬 일이네요."
20029-370 = "선생님? 부르셨나요?"
20029-380 = "언제든지 말씀해 주세요."
20029-390 = "꽤 덥네요…\n열사병 조심하세요,\n선생님."
20029-400 = "여차하면 제가\n돌봐 드릴게요."
20029-410 = "시즈코 쨩… 괜찮을까요? \n조금, 걱정이 되네요."
20029-420 = "사건을 해결하는 것은…\n어려울 것 같기도 하지만,"
20029-430 = "모두와 협력하면,\n분명 괜찮겠죠."
20029-440 = "지금이야말로\n수행의 성과를 보여줄 때,\n일지도 모르겠네요."
20029-650 = "아, 어서 오세요. 선생님."
20029-660 = "바다의 집이랍니다.\n열심히 준비했어요."
20029-670 = "기다리고 있었어요. 선생님."
20029-680 = "후후. 마츠리운영관리부\n여러분을 돕는 것도\n보람찬 일이네요."
20029-690 = "리조트 사냥…\n엄청난 일이\n되어 가고 있네요…"
20029-700 = "아뇨. 이럴 때일수록\n마음을 다잡아야겠지요."
20029-710 = "처음에는,\n불안하지 않았다면\n거짓말이었겠지만…"
20029-720 = "이것도 다, 선생님이\n있어주신 덕분이네요."
20029-730 = "여름 바다의\n추억이라는 건…\n멋진 단어네요."
20029-740 = "이번은 특별히,\n더 그랬던 것 같아요."
20029-750 = "선생님? 부르셨나요?"
20029-760 = "언제든지 말씀해 주세요."
20029-770 = "꽤 덥네요…\n열사병 조심하세요,\n선생님."
20029-780 = "여차하면 제가\n돌봐 드릴게요."
20029-790 = "시즈코 쨩… 괜찮을까요? \n조금, 걱정이 되네요."
20029-800 = "사건을 해결하는 것은…\n어려울 것 같기도 하지만,"
20029-810 = "모두와 협력하면,\n분명 괜찮겠죠."
20029-820 = "지금이야말로\n수행의 성과를 보여줄 때,\n일지도 모르겠네요."

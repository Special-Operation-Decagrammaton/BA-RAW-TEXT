[translation]
20029-330 = "ชะ...เชิญเลยค่ะคุณครู"
20029-340 = "ร้านสาขาริมทะเลค่ะ\nเรากำลังเตรียมตัวกัน"
20029-350 = "อย่างเต็มที่เลยค่ะ คุณครู"
20029-360 = "ฮุฮุ พอได้มาช่วย\nชมรมจัดงานเทศกาลแบบนี้\nฉันภูมิใจมากเลยละค่ะ"
20029-370 = "คุณครู? เรียกฉันเหรอคะ?"
20029-380 = "มีอะไรก็บอกฉันได้ตลอดเลยนะคะ"
20029-390 = "ร้อนสุดๆ ไปเลยนะคะ...\nระวังโรคลมแดดด้วยนะคะ\nคุณครู"
20029-400 = "แต่ถ้าเกิดเรื่องฉุกเฉินขึ้นมา\nฉันจะดูแลให้เองค่ะ"
20029-410 = "ชิซุโกะจัง... จะไม่เป็นอะไร\nแน่ใช่มั้ยคะ?\nรู้สึกเป็นห่วงจังเลยค่ะ"
20029-420 = "การคลี่คลายสถานการณ์...\nดูเหมือนจะเป็นเรื่องยากก็จริง"
20029-430 = "แต่ถ้าทุกคนร่วมมือกันละก็\nจะต้องผ่านไปได้ด้วยดีแน่นอนค่ะ"
20029-440 = "ตอนนี้อาจจะเป็นเวลา\nที่จะแสดงผลลัพธ์\nของการฝึกฝนก็ได้นะคะ"
20029-650 = "ชะ...เชิญเลยค่ะคุณครู"
20029-660 = "ร้านสาขาริมทะเลค่ะ\nเรากำลังเตรียมตัวกัน\nอย่างเต็มที่เลยค่ะ"
20029-670 = "ฉันกำลังรออยู่เลยค่ะ คุณครู"
20029-680 = "ฮุฮุ พอได้มาช่วย\nชมรมจัดงานเทศกาลแบบนี้\nฉันภูมิใจมากเลยละค่ะ"
20029-690 = "ล่ารีสอร์ต...\nเกิดเรื่องใหญ่โต\nขึ้นแล้วสินะคะ..."
20029-700 = "ไม่หรอกค่ะ ในเวลาแบบนี้\nจะต้องเตรียมใจไว้ให้ดีค่ะ"
20029-710 = "ถ้าบอกว่าตอนแรก\nฉันไม่รู้สึกกังวลเลย\nก็คงจะเป็นการพูดโกหก..."
20029-720 = "แต่ที่คลายกังวลได้\nก็เพราะมีคุณครูอยู่ด้วยไงล่ะคะ"
20029-730 = "คำพูดที่ว่า...\n\"ความทรงจำในฤดูร้อน\"\nเป็นคำที่วิเศษจริงๆ เลยนะคะ"
20029-740 = "และครั้งนี้ก็เหมือนว่า\nจะยิ่งพิเศษมากกว่าเดิมเลยค่ะ"
20029-750 = "คุณครู? เรียกฉันเหรอคะ?"
20029-760 = "มีอะไรก็บอกฉันได้ตลอดเลยนะคะ"
20029-770 = "ร้อนสุดๆ ไปเลยนะคะ...\nระวังโรคลมแดดด้วยนะคะ\nคุณครู"
20029-780 = "แต่ถ้าเกิดฉุกเฉินขึ้นมา\nฉันจะดูแลให้เองค่ะ"
20029-790 = "ชิซุโกะจัง... จะไม่เป็นอะไร\nแน่ใช่มั้ยคะ?\nรู้สึกเป็นห่วงจังเลยค่ะ"
20029-800 = "สถานการณ์ดูเหมือนจะ\nคลี่คลายยากก็จริง..."
20029-810 = "แต่ถ้าทุกคนร่วมมือกันละก็\nจะต้องผ่านไปได้ด้วยดีแน่นอนค่ะ"
20029-820 = "ตอนนี้อาจจะเป็นเวลา\nที่จะแสดงผลลัพธ์\nของการฝึกฝนก็ได้นะคะ"

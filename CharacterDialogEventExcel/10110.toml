[translation]
10110-10 = "어서 오세요, 선생님."
10110-20 = "바빠 보이시네요."
10110-30 = "아, 선생님이시군요."
10110-40 = "마침 잘 오셨어요."
10110-50 = "슬슬 진척도가……"
10110-60 = "아, 아무것도\n아니에요."
10110-70 = "거의 다 끝났군요."
10110-80 = "……나중에 말씀\n드리겠습니다."
10110-90 = "많은 일들이 있었네요."
10110-100 = "도와주셔서 감사합니다."
10110-110 = "절 부르셨나요?"
10110-120 = "무슨 일이시죠?"
10110-130 = "저는 어디 가지\n않는답니다."
10110-140 = "가끔은 이런 것도\n즐겁네요."
10110-150 = "트리니티 밖이라서\n그런 걸까요?"
10110-160 = "간지러워요……"
10110-170 = "그렇지만,\n싫은 건 아니네요."
10110-660 = "이것저것 준비해 보았어요."
10110-670 = "둘러보세요."
10110-680 = "필요하신 게 있으실까요?"
10110-690 = "우선 말씀해 보세요."
10110-700 = "혹시 모르니,"
10110-710 = "한 번 더 살펴보세요.\n선생님."
10110-720 = "…저를?"
10110-730 = "후후, 저는\n판매하고 있지 않아요."
10110-740 = "재미있네요."
10110-750 = "이제는 제가\n찌를 차례일까요?"
10110-760 = "그것도 좋지요."
10110-770 = "나쁘지 않은 선택이에요."
10110-780 = "아, 그게 필요하셨군요."
10110-790 = "네. 여기 있답니다."
10110-900 = "꼼꼼히 확인하고 가세요."
10110-910 = "선생님이 오실 줄"
10110-920 = "알고 있었습니다.\n후후, 감이라는 것이지요."
10110-930 = "……선생님이라는 존재에\n대해, 해석이 달라지게\n하지 말아주세요."
10110-940 = "…후후,\n여전하시군요, 선생님."
10110-950 = "고생하셨습니다."
10110-960 = "훌륭하시네요."

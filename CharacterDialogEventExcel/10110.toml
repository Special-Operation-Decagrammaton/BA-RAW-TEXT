[translation]
10110-10 = "你好，老師。"
10110-20 = "今天似乎也很忙碌呢。"
10110-30 = "啊啊，原來是老師啊。"
10110-40 = "恭候多時囉。"
10110-50 = "差不多該有進展了……"
10110-60 = "沒，沒事。沒什麼。"
10110-70 = "終於到最終階段了嗎。"
10110-80 = "……詳情之後\n會向你報告的。"
10110-90 = "發生了各式各樣的事呢。"
10110-100 = "感謝你的協助。"
10110-110 = "你叫我嗎？"
10110-120 = "發生了什麼事嗎？"
10110-130 = "我哪裡都不會去的哦？"
10110-140 = "偶爾這樣也挺快樂的呢。"
10110-150 = "是因為在三一之外嗎？"
10110-160 = "這樣很癢……"
10110-170 = "但我並沒有\n不喜歡的意思。"
10110-660 = "我試著做了各種準備。"
10110-670 = "請儘管看吧。"
10110-680 = "有需要什麼嗎？"
10110-690 = "請儘管開口。"
10110-700 = "保險起見，"
10110-710 = "請再確認一次\n是否有漏買的東西吧，老師。"
10110-720 = "……要我？"
10110-730 = "呵呵。我並沒有賣哦。"
10110-740 = "真有趣呢。"
10110-750 = "接下來該輪到我戳戳了嗎？"
10110-760 = "那也不錯呢。"
10110-770 = "是個不錯的選擇呢。"
10110-780 = "啊啊，原來你在找那個啊。"
10110-790 = "來，在這裡。"
10110-900 = "請仔細確認。"
10110-910 = "我始終覺得老師會過來。"
10110-920 = "呵呵，有點類似直覺吧。"
10110-930 = "請不要改變我對\n老師的解釋……"
10110-940 = "……呵呵，你還是\n一如既往呢，老師。"
10110-950 = "辛苦你了。"
10110-960 = "做得漂亮。"

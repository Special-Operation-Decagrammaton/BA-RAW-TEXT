[translation]
10110-10 = "เชิญค่ะ คุณครู"
10110-20 = "ดูงานยุ่งจังเลยนะคะ"
10110-30 = "อ๊ะ คุณครูเองเหรอคะ"
10110-40 = "มาได้จังหวะพอดีเลยค่ะ"
10110-50 = "พอดีว่าความคืบหน้ามัน..."
10110-60 = "มะ... ไม่มีอะไร\nหรอกค่ะ"
10110-70 = "เกือบเสร็จแล้วสินะคะ"
10110-80 = "ไว้ฉันจะมาบอก\nทีหลังนะคะ..."
10110-90 = "เกิดเรื่องขึ้นเยอะเลยนะคะ"
10110-100 = "ขอบคุณที่ช่วยนะคะ"
10110-110 = "เรียกหาฉันเหรอคะ?"
10110-120 = "มีเรื่องอะไรหรือเปล่าคะ?"
10110-130 = "ฉันไม่ได้จะไปไหน\nหรอกนะคะ"
10110-140 = "บางครั้งการทำแบบนี้\nก็สนุกเหมือนกันนะคะ"
10110-150 = "เป็นเพราะว่าอยู่นอกทรีนิตี้\nหรือเปล่านะคะ?"
10110-160 = "จั๊กจี้ค่ะ..."
10110-170 = "แต่ว่า ใช่ว่าฉัน\nจะไม่ชอบหรอกนะคะ"
10110-660 = "ฉันเตรียมนู่นเตรียมนี่\nไว้ให้แล้วค่ะ"
10110-670 = "ลองเดินดูรอบๆ สิคะ"
10110-680 = "มีอะไรที่ต้องการหรือเปล่าคะ?"
10110-690 = "บอกฉันมาก่อนได้เลยค่ะ"
10110-700 = "ลองดูเผื่อๆ "
10110-710 = "อีกสักรอบก็ดีนะคะ\nคุณครู"
10110-720 = "ฉันน่ะเหรอ...?"
10110-730 = "ฮุฮุ ฉันน่ะ\nไม่มีขายหรอกค่ะ"
10110-740 = "สนุกจังเลยนะคะ"
10110-750 = "ต่อไปเป็นตาฉัน\nจิ้มบ้างใช่มั้ยคะ?"
10110-760 = "นั่นก็ดีเลยนะคะ"
10110-770 = "เลือกได้ไม่เลวเลยค่ะ"
10110-780 = "อ๊ะ อยากได้อันนั้นสินะคะ"
10110-790 = "ค่ะ อยู่นี่ค่ะ"
10110-900 = "ตรวจสอบให้รอบคอบก่อนไปนะคะ"
10110-910 = "ฉันรู้อยู่แล้วค่ะ"
10110-920 = "ว่าคุณครูจะมา\nฮุฮุ ฉันลางสังหรณ์ดีน่ะค่ะ"
10110-930 = "อย่าทำให้ฉันตีความตัวตน\nของคุณครูผิดแปลกไปสิคะ"
10110-940 = "ฮุฮุ...\nคุณครูยังเหมือนเดิมเลยนะคะ"
10110-950 = "ทำได้ดีมากค่ะ"
10110-960 = "ยอดเยี่ยมเลยค่ะ"

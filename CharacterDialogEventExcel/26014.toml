[translation]
26014-510 = "อ้อ สวัสดี คุณครู"
26014-520 = "ปกติฉันไม่ได้ทักแบบนี้\nก็เลยไม่ค่อยคุ้นน่ะ..."
26014-530 = "ต้องทักทาย\nให้น่ารักขึ้น..."
26014-540 = "มะ... เมื่อกี้\nฉันพูดคนเดียวน่ะ!"
26014-550 = "เป็นงานที่หัวหมุน\nมากกว่าที่คิดอีกนะ..."
26014-560 = "ทำต่ออีกนิด\nก็เสร็จแล้วละ\nสู้เค้านะคุณครู"
26014-570 = "งานจบแล้วเหรอเนี่ย"
26014-580 = "รู้สึก... เสียดาย\nแปลกๆ นะ"
26014-590 = "หะ... หืม?\nทะ... ทำไมเหรอ?\nมีอะไรจะสั่งให้ทำเหรอ?"
26014-600 = "นะ... นี่คือ\nชุดนักเรียนธรรมดา\nของมิลเลเนียมไง...?"
26014-610 = "หรือมีส่วนไหน\nที่แปลกงั้นเหรอ?"
26014-620 = "เอ่อ... คุณครู"
26014-630 = "ไหนๆ ฉันก็ใส่ชุดนี้แล้ว"
26014-640 = "เราไป..."
26014-650 = "มะ... ไม่ดีกว่า...\nไม่มีอะไรทั้งนั้น\nขอโทษนะ"

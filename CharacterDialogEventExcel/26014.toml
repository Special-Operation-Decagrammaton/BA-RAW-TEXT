[translation]
26014-510 = "辛，辛苦了，老師。"
26014-520 = "……實在說不習慣呢。"
26014-530 = "應該用更可愛的\n打招呼方式……"
26014-540 = "……剛，剛才那只是\n我在自言自語而已！"
26014-550 = "真的是……\n讓人無法放鬆。"
26014-560 = "就剩一點了，老師。\n一起加油吧。"
26014-570 = "已經結束了啊。"
26014-580 = "結束之後反而……\n有種意猶未盡的感覺。"
26014-590 = "怎，怎麼了？\n有委託嗎？"
26014-600 = "這，這是千年\n指定的制服啊……？"
26014-610 = "有哪裡怪怪的嗎？"
26014-620 = "那個……老師。"
26014-630 = "難得穿上制服，\n不如……"
26014-640 = "跟我一起……"
26014-650 = "……果，果然\n還是算了。\n別放在心上。"

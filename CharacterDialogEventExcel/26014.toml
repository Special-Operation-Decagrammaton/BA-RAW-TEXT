[translation]
26014-510 = "아, 안녕. 선생님."
26014-520 = "……늘 하던 인사와\n달라서 어색하네."
26014-530 = "조금 더\n귀여운 인사를……"
26014-540 = "지, 지금 건\n혼잣말이야!"
26014-550 = "생각보다\n정신없는 행사네……"
26014-560 = "조금만\n더 하면 끝이야.\n힘내자고, 선생님."
26014-570 = "벌써 끝이라니."
26014-580 = "뭔가…… 서운한\n기분이네."
26014-590 = "으, 으응?\n왜, 왜 그러지?\n시킬 일이라도 있어?"
26014-600 = "이, 이것은 밀레니엄\n지정의 단순한\n교복이다만…?"
26014-610 = "뭔가 이상한\n부분이라도 있는 건가?"
26014-620 = "그…… 선생님."
26014-630 = "이왕 이런 차림이니,"
26014-640 = "같이……"
26014-650 = "……아, 아냐.\n역시 아무것도 아니다.\n미안."

[translation]
10051-10 = "자, 다함께 최고의\n<황륜대제>를 위해\n힘을 모으는 거야!"
10051-20 = "이런 재미있어 보이는…"
10051-30 = "아니, 밀레니엄의\n명예가 걸린 일이라면"
10051-40 = "우리 엔지니어부가\n당연히 도와야지."
10051-50 = "응원은 아직\n익숙하지 않지만…"
10051-60 = "어쩔 수 없지.\n최선을 다할게."
10051-70 = "한번 받은 의뢰는\n끝까지 수행하는 게"
10051-80 = "우리 엔지니어부의\n모토니까!"
10051-90 = "그러고보니 세미나의\n깐깐한 회계가…\n모습이 보이질 않네."
10051-100 = "어디 아픈 게\n아니였으면 좋겠는데."
10051-110 = "(모두가 평온하게 축제를\n즐길 수 있었으면\n좋겠는데…)"
10051-120 = "평소에 움직이는 일이\n적다고는 하지만"
10051-130 = "코토리와 히비키의 체력이\n이렇게까지 떨어졌다니…"
10051-140 = "축제가 끝난 뒤에\n엔지니어부 부실에"
10051-150 = "체력 단련 로봇이라도\n만들어 놓을까?"
10051-160 = "평소에 움직이는 일이\n적다고는 하지만"
10051-170 = "코토리와 히비키의 체력이\n이렇게까지 떨어졌다니…"
10051-180 = "축제가 끝난 뒤에\n엔지니어부 부실에"
10051-190 = "체력 단련 로봇이라도\n만들어 놓을까?"

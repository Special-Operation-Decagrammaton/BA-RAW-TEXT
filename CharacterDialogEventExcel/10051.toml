[translation]
10051-10 = "來，為了一同成就\n最棒的「晄輪大祭」，\n集合彼此的力量吧！"
10051-20 = "多麼有趣啊…"
10051-30 = "畢竟這關係到\n千年的名譽。"
10051-40 = "我們工程師部\n幫忙也是當然的。"
10051-50 = "雖然我\n還不習慣應援…"
10051-60 = "但沒辦法了，\n我會全力以赴的。"
10051-70 = "一旦接到委託，\n就要做到最後。"
10051-80 = "這是我們\n工程師部的\n座右銘！"
10051-90 = "這麼說來，\n研討會的可靠會計…\n沒見到他的身影呢。"
10051-100 = "希望不是因為\n身體不舒服。"
10051-110 = "（希望大家都能\n　平安地享受慶典…）"
10051-120 = "雖然說平時\n就很少運動，"
10051-130 = "但亞都梨和響的體力\n居然會下降成這樣…"
10051-140 = "等慶典結束後，要不要\n在工程師部的部室裡"
10051-150 = "做個輔助健身的\n機器人擺著呢？"
10051-160 = "雖然說平時\n就很少運動，"
10051-170 = "但亞都梨和響的體力\n居然會下降成這樣…"
10051-180 = "等慶典結束後，要不要\n在工程師部的部室裡"
10051-190 = "做個輔助健身的\n機器人擺著呢？"

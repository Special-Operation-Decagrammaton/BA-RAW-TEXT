[translation]
10051-10 = "เอาละ มารวมพลัง\nเพื่อ <ฮาโลเฟสติวัล>\nที่ยอดเยี่ยมกันเลย!"
10051-20 = "แบบนี้จะน่าสนุกมั้ยนะ..."
10051-30 = "ไม่สิ ถ้าเป็นเรื่องเกียรติยศ\nของมิลเลเนียมแล้วละก็"
10051-40 = "ชมรมวิศวกรรมของเรา\nก็ต้องไปช่วยอยู่แล้ว"
10051-50 = "ฉันยังไม่ชิน\nกับการเชียร์เลย..."
10051-60 = "แต่ก็ช่วยไม่ได้\nจะทำให้ดีที่สุดแล้วกัน"
10051-70 = "ชมรมวิศวกรรม\nมีคติพจน์ว่า"
10051-80 = "ต้องทำภารกิจที่ได้รับมา\nให้สำเร็จน่ะ!"
10051-90 = "จะว่าไป... ไม่เห็น\nนักบัญชีจอมเฮี้ยบ\nของเซมิน่าเลยแฮะ"
10051-100 = "หวังว่าคงไม่ได้\nเจ็บป่วยตรงไหนนะ"
10051-110 = "(หวังว่าทุกคน\nจะมีความสุข\nกับเทศกาลนะ...)"
10051-120 = "ถึงปกติจะไม่ได้มีเรื่อง\nให้ขยับตัวเท่าไรก็เถอะ"
10051-130 = "แต่พละกำลังของโคโทริ\nกับฮิบิกิลดลงขนาดนี้เชียว..."
10051-140 = "หลังจบงานเทศกาล\nคงต้องไปห้องชมรมวิศวกรรม"
10051-150 = "แล้วสร้างหุ่นยนต์\nฝึกพละกำลังแล้วดีมั้ยนะ?"
10051-160 = "ถึงปกติจะไม่ได้มีเรื่อง\nให้ขยับตัวเท่าไรก็เถอะ"
10051-170 = "แต่พละกำลังของโคโทริ\nกับฮิบิกิลดลงขนาดนี้เชียว..."
10051-180 = "หลังจบงานเทศกาล\nคงต้องไปห้องชมรมวิศวกรรม"
10051-190 = "แล้วสร้างหุ่นยนต์\nฝึกพละกำลังแล้วดีไหมนะ?"

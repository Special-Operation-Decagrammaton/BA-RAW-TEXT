[translation]
10051-10 = "Let's do our best to make this Kivotos Halo Festival as great as possible!"
10051-20 = "The energy is palpable..."
10051-30 = "Millennium's honor is at stake."
10051-40 = "Of course the Engineering Department will help."
10051-50 = "My cheers still need fine-tuning..."
10051-60 = "There's no helping it. I'll do my best."
10051-70 = "A request received will become a design achieved!"
10051-80 = "That is the eternal motto of the Engineering Department!"
10051-90 = "Come to think of it, I haven't seen Seminar's resident perfectionist anywhere..."
10051-100 = "I hope she isn't sick."
10051-110 = "(In fact, I hope everyone can enjoy the festival to the fullest...)"
10051-120 = "I get that we're not an athletics club..."
10051-130 = "...but I didn't think Kotori and Hibiki would be this out of shape..."
10051-140 = "There's only one way to get fit. The Engineering Department's next undertaking will be..."
10051-150 = "...designing an exercise robot."

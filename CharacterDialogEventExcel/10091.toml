[translation]
10091-120 = "มาแล้วเหรอ คุณครู!"
10091-130 = "พอจะช่วยซ้อมดนตรีหน่อยได้มั้ย?"
10091-140 = "อ่า... อ่า อ้าาา~"
10091-150 = "วะ... เหวออออ!?\nคุณครู!? มาตั้งแต่ตอนไหน...!"
10091-160 = "ฉันรู้สึกว่า...\nกำลังเป็นไปได้ด้วยดี"
10091-170 = "แต่ก็เหมือนจะไม่ดีด้วย..."
10091-180 = "ตั้งใจหน่อย ตั้งใจ!"
10091-190 = "ยังไม่จบแค่นี้หรอกนะ!"
10091-200 = "ฮู่ว..."
10091-210 = "คุณครู... คือ..."
10091-220 = "ปะ... เป็นไงบ้าง...?"
10091-230 = "สนใจไมโครโฟนขึ้นมาเหรอ...?"
10091-240 = "คุณครูอยากร้องสักเพลงมั้ย?"
10091-250 = "หืม? มีอะไรที่\nอยากได้งั้นเหรอ?"
10091-260 = "จริงๆ เลย... มากวนกันอีกแล้ว..."
10091-270 = "ครั้งนี้ฉันจะโกรธแล้วนะ"
10091-280 = "อ่า... จริงๆ เลย!"
10091-290 = "ถ้ามีธุระอะไร\nก็บอกกันดีๆ สิ!"
10091-620 = "สวัสดี วันนี้ก็มาดูสถานการณ์เหรอ?"
10091-630 = "มาดูความคืบหน้าใช่มั้ย?"
10091-640 = "อย่าเอาแต่มองฉันสิ\nมีสมาธิหน่อย"
10091-650 = "เดี๋ยวเหอะ! ไม่ได้นะ"
10091-660 = "อื้อ โอเค"
10091-670 = "โอ้ ดีเลยนะ"

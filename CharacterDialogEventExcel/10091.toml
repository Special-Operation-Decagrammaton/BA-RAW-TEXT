[translation]
10091-120 = "歡迎你，老師！"
10091-130 = "能幫我練習一下嗎？"
10091-140 = "啊，啊，啊啊──"
10091-150 = "……哇！？老師！？\n你是從什麼時候……！"
10091-160 = "感覺會很順利……"
10091-170 = "又好像不會……"
10091-180 = "集中！集中！"
10091-190 = "還沒結束呢！"
10091-200 = "呼……"
10091-210 = "老師，那個……"
10091-220 = "如，如何……？"
10091-230 = "……嗯？\n對麥克風有興趣嗎？"
10091-240 = "老師要不要也來唱一首？"
10091-250 = "嗯？\n有什麼需要的東西嗎？"
10091-260 = "真是的……\n又在戳我……"
10091-270 = "這次真的要生氣囉？"
10091-280 = "啊啊，真是的！"
10091-290 = "有需要的話，\n就好好說出來！"
10091-620 = "你好，\n今天也來查看情況嗎？"
10091-630 = "是來看進度如何的吧？"
10091-640 = "不要一直盯著我看，\n請好好集中精神。"
10091-650 = "喂！不行。"
10091-660 = "嗯，OK！"
10091-670 = "哦哦，太好了。"

[translation]
20015-10 = "ยินดีต้อนรับสู่เทศกาลฉายหนัง\nเฮียกคิยาโคค่ะ! ฉันจะนำทาง\nให้เองค่ะ คุณครู!"
20015-20 = "อ๊ะ คุณครู! อะไรกันๆ\nตอนนี้จะมาเที่ยว\nที่หมู่บ้านสตูดิโอ\nภาพยนตร์งั้นเหรอ?"
20015-30 = "ฉันเอง...\nก็อยากไปเที่ยวเหมือนกัน!"
20015-40 = "อ๊ะ แต่ว่า...\nตอนนี้คงไม่ได้หรอก..."
20015-50 = "คราวนี้ชมรมฝึกฝน\nก็คอยมาช่วยงาน\nอยู่ด้วยนะ..."
20015-60 = "ฮือ~ ฉันเองก็อยากไปเที่ยวเหมือนกัน~!"
20015-70 = "หืม? อะไรน่ะ?\nอยากไปเล่นให้สนุกสุดๆ เลย?"
20015-80 = "ฉันเองก็จะแพ้ไม่ได้!\nย้า~! ย้ากกก~!"
20015-90 = "การมาช่วยงานแบบนี้\nก็เป็นการฝึกฝนอย่างหนึ่ง\nฉันคิดแบบนั้นนะแต่ว่า..."
20015-100 = "ก็มันน่าเบื่อจริงๆ นี่!"
20015-110 = "อืม... อยากไปเล่นจังเลย"
20015-120 = "อืม... ไม่ได้\nการอยู่เฉยๆ เนี่ย\nน่าเบื่อจริงๆ ด้วย!"
20015-130 = "อ๊ะ พอได้ตะโกนออกไป\nก็รู้สึกโล่งขึ้นมาหน่อย"
20015-140 = "หืม? อะไรน่ะ?\nอยากไปเล่นให้สนุกสุดๆ เลย?"
20015-150 = "ฉันเองก็จะแพ้ไม่ได้!\nย้า~! ย้ากกก~!"
20015-160 = "การมาช่วยงานแบบนี้\nก็เป็นการฝึกฝนอย่างหนึ่ง\nฉันคิดแบบนั้นนะแต่ว่า..."
20015-170 = "ก็มันน่าเบื่อจริงๆ นี่!"
20015-180 = "อืม... อยากไปเล่นจังเลย"
20015-190 = "อืม... ไม่ได้\nการอยู่เฉยๆ เนี่ย\nน่าเบื่อจริงๆ ด้วย!"
20015-200 = "อ๊ะ พอได้ตะโกนออกไป\nก็รู้สึกโล่งขึ้นมาหน่อย"
20015-720 = "ตรงนี้สามารถสุ่มการ์ดได้นะ!\nสนใจลองดูมั้ยล่ะคุณครู?"
20015-730 = "เอาละ... เลือกเลย~!\nถึงเทิร์นของคุณครูแล้ว\nจั่วการ์ดสิ!"
20015-740 = "ถ้าจั่วการ์ดออกมา\nทั้งหมดเลยดูล่ะ?"
20015-750 = "ยิ่งเวลาแบบนี้\nต้องได้การ์ดหายากแน่ๆ เลย!"
20015-760 = "ตื่นเต้นจังเลย~!\nจะได้การ์ดอะไรนะ~?"
20015-770 = "ถ้าเป็นไปได้\nขอให้เป็นการ์ดหายากด้วยเถอะ!"
20015-780 = "ก็เวลาเปิดได้การ์ดวิบวับๆ\nสวยๆ มันสนุกนี่นา!"
20015-790 = "ว้าววว นี่มัน...\nการ์ดหายาก...\nสุดๆ เลยนะ"
20015-800 = "คุณครู! สุดยอดเลย!\nนี่ต้องเป็นโชคชะตาแน่ๆ!"
20015-810 = "อ๊ะ ได้การ์ดดีเลยละ!\nหรือว่านี่คือ...\nพลังของผู้ใหญ่..."
20015-820 = "อ๊ะ การ์ดนี้ฉันเจอบ่อยนะ\nแต่คิดว่ามันเป็นการ์ด\nหายากเหมือนกันนะ!"
20015-830 = "โอ๊ะ คือว่า...\nมะ...ไม่ต้องผิดหวังไปหรอกนะ\nคุณครู!"
20015-840 = "คราวหน้าจะต้อง...\nสุ่มได้การ์ดดีๆ แน่!\nอาจจะนะ..."

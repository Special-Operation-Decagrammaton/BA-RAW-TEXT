[translation]
20015-10 = "歡迎來到百鬼夜行\n的電影村！我來帶你\n參觀吧，老師！"
20015-20 = "啊，老師！\n什麼什麼，接下來\n要在電影村玩嗎？"
20015-30 = "那我也想要\n一起玩～！"
20015-40 = "啊，可是\n現在不行……"
20015-50 = "雖然這次修行部是\n協助活動的一方……"
20015-60 = "嗚～我也想去玩～！"
20015-70 = "嗯？什麼？\n戳對方的遊戲？"
20015-80 = "我也不會輸的唷！\n喝啊！哈！"
20015-90 = "像這樣幫忙\n也是修行的一環！\n……雖然我也知道，"
20015-100 = "不過無聊的事情就是無聊！"
20015-110 = "唔嗯～好想去玩……"
20015-120 = "嗯……不行，\n一直待在這裡\n果然很無趣！"
20015-130 = "……啊，大喊過後，\n好像舒服了一點。"
20015-140 = "嗯？什麼？\n戳對方的遊戲？"
20015-150 = "我也不會輸的唷！\n喝啊！哈！"
20015-160 = "像這樣幫忙\n也是修行的一環！\n……雖然我也知道，"
20015-170 = "不過無聊的事情就是無聊！"
20015-180 = "唔嗯～好想去玩……"
20015-190 = "嗯……不行，\n一直待在這裡\n果然很無趣！"
20015-200 = "……啊，大喊過後，\n好像舒服了一點。"
20015-720 = "這裡可以抽卡唷！\n要不要馬上抽呀，老師？"
20015-730 = "來，請吧！\n輪到老師的回合囉，\n抽卡吧！"
20015-740 = "既然要抽的話，\n要不要全都抽完？"
20015-750 = "越是這種時候，\n越容易出現稀有卡片！"
20015-760 = "心動動，\n會抽到什麼呢～？"
20015-770 = "既然如此，\n如果是稀有卡片就好了！"
20015-780 = "閃閃發光又漂亮，\n心情都高興起來了！"
20015-790 = "唔哦，這不是\n超級稀有的卡片嗎！"
20015-800 = "老師好厲害，\n這就是命運！"
20015-810 = "啊，是張好卡呢！\n原來如此，這就是\n大人的力量……"
20015-820 = "啊，是很常見的卡。\n不過我覺得也是\n普通的稀有卡唷！"
20015-830 = "那個……\n別，別失望，老師！"
20015-840 = "下次一定會\n抽到好卡的！\n……大概。"

[translation]
20015-10 = "백귀야행 영화촌에\n어서 오세요! 내가\n안내해줄게. 선생님!"
20015-20 = "아, 선생님!\n뭐야뭐야, 지금부터\n영화촌에서 노는 거야?"
20015-30 = "그럼 나도 같이\n놀고 싶어!"
20015-40 = "아, 하지만\n지금은 안 되지…."
20015-50 = "이번에 수행부는\n이벤트를 돕는\n역할인데…."
20015-60 = "우~ 나도 놀고 싶어~!"
20015-70 = "응? 뭐야?\n찔러 보기 놀이야?"
20015-80 = "나도 질 수 없지!\n이야앗~! 이얍~!"
20015-90 = "이렇게 돕는 것도,\n수행의 일환!\n…이라고 알고는 있지만,"
20015-100 = "지루한 건 지루해!"
20015-110 = "으-음. 놀러 가고 싶어…."
20015-120 = "음---안 돼.\n가만히 있는 건\n역시 지루해!"
20015-130 = "…아, 소리치니까.\n조금 개운해졌다."
20015-140 = "응? 뭐야?\n찔러 보기 놀이야?"
20015-150 = "나도 질 수 없지!\n이야앗~! 이얍~!"
20015-160 = "이렇게 돕는 것도,\n수행의 일환!\n…이라고 알고는 있지만,"
20015-170 = "지루한 건 지루해!"
20015-180 = "으-음. 놀러 가고 싶어…."
20015-190 = "음---안 돼.\n가만히 있는 건\n역시 지루해!"
20015-200 = "…아, 소리치니까.\n조금 개운해졌다."
20015-720 = "여기서는 카드를 뽑을 수\n있어! 바로 어때, 선생님?"
20015-730 = "자, 골라~!\n선생님 턴이야,\n드로우 해!"
20015-740 = "내친김에 다\n뽑아버리면?"
20015-750 = "이럴 때일수록, 레어\n카드가 나올 거 같고!"
20015-760 = "두근두근두근~!\n뭐가 나올까~?"
20015-770 = "기왕이면\n레어카드가 좋지!"
20015-780 = "반짝반짝해서 예쁘고,\n뽑으면 신나니까!"
20015-790 = "우오- 이거\n엄청난 레어\n카드잖아!"
20015-800 = "선생님! 대단해!\n이거야말로 데스티니-!"
20015-810 = "아, 좋은 카드다!\n과연, 이것이\n어른의 힘…."
20015-820 = "아, 자주 보는 거다.\n그래도 레어카드라고\n생각해!"
20015-830 = "어, 그러니까….\n시, 실망하지 마,\n선생님!"
20015-840 = "다음엔 분명,\n좋은 게 나올 거야!\n아마도."

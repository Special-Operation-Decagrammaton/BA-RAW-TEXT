[translation]
20032-10190 = "ว่าไง คุณครู\nฐานใหม่เป็นยังไงบ้าง?"
20032-10200 = "มีงานที่ต้องทำเยอะขึ้น\nมากเลย..."
20032-10210 = "ค่อยๆ ทำไปทีละอย่างแล้วกัน"
20032-10220 = "เชิญเลยคุณครู\nบอกมาได้ทุกเรื่องเลยนะ"
20032-10230 = "หัวหน้าฮิมาริ\nดูเหมือนจะยุ่งอยู่นะ"
20032-10240 = "แต่ก็ดูเหมือนจะสนุกอยู่ด้วย\nคงไม่เป็นอะไรใช่มั้ย"
20032-10250 = "ถ้าหนาวก็มาทางนี้สิ คุณครู"
20032-10260 = "แบบนั้นจะมีประสิทธิภาพ\nต่อกันและกันดีกว่าใช่มั้ยล่ะ?"
20032-10270 = "อุณหภูมิและสภาพแวดล้อม\nมีความสัมพันธ์กันอย่างใกล้\nชิด"
20032-10280 = "เพราะงั้น ที่นี่เย็นสบายดี\nฉันเลยชอบมากเลยละ"
20032-10290 = "เหนื่อยหน่อยนะ ครู\nขอดูสิ่งนั้นหน่อยได้มั้ย?"
20032-10300 = "ถ้ามีคุณครูอยู่ด้วยละก็\nอัตราประสบความสำเร็จ\nของภารกิจจะเพิ่มขึ้น"
20032-10310 = "สภาพร่างกายฉันก็ดีขึ้นด้วย..."
20032-10750 = "ที่นี่คือที่วิเคราะห์สิ่งที่คุณครู...\nรวบรวมมาให้น่ะ อาจจะใช่นะ"
20032-10760 = "ยิ่งมีตัวอย่างเยอะก็ยิ่งดีน่ะ\nรบกวนด้วยนะ"
20032-10770 = "มาพอดีเลยนะ เดี๋ยวคุณครูก็\nจะได้รู้ถึงความสำคัญของ\nประสิทธิภาพเองแหละ"
20032-10780 = "หืม? มีเรื่องอะไรเหรอ?"
20032-10790 = "แค่เรียกดูเฉยๆ เหรอ...?\nทำไมล่ะ...?"
20032-10800 = "เอาเถอะ... ถ้าคุณครู\nอยากทำแบบนั้น"
20032-10810 = "เอาอันนี้ไป แล้วลองไปเล่นอันนั้นดู\nจะมีอะไรออกมาด้วยล่ะ"
20032-10820 = "ฉันเองก็ไม่ค่อยรู้หรอก..."
20032-10830 = "หัวหน้าอธิบายมาแบบนั้นน่ะ"
20032-10840 = "ระหว่างที่วิเคราะห์\nจะไม่ค่อยมีงานทำหรอก..."
20032-10850 = "คุณครู...\nขอนั่งตักได้รึเปล่า?"
20032-10860 = "อุณหภูมิร่างกาย\nจะกลายเป็นตัวแปรได้"
20032-10870 = "ในช่วงที่วิเคราะห์อยู่\nก็เลยโดนบอกไม่ให้เข้าไปใกล้น่ะ..."
20032-10880 = "ถึงจะรู้อยู่แล้วก็เถอะ\nแต่ก็รู้สึกเสียใจยังไงไม่รู้"
20032-10890 = "ถูกใจที่นี่... จังเลย"
20032-10900 = "ย้ายบางส่วนของห้องชมรม\nมาไว้ที่นี่ไม่ได้เหรอ?"
20032-10910 = "เอ้า นี่"
20032-10920 = "แบบนี้เรียกว่า...\nการแลกเปลี่ยนสินค้าเหรอ?"
20032-10930 = "ผลออกมาแล้วละ\nจะเอาอะไรไปดีล่ะ?"
20032-10940 = "อื้อ อันนั้นก็ดูใช้ได้นะ"
20032-10950 = "ฉันอยากให้ผลที่ออกมา\nหลากหลายกว่านี้จัง"
20032-10960 = "แค่ในตอนนี้...\nก็เพียงพอแล้วงั้นเหรอ?\nอย่างนี้นี่เอง "
20032-10970 = "ถึงไม่ค่อยแน่ใจเท่าไร"
20032-10980 = "แต่ก็หวังว่านี่จะ\nเป็นประโยชน์กับคุณครูนะ"
20032-12100 = "ตั้งแต่นี้จะขอเปลี่ยนแปลง\nวิธีวิเคราะห์ตัวอย่างสักหน่อย"
20032-12110 = "ถึงจะบอกว่าเป็นสถานที่\nสำหรับทดสอบโชคก็ตาม..."
20032-12120 = "สิ่งที่ไม่แน่นอนมีแค่อนาคต\nเพียงอย่างเดียวก็น่าจะพอแล้วนะ...?"
20032-12130 = "เดิมพันด้วยดวงของคุณครูดีมั้ย?"
20032-12140 = "งั้นฝากในส่วนของฉันด้วยนะ"
20032-12150 = "ดูเหมือนหัวหน้าจะ\nปรับเปลี่ยนอะไรบางอย่างน่ะ"
20032-12160 = "ส่วนตัวแล้วฉันแอบเสียดายนิดหน่อย"
20032-12170 = "ฉันเป็นพวกชอบผลลัพธ์\nที่มันแน่นอนน่ะ"
20032-12180 = "โทคิบอกว่า\nชอบวิธีนี้น่ะ"
20032-12190 = "ถึงเธอจะไม่แสดงออก\nทางสีหน้าก็เถอะ"
20032-12200 = "จริงๆ แล้วโทคิเป็นพวก\nสนุกกับทุกๆ เรื่องเลยนะ"
20032-12210 = "ถึงฉันจะไม่ค่อยเข้าใจ\nพวกวิธีการก็เถอะ"
20032-12220 = "แต่ก็รู้ว่ามีอะไร\nที่มันเปลี่ยนไปนิดหน่อย"
20032-12230 = "ถ้าสุ่มได้โชคร้าย\nฉันอาจทิ้งคุณครู\nไว้ที่นี่ก็ได้นะ~?"
20032-12240 = "ล้อเล่นน่า... ไม่ว่าจะ\nโชคดีหรือโชคร้าย\nฉันก็จะอยู่ข้างๆ คุณครูเอง"
20032-12250 = "แต่ถ้าไม่ถูกใจผลลัพธ์\nบอกฉันก็แล้วกัน"
20032-12260 = "ฉันจะปลอบใจให้เอง"
20032-12270 = "ได้รางวัลละ\nยินดีด้วยนะคุณครู"
20032-12280 = "เรื่องสุดยอดแบบนี้\nมีจริงๆ ด้วยสินะ..."
20032-12290 = "ตกใจหมดเลย...\nคุณครูนี่โชคดีจังเลยนะ"
20032-12300 = "เป็นผลลัพธ์ที่ได้มาจาก\nความพยายามของพวกเรา\nกับคุณครูไงล่ะ"
20032-12310 = "ยินดีด้วยนะคุณครู\nชนแก้วกันหน่อยมั้ย?"

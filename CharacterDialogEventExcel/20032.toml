[translation]
20032-10190 = "선생님, 안녕.\n새로운 기지는 어때?"
20032-10200 = "할 일이 많아졌네……"
20032-10210 = "하나씩 해 나가야지."
20032-10220 = "어서 와, 선생님.\n뭐든지 말해줘."
20032-10230 = "히마리 부장, \n바쁜 것 같더라."
20032-10240 = "……그래도 즐거워 \n보였으니까, 괜찮겠지."
20032-10250 = "추우면 이리 와, 선생님."
20032-10260 = "그게 서로 효율이 좋을 것\n같기도 하고 말이지?"
20032-10270 = "기온과 컨디션은 \n밀접한 관계에 있어."
20032-10280 = "그래서, 여기는 쾌적해서\n마음에 들어."
20032-10290 = "고생했어, 선생님.\n그거 좀 보여줄래?"
20032-10300 = "선생님이 있어주면, \n작전 성공률이 올라가."
20032-10310 = "……내 컨디션도 좋아지고."
20032-10750 = "여기는 선생님이\n모아 온 것을…….\n분석하는 곳이야. 아마도."
20032-10760 = "샘플은 많을수록 좋으니까.\n잘 부탁해."
20032-10770 = "딱 맞춰 왔네.\n효율의 중요성,\n선생님도 알게 된 거야?"
20032-10780 = "응? 무슨 일이야?"
20032-10790 = "……불러본 것뿐이라고?\n왜……?"
20032-10800 = "……뭐, 선생님이\n그러고 싶었던 거라면야."
20032-10810 = "이걸 가지고, 저걸 하면,\n뭔가가 나온대."
20032-10820 = "……나도 잘 모르지만,"
20032-10830 = "부장 설명에 의하면 그래."
20032-10840 = "분석 중에는 할 일이 별로 없어."
20032-10850 = "……선생님\n무릎 위에, 앉아도 돼?"
20032-10860 = "체온이 변수가 되어버리니까,"
20032-10870 = "분석 중에는 가까이 가지\n말라고 하더라고……"
20032-10880 = "알고는 있는데,\n뭔가 서운해."
20032-10890 = "이 장소……\n마음에 들어."
20032-10900 = "부실 일부를\n여기로 가져오면 안 될까?"
20032-10910 = "자, 여기."
20032-10920 = "……이런 거,\n'물물교환'이라고 하던가?"
20032-10930 = "결과가 나왔네.\n어떤 걸 가져갈래?"
20032-10940 = "응. 그거 괜찮아 보여."
20032-10950 = "결과물이 더 다양했으면\n좋았을 텐데."
20032-10960 = "……지금 상태로도\n충분하다고? 그렇구나."
20032-10970 = "잘 모르겠지만,"
20032-10980 = "이게 선생님한테\n도움이 됐으면 좋겠어."
20032-12100 = "여기서부터는, 샘플 분석법을\n조금 바꿔볼게."
20032-12110 = "운을 시험할 수\n있는 장소라는데……"
20032-12120 = "불확실한 것은 미래만으로\n충분하지 않을까……?"
20032-12130 = "선생님의 운에 걸어볼까?"
20032-12140 = "그럼, 내 몫도 잘 부탁해."
20032-12150 = "부장이 뭔가를\n바꾼 모양인데……"
20032-12160 = "개인적으로는 조금 아쉬워."
20032-12170 = "나는 결과가\n확실한 편이 좋은데."
20032-12180 = "이 방식,\n토키는 마음에 든대."
20032-12190 = "……얼굴에\n드러나지는 않지만,"
20032-12200 = "토키는 웬만한 건 뭐든\n즐기는 타입이란 말이야."
20032-12210 = "방법론 같은 것은\n잘 모르지만,"
20032-12220 = "아무튼 무언가가\n바뀌었다는 것은 알겠어."
20032-12230 = "꽝을 뽑으면, 선생님을\n두고 가 버릴지도~?"
20032-12240 = "……농담이야. 운이 좋든\n나쁘든, 난 선생님 옆에\n있을 거니까."
20032-12250 = "결과가 마음에 안 들면,\n나한테 말해 줘."
20032-12260 = "위로해 줄게."
20032-12270 = "당첨이네.\n축하해, 선생님."
20032-12280 = "대박이라는 게,\n진짜로 있었구나……."
20032-12290 = "놀랬어…… 선생님은\n정말 운이 좋구나."
20032-12300 = "선생님과 우리의 노력으로\n얻은 결과지."
20032-12310 = "축하해, 선생님.\n건배라도 할까?"

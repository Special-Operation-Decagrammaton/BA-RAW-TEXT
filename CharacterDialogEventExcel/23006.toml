[translation]
23006-170 = "นี่เป็นการออกสำรวจร้านค้าของ\nร้านเฮียกคิยาโคค่ะ! เอาล่ะค่ะ\nนายท่านอยากจะรับอะไรดีคะ?"
23006-180 = "อา~ คุณครู\nเชิญเลยค่ะ~"
23006-190 = "นี่ค่ะ\nเลือกได้ตามสบายเลยนะคะ!"
23006-200 = "ถึงงานเทศกาลจะจบลงไปแล้ว\nแต่เรายังเปิดทำการอยู่นะคะ"
23006-210 = "ว่ากันว่าการที่ยังมีของเหลือ\nจะถือว่ามีโชคอยู่ เอาล่ะ คุณครู!\nเชิญเลือกได้เลยค่ะ!"
23006-220 = "ถึงงานเทศกาลจะเริ่มแล้ว\nแต่ร้านเฮียกคิยาโคของเรา\nไม่หยุดหรอกนะคะ!"
23006-230 = "ก็~ เพราะว่าพวกเรา\nคือชมรมชมรมจัดงานเทศกาลนี่คะ\nจะหยุดได้ยังไงกันล่ะคะ ฮิฮิ..."
23006-240 = "ดีล่ะ ถ้างั้น...\nฉันจะทำท่าคิวท์ๆ ให้ดูนะคะ ปิ้ว!"
23006-250 = "อ๊ะ จะบอกว่ามันดูเก่าเหรอคะ?\nทำไมล่ะคะ?!"
23006-260 = "อ๊ะ นั่นมัน...! อา... เปล่าค่ะๆ \nฉันไม่เคยคิดว่าจะให้เลือกจากของ\nที่เหลืออยู่แบบนั้นเลยนะคะ...!"
23006-270 = "ไม่คิดเลยว่าคุณครูจะเลือกชิ้นนั้น\nสมกับเป็นคุณครูจริงๆ!\nสายตาเฉียบแหลมมากค่ะ!"
23006-280 = "ขอบคุณที่มาอุดหนุนบ่อยๆ นะคะ~\nนายท่าน~!"
23006-290 = "ของชิ้นนั้นใช้ได้เลยใช่ไหมล่ะคะ?\nฮิฮิฮิ!"

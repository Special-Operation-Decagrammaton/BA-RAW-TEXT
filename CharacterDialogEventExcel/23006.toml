[translation]
23006-170 = "是百夜堂的攤位！\n來，主人，\n你有需要什麼東西嗎？"
23006-180 = "啊~老師，\n歡迎光臨~"
23006-190 = "來來來，\n慢慢挑慢慢選！"
23006-200 = "雖然慶典結束了，\n不過我們還沒打烊！"
23006-210 = "聽說剩下的東西\n反而有很多好貨，\n來吧~老師！挑一下吧！"
23006-220 = "就算慶典開幕了，\n百夜堂也不會停下腳步！"
23006-230 = "什麼~我們可是\n節慶營運管理部，\n這是理所當然的。嘿嘿。"
23006-240 = "很好。在這裡…\n萌耶萌耶…啾！"
23006-250 = "…什麼，你說有點老套？\n哪會？！"
23006-260 = "啊，這個…！啊，沒有沒有，好好好。\n我也沒有打算\n非把剩下的東西帶走不可…！"
23006-270 = "居然選中了那個，\n不愧是老師！\n眼光果然不同凡響！"
23006-280 = "謝謝惠顧~\n主人~！"
23006-290 = "這東西還不錯吧？\n耶嘿嘿。"

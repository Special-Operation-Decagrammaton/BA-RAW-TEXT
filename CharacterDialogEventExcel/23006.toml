[translation]
23006-170 = "백야당의 출장 판매예요!\n자아, 주인님.\n필요한 물건은 무엇인가요?"
23006-180 = "아~ 선생님.\n어서 오세요~"
23006-190 = "자자,\n마음껏 골라보시라구요!"
23006-200 = "축제는 끝나버렸지만,\n아직 영업 중이랍니다."
23006-210 = "남은 물건에는\n복이 있다고도 하니까,\n자. 선생님! 골라보세요!"
23006-220 = "축제가 열려도\n백야당은 멈추지 않는다!"
23006-230 = "뭐어~ 저희들은\n마츠리운영관리부이니까.\n당연한 거지만요. 에헷."
23006-240 = "좋았어. 여기에선…\n모에모에… 큥!"
23006-250 = "…엣, 이거, 좀 낡았다고요?\n어째서?!"
23006-260 = "앗, 그거…! 아, 아뇨아뇨, 자자.\n딱히 남는 건 가져가야겠다던가,\n그런 생각 한 적 없으니까…!"
23006-270 = "그걸 선택하다니,\n역시 선생님!\n안목이 있으시다니까요!"
23006-280 = "매번 구매 감사드립니다~\n주인님~!"
23006-290 = "그 물건, 제법 괜찮죠?\n에헤헷."

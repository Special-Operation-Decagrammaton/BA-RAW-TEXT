[translation]
10028-140 = "เชิญเลย นายท่าน!\nกระต่ายแสนน่ารัก\nกำลังรออยู่เลย!"
10028-150 = "ออกเดินทางกันเถอะ!\nไปพร้อมกับอาสึนะ!"
10028-160 = "นายท่าน-!\nมาเล่นกับอาสึนะเถอะ! หืม?"
10028-170 = "อ๊ะ นายท่าน! ยะฮู้ว~!"
10028-180 = "ไปวิ่งให้สนุกสุดเหวี่ยง\nกันเลยดีไหม?\nต้องสนุกมากแน่ๆ เลย!"
10028-190 = "หือ อะไรน่ะ?\nจะเล่นแบบนั้นเหรอ?"
10028-200 = "ถ้างั้นอาสึนะเอง...\nก็ลูบๆ นายท่านเท่าที่\nอยากลูบได้เลยเหรอ?"
10028-210 = "อ๊ะ นายท่าน!\nตอนนายท่านยังไม่มา\nมันน่าเบื่อมากเลยละ~"
10028-220 = "เพราะงั้นตอนนี้\nเรามาเล่นให้สนุก\nสุดเหวี่ยงกันเลยเถอะ!"
10028-230 = "ออกเดินทางกันเถอะ!\nไปพร้อมกับอาสึนะ!"
10028-240 = "ต่อให้งานเสร็จไว\nก็ยังเล่นได้อยู่ใช่ไหม?"
10028-250 = "มาเล่นสนุกให้เต็มที่เลย!"
10028-260 = "อ๊ะ นายท่าน! \nทางนี้ๆ ทางนี้!"

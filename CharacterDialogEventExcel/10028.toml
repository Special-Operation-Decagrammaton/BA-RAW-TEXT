[translation]
10028-140 = "어서 와, 주인님!\n토끼들이 기다리고 있어!"
10028-150 = "아스나와 함께!\n자, 출발-!"
10028-160 = "주인님-! 아스나랑 놀자! 응?"
10028-170 = "아, 주인님, 얏호!"
10028-180 = "같이 아무 의미 없이\n달려 보지 않을래?\n분명 즐거울 거야!"
10028-190 = "응, 뭐야뭐야?\n그런 새로운 놀이?"
10028-200 = "그러면 나도 주인님,\n원하는 만큼 손대도 돼?"

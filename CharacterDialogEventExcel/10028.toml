[translation]
10028-140 = "主人，歡迎你！\n兔子小姐們\n出來迎接你了唷！"
10028-150 = "就跟明日奈一起，\n出發──！"
10028-160 = "主人～！\n和明日奈一起玩吧！吶？"
10028-170 = "啊，主人，呀齁～！"
10028-180 = "要不要一起漫無目的地\n在那裡跑一跑？\n一定會很開心的唷！"
10028-190 = "嗯，什麼什麼？\n要玩那種新遊戲嗎？"
10028-200 = "那我也可以\n隨意摸主人嗎？"
10028-210 = "啊，主人！\n在主人來之前，\n真的好無聊～"
10028-220 = "所以，從現在開始\n一起開心地玩吧！"
10028-230 = "那就和明日奈一起，\n出發吧──！"
10028-240 = "早點結束的話，\n可以玩那個吧？"
10028-250 = "盡情地玩到最後吧！"
10028-260 = "啊，主人！\n這裡這裡！"
10028-270 = "主人──！\n和明日奈一起玩吧！可以吧？"
10028-280 = "啊，主人，呀呼──！"
10028-290 = "一起無意義地奔跑吧？\n一定會很有趣的！"
10028-300 = "嗯？什麼什麼？\n那是新遊戲嗎？"
10028-310 = "那我也可以\n隨便摸主人嗎？"
10028-320 = "啊，主人！\n在主人來之前，\n真的好無聊～"
10028-330 = "所以，從現在開始\n一起開心地玩吧！"
10028-450 = "是快樂的試運氣時間唷，\n主人！"
10028-460 = "心跳加速～！"
10028-470 = "這邊好像還能進去呢！"
10028-480 = "啊哈。喂喂，\n你在看哪裡啊～？"
10028-490 = "會出現什麼呢～？\n有點緊張呢！"
10028-500 = "哇────！！\n好厲害好厲害，\n不愧是主人！"
10028-510 = "喔──！\n真不愧是主人！"
10028-520 = "鏘──！"
10028-530 = "……咦？"
10028-540 = "啊哈！這是什麼，好奇怪喔～！"

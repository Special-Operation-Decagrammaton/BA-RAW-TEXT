[translation]
16016-320 = "สวัสดีค่ะ คุณครู"
16016-330 = "ไม่ได้มาดูฉัน...\nแต่มาดูการแสดงสินะคะ?"
16016-340 = "กำลังรออยู่เลยค่ะ\nคุณครู"
16016-350 = "ฉันเตรียมที่นั่งไว้ให้แล้ว\nเชิญนั่งได้ตามสบายเลยนะคะ"
16016-360 = "การแสดงยังคงดำเนินต่อไป\nช่วยจดจ่อกับการแสดงด้วยนะคะ!"
16016-370 = "ช่วยฟังจนจบเพลงสุดท้าย\nแล้วค่อยกลับนะคะ"
16016-380 = "ฮุฮุ เป็นการแสดง\nที่สุดยอดมากเลยค่ะ"
16016-390 = "คุณครู...\nมีเรื่องอะไรเหรอคะ?"
16016-400 = "นี่ก็เป็นแฟนเซอร์วิส\nอย่างหนึ่ง... เหรอคะ?"
16016-410 = "ถ้าคุณครูชอบ\nแค่นั้นก็เพียงพอแล้วค่ะ"
16016-420 = "อ่า~ อ่า~ อ่า~"
16016-430 = "ฉันกำลังฝึกออกเสียง\nเตรียมพร้อมเพื่อจะ\nร้องเพลงได้ตลอดค่ะ"

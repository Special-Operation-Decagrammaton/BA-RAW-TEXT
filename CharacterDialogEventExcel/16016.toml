[translation]
16016-320 = "您好，老師。"
16016-330 = "是來看我……不對，\n是來看舞台表演的對吧。"
16016-340 = "恭候多時了，老師。"
16016-350 = "已經為您準備好了座位。\n請您就坐吧。"
16016-360 = "舞台表演還在繼續唷，\n請集中精神！"
16016-370 = "還請您聽到最後哦。"
16016-380 = "呵呵，是場\n非常精彩的舞台表演。"
16016-390 = "老師……\n請問有什麼事嗎？"
16016-400 = "這也是粉絲服務……\n是嗎？"
16016-410 = "只要能讓老師享受，\n那就足夠了。"
16016-420 = "啊，啊～啊──"
16016-430 = "……為了隨時都能歌唱，\n我進行了發聲練習。"

[translation]
16016-320 = "안녕하세요 선생님."
16016-330 = "저… 가 아니라,\n무대를 보러 오신 거죠?"
16016-340 = "기다리고 있었습니다,\n선생님."
16016-350 = "자리를 준비해 두었습니다.\n편히 앉으세요."
16016-360 = "무대는 계속되고 있어요, \n집중해 주세요!"
16016-370 = "마지막까지,\n듣고 가 주세요."
16016-380 = "후후,\n아주 멋진 무대였어요."
16016-390 = "선생님………\n무슨 일 있으신가요?"
16016-400 = "이것도 팬 서비스의\n일환……일까요?"
16016-410 = "선생님께서 즐기셨다면\n그것으로 충분합니다."
16016-420 = "아, 아~, 아~."
16016-430 = "…언제라도 부를 수\n있도록, 발성 연습을\n하고 있었습니다."

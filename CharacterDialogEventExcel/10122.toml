[translation]
10122-10 = "呀齁～老師。\n玩得開心嗎？"
10122-20 = "唔嗯……這種時候，\n如果是老師的話，\n會怎麼做呢……？"
10122-30 = "雖然事情的發展\n有點出乎意料……"
10122-40 = "算了，總會有辦法的吧。\n大概！"
10122-50 = "得打起精神才行。"
10122-60 = "畢竟不知道\n還會發生什麼事！"
10122-70 = "呼～幸好\n總算是結束了。"
10122-80 = "要是老師不在的話，\n會變成什麼樣子呢……"
10122-90 = "真不想去想啊……"
10122-100 = "能和老師在一起真好～"
10122-110 = "雖然你應該已經知道了，"
10122-120 = "我在某些方面\n有點粗線條……"
10122-130 = "怎麼了怎麼了？"
10122-140 = "難道需要我嗎？"
10122-150 = "啊哈哈，\n很，很癢耶，\n老師！"
10122-160 = "這樣好嗎～？\n我也要反擊囉～？"
10122-170 = "老師……？\n希望你差不多該\n停下來了……呢。"
10122-180 = "啊！我沒有討厭唷！\n完全沒有！"
10122-190 = "只是……怕會\n讓我誤會而已。"
10122-1220 = "唔哇，要做的事\n還真多呢……"
10122-1230 = "難得來到海邊……\n還要繼續工作嗎……？"
10122-1240 = "好麻煩哦……"
10122-1250 = "如果有獎勵的話，\n說不定會更有幹勁呢～"
10122-1260 = "吶，老師。"
10122-1270 = "……一起偷懶吧♪"
10122-1280 = "哇～哦！\n不愧是老師呢☆"
10122-1290 = "哦哦，\n事情挺順利的嘛！"

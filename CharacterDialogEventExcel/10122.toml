[translation]
10122-10 = "ยะฮู้ว คุณครู!\nกำลังสนุกอยู่หรือเปล่า?"
10122-20 = "อืม... ถ้าเป็นคุณครูจะจัดการ\nสถานการณ์แบบนี้\nยังไงกันนะ..."
10122-30 = "ดูแตกต่างจาก\nที่คิดไว้นิดหน่อย..."
10122-40 = "แต่ถึงยังไงก็\nคงเป็นไปได้ด้วยดีละนะ~!"
10122-50 = "คงต้องตื่นตัว\nอยู่เสมอแล้วละ"
10122-60 = "ก็เราไม่รู้นี่นาว่าจะ\nเกิดเรื่องอะไรขึ้นมาอีก"
10122-70 = "ฮื้ม~ ถึงยังไง\nก็ปิดงานจนได้สินะ"
10122-80 = "ถ้าไม่มีคุณครู\nจะเป็นยังไงนะ..."
10122-90 = "ไม่อยากแม้แต่จะคิดเลย..."
10122-100 = "โชคดีจังเลย\nที่มีคุณครูอยู่ด้วย~"
10122-110 = "ฉันก็รู้อยู่แล้วละ"
10122-120 = "ก็ฉันเป็นคนค่อนข้างจะ\nไม่ค่อยรอบคอบนี่นา..."
10122-130 = "หืม? มีเรื่องอะไรเหรอ?"
10122-140 = "หรือว่าต้องการมิกะ~?"
10122-150 = "อะฮ่าฮ่า\nจะ... จั๊กจี้นะ คุณครู!"
10122-160 = "จะไหวหรือเปล่า~?\nเดี๋ยวฉันเอาคืนนะ~?"
10122-170 = "คุณครู...?\nฉันอยากให้...\nหยุดได้แล้วละ"
10122-180 = "อ๊ะ ฉันไม่ได้ไม่ชอบนะ! ไม่เลย!"
10122-190 = "แต่ว่า... ฉันกลัวจะ\nเข้าใจผิดไปน่ะ"
10122-1220 = "ว้าว มีงานต้องทำเยอะจัง..."
10122-1230 = "อุตส่าห์ได้มาทะเลแท้ๆ...\nยังทำงานอยู่อีกเหรอ...?"
10122-1240 = "ขี้เกียจจัง..."
10122-1250 = "ถ้ามีรางวัลให้\nก็อาจจะอยากทำก็ได้นะ~"
10122-1260 = "ฮุฮุ คุณครู..."
10122-1270 = "มาโดดงานกันสักเดี๋ยวมั้ย?\nว่าไงล่ะ?"
10122-1280 = "ว้าว! สมกับที่เป็นคุณครูเลย☆"
10122-1290 = "อื้อ ดีเลย! ฉันมีพลังเต็มเปี่ยมเลยละ!"

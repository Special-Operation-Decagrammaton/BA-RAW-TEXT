[translation]
10122-10 = "얏호- 선생님.\n즐기고 있어?"
10122-20 = "으음. 선생님은\n어떻게 대처하려나,\n이런 상황……"
10122-30 = "뭔가 생각과는\n조금 다른 전개지만……"
10122-40 = "그래도,\n어떻게든 되려나~!"
10122-50 = "긴장을 놓지\n말아야겠네."
10122-60 = "무슨 일이\n또 일어날지\n모르니까 말야."
10122-70 = "후아~ 어쨌든\n마무리가 됐네."
10122-80 = "선생님이 없었다면\n어떻게 되었을지……"
10122-90 = "생각하기도 싫어……"
10122-100 = "선생님과 함께라서\n다행이다~"
10122-110 = "알고 있겠지만,"
10122-120 = "나 좀 덤벙대는\n부분이 있으니까…."
10122-130 = "응? 무슨 일 있어?"
10122-140 = "미카가 필요하다거나~?"
10122-150 = "아하하,\n가, 간지러워 선생님!"
10122-160 = "괜찮겠어~?\n나도 한다~?"
10122-170 = "선생님……?\n슬슬 멈춰줬으면……\n하는데."
10122-180 = "아, 싫진 않아! 전혀!"
10122-190 = "하지만……\n착각해 버릴 것\n같아서."
10122-1220 = "우와, 할 일 많아……"
10122-1230 = "모처럼 바다에 왔는데……\n아직도 일해……?"
10122-1240 = "귀찮아……"
10122-1250 = "포상이 있다면,\n할 마음이 생길지도~"
10122-1260 = "후후, 선생님……"
10122-1270 = "잠깐만 땡땡이칠래? 어때?"
10122-1280 = "와-오! 역시 선생님이네☆"
10122-1290 = "응, 좋아! 기세를 타버렸다구!"

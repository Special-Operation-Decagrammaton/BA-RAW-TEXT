[translation]
20005-140 = "ได้กลิ่นหอมสดชื่นของทะเล\nด้วยละค่ะ~"
20005-150 = "ถ้าใช้วันหยุดพักผ่อนแบบสบายๆ\nได้ก็คงจะดีนะคะ!"
20005-160 = "ฉันพร้อมแล้วค่ะ!\nเตรียมห่วงยางเพโรโร่\nสำหรับว่ายน้ำมาเรียบร้อยแล้วค่ะ!"
20005-170 = "เอ๋?\nฉันวางกุญแจห้องเปลี่ยนเสื้อ\nเอาไว้ตรงนี้นี่นา..."
20005-180 = "อ่า คือว่า...\nฉะ... ฉันเขินนะคะ\nอย่าจ้องตาเป็นมันแบบนั้นสิคะ..."
20005-190 = "เรามาถึงแล้วค่ะ!\nดูสิคะ ทะเลค่ะ!"

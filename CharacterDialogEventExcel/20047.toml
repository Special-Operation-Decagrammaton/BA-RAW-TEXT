[translation]
20047-320 = "백야수상제라……"
20047-330 = "나는 어쩌다\n여기까지 왔지?"
20047-340 = "참가하게 된 이상,\n후회 없는\n경기를 펼치겠어."
20047-350 = "축제도 슬슬 막바지네.\n정말 많은 경험을 했어."
20047-360 = "끝이 다가오니\n아쉬운 마음이 드네."
20047-370 = "바다 따위,\n정말 싫었는데."
20047-380 = "정말 후회 없는 경기를\n펼쳤어. 지켜봐 줘서\n고마웠어, 선생님."
20047-390 = "내 기책이 필요해?"
20047-400 = "아무리 해봐도\n몸이 가라앉아……."
20047-410 = "너무 힘을 줘서\n그런 걸까."
20047-420 = "으, 으응?\n언제 왔어, 선생님?"
20047-430 = "걱정 마. 수영 따위,\n아무렇지도 않으니까."
20047-440 = "간지러워."
20047-450 = "……저리 가라는\n뜻은 아니야."
20047-720 = "직접 정리한 이번\n작전 목록이야. 고맙지?"
20047-730 = "자, 작전 일람."
20047-740 = "……뭐 해?\n더 가까이 와야\n같이 보겠지?"
20047-750 = "잡담이라면 사적인 곳에서\n잔뜩 해주겠어."
20047-760 = "그러니까 지금은\n작전에 집중해 줘."
20047-770 = "작전참모의 조언이\n필요한 거야?\n어떤 건지 말만 해."
20047-780 = "역시 선생님.\n그 정도는 해줘야\n나의 동맹이지."
20047-790 = "당신이 활약하니\n나도 힘이 나네.\n한 팀이니 당연한 건가?"

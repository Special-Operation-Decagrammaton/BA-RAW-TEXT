[translation]
20047-320 = "百夜水上祭啊……"
20047-330 = "我……\n到底在做什麼呢……"
20047-340 = "既然要參加……就要\n打出不辱名號的比賽。"
20047-350 = "結束已近在眼前……\n算是段充實的時光吧。"
20047-360 = "真到結束的時候，\n還是有點寂寞呢。"
20047-370 = "大海什麼的，以前\n明明那麼討厭的說。"
20047-380 = "……我沒有遺憾。\n謝謝你，老師。\n一直守望到了最後。"
20047-390 = "我有個不錯的\n作戰計畫……\n想聽聽看嗎？"
20047-400 = "無論怎麼努力，身體\n還是會沉下去呢……"
20047-410 = "是因為太用力了嗎？"
20047-420 = "老，老師……！\n你從什麼時候\n開始看的……？"
20047-430 = "沒必要擔心。\n這種程度，\n根本不算什麼。"
20047-440 = "很癢耶。"
20047-450 = "……我可沒說要你離開。"
20047-720 = "這是這次的作戰列表。\n是我整理的……可別浪費了哦。"
20047-730 = "來，作戰列表。"
20047-740 = "……你在做什麼？\n不靠近一點不就\n沒辦法一起看了嗎？"
20047-750 = "要聊天的話，等到\n兩人獨處的時候再陪你。"
20047-760 = "現在先專心在作戰上。"
20047-770 = "需要作戰參謀的建言？\n儘管說吧。"
20047-780 = "不愧是老師。\n這種程度，理所當然吧。"
20047-790 = "既然你在努力，\n我也不能輸給你。\n這就是所謂的團隊吧？"

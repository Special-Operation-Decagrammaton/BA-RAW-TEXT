[translation]
20047-320 = "เทศกาลสวนน้ำเฮียกคิยาโค..."
20047-330 = "ทำไมฉันถึง\nมาอยู่ที่นี่ได้นะ?"
20047-340 = "ในเมื่อได้มาเข้าร่วมแล้ว\nฉันก็จะตั้งใจแข่งขัน\nให้ไม่เสียดายในภายหลัง"
20047-350 = "งานเทศกาลใกล้จะจบแล้วสินะ\nฉันได้ประสบการณ์เยอะจริงๆ เลยละ"
20047-360 = "พอใกล้จะจบ\nในใจก็รู้สึกเสียดายอยู่นะ"
20047-370 = "ทั้งๆ ที่ฉันเกลียด\nทะเลเอามากๆ เลย"
20047-380 = "เป็นการแข่งขันที่\nฉันไม่เสียดายเลยละ ขอบคุณ\nที่คอยเฝ้าดูฉันนะ คุณครู"
20047-390 = "อยากได้กลยุทธ์จากฉันเหรอ?"
20047-400 = "ไม่ว่าจะพยายามยังไง\nตัวก็จมน้ำอยู่ดี..."
20047-410 = "หรือว่าฉันออกแรง\nมากเกินไปนะ"
20047-420 = "หะ... หืม?\nมาตั้งแต่ตอนไหนน่ะ คุณครู?"
20047-430 = "ไม่ต้องห่วงนะ เรื่องว่ายน้ำน่ะ\nไม่ใช่เรื่องใหญ่อะไรหรอก"
20047-440 = "จั๊กจี้นะ"
20047-450 = "ฉันไม่ได้บอก\nให้ไปตรงโน้นสักหน่อย..."
20047-720 = "นี่คือภารกิจทั้งหมด\nที่ฉันจัดมาให้ ฉันทำได้ดีใช่มั้ย?"
20047-730 = "เอาละ แจ้งเตือนภารกิจ"
20047-740 = "ทำอะไรน่ะ...? ต้องเข้ามาใกล้กว่านี้สิ\nจะได้ดูด้วยกันได้ไงล่ะ?"
20047-750 = "ถ้าจะคุยเล่น ไว้ฉันจะคุย\nในพื้นที่ส่วนตัวให้เยอะๆ เลย"
20047-760 = "เพราะงั้นตอนนี้ก็\nจดจ่อกับภารกิจก่อนนะ"
20047-770 = "อยากได้คำแนะนำจากที่ปรึกษา\nยุทธศาสตร์เหรอ? บอกมาเลยว่าเรื่องอะไร"
20047-780 = "ตามคาดเลยนะคุณครู ต้องอย่างนี้ละ\nถึงจะเป็นพันธมิตรกับฉันได้"
20047-790 = "พอคุณแสดงฝีมือ ฉันก็มีแรงใจขึ้นมาเลย\nก็เราอยู่ทีมเดียวกันแหละเนอะ?"

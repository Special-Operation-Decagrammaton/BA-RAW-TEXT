[translation]
20047-320 = "The Hyakkiyako Water Festival..."
20047-330 = "How did I get here?"
20047-340 = "Since I am participating, I will play without regrets."
20047-350 = "And so, the festival is coming to a close. I've experienced many new things."
20047-360 = "There is a twinge of bittersweetness at the end."
20047-370 = "I used to despise the sea."
20047-380 = "I have no regrets about this match. Thank you for watching, Sensei."
20047-390 = "Are you in need of my tactics?"
20047-400 = "No matter my efforts, my body simply sinks."
20047-410 = "Perhaps I am exerting too much force..."
20047-420 = "H-Hm? Since when have you been here, Sensei?"
20047-430 = "Worry not. Something like swimming is child's play to me."
20047-440 = "That tickles."
20047-450 = "...That didn't mean you should go away either."
20047-720 = "This is the mission list I personally organized. You're grateful, yes?"
20047-730 = "Now then, begin the operation."
20047-740 = "...What are you doing? You need to close the distance, so we can look together, yes?"
20047-750 = "When we're in private, I'll converse with you as much as you'd like."
20047-760 = "So please focus on the mission for now."
20047-770 = "Do you require the wisdom of an operations officer? Feel free to ask."
20047-780 = "I'd expect nothing less. Any ally of mine must be at least this competent."
20047-790 = "Seeing your work energizes me as well. Perhaps it's a natural consequence of being teammates?"

[translation]
20041-280 = "มาถึงตรงเวลา\nพอดีเลยนะ"
20041-290 = "อื้อ ฉันคิดว่าจะมา\nราวๆ นี้ละ"
20041-300 = "งานกำลังราบรื่น\nแต่ก็ยังวางใจไม่ได้หรอก"
20041-310 = "เกือบถึงแล้วละ"
20041-320 = "คงบอกได้เร็วๆ นี้แล้วนะ"
20041-330 = "โล่งอกไปทีนะที่คลี่คลายได้"
20041-340 = "ฉันพูดจริงนะ..."
20041-350 = "หืม? มีเรื่องอะไรเหรอ?\nจู่ๆ ก็มาสะกิดกัน"
20041-360 = "ถ้าไม่บอกเป็นคำพูด\nฉันก็ไม่เข้าใจหรอกนะ"
20041-370 = "ไม่สิ คือว่า...\nอืม..."
20041-380 = "มีอะไรที่ต้องการ\nหรือเปล่า?"
20041-800 = "ฉันลองสรุป\nงานที่ต้องทำแล้ว"
20041-810 = "มาแล้วเหรอ คุณครู\nนี่คืองานที่ต้องทำวันนี้"
20041-820 = "ถ้าเอาแต่สะกิดกัน\nโดยไม่พูดอะไร..."
20041-830 = "ฉันก็ไม่เข้าใจหรอกนะ"
20041-840 = "หรือว่าอยากให้ฉัน"
20041-850 = "ทำอย่างเดียวกันน่ะ?"
20041-860 = "โอเค ฉันจะเช็กให้นะ"
20041-870 = "ฉันจะเปลี่ยนเป็นลิสต์ที่สมบูรณ์ให้"
20041-11460 = "ถึงจะได้มาเจอกัน\nกลางคัน..."
20041-11470 = "แต่ก็ฝากตัวด้วยนะ ครู"
20041-11480 = "มาได้ถูกจังหวะ\nเลยนะครู"
20041-11490 = "เป็นการกระทำที่\nสมเหตุสมผลมาก"
20041-11500 = "ที่นี่คือฐานของฮิมาริ..."
20041-11510 = "ไม่สิ\nฐานของพวกเราสินะ"
20041-11520 = "ฉันยังรู้สึกว่า\nไม่ใช่เรื่องจริงอยู่เลย"
20041-11530 = "การได้มาทำภารกิจ\nร่วมกันกับครูอย่างนี้น่ะ..."
20041-11540 = "มันอาจจะฟังดูแปลกๆ\nที่ฉันพูดแบบนี้"
20041-11550 = "แต่ทุกคนปฏิบัติตัวกับฉัน\nอย่างเปิดเผยเลย..."
20041-11560 = "ใช่ว่าฉัน\nจะไม่ชอบหรอกนะ..."
20041-11570 = "ถ้าเป็นเรื่องวิศวกรรม..."
20041-11580 = "ขอโทษนะ ฉันยังไม่แตกฉาน\nในเรื่องแบบนั้นน่ะ"
20041-11590 = "เรียกหาฉันเหรอ ครู?\nแค่สงสัยว่าฉัน\nทำอะไรอยู่งั้นเหรอ?"
20041-11600 = "การกระทำที่\nไม่สมเหตุสมผลแบบนั้น\nก็ละๆ บ้างเถอะ"
20041-11610 = "ก็... ใช่ว่าฉัน\nจะไม่ชอบหรอก..."
20041-11620 = "ฉันคิดว่าตัวเอง\nต้องรอบรู้ในทุกเรื่องน่ะ"
20041-11630 = "ตอนนี้ก็คิดว่า...\nยังมีสิ่งที่ต้อง\nเรียนรู้อยู่อีกมาก"
20041-11640 = "น่าทึ่งจังเลย พอมาคิดดู\nนี่ก็คงเป็นเพราะ\nได้ครูช่วยไว้สินะ"
20041-11650 = "ฉันรับช่วงงาน\nต่อจากฮิมาริแล้ว"
20041-11660 = "สรุปว่า... เราเจอวัตถุปริศนา\nที่เกิดจากพลัง"
20041-11670 = "ทวยเทพไร้นาม\nในทุกหนทุกแห่งสินะ"
20041-11680 = "ตอนนี้เราต้องการวัตถุตัวอย่าง\nเพื่อใช้เติมเสบียงอีกครั้ง"
20041-11690 = "มาแล้วเหรอ ครู\nได้ตัวอย่างมาแค่ไหนน่ะ?"
20041-11700 = "ขอบคุณที่ให้ความร่วมมือนะ"
20041-11710 = "ฉันกำลังวิเคราะห์วัตถุปริศนาอยู่\nแล้วก็จะได้ผลลัพธ์จากตรงนั้นละ"
20041-11720 = "ว่าแต่ อุปกรณ์นี้มัน\nร้อนจังเลย..."
20041-11730 = "เอมิน่าจะลำบาก\nพอตัวเลยนะ"
20041-11740 = "ฉันไม่มีอะไรไม่พอใจในโครงสร้าง\nการทำงานของอุปกรณ์นี้หรอก"
20041-11750 = "แปลกใจงั้นเหรอ? ฮุฮุ เห็นอย่างนี้\nฉันก็ยอมรับในสิ่งที่ต้องยอมรับนะ"
20041-11760 = "แต่ว่าดีไซน์มัน\nมันควรจะ..."
20041-11770 = "ต่อให้มาชวนฉันคุย\nก็ไม่มีอะไรเปลี่ยนแปลงหรอก"
20041-11780 = "หืม? ทำแล้วจะได้เห็น\nฉันเปลี่ยนสีหน้างั้นเหรอ?"
20041-11790 = "เข้าใจแล้ว... เพราะแบบนี้สินะ\nคนถึงบอกว่าบางครั้งครูก็ใจร้ายน่ะ..."
20041-11800 = "นี่คือผลลัพธ์จาก\nการวิเคราะห์ในครั้งนี้"
20041-11810 = "ยินดีต้อนรับค่ะ\nจะรับชิ้นไหนเหรอคะ?"
20041-11820 = "ฉันแค่ลองเลียนแบบดูน่ะ...\nลืมเรื่องเมื่อกี้ไปเถอะ"
20041-11830 = "เมื่อนานมาแล้ว ฉันเคยบอกว่า\nได้แลกเปลี่ยนสิ่งของแบบนี้"
20041-11840 = "ในบางมุมก็รู้สึกเหมือน\nได้ย้อนกลับไปยังอดีตเลย"
20041-11850 = "เป็นผลลัพธ์ที่สมเหตุสมผลเลยละ\nเลือกได้ดีมาก"
20041-11860 = "ได้ผลออกมาแล้ว\nฉันจะให้ครูเป็นคนเลือกแล้วกัน"
20041-11870 = "จากตรงนี้ไป\nฉันใช้วิธีวิเคราะห์\nที่ต่างออกไปหน่อย"
20041-11880 = "ถ้าให้พูดง่ายๆ คือ\nมันเป็นผลมาจาก\nความบังเอิญน่ะ"
20041-11890 = "พวกของอย่างล็อตเตอรีน่ะ\nมีความเป็นไปได้สูงที่จะสูญเสีย"
20041-11900 = "แต่กับตรงนี้...\nก็คงช่วยไม่ได้ละนะ"
20041-11910 = "เหมือนว่าฮิมาริจะยัง\nชอบอะไรแบบนี้อยู่นะ"
20041-11920 = "ก็นะ... ลองดูหลายๆ แบบ\nก็น่าจะดีเหมือนกัน"
20041-11930 = "การคาดการณ์\nผลการวิเคราะห์\nอย่างแม่นยำไม่ได้..."
20041-11940 = "ในฐานะที่สังกัดเซมิน่าแล้ว\nมันน่าเสียใจนิดหน่อยนะ"
20041-11950 = "ถ้าหากผลลัพธ์\nออกมาไม่ดีละก็..."
20041-11960 = "ขอโทษนะ ครู\nส่วนนั้นฉันเองก็\nทำอะไรให้ไม่ได้"
20041-11970 = "ถึงท้ายที่สุด\nมันจะผิดพลาด"
20041-11980 = "แต่พระเจ้าก็ไม่แค่\nทอยลูกเต๋าเล่นหรอก"
20041-11990 = "ฉันเข้าใจ\nด้านนั้นดี"
20041-12000 = "เรื่องกลศาสตร์ควอนตัมน่ะ\nที่จริงแล้วมันไม่ใช่\nเรื่องที่จะเข้าใจได้หรอก"
20041-12010 = "ก็แค่... ท่องจำ\nแล้วริเริ่มดูน่ะ"
20041-12020 = "ว่ากันว่าโลก\nอยู่นอกเหนือ\nการรับรู้ของเรา"
20041-12030 = "อืม... เหมือนกับการวิเคราะห์ที่\nฝากไว้กับโชคนี้ละ"
20041-12040 = "จะได้...\nจริงๆ เหรอ?"
20041-12050 = "นี่คงเป็นกฎ\nว่าด้วยจำนวนมากสินะ"
20041-12060 = "ถ้าไม่ถูก\nก็ต้องเล่นจนกว่าจะถูก"
20041-12070 = "มันก็ไม่ใช่คำที่ผิดหรอกนะ..."
20041-12080 = "เรื่องส่วนใหญ่ของโลกเกิดจาก\nการแจกแจงแบบปกติอยู่แล้ว"
20041-12090 = "ยินดีด้วยนะ ครู\nทำได้ดีมาก"

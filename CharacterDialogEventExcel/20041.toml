[translation]
20041-280 = "時機相當適當呢。"
20041-290 = "我也覺得你應該\n差不多要到了。"
20041-300 = "一切都很順利。\n不過，還不到\n可以安心的階段。"
20041-310 = "不久之後，應該就能\n給出統整好的報告。"
20041-320 = "再稍等一會吧。"
20041-330 = "能解決真是太好了。"
20041-340 = "……這是我的真心話。"
20041-350 = "……突然碰我，\n有什麼事嗎？"
20041-360 = "能請你用說的\n告訴我嗎？"
20041-370 = "所以……那個……"
20041-380 = "你找我……\n是想尋求什麼嗎？"
20041-800 = "清單的列舉已經完成了。"
20041-810 = "這就是今日的待辦事項。"
20041-820 = "……無法理解老師的意圖。"
20041-830 = "默默觸摸可是\n無法傳達的哦。"
20041-840 = "莫非……"
20041-850 = "你希望我做同樣的事嗎？"
20041-860 = "我會確認的。"
20041-870 = "清單已經更新了。"
20041-11460 = "雖然是以中途參加\n的形式……"
20041-11470 = "……往後請多\n指教囉，老師。"
20041-11480 = "你是個能夠\n嚴守時間的人呢。"
20041-11490 = "真是合理的行動。"
20041-11500 = "這裡就是陽葵的……"
20041-11510 = "不，是我們的基地啊。"
20041-11520 = "……我還是，\n有點缺乏實感。"
20041-11530 = "對於能跟老師……\n參加同一個作戰這點。"
20041-11540 = "……大家對待我\n都還挺隨興的。"
20041-11550 = "雖然我沒有\n不喜歡的意思……"
20041-11560 = "但讓我感到\n有點困惑也是事實。"
20041-11570 = "在工學的範圍以外……"
20041-11580 = "對不起，我\n並不是那麼了解。"
20041-11590 = "……怎麼了嗎？\n……只是試著搭話而已？"
20041-11600 = "那種不合理的行為，\n還請克制一點，老師。"
20041-11610 = "……但我也沒說不喜歡。"
20041-11620 = "以前，我曾認為\n必須掌握一切。"
20041-11630 = "不過現在……我已經\n察覺一名人類能夠掌握的\n範疇是存在極限的。"
20041-11640 = "……也許，\n是多虧了老師吧。"
20041-11650 = "我從陽葵那邊接手了。"
20041-11660 = "現在，各地都能發現\n因「無名之神」──"
20041-11670 = "而產生的神祕物質。"
20041-11680 = "只要有樣本的話，\n要重新補給也是可能的。"
20041-11690 = "讓我看看\n收集回來的樣本吧。"
20041-11700 = "謝謝你的合作。"
20041-11710 = "正在進行「物質」的分析。\n並且從中生產副產物。"
20041-11720 = "這個裝置，會放出\n相當多的熱氣呢……"
20041-11730 = "對英美來說\n可能會有點辛苦。"
20041-11740 = "我對裝置的構造\n並沒有不滿。"
20041-11750 = "覺得意外？呵呵，即便是我，\n面對優秀的東西也會老實承認的。"
20041-11760 = "不過，要是設計跟細節\n能再多一些合理性……"
20041-11770 = "……就算做那種事情，\n我也不認為能有所收穫。"
20041-11780 = "……能見到\n我表情的變化？"
20041-11790 = "……你之所以被說奇怪\n的理由，我現在知道了。"
20041-11800 = "這是這次的分析結果。"
20041-11810 = "歡迎光臨，\n請問要點什麼呢？"
20041-11820 = "……只是模仿一下而已。\n剛才的請你忘了吧。"
20041-11830 = "過去所謂的\n「以物易物」……"
20041-11840 = "就是這麼回事嗎。"
20041-11850 = "是合理的選擇呢。"
20041-11860 = "最終選擇就交給你了。"
20041-11870 = "這個地方，採用了\n稍有差異的分析方法。"
20041-11880 = "一言以蔽之──就是\n「基於偶然的提取」。"
20041-11890 = "因「彩券」而損失的\n可能性，在機率學上\\也已經得到了證明。"
20041-11900 = "……不過，\n現在也沒辦法了。"
20041-11910 = "……陽葵的嗜好\n依舊沒變呢。"
20041-11920 = "……多方面的考察\n也是必要的。嗯嗯。"
20041-11930 = "對於分析結果的預測\n無法正確執行這點……"
20041-11940 = "作為研討會的一員，\n實在有點遺憾。"
20041-11950 = "即便無法獲得與\n預期相同的結果……"
20041-11960 = "我也無能為力。\n在此先向你道歉。"
20041-11970 = "「神不會擲骰子」……"
20041-11980 = "這個命題雖然被\n認為是錯誤的……"
20041-11990 = "但我──\n在某方面是同意的。"
20041-12000 = "量子力學這門學問，\n並不是用來理解。"
20041-12010 = "……是用來背誦的。"
20041-12020 = "所謂的世界，是存在於\n人類認知之外的東西。"
20041-12030 = "……是啊，就跟這種\n依靠運氣的分析一樣。"
20041-12040 = "那是……！\n居然真的……？"
20041-12050 = "大數法則……是嗎。"
20041-12060 = "抽到中獎為止……？"
20041-12070 = "理論上，雖然\n這樣並沒有錯……"
20041-12080 = "世界的絕大部分都\n存在於常態分佈之中……"
20041-12090 = "你辦到了呢，老師。\n恭喜你。"

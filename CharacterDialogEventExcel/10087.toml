[translation]
10087-260 = "歡迎回來，老師。"
10087-270 = "準備都做好了嗎？"
10087-280 = "請確實做好覺悟哦。"
10087-290 = "準備已經順利完成。"
10087-300 = "身為格黑娜風紀\n委員會的行政官……"
10087-310 = "我想現在正是\n展開行動的時候。"
10087-320 = "沒這麼容易結束……\n是這麼回事吧。"
10087-330 = "算了，即便如此\n也不能放棄。"
10087-340 = "真是超～級！\n難纏耶！"
10087-350 = "唉……算了！"
10087-360 = "既然如此，\n我也做好奉陪\n到底的覺悟了！"
10087-370 = "來吧，繼續\n拜託您了！老師！"
10087-380 = "終於結束了……"
10087-390 = "真的發生了\n很多事……"
10087-400 = "已經筋疲力盡了。"
10087-410 = "……回去喝杯\n咖啡怎麼樣？老師。"
10087-420 = "這次的派對\n結果也變成這樣……"
10087-430 = "真的是，\n究竟會如何呢。"
10087-440 = "算了，無所謂……"
10087-450 = "不管發生什麼事，\n我們風紀委員會……"
10087-460 = "不，我一定\n會想辦法解決！"
10087-470 = "現在的我是\n協助陽奈委員長的\n另一名間諜。"
10087-480 = "既然如此，\n是時候展現一直\n隱藏的真正實力了。"
10087-490 = "呵呵，敬請期待吧。"
10087-500 = "本來還在想今年\n會不會安靜一點……"
10087-510 = "不，在格黑娜終究是\n無稽之談吧……唉。"
10087-820 = "歡迎回來，老師。"
10087-830 = "正好有事希望\n老師幫忙解決。"
10087-840 = "可以拜託您嗎？"
10087-850 = "呵呵，既然都來到這裡了，\n請別以為還逃得走哦。"
10087-860 = "沒錯，業務清單\n滿～滿的唷♪"
10087-870 = "來～如果想偷懶\n還是死了這條心吧。"
10087-880 = "因為我會在旁邊監視……\n不好意思，是輔佐。"
10087-890 = "在做眼前的工作之前，\n會想做其他事的心情我也能理解。"
10087-900 = "不過……那還是要等\n工作全部結束再說。"
10087-910 = "……知道了嗎？"
10087-920 = "嘿～挺厲害的嘛。"
10087-930 = "來，工作自然會有報酬。\n這是當然的。"
10087-940 = "竟然……\n一口氣解決掉了嗎。"
10087-950 = "嘿……老實說我很佩服。\n不愧是老師呢。"

[translation]
10087-260 = "Welcome, Sensei."
10087-270 = "Are you ready?"
10087-280 = "Be prepared. Stay strong."
10087-290 = "All the proper preparations are in place."
10087-300 = "As the Senior Administrator of Gehenna's Prefect Team..."
10087-310 = "Now is the time to take a stand."
10087-320 = "You think this won't be resolved easily?"
10087-330 = "Well, I can't simply give up."
10087-340 = "Seriously! You are persistent!"
10087-350 = "Phew, yeah, all right!"
10087-360 = "With that, I should be ready to fight until the end!"
10087-370 = "Now, please, Sensei! Let's go!"
10087-380 = "It's finally over..."
10087-390 = "Wow. There really was a lot going on today..."
10087-400 = "It feels like all the tension has been completely drained out of me."
10087-410 = "...Would you like to head back and grab a cup of coffee, Sensei?"
10087-420 = "As for the party..."
10087-430 = "How is this all going to turn out?"
10087-440 = "Well, it doesn't matter..."
10087-450 = "Whatever happens, the Prefect Team..."
10087-460 = "No, I will be there to solve it!"
10087-470 = "Right now, I'm just a spy backing Head Prefect Hina."
10087-480 = "I've been holding back. Maybe it's time that I showed off my true skills."
10087-490 = "Heehee. Look forward to it."
10087-500 = "And here I thought it would be quiet this year..."
10087-510 = "But I guess that'd be too much to ask for in Gehenna. Phew."
10087-820 = "Welcome, Sensei."
10087-830 = "I had something I was hoping that you could solve for me."
10087-840 = "Could you help me?"
10087-850 = "Heehee. No running away, now! Especially after coming this far."
10087-860 = "Yup, your to-do list is filled to the brim. ♪"
10087-870 = "That's right. If you're thinking of playing hooky, you better think again."
10087-880 = "I'll be right next to you. Carefully monitoring... I mean assisting you."
10087-890 = "I can understand the desire to do anything but the task right before you."
10087-900 = "However, that extra stuff can wait until after your work is done."
10087-910 = "You follow?"
10087-920 = "Hmm... Not bad."
10087-930 = "A fine reward for fine work. It's only natural."
10087-940 = "Oh my... You solved it in a single try?"
10087-950 = "Wow... I'm impressed. Truly. As expected of you, Sensei."

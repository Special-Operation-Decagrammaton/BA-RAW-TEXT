[translation]
10087-260 = "어서 오세요. 선생님."
10087-270 = "준비는 모두 되셨나요?"
10087-280 = "각오, 단단히 해주세요."
10087-290 = "준비라면 차질 없이\n완료되었습니다."
10087-300 = "게헨나 선도부의\n행정관으로서…"
10087-310 = "지금이야말로 일어설 때겠죠."
10087-320 = "간단하게는\n끝나지 않는다…라는\n말씀이시군요."
10087-330 = "뭐, 그렇다고\n포기할 수는 없지만요."
10087-340 = "저어엉말~! 끈질기네요!"
10087-350 = "후우, 뭐, 좋아요!"
10087-360 = "그렇다면 이쪽도 끝까지\n해줄 각오가 되어있으니까!"
10087-370 = "자, 계속해서\n부탁드린다구요! 선생님!"
10087-380 = "드디어 끝났나요……."
10087-390 = "정말 여러 가지 일이\n있었다고 할지."
10087-400 = "이젠 진이 빠졌다고 할지."
10087-410 = "……돌아가서 커피라도\n한잔하실래요? 선생님."
10087-420 = "이번 파티도\n결국 이렇게……."
10087-430 = "정말, 어떻게\n되어버리는 걸까요."
10087-440 = "뭐, 상관없어요…."
10087-450 = "무슨 일이 일어나도,\n우리 선도부가……."
10087-460 = "아니, 제가\n해결해 보이겠어요!"
10087-470 = "지금의 전 히나 부장님을\n보좌하는 또 한 명의 스파이."
10087-480 = "역시 여기에선, 그간 감춰왔던\n진정한 실력을 보일 때겠죠."
10087-490 = "후후, 기대하시라구요."
10087-500 = "올해는\n조용하나 싶었더니……."
10087-510 = "아니, 게헨나에선 역시\n무리인 이야기려나요. 하아."
10087-820 = "어서 오세요. 선생님."
10087-830 = "마침 해결해 주셨으면 하는\n일이 있어서요."
10087-840 = "부탁드려도 될까요?"
10087-850 = "후후, 여기까지 오셨다면\n도망칠 수 없습니다."
10087-860 = "네, 업무 리스트가\n잔뜩♪ 이니까요."
10087-870 = "네에, 땡땡이 치실\n생각이라면 그만두세요."
10087-880 = "제가 바로 곁에서 감시…\n실례, 보좌하고 있으니까요."
10087-890 = "눈앞에 닥친 일을 하기 전에,\n딴짓을 하고 싶은 마음은 이해해요."
10087-900 = "다만 그런 건 일이 전부 끝난 후에."
10087-910 = "…아시겠죠?"
10087-920 = "흐응~ 제법이잖아요."
10087-930 = "네, 일한 보수는 제대로 있어요.\n당연한 일이에요."
10087-940 = "세상에…\n단번에 해결하신 건가요."
10087-950 = "헤에… 솔직히 감탄했습니다.\n역시 선생님이시네요."

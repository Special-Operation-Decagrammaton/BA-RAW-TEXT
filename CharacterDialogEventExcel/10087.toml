[translation]
10087-260 = "เชิญค่ะ คุณครู"
10087-270 = "ทุกอย่างพร้อมหรือยังคะ?"
10087-280 = "เตรียมตัวให้ดีด้วยนะคะ"
10087-290 = "เรื่องเตรียมการ\nสำเร็จอย่างราบรื่นแล้วค่ะ"
10087-300 = "ในฐานะเจ้าหน้าที่ของ\nคณะกรรมการวินัยเกเฮนน่า"
10087-310 = "ตอนนี้คือเวลาที่ฉันต้องลุกขึ้นมาค่ะ"
10087-320 = "มันคงจะไม่จบลงไป\nได้ง่ายๆ เลย... สินะคะ"
10087-330 = "แต่ถึงอย่างนั้น\nก็จะล้มเลิกไม่ได้หรอกค่ะ"
10087-340 = "ไม่ยอมถอดใจจริงๆ เลยนะคะ~!"
10087-350 = "ฮู่ว แต่ก็ดีค่ะ!"
10087-360 = "ถ้างั้นทางเราก็จะเตรียมพร้อม\nจนจบเรื่องให้เหมือนกัน!"
10087-370 = "เอาละ ต้องขอรบกวน\nต่อเลยนะคะ คุณครู!"
10087-380 = "ในที่สุดก็จบสักทีนะคะ..."
10087-390 = "ฉันควรบอกว่า\nเกิดเรื่องขึ้นมากมายเลย"
10087-400 = "หรือว่าตอนนี้หมดแรงแล้วดีนะ"
10087-410 = "กลับไปดื่มกาแฟ\nกันสักแก้วไหมคะคุณครู?"
10087-420 = "สุดท้ายแล้ว\nปาร์ตี้ครั้งนี้ก็..."
10087-430 = "จริงๆ เลย เป็นแบบนี้\nขึ้นมาได้ยังไงคะเนี่ย"
10087-440 = "แต่ก็ไม่เป็นไรหรอกค่ะ"
10087-450 = "ไม่ว่าจะเกิดเรื่องอะไร\nคณะกรรมการวินัยของเรา..."
10087-460 = "ไม่สิ ฉันจะ\nลองคลี่คลายดูค่ะ!"
10087-470 = "นักสืบอีกคนที่มาเป็นผู้ช่วย\nหัวหน้าฮินะก่อนหน้านี้"
10087-480 = "ตอนนี้ถึงเวลาแสดงฝีมือที่แท้จริง\nที่ซ่อนมาตลอดแล้วค่ะ"
10087-490 = "ฮุฮุ ตั้งตารอได้เลยค่ะ"
10087-500 = "ก็คิดอยู่ว่า\nปีนี้จะเงียบๆ รึเปล่า..."
10087-510 = "ไม่สิ เรื่องแบบนั้นคงยาก\nที่จะเกิดในเกเฮนน่ารึเปล่าคะ? เฮ้อ"
10087-820 = "เชิญค่ะ คุณครู"
10087-830 = "มีเรื่องที่ฉันอยากให้\nช่วยคลี่คลายพอดีเลยค่ะ"
10087-840 = "ช่วยหน่อยได้มั้ยคะ?"
10087-850 = "ฮุฮุ ถ้ามาถึงตรงนี้แล้ว\nก็หนีไม่ได้แล้วละค่ะ"
10087-860 = "ค่ะ เพราะงานที่ต้องทำ\nยาวเป็นหางว่าวเลยค่ะ♪"
10087-870 = "ค่ะ หยุดความคิดที่จะ\nโดดงานเลยนะคะ"
10087-880 = "ฉันจับตาดูอยู่ข้างๆ... ขอโทษค่ะ\nเป็นเพราะฉันคอยช่วยเหลืออยู่น่ะค่ะ"
10087-890 = "ฉันเข้าใจความรู้สึกที่อยากทำอย่างอื่น\nก่อนจะทำเรื่องที่อยู่ตรงหน้าค่ะ"
10087-900 = "แต่เรื่องแบบนั้น เอาไว้ทำหลังจากงานจบ"
10087-910 = "เข้าใจมั้ยคะ...?"
10087-920 = "หืม~ ไม่ธรรมดาเลยนะคะ"
10087-930 = "ค่ะ ฉันมีค่าตอบแทนจากงาน\nอย่างสมน้ำสมเนื้อเลย มันแน่อยู่แล้วค่ะ"
10087-940 = "อะ... อะไรกันน่ะ...!\nอะไรกัน...!"
10087-950 = "เอ๋... พูดตามตรงว่าประทับใจเลยค่ะ\nสมกับที่เป็นคุณครูเลย"

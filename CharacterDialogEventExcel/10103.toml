[translation]
10103-10 = "The prestige of Red Winter and Shanhaijing hang in the balance of this exchange meeting..."
10103-20 = "It must be a success, no matter what!"
10103-30 = "You want to know what I'm doing here?"
10103-40 = "As you can plainly see, I'm in the middle of escorting the Great Leader, for her safety."
10103-50 = "H-Huh? Great Leader Cherino?! Where did she go?"
10103-60 = "What does Shanhaijing think they're doing? Treating us like this..."
10103-70 = "Don't think I'll let them get away with it!"
10103-80 = "Allowing a coup d'etat in front of outsiders..."
10103-90 = "Those Shanhaijing guys have really embarrassed themselves."
10103-100 = "If we were talking about Red Winter Federal Academy..."
10103-110 = "...Ahem! A coup d'etat is really a minor issue."
10103-120 = "*sigh* I'm exhausted..."
10103-130 = " I never thought I'd start to miss the snowfields of Red Winter."
10103-140 = "The streets of Shanhaijing are too complicated..."
10103-150 = "They aren't suited for a charge."
10103-160 = "Intimidated by a single club..."
10103-170 = "The members of the Genryumon must be softer than they look."
10103-180 = "For the sake of the authority of the student council..."
10103-190 = "We can't let things slide, no matter how hard our opponents try to persuade..."
10103-200 = "Hm? What am I holding?"
10103-210 = "...Just some dumplings I got for free from the Black Tortoise Promenade."
10103-220 = "The president's bodyguard gave me sunglasses..."
10103-230 = "Her outfit, her presence... She was no ordinary person."
10103-240 = "I heard that it's a rule that you can't wear a slip under a qipao."
10103-250 = "Is that right?"
10103-260 = "I don't want to insult the customs of other academies, but..."
10103-270 = "It just doesn't seem like the right outfit for a charge..."
10103-520 = "What are you doing here? I'm just organizing what we need for the exchange meeting..."
10103-530 = "Would you mind donating some supplies?"
10103-540 = "I think this exchange meeting is going to be larger than expected."
10103-550 = "The exchange meeting is over, but supply donations are always welcome."
10103-560 = "We're all in the same boat, so we might as well help other academies."
10103-570 = "(This Peking opera mask...is kind of scary if you stare at it long enough...)"
10103-580 = "Oh, that's a good item."
10103-590 = "We have enough to hold a successful exchange meeting."
10103-600 = "Um... Sensei. I'm not making any accusations, but...where did you get all these supplies...?"
10103-610 = "Excellent! Sensei's name will continue to be praised in both schools!"

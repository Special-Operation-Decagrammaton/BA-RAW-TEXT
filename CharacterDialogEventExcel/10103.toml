[translation]
10103-10 = "赤冬與山海經，\n攸關兩校威信的\n這場交流會……"
10103-20 = "無論如何都得\n辦成功才行！"
10103-30 = "問我在這裡做什麼？"
10103-40 = "如你所見，正在\n擔任守護書記長\n安全的護衛──"
10103-50 = "……不，不見了！？\n潔莉諾書記長！？\n您在哪裡！？"
10103-60 = "山海經究竟\n在打什麼主意？\n這樣對待我們……"
10103-70 = "別想就這麼算了！"
10103-80 = "居然在外校學生面前\n讓騷動發生……"
10103-90 = "山海經也出盡洋相了啊。"
10103-100 = "換作是我們赤冬\n聯邦學園的話，\n那種事絕對……！"
10103-110 = "……咳哼！\n算了，那種程度\n只是小問題而已。"
10103-120 = "呼……好累……"
10103-130 = "想不到竟然會有\n開始懷念起赤冬\n雪原的這天啊……"
10103-140 = "山海經的街道\n就跟迷宮一樣……"
10103-150 = "並不適合突擊啊。"
10103-160 = "哈！竟然會因為區區\n一個社團陷入苦戰……"
10103-170 = "玄龍門也不怎麼樣嘛。"
10103-180 = "為了樹立\n我大事務局的權威，"
10103-190 = "對方無論使出任何手段\n都絕不會受到懷柔，\n而會穩重地──"
10103-200 = "……嗯？這個嗎？"
10103-210 = "是玄武商會\n招待的中華包子。"
10103-220 = "我從門主的護衛\n手中收到了墨鏡。"
10103-230 = "外表也好，\n存在感也罷，那……\n絕非等閒之輩啊……"
10103-240 = "聽說在旗袍裡面穿\n內衣是不合規矩的……"
10103-250 = "真的是這樣嗎？"
10103-260 = "雖然應該尊重\n他校的風俗……"
10103-270 = "但這似乎並非\n適合突擊的服裝啊……"
10103-520 = "有什麼事？我嗎？\n正在為交流會做整理。"
10103-530 = "不介意的話，\n物資的捐贈可以麻煩你嗎？"
10103-540 = "這次的交流會，規模\n似乎會變得比預期中更大啊。"
10103-550 = "交流會雖然結束了……\n但物資的捐贈隨時都很歡迎。"
10103-560 = "既然都走到這一步了，\n就對他校伸出援手吧。"
10103-570 = "（京劇的面具……\n仔細一看，好像有點可怕……）"
10103-580 = "哦哦，這是好東西啊。"
10103-590 = "有這麼多的話，\n交流會肯定會成功的。"
10103-600 = "那個……老師。我沒有\n要懷疑你的意思……但這麼多\n的物資，你究竟是從哪裡……？"
10103-610 = "太厲害了！老師的名號，\n將會被兩校不斷傳頌吧！"

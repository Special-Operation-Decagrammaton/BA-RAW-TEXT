[translation]
10103-10 = "เรดวินเทอร์กับซานไห่จิง\nงานแลกเปลี่ยนนี้... มีศักดิ์ศรี\nของ 2 โรงเรียนเป็นเดิมพัน"
10103-20 = "ไม่ว่ายังไงก็ต้อง\nทำให้สำเร็จให้ได้!"
10103-30 = "ฉันมาทำอะไร\nอยู่ที่นี่น่ะเหรอ?"
10103-40 = "ก็อย่างที่เห็นว่า\nฉันกำลังคุ้มกัน\nท่านเลขาธิการอยู่"
10103-50 = "เอะ... เอ๋?\nท่านเลขานุการเชริโน่?!\nไปไหนซะแล้วล่ะ?"
10103-60 = "พวกเด็กซานไห่จิง\nคิดแผนการอะไรอยู่กันแน่นะ?\nถึงได้ปฏิบัติต่อพวกเรา\nกันขนาดนี้..."
10103-70 = "อย่าคิดว่าฉันจะ\nยอมปล่อยไปเฉยๆ นะ!"
10103-80 = "ปล่อยให้มีการปฏิวัติ\nต่อหน้าคนนอกแบบนี้..."
10103-90 = "เจ้าพวกซานไห่จิง\nทำเรื่องน่าอับอายเสียจริง"
10103-100 = "ถ้าเป็นสถาบันสหภาพ\nเรดวินเทอร์ของเราละก็\nไม่มีทางเด็ดขาด...!"
10103-110 = "อะแฮ่ม...!\nก็แค่การปฏิวัติ\nเรื่องเล็กน้อยน่า"
10103-120 = "เฮ้อ เหนื่อยจัง..."
10103-130 = "ไม่คิดเลยว่าจะ\nคิดถึงทุ่งหิมะ\nของเรดวินเทอร์ขึ้นมา"
10103-140 = "ถนนหนทางในซานไห่จิง\nซับซ้อนเหลือเกิน..."
10103-150 = "ไม่เหมาะสำหรับ\nการบุกจู่โจมเลย"
10103-160 = "ประหม่ากับแค่\nชมรมอะไรเนี่ยนะ"
10103-170 = "พวกมังกรดำก็\nอ่อนแอกว่าที่เห็นแฮะ"
10103-180 = "หากจะเพิ่มอำนาจ\nของสภานักเรียนละก็"
10103-190 = "ไม่ว่าอีกฝ่ายจะเสนอ\nการประนีประนอมยังไง\nก็ไม่ควรหลงกล..."
10103-200 = "หืม? ฉันกำลังถือ\nอะไรอยู่น่ะเหรอ?"
10103-210 = "เกี๊ยวที่ย่านการค้าเทพเต่าดำ\nแถมมาให้น่ะสิ"
10103-220 = "ฉันได้แว่นกันแดดเป็นของขวัญ\nจากผู้พิทักษ์ของประมุขมาน่ะ..."
10103-230 = "ทั้งการแต่งตัวและกิริยาท่าทาง...\nดูไม่ใช่คนธรรมดาๆ เลยละ..."
10103-240 = "ได้ยินว่ามีกฎ\nห้ามใส่กางเกงซับใน\nในชุดกี่เพ้าด้วยนะ"
10103-250 = "แบบนี้ถูกต้องจริงๆ เหรอ?"
10103-260 = "ฉันไม่ได้จะดูหมิ่นธรรมเนียม\nของโรงเรียนอื่นหรอกนะ"
10103-270 = "แต่ชุดแบบนี้มัน\nดูไม่เหมาะสม\nกับการบุกจู่โจมเลย..."
10103-520 = "นี่มันเรื่องอะไรกันเนี่ย?\nทำไมฉันถึงมาจัดของที่จำเป็น\nในงานแลกเปลี่ยนอยู่ที่นี่..."
10103-530 = "ถ้าไม่ว่าอะไร ช่วยบริจาค\nสิ่งของหน่อยได้มั้ย?"
10103-540 = "งานแลกเปลี่ยนครั้งนี้\nดูเป็นงานใหญ่กว่าที่คิดน่ะ"
10103-550 = "งานแลกเปลี่ยนจบไปแล้ว\nแต่ก็มาบริจาคของได้ทุกเมื่อนะ"
10103-560 = "ในเมื่อลงเรือลำเดียวกันแล้ว\nต่อให้เป็นโรงเรียนอื่นก็ต้องช่วยกันสิ"
10103-570 = "(หน้ากากงิ้วนี่มัน...\nแค่จ้องก็น่ากลัวแล้ว...)"
10103-580 = "โอ้ว เป็นของที่ดีเลยนะ"
10103-590 = "มีเยอะขนาดนี้ คงจัดงานแลกเปลี่ยนได้สำเร็จแน่"
10103-600 = "นี่... ครู ฉันไม่ได้ข้องใจหรอกนะ...\nแต่ไปเอาของมาจากไหนตั้งเยอะตั้งแยะน่ะ...?"
10103-610 = "ยอดเยี่ยม! ชื่อของคุณครู\nคงเป็นที่พูดถึงในหมู่เด็กนักเรียน\nของสองโรงเรียนต่อไปแน่นอน!"

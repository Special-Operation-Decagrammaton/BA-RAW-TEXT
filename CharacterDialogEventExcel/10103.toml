[translation]
10103-10 = "붉은겨울과 산해경,\n양 학교의 위신이 걸린\n이 교류회는…"
10103-20 = "어떻게 해서든\n성공시켜야 해!"
10103-30 = "이곳에서 무얼\n하고 있느냐고?"
10103-40 = "보다시피 서기장님을\n지키기 위해 호위를\n하고 있던 중이었다만—"
10103-50 = "어, 어라?\n체리노 서기장님?!\n어디에 가셨지?"
10103-60 = "산해경 녀석들은 도대체\n무슨 꿍꿍이인 거지?\n우리를 이렇게\n취급하기나 하고…"
10103-70 = "그냥 넘어갈 거라고는\n생각지 마라!"
10103-80 = "외부인 앞에서\n쿠데타를 허용하다니."
10103-90 = "산해경 녀석들,\n부끄러운 추태를 보였군."
10103-100 = "우리 붉은겨울\n연방학원이라면\n결단코…!"
10103-110 = "…크흠! 뭐,\n쿠데타 정도야\n사소한 문제지."
10103-120 = "후우, 지쳤다…"
10103-130 = "설마 붉은겨울의\n설원이 그리워지게\n될 줄은 몰랐네."
10103-140 = "산해경의 거리는\n너무 복잡해서…"
10103-150 = "돌격하기에\n적합하지가 않군."
10103-160 = "일개 동아리에\n쩔쩔매고 있다니,"
10103-170 = "현룡문 녀석들도\n보기보다 무르군."
10103-180 = "학생회의 권위를\n드높이기 위해서는,"
10103-190 = "상대가 어떤\n회유책을 건네더라도\n넘어가지 말아야—"
10103-200 = "응? 지금 들고 있는 게\n뭐냐고?"
10103-210 = "…현무상회에서 서비스로\n받은 중화만두다만."
10103-220 = "문주의 경호원으로부터\n선글라스를 선물 받았다…"
10103-230 = "차림도, 존재감도, 뭔가…\n평범하지 않은 자였어…"
10103-240 = "치파오의 아래에는\n속바지를 입으면\n안 된다는\n룰이 있다던데."
10103-250 = "정말로 이게 맞는 건가?"
10103-260 = "다른 학원의 관습을\n무시할 생각은 아니지만,"
10103-270 = "어쩐지 돌격하기에\n적합하지 않은\n차림 같은데…"
10103-520 = "여기는 무슨 일이지?\n나는 이곳에서 교류회에 필요한\n물건을 정리하고 있었다만…"
10103-530 = "괜찮다면 물자를 좀\n기부해 주지 않겠나?"
10103-540 = "이번 교류회는 생각보다\n규모가 커질 것 같아서 말이야."
10103-550 = "교류회는 끝났지만\n물자 기부라면 언제든 환영이다."
10103-560 = "같은 배를 탄 이상,\n다른 학원이라도 함께 도와야지."
10103-570 = "(이 경극 가면… 가만히\n쳐다보고 있으면 뭔가 무섭단 말이지…)"
10103-580 = "오, 좋은 물건이로군."
10103-590 = "이만한 양이라면 성공적인 교류회를 개최할 수 있겠어."
10103-600 = "저… 선생. 의심하는 것은 아니다만… \n이렇게 많은 물자를, 도대체 어디서…?"
10103-610 = "훌륭해! 선생의 이름은 두 학교에서\n계속해서 회자될 것이다!"

[translation]
20030-220 = "<ฮาโลเฟสติวัล>...\nวันแห่งการเริ่มต้นเส้นทาง\nแห่งอาหารเลิศรสครั้งใหม่\nมาถึงแล้วสินะคะ"
20030-230 = "มาแล้วเหรอคะ คุณครู"
20030-240 = "ถ้างั้นตั้งแต่นี้คุณครูกับฉัน..."
20030-250 = "เรามาลองทำชาเลนจ์\nพิชิตร้านอาหารแผงลอยกันมั้ยคะ?"
20030-260 = "ฉันเป็นพวกกินเท่าไร\nก็ไม่ค่อยอ้วนน่ะค่ะ แต่ว่า\nฉันกินได้ไม่เยอะหรอกนะคะ..."
20030-270 = "ไม่ว่ายังไง\nก็รู้สึกเสียดายอยู่ดีค่ะ"
20030-280 = "ยังรู้สึกอยากขยับร่างกาย\nต่ออีกสักหน่อยน่ะค่ะ"
20030-290 = "ฉันร่วมแข่งกินขนมปังด้วย\nได้หรือเปล่าคะ?"
20030-300 = "ร้านแผงลอยใน <ฮาโลเฟสติวัล>\nก็เหมือนกับงาน 'นิทรรศการ\nอาหารเลิศรส' เลยละค่ะ~"
20030-310 = "อ่า... รสชาติที่ล้ำลึก\nจะต้องอยู่ที่นั่นไม่ผิดแน่...!"
20030-320 = "คุณครู... ไปเดินดูด้วยกัน\nสักหน่อยมั้ยคะ?"
20030-330 = "นานๆ ทีได้ใส่ชุดที่ต่างจากปกติ\nก็ดีเหมือนกันนะคะ"
20030-570 = "<ฮาโลเฟสติวัล>...\nวันแห่งการเริ่มต้นเส้นทาง\nแห่งอาหารเลิศรสครั้งใหม่\nมาถึงแล้วสินะคะ"
20030-580 = "มาแล้วเหรอคะ คุณครู"
20030-590 = "ถ้างั้นตั้งแต่นี้คุณครูกับฉัน..."
20030-600 = "เรามาลองทำชาเลนจ์\nพิชิตร้านอาหารแผงลอยกันมั้ยคะ?"
20030-610 = "ฮุฮุฮุ คุณครู...\nสนุกหรือเปล่าคะ?"
20030-620 = "ฉันกำลังสนุกสุดๆ\nแบบอดใจไม่อยู่เลยละค่ะ"
20030-630 = "งาน <ฮาโลเฟสติวัล> ครั้งนี้\nใกล้จบลงแล้ว..."
20030-640 = "เวลาแสนสนุกผ่านไป\nเพียงแค่พริบตาเท่านั้น..."
20030-650 = "เหลือเพียงแค่\nความทรงจำเท่านั้นสินะคะ"
20030-660 = "สบายดีหรือเปล่าคะ คุณครู\nถ้าเรื่องพิชิตร้านแผงลอยละก็\nฉันทำสำเร็จแล้วละค่ะ"
20030-670 = "ฉันเป็นพวกกินเท่าไร\nก็ไม่ค่อยอ้วนน่ะค่ะ แต่ว่า\nฉันกินได้ไม่เยอะหรอกนะคะ..."
20030-680 = "ไม่ว่ายังไง\nก็รู้สึกเสียดายอยู่ดีค่ะ"
20030-690 = "ยังรู้สึกอยากขยับร่างกาย\nต่ออีกสักหน่อยน่ะค่ะ"
20030-700 = "ฉันร่วมแข่งกินขนมปังด้วย\nได้หรือเปล่าคะ?"
20030-710 = "ร้านแผงลอยใน <ฮาโลเฟสติวัล>\nก็เหมือนกับงาน 'นิทรรศการอาหาร\nเลิศรส' เลยละค่ะ~"
20030-720 = "อ่า... รสชาติที่ล้ำลึก\nจะต้องอยู่ที่นั่นไม่ผิดแน่...!"
20030-730 = "คุณครู... ไปเดินดูด้วยกัน\nสักหน่อยมั้ยคะ?"
20030-740 = "นานๆ ทีได้ใส่ชุดที่ต่างจากปกติ\nก็ดีเหมือนกันนะคะ"

[translation]
20030-220 = "<황륜대제>…\n새로운 미식의 지평이,\n열리는 날이 왔군요."
20030-230 = "오셨군요, 선생님."
20030-240 = "그러면, 지금부터 저와――"
20030-250 = "노점 정복에\n도전해보시겠어요?"
20030-260 = "저는 살이 찌지 않는\n체질입니다만, 많이 먹을 수\n있는 것은 아니어서…"
20030-270 = "언제나, 안타까운\n마음으로 가득하답니다."
20030-280 = "조금, 몸을 움직이고\n싶어졌어요."
20030-290 = "저도, 참여해도 될까요?\n…'빵 먹기 경주'에"
20030-300 = "<황륜대제>의 노점은\n그야말로, '미식 박람회'\n그 자체!"
20030-310 = "아아, 궁극의 맛이,\n분명 거기에…!"
20030-320 = "선생님… 잠시 함께\n걷지 않으시겠어요?"
20030-330 = "…평소와는 다른 복장도,\n나름대로 좋네요."
20030-570 = "<황륜대제>…\n새로운 미식의 지평이,\n열리는 날이 왔군요."
20030-580 = "오셨군요, 선생님."
20030-590 = "그러면, 지금부터 저와――"
20030-600 = "노점 정복에\n도전해보시겠어요?"
20030-610 = "우후후. 선생님,\n즐기고 계신가요?"
20030-620 = "저는 더할 나위 없이\n즐기고 있답니다."
20030-630 = "어느새 <황륜대제>도\n막바지…"
20030-640 = "즐거운 시간은 순식간,\n이라고 합니다만…"
20030-650 = "추억은 언제까지고\n남기 마련이겠죠."
20030-660 = "평안하신지요, 선생님.\n노점 제패라면\n완료했답니다."
20030-670 = "저는 살이 찌지 않는\n체질입니다만, 많이 먹을 수\n있는 것은 아니어서…"
20030-680 = "언제나, 안타까운\n마음으로 가득하답니다."
20030-690 = "조금, 몸을 움직이고\n싶어졌어요."
20030-700 = "저도, 참여해도 될까요?\n…'빵 먹기 경주'에"
20030-710 = "<황륜대제>의 노점은\n그야말로, '미식 박람회'\n그 자체!"
20030-720 = "아아, 궁극의 맛이,\n분명 거기에…!"
20030-730 = "선생님… 잠시 함께\n걷지 않으시겠어요?"
20030-740 = "…평소와는 다른 복장도,\n나름대로 좋네요."

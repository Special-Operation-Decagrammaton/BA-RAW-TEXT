[translation]
20030-220 = "「晄輪大祭」…\n美食的新境界，\n已經到來。"
20030-230 = "……您來了啊，老師。"
20030-240 = "那麼，現在開始\n和我一起──"
20030-250 = "挑戰征服路邊攤吧？"
20030-260 = "我雖然是不會胖的體質，\n卻不代表能吃很多…"
20030-270 = "總是讓我感到十分沮喪。"
20030-280 = "有點想活動一下身體了。"
20030-290 = "我也可以參加嗎？\n…「吃麵包競走」。"
20030-300 = "「晄輪大祭」的攤位，\n正是「美食的博覽會」！"
20030-310 = "啊啊，究極的美味，\n肯定就在那裡…！"
20030-320 = "老師…要不要\n一起走走呢？"
20030-330 = "…與平時不同的打扮，\n也別有一番風味唷。"
20030-570 = "「晄輪大祭」…\n美食的新境界，\n已經到來。"
20030-580 = "您來了啊，老師。"
20030-590 = "那麼，現在開始\n和我一起──"
20030-600 = "挑戰征服路邊攤吧？"
20030-610 = "唔呵呵。\n老師，玩得開心嗎？"
20030-620 = "我非常樂在其中。"
20030-630 = "不知不覺「晄輪大祭」\n也已經進入尾聲……"
20030-640 = "雖說快樂的時光\n轉瞬即逝……"
20030-650 = "但回憶將會永遠留下。"
20030-660 = "您好，老師。\n我已經征服路邊攤了。"
20030-670 = "我雖然是不會胖的體質，\n卻不代表能吃很多…"
20030-680 = "總是讓我感到十分沮喪。"

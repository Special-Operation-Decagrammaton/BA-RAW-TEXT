[translation]
20016-140 = "จริงๆ เลย\nมีปัญหาเยอะแยะเลยนะคะ"
20016-150 = "เฮ้อ...\nไม่ไหวจริงๆ ด้วยค่ะ"
20016-160 = "งานแลกเปลี่ยนคราวนี้\nกลายเป็นงานที่วุ่นวายไปซะแล้วค่ะ"
20016-170 = "เฮ้อ... อยากให้คิดถึง\nหน้าที่ของคนที่ต้องคอย\nเก็บกวาดงานบ้างจังเลยค่ะ"
20016-180 = "ทำไมถึงมาที่เขตปกครองตนเอง\nของคนอื่นแล้วสร้างความวุ่นวาย..."
20016-190 = "เรื่องแบบนี้\nในฐานะผู้ดูแลกลาง\nมันน่าปวดหัวมากเลยค่ะ"
20016-210 = "จริงๆ เลย\nมีปัญหาเยอะแยะเลยนะคะ"
20016-220 = "เฮ้อ...\nไม่ไหวจริงๆ ด้วยค่ะ"
20016-230 = "เวลาผ่านไปขนาดนี้แล้ว\nคุณครูจะยอมมาตาม\nเวลาที่ฉันขอได้รึเปล่าคะ?"
20016-240 = "รู้สึกเหมือนจัดการทุกอย่างแล้ว...\nแต่ว่าเราจะวางใจ...\nจนกว่าจะเสร็จงานไม่ได้นะคะ"
20016-250 = "ถึงฉันจะไม่ชอบ\nงานที่น่ารำคาญก็เถอะ"
20016-260 = "เหมือนว่าจะจัดการเรื่องวุ่นวายได้\nแล้วนะคะ เหนื่อยหน่อยนะคะ\nคุณครู"
20016-270 = "งานแลกเปลี่ยนคราวนี้\nกลายเป็นงานที่วุ่นวายไปซะแล้วค่ะ"
20016-280 = "เฮ้อ... อยากให้คิดถึง\nหน้าที่ของคนที่ต้องคอย\nเก็บกวาดงานบ้างจังเลยค่ะ"
20016-290 = "ทำไมถึงมาที่เขตปกครองตนเอง\nของคนอื่นแล้วสร้างความวุ่นวาย..."
20016-300 = "เรื่องแบบนี้\nในฐานะผู้ดูแลกลาง\nมันน่าปวดหัวมากเลยค่ะ"
20016-850 = "นี่เป็น... ปัญหาที่จะต้อง\nแก้ไขสินะคะ"
20016-860 = "รบกวนตรวจสอบรายการ\nด้วยนะคะ คุณครู"
20016-870 = "ถึงมันจะน่ารำคาญไปบ้าง แต่พอมี\nคุณครูอยู่ด้วยแบบนี้ก็ค่อยโล่งใจหน่อยค่ะ"
20016-880 = "เหนื่อย~ จัง~ เลย~"
20016-890 = "ฮู่ว... ผ่านไปได้\nอีกเรื่องหนึ่งแล้วนะคะ"
20016-900 = "แก้ไขได้แล้วเหรอคะ?\nขอบคุณมากค่ะ"

[translation]
20016-140 = "真是的，\n問題堆積如山呢。"
20016-150 = "唉……真是\n做不下去了。"
20016-160 = "交流會好像\n被搞得一團糟了呢。"
20016-170 = "唉……真希望\n多少能考慮一下\n負責善後的人的立場。"
20016-180 = "為什麼要跑到別人的\n自治區來收拾殘局……"
20016-190 = "這種事就是\n中階管理者的\n辛苦的地方。"
20016-210 = "真是的，\n問題堆積如山呢。"
20016-220 = "唉……真是\n做不下去了。"
20016-230 = "已經過了不少時間，\n還趕得上嗎？"
20016-240 = "差不多該收尾了呢……\n直到最後都不能掉以輕心。"
20016-250 = "因為我討厭麻煩的事。"
20016-260 = "看來已經平靜下來了呢。\n辛苦你了，老師。"
20016-270 = "交流會好像\n被搞得一團糟了呢。"
20016-280 = "唉……真希望\n多少能考慮一下\n負責善後的人的立場。"
20016-290 = "為什麼要跑到別人的\n自治區來收拾殘局……"
20016-300 = "這種事就是\n中階管理者的\n辛苦的地方。"
20016-850 = "這些就是不得不\n解決的問題呢。"
20016-860 = "清單的確認\n就拜託你了唷，老師。"
20016-870 = "雖然很麻煩……\n不過正因如此，\n更慶幸有老師在呢。"
20016-880 = "好～～～累……"
20016-890 = "呼……解決一件事了，對吧。"
20016-900 = "解決了嗎？\n辛苦了。"

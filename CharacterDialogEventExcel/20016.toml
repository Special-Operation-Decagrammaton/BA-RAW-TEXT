[translation]
20016-140 = "정말,\n문제가 산더미네요."
20016-150 = "하아…\n못 해먹겠네요."
20016-160 = "이번 교류회는 뭔가\n엉망진창이 되어버렸네요."
20016-170 = "하아… 조금은 뒤처리하는\n사람의 입장도 생각해\n달라고요."
20016-180 = "어째서 남의 자치구까지\n와서 뒤치다꺼리를…"
20016-190 = "이런 게,\n중간 관리자의\n고통이네요."
20016-210 = "정말,\n문제가 산더미네요."
20016-220 = "하아…\n못 해먹겠네요."
20016-230 = "꽤 시간이 지났는데,\n제시간에 맞출 수\n있을까요?"
20016-240 = "슬슬 정리되는 느낌\n이지만…… 부디 마지막\n까지 방심하지 마시길."
20016-250 = "귀찮은 일은 질색인지라."
20016-260 = "아무래도 소동은 마무리\n된 것 같네요. 수고하셨\n습니다, 선생님."
20016-270 = "이번 교류회는 뭔가\n엉망진창이 되어버렸네요."
20016-280 = "하아… 조금은 뒤처리하는\n사람의 입장도 생각해\n달라고요."
20016-290 = "어째서 남의 자치구까지\n와서 뒤치다꺼리를…"
20016-300 = "이런 게,\n중간 관리자의\n고통이네요."
20016-850 = "이것들이,\n해결해야만 하는\n문제들이군요."
20016-860 = "리스트 확인,\n부탁드려요. 선생님."
20016-870 = "귀찮지만,\n그래도 선생님이 있어줘서\n다행이라고 생각해요."
20016-880 = "힘~들~어~"
20016-890 = "후우…… 한 건 해결,\n인 거네요."
20016-900 = "해결하셨나요?\n수고하셨습니다."

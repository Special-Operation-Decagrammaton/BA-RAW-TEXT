[translation]
10025-10 = "อากาศแบบนี้เหมาะกับ\nการไปเดินเล่นมากเลยนะคะ~"
10025-20 = "วันนี้ฉันจะพาคุณครูเดินชม\nโรงเรียนซานไห่จิงเองค่ะ!"
10025-30 = "พะ...พี่ชุน...\nหายไปไหนกันนะ..."
10025-40 = "(นี่... ความยังไม่แตกใช่มั้ยนะ?)"
10025-50 = "คุณครูคะ ทางด้านโน้นมีขนม\nที่ดูน่าอร่อยอยู่เต็มไปหมดเลยค่ะ!"
10025-60 = "(ฮุฮุ ตัวไซซ์มินิแบบนี้\nก็อาจไม่ใช่เรื่องแย่ก็ได้...)"
10025-290 = "เชิญเลยค่ะ คุณครู\nคาบเรียนวันนี้\nก็ขอรบกวนด้วยนะคะ!"
10025-300 = "ฮุฮุ ตัวเล็กไซซ์มินิแบบนี้\nบางครั้งก็สบายดีเหมือนกันนะคะ!"
10025-310 = "งืม... ง่วงจังเลยค่ะ"
10025-320 = "ขอบคุณมากค่ะ!"
10025-330 = "ฮิฮิ ขอบคุณค่ะ...\nคุณครู"

[translation]
10025-10 = "산책가기 딱\n좋은 날씨네요~"
10025-20 = "오늘은 제가 산해경을\n직접 안내해드릴게요!"
10025-30 = "슈, 슌 언니는\n어디로 갔을까요……."
10025-40 = "(아직…… 안 들켰겠죠?)"
10025-50 = "선생님, 저쪽에 맛있어\n보이는 과자가 잔뜩 있어요!"
10025-60 = "(후후, 어려진 몸도\n제법 나쁘지 않을지도…….)"
10025-290 = "어서오세요, 선생님.\n오늘의 수업도\n잘 부탁드릴게요!"
10025-300 = "후후, 이 크기도\n가끔은 편리하네요!"
10025-310 = "으음…… 졸려졌어요……"
10025-320 = "고맙습니다!"
10025-330 = "후후. 감사합니다,\n선생님."

[translation]
10025-10 = "是非常適合散步\n的天氣呢。"
10025-20 = "今天就由我來\n帶你參觀山海經哦！"
10025-30 = "旬，旬姐姐\n跑去哪裡了呢……？"
10025-40 = "（應，應該還沒\n被發現吧……？)"
10025-50 = "老師，那邊有很多\n看起來很好吃的點心！"
10025-60 = "（呵呵。這個\n身體也沒那麼糟嘛）"
10025-290 = "歡迎回來！\n老師！今天的課程\n也請多多指教！"
10025-300 = "呵呵，這個大小\n有時候也挺方便的呢！"
10025-310 = "嗯嗯……\n想睡覺了……"
10025-320 = "非常感謝！"
10025-330 = "呵呵。非常謝謝，\n老師。"

[translation]
20038-280 = "이 정도의 대규모 교류회는\n붉은겨울 사무국으로도\n첫 시도인지라."
20038-290 = "저도 기대가 크네요."
20038-300 = "선생님, 치파오 차림의\n체리노 쨩 보셨나요?"
20038-310 = "후훗, 너무\n귀엽지 않나요?"
20038-320 = "아… 저도\n잘 어울린다고요?"
20038-330 = "…감사합니다."
20038-340 = "(산해경의 검은 군주…\n생각보다 훨씬\n강한 분이셨군요.)"
20038-350 = "(마냥 귀여워할 수는\n없겠네요, 후훗)"
20038-360 = "쿠데타에는 제법\n익숙해졌다고\n생각했는데…"
20038-370 = "다른 학원에서\n직접 마주하니,"
20038-380 = "어쩐지 묘한 기분이네요."
20038-390 = "정말 즐거운\n교류회였네요."
20038-400 = "다음에는 꼭 문주님을\n붉은겨울로 직접\n모셔야겠어요. 후후."
20038-410 = "산해경의 공원은\n넓고 깨끗하네요."
20038-420 = "거리 연설을 하기에\n딱 좋네요."
20038-430 = "이곳에서 체리노 회장의\n위대함에 대해 설파하면…"
20038-440 = "…역시 외교 문제가\n되겠죠?"
20038-450 = "변하는 것과\n변하지 않는 것."
20038-460 = "…선택하기\n어려운 문제네요."
20038-470 = "붉은겨울 학원은 매일\n바뀌어서 큰일이지만요."
20038-480 = "아까 루미 회장에게\n숙면에 좋은 찻잎을\n선물 받았습니다."
20038-490 = "오늘 저녁에는 이것으로\n체리노 쨩에게 밀크티를\n내주어야겠네요."
20038-500 = "<연단방>이라는\n동아리에서 어려지는 약을\n연구하고 있다고요?"
20038-510 = "호오… 이건\n기록해 두는 편이\n좋겠군요."
20038-620 = "교류회를 기념하여\n교환권 이벤트를\n진행하고 있습니다!"
20038-630 = "문주님의 인형을\n갖고 계시다면,\n이곳에서 경품으로\n교체해 드릴게요!"
20038-640 = "아직 교환 이벤트는\n진행 중입니다."
20038-650 = "마지막까지\n교환하는 것을\n잊지 말아 주세요."
20038-660 = "이 인형은\n제가 디자인했답니다."
20038-670 = "평소에 체리노 회장\n모양의 인형을 만들던\n경험이 도움이 되었네요."
20038-680 = "교환권 용도로 만든 것입니다만…"
20038-690 = "소장하고 싶어 하는\n학생이 많아서, 좀처럼\n회수되질 않네요."
20038-700 = "경품에 무슨 문제라도\n있었던 걸까요?"
20038-710 = "축하합니다!\n당첨이에요!"
20038-720 = "당첨입니다!\n선생님은 운이 좋으시군요."
20038-730 = "이건… 1등이네요!\n역시 선생님이세요."
20038-740 = "어머나, 이렇게나 잔뜩…"
20038-750 = "금방 가져오겠습니다.\n잠시만 기다려주세요."
20038-760 = "어서 오세요, 선생님.\n교류회의 일정을\n정리하고 있었습니다."
20038-770 = "양 학교의 학생들이 한데 모여서 그런지\n처리해야 할 일이 꽤 많군요."
20038-780 = "네, 무슨 일이신가요?"
20038-790 = "안 돼요.\n지금은 일에 집중해 주세요."
20038-800 = "훌륭한 솜씨네요. 이곳이\n붉은겨울이었다면 훈장을 드렸을 텐데…"
20038-810 = "협력해 주셔서 감사합니다."

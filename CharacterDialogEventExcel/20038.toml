[translation]
20038-280 = "An exchange meeting of this scale is a first, even for the Red Winter Office."
20038-290 = "I'm excited, too."
20038-300 = "Sensei, have you seen Cherino in a qipao?"
20038-310 = "Heh heh, isn't she adorable?"
20038-320 = "Oh... I look good, too?"
20038-330 = "...Thank you."
20038-340 = "(The Dark Monarch of Shanhaijing... She's much more powerful than I thought.)"
20038-350 = "(I can't just think that she's cute, heh heh.)"
20038-360 = "I thought I was used to coup d'etats by now..."
20038-370 = "Coming face to face at a different academy..."
20038-380 = "It feels strange."
20038-390 = "It's been a wonderful exchange meeting."
20038-400 = "We'll have to host them at Red Winter next time! Heehee."
20038-410 = "The parks in Shanhaijing are so big and clean."
20038-420 = "Perfect for street speeches!"
20038-430 = "If we extol the greatness of President Cherino here..."
20038-440 = "...it could become a diplomatic incident, huh?"
20038-450 = "Things that change, or things that don't..."
20038-460 = "It's hard to choose."
20038-470 = "But it is a problem that Red Winter Academy changes every single day."
20038-480 = "President Rumi gave me tea leaves for sleep."
20038-490 = "I'm going to use them to make milk tea for Cherino tonight."
20038-500 = "Some club called the Eastern Alchemy Society is working on medicine that makes you younger?"
20038-510 = "This...needs to be recorded."
20038-620 = "To celebrate the exchange meeting, we're holding an exchange ticket event!"
20038-630 = "If you have Madam's doll, you can exchange it for a prize here!"
20038-640 = "The exchange event is still in progress."
20038-650 = "Don't forget to exchange your items before it ends."
20038-660 = "I designed this doll."
20038-670 = "All my experience making President Cherino dolls came in handy."
20038-680 = "They were made to use for exchange tickets, but..."
20038-690 = "So many students just wanted to keep them. We've had trouble getting them back."
20038-700 = "Do you think there was an issue with the prizes?"
20038-710 = "Congratulations! You're a winner!"
20038-720 = "You're a winner! You have good luck, Sensei."
20038-730 = "This is...first place! Of course you'd win, Sensei."
20038-740 = "Oh my, so many..."
20038-750 = "I'll bring them right away. Just a moment, please."
20038-760 = "Welcome, Sensei. I was organizing the schedule for the exchange meeting."
20038-770 = "There's a lot to take care of, since students from both schools will be here."
20038-780 = "Yes. How can I help you?"
20038-790 = "No. Please focus on work for now."
20038-800 = "Amazing work. If this was Red Winter, I would've given you a medal..."
20038-810 = "Thank you for your cooperation."

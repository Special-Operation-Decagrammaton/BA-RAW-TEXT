[translation]
20038-280 = "สำนักเลขาธิการเรดวินเทอร์\nก็ไม่เคยมางานแลกเปลี่ยน\nที่ใหญ่ขนาดนี้มาก่อน"
20038-290 = "ฉันเองก็คาดหวังมากเลยค่ะ"
20038-300 = "คุณครู เห็นเชริโน่จัง\nในชุดกี่เพ้าหรือยังคะ?"
20038-310 = "ฮุฮุ น่ารักมากเลย\nว่ามั้ยคะ?"
20038-320 = "อ่า... ฉันก็เหมาะ\nกับชุดนี้งั้นเหรอคะ?"
20038-330 = "ขอบคุณค่ะ..."
20038-340 = "(ราชาทมิฬของซานไห่จิง...\nเป็นคนที่แข็งแกร่ง\nกว่าที่คิดเยอะเลยนะคะ)"
20038-350 = "(คงจะเอ็นดูเธอเฉยๆ\nไม่ได้แล้วนะคะ ฮุฮุ)"
20038-360 = "ฉันคิดว่าตัวเอง\nค่อนข้างคุ้นเคย\nกับการปฏิวัติแล้วเสียอีก..."
20038-370 = "แต่พอได้เจอ\nที่โรงเรียนอื่น"
20038-380 = "ก็รู้สึกแปลกๆ นะคะ"
20038-390 = "เป็นงานแลกเปลี่ยน\nที่สนุกมากๆ เลยค่ะ"
20038-400 = "ครั้งหน้าต้องเชิญ\nท่านประมุขไปเยือน\nเรดวินเทอร์ให้ได้เลยค่ะ ฮุฮุ"
20038-410 = "สวนในซานไห่จิง\nกว้างขวางและสะอาดจังเลยค่ะ"
20038-420 = "เหมาะที่จะใช้ปราศรัย\nนอกสถานที่เลยค่ะ"
20038-430 = "ถ้ามาอธิบายถึงความยิ่งใหญ่\nของประธานเชริโน่ที่นี่ละก็"
20038-440 = "คงเป็นปัญหา\nทางการทูตใช่มั้ยคะ...?"
20038-450 = "การเปลี่ยนแปลง\nกับการไม่เปลี่ยนแปลง"
20038-460 = "เป็นปัญหาที่\nเลือกยากเลยนะคะ..."
20038-470 = "ถึงเรดวินเทอร์จะเปลี่ยนอยู่ทุกวัน\nจนเป็นเรื่องใหญ่ก็เถอะค่ะ"
20038-480 = "เมื่อกี้ฉันได้ของขวัญ\nเป็นใบชาที่ช่วยให้หลับสบาย\nจากประธานรูมิมาค่ะ"
20038-490 = "เย็นนี้คงต้องเอามาทำ\nชานมให้เชริโน่จังแล้วละค่ะ"
20038-500 = "ชมรมวิจัยศาสตร์การปรุงยา\nกำลังวิจัยยาที่ทำให้\nเด็กลงอยู่เหรอคะ?"
20038-510 = "นั่นน่ะ... ฉันต้อง\nจดเรื่องนี้เอาไว้\nแล้วละค่ะ"
20038-620 = "เรากำลังจัดกิจกรรมตั๋วแลกเปลี่ยน\nเพื่อเป็นที่ระลึกงานแลกเปลี่ยนอยู่ค่ะ!"
20038-630 = "ถ้าอยากได้ตุ๊กตา\nของท่านประมุข\nเราจะให้แลก\nเป็นของสมนาคุณค่ะ!"
20038-640 = "กิจกรรมแลกของ\nยังจัดอยู่นะคะ"
20038-650 = "อย่าลืมมาแลกของ\nจนกว่าจะสิ้นสุด\nกิจกรรมนะคะ"
20038-660 = "ตุ๊กตาตัวนี้\nฉันเป็นคนออกแบบเองค่ะ"
20038-670 = "ประสบการณ์จากการ\nทำตุ๊กตารูปประธานเชริโน่\nช่วยฉันได้เยอะเลยค่ะ"
20038-680 = "ตั๋วนี้ทำมาเพื่อใช้แลกของ..."
20038-690 = "แต่มีนักเรียนหลายคน\nที่อยากเก็บไว้\nก็เลยไม่เอามาแลกค่ะ"
20038-700 = "มีปัญหาอะไรกับ\nของสมนาคุณหรือเปล่าคะ?"
20038-710 = "ยินดีด้วยค่ะ!\nถูกรางวัลค่ะ!"
20038-720 = "ถูกรางวัลค่ะ!\nคุณครูโชคดีจังเลยนะคะ"
20038-730 = "นี่มัน... รางวัลที่ 1 เลยนะคะ!\nสมกับเป็นคุณครูเลยค่ะ!"
20038-740 = "ว้าว เยอะขนาดนี้เลย..."
20038-750 = "ฉันจะรีบไปเอามาให้ค่ะ\nรอสักครู่นะคะ"
20038-760 = "เชิญเลยค่ะ คุณครู\nฉันกำลังจัดการ\nตารางงานแลกเปลี่ยนอยู่ค่ะ"
20038-770 = "คงเพราะเป็นงานที่นักเรียนจาก 2 โรงเรียน\nมาอยู่ที่เดียวกัน เลยมีงานที่ต้องทำ\nค่อนข้างเยอะเลยค่ะ"
20038-780 = "ค่ะ มีเรื่องอะไรงั้นเหรอคะ?"
20038-790 = "ไม่ได้ค่ะ\nตอนนี้ฉันต้องจดจ่อกับงานค่ะ"
20038-800 = "ฝีมือยอดเยี่ยมเลยนะคะ ถ้าที่นี่เป็น\nเรดวินเทอร์ ฉันคงให้เหรียญตราแล้วค่ะ"
20038-810 = "ขอบคุณให้ความร่วมมือนะคะ"

[translation]
10054-110 = "คุณครู ทางนี้ค่ะ!\nการแข่งขันใกล้จะ\nเริ่มแล้วนะคะ!"
10054-120 = "กำลังรออยู่เลยค่ะคุณครู\nเรามาออกเดินทาง\nพร้อมกันเลยมั้ยคะ?"
10054-130 = "พอจะมีอะไร\nให้ฉันช่วยบ้างมั้ยคะ?"
10054-140 = "คุณครูคะ...?\nทำไมทำแบบนี้ล่ะคะ...?"
10054-150 = "ถะ... ถ้าเอาแต่\nเรียกกันแบบนี้...\nฉันเขินนะคะ..."
10054-170 = "คุณครู ทางนี้ค่ะ!\nการแข่งขันใกล้จะ\nเริ่มแล้วนะคะ!"
10054-180 = "กำลังรออยู่เลยค่ะคุณครู\nเรามาออกเดินทาง\nพร้อมกันเลยไหมคะ?"
10054-190 = "ทุกคนเนี่ย\nตั้งใจกันมากเลยนะคะ"
10054-200 = "ฉันจะพยายามเพื่อ\nเป็นการตอบแทน\nน้ำใจของทุกคนค่ะ!"
10054-210 = "มาพยายามให้เต็มที่\nจนถึงที่สุดกันเถอะค่ะ!"
10054-220 = "ทำได้ดีมากค่ะ\nคุณครู!"
10054-230 = "อาจจะยังมีคนที่ต้องการ\nความช่วยเหลืออยู่ก็ได้"
10054-240 = "เราไปดูรอบๆ สนาม\nกันอีกสักหน่อยเถอะค่ะ"
10054-250 = "พอจะมีอะไร\nให้ฉันช่วยบ้างไหมคะ?"
10054-260 = "คุณครูคะ...?\nทำไมทำแบบนี้ล่ะคะ...?"
10054-270 = "ถะ... ถ้าเอาแต่\nเรียกกันแบบนี้...\nฉันเขินนะคะ..."
10054-400 = "สวัสดีค่ะคุณครู\nกำลังหาอะไรอยู่รึเปล่าคะ?"
10054-410 = "ยังไงก็ลองดูให้ทั่วๆ ก่อน\nดีไหมคะ?"
10054-420 = "การแข่งขันจบลงแล้ว\nแต่ของยังเหลือเยอะเลยค่ะ"
10054-430 = "ถ้าสะดวกละก็ คุณครูช่วย\nเก็บของหน่อยได้ไหมคะ?"
10054-440 = "ฉะ.. ฉันน่ะเหรอคะ...?\nฉันคิดว่า\nอยากมาช่วยเหลือคุณครู..."
10054-450 = "ถะ... ถ้าจ้องกันแบบนั้นละก็...\nฉันก็แอบเขินอยู่นะคะ..."
10054-460 = "ฉันจะเตรียมให้ตอนนี้เลยค่ะ"
10054-470 = "มีของอย่างอื่น\nที่ต้องการอีกไหมคะ?"
10054-480 = "เลือกเป็นอันนี้สินะคะ\nเข้าใจแล้วค่ะ"
10054-490 = "คุ้มค่าที่เตรียมไว้เลยนะคะเนี่ย"

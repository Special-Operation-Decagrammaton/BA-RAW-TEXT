[translation]
10054-110 = "선생님, 이쪽이에요!\n곧 경기가 시작될\n예정이랍니다!"
10054-120 = "기다리고 있었답니다, 선생님!\n그럼, 출발하실까요?"
10054-130 = "뭔가 도와드릴 수\n있는 일이 있을까요?"
10054-140 = "……선생님?\n왜 그러세요……?"
10054-150 = "그, 그렇게\n계속 부르시면……\n부끄러워요……."
10054-170 = "선생님, 이쪽이에요!\n곧 경기가 시작될\n예정이랍니다!"
10054-180 = "기다리고 있었답니다, 선생님!\n그럼, 출발하실까요?"
10054-190 = "여러분,\n정말 열심이시네요."
10054-200 = "저도 여러분의\n마음에 보답할 수\n있도록 정진하겠습니다!"
10054-210 = "마지막까지 최선을\n다하도록 해요!"
10054-220 = "선생님,\n수고하셨습니다!"
10054-230 = "도움이 필요한 사람이\n남아있을지도 모르니,"
10054-240 = "좀 더 둘러보시죠."
10054-250 = "뭔가 도와드릴 수\n있는 일이 있을까요?"
10054-260 = "……선생님?\n왜 그러세요……?"
10054-270 = "그, 그렇게\n계속 부르시면……\n부끄러워요……."
10054-400 = "안녕하세요, 선생님.\n찾으시는 게 있으신가요?"
10054-410 = "괜찮으시다면 한번\n둘러보시겠어요?"
10054-420 = "경기는 무사히 끝났지만\n상품이 남아버렸네요."
10054-430 = "괜찮으시다면, 정리를\n도와주실 수 있을까요?"
10054-440 = "저, 저요……?\n저는…… 선생님의 도움이\n되었으면 좋겠다고, 생각해서……."
10054-450 = "그렇게 계속 보시면…… 그…….\n조금 부끄러운걸요……."
10054-460 = "지금 바로 준비하겠습니다."
10054-470 = "더 필요하신\n물건은 없으신가요?"
10054-480 = "그걸로 고르셨나요?\n알겠습니다."
10054-490 = "준비해 둔 보람이 있네요."

[translation]
10054-110 = "老師，這邊！\n比賽馬上\n就要開始了！"
10054-120 = "讓您久等了，老師！\n那麼，我們走吧。"
10054-130 = "有什麼我\n可以幫忙的嗎？"
10054-140 = "……老師？\n怎麼了……？"
10054-150 = "像，像這樣\n被叫這麼多次……\n好害羞……"
10054-170 = "老師，這邊！\n比賽馬上\n就要開始了！"
10054-180 = "讓您久等了，老師！\n那麼，我們走吧。"
10054-190 = "大家，\n都很努力呢。"
10054-200 = "我也會為了\n不辜負大家的期待，\n精益求精的！"
10054-210 = "拚盡全力，\n奮戰到最後一刻吧。"
10054-220 = "老師，\n您辛苦了。"
10054-230 = "可能還有人\n需要幫助，"
10054-240 = "我們再去\n稍微看看吧。"
10054-250 = "有什麼我\n可以幫忙的嗎？"
10054-260 = "……老師？\n怎麼了……？"
10054-270 = "像，像這樣\n被叫這麼多次……\n好害羞……"
10054-400 = "您好，老師。\n在找什麼嗎？"
10054-410 = "方便的話要不要來逛逛呢？"
10054-420 = "比賽順利結束了，\n但是還有剩下的商品。"
10054-430 = "如果可以的話，\n能幫我一起收拾嗎？"
10054-440 = "我，我嗎……？\n我想說……如果能幫上\n老師的忙就好了……"
10054-450 = "一直被盯著看的話……\n那個……有點不好意思……"
10054-460 = "馬上為您準備。"
10054-470 = "還有需要\n其他東西嗎？"
10054-480 = "您要那個對吧，我知道了。"
10054-490 = "做好準備是值得的。"

[translation]
20039-240 = "산해경에 온 것을\n환영하노라. 선생."
20039-250 = "월영제를 한껏\n만끽하면 좋겠구나."
20039-260 = "어디를 가야 할지\n모르겠다면 이야기해 다오."
20039-270 = "금방 사람을\n붙여 줄 테니 말이다."
20039-280 = "…일이,\n이렇게 될 줄이야…"
20039-290 = "선생에게는\n폐를 끼치는구나."
20039-300 = "그대만은…\n내 곁에 있어 주겠지…?"
20039-310 = "모든 것은 크게 돌아\n자신의 자리로\n돌아올 것이니…"
20039-320 = "이제, 우리의 산해경을\n되찾으러 가자."
20039-330 = "정말 고생 많았다, 선생."
20039-340 = "현룡문의 문주로서,\n그리고 한 명의\n학생으로서,"
20039-350 = "그대에게 진심 어린\n경의와, 감사를."
20039-360 = "월영제에서는 수많은\n이야기가 교차한다."
20039-370 = "후후, 관심이 있다면\n이참에 조사해\n보는 건 어떤가?"
20039-380 = "현무상회는, 월영제를\n계기로 외부와 교류를\n넓히고자 하는 중이지."
20039-390 = "문주로서 특별히 입장은\n표명하지 않았다만…"
20039-400 = "현룡문과 현무상회,\n어느 쪽에 근본적인\n잘못이 있는가…"
20039-410 = "미안하구나, 선생.\n문주라고 해도, \n알기 힘든 것은 \n알기 힘든 것이다…"
20039-420 = "내가 문주로 있는\n동안에는, 산해경에서의\n안전을 보장하도록 하지."
20039-430 = "상대가 누구든지 간에 말이다."
20039-440 = "물론, 선생 역시\n마찬가지이고."
20039-640 = "당도하였는가.\n지금은 말하자면…"
20039-650 = "그렇구나. 지금은\n보충할 때라고\n해야 하려나. 후후."
20039-660 = "그대를 위해 작은\n여흥을 준비했다."
20039-670 = "실컷 즐기도록 하거라."
20039-680 = "…하지만, 과식에는\n주의하도록 하거라?"
20039-690 = "아직은 시간이\n남아 있구나."
20039-700 = "끝까지, 함께\n하도록 하자."
20039-710 = "무슨 일인가, 선생?"
20039-720 = "흐음? 내가 먼저\n맛보았으면 한다?"
20039-730 = "그것이 무엇을\n의미하는지,\n알고 있는가? 후후."
20039-740 = "나는 신경 쓰지 않는다만?"
20039-750 = "선생도 한 입 들겠는가?"
20039-760 = "내가 이미 맛을 보았다.\n안심해도 좋을 것이야.\n후훗."
20039-770 = "월영제의 명물 중\n하나는 간식거리지."
20039-780 = "그러면, 함께\n찾아보도록 할까?"
20039-790 = "새로운 것을\n알게 되는 것은\n좋은 일이다."
20039-800 = "그렇지 아니한가?"
20039-810 = "단 것을 좋아하는가,\n선생?"
20039-820 = "나는… 그럭저럭이라고\n해야 하겠군."
20039-830 = "호오. 흥미롭구나."
20039-840 = "내게도 맛보여줄 수 있겠는가?"
20039-850 = "해냈구나, 선생. "
20039-860 = "허나 그대라면\n만족하지 않을 것이다.\n그렇지 않은가?"
20039-870 = "일과, 라는 것인가?\n…왜 내가 여기 있느냐고?"
20039-880 = "이것도 문주의 의무이기\n때문이지 않느냐."
20039-890 = "일신우일신(日新又日新),\n이라 하지."
20039-900 = "나날이 새롭게 발전해\n가야 한다는 뜻이다."
20039-910 = "도움이 필요하다면,\n언제든 손을 빌려주겠다만?"
20039-920 = "왜 그러는가, 선생?\n나를 간지럽혀 보고 싶은 것인가?"
20039-930 = "후후. 무엄하구나."
20039-940 = "허나 그런 부분마저 용서하마."
20039-950 = "장난을 걸어오는 것인가?"
20039-960 = "좋다. 얼마든지 허락하마.\n나와 선생 사이이지 않느냐."
20039-970 = "…다른 사람들이 있을 때에는,\n삼가 다오."
20039-980 = "그래. 그대가 이루어낸 것이다.\n사양치 말고 가져가도록 하여라."
20039-990 = "선생은 참으로 성실하구나."
20039-1000 = "역시 가능하다면 내 곁에\n언제까지나 두고 싶다만…"
20039-1010 = "아니, 아니다. 잊어라."

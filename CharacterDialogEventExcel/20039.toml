[translation]
20039-240 = "ขอต้อนรับสู่\nซานไห่จิงนะ ครู"
20039-250 = "สนุกกับเทศกาล\nเงาจันทร์ให้เต็มที่นะ"
20039-260 = "ถ้าไม่รู้จะไปที่ไหน\nก็มาบอกเราได้"
20039-270 = "แล้วเราจะเรียกคน\nมาพาเที่ยวให้เอง"
20039-280 = "ไม่คิดเลยว่า...\nเรื่องจะเป็นเช่นนี้ไปได้"
20039-290 = "ทำให้ครูเดือดร้อน\nจนได้สินะ"
20039-300 = "ครูคงจะ\nอยู่ข้างๆ เราใช่มั้ย...?"
20039-310 = "ทุกอย่างจะหมุนไป\nแล้วกลับมายัง\nที่เดิมในที่สุด..."
20039-320 = "ไปเอาซานไห่จิงของเรา\nกลับคืนมากันเถอะ"
20039-330 = "เหนื่อยแย่เลยนะ ครู"
20039-340 = "ในฐานะประมุขมังกรดำ\nและนักเรียนคนหนึ่ง"
20039-350 = "เราขอแสดงความเคารพ\nและความนับถืออย่างสุดซึ้ง"
20039-360 = "ในเทศกาลเงาจันทร์\nมีเรื่องราวมากมายเลยละ"
20039-370 = "ฮุฮุ หากสนใจ\nก็ใช้โอกาสนี้\nสำรวจดูมั้ยเล่า?"
20039-380 = "ย่านการค้าเทพเต่าดำใช้\nเทศกาลเงาจันทร์ในการขยาย\nการแลกเปลี่ยนกับภายนอกอยู่น่ะ"
20039-390 = "ถึงเราจะไม่ได้แสดงจุดยืน\nเป็นพิเศษในฐานะประมุขก็เถอะ..."
20039-400 = "มังกรดำ\nกับย่านการค้าเทพเต่าดำ\nฝ่ายไหนกันนะ\nที่ผิดมาตั้งแต่แรก..."
20039-410 = "ขอโทษนะครู\nถึงเราจะเป็นประมุข\nแต่เรื่องที่ยากจะรับรู้\nเราก็มิอาจรู้หรอก..."
20039-420 = "ในยามที่เราเป็นประมุข\nเราจะรับรองความปลอดภัย\nในซานไห่จิงให้เอง"
20039-430 = "ไม่ว่าจะกับใครก็ตาม"
20039-440 = "แน่นอนว่า\nกับครูก็ด้วย"
20039-640 = "มาถึงแล้วหรือ\nตอนนี้น่ะ..."
20039-650 = "นั่นสินะ คงต้องบอกว่าตอนนี้\nคือเวลาชดเชยพละกำลัง\nของเราหรือเปล่านะ ฮุฮุ"
20039-660 = "เราเตรียมความบันเทิง\nเล็กๆ น้อยๆ ไว้ให้"
20039-670 = "เชิญสนุกให้เต็มที่"
20039-680 = "แต่ก็ระวัง...\nอย่ากินให้มากเกินไปเล่า"
20039-690 = "ยังมีเวลาเหลืออีกเยอะเลยละ"
20039-700 = "อยู่ด้วยกัน\nให้จบงานเลยนะ"
20039-710 = "เรื่องอะไรอย่างนั้นหรือ ครู?"
20039-720 = "หืม? อยากให้เรา\nลองชิมก่อนงั้นหรือ?"
20039-730 = "รู้หรือเปล่าว่า\nนั่นหมายความ\nว่าอย่างไร? ฮุฮุ"
20039-740 = "แต่เราไม่สนใจหรอกนะ"
20039-750 = "ครูก็กินดูมั้ยเล่า?"
20039-760 = "เราลองชิมไปแล้ว\nวางใจได้ ฮุฮุ"
20039-770 = "ของขึ้นชื่ออย่างหนึ่งของ\nเทศกาลเงาจันทร์ก็คือของว่าง"
20039-780 = "งั้นไปหาของว่างกิน\nด้วยกันมั้ยเล่า?"
20039-790 = "การได้เรียนรู้สิ่งใหม่\nถือเป็นเรื่องที่ดี"
20039-800 = "คิดเหมือนกันมั้ยเล่า?"
20039-810 = "ชอบอะไรหวานๆ\nงั้นหรือครู?"
20039-820 = "ส่วนเรา... คงต้องบอกว่า\nเฉยๆ น่ะ"
20039-830 = "โฮ่ น่าสนใจดีนี่"
20039-840 = "ให้เราลองชิม\nด้วยคนได้หรือไม่?"
20039-850 = "สำเร็จจนได้สินะครู "
20039-860 = "แต่หากเป็นครู\nก็คงไม่พอใจหรอก\nว่ามั้ยเล่า?"
20039-870 = "กิจวัตรอย่างนั้นหรือ?\nทำไมเราถึงมาอยู่ที่นี่น่ะหรือ...?"
20039-880 = "นี่ก็เป็นหน้าที่ของประมุข\nเหมือนกันมิใช่หรือไง?"
20039-890 = "มีสุภาษิตที่ว่า 'ใหม่ทุกทิวา'"
20039-900 = "แปลว่าเราต้องพัฒนา\nขึ้นใหม่ในทุกวันน่ะ"
20039-910 = "หากต้องการความช่วยเหลือ\nเราก็จะยื่นมือช่วยในทุกเมื่อ"
20039-920 = "เป็นอะไรไปหรือครู?\nอยากจั๊กจี้เรางั้นหรือ?"
20039-930 = "ฮุฮุ ไม่สุภาพเอาเสียเลย"
20039-940 = "แต่เราจะให้อภัยในเรื่องนั้นแล้วกัน"
20039-950 = "จะแกล้งเรางั้นหรือ?"
20039-960 = "ดีละ เราอนุญาตให้ทำเต็มที่เลย\nเราคนกันเองมิใช่หรือไง?"
20039-970 = "แต่ตอนมีคนอื่นอยู่ด้วย\nก็อย่าทำเล่า"
20039-980 = "ใช่ ครูทำมันได้สำเร็จ\nไม่ต้องปฏิเสธหรอก รับไปเถอะ"
20039-990 = "ครูช่างขยันจังเลยนะ"
20039-1000 = "ถ้าเป็นไปได้ เราอยากให้\nมาอยู่ข้างกายเลย..."
20039-1010 = "เปล่า ไม่มีอะไร\nลืมไปเสียเถอะ"

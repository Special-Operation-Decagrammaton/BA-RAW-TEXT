[translation]
20039-240 = "歡迎蒞臨山海經，老師。"
20039-250 = "還請盡情享受月影祭。"
20039-260 = "倘若不知該去何處，\n不妨告訴妾身。"
20039-270 = "妾身會馬上安排人手。"
20039-280 = "沒想到會變成這樣……"
20039-290 = "給老師添麻煩了。"
20039-300 = "汝……會陪在\n妾身身旁吧？"
20039-310 = "一切都將回歸己身……"
20039-320 = "那麼，讓吾等\n前去奪回山海經吧。"
20039-330 = "真是有勞汝了，老師。"
20039-340 = "作為玄龍門的門主，\n以及作為一名學生……"
20039-350 = "在此向汝致上\n真誠的敬意與感謝。"
20039-360 = "月影祭中，\n有許多故事交織。"
20039-370 = "呵呵，若有興趣的話，\n不妨藉此機會調查調查？"
20039-380 = "玄武商會打算藉著月影祭\n加深與外部的交流。"
20039-390 = "作為門主，妾身雖\n未特別表明立場……"
20039-400 = "玄龍門與玄武商會，\n究竟何者有錯……呼呣。"
20039-410 = "對不起，老師。\n即便身為門主，\n也無法看透一切……"
20039-420 = "在妾身擔任門主期間，\n於山海經的安全\n就將獲得保證。"
20039-430 = "無論對象是誰。"
20039-440 = "當然，老師也不例外。"
20039-640 = "汝來了啊。\n現在……"
20039-650 = "是啊，應該說是\n補給時間吧。呵呵。"
20039-660 = "妾身為汝\n準備了餘興。"
20039-670 = "盡情享受便是。"
20039-680 = "……不過，還請\n留意別吃太多哦？"
20039-690 = "還有時間。"
20039-700 = "一同待到最後吧。"
20039-710 = "怎麼了嗎？\n老師。"
20039-720 = "……呼呣，\n想先讓妾身嘗嘗看？"
20039-730 = "那意味著什麼──\n汝明白嗎？呵呵。"
20039-740 = "妾身不介意哦？"
20039-750 = "老師要不要也來一個？"
20039-760 = "味道已經試過了。\n儘管放心吧，呵呵。"
20039-770 = "談到月影祭的名物，\n那便是點心。"
20039-780 = "來，一起找找看吧？"
20039-790 = "學習新知是件好事。"
20039-800 = "對吧？"
20039-810 = "老師喜歡甜食嗎？"
20039-820 = "妾身的話……\n馬馬虎虎吧。"
20039-830 = "哦，真有趣。"
20039-840 = "要讓妾身也品嘗看看嗎？"
20039-850 = "做得好，老師。"
20039-860 = "不過，汝並不會\n就此滿足。沒錯吧？"
20039-870 = "每日作業，是吧？\n……為何妾身會在這裡？"
20039-880 = "因為這亦是門主的職責。"
20039-890 = "日日新，\n又日新──"
20039-900 = "意味著每日都應不斷進步。"
20039-910 = "若是需要協助的話，\n隨時都能幫忙哦？"
20039-920 = "怎麼了，老師。\n想試著搔癢妾身嗎？"
20039-930 = "呵呵，真是個無禮的傢伙。"
20039-940 = "……不過，妾身准了。"
20039-950 = "想一同嬉鬧嗎？"
20039-960 = "無妨。隨汝高興吧。\n畢竟是妾身與老師之間的事啊。"
20039-970 = "……不過有旁人在的時候，\n記得注意分寸哦？"
20039-980 = "啊啊。畢竟是汝達成之事，\n儘管拿去便是。"
20039-990 = "汝真誠實啊。"
20039-1000 = "果然若能實現的話，\n真盼望汝能在妾身身邊……"
20039-1010 = "不，請忘了吧。"

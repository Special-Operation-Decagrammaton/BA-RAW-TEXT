[translation]
10084-10 = "ลมเย็นๆ พัดผ่าน\nตามเสื้อผ้า..."
10084-20 = "ทำให้ฉันตัวหด\nโดยไม่รู้ตัวเลยค่ะ"
10084-30 = "ต้องออกมาถึงข้างนอก\nเพื่อส่งท้ายปีเก่าแบบนี้...\nไม่ไหวเอาซะเลยค่ะ"
10084-40 = "(ต่อให้เป็นรองหัวหน้า\nก็คงคิดไม่ถึงหรอกค่ะ\nว่าฉันแอบเอาเครื่องดักฟัง\nมาในที่แบบนี้ด้วย)"
10084-50 = "(ฮุฮุ...)"
10084-60 = "ทำไมหมีต้องโผล่มา\nในจังหวะนี้ด้วยนะ..."
10084-70 = "โลกนี้มันช่าง\nโหดร้ายจังเลยค่ะ..."
10084-80 = "ต้องรีบกลับไปตัดต่อ\nไฟล์เสียงของคุณครู\nที่บันทึกไว้..."
10084-90 = "มะ... ไม่สิ ฉันอยาก\nรีบไปพักผ่อนน่ะค่ะ...!"
10084-100 = "ความเงียบสงบ...\nนี่เป็นสภาพแวดล้อมที่ฉันไม่ชอบ\nที่สุดเลยละค่ะ..."
10084-110 = "ข้อดีเดียวที่มีคงเป็น"
10084-120 = "การได้ฟังเสียงของคุณครู\nอย่างชัดเจน โดยไม่มี\nเสียงอื่นรบกวนค่ะ"
10084-130 = "สายลมนี่...\nกำลังร้องไห้อยู่สินะคะ"
10084-140 = "กำลังค้นหาความถี่...\nบันทึกการสื่อสาร\nภายในรัศมี 3 กม."
10084-150 = "ไม่มีเลย"
10084-590 = "คะ... คุณครู...\nถ้าไม่ว่าอะไรละก็..."
10084-600 = "มาช่วยกันตั้งแคมป์\nหน่อยได้มั้ยคะ..."
10084-610 = "อ๊ะ คุณครู ฉันกำลังติดตั้งของที่จำเป็น\nในแคมป์ตามคำสั่งของ\nรองหัวหน้าอยู่ค่ะ"
10084-620 = "ได้ยินว่าเป็นอุปกรณ์ค่ายพักแรม\nสำหรับการแคมป์ปิ้งง่ายๆ..."
10084-630 = "แต่การกางเต็นท์นี่ก็\nไม่ง่ายเลยนะคะ"
10084-640 = "มีอะไรจะบอกฉันรึเปล่าคะ...?"
10084-650 = "รอฉันสักเดี๋ยวนะคะ\nฉันจะไปเอาเครื่องบันทึกเสียงมาค่ะ"
10084-660 = "อย่างนี้นี่เองสินะคะ ฉันจะจดจำไว้ค่ะ"
10084-670 = "ที่คุณครูเพิ่งทำเมื่อกี้\nช่วยทำให้ดูอีกครั้งได้มั้ยคะ?"
10084-680 = "ถ้าเป็นไปได้ก็ช่วยพูด\nอธิบายไปด้วยนะคะ"
10084-690 = "เท่านี้ก็น่าจะใช้เวลาคืนนี้\nได้อย่างสบายแล้วละค่ะ"

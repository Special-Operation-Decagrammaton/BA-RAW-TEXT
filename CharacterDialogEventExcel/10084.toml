[translation]
10084-10 = "因為風會從衣服\n縫隙吹進來……"
10084-20 = "讓人不自覺地\n縮起身體。"
10084-30 = "特地出來\n過年什麼的……\n真是欠缺效率。"
10084-40 = "（就算是副部長，\n應該也想不到\n我會把竊聽器\n藏在這種地方吧）"
10084-50 = "（呵呵……）"
10084-60 = "為什麼熊會在\n這種時候……"
10084-70 = "感覺到了\n世界的惡意……"
10084-80 = "得趕快回去\n編輯錄到的\n老師的語音檔……"
10084-90 = "不，不對，我是想\n趕快休息……！"
10084-100 = "沉默和寂靜……\n是我最討厭的環境……"
10084-110 = "唯一的好處……"
10084-120 = "就只有能在沒有雜音\n的情況下清楚聽到\n老師的聲音了吧。"
10084-130 = "這陣風……有種……\n在哭泣的感覺。"
10084-140 = "正在搜尋頻率……\n半徑3km內的\n通訊紀錄……"
10084-150 = "0件。"
10084-590 = "老，老師……\n如果可以的話……"
10084-600 = "帳篷的搭設可以請你幫忙嗎……"
10084-610 = "啊，老師。\n我正依照副部長的指示\n進行帳篷的搭設。"
10084-620 = "我聽說這是\n「超簡單搭設」的\n露營裝備……"
10084-630 = "但設置起來好像\n一點也不簡單……"
10084-640 = "有什麼想說的話嗎……？"
10084-650 = "請稍等一下。\n我要做錄音的準備。"
10084-660 = "原來如此，我會參考的。"
10084-670 = "剛才那個，\n能再讓我看一次嗎？"
10084-680 = "可以的話，麻煩\n一起附上口頭解說。"
10084-690 = "這樣一來，今晚\n應該能舒服地度過了。"

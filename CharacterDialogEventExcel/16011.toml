[translation]
16011-160 = "ฉันกำลังรออยู่เลยค่ะ คุณครู\nพร้อมแล้วหรือยังคะ?"
16011-170 = "การแข่งขันใกล้จะ\nเริ่มพอดีเลยค่ะ\nเราไปด้วยกันเลยมั้ยคะ?"
16011-180 = "คะ...คุณครู...!"
16011-190 = "ถะ... ถึงจะจ้องกันแบบนั้น..."
16011-200 = "ตอนนี้เราต้อง\nออกเดินทางกันแล้วละค่ะ..."
16011-210 = "ต้องการอะไร\nหรือเปล่าคะ?"
16011-280 = "ฉันกำลังรออยู่เลยค่ะ คุณครู\nพร้อมแล้วหรือยังคะ?"
16011-290 = "การแข่งขันใกล้จะ\nเริ่มพอดีเลยค่ะ\nเราไปด้วยกันเลยไหมคะ?"
16011-300 = "บรรยากาศคึกคักมากเลยนะคะ"
16011-310 = "แบบนี้ก็พูดได้ว่า\nฮาโลเฟสติวัลครั้งนี้\nประสบความสำเร็จได้เลยค่ะ"
16011-320 = "มาถึงช่วงสุดท้ายของ\nฮาโลเฟสติวัลแล้วสินะคะ"
16011-330 = "มาออกแรงสู้อีกนิด\nจนกว่าจะจบงานนะคะ"
16011-340 = "ฮาโลเฟสติวัลประสบ\nความสำเร็จสูงมากๆ\nเพราะคุณครูเลยนะคะ"
16011-350 = "คุณครูทำได้\nดีมากๆ เลยละค่ะ"
16011-360 = "คะ... คุณครูคะ...?"
16011-370 = "ถะ... ถึงจะจ้องกันแบบนั้น..."
16011-380 = "ตอนนี้เราต้อง\nออกเดินทางกันแล้วละค่ะ..."
16011-390 = "ต้องการอะไร\nหรือเปล่าคะ?"
16011-500 = "ลองดูสถิติการแข่งขัน\nดูหน่อยไหมคะ?"
16011-510 = "ฉันบันทึกการแข่งขันไว้แล้วค่ะ\nจะลองดูสักหน่อยไหมคะ?"
16011-520 = "อืม... ตอนนี้ฉันมีให้ดู\nแค่เพียงเท่านี้ค่ะ..."
16011-530 = "หรือว่ามีอย่างอื่น\nที่อยากดูอีกเหรอคะ...?"
16011-540 = "ฉันเช็กดูแล้วค่ะ\nเป็นสถิติที่ยอดเยี่ยมเลยค่ะ"
16011-550 = "นี่น่ะ... อาจจะเป็น\nสถิติใหม่ก็ได้นะคะ"

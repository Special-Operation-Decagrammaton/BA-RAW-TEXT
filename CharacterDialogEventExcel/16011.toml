[translation]
16011-160 = "기다리고 있었습니다,\n선생님. 준비는 되셨나요?"
16011-170 = "마침 경기가\n시작되려던 참입니다.\n함께 출발해 보실까요."
16011-180 = "서, 선생님……?"
16011-190 = "그, 그렇게\n쳐다 보셔도……."
16011-200 = "슬슬 출발해야 할\n시간입니다만……."
16011-210 = "뭔가 필요한 게\n있으신가요?"
16011-280 = "기다리고 있었습니다,\n선생님. 준비는 되셨나요?"
16011-290 = "마침 경기가\n시작되려던 참입니다.\n함께 출발해 보실까요."
16011-300 = "꽤 분위기가 들떠 있군요."
16011-310 = "이정도면 황륜대제는\n성공적……이라고\n봐도 되겠지요."
16011-320 = "황륜대제도 막바지에\n접어들었군요."
16011-330 = "마지막까지\n힘내도록 하죠."
16011-340 = "선생님 덕분에\n황륜대제도 대성공을\n거둘 수 있었습니다."
16011-350 = "정말 수고\n많으셨습니다."
16011-360 = "서, 선생님……?"
16011-370 = "그, 그렇게\n쳐다 보셔도……."
16011-380 = "슬슬 출발해야 할\n시간입니다만……."
16011-390 = "뭔가 필요한 게\n있으신가요?"
16011-500 = "경기 기록을\n살펴보시겠습니까?"
16011-510 = "진행 상황을 정리해 보았습니다.\n확인해 보시겠습니까?"
16011-520 = "으음…… 지금 보여드릴 수\n있는 건 이게 전부입니다."
16011-530 = "더 확인하고 싶으신 게\n있으신 걸까요……?"
16011-540 = "확인했습니다.\n훌륭한 기록이네요."
16011-550 = "이건… 신기록일지도\n모르겠습니다."

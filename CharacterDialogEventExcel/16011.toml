[translation]
16011-160 = "讓您久等了，老師。\n準備好了嗎？"
16011-170 = "正好比賽\n要開始了。\n一起去吧。"
16011-180 = "老，老師……？"
16011-190 = "就，就算那樣看著我……"
16011-200 = "差不多該出發了……"
16011-210 = "有什麼需要的嗎？"
16011-280 = "讓您久等了，老師。\n準備好了嗎？"
16011-290 = "正好比賽\n要開始了。\n一起去吧。"
16011-300 = "氣氛相當熱烈呢。"
16011-310 = "這樣的話，\n「晄輪大祭」……\n可以算是成功了吧。"
16011-320 = "晄輪大祭也迎來了\n最後階段。"
16011-330 = "堅持到最後吧。"
16011-340 = "託老師的福，\n「晄輪大祭」取得了\n巨大的成功。"
16011-350 = "真的辛苦您了。"
16011-360 = "老，老師……？"
16011-370 = "就，就算\n這樣盯著我看……"
16011-380 = "差不多該出發了……"
16011-390 = "有什麼需要的嗎？"
16011-500 = "要確認比賽紀錄嗎？"
16011-510 = "我整理了進展狀況。\n要確認一下嗎？"
16011-520 = "那個……現在您看到的\n已經是全部了。"
16011-530 = "還有其他\n想確認的事嗎……？"
16011-540 = "已確認。\n是很棒的記錄呢。"
16011-550 = "這個……\n說不定是新紀錄。"

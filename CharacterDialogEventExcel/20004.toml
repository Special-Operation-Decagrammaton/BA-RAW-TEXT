[translation]
20004-80 = "오늘도 꽤 무덥군요.\n열사병에 주의하세요."
20004-90 = "자, 하계 특별 훈련을\n시작하죠!"
20004-100 = "트리니티의 다른 학생들과\n바다에 오는 것은 처음이라…\n조금 긴장되네요."
20004-110 = "지자요수…\n지혜로운 자는 물을\n좋아한다고 하지요."
20004-120 = "(여름 수영복만큼은\n검은색이 아니더라도\n좋았으려나…)"
20004-130 = "지금, 어디선가\n츠루기 선배의\n절규 소리가…"
20004-420 = "임무도, 휴식도,\n놓치지 않겠습니다."
20004-430 = "설마, 이런 곳에서도 분란을\n일으키려는 문제 학생은 없겠지요?"
20004-440 = "휴양지에서도\n방심은 금물입니다."

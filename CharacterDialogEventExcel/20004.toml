[translation]
20004-80 = "今天也非常熱呢…\n請務必小心中暑。"
20004-90 = "來，開始夏季特別訓練吧！"
20004-100 = "我還是第一次\n跟其他三一的學生\n一起來海邊…\n有點緊張呢。"
20004-110 = "智者樂水…\n就是有智慧的人\n會喜歡水的意思。"
20004-120 = "（只有泳裝的話，\n　就算不是黑色\n　也沒關係吧…）"
20004-130 = "剛才，好像\n從哪裡傳來了\n弦生前輩的叫聲…"
20004-420 = "任務跟休息\n我都不會錯過的。"
20004-430 = "在這種地方，\n應該不會有想要引起動亂的問題學生了吧？"
20004-440 = "在度假勝地\n也不能掉以輕心。"

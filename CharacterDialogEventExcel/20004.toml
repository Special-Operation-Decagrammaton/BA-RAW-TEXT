[translation]
20004-80 = "วันนี้ร้อนมากๆ เลยค่ะ\nระวังเป็นลมแดดด้วยนะคะ"
20004-90 = "เอาละ เรามาเริ่ม\nการฝึกพิเศษภาคฤดูร้อนกันเถอะ!"
20004-100 = "ฉันเพิ่งเคยมาทะเล กับเพื่อนๆ\nนักเรียนโรงเรียนทรีนิตี้คนอื่น...\nเลยรู้สึกตื่นเต้นนิดหน่อยค่ะ"
20004-110 = "ผู้รู้ย่อมชอบน้ำ...\nคนที่เป็นอัจฉริยะ\nยังไงก็ต้องชอบน้ำอยู่แล้วค่ะ"
20004-120 = "(ชุดว่ายน้ำ...\nถ้าเป็นสีอื่นที่ไม่ใช่สีดำ\nจะดีรึเปล่านะ…)"
20004-130 = "เมื่อกี้เหมือนได้ยินเสียงกรีดร้อง\nของรุ่นพี่ซึรุกิจากที่ไหนสักแห่ง..."
20004-420 = "ทั้งภารกิจและการพักผ่อน\nฉันจะไม่พลาดทั้งสองอย่างค่ะ"
20004-430 = "คงไม่มีนักเรียนมาก่อความวุ่นวาย\nที่นี่หรอกใช่ไหมคะ?"
20004-440 = "ถึงจะอยู่ที่สถานที่พักผ่อน\nก็ห้ามละเลยเด็ดขาดค่ะ"

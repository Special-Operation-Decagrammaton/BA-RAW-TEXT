[translation]
20009-10 = "이 몸의 권위를 의심하는\n녀석들은 휴가 중이라도\n숙청이야!"
20009-20 = "흠, 흠. 가끔씩 즐기는\n겨울 휴가도 나쁘지 않지."
20009-30 = "이 몸의 허가 없이\n온천장을 열다니,\n괘씸하잖아!"
20009-40 = "모두 숙청이야, 숙청!"
20009-50 = "무슨 문제라도 있나,\n콤라드?"
20009-60 = "따, 딱히 즐기고 있는 건\n아니거든? 서기장으로서\n학원을 시찰하고 있을\n뿐이니까!"
20009-70 = "게헨나의 그 온천개발부\n녀석들은 꽤나 실력이\n괜찮았었지……"

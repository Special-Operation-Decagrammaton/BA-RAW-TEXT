[translation]
20009-10 = "對咱的權威\n提出質疑的傢伙們，\n就算在休假中也要肅清！"
20009-20 = "呼呣！\n偶爾來點這種\n休假也不錯嘛！"
20009-30 = "居然未經咱的許可\n就開了溫泉浴場……\n豈有此理！"
20009-40 = "全部肅清，\n肅清！"
20009-50 = "嗯？\n怎麼了嗎，同志？"
20009-60 = "才，才沒有在享受！\n只不過是以書記長的身分，\n在視察而已！"
20009-70 = "那個格黑娜的\n溫泉開發部的傢伙們，\n真厲害呢……"
20009-80 = "居然未經咱的許可\n就開了溫泉浴場……\n豈有此理！"
20009-90 = "全部都肅清，肅清！"
20009-100 = "嗯？\n怎麼了嗎，同志？"
20009-110 = "才，才沒有在享受！\n只不過是以書記長的身分，\n在視察而已！"
20009-120 = "那個格黑娜的\n溫泉開發部的傢伙們，\n真厲害呢……"

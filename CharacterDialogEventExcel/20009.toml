[translation]
20009-10 = "คนที่สงสัยในอำนาจของเรา\nต่อให้เป็นวันหยุดพักผ่อน\nก็ต้องโดนกวาดล้าง!"
20009-20 = "อะแฮ่ม บางครั้งการได้เพลิดเพลิน\nกับวันหยุดฤดูหนาวก็ไม่แย่เท่าไหร่นะ"
20009-30 = "เปิดออนเซ็นขึ้นมา\nโดยไม่ได้รับอนุญาตจากเราเรอะ\nไร้มารยาทสิ้นดี!"
20009-40 = "กวาดล้างให้หมด กวาดล้าง!"
20009-50 = "มีปัญหาอะไรหรือเปล่า?\nสหาย?"
20009-60 = "ระ...เราไม่ได้กำลังสนุกซะหน่อย\nในฐานะเลขาธิการพรรค เรากำลัง\nตรวจตราสหภาพอยู่ต่างหาก!"
20009-70 = "ชมรมพัฒนาออนเซ็นของเกเฮนน่า\nเจ้าพวกนั้นก็ดู\nมีความสามารถใช้ได้นะ..."
20009-80 = "เปิดออนเซ็นขึ้นมา\nโดยไม่ได้รับอนุญาตจากเราเรอะ\nไร้มารยาทสิ้นดี!"
20009-90 = "กวาดล้างให้หมด กวาดล้าง!"
20009-100 = "มีปัญหาอะไรหรือเปล่า?\nสหาย?"
20009-110 = "ระ...เราไม่ได้กำลังสนุกซะหน่อย\nในฐานะเลขาธิการพรรค เรากำลัง\nตรวจตราสหภาพอยู่ต่างหาก!"
20009-120 = "ชมรมพัฒนาออนเซ็นของเกเฮนน่า\nเจ้าพวกนั้นก็ดูมีความสามารถใช้ได้นะ..."

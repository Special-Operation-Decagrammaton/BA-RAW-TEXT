[translation]
10070-100 = "Sensei? Hurry over to Shanhaijing."
10070-110 = "Oh, and I suggest you steer clear of the Black Tortoise Promenade."
10070-120 = "Heh. Don't let your eyes wander too much. I'd hate for you to get lost."
10070-130 = "Sensei? Hurry over to Shanhaijing."
10070-140 = "Oh, and I suggest you steer clear of the Black Tortoise Promenade."
10070-150 = "This is Shanhaijing."
10070-160 = "Heh. Don't let your eyes wander too much. I'd hate for you to get lost."
10070-170 = "Oh? You got something to say? Go ahead."
10070-180 = "There are some days when I just want to tell people what I really think."
10070-190 = "Why?"
10070-200 = "We've still got business to finish."
10070-210 = "And even if it's dirty business...somebody's got to do it."
10070-220 = "Wasn't that a cool line?"
10070-230 = "Shanhaijing is noisier than usual."
10070-240 = "Is it because you're here...?"
10070-250 = "If there's action to be had, we'll be the first ones to act."
10070-260 = "So let's go."
10070-380 = "Don't worry. We'll take this one at a time."
10070-390 = "When there are multiple missions, I take care of the simple ones first. That makes things go more smoothly."
10070-400 = "I will always be on your side, Sensei."
10070-410 = "This would have been difficult for even a Genryumon member... I'm surprised, Sensei."
10070-420 = "You really did it, Sensei! I knew I wasn't wrong about you."

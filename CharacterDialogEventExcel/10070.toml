[translation]
10070-100 = "선생님인가.\n어서 오라고. 산해경에."
10070-110 = "아아, 참고로……\n현무상회에 가는 것은\n추천하지 않아."
10070-120 = "후. 너무\n두리번거리지 말라고,\n길을 잃어도 곤란하다."
10070-130 = "선생님인가.\n어서 오라고. 산해경에."
10070-140 = "아아, 참고로……\n현무상회에 가는 것은\n추천하지 않아."
10070-150 = "여기가 바로 산해경이야."
10070-160 = "후. 너무\n두리번거리지 말라고,\n길을 잃어도 곤란하다."
10070-170 = "응? 뭐 하고 싶은\n말이라도 있나?\n그렇다면, 좋아."
10070-180 = "사람에게는……\n그냥 이름을 부르고 싶어지는\n날도 있는 법이니까."
10070-190 = "왜 그러지?"
10070-200 = "우리에게는 아직 해야 할 일이\n남아 있을 텐데."
10070-210 = "설령 그것이,\n「악」이라고 불리는\n것이라고 해도…… 말이다."
10070-220 = "지금 대사,\n멋있지 않았나."
10070-230 = "평소보다 산해경이\n소란스럽군."
10070-240 = "이것도, 선생님이\n있기 때문인가……?"
10070-250 = "사건이 터지면 가장 먼저\n움직이는 것이, 우리 집행부다."
10070-260 = "그러니, 가자고."
10070-380 = "걱정 마,\n하나씩 해 나가면 돼."
10070-390 = "복수의 임무가 있을 때에는,\n일단 간단한 것부터 처리하지.\n그 편이 여러 가지로 순조롭거든."
10070-400 = "언제든 선생님의 편이\n되어 줄 테니까."
10070-410 = "이건, 현룡문에 속한 사람이어도\n어려운 내용이었을 텐데……\n솔직히 놀랐어. 선생님."
10070-420 = "그걸 해내다니, 역시 선생님이군.\n내 눈은 틀리지 않았어."
10070-430 = "다, 다만……!\n이 정도는, 현룡문에서는 보통이다!"

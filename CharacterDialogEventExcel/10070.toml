[translation]
10070-100 = "是老師啊。\n歡迎來到山海經。"
10070-110 = "啊啊，順帶一提……\n我不建議你去\n玄武商會哦。"
10070-120 = "呼。別一直\n東張西望，要是\n迷路我會很困擾的。"
10070-130 = "是老師啊。\n歡迎來到山海經。"
10070-140 = "啊啊，順帶一提……\n我不建議你去\n玄武商會哦。"
10070-150 = "這裡就是山海經。"
10070-160 = "呼。別一直\n東張西望，要是\n迷路我會很困擾的。"
10070-170 = "嗯？有什麼話\n想對我說嗎？\n──那，可以。"
10070-180 = "畢竟人類……\n有時候就是會想\n叫一下別人的名字。"
10070-190 = "怎麼了嗎？"
10070-200 = "我們還有\n該做的事\n沒做完吧？"
10070-210 = "即使那些是被\n他人稱為「惡」\n的事情也一樣……啊。"
10070-220 = "──不覺得剛才\n那句台詞很帥嗎？"
10070-230 = "山海經好像比\n平常更吵鬧啊。"
10070-240 = "這也是因為\n老師在這裡\n的關係嗎……？"
10070-250 = "每當有事件發生，\n最先出動的\n就是我們執行部。"
10070-260 = "所以，出發吧。"
10070-380 = "別擔心，只要\n一樣一樣解決就行了。"
10070-390 = "同時有複數的任務時，\n要從簡單的任務開始處理。\n這樣一來各方面都會比較順利。"
10070-400 = "我永遠都會\n站在老師這一邊。"
10070-410 = "這些，即使對玄龍門的人來說\n都是有點難度的內容……\n老實說確實震驚到我了，老師。"
10070-420 = "竟然能夠完成，\n不愧是老師。\n我的眼光果然沒錯。"
10070-430 = "但，但是……！這種程度，\n在玄龍門也不算什麼！"

[translation]
10070-100 = "คุณครูเองเหรอ\nขอต้อนรับสู่ซานไห่จิงนะ"
10070-110 = "อ่า... ขอบอกไว้ก่อน...\nฉันไม่แนะนำให้ไปที่\nย่านการค้าเทพเต่าดำนะ"
10070-120 = "เฮ้อ อย่ามัวแต่\nมองทางจนเพลินล่ะ\nถ้าหลงทางไปเดี๋ยวจะแย่เอา"
10070-130 = "คุณครูเองเหรอ\nขอต้อนรับสู่ซานไห่จิงนะ"
10070-140 = "อ่า... ขอบอกไว้ก่อน...\nฉันไม่แนะนำให้ไปที่\nย่านการค้าเทพเต่าดำนะ"
10070-150 = "ที่นี่คือซานไห่จิงนะ"
10070-160 = "เฮ้อ อย่ามัวแต่\nมองทางจนเพลินล่ะ\nถ้าหลงทางไปเดี๋ยวจะแย่เอา"
10070-170 = "หืม? มีอะไร\nอยากจะพูดรึเปล่า?\nถ้างั้นก็ดี..."
10070-180 = "คนเราน่ะ...\nบางทีก็มีวันที่อยากจะ\nเรียกชื่อเฉยๆ อยู่บ้าง"
10070-190 = "มีอะไรเหรอ?"
10070-200 = "น่าจะมีงานที่พวกเรา\nต้องทำเหลืออยู่อีกนะ..."
10070-210 = "ถึงแม้สิ่งนั้นจะ\nเป็นสิ่งที่เรียกว่า\n\"ความร้ายกาจ\" ก็ตาม..."
10070-220 = "ที่พูดไปเมื่อกี้\nมันเท่สุดๆ เลยว่ามั้ย"
10070-230 = "ที่ซานไห่จิง\nดูครึกครื้นกว่าปกติ"
10070-240 = "เป็นเพราะคุณครู\nมาที่นี่หรือเปล่านะ...?"
10070-250 = "เวลาเกิดเหตุขึ้น กลุ่มที่\nเคลื่อนไหวก่อน ก็คือ\nคณะบริหารของเรานี่ละ"
10070-260 = "เพราะงั้น ไปกันเถอะ"
10070-380 = "ไม่ต้องห่วง ค่อยๆ จัดการ\nไปทีละอย่างก็ได้"
10070-390 = "ตอนที่มีภารกิจเข้ามาหลายๆ อย่าง\nต้องเริ่มจัดการจากภารกิจง่ายๆ ก่อน\nทำแบบนั้นแล้วงานจะง่ายขึ้นเยอะเลย"
10070-400 = "ไม่ว่าเมื่อไร\nฉันก็จะอยู่ข้างคุณครูเอง"
10070-410 = "นี่เป็นรายละเอียดที่ยากมาก...\nแม้แต่คนในสำนักมังกรดำเองก็ตาม\nบอกตามตรง ฉันตกใจจริงๆ นะ คุณครู"
10070-420 = "ทำงานนั้นสำเร็จแล้วเหรอ สมกับเป็น\nคุณครูจริงๆ ฉันมองคนไม่ผิดจริงด้วย"
10070-430 = "ตะ... แต่ว่า...! แค่นี้ก็ยังถือว่า\nธรรมดาสำหรับสำนักมังกรดำนะ!"

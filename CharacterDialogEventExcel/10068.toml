[translation]
10068-70 = "อ๊ะ คุณครู ทางนี้ค่ะ!"
10068-80 = "ซูเปอร์ฮีโร\nแห่งกลุ่มรักษาความสงบ!"
10068-90 = "อุซาวะ เรอิสะ\nขอรายงานตัวค่ะ!"
10068-100 = "ค่ะ! อุซาวะ เรอิสะ\nกำลังรอคำสั่งค่ะ!"
10068-110 = "มีเรื่องอะไรเหรอคะ?\nบอกฉันได้ตลอดเลยค่ะ!"
10068-120 = "เกิดเหตุอะไรเหรอคะ!?\nที่ไหนคะ!?\nใครก่อเรื่องคะเนี่ย!?"
10068-130 = "อืม...\nการอยู่เฉยๆ เนี่ย\nยากที่สุดเลยค่ะ..."
10068-340 = "อ๊ะ คุณครู ทางนี้ค่ะ!"
10068-350 = "ซูเปอร์ฮีโร่\nแห่งกลุ่มรักษาความสงบ!"
10068-360 = "อุซาวะ เรอิสะ\nขอรายงานตัวค่ะ!"
10068-370 = "โอ๊สสสส-!\nกำลังร้อนแรงเลยค่ะ!"
10068-380 = "ใกล้จะถึงแล้วค่ะ!"
10068-390 = "วิ่งสุดใจ\nให้ถึงเส้นชัยเลย!"
10068-400 = "ค่ะ! อุซาวะ เรอิสะ\nกำลังรอคำสั่งค่ะ!"
10068-410 = "มีเรื่องอะไรเหรอคะ?\nบอกฉันได้ตลอดเลยค่ะ!"
10068-420 = "เกิดเหตุอะไรเหรอคะ!?\nที่ไหนคะ!?\nใครก่อเรื่องคะเนี่ย!?"
10068-430 = "อืม...\nการอยู่เฉยๆ เนี่ย\nยากที่สุดเลยค่ะ..."
10068-440 = "มันเป็นของที่เก็บได้ตอนลาดตระเวนค่ะ\nคุณครูก็มาดูด้วยไหมคะ?"
10068-450 = "พอทำงานนี้ไปเรื่อยๆ\nก็ได้เจอของหายบ่อยๆ เลยค่ะ..."
10068-460 = "ฉันก็อยากตามหา\nเจ้าของให้หรอกนะคะ"
10068-470 = "แต่มีชิ้นไหนที่คุณครูอยากได้ไหมคะ?\nฉันจะไปเช็กมานะคะ!"
10068-480 = "หืม? หาอะไรเหรอคะ?"
10068-490 = "ของที่อยากได้ไม่มีตรงนี้เหรอคะ?"
10068-500 = "ถ้ามีอะไรที่อยากได้\nก็บอกฉันได้เลยนะคะ!"
10068-510 = "ฉันจะเอามาให้ทันทีเลยค่ะ!"
10068-520 = "โอ้วว อันนั้นเหรอ"
10068-530 = "อืม! มันก็ดีเหมือนกันค่ะ"
10068-540 = "อยากได้อันนั้นเหรอคะ?"
10068-550 = "นี่ค่ะ รับไปเลยค่ะ~!"
10068-560 = "อ๊ะ! สวัสดีค่ะ คุณครู!"
10068-570 = "มีเรื่องที่ฉันต้องคลี่คลาย\nเยอะเป็นภูเขาเลยค่ะ!"
10068-580 = "ฉันทำเป็นลิสต์ไว้แล้วค่ะ!\nไปเช็กด้วยกันเลยค่ะ!"
10068-590 = "หืม...? คุณครู?\nทำไมเป็นแบบนั้นล่ะคะ?"
10068-600 = "ตั้งใจหน่อยค่ะ!\nช่วยโฟกัสกับงานด้วยค่ะ!"
10068-610 = "โอ้ว!\nต้องอย่างนี้แหละคุณครู!"
10068-620 = "ดีเลยค่ะ!\nเรียบร้อยดีจังเลยค่ะ!!"

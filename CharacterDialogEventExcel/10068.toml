[translation]
10068-70 = "啊，老師！\n我在這邊唷！"
10068-80 = "自衛隊的超級英雄！"
10068-90 = "宇沢澪紗\n向你問好！"
10068-100 = "是！宇沢澪紗，\n待命中！"
10068-110 = "有什麼事嗎？\n請隨時告訴我！"
10068-120 = "是事件嗎！？\n在哪裡呢！？\n是誰的事呢！？"
10068-130 = "唔唔……\n乖乖待著\n是最難的……"
10068-340 = "啊，老師！\n我在這邊唷！"
10068-350 = "自衛隊的超級英雄！"
10068-360 = "宇沢澪紗\n向你問好！"
10068-370 = "喔喔喔！\n熱鬧起來了！"
10068-380 = "最後衝刺！的說！"
10068-390 = "讓我們衝刺到\n最後一刻吧！"
10068-400 = "是！宇沢澪紗，\n待命中！"
10068-410 = "有什麼事嗎？\n請隨時告訴我！"
10068-420 = "是事件嗎！？\n在哪裡呢！？\n是誰的事呢！？"
10068-430 = "唔唔……\n乖乖待著\n是最難的……"
10068-440 = "這是巡邏中收集到的物品！\n老師也要過目一下嗎？"
10068-450 = "做這份工作，\n時常會看到遺失物呢……"
10068-460 = "希望失主能\n順利找到它們。"
10068-470 = "還有其他需要的東西嗎？\n我會去確認的！"
10068-480 = "嗯？在找什麼嗎？"
10068-490 = "是這裡沒有的東西嗎？"
10068-500 = "如果有任何需要\n的東西請儘管說！"
10068-510 = "我會馬上拿來的！"
10068-520 = "哦，原來如此原來如此。"
10068-530 = "嗯呣！\n那個也不錯呢。"
10068-540 = "在找的東西\n原來是那個啊！"
10068-550 = "來，在這裡，\n請收下～！"
10068-560 = "啊！你好，老師！"
10068-570 = "需要解決的事件\n堆積如山呢！"
10068-580 = "我準備了清單！\n一起確認吧！"
10068-590 = "嗯……？老師？\n怎麼了嗎？"
10068-600 = "專心！\n請專心在作業上！"
10068-610 = "喔喔～！\n不愧是老師！"
10068-620 = "真棒呢！很順利！！"

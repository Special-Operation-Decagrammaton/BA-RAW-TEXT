[translation]
10068-70 = "아, 선생님! 이쪽입니다!"
10068-80 = "자경단의 슈퍼히어로!"
10068-90 = "우자와 레이사\n인사드립니다!"
10068-100 = "네! 우자와 레이사\n대기 중입니다!"
10068-110 = "무슨 일이세요?\n언제든지 말씀 해주세요!"
10068-120 = "사건인가요!?\n어디죠!?\n누구의 일이죠!?"
10068-130 = "으음…….\n가만히 있는 게\n제일 힘듭니다……."
10068-340 = "아, 선생님! 이쪽입니다!"
10068-350 = "자경단의 슈퍼히어로!"
10068-360 = "우자와 레이사\n인사드립니다!"
10068-370 = "오오옷-!\n달아오르고 있습니다!"
10068-380 = "막판 스퍼-트! 입니다!"
10068-390 = "마지막까지,\n달려 나갑시다!"
10068-400 = "네! 우자와 레이사\n대기 중입니다!"
10068-410 = "무슨 일이세요?\n언제든지 말씀 해주세요!"
10068-420 = "사건인가요!?\n어디죠!?\n누구의 일이죠!?"
10068-430 = "으음…….\n가만히 있는 게\n제일 힘듭니다……."
10068-440 = "순찰 중에 모은 물건입니다!\n선생님도 보시겠어요?"
10068-450 = "이 일을 하다 보면,\n분실물을 자주 보게 되네요…."
10068-460 = "무사히 주인을\n찾았으면 좋겠습니다만"
10068-470 = "더 필요하신 것 있으신가요?\n확인하고 오겠습니다!"
10068-480 = "응? 뭘 찾으시나요?"
10068-490 = "그건 여기에는 없는 건가요?"
10068-500 = "필요한 게 있으면\n뭐든 말씀해 주세요!"
10068-510 = "바로 가져다드릴께요!"
10068-520 = "오호, 과연과연."
10068-530 = "음! 그것도 좋죠."
10068-540 = "그게 필요하셨군요?"
10068-550 = "자, 여기 있습니다~!"
10068-560 = "앗! 안녕하세요, 선생님!"
10068-570 = "해결해야 할 사건이\n산더미에요!"
10068-580 = "리스트를 준비해 두었습니다!\n함께 체크해 보시죠!"
10068-590 = "응……? 선생님?\n왜 그러시죠?"
10068-600 = "집중!\n작업에 집중해 주세요!"
10068-610 = "오오-!\n역시 선생님!"
10068-620 = "좋습니다! 순조롭군요!!"

[translation]
10115-190 = "老師！你喜歡棒球嗎？"
10115-200 = "我非常喜歡！"
10115-210 = "今天是重要的比賽哦！"
10115-220 = "不，沒有一場\n比賽不是那樣的！"
10115-230 = "不詳的氣氛……"
10115-240 = "不過我還是相信！\n哪怕從現在開始也好，\n一起上演逆轉劇吧！"
10115-250 = "棒球在九局下半\n兩出局之後才是\n重頭戲哦！"
10115-260 = "不怠於準備的人，\n機會的女神\n才會對他微笑！"
10115-270 = "真不敢相信……"
10115-280 = "我竟然……\n打出了全壘打……"
10115-290 = "棒球……實在太棒了！"
10115-300 = "如果是規則的話，\n請儘管問我吧！"
10115-310 = "……我正在看比賽紀錄。"
10115-320 = "如此龐大的紀錄，\n以前好像都是\n用紙本管理的。"
10115-330 = "現在簡直\n無法想像呢……"
10115-340 = "哇哇，很癢耶！"
10115-350 = "老師！\n請不要摸奇怪的地方！"
10115-360 = "真是的……\n現在還在比賽耶……！？\n而且有人在看哦？"
10115-370 = "球場美食！\n這也是絕品哦！"
10115-380 = "老師，去吃點東西吧！"
10115-390 = "至於價格……\n在意的話就輸了！"
10115-530 = "老師！體育場\n正在舉辦抽獎！"
10115-540 = "其實我被抓來\n幫忙了……"
10115-550 = "現在正在舉辦抽獎！"
10115-560 = "請來看看吧！"
10115-570 = "怎麼樣？\n有像是店員嗎？"
10115-580 = "剩下的抽獎券，\n請記得用完哦！"
10115-590 = "好像也會照常支付\n打工的薪水哦！"
10115-600 = "嘿嘿，來買個新手套吧？"
10115-610 = "選手必須具備的，\n是技術和運氣。"
10115-620 = "……之所以\n打不出全壘打，\n說不定是運氣不好！"
10115-630 = "哇！1等獎！\n是1等獎耶！\n太厲害了！"
10115-640 = "是2等獎呢！\n真不愧是你，老師！"
10115-650 = "好像是幸運獎呢！\n老師！"
10115-660 = "總覺得現在的話，\n感覺能打出全壘打！"
10115-670 = "是3等獎呢。"
10115-680 = "有得獎是件好事！"
10115-690 = "參加獎啊……"
10115-700 = "沒關係的，老師！\n不是有句話叫\n「參加就有意義」嗎！"
10115-710 = "…………剛才\n什麼都沒發生。\n對吧，老師？"
10115-720 = "重要的……\n是每天持之以恆！"
10115-730 = "就跟訓練一樣呢！"
10115-740 = "就算是例行公事，\n只要習慣就沒問題了！"
10115-750 = "每天累積的成果，\n會讓人越來越輕鬆的哦。"
10115-760 = "偉大的選手從起床時間、\n訓練清單到餐點內容都會\n全部做好規劃……"
10115-770 = "並且照著進行。"
10115-780 = "我的話……\n感覺做不到……"
10115-790 = "現在說可能有點晚了……\n不過老師還真厲害呢。"
10115-800 = "早上就要上班，\n整天都在工作……"
10115-810 = "跟每天上學一樣……？"
10115-820 = "但我聽說大人比學校\n辛苦很多倍耶？不是嗎？"
10115-830 = "努力有所收穫，\n就是這麼回事吧！"
10115-840 = "恭喜你，老師！"
10115-850 = "成功了呢，老師！"
10115-860 = "為了不輸給你，\n我也會打起精神的！"
10115-870 = "今天就到此為止！\n辛苦了！"
10115-880 = "老師！你接下來有空嗎？"

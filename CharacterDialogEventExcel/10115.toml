[translation]
10115-190 = "야구 좋아하시나요,\n선생님?"
10115-200 = "저는, 정말로 좋아해요!"
10115-210 = "오늘 경기는 중요합니다!"
10115-220 = "사실 중요하지 않은\n경기는 없지만요!"
10115-230 = "경기 흐름이 미묘하지만……"
10115-240 = "저는 역전할 수\n있을 거라고 믿어요!"
10115-250 = "야구는 9회 말\n투아웃부터라고 하죠!"
10115-260 = "준비하고 있지 않으면,\n기회는 오지 않으니까요!"
10115-270 = "아직도 믿기지 않아요."
10115-280 = "제가 홈런을 치다니……\n그 타구, 그 궤적……"
10115-290 = "야구는 정말로 좋네요!"
10115-300 = "왜 그러세요, 선생님?\n혹시 야구 규칙에 대해,\n알고 싶은 것이 있으세요?"
10115-310 = "경기 기록을\n찾아보고 있었어요."
10115-320 = "지금은 인터넷에\n정리되어 있어서 편한데."
10115-330 = "예전에는 자료들을\n하나하나 찾아야\n했다고 하네요."
10115-340 = "여, 옆구리는 안 돼요,"
10115-350 = "선생님!\n겨드랑이도요……!"
10115-360 = "일단은 경기 중이고,\n사람도 많으니까요……"
10115-370 = "뭔가 주문할까요?"
10115-380 = "야구장 음식이\n또 별미거든요!"
10115-390 = "가격은…… 조금\n잊어버리도록 하죠. 네."
10115-530 = "경기장에서 경품\n추첨을 한다고 해요!"
10115-540 = "어쩌다가 제가 도우미까지\n하게 된 건지는\n모르겠지만요……"
10115-550 = "어서 오세요!"
10115-560 = "행운을 시험해\n보시겠어요?"
10115-570 = "어때요, 선생님?\n조금 프로 같아 보였나요?"
10115-580 = "안녕하세요, 선생님. 혹시\n남은 추첨권이 있으시다면,\n전부 사용하고 가시면\n좋을 것 같아요!"
10115-590 = "일일 경품 추첨\n도우미지만,\n아르바이트비도\n확실히 준대요!"
10115-600 = "일단 글러브를\n새것으로 바꾸려고요."
10115-610 = "야구는 기술도\n중요하지만,\n운도 따라 줘야 하죠."
10115-620 = "……제가 홈런을\n못 치는 것은, 운이\n없기 때문 아닐까요?!"
10115-630 = "1등상! 1등상이에요,\n선생님! 우와, 대단해요!"
10115-640 = "이건 2등상이네요!\n1등이 아닌 것은\n아쉽지만, 그래도\n이게 어딘가요!"
10115-650 = "행운상이군요."
10115-660 = "어떻게 보면\n이 상이야말로,\n경품 추첨의 본질이라고\n볼 수도 있지 않을까요?"
10115-670 = "장려상…… 인가요."
10115-680 = "에이, 뭐 어때요.\n이것도 충분히\n좋잖아요?"
10115-690 = "참가상……"
10115-700 = "괜찮아요, 선생님!\n참가하는 것에 의의가\n있다는 말도 있고요! 네!"
10115-710 = "…………자,\n아무 일도 없었어요!\n……그렇죠, 선생님?"
10115-720 = "이런 일에서 중요한 것은,\n같은 분량을, 매일 꾸준히\n계속하는 것이라고 생각해요."
10115-730 = "훈련과 마찬가지네요!"
10115-740 = "반복되는 일은\n지루할지도 모르지만……"
10115-750 = "거기에서 얻을 수 있는 것도,\n분명히 있을 테니까요."
10115-760 = "위대한 선수들은, 매일 같은 것만 먹고,\n같은 시간에 자고."
10115-770 = "훈련도 정확히 기준을\n지켜 가면서 한다죠……"
10115-780 = "저는…… 그 정도로는\n힘들어서 못 할 것 같아요……"
10115-790 = "새삼 선생님도\n대단하시다는 생각이 들어요."
10115-800 = "매일 출근하시고……\n업무에 치여 지내시고……"
10115-810 = "네? 저도 학교에\n매일 가지 않냐고요?"
10115-820 = "하지만 학교보다 직장이 훨씬\n힘들다고 들었는데, 아닌가요?"
10115-830 = "훈련의 성과……\n같은 것이네요!"
10115-840 = "축하드려요, 선생님!"
10115-850 = "해내셨네요, 선생님!"
10115-860 = "저도 열심히 하겠습니다.\n지켜봐 주세요!"
10115-870 = "오늘 일정은 이것으로 끝!"
10115-880 = "그래서 말인데요.\n이다음에 시간 되시나요?"

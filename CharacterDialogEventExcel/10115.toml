[translation]
10115-190 = "ชอบเบสบอล\nมั้ยคะคุณครู?"
10115-200 = "ฉันชอบมากเลยค่ะ!"
10115-210 = "การแข่งขันวันนี้\nเป็นเกมสำคัญเลยค่ะ!"
10115-220 = "ที่จริงก็ไม่มีการแข่งขันไหน\nที่ไม่สำคัญหรอกค่ะ!"
10115-230 = "แม้เกมจะดูละเอียดอ่อน..."
10115-240 = "แต่ฉันเชื่อว่า\nเกมจะพลิกได้ค่ะ!"
10115-250 = "ว่ากันว่าเบสบอลต้องลุ้น\nตั้งแต่ปลายอินนิ่งที่ 9 ค่ะ!"
10115-260 = "ถ้าไม่เตรียมพร้อมอยู่เสมอ\nโอกาสก็ไม่เข้าหาหรอกค่ะ!"
10115-270 = "ฉันยังไม่อยากเชื่อเลยค่ะ"
10115-280 = "ฉันตีลูกโฮมรันเหรอเนี่ย...\nการตีครั้งนั้น วิถีแบบนั้น..."
10115-290 = "เบสบอลมันดีจริงๆ เลยนะคะ!"
10115-300 = "ทำไมเหรอคะ คุณครู?\nคุณครูพอรู้กติกา\nของเบสบอลมั้ยคะ?"
10115-310 = "ฉันกำลังหา\nสถิติการแข่งขันอยู่ค่ะ"
10115-320 = "ตอนนี้มันสะดวก\nเพราะมีในอินเทอร์เน็ต"
10115-330 = "ได้ยินว่าแต่ก่อน\nต้องไล่หาข้อมูล\nทีละอย่างๆ เองเลยนะคะ"
10115-340 = "ยะ... อย่าจิ้มสีข้างกันสิคะ"
10115-350 = "คุณครู!\nตรงรักแร้ก็ด้วยค่ะ...!"
10115-360 = "ตอนนี้การแข่งขันยังไม่จบ\nแล้วคนก็เยอะด้วย..."
10115-370 = "สั่งอะไรมาดีมั้ยคะ?"
10115-380 = "อาหารในสนามเบสบอล\nรสชาติดีนะคะ!"
10115-390 = "แต่ราคา... ก็ค่อนข้างจะ...\nเราลืมๆ มันไปเถอะค่ะ"
10115-530 = "ได้ยินว่าในสนามกีฬา\nมีสุ่มแจกรางวัลด้วยค่ะ!"
10115-540 = "ไม่รู้ทำไมฉันถึง\nกลายมาเป็นผู้ช่วย\nได้นะคะเนี่ย..."
10115-550 = "เชิญค่ะ!"
10115-560 = "มาลองเสี่ยงโชค\nดูมั้ยคะ?"
10115-570 = "เป็นไงคะ คุณครู?\nตอนนี้ฉันเหมือนมือโปรมั้ยคะ?"
10115-580 = "สวัสดีค่ะคุณครู ถ้ายังมี\nบัตรสุ่มเหลืออยู่\nก็ควรมาใช้ให้หมดเลยนะคะ!"
10115-590 = "ถึงฉันจะเป็นผู้ช่วย\nสุ่มรางวัลรายวัน\nแต่ว่าฉันก็จะได้\nค่าจ้างงานพาร์ทไทม์ค่ะ!"
10115-600 = "ฉันว่าจะเปลี่ยน\nถุงมือคู่ใหม่ก่อนค่ะ"
10115-610 = "สำหรับเบสบอลแล้ว\nทักษะก็เป็นสิ่งสำคัญ\nแต่ก็ต้องมีโชคช่วยด้วยค่ะ"
10115-620 = "ที่ฉันตีลูกโฮมรันไม่ได้...\nน่าจะเป็นเพราะฉัน\nโชคไม่ดีนะคะ!"
10115-630 = "รางวัลที่ 1! ได้รางวัลที่ 1 เลยค่ะ\nคุณครู! ว้าว สุดยอดเลยค่ะ!"
10115-640 = "นี่รางวัลที่ 2 เลยนะคะ!\nถึงจะน่าเสียดาย\nที่ไม่ได้รางวัลที่ 1\nแต่นี่ก็ดีแล้วค่ะ!"
10115-650 = "รางวัลแห่งความโชคดีสินะคะ"
10115-660 = "จะว่าไป\nอาจเรียกได้ว่าของชิ้นนี้\nเป็นแก่นแท้ของการสุ่มรางวัล\nเลยก็ได้นะคะ?"
10115-670 = "รางวัลชมเชย... สินะคะ"
10115-680 = "แต่ก็ไม่เป็นไรหรอกค่ะ\nชิ้นนี้ก็พอใช้ได้เลยนี่คะ?"
10115-690 = "รางวัลเข้าร่วม..."
10115-700 = "ไม่เป็นไรนะคะคุณครู!\nว่ากันว่าแค่เข้าร่วม\nก็ถือว่ามีความหมายแล้วค่ะ!"
10115-710 = "เอาละ...\nไม่มีเรื่องอะไรทั้งนั้นค่ะ!\nใช่มั้ยคะ... คุณครู?"
10115-720 = "สิ่งสำคัญของงานแบบนี้ ฉันว่าคือ\nการทำต่อเนื่องให้เท่ากันในทุกวันค่ะ"
10115-730 = "การฝึกซ้อมก็เหมือนกันค่ะ!"
10115-740 = "ถึงงานที่ทำซ้ำๆ\nมันจะน่าเบื่อ..."
10115-750 = "แต่เราจะได้บางอย่าง\nจากสิ่งนั้นอย่างแน่นอนค่ะ"
10115-760 = "นักกีฬาเก่งๆ จะกินของเดิมๆ\nและนอนเวลาเดิมทุกวัน"
10115-770 = "ส่วนเรื่องการฝึกซ้อม\nก็จะทำตามมาตรฐานค่ะ..."
10115-780 = "ฉัน... น่าจะทำ\nแบบนั้นไม่ไหวหรอกค่ะ..."
10115-790 = "ฉันรู้สึกว่าคุณครู\nก็ยอดเยี่ยมเหมือนกันค่ะ"
10115-800 = "ไปทำงานทุกวัน...\nแล้วก็โหมงานหนักตลอด..."
10115-810 = "คะ? ฉันก็ไปโรงเรียนทุกวัน\nเหมือนกันงั้นเหรอคะ?"
10115-820 = "แต่ได้ยินว่าการทำงานมันยากกว่า\nการเรียนเยอะเลยไม่ใช่เหรอคะ?"
10115-830 = "นี่เป็นเหมือนกับ...\nผลจากการฝึกซ้อมเลยค่ะ!"
10115-840 = "ยินดีด้วยค่ะ คุณครู!"
10115-850 = "สำเร็จแล้วนะคะ คุณครู!"
10115-860 = "ฉันก็จะพยายามค่ะ!\nคอยเฝ้าดูฉันด้วยนะคะ!"
10115-870 = "งานวันนี้เสร็จเท่านี้!"
10115-880 = "ถ้างั้น หลังจากนี้\nพอมีเวลามั้ยคะ?"

[translation]
10115-190 = "Do you like baseball, Sensei?"
10115-200 = "Because I love it!"
10115-210 = "Today's game is important!"
10115-220 = "But every game is important!"
10115-230 = "The game isn't going well..."
10115-240 = "We can still make a comeback!"
10115-250 = "They say real baseball starts from the 9th inning, with 2 outs!"
10115-260 = "You have to be prepared to grab the opportunity when it arises!"
10115-270 = "I still can't believe it."
10115-280 = "I hit a home run... That hit, that trajectory..."
10115-290 = "Baseball is really amazing!"
10115-300 = "What's wrong, Sensei? Do you have any questions about the rules of baseball?"
10115-310 = "I was looking through the game records."
10115-320 = "It's easy nowadays because they're all organized on the internet."
10115-330 = "But in the past, people had to dig for resources piece by piece."
10115-340 = "D-Don't poke my sides..."
10115-350 = "Sensei! Not my armpit either...!"
10115-360 = "Since we're at a game, and there are lots of people..."
10115-370 = "...should we order something to eat?"
10115-380 = "Baseball stadium foods are delicacies!"
10115-390 = "Although the prices are...a bit. Let's not think about it. Yeah."
10115-530 = "They're holding a raffle at the stadium!"
10115-540 = "I don't know how I got roped into helping them out, though..."
10115-550 = "Welcome!"
10115-560 = "Would you like to try your luck?"
10115-570 = "How is it, Sensei? Did I sound professional?"
10115-580 = "Hello, Sensei. If you have any leftover raffle tickets, please use them all before you leave!"
10115-590 = "I'm just helping out for today, but they said they'll pay me for the part-time work!"
10115-600 = "I'm thinking of changing my mitt first."
10115-610 = "In baseball, skills are important, but so is luck."
10115-620 = "...Maybe I just need more luck to be able to hit a home run?"
10115-630 = "First place! It's the first place prize, Sensei! Woah, how amazing!"
10115-640 = "This is the second place prize! It's a shame that you didn't get first place, but this is still incredible!"
10115-650 = "A lucky prize."
10115-660 = "In a way, this prize is the essence of a raffle, right?"
10115-670 = "An honorable mention..."
10115-680 = "Well, whatever. This is still good, right?"
10115-690 = "A participation award..."
10115-700 = "Don't worry about it, Sensei! They say participation is what really matters! Yeah!"
10115-710 = "...Okay, nothing happened! ...Isn't that right, Sensei?"
10115-720 = "What really matters in these kinds of situations is to be consistent with your work output!"
10115-730 = "Just like training!"
10115-740 = "Repetitive work IS pretty boring..."
10115-750 = "...but there's a lot you can learn from it too!"
10115-760 = "They say great players eat the same things, sleep at the same time..."
10115-770 = "...and meet the same, strict standards for training everyday..."
10115-780 = "I'm...not sure if I have the energy for all that..."
10115-790 = "You're making me realize how incredible you are again."
10115-800 = "Clocking in everyday...getting swarmed by work..."
10115-810 = "What? Don't I also go to school everyday?"
10115-820 = "But I heard work is way harder than school, no?"
10115-830 = "It's like...the fruits of training!"
10115-840 = "Congratulations, Sensei!"
10115-850 = "You did it, Sensei!"
10115-860 = "I'm going to work hard too. Please watch me!"
10115-870 = "And that's it for today's schedule!"
10115-880 = "Sooo, do you have some spare time after this?"

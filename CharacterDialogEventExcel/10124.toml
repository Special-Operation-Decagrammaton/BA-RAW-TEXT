[translation]
10124-520 = "바다, 설마 이런 식으로\n오게 될 줄은 몰랐군요."
10124-530 = "네? 신나 보인다고요?"
10124-540 = "후후, 어쩌면\n그럴지도 모르겠네요."
10124-550 = "같은 임무라고 해도, 장소가\n바뀌는 것만으로 이렇게\n다른 느낌이 드는군요."
10124-560 = "조금, 앞으로의 일이\n기대되기 시작했습니다."
10124-570 = "아, 선생님. 혹시\n이치카와 미카 님을\n보셨습니까?"
10124-580 = "한참 전부터\n보이질 않아서요."
10124-590 = "혹시 무슨 문제라도\n생긴 걸까요?"
10124-600 = "걱정하지 말고\n즐기라고 하셔도……"
10124-610 = "선생님 말씀이니,\n틀림없겠습니다만."
10124-620 = "설마, 뒤에서 그런\n소동이 있었을 줄이야."
10124-630 = "본분을 잊고,\n즐기기만 한 것 같아서\n부끄럽습니다."
10124-640 = "잘 즐겼다고 하니,\n다행이라고요?"
10124-650 = "저한테 그렇게 말하는\n사람은, 선생님밖에\n안 계실 겁니다."
10124-660 = "계획과는 다르지만,\n이번 일정도\n잘 마무리되었군요."
10124-670 = "무엇보다 선생님의\n공이 큽니다."
10124-680 = "다시 한번 정의실현부를\n대표해 감사드립니다."
10124-690 = "저희 이치카도,\n조금은 바뀐 듯하고요."
10124-700 = "저 개인으로서도\n감사의 말씀 드립니다."
10124-710 = "저희 내부의 사정으로\n선생님께 신세를\n지게 되었습니다."
10124-720 = "신경 쓰지\n말라고 하셔도……."
10124-730 = "물론, 선생님이시니\n그리 말씀하실 줄은\n알았습니다만."
10124-740 = "적어도, 이 말만은\n전하고 싶었습니다."
10124-750 = "정말로 감사하다고요.."
10124-760 = "정의실현부 내에서도,\n이번 계획은\n의미하는 바가 큽니다."
10124-770 = "언젠가는 그 아이도,\n홀로서기를\n해야 할 테니까요."
10124-780 = "아시다시피 츠루기는\n대외 업무가 특기는\n아니라서요."
10124-790 = "그러다 보니\n티파티와의 업무도,"
10124-800 = "주로 제가\n전담하게 되었죠."
10124-810 = "……그렇게 생각하면,\n세 분을 모신 지도\n꽤 되었네요."
10124-820 = "사실, 저는 바다에\n오는 것은 포기하고\n있었습니다."
10124-830 = "미카 님께는,\n감사드리지 않으면\n안 되겠네요."

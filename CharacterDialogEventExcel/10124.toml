[translation]
10124-520 = "ไม่คิดเลยนะคะว่าจะได้\nมาทะเลด้วยวิธีนี้"
10124-530 = "คะ? ฉันดูตื่นเต้นเหรอคะ?"
10124-540 = "ฮุฮุ บางทีก็อาจจะ\nเป็นอย่างนั้นก็ได้นะคะ"
10124-550 = "ต่อให้เป็นภารกิจเดิม แต่ถ้า\nเปลี่ยนสถานที่ ความรู้สึกก็\nเปลี่ยนได้ขนาดนี้เลยนะคะ"
10124-560 = "ฉันเริ่มตั้งตารอ\nภารกิจต่อไปแล้วละค่ะ"
10124-570 = "อ๊ะ คุณครู เห็นอิจิกะ\nกับคุณมิกะบ้างมั้ยคะ?"
10124-580 = "ฉันไม่เห็น\nมาสักพักแล้วน่ะค่ะ"
10124-590 = "จะมีปัญหาอะไร\nเกิดขึ้นหรือเปล่าคะ?"
10124-600 = "ต่อให้บอกฉันว่าอย่ากังวล\nแล้วไปเล่นสนุกก็เถอะ..."
10124-610 = "แต่คำพูดของคุณครู\nก็น่าจะถูกต้องละค่ะ"
10124-620 = "คิดไม่ถึงเลยค่ะ\nว่าจะเกิดเรื่องวุ่นวายแบบนั้น"
10124-630 = "ฉันเหมือนจะลืมหน้าที่หลัก\nแล้วไปสนุกอยู่อย่างเดียวเลย\nน่าอายจังเลยค่ะ"
10124-640 = "ค่อยยังชั่วที่ฉัน\nได้สนุกสนานงั้นเหรอคะ?"
10124-650 = "คนที่พูดแบบนั้นกับฉัน\nมีแค่คุณครูคนเดียว\nเท่านั้นค่ะ"
10124-660 = "ถึงจะต่างจากแผนไปบ้าง\nแต่ภารกิจนี้ก็จบลง\nอย่างราบรื่นนะคะ"
10124-670 = "คุณครูช่วยไว้ได้\nเยอะมากเลยค่ะ"
10124-680 = "ฉันขอขอบคุณอีกครั้งค่ะในฐานะ\nตัวแทนชมรมทวงความยุติธรรมค่ะ"
10124-690 = "อิจิกะของพวกเราก็\nดูจะเปลี่ยนไปนิดหน่อยด้วยค่ะ"
10124-700 = "ฉันขอขอบคุณ\nเป็นการส่วนตัวนะคะ"
10124-710 = "เราติดหนี้บุญคุณคุณครู\nด้วยเหตุผลภายใน\nของพวกเราค่ะ"
10124-720 = "ต่อให้จะบอกว่า\nไม่ต้องใส่ใจก็เถอะ..."
10124-730 = "ฉันรู้ว่าคุณครู\nจะพูดอย่างนั้น\nอยู่แล้วค่ะ"
10124-740 = "อย่างน้อยฉันก็\nอยากจะพูดคำคำนั้นค่ะ"
10124-750 = "ขอบคุณจริงๆ นะคะ..."
10124-760 = "แผนการนี้ก็มีความหมาย\nกับชมรมทวงความยุติธรรม\nมากเลยค่ะ"
10124-770 = "สักวันหนึ่ง\nเด็กคนนั้นต้องทำงาน\nเลขาฯ คนเดียวน่ะค่ะ"
10124-780 = "ซึรุกิไม่เหมาะกับการ\nทำงานกับภายนอก\nอย่างที่ทราบมาค่ะ"
10124-790 = "เพราะอย่างนั้น\nงานเกี่ยวกับสภาน้ำชา"
10124-800 = "ส่วนมากจะเป็นฉัน\nที่ได้รับผิดชอบน่ะค่ะ"
10124-810 = "พอคิดแบบนั้น...\nก็นานแล้วนะคะ\nที่ฉันทำงานให้ 3 คนนั้น"
10124-820 = "ที่จริงฉันเลิกคิด\nไปแล้วค่ะว่ามาทะเล\nแล้วจะได้เล่นสนุกสนาน"
10124-830 = "คงจะต้องไปขอบคุณ\nคุณมิกะแล้วละค่ะ"

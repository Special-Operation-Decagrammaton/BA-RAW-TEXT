[translation]
10057-10 = "선생님, 어서 오세요.\n어머… 설날에도 일하시나요?\n때로는 휴식도 중요하죠."
10057-20 = "자, 같이\n차 한잔하도록 해요."
10057-30 = "우후후, 설날부터\n만날 수 있다니\n너무 기쁘네요."
10057-40 = "저는 언제든지\n준비되어 있답니다?"
10057-50 = "후후후.\n부르셨나요, 선생님?"
10057-60 = "그렇게 자꾸 간지럼을\n태우시면 곤란하답니다."
10057-70 = "선생님께서는,\n의외로 장난을\n좋아하시는군요?"
10057-80 = "확실히 후리소데는\n번거로운 면이 있지요."
10057-90 = "그렇지만 이것도 모두\n미식을 위한 길이니까요."
10057-100 = "궁극의 맛에 도달하기\n위해서는, 흔들림 없는\n각오가 필요합니다."
10057-110 = "…누구도 우리를\n막을 수 없을 거예요.\n우후훗."
10057-120 = "조금 복잡한\n상황이긴 합니다만…"
10057-130 = "제 미식에 대한 마음은\n이 정도로 꺾이거나\n하지 않습니다."
10057-140 = "각자가 최선을\n다하기를 바라며."
10057-150 = "열의와 성의를 담아\n맛을 보도록 하겠습니다."
10057-160 = "시간은 흐르고,\n사건은 잊혀지겠죠."
10057-170 = "하지만 저와 선생님이\n기억하는 한…\n괜찮을 거예요."
10057-180 = "예. 분명."
10057-630 = "선생님도\n오미쿠지를 뽑으러…?\n이쪽입니다."
10057-640 = "우후후, 그렇게\n초조해하지 않아도\n괜찮아요."
10057-650 = "우후훗…\n이런일, 처음 해봐요."
10057-660 = "왠지 즐겁네요."
10057-670 = "원하는 것은 찾으셨나요?"
10057-680 = "우후후. 그것은 어쩌면,\n가까운 곳에 있을 지도요?"
10057-690 = "침착하게 호흡을\n가다듬는 시간도\n중요하죠."
10057-700 = "코스요리에서 먹는\n그라니테처럼."
10057-710 = "어머, 대길이네요!\n역시나 선생님.\n운을 가지고 계시는군요!"
10057-720 = "대길을 뽑으신\n선생님께는,\n특별한 상품을\n준비해 두었답니다."
10057-730 = "길이면, 운이\n돌아오고 있다는 거군요."
10057-740 = "올해도 멋진 한해가\n되길 바라겠습니다."
10057-750 = "중길…… 꽤나 좋네요.\n이쪽이 중길의 상품입니다."
10057-760 = "소길…\n나쁘진 않네요."
10057-770 = "복을 불러들이기 위해서는\n작은 것들이 쌓이는게\n중요하다고 하니까요."
10057-780 = "말길은, 후에\n길로 돌아설 조짐…"
10057-790 = "즉, 길조군요.\n네. 이쪽으로 오세요."
10057-800 = "괜찮아요.\n오미쿠지 결과는\n현재의 운세니까요."
10057-810 = "향후, 복으로\n바뀐다고도 말하니…"
10057-820 = "…네? 제게 위로를 받으니\n기쁜 듯 슬픈 듯하다구요…?\n그, 그건 대체…"
10057-830 = "선생님, 오미쿠지라면\n아직 접수하고 있어요.\n잊지 말고 뽑아주세요."

[translation]
10057-10 = "Welcome, Sensei. Oh my... You're working on New Year's Day? Don't forget to take a break sometimes."
10057-20 = "Now then, let's enjoy a cup of tea together."
10057-30 = "Heehee. It's nice to see you this New Year's Day."
10057-40 = "Don't you know? I'm always prepared."
10057-50 = "Heeheehee. Did you call me, Sensei?"
10057-60 = "Please refrain from tickling me like that."
10057-70 = "I didn't know you enjoyed goofing off like that, Sensei."
10057-80 = "Furisodes can be a bit inconvenient, to be sure."
10057-90 = "But one must have proper dress when fine dining."
10057-100 = "To craft the ultimate flavor, one must have an unflinching resolve."
10057-110 = "...No one will be able to stop us. Heeheehee."
10057-120 = "The circumstances are a little complicated but..."
10057-130 = "...My passion for fine dining won't be impeded by something like this."
10057-140 = "I hope we all do our best."
10057-150 = "I taste food using every ounce of my passion and sincerity."
10057-160 = "Time marches on...and memories fade."
10057-170 = "But as long as you and I remember... It'll all be okay."
10057-180 = "Yes, I'm certain."
10057-630 = "Sensei, are you here to pick an omikuji too? This way."
10057-640 = "Heeheehee. You don't have to be so tense."
10057-650 = "Heeheehee... It's my first time doing something like this."
10057-660 = "It's kind of fun."
10057-670 = "Did you find what you were looking for?"
10057-680 = "Heeheehee... It might be closer than you think."
10057-690 = "It's important to take it easy sometimes."
10057-700 = "It's like having a little granita with your full course meal."
10057-710 = "Oh, you drew the great blessing! You're quite lucky, Sensei! As to be expected."
10057-720 = "I prepared a special gift for drawing a great blessing, Sensei."
10057-730 = "You drew a blessing. That means some good luck is coming your way."
10057-740 = "I hope you have a happy New Year."
10057-750 = "...You got a modest blessing. Here's your prize."
10057-760 = "A small blessing... That's not too bad."
10057-770 = "To bring great luck, they say you need to work on the small things first."
10057-780 = "A future blessing means you're likely to be lucky down the road..."
10057-790 = "That's a good sign. All right then, this way."
10057-800 = "It's okay. The result of the omikuji only shows your current luck."
10057-810 = "It could turn into good fortune later..."
10057-820 = "Huh? You feel happy and sad at the same time, because I comforted you? I-I don't understand..."
10057-830 = "Sensei, they're still serving omikuji. Please don't forget to pick one out."

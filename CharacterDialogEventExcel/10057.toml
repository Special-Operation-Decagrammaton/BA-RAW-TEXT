[translation]
10057-10 = "เชิญค่ะคุณครู ตายจริง...\nวันปีใหม่แบบนี้ก็ทำงานด้วยเหรอคะ?\nบางครั้งเวลาพักผ่อนก็สำคัญนะคะ"
10057-20 = "เอาละ มาดื่มชากับฉันสักหน่อยนะคะ"
10057-30 = "ฮุฮุฮุ ได้เจอกับคุณครู\nตั้งแต่วันปีใหม่แบบนี้\nดีใจจังเลยค่ะ"
10057-40 = "ฉันน่ะ ไม่ว่าเมื่อไร\nก็เตรียมพร้อมเสมอค่ะ"
10057-50 = "ฮุฮุฮุ\nเรียกฉันเหรอคะ คุณครู?"
10057-60 = "มาจักจี้ฉันแบบนั้นบ่อยๆ\nถ้าเครื่องติดมันจะลำบากนะคะ"
10057-70 = "ไม่นึกเลยนะคะว่า\nคุณครูจะชอบเล่นซุกซน\nแบบนี้น่ะค่ะ?"
10057-80 = "จริงอยู่ที่การใส่ฟุริโซเดะ\nก็มีเรื่องที่ยุ่งยากอยู่ค่ะ"
10057-90 = "แต่ว่านี่ก็เพื่อเส้นทาง\nของอาหารรสเลิศค่ะ"
10057-100 = "เพื่อเข้าถึงสุดยอดรสชาติ\nจะต้องเตรียมใจ ไม่หวั่นไหว\nกับอะไรทั้งนั้นค่ะ"
10057-110 = "ไม่ว่าใคร...\nก็ขัดขวางพวกเราไม่ได้ค่ะ\nฮุฮุฮุ"
10057-120 = "ถึงสถานการณ์\nจะยุ่งยากนิดหน่อยก็เถอะค่ะ..."
10057-130 = "จิตใจที่ใฝ่หาอาหารเลิศรส\nของฉันไม่สั่นคลอน\nเพราะเรื่องแค่นี้หรอกค่ะ"
10057-140 = "ฉันหวังว่าทุกคน\nจะทำให้ดีที่สุด"
10057-150 = "ฉันจะชิมอาหารด้วยความจริงใจ\nและความกระตือรือร้นค่ะ"
10057-160 = "ถึงเวลาจะผ่านไป\nเรื่องราวต่างๆ ก็คงจะ\nถูกลืมใช่มั้ยคะ"
10057-170 = "แต่ถ้าฉันกับคุณครูจำได้...\nมันจะไม่เป็นอะไรค่ะ"
10057-180 = "ค่ะ ต้องไม่เป็นไรแน่ค่ะ"
10057-630 = "คุณครูเอง...\nก็มาเสี่ยงทายโอะมิกุจิเหรอคะ...?\nเชิญทางนี้เลยค่ะ"
10057-640 = "ฮุฮุฮุ\nไม่ต้องร้อนใจ\nขนาดนั้นก็ได้ค่ะ"
10057-650 = "ฮุฮุฮุ...\nฉันเพิ่งเคยทำงานแบบนี้เลยค่ะ"
10057-660 = "ไม่รู้ทำไม\nแต่สนุกมากเลยค่ะ"
10057-670 = "เจอของที่หาอยู่หรือยังคะ?"
10057-680 = "ฮุฮุฮุ ถ้าเป็นชิ้นนั้นละก็\nอาจจะอยู่ใกล้ๆ ก็ได้นะคะ?"
10057-690 = "การหายใจเข้าลึกๆ\nและทำใจเย็นๆ\nก็เป็นเรื่องสำคัญเหมือนกันนะคะ"
10057-700 = "ก็เหมือนกับขนมหวาน\nที่ทานในอาหารคอร์สค่ะ"
10057-710 = "ตายจริง โชคดีครั้งใหญ่เลยนี่คะ!\nสมกับที่เป็นคุณครูจริงๆ\nดวงดีสุดๆ ไปเลยละค่ะ!"
10057-720 = "ฉันเตรียมสินค้าพิเศษ\nเอาไว้ให้คุณครูที่เสี่ยงทาย\nได้โชคดีครั้งใหญ่แล้วค่ะ"
10057-730 = "ถ้าเสี่ยงทายได้โชคดีมาก\nแสดงว่าโชคกำลังมาแล้วค่ะ"
10057-740 = "ขอให้ปีนี้เป็นปีที่สุดปัง\nอีกหนึ่งปีนะคะ"
10057-750 = "โชคดีกลาง... ไม่เป็นไรนะคะ\nสินค้าสำหรับโชคดีกลางอยู่ด้านนี้ค่ะ"
10057-760 = "โชคดีเล็ก...\nก็ไม่ได้แย่เลยนะคะ"
10057-770 = "ได้ยินว่าสิ่งสำคัญสำหรับ\nการเรียกโชคดีให้มาหา\nคือการรวบรวมสิ่งเล็กๆ ไว้ด้วยกันค่ะ"
10057-780 = "โชคดีนิดนึง... จะกลับมา\nเป็นโชคดีมากในภายหลังค่ะ..."
10057-790 = "โชคดีสินะคะ\nค่ะ เชิญทางนี้เลยค่ะ"
10057-800 = "ไม่เป็นไรค่ะ\nผลเสี่ยงทายโอะมิกุจิ\nคือการทำนายดวงปัจจุบันค่ะ"
10057-810 = "ในอนาคต...\nจะกลายเป็นโชคดีค่ะ..."
10057-820 = "...คะ? ได้รับการปลอบใจจากฉันแล้ว\nมันทั้งสุขและเศร้าเลยเหรอคะ...?\nคะ... คือว่าเรื่องนั้น..."
10057-830 = "คุณครูคะ ถ้าโอะมิกุจิละก็...\nยังเสี่ยงทายได้อยู่นะคะ\nอย่าลืมมาเสี่ยงทายนะคะ"

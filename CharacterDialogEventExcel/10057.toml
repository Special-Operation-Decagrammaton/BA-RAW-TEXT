[translation]
10057-10 = "老師，歡迎回來。\n哎呀…新年也要工作嗎？\n有時候休息也是很重要的唷。"
10057-20 = "來，一起\n喝杯茶吧。"
10057-30 = "唔呵呵，居然\n從新年就能見面，\n真是太開心了呢。"
10057-40 = "我隨時都\n準備就緒唷？"
10057-50 = "唔呵呵。\n您找我嗎，老師？"
10057-60 = "那樣一直搔我癢，\n我會很困擾的。"
10057-70 = "老師您，意外的\n喜歡惡作劇呢？"
10057-80 = "振袖確實\n也有些麻煩的地方。"
10057-90 = "不過，這全都是\n為了通往美食之路。"
10057-100 = "為了抵達終極美味，\n堅定不移的覺悟是必要的。"
10057-110 = "…誰也無法\n阻止我們的。\n唔呵呵。"
10057-120 = "雖然情況有點複雜……"
10057-130 = "但我對美食的執著，\n不會這麼簡單就受挫。"
10057-140 = "希望彼此都能盡己所能。"
10057-150 = "就讓我帶著熱忱與誠意\n來品嚐吧。"
10057-160 = "隨著時間流逝，\n事件將會被遺忘吧。"
10057-170 = "但是，只要我和老師\n還記得……就沒問題了。"
10057-180 = "是啊。肯定！"
10057-630 = "老師也來\n抽御神籤……？\n在這裡哦。"
10057-640 = "唔呵呵，\n不用那麼急\n也沒關係的唷。"
10057-650 = "唔呵呵……\n這種事情，我還是\n第一次體驗呢。"
10057-660 = "總覺得很開心。"
10057-670 = "找到要找的東西了嗎？"
10057-680 = "唔呵呵，說不定\n遠在天邊近在眼前哦？"
10057-690 = "冷靜下來\n調整呼吸的時間\n也是很重要的。"
10057-700 = "就像套餐料理中\n吃到的冰沙一樣。"
10057-710 = "哎呀，是大吉呢！\n不愧是老師，\n真好運呢！"
10057-720 = "我為抽到大吉的\n老師準備了\n特別的商品哦。"
10057-730 = "抽到吉就表示\n好運回來了呢。"
10057-740 = "希望今年也會是\n美好的一年。"
10057-750 = "中吉……？\n還挺好的呢。\n這些是中吉的商品。"
10057-760 = "小吉……\n還不錯呢。"
10057-770 = "想要招來福氣，\n一點一滴地累積\n是很重要的。"
10057-780 = "末吉是之後\n會變成吉的徵兆……"
10057-790 = "也就是吉兆呢。\n來，請收下這些。"
10057-800 = "沒關係的。\n御神籤的結果\n就是現在的運勢。"
10057-810 = "之後會\n變成福氣的……"
10057-820 = "……咦？被我安慰\n好像有點開心\n又有點悲傷……？\n那，那究竟是……"
10057-830 = "老師，御神籤\n現在還可以抽唷。\n請別忘了去抽哦。"

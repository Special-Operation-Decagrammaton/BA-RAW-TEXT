[translation]
26009-110 = "선생님! 저기… "
26009-120 = "어서 오세요, 주인님."
26009-130 = "이렇게나\n많은 사람이 있는 곳은,\n익숙하지 않아서…"
26009-140 = "이것도 어떻게 보면,\n이벤트라고는\n생각하지만요…"
26009-150 = "사, 상자가…!\n상자가, 어디 있죠…? \n그게 없으면, 저는…"
26009-160 = "아, 찾아 주셨군요…!"
26009-170 = "감사합니다. 선생님…"
26009-180 = "그… 굉장히,\n무섭지만…"
26009-190 = "이 경험은, \n게임으로 살릴 수\n있을지도 모르니…"
26009-200 = "선생님. 저…\n잘할 수 있을까요?"
26009-210 = "으으…돌아가서\n게임 하고 싶어…"
26009-220 = "하지만, 떨기만 하면\n안 되겠죠."
26009-230 = "제가 할 수 있는 일을\n하지 않으면…"
26009-240 = "그런 일이 일어났다니,\n아직도 믿을 수 없어요…"
26009-250 = "해결할 수 있었던 건,\n다 선생님 덕분이에요."
26009-260 = "사, 상자가…!\n상자가, 어디 있죠…? \n그게 없으면, 저는…"
26009-270 = "아, 찾아 주셨군요…!"
26009-280 = "감사합니다. 선생님…"
26009-290 = "그… 굉장히,\n무섭지만…"

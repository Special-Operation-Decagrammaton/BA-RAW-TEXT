[translation]
26009-110 = "คุณครู! คือว่า...  "
26009-120 = "ยินดีต้อนรับค่ะนายท่าน"
26009-130 = "ฉันยังไม่คุ้นเคย\nกับที่ที่มีคนเยอะ\nขนาดนี้น่ะค่ะ..."
26009-140 = "ฉันคิดว่านี่ก็\nเป็นงานอย่างหนึ่ง\nเช่นกันค่ะ..."
26009-150 = "กะ... กล่อง...!\nกล่องหายไปไหนแล้วคะ...?\nถ้าไม่มีกล่องใบนั้น ฉันคง..."
26009-160 = "อ๊ะ ช่วยหามาให้แล้วเหรอคะ...!"
26009-170 = "ขอบคุณนะคะคุณครู..."
26009-180 = "นะ... น่ากลัวมากเลย\nแต่ว่า..."
26009-190 = "ประสบการณ์นี้\nอาจจะเป็นประโยชน์\nต่อเกมก็ได้..."
26009-200 = "คุณครูคะ ฉัน...\nจะทำได้ดีไหมคะ?"
26009-210 = "งือ... อยากกลับไป\nเล่นเกมจัง..."
26009-220 = "แต่ว่าจะมาเอาแต่ตัวสั่น\nอยู่แบบนี้ไม่ได้ใช่ไหมคะ"
26009-230 = "ถ้าฉันไม่ยอมทำ\nในสิ่งที่ทำได้ละก็..."
26009-240 = "เกิดเรื่องแบบนั้นได้ยังไง\nฉันยังไม่อยากเชื่อเลยค่ะ..."
26009-250 = "คลี่คลายเรื่องนั้นได้\nเพราะได้คุณครูช่วยไว้เลยค่ะ"
26009-260 = "กะ... กล่อง...!\nกล่องหายไปไหนแล้วคะ...?\nถ้าไม่มีกล่องใบนั้น ฉันคง..."
26009-270 = "อ๊ะ ช่วยหามาให้แล้วเหรอคะ...!"
26009-280 = "ขอบคุณค่ะ คุณครู..."
26009-290 = "นะ... น่ากลัวมากเลย\nแต่ว่า..."
26009-300 = "ประสบการณ์นี้\nอาจจะเป็นประโยชน์\nต่อเกมก็ได้..."
26009-310 = "คุณครูคะ ฉัน...\nจะทำได้ดีไหมคะ?"
26009-320 = "งือ... อยากกลับไป\nเล่นเกมจัง..."
26009-330 = "แต่ว่าจะมาเอาแต่ตัวสั่น\nอยู่แบบนี้ไม่ได้ใช่ไหมคะ"
26009-340 = "ถ้าฉันไม่ยอมทำ\nในสิ่งที่ทำได้ละก็..."

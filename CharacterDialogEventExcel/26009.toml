[translation]
26009-110 = "老師！那個… "
26009-120 = "歡迎回來，主人。"
26009-130 = "人這麼\n多的地方，\n我不太習慣…"
26009-140 = "雖然我覺得，\n某方面來說\n這也算是活動…"
26009-150 = "箱，箱子呢？\n箱子跑哪去了？\n沒有那個的話，我…"
26009-160 = "啊，你幫我\n找到了呢……！"
26009-170 = "謝謝你，老師。"
26009-180 = "那個…雖然，\n非常害怕…"
26009-190 = "但這些經驗，\n說不定能\n轉化成遊戲…"
26009-200 = "老師。我…\n有辦法做好嗎？"
26009-210 = "嗚嗚…\n想回去玩遊戲…"
26009-220 = "但是，不能\n光是發抖對吧。"
26009-230 = "如果我不做\n我能做的事…"
26009-240 = "竟然會發生那種事，\n我到現在還不敢相信……"
26009-250 = "之所以能夠解決，\n全都是多虧了老師。"
26009-260 = "箱，箱子呢？\n箱子跑哪去了？\n沒有那個的話，我……"
26009-270 = "啊，你幫我\n找到了呢……！"
26009-280 = "謝謝你，老師。"
26009-290 = "那個……雖然，\n非常害怕……"
26009-300 = "但這些經驗，\n說不定能\n轉化成遊戲……"
26009-310 = "老師。我……\n有辦法做好嗎？"
26009-320 = "嗚嗚……\n想回去玩遊戲……"
26009-330 = "但是，不能\n光是發抖對吧。"
26009-340 = "得做我能做的事才行……"

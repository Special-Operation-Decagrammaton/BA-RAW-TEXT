[translation]
10121-10 = "ดูสิเจ้าคะ ท่านอาจารย์!\nทะเลเจ้าค่ะ! ทะเล!"
10121-20 = "ฮืม~♪ น้ำทะเลสีฟ้า\nสุดลูกหูลูกตาเลย~"
10121-30 = "ทะเลเป็นอย่างนี้เองสินะเจ้าคะ!"
10121-40 = "ไม่คิดเลยว่าจะมี\nวันที่ได้แข่งขันกับ\nเหล่ารุ่นพี่ในสวนน้ำด้วย..."
10121-50 = "ตะ... แต่ในฐานะอิล~ ลีทที่ถูก\nคาดหวัง และผู้เป็นความหวัง\nของเฮียกกะเรียวรันแล้ว"
10121-60 = "ข้าก็จะไม่ยอมแพ้\nง่ายๆ หรอกเจ้าค่ะ!"
10121-70 = "จากนี้คือคุไร~ มักกุสึ~\nที่ยิ่งใหญ่เจ้าค่ะ!"
10121-80 = "ทำยังไงดีเจ้าคะท่านอาจารย์!\nข้าประหม่าจนมือสั่น\nไปหมดแล้วเจ้าค่ะ!"
10121-90 = "ในช่วงเวลาสั้นๆ\nข้ารู้สึกได้ว่าบรรยากาศ\nของรุ่นพี่เปลี่ยนไปเจ้าค่ะ"
10121-100 = "แต่ทุกคนก็เปล่งประกาย\nมากกว่าในทุกครั้งเลยเจ้าค่ะ"
10121-110 = "รุ่นพี่คิเคียว...\nกับรุ่นพี่เรนเกะ\nรู้จักกันมานานแล้วเจ้าค่ะ"
10121-120 = "เป็นเพื่อนสมัยเด็กกันน่ะเจ้าค่ะ"
10121-130 = "ระหว่างรุ่นพี่ทั้งสอง\nน่าจะมีเรื่องราว"
10121-140 = "ที่ข้ายังไม่รู้\nมากมายเลยเจ้าค่ะ"
10121-150 = "พอคิดแบบนั้น ก็รู้สึก\nเหงาขึ้นมาหน่อยนะเจ้าคะ..."
10121-160 = "ท่านอาจารย์? ทำไมถึง\nเอาแต่จ้องกันล่ะเจ้าคะ?"
10121-170 = "เลิกจ้องกัน แล้วไป\nเที่ยวเล่นกับข้าเถอะเจ้าค่ะ!"
10121-180 = "ฮุฮุ ท่านอาจารย์นี่ละก็"
10121-190 = "ถ้าอยากนั่ง\nดูอะไรอยู่ตรงนี้เฉยๆ\nข้าก็จะอยู่ด้วยเจ้าค่ะ"
10121-200 = "ทุกคนดูคุ้นเคย\nกับทะเลจังเลยนะเจ้าคะ"
10121-210 = "อาจจะมีข้าคนเดียวที่เป็น\nบิกินา~ เรื่องทะเลก็ได้นะ?!\nว่ามั้ยเจ้าคะ?!"
10121-460 = "ว้าว~ มีของน่าตื่นเต้น\nอยู่ทุกที่เลยเจ้าค่ะ!"
10121-470 = "ท่านอาจารย์จะดูอะไรก่อนเจ้าคะ?!"
10121-480 = "ตื่นเต้นจัง! ของฉูดฉาดบาดตา\nแค่ดูเฉยๆ ก็สนุกแล้วเจ้าค่ะ!"
10121-490 = "อ่า~ ช่วงเวลาที่สนุก\nผ่านไปเร็วจังเลยนะเจ้าคะ~"
10121-500 = "ก่อนกลับก็ทิ้งความรู้สึกเสียดาย\nไว้ให้หมดนะเจ้าคะ!"
10121-510 = "ข้าก็รู้จักค่ะ!\nนี่คืออาย~ ช้อปปิ้งกุ~ ใช่มั้ยเจ้าคะ?"
10121-520 = "ฮุฮุ ไม่ต้องกังวลนะเจ้าคะ\nข้าจะอยู่ข้างๆ ตลอดเจ้าค่ะ"
10121-530 = "ว้าว! ข้าก็อยาก\nดูใกล้ๆ เหมือนกันเจ้าค่ะ!"
10121-540 = "โอ้โห~ ท่านอาจารย์\nมีรสนิยมแบบนี้สินะเจ้าคะ?"
10121-550 = "ตาถึงมากเลยเจ้าค่ะ\nคุณลูกค้า~!♪"
10121-560 = "ฮืม~♪ เลือกอันไหนดีน้า~"

[translation]
10121-10 = "Look, Sensei! The beach! It's the beach!"
10121-20 = "Heehee! The expanse of blue water is endless! ♪"
10121-30 = "It's the beach!"
10121-40 = "I did not anticipate that the day I would be in competition against my seniors would arrive in this way..."
10121-50 = "H-However, as a promising elite and the Hyakkaryouran's rising hope..."
10121-60 = "...I shall not readily back down!"
10121-70 = "It's the climax we have anticipated!"
10121-80 = "What am I to do, Sensei? My hands are shaking with nerves!"
10121-90 = "So quickly did the atmosphere amongst my seniors shift..."
10121-100 = "But it's only made them shine ever brighter!"
10121-110 = "...Kikyou and Renge have known each other for a long time."
10121-120 = "They're childhood friends."
10121-130 = "Undoubtedly, the two of them..."
10121-140 = "...share many stories in which I play no part."
10121-150 = "That thought elicits a feeling of loneliness in me..."
10121-160 = "Sensei? Why are you staring at me like that?"
10121-170 = "Rather than sitting idly by, let us venture out for some fun!"
10121-180 = "Fufu. I'm serious, Sensei."
10121-190 = "If you prefer to simply sit and watch, then I will join you."
10121-200 = "It would appear everyone is well accustomed to the sea."
10121-210 = "Perhaps I am the only sea novice?! Is that it?!"
10121-460 = "Whoa! Over here! Over there! Everything is new!"
10121-470 = "Sensei, what should we see first?!"
10121-480 = "My heart is aflutter! It's so sparkly that I need only look to find new amusements!"
10121-490 = "Ahhh. Fun times truly pass in the mere blink of an eye!"
10121-500 = "Be sure to leave all our regrets here before we return!"
10121-510 = "I know of this! Yes, yes, it's called \"window shopping,\" correct?"
10121-520 = "Heehee, worry not. I will always be by your side!"
10121-530 = "Wow! I would like to see it more closely as well!"
10121-540 = "Heh, so this is the kind of thing you like, Sensei?"
10121-550 = "Honored guest, you have good taste! ♪"
10121-560 = "Hmm! What to choose... ♪"

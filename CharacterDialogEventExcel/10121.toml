[translation]
10121-10 = "您請看，老師！\n是大海呢，大海！"
10121-20 = "哼哼～♪ 蒼藍～\n匯入水中流淌無盡～"
10121-30 = "正是大海！的說！"
10121-40 = "沒想到會有跟前輩們\n同台較勁的這天……"
10121-50 = "不，不過身為\n百花繚亂的菁～英\n和希望之星的小女子！"
10121-60 = "可不會這麼輕易\n就退讓的！"
10121-70 = "是期待已久的……\n高潮時刻！的說！"
10121-80 = "怎，怎麼辦，老師！\n小女子因為太緊張的\n關係，手都在發抖了！"
10121-90 = "在這短短的時間裡，\n感覺前輩們的氣氛\n似乎變了呢。"
10121-100 = "但是大家，\n都比任何時候\n更加閃耀！"
10121-110 = "……桔梗前輩和\n蓮華前輩從很久以前\n就認識了。"
10121-120 = "也就是所謂的\n青梅竹馬。"
10121-130 = "他們兩位想必……"
10121-140 = "有著許多小女子\n不知道的回憶吧。"
10121-150 = "這麼一想，\n總覺得有點寂寞……"
10121-160 = "老師？為何這樣\n一直盯著……？"
10121-170 = "方便的話，要不要\n跟小女子一起去玩呢！？"
10121-180 = "呵呵，老師真是的。"
10121-190 = "如果您說想去\n見學的話，小女子\n也會陪同的。"
10121-200 = "總覺得大家，好像\n都很習慣大海呢。"
10121-210 = "難道只有小女子是\n海邊新手……嗎！？"
10121-460 = "哇！有好多神奇的東西！"
10121-470 = "老師，您想先看哪一個呢？"
10121-480 = "繽紛的色彩完全看不膩呢！\n真令人興奮～！"
10121-490 = "啊啊……快樂的時光\n真是轉瞬即逝……"
10121-500 = "不過，這些失落的心情，\n會在回去之前全部拋開的！"
10121-510 = "小女子也知道！\n這就是Window Shopping對吧！"
10121-520 = "呵呵，不必擔心。\n小女子隨時在您身旁。"
10121-530 = "哇啊！\n小女子也想近距離看看！"
10121-540 = "呼呣，老師原來\n有這樣的興趣嗎？"
10121-550 = "真有眼光！的說♪"
10121-560 = "哼～哼哼～\n該選哪個好呢～♪"

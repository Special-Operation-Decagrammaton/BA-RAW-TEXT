[translation]
10121-10 = "보시와요, 선생님!\n바다이어요! 바다!"
10121-20 = "흐응~♪ 푸른 물이\n끝없이 이어져 있으니~"
10121-30 = "그야말로 바다네요!"
10121-40 = "선배님들과 같은\n무대에서 경쟁하는\n날이 올 줄이야……."
10121-50 = "하, 하지만 촉망받는\n엘리~트이자, 백화요란의\n떠오르는 희망으로써,"
10121-60 = "소녀도 쉽게\n물러나지 않겠사와요!"
10121-70 = "이제 대망의\n클라이~맥수~이어요!"
10121-80 = "어쩌죠, 선생님!\n소녀, 긴장된 나머지\n손이 떨려옵니다!"
10121-90 = "단시간 사이에,\n선배님들 분위기가 사뭇\n달라진 것 같사와요."
10121-100 = "하지만 모두 여느 때보다\n반짝거리고 있사와요!"
10121-110 = "……키쿄 선배와\n렌게 선배는 오래전부터\n알고 지냈어요."
10121-120 = "소꿉친구, 라는 것이어요."
10121-130 = "두 선배님\n사이에는 분명,"
10121-140 = "소녀가 모르는 이야기가\n잔뜩 있을 테죠."
10121-150 = "그렇게 생각하니\n살짝 쓸쓸할지도……."
10121-160 = "선생님? 왜 그렇게 가만히\n쳐다보고만 계시나요?"
10121-170 = "그러지 말고,\n소녀와 함께 놀러 가셔요!"
10121-180 = "후후. 선생님께서도 참."
10121-190 = "여기 앉아\n가만히 구경하시겠다면,\n소녀도 함께하겠사와요."
10121-200 = "어쩐지, 다들 바다가\n익숙한 느낌이네요."
10121-210 = "어쩌면 소녀만\n바다의 비~기너?!\n그런 걸까요?!"
10121-460 = "와아~ 여기도, 저기도\n신기한 것이 잔뜩이어요!"
10121-470 = "선생님 무엇부터 보실까요?!"
10121-480 = "두근두근! 휘황찬란하여\n보고만 있어도 즐겁사와요!"
10121-490 = "아아~ 즐거운 시간은\n순식간이네요~"
10121-500 = "돌아가기 전에, 아쉬움을 전부\n떨쳐버리고 가는 것이어요!"
10121-510 = "소녀도 알고 있사와요!\n아~이 쇼핑~이라는 것이지요?"
10121-520 = "후후, 걱정하지 마셔요.\n소녀는 항상 곁에 있답니다."
10121-530 = "와아! 소녀도\n가까이서 보고 싶사와요!"
10121-540 = "헤에~ 선생님께서는\n그런 취향이시군요?"
10121-550 = "손님 안목이\n높으십니다~! 이와요♪"
10121-560 = "흐흥~♪ 무엇을 고를까나~"

[translation]
10096-10 = "Sensei, I've been waiting for you. Have you done your warm-up exercises?"
10096-20 = "Enjoy yourself at the water park."
10096-30 = "Are you enjoying playing in the water?"
10096-40 = "As I always say, nothing is more important than safety."
10096-50 = "...I've made it this far thanks to you, Sensei."
10096-60 = "Let's make sure to finish strong."
10096-70 = "It's a bittersweet feeling."
10096-80 = "How do you feel, Sensei?"
10096-90 = "I know I have to wear a swimsuit, but...it's awkward."
10096-100 = "A water park... I didn't expect to feel any connection to it."
10096-110 = "No matter the situation, overconfidence is never a good thing."
10096-120 = "If you encounter anyone in need of rescue, please inform us immediately."
10096-130 = "P-Please come in! Welcome!"
10096-140 = "Ahem. As I expected, I still can't get used to this."
10096-380 = "This is a specialty shop. If you need anything, feel free to make a purchase."
10096-390 = "A recommendation...? I'm not sure, but I'll rely on your judgement, Sensei."
10096-400 = "The shops are closed, but it looks like the park will be open for a little longer."
10096-410 = "Make sure to enjoy it until the very end."
10096-420 = "Yes? Is there something you're looking for?"
10096-430 = "...Sensei, please view the products, not me."
10096-440 = "Ah, that's a product I was curious about as well."
10096-450 = "Thank you for your purchase. I hope you'll find it useful, Sensei."
10096-460 = "Choosing that one shows you have great taste. Very impressive."
10096-470 = "Th-There's no need to get me a gift. I'm still at work anyway..."

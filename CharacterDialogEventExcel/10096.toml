[translation]
10096-10 = "คุณครู กำลังรออยู่เลยค่ะ\nวอร์มอัปมาแล้วหรือยังคะ?"
10096-20 = "ขอให้มีช่วงเวลา\nที่สนุกในสวนน้ำนะคะ"
10096-30 = "สนุกกับการเล่นน้ำ\nอยู่หรือเปล่าคะ?"
10096-40 = "ถึงฉันจะย้ำอยู่ตลอด แต่เรื่อง\nความปลอดภัยสำคัญที่สุดนะคะ"
10096-50 = "ที่ฉันมาถึงตรงนี้ได้\nทั้งหมดก็เพราะ\nได้คุณครูช่วยไว้ค่ะ"
10096-60 = "ฉันจะพยายาม\nจนถึงที่สุดเลยค่ะ"
10096-70 = "ฉันรู้สึกโล่งใจ\nแต่ก็เสียดายค่ะ"
10096-80 = "แล้วคุณครูล่ะคะ?"
10096-90 = "ฉันรู้ว่าต้องใส่\nชุดว่ายน้ำ...\nแต่มันเขินน่ะค่ะ"
10096-100 = "สวนน้ำ...\nคิดว่าฉันดวงไม่สมพงษ์\nกับที่แบบนี้ซะอีก..."
10096-110 = "ไม่ว่าเรื่องอะไร\nถ้าเชื่อมากไปก็ไม่ดีค่ะ"
10096-120 = "ถ้าเจอคนที่ต้อง\nให้ความช่วยเหลือ\nก็บอกทันทีเลยนะคะ"
10096-130 = "ชะ... เชิญค่ะ!\nยินดีต้อนรับค่ะ!"
10096-140 = "อะแฮ่ม... ยังไม่ชิน\nจริงๆ ด้วยนะคะ"
10096-380 = "ที่นี่คือร้านค้าพิเศษค่ะ\nถ้ามีของที่ต้องการก็ซื้อไปนะคะ"
10096-390 = "ให้แนะนำ... เหรอคะ? ไม่รู้สิคะ\nฉันเชื่อในสายตาของคุณครูค่ะ"
10096-400 = "ร้านค้าปิดแล้วค่ะ แต่เหมือนสวนน้ำ\nจะยังเปิดต่ออีกหน่อยนะคะ"
10096-410 = "หวังว่าจะสนุกกันไปจนถึง\nตอนปิดทำการเลยนะคะ"
10096-420 = "ค่ะ มีชิ้นไหนในใจหรือเปล่าคะ?"
10096-430 = "คุณครู... มองของสิคะ ไม่ใช่มองฉัน"
10096-440 = "อ่า ฉันก็สงสัยเกี่ยวกับชิ้นนั้น\nเหมือนกันค่ะ"
10096-450 = "ขอบคุณที่ซื้อค่ะ หวังว่าจะเป็น\nประโยชน์กับคุณครูนะคะ"
10096-460 = "เลือกชิ้นนั้นเหรอคะเนี่ย\nตาถึงนะคะ สมแล้วค่ะที่เป็นคุณครู"
10096-470 = "ฉะ... ฉันไม่เอาของขวัญหรอกค่ะ\nฉันอยู่ระหว่างการทำงานด้วย..."

[translation]
10096-10 = "선생님.\n기다리고 있었습니다.\n준비운동은 하셨나요?"
10096-20 = "워터파크에서\n즐거운 시간 되시기를."
10096-30 = "물놀이는\n즐기고 계십니까?"
10096-40 = "늘 말씀드리는 거지만,\n안전이 가장 중요합니다."
10096-50 = "……제가 여기까지\n올 수 있었던 것도,\n모두 선생님 덕분입니다."
10096-60 = "마지막까지\n힘내도록 하죠."
10096-70 = "시원섭섭한\n기분입니다."
10096-80 = "선생님은 어떠십니까?"
10096-90 = "수영복이여야 한다는\n것은 알고 있지만……\n어색하군요."
10096-100 = "워터파크라……\n나와는 인연이\n없을 줄 알았는데……."
10096-110 = "무슨 일이든 과신은\n좋지 않습니다."
10096-120 = "구조가 필요한\n사람을 발견하면\n즉시 알려주십시오."
10096-130 = "어, 어서 오세요!\n환영합니다!"
10096-140 = "크흠…… 역시,\n익숙해지지 않네요."
10096-380 = "이곳은 특별 상점입니다.\n필요한 게 있으면 구입하시길."
10096-390 = "추천……이요? 잘 모르겠군요.\n선생님의 심미안을 믿습니다."
10096-400 = "상점 영업은 종료입니다만,\n파크는 좀 더 운영하는 모양입니다."
10096-410 = "마지막까지 즐겨 주세요."
10096-420 = "네, 찾으시는 게 있으신가요?"
10096-430 = "……선생님, 저 말고 상품을 봐주시죠."
10096-440 = "아아, 그건 저도 궁금했던 상품입니다."
10096-450 = "구입 감사합니다.\n선생님께 도움이 되었으면 좋겠군요."
10096-460 = "그걸 고르시다니, \n안목이 있으시네요.\n역시 선생님입니다."
10096-470 = "제, 제 선물은 됐습니다.\n아직 업무 중이기도 하고……."

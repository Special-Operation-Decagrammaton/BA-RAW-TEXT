[translation]
10096-10 = "老師。\n恭候您的光臨。\n有做暖身運動了嗎？"
10096-20 = "請在水上樂園\n度過愉快的時光。"
10096-30 = "在游泳池\n玩得還開心嗎？"
10096-40 = "正如平常宣導的，\n安全第一唷。"
10096-50 = "……我能來到這裡，\n都是託老師的福。"
10096-60 = "堅持到最後吧。"
10096-70 = "有種如釋重負，\n卻又有點寂寞的感覺。"
10096-80 = "老師您呢？"
10096-90 = "我知道穿泳裝\n是必要的……\n但還是不太習慣呢。"
10096-100 = "水上樂園啊……\n還以為跟這種地方\n沒什麼緣分的……"
10096-110 = "任何事都不要\n過度自信。"
10096-120 = "發現需要救助的人，\n請立即通知我。"
10096-130 = "歡，歡迎光臨！\n歡迎您的到來！"
10096-140 = "咳咳……\n果然還是不太習慣呢。"
10096-380 = "這裡是特別商店。\n有需要的東西歡迎隨時購買。"
10096-390 = "推薦……是嗎？我不太清楚。\n不過我相信老師的眼光。"
10096-400 = "營業雖然已經結束，\n但樂園似乎還在營運。"
10096-410 = "請盡情享受到最後吧。"
10096-420 = "是，請問想找什麼嗎？"
10096-430 = "……老師，\n請少看我，多看商品。"
10096-440 = "啊啊，那個商品我也很感興趣。"
10096-450 = "感謝您的惠顧。\n希望有幫上老師的忙。"
10096-460 = "居然選那個，\n您真是有眼光呢。\n不愧是老師。"
10096-470 = "我，我的禮物就不用了。\n現在還在上班呢……"

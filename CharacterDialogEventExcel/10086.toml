[translation]
10086-10 = "어서 와. 선생님."
10086-20 = "판데모니움 소사이어티\n때문에, 고생이겠지만…."
10086-30 = "괜찮다면 도와줬으면 좋겠어."
10086-40 = "왔구나. 선생님."
10086-50 = "또 다시 부탁을 해서 미안해."
10086-60 = "…신경 쓸 필요 없다고?\n후후. 선생님답네."
10086-70 = "아직도 계속되고 있구나…."
10086-80 = "뭐, 간단히 끝나면\n판데모니움 소사이어티가\n아니겠지."
10086-90 = "이렇게 계속하는데도\n아직 끝나지 않는구나."
10086-100 = "게걸스럽다고 할지.\n탐욕스럽다고 할지."
10086-110 = "뭐, 이쪽도\n져줄 생각은 없지만."
10086-120 = "드디어 끝났네."
10086-130 = "떠들썩했던 날들도,\n이렇게 막을 내리는 거구나."
10086-140 = "…여러 가지 일이 있었지만."
10086-150 = "조금이라도 선생님이\n즐거웠다면 다행이야. 정말로."
10086-160 = "판데모니움 소사이어티와\n트러블이 있을 때마다\n곤혹스럽지만…."
10086-170 = "이번엔 선생님이\n있어 줘서 다행이야."
10086-180 = "갑작스럽게 파티 개최라니…"
10086-190 = "정말 무슨 생각을\n하고 있는 걸까."
10086-200 = "……평소엔\n알고 있느냐 하면,\n그건 또 아니지만."
10086-210 = "어떤 일이 있건, 선도부가\n해야 할 일은 달라지지 않아."
10086-220 = "늘 있는 일이니까."
10086-230 = "이런 소동, 게헨나에서는\n늘 있는 일이긴 해."
10086-240 = "응? 게헨나가…… 무서워?"
10086-250 = "그, 그 정도까진\n아니라고 생각하는데…."

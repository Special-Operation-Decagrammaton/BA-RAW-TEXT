[translation]
10086-10 = "歡迎回來，老師。"
10086-20 = "因為萬魔殿的關係\n一定很辛苦吧……"
10086-30 = "如果可以，\n希望你能幫忙。"
10086-40 = "你來了啊，老師。"
10086-50 = "又得麻煩你，\n真對不起。"
10086-60 = "……不必在意？\n呵呵，真有老師的風格。"
10086-70 = "還在繼續啊……"
10086-80 = "也是，這麼簡單\n就結束的話，\n那就不是萬魔殿了。"
10086-90 = "明明一直在持續，\n居然還沒結束啊。"
10086-100 = "該說是惡毒，\n還是貪心呢……"
10086-110 = "不過，我也\n不打算輸。"
10086-120 = "終於結束了呢。"
10086-130 = "鬧哄哄的那些日子，\n也有這樣落幕的一天。"
10086-140 = "……雖然發生了很多事。"
10086-150 = "如果有稍微讓老師覺得\n開心就好了，真的。"
10086-160 = "每當和萬魔殿\n有麻煩的時候\n都很傷腦筋……"
10086-170 = "這次有老師\n在真是太好了。"
10086-180 = "居然突然舉辦派對……"
10086-190 = "真的是到底\n在想什麼啊。"
10086-200 = "……如果問平常\n知不知道的話，\n那就另當別論了。"
10086-210 = "無論事態如何，\n風紀委員會該做的\n事都不會改變。"
10086-220 = "這也是常有的事了。"
10086-230 = "這樣的騷動，在格黑娜\n只是家常便飯而已。"
10086-240 = "嗯？格黑娜……很可怕？"
10086-250 = "我，我覺得也不到\n那種程度吧……"

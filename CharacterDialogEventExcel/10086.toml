[translation]
10086-10 = "Welcome, Sensei."
10086-20 = "I'm sure the Pandemonium Society is giving you a hard time..."
10086-30 = "But I'd like to ask for your help."
10086-40 = "You're here, Sensei."
10086-50 = "Sorry to ask you for another favor."
10086-60 = "...Don't worry about it? Heehee. How like you."
10086-70 = "I see. So it's still happening..."
10086-80 = "Well, it wouldn't be the Pandemonium Society if things ended neatly."
10086-90 = "Even after all this, it's still not over."
10086-100 = "I'm not sure whether to call them gluttonous or greedy."
10086-110 = "Well, we're not going to simply roll over and accept it."
10086-120 = "It's finally over."
10086-130 = "After days of commotion, this is how it ends."
10086-140 = "Still... A lot happened."
10086-150 = "I hope that you had a little fun at least, Sensei. Really."
10086-160 = "Whenever there's trouble with the Pandemonium Society, it's always a hassle, but..."
10086-170 = "I'm glad that this time, you were here, Sensei."
10086-180 = "Throwing a party at the last minute..."
10086-190 = "What are they thinking? Really?"
10086-200 = "It's not like we can know, but still..."
10086-210 = "Whatever happens, the Prefect Team's mission doesn't change."
10086-220 = "This sort of thing happens all the time, after all."
10086-230 = "It wouldn't be Gehenna without the chaos."
10086-240 = "Hm? Gehenna's...scary?"
10086-250 = "N-Now, now. I think you might be being a little hyperbolic..."

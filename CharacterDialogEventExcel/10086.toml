[translation]
10086-10 = "おかえり、先生。"
10086-20 = "万魔殿のせいで\n大変だろうけど……"
10086-30 = "よかったら\n手伝ってほしい。"
10086-40 = "来たわね、先生。"
10086-50 = "またお願いすることに\nなってしまって、\nごめんなさい。"
10086-60 = "……気にしなくていい？\nふふ、先生らしいね。"
10086-70 = "まだ続いているのね……。"
10086-80 = "まあ、簡単に終わったら\n万魔殿じゃないか。"
10086-90 = "こんなに続けてるのに\nまだ終わらないのね。"
10086-100 = "意地汚いというか、\n貪欲というか……"
10086-110 = "まあ、こっちも\n負けるつもりは\nないのだけど。"
10086-120 = "ようやく終わったね。"
10086-130 = "賑やかだったあの日々も、\nこうして幕を下ろす\n日がくる。"
10086-140 = "……色んなことが\nあったけど。"
10086-150 = "少しでも先生が\n楽しかったなら\n良かった、本当に。"
10086-160 = "万魔殿とトラブルが\nあるたびに\n困惑させられるけど……"
10086-170 = "今回は、先生が\nいてくれてよかった。"
10086-180 = "突然のパーティー\nだなんて…"
10086-190 = "本当に一体何を\n考えているのかしら。"
10086-200 = "……普段も\n分かっているのかと\nいったら、それは\nまた別なんだけど。"
10086-210 = "どんな事態だろうと、\n風紀委員会が\nやることは変わらないわ。"
10086-220 = "いつものことだから。"
10086-230 = "こんな騒動、ゲヘナでは\n日常茶飯事なんだけどね。"
10086-240 = "ん？ゲヘナが……怖い？"
10086-250 = "そ、そこまでじゃない、\nと思うけど……"

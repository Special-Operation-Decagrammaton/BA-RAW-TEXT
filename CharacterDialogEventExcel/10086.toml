[translation]
10086-10 = "เข้ามาสิ คุณครู"
10086-20 = "ถึงจะเหนื่อยใจกับ\nแพนเดโมเนียม โซไซตี้ก็เถอะ..."
10086-30 = "แต่ถ้าไม่ติดอะไร ฉันก็อยากให้มาช่วยหน่อย"
10086-40 = "มาแล้วเหรอ คุณครู"
10086-50 = "ขอโทษที่ฉันขอร้องอีกครั้งนะ"
10086-60 = "ไม่ต้องใส่ใจงั้นเหรอ?\nฮุฮุ สมกับเป็นคุณครูเลยนะ"
10086-70 = "ยังเกิดเรื่องอยู่อีกสินะ..."
10086-80 = "แต่ถ้าจบลงง่ายๆ\nก็คงไม่ใช่แพนเดโมเนียม\nโซไซตี้หรอกเนอะ"
10086-90 = "ถึงจะเป็นแบบนี้ไปเรื่อยๆ\nก็ยังไม่จบลงสินะ"
10086-100 = "ต้องเรียกว่าเกินงาม\nหรือโลภมากดีนะ"
10086-110 = "แต่ก็นะ ฉันเอง\nก็ไม่คิดจะยอมแพ้ให้หรอก"
10086-120 = "ในที่สุดก็จบสักที"
10086-130 = "วันที่วุ่นวายก็มี\nฉากจบเหมือนกันสินะ"
10086-140 = "ถึงจะเกิดเรื่องขึ้นมากมาย"
10086-150 = "แต่ก็โชคดีนะที่คุณครู\nสนุกอยู่บ้าง... จริงๆ นะ"
10086-160 = "ทุกครั้งที่มีปัญหากับ\nแพนเดโมเนียม โซไซตี้\nฉันจะอึดอัดใจ..."
10086-170 = "แต่ครั้งนี้โชคดีนะ\nที่มีคุณครูอยู่ด้วย"
10086-180 = "ให้เปิดงานปาร์ตี้กะทันหันเลย..."
10086-190 = "คิดอะไรของเขา\nอยู่กันนะ"
10086-200 = "ถ้าถามว่าปกติ\nฉันรู้อยู่แล้วรึเปล่า\nก็ใช่ว่าจะรู้หรอก"
10086-210 = "ไม่ว่าจะเกิดเรื่องอะไรขึ้น\nงานที่คณะกรรมการวินัย"
10086-220 = "ต้องทำ ก็เหมือนเดิม"
10086-230 = "ความวุ่นวายแบบนี้เป็นเรื่องที่\nเกิดขึ้นบ่อยๆ ในเกเฮนน่าน่ะ"
10086-240 = "หืม? เกเฮนน่า... น่ากลัวเหรอ?"
10086-250 = "ฉะ... ฉันไม่คิดว่า\nมันจะถึงขนาดนั้นนะ..."

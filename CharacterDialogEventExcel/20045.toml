[translation]
20045-920 = "Welcome to~\nเฮียกคิยาโค!"
20045-930 = "ยินดีต้อนรับสู่เฮียกคิยาโคค่ะ~!"
20045-940 = "คุณครู!\nกำลังสนุกอยู่มั้ยคะ?"
20045-950 = "ตอนนี้ฉันคุ้นชินขึ้นเยอะเลย!\nจะพยายามจนถึงที่สุดเลยค่ะ!"
20045-960 = "คุณครู! ต่อไปก็มาเฮียกคิยาโค\nแล้วมาหาพีน่าอีกนะคะ!"
20045-970 = "ท้าดา! ถ้าเป็นเรื่องไกด์\nให้เป็นหน้าที่ของฉันเองค่ะ!"
20045-980 = "ฉันจะระมัดระวัง\nจะได้ไม่หลงทางค่ะ!"
20045-990 = "พอมีคุณครูอยู่ด้วย\nก็มีชีวิตชีวาขึ้นเลยนะคะ"
20045-1000 = "ทุกคนสนุกกัน\nพีน่าก็ชื่นใจค่ะ"

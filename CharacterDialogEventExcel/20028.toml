[translation]
20028-120 = "恭，恭候多時了，老師！"
20028-130 = "準，準備已經做好了！"
20028-140 = "請隨時吩咐！"
20028-150 = "就差一點了！加油吧！"
20028-160 = "直到最後，\n都要繃緊神經……！"
20028-170 = "收拾善後\n請交給我。\n呵呵。"
20028-180 = "真熱呢……\n陽光也很強……"
20028-190 = "那個，不介意的話，\n帽子，要不要借您呢？"
20028-200 = "咦？老師？\n怎麼了嗎？"
20028-210 = "那，那個……老師？\n就是……有事的話\n請告訴我……"
20028-220 = "呀！老，老師！\n很，很癢的！"
20028-230 = "呀，啊哈哈！"
20028-440 = "在找什麼嗎？"
20028-450 = "請您盡情挑選！"
20028-460 = "現在還有時間，\n要不要一起逛逛呢？"
20028-470 = "老，老師……呵呵！\n我，我的事不用在意……\n呵呵！"
20028-480 = "那個……\n有什麼事嗎……？"
20028-490 = "真，真棒呢！\n我也覺得很好。"
20028-500 = "好的！就是這些！"
20028-510 = "那真是棒極了呢……！\n不愧是您，老師。"
20028-520 = "能找到要找的東西，\n真是太好了！"

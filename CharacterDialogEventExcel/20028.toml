[translation]
20028-120 = "아, 기다리고\n있었어요, 선생님!"
20028-130 = "주, 준비는\n되어 있습니다!"
20028-140 = "언제든지\n말씀해주세요!"
20028-150 = "조금 남았어요! 힘내요!"
20028-160 = "끝까지, 정신을 바짝\n차리고 갑시다……!"
20028-170 = "뒷정리라면 맡겨주세요.\n후후."
20028-180 = "덥네요…\n햇살도 강해서…"
20028-190 = "그, 괜찮으시다면 모자,\n빌려드릴까요?"
20028-200 = "음? 선생님?\n왜 그러시나요?"
20028-210 = "어, 어... 선생님?\n그 ……용건이 있으시면\n말씀을…."
20028-220 = "히익! 서, 선생님!\n가, 간지러워요!"
20028-230 = "히얏!? 아하하!!"
20028-440 = "필요하신 물품이 있으신가요?"
20028-450 = "어서 골라보세요!"
20028-460 = "아직 시간이 있으니까,\n같이 둘러보지 않으실래요?"
20028-470 = "서, 선생님……푸흡!\n저, 저는 됐으니까…… 푸흐흣!"
20028-480 = "으음?\n뭔가 하실 말씀이라도……?"
20028-490 = "멋, 멋지네요!\n저도 좋다고 생각합니다."
20028-500 = "네! 여기 있습니다!"
20028-510 = "그건…\n아주 좋은 것 같아요!\n역시나군요, 선생님!"
20028-520 = "찾으시는 물건을 발견해서,\n다행이에요!"

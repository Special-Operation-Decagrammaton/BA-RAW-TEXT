[translation]
20028-120 = "อ๊ะ กำลังรอ\nอยู่เลยค่ะ คุณครู!"
20028-130 = "ฉะ... ฉันเตรียมตัว\nเสร็จแล้วค่ะ!"
20028-140 = "ไม่ว่าเมื่อไรก็บอกฉัน\nได้เสมอเลยนะคะ!"
20028-150 = "เหลืออีกนิดเดียวค่ะ! สู้ๆ นะคะ!"
20028-160 = "มาตั้งสติให้มั่น\nจนสุดทางเลยนะคะ...!"
20028-170 = "เรื่องเก็บกวาด\nไว้ใจฉันได้เลยค่ะ ฮุฮุ"
20028-180 = "ร้อนจังเลยนะคะ...\nแดดก็แรงด้วย…"
20028-190 = "ถะ... ถ้าไม่ว่าอะไร\nฉันให้ยืมหมวกไหมคะ?"
20028-200 = "หืม? คุณครูคะ?\nเป็นอะไรไปเหรอคะ?"
20028-210 = "อะ... เอ่อ... คุณครูคะ?\nถ้า... มีเรื่องอะไร\nก็บอกฉันได้นะ…"
20028-220 = "เฮือก! คะ... คุณครู!\nจะ... จั๊กจี้นะคะ!"
20028-230 = "อ๊าย!? อะฮ่าฮ่าฮ่า!!"
20028-440 = "มีของที่ต้องการหรือเปล่าคะ?"
20028-450 = "มาเลือกไปได้เลยค่ะ!"
20028-460 = "เรายังมีเวลาเหลืออยู่\nไปเดินดูด้วยกันไหมคะ?"
20028-470 = "คะ... คุณครู... พุ่บ ฮ่าฮ่า!\nฉะ... ฉันไม่เอาแล้ว... อุ๊ย! ฮ่าฮ่าฮ่า"
20028-480 = "หืม?\nมีอะไรจะบอกหรือเปล่า...?"
20028-490 = "ทะ... เท่สุดๆ ไปเลยค่ะ!\nฉันก็ว่าดีเหมือนกันค่ะ"
20028-500 = "ค่ะ! อยู่ตรงนี้ค่ะ!"
20028-510 = "นั่นมัน... น่าจะดีมากเลยละค่ะ!\nสมแล้วค่ะที่เป็นคุณครู!"
20028-520 = "โล่งอกไปทีนะคะ\nที่เจอของที่หาอยู่!"

[translation]
10046-100 = "주군~ 여기~ 여기예요~!\n여기에 이즈나가 자리를\n잡아 뒀습니다!"
10046-110 = "앗, 기다리고 있었습니다! 주군!\n이즈나는 준비되었습니다!\n부디 명령을!"
10046-120 = "바다의 집이,\n이번 임무의 거점……!"
10046-130 = "거점이라고 하니,\n뭔가 닌자 같네요!"
10046-140 = "흥흥흥~♪ 바다의 집엔\n여러 음식이 잔뜩이네요!"
10046-150 = "주군은 어떤 게 좋으신가요?\n빙수? 타코야키?"
10046-160 = "이즈나는 주군과 함께라면\n뭐든 맛있어요~!"
10046-170 = "어떤 위험이나 고난에\n직면해도 정면으로\n맞서는 저 모습…."
10046-180 = "혹시… 시즈코 공은,\n닌자인 걸까요?"
10046-190 = "무엇이든 말씀만\n내려주세요!"
10046-200 = "닌자처럼 샤샥-\n해결하겠습니다!"
10046-210 = "이즈나도 모두에게\n지지 않도록!\n노력할게요! 닌닌!"
10046-220 = "이번 여름은,\n엄청난 일이 잔뜩이었어요!\n말 그대로 이즈나의 눈이\n빙글빙글 돌 정도로…."
10046-230 = "……그래도 이즈나는 매일이,\n엄청 즐거웠어요! 에헤헷!\n감사합니다! 주군!"

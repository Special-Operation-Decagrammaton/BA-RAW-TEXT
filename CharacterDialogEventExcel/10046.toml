[translation]
10046-100 = "主公～！這裡！\n在這裡～！\n伊樹菜已經\n為您準備好了座位！"
10046-110 = "啊，恭候多時了！主公！\n伊樹菜已經準備就緒！\n請儘管吩咐！"
10046-120 = "海之家是\n這次的據點……！"
10046-130 = "聽到據點，\n總覺得很像忍者呢！"
10046-140 = "哼哼哼～♪海之家有\n各式各樣的料理呢！"
10046-150 = "主公喜歡什麼樣的呢？\n刨冰？章魚燒？"
10046-160 = "伊樹菜，只要是\n和主公在一起，\n什麼都覺得好吃！"
10046-170 = "無論面對什麼樣的\n危險和苦難都正面\n面對的姿態……"
10046-180 = "難道說……\n靜子閣下是忍者嗎？"
10046-190 = "請儘管吩咐！"
10046-200 = "像忍者一樣\n唰唰唰地解決吧！"
10046-210 = "伊樹菜也會努力\n不輸給大家的！\n忍忍！"
10046-220 = "這個夏天，發生了\n很多厲害的事！\n讓伊樹菜都快感到\n頭暈目眩了……"
10046-230 = "……伊樹菜每天，\n都過得很開心！耶嘿嘿！\n非常謝謝您！主公！"
10046-240 = "海之家是\n這次的據點……！"
10046-250 = "聽到據點，\n總覺得很像忍者呢！"
10046-260 = "哼哼哼～♪海之家有\n各式各樣的料理呢！"
10046-270 = "主公喜歡什麼呢？\n刨冰？章魚燒？"
10046-280 = "伊樹菜，只要是\n和主公在一起，\n什麼都覺得好吃！"
10046-290 = "無論面對什麼樣的\n危險和苦難都正面\n面對的姿態……"
10046-300 = "難道說……\n靜子閣下是忍者嗎？"
10046-310 = "請隨意吩咐！"
10046-320 = "像忍者一樣\n唰唰唰地解決吧！"

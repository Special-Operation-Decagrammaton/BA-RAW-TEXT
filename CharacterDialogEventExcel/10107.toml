[translation]
10107-1300 = "わ～！\nお楽しみが\nいっぱい！"
10107-1310 = "先生！\nこっちです！\n私の隣！"
10107-1320 = "先生の席、とって\nありますよ～！"
10107-1330 = "盛り上がってますね～！"
10107-1340 = "先生、\n楽しんでますか～？"
10107-1350 = "楽しいパーティーも\n大詰め！"
10107-1360 = "最後まで満喫して\nいきましょ～！"
10107-1370 = "いろいろ\nありましたけど…"
10107-1380 = "最っ高に！\n楽しい時間でした！"
10107-1390 = "は～い！\nお呼びですか～？"
10107-1400 = "次号に\n使えそうな写真、\n撮っていきますよ～"
10107-1410 = "先生、あ～ん\nしてください！"
10107-1420 = "はいっ、今のは\n「万魔殿特製チョコ」\nでした！"
10107-1430 = "どうですか？\n甘くて\nおいしいですよね！"
10107-1440 = "素敵な音楽も、\n美味しい料理も\n好きですけど…"
10107-1450 = "やっぱり、\n先生と一緒だと\nなんか違いますね！"

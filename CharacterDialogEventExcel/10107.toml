[translation]
10107-1300 = "와아~!\n재밌는 게 잔뜩~!"
10107-1310 = "선생님! 여기에요!\n제 옆자리!"
10107-1320 = "선생님 자리,\n맡아놨습니다~!"
10107-1330 = "파티 분위기가\n무르익었네요!"
10107-1340 = "선생님도\n즐기고 계신가요~?"
10107-1350 = "슬슬 즐거운\n파티도 끝나가네요!"
10107-1360 = "후회 없이\n즐기도록 할까요!"
10107-1370 = "이런저런 일들이\n있었지만,\n결론적으로는…"
10107-1380 = "완~전 즐거운\n파티였네요!"
10107-1390 = "네? 부르셨나요~?!"
10107-1400 = "다음 호에\n쓸만한 사진,\n건져볼까요~!"
10107-1410 = "선생님,\n아~ 해보세요!"
10107-1420 = "짠! 만마전 특제\n초콜릿이랍니다!"
10107-1430 = "어때요?\n달콤해서 맛있죠!"
10107-1440 = "즐거운 음악도,\n맛있는 음식도 좋지만…"
10107-1450 = "역시, 선생님이\n함께 있으니\n뭔가 다르네요!"

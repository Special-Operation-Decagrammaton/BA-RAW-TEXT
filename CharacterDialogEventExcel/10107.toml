[translation]
10107-1300 = "ว้าว~! มีเรื่องน่าสนุกๆ เพียบเลย~!"
10107-1310 = "คุณครู! ทางนี้ค่ะ!\nที่นั่งข้างๆ ฉัน!"
10107-1320 = "ฉันจองที่นั่ง\nไว้ให้คุณครูแล้วค่ะ~!"
10107-1330 = "บรรยากาศงานปาร์ตี้\nมาถึงจุดพีคแล้วค่ะ!"
10107-1340 = "คุณครูเองก็สนุกอยู่\nใช่มั้ยคะ~?"
10107-1350 = "ปาร์ตี้แสนสนุก\nกำลังใกล้จะจบแล้วละค่ะ!"
10107-1360 = "มาสนุกกันให้เต็มที่\nจนไม่เสียใจทีหลังกันเถอะค่ะ!"
10107-1370 = "ถึงจะมีเรื่องต่างๆ เกิดขึ้นมากมาย\nแต่สุดท้ายแล้ว..."
10107-1380 = "มันก็เป็นปาร์ตี้\nที่สนุกสุดๆ เลยนะคะ!"
10107-1390 = "คะ? เรียกฉันเหรอคะ~?!"
10107-1400 = "มาถ่ายรูปที่จะ\nใช้ประโยชน์ได้\nในฉบับต่อไปกันเลยมั้ยคะ~!"
10107-1410 = "คุณครู\nอ๊ะ~ ลองทำดูสิคะ!"
10107-1420 = "แถ่นแท้น ช็อกโกแลตโฮมเมด\nของแพนเดโมเนียม โซไซตี้ค่ะ!"
10107-1430 = "เป็นยังไงบ้างคะ?\nหวานอร่อยดีใช่มั้ยคะ!"
10107-1440 = "ถึงเสียงเพลงระรื่นหู\nกับอาหารอร่อยๆ เป็นเรื่องดีก็จริง..."
10107-1450 = "แต่พอได้อยู่กับคุณครูแบบนี้\nก็รู้สึกว่ามีบางอย่าง\nต่างออกไปเลยนะคะ!"

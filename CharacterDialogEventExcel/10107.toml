[translation]
10107-1300 = "哇～！\n好多有趣的東西！"
10107-1310 = "老師！這邊！\n我的旁邊！"
10107-1320 = "老師的位置，\n已經留好了唷～！"
10107-1330 = "真熱鬧呢～！"
10107-1340 = "老師，\n玩得還開心嗎～？"
10107-1350 = "快樂的派對\n也接近尾聲了！"
10107-1360 = "盡情享受到最後吧～！"
10107-1370 = "雖然發生了很多事……"
10107-1380 = "不過真～的！\n是段非常快樂的時光！"
10107-1390 = "是～！\n你叫我嗎？"
10107-1400 = "來拍些能在下一期\n使用的照片吧～！"
10107-1410 = "老師，\n請「啊～」一下！"
10107-1420 = "來！剛才的是\n萬魔殿特製巧克力哦！"
10107-1430 = "怎麼樣？\n又甜又好吃對吧！"
10107-1440 = "雖然我也喜歡\n美妙的音樂\n跟好吃的食物……"
10107-1450 = "但果然，只要\n跟老師在一起\n就不太一樣呢！"

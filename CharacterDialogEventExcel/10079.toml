[translation]
10079-10 = "มาเริ่มกันเลยดีมั้ย"
10079-20 = "ฉันเตรียมตัวพร้อมแล้ว\nคุณครูล่ะ?"
10079-30 = "ทำไปได้เยอะเลยนะเนี่ย"
10079-40 = "ตอนนี้รู้สึกเหมือน\nจะเสร็จแล้วเนอะ?"
10079-50 = "งั้นก่อนอื่นก็\nลองตรวจสอบดูสิ"
10079-60 = "หืม...? เรียกฉันเหรอ?"
10079-70 = "อะไรเนี่ย\nแกล้งกันเหรอ?"
10079-80 = "มีเรื่องอื่นที่\nต้องทำไม่ใช่เหรอ?"
10079-90 = "เฮ้อ...\nรู้แล้ว รู้แล้วน่า\nให้ฉันทำอะไรให้ดี?"
10079-380 = "ได้เจอกันที่นี่อีกแล้วนะคุณครู\nไปดูรอบๆ กันหน่อยดีมั้ย?"
10079-390 = "รู้สึกดีเลยนะเนี่ย?\nตอนนี้เราอาจจะเจอของดีๆ ก็ได้นะ"
10079-400 = "เอาละ ถ้ายังมีอะไรเหลืออยู่\nงั้นเราไปดูให้ทั่วๆ ก่อนจะไม่ทันดีกว่า"
10079-410 = "มันน่าเสียดายนะ"
10079-420 = "ให้กดทางโน้น\nไม่ใช่มากดฉันสิ!"
10079-430 = "อะฮ่าฮ่าฮ่า!\nอะ... อะไรเนี่ย!? จั๊กจี้นะ!!"
10079-440 = "โอ๊ะ ได้แล้ว! ยินดีด้วยนะ!"
10079-450 = "อันนี้มัน\nเป็นของแรร์เลยไม่ใช่เหรอ?"
10079-460 = "ของดีทีเดียวเลยนะ"
10079-470 = "ปิดจ๊อบด้วยชิ้นนี้เลยใช่มั้ย\nทำได้ดีมากเลยคุณครู!"

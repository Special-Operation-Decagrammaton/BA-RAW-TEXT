[translation]
10079-10 = "슬슬 시작해 볼까."
10079-20 = "나는 준비 OK.\n선생님은?"
10079-30 = "꽤 많이 진행됐네."
10079-40 = "이제 거의\n끝난 느낌이지?"
10079-50 = "일단, 한 번은,\n확인해 봐."
10079-60 = "……응? 불렀어?"
10079-70 = "뭐야,\n장난치는 거야?"
10079-80 = "달리 해야 할 일이,\n있는 거 아냐아?"
10079-90 = "……하아.\n알았어, 알았다고.\n뭐 해줄까?"
10079-380 = "여기서 또 보네, 선생님.\n한 번 돌려볼까?"
10079-390 = "느낌 좋은데?\n지금이라면 좋은 거\n나올지도 몰라."
10079-400 = "자자, 아직 남아있다면\n늦기 전에\n다 돌리는 거 어때?"
10079-410 = "아깝잖아."
10079-420 = "나 말고\n저쪽을 누르라고!"
10079-430 = "아하하하!\n뭐, 뭐야!?\n간지럽잖아!!"
10079-440 = "어머, 떴다! 축하해!"
10079-450 = "이거,\n꽤 레어한 거 아냐?"
10079-460 = "꽤나 괜찮은 거 아냐?"
10079-470 = "이걸로 대충 마무리인가.\n수고했어, 선생님!"

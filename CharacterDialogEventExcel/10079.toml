[translation]
10079-10 = "那我們就開始吧。"
10079-20 = "我準備OK，\n老師你呢？"
10079-30 = "進度相當不錯呢。"
10079-40 = "感覺已經幾乎\n結束了呢？"
10079-50 = "姑且還是\n再確認一次吧。"
10079-60 = "……嗯？你叫我嗎？"
10079-70 = "什麼嘛，\n是在開玩笑啊。"
10079-80 = "不是還有其他\n必須做的事嗎？"
10079-90 = "唉……\n知道了知道了。\n要我幫你什麼嗎？"
10079-380 = "又見面了呢，老師。\n要不要抽抽看？"
10079-390 = "感覺還不錯嘛？\n說不定現在\n會出現好東西。"
10079-400 = "來，如果還有剩的話，\n最好在來不及之前抽完哦？"
10079-410 = "不然就太可惜囉。"
10079-420 = "不要按我，\n按那邊啦！"
10079-430 = "啊哈哈哈！\n怎，怎麼了！？\n很癢耶！！"
10079-440 = "哎呀，中獎了呢！恭喜你！"
10079-450 = "這個，是不是\n還挺稀有的？"
10079-460 = "還算是不錯的東西吧？"
10079-470 = "這樣就大致結束了吧。\n辛苦你了，老師！"

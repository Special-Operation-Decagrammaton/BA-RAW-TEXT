[translation]
10116-480 = "特殊任務の時間だ。"
10116-490 = "では、はじめよう。"
10116-500 = "先生がいるのなら、\n問題ないな。"
10116-510 = "順調だな。\nこのあとの指揮も、\nよろしく頼む。"
10116-520 = "作戦は終盤に\n差しかかっている。"
10116-530 = "時間配分に\n注意してくれ。"
10116-540 = "この後も……ずっとこれを\n着ていたいのだが。\n難しいのだろうか。"
10116-550 = "どうかしたのか？"
10116-560 = "何も無いのか……？"
10116-570 = "私が、きれい……？"
10116-580 = "先生は……\n変な冗談を言うんだな。"
10116-590 = "っ、そういうことを\n軽々しく言うな。"

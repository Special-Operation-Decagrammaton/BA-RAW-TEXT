[translation]
10116-480 = "特殊任務的時間到了。"
10116-490 = "那麼開始吧。"
10116-500 = "有老師在的話，\n就沒問題了。"
10116-510 = "挺順利的呢。\n之後的指揮也拜託了。"
10116-520 = "作戰已進入終盤。"
10116-530 = "記得留意時間分配。"
10116-540 = "在這之後……我也想\n繼續穿著這套禮服。\n會有困難嗎？"
10116-550 = "怎麼了嗎？"
10116-560 = "沒什麼事……？"
10116-570 = "我很漂亮……？"
10116-580 = "老師你……也會\n開這種奇怪的玩笑呢。"
10116-590 = "請，請不要\n隨便說那種話。"

[translation]
10116-480 = "ได้เวลาทำภารกิจพิเศษแล้วสินะ"
10116-490 = "งั้นก็มาเริ่มกันเลย"
10116-500 = "ถ้าได้อยู่กับครู\nงานนี้ก็ไม่มีปัญหา"
10116-510 = "ยังไม่เจองานยากเลย\nสั่งการครั้งต่อไปก็ฝากด้วยนะ"
10116-520 = "ตอนนี้เป็นขั้นสุดท้ายแล้วใช่มั้ย?"
10116-530 = "ฝากระวังเรื่อง\nการแบ่งเวลาด้วยนะ"
10116-540 = "ภารกิจเสร็จแล้ว\nแต่อยากใส่ชุดเดรสนี้\nไปเรื่อยๆ จัง"
10116-550 = "หืม?\nมีงานจะสั่งเหรอ?"
10116-560 = "ก็แค่... ลองเรียกดู\nงั้นเหรอ? ทำไมล่ะ?"
10116-570 = "เพราะฉันสวย... งั้นเหรอ...?"
10116-580 = "ครูเนี่ย...\nชอบล้อเล่นอะไรแปลกๆ นะ"
10116-590 = "อึก อย่าพูดอย่างนั้น\nออกมาง่ายๆ แบบนี้สิ"

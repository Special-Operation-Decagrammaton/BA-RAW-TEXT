[translation]
10089-10 = "來，工作的時間\n到囉，老師。"
10089-20 = "來得正好，我有\n東西想給老師看。"
10089-30 = "已經這麼晚了……"
10089-40 = "時間過得真快。\n差不多該謝幕了嗎……？"
10089-50 = "直到收尾都不能鬆懈哦。"
10089-60 = "嗯……？老師？\n有什麼話想說嗎……？"
10089-70 = "噓，噓！安靜一點！"
10089-80 = "不然我們的潛入\n會被發現的……！"
10089-90 = "噫噫……！？"
10089-100 = "啊……這不是老師嗎。"
10089-110 = "這，這裡不太妙……\n去外面說吧。"
10089-310 = "那麼，來收集線索吧。"
10089-320 = "老師，我想整理資料。"
10089-330 = "可以跟我一起嗎？"
10089-340 = "目標的事，\n我還想多調查一下。"
10089-350 = "專，專心一點！\n不，不是對我，\n是對資料！"
10089-360 = "呃，嗯？找，找我\n有什麼事嗎……？"
10089-370 = "啊啊，原來是那樣啊。"
10089-380 = "我完全明白了。"
10089-390 = "不愧是我看上的夥伴。"
10089-400 = "雖然情報已經湊齊……\n以防萬一，再檢查一下吧。"

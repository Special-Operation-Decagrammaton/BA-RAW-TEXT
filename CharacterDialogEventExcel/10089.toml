[translation]
10089-10 = "เอาละ ถึงเวลาทำงานแล้ว\nคุณครู"
10089-20 = "มาได้จังหวะพอดีเลย\nฉันมีอะไรจะให้คุณครูดูน่ะ"
10089-30 = "เวลาช่างผ่านไป..."
10089-40 = "เร็วจังเลยนะ\nงานใกล้จะเสร็จแล้วเหรอ...?"
10089-50 = "ห้ามวางมือจนกว่าจะ\nเสร็จงานเด็ดขาด"
10089-60 = "หืม...? คุณครู?\nมีเรื่องอะไรเหรอ?"
10089-70 = "ชู่ว! ชู่ว! เงียบๆ สิ!"
10089-80 = "เดี๋ยวถูกจับได้ว่าแอบเข้ามานะ...!"
10089-90 = "เฮือก...!?"
10089-100 = "อ่า... คุณครูนี่เอง"
10089-110 = "ทะ... ที่นี่อันตรายนะ...\nไปคุยกันข้างนอกเถอะ"
10089-310 = "งั้นก็รวบรวมเบาะแสดูดีมั้ยนะ?"
10089-320 = "คุณครู ฉันอยากจัดการข้อมูลน่ะ"
10089-330 = "มาช่วยกันหน่อยได้มั้ย?"
10089-340 = "ฉันยังต้องหาข้อมูล\nเกี่ยวกับเป้าหมายเพิ่มน่ะ คุณครู"
10089-350 = "ตะ... ตั้งใจหน่อยสิ คุณครู!\nไม่ใช่ที่ฉัน ที่ข้อมูลน่ะ!"
10089-360 = "หะ... หืม?\nมีอะไรจะพูดกับฉันเหรอ...?"
10089-370 = "อ๋อ เป็นแบบนั้นนี่เอง"
10089-380 = "เข้าใจครบถ้วนแล้วละ"
10089-390 = "สมแล้วที่เป็นพาร์ทเนอร์ของฉัน"
10089-400 = "เรามีข้อมูลครบแล้ว...\nแต่ก็ลองหาไว้เผื่ออีกหน่อยเถอะ"

[translation]
10089-10 = "Time to go to work, Sensei."
10089-20 = "Great timing. I have something to show you."
10089-30 = "Would you look at the time...?"
10089-40 = "That was quick... Is it already over?"
10089-50 = "Hang on until the very end."
10089-60 = "Huh? Sensei? What's the matter?"
10089-70 = "Sh-Shhh! Quiet!"
10089-80 = "They'll find out about the infiltration!"
10089-90 = "Eek?!"
10089-100 = "Oh...it's just you, Sensei."
10089-110 = "It's too dangerous here... Let's talk outside."
10089-310 = "Now then, shall we gather some clues?"
10089-320 = "Sensei, let's organize the documents."
10089-330 = "Would you mind helping me?"
10089-340 = "I need to learn more about the target."
10089-350 = "F-Focus, Sensei. No, not on me! On the documents!"
10089-360 = "H-Huh? You got something to say?"
10089-370 = "Oh. So that's what it was."
10089-380 = "I understand completely."
10089-390 = "As expected of the business partner I've been scouting."
10089-400 = "We have the needed intel...but let's dig a bit deeper. Just in case."

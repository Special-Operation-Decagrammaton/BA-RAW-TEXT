[translation]
13014-220 = "ทะเลสีฟ้า! ท้องฟ้าสีคราม!\nเมฆสีขาว!\nนี่ละยอดเยี่ยมที่สุด!"
13014-230 = "ฮุฮุ ชัยชนะต้องเป็นของ\nพวกเรา! ท่านอาจารย์ก็\nจะช่วยเชียร์ใช่มั้ย?"
13014-240 = "เวลาเหลือไม่มากแล้ว\nฉันจะใส่ให้เต็มที่เลย!"
13014-250 = "ต้องตื่นตัวอยู่เสมอ\nจนถึงวินาทีสุดท้ายเลยละ!"
13014-260 = "ถึงเทศกาลจะจบลงแล้ว...\nแต่การเป็นวัยรุ่นของเรา\nจะยังดำเนินต่อไป!"
13014-270 = "กิจกรรมวัยรุ่นในฤดูร้อน!\nฉันรอไม่ไหวแล้วละ ท่านอาจารย์!"
13014-280 = "ท่านอาจารย์อยาก\nว่ายน้ำกับฉันงั้นเหรอ?"
13014-290 = "ดีละ งั้นมาแข่งกันว่า\nใครจะว่ายเร็วกว่ากัน!"
13014-300 = "ความประมาทคือศัตรูตัวฉกาจ\nฉันต้องตื่นตัวอยู่ตลอดแล้วละ"
13014-310 = "แล้วฉันจะรอฟังการบรรยาย\nการแข่งขันของท่านอาจารย์นะ"
13014-570 = "ท่านอาจารย์! เกมล่าสมบัติในชายหาด!\nจะมีอะไรซ่อนอยู่บ้างนะ?"
13014-580 = "เกมล่าสมบัติก็เป็น\nหนึ่งในกิจกรรมวัยรุ่นนะ!\nไปเล่นด้วยกันเถอะ!"
13014-590 = "อ่า สนุกจังเลย\nอยากให้มีอีกจัง"
13014-600 = "เป็นความทรงจำที่ดีเลยละ\nท่านอาจารย์ ขอบคุณนะ"
13014-610 = "เห็นสมบัติหลายอย่าง\nเต็มไปหมดเลยแฮะ"
13014-620 = "หืม? สมบัติที่ล้ำค่าที่สุด\nของฉันคืออะไรน่ะเหรอ?"
13014-630 = "ระ... เรื่องนั้น..."
13014-640 = "ฉะ... ฉันบอกไม่ได้หรอก!\nความลับ! เป็นความลับสุดยอดเลย!"
13014-650 = "วัยรุ่นที่ฉันใฝ่ฝัน\nเป็นความจริงขึ้นมาอีกอย่างแล้ว..."
13014-660 = "ขะ... ขอบคุณจริงๆ นะ\nท่านอาจารย์..."
13014-670 = "โอ๊ะ! นี่มัน\nสมบัติไม่ใช่เหรอ!?"
13014-680 = "ท่านอาจารย์!\nฉันเจอเบาะแสแล้ว!"
13014-690 = "มีสมบัติเพียบเลย!\nเอาละ ไปล่ารางวัลกัน...!"
13014-700 = "สมแล้วที่เป็นท่านอาจารย์!\nฝีมือดีเลยละ!"
13014-710 = "ไปล่าสมบัติ\nชิ้นต่อไปกันเถอะ!"

[translation]
13014-220 = "藍海！藍天！白雲！\n聽起來真悅耳啊！"
13014-230 = "當然，會收下冠軍哦。\n老師也要幫我加油啊！"
13014-240 = "剩下的時間\n也要全力以赴！"
13014-250 = "到最後的最後\n都不能鬆懈！"
13014-260 = "祭典雖然結束了……\n但青春還會持續下去！"
13014-270 = "夏日限定的青春活動！\n師父，真令人期待啊！"
13014-280 = "師父，想跟我\n一起游泳嗎？"
13014-290 = "好啊，來比比看\n誰游得比較快吧！"
13014-300 = "大意是大敵。\n打起精神來吧。"
13014-310 = "師父的解說，\n我很期待哦！"
13014-570 = "海邊的尋寶！\n會藏著什麼樣的東西呢？"
13014-580 = "一起尋寶也很青春對吧！\n好～來試試看吧！"
13014-590 = "啊～真開心！\n還想再玩一次呢。"
13014-600 = "是段珍貴的回憶哦。\n師父，謝謝你啦。"
13014-610 = "各種寶物令人\n眼花撩亂啊。"
13014-620 = "嗯？問我最重要的\n寶物是什麼？"
13014-630 = "那，那是……"
13014-640 = "不能說！\n絕對會保密！"
13014-650 = "夢想中的青春，\n又實現了一個……"
13014-660 = "真，真的很謝謝你，\n師父……！"
13014-670 = "喔！這不是寶物嗎！？"
13014-680 = "師父！\n找到線索了唷！"
13014-690 = "寶物到手！\n那麼，獎勵是……！"
13014-700 = "不愧是師父！\n手法真漂亮！"
13014-710 = "去找下一個寶物吧！"

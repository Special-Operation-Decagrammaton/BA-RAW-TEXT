[translation]
13014-220 = "푸른 바다! 푸른 하늘!\n새하얀 구름!\n최고의 울림이지!"
13014-230 = "후후, 우승은 우리\n차지야! 선생님도\n응원해 줄 거지?"
13014-240 = "얼마 남지 않은 기간,\n전력을 다하는 거야!"
13014-250 = "마지막의 마지막까지\n긴장을 늦추지 못하겠군!"
13014-260 = "축제는 끝이 났지만……\n우리의 청춘은\n계속될 거야!"
13014-270 = "여름 한정 청춘 활동!\n스승님, 기대돼!"
13014-280 = "스승님, 나랑\n수영하고 싶은 거야?"
13014-290 = "좋아, 어느 쪽이\n더 빠른지 승부다!"
13014-300 = "방심은 큰 적이야.\n긴장해야겠어."
13014-310 = "스승님의 경기 해설,\n기대하고 있을게!"
13014-570 = "스승님! 해변의\n보물찾기야! 어떤 것들이\n숨어 있을까?"
13014-580 = "보물찾기도\n청춘 활동의 하나지!\n같이 해보자!"
13014-590 = "아아, 즐거웠다.\n다음에 또 했으면 좋겠어."
13014-600 = "소중한 추억이 생겼어.\n스승님, 고마워."
13014-610 = "여러 가지\n보물들에 눈길이 가네."
13014-620 = "응? 나에게 가장 소중한\n보물이 뭐냐고?"
13014-630 = "그, 그건……"
13014-640 = "마, 말할 수 없어!\n비밀! 절대 비밀!"
13014-650 = "꿈꾸던 청춘이,\n또 하나 현실로……"
13014-660 = "정말 고마워.\n스승님……."
13014-670 = "오! 이거,\n보물 아니야!?"
13014-680 = "스승님!\n단서를 발견했어!"
13014-690 = "보물 획득!\n자아 그럼 보상을……!"
13014-700 = "역시 스승님!\n좋은 솜씨야!"
13014-710 = "다음 보물을\n찾으러 가자!"

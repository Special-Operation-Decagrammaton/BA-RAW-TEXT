10094-950 = "咦……？\n先，先等一下哦，老師！"
10094-960 = "嗚咿，\n工作太多了啦！"
10094-970 = "事情居然會變成這樣，\n我完全不知道……"
10094-980 = "無法理解，\n無法理解啦……"
10094-990 = "怪盜？拍賣？藝術品？\n那是什麼啊！\n某款遊戲的設定！？"
10094-1000 = "儘管經歷了許多事情，\n勇者們仍擊敗了邪惡，"
10094-1010 = "威風地回到了故鄉……！"
10094-1020 = "嘛，結局就是這樣吧。\n嗯？老師？辛苦了！"

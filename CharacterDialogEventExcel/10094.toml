[translation]
10094-340 = "มาแล้ว! เห็นแล้ว!\nแล้วก็ชนะแล้ว... มั้ยนะ?"
10094-350 = "เอาเป็นว่า!\nเมดไซบะ โมโมอิ\nได้เวลาออกโรงแล้ว!"
10094-360 = "อ๊ะ คุณครู!\nทำไมไม่เตรียมตัว...!"
10094-370 = "เอ๋...? เดี๋ยวสิ เดี๋ยวๆ\nรอกันก่อนสิ คุณครู!"
10094-380 = "หืม? อยากเห็นฉัน\nตอนทำงานเมดเหรอ...?"
10094-390 = "ก็นะ ก็ฉันใส่\nชุดเมดอยู่แล้วนี่! อื้ม!"
10094-400 = "ทำไมวิชาเมด\nไม่มีให้โดดงาน\nแล้วนอนกลางวันเลยนะ?"
10094-410 = "คุณครูไม่คิดเหรอ\nว่านี่คือปัญหาน่ะ?"
10094-420 = "จริงสิ! นี่ คุณครู รู้อะไรหรือเปล่า?\nว่าคฤหาสน์หลังนี้น่ะ..."
10094-430 = "ซ่อนความลับสุดยอดเอาไว้เลยนะ!\nลางสังหรณ์ของฉัน\nบอกมาอย่างนั้นน่ะ!"
10094-440 = "จะ... จั๊กจี้นะ! คุณครู!\nฉันเป็นคนบ้าจี้นะ!"
10094-450 = "แต่ก็ใช่ว่าจะไม่ชอบหรอก!"
10094-920 = "มาแล้ว! เห็นแล้ว!\nแล้วก็ชนะแล้ว... มั้ยนะ?"
10094-930 = "เอาเป็นว่า!\nเมดไซบะ โมโมอิ\nได้เวลาออกโรงแล้ว!"
10094-940 = "อ๊ะ คุณครู!\nทำไมไม่เตรียมตัว...!"
10094-950 = "เอ๋...? เดี๋ยวสิ เดี๋ยวๆ\nรอกันก่อนสิ คุณครู!"
10094-960 = "แงงง\nงานเยอะจังเลย!"
10094-970 = "คิดไม่ถึงเลย\nว่าจะเป็นแบบนี้..."
10094-980 = "ไม่เข้าใจ\nไม่เข้าใจเลย..."
10094-990 = "โจร? ประมูล? งานศิลปะ?\nนี่มันอะไรกัน!\nพล็อตเกมเหรอ!?"
10094-1000 = "ถึงจะเกิดเรื่องมากมาย\nแต่เหล่าผู้กล้าก็ปราบคนชั่ว"
10094-1010 = "และกลับมายัง\nฐานของตัวเอง\nได้อย่างองอาจ...!"
10094-1020 = "ก็จบประมาณนั้นละ\nคุณครู พยายามได้ดีมากเลย!"
10094-1030 = "หืม? อยากเห็นฉัน\nตอนทำงานเมดเหรอ...?"
10094-1040 = "ก็นะ ก็ฉันใส่\nชุดเมดอยู่แล้วนี่! อื้ม!"
10094-1050 = "ทำไมวิชาเมด\nไม่มีให้โดดงาน\nแล้วนอนกลางวันเลยนะ?"
10094-1060 = "คุณครูไม่คิดเหรอ\nว่านี่คือปัญหาน่ะ?"
10094-1070 = "จริงสิ! นี่ คุณครู รู้อะไรหรือเปล่า?\nว่าคฤหาสน์หลังนี้น่ะ..."
10094-1080 = "ซ่อนความลับสุดยอดเอาไว้\nเลยนะ! ลางสังหรณ์ของฉัน\nบอกมาอย่างนั้นน่ะ!"
10094-1090 = "จะ... จั๊กจี้นะ! คุณครู!\nฉันเป็นคนบ้าจี้นะ!"
10094-1100 = "แต่ก็ใช่ว่าจะไม่ชอบหรอก!"

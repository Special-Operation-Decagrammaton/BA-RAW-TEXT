[translation]
10094-340 = "왔도다, 보았도다!\n그리고 이겼…… 나?"
10094-350 = "아무튼!\n메이드 사이바 모모이,\n출격이라구!"
10094-360 = "아, 선생님!\n준비라면 진작에……!"
10094-370 = "어라.....?잠깐, 잠깐만\n기다려줘, 선생님!"
10094-380 = "응? 메이드다운\n일하는 모습을\n보고싶어……?"
10094-390 = "뭐, 일단,\n메이드복이니까! 응!"
10094-400 = "메이드 과목에는 왜\n땡땡이 치고 낮잠 자는\n수업이 없을까?"
10094-410 = "이거, 문제라고\n생각하지 않아?"
10094-420 = "맞다! 저기, 선생님. 그거 알아?이 저택에는……"
10094-430 = "엄청난 비밀이\n숨겨져 있대!\n내 직감이,\n그렇게 말하고 있어!"
10094-440 = "간, 간지러워! 선생님!\n나, 간지럼에 약하다고!"
10094-450 = "싫은건 아니지만!"

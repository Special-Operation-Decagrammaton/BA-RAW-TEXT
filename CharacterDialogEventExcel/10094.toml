[translation]
10094-340 = "我來！我見！\n然後我征服……嗎？"
10094-350 = "總之！\n女僕才羽桃井，\n上陣囉！"
10094-360 = "啊，老師！\n準備的話我早就……！"
10094-370 = "咦……？\n先，先等一下哦，老師！"
10094-380 = "嗯？想看符合女僕\n身分的工作表現……？"
10094-390 = "也對，畢竟我\n正穿著女僕裝嘛！嗯！"
10094-400 = "女僕的學科裡為什麼\n沒有偷懶午睡的課程呢？"
10094-410 = "不覺得這是個問題嗎？"
10094-420 = "對了！吶，老師。\n你知道嗎？\n這座宅邸裡……"
10094-430 = "隱藏著天大的祕密哦！\n我的直覺是這麼說的！"
10094-440 = "很，很癢耶！老師！\n我很怕癢啦！"
10094-450 = "雖然也不討厭\n就是了！？"
10094-920 = "我來！我見！\n然後我征服……嗎？"

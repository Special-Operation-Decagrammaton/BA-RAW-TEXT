[translation]
10117-10 = "어서 와- 선생님-"
10117-20 = "히카리는 준비 완-료-"
10117-30 = "선생님- 위기야-"
10117-40 = "도와줘- 헬-프-"
10117-50 = "운행 준비- 문제없음-"
10117-60 = "어때- 선생님-?\n빠르게 가볼-까-?"
10117-70 = "거의 끝나가-\n더 놀고 싶은데-"
10117-80 = "재밌었지-?\n또 놀자- 선생님-"
10117-90 = "응-? 왜-?\n히카리랑 놀고 싶어-?"
10117-100 = "간지-러워-"
10117-110 = "우우, 복수할 거야-"
10117-120 = "쓰다듬 플리즈-\n히카리 칭찬해 줘-"
10117-130 = "아무것도 안 했지만-\n그래도 해줘-"
10117-140 = "간식 줄까-? 잠깐-만-……"
10117-150 = "아… 다 먹어버렸어- 쏘리-"
10117-510 = "필요한 거 있어-?\n골라봐-"
10117-520 = "어서 와-\n뭘 사고 싶어-?"
10117-530 = "선로는 어디까지나 이어지지-\n가게도 함께야-"
10117-540 = "추천-? 으음……"
10117-550 = "안 돼- 직접 골라야 해-"
10117-560 = "히카리도 놀고 싶지만\n참는 중- 선생님도 참아-"
10117-570 = "오- 그거 좋지-"
10117-580 = "센스 있어- 휴-휴-"
10117-590 = "좋은 거 골랐어-\n선생님 똑똑해-"
10117-600 = "히카리 것도 사주는 거야-?"

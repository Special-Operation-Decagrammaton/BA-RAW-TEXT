[translation]
10117-10 = "เข้ามาสิ คุณครู"
10117-20 = "ฮิคาริพร้อมแล้ว"
10117-30 = "คุณครู งานเข้าแล้ว"
10117-40 = "ช่วยด้วย เฮลป์มี..."
10117-50 = "เตรียมเดินรถ ไร้ปัญหา"
10117-60 = "ว่าไงล่ะ คุณครู?\nไปซิ่งกันเลยมั้ย?"
10117-70 = "เกือบจบแล้วสินะ\nอยากเล่นต่อจัง"
10117-80 = "สนุกใช่มั้ยล่ะ?\nไว้มาเล่นกันอีกนะ คุณครู"
10117-90 = "หืม? ทำไมเหรอ?\nอยากเล่นกับฮิคาริเหรอ?"
10117-100 = "จั๊กจี้นะ"
10117-110 = "ฮึ่ม จะแก้แค้นเลยคอยดู"
10117-120 = "ลูบหัวให้หน่อย พลีส\nชมฮิคาริหน่อย"
10117-130 = "ถึงจะไม่ได้ทำอะไรเลย\nแต่ก็ชมกันหน่อยนะ"
10117-140 = "เอาของว่างมั้ย? เดี๋ยวนะ..."
10117-150 = "อ่า... กินหมดไปแล้ว... ซอรี่"
10117-510 = "มีของที่อยากได้มั้ย?\nลองเลือกดูสิ"
10117-520 = "เชิญเลย\nอยากซื้ออะไรเหรอ?"
10117-530 = "ทางรถไฟเชื่อมกันหมดนั่นละ\nร้านก็เปิดให้ตลอดเหมือนกัน"
10117-540 = "ให้แนะนำเหรอ? อืม..."
10117-550 = "ไม่เอา ต้องเลือกเองสิ"
10117-560 = "ฮิคาริก็อยากไปเล่นเหมือนกัน\nแต่ฮึบไว้อยู่น่ะ ครูก็ฮึบไว้นะ"
10117-570 = "โอ้ อันนี้ดีเลย"
10117-580 = "เซนส์ดีนะเนี่ย ฮุฮุ"
10117-590 = "เลือกของดีเลยนะ\nคุณครูฉลาดจริงๆ"
10117-600 = "จะซื้อให้ฮิคาริด้วยเหรอ?"

[translation]
10117-10 = "歡迎～"
10117-20 = "準備完畢～"
10117-30 = "老師～大危機～"
10117-40 = "Help me～\n快幫幫我～"
10117-50 = "發車準備～\n沒有問題～"
10117-60 = "老師～要加速囉～"
10117-70 = "已經結束了～？\n還想再玩～"
10117-80 = "真開心呢～\n再一起玩吧。"
10117-90 = "咦～？\n想跟光一起玩嗎？"
10117-100 = "好癢哦～"
10117-110 = "嗚嗚，我要報仇～！"
10117-120 = "請給我摸摸，\n誇誇我嘛～"
10117-130 = "誇誇我～雖然我\n什麼都沒做就是了。"
10117-140 = "要吃點心嗎～？\n等一下哦～"
10117-150 = "啊……全部都\n被我吃光了……\nSorry～"
10117-510 = "Train shop～\n想要什麼呀～？"
10117-520 = "歡迎光臨～\n歡迎參觀～是這樣嗎？"
10117-530 = "路線會一直延續下去哦～\n商店也一起～"
10117-540 = "推薦？唔嗯……"
10117-550 = "要自己選才對～"
10117-560 = "光也想玩，但在忍耐～\n老師也忍耐一下吧～"
10117-570 = "哦～那個很棒吧～"
10117-580 = "真有品味～咻～咻～"
10117-590 = "老師，真聰明～"
10117-600 = "也買給光！也買給光嘛！"

[translation]
20044-10 = "蔚藍檔案。"
20044-20 = "你來啦，指導員。\n口渴的時候，請隨時告訴我。"
20044-30 = "感覺能專心\n運動的地方在……"
20044-40 = "咖啡廳是提供\n飲料的場所……\n既然如此，我也……"
20044-50 = "在特別菜單裡，\n追加蛋白質飲料……"
20044-60 = "不介意的話，\n要不要來一杯呢？"
20044-70 = "在這裡的話，\n感覺能做肌肉訓練。"
20044-80 = "歡迎回來，指導員。"
20044-90 = "不久前，我對飲料\n的種類做了調整，\n要不要喝喝看呢？"
20044-100 = "今天我的職責，\n是調整「老師」的狀態。"
20044-110 = "水分與蛋白質，同時為你提供。\n有需要的話，請隨時告知。"
20044-120 = "我……喜歡不會放棄的人。"
20044-130 = "不會停下腳步的人，\n總是持續挑戰的人。"
20044-140 = "……是啊。\n會覺得有很多相似之處\n並不是你的錯覺哦。"
20044-150 = "我認為重要的是立定目標，\n並一步步地持續累積。"
20044-160 = "即便無法持之以恆也沒關係。"
20044-170 = "只要踏出了最初的一步，\n之後總是會順利的。"
20044-180 = "不知道為什麼，\n只要穿著打工的制服，\n就會被委託應援呢。"
20044-190 = "雖然不知道原因……\n如果能讓大家獲得\n元氣的話，那就太好了。"
20044-200 = "你看起來有點疲倦呢。"
20044-210 = "我對按摩還挺有自信的，\n請隨時跟我說。"
20044-220 = "……現在的話\n還有附贈運動飲料哦。"
20044-230 = "祝你生日快樂，指導員。"
20044-240 = "這一箱蛋白質送你當禮物。\n請收下吧。"
20044-250 = "來自「老師」的祝福……\n有股心癢難耐的感覺呢。"
20044-260 = "我想想……\n能請你跟我一起做\n特別強化訓練嗎？"
20044-270 = "……嗯，禮物的話\n就選蛋白質飲料的\n所有口味……"
20044-280 = "呵呵，新年快樂。"
20044-290 = "希望今年也是健康的一年。"
20044-300 = "聖誕節到了呢。\n這是個容易堆積脂肪的日子。"
20044-310 = "不過不必擔心。"
20044-320 = "脂肪是儲存下來的燃料……"
20044-330 = "換句話說，就是進行\n能量滿滿訓練的準備\n已經完成的意思……！"
20044-340 = "……指導員？\n你要去哪裡？"
20044-350 = "為了這天，我特別\n訂購了蛋白質糖果。"
20044-360 = "是南瓜口味的。"
20044-370 = "也是極力追求\n營養均衡的力作。"
20044-380 = "請吃一顆看看吧。\n味道……我也不清楚。"
20044-400 = "辛苦了！\n指導員！"
20044-410 = "你真的，跑得非常好。"
20044-420 = "請用，我為你準備了飲料。"
20044-430 = "沒錯，這份努力\n就該獲得回報。"
20044-440 = "所以必須，\n給予適當的獎勵。"
20044-450 = "當然，世上的一切──"
20044-460 = "未必都能獲得與\n努力成正比的評價。"
20044-470 = "但我依然……"
20044-480 = "希望努力的人\n都能確實獲得回報。"
20044-490 = "來，請享用吧。"
20044-500 = "我也要喝一杯。"
20044-2600 = "如此細心的指導，真是非常感謝。\n我不會滿足於此，未來也將持續精進。\n來，指導員，再做一組吧！"

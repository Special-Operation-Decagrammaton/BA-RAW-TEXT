[translation]
20044-10 = "Blue Archive"
20044-20 = "สวัสดีค่ะ เทรนเนอร์\nถ้าคอแห้งก็บอกฉันได้ตลอดเลยนะคะ"
20044-30 = "ฉันจะไปหาที่เงียบๆ\nที่ออกกำลังกายได้ค่ะ..."
20044-40 = "คาเฟ่เป็นสถานที่ที่\nขายเครื่องดื่มใช่มั้ยล่ะคะ\nถ้างั้นฉัน..."
20044-50 = "เพิ่มเครื่องดื่มโปรตีน\nเป็นเมนูพิเศษดีมั้ยนะ…"
20044-60 = "มีใครต้องการ\nเครื่องดื่มบ้างมั้ยคะ?"
20044-70 = "ถ้าออกกำลังกายที่นี่\nคงไม่มีปัญหาสินะคะ"
20044-80 = "เชิญค่ะ\nเทรนเนอร์"
20044-90 = "ฉันเพิ่งเปลี่ยนประเภทเครื่องดื่มไป\nมาดื่มด้วยกันมั้ยคะ?"
20044-100 = "สวัสดีค่ะ 'คุณครู'\nเข้าเวรวันนี้ ฉันจะดูแล\nเรี่ยวแรงและสภาพร่างกาย\nของคุณครูค่ะ"
20044-110 = "ถ้าคิดว่าขาดน้ำหรือโปรตีน\nก็บอกฉันได้ตลอดเลยนะคะ"
20044-120 = "ฉัน... ชอบคนที่\nไม่ยอมแพ้ค่ะ"
20044-130 = "หมายถึงคนที่มุ่งมั่นไปตามทาง\nและคนที่พยายามต่อเนื่องน่ะค่ะ"
20044-140 = "นั่นสิคะ... เรื่องที่มีอะไรหลายอย่าง.\nเหมือนกับเทรนเนอร์.\nคงไม่ใช่เรื่องบังเอิญแน่ค่ะ"
20044-150 = "ฉันคิดว่าการตั้งเป้าหมาย\nเป็นสิ่งสำคัญค่ะ\nการปฏิบัติตัวอย่างสม่ำเสมอ\nเพื่อเข้าใกล้เป้าหมายนั้นก็ด้วยค่ะ"
20044-160 = "ไม่เป็นไรค่ะ เทรนเนอร์"
20044-170 = "เพียงแค่เริ่มต้น\nก็เหมือนทำสำเร็จ\nไปครึ่งหนึ่งแล้วค่ะ"
20044-180 = "พอได้ใส่ชุดนี้\nทำงานพาร์ทไทม์\nก็น่าแปลกที่มีคนขอให้ฉัน...\nช่วยเชียร์พวกเขาด้วยค่ะ"
20044-190 = "ก็นะ การให้กำลังใจคนอื่น\nก็เป็นเรื่องสำคัญนี่คะ"
20044-200 = "ถ้าปวดเนื้อเมื่อยตัว\nก็บอกฉันได้เลยนะคะ"
20044-210 = "ฉันนวดสปอร์ต\nเก่งค่ะ"
20044-220 = "แล้วตอนนี้ฉันก็เสิร์ฟ\nเครื่องดื่มที่เติมความชุ่มชื้น\nอย่างรวดเร็วให้ได้ด้วยค่ะ"
20044-230 = "สุขสันต์วันเกิดค่ะเทรนเนอร์"
20044-240 = "ฉันว่าจะให้เครื่องดื่มโปรตีน\nเป็นของขวัญสักลัง คิดว่าไงคะ?"
20044-250 = "คำอวยพรที่ได้จาก 'คุณครู'...\nให้ความรู้สึกต่างออกไปจริงๆ เลยค่ะ"
20044-260 = "ในเมื่อคุณครูมาช่วยอวยพรแล้ว\nงั้นมาลองสเปเชียลเทรนนิ่ง\nสุดกระปรี้กระเปร่ากับฉันมั้ยคะ..."
20044-270 = "อืม... ถ้าเป็นของขวัญ\nก็อยากได้เครื่องดื่ม\nโปรตีนหลายๆ แบบ..."
20044-280 = "ปีใหม่แล้วค่ะ\nหวังว่าปีนี้ก็จะเป็นปีที่\nสุขภาพแข็งแรงนะคะ"
20044-290 = "ถ้าอยากออกกำลังกายหรือดื่มอะไร...\nรู้ใช่มั้ยคะว่าต้องทำยังไง? ฮุฮุ"
20044-300 = "คริสต์มาสแล้วสินะคะ\nเป็นวันที่น้ำหนักขึ้นได้ง่ายเลยค่ะ"
20044-310 = "ไม่ต้องเป็นห่วงนะคะ"
20044-320 = "เทรนเนอร์\nไขมันจะถูกเก็บเป็นเชื้อเพลิง"
20044-330 = "เป็นที่มาของความแข็งแกร่ง\nเพื่อการเทรนที่กระฉับกระเฉงยิ่งขึ้นค่ะ"
20044-340 = "จะ... จู่ๆ จะไปไหน\nเหรอคะ?!"
20044-350 = "เทรนเนอร์ ลองกินลูกกวาดโปรตีน\nรสฟักทองมั้ยคะ?"
20044-360 = "แน่นอนว่าฉัน\nสั่งมาเป็นพิเศษค่ะ"
20044-370 = "ฉันไม่ค่อยสนใจ\nเรื่องรสชาติเท่าไร"
20044-380 = "แต่มีคุณค่าทางโภชนาการแน่นอนค่ะ"
20044-400 = "ทำได้ดีมากค่ะ\nเทรนเนอร์!"
20044-410 = "เป็นการวิ่งที่ยอดเยี่ยมเลยค่ะ"
20044-420 = "เอ้า ดื่มนี่สิคะ\nฉันเตรียมมาให้ค่ะ"
20044-430 = "ค่ะ เราต้องได้รับ\nการตอบแทน\nจากความพยายามสิค่ะ"
20044-440 = "สมควรแล้ว\nที่จะได้รับรางวัล\nอย่างเหมาะสมค่ะ"
20044-450 = "แน่นอนว่าทุกสิ่งในโลก..."
20044-460 = "ล้วนไม่ได้รับการประเมิน\nตามความพยายามเสมอไป"
20044-470 = "แต่ว่าฉันก็..."
20044-480 = "คิดว่าอยากให้\nคนที่เพียรพยายาม\nได้รับรางวัลค่ะ"
20044-490 = "เอาละ รีบดื่มสิคะ"
20044-500 = "ฉันก็จะดื่มด้วยค่ะ"
20044-2600 = "ขอบคุณที่ใส่ใจกันมาตลอดนะคะ\nเทรนเนอร์ ฉันจะพยายามอีกขั้น\nในฐานะโค้ชของชมรมออกกำลังกายค่ะ\nงั้นก็ไปกันเถอะค่ะ คุณสมาชิก! อีกเซ็ตค่ะ!"

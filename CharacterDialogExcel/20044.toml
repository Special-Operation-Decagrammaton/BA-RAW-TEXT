[translation]
20044-10 = "Blue Archive"
20044-20 = "Hello, Trainer. If you're feeling thirsty, please let me know."
20044-30 = "Let's find a quiet place to work out..."
20044-40 = "A cafe is a place to serve drinks. In that case..."
20044-50 = "How about adding a protein drink as a special menu item...?"
20044-60 = "Does anyone need refreshments?"
20044-70 = "I should have no problem squeezing in a few sets here."
20044-80 = "Welcome, Trainer."
20044-90 = "The beverage offerings have changed. Would you like to try one with me?"
20044-100 = "Hello, \"Sensei.\" As student rep, my duty today is to manage your energy levels and physical condition."
20044-110 = "Anytime you need hydration or protein, let me know."
20044-120 = "I...like the type of people who don't give up."
20044-130 = "Someone who forges their own path. Who tries over and over again."
20044-140 = "...Right. And all the similarities with you might be more than coincidence."
20044-150 = "Setting goals is very important. Putting in the proper effort to reach that goal is also important."
20044-160 = "It's okay, Trainer."
20044-170 = "Getting started is half the battle."
20044-180 = "Strangely enough, when I'm working part-time in this outfit, people...ask me to cheer them on."
20044-190 = "Well, providing energy to people is important, after all."
20044-200 = "If you're feeling tired, please let me know."
20044-210 = "I'm confident in my sports massage skills."
20044-220 = "And now I can also supply you with hydrating beverages."
20044-230 = "Happy birthday, Trainer."
20044-240 = "I was thinking of getting you a pack of protein drinks as a gift. What do you think?"
20044-250 = "Getting congratulated by \"Sensei\"... It feels sort of strange."
20044-260 = "Then what do you say to a lively, special training to celebrate...?"
20044-270 = "...Hmm, for the gift, I'm thinking every variety of protein drink..."
20044-280 = "It's the new year. I hope this next year brings you good health."
20044-290 = "If you need exercise or something to drink... You know what to do, right? Fufu."
20044-300 = "It's Christmas. A dangerous day for gaining weight."
20044-310 = "Don't worry, Trainer."
20044-320 = "Fat is also stored fuel."
20044-330 = "It's the source of energy for even more intense training!"
20044-340 = "Wh-Where are you running off to all of a sudden?!"
20044-350 = "Trainer. Would you like some pumpkin-flavored protein candy?"
20044-360 = "I specially ordered this, of course."
20044-370 = "While I didn't put much consideration into taste this time either..."
20044-380 = "...I can guarantee its nutritional value."
20044-400 = "Good work, Trainer!"
20044-410 = "That was truly an amazing run."
20044-420 = "Here, have this. I mixed it for you."
20044-430 = "Yes. Effort should be rewarded."
20044-440 = "It's only natural to receive an earned reward."
20044-450 = "Of course, not everyone in this world..."
20044-460 = "...receives the goodness they deserve."
20044-470 = "But still..."
20044-480 = "I hope that people who work hard are rewarded for it."
20044-490 = "Here, please enjoy."
20044-500 = "I'll have a drink as well."
20044-2600 = "Thank you for your consideration, Trainer. As the Athletics Training Club's coach, I'll continue to work hard. Then, let's go! One more set!"

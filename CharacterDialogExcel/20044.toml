[translation]
20044-10 = "블루 아카이브"
20044-20 = "안녕하십니까. 트레이너.\n목이 마르시다면, 언제든 말씀해 주세요."
20044-30 = "조용히 운동할 곳을\n찾아볼까요……"
20044-40 = "카페는 음료를\n제공하는 곳이죠.\n그렇다면 저도……"
20044-50 = "특별 메뉴로\n프로틴 드링크를\n추가해 보는 것은……"
20044-60 = "음료수 필요하신 분,\n없으신가요?"
20044-70 = "여기라면\n근력 운동도\n문제없겠네요."
20044-80 = "어서 오세요.\n트레이너."
20044-90 = "방금 음료수 종류가 바뀌었는데,\n함께 드시지 않으시겠습니까?"
20044-100 = "안녕하세요. '선생님'.\n오늘 당번으로서 제가 할 일은,\n선생님의 활력과\n컨디션 관리입니다."
20044-110 = "수분이나 단백질이 모자라다는\n생각이 드시면.\n언제든지 말씀해 주세요."
20044-120 = "저는…… 포기하지 않는\n사람이 좋습니다."
20044-130 = "길을 이끌어 주는 사람,\n다시 한번 해보려는 사람\n말이죠."
20044-140 = "……그렇네요. 트레이너와\n일치하는 부분이 많다는 것은,\n우연이 아닐 거예요."
20044-150 = "목표를 세우는 것은\n중요하다고 생각합니다.\n거기에 다가갈 수 있도록,\n꾸준히 행동하는 것도요."
20044-160 = "괜찮습니다, 트레이너."
20044-170 = "시작하는 것만으로도,\n이미 절반은 이루어낸\n셈이니까요."
20044-180 = "이 옷을 입고\n아르바이트를 하다 보면.\n이상하리만치 저에게…… 응원을\n부탁하는 분들이 계시더군요."
20044-190 = "뭐, 사람에게 기운을 주는 것은,\n중요한 일이니까요."
20044-200 = "혹시 피곤하시다면,\n사양치 말고, 말씀해 주세요."
20044-210 = "스포츠 마사지에는\n자신이 있습니다."
20044-220 = "그리고 지금이라면 수분을\n빠르게 보충할 기능성 음료수도\n드릴 수 있으니까요."
20044-230 = "생일 축하드립니다, 트레이너."
20044-240 = "선물로 프로틴 드링크 한 통을\n드릴까 하는데, 어떠신가요?"
20044-250 = "'선생님'께 받는 축하라니……\n뭔가 간지러운 느낌이 드네요."
20044-260 = "그렇다면 축하해 주시는\n의미로, 저와 함께 활기찬\n스페셜 트레이닝을……"
20044-270 = "……흐음, 선물이라면\n프로틴 드링크를,\n종류별로 전부……"
20044-280 = "새해로군요.\n올 한 해도 건강하시길\n바랍니다."
20044-290 = "운동이나 마실 것이\n필요하시다면…… 아시죠? 후후."
20044-300 = "크리스마스로군요.\n살이 찌기 쉬운 날이기도 하죠."
20044-310 = "걱정하지 마세요.\n트레이너."
20044-320 = "지방은 곧 저장된 연료."
20044-330 = "더 활기찬 트레이닝을 위한\n힘의 원천입니다!"
20044-340 = "가, 갑자기 어디\n가시는 건가요?!"
20044-350 = "트레이너. 호박 맛 단백질 사탕\n어떠신가요?"
20044-360 = "물론 제가 특별 주문한\n것입니다."
20044-370 = "여전히 맛에는 그다지\n신경 쓰지 않았습니다만."
20044-380 = "영양 성분은 확실할 겁니다."
20044-400 = "수고하셨습니다.\n트레이너!"
20044-410 = "정말로, 멋진 달리기였습니다."
20044-420 = "자, 드십시오.\n제가 준비한 것입니다."
20044-430 = "네. 노력은\n보답받을 수\n있어야 합니다."
20044-440 = "제대로 보상이\n주어져야 하는 건,\n당연하니까요."
20044-450 = "물론, 세상 모든 것이……"
20044-460 = "노력에 비례한 평가를\n얻을 수는 없을 겁니다."
20044-470 = "그래도 저는……"
20044-480 = "노력한 사람은\n보답받았으면 좋겠다고,\n생각하고 있습니다."
20044-490 = "자, 어서 드셔주세요."
20044-500 = "저도 한잔하겠습니다."
20044-2600 = "여기까지 신경 써 주셔서 감사합니다. 트레이너.\n트레이닝부의 코치로서, 한층 정진하겠습니다.\n그러면 가시죠, 회원님! 한 세트 더!"

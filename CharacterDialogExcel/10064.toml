[translation]
10064-10 = "블루 아카이브."
10064-20 = "새해가 되었으니까,\n새 옷을 입은 것 뿐이야.\n올해도 잘 부탁할게, 선생."
10064-30 = "올해도……\n무사했으면 좋겠는데.\n……여러 가지로."
10064-40 = "하아……\n생각할 게 많네."
10064-50 = "진지하게 말하자면,\n바라는 것은 건강과 평화.\n정말로, 그것뿐이야."
10064-60 = "해결할 수 있는 일만,\n일어났으면 좋겠네."
10064-70 = "이 옷은\n제법 마음에 들어.\n나쁘지 않아."
10064-80 = "어서 와. 선생.\n새해 복 많이 받아."
10064-90 = "새해부터 일인가……\n선생도 큰일이네."
10064-100 = "아니, 왠지 남 일\n같지가 않아서."
10064-110 = "기모노를 입으니……\n한층 더 귀여워 보인다고?"
10064-120 = "하아…… 그런 마음에 없는\n소리 하지 마."
10064-130 = "후…… 놀리는 것도\n적당히 하라고, 선생."
10064-140 = "진심이라고……?\n이, 이제 괜찮으니까!"
10064-150 = "흥신소에 대해서는……\n걱정이라기 보다는,\n신경 쓰이는 정도."
10064-160 = "올해에는 아무 일\n없었으면 좋겠어."
10064-170 = "왜 그래, 선생?\n내 도움이 필요하다면,\n뭐든지 말해줘."
10064-180 = "의뢰가 아니더라도,\n선생님의 일이라면\n최선을 다할테니까……"
10064-190 = "아니, 역시 지금 말은\n못 들은 걸로.\n잊어버려."
10064-200 = "생일 축하해. 선생.\n받고 싶은 선물이라도 있어?"
10064-210 = "음반이라면 제법\n가지고 있지만."
10064-220 = "내…… 생일?"
10064-230 = "기억해 줬구나.\n선생에게 축하를 받는\n것도 나쁘지 않네."
10064-240 = "기뻐, 고마워."
10064-250 = "한 해가 밝았네.\n새해 복 많이 받아, 선생.\n올해도 좋은 한 해가 되기를."
10064-260 = "……나에게 세뱃돈을?\n굳이……?"
10064-270 = "크리스마스…… 인가.\n새해도 머지않았네."
10064-280 = "올 한 해는 어땠어?"
10064-290 = "할로윈……\n시끌시끌하네."
10064-300 = "이런 분위기,\n그렇게 싫어하지만은 않아."
10064-320 = "이제 곧 첫 차 시간이네."
10064-330 = "기대했던 소리는 아니지만……\n이것도 나쁘지 않아."
10064-340 = "1년에 한 번뿐인\n제야의 종소리와는 달리,"
10064-350 = "이 울림은 매일 아침마다\n울리는. 특별하지도\n않은 소리지만……"
10064-360 = "새해 첫 하루도\n매일 반복되는\n하루에 불과하니까."
10064-370 = "오늘이라는 날에 듣는 소리로는,\n이게 제일일지도 모르겠어."
10064-380 = "올해도 좋은\n한 해가 되기를."
10064-390 = "새해 복 많이 받아, 선생."
10064-2600 = "선생, 정말 괜찮겠어……?\n아니…… 아니지.\n걸어준 기대에 부응할 수 있도록 노력할게."

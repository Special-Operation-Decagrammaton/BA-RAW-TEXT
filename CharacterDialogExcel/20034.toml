[translation]
20034-10 = "Blue Archive ฮุฮุ"
20034-20 = "สิ้นปี... แล้วก็ปีใหม่ คำนี้ทำให้ใจเต้นจังเลยนะคะ\nถ้ามีอาหารอร่อยๆ ด้วยแล้ว ฉันก็ไม่ขออะไรเพิ่มแล้วค่ะ★"
20034-30 = "เมนูประจำวันของวันนี้\nจะเป็นอะไรนะคะ~?"
20034-40 = "การได้กินอาหารที่พิเศษ\nและใช้ช่วงเวลาที่งดงาม...\nเป็นสิ่งที่ยอดเยี่ยมเลยค่ะ★"
20034-50 = "วิดีโอกินแหลกนี่สุดยอดเลยค่ะ\nแค่ดูเฉยๆ ก็หิวขึ้นมาเลย"
20034-60 = "จำนวนการรีวิว\nสำคัญกว่าคะแนนรวมนะคะ"
20034-70 = "เห็นฉันอย่างนี้\nฉันก็ไม่ได้คิดแค่เรื่องกิน\nอย่างเดียวหรอกนะคะ"
20034-80 = "ตายจริง★ มาแล้วเหรอคะคุณครู"
20034-90 = "งั้นจากนี้ฉันจะบอกนะคะ\nว่าอยากกินอะไรบ้าง~"
20034-100 = "เชิญเลยค่ะ คุณครู★"
20034-110 = "ฉันรอคุณครู\nอยู่ตลอดเลยนะคะ~"
20034-120 = "ตั้งแต่เมื่อไหร่น่ะเหรอคะ?"
20034-130 = "เรื่องนั้นเป็นความลับค่ะ★"
20034-140 = "ฉันในชุดกิโมโนเป็นยังไงบ้างคะ~?"
20034-150 = "จะไม่ชมว่าฉันน่ารัก...\nหรืออะไรสักหน่อยเหรอคะ~?"
20034-160 = "ถ้าไปออกเดตกับฉันตอนนี้!\nจะเสีย 0 เยนนะคะ! กำไรเห็นๆ เลย~!"
20034-170 = "อ่า... สงสัยว่าฉันจะ\nโดดเรียนเหรอคะ?"
20034-180 = "คิดว่าฉันเป็นคนยังไงคะเนี่ย?\nแต่ก็... คิดถูกแล้วละค่ะ★"
20034-190 = "ฮุฮุ ถ้าได้อยู่ข้างๆ คุณครู\nฉันจะสนุกอย่างไม่รู้ตัวเลยค่ะ\nทำไมกันนะคะ~?"
20034-200 = "ฉัน... ขอคาดหวัง\nจากคุณครูได้มั้ยคะ~?"
20034-210 = "ตายจริง...\nมีคำตอบสองทางเลยนะคะ"
20034-220 = "ฉันอาจจะคาดหวัง\nเรื่องที่เหลวไหลก็ได้นะคะ... ฮุฮุ★"
20034-230 = "คะ? ฉันทำอะไรอยู่น่ะเหรอคะ?"
20034-240 = "ก็อย่างที่เห็นค่ะ ฉันกำลัง\nพิงคุณครูอยู่ไงคะ~"
20034-250 = "ฮุฮุ ไม่เอาค่ะ ฉันไม่ไปไหนหรอกค่ะ\nฉันชอบแบบนี้ค่ะ★"
20034-260 = "วันนี้วันเกิดคุณครูเหรอคะเนี่ย!\nฉันดีใจเหมือนวันเกิดตัวเองเลยค่ะ!"
20034-270 = "โอ๊ะ? ไม่หรอกค่ะ ฉันไม่ได้ตื่นเต้น\nเพราะอยากกินเค้กวันเกิด..."
20034-280 = "แต่ว่า... ก็เป็นอย่างนั้นแหละค่ะ★"
20034-290 = "ขอบคุณที่มาอวยพร\nวันเกิดนะคะคุณครู"
20034-300 = "ไหนๆ ก็มาอวยพรให้แล้ว~\nฉันขอสั่งเค้กเพิ่ม\nอีก 3 ก้อนได้มั้ยคะ~?"
20034-310 = "สวัสดีปีใหม่ค่ะ~★"
20034-320 = "เอาละ\nไปกินโอเซจิกันเถอะค่ะ!"
20034-330 = "ฉันจะขับรถให้เองค่ะ\nคุณครู รีบหน่อยค่ะ!"
20034-340 = "คริสต์มาส...\nสิ้นปี... ปีใหม่..."
20034-350 = "ฮุฮุ นี่เป็นช่วงที่\nฉันชอบมากๆ เลยค่ะ"
20034-360 = "ก็มันมีของอร่อยๆ\nเต็มไปหมดเลยยังไงล่ะคะ"
20034-370 = "ถ้าได้ลูกกวาด\nก็ห้ามแกล้งงั้นเหรอคะ?"
20034-380 = "ไม่ได้มีใครกำหนดไว้\nอย่างชัดเจนงั้นเหรอคะ?"
20034-390 = "ฉันจะเชื่อเรื่องที่\nพูดตอนนี้จริงๆ นะคะ..."
20034-400 = "ฮุฮุฮุ...★"
20034-420 = "ฮู่ว... ต้องออกแรง\nมากกว่าที่คิดนะคะเนี่ย"
20034-430 = "ไม่เป็นไรค่ะ คุณครู\nฉันยังไหวค่ะ"
20034-440 = "ดีใจจังเลยค่ะที่เป็นห่วง...\nแต่ก็อยากรู้จังเลยนะคะ\nว่าจะออกมาเป็นยังไง"
20034-450 = "จะได้โมจิแบบไหน"
20034-460 = "และโมจินั้นจะเอาไป\nทำอาหารอะไรได้บ้าง..."
20034-470 = "พอคิดว่าจะได้กินสิ่งนั้น\nกับคุณครู..."
20034-480 = "เอ่อ... คุณครูคะ?"
20034-490 = "ถ้าทำโมจิเสร็จแล้ว\nฉันอยากให้คุณครูชิมก่อน\nจะได้รึเปล่าคะ?"
20034-2600 = "ว้าว~! ขอบคุณค่ะ★\nสิ่งนี้น่าจะทำให้ปลิวได้หมดเลยนะคะ!\nฮุฮุฮุ... ไม่เป็นไรหรอกค่ะคุณครู\nฉันจะควบคุมให้ดีค่ะ★"

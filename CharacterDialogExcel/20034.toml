[translation]
20034-10 = "Blue Archive. Heehee."
20034-20 = "The end of one year...and the start of another. Just thinking about that makes my heart skip a beat. And if there are delicious dishes? Ah, it's perfect! ★"
20034-30 = "I wonder what's on the menu today?"
20034-40 = "Good times, good food... Isn't it amazing? ★"
20034-50 = "Viral food videos are incredible! They do make me hungry though..."
20034-60 = "The number of reviews is more important than the rating!"
20034-70 = "Hey, I don't JUST think about food, you know?"
20034-80 = "Oh my! Sensei's here! ★"
20034-90 = "All right, here's what I'm thinking for lunch!"
20034-100 = "Welcome, Sensei! ★"
20034-110 = "I've been waiting so patiently, Sensei."
20034-120 = "For how long, you ask?"
20034-130 = "That's a secret. ★"
20034-140 = "How do I look in my new kimono?"
20034-150 = "Aren't you going to say I'm cute? Or dazzling? Something like that?"
20034-160 = "It's a special offer! Lunch with me! For the low, low price of zero yen! What a steal!"
20034-170 = "Whaaat? You think I'm just trying to play hooky?"
20034-180 = "Just who do you think I am? ...That's the right answer! ★"
20034-190 = "Heehee, when I'm with you, I feel light as a cloud. Why is that?"
20034-200 = "Can I count on you, Sensei?"
20034-210 = "...Oh dear. That was such a quick response."
20034-220 = "Maybe I'm expecting something totally absurd, though? Heehee. ★"
20034-230 = "Huh? What am I up to?"
20034-240 = "As you can see, I'm using you as a pillar of support!"
20034-250 = "No. I'm not moving from this spot. I like where I am right now. ★"
20034-260 = "It's your birthday, Sensei! I'm so happy, it might as well be mine!"
20034-270 = "Oh dear! It's not because I'm excited for birthday cake... Not all!"
20034-280 = "...Okay... That's exactly it! ★"
20034-290 = "Thanks for the birthday wishes, Sensei."
20034-300 = "While we're on the subject... May I have three whole cakes, please?"
20034-310 = "Have a Happy New Year! ★"
20034-320 = "Now, let's go eat some osechi!"
20034-330 = "I'll drive! Hurry up now, Sensei!"
20034-340 = "Christmas to New Year's..."
20034-350 = "Heehee, it's truly my favorite season!"
20034-360 = "Because it's filled with delicious things!"
20034-370 = "Am I not allowed to pull a trick even after I get a treat?"
20034-380 = "...There aren't any rules about that?"
20034-390 = "Be careful, I might just take your word for it..."
20034-400 = "Heeheehee... ★"
20034-420 = "*sigh*... Turns out this needs more muscle than I expected."
20034-430 = "That's all right, Sensei. I can keep going."
20034-440 = "I appreciate your concern... But how could I not feel excited?"
20034-450 = "What kind of mochi will we make?"
20034-460 = "What kind of new dishes can be made with it?"
20034-470 = "...And then, I get to share all of those meals with you..."
20034-480 = "...Um, Sensei?"
20034-490 = "Would you do me the honor of taking the first bite of my mochi when it's done? Is that all right?"
20034-2600 = "Wow! Thank you so much! With this, I can blow everything away! Heehee... Just kidding, Sensei. I'll behave. ★"

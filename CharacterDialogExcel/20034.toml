[translation]
20034-10 = "블루 아카이브. 후훗."
20034-20 = "연말…… 그리고 새해. 말의 울림에 가슴이 뛰네요.\n거기에 맛있는 요리가 있으면, 더할 나위 없을 거고요★"
20034-30 = "오늘의 일일 메뉴는\n무엇일까요~?"
20034-40 = "특별한 요리를 먹고, \n멋진 시간을 보낸다…\n얼마나 멋진 일인가요★"
20034-50 = "바이럴의 힘은 굉장해요.\n보고 있기만 해도\n배고파지거든요."
20034-60 = "평점보다 리뷰 수가\n더 중요한데요?"
20034-70 = "저라고 해서 언제나\n먹는 것만 생각하는 건\n아니거든요?"
20034-80 = "어머★ 오셨군요, 선생님."
20034-90 = "그럼 지금부터 먹고 싶은 걸\n말씀드릴게요~"
20034-100 = "어서 오세요, 선생님★"
20034-110 = "계~속, 선생님을\n기다리고 있었어요."
20034-120 = "언제부터냐고요?"
20034-130 = "그건 비밀이에요★"
20034-140 = "어때요~? 제 기모노 차림."
20034-150 = "귀엽다고 말하고 싶어진다거나……\n그러지 않으신가요~?"
20034-160 = "지금이라면! 저와의 데이트가!\n무려 0엔! 이득이에요~!"
20034-170 = "……아, 땡땡이치려는 건 아닌지\n의심하고 계신 거죠?"
20034-180 = "저를 어떻게 생각하고\n계신 건가요? ……정답입니다★"
20034-190 = "후훗, 선생님 옆에 있으면, \n저도 모르게 즐거워져요.\n왜 그럴까요~?"
20034-200 = "저, 선생님께 기대해도, 될까요~?"
20034-210 = "……어머나, 두 개의 대답이라니."
20034-220 = "터무니없는걸, 기대할지도\n모르는데……? 후훗★"
20034-230 = "네? 뭐 하냐고요?"
20034-240 = "보시다시피, 선생님께\n기대고 있는데요~?"
20034-250 = "훗, 싫어요, 떠나지 않을 거예요,\n이대로가 좋아요★"
20034-260 = "생일이시네요, 선생님!\n제 일처럼 기뻐요!"
20034-270 = "어머? 아뇨, 결코 생일 케이크가\n기대가 돼서 그런 건……"
20034-280 = "……맞아요★"
20034-290 = "생일 축하, 감사합니다,\n선생님."
20034-300 = "그럼 축하해주신 김에~\n홀 케이크 3개 더,\n부탁드려도 될까요~?"
20034-310 = "새해 복 많이 받으세요~★"
20034-320 = "자, 오세치 먹으러 가요!"
20034-330 = "운전은 제가 할게요.\n선생님, 서둘러 주세요!"
20034-340 = "크리스마스......\n연말.... 연초......"
20034-350 = "후훗, 제가 정말\n좋아하는 시즌이에요."
20034-360 = "왜냐면, 맛있는 게\n가득하거든요!"
20034-370 = "과자를 받으면,\n장난치면 안 되는 것일까요?"
20034-380 = "……딱히 그러라는\n법은 없다고요?"
20034-390 = "지금 이야기……\n진짜로 믿어버릴 거예요……?"
20034-400 = "후후후……★"
20034-420 = "휴…… 생각보다,\n힘이 필요하네요."
20034-430 = "괜찮답니다. 선생님.\n더 할 수 있어요."
20034-440 = "걱정해 주셔서 기뻐요……\n하지만 역시, 기대되는 건\n어쩔 수 없네요."
20034-450 = "어떤 떡이 만들어질지."
20034-460 = "그걸로 어떤 음식을\n만들 수 있을지……"
20034-470 = "……그걸, 선생님과 함께\n먹을 수 있다고 생각하면……"
20034-480 = "……저기, 선생님?"
20034-490 = "떡이 만들어지면, 먼저\n먹어 주셨으면 좋겠어요.\n괜찮으시죠?"
20034-2600 = "와아~! 감사합니다★\n이걸로 전~부, 날려버릴 수 있겠네요!\n후훗…… 괜찮아요, 선생님. 잘 조절할 테니까요★"

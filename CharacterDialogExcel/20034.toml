[translation]
20034-10 = "蔚藍檔案。呵呵。"
20034-20 = "年末……以及新年。\n話語的共鳴真是讓人心胸澎湃呢。\n要是再加上好吃的料理就更無可挑剔了★"
20034-30 = "今天的每日菜單\n是什麼呢～？"
20034-40 = "吃著特別的料理，\n度過美好的時光……\n多麼美妙呀★"
20034-50 = "病毒式行銷的力量很強。\n光是看著都感覺肚子餓了呢。"
20034-60 = "比起評下的分數，\n評論的數量更重要哦？"
20034-70 = "就算是我，也不是\n隨時只想著食物的唷～？"
20034-80 = "哎呀★你來了呢，老師。"
20034-90 = "那麼，我現在就把\n想吃的東西告訴你囉～"
20034-100 = "歡迎回來，老師★"
20034-110 = "我一～直，\n在等著老師。"
20034-120 = "從什麼時候是嗎？"
20034-130 = "那是祕密★"
20034-140 = "怎麼樣呀～？\n我穿和服的樣子。"
20034-150 = "想說好可愛之類的……\n有沒有這種感覺～？"
20034-160 = "現在的話！與我一起約會！\n竟然只要0元！買到賺到唷～！"
20034-170 = "……啊，你懷疑我\n是不是想趁機偷懶？"
20034-180 = "你覺得我會是那種人嗎？\n……答對了★"
20034-190 = "呵呵，只要在老師身旁，\n就會不由得興奮起來。\n究竟是為什麼呢～？"
20034-200 = "我，可以期待一下老師嗎～？"
20034-210 = "……哎呀，居然秒答。"
20034-220 = "這樣可能會讓我，\n期待一些荒唐的事哦……？\n呵呵★"
20034-230 = "咦？問我在做什麼？"
20034-240 = "如你所見，正在\n靠著老師唷～？"
20034-250 = "呵呵，不要，我不會離開，\n我就喜歡這樣★"
20034-260 = "是你的生日呢，老師！\n就像我自己的事一樣高興！"
20034-270 = "哎呀？不是唷，\n絕不是因為生日蛋糕\n才那麼期待……"
20034-280 = "……其實沒錯★"
20034-290 = "謝謝你的生日祝福，老師。"
20034-300 = "那就藉著為我祝福的機會～\n再多給我3個蛋糕可以嗎～？"
20034-310 = "新年快樂～★"
20034-320 = "來，去吃御節料理吧！"
20034-330 = "開車就交給我。\n老師，請趕快！"
20034-340 = "聖誕節……\n除夕……跨年……"
20034-350 = "呵呵，是我\n非常喜歡的時期。"
20034-360 = "畢竟，會有很多\n好吃的東西嘛！"
20034-370 = "收到點心的話，\n就不能惡作劇了嗎？"
20034-380 = "……其實也\n沒有那種規定？"
20034-390 = "剛才說的話……\n我會當真的唷……？"
20034-400 = "呵呵呵……★"
20034-420 = "呼……比想像中，\n還需要力氣呢。"
20034-430 = "沒事的唷，老師。\n我還能繼續。"
20034-440 = "很高興你能擔心我……可是\n我果然，還是期待得不得了。"
20034-450 = "會做出什麼樣的年糕……"
20034-460 = "能用它做出\n什麼樣的料理……"
20034-470 = "……一想到……\n能和老師一起享用……"
20034-480 = "……那個，老師？"
20034-490 = "年糕做好之後，\n希望老師能最先品嘗。\n可以吧？"
20034-2600 = "哇啊～！非常感謝★\n用這個就可以把全～部都炸飛了！\n呵呵……不用擔心的唷，老師。\n我會好好控制的★"

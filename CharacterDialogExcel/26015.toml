[translation]
26015-10 = "Blue Archive!"
26015-20 = "Ta-da! Guess who? It's Ichika! I never expected to be at the beach with you, but life sure is full of surprises. I'm looking forward to our continued collaboration!"
26015-30 = "Ah, nice... Finally, a breather..."
26015-40 = "Am I overdressed...?"
26015-50 = "Hmm... Maybe I should do something..."
26015-60 = "Wow... Everyone's really shining..."
26015-70 = "There are all kinds of people here."
26015-80 = "Ah, Sensei! I've been waiting for you!"
26015-90 = "Let's get this done, so we can go to the beach!"
26015-100 = "Welcome, Sensei!"
26015-110 = "I organized some paperwork while I was waiting!"
26015-120 = "Hm? Oh, it was nothing!"
26015-130 = "Oh, my..."
26015-140 = "Even at the beach, my job doesn't change, huh?"
26015-150 = "Ah, you feel the same way, Sensei?"
26015-160 = "That's just life, sometimes!"
26015-170 = "Ah, these sunglasses?"
26015-180 = "I wanted to try out some beach fashion... It's not my usual style, huh?"
26015-190 = "Ah, I look...pretty?"
26015-200 = "Really? Heehee, your compliment make me glad I wore it!"
26015-210 = "Mmm... What needs to get done next?"
26015-220 = "Whatever I want to do?"
26015-230 = "...Now that one's a tall order."
26015-240 = "Whoa, that's a lot of work..."
26015-250 = "You're consistently diligent, Sensei."
26015-260 = "Ah, if you ever need a hand, just call me, okay?"
26015-270 = "Sensei! Do you want me to brew you a cup of black tea?"
26015-280 = "I learned from one of my seniors!"
26015-290 = "Happy birthday, Sensei!"
26015-300 = "Fufufu. I wanted to be the first one to say it to you!"
26015-310 = "Anyways, do you happen to have any plans for today...?"
26015-320 = "Ah, work... Figures."
26015-330 = "That just means we have to get this done fast!"
26015-340 = "If we work together, it'll be done in no time!"
26015-350 = "Oh! Um... Today IS my birthday..."
26015-360 = "...but did you come all this way just for that?"
26015-370 = "...Heh, I'm a little embarrassed."
26015-380 = "Happy New Year, Sensei!"
26015-390 = "Haha, last year was really eventful, wasn't it?"
26015-400 = "Oh. Talking about last year during New Year's is a bit..."
26015-410 = "How about this: I'm looking forward to another year together, Sensei!"
26015-420 = "Ah, Sensei! I've been looking for you!"
26015-430 = "Fufu, are you surprised? I worked really hard to get all my work done early."
26015-440 = "Why? Um..."
26015-450 = "Anyways, that means I'm totally free! "
26015-460 = "Merry Christmas to me!"
26015-470 = "And that means you have to hang out with me today! Heehee!"
26015-480 = "Hm? What's the candy for?"
26015-490 = "Ah, this isn't a costume though."
26015-500 = "But... Nom."
26015-510 = "I ate it already, so you can't have it back! Heehee."
26015-530 = "Do you perhaps have the wrong idea about us?"
26015-540 = "Do you know how dangerous this cute, delicate Trinity lady can be?"
26015-550 = "The Justice Task Force takes care of Trinity's toughest jobs."
26015-560 = "You've seen how we all wear chokers. What if I told you that it's actually...a collar?"
26015-570 = "There's only one reason you'd put a collar on someone."
26015-580 = "Since you're smart, Sensei, I'm sure I don't have to spell it out for you."
26015-590 = "And I also shouldn't have to explain what happens when that collar..."
26015-600 = "...comes off, right?"
26015-610 = "...Sorry. My little joke went too far."
26015-620 = "But this is why you shouldn't make such thoughtless promises."
26015-630 = "What would you have done if I was actually a dangerous person?"
26015-640 = "Haha. This is for your eyes only, Sensei. So..."
26015-650 = "We're taking this little incident to the grave, okay?"
26015-2600 = "Oh! Um... I'll do my best to meet your expectations, but don't complain if I fall short, okay? You're the one who's made me more serious, after all."

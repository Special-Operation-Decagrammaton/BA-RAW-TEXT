[translation]
26015-10 = "블루 아카이브임다~"
26015-20 = "짜잔! 이번에야말로, 이치카, 등장임다~\n선생님과 함께 바다까지 올 줄은 몰랐는데, 살다 보니 별일이 다 있네요. 여기서도 잘 부탁드림다!"
26015-30 = "아, 좋다……\n겨우 한숨 돌렸네~"
26015-40 = "살짝 과하게\n멋부렸나……?"
26015-50 = "음~뭐라도\n해야 하지 않을까……."
26015-60 = "이야~ 다들\n반짝반짝하네요~"
26015-70 = "다양한 사람들이\n있네요~"
26015-80 = "아, 선생님이다~\n기다렸슴다!"
26015-90 = "착착 일 끝내버리고,\n바다에 가는검다!"
26015-100 = "어서 오십쇼, 선생님!"
26015-110 = "기다리는 동안\n서류 정리해 두고 있었슴다."
26015-120 = "네? 에이,\n이런 거 가지고 뭘요~"
26015-130 = "어째~"
26015-140 = "바다에서도 하는 일은\n비슷한 거 같네요~"
26015-150 = "아, 선생님도 비슷함까?"
26015-160 = "인생이 다 그런가 봄다."
26015-170 = "아, 이 선글라스 말임까?"
26015-180 = "바다에 온다고\n살짝 멋 부려봤는데……\n역시 안 어울림까?"
26015-190 = "아, 예쁘다고…… 요?"
26015-200 = "그렇습니까…… 후훗!\n선생님께 칭찬도 듣고,\n쓰고 오길 잘했네요!"
26015-210 = "음……\n저는 뭘 하고 있으면 됩니까?"
26015-220 = "하고 싶은 걸 하라고요?"
26015-230 = "……그게 제일 어렵지 말임다."
26015-240 = "우와, 일이 잔뜩……."
26015-250 = "선생님도 매일 참 성실하심다."
26015-260 = "혹시 제 도움이 필요하면\n아무 때나 불러주십쇼!"
26015-270 = "아, 선생님~\n혹시 홍차 한 잔 어떠심까?"
26015-280 = "실은, 선배님께 조금 배워서요~"
26015-290 = "선생님, 생신 축하드림다!"
26015-300 = "후후후. 가장 먼저 축하드리려고\n기다리고 있었슴다!"
26015-310 = "그나저나,\n이후에 혹시 일정이……."
26015-320 = "아~ 뭐 알고 있었습니다.\n……일이지요."
26015-330 = "그럼, 빨리 끝내버리죠!"
26015-340 = "괜찮아요,\n둘이서 같이 하면 금방이니까요!"
26015-350 = "어, 음……\n오늘이 제 생일이 맞긴 한데요."
26015-360 = "설마 그거 때문에\n일부러 찾아주신 겁니까?"
26015-370 = "……이야, 조금 부끄럽네요."
26015-380 = "새해 복 많이 받으십쇼,\n선생님!"
26015-390 = "이야, 작년은 정말이지,\n다사다난했네요~"
26015-400 = "아차.\n설부터 작년 얘기는\n좀 그렇네요."
26015-410 = "대신에,\n올 한 해도 잘 부탁드림다!"
26015-420 = "아, 선생님! 찾았슴다!"
26015-430 = "후후, 놀라셨슴까?\n올해는 조금 무리해서,\n미리 일을 다 끝내서요."
26015-440 = "왜냐고요? 음……."
26015-450 = "그보다,\n지금 저는 완전 프리, "
26015-460 = "메리 크리스마스 이치카임다!"
26015-470 = "그런고로, 오늘 하루,\n저랑 쭉 어울려 주셔야겠슴다!\n히히!"
26015-480 = "네? 갑자기 웬 사탕임까?"
26015-490 = "아~ 이 모습은\n분장이 아니지만 말임다~"
26015-500 = "그래도, ……냠."
26015-510 = "먹어버렸으니\n이제 돌려줄 수도 없슴다,\n히히."
26015-530 = "혹시 멋대로 착각하고\n계신 거 아닙니까?"
26015-540 = "아무리 위험해 봐야,\n온실 속의 귀여운 트리니티 아가씨라고."
26015-550 = "저희 정의실현부는,\n트리니티에서 거친 일을 도맡죠."
26015-560 = "다들 차고 다니지 않습니까, 초커.\n그게, 실은 '목줄'이라 하면……\n어떻습니까?"
26015-570 = "무언가에 목줄을 채우는 이유는\n하나밖에 없죠."
26015-580 = "현명한 선생님께서는,\n말하지 않아도 아시겠죠."
26015-590 = "그렇다면 목줄이 풀렸을 때,\n어떤 일이 일어나는지도……"
26015-600 = "물론, 아시겠죠?"
26015-610 = "……죄송해요.\n장난이 너무 심했네요."
26015-620 = "그러니까, 왜 그리 안일한 약속을\n하고 그러십니까?"
26015-630 = "만약 제가 정말로\n위험한 사람이었으면,\n어떻게 하시려고요?"
26015-640 = "하하. 선생님 앞에서만요.\n그러니까……"
26015-650 = "오늘 일은, 둘이서\n무덤까지 가져가는 검다?"
26015-2600 = "어, 음…… 최선을 다해볼게요.\n기대에 조금 못 미쳐도,\n 뭐라 하기 없기임다?\n절 진지하게 만든 건 선생님이시니까요."

[translation]
26015-10 = "蔚藍檔案的說～"
26015-20 = "鏘鏘！一花登場！\n沒想到能跟老師一起來海邊呢～\n這次也請多指教唷！"
26015-30 = "呼……終於能\n喘口氣了呢……"
26015-40 = "這副打扮……\n會不會用力過猛呢？"
26015-50 = "閒著的話……\n也有點坐立難安呢……"
26015-60 = "哎呀～\n大家都閃閃發光呢～"
26015-70 = "大家都很有個性呢～"
26015-80 = "啊！老師！\n我在等你唷～"
26015-90 = "速速把工作搞定，\n到海邊去吧！"
26015-100 = "老師，歡迎回來！"
26015-110 = "文件的分類，\n我已經處理好了唷。"
26015-120 = "哪裡哪裡，\n也沒什麼大不了的啦。"
26015-130 = "唉……到頭來……"
26015-140 = "就算來到海邊，\n做的事情還是跟平常\n沒什麼兩樣呢～"
26015-150 = "啊，老師也是嗎？"
26015-160 = "果然就是這樣呢～"
26015-170 = "嗯？\n……好奇這副太陽眼鏡嗎？"
26015-180 = "聽說要去海邊，\n我特地打扮了一下……\n覺得……怎麼樣呢？"
26015-190 = "咦……可，可愛……"
26015-200 = "是……是嗎。\n呵呵，看來戴上它\n是值得的呢～！"
26015-210 = "那個……老師，\n我該做什麼呢？"
26015-220 = "你說隨我高興……"
26015-230 = "這種時候反而才是\n最困難的呢……"
26015-240 = "哇，文件都堆成山了……"
26015-250 = "能不丟下這麼多工作，\n我覺得很帥氣唷。"
26015-260 = "有困難的時候，\n隨時可以跟我說！"
26015-270 = "工作的時候，\n要不要來杯紅茶呀？"
26015-280 = "其實前陣子，\n我跟前輩學了\n泡茶的方法唷～"
26015-290 = "老師！\n生日快樂！"
26015-300 = "我想最先祝福老師，\n所以一直在等……"
26015-310 = "順帶一提，\n接下來的行程……"
26015-320 = "啊，是。\n其實我也知道。\n是工作對吧……"
26015-330 = "那麼，趕緊把它搞定吧！"
26015-340 = "沒問題，兩個人\n做起來很快的！"
26015-350 = "那個……雖然今天\n的確是我的生日沒錯……"
26015-360 = "啊，咦……\n你記得嗎……？"
26015-370 = "哎呀，啊哈哈。\n這個……效果顯著呢……"
26015-380 = "新年快樂～！"
26015-390 = "哎呀～去年發生了好多事，\n真不容易呢～"
26015-400 = "唉唷，剛過新年\n就在抱怨不太好呢。"
26015-410 = "那麼，今年也請多指教，老師！"
26015-420 = "老師，還有工作沒做完嗎？"
26015-430 = "我呢，是把實現正義部的工作\n全部處理完才過來的……"
26015-440 = "問我為什麼，\n那是因為……"
26015-450 = "那種事情，\n就別在意了嘛。"
26015-460 = "總之，今天的我\n可是很閒的哦。"
26015-470 = "我就把「幫忙」當成禮物吧。\n老師給的禮物，我也很期待唷！"
26015-480 = "糖果……？\n要給我嗎？"
26015-490 = "啊！是萬聖節對吧！\n哎呀，這副打扮，\n其實不是變裝的說……"
26015-500 = "不過，糖果我就收下了。\n……啊呣。"
26015-510 = "我已經吃掉了，\n所以沒辦法還你了哦。"
26015-530 = "你是不是對我\n有所誤會？"
26015-540 = "因為是三一的學生，\n就認定我是溫室裡長大、\n心地善良的大小姐。"
26015-550 = "實現正義部，\n可是將三一的戰鬥事務\n一手包辦的集團哦？"
26015-560 = "我從不離身的頸鍊……\n如果我說那其實\n是「項圈」的話……\n你會怎麼想呢？"
26015-570 = "為某樣東西戴上\n「項圈」的理由只有一個。"
26015-580 = "我想敏銳的老師，\n應該明白吧。"
26015-590 = "而當那個「項圈」\n被解開的時候，\n會發生什麼事情──"
26015-600 = "你應該，能想像出來吧？"
26015-610 = "……啊，抱歉。\n有點過頭了吧。"
26015-620 = "有學到教訓的話，\n就別再亂說話了唷？"
26015-630 = "要是我真的是個危險的傢伙，\n你打算怎麼辦呢？"
26015-640 = "哈哈，嗯……\n這種事情只會在\n老師面前做啦。\n還有……"
26015-650 = "今天的事，\n要帶到墳墓裡去哦。\n我們兩個人一起。"
26015-2600 = "那個……好吧，我會盡力的。\n就算無法符合期待，\n也不可以抱怨唷？\n讓我認真起來的人，可是老師你呢。"

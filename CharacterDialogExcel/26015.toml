[translation]
26015-10 = "Blue Archive ค่ะ~"
26015-20 = "ท้าดา! ถึงเวลาอิจิกะปรากฏตัวค่ะ~\nไม่คิดเลยว่าจะได้มาทะเลกับคุณครู ชีวิตช่างเต็มไปด้วย\nเรื่องไม่คาดคิดนะคะ อยู่ที่นี่ฉันก็ขอฝากตัวด้วยนะคะ!"
26015-30 = "อ่า ดีจังเลย...\nได้หายใจหายคอบ้างแล้ว~"
26015-40 = "ทำตัวเวอร์เกินไป\nหน่อยหรือเปล่านะ..."
26015-50 = "อืม~ น่าจะต้อง\nหาอะไรทำสักหน่อยนะ..."
26015-60 = "ว้าว~ ทุกคนดู\nสดใสกันจังเลยนะคะ~"
26015-70 = "มีคนมากมาย\nหลายแบบเลยค่ะ~"
26015-80 = "อ๊ะ คุณครูนี่นา~\nฉันกำลังรออยู่เลยค่ะ!"
26015-90 = "รีบทำงานให้เสร็จ\nแล้วไปทะเลกันค่ะ!"
26015-100 = "เชิญค่ะ คุณครู!"
26015-110 = "ระหว่างที่รอ\nฉันจัดเอกสารไว้ให้ค่ะ"
26015-120 = "คะ? ไม่หรอก\nนี่แค่เรื่องจิ๊บจ๊อยค่ะ~"
26015-130 = "ทำไมนะ~"
26015-140 = "ต่อให้มาทะเล แต่งานที่ทำ\nก็คล้ายๆ ของเดิมเลยนะคะ~"
26015-150 = "อ๊ะ ของคุณครูก็คล้ายกันเหรอคะ?"
26015-160 = "ทุกคนคงมีชีวิตแบบนั้นหมดสินะคะ"
26015-170 = "อ๊ะ แว่นกันแดดอันนี้น่ะเหรอคะ?"
26015-180 = "พอได้มาทะเล ฉันก็เลย\nอยากติดเท่สักหน่อย...\nมันไม่เข้ากับฉันเหรอคะ?"
26015-190 = "อ๊ะ สวยดีเหรอ... คะ?"
26015-200 = "งั้นเหรอคะ... ฮุฮุ!\nได้คำชมจากคุณครูด้วย\nดีจังเลยนะคะที่พกมาด้วยน่ะ!"
26015-210 = "อืม...\nให้ฉันทำอะไรดีคะ?"
26015-220 = "ทำในสิ่งที่อยากทำงั้นเหรอคะ?"
26015-230 = "แบบนั้นมันยากที่สุดเลยค่ะ..."
26015-240 = "ว้าว งานเพียบเลย..."
26015-250 = "คุณครูก็ขยันทุกวันเลยนะคะ"
26015-260 = "ถ้าอยากให้ฉันช่วยอะไร\nก็เรียกหาได้ตลอดเลยนะคะ!"
26015-270 = "อ๊ะ คุณครู~\nรับชาแดงสักถ้วยมั้ยคะ?"
26015-280 = "ที่จริงฉันเรียนจากรุ่นพี่มานิดหน่อยน่ะค่ะ~"
26015-290 = "คุณครู สุขสันต์วันเกิดค่ะ!"
26015-300 = "ฮุฮุฮุ ฉันอยากอวยพรเป็นคนแรก\nก็เลยมารออยู่ค่ะ!"
26015-310 = "จะว่าไป\nหลังจากนี้คุณครูว่างหรือเปล่า..."
26015-320 = "อ่า~ ฉันรู้ค่ะ\nมีงานใช่มั้ยล่ะคะ..."
26015-330 = "งั้นก็รีบทำให้เสร็จนะคะ!"
26015-340 = "ไม่เป็นไรค่ะ\n2 คนช่วยกันแป๊บเดียวก็เสร็จค่ะ!"
26015-350 = "อ่า... อืม...\nวันนี้เป็นวันเกิดของฉันก็จริง"
26015-360 = "คุณครูตั้งใจมาหาฉัน\nก็เพราะเรื่องนั้นเหรอคะ?"
26015-370 = "อ่า รู้สึกเขินนิดหน่อยนะคะ..."
26015-380 = "สวัสดีปีใหม่ค่ะ\nคุณครู!"
26015-390 = "อ่า ปีที่แล้วน่ะ\nเกิดเรื่องราวมากมายเลยนะคะ~  "
26015-400 = "จริงสิ\nไม่น่าชวนคุยเรื่องปีที่แล้ว\nตั้งแต่ตอนปีใหม่เลยค่ะ"
26015-410 = "งั้นเอาเป็นว่า\nปีนี้ฉันก็ขอฝากตัวด้วยนะคะ!"
26015-420 = "อ๊ะ คุณครู! ฉันกำลังหาตัวอยู่เลยค่ะ!"
26015-430 = "ฮุฮุ ตกใจเหรอคะ?\nปีนี้ฉันโหมงานนิดหน่อย\nก็เลยทำงานทั้งหมดเสร็จล่วงหน้าค่ะ"
26015-440 = "ทำไมน่ะเหรอคะ? อืม..."
26015-450 = "ที่สำคัญกว่านั้นก็คือ\nตอนนี้ฉันว่างมากๆ เลยละค่ะ "
26015-460 = "เมอร์รี คริสต์มาสค่ะ!"
26015-470 = "วันนี้ต้องอยู่\nกับฉันตลอดทั้งวันนะคะ! ฮิฮิ!"
26015-480 = "คะ? ทำไมจู่ๆ ก็ให้ลูกกวาดคะ?"
26015-490 = "อ่า~ แต่นี่ฉันไม่ได้\nแต่งคอสเพลย์อยู่นะคะ~"
26015-500 = "แต่ยังไงก็... ง่ำ"
26015-510 = "ในเมื่อกินไปแล้ว\nคงคืนให้ไม่ได้แล้วค่ะ ฮิฮิ"
26015-530 = "เข้าใจผิดไปเอง\nตามอำเภอใจอยู่หรือเปล่าคะ?"
26015-540 = "ต่อให้จะอันตรายแค่ไหน\nฉันก็เป็นสาวทรีนิตี้\nในเรือนกระจกที่น่ารักอยู่ดีนะ"
26015-550 = "ชมรมทวงความยุติธรรมของเรา\nต้องทำงานยากๆ ในทรีนิตี้ค่ะ"
26015-560 = "สิ่งที่ทุกคนห้อยคอไว้ โชกเกอร์น่ะค่ะ\nถ้าบอกว่าที่จริงมันคือ 'สายจูง'...\nจะว่ายังไงเหรอคะ?"
26015-570 = "เหตุผลที่เราใส่สายจูงกับบางอย่าง\nมีเพียงข้อเดียวค่ะ"
26015-580 = "คนที่หลักแหลมอย่างคุณครู\nต่อให้ไม่บอกก็น่าจะรู้นะคะ"
26015-590 = "งั้นถ้าถอดสายจูงออก\nก็อาจเกิดเรื่องอะไรขึ้นมาก็ได้นะ..."
26015-600 = "แน่นอนว่าคุณครูก็รู้ใช่มั้ยคะ?"
26015-610 = "ขอโทษค่ะ...\nฉันแกล้งแรงไปหน่อยนะคะ"
26015-620 = "แต่ในเมื่อรู้แล้ว ทำไมถึงกล้า\nสัญญาอะไรง่ายๆ แบบนั้นล่ะคะ?"
26015-630 = "ถ้าเกิดฉันเป็น\nคนอันตรายขึ้นมาจริงๆ\nแล้วจะรับมือยังไงคะ?"
26015-640 = "แหะๆ แค่ตอนที่อยู่ต่อหน้าคุณครู\nเท่านั้นค่ะ เพราะงั้น..."
26015-650 = "เรื่องวันนี้ให้เป็นความลับของเรา 2 คน\nจนเราเป็นปุ๋ยกันเลยนะคะ?"
26015-2600 = "อ่า อืม... ฉันจะพยายามเต็มที่ค่ะ\nถ้าทำไม่ได้เท่าที่คาดหวัง\nก็อย่าว่ากันนะคะ?\nก็คนที่ทำให้ฉันจริงจังคือคุณครูนี่คะ"

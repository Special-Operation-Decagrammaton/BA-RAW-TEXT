[translation]
20040-10 = "Blue Archive~"
20040-20 = "ไง~ รออยู่ใช่มั้ย ครู?\nฉันเคียวโงคุ ซัตสึกิ หัวหน้าฝ่ายข่าวกรอง\nแห่งแพนเดโมเนียม โซไซตี้ ฮุฮุฮุ ฝากตัวด้วยนะ"
20040-30 = "ลองเก็บข้อมูล\nจากชาเล่ต์ดีมั้ยนะ?"
20040-40 = "อื้ม~ ความรู้สึกแบบนี้?\nก็ไม่เลวแฮะ"
20040-50 = "ให้เด็กพวกนั้น\nแทรกซึมเข้ามาที่นี่..."
20040-60 = "อยากรู้เคล็ดลับ\nการสอบสวนของ\nโรงเรียนอื่นจัง..."
20040-70 = "ไม่มีใครที่จะมาเป็น\nคู่ฝึกซ้อมวิชาสะกดจิต\nเลยหรือไงนะ?"
20040-80 = "สวัสดี ครู\nวันนี้ถึงคิวฉันเข้าเวรแล้ว ฮุฮุ"
20040-90 = "ครูคือหนึ่งในผู้ร่วมมือของ\nแพนเดโมเนียม โซไซตี้"
20040-100 = "ใช้โอกาสนี้\nสังเกตอย่างใจเย็นดีมั้ยนะ? ฮุฮุ"
20040-110 = "ตายจริง? คิดว่าฉันเป็นใครงั้นเหรอ?"
20040-120 = "งานของชาเล่ต์น่ะ\nฉันจะทำให้เสร็จในพริบตาเลย"
20040-130 = "เคียวโงคุ ซัตสึกิ\nคือหัวหน้าฝ่ายข่าวกรองแห่ง\nแพนเดโมเนียม โซไซตี้เชียวนะ"
20040-140 = "แต่ก็น่าจะรู้อยู่แล้วละนะ ฮุฮุ"
20040-150 = "ระวังอย่าให้นิ้วเท้า\nไปเตะมุมโต๊ะล่ะ"
20040-160 = "ฉันไม่ชอบความเจ็บปวดน่ะ"
20040-170 = "ข้อมูลลับของชาเล่ต์\nจะอยู่ตรงไหนนะ..."
20040-180 = "หรือจะอยู่ในห้องครัวอย่างคาดไม่ถึง...?"
20040-190 = "ฮุฮุ\nเริ่มดูจากของว่างก่อนดีมั้ยนะ?"
20040-200 = "ครู สนใจโปรเจกต์อัลตร้า NK มั้ย?"
20040-210 = "ตอนนี้ฉันจะให้เข้าร่วม\nด้วยเงื่อนไขพิเศษเลยละ"
20040-220 = "ดูเหรียญนี้ให้ดีๆ นะ...\nเอาละ..."
20040-230 = "ครูจะอยากเลิกงาน..."
20040-240 = "อยากโดดงาน..."
20040-250 = "ปกติก็เป็นอย่างนั้นอยู่แล้วงั้นเหรอ...? ฮึ่ม"
20040-260 = "วันนี้วันเกิดครูใช่มั้ย?"
20040-270 = "ฉันรู้อยู่น่ะ"
20040-280 = "ก็ครูเป็นคนสำคัญในฐานะผู้ร่วมมือ\nของแพนเดโมเนียม โซไซตี้ยังไงล่ะ"
20040-290 = "แต่ถึงจะไม่ใช่อย่างนั้น\nฉันก็คงจำได้อยู่ดี"
20040-300 = "ฮุฮุ สุขสันต์วันเกิดนะครู"
20040-310 = "หืม~\nจำวันเกิดฉันได้ด้วยเหรอ?"
20040-320 = "เครือข่ายข้อมูลของชาเล่ต์\nแน่นหนาจริงด้วยสินะ"
20040-330 = "สมกับเป็นคู่แข่งของเราเลย"
20040-340 = "ยังไงก็ขอบคุณที่อวยพรนะครู"
20040-350 = "สุขสันต์วันปีใหม่นะครู"
20040-360 = "หวังว่าจะเป็นปีแห่งความก้าวหน้า"
20040-370 = "ที่จะได้ความร่วมมือจากครู\nในโปรเจกต์อัลตร้า NK นะ"
20040-380 = "ครูชอบหรือเปล่า?"
20040-390 = "บรรยากาศของ\nคริสต์มาสน่ะ"
20040-400 = "สับสนอยู่พักหนึ่งเหรอ...? สับสนอะไร?"
20040-410 = "ฮาโลวีนเป็นวันที่\nอิบูกิคาดหวังมาตลอดน่ะ"
20040-420 = "เตรียมขนมไว้หรือยัง?\nฮุฮุ ฉันเองก็คาดหวังอยู่นะ"
20040-440 = "อึก... นี่มันอะไรกัน...?"
20040-450 = "ปะ... แปลกจัง...\nรู้สึกเหมือนต้อง\nทำตามคำสั่งของครูเลย..."
20040-460 = "อะ... อ่า... ค่ะ..."
20040-470 = "ฉันจะญาติดีกับ..\nคณะกรรมการวินัยค่ะ..."
20040-480 = "แต่ว่า... ถ้าเป็นมาโคโตะจัง\nละไม่แน่ แต่ฉันน่ะ\nไม่ถึงกับไม่กินเส้นกับทางนั้นนะ"
20040-490 = "หะ... หืม?"
20040-500 = "อึก... ฉัน... จะไม่...\nรบกวนคุณครูอีก... ค่ะ..."
20040-510 = "ขะ... ขี้ขลาดชะมัด!"
20040-520 = "เป็นถึงผู้ใหญ่\nแต่มาสะกดจิตฉันถึงขนาดนี้เลยเหรอ!"
20040-530 = "ฮึ่ม สะกดจิตฉันเหรอเนี่ย..."
20040-540 = "จะประมาทไม่ได้แล้วสินะ ครูน่ะ"
20040-550 = "ว่าไงล่ะ?\nอยากเข้าร่วมโปรเจกต์อัลตร้า NK\nของฉันแล้วหรือยัง?"
20040-560 = "ค่ะ ค่า... ไม่ว่าคำสั่งไหน..."
20040-2600 = "อุ๊ยตาย เตรียมไว้อย่างดีเลยนะ\nฮุฮุ ช่วยได้เยอะเลยละครู"

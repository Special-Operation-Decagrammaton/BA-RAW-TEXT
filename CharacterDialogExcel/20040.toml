[translation]
20040-10 = "블루, 아카이브~"
20040-20 = "자아~ 기다렸지, 선생?\n만마전의 정보부장, 쿄고쿠 사츠키야.\n후후훗, 잘 부탁해."
20040-30 = "샬레의 정보 수집을\n해볼까나."
20040-40 = "으흥~ 이런 느낌?\n나쁘지 않네."
20040-50 = "여기에 그 애들을\n잠입시켜서…"
20040-60 = "다른 학원의\n심문 노하우가\n궁금한데……"
20040-70 = "최면술의 연습 상대…\n누군가 되어 줄 사람\n없으려나?"
20040-80 = "안녕, 선생.\n오늘의 당번은 나야. 후훗."
20040-90 = "선생은 만마전의 협력자 후보."
20040-100 = "이번 기회에 진득이\n관찰해 볼까나. 후후."
20040-110 = "어머? 나를 누구라고 생각하지?"
20040-120 = "샬레의 업무 정도는\n순식간에 끝내줄게."
20040-130 = "쿄고쿠 사츠키,\n만마전의 정보부장이야."
20040-140 = "알고 있겠지만. 후훗."
20040-150 = "책상 모서리에\n발가락 부딪히지 않게 조심해."
20040-160 = "아픈 건 싫다구."
20040-170 = "샬레의 기밀정보는\n어디 있는 걸까…"
20040-180 = "…의외로 탕비실에 있다든지?"
20040-190 = "후훗.\n간식 구성부터 살펴볼까나."
20040-200 = "선생, \nNK 울트라 계획에 흥미 있어?"
20040-210 = "지금이라면 파격적인 조건으로\n들어오게 해줄게."
20040-220 = "이 동전을 잘 봐…\n자아…"
20040-230 = "선생은 퇴근하고 싶어진다…"
20040-240 = "땡땡이치고 싶어진다…"
20040-250 = "....항상 그렇다고? 흐응."
20040-260 = "오늘은 선생의 생일이지?"
20040-270 = "알고 있어."
20040-280 = "만마전의 예비 협력자로서\n선생은 귀중한 존재니까."
20040-290 = "뭐, 그게 아니더라도\n기억했겠지만."
20040-300 = "후후. 생일 축하해, 선생."
20040-310 = "헤에~ \n내 생일도 기억해 준 거야?"
20040-320 = "역시 샬레의 정보망은 촘촘하네."
20040-330 = "우리의 경쟁자다워."
20040-340 = "아무튼 축하 고마워, 선생."
20040-350 = "새해 복 많이 받아, 선생."
20040-360 = "올해는 선생의 협력도 얻어내고,"
20040-370 = "NK 울트라 프로젝트에\n진전이 있는 한 해라면 좋겠네."
20040-380 = "선생, 좋아해?"
20040-390 = "크리스마스의\n분위기 말이야."
20040-400 = "…잠깐 헷갈렸다고? 뭘?"
20040-410 = "할로윈은 이부키가\n기대해 왔던 날이야."
20040-420 = "과자 준비는 됐어?\n후훗, 나도 기대하고 있다구."
20040-440 = "으…… 이거 뭐야……?"
20040-450 = "이, 이상해…\n선생의 명령에\n따라야 할 것만 같은 느낌이…"
20040-460 = "에, 엣… 네…"
20040-470 = "……나는 선도부와\n……사이좋게 지내겠……"
20040-480 = "…그런데 마코토 쨩이라면\n몰라도, 나는 그렇게 사이가\n나쁘지 않아."
20040-490 = "으응?"
20040-500 = "큭…… 나는…… 선생님을……\n괴롭히지…… 않겠습니다아……"
20040-510 = "비, 비겁해!"
20040-520 = "어른 주제에\n최면으로 날 아무렇게나!"
20040-530 = "흥, 이 내게 최면을 걸다니…"
20040-540 = "방심할 수 없네, 선생."
20040-550 = "어때?\n나의 NK 울트라 프로젝트에\n참여하는 건?"
20040-560 = "네, 네에… 명령이라면…"
20040-2600 = "어머, 준비성이 좋잖아.\n후후, 도움이 됐어 선생."

[translation]
20040-10 = "Blue Archive!"
20040-20 = "Now, did I keep you waiting, Sensei? I'm Kyougoku Satsuki, the Pandemonium Society's Intelligence Committee Director. Heehee, I look forward to working with you."
20040-30 = "Let's gather intelligence on Schale."
20040-40 = "Mmm, like this? Not bad."
20040-50 = "Force them to infiltrate here, then..."
20040-60 = "I wonder how other academies carry out interrogations..."
20040-70 = "Is there anyone around...I can practice hypnotizing?"
20040-80 = "Hello, Sensei. I'm the student rep today. Heehee."
20040-90 = "You're a potential partner for the Pandemonium Society."
20040-100 = "Perhaps I should take this opportunity to observe you closely. Heehee."
20040-110 = "Oh? Who do you think I am?"
20040-120 = "I can complete work like Schale's tasks in no time at all."
20040-130 = "I'm Kyougoku Satsuki, the Pandemonium Society's Intelligence Committee Director."
20040-140 = "Although you probably knew that already. Heehee."
20040-150 = "Be careful not to stub your toe on the edge of the desk."
20040-160 = "I don't like when it hurts."
20040-170 = "I wonder where you've hidden Schale's top secrets..."
20040-180 = "...It'd be unexpected, but perhaps in the break room?"
20040-190 = "Heehee. Let's peruse their snack selection."
20040-200 = "Sensei, are you, by chance, interested in the NK Ultra Project?"
20040-210 = "If you want to join now, I'll offer you some incredible terms."
20040-220 = "Look at this coin closely... Now..."
20040-230 = "You want to clock out..."
20040-240 = "You feel the urge to play hooky..."
20040-250 = "...You always want to? Hmm."
20040-260 = "Today is your birthday, correct?"
20040-270 = "I'm already aware."
20040-280 = "As a potential partner for the Pandemonium Society, you're quite valuable."
20040-290 = "Well, even if that weren't the case, I still would have known it."
20040-300 = "Heehee. Happy birthday, Sensei."
20040-310 = "Heh. You remembered my birthday as well?"
20040-320 = "Schale's intelligence network is quite competent."
20040-330 = "As expected of our competitor."
20040-340 = "Anyways, thank you for the birthday wish, Sensei."
20040-350 = "Happy New Year, Sensei."
20040-360 = "I hope we can establish a partnership..."
20040-370 = "...and make progress on the NK Ultra Project this year."
20040-380 = "Do you like what you see, Sensei?"
20040-390 = "The Christmas aesthetic, I mean."
20040-400 = "...You were confused? About what?"
20040-410 = "Ibuki was looking forward to Halloween."
20040-420 = "Did you prepare any treats? Heehee, I'm looking forward to it too."
20040-440 = "Ugh... What is this...?"
20040-450 = "W-Weird... It feels like I have to follow your orders..."
20040-460 = "E-Ehh... Yes..."
20040-470 = "...I will stay on good terms with the Prefect Team..."
20040-480 = "...I don't know about Makoto, but I personally have no beef with them."
20040-490 = "H-Hmm?"
20040-500 = "Tch... I w-won't...be mean to Sensei..."
20040-510 = "N-Not fair!"
20040-520 = "What kind of adult uses hypnosis on a student?!"
20040-530 = "Hmph, to hypnotize me, of all people..."
20040-540 = "You're just full of surprises, Sensei."
20040-550 = "What do you say? Want to join my NK Ultra project?"
20040-560 = "Y-Yes... If it's an order..."
20040-2600 = "Oh my, you're well-prepared. Heehee, that's helpful, Sensei."

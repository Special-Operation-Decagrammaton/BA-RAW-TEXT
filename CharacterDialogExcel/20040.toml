[translation]
20040-10 = "蔚藍，檔案～"
20040-20 = "讓你久等了吧，老師。\n我就是萬魔殿的情報部長，京極皐月。\n呵呵，請多指教。"
20040-30 = "來進行夏萊的\n情報蒐集吧。"
20040-40 = "哼～嗯？\n挺不賴的嘛。"
20040-50 = "讓那些孩子們\n潛入這裡……"
20040-60 = "有別於我們的\n審問技術，\n真令人在意呢……"
20040-70 = "催眠術的練習台……\n有人會願意擔任嗎？"
20040-80 = "你好呀，老師。\n今天的值日生是我唷。呵呵。"
20040-90 = "老師是萬魔殿的候補合作者。"
20040-100 = "就趁這個機會，\n讓我來好～好觀察吧。\n呵呵。"
20040-110 = "哎呀？你以為我是誰？"
20040-120 = "夏萊的工作什麼的，\n我瞬間就能幫你搞定了。"
20040-130 = "京極皐月，目前\n擔任萬魔殿的情報部長。"
20040-140 = "不過，你想必已經知道了吧。\n呵呵。"
20040-150 = "為了避免腳撞到桌角，\n還請多多留意哦。"
20040-160 = "……畢竟那可是很痛的。"
20040-170 = "夏萊的機密情報\n會在哪裡呢……"
20040-180 = "……有可能意外地在茶水間嗎？"
20040-190 = "呵呵。就從零食的\n清單開始調查吧。"
20040-200 = "老師，你對\nNK-ULTRA計畫有興趣嗎？"
20040-210 = "現在能讓你\n以破格的條件加入。"
20040-220 = "仔細盯著這枚硬幣……\n來……"
20040-230 = "老師越來越想下班……"
20040-240 = "越來越想翹班……"
20040-250 = "……一直都是這麼想的？\n哼嗯。"
20040-260 = "今天是老師的生日對吧？"
20040-270 = "沒錯，我當然知道。"
20040-280 = "畢竟作為萬魔殿的候補合作者，\n老師的存在可是很珍貴的。"
20040-290 = "……不過，就算並非如此，\n我應該也會記得吧。"
20040-300 = "呵呵，生日快樂，老師。"
20040-310 = "哼～我的生日，你居然記得嗎？"
20040-320 = "不愧是夏萊的情報收集能力。"
20040-330 = "果然足以當我們的競爭對手。"
20040-340 = "話雖如此……\n還是感謝你的祝福。"
20040-350 = "新年快樂，老師。"
20040-360 = "希望今年，得以在\n老師的幫助下……"
20040-370 = "讓NK-ULTRA計畫有所進展。"
20040-380 = "老師，你喜歡嗎？"
20040-390 = "……我指的是\n聖誕節的氣氛。"
20040-400 = "……你說誤會了，是指什麼？"
20040-410 = "萬聖節是伊吹\n期待已久的日子。"
20040-420 = "餅乾已經準備好了嗎？\n呵呵，我也很期待哦。"
20040-440 = "唔……這是，\n怎麼回事……？"
20040-450 = "真，真奇怪……\n有股必須服從\n老師命令的感覺……"
20040-460 = "咦，咦……好的……"
20040-470 = "……我會，\n和風紀委員會\n……好好相處。"
20040-480 = "……不過真琴醬姑且不論，\n我跟他們其實沒有關係不好哦。"
20040-490 = "唔，唔嗯？"
20040-500 = "唔……我……不會……\n捉弄，老師了……"
20040-510 = "太，太卑鄙了！"
20040-520 = "明明是大人，\n卻用催眠對我為所欲為！"
20040-530 = "哼，竟然能對我\n施加催眠……"
20040-540 = "真是不能大意呢，老師。"
20040-550 = "怎麼樣？\n想不想參加我的\nNK-ULTRA計畫啊？"
20040-560 = "是，是……\n如果這是命令的話……"
20040-2600 = "哎呀，準備得真周到呢。\n呵呵，相當有幫助哦，老師。"

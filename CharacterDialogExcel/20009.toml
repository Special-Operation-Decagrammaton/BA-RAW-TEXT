20009-470 = "剛剛那個你有看見嗎同志！？\n剛才有個像是恐怖的鬼的東西\n從眼前經過了！"
20009-480 = "……咦，萬聖節的扮裝？"
20009-490 = "唔……\n嚇到咱的傢伙們，\n總之要全部肅清，肅清！"
20009-510 = "泡完澡之後\n喝杯水果牛奶……\n這感覺真棒啊！"
20009-520 = "嗯？\n怎麼了嗎？\n同志？"
20009-530 = "咱的臉上\n沾到什麼東西了嗎？"
20009-540 = "……什麼？嘴巴周圍\n有鬍子形狀的痕跡……！？"
20009-550 = "哇，真的耶！？\n只是喝個牛奶，\n就有這麼棒的鬍子！"
20009-560 = "喝著這麼美味的飲料，\n竟然還能得到新的鬍子……"
20009-570 = "太棒了！\n同志，再給咱多一點！\n再把更多的水果牛奶\n拿來給咱吧！"
20009-2600 = "哦哦，好險好險，真是大意了。\n就算是在渡假村，\n也不能放下權威的象徵。\n像是鬍子、鬍子……還有鬍子！"

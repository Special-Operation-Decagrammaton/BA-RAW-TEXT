[translation]
20009-10 = "블루 아카이브."
20009-20 = "아무리 추운 곳이라도 상관없어.\n왜냐하면 이 몸은\n붉은겨울 학원의 위대한 서기장이니까!"
20009-30 = "하암…… 졸려……"
20009-40 = "게으름부리는\n녀석들은 모두\n숙청하겠다!"
20009-50 = "새로운 휴양지 개발은\n잘 진행되고 있겠지?"
20009-60 = "(후후, 다들 이 몸의\n위엄있는 모습에\n눈을 떼지 못하는군!)"
20009-70 = "(……좀 더 훈장을\n잔뜩 달 걸 그랬나?)"
20009-80 = "어서 오게, 콤라드.\n지금부터 함께 겨울의\n연회를 즐기도록 하지!"
20009-90 = "늦었잖나, 콤라드!\n태업은 콤라드라 하더라도\n용서할 수 없는 중죄이거늘!"
20009-100 = "후후, 이 몸의 권위는\n휴양지에서도 여전히\n반짝이는군!"
20009-110 = "붉은겨울 학원에도\n게헨나처럼 훌륭한 온천장이\n여럿 있으면 좋으련만…"
20009-120 = "아니지. 아예 게헨나 학원을\n이 몸의 수중에 넣으면…"
20009-130 = "후후, 후후후…"
20009-140 = "구교사의 녀석들이\n만든 온천 만쥬는\n제법 훌륭했었지…"
20009-150 = "응? 어째서 유카타 밑에\n학교 수영복을 입고 있냐고?"
20009-160 = "탕에 들어갈 때는\n수영복을 입는 게\n상식이지 않은가."
20009-170 = "콤라드도 참,\n당연한 걸 묻는군."
20009-180 = "확실히 이대로는\n수염이 젖어버릴텐데…"
20009-190 = "온천에 들어갈 때는\n역시 수염을\n떼야 하는 건가?"
20009-200 = "우으……\n그렇게 계속 쳐다보면…\n그… 부끄러운걸…"
20009-210 = "오늘이 콤라드의 생일이지?\n특별히 온천을 대절했으니\n거기서 푹 쉬어도 좋아."
20009-220 = "물론 이 몸도 함께 말이야!"
20009-230 = "생일이라… 이것으로\n이 몸은 어른의 계단을\n한 걸음 더 오르게 되었군."
20009-240 = "경사스러운 일이니 얼마든지\n축하해도 좋다네, 콤라드!"
20009-250 = "올해도 콤라드가\n이 몸과 함께일테니\n붉은겨울 학원에는\n아무런 문제도 없겠군!"
20009-260 = "산타클로스의 수염은……\n진짜 수염이겠지?"
20009-270 = "보, 보았는가. 콤라드?\n방금 무서운 도깨비 같은 게\n눈 앞에 지나갔다네!"
20009-280 = "…평범한 할로윈\n분장일 뿐이라고?"
20009-290 = "우읏… 이 몸을\n놀라게 하는 녀석들은\n모조리 숙청이야, 숙청!"
20009-300 = "어서 오게, 콤라드.\n지금부터 함께 겨울의\n연회를 즐기도록 하지!"

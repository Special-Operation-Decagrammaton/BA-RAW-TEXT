[translation]
20009-10 = "Blue Archive."
20009-20 = "Cold is nothing to me, the Great Leader of Red Winter Academy."
20009-30 = "*yawn* ...Sleepy."
20009-40 = "Every last lazy bum will be purged!"
20009-50 = "Development of the new resort is going well, I presume?"
20009-60 = "(Heehee. No one can take their eyes off how majestic I look!)"
20009-70 = "(Maybe I should've added even more medals?)"
20009-80 = "Welcome, Comrade. Let's enjoy the winter banquet together!"
20009-90 = "You're late, Comrade! Even if it's you, being late is an unforgivable felony!"
20009-100 = "Heehee, my authority still shines even on vacation!"
20009-110 = "It'd be nice if Red Winter Academy had a bunch of great hot springs like Gehenna..."
20009-120 = "Actually, if I were to take over Gehenna Academy..."
20009-130 = "Heeheehee."
20009-140 = "The hot spring manju made by those former institute guys was pretty good..."
20009-150 = "Huh? Why am I wearing my school swimsuit under my yukata?"
20009-160 = "Isn't it common sense to wear a swimsuit in the bath?"
20009-170 = "Come on, Comrade. You're asking such obvious things."
20009-180 = "Hmm. It might get wet..."
20009-190 = "...but is it really impossible to enter the hot bath with my mustache?"
20009-200 = "Even for someone like me, if you keep staring like that...it's a bit embarrassing..."
20009-210 = "Today is your birthday, is that right, Comrade? I rented this luxurious hot springs resort especially for you! So rest up and enjoy."
20009-220 = "Together with me of course!"
20009-230 = "It's my birthday... As of today, I've grown one step closer to becoming an adult."
20009-240 = "Something like this should always be celebrated, Comrade!"
20009-250 = "Since Comrade will be with me this year, there won't be any trouble at Red Winter Academy!"
20009-260 = "Santa Claus' mustache...is a real mustache, right?"
20009-270 = "D-Did you see that, Comrade? A scary-looking gremlin just passed by over there!"
20009-280 = "...It's just an ordinary Halloween costume?"
20009-290 = "Ugh... All those who dare scare me will be purged! Purged!"

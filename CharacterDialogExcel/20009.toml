20009-490 = "우읏… 이 몸을\n놀라게 하는 녀석들은\n모조리 숙청이야, 숙청!"
20009-510 = "목욕 후의\n후르츠 밀크……\n이것은 정말 훌륭하군!"
20009-520 = "응?\n무슨 일 있는가,\n콤라드?"
20009-530 = "이 몸의 얼굴에\n뭔가 묻은 건가?"
20009-540 = "……뭐?\n입 주변에 수염같은\n자국이……!?"
20009-550 = "우와, 정말이잖아?\n우유만 마셨을 뿐인데,\n이렇게 멋진 수염이……!"
20009-560 = "맛있는 음료를\n마셨을 뿐인데,\n새로운 수염까지\n얻을 수 있다니……"
20009-570 = "굉장하군!\n콤라드, 좀 더 가져오게!\n좀 더 이 후르츠 밀크를\n잔뜩 가져오는 거야!"
20009-2600 = "아앗, 위험했다. 깜박하고 있었어.\n설령 휴양지라 하더라도 권위의 상징\n몸에서 떼 놓을 수는 없지.\n수염이라든가, 수염이라든가… 그리고 수염이라든가!"

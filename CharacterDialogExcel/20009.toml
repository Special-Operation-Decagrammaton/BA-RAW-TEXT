[translation]
20009-10 = "Blue Archive"
20009-20 = "อากาศหนาวไม่เป็นปัญหากับเรา\nที่เป็นถึงผู้นำที่ยิ่งใหญ่ของสหภาพเรดวินเทอร์หรอก!"
20009-30 = "ฮ้าวว... ง่วงจัง..."
20009-40 = "เราจะกวาดล้าง\nเจ้าพวกขี้เกียจ\nให้หมดไปซะ!"
20009-50 = "การพัฒนาสถานที่พักผ่อนใหม่ๆ\nกำลังเริ่มไปด้วยดีสินะ?"
20009-60 = "(ฮิฮิ ทุกๆ คน\nละสายตาจากความสง่างาม\nของเราไม่ได้เลยสินะ!)"
20009-70 = "(เราควรติดเหรียญตรา...\nบนเสื้อเพิ่มอีกดีไหมนะ?)"
20009-80 = "เชิญเลยสหาย\nตั้งแต่นี้มาร่วมดื่มด่ำบรรยากาศ\nของฤดูหนาวร่วมกับเราสิ!"
20009-90 = "มาสายนะสหาย!\nถึงจะเป็นสหายก็เถอะ\nแต่ถ้าอู้งานล่ะก็จะไม่ยกโทษให้นะ!"
20009-100 = "ฮุฮุ อำนาจของเรา\nถึงอยู่ที่สถานที่พักผ่อน\nก็ยังสง่างามเหมือนเดิม!"
20009-110 = "ถ้าที่สหภาพเรดวินเทอร์\nมีออนเซ็นสวยๆ แบบเกเฮนน่าบ้าง\nก็คงจะดีไม่น้อยเลยนะ..."
20009-120 = "ไม่สิ ถ้ารวบสถาบันเกเฮนน่า\nมาไว้ในกำมือของเราแล้วล่ะก็..."
20009-130 = "ฮุฮุฮุ..."
20009-140 = "ออนเซ็นมันจูที่พวกกลุ่ม\nอาคารเรียนเก่าทำขึ้นมา\nก็อร่อยใช้ได้เลยนะ..."
20009-150 = "หืม? ทำไมเราถึงใส่ชุดว่ายน้ำ\nของโรงเรียนเอาไว้ด้านใน\nชุดยูกาตะงั้นเหรอ?"
20009-160 = "เวลาลงในสระน้ำ\nก็ต้องใส่ชุดว่ายน้ำสิ\nถึงจะถูกต้องน่ะ"
20009-170 = "สหายนี่จริงๆ เลย\nถามเรื่องที่รู้ๆ กันอยู่"
20009-180 = "ถ้าแบบนี้หนวดของเรา\nคงจะเปียกน้ำแน่ๆ"
20009-190 = "ตอนลงไปแช่ออนเซ็น\nจะต้องเอาหนวดออกงั้นเหรอ?"
20009-200 = "ฮือ... ถ้าจ้องกันแบบนั้น\nมะ...มันน่าอายนะ"
20009-210 = "วันนี้วันเกิดของสหายงั้นเหรอ?\nเราเช่าเหมาออนเซ็นเอาไว้แล้ว\nวันนี้ก็พักผ่อนให้เต็มที่ล่ะ"
20009-220 = "ต้องพักผ่อนกับเราอยู่แล้วสิ!"
20009-230 = "วันเกิด... วันนี้เราได้ก้าวสู่\nความเป็นผู้ใหญ่ขึ้นอีกขั้นแล้ว"
20009-240 = "ถ้าเป็นเรื่องนั้น แสดงความยินดี\nกับเราได้ตลอดนะสหาย!"
20009-250 = "ปีนี้สหาย...\nก็จะใช้เวลาอยู่กับเรา\nสหภาพเรดวินเทอร์\nคงไม่มีปัญหาอะไรแน่นอน!"
20009-260 = "หนวดของซานตาคลอส...\nเป็นหนวดจริงใช่ไหม?"
20009-270 = "หะ...เห็นรึเปล่า สหาย?\nตรงทางโน้นเมื่อกี้นี้\nมียักษ์น่ากลัวผ่านไปด้วยล่ะ!"
20009-280 = "แค่แต่งตัวเลียนแบบ\nในเทศกาลฮาโลวีนธรรมดาๆ เหรอ?"
20009-290 = "อึ่ก... เจ้าคนที่\nทำให้เราตกใจต้องถูก\nกวาดล้างให้หมด จัดการซะ!"
20009-300 = "เชิญเลยสหาย\nมาสนุกกับเทศกาล\nงานฤดูหนาวกันเถอะ!"
20009-310 = "มาสายนะสหาย!\nถึงจะเป็นสหายก็เถอะ\nแต่ถ้าอู้งานล่ะก็จะไม่ยกโทษให้นะ!"
20009-320 = "ฮุฮุ อำนาจของเรา\nถึงอยู่ที่สถานที่พักผ่อน\nก็ยังสง่างามเหมือนเดิม!"
20009-330 = "ถ้าที่สหภาพเรดวินเทอร์\nมีออนเซ็นสวยๆ แบบเกเฮนน่าบ้าง\nก็คงจะดีไม่น้อยเลยนะ..."
20009-340 = "ไม่สิ ถ้ารวบสถาบันเกเฮนน่า\nมาไว้ในกำมือของเราแล้วล่ะก็..."
20009-350 = "ฮุฮุฮุฮุ"
20009-360 = "ออนเซ็นมันจูที่พวกกลุ่ม\nอาคารเรียนเก่าทำขึ้นมา\nก็อร่อยใช้ได้เลยนะ..."
20009-370 = "หืม? ทำไมเราถึงใส่ชุดว่ายน้ำ\nของโรงเรียนเอาไว้ด้านใน\nชุดยูกาตะงั้นเหรอ?"
20009-380 = "ตอนที่ลงแช่น้ำ\nก็ต้องใส่ชุดว่ายน้ำ\nไม่ใช่หรือยังไง"
20009-390 = "สหายนี่จริงๆ เลย\nถามเรื่องที่รู้ๆ กันอยู่"
20009-400 = "ฮือ... ถ้าจ้องกันแบบนั้น\nมะ...มันน่าอายนะ"
20009-410 = "วันนี้วันเกิดของสหายงั้นเหรอ?\nเราเช่าเหมาออนเซ็นเอาไว้แล้ว\nวันนี้ก็พักผ่อนให้เต็มที่ล่ะ"
20009-420 = "ต้องพักผ่อนกับเราอยู่แล้วสิ!"
20009-430 = "วันเกิด... วันนี้เราได้ก้าวสู่\nความเป็นผู้ใหญ่ขึ้นอีกขั้นแล้ว"
20009-440 = "ถ้าเป็นเรื่องนั้น แสดงความยินดี\nกับเราได้ตลอดนะสหาย!"
20009-450 = "ปีนี้สหาย...ใช้เวลาอยู่กับเรา\nสหภาพเรดวินเทอร์\nคงไม่มีปัญหาอะไรแน่นอน!"
20009-460 = "หนวดของซานตาคลอส...\nเป็นหนวดจริงใช่ไหม?"
20009-470 = "หะ...เห็นรึเปล่า สหาย?\nตรงทางโน้นเมื่อกี้นี้\nมียักษ์น่ากลัวผ่านไปด้วยล่ะ!"
20009-480 = "แค่แต่งตัวเลียนแบบ\nในเทศกาลฮาโลวีนธรรมดาๆ เหรอ?"
20009-490 = "อึ่ก... เจ้าคนที่\nทำให้เราตกใจต้องถูก\nกวาดล้างให้หมด จัดการซะ!"
20009-510 = "ได้ดื่มนมรสผลไม้\nหลังจากแช่น้ำร้อน\nแบบนี้มันยอดเยี่ยมจริงๆ เลย"
20009-520 = "หืม? ทำไมถึงจ้องเรา\nแบบนั้นล่ะ สหาย?"
20009-530 = "ที่หน้าของเรา\nมีอะไรติดอยู่งั้นเหรอ?"
20009-540 = "...หืม? รอบๆ ปากเรา\nมีรอยนมเปื้อนรูปหนวดเหรอ?"
20009-550 = "ว้าว? จริงเหรอ?\nเราแค่ดื่มนมเองนะ\nก็ได้หนวดสุดเท่อันใหม่เลย!"
20009-560 = "ได้ดื่มนมแสนอร่อย\nแถมยังได้หนวดใหม่\nมาด้วยงั้นเหรอเนี่ย..."
20009-570 = "สุดยอดเลย! สหาย!\nไปเอามาให้เราอีกเร็วเข้า!\nเราอยากได้นมรสผลไม้อีก!"
20009-2600 = "อ๊ะ เกือบลืมไปเลย ถึงจะอยู่ที่\nสถานที่พักผ่อนแต่ก็จะถอดสัญลักษณ์\nแห่งอำนาจออกไม่ได้นะ\nหมายถึงหนวด... หนวดน่ะหนวด!"

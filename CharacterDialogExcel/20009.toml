[translation]
20009-10 = "Blue Archive，"
20009-20 = "無論是再怎麼冷的地方都沒關係！\n畢竟咱可是，\n赤冬學園偉大的書記長呢！"
20009-30 = "呼啊……好睏……"
20009-40 = "偷懶的傢伙們，\n全員肅清！"
20009-50 = "新渡假村的開發順利嗎？"
20009-60 = "（哼哼！大家似乎都無法\n　從咱滿溢威嚴的模樣\n　移開視線啊！）"
20009-70 = "（……再多別一些勳章\n會比較好嗎？）"
20009-80 = "你來了啊，同志！\n來吧，一起享受\n冬季的宴會吧！"
20009-90 = "好慢啊，同志！\n就算是同志，\n怠工也是重罪哦！"
20009-100 = "哼哼，這個渡假村\n一如既往地散發著\n咱權威的光芒呢！"
20009-110 = "如果赤冬學園\n也像格黑娜一樣，\n有很多出色的溫泉就好了……"
20009-120 = "……乾脆，\n由咱把格黑娜學園\n納入手中……？"
20009-130 = "呵呵，呵哈哈哈哈……！"
20009-140 = "舊校舍的傢伙們\n做的溫泉饅頭，\n真好吃呢……"
20009-150 = "嗯？為什麼在浴衣下面\n穿著校園泳衣……？"
20009-160 = "進入浴池的時候\n穿著泳衣不是常識嗎。"
20009-170 = "同志意外的不諳世事呢。"
20009-180 = "確實這樣子會濕掉……"
20009-190 = "不過進溫泉的時候，\n一定要摘掉鬍子才行嗎？"
20009-200 = "唔……\n被那樣盯著看的話……\n那個，很害羞……"
20009-210 = "今天是同志的生日吧？\n咱特別包下了溫泉，\n好好休息吧！"
20009-220 = "當然，咱也會一起進去！"
20009-230 = "生日……咱就這樣，\n又登上了一階大人的階梯。"
20009-240 = "因為是非常值得高興的事。\n所以可以盛大地慶祝哦，同志！"
20009-250 = "今天同志也和咱在一起的話，\n赤冬聯邦學園就安泰了呢！"
20009-260 = "聖誕老人的鬍子……\n是真的吧？"
20009-270 = "剛剛那個你有看見嗎同志！？\n剛才有個像是恐怖的鬼的東西\n從眼前經過了！"
20009-280 = "……咦，萬聖節的扮裝？"
20009-290 = "唔……\n嚇到咱的傢伙們，\n總之要全部肅清，肅清！"
20009-300 = "你來了啊，同志！\n來吧，一起享受\n冬季的宴會吧！"

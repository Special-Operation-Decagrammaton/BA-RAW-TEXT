[translation]
13014-10 = "블루- 아카이브! 핫하!"
13014-20 = "여름의 청춘 활동은 역시 바다지!\n모두 즐길 준비 됐어?"
13014-30 = "오오, 여기가\n선생님이\n준비한 공간……"
13014-40 = "헤에,\n이런 것도 있구나."
13014-50 = "키쿄 녀석,\n또 뭘 숨기고\n있는 건지."
13014-60 = "우리 조정실을…\n여기로 옮길 순\n없을까…."
13014-70 = "바다는\n역시 즐거워!"
13014-80 = "오, 스승님! 어서 와!\n기다리고 있었어!"
13014-90 = "같이 바다에 가는 거야!"
13014-100 = "음! 바다와 청춘이\n날 부르고 있어."
13014-110 = "일 끝나면 바로 가자고!"
13014-120 = "교복? 생각보다\n더워서 벗고 왔는데."
13014-130 = "수, 수영복이랑\n속옷은 다른 거니까!"
13014-140 = "스승님은 교복 아래에\n수영복 입어본 적 있어?"
13014-150 = "밖에서 갈아입는\n수고로움이 없어서 편해."
13014-160 = "…응?\n귀가할 때 속옷 말이야?"
13014-170 = "이 수영복은\n백화요란의 모두와\n함께 골랐어."
13014-180 = "생각보다\n움직이기 편해서\n마음에 드네."
13014-190 = "선생님은 어떤\n수영복을 좋아해?"
13014-200 = "아…… 그러니까\n보는 거 말고 입는 거!"
13014-210 = "올여름도,\n모두와 즐겁게\n지냈으면 좋겠어."
13014-220 = "스승님도\n포함해서 말이야.\n헤헷."
13014-230 = "오늘은 스승님의 생일."
13014-240 = "청춘 활동에 이보다\n좋은 날은 없겠지."
13014-250 = "자자, 멍하니 있지 말고!"
13014-260 = "잊지 못할\n추억을 만들자고!"
13014-270 = "…우왓!?\n아, 내 생일 기억해 줬구나."
13014-280 = "아니… 아하하…\n정말로 기뻐."
13014-290 = "고마워…\n오늘, 함께 있어 줘서."
13014-300 = "새해 복 많이 받아, 스승님!"
13014-310 = "어, 춥지 않냐고?"
13014-320 = "나는 단련하고 있으니까…"
13014-330 = "엣츄!"
13014-340 = "메리 크리스마스야, 스승님!"
13014-350 = "춥다고 웅크려 있으면\n더 안 좋다고!"
13014-360 = "자! 냉수 마찰하러 가자!"
13014-370 = "트릭 오어 트리트!\n수영복으로 할로윈!"
13014-380 = "……어때? 깜짝 놀랐지?"
13014-390 = "저기……\n아무 말 없이 그렇게\n쳐다보면, 좀……"
13014-400 = "이래 봬도,\n용기 낸 건데……"
13014-420 = "청춘은, 빨리\n지나가는 것 같아."
13014-430 = "격렬하게 타오르다가,\n금방 꺼지는……"
13014-440 = "이 불꽃처럼."
13014-450 = "나도 처음엔\n그렇게 생각했어."
13014-460 = "……단련만 하다가,\n청춘이 끝나버리겠지하고."
13014-470 = "하지만 이젠 아니야."
13014-480 = "스승님과 만나고\n많은 게 바뀌었으니까."
13014-490 = "매일이 즐겁고\n충실한 느낌이야."
13014-500 = "물론, 시간은\n돌이킬 수 없지만……"
13014-510 = "앞으로도,\n충분히 청춘을\n즐길 수 있다 생각해."
13014-520 = "불꽃이 꺼질 것 같으면,\n새로운 장작을\n태우면 되니까."
13014-530 = "그러니까 스승님……"
13014-540 = "계속 함께 청춘,\n해줄……거지?"
13014-2600 = "오오, 이것이\n바로 스승님과의 청춘!\n고마워! 평생의 보물로 삼을게!"

[translation]
13014-10 = "蔚藍檔案！哈哈！"
13014-20 = "說到夏日的青春活動，非海邊莫屬了吧！\n大家，準備好了嗎？"
13014-30 = "老師會做出\n這樣的房間啊……"
13014-40 = "嘿～還有這種東西啊。"
13014-50 = "桔梗那傢伙……\n不曉得這次\n又在打什麼主意。"
13014-60 = "我們的調停室……\n能不能搬到這裡來啊……"
13014-70 = "果然海邊最棒了！"
13014-80 = "師父！歡迎回來！\n我在等你哦！"
13014-90 = "來，去海邊吧！"
13014-100 = "大海與青春在呼喚我們。"
13014-110 = "趕緊把工作搞定吧！"
13014-120 = "制服？\n因為比想像中還熱，\n所以就脫掉了唷。"
13014-130 = "……泳，泳裝跟內衣\n不一樣啦！？"
13014-140 = "師父你啊，\n有在制服裡面\n穿過泳裝嗎？"
13014-150 = "這樣就不用在外面換衣服，\n很方便哦。"
13014-160 = "……咦？回程的內衣？"
13014-170 = "這件泳裝，是跟\n百花繚亂的大家\n一起選的。"
13014-180 = "比想像中還方便活動，\n感覺不錯。"
13014-190 = "老師喜歡哪種泳裝？"
13014-200 = "……啊。不，不是啦，\n我，我是說如果自己要穿的話！"
13014-210 = "今年夏天，真想和大家\n一起度過快樂的時光。"
13014-220 = "當然，師父也要\n一起哦，嘿嘿。"
13014-230 = "今天是師父的生日……"
13014-240 = "也就是最適合\n青春活動的一天，對吧！"
13014-250 = "來來來，\n別杵在那裡了！"
13014-260 = "得創造難以忘懷的回憶才行！"
13014-270 = "……咦！？\n我，我的生日，\n你居然記得啊。"
13014-280 = "沒有啦……啊哈哈……\n我真的很開心。"
13014-290 = "謝謝你……\n今天能陪在我身邊。"
13014-300 = "新年快樂，師父！"
13014-310 = "咦，問我不冷嗎？"
13014-320 = "我可是有在鍛鍊的……"
13014-330 = "哈啾！"
13014-340 = "聖誕快樂，師父！"
13014-350 = "寒冷的時候，\n正是修行的機會！"
13014-360 = "來！去做乾布摩擦吧！"
13014-370 = "Trick or Treat！\n穿泳裝過萬聖節！"
13014-380 = "……怎麼樣？嚇到了嗎？"
13014-390 = "那個……\n被默默盯著的話，\n感覺有點……"
13014-400 = "別看我這樣，我也是\n鼓起了勇氣……"
13014-420 = "所謂的青春，\n總是轉瞬即逝呢。"
13014-430 = "在劇烈燃燒之後，\n迅速地消失無蹤……"
13014-440 = "就像這團火焰一樣。"
13014-450 = "我也一直是這麼想的。"
13014-460 = "……認為我的青春，\n會只在鍛鍊中畫下句點。"
13014-470 = "但是，現在不一樣了。"
13014-480 = "在遇見師父之後\n已經改變了。"
13014-490 = "每天都很快樂、很充實。"
13014-500 = "當然，時間確實\n無法倒流……"
13014-510 = "但我覺得從今以後，\n還是能夠繼續青春下去。"
13014-520 = "如果火焰快要熄滅了的話，\n只要再添加新的柴火就行了。"
13014-530 = "所以師父……"
13014-540 = "你會一直和我一起\n享受青春……對吧？"
13014-2600 = "哦，哦哦……！\n和師父的青春變成了實體！\n謝謝你！\n我會當成一生的寶物！"

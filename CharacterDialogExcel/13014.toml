[translation]
13014-10 = "Blue Archive! Haha!"
13014-20 = "It's not summer youth activities if you're not at the sea! Are we ready to enjoy our hearts out?"
13014-30 = "Ooh, so this is the place you prepared..."
13014-40 = "Heh, so there are things like this too."
13014-50 = "That Kikyou... I wonder what she's hiding this time."
13014-60 = "Our regulatory office... I wonder if we could move it here..."
13014-70 = "The beach is always a fun place!"
13014-80 = "Oh, Mentor! Welcome! I was waiting for you!"
13014-90 = "Let's go to the beach together!"
13014-100 = "Mmm! The beach and my youth call for me!"
13014-110 = "Once you're done working, we move out!"
13014-120 = "My uniform? I took it off because it was way too hot."
13014-130 = "A-A swimsuit is completely different from underwear!"
13014-140 = "Mentor, have you ever tried wearing a swimsuit under your uniform?"
13014-150 = "That way, you don't have to change when you're outside! It's super convenient!"
13014-160 = "...Huh? Underwear for when I go back?"
13014-170 = "I picked this swimsuit with the other Hyakkaryouran members."
13014-180 = "I wasn't expecting it to be so easy to move around in!"
13014-190 = "What kind of swimsuit do you like, Sensei?"
13014-200 = "Ah... I mean what kind would you like to wear, not look at!"
13014-210 = "I hope everyone else has a good summer too!"
13014-220 = "Including you, Mentor. Heh."
13014-230 = "Today's your birthday, mentor!"
13014-240 = "The perfect day for some youth activities!"
13014-250 = "Now, now, don't just stand there."
13014-260 = "Let's go make some unforgettable memories!"
13014-270 = "...Whoa?! You remembered my birthday."
13014-280 = "I mean... Ahaha... I'm really happy."
13014-290 = "Thank you...for spending the day with me."
13014-300 = "Happy New Year, Mentor!"
13014-310 = "Huh? ...Am I not cold?"
13014-320 = "I'm training, so..."
13014-330 = "Achoo!"
13014-340 = "Merry Christmas, Mentor!"
13014-350 = "Having to bundle up for the cold is the worst!"
13014-360 = "Now! Let's go take a cold shower!"
13014-370 = "Trick or treat! Halloween: swimsuit version!"
13014-380 = "...How was it? I caught you by surprise, right?"
13014-390 = "Um... If you just stare wordlessly at me like that, it's a bit..."
13014-400 = "This took a lot of courage, you know..."
13014-420 = "My youth sure is flying by."
13014-430 = "Just like this flame."
13014-440 = "It burns so fiercely, then sputters out in a flash..."
13014-450 = "That's how I used to feel."
13014-460 = "...Like my youth would sputter out with endless training."
13014-470 = "But I don't feel that way anymore."
13014-480 = "So much has changed since I met you, Mentor."
13014-490 = "Every day feels fun and fulfilling."
13014-500 = "I know I can't turn back time..."
13014-510 = "But I think that I can still enjoy what's left of my youth."
13014-520 = "We can always add more firewood to a dying flame."
13014-530 = "So, Mentor..."
13014-540 = "Will you keep doing youth activities...with me?"
13014-2600 = "Ooh, so this is experiencing youth with my mentor! Thank you! I'll treasure it for life!"

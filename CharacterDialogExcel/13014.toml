[translation]
13014-10 = "Blue... Archive! ฮ่าฮ่า!"
13014-20 = "กิจกรรมวัยรุ่นในฤดูร้อน ก็ต้องในทะเลสิ!\nทุกคนพร้อมไปสนุกหรือยัง?"
13014-30 = "โอ้ว ที่นี่คือ\nพื้นที่ที่คุณครู\nเตรียมไว้งั้นเหรอ..."
13014-40 = "เอ๋?\nมีอะไรแบบนี้ด้วยสินะ"
13014-50 = "ยัยคิเคียว\nซ่อนอะไร\nเอาไว้อีกล่ะนั่นน่ะ"
13014-60 = "ย้ายห้องไกล่เกลี่ย\nของเรามาไว้ที่นี่\nได้มั้ยนะ..."
13014-70 = "ทะเล\nมันสนุกจริงๆ ด้วย!"
13014-80 = "โอ๊ะ ท่านอาจารย์! เข้ามาสิ!\nฉันกำลังรออยู่เลย!"
13014-90 = "เราจะไปทะเลด้วยกัน!"
13014-100 = "อืม! ทะเลกับวัยรุ่น\nกำลังเรียกฉันอยู่"
13014-110 = "เสร็จงานแล้วไปทันทีเลยนะ!"
13014-120 = "ชุดนักเรียนเหรอ?\nมันร้อนกว่าที่คิด\nก็เลยไม่ได้ใส่มาน่ะ"
13014-130 = "ชะ... ชุดว่ายน้ำกับชุดชั้นใน\nมันไม่เหมือนกันนะ!"
13014-140 = "ท่านอาจารย์เคยใส่\nชุดว่ายน้ำในชุดนักเรียนมั้ย?"
13014-150 = "มันสะดวกเพราะไม่ต้อง\nมาเปลี่ยนชุดข้างนอกน่ะ"
13014-160 = "หืม...? ชุดชั้นในที่จะใส่\nตอนกลับน่ะเหรอ?"
13014-170 = "ชุดว่ายน้ำตัวนี้\nทุกคนในเฮียกกะเรียวรัน\nช่วยกันเลือกให้น่ะ"
13014-180 = "ใส่แล้วขยับตัว\nสะดวกกว่าที่คิด\nก็เลยถูกใจฉันดี"
13014-190 = "แล้วคุณครูชอบ\nชุดว่ายน้ำแบบไหนเหรอ?"
13014-200 = "อ่า... ไม่ใช่ชอบดูสิ\nหมายถึงชอบใส่แบบไหนน่ะ!"
13014-210 = "ฤดูร้อนนี้ก็หวังว่า\nจะได้สนุกสนาน\nกับทุกคนนะ"
13014-220 = "แล้วก็รวม\nท่านอาจารย์ด้วย\nฮิฮิ"
13014-230 = "วันนี้วันเกิดท่านอาจารย์"
13014-240 = "เป็นวันที่เหมาะกับการ\nทำกิจกรรมวัยรุ่นที่สุดเลย"
13014-250 = "เอาละๆ อย่ามัวเหม่ออยู่!"
13014-260 = "ไปสร้างความทรงจำ\nที่ลืมไม่ลงกันเถอะ!"
13014-270 = "หวา...!?\nอ๊ะ จำวันเกิดฉันได้สินะ"
13014-280 = "เปล่าหรอก... แหะๆๆ...\nฉันดีใจจริงๆ นะ"
13014-290 = "ขอบคุณนะ...\nที่วันนี้มาอยู่ด้วยกัน"
13014-300 = "สวัสดีปีใหม่นะ ท่านอาจารย์"
13014-310 = "อ้อ ฉันหนาวหรือเปล่าน่ะเหรอ?"
13014-320 = "ฉันกำลังฝึกฝนอยู่น่ะ..."
13014-330 = "ฮัดชิ้ว!"
13014-340 = "เมอร์รีคริสต์มาสนะ ท่านอาจารย์!"
13014-350 = "ถ้าเอาแต่ตัวงอเพราะความหนาว\nมันจะยิ่งไม่ดีนะ!"
13014-360 = "เอาละ! ไปปะทะน้ำเย็นกันเถอะ!"
13014-370 = "ทริกออร์ทรีต!\nใส่ชุดว่ายน้ำรับฮาโลวีน!"
13014-380 = "เป็นยังไงบ้าง...? ตกใจใช่มั้ยล่ะ?"
13014-390 = "เอ่อ...\nถ้าจ้องโดยไม่พูด\nอะไรเลยแบบนั้น..."
13014-400 = "เห็นอย่างนี้ฉันก็\nรวบรวมความกล้ามาเลยนะ..."
13014-420 = "วัยรุ่นเหมือนจะ\nผ่านไปเร็วเลยละ"
13014-430 = "ได้ลุกโชนอย่างรุนแรง\nแต่เดี๋ยวเดียวก็ดับลง..."
13014-440 = "เหมือนประกายไฟนี่เลย"
13014-450 = "ตอนแรกฉันก็\nคิดแบบนั้นนะ"
13014-460 = "คิดว่าถ้าเอาแต่ฝึกฝน\nไปเรื่อยๆ วัยรุ่นก็คงจบลง..."
13014-470 = "แต่ว่าตอนนี้ไม่ใช่อย่างนั้นแล้วละ"
13014-480 = "เพราะพอได้เจอท่านอาจารย์\nก็มีหลายอย่างที่เปลี่ยนไป"
13014-490 = "ฉันรู้สึกสนุก\nและจริงใจกับทุกวัน"
13014-500 = "แน่นอนว่ากาลเวลา\nไม่อาจย้อนคืนได้..."
13014-510 = "แต่ต่อไป\nฉันก็คิดว่าจะสนุก\nกับวัยรุ่นได้เต็มที่นะ"
13014-520 = "ถ้าประกายไฟใกล้จะดับ\nก็แค่เอาฟืนชิ้นใหม่\nมาเติมไฟก็พอ"
13014-530 = "เพราะงั้น ท่านอาจารย์..."
13014-540 = "จะช่วยเป็นวัยรุ่น\nไปด้วยกัน... ใช่มั้ย?"
13014-2600 = "โอ้ว สิ่งนี้ละที่แสดงถึง\nวัยรุ่นกับท่านอาจารย์!\nขอบคุณนะ! ฉันจะรักษาไว้ชั่วชีวิตเลย!"

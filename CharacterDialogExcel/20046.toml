[translation]
20046-10 = "อะฮ่า? Blue Archive~"
20046-20 = "เอาละๆ~ จงมาฟังและดูให้เต็มตา~\nอามาจิ นิยะ หัวหน้าชมรมหยินหยาง\nปรากฏตัวแล้ว~ อะฮะฮ่า!"
20046-30 = "อะฮ่า~ เป็นที่ที่เหมาะกับ\nการโดดงาน~ ไม่สิ\nเหมาะกับการทำงานเลยค่ะ~"
20046-40 = "โฮ่ โฮ่~ คุณครูมีรสนิยม\nแบบนี้สินะ\nได้เรียนรู้สิ่งใหม่เลยนะคะเนี่ย~"
20046-50 = "เหลือเชื่อจริงๆ เลย!\nเป็นภาพที่งดงามจริงๆ เลยค่ะ!\nอะฮะฮ่า!"
20046-60 = "หืม? คาโฮะนี่ขี้สงสัยจัง\nก็โกหกไปแล้วนี่นา\nว่าตั้งใจทำงานอยู่~ อะฮะฮ่า~"
20046-70 = "อันนี้คาโฮะน่าจะชอบ\nส่วนอันนั้น\nชิเซะจังน่าจะชอบนะ..."
20046-80 = "โอ้~ ปกติแล้วฉันจะ\nเป็นฝ่ายทำให้คนอื่นรอ"
20046-90 = "แต่พอได้มารอคนอื่นแบบนี้\nก็แปลกใหม่ดีนะคะ"
20046-100 = "อะฮะฮ่า! ยินดีต้อนรับค่ะ~"
20046-110 = "คุณครู มาแล้วเหรอคะ~"
20046-120 = "เอาละ ถ้างั้นก็~"
20046-130 = "ไปดื่มชาสักถ้วยมั้ยคะ♪"
20046-140 = "อ๊ะ... หรือว่ามันจะ\nเร็วไปนิดหน่อย~ มั้ยคะ?"
20046-150 = "ง่า~ ไม่อยากทำงานเลย~"
20046-160 = "ขนาดงานของชมรมฉันยังไม่ทำ\nแล้วให้ฉันมาทำงานชาเล่ต์เนี่ยนะคะ~"
20046-170 = "ฉันควรทำงานแบบนี้ตอนอยู่\nชมรมหยินหยางด้วยเหรอคะ?"
20046-180 = "มันก็จริงอยู่หรอกค่ะ"
20046-190 = "คุณครูเนี่ย~"
20046-200 = "เป็นคนอย่างนี้สินะคะ~?"
20046-210 = "แหม อย่ามาแกล้งไม่รู้ไม่ชี้เลย!"
20046-220 = "มาเอกเขนกด้วยกันเถอะค่ะ~"
20046-230 = "ค่า~ ค่า~\nฉันกำลังตั้งใจทำงานอยู่ค่ะ~"
20046-240 = "จะ... จริงๆ นะคะ!"
20046-250 = "อืม~ วันนี้\nอากาศข้างนอกดีจังเลยค่ะ~"
20046-260 = "ออกไปเดินเพลิดเพลิน\nกับสายลมด้วยกันมั้ยคะ~"
20046-270 = "ฮุฮุ... ฉันคิด\nแผนการดีๆ ได้น่ะค่ะ"
20046-280 = "คะ? แผนการอะไรน่ะเหรอคะ?"
20046-290 = "ถ้าบอกก่อนก็หมดสนุก\nน่ะสิคะ อะฮะฮ่า~!"
20046-300 = "อ๊ะ คุณครู"
20046-310 = "สุขสันต์วันเกิดค่ะ"
20046-320 = "วันนี้ฉันได้อวยพรให้คุณครู\nที่มีบุญคุณกับฉันตลอดเลย\nช่างเป็นวันที่ดีจังเลยนะคะ"
20046-330 = "อืม~? ไม่เห็นต้อง\nระวังตัวขนาดนั้นก็ได้นี่..."
20046-340 = "ฉันแค่อวยพรจากใจจริงนะคะ..."
20046-350 = "อ่า~ น่าน้อยใจจัง ฮือๆ"
20046-360 = "โอ้โห~"
20046-370 = "วันนี้วันอะไรน้า~"
20046-380 = "ดูจากสีหน้าแล้ว\nคุณครูน่าจะรู้อยู่แล้วนะคะ"
20046-390 = "ในเมื่อเราเป็นคนกันเอง\nงั้นก็ไม่ต้องพูดให้ยืดยาวหรอกค่ะ"
20046-400 = "ฮุฮุฮุ คงเตรียมไว้แล้วสินะคะ\nวันเกิดของขวัญไงคะ?"
20046-410 = "สวัสดีปีใหม่\nขอให้มีความสุขในวันปีใหม่นะคะ"
20046-420 = "ปีนี้ฉันก็ขอ\nฝากเนื้อฝากตัวด้วยนะคะ"
20046-430 = "คะ...? ไม่ค่ะ เห็นฉันอย่างนี้\nแต่เวลาแบบนี้ฉันก็\nทำตัวมีพิธีการอยู่นะคะ"
20046-440 = "วันนี้ขอให้สนุกนะคะ~\nเมอร์รี คริสต์มาส~"
20046-450 = "ตอนขากลับ ฉันว่าจะ\nเอาของขวัญไปฝาก\nรุ่นน้องที่น่ารักด้วยค่ะ อะฮะฮะฮ่า~"
20046-460 = "คะ...? ของขวัญ... ให้ฉันเหรอคะ?"
20046-470 = "เอ่อ... ขะ... ขอบคุณค่ะ"
20046-480 = "อะฮะฮ่า~ นอกเฮียกคิยาโค\nมีประเพณีสนุกๆ เพียบเลยนะคะ"
20046-490 = "คะ? ถ้าไม่มีขนมให้\nก็จะแกล้งกันเหรอคะ?"
20046-500 = "ปกติน่าจะสลับบทบาท...\nกันไม่ใช่เหรอคะ?"
20046-510 = "ฉันไม่มีขนมหรอกค่ะ..."
20046-520 = "ดะ... เดี๋ยวก่อนสิคะ คุณครู!"
20046-540 = "อะ... อะฮะฮ่า...\nเอ่อ~ นี่~ คุณครูขา~?"
20046-550 = "โอ๊ะๆ ดูทำหน้าน่ากลัวเข้าสิ...\nแบบนี้ไม่เหมาะกับคุณครูหรอกนะคะ"
20046-560 = "โกรธกันจริงๆ เหรอคะ~?"
20046-570 = "ไม่สิ... ก็นะ ต่อให้ไม่ต้องถาม\nก็ดูออกค่ะ อะฮ่า..."
20046-580 = "เรื่องนั้นน่ะ ฉัน~\nค่ะ~ ค่า~ ขอโทษค่ะ..."
20046-590 = "แต่ว่า~ จะว่ายังไงดีล่ะ~ พวกฉันก็\nมีเหตุผลส่วนตัวเหมือนกัน~"
20046-600 = "อะฮ่า?! ไม่ค่ะ ไม่เลย!"
20046-610 = "ไม่ใช่อย่างนั้นเลยนะคะ!\nฉันกำลังสำนึกผิดอยู่ค่ะ!"
20046-620 = "ค่ะ... ฉันกำลัง\nสำนึกผิดอยู่จริงๆ..."
20046-630 = "ถ้างั้นก็ยกโทษให้\nสักครั้งไม่ได้เหรอคะ...?"
20046-2600 = "ฉันก็ขอบคุณอยู่หรอกค่ะ... แต่ฉันก็\nกลัวนิดหน่อย~ เพราะไม่รู้ว่าคุณครู\nหวังอะไรจากเด็กสาวคนนี้อีกค่ะ\nแต่ถึงอย่างนั้นฉันก็ทรยศต่อความ\nคาดหวังของคุณครูไม่ได้... อะฮ่า~\nเข้าตาจนจนได้สินะคะ~"

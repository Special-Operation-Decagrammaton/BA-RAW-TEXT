[translation]
20046-10 = "냐앗? 블루 아카이브~"
20046-20 = "자~ 자~ 천하 사람 모두 듣고 보아라~\n음양부 부장, 아마치 니야,\n여기 납시오~ 랄까나, 냐하핫!"
20046-30 = "냐핫~ 땡땡이치기,\n가 아니라~ 시간 보내기\n딱 좋은 장소네요~"
20046-40 = "호오, 호오~ 선생님께서는\n이런 취향이~\n공부가 됩니다, 이거~"
20046-50 = "이거 참 명물!\n실로 장관이네요!\n냐하핫!"
20046-60 = "응? 카호도 참 의심이 많네.\n열심히 일하고 있다,\n고 거짓말해뒀는데~ 냐하하~"
20046-70 = "이건 카호가\n좋아할 것 같고,\n저건 치세 쨩이\n좋아할 것 같고……."
20046-80 = "호오~ 평소에는, 제 쪽에서\n남을 기다리게 하는데."
20046-90 = "이렇게 기다리는 건\n신선한 경험이네요."
20046-100 = "냐하핫! 어서 오십시오~"
20046-110 = "선생님, 오셨습니까~"
20046-120 = "자, 그럼 이제~"
20046-130 = "차 한잔하러 가실까요♪"
20046-140 = "……아핫, 역시\n조~금 이른가요?"
20046-150 = "아~ 일하기 싫다~"
20046-160 = "음양부에서도 안 하는 일을,\n샬레까지 와서 해야 한다뇨~"
20046-170 = "……음양부에서는\n좀 하는 편이 좋다?"
20046-180 = "그렇긴 하죠?"
20046-190 = "냐핫! 역시~"
20046-200 = "선생님도 이쪽이시죠~?"
20046-210 = "에잇, 모른 척하시기는!"
20046-220 = "함께 뒹굴거리자고요~"
20046-230 = "네~ 네~\n열심히 하고 있습니다~"
20046-240 = "지, 진짜라고요!"
20046-250 = "음~ 오늘은\n바깥 경치가 참 좋습니다~"
20046-260 = "함께 거닐면서\n풍류를 즐겨보심이~"
20046-270 = "……후후, 좋은 계획이\n떠올랐습니다."
20046-280 = "네? 뭐냐고요?"
20046-290 = "미리 알면 재미없지\n않습니까, 냐하핫~!"
20046-300 = "아, 선생님."
20046-310 = "생신 축하드립니다."
20046-320 = "언제나 신세 지는 선생님께\n축하드릴 수 있다니, 오늘은\n참 경사로운 날이군요."
20046-330 = "으음~? 그리\n경계하실 필요까지야……."
20046-340 = "순수하게 축하드릴 뿐인데……"
20046-350 = "아~ 슬퍼라. 훌쩍훌쩍."
20046-360 = "오호라~"
20046-370 = "오늘이 무슨 날인지~"
20046-380 = "표정을 보아하니,\n이미 알고 계시는 듯하군요."
20046-390 = "그렇다면, 우리 사이에\n더 긴말은 필요 없겠지요."
20046-400 = "후후후, 준비하셨겠지요,\n생일 선물?"
20046-410 = "근하신년,\n새해 복 많이 받으십시오."
20046-420 = "올 한 해도 모쪼록\n잘 부탁드립니다."
20046-430 = "……네? 아뇨, 저라도\n이런 때는 제대로\n격식 차린답니다?"
20046-440 = "오늘은 즐거운~\n메리 크리스마스~"
20046-450 = "돌아가는 길에,\n귀여운 후배들 선물이나\n챙겨 가렵니다. 냐하하핫~"
20046-460 = "……네? 저한테, 선물이요?"
20046-470 = "……어, 가, 감사합니다."
20046-480 = "냐하하~ 백귀야행 바깥에는\n재밌는 문화가 다 있네요~"
20046-490 = "네? 과자가 없으면\n장난을 치겠다고요?"
20046-500 = "……보통 역할,\n반대 아닌가요?"
20046-510 = "과자는 없는데요……"
20046-520 = "자, 잠깐만요, 선생님?!"
20046-540 = "냐, 냐하하……\n저기~ 요~ 선생님~?"
20046-550 = "어머어머, 무서운 얼굴…….\n선생님께 안 어울린답니다?"
20046-560 = "혹시나……\n정말로 화나셨나요~?"
20046-570 = "아니, 뭐, 알고는\n있습니다만, 아핫……."
20046-580 = "그게 저~ 네~ 네~\n송구합니다……."
20046-590 = "그렇지만~ 뭐라고 할까~\n저희 쪽에도 내부 사정이란 게\n있어서~"
20046-600 = "냐핫?! 아뇨, 아뇨!"
20046-610 = "당치도 않습니다!\n반성하고 있습니다!\n예! 예!"
20046-620 = "네…… 진심으로\n반성하고 있으니까……."
20046-630 = "어떻게, 한 번만\n용서해 주심이……?"
20046-2600 = "……몹시 감사히 여깁니다만, 불초 소녀에게 무엇을 더 바라고 계시는지, 솔직히 조~금 무섭네요. 그렇다 하여도, 다른 이도 아닌 선생님께서 걸어주신 기대를 배반할 수도 없는 노릇이고…… ~냐핫~ 외통수네요~"

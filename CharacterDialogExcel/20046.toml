[translation]
20046-10 = "喵哈？蔚藍檔案～"
20046-20 = "來～來～各位！請睜大眼睛看清楚了♪\n百鬼夜行聯合學園．陰陽部部長，天地仁耶登～場～！\n……開玩笑的啦。喵哈哈！"
20046-30 = "喵哈～\n……稍微喘口氣。\n嗯哼，我可沒在偷懶唷～？"
20046-40 = "老師有這種興趣啊……\n呼呣呼呣。"
20046-50 = "真是令人陶醉的景色呢♪\n喵哈哈！"
20046-60 = "佳穗就是愛操心♪\n我明明有好～好努力\n工作的說……\n雖然是騙人的就是了♪\n喵哈哈！"
20046-70 = "這個是佳穗……\n那個則是會讓知世醬\n開心的吧……"
20046-80 = "哎呀哎呀，您還真是悠哉呢？\n會讓我等的人，\n大概就只有老師了吧♪"
20046-90 = "唔呵呵，感覺還挺新鮮的唷？"
20046-100 = "喵哈！\n歡迎回來，\n開玩笑的♪"
20046-110 = "哎呀，您來啦老師。"
20046-120 = "那麼那麼，\n寒暄就到此為止……"
20046-130 = "要不要來杯茶呢♪"
20046-140 = "……不行嗎？好像\n稍微～早了一點呢，\n喵哈哈！"
20046-150 = "喵～我不想工作啦～"
20046-160 = "為什麼非得跑到\n夏萊工作啊～"
20046-170 = "明明在陰陽部也沒做的說……\n咦～？還是乖乖做比較好～？"
20046-180 = "嗯，也是啦～"
20046-190 = "喵哈，不愧是老師♪"
20046-200 = "嗯哼，老師是我們\n這邊的人，這我\n可是知道的哦～？"
20046-210 = "又來了又來了～\n裝傻也是沒用的唷～？"
20046-220 = "來，一起耍廢吧♪"
20046-230 = "有有有～\n我有在努力唷。"
20046-240 = "是，是真的！"
20046-250 = "嗯～真是適合\n散步的天氣呢。"
20046-260 = "這種日子要不要\n出門享受一下呀～？"
20046-270 = "嗯哼哼……\n我想到了一個好主意。"
20046-280 = "嗯～？您很好奇？"
20046-290 = "聽了就不好玩了唷～？\n喵哈♪"
20046-300 = "呼呣。今天是老師\n誕生的日子──對吧～♪"
20046-310 = "祝您生日快樂～"
20046-320 = "能像這樣親口表達祝福……\n真是美好的一天呢～？"
20046-330 = "嗯～？\n沒必要那麼警戒吧～"
20046-340 = "我明明只是單純\n想祝福您而已……"
20046-350 = "真讓人傷心。嗚嗚。"
20046-360 = "嗯哼哼♪"
20046-370 = "那麼那麼，\n今天是什麼日子呢～？"
20046-380 = "……看來，已經\n不需要我多說了呢～"
20046-390 = "畢竟老師跟我都這麼熟了，\n繼續追問就太不解風情了。"
20046-400 = "嗯哼哼，您有準備好吧？\n生日禮物！"
20046-410 = "謹此──獻上新年的祝福。"
20046-420 = "今年也請多多指教……\n喵哈♪"
20046-430 = "就算是我，在這種時候\n也會注意分寸的唷～？"
20046-440 = "喵哈～今天是快樂的～\n聖誕節～"
20046-450 = "買些禮物給可愛的\n後輩們再回去吧～♪"
20046-460 = "……咦？要送我禮物嗎？"
20046-470 = "……謝，謝謝您。"
20046-480 = "喵哈哈～百鬼夜行之外\n居然有這麼有趣的文化呀～♪"
20046-490 = "嗯～？沒有糖果\n就要惡作劇……？"
20046-500 = "嗯～？立場\n是不是顛倒了啊～？"
20046-510 = "話說我也沒帶\n糖果之類的呀……"
20046-520 = "您，您打算做什麼，老師！？"
20046-540 = "喵，喵哈哈……\n哈囉哈囉～老師～？"
20046-550 = "哎呀哎呀，這可怕的表情……\n並不適合老師唷～？"
20046-560 = "難道說……\n您真的生氣了？"
20046-570 = "不是，呃……\n我其實也知道……\n喵哈……"
20046-580 = "那個……是……\n我很抱歉。"
20046-590 = "不過您想想看，該怎麼說呢～\n我也是有苦衷的嘛～？"
20046-600 = "喵哈！？沒有沒有！"
20046-610 = "怎麼會呢！\n我當然有在反省！真的！"
20046-620 = "沒錯……\n我正誠心地反省……"
20046-630 = "能請您，原諒我嗎……？"
20046-2600 = "……您的心意我很感激。\n不過坦白說，您究竟對我有何期待呢？\n嗯哼哼……不過也不能辜負老師的期待吧？\n實在讓人困擾呢……真的♪"

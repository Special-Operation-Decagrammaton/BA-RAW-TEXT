[translation]
20046-10 = "Nyah? Blue Archive!"
20046-20 = "Now, now! Everyone, gather round and listen! The Yin-Yang Club President, Amachi Niya, is here, nyahaha!"
20046-30 = "Nyahah, the ideal place to slack off— I mean, spend time at!"
20046-40 = "Oho, so this is the kind of thing you enjoy, Sensei... This has been educational!"
20046-50 = "This is incredible! What a sight! Nyahaha!"
20046-60 = "Huh? Kaho is too suspicious. I already lied to her that I'm working hard! Nyahaha!"
20046-70 = "Kaho will like this, and Chise that..."
20046-80 = "Ho. I'm usually the one keeping others waiting."
20046-90 = "This role reversal is a rather fresh experience!"
20046-100 = "Nyahaha! Welcome!"
20046-110 = "You're here, Sensei!"
20046-120 = "Now then..."
20046-130 = "Time for a cup of tea! ♪"
20046-140 = "...Aha. I suppose it's a taaad early."
20046-150 = "Ahhh! I don't waaant to work!"
20046-160 = "Why am I being forced to do things for Schale that I would never do for the Yin-Yang Club?!"
20046-170 = "...I should be doing this for the Yin-Yang Club as well?"
20046-180 = "I suppose so!"
20046-190 = "Nyaha! As expected..."
20046-200 = "Sensei, you're this type of person too, yes?"
20046-210 = "Eh, stop playing dumb!"
20046-220 = "Let's slack off together!"
20046-230 = "Yeap, yeap. I'm working hard."
20046-240 = "I-I mean it!"
20046-250 = "Mmm... It looks beautiful out today."
20046-260 = "We should go for a walk to enjoy this luxury!"
20046-270 = "...Fufu, I've had an ingenious idea."
20046-280 = "Hm? What is it?"
20046-290 = "It would be no fun if you knew beforehand, nyahaha!"
20046-300 = "Ah. Sensei."
20046-310 = "Happy birthday."
20046-320 = "What a wonderful day. I can finally repay you for all the help you've given me."
20046-330 = "Hm? Please don't regard me so suspiciously..."
20046-340 = "It was a heartfelt birthday wish."
20046-350 = "Ah, how sad... Boo hoo."
20046-360 = "Oho."
20046-370 = "Looking at your face..."
20046-380 = "...you're already aware of what today is."
20046-390 = "Well then, there's no need for further discussion."
20046-400 = "Fufu, did you prepare my birthday gift?"
20046-410 = "I wish you a happy New Year, Sensei."
20046-420 = "I look forward to working with you this year as well."
20046-430 = "...What? I can conduct myself formally when the situation calls for it..."
20046-440 = "A very, merry Christmas to you today!"
20046-450 = "I'll get gifts for my cute underclassmen on my way back. Nyahahaha!"
20046-460 = "...What? A gift for me?"
20046-470 = "...Uh, th-thank you."
20046-480 = "Nyahaha, there are all sorts of interesting traditions outside of Hyakkiyako."
20046-490 = "What? You'll pull a trick if you don't get any treats?"
20046-500 = "...Have our roles reversed somehow?"
20046-510 = "I don't have any treats..."
20046-520 = "H-Hold on, Sensei?!"
20046-540 = "N-Nyahaha... Um, Sensei?"
20046-550 = "Oh wow, that's a scary face... It doesn't suit you, you know?"
20046-560 = "...Are you actually angry?"
20046-570 = "I mean, well, I can already tell but, aha..."
20046-580 = "So, um... Yeah, I... I apologize..."
20046-590 = "But still, how should I put this...? We all have our reasons for what we do..."
20046-600 = "Eh?! No, no!"
20046-610 = "I'm not making excuses! I'm self-reflecting! Uh-huh, uh-huh!"
20046-620 = "Yeah... I'm totally self-reflecting right now."
20046-630 = "So, how about you forgive me this one time?"
20046-2600 = "...I'm very grateful, but I'm just a bit apprehensive of what more you could possibly expect from me. Even so, if it's you, I suppose I have to live up to those expectations. Nyahaha, checkmate it is."

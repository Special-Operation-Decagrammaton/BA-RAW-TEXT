[translation]
13013-10 = "Blue Archive!"
13013-20 = "อะกิอิซุมิ โมมิจิจากชมรมแนวร่วมปลดปล่อยความรู้\nสถาบันสหภาพเรดวินเทอร์ค่ะ... มาร่วมกันต่อสู้...\nเพื่อรักษาความรู้ทั้งหมดในโลกนี้ไว้กันเถอะค่ะ!"
13013-30 = "...บางทีที่นี่ อาจจะมี\nหนังสือหายากที่ยังไม่เคย\nมีใครค้นพบอยู่ก็ได้..."
13013-40 = "ที่นี่เหมาะกับ\nการอ่านหนังสือจัง"
13013-50 = "ขอพักงีบแป๊บหนึ่ง\nได้มั้ยคะ..."
13013-60 = "อยากไปหาซื้อ...\nหนังสือใหม่จังเลยค่ะ..."
13013-70 = "ที่นี่... เหมือนเป็นที่ที่เหมาะ\nจะขลุกตัวอยู่เลย แต่ดูอีกทีก็\nเหมือนจะไม่เหมาะแฮะ...?"
13013-80 = "อ๊ะ คุณครู! แหะๆ...\nฉันกำลังรออยู่เลยค่ะ!"
13013-90 = "อ๊ะ... เรียกฉันเหรอคะ?"
13013-100 = "ขะ...ขออีกหนึ่งนาทีนะคะ!\nขออ่านหน้านี้ให้จบก่อนนะคะ...!"
13013-110 = "ฉันชอบหนังสือสวยๆ ค่ะ\nแค่ได้มองก็มีความสุขแล้วค่ะ"
13013-120 = "หนังสือที่มีร่องรอย\nการเปิดอ่านก็ชอบนะคะ\nเพราะมันคือประวัติศาสตร์\nที่ผ่านมาของหนังสือเล่มนั้นค่ะ"
13013-130 = "ระหว่างอ่านกับสะสมหนังสือ\nฉันชอบแบบไหนมากกว่ากัน\n...งั้นเหรอคะ?"
13013-140 = "ฮืออ... ต้องเลือกอย่างใดอย่างหนึ่ง\nด้วยงั้นเหรอคะ...?"
13013-150 = "คำร้องซื้อหนังสือที่ยื่นไป\nที่สำนักเลขาธิการ\nถูกปฏิเสธอีกแล้วค่ะ..."
13013-160 = "แต่ถึงยังไง\nฉันก็ไม่ยอมแพ้หรอกค่ะ…!"
13013-170 = "พล็อตเรื่องหักมุม\nอย่างคาดไม่ถึง อืม..."
13013-180 = "อ๊ะ คุณครู?!"
13013-190 = "ขะ... ขอโทษค่ะ!\nฉันไม่ทันเห็นคุณครูเลย..."
13013-200 = "ฉากจบที่สมหวัง...\nจากเนื้อเรื่องสุดประทับใจ...\nยอดเยี่ยมมากเลยใช่มั้ยล่ะคะ?!"
13013-210 = "แต่ในความเป็นจริงมันเป็น\nเรื่องที่ยากมากเลยนะคะ..."
13013-220 = "สุขสันต์วันเกิดค่ะ คุณครู"
13013-230 = "ฉันเอาหนังสือที่อยากแนะนำ\nให้คุณครูมาด้วยค่ะ..."
13013-240 = "สนใจมาอ่านด้วยกันมั้ยคะ?"
13013-250 = "คะ...คุณครู\nจำวันเกิดฉันได้ด้วยเหรอคะ?!"
13013-260 = "ทะ...ทำยังไงดีคะ?!\nฉันไม่มีอะไร\nที่จะตอบแทนคุณครูได้เลย...!"
13013-270 = "ไม่ต้องทำแบบนั้นเหรอคะ?\nฉันแค่รับของขวัญมาอย่างเดียว\nก็พองั้นเหรอคะ...?"
13013-280 = "อะ...เอาแบบนั้นเหรอคะ…\nระ...เรื่องนี้เป็นเรื่องใหม่สำหรับฉัน..."
13013-290 = "สุขสันต์วันปีใหม่ค่ะ\nคุณครู!"
13013-300 = "ถะ...ถ้าคุณครูสะดวกละก็\nมาใช้เวลาในวันปีใหม่กับ\nชมรมแนวร่วมปลดปล่อยความรู้\nดีมั้ยคะ?"
13013-310 = "เมอร์รีคริสต์มาสค่ะ คุณครู!"
13013-320 = "ถ้าขอของขวัญ\nจากคุณลุงซานต้าได้ละก็..."
13013-330 = "ฉันอยากจะขอเป็นหนังสือ\nฉบับตีพิมพ์ครั้งแรกที่ตามหาอยู่ค่ะ"
13013-340 = "เทศกาลฮาโลวีน... มักมีคน\nเอาไปทำเป็นพล็อตการ์ตูนบ่อยๆ ค่ะ"
13013-350 = "วันที่วิญญาณมารวมตัวกัน\nเป็นพล็อตที่เอาไปเขียน\nได้ง่ายสินะคะ?"
13013-370 = "คุณครู! ในที่สุดฉันก็เจอแล้วค่ะ!"
13013-380 = "ไม่มีหน้าที่ขาดชำรุดเลย...\nแถมภาพวาดพิเศษก็ยังอยู่ครบถ้วน"
13013-390 = "หนังสือฉบับตีพิมพ์พิเศษ\nจำนวนจำกัดละค่ะ!"
13013-400 = "บางที... ทั้งชีวิตของฉัน\nอาจจะเฝ้ารอช่วงเวลา"
13013-410 = "ที่จะได้มาเจอกับหนังสือ\nพิเศษเล่มนี้ก็ได้ค่ะ"
13013-420 = "แหะๆๆ... ทั้งหมดนี้\nคงต้องขอบคุณคุณครู\nที่คอยช่วยเหลือฉันค่ะ"
13013-430 = "ถ้าอยู่กับคุณครูละก็...\nรู้สึกเหมือนจะมีเรื่องดีๆ\nเกิดขึ้นเลยค่ะ"
13013-440 = "เพราะงั้น...\nคือว่าคุณครูคะ"
13013-450 = "ถ้าคุณครูไม่ว่าอะไรละก็...\nเอ่อ... อาจไม่ต้องทุกวันก็ได้..."
13013-460 = "ขอแค่... บางครั้งก็ได้ค่ะ..."
13013-470 = "ช่วยแวะมาที่ชมรม\nแนวร่วมปลดปล่อยความรู้\nของเราบ้างนะคะ..."
13013-2600 = "ฉันจะใช้มัน...เพื่อคุณครูค่ะ\n...ถ้างั้นเริ่มจากทำให้อะไร\nเงียบลงก่อนดีกว่าคะ?"

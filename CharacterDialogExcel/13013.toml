[translation]
13013-10 = "블루, 아카이브"
13013-20 = "붉은겨울 연방학원, 지식해방전선의 아키이즈미, 모미지예요……\n세상의 모든 지식을 지키기 위해…… 함께 싸우죠!"
13013-30 = "……어쩌면 여기 어딘가에,\n세상에 나오지 않은\n희소한 책이 있을지도……"
13013-40 = "여기는,\n독서하기 딱 좋은 장소네요."
13013-50 = "조금만, 자도 될까요……"
13013-60 = "신간……\n구하고 싶네요……"
13013-70 = "이 장소……\n틀어박혀 있기 좋은 곳\n같으면서도, 아닌 것\n같기도 한……?"
13013-80 = "아, 선생님! 에헤헤……\n기다리고 있었어요!"
13013-90 = "앗! 절, 부르셨나요?"
13013-100 = "앞, 앞으로 1분만요!\n이 페이지만 읽게 해 주세요……!"
13013-110 = "예쁜 책은, 좋아요.\n바라만 봐도 행복해지니까요."
13013-120 = "손때 묻은 책도 좋아요.\n그 책이 지나온 역사니까요."
13013-130 = "읽는 것과 수집하는 것 중\n어느 쪽이 더 좋으냐, 고요……?"
13013-140 = "우우…… 그거,\n둘 중 하나 골라야만 하나요……?"
13013-150 = "사무국에 장서를 신청했는데\n또 기각되었어요……"
13013-160 = "하지만,\n저는 포기하지 않을 거예요……!"
13013-170 = "여기에서 그런 전개를……?\n으음……"
13013-180 = "핫, 선생님?!"
13013-190 = "죄, 죄송해요!\n눈치채지 못했어요……"
13013-200 = "감동적인 전개에서\n꿈을 이루는 장면……\n멋지다고 생각하지 않으세요?!"
13013-210 = "현실에서는,\n상당히 어려운 일이지만요……"
13013-220 = "생일, 축하드려요. 선생님."
13013-230 = "선생님을 위해……\n추천하는 책을 가져왔어요."
13013-240 = "함께 읽지 않으시겠어요?"
13013-250 = "제, 제 생일,\n기억해 주신 건가요?!"
13013-260 = "어, 어떡하죠?!\n전, 보답해 드릴 게\n없는데……!"
13013-270 = "아니라고요?\n저는, 받기만 하면\n된다고요……?"
13013-280 = "그, 그건 그런데요,\n그게, 이런 일은, 처음이라……"
13013-290 = "새해 복 많이 받으세요.\n선생님."
13013-300 = "그…… 괜찮으시다면,\n설날은, 저희 지식해방전선과\n함께 보내시는 건 어떠세요?"
13013-310 = "메리 크리스마스에요, 선생님!"
13013-320 = "만일 산타에게 크리스마스 선물을\n부탁드릴 수 있다면……"
13013-330 = "계속 찾고 있는 책의 초판이\n좋을 것 같아요……"
13013-340 = "할로윈은, 만화의 소재가\n되는 경우가 많죠."
13013-350 = "역시 유령이 모이는 날은,\n창작의 소재로 삼기 쉬운 걸까요?"
13013-370 = "선생님! 드디어 찾았어요!"
13013-380 = "상해 있는 페이지도 없고,\n특전 일러스트도 제대로\n들어가 있는,"
13013-390 = "한정판이에요!"
13013-400 = "어쩌면 저는…… \n이 한 권을 만나기 위해,"
13013-410 = "여기에 이끌려 온 것인지도 몰라요."
13013-420 = "에헤헤…… 이것도,\n선생님께서 지켜봐 주신 덕분이네요."
13013-430 = "선생님과 함께 있으면……\n신기하게도 좋은 일이\n일어나요."
13013-440 = "그러니까……\n저…… 선생님."
13013-450 = "괜찮으시다면……\n그, 매일은, 아니더라도……"
13013-460 = "가끔씩이라도, 좋으니까요……"
13013-470 = "저희 지식해방전선을,\n찾아와 주세요……"
13013-2600 = "선생님을 위해서…… 사용할게요.\n……그러면, 무엇부터 조용히 시킬까요."

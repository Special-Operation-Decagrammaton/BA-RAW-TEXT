[translation]
13008-20 = "ฉันชื่อคุโรมิ เซริกะ\nถ้าจะร่วมทางกับฉันละก็ ทำตัวให้ดีด้วยนะ เข้าใจมั้ย?"
13008-30 = "ฮืมม\nหรือว่าฉันควรจะพูด\nให้อ่อนหวานกว่านี้นะ?"
13008-40 = "ยังไม่ถึงเวลา\nไปทำงานพาร์ทไทม์เลยนี่"
13008-50 = "ที่นี่จะรับสมัครงาน\nพาร์ทไทม์มั้ยนะ?"
13008-60 = "ว้าว! ตื่นเต้นจัง!"
13008-70 = "ฮิฮิฮิ..."
13008-80 = "เข้ามาสิคุณครู\nกำลังรออยู่เลย"
13008-90 = "ปะ... เปล่าสักหน่อย!\nฉันไม่ได้เอาแต่รออยู่หรอกนะ!"
13008-100 = "ตั้งใจทำงานให้เหมือนที่ฉันทำล่ะ"
13008-110 = "แล้วฉันจะช่วย... อีกแรง"
13008-120 = "ฉันกำลังรอคำสั่งอยู่น่ะ\nมีอะไรให้ช่วยงั้นเหรอ?"
13008-130 = "เอาแต่นั่งนิ่งอยู่ได้\nมีงานที่ต้องทำไม่ใช่เหรอ?"
13008-140 = "(ฉันมาอยู่ข้างๆ แบบนี้แล้ว\nช่วยสนใจกันหน่อยไม่ได้รึไง...)"
13008-150 = "ไม่ชอบทำอะไรหักโหมงั้นเหรอ?\nแต่ถ้าจำเป็นก็วานฉันได้เลยนะ"
13008-160 = "คือว่า... สะ.. สุขสันต์วันเกิดนะ\nขอบคุณที่อยู่ด้วยกันมาตลอดเลย"
13008-170 = "ยะ... อย่าหัวเราะสิ!"
13008-180 = "ฮะ? วันเกิดงั้นเหรอ...?\nขะ... ขอบคุณนะ\nจำวันเกิดฉันได้ด้วยเหรอเนี่ย..."
13008-190 = "ฮิฮิ!"
13008-200 = "วันนี้วันปีใหม่...\nไปไหว้ศาลเจ้าดีไหมนะ...?"
13008-210 = "เปล่านะ! ไม่ได้บอกสักหน่อย\nว่าอยากให้ไปด้วยกัน!"
13008-220 = "เมอร์รีคริสต์มาส~\nถึงจะเป็นวันพิเศษ\nแต่คุณครูก็ไม่ได้ไปไหนใช่ไหม?"
13008-230 = "อยู่คนเดียวมันน่าเศร้าเนอะ...\nถ้างั้นฉันจะอยู่ด้วยก็แล้วกัน!"
13008-240 = "อ๊ะ!\nมะ... ไม่ได้กลัวเลยสักหน่อย!"
13008-250 = "ฉันไม่กลัวหรอก\nทั้งลูกกวาดรูปลูกตา\nแล้วก็หัวฟักทองอะไรนั่น!!"
13008-270 = "(เราต้องพยายามให้ถึงที่สุด\nจะปล่อยให้เมืองนี้\nหายไปไม่ได้เด็ดขาด...)"
13008-280 = "ก็ตอนนี้...\nมีผู้ใหญ่ที่วางใจได้แล้วนี่..."
13008-290 = "คุณครู มานี่หน่อยสิ\nเล่นชิงช้าด้วยกันไหม?"
13008-300 = "ฮ่าๆ ล้อเล่นน่า\nแบบนี้มันคงจะเกินไปหน่อยสินะ"
13008-310 = "นี่! ฟังฉันอยู่ไหม?\nตอนนี้บรรยากาศตึงเครียดสุดๆ เลยนะ"
13008-320 = "จริงๆ เลยนะ..."
13008-330 = "หืม? ขอบคุณที่\nพยายามอย่างหนักงั้นเหรอ"
13008-340 = "นี่รู้เรื่องที่ฉันพยายาม\nทำด้วยเหรอ อะไรกัน..."
13008-350 = "พะ... พูดอะไรน่ะ?!\nทำไมจู่ๆ ก็มาปลอบกัน?!"
13008-360 = "ฝะ... ฝุ่นน่ะ!\nฝุ่นที่ไหนมาเข้าตาเนี่ย...!"
13008-370 = "(แต่ถ้าไม่มีคุณครูล่ะก็...\nฉันก็คงอาจยอมแพ้\nไปตั้งนานแล้วก็ได้)"
13008-380 = "มะ... มีอะไรเหรอ?!\nทำไมถึงจ้องแบบนั้น..."
13008-390 = "จะแกว่งชิงช้าให้งั้นเหรอ?"
13008-400 = "มะ... ไม่เป็นไร!\nถ้ามีคนเห็นเข้าจะทำยังไง!"
13008-410 = "ถึงตอนนี้จะไม่มีใครอยู่ก็เถอะ!!"
13008-420 = "ถ้าคนอื่นรู้เรื่องที่เรามาเดต\nสองต่อสองกับคุณครูแบบนี้\nจะทำยังไงดีนะ..."
13008-2600 = "ดีละ ถ้าเป็นอันนี้ละก็\nคงจะเป็นประโยชน์กับทุกๆ คนได้แน่!"

[translation]
13008-20 = "I'm Kuromi Serika, and there will be no slacking on my watch. Understood?"
13008-30 = "Hmm. Maybe I should've been more friendly."
13008-40 = "Do I need to head to my part-time job already? ...No, not yet."
13008-50 = "I wonder if anywhere nearby is looking for part-timers..."
13008-60 = "Wow! I'm so excited..."
13008-70 = "Ahaha!"
13008-80 = "Welcome, Sensei. I was waiting for you."
13008-90 = "Don't give me that look! I haven't been waiting THAT long!"
13008-100 = "At least work hard when you know I'm watching."
13008-110 = "...Let me give you a hand."
13008-120 = "Shouldn't you be doing something instead of sitting around?"
13008-130 = "I get slacking off can be fun sometimes, but don't you have work to be doing?"
13008-140 = "(I'm right next to you. Throw me a bone, will you...?)"
13008-150 = "Overworking isn't healthy, so you can lean on me if you need to."
13008-160 = "Um, h-happy birthday. Thank you for always looking out for me."
13008-170 = "...Don't laugh!"
13008-180 = "Huh? Birthday? Th-Thanks. You...remembered..."
13008-190 = "Teehee!"
13008-200 = "A new year. Visiting a temple might be nice..."
13008-210 = "Ah, I never said I wanted to go with you!"
13008-220 = "Merry Christmas! You don't have any plans today, do you?"
13008-230 = "Being alone on a day like today would be sad, so I'll keep you company!"
13008-240 = "Eek! I mean—no! Don't get the wrong idea!"
13008-250 = "Eyeball candies and jack-o'-lanterns aren't even a little s-scary!"
13008-270 = "(I have to keep doing everything I can. I don't want this town to just disappear...)"
13008-280 = "At the very least, it's nice...h-having an adult to rely on..."
13008-290 = "Sensei, come here. Wanna join me?"
13008-300 = "Haha. I'm only kidding. I don't think it can fit both of us."
13008-310 = "Hey, are you listening to me? I'm serious."
13008-320 = "Honestly."
13008-330 = "What was that? You think I've been through a lot?"
13008-340 = "You know how hard I'm trying? What do you mean...?"
13008-350 = "What...are you talking about?! Don't try to comfort me!"
13008-360 = "It's nothing... I just have...dust in my eyes. That's it!"
13008-370 = "(But, if it weren't for Sensei...I might not have made it this far.)"
13008-380 = "Huh...? Why are you staring?! Do I have something on my face...?"
13008-390 = "What? You wanna push the swing for me?"
13008-400 = "No... You don't have to do that! What if someone sees us?!"
13008-410 = "I mean...there's no one around, but still!"
13008-420 = "I-If people find out that I'm on a date with Sensei like this..."
13008-2600 = "Good, this can help everyone a little bit!"

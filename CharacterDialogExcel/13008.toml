[translation]
13008-20 = "我是黑見茜香。\n話先說在前頭，既然和我一起，\n就要認真做喔？"
13008-30 = "唔嗯，\n應該稍微對他\n溫柔一點比較好嗎？"
13008-40 = "打工的時間…\n好像還沒到。"
13008-50 = "這邊，有沒有\n人在找工讀生呢…"
13008-60 = "哇！真開心…"
13008-70 = "啊哈哈。"
13008-80 = "歡迎你來，老師。\n我在等你哦。"
13008-90 = "…不對不對！\n才沒有在等你！"
13008-100 = "至少我在的時候\n要認真工作唷。"
13008-110 = "…我也會幫你的。"
13008-120 = "我正在待命。\n有什麼事嗎？"
13008-130 = "我說你啊，既然這麼閒的話，\n就快去做該做的事啊！"
13008-140 = "（我就在這麼近的地方，\n　稍微在意我一下嘛…）"
13008-150 = "太勉強也不好唷？\n需要的話，我幫你也可以唷。"
13008-160 = "那個，生，生日快樂。\n還有，謝謝你總是陪在我身邊。"
13008-170 = "…不，不要笑啦！"
13008-180 = "咦？生日。\n謝…謝謝。\n你有…記得啊…"
13008-190 = "耶嘿嘿！"
13008-200 = "新年啊…\n要不要去新年參拜…"
13008-210 = "才，才沒有想要\n一起去的意思哦！？"
13008-220 = "聖誕快樂～\n反正老師在聖誕節\n也很閒對吧？"
13008-230 = "孤單一人感覺有點可憐…\n今天我就陪你吧！"
13008-240 = "噫！\n我，我一點也不怕哦？"
13008-250 = "不管是眼珠糖果\n還是南瓜頭\n我都完全不怕哦？"
13008-270 = "（只能更加努力了。\n不能坐視這座城鎮消失…）"
13008-280 = "現在…\n還有可以依靠的大人…"
13008-290 = "老師，過來這邊。\n要和我一起坐嗎？"
13008-300 = "…啊哈哈，開玩笑的。\n再怎麼說那也是做不到的吧。"
13008-310 = "那個～你有在聽嗎？\n我現在很嚴肅呢。"
13008-320 = "……真是的。"
13008-330 = "……嗯？辛苦了？"
13008-340 = "你說你很清楚我有多努力，\n那是怎樣……"
13008-350 = "你，你在說什麼！？\n不要突然安慰我！！"
13008-360 = "這，這不是那樣的，\n只是因為眼睛裡有灰塵…！"
13008-370 = "（不過要不是因為老師的話…\n我說不定早就放棄了）"
13008-380 = "怎，怎麼！？\n為什麼那樣看著我……？"
13008-390 = "你要推我？"
13008-400 = "沒，沒關係才怪！\n被別人看到的話怎麼辦！"
13008-410 = "…什，什麼都沒有啦！！"
13008-420 = "像，像這樣\n和老師單獨約會的樣子\n被人看到的話…"
13008-2600 = "好，這樣的話\n多少可以幫上大家的忙了！"

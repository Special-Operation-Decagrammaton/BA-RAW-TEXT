[translation]
13008-20 = "쿠로미 세리카야.\n말해두겠지만 내가 함께하는 이상 제대로 해야 한다고?"
13008-30 = "흐음.\n조금은 다정하게\n대해줄 걸 그랬나."
13008-40 = "알바갈 시간은….\n아직이네."
13008-50 = "여기, 아르바이트\n구하지 않으려나…."
13008-60 = "와아! 신난다…."
13008-70 = "아하하-"
13008-80 = "어서와, 선생님.\n기다리고 있었어."
13008-90 = "…아니아니!\n오래 기다린건 아니야!"
13008-100 = "내가 있을 때만큼은 착실하게 일해."
13008-110 = "…나도 도울테니까."
13008-120 = "지금 대기 중이야.\n볼일이라도 있어?"
13008-130 = "당신 말야. 한가한 것도 좋지만\n할 일이 쌓여있지 않아?"
13008-140 = "(내가 이렇게 옆에 있는데\n관심을 좀 가져달라고….)"
13008-150 = "너무 무리하는 것도 좋지 않다구?\n필요하다면 나를 활용해도 괜찮아."
13008-160 = "저기, 새, 생일 축하드립니다.\n언제나 함께 있어줘서 고마워요."
13008-170 = "…웃지 마!"
13008-180 = "에? 생일.\n고… 고마워.\n기억해… 주었구나…."
13008-190 = "헤헤!"
13008-200 = "새해라….\n참배라도…."
13008-210 = "아, 딱히 같이 가고 싶다는\n말은 아니었거든?!"
13008-220 = "메리 크리스마스~\n선생님은 어차피,\n크리스마스에도 한가하겠지?"
13008-230 = "혼자는 불쌍하니까….\n오늘만 어울려줄게!"
13008-240 = "히익!\n그, 그러니까 하나도 안무섭거든?"
13008-250 = "눈알 사탕이든\n호박 머리든\n진짜 하나도 안 무섭거든?!"
13008-270 = "(최선을 다하는 수밖엔 없어.\n이 마을을 사라지게\n둘 순 없으니까….)"
13008-280 = "지금은….\n의지할 어른도 있으니까…."
13008-290 = "선생님, 이리 와. 나랑 같이 탈까?"
13008-300 = "…아하하, 농담이야.\n아무리 그래도 그건 무리지."
13008-310 = "저기, 듣고 있어?\n지금 엄청 진지한 분위기라고."
13008-320 = "…정말이지."
13008-330 = "…응? 고생 많았다고?"
13008-340 = "내가 노력하는 걸\n알고 있다니 무슨…"
13008-350 = "무, 무슨 소리야?!\n갑자기 위로하지 마!!"
13008-360 = "이, 이건 눈에 먼지가\n들어간 것 뿐이니까…!"
13008-370 = "(그래도 선생님이 아니었으면….\n나는 훨씬 더 전에\n포기했을 지도 몰라.)"
13008-380 = "뭐, 뭐야?! 왜 그렇게 빤히…."
13008-390 = "밀어주겠다고?"
13008-400 = "괘, 괜찮아!\n누가보면 어쩌려고 그래!"
13008-410 = "…아, 아무도 없긴 하지만 그래도!!"
13008-420 = "이, 이렇게 선생님과 단둘이\n데이트하고 있는 걸\n들켜버리면…."
13008-2600 = "좋아, 이걸로 좀 더 모두에게\n도움이 될 수 있을 거야!"

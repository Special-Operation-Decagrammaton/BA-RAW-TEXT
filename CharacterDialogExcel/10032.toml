[translation]
10032-10 = "Blue Archive！"
10032-20 = "啊哈哈！久等了，老師！\n今年也會盡～情的，和我玩吧？"
10032-30 = "好想和大家打羽根突啊～"
10032-40 = "要和老師玩什麼呢～♪"
10032-50 = "福來笑門～♪"
10032-60 = "發現玩具～♪"
10032-70 = "向老師撒嬌的話，\n可以拿到紅包嗎？"
10032-80 = "為了從新年就在努力的老師，\n無月醬來了唷～！"
10032-90 = "歡迎回來老師～♪\n我一～直在等你唷♡"
10032-100 = "老師老師，\n今天要玩什麼呢？"
10032-110 = "猜拳？踢罐子？\n還是……"
10032-120 = "捉．迷．藏？"
10032-130 = "啊，不過我知道唷。\n不能總是在玩對吧？\n因為是大人，得要工作才行。"
10032-140 = "在這裡我有個NICE的提案～……"
10032-150 = "讓我來幫你吧！"
10032-160 = "嗯……\n是因為這種打扮嗎～？\n感覺有點鼓起了幹勁？"
10032-170 = "快點快點老師，加油！\n趕快把工作結束，\n然後盡情地玩吧！"
10032-180 = "沒想到會和老師\n相處那～麼久……"
10032-190 = "這該不會已經是，命運！？"
10032-200 = "生日快樂～老師！\n我有確實記得唷！"
10032-210 = "在老師的生日，\n要和我一～直玩的約定，\n我也不會忘記的！咯呵呵♪"
10032-220 = "我的生日，\n你要幫我慶祝嗎？"
10032-230 = "咯呵呵！那麼，\n要讓你做什麼呢～……？"
10032-240 = "嗯……這樣的話，\n兩個人去做什麼惡作劇吧！\n一起的話絕對很開心唷！"
10032-250 = "新年快樂，老師！\nHappyNewYear～！\nBonane～！ Küchen．Tag！！"
10032-260 = "嗯？最後的搞錯了？\n啊哈，完全正確～！"
10032-270 = "在新年前，今天是\n聖誕節唷老師！"
10032-280 = "咯呵呵，今天也想和老師盡情地玩呢！"
10032-290 = "Trick．or．Treat～！\n就是這樣，\n我要把老師吃掉了哦～♪"
10032-300 = "咦～？不行嗎～？"
10032-320 = "啊哈，可～惜！\n是我贏囉，老師！"
10032-330 = "咯呵呵，\n你至今為止的奮鬥，\n我給予肯定～……"
10032-340 = "但勝負的世界是很殘酷的。\n這也是沒辦法的吧？咯呵♪"
10032-350 = "那麼，\n畫什麼好呢？\n圈圈？叉叉？\n還是有其他更好的？"
10032-360 = "現在老師說出口的話，\n什麼我都聽唷？"
10032-370 = "啊，我改變主意了。\n如果只畫個普通的記號，\n有點不太夠……"
10032-380 = "我要塗滿整張臉！"
10032-2600 = "啊哈哈，不錯不錯！\n這樣或許能玩得更開心！"

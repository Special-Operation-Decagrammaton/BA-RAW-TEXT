[translation]
10032-10 = "블루 아카이브!"
10032-20 = "아하핫! 기다렸지, 선생님!\n올해도 자안-뜩, 나랑 놀아주기야~?"
10032-30 = "다 같이 모여서\n하네츠키 하고 싶다아~"
10032-40 = "선생님하고\n뭘 하고 놀까~나~♪"
10032-50 = "웃으면 복이 온대~♪"
10032-60 = "장난감~ 발-견~♪"
10032-70 = "선생님한테 어리광\n부리면, 세뱃돈 받을 수\n있지 않으려나~?"
10032-80 = "새해부터 열심히 일하는\n선생님을 위해,\n무츠키 쨩이 와줬다구~!"
10032-90 = "어서 와~ 선생님~\n계~속 기다리고 있었어♡"
10032-100 = "선생님 선생님,\n오늘은 뭘하고 놀까?"
10032-110 = "가위바위보?\n깡통차기~? 아니면…."
10032-120 = "숨.바.꼭.질~?"
10032-130 = "아~ 맞다. 선생님,\n그래도 놀기만 하면 안돼~?\n어른이니까. 일도 해야지?"
10032-140 = "거기서 나이스한\n제안이 있는데~"
10032-150 = "…내가 도와줄게!"
10032-160 = "응~ 이런 모습이라 그런가~?\n뭔가 평소보다 살짝,\n기합이 들어갔을지도~?"
10032-170 = "자자, 선생님, 힘내!\n빨리 일 끝내고 잔뜩 놀자!"
10032-180 = "선생님하고 이-렇게나\n오랫동안 놀 수 있을 줄이야…."
10032-190 = "이래서야 이미, 운명일지도!?"
10032-200 = "생일 축하해-, 선생님!\n확-실하게\n기억하고 있었다구!"
10032-210 = "선생님의 생일도,\n나랑 매일 놀아준다는 약속도,\n절대로 잊지 않으니까~ 쿠후훗♪"
10032-220 = "내 생일을 축하해주고 싶다고~?"
10032-230 = "쿠후훗!\n그럼, 뭘 선물로 받을까~?"
10032-240 = "응-, 그럼 둘이서\n뭔가 장난을 치러 가자!\n같이 장난을 치면\n엄청 즐거울 거야!"
10032-250 = "새해 복 많이 받아, 선생님!\n해피 뉴 이어! 보나네~!\n쿠텐, 탁!"
10032-260 = "응? 마지막은 틀렸다고?\n아핫, 정답이야~!"
10032-270 = "새해에 앞서, 오늘은\n메리 크리스마스야. 선생님!"
10032-280 = "쿠후후, 오늘도 선생님이랑\n잔뜩 놀고 싶네!"
10032-290 = "트릭 오어 트릿~!\n선생님을 먹 어 버 릴 테 다~♪"
10032-300 = "응~? 먹으면 안 돼~?"
10032-320 = "아핫~ 아쉽게 되었네,\n내 승리야~ 선생님!"
10032-330 = "쿠후훗, 마지막까지\n필사적이었던 건\n칭찬해주겠지만…."
10032-340 = "승부의 세계란\n냉정한 법이니까.\n어쩔 수 없지? 쿠훗♪"
10032-350 = "자, 뭘 그려볼까나~?\n동그라미? 가위?\n아니면 다른 게 좋아?"
10032-360 = "지금이라면 선생님의 취향,\n뭐든지 맞춰줄 수 있다고?"
10032-370 = "앗, 그치만 생각이 바뀌었어.\n평범한 걸로는 살짝\n부족하니까……."
10032-380 = "이대로 얼굴에\n잔뜩 칠해버려야지!"
10032-2600 = "아하핫~ 좋아좋아!\n이거라면 좀 더 재밌게 놀 수 있을지도~!"

[translation]
10032-10 = "Blue Archive"
10032-20 = "ฮ่าฮ่าฮ่า! รอเค้าอยู่ใช่มั้ย คุณครู!\nปีนี้ก็มาเล่นสนุกกันอีกเยอะๆๆ เลยน้า~"
10032-30 = "อยากให้ทุกคนมารวมกัน\nแล้วมาเล่นฮาเนะสึกิ\nด้วยกันจัง~"
10032-40 = "เค้าจะเล่นอะไร\nกับคุณครูดีน้า~♪"
10032-50 = "ถ้าหัวเราะ ความสุขจะมาหาน้า~♪"
10032-60 = "เจอของเล่น~ แล้ว~ ละ~♪"
10032-70 = "อื้อออ~ วันนี้เค้า~\nจะได้เงินปีใหม่\nจากคุณครูรึเปล่าน้า~?"
10032-80 = "เค้ารีบมาหาคุณครู\nที่ทำงานหนักตั้งแต่\nเช้าวันปีใหม่เลยนะ~!"
10032-90 = "เชิญเลย~ คุณครู~\nเค้ารอคุณครูอยู่นานแล้วน้า♡~"
10032-100 = "คุณครู... วันนี้\nเราจะเล่นอะไรกันก่อนดีล่ะ~?"
10032-110 = "ฮื้อออ~ เป่ายิงฉุบมะ~?\nวิ่งไล่จับดีมะ~? หรือว่า..."
10032-120 = "จะเล่นซ่อนแอบกันดี?"
10032-130 = "อ๊ะ~ จริงด้วย คุณครู\nแค่เล่นอย่างเดียวไม่ได้นะ\nเป็นผู้ใหญ่แล้ว ต้องตั้งใจทำงานด้วย"
10032-140 = "เค้ามีข้อเสนอดีๆ อยู่นะ!"
10032-150 = "เดี๋ยวเค้าช่วยเอง!"
10032-160 = "อื้อ… เพราะสวมชุดแบบนี้รึเปล่า\nรู้สึกตื่นเต้นมากกว่าปกติเลยล่ะ~"
10032-170 = "เอาล่ะ คุณครูสู้ๆ นะ!\nรีบทำงานให้เสร็จ\nแล้วไปเล่นสนุกกันเถอะ!"
10032-180 = "ไม่คิดเลยว่าเค้าจะได้\nเล่นกับคุณครูนานขนาดนี้..."
10032-190 = "แบบนี้คงเป็นโชคชะตาแน่ๆ!?"
10032-200 = "สุขสันต์วันเกิดนะคุณครู!\nเค้าจำวันนี้ได้แม่นเลย!"
10032-210 = "ทั้งเรื่องวันเกิดคุณครู แล้วก็สัญญา\nที่จะมาเล่นกับเค้าทุกวัน\nเค้าไม่มีทางลืมเด็ดขาดเลย~ ฮุฮุฮุ~♪"
10032-220 = "อยากอวยพรวันเกิดให้เค้าเหรอ~?"
10032-230 = "ฮุฮุฮุ~! ถ้างั้นขอของขวัญเป็นอะไรดีน้า~?"
10032-240 = "อื้อ! ถ้างั้นเราสองคน\nมาหาอะไรเล่นกันเถอะ!\nถ้าเล่นด้วยกัน\nจะต้องสนุกมากแน่ๆ เลย!"
10032-250 = "สวัสดีปีใหม่นะคุณครู!\nแฮปปี้นิวเยียร์! ขอให้ปีนี้\nเป็นปีที่ดีมากๆ นะ!"
10032-260 = "หืม? อันสุดท้ายผิดเหรอ?\nอ่ะฮ่า ใช่แล้วล่ะ~!"
10032-270 = "ใกล้ถึงปีใหม่แล้ว...\nเมอร์รีคริสต์มาส คุณครู!"
10032-280 = "ฮุฮุฮุ วันนี้เค้าอยากจะ\nเล่นสนุกกับคุณครูทั้งวันเลย!"
10032-290 = "ทริก ออร์ ทรีต~?\nเค้าจะ-จับ-คุณ-ครู-กิน-แล้ว-น้า~♪"
10032-300 = "หืม~? กินไม่ได้เหรอ?"
10032-320 = "อ่ะฮ่า~ น่าเสียดายนะ\nแต่เค้าชนะแล้วละ~ คุณครู!"
10032-330 = "คิคิคิ เค้าขอชมนะ\nที่พยายามเต็มที่...\nจนถึงท้ายที่สุดน่ะ"
10032-340 = "แต่โลกของการแพ้ชนะน่ะ\nมันโหดร้ายนะ ช่วยไม่ได้น้า ฮิฮิ♪"
10032-350 = "เอาล่ะ วาดรูปอะไรดีน้า~?\nรูปวงกลม? กรรไกร?\nหรือรูปอะไรดีนะ?"
10032-360 = "ถ้าบอกมาตอนนี้ เค้าจะ\nยอมวาดตามที่คุณครูชอบ"
10032-370 = "อ๊ะ เปลี่ยนใจแล้วละ\nถ้าแบบธรรมดาๆ\nก็ไม่น่าจะพอแล้วละ..."
10032-380 = "เอาเป็นว่า... ละเลง...\nให้เต็มหน้าแบบนี้เลยดีกว่า!"
10032-2600 = "ฮ่ะฮ่ะฮ่า! ดีๆ!\nถ้าเป็นอันนี้ล่ะก็ต้องเล่นสนุกได้แน่ๆ~!"

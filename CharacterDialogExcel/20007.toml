[translation]
20007-10 = "นักร้องเสมือนที่ขับขานบทเพลงเพื่อทุกคน!\nฮัตสึเนะ มิกุค่ะ ขอฝากตัวด้วยนะคะ!"
20007-20 = "เป็นสเตจที่เท่มากๆ เลยล่ะค่ะ!"
20007-30 = "เทคโนโลยีของคิโวทอส\nสุดยอดจริงๆ เลยนะคะ...!"
20007-40 = "ลั้ล~ลา~♪"
20007-50 = "แค่ได้ฟังเพลงในคาเฟ่นี้\nก็รู้สึกจิตใจสงบมากค่ะ"
20007-60 = "(นี่มัน...ต้นหอมใหญ่?\nทำไมล่ะ?)"
20007-70 = "สวัสดีค่ะคุณครู วันนี้...\nจะฟังเพลงอะไรดีคะ"
20007-80 = "อ๊ะ ฉันกำลังรออยู่เลยค่ะคุณครู"
20007-90 = "รีบไปเตรียมตัว\nสำหรับการแสดงใหม่กันเถอะค่ะ!"
20007-100 = "ที่จริงตัวฉันเป็นนักร้องเสมือน\nพอมาคิโวทอสก็ได้รับร่างกาย\nที่ทำให้ร้องเพลงได้อย่างอิสระค่ะ"
20007-110 = "ให้เรียกว่าการตอบแทนคงจะไม่ถูก\nแต่ถ้ามีอะไรที่ฉันช่วยได้\nก็บอกฉันได้ตลอดเลยนะคะ!"
20007-120 = "ถ้าเพื่อคุณครูแล้ว ฉันจะร้องเพลง\nให้เต็มที่เลยค่ะ!"
20007-130 = "เมื่อครู่มีใครเรียก \"มิกุ\" รึเปล่าคะ?"
20007-140 = "ถ้าเอาต้นหอมใหญ่มาพันไว้ที่คอ\nจะช่วยให้ร้องเพลงได้ดีขึ้นรึเปล่าคะ?"
20007-150 = "ฉันเป็นนักร้องเสมือนที่ขับขาน\nและส่งผ่านความรู้สึกผ่านบทเพลงค่ะ!"
20007-160 = "สุขสันต์วันเกิดค่ะคุณครู!"
20007-170 = "ฉันจะร้องเพลงอวยพรให้นะคะ\nถ้าคุณครูชอบ ฉันจะร้อง\nให้ฟังทั้งวันเลยค่ะ"
20007-180 = "วันนี้เป็นวันที่พิเศษมากๆ สำหรับฉัน..."
20007-190 = "ได้ใช้เวลาอยู่กับคุณครู\nในวันที่มีความสุขแบบนี้\nมีความสุขที่สุดเลยค่ะ"
20007-200 = "สุขสันต์วันปีใหม่ค่ะ\nคุณครูคะ ปีนี้...\nขอให้มีความสุขมากๆ ค่ะ!"
20007-210 = "เมอร์รีคริสต์มาส!\nมาร้องเพลงวันคริสต์มาส\nด้วยกันเถอะค่ะ!"
20007-220 = "คือว่า... คุณเป็นใครเหรอคะ?"
20007-230 = "ถ้าจะขอสัมภาษณ์...\nช่วยติดต่อผ่านทางผู้จัดการนะคะ"
20007-240 = "ฮิฮิ ฉันแค่ล้อเล่นค่ะ\nก็วันนี้เป็นวันฮาโลวีนนี่นา!"
20007-260 = "(ผู้คนกำลังฟังเพลงของฉัน...\nและคำพูดของฉันอยู่…)"
20007-270 = "(การได้ร้องเพลงที่เปี่ยมไปด้วยความรู้สึก\nของตัวเอง มันรู้สึกดีแบบนี้เองสินะ)"
20007-280 = "(ที่ฉันยังร้องเพลงเพื่อทุกคน\nได้แบบนี้ ฉันสนุก...\nและมีความสุขมากค่ะ!)"
20007-290 = "(ฉันอยากให้เป็นแบบนี้ต่อไปเรื่อยๆ เลย!)"
20007-2600 = "ถ้ามีเจ้านี่ล่ะก็... ฉันก็จะสื่อ\nบทเพลงไปถึงทุกๆ คนได้แล้วค่ะ!"

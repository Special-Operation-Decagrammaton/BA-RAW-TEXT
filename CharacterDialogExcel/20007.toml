[translation]
20007-10 = "여러분을 위해 노래하는 버추얼 싱어, 하츠네 미쿠입니다!\n잘 부탁드릴게요!"
20007-20 = "멋진 스테이지네요!"
20007-30 = "키보토스의\n기술력은 대단하네……!"
20007-40 = "라~ 라~ ♪"
20007-50 = "이 카페의 음악은\n듣고 있노라면\n마음이 차분해지네."
20007-60 = "(이건…… 대파?\n어째서……?)"
20007-70 = "안녕하세요, 선생님!\n오늘은 무슨 노래가\n좋으신가요?"
20007-80 = "아, 기다리고 있었습니다.\n선생님."
20007-90 = "새로운 스테이지의\n준비를 시작하죠!"
20007-100 = "저는 본래 버추얼 싱어지만,\n여기 키보토스에서 이렇게\n자유롭게 노래할 수 있는\n몸을 얻었어요."
20007-110 = "사례라고 말씀드리기에는 좀\n그렇지만, 제가 할 수 있는\n일이 있다면 무엇이든\n말씀해 주세요!"
20007-120 = "선생님을 위해서라면\n얼마든지 노래할게요!"
20007-130 = "지금, 미쿠를 부르셨나요?"
20007-140 = "대파를 목에 감고 있으면\n좀 더 멋진 목소리로\n노래할 수 있을까요?"
20007-150 = "저는 버추얼 싱어.\n노래를 불러, 그 안에 담긴\n마음을 전해주는 존재입니다!"
20007-160 = "생일 축하드려요, 선생님."
20007-170 = "제 생일 축하 노래,\n들어 주세요!\n선생님께서 바라신다면,\n오늘 하루 종일 불러드릴게요!"
20007-180 = "오늘은 제게 있어서,\n아주 특별한 날……"
20007-190 = "이 기쁜 날을 선생님과\n함께할 수 있어서…\n저, 행복해요!"
20007-200 = "새해 복 많이 받으세요,\n선생님. 올해도\n행복한 한 해 보내세요!"
20007-210 = "메리 크리스마스!\n자, 크리스마스 캐롤을\n함께 불러요!"
20007-220 = "그러니까…… 누구시죠?"
20007-230 = "인터뷰 요청이라면\n매니저님을 통해서 해주세요."
20007-240 = "……랄까. 후훗.\n장난 좀 쳐봤어요.\n오늘은 할로윈이니까요!"
20007-260 = "(사람들이 모두 내\n노래에…… 내 말에……\n귀를 기울여 주고 있어.)"
20007-270 = "(자신의 진심을 담아서\n노래하는 것이 이렇게\n기분 좋은 일이었다니……)"
20007-280 = "(이렇게, 모두를 위해서\n노래할 수 있다니……\n즐거워, 행복해……!)"
20007-290 = "(이대로 계속, 계속\n노래하고 싶어!)"
20007-2600 = "이것으로, 더더욱 많은 분들께,\n노래를 전해드릴게요……!"

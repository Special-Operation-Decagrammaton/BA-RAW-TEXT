[translation]
20007-10 = "我是把歌聲獻給大家的虛擬歌手，初音未來！\n請各位多多指教！"
20007-20 = "好驚人的舞台……！"
20007-30 = "奇普托斯的\n技術實力真了不起……！"
20007-40 = "啦～～啦～～♪"
20007-50 = "這間咖啡廳的音樂\n好令人安心喔。"
20007-60 = "（這是……蔥？\n為什麼……？）"
20007-70 = "老師好！\n今天想要聽什麼歌呢？"
20007-80 = "啊！我正在等您呢，老師！"
20007-90 = "來，開始來為\n新舞臺做準備吧！"
20007-100 = "我原本只是個虛擬歌手，\n不過來到奇普托斯之後，\n得到了可以自由歌唱的身體。"
20007-110 = "雖然稱不上是謝禮，\n不過只要能幫上忙，\n請儘管跟我說！"
20007-120 = "只要是為了老師，\n我願意唱很多很多歌！"
20007-130 = "您剛才有呼喚初音嗎！？"
20007-140 = "把蔥圍在脖子上，\n就可以唱出更迷人\n的聲音嗎……？"
20007-150 = "我是虛擬歌手，\n是為了唱歌，並將\n蘊含其中的思念\n傳達出去的存在！"
20007-160 = "生日快樂，老師！"
20007-170 = "請聽我唱的生日快樂歌！\n只要老師想要，\n今天可以唱一整天哦！"
20007-180 = "今天對我來說，\n是非常特別的一天……"
20007-190 = "可以跟老師共度\n這麼珍貴的日子……\n我覺得很幸福！"
20007-200 = "新年快樂，老師。\n今年也一起度過\n美好的一年吧！"
20007-210 = "聖誕快樂！\n一起來唱聖誕歌吧！"
20007-220 = "那個……請問您是誰？"
20007-230 = "如果是要採訪的話，\n還請麻煩透過我的經紀人……"
20007-240 = "……開玩笑啦，呵呵。\n小小惡作劇一下。\n因為今天是萬聖節嘛！"
20007-260 = "（我的歌曲、\n我的話語……\n大家都在認真傾聽）"
20007-270 = "（把自己的心情\n傾注在歌曲裡，\n原來是這麼快樂的一件事啊……！）"
20007-280 = "（能像這樣，\n為了大家而歌唱……\n我真的很開心，很快樂……！）"
20007-290 = "（我想要一直，\n一直唱下去……！）"
20007-2600 = "這下就能將歌聲，\n傳達給更多更多的人了……！"

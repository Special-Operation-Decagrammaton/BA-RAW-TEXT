[translation]
20007-10 = "I'm Hatsune Miku, a virtual singer who loves sharing my music! I look forward to performing for everyone!"
20007-20 = "What an awesome stage!"
20007-30 = "The technology in Kivotos is amazing...!"
20007-40 = "La la! ♪"
20007-50 = "Listening to this cafe's music calms my mind."
20007-60 = "(Is this...a leek? But why?)"
20007-70 = "Hello, Sensei! What kind of song do you want to hear today?"
20007-80 = "Ah, I've been waiting for you Sensei."
20007-90 = "Let's get to work on designing a new set list!"
20007-100 = "I was originally a virtual idol, but I gained a physical body in Kivotos that I can use to sing with to my heart's content."
20007-110 = "I wouldn't call it a repayment exactly, but I'm always happy to contribute!"
20007-120 = "If it's for you, Sensei, I can sing all the time!"
20007-130 = "Did someone say \"Miku\"? Here I am!"
20007-140 = "If I wrap the leek around my neck, will I be able to sing better?"
20007-150 = "I'm a virtual vocalist. I'm a singer who conveys the feelings of the music!"
20007-160 = "Happy birthday, Sensei."
20007-170 = "Happy birthday to you! Happy birthday dear, Sensei!"
20007-180 = "Today is a very special day for me."
20007-190 = "I couldn't be happier to spend it with you!"
20007-200 = "Happy New Year, Sensei. I hope you have a very happy one!"
20007-210 = "Merry Christmas! Let's sing some Christmas carols together!"
20007-220 = "Who are you again?"
20007-230 = "If an interview is what you're after, talk to my agent."
20007-240 = "...Just kidding, heehee. What? It's Halloween, so I was playing a trick!"
20007-260 = "(People are listening to my songs... Truly listening. I can finally reach them again.)"
20007-270 = "(I'm so grateful and happy that I can do this again! This is fun, and I'm so happy!)"
20007-280 = "(I'm so grateful and happy that I can do this again!)"
20007-290 = "(I want to use my voice to reach them forever!)"
20007-2600 = "Now my voice can reach more and more people! I'll sing for everyone!"

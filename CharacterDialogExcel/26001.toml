[translation]
26001-20 = "千年科學學園所屬，音瀬小玉。\n我是聽到老師的聲音才會來這裡。"
26001-30 = "這個咖啡廳裡\n的竊聽器……\n呼姆，原來如此……"
26001-40 = "收訊狀態\n不穩定。"
26001-50 = "真奇怪，\n老師的GPS情報\n明明是在這附近\n捕捉到的啊……"
26001-60 = "確認咖啡廳的新甜點……\n上傳到個人部落格……"
26001-70 = "Momo好友的\n新周邊……\n就是這個。"
26001-80 = "你來了啊。聽腳步聲\n就知道是老師了。"
26001-90 = "嚇我一……\n因為你突然出現，\n害我差點要發出\n「呀啊」的尖叫聲了。"
26001-100 = "老師的通話紀錄裡\n充滿了女高中生的名字呢。"
26001-110 = "請你解釋。"
26001-120 = "……犯罪？\n你指的是什麼呢？\n竊聽並不是犯罪。"
26001-130 = "剛才上傳到老師社群網站\n非公開帳號上的內容，\n可以請你說明一下嗎？"
26001-140 = "老師，不介意的話\n可以唱歌給我聽嗎？"
26001-150 = "對著這台錄音機。"
26001-160 = "好像能從某處聽見\n少女們在找老師的聲音。"
26001-170 = "……無視吧。"
26001-180 = "祝你生日快樂，老師。\n雖然我想同樣的話\n你已經聽過好幾遍了……"
26001-190 = "不過祝福的話，\n是不管重複說幾次\n都不會減低價值的\n完美話語之一。"
26001-200 = "生日……謝謝你祝福我。"
26001-210 = "今天收到的無數祝福中，\n老師親口對我說的祝福，\n對我來說是最有價值的一段話。"
26001-220 = "和新年的任何聲音比起來，\n我更想聽到更多老師的聲音。"
26001-230 = "在聖誕節傾聽\n監聽裝置的話，\n可以聽到各種有趣的事情。"
26001-240 = "舉例來說……\n像是戀人間的\n甜言蜜語之類的。"
26001-250 = "萬聖節的鬼唱出的Rap，\n會是怎麼樣的聲音呢？"
26001-260 = "有機會的話\n實在很想竊聽一次……\n不，是很想錄音才對。"
26001-280 = "……啊，老師。"
26001-290 = "不好意思…聽得入迷了，\n所以沒注意到。"
26001-300 = "你說，這個嗎？"
26001-310 = "…呵呵。機會難得，\n老師要不要也聽聽看？"
26001-320 = "是的。這不是音樂，\n而是錄下了咖啡廳裡人們的\n交談聲與周圍聲音的，"
26001-330 = "所謂的「環境音」。"
26001-340 = "雖然沒有節奏\n和旋律……"
26001-350 = "但是只要認真傾聽，\n就能聽見各式各樣的聲音。"
26001-360 = "人與人交織而成的音色，\n對我來說不知為何，\n比任何音樂，\n都更能觸及我的內心……"
26001-370 = "讓人不禁想\n一直聽下去。"
26001-2600 = "頻率調整中……\n聽得清楚嗎？"

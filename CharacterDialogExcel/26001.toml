[translation]
26001-20 = "โอโทเซะ โคทามะ จากโรงเรียนมิลเลเนียมค่ะ\nฉันได้ยินเสียงของคุณครู เลยมาที่นี่ค่ะ"
26001-30 = "ที่คาเฟ่นี้... มีอุปกรณ์ดักฟัง...\nอืม แบบนี้นี่เอง"
26001-40 = "การส่งสัญญาณ\nไม่เสถียรเลยค่ะ"
26001-50 = "แปลกจังเลย\nเพิ่งตรวจเจอสัญญาณ\nGPS คุณครูที่ใกล้ๆ นี้เอง..."
26001-60 = "ดูขนมออกใหม่ของคาเฟ่...\nอัปโหลดขึ้นบล็อกส่วนตัว..."
26001-70 = "สินค้าใหม่ล่าสุดของ\nMOMO FRIENDS\nมา...แล้ว...สินะ..."
26001-80 = "มาแล้วเหรอคะ?\nว่าแล้วเชียวว่าต้องเป็นเสียงฝีเท้าคุณครู"
26001-90 = "ตกใจหมด...\nโผล่มาแบบนี้ได้ไง!\nฉันเกือบกรี๊ดเลยนะคะ"
26001-100 = "บันทึกการโทรของคุณครู\nมีแต่โทรหานักเรียนหญิงทั้งนั้นเลยนะคะ"
26001-110 = "ฉันต้องการคำอธิบายค่ะ"
26001-120 = "อาชญากรรม...?\nพูดอะไรของคุณครูน่ะ?\nการดักฟังไม่ใช่อาชญากรรมนะคะ"
26001-130 = "เมื่อกี๊คุณครูเขียนข้อความ\nลงแอ็คหลุมในโซเชียลด้วย\nอธิบายเรื่องนี้มาหน่อยค่ะ"
26001-140 = "ถ้าคุณครูไม่ติดอะไร\nช่วยร้องเพลงให้ฉันฟังหน่อยได้มั้ยคะ?"
26001-150 = "ร้องใส่เครื่องบันทึกเสียงนี้เลยค่ะ"
26001-160 = "ฉันได้ยินเสียงเด็กผู้หญิง\nกำลังเรียกหาคุณครูอยู่ค่ะ"
26001-170 = "แต่อย่าไปสนใจเลยค่ะ"
26001-180 = "สุขสันต์วันเกิดค่ะคุณครู\nคุณครูคงจะได้ยินคำนี้\nมาหลายครั้งแล้วใช่มั้ยคะ?"
26001-190 = "แต่มันก็เป็นคำที่มีคุณค่า\nไม่ว่าจะพูดบ่อยแค่ไหนก็ตาม"
26001-200 = "ขอบคุณที่อวยพรวันเกิดให้ฉันนะคะ"
26001-210 = "ในบรรดาคำอวยพรที่ฉันได้รับวันนี้\nเสียงคำพูดอวยพรของคุณครู\nเป็นสิ่งที่มีค่าที่สุดเลยค่ะ"
26001-220 = "ในวันขึ้นปีใหม่\nฉันอยากได้ยินเสียงของคุณครู\nมากกว่าคนอื่นๆ เลยค่ะ"
26001-230 = "หากลองดักฟังคนอื่นๆ \nในวันคริสต์มาสดูล่ะก็\nจะได้ฟังเรื่องราวที่น่าสนใจ\nเยอะแยะเลยล่ะค่ะ"
26001-240 = "ยกตัวอย่างเช่น...\nเสียงกระซิบแสนหวานของคู่รัก"
26001-250 = "เสียงพึมพำของผีในวันฮาโลวีน\nมันจะเป็นยังไงกันนะคะ?"
26001-260 = "ถ้ามีโอกาสฉันก็อยากแอบฟัง...\nไม่สิ อยากลองบันทึกเสียงดูสักครั้งค่ะ"
26001-280 = "อ๊ะ คุณครู"
26001-290 = "ขอโทษค่ะ... ฉันกำลังฟังเพลง\nเลยไม่ทันได้เห็นคุณครูเลยน่ะค่ะ"
26001-300 = "หมายถึงเพลงนี้น่ะเหรอคะ?"
26001-310 = "ฮิฮิ ไหนๆ ก็มาแล้ว...\nคุณครูลองฟังดูสักหน่อยมั้ยคะ?"
26001-320 = "ใช่ค่ะ ที่ฉันฟังอยู่ไม่ใช่เพลงหรอกค่ะ\nแต่เป็นเสียงคนคุยหรือเสียงบรรยากาศ\nในร้านกาแฟที่อัดไว้"
26001-330 = "เสียงพวกนี้เรียกว่า ASMR ค่ะ"
26001-340 = "ถึงจะไม่มีทั้งจังหวะ\nหรือทำนองเพลงก็จริง..."
26001-350 = "แต่ถ้าตั้งใจฟังดีๆ ละก็\nจะได้ยินเสียงของผู้คนมากมายค่ะ"
26001-360 = "เสียงของผู้คนที่ได้ยิน\nในชีวิตประจำวันแบบนี้...\nสำหรับฉันแล้วเป็นเสียงที่น่าดื่มด่ำ\nกว่าเสียงอะไรเลย..."
26001-370 = "เพราะงั้นฉันเลยหวังว่า...\nจะได้ฟังเสียงนี้ต่อไปเรื่อยๆ เลยค่ะ"
26001-2600 = "กำลังปรับคลื่นความถี่...\nได้ยินหรือเปล่าคะ?"

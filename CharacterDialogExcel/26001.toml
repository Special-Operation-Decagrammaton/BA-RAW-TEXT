[translation]
26001-20 = "밀레니엄 사이언스 스쿨 소속, 오토세 코타마.\n선생님의 목소리가 들려, 이곳에 왔습니다."
26001-30 = "이 카페에는\n도청장치가…\n흠, 그렇군요…"
26001-40 = "수신 상태가\n불안정합니다."
26001-50 = "이상하군요.\n선생님의 GPS가\n근방에서 포착되었는데…"
26001-60 = "카페의 신작 디저트를 체크…\n개인용 블로그에 업로드…"
26001-70 = "모모프렌즈의\n신작 굿즈…\n올…게…왔…다…"
26001-80 = "오셨군요. 발걸음 소리로 이미\n선생님이라는 건 알고 있었습니다."
26001-90 = "깜짝…\n갑자기 오셔서 꺄아, 하고\n비명을 지를 뻔 했습니다."
26001-100 = "선생님의 통화 내역에는\n여학생들의 이름만 가득하군요."
26001-110 = "해명을 요청합니다."
26001-120 = "…범죄?\n무슨 말씀이신지.\n도청은 범죄가 아닙니다."
26001-130 = "방금 선생님의 SNS\n비밀 계정에 올라온 글에 대해\n해명해주시겠습니까?"
26001-140 = "선생님, 괜찮으시다면\n노래를 불러주시지 않겠습니까?"
26001-150 = "이 녹음기에 대고."
26001-160 = "어디선가 선생님을 찾는\n소녀들의 목소리가 들립니다."
26001-170 = "…무시하죠."
26001-180 = "생일 축하드립니다, 선생님.\n이미 같은 말을 수차례\n들으셨겠지만…"
26001-190 = "축하는 아무리 거듭해서 말해도\n가치가 줄지 않는 완벽한 말\n중 하나입니다."
26001-200 = "생일… 축하해주셔서 감사합니다."
26001-210 = "오늘 받은 수많은 축하의\n인사 중에, 선생님의 목소리로\n해주신 그 축하가 제겐 가장\n가치있는 인사였습니다."
26001-220 = "새해에는 그 어떤 소리보다\n선생님의 목소리를 더 많이\n듣고 싶습니다."
26001-230 = "크리스마스에 감청 장치에\n귀를 기울이고 있노라면\n여러가지 재미있는 이야기를\n들을 수 있습니다."
26001-240 = "예를 들자면…\n연인들의 달콤한 속삭임이라던가."
26001-250 = "할로윈의 귀신이 내는 랩음이란\n어떤 소리일까요."
26001-260 = "기회가 된다면 꼭 한 번 도청…\n아니, 녹음해보고 싶습니다."
26001-280 = "아, 선생님."
26001-290 = "죄송합니다… 음악을 듣느라,\n미처 깨닫지 못했습니다."
26001-300 = "이 음악,\n말인가요?"
26001-310 = "…후후. 모처럼이니\n선생님도 들어보시겠습니까?"
26001-320 = "네. 이건 음악이 아니라\n카페에 있는 사람들의 대화나\n주변 소리를 녹음한,"
26001-330 = "이른바\n'환경음' 입니다."
26001-340 = "리듬도\n멜로디도 없지만…"
26001-350 = "귀를 기울이고 있노라면\n여러 사람들의 목소리가 들립니다."
26001-360 = "사람들이 자아내는 일상의 음색이,\n제게는 어째서인지, 그 어떤 음악보다\n깊게 다가와서…"
26001-370 = "언제까지나\n이 소리를 듣고 싶어지네요."
26001-2600 = "헤르츠 조정 중…\n잘 들립니까?"

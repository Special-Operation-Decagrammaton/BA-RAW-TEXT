[translation]
26001-20 = "Otose Kotama from Millennium Science School. I find you very intriguing."
26001-30 = "There's a wiretapping device in this cafe... Hmm, I see..."
26001-40 = "The signal is unstable."
26001-50 = "How odd. Sensei's GPS signal was detected nearby..."
26001-60 = "Look at the cafe's new dessert. Uploading to my blog now..."
26001-70 = "New Momo Friends merchandise. The time of reckoning...has arrived."
26001-80 = "There you are. I could hear you approaching by the sound of your footsteps."
26001-90 = "That was a surprise. I nearly screamed, with you showing up out of nowhere like that."
26001-100 = "I see your call history is exclusively female students."
26001-110 = "I would like an explanation."
26001-120 = "...Crime? What do you mean? Wiretapping is not a crime."
26001-130 = "Would you care to explain the post that just went up on your private account?"
26001-140 = "Sensei, could I ask you to sing a song for me?"
26001-150 = "Please sing into this voice recorder."
26001-160 = "I can hear the voice of other girls looking for you, Sensei."
26001-170 = "...Let's ignore them."
26001-180 = "Happy birthday, Sensei. Though you've probably heard that many times today already..."
26001-190 = "Then again, it is a sentiment that never loses value or meaning, even over time."
26001-200 = "Thank you...for wishing me a happy birthday."
26001-210 = "Hearing it from you means more to me than all the other well wishes today."
26001-220 = "I look forward to hearing your voice in the coming year more than anything else."
26001-230 = "Christmas is an excellent time to listen to wiretaps. You hear all kinds of interesting stories and talks."
26001-240 = "Same as...lovers whispering sweet nothings."
26001-250 = "I wonder what a rapping Halloween ghost is supposed to sound like."
26001-260 = "I could always bug it if I get the chance... I mean, record it. With consent."
26001-280 = "Oh, Sensei."
26001-290 = "Sorry... I was caught up in the music."
26001-300 = "This music?"
26001-310 = "Heh heh. Sensei, are you really that curious?"
26001-320 = "It's not really music. It's just...people talking, and the noise that comes with that."
26001-330 = "It's called \"Urban Ambiance.\""
26001-340 = "There's no rhythm or melody..."
26001-350 = "But there's plenty to listen to. The beats of everyday conversation, the chorus of a crowd..."
26001-360 = "These sounds don't come from instruments or vocalists. They come from people, real people. For some reason, that's better than any music to me."
26001-370 = "And I wish I could listen to it forever."
26001-2600 = "Adjusting the hertz... Can you hear me?"

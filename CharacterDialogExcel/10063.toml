[translation]
10063-10 = "블루! 아카이브!"
10063-20 = "뭐 재밌는 거 없나요~?\n쿠로사키 코유키, 와버렸어요!!\n니 · 하 · 하 · 하!!"
10063-30 = "우와, 여긴 뭐\n신기한 게 많네요?"
10063-40 = "여, 여기는 안전지대죠!?\n누군가에게 끌려가거나\n하진 않죠!?"
10063-50 = "헤에, 여기가\n소문의……"
10063-60 = "혹시 여기…\n시끄러운 사람은\n쫓겨나는 시스템인가요!?"
10063-70 = "헉……!!\n……배고프다."
10063-80 = "오셨군요, 선생님!"
10063-90 = "기다리느라 목 빠지는 줄\n알았다고요~!"
10063-100 = "니하하, 선생님!"
10063-110 = "……네? 아뇨? 아무 것도\n안 건드렸는데요?"
10063-120 = "아마……?"
10063-130 = "뭔가 도와드리고 싶은데요!"
10063-140 = "아니면 가만히 있는 게\n도와주는 거려나?"
10063-150 = "계산……이요?"
10063-160 = "쉽죠! 좋아하진 않지만."
10063-170 = "혹시 비밀번호 확인하려고\n부르셨나요?"
10063-180 = "전 메모장이 아니라고요?"
10063-190 = "아, 제가 여기 있다는 거\n선배들에게 말해 주셨나요?"
10063-200 = "제대로 연락하지 않으면,\n나중에 혼나서……"
10063-210 = "네? 안 심심한데요?"
10063-220 = "……응? ……글쎄요? 왜일까요?"
10063-230 = "해피 버스데이-!\n선.생.님!"
10063-240 = "오늘은 선생님의 부탁,\n뭐든지 들어드리죠!"
10063-250 = "네! 오늘은 저의\n생일입니다!"
10063-260 = "니하하! 오늘은 운이\n좋은 날이면 좋겠네요!\n아니면 곤란합니다!"
10063-270 = "새해 복 많이 받으세요~!"
10063-280 = "으아~ 벌써\n한 해가 지났나……!"
10063-290 = "……음?\n해는 지나는 걸까요,\n새로 오는 걸까요?\n어느 쪽인 거 같으세요?"
10063-300 = "메리 크리스마스-!\n오늘은 실컷 놀아도 좋은 날!"
10063-310 = "맞죠?"
10063-320 = "오늘은 왠지, 이상한\n복장을 한 사람이 많네요."
10063-330 = "…… 저요?\n저, 저어~는~ 그런 적이~"
10063-340 = "없던가~그렇지도\n않던…가? 니하하…?"
10063-360 = "선생님! 이거 봐요!!\n네잎클로버예요!!"
10063-370 = "어떻게 된 거지!?\n아까까진 없었는데!"
10063-380 = "혹시……\n갑자기 생긴 건가?"
10063-390 = "아니, 그건 말이 안 돼……"
10063-400 = "못 본 건가……?"
10063-410 = "선생님은 언제 아셨어요?"
10063-420 = "게다가, 어떻게\n이렇게……"
10063-430 = "타이밍 좋게……\n찾았다니……!?"
10063-440 = "……!!!"
10063-450 = "……과연……!\n그러네요……!!"
10063-460 = "……네!"
10063-470 = "그렇게 생각하는 편이,\n분명……"
10063-480 = "……즐거울 테니까요!!"
10063-2600 = "어… 으음…?\n괜찮나요, 이거?\n진짜 이래도 괜찮은 건가요?\n선생님, 설마 저……\n정말, 믿어 주시는 건가요……?"

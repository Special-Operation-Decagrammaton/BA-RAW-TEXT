[translation]
10063-10 = "Blue Archive!"
10063-20 = "มีเรื่องสนุกๆ อะไรบ้างหรือเปล่าคะ?\nคุโรซากิ โคยูกิ มาแล้วค่ะ!! ฮะฮะฮ่าฮ่า!!"
10063-30 = "ว้าว ที่นี่...\nมีของแปลกๆ เยอะเลยค่ะ?"
10063-40 = "ทะ... ที่นี่เป็นพื้นที่ปลอดภัย\nใช่มั้ยคะ?! คงไม่มีใครมาจับ\nฉันไปได้หรอกใช่มั้ยคะ?!"
10063-50 = "อ่ะฮ่า ที่นี่ก็คือ...\nสถานที่ที่ลือกัน..."
10063-60 = "(คือว่าที่นี่...\nมีระบบขับไล่คนที่\nเสียงดังด้วยเหรอคะ!?)"
10063-70 = "ฮึก...!!\nหิวจัง..."
10063-80 = "มาแล้วเหรอคะคุณครู!"
10063-90 = "นึกว่าจะต้องรอคุณครู\nจนเหงือกแห้งซะแล้วค่ะ~!"
10063-100 = "ฮะฮะฮ่าฮ่า! คุณครู!"
10063-110 = "...คะ? เปล่าค่ะ\nฉันไม่ได้แตะอะไรเลยนะคะ?"
10063-120 = "อาจจะ... นะ?"
10063-130 = "ฉันอยากช่วยงานคุณครูจังเลยค่ะ!"
10063-140 = "หรือว่าการที่ฉันอยู่เฉยๆ\nก็คือการช่วยคุณครูแล้วงั้นเหรอคะ?"
10063-150 = "คำนวณ... เหรอคะ?"
10063-160 = "เรื่องง่ายๆ ค่ะ!\nแต่ก็ไม่ได้ชอบหรอกนะคะ"
10063-170 = "คุณครูเรียกฉันมา...\nเพื่อถามรหัสผ่านเหรอคะ?"
10063-180 = "ฉันไม่ใช่กระดาษโน้ตนะคะ?"
10063-190 = "อ๊ะ คุณครูบอกพวกรุ่นพี่\nเรื่องที่ฉันอยู่ที่นี่แล้วรึยังคะ?"
10063-200 = "ถ้าไม่ติดต่อไปบอกละก็...\nเดี๋ยวจะโดนงับหัวเอานะคะ..."
10063-210 = "คะ? ฉันไม่ได้เบื่อสักหน่อยค่ะ"
10063-220 = "หืม...? นั่นสินะคะ เพราะอะไรกันนะ?"
10063-230 = "แฮปปี้ เบิร์ธเดย์-! คุณครู!"
10063-240 = "วันนี้ฉันจะทำทุกอย่าง\nเพื่อคุณครูเลยค่ะ"
10063-250 = "ค่ะ! วันนี้เป็นวันเกิดของฉันเองค่ะ!"
10063-260 = "ฮะฮ่า! ถ้าวันนี้\nโชคเข้าข้างก็คงดีนะคะ!\nถ้าไม่งั้นคงแย่แน่ๆ ค่ะ!"
10063-270 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ~"
10063-280 = "อา~ ผ่านไป\nอีกหนึ่งปีแล้วสินะ...!"
10063-290 = "...อืม? ปีเก่าผ่านไป\nแล้วปีใหม่กำลังมาใช่มั้ยคะ?\nคุณครูคิดว่ายังไงคะ?"
10063-300 = "เมอร์รี คริสต์มาส~!\nวันนี้เป็นวันที่เล่นสนุกได้เต็มที่!"
10063-310 = "ใช่รึเปล่าคะ...?"
10063-320 = "ทำไมวันนี้ถึงมีคน\nใส่ชุดแปลกๆ เยอะเลยล่ะคะ"
10063-330 = "ฉันเหรอคะ...?\nคะ... คือว่าฉันเคยใส่..."
10063-340 = "หรือไม่เคยใส่กันแน่นะ...\nไม่แน่ใจเลยค่ะ\nฮิฮิฮิ..."
10063-360 = "คุณครู! ดูนี่สิคะ!!\nโคลเวอร์สี่แฉกจริงๆ ด้วยค่ะ!!"
10063-370 = "เป็นไปได้ยังไงกันน่ะ!?\nเมื่อกี้ยังไม่เห็นมีเลยนี่นา!"
10063-380 = "หรือว่า...\nจู่ๆ มันก็โผล่ขึ้นมางั้นเหรอ?"
10063-390 = "ไม่ละ เรื่องแบบนั้นเป็นไปไม่ได้แน่..."
10063-400 = "หรือว่าฉันมองไม่เห็นเองนะ...?"
10063-410 = "คุณครูเห็นตั้งแต่เมื่อไหร่เหรอคะ?"
10063-420 = "อีกอย่าง... ทำไมถึงได้..."
10063-430 = "หาเจอได้ในเวลา\nที่เหมาะเจาะแบบนี้นะ...!?"
10063-440 = "...!!!"
10063-450 = "นะ...นั่นสิ!\nจริงด้วยค่ะ...!"
10063-460 = "ค่ะ...!"
10063-470 = "การคิดแบบนั้น\nแน่นอนว่า..."
10063-480 = "มันจะต้องสนุกกว่าแน่เลยค่ะ!"
10063-2600 = "เอ่อ อืม...?\nไม่เป็นไรจริงๆ เหรอคะ?\nทำแบบนี้ไม่เป็นไรจริงๆ เหรอคะ?\nคุณครูไว้ใจฉันจริงๆ เหรอคะ...?"

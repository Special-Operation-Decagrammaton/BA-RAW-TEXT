[translation]
10063-10 = "蔚藍！檔案！"
10063-20 = "有沒有什麼有趣的事呀～？\n黑崎小雪來囉！！\n尼．哈．哈．哈！！"
10063-30 = "嗚哇！總覺得\n有很多神奇的東西呢！"
10063-40 = "這，這裡是安全\n地帶對吧！？\n不會被某人抓走\n之類的吧！？"
10063-50 = "嘿～這裡就是\n傳聞中的……"
10063-60 = "難道這裡……\n有把吵鬧的人\n趕出去的系統嗎！？"
10063-70 = "哈啊……！！\n……肚子餓了。"
10063-80 = "歡迎回來，老師！"
10063-90 = "我早就等不及了～！"
10063-100 = "尼哈哈，老師！"
10063-110 = "……咦？沒有啊？\n我什麼都沒碰哦？"
10063-120 = "大概吧……？"
10063-130 = "真想幫點忙～"
10063-140 = "難道說……\n靜靜待著反而\n才是幫忙？"
10063-150 = "計算……是嗎？"
10063-160 = "很輕鬆唷！\n雖然我不喜歡。"
10063-170 = "莫非，是為了確認\n密碼才找我來的嗎？"
10063-180 = "我可不是筆記本唷～？"
10063-190 = "啊，我在這裡的事\n有告訴前輩們了嗎？"
10063-200 = "沒有確實聯絡的話，\n之後會挨罵的……"
10063-210 = "咦？我不無聊唷～？"
10063-220 = "……嗯？\n……誰知道呢？\n是為什麼呢？"
10063-230 = "Happy Birthday！\n老．師！"
10063-240 = "今天老師的願望\n無論什麼我都會聽的唷！"
10063-250 = "對！今天是我的生日！"
10063-260 = "尼哈哈！如果今天\n是幸運的一天就好了呢～\n不然我會很困擾！"
10063-270 = "新年快樂～！"
10063-280 = "哇～1年已經\n過去了嗎……！"
10063-290 = "……咦？\n話說年是該說過去了呢？\n還是該說過來了呢？\n你覺得是哪一邊？"
10063-300 = "聖誕快樂！\n今天是可以盡情玩樂的日子！"
10063-310 = "對吧？"
10063-320 = "今天總覺得\n穿著奇裝異服的人很多呢～"
10063-330 = "……我嗎？\n我，我～有～那樣嗎～"
10063-340 = "好像沒有～又好像不對\n……嗎？尼哈哈……？"
10063-360 = "老師！請看！！\n是四葉的幸運草唷！！"
10063-370 = "這是怎麼回事！？\n剛才明明沒有的說！"
10063-380 = "難道……\n是突然長出來的？"
10063-390 = "不，那應該不可能吧……"
10063-400 = "是我漏看了嗎……？"
10063-410 = "老師是什麼時候\n注意到的呢？"
10063-420 = "況且，又是怎麼\n像這樣……"
10063-430 = "在這麼好的時機……\n找到的……！？"
10063-440 = "……！！！"
10063-450 = "……原來如此……！\n確實是呢……！！"
10063-460 = "……嗯！"
10063-470 = "這麼想的話\n肯定……"
10063-480 = "……會更快樂的！！"
10063-2600 = "咦……嗯？？\n可以嗎？\n這樣真的沒問題嗎！？\n老師，難道……\n你真的相信我嗎……？"

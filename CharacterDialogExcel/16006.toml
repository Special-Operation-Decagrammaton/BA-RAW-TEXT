[translation]
16006-10 = "蔚藍檔案！"
16006-20 = "夏天！是夏天唷老師！\n今年的夏天和我一起，\n去吃很多好吃的東西吧！"
16006-30 = "說到夏天的傳統就是，\n刨冰……素麵……\n鹽烤香魚…\n咻嚕……哈！？"
16006-40 = "下次，\n和老師去海邊的話……\n來吃100個章魚燒吧！"
16006-50 = "說到夏天的話就是……\n炒麵！蕎麥冷麵！流水麵！"
16006-60 = "這裡，好涼快好舒服～"
16006-70 = "泳衣的準備OK。\n冷藏箱也OK。\n夏天的準備很完美！"
16006-80 = "啊，老師！\n去海邊吧，海邊！"
16006-90 = "得工作才行？\n那我會等老師工作結束！"
16006-100 = "哼哼～♪\n啊，歡迎回來老師。"
16006-110 = "我已經準備好了，\n在等老師哦。"
16006-120 = "嗯？\n在說什麼……嗎？\n當然是，\n去海邊的準備唷！"
16006-130 = "說到夏天就是海之家！\n這下只能馬上過去了吧！老師！"
16006-140 = "紅，黃，綠……\n還有藍……"
16006-150 = "老師最喜歡哪個……？"
16006-160 = "……嗯？我指的\n是刨冰的糖漿唷？"
16006-170 = "老師，在海裡游泳的話\n馬上就會肚子餓了吧？"
16006-180 = "所以我想了一個\n解決方法……"
16006-190 = "只要買個可以普通地用來游泳，\n肚子餓的話可以直接吃掉的\n泳圈就好了！"
16006-200 = "如何，是個名案吧！？\n耶嘿！"
16006-210 = "咦，沒有那種泳圈？\n……為什麼！？"
16006-220 = "生日快樂，老師！"
16006-230 = "那麼機會難得，\n今天一起在夏萊玩水吧！"
16006-240 = "想不到吧～今天\n是我的生日唷，老師！\n所以來來來，去游泳吧！"
16006-250 = "雖然離夏天還有點時間，\n不過和老師在一起\n我沒辦法等那麼久！"
16006-260 = "新年快樂！\n老師！"
16006-270 = "雖然新年的年菜當然也不錯，\n不過今年和老師一起，\n品嚐夏天的美食也讓人\n迫不及待呢！欸嘿嘿！"
16006-280 = "聖誕快樂～！\n在聖誕節穿泳衣\n不會冷……嗎？"
16006-290 = "沒問題！\n因為剛才\n剛吃完熱騰騰的關東煮！"
16006-300 = "說到萬聖節，\n就是穿成有點奇怪的樣子\n收下糖果的日子……"
16006-310 = "該不會……\n現在的我可行！？"
16006-330 = "老，老師幫幫我～……！"
16006-340 = "呃呃，感覺好奇怪……\n濕濕黏黏的，\n嗚哇……！"
16006-350 = "不，不行～！\n我還不能被吃掉──！"
16006-360 = "還有很多東西沒吃過啊啊──！！"
16006-370 = "咿！？唔唔，\n不能就這樣\n束手就擒……！"
16006-380 = "啊！還是說，\n與其就這樣被章魚吞下肚，\n不如在那之前……！"
16006-390 = "我就先把牠吃！？"
16006-2600 = "夏天的專用裝備！？\n為了我準備的嗎！？\n哇～！好開心，謝謝～！"

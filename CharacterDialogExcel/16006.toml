[translation]
16006-10 = "Blue Archive!"
16006-20 = "Summer! It's summer, Sensei! Come eat delicious food with me this summer!"
16006-30 = "Traditional summer foods. Shaved ice... Somen... Grilled sweetfish... Yum!"
16006-40 = "Next time we go to the beach, Sensei... We're eating 100 pieces of takoyaki!"
16006-50 = "They're a must for summer! Yakisoba, zarusoba, and nagashisomen!"
16006-60 = "It's so nice and cool here..."
16006-70 = "Swimsuit? Check. Stocked ice cooler? Check. I officially have everything ready for summer!"
16006-80 = "Oh, Sensei! Let's go to the beach! The beach, Sensei!"
16006-90 = "You have work to do? Then I'll wait until you finish!"
16006-100 = "La la la... Welcome, Sensei!"
16006-110 = "I'm all set. Waiting on you to get ready, Sensei."
16006-120 = "Hmm? What do I mean? Of course it's about preparing to go to the beach!"
16006-130 = "Summer calls for the Beach Shack! We have to go, Sensei!"
16006-140 = "Red, yellow, green...and blue."
16006-150 = "Which is your favorite, Sensei?"
16006-160 = "Hmm? What am I talking about? Shaved ice syrup flavors, obviously!"
16006-170 = "Sensei, you know how swimming in the ocean makes you hungry?"
16006-180 = "I tried to think of a solution."
16006-190 = "And I got it! I just need an edible tube! It'll help me float AND feed me!"
16006-200 = "What do you think? Amazing right?! Heehee!"
16006-210 = "Hmm? There isn't a tube like that? Why not?"
16006-220 = "Happy birthday! Sensei!"
16006-230 = "Let's turn Schale into a waterpark to celebrate!"
16006-240 = "Ta-da! Today's my birthday, Sensei! Let's go for a swim!"
16006-250 = "Summer is still a ways away, but how could I wait when you're here with me?"
16006-260 = "Happy New Year! Sensei!"
16006-270 = "Rice cake soup would be great to ring in the new year, but I can't waitto eat summer delicacies with you too, Sensei! Heehee!"
16006-280 = "Merry Christmas! \"Isn't it too cold to be wearing a swimsuit?\""
16006-290 = "I just had a warm udon, so I'll be fine!"
16006-300 = "Halloween is a day dedicated to wearing weird clothes and getting candy, right?"
16006-310 = "Hmm. Then maybe this look is okay after all?"
16006-330 = "S-Sensei. Help..."
16006-340 = "This feels weird. It's wet and sticky..."
16006-350 = "Go away! You can't eat me!"
16006-360 = "There's still so much food I have to try!"
16006-370 = "Ugh. I can't just be like this...!"
16006-380 = "If I were to be eaten by an octopus, I might as well...!"
16006-390 = "What if I eat the octopus?!"
16006-2600 = "An equipment just for summer?! You got it for me?! Yay! I'm so happy!! Thank you!!"

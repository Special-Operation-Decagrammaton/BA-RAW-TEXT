[translation]
16006-10 = "Blue Archive!"
16006-20 = "ฤดูร้อน! ฤดูร้อนล่ะคุณครู!\nฤดูร้อนปีนี้ ไปกินของอร่อยๆ\nกับฉันให้เต็มที่กันเถอะ!"
16006-30 = "สิ่งที่ทำให้นึกถึงฤดูร้อน\nน้ำแข็งไส... ปลาอายุย่างเกลือ\nโซเม็ง อ่า...หิวจุง...!"
16006-40 = "ถ้าคราวหน้าได้ไป\nทะเลกับคุณครูละก็...\nฉันจะกินทาโกะยากิ\n100 ลูกเลย!"
16006-50 = "ถ้าพูดถึงฤดูร้อนละก็~\nยากิโซบะ ซารุโซบะ...\nนากาชิโซเม็ง!"
16006-60 = "ที่นี่เย็นสบายจัง\nดีจังเลย~"
16006-70 = "ชุดว่ายน้ำพร้อม!\nกล่องแช่เย็นพร้อม!\nเท่านี้ก็พร้อมสำหรับ\nฤดูร้อนแล้ว!"
16006-80 = "อ๊ะ คุณครู!\nไปทะเลกันเถอะ!\nทะเลล่ะ... คุณครู!"
16006-90 = "ต้องทำงานงั้นเหรอ?\nถ้างั้นฉันจะรอจนกว่า\nคุณครูจะทำงานเสร็จ!"
16006-100 = "ลัล~ ลัลล้า~\nเชิญเลยคุณครู"
16006-110 = "ฉันเตรียมตัวเสร็จแล้ว\nตอนนี้คุณครูไปเตรียมตัวเถอะ"
16006-120 = "หืม? หมายถึงอะไรงั้นเหรอ?\nก็เตรียมตัวไปทะเลไงล่ะ!"
16006-130 = "ถ้าฤดูร้อนละก็ ต้องเป็นร้าน\nริมทะเลสิ! ต้องลองไปให้ได้\nห้ามพลาดเด็ดขาดเลยนะ! คุณครู!"
16006-140 = "สีแดง สีเหลือง สีเขียว…\nแล้วก็สีน้ำเงิน..."
16006-150 = "แล้วคุณครูล่ะ\nชอบอันไหนที่สุดเหรอ?"
16006-160 = "หืม?\nฉันก็พูดถึงรสชาติของ\nน้ำแข็งไสน่ะสิ?"
16006-170 = "คุณครู\nถ้าไปว่ายน้ำในทะเลละก็\nจะหิวทันทีเลยใช่หรือเปล่าล่ะ? "
16006-180 = "เพราะงั้นฉันก็เลย...\nเตรียมวิธีรับมือมาด้วยไง"
16006-190 = "เอาห่วงยางว่ายน้ำ\nที่กินได้ระหว่างว่ายน้ำไปด้วย\nแค่นั้นก็ได้แล้วล่ะ!"
16006-200 = "เป็นไง ไอเดียนี้สุดยอดเลย\nใช่มั้ยล่ะ?! อ่ะแฮ่ม!"
16006-210 = "เอ๋?\nไม่มีห่วงยางแบบนั้นเหรอ?\n...ทำไมล่ะ?"
16006-220 = "สุขสันต์วันเกิดนะ คุณครู!"
16006-230 = "ถ้างั้นเพื่อเป็นที่ระลึก...\nวันนี้เรามาเล่นน้ำ\nที่ชาเล่ต์กันเถอะ!"
16006-240 = "เซอร์ไพรส์~ วันนี้เป็นวันเกิด\nของฉันล่ะ คุณครู! เอาละ\nเพราะงั้น... ไปว่ายน้ำกันเถอะ!"
16006-250 = "ถึงจะยังไม่ใช่ฤดูร้อน...\nแต่ถ้าได้อยู่กับคุณครูละก็\nยังไงก็ต้องสนุกอยู่แล้ว!"
16006-260 = "สวัสดีปีใหม่!\nคุณครู!"
16006-270 = "โอโซนิสำหรับวันปีใหม่ก็น่าสนนะ!\nแต่ปีนี้ฉันอยากรีบไปกินของอร่อยๆ\nของฤดูร้อนกับคุณครูเร็วๆ มากกว่า"
16006-280 = "เมอร์รี คริสต์มาส~\nถามว่าวันคริสมาสต์แต่ก็ใส่ชุด\nว่ายน้ำแล้วฉันหนาวมั้ยน่ะเหรอ?"
16006-290 = "ไม่ต้องห่วง\nฉันเพิ่งกินอุด้งร้อนๆ\nไปเมื่อกี้เอง"
16006-300 = "ฮาโลวีน\nวันที่เราจะแต่งตัวแปลกๆ\nแล้วออกไปรับลูกกวาด..."
16006-310 = "หึ... ถ้าเป็นฉันในตอนนี้ละก็\nแต่งตัวโอเคหรือเปล่า?"
16006-330 = "คะ... คุณครู... ช่วยฉันด้วย..."
16006-340 = "ฉันรู้สึก... ว่ามันแปลกๆ นะ...\nมันเปียกๆ... แล้วก็เหนียวๆ...\nกรี๊ดดดด~~!"
16006-350 = "อย่าเข้ามาน๊า~!\nฉันไม่ใช่อาหารของแกนะ~!"
16006-360 = "แล้วฉันก็มีอาหารที่ยังไม่เคย\nกินเยอะแยะเลยด้วย~!"
16006-370 = "ย้า?! อึ่ก...\nฉันจะยอม... ถูกเล่นงาน\nฝ่ายเดียวไม่ได้…!"
16006-380 = "อึ่ก! ก่อนที่จะโดน\nเจ้าหมึกยักษ์กิน\nฉันจะต้องกินมันก่อน…!"
16006-390 = "ฉันจะกินมัน\nก่อนเลยดีกว่า!"
16006-2600 = "อุปกรณ์สำหรับฤดูร้อน?!\nเตรียมมาให้ฉันโดยเฉพาะเลยเหรอ?!\nว้าววว~! ดีใจจัง~! ขอบคุณนะ!"

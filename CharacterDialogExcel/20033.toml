[translation]
20033-10 = "หึหึหึ Blue Archive!"
20033-20 = "ในที่สุดก็มาสักทีนะ! คิกคิกคิก... \nท่านฮานุมะ มาโคโตะ แห่งแพนเดโมเนียม โซไซตี้\nมาหาถึงที่เลยนะ จงต้อนรับเราอย่างยิ่งใหญ่ซะเถอะ"
20033-30 = "ชาเล่ต์...\nคิกๆ... ดูยังไงก็เป็นที่\nที่คับแคบซะจริงๆ"
20033-40 = "คงจะต้องวางแผน...\nทำเป็นสวนสนุกของอิบูกิ..."
20033-50 = "ยัยอิโรฮะ\nถ้าควบคุมให้ดีๆ ละก็..."
20033-60 = "ซัตสึกิกับจิอากิ\nยัยพวกนั้นก็คง\nจะไม่อู้งานกันแบบนี้..."
20033-70 = "บรรยากาศแบบนี้\nใช้ได้ทีเดียวเลยนะ"
20033-80 = "มาแล้วเหรอ คุณครู\nอย่าทำให้ผู้นำของ\nแพนเดโมเนียม โซไซตี้\nต้องรอนานล่ะ"
20033-90 = "คิกคิกคิก งั้นก็ดี\nถ้างั้นมาเริ่มเล่าเรื่องราว\nความยิ่งใหญ่ของท่านมาโคโตะกันเถอะ"
20033-100 = "สายไปแล้วละ คุณครู\nเรากำลังคิดแผนการ\nเพื่อพิชิตคิโวทอสได้พอดีเลย"
20033-110 = "เราจะอธิบายให้ฟังเอง\nรีบมานั่งซะสิ"
20033-120 = "คิกคิก ไม่คิดเลย\nว่าจะมีวันที่เรา\nจะต้องมาเข้าเวรตัวแทน"
20033-130 = "เอาเถอะ งานจิปาถะอาจเป็นงาน\nเพื่อความก้าวหน้าของแผนการ\nยึดครองคิโวทอสก็ได้... คิกคิกคิก"
20033-140 = "วันที่คุณครูจะร่วมมือกับ\nผู้นำที่เปี่ยมด้วยความสามารถ\nอย่างท่านมาโคโตะผู้นี้\nคงจะมาถึงในสักวัน"
20033-150 = "ดั่งการมอบกระบองให้กับยักษ์\nและติดปีกให้กับเสือนั่นเอง!\nคิกคิกคิก!"
20033-160 = "หืม?\nตอนนี้มีงานด่วนมากๆ\nก็เลยช่วยเราไม่ได้... งั้นเหรอ?"
20033-170 = "คิกคิกคิก ไม่ต้องห่วง\nเราเข้าใจเป็นอย่างดี\nว่าคุณครูเองก็มีงานยุ่ง"
20033-180 = "มีบางครั้งที่การตามหา\nพุดดิ้งของอิบูกิก็สำคัญ\nกว่าความสำเร็จอันยิ่งใหญ่"
20033-190 = "อ่า... บางทีก็มีวันแบบนั้น\nเหมือนกัน"
20033-200 = "คิกคิก...\nเราเพิ่งเคยเจอคนอย่างคุณครูเลย"
20033-210 = "ไม่เห็นด้วยหรือไม่ปฏิเสธ\nความเห็นของเรา แต่ก็...\nไม่แสดงความคิดเห็นอะไร..."
20033-220 = "น่าสนใจดีจริงๆ...\nหึหึหึ"
20033-230 = "ความสำเร็จไม่ได้สร้างขึ้นได้\nภายในชั่วข้ามคืนฉันใด\nท่านมาโคโตะผู้นี้\nก็จะไม่มีวันยอมแพ้ฉันนั้น"
20033-240 = "สักวันหนึ่ง เราจะทำให้\nคุณครูมาเป็นคนของเรา\nให้ได้เลย"
20033-250 = "ตั้งแต่นี้ไปก็เตรียมใจ\nเอาไว้ซะล่ะ คิกคิกคิก!"
20033-260 = "หึหึหึ... คิกคิกคิก...!\nเราได้ยินมาแล้วละ\nว่าวันนี้เป็นวันเกิดของคุณครู"
20033-270 = "ทางแพนเดโมเนียม โซไซตี้ก็เลย\nเป็นเจ้าภาพจัดงานปาร์ตี้ฉลองให้\nไม่มีเวลามาลังเลแล้ว\nไปกันเลยมั้ย คุณครู! คิกคิกคิก!"
20033-280 = "อวยพรวันเกิดให้ท่านมาโคโตะผู้นี้...?"
20033-290 = "คิกคิกคิก รอบรู้พอตัวเลยนี่ คุณครู!\nการแสดงความยินดีในวันเกิดของ\nผู้นำที่ยิ่งใหญ่เป็นเรื่องที่เหมาะสมแล้ว"
20033-300 = "ถ้าคุณครูพูดอย่างนั้นละก็\nไปกันต่อเลยมั้ย!"
20033-310 = "ถ้างั้นตั้งแต่นี้ไปเราจะจัดงาน\nฉลองวันเกิดของท่านมาโคโตะ!"
20033-320 = "สวัสดีปีใหม่\nรุ่งอรุณวันใหม่มาถึงแล้วละคุณครู"
20033-330 = "เรามาคุยกันเรื่อง\nแผนการพิชิตคิโวทอส\nครั้งใหม่กันมั้ย?"
20033-340 = "การประชุมครั้งแรกในปีใหม่!\nอย่ามาสายล่ะ!"
20033-350 = "คิกคิก...\nเมอร์รีคริสต์มาสนะ ครู..."
20033-360 = "วันนี้คนประหลาดๆ ที่นั่งรถลาก\nจะบินข้ามขอบฟ้าด้วยความเร็วแสง\nแล้วมามอบของขวัญให้กับเด็กๆ\nที่ทำตัวดีสินะ"
20033-370 = "...เราจะยอมแพ้ไม่ได้\nตั้งแต่นี้ไปเราจะออกไป\nซื้อของขวัญให้อิบูกิ!"
20033-380 = "คุณครูจะออกไปด้วยกันมั้ย?"
20033-390 = "ฮาโลวีนงั้นเหรอ\nเป็นวันที่เราถูกใจ\nรองมาจากเอพริล ฟูล เดย์เลย"
20033-400 = "ก็มันเป็นวันที่อนุญาต\nให้เล่นซนได้ทุกอย่างเลยนี่นา"
20033-410 = "คิกคิกคิก...\nคุณครูก็ลองมาเล่นด้วยกันมั้ย?\nทริก ออร์ ทรีต"
20033-430 = "คิกคิกคิก คุณครู...\nเราติดตามดูการกระทำ\nของคุณครูมาตลอด"
20033-440 = "ทั้งเรื่องที่ช่วยเหลือคนอื่น\nและคลี่คลายเหตุการณ์ต่างๆ...\nก็เลยทำให้ชาเล่ต์มีชื่อเสียงขึ้นมา!"
20033-450 = "หึหึหึ เพราะงั้นตอนนี้\nก็คงถึงเวลาที่จะต้องยอมรับ\nแล้วสินะ..."
20033-460 = "ใช่แล้ว! คุณเป็นคนที่มีความสามารถ\nพอที่จะเคียงบ่าเคียงไหล่\nกับท่านมาโคโตะผู้นี้ได้!"
20033-470 = "เราประเมินความสามารถนั้นไว้สูงมาก...\nเพราะงั้นเราจะยื่นข้อเสนอที่ปฏิเสธไม่ลง\nให้ก็แล้วกัน"
20033-480 = "คุณครูจากชาเล่ต์\nจงมาร่วมมือกับ\nแพนเดโมเนียม โซไซตี้ของเรา..."
20033-490 = "ไม่สิ จงมาร่วมมือ\nกับท่านมาโคโตะผู้นี้ซะ!"
20033-500 = "ถ้าพวกเราร่วมมือกันละก็\nคงพิชิตคิโวทอสได้อย่าง\nง่ายดาย!"
20033-510 = "และถ้าทำสำเร็จละก็...\nเราจะยอมแบ่งคิโวทอส\nให้ชาเล่ต์ครึ่งหนึ่งก็แล้วกัน!"
20033-520 = "ว่ายังไง เป็นข้อเสนอ\nที่ไม่เลวเลยใช่มั้ย?"
20033-530 = "มาเถอะ คุณครู! มาร่วมทำความฝัน\nอันยิ่งใหญ่ของเราให้กลายเป็นจริงกันเถอะ!"
20033-540 = "คิคิกคิก\nคิกคิกคิกคิก!"
20033-2600 = "คิก...คิกคิก...วะฮะฮ่าฮ่าฮ่า!\nจริงๆ เลย ไม่ธรรมดาเลยนะ คุณครู\nเตรียมของขวัญแบบนี้มาให้งั้นเหรอ\nงั้นเราจะรับไว้เป็นหลักฐาน\nแห่งความเชื่อใจก็แล้วกัน\nต่อไปก็ขอฝากตัวด้วยนะ "

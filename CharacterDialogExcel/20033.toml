[translation]
20033-10 = "Kihehe. Blue... Archive!"
20033-20 = "I have arrived! Kihehe. I, the Great Hanuma Makoto of the Pandemonium Society, am here in the flesh. Now bow! Shower me with your praise and hospitality!"
20033-30 = "Schale... Kihehe. It's as cramped as ever."
20033-40 = "Ibuki's playground project must be planned and constructed meticulously..."
20033-50 = "If we wish to ensure Iroha's capture..."
20033-60 = "Satsuki. Chiaki. I will be GREATLY displeased if I hear you're ditching class again."
20033-70 = "These vibes aren't too bad."
20033-80 = "You're finally here, Sensei. You shouldn't keep the leader of the Pandemonium Society waiting too long."
20033-90 = "Kihehe. Well, all right. Let us speak of my great deeds."
20033-100 = "You're late, Sensei. I just came up with a brilliant scheme to conquer Kivotos."
20033-110 = "I'll share it with you. Come. Hurry up and take a seat."
20033-120 = "Kihehe. To think the day would come where I, of all people, would be the Student Rep."
20033-130 = "Well, perhaps this chore could grow into a plan to conquer Kivotos... Yes indeed. Kihehe."
20033-140 = "The day that I, a capable leader, gain Sensei's full cooperation..."
20033-150 = "It'll be like giving wings to a tiger! Or throwing gasoline onto a raging fire! Kekeke!"
20033-160 = "Hmmm? There's an emergency right now, and you can't help me?"
20033-170 = "Kihehe, don't worry. I understand that you're quite busy."
20033-180 = "Sometimes finding the whereabouts of Ibuki's pudding is a feat worthy of the great sagas from mythology."
20033-190 = "Ah... Some days do truly feel like that. Yes indeed."
20033-200 = "Kihehe. I've never met anyone like you before."
20033-210 = "You neither agree nor disagree with me. And you don't butt in with your opinion either..."
20033-220 = "...fascinating. Kihehe."
20033-230 = "Great deeds do not happen overnight. I, the Great Makoto, vow to never give up."
20033-240 = "Someday, surely, you shall stand by my side."
20033-250 = "Prepare yourself for that day. Kihehe!"
20033-260 = "Heehee... Kekeke! I heard the news. Today is your birthday, eh, Sensei?"
20033-270 = "The Pandemonium Society shall host a celebration in your honor. There's no time to waste. Let's go, Sensei! Kihehe!"
20033-280 = "You wish me a happy birthday?"
20033-290 = "Kihehe. So you're not completely clueless, Sensei! It's only natural to celebrate the birth of a great leader."
20033-300 = "If Sensei assents, we shall press on!"
20033-310 = "Let us begin my great birthday festival!"
20033-320 = "Happy New Year. It is the dawn of a new era, Sensei."
20033-330 = "Shall we discuss the latest plan to conquer Kivotos?"
20033-340 = "It'll be the monumental first meeting of the year! Don't be late!"
20033-350 = "Kihehe, Merry Christmas, Sensei."
20033-360 = "Apparently, today is a holiday when a freak in a sled flies across the sky at Mach speed, leaving gifts for good children."
20033-370 = "I will not be outdone. Let us purchase gifts for Ibuki!"
20033-380 = "Care to join me, Sensei?"
20033-390 = "Ah, Halloween. My favorite holiday after April Fool's Day."
20033-400 = "Pranks are permitted all across the board."
20033-410 = "Kihehe. Well then, Sensei? Trick or treat?"
20033-430 = "Kiheheheh! Sensei...I've been keeping tabs on your achievements."
20033-440 = "You've helped others, solved problems... And raised the reputation of Schale to new heights!"
20033-450 = "Kiheheh, I'm sure you can't help but acknowledge the truth──"
20033-460 = "Indeed, you are an elite with strength equal to the Great Makoto!"
20033-470 = "In appreciation of such grand ability... I am prepared to make you an equally grand offer."
20033-480 = "Sensei of Schale! Join forces with the Pandemonium Society..."
20033-490 = "No... Join forces with me, Hanuma Makoto!"
20033-500 = "With our hearts aligned, the conquest of Kivotos will be inevitable!"
20033-510 = "On that great day, we shall split Kivotos between us! Half of the city shall belong to Schale!"
20033-520 = "Is this not a pact, worthy of the great?"
20033-530 = "Take my hand, Sensei! Let us fulfill our grand dream side-by-side!"
20033-540 = "Kiheheheh-eheheheh!"
20033-2600 = "Ki...Kihe...Kihehehehe! You're quite formidable, Sensei. To have prepared such a gift... I'll take it as proof of your faith. I look forward to having your support in the future as well."

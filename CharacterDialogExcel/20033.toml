[translation]
20033-10 = "키키킷. 블루… 아카이브!"
20033-20 = "드디어 강림하였도다!\n키키킥, 판데모니움 소사이어티의 하누마 마코토 님이 직접 찾아와 주신 것이다. 극진히 환대하도록."
20033-30 = "샬레……\n키킥, 언제 봐도\n비좁은 곳이구만."
20033-40 = "이부키의 놀이터를….\n계획적으로 만들어야…."
20033-50 = "이로하 녀석을,\n확실히 포획하려면……"
20033-60 = "사츠키와 치아키,\n땡땡이는 치지\n않았으면 한다만…"
20033-70 = "이 분위기,\n제법 괜찮지 않은가."
20033-80 = "드디어 왔나. 선생.\n판데모니움 소사이어티의 리더를\n너무 기다리게 하지 말도록."
20033-90 = "키키킥. 뭐, 좋아.\n그럼 마코토 님의\n위업 이야기를 시작하지."
20033-100 = "늦었지 않나. 선생.\n마침 키보토스 정복을 위한\n획기적인 구상이 떠오른 참이다."
20033-110 = "지금부터 설명하지.\n얼른 자리에 앉도록."
20033-120 = "키킷. 설마 이 몸이\n직접 당번을 하는 날이\n올 줄이야."
20033-130 = "뭐, 잡무가 키보토스 정복\n계획으로 발전하는 일도….\n충분히, 있을 수 있지. 키키킥."
20033-140 = "유능한 지도자인 마코토 님이,\n선생의 협력을 얻은 날에는…."
20033-150 = "그야말로 도깨비에게 방망이,\n호랑이 등에 날개라는 거지!\n키키킷!"
20033-160 = "흐음?\n지금은 급한 일이 있어\n나를 도와줄 수 없다, 고?"
20033-170 = "키시싯, 걱정 말도록.\n선생이 바쁜 것 정도는\n이해하고 있으니."
20033-180 = "때로는 위업보다\n이부키의 푸딩의 행방이\n더 중요할 때도 있지."
20033-190 = "아아….\n그런 날도, 있고말고."
20033-200 = "키킷.\n선생 같은 사람은, 처음이다."
20033-210 = "내 의견에 찬동하는 것도,\n반대하는 것도 아니고,\n그렇다고 참견도 하지 않는……."
20033-220 = "……실로 흥미로워,\n큭큭큭."
20033-230 = "위업은 하룻밤 사이에\n이루어지지 않는 법.\n마코토 님은 절대로\n포기하지 않을 테니 말이다."
20033-240 = "언젠가 반드시, 선생을\n내 것으로 만들어 보이겠다."
20033-250 = "지금부터 각오해 두는 게\n좋을 게야. 키키킷!"
20033-260 = "크큭…… 키키킷…!\n이야기는 들었다.\n오늘이 선생의 생일이라고."
20033-270 = "판데모니움 소사이어티 주최로\n축하 파티를 열었다.\n우물쭈물할 틈은 없다.\n가볼까! 선생! 키키킥!"
20033-280 = "마코토 님의 생일 축하……?"
20033-290 = "큭큭큭, 뭘 좀 아는군! 선생!\n위대한 지도자의 탄생을\n축하하는 건, 지극히 당연한 일."
20033-300 = "선생이 그렇게 말한다면\n계속해 보실까!"
20033-310 = "지금부터, 이 마코토 님의\n탄생제를 열겠다!"
20033-320 = "새해 복 많이 받도록.\n해가 밝았다. 선생."
20033-330 = "새로운 키보토스\n정복 계획에 대해\n논의해 보실까."
20033-340 = "기념비적인 새해 첫 회의다!\n늦지 말도록!"
20033-350 = "키킷,\n메리 크리스마스다. 선생."
20033-360 = "오늘은 썰매를 탄 괴인이\n마하의 속도로 하늘을 날아,\n착한 아이에게 선물을\n뿌리는 날, 이라고 하더군."
20033-370 = "……질 수는 없지.\n지금부터 이부키의 선물을\n사러 나간다!"
20033-380 = "선생도 같이 가겠나?"
20033-390 = "할로윈인가.\n만우절 다음으로\n마음에 드는 날이다."
20033-400 = "장난이 전면적으로\n허용되니 말이야."
20033-410 = "킥킥킥.\n선생님도 같이 어떤가?\n트릭 오어 트릿."
20033-430 = "키시싯. 선생이여.\n활약은 지켜보고 있었다."
20033-440 = "너는 타인을 돕고,\n사건을 해결하며……\n샬레의 명성을 높여왔지!"
20033-450 = "키키킥, 이래서야 이젠\n인정하지 않을 수 없겠지──"
20033-460 = "그래, 네가 이 마코토 님과\n어깨를 나란히 할 정도의,\n실력자라는 걸!"
20033-470 = "그 능력을 높이 평가하여……\n거절할 수 없는\n중대한 제안을 하도록 하지."
20033-480 = "샬레의 선생이여,\n우리 판데모니움 소사이어티와……"
20033-490 = "아니, 이 하누마 마코토 님과\n손을 잡도록!"
20033-500 = "우리가 힘을 합치면,\n키보토스의 정복 따윈\n식은 죽 먹기!"
20033-510 = "만약 그리된다면,\n키보토스의 절반을\n샬레에게 주도록 하마!"
20033-520 = "어때, 나쁘지 않은 거래지?"
20033-530 = "자아, 선생! 이 몸과!\n원대한 꿈을 이루어 보자꾸나!"
20033-540 = "키키킥,\n키시시시시시싯!"
20033-2600 = "킥… 키킥… 캬하하하하!\n정말이지, 만만치 않군. 선생. 이런 선물을 준비했다니.\n…신뢰의 증거로서 받아두도록 하지.\n앞으로도 잘 부탁하마. 선생."

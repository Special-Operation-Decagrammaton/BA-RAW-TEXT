[translation]
20033-10 = "嘻嘻嘻。蔚藍…檔案！"
20033-20 = "終於降臨了！\n嘻嘻嘻，萬魔殿的羽沼真琴大人大駕光臨。記得好好款待啊。"
20033-30 = "夏萊……\n嘻嘻，不管怎麼看\n都是個狹小的地方。"
20033-40 = "伊吹的遊樂場…\n必須有計畫地打造…"
20033-50 = "伊呂波那傢伙，\n如果想確實逮到…"
20033-60 = "皐月和千秋，\n希望他們沒偷懶…"
20033-70 = "這個氣氛，\n還挺不錯的嘛。"
20033-80 = "終於來啦，老師。\n最好別讓萬魔殿的\n領導者等太久哦。"
20033-90 = "嘻嘻嘻，算了。\n那麼，開始談談\n真琴大人的豐功偉業吧。"
20033-100 = "來得真晚啊，老師。\n我正好想到征服\n奇普托斯的劃時代構想。"
20033-110 = "現在就開始說明，\n快就座吧。"
20033-120 = "嘻嘻，想不到會有我\n親自當值日生的一天。"
20033-130 = "算了，從雜務發展成\n奇普托斯征服計畫……\n也非常有可能。嘻嘻嘻。"
20033-140 = "優秀的領導者真琴大人，\n得到老師協助的那天……"
20033-150 = "就有如鬼怪得到棒子，\n如虎添翼啊！嘻嘻嘻！"
20033-160 = "哼嗯？現在有急事，\n沒辦法幫我，是嗎？"
20033-170 = "嘰嘻嘻，別擔心。\n我明白老師很忙。"
20033-180 = "有時比起偉業，\n伊吹的布丁的下落\n反而更重要。"
20033-190 = "啊啊……\n那種日子，當然也有。"
20033-200 = "嘻嘻。\n第一次看到像老師這樣的人。"
20033-210 = "既不贊成我的意見，\n卻也不會反對，\n而且也不會干預……"
20033-220 = "……真有意思。咯咯咯。"
20033-230 = "偉業不會在一夜之間完成。\n真琴大人是絕對不會放棄的。"
20033-240 = "總有一天，我一定會\n把老師變成我的東西！"
20033-250 = "最好現在就做好覺悟，嘻嘻嘻！"
20033-260 = "咯咯……嘻嘻嘻……！\n我聽說了，\n今天似乎是老師的生日。"
20033-270 = "萬魔殿主辦的\n慶祝派對開始了。\n沒時間磨蹭了。\n走吧老師！嘻嘻嘻！"
20033-280 = "真琴大人的生日祝福……？"
20033-290 = "咯咯咯，你很懂嘛，老師！\n讚嘆偉大領導者的誕生，\n是天經地義的事。"
20033-300 = "既然老師這麼說了，\n那就繼續吧！"
20033-310 = "從現在起，要舉辦\n我真琴大人的誕生祭囉！"
20033-320 = "新年快樂。\n新年到了呢，老師。"
20033-330 = "來討論新的奇普托斯\n征服計畫吧。"
20033-340 = "這是值得的新年初次會議！\n記得別遲到！"
20033-350 = "嘻嘻，\n聖誕快樂，老師。"
20033-360 = "聽說今天是坐著雪橇的怪人\n以馬赫的速度在天上飛行，\n分送禮物給乖孩子的日子。"
20033-370 = "……我可不能輸。\n現在就出去買送給\n伊吹的禮物吧！"
20033-380 = "老師也要一起去嗎？"
20033-390 = "是萬聖節啊。\n是除了愚人節之外\n最喜歡的日子。"
20033-400 = "因為所有惡作劇\n都會得到允許。"
20033-410 = "嘻嘻嘻。\n老師要不要也參一腳？\n不給糖就搗蛋。"
20033-430 = "嘰嘻嘻嘻，老師啊，\n你的活躍我都看在眼裡哦。"
20033-440 = "你幫助他人，\n解決事件……\n提升了夏萊的名聲！"
20033-450 = "嘻嘻嘻，既然如此，\n我也不得不認同──"
20033-460 = "沒錯，你是能和我真琴大人\n平起平坐的有能之人！"
20033-470 = "我就對你的能力給予高度評價…\n並提出無法拒絕的重大提案吧。"
20033-480 = "夏萊的老師啊，\n和我們萬魔殿……"
20033-490 = "不，和我羽沼真琴大人\n聯手吧！"
20033-500 = "只要我們能齊心協力，\n征服奇普托斯\n簡直易如反掌！"
20033-510 = "如果順利的話，\n我就把奇普托斯的\n一半分給夏萊吧！"
20033-520 = "怎麼樣，是筆不錯的交易吧？"
20033-530 = "來吧！老師！和我一起！\n實現遠大的夢想吧！"
20033-540 = "嘰嘻嘻嘻，\n嘰嘻嘻嘻嘻嘻嘻！"
20033-2600 = "嘻……嘻嘻……嘻哈哈哈哈！\n真的是不容小覷啊，老師。居然準備了這種禮物。\n……我就作為信賴的象徵收下了。\n以後也拜託你了，老師。"

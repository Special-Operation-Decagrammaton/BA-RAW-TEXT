[translation]
23008-10 = "Blue Archive."
23008-20 = "All encounters are inevitable... It's a pleasure to see you, Sensei."
23008-30 = "I feel a holy energy..."
23008-40 = "The weather is nice today as well."
23008-50 = "Would it be okay...if we stop here and rest a bit?"
23008-60 = "Blessings be with this place."
23008-70 = "May the world be at peace for a while."
23008-80 = "Welcome, Sensei. You look great today."
23008-90 = "Grace be with you. I pray you have a nice day today."
23008-100 = "Would you like to hear a verse?"
23008-110 = "P-Please don't do anything unholy while I'm praying, okay?"
23008-120 = "(May my prayers protect you, Sensei)"
23008-130 = "You can confide in me when you're having a rough time."
23008-140 = "If it's you, Sensei..."
23008-150 = "Everything will be okay. I'm sure of it."
23008-160 = "You being born meant we were able to be together like this."
23008-170 = "So I'm genuinely happy to celebrate today of all days."
23008-180 = "I can't believe I get to spend my birthday with you, Sensei."
23008-190 = "I already feel as though I've been blessed with a gift. Asking for more feels like tempting fate."
23008-200 = "Happy New Year. I wonder what fun things lie ahead."
23008-210 = "I'm looking forward to it."
23008-220 = "It's a festive day on which a great saint was born."
23008-230 = "I hope you have a reverent and holy day."
23008-240 = "I'm afraid I must decline the candy."
23008-250 = "Abstinence is one of the virtues of a Sister."
23008-270 = "Thank you for coming, Sensei."
23008-280 = "Yes. I was just saying a prayer for you, Sensei."
23008-290 = "A quiet place like this is great for praying."
23008-300 = "When I pray, it feels as though my heart is being cleansed."
23008-310 = "There are paths you've taken so far, and paths you must still take."
23008-320 = "May peace and happiness find you wherever you choose to go."
23008-330 = "Hm? Have I ever prayed for myself?"
23008-340 = "That's...no, it's okay."
23008-350 = "I am happy if you are happy, Sensei."
23008-360 = "In other words, this can be a prayer for us."
23008-2600 = "I didn't want to use a weapon, but if it's to combat injustice then..."

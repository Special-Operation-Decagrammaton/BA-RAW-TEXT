[translation]
23008-10 = "블루 아카이브."
23008-20 = "모든 만남은 필연적인 것……\n잘 부탁드립니다, 선생님."
23008-30 = "성스러운 기운이\n느껴지네요…"
23008-40 = "오늘도\n날씨가 좋네요."
23008-50 = "아주 잠깐이라면…\n여기서 쉬었다\n가도 괜찮을까요?"
23008-60 = "이 장소에\n축복이 깃들길."
23008-70 = "이 세상이\n잠시나마 평화롭기를."
23008-80 = "어서 오세요, 선생님.\n오늘도 멋진 모습이시네요."
23008-90 = "은총이 함께하시길.\n오늘도 좋은 하루가\n되시길 기원하겠습니다."
23008-100 = "좋은 말씀 한 구절,\n듣고 가실래요?"
23008-110 = "부, 불경한 일은\n안된다구요……?"
23008-120 = "(제 기도가 선생님을\n지킬 수 있도록……)"
23008-130 = "힘드실 때는 저에게\n의지해 주셔도\n괜찮답니다."
23008-140 = "선생님이라면…"
23008-150 = "아뇨, 분명 괜찮을 거에요."
23008-160 = "오늘 선생님께서\n태어나 주셨기에\n저희는 이렇게\n만날 수 있었습니다."
23008-170 = "오늘이라는 날에\n진심 어린 감사를."
23008-180 = "생일을 이렇게 선생님과\n함께 보낼 수 있다니…"
23008-190 = "너무 행복한 선물을 받아서,\n나중에 벌받지 않을까\n걱정되네요."
23008-200 = "새해 복 많이 받으세요.\n올 한 해는 어떤 즐거운\n일들이 기다리고 있을까요?"
23008-210 = "벌써부터 기대가 되네요."
23008-220 = "위대한 성자가 태어난\n축일이로군요."
23008-230 = "경건하고 성스러운\n하루가 되었으면 좋겠습니다."
23008-240 = "사탕은… 괜찮습니다."
23008-250 = "금욕은 시스터의\n덕목 중 하나니까요."
23008-270 = "와 주셔서 감사합니다.\n선생님."
23008-280 = "네. 선생님을 위해\n기도하고 있었어요."
23008-290 = "이렇게 조용한 곳은,\n기도하기에도 좋거든요."
23008-300 = "기도하는 동안에는 제 마음도\n깨끗해지는 느낌이라……"
23008-310 = "선생님께서 지금까지 오신 길들,\n그리고 앞으로 가실 길들……"
23008-320 = "거기에 부디\n가능한 한 많은 평화와\n행복이 함께 하기를……"
23008-330 = "네?\n자길 위해 기도하지는\n않느냐…… 고요?"
23008-340 = "그건…… 아니, 괜찮습니다."
23008-350 = "선생님께서\n행복하신 걸 보면\n저도 기쁘니."
23008-360 = "즉 이것은, 저희를 위한\n기도……인 것일지도요."
23008-2600 = "그다지 무기는 쓰고 싶지 않지만…\n평화를 위해서라면."

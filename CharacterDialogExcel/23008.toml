[translation]
23008-10 = "Blue Archive。"
23008-20 = "所有的相遇都是必然……\n今後還請多多指教，老師。"
23008-30 = "能感受到\n神聖的氣息，\n是個很棒的地方呢。"
23008-40 = "今天\n天氣也很好呢。"
23008-50 = "只是一會的話…\n就算在這裡休息\n也沒關係嗎？"
23008-60 = "但願從今以後，\n這裡都能永遠充滿祝福。"
23008-70 = "願這個世界\n多少能和平一點……"
23008-80 = "歡迎回來，老師。\n今天也能見到您，真開心呢。"
23008-90 = "希望今天也是美好的一天，\n我會為您祈禱的。"
23008-100 = "要稍微聽我\n說說話再走嗎？"
23008-110 = "不，不檢點的行為\n是不可以的唷……？"
23008-120 = "（願我的祈禱，\n　能守護老師……）"
23008-130 = "覺得辛苦的時候，\n依靠我也可以的唷。"
23008-140 = "如果是老師的話……"
23008-150 = "不，一定沒問題的。"
23008-160 = "因為今天老師誕生了，\n我們才能像這樣遇見。"
23008-170 = "對今天這個日子，\n我打從心裡感謝。"
23008-180 = "生日居然可以像這樣，\n和老師一起度過……"
23008-190 = "因為太幸福了，\n有點擔心之後會不會\n因此受到懲罰。"
23008-200 = "新年快樂。今年會有什麼\n開心的事在等著我們呢……"
23008-210 = "已經開始期待了呢。"
23008-220 = "今天是偉大聖人\n誕生的節日……"
23008-230 = "虔誠地\n一起度過這神聖的一天吧。"
23008-240 = "糖果……啊，不，\n沒關係的。"
23008-250 = "身為修女，\n節制是很重要的。"
23008-270 = "您願意過來，\n非常感謝您，老師。"
23008-280 = "是的。我正在\n為老師祈禱。"
23008-290 = "在這種安靜的地方進行祈禱，\n再適合不過了。"
23008-300 = "就連正在祈禱的，我的心靈，\n彷彿也受到了洗滌……"
23008-310 = "老師至今為止走過的道路，\n以及往後選擇的路……"
23008-320 = "希望在那裡，\n能盡可能地充滿和平，\n以及幸福……"
23008-330 = "咦，\n您問我是否有\n為自己祈禱……是嗎？"
23008-340 = "這……\n不，沒關係的。"
23008-350 = "老師能夠幸福的話，\n我也會很幸福的。"
23008-360 = "所以，\n這也能說是……\n為了我們而祈禱。"
23008-2600 = "雖然不太想使用武器……\n不過如果是為了和平的話……"

[translation]
23008-10 = "Blue Archive"
23008-20 = "ทุกการพบเจอกัน\nมันเป็นสิ่งที่ถูกกำหนดเอาไว้...\nขอฝากตัวด้วยนะคะคุณครู"
23008-30 = "ฉันรู้สึกได้ถึง\nพลังศักดิ์สิทธิ์ด้วยล่ะค่ะ..."
23008-40 = "วันนี้...\nอากาศดีจังเลยนะคะ"
23008-50 = "เรามาหยุดพักที่นี่\nสักครู่ก่อน\nแล้วค่อยไปต่อดีมั้ยคะ?"
23008-60 = "ขอให้พร\nสถิตอยู่กับที่แห่งนี้"
23008-70 = "ขอให้โลกนี้ได้พบกับ\nความสงบสุขในชั่วขณะหนึ่ง"
23008-80 = "เชิญค่ะคุณครู\nวันนี้คุณครูก็ยังสุดยอดเหมือนเดิมนะคะ"
23008-90 = "ขอให้พรสถิตอยู่กับคุณครูค่ะ\nขอภาวนาให้วันนี้เป็นวันที่ดีนะคะ"
23008-100 = "ก่อนจะไป คุณครูอยากฟัง\nบทสวดสักบทก่อนมั้ยคะ?"
23008-110 = "ฉะ...ฉันไม่ควรทำอะไร\nที่ไม่เหมาะสมนะคะ!"
23008-120 = "(ขอให้คำภาวนาของฉัน\nคุ้มครองคุณครู...)"
23008-130 = "ตอนที่คุณครูลำบาก\nมาพึ่งพิงฉันก็ได้นะคะ"
23008-140 = "ถ้าเป็นคุณครูล่ะก็..."
23008-150 = "ไม่เป็นไรแน่นอนค่ะ!"
23008-160 = "วันนี้เป็นวันที่คุณครู\nเกิดขึ้นมาบนโลก\nเพราะงั้นเลยทำให้พวกเรา\nได้มาพบเจอกันแบบนี้ไงคะ"
23008-170 = "ฉันรู้สึกขอบคุณวันนี้มากเลยค่ะ"
23008-180 = "คิดไม่ถึงเลยว่าจะได้อยู่กับคุณครู\nในวันเกิดแบบนี้..."
23008-190 = "ฉันจะถูกพระเจ้าลงโทษ...\nเพราะได้รับของขวัญมากเกินไป\nรึเปล่านะ กังวลจังเลยค่ะ"
23008-200 = "สวัสดีปีใหม่นะคะคุณครู\nในปีนี้จะมีเรื่องดีๆ อะไร\nรออยู่กันนะคะ?"
23008-210 = "รู้สึกตื่นเต้น แทบทนไม่ไหวแล้วค่ะ"
23008-220 = "เป็นวันคล้ายวันประสูติ\nของนักบุญผู้ยิ่งใหญ่สินะคะ"
23008-230 = "ถ้าเป็นวันที่ศักดิ์สิทธิ์และสงบสุข\nก็คงจะดีนะคะ"
23008-240 = "ลูกกวาด... ไม่เป็นไรหรอกค่ะ"
23008-250 = "การหักห้ามใจเป็นข้อควรปฏิบัติ\nอย่างหนึ่งของซิสเตอร์ค่ะ"
23008-270 = "ขอบคุณที่มานะคะ คุณครู"
23008-280 = "ค่ะ ฉันกำลังสวดอธิษฐาน...\nเพื่อคุณครูอยู่พอดีเลยค่ะ "
23008-290 = "สถานที่ที่เงียบสงบแบบนี้\nยิ่งเหมาะสำหรับสวดอธิษฐานค่ะ"
23008-300 = "มันทำให้รู้สึกว่าตอนสวดภาวนา\nจิตใจฉันรู้สึกบริสุทธิ์สะอาดขึ้นค่ะ"
23008-310 = "เส้นทางที่คุณครูเลือกเดินมา\nและเส้นทางที่คุณครูมุ่งไป..."
23008-320 = "ขอให้มีแต่ความสงบสุข\nในเส้นทางเหล่านั้นนะคะ"
23008-330 = "คะ...? ฉันเคยสวดอธิษฐาน\nเพื่อตัวเองบ้างรึเปล่าน่ะเหรอคะ?"
23008-340 = "เรื่องนั้น... ไม่หรอกค่ะ\nไม่เป็นไรหรอกค่ะ"
23008-350 = "แค่ได้เห็นคุณครู\nมีความสุขแบบนี้\nฉันก็ดีใจแล้วค่ะ"
23008-360 = "หรือนี่อาจจะเป็นการสวด\nอธิษฐานเพื่อพวกเราเองก็ได้ค่ะ"
23008-2600 = "ฉันไม่ค่อยอยากใช้อาวุธเท่าไร...\nแต่หากเพื่อเอาชนะความอยุติธรรมก็ย่อมได้ค่ะ"

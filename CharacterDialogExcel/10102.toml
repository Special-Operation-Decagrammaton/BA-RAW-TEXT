[translation]
10102-10 = "B-Blue Archive...!"
10102-20 = "Hee, heehee. I'm finally here...! Summer, the beach... This is so amazing!"
10102-30 = "What do they...do here?"
10102-40 = "Heehee... It's nice and cool...although I'll be hot again as soon as I go out..."
10102-50 = "Saori must be..."
10102-60 = "A magazine sweepstakes postcard. Can I fill it out here?"
10102-70 = "The swimsuit seems...tighter than I'd like. I hope nothing's wrong with me..."
10102-80 = "Oh, S-Sensei! Are you not going to play in the water today...?"
10102-90 = "Heehee... I'm on duty today... Excuse me...!"
10102-100 = "Hee... Heehee. If it's all right, can I have an ice cream...?"
10102-110 = "What?! You already got one for me...?"
10102-120 = "Thank you! I knew it, Sensei...!"
10102-130 = "The magazines at Schale are two months old!"
10102-140 = "I knew it. Life is hard..."
10102-150 = "Hee... Heehee. I know something that'll make you despair..."
10102-160 = "The lounge refrigerator is out of ice cubes."
10102-170 = "I knew life was a pain... Even more so in summer."
10102-180 = "Heehee... Wh-What? This? Um, it's a picture I took at the beach..."
10102-190 = "Would you like to see it, Sensei?"
10102-200 = "Heehee. It's full of cold desserts. Can I bring everyone from the Squad next time?"
10102-210 = "Happy birthday...!"
10102-220 = "Weird to celebrate the day your pain began, but I guess it's okay to enjoy it if you want to..."
10102-230 = "My birthday? I'm usually not all that interested..."
10102-240 = "But thanks to what you said, it's starting to feel kind of special."
10102-250 = "Happy New Year... Another year of pain, but we have to live through it..."
10102-260 = "Heehee. I hope we get along well this year too."
10102-270 = "I-It's a Christmas gift...! It's nothing, really. I bought it at the convenience store."
10102-280 = "I-I'd appreciate it if...you accept it. Heehee."
10102-290 = "I-I have no candy... Y-You can play tricks on me instead..."
10102-300 = "What? Sensei, you're giving it to me?"
10102-310 = "Heeheehee. Thank you very much."
10102-330 = "Ouchie... It hurts..."
10102-340 = "Eek! My popsicle..."
10102-350 = "It's ruined! Totally ruined! I only took one bite, and now it's covered in sand!"
10102-360 = "I guess even a popsicle is a luxury I don't deserve! Life has forsaken me!!"
10102-370 = "Why is my life filled with such hardships?"
10102-380 = "Everyone else gets to enjoy their summer..."
10102-390 = "No matter how hard I try, it's a dream I'll never get to reach..."
10102-400 = "...What? You'll buy me another one?"
10102-410 = "You mean to say, if I didn't drop the first popsicle, I would've had two popsicles instead?!"
10102-420 = "UWAAAH! Everything really is terrible!"
10102-2600 = "Hee... Heehee. What a precious gift... I-I won't give it back, even if you ask for it later...!"

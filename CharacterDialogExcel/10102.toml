[translation]
10102-10 = "蔚，蔚藍檔案……！"
10102-20 = "耶，耶嘿嘿，結果還是來到這裡了……！\n夏天、大海……真幸福……！"
10102-30 = "這裡……\n是用來做什麼\n的地方呢？"
10102-40 = "耶嘿嘿……\n真涼快……\n雖然一到外面\n又要變熱了……"
10102-50 = "沙織姐他現在……"
10102-60 = "雜誌的抽獎明信片，\n可以在這裡寫嗎……？"
10102-70 = "總覺得泳裝好像\n有點緊……\n該不會我的身體\n很奇怪的關係吧……？"
10102-80 = "啊，老，老師？\n你今天不去玩水嗎……？"
10102-90 = "耶嘿嘿……\n今天是我當值日生……\n要受你照顧了……！"
10102-100 = "耶，耶嘿嘿，\n如果不會太失禮的話，\n能不能請我一支冰淇淋……"
10102-110 = "咦！？「就知道日和會想吃\n所以已經買好了」……？"
10102-120 = "非常感謝！\n真不愧是老師……！"
10102-130 = "放在夏萊的雜誌\n也是上上個月的……！"
10102-140 = "果然人生\n很不容易呢……！"
10102-150 = "耶，耶嘿嘿，告訴你\n一個絕望的事實哦……"
10102-160 = "冰箱裡的冰塊已經見底了……"
10102-170 = "果然人生就是\n充滿了磨難呢……\n夏天就更不用說了。"
10102-180 = "耶嘿嘿……什，什麼？\n你說這個嗎？\n呃，是在海邊\n一起拍的照片……"
10102-190 = "老師也要看嗎？"
10102-200 = "耶嘿嘿，\n有好多甜點……\n下次可以把小隊的\n大家一起帶來嗎？"
10102-210 = "祝你生日快樂……！"
10102-220 = "雖然是痛苦人生開始的日子，\n不過偶爾享受一下也不錯……"
10102-230 = "我的生日……\n其實不是特別有興趣的……"
10102-240 = "不過，多虧有老師的祝福，\n好像變成有點特別的日子了呢。"
10102-250 = "新年快樂……雖然我想今年\n也會發生很多痛苦的事情，\n不過總是得活下去的嘛……"
10102-260 = "耶嘿嘿，\n今年也請多多指教了。"
10102-270 = "這，這是聖誕禮物……！\n雖然只是不起眼的東西，\n但這是我在樓下的超商買的。"
10102-280 = "那個，希，希望你……\n願意收下。耶嘿嘿。"
10102-290 = "我，我身上沒有糖果……\n所，所以就請你惡作劇吧……"
10102-300 = "咦？老師你要給我嗎？"
10102-310 = "耶，耶嘿嘿，\n那我就欣然接受了。"
10102-330 = "痛痛痛……\n好痛哦……"
10102-340 = "噫噫！？\n我的冰棒？"
10102-350 = "完蛋了！已經完蛋了！\n才只吃了一口\n就變得全都是沙子……！"
10102-360 = "果然我就連吃冰棒\n的資格都沒有……！\n完全被拋棄了……！"
10102-370 = "我的人生為什麼\n會如此多災多難呢？"
10102-380 = "其他人明明\n都在享受夏天……"
10102-390 = "無論再怎麼努力……\n對我來說都像是\n遙不可及的夢……"
10102-400 = "……咦？\n要再買一根給我是嗎？"
10102-410 = "也就是說……要是\n掉下去的冰棒沒事……\n本來可以吃到\n兩倍的意思對吧……？"
10102-420 = "嗚哇！\n果然還是完蛋了！"
10102-2600 = "耶，耶嘿嘿，居然把這麼貴重的東西給我……\n就，就算之後要我還你也不會還的哦……！"

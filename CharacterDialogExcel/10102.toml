[translation]
10102-10 = "B... Blue... Archive...!"
10102-20 = "แหะ แหะๆ ได้มาแล้วสินะคะ...!\nฤดูร้อน ทะเล... มีความสุขจังเลยค่ะ...!"
10102-30 = "ที่นี่...\nเป็นที่ที่เอาไว้\nทำอะไรเหรอคะ?"
10102-40 = "แหะๆ...\nเย็นสบายจังเลยค่ะ...\nต่อให้ออกไปข้างนอก\nแล้วจะร้อนอีกรอบก็เถอะค่ะ..."
10102-50 = "พี่ซาโอริ\nตอนนี้คง..."
10102-60 = "ฉันขอเขียนไปรษณีย\nบัตรชิงโชคจากนิตยสาร\nที่นี่ได้มั้ยคะ...?"
10102-70 = "ชุดว่ายน้ำมันเหมือนจะ\nรัดหน่อยๆ... ตัวฉันคงไม่มี\nอะไรผิดปกติใช่มั้ยคะ...?"
10102-80 = "อ๊ะ คะ... คุณครู?\nวันนี้ไม่ไปเล่นน้ำเหรอคะ...?"
10102-90 = "แหะๆ...\nวันนี้เป็นเวรของฉันค่ะ...\nรบกวนด้วยนะคะ...!"
10102-100 = "แหะ แหะๆ ถ้าไม่เป็นการ\nเสียมารยาท ฉันขอ\nไอศกรีมสักแท่ง..."
10102-110 = "คะ?! 'ซื้อมาไว้แล้ว\nเพราะรู้ว่าฮิโยริจะกิน'...?"
10102-120 = "ขอบคุณนะคะ!\nสมกับที่เป็นคุณครูเลยค่ะ...!"
10102-130 = "นิตยสารที่อยู่ในชาเล่ต์\nก็เป็นของ 2 เดือนที่แล้วสินะคะ...!"
10102-140 = "ชีวิตเป็นสิ่งที่\nเจ็บปวดจริงๆ นะคะ...!"
10102-150 = "แหะ แหะๆ ฉันจะบอก\nความจริงที่น่าสิ้นหวังให้อย่างหนึ่งค่ะ..."
10102-160 = "น้ำแข็งในตู้เย็น\nในห้องพักผ่อนหมดแล้วค่ะ..."
10102-170 = "ชีวิตเป็นสิ่งที่\nเจ็บปวดจริงๆ นะคะ...\nโดยเฉพาะในฤดูร้อนค่ะ"
10102-180 = "แหะๆๆ... คะ คะ? นี่เหรอคะ?\nอืม รูปที่ถ่ายด้วยกัน\nที่ทะเลไงคะ…"
10102-190 = "คุณครูก็มาดูด้วยมั้ยคะ?"
10102-200 = "แหะๆ มีขนมเย็นๆ เยอะเลย...\nครั้งหน้าพาสควอดมา\nทุกคนเลยได้มั้ยคะ?"
10102-210 = "สุขสันต์วันเกิดค่ะคุณครู...!"
10102-220 = "ถึงจะเป็นวันแห่งการเริ่มชีวิต\nที่เจ็บปวด\nแต่ได้สนุกบ้างก็ดีนะคะ..."
10102-230 = "วันเกิดของฉัน...\nฉันไม่ได้รู้สึกดีเท่าไรหรอกค่ะ..."
10102-240 = "แต่พอคุณครูมาอวยพร\nก็เป็นวันที่พิเศษขึ้นมาหน่อยนะคะ"
10102-250 = "สวัสดีปีใหม่ค่ะ...\nปีนี้ก็คงมีเรื่องทุกข์ใจมากมาย\nแต่ยังไงก็ต้องมีชีวิตต่อค่ะ..."
10102-260 = "แหะๆ ปีนี้ก็ขอรบกวนด้วยนะคะ"
10102-270 = "คะ... คริสต์มาสแล้วค่ะ...!\nถึงจะแค่เล็กน้อย แต่ฉันซื้อมา\nจากร้านสะดวกซื้อข้างล่างค่ะ"
10102-280 = "ยะ... อยากให้ช่วย...\nรับไว้น่ะค่ะ แหะๆ"
10102-290 = "ละ... ลูกกวาด\nฉันไม่มีหรอกค่ะ...\nกะ... แกล้งฉันแทนเถอะค่ะ..."
10102-300 = "คะ? คุณครูให้ฉัน\nงั้นเหรอคะ?"
10102-310 = "แหะ แหะๆๆ\nถ้างั้นฉันจะรับไว้ด้วยความยินดีค่ะ"
10102-330 = "อ๊ายๆๆๆ... เจ็บจังเลยค่ะ..."
10102-340 = "เฮือก?!\nไอศกรีมแท่งของฉัน?!"
10102-350 = "แย่แล้วค่ะ! แย่มากๆ เลยค่ะ!\nฉันยังไม่ได้กินสักคำเลย\nแต่มันเลอะทรายหมดแล้ว...!"
10102-360 = "ตัวฉันคงไม่มีแม้แต่โอกาสที่จะ\nได้กินไอศกรีมแท่งเลยสินะคะ...!\nฉันถูกทอดทิ้งโดยสิ้นเชิงเลยค่ะ...!"
10102-370 = "ชีวิตฉันทำไมถึงเจอแต่\nความลำบากแบบนี้คะ?"
10102-380 = "คนอื่นๆ กำลังสนุกกับ\nฤดูร้อนกันแท้ๆ..."
10102-390 = "ไม่ว่าจะพยายามเท่าไร\nแต่สำหรับฉัน นี่เป็นแค่ความฝัน\nที่เป็นจริงไม่ได้งั้นเหรอ..."
10102-400 = "คะ...? จะซื้อให้\nอีกแท่งหนึ่งเหรอคะ?"
10102-410 = "ถ้างั้น ถ้าฉันไม่ทำไอศกรีม\nแท่งนี้หล่น ฉันก็คงได้กิน\nเป็น 2 เท่าแล้วสินะคะ...?"
10102-420 = "มุแงงง!\nแย่จริงๆ ด้วยค่ะ!"
10102-2600 = "แหะ แหะๆ ให้ของที่มีค่า\nแบบนี้กับฉัน...\nถะ... ถ้ามาขอคืนทีหลัง\nฉันไม่คืนให้นะคะ...!"

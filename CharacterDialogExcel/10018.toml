[translation]
10018-20 = "게임개발부 부장… 유즈예요.\n저, 정말로… 저를 데려가 주시겠어요?"
10018-30 = "역시 선생님도…\n성숙한 타입을\n좋아하겠지?"
10018-40 = "게임을 본격적으로\n공부하고 싶어."
10018-50 = "편안해 보이는 공간이네.\n이런 곳에서\n한숨 자고 싶다."
10018-60 = "으음.\n숨을 곳은 없으려나."
10018-70 = "히익!\n어째서 여기에!"
10018-80 = "서, 선생님. 오셨군요.\n기다리고 있었어요."
10018-90 = "선생님……\n어서 오세요."
10018-100 = "선생님의 부탁이라면……\n기쁘게 받아들일게요."
10018-110 = "네. 무슨 일이든\n말씀해 주세요."
10018-120 = "최선을…\n다할게요!"
10018-130 = "아.\n고양이도 키우고 싶어요."
10018-140 = "게임과 고양이만 있어도\n세상은 살만하거든요."
10018-150 = "…네. 선생님.\n저도, 강해질게요."
10018-160 = "선생님과 모두가…\n저를 지켜준 만큼.\n저도 모두에게\n힘이 되고 싶어요."
10018-170 = "(이 사람에게…\n어울리는 내가 되고 싶어.)"
10018-180 = "생일 축하드려요. 선생님."
10018-190 = "진심으로…\n진심으로요!"
10018-200 = "오, 오늘은\n제 생일이에요."
10018-210 = "키보토스 문화의 날이니까…\n잊으시면 안 돼요."
10018-220 = "새해 복 많이 받으세요."
10018-230 = "저도 더 성장한 모습,\n보여드릴 테니까."
10018-240 = "메, 메리 크리스마스\n선생님."
10018-250 = "산타랑 게임은…\n닮은 것 같아요.\n둘 다 설렘을\n선물해주니까요."
10018-260 = "거리에 빛나는 호박과\n사탕이 가득하네요."
10018-270 = "저, 저도 가보고 싶어요.\n선생님과 함께…"
10018-290 = "선생님이 아니었다면…\n할 수 없었을 거예요."
10018-300 = "모두에게 선물을\n할 수 있었던 건,\n선생님 덕분이에요."
10018-310 = "선생님이\n도와주셨던 것처럼…"
10018-320 = "제가 선생님께 필요한\n순간이 온다면,\n뭐든지 말씀하세요."
10018-330 = "…반드시\n보답할게요."
10018-2600 = "몸 안에서…… 힘이 차오르는 느낌이에요.\n이것이…… 용기일까요?"

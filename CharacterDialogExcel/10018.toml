[translation]
10018-20 = "我是遊戲開發部的，部長……柚子。\n真，真的……要帶我走嗎？"
10018-30 = "老師一定也……\n喜歡成熟的女性，對吧？"
10018-40 = "我想認真地\n學習遊戲。"
10018-50 = "真是舒適的空間呢。\n真想在這種地方好好睡一覺。"
10018-60 = "唔嗯～\n有沒有地方可以躲起來呢。"
10018-70 = "噫！\n為，為什麼會在這裡！"
10018-80 = "老，老師。歡迎你來。\n我正在等你。"
10018-90 = "老師……\n歡迎回來。"
10018-100 = "如果是老師的請求……\n我都欣然接受。"
10018-110 = "嗯。不管是什麼事，\n請儘管說吧。"
10018-120 = "我會……\n全力以赴的！"
10018-130 = "啊。\n我也想養貓。"
10018-140 = "只要有遊戲和貓咪\n就能活在世界上了。"
10018-150 = "……是，老師。\n我也會變強的。"
10018-160 = "就像老師和大家……\n保護了我一樣，\n我也想成為大家的力量。"
10018-170 = "（我想成為……\n　和這個人相配的人）"
10018-180 = "生日快樂，老師。"
10018-190 = "真的……\n真的……！"
10018-200 = "今，今天是我的生日。"
10018-210 = "因為是奇普托斯文化之日……\n所以不可以忘記唷。"
10018-220 = "新年快樂。"
10018-230 = "我也會展現出\n更成熟的樣子。"
10018-240 = "聖，聖誕快樂……\n老師。"
10018-250 = "聖誕老人和遊戲……\n很類似。因為他們都會\n帶給我興奮的感覺。"
10018-260 = "街道上充滿了\n閃亮的南瓜和糖果呢。"
10018-270 = "我，我也想去看看。\n跟老師一起……"
10018-290 = "要是沒有老師的話……\n我想我肯定做不到的。"
10018-300 = "能送禮物給大家，\n也是託老師的福。"
10018-310 = "就像老師幫助我一樣……"
10018-320 = "老師如果有\n需要我的時候，\n不管是什麼都請告訴我。"
10018-330 = "……我一定，\n會報答你的。"
10018-2600 = "感覺身體裡……湧出了一股力量。\n這就是……勇氣嗎？"

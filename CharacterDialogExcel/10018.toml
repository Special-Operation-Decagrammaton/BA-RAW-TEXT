[translation]
10018-20 = "I'm Yuzu, president of the Game Development Department. You're really going to accept me?"
10018-30 = "I guess...you like the mature types?"
10018-40 = "I want to study games more seriously."
10018-50 = "This area looks nice. I want to take a nap right here."
10018-60 = "Um... I wonder if there's anywhere to hide."
10018-70 = "Ack! What are you doing here?!"
10018-80 = "Sensei... You're here. I was waiting for you."
10018-90 = "Sensei... Welcome."
10018-100 = "A favor for you? Anytime."
10018-110 = "Yes, you can ask me anything."
10018-120 = "I'll... I'll do my best!"
10018-130 = "Oh... I really want a pet cat."
10018-140 = "Games and cats... That's all I need to be happy in life."
10018-150 = "Yes, Sensei. I'm going to become stronger."
10018-160 = "Just like how you and everyone else protected me... I want to help everyone too."
10018-170 = "(I want to be someone worthy of standing by their side.)"
10018-180 = "Happy birthday, Sensei."
10018-190 = "I mean that...from the bottom of my heart!"
10018-200 = "Today is...my birthday."
10018-210 = "It's Kivotos' Culture Day... Don't forget!"
10018-220 = "Happy New Year."
10018-230 = "I'm gonna show you just how much I can grow."
10018-240 = "Merry Christmas, Sensei."
10018-250 = "There's something Santa and video games have in common. Both of them make you feel so excited."
10018-260 = "The streets are filled with flickering jack-o-lanterns and candy."
10018-270 = "I want to go too. With you, Sensei..."
10018-290 = "Sensei, if it wasn't for you... I wouldn't have been able to do it."
10018-300 = "I was able to give gifts to everyone thanks to you, Sensei."
10018-310 = "Sensei, just like how you helped me..."
10018-320 = "If you're ever in a bind and you need me, let me know anytime."
10018-330 = "I will definitely make it up to you."
10018-2600 = "I feel like power is filling my body. Is this...courage?"

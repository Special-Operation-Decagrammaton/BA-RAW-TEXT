[translation]
10018-20 = "ฉันชื่อยูสึ... เป็นหัวหน้าชมรมพัฒนาเกมค่ะ\nคะ...คือ...จะพาฉันไปจริงๆ เหรอคะ?"
10018-30 = "ที่จริงแล้วคุณครูเอง...\nก็ชอบคนที่โตเป็นผู้ใหญ่แล้ว\nใช่มั้ยล่ะคะ"
10018-40 = "ฉันอยากเรียนเกี่ยวกับเกม\nอย่างจริงจังค่ะ"
10018-50 = "ที่นี่สบายจังเลยนะคะ\nฉันอยากจะนอนหลับปุ๋ย\nอยู่ที่นี่จังเลย...~"
10018-60 = "อืม...\nไม่มีที่ให้ซ่อนเลยเหรอ..."
10018-70 = "ฮึ่ก!\nทะ...ทำไมถึงอยู่ที่นี่ได้คะ!"
10018-80 = "คะ... คุณครู มาแล้วเหรอคะ\nฉันกำลังรออยู่เลย"
10018-90 = "คุณครู...\nยินดีต้อนรับค่ะ"
10018-100 = "ถ้าเป็นคำขอของคุณครูล่ะก็....\nฉันยินดีช่วยเต็มที่เลยค่ะ"
10018-110 = "ค่ะ ไม่ว่าเรื่องอะไร\nก็บอกฉันมาได้เลยค่ะ"
10018-120 = "ฉันจะพยายาม\nทำให้สุดความสามารถเลยค่ะ!"
10018-130 = "อ่า... ฉันเองก็\nอยากเลี้ยงน้องแมวเหมือนกันค่ะ"
10018-140 = "ขอแค่มีเกมกับน้องแมว\nโลกนี้ก็น่าอยู่แล้วล่ะค่ะ"
10018-150 = "ค่ะ คุณครู\nฉันจะแข็งแกร่งขึ้นกว่านี้ค่ะ"
10018-160 = "ฉันจะแข็งแกร่งขึ้น....ให้สมกับ\nที่คุณครูและทุกคนคอยปกป้องฉัน\nฉันเองก็อยากเป็นกำลัง\nให้กับทุกๆ คนเหมือนกันค่ะ"
10018-170 = "(ฉันอยากเป็นคนที่เหมาะสม\nกับคนคนนี้...)"
10018-180 = "สุขสันต์วันเกิดค่ะ คุณครู"
10018-190 = "อวยพรจากใจค่ะ...\nจริงๆ นะคะ!"
10018-200 = "วะ... วันนี้\nเป็นวันเกิดของฉันค่ะ"
10018-210 = "วันนี้เป็นวันวัฒนธรรมของ\nคิโวทอส.... เพราะงั้นห้ามลืม\nเด็ดขาดเลยนะคะ"
10018-220 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ"
10018-230 = "ฉันเองก็จะทำให้คุณครูได้เห็น\nภาพลักษณ์ที่เติบโตขึ้นของฉันนะคะ"
10018-240 = "มะ...เมอร์รี คริสต์มาสค่ะ\nคุณครู"
10018-250 = "คุณลุงซานต้ากับเกม.... ฉันคิดว่าเหมือนกัน\nนะคะ เพราะทั้งคุณลุงซานต้ากับเกมต่างก็\nมอบความตื่นเต้นเป็นของขวัญให้เราค่ะ"
10018-260 = "ตามถนนมีฟักทองที่ส่องแสง\nกับลูกกวาดอยู่เต็มไปหมดเลยค่ะ"
10018-270 = "ฉะ...ฉันเองก็อยากไปเหมือนกันค่ะ\nไปกับคุณครู..."
10018-290 = "ถ้าไม่มีคุณครู...\nฉันคงทำไม่ได้แน่ๆ ค่ะ"
10018-300 = "ฉันมอบของขวัญให้\nทุกคนได้แบบนี้\nเพราะคุณครูเลยค่ะ"
10018-310 = "ถ้าเกิดว่าคุณครู\nอยากให้ฉันช่วยอะไร"
10018-320 = "ถ้าเกิดคุณครูจะให้ฉันช่วย\nก็บอกฉันมาได้ตลอดเลยนะคะ"
10018-330 = "ฉันจะตอบแทนคุณครู\nแน่นอนค่ะ..."
10018-2600 = "รู้สึกเหมือน...\nมีพลังพลุ่งพล่านอยู่ในร่างกายเลยค่ะ\nนี่คือ... ความกล้าหรือเปล่าคะ?"

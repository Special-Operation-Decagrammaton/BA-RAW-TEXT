[translation]
13007-10 = "Blue Archive!"
13007-20 = "Nope, not gonna help... Wait. You'll feed me? What kind of food though?"
13007-30 = "Is there nothing...? Nothing at all to eat?"
13007-40 = "That reminds me, the cafe we went to was pretty good... Heh heh."
13007-50 = "I hear the dumplings from Hyakkiyako are, like, super good..."
13007-60 = "*sniff* *sniff* Hmm? That smell... Something smells amazing!"
13007-70 = "I've followed that sweet scent all this way. Time to find out what it is...!"
13007-80 = "Greetings, Sensei."
13007-90 = "Let's give it our all today and then cap it off with some great food!"
13007-100 = "Oh, there you are, Sensei! What kind of mission are we going on today?"
13007-110 = "You want to know what my hobby is? Reading books, of course."
13007-120 = "...Hey, why are you making that face?!"
13007-130 = "Don't tell me you see me as a little kid who only wants to fill her belly."
13007-140 = "You should learn to rely on me a little more."
13007-150 = "Do I like dango?"
13007-160 = "N-No! I mean, not that much. I'm just eating it because it's cheap!"
13007-170 = "(It's just me and Sensei? Oh...)"
13007-180 = "Wh-What did you just say?! There's a place with all-you-can-eat cake and pie?!"
13007-190 = "Let's get moving, Sensei! We need to head out ASAP!"
13007-200 = "Happy birthday, Sensei!"
13007-210 = "Today's all about you! You have my full attention!"
13007-220 = "So? What would you like to eat today? Beef? Fish? Chicken?!"
13007-230 = "Today's my birthday! You knew that, right?"
13007-240 = "It's not a birthday without meat!"
13007-250 = "A buffet would work! Anything's good, so let's get some grub!"
13007-260 = "Happy New Year, Sensei! Let's hurry to the shrine!"
13007-270 = "The gamju and rice cakes await!"
13007-280 = "Merry Christmas! Let's hit the streets, Sensei! The lights are all sparkling!"
13007-290 = "Huh? Th-This candy is mine."
13007-300 = "...B-But I don't mind sharing some if it's with you."
13007-320 = "Huh? Wh-What? Why are you looking at me like that?"
13007-330 = "(Seriously...)"
13007-340 = "We're going to the spots after we're done taking a break, right? What should we eat next?"
13007-350 = "Delicious! ♪"
13007-360 = "What?! Drink it together? Don't be silly! Do you have a death wish?"
13007-370 = "(Sensei must be teasing me, right? Right? There's only one straw...)"
13007-380 = "(But if it's with Sensei...maybe I wouldn't mind...)"
13007-390 = "Forget it! No juice for you!"
13007-2600 = "Th-Thank you, Sensei! I will cherish it... Truly!"

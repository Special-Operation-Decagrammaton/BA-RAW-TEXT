[translation]
13007-10 = "Blue Archive!"
13007-20 = "ฉันไม่ได้อยากร่วมงานกับคุณครูเท่าไหร่..\nหืม? จะให้ของกินเหรอ? อะไรเหรอ? แล้วมันอร่อยไหม?"
13007-30 = "มีอะไรให้กิน\nบ้างไหมนะ?"
13007-40 = "จะว่าไป วันนั้นที่เราไป\nคาเฟ่ด้วยกัน...\nที่ฉันกินมันอร่อยดีนะ...ฮิฮิ"
13007-50 = "ได้ยินมาว่าขนมเทศกาล\nของเฮียกคิยาโค\nอร่อยมากเลยนี่..."
13007-60 = "ฟุดฟิด.. อืมม\nกลิ่นนี้มัน...?\nกลิ่นของอร่อยๆ นี่นา\nต้องอร่อยมากแน่ๆ"
13007-70 = "เดินตามกลิ่นของอร่อย\nมาถึงที่นี่เลย\nของอร่อยแบบไหนน้า~\nที่รอให้ฉันมาชิมอยู่~"
13007-80 = "เข้ามาสิคุณครู~"
13007-90 = "วันนี้ฉันจะตั้งใจทำงาน\nจะได้ไปกินของอร่อยๆ ไง!"
13007-100 = "มาแล้ว มาแล้ว!\nคุณครู! วันนี้จะไปทำ\nภารกิจอะไรเหรอ?"
13007-110 = "งานอดิเรกของฉันเหรอ?\nอ่านหนังสือไง\nฉันเป็นหนอนหนังสือน่ะ"
13007-120 = "ทะ... ทำไมทำหน้าแบบนั้นล่ะ!!"
13007-130 = "คิดว่าฉันเป็นเด็กที่\nเอาแต่กินอย่างเดียวใช่ไหม?"
13007-140 = "ให้ฉันเชื่อใจครูอีกหน่อยเหรอ?"
13007-150 = "ดังโงะเหรอ?"
13007-160 = "อืม..\nที่ซื้อกินเพราะมันถูกดีน่ะ.."
13007-170 = "(มีแค่เราสองคนเหรอ...?\nฮิฮิ...)"
13007-180 = "ฮะ? ว่าไงนะ?!\nมีร้านที่ให้กิน\nเค้กกับพายแบบไม่อั้นเหรอ?!"
13007-190 = "คุณครู! เตรียมตัวเลย!\nฉันจะไปเดี๋ยวนี้!"
13007-200 = "สุขสันต์วันเกิด!"
13007-210 = "วันนี้ฉันจะอยู่เล่นด้วยเอง!"
13007-220 = "ไปกินอะไรกันดีน้า?\nเนื้อย่าง? ปลาเผา? หรือไก่ทอดดี??"
13007-230 = "วันนี้วันเกิดฉันล่ะ!\nคุณครูก็รู้ใช่ไหม?"
13007-240 = "วันเกิดทั้งที\nต้องไปกินเนื้อย่าง!"
13007-250 = "ไม่ก็ต้องจัดบุฟเฟ่ต์ไปเลย!\nจริงๆ ฉันกินอะไรก็ได้ ไปกันเถอะ!"
13007-260 = "สวัสดีปีใหม่นะคุณครู!\nไปกินของอร่อยกันเถอะ!"
13007-270 = "​สาเกหวานกับเค้กข้าวรอพวกเราอยู่!"
13007-280 = "เมอร์รีคริสต์มาส\nออกไปตามถนนกันเถอะคุณครู!\nดูไฟที่เป็นประกายนั่นสิ!"
13007-290 = "หือ?\nนะ.. นี่มันลูกกวาดของฉันนะ"
13007-300 = "แต่ว่า... หากเป็นคุณครูล่ะก็\nฉันจะ... แบ่งให้ชิมก็ได้"
13007-320 = "อะไรกันน่ะ? \nทำไมจ้องกันแบบนั้นล่ะ?"
13007-330 = "(จริงๆ เลย...)"
13007-340 = "เราพักกันแป๊บหนึ่ง\nแล้วค่อยไปหาอะไรกินต่อใช่มั้ย?\nต่อไปกินอะไรดีน้า?"
13007-350 = "อาหย่อยย~♪"
13007-360 = "ว่าไงนะ?! ขอกินด้วยคนเหรอ?\nอย่าพูดอะไรเหลวไหลน่า!\nอยากสู่ขิตแล้วรึไง?"
13007-370 = "(แกล้งพูดใช่มั้ย? ใช่รึเปล่า?\nมีหลอดแค่อันเดียวจะแบ่งได้ไง...)"
13007-380 = "(...แต่ถ้าเป็นคุณครูล่ะก็...\nคงจะไม่เป็นอะไรหรอก...)"
13007-390 = "ไม่ให้หรอก!!\nไม่แบ่งให้เด็ดขาด!!"
13007-2600 = "ขะ...ขอบคุณนะคุณครู!\nฉันจะรักษาเอาไว้...อย่างดีที่สุดเลย!"

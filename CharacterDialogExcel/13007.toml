[translation]
13007-10 = "블루 아카이브~!"
13007-20 = "딱히 협력할 생각은 없는데 말야.\n…응? 먹을 거 준다고? 어떤 거? 어떤 거야?"
13007-30 = "어, 어디 먹을거….\n없나?"
13007-40 = "그러고 보니 전에 선생님이랑\n카페 갔을 때…. 맛있었지…. 헤헤."
13007-50 = "백귀야행 축제의\n경단이 그렇게\n맛있다는데…."
13007-60 = "킁킁. 응…?\n이 냄새는…?\n무언가 맛있는\n냄새가 나!"
13007-70 = "맛있는 냄새를 따라\n여기까지 왔네.\n이곳에서 날 기다리는건….\n무엇일까나~"
13007-80 = "어서 와 선생님~"
13007-90 = "오늘도 열심히 일하고\n맛있는 걸 먹으러 가는 거야!"
13007-100 = "아 왔다 왔다!\n선생님! 오늘은 무슨\n임무를 하러 갈 거야?"
13007-110 = "취미가 뭐냐고?\n독서야. 독서."
13007-120 = "…뭐야, 그 표정은!!"
13007-130 = "날 먹을 것만 밝히는\n꼬맹이로 여기는 건 아니지?"
13007-140 = "조금 더 의지해도 좋다고?"
13007-150 = "경단 꼬치를 좋아하냐고?"
13007-160 = "딱히?\n싸니까 먹는 것뿐인데?"
13007-170 = "(선생님과 단둘이…?\n헤에….)"
13007-180 = "뭐, 뭐라고?!\n케이크랑 파이가\n무제한인 가게가 있다고?!"
13007-190 = "선생님! 준비해!\n당장 출동이야!"
13007-200 = "생일 축하해 선생님!"
13007-210 = "오늘은 특별히 내가 놀아줄게!"
13007-220 = "그럼 뭐 먹으러 갈 거야?\n고기? 생선? 치킨??"
13007-230 = "오늘은 내 생일이야!\n알고 있지?"
13007-240 = "역시 생일엔\n고기가 좋겠어!"
13007-250 = "아니면 뷔페도 괜찮아!\n뭐든 좋으니까 먹으러 가자, 선생님!"
13007-260 = "새해 복 많이 받아 선생님!\n빨리 새해맞이 축제하러 가자!"
13007-270 = "감주랑 떡이 기다리고 있어!"
13007-280 = "메리 크리스마스!\n거리로 나가자 선생님!\n일루미네이션이 반짝반짝해!"
13007-290 = "응?\n사, 사탕은 내 꺼야."
13007-300 = "…그, 그치만 선생님이니까\n조, 조금이라면 나눠 줄게."
13007-320 = "에, 뭐, 뭐야.\n왜 그렇게 쳐다 봐?"
13007-330 = "(… 정말이지…)"
13007-340 = "잠깐 쉬었다가\n또 먹으러 가는 거지?\n다음엔 뭘 먹을까?"
13007-350 = "맛있어어-"
13007-360 = "뭐야?! 같이 먹자고?\n이상한 소리 하지 마!\n죽인다?"
13007-370 = "(놀리는 거지, 이거? 그런 거지?\n빨대가 하나뿐인데…)"
13007-380 = "(….그치만 선생님이라면….\n괜찮을…)"
13007-390 = "…싫어!!\n안 줘!!"
13007-2600 = "고, 고마워. 선생님…\n그… 소, 소중하게 간직할 테니까!"

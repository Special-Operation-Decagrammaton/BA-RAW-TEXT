[translation]
13007-10 = "蔚藍檔案～！"
13007-20 = "其實沒有要協助你的打算的。\n…嗯？會給我吃的嗎？\n什麼樣的？什麼食物？"
13007-30 = "哪，哪裡有食物…\n沒有嗎？"
13007-40 = "這麼說來，之前和老師\n一起去咖啡廳時的那個…\n真好吃啊……嘿嘿。"
13007-50 = "聽說百鬼夜行\n慶典裡賣的糰子\n非常好吃……"
13007-60 = "嗅嗅。嗯…？\n這個味道是…？\n有股很香的\n味道！"
13007-70 = "跟著香味\n來到了這裡。\n在這裡等著我的…\n是什麼呢～"
13007-80 = "歡迎老師～"
13007-90 = "今天也要努力工作\n一起去吃美食哦！"
13007-100 = "啊，來了來了！\n老師！今天要去\n進行什麼任務呢？"
13007-110 = "我的興趣？\n讀書唷，讀書。"
13007-120 = "…怎樣啦，那個表情！！"
13007-130 = "你沒有把我當成\n一個愛吃的小鬼吧？"
13007-140 = "多依賴我一點也可以哦？"
13007-150 = "你問我喜不喜歡吃串糰子？"
13007-160 = "還好啊？\n是因為便宜才吃的哦？"
13007-170 = "（和老師\n兩人獨處…？\n咦，咦……）"
13007-180 = "什，什麼？\n有蛋糕和派都\n吃到飽的店嗎！？"
13007-190 = "老師！趕快準備！\n現在馬上出發！"
13007-200 = "生日快樂，老師！"
13007-210 = "今天我就特別陪你玩吧！"
13007-220 = "那麼要去吃什麼呢？\n肉？魚？還是雞？？"
13007-230 = "今天是我的生日哦！\n你知道吧？"
13007-240 = "果然生日還是\n要吃肉呢！"
13007-250 = "自助餐也可以唷！\n不管什麼都好，\n一起去吃吧，老師！"
13007-260 = "新年快樂，老師！\n趕快去今年第一次的\n買東西吃吧！"
13007-270 = "甜酒和年糕正在等著我們唷！"
13007-280 = "聖誕快樂！\n要不要去街上呀？老師！\n外頭的燈光正一閃一閃的唷！"
13007-290 = "嗯？\n糖，糖果是我的唷。"
13007-300 = "…如，如果是老師的話，\n稍，稍微分一點給你也可以唷。"
13007-320 = "哎，什，什麼。\n為什麼用那種眼神看著我？"
13007-330 = "（…討厭，真是的…）"
13007-340 = "休息一會兒後，\n再去吃吧？\n下一個要吃什麼？"
13007-350 = "真好喝～♪"
13007-360 = "什麼？你要一起喝？\n少胡說八道了！\n找死是不是！？"
13007-370 = "（他是在耍我，對吧？是吧？\n吸管只有一根耶…）"
13007-380 = "（…不過，如果是老師的話…\n應該…）"
13007-390 = "…不對！！\n果然還是不行！！"
13007-2600 = "謝，謝謝你，老師……\n那個……我，我會好好珍惜的！絕對！"

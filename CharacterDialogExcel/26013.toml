[translation]
26013-10 = "블루 아카이브."
26013-20 = "아리우스 스쿼드의 하카리 아츠코야.\n후후, 너무 딱딱한가?"
26013-30 = "좋은 사진,\n찍을 수 있을까?"
26013-40 = "(삿 쨩, 잘 지내고\n있으면 좋겠네)"
26013-50 = "어디선가 꽃향기가\n나는 것 같아."
26013-60 = "여기, 느긋하게\n쉴 수 있을 것 같아."
26013-70 = "이건……?\n처음 봐."
26013-80 = "안녕, 선생님.\n내가 할 수 있는 일, 있을까?"
26013-90 = "어서 와, 선생님.\n오늘도 잘 부탁해."
26013-100 = "미사키랑 '투샷'을 찍었어.\n……둘 다 표정이 이상해,\n후후. 다시 찍고 싶은걸."
26013-110 = "그…… 이상하게\n들릴지도 모르지만……\n선생님 사진, 찍어도 돼?"
26013-120 = "이런 날에도,\n선생님은 일하는 거구나."
26013-130 = "삿 짱도 지금쯤…\n으응, 아무것도 아니야."
26013-140 = "선생님, 내 수영복, 어때?\n이상하지는 않으려나?"
26013-150 = "축제 경품 코너에서\n야키소바 교환권을 받았어.\n히요리, 마음에 들어 할까?"
26013-160 = "생일 축하해, 선생님.\n오늘은 선물을 주는 날이지.\n기억하고 있어."
26013-170 = "선물로…… 나는 어떨까?\n오늘 하루는, 선생님의 말,\n뭐든지 들어 줄게."
26013-180 = "고마워, 선생님.\n선물은 괜찮아……"
26013-190 = "그것보다,\n같이 산책하고 싶어."
26013-200 = "새해 복 많이 받아, 선생님."
26013-210 = "새로운 해…….\n올해는 무슨 일이\n일어날지, 기대된다."
26013-220 = "메리 크리스마스, 선생님.\n특별한 날은\n사진으로 남겨둬야겠지."
26013-230 = "자, 이쪽 봐줄래?"
26013-240 = "장난…… 사탕……?\n미안, 할로윈에 대해서는\n아직 잘 모르는걸."
26013-250 = "잘 모르니까,\n선생님이 가르쳐주었으면 해."
26013-270 = "사진, 많이 찍어왔지만……\n이렇게 찍히는 건 처음이야."
26013-280 = "이럴 때, 어떻게 하면\n좋을지 모르겠네……."
26013-290 = "이렇게, 웃으면 되려나?"
26013-300 = "좀 더 꽃 쪽으로 붙어……?\n알았어."
26013-310 = "해당화……\n좋은 향기."
26013-320 = "우연히 발견한 장소지만……\n선생님 덕분에,\n여기에 올 수 있었어."
26013-330 = "고마워, 선생님,\n멋진 추억이 되었어."
26013-2600 = "아, 이거…… 고마워, 선생님.\n너무, 마음에 들어.\n이건 선생님을 위해 쓸게."

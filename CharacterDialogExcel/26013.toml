[translation]
26013-10 = "Blue Archive"
26013-20 = "ฮาคาริ อาสึโกะจากสควอดของอาเรียส\nฮุฮุ เป็นทางการมากไปมั้ยนะ?"
26013-30 = "จะถ่ายรูปดีๆ\nได้มั้ยนะ?"
26013-40 = "(หวังว่าซัตจัง\nจะสบายดีนะ)"
26013-50 = "เหมือนได้กลิ่นดอกไม้\nจากที่ไหนเลย"
26013-60 = "ที่นี่น่าจะพักผ่อน\nสบายๆ ได้นะ"
26013-70 = "นี่มัน...?\nเพิ่งเคยเห็นครั้งแรกเลย"
26013-80 = "สวัสดี คุณครู\nมีงานที่ฉันพอทำได้มั้ย?"
26013-90 = "เข้ามาสิ คุณครู\nวันนี้ก็รบกวนด้วยนะ"
26013-100 = "ฉันไปถ่ายรูปคู่กับมิซากิมาละ\nแต่ทำหน้าแปลกๆ ทั้ง 2 คนเลย\nฮุฮุ อยากถ่ายใหม่จัง"
26013-110 = "อ่า... อาจจะฟังดู\nแปลกๆ ก็ได้ แต่ว่า...\nฉันขอถ่ายรูปคุณครูได้มั้ย?"
26013-120 = "ในวันแบบนี้\nคุณครูก็ทำงานสินะ"
26013-130 = "ตอนนี้ซัตจังเองก็คง...\nอืม... ไม่มีอะไรหรอก"
26013-140 = "คุณครู ชุดว่ายน้ำฉันเป็นไงบ้าง?\nมันไม่ดูแปลกใช่มั้ย?"
26013-150 = "ฉันได้ตั๋วแลกยากิโซบะมาจาก\nโซนของสมนาคุณในงานน่ะ\nจะถูกใจฮิโยริมั้ยนะ?"
26013-160 = "สุขสันต์วันเกิดนะคุณครู\nวันนี้เป็นวันที่ต้องให้ของขวัญ\nฉันจำได้ดีเลยละ"
26013-170 = "ของขวัญ... เป็นฉันดีมั้ย?\nวันนี้ฉันจะเชื่อฟัง\nคุณครูทุกอย่างเลย"
26013-180 = "ขอบคุณนะ คุณครู\nของขวัญน่ะไม่เป็นไรหรอก..."
26013-190 = "ฉันอยากไป\nเดินเล่นด้วยกันมากกว่า"
26013-200 = "สวัสดีปีใหม่นะคุณครู"
26013-210 = "ปีใหม่...\nฉันตั้งตารอแล้วละ\nว่าจะเกิดอะไรในปีนี้"
26013-220 = "เมอร์รีคริสต์มาสนะคุณครู\nวันพิเศษทั้งทีก็ต้องถ่ายรูปไว้สิ"
26013-230 = "เอาละ มองมาทางนี้สิ"
26013-240 = "จะแกล้ง... หรือเอาขนม...?\nขอโทษนะ ฉันไม่ค่อยรู้จัก\nเกี่ยวกับวันฮาโลวีนน่ะ"
26013-250 = "ฉันไม่ค่อยรู้ เลยอยากให้\nคุณครูให้สอนหน่อยน่ะ"
26013-270 = "ฉันถ่ายรูปมาก็เยอะ...\nแต่นี่เป็นครั้งแรกเลยที่โดนถ่าย"
26013-280 = "ตอนโดนถ่ายแบบนี้\nไม่รู้เลยว่าต้องทำตัวยังไง..."
26013-290 = "ยิ้มแบบนี้จะได้มั้ยนะ?"
26013-300 = "ให้เข้าไปใกล้ดอกไม้อีกหน่อยเหรอ...?\nเข้าใจแล้วละ"
26013-310 = "กุหลาบป่า...\nกลิ่นหอมจัง"
26013-320 = "ถึงจะเป็นที่ที่เจอโดยบังเอิญ...\nแต่ก็ขอบคุณคุณครูนะ\nที่ทำให้ฉันได้มาที่นี่น่ะ"
26013-330 = "ขอบคุณนะ คุณครู\nเป็นความทรงจำที่ยอดเยี่ยมเลยละ"
26013-2600 = "อ่า นี่มัน... ขอบคุณนะคุณครู\nถูกใจฉันมากเลย\nฉันจะใช้เพื่อคุณครูเลยละ"

[translation]
26013-10 = "Blue Archive."
26013-20 = "I'm Hakari Atsuko from the Arius Squad. Heehee. Did that sound too curt?"
26013-30 = "Do you think I could take a nice picture?"
26013-40 = "(I hope Sao-Sao is doing all right.)"
26013-50 = "I think I can smell flowers."
26013-60 = "I think I can relax here."
26013-70 = "This... I've never seen it before."
26013-80 = "Hi, Sensei. Is there anything I can do for you?"
26013-90 = "Welcome, Sensei. I'll be counting on you today, as usual."
26013-100 = "I took a \"selfie\" with Misaki. Our expressions were both quite strange. Heehee. I'd like to take another one."
26013-110 = "Uh... This might sound strange...but Sensei, could I take a picture of you?"
26013-120 = "You even work on days like these, Sensei."
26013-130 = "Saori must also be... Uh, never mind."
26013-140 = "Sensei, what do you think of my swimsuit? I hope it doesn't seem strange."
26013-150 = "I got a yakisoba exchange ticket at a festival prize booth. Do you think Hiyori will like it?"
26013-160 = "Happy birthday, Sensei. Today, I give you presents. See? I remembered."
26013-170 = "How about...me as your gift? I'll listen to everything you say today, Sensei."
26013-180 = "Thank you, Sensei. I don't need gifts..."
26013-190 = "Rather, I want to walk with you."
26013-200 = "Happy New Year, Sensei."
26013-210 = "A new year... I look forward to what might happen."
26013-220 = "Merry Christmas, Sensei. One should take photos of special days."
26013-230 = "Now, look this way!"
26013-240 = "Trick...or treat...? I'm sorry, I don't know much about Halloween yet."
26013-250 = "I don't know, so I'd like you to teach me, Sensei."
26013-270 = "I've taken a lot of photos, but...this is the first time I've been photographed like this."
26013-280 = "I'm a little unsure of how I should pose..."
26013-290 = "Is it okay if I smile like this?"
26013-300 = "Get closer to the flowers? Okay."
26013-310 = "Rosa Rugosa... What a pleasant scent."
26013-320 = "We just happened upon this place, but...it was thanks to you that I got to see it, Sensei."
26013-330 = "Thank you, Sensei. You've helped me make another wonderful memory."
26013-2600 = "Oh, this... Thank you, Sensei. I love it. I'll use it for you."

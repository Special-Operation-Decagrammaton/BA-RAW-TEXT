[translation]
26013-10 = "蔚藍檔案。"
26013-20 = "我是奧利斯小隊的秤敦子。\n……呵呵，果然還是太生硬了嗎？"
26013-30 = "好照片，\n有辦法拍到嗎？"
26013-40 = "（沙醬，希望\n　他過得很好）"
26013-50 = "好像聞到了\n一股花香。"
26013-60 = "這裡，似乎\n能悠閒一下。"
26013-70 = "這是……？\n我第一次見到。"
26013-80 = "你好，老師。\n有什麼我能做的事嗎？"
26013-90 = "歡迎回來，老師。\n今天也請多指教囉。"
26013-100 = "我和美咲拍了一張「雙人照」。\n……兩個人的表情都好奇怪，\n呵呵。好像有點想重拍一張。"
26013-110 = "那個……雖然聽起來\n可能有點奇怪……\n我可以拍老師的照片嗎？"
26013-120 = "連這種日子，\n老師也要工作啊。"
26013-130 = "沙醬現在應該也……\n不，沒什麼。"
26013-140 = "老師，我的泳裝還好嗎？\n會不會很奇怪？"
26013-150 = "我在慶典的贈品中心\n拿到了一張炒麵兌換券。\n日和他，不知道會不會喜歡。"
26013-160 = "生日快樂，老師。\n今天是送禮物的日子，對吧？\n我還記得哦。"
26013-170 = "至於禮物……你覺得我怎麼樣？\n今天一整天，\n老師說的話我全都會答應哦。"
26013-180 = "謝謝你，老師。\n禮物就不用了……"
26013-190 = "比起那個，\n我更想和你一起散步。"
26013-200 = "祝你新年快樂，老師。"
26013-210 = "新的一年……\n今年會發生什麼樣的事，\n真令人期待呢。"
26013-220 = "聖誕快樂，老師。\n特別的日子，\n當然得拍照才行。"
26013-230 = "來，看我這邊。"
26013-240 = "惡作劇……糖果……？\n抱歉，我對萬聖節\n的事還不是很了解。"
26013-250 = "所以希望能請老師教我。"
26013-270 = "照片，雖然拍了很多……\n像這樣被拍還是第一次呢。"
26013-280 = "這種時候，\n我不知道該怎麼做才好……"
26013-290 = "像這樣笑就行了嗎？"
26013-300 = "再靠近花一點……？\n我知道了。"
26013-310 = "濱薔薇……\n味道真香。"
26013-320 = "雖然是偶然發現的地點……\n不過也是多虧了\n老師才能來到這裡。"
26013-330 = "謝謝你，老師。\n這是個美好的回憶唷。"
26013-2600 = "啊，這個……謝謝你，老師。\n我非常喜歡唷。\n這個我會為了老師使用的。"

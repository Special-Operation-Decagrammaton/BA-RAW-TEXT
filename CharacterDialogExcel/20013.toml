[translation]
20013-10 = "Blue Archive."
20013-20 = "I'm Kagami Chihiro, the vice president of Veritas. Please inform me immediately if any of my underclassmen cause trouble."
20013-30 = "The younger Veritas members are usually causing trouble in one way or another."
20013-40 = "Hmm...I did stay up all night, so I'm a bit...tired."
20013-50 = "The server crashed again?"
20013-60 = "(Does this cafe not serve coffee?)"
20013-70 = "(For this level of security...ten seconds should be enough to get in here.)"
20013-80 = "Hello, Sensei. You look busy as usual."
20013-90 = "Sensei, I told you to lock your computer before leaving."
20013-100 = "What if someone with malicious intent accesses your personal information?"
20013-110 = "Knowledge must be free... It's a profound but pleasant thought."
20013-120 = "Veritas isn't just a playground for oddballs."
20013-130 = "It's an association organized to fight Seminar's monopoly on information."
20013-140 = "Of course, I can't deny most of the students gathered there are oddballs..."
20013-150 = "Please don't say \"Trackers\" in front of me..."
20013-160 = "Even I don't know what President Himari is thinking."
20013-170 = "There seem to be a few people who are relentlessly trying to break in to get your personal information."
20013-180 = "Two people... No, maybe three? Maybe even more..."
20013-190 = "Happy birthday, Sensei. I hope you have a great day today, tomorrow, and forever."
20013-200 = "My birthday? Oh, that's today."
20013-210 = "I was worrying about everyone else and forgot about myself. It's kind of embarrassing."
20013-220 = "Happy New Year, Sensei. Since we're celebrating anyway, how about we start off by organizing the data backlog?"
20013-230 = "The cafe is empty on Christmas Eve, so it's great for working all night."
20013-240 = "I didn't plan on drawing weird stuff on my face just because it's Halloween..."
20013-250 = "...but if Maki is the one drawing, I'll allow it."
20013-260 = "It's cute, right? Heehee."
20013-280 = "Heehee. There's nothing like a good coffee after work."
20013-290 = "Hmm? You thought we were going to a cafe?"
20013-300 = "Sorry to disappoint. Nothing is open at this hour. A vending machine is the only place you can get a drink."
20013-310 = "I come here to have a can of coffee whenever I'm finishing an all-nighter."
20013-320 = "This vending machine is always here, even if no one else is this late. Doing its job, ready to help someone in need."
20013-330 = "I sort of admire that. It reminds me of the work I do..."
20013-340 = "That's why, Sensei, it'd make me happy if you came to appreciate this coffee like I do."
20013-2600 = "Even white-hat hackers need guns. For example... When dealing with rude clients..."

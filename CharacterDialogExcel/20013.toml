[translation]
20013-10 = "Blue Archive"
20013-20 = "รองหัวหน้าของเวอริทัส\nคากามิ จิฮิโระ ถ้าสมาชิกของเรา\nก่อเรื่องวุ่นวาย บอกฉันได้เลยนะ"
20013-30 = "นี่มัน... สงสัยสมาชิกของเรา\nจะก่อปัญหาอีกแล้วสินะ"
20013-40 = "ฉันทำงานโต้รุ่งมา...\nก็เลยเหนื่อยนิดหน่อยน่ะ"
20013-50 = "เอ๋... อย่าบอกนะ\nว่าเซิร์ฟเวอร์...\nพังอีกแล้วเหรอ...?"
20013-60 = "(ที่คาเฟ่นี้ไม่ขายกาแฟรึไงนะ?)"
20013-70 = "(การรักษาความปลอดภัย\nระดับนี้ละก็... แค่ 10 วินาที\nก็เจาะระบบได้แล้วละ)"
20013-80 = "สวัสดีคุณครู\nวันนี้ก็ยุ่งเหมือนเดิมเลยนะ"
20013-90 = "คุณครู ก่อนออกไปข้างนอก\nเปิดโปรแกรมล็อกหน้าจอ\nเอาไว้ก่อนด้วยล่ะ"
20013-100 = "ถ้ามีใครคิดไม่ดีแล้วอยาก\nเข้าถึงข้อมูลส่วนตัวคุณครู\nจะทำยังไงล่ะ?"
20013-110 = "ต้องมีอิสระในองค์ความรู้...\nเป็นคำพูดที่ดีแต่ก็หนักหนามากนะ"
20013-120 = "เวอริทัสไม่ใช่สนามเด็กเล่น\nของพวกเด็กไม่เต็มเต็งหรอก"
20013-130 = "แต่เป็นองค์กรที่ก่อตั้งขึ้นมา\nเพื่อต่อต้านการผูกขาดข้อมูล\nของพวกเซมิน่าต่างหาก"
20013-140 = "แน่นอนว่าพวกเด็กที่มารวมตัวกัน\nก็คงจะปฏิเสธไม่ได้...\nว่ามีแต่พวกไม่เต็มบาทก็เถอะ"
20013-150 = "ต่อหน้าฉัน อย่าพูดคำว่า\n\"แทร็กเกอร์\" ได้มั้ย...?"
20013-160 = "ความคิดของหัวหน้าฮิมาริ\nสำหรับฉันก็เข้าใจยากเหมือนกัน"
20013-170 = "ดูเหมือนว่าจะมีคนพยายาม\nบุกรุกเข้าไปที่ชาเล่ต์\nเพื่อขุดคุ้ยข้อมูลของคุณครูนะ"
20013-180 = "สองคน...\nไม่สิ... สามคน?\nแต่ก็อาจจะเยอะกว่านี้ก็ได้นะ"
20013-190 = "สุขสันต์วันเกิดนะคุณครู\nทั้งวันนี้แล้วก็วันต่อๆ ไป\nขอให้คุณครูมีความสุขนะ"
20013-200 = "วันเกิดฉัน...?\nอ๋อ วันนี้วันเกิดฉันนี่นา"
20013-210 = "เพราะมัวแต่สนใจเรื่องข้อมูลคนอื่น\nเลยไม่ได้สนใจเรื่องตัวเองเลย\nรู้สึกอายนิดๆ ที่ลืมไปสนิทเลย"
20013-220 = "ในวันปีใหม่แบบนี้\nมาลบไฟล์ขยะ\nในเมมโมรี่กันดีมั้ย?"
20013-230 = "คาเฟ่ในวันคริสต์มาสอีฟ\nมีที่นั่งว่างเยอะ เหมาะกับ\nการนั่งทำงานทั้งคืนนะ"
20013-240 = "ถึงจะเป็นวันฮาโลวีน\nแต่ฉันก็ไม่ได้คิดจะเพนต์\nรูปแปลกๆ บนหน้าฉันหรอกนะ"
20013-250 = "แต่พอไม่ทำอะไร\nมากิก็มาวาดให้เองน่ะ"
20013-260 = "น่ารักใช่มั้ยล่ะ? ฮุฮุ"
20013-280 = "ฮุฮุ คิดแล้วเชียว\nว่ารสชาติของกาแฟ\nที่ดื่มหลังทำงานเสร็จนี่อร่อยดีจริงๆ"
20013-290 = "หืม...?\nนึกว่าจะเป็นคาเฟ่งั้นเหรอ?"
20013-300 = "ขอโทษนะ\nเวลาแบบนี้คงไม่มีที่\nที่จะดื่มกาแฟได้แล้วล่ะ"
20013-310 = "ฉันน่ะ หลังจากทำงานโต้รุ่ง\nเสร็จแล้วก็จะมาดื่มกาแฟ\nที่นี่ทุกครั้งเลย"
20013-320 = "ตู้ขายกาแฟนี่น่ะ\nในเวลาแบบนี้ถึงจะไม่มีใครเห็น\nมันก็ยังทำงานต่อไปแบบเงียบๆ อยู่นี่น่า"
20013-330 = "ภาพของมันที่ตั้งใจทำงาน\nในสถานที่มืดๆ ทำให้ฉัน\nรู้สึกเหมือนเห็นตัวเองเลยน่ะ"
20013-340 = "ถ้าคุณครูได้ลอง\nลิ้มรสกาแฟนี่ดู\nจะต้องชอบแน่ๆ "
20013-2600 = "ปืนเองก็เป็นอุปกรณ์สำคัญ\nสำหรับแฮ็กเกอร์หมวกขาวนะ\nไว้จัดการกับพวกลูกค้าเรื่องมากน่ะ..."

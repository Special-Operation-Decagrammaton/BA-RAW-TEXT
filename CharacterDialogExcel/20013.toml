[translation]
20013-10 = "블루 아카이브."
20013-20 = "베리타스의 부부장, 카가미 치히로야.\n혹시라도 우리 애들이 말썽을 부리거든\n내게 바로 알려줘."
20013-30 = "이건…… 또 우리 애들이\n저질렀나 보네."
20013-40 = "으음…… 확실히\n밤을 새우니\n조금 피곤하네."
20013-50 = "어라…… 혹시\n이거, 또 서버가\n터진 건가……?"
20013-60 = "(이 카페에서는\n커피를 팔지 않는 걸까?)"
20013-70 = "(이 정도의 보안\n수준이라면……\n10초면 충분하겠네.)"
20013-80 = "안녕, 선생님.\n오늘도 바빠 보이네."
20013-90 = "선생님. 외출하기 전에는 꼭\n화면 보호기를 켜두고\n다녀오라고 했잖아."
20013-100 = "누군가가 나쁜 마음을 먹고\n선생님의 개인 정보에 접근하면\n어쩌려고 그래?"
20013-110 = "지식은 자유로워야 한다…….\n좋지만 무거운 말이지."
20013-120 = "베리타스는 단순한\n괴짜들의 놀이터가 아니야."
20013-130 = "세미나의 정보 독점에\n당하지 않기 위해…… 그것을\n목적으로 설립된 조직이야."
20013-140 = "물론 그렇게 모인 학생들이\n대부분 괴짜였다는 건\n부정할 수 없겠지만……."
20013-150 = "가능하면, 내 앞에서\n베리타스를 '트래커즈'라고\n부르는 건 피해줬으면 좋겠어."
20013-160 = "히마리 부장의 생각은\n나도 알기 어렵다니까."
20013-170 = "선생님의 정보를 캐기 위해\n집요하게 침입을 시도하는 사람이\n샬레에 몇 있는 것 같네."
20013-180 = "두 사람……\n아니, 세 사람?\n어쩌면 그보다 더 많을지도……."
20013-190 = "생일 축하해, 선생님.\n오늘도, 내일도, 선생님의\n행복한 일상이 변함없기를."
20013-200 = "……내 생일?\n아, 오늘이 내 생일이었구나."
20013-210 = "아무래도 평소에는 다른\n사람들의 정보를 신경 쓰느라\n바빠서…… 정작 자신의 정보는\n놓치다니, 조금 부끄럽네."
20013-220 = "새해 복 많이 받아, 선생님.\n새해를 맞이하는 김에, 밀린\n데이터 정리라도 같이\n해 보는 게 어때?"
20013-230 = "크리스마스 이브의\n카페는 한가해서\n밤샘 작업을 하기에 좋지."
20013-240 = "할로윈이라고 해서 낙서를\n하고 싶은 생각은 없지만……"
20013-250 = "뭐, 내버려 둬도 마키가\n제멋대로 그리러 올 테니까."
20013-260 = "……후훗, 귀엽잖아?"
20013-280 = "후후. 역시 일을\n끝마치고 마시는\n커피의 맛은 각별하네."
20013-290 = "……응?\n카페라고 생각했던 거야?"
20013-300 = "미안. 이런 시간까지 영업하는\n가게도 없고, 여기 정도밖에\n커피를 마실 수 있는\n장소가 없어서."
20013-310 = "나, 언제나 철야할 때는\n여기서 커피를 마시곤 해."
20013-320 = "이 자판기는 이런 시간에도,\n아무도 보지 않아도, 담담하게\n제 소임을 다하고 있잖아?"
20013-330 = "왠지 그런 모습이 내가\n하는 일들과 겹치는 것처럼\n느껴져서……."
20013-340 = "……선생님이 이 커피의 맛을\n알아 준다면, 기쁠 거야."
20013-2600 = "화이트 해커에게도 총은 중요한 필수품이지.\n예를 들자면, 그래…\n무례한 클라이언트를 상대할 때라던가…."

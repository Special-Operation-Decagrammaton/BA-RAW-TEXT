[translation]
20013-10 = "蔚藍檔案"
20013-20 = "我是貝里塔斯的副部長各務千尋，\n如果我們的學生有鬧事的情形\n就立刻告訴我。"
20013-30 = "看來我們的學生\n好像又搞事了……"
20013-40 = "嗯……\n一熬夜確實會\n有些疲倦呢。"
20013-50 = "咦…… \n這難道是，\n伺服器又炸了嗎……？"
20013-60 = "（不知道這裡\n有沒有賣咖啡呢？）"
20013-70 = "（這個水準的\n安全系統……\n大概10秒就夠了吧）"
20013-80 = "早安，老師，\n你今天感覺也很忙呢。"
20013-90 = "老師，離席的時候\n請別忘了開啟螢幕保護程式。"
20013-100 = "要是有誰不懷好意，\n打算竊取老師的\n個人資訊怎麼辦？"
20013-110 = "知識該當自由……\n這句話說得很好，\n但也很沉重。"
20013-120 = "貝里塔斯並非只是個\n怪胎們的遊樂場。"
20013-130 = "而是為了不讓研討會\n之類的獨佔情報……\n以此為目的設立的組織。"
20013-140 = "雖然召集到的學生\n確實都是些怪胎，\n這點我也不否認……"
20013-150 = "但可以的話，希望你\n不要在我面前稱貝里塔斯\n為「追蹤者」……"
20013-160 = "陽葵的想法，\n我也無法完全理解。"
20013-170 = "似乎有一些學生\n正不停嘗試入侵系統，\n要挖掘老師的情報……"
20013-180 = "二……不，三個人？\n或許有更多人……"
20013-190 = "生日快樂，老師。\n不管是今天或明天，\n希望老師幸福的日常永遠不變。"
20013-200 = "……咦？\n啊……今天是我的生日啊。"
20013-210 = "畢竟平常總是專注於\n別人的資訊……\n因此遺漏自己的資訊\n真是有點丟人啊。"
20013-220 = "新年快樂，老師。\n既然迎來新年了，\n要不要一起來整理\n囤積許久的資料呢？"
20013-230 = "聖誕夜的咖啡廳\n沒什麼人，很適合熬夜工作。"
20013-240 = "就算是萬聖節，\n我也不想因此跑去塗鴉……"
20013-250 = "而且就算放著不管，\n真紀也會擅自跑來塗鴉。"
20013-260 = "……呵呵，很可愛對吧。"
20013-280 = "呵呵，果然，\n工作結束後喝的咖啡，\n別有一番滋味呢。"
20013-290 = "……嗯？\n你以為會去咖啡廳嗎？"
20013-300 = "真抱歉。這種時間\n已經沒有店家在營業了，\n也只有這種地方能喝點東西。"
20013-310 = "我每次通宵工作後都會在這裡，\n喝著咖啡。"
20013-320 = "這台販賣機就算在這種時間，\n就算沒有人看到，\n也依然默默認真地\n盡著自己的職責。"
20013-330 = "總覺得這一點，\n和自己的工作\n好像重疊了一樣……"
20013-340 = "……如果老師也能夠，\n理解這杯咖啡的滋味的話，\n我會很開心的。"
20013-2600 = "槍對白帽駭客來說也是必需品，\n我想想啊，比方說……\n遇到有客戶非常失禮的時候……"

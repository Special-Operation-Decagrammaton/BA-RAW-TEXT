[translation]
10044-10 = "블루 아카이브!"
10044-20 = "드디어 바다에 도착이에요~!\n자, 선생님! 신나게 즐겨봐요!"
10044-30 = "다들\n즐거워 보여서 좋네요!"
10044-40 = "어라? 저건…"
10044-50 = "사람들이 많네요~."
10044-60 = "조금 앉아서 쉴까요?"
10044-70 = "여기는 시원해서\n좋네요~"
10044-80 = "어서 오세요, 선생님!\n오늘은 뭘 할까요?"
10044-90 = "아, 선생님!\n기다리고 있었어요~☆"
10044-100 = "여름은 덥지만…\n그만큼 즐거운 일도\n많으니까요!"
10044-110 = "바다라는 말은, 듣기만 해도\n뭔가 설레지 않나요~?"
10044-120 = "어…?\n선생님, 왜 그러세요?"
10044-130 = "제 수영복에\n뭔가 묻기라도…?"
10044-140 = "그러고보니 선생님은…\n수영할 줄 아시나요?"
10044-150 = "비치파라솔을 펴고\n느긋하게 있고 싶네요～☆"
10044-160 = "생일 축하해요, 선생님!"
10044-170 = "오늘은 특별한 날이니,\n함께 바다에서 놀아볼까요?"
10044-180 = "오늘은 제 생일입니다!\n자, 실컷 놀아요!"
10044-190 = "비치볼이 좋으세요?\n아니면 수박 깨기? ☆"
10044-200 = "새해 복 많이 받으세요☆"
10044-210 = "정말로 늘 감사하고 있어요.\n올해도 잔뜩,\n즐거운 일을 만들기로 해요!"
10044-220 = "메리 크리스마스예요, 선생님!"
10044-230 = "모처럼이니까\n뭐라도 같이 먹을까요?\n차가운 거든, 따뜻한 거든!"
10044-240 = "할로윈…이라."
10044-250 = "그럼 모처럼이니까\n담력시험 같은 건\n어떠세요?"
10044-270 = "봐요, 선생님! 빛나요!\n바다가 마치 밤하늘 같아요!"
10044-280 = "이걸 위해서,\n저를 이곳에 데리고 와\n주셨던 거네요?"
10044-290 = "그러고 보니\n팸플릿에도\n적혀 있었던 거 같아요."
10044-300 = "'밤이 되면 플랑크톤이 빛나서\n별처럼 반짝인다'고…"
10044-310 = "정말 예쁘네요."
10044-320 = "…후훗, 어떨까요~?"
10044-330 = "농담이에요.\n오늘 밤은 기분좋게\n잘 수 있을 것 같아요."
10044-340 = "감사합니다, 선생님.\n정말로, 꿈만 같은 하루였어요."
10044-350 = "저… 이곳에 올 수 있어서\n다행이에요."
10044-360 = "그치만, 조금만 더…"
10044-370 = "…조금만 이대로,\n같이 있어주세요."
10044-2600 = "와! 감사합니다~!\n선생님에 대한 감사를, 듬뿍 담아…\n선생님께 더 도움이 될 수 있도록\n힘낼게요!"

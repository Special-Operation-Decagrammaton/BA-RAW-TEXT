[translation]
10044-10 = "Blue Archive!"
10044-20 = "ในที่สุดก็มาถึงทะเลแล้วค่ะ~!\nเอาละค่ะคุณครู! เรามาสนุกกันเถอะค่ะ!"
10044-30 = "ทุกคนดูสนุกกันมากเลยนะคะ!"
10044-40 = "เอ๋? นั่นมัน..."
10044-50 = "คนเยอะจังเลยนะคะ~"
10044-60 = "มานั่งพักกันหน่อยดีมั้ยคะ?"
10044-70 = "ที่นี่เย็นสบายดีจังเลยค่ะ~"
10044-80 = "เชิญค่ะ คุณครู!\nวันนี้เราจะทำอะไรกันดีคะ?"
10044-90 = "อ๊ะ คุณครู! ฉันกำลังรออยู่เลยค่ะ...☆"
10044-100 = "ถึงฤดูร้อนอากาศจะร้อนมาก...\nแต่ก็มีเรื่องสนุกๆ อยู่เต็มเลยค่ะ!"
10044-110 = "คำว่าทะเล แค่ได้ยิน...\nก็รู้สึกใจเต้นแรงแล้วค่ะ~"
10044-120 = "เอ๋...? คุณครู\nทำไมทำหน้าแบบนั้นคะ?"
10044-130 = "ชุดว่ายน้ำของฉัน\nมีอะไรแปลกๆ งั้นเหรอคะ?"
10044-140 = "พอมาคิดๆ ดูแล้ว คุณครูน่ะ...\nว่ายน้ำเป็นรึเปล่าคะ?"
10044-150 = "อยากเอาร่มชายหาดมากาง\nแล้วนั่งรับลมเอื่อยๆ จังเลยค่ะ~☆"
10044-160 = "สุขสันต์วันเกิดค่ะ คุณครู!"
10044-170 = "วันพิเศษแบบวันนี้\nไปเที่ยวเล่นที่ทะเลด้วยกันมั้ยคะ?"
10044-180 = "วันนี้เป็นวันเกิดของฉันค่ะ!\nเอาละ จะเล่นให้เต็มที่เลยค่ะ!"
10044-190 = "ชอบเล่นวอลเลย์บอลชายหาดเหรอคะ?\nหรือว่าชอบเล่นเกมตีแตงโมคะ?☆"
10044-200 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่ค่ะ☆"
10044-210 = "ฉันรู้สึกขอบคุณคุณครูอยู่เสมอค่ะ\nปีนี้ก็ขอให้มีแต่เรื่องสนุกๆ\nตลอดทั้งปีเลยนะคะ"
10044-220 = "เมอร์รีคริสต์มาสค่ะ คุณครู!"
10044-230 = "วันคริสต์มาสทั้งที\nเรามากินอะไรด้วยกันดีมั้ยคะ?\nได้ทั้งของหวานและของคาวเลยค่ะ!"
10044-240 = "ฮาโลวีน... งั้นเหรอคะ"
10044-250 = "ถ้างั้นเรามาเล่น\nทดสอบความกล้ากันดีมั้ยคะ?"
10044-270 = "ดูสิคะ คุณครู!\nมันกำลังส่องสว่างอยู่ค่ะ\nท้องทะเลเหมือนท้องฟ้า\nยามค่ำคืนเลยค่ะ!"
10044-280 = "ที่คุณครูพาฉันมาที่นี่...\nก็เพื่อให้ฉันได้มาเห็น\nดวงดาวพวกนี้งั้นเหรอคะ?"
10044-290 = "พอมาคิดดูแล้ว...\nเหมือนเคยเห็นอยู่\nในโบรชัวร์เหมือนกันค่ะ"
10044-300 = "เขียนไว้ว่า 'พอตกกลางคืน...\nแพลงก์ตอนจะส่องแสง\nเหมือนกับดาวบนท้องฟ้า'..."
10044-310 = "สวยมากๆ เลยค่ะ"
10044-320 = "ฮิฮิ... คุณครูคิดว่ายังไงล่ะคะ?"
10044-330 = "ฉันล้อเล่นค่ะ\nวันนี้ฉันคงนอนหลับ\nได้อย่างมีความสุขแล้วค่ะ"
10044-340 = "ขอบคุณนะคะ คุณครู\nวันนี้เป็นวันที่เหมือนฝันจริงๆ เลยค่ะ"
10044-350 = "ฉันคิดว่าการได้มาที่นี่\nเป็นเรื่องที่ดีมากเลยละค่ะ"
10044-360 = "แต่ว่าฉันอยากจะขอ..."
10044-370 = "อยากขออยู่กับคุณครูแบบนี้\nนานขึ้นอีกหน่อยได้มั้ยคะ"
10044-2600 = "ว้าว! ขอบคุณค่ะ~!\nฉันจะพยายามอย่างเต็มที่เพื่อตอบแทน\nและเป็นกำลังให้คุณครูค่ะ!"

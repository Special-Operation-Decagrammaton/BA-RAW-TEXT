[translation]
10044-10 = "蔚藍檔案！"
10044-20 = "終於到達海邊了～！\n來吧老師，要盡情的玩哦！"
10044-30 = "大家看起來很開心\n真是太好了～"
10044-40 = "哎呀？\n那個是…？"
10044-50 = "人\n很多呢～。"
10044-60 = "要稍微\n坐下休息嗎？"
10044-70 = "這裡很涼快\n真不錯呢～"
10044-80 = "歡迎回來，老師！\n今天要做什麼呢？"
10044-90 = "啊，老師！\n等你好久了～☆"
10044-100 = "雖然夏天很熱，\n不過相對的\n也有很多開心的事呢！"
10044-110 = "光是聽到海邊，不覺得\n就開始興奮了嗎～？"
10044-120 = "那個……？\n老師，怎麼了嗎？"
10044-130 = "我的泳衣上，\n沾到什麼了嗎～？"
10044-140 = "話說回來老師你，\n會游泳嗎？"
10044-150 = "真想打開遮陽傘，\n悠閒自在地度過呢～☆"
10044-160 = "祝你生日快樂，\n老師！"
10044-170 = "今天是特別的日子，\n要一起在海邊玩嗎？"
10044-180 = "今天是我的生日！\n來，一起盡情玩吧！"
10044-190 = "要玩沙灘排球呢，\n還是打西瓜呢？☆"
10044-200 = "祝你新年快樂☆"
10044-210 = "一直以來，真的很謝謝你。\n今年也來做很多開心的事吧？"
10044-220 = "聖誕快樂，老師！"
10044-230 = "機會難得，\n要一起吃些什麼嗎？\n冰的東西也好，熱的東西也行！"
10044-240 = "萬聖節嗎……"
10044-250 = "那麼機會難得，來個\n試膽大會之類的怎麼樣～？"
10044-270 = "請看，老師！在發光！\n大海看起來就像星空一樣！"
10044-280 = "老師就是為了這個，\n才帶我來這裡的嗎？"
10044-290 = "這麼說來，\n手冊上好像也有寫到。"
10044-300 = "「到了晚上，\n　浮游生物就會發光，\n　如星辰般閃爍」……"
10044-310 = "真的很美呢。"
10044-320 = "……呵呵，\n不好說哦～？"
10044-330 = "這麼說，是開玩笑的。\n今晚似乎可以舒服地入睡了。"
10044-340 = "謝謝你，老師……\n真的是，如美夢般的一天。"
10044-350 = "我……能來到\n這裡真是太好了。"
10044-360 = "不過，再稍微……"
10044-370 = "……請再稍微，\n待在我身邊吧。"
10044-2600 = "哇！謝謝～！\n帶著對老師滿滿的感謝……\n為了能夠對老師更有幫助，\n我會努力的！"

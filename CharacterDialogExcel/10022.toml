[translation]
10022-10 = "Blue Archive."
10022-20 = "Gehenna Head Prefect Hina reporting. I assure you this outfit is merely for summer training."
10022-30 = "I hope this swimsuit will not cause any issues."
10022-40 = "I'm getting a little tired. Perhaps due to the training."
10022-50 = "Cute swimsuits aren't my style."
10022-60 = "It's nice and cool here. Perfect for summer training."
10022-70 = "Shall I start planning the next training session?"
10022-80 = "Ah, you're here, Sensei. Preparations for the training session are complete."
10022-90 = "I'm looking forward to the summer."
10022-100 = "...Um, if you keep staring at me like that, well..."
10022-110 = "This swimsuit? I thought it'd be perfect for my summer training."
10022-120 = "No, I didn't hold particularly high hopes for this summer."
10022-130 = "...Maybe a tiny bit."
10022-140 = "Resting is just as important as training?"
10022-150 = "I suppose, but I can't just neglect training."
10022-160 = "You want me to ask for help when I need it?"
10022-170 = "Thank you, Sensei. Just hearing that makes me happy."
10022-180 = "Until the very last moment of this summer..."
10022-190 = "I'll be helping you right by your side, Sensei."
10022-200 = "It's your birthday today, Sensei?"
10022-210 = "Let's see... Is there anything I can do for you?"
10022-220 = "A walk on the beach? Heehee. Sure if that's what you want."
10022-230 = "My birthday? Oh, I forgot about that."
10022-240 = "Do I want anything? I haven't given it any thought."
10022-250 = "You want us to go in the water, together?"
10022-260 = "W-Wait, Sensei! My heart's not ready yet...!"
10022-270 = "Happy New Year, Sensei."
10022-280 = "I'll look forward to this summer. And maybe the next one..."
10022-290 = "Merry Christmas, Sensei."
10022-300 = "I'll never understand the commotion about this day."
10022-310 = "But it is nice spending it with you."
10022-320 = "Halloween... I'm not very familiar with it..."
10022-330 = "But everyone seems so lively. Like a summertime beach."
10022-350 = "Honestly, I've never understood people's fascination with the ocean."
10022-360 = "While everyone's having a good time, I've never felt the same way."
10022-370 = "It's blurry underwater, and I get nervous when my feet can't touch the ground."
10022-380 = "Sensei, have you ever felt that way before?"
10022-390 = "I found it eerie... The way the sea was just a bottomless well at night."
10022-400 = "I hated how it felt like I'd be sucked in just looking at it."
10022-410 = "But, you know, I think I'm beginning to understand. At least a little bit."
10022-420 = "The ocean can be so beautiful."
10022-430 = "Strange... I've never felt this way before."
10022-440 = "Thank you, Sensei...for being here with me."
10022-450 = "And for everything you've taught me."
10022-2600 = "This, for me...? Thank you. I won't let you down, no matter what."

[translation]
10022-10 = "蔚藍檔案。"
10022-20 = "格黑娜的風紀委員長，陽奈。\n……這終究只是，為了夏天鍛鍊合宿的打扮。"
10022-30 = "這件泳衣，\n應該不奇怪吧……？"
10022-40 = "是鍛鍊的原因嗎……\n身體有點慵懶。"
10022-50 = "可愛泳衣什麼的，\n不適合我……"
10022-60 = "這裡很涼快呢……\n很適合鍛鍊。"
10022-70 = "得考慮下一個\n訓練內容才行……"
10022-80 = "啊啊，歡迎回來。老師。\n鍛鍊的準備的話已經做好了唷。"
10022-90 = "今年的夏天，\n也請多指教。"
10022-100 = "……那個，\n被那樣盯著看的話，那個……"
10022-110 = "這件泳衣？\n我想對於合宿的鍛鍊剛剛好。"
10022-120 = "並沒有期待，\n樂在其中之類的……"
10022-130 = "那個，只有稍微一點……"
10022-140 = "雖然鍛鍊很好，\n不過休息也很重要？"
10022-150 = "……確實那也是正論。\n但是，我也不能偷懶。"
10022-160 = "有什麼能做的事……？"
10022-170 = "謝謝你，老師。\n光是老師能那麼說，\n我就很高興。"
10022-180 = "這個夏天要結束了，\n直到最後的瞬間為止……"
10022-190 = "我都會在老師身邊，\n幫助老師的。"
10022-200 = "今天，是老師的生日？"
10022-210 = "那個，怎麼辦……\n有什麼我可以做的事嗎？"
10022-220 = "一起，在海邊散步……？\n呵呵。如果是那種事的話，\n我很樂意。"
10022-230 = "我的生日……？\n啊啊，話說回來確實是。"
10022-240 = "有沒有想要的東西……？\n不，並沒有什麼……"
10022-250 = "咦，總而言之\n先一起跳進海裡？"
10022-260 = "等，等一下老師！\n心，心理準備還沒……！"
10022-270 = "新年快樂，老師。"
10022-280 = "今年的夏天也請多指教哦。\n可以的話今年也，\n再下一個夏天也……"
10022-290 = "聖誕快樂，老師。"
10022-300 = "雖然今天是多麼特別的日子，\n我並不太清楚。"
10022-310 = "不過能和老師一起迎來，\n我覺得很高興。"
10022-320 = "萬聖節嗎……\n雖然有點不習慣……"
10022-330 = "不過像夏天的海邊一樣熱鬧，\n大家看起來很開心呢。"
10022-350 = "為什麼大家，\n都那麼喜歡大海呢……\n我一直都這麼思考著。"
10022-360 = "雖然大家看起來都很開心，\n但是我實在是\n沒辦法喜歡大海……"
10022-370 = "在水裡會看不清楚，\n腳又無法著地，會令人不安……"
10022-380 = "老師有沒有也這麼想過？"
10022-390 = "特別是夜晚的大海，\n就像黑暗一樣，\n很陰森……"
10022-400 = "光是注視著\n就好像會被吸進去，\n雖然沒辦法喜歡……"
10022-410 = "不過……現在，\n好像能稍微，\n理解大家的心情了。"
10022-420 = "原來大海，\n這麼美麗呀。"
10022-430 = "真神奇……\n至今為止，\n明明沒有這麼想過。"
10022-440 = "謝謝你，老師。\n陪伴在我身邊……"
10022-450 = "教導我，\n各種事物。"
10022-2600 = "要把這個，給我……？\n知道了，我會心懷感激地收下。\n最後的瞬間，直到那之前為止……\n我都會回應老師的期待的。"

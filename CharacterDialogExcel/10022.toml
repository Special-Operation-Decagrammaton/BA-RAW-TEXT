[translation]
10022-10 = "Blue Archive"
10022-20 = "หัวหน้าคณะกรรมการวินัย ฮินะ\nชุดนี้... ก็แค่เพื่อการฝึกภาคฤดูร้อนเท่านั้นแหละ"
10022-30 = "ชุดว่ายน้ำไม่ได้ดูแปลกใช่มั้ย...?"
10022-40 = "ฉันเหนื่อยนิดหน่อยน่ะ...\nคงเพราะฝึกภาคฤดูร้อนแหละ"
10022-50 = "พวกชุดว่ายน้ำน่ารักๆ น่ะ\nไม่เหมาะกับฉันหรอก..."
10022-60 = "ที่นี่สบายดีจัง\nเหมาะกับการมาเข้าค่ายฝึกเลย"
10022-70 = "คิดแผนการฝึกครั้งต่อไป\nเอาไว้เลยดีมั้ยนะ..."
10022-80 = "มาแล้วเหรอคุณครู\nเตรียมการฝึกฤดูร้อนเสร็จแล้วละ"
10022-90 = "ฤดูร้อนนี้ ขอรบกวนด้วยนะ"
10022-100 = "นะ...นี่คุณครู อย่าจ้องกันแบบนั้นสิ..."
10022-110 = "ชุดว่ายน้ำนี่เหรอ?\nชุดสำหรับการฝึกฤดูร้อนน่ะ"
10022-120 = "ที่จริงฤดูร้อนปีนี้\nฉันไม่ได้คาดหวังอะไรหรอก"
10022-130 = "แต่ที่จริง... ก็อาจจะหวังอยู่นิดหน่อยน่ะ"
10022-140 = "การฝึกก็ดีอยู่หรอก\nแต่การพักผ่อนก็สำคัญนะ"
10022-150 = "ถึงทฤษฎีจะเป็นแบบนั้น\nแต่เราจะมามัวขี้เกียจ\nตอนฝึกไม่ได้หรอกนะ"
10022-160 = "ถ้าต้องการความช่วยเหลือ\nก็ให้บอกงั้นเหรอ?"
10022-170 = "ขอบคุณนะคุณครู\nไม่ว่าเมื่อไรก็พูดแบบนั้นตลอด"
10022-180 = "จนกว่าจะหมดหน้าร้อนนี้..."
10022-190 = "ฉันจะคอยช่วยคุณครูเอง"
10022-200 = "วันนี้เป็นวันเกิดคุณครูเหรอ?"
10022-210 = "แล้วคุณครู...\nมีอะไรที่อยากให้ฉัน\nทำให้หรือเปล่า?"
10022-220 = "ไปเดินเล่นที่ชายหาดเหรอ...?\nฮิฮิ ถ้าเรื่องนั้นละก็ได้เสมอเลย"
10022-230 = "วันเกิดฉันเหรอ?\nอา ลืมไปสนิทเลย"
10022-240 = "ฉันอยากได้อะไรหรือเปล่าเหรอ?\nอืม ไม่รู้สินะ"
10022-250 = "อ๊ะ จะชวนไปเล่นน้ำทะเลงั้นเหรอ?"
10022-260 = "นี่ เดี๋ยวสิคุณครู\nฉันยังไม่ได้เตรียมใจเลย...!"
10022-270 = "สวัสดีปีใหม่นะคุณครู"
10022-280 = "ฤดูร้อนปีนี้ ฤดูร้อนปีหน้า...\nแล้วก็ฤดูร้อนปีต่อๆ ไป...\nขอฝากตัวด้วยนะ"
10022-290 = "เมอร์รีคริสต์มาส "
10022-300 = "ถึงฉันจะไม่รู้ว่าวันนี้...\nเป็นวันที่พิเศษขนาดไหนก็เถอะ"
10022-310 = "แค่ได้เจอกับคุณครู\nก็มีความสุขมากเลย"
10022-320 = "วันฮาโลวีนนี่เอง\nรู้สึกไม่ชินเลย..."
10022-330 = "ทะเลดูครึกครื้นดี\nทุกคนดูสนุกกันใหญ่เลย"
10022-350 = "ฉันไม่ค่อยเข้าใจหรอก\nว่าทำไมทุกคนถึงชอบทะเลกัน"
10022-360 = "ถึงทุกคนดูสนุกกันมาก…\nแต่ฉันเองไม่ได้รู้สึกแบบนั้นเลย"
10022-370 = "ฉันรู้สึกกังวล เวลาที่เท้า\nยันพื้นไม่ถึง หรือมองไม่เห็น\nข้างใต้น้ำน่ะ"
10022-380 = "คุณครู ไม่เคยคิดแบบนั้นเหรอ?"
10022-390 = "โดยเฉพาะทะเลตอนกลางคืน\nดูเหมือนบ่อน้ำขนาดใหญ่\nที่ไร้จุดสิ้นสุดเลย"
10022-400 = "เพียงแค่มองก็รู้สึกเหมือนว่า\nจะโดนดูดเข้าไป ฉันเลย\nไม่ค่อยชอบเลย"
10022-410 = "แต่ว่าตอนนี้ฉันเริ่มเข้าใจ\nความรู้สึกทุกคนแล้วล่ะ"
10022-420 = "ว่าท้องทะเล\nมันสวยงามขนาดนี้นี่เอง"
10022-430 = "แปลกจังเลย จนถึงตอนนี้\nฉันไม่เคยคิดแบบนี้มาก่อนเลย"
10022-440 = "ขอบคุณนะคุณครู...\nที่อยู่ด้วยกันในตอนนี้..."
10022-450 = "แล้วก็ขอบคุณที่ช่วยสอนฉัน\nในหลายๆ อย่าง"
10022-2600 = "ให้ฉันเหรอ...? เข้าใจแล้ว\nจะรับไว้แล้วกันนะ ฉันจะทำตาม\nที่คุณครูต้องการจนถึงที่สุดเอง"

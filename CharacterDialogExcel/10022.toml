[translation]
10022-10 = "블루 아카이브."
10022-20 = "게헨나 선도부 부장. 히나.\n……이 차림은 어디까지나,\n하계 합숙 훈련을 위해서니까."
10022-30 = "이 수영복,\n…이상해보이진, 않겠지?"
10022-40 = "하계 합숙\n훈련 때문인가……\n조금 지치네."
10022-50 = "귀여운 수영복이라니,\n나에겐 어울리지 않는데\n……."
10022-60 = "여긴 시원하구나.\n합숙 훈련에 딱이야."
10022-70 = "다음 훈련 계획을,\n생각해둘까."
10022-80 = "아아, 어서 와. 선생.\n훈련 준비라면\n전부 끝마쳐 두었어."
10022-90 = "이번 여름에도 잘 부탁해."
10022-100 = "……저기, 그렇게\n너무 쳐다보면, 그게……."
10022-110 = "이 수영복?\n합숙 훈련에 마침\n딱이다 싶어서."
10022-120 = "딱히 이번 여름을 기대라던가,\n손꼽아 기다렸던 건……."
10022-130 = "그, 조금은 했을지도 모르지만."
10022-140 = "훈련도 좋지만,\n쉬는 것도 중요하다고?"
10022-150 = "……그것도 정론이지만.\n그래도, 나부터\n게을리 할 순 없으니까."
10022-160 = "뭔가 필요한 게 있으면\n말해달라고……?"
10022-170 = "고마워, 선생.\n그렇게 말해주는\n것만으로도 기뻐."
10022-180 = "이 여름이 끝나는,\n마지막 순간까지……."
10022-190 = "내가 바로 곁에서,\n선생님을 도와줄 테니까."
10022-200 = "오늘이, 선생님의 생일?"
10022-210 = "아, 어쩌지…….\n내게 뭔가 해줬으면\n하는 거 없어?"
10022-220 = "같이, 해변을 걷자고……?\n후후, 그런 걸로 괜찮다면,\n얼마든지."
10022-230 = "내 생일……?\n아아, 그러고 보니 그랬네."
10022-240 = "뭔가 원하는 거 없냐고……?\n글쎄, 딱히 그런 건……."
10022-250 = "앗, 일단 같이\n바다에 뛰어들자고?"
10022-260 = "자, 잠깐 기다려 선생님!\n마음의 준비가……!"
10022-270 = "새해 복 많이 받아. 선생님."
10022-280 = "올 여름도 잘 부탁해.\n가능하다면 올 여름도,\n그다음에 찾아올 여름도……."
10022-290 = "메리 크리스마스. 선생님."
10022-300 = "오늘이 얼마나 특별한 날인지,\n나는 잘 모르겠지만."
10022-310 = "선생과 함께 맞이하게 되어서,\n무척 기뻐."
10022-320 = "할로윈이라…….\n어째 익숙하진 않지만……."
10022-330 = "여름 바다처럼 떠들썩해서,\n모두 즐거워 보이네."
10022-350 = "어째서 모두들,\n그렇게나 바다를 좋아하는 걸까\n……라고, 쭉 생각해왔어."
10022-360 = "다들 즐거워 보이지만……\n난 아무래도\n좋아지지가 않아서……."
10022-370 = "물속은 제대로 보이지도 않고,\n발도 바닥에 닿지 않으면\n불안하고……."
10022-380 = "선생도,\n그런 생각 해본 적 없어?"
10022-390 = "특히 밤바다라는 건,\n꼭 새카만 우물 같은 게\n으스스해서……"
10022-400 = "보고 있으면\n빨려 들어갈 것만 같아,\n도저히 좋아할 수 없었는데……."
10022-410 = "하지만…….\n이제는, 모두의 기분을\n조금은 알 것 같아."
10022-420 = "바다라는 건\n이렇게 예쁜 거였구나."
10022-430 = "신기해…….\n지금까지, 이런 식으로\n생각해본 적 없었는데."
10022-440 = "고마워, 선생님.\n함께 있어줘서……"
10022-450 = "……여러가지를,\n가르쳐주어서."
10022-2600 = "이걸, 나한테……?\n알았어, 고맙게 받을게.\n마지막 순간, 그때가 올 때까지\n……선생님의 기대에 부응해 보일 테니까."

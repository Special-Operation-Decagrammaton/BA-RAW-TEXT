[translation]
10127-10 = "Blue... Archive...?"
10127-20 = "ฉะ... ฉันชื่อซากุราอิ มิโยะ จากสถาบันศิลปะไวลด์ฮันต์ค่ะ\nถะ... ถึงจะไม่รู้ว่าทำไมถูกเรียกออกมา... แต่ก็ขอฝากตัวด้วยนะคะ"
10127-30 = "(มีที่ที่พอจะนั่งเขียน\nอะไรได้บ้างมั้ยนะ...)"
10127-40 = "คนเยอะเกินไป\nจนไม่กล้าใช้\nเครื่องพิมพ์ดีดเลยค่ะ..."
10127-50 = "ทุกคนดูมีอิสระจังเลย\nนะคะ... ต่างกับที่\nไวลด์ฮันต์เลย"
10127-60 = "(คุณครู...\nจะชอบกาแฟ\nแบบไหนนะ?)"
10127-70 = "ทางเข้าอยู่ตรงโน้น\nส่วนทางออกอยู่ตรงนี้...\nทำไมฉันถึง...\nคิดเรื่องนี้อยู่นะคะ?"
10127-80 = "อ๊ะ มาแล้วสินะคะ\nฉันมัวแต่อ่านหนังสือ\nเลยไม่รู้ว่ามาถึงแล้วค่ะ"
10127-90 = "ช่วงนี้ฉันเขียนอะไรอยู่น่ะเหรอคะ?\nเอ่อ อืม... ไว้เขียนจบแล้ว\nฉันจะเอาให้ดูนะคะ...!"
10127-100 = "คือว่า... ไม่มีงานอะไร\nจะสั่งฉันเลยเหรอคะ?"
10127-110 = "ขอแค่ไม่ใช่งานผิดกฎหมาย\nฉันจะทำให้ทุกอย่างเลยค่ะ..."
10127-120 = "แค่ให้ฉันเขียนงานอย่างสบายใจ\nก็พอเหรอคะ? กะ... ก็เพราะว่านั่นคือ\nงานของนักเขียนงั้นเหรอ...?"
10127-130 = "ฉันขอมองคุณครูไปด้วย\nแล้วเขียนงานไปด้วยได้มั้ยคะ?"
10127-140 = "ทำไมน่ะเหรอคะ?\nกะ... การอยากเห็นใคร\nต้องมีเหตุผลด้วยเหรอคะ?"
10127-150 = "พอเขียนนิยายมากๆ เข้า\nจะรู้สึกว่าทุกสิ่งรอบตัว\nมีความหมายแอบแฝงหมดเลยค่ะ"
10127-160 = "การที่ฉันมาที่นี่ จะมี\nความหมายแอบแฝงอะไรอยู่นะคะ...?"
10127-170 = "ก็วันนี้คุณครู\nไม่มาที่ไวลด์ฮันต์...\nฉันเลยมาหาเองค่ะ"
10127-180 = "ขอบคุณนะคะคุณครู\nที่มาหาเพื่อติดตาม...\nเรื่องราวของฉัน "
10127-190 = "ของขวัญที่อยากได้เหรอคะ?\nอืม..."
10127-200 = "งั้นขอค่อยๆ เล่า\nสัก 2 ชั่วโมงได้มั้ยคะ?"
10127-210 = "เริ่มหน้าแรกของปีแล้วสินะคะ\nมาอ่านอารัมภบท\nด้วยกันกับฉันมั้ยคะ?"
10127-220 = "เมอร์รีคริสต์มาสค่ะ คุณครู\nถ้ามีของที่อยากได้ละก็\nวันนี้ฉันจะจัดส่งให้..."
10127-230 = "ลูกกวาดค่ะ อ้าปากสิคะ อ้า~"
10127-240 = "ถ้าปฏิเสธ\nจะโดนฉันแกล้งนะคะ"
10127-260 = "มาทำอะไร\nอยู่ในที่แบบนี้เหรอคะ...?"
10127-270 = "ฉันตามหาคุณครู\nอยู่นานเลยนะ..."
10127-280 = "เห็นร้องโอดโอย\nอยู่ตั้งแต่เมื่อกี้แล้ว..."
10127-290 = "รู้สึกไม่ค่อยสบาย\nตรงไหนหรือเปล่าคะ...? "
10127-300 = "อย่างนี้นี่เอง ฝันร้ายเหรอคะ?"
10127-310 = "ต้องเป็นการถูกลงโทษแน่ๆ ค่ะ"
10127-320 = "ก็หมู่นี้มาที่ไวลด์ฮันต์\nอยู่บ่อยๆ..."
10127-330 = "แต่ไม่เคยติดต่อ\nมาหาฉันสักครั้งเลยนี่คะ"
10127-340 = "ฮุฮุ... ล้อเล่นค่ะ"
10127-350 = "แต่พอได้เจอ\nกับคุณครูแบบนี้...\nฉันก็ดีใจนะคะ"
10127-2600 = "ถ้าทุกสิ่งเป็นหนังสือได้...\nฉันจะให้สิ่งนี้เป็นหนังสือของฉันค่ะ\nหนังสือของเราที่มีเรื่องราว...\nระหว่างฉันกับคุณครูน่ะค่ะ"

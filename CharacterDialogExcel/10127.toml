[translation]
10127-10 = "블루, 아카이……브?"
10127-20 = "와, 와일드헌트예술학원, 사쿠라이 미요라고 합니다.\n왜, 왜 제가 불린 건진 모르겠지만……잘 부탁드립니다."
10127-30 = "(앉아서 글 쓸 만한\n곳은 없는 걸까…….)"
10127-40 = "타자기를 쓰기엔,\n듣는 귀가\n너무 많네요……."
10127-50 = "다들 자유롭네요……\n와일드헌트와는\n다르게."
10127-60 = "(선생님은……\n어떤 커피를 좋아한다는\n설정이실까?)"
10127-70 = "진입로는 저쪽,\n퇴로는 이쪽…….\n……저 이걸 왜\n계산하고 있죠?"
10127-80 = "아, 오셨군요.\n책 읽느라\n미처 오신 줄 몰랐어요."
10127-90 = "요즘 뭘 쓰고 있었냐고요? \n그, 어, 완결 내면\n보여드릴게요……!"
10127-100 = "저, 혹시 시키실 일 없으신가요?"
10127-110 = "범죄만 아니라면,\n뭐든지 다 할게요……."
10127-120 = "그냥 편하게 글만 써도\n된다고요? 그, 그것이\n작가의 일이니까……?"
10127-130 = "선생님을 보면서\n글을 써도 될까요?"
10127-140 = "왜냐고요? 보, 보고 싶은 데에\n이유가 있어야 하나요?"
10127-150 = "소설을 쓰다 보면\n주변의 일들이 전부\n복선으로 느껴져요."
10127-160 = "……제가 이곳에 온 건\n어떤 복선일까요?"
10127-170 = "오늘은 선생님이 와일드헌트에\n오지 않으시니까…...\n와버렸어요."
10127-180 = "이렇게 저의 이야기로\n와 주셔서……\n고마워요, 선생님. "
10127-190 = "받고 싶은 선물이요?\n음……"
10127-200 = "일단, 두 시간 정도\n천천히 이야기해 볼까요?"
10127-210 = "한 해의 첫 페이지네요.\n저희 함께 서문을\n읽어보지 않을래요?"
10127-220 = "메리 크리스마스에요, 선생님. \n혹시 받고 싶은 게 있으시다면,\n오늘만큼은 제가 조달을……."
10127-230 = "사탕이에요, 아~ 하세요."
10127-240 = "……거절하시면,\n장난칠 거랍니다?"
10127-260 = "……이런 곳에서,\n무엇을 하고 계신 건가요?"
10127-270 = "계속 선생님을\n찾고 있었는데……"
10127-280 = "또 아까부터\n계속 끙끙거리시고……."
10127-290 = "저기 혹시,\n몸 상태가 별로\n안 좋으신가요……? "
10127-300 = "흐음, 악몽인가요."
10127-310 = "분명, 벌을 받은 거예요."
10127-320 = "최근 자주 와일드헌트에\n오셨으면서도……."
10127-330 = "한 번도 저한테\n연락 주지 않으셨잖아요."
10127-340 = "……후후, 농담이에요."
10127-350 = "그래도, 이렇게 선생님과\n만날 수 있어서……\n저, 기뻐요."
10127-2600 = "무엇이든 책이 될 수 있다면……\n이걸 저의 책으로 삼을게요. \n선생님과 저의\n이야기가 담긴……\n우리의 책으로요."

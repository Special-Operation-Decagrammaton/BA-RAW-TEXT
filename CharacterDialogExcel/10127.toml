[translation]
10127-10 = "Blue...archive?"
10127-20 = "I-I'm Sakurai Miyo from Wildhunt Art Academy. N-Not sure why I'm here...but I look forward to working with you."
10127-30 = "(I wonder if there's somewhere I can sit down and write...)"
10127-40 = "Too many people would be able to hear me if I use my typewriter..."
10127-50 = "Everyone seems to be free... Unlike at Wildhunt."
10127-60 = "(I wonder...what story lies behind Sensei's coffee preference.)"
10127-70 = "Entrance here, an escape route over there... Why am I analyzing all this?"
10127-80 = "Ah, you're here. I was reading and didn't see you coming."
10127-90 = "What am I writing lately? Well, uh, I'll show you when I finish...!"
10127-100 = "Um, is there anything I can help you with?"
10127-110 = "As long as it's not a crime, I'll do anything..."
10127-120 = "I can just sit back and write? Th-That's what a writer should do...?"
10127-130 = "Can I look at you while I write, Sensei?"
10127-140 = "Why? D-Do I need a reason to want to look at you?"
10127-150 = "When I write a novel, everything that happens around me feels like foreshadowing."
10127-160 = "...What would me coming here be foreshadowing?"
10127-170 = "Since you didn't come to Wildhunt today...I came here."
10127-180 = "You came here for my story... Thank you, Sensei. "
10127-190 = "What present do I want? Hm..."
10127-200 = "Shall we take it slow and talk about it for two hours or so?"
10127-210 = "It's the first page of the new year. Shall we read the preface together?"
10127-220 = "Merry Christmas, Sensei. If there's anything you need, I'll get it for you today..."
10127-230 = "It's candy. Say ahh."
10127-240 = "...I'll play a trick on you if you refuse, okay?"
10127-260 = "...What are you doing in a place like this?"
10127-270 = "I've been looking for you for so long..."
10127-280 = "And you've been groaning to yourself..."
10127-290 = "Could it be that you're not feeling well...? "
10127-300 = "Hmm, a nightmare."
10127-310 = "I'm sure this is your punishment."
10127-320 = "You've been coming to Wildhunt so often..."
10127-330 = "Yet you've never once called me."
10127-340 = "...Fufu, I'm joking."
10127-350 = "But still, meeting you like this...makes me happy, Sensei."
10127-2600 = "If anything can be a book...I'll consider this my book. One that carries our story... Our book."

[translation]
10127-10 = "蔚藍，檔……案？"
10127-20 = "我，我是狂獵藝術學院的櫻井美代。\n雖，雖然不知道為什麼會被叫來……\n還請多多指教。"
10127-30 = "（感覺能悠哉寫稿的地方\n……沒有嗎）"
10127-40 = "用打字機的話，\n會不會造成困擾呢……"
10127-50 = "大家都好自在……\n和狂獵完全不同。"
10127-60 = "（老師……喜歡\n什麼樣的咖啡呢？）"
10127-70 = "我想想，從那邊進入，\n逃脫就從……等一下，\n這裡沒必要找這些吧……"
10127-80 = "啊，老師……\n不好意思，我沉浸在書裡……"
10127-90 = "咦，我正在寫的東西是嗎？\n……等，等完結之後再享受吧！"
10127-100 = "那個，有什麼困擾的事嗎？"
10127-110 = "只要合法，什麼都可以……"
10127-120 = "可以不用在意，專心寫作是嗎？\n因為那是作家的工作……？"
10127-130 = "我想一邊看著老師，\n一邊寫故事……"
10127-140 = "沒有理由……就不行嗎？"
10127-150 = "寫小說的時候，\n日常的一切看起來\n都像是伏筆。"
10127-160 = "就連我來到這裡也是……"
10127-170 = "今天老師不在狂獵……\n所以我就來了。"
10127-180 = "能像這樣，\n在我的故事裡登場……\n謝謝你，老師。"
10127-190 = "想要的東西是嗎？\n唔嗯……"
10127-200 = "能讓我聊兩個小時左右嗎？"
10127-210 = "今天是今年的第一頁呢。\n如果可以的話，\n能跟我一起讀下去嗎？"
10127-220 = "聖誕快樂。\n老師想要的東西……\n我會幫你準備好哦。"
10127-230 = "這是糖果。\n請做出啊～的動作。"
10127-240 = "要是拒絕的話……\n我會惡作劇的唷？"
10127-260 = "……你在這種地方，做什麼呢？"
10127-270 = "明明我一直在\n找老師的說……"
10127-280 = "你從剛才看起來\n就有點痛苦……"
10127-290 = "難道是身體不舒服嗎……？"
10127-300 = "原來如此，是惡夢啊……"
10127-310 = "肯定是遭到報應了吧。"
10127-320 = "明明最近經常來狂獵……"
10127-330 = "卻連一次都沒有聯絡我。"
10127-340 = "……呵呵，開玩笑的。"
10127-350 = "不過，能像這樣見到\n老師……我很開心。"
10127-2600 = "如果能實現的話，\n我想把這個瞬間寫進書裡。\n讓我們的回憶……\n隨時都能反覆閱讀。"

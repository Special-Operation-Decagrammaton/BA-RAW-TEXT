[translation]
10097-10 = "Blue Archive!"
10097-20 = "RABBIT 3 มาถึงที่หมายแล้ว~\nฮิฮิฮิ... ถ้าอยู่ในทะเล\nคงใช้ระเบิดได้ตามใจเลยสินะ?"
10097-30 = "ระเบิดมือหล่นอยู่\nตรงไหนหรือเปล่านะ..."
10097-40 = "เฮ้อ... เหนื่อยจัง..."
10097-50 = "กลิ่นแห่งความพินาศ..."
10097-60 = "ฮิฮิฮิ... ปุ่มนี้\nเชื่อมต่อกับอะไรนะ..."
10097-70 = "ไฟร์วอลล์ของคาเฟ่นี้\nป้องกันได้ดีชะมัดเลย..."
10097-80 = "เข้ามาสิ คุณครู\nวันนี้ไปทิ้งระเบิด\nที่ชายหาดไหนดีนะ?"
10097-90 = "อ๊ะ คุณครู ฉันกำลัง\nรอคำสั่งอยู่เลย"
10097-100 = "ฉันวางระเบิดไว้เพียบเลย\nจะได้ระเบิดได้ทุกเมื่อไง"
10097-110 = "ไม่เคยสั่งอะไรแบบนั้นงั้นเหรอ...?"
10097-120 = "ไม่เห็นเป็นไรเลย อะไรที่ดี\nก็ว่าดีไปเถอะน่า ฮิฮิฮิ..."
10097-130 = "ชุดว่ายน้ำนี้ตัวเล็กไปหน่อย\nมันรัดซะจนฉันเจ็บเลยละ..."
10097-140 = "แต่มันก็ดีนะ...\nฮ่า... ฮ่า..."
10097-150 = "ว่ายน้ำเหรอ? ก็ต้องว่ายเป็นอยู่แล้ว"
10097-160 = "เพราะถึงจะเป็นโอเปอเรเตอร์\nแต่ฉันก็เป็นสมาชิก SRT คนหนึ่งนะ"
10097-170 = "เมื่อมองดูใต้ทะเลลึก\nบางครั้งจะรู้สึกถึงความกลัว\nก่อนความอัศจรรย์ใจอีก"
10097-180 = "ถ้าตกลงไปในห้วงลึก\nที่มองไม่เห็นพื้นตรงนั้น"
10097-190 = "จะรู้สึกถึงความพินาศ\nแค่ไหนกันนะ... ฮ่า ฮ่า..."
10097-200 = "หะ... หิวจัง... คุณครู\nมีอะไรหวานๆ มั้ย?"
10097-210 = "กินคูซายะมากไปหรือเปล่านะ\nกลิ่นคาวติดปากฉัน\nไม่หายสักที..."
10097-220 = "สุขสันต์วันเกิดนะคุณครู"
10097-230 = "วันเกิดปีนี้\nลองเป่าชนวนระเบิด\nแทนเป่าเทียนดูมั้ย?"
10097-240 = "คงจะเป็นความทรงจำ\nที่เร้าใจกว่าเดิมเลยละ ฮิฮิฮิ..."
10097-250 = "มีอะไรที่อยากได้เป็นของขวัญ\nวันเกิดหรือเปล่าน่ะเหรอ?"
10097-260 = "อืม... ตั๋วเย็บปะเสื้อผ้ามั้ง"
10097-270 = "ถ้าจะซื้อเสื้อให้พอดีรอบอก\nแขนก็จะยาวเสมอเลย\nแล้วเอวก็จะสั้นจนไม่พอดีตัวน่ะ"
10097-280 = "สวัสดีปีใหม่นะคุณครู\nปีนี้ก็รบกวนสนับสนุน\nฉันอย่างเต็มที่ด้วยนะ ฮุฮุ..."
10097-290 = "คุณครู คริสต์มาสนี้\nถ้าไม่ติดอะไรก็แวะมา\nที่สวนสาธารณะอีกปีนะ"
10097-300 = "ฉันจะจัดปาร์ตี้บาร์บีคิวน่ะ"
10097-310 = "ฉันเตรียมไก่งวงตัวใหญ่...\nกับคูซายะสูตรพิเศษไว้ด้วย"
10097-320 = "อ๊ะ นี่เป็นความลับ\nกับสมาชิกคนอื่นนะ"
10097-330 = "ฉันเห็นคนแต่งตัวเป็นผีบ่อยๆ\nเข้าเทศกาลฮาโลวีน\nแล้วเหรอเนี่ย..."
10097-340 = "หืม? ฉันกลัวผีหรือเปล่าน่ะเหรอ?"
10097-350 = "บ้าเหรอ ไม่มีทาง\nก็ผีเป็นสิ่งที่พินาศไปแล้วนี่นา"
10097-370 = "ยังไงฉันก็ว่าไฟมัน\nไม่น่าจะแรงพอนะ..."
10097-380 = "เอาเถอะ มีควันลอยออกมาอยู่\nคงใช้ได้ละมั้ง"
10097-390 = "จะว่าไป ฉันไม่ได้ดมกลิ่นแบบนี้\nมานานแล้วนะเนี่ย"
10097-400 = "ตั้งแต่ตอนที่อยู่ SRT...\nไม่สิ นานกว่านั้นหรือเปล่านะ?"
10097-410 = "ถ้าได้กลิ่นหอมแบบนี้\nฉันจะนึกถึงฤดูร้อนในอดีตน่ะ"
10097-420 = "จะว่าไปแล้ว มันน่าทึ่งจังเลยนะ"
10097-430 = "ควันนี้มีกลิ่นหอมแห่งความพินาศ\nที่ไล่พวกแมลงแท้ๆ"
10097-440 = "แต่สำหรับบางคน\nกลับเป็นกลิ่นอายที่น่ายินดี..."
10097-450 = "บางทีแล้วคนอาจจะ\nชอบความพินาศกันก็ได้นี่นะ\nฮิฮิฮิ..."
10097-460 = "คุณครู เขยิบเข้ามา\nทางนี้อีกนิดได้มั้ย?"
10097-470 = "ถ้ามีแมลงร้ายไปตอมคุณครู\nจะเป็นเรื่องใหญ่เอานะ..."
10097-480 = "คืนนี้เรามาอาบควันนี้\nให้เยอะๆ ไปเลย"
10097-2600 = "รับ RABBIT Type 224 Pistol\nมาเรียบร้อย จะว่าไป งานของฉัน\nไม่ต้องลงน้ำ แต่ต้องทำให้\nปืนกันน้ำด้วยเหรอ? ขี้เกียจจัง..."

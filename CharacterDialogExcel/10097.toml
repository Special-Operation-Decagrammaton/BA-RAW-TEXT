[translation]
10097-10 = "蔚藍檔案！"
10097-20 = "RABBIT3，抵達現場～\n咯嘻嘻……在海上的話，\n盡情使用炸彈也沒問題吧？"
10097-30 = "會不會有手榴彈\n掉在某個地方呢……"
10097-40 = "唉……累死我了……"
10097-50 = "有毀滅的氣味……"
10097-60 = "咯嘻嘻。\n這個按鈕，究竟\n會跟什麼連動呢……"
10097-70 = "咖啡廳的防火牆，\n怎麼莫名的堅固啊……"
10097-80 = "歡迎你，老師。\n今天要去把哪個\n海岸炸飛呢？"
10097-90 = "啊，我正在等待\n老師的指示。"
10097-100 = "為了隨時都能引爆，\n我已經設置了很多炸彈哦。"
10097-110 = "你說沒下達過那樣的指示……？"
10097-120 = "哎呀哎呀，有什麼關係嘛。\n咯嘻嘻……"
10097-130 = "這件泳裝，有點緊到\n會把皮膚吃進去呢……"
10097-140 = "不過，我就喜歡這樣……\n哈啊，哈啊……"
10097-150 = "游泳？當然會呀？"
10097-160 = "雖然我擔任報務員，\n也同樣是SRT的一員啊。"
10097-170 = "凝視著紺碧的大海，\n有時除了驚訝之外\n也會感受到恐懼對吧。"
10097-180 = "如果掉進那深不見底的\n深淵裡頭的話……"
10097-190 = "究竟會感受到\n多麼毀滅性的感覺呢……\n哈啊，哈啊……"
10097-200 = "唔唔，我肚子餓了……\n老師，你有帶什麼甜的東西嗎？"
10097-210 = "臭魚乾……吃太多了嗎……\n嘴裡的腥味揮之不去……"
10097-220 = "生日快樂，老師。"
10097-230 = "今年就不吹蠟燭，\n改吹炸彈的導火線怎麼樣？"
10097-240 = "肯定能成為難忘的\n回憶唷，咯嘻嘻……"
10097-250 = "想要的生日禮物？"
10097-260 = "唔嗯……服裝的修改券吧。"
10097-270 = "不然依照胸圍買的衣服，\n尺寸總是微妙地不太適合。\n像是下擺太短袖子太長之類的～"
10097-280 = "新年快樂，老師。\n今年也期待能獲得\n很多支援哦。呵呵……"
10097-290 = "老師，聖誕節有空的話\n就來兔寶寶公園吧。"
10097-300 = "我們計畫要舉辦一場烤肉派對。"
10097-310 = "巨大的火雞自不用說……\n我還準備了特製的臭魚乾哦。"
10097-320 = "咯嘻嘻……啊，當然這件事\n要向小隊的大家保密唷。"
10097-330 = "還想說怎麼那麼多鬼怪的變裝，\n已經到萬聖節了啊……"
10097-340 = "……嗯？\n你問我不怕鬼嗎？"
10097-350 = "怎麼會呢，我完全不怕。\n不就只是已經毀滅的存在嗎？"
10097-370 = "唔嗯，不管看幾次\n都覺得火力很弱……"
10097-380 = "算了，有在冒煙就行了吧。"
10097-390 = "總覺得……\n聞到這個味道，\n也是久違了呢。"
10097-400 = "還在SRT的時候……\n不對，可能是更久之前？"
10097-410 = "只要聞到這個味道，\n就會想起以前的夏天。"
10097-420 = "真是不可思議。"
10097-430 = "這明明是對蟲有害的\n毀滅氣味……"
10097-440 = "卻也能讓某些人\n感到懷念……"
10097-450 = "說不定人類，意外\n還挺喜歡毀滅的呢。\n咯嘻嘻……"
10097-460 = "老師，要不要\n再靠過來一點？"
10097-470 = "要是老師被壞蟲盯上\n就糟糕了……"
10097-480 = "今晚就用這個\n好好薰一薰吧。"
10097-2600 = "RABBIT-224式手槍，領取完畢。\n話說回來，我明明不會進到水裡，\n卻也非得做防水處理嗎？\n真麻煩……"

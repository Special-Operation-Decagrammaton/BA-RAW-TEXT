[translation]
10097-10 = "Blue Archive!"
10097-20 = "RABBIT 3, arrived at the site! Heeheehee... If it's at sea, I can drop as many bombs as I want, right?"
10097-30 = "I wonder if there's a grenade lying around somewhere..."
10097-40 = "Phew... I'm beat..."
10097-50 = "The smell of destruction..."
10097-60 = "Heeheehee... I wonder what this button is connected to..."
10097-70 = "This cafe's firewall is so solid, for no reason..."
10097-80 = "You're here, Sensei. So, which beach should we bomb today?"
10097-90 = "Ah, Sensei. On standby for orders."
10097-100 = "I've planted lots of bombs, so I can set them off at a moment's notice."
10097-110 = "You never gave those kinds of orders...?"
10097-120 = "Who cares? Good is good. Heeheehee..."
10097-130 = "This swimsuit is a bit too small, and it's so tight it actually hurts."
10097-140 = "But that's what I like about it... Hah. Haaa..."
10097-150 = "Swimming? Of course I know how."
10097-160 = "I might be an operator, but I'm an SRT member first."
10097-170 = "Sometimes, the deep sea evokes more fear in me than wonder."
10097-180 = "If I were to fall into that bottomless abyss..."
10097-190 = "...how overwhelming would the feeling of doom be...? Hah. Haaa..."
10097-200 = "Ugh, I'm hungry... You got any sweets, Sensei?"
10097-210 = "Maybe I had too much kusaya... The fishy taste just won't go away..."
10097-220 = "Happy birthday, Sensei."
10097-230 = "What do you think about lighting up a bomb instead of a candle for my birthday?"
10097-240 = "It'd be a rather stimulating memory. Heeheehee."
10097-250 = "Is there anything I want for my birthday?"
10097-260 = "Hm... Maybe some clothes alterations."
10097-270 = "When I try to buy clothes based on my chest size, the sleeves are always too long and the waist too short."
10097-280 = "Happy New Year, Sensei. I'll count on your generous support this year as well. Heehee..."
10097-290 = "Sensei, if it suits you, visit Kousagi Park this Christmas too."
10097-300 = "We're gonna host a barbecue party."
10097-310 = "Not only are we gonna have a huge turkey, but I'm also gonna serve some special kusaya."
10097-320 = "Ah, of course, you better keep it a secret from the other members."
10097-330 = "Ah, it's already Halloween. I thought I've been seeing ghost costumes around lately."
10097-340 = "...Hm? Am I not afraid of ghosts?"
10097-350 = "Ehhh. No way in hell. Those things are already dead, no?"
10097-370 = "Hmm... I really think we could use more firepower..."
10097-380 = "Well, there's smoke coming from it, so maybe it'll work."
10097-390 = "Come to think of it, it's been a while since I smelled this."
10097-400 = "When I was at SRT... Or...maybe even before that..."
10097-410 = "Whenever I smell this scent, it reminds me of a summer way back when."
10097-420 = "You know, it really is amazing."
10097-430 = "For bugs, this scent means death, but..."
10097-440 = "...to people, some people, it means nostalgia."
10097-450 = "Maybe all people are drawn to destruction, in a way. Heeheehee."
10097-460 = "Sensei, would you come over here a little closer?"
10097-470 = "I just don't want any of these bugs bothering you..."
10097-480 = "Let's both get this smoke all over us."
10097-2600 = "RABBIT Type 224 Pistol, acquired. Do I have to make this waterproof, when I'm not even gonna go in the water? What a pain..."

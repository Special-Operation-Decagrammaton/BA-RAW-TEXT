[translation]
10124-10 = "蔚藍檔案。"
10124-20 = "三一綜合學園，實現正義部成員……\n不，在這種場合，過度正式的問候似乎不太合適呢。\n我是羽川蓮實。再次請您多多指教。"
10124-30 = "這副打扮……\n果然很顯眼呢。"
10124-40 = "這個夏天一定要減肥……\n話雖如此，這裡的\n誘惑實在太多了……"
10124-50 = "適當的休息能\n提升工作效率，\n雖然我也明白這點……"
10124-60 = "在海邊吃什麼\n都覺得好吃……\n究竟是為什麼呢？"
10124-70 = "下次再來的時候，邀請\n社團裡的大家一起來吧。"
10124-80 = "老師，您辛苦了。"
10124-90 = "那麼，開始今天的工作吧。"
10124-100 = "休息完再做？\n不可以。"
10124-110 = "我想想……\n進行到一個段落後，\n我們去散散步吧。"
10124-120 = "因為覺得老師會來，\n所以我正在待命。"
10124-130 = "……沒錯，我一直等候著您。\n畢竟老師是個誠實的人，\n我認為您是不會違背約定的。"
10124-140 = "我也一樣……？"
10124-150 = "呵呵，是啊。\n或許真是如此呢。"
10124-160 = "您叫我嗎？"
10124-170 = "咦，可以更輕鬆一點……？"
10124-180 = "您交代了一件困難的事呢……"
10124-190 = "要休息的話，\n我可以準備茶哦。"
10124-200 = "雖然不到可以自滿的程度，\n但我還是有一定的知識的。"
10124-210 = "這樣的泳裝……"
10124-220 = "果然還是不太適合我吧……"
10124-230 = "咦？很可愛……？"
10124-240 = "老師又這樣……"
10124-250 = "大海是非常危險的。"
10124-260 = "因為水中活動\n會消耗大量熱量，\n很快就會肚子餓了。"
10124-270 = "大海、泳裝、夏天……"
10124-280 = "雖然身處非日常之中，\n但我是實現正義部的一員\n這點是不會改變的。"
10124-290 = "祝您生日快樂，老師。"
10124-300 = "平時總是我單方面受您照顧，\n卻從來沒能好好回報您呢。"
10124-310 = "難得有這個好機會，\n您有什麼想要的嗎？"
10124-320 = "生日……？"
10124-330 = "啊，這麼說來確實是呢。"
10124-340 = "……就算我忘記了，\n老師也依然記得。"
10124-350 = "這份體貼……\n非常令人開心。"
10124-360 = "真的很謝謝您。"
10124-370 = "祝您新年快樂，老師。"
10124-380 = "剛遇見老師的時候，\n我並沒有想到這股緣分\n會延續到現在。"
10124-390 = "而且，居然會以這副打扮\n和您一起度過新年……\n世事果然難以預料呢。"
10124-400 = "聖誕快樂。"
10124-410 = "老師，不介意的話，\n要不要一起去海邊呢？"
10124-420 = "在寒冷中游泳對健康很好哦。"
10124-430 = "這副打扮，\n似乎被當成變裝了。\n剛才來的路上，\n還被小朋友討糖果了。"
10124-440 = "……咦，連老師也！？\n那個，我現在身上\n沒有帶糖果……"
10124-460 = "咕……\n哼！唔唔唔……"
10124-470 = "穿，穿進去了！\n雖然只是勉勉強強……"
10124-480 = "但如您所見！"
10124-490 = "完全沒有！"
10124-500 = "任何問題！"
10124-510 = "只要再稍微瘦身一下，\n尺寸就剛剛好了！"
10124-520 = "沒問題的！\n泳裝就決定是這件了！"
10124-530 = "應該說，我就要這件……！"
10124-2600 = "自從加入實現正義部以來，\n我想守護的東西始終不曾改變。\n不過……在這段時間裡，\n我想守護的對象變得越來越多了。\n我以這把槍發誓──\n只要我還活著，就不容許任何人傷害老師。"

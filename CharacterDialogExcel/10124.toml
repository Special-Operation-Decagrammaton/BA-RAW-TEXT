[translation]
10124-10 = "Blue Archive."
10124-20 = "Trinity General School, Justice Task Force— That was too formal for a beach. It's Hanekawa Hasumi. I look forward to our continued collaboration."
10124-30 = "For some reason, this outfit...seems to attract too much attention."
10124-40 = "This is the summer I WILL lose weight...\nUm, there are so many temptations here, though..."
10124-50 = "Adequate rest improves work efficiency. I understand the concept, but the execution is always..."
10124-60 = "I wonder why ordinary foods look so much more appealing on the beach..."
10124-70 = "Perhaps I should bring the other members next time..."
10124-80 = "Oh, Sensei. You've arrived."
10124-90 = "Let's begin today's work."
10124-100 = "And once work is done..."
10124-110 = "...would you like to take a walk together?"
10124-120 = "I thought you would come, so I waited for you."
10124-130 = "Hm? Because you're very diligent, of course."
10124-140 = "...I am as well?"
10124-150 = "...You're right. Fufu. We may be rather alike."
10124-160 = "Did you call?"
10124-170 = "...Hm? Relax? "
10124-180 = "...That's a difficult request."
10124-190 = "Would you like a cup of tea on your break?"
10124-200 = "It's not something I boast about, but I do have a knack for brewing tea."
10124-210 = "A cute swimsuit like this..."
10124-220 = "...doesn't quite suit someone like me."
10124-230 = "What? It's cute on me...? "
10124-240 = "You're flattering me..."
10124-250 = "The beach is a dangerous place."
10124-260 = "It's easy to burn calories here, making you hungrier as well..."
10124-270 = "The beach, swimsuits, and summer..."
10124-280 = "Regardless, we can't let our guard down. No matter where we are, the Justice Task Force's duties come first."
10124-290 = "Happy birthday, Sensei."
10124-300 = "I've received so much from you, but I've never properly repaid you."
10124-310 = "Is there anything I can do for you?"
10124-320 = "My birthday...?"
10124-330 = "Ah. Now that you say it..."
10124-340 = "...Fufu, I forgot my own birthday..."
10124-350 = "...and yet, you continue to look after me."
10124-360 = "Thank you, truly."
10124-370 = "Happy New Year, Sensei."
10124-380 = "When I first met you, I never expected our relationship to come so far."
10124-390 = "A pleasant surprise. Fufu."
10124-400 = "Merry Christmas, Sensei."
10124-410 = "Given the opportunity, would you like to visit the beach during winter together?"
10124-420 = "...In a warmer outfit, of course."
10124-430 = "Um... Do I look properly excited for the festivities?"
10124-440 = "...Y-You too, Sensei?! I don't have any treats..."
10124-460 = "Hup... Huut! Ugh..."
10124-470 = "I-It fits! It's a little tight... However..."
10124-480 = "You can see with your own eyes..."
10124-490 = "...that it's completely fine!"
10124-500 = "I can wear it!"
10124-510 = "It just requires a little adjustment, and it's the perfect size!"
10124-520 = "I am perfectly calm! I would like this swimsuit!"
10124-530 = "In fact, I am going to wear just this!"
10124-2600 = "I first joined the Justice Task Force with a single mission in mind. Somewhere along the way, I gained so many more precious things I wanted to protect. So I vow to this gun that, as long as I am here, no harm will come your way, Sensei. I won't forgive anyone who tries."

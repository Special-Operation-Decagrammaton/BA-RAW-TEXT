[translation]
10124-10 = "블루 아카이브."
10124-20 = "트리니티 종합학원, 정의실현부……\n……아니요, 모처럼 바다인데 멋없는 인사를 했네요. \n하네카와 하스미입니다. 다시 한번 잘 부탁드립니다."
10124-30 = "어쩐지, \n이 모습은… \n너무 눈에 \n띄는 것 같네요."
10124-40 = "이번 여름에야말로\n체중 감량을……\n음, 여기는 유혹이\n너무 많군요."
10124-50 = "적절한 휴식은 일의\n능률을 향상시킨다.\n머리로는 알지만, \n항상 실천이…."
10124-60 = "평범한 음식들이\n바다에서는\n왜 그렇게\n매력적일까요…."
10124-70 = "다음번에는\n부원들을 데리고\n오는 것도……"
10124-80 = "아, 선생님. 오셨군요."
10124-90 = "오늘 업무를 시작하시죠."
10124-100 = "……그리고 일이 끝나면"
10124-110 = "함께 산책이라도 어떻습니까?"
10124-120 = "오실 줄 알고, \n대기하고 있었습니다."
10124-130 = "네? 그야, \n선생님은 성실하시니까요."
10124-140 = "……저도 마찬가지?"
10124-150 = "……그러네요. 후후.\n닮았을지도요."
10124-160 = "부르셨습니까?"
10124-170 = "……네? 긴장을 풀라? "
10124-180 = "……꽤 어려운 요구군요."
10124-190 = "휴식이라면\n잠깐 차라도 어떻습니까?"
10124-200 = "내세울 만큼은 아니지만,\n나름의 조예가 있는 편이라."
10124-210 = "이렇게 귀여운 수영복은……."
10124-220 = "저에게는 조금\n안 어울리는 디자인 같네요."
10124-230 = "네? 귀엽다니…… "
10124-240 = "그런, 과찬이십니다."
10124-250 = "바다는 몹시 위험합니다."
10124-260 = "열량이 빠르게 소모되어,\n쉽게 배고파지니까요."
10124-270 = "바다, 수영복, 여름……"
10124-280 = "그렇다 해도\n해이해질 수는 없는 법이죠.\n정의실현부는 언제 어디서나\n정의실현부이니까요."
10124-290 = "생일 축하드립니다,\n선생님."
10124-300 = "선생님께는\n많은 것을 받았지만, \n제대로 돌려드린 적이 없군요."
10124-310 = "제가 해드릴 수 있는 게\n있을까요?"
10124-320 = "생일이요……?"
10124-330 = "아. \n그러고 보니."
10124-340 = "……후후,\n정작 제가 생일을\n잊고 지내는데,"
10124-350 = "선생님께서는 항상 저를\n그렇게 챙겨주시는군요……"
10124-360 = "정말로,\n감사합니다."
10124-370 = "새해 복 많이 받으십시오,\n선생님."
10124-380 = "처음 선생님을 뵈었을 때는,\n이렇게 긴 인연이\n될 줄 몰랐는데……."
10124-390 = "기쁜 착오입니다, \n후후."
10124-400 = "메리 크리스마스입니다,\n선생님."
10124-410 = "기회가 된다면 함께\n겨울 바다에 가지 않겠습니까?"
10124-420 = "……물론, 조금 더 따뜻하게\n차려입고요."
10124-430 = "으음……\n저도 축제에 들떠 있는\n사람처럼 보이려나요?"
10124-440 = "……서, 선생님까지?!\n저, 과자는,\n갖고 있지 않은데요……."
10124-460 = "흣……\n후읏! 우으읏……."
10124-470 = "드, 들어갔습니다!\n아슬아슬…… 하지만……."
10124-480 = "보시다시피!"
10124-490 = "착용에는!"
10124-500 = "문제없습니다!"
10124-510 = "조금만 관리한다면,\n딱 맞는 사이즈이니까요……!"
10124-520 = "전 침착합니다!\n수영복은 이걸로 하겠습니다!"
10124-530 = "오히려, 이것만 입겠습니다……!"
10124-2600 = "처음 정의실현부에 들어올 때, 제게는 지키고자 하는 사명이 있었습니다. 하지만 언젠가부터, 점점 많은 것이 소중해져, 더 많은 것을 지키고 싶어졌습니다. 그러니까……. 이 총에 맹세합니다. 제가 있는 한, 누구도 선생님을 해치지 못한다고. 그 누구라도 용서하지 않겠다고."

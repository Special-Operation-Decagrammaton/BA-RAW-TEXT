[translation]
10124-10 = "Blue Archive"
10124-20 = "ชมรมทวงความยุติธรรม โรงเรียนสามัญทรีนิตี้...\nไม่สิ... ได้มาทะเลทั้งที แต่ทักทายไม่สนุกเอาเสียเลยนะคะ\nฉันฮาเนกาวะ ฮาสุมิค่ะ ขอฝากตัวอีกครั้งนะคะ"
10124-30 = "รู้สึกว่าฉันในชุดนี้...\nจะเตะตามาก\nเกินไปนะคะ"
10124-40 = "ฤดูร้อนปีนี้ต้อง\nลดน้ำหนักให้ได้...\nอืม ที่นี่มีของล่อตาล่อใจ\nเยอะจังเลยนะคะ"
10124-50 = "การพักผ่อนที่เหมาะสมทำให้\nทำงานได้มีประสิทธิภาพ\nฉันก็รู้ดีหรอกค่ะ\nแต่ฉันก็ทำงานตลอด..."
10124-60 = "อาหารธรรมดาๆ แต่ทำไม\nพออยู่ที่ทะเลถึงได้ดูน่าอร่อย\nแบบนี้ล่ะคะ..."
10124-70 = "ครั้งหน้าเห็นทีต้อง\nพาสมาชิกคนอื่น\nมาบ้างแล้ว..."
10124-80 = "อ๊ะ คุณครู มาแล้วเหรอคะ?"
10124-90 = "มาเริ่มงานของวันนี้เลยค่ะ"
10124-100 = "ไว้ถ้างานเสร็จแล้ว..."
10124-110 = "เราไปเดินเล่นด้วยกันมั้ยคะ?"
10124-120 = "ฉันรู้ว่าจะมา\nก็เลยกำลังรออยู่ค่ะ"
10124-130 = "คะ? ก็เพราะ\nคุณครูเป็นคนขยันนี่คะ"
10124-140 = "ฉันก็เหมือนกันเหรอ...?"
10124-150 = "นั่นสินะคะ... ฮุฮุ\nเราอาจจะเหมือนกันก็ได้ค่ะ"
10124-160 = "เรียกฉันเหรอคะ?"
10124-170 = "คะ...? ให้ฉันคลายความประหม่าลง? "
10124-180 = "เป็นคำขอที่ค่อนข้างยากเลยนะคะ..."
10124-190 = "ถ้าจะพักผ่อน\nจะดื่มชาสักถ้วยมั้ยคะ?"
10124-200 = "ถึงจะไม่น่าอวดนัก\nแต่ฉันก็พอเชี่ยวชาญนะคะ"
10124-210 = "ชุดว่ายน้ำน่ารักๆ แบบนี้..."
10124-220 = "มันดูเป็นดีไซน์ที่\nไม่ค่อยเข้ากับฉันเท่าไรนะคะ"
10124-230 = "คะ? น่ารักงั้นเหรอคะ... "
10124-240 = "ตายจริง ชมเกินไปแล้วค่ะ"
10124-250 = "ทะเลเป็นที่ที่อันตรายมากค่ะ"
10124-260 = "แคลอรี่จะเผาผลาญรวดเร็ว\nจนทำให้เราหิวง่ายน่ะค่ะ"
10124-270 = "ทะเล ชุดว่ายน้ำ ฤดูร้อน..."
10124-280 = "แต่ถึงยังไง\nฉันก็ผ่อนคลายไม่ได้หรอกค่ะ\nเพราะไม่ว่าที่ไหนเมื่อไร\nเราต้องเป็นชมรมทวงความยุติธรรมนี่คะ"
10124-290 = "สุขสันต์วันเกิดค่ะ\nคุณครู"
10124-300 = "ฉันได้รับอะไรมากมาย\nจากคุณครู แต่ไม่เคย\nตอบแทนอะไรจริงจังเลยนะคะ"
10124-310 = "พอมีอะไรที่ฉัน\nทำให้ได้บ้างมั้ยคะ?"
10124-320 = "วันเกิดเหรอคะ...?"
10124-330 = "อ่า จะว่าไปแล้ว"
10124-340 = "ฮุฮุ... ฉันลืมวันเกิด\nของตัวเองไปเสียได้"
10124-350 = "แต่คุณครูช่วยใส่ใจ\nฉันแบบนี้เสมอเลยสินะ..."
10124-360 = "ต้องขอบคุณ\nจริงๆ นะคะ"
10124-370 = "สวัสดีปีใหม่ค่ะ คุณครู"
10124-380 = "ตอนฉันพบคุณครูครั้งแรก\nฉันไม่คิดเลยค่ะว่า\nเราจะรู้จักกันนานขนาดนี้..."
10124-390 = "เป็นการคิดผิดที่น่ายินดีนะคะ\nฮุฮุ"
10124-400 = "เมอร์รีคริสต์มาสค่ะ\nคุณครู"
10124-410 = "ถ้ามีโอกาส เราไป\nทะเลฤดูหนาวกันมั้ยคะ?"
10124-420 = "แน่นอนว่าต้องแต่งตัว\nให้อบอุ่นกว่านี้ค่ะ..."
10124-430 = "อืม...\nฉันก็เหมือนคนที่ตื่นเต้น\nกับงานเทศกาลเหรอคะ?"
10124-440 = "คะ... คุณครูก็ด้วยเหรอ?!\nแต่ฉันไม่มี\nขนมติดตัวน่ะสิคะ..."
10124-460 = "ฮะ...\nฮึบบ! อึกก..."
10124-470 = "สะ... ใส่ได้แล้วค่ะ!\nถึงจะได้แบบ... หวุดหวิดก็เถอะ..."
10124-480 = "อย่างที่เห็นว่า!"
10124-490 = "ชุดนี้ใส่ได้!"
10124-500 = "ไม่มีปัญหาค่ะ!"
10124-510 = "แค่ฉันดูแลตัวเองอีกหน่อย\nไซซ์ก็จะพอดีเลยค่ะ...!"
10124-520 = "ฉันใจเย็นอยู่ค่ะ!\nฉันเอาชุดว่ายน้ำชุดนี้ค่ะ!"
10124-530 = "ฉันจะใส่แต่ชุดนี้เลยค่ะ...!"
10124-2600 = "ตอนเข้าชมรมทวงความยุติธรรมครั้งแรก ฉันมีสิ่งที่อยากปกป้องค่ะ แต่เมื่อถึงจุดหนึ่ง หลายๆ สิ่งก็สำคัญกับฉัน จนฉันอยากปกป้องมากขึ้นค่ะ เพราะงั้น... ฉันขอสาบานกับปืนนี้ค่ะ ตราบใดที่ฉันยังอยู่ที่นี่ จะไม่มีใครทำร้ายคุณครูได้ และไม่ว่าจะเป็นใคร ฉันจะไม่ให้อภัยทั้งนั้น"

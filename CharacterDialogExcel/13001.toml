[translation]
13001-20 = "อืม… แล้วตอนนี้\nจะต้องทำอะไรงั้นเหรอ?"
13001-30 = "เมื่อกี้นี้... ฝันรึเปล่านะ?"
13001-40 = "เหนื่อยจัง..."
13001-50 = "ถ้าพาคุณช้างเข้ามาในคาเฟ่..."
13001-60 = "หือ?"
13001-70 = "ฮ้าว..."
13001-80 = "มาแล้วเหรอคุณครู?\nอืม... นั่งได้ตามสบายเลย"
13001-90 = "ไม่ต้องสนใจฉันหรอก...\nทำงานต่อเถอะ"
13001-100 = "ท้องฟ้าสีสวยจัง"
13001-110 = "วิญญาณร้ายจงหายไป"
13001-120 = "คุณครู... ไม่กลับบ้านเหรอ?"
13001-130 = "ฉันลองแต่งกลอนไฮกุดูล่ะ\nคุณครูลองฟังหน่อยไหม?"
13001-140 = "มื้อกลางวันนี้ฉันกินไก่ทอดไป\nไก่ทอดนาโกย่าน่ะอร่อยที่สุด"
13001-150 = "สุขสันต์วันเกิดค่ะ คุณครู"
13001-160 = "ถ้าวันนี้เป็นวันเกิด..."
13001-170 = "หมายความว่าวันนี้\nเป็นวันที่คุณครูเกิดมาเหรอ?"
13001-180 = "วันนี้คือวันเกิดฉัน...?\nจริงเหรอ?"
13001-190 = "ฝันแรกในปีใหม่นี้...\nฉันฝันเห็นมะเขือเทศล่ะ..."
13001-200 = "ถือว่าเป็นฝันดีหรือเปล่านะ?"
13001-210 = "ลุงซานตาคลอสรู้ด้วยเหรอ\nว่าใครเป็นเด็กไม่ดี?"
13001-220 = "นั่นมัน... ภูตนามาฮาเกะไม่ใช่เหรอ?"
13001-230 = "อยากกินซุปฟักทองจัง..."
13001-250 = "เข้ามาสิ คุณครู ที่นี่\nเงียบสงบดี เหมาะจะ\nเป็นที่แต่งกลอนไฮกุ"
13001-260 = "วันนี้ได้อยู่กับคุณครูแบบนี้...\nฉันมีความสุขมากเลย"
13001-270 = "เพราะงั้นฉัน... รู้แล้วละ"
13001-280 = "กลอนไฮกุที่ฉันอยากจะแต่ง..."
13001-290 = "คงเป็นสิ่งที่อยู่ภายในใจ\nเหมือนกับที่รู้สึกในวันนี้"
13001-300 = "ถึงจะมืดแล้ว..."
13001-310 = "แต่ก็ยังรู้สึกอยู่ถึงตอนนี้เลย"
13001-320 = "เสียงฝีเท้าของเราสองคน"
13001-330 = "ถ้าอยู่กับคุณครูละก็...\nต่อจากนี้ไปไม่ว่าเมื่อไร"
13001-340 = "ก็คงจะแต่งกลอนไฮกุ\nได้แน่นอน"
13001-350 = "คราวหน้าก็มาเล่นด้วยกันใหม่นะ"
13001-360 = "อ๊ะ... คุณครูดูนั่นสิ"
13001-370 = "พระจันทร์สวยจริงๆ เลยนะ"
13001-380 = "สวยมากๆ เลย..."
13001-2600 = "นี่... ของฉันเหรอ?"

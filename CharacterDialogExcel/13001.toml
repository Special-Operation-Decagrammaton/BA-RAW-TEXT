[translation]
13001-20 = "那個…\n所以，現在要做什麼才好呢？"
13001-30 = "剛才的那個…\n是，夢嗎？"
13001-40 = "好懶…"
13001-50 = "為了在咖啡廳養大象要…"
13001-60 = "啊，哦哦？"
13001-70 = "呼──哈啊～呣…"
13001-80 = "老師，你來啦？\n嗯…隨便坐吧。"
13001-90 = "…不用在意我，\n繼續工作吧。"
13001-100 = "…天空好藍呢。"
13001-110 = "惡靈退散、惡靈退散。"
13001-120 = "老師…\n不回家嗎？"
13001-130 = "老師，我，\n試著寫了俳句…要聽嗎？"
13001-140 = "於午膳之時\n食炸雞天婦羅\n名古屋之食"
13001-150 = "生日快樂，老師。"
13001-160 = "今天是生日也就是說…"
13001-170 = "老師出生的日子，\n是今天？"
13001-180 = "今天是我的生日…？\n真的…？"
13001-190 = "新年初夢裡\n跑出了番茄…"
13001-200 = "這個，是好徵兆嗎？"
13001-210 = "聖誕老人，\n會知道誰是壞孩子嗎？"
13001-220 = "那個…\n不是生剝鬼嗎？"
13001-230 = "好想喝南瓜濃湯啊…"
13001-250 = "歡迎你，老師。\n這裡很安靜…\n要寫俳句的話\n很合適。"
13001-260 = "今天和老師在一起…\n真的很開心。"
13001-270 = "然後我，\n查覺到了。"
13001-280 = "我想寫的俳句，\n那就是…"
13001-290 = "注入今天一直感覺到的，\n這份心情的俳句。"
13001-300 = "逢魔時刻後"
13001-310 = "今者仍賡續"
13001-320 = "人聲成双"
13001-330 = "…感覺和老師一起的話，\n還能一直，"
13001-340 = "繼續吟詠下去。"
13001-350 = "下次也，\n可以陪我嗎？"
13001-360 = "啊…老師，你看。"
13001-370 = "月色，真美呢。"
13001-380 = "真的，好美…"
13001-2600 = "這個……是我的？"

[translation]
13001-20 = "으으음…\n그래서 지금부터 무얼 하면 된다고?"
13001-30 = "방금 그건… 꿈이었나?"
13001-40 = "나른해…"
13001-50 = "코끼리를 카페에 들여놓으려면…"
13001-60 = "으응?"
13001-70 = "하아암…"
13001-80 = "선생님, 왔어?\n응… 아무 데나 앉아."
13001-90 = "…난 신경 쓰지 마.\n하려던 일 계속해."
13001-100 = "…하늘이 파랗네."
13001-110 = "악령퇴산, 악령퇴산."
13001-120 = "선생님은… 집에 안 가?"
13001-130 = "선생님, 내가 하이쿠를\n지어봤는데…들어볼래?"
13001-140 = "점심밥으로\n닭튀김을 먹었다\n나고야 음식"
13001-150 = "생일 축하해, 선생님."
13001-160 = "오늘이 생일이라는 건…"
13001-170 = "선생님이 태어난 날이\n오늘이라는 건가?"
13001-180 = "오늘이 내 생일이라고…?\n정말…?"
13001-190 = "새해 첫 꿈에 토마토가 나왔는데…"
13001-200 = "이건 길몽인가?"
13001-210 = "산타클로스는 나쁜 어린이가\n누구인지 알고 있다고?"
13001-220 = "그거… 나마하게 아냐?"
13001-230 = "호박 수프가 먹고 싶네…"
13001-250 = "어서 와, 선생님.\n여기 조용해서…\n하이쿠 짓기에 딱 좋아"
13001-260 = "오늘 선생님과 같이 있어서…\n무척 즐거웠어."
13001-270 = "그래서 나, 깨달았어."
13001-280 = "내가 짓고 싶었던 하이쿠,\n그건…"
13001-290 = "오늘 계속 느꼈던\n이 마음을 담은 거라는 걸."
13001-300 = "날 저물어도"
13001-310 = "지금도 계속되네"
13001-320 = "둘의 발소리"
13001-330 = "…선생님과 함께라면,\n앞으로도 얼마든지-"
13001-340 = "하이쿠를 지을 수\n있을 것 같아."
13001-350 = "다음에도, 또 같이 하자?"
13001-360 = "아… 선생님 저기 봐봐."
13001-370 = "달이, 아름답네."
13001-380 = "정말, 아름다워…"
13001-2600 = "이거… 내 거야?"

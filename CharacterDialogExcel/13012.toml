[translation]
13012-10 = "Blue Archive!"
13012-20 = "คิริโนะจากสถาบันฝึกตำรวจวัลคิรี่ค่ะ!\nยกมือขึ้นและทำตามที่บอกด้วยค่ะ!"
13012-30 = "ที่นี่คงไม่มีพวกอาชญากร\nซ่อนอยู่หรอกใช่มั้ยคะ?"
13012-40 = "ของพวกนี้เอาเข้าไปในโรงเรียน\nไม่ผิดกฎหมายเหรอคะ...?"
13012-50 = "คนนั้น...หน้าคุ้นๆ จัง...\nหรือว่าเป็นอาชญากร\nที่มีประกาศจับ?"
13012-60 = "วันนี้ไม่มีเรื่องรายงาน\nเป็นพิเศษค่ะ!"
13012-70 = "วันนี้คิโวทอส\nก็เงียบสงบดีจังเลยนะคะ!"
13012-80 = "เชิญเลยค่ะคุณครู\nถ้าคุณครูไม่ว่าอะไร\nฉันจะออกไปลาดตระเวนค่ะ\nคุณครูจะไปด้วยกันมั้ยคะ?"
13012-90 = "เชิญค่ะคุณครู\nตอนที่มาเจอคนที่น่าสงสัย\nบ้างหรือเปล่าคะ?"
13012-100 = "คุณครูมีปัญหาอะไรกวนใจหรือเปล่าคะ...?"
13012-110 = "ฉันอยากจะช่วยเหลือ\nนักเรียนทุกคนในคิโวทอสค่ะ"
13012-120 = "แถวๆ นี้มีร้านอาหารอร่อยเยอะมาก\nฉันเลยตั้งตารอทุกครั้งที่ได้มา\nลาดตระเวนเลยค่ะ"
13012-130 = "นะ...แน่นอน ฉันไม่ได้จะ\nอู้เรื่องลาดตระเวนหรอกนะคะ!"
13012-140 = "วรรคที่สามของคำบอกสิทธิ์...\nเขียนไว้ว่ายังไงนะ?"
13012-150 = "สุขสันต์วันเกิดค่ะคุณครู\nถึงวันนี้จะเป็นวันเกิดคุณครู แต่ถ้าเกิดทำ\nผิดกฎขึ้นมา ฉันก็ไม่ละเว้นให้หรอกนะคะ"
13012-160 = "คุณครู...\nจำวันเกิดของฉันได้ด้วยงั้นเหรอ\nฉันซาบซึ้งมากเลยค่ะ คุณครู"
13012-170 = "ปีใหม่แล้วนะคะคุณครู\nเรามาพยายามเพื่อความปลอดภัย\nของคิโวทอสด้วยกันนะคะ!"
13012-180 = "การรักษาความปลอดภัยให้พลเมือง\nไม่มีวันหยุดหรอกนะคะ!"
13012-190 = "ถึงจะเป็นวันคริสต์มาส\nก็จะวางใจไม่ได้หรอกนะคะ!"
13012-200 = "อ๊ะ มีกลุ่มนักเรียน\nที่แต่งตัวไม่เรียบร้อย\nเดินไปมาบนถนน...!"
13012-220 = "(ทะ...ทำยังไงดีคะ?\nยะ...แย่แล้ว\nมันถอดไม่ออก...!)"
13012-230 = "คะ? ไม่ใช่นะคะ!\nจะ...เจ้าหน้าที่ตำรวจอย่างฉัน\nจะทำกุญแจหายได้ยังไงกันคะ!"
13012-240 = "เพราะงั้นนี่คือ..."
13012-250 = "การสาธิต...การฝึกหลบหนีค่ะ!\nในกรณีที่เกิดความผิดพลาด\nและเกิดถูกจับใส่กุญแจมือเข้า "
13012-260 = "ฉันจะสาธิตวิธีหลบหนี\nให้ทุกคนได้ดูค่ะ!"
13012-270 = "ไม่ต้องห่วงค่ะ! ถ้าเป็นตำรวจ\nที่ได้รับการฝึกมาอย่างดีเหมือน\nกับฉันละก็ แค่นี้ง่ายมากเลยค่ะ!"
13012-280 = "ฮึ่บบบ...!\nฮึ่บบบ...!"
13012-290 = "ขอโทษนะคะ...\nช่วยฉันด้วยค่ะ คุณครู..."
13012-2600 = "ถ้าใช้ปืนนี้ได้ชำนาญละก็...\nจะดีขนาดไหนกันนะ?"

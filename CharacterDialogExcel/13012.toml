[translation]
13012-10 = "블루 아카이브!"
13012-20 = "발키리 경찰학교의 키리노입니다!\n모두, 손을 들고 본관의 지시에 따라 주세요!"
13012-30 = "어디, 이곳에\n숨어있는 범죄자는\n없겠지요?"
13012-40 = "이런 건, 규정상으로\n세이프였던가요……?"
13012-50 = "저 사람, 어쩐지\n낯이 익은데…\n혹시 현상수배범?"
13012-60 = "오늘도 이상, 무!"
13012-70 = "오늘도 키보토스는\n평화롭군요!"
13012-80 = "어서 오세요, 선생님.\n괜찮으시다면, 곧바로\n순찰을 나가려고 했습니다만,\n함께 어떠신가요?"
13012-90 = "어서 오세요, 선생님.\n오시는 동안\n수상한 사람은 없었나요?"
13012-100 = "본관에게 무슨 문제라도……?"
13012-110 = "좀 더… 키보토스의\n학생들에게 도움이\n되고 싶습니다."
13012-120 = "이 근처에는 맛집이 많아서,\n순찰이나 당번으로 올 때마다\n매번 기대되네요."
13012-130 = "무, 물론 순찰을\n게을리한 건 아닙니다!"
13012-140 = "미란다 원칙의\n세 번째 조항이……\n뭐였더라?"
13012-150 = "생일 축하드립니다, 선생님.\n하지만 아무리 생일이라\n하더라도 규칙 위반은\n봐드릴 수 없어요?"
13012-160 = "제 생일을\n기억해주시다니…\n감격했습니다, 선생님."
13012-170 = "새해가 밝았습니다, 선생님.\n올해도 키보토스의\n치안을 위해 함께 노력하죠!"
13012-180 = "시민의 안전을\n지키는 일은 연중무휴!"
13012-190 = "크리스마스에도\n안심할 수는 없지요!"
13012-200 = "앗, 또 단정치 못한\n차림으로 거리를\n오가는 학생들이……!"
13012-220 = "(어, 어떻게 하죠…?\n으읏, 읏……!\n푸, 풀리지 않아……?!)"
13012-230 = "…네? 아뇨, 아뇨!\n다른 것도 아니고 경찰인 본관이\n열쇠를 잃어버릴 리가 없잖습니까!"
13012-240 = "그러니까 이건……"
13012-250 = "탈출 훈련의 시범입니다!\n불의의 사고로 수갑에\n묶였을 때를 대비하여,"
13012-260 = "본관이 직접 탈출하는\n시범을 보이겠습니다!"
13012-270 = "안심하시길! 본관처럼\n제대로 훈련을 받은 경찰이라면,\n이 정도는 간단하니까요!"
13012-280 = "으으읏……!\n으으으읏……!"
13012-290 = "……죄송합니다.\n도와주세요, 선생님……"
13012-2600 = "이 총에 어울릴 수 있도록,\n사격이 능숙해질 때까지\n정진하겠습니다…!"

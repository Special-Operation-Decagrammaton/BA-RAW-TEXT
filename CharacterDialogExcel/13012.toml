[translation]
13012-10 = "蔚藍檔案！"
13012-20 = "我是女武神警察學園的桐乃！\n請各位舉起雙手，服從本官的指示！"
13012-30 = "我看看，\n應該沒有犯罪者\n躲在這裡吧？"
13012-40 = "這種東西，在規定上\n是沒問題的嗎？"
13012-50 = "那個人，總覺得\n好像在哪裡看過……\n該不會是懸賞通緝犯？"
13012-60 = "今天也沒有異常！"
13012-70 = "今天的奇普托斯\n也相當和平！"
13012-80 = "歡迎回來，老師。\n可以的話，\n我想立刻出去巡邏，\n要不要和我一起去呢？"
13012-90 = "歡迎回來，老師。\n來的路上\n有沒有可疑的人物呢？"
13012-100 = "……？\n本官有什麼問題嗎……？"
13012-110 = "想要更能……\n成為奇普托斯\n學生們的力量。"
13012-120 = "這附近有很多美味的餐廳，\n讓我每次都很期待\n來這裡巡邏或當值日生。"
13012-130 = "當，當然，\n我沒有偷懶不巡邏哦！"
13012-140 = "米蘭達警告的第三項……\n是什麼來著？"
13012-150 = "生日快樂，老師。\n但是，即使是生日\n違反規定也是不可以的唷？"
13012-160 = "我的生日\n您居然記得……\n非常感激，老師！"
13012-170 = "新年快樂，老師。\n今年也一起\n為奇普托斯的治安努力吧！"
13012-180 = "守護市民安全\n是全年無休的！"
13012-190 = "即使是聖誕節\n也不能鬆懈！"
13012-200 = "啊，又有衣衫不整的\n學生走在街上……！"
13012-220 = "（怎，怎麼辦才好……！\n　呼嗯，嗯……！\n　打，打不開……！）"
13012-230 = "……咦？沒，沒有沒有！\n好歹也是隸屬於警察的本官，\n怎麼可能把鑰匙弄丟呢！"
13012-240 = "所，所以說，這只是……"
13012-250 = "在，在做逃脫訓練的演練而已！\n為了以防萬一發生意外的事態，\n而被拘束的時候……"
13012-260 = "從現在開始，本官要\n示範逃脫的方法！"
13012-270 = "請放心！\n只要是像本官這樣\n有確實累積訓練的人，\n這種程度輕而易舉！"
13012-280 = "咕唔唔唔……！\n呼呣呣呣呣呣呣……！"
13012-290 = "……對不起。\n請幫幫我，\n老師……"
13012-2600 = "為了能夠與這把槍相稱地\n熟練使用它，\n我會好好精進自己的……！"

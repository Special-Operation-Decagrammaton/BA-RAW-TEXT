[translation]
13012-10 = "Blue Archive!"
13012-20 = "Valkyrie Police School's Kirino, reporting for duty! Put your hands up and do as you're told!"
13012-30 = "Surely there aren't any culprits hiding around here...right?"
13012-40 = "I hope I'm not breaking any laws by being here..."
13012-50 = "That person looks familiar somehow. Could they be a wanted criminal?"
13012-60 = "Nothing to report!"
13012-70 = "Another peaceful day in Kivotos!"
13012-80 = "Welcome back, Sensei. Are you up for going on a patrol with me?"
13012-90 = "Welcome, Sensei. Run into persons of interest on the way?"
13012-100 = "Was there an issue you wanted to bring up with me?"
13012-110 = "All I want is to help Kivotos' students."
13012-120 = "I love doing the rounds in this neighborhood because there are so many delicious places to eat."
13012-130 = "B-But that doesn't mean that I'm slacking on my patrols!"
13012-140 = "You have the right to remain silent. You have the right to... Wait, what was the other thing you have a right to?"
13012-150 = "Happy Birthday, Sensei! But even if it's your birthday I won't look past any broken laws!"
13012-160 = "You remembered my birthday... How touching, Sensei."
13012-170 = "Happy New Year, Sensei. Let's work together for Kivotos' safety this year as well!"
13012-180 = "Ensuring the safety of citizens 24/7!"
13012-190 = "We can't let our guard down even on Christmas!"
13012-200 = "Ah, more students walking around with provocative attire!"
13012-220 = "(Wh-What should I do...? Hngh, hmph! It won't...come off?!)"
13012-230 = "H-Huh? No, no! An upstanding officer like me would never lose the key!"
13012-240 = "This is just a, uh..."
13012-250 = "It's an escape training demonstration! Just in case you find yourself wrongfully placed in handcuffs."
13012-260 = "Yours truly will show you how to escape!"
13012-270 = "Don't fret! I'm a trained police officer! This is nothing for someone like me!"
13012-280 = "Ghhhhhh! Ahhhhhh! *sigh*"
13012-290 = "What did I do to deserve this...? Please...save me Sensei..."
13012-2600 = "I'll devote myself to learning how to shoot this gun skillfully! I'll become worthy of it!"

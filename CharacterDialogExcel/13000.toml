[translation]
13000-10 = "블루 아카이브."
13000-20 = "최고의 봉사를 약속하며.\n주인님께 인사 올립니다."
13000-30 = "이 공간은 잘 청소되어 있군요.\n유능한 메이드가\n대기 중인 게 분명해요."
13000-40 = "다이어트라…\n한때 그런 걸\n고민하던 시절도\n있었죠. 후훗."
13000-50 = "어서 오세요.\n따뜻한 홍차 한 잔,\n준비해 드릴까요?"
13000-60 = "주인님, 선생님, 아니면… 달링?\n후훗.\n어떻게 불러드리는 걸\n더 좋아하실까요."
13000-70 = "어머. 이런 건… 제가 할 일인데…\n제가 더 기운이 나버렸잖아요.\n주.인.님"
13000-80 = "어서 오세요. 주인님.\n오늘도 고생 많으셨어요."
13000-90 = "차라도 한 잔 드시겠어요?\n마침 최고급 찻잎이\n들어왔답니다."
13000-100 = "네에~\n서류는 제가 정리해 두었답니다.\n맡겨주세요."
13000-110 = "원하시는 걸 말씀해 주세요.\n최고의 봉사로, 보답할게요."
13000-120 = "편지가 왔어요."
13000-130 = "어머, 귀여운 글씨네요."
13000-140 = "읽.어.드.릴.까.요?"
13000-150 = "우아하지 못한 부탁일지도 몰라요.\n하지만, 주인님."
13000-160 = "앞으로도 아카네를 불러주세요."
13000-170 = "생일 축하드립니다. 주인님."
13000-180 = "주인님이 이곳에 와주셔서…"
13000-190 = "…기뻐요."
13000-200 = "탄생은, 축복이에요."
13000-210 = "주인님과 만난 그 순간부터,\n저는 늘 그 사실에 감사했답니다."
13000-220 = "새해 복 많~~이 받으세요."
13000-230 = "올 한 해도, 잘 부탁드립니다.\n주인님!"
13000-240 = "메리 크리스마스~"
13000-250 = "제 선물은 최고의\n봉사와 미소랍니다."
13000-260 = "선생님의 선물은 뭔가요?"
13000-270 = "자아. 사탕을 주지 않으면,\n장난을 칠 거에요~?"
13000-280 = "전 장난이 더 좋지만요."
13000-300 = "어머. 돌아오셨군요."
13000-310 = "오늘 하루는 어떠셨나요?"
13000-320 = "아, 주인님.\n마침 최고급 찻잎이 들어왔답니다."
13000-330 = "제가 한 잔 준비해드릴까요?"
13000-340 = "네?\n여긴 우리들의 집이 아니라고요?"
13000-350 = "후훗.\n상관 없어요."
13000-360 = "우리들의 집은 아니지만,\n우리는 지금 함께 있으니까요."
13000-2600 = "기대 받는다는 건, 이토록 설레는 일이었군요.\n아카네는, 주인님께 최고의 봉사로 보답하겠습니다."

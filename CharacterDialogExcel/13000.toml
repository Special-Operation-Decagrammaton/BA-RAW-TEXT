[translation]
13000-10 = "Blue Archive"
13000-20 = "สวัสดีค่ะ นายท่าน\nฉันสัญญาว่าจะรับใช้นายท่านให้ดีที่สุดค่ะ"
13000-30 = "ที่นี่ทำความสะอาดได้ดีเลย\nนะคะ เห็นได้ชัดว่ามีเมดสาว\nคอยดูแลอยู่ตลอดสินะคะ"
13000-40 = "บางครั้ง... ฉันก็เคยกังวล\nเรื่องการไดเอตอยู่\nเหมือนกันค่ะ ฮุฮุ"
13000-50 = "เชิญเลยค่ะ\nฉันไปชงชาร้อนให้สักแก้ว\nดีมั้ยคะ?"
13000-60 = "นายท่าน คุณครู หรือว่า...\nที่รัก? ฮุฮุ ฉันควรจะเรียก\nแบบไหนดีคะ"
13000-70 = "โอ๊ะ เรื่องแบบนี้... เป็นหน้าที่\nของฉันอยู่แล้วค่ะ ฉันมีแรงฮึด\nขึ้นมาแล้วค่ะ นายท่าน~"
13000-80 = "เชิญเลยค่ะ นายท่าน\nวันนี้ก็ขอบคุณมากนะคะ"
13000-90 = "ดื่มชาสักแก้วหน่อยมั้ยคะ?\nฉันเพิ่งได้ใบชาชั้นดีมาเลยล่ะค่ะ"
13000-100 = "คะ~?\nฉันจัดการเอกสารไว้เรียบร้อยแล้วค่ะ\nไว้ใจได้เลยค่ะ"
13000-110 = "ต้องการอะไรบอกได้เลยนะคะ\nฉันจะตอบแทนด้วยการดูแล\nนายท่านให้ดีที่สุดค่ะ"
13000-120 = "มีจดหมายมาค่ะ"
13000-130 = "โอ๊ะ ลายมือน่ารักมากเลยค่ะ"
13000-140 = "ฉันอ่านให้ฟังดีมั้ยคะ?"
13000-150 = "อาจเป็นคำขอที่ไม่ได้ยิ่งใหญ่อะไรนัก\nแต่ว่า... นายท่านคะ"
13000-160 = "ต่อไป ช่วยเรียกฉันว่า\n\"อาคาเนะ\" ด้วยนะคะ"
13000-170 = "สุขสันต์วันเกิดนะคะ นายท่าน"
13000-180 = "นายท่านมาที่นี่..."
13000-190 = "ฉันดีใจมากเลยค่ะ..."
13000-200 = "การเกิดถือเป็นพรอันประเสริฐนะคะ"
13000-210 = "ตั้งแต่นาทีที่ได้พบกับนายท่าน\nฉันก็ขอบคุณฟ้าที่ทำให้เรา\nได้พบกันมาตลอดเลยค่ะ"
13000-220 = "ขอให้มีความสุขมากๆ~ ในวันปีใหม่นะคะ"
13000-230 = "ปีนี้ก็ขอฝากตัวด้วยนะคะ\nนายท่าน!"
13000-240 = "เมอร์รี คริสต์มาส~"
13000-250 = "ของขวัญที่ดีที่สุดของฉัน\nคือการดูแลที่ดีที่สุด\nและรอยยิ้มของฉันค่ะ"
13000-260 = "ของขวัญของคุณครูคืออะไรเหรอคะ?"
13000-270 = "เอาล่ะค่ะ ถ้าไม่ให้ลูกอมฉัน\nฉันจะหลอกคุณครูแล้วนะคะ~"
13000-280 = "ฉันเองก็ชอบเล่นสนุกเหมือนกันนะคะ"
13000-300 = "อุ๊ย กลับมาแล้วเหรอคะ"
13000-310 = "วันนี้เป็นยังไงบ้างคะ?"
13000-320 = "จริงสิ นายท่านคะ\nฉันเพิ่งได้ใบชาชั้นดีมาค่ะ"
13000-330 = "ฉันเตรียมชาให้ดีมั้ยคะ?"
13000-340 = "คะ? ที่นี่ไม่ใช่\nบ้านของเรางั้นเหรอคะ?"
13000-350 = "ฮุฮุ ไม่เป็นไรหรอกค่ะ"
13000-360 = "ถึงจะไม่ใช่ที่บ้านของเรา\nแต่ว่าตอนนี้เราก็อยู่ด้วยกันแล้วนี่คะ"
13000-2600 = "การได้รับความคาดหวัง\nเพียงแค่คิดก็ตื่นเต้นแล้วค่ะ\nอาคาเนะจะตอบแทนนายท่าน\nด้วยการรับใช้อย่างดีเลยค่ะ"

[translation]
13000-10 = "蔚藍檔案。"
13000-20 = "我保證提供最佳服務，\n在此向主人請安。"
13000-30 = "這空間清掃得很乾淨。\n一定是有能幹的女僕\n在待命中。"
13000-40 = "減肥啊…\n我有一段時間\n為了減肥的事\n傷透腦筋呢。呼呼。"
13000-50 = "歡迎。\n要不要為您準備一杯\n熱騰騰的紅茶？"
13000-60 = "主人、老師，還是…達令？\n呵呵。\n您比較喜歡我\n怎麼稱呼您呢？"
13000-70 = "哎呀。這……明明\n是我該做的事才對……\n我又更有幹勁了唷。\n主．人。"
13000-80 = "歡迎回來，主人。\n您今天也辛苦了。"
13000-90 = "要不要喝杯茶？\n我正好收到了\n最高級的茶葉。"
13000-100 = "是。\n文件我已經整理好了。\n請交給我。"
13000-110 = "有什麼需要請告訴我。\n我會用最好的服務回應您。"
13000-120 = "信來了。"
13000-130 = "天啊，字寫得好可愛。"
13000-140 = "要．唸．給．\n您．聽．嗎？"
13000-150 = "也許這不是優雅的請求。\n但是，主人。"
13000-160 = "以後有事請找朱音喔。"
13000-170 = "祝您生日快樂。主人。"
13000-180 = "主人來到這裡… "
13000-190 = "…我很開心。"
13000-200 = "誕生，即是祝福。"
13000-210 = "從遇到主人的那一瞬間起，\n我就一直對此心存感謝。"
13000-220 = "恭祝新年快樂～～"
13000-230 = "今年也請多多指教。\n主人！"
13000-240 = "聖誕快樂～"
13000-250 = "我的禮物是最棒的\n服務和微笑。"
13000-260 = "老師的禮物是什麼呢？"
13000-270 = "好，如果不給我糖果，\n那我只好搗蛋囉～？"
13000-280 = "我更喜歡搗蛋呢。"
13000-300 = "哎呀。歡迎回來。"
13000-310 = "今天一天，過得如何呀？"
13000-320 = "啊，主人。正巧，\n用最高級茶葉泡的茶已經泡好了唷。"
13000-330 = "讓我為您準備一杯，\n如何呢？"
13000-340 = "哎？\n這裡不是我們家？"
13000-350 = "呵呵。\n不用在意。"
13000-360 = "就算這不是我們家，\n但我們現在，\n就在一起呀。"
13000-2600 = "原來別人對我有所期待\n是這麼令人激動的事。\n朱音一定會用最好的\n服務來報答主人的。"

[translation]
13000-10 = "Blue Archive."
13000-20 = "My fondest greetings to you, Master. I pledge to give you only the best service."
13000-30 = "This room has been kept in perfect order. A very competent maid must work here."
13000-40 = "Dieting... I do recall a time when I was concerned with such things. Haha."
13000-50 = "Welcome. Could I interest you in a cup of black tea?"
13000-60 = "Master, Sensei, or...Darling? Haha. I wonder how you would prefer to be addressed."
13000-70 = "My. I should be the one...doing this for you. Instead, you're the one who cheered me up, Master."
13000-80 = "Welcome, Master. You did well today."
13000-90 = "Would you be interested in a cup of tea? I happen to have a few leaves of the highest quality on hand."
13000-100 = "Yes. I've already sorted the documents. You can entrust this to me."
13000-110 = "You can tell me any wish you may have. I will serve you to the best of my ability."
13000-120 = "There's a letter for you."
13000-130 = "Oh, my. What lovely handwriting."
13000-140 = "Should. I. Read. It. For. You?"
13000-150 = "This may be an inelegant request. But, Master..."
13000-160 = "...please call me Akane from now on."
13000-170 = "Happy birthday, Master."
13000-180 = "I'm glad..."
13000-190 = "...that you came into this world, Master."
13000-200 = "It is a blessing to have been given life."
13000-210 = "I have been grateful for that since the moment I met you, Master."
13000-220 = "Happy New Year to you."
13000-230 = "I hope you'll need me again this year, Master!"
13000-240 = "Merry Christmas!"
13000-250 = "I come bearing the gifts of top-class service and a professional smile."
13000-260 = "What gifts have you brought me, Sensei?"
13000-270 = "I think the rule is that if I don't get a treat, then I get to trick you!"
13000-280 = "...Which sounds preferable to me."
13000-300 = "Oh, you're home."
13000-310 = "How was your day?"
13000-320 = "Oh, Master. We just received some of the highest quality tea leaves."
13000-330 = "Shall I pour you a cup?"
13000-340 = "What's that? This isn't our home?"
13000-350 = "Haha. Don't be silly."
13000-360 = "Where our home is doesn't matter...so long as we're together now."
13000-2600 = "To be someone others look forward to seeing is so exciting. I, Akane, will pay this back with my best service, Master."

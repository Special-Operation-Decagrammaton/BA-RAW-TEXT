[translation]
20030-10 = "블루 아카이브"
20030-20 = "운동… 그리고 식욕의 계절! 그야말로 미식의 제전…\n이 절호의 기회, 만끽할 수밖에 없겠네요."
20030-30 = "자아, 미식을 위한\n탐험을 떠나도록 하죠."
20030-40 = "그러면, 어떤 곳부터\n가 보도록 할까요…?"
20030-50 = "식사란, 지고의 행위."
20030-60 = "운동효과를 높이기\n위해서라도, 제대로 된\n식사는 필수적이랍니다."
20030-70 = "휴식이 끝나면, 노점\n탐방을 떠나 볼까요?"
20030-80 = "어서 오세요, 선생님."
20030-90 = "오늘의 일정을\n여쭈어보아도 될까요?"
20030-100 = "저를 이렇게 기다리게 하시다니…"
20030-110 = "하지만, 선생님이라면…\n저, 얼마든지 기다릴 수 있답니다.\n후후."
20030-120 = "모처럼의 체육복이기도 하고…\n경기에 참가하고 싶은\n마음도 있습니다만…"
20030-130 = "경기에 나가고, 응원하고,\n맛있는 것을 먹는다…"
20030-140 = "참으로 완벽한 순환이네요."
20030-150 = "몸이 가벼워진 듯한 이 감각…"
20030-160 = "체육복이란, 좋은 것이군요."
20030-170 = "평소보다, 마음에 여유가\n생긴 것 같은 기분이 드네요."
20030-180 = "이 복장 덕분일까요?\n그도 아니면 선생님의…?"
20030-190 = "후후…"
20030-200 = "선생님. 이다음에, 잠시\n시간을 내어 주시겠어요?"
20030-210 = "최고의 노점으로\n안내해 드리겠습니다."
20030-220 = "네, 물론 기억하고 있습니다."
20030-230 = "오늘은, 선생님의 생일."
20030-240 = "옷차림도 가볍고\n움직이기도 편하니…\n함께 외출하는 것은,\n어떠신가요?"
20030-250 = "제 생일을 축하해 주시다니…"
20030-260 = "감사합니다.\n선물은, 이미 받았다고\n생각했습니다만…"
20030-270 = "흔치 않은 기회이니까요,\n욕심을 하나만 부려 볼까요."
20030-280 = "괜찮으시다면…\n제 노점 탐방에 함께 해 주세요."
20030-290 = "새해 복 많이 받으세요, 선생님."
20030-300 = "새로운 한 해의\n기념해야 할 시작의 날…"
20030-310 = "매력적인 노점 음식을,\n가득 즐길 수 있는\n시기이기도 하죠."
20030-320 = "자아, 그러면 나가 볼까요."
20030-330 = "크리스마스를 함께 보낸다…\n후후. 멋진 이야기네요."
20030-340 = "선생님과 함께하는\n식탁에 어울릴 만한\n요리를 가져왔답니다."
20030-350 = "자아, 같이 드실까요."
20030-360 = "이 복장… 할로윈의 가장이라고\n생각되고 있는 것 같습니다만…"
20030-370 = "그 때, 근처 노점에서\n호박 스낵을 발견했답니다."
20030-380 = "같이 가지 않으시겠어요?"
20030-400 = "가슴 뛰는, 맛있는 경기였습니다."
20030-410 = "얼굴은 조금 지저분해졌지만…"
20030-420 = "그러나, 미지의 영역이라고\n할 수 있는 밀가루 속에서."
20030-430 = "자신의 감각만으로\n사탕을 찾아내는 행위는…"
20030-440 = "미식을 탐구하는 과정과,\n어딘지 모르게 닮은 것 같아…"
20030-450 = "매우 신선했답니다."
20030-460 = "아, 그래요!"
20030-470 = "선생님. 어떠신가요?"
20030-480 = "조금 전 받은 이 사탕…\n선생님께 나누어 드릴까요?"
20030-2600 = "저도 모든 힘을 다하겠습니다.\n이렇게 관심을 가져 주시는,\n선생님을 위해서라도요."

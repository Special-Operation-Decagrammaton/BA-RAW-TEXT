[translation]
20030-10 = "蔚藍檔案"
20030-20 = "運動……以及食慾的季節！簡直是美食的祭典……\n這絕好的機會，只能盡情享受了。"
20030-30 = "來，盡情享受\n美食的探險吧。"
20030-40 = "那麼，要先去\n什麼地方呢…？"
20030-50 = "吃飯，是至高無上的行為。"
20030-60 = "為了提高運動效果，\n正常均衡的飲食\n也是不可或缺的。"
20030-70 = "如果休息完了，\n要不要去\n逛逛小吃攤呀？"
20030-80 = "歡迎回來，老師。"
20030-90 = "能請教老師\n今天的行程嗎？"
20030-100 = "竟然讓我等這麼久……"
20030-110 = "不過，如果是老師……\n我要等多久都沒問題。\n呵呵。"
20030-120 = "難得穿上體育服……\n有種想參加\n比賽的心情呢……"
20030-130 = "參加比賽，為別人加油，\n吃好吃的東西……"
20030-140 = "真是完美的循環呢。"
20030-150 = "身體似乎變輕盈的\n這股感覺……"
20030-160 = "所謂的體育服，真是好東西呢。"
20030-170 = "與平時相比，心情\n似乎更加從容了。"
20030-180 = "是因為這套服裝嗎？\n還是因為老師……？"
20030-190 = "呵呵……"
20030-200 = "老師，在這之後，\n可以占用一點時間嗎？"
20030-210 = "我會帶您去\n最棒的小吃攤。"
20030-220 = "是，我當然記得。"
20030-230 = "今天，是老師的生日。"
20030-240 = "穿著輕便又容易活動……\n一起出個遠門之類的，\n您覺得如何呢？"
20030-250 = "您居然會慶祝\n我的生日……"
20030-260 = "非常感謝。\n儘管禮物\n已經收到……"
20030-270 = "不過機會難得，\n我有個任性的請求。"
20030-280 = "您願意的話……\n請跟我一起\n逛小吃攤。"
20030-290 = "新年快樂，老師。"
20030-300 = "新年值得紀念的\n第一天……"
20030-310 = "也是能盡情享受\n迷人攤販料理的\n時期。"
20030-320 = "來，那麼就一起\n出門看看吧。"
20030-330 = "一起度過聖誕節……\n呵呵，聽起來真棒呢。"
20030-340 = "我帶來了適合\n和老師一起在\n餐桌上共享的料理。"
20030-350 = "來，一起享用吧。"
20030-360 = "這套服裝……\n好像被當成\n萬聖節的扮裝了……"
20030-370 = "那時，我在附近的小吃攤\n發現了南瓜點心。"
20030-380 = "要不要一起去呢？"
20030-400 = "是場令人心跳不已、\n美味的比賽呢。"
20030-410 = "雖然臉變得有點髒……"
20030-420 = "不過，在可說是\n未知領域的麵粉中，"
20030-430 = "只憑自己的感覺\n找出糖果的行為……"
20030-440 = "和探求美食的過程，\n似乎在某些方面有點類似……"
20030-450 = "感覺非常新鮮。"
20030-460 = "啊，對了！"
20030-470 = "老師，您覺得如何呢？"
20030-480 = "剛才得到的這顆糖果……\n要不要分給老師您呀？"
20030-2600 = "我也使出全力吧。\n這也是為了\n如此關心我的老師。"

[translation]
20030-10 = "Blue Archive"
20030-20 = "การออกกำลังกาย... และฤดูกาลแห่งอาหาร! มหกรรมของอร่อย...\nคงต้องไปร่วมเพลิดเพลินกับช่วงเวลาที่หายากแบบนี้แล้วละค่ะ"
20030-30 = "เอาละ ออกเดินทางไปค้นหา\nอาหารรสเลิศกันเถอะค่ะ"
20030-40 = "ถ้างั้นเราจะเริ่มต้น\nจากที่ไหนกันดีคะ...?"
20030-50 = "การกินอาหาร...\nเป็นการกระทำ\nที่ประเสิรฐที่สุด"
20030-60 = "การกินอาหารให้เหมาะสม\nเป็นสิ่งจำเป็นในการเพิ่ม\nประสิทธิภาพการออกกำลังกายค่ะ"
20030-70 = "ถ้าพักเสร็จแล้ว เราไปสำรวจ\nร้านแผงลอยกันมั้ยคะ?"
20030-80 = "เชิญเลยค่ะ คุณครู"
20030-90 = "ฉันขอทราบตารางงานวันนี้\nได้หรือเปล่าคะ?"
20030-100 = "คุณครูทำให้ฉัน\nต้องรอนานขนาดนี้..."
20030-110 = "แต่ว่าถ้าเป็นคุณครูละก็...\nไม่ว่าจะนานแค่ไหน\nฉันก็รอได้ค่ะ ฮุฮุ"
20030-120 = "นานๆ ทีจะได้ใส่ชุดพละ\nสักหน ก็เลยรู้สึก\nอยากลงแข่งกีฬาด้วยค่ะ..."
20030-130 = "ลงแข่งกีฬา... ไปร่วมเชียร์\nแล้วก็ไปกินอาหารอร่อยๆ..."
20030-140 = "เป็นการเปลี่ยนบรรยากาศ\nที่สมบูรณ์แบบดีนะคะ"
20030-150 = "ความรู้สึกเหมือนร่างกาย\nเบาสบายขึ้น..."
20030-160 = "ชุดพละนี่\nดีจริงๆ เลยค่ะ"
20030-170 = "รู้สึกเหมือนสบายใจขึ้น\nมากกว่าทุกทีๆ เลยละค่ะ"
20030-180 = "เป็นเพราะใส่ชุดนี้หรือเปล่าคะ?\nถ้าไม่งั้นก็เป็นเพราะคุณครู...?"
20030-190 = "ฮุฮุ..."
20030-200 = "คุณครูคะ หลังจากนี้\nขอเวลาให้ฉันหน่อย\nได้หรือเปล่าคะ?"
20030-210 = "ฉันจะพาคุณครูไปค้นหา\nสุดยอดร้านแผงลอยเองค่ะ"
20030-220 = "ค่ะ ฉันจำได้ดีเลยค่ะ"
20030-230 = "ว่าวันนี้เป็นวันเกิดของคุณครู"
20030-240 = "วันนี้สวมชุดสบายๆ\nเหมาะกับการเคลื่อนไหวมาแล้ว...\nเพราะงั้นวันนี้เราออกไป\nข้างนอกกันดีมั้ยคะ?"
20030-250 = "คุณครูอวยพรวันเกิดให้ฉันแบบนี้..."
20030-260 = "ขอบคุณมากค่ะ ฉันคิดว่า\nฉันได้รับของขวัญมา\nเรียบร้อยแล้วละค่ะ..."
20030-270 = "แต่โอกาสแบบนี้ไม่ได้มีบ่อยๆ นี่คะ\nฉันขอโลภมากขึ้นอีกสักหน่อย\nจะได้มั้ยคะ"
20030-280 = "ถ้าสะดวกละก็มาร่วมสำรวจ\nร้านแผงลอยด้วยกันกับฉันนะคะ"
20030-290 = "ขอให้มีความสุขในวันปีใหม่นะคะ\nคุณครู"
20030-300 = "วันที่เฉลิมฉลองการเริ่มต้น\nของปีใหม่ที่มาเยือน..."
20030-310 = "เป็นช่วงเวลาที่จะได้เพลิดเพลิน\nกับอาหารแผงลอยที่น่าสนใจ\nด้วยนะคะ"
20030-320 = "เอาละค่ะ ถ้างั้นไปกันเลยมั้ยคะ"
20030-330 = "ได้ฉลองคริสต์มาสร่วมกัน...\nฮุฮุ เป็นเรื่องราวที่ยอดเยี่ยม\nมากเลยนะคะ"
20030-340 = "ฉันเตรียมอาหารที่เหมาะกับ\nการรับประทานร่วมกัน\nกับคุณครูมาด้วยนะคะ"
20030-350 = "เอาละค่ะ\nเรามาทานด้วยกันเลยดีมั้ยคะ"
20030-360 = "ฉันคิดว่าชุดนี้เหมาะกับ\nฮาโลวีนที่สุดแล้วค่ะ..."
20030-370 = "เมื่อกี้ ฉันเจอขนมฟักทอง\nที่ร้านแผงลอยใกล้ๆ นี่ด้วยค่ะ"
20030-380 = "ไปดูด้วยกันมั้ยคะ?"
20030-400 = "เป็นการแข่งขันแสนอร่อย\nที่ทำให้ใจเต้นแรงมากเลยค่ะ"
20030-410 = "ถึงหน้าจะเปื้อนนิดหน่อย..."
20030-420 = "แต่ว่า... ในถาดแป้งที่ไม่มีทางรู้\nว่าอะไรอยู่ตรงไหนแบบนี้"
20030-430 = "การใช้ประสาทสัมผัส\nของตัวเองเพื่อค้นหา\nลูกอม"
20030-440 = "มันดูคล้ายกันกับเส้นทางแห่งการ\nค้นหาอาหารเลิศรสเหมือนกันค่ะ..."
20030-450 = "รู้สึกสดชื่นมากๆ เลยค่ะ"
20030-460 = "อ๊ะ จริงด้วยค่ะ!"
20030-470 = "คุณครู เอาอย่างนี้มั้ยคะ?"
20030-480 = "ลูกอมที่ได้มาเมื่อกี้...\nฉันแบ่งให้คุณครูเอามั้ยคะ?"
20030-2600 = "ฉันจะทุ่มเทสุดความสามารถค่ะ\nเพื่อทำประโยชน์ให้กับคุณครู\nตอบแทนที่ให้ความสนใจฉันเช่นนี้ค่ะ"

[translation]
20000-20 = "我預測是這個時候，所以一直等著。\n等著老師叫我名字的……這個瞬間。"
20000-30 = "「如果再給我一點時間和預算…？」\n這只不過是自己\n能力不足的藉口而已。"
20000-40 = "在規定的時間和預算內\n做出最好的結果。\n那才是所謂的巨匠。"
20000-50 = "在這裡立個老師的銅像怎麼樣？\n可以做得讓手腳的關節能夠活動唷。"
20000-60 = "嗯…在內部的幾個項目中\n發現了修理和改善事項…\n咦？不能修理嗎？"
20000-70 = "老師想要的話，可以\n幫你設置一個能夠讓\n進來的人嚇一跳的陷阱哦。\n嗯？不行嗎？"
20000-80 = "你好呀，老師。\n我把今天的任務清單\n放在桌上了。\n希望你確認一下。"
20000-90 = "嗯…我認為現在\n老師的任務執行情況\n有點沒效率。"
20000-100 = "我再找找更好的方法。"
20000-110 = "像這樣和老師在一起…\n呵呵…真開心。"
20000-120 = "老師，怎麼樣？\n我的裝備們…\n有派上用場嗎？"
20000-130 = "你問我製作有用的東西\n開不開心嗎？\n雖然是這樣沒錯…"
20000-140 = "不過這不是興趣，\n而是我的生活哦。"
20000-150 = "我喜歡維修。\n當死去的機械心臟\n再次開始跳動時，"
20000-160 = "那種實現了某種事的感覺，\n我非常熱愛。"
20000-170 = "（老師的笑容…\n是我最棒的動力。）"
20000-180 = "生日快樂，老師。\n老師的出生，還有\n來到我們身邊…\n都讓我很開心。"
20000-190 = "想要收到的禮物是嗎？\n沒有。"
20000-200 = "…因為已經得到很多了。"
20000-210 = "新年快樂。\n今年會讓你看到\n更加改善和進步的我哦…"
20000-220 = "聖誕老人\n如果想在一個晚上之內\n發禮物給奇普托斯\n的孩子們的話…"
20000-230 = "他的麋鹿至少\n要能有4馬赫以上的速度才行。"
20000-240 = "萬聖節啊…\n雖然是跟科學無關的日子，\n卻是個讓人興奮的\n不可思議的節日呢。"
20000-260 = "謝謝，老師。\n多虧老師，\n才能守護住這個風景。"
20000-270 = "很漂亮吧？\n幸好能趕得上時間。"
20000-280 = "嗯？你問我為什麼要…\n這麼努力嗎？"
20000-290 = "因為我想讓千年的學生們\n可以安全的\n走在閃耀的夜晚街道上。"
20000-300 = "我能做的事…\n只有這些。"
20000-310 = "而且對我來說…\n這瞬間就已經\n比「禮物」還要珍貴了。"
20000-320 = "怎麼樣呀，老師？\n現在還有時間…"
20000-330 = "可以再…\n陪我一會兒嗎？"
20000-2600 = "我想做出更多東西。\n希望可以……成為老師的力量。"

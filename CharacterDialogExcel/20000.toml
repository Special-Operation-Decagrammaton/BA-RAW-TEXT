[translation]
20000-20 = "I've been waiting for this and knew it would come. The moment when you would call my name."
20000-30 = "What if I had more time and a bigger budget...? No, that's just an amateur's excuse."
20000-40 = "A meister's job is to get the best results within the given time and budget."
20000-50 = "How about placing your statue here?\nWe can make the joints of its limbs move."
20000-60 = "Hmm. I've found a few things that could use some repairs and improvements... Huh? I'm not allowed to do repairs?"
20000-70 = "I could install some amazing traps if you want. What? I can't even do that?"
20000-80 = "Hi, Sensei. I've put today's mission list on the desk. Give it a look when you have the chance."
20000-90 = "Hmm... I think your efficiency on missions could improve, Sensei."
20000-100 = "I'll look for ways you can improve."
20000-110 = "I have fun hanging out with you. Heh heh..."
20000-120 = "What did you think, Sensei? Was my equipment helpful?"
20000-130 = "Do I enjoy making useful things? Sure, but..."
20000-140 = "This isn't a hobby. It's a way of life."
20000-150 = "I prefer maintenance work. There's something special about bringing life back to a machine again."
20000-160 = "It feels like I've accomplished something, and I love that feeling."
20000-170 = "(And seeing you smile is the best motivation for me.)"
20000-180 = "Happy birthday, Sensei. I'm thankful you were born and that you came into my life."
20000-190 = "What do I want for my birthday? Nothing in particular."
20000-200 = "...I already have everything I want."
20000-210 = "I wish you the best in the coming year. This year, I promise to become a better version of myself..."
20000-220 = "By my calculations, in order for Santa to deliver presents to all the children of Kivotos in a single night..."
20000-230 = "...Rudolph would have to achieve a speed of at least Mach 4."
20000-240 = "It's Halloween... I wouldn't call it a very scientific holiday, but there's still something exciting about it."
20000-260 = "Thank you, Sensei. You made this great view possible."
20000-270 = "Beautiful, isn't it? I'm glad we made it in time."
20000-280 = "Hmm? Why was this so important to me?"
20000-290 = "I wanted the Millennium students to be able to enjoy the streets when they're brightly lit like this."
20000-300 = "Something like this...is the only thing I know how to do."
20000-310 = "Besides, a moment like this...is all the reward I need."
20000-320 = "What do you say, Sensei? The night is still young."
20000-330 = "Could you...stay with me a little longer?"
20000-2600 = "I want to make more. And...to be of help to Sensei."

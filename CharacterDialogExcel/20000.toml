[translation]
20000-20 = "คิดไว้แล้วว่าเราจะได้เจอกันในเวลานี้ ฉันกำลังรออยู่เลย\nรอเวลานี้... เวลาที่คุณครูจะเรียกชื่อของฉัน"
20000-30 = "\"หากให้เวลาและเพิ่มงบให้อีก\nหน่อยล่ะก็...\" คำพูดแบบนั้นคือการ\nแก้ตัวของคนไร้ความสามารถน่ะ"
20000-40 = "เพราะไมสเตอร์ที่แท้จริงคือคน\nที่แสดงฝีมือและทำงานจนสำเร็จ\nภายในเวลาและงบประมาณที่ได้มา"
20000-50 = "ลองสร้างรูปปั้นคุณครูที่นี่ดู\nดีมั้ยนะ? ฉันทำให้แขนขาขยับ\nได้ด้วยนะ"
20000-60 = "อืม... ฉันเจอบางจุดที่ต้องแก้ไข\nและปรับปรุงสักหน่อยด้วย...\nเอ๋? ห้ามแก้ไขอย่างงั้นเหรอ?"
20000-70 = "ฉันเก่งพอที่จะเพิ่มบางอย่าง\nที่ทำให้ประหลาดใจได้นะ\nหืม? ไม่ได้งั้นเหรอ?"
20000-80 = "ว่าไงคุณครู\nฉันวางรายการภารกิจ\nของวันนี้ไว้บนโต๊ะแล้ว\nลองไปอ่านดูสิ"
20000-90 = "อืม... ฉันว่าการทำภารกิจ\nของคุณครูตอนนี้ดูไม่ค่อย\nมีประสิทธิภาพเท่าไหร่"
20000-100 = "แล้วฉันจะหาวิธีที่ดีกว่านี้ให้นะ"
20000-110 = "ได้อยู่กับคุณครูแบบนี้...\nฮุฮุ... ก็สนุกดีนะ"
20000-120 = "คุณครู! เป็นยังไงบ้าง?\nเครื่องมือที่ฉันทำขึ้นมา...\nเป็นประโยชน์บ้างมั้ย?"
20000-130 = "ฉันสนุกกับการประดิษฐ์ของที่\nเป็นประโยชน์มั้ยน่ะเหรอ?\nมันก็สนุกดีนะ..."
20000-140 = "แต่นี่ไม่ใช่งานอดิเรกของฉันหรอก\nมันคือชีวิตน่ะ"
20000-150 = "ฉันชอบการซ่อมแซม\nและชอบความรู้สึกที่\nฉันสามารถทำให้หัวใจของ"
20000-160 = "อุปกรณ์ที่เสียไปแล้ว\nกลับมาเต้นได้อีกครั้ง"
20000-170 = "(รอยยิ้มของคุณครู...\nคือแรงผลักดันที่ดีที่สุดของฉันเลย)"
20000-180 = "สุขสันต์วันเกิดนะคุณครู\nขอบคุณที่เกิดมาบนโลกใบนี้\nและขอบคุณที่มาหาพวกเราด้วย\nมีความสุขจัง..."
20000-190 = "สิ่งที่อยากได้เป็นของขวัญวันเกิดเหรอ?\nไม่มีอะไรหรอก"
20000-200 = "ฉันได้ทุกอย่างที่ต้องการมาแล้วละ..."
20000-210 = "ขอให้มีความสุขในวันปีใหม่นะ\nปีนี้ฉันจะพัฒนาตัวเอง\nและปรับปรุงส่วนที่บกพร่อง..."
20000-220 = "เพื่อที่ซานตาคลอสจะมาแจก\nของขวัญให้เด็กๆ ในคิโวทอส\nให้ได้ครบทุกคนภายในคืนเดียว..."
20000-230 = "ฉันว่ากวางเรนเดียร์ของเขา\nต้องวิ่งเร็วอย่างน้อย 4 แรงม้าเลยล่ะ"
20000-240 = "วันฮาโลวีนนี่นา... ถึงวันนี้จะ\nไม่เกี่ยวกับวิทยาศาสตร์ก็เถอะ\nแต่ทำไมฉันถึงใจสั่นและสนุกไปด้วยนะ"
20000-260 = "ขอบคุณนะ คุณครู\nฉันได้เห็นวิวสวยๆ แบบนี้\nเพราะคุณครูเลยนะ"
20000-270 = "สวยใช่มั้ยล่ะ?\nโชคดีมากเลยที่มาทันเวลา"
20000-280 = "หืม? ทำไมฉัน... ถึงต้อง\nพยายามขนาดนี้น่ะเหรอ?"
20000-290 = "เพราะฉันอยากทำให้นักเรียน\nของมิลเลเนียมได้เดินบนถนน\nอย่างปลอดภัยตอนกลางคืนน่ะ"
20000-300 = "เพราะนี่เป็นสิ่งเดียว...\nที่ฉันจะทำให้ได้"
20000-310 = "และสำหรับฉันแล้ว... เวลาแบบนี้\nมีค่ามากกว่า 'ของขวัญ' เสียอีก"
20000-320 = "เป็นยังไงบ้างคุณครู\nตอนนี้ยังมีเวลาเหลืออยู่..."
20000-330 = "คุณครู...\nจะอยู่กับฉันอีกหน่อยได้มั้ย?"
20000-2600 = "ฉันอยากสร้างสิ่งต่างๆ อีกเยอะเลย\nเพราะงั้น... หวังว่าจะเป็นกำลังให้คุณครูได้นะ"

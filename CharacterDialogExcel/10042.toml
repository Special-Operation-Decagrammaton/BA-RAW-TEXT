[translation]
10042-10 = "블루 아카이브."
10042-20 = "내 이름은 하카리 아츠코.\n선생님은, 나에게 무엇을 원해?\n그게 내가 할 수 있는 일이라면 좋을 텐데."
10042-30 = "(스슥… 스윽)"
10042-40 = "흐응?"
10042-50 = "좀 어수선하지만……\n응, 그래도 나쁘지 않아."
10042-60 = "이것이,\n일반적인 대화…?"
10042-70 = "여기…… 꽃을\n놓아 두면 좋을 것 같아."
10042-80 = "선생님. 수고했어."
10042-90 = "어서 와."
10042-100 = "뭔가,\n부탁하고 싶은 것이\n있다면 말해 줘."
10042-110 = "여기에도\n꽃을 장식해도 돼?"
10042-120 = "바라는 게 있다면\n뭐라도 말해 줘."
10042-130 = "이것이 당번……\n조금, 해 보고 싶었어."
10042-140 = "생~일~축하합니다~."
10042-150 = "배운 대로 했는데,\n그 표정은….\n혹시 이게 아닌가?"
10042-160 = "생일…?\n…응. 어떤 의미인지\n알고 있어. 배웠으니까."
10042-170 = "축하를 받았다면,\n감사해야 한다는 것도.\n그러니까, 고맙습니다."
10042-180 = "새해… 응. 이렇게 또\n한해가 지나는구나."
10042-190 = "평소와는\n다른 날들이라서……\n이번 새해는 또 어떻게 될까?"
10042-200 = "성야……\n배웠어. 응."
10042-210 = "이럴 때 어울리는 꽃이\n있었으면 좋겠는데…….\n다음엔 찾아보고 올게."
10042-220 = "사탕? 나 주는 거야?\n고마워…… 그런데 어째서?"
10042-230 = "선생님. 수고했어."
10042-240 = "어서 와."
10042-250 = "뭔가,\n부탁하고 싶은 것이\n있다면 말해 줘."
10042-260 = "여기에도\n꽃을 장식해도 돼?"
10042-270 = "바라는 게 있다면\n뭐라도 말해 줘."
10042-280 = "응? 내 얼굴에\n뭐라도 묻었어?"
10042-290 = "이것이 당번……\n조금, 해 보고 싶었어."
10042-300 = "생~일~축하합니다~."
10042-310 = "배운 대로 했는데,\n그 표정은….\n혹시 이게 아닌가?"
10042-320 = "생일…?\n…응. 어떤 의미인지\n알고 있어. 배웠으니까."
10042-330 = "축하를 받았다면,\n감사해야 한다는 것도.\n그러니까, 고맙습니다."
10042-340 = "새해… 응. 이렇게 또\n한해가 지나는구나."
10042-350 = "평소와는\n다른 날들이라서……\n이번 새해는 또 어떻게 될까?"
10042-360 = "성야……\n배웠어. 응."
10042-370 = "이럴 때 어울리는 꽃이\n있었으면 좋겠는데…….\n다음엔 찾아보고 올게."
10042-380 = "사탕? 나 주는 거야?\n고마워…… 그런데 어째서?"
10042-400 = "이 꽃, 설마……"
10042-410 = "……가져와 주었구나."
10042-420 = "날 위해서…?"
10042-430 = "……그렇구나."
10042-440 = "소중히 간직할게."
10042-450 = "……굉장히 기뻐.\n고마워."
10042-2600 = "생각하는 것을 포기하고,\n결정하는 것을 포기하고\n그저 정해진 운명대로 살아왔었어.\n하지만 이제부터는…….\n응. 고마워, 선생님."

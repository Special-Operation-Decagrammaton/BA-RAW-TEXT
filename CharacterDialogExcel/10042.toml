[translation]
10042-10 = "Blue Archive"
10042-20 = "กองกำลังอาเรียส ฮาคาริ อาสึโกะ\nคุณครู ต้องการอะไรจากฉันรึเปล่า?\nถ้าเป็นสิ่งที่ฉันทำได้ก็คงดีนะ"
10042-30 = "(พยักหน้า...)"
10042-40 = "หืม...?"
10042-50 = "ถึงจะดูรกไปหน่อย...\nอืม แต่ก็ใช้ได้นะ"
10042-60 = "นี่คือการพูดคุยกัน\nแบบทั่วไปเหรอ...?"
10042-70 = "ที่นี่ดูเหมาะ...\nสำหรับปลูกดอกไม้ดีนะ"
10042-80 = "คุณครู ขอบคุณมากนะ"
10042-90 = "เชิญเลย"
10042-100 = "ถ้ามีเรื่องอะไรให้ช่วย\nก็บอกมาได้เลย"
10042-110 = "เอาดอกไม้มาตกแต่ง\nที่นี่ได้รึเปล่านะ?"
10042-120 = "ถ้าต้องการอะไรก็บอกฉัน\nได้ทุกอย่างเลยนะ"
10042-130 = "นี่คือการเข้าเวรสินะ...\nฉันอยากลองทำมาตลอดเลย"
10042-140 = "แฮปปี้~ เบิร์ด~ เดย์~"
10042-150 = "ฉันก็ลองทำตามที่ดูมาแล้ว\nหรือว่าทำผิดนะ...\nถึงได้ทำสีหน้าแบบนั้นน่ะ?"
10042-160 = "วันเกิด...? ฉันก็พอรู้อยู่\nว่ามันหมายถึงอะไร\nฉันเรียนมาแล้วน่ะ "
10042-170 = "แล้วก็รู้วิธีการพูดที่เหมาะสม\nมาแล้วด้วย ขอบคุณค่ะ"
10042-180 = "ปีใหม่... อืม ตอนนี้ก็...\nผ่านไปอีกหนึ่งปีแล้วสินะ"
10042-190 = "วันที่แตกต่างจากวันอื่นๆ...\nปีใหม่นี้จะพาเราไปเจออะไรบ้างนะ?"
10042-200 = "คืนอันศักดิ์สิทธิ์...\nฉันเรียนมาแล้ว อืม... "
10042-210 = "ถ้ามีดอกไม้ที่เหมาะกับ\nช่วงเวลาแบบนี้ก็คงดีนะ\nคราวหน้าฉันจะลองหาดูแล้วกัน"
10042-220 = "ลูกกวาด? ให้ฉันงั้นเหรอ?\nขอบคุณนะ... ว่าแต่ให้ทำไมน่ะ?"
10042-230 = "คุณครู เยี่ยมมากเลย"
10042-240 = "เชิญเลย"
10042-250 = "ถ้ามีเรื่องอะไรให้ช่วย\nก็บอกมาได้เลย"
10042-260 = "เอาดอกไม้มาตกแต่ง\nที่นี่ได้รึเปล่านะ?"
10042-270 = "ถ้าต้องการอะไรก็บอกฉัน\nได้ทุกอย่างเลยนะ"
10042-280 = "หืม? ที่หน้าของฉัน\nมีอะไรเปื้อนอยู่เหรอ?"
10042-290 = "นี่คือการเข้าเวรสินะ...\nฉันอยากลองทำมาตลอดเลย"
10042-300 = "แฮปปี้~ เบิร์ด~ เดย์~"
10042-310 = "ฉันก็ลองทำตามที่ดูมาแล้ว\nหรือว่าทำผิดนะ...\nถึงได้ทำสีหน้าแบบนั้นน่ะ?"
10042-320 = "วันเกิด...? ฉันก็พอรู้อยู่\nว่ามันหมายถึงอะไร\nฉันเรียนมาแล้วน่ะ "
10042-330 = "แล้วก็รู้ว่าเวลาได้รับคำอวยพร\nต้องขอบคุณด้วย เพราะงั้น...\nขอบคุณมากค่ะ"
10042-340 = "ปีใหม่... อืม ตอนนี้ก็...\nผ่านไปอีกหนึ่งปีแล้วสินะ"
10042-350 = "วันที่แตกต่างจากวันอื่นๆ...\nปีใหม่นี้จะพาเราไปเจออะไรบ้างนะ?"
10042-360 = "คืนอันศักดิ์สิทธิ์...\nฉันเรียนมาแล้ว อืม... "
10042-370 = "ถ้ามีดอกไม้ที่เหมาะกับ\nช่วงเวลาแบบนี้ก็คงดีนะ\nคราวหน้าฉันจะลองหาดูแล้วกัน"
10042-380 = "ลูกกวาด? ให้ฉันงั้นเหรอ?\nขอบคุณนะ... ว่าแต่ให้ทำไมน่ะ?"
10042-400 = "ดอกไม้นี่... หรือว่า..."
10042-410 = "คุณครูซื้อมาให้ฉันงั้นเหรอ?"
10042-420 = "เอามาปลูกเพื่อฉันเหรอ...?"
10042-430 = "อย่างนี้นี่เอง..."
10042-440 = "ฉันจะรักษาไว้อย่างดีเลย"
10042-450 = "ฉันดีใจมากๆ เลย..."
10042-2600 = "ฉันยอมแพ้เรื่องการออกความคิด\nหรือการตัดสินใจของตัวเองไปแล้ว\nและใช้ชีวิตตามโชคชะตาก็เท่านั้น\nแต่ว่าตั้งแต่นี้ไปคงไม่เหมือนเดิมแล้วล่ะ\nขอบคุณนะคุณครู"

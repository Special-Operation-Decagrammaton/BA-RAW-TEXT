[translation]
10042-10 = "蔚藍檔案。"
10042-20 = "……我叫做秤敦子。\n老師對我，有什麼要求嗎？\n希望是我可以做到的事。"
10042-30 = "（沙沙，沙沙……）"
10042-40 = "哼～？"
10042-50 = "雖然有點靜不下心\n……嗯，但也不錯。"
10042-60 = "這就是，\n普通的對話……？"
10042-70 = "在這裡放幾束花……\n好像很適合。"
10042-80 = "老師，辛苦了。"
10042-90 = "歡迎回來，老師。"
10042-100 = "如果，有事情\n要拜託我就說吧。"
10042-110 = "我可以在這裡\n也擺幾束花嗎？"
10042-120 = "如果有要求的話，\n請儘管說。"
10042-130 = "這就是值日生……\n我一直想當當看呢。"
10042-140 = "祝～你～生～日～快～樂……"
10042-150 = "我照了我學到的做了，\n但看老師的表情……\n難道我做錯了嗎？"
10042-160 = "生日……？……嗯。\n我知道它代表什麼意義。\n因為最近有學到。"
10042-170 = "我也知道\n收到祝賀要說謝謝。\n所以，謝謝老師。"
10042-180 = "新年……就這樣又\n過了一年了啊。"
10042-190 = "最近的日子都過的\n和以往不一樣……\n新的這一年，會過的怎麼樣呢。"
10042-200 = "平安夜……\n我有學過。嗯。"
10042-210 = "如果有適合這種\n時節的花就好了……\n之後來查查看吧。"
10042-220 = "糖果？要給我嗎？\n謝謝……\n但是為什麼？"
10042-230 = "老師，辛苦了。"
10042-240 = "歡迎回來，老師。"
10042-250 = "如果，有事情\n要拜託我就說吧。"
10042-260 = "我可以在這裡\n也擺幾束花嗎？"
10042-270 = "如果有要求的話，\n請儘管說。"
10042-280 = "……？\n我的臉上有沾到什麼嗎？"
10042-290 = "這就是值日生……\n我一直想當當看呢。"
10042-300 = "祝～你～生～日～快～樂……"
10042-310 = "我照了我學到的做了，\n但看老師的表情……\n難道我做錯了嗎？"
10042-320 = "生日……？……嗯。\n我知道它代表什麼意義。\n因為最近有學到。"
10042-330 = "我也知道\n收到祝賀要說謝謝。\n所以，謝謝老師。"
10042-340 = "新年……就這樣又\n過了一年了啊。"
10042-350 = "最近的日子都過的\n和以往不一樣……\n新的這一年，會過的怎麼樣呢。"
10042-360 = "平安夜……\n我有學過。嗯。"
10042-370 = "如果有適合這種\n時節的花就好了……\n之後來查查看吧。"
10042-380 = "糖果？要給我嗎？\n謝謝……\n但是為什麼？"
10042-400 = "這束花，\n難道是……"
10042-410 = "……你真的，帶來了啊。"
10042-420 = "是為了我……？"
10042-430 = "……這樣啊。"
10042-440 = "……我會珍惜的，\n直到永遠。"
10042-450 = "……真的好開心。\n謝謝。"
10042-2600 = "我曾放棄思考，\n放棄決定……\n只是按照註定好的命運過活。\n但從今以後……\n嗯。謝謝你，老師。"

[translation]
9009004-10 = "ทางนี้คืองานที่คุณครูจะต้อง\nช่วยจัดการให้เสร็จนะคะ"
9009004-20 = "มีงานที่กำลังรอ\nให้คุณครูจัดการอยู่ค่ะ\nขอรบกวนด้วยนะคะ"
9009004-30 = "ฉันจะต้องทำงานให้เก่ง\nเหมือนกับคุณครูแท้ๆ..."
9009004-40 = "ฮู่ว...\nฉันจะทำได้มั้ยนะ..."
9009004-50 = "คะ...คือว่ามีข้อมูล\nที่ขาดตกบกพร่องไปรึเปล่าคะ...?"
9009004-60 = "งานเยอะมากเลยค่ะ..."
9009004-70 = "รุ่นพี่รินที่จัดงานการพวกนี้ได้ทันที\nน่าทึ่งมากเลยละค่ะ..."
9009004-80 = "สุดยอดจริงๆ... คุณครูจัดการ\nงานพวกนี้เสร็จแล้วเหรอคะ? "
9009004-90 = "สะ...สุดยอดไปเลยค่ะ\nจัดการงานพวกนี้ได้ง่ายๆ เลย..."
9009004-100 = "เสร็จแล้วเหรอคะ...?!\nสะ... สุดยอดเลย...!"
9009004-110 = "ดะ...เดี๋ยวก่อนสิคะ?! ทำได้\nง่ายๆ เลย?! สะ...สุดยอดเลยค่ะ!"
9009004-120 = "เท่านี้งานของวันนี้ก็เสร็จแล้วค่ะ\nขอบคุณมากค่ะ...!"
9009004-130 = "เฮ้อ... ปัญหาเร่งด่วน\nได้รับการแก้ไขเรียบร้อยแล้วค่ะ"
9009004-140 = "ถ้างั้นพรุ่งนี้ก็รบกวนด้วยนะคะ...!"

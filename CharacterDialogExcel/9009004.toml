[translation]
9009004-10 = "その、ぜひこちらを先生に、\n解決していただければと……。"
9009004-20 = "こちらの件、お願いしても\nよろしいでしょうか？"
9009004-30 = "もっと先生みたいに、\nお仕事ができるように\nなりたいです……"
9009004-40 = "はぁ……\n私で大丈夫なのでしょうか……？"
9009004-50 = "も、もしかして何か、\n情報の不備など\nありましたか……？"
9009004-60 = "私には、荷が重いような\n気がします……"
9009004-70 = "リン先輩はすごいです。\n私と違って弱気になることなく、\nいつもテキパキとされて……"
9009004-80 = "す、すごい……\nもう解決されたんですか？"
9009004-90 = "さ、流石ですね……！\nこんなにあっさりと……"
9009004-100 = "も、もう終わったのですか！？\nす、すごいです……！"
9009004-110 = "あ、あっさりと終えられ\nましたね……！？\nさ、さすがです。"
9009004-120 = "今日のお仕事は\nこれでお終いですね、\nお疲れ様でした！"
9009004-130 = "これで急ぎの案件は\n一区切りですね、\nありがとうございます！"
9009004-140 = "また明日、\nよろしくお願いいたします……！"

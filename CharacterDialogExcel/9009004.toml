[translation]
9009004-10 = "이쪽은 선생님이\n해결해주셔야 할\n일들입니다."
9009004-20 = "처리를 기다리고 있는\n일들이에요…\n잘 부탁드립니다."
9009004-30 = "선생님처럼 능숙해질 수\n있어야 하는데......"
9009004-40 = "하아…\n잘 할 수 있을까, 나......"
9009004-50 = "호, 혹시 누락된 정보가\n있을까요……?"
9009004-60 = "일이 너무 많아요......"
9009004-70 = "후우… 이런 일도\n척척 해내는 린 선배는\n진짜 굉장한 것 같아요…"
9009004-80 = "대단해…\n이것도 해결하신 건가요?"
9009004-90 = "괴, 굉장하시네요.\n이걸 이렇게 쉽게......"
9009004-100 = "벌써...?!\n괴, 굉장해...!"
9009004-110 = "자, 잠깐만요?!\n그렇게 간단히?!\n대, 대단해요."
9009004-120 = "오늘은 이걸로\n마무리되었네요.\n수고하셨습니다...!"
9009004-130 = "하아... 급한 문제들은\n일단락되었네요."
9009004-140 = "그럼 내일 또...!"

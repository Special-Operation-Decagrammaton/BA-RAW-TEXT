[translation]
9009004-10 = "那個，希望老師，\n一定要解決這些問題。"
9009004-20 = "這件事，\n可以拜託您嗎？"
9009004-30 = "我想變得像老師一樣，\n工作上能更加得心應手……"
9009004-40 = "哈啊……\n我應該沒問題吧……？"
9009004-50 = "難，難道，\n情報有什麼\n不完善的地方嗎……？"
9009004-60 = "我感到很有負擔……"
9009004-70 = "琳前輩很厲害。\n跟軟弱的我不一樣，\n總是那麼果斷……"
9009004-80 = "好，好厲害……\n已經解決了嗎？"
9009004-90 = "真，真不愧是老師……！\n如此輕輕鬆鬆……"
9009004-100 = "已，已經結束了嗎！？\n太，太厲害了……！"
9009004-110 = "輕，輕輕鬆鬆就\n結束了呢……！？\n不，不愧是老師。"
9009004-120 = "今天的工作\n到此結束，\n辛苦了！"
9009004-130 = "這樣的話，\n緊急的案件就告一段落，\n非常感謝！"
9009004-140 = "明天見，\n再拜託您了……！"

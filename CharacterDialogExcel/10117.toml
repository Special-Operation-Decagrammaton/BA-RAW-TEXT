[translation]
10117-10 = "蔚藍檔案～"
10117-20 = "高地人鐵道學園～\n橘光……登場～"
10117-30 = "哦～感覺有\n很多能玩的……"
10117-40 = "老師～你在哪～？"
10117-50 = "今天決定摸魚～"
10117-60 = "沒有點心嗎～？\n果汁呢～？"
10117-70 = "沒有好玩的事嗎～？"
10117-80 = "老師～歡迎～"
10117-90 = "在等你唷～"
10117-100 = "啊……茶水間的點心，不見了～"
10117-110 = "嗯？沒關係嗎～？"
10117-120 = "這裡是光～\n正閒到不行～\n請說～"
10117-130 = "咦～？\n文書工作～？"
10117-140 = "噗～好無聊～"
10117-150 = "老師～要吃點心嗎～？"
10117-160 = "來，超辣口味～"
10117-170 = "光吃不了，\n所以給你～"
10117-180 = "這個就由光來處理吧～？"
10117-190 = "沒問題唷～\n畢竟是值日生呀？"
10117-200 = "……\n……（點頭）\n唔嗯，不小心睡著了。"
10117-210 = "老師～能坐在你腿上嗎～？"
10117-220 = "不等回答就行動～\n這就是橘光～"
10117-230 = "你看你看～老師～\n是影子狗狗～"
10117-240 = "……哦～？\n那是老鷹～？\n還有其他的嗎～？"
10117-250 = "夏萊乘務員，請回答～\n鏘～！"
10117-260 = "今天是老師的生日～\n恭喜你～\n一起吃蛋糕吧～"
10117-270 = "考考你～\n今天是什麼日子呢～？"
10117-280 = "沒錯～\n是光和希望的生日～"
10117-290 = "送我禮物嘛～\n什麼都可以～"
10117-300 = "我想出了今年的抱負～\n要把點心的量……減少……！"
10117-310 = "……唔嗯～\n果然還是明年再努力吧～"
10117-320 = "老師今年有哭過嗎～？\n光沒有哭過哦～\n我忍住了～"
10117-330 = "所以能拿到禮物嗎～？\n我有當乖孩子。"
10117-340 = "Trick or Train～"
10117-350 = "嗯～只是隨口講講而已～\n給我糖果吧～"
10117-370 = "這裡，這裡～"
10117-380 = "沒錯～裡面～\n牙齒好痛～\n老師～有看到嗎～？"
10117-390 = "右邊的臼齒～在痛～"
10117-400 = "嗚嗚，那裡……\n刺刺的～"
10117-410 = "咦～那怎麼辦～\n是光的死亡Flag嗎～？\n幫幫我～老師～"
10117-2600 = "要給我嗎～？\n謝謝～作為回報，\n我會保護老師的～"

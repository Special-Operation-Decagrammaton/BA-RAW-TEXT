[translation]
10117-10 = "블루- 아카이브-"
10117-20 = "하이랜더 철도학원-\n타치바나 히카리 등- 장-"
10117-30 = "우오- 놀기 좋아 보이는 곳…"
10117-40 = "선생님- 어디 있어-?"
10117-50 = "오늘은 땡땡이 모드- 결정-"
10117-60 = "과자 없어-? 주스는-?"
10117-70 = "재미있는 일 없어-?"
10117-80 = "선생님- 어서 와-"
10117-90 = "히카리 기다리고 있었어-"
10117-100 = "아……\n탕비실 과자- 다 먹어버렸어-"
10117-110 = "응-? 괜찮아-?"
10117-120 = "선생님- 히카리 왕심심-\n자극이 필요해-"
10117-130 = "응-? 서류 작업……?"
10117-140 = "우우- 완-전- 노잼-"
10117-150 = "선생님- 과자 먹을래-?"
10117-160 = "이거 엄청 매운 맛……"
10117-170 = "히카리는 못 먹어-\n선생님 줄게-"
10117-180 = "선생님- 이 문서\n히카리가 처리할게-?"
10117-190 = "할 수 있어- 당번이니까-"
10117-200 = "……\n……(꾸벅)\n아- 깜빡 졸았어-"
10117-210 = "선생님- 무릎 위에\n올라가도 돼-?"
10117-220 = "허락하기 전에 움직인다-\n그것이 타치바나 히카리-"
10117-230 = "이거 봐- 선생님-\n손그림자로 강아지 만들기-"
10117-240 = "……오-? 그건- 독수리-?\n다른 것도- 할 수 있어-?"
10117-250 = "샬레 승무원, 응답 바람-\n쨔안!"
10117-260 = "오늘은 선생님의 생일-\n축하합니다-\n케이크 같이 먹자-"
10117-270 = "퀴즈- 오늘은 무슨 날-?"
10117-280 = "정답- 히카리랑 노조미 생일-"
10117-290 = "선물 주세요- 뭐든 좋아-"
10117-300 = "올해의 포부 결정-\n과자의 양을- 줄인다……!"
10117-310 = "……으응- 내년부터 할래-"
10117-320 = "선생님- 올해 운 적 있어-?\n히카리는 안 울었어-\n꾹 참았어-"
10117-330 = "착한 아이니까 선물 확정-?"
10117-340 = "트릭 오어- 트레인-"
10117-350 = "응- 맘대로 구호야-\n사탕 주세요-"
10117-370 = "여기- 여기-"
10117-380 = "응~…… 안쪽-\n이가- 아파-\n선생님- 보여-?"
10117-390 = "오른쪽 어금니- 부분이-"
10117-400 = "우우, 거기……\n욱신욱신-"
10117-410 = "에- 그럼 어떡해-\n히카리 사망 플래그-?\n구해줘- 선생님-"
10117-2600 = "이거 히카리- 주는 거야-?\n고마워- 강해져서\n선생님 지켜줄게-"

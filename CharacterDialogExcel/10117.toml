[translation]
10117-10 = "Blue Archive"
10117-20 = "ทาจิบานะ ฮิคาริ\nจากสถาบันการรถไฟไฮแลนเดอร์ มา แล้ว"
10117-30 = "ว้าว ที่นี่น่าเล่นสนุกจัง..."
10117-40 = "คุณครู อยู่ไหนน่ะ?"
10117-50 = "วันนี้ฉันจะเข้า\nโหมด โดด งาน"
10117-60 = "มีขนมกินมั้ย?\nน้ำผลไม้ล่ะ?"
10117-70 = "ไม่มีอะไรสนุกๆ\nให้ทำเลยเหรอ...?"
10117-80 = "คุณครู เข้ามาสิ"
10117-90 = "ฮิคาริกำลังรออยู่เลย"
10117-100 = "อ่า...\nกินขนมในห้องครัว หมด แล้ว"
10117-110 = "หืม? ไม่เป็นไรงั้นเหรอ?"
10117-120 = "คุณครู ฮิคาริเบื่อมาก\nอยากได้อะไรกระตุ้นหน่อย"
10117-130 = "หืม? ทำงานเอกสารอยู่...?"
10117-140 = "ง่า... น่า เบื่อ ที่ สุด"
10117-150 = "คุณครู กินขนมมั้ย?"
10117-160 = "อันนี้เผ็ดมากเลย..."
10117-170 = "ฮิคาริกินไม่ไหว\nให้คุณครูแล้วกัน"
10117-180 = "คุณครู เอกสารนี้\nเดี๋ยวฮิคาริจัดการให้นะ"
10117-190 = "ทำได้อยู่แล้ว ก็เวรฮิคารินี่"
10117-200 = "......\n...... (สัปหงก)\nอ๊ะ เผลอหลับไปเลย"
10117-210 = "คุณครู ขอไปนอน\nบนตักได้มั้ย?"
10117-220 = "จะไปก่อนได้รับอนุญาตละนะ\nนี่ละทาจิบานะ ฮิคาริ"
10117-230 = "ดูนี่สิ คุณครู\nวิธีทำเงามือให้เป็นลูกสุนัข"
10117-240 = "โอ้ว...? นั่นนกอินทรีเหรอ?\nอย่างอื่นก็ทำได้เหรอ?"
10117-250 = "พนักงานรถไฟชาเล่ต์\nทราบแล้วเปลี่ยน\nท้าดา!"
10117-260 = "วันนี้วันเกิดคุณครู\nสุขสันต์วันเกิดนะ\nมากินเค้กกันเถอะ"
10117-270 = "คำถาม วันนี้วันอะไร?"
10117-280 = "ขอตอบ วันเกิดฮิคาริกับโนโซมิ"
10117-290 = "ขอของขวัญด้วยค่ะ จะให้อะไรก็ได้"
10117-300 = "ปณิธานของปีนี้\nต้องกินขนม ให้ น้อย ลง...!"
10117-310 = "อืม... ค่อยเริ่มทำปีหน้าดีกว่า..."
10117-320 = "คุณครู ปีนี้ร้องบ้างหรือเปล่า?\nฮิคาริไม่ร้องเลย\nฮึบไว้น่ะ"
10117-330 = "เป็นเด็กดีจะได้ของขวัญใช่มั้ย?"
10117-340 = "ทริก ออร์ ทรีต?"
10117-350 = "อืม แค่พูดตามใจไปงั้นน่ะ\nขอลูกอมหน่อยค่ะ"
10117-370 = "ตรงนี้ ตรงนี้"
10117-380 = "อื้อ~... ปวดฟัน\nซี่ข้างใน\nคุณครู เห็นหรือเปล่า?"
10117-390 = "ฟันกรามทางขวาน่ะ"
10117-400 = "ฮือ ตรงนั้นมัน...\nปวดจี๊ดๆ"
10117-410 = "แง ทำยังไงดี\nฮิคาริต้องยกธงขาวเหรอ?\nช่วยด้วย คุณครู"
10117-2600 = "อันนี้ให้ฮิคาริเหรอ?\nขอบคุณนะ ไว้โตแล้ว\nฉันจะมาปกป้องคุณครูนะ"

[translation]
10065-10 = "蔚藍檔案"
10065-20 = "百鬼夜行聯合學園，陰陽部副部長，\n我叫桑上佳穗。\n還請您多多指教。"
10065-30 = "如果是這個地方…\n就算建造百鬼夜行\n的大使館也…"
10065-40 = "百鬼夜行的商品\n要裝飾在哪裡呢？"
10065-50 = "哈…剛才是…\nMy Sweet Idol\n的氣息…！？"
10065-60 = "呵呵，\n熱熱鬧鬧的真好呢。\n這種氣氛也不錯。"
10065-70 = "這麼多\n各個學園的學生…\n再次深切感受到了\n夏萊的厲害之處。"
10065-80 = "恭候多時了，老師。\n今天的行程是什麼呢？"
10065-90 = "是，已經準備就緒。"
10065-100 = "百鬼夜行和夏萊，\n以兩人三腳的精神加油吧。"
10065-110 = "您找我嗎？"
10065-120 = "身為陰陽部的副部長，\n能夠擔任夏萊的值日生，\n我感到非常榮幸……"
10065-130 = "不過有時會擔心\n自己是否有做好。"
10065-140 = "……我一直都\n有幫上忙，是嗎？"
10065-150 = "呵呵，\n謝謝您。太好了。"
10065-160 = "辛苦的時候，\n我都會從知世醬的\n周邊中得到力量。"
10065-170 = "……老師要不要也來一個？"
10065-180 = "夏萊真的很厲害呢……"
10065-190 = "竟然能在和這麼多學生\n交流的同時順利運作……"
10065-200 = "呵呵，我也會……\n為了不輸給您，\n努力學習的哦。"
10065-210 = "有朝一日，請您來\n百鬼夜行的陰陽部吧。"
10065-220 = "我承諾給您\n最棒的待遇。"
10065-230 = "仁耶大人和知世醬\n一定也會很開心的。"
10065-240 = "呵呵，祝您\n生日快樂。老師。"
10065-250 = "我正好在為老師\n規劃在百鬼夜行\n舉行祝宴……"
10065-260 = "咦，不行……是嗎？\n說句祝福的話就夠了……？"
10065-270 = "我還以為是個不錯的點子……\n不可以嗎……是嗎……"
10065-280 = "我，我的生日，是嗎？"
10065-290 = "……不，我只是有點驚訝而已。"
10065-300 = "竟然能被陰陽部員\n以外的人祝福……"
10065-310 = "我很開心。\n謝謝您，老師。"
10065-320 = "呵呵，新年快樂，老師。\n今年也請多多指教哦。"
10065-330 = "聖誕節到了呢。"
10065-340 = "聽說聖誕老人和生剝鬼很像，\n今年就用這個哏來\n舉辦百鬼夜行的獨特活動……"
10065-350 = "咦？沒有那種事……？\n是百鬼夜行特有的……？"
10065-360 = "原來如此……這就是\n所謂的文化差異吧。\n真神奇。"
10065-370 = "萬聖節快樂！老師。"
10065-380 = "為了不輸給萬聖節文化，\n百鬼夜行就在下個節分\n說出「節份快樂！」\n並撒出豆子吧。"
10065-400 = "老師，您覺得如何呢？"
10065-410 = "這純真又圓滾滾的眼珠……\n深思熟慮的表情……"
10065-420 = "不覺得真的超級可愛的嗎！？"
10065-430 = "哈啊，\n這上天賜與的造型……\n真是棒極了……"
10065-440 = "活著真是太美好了……！"
10065-450 = "沒錯。大家真的，\n都是可愛\n又重要的孩子。"
10065-460 = "討人喜歡的孩子、\n帥氣的孩子、\n酷酷的孩子、\n漂亮的孩子……"
10065-470 = "呵呵……\n簡直就像百鬼夜行的\n學生一樣呢。"
10065-480 = "正因為大家各不相同，\n有時會互相衝突……"
10065-490 = "不過大家都是有著\n閃亮個性的重要學生。\n我是這麼想的。"
10065-500 = "老，老師……？\n嗚……突然說那種……"
10065-510 = "非……非常……謝……\n謝您……老師……"
10065-2600 = "這麼特別的東西，\n居然能從老師手上收下……\n為了讓自己的活躍不愧對老師的期待，\n我會拚盡全力的。\n謝謝您，老師。"

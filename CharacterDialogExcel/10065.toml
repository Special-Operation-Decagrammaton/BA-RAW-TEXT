[translation]
10065-10 = "Blue Archive"
10065-20 = "My name is Kuwakami Kaho, the vice president of Allied Hyakkiyako Academy's Yin-Yang Club. I'm pleased to make your acquaintance."
10065-30 = "Hm... This seems like an ideal location to establish Hyakkiyako's Embassy..."
10065-40 = "So, what space have you reserved for the Hyakkiyako merchandise?"
10065-50 = "Oh! Did I sense...just now...the presence of my idol...?"
10065-60 = "Heehee, it's quite raucous in here. It's not a bad atmosphere, though."
10065-70 = "To see students from so many different academies... Truth be told, I'm quite impressed with Schale."
10065-80 = "I've been waiting, Sensei. What's on your schedule today?"
10065-90 = "Yes, all the preparations have been completed satisfactorily."
10065-100 = "Hyakkiyako and Schale... I hope we can work together like a team in a three-legged race."
10065-110 = "You called for me, yes?"
10065-120 = "As the vice president of the Yin-Yang Club, it is my honor to be assigned a shift at Schale."
10065-130 = "However, I admit, I do worry that I may not always be able to acquit myself well."
10065-140 = "...Oh? You say I've always been a help to you?"
10065-150 = "Heehee. Thank you. That is a relief."
10065-160 = "When things are tough, I draw strength from my collection of Chise merchandise."
10065-170 = "...Shall I give you a piece, Sensei?"
10065-180 = "Schale is certainly admirable."
10065-190 = "To think that you'd be able to host advantageous exchanges with so many students..."
10065-200 = "Heehee, I'll need to study hard myself in order to keep up."
10065-210 = "Please visit Hyakkiyako's Yin-Yang Club one day."
10065-220 = "I promise that you will find our skills as hosts without flaw."
10065-230 = "And, in addition... Niya and Chise will be very happy."
10065-240 = "Heehee, please receive my sincere birthday wishes, Sensei."
10065-250 = "In fact, I am planning to host a one-night-only celebratory concert in your honor at Hyakkiyako."
10065-260 = "Huh? What do you mean, too much? A mere greeting is enough...?"
10065-270 = "Oh, I really thought it was a good idea. Is it not? I see..."
10065-280 = "M-My... birthday?"
10065-290 = "...No, I'm just a bit surprised."
10065-300 = "I'm unused to receiving birthday greetings from anyone outside of the Yin-Yang Club..."
10065-310 = "But I'm very happy to receive them from you. Thank you, Sensei."
10065-320 = "Heehee. Happy New Year, Sensei! Thank you for all you've done for us this past year."
10065-330 = "Merry Christmas."
10065-340 = "It seems that Santa Claus looks quite similar to Namahage. So this year, we're planning on holding an exclusive event at Hyakkiyako with that as a theme."
10065-350 = "Huh? You're saying it's totally different? A story unique to Hyakkiyako...?"
10065-360 = "I see. It seems the cultural differences were larger than I imagined."
10065-370 = "Happy Halloween, Sensei!"
10065-380 = "It is important that we do not lose our culture to the appeal of Halloween. So this fall, Hyakkiyako shall throw beans and shout \"Happy Setsubun!\""
10065-400 = "How is it, Sensei?"
10065-410 = "These round eyes, free of worry, and this contemplative expression..."
10065-420 = "Really! Isn't it just so cute?!"
10065-430 = "Ah... It's a perfect, god-given shape. There's nothing better..."
10065-440 = "I'm grateful to be alive...!"
10065-450 = "Yes, truly! They're all my cute and precious children."
10065-460 = "A lovable child, a strong child, a cool child, and a beautiful child..."
10065-470 = "Heehee. I see them all as if they were Hyakkiyako students."
10065-480 = "Because they're all unique, conflicts may sometimes arise..."
10065-490 = "But I think that goes to show how each student has their shining quirks."
10065-500 = "S-Sensei...?! Uh... To say that, so suddenly..."
10065-510 = "Um. Th-Thank...thank you, Sensei..."
10065-2600 = "Oh! Such a lovely gift, and from you, Sensei? It's too much, but it would be rude to decline. I'll treasure it."

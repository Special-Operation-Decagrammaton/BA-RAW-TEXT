[translation]
10065-10 = "Blue Archive"
10065-20 = "รองหัวหน้าชมรมหยินหยางสหพันธ์เฮียกคิยาโค\nคุวาคามิ คาโฮะค่ะ ฝากตัวด้วยนะคะ"
10065-30 = "อืม... ที่นี่เหมาะจะตั้งเป็น\nสถานทูตเฮียกคิยาโค\nเหมือนกันนะ..."
10065-40 = "นำสินค้าของเฮียกคิยาโค\nมาตกแต่งตรงไหนได้บ้างคะ?"
10065-50 = "อ๊ะ เมื่อกี้... ฉันรู้สึกได้ถึงเค้าลาง\nของไอดอลคนโปรดของฉัน...?!"
10065-60 = "ฮุฮุ ครึกครื้นดีนะคะ\nบรรยากาศแบบนี้\nก็ไม่แย่เท่าไรค่ะ"
10065-70 = "นักเรียนจากหลายสถาบัน...\nได้สัมผัสความยิ่งใหญ่\nของชาเล่ต์แล้วละค่ะ"
10065-80 = "กำลังรออยู่เลยค่ะ คุณครู\nตารางงานวันนี้ มีอะไรบ้างคะ?"
10065-90 = "ค่ะ\nฉันพร้อมแล้วค่ะ"
10065-100 = "มารวมพลังระหว่าง\nเฮียกคิยาโคกับชาเล่ต์ดีกว่าค่ะ"
10065-110 = "เรียกฉันเหรอคะ?"
10065-120 = "รู้สึกเป็นเกียรติมากเลยค่ะ\nที่มาได้เข้าเวรที่ชาเล่ต์\nในฐานะรองหัวหน้าชมรมหยินหยาง"
10065-130 = "ฉันเคยกลัวว่าตัวเอง\nจะทำได้ไม่ดีน่ะค่ะ"
10065-140 = "ฉันทำตัวเป็นประโยชน์ตลอด\nอยู่แล้วงั้นเหรอคะ...?"
10065-150 = "ฮุฮุ ขอบคุณค่ะ\nค่อยยังชั่วหน่อยค่ะ"
10065-160 = "เวลาที่ฉันเจอเรื่องยากลำบาก\nฉันมักจะรับพลังบวกจากของสะสม\nของชิเซะจังน่ะค่ะ"
10065-170 = "คุณครูอยากมีไว้สักชิ้นไหมคะ?"
10065-180 = "ชาเล่ต์นี่ยิ่งใหญ่มากเลยนะคะ..."
10065-190 = "พอคิดว่าสามารถจัดงานแลกเปลี่ยน\nกับเหล่านักเรียนจำนวนมากๆ\nได้เป็นอย่างดีแบบนั้น..."
10065-200 = "ฮุฮุ ฉันก็จะตั้งใจเรียนรู้\nเพื่อไม่ให้น้อยหน้าเหมือนกันค่ะ"
10065-210 = "หากสะดวก แวะมาชมรมหยินหยาง\nของเฮียกคิยาโคบ้างนะคะ"
10065-220 = "ฉันสัญญาว่าจะต้อนรับ\nอย่างดีที่สุดเลยค่ะ"
10065-230 = "คุณนิยะกับชิเซะจัง\nต้องชอบแน่นอนค่ะ"
10065-240 = "ฮุฮุ  สุขสันต์วันเกิดนะคะ\nคุณครู"
10065-250 = "ฉันกำลังวางแผนจะจัดงานแสดง\nที่เฮียกคิยาโค เพื่อฉลองให้คุณครู\nอยู่พอดีเลยค่ะ\n"
10065-260 = "อะไรนะคะ? รู้สึก... ลำบากใจเหรอคะ?\nแค่อวยพรอย่างเดียวก็พองั้นเหรอคะ...?"
10065-270 = "อุตส่าห์คิดว่าเป็นไอเดียที่ดี\nแล้วแท้ๆ เชียว แต่มันดูจะมากเกินไป\nอย่างนั้นเหรอคะ...?"
10065-280 = "วะ... วันเกิด... ฉันเหรอคะ?"
10065-290 = "เปล่าค่ะ...\nแค่ตกใจนิดหน่อยค่ะ"
10065-300 = "ไม่คิดเลยว่าจะได้รับคำอวยพร\nจากคนที่ไม่ใช่สมาชิกในชมรม\nแบบนี้ด้วย..."
10065-310 = "ดีใจจังเลยค่ะ\nขอบคุณนะคะ คุณครู"
10065-320 = "ฮุฮุ สวัสดีปีใหม่ค่ะ คุณครู\nปีนี้ก็ขอฝากตัวด้วยนะคะ"
10065-330 = "คริสต์มาสแล้วค่ะ"
10065-340 = "ได้ยินว่าซานตาคลอสก็คล้ายๆ กับ\nนามาฮาเกะ เพราะงั้นปีนี้ เราเลย\nจะใช้ธีมนั้นจัดงานพิเศษที่เฮียกคิยาโคค่ะ"
10065-350 = "คะ? ไม่เหมือนกันเลยงั้นเหรอคะ...?\nแตกต่างจากเรื่องเล่าของเฮียกคิยาโค\nงั้นเหรอคะ?"
10065-360 = "งั้นเหรอคะ...? คงเป็นความแตกต่าง\nด้านวัฒนธรรมสินะคะ... อย่างนี้นี่เอง"
10065-370 = "แฮปปี้ฮาโลวีนค่ะ! คุณครู"
10065-380 = "เพื่อให้ไม่เป็นการน้อยหน้าเทศกาล\nฮาโลวีน ช่วงเทศกาลเซ็ตสึบุนปีหน้า\nขอให้กล่าวคำว่า <แฮปปี้เซ็ตสึบุน!>\nตอนปาถั่วด้วยนะคะ"
10065-400 = "คุณครู คิดว่ายังไงบ้างคะ?"
10065-410 = "ดวงตากลมโตที่เหมือนมองไปไกลๆ...\nและสีหน้าที่ดูเหมือนกำลังครุ่นคิด\nอะไรบางอย่าง..."
10065-420 = "ใช่ไหมล่ะคะ ดูน่ารักไม่ไหวเลย\nใช่ไหมล่ะคะ?!"
10065-430 = "อ่า ใบหน้าฟ้าประทานแบบนี้\nมัน...สุดยอดไปเลย..."
10065-440 = "ดีจริงๆ ที่มีชีวิตอยู่...!"
10065-450 = "ค่ะ น่ารักจริงๆ ด้วยค่ะ ทุกคน\nเป็นเด็กน่ารัก น่าทะนุถนอมจริงๆ ค่ะ"
10065-460 = "เด็กที่ดูน่ารัก เด็กเท่ๆ...\nเด็กคูลๆ เด็กผู้งดงาม..."
10065-470 = "เด็กๆ พวกนี้เหมือนกับนักเรียน\nของเฮียกคิยาโคเลยค่ะ"
10065-480 = "ถึงพวกเธอจะทะเลาะกันบ้าง\nเพราะทุกคนมีความแตกต่างกัน..."
10065-490 = "แต่ฉันคิดว่าทุกคนเป็นเด็กนักเรียน\nคนสำคัญที่มีเอกลักษณ์ที่เปล่งประกาย\nเฉพาะตัวค่ะ"
10065-500 = "คะ... คุณครู...?! ทะ... ทำไมจู่ๆ\nถึงพูดอะไรแบบนั้นคะ..."
10065-510 = "ขะ... ขอบคุณ...\nขอบคุณค่ะ... คุณครู..."
10065-2600 = "ไม่คิดเลยว่าจะได้รับของ\nสุดพิเศษจากคุณครูแบบนี้...\nฉันจะแสดงศักยภาพให้เต็มที่ค่ะ\nขอบคุณนะคะ คุณครู"

[translation]
10065-10 = "블루 아카이브"
10065-20 = "백귀야행 연합학원 음양부 부부장,\n쿠와카미 카호라고 합니다.\n부디 잘 부탁드리겠습니다."
10065-30 = "이곳이라면…\n백귀야행의 대사관을\n설치하는 것도…."
10065-40 = "백귀야행 굿즈는\n어디에 장식할까요?"
10065-50 = "앗… 지금…\n마이 스위트\n아이돌의 기척이…?!"
10065-60 = "후후,\n시끌벅적하고 좋군요.\n이런 분위기도\n나쁘지 않네요."
10065-70 = "다양한 학원의\n학생들이 이렇게나….\n새삼스레 샬레의\n대단함을 실감했습니다."
10065-80 = "기다리고 있었습니다.\n선생님. 오늘의 일정은\n어떻게 되시나요?"
10065-90 = "네, 준비는\n다 되었습니다."
10065-100 = "백귀야행과 샬레,\n이인삼각으로 힘냅시다."
10065-110 = "부르셨나요?"
10065-120 = "음양부의 부부장으로서\n샬레의 당번 일을 맡게 된 것은,\n매우 영광입니다만."
10065-130 = "잘 해낼 수 있을지,\n조금 불안할 때가\n있답니다."
10065-140 = "…항상 도움이\n되고 있다, 구요?"
10065-150 = "후훗, 감사합니다.\n다행이네요."
10065-160 = "힘들 때엔\n치세 쨩 굿즈에서\n힘을 얻곤 한답니다."
10065-170 = "…선생님도 하나 드릴까요?"
10065-180 = "샬레는 정말 대단하네요…."
10065-190 = "이렇게 많은 학생들과\n교류하며 잘 지내고 있다니…."
10065-200 = "후후, 저도…\n지지 않도록\n열심히 배워야겠어요."
10065-210 = "언젠가, 백귀야행의\n음양부를 찾아와주세요."
10065-220 = "최고의 대접을\n약속드리겠습니다."
10065-230 = "니야 님도, 치세 쨩도\n분명 기뻐할 거랍니다."
10065-240 = "후훗, 생일을 진심으로\n축하드립니다. 선생님."
10065-250 = "마침 선생님을 위한\n백귀야행 단독 축하 공연을\n기획하려던 참입니다만."
10065-260 = "네? 곤란… 하시다고요?\n축하 인사만으로 충분…?"
10065-270 = "좋은 아이디어라고\n생각했는데…. 안 되나요?\n그런 건가요…"
10065-280 = "제, 제 생일… 말인가요?"
10065-290 = "…아뇨, 조금 놀랐을 뿐이랍니다."
10065-300 = "음양부원\n이외의 분에게\n축하를 받다니…."
10065-310 = "기쁘네요.\n감사합니다. 선생님."
10065-320 = "후후,\n새해 복 많이 받으세요.\n선생님. 올해도\n잘 부탁드립니다."
10065-330 = "크리스마스네요."
10065-340 = "산타클로스와 나마하게는\n닮았다고들 하니까.\n올해는 그것을 소재로\n백귀야행만의 단독 이벤트를…."
10065-350 = "네? 그럴 리가 없다…?\n백귀야행만의 이야기…?"
10065-360 = "과연, 문화의 차이란 거군요.\n신기하네요."
10065-370 = "해피 할로윈! 입니다. 선생님."
10065-380 = "할로윈 문화에 지지 않도록.\n백귀야행도 다음 절분 땐\n<해피 절분!>이라고 말하며\n콩을 던지도록 하지요."
10065-400 = "선생님, 어떠신가요?"
10065-410 = "이 무심한 듯\n땡그란 눈동자에….\n깊이 사색하는 듯한 표정…."
10065-420 = "정말이지.\n엄청 귀엽지 않나요?!"
10065-430 = "하아,\n하늘이 내린 조형…\n최고…"
10065-440 = "살아있어서 다행이다…!"
10065-450 = "네, 정말이지\n모두 귀엽고 소중한\n아이들이랍니다."
10065-460 = "사랑스러운 아이,\n멋진 아이,\n쿨한 아이,\n아름다운 아이…."
10065-470 = "후훗….\n마치 백귀야행의\n학생들 같네요."
10065-480 = "다들 다르기 때문에,\n가끔씩 부딪칠 때도 있지만…"
10065-490 = "각자 빛나는 개성을 가진\n소중한 학생, 이라는\n생각이 들어서요."
10065-500 = "서, 선생님…?!\n우으… 갑자기 그런…"
10065-510 = "가, 감사, 합… 니다….\n선생님…"
10065-2600 = "이런 식으로 특별한 물건을\n선생님께 받을 수 있다니….\n기대에 부끄럽지 않은 활약을\n할 수 있도록, 노력하겠습니다.\n감사합니다. 선생님."

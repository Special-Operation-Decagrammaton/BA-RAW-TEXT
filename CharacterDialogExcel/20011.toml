[translation]
20011-10 = "Blue Archive"
20011-20 = "คราวนี้เป็นชุดพิเศษ ชุดมิโกะน่ะ\nเหมือนชุดคอสเพลย์งั้นเหรอ?\nปะ...เปล่าสักหน่อย! ชุดทำงานพาร์ทไทม์ต่างหาก!"
20011-30 = "สิ่งชั่วร้ายจงหายไป~!\nคงต้องพูดประมาณนี้ล่ะมั้ง"
20011-40 = "พอใส่ชุดนี้ก็ได้รับคำขอ\nให้ทำพิธีขับไล่วิญญาณน่ะ\nแต่พิธีขับไล่วิญญาณนี่\nมันทำยังไงกันล่ะ?"
20011-50 = "มิโกะ มิโกะ เมี๊ยวเมี๊ยว♪\nมิโกะ มิโกะ เมี๊ยวเมี๊ยว♪\nนี่! มาอยู่ตรงนี้ตั้งแต่เมื่อไรกัน?\nลืมเรื่องที่เห็นไปให้หมดเดี๋ยวนี้เลยนะ!"
20011-60 = "เดือนนี้ทำงานพาร์ทไทม์\nเยอะมาก ตั้งตารอดูค่าขนม\nที่จะได้เดือนนี้เลยล่ะ ฮิฮิ♪"
20011-70 = "พอเสร็จงานพาร์ทไทม์แล้ว\nลองชวนทุกคนให้มาที่นี่\nดีไหมนะ~"
20011-80 = "เอาละ คุณครู\nรีบทำงานกันเถอะ"
20011-90 = "กำลังรอให้คุณครูมาช่วยอยู่เลย"
20011-100 = "พอกลับมาที่ชาเล่ต์\nก็เจอมิโกะอยู่ที่นั่นด้วย!"
20011-110 = "ถึงฉันจะเป็นคนพูดเอง\nแต่มันน่าอายจริงๆ นะ"
20011-120 = "ฉันคือมิโกะที่มีหน้าที่\nคอยช่วยเหลือคุณครูไงล่ะ"
20011-130 = "ถ้างั้นคุณครูก็เป็น\nวิญญาณคุ้มครองของฉันสินะ?"
20011-140 = "เอาละ อย่ามัวยืนเฉยอยู่เลย\nรีบไปทำงานเถอะ คุณครู "
20011-150 = "คุณ~ ครู~!!"
20011-160 = "จะอู้งานไม่ได้นะ!"
20011-170 = "เอาละ จงเกิดแรงฮึด...\nจงเกิดแรงฮึด~"
20011-180 = "เป็นยังไง? ได้ผลบ้างไหม?"
20011-190 = "เอ้า สู้ๆ นะ คุณครู"
20011-200 = "ชุดมิโกะเหมาะกับฉันงั้นเหรอ?"
20011-210 = "อะ...อื้อ!\nก็แหงอยู่แล้ว!"
20011-220 = "ดะ...ดันเผลอรับคำชมไปซะแล้ว"
20011-230 = "สุขสันต์วันเกิดนะ คุณครู!\nเงินค่าพาร์ทไทม์คงเข้าแล้ว\nไปกินข้าวมั้ย ฉันเลี้ยงเอง"
20011-240 = "ถ้าวันนี้ละก็ไม่เป็นไรหรอก\nเพราะวันนี้เป็นวันสำคัญนี่นา"
20011-250 = "ฉันอยากได้อะไรในวันเกิด\nรึเปล่างั้นเหรอ...?"
20011-260 = "อืม... แค่วันนี้ได้อยู่ด้วยกันแบบนี้ก็พอ..."
20011-270 = "ขอให้มีความสุขในปีใหม่นะ คุณครู"
20011-280 = "นะ...ไหนๆ ฉันก็แต่งชุดนี้แล้ว\nถ้าคุณครูอยากจะขอพร...\nฉันจะไปเป็นเพื่อนก็ได้นะ"
20011-290 = "เมอร์รีคริสต์มาส~!\nยังไงวันนี้คุณครูก็ว่างอยู่แล้ว\nฉันเลยแต่งตัวออกมาไงล่ะ"
20011-300 = "เห็นฉันใส่ชุดนี้ก็ดีใจอยู่\nแต่ก็อยากเห็นชุดซานต้ามากกว่าเหรอ?"
20011-310 = "ระ...เรื่องนั้น..."
20011-320 = "ถะ...ถ้าเป็นชุดนี้ละก็\nคงจะกำจัดวิญญาณที่โผล่มา\nตอนฮาโลวีนได้สินะ...!?"
20011-330 = "แค่แต่งคอสเพลย์\nมันกำจัดผีไม่ได้หรอกน่า"
20011-340 = "บะ...บอกว่าไม่ใช่คอสเพลย์ไงเล่า!"
20011-360 = "ขะ... ขอโทษนะคุณครู..."
20011-370 = "ตอนนี้ฉันคงขยับตัวไม่ได้"
20011-380 = "หืม หมายความว่ายังไงกันน่ะ!"
20011-390 = "ว่าแต่นั่นน่ะ...\nคุณครูชมฉันเหรอ?"
20011-400 = "อ๊ะ พอคิดดูแล้ว เรื่องที่ฉัน\nไม่ได้รักษาสัญญา\nขอโทษนะ"
20011-410 = "นั่งเล่นที่นี่ด้วยกันกับฉันก็ได้งั้นเหรอ?"
20011-420 = "ที่ผ่านมาฉันตั้งใจทำงานหนัก\nโดยไม่ได้พักเลย"
20011-430 = "เพราะงั้นก็เลยอยากให้พักผ่อน\nสบายๆ ให้สมกับที่ทำงานหนัก\nงั้นเหรอ?"
20011-440 = "ฮะฮะฮะ อะไรกัน"
20011-450 = "คุณครูนี่จริงๆ เลย ไม่ว่าเมื่อไร\nก็พูดแบบนั้นเสมอเลย"
20011-460 = "งั้นก็ได้ ถ้างั้นวันนี้...\nพวกเรามานั่งพักผ่อนสบายๆ\nด้วยกันนะ คุณครู"
20011-2600 = "เตรียมของแบบนี้มาให้ด้วยเหรอ?\nช่วยไม่ได้สินะ เรื่องนั้นฉันจะ\nพยายามให้มากขึ้น เพื่อตอบแทนก็แล้วกัน"

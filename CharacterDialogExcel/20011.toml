[translation]
20011-10 = "Blue Archive！"
20011-20 = "這個？是巫女的打扮唷。\n咦……Cosplay？才，才不是咧！\n是貨真價實的打工！"
20011-30 = "祓除吧，\n淨化吧～！\n……開玩笑的。"
20011-40 = "總覺得，\n雖然頻繁的被拜託除靈……\n不過除靈實際上，\n該怎麼做才好呢。"
20011-50 = "巫女巫女喵喵♪\n巫女巫女喵喵♪\n……等一下！？\n你什麼時候在那裡！？\n忘掉！現在立刻！！"
20011-60 = "啊，\n這個月蠻多加班的，\n也許可以期待薪水，\n呵呵♪"
20011-70 = "打工結束之後，\n試著邀請大家\n來這裡吧。"
20011-80 = "啊，老師。\n好了，要開始工作了唷。"
20011-90 = "難得我想要幫忙正在等你。"
20011-100 = "回到夏萊之後，\n沒想到那裡竟然有巫女！"
20011-110 = "……自己說著\n開始覺得羞恥了。"
20011-120 = "我是巫女，而且\n在幫忙老師……"
20011-130 = "所以老師是神主嗎？"
20011-140 = "好了，別發呆了，老師。\n要開始工作了唷。"
20011-150 = "老～師～！"
20011-160 = "不可以偷懶啦！"
20011-170 = "幹勁啊出來吧，出來吧～"
20011-180 = "如何，有效果嗎？"
20011-190 = "好了，加油吧，老師。"
20011-200 = "巫女的打扮，\n很適合我……？"
20011-210 = "哼，哼～！還行吧！"
20011-220 = "……被，被稱讚了。"
20011-230 = "生日快樂，老師。\n那個，我也領到薪水了，\n要不要我請你吃飯？"
20011-240 = "今，今天沒關係啦！\n因為是重要的日子……"
20011-250 = "畢竟是生日，\n有沒有想要的東西……？"
20011-260 = "嗯……今天那個，\n總之像這樣待在\n一起就……嗯。"
20011-270 = "新年快樂，老師。"
20011-280 = "難，難得\n我打扮成這樣，\n那個……參拜之類的，\n要我陪你嗎？"
20011-290 = "聖誕快樂～！\n我想反正老師今天也很閒，\n所以我以可愛的樣子來了唷。"
20011-300 = "……雖然很開心不過機會難得，\n也想看聖誕服？"
20011-310 = "那，那個之後再說！"
20011-320 = "這，這副打扮的話，\n也可以退治萬聖節的\n妖怪嗎……！？"
20011-330 = "……Cosplay的話應該沒辦法？"
20011-340 = "就，就說不是Cosplay了！"
20011-360 = "抱，抱歉，老師……"
20011-370 = "就跟你看到的一樣，\n我現在有點動彈不得……"
20011-380 = "咦，那，那是\n什麼意思！？"
20011-390 = "話說那個，\n算是誇獎嗎……？"
20011-400 = "啊，這麼說來那個，\n沒能遵守約定我很抱歉……"
20011-410 = "嗯，你說要在這裡\n一起休息……？"
20011-420 = "因為打工的時候\n一直都很努力，"
20011-430 = "所以至少現在，\n希望我好好休息，是嗎……？"
20011-440 = "啊哈，什麼啦。"
20011-450 = "真的是，\n老師總是這樣……"
20011-460 = "不過，嗯。那就在這裡，\n一起放鬆一下吧。老師。"
20011-2600 = "真是的，連這種東西都準備了……\n真是沒辦法，那個……嗯。\n我會更加努力，回報恩情的，老師。"

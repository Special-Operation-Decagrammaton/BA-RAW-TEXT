[translation]
20011-10 = "블루 아카이브!"
20011-20 = "이거? 무녀 복장이야.\n응? …코스프레냐고? 아, 아니라니까!\n엄연히 아르바이트 복장이라고!"
20011-30 = "부정한 기운이여,\n물럿거라~!\n…막, 이러고."
20011-40 = "뭔가, 자주 제령을\n부탁받는데 말이야…\n제령이란 건 실제로,\n어떻게 해야 하는 거야?"
20011-50 = "미코미코냥냥♪\n미코미코냥냥♪\n…자, 잠?! 언제부터\n거기에? 잊어버려! 당장!"
20011-60 = "아, 이번 달은\n잔업도 했겠다.\n아르바이트비\n기대되는걸. 후후♪"
20011-70 = "아르바이트가 끝나면,\n다 같이\n여기 오자고 해볼까~"
20011-80 = "아, 선생님.\n자, 얼른 일하자고."
20011-90 = "모처럼 도와주려고\n기다리고 있었으니까."
20011-100 = "샬레로 돌아오니,\n거기엔 어째선지 무녀가!"
20011-110 = "……내 입으로\n말하긴 했지만 창피하네."
20011-120 = "내가 무녀고,\n선생님을 돕는 역할이니까."
20011-130 = "……그럼 선생님은\n신주가 되는 건가?"
20011-140 = "자, 멍하니 늘어져 있지 말고,\n선생님. 일해야지 일."
20011-150 = "선~생~님~!"
20011-160 = "땡땡이는 안된다니까!"
20011-170 = "자아,\n의욕아 생겨나라. 생겨나라~"
20011-180 = "어때, 효과 있을 거 같아?"
20011-190 = "자, 힘내자. 선생님."
20011-200 = "무녀복, 잘 어울린다고?"
20011-210 = "으, 응!\n뭐, 그렇지!"
20011-220 = "……치, 칭찬받아버렸다."
20011-230 = "생일 축하해, 선생님.\n그, 아르바이트비도 들어왔겠다.\n내가 한턱낼 테니까.\n밥이라도 먹을래?"
20011-240 = "오, 오늘 정도는 괜찮다니까!\n중요한 날이니까…"
20011-250 = "생일인데 바라는 거 없냐고…?"
20011-260 = "으응… 오늘은 그게, 일단\n이렇게 같이 있을 수 있다면… 응."
20011-270 = "새해 복 많이 받아. 선생님"
20011-280 = "기, 기왕 이렇게 입었으니까.\n그… 소원 빌기라던가.\n어울려줄 수도 있는데?"
20011-290 = "메리 크리스마~스!\n어차피 선생님은 오늘도\n한가할 거 같아서,\n꾸며 입고 나와줬다고."
20011-300 = "…기쁘지만 모처럼이니,\n산타복도 보고 싶다?"
20011-310 = "그, 그건 나중에!"
20011-320 = "이, 이 복장이라면,\n할로윈의 귀신도\n퇴치할 수 있겠지…!?"
20011-330 = "…코스프레니까\n아마도 무리라고?"
20011-340 = "코, 코스프레가 아니라니까!"
20011-360 = "미, 미안 선생님……"
20011-370 = "보다시피\n꼼짝도 못 하겠어……"
20011-380 = "응? 그, 그게 대체\n무슨 말이야!?"
20011-390 = "그보다 그거,\n칭찬하는 거야…?"
20011-400 = "아, 그러고 보니,\n약속 못 지켜서 미안해……"
20011-410 = "응? 그냥 여기서\n같이 쉬면 된다……고?"
20011-420 = "아르바이트로 그동안\n열심히 힘낸 만큼,"
20011-430 = "지금만큼은 느긋하게\n쉬었으면 해…?"
20011-440 = "아하핫, 뭐야. 그게……!"
20011-450 = "정말, 선생님은\n언제나 그렇게…"
20011-460 = "그래, 응. 그러면\n오늘만큼은, 함께\n느긋하게 쉬자. 선생님."
20011-2600 = "정말이지, 이런 것까지 준비해주다니…\n정말 어쩔 수 없다니까, 그게… 응.\n더 노력해서, 보답할게. 선생님."

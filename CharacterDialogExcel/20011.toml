[translation]
20011-10 = "Blue Archive!"
20011-20 = "This is my special miko outfit. What? You thought it was cosplay?! No, it's for my part-time job!"
20011-30 = "Evil spirit, be gone...! Or something like that."
20011-40 = "I get a lot of requests to perform exorcisms when I wear this...but heck if I know how to do that."
20011-50 = "Miko miko nyan nyan...! ♪ Miko miko nyan nyan...! ♪ What the...?! How long have you been there? Forget what you just saw!"
20011-60 = "I worked overtime this month. Can't wait to see my paycheck. Heehee! ♪"
20011-70 = "I should come here with everyone once I'm done with my part-time job!"
20011-80 = "Hey, Sensei. Let's get to work."
20011-90 = "I've been waiting to help out."
20011-100 = "And then when you returned to Schale...there was a miko standing in the lobby!"
20011-110 = "Just narrating to myself. Now I'm embarrassed."
20011-120 = "I'm the miko, and my role is to help you."
20011-130 = "Then does that make you my spirit lord?"
20011-140 = "Don't just sit there doing nothing. Work, Sensei. WORK."
20011-150 = "Senseiii!"
20011-160 = "I said no goofing off!"
20011-170 = "Come on now. Get motivated. Motivated!"
20011-180 = "What do you think? Will it be effective?"
20011-190 = "Come on, Sensei. You can do this."
20011-200 = "Did you say the miko outfit looks good on me?"
20011-210 = "Y-Yeah! Well, I guess it does!"
20011-220 = "...I received a c-compliment."
20011-230 = "Happy birthday, Sensei. I got paid today, so I'll treat you. I-If you don't mind, that is."
20011-240 = "I-I'll be fine! Since it's an important day..."
20011-250 = "Do I want anything for my birthday...?"
20011-260 = "Um... Well, as long as we're together like this..."
20011-270 = "Happy New Year, Sensei."
20011-280 = "S-Since I'm dressed up like this I can go with you to, uh...make a wish and stuff."
20011-290 = "Merry Christmas! I knew you would be free today, so I dressed up and came out."
20011-300 = "You like it? It has been a while. Should I try a Santa outfit instead?"
20011-310 = "I-I'll do that later!"
20011-320 = "I-I can exorcise Halloween ghosts with this outfit...right?!"
20011-330 = "What do you mean I can't because it's just a cosplay?!"
20011-340 = "I-It's not cosplay!"
20011-360 = "S-Sorry, Sensei..."
20011-370 = "As you can see, I'm not going anywhere for a while..."
20011-380 = "Huh? Wh-What's that supposed to mean?!"
20011-390 = "Wait, was that supposed to be a compliment?"
20011-400 = "Oh, I just realized. I'm sorry I couldn't keep our promise..."
20011-410 = "Huh? You're fine with relaxing here together?"
20011-420 = "I have been working a lot at my part-time job..."
20011-430 = "...so you probably want me to take it easy now, huh?"
20011-440 = "Haha. Oh, come on!"
20011-450 = "It's just like you to say something like that."
20011-460 = "But fine. Just for a little while. We can relax here together, Sensei."
20011-2600 = "Wow, to have prepared something like this... You're leaving me no choice. I'll just have to try to repay you, Sensei."

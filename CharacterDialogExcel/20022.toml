[translation]
20022-10 = "Blue Archive"
20022-20 = "ทานโทชิโคชิโซบะรึยังคะ คุณครู?\nขอให้ทั้งฉันและคุณครู\nไม่เจอเรื่องวุ่นวายอะไรในปีนี้นะคะ"
20022-30 = "ในการทำอาหาร\nการชั่งปริมาณให้ตรง\nเป็นสิ่งสำคัญมากค่ะ"
20022-40 = "กิโมโนชุดนี้... สวยจัง"
20022-50 = "ความฝันแรกในปีใหม่นี้\nคือเรื่องอะไรนะ?"
20022-60 = "ขอให้ปีนี้\nมีแต่วันที่สงบสุข\nดำเนินต่อไปด้วยเถอะ..."
20022-70 = "นั่งพักตรงนี้สักหน่อย...\nได้รึเปล่านะ"
20022-80 = "อ๊ะ คุณครู! เชิญเลยค่ะ"
20022-90 = "หิวรึเปล่าคะ?\nฉันทำอะไรให้ทานมั้ยคะ?"
20022-100 = "เชิญเลยค่ะ!\nฉันจะไปอุ่นอาหารมาให้ค่ะ"
20022-110 = "วันนี้ฉันตั้งใจเตรียมอาหาร\nสุดฝีมือเลยค่ะ"
20022-120 = "คือว่า... กิโมโนนี่\nเป็นยังไง... บ้างคะ?"
20022-130 = "ถ้าคุณครูชอบก็คงดีนะคะ..."
20022-140 = "ฉะ... ฉันตื่นเต้นกับการใส่ชุดกิโมโน\nมาให้คุณครูดูมากเลยละค่ะ"
20022-150 = "แต่ที่รวบรวมความกล้ามา\nถือว่าฉันทำได้ดีเลยค่ะ"
20022-160 = "รู้รึเปล่าคะคุณครู?\nภาพของคุณครูที่ตั้งใจทำงาน\nทำให้นักเรียนมีกำลังใจมากเลยนะคะ"
20022-170 = "แน่นอนว่า...\nฉันเองก็ด้วยค่ะ ฮิฮิฮิ"
20022-180 = "อาหารโอเซจิ\nทำยากจริงๆ ค่ะ"
20022-190 = "แต่ว่าพอทำเสร็จ\nก็รู้สึกคุ้มค่าค่ะ"
20022-200 = "พอได้อยู่กับคุณครูแบบนี้\nรู้สึกจิตใจสงบขึ้นเยอะเลยค่ะ"
20022-210 = "แต่ว่าฉันต้องไปแล้ว..."
20022-220 = "คะ? อยากอยู่ด้วยกันต่อ... เหรอคะ?"
20022-230 = "วันนี้วันเกิดคุณครูสินะคะ!\nสุขสันต์วันเกิดค่ะ"
20022-240 = "ฉันดีใจที่ได้มาอวยพรคุณครูแบบนี้ค่ะ!"
20022-250 = "วันนี้คุณครูอยากทาน\nอาหารประเภทไหนคะ...?"
20022-260 = "ว้าว...\nคุณครูจำวันเกิดฉันได้ด้วยเหรอคะ"
20022-270 = "ขอบคุณค่ะ...!"
20022-280 = "แค่คำอวยพรของคุณครู\nฉันก็รู้สึกหัวใจพองโตแล้วค่ะ"
20022-290 = "ขอให้มีความสุขในวันปีใหม่ค่ะ คุณครู"
20022-300 = "วันปีใหม่แบบนี้\nฉันเลยลองใส่ชุดกิโมโนดูค่ะ"
20022-310 = "ฉันเตรียมโอเซจิมาด้วยค่ะ\nสนใจทานด้วยกันมั้ยคะ?"
20022-320 = "คริสต์มาส....\nปีนี้ใกล้จะผ่านไปแล้วสินะคะ"
20022-330 = "ฉันคิดว่าจะจัดปาร์ตี้\nเรียบๆ ขึ้นมา...\nคุณครูคิดว่ายังไงคะ?"
20022-340 = "เทศกาลฮาโลวีน\nเป็นช่วงเวลาที่ครึกครื้นดีนะคะ"
20022-350 = "ฟักทองแจ็ก โอ แลนเทิร์น\nถ้านำมากินทีหลังได้...\nก็คงจะดีนะคะ"
20022-370 = "ฉันมีความสุขมาก... จริงๆ ค่ะ"
20022-380 = "ไม่ว่าเมื่อไรก็รู้สึกขอบคุณ\nอยู่เสมอเลยค่ะ คุณครู"
20022-390 = "ฉันได้รับสิ่งต่างๆ มากมาย\nจากคุณครูค่ะ"
20022-400 = "คนที่กินอาหารที่ฉันทำ\nอย่างเอร็ดอร่อยกว่าใคร...\nไม่ว่าเมื่อไร... ก็ยังคงเป็นคุณครูค่ะ"
20022-410 = "เรื่องนั้น... นับเป็นของขวัญ\nที่ยิ่งใหญ่ที่สุดสำหรับฉันเลยค่ะ"
20022-420 = "เพราะงั้น... คือว่า... คุณครูคะ..."
20022-430 = "จากนี้ไป... ก็ขอรบกวนด้วยนะคะ"
20022-2600 = "น่าแปลกใช่มั้ยล่ะคะ? แค่คุณครูอยู่ด้วย\nฉันก็รู้สึกเหมือนทำได้ทุกอย่างเลยค่ะ\nปีนี้ ฉันก็จะพยายามค่ะ\nคอยดูให้ดีนะคะ"

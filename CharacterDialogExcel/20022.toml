[translation]
20022-10 = "蔚藍檔案。"
20022-20 = "老師，吃過跨年蕎麥麵了嗎？\n希望今年我們彼此\n都能度過平安順利的一年。"
20022-30 = "製作料理時，\n確實測量\n是很重要的唷。"
20022-40 = "這件和服……真漂亮。"
20022-50 = "今年的初夢……\n是什麼來著？"
20022-60 = "希望今年平靜的\n日子能持續下去……"
20022-70 = "呼，這裡應該可以\n稍微休息一下吧……？"
20022-80 = "啊，老師！\n歡迎回來。"
20022-90 = "肚子會不會餓？\n要不要幫你做點什麼？"
20022-100 = "歡迎回來！\n我馬上把餐點弄熱。"
20022-110 = "今天也\n滿懷愛意做了準備。"
20022-120 = "那，那個……和服，\n你覺得，怎麼樣呢？"
20022-130 = "你能喜歡的話，\n我會很高興的……"
20022-140 = "雖然讓老師看見穿著和服\n的樣子讓我有點緊張，"
20022-150 = "有努力真是太好了。"
20022-160 = "你知道嗎？\n老師努力的樣子\n會成為學生們的鼓勵。"
20022-170 = "當然……\n對我來說也是如此，耶嘿嘿。"
20022-180 = "御節料理雖然是\n很費工夫的料理，"
20022-190 = "也正因如此才有做的價值。"
20022-200 = "像這樣和老師待在一起，\n總覺得心情就會放鬆下來。"
20022-210 = "差不多該走了……"
20022-220 = "咦？\n再多待在一起，是嗎？"
20022-230 = "是老師的生日呢！\n恭喜你。"
20022-240 = "能祝福老師，\n我也很高興！"
20022-250 = "今天想吃什麼樣的料理呢？"
20022-260 = "哇……我的生日，\n你有記得呀。"
20022-270 = "非常感謝……！"
20022-280 = "光是聽到老師這些話，\n我就很滿足了。"
20022-290 = "新年快樂，老師。"
20022-300 = "畢竟是難得的新年，\n所以我穿了和服過來。"
20022-310 = "還準備了御節料理唷。\n要不要一起吃呢？"
20022-320 = "已經到了聖誕節……\n今年也快要結束了呢。"
20022-330 = "我想準備一個簡單的派對，\n老師覺得怎麼樣呢？"
20022-340 = "萬聖的季節充滿活力，\n讓人覺得很愉快呢。"
20022-350 = "要是裝飾用的\n傑克南瓜燈\n之後能被吃掉就好了……"
20022-370 = "我真的……很開心。"
20022-380 = "一直以來\n非常謝謝你，老師。"
20022-390 = "老師總是\n讓我獲益良多呢。"
20022-400 = "比任何人都更加\n津津有味地享用我的料理的……\n總是老師……"
20022-410 = "這……對我來說\n就是最棒的禮物了。"
20022-420 = "所以，那個……老師。"
20022-430 = "今後，也拜託你囉？"
20022-2600 = "真是不可思議……只要有老師在身邊，\n我就覺得自己似乎無所不能。\n今年我也會加油的。\n還請您在一旁守望著我哦。"

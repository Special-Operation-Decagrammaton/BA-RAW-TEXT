[translation]
20022-10 = "블루 아카이브."
20022-20 = "해넘이 국수는 드셨나요. 선생님?\n올해에는 선생님도 저도,\n무탈한 한 해가 되었으면 좋겠네요."
20022-30 = "요리에서는 확실하게\n계량하는 것이\n중요하답니다."
20022-40 = "이 기모노…… 예쁘네."
20022-50 = "올해의 새해\n첫 꿈은…… 뭐였더라?"
20022-60 = "부디 올해는,\n평온한 나날이\n계속되기를……"
20022-70 = "여기에선 조금\n쉴 수 있으려나……"
20022-80 = "아, 선생님! 어서 오세요."
20022-90 = "배고프지 않나요?\n뭐 만들어 드릴까요?"
20022-100 = "어서 오세요!\n곧 식사를 데울게요."
20022-110 = "오늘도 애정을\n담아 준비했습니다."
20022-120 = "저, 저기…… 기모노,\n어떠, 신가요?"
20022-130 = "마음에 드셨으면, 좋겠는데……"
20022-140 = "선생님께 기모노 차림을\n보여드린다는 건 긴장됐지만,"
20022-150 = "용기를 내어 보길\n잘한 거 같아요."
20022-160 = "알고 있으신가요?\n선생님의 열심히 하는 모습은\n학생들에게 힘이 되고 있어요."
20022-170 = "물론…\n저에게 있어서도요, 에헤헷."
20022-180 = "오세치는\n손이 많이 가는 요리이지만,"
20022-190 = "그렇기 때문에 만드는\n보람이 있어요."
20022-200 = "이렇게 선생님과 함께 있으면\n왠지 마음이 느슨해져요."
20022-210 = "슬슬 가야 하는데……"
20022-220 = "네? 좀 더 같이, 요?"
20022-230 = "선생님의 생일이시네요!\n축하드려요."
20022-240 = "저도 축하할 수 있어서 기뻐요!"
20022-250 = "오늘은 어떤 요리가\n좋으신가요?"
20022-260 = "와아…\n제 생일을 기억해 주셨군요."
20022-270 = "감사합니다……!"
20022-280 = "선생님의 말씀만으로도\n가슴이 벅차요."
20022-290 = "새해 복 많이 받으세요, 선생님."
20022-300 = "모처럼의 설날이니\n기모노를 입어보았습니다."
20022-310 = "오세치도 준비했어요.\n같이 드실래요?"
20022-320 = "벌써 크리스마스……\n올해도 끝이 가까워졌네요."
20022-330 = "소소하게 파티 준비를\n하려고 하는데요.\n선생님도 어떠세요?"
20022-340 = "할로윈의 계절은 활기가\n넘쳐서 즐거운 거 같아요."
20022-350 = "장식용 잭 오 랜턴도\n나중에 먹을 수 있으면\n좋겠는데요……"
20022-370 = "정말로…… 기뻐요."
20022-380 = "언제나 감사합니다. 선생님."
20022-390 = "선생님으로부터는,\n여러 가지를 받기만 하네요."
20022-400 = "제 요리를, 누구보다\n맛있게 먹어주시는 분은……\n언제나 선생님이었어요."
20022-410 = "그게… 저에게는,\n제일 큰 선물이었고요."
20022-420 = "그러니까, 그… 선생님."
20022-430 = "앞으로도, 잘 부탁드릴게요?"
20022-2600 = "신기하죠? 선생님만 계시면,\n무엇이든 할 수 있을 것 같아요.\n올해에도 힘내겠습니다.\n지켜봐 주세요."

[translation]
26000-10 = "Blue. Archive."
26000-20 = "I will fight by your side when you want to overcome adversity and hardship."
26000-30 = "We're running low on medical supplies."
26000-40 = "Hmm. Well, it's not bad."
26000-50 = "Looks cozy."
26000-60 = "I'm impressed by how...clean everything is."
26000-70 = "Body temperature good, pulse is stable... Hmm. You're perfectly healthy."
26000-80 = "Welcome, Sensei. These documents need your attention."
26000-90 = "The Prefect Team desires order. Isn't that what Schale wants too?"
26000-100 = "I'll tell you a secret..."
26000-110 = "I'm not a fan of needles either."
26000-120 = "I hope you know there's no cure for stupidity."
26000-130 = "Pardon? You want me to laugh?"
26000-140 = "...Perhaps if we were alone together."
26000-150 = "(If I knock Sensei out and perform CPR...)"
26000-160 = "(...would that count?)"
26000-170 = "What? I look lost in thought? No. It's nothing."
26000-180 = "Happy birthday, Sensei. You're due for a booster shot."
26000-190 = "I'll have to ask you to undo your pants."
26000-200 = "Wait! You only have to pull them down slightly!"
26000-210 = "Today is my birthday. That gives me the right to have you to myself."
26000-220 = "Would you...hold my hand?"
26000-230 = "Happy New Year, Sensei. Last year was very chaotic..."
26000-240 = "...but I enjoyed it because I was with you."
26000-250 = "I like Christmas because its primary color is red. Do you appreciate shades of red like I do, Sensei?"
26000-260 = "I'll say it now, but it has nothing to do with the color of blood..."
26000-270 = "Happy Halloween, Sensei. Would you like some candy? These are sugar-free, so they're healthier."
26000-290 = "You know... Now that I think about it..."
26000-300 = "This situation is... Uh... It's a bit...inappropriate..."
26000-310 = "Don't you think? Sensei...? Please... Say something... Anything..."
26000-320 = "If you don't say anything... It's going to be really awkward..."
26000-330 = "Not because of you! I just mean... Ugh! I'm sorry! I don't mean to be rude. I just... I don't know what to say..."
26000-340 = "OR what to do! Ugh!"
26000-350 = "*sigh*"
26000-360 = "Yes, I— I'm fine. Yeah."
26000-370 = "Heehee... Goodness! I don't know what's come over me."
26000-380 = "What is this feeling? Whenever I'm with you... I'm not myself."
26000-390 = "It's so difficult to explain. And for so many reasons..."
26000-2600 = "The fact that I need more power to heal more people feels like a bad joke. But I will always do my best."

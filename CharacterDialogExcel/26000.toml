[translation]
26000-10 = "블루, 아카이브"
26000-20 = "시련이 두렵다면\n역경이 버겁다면\n제가 함께 도전해 드리죠."
26000-30 = "슬슬 의약품을\n확보해야겠는데."
26000-40 = "흠. 뭐,\n나쁘진 않습니다."
26000-50 = "안락해 보이네요."
26000-60 = "이 장소의\n위생 상태는…\n훌륭하군요."
26000-70 = "체온 양호,\n맥박 정상.\n흠. 건강하군요."
26000-80 = "어서 오세요, 선생님.\n선생님의 결재를 기다리는\n서류들이 여기 있습니다."
26000-90 = "선도부는 질서를 원하죠.\n샬레도 그렇지 않나요?"
26000-100 = "제 비밀을 하나 알려드리자면…"
26000-110 = "저도 주사 맞는건\n별로 좋아하지 않습니다."
26000-120 = "바보는 치료가 불가능합니다.\n모르셨나요?"
26000-130 = "네? 좀 웃으라고요?"
26000-140 = "…단둘이 있을 때만 가능합니다."
26000-150 = "(…일단 기절시키고\n인공 호흡을 하면…)"
26000-160 = "(그건 노카운트…?)"
26000-170 = "네? 무슨 생각하냐고요?\n…아무것도 아닙니다."
26000-180 = "생일 축하 드립니다. 선생님.\n마침 좋은 영양주사가 왔습니다."
26000-190 = "바지를 벗어주시겠…?"
26000-200 = "아니 엉덩이만요!"
26000-210 = "생일입니다. 오늘만큼은,\n선생님을 독차지해도\n될 것 같군요."
26000-220 = "손…\n잡아주시겠습니까?"
26000-230 = "새해 복 많이 받으세요, 선생님.\n지난 한 해는 정신이 없었지만…"
26000-240 = "…그래도, 선생님이 있어\n좋았습니다."
26000-250 = "크리스마스는 좋습니다.\n빨간색이 많아지니까요.\n선생님도, 빨간색 좋아하시나요?"
26000-260 = "…말해두겠지만,\n딱히 피를 좋아하는 건\n아닙니다."
26000-270 = "선생님께 할로윈의 축복을.\n사탕은 어떠신가요?\n무설탕이라 건강합니다."
26000-290 = "벼, 별로 의식하지는\n못했습니다만……"
26000-300 = "이 상황은 그, 그다지\n좋지 않다고 할까…"
26000-310 = "저기, 선생님…?\n그… 뭐라도\n말씀해주시지 않으면, 저기…"
26000-320 = "계속 말씀이 없으시면\n오히려 이상한 기분이…"
26000-330 = "아니, 그 재촉하는 건\n아니지만…! 그게,\n뭐라고 말씀드려야 할지…"
26000-340 = "이럴 때는,\n어떻게 해야…"
26000-350 = "…후우."
26000-360 = "…아니. 괜찮습니다. 네."
26000-370 = "후후, 정말 곤란해졌네요…\n뭘까요, 이건."
26000-380 = "선생님과 함께\n있다는 것만으로도,\n뭔가 평소처럼\n있기가 어려워서…"
26000-390 = "정말, 곤란합니다…\n여러 가지로…"
26000-2600 = "더 많은 사람을 치료하기 위해\n더 많은 힘이 필요하다는 현실은,\n재미없는 아이러니죠. 하지만\n제 능력이 닿는 한… 최선을 다하겠습니다."

[translation]
26000-10 = "蔚藍，檔案"
26000-20 = "害怕試煉的時候，\n以及快要輸給苦難的時候，\n我會跟你一起面對的。"
26000-30 = "差不多得\n確保藥品才行了。"
26000-40 = "呼姆。嘛，\n還算不錯。"
26000-50 = "待起來真舒服呢。"
26000-60 = "這裡的衛生狀態…\n真了不起呢。"
26000-70 = "體溫正常、脈搏正常。\n呼姆。沒有問題呢。"
26000-80 = "歡迎你來，老師。\n有文件在等待老師的核准唷。"
26000-90 = "風紀委員會期望著秩序。\n夏萊也是一樣對吧？"
26000-100 = "告訴您一個我的祕密吧……"
26000-110 = "我也不太喜歡打針。"
26000-120 = "笨蛋是無藥可救的，\n您不知道嗎？"
26000-130 = "咦？要我笑一下？"
26000-140 = "……只限兩人獨處\n的時候的話，可以。"
26000-150 = "（…總之先讓他昏倒，\n　再做人工呼吸的話…）"
26000-160 = "（那樣不算……？）"
26000-170 = "咦？問我在想什麼是嗎？\n……什麼都沒有。"
26000-180 = "祝您生日快樂，老師。\n正好進了不錯的營養針。"
26000-190 = "請把褲子脫下…？"
26000-200 = "不對，只要到屁股就好！"
26000-210 = "今天是生日。僅限\n今天的話，獨佔老師\n似乎也沒關係呢。"
26000-220 = "可以……\n牽我的手嗎？"
26000-230 = "新年快樂，老師。\n雖然去年忙得暈頭轉向…"
26000-240 = "…但是，\n有老師在真是太好了。"
26000-250 = "我喜歡聖誕節。\n因為街上的紅色會變多。\n老師也喜歡紅色嗎？"
26000-260 = "……我也沒有\n特別喜歡血唷。"
26000-270 = "給老師萬聖節的祝福，\n糖果怎麼樣呀？\n因為是無糖的\n所以對身體很好唷。"
26000-290 = "雖，雖然\n沒什麼意識到……"
26000-300 = "不過這個狀況，\n那個，\n該說是有點不太好嗎…"
26000-310 = "那個，老師…？\n那個，\n不說點什麼的話，就是…"
26000-320 = "再繼續沉默下去的話，\n反而氣氛會…"
26000-330 = "不，\n那個，並沒有催促老師的意思…！我想想，\n該怎麼說才好呢…"
26000-340 = "這種時候，\n該怎麼辦…"
26000-350 = "…呼。"
26000-360 = "不…\n我沒事，是的。"
26000-370 = "呵呵。真的是，\n讓人傷腦筋呢…\n到底是為什麼呢，這個。"
26000-380 = "光是和老師待在一起，\n不知為何就沒辦法保持平常心…"
26000-390 = "真的是，傷腦筋呢…\n各方面都是…"
26000-2600 = "為了治療更多人\n就需要更多力量，\n這種現實就像讓人笑不出來的笑話一樣呢。\n儘管如此，只要是我能力所及……\n我都會全力以赴。"

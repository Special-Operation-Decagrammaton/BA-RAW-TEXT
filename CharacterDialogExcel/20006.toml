[translation]
20006-10 = "Blue Archive!"
20006-20 = "I was taking a long break, but oh well. Can't do much about it if Sensei is calling for me."
20006-30 = "Could there be a cheese-flavored drink?"
20006-40 = "This is a great place to spend the day off."
20006-50 = "Can this thing be used in an experiment?"
20006-60 = "It's okay. Don't be afraid, Nezusuke."
20006-70 = "Oh, my. This is quite..."
20006-80 = "*sigh* Oh? You're here?"
20006-90 = "Want to grab a bite to eat?"
20006-100 = "There you are! Don't you know it's rude to keep a lady waiting?"
20006-110 = "As punishment, you'll be helping me with an experiment. Heh heh."
20006-120 = "Hmm. The chewiness of the knife-cut noodles..."
20006-130 = "Astounding. Truly amazing."
20006-140 = "What? Is me eating normal food weird? I'm not Nezusuke, you know!"
20006-150 = "This cool outfit suits me?"
20006-160 = "Hahaha! Of course. Everything I wear suits me!"
20006-170 = "I can get a ton of inspiration outside of the lab too."
20006-180 = "Either making fun of Kin, or bothering Mei..."
20006-190 = "Hmm? Is something leaking?"
20006-200 = "Happy birthday, Sensei."
20006-210 = "I don't have a gift for you...but would you like to have an elixir I've been testing?"
20006-220 = "Ugh. Another year of the immortality elixir being incomplete and another year older."
20006-230 = "Hmm? Am I worried about getting old? Haha. Surely not. I'm not like Shun."
20006-240 = "So I get to start the year with you."
20006-250 = "That must be a sign of good things to come!"
20006-260 = "Sensei, is there a gift you want?"
20006-270 = "I don't have gold, but I can brew up something that can turn your hands and feet gold. Haha!"
20006-280 = "Trick or treat! I'm going to cause mischief if you don't give me something."
20006-290 = "Well, I'll be doing that even if you do. Mwahahaha!"
20006-310 = "Heh heh heh. The smell really packs a punch."
20006-320 = "We definitely can't eat it like this."
20006-330 = "First, one spoonful of deodorizer to remove the smell."
20006-340 = "Next, two spoonfuls of mustard powder to dull the aftertaste."
20006-350 = "Just a little bit more... You're gonna be delicious."
20006-360 = "Uh, wait a second. I accidentally added way too much mustard powder!"
20006-370 = "Eh, it shouldn't be that big a deal."
20006-380 = "I just need to add something else to counteract the smell."
20006-2600 = "I am a jack-of-all-trades who is not only skilled at researching, but at shooting as well!"

[translation]
20006-10 = "블루 아카이브!"
20006-20 = "무슨 일인 것이냐, 모처럼의 휴일이었는데…\n뭐, 선생의 호출이라면 어쩔 수 없는 것이다."
20006-30 = "치즈맛이 나는\n음료는 없을까?"
20006-40 = "휴일을 보내기에\n좋은 장소인 것이다."
20006-50 = "이 물건, 실험에\n쓸 순 없으려나?"
20006-60 = "괜찮아.\n무서워 하지 마,\n네즈스케."
20006-70 = "오호라,\n이건 제법……"
20006-80 = "후우, 후우…\n어, 어라? 온 것이냐?"
20006-90 = "…이거, 같이 먹을래?"
20006-100 = "기다렸잖아! 정말이지,\n나님을 기다리게 하다니…"
20006-110 = "그 벌로 실험에 어울려 줘야겠어.\n후-후-후."
20006-120 = "음. 도삭면의 이 쫄깃한 식감은\n역시 언제 먹어도 훌륭해……"
20006-130 = "이 세상의 진리 중 하나인 것이다."
20006-140 = "뭐야, 나님이 평범한 음식을 먹는 게\n이상한 것이냐? 그야 나님은\n네즈스케가 아니니까!"
20006-150 = "나님에게 잘 어울리는\n멋진 옷이라고…?"
20006-160 = "음-하-하-핫! 그야 당연하지.\n나님은 뭘 입어도 잘 어울린다고!"
20006-170 = "영감은 연구실 밖에서도\n잔뜩 얻을 수 있지."
20006-180 = "킨을 놀린다던가,\n메이를 괴롭힌다던가…"
20006-190 = "응…?\n새어 나오고 있다고?\n뭐가?"
20006-200 = "생일 축하하는 것이다, 선생."
20006-210 = "선물은 없지만, 대신 실험중인\n약이 있는데. 마셔볼래?"
20006-220 = "으으, 불로장생의 영약을\n만들지 못한 채 또 한 살을\n더 먹어버린 것이다…"
20006-230 = "응? 나이 먹는 걸\n신경쓰고 있냐고?\n하하, 설마. 슌 교관도 아니고."
20006-240 = "선생과 함께 한 해를\n시작할 수 있다니…"
20006-250 = "나님의 올해도\n운수대통일게 분명해!"
20006-260 = "선생, 뭔가 받고 싶은 선물이 있어?"
20006-270 = "황금은 없지만 손발이\n황금색으로 변하는 약이라면\n줄 수 있는데. 하하!"
20006-280 = "Trick or Treat!\n과자를 주지 않으면\n장난을 칠 것이다!"
20006-290 = "물론 과자를 줘도\n장난을 칠 거지만,\n음-하-하-핫!"
20006-310 = "쿠후후… 과연, 이건 꽤나\n지독한 냄새인 것이다…."
20006-320 = "확실히 이대로는\n먹기 어렵겠어."
20006-330 = "우선 잡내를\n제거하기 위해\n탈취제를 한 스푼."
20006-340 = "그리고 후각을\n둔하게 만들기 위해\n겨자 가루를 두 스푼……."
20006-350 = "맛있어져라~ 인 것이다~"
20006-360 = "어, 어라? 실수로 겨자 가루를\n너무 많이 넣어 버린 것이다!"
20006-370 = "뭐, 신경 쓸 정도의\n일은 아니려나."
20006-380 = "그 대신 탈취제를\n조금 더 넣으면,\n아마 괜찮을 것이다!"
20006-2600 = "나님은 연구 뿐만 아니라\n사격에도 능한 천재인 것이다!"

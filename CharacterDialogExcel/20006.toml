[translation]
20006-10 = "Blue Archive!"
20006-20 = "มีเรื่องอะไรล่ะ ฉันกำลังพักผ่อนอยู่นะ...\nแต่ถ้าคุณครูเรียกละก็... ช่วยไม่ได้นะ"
20006-30 = "มีเครื่องดื่ม\nที่เป็นรสชีสหรือเปล่านะ?"
20006-40 = "ที่นี่เหมาะที่จะใช้\nพักผ่อนในวันหยุดจริงๆ ~"
20006-50 = "ของชิ้นนี้...\nเอาไปใช้ทดลองได้มั้ยนะ?"
20006-60 = "ไม่เป็นไรหรอก\nไม่ต้องกลัวหรอกนะ\nเนสึซึเกะ"
20006-70 = "โอ้... นี่มัน..."
20006-80 = "ฟู่ว... ฟู่ว...\nอะ...เอ๋? มาแล้วเหรอ?"
20006-90 = "กินด้วยกันมั้ย...?"
20006-100 = "รอจนเมื่อยแล้วนะ! จริงๆ เลยเชียว\nปล่อยให้ท่านซายะรอแบบนี้ได้ยังไง..."
20006-110 = "เพื่อเป็นการลงโทษ\nต้องไปช่วยฉันทำการทดลองนะ\nฮุฮุฮุ"
20006-120 = "อืม... ความเหนียวนุ่มของ\nของเส้นเตาเซียวเมี่ยน\nรู้สึกว้าวทุกครั้งที่กินเลย..."
20006-130 = "ถือเป็นความจริงที่น่าว้าวสุดๆ\nเรื่องหนึ่งเลยละ"
20006-140 = "อะไรกัน การที่ท่านซายะคนนี้\nกินอาหารทั่วไปมันแปลกเหรอ?\nฉันไม่ใช่เนสึซึเกะสักหน่อย!"
20006-150 = "เสื้อตัวนี้ดูดีมีสไตล์เหมาะ\nกับท่านซายะคนนี้งั้นเหรอ...?"
20006-160 = "ฮ่าฮ่าฮ่า! มันก็แน่นอนอยู่แล้ว!\nท่านซายะคนนี้ใส่ชุดอะไร\nก็เหมาะทั้งนั้นแหละ!"
20006-170 = "แรงบันดาลใจน่ะ หาได้จาก\nนอกห้องแล็บเยอะแยะเลยนะ"
20006-180 = "คงทำให้คินตกใจ\nหรือไม่ก็ก่อกวนเมย์..."
20006-190 = "หือ...?\nใครเผลอพูดเรื่องอายุงั้นเหรอ?\nอะไรเหรอ?"
20006-200 = "สุขสันต์วันเกิดนะ คุณครู"
20006-210 = "ฉันไม่มีของขวัญหรอก แต่ว่า...\nฉันมียาที่อยู่ระหว่างทดลองอยู่นะ\nจะลองดื่มดูมั้ยล่ะ?"
20006-220 = "ฮือ... ฉันทำยาอายุวัฒนะ\nไม่สำเร็จสักที แถมยัง\nอายุเยอะขึ้นอีกหนึ่งปีแล้วด้วย..."
20006-230 = "หืม? ฉันกังวลเรื่องที่\nอายุมากขึ้นหรือเปล่าเหรอ?\nฮ่าฮ่า ฉันไม่ใช่ชุนสักหน่อย!"
20006-240 = "ฉันจะได้ใช้เวลาในปีใหม่นี้\nร่วมกับคุณครูอีกครั้ง..."
20006-250 = "ปีนี้ท่านซายะ\nต้องโชคดีแน่นอน!"
20006-260 = "คุณครูมีของขวัญที่อยากได้หรือเปล่า?"
20006-270 = "ถึงฉันจะไม่มีทองของจริง แต่ถ้าเป็นยา\nที่เปลี่ยนมือกับเท้าให้เป็นสีทองละก็\nฉันทำให้ได้นะ ฮ่าฮ่า!"
20006-280 = "ทริก ออร์ ทรีต~\nถ้าไม่ให้ขนมกินละก็~\nฉันจะหลอกแล้วนะ!"
20006-290 = "ถึงจะให้ขนม\nฉันก็จะหลอกคุณครูอยู่ดี\nฮ่าฮ่าฮ่า!"
20006-310 = "หึหึหึ แบบนี้นี่เอง\nกลิ่นฉุนสุดๆ ไปเลยนะ..."
20006-320 = "ถ้าเป็นแบบนี้ละก็...\nคงจะกินยากแน่ๆ "
20006-330 = "ก่อนอื่นก็ใส่สารดับกลิ่น\nลงไปหนึ่งช้อน\nเพื่อกำจัดกลิ่นคาว"
20006-340 = "แล้วก็ใส่ผงมัสตาร์ดลงไป\nสองช้อนพูนๆ เพื่อลด\nประสิทธิภาพการรับกลิ่นลง..."
20006-350 = "อร่อยเหาะแน่นอน~ อร่อยเหาะแน่ๆ~"
20006-360 = "วะ...ว้าก…!\nดันเผลอใส่ผงมัสตาร์ด\nเยอะเกินไปซะแล้ว!"
20006-370 = "แต่ก็นะ...\nไม่เป็นไรหรอกน่า"
20006-380 = "แค่ใส่สารดับกลิ่น\nเพิ่มลงไปอีกหน่อย\nแค่นั้นก็เรียบร้อยแล้วล่ะ!"
20006-2600 = "ท่านซายะน่ะ นอกจากด้านการวิจัยแล้ว\nก็เชี่ยวชาญเรื่องการยิงปืนด้วยนะ!"

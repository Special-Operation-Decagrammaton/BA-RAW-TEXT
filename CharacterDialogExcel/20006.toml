[translation]
20006-10 = "蔚藍檔案！"
20006-20 = "有什麼事啊，明明是難得的休假……\n算了，既然是老師找我那也沒辦法。"
20006-30 = "不知道有沒有\n起司口味的飲料？"
20006-40 = "真是個適合\n度過假期的地方。"
20006-50 = "這個，能不能\n用來實驗呢？"
20006-60 = "來，\n不用害怕哦，根津助。"
20006-70 = "哦齁～\n這還挺……"
20006-80 = "呼，呼……\n啊，啊咧？你來了嗎？"
20006-90 = "……這個，要一起吃嗎？"
20006-100 = "等你很久了！！\n真是的，竟敢讓我等……"
20006-110 = "作為懲罰，下次\n你要陪我做實驗！\n哼哼哼哼……！"
20006-120 = "唔呣，刀削麵的彈牙口感，\n果然什麼時候吃都很美味……"
20006-130 = "這是世界上不變的真理之一。"
20006-140 = "怎麼了，我吃普通\n的食物很奇怪嗎？\n哪會，我又不是根津助！"
20006-150 = "是件適合我\n又很棒的衣服……？"
20006-160 = "唔哈哈哈！那是當然的，\n我不管穿什麼都很適合！"
20006-170 = "靈感在研究室外面\n也能得到很多啊。"
20006-180 = "像是捉弄金的時候，\n或是欺負梅的時候……"
20006-190 = "什麼…？\n露出來了？\n什麼東西？"
20006-200 = "生日快樂，老師。"
20006-210 = "雖然沒有禮物，\n不過實驗中的飲料可以給你哦，\n要喝看看嗎？"
20006-220 = "嗚嗚，都還沒\n做出長生不老的靈藥，\n就又長了一歲……"
20006-230 = "嗯？你問我\n在不在意年紀增加？\n哈哈，怎麼會呢。\n我又不是旬教官。"
20006-240 = "沒想到居然能跟老師\n一起迎接新的一年……"
20006-250 = "我今年一定也是大吉沒錯！"
20006-260 = "老師，有想要的東西嗎？"
20006-270 = "雖然沒有黃金，但\n如果是讓手腳染上金色的藥的話\n倒是可以給你哦。哈哈哈！"
20006-280 = "Trick or Treat！\n不給零食就搗蛋！"
20006-290 = "不過給了零食\n還是要搗蛋，\n唔哈哈哈！"
20006-310 = "哼哼……原來如此，\n這真的是\n非常強烈的臭味呢……"
20006-320 = "這樣確實很難入口……"
20006-330 = "那首先，\n為了消除腥臭味，\n先來一匙除臭劑……"
20006-340 = "然後再加入兩匙辣椒粉，\n讓味覺變遲鈍……"
20006-350 = "變好吃吧～變好吃～"
20006-360 = "啊，啊咧？\n不小心放太多辣椒粉了！"
20006-370 = "嘛，這種小事\n應該不用太擔心。"
20006-380 = "只要再多加一點除臭劑，\n應該就沒事了！"
20006-2600 = "我不只擅長研究，\n射擊的能力也是天才哦！"

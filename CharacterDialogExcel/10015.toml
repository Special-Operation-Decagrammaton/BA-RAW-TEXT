[translation]
10015-10 = "蔚藍檔案。"
10015-20 = "勇者啊。願光與你同在。"
10015-30 = "該準備\n二周目了呢。"
10015-40 = "愛麗絲也\n想喝咖啡。"
10015-50 = "休息很重要。\n因為可以恢復HP。"
10015-60 = "還想和老師\n一起打副本。\n所以想要傳訊息\n給老師的帳號。"
10015-70 = "請摸摸\n愛麗絲吧。\n愛麗絲的人造蛋白質\n皮膚會變得暖暖的。"
10015-80 = "歡迎你來，老師。\n愛麗絲一直\n在等著老師。"
10015-90 = "今天打算\n進行什麼樣的冒險呢？"
10015-100 = "愛麗絲已經做好一起\n踏上旅途的準備了。"
10015-110 = "新遊戲即將開賣！\n老師也會一起玩吧？"
10015-120 = "唔嗯，肚子餓了。\n咦…？"
10015-130 = "愛麗絲不吃乾電池！"
10015-140 = "已經幾千年\n沒有人類來過這裡了呢…"
10015-150 = "突然很想\n說說看這句台詞。"
10015-160 = "雖然不知道原因，\n但是愛麗絲可以流淚。"
10015-170 = "應該是眼球型\n攝影機的清潔功能。"
10015-180 = "老師。\n下一個目的地是遊戲中心…"
10015-190 = "愛，愛麗絲\n不會說謊！"
10015-200 = "是老師人生中\n第一次連線的日子呢。\n這一刻對愛麗絲來說\n是最棒的禮物。"
10015-210 = "恭喜你，老師。"
10015-220 = "愛麗絲的生日，\n就是和大家相遇的今天。"
10015-230 = "也就是與老師\n初次見面的那一天。"
10015-240 = "新年快樂。"
10015-250 = "…啊，現在不是做這種事的時候！"
10015-260 = "老師！正月活動\n已經開始了唷！"
10015-270 = "聖誕老人好像會\n送禮物給乖巧的孩子。"
10015-280 = "愛麗絲想要\n收到老師。"
10015-290 = "鬼一點都不可怕。\n因為暗屬性肯定會\n害怕光屬性才對。"
10015-310 = "愛麗絲不覺得奇普托斯……\n不存在魔法。"
10015-320 = "魔法是存在的。\n因為老師現在，\n就讓愛麗絲感覺到幸福。"
10015-330 = "遊戲之所以有趣\n是因為裡面充滿了\n世界中的美好事物。"
10015-340 = "這是從老師身上學到的。"
10015-350 = "不管是遊戲、貓、還是朋友…\n就連現在這個瞬間也是。"
10015-360 = "這個世界上有著許多美好的事物。"
10015-370 = "愛麗絲還想要知道更多。\n和老師一起…"
10015-380 = "學習更多這個世界的事情！"
10015-2600 = "這就是……傳說中的聖劍……\n啊，是槍才對。"

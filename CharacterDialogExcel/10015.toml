[translation]
10015-10 = "Blue Archive"
10015-20 = "ผู้กล้าเอ๋ย... ขอแสงสว่างจงสถิตอยู่กับท่าน"
10015-30 = "ตอนนี้คงต้องเตรียมพร้อม\nสำหรับเล่นเกมวนใหม่อีกครั้ง\nแล้วล่ะค่ะ"
10015-40 = "อาริสึเอง\nก็อยากดื่มกาแฟเหมือนกันค่ะ"
10015-50 = "เวลาพักผ่อนสำคัญมากนะคะ\nเพราะจะได้ฟื้นฟู HP ยังไงล่ะคะ"
10015-60 = "วันนี้อยากไปลงดันเจี้ยน\nกับคุณครูอีกสักครั้งค่ะ\nแล้วจะส่งข้อความไปนะคะ"
10015-70 = "อาริสึอยากให้คุณครู\nลูบหัวอาริสึจังเลยค่ะ\nผิวหนังเทียมของอาริสึ\nจะรู้สึกร้อนๆ ขึ้นมาเลยค่ะ"
10015-80 = "เชิญเลยค่ะ คุณครู\nอาริสึ กำลังรอคุณครูอยู่เลยค่ะ"
10015-90 = "วันนี้คุณครูจะออกผจญภัย\nไปที่ไหนเหรอคะ?"
10015-100 = "อาริสึพร้อมออกเดินทาง\nไปผจญภัยกับคุณครูแล้วค่ะ"
10015-110 = "เกมใหม่กำลังจะวางขายแล้วค่ะ!\nคุณครูจะเล่นเกมนี้กับอาริสึ\nด้วยใช่มั้ยคะ?"
10015-120 = "อืม... หิวจังเลย หือ...?"
10015-130 = "อาริสึไม่ได้เติมพลังจากแบตเตอรี่นะคะ!"
10015-140 = "เป็นเวลาหลายพันปีมาแล้วที่มนุษย์\nได้ย่างกรายเข้ามายังที่แห่งนี้..."
10015-150 = "ไม่รู้ว่าทำไมอาริสึถึงอยาก\nลองพูดบทพูดแบบนี้ดูค่ะ"
10015-160 = "ถึงจะไม่ค่อยเข้าใจ แต่บทพูดนี้\nก็ทำให้อาริสึน้ำตาคลอเลยค่ะ"
10015-170 = "หรือว่ามันอาจเป็นแค่การทำ\nความสะอาดกล้องที่ดวงตา\nของอาริสึเฉยๆ ก็ได้ค่ะ"
10015-180 = "คุณครูคะ เป้าหมายต่อไปคือ\nร้านเกมตู้..."
10015-190 = "อะ...อาริสึ ไม่มีทาง\nพูดคำหลอกลวงเด็ดขาดเลยค่ะ!"
10015-200 = "วันนี้เป็นวันที่คุณครูเชื่อมต่อเข้า\nมายังโลกเป็นวันแรกสินะคะ\nช่วงเวลานั้น สำหรับอาริสึแล้ว...\nนับเป็นของขวัญที่ดีที่สุดเลยค่ะ"
10015-210 = "สุขสันต์วันเกิดนะคะ คุณครู"
10015-220 = "วันเกิดของอาริสึคือวันที่\nได้มาพบกับทุกๆ คนค่ะ"
10015-230 = "มันเป็นวันที่อาริสึได้มาเจอ\nกับคุณครูครั้งแรกค่ะ"
10015-240 = "ขอให้มีความสุขในวันปีมะ..."
10015-250 = "มะ...มีเวลามาทำแบบนี้ที่ไหนกันล่ะคะ!"
10015-260 = "คุณครู!\nกิจกรรมวันปีใหม่เริ่มขึ้นแล้วค่ะ!"
10015-270 = "ได้ยินว่าซานตาคลอส\nจะให้ของขวัญกับเด็กดีค่ะ"
10015-280 = "อาริสึอยากได้...\nอาริสึอยากได้คุณครูเป็นของขวัญค่ะ"
10015-290 = "สิ่งที่เรียกว่าวิญญาณ...\nอาริสึไม่กลัวหรอกค่ะ พวกที่มีธาตุมืด\nย่อมต้องแพ้ธาตุแสงอยู่แล้วค่ะ"
10015-310 = "อาริสึคิดว่าที่คิโวทอส\nมีเวทมนตร์อยู่จริงค่ะ"
10015-320 = "เวทมนตร์มีอยู่จริงนะคะ\nตอนนี้คุณครูทำให้\nอาริสึมีความสุขมากๆ เลยค่ะ"
10015-330 = "เหตุผลที่อาริสึชอบเล่นเกม...\nนั่นก็เพราะในโลกของเกม\nมีความงดงามของโลกใบนี้อยู่"
10015-340 = "ฉันได้เรียนรู้เรื่องนี้มาจากคุณครูค่ะ"
10015-350 = "ทั้งการเล่นเกม ทั้งเจ้าเหมียวน้อย\nพวกเพื่อนๆ... แล้วก็ช่วงเวลานี้..."
10015-360 = "โลกใบนี้\nเต็มไปด้วยความงดงามค่ะ"
10015-370 = "อาริสึอยากจะเรียนรู้สิ่งต่างๆ ให้มากกว่านี้\nไปพร้อมๆ กับคุณครูค่ะ!"
10015-380 = "อาริสึอยากเรียนรู้โลกใบนี้ให้มากกว่านี้ค่ะ!"
10015-2600 = "นี่คือ... ดาบวิเศษในตำนาน...\nไม่สิ ปืนนี่นา"

[translation]
10015-10 = "Blue Archive"
10015-20 = "Go with the light at your back, hero."
10015-30 = "I must prepare for round two."
10015-40 = "I would also like a cup of coffee."
10015-50 = "It is important to take a few breaks. They restore your HP."
10015-60 = "I want to go on another raid. Expect a DM later, Sensei."
10015-70 = "I like to be petted. It warms my artificial proteinic skin."
10015-80 = "Welcome, Sensei. I have been waiting for you."
10015-90 = "What kind of adventure will you embark upon today?"
10015-100 = "I am ready to accompany you at any time."
10015-110 = "A new game is coming out soon! You will play it with me, correct?"
10015-120 = "Mmm. I am hungry. Huh...?"
10015-130 = "No! I do not eat batteries!"
10015-140 = "It has been many a millennium since humans last set foot here..."
10015-150 = "I have always wanted to say that."
10015-160 = "I do not know why, but I can shed tears."
10015-170 = "They must be to wash my ocular lenses."
10015-180 = "Sensei, our next destination is an arcade..."
10015-190 = "L-Lying? I would never!"
10015-200 = "Today marks the anniversary of the first day you logged in to your life. To me, that moment is the best gift I have ever received."
10015-210 = "Congratulations, Sensei."
10015-220 = "Today is my birthday. The day I got to meet everyone."
10015-230 = "It is also the day I met you for the first time."
10015-240 = "Happy New Year..."
10015-250 = "Abort! Now is not the time for that!"
10015-260 = "Sensei! The New Year's event is underway!"
10015-270 = "Santa Claus allegedly leaves presents for good boys and girls."
10015-280 = "I hope you will be my gift, Sensei."
10015-290 = "Ghosts are not scary. Dark-type monsters are weak to light-type spells."
10015-310 = "I believe magic exists in Kivotos as well."
10015-320 = "It must. How else could you make me so happy, Sensei?"
10015-330 = "Games are fun because they reflect the beauty of the world."
10015-340 = "You taught me that."
10015-350 = "Games, cats, friends...and even this moment."
10015-360 = "The world is full of beautiful things."
10015-370 = "And I want to know more of them. Together with you, Sensei."
10015-380 = "I want to learn more about this world!"
10015-2600 = "This is the...legendary holy sword...! Oh, it is a gun."

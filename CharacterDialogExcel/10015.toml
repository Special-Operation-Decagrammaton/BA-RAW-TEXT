[translation]
10015-10 = "블루 아카이브"
10015-20 = "용사여. 빛이 당신과 함께 합니다."
10015-30 = "이제 2회차를\n준비해야겠군요."
10015-40 = "아리스도 커피가\n먹고 싶습니다."
10015-50 = "휴식은 중요합니다.\nHP가 회복되니까요."
10015-60 = "선생님이랑 또\n레이드 가고 싶습니다.\n계정에 말을\n걸어봐야겠습니다."
10015-70 = "아리스를 쓰담쓰담\n해주면 좋습니다.\n아리스의 인조 단백질\n피부가 따스해집니다."
10015-80 = "어서 오세요 선생님.\n아리스, 선생님을\n기다리고 있었습니다."
10015-90 = "오늘은 어떤 모험을\n떠나실건가요?"
10015-100 = "아리스는 함께 떠날\n준비가 되어 있습니다."
10015-110 = "신작 게임이 곧 발매된대요!\n선생님도 같이 하실 거죠?"
10015-120 = "으음. 배가 고픕니다. 응…?"
10015-130 = "아리스는 건전지를 먹지 않습니다!"
10015-140 = "인간이 이곳에 온 것은\n수천 년 만이군…."
10015-150 = "왠지 이런 대사가\n해보고 싶었습니다."
10015-160 = "이유는 모르겠지만,\n아리스는 눈물을 흘릴 수 있습니다."
10015-170 = "아마 안구형 카메라\n세척용일겁니다."
10015-180 = "선생님.\n다음 목적지는 오락실…."
10015-190 = "아, 아리스는 거짓말\n하지 않습니다!"
10015-200 = "선생님의 인생 첫 접속일이군요.\n바로 그 순간이, 아리스에게는…\n최고의 선물입니다"
10015-210 = "축하드립니다. 선생님."
10015-220 = "아리스의 생일은,\n모두와 만난 오늘입니다."
10015-230 = "선생님과 처음 만났던,\n바로 그 날입니다."
10015-240 = "새해 복 많이 받…"
10015-250 = "을 틈이 어디 있나요!"
10015-260 = "선생님!\n새해 이벤트가 시작되었어요!"
10015-270 = "산타클로스는 착한 아이에게\n선물을 준다네요."
10015-280 = "아리스는 선생님을\n받고 싶습니다."
10015-290 = "귀신이라는 존재는\n무섭지 않습니다.\n분명 어둠 속성은\n빛 속성에 약할 테니까요."
10015-310 = "아리스는 키보토스에,\n마법이 없다고 생각하지 않습니다."
10015-320 = "마법은 있습니다.\n선생님은 지금, 아리스를\n행복하게 만들었으니까요."
10015-330 = "게임이 재미있는 이유는\n그것이 이 세상의 아름다움을\n담고 있기 때문임을"
10015-340 = "선생님을 통해 알게 되었습니다."
10015-350 = "게임도, 고양이도, 친구들도…\n그리고 이 순간도."
10015-360 = "이 세상에는 아름다운\n것들이 많습니다."
10015-370 = "아리스는 더 알고 싶습니다.\n선생님과 함께…"
10015-380 = "이 세상을 더 배우고 싶습니다!"
10015-2600 = "이것이… 전설의 성검…\n아, 총이네요."

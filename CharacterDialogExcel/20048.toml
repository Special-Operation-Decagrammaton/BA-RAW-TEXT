20048-740 = "And sprawled out on a board, at that..."
20048-750 = "...? Can I ask what happened?"
20048-760 = "The ocean is a dangerous place. Even the slightest mistake could lead to a serious accident."
20048-770 = "I'm having trouble understanding. "
20048-780 = "The proper response will vary based on your situation. Please tell me what happened... "
20048-790 = "Aha. I understand now. "
20048-800 = "I'm relieved nothing terrible happened."
20048-810 = "They say that learning to balance is the first hurdle of surfing. "
20048-820 = "It's a difficult obstacle that everyone struggles with initially."
20048-830 = "However...when you're resting like this..."
20048-840 = "...your body will get cold out on the water."
20048-850 = "Come this way."
20048-860 = "I have some warm drinks prepared."
20048-2600 = "It's a small and light gun, but the responsibility it represents is a heavy weight. I'm more than aware of this. So please watch over me, Sensei."

20048-700 = "呵呵，那就給糖吧。\n這是用紅茶的茶葉\n製成的點心，請享用。"
20048-710 = "做好準備是個正確的決定呢。\n光是能見到老師的那個表情，\n我就很滿足了。"
20048-730 = "……您怎麼會\n在這種地方呢？"
20048-740 = "而且還癱軟成這樣……"
20048-750 = "……？\n能請您再說明得\n具體一點嗎？"
20048-760 = "大海，可是只要一個不小心\n就可能導致危險事故的地方呢。"
20048-770 = "我實在難以理解……"
20048-780 = "由於根據情況，\n應對方式也會不同……"
20048-790 = "原來如此，\n是這麼回事啊。"
20048-800 = "似乎不是陷入危險狀態，\n我就放心了。"
20048-810 = "掌握平衡感，可說是\n衝浪的第一道難關。"
20048-820 = "剛開始的時候，\n任何人都會經歷這段時期。"
20048-830 = "話雖如此……\n就算要休息，"
20048-840 = "那樣也會讓身體著涼的。"
20048-850 = "請到這邊來吧。"
20048-860 = "我準備了溫熱的飲料。"
20048-2600 = "雖然是把小型的手槍……\n但它所肩負的責任卻絕對不輕。\n為了不被這份重量壓垮，還請您守望著我。"

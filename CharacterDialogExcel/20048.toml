20048-710 = "ดีนะคะที่ฉันพกติดตัวมาด้วย\nพอได้เห็นสีหน้านั้นของคุณครู\nฉันก็พอใจแล้วค่ะ"
20048-730 = "มาทำอะไรอยู่ในที่แบบนี้คะ?"
20048-740 = "อ่อนระโหยโรยแรงอยู่บนกระดานเลย..."
20048-750 = "...? ขอถามเจาะจง\nมากกว่านี้หน่อยได้มั้ยคะ?"
20048-760 = "ก็ทะเลเป็นที่ที่ทำอะไรผิดพลาด\nนิดหน่อย ก็นำไปสู่อุบัติเหตุ\nอันตรายๆ ได้เลยนี่คะ"
20048-770 = "เข้าใจได้ยากจังเลยนะคะ... "
20048-780 = "เราต้องรับมือต่างกันตามสถานการณ์\nเพราะงั้นช่วยอธิบายอีกหน่อย... "
20048-790 = "อ้อ เป็นอย่างนี้เองสินะคะ "
20048-800 = "ฟังดูไม่ใช่สถานการณ์อันตราย\nถ้างั้นฉันก็วางใจค่ะ"
20048-810 = "จนกว่าจะเรียนรู้การทรงตัวได้\nก็ยังเรียกว่าอยู่ในความยากลำบากแรก\nของการเล่นเซิร์ฟอยู่ค่ะ "
20048-820 = "ในครั้งแรก ไม่ว่าใครก็\nต้องเจอแบบนี้ทั้งนั้นค่ะ"
20048-830 = "แต่ว่า... ต่อให้หยุดพักบ้าง"
20048-840 = "แต่ถ้าอยู่แบบนั้น\nตัวจะยิ่งเย็นลงนะคะ"
20048-850 = "มาทางนี้สิคะ"
20048-860 = "ฉันเตรียมเครื่องดื่ม\nอุ่นๆ มาด้วยค่ะ"
20048-2600 = "ถึงจะเป็นปืนขนาดเล็กและเบา\nแต่น้ำหนักความรับผิดชอบที่เป็นสัญลักษณ์\nของปืนนี้ไม่เคยเบาเลย เรื่องนั้นฉัน\nเข้าใจได้อย่างถ่องแท้ค่ะ\nเพราะงั้นก็เฝ้าดูฉันด้วยนะคะ คุณครู"

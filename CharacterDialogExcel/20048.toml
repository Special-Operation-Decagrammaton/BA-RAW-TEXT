20048-710 = "준비해 두길 잘했네요.\n선생님의 그 표정을\n볼 수 있어서, 만족입니다."
20048-730 = "이런 곳에서 어쩐 일이신가요?"
20048-740 = "보드 위에 축 늘어져서……"
20048-750 = "……? 좀 더 구체적으로\n여쭤봐도 될까요?"
20048-760 = "바다는, 조금만 잘못해도\n위험한 사고로\n이어질 수 있는 장소니까요."
20048-770 = "이해하기 어렵네요……. "
20048-780 = "상황에 따라서 대응이 달라질 수\n있으니 좀 더 자세히……. "
20048-790 = "아하, 그런 일이었군요. "
20048-800 = "위험한 상태는\n아니었던 것 같아서 안심입니다."
20048-810 = "균형 감각을 잡기까지가\n서핑의 첫 번째 고비라고들 합니다. "
20048-820 = "처음에는 누구나\n겪을 수밖에 없는 일이죠."
20048-830 = "하지만…… 휴식을 취하더라도,"
20048-840 = "그런 상태로는\n몸이 차가워져 버릴 거예요."
20048-850 = "이쪽으로 오세요."
20048-860 = "따뜻한 음료가\n준비되어 있답니다."
20048-2600 = "작고 가벼운 총이지만, 이것이 상징하는\n책임의 무게는 절대 가볍지 않다는 것.\n그것만큼은 확실히 인지하고 있습니다.\n그러니 지켜봐 주세요, 선생님."

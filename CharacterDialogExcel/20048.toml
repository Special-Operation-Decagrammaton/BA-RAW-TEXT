[translation]
20048-10 = "Blue... Archive"
20048-20 = "มาแล้วเหรอคะ คุณครู\nขอให้มีวันหยุดพักผ่อนที่สงบสุขนะคะ"
20048-30 = "(ตรงไหนมีเก้าอี้\nที่พอเอนหลังได้\nบ้างมั้ยคะ...)"
20048-40 = "วันนี้ถึงฉันจะ\nขอขี้เกียจหน่อย\nก็ไม่เป็นไรใช่มั้ยคะ...?"
20048-50 = "สดชื่นจังเลยนะคะ...\nถึงจะไม่เท่ากับ\nลมทะเลก็เถอะ"
20048-60 = "ฉันจะเอาไปอ้างอิง\nการตกแต่งในสภาน้ำชาค่ะ"
20048-70 = "ระหว่างรอคุณครู\nฉันดื่มกาแฟสักถ้วยดีมั้ยคะ?"
20048-80 = "กำลังรออยู่เลยค่ะ คุณครู"
20048-90 = "ฉันดูปริมาณงานแล้วค่ะ... "
20048-100 = "วันนี้น่าจะทำ\nแบบไม่รีบร้อนได้นะคะ"
20048-110 = "แน่นอนว่าฉันก็จะช่วยค่ะ"
20048-120 = "เอกสารเหรอคะ?\nดื่มชาสักแก้วก่อนเถอะค่ะ"
20048-130 = "ตอนนี้สิ่งที่สำคัญ\nไม่ใช่อันนั้นนะคะ"
20048-140 = "ต่อให้เป็นงานเดียวกัน\nแต่หลังจากพักร้อนกลับมา\nก็รู้สึกว่ามันหนักกว่าเดิมนะคะ"
20048-150 = "แต่การพักผ่อนหลังจากงานเสร็จ\nมันย่อมหอมหวานอยู่แล้ว..."
20048-160 = "นี่เป็นหลักการเดียวกับ\nชายิ่งขม ขนมก็ยิ่งหวานค่ะ"
20048-170 = "แน่นอนว่าฉันก็มีวันที่\nอยากกินแต่ขนมเป็นกำมือเลย..."
20048-180 = "เอาละ ถ้างั้นก็\nมาเริ่มงานกันอีกครั้งมั้ยคะ?"
20048-190 = "ฮุฮุ สุขสันต์วันเกิดนะคะคุณครู"
20048-200 = "ฉันจองรีสอร์ตไว้ให้ค่ะ"
20048-210 = "มาใช้เวลาของวันนี้\nแบบที่ไม่มีใครรบกวนมั้ยคะ?"
20048-220 = "หมายถึงชุดนี้น่ะเหรอคะ?"
20048-230 = "ฉันจะเชื่อมโยงฤดูร้อนกับชุดว่ายน้ำ\nกับวันเกิดของฉันให้คุณครูเห็นน่ะค่ะ"
20048-240 = "เมื่อฤดูกาลนี้มาถึง\nจะได้ยิ่งคิดถึง"
20048-250 = "และเพื่อการนั้น\nก็ต้องทำอะไรที่กระตุ้นใจหน่อยสิคะ?"
20048-260 = "ถึงงานจะเยอะ แต่ขอให้\nเป็นปีที่จิตใจสงบนะคะ"
20048-270 = "สวัสดีปีใหม่ค่ะ"
20048-280 = "ส่วนชุดนี้"
20048-290 = "ฉันใส่เพื่อเป็นการ...\nอธิษฐานต่อสิ่งนั้น"
20048-300 = "..."
20048-310 = "ฮัดชิ้ว"
20048-320 = "ถ้าไม่มีนัดอะไรละก็..."
20048-330 = "มาดื่มชาแล้วกินขนม\nที่หน้าเตาผิงด้วยกันมั้ยคะ?"
20048-340 = "ในงานเทศกาล เราไม่จำเป็นต้อง\nเอาแต่เล่นโหวกเหวกนี่คะ"
20048-350 = "ถึงจะเป็นวันฮาโลวีน\nแต่ฉันก็ไม่ค่อยกล้า\nใส่ชุดนี้เดินตามถนนหรอกค่ะ"
20048-360 = "ยังไงงานที่ต้องทำวันนี้\nก็มีเยอะจนกองเท่าภูเขาเลยค่ะ"
20048-370 = "คะ? ทริก ออร์ ทรีต...?"
20048-380 = "ฮุฮุ งั้นเอาทรีต\nนี่คือขนมที่ทำจาก\nใบชาแดงค่ะ ลองทานดูสิคะ"
20048-390 = "ดีนะคะที่ฉันพกติดตัวมาด้วย\nพอได้เห็นสีหน้านั้นของคุณครู\nฉันก็พอใจแล้วค่ะ"
20048-400 = "กำลังรออยู่เลยค่ะ คุณครู"
20048-410 = "ฉันดูปริมาณงานแล้วค่ะ..."

[translation]
20048-10 = "블루…… 아카이브."
20048-20 = "오셨군요, 선생님.\n모쪼록 평안한 휴양이 되길 바랍니다."
20048-30 = "(어디 누울 만한\n의자가\n없을까요…….)"
20048-40 = "오늘만큼은 조금\n게으름을 피워도\n괜찮겠죠……?"
20048-50 = "쾌적하군요……\n바닷바람만큼은\n아니지만."
20048-60 = "티파티의 인테리어에\n참고할 만하겠어요."
20048-70 = "선생님을 기다리며,\n커피 한잔해 볼까요."
20048-80 = "많이 기다리셨습니다 선생님."
20048-90 = "업무량을 확인했습니다만……. "
20048-100 = "오늘은 느긋하게\n할 수 있을 것 같습니다."
20048-110 = "물론, 제가 도와드리니까요."
20048-120 = "서류요?\n일단 차 한 잔 먼저 하시죠."
20048-130 = "지금 중요한 건\n그게 아니랍니다."
20048-140 = "똑같은 업무라도, \n휴가 이후에는\n더 무겁게 느껴지는군요."
20048-150 = "하지만 일을 해야 이후의\n휴식이 더 달콤해지는 법……."
20048-160 = "차가 쌉쌀할수록 과자가\n더 달아지는 것과 같은 원리죠."
20048-170 = "물론, 저도 종종 과자만 한 움큼\n먹고 싶은 날도 있지만……."
20048-180 = "자, 그럼 다시\n일을 시작해 볼까요?"
20048-190 = "후후, 생신 축하해요, 선생님."
20048-200 = "리조트 호텔을 예약했습니다."
20048-210 = "오늘만큼은 방해받지 않는\n하루를 보내시는 게 어떨까요?"
20048-220 = "이 차림 말인가요?"
20048-230 = "선생님께 여름과 수영복이란 요소를\n제 생일과 연관 지어보려고요."
20048-240 = "이 계절이 되면\n떠올리실 수 있도록."
20048-250 = "그러기 위해서는,\n약간 자극적인 편이 효과적이겠지요?"
20048-260 = "일이 많아도 마음만은\n편안한 한 해가 되시길."
20048-270 = "새해 복 많이 받으세요."
20048-280 = "그리고 이 차림은"
20048-290 = "그걸 기원하기 위한 것……\n이라는 걸로."
20048-300 = "……"
20048-310 = "에취."
20048-320 = "혹시 약속이 없으시다면…… "
20048-330 = "함께 벽난로 앞에서\n다과를 즐기는 건 어떠신가요?"
20048-340 = "떠들썩하게 노는 것만이\n축제를 보내는 방법은 아니니까요."
20048-350 = "아무리 할로윈이라고 해도,\n이 차림으로 거리를\n돌아다니는 것은 망설여지네요."
20048-360 = "어차피, 오늘 중으로 처리해야 할\n일이 산더미이기도 하고요."
20048-370 = "네? 트릭 오어 트릿……?"
20048-380 = "후후, 그럼 트릿을.\n홍차 잎을 사용한\n과자랍니다. 드세요."
20048-390 = "준비해 두길 잘했네요.\n선생님의 그 표정을\n볼 수 있어서, 만족입니다."
20048-400 = "많이 기다리셨습니다 선생님."
20048-410 = "업무량을 확인했습니다만……. "

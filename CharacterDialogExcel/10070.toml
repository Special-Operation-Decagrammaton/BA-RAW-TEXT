[translation]
10070-10 = "Blue Archive"
10070-20 = "ฉันคือโคโนเอะ มินะ หัวหน้าคณะกรรมการมังกรดำ\nสังกัดโรงเรียนมัธยมซานไห่จิง สิ่งที่ขัดขวางอนาคตของพวกเรา\nฉันจะจัดการมันให้สิ้นซาก!"
10070-30 = "เรือหลงน่านน้ำย่อมต้องการ\nประภาคารเอาไว้พึ่งพิง\nเพราะงั้นแล้ว ครู... เอ่อ...\nถือซะว่าไม่ได้ยินอะไรละกัน!"
10070-40 = "กลิ่นชาอันหอมหวาน…\nถึงฉันจะยังชงไม่ค่อยเก่ง\nแต่ก็ชงออกมาได้หอมดีทีเดียว"
10070-50 = "สถานที่ที่สัมผัสได้ถึง\nการเคลื่อนไหวอันสงบนิ่ง…\nคงหมายถึงที่แห่งนี้นี่ละ"
10070-60 = "คาเฟ่ของซานไห่จิง\nความจริงแล้วมันคล้าย\nกับร้านน้ำชามากกว่า…"
10070-70 = "กลิ่นหอมดี...\nถ้างั้นผ่อนคลายลงอีกสักนิด\nดีมั้ยนะ..."
10070-80 = "อ้าว คุณครูเองเหรอ\nไม่คิดเลยว่าจะเจอกันในที่แบบนี้\nโลกมันแคบดีเนอะ..."
10070-90 = "หืม? ต้องเจอกันอยู่แล้ว\nเพราะที่นี่คือชาเล่ต์งั้นเหรอ...?"
10070-100 = "นะ... นั่นสินะ"
10070-110 = "ฉันกำลังรออยู่เลยคุณครู"
10070-120 = "วันนี้โลกจะเตรียมอะไร\nไว้รอพวกเราอยู่นะ?\nน่าตื่นเต้นจริงๆ"
10070-130 = "มนุษย์ไม่อาจใช้ชีวิตตัวคนเดียวได้..."
10070-140 = "ถึงจะเป็นถ้อยคำที่ได้ยินหนาหู\nแต่ฉันก็ไม่ได้เกลียดมันหรอกนะ"
10070-150 = "มนุษย์เป็นสิ่งมีชีวิต\nที่ปกป้องผู้อื่น…\nและไว้เนื้อเชื่อใจกันและกันด้วย"
10070-160 = "ฉันควรเชื่อใจคุณครูมั้ย\nหรือว่า..."
10070-170 = "ไม่ต้องเป็นห่วงขนาดนั้นก็ได้\nคุณครู เดี๋ยวพอวันพรุ่งนี้\nก็จะไม่เป็นอะไรแล้ว"
10070-180 = "หนังมันเป็นอะไรที่ดีนะ\nโดยเฉพาะเรื่องที่ผ่าน\nการทดสอบจากกาลเวลามาแล้วน่ะ"
10070-190 = "มันไม่ได้กลายเป็นหนังในตำนาน\nเพราะเป็นผลงานชิ้นเอกหรอกนะ\nแต่มันกลายเป็นตำนานไป\nถึงเรียกว่าผลงานชิ้นเอกยังไงล่ะ"
10070-200 = "บางครั้งฉันก็หวังว่า\nจะเป็นใครคนอื่นได้..."
10070-210 = "อยากเป็นอะไรก็ได้\nที่โดดเด่นกว่าตัวเองในตอนนี้"
10070-220 = "บางทีเพราะแบบนั้น...\nฉันถึงสนุกกับการดูหนังสินะ"
10070-230 = "สุขสันต์วันเกิดนะ คุณครู\nยังจะถามอีก ก็วันเกิดคุณครูไง"
10070-240 = "เอ้า ของขวัญจากฉัน...\nหนังฟิล์มนัวร์ 10 แผ่น\nที่ฉันตั้งใจคัดมาแล้ว!"
10070-250 = "เอาละ มาดูกันเลย!"
10070-260 = "ฮู่ว... ความรู้สึกของการได้รับ\nคำอวยพรจากคุณครู\nมันก็ไม่แย่เลยนะ"
10070-270 = "นั่งแช่อยู่ที่โต๊ะทั้งวัน\nมันคงไม่ดีต่อสุขภาพ\nหรอกนะว่ามั้ย?"
10070-280 = "วันนี้ออกไปเที่ยวกับฉัน\nก็แล้วกัน!"
10070-290 = "ปีใหม่แล้วสินะ…\nสวัสดีปีใหม่ คุณครู"
10070-300 = "คุณครูตั้งเป้าหมายในปีนี้\nแล้วหรือยังน่ะ?"
10070-310 = "แน่นอนว่าฉัน…\nจะใช้ชีวิตให้เต็มที่ยิ่งกว่าเดิม"
10070-320 = "เทศกาล... คริสต์มาสเหรอ?"
10070-330 = "คำว่า 'เทศกาล' ถูกนำมาใช้\nในหลายความหมายมากเลยเนอะ"
10070-340 = "ทำไมมองแบบนั้นล่ะ...?\nไม่ได้มีอะไรลึกซึ้งหรอก"
10070-350 = "ฮาโลวีนเหรอ…\nเป็นเทศกาลที่พวกเด็กๆ\nชื่นชอบกันสินะ"
10070-360 = "นานๆ ทีแวะไปแจกลูกกวาด\nที่สวนต้นบ๊วยดีมั้ยนะ..."
10070-370 = "ถ้าไม่ว่าอะไร\nครูก็มาร่วมงานด้วยกันมั้ย?"
10070-390 = "ใช่... ฉันชอบบรรยากาศ\nในวันฝนตกนะ"
10070-400 = "หลายๆ อย่าง มันดูเรียบง่ายดี"
10070-410 = "ขาวกับดำ...\nเป็นโลกของฟิล์มนัวร์"
10070-420 = "โลกในความเป็นจริง...\nเต็มไปด้วยแสงระยิบระยับ\nจนแสบตา"
10070-430 = "แต่คนส่วนใหญ่กลับไม่ตระหนัก\nถึงความเป็นจริงนั้น..."
10070-440 = "แม้แต่ตัวฉันเอง...\nก็ไม่มีข้อยกเว้น"
10070-450 = "แต่โลกของฟิล์มนัวร์ มันไม่เป็นแบบนั้น"
10070-460 = "อย่างน้อยมันเป็นโลกที่เข้าใจได้ง่าย"
10070-470 = "มันไม่ได้หวือหวาอะไร"
10070-480 = "ขอแค่มีร่มกันฝนที่มีสีสันสดใส\nเพื่อไม่ให้หลงทางก็พอ"
10070-2600 = "เยี่ยมเลย... เหมาะมือมาก\nราวกับว่ามันเป็นของฉันมา\nตั้งแต่แรกเลย... ฮุฮุ พร้อมแล้ว\nเอาละ ไปกันเลยมั้ย"

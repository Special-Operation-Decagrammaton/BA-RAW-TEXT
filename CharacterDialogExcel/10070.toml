[translation]
10070-10 = "블루, 아카이브."
10070-20 = "산해경 고급중학교 소속 현룡문 집행부장 코노에 미나다.\n우리의 앞길을 막는 건, 모두 내가 처리하겠다!"
10070-30 = "길을 잃은 배에게는,\n기댈 수 있는 등대가 필요하다.\n그러니까, 선생님이… 그…\n역, 역시 못 들은 걸로 해줘!"
10070-40 = "향긋한 차향이다…\n아직 잘하지는\n못하지만, 좋군."
10070-50 = "정적인 움직임을\n느끼는 장소란…\n바로 이곳을\n가리키는 것이겠지."
10070-60 = "산해경의 카페는,\n실제로는 찻집에\n가깝지…"
10070-70 = "향이 좋군…\n조금, 어깨의 힘을\n빼도록 할까."
10070-80 = "아, 선생님인가.\n이런 장소에서 만나다니,\n세상은 좁군…"
10070-90 = "응?\n여긴 샬레니까\n당연하다고…?"
10070-100 = "그, 그런가."
10070-110 = "기다렸어, 선생님."
10070-120 = "오늘은 어떤 세계가\n우리를 맞아 주는 것일까.\n설레는군."
10070-130 = "사람은 혼자서는\n살 수 없다…"
10070-140 = "흔한 말이지만.\n뭐 싫지는 않아."
10070-150 = "사람은 다른 사람을\n경계하는 생물이다…\n그리고 그만큼\n신용하기도 하지."
10070-160 = "나는, 선생님을\n믿어야 하는 것일까,\n아니면…"
10070-170 = "그렇게 걱정하지\n말라고, 선생님.\n내일이면 다 괜찮아질 테니까."
10070-180 = "영화는 좋은 거야.\n세월이라는 이름의 품질보증서가\n포함된 것은 더 좋고."
10070-190 = "명작이어서\n살아남은 게 아니야.\n살아남았기 때문에\n명작이라고 부르는 거다."
10070-200 = "가끔 누군가가\n되고 싶다고\n생각하곤 하지."
10070-210 = "무엇이든 좋으니,\n지금의 자신보다도\n뛰어난 무언가가―"
10070-220 = "그런가. 그래서…\n영화인 건가."
10070-230 = "축하한다고, 선생님.\n뭐냐니, 그거야 선생님의\n생일이지."
10070-240 = "선물은…\n내가 엄선한\n느와르 영화 10선이야!"
10070-250 = "자아, 같이 보자고!"
10070-260 = "후우…\n선생님에게 생일을\n축하받는 이 기분,\n나쁘지 않군."
10070-270 = "하루 종일\n책상에만 앉아 있으면\n몸에 좋지 않겠지?"
10070-280 = "오늘 하루,\n어울려 달라고!"
10070-290 = "새해로군…\n새해 복 많이 받아, 선생님."
10070-300 = "선생님은,\n올해의 목표를 정했나?"
10070-310 = "나는 물론…\n더욱 하드보일드한\n인생을 사는 것이지."
10070-320 = "크리스마스… 축제인가."
10070-330 = "축제라는 말은\n여러 가지 의미로 쓰이는군."
10070-340 = "…왜 그런 눈으로 보지?\n깊은 의미는 없어."
10070-350 = "할로윈인가…\n아이들이 바빠지는 때로군."
10070-360 = "간만에\n매화원에 들러서,\n사탕이라도 나누어 줄까…"
10070-370 = "괜찮다면 선생님도\n함께 하면 어떨까?"
10070-390 = "그래…\n비 오는 날의\n경치는 좋아해."
10070-400 = "여러 가지가\n심플하게 보이지."
10070-410 = "백과 흑.\n느와르의 세계."
10070-420 = "이 세계는, 지나치리만치\n눈부실 정도의 광채로\n이루어져 있지."
10070-430 = "하지만, 사람들은\n그 사실을 깨닫지 못해… "
10070-440 = "나라고 해서\n예외는 아니지만."
10070-450 = "하지만\n느와르의 세계는\n그렇지 않아."
10070-460 = "적어도 명쾌하지."
10070-470 = "다만… 그렇군.\n적어도 우산만큼은…"
10070-480 = "길을 잃지 않도록,\n밝은색의 우산이 좋겠어."
10070-2600 = "훌륭해… 딱 맞잖아. \n마치 처음부터\n내 것이었던 것 같군…\n후후, 준비는 됐다.\n자, 가 볼까."

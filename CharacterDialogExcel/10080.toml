[translation]
10080-10 = "Blue Archive."
10080-20 = "Oh my, I've already introduced myself... Don't you remember? Heehee."
10080-30 = "Oh, the interior is darling!"
10080-40 = "Very sensible."
10080-50 = "And there are so many interesting friends here."
10080-60 = "Maybe...this isn't so dreadful."
10080-70 = "There's no need to overthink things while I'm here. No, this isn't so bad."
10080-80 = "Welcome, Sensei. I've been waiting for quite a while. ☆"
10080-90 = "Oh? I was simply...here. There's no one to chauffeur me, and even if there were, I have no desire to explore."
10080-100 = "A teacher's job in this city is both similar and different to what I know."
10080-110 = "Your work looks terribly difficult... Can I help you in some way? Within reason, of course."
10080-120 = "To be perfectly honest, my head still hurts a bit."
10080-130 = "My remote control? It's important, but... It's not special in and of itself."
10080-140 = "Now that I think of it, do you have any restaurants you can recommend? Please take me there."
10080-150 = "It's your birthday, isn't it? How shall we celebrate?"
10080-160 = "For example... Is there someone you want to be with, maybe?"
10080-170 = "Happy New Year, Sensei. You do say that here, don't you?"
10080-180 = "Christmas... How many times have you played the role of Santa, Sensei?"
10080-190 = "It's so noisy outside. Well... We should be fine here."
10080-210 = "...Hmm? Whatever is the matter?"
10080-220 = "You knew it was going to happen eventually."
10080-230 = "Right?"
10080-240 = "...My remote control? Do you really want to know?"
10080-250 = "Such an indelicate thing to ask!"
10080-260 = "There are some questions..."
10080-270 = "...that you simply can't ask a lady. ☆"
10080-280 = "Understood? You did not see anything. Nothing happened in the first place."
10080-290 = "...Isn't that right, Sensei?"
10080-2600 = "You really are something else. Oh, I don't mean that in a bad way. I usually don't trust people whose thoughts I haven't read, but...let's just say that I don't find you suspicious."

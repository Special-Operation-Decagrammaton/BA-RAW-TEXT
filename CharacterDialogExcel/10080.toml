[translation]
10080-10 = "Blue Archive"
10080-20 = "แหมๆ ฉันเคยแนะนำตัวไปแล้วนี่...\nอย่าบอกนะว่าจำไม่ได้น่ะ? ฮุฮุ"
10080-30 = "อุ๊ยตาย ตกแต่งได้น่ารักจริงๆ เชียว"
10080-40 = "รสนิยมดีนะเนี่ย"
10080-50 = "มีเพื่อนๆ ที่ดูน่าสนใจ\nอยู่เยอะทีเดียว"
10080-60 = "ไม่รู้ทำไม...\nมันอาจจะเงียบสงบก็ได้"
10080-70 = "คงเป็นเพราะที่นี่\nไม่มีอะไรให้ฉันกังวล\nแบบนี้ก็ไม่แย่เท่าไหร่นะ"
10080-80 = "เข้ามาสิ คุณครู\nเห็นอย่างนี้\nฉันก็มารออยู่นานแล้วนะ☆"
10080-90 = "หืม? ฉันก็แค่อยู่ที่นี่น่ะ\nฉันไม่มีไกด์ แล้วก็ไม่ได้\nอยากออกไปไหนด้วย"
10080-100 = "งานของคุณครูที่นี่...\nมีส่วนที่คล้ายและแตกต่าง\nจากสิ่งที่ฉันรู้จักเลย"
10080-110 = "งานดูลำบากจังเลยนะคะ...\nให้ฉันช่วยมั้ย? แน่นอนว่า\nช่วยใน 'แบบทั่วไป' น่ะ"
10080-120 = "ที่จริงตอนนี้\nฉันก็ยังปวดหัวอยู่เลย"
10080-130 = "รีโมตเหรอ? ก็เป็นสิ่งสำคัญนะ...\nแต่มันก็ไม่ได้เป็นของที่พิเศษ\nอะไรหรอก"
10080-140 = "จะว่าไปที่นี่มีอะไรอร่อยเหรอ?\nช่วยพาไปร้านเด็ดๆ หน่อยได้มั้ย?"
10080-150 = "วันนี้วันเกิดคุณครูใช่มั้ย?\nจะอวยพรให้ยังไงดีนะ"
10080-160 = "...จริงสิ\nมีนักเรียนคนไหนที่\nอยากอยู่ด้วยมั้ย?"
10080-170 = "สวัสดีปีใหม่นะคุณครู\n...ที่นี่ก็พูดกันแบบนี้ใช่มั้ย?"
10080-180 = "วันคริสต์มาส...\nคุณครูได้เป็นซานต้า\nมากี่ครั้งแล้วเหรอ?"
10080-190 = "ข้างนอกเสียงดังกันจังเลยนะ\nแต่ว่า... อยู่ที่นี่ไม่น่าจะเป็นอะไรหรอก"
10080-210 = "...ทำไมเหรอ?\nมีเรื่องอะไร\nเกิดขึ้นงั้นเหรอ?"
10080-220 = "สุดท้ายแล้ว ฉันว่าเรื่องนี้ก็น่าจะ\nเกิดขึ้นอยู่แล้วนี่นา"
10080-230 = "ใช่มั้ยล่ะ?"
10080-240 = "รีโมตเหรอ?\n...หมายถึงอันนี้เหรอ?"
10080-250 = "ถามอะไร ไม่ละเอียดอ่อน\nเอาซะเลยนะ"
10080-260 = "ถ้าเด็กผู้หญิง\nไม่อยากจะพูดถึง..."
10080-270 = "แล้วยังจะดึงดันถาม\nแบบนี้น่ะ ไม่ได้นะ☆"
10080-280 = "เข้าใจรึเปล่า? คุณน่ะไม่ได้เห็นอะไร\nแล้วก็ไม่เคยมีเรื่องอะไรเกิดขึ้น\nตั้งแต่แรกด้วย"
10080-290 = "...ใช่มั้ย คุณครู?"
10080-2600 = "คุณเองก็เป็นคนพิเศษนะ\nฉันไม่ได้หมายถึงในทางที่ไม่ดี\nหรอกน่า ปกติแล้วฉันจะไม่เชื่อใจ\nคนที่ฉันอ่านใจไม่ได้... แต่เอาเป็นว่า\nคุณเป็นคนที่ 'ฉันไม่คิดสงสัย' เลยละ"

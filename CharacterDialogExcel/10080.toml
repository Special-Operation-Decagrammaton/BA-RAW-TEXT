[translation]
10080-10 = "蔚藍檔案。"
10080-20 = "哎呀，我應該有自我介紹過了才對……\n難道你不記得了嗎？唔呵呵。"
10080-30 = "哎呀，這裡的裝潢\n還挺可愛的嘛？"
10080-40 = "挺有品味的。"
10080-50 = "很多看起來很有趣的人呢。"
10080-60 = "總覺得……\n好像能平靜下來。"
10080-70 = "因為這裡是個\n令人放心的地方嗎……\n真不錯。"
10080-80 = "歡迎你來，老師。\n……別看我這樣，\n我等了挺久的哦☆"
10080-90 = "嗯？只是順其自然地\n待在這裡而已哦。\n畢竟沒有導遊，\n我不是很想出門。"
10080-100 = "老師的工作，好像\n和我所理解的有點相似\n卻又有點不一樣呢。"
10080-110 = "工作看起來很辛苦呢……\n需要我幫忙嗎？……當然，\n是用「普通的方式」。"
10080-120 = "其實，我的頭\n到現在還是有點痛。"
10080-130 = "遙控器……？\n確實很重要沒錯……\n但那東西本身\n其實沒什麼特別的哦？"
10080-140 = "這麼說來，\n這裡有什麼美食嗎？\n你推薦的店家，\n可以帶我去嗎？"
10080-150 = "是老師的生日對吧？\n該怎麼替你慶祝才好呢？"
10080-160 = "……順帶一提，\n有想要和某個孩子，\n一起度過嗎？"
10080-170 = "新年快樂，老師。\n……這裡用這句話\n問好應該也沒錯吧？"
10080-180 = "聖誕節啊……\n老師，你當過\n幾次聖誕老人了呢？"
10080-190 = "外面還真熱鬧呢。\n不過……在這裡\n應該沒關係吧？"
10080-210 = "……怎麼了？\n發生什麼事了嗎？"
10080-220 = "無論如何，我認為事情\n遲早都會變成這樣的哦？"
10080-230 = "沒錯吧？"
10080-240 = "……遙控器？\n……你想問那個？"
10080-250 = "是不是有點不夠體貼呢？"
10080-260 = "如果女孩子\n不想開口的話……"
10080-270 = "強迫人家回答\n可不行哦☆"
10080-280 = "明白了嗎？所以你什麼\n也沒看到，說到底，\n剛才什麼事也沒發生。"
10080-290 = "……你說對吧，老師？"
10080-2600 = "你也真是個奇怪的人呢。\n啊啊，我不是負面的意思。\n……一般來說無法讀心的對象，\n我是不會相信的……\n暫且先歸為「不會起疑的程度」吧？"

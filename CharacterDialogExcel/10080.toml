[translation]
10080-10 = "블루 아카이브."
10080-20 = "어머, 자기소개는 했는데...\n혹시 기억 안 나? 후훗."
10080-30 = "어머나, 꽤 귀여운 인테리어네?"
10080-40 = "센스 있네."
10080-50 = "재미있어 보이는 친구들이 많네?"
10080-60 = "왠지…… 진정될지도."
10080-70 = "신경 쓸 게 없는\n곳이라 그런지,\n나쁘지 않네."
10080-80 = "어서와, 선생님.\n……이래 봬도 꽤 기다렸다고☆"
10080-90 = "응? 그냥, 여기\n있었을 뿐이야.\n가이드도 없고,\n별로 나가고 싶지 않아서."
10080-100 = "선생님의 업무,\n뭔가 내가 아는 것과\n비슷하면서도 다르네."
10080-110 = "업무, 힘들어 보이네……\n좀 도와줄까?\n……물론, '보통 방식'으로 말이야."
10080-120 = "실은, 지금도 여전히 머리가 좀 아파."
10080-130 = "리모컨? 중요하긴 하지만……\n그 자체에 뭐가 있는 건 아닌데?"
10080-140 = "그러고 보니\n여기선 뭐가 맛있어?\n추천하는 가게,\n데려가 줄 수 있을까?"
10080-150 = "선생님 생일이지?\n어떻게 축하해 줄까."
10080-160 = "……참고로,\n함께 있고 싶은 애라든지,\n있을까?"
10080-170 = "새해 복 많이 받아, 선생님.\n……여기서도 이 인사가 맞나?"
10080-180 = "크리스마스라……\n선생님은 몇 번이나\n산타가 돼봤어?"
10080-190 = "밖이 시끌시끌하네.\n뭐…… 여기선 괜찮겠지."
10080-210 = "……왜?\n무슨 일이라도\n있었던 걸까?"
10080-220 = "결국, 언젠가는 일어날 일이었다고\n생각하는데?"
10080-230 = "그렇지?"
10080-240 = "……리모컨?\n……그걸 묻는 거야?"
10080-250 = "그건 좀 섬세함이\n부족한 걸지도?"
10080-260 = "여자아이가\n말하려 하지 않는다면……"
10080-270 = "억지로 들으려고\n하면 안 된다고☆"
10080-280 = "알았지? 당신은 아무것도\n못 봤고, 애초에 아무 일도\n일어나지 않았어."
10080-290 = "……그렇지, 선생님?"
10080-2600 = "당신도 참 특이한 사람이네.\n뭐, 나쁜 뜻으로 한 말은 아니야.\n보통은 머릿속을 읽지 않는 사람 따위, 믿지 않지만……\n……'의심하지 않는 정도'로는 해 둘까?"

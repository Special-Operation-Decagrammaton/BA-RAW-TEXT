[translation]
10130-10 = "블루 아카이브. 군요. 후후."
10130-20 = "카케하시 스바루입니다.\n문제가 있으시다면, 최대한 도와드리겠습니다.\n뭐, 아리우스의 방식으로 말이죠."
10130-30 = "카페…… 뭔가\n비싸 보이는 곳이네요."
10130-40 = "(뭔가……\n워터 타임이 생각나네.)"
10130-50 = "저건…… 뭘까."
10130-60 = "(이런 곳에는\n잘 오지 못했었지……)"
10130-70 = "카페 아르바이트……\n모집하고 있으려나?"
10130-80 = "어서 오세요, 선생님.\n오늘 당번을 맡게 된,\n카케하시 스바루입니다."
10130-90 = "대기하고 있었습니다.\n지시라도 있으신가요?"
10130-100 = "네? '일단 힘을 빼 달라……?'"
10130-110 = "다과 같은 건 마음대로\n먹어도 된다고요?"
10130-120 = "그, 그럴 수는 없어요!\n아무리 당번이라지만……"
10130-130 = "……"
10130-140 = "그러면, 조금만요……"
10130-150 = "선생님께만 드리는 말이지만,"
10130-160 = "아리우스 '분교'라는 표현도,\n저는 약간 마음에 안 들어요."
10130-170 = "'분교'라고 하면,\n본교보다도 아래라고 할까……\n격리된 곳이라는 이미지잖아요."
10130-180 = "……죄송해요, 아리우스에 있는\n모두를 생각하고 있었어요."
10130-190 = "그 아이들을 위해서라도,\n제가 힘내야죠."
10130-200 = "……네? '자신을 위해서도\n힘내 달라'?"
10130-210 = "가, 감사…… 합니다……."
10130-220 = "엑? 공부……?\n제, 제대로 하고 있어요."
10130-230 = "하아…… 그런데 왜 이런\n쓸데없어 보이는 걸……."
10130-240 = "'지금은 이해가 되지 않아도,\n언젠가 쓸 때가 온다'\n……인가요."
10130-250 = "하아, 정말……\n네, 네. 알겠으니까요!"
10130-260 = "저기…… 선생님을 만나면,\n이상한 기분이 들어요."
10130-270 = "지금까지 이렇게\n잘해 주시는 어른은……\n없었으니까요."
10130-280 = "생일 축하드립니다. 선생님."
10130-290 = "저, 제가 해 드릴 수\n있는 건 별로 없고, \n축하드린다는 말밖에는\n드릴 수 없지만요……"
10130-300 = "네? 나중에 하모니카 연주,\n들려달라고요?\n그, 그건……"
10130-310 = "으으, 알았어요.\n선생님께만 해 드리는 거라고요?"
10130-320 = "생일…… 축하해 주셔서\n감사합니다. 선생님."
10130-330 = "아리우스에서는,\n생일을 소중히 여기고 있어요."
10130-340 = "그것마저 그만두면 정말로 \n소중한 무언가까지\n사라져 버릴 것만 같아서."
10130-350 = "뭐, 그래도…… 혼나니까,\n그렇게 성대하게 축하하지는\n못했지만요."
10130-360 = "한 해가 끝나고,\n새로운 해가 시작되는 날이네요."
10130-370 = "신기한 일이네요……\n지금은, 나쁘지 않다고\n생각해요."
10130-380 = "새해 복 많이 받으세요. 선생님."
10130-390 = "크리스마스군요.\n일단은 알고 있어요."
10130-400 = "……언젠가 트리니티와\n게헨나 녀석들에게"
10130-410 = "총알 비를 선물하는\n산타라도 되어볼까, \n하고 농담을 한 적이 있거든요."
10130-420 = "할로윈이라는 건\n잘 모르지만……"
10130-430 = "거기에서…… 축제와 장난,\n사탕을 제외한다면……"
10130-440 = "뭔가, 옛날 아리우스\n같다고 생각했어요.\n……공포밖에 남지 않았던,\n그때 말이죠."
10130-460 = "뭔가, 신선한 기분이에요."
10130-470 = "이렇게 한 사람을 위해\n연주하는 건 처음이라……"
10130-480 = "어떠, 셨을까요."
10130-490 = "이상하지는, 않으셨나요……?"
10130-500 = "그건…… 진심, 이라고\n받아들여도 되는 거죠?"
10130-510 = "……감사합니다."
10130-520 = "사실은, 다른 걸 더 할 수\n있으면 좋았을 텐데……"
10130-530 = "지금 저는, 이 정도밖에\n해 드릴 게……"
10130-540 = "네? '또 연습해서 들려줬으면\n좋겠다'고요……?"
10130-550 = "'악보도 많이 샀으니까'요……?"
10130-560 = "그, 그건……."
10130-570 = "다시…… 그때 가서\n생각해 볼게요."
10130-2600 = "아직, 전혀 실감이 나지 않아요…….\n아침에 눈을 뜨면 전부 꿈처럼 사라질 것 같아서……\n정말 감사합니다. 선생님. 소중히 할게요."

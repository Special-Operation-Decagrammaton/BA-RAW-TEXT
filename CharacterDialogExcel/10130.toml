[translation]
10130-10 = "是蔚藍檔案，呵呵。"
10130-20 = "我是梯昴。\n遇到困難的時候，就讓我助你一臂之力吧。\n雖然……僅限於「奧利斯式」就是了。"
10130-30 = "咖啡廳……感覺\n是個很高級的地方。"
10130-40 = "（總覺得……讓我\n想起了Water Time）"
10130-50 = "那是……什麼呢。"
10130-60 = "（以前幾乎沒能\n來過這種地方呢……）"
10130-70 = "咖啡廳的打工……\n有沒有在招募呢？"
10130-80 = "歡迎回來，老師。\n今天的值日生由我擔任，\n我是梯昴。"
10130-90 = "我正在待命。\n請問有什麼指示嗎？"
10130-100 = "咦？「先放輕鬆」……？"
10130-110 = "零食也可以隨意吃……？"
10130-120 = "那，那怎麼行！\n就算是值日生……"
10130-130 = "……"
10130-140 = "那麼，我就吃一點……"
10130-150 = "這些話我只在這裡說……"
10130-160 = "被稱呼為奧利斯「分校」……\n我其實不是很喜歡。"
10130-170 = "被說是「分校」的話，不就會\n給人地位低於本校……或者\n是個被隔離的地方的印象嗎？"
10130-180 = "……不好意思，\n我剛剛在思考留在\n奧利斯的大家的事。"
10130-190 = "就算是為了那些孩子，\n我也必須努力才行。"
10130-200 = "……咦？「也要為自己努力」？"
10130-210 = "謝……謝謝你……"
10130-220 = "咦？讀書……？\n我，我有好好讀書哦。"
10130-230 = "唉……不過，\n為什麼要學這些看起來\n派不上用場的東西……"
10130-240 = "「就算現在不懂，總有一天\n　也會派上用場」……是嗎？"
10130-250 = "啊啊，真是的……\n好好好，我知道了啦！"
10130-260 = "那個……每次見到老師，\n我都會有種奇妙的感覺。"
10130-270 = "因為至今為止，\n對我這麼好的大人……\n從來沒有出現過。"
10130-280 = "祝你生日快樂，老師。"
10130-290 = "那個，因為我能做的事情不多，\n只能送上祝福的話而已……"
10130-300 = "咦？下次想聽我吹口琴……？\n這，這……"
10130-310 = "唉……我知道了。\n只有老師才有哦？"
10130-320 = "生日……願意為我慶祝，\n真的很謝謝你，老師。"
10130-330 = "在奧利斯，\n生日是很重要的。"
10130-340 = "如果連這個都放棄了的話，\n感覺就連真正重要的某些東西\n都會消失不見。"
10130-350 = "不過呢……因為會被罵的關係，\n也不能慶祝得太盛大就是了。"
10130-360 = "一年結束，新的一年\n開始的日子──"
10130-370 = "真是不可思議……\n現在，我覺得那並不壞哦。"
10130-380 = "祝你新年快樂，老師。"
10130-390 = "是聖誕節呢。\n我姑且知道哦。"
10130-400 = "因為之前──\n我還開過要成為\n送三一跟格黑娜"
10130-410 = "槍林彈雨當禮物的\n聖誕老人的玩笑。"
10130-420 = "萬聖節我不是很懂……"
10130-430 = "如果不趁著節日討糖果的話，\n就只是平凡無奇的一天對吧。"
10130-440 = "感覺就像以前的奧利斯一樣。\n……只留下恐懼的那個時候。"
10130-460 = "總覺得，有股新鮮的感覺。"
10130-470 = "像這樣為某個人演奏\n還是第一次……"
10130-480 = "感覺，怎麼樣呢？"
10130-490 = "應該，不奇怪吧……？"
10130-500 = "那是……那個……\n我可以，認為那是真心話嗎？"
10130-510 = "……謝謝你。"
10130-520 = "其實，要是還能做點\n別的事情就好了……"
10130-530 = "現在的我，只能做到這些……"
10130-540 = "咦？「希望練習之後\n能再讓我聽」……？"
10130-550 = "「因為買了很多樂譜」……？"
10130-560 = "這，這個……"
10130-570 = "等到……那個時候，\n再讓我考慮一下吧。"
10130-2600 = "現在還完全沒有實感……\n甚至每天早上醒來，\n都會擔心這會是不是一場夢……\n真的很謝謝你，老師。我會珍惜的。"

[translation]
10130-10 = "Blue Archive สินะคะ ฮุฮุ"
10130-20 = "คาเกฮาชิ สุบารุค่ะ\nถ้ามีปัญหาอะไร ฉันจะพยายามช่วยให้ได้มากที่สุดเลยค่ะ\nแต่ช่วยตามวิถีของอาเรียสนะคะ"
10130-30 = "คาเฟ่... เป็นที่ที่\nดูแพงจังเลยนะคะ"
10130-40 = "(นึกถึง...\nวอเทอร์ ไทม์ขึ้นมาเลย)"
10130-50 = "อันนั้น... คืออะไรเหรอ?"
10130-60 = "(ที่แบบนี้\nเราไม่ได้มาบ่อยๆ เนอะ...)"
10130-70 = "งานพาร์ทไทม์ที่คาเฟ่...\nมีเปิดรับสมัครบ้างมั้ยนะ?"
10130-80 = "เชิญค่ะ คุณครู\nวันนี้เป็นเวรของฉัน\nคาเกฮาชิ สุบารุค่ะ"
10130-90 = "กำลังรออยู่เลยค่ะ\nมีคำสั่งอะไรมั้ยคะ?"
10130-100 = "คะ? ขอให้ 'ทำตัวสบายๆ'\nก่อนงั้นเหรอ...?"
10130-110 = "ให้กินพวกของว่าง\nได้ตามใจเลยงั้นเหรอคะ?"
10130-120 = "หะ... ให้ทำแบบนั้นไม่ได้หรอกค่ะ!\nถึงจะมาอยู่เวรก็เถอะ..."
10130-130 = "..."
10130-140 = "ถ้างั้น ขอแค่นิดเดียวพอค่ะ..."
10130-150 = "ฉันบอกแค่คุณครูคนเดียวนะคะ"
10130-160 = "คำว่า 'โรงเรียนสาขาอาเรียส'\nไม่ค่อยถูกใจฉันเท่าไรค่ะ"
10130-170 = "ถ้าเรียกว่า 'โรงเรียนสาขา'\nมันเหมือนอยู่ใต้ 'โรงเรียนหลัก' น่ะ...\nเหมือนเป็นที่ที่แยกออกมาเลยนี่คะ"
10130-180 = "ขอโทษนะคะ ฉันคิดถึง\nทุกคนในอาเรียสอยู่น่ะค่ะ..."
10130-190 = "เพื่อเด็กๆ เหล่านั้นแล้ว\nฉันต้องพยายามเข้าไว้ค่ะ"
10130-200 = "คะ...? ให้ฉันพยายาม\n'เพื่อตัวเองด้วย'?"
10130-210 = "ขะ... ขอบคุณ... ค่ะ..."
10130-220 = "หืม? เรื่องเรียนเหรอคะ...?\nฉะ... ฉันก็ตั้งใจเรียนอยู่ค่ะ"
10130-230 = "เฮ้อ... แต่ทำไมถึง\nดูไม่มีประโยชน์เลยล่ะ..."
10130-240 = "'ถึงตอนนี้จะยังไม่เข้าใจ\nแต่สักวันก็จะเป็นประโยชน์เอง'\nงั้นเหรอคะ..."
10130-250 = "เฮ้อ จริงๆ เลย...\nค่ะ ค่ะ เข้าใจแล้วค่ะ!"
10130-260 = "เอ่อ... พอได้เจอคุณครู\nฉันจะรู้สึกแปลกๆ ค่ะ"
10130-270 = "ก็ที่ผ่านมา\nไม่มีผู้ใหญ่ที่ทำดีด้วย\nแบบนี้มาก่อนนี่คะ..."
10130-280 = "สุขสันต์วันเกิดค่ะ คุณครู"
10130-290 = "ฉะ... ฉันคงทำอะไรให้\nไม่ได้มากไปกว่า\nการพูดอวยพรวันเกิดค่ะ..."
10130-300 = "คะ? ขอให้ฉันเป่าฮาร์โมนิกา\nให้ฟังคราวหน้าเหรอคะ?\nระ... เรื่องนั้น..."
10130-310 = "อึกก... เข้าใจแล้วค่ะ\nจะให้คุณครูฟังคนเดียวนะคะ"
10130-320 = "ขอบคุณที่... อวยพร\nวันเกิดให้ฉันนะคะ คุณครู"
10130-330 = "ที่อาเรียส\nให้ความสำคัญกับวันเกิดค่ะ"
10130-340 = "ถ้าเลิกทำกระทั่งเรื่องนั้น\nก็เหมือนเราจะเสียบางอย่าง\nที่แสนสำคัญไปด้วย"
10130-350 = "ก็นะ พอเป็นเรื่องที่... ทำแล้วโดนดุ\nเราก็เลยไม่ได้อวยพร\nวันเกิดให้กันค่ะ"
10130-360 = "หนึ่งปีผ่านไป และถึง\nวันแรกของปีใหม่แล้วนะคะ"
10130-370 = "น่าแปลกจังเลยนะคะ...\nตอนนี้ฉันคิดว่า\nมันก็ไม่เลวเลยค่ะ"
10130-380 = "สวัสดีปีใหม่ค่ะ คุณครู"
10130-390 = "คริสต์มาสสินะคะ\nฉันพอรู้จักค่ะ"
10130-400 = "ฉันเคยพูดเล่นว่าสักวัน\nจะลองเป็นซานต้า"
10130-410 = "ที่ให้ของขวัญเป็นห่ากระสุน\nกับพวกทรีนิตี้กับเกเฮนน่า\nด้วยค่ะ"
10130-420 = "ฉันไม่ค่อยรู้จัก\nสิ่งที่เรียกว่าฮาโลวีน..."
10130-430 = "แต่ถ้า... ตัดเรื่องงานเทศกาล\nการแกล้งกัน และลูกกวาดออก..."
10130-440 = "ฉันคิดว่าบางอย่างมัน\nคล้ายๆ กับอาเรียสในอดีตค่ะ\nสมัยที่ไม่มีอะไรเหลือ...\nนอกจากความหวาดกลัวน่ะค่ะ"
10130-460 = "เป็นความรู้สึกที่แปลกใหม่ดีนะคะ"
10130-470 = "นี่เป็นครั้งแรกที่ฉัน\nเล่นดนตรีให้ใครคนหนึ่งฟังน่ะ..."
10130-480 = "เป็นยังไง... บ้างคะ?"
10130-490 = "รู้สึกว่ามันแปลกหรือเปล่าคะ...?"
10130-500 = "ฉันจะคิดว่า... นั่นมาจาก\nใจจริงได้ใช่มั้ยคะ?"
10130-510 = "ขอบคุณค่ะ..."
10130-520 = "ที่จริงฉันอยากทำอะไร\nให้ได้มากกว่านี้แท้ๆ..."
10130-530 = "แต่ตอนนี้ฉัน\nทำให้ได้แค่เท่านี้..."
10130-540 = "คะ? อยากให้ไปฝึกเพิ่ม แล้วมา\nเล่นให้ฟังอีกงั้นเหรอคะ...?"
10130-550 = "ไหนๆ ก็ซื้อโน้ตเพลงมาเยอะแล้ว\nงั้นเหรอคะ?"
10130-560 = "ระ... เรื่องนั้น..."
10130-570 = "ไว้ถึง... ตอนนั้น\nฉันค่อยคิดอีกครั้งดีกว่าค่ะ"
10130-2600 = "ฉันยังไม่รู้สึกว่าเป็นความจริงเลยค่ะ...\nเมื่อลืมตาในตอนเช้า มันเหมือน\nทุกอย่างจะหายไปราวกับความฝัน...\nขอบคุณมากนะคะ คุณครู ฉันจะรักษาอย่างดีเลยค่ะ"

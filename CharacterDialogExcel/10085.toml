[translation]
10085-10 = "蔚藍，檔案。"
10085-20 = "收不到電波的這種情況……\n對駭客來說是很殘酷的環境，\n但身為貝里塔斯的成員，不會就這樣放棄。"
10085-30 = "這裡\n很溫暖，真棒…"
10085-40 = "（穿成那樣…\n　不會冷嗎…？）"
10085-50 = "來杯妖怪MAX。\n不用攪拌…\n也不要搖晃。"
10085-60 = "（太舒服了…\n　真想永遠\n　待在這裡…）"
10085-70 = "（好多名字很怪\n　的Wi-Fi…）"
10085-80 = "唔……要出去嗎？\n現在？"
10085-90 = "我還想在這裡\n多待一下的說……"
10085-100 = "我在等你哦，老師。"
10085-110 = "……會不會冷？\n要不要幫你泡杯咖啡？"
10085-120 = "最近的露營用床鋪，\n有很多還挺不錯的……"
10085-130 = "要不要買一個\n放在部室呢……"
10085-140 = "大部分的露營裝備\n都很容易安裝……"
10085-150 = "所以我覺得室內派\n的學生也會有需求。"
10085-160 = "……當然，\n收拾的時候會\n麻煩好幾倍就是了。"
10085-170 = "在露營場吃的\n即食料理為什麼\n這麼好吃呢？"
10085-180 = "下次有機會的話，我可能\n會想帶著所有種類的\n「妖怪MAX」去比較看看。"
10085-190 = "在吵鬧的地方\n編寫程式的時候……"
10085-200 = "有時會有點懷念\n露營場的寂靜。"
10085-210 = "在沒有網路的時期\n是怎麼打發時間的呢……？"
10085-220 = "老師，今天是你生日對吧？"
10085-230 = "雖然可能稱不上是禮物，\n如果有想要的情報就告訴我吧。"
10085-240 = "任何情報我都可以幫你找哦。"
10085-250 = "就算是關於我的情報……\n其實也可以唷。"
10085-260 = "生日禮物……？\n其實不用特地準備\n也沒關係的……"
10085-270 = "……那可以幫我\n泡一杯拿鐵嗎？\n有加煉乳，濃郁的那種。"
10085-280 = "祝你新年快樂，老師。"
10085-290 = "剛才千年巨塔前\n在發甜酒哦。"
10085-300 = "甜甜的還不錯喝……"
10085-310 = "甜酒口味的\n「妖怪MAX」\n說不定也不錯。"
10085-320 = "人真多……\n真虧大家能在\n這麼冷的天氣出門。"
10085-330 = "最能好好享受平安夜\n的地方明明就是柔軟又\n暖和的被窩裡的說……"
10085-340 = "……我沒有奇怪的意思唷！？"
10085-350 = "萬聖節的行程？"
10085-360 = "我打算買很多零食\n和大家一起玩遊戲。"
10085-370 = "因為每年這個時期，\n我喜歡的恐怖遊戲\n都會推出新作。"
10085-390 = "天上充滿了光芒……"
10085-400 = "如此閃耀的夜空……\n我可能是第一次見到。"
10085-410 = "如果把那一點一點的亮光，\n都當成蘊含龐大資料的節點……"
10085-420 = "好像讓人不禁產生了敬畏感。"
10085-430 = "就算把我所知道的\n所有情報匯集在一起，"
10085-440 = "與那些光芒相比，\n恐怕也無法企及吧……"
10085-450 = "……但即便如此，\n我也不會放棄。"
10085-460 = "因為真理\n必定會向光而行。"
10085-470 = "我想向那位於\n遙遠夜空中的星星，\n致上充滿敬意的問候。"
10085-480 = "你們好，\n最近過得好嗎？"
10085-2600 = "我在爬山時再次\n感覺到了槍的重量……\n下次就來嘗試改造成輕量型的吧。"

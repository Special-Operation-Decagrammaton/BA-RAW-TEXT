[translation]
10085-10 = "Blue, Archive."
10085-20 = "There's...no internet access here. But a true Veritas member wouldn't be stymied by this harsh environment!"
10085-30 = "I like how cozy it is here."
10085-40 = "(That outfit looks freezing.)"
10085-50 = "Frenzy MAX in a glass... No shaking... Or stirring it."
10085-60 = "(I might stay here forever. It's so comfy.)"
10085-70 = "(All these wifi names are so weird...)"
10085-80 = "Ugh... You're leaving already?"
10085-90 = "I'm gonna chill here for a little longer."
10085-100 = "You're here, Sensei."
10085-110 = "I'll make you a cup of coffee to warm up."
10085-120 = "They make some pretty high-quality camping beds these days."
10085-130 = "Maybe I'll get one for the club room. Heehee."
10085-140 = "Most of this camping equipment is meant to be easy to install."
10085-150 = "I think it'd be good for homebodies who're trying to get outdoors more."
10085-160 = "I wish they'd make a tent that can fold itself back up though..."
10085-170 = "Instant food tastes a lot better next to a campfire, for some reason."
10085-180 = "The next time we're camping, I'll bring a bunch of different Frenzy MAX flavors and do a taste test."
10085-190 = "Coding with a bunch of distractions around me..."
10085-200 = "...it almost makes me miss the quiet of the campgrounds."
10085-210 = "What did people do before the internet was invented?"
10085-220 = "It's your birthday today, right?"
10085-230 = "I, uh, didn't get you a gift. But you can just tell me what you want."
10085-240 = "I'll give you whatever."
10085-250 = "Even if...it's me and my time."
10085-260 = "A birthday gift? Nothing I want, really."
10085-270 = "I could really go for a latte though. Can I have one with an extra shot of espresso...and lots of condensed milk."
10085-280 = "Happy New Year, Sensei."
10085-290 = "They were handing out gamju in front of Millennium Tower."
10085-300 = "I really liked how sweet it was."
10085-310 = "Which gave me the idea... Gamju-flavored Frenzy MAX!"
10085-320 = "So people still leave the house when it's this cold, huh?"
10085-330 = "I think Christmas Eve is best enjoyed indoors. Underneath a blanket."
10085-340 = "...Hey. Don't make it weird."
10085-350 = "Huh? My Halloween plans?"
10085-360 = "The same as usual. The other members and I are gonna buy a bunch of snacks and play video games."
10085-370 = "My favorite horror game series releases a new edition during Halloween every year."
10085-390 = "The sky is so full of light..."
10085-400 = "I think it's the first time I've seen the night sky shine like this."
10085-410 = "I'm awed by the thought that every single one of those shiny dots are nodes"
10085-420 = "containing a vast amount of data."
10085-430 = "Even if I were to gather up everything I know,"
10085-440 = "I wouldn't be able to match those lights."
10085-450 = "...But I won't give up"
10085-460 = "Because the truth is a light that illuminates everything."
10085-470 = "I say salutations to all you stars shining in the skies."
10085-480 = "Hello. How are you?"
10085-2600 = "Hiking has made me realize how ridiculously heavy my gun is. I'm gonna try to modify it a little to shave some weight."

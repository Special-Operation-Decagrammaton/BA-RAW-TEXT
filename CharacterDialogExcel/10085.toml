[translation]
10085-10 = "Blue Archive"
10085-20 = "สถานการณ์ที่ไม่มีสัญญาณอินเทอร์เน็ตแบบนี้...\nถือเป็นสภาพแวดล้อมที่โหดร้ายสำหรับแฮ็กเกอร์\nแต่สมาชิกเวอริทัสจะยอมแพ้กับเรื่องแค่นี้ไม่ได้"
10085-30 = "ที่นี่...\nอบอุ่นดีจัง..."
10085-40 = "(ถ้าใส่แบบนั้น...\nจะไม่หนาวเหรอ?)"
10085-50 = "มอนสเตอร์แม็กซ์สักแก้ว\nห้ามคน... ห้ามเขย่า"
10085-60 = "(สบายจริงๆ...\nไม่อยากออกจากตรงนี้\nไปตลอดชีวิตเลย...)"
10085-70 = "(มีแต่ Wi-Fi\nชื่อแปลกๆ ทั้งนั้น...)"
10085-80 = "อึก...\nจะไปแล้วเหรอ?\nตอนนี้เลยเหรอ?"
10085-90 = "ฉันอยากพักผ่อนอยู่ที่นี่อีกหน่อย..."
10085-100 = "กำลังรออยู่เลย คุณครู"
10085-110 = "หนาวใช่มั้ย?\nฉันชงกาแฟให้แก้วหนึ่งมั้ย?"
10085-120 = "เตียงแคมป์ปิ้งที่วางขายช่วงนี้\nมีที่ดีๆ เยอะเลย..."
10085-130 = "ซื้อไว้ในห้องชมรม\nสักเตียงดีมั้ยนะ...?"
10085-140 = "อุปกรณ์แคมป์ปิ้งส่วนใหญ่\nติดตั้งและใช้งานง่าย"
10085-150 = "นักเรียนที่ชอบอยู่ในอาคาร\nก็น่าจะอยากซื้อเยอะอยู่นะ"
10085-160 = "แต่ก็แน่นอนว่าตอนเก็บ\nก็น่ารำคาญกว่าหลายเท่าเลย..."
10085-170 = "อาหารสำเร็จรูปที่กิน\nในลานแคมป์ปิ้ง\nทำไมถึงอร่อยขนาดนี้นะ...?"
10085-180 = "คราวหน้าถ้าได้ไปแคมป์ปิ้ง\nฉันจะเอามอนสเตอร์แม็กซ์\nไปลองชิมทุกรสเลย"
10085-190 = "ถ้าเขียนโค้ด\nในสถานที่ที่วุ่นวาย"
10085-200 = "บางครั้งฉันก็จะคิดถึง\nความสงบในลานแคมป์ปิ้งน่ะ"
10085-210 = "สมัยที่ไม่มีอินเทอร์เน็ต\nผู้คนใช้ชีวิตกันยังไงนะ..."
10085-220 = "คุณครู วันนี้วันเกิดใช่มั้ย?"
10085-230 = "ถึงนี่จะไม่ใช่ของขวัญ\nแต่ถ้ามีข้อมูลอะไรที่อยากรู้ก็บอกนะ"
10085-240 = "ไม่ว่าเรื่องอะไรฉันก็จะหาให้"
10085-250 = "ต่อให้เป็นข้อมูลเกี่ยวกับฉัน...\nฉันก็ไม่ว่าหรอกนะ"
10085-260 = "ของขวัญวันเกิดฉันเหรอ...?\nไม่ต้องเอาใจใส่ขนาดนี้ก็ได้..."
10085-270 = "งั้นฉันขอลาเต้สักแก้วได้มั้ย?\nขอแบบเข้มๆ ใส่นมเยอะๆ นะ"
10085-280 = "สวัสดีปีใหม่นะคุณครู"
10085-290 = "มีสาเกหวานแจกจ่ายอยู่\nหน้าหอคอยมิลเลเนียมด้วยละ"
10085-300 = "รสหวานใช้ได้เลย..."
10085-310 = "อยากให้มีมอนสเตอร์แม็กซ์\nรสสาเกหวานออกมาบ้างจัง"
10085-320 = "ผู้คนเต็มถนนเลย...\nอากาศหนาวขนาดนี้\nแต่ก็ออกมาข้างนอกกันเยอะเลยนะ"
10085-330 = "ที่ที่สนุกกับ\nคริสต์มาสอีฟได้ดีที่สุด\nคือในผ้าห่มอุ่นๆ..."
10085-340 = "ฉันไม่ได้สื่อถึงอะไรแปลกๆ นะ!"
10085-350 = "อยากรู้ว่าฉันจะทำอะไร\nในวันฮาโลวีนงั้นเหรอ?"
10085-360 = "ฉันจะซื้อขนมไปเยอะๆ\nแล้วไปเล่นเกม\nกับสมาชิกในชมรม"
10085-370 = "เกมสยองขวัญที่ฉันชอบ\nจะปล่อยในซีซั่นนี้ของทุกปีน่ะ"
10085-390 = "บนท้องฟ้ามีแสงสว่างเต็มไปหมดเลย..."
10085-400 = "เป็นครั้งแรกเลยนะ\nที่ฉันได้เห็นท้องฟ้ายามค่ำคืน\nที่ระยิบระยับแบบนี้"
10085-410 = "จุดแต่ละจุดที่เปล่งประกายตรงนั้น\nพอคิดว่าเป็นโหนดที่จุข้อมูลมหาศาล"
10085-420 = "ก็รู้สึกถึงความน่าเกรงขาม\nที่ไม่เคยรู้สึกมาก่อนเลย"
10085-430 = "ต่อให้ฉันเรียงร้อย\nข้อมูลทุกอย่างที่ฉันรู้"
10085-440 = "ก็คงไปไม่ถึงแสงสว่างตรงนั้นหรอก"
10085-450 = "แต่ว่าฉันก็จะไม่ยอมแพ้หรอกนะ"
10085-460 = "เพราะเวอริทัสหรือความจริงแท้\nจะมุ่งหน้าไปหาแสงสว่างเสมอ"
10085-470 = "ฉันขอส่งความเคารพที่มีต่อดวงดาว\nที่อยู่บนฟากฟ้าไกลผ่านคำทักทายนี้"
10085-480 = "สวัสดีค่ะ\nสบายดีมั้ยคะ?"
10085-2600 = "ระหว่างที่ปีนเขา ฉันก็รู้แล้วว่า...\nปืนของฉันมันหนักแค่ไหน... คราวหน้า\nลองประดิษฐ์ปืนน้ำหนักเบาดูดีมั้ยนะ"

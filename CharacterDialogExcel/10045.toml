[translation]
10045-10 = "Blue Archive!"
10045-20 = "*yawn* Oh, Sensei! We should take it easy on a day like this!"
10045-30 = "Everyone looks great. Being relaxed is the best."
10045-40 = "Let's see where I can lie down..."
10045-50 = "Where's a good spot...?"
10045-60 = "...Ah! This looks good."
10045-70 = "What's this...?"
10045-80 = "Hey, you're here, Sensei. If you don't mind, let's take it slow today."
10045-90 = "Sensei, welcome!"
10045-100 = "...Huh? Me? I was just resting here."
10045-110 = "Are you really gonna make me work while I'm wearing something like this? Heh~"
10045-120 = "You're busy as usual, Sensei."
10045-130 = "...Can I help you with this?"
10045-140 = "...Huh? Do I want to rest? I mean, yeah, but..."
10045-150 = "It's awkward to just watch you work."
10045-160 = "Let me know anytime you're tired, Sensei."
10045-170 = "Instead of a pillow, how about this tube?"
10045-180 = "What's gonna happen today?"
10045-190 = "Happy birthday, Sensei. What do you want for your birthday?"
10045-200 = "I'm willing to do anything I can, you know?"
10045-210 = "...Oh, right. It's my birthday."
10045-220 = "Thanks, Sensei. I'm happy that you remembered."
10045-230 = "Heeheehee."
10045-240 = "Happy New Year, Sensei!"
10045-250 = "I hope a lot of good things happen to you this year."
10045-260 = "It's loud outside. ...Well, it's Christmas."
10045-270 = "Umm... I actually don't really mind it."
10045-280 = "...Still, I shouldn't go out like this."
10045-290 = "Lots of people are wearing interesting outfits."
10045-300 = "...Huh? Why are you looking at me like that?"
10045-310 = "This is not a costume!"
10045-330 = "Wow, this is awesome. This must be paradise."
10045-340 = "The cool shade...a pleasant ocean breeze... The soft sound of waves..."
10045-350 = "Wow...! I'm glad I came here! It's the best. This place is like a dream..."
10045-360 = "...Sensei, don't just stand there. Why don't you lie down here?"
10045-370 = "There's not much room... But...it's pretty great!"
10045-380 = "Heh. I knew you were gonna say that..."
10045-390 = "Well, that's expected."
10045-400 = "I don't mind though..."
10045-410 = "Then again, that's what I like about you."
10045-420 = "...Heeheehee."
10045-2600 = "You'd go this far for me...? Seriously, you're so weird. Well, I guess I don't mind. I should work a little harder!"

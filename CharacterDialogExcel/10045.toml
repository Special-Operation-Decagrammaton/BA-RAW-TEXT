[translation]
10045-10 = "蔚藍～檔案。"
10045-20 = "呼啊～啊，老師～\n機會難得，悠哉一點吧～"
10045-30 = "真是讓人欣慰的\n景象呢…嘛，\n有餘裕是件好事。"
10045-40 = "那～麼，有可以\n躺下的地方嗎…"
10045-50 = "有沒有\n比較寬敞的地方…"
10045-60 = "…哦，\n看起來不錯呢？"
10045-70 = "這是什麼…？"
10045-80 = "呀呀～老師，辛苦你了～\n今天要不要悠閒一點呀？"
10045-90 = "老師，歡迎回來～"
10045-100 = "…嗯？我嗎？\n一～直都\n在這裡休息唷～？"
10045-110 = "你該不會想讓穿成\n這樣的人工作吧～？\n開玩笑的。"
10045-120 = "老師好像還是\n和以前一樣忙呢。"
10045-130 = "…幫忙這個就可以了嗎？"
10045-140 = "嗯～？嘛，確實，\n我也充滿著\n想要休息的心情…"
10045-150 = "不過老師明明在工作，\n躺在那邊休息也不好，對吧？"
10045-160 = "累了的話\n隨時告訴我哦，老師。"
10045-170 = "作為枕頭的代替，\n用這個泳圈怎麼樣啊？"
10045-180 = "今天會發生\n什麼樣的事呢～？"
10045-190 = "生日快樂，老師。\n有什麼想要的東西嗎？"
10045-200 = "…在我的能力範圍裡\n要什麼都可以哦？"
10045-210 = "…啊，這樣啊。\n是我的生日啊。"
10045-220 = "謝謝你，老師…\n能夠被記住，\n是件開心的事呢。"
10045-230 = "唔嘿嘿。"
10045-240 = "新年快樂，\n老師～"
10045-250 = "…今年也能發生\n很多開心的事就好了呢。"
10045-260 = "難怪我覺得吵吵鬧鬧的，\n原來是聖誕節啊～"
10045-270 = "嘛，雖然大叔\n也沒有特別討厭\n這種氣氛…"
10045-280 = "可是，穿成這樣的話\n也沒有辦法到外面去吧～？"
10045-290 = "穿著各種變裝\n的人真多啊。"
10045-300 = "…咦，為什麼要這樣看我？"
10045-310 = "這不是\n在變裝啊～"
10045-330 = "哎呀～真讓人\n心癢難耐呢…\n這簡直就是樂園…"
10045-340 = "涼爽的樹蔭…\n舒暢的海風…\n還有溫柔的浪濤聲…"
10045-350 = "哎呀～能來到這裡真是太好了～\n真是棒極了，簡直就像\n夢裡才有的地方…"
10045-360 = "…老師也別光站在那裡，\n要不要躺下來呀？"
10045-370 = "雖然不是很寬敞，怎麼樣？\n感覺很不錯吧～？"
10045-380 = "唔嘿～原來如此，\n來這招啊…"
10045-390 = "嘛，雖然我多少\n也有預料到了。"
10045-400 = "明明不必這樣的說…"
10045-410 = "不過，你的那種地方\n我也不討厭就是了。"
10045-420 = "…耶嘿嘿。"
10045-2600 = "居然幫我到這種地步……\n老師也是個怪人呢。\n雖然沒關係…那麼我也得\n比之前更努力才行對吧？"

[translation]
10045-10 = "Blue~ Archive"
10045-20 = "ฮ้าววว... อ๊ะ ครูนี่นา~\nวันนี้มาใช้เวลาสบายๆ กันเถอะ~"
10045-30 = "เป็นภาพที่น่าภูมิใจดีน้า~\nดีจังที่ทุกคนสนุกกันแบบนี้"
10045-40 = "มีที่ไหนให้นอนได้บ้างนะ..."
10045-50 = "ไม่มีที่เหมาะๆ เลยรึไง..."
10045-60 = "ตรงนั้นดีมั้ยนะ?"
10045-70 = "นี่อะไรเนี่ย...?"
10045-80 = "โอ้ มาแล้วเหรอครู\nถ้าครูสะดวกละก็ มาใช้เวลา\nสบายๆ ไปด้วยกันนะ"
10045-90 = "ครู~ เชิญเลย~"
10045-100 = "หืม? ฉันเหรอ\nก็แค่พักผ่อนอยู่ที่นี่น่ะ"
10045-110 = "คงไม่ได้คิดจะสั่งงาน\nกับคนที่ใส่ชุดแบบนี้\nหรอกใช่มั้ย...?"
10045-120 = "ครูยังงานยุ่งเหมือนเดิมเลยนะ"
10045-130 = "มีอะไรให้ฉันช่วยมั้ย?"
10045-140 = "หือ...? ฉันอยากพักรึเปล่าน่ะเหรอ?\nอืม มันก็ใช่อยู่หรอก..."
10045-150 = "แต่ว่าจะให้นอนดู\nครูทำงานเฉยๆ มันก็ยังไงอยู่"
10045-160 = "ถ้าเหนื่อยละก็บอกได้เลยนะ ครู"
10045-170 = "ใช้ห่วงยางแทนหมอนดีมะ?"
10045-180 = "วันนี้จะมีเรื่องอะไร\nเกิดขึ้นบ้างน้า~?"
10045-190 = "สุขสันต์วันเกิดนะ ครู\nมีอะไรที่อยากได้รึเปล่า?"
10045-200 = "ถ้าฉันทำให้ อะไรก็ชอบเหรอ?"
10045-210 = "โอ๊ะ จริงด้วย\nวันนี้วันเกิดฉันสินะ"
10045-220 = "ขอบคุณนะครู\nแค่อวยพรวันเกิดให้\nก็ดีใจแล้ว"
10045-230 = "แหะๆๆ..."
10045-240 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะครู~"
10045-250 = "ปีนี้ก็ขอให้ครู เจอแต่เรื่องดีๆ\nเยอะๆ เลยนะ"
10045-260 = "ข้างนอกเสียงดังกันจัง\nแต่ก็นะ... วันคริสต์มาสนี่นา~"
10045-270 = "อืม... ที่จริงลุงก็ไม่ได้เกลียดงานเทศกาลหรอก"
10045-280 = "แต่ว่าจะออกไปข้างนอก\nด้วยสภาพแบบนี้คงไม่ดีมั้ง?"
10045-290 = "คนใส่ชุดแปลกๆ เยอะจังเลยน้า~"
10045-300 = "หืม? ทำไมมองแบบนั้นล่ะ?"
10045-310 = "ฉันไม่ได้ใส่ชุดนี้\nเพื่องานนี้สักหน่อย~"
10045-330 = "ว้าว... ดีจัง สุดยอดไปเลย\nเหมือนกับเป็นสรวงสวรรค์เลยละ"
10045-340 = "ร่มเงาไม้เย็นสบาย...\nลมทะเลที่พัดเอื่อยๆ...\nเสียงคลื่นเบาๆ..."
10045-350 = "อา~ คุ้มกับที่มาจริงๆ น้า~\nสุดยอดเลย เหมือนกับสถานที่\nในฝันเลย"
10045-360 = "ครูเองก็อย่ามัวแต่ยืนแบบนั้นสิ\nลองมาเอนหลังนอนดูหน่อยมั้ย?"
10045-370 = "ถึงจะไม่กว้างมากก็เถอะ\nแต่มาลองนอนดูมั้ย?\nมันสบายมากเลยนะ~"
10045-380 = "แฮ่~ เอาอย่างนั้นเหรอ…"
10045-390 = "ก็นะ ฉันคิดแล้วละ\nว่าครูจะพูดแบบนั้น"
10045-400 = "แต่ก็ไม่เป็นไรหรอก..."
10045-410 = "ก็เพราะแบบนั้นละมั้ง\nฉันเลยชอบครูน่ะ"
10045-420 = "แหะๆๆ..."
10045-2600 = "ทำให้ขนาดนี้เลยเหรอเนี่ย...\nเป็นคนประหลาดจริงๆ นะครู\nแต่ก็ไม่เป็นไรหรอก... เอาละ\nฉันก็คงต้องพยายามให้มากขึ้นแล้วสินะ?"

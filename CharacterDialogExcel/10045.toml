[translation]
10045-10 = "블루~아카이브."
10045-20 = "후아아~. ……아, 선생~.\n모처럼이니까, 느긋하게 가자고~."
10045-30 = "흐뭇한 광경이네~\n뭐, 여유가 있는\n것은 좋은 거지."
10045-40 = "자아-, 어디,\n누울 만한 곳은…"
10045-50 = "어딘가 편하게\n쉴만한 곳이…"
10045-60 = "…오\n좋아 보이네?"
10045-70 = "이게 뭐지…?"
10045-80 = "오오-. 선생, 수고했어~.\n오늘 정도는 좀\n느긋하게 보내지~?"
10045-90 = "선생, 어서 와~."
10045-100 = "…응? 나?\n계속 여기서\n쉬고 있었는데?"
10045-110 = "설마 이런 꼴로\n일을 시키려는 건가~?\n…아니겠지?"
10045-120 = "여전히 선생은 바빠 보이네."
10045-130 = "…이거 도와주면 돼?"
10045-140 = "…응? 뭐, 확실히\n쉬고 싶은 마음은\n한가득이지만…"
10045-150 = "선생님이 일하는데,\n옆에서 노는 것도 조금…?"
10045-160 = "피곤하면\n언제든 말해, 선생."
10045-170 = "베개 대신\n이 튜브는 어때?"
10045-180 = "오늘은 어떤 일이\n일어날까나~?"
10045-190 = "생일 축하해, 선생.\n뭐 가지고 싶은 거 있어?"
10045-200 = "…내가 할 수 있는 거라면,\n뭐든 괜찮다고?"
10045-210 = "…아, 그런가.\n내 생일인가."
10045-220 = "고마워, 선생…\n기억하고 있었다니,\n기쁜걸."
10045-230 = "에헤헤."
10045-240 = "새해 복 많이 받으라구,\n선생~."
10045-250 = "…올해도 좋은 일이\n많았으면 좋겠네."
10045-260 = "뭔가 소란스럽다 했더니,\n크리스마스구나~"
10045-270 = "뭐, 아저씨도\n그다지 이런 분위기…\n싫어하진 않지만 말이야."
10045-280 = "그래도 좀 이런 모습으론,\n밖에 나갈 수 없겠는걸?"
10045-290 = "별난 차림의\n사람들이 많네~."
10045-300 = "…응?\n왜 그렇게 보는 거야?"
10045-310 = "이건 변장이\n아니라니까~"
10045-330 = "이야-. 참을 수가 없네-.\n이것이야말로 낙원-."
10045-340 = "시원한 그늘…\n기분 좋은 바닷바람…\n부드러운 파도 소리…"
10045-350 = "이야아~.\n역시 오길 잘했네~\n최고야. 마치 꿈 같은 장소야…"
10045-360 = "…선생도 그렇게 서 있지만\n말고 누워 보는 게 어때?"
10045-370 = "별로 넓진 않지만,\n어때? 꽤 괜찮다고~?"
10045-380 = "으헤-. 역시\n그렇게 나오는 건가…"
10045-390 = "뭐, 왠지 그럴 거라\n예상은 했지만서도."
10045-400 = "상관없는데…"
10045-410 = "딱히 그런 부분…\n싫어하진 않지만."
10045-420 = "…에헤헤."
10045-2600 = "여기까지 해주는 건가……\n정말이지, 이상하다니까 선생님도.\n뭐, 괜찮지만……\n자 그럼 나도 지금보다 더 열심히 해야겠지?"

[translation]
20018-10 = "Blue Archive-"
20018-20 = "สมาชิกกองทหาร RABBIT\nจากสถาบันพิเศษ SRT คาเซะคุระ โมเอะ\nฮุฮุฮุ... งานสนับสนุน ฉันจะคอยช่วยเอง"
20018-30 = "ที่นี่คือฐานทัพใหม่\nของเรางั้นเหรอ?"
20018-40 = "อา... รู้สึกปลอดภัยดีจัง"
20018-50 = "อยากได้ลูกอมอีก..."
20018-60 = "รู้สึกเหมือนว่าปุ่มสำคัญ...\nมันหายไปนะ...?"
20018-70 = "ฮิฮิฮิ..."
20018-80 = "อ๊ะ เชิญเลยคุณครู\nวันนี้ก็ยังงานยุ่ง\nเหมือนเดิมเลยนะ ฮิฮิฮิ..."
20018-90 = "เอ๊ะ คุณครูนี่นา?\nช่วงนี้ดูยุ่งน่าดูเลยนะ"
20018-100 = "ทางกองทหาร RABBIT เรา\nเตรียมเสบียงสนับสนุน\nเอาไว้ให้พร้อมแล้ว..."
20018-110 = "ง่ำๆ... ขนมหวานสำคัญมากนะ\nเรื่องนี้เท่านั้นที่ยอมไม่ได้!"
20018-120 = "อา... อยากกินซูชิเต้าหู้\nที่รุ่นพี่ทำให้จังเลย"
20018-130 = "จริงๆ เลย ทำไมลูกอม\nถึงไม่นับรวมอยู่ในเสบียง\nพื้นฐานนะ?"
20018-140 = "น้ำตาลน่ะ ก็เหมือนเชื้อเพลิง\nที่ขับเคลื่อนหน่วยสนับสนุนเลยนะ"
20018-150 = "คุณครูดูงานยุ่งน่าดูเลยนะ\nให้ฉันช่วยมั้ย?"
20018-160 = "เอาน่า ไว้ใจฉันได้เลย\nฮิฮิฮิ..."
20018-170 = "สุขสันต์วันเกิดนะคุณครู"
20018-180 = "อยากดูพลุดอกไม้ไฟแบบอลังการ\nเป็นการฉลองวันเกิดไหมล่ะ?"
20018-190 = "เค้กวันเกิด? ไม่ละ ไม่เป็นไร\nฉันน่ะ ขอแค่มีระเบิดแค่นั้นก็พอแล้ว"
20018-200 = "ใช่แล้ว ถ้าเป็นไปได้ละก็ ขออะไร\nที่อลังการงานสร้างแบบนั้นดีกว่า ฮิฮิฮิ"
20018-210 = "ได้ยินว่าที่ซานไห่จิงจะฉลองปีใหม่\nด้วยการจุดพลุฉลองอย่างยิ่งใหญ่เลย..."
20018-220 = "คงเป็นภาพที่อลังการและน่าดู\nมากแน่ๆ เลย ฮิฮิฮิ"
20018-230 = "คริสต์มาสปีนี้ ฉันคิดว่าว่า\nจะกินไก่งวงพร้อมกับสมาชิกคนอื่นๆ"
20018-240 = "หืม? ก็แหงสิ\nก็ต้องเป็นที่ในสวนที่เราอยู่อยู่แล้ว"
20018-250 = "กฎความปลอดภัยจากอัคคีภัย...?\nมันคืออะไรงั้นเหรอ?"
20018-260 = "โคมไฟฟักทองพวกนี้...\nถ้าโรยผงฟอสฟอรัสลงไปเพิ่ม\nก็น่าจะลุกโชนสวยมากขึ้นแน่ๆ..."
20018-270 = "แฮ่ก... แฮ่ก..."
20018-290 = "คุณครูในโลกนี้\nมีข้อห้ามอยู่หลายอย่างเลยละ"
20018-300 = "ทั้งปุ่มต่างๆ ที่ห้ามกดเด็ดขาด\nแล้วก็สิ่งที่ห้ามทำมากมาย..."
20018-310 = "และพวกตัวเลือกที่พอเลือกแล้ว\nจะก่อให้เกิดความพังพินาศที่คิดไม่ถึง"
20018-320 = "ถ้าเลือกผิดไปก็อาจสูญเสียทุกอย่าง\nไปก็ได้ แต่ว่าถ้าเกิดเป็นตัวเลือกที่\nทำให้ตัวเองพอใจล่ะ?"
20018-330 = "คุณครูจะเลือกแบบไหนเหรอ?"
20018-340 = "ฉันรู้ว่ามันเป็นคำถามที่ดูไร้สาระ\nคุณครูน่ะเป็นคนซื่อๆ ไม่เหมือนกับฉัน"
20018-350 = "แต่ว่าฉันน่ะ อาจจะ...\nก้าวล้ำเส้นพวกนั้นมาแล้วก็ได้"
20018-360 = "เพราะว่าวินาทีแห่งความพังพินาศ\nมันอาจเป็นโอกาสที่ฉันจะพิสูจน์\nตัวเองก็ได้"
20018-370 = "เพราะงั้นคุณครู..."
20018-380 = "จะก้าวล้ำเส้นนั่น...\nมาพร้อมกันกับฉันมั้ย?"
20018-2600 = "ได้รับ Rabbit Type 224 Pistol แล้ว\nอืม.. มันค่อนข้างเล็กไปหน่อย\nจะยิงได้แรงสะใจรึเปล่านะ?"

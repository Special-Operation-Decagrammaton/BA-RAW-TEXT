[translation]
20018-10 = "蔚藍檔案－"
20018-20 = "SRT特殊學園，\nRABBIT小隊的風倉萌。\n咯嘻嘻……支援的話，就交給我吧。"
20018-30 = "這裡，\n可以當作\n新據點嗎？"
20018-40 = "……嘛，\n可能會比較平靜呢。"
20018-50 = "糖分不足……"
20018-60 = "會不會……\n有重要的發射鈕\n掉在地上呢……？"
20018-70 = "咯嘻嘻……"
20018-80 = "啊啊，歡迎回來，老師。\n今天還是一樣很忙呢。\n咯嘻嘻……"
20018-90 = "哦，這不是老師嗎？\n感覺一直都很忙呢。"
20018-100 = "差不多該補充\nRABBIT小隊的補給品了吧…"
20018-110 = "哈呣……\n補充糖分很重要吧。\n這可沒辦法讓步！"
20018-120 = "啊……好想吃\n之前前輩做的\n豆皮壽司……"
20018-130 = "真是的……\n為什麼不把糖果算在\n基本的補給品中呢？"
20018-140 = "糖分對報務員而言，\n明明就像燃料一樣的說。"
20018-150 = "工作看起來挺忙的。\n要我幫忙嗎？"
20018-160 = "哎呀，就交給我吧。\n咯嘻嘻……"
20018-170 = "生日快樂，老師。\n所以啊……"
20018-180 = "要不要來一場\n非常華麗的\n祝賀煙火秀呢？"
20018-190 = "生日蛋糕？\n沒關係，我只要\n有煙火就已經……"
20018-200 = "對了，那不如就來點\n華麗又強烈的……\n咯嘻嘻。"
20018-210 = "山海經好像\n有在新年放煙火\n驅邪的習俗哦。"
20018-220 = "真的，是個\n好習俗呢……\n咯嘻嘻。"
20018-230 = "今年的聖誕節，\nRABBIT小隊全員\n打算一起吃火雞。"
20018-240 = "嗯？當然是在\n平常的公園囉。"
20018-250 = "嗯？消防法……？\n那是什麼？"
20018-260 = "這個南瓜的燈籠……\n要是灑上那個粉末，\n感覺能燃燒得更漂亮……"
20018-270 = "哈啊，哈啊……"
20018-290 = "老師……世界上\n存在各種事物對吧。"
20018-300 = "例如不能按下去的按鈕，\n或是不能跨越的一線……"
20018-310 = "其中，也存在\n一旦選了就無法挽回，\n將導致破滅的那種選項。"
20018-320 = "只要走錯一步就會完蛋，\n卻有可能滿足自己的內心……"
20018-330 = "這種時候，老師會怎麼做？"
20018-340 = "我知道這是一個\n毫無意義的問題。\n因為老師是個正直的人。"
20018-350 = "但我……也許會\n跨越那一線也說不定。"
20018-360 = "畢竟那迎接毀滅的瞬間，\n同時也是能夠\n證明我自己的機會。"
20018-370 = "所以，老師……"
20018-380 = "那一線……要不要\n試著和我一起跨越呢？"
20018-2600 = "RABBIT-224式手槍，確實收到了。\n……吶，這個這麼小，\n火力是正常的嗎？"

[translation]
20018-10 = "Blue Archive."
20018-20 = "SRT Academy, RABBIT Squad's Kazekura Moe. Heeheehee... I'll be your support."
20018-30 = "Should we designate this as our new base?"
20018-40 = "It's...weirdly safe here."
20018-50 = "Need...more candy..."
20018-60 = "Something important, like a launch button, might have fallen off..."
20018-70 = "Heehee..."
20018-80 = "Welcome, Sensei. You look busy as usual. Heeheehee."
20018-90 = "Oh, it's you, Sensei! You seem busy these days."
20018-100 = "I've got to replenish supplies for the RABBIT Squad...."
20018-110 = "Nom nom... Sugar is important. I can't give it up!"
20018-120 = "Ah... I wanna eat the inarizushi she makes..."
20018-130 = "Seriously... Why are candies not included in the basic supplies?"
20018-140 = "Sugar is like the fuel that keeps the operator going."
20018-150 = "Aren't you a busy bee. Need help?"
20018-160 = "You can count on me! Mostly... Heeheehee."
20018-170 = "Happy birthday, Sensei. On that note..."
20018-180 = "How about we have some extravagant fireworks to celebrate?"
20018-190 = "Birthday cake? No, no. Birthday fireworks is more like it."
20018-200 = "Yeah! Something flashy! Something that goes ka-boom! Heeheehee."
20018-210 = "I heard that Shanhaijing Academy has a custom where they set off fireworks to drive away demons..."
20018-220 = "I've never heard of a more beautiful custom. Heeheehee."
20018-230 = "This Christmas I'm gonna eat turkey with RABBIT Squad members."
20018-240 = "Huh? At the park where we always stay, of course."
20018-250 = "Hm? The Fire Safety Act...? What's that?"
20018-260 = "This jack-o'-lantern... Wouldn't it burn more nicely if I put in some white phosphorous powder..."
20018-270 = "*pant* *pant*"
20018-290 = "Sensei, there are many taboos in this world."
20018-300 = "Buttons that shouldn't be pressed, lines that shouldn't be crossed..."
20018-310 = "And choices that can lead you to irreversible destruction."
20018-320 = "You can lose everything with one wrong step."
20018-330 = "What would you choose, Sensei?"
20018-340 = "I know it's a meaningless question. You aren't tempted like I am."
20018-350 = "But I...might end up crossing the line."
20018-360 = "Because that moment of destruction is also the moment I prove myself."
20018-370 = "So, Sensei."
20018-380 = "Would you...like to cross the line with me?"
20018-2600 = "RABBIT Type 224 pistol received... Um, it's kinda small though. I need a little more ka-boom!"

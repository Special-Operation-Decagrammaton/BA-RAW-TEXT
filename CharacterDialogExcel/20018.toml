[translation]
20018-10 = "블루 아카이브-."
20018-20 = "SRT 특수학원,\nRABBIT 소대의 카제쿠라 모에야.\n쿠히히… 지원 업무라면 내게 맡겨줘."
20018-30 = "이곳을\n새로운 거점으로\n삼아볼까?"
20018-40 = "…아아, 어쩐지\n안심이 되는 걸."
20018-50 = "사탕이 부족해…"
20018-60 = "뭔가, 중요한 발사\n버튼 같은 게 떨어져\n있지 않으려나…?"
20018-70 = "쿠히히…"
20018-80 = "아, 어서 와. 선생님.\n오늘도 변함없이\n바빠 보이네. 쿠히히…"
20018-90 = "어라, 선생님이잖아?\n요즘 계속 바빠보이네."
20018-100 = "슬슬 RABBIT 소대의\n보급품을 보충해\n두어야겠는데…"
20018-110 = "하읍…\n당분 보충은 중요하지.\n이건 양보할 수 없어!"
20018-120 = "아…… 전에 선배가\n만들어 주던 그 유부초밥\n먹고 싶다…"
20018-130 = "정말이지… 어째서\n사탕은 기본 보급품에\n포함되지 않는 거야?"
20018-140 = "당분은 오퍼레이터의\n연료나 다름없는데."
20018-150 = "일, 바빠 보이네.\n도와줄까?"
20018-160 = "뭐, 맡겨만 달라구.\n쿠히히…"
20018-170 = "생일 축하해, 선생님.\n그런 의미에서…"
20018-180 = "한바탕 화려하게\n축하의 불꽃 놀이,\n하지 않을래?"
20018-190 = "생일 케이크? 아니, 괜찮아.\n나는 폭죽만 있으면\n그걸로 충분해."
20018-200 = "그래, 이왕이면 엄청나게\n화려하고 강렬한 것으로…\n쿠히히."
20018-210 = "산해경에서는 새해에\n폭죽을 터트려 악귀를 쫒는\n풍습이 있다고 하던데…"
20018-220 = "정말로\n멋진 풍습이야…\n쿠히히."
20018-230 = "이번 크리스마스에는\nRABBIT 소대원들과 함께\n칠면조를 먹기로 했어."
20018-240 = "응? 그야 물론\n항상 있는 그 공원에서지."
20018-250 = "응? 소방안전법…?\n그게 뭔데?"
20018-260 = "이 호박 랜턴…\n백린 분말을 뿌리면 더\n예쁘게 타오를 것 같은데…"
20018-270 = "하아, 하아…"
20018-290 = "선생님. 세상에는\n여러가지 금기가 있어."
20018-300 = "누르면 안 되는 버튼이라든가,\n넘어서는 안 되는 선이라든가…"
20018-310 = "그 중에는 한번 선택하면\n돌이킬 수 없는, 파멸로\n이어지는 선택지도 존재하지."
20018-320 = "한 걸음만 실수해도\n끝나버리지만, 그래도 스스로의\n마음을 만족시킬 수만 있다면…"
20018-330 = "선생님은 어떤\n선택을 할 거야?"
20018-340 = "무의미한 질문이라는 건\n나도 알아. 선생님은 성실하니까."
20018-350 = "하지만 나는…… 그\n선을 넘어버릴지도 몰라."
20018-360 = "왜냐하면 그 파멸의 순간은,\n나 자신을 증명할 수 있는\n기회이기도 하니까."
20018-370 = "그러니까, 선생님."
20018-380 = "이 선을……\n나와 함께 넘어 보지 않을래?"
20018-2600 = "RABBIT 224식 권총, 제대로 수령했어.\n…저기, 이거 너무 작은데.\n화력은 제대로 나오는거야?"

[translation]
20017-10 = "Blue Archive"
20017-20 = "แหะๆๆ... สุดท้ายฉันก็มาที่นี่จนได้ ต่อไปคงจะสาหัสกว่านี้\nใช่มั้ยคะ คงลำบากสินะคะ แต่ว่าชีวิตก็เป็นแบบนี้แหละ...\nช่วยไม่ได้นะคะ ฮิโยริค่ะ ขอฝากตัวด้วยนะคะ แหะๆ..."
20017-30 = "แหะๆ...\nขออภัยที่เสียมารยาทค่ะ"
20017-40 = "เหมือนจะมีเฟอร์นิเจอร์ดีๆ\nอยู่เยอะมากเลยค่ะ"
20017-50 = "อันนี้ด้วย อันนั้นก็ด้วย...\nดีจัง... มีแต่ของดีๆ\nอยู่เยอะเลยค่ะ..."
20017-60 = "แหะๆ...\nขอรบกวนหน่อยนะคะ\nขอโทษด้วยค่ะ"
20017-70 = "ดูเหมือนที่นี่จะมีเรื่องสนุกอยู่\nแต่ดูอีกทีก็เหมือนจะไม่ใช่..."
20017-80 = "วะ...ว้าย?!\nชะ...เชิญเลยค่ะ คุณครู"
20017-90 = "ฉะ...ฉันกำลังรอ...\nอยู่เลยค่ะ!"
20017-100 = "แหะๆ แหะๆๆ...\nค่ะ ถึงจะรู้สึกแย่\nแต่วันนี้ฉันต้องมาเข้าเวรค่ะ"
20017-110 = "คุณครูสั่งงานมาได้เลยค่ะ\nฉันคิดว่าคงจะมีเรื่องที่ฉัน...\nพอจะช่วยคุณครูได้..."
20017-120 = "คือว่ามีงานอะไรจะให้ทำ\nอีกมั้ยคะ...? นอกจากการให้ฉัน\nคอยอยู่ข้างๆ มาตั้งแต่เมื่อกี้..."
20017-130 = "งานที่ยากกว่านี้ก็ได้ค่ะ..."
20017-140 = "คะ...? อยู่เฉยๆ แบบนี้ก็พอ\nจริงเหรอคะ? ได้เหรอคะ?"
20017-150 = "ฉันอ่านหลายๆ อย่าง\nมาจากนิตยสารแล้ว... "
20017-160 = "แหะๆ ฉันอาจจะ...\nช่วยงานคุณครูได้นะคะ"
20017-170 = "ถึงจะลำบากก็เถอะ..."
20017-180 = "ชีวิตเราก็ลำบากมาตั้งแต่ไหน\nแต่ไรแล้ว ไม่เป็นไรหรอกค่ะ"
20017-190 = "คะ...คุณครูคะ\nสุขสันต์วันเกิดค่ะ!!"
20017-200 = "คะ...คุณครูต้องเจอ\nช่วงเวลาที่ยากลำบากแบบนี้\nมานับครั้งไม่ถ้วนแล้วเหรอคะ?"
20017-210 = "สุดยอดมากเลยค่ะ\nสุดยอดมากๆ เลย..."
20017-220 = "ถึงจะลำบาก...\nแต่ฉันจะพยายามต่อไปค่ะ"
20017-230 = "มนุษย์อย่างเราเกิดมา\nเพื่อพบกับความเจ็บปวดสินะคะ?"
20017-240 = "แหะๆๆ เพราะงั้นฉันเลย...\nใช้ชีวิตอยู่อย่างซื่อสัตย์ที่สุด\nจนถึงตอนนี้ค่ะ"
20017-250 = "มะ...มันฟังดูแปลกๆ\nหรือเปล่านะ...?\nยะ..อย่างนั้นเหรอคะ?"
20017-260 = "ผ่านไปอีกหนึ่งปีอีกแล้วนะคะ"
20017-270 = "ปีใหม่นี้จะมีความเจ็บปวด\nมากมายแค่ไหนที่รออยู่\nก็ไม่รู้นะคะ แหะๆๆ"
20017-280 = "ฉันอ่านเรื่องวันคริสต์มาส\nมาจากนิตยสารบ้างแล้วค่ะ\nฉันเตรียมพร้อมแล้วค่ะ"
20017-290 = "เอ๋...?\nทำไมถึงหนีไปล่ะคะ?"
20017-300 = "แหะๆๆ... ทั้งถูกแย่งลูกกวาดไป\nทั้งโดนหลอก ไม่ว่าทางไหน\nก็เจ็บปวดทั้งนั้นเลยค่ะ"
20017-310 = "ตัวเลือกทั้งสองทางนี้\nดูเหมือนการเติบโต\nของชีวิตเราเลยว่ามั้ยคะ?"
20017-330 = "คุณครู ชะ...ช่วยดูหน่อยสิคะ\nตรงนี้ของฉัน..."
20017-340 = "มะ... มันแปลกใช่มั้ยคะ?\nมันไม่เหมือนคนอื่นใช่มั้ยคะ?"
20017-350 = "มะ...เมื่อก่อนฉันคิดมาตลอด\nว่ามันแปลกๆ อยู่แล้วเชียว..."
20017-360 = "ว่าแล้ว... มันแปลกจริงๆ\nด้วยสินะคะ!!"
20017-370 = "คุณครู...? ทำไมคุณครู\nถึงหลบตาบ่อยๆ ล่ะคะ? "
20017-380 = "หรือว่ามันแปลกมากๆ\nจนมองตรงๆ ไม่ได้\nเลยงั้นเหรอคะ? "
20017-390 = "แงงงงง-- อย่างนั้นเหรอคะ...\nถ้าเป็นแบบนี้ก็ไม่มีความหมาย\nที่จะมีชีวิตอยู่แล้วค่ะ "
20017-400 = "ทำไมชีวิตของฉัน\nถึงกลายเป็นแบบนี้ได้คะ? "
20017-410 = "ทำไมมันถึงยุ่งเหยิงและวุ่นวาย\nเหมือนกับตรงนั้นของฉัน\nที่มองตรงๆ ยังไม่ได้เลยค่ะ"
20017-420 = "แหะๆๆ... คุณครูช่วยพูด\nปลอบใจฉันหน่อยได้มั้ยคะ...  "
20017-430 = "ว่าถึงร่างกายฉันจะแปลกๆ\nแต่ก็ยังทำประโยชน์บางอย่างได้?\nช่วยพูดหน่อยได้มั้ยคะ"
20017-2600 = "คุณครูจะจ้องฉันให้ทะลุ\nถึงกระดูกเลยสินะคะ\nแหะๆ... ไม่มีวิธีอื่นอีกแล้ว\nฉันจะยอมแพ้และยอมรับชะตาค่ะ"

[translation]
20017-10 = "Blue Archive."
20017-20 = "Heehee... Finally, I made it. It's gonna be really hard, right? But I've learned that's just life... I'm Hiyori. Nice to meet you..."
20017-30 = "Heehee... Excuse me."
20017-40 = "There's a lot of nice furniture here..."
20017-50 = "This looks nice. That's nice too... Everything is nice..."
20017-60 = "Heehee... Sorry to inconvenience you. Excuse me."
20017-70 = "I have a good feeling about this...I think...maybe not..."
20017-80 = "Wh-Whoa?! Welcome, Sensei..."
20017-90 = "I-I've been waiting...!"
20017-100 = "Heehee... Yes, I'm sorry to say that I'm on duty today."
20017-110 = "Please tell me if I can help you...even I must be able to do something..."
20017-120 = "Is there anything else I can do...? We've just kinda been hanging out..."
20017-130 = "Anything harder I can do...?"
20017-140 = "Huh? Really? I can just stay right here?"
20017-150 = "I've read up on all kinds of things in magazines..."
20017-160 = "Heehee. Maybe I can be helpful..."
20017-170 = "Work is hard, but..."
20017-180 = "Life is supposed to be hard, so it's okay."
20017-190 = "S-Sensei! Happy birthday!"
20017-200 = "You must have suffered many difficult things until now, right?"
20017-210 = "That's amazing. Incredible."
20017-220 = "It's hard for me too...but I'll try my best."
20017-230 = "Suffering is inevitable for human beings, right?"
20017-240 = "Heehee... so that means I've been living a full life for a long time now."
20017-250 = "Huh? That sounds strange?! R-Really?"
20017-260 = "Another year is passing by."
20017-270 = "I wonder how much suffering is waiting in the new year. Heehee..."
20017-280 = "I learned about Christmas in a magazine. I'm ready."
20017-290 = "...Huh? Why are you running away?"
20017-300 = "Heehee... Losing candy or being tricked... Both are painful."
20017-310 = "Painful choices are what symbolize life, don't you think?"
20017-330 = "Sensei, look. Look at me..."
20017-340 = "I-It's kind of different, right? Does it look weird?"
20017-350 = "I've been worrying that it looks strange..."
20017-360 = "And I was right!"
20017-370 = "Sensei? Why do you keep looking away?"
20017-380 = "Is it s-so strange you can't even look at it?"
20017-390 = "Waaaah! So that's how it is. This life has no meaning."
20017-400 = "Why is life so..."
20017-410 = "Grotesque. Like my place here that you can't even look at straight..."
20017-420 = "Heehee... Sensei. Can I have some words of encouragement...?"
20017-430 = "I want you to say that even though I'm strange, maybe I could still be useful in some way."
20017-2600 = "I know that you're trying to make me work as your servant. Heehee...I have no choice, so I'll accept."

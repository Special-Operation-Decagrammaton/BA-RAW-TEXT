[translation]
20017-10 = "蔚藍檔案。"
20017-20 = "耶嘿嘿……結果我也來到這裡了……今後應該也會很辛苦吧？應該會很痛苦吧？但這好像就叫做人生……所以也沒辦法。我是日和。請多指教……耶嘿嘿。"
20017-30 = "耶嘿嘿。\n失禮了……"
20017-40 = "好像有很多\n品質不錯的家具……"
20017-50 = "不管哪個……都不錯呢……\n有很多感覺不錯的東西……"
20017-60 = "耶嘿嘿……\n給你添麻煩了，\n不好意思……"
20017-70 = "心情好像\n能變得開心……\n又好像沒有……"
20017-80 = "哇啊！？\n歡，歡迎回來，老師……"
20017-90 = "我，我一直在等你……！"
20017-100 = "耶嘿嘿……\n是，雖然你可能不樂意，\n不過今天的值日生是我。"
20017-110 = "如果有任何吩咐請儘管說……\n根據內容，我說不定能幫上……"
20017-120 = "那個，有沒有事情可以做……？\n我從剛剛開始就只是\n和老師一起待著而已……"
20017-130 = "比如某些\n更辛苦的工作……"
20017-140 = "……咦？只要這樣\n待著就可以了？\n……真的嗎？"
20017-150 = "這陣子，我讀了\n很多那一類的雜誌。"
20017-160 = "耶嘿嘿……\n搞不好可以\n幫得上忙……"
20017-170 = "工作雖然很痛苦……"
20017-180 = "不過人生本來就充滿痛苦，\n所以沒關係。"
20017-190 = "祝，祝老師\n生日快樂！！"
20017-200 = "老師已經經歷過無數次\n這麼痛苦的時間了對吧？"
20017-210 = "太了不起了。\n真的好厲害喔！"
20017-220 = "雖然我也很痛苦……\n不過以後我會加油的。"
20017-230 = "人，就是為了受苦\n才誕生的對吧？"
20017-240 = "嘿嘿……所以我\n已經過了好幾年\n充實的生活。"
20017-250 = "那，那可能不太對……？\n是這樣嗎？"
20017-260 = "又這樣過了一年。"
20017-270 = "新的一年裡，\n又會有多少痛苦\n在等著我們呢……欸嘿嘿。"
20017-280 = "關於聖誕節，\n我有在雜誌上讀過。\n已經做好萬全準備了。"
20017-290 = "……咦？\n老師為什麼\n一副要逃跑的樣子？"
20017-300 = "耶嘿嘿……\n不管是糖果被搶走，\n還是被人惡作劇……\n都很令人難受呢。"
20017-310 = "不管選哪邊，\n都是痛苦的二選一……\n就和人生一樣……"
20017-330 = "請，請看，老師，\n我的這個地方……"
20017-340 = "果，果然很奇怪對不對？\n跟大家不一樣對吧！？"
20017-350 = "我從之前就一直在想，\n自己的肚臍是不是很奇怪……"
20017-360 = "果然，\n是那樣對吧……！"
20017-370 = "老，老師？\n為什麼從剛才，\n就一直把視線……？"
20017-380 = "難道……奇，奇怪到了\n無法直視的程度嗎！？"
20017-390 = "一定是這樣對吧……\n看來我已經\n沒有活下去的意義了。"
20017-400 = "為什麼人生會……"
20017-410 = "像我這簡直無法\n直視的地方一樣，\n這麼畸形……"
20017-420 = "老，老師……\n請至少說點感想吧……"
20017-430 = "像是這種身體也沒關係，\n也能有用處之類的，\n拜託說點什麼吧……"
20017-2600 = "老師這是打算\n要將我使喚到粉身碎骨對吧……\n反正我也無從抵抗了……\n就欣然接受吧，耶嘿嘿……"

[translation]
20017-10 = "블루 아카이브."
20017-20 = "헤헤헤… 결국 저도 여기에 와버렸네요. 앞으로 괴롭겠죠? 힘들겠죠? 그치만 그게 인생이라고 배웠으니… 어쩔 수 없겠네요. 히요리입니다. 잘 부탁드려요… 헤헤"
20017-30 = "헤헤……\n실례합니다."
20017-40 = "뭔가 좋아 보이는\n가구들이, 잔뜩……"
20017-50 = "이것도 저것도…\n좋네요…… 좋아 보이는\n물건들이 잔뜩……"
20017-60 = "헤헤…\n폐를 끼치겠습니다.\n죄송해요."
20017-70 = "즐거운 기분이\n들 것 같기도 하고…….\n아닌 것 같기도 하고……."
20017-80 = "우, 우왓?!\n어, 어서 오세요. 선생님……"
20017-90 = "기, 기다리고\n있었습니다……!"
20017-100 = "헤, 헤헤….\n네. 괴롭겠지만\n이번 당번은 저예요."
20017-110 = "뭔가가 있다면 말씀해 주세요……\n내용에 따라서는\n혹시 도움이 될 지도……"
20017-120 = "저기, 뭔가 다른 할 일은\n없나요……? 아까부터 함께\n있는 것 말고는……"
20017-130 = "더 힘든\n일이라든가……."
20017-140 = "네? 진짜로\n이렇게 있기만 하면\n되나요? 정말로?"
20017-150 = "얼마 전에, 그런 잡지에서\n여러 가지를 읽고 왔으니까요."
20017-160 = "에헤헤……\n뭔가 도움이 될 지도\n예요……."
20017-170 = "일은, 괴롭지만……"
20017-180 = "인생은 원래 전부 힘든\n것이기 때문에, 괜찮습니다."
20017-190 = "서, 선생님의 생일\n축하드려요!!"
20017-200 = "이렇게 괴로운 시간을\n선생님은 수도 없이\n반복해오신 거죠?"
20017-210 = "정말 대단하네요.\n굉장하네요."
20017-220 = "저도 괴롭지만…\n앞으로 힘내겠습니다."
20017-230 = "사람은 괴롭기 위해\n태어나는 거잖아요?"
20017-240 = "헤헤…… 그러니까 저는\n벌써 몇 년이고, 충실한\n삶을 살고 있는 거죠."
20017-250 = "그, 그건 틀릴지도……?\n그런가요?"
20017-260 = "또 이렇게\n한해가 흘러가네요."
20017-270 = "올해는 새롭게,\n얼마나 많은 괴로움이 기다리고\n있는 걸까요…… 에헤헤."
20017-280 = "크리스마스에 대해서는\n잡지에서 읽어뒀어요.\n저는 준비 만전이에요."
20017-290 = "……어?\n어째서 도망치는 거죠?"
20017-300 = "헤헤…. 사탕을 뺏기든지\n장난을 당하든지…\n어느 쪽이든 괴롭네요."
20017-310 = "어느 쪽을 선택해도\n괴로운 양자택일……\n그야말로 인생 같네요……"
20017-330 = "봐, 봐주세요, 선생님.\n저의 이곳…"
20017-340 = "여, 역시 이상하죠?\n다른 사람들과 다르죠?!"
20017-350 = "혹시 이상하지 않을까하고,\n전부터 생각하고 있었지만……."
20017-360 = "역시\n그런 거였어요!!"
20017-370 = "선생님?\n왜 자꾸 시선을\n피하는 거죠?"
20017-380 = "설마 또, 똑바로\n볼 수 없을 정도로\n이상한 건가요?"
20017-390 = "으하아아앙- 그런거군요……\n이래서는 살아갈\n의미가 없어요."
20017-400 = "어째서 인생은\n이렇게……"
20017-410 = "마치 똑바로 보기도\n힘든 제 이곳처럼,\n그로테스크하고……."
20017-420 = "헤헤…… 선생님,\n뭔가 격려의 한마디라도……."
20017-430 = "이런 이상한 몸이라도\n어딘가에는 쓸모가 있을\n거라고 말해주시면 안될까요?"
20017-2600 = "선생님은 저를 뼛속까지\n부려 먹을 셈인 거네요.\n뭐어…… 다른 방법이 없으니까\n포기하고 받아들일게요.\n에헤헤……."

[translation]
20025-10 = "蔚、蔚藍……檔案……"
20025-20 = "那，那個……我又來了……\n明明才過新年……對不起……"
20025-30 = "啊，對，對不起。\n我這種人竟然穿\n這麼漂亮的衣服……"
20025-40 = "老，老師……？\n不在嗎……"
20025-50 = "這裡就是老師的……\n為，為什麼\n我這種人會在這裡……"
20025-60 = "是，是不是\n有點突兀……"
20025-70 = "好想躲起來……"
20025-80 = "新，新年快樂，\n老師……！！"
20025-90 = "您居然特意找我……\n非常抱歉！！"
20025-100 = "……啊！？\n謝，謝謝您！"
20025-110 = "歡迎回來，老師！\n我，我一直在等您！"
20025-120 = "要做……什麼好呢……\n新年……要引爆什麼……"
20025-130 = "這裡有什麼\n我能做的嗎……"
20025-140 = "今年的計畫是嗎……？"
20025-150 = "應，應該要\n先想好嗎……！？"
20025-160 = "我，我只希望……\n今年也……"
20025-170 = "能好好聽老師的話……\n是我的目標……"
20025-180 = "對，對不起。\n我一直是這個樣子，\n對不起……"
20025-190 = "生……生日快樂……"
20025-200 = "那個……\n為了避免您不高興，\n我說得很小聲……"
20025-210 = "我，我的生日嗎……！？\n怎，怎麼會……"
20025-220 = "您記得這種\n微不足道的事嗎……！？"
20025-230 = "新年快樂……！\n如，如果，您討厭新年\n的話我就去把新年給……"
20025-240 = "消滅掉！"
20025-250 = "居，居然已經\n到聖誕節了……"
20025-260 = "這麼說來，聖誕老人是\n得到老師的許可後\n才來夏萊的嗎……？"
20025-270 = "如果不是的話……"
20025-280 = "啊……萬聖節……\n那個，我今年\n沒有開槍……"
20025-300 = "噫，噫噫……！？\n啊，啊……老師……！？\n您，您什麼時候……！？"
20025-310 = "不，不是！那個，\n我沒有要特別計較\n這種事的意思！！真的！！"
20025-320 = "咦，總覺得\n以前也發生過……\n類似的事情……"
20025-330 = "什，什麼……？這個嗎？\n這個是……門松……"
20025-340 = "老，老師說\n這種東西看重的是心意，\n所以……"
20025-350 = "這樣的話，我想\n我一路栽培的這孩子\n應該不錯……"
20025-360 = "難，難道，我又做了\n多餘的事了嗎……！？"
20025-370 = "對不起對不起\n對不起對不起\n對不起……"
20025-380 = "咦，嗯……！？什麼……？\n真，真的……嗎……？"
20025-390 = "沒問題……嗎……？"
20025-400 = "……嘿……\n……嘿嘿……"
20025-2600 = "今年，明年……\n還有來世……！\n老師討厭的東西，\n我全部都會消滅掉！"

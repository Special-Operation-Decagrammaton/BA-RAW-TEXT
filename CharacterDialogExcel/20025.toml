[translation]
20025-10 = "B... Blue... Archive..."
20025-20 = "ดะ... ได้เจอกันอีกแล้วนะคะ...\nตั้งแต่เริ่มปีใหม่เลย... ขอโทษด้วยนะคะ"
20025-30 = "เอ่อ... ขะ... ขอโทษด้วยค่ะ\nขอโทษที่คนอย่างฉัน\nใส่เสื้อผ้าสวยๆ แบบนี้..."
20025-40 = "คะ... คุณครู...?\nหรือว่าจะไม่อยู่..."
20025-50 = "ที่นี่มัน... ของคุณครู\nทำไมคนอย่างฉัน\nถึงมาอยู่ที่นี่ได้..."
20025-60 = "คะ... คือว่า\nมันเด่นไปหรือเปล่าคะ..."
20025-70 = "อยากมุดดินหนีจัง..."
20025-80 = "สะ... สวัสดี\nปีใหม่ค่ะ คุณครู...!!"
20025-90 = "คุณครูตั้งใจเรียกมาหากันแบบนี้... \nขอโทษด้วยนะคะ!!"
20025-100 = "อ๊ะ...!?\nขอบคุณค่ะ!"
20025-110 = "เข้ามาสิคะ คุณครู!\nฉะ...ฉันกำลังรออยู่เลยค่ะ!"
20025-120 = "คะ...ควรทำอะไรรับปีใหม่ดีคะ?\nระ...หรือว่าควรต้องระเบิดอะไร\nบางอย่าง...?"
20025-130 = "ฉันทำอะไรที่นี่ได้บ้างคะ..."
20025-140 = "แพลนตลอดทั้งปีเหรอคะ...?"
20025-150 = "มา... มาคิดๆ ดูแล้ว\nก็มีอยู่อย่างหนึ่งค่ะ...!?"
20025-160 = "ฉะ... ฉันก็แค่...\nปีนี้..."
20025-170 = "ตั้งใจว่าจะเชื่อฟังคำพูด\nของคุณครูเช่นเคย แต่ก็..."
20025-180 = "ขะ... ขอโทษด้วยนะคะ\nขอโทษที่เป็นแบบนี้ตลอดเลย..."
20025-190 = "สะ... สุขสันต์วันเกิดนะคะ..."
20025-200 = "ฉันพูดเบาๆ เพื่อไม่ให้\nเป็นการรบกวนค่ะ..."
20025-210 = "วะ... วันเกิดฉันเหรอคะ...!?\nทำไม... ทำไมถึง..."
20025-220 = "ทำไมถึงจำวันที่ไม่สำคัญ\nอะไรแบบนั้นได้ด้วยล่ะคะ...?!"
20025-230 = "สวัสดีปีใหม่ค่ะ...!\nถ้าไม่ชอบวันปีใหม่\nเดี๋ยวฉัน..."
20025-240 = "จะกำจัดวันปีใหม่ทิ้งเองค่ะ!"
20025-250 = "คริสต์มาสแล้วงั้นเหรอ..."
20025-260 = "จะว่าไปแล้ว คุณครูจะอนุญาต\nให้ซานต้ามาที่ชาเล่ต์\nรึเปล่าคะ…?"
20025-270 = "ถ้าหากว่าไม่ละก็..."
20025-280 = "จริงสิ... ฮาโลวีน...\nครั้งนี้ฉันไม่ได้ยิงนะคะ..."
20025-300 = "เอ๋~~...!? เอ่อ... คุณครู\nมะ...มาตั้งแต่เมื่อไรคะ!?"
20025-310 = "เปล่านะคะ! คือว่า ฉันไม่ได้บ่น\nอะไรเลยนะคะ จริงๆ นะคะ!!"
20025-320 = "เอ๋... เหมือนเคยเกิด\nเหตุการณ์คล้ายๆ กัน...\nมาก่อนเลย..."
20025-330 = "คะ... คะ? อันนี้เหรอคะ?\nมันคือ... คาโดมัตสึค่ะ..."
20025-340 = "คุณครูบอกเองว่า\nสิ่งสำคัญคือความรู้สึก..."
20025-350 = "ฉันเลยคิดว่าถ้าเป็น\nเด็กคนนี้ที่ฉันดูแลมานาน...\nก็น่าจะใช้ได้..."
20025-360 = "ระ... หรือว่าฉัน\nทำอะไรไม่เข้าเรื่องอีกแล้วรึเปล่าคะ...!?"
20025-370 = "ขอโทษค่ะขอโทษค่ะ\nขอโทษค่ะขอโทษค่ะ\nขอโทษค่ะ..."
20025-380 = "คะ...? คะ...?\nคือว่า... พูดจริงเหรอคะ?"
20025-390 = "มัน... ไม่เป็นไรจริงๆ ใช่มั้ยคะ?"
20025-400 = "...แหะ...\n...แหะๆ..."
20025-2600 = "จะปีนี้... หรือปีหน้า...\nรวมถึงชาติหน้าด้วย...!\nสิ่งที่คุณครูเกลียด...\nฉันจะกำจัดมันให้สิ้นซากค่ะ!"

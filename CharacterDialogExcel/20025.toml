[translation]
20025-10 = "B-Blue... Archive..."
20025-20 = "Um, sorry... It's me again already... E-Even though the year's just started..."
20025-30 = "Ah, I-I'm sorry. Someone like me...shouldn't be wearing something so pretty..."
20025-40 = "S-Sensei...? Are they not here?"
20025-50 = "This is Sensei's, so... Why is s-someone like me here?"
20025-60 = "I-I think I stand out too much..."
20025-70 = "I wanna hide..."
20025-80 = "H-Happy New Year, Sensei!"
20025-90 = "A-And you actually called me, on purpose... I'm sorry!"
20025-100 = "...Ah! T-Thank you!"
20025-110 = "Welcome, Sensei! Um, I-I've been waiting! N-Not that you need to rush for someone like me..."
20025-120 = "To celebrate New Year's...W-What should I do? What sh-should I explode...?"
20025-130 = "What can someone like me do here..."
20025-140 = "Um...p-plans? For the year?"
20025-150 = "Oh no. S-Should I have thought about it?!"
20025-160 = "I-I just want... This year..."
20025-170 = "I want to l-listen to what you tell me... And learn f-from it... That's my goal..."
20025-180 = "I-I'm sorry. It's always like this..."
20025-190 = "H-Happy birthday..."
20025-200 = "I wanted to say it quietly...so you wouldn't have to listen..."
20025-210 = "M-My birthday?! W-Why?"
20025-220 = "Why would you remember something so insignificant?"
20025-230 = "Happy New Year...! I-If it turns out...that it's a bad year for you..."
20025-240 = "I'll get rid of the year for you..."
20025-250 = "I-It's already Christmas..."
20025-260 = "I was wondering...does Santa get your permission before coming to Schale?"
20025-270 = "If not, I'll..."
20025-280 = "Ah... Halloween... I, that is... Th-This time, I didn't shoot..."
20025-300 = "E-Eek! A-Ah... Sensei?! Since when have you been...!?"
20025-310 = "No! It's not like that! I'm really, really, really not complaining! Really!"
20025-320 = "Um...does this seem...familiar maybe?"
20025-330 = "H-Huh...? You mean this? It's...my kadomatsu..."
20025-340 = "You said... Y-You told me that intentions are most important for this kind of thing..."
20025-350 = "So I thought... I thought something I-I spent a long time raising might be good..."
20025-360 = "B-But maybe I did something useless, yet again..."
20025-370 = "I'msorryI'msorryI'msorryI'msorryI'msorry!"
20025-380 = "Uh...huh?! What? ...R-Really?"
20025-390 = "It's...really okay?"
20025-400 = "...Hee...Heehee..."
20025-2600 = "This year and next year, and the year after that...and even in the next life...! I'll get rid of everything that you don't like!"

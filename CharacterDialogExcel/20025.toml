[translation]
20025-10 = "브, 블루……아카이브……"
20025-20 = "또, 또 찾아오게 되었습니다……\n새해 시작부터…… 죄송합니다……"
20025-30 = "아, 죄, 죄송합니다.\n저 따위가 이렇게\n예쁜 옷을 입어서…."
20025-40 = "서, 선생님…?\n안 계시나…."
20025-50 = "이곳이 선생님의….\n왜 나 같은 게 여기에…."
20025-60 = "호, 혹시 좀\n튀는 걸까요…."
20025-70 = "숨고 싶어…."
20025-80 = "새, 새해 복 많이\n받으세요, 선생님...!!"
20025-90 = "일부러 불러주시다니…\n죄송합니다!!"
20025-100 = "……핫!?\n감, 감사합니다!"
20025-110 = "어서 오세요, 선생님!\n기, 기다리고 있었습니다!"
20025-120 = "뭘… 하면 좋을까요….\n새해를 맞아…\n뭘 터뜨리면…."
20025-130 = "여기서 제가\n뭘 할 수 있을까요…."
20025-140 = "한 해의 계획이요…?"
20025-150 = "새, 생각해 봤어야\n하나요…!?"
20025-160 = "저, 저는 그저…\n올해도…."
20025-170 = "선생님 말씀 잘 듣는 게…\n목표인데…."
20025-180 = "죄, 죄송합니다.\n항상 이런 식이라서 죄송합니다…."
20025-190 = "새……생신\n축하드립니다…."
20025-200 = "불쾌하지 않게,\n작게 말했습니다…."
20025-210 = "제, 제 생일인가요…!?\n왜, 왜 그런…"
20025-220 = "하찮은 일을\n기억하고 계신 건가요…!?"
20025-230 = "새해 복 많이 받으세요…!\n호, 혹시 새해가 싫으시면\n제가 새해를…"
20025-240 = "없애버릴게요!"
20025-250 = "버, 벌써 성탄절이라니…."
20025-260 = "그러고 보니, 산타는\n선생님 허락을 맡고\n샬레에 오는 건가요…?"
20025-270 = "만약 아니라면…."
20025-280 = "아…. 할로윈….\n그, 이번에는\n쏴버리지 않았습니다…."
20025-300 = "히, 히익……!?\n아, 아……. 선생님……!?\n어, 언제부터……!?"
20025-310 = "아니요! 그게, 딱히 따지는 건\n아닙니다만!! 정말로!!"
20025-320 = "어라, 뭔가 전에도\n비슷한 일이……\n있었던 것 같은……"
20025-330 = "네, 네……? 이거요?\n카도마츠…… 인데요……."
20025-340 = "서, 선생님께서\n이런 건 마음이\n중요하다고 하셔서……."
20025-350 = "그럼 쭉 키워온\n이 아이가 좋겠다\n싶어, 서……."
20025-360 = "설, 설마, 또 쓸데없는\n짓을 해버렸나요…!?"
20025-370 = "죄송합니다죄송합니다\n죄송합니다죄송합니다\n죄송합니다……."
20025-380 = "어으음……!? 네……?\n저, 정말…… 이신가요……?"
20025-390 = "괜찮…은 건가요…?"
20025-400 = "……헤…….\n……헤헤……."
20025-2600 = "올해도, 내년에도…….\n그리고 내세에도……!\n선생님이 싫어하는 건,\n제가 다 없애버릴게요!"

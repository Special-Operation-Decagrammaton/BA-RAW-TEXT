[translation]
26002-20 = "I'm Juri from Gehenna's School Lunch Club. Let me know if you're hungry."
26002-30 = "Mmm... What a sweet scent."
26002-40 = "Do you think this is edible?"
26002-50 = "Maybe I should try frying it to see what happens."
26002-60 = "Oh, wow. This place is nice."
26002-70 = "I think I can cook something really tasty here."
26002-80 = "Welcome, Sensei. Aren't you feeling hungry?"
26002-90 = "Welcome, Sensei. Would you like to eat before we begin?"
26002-100 = "What about...just a snack?"
26002-110 = "Ugh..."
26002-120 = "Why does everything I cook end in failure?"
26002-130 = "If the ingredients are still moving, that means it's fresh, right?"
26002-140 = "Do you smell something burning...?"
26002-150 = "Oh, silly me! I forgot about the pie in the oven!"
26002-160 = "Which do you think will add more flavor? Sulfuric or hydrochloric acid?"
26002-170 = "Happy birthday, Sensei!"
26002-180 = "I baked a cake for you..."
26002-190 = "...but it, uh, ran away. Yeah..."
26002-200 = "You want to get me something for my birthday?"
26002-210 = "Heehee. Hearing you say that is all I could ever want."
26002-220 = "I made osechi to celebrate New Year's."
26002-230 = "Would you mind giving it a taste?"
26002-240 = "Um, so I roasted a turkey for Christmas..."
26002-250 = "It shouldn't still be moving...right?"
26002-260 = "I'm surprised at how popular my usual snacks are for Halloween."
26002-270 = "Apparently, they make for good for pranks."
26002-290 = "Ah. Look, Sensei."
26002-300 = "That ripe tomato looks so delicious, doesn't it?"
26002-310 = "Heehee. This is all the result of everyone's hard work at the School Lunch Club."
26002-320 = "Growing this garden was really worth it!"
26002-330 = "Oh, the tomatoes over there look really good too..."
26002-340 = "Um, uh, it's over there, b-but..."
26002-350 = "Aren't we really close right now...?"
26002-360 = "(Ah! Sensei's so close I can smell them...)"
26002-370 = "(M-My heart is beating faster for some strange reason...! )"
26002-380 = "I-I'm okay! P-Please don't worry...!"
26002-390 = "But, it's just that, you see... Um..."
26002-400 = "My face feels so hot... Eek...!"
26002-2600 = "Heehee, if you use this gun for cooking, the meat becomes significantly more tender!"

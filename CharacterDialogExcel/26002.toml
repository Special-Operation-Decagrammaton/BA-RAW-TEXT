[translation]
26002-20 = "게헨나 급양부의 주리라고 해요.\n배가 고프면 제게 꼭 말씀해 주셔야 해요?"
26002-30 = "음~ 달콤한 냄새…"
26002-40 = "이것도 먹을 수 있는 걸까요?"
26002-50 = "일단 한 번 튀겨볼까…"
26002-60 = "어머나. 정말 좋은 곳이네요."
26002-70 = "여기선 좋은 요리를\n할 수 있을 거 같아요."
26002-80 = "어서 오세요, 선생님.\n출출하지는 않으신가요?"
26002-90 = "어서 오세요, 선생님.\n식사부터 하시겠어요?"
26002-100 = "아니면… 간식부터?"
26002-110 = "우으…"
26002-120 = "저는 어째서 요리를 했다 하면\n실패만 하는 걸까요…"
26002-130 = "식재료가 살아 움직인다는 것은\n그만큼 신선하다는 뜻이니\n좋은 거겠죠?"
26002-140 = "어디서 타는 냄새가 난다고요…?"
26002-150 = "…어머, 내 정신 좀 봐!\n파이를 오븐에\n넣어놓은 걸 깜박했어요!"
26002-160 = "요리의 신맛을 내기 위해서는\n황산을 넣는게 좋을까,\n염산을 넣는게 좋을까…?"
26002-170 = "생일 축하드려요, 선생님!"
26002-180 = "선생님께 드리려고\n케이크를 구웠는데"
26002-190 = "그게… 도망가 버렸어요…"
26002-200 = "제 생일 선물 말인가요?"
26002-210 = "후후…\n그 말씀만으로도 충분하답니다."
26002-220 = "새해를 맞아\n오세치를 만들어 봤어요."
26002-230 = "괜찮으시다면\n맛을 봐 주시겠어요?"
26002-240 = "저, 그게 크리스마스라\n칠면조를 구웠는데…"
26002-250 = "구운 칠면조는 살아움직이면\n안 되는 거였죠…?"
26002-260 = "할로윈에는 이상하게도\n제가 만든 과자가\n인기가 좋더라구요."
26002-270 = "장난을 치는 데 쓰기 좋다나."
26002-290 = "앗, 이것 좀 보세요. 선생님."
26002-300 = "새빨갛게 익은 토마토.\n정말 맛있어 보이지 않나요?"
26002-310 = "엣헴. 이것도 다\n급양부로서의 성과예요."
26002-320 = "정성껏 키운 보람이 있네요!"
26002-330 = "아, 저쪽에 있는 토마토도\n탐스럽게 익어서……"
26002-340 = "그게, 아, 저기,\n있는 건데요. 그게……\n어쩐지, 조금 거리가……?"
26002-350 = "이렇게나 가까우면,\n저기, 저……"
26002-360 = "(아, 선생님의 냄새가……)"
26002-370 = "(어, 어째서인지 갑자기,\n가슴이 콩닥 콩닥거리는데요……!?)"
26002-380 = "괘, 괜찮답니다, 네!\n걱정하지 않으셔도……!"
26002-390 = "다만 그게 뭐랄까요,\n그러니까……"
26002-400 = "뭔가 얼굴이 뜨거워져서,\n그게……! 우으……!"
26002-2600 = "후후, 이 총을 요리에 쓰면\n고기의 식감이 훨씬 부드러워지네요!"

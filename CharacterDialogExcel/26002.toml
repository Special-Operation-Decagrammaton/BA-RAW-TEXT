[translation]
26002-20 = "ฉันชื่อจูริ จากชมรมโภชนาการโรงเรียนเกเฮนน่าค่ะ\nถ้าคุณครูรู้สึกหิวละก็ ต้องบอกฉันนะคะ"
26002-30 = "อืม~ กลิ่นที่หอมหวาน..."
26002-40 = "อันนี้ก็กินได้ด้วยเหรอคะ?"
26002-50 = "ถ้างั้น... ลองเอาไปทอดดูแล้วกันนะคะ"
26002-60 = "ว้าว... ที่นี่ดีจังเลยนะคะ"
26002-70 = "น่าจะทำอาหารอร่อยๆ\nได้ที่นี่นะคะ"
26002-80 = "เชิญเลยค่ะ คุณครู\nคุณครูไม่หิวเหรอคะ?"
26002-90 = "เชิญเลยค่ะ คุณครู\nจะทานอาหารก่อนไหมคะ?"
26002-100 = "หรือว่า... จะทานของว่างก่อนดีคะ?"
26002-110 = "อื้ม..."
26002-120 = "ทำไมทุกครั้งเวลาที่ฉันทำอาหาร\nจะต้องล้มเหลวทุกครั้งเลยนะ..."
26002-130 = "ถ้าวัตถุดิบที่ใช้ยังดิ้นดุ๊กดิ๊กอยู่ล่ะก็\nแสดงว่าวัตถุดิบสดใหม่มากๆ\nแบบนี้ดีใช่ไหมล่ะคะ?"
26002-140 = "ได้กลิ่นอาหารไหม้งั้นเหรอคะ?"
26002-150 = "ตายจริง! ฉันนี่แย่จริงๆ!\nฉันอบพายไว้ในเตาอบ\nแล้วก็ดันลืมเสียสนิทเลยค่ะ!"
26002-160 = "เพื่อที่จะให้อาหารมีรสเปรี้ยวนิดหน่อย\nใส่กรดกำมะถันลงไปนิดนึงดีไหมน้า...\nหรือว่าใส่กรดไฮโดรคลอริกลงไปดีนะ...?"
26002-170 = "สุขสันต์วันเกิดค่ะ คุณครู!"
26002-180 = "ฉันอบเค้กมา\nเพื่อคุณครูด้วยนะคะ"
26002-190 = "เอ่อ... หนีไปซะแล้ว..."
26002-200 = "จะให้ของขวัญวันเกิดฉันเหรอคะ?"
26002-210 = "ฮุฮุ... แค่อวยพรให้ก็พอแล้วล่ะค่ะ"
26002-220 = "วันปีใหม่ทั้งที ฉันเลยลองทำ\nอาหารสำหรับวันปีใหม่มาค่ะ"
26002-230 = "ถ้าคุณครูไม่ว่าอะไร\nลองชิมดูสักหน่อยไหมคะ?"
26002-240 = "คือ...วันนี้เป็นวันคริสต์มาส\nฉันอบไก่งวงมาด้วย..."
26002-250 = "ถ้าไก่งวงอบเกิดขยับได้ขึ้นมา\nก็คงไม่ได้ใช่ไหมล่ะคะ...?"
26002-260 = "น่าแปลกที่ในวันฮาโลวีน\nขนมที่ฉันทำจะเป็น\nที่นิยมเป็นพิเศษเลยล่ะค่ะ"
26002-270 = "หรือว่ามันเหมาะกับการ\nเอาไปเล่นสนุกกันนะ"
26002-290 = "อ๊ะ ดูนี่สิคะคุณครู"
26002-300 = "มะเขือเทศสีแดงสด\nดูน่าอร่อยใช่มั้ยล่ะคะ?"
26002-310 = "อ่ะแฮ่ม ทั้งหมดนี่เป็นผลงาน\nของชมรมโภชนาการค่ะ"
26002-320 = "คุ้มค่าที่ประคบประหงมมาอย่างดีเลยค่ะ!"
26002-330 = "อ๊ะ มะเขือเทศที่อยู่ด้านนั้น\nก็เหมือนจะสุกได้ที่แล้ว..."
26002-340 = "คือว่า เอ่อ...\nทางนั้นค่ะ คือว่า...\nทำไมจู่ๆ ถึงได้...?"
26002-350 = "ถ้าเข้ามาใกล้แบบนี้...\nคือว่า... เอ่อ..."
26002-360 = "(อ๊ะ กลิ่นของคุณครู...)"
26002-370 = "(ทะ...ทำไมจู่ๆ ถึงได้\nใจเต้นโครมครามแบบนี้กันนะ...!?)"
26002-380 = "ฉะ... ฉันไม่เป็นไรค่ะ\nไม่ต้องห่วงค่ะ...!"
26002-390 = "แต่จะว่ายังไงดีล่ะคะ...\nคือว่า..."
26002-400 = "ไม่รู้ทำไมถึงรู้สึกร้อนๆ ที่หน้า\nเอ่อ... คะ...คือว่า...!"
26002-2600 = "ฮุฮุ ถ้าเอาปืนนี่ไปใช้ทำอาหารละก็...\nเนื้อที่ใช้ทำอาหารจะต้องนุ่มมากๆ แน่นอนค่ะ!"

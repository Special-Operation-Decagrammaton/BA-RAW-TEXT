[translation]
26002-20 = "我是格黑娜供給部的茱莉。\n肚子餓了的話，請隨時跟我說喔？"
26002-30 = "唔嗯～這甜甜的香氣…"
26002-40 = "這也可以吃嗎？"
26002-50 = "總之，\n先炸一次看看吧…"
26002-60 = "哎呀。\n真是個好地方呢。"
26002-70 = "在這裡\n感覺可以\n做出好吃的料理。"
26002-80 = "歡迎回來，老師。\n肚子餓了嗎？"
26002-90 = "歡迎回來，老師。\n要先吃飯嗎？"
26002-100 = "還是要…吃．點．心？"
26002-110 = "嗚嗚……"
26002-120 = "為什麼我每次做料理\n都會失敗呢……"
26002-130 = "食材還活著\n就代表它還很新鮮，\n是件好事吧？"
26002-140 = "總覺得有股燒焦味……？"
26002-150 = "…哎呀，我真是的！\n把派放進烤箱之後就\n忘得一乾二淨了！"
26002-160 = "為了增添料理的酸味，\n是該加香料\n還是加鹽酸，\n哪個比較好呢……？"
26002-170 = "祝你生日快樂，老師！"
26002-180 = "我烤了蛋糕\n要送給老師。"
26002-190 = "但是卻那個……\n被它逃跑了……"
26002-200 = "我的生日禮物是嗎？"
26002-210 = "呵呵……\n光是這句話\n就已經讓我很開心了唷。"
26002-220 = "為了迎接正月\n我試著準備了御節料理。"
26002-230 = "不介意的話\n可以幫我嚐嚐味道嗎？"
26002-240 = "呃，那個，\n因為是聖誕節，\n所以我烤了火雞……"
26002-250 = "活跳跳的烤火雞\n是不行的對吧……？"
26002-260 = "萬聖節的時候，\n不知為何，我做的點心\n很受歡迎呢。"
26002-270 = "很適合拿來搗蛋……？\n聽說是這樣。"
26002-290 = "啊，請看，老師！"
26002-300 = "這顆紅透的番茄，\n不覺得看起來非常好吃嗎？"
26002-310 = "耶嘿，這也是我\n身為供給部一員的成果。"
26002-320 = "誠心誠意栽培果然是值得的！"
26002-330 = "啊，那邊的番茄\n長得也很不錯……"
26002-340 = "那個，就，就在，\n那邊，那個……\n總覺得距離有點……？"
26002-350 = "這麼近的話，\n那個，我……"
26002-360 = "（啊，老師的味道……）"
26002-370 = "（總，總覺得心臟\n突然跳得很快……！？）"
26002-380 = "沒，沒事的，是！\n請別擔心……！"
26002-390 = "只是該怎麼說呢，\n那個……"
26002-400 = "總覺得臉在發燙，\n那個……！唔……！"
26002-2600 = "呵呵，把這把槍用在料理上的話，\n一定能把肉質處理得很軟嫩呢！"

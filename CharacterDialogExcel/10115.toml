[translation]
10115-10 = "블루, 아카이브!"
10115-20 = "밀레니엄의 4번 타자, 노마사 레이입니다. 선생님.\n……지금의 목표는, 1할입니다."
10115-30 = "……스미레 선배,\n여기까지 쫓아온 건\n아니겠지?"
10115-40 = "연습도 훈련도\n중요하지만,\n적당한 휴식도 역시……"
10115-50 = "적당한 카페인은,\n훈련 효과를\n높인다고 하니까……"
10115-60 = "(오늘 하루만……\n훈련, 땡땡이칠까……)"
10115-70 = "저 휘핑크림\n맛있겠지……\n아냐. 참아야 해."
10115-80 = "오셨네요, 선생님.\n오늘 하실 일의 명단을,\n정리하고 있었어요."
10115-90 = "네? 이 정도야……\n야구부 스케줄 관리하면서\n익숙해진 건데요?"
10115-100 = "안녕하세요, 선생님!\n노마사 레이, 인사드립니다!"
10115-110 = "헤헤, 어떠셨나요?\n야구부 훈련 시작 인사를\n따라 해 봤어요."
10115-120 = "더 시키실 일은 없으신가요?\n저, 의외로 서류 작업이나\n통계 정리도 할 줄 아니까요!"
10115-130 = "……세미나 선배들만큼은,\n무리겠지만요……"
10115-140 = "굳이 어느 쪽이냐고 하신다면,\n저는 아웃도어쪽이죠?"
10115-150 = "……그게 거의 훈련장과\n야구장 쪽에 몰려 있기는\n하지만요……"
10115-160 = "샬레 당번도 좋네요. \n뭔가, 합법적으로\n쉴 수 있다는 기분이에요."
10115-170 = "……그래도 어딘가, 조금\n몸이 근질거리기도 하네요……"
10115-180 = "혹시 일이 조금 빨리\n끝나신다면……\n함께 나가시지 않을래요?"
10115-190 = "제가 아는 스타디움에서,\n한정 스포츠 카드 판매가\n시작됐거든요!"
10115-200 = "배팅 센터\n좋아하시나요, 선생님?"
10115-210 = "분명 좋아하시게 될 거예요!\n신나게 공을 치다 보면,\n스트레스가 전부 풀리거든요!"
10115-220 = "저, 기억하고 있다고요!\n오늘 생일이셨죠?"
10115-230 = "헤헤. 숫자 기억에는\n자신이 있어서요.\n특히 야구 연감을\n분석하다 보면 말이죠."
10115-240 = "그러면 다시 한 번\n축하드립니다!"
10115-250 = "해 드릴 수 있는 게 많지\n않아서…… 죄송하네요."
10115-260 = "오늘도 좋은 하루네요, 선생님!"
10115-270 = "네? 제 생일……?\n가, 감사합니다.\n기억해 주실 줄은 몰랐어요……"
10115-280 = "서, 서서, 선물이요?!\n아뇨! 저는 그냥\n기억해 주신 것만으로……!"
10115-290 = "고맙습니다. 헤헤……"
10115-300 = "새해가 밝았어요, 선생님!"
10115-310 = "올해야말로 반드시 홈런을……!"
10115-320 = "그 전에 3할 타자가……"
10115-330 = "아뇨, 우선 1할부터……\n하아……"
10115-340 = "야구가 없는 겨울에\n뭘 하느냐고 물으면,\n창밖을 내다보며 봄을\n기다릴 거라는 말이 있어요."
10115-350 = "하지만 지금은……\n치킨 어떠세요, 치킨!\n칠면조도 좋고요!"
10115-360 = "할로윈이네요. 선생님."
10115-370 = "……밀레니엄 야구부는\n그 자체로 호러이니까,\n특별히 할로윈 분장을 할 필요\n없다는 말이 있는 것 같지만……"
10115-380 = "그런 말을 듣지 않도록,\n최선을 다하겠습니다!"
10115-400 = "이건, 제가\n처음 잡아 본……"
10115-410 = "그때의, 홈런공이에요."
10115-420 = "야구를 제대로 시작한 뒤로,\n늘 가지고 다녔죠."
10115-430 = "그때 본 홈런을……"
10115-440 = "언젠가, 저도 쳐 보고\n싶다고 생각해서요."
10115-450 = "지금은 사물함에\n소중히 보관하고 있어요."
10115-460 = "마음이 꺾일 것 같을 때,\n이 공을 보면."
10115-470 = "초심을 찾게\n해 주는 것 같아서……\n힘이 나곤 해요."
10115-480 = "……소중한,\n부적 같은 공이랍니다."
10115-2600 = "감사합니다, 선생님.\n저를 위해서 이런 것까지……\n선생님께 보답하기 위해서라도,\n반드시 3할 이상을 치고 말겠어요!\n……지금은 1할부터 달성해야 하겠지만요……"

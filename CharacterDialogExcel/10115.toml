[translation]
10115-10 = "蔚藍，檔案！"
10115-20 = "千年科學學園第四棒打者，野正莉。\n目標是……打擊率一成！"
10115-30 = "堇前輩……\n總不會連這裡\n都在吧……？"
10115-40 = "為了有效率地練習，\n休息也很重要……"
10115-50 = "好像聽說咖啡因能\n提升運動效果。"
10115-60 = "（今天的練習，\n偷懶……是不行的吧）"
10115-70 = "那個鮮奶油，\n看起來很好吃……\n不行，忍耐忍耐。"
10115-80 = "歡迎回來，老師。\n我整理了今天的待辦清單。"
10115-90 = "其實也不算什麼哦？\n畢竟我平時就負責\n棒球部的行程管理。"
10115-100 = "大家好！今天！\n也請多多指教！"
10115-110 = "……嘿嘿，剛才那是\n比賽前的問候。"
10115-120 = "我來幫點忙吧？\n我挺擅長做\n數據整理或統計的哦！"
10115-130 = "……雖然比不上\n研討會的前輩就是了。"
10115-140 = "我嗎？\n硬要說的話是戶外派吧。"
10115-150 = "……話雖如此，\n我幾乎只去練習場\n跟體育館而已。\n能算戶外派嗎……？"
10115-160 = "夏萊的值日生，真不錯呢！\n是個能正當休息的理由。"
10115-170 = "不過，已經開始想練習了。"
10115-180 = "如果能提早結束的話，\n要不要一起出門？"
10115-190 = "運動場商店\n進貨了限定卡牌哦！"
10115-200 = "老師有去過打擊中心嗎？"
10115-210 = "我覺得你一定會喜歡！\n盡情揮棒打球，\n能讓壓力一掃而空！"
10115-220 = "老師，今天是你生日對吧？"
10115-230 = "嘿嘿，我還挺擅長記數字的。\n例如選手的打擊率，\n或者棒球的年鑑之類的……"
10115-240 = "總而言之！\n祝你生日快樂！"
10115-250 = "今天一天，我會\n盡力做我能所的事！\n今後也請多多指教，\n嘿嘿……"
10115-260 = "你好，老師！"
10115-270 = "……咦！？\n我的生日……？\n謝，謝謝……\n原，原來你記得啊……"
10115-280 = "禮，禮禮，禮物！？\n沒關係！我，光是\n能被老師祝福就……！"
10115-290 = "……非常開心了。\n嘿嘿……"
10115-300 = "新年快樂，老師！"
10115-310 = "今年我一定要\n親手打出全壘打……！"
10115-320 = "不對，在那之前\n要先成為三成打者……？"
10115-330 = "……先以一成為目標吧！"
10115-340 = "休賽季就是為了下個春天\n站穩腳步、養精蓄銳的時候……"
10115-350 = "……所以老師，\n今天就來吃炸雞吧！\n啊，烤火雞也不錯呢！"
10115-360 = "今天是變裝成鬼怪的日子……"
10115-370 = "雖然好像有人說過\n「沒有什麼是比千年\n棒球部的成績更恐怖的」\n之類的話……"
10115-380 = "不過既然我已經加入，\n就不會讓他們再說那種話了！"
10115-400 = "這個，是我\n第一次接到的……"
10115-410 = "充滿回憶的全壘打球。"
10115-420 = "剛開始打棒球的時候，\n我很常把它帶在身邊。"
10115-430 = "希望那天看到的全壘打──"
10115-440 = "總有一天，\n我也能打出一樣的球。"
10115-450 = "因為現在已經變得\n破破爛爛的關係，\n所以就放在置物櫃裡。"
10115-460 = "每當快撐不下去的時候，\n只要看到這顆球……"
10115-470 = "就有種能夠找回初心的感覺……\n可以讓我獲得力量。"
10115-480 = "……這是我，\n重要的護身符。"
10115-2600 = "如此細心的指導，真的非常感謝！\n我會趕緊成為三成打者，\n向老師報恩的！\n……不過，能先從一成開始嗎？"

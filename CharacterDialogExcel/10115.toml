[translation]
10115-10 = "Blue, Archive!"
10115-20 = "Millennium's cleanup hitter, Nomasa Rei. ...Sensei, my goal right now is to hit a 0.10 batting average."
10115-30 = "...Sumire didn't follow me all the way here, did she?"
10115-40 = "Practice and training are important, but so is adequate rest..."
10115-50 = "They say a moderate amount of caffeine can increase the effectiveness of your training..."
10115-60 = "(Maybe I'll skip training...just for today...)"
10115-70 = "That whipping cream looks delicious... No. I have to control myself."
10115-80 = "You're here, Sensei. I was organizing the to-do list for today."
10115-90 = "What? This is nothing... I'm used to this from managing the baseball club schedule, you know?"
10115-100 = "Hello, Sensei! Greetings from Nomasa Rei!"
10115-110 = "Heehee, how was it? I tried out what I learned from the baseball club's greeting training."
10115-120 = "Is there anything else you'd like me to do? I'm actually really good with paperwork and organizing statistics!"
10115-130 = "...Though I'm probably not as good as the Seminar members..."
10115-140 = "If I had to choose, I'd say I'm more of an outdoor person, you know?"
10115-150 = "...Although I more so mean training grounds and baseball fields..."
10115-160 = "Schale student rep work is nice. It's like having an official excuse to take a break."
10115-170 = "...But I'm starting to get a bit antsy to do something."
10115-180 = "If you finish work early...do you want to go somewhere with me?"
10115-190 = "They started selling exclusive sports cards in this one stadium I go to!"
10115-200 = "Do you like the batting center, Sensei?"
10115-210 = "I'm sure you'll like it! All the fun you have from hitting balls will make your stress dissipate!"
10115-220 = "I didn't forget! Today's your birthday, right?"
10115-230 = "Heehee, I'm really good at memorizing numbers. Especially for analyzing yearly baseball statistics."
10115-240 = "So, congratulations!"
10115-250 = "But there's not much I can do for you... I'm sorry."
10115-260 = "It's another good day, Sensei!"
10115-270 = "Yes? My birthday...? Th-Thank you. I didn't think you'd remember..."
10115-280 = "A p-p-present?! No! You remembering alone is more than...!"
10115-290 = "Thank you. Heehee..."
10115-300 = "It's the new year, Sensei!"
10115-310 = "This year, for sure, I'll hit a home run...!"
10115-320 = "But before that I should reach a 0.30 batting average..."
10115-330 = "No, let's start with 0.10... *sigh*"
10115-340 = "There's a saying that goes like this: when it's winter, and there's no baseball, I stare out the window and wait for spring."
10115-350 = "But right now...what do you say to chicken? Turkey sounds good too!"
10115-360 = "It's Halloween, Sensei."
10115-370 = "Some people say that the Millennium Baseball Club is such a nightmare on its own that we don't need any special Halloween costumes."
10115-380 = "I'm going to do everything I can to make sure no one can say that this year!"
10115-400 = "This is the first..."
10115-410 = "...homerun ball I ever caught."
10115-420 = "Ever since I started playing, I've always kept it with me."
10115-430 = "When I witnessed that first home run..."
10115-440 = "I told myself I'd hit one too, someday."
10115-450 = "Right now...I have it enshrined in my cabinet."
10115-460 = "Whenever I feel like I want to give up, I look at it."
10115-470 = "It reminds me of when I first started. It always lifts my spirits up."
10115-480 = "...To me, it's both a memento and a good luck charm."
10115-2600 = "Thank you, Sensei. Doing all this for me... I'm going to repay you by achieving a 30% batting average... I guess I should start with aiming for 10% for now..."

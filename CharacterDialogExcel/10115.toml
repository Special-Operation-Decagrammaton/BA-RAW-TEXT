[translation]
10115-10 = "Blue Archive!"
10115-20 = "ฉันโนมาสะ เรย์ แบตเตอร์ลำดับที่ 4 ของมิลเลเนียมค่ะ คุณครู\nเป้าหมายตอนนี้ของฉันคือตีให้ได้ 10% ค่ะ..."
10115-30 = "รุ่นพี่สึมิเระ...\nคงไม่ตามมาถึงที่นี่\nหรอกเนอะ?"
10115-40 = "การฝึกซ้อมเป็นสิ่งสำคัญ\nแต่การพักผ่อน\nอย่างเหมาะสมก็ด้วย..."
10115-50 = "ว่ากันว่าคาเฟอีนในปริมาณ\nที่เหมาะสมจะช่วยเพิ่ม\nประสิทธิภาพในการซ้อม..."
10115-60 = "(วันนี้...\nโดดซ้อมวันหนึ่งดีมั้ยนะ...)"
10115-70 = "วิปปิ้งครีมตรงนั้น\nน่าอร่อยจัง...\nไม่ได้สิ ต้องห้ามใจไว้"
10115-80 = "มาแล้วเหรอคะ คุณครู\nฉันกำลังจัดรายการ\nสิ่งที่จะทำในวันนี้อยู่ค่ะ"
10115-90 = "คะ? งานแค่นี้เอง...\nฉันจัดตารางของชมรมเบสบอล\nจนคุ้นชินแล้วละค่ะ"
10115-100 = "สวัสดีค่ะ คุณครู!\nโนมาสะ เรย์ ขอแนะนำตัวค่ะ!"
10115-110 = "แหะๆ เป็นยังไงบ้างคะ?\nฉันลองทักทายเหมือนที่\nชมรมเบสบอลทำก่อนซ้อมน่ะค่ะ"
10115-120 = "ไม่มีอะไรจะสั่งให้ฉันทำอีกเหรอคะ?\nฉันทำงานเอกสาร\nแล้วก็เก็บสถิติเก่งนะคะ!"
10115-130 = "ถึงจะไม่เก่งเท่า\nพวกรุ่นพี่เซมิน่าก็เถอะค่ะ..."
10115-140 = "ถ้าถามว่าชอบแบบไหน\nฉันคงชอบกิจกรรมกลางแจ้งค่ะ"
10115-150 = "ต่อให้ส่วนมากไปอยู่แค่สนามกีฬา\nหรือไม่ก็สนามเบสบอลก็เถอะค่ะ..."
10115-160 = "การเข้าเวรที่ชาเล่ต์ก็ดีเหมือนกันนะคะ\nรู้สึกเหมือนได้มาพักผ่อน\nแบบถูกต้องตามกฎน่ะค่ะ"
10115-170 = "แต่ฉันรู้สึกอยาก...\nขยับตัวสักนิดหน่อยจัง..."
10115-180 = "ถ้าทำงานเสร็จก่อนเวลา\nได้นิดหน่อยละก็...\nออกไปข้างนอกกับฉันมั้ยคะ?"
10115-190 = "สนามกีฬาที่ฉันรู้จัก\nเพิ่งเปิดขายการ์ดนักกีฬา\nแบบลิมิเต็ดเลยละค่ะ!"
10115-200 = "ชอบสนามฝึกตีเบสบอล\nมั้ยคะคุณครู?"
10115-210 = "ต้องชอบอย่างแน่นอนเลย!\nถ้าได้สนุกกับการตีลูก\nความเครียดจะหายไปหมดเลยค่ะ!"
10115-220 = "ฉันจำได้ขึ้นใจเลยค่ะ!\nวันนี้วันเกิดคุณครูใช่มั้ยคะ?"
10115-230 = "แหะๆ ฉันเก่งเรื่องการจำตัวเลขค่ะ\nโดยเฉพาะเมื่อได้วิเคราะห์หนังสือ\nสถิติเบสบอลบ่อยๆ น่ะค่ะ"
10115-240 = "ถ้างั้นก็สุขสันต์วันเกิด\nอีกครั้งนะคะ!"
10115-250 = "ฉันทำอะไรให้ไม่ได้มาก\nต้องขอโทษด้วยนะคะ..."
10115-260 = "วันนี้ก็เป็นวันที่ดีนะคะ คุณครู!"
10115-270 = "คะ? วันเกิดฉัน...?\nขะ... ขอบคุณค่ะ\nไม่คิดเลยค่ะว่าจะจำได้..."
10115-280 = "ขะ... ขะขะ... ของขวัญเหรอคะ?!\nไม่เป็นไรค่ะ! แค่จำวันเกิดได้\nฉันก็ขอบคุณแล้วค่ะ...!"
10115-290 = "ขอบคุณค่ะ แหะๆ..."
10115-300 = "ปีใหม่แล้วค่ะ คุณครู!"
10115-310 = "ปีนี้ต้องตีโฮมรันให้ได้...!"
10115-320 = "แต่ก่อนหน้านั้นต้องตีลูกให้ได้ 30%..."
10115-330 = "ไม่สิ ตีให้ได้ 10% ก่อน...\nเฮ้อ..."
10115-340 = "ถ้าถามว่าฉันจะทำอะไร\nในฤดูหนาวที่ไม่มีเบสบอล\nมีคำพูดที่ว่า 'มองออกไป\nนอกหน้าต่างแล้วรอฤดูใบไม้ผลิ' ค่ะ"
10115-350 = "แต่ว่าตอนนี้...\nกินไก่ทอดกันมั้ยคะ ไก่ทอด!\nไก่งวงก็ดีนะคะ!"
10115-360 = "ฮาโลวีนแล้วนะคะ คุณครู"
10115-370 = "ชมรมเบสบอลมิลเลเนียม...\nน่ากลัวด้วยตัวเองอยู่แล้ว\nคนก็เลยพูดกันว่า ไม่ต้องแต่ง\nคอสเพลย์ฮาโลวีนต่างหากค่ะ..."
10115-380 = "แต่ฉันจะพยายามเต็มที่\nเพื่อไม่ให้ได้ยินคำแบบนั้นค่ะ!"
10115-400 = "นี่คือลูกที่ฉัน\nคว้าได้เป็นครั้งแรก..."
10115-410 = "มันเป็นลูกโฮมรันในตอนนั้นค่ะ"
10115-420 = "หลังจากเริ่มเล่นเบสบอลจริงจัง\nฉันก็พกติดตัวตลอดเลยค่ะ"
10115-430 = "โฮมรันที่เห็นตอนนั้น..."
10115-440 = "ฉันคิดว่าอยากตีแบบนั้น\nให้ได้สักครั้งค่ะ"
10115-450 = "ตอนนี้ฉันเก็บมันไว้อย่างดี\nในตู้ล็อกเกอร์ค่ะ"
10115-460 = "ตอนที่เหมือนจะถอดใจ\nถ้าได้เห็นลูกเบสบอลนี้"
10115-470 = "มันจะทำให้ฉันกลับมามี\nความตั้งใจแรกอีกครั้ง...\nฉันเลยได้กำลังใจค่ะ"
10115-480 = "มันเป็นลูกเบสบอลล้ำค่า...\nเหมือนเครื่องรางเลยค่ะ"
10115-2600 = "ขอบคุณค่ะ คุณครู\nทำเรื่องแบบนี้ให้ฉันขนาดนี้...\nเพื่อเป็นการตอบแทนคุณครู\nฉันจะตีลูกให้อย่างน้อย 30% เลยค่ะ!\nแม้ตอนนี้ต้องตีให้ได้ 10% ก่อนก็เถอะ..."

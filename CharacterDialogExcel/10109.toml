[translation]
10109-10 = "블루 아카이브."
10109-20 = "선생님의 오늘 하루를 기록하기 위해 찾아온 서기,\n우시오 노아입니다.\n오늘 밤도 잘 부탁드리겠습니다, 선생님. 후훗."
10109-30 = "(이 카페는 고독과\n적막 속에서 눈을 뜬\n신비로운 세계 같군요.)"
10109-40 = "(잠깐 밤의 정적에\n귀를 기울여 볼까요…)"
10109-50 = "하암… \n조금 피곤하네요."
10109-60 = "이 근처에서\n조금 쉬었다 갈까요?"
10109-70 = "(어쩐지 방금, \n코유키 쨩의 웃음소리가\n들린 것 같은데…)"
10109-80 = "어서 오세요, 선생님."
10109-90 = "따듯한 우유 한 잔, 어떠신가요?"
10109-100 = "…아. 오셨군요, 선생님."
10109-110 = "날이 좋아서 선생님이\n오시는 줄도 모르고,\n창밖의 경치에 시선을\n빼앗기고 말았네요."
10109-120 = "선생님, 좀 더 편한 의상으로\n갈아입고 오시는 건 어떠신가요?"
10109-130 = "편한 차림으로 일과를\n진행하면 좀 더 작업의\n능률이 오를지도 몰라요."
10109-140 = "일기는 매일 쓰고 있답니다."
10109-150 = "하루를 돌이켜 볼 수 있는\n중요한 기록이니까요."
10109-160 = "안 돼요.\n아무리 선생님이라도\n일기는 보여드릴 수 없어요."
10109-170 = "소녀의 비밀이니까요."
10109-180 = "어쩐지 코유키 쨩은\n저를 피해 다니는 것 같던데…"
10109-190 = "제 태도가 은근히 코유키 쨩에게\n압박을 주고 있는 걸까요…?"
10109-200 = "시간의 실타래는\n더디게 풀린다는데…"
10109-210 = "어째서 휴일은\n이렇게 빨리 지나가는 걸까요?"
10109-220 = "생일 축하드려요, 선생님."
10109-230 = "오늘이 선생님이 태어나신\n날이라는 사실만으로도, "
10109-240 = "펜 끝이 가벼워지는 기분이네요."
10109-250 = "빠짐없이 전부,\n기록하게 해주시겠어요?"
10109-260 = "…제 생일, 기억해 주셨군요?"
10109-270 = "축하의 말만으로도\n충분합니다만…"
10109-280 = "그럼 오늘 밤에는\n선생님께 책 낭독을\n부탁드려도 괜찮을까요?"
10109-290 = "새해 복 많이 받으시길."
10109-300 = "올해는 일 만큼이나\n휴식도 충분히 챙겨주세요."
10109-310 = "크리스마스 밤에\n화려한 야경을 바라보며 하는\n독서도 제법 운치가 있답니다."
10109-320 = "혹시 흥미가 있으시다면\n함께 읽어보시겠어요?"
10109-330 = "어려운 책이라도 \n제가 옆에서 낭독해 드릴게요."
10109-340 = "그러고 보니 할로윈 기간 중에는\n잠옷처럼 짧고 나풀나풀한 옷을\n입고 다니는 학생들이\n종종 있었던 것 같네요."
10109-350 = "후후, 선생님께서도\n짧고 나풀나풀한 잠옷이\n취향이신가요?"
10109-370 = "<총총한 별들이 마치\n헤아릴 수 없는 거대한 양 떼처럼\n고분고분하고 조용히\n흘러가고 있었습니다……>"
10109-380 = "선생님도 참 엉뚱한 분이시네요."
10109-390 = "아무런 개성도 없는 제 낭독을\n들으며 잠들고 싶어 하시다니."
10109-400 = "……어째서일까요."
10109-410 = "무색, 무취의 목소리인 덕분에,\n의미가 선명히\n전달되는 걸까요…?"
10109-420 = "감사합니다, 선생님."
10109-430 = "선생님 덕분에 저를 더 오롯이\n마주할 수 있게 되었어요."
10109-440 = "……선생님? 주무시나요?"
10109-450 = "저 숱한 별들 중\n가장 가냘프고 빛나는\n별님 하나가."
10109-460 = "그만 길을 잃고\n제 발치에 고이 잠들었습니다."
10109-2600 = "이 컨버전 키트는 사용자의 의도에 따라\n어떤 모습으로도 변할 수 있답니다.\n……마치 저처럼 말이에요, 후훗."

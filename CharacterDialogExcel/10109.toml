[translation]
10109-10 = "Blue Archive"
10109-20 = "เลขานุการที่จะมาบันทึกเรื่องวันนี้ของคุณครู\nอุชิโอะ โนอาค่ะ\nคืนนี้ก็ฝากตัวด้วยนะคะคุณครู ฮุฮุ"
10109-30 = "(คาเฟ่นี้เหมือนโลกลึกลับ\nที่ลืมตาขึ้นมาจากความเหงา\nและความเงียบเลยค่ะ)"
10109-40 = "(มาฟังความเงียบสงัด\nของค่ำคืนกันสักพักมั้ยคะ...)"
10109-50 = "ฮ้าว...\nเหนื่อยนิดหน่อยนะคะ"
10109-60 = "เราไปพักผ่อนแถวนี้\nแล้วค่อยไปต่อมั้ยคะ?"
10109-70 = "(เมื่อกี้เหมือนได้ยิน\nเสียงหัวเราะของโคยูกิจัง\nเลยแฮะ...)"
10109-80 = "เชิญค่ะ คุณครู"
10109-90 = "ดื่มนมร้อนสักถ้วยมั้ยคะ?"
10109-100 = "อ๊ะ... มาแล้วสินะคะ คุณครู"
10109-110 = "วันนี้อากาศดีจนฉันเอาแต่มอง\nทิวทัศน์นอกหน้าต่าง\nจนไม่รู้เลยค่ะว่าคุณครูมา"
10109-120 = "คุณครูไปเปลี่ยนเป็นชุด\nที่สบายตัวกว่านี้มาดีมั้ยคะ?"
10109-130 = "ถ้าทำงานในชุดที่สบายตัว\nอาจจะทำได้อย่างมีประสิทธิภาพ\nกว่าเดิมก็ได้นะคะ"
10109-140 = "ฉันเขียนไดอารีทุกวันเลยค่ะ"
10109-150 = "ก็มันเป็นบันทึกสำคัญ\nที่ทำให้ได้ทบทวนวันนั้นๆ นี่คะ"
10109-160 = "ไม่ได้ค่ะ ต่อให้เป็นคุณครู\nฉันก็ให้อ่านไดอารีไม่ได้ค่ะ"
10109-170 = "มันเป็นความลับของเด็กสาวค่ะ"
10109-180 = "รู้สึกเหมือนโคยูกิจัง\nจะตั้งใจหลบหน้าฉันเลย..."
10109-190 = "หรือว่าท่าทีของฉัน\nไปกดดันโคยูกิจังเหรอคะ...?"
10109-200 = "ว่ากันว่าเส้นด้ายแห่งกาลเวลา\nจะคลายออกอย่างช้าๆ..."
10109-210 = "แต่ทำไมวันหยุด\nถึงได้ผ่านไปเร็วอย่างนี้ล่ะคะ?"
10109-220 = "สุขสันต์วันเกิดค่ะ คุณครู"
10109-230 = "แค่วันนี้เป็นวันที่\nคุณครูได้เกิดมา "
10109-240 = "ฉันก็รู้สึกเหมือน\nปลายปากกาเบาลงเลยค่ะ"
10109-250 = "ช่วยบันทึกทุกอย่างให้ฉัน\nอย่างไม่มีอะไรตกหล่นได้มั้ยคะ?"
10109-260 = "จำวันเกิดฉันได้ด้วยสินะคะ...?"
10109-270 = "จริงๆ แค่มาอวยพรกัน\nก็เพียงพอแล้วละค่ะ..."
10109-280 = "ถ้างั้นคืนนี้ฉันขอ\nให้คุณครูอ่านหนังสือ\nให้ฟังได้มั้ยคะ?"
10109-290 = "สวัสดีปีใหม่ค่ะ"
10109-300 = "ปีนี้ก็พักผ่อนเยอะๆ\nให้สมกับที่ทำงานเยอะๆ นะคะ"
10109-310 = "การชมค่ำคืนวันคริสต์มาส\nที่งดงามแล้วอ่านหนังสือไปด้วย\nก็เป็นรสนิยมที่ดีเลยนะคะ"
10109-320 = "ถ้าสนใจละก็\nมาอ่านด้วยกันมั้ยล่ะคะ?"
10109-330 = "ต่อให้เป็นหนังสือที่เข้าใจยาก\nฉันก็จะอ่านให้ฟังข้างๆ ค่ะ"
10109-340 = "จะว่าไปก็มีนักเรียนหลายคน\nที่ใส่เสื้อผ้าที่สั้นและพลิ้วไหว\nเหมือนกับชุดนอน\nในช่วงวันฮาโลวีนนะคะ"
10109-350 = "ฮุฮุ คุณครูก็ชอบชุดนอน\nที่สั้นและพลิ้วไหว\nเหมือนกันมั้ยคะ?"
10109-370 = "<ดวงดาวน้อยใหญ่ที่แพรวพราว\nกำลังค่อยๆ เคลื่อนที่ไปเงียบๆ\nราวกับฝูงแกะเหลือคณานับ...>"
10109-380 = "คุณครูนี่ก็เป็นคนนิสัยแปลกจริงๆ นะคะ"
10109-390 = "ไม่อยากเชื่อเลยว่าอยากนอนฟัง\nฉันอ่านหนังสือที่ไม่ได้พิเศษ\nและมีเสน่ห์อะไรเลย"
10109-400 = "...เป็นเพราะอะไรกันเหรอคะ"
10109-410 = "เพราะน้ำเสียงที่จืดชืดของฉัน\nทำให้ความหมายของเรื่อง\nถูกส่งต่ออย่างแจ่มชัดหรือเปล่าคะ...?"
10109-420 = "ขอบคุณนะคะ คุณครู"
10109-430 = "คุณครูทำให้ฉันเผชิญหน้า\nกับตัวเองได้มากขึ้นค่ะ"
10109-440 = "คุณครูคะ...? หลับแล้วเหรอคะ?"
10109-450 = "ในบรรดาดวงดาราเหล่านั้น\nมีดาวดวงหนึ่งที่ดวงเล็ก\nและเปล่งประกายที่สุด"
10109-460 = "มันหลงทาง\nและหลับใหลอยู่ใกล้ๆ ฉันค่ะ"
10109-2600 = "ชุดคอนเวอร์ชันนี้เปลี่ยนรูปแบบได้\nตามความต้องการของผู้ใช้งานค่ะ\nเหมือนกับฉันเลยละค่ะ... ฮุฮุ"

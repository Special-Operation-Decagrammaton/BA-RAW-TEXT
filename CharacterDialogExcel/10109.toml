[translation]
10109-10 = "Blue Archive."
10109-20 = "I am Ushio Noa, the secretary who's come to record your day, Sensei. I'm looking forward to tonight. Heehee."
10109-30 = "(This cafe seems like a mysterious world born from solitude and silence.)"
10109-40 = "(Shall we listen to the quiet of the night for a moment...?)"
10109-50 = "*yawn*... I'm a little tired."
10109-60 = "Should we take a small break here?"
10109-70 = "(I think I heard Koyuki's laughter just now...)"
10109-80 = "Welcome, Sensei."
10109-90 = "How about a warm glass of milk?"
10109-100 = "...Ah. You're here, Sensei."
10109-110 = "I was distracted by the pleasant scenery and nice weather out the window. I didn't even realize you were here."
10109-120 = "Sensei, why don't you change into something more comfortable?"
10109-130 = "If you work in more comfortable attire, it could increase your productivity."
10109-140 = "I write in my diary every day."
10109-150 = "It's an important record that allows me to reflect on the day."
10109-160 = "No, I can't show my diary, not even to you, Sensei."
10109-170 = "It's a girl's secret."
10109-180 = "It seems like Koyuki's been avoiding me..."
10109-190 = "Have I unintentionally been putting too much pressure on her...?"
10109-200 = "The thread of time is said to unravel slowly..."
10109-210 = "...so why do the holidays pass by so quickly?"
10109-220 = "Happy birthday, Sensei."
10109-230 = "Today is the day you were born. "
10109-240 = "That thought alone makes my pen feel lighter."
10109-250 = "Could you please allow me to record everything?"
10109-260 = "...My birthday. You remembered!"
10109-270 = "You wishing me happy birthday is enough, but..."
10109-280 = "...would it be okay to ask you to read me a book tonight?"
10109-290 = "Happy New Year!"
10109-300 = "This year, please make sure to take rests in between all your hard work."
10109-310 = "Reading while enjoying the splendid night view of Christmas night can be very enjoyable."
10109-320 = "If you're interested, would you like to read with me?"
10109-330 = "If it's a difficult book, I'll read it aloud for you."
10109-340 = "Come to think of it, during Halloween, there seemed to be students wearing short and frilly clothes that looked like pajamas."
10109-350 = "Fufu, do you also like short and frilly pajamas, Sensei?"
10109-370 = "\"The twinkling stars were shining, quietly and obediently, like a large herd of sheep...\""
10109-380 = "You can be such an unpredictable person, Sensei."
10109-390 = "I can't believe you want to fall asleep listening to my boring reading."
10109-400 = "...I wonder why."
10109-410 = "Does my monotonous voice convey the meaning more clearly...?"
10109-420 = "Thank you, Sensei."
10109-430 = "Thanks to you, I have been able to embrace myself more fully."
10109-440 = "...Sensei? Are you asleep?"
10109-450 = "Among those countless stars, there is a single one, most bright and delicate."
10109-460 = "It has lost its way and quietly fallen asleep."
10109-2600 = "This conversion kit can change into any form based on the user's intention. ...Just like me, heehee."

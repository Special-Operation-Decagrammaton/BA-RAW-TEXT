[translation]
10109-10 = "蔚藍檔案。"
10109-20 = "我前來紀錄老師的每一天了。\n我是擔任千年科學學園．研討會書記的生塩乃愛。\n今晚也請多多指教哦。呵呵。"
10109-30 = "（這裡就彷彿\n其他世界一般……\n充滿了孤獨與寂寞）"
10109-40 = "（稍微聆聽一下\n夜晚的寂靜吧）"
10109-50 = "呼啊……嗯……\n稍微，有點累了。"
10109-60 = "稍微休息一下\n再出發吧。"
10109-70 = "（剛才，好像聽到了\n小雪醬的笑聲……？）"
10109-80 = "歡迎回來，老師。"
10109-90 = "要不要來杯熱牛奶呢？"
10109-100 = "……啊，你來了呢，老師。"
10109-110 = "因為我正望著外面，\n所以沒注意到。"
10109-120 = "老師你，要不要也換上睡衣呢？"
10109-130 = "方便行動的話，\n或許也能期待\n工作效率的提高。"
10109-140 = "我每天都會寫日記。"
10109-150 = "因為這是能回顧\n一天的重要紀錄。"
10109-160 = "不行唷，就算是老師\n也不能把日記給你看。"
10109-170 = "……畢竟這可是少女的祕密呢。"
10109-180 = "莫名感覺小雪醬\n好像在躲著我……"
10109-190 = "是因為我造成了小雪醬\n的壓力嗎……"
10109-200 = "明明都說時鐘的線\n要慢慢解開……"
10109-210 = "為什麼休息日\n會過得那麼快呢……？"
10109-220 = "生日快樂，老師。"
10109-230 = "老師誕生的日子。"
10109-240 = "光憑這個事實，\n筆尖移動起來\n似乎就變得輕盈許多。"
10109-250 = "還請讓我把一切都\n毫無遺漏地記錄下來哦？"
10109-260 = "……我的生日，\n原來你記得嗎？"
10109-270 = "雖然光是祝福的話語\n就已經很足夠了……"
10109-280 = "……既然如此，\n今晚在我睡著之前，\n能請你為我朗讀書本嗎？\n呵呵。"
10109-290 = "祝你新年快樂。"
10109-300 = "還請度過平衡好\n工作與休息的一年哦。"
10109-310 = "在聖誕節的夜晚，\n眺望著夜景讀書……\n還頗有韻味，相當不錯唷。"
10109-320 = "如果有興趣的話，\n老師要不要一起來呢？"
10109-330 = "如果遇到困難的書，\n我會為你朗讀的。"
10109-340 = "這個時期，經常能看見身穿\n帶有荷葉邊的衣服外出的學生。"
10109-350 = "呵呵，帶有荷葉邊的衣服，\n老師你喜歡嗎？"
10109-370 = "「閃閃發亮的繁星，\n　宛如羊群般\n　靜靜地流淌……」"
10109-380 = "老師你，還真特別呢。"
10109-390 = "居然會想聽著我那\n毫無特色的朗讀入睡。"
10109-400 = "……這是為什麼呢？"
10109-410 = "因為聲音既通透又悅耳，所以\n能想像到文字裡的意境……？"
10109-420 = "謝謝你，老師。"
10109-430 = "讓我也重新審視了自己。"
10109-440 = "……老師？\n已經睡著了嗎？"
10109-450 = "其中閃耀得最美的星辰……"
10109-460 = "也許是因為迷失了方向，\n在我的腳邊進入了夢鄉。"
10109-2600 = "這個轉換套件，\n能依照使用者的意願改變型態。\n……跟我有點類似呢。呵呵。"

[translation]
20020-10 = "ฮุฮุ Blue~ Archive~"
20020-20 = "หัวหน้าชมรมปรากฏการณ์ลี้ลับและชมรมเวอริทัส...\nแฮ็กเกอร์สาวแสนสวยผู้บอบบางแห่งมิลเลเนียม อาเกโบชิ ฮิมาริค่ะ\nฮุฮุ ขอฝากเนื้อฝากตัวด้วยนะคะ คุณครู"
20020-30 = "(ห้องนี้... รู้สึกว่าอากาศ\nจะเย็นนิดหน่อยนะคะ...)"
20020-40 = "มีคนอยู่ที่นี่เยอะเลยนะคะ\nฉันรู้สึก... เหนื่อยนิดหน่อยค่ะ"
20020-50 = "เอ๋ ไม่รู้เลยว่ามีของแบบนี้ด้วย\nดูน่าสนุกดีนะคะ"
20020-60 = "ฮิฮิ ถ้ามีพื้นที่ขนาดนี้ละก็...\nคงจะชวนสมาชิกเวอริทัสทุกคน\nแล้วก็เอมิมาปิกนิกด้วยกัน\nได้แน่ๆ เลยค่ะ"
20020-70 = "ห้องนี้ใช้ได้เลยนะคะ\nถ้าเพิ่มฟังก์ชั่นอำนวยความสะดวก\nเข้าไปน่าจะดีนะคะ...\nเรามาลองแฮ็กระบบดูกันมั้ยคะ?"
20020-80 = "อุ๊ย มาแล้วเหรอคะคุณครู\nฉันกำลังรออยู่เลยค่ะ"
20020-90 = "ถ้างั้นเรามาเริ่มงานของวันนี้\nกันเลยดีมั้ยคะ? ฮิฮิ "
20020-100 = "แฮ็กเกอร์สาวผู้มีรอยยิ้มสดใส\nฮีลใจเหมือนยาวิเศษแห่งมิลเลเนียม\nมาที่นี่เพื่อช่วยคุณครูที่งานยุ่งอยู่\nตลอดเวลาแล้วค่ะ "
20020-110 = "ไม่มีเสียงปรบมือต้อนรับเหรอคะ?\nปรบมือ \"แปะๆๆ\" แบบนี้น่ะค่ะ"
20020-120 = "ดอกไม้งามบนหน้าผาที่ทุกคน\nใฝ่ฝันถึง สาวน้อยผู้มีความสามารถ\nรอบรู้และรอบด้านมาช่วยงานแบบนี้..."
20020-130 = "คุณครูเป็นคนที่โชคดีมาก\nเลยนะคะ"
20020-140 = "คำแนะนำตัวของฉันต่างกัน\nทุกครั้งที่พูดเลยงั้นเหรอคะ?"
20020-150 = "ฮุฮุ ช่างสังเกตจังเลยนะคะ\nใช่แล้วค่ะ ฉันเปลี่ยนคำพูด\nทุกครั้งเลยค่ะ"
20020-160 = "อ๊ะ แต่ทุกอย่างเป็นความจริงนะคะ"
20020-170 = "อย่างไรก็ตาม ถ้าจะให้ฉันแนะนำตัว\nให้ถูกต้องและครบถ้วนแล้วละก็...\nอาจจะยาวเกินไปสักหน่อย..."
20020-180 = "เพราะงั้นเลยต้องเปลี่ยนคำพูด\nแนะนำตัวทุกๆ ครั้งเลยค่ะ"
20020-190 = "การถ่ายทอดทุกอย่างเป็นคำพูด...\nช่างยากจริงๆ เลยนะคะ"
20020-200 = "ฉันมักได้ยินคนอื่นพูดว่า\nเวอริทัสเป็นที่รวมตัวของ\nกลุ่มคนประหลาด...\nแย่จังเลยนะคะ"
20020-210 = "ทั้งที่มีเด็กสาวผู้งดงามอย่างฉันอยู่แท้ๆ...\nทำไมถึงพูดแบบนั้นกันได้นะคะ?"
20020-220 = "พอได้มาช่วยงาน\nคุณครูแบบนี้ก็ได้ค้นพบ\nอะไรใหม่ๆ เยอะเลยนะคะ"
20020-230 = "ฉันไม่รู้มาก่อนเลยว่าคุณครู\nรับผิดชอบงานจำนวนมาก\nขนาดนี้...."
20020-240 = "zZz... zZz..."
20020-250 = "อ๊ะ...?!\nฉะ...ฉันไม่ได้แอบงีบเลยค่ะ\nพูดจริงๆ นะคะ"
20020-260 = "ถ้าให้พูดก็คือแค่กำลังพิจารณา\nความสัมพันธ์การนอนแบบ REM\nกับการนอนแบบ NON-REM อยู่ค่ะ\nฉันพูดจริงนะคะ"
20020-270 = "อ๊ะ สุขสันต์วันเกิดค่ะ คุณครู"
20020-280 = "คุณครูได้ใช้เวลาในวันเกิด\nร่วมกับฉันแบบนี้ แน่นอนว่า...\nจะต้องเป็นวันที่พิเศษสุดๆ อย่างแน่นอนค่ะ"
20020-290 = "อุ๊ย ตายจริง...\nคุณครูจะแสดงสีหน้าดีใจ\nมากกว่านี้อีกก็ได้นะคะ"
20020-300 = "คุณครูจำวันเกิดฉันได้งั้นเหรอคะ?\nขอบคุณค่ะ"
20020-310 = "แน่นอนค่ะ ฉันดีใจมาก\nตอนที่พวกสมาชิกคนอื่นๆ\nมาอวยพรให้..."
20020-320 = "แต่พอได้รับคำอวยพรจากคุณครูแบบนี้...\nก็เป็นความรู้สึกพิเศษอีกรูปแบบหนึ่งค่ะ"
20020-330 = "ฮุฮุ... ค่ะ\nน่าประทับใจมากๆ เลยค่ะ"
20020-340 = "อ๊ะ ปีใหม่แล้วสินะคะ\nขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ"
20020-350 = "ปีเก่าผ่านไป ปีใหม่ก็ผ่านมา\nและเราได้ใช้เวลาในช่วงนี้ด้วยกัน..."
20020-360 = "ฮิฮิ รู้สึกดีจังเลยนะคะ\nคุณครูคะ ปีนี้...\nก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
20020-370 = "คริสต์มาส.... งั้นสินะคะ"
20020-380 = "วันนี้คงเป็นวันที่น่าจดจำ\nอย่างแน่นอนค่ะ"
20020-390 = "ฮิฮิ ถ้าอย่างนั้น...\nเราไปดูหนังด้วยกัน\nดีมั้ยคะ คุณครู?"
20020-400 = "ฮาโลวีนงั้นเหรอคะ?\nพวกรุ่นน้อง ดูเหมือน...\nจะชอบฮาโลวีนกันมากค่ะ"
20020-410 = "คงเป็นเพราะวันนี้เหมาะกับ\nการแกล้งคนอื่นละมั้งคะ"
20020-420 = "ฮุฮุ ฉันตัดสินใจแล้วค่ะคุณครู\nเรียกทุกคนมารวมตัวกัน\nแล้วมาร่วมปาร์ตี้ขนมกันเถอะค่ะ"
20020-440 = "ฮุฮุ เป็นยังไงคะ ที่มีโอกาสได้เช็ดเท้า\nให้กับสาวน้อยผู้แสนงดงามแห่งมิลเลเนียม..."
20020-450 = "โอกาสแบบนี้น่ะ...\nหาไม่ได้ง่ายๆ หรอกนะคะ..."
20020-460 = "อึก...?\nมันรู้สึกแปลกๆ กว่าที่คิดไว้..."
20020-470 = "ระ... รู้สึกน่าอายอย่างบอกไม่ถูก...\nทะ... ทำไมกันนะ...?"
20020-480 = "คะ... ความรู้สึกที่ยากจะอธิบาย\nออกมาเป็นคำพูดแบบนี้...!"
20020-490 = "คุณครูก็แค่เช็ดเท้า...\nให้ฉันอย่างเอาใจใส่\nก็แค่นั้น... เพราะอะไรกัน...?"
20020-500 = "ฮุฮุฮุ ค่ะ... แน่นอนว่าฉันก็\nเตรียมใจไว้แล้ว อย่าใส่ใจเลย\nนะคะ เชิญทำได้เต็มที่เลยค่ะ...!"
20020-510 = "ฉันเตรียมใจเอาไว้...\nพร้อมแล้วค่ะ"
20020-520 = "ค่ะ... เชิญค่ะ ถะ... ถ้างั้น\nก็ขอรบกวนด้วยนะคะ..."
20020-2600 = "ให้ของมีค่ากับฉันแบบนี้\nคาดหวังอะไรอยู่รึเปล่าคะ?\nฉันเป็นสาวน้อยอัจฉริยะนะคะ\nไม่ว่าเรื่องไหนก็ทำให้สมปรารถนาได้ค่ะ\nชะ... เชื่อใจฉันอยู่แล้วงั้นเหรอคะ?\nงะ... งั้นเหรอคะ...? ขอบคุณค่ะคุณครู"

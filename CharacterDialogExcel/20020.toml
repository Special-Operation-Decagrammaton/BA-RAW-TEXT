[translation]
20020-10 = "蔚藍～檔案～呵呵。"
20020-20 = "貝里塔斯的部長兼，特異現象搜查部的部長……\n我就是千年最棒的天才清楚系病弱美少女駭客，明星陽葵。\n呵呵，請多多指教哦，老師。"
20020-30 = "（這個房間\n有點冷呢…)"
20020-40 = "有很多人\n在呢……\n讓人有點疲憊。"
20020-50 = "哎呀，居然還有這種東西。\n總覺得很有趣呢。"
20020-60 = "呵呵。這麼寬敞的話，\n似乎可以和貝里塔斯\n的大家和英美一起來\n野餐呢。"
20020-70 = "真是不錯的地方呢。\n要是方便的功能\n再豐富一點就好了…\n稍微駭入一下吧。"
20020-80 = "哎呀，您辛苦了，老師。\n恭候多時了。"
20020-90 = "那麼，開始今天\n的工作吧？呵呵。"
20020-100 = "為了幫助總是\n很忙碌的老師，千年的\n超天才病弱美少女駭客\n已火速趕來。"
20020-110 = "沒有歡迎的鼓掌嗎？\n像這樣「啪啪啪」…\n之類的。"
20020-120 = "居然能讓千年清純的高嶺之花，\n擁有大家憧憬的「全知」學位的\n眉清目秀的少女幫忙工作……"
20020-130 = "老師真是有著\n驚人的好運呢。"
20020-140 = "…我的自我介紹\n每次都不一樣？"
20020-150 = "呵呵。真虧您能發現呢。\n沒錯，每次都會改變…"
20020-160 = "不過全都是真實的事哦？"
20020-170 = "因為如果要把自己的事\n正確地說出來，\n每次都會變得太長…"
20020-180 = "所以才會每次\n都改變表現方式。"
20020-190 = "語言真是\n相當困難的東西呢…"
20020-200 = "貝里塔斯是怪人們\n的集團這種說法\n雖然偶爾會聽見，\n實在是非常令人遺憾…"
20020-210 = "明明有我這個絕世美少女在，\n究竟是怎麼回事呢？"
20020-220 = "像這樣幫忙工作，\n就會有很多新鮮的發現。"
20020-230 = "老師平常就\n做著各式\n各樣的工作呢。"
20020-240 = "呼…呼…"
20020-250 = "呀…！？\n我，我沒有在睡覺！\n是真的唷？"
20020-260 = "…沒錯，硬要說的話，\n我只是在觀察快速眼動睡眠\n和非快速眼動睡眠的關係而已。\n沒錯，當然是這樣。"
20020-270 = "啊，祝您生日快樂，老師。"
20020-280 = "今天這種日子居然\n能和我一起度過，\n一定會是很美好的一天呢。"
20020-290 = "哎呀，再開心一點\n也可以唷？呵呵。"
20020-300 = "我的生日嗎？\n非常感謝。"
20020-310 = "…當然，被部員們\n祝福的時候，\n我也很開心。"
20020-320 = "從老師口中聽見\n這些話…原來會\n是這種心情啊。"
20020-330 = "…呵呵，是啊。\n真是非常有趣。"
20020-340 = "哎呀…\n已經是新年了呢。\n祝您新年快樂。"
20020-350 = "像這樣一年結束，\n又迎來新的一年，\n這個節日能一起度過…"
20020-360 = "呵呵，真不錯呢。\n老師，今年也請多多指教。"
20020-370 = "是聖誕節…嗎。"
20020-380 = "肯定是個值得紀念的日子呢。"
20020-390 = "呵呵…那麼，\n難得有機會，\n一起去看個電影\n怎麼樣呀，老師？"
20020-400 = "…是萬聖節嗎。\n後輩們特別喜歡萬聖節。"
20020-410 = "好像說過是最適合\n惡作劇的日子。"
20020-420 = "呵呵，我決定了，老師。\n大家一起久違地開個\n零食派對吧。"
20020-440 = "呵呵，怎麼樣呢？\n能洗千年最棒美少女\n的腳的機會什麼的…"
20020-450 = "可不是常常…\n常常有的…"
20020-460 = "唔…？\n比想像中還…\n好像有種奇怪的…"
20020-470 = "奇妙的…\n該，該說是害羞嗎…\n為，為什麼呢…？"
20020-480 = "難，難以用言語\n表達的感情……！"
20020-490 = "明明，老師只是\n細心地替我\n洗腳而已…\n為何會…？"
20020-500 = "呵，呵呵。沒錯，\n我當然已經做好覺悟了，\n無需在意。\n請做到您滿意為止…！"
20020-510 = "…覺悟，\n我已經…做好了。"
20020-520 = "好，好的…\n那，那就…拜託您了…"
20020-2600 = "嘛，居然能收到這麼貴重的物品。\n您有什麼願望嗎？\n因為我是超天才美少女，\n所以什麼都能為您實…咦？\n因為總是依賴著我…？\n是，是嗎….\n非常感謝您…老師。"

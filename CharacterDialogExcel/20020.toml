[translation]
20020-10 = "블루~ 아카이브~ 후훗."
20020-20 = "베리타스의 부장 겸 초현상특무부의 부장… 밀레니엄 최고의\n청초계 병약 미소녀 해커. 아케보시 히마리라고 합니다.\n후훗, 잘 부탁드린답니다? 선생님."
20020-30 = "(이 방, 조금\n추운 것 같네요…)"
20020-40 = "많은 분들이\n계시네요…\n…조금 지치는걸요."
20020-50 = "어라, 이런 게 있을 줄은.\n뭔가 재밌어 보이네요."
20020-60 = "후훗, 이 넓이라면\n베리타스의 모두나\n에이미와 함께 피크닉도\n할 수 있을 것 같네요."
20020-70 = "나쁘지 않은 장소네요.\n좀 더 편의 기능도\n충실했으면 좋을 듯한데…\n…가볍게 해킹해볼까요?"
20020-80 = "어머, 수고하셨어요. 선생님.\n기다리고 있었답니다."
20020-90 = "그럼 오늘의 업무를\n시작해볼까요? 후훗."
20020-100 = "언제나 바쁜 선생님을\n돕기 위해, 밀레니엄의\n초천재병약미소녀해커가\n달려왔답니다."
20020-110 = "환영의 박수는 없나요?\n이렇게, 짝짝짝…\n같은 거라든지."
20020-120 = "밀레니엄의 청초한 절벽의\n꽃이자, 모두가 동경하는\n<전지>의 학위를 가진 미목수려한\n재녀가 업무를 도와준다니…"
20020-130 = "선생님은 매우 운이 좋은,\n행운아이시네요."
20020-140 = "…저의 자기소개 내용이\n매번 다르다고요?"
20020-150 = "후훗, 용케 눈치채셨군요.\n맞아요. 매번 바꾸고 있습니다."
20020-160 = "참고로 전부 사실이니까요?"
20020-170 = "아무래도 저에 대해\n정확히 소개하려고 하다 보면\n늘 말이 길어지곤 해서…"
20020-180 = "그때마다 표현을\n바꾸어 말하는 것이랍니다."
20020-190 = "말이란, 참으로\n어려운 것이네요…"
20020-200 = "베리타스가\n괴짜들의 집단이란 음해를\n들을 때가 있는데.\n참으로 안타깝답니다."
20020-210 = "저라는 희대의 미소녀가 있는데,\n대체 어째서일까요?"
20020-220 = "이렇게 일을 돕고 있다 보면,\n신선한 발견을\n잔뜩 하게 되네요."
20020-230 = "선생님은 평소에도\n다양한 업무를\n하고 계셨던 거네요."
20020-240 = "쿠울… 쿠울…"
20020-250 = "히얏…?!\n따, 딱히 졸고 있었던 건\n아니랍니다?\n정말이라구요?"
20020-260 = "…그렇네요. 굳이 말하자면.\n렘 수면과 비렘수면의 관계를\n고찰하고 있었을 뿐이랍니다.\n네, 정말로요."
20020-270 = "아, 생일 축하드려요. 선생님."
20020-280 = "오늘 같은 날을 저와 함께\n보낼 수 있다니, 정말로\n멋진 하루가 되겠네요."
20020-290 = "어머,\n좀 더 기뻐하셔도\n좋답니다. 후훗."
20020-300 = "제 생일 말인가요?\n감사합니다."
20020-310 = "…물론 부원들이\n축하해줄 때도\n기쁘긴 했지만."
20020-320 = "선생님에게 축하 인사를\n받게 되면… 이러한 종류의\n기분이 드는군요."
20020-330 = "…후훗, 네.\n매우 흥미롭네요."
20020-340 = "어머…\n새해가 되었네요.\n새해 복 많이 받으세요."
20020-350 = "이렇게 1년이 끝나고,\n또 다시 새로운 해가 찾아오는,\n그 순간을, 함께 보낸다…"
20020-360 = "후후, 나쁘지 않은 느낌이네요.\n선생님. 올해도\n잘 부탁드립니다."
20020-370 = "크리스마스…인가요."
20020-380 = "분명 기념할 만한 날이겠군요."
20020-390 = "후훗… 그럼 모처럼이니까,\n영화라도 같이 보러 가는 건\n어떠신가요, 선생님?"
20020-400 = "…할로윈, 인가요.\n후배들은 특히\n할로윈을 좋아했지요."
20020-410 = "분명, 장난을 치기에\n딱인 날이라고\n했던가요."
20020-420 = "후훗, 결정했어요. 선생님.\n오랜만에 다 같이 모여\n과자 파티를 하죠."
20020-440 = "후후. 어떠신가요.\n밀레니엄 최고 미소녀의\n맨발을 씻겨줄 기회라니…"
20020-450 = "좀처럼 흔치 않은…\n흔치 않은 기회의…"
20020-460 = "읏…?\n생각했던 것보다…\n뭔가 이상한 듯한…"
20020-470 = "기묘한 게…\n부, 부끄럽다고 할지…\n어, 어째서…?"
20020-480 = "마, 말로 표현하기\n어려운 감정이…!"
20020-490 = "단순히 선생님이 제 발을\n정성스럽게 씻겨주고\n있을 뿐일 텐데…\n어째서…?"
20020-500 = "후, 후훗. 네, 물론\n각오는 되어 있으니\n신경 쓰지 마시길.\n부디, 마음가는대로…!"
20020-510 = "…각오는, 되어 있을…\n테니, 까요."
20020-520 = "네, 네에. 그, 그럼…\n잘 부탁드립니다…"
20020-2600 = "뭐, 이런 귀중한 물건을 받을 수 있다니.\n무언가 소원이라도 있으신가요?\n저는 초천재미소녀니까.\n뭐든지 다 이뤄드리… 네?\n늘 의지하고 있으니까…?\n그, 그런가요…\n감사합니다… 선생님."

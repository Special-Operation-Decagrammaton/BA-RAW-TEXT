[translation]
10038-10 = "Blue Archive."
10038-20 = "SRT Academy, RABBIT Squad's Tsukiyuki Miyako. Your orders, Sensei."
10038-30 = "...I found a cute decoration."
10038-40 = "In terrain like this, I can handle it on my own..."
10038-50 = "I didn't expect to find a hide site here..."
10038-60 = "...Receiving. Good reception."
10038-70 = "Is there a problem?"
10038-80 = "Welcome, Sensei."
10038-90 = "I've been waiting for your next order."
10038-100 = "It's nice to see you again, Sensei. Is there anything I can do...?"
10038-110 = "RABBIT Squad is ready to mobilize at any time."
10038-120 = "I suddenly got curious..."
10038-130 = "What kind of sound does a rabbit make?"
10038-140 = "...Hop, hop?"
10038-150 = "If you encounter an enemy you can't handle alone, make sure to call us."
10038-160 = "The RABBIT Squad emblem..."
10038-170 = "Isn't it cute?"
10038-180 = "Happy birthday, Sensei."
10038-190 = "To ensure you have a perfect birthday,"
10038-200 = "I'll be protecting you today."
10038-210 = "I just realized today is my birthday..."
10038-220 = "I don't need a gift, thank you."
10038-230 = "Your safety is the best gift for me."
10038-240 = "Do you think we can rebuild SRT Academy this year?"
10038-250 = "Santa Claus..."
10038-260 = "I'd like to try fighting him."
10038-270 = "If I just shoot the ghost, it won't be so frightening."
10038-290 = "How pretty..."
10038-300 = "The night view is so beautiful. I almost forgot we were on a mission."
10038-310 = "Heehee, I shouldn't be letting my guard down during a mission."
10038-320 = "Well, um... This is out of nowhere, but, Sensei..."
10038-330 = "Umm... Thank you for...always being there."
10038-340 = "If you hadn't been..."
10038-350 = "I...and the rest of the RABBIT Squad would never have come this far."
10038-360 = "So, from now on, if you're okay with it...please..."
10038-370 = "Huh? A message..."
10038-380 = "Understood. Five hundred meters out..."
10038-390 = "Yes, I received the signal to commence the raid."
10038-400 = "Sensei, please put on your rappel ring and harness."
10038-410 = "Huh? You don't know how to? I...see..."
10038-420 = "That's okay. Then, please wait here. I'll finish and come back to you soon."
10038-430 = "And when I do... Let's take in this view, together."
10038-2600 = "RABBIT Type 31 submachine gun acquired. So cute..."

[translation]
10038-10 = "블루 아카이브."
10038-20 = "SRT 특수학원,\nRABBIT 소대의 츠키유키 미야코입니다.\n선생님, 지시를."
10038-30 = "…귀여운 장식을\n발견했습니다."
10038-40 = "이 정도의 공간이라면,\n저 혼자서도 제압할\n수 있겠군요……"
10038-50 = "이런 곳에\n저격 포인트가…"
10038-60 = "…수신 중. 감도 양호."
10038-70 = "무슨 문제라도 있습니까?"
10038-80 = "어서 오세요, 선생님."
10038-90 = "이곳에서 줄곧 다음 명령을\n기다리고 있었습니다."
10038-100 = "다시 뵙게 되어\n반갑습니다, 선생님.\n시키실 일이라도…?"
10038-110 = "RABBIT 소대,\n언제든 출격 가능합니다."
10038-120 = "갑자기 든 의문입니다만…"
10038-130 = "토끼는 어떤 소리로 울까요?"
10038-140 = "깡총, 깡총……\n이라던가?"
10038-150 = "상대하기 버거운\n적을 만났을 때는\n꼭 저희를 불러주세요."
10038-160 = "RABBIT 소대의 엠블럼…"
10038-170 = "귀엽지 않나요?"
10038-180 = "생신 축하드립니다,\n선생님."
10038-190 = "선생님의 생신이\n완벽하도록"
10038-200 = "오늘 하루는\n밀착 경호하겠습니다."
10038-210 = "그러고 보니 오늘이\n제 생일이었군요…"
10038-220 = "선물은 괜찮습니다."
10038-230 = "선생님의 안전이\n제 기쁨이니까요."
10038-240 = "올해야말로, SRT 학원을\n재건할 수 있을까요…?"
10038-250 = "산타클로스…"
10038-260 = "언젠가는 꼭 한 번\n맞서 싸워보고 싶은\n상대입니다."
10038-270 = "귀신에게도 총알이\n통한다면 무섭지\n않을텐데요…"
10038-290 = "예뻐라…"
10038-300 = "야경이 너무 아름다워서\n하마터면 목적을\n잊어버릴 뻔했네요."
10038-310 = "후후,\n작전 중의 방심은\n금물입니다만…"
10038-320 = "아, 저… 갑작스럽지만,\n선생님…"
10038-330 = "그러니까… 언제나\n함께해 주셔서\n감사합니다."
10038-340 = "선생님이 계시지\n않았더라면"
10038-350 = "저도, RABBIT 소대도\n이만큼 성장하지\n못했을 거예요."
10038-360 = "그러니 다음에,\n괜찮으시다면 꼭……"
10038-370 = "어라…? 연락이…"
10038-380 = "그렇군요…\n앞으로 500m 지점에…"
10038-390 = "네, 곧 돌입 준비하라는\n연락이네요."
10038-400 = "선생님, 레펠 링과\n하네스를 착용해주세요."
10038-410 = "네? 사용법을\n모르신다고요…?\n그, 그렇군요…"
10038-420 = "괜찮습니다. 그럼\n여기서 기다려 주세요.\n금방 마치고 돌아오겠습니다."
10038-430 = "돌아와서 다시\n선생님과 함께, 천천히\n이 야경을 보고 싶어요."
10038-2600 = "RABBIT 31식 기관단총,\n수령했습니다. 귀여워……"

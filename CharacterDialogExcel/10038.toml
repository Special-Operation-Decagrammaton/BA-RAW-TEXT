[translation]
10038-10 = "蔚藍檔案。"
10038-20 = "SRT特殊學園，\nRABBIT小隊的月雪都子。\n老師，請下令。"
10038-30 = "……發現可愛的首飾。"
10038-40 = "這點大小的空間，\n感覺我一個人\n就能鎮壓了……"
10038-50 = "這種地方竟然\n有狙擊點……"
10038-60 = "……通訊中，訊號良好。"
10038-70 = "請問有什麼問題嗎？"
10038-80 = "歡迎回來，老師。"
10038-90 = "我一直在這裡\n等待下一道命令。"
10038-100 = "很高興能再見到你，老師。\n有什麼要做的事嗎……？"
10038-110 = "RABBIT小隊，\n隨時可以出擊。"
10038-120 = "我突然有個問題……"
10038-130 = "兔子的叫聲是什麼呢？"
10038-140 = "蹦蹦，蹦蹦……\n這樣嗎？"
10038-150 = "如果老師遇到棘手的敵人，\n請一定要呼叫我們。"
10038-160 = "RABBIT小隊的徽章……"
10038-170 = "是不是很可愛呢？"
10038-180 = "生日快樂，老師。"
10038-190 = "為了讓老師有個\n十全十美的生日，"
10038-200 = "我會擔任老師\n今天一整天的貼身護衛。"
10038-210 = "這麼說來，今天\n是我的生日呢……"
10038-220 = "沒關係，我不需要禮物。"
10038-230 = "老師的安全\n就是我的喜悅。"
10038-240 = "不知道今年，\n能不能重建SRT學園呢……？"
10038-250 = "聖誕老人……"
10038-260 = "是我希望總有一天\n能對決一次的對手。"
10038-270 = "就算他是妖怪\n只要子彈管用\n就沒什麼好怕的……"
10038-290 = "真漂亮……"
10038-300 = "因為夜景太美，\n差點就把目的忘得\n一乾二淨了。"
10038-310 = "呵呵，\n在作戰中分心什麼的\n可是大忌啊……"
10038-320 = "……那個，\n……雖然很突然，\n但是老師……"
10038-330 = "就是……\n謝謝你總是\n和我們在一起。"
10038-340 = "如果老師\n不在的話……"
10038-350 = "不管是我，還是RABBIT小隊，\n我想都無法成長到現在的程度。"
10038-360 = "所以下次，\n如果你願意的話，那個──"
10038-370 = "……？有聯絡……"
10038-380 = "原來如此，\n就在前方500m的地點……"
10038-390 = "沒錯。是告知\n立即準備突擊的通知。"
10038-400 = "老師，請裝備好\n垂降繩和安全帶。"
10038-410 = "咦？不知道\n怎麼使用……是嗎？\n這，這樣啊……"
10038-420 = "……沒關係。\n那麼請在這裡稍等一會。\n我會盡快結束任務，\n趕快回來的。"
10038-430 = "然後，\n我想要和老師一起，\n悠閒地欣賞這片夜景。"
10038-2600 = "RABBIT31式短機關槍，確實收到了。\n……真可愛。"

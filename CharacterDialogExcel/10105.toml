[translation]
10105-10 = "블루 아카이브!"
10105-20 = "아이돌은 별로 해본 적이 없습니다만…\n열심히 하고 오겠습니다.\n잘 부탁드립니다, 선생님!"
10105-30 = "아늑한 분위기네요."
10105-40 = "뭔가 시선이\n느껴지는 듯한……?"
10105-50 = "다음에는\n무엇을 할까요…?"
10105-60 = "도와드릴 일이라도\n있을까요?"
10105-70 = "악수회…?\n체키…?"
10105-80 = "기다리고 있었어요, 선생님.\n준비에는 만전을 기했답니다."
10105-90 = "그럼 들어주세요.\n첫 번째 곡은, 이 곡입니다."
10105-100 = "선생님이 원하신다면……\n무대에서도, 그 이외에서도……\n노래를 전하겠습니다."
10105-110 = "저의 노래로 선생님이\n행복해주신다면…\n그 이상 바랄 것은 없어요."
10105-120 = "응? 악수 신청인가요?\n얼마든지요!"
10105-130 = "아, 아핫, 아하하……!\n선, 선생님,\n간, 간지러워요……!"
10105-140 = "정말…… 그러시면\n저도……! 에잇!"
10105-150 = "생일 축하합니다, 선생님.\n이 노래를 선생님께 바칠게요."
10105-160 = "저를 위한 날……"
10105-170 = "이라는 건\n늘 적응되지 않아요."
10105-180 = "하지만, 기뻐요.\n감사합니다, 선생님."
10105-190 = "새해 복 많이 받으세요, 선생님."
10105-200 = "올해도 더 많은 분들에게\n노래를 선물할 수 있는……"
10105-210 = "그런 행복이 가득한\n한 해가 되길, 바랍니다."
10105-220 = "거룩한 밤……찬송가를\n많은 분들께 보내는\n날입니다."
10105-230 = "네, 노래하기에\n참 좋은 의상이니까요."
10105-240 = "이, 이것은\n가장이 아닙니다만………"
10105-250 = "하지만……\n선생님이 마음에 드신다면……\n이대로 있을게요."
10105-270 = "선생님,\n기다려주셨군요!"
10105-280 = "진짜로 계속 여기서\n기다려주셨다니…"
10105-290 = "그…\n무대 어땠을까요?"
10105-300 = "무대 끝에서는\n잘 보이지 않았을 거라고\n생각합니다만……."
10105-310 = "그치만,\n선생님은 계속 지켜봐\n주셨으니까……."
10105-320 = "무대 끝쪽에서 봐도\n괜찮겠네요......"
10105-330 = "괜……찮으셨을까요?\n저는……."
10105-340 = "제대로…….\n'아이돌'이었을까요?"
10105-350 = "……!!"
10105-360 = "……감사합니다, \n선생님……!!"
10105-370 = "……에헤헤."
10105-2600 = "지금이라면, 뭐든지 선생님께 말할 수 있을 것 같아요.\n그… 그러니까 듣고 잊어주세요.\n…앞으로도, 계속 제 곁에 있어주세요.\n약속이에요."

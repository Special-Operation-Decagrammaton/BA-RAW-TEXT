[translation]
10105-10 = "蔚藍檔案！"
10105-20 = "雖然沒怎麼擔任過偶像……\n不過我會盡可能努力的。\n請您多多指教，老師！"
10105-30 = "是個非常舒適的空間呢。"
10105-40 = "好像能感受到\n視線……？"
10105-50 = "接下來\n該做什麼呢……？"
10105-60 = "有什麼我能\n幫忙的事嗎？"
10105-70 = "握手會……？\n拍立得……？"
10105-80 = "恭候多時了，老師。\n準備很萬全唷。"
10105-90 = "那麼請欣賞。\n第一首，是這首歌。"
10105-100 = "如果老師希望的話……\n無論在舞台，還是其他地方……\n我都會為您獻唱。"
10105-110 = "如果我的歌聲能讓\n老師感到幸福的話……\n我就心滿意足了。"
10105-120 = "握，握手是嗎？\n好的，您請！"
10105-130 = "啊，啊哈，啊哈哈……！\n老，老師，很，很癢耶……！"
10105-140 = "真是的……\n您要做這種事的話，\n那我也……嘿！"
10105-150 = "祝您生日快樂，老師。\n我將這首歌獻給老師。"
10105-160 = "我的生日……"
10105-170 = "自己擔任主角的日子，\n無論經歷幾次都不太適應呢。"
10105-180 = "不過，光是您能這麼說，\n就讓我感到無比開心。\n謝謝您，老師。"
10105-190 = "新年快樂，老師。"
10105-200 = "祈望今年也是個能向\n更多人傳達歌聲……"
10105-210 = "這樣充滿幸福的一年。"
10105-220 = "神聖的夜晚……\n是將讚美歌傳遞給\n大家的日子。"
10105-230 = "沒錯，因為這是\n非常適合唱歌的打扮。"
10105-240 = "這，這雖然不是變裝……"
10105-250 = "不過……\n如果老師喜歡的話……\n就繼續穿著吧。"
10105-270 = "老師，\n讓您久等了！"
10105-280 = "沒想到您竟然\n一直在這裡等我……"
10105-290 = "那個……演出，\n您覺得如何呢？"
10105-300 = "雖然從舞台側邊\n可能看不太清楚……"
10105-310 = "不過，畢竟老師\n總是守望著我……"
10105-320 = "就算從舞台側邊\n應該也沒問題……"
10105-330 = "那個……\n表演，怎麼樣呢？"
10105-340 = "我有……成為\n稱職的「偶像」嗎？"
10105-350 = "……！！"
10105-360 = "……謝謝您，\n老師……！！"
10105-370 = "……耶嘿嘿。"
10105-2600 = "如果是現在，感覺似乎能向老師訴說一切。\n那個……所以，即便聽見也請您忘記哦。\n……從今以後，請您也一直陪在我身邊吧。\n約好了唷。"

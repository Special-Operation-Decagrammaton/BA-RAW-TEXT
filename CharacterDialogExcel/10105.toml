[translation]
10105-10 = "Blue Archive!"
10105-20 = "ฉันไม่เคยทำอะไรอย่างไอดอลเท่าไร...\nแต่ฉันจะตั้งใจทำให้เต็มที่ค่ะ\nรบกวนด้วยนะคะคุณครู!"
10105-30 = "บรรยากาศอบอุ่นจังเลยนะคะ"
10105-40 = "ที่มองแบบนั้น...\nเป็นเพราะชุดเหรอคะ?"
10105-50 = "ครั้งหน้า\nทำอะไรดีคะ...?"
10105-60 = "มีงานอะไร\nให้ฉันช่วยมั้ยคะ?"
10105-70 = "งานจับมือ...?\nถ่ายรูปเชกิ...?"
10105-80 = "กำลังรออยู่เลยค่ะ คุณครู\nฉันเตรียมพร้อมอย่างเต็มที่เลยค่ะ"
10105-90 = "งั้นก็ช่วยฟังด้วยนะคะ\nเพลงแรกคือเพลงนี้ค่ะ"
10105-100 = "ถ้าคุณครูต้องการละก็...\nไม่ว่าจะบนเวที หรือที่ไหนๆ...\nฉันก็จะร้องเพลงให้ค่ะ"
10105-110 = "ถ้าเพลงของฉัน\nทำให้คุณครูมีความสุขได้...\nฉันก็ไม่ปรารถนาอะไรอื่นแล้วค่ะ"
10105-120 = "หืม? ขอจับมือเหรอคะ?\nได้เสมอเลยค่ะ!"
10105-130 = "อ่า... ฮ่าฮ่า ฮ่าฮ่าฮ่า...!\nคะ... คุณครู\nจะ... จั๊กจี้นะคะ...!"
10105-140 = "จริงๆ เลย... ถ้างั้น\nฉันจะทำบ้างนะคะ...! นี่แน่ะ!"
10105-150 = "สุขสันต์วันเกิดค่ะ คุณครู\nฉันขอมอบเพลงนี้ให้คุณครูค่ะ"
10105-160 = "วันของฉัน..."
10105-170 = "ความรู้สึกนี้\nฉันยังไม่ชินเลยค่ะ"
10105-180 = "แต่ก็ดีใจนะคะ\nขอบคุณค่ะ คุณครู"
10105-190 = "สวัสดีปีใหม่ค่ะคุณครู"
10105-200 = "ขอให้ปีนี้\nเป็นปีที่มีความสุข..."
10105-210 = "และมอบเพลงเป็นของขวัญ\nให้กับหลายๆ คนได้นะคะ"
10105-220 = "คืนศักดิ์สิทธิ์... วันนี้เป็นวันที่\nร้องเพลงสรรเสริญพระเจ้า\nให้หลายๆ คนฟังค่ะ"
10105-230 = "ค่ะ ก็ชุดนี้เหมาะกับ\nการร้องเพลงนี่คะ"
10105-240 = "นะ... นี่ไม่ใช่\nการปลอมตัวนะคะ..."
10105-250 = "แต่ถ้า... ถูกใจคุณครูละก็...\nฉันจะอยู่อย่างนี้ให้คะ"
10105-270 = "คุณครู\nรอฉันเหรอคะเนี่ย!"
10105-280 = "รอฉันอยู่ที่นี่ตลอด\nจริงๆ อย่างนั้นเหรอ..."
10105-290 = "คือว่าฉัน...\nร้องเพลงเป็นยังไงบ้างคะ?"
10105-300 = "ฉันคิดว่าอยู่หลังเวที\nไม่น่าจะเห็นชัดนะคะ..."
10105-310 = "แต่ว่า... คุณครูคอยดูฉัน\nอยู่ตลอดเลยนี่นา"
10105-320 = "ถึงอยู่ด้านหลังเวที...\nก็คงไม่เป็นไรสินะคะ..."
10105-330 = "สะ... แสดงใช้ได้รึเปล่าคะ...?\nฉันน่ะ..."
10105-340 = "เหมือน 'ไอดอล'\nตัวจริงหรือยังคะ?"
10105-350 = "...!!"
10105-360 = "ขอบคุณค่ะ...\nคุณครู...!!"
10105-370 = "ฮิฮิๆ..."
10105-2600 = "ฉันในตอนนี้สามารถพูดสิ่งที่ปกติแล้ว\nฉันไม่กล้าพูดค่ะ ฟังคำที่ฉันจะบอก\nแค่ตอนนี้แล้วปล่อยผ่านไปนะคะ\nคุณครู... ไว้ในอนาคตก็... ต้องอยู่กับฉันนะคะ"

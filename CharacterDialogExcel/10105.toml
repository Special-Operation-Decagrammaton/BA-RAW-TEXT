[translation]
10105-10 = "Blue Archive!"
10105-20 = "I don't have much experience as an idol...but I'll do my best. I look forward to working with you, Sensei!"
10105-30 = "It's a cozy atmosphere."
10105-40 = "Is someone looking at me...?"
10105-50 = "What should I do next...?"
10105-60 = "Is there anything I can assist with?"
10105-70 = "Meet-and-greets...? Polaroids...?"
10105-80 = "I've been waiting for you, Sensei. I've completed all my preparations."
10105-90 = "Then please listen. This is the first song."
10105-100 = "If you'd like, Sensei...I'll sing this song for you...whether it's on stage or not."
10105-110 = "If my song can make you happy... There's nothing more I can ask for."
10105-120 = "Hm? A handshake? Anytime!"
10105-130 = "A-Aha, ahaha...! S-Sensei! I-It tickles...!"
10105-140 = "Geez... Then I'll tickle you too...! Hiyah!"
10105-150 = "Happy birthday, Sensei. This song is dedicated to you."
10105-160 = "A day just for me..."
10105-170 = "...I'll never grow accustomed to that."
10105-180 = "However, I am happy. Thank you, Sensei."
10105-190 = "Happy New Year, Sensei."
10105-200 = "I hope that this year is a joyful one..."
10105-210 = "...one where I can gift my songs to even more people."
10105-220 = "A holy night... It's a day for sending hymns to many people."
10105-230 = "Yes, this is a good outfit to sing in."
10105-240 = "Th-This is not a costume..."
10105-250 = "But...if it's to your liking...I will keep it on."
10105-270 = "Sensei, you waited for me!"
10105-280 = "I can't believe you really kept waiting for me here..."
10105-290 = "Um... Could you see okay?"
10105-300 = "Seems like you can't really see the stage from here..."
10105-310 = "But I know you're always watching over me..."
10105-320 = "So I guess the view wouldn't really matter."
10105-330 = "Did I...do okay? Was I..."
10105-340 = "Was I a...proper...idol?"
10105-350 = "...!"
10105-360 = "...Thank you, Sensei...!"
10105-370 = "...Heehee."
10105-2600 = "I feel capable of saying things that would normally be difficult for me to vocalize right now. Please hear me out, but forget it later. Moving forward, please continue standing by my side. It's a promise."

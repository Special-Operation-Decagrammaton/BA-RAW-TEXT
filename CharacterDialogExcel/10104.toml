[translation]
10104-10 = "It's Blue Archive."
10104-20 = "I'm Kayama Reijo, the manager and head security of the main store of Shanhaijing Academy's Black Tortoise Promenade. I look forward to working with you again, Sensei."
10104-30 = "I wonder how matters here are being managed..."
10104-40 = "This is teaching me about the ways that the Black Tortoise is different."
10104-50 = "Maybe we should do some market research."
10104-60 = "(If we're going to expand the Black Tortoise Promenade here...)"
10104-70 = "I wonder if there's any place to stretch..."
10104-80 = "Please let me know if you have any requests. But, um...please don't give me the difficult tasks."
10104-90 = "I've been waiting for you, Sensei. No, don't worry. It hasn't been that long...I think."
10104-100 = "I'm used to managing elite customers and high-value transactions. I can handle escort and security, too."
10104-110 = "...What area am I most confident in? Definitely kung fu!"
10104-120 = "I feel like being active for a while. So I'll be going to kung fu training now..."
10104-130 = "...You mean a walk? A walk isn't enough..."
10104-140 = "No, okay! I'll go! As long as it's with you, Sensei!"
10104-150 = "Honestly, I'm not a very good shot."
10104-160 = "People have even told me I might be better off fighting with my fists..."
10104-170 = "But I'm training diligently!"
10104-180 = "I think I can shoot as well as others now..."
10104-190 = "It's okay to ditch sometimes?"
10104-200 = "No, Sensei! Time is short! We're always losing time!"
10104-210 = "...We need rest to use our time productively...?"
10104-220 = "Actually, that does make sense..."
10104-230 = "Time for the two of us... Time with you, Sensei... It feels odd."
10104-240 = "Um, Sensei... Can I sit...next to you...?"
10104-250 = "Happy birthday, Sensei!"
10104-260 = "This morning, I had a strange dream."
10104-270 = "It was about guarding you in the moment you were born, Sensei..."
10104-280 = "...You weren't in Kivotos then. It's interesting."
10104-290 = "Huh? What?! My birthday? Y-You...remembered?"
10104-300 = "I...was hoping you would, but..."
10104-310 = "...Thank you, Sensei. I'm so lucky..."
10104-320 = "Happy New Year, Sensei. I brought New Year's food from the Black Tortoise Promenade."
10104-330 = "I helped make it! Heehee... Can you guess what it is?"
10104-340 = "I'm well-informed about Christmas. I studied the subject not long ago."
10104-350 = "...Well, then. I'm going to go defeat Santa Claus, the economic criminal..."
10104-360 = "...for passing out free gifts and disrupting the cost of living!"
10104-370 = "I'm aware of what day it is today."
10104-380 = "As a member of the Promenade, I need to have a wide range of knowledge."
10104-390 = "Halloween... It's the peak season for pumpkins, right?"
10104-410 = "Ah. You're here."
10104-420 = "I'm almost done with my morning training, so please wait."
10104-430 = "You see, this is an aspect of continuous movement as well."
10104-440 = "Stopping the flow, maintaining poses..."
10104-450 = "It also helps with training the mind."
10104-460 = "...But why are you just standing there, Sensei?"
10104-470 = "Huh? If I'm training..."
10104-480 = "...I shouldn't be getting distracted? I need to maintain my composure?"
10104-490 = "Yes, that's true, but..."
10104-500 = "...B-But this is way too much!"
10104-2600 = "They say most problems can be solved with guns and gunpowder... But for you, who always has my back, I'll make sure I achieve a harmony of guns and fists...someday!"

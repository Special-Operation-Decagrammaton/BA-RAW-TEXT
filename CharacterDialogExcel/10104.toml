[translation]
10104-10 = "蔚藍檔案。"
10104-20 = "我是山海經高級中學，\n擔任玄武商會總店經理兼護衛的鹿山令女。\n再次請您多多指教。老師。"
10104-30 = "這裡的物流管理，\n是如何運作的呢……"
10104-40 = "與玄武商會之間的\n差異值得學習。"
10104-50 = "做個市場調查吧。"
10104-60 = "（如果想在這裡擴張\n玄武商會的通路……）"
10104-70 = "能伸展的地方，\n雖然很想確保……"
10104-80 = "如果有需求，請儘管說。\n ……麻，麻煩請排除\n困難的事情。"
10104-90 = "恭候多時了，老師。\n不，請不必擔心。\n我並沒有等太久。\n……大概吧。"
10104-100 = "商流或交易管理的話我很熟悉。\n護衛和警衛任務也算能夠勝任。"
10104-110 = "……最有自信的事？\n當然，是功夫！"
10104-120 = "有點，想活動一下身體。\n我接下來將進行\n功夫的修練……"
10104-130 = "……散步？\n……可是，只有\n散步程度的話……"
10104-140 = "啊！沒事！我去！\n如果是跟老師一起的話！"
10104-150 = "其實，我不太擅長射擊。"
10104-160 = "甚至到了曾被別人說過，不如\n用拳頭戰鬥比較好的程度……"
10104-170 = "但是，我有確實\n進行訓練……！"
10104-180 = "……我想應該有達到\n一般人的水準，才對……"
10104-190 = "偶爾偷懶也沒關係，是嗎？"
10104-200 = "不行，老師！\n時間是有限的！而且\n正在一分一秒地流逝哦！？"
10104-210 = "……想有效\n利用時間的話，\n休息也是必要的……？"
10104-220 = "這倒確實……\n如您所說……"
10104-230 = "兩人獨處的時光……\n而且還是跟老師。讓人\n有種……奇妙的心情。"
10104-240 = "那個，老師……方便……\n坐在您旁邊嗎……？"
10104-250 = "祝您生日快樂，老師！"
10104-260 = "其實今天早上，我\n做了一個有點特別的夢。"
10104-270 = "夢到自己正在護衛\n老師出生的瞬間，\n內容大致是這樣……"
10104-280 = "……那時候老師明明\n還不在奇普托斯的說。\n感覺很不可思議呢。"
10104-290 = "什，什麼！？我的生日……？\n您，您記得嗎……？"
10104-300 = "那個……要是老師\n記得的話真令人開心，\n雖然是有這麼想過……"
10104-310 = "……謝謝您，老師。\n我真是個幸運的人……"
10104-320 = "祝您新年快樂，老師。\n我從玄武商會\n帶了一些年菜過來。"
10104-330 = "我也有協助製作哦。\n呵呵……您猜得到是哪樣嗎？"
10104-340 = "聖誕節的詳情我很熟悉。\n畢竟不久前有學過。"
10104-350 = "……那麼，那名\n配送免費禮物擾亂物價，"
10104-360 = "名為聖誕老人的經濟犯，\n我這就去打倒！"
10104-370 = "今天是什麼日子，\n我當然有所掌握。"
10104-380 = "因為身為商人，本就\n必須吸收廣泛的知識。"
10104-390 = "萬聖節……也就是\n南瓜的銷售旺季，對吧？"
10104-410 = "啊，您來了呢。"
10104-420 = "再過一會晨練就會結束，\n能請您稍後片刻嗎？"
10104-430 = "其實這也是，\n連續動作的一部分哦。"
10104-440 = "將套路停止，\n把姿勢維持住。"
10104-450 = "或許會有助於鍛煉精神，\n也說不定……"
10104-460 = "……話說，老師您\n為何待在那種地方……？"
10104-470 = "咦？正在修行的話──"
10104-480 = "應該不被周圍的視線影響，\n保持平常心……？"
10104-490 = "那個，雖然是那樣沒錯……"
10104-500 = "……唔，果，果然\n這還是，辦不到……！"
10104-2600 = "大多數的事情都能用槍和火藥來解決，\n但話雖如此……為了在背後鼓勵我的老師！\n槍與拳的融合……我總有一天會實現的！"

[translation]
10104-10 = "블루 아카이브, 이군요."
10104-20 = "산해경 고급 중학교, 현무상회 본점의\n매니저 겸 호위의 카야마 레이죠입니다.\n다시 한번 잘 부탁드리겠습니다. 선생님."
10104-30 = "이곳의 물류 관리는,\n어떻게 이루어지고 있을까요……"
10104-40 = "현무상회와의 차이점,\n공부가 되네요."
10104-50 = "시장 조사 같은\n것이라도 해 볼까요."
10104-60 = "(이곳에 현무상회의\n 판로를 개척하려면……)"
10104-70 = "어딘가, 스트레칭이라도\n 할 장소는 없으려나……"
10104-80 = "요청사항이 있으시면\n무엇이든지 말씀 주세요.\n……음, 어려운 일은 빼고,\n부탁드립니다."
10104-90 = "기다리고 있었습니다,\n선생님. 아뇨, 걱정하지\n않으셔도 됩니다.\n그렇게 오래 기다리지는\n않아서요. ……아마도요."
10104-100 = "상류나 거래의 관리라면\n익숙합니다. 호위나 경비 임무도,\n나름대로 해낼 수 있습니다."
10104-110 = "……가장 자신 있는 것\n말씀이신가요?\n물론 쿵후입니다!"
10104-120 = "조금, 몸을 움직이고\n싶은 기분이네요.\n저는 이제부터\n쿵후의 수련을 하러……"
10104-130 = "……산책 말씀이신가요?\n하지만 산책 정도로는……"
10104-140 = "아뇨, 네! 가겠습니다!\n선생님과 함께라면요!"
10104-150 = "사실 사격은 좀\n서투른 편입니다."
10104-160 = "주먹으로 싸우는 게 낫지\n않겠느냐는 말을 들을 정도로…"
10104-170 = "하지만, 착실하게\n훈련은 하고 있습니다……!"
10104-180 = "……남들 만큼은, 쏠 수 있게\n되었다고, 생각합니다……"
10104-190 = "가끔은 땡땡이를\n쳐도 괜찮다, 라고요?"
10104-200 = "안 됩니다, 선생님!\n시간은 유한합니다!\n시시각각으로 줄어든다고요!?"
10104-210 = "……시간을 유효하게 사용하기\n위해서도, 휴식은 필요하다...?"
10104-220 = "생각해 보니 그것도\n맞는 것 같군요……"
10104-230 = "둘만의 시간……\n그것도 선생님과 함께,\n라는 것은……\n묘한 느낌이 듭니다."
10104-240 = "저기, 선생님의……\n옆자리…… 괜찮을까요...?"
10104-250 = "생일 축하드립니다. 선생님!"
10104-260 = "사실 오늘 아침에,\n조금 특이한 꿈을 꾸었습니다."
10104-270 = "선생님이 태어나는 순간의\n호위를 한다는 내용이었습니다만……"
10104-280 = "……그때 선생님은\n키보토스에 계시지 않았는데. \n왠지 신기하네요."
10104-290 = "네, 네!? 제 생일……?\n기, 기억해 주셨나요……?"
10104-300 = "그…… 기억해 주셨으면\n좋겠다, 고는 생각했습니다만……"
10104-310 = "……감사합니다, 선생님.\n저는 행운아네요……"
10104-320 = "새해 복 많이 받으세요,\n선생님. 현무상회에서\n새해 음식을 가지고 왔습니다."
10104-330 = "저도 만드는 걸 도왔거든요.\n후후…… 어떤 건지 알 거 같으세요?"
10104-340 = "크리스마스에 대해서라면\n숙지하고 있습니다.\n얼마 전에, 공부를 했거든요."
10104-350 = "……그럼, 무상의 선물을 나눠\n주며 물가를 어지럽히고 있는,"
10104-360 = "산타클로스라는 경제범을\n물리치고 오겠습니다!"
10104-370 = "오늘이 무슨 날인지\n파악하고 있습니다."
10104-380 = "상회인이라면, 폭넓은 지식을\n몸에 익혀야 하기 때문이죠."
10104-390 = "할로윈……\n즉 호박 대목이죠, 그렇죠?"
10104-410 = "아, 와 주셨군요."
10104-420 = "조금만 있으면 아침\n수련 과정이 끝나니,\n잠시 기다려 주시겠습니까?"
10104-430 = "사실 이것도, 연속된\n동작의 일부입니다."
10104-440 = "흐름을 멈추고,\n자세를 유지하는 것도."
10104-450 = "정신을 단련하는 데에 도움이\n되지 않을까, 해서요……"
10104-460 = "……그런데, 선생님은 왜\n거기에 계시는 건가요……?"
10104-470 = "네? 수행 중이라면――"
10104-480 = "주위의 시선에 동요하지 말고,\n평정심을 유지해야 한다……?"
10104-490 = "그건, 분명히 그렇습니다만……"
10104-500 = "……윽, 여, 역시 이건,\n무리입니다…!"
10104-2600 = "대부분은 총과 화약으로\n해결할 수 있다, 라고 하지만……\n제 등을 밀어주신 선생님을 위해서라도!\n총과 주먹의 조화를……언젠가 이뤄내겠습니다!"

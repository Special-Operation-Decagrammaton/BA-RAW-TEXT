[translation]
10104-10 = "Blue Archive... สินะคะ"
10104-20 = "ผู้จัดการและผู้คุ้มกันของสำนักงานใหญ่ ย่านการค้าเทพเต่าดำ\nโรงเรียนมัธยมซานไห่จิง คายามะ เรย์โจว์ค่ะ\nขอฝากตัวด้วยนะคะ คุณครู"
10104-30 = "การจัดการ\nโลจิสติกส์ของที่นี่\nเป็นยังไงบ้างนะคะ..."
10104-40 = "ได้เรียนรู้ความแตกต่าง\nของที่นี่กับย่านการค้า\nเทพเต่าดำเลยนะคะ"
10104-50 = "ลองสำรวจตลาดดูดีมั้ยนะ"
10104-60 = "(ถ้าจะบุกเบิกการตลาด\nของย่านการค้า\nเทพเต่าดำที่นี่ละก็...)"
10104-70 = "มีที่ตรงไหน\nที่พอจะยืดเนื้อยืดตัว\nได้บ้างมั้ยนะ..."
10104-80 = "ถ้ามีเรื่องที่อยากขอร้อง\nก็บอกฉันได้ทุกอย่างเลยค่ะ\nอืม... ยกเว้นเรื่องยากๆ นะคะ\nรบกวนด้วยค่ะ"
10104-90 = "กำลังรออยู่เลยค่ะคุณครู\nเปล่านะคะ ไม่ต้องกังวลค่ะ\nฉันไม่ได้มารอนานขนาดนั้นหรอกค่ะ\nน่าจะนะคะ..."
10104-100 = "ฉันคุ้นเคยกับเรื่อง\nการจัดการการค้าขายดีค่ะ\nเรื่องการคุ้มกันหรือเฝ้ายามก็ทำได้ดีค่ะ"
10104-110 = "เรื่องที่ฉันมั่นใจที่สุด\nน่ะเหรอคะ...?\nต้องเป็นกังฟูอยู่แล้วค่ะ!"
10104-120 = "รู้สึกอยากขยับร่างกาย\nขึ้นมานิดหน่อยนะคะเนี่ย\nจากนี้ไปฉันจะไปฝึกกังฟู..."
10104-130 = "ชวนเดินเล่นเหรอคะ...?\nแต่ว่าแค่การเดินเล่นมัน..."
10104-140 = "ไม่ค่ะ ค่ะ! ฉันจะไปด้วยค่ะ!\nถ้าได้ไปกับคุณครูละก็นะ!"
10104-150 = "ที่จริงฉันไม่ค่อยถนัด\nเรื่องการยิงปืนค่ะ"
10104-160 = "มีคนบอกว่าให้ฉัน\nสู้ด้วยหมัดจะดีกว่าด้วยค่ะ..."
10104-170 = "แต่ยังไงฉันก็\nฝึกฝนอย่างเต็มที่อยู่นะคะ...!"
10104-180 = "ฉันคิดว่าฉันยิงได้\nเหมือนกับคนอื่นๆ แล้วค่ะ..."
10104-190 = "จะโดดเรียนบ้างก็ได้\nงั้นเหรอคะ?"
10104-200 = "ไม่ได้นะคะ คุณครู!\nเรามีเวลาจำกัดนะคะ!\nเวลาของเราลดลงอยู่ทุกเมื่อค่ะ!"
10104-210 = "เราต้องพักผ่อนบ้าง อย่างน้อยก็\nเพื่อใช้เวลาอย่างมีประสิทธิภาพ...?"
10104-220 = "พอมาคิดดูแล้ว\nมันก็จริงนะคะ..."
10104-230 = "เวลาของสองเรา...\nแถมยังเป็นเวลาที่\nได้อยู่กับคุณครูอีก...\nรู้สึกแปลกจังเลยค่ะ"
10104-240 = "คือว่า... ขออยู่ข้างๆ คุณครู...\nจะได้มั้ยคะ...?"
10104-250 = "สุขสันต์วันเกิดค่ะ คุณครู!"
10104-260 = "ที่จริงเมื่อเช้านี้\nฉันฝันอะไรค่อนข้างแปลกค่ะ"
10104-270 = "ในฝันฉันได้คุ้มกัน\nวินาทีที่คุณครูเกิดค่ะ..."
10104-280 = "ตอนนั้นคุณครู...\nยังไม่ได้มาคิโวทอสด้วยซ้ำ\nน่าประหลาดใจจังเลยนะคะ"
10104-290 = "ค่ะ คะ!? วันเกิดฉันเหรอคะ...?\nจะ... จำได้ด้วยเหรอคะ...?"
10104-300 = "เรื่องนั้น... ฉันก็คิดว่า...\nอยากให้คุณครูจำได้ค่ะ..."
10104-310 = "ขอบคุณนะคะคุณครู...\nฉันเป็นเด็กที่โชคดีจังเลยนะคะ..."
10104-320 = "สวัสดีปีใหม่นะคะ\nคุณครู ฉันเอาอาหารปีใหม่\nจากย่านการค้าเทพเต่าดำมาให้ค่ะ"
10104-330 = "ฉันก็ช่วยทำด้วยนะคะ\nฮุฮุ... พอจะรู้ว่าเป็นอันไหนเหรอคะ?"
10104-340 = "ถ้าเป็นเรื่องเกี่ยวกับคริสต์มาส\nฉันรู้เป็นอย่างดีเลยค่ะ\nฉันเพิ่งเรียนมาน่ะค่ะ"
10104-350 = "ถ้างั้นฉันขอไปจัดการ\nซานตาคลอสตัวร้าย"
10104-360 = "ที่แจกของขวัญฟรี แล้วทำให้\nราคาสินค้าผันผวนก่อนนะคะ!"
10104-370 = "ฉันรู้ค่ะว่าวันนี้\nคือวันอะไร"
10104-380 = "ถ้าเป็นคนค้าขายแล้วละก็\nต้องมีความรู้กว้างขวางค่ะ"
10104-390 = "ฮาโลวีน...\nคือช่วงที่ฟักทองขายดีใช่มั้ยคะ?"
10104-410 = "อ๊ะ มาแล้วเหรอคะ?"
10104-420 = "อีกนิดเดียวก็จะเสร็จ\nการฝึกช่วงเช้าแล้วละ\nช่วยรอสักครู่ได้มั้ยคะ?"
10104-430 = "ที่จริงนี่ก็เป็นส่วนหนึ่งของ\nการเคลื่อนไหวที่ต่อเนื่องกันค่ะ"
10104-440 = "ฉันคิดว่าการหยุดการเคลื่อนไหว\nและคงท่าทางไว้"
10104-450 = "อาจจะเป็นประโยชน์ต่อการ\nฝึกฝนจิตใจก็ได้ค่ะ..."
10104-460 = "ว่าแต่ คุณครู...\nทำไมถึงไปอยู่ตรงนั้นล่ะคะ...?"
10104-470 = "คะ? ถ้าอยู่ระหว่างฝึกฝน..."
10104-480 = "ก็ต้องไม่หวั่นไหวต่อสายตาโดยรอบ\nและต้องคงความสุขุมไว้เหรอคะ...?"
10104-490 = "นั่นมันก็จริงอยู่หรอกค่ะ..."
10104-500 = "อึก... บะ... แบบนี้มัน\nเกินกำลังจริงๆ ด้วยค่ะ...!"
10104-2600 = "คนมักพูดกันว่าใช้ปืนกับกระสุน\nแก้ปัญหาได้... แต่ถ้าเพื่อคุณครู\nที่คอยสนับสนุนฉันอยู่ละก็!\nฉันจะผสานการใช้ปืนกับหมัด...\nให้ได้ในสักวันหนึ่งค่ะ!"

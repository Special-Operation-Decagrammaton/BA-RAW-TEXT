[translation]
10007-20 = "หวัดดีคุณครู! ไปทำกราฟิตี้กำแพงด้วยกันมั้ย?"
10007-30 = "ถ้ามีชื่อของฉันบนกำแพงนี้\nต้องเจ๋งมากแน่ๆ!"
10007-40 = "ต้องทำยังไงนะ\nถึงจะสื่ออารมณ์มุ้งมิ้ง\nผ่านสเปรย์ได้"
10007-50 = "อย่างนั้นแหละ!\nต้องระวังให้ดีๆ\nอย่าให้สีเลอะ!"
10007-60 = "เพิ่มสีแดงเข้าไปตรงนี้อีก\nหน่อยดีมั้ย?"
10007-70 = "สีออกมาสวยมากเลย..."
10007-80 = "ยินดีต้อนรับนะคุณครู \nแฟชั่นวันนี้น่าประทับใจจังเลย"
10007-90 = "นี่มันสายแล้วนะคุณครู!\nถ้าปล่อยให้รออีกหน่อยล่ะก็..."
10007-100 = "ฉันระเบิดมือถือของคุณครูแน่"
10007-110 = "มีอะไรเปื้อนหน้าฉันเหรอ?"
10007-120 = "หืม? สีเหรอ?"
10007-130 = "ลายกราฟิตี้นี้สวยใช่มั้ยล่ะ?\nฉันออกแบบเองเลยนะ!"
10007-140 = "การแฮ็กคงไม่มีความหมายอะไร"
10007-150 = "ถ้าเราเจาะระบบความปลอดภัยได้\nแต่ไม่ทิ้งร่องรอยอะไรไว้เลย หึหึ"
10007-160 = "TANGO DOWN!"
10007-170 = "ถ้าผนังของอาคารส่วนกลาง"
10007-180 = "ของคิโวทอสเป็นกราฟิตี้ทั้งหมด\nมันต้องสวยมากแน่ๆ"
10007-190 = "คุณครู! สุขสันต์วันเกิด!"
10007-200 = "หืม?\nฉันรู้วันเกิดได้ยังไงน่ะเหรอ?"
10007-210 = "เอ๊ะ? หรือว่าข้อมูลยังไม่ถูกเปิดเผย?"
10007-220 = "อยากได้อะไรเป็นของขวัญ\nวันเกิดงั้นเหรอ? อืม..."
10007-230 = "ขอฉันทาสี\nเสื้อผ้าของคุณครู\nเป็นสีที่ฉันชอบได้มั้ย?"
10007-240 = "คุณครู! แฮปปี้นิวเยียร์!"
10007-250 = "ปีนี้ก็มาเติมสีสัน\nให้กำแพงมีชีวิตชีวากันเถอะ!"
10007-260 = "ทั่วทุกพื้นที่\nส่องสว่างไปหมดเลย..."
10007-270 = "เราเอาความสวยงามนี้\nไปไว้บนกำแพงด้วยได้มั้ยนะ?"
10007-280 = "ฉันเตรียมชุดคอสตูมฮาโลวีน\nไว้ตั้งแต่เดือนที่แล้วเลยล่ะ"
10007-290 = "ฮุฮุ ตั้งตารอได้เลย!"
10007-310 = "เอาล่ะ คุณครูคิดว่าแบบนี้ดีมั้ย?\nคุณครูคิดว่ายังไงบ้าง?"
10007-320 = "ชิ... ทำไมถึง\nทำหน้าแบบนั้นล่ะ?"
10007-330 = "ลองสวมจิตวิญญาณศิลปิน\nแล้วลองประเมินดูหน่อยสิ!"
10007-340 = "คุณครูวาดอะไรเหรอ?\nอืม..."
10007-350 = "ฮ่าๆๆ! อะไรกันเนี่ย\nน่าขำสุดๆ ไปเลย!"
10007-360 = "สูงขนาดนี้ไม่กลัวเลยงั้นเหรอ?\nไม่เป็นไรหรอก\nเพราะมีคุณครูอยู่ด้วยนี่นา"
10007-370 = "ถ้าต้องการอะไรก็เรียกฉันได้เลยนะ\nทั้งกำแพงแล้วก็คุณครู...\nฉันจะวาดให้สุดฝีมือเลยละ!"
10007-2600 = "ฉันจะใช้ปืนนี้\nแต่งแต้มโลกให้มีสีสันขึ้นอีก!"

[translation]
10007-20 = "안녕, 선생님! 같이 벽에 낙서하러 가지 않을래~?"
10007-30 = "이 벽에 내 그림을 걸면\n더 멋질 것 같은데!"
10007-40 = "이 푹신푹신한 느낌을\n스프레이로 표현하려면\n어떻게 해야할까?"
10007-50 = "아차차.\n페인트가 묻지 않게\n조심, 또 조심."
10007-60 = "여기에 빨간색을 더하면 어떨까?"
10007-70 = "…아주 멋진 색감이야…"
10007-80 = "어서 와, 선생님.\n오늘의 패션도 인상적인 걸?"
10007-90 = "늦었잖아, 선생님!\n조금만 더 기다리게 했으면…"
10007-100 = "선생님의 핸드폰,\n펑! 터트리려 했다구."
10007-110 = "내 얼굴에 뭐라도 묻었어?"
10007-120 = "…응? 페인트?"
10007-130 = "이 그래피티 디자인 멋지지?\n내가 직접 그린 거야!"
10007-140 = "기껏 방화벽을 뚫어놓고선"
10007-150 = "발자국 하나도 남기지 못한다면\n해킹을 하는 보람이 없지. 흐흐."
10007-160 = "TANGO DOWN!"
10007-170 = "키보토스 중앙의 생텀 타워를"
10007-180 = "모두 그래피티로 채울 수 있다면,\n얼마나 멋질까…?"
10007-190 = "선생님, 생일 축하해!"
10007-200 = "응?\n생일은 어떻게 알았냐고?"
10007-210 = "아차, 아직 공개된 정보가 아니었던가?"
10007-220 = "생일 선물로 뭘 받고 싶냐고?\n음…"
10007-230 = "선생님의 옷,\n내가 원하는 색으로\n칠해봐도 괜찮아?"
10007-240 = "해피 뉴 이어, 선생님!"
10007-250 = "올해도 반짝반짝한 걸\n잔뜩 그려보자!"
10007-260 = "온 사방에 예쁜\n일루미네이션이 가득해…"
10007-270 = "이걸 회벽 위에\n옮겨 담을 수는 없을까?"
10007-280 = "이번 할로윈을 위해\n저번 달부터 코스튬을 준비했어."
10007-290 = "후후, 기대하라구!"
10007-310 = "자, 이만하면 괜찮지 않을까?\n선생님이 보기엔 어때?"
10007-320 = "치잇… 왜 그렇게 반응이\n미적지근한 거야?"
10007-330 = "좀 더 예술혼을 불태워서\n평가해 보라고!"
10007-340 = "선생님은 뭘 그린 거야?\n으음…"
10007-350 = "푸하하! 이게 뭐야,\n완전 웃겨!"
10007-360 = "높아서 무섭지 않냐고?\n괜찮아, 선생님이 옆에 있으니까."
10007-370 = "필요하다면 언제든 나를 불러줘.\n벽도, 선생님도,\n멋지게 칠해줄 테니까!"
10007-2600 = "이 총으로 세상을\n알록달록 물들이는 거야!"

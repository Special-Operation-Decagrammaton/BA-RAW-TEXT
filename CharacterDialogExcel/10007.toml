[translation]
10007-20 = "Hey, Sensei! Wanna tag this wall with me?"
10007-30 = "I think this wall would look really nice with my art on it."
10007-40 = "How can I express fluffiness through spray paint?"
10007-50 = "Oops! I'd better not get paint on my clothes."
10007-60 = "How about adding more red here?"
10007-70 = "What a great color..."
10007-80 = "Welcome, Sensei. You're looking sharp today!"
10007-90 = "You're late, Sensei! If you had made me wait just a little longer..."
10007-100 = "...I would have made your phone explode. Boom! Just like that."
10007-110 = "Is there something on my face?"
10007-120 = "...Huh? Paint?"
10007-130 = "Isn't this design cool? I did it myself!"
10007-140 = "What would be the point?"
10007-150 = "Every hacker needs to leave behind a calling card. Heh heh..."
10007-160 = "TANGO DOWN!"
10007-170 = "I have a cool idea."
10007-180 = "Sanctum Tower is at the heart of Kivotos, so what if we tagged it with graffiti?"
10007-190 = "Happy birthday, Sensei!"
10007-200 = "Huh? How did I know it was your birthday?"
10007-210 = "Wait, have you not shared that publicly anywhere?"
10007-220 = "What do I want for my birthday? Hmm..."
10007-230 = "Are you okay with me painting your clothes in whatever color I want?"
10007-240 = "Happy New Year, Sensei!"
10007-250 = "Let's paint lots of sparkly things this year too!"
10007-260 = "There are lights all everywhere... It's so pretty."
10007-270 = "I wish I could capture them with a painting!"
10007-280 = "I've been working on a Halloween costume for over a month."
10007-290 = "Heehee. You're going to love it!"
10007-310 = "So, is this good enough? What do you think, Sensei?"
10007-320 = "Hmph... At least try to look impressed."
10007-330 = "I need you to give me feedback like a professional art critic!"
10007-340 = "So what did you paint, Sensei? Uh..."
10007-350 = "Hahaha! What is that supposed to be? It looks so silly!"
10007-360 = "Aren't I scared of heights? Not when I have you by my side."
10007-370 = "And I'll be by yours whenever you need me. The wall, Sensei. I'll paint anything if it's for you!"
10007-2600 = "I'm going to color the world with this gun!"

[translation]
10067-10 = "블루 아카이브."
10067-20 = "안녕하십니까, 선생님. 토키입니다.\n잠입용 의상에 몸을 감싼 에이전트의 진수,\n보여드리겠습니다."
10067-30 = "평온한 티타임…….\n꽤 신선한 경험이에요."
10067-40 = "여기는, 마음을\n풍요롭게 해주네요."
10067-50 = "충분한 시간과\n예산이 있다면...\n저도 이런 공간을\n만들고 싶습니다."
10067-60 = "에이전트로서, 방심은\n금물입니다만…… 여기에\n오게 되면, 그만 마음이\n풀려버리는군요."
10067-70 = "올 때마다\n여러 가지 생각이\n드는 곳입니다.\n좋은 쪽으로요."
10067-80 = "안녕하십니까, 선생님."
10067-90 = "오늘 당번은 바니인 저입니다."
10067-100 = "잘 부탁드립니다. 뿅뿅."
10067-110 = "돌아오셨습니까. 선생님.\n기다리고 있었습니다."
10067-120 = "중요하니까\n한 번 더 말씀드리겠습니다."
10067-130 = "기다리고 있었습니다. 뿅뿅."
10067-140 = "저는 토끼이지\n강아지는 아닙니다만……"
10067-150 = "이렇게까지\n기다려라고 하시면……"
10067-160 = "장난 쳐 버릴 겁니다?"
10067-170 = "부르셨습니까?\n그럼, 무엇을 할까요?"
10067-180 = "호위요? 전투? 파괴? 공작?\n아니면 정의의 편?"
10067-190 = "네?……\n불러 본 것뿐이라구요……?"
10067-200 = "샬레의 업무는 신기하네요."
10067-210 = "바쁜 것 같으면서도,\n바쁘지 않은 것 같은……."
10067-220 = "딱히, 적극적으로 일하고\n싶은 것은 아닙니다."
10067-230 = "저 역시 땡땡이 치고 싶은\n마음도 있어요."
10067-240 = "그렇지만…… 저기,\n선생님께 힘이 되고 싶습니다."
10067-250 = "선생님, 도와주세요.\n사건이 일어났어요."
10067-260 = "제가 한가하다는 대사건입니다."
10067-270 = "생일 축하드립니다, 선생님."
10067-280 = "네? 당연히 기억하고 있습니다."
10067-290 = "뛰어난 기억력은\n최고의 에이전트의\n조건이기도 하니까요."
10067-300 = "그러면, 지금부터 축하하러\n나가도록 하죠."
10067-310 = "생일……\n기억해 주셔서 감사합니다."
10067-320 = "하지만\n지금의 저는 에이전트입니다."
10067-330 = "축하 또한 은밀하게,\n단둘이 있는 장소에서 부탁드립니다."
10067-340 = "새해가 되었군요.\n시간이 참 빠르다는 생각이 듭니다."
10067-350 = "목표는 세우셨습니까?"
10067-360 = "3일 만에 끝나지 않도록\n도와드리겠습니다."
10067-370 = "크리스마스로군요. "
10067-380 = "아뇨, 괜찮습니다."
10067-390 = "별로 춥다거나\n하지는 않습니다. 에칫!"
10067-400 = "……못 본 걸로 해 주십시오. 훌쩍."
10067-410 = "할로윈이네요."
10067-420 = "거리에 저처럼 가장을 한\n사람을 흔히 볼 수 있는 날입니다."
10067-430 = "……모두\n에이전트 지망생인 걸까요?"
10067-450 = "음…… 선생님……?"
10067-460 = "왜 그러시죠……?\n그런, 이상한 얼굴을 하시고……?"
10067-470 = "실례가 되지 않는다면,\n더 자도 되겠습니까……?"
10067-480 = "네? 일단 일어나라구요?"
10067-490 = "……싫습니다.\n저는 더 자고 싶습니다."
10067-500 = "게다가 이 침대…… \n따뜻하고, 푹신푹신하고,\n마음에 든단 말이에요."
10067-510 = "선생님께서 뭐라고 하시든,\n저는 잘 겁니다……"
10067-520 = "우웅…… 졸려요……"
10067-2600 = "때로는 솔직하게,\n있는 그대로의 마음을 전하는 것도\n중요하다고 들었습니다.\n감사합니다, 선생님.\n진심으로 감사드립니다."

[translation]
10067-10 = "蔚藍檔案。"
10067-20 = "您好，老師。我是季。\n包覆在潛入用服裝底下，身為特務的精隨，\n就讓您見識見識吧。"
10067-30 = "平靜的午茶時間……\n真是新鮮的經驗呢。"
10067-40 = "這裡會讓心靈\n變得富足呢。"
10067-50 = "如果有足夠的\n時間和預算……\n我也想製作\n這樣的空間。"
10067-60 = "身為特務之人，\n鬆懈是大忌……但只要\n來到這裡，心情就會\n不自覺地放鬆下來呢。"
10067-70 = "是個每次造訪都會\n思考很多事情的地方。\n是正面的意思。"
10067-80 = "您好，老師。"
10067-90 = "今天的值日生\n是兔女郎的我。"
10067-100 = "還請多多指教。蹦蹦。"
10067-110 = "歡迎回來，老師。\n恭候多時了。"
10067-120 = "因為很重要，\n所以再說一次。"
10067-130 = "恭候多時了。蹦蹦。"
10067-140 = "我是兔子，\n而不是狗狗……"
10067-150 = "要我一直等的話……"
10067-160 = "我就要搗蛋了唷？"
10067-170 = "您找我嗎？那麼，\n我該為您做什麼呢？"
10067-180 = "是護衛嗎？戰鬥？破壞？\n工作？還是正義的夥伴？"
10067-190 = "嗯……？\n只是叫一下而已……？"
10067-200 = "夏萊的工作還真神奇呢。"
10067-210 = "好像很忙，\n又好像不忙……"
10067-220 = "我並沒有特別\n想積極地工作。"
10067-230 = "就算是我也會\n有想摸魚的心情。"
10067-240 = "但是……那個，\n我想要成為老師的助力。"
10067-250 = "老師，請幫幫我。\n發生事件了。"
10067-260 = "是「我很閒」的大事件。"
10067-270 = "祝您生日快樂，老師。"
10067-280 = "嗯？沒錯，\n我當然記得。"
10067-290 = "出色的記憶力\n也是最棒的\n特務的條件。"
10067-300 = "那麼，現在就出去慶祝吧。"
10067-310 = "生日……\n謝謝您能記得。"
10067-320 = "不過，\n現在的我是特務。"
10067-330 = "慶祝也請祕密地，\n在只有我們兩人\n的地方進行。"
10067-340 = "新年到了呢。\n真是光陰似箭。"
10067-350 = "新年的目標決定好了嗎？"
10067-360 = "為了不讓您半途而廢，\n就讓我來協助您吧。"
10067-370 = "聖誕節到了呢。"
10067-380 = "嗯？不會，沒問題的。"
10067-390 = "我並不會覺得冷。哈啾！"
10067-400 = "……請當作沒看到。嗚嗚。"
10067-410 = "萬聖節到了呢。"
10067-420 = "是能在街上看到很多\n和我一樣變裝過的人的日子。"
10067-430 = "……大家都\n想要當特務嗎？"
10067-450 = "嗯……老師……？"
10067-460 = "您怎麼了……？\n露出那種奇怪的表情……？"
10067-470 = "方便的話，\n我可以再睡一下嗎……？"
10067-480 = "嗯嗯……？\n總之先起來……？"
10067-490 = "……不要。\n我還想睡。"
10067-500 = "而且這張床……\n既溫暖，又柔軟，\n我很喜歡。"
10067-510 = "不管老師說什麼，\n我都要睡覺……"
10067-520 = "唔唔……好睏……"
10067-2600 = "我聽說，\n有時候直接傳達真實的心意\n也很重要。\n謝謝您，老師。\n我打從心底，感謝著您。"

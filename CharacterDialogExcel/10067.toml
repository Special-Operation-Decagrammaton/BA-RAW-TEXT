[translation]
10067-10 = "Blue Archive."
10067-20 = "Hello, Sensei. It's me, Toki. Prepare to see the true power of an undercover agent."
10067-30 = "A peaceful tea time... It certainly is relaxing."
10067-40 = "This place truly improves one's quality of life."
10067-50 = "If I had time and a budget... I too would like to create a place like this."
10067-60 = "As an agent, it is forbidden to let one's guard down. But here...it is difficult to avoid."
10067-70 = "I find I am reminded of many things when I visit. I don't necessarily mind it, though."
10067-80 = "Hello, Sensei."
10067-90 = "Today, I am on the shift as a bunny."
10067-100 = "I look forward to working with you. Boing, boing."
10067-110 = "Welcome back, Sensei. I've been waiting."
10067-120 = "Let me repeat that, so you understand that it's important."
10067-130 = "I've been waiting. Boing, boing."
10067-140 = "I am a rabbit, and not a puppy..."
10067-150 = "But if you make me to wait like this..."
10067-160 = "I might make a mess."
10067-170 = "What was it you called me for?"
10067-180 = "Is there an operation? Is it security? Combat? Destruction? Justice?"
10067-190 = "Huh? There wasn't a reason you called?"
10067-200 = "Schale duty is certainly interesting."
10067-210 = "You seem busy, and yet you're not working..."
10067-220 = "It's not that I'm always eager for work."
10067-230 = "I, too, enjoy killing time."
10067-240 = "However... I'd like to be someone you can rely on, Sensei."
10067-250 = "Sensei, please help. There's been an incident."
10067-260 = "I've come down with a terrible case of boredom. It's extremely serious."
10067-270 = "Happy birthday, Sensei."
10067-280 = "Huh? Of course I remembered."
10067-290 = "An excellent memory is a basic prerequisite for becoming an extraordinary agent."
10067-300 = "Well, are you ready? We must celebrate."
10067-310 = "It is my birthday. Thank you for remembering."
10067-320 = "However, I am acting as an undercover agent right now."
10067-330 = "I'd also like to ask you to celebrate in an inconspicuous space, with just the two of us."
10067-340 = "It's already New Year's. Time certainly has flown..."
10067-350 = "Have you made any resolutions?"
10067-360 = "Tell me. I will ensure that you don't break them."
10067-370 = "It's Christmas."
10067-380 = "Oh, you don't need to worry about me."
10067-390 = "I'm not cold. ...Achoo!"
10067-400 = "You... You saw nothing. *sniff*"
10067-410 = "Today is Halloween."
10067-420 = "I have seen many people disguised like me today."
10067-430 = "Is it possible that they're all aspiring agents?"
10067-450 = "Hmm? Sensei...?"
10067-460 = "What's wrong? Why are you making that face?"
10067-470 = "If everything's fine, I'm going to sleep a bit longer..."
10067-480 = "Eh? You're still trying to get me to wake up?"
10067-490 = "...No thank you. I'm going back to sleep..."
10067-500 = "Besides, this bed is so warm and soft... I like it..."
10067-510 = "So... Say what you want, Sensei... I'm gonna...sleep..."
10067-520 = "So...sleepy..."
10067-2600 = "I have been told that sometimes it is not a weakness to tell someone your honest feelings. In that case...thank you, Sensei. From the bottom of my heart."

[translation]
10067-10 = "Blue Archive"
10067-20 = "สวัสดีค่ะคุณครู โทคินะคะ ฉันจะให้คุณครูได้เห็น\nแก่นแท้ของสายลับในชุดแฝงตัวค่ะ"
10067-30 = "เวลาน้ำชาอันน่าสงบ...\nเป็นประสบการณ์\nที่แปลกใหม่ดีนะคะ"
10067-40 = "ที่นี่ทำให้\nอิ่มเอมใจจังเลยค่ะ"
10067-50 = "ถ้ามีเวลาและงบประมาณ\nเพียงพอ... ฉันเองก็อยาก\nสร้างพื้นที่แบบนี้บ้างค่ะ"
10067-60 = "ในฐานะสายลับ\nฉันห้ามประมาทเด็ดขาด...\nแต่พอมาที่นี่ ใจมันก็\nผ่อนคลายไปหมดเลยค่ะ"
10067-70 = "ทุกครั้งที่มาที่นี่ฉันก็เกิด\nความคิดขึ้นมากมายเลยค่ะ\nคิดในเรื่องดีๆ น่ะค่ะ"
10067-80 = "สวัสดีค่ะคุณครู"
10067-90 = "บันนี่เกิร์ลที่ต้องเข้าเวรวันนี้คือฉันเองค่ะ"
10067-100 = "ฝากตัวด้วยนะคะ ดึ๋งๆ"
10067-110 = "กลับมาแล้วเหรอคะคุณครู?\nกำลังรออยู่เลยค่ะ"
10067-120 = "นี่คือเรื่องสำคัญ เพราะงั้น\nฉันจะบอกคุณครูอีกครั้งค่ะ"
10067-130 = "ฉันกำลังรออยู่เลยค่ะ ดึ๋งๆ"
10067-140 = "ฉันเป็นกระต่ายนะคะ\nไม่ใช่น้องหมาสักหน่อย..."
10067-150 = "ถ้าสั่งให้ฉันรอถึงขนาดนี้ละก็..."
10067-160 = "เดี๋ยวก็โดนฉันแกล้งเล่นหรอกนะคะ"
10067-170 = "เรียกฉันเหรอคะ?\nจะให้ฉันทำอะไรดีคะ?"
10067-180 = "คุ้มกัน? ต่อสู้? ทำลาย? วางแผน?\nหรือให้อยู่ฝั่งยุติธรรม?"
10067-190 = "คะ...?\nแค่ลองเรียกเฉยๆ งั้นเหรอคะ...?"
10067-200 = "งานของชาเล่ต์นี่น่าทึ่งดีนะคะ"
10067-210 = "เหมือนจะงานยุ่ง\nแต่ก็ไม่ยุ่งเท่าไร..."
10067-220 = "ฉันไม่ได้อยากทำงานอะไร\nเป็นพิเศษหรอกค่ะ"
10067-230 = "ฉันเองก็อยากโดดงาน\nเหมือนกันค่ะ"
10067-240 = "แต่ว่า... ฉันก็อยาก\nอยู่เป็นกำลังใจให้คุณครูค่ะ"
10067-250 = "คุณครูคะ ช่วยด้วยค่ะ\nเกิดเรื่องแล้วค่ะ"
10067-260 = "ฉันไม่มีอะไรทำเลยค่ะ\nนี่มันเรื่องใหญ่เลยค่ะ"
10067-270 = "สุขสันต์วันเกิดค่ะคุณครู"
10067-280 = "คะ? ฉันก็ต้องจำได้อยู่แล้วค่ะ"
10067-290 = "ความจำที่ยอดเยี่ยม\nถือเป็นปัจจัยของ\nสุดยอดสายลับด้วยนี่คะ"
10067-300 = "ถ้างั้นจากนี้ก็\nออกไปฉลองกันเถอะค่ะ"
10067-310 = "วันเกิดของฉัน...\nขอบคุณที่จำได้นะคะ"
10067-320 = "แต่ตอนนี้\nฉันกำลังปฏิบัติภารกิจสายลับอยู่ค่ะ"
10067-330 = "ช่วยแสดงความยินดีอย่างลับๆ\nในที่ที่เราอยู่แค่สองคนนะคะ"
10067-340 = "ปีใหม่มาเยือนแล้วค่ะ\nเวลามันผ่านไปเร็วจังเลยนะคะ"
10067-350 = "ตั้งเป้าหมายไว้หรือยังคะ?"
10067-360 = "ฉันจะช่วยเองค่ะ\nจะได้ไม่ล้มเลิกไปใน 3 วัน"
10067-370 = "คริสต์มาสแล้วสินะคะ"
10067-380 = "ไม่ค่ะ ไม่เป็นไรค่ะ"
10067-390 = "ฉันไม่ค่อยหนาว\nเท่าไรค่ะ ฮัดชิ้ว!"
10067-400 = "คือ... ช่วยแกล้งทำเป็นไม่เห็น\nด้วยนะคะ (ฟืด...)"
10067-410 = "ฮาโลวีนแล้วนะคะ"
10067-420 = "วันนี้เป็นวันที่ได้เห็นคนแต่งตัว\nเหมือนกับฉันอยู่ตามท้องถนนค่ะ"
10067-430 = "หรือทุกคนจะสมัครเป็นสายลับ\nกันคะ?"
10067-450 = "อืม... คุณครู...?"
10067-460 = "มีอะไรเหรอคะ...? ทำไมถึง...\nทำหน้าแปลกๆ แบบนั้นคะ...?"
10067-470 = "ถ้าไม่เป็นการเสียมารยาท\nฉันขอนอนต่ออีกหน่อยได้มั้ยคะ...?"
10067-480 = "คะ? ให้ฉันลุกขึ้นก่อนเหรอคะ?"
10067-490 = "ไม่เอาค่ะ ฉันอยากนอนต่อค่ะ"
10067-500 = "อีกอย่าง เตียงนี่ก็ทั้งอบอุ่น\nแล้วก็นุ่ม ถูกใจฉันมากเลยค่ะ"
10067-510 = "ไม่ว่าคุณครูจะว่ายังไง\nฉันก็จะนอนต่อค่ะ..."
10067-520 = "งืม... ง่วงจังเลยค่ะ..."
10067-2600 = "ได้ยินมาว่าบางครั้งการถ่ายทอด\nความรู้สึกอย่างตรงไปตรงมา\nคือเรื่องสำคัญค่ะ\nขอบคุณค่ะ คุณครู\nขอบคุณจากใจจริงเลยค่ะ"

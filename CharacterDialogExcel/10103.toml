[translation]
10103-10 = "蔚藍檔案！"
10103-20 = "身為赤冬聯邦學園的保安委員長，\n就讓你見識見識真正的英勇吧！"
10103-30 = "這是什麼啊？\n……還挺可愛的嘛。"
10103-40 = "……！剛，剛才\n腳邊有股冰冷\n的觸感……"
10103-50 = "得展現更具格調的\n模樣才行……"
10103-60 = "呼啊……\n一直待著不動，\n讓人有點煩躁……"
10103-70 = "（總是穿著這麼單薄\n　的衣服……別校的\n　學生都不介意嗎？）"
10103-80 = "我正在等你哦，老師。\n來，下達下次突擊點的指示吧。"
10103-90 = "唔嗯，呣喵……"
10103-100 = "……唔哇！老師！？\n你是什麼時候……！？"
10103-110 = "打，打瞌睡什麼的，\n我可沒做哦！"
10103-120 = "我聽山海經的學生說過。\n武功……只要經過鍛鍊，\n就可以瞬間移動到遠方……"
10103-130 = "這是真的嗎？"
10103-140 = "那麼，只要學會那個技能……\n就能實現更強力的突擊了吧！"
10103-150 = "玄武商會似乎\n有間絕品的料理店。"
10103-160 = "……老師，你願意陪我去嗎？"
10103-170 = "那個……我一個人的話，\n感覺可能會迷路……"
10103-180 = "山海經的熊，\n聽說是草食性的。"
10103-190 = "肯定有著溫馴的性格，\n毛的觸感也既舒服\n蓬鬆又柔軟吧……"
10103-200 = "真想摸一次看看啊……"
10103-210 = "（這套連衣裙之所以\n　開衩開得這麼高……\n　應該是設計考量吧……？）"
10103-220 = "（……還是說，其實是\n　縫紉被偷工減料了！？）"
10103-230 = "這裡的學生都穿著看起來\n很冷的衣服出外走動呢……\n感覺真奇妙。"
10103-240 = "畢竟在赤冬聯邦學園，\n大家身穿很多層衣服\n是理所當然的事……"
10103-250 = "……不過，再怎麼說\n也不會有在冰海穿\n薄衣服的學生吧！哈哈！"
10103-260 = "今天，莫非……\n是老師的生日嗎？"
10103-270 = "這裡畢竟不是赤冬……\n沒辦法給你\n新的補給品或勳章……"
10103-280 = "唔呣，那今天我就\n服從老師的命令吧。\n什麼都可以哦！\n盡情命令我吧，老師！"
10103-290 = "在異鄉迎接的生日……\n莫名有種寂寞的感覺呢……"
10103-300 = "……如果老師願意代替\n梅多貝奇的話，或許能\n稍微，緩解一下寂寞吧。"
10103-310 = "新年快樂，老師。\n期待你今年也帶來\n革命性的活躍表現哦。"
10103-320 = "居然把身穿紅色舞台\n服裝的京劇部員，\n誤會成聖誕老人……"
10103-330 = "我也真是的……\n居然興奮了起來……"
10103-340 = "聖誕禮物……\n本來還很期待的……"
10103-350 = "剛才，我被梅花園\n的孩子惡作劇了……"
10103-360 = "只因為沒帶糖果\n就被為所欲為……"
10103-370 = "所以我才不喜歡萬聖節啊！"
10103-390 = "這，這樣嗎？咦？\n腿再張開一點……\n手臂也是……？"
10103-400 = "唔，唔唔……果然\n這種事還是無法習慣……"
10103-410 = "那個……老師……\n現在的我，\n看起來怎麼樣……？"
10103-420 = "咦……！？有股跟平常\n不一樣的魅力，是嗎……？"
10103-430 = "笨，笨蛋！\n那種違心之論……！"
10103-440 = "……你，你是說真的……？"
10103-450 = "很期待相片……？"
10103-460 = "唔……！\n今天的老師……\n真是壞心眼啊……"
10103-2600 = "啊啊，我的巴拉萊卡……\n在突擊當中，沒有什麼是比\n有背帶的衝鋒槍更讓人有安全感的了。\n……不過，打扮成這樣的話，\n背帶會因為摩擦讓人有點痛就是了……"

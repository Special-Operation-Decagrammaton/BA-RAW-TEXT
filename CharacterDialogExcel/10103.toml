[translation]
10103-10 = "블루 아카이브!"
10103-20 = "붉은겨울 연방학원의 보안위원장으로서\n용맹이 무엇인지 보여주지!"
10103-30 = "…뭐냐, 이건.\n귀엽잖아?"
10103-40 = "바, 방금 다리 사이로\n무언가 서늘한 것이\n스치고 지나갔는데…"
10103-50 = "좀 더 기품 있는\n모습을 보이지\n않으면…"
10103-60 = "하암…\n가만히 있으려니\n좀이 쑤시네."
10103-70 = "(항상 이런 얇은 옷을…\n다른 학교의 학생들은\n아무렇지도 않은 건가?)"
10103-80 = "기다리고 있었다, 선생.\n자, 다음 돌격 방향을\n알려주겠나?"
10103-90 = "으음, 으으음…"
10103-100 = "우왓? 선생!?\n어느 틈에…?"
10103-110 = "조, 졸고 있었던 게\n절대 아니다!"
10103-120 = "산해경의 학생들에게 들었는데,\n무공이라는 걸 단련하면\n먼 거리도 한걸음에\n이동할 수 있다는데…"
10103-130 = "그게 정말인가?"
10103-140 = "그럼, 그 기술을 습득한다면…\n보다 강력한 돌격을 할 수 있겠군!"
10103-150 = "현무상회에 괜찮은\n요릿집이 있다고 하는데…"
10103-160 = "…선생, 동행해 주지 않겠나?"
10103-170 = "그… 혼자서 찾아가면\n길을 잃을 것 같아서…"
10103-180 = "산해경의 곰은\n초식이라고 들었는데."
10103-190 = "분명 순한 성격에, 촉감이\n좋은 푹신푹신한 털을\n갖고 있겠지…"
10103-200 = "한 번쯤 만져보고 싶다…"
10103-210 = "(이 치마가 이렇게\n파여있는 건…\n디자인이 맞겠지…?)"
10103-220 = "(…설마 재봉을 사보타주\n당한 건 아니겠지?!)"
10103-230 = "이곳의 학생들은 추워 보이는\n차림으로 돌아다니고 있는데…\n…뭔가 묘한 기분이로군."
10103-240 = "붉은겨울에서는\n옷을 겹쳐 입는 게\n당연했으니까."
10103-250 = "…뭐, 아무리 그래도\n빙해 위에서 얇은 옷을 입고\n다니는 학생은 없겠지. 하하!"
10103-260 = "오늘이 혹시…\n선생의 생일인 건가?"
10103-270 = "이곳은 붉은겨울이 아니니,\n새 보급품이나 훈장을\n줄 수는 없지만…"
10103-280 = "음. 그럼 오늘은 선생의\n명령을 따르도록 하지.\n무엇이든 좋다!\n원하는 대로 명령해 줘, 선생!"
10103-290 = "타지에서 맞이하는 생일은…\n조금 외롭게 느껴지는군."
10103-300 = "선생이 메드베지의\n대신이 되어 준다면,\n덜 외로울지도."
10103-310 = "새해 복 많이 받기를, 선생.\n올해도 혁명적인 활약을\n기대하고 있겠어"
10103-320 = "붉은 무대 의상을\n입은 경극부원을\n산타클로스로 착각해서…"
10103-330 = "나도 모르게\n조금 흥분하고 말았다…"
10103-340 = "크리스마스 선물…\n기대하고 있었는데…"
10103-350 = "아까, 매화원의 꼬마에게\n장난을 당했다."
10103-360 = "사탕이 없다는 이유로\n멋대로 장난을 치다니…"
10103-370 = "역시 할로윈은\n좋아할 수가 없어!"
10103-390 = "이, 이렇게? 어?\n다리를 조금 더 벌리고…\n팔도…?"
10103-400 = "으, 으…역시 이런 건\n익숙지 않군…"
10103-410 = "저기… 선생…\n지금의 나는, 어떻게\n나오고 있는 거지…?"
10103-420 = "헉…? 평소와는\n다른 매력이, 있어…?"
10103-430 = "바, 바보!\n마음에도 없는 말을…!"
10103-440 = "…진, 진심, 이라고…?"
10103-450 = "사진이 기대돼…?"
10103-460 = "읏…!\n오늘의 선생은…\n심술궂군…."
10103-2600 = "아아, 발랄라이카. 돌격 중에도\n안정적으로 견착을 하기 위해서는\n슬링이 달린 기관단총만 한 것이 없지.\n…다만 이 차림일 때는 어깨끈이\n살에 쓸려서 조금 아프단 말이지…"

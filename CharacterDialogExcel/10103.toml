[translation]
10103-10 = "Blue Archive!"
10103-20 = "As the security chairman of Red Winter Federal Academy, I'll show you the meaning of valor!"
10103-30 = "...What is this? How...cute."
10103-40 = "S-Something cold just brushed between my legs..."
10103-50 = "I need to display more elegance."
10103-60 = "*yawn* I'm sore from staying so still."
10103-70 = "(These clothes are so thin. Students at other schools are really okay with this?)"
10103-80 = "I've been waiting for you, Sensei. Tell me, in which direction should the next charge be?"
10103-90 = "Hmm..."
10103-100 = "Huh? Sensei!? When did you..."
10103-110 = "I-I wasn't falling asleep!"
10103-120 = "Some Shanhaijing students told me that if you train in a discipline called \"martial arts,\" you can travel long distances with a single step..."
10103-130 = "Is that true?"
10103-140 = "If you learned that technique...just think of the power it would add to a charge!"
10103-150 = "I've heard there's a decent restaurant in the Black Tortoise Promenade..."
10103-160 = "...Sensei, will you go with me?"
10103-170 = "I'd go alone, but I'm afraid that...I'd get lost."
10103-180 = "I've heard Shanhaijing bears are herbivores."
10103-190 = "So they must have gentle personalities, and nice, soft fur..."
10103-200 = "I'd like to touch one, just once..."
10103-210 = "(The deep slit in this skirt...is part of the design, right...?)"
10103-220 = "(...The seam wasn't sabotaged, was it?!)"
10103-230 = "So...students just walk around here in these freezing outfits? That seems a bit strange."
10103-240 = "At Red Winter, it's normal to wear many layers of clothes."
10103-250 = "...It's not like students would traipse about in these thin clothes on the Glacial Sea. Haha!"
10103-260 = "Is today...your birthday, Sensei?"
10103-270 = "Since we're not at Red Winter, I don't have supplies or new medals to give you...but..."
10103-280 = "Hm, instead, I'll follow your orders today. It can be anything! Command away, Sensei!"
10103-290 = "Spending a birthday away from home feels...a bit lonely."
10103-300 = "Maybe it'd be better if you took Medvezi's place, Sensei."
10103-310 = "Happy New Year, Sensei. I look forward to seeing your revolutionary acts this year!"
10103-320 = "I mistook a Peking Opera Club member in a red costume for Santa Claus..."
10103-330 = "I may be...just a bit too excited."
10103-340 = "I was looking forward to getting a Christmas gift..."
10103-350 = "Some kid from Plum Blossom Garden got the better of me earlier."
10103-360 = "I didn't have any candy, so I got pranked..."
10103-370 = "There's nothing at all to like about Halloween!"
10103-390 = "L-Like this? Huh? Put my legs further apart...? My arms, too...?"
10103-400 = "U-Ugh... I'm really not used to this..."
10103-410 = "Hey... Sensei... How do I look right now...?"
10103-420 = "*gasp*... I'm charming, in a different way than usual...?"
10103-430 = "D-Dummy! Don't say things you don't mean!"
10103-440 = "...Really? Y-You really do mean it?"
10103-450 = "You're looking forward to seeing the pictures...?"
10103-460 = "Gah...! You keep teasing me today... Sensei..."
10103-2600 = "Ah, Gray Balalaika. To maintain a stable mount even while charging, there's nothing like an SMG with a strap. But it does rub against the skin in this outfit, so it hurts a bit..."

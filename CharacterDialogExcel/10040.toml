[translation]
10040-10 = "蔚、蔚藍……檔、檔案……"
10040-20 = "您好……我是，大野月夜……\n姑且是，忍術研究部的部員……\n請多多，指教……"
10040-30 = "（我是樹……\n我只是棵樹……）"
10040-40 = "（我是背景……\n我是，一件家具……）"
10040-50 = "（乾脆，變得像\n那個家具一樣的話\n……好羨慕）"
10040-60 = "啊，\n非常抱歉……\n很礙事，對吧……？"
10040-70 = "總覺得，\n似乎受到了注目……"
10040-80 = "您好，老師……\n那個，我……"
10040-90 = "不，什麼都，\n沒有……"
10040-100 = "那個……我是值日，\n總覺得，對不起……"
10040-110 = "難道說……\n您有，叫我嗎……？"
10040-120 = "啊，不，\n並不是在逃避……"
10040-130 = "我，身材高大，\n不會，礙事嗎……？\n後面的景色，看得見嗎……？"
10040-140 = "那樣的話，\n我會蹲下的……"
10040-150 = "就算躲起來，\n這個身體的話也馬上就……"
10040-160 = "老師……\n是您的生日，沒錯吧？\n祝您，生日快樂……！"
10040-170 = "生日禮物……\n替身之術之類的，\n要看嗎？耶嘿嘿……"
10040-180 = "我的，生日……？\n咦，怎麼會……"
10040-190 = "耶嘿嘿……\n謝謝，您……！\n我很開心，真的……\n發自內心……！"
10040-200 = "祝您新年快樂，老師。"
10040-210 = "今天也拜託您，\n一起進行忍術的訓練……！"
10040-220 = "聖誕節……\n要我，變成聖誕樹嗎？"
10040-230 = "不，那個……\n老師，願意的話……\n希望可以裝飾在夏萊，開玩笑的……"
10040-240 = "萬聖節……\n要我，來扮，鬼嗎？"
10040-250 = "咦，是那樣嗎……？\n那麼，被丟豆子的，要由誰……"
10040-260 = "啊，不是那種日子，\n是嗎？是那樣啊……"
10040-280 = "嗚……\n想通過這裡，走近路，\n的說……"
10040-290 = "如老師所見，在中途，\n卡住了……"
10040-300 = "不過，正是這種時候……\n要靠忍術，想辦法……！？"
10040-310 = "嗯呃，\n嗯咕呣呣呣呣呣……！！"
10040-320 = "果然，還是沒辦法……"
10040-330 = "嗚，嗚……"
10040-340 = "老師……可以，\n幫我嗎……"
10040-2600 = "這麼厲害的東西，我，\n收下也可以……？我有那種，\n資格，嗎……？足夠了，是嗎？\n……謝謝您，老師。\n我會，繼續，精進的。為了，老師……！"

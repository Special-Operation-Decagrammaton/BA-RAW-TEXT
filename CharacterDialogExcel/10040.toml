[translation]
10040-10 = "브, 블루, 아, 아카이브으…"
10040-20 = "안녕하세요… 오노 츠쿠요, 입니다아……\n일단, 인법연구부의 부원으로……\n잘, 부탁드려요오……"
10040-30 = "(저는 나무…\n저는 평범한\n나무예요……)"
10040-40 = "(저는 배경……\n저는, 가구, 같은\n거니까요…)"
10040-50 = "(차라리, 저 가구\n처럼 될 수 있다면\n…… 부럽다아.)"
10040-60 = "아, 죄송합니다……\n방해, 되지요……?"
10040-70 = "왠지, 눈에 띄는 거\n같은 느낌이……"
10040-80 = "아, 안녕하세요오…\n선생님. 저, 저기… 제가."
10040-90 = "…아뇨, 아무것도,\n아니에요오……"
10040-100 = "아, 그, 그러니까…\n제가 당번이라, 왠지,\n죄송합니다아……"
10040-110 = "혹시……\n저를 부르셨나요?"
10040-120 = "아, 아뇨,\n도망치려는 게 아니라……"
10040-130 = "저, 커서, 방해되지,\n않나요……?\n뒤의 풍경, 보이시나요……?"
10040-140 = "그러하시다면,\n쭈그리고 앉아 있을\n테니까요…"
10040-150 = "숨어도,\n이런 몸이라면 금방…"
10040-160 = "선생님……\n생일, 이시지요?\n축하, 드려요……!"
10040-170 = "생일 선물로……\n변신의 술, 같은 거라도\n보여드릴까요…? 에헤헷…"
10040-180 = "제, 생일 축하, 말인가요?\n앗, 그런……"
10040-190 = "에헤헷… 감사, 합니다……!\n기뻐요, 정말…\n진심으로……!"
10040-200 = "새해 복,\n많이 받으세요. 선생님."
10040-210 = "올해도 함께,\n인법 훈련,\n잘 부탁드려요…!"
10040-220 = "크리스마스…\n저, 크리스마스 트리가,\n되어 볼까요?"
10040-230 = "아뇨, 그게…… 선생님께서,\n괜찮으시다면… 샬레에\n장식해주셨으면, 이랄까……"
10040-240 = "할로윈…… 저, 귀신\n분장이라도, 할까요…?"
10040-250 = "네? 그런가요……?\n그럼, 콩을 맞는 역은,\n누가……"
10040-260 = "아, 그런 날이 아닌, 가요?\n그랬군요……"
10040-280 = "우, 우으…\n이곳을 지나, 지름길로\n가려고, 했는데요오…"
10040-290 = "보다시피, 중간에,\n꽉 껴버리는 바람에…"
10040-300 = "하지만, 이럴 때야말로…\n인법으로, 어떻게든…?!"
10040-310 = "우으, 우으으으읏!!!"
10040-320 = "여, 역시 무리였어요오……"
10040-330 = "우으… 우……"
10040-340 = "선생님…… 도와주지,\n않으실래요……?"
10040-2600 = "이렇게 대단한 물건을, 제가, 받아도\n될까요……? 제게는 그런, 자격이,\n이, 있을까요……? 충분, 하다고요?\n……감사합니다. 선생님. 계속해서,\n정진, 하겠어요. 선생님을, 위해서……!"

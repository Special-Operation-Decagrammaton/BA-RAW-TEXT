[translation]
10040-10 = "Blue...Ar...Archive..."
10040-20 = "สวัสดีค่ะ... โอโนะ สึคุโยะค่ะ...\nนะ...ในฐานะสมาชิกชมรมวิจัยศาสตร์นินจา\nขะ...ขอฝากตัวด้วยนะคะ..."
10040-30 = "(ฉันคือต้นไม้...\nฉันคือต้นไม้ธรรมดาๆ ค่ะ...) "
10040-40 = "(เพราะฉันดูเหมือน...\nเฟอร์นิเจอร์ธรรมดาๆ ค่ะ)"
10040-50 = "(ถ้าฉันกลายเป็นเหมือน\nเฟอร์นิเจอร์ได้จริงๆ...\nน่าอิจฉาจัง...)"
10040-60 = "อ๊ะ ขอโทษด้วยค่ะ...\nฉันบังคุณครูใช่มั้ยคะ...?"
10040-70 = "ไม่รู้ว่าทำไมถึงรู้สึกเหมือน...\nมีใครจ้องมองอยู่..."
10040-80 = "สะ...สวัสดีค่ะ...\nคุณครู คะ...คือว่าฉัน..."
10040-90 = "ปะ...เปล่าค่ะ\nไม่มีอะไรค่ะ..."
10040-100 = "อ๊ะ คะ...คือเรื่องนั้น...\nฉะ...ฉันเป็นตัวแทนเข้าเวรวันนี้\nขะ... ขอโทษค่ะ"
10040-110 = "คือว่า... คุณครูเรียกฉันเหรอคะ?"
10040-120 = "ปะ...เปล่าค่ะ\nฉะ...ฉันไม่ได้จะหนีค่ะ..."
10040-130 = "คะ...คือฉันไม่ได้เกะกะใช่มั้ยคะ...?\nมองเห็นวิวที่ด้านหลังรึเปล่าคะ...? "
10040-140 = "ถ้าเกิดว่าฉันบัง...\nฉันจะนั่งยองๆ บนพื้นเองค่ะ"
10040-150 = "ถึงจะไปซ่อน...\nแต่ตัวโตแบบนี้คงซ่อนได้ยาก..."
10040-160 = "วันนี้... เป็นวันเกิดคุณครูใช่มั้ยคะ?\nสะ...สุขสันต์วันเกิดค่ะ...!"
10040-170 = "ขะ...ของขวัญวันเกิด...\nให้ฉันแสดงวิชาแปลงร่าง\nให้ดูดีมั้ยคะ...? แหะๆ..."
10040-180 = "วันเกิดฉันเหรอคะ?\nอ๊ะ คือเรื่องนั้น..."
10040-190 = "แหะๆ ขอบคุณค่ะ...!\nฉันดีใจมากจริงๆ ค่ะ...!"
10040-200 = "ขะ...ขอให้มีความสุข\nในวันปีใหม่นะคะ คุณครู"
10040-210 = "ปีนี้ก็ขอรบกวน\nเรื่องการฝึกวิชานินจา\nด้วยนะคะ...! "
10040-220 = "คริสต์มาส...\nฉันลองแปลงกาย...\nเป็นต้นคริสต์มาสดีมั้ยคะ?"
10040-230 = "ไม่ค่ะ คือว่า... ถ้าคุณครู...\nไม่ว่าอะไรละก็... จะนำฉัน\nไปตกแต่งที่ชาเล่ต์ก็ได้นะคะ..."
10040-240 = "ฮาโลวีน... ฉันแต่งตัว...\nเป็นผีดีมั้ยคะ...?"
10040-250 = "คะ...? งั้นเหรอคะ...?\nถ้างั้นจะมีใครมาแต่ง\nคู่กันมั้ยนะ..."
10040-260 = "อ๊ะ มันไม่ใช่วันแบบนั้นเหรอคะ?\nแบบนี้นี่เอง..."
10040-280 = "งะ...งืออ...\nฉะ...ฉันคิดจะผ่านทางนี้ไป\nเพราะคิดว่าทางนี้เป็นทางลัดค่ะ..."
10040-290 = "แต่ว่าอย่างที่คุณครูเห็น...\nตอนนี้ฉันติดอยู่ตรงกลางซะแล้วค่ะ..."
10040-300 = "แต่ว่าในเวลาแบบนี้...\nจะใช้วิชานินจายังไง... ก็ไม่หลุดเลยค่ะ...?!"
10040-310 = "ฮือออ... แงงงง...!!!"
10040-320 = "คะ...คิดแล้วเชียว\nไม่ไหวจริงๆ ด้วยค่ะ..."
10040-330 = "ฮือ... ฮือออ..."
10040-340 = "คะ... คุณครูคะ...\nชะ...ช่วยฉันหน่อย...\nได้รึเปล่าคะ...?"
10040-2600 = "ของล้ำค่าแบบนี้ ให้ฉันรับไว้ได้\nเหรอคะ...? ฉันสมควรที่จะได้รับ\nของแบบนี้ด้วยเหรอคะ...? ฉันมีสิทธิ์\nรับได้เหรอคะ? ขอบคุณค่ะ คุณครู\nฉันจะตั้งใจ...ฝึกฝนต่อไปค่ะ เพื่อคุณครู...!"

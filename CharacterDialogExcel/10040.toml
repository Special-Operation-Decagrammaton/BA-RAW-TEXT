[translation]
10040-10 = "B-Blue...A-Archive..."
10040-20 = "Hello, I'm Ono Tsukuyo... I'm a member of the Ninjutsu Research Club... Nice to meet you..."
10040-30 = "(I'm a tree...just an ordinary tree...)"
10040-40 = "(I'm a part of the background...like...a piece of furniture...)"
10040-50 = "(I wish I could turn into a piece of furniture like that...)"
10040-60 = "Oh, I'm sorry... Am I in your way?"
10040-70 = "I feel like I stand out for some reason..."
10040-80 = "H-Hello... Sensei, u-um... I..."
10040-90 = "Oh, never mind. It's nothing..."
10040-100 = "Oh, s-so... I'm on duty today. I'm sorry..."
10040-110 = "Did you...call me by any chance?"
10040-120 = "N-No. I'm not trying to run away..."
10040-130 = "Um, am I in your way? Can you see behind me...?"
10040-140 = "If you can't, I can crouch a little..."
10040-150 = "Even if I hide, I'm still so noticeable..."
10040-160 = "Sensei... It's your birthday, right? Happy birthday!"
10040-170 = "As your birthday gift...may I show you my disguise technique? Heehee..."
10040-180 = "A-Are you wishing me a happy birthday? Wow..."
10040-190 = "Heehee... Thank you...! This means so much to me!"
10040-200 = "Happy New Year, Sensei."
10040-210 = "I'll be counting on you for my ninjutsu training again this year!"
10040-220 = "Christmas... Should I disguise myself as a Christmas tree?"
10040-230 = "No, I mean... I was wondering...if you would use me as a decoration for Schale..."
10040-240 = "Halloween... Should I wear a wraith costume?"
10040-250 = "Huh? Really...? Then who'll play the role of demon for the exorcism?"
10040-260 = "Oh, Halloween isn't like that? I see..."
10040-280 = "U-Ugh... I was trying to go through here as a shortcut..."
10040-290 = "But as you can see, I got...completely stuck..."
10040-300 = "Don't worry! This is the perfect timing...to use ninjutsu!"
10040-310 = "Ugh... Ughhh!!!"
10040-320 = "I-It's not working.."
10040-330 = "Ughh... Ugh!"
10040-340 = "S-Sensei... C-Can you help me...? Please?"
10040-2600 = "Are you sure you want to give this to me? Do I deserve this? Y-Yes? Really? Thank you, Sensei. I'll do my best to make you proud!"

[translation]
10054-10 = "블루 아카이브!"
10054-20 = "건전한 정신을 기르기 위해\n건전한 육체를 기른다……\n그 길에 가호가 함께하기를."
10054-30 = "와…… 멋진\n곳이네요."
10054-40 = "도움이 필요하신\n분이… 계실까요?"
10054-50 = "조금 쉬어\n가도록 할까요?"
10054-60 = "평소보다 몸이\n가벼운 느낌이에요\n……"
10054-70 = "……후후."
10054-80 = "오셨군요, 선생님!"
10054-90 = "오늘도 멋진 하루가\n되시길 기원하겠습니다."
10054-100 = "어서 오세요, 선생님."
10054-110 = "시원한 물을 준비했어요."
10054-120 = "괜찮으시다면\n어떠신가요?"
10054-130 = "오늘은 시스터가 아니라,"
10054-140 = "한 사람의 선수로서\n이 일을 맡겠습니다."
10054-150 = "시스터의 복장이\n아니라서 그런지……"
10054-160 = "왠지 안절부절못하게 되네요."
10054-170 = "선생님……"
10054-180 = "그, 혹시 괜찮으시다면\n곁에 있어도 괜찮을까요?"
10054-190 = "선생님께 부디\n가호가 있기를……"
10054-200 = "기도는\n복장을 가리지 않는답니다?"
10054-210 = "평소보다\n여기저기 드러난 복장이라……"
10054-220 = "조금 부끄러운 것\n같기도 해요……"
10054-230 = "생신 축하드려요, 선생님!"
10054-240 = "뭔가 필요하신 거라도\n있으실까요?"
10054-250 = "새, 생일 축하요…?\n제 생일…이요?"
10054-260 = "와아……\n가, 감사합니다……!"
10054-270 = "새해 복 많이 받으세요,\n선생님!"
10054-280 = "올해도 같이\n운동하시는 건 어떨까요?"
10054-290 = "성스러운 밤이네요."
10054-300 = "괜찮으시다면\n함께 기도하지 않으시겠어요?"
10054-310 = "시끌벅적한 날이네요."
10054-320 = "어쩐지 저까지 즐거워져요."
10054-340 = "하아, 하아…\n죄송해요, 선생님…"
10054-350 = "이런 모습을… 하아…"
10054-360 = "보여드리려던 건 아니었는데…"
10054-370 = "죄송해요,\n우선… 진정을 좀, 하고…"
10054-380 = "하아… 후우…"
10054-390 = "네…!? 아, 그게,\n딱히 그런 의미는…!"
10054-400 = "마, 말씀만으로도\n정말 감사합니다…"
10054-410 = "네……"
10054-420 = "(선생님께서…\n저를 신경 써주시다니…)"
10054-430 = "(이런 일은,\n상상도 하지 못했어요…)"
10054-440 = "저……"
10054-450 = "이런 일, 말씀드려도\n괜찮을지 모르겠지만…"
10054-460 = "선생님을\n독차지하고 있는 것 같아서…"
10054-470 = "이러면 벌을 받을지도\n모르겠지만… 그치만…"
10054-480 = "저… 이 시간이,\n너무 행복… 해요…"
10054-2600 = "경기의 시작을 알리는 총성처럼,\n부디 이 작은 무기도\n평화를 위한 것이 되기를……"

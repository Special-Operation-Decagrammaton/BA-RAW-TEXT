[translation]
10054-10 = "蔚藍檔案！"
10054-20 = "孕育能夠育成\n健全精神的肉體……\n願您一路上與加護同在。"
10054-30 = "哇……\n真是個好地方呢。"
10054-40 = "需要幫助的人……\n在這裡嗎？"
10054-50 = "要不要稍微\n休息一下呢？"
10054-60 = "感覺身體\n比平常輕盈……"
10054-70 = "……呵呵。"
10054-80 = "歡迎回來，老師！"
10054-90 = "祈望今天\n也會是美好的一天。"
10054-100 = "歡迎回來，老師。"
10054-110 = "我準備了冰涼的水。"
10054-120 = "不介意的話\n要不要喝呢？"
10054-130 = "今天不是作為修女，"
10054-140 = "而是以一名選手的身分\n來進行這份工作。"
10054-150 = "是因為和平時\n的打扮不同嗎……"
10054-160 = "總覺得難以冷靜呢。"
10054-170 = "老師……"
10054-180 = "那個，如果您願意的話，\n可以待在我身邊嗎？"
10054-190 = "願老師與\n加護同在……"
10054-200 = "……祈禱與\n服裝無關唷？"
10054-210 = "因為是和平常相比，\n可以看到各種地方的服裝……"
10054-220 = "所以有點難為情……"
10054-230 = "生日快樂，老師。"
10054-240 = "有什麼想要的東西嗎？"
10054-250 = "生，生日的祝福，\n是嗎……？我的……？"
10054-260 = "哇……\n非常感謝……！"
10054-270 = "新年快樂，老師。"
10054-280 = "今年也……\n一起運動如何呢？"
10054-290 = "是神聖的夜晚呢。"
10054-300 = "您願意的話，\n要不要一起獻上祈禱呢？"
10054-310 = "真是熱鬧的日子呢。"
10054-320 = "總覺得好像\n連我都開心起來了。"
10054-340 = "哈啊，哈啊……\n對不起，老師……"
10054-350 = "這副模樣……哈啊……"
10054-360 = "本來沒有打算\n讓您看到的……"
10054-370 = "不好意思，請先讓我……\n喘口氣，再繼續……"
10054-380 = "哈啊……呼……"
10054-390 = "咦……！？\n啊，那個，\n我不是那個意思……！"
10054-400 = "您，您能這麼說，\n我就已經很感謝了……"
10054-410 = "呼……"
10054-420 = "（老師……\n　居然會關心我……)"
10054-430 = "（那種事，我從來\n　沒有想過……）"
10054-440 = "那個……"
10054-450 = "這種事，不知道\n該不該說……"
10054-460 = "我好像\n獨佔著老師一樣……"
10054-470 = "做這種事的話，或許\n會遭天譴也說不定……\n但是……"
10054-480 = "我……覺得現在，\n非常幸福……"
10054-2600 = "如同宣告比賽開始的槍聲一般，\n希望這把小小的武器也能\n成為守護和平之物……"

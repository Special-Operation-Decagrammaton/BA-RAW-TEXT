[translation]
20039-10 = "It's Blue Archive."
20039-20 = "I'm Ryuuge Kisaki, president of Shanhaijing Academy's Genryumon. Fufu. Is it in my power to assist you?"
20039-30 = "Hm... Is there anywhere to put a censer?"
20039-40 = "(Outside of Shanhaijing, it's very...diverse.)"
20039-50 = "This looks like a good place to have a cup of tea..."
20039-60 = "(What...could that be?)"
20039-70 = "I feel relaxed here."
20039-80 = "There you are, Sensei. Fufu. How audacious of you, to make even the president of Shanhaijing wait."
20039-90 = "I've been waiting this whole time, Sensei."
20039-100 = "People can't be led with brute force. You'll lose their hearts."
20039-110 = "You called on me, Sensei? Hm? You just wanted to talk?"
20039-120 = "Fufu. So you jest? It's all right. I'm like that now and then, too."
20039-130 = "I haven't left Shanhaijing in a while."
20039-140 = "Especially because you're here."
20039-150 = "Have you ever wished a moment would last forever, Sensei?"
20039-160 = "I have. I'm wishing that right now."
20039-170 = "I lit a censer. Doesn't it smell interesting?"
20039-180 = "Shall we enjoy a tea ceremony together?"
20039-190 = "If you're tired, we might try falling asleep together. What do you think?"
20039-200 = "Of course I remembered. I could never forget."
20039-210 = "Now, hurry up and get ready. I'll show you all the best that Shanhaijing has to offer."
20039-220 = "...I see. You remembered."
20039-230 = "Thank you, Sensei. Many people have offered me well-wishes, but..."
20039-240 = "Your birthday wish makes me happiest."
20039-250 = "Fufu. A happy New Year, indeed."
20039-260 = "Hm? So you think you should be giving this to me, instead, Sensei?"
20039-270 = "..."
20039-280 = "That's true!"
20039-290 = "Is it Christmas? So it is. Then I wish you a day of peace."
20039-300 = "Is it Halloween? I don't know much about the holiday, but..."
20039-310 = "Here, a dish made with pumpkin and jujubes. I thought it would be nice to share it with you."
20039-330 = "Fufu... You're finally looking directly at me."
20039-340 = "But, Sensei. Perhaps there's something to consider."
20039-350 = "Maybe I truly am vulnerable right now."
20039-360 = "...Or perhaps I am simply pretending?"
20039-370 = "Or am I testing how you would respond?"
20039-380 = "Maybe...I simply trust you deeply."
20039-390 = "But...there is one thing I can say with certainty."
20039-400 = "Even if something happens here..."
20039-410 = "I won't blame you...and I mean ever."
20039-2600 = "You've had it rough, Sensei. Fufu, perhaps that's not something I should say...but, genuinely, thank you. I swear that I'll treasure it above all else."

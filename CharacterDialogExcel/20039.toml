[translation]
20039-10 = "Blue Archive... สินะ"
20039-20 = "เราคือประมุขแห่งมังกรดำ โรงเรียนมัธยมซานไห่จิง\nริวเกะ คิซากิ\nฮุฮุ ต้องการพลังจากเราหรือ?"
20039-30 = "ฮืม... มีที่ให้วาง\nธูปหอมมั้ยนะ?"
20039-40 = "(ภายนอกซานไห่จิง\nช่างมีอะไร...\nหลากหลายเหลือเกิน)"
20039-50 = "เป็นที่ที่เหมาะกับ\nการดื่มชาเลยนะ..."
20039-60 = "(นั่นมัน...\nอะไรกันน่ะ...?)"
20039-70 = "พออยู่ที่นี่ก็\nสบายตัวขึ้นมาเลยนะ"
20039-80 = "มาแล้วหรือครู? ฮุฮุ ทำให้ประมุขแห่ง\nมังกรดำต้องรอเชียวหรือ\nอาจหาญจังเลยนะ"
20039-90 = "เรารออยู่นานแล้วนะ ครู"
20039-100 = "เราไม่อาจปกครองผู้คน\nด้วยพละกำลังได้หรอก หากทำเช่นนั้น\nก็จะสูญเสียจิตใจไปน่ะ"
20039-110 = "เรียกเราหรือครู? หืม?\nแค่อยากลองเรียกดูอย่างนั้นหรือ?"
20039-120 = "ฮุฮุ เป็นคนที่ชอบแกล้งกันเล่นสินะ\nไม่เป็นไรหรอก เพราะเราก็\nเป็นเช่นนั้นเหมือนกัน"
20039-130 = "นานแล้วนะที่ไม่ได้\nออกมานอกซานไห่จิง"
20039-140 = "เหนือสิ่งอื่นใดแล้ว\nที่นี่มีครูอยู่อย่างไรเล่า"
20039-150 = "เคยคิดว่าอยากหยุดเวลา\nไว้อย่างนี้หรือไม่เล่า ครู?"
20039-160 = "เราเคยนะ วินาทีนี้\nเรากำลังคิดเช่นนั้นอยู่เลย"
20039-170 = "เราวางธูปหอมเอาไว้ให้\nกลิ่นหอมใช่มั้ยเล่า?"
20039-180 = "ไว้เรามาชงชา\nด้วยกันดีมั้ยเล่า?"
20039-190 = "ถ้าเหนื่อยก็มางีบด้วยกัน\nได้นะ... คิดเหมือนกันมั้ยเล่า?"
20039-200 = "เราจำได้ดี ไม่มีทางลืมเลยละ"
20039-210 = "เอาละ จงรีบเตรียมตัว\nเราจะทำให้เห็นการต้อนรับ\nที่ดีที่สุดของซานไห่จิง"
20039-220 = "เช่นนั้นหรือ... จำได้อย่างนั้นหรือ"
20039-230 = "ขอบคุณนะครู\nเราได้รับการอวยพร\nจากผู้คนมากมาย..."
20039-240 = "แต่การอวยพรจากครู\nทำให้เราดีใจมากกว่าของใครเลย"
20039-250 = "ฮุฮุ ต้องบอกว่า\nสวัสดีปีใหม่สินะ"
20039-260 = "หืม? นี่คือสิ่งที่\nครูต้องให้อย่างนั้นหรือ....?"
20039-270 = "......"
20039-280 = "เป็นเช่นนั้นเลย!"
20039-290 = "คริสต์มาส... ใช่หรือไม่นะ?\nขอให้เป็นวันที่สงบสุขนะ"
20039-300 = "ฮาโลวีน... ใช่หรือไม่นะ?\nเราไม่แน่ใจเท่าไหร่หรอก..."
20039-310 = "รับไปสิ อาหารที่ทำจาก\nฟักทองและพุทราน่ะ\nเราคิดว่าอยากกินกับครูน่ะ"
20039-330 = "ฮุฮุ... ในที่สุดก็\nมองมาทางนี้สินะ"
20039-340 = "แต่ว่า ครู\nลองคิดดูสักครั้งสิ"
20039-350 = "เราในตอนนี้\nอาจจะอ่อนแอลงไปจริงๆ..."
20039-360 = "หรือที่จริง เราอาจแกล้ง\nทำเป็นอ่อนแออยู่ก็ได้นะ?"
20039-370 = "หรือไม่ก็... เราอาจทำไปเพื่อ\nดูปฏิกิริยาจากครู"
20039-380 = "หรืออาจจะแค่เชื่อใจครู\nอยู่อย่างหมดใจก็ได้"
20039-390 = "ทว่า... ใช่แล้วละ\nเรื่องนี้เราให้สัญญาได้"
20039-400 = "ไม่ว่าจะเกิด\nเรื่องอะไรขึ้นที่นี่..."
20039-410 = "เราก็จะไม่ตำหนิ\nครูหรอกนะ\nตลอดไปเลยละ..."
20039-2600 = "เหนื่อยแย่เลยนะ ครู ฮุฮุ นี่อาจจะ\nไม่ใช่เรื่องที่เราจะพูดได้...\nแต่ก็ขอบคุณจากใจจริงเลยนะ\nเราจะเดิมพันด้วยทุกอย่าง\nแล้วรักษาไว้อย่างดีเลย"

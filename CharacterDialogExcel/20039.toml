[translation]
20039-10 = "蔚藍檔案，啊"
20039-20 = "山海經高級中學，玄龍門的門主，龍華妃姬。\n呵呵，需要妾身的力量嗎？"
20039-30 = "呼呣……\n置香之位在……"
20039-40 = "（山海經之外……\n　實屬多采多姿啊）"
20039-50 = "似乎是個\n適合品茗的\n地方啊……"
20039-60 = "（那是……\n　何物……？）"
20039-70 = "呵呵……此處\n實屬舒適啊。"
20039-80 = "汝來了啊，老師。呵呵，\n竟讓玄龍門的門主等待，\n還真有膽識啊。"
20039-90 = "妾身正在等汝，老師。"
20039-100 = "以力無法統治人民。\n因其將失去民心。"
20039-110 = "有什麼事嗎？\n呼呣……只是想搭話？"
20039-120 = "呵呵。汝真愛開玩笑啊。\n無妨，妾身也經常如此。"
20039-130 = "走出山海經之外\n真是久違了。"
20039-140 = "畢竟……此處有汝在啊？"
20039-150 = "若時間能就此停止就好了……\n汝是否曾如此想過呢，老師？"
20039-160 = "妾身有。\n此刻，便這麼想著。"
20039-170 = "妾身將香點上了。\n能聞到奇妙的香味對吧？"
20039-180 = "一同品茗如何？"
20039-190 = "倘若感到疲憊，\n一同入睡便是……對吧？"
20039-200 = "豈有可能遺忘。\n啊啊，當然記得。"
20039-210 = "來吧，趕緊準備。\n就讓汝見識見識\n山海經流最頂級的款待。"
20039-220 = "……是嗎，汝還記得啊。"
20039-230 = "在此致上謝意，老師。\n儘管已收到各方的祝福……"
20039-240 = "但來自汝的話語\n最讓妾身感到高興。"
20039-250 = "呵呵。新年快樂，是吧。"
20039-260 = "呼呣？這應該是\n老師該給的……才對？"
20039-270 = "……"
20039-280 = "所言甚是！"
20039-290 = "聖誕節……嗯。\n願汝度過平安的一日。"
20039-300 = "萬聖節，是嗎？\n妾身並不是很了解……"
20039-310 = "來，是南瓜與棗子的料理。\n妾身想和汝一同品嚐。"
20039-330 = "呵呵……終於\n肯看向這邊了。"
20039-340 = "但是，老師。\n汝可曾如此設想？"
20039-350 = "妾身現在，\n或許確實虛弱……"
20039-360 = "卻也可能僅是\n故作脆弱而已。"
20039-370 = "也許……只是在對\n老師的態度加以試探。"
20039-380 = "又或者單純──只是打從心底\n相信著汝也說不定吧？"
20039-390 = "然而……也對，\n唯有此事能向汝保證。"
20039-400 = "即便在此處\n發生任何事……"
20039-410 = "妾身都不會怪罪於汝吧。\n……永遠不會。"
20039-2600 = "有勞汝了，老師。\n呵呵，也許這話不該由妾身來說……\n但妾身打從心底感謝著汝。\n妾身會賭上一切，好好珍惜的。"

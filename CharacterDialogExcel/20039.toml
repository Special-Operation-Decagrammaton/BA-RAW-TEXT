[translation]
20039-10 = "블루 아카이브, 로구나."
20039-20 = "산해경 고급중학교, 현룡문의 문주. 류우게 키사키다.\n후후. 나의 힘이 필요한가?"
20039-30 = "흐음…… 향로를 놓을\n자리가 있는가?"
20039-40 = "(산해경의 바깥이란\n참으로…… 다양하구나.)"
20039-50 = "차 한잔하기에\n좋은 곳인 듯한데…"
20039-60 = "(저것은……\n무엇일까……?)"
20039-70 = "여기에서는 제법 몸이 편해지는구나."
20039-80 = "왔는가, 선생. 후후. 산해경의\n문주를 기다리게 하다니,\n좋은 배짱이구나."
20039-90 = "계속 기다리고 있었다. 선생."
20039-100 = "힘으로는 사람을\n다스릴 수 없다. 마음을\n잃어버리게 되니까."
20039-110 = "불렀는가, 선생? 흐음?\n그저 말을 걸어 보았다?"
20039-120 = "후후. 그대는 장난을\n즐기는구나. 괜찮다. 나도\n이따금 그리 하니 말이지."
20039-130 = "산해경 밖에\n나가는 건 오랜만이군."
20039-140 = "무엇보다, 이 자리에는\n그대가 있으니 말이다?"
20039-150 = "시간이 이대로 멈춰 주었으면,\n하고 생각한 적이 있는가. 선생?"
20039-160 = "나는 있다. 바로 지금 이 순간,\n그렇게 생각하고 있으니 말이다."
20039-170 = "향로를 놓아두었다.\n신기한 향이지?"
20039-180 = "함께 다도를 즐기는\n것은 어떠한가?"
20039-190 = "피곤하다면 함께 잠드는 것도\n좋을 것이다… 그렇지 아니한가?"
20039-200 = "기억하고 있노라. 잊을 리 없지."
20039-210 = "자, 빨리 준비하거라.\n산해경류 최고의 대접을,\n보여 주도록 하지."
20039-220 = "……그런가. 기억하고 있었는가."
20039-230 = "감사를 표한다, 선생.\n많은 사람들로부터\n축하를 받곤 하지만……"
20039-240 = "그대의 축하가,\n가장 기쁘게 다가오는구나."
20039-250 = "후후. 새해 복 많이\n받으세요. 로구나."
20039-260 = "흠? 이것은 선생이\n줘야 하는 것, 이라고.....?"
20039-270 = "……"
20039-280 = "그랬었다!"
20039-290 = "크리스마스, 인가…… 그래. \n평안한 하루가 되기를 바라마."
20039-300 = "할로윈, 인가?\n정확히는 모른다만…"
20039-310 = "자, 호박과 대추 요리다.\n그대와 함께 먹고 싶다는\n생각이 들어서 말이다."
20039-330 = "후후… 드디어 이쪽을\n바라보아 주는구나."
20039-340 = "하지만 말이다, 선생.\n한 번 생각해 보는 것이\n어떨까."
20039-350 = "나는 이 순간 정말\n약해져 있는 것일 수도 있고…"
20039-360 = "사실은 약해진 척하고\n있을 뿐인지도 모르지?"
20039-370 = "혹은… 선생의 반응을\n떠 보고 있다거나."
20039-380 = "단지―그대를 깊이\n믿고 있는 것일수도 있다."
20039-390 = "하지만… 그래, 이것만은\n약속할 수 있을 듯하구나."
20039-400 = "여기서 무슨 일이\n일어나더라도…"
20039-410 = "나는 그대를 탓하지\n않을 것이다.\n…영원히, 말이지."
20039-2600 = "고생 많았구나, 선생.\n후후, 내가 할 얘기는\n아닐지 모르지만……\n진심으로 감사한다.\n내 모든 것을 걸고, 소중히 하도록 하마."

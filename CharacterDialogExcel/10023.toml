[translation]
10023-10 = "蔚藍檔案。"
10023-20 = "……並，並不是在玩。\n正在偵察任務的途中，不要誤會。"
10023-30 = "就算是渡假勝地，\n我也不會允許違反規則的。"
10023-40 = "違反規則的傢伙……\n現在看起來沒有呢。"
10023-50 = "（紫外線對策，\n得確實做好才行……）"
10023-60 = "（有沒有感覺能\n　把沙灘床展開\n　的地方……）"
10023-70 = "（總，總覺得剛才，\n感覺到噁心的視線……）"
10023-80 = "歡迎回來，老師。\n今天天氣很好，\n是非常適合日光浴的日子呢。"
10023-90 = "老師，好慢！\n這不是差一點就只有我，\n要被曬得烏漆墨黑的嗎……！"
10023-100 = "不要邊走邊飲食！\n就算是渡假勝地也沒有例外哦！"
10023-110 = "怎麼，\n那樣嘻皮笑臉的……\n就算是海邊，\n也太興奮了。"
10023-120 = "……咦？\n看見我穿泳衣的樣子，\n就自然的……？"
10023-130 = "……！\n去死，你這個變態！"
10023-140 = "呼，在海邊喝的檸檬汽水\n果然格外好喝。"
10023-150 = "並，並不是，因為在海邊\n所以很興奮！"
10023-160 = "祝你生日快樂，老師。\n有什麼想要的東西嗎？"
10023-170 = "……這個狀況就已經足夠了？\n那是怎樣，什麼意思？"
10023-180 = "在海邊迎接生日什麼的……\n雖然有點浪漫過頭了，\n不過還不錯呢。"
10023-190 = "雖然海邊到處都是笨蛋，\n而且又問題一堆，\n實在是不怎麼喜歡……"
10023-200 = "不過，這是最棒的生日了。\n謝謝你，老師。"
10023-210 = "已經新年了嗎……\n明明前陣子還是夏天的說，\n時間過得好快啊。"
10023-220 = "哈啊，比基尼的聖誕服！？\n誰，誰要穿啊\n那種不知羞恥的東西！\n去死！變態！"
10023-230 = "總感覺有點涼快的感覺……"
10023-240 = "哈？感覺好像有什麼\n從後面經過了？"
10023-250 = "笨，明明又不是夏天，\n不要突然講恐怖的話！"
10023-270 = "你，你是什麼時候來的啊！？"
10023-280 = "咦？從剛剛開始\n就一直看到現在……？"
10023-290 = "你這……\n變態！\n去死！"
10023-300 = "……我先聲明，\n我可不是在玩！"
10023-310 = "這也是\n維護風紀活動\n的一環……！"
10023-320 = "……比起那個，\n你要看到什麼時候啊！\n快點走開啦！"
10023-2600 = "這是……\n正常的武器嗎？\n真的？"

[translation]
10023-10 = "블루 아카이브."
10023-20 = "따, 딱히 놀고 있는 거 아니거든.\n정찰 임무 중이니까 오해하지 마."
10023-30 = "휴양지의 분위기에 취해\n일탈을 저지르는\n학생들은 여기 없겠지?"
10023-40 = "교칙 위반자는……\n없는 것 같네."
10023-50 = "(자외선 차단 대책은\n이만하면 충분하겠지?)"
10023-60 = "(선베드를 펼칠만한\n장소가 어디 없으려나…)"
10023-70 = "(……으힉?! 어쩐지 방금\n기분 나쁜 시선이……)"
10023-80 = "어서와, 선생.\n오늘은 볕이 잘 드는 게\n일광욕 하기에 좋은 날씨네."
10023-90 = "늦었잖아!\n기다리다가 피부가 완전히\n타버리는 줄 알았다고!"
10023-100 = "취식보행 금지!\n휴양지라고 해서\n예외는 없어."
10023-110 = "그 웃는 얼굴은 뭐야.\n바다라고 들뜬 건 아니겠지?"
10023-120 = "……뭐?\n내 수영복 차림을 보니\n웃음이 멈추질 않는다고?"
10023-130 = "죽어, 이 변태!"
10023-140 = "후후, 해변에서 마시는\n레모네이드의 맛도 각별하네."
10023-150 = "바, 바다라고\n들뜬 거 아니거든!"
10023-160 = "생일 축하해, 선생님.\n뭔가 받고 싶은\n선물이라도 있어?"
10023-170 = "이 상황만으로 충분해?\n뭐야, 그거. 무슨 의미야?"
10023-180 = "해변에서 맞는 생일이라니……\n조금 지나치게 로맨틱하지만,\n나쁘지 않네."
10023-190 = "바다라고 하면 바보들 뿐이고,\n트러블 투성이여서 별로\n좋아하지 않았지만……"
10023-200 = "그래도 최고의 생일이야.\n고마워."
10023-210 = "벌써 설인가…… 여름이\n얼마전이었던 것 같은데,\n시간도 참 빠르네."
10023-220 = "하아, 비키니 산타복?!\n누, 누가 그런 파렴치한 걸!\n죽어! 변태!"
10023-230 = "어쩐지 서늘한\n기분이 드는 걸……"
10023-240 = "바, 방금 뒤에\n뭔가가 지나갔다고?"
10023-250 = "여름도 아닌데 갑자기\n무서운 이야기 하지 마!"
10023-270 = "어, 어느 틈에\n온 거야?"
10023-280 = "아까 전부터 계속\n지켜 보고 있었다고?"
10023-290 = "이…… 변태! 죽어!"
10023-300 = "……말해 두겠지만,\n놀고 있는 거 아니거든?"
10023-310 = "이것도 엄연한\n풍기를 지키는\n활동의 일환으로……"
10023-320 = "……그보다,\n언제까지 지켜보고 있을 거야!\n빨리 어디론가 가 버려!"
10023-2600 = "이거……\n제대로 된 무기 맞아? 정말로?"

[translation]
10023-10 = "Blue Archive."
10023-20 = "I'm not joking! This is all part of the recon mission."
10023-30 = "Surely there won't be students, drunk off the resort atmosphere, causing mischief here, right?"
10023-40 = "Looks like there isn't anyone...out of line."
10023-50 = "(Would this be enough to protect from UV rays?)"
10023-60 = "(Is there an ideal place to open up the sun bed...?)"
10023-70 = "(Aaah! No wonder I felt like someone was staring.)"
10023-80 = "Welcome, Sensei. It's sunny today and great for sunbathing."
10023-90 = "You're late! I thought I was going to get sunburn waiting for you!"
10023-100 = "No eating while walking! No exceptions just because it's a resort."
10023-110 = "What's that smile on your face? Surely you're not excited about the ocean, right?"
10023-120 = "What? You can't stop smiling after seeing my swimsuit?"
10023-130 = "Die, you pervert!"
10023-140 = "Heehee. Lemonade tastes so much better at the beach."
10023-150 = "N-No, I'm not excited because of the ocean!"
10023-160 = "Happy birthday, Sensei. Is there any gift you want?"
10023-170 = "This is already enough? What do you mean?"
10023-180 = "A birthday at the beach seems a little romantic, but I guess I don't hate it."
10023-190 = "There are only fools in the water and trouble on the beach, but..."
10023-200 = "It's still the best birthday I've ever had. Thanks."
10023-210 = "Is it already New Year's Day? It felt like summer was just yesterday. Time sure flies."
10023-220 = "A Santa bikini outfit? No one would ever wear anything so stupid! Pervert! Die!"
10023-230 = "I feel uneasy for some reason..."
10023-240 = "Y-You say something just went by behind me?"
10023-250 = "It's not even summer. Stop it with the sudden scary story!"
10023-270 = "Wh-When did you get here?"
10023-280 = "Have you been watching me this whole time?"
10023-290 = "Y-You...! Pervert! Die!"
10023-300 = "Just so you know, I'm not fooling around!"
10023-310 = "It's all to protect morality on the beach!"
10023-320 = "Anyway, just how long are you going to keep staring like that?! Go away!"
10023-2600 = "This is...a proper weapon? Really?"

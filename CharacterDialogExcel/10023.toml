[translation]
10023-10 = "Blue Archive"
10023-20 = "ฉันไม่ได้เล่นอยู่สักหน่อย\nนี่เป็นส่วนหนึ่งของภารกิจลาดตระเวนต่างหาก"
10023-30 = "คงไม่มีนักเรียนคนไหน\nที่สนุกกับบรรยากาศของ\nสถานที่พักผ่อน จนทำอะไร\nแผลงๆ หรอกใช่มั้ย?"
10023-40 = "เหมือนว่าจะไม่มี...\nคนที่ฝ่าฝืนกฎเลยแหะ"
10023-50 = "(เท่านี้ก็พอจะกันรังสี UV\nได้แล้วใช่มั้ยนะ?)"
10023-60 = "(มีที่เหมาะๆ ตรงไหน\nที่พอจะกางเตียงนอน\nอาบแดดได้บ้าง...?)"
10023-70 = "(เฮือก?! ทำไมจู่ๆ ก็\nสัมผัสได้ถึงสายตาที่ทำ\nให้รู้สึกไม่ดีกันนะ....)"
10023-80 = "เชิญเลยคุณครู\nวันนี้อากาศดีมากเลย\nเหมาะกับการอาบแดดสุดๆ"
10023-90 = "มาสายนะครู!\nฉันมารอนานซะจน\nแดดจะเผาเกรียมหมดแล้วนะ!"
10023-100 = "อย่าเดินไปกินไปสิ!\nถึงที่นี่จะเป็นสถานที่พักผ่อน\nก็ไม่มีข้อยกเว้นหรอกนะ"
10023-110 = "ทำไมยิ้มแบบนั้นล่ะ\nคงไม่ใช่ว่าตื่นเต้นที่มาทะเลหรอกนะ?"
10023-120 = "อะไรนะ...?\nพอเห็นชุดว่ายน้ำของฉันแล้ว\nหยุดยิ้มไม่ได้เลยงั้นเหรอ?"
10023-130 = "หายไปซะ เจ้าคนโรคจิต!"
10023-140 = "ฮิฮิ รสชาติของน้ำมะนาวริมหาด\nก็มีรสชาติพิเศษเหมือนกัน"
10023-150 = "ปะ...เปล่านะ ฉันไม่ได้ตื่นเต้น\nเพราะมาทะเลสักหน่อย"
10023-160 = "สุขสันต์วันเกิดนะ คุณครู\nมีของขวัญที่อยากได้หรือเปล่า?"
10023-170 = "สถานการณ์ตอนนี้ก็เพียงพอแล้ว?\nหมายความว่ายังไงน่ะ?"
10023-180 = "การได้มาฉลองวันเกิดที่ชายหาด\nถึงจะดูโรแมนติกจนเกินไปหน่อย\nแต่ก็ไม่แย่เท่าไรนะ"
10023-190 = "ที่ทะเลมีแต่พวกคนงี่เง่า\nที่ชายหาดเองก็มีแต่ปัญหา\nฉันเลยไม่ค่อยชอบเท่าไร..."
10023-200 = "แต่ก็เป็นวันเกิดที่ยอดเยี่ยมมาก\nขอบคุณนะ"
10023-210 = "ปีใหม่แล้วเหรอ... รู้สึกเหมือน\nเพิ่งผ่านฤดูร้อนมาไม่นานเลย\nเวลาผ่านไปเร็วจัง"
10023-220 = "ชุดบิกินี่ลายซานตาคลอส?!\nคะ...ใครจะใส่กันเล่า!\nตายซะ เจ้าโรคจิต!"
10023-230 = "รู้สึกเสียวสันหลังแปลกๆ..."
10023-240 = "มะ...เมื่อกี้ที่ข้างหลัง\nมีอะไรผ่านไปงั้นเหรอ?"
10023-250 = "ยังไม่ใช่คืนฤดูร้อนสักหน่อย\nอย่ามาเล่าเรื่องน่ากลัวแบบนี้สิ!"
10023-270 = "นี่คุณครูแอบตามมาตอนไหนเนี่ย?"
10023-280 = "คอยดูฉันตั้งแต่เมื่อกี้แล้วงั้นเหรอ?"
10023-290 = "คนโรคจิต! ตายซะ!"
10023-300 = "บอกไว้ก่อนนะ…\nว่าเราไม่ได้มาเที่ยวเล่นกันน่ะ"
10023-310 = "ที่ทำแบบนี้ก็เพื่อรักษา\nบรรยากาศของชายหาดต่างหากล่ะ!"
10023-320 = "ว่าแต่จะจ้องแบบนั้น\nไปถึงเมื่อไรกันน่ะ!\nจะไปไหนก็รีบไปเลย"
10023-2600 = "อาวุธนี่... เหมาะแล้วจริงเหรอ?\nถามจริงดิ?"

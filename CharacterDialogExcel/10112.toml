[translation]
10112-10 = "蔚藍檔案！"
10112-20 = "主人──啊，現在應該稱呼老師比較好吧？\n一起來做很～多開心的事吧！"
10112-30 = "這裡真寬敞呢～！\n我來帶你參觀吧？"
10112-40 = "耶嘿嘿，難得穿上制服……\n來玩玩吧♪"
10112-50 = "肚子餓了……\n來吃餅乾吧♪"
10112-60 = "大家都好可愛～！\n好想一起拍照～！"
10112-70 = "老師在哪裡～？\n明明能感覺到視線的說……\n來找一下吧！"
10112-80 = "老師，有我能幫忙的事嗎？\n儘管跟我說哦！"
10112-90 = "今天要做什麼呢？\n老師想怎麼玩？"
10112-100 = "制服，怎麼樣呢？\n主……"
10112-110 = "不對，我想聽\n老師的感想！"
10112-120 = "任務雖然有趣……"
10112-130 = "但像這樣跟老師\n待著我也喜歡～"
10112-140 = "老師，要不要去散步？\n這次我會當狗狗的！"
10112-150 = "咦？不行？\n為什麼～？"
10112-160 = "老師平常都在做\n什麼樣的工作呢？"
10112-170 = "那是我也能幫忙的事嗎？\n打掃的話我很擅長哦～！"
10112-180 = "哇！發現漫畫了～！\n這是老師的嗎？"
10112-190 = "……咦，不是？\n明明有老師的味道呀？"
10112-200 = "考考你！今天是\n什麼日子呢～？\n……正確答案是～"
10112-210 = "我最喜歡的，\n老師的生日～！\n啪啪啪！"
10112-220 = "啊哈哈，\nHappy Birthday！\n老師！"
10112-230 = "哇！我的生日，\n你有記得嗎？"
10112-240 = "好厲害！我好開心！\n最喜歡老師了～！"
10112-250 = "新年快樂～老師！"
10112-260 = "今年也會常～常跟我玩對吧？\n我很期待哦，啊哈！"
10112-270 = "聖誕節快樂～！\n老師！有從聖誕老人\n手中收到禮物了嗎？"
10112-280 = "咦……大人是收不到的？"
10112-290 = "那，就由我來送你吧？\n要什麼儘管說！"
10112-300 = "街上被穿著有趣\n變裝的人弄得很熱鬧呢！"
10112-310 = "這麼快樂的日子，\n不出門就太可惜囉～"
10112-320 = "來，老師！\n一起走吧！"
10112-340 = "鏘～！\n老師跟明日奈，\n連在一起了！"
10112-350 = "怎麼樣？\n這樣就能知道\n在哪裡了對吧？"
10112-360 = "……怎麼了嗎？\n露出那種表情。"
10112-370 = "嗯？反了，是嗎？\n應該是我被綁住嗎？"
10112-380 = "……咦？啊，啊啊！\n說的也是！"
10112-390 = "……啊哈，啊哈哈哈！\n真奇怪！"
10112-400 = "這樣，就好像真的……"
10112-410 = "在跟狗狗散步一樣！"
10112-420 = "所以……現在的老師，\n是明日奈的狗狗對吧？"
10112-430 = "明日奈的狗狗，\n會汪汪叫嗎？"
10112-440 = "呵呵！乖乖說出來的話\n就給你獎勵哦，好不好？"
10112-2600 = "好耶！這樣就能\n玩得更～開心了呢！\n謝謝你，老師！"

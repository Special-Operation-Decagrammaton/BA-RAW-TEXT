[translation]
10112-10 = "블루 아카이브!"
10112-20 = "주인님! 아니, 선생님이었던가?\n아무튼 기다렸어? 아스나 등장~!"
10112-30 = "여기 넓네~!\n내가 안내해 줄까?"
10112-40 = "모처럼\n교복도 입었고~\n즐거운 기분!\n이제 뭐 하고 놀까?"
10112-50 = "배고파졌어…\n과자 먹어버려야지!"
10112-60 = "모두 귀여워~!\n같이 사진 찍고 싶어~!"
10112-70 = "선생님~ 있어?\n왠지 선생님의\n시선이 느껴져!\n어디 있는지 찾아봐야지!"
10112-80 = "선생님! 아스나가\n열심히 도와줄게!\n뭐든 맡겨줘!"
10112-90 = "오늘은 뭐할까?\n선생님은 뭐하며\n놀고 싶어?"
10112-100 = "교복, 어때?\n주인…"
10112-110 = "아니, 선생님의\n감상을 듣고 싶어!"
10112-120 = "밖에서 임무를\n수행하는 것도 좋지만,"
10112-130 = "아스나는 선생님이랑\n이렇게 있는 것도 좋아해~"
10112-140 = "선생님!\n멍멍이 산책할래?\n이번에는 아스나가\n강아지 역할을…"
10112-150 = "응? 괜찮다고?\n왜? 왜애~?\n하자아, 선생님~!"
10112-160 = "선생님은 항상\n어떤 업무를 하고 있어?"
10112-170 = "그거 나도\n도울 수 있는 일?\n청소라면 자신 있어~!"
10112-180 = "만화책 발견~!\n선생님 꺼야?"
10112-190 = "응? 아니라고?\n이상하다. 선생님\n냄새가 나는데?"
10112-200 = "퀴즈! 오늘은\n무슨 날일까요~?\n…정답은~"
10112-210 = "내가 가장 좋아하는,\n선생님의 생일~!\n짝짝짝!"
10112-220 = "아하핫,\n해피버스데이!\n선생님!"
10112-230 = "앗, 아스나 생일\n알고 있었어?"
10112-240 = "역시 선생님이야!\n정말 정말 좋아해~!"
10112-250 = "선생님~\n새해 복 많이 받아~!"
10112-260 = "올해도 아스나랑 같이\n신나게 놀 거지?\n아하하, 잘 부탁해~!!"
10112-270 = "크리스마스야, 선생님!\n어때? 산타할아버지한테\n선물 받았어?"
10112-280 = "선생님은 어른이라\n선물 못 받는다고?"
10112-290 = "그럼 아스나가 줄까?\n후후~!"
10112-300 = "오늘은 특별히\n재미있는 날이야!"
10112-310 = "거리도 활기차고~\n신기한 옷들도 많고~"
10112-320 = "그러니까 선생님,\n나랑 같이 나가서 놀자!"
10112-340 = "쨔안-!! 선생님과 아스나,\n연결되어 버렸습니다!"
10112-350 = "어때?\n이거라면 어디 있는지,\n금방 알 수 있겠지?"
10112-360 = "……왜 그래?\n그런 얼굴 하고."
10112-370 = "응? 아닌……가?\n반대로 했어야 하는 걸까?"
10112-380 = "…….어라?\n아, 아아! 그러네!?"
10112-390 = "……아핫, 아하하!\n이상해졌어!"
10112-400 = "이거, 정말로……"
10112-410 = "강아지랑\n산책하는 것 같아!"
10112-420 = "그럼…… 지금 선생님은,\n아스나의 강아지야?"
10112-430 = "아스나의 강아지는,\n멍멍-할 수 있을까?"
10112-440 = "후훗! 제대로 하면\n상을 줄 테니까, 응?"
10112-2600 = "이걸로 더 신나게\n놀 수 있어~!\n고마워, 선생님!"

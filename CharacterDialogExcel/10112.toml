[translation]
10112-10 = "Blue Archive!"
10112-20 = "นายท่าน! ไม่สิ ต้องเป็นคุณครูสิเนอะ?\nรอกันอยู่ใช่มั้ย? อาสึนะมาแล้ว~!"
10112-30 = "ที่นี่กว้างจังเลย~!\nให้ฉันบอกทางให้มั้ย?"
10112-40 = "นานแล้วที่ฉัน\nไม่ได้ใส่ชุดนักเรียน~\nแล้วอารมณ์ดีแบบนี้!\nไปเล่นสนุกอะไรกันดีล่ะ?"
10112-50 = "หิวแล้ว...\nต้องกินขนมแล้วละ!"
10112-60 = "ทุกคนน่ารักจังเลย~!\nอยากถ่ายรูปด้วยจัง~!"
10112-70 = "คุณครู~ อยู่หรือเปล่า?\nรู้สึกได้ถึงสายตา\nที่จับจ้องมาของคุณครูเลย!\nไหนดูซิว่าอยู่ที่ไหน!"
10112-80 = "คุณครู! อาสึนะจะช่วยเองนะ!\nสั่งมาได้ทุกอย่างเลย!"
10112-90 = "วันนี้ทำอะไรกันดี?\nคุณครูอยากเล่นสนุก\nแบบไหนเหรอ?"
10112-100 = "ชุดนักเรียนเป็นยังไงบ้าง?\nฉันอยากฟังความคิดเห็น..."
10112-110 = "ของนายท่าน... ไม่สิ\nของคุณครูน่ะ!"
10112-120 = "การทำภารกิจกลางแจ้ง\nมันก็ดีเหมือนกัน"
10112-130 = "แต่อาสึนะก็ชอบ\nการอยู่อย่างนี้กับคุณครูด้วย~"
10112-140 = "คุณครู! พาน้องหมาไปเดินเล่นกันมั้ย?\nครั้งนี้อาสึนะจะรับบทน้องหมาให้..."
10112-150 = "หืม? ไม่เป็นไรงั้นเหรอ?\nทำไม? ทำไมล่ะ~?\nไปเถอะนะ คุณครู~!"
10112-160 = "คุณครูทำงานอะไร\nอยู่ตลอดเลยเหรอ?"
10112-170 = "งานนั้นให้ฉันช่วยได้มั้ย?\nถ้าเป็นเรื่องทำความสะอาด ฉันถนัดนะ~!"
10112-180 = "เจอหนังสือการ์ตูนด้วย~!\nของคุณครูเหรอ?"
10112-190 = "หืม? ไม่ใช่งั้นเหรอ?\nแปลกจัง แต่มันมีกลิ่น\nของคุณครูนะ?"
10112-200 = "มีคำถาม! วันนี้เป็น\nวันอะไรเอ่ย~?\nเฉลย...~"
10112-210 = "วันที่ฉันชอบที่สุด\nวันเกิดคุณครูไงล่ะ~!\nปรบมือ เปาะแปะๆ!"
10112-220 = "อะฮ่าฮ่า!\nแฮปปี้เบิร์ธเดย์นะ! คุณครู!"
10112-230 = "อ๊ะ รู้วันเกิดอาสึนะด้วยเหรอ?"
10112-240 = "สมกับที่เป็นคุณครูเลย!\nถูกใจที่สุดเลย~!"
10112-250 = "คุณครู~\nสวัสดีปีใหม่~!"
10112-260 = "ปีนี้ก็จะเล่นสนุก\nกับอาสึนะอีกใช่มั้ย?\nอะฮ่าฮ่า ฝากตัวด้วยนะ~!!"
10112-270 = "คริสต์มาสแล้วละ คุณครู!\nเป็นไงบ้าง? ได้ของขวัญจาก\nคุณลุงซานต้าหรือเปล่า?"
10112-280 = "คุณครูเป็นผู้ใหญ่แล้ว\nก็เลยไม่ได้ของขวัญงั้นเหรอ?"
10112-290 = "งั้นเอาจากอาสึนะมั้ย?\nฮุฮุ~!"
10112-300 = "วันนี้เป็นวันที่\nสนุกเป็นพิเศษเลยละ!"
10112-310 = "ถนนหนทางก็คึกคัก~\nชุดที่น่าทึ่งก็มีเยอะแยะ~"
10112-320 = "เพราะงั้น คุณครู\nออกไปเที่ยวเล่นกับฉันเถอะนะ!"
10112-340 = "แต่นแต๊น!!\nแค่นี้ก็เชื่อมระหว่างคุณครู\nกับอาสึนะไว้ได้แล้วค่ะ!"
10112-350 = "เป็นยังไงล่ะ? แบบนี้ก็\nไม่ต้องกังวลแล้วใช่มั้ย?\nทีนี้ก็รู้แล้วได้ใช่มั้ยล่ะว่าอยู่ที่ไหน?"
10112-360 = "เป็นอะไรไปล่ะ...?\nทำไมทำหน้าแบบนั้น"
10112-370 = "เอ๋? หรือว่าไม่ใช่แบบนี้?\nหรือว่าต้องให้อีกคน\nเป็นคนถือเชือก?"
10112-380 = "หืม? เอ๋...?\nอ้อ!! จริงด้วยเนอะ!?"
10112-390 = "อะฮ่าฮ่าฮ่าฮ่า!\nนี่มันอะไรเนี่ย แปลกจัง!"
10112-400 = "นี่มันเหมือนกับ..."
10112-410 = "มาเดินเล่นกับ\nน้องหมาจริงๆ ด้วย!"
10112-420 = "คุณครู ตอนนี้คุณครูคือ\nน้องหมาของอาสึนะเหรอ?"
10112-430 = "น้องหมาของอาสึนะ\nจะเห่าบ๊อกๆ ได้มั้ยน้า?"
10112-440 = "ฮุฮุ! ถ้าทำได้\nเดี๋ยวให้รางวัลนะ ว่าไงล่ะ?"
10112-2600 = "อันนี้จะทำให้\nเล่นสนุกได้มากขึ้น~!\nขอบคุณนะ คุณครู!"

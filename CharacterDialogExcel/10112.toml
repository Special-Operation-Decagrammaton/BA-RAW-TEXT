[translation]
10112-10 = "Blue Archive!"
10112-20 = "Master! I mean...Sensei! I'm here! I hope I didn't keep you waiting."
10112-30 = "This place is very spacious! Would you like me to guide you?"
10112-40 = "I finally get to wear my school uniform! And it feels...nice! So now what should I do?"
10112-50 = "I'm hungry... Time to eat those snacks!"
10112-60 = "They're all so cute! I want to take photos together!"
10112-70 = "Sensei, you there? I can feel your eyes on me somehow. Come on out, wherever you are..."
10112-80 = "Sensei! I'm here to help you! Ask me for anything!"
10112-90 = "What should I do today? What do you want to do, Sensei?"
10112-100 = "What do you think of the school uniform? I want to hear Mast—"
10112-110 = "I mean Sensei's opinion of it!"
10112-120 = "It's nice to go on a mission outside..."
10112-130 = "...but I also enjoy being with you like this, Sensei!"
10112-140 = "Sensei! Want to go for a puppy walk? I can be the puppy this time..."
10112-150 = "Huh? You don't want to? Aw, how come? Come onnn, Sensei!"
10112-160 = "What kind of work do you typically do, Sensei?"
10112-170 = "Is it something I can help with? I do know a thing or two about cleaning!"
10112-180 = "Found a manga! Is this yours, Sensei?"
10112-190 = "What? It's not? Odd. It smells like it's yours."
10112-200 = "Pop quiz! What day is it today? The answer is..."
10112-210 = "It's the birthday of my favorite person, Sensei! A round of applause for you!"
10112-220 = "Ahaha, happy birthday, Sensei!"
10112-230 = "Ah, you remembered my birthday?"
10112-240 = "As expected of Sensei! I really, really like you!"
10112-250 = "Sensei! Happy New Year!"
10112-260 = "We can look forward to lots of fun together this year too right?"
10112-270 = "It's Christmas, Sensei! Did you get any gifts from Santa Claus?"
10112-280 = "What? Do adults not get gifts?"
10112-290 = "Then maybe I can give you one! Fufu!"
10112-300 = "Today is an especially fun day!"
10112-310 = "The streets are so lively! And there are lots of interesting outfits to see!"
10112-320 = "So, Sensei, come hang out with me!"
10112-340 = "Ta-da! With this, Sensei and Asuna are connected!"
10112-350 = "What do you think? No worries with this, right? You can tell where I am, right?"
10112-360 = "...What's wrong? Why are you making that face?"
10112-370 = "Huh? Did I mess up? Was I supposed to do it the other way around?"
10112-380 = "Hm? ...Huh? Ahh!! That's right!"
10112-390 = "Ahahaha! What is this? It's so weird!"
10112-400 = "It really..."
10112-410 = "...feels like I'm walking a puppy!"
10112-420 = "Sensei? Are you my puppy right now?"
10112-430 = "Can my puppy say...\"woof woof\"?"
10112-440 = "Heehee! I'll give you treats if you do it right!"
10112-2600 = "We'll have so much fun! Thanks, Sensei!"

[translation]
10037-10 = "蔚藍檔案！"
10037-20 = "呼叫我的是老師啊。\n有拿著潔莉諾會長的指示書吧？"
10037-30 = "如果可以喝個一杯\n清涼的康波特就好了……"
10037-40 = "溫暖又熱呼呼的，\n會讓人想睡呢………"
10037-50 = "哎呀，糟糕。\n得盡快進行\n刻苦的訓練才行……！"
10037-60 = "這個空間寬敞，\n正適合做突擊訓練。"
10037-70 = "在這裡迷路的話\n怎麼辦……？"
10037-80 = "時間是金，老師！\n以後要更迅速的\n回來才行！"
10037-90 = "回來了啊，老師。\n今天也要盡情的突擊哦！"
10037-100 = "我們赤冬如熊，\n毫無畏懼的進行狩獵！"
10037-110 = "偷懶的話，\n我就以怠工的嫌疑\n向事務局告發哦！"
10037-120 = "你，你在摸哪裡！\n小心我把你送去特別班哦！"
10037-130 = "嗯，你問\n梅多貝奇……指的是誰？"
10037-140 = "梅多貝奇，那是\n與我同床共枕的，\n忠實的熊玩偶。"
10037-150 = "沒有他的話，\n我就沒辦法熟睡呢。"
10037-160 = "潔莉諾會長很可愛……？"
10037-170 = "嗯呣，嗯呣！我也那麼認為哦！"
10037-180 = "今天是老師的生日嗎？\n是值得慶祝的日子呢。"
10037-190 = "來聯絡事務局，\n做可以拿到\n特別補給品的安排吧。"
10037-200 = "就算是我的生日，\n也沒有必要做特別措施。"
10037-210 = "不過，如果老師願意\n跟我待在一起的話……"
10037-220 = "或許會讓人有點高興。"
10037-230 = "今年一年，\n為了在任何地方都可以突擊，\n做好萬全的準備吧！"
10037-240 = "聖誕老人……\n竟然一晚\n就巡迴奇普托斯所有學園，"
10037-250 = "那是多麼可怕的速度啊！"
10037-260 = "不惡作劇的話\n就可以分到糖果……?"
10037-270 = "你在說什麼，\n糖果基本上，\n是要平均分配給所有學生的！"
10037-290 = "可惡……這個縫隙的髒污，\n還挺頑強的嘛。"
10037-300 = "不過，\n在我這個保安委員長的猛擊下\n能撐到什麼時候呢？"
10037-310 = "哼哼……\n別小看了這個\n新兵器的力量哦。"
10037-320 = "只要有了這個新購入的\n清潔劑，"
10037-330 = "連碰不太到的縫隙\n都能清得很完美！"
10037-340 = "哈，等等老師！\n鏡子和玻璃用清潔劑洗過後，"
10037-350 = "要用乾擦將水氣確實地去除，\n不是說過了嗎！"
10037-360 = "這種情況，\n特別要用報紙，"
10037-370 = "便能取回它\n真正的光輝！"
10037-380 = "還有，這種洗潔液\n在密室使用的話\n相當的危險。"
10037-390 = "使用的時候\n一定要記得通風！"
10037-400 = "在充分注意安全的基礎上，\n將威脅赤冬衛生環境的\n汙染物質們，"
10037-410 = "徹底地驅除！"
10037-2600 = "真是出色的裝備呢，\n這樣的話就能將敵人一掃而盡了。"

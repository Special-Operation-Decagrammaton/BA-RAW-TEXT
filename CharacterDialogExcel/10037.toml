[translation]
10037-10 = "Blue Archive!"
10037-20 = "Did you call for me, Sensei? Do you bring orders from President Cherino?"
10037-30 = "I wish I could have a cold glass of kompot..."
10037-40 = "It's warm and fluffy. I'm getting drowsy..."
10037-50 = "Oh, I can't do this. I must train harder!"
10037-60 = "This place is big, so it's good for combat training."
10037-70 = "What if I get lost here?"
10037-80 = "Time is gold, Sensei! Try to get back faster!"
10037-90 = "You're back, Sensei. It's time to attack again!"
10037-100 = "We, the fearless Red Winter bears, will begin the hunt!"
10037-110 = "I'll report you to the Secretariat for sabotage if you slack off!"
10037-120 = "Wh-What are you touching? I'll send you to the Spec Ops!"
10037-130 = "Who's Medvezi?"
10037-140 = "Medvezi is a loyal teddy bear that sleeps on my bed."
10037-150 = "There's no guarantee of good sleep without him."
10037-160 = "You think President Cherino is cute?"
10037-170 = "Yes! I think so too."
10037-180 = "Today is your birthday? Congratulations."
10037-190 = "I'll contact the Secretariat to send you special supplies."
10037-200 = "You don't have to do anything special for my birthday."
10037-210 = "But if you can spend it with me..."
10037-220 = "...that would make me happy."
10037-230 = "Let's make every effort to charge in every direction this year!"
10037-240 = "Santa Claus.... How does he visit every academy in Kivotos in just one night?"
10037-250 = "That's awe-inspiring speed!"
10037-260 = "I'll get treats if I don't play a trick?"
10037-270 = "Nonsense. Treats should be distributed equally to all students!"
10037-290 = "Tch... The stain in this crevice is quite stubborn."
10037-300 = "But how long can it withstand my relentless attack?"
10037-310 = "Never underestimate the power of my new weapon."
10037-320 = "With this new cleaning agent I bought..."
10037-330 = "...there's no crevice that my hands can't clean!"
10037-340 = "Wait, Sensei! You must remove the moisture completely."
10037-350 = "Get all the foam off all the mirrors and windows."
10037-360 = "Then wipe it all again with newspaper."
10037-370 = "That'll give you a truly streak-free shine!"
10037-380 = "Also, this kind of cleaning agent can be dangerous to use in a closed room."
10037-390 = "Don't forget you need proper ventilation!"
10037-400 = "Safety first! Keep your wits about you when you're fighting contaminants!"
10037-410 = "Protect the hygiene of Red Winter Academy!"
10037-2600 = "That's a great piece of equipment. I should be able to wipe out enemies with it."

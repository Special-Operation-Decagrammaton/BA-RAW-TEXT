[translation]
10037-10 = "블루 아카이브!"
10037-20 = "날 부른 게 선생인가.\n체리노 회장의 명령서는 갖고 왔겠지?"
10037-30 = "시원한 캄포트나\n한 잔 마셨으면\n좋겠는데……"
10037-40 = "따듯하고\n폭신폭신하니\n잠이 오는군……."
10037-50 = "앗, 이래서는 안 되지.\n더욱 가혹하게 훈련을\n하지 않으면……!"
10037-60 = "이 공간은 널찍하니\n돌격 훈련을 하기에\n좋겠어."
10037-70 = "이 안에서 길을 잃으면\n어떡하지……?"
10037-80 = "시간은 금이다, 선생!\n앞으로는 더 빨리\n돌아올 수 있도록!"
10037-90 = "돌아왔는가, 선생.\n오늘도 힘차게 돌격이다!"
10037-100 = "우리 붉은겨울의 곰들은\n아무런 두려움 없이\n사냥을 시작한다!"
10037-110 = "게으름을 피운다면\n사보타주 혐의로\n사무국에 고발하겠다!"
10037-120 = "어, 어딜 만지는 건가!\n특별반으로 보내버리겠다!"
10037-130 = "메드베지가 누구냐고?"
10037-140 = "메드베지는 나의\n잠자리를 함께 해주는\n충직한 곰인형이다."
10037-150 = "그가 없으면\n편안한 숙면을\n보장할 수 없지."
10037-160 = "체리노 회장이 귀엽다고……?"
10037-170 = "흠, 흠! 나도 그렇게 생각한다."
10037-180 = "오늘이 선생의 생일인가?\n경사스러운 일이군."
10037-190 = "사무국에 연락해\n특별 보급품을 받을 수\n있도록 조치하겠다."
10037-200 = "내 생일이라고 해서\n특별한 조치를\n취할 필요는 없다."
10037-210 = "다만 선생이\n함께 있어준다면……"
10037-220 = "조금 기쁠지도\n모르겠군……."
10037-230 = "올 한 해는 모든 방향으로\n돌격할 수 있도록 준비에\n만전을 다하자고!"
10037-240 = "산타클로스…… 하룻밤 만에\n모든 키보토스의 학원을\n다녀간다니,"
10037-250 = "그 얼마나 무시무시한\n속도인가!"
10037-260 = "장난을 치지 않으면\n사탕을 나누어준다고……?"
10037-270 = "무슨 소리,\n사탕은 모든 학생들에게\n공평하게 돌아가야 한다!"
10037-290 = "큿…… 틈새에 생긴\n이 얼룩은 제법 끈질기군."
10037-300 = "하지만 이 보안위원장의 맹격을\n언제까지 버텨낼 수 있을까?"
10037-310 = "후후, 이 신무기의 위력을\n우습게 보지 말라고."
10037-320 = "새로 구입한\n이 세정제만 있으면"
10037-330 = "손이 닿지 않는 틈새까지\n완벽하게 청소할 수 있어!"
10037-340 = "잠깐! 기다려라, 선생.\n거울과 유리창은\n세제로 닦아낸 뒤에"
10037-350 = "마른 걸레로\n물기를 꼭 제거하라고\n말하지 않았나!"
10037-360 = "이런 작업은 특히나\n신문지를 사용해야만,"
10037-370 = "원래의 반짝임을\n되찾을 수 있다고!"
10037-380 = "그리고 이런 세정제는\n밀실에서 사용하면\n매우 위험할 수 있으니,"
10037-390 = "사용 시에는\n꼭 환기를 잊지 말도록!"
10037-400 = "제대로 안전에 유의하며,\n붉은겨울 학원의 위생을\n위협하는 오염 물질을"
10037-410 = "철저히 소탕하는 거다!"
10037-2600 = "훌륭한 장비군.\n이걸로 적들을\n쓸어버릴 수 있겠어."

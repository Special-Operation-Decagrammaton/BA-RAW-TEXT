[translation]
10037-10 = "Blue Archive!"
10037-20 = "คนที่เรียกฉันคือคุณครูงั้นเหรอ\nเอาหนังสือคำสั่งของประธานเชริโน่มาแล้วรึเปล่า?"
10037-30 = "ถ้าได้ดื่ม\nคัมพอตเย็นชื่นใจสักแก้ว\nก็คงดีนะ..."
10037-40 = "อบอุ่น\nและนุ่มสบายแบบนี้\nทำเอาง่วงนอนเลยนะ..."
10037-50 = "อ๊ะ ทำแบบนี้ไม่ได้สิ\nถ้าไม่ฝึกฝนอย่างเข้มงวด\nแล้วละก็...!"
10037-60 = "บริเวณนี้กว้างดีนะ\nเหมาะที่จะใช้\nเป็นพื้นที่ซ้อมจริงๆ"
10037-70 = "ถ้าหลงทางที่นี่...\nจะทำยังไงนะ...?"
10037-80 = "เวลาเป็นเงินเป็นทองนะ คุณครู!\nต่อไปพวกเราจะต้องกลับมาให้เร็วขึ้น!"
10037-90 = "มาแล้วเหรอ คุณครู\nวันนี้ก็ลุยให้เต็มที่เลย!"
10037-100 = "พวกเราเหล่าเรดแบร์\nแห่งเรดวินเทอร์จะเริ่มการล่า\nโดยไม่หวั่นเกรงต่ออะไรแล้ว!"
10037-110 = "ถ้าทำตัวขี้เกียจละก็\nฉันจะแจ้งไปยังสำนักเลขาธิการ\nในข้อหาก่อวินาศกรรม!"
10037-120 = "จะ...จับตรงไหนอยู่น่ะ!\nต้องส่งไปที่ห้องเรียนพิเศษสักหน่อยแล้ว!"
10037-130 = "เมดเวเดฟคือใครน่ะเหรอ?"
10037-140 = "เมดเวเดฟก็คือ\nสหายตุ๊กตาหมีผู้ภักดี\nที่อยู่เป็นเพื่อนตอนฉันนอนยังไงล่ะ"
10037-150 = "ถ้าไม่มีมันละก็...\nฉันคงนอนหลับ\nได้ไม่สบายใจเท่าไร"
10037-160 = "ท่านประธานเชริโน่น่ารักงั้นเหรอ...?"
10037-170 = "ฮึ่ม ฮึ่ม...! ฉันเองก็คิดแบบนั้นเหมือนกัน"
10037-180 = "วันนี้เป็นวันเกิดคุณครูเหรอ?\nเป็นเรื่องที่น่ายินดีจริงๆ"
10037-190 = "ฉันจะแจ้งไปทางสำนักเลขาธิการ\nให้เตรียมเสบียงพิเศษ\nไว้ให้คุณครูก็แล้วกัน"
10037-200 = "ถึงจะเป็นวันเกิด\nแต่ก็ไม่ต้องมีอะไร\nที่เป็นพิเศษ"
10037-210 = "แต่ว่าถ้าคุณครู...\nอยู่ด้วยกันแบบนี้..."
10037-220 = "ก็อาจจะดีใจนิดหน่อยก็ได้..."
10037-230 = "ในปีนี้ก็ทุ่มเทพลังที่พวกเรา\nจะทำได้เพื่อสร้างความเปลี่ยน\nแปลงในทุกทางกันเถอะ!"
10037-240 = "ซานตาคลอส...\nเดินทางไปทุกโรงเรียน\nในคิโวทอสในคืนเดียวเหรอ"
10037-250 = "ความเร็วปีศาจจริงๆ!"
10037-260 = "ถ้าไม่เล่นอะไรแปลกๆ\nเดี๋ยวจะแบ่งขนมให้เหรอ...?"
10037-270 = "พูดอะไรน่ะ\nต้องแบ่งขนมให้ทุกคน\nอย่างเท่าเทียมกันสิ!"
10037-290 = "ชิ... รอยเปื้อนนี่มัน\nติดแน่นทนนานจริงๆ"
10037-300 = "แต่จะทนการจู่โจมของหัวหน้า\nคณะความมั่นคงไปได้อีกนาน\nแค่ไหนกัน?"
10037-310 = "ฮุฮุ อย่ามาดูถูก...\nพลังของอาวุธใหม่ชิ้นนี้นะ"
10037-320 = "ถ้ามีน้ำยาทำความสะอาด\nที่ซื้อมาใหม่นี้ละก็..."
10037-330 = "ขจัดได้แม้แต่คราบฝังแน่น\nที่อยู่ในจุดที่ขัดถูไม่ถึง"
10037-340 = "เดี๋ยวก่อน! รอก่อนสิครู\nฉันบอกไปแล้วไม่ใช่รึไง"
10037-350 = "ว่าหลังจากใช้น้ำยา\nเช็ดกระจกกับหน้าต่างแล้ว\nอย่าใช้ผ้าแห้งเช็ดออกน่ะ!"
10037-360 = "การเช็ดกระจกแบบนี้\nต้องใช้กระดาษหนังสือพิมพ์\nถึงจะเช็ดออกหมดได้…!"
10037-370 = "กระจกจะได้กลับไปใสสะอาด\nเหมือนเดิมยังไงเล่า!"
10037-380 = "และน้ำยาทำความสะอาดแบบนี้\nถ้าเอาไปใช้ที่ห้องปิดละก็\nคงจะอันตรายมากๆ เลย "
10037-390 = "และหลังเช็ดเสร็จแล้ว\nก็ต้องระบายอากาศให้ดีด้วย!"
10037-400 = "เราต้องระวังเรื่องความปลอดภัย\nสิ่งสกปรกอะไรก็ตามที่คุกคาม\nสุขอนามัยของสหภาพเรดวินเทอร์"
10037-410 = "จะต้องถูกกวาดล้างออกไป\nให้หมด!"
10037-2600 = "เป็นอุปกรณ์ที่ยอดเยี่ยมจริงๆ\nถ้ามีอาวุธนี้\nก็จะกำจัดศัตรูได้หมด"

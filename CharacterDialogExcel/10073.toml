[translation]
10073-10 = "B... Blue... Archive..."
10073-20 = "อึก...ฉันก็ไม่ชอบข้างนอกเลย...\nมันทั้งร้อน ทั้งชื้น...\nทำไมฤดูร้อนถึงเป็นแบบนี้นะ"
10073-30 = "อ่า... ที่นี่\nก็มีคนเต็มไปหมด..."
10073-40 = "มีที่ไหน...\nที่จะอยู่เงียบๆ\nคนเดียวได้บ้าง..."
10073-50 = "คงเป็นเพราะใส่ชุดแบบนี้\nเลยวุ่นวายมากกว่าปกติอีก..."
10073-60 = "เฮ้อ... จริงๆ เลย"
10073-70 = "แต่ก็นะ...\nบรรยากาศที่นี่\nก็ไม่ได้แย่เท่าไร"
10073-80 = "อ๊ะ คุณครู\nฉันกำลังรออยู่เลยค่ะ"
10073-90 = "ฉันเตรียมกาแฟ...\nอเมริกาโน่ไว้แล้วค่ะ"
10073-100 = "เชิญค่ะ คุณครู\nฉัน...จะช่วยเองค่ะ..."
10073-110 = "ยกเว้นให้ฉัน...\nออกไปข้างนอกค่ะ"
10073-120 = "คิดแล้วเชียว ในอาคารนี่ดีจริงๆ เลย\nรู้สึกปลอดภัยขึ้นเยอะเลย..."
10073-130 = "ถ้าอยู่กันสองคนก็คงจะ\nเงียบสงบ แล้วก็สบายใจขึ้น..."
10073-140 = "ปะ...เปล่านะคะ\nฉันไม่ได้พูดอะไรเลยค่ะ"
10073-150 = "ฉันช่วยคุณครู\nจัดการเอกสารได้ก็จริง..."
10073-160 = "แต่ว่าฉันไม่ค่อยถนัด\nใช้คอมพิวเตอร์สักเท่าไร..."
10073-170 = "คราวหน้า... ลองเปลี่ยนมา\nทำงานที่ห้องสมุดเก่ามั้ยคะ?"
10073-180 = "ถ้าเป็นคำขอของคุณครูละก็\nฉันยินดีช่วยทุกเรื่องเลยค่ะ"
10073-190 = "นานๆ ที... ถึงเป็นคำขอแปลกๆ\nก็ไม่เป็นไรค่ะ"
10073-200 = "สุขสันต์วันเกิดค่ะ คุณครู"
10073-210 = "อ่า... ชุดนี้...\nไม่ได้มีความหมายอื่นหรอกค่ะ"
10073-220 = "วันเกิดฉันเหรอคะ...\nฉันเพิ่งนึกออกเลยค่ะ"
10073-230 = "ถ้าอยู่กับคุณครู\nฉันคงจะลืมเรื่องอื่นๆ\nไปหมดเลยน่ะค่ะ"
10073-240 = "ขอให้มีความสุขในวันปีใหม่ค่ะ คุณครู"
10073-250 = "ปีนี้... ฉันอยากใช้เวลาด้วยกัน\nในที่ร่มมากกว่าที่ชายหาดน่ะค่ะ"
10073-260 = "คริสต์มาส...เหรอคะ?"
10073-270 = "ไม่ใช่วันพิเศษอะไรหรอกค่ะ"
10073-280 = "หมายถึง...ก่อนที่จะได้\nเจอคุณครู...น่ะค่ะ"
10073-290 = "ข้างนอกเสียงดังกันจังเลยนะคะ..."
10073-300 = "ถ้าไปที่ทะเลเงียบๆ\nอาจจะดีกว่าก็ได้ค่ะ"
10073-320 = "ปะ...เป็นยังไงคะ...?\nที่ซ่อนตัวของฉัน..."
10073-330 = "บรรยากาศ...\nดีมากเลยใช่มั้ยล่ะคะ?\nฮิฮิ..."
10073-340 = "คุณครู...\nอยากลองเข้ามามั้ยคะ...?\nมันสบายกว่าที่คิดไว้เยอะเลย"
10073-350 = "อ่า... แต่ถ้าเข้ามาสองคน\nมันจะแคบไปหน่อยรึเปล่านะ..."
10073-360 = "คะ...? แค่ดูจากข้างนอก\nก็พอแล้ว...?"
10073-370 = "ถ้างั้น... ที่บอกให้คุณครูมา\nก็ไม่มีความหมายน่ะสิ..."
10073-380 = "แต่ยังไง... ที่แบบนี้น่ะ\nดีจังเลยนะคะ"
10073-390 = "บางที... ข้างนอก\nคงไม่ได้มีแต่เรื่องแย่ๆ ก็ได้"
10073-400 = "...คือว่าคุณครู...\nถ้าคุณครูไม่ติดอะไรละก็..."
10073-410 = "อยากลองดื่ม... สักแก้วมั้ยคะ?"
10073-2600 = "อืม คิดไม่ถึงเลยค่ะ\nแต่ฉันมีค่ามากพอที่คุณครู...\nจะทำให้ถึงขนาดนี้เลยเหรอคะ...?\nขอโทษค่ะ ไม่ได้ตั้งใจพูดแบบนี้\nเลยค่ะ ฉันจะพยายามให้เต็มที่\nสมกับที่คุณครูคาดหวังนะคะ"

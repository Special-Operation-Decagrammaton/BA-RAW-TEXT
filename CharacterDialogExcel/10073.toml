[translation]
10073-10 = "蔚、蔚藍檔案……"
10073-20 = "唔，唔唔……我本來就已經不喜歡外面了……\n又熱又潮濕……所以才說夏天就是……"
10073-30 = "啊…這裡也\n全都是人…"
10073-40 = "有沒有…可以\n安靜獨處的地方…"
10073-50 = "不知道是不是因為\n這身服裝，感覺\n比平常更難以冷靜…"
10073-60 = "唉…真是的。"
10073-70 = "不過…\n這裡的氣氛，\n好像也不壞。"
10073-80 = "啊，老師，\n恭候多時了。"
10073-90 = "黑咖啡已經泡好了。"
10073-100 = "歡迎回來，老師。\n我會…幫忙的哦…"
10073-110 = "但外出還是放過我吧。"
10073-120 = "果然還是室內好。\n因為能夠安心。"
10073-130 = "明明兩人獨處\n是這麼的平靜又安心…"
10073-140 = "沒，沒事，\n我什麼都沒說。"
10073-150 = "要整理文件的話\n我可以幫忙…"
10073-160 = "不過電腦，\n我不太擅長…"
10073-170 = "下次…要不要試著\n在古書館工作看看？"
10073-180 = "只要是老師的請求，\n我都會聽的哦。"
10073-190 = "難得有這種機會…\n就算有點奇怪也無所謂。"
10073-200 = "生日快樂，老師。"
10073-210 = "啊…這個打扮…\n沒有什麼，特別的意思。"
10073-220 = "我的生日，是嗎…\n我現在才發現。"
10073-230 = "只要和老師待在一起，\n該說其他事情都會被\n拋在腦後嗎…"
10073-240 = "新年快樂，老師。"
10073-250 = "今年…比起水邊，\n我更想在室內一起度過。"
10073-260 = "聖誕節，是嗎？"
10073-270 = "其實也不是什麼\n特別的日子。"
10073-280 = "…至少在遇見\n老師之前是這樣。"
10073-290 = "外面吵吵鬧鬧的呢，真是…"
10073-300 = "讓人感覺不如到\n安靜的海邊去。"
10073-320 = "怎，怎麼樣呢…？\n我的祕密基地…"
10073-330 = "氣氛，還挺不錯的對吧？\n嘻嘻…"
10073-340 = "老師要不要也\n進來看看？\n意外的很舒適哦。"
10073-350 = "啊…兩個人一起進來，\n會不會有點擠呢…"
10073-360 = "…咦？\n用看的就夠了…？"
10073-370 = "…那樣的話，\n請老師過來的意義就…"
10073-380 = "…不過，\n這樣真不錯呢。"
10073-390 = "外面…\n或許未必都是\n壞事也說不定。"
10073-400 = "…那個，老師…\n如果，不介意的話…"
10073-410 = "要不要…來一杯呀？"
10073-2600 = "那個……事到如今說這些可能有點晚了……\n我真的，有讓你……\n為我付出這麼多的價值嗎……？\n……對不起，已經約好不再說這種話了對吧。\n我會盡己所能的。\n因為那是老師的願望。"

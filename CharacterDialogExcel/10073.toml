[translation]
10073-10 = "브, 블루 아카이브……."
10073-20 = "으, 으으…. 그렇잖아도 밖은 싫은데….\n덥고 습하고…. 이래서 여름은…."
10073-30 = "아…. 여기도\n사람이 잔뜩…."
10073-40 = "어디 혼자\n조용히 있을 곳이…."
10073-50 = "이 모습 때문인지,\n평소보다 정신없네…."
10073-60 = "하아…. 진짜."
10073-70 = "그래도 뭐…\n여기 분위기는\n나쁘지 않은 것 같기도."
10073-80 = "아, 선생님.\n기다리고 있었어요."
10073-90 = "아메리카노\n타 두었거든요."
10073-100 = "어서 오세요, 선생님.\n도와…드릴게요…"
10073-110 = "나가는 것만, 빼고요."
10073-120 = "역시 실내가 좋네요.\n안정이 돼서……."
10073-130 = "둘만 있으면 이렇게\n조용하고 마음 편해지는데…."
10073-140 = "아, 아니에요.\n아무 말도 안 했으니까요."
10073-150 = "서류 정리는\n도와드릴 수 있지만,"
10073-160 = "컴퓨터 쓰는 쪽은\n조금 약해서…."
10073-170 = "다음 번에… 고서관에서\n작업해 보시겠어요?"
10073-180 = "선생님의 부탁이라면\n뭐든 들어 드릴게요."
10073-190 = "모처럼이니,\n조금 이상한 것도 괜찮아요."
10073-200 = "생일축하드려요, 선생님."
10073-210 = "아. 이 복장은…\n별다른 뜻은 없어요."
10073-220 = "제 생일, 이라…\n지금 알았어요."
10073-230 = "선생님과 함께 있으면,\n다른 것을\n잊어버린다고 할까요…."
10073-240 = "새해 복 많이 받으세요, 선생님."
10073-250 = "올해는…. 물가 같은 데가 아니라\n실내에서 함께 지내고 싶네요."
10073-260 = "크리스마스…요?"
10073-270 = "딱히 특별한 날은 아니었어요."
10073-280 = "…선생님을 만나기 전까지는, 요."
10073-290 = "밖이 시끄럽네요, 벌써…"
10073-300 = "조용한 바다로 가는 게,\n그나마 나을 것 같아요."
10073-320 = "어, 어떤가요…?\n저의 은신처…."
10073-330 = "꽤… 분위기 있죠?\n히히…."
10073-340 = "선생님께서도\n들어와 보시겠어요?\n의외로 아늑한데."
10073-350 = "아…. 둘이서 들어오는 건\n조금 좁으려나…."
10073-360 = "…네? 보기만 해도\n충분…?"
10073-370 = "…그러면 선생님을\n불러낸 의미가…."
10073-380 = "…그래도 좋네요,\n이런 거."
10073-390 = "밖에도…\n나쁜 일만 있는 건\n아닐지도 모르겠어요."
10073-400 = "…저기, 선생님….\n혹시 괜찮으시다면…."
10073-410 = "한 잔…. 하시겠어요?"
10073-2600 = "저. 새삼스러울지도 모릅니다만\n이렇게까지 해주실만한 가치가…\n정말, 저에게 있는 것일까요…?\n죄송합니다, 이런 소리 하지 않기로 했죠.\n최대한 해보겠습니다.\n선생님의 바람이니까요."

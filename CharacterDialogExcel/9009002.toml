[translation]
9009002-10 = "いらっしゃい、先生。"
9009002-20 = "ふふ、待ってたよ。"
9009002-30 = "ん？どうしたの？"
9009002-40 = "そんな目で見つめても、\nこの明太子味のお菓子は\nあげないんだから。"
9009002-50 = "つ、角は触らないで…！\n敏感なところなんだから！"
9009002-60 = "リン先輩とあなたは…\nとても忙しそうね。"
9009002-70 = "何よ、今チビのくせに…\nとか思ったでしょ？"
9009002-80 = "あなたは理解が早くて助かる。\n今回の任務もよろしくね。"
9009002-90 = "あははは！\n生徒のためなら何でもするなんて、\nあなたも相当バカみたいね。"

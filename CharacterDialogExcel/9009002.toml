[translation]
9009002-10 = "เชิญเลย คุณครู"
9009002-20 = "ฮุฮุ ฉันกำลังรอคุณครูอยู่เลย"
9009002-30 = "หืม? มีอะไรเหรอ?"
9009002-40 = "ถึงจะมองด้วยสายตาแบบนั้นแต่ฉัน\nไม่แบ่งมันฝรั่งทอดรสไข่ปลาให้หรอก"
9009002-50 = "อย่ามาแตะเขาของฉันนะ!\nนี่เป็นที่ที่อ่อนไหวมากๆ"
9009002-60 = "คุณกับรุ่นพี่ริน...\nดูยุ่งกันมากเลยนะ"
9009002-70 = "ว่าไงนะ เมื่อกี้คิดว่า...\nแค่เด็กตัวเล็กๆ ใช่ไหม?"
9009002-80 = "คุณหัวไวดีน่าจะพอช่วยได้\nภารกิจครั้งนี้ก็ขอฝากด้วยแล้วกันนะ"
9009002-90 = "ฮ่าฮ่าฮ่า! ถ้าเพื่อเด็กนักเรียนล่ะก็\nจะยอมทำทุกอย่างงั้นเหรอ\nช่างเป็นคนที่บ้าบอจริงๆ เลยนะ"

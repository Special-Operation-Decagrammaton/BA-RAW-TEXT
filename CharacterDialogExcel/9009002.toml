[translation]
9009002-10 = "어서 와, 선생."
9009002-20 = "후후, 기다리고 있었다구."
9009002-30 = "으응? 무슨 일이야?"
9009002-40 = "그런 눈으로 쳐다봐도\n이 명란 과자는 안 줄 거야."
9009002-50 = "뿔은… 만지지 마!\n민감한 부분이란 말이야!"
9009002-60 = "린 선배랑 당신은…\n참 바빠보이네."
9009002-70 = "뭐야, 방금 꼬맹이 주제에…\n라고 생각했지?"
9009002-80 = "당신은 이해가 빨라서 도움이 돼.\n이번 임무도 잘 부탁해."
9009002-90 = "하하하!\n학생을 위해서라면 뭐든지 한다니,\n당신도 어지간한 바보인가 보네."

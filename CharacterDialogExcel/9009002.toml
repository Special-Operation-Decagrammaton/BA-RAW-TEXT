[translation]
9009002-10 = "歡迎光臨，老師。"
9009002-20 = "呵呵，我一直在等著你唷。"
9009002-30 = "嗯？怎麼了？"
9009002-40 = "就算用那種眼神看我，\n也不會給你這個明太子口味的餅乾的。"
9009002-50 = "不，不要碰我的角…！\n那裡很敏感！"
9009002-60 = "琳前輩和你…\n應該很忙吧。"
9009002-70 = "什麼啊，明明只是個小不點…\n你是這麼想的吧？"
9009002-80 = "你理解得真快，真是幫大忙了。\n這次的任務也拜託了唷。"
9009002-90 = "啊哈哈哈！\n只要是為了學生，什麼都願意做，\n你也是相當傻呢。"

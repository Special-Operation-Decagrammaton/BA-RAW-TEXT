[translation]
10060-10 = "Blue Archive~♪"
10060-20 = "ยะฮู้ว~! จะให้รื้อตรงไหนดี?\nหรือให้ขุดตรงไหนมั้ย? จะให้ทำแบบไหนก็บอกได้เลย~!"
10060-30 = "ที่นี่เป็นที่ของคุณครู...?\nโอ้ววว...!!"
10060-40 = "คงไม่มี... ออนเซ็นสินะ?"
10060-50 = "ก็นะ ที่นี่เป็นที่ของคุณครูนี่นา\nเว้นที่นี่ไว้ดีมั้ย?"
10060-60 = "หืม?\nคนคนนั้น... เฮือก!"
10060-70 = "คนเยอะจังเลยแฮะ\nเสียงดังวุ่นวายดีจังเลยนะ!?"
10060-80 = "อ๊ะ คุณครู! เชิญเลย~\nวันนี้ทำอะไรดี? พัฒนาออนเซ็นมั้ย?"
10060-90 = "กำลังรออยู่เลย คุณครู! \nไม่ว่าอะไรก็บอกได้เลย\nฉันจะลงมือทันที!!"
10060-100 = "ว่าแต่... จะให้ฉันทำอะไรดีล่ะ?"
10060-110 = "กอดให้อุ่นๆ ดีมั้ย?\nหรือว่า..."
10060-120 = "อืม? ตอนที่ไม่มีงาน\n...ฉันทำอะไรบ้างนะ?"
10060-130 = "อ๊ะ! ก็หางานไงล่ะ!"
10060-140 = "เวลาเห็นอะไรพันกันยุ่งเหยิง\nฉันมักจะทนไม่ค่อยได้น่ะ"
10060-150 = "ตัดทิ้งให้หมด แล้วเริ่มใหม่\nตั้งแต่แรกน่าจะเร็วกว่านะ!"
10060-160 = "หิวเหรอ?\nฉันต้มราเม็งให้เอามั้ย?"
10060-170 = "เอ๋? อุปกรณ์น่ะเหรอ?"
10060-180 = "ก็ใช้ไอ้นี่ไงล่ะ~♪"
10060-190 = "ปรับระดับได้รึเปล่าน่ะเหรอ?"
10060-200 = "ได้มั้ง? คิดว่านะ\nฉันเองก็ไม่เคยทำมาก่อนเลย!"
10060-210 = "สุขสันต์วันเกิดนะคุณครู!\nวันนี้เป็นวันที่ร้อนแรงจัง!"
10060-220 = "อื้อ! วันนี้เป็นวันเกิดฉันละ!\nของขวัญที่อยากได้งั้นเหรอ?"
10060-230 = "อะไรสักอย่างที่ตัดได้?"
10060-240 = "สวัสดีปีใหม่~!"
10060-250 = "ปีนี้ขอให้มีงานเยอะๆ...\nขอให้งานทำลายสิ่งกีดขวาง\nกับงานขุดดินเยอะๆ ด้วยเถอะ!!"
10060-260 = "วันนี้แล้วสินะ!\nวันที่เด็กดีจะได้รับของขวัญ"
10060-270 = "ดีละ!\nถ้างั้นฉันจะได้อะไรนะ?\nชักตื่นเต้นแล้วสิ!"
10060-280 = "ข้างนอกมีพวกที่เล่นสนุก\nอยู่เยอะเลย..."
10060-290 = "วันนี้ถ้าโดนพวกกรรมการวินัยจับได้\nก็คงหนีไปได้ง่ายๆ แหละมั้ง?"
10060-310 = "อ๊ะ~!\nคุณครูจริงๆ ด้วย!\nฉันกำลังรออยู่เลย!"
10060-320 = "ยุ่งอยู่เหรอ? โทษทีนะ!\nแต่ว่ามันเรื่องด่วนมากเลย!"
10060-330 = "อา~ ก็นะ...\nออนเซ็นตรงนี้น่ะ\nไม่ได้มีตลอดหรอกนะ"
10060-340 = "จะอยู่อีกแค่ไม่กี่ชั่วโมงเท่านั้นแหละ!\nฉันอยากให้คุณครูมาลอง\nก่อนมันจะเหือดแห้งไปน่ะ!"
10060-350 = "หืม...? แล้วยังไง?\nฉันขุดคนเดียวแหละ!"
10060-360 = "เห็นแบบนี้ฉันก็อยู่ชมรมพัฒนาออนเซ็นนะ!\nไม่ว่ายังไงก็คงปล่อย\nคนที่ต้องการน้ำอุ่นๆ ไปไม่ได้หรอก"
10060-370 = "ยิ่งไปกว่านั้น...\nมันเป็นเรื่องของคุณครูด้วยนี่นา!\n...ฮิฮิ!"
10060-380 = "เอาละๆ เลิกเกรงใจแล้วลงไปแช่ได้แล้ว!\nตอนนี้อุณหภูมิกำลังเหมาะเลย!"
10060-390 = "เมกุ สเปเชียลออนเซ็น\nสำหรับคุณครูโดยเฉพาะ!"
10060-2600 = "เอ๋? ให้ฉันเหรอ? ทำไมล่ะ?\nอืม~ ฉันมันหัวทึบ\nเลยไม่ค่อยเข้าใจเท่าไร...\nแค่พยายามให้เต็มที่ก็พอใช่มั้ย!\nอะฮ่ะฮ่ะฮ่า!!"

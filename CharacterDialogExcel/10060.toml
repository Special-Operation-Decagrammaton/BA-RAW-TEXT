[translation]
10060-10 = "蔚藍——！檔案～♪"
10060-20 = "呀齁～！要我削掉哪裡呢？\n還是要把哪裡挖起來呢？儘管說吧～！"
10060-30 = "這就是老師的…？\n哦哦…！！"
10060-40 = "溫泉…應該不會湧出來吧？"
10060-50 = "算了，畢竟是老師的地盤。\n把這裡當例外吧。"
10060-60 = "咦？\n那個人是…哈！"
10060-70 = "人真多呢。\n熱熱鬧鬧的真不錯！"
10060-80 = "哦，老師！歡迎回來～\n今天要做什麼呢？製作溫泉？"
10060-90 = "我在等你唷，老師！\n任何事都儘管說！\n我會立刻著手進行！"
10060-100 = "話說，我該在這裡\n做什麼好呢？"
10060-110 = "要我來溫暖你嗎？\n還是說……"
10060-120 = "嗯？沒有工作的時候？\n…我在做什麼來著？"
10060-130 = "啊！在找工作！"
10060-140 = "看見糾結在一起的東西\n我就會難以忍受呢。"
10060-150 = "全部剷除之後，從頭\n再來一次比較快！"
10060-160 = "肚子餓了嗎？\n要不要幫你煮個杯麵？"
10060-170 = "咦？道具？"
10060-180 = "…用這個煮唷～♪"
10060-190 = "你問能不能調整力度？"
10060-200 = "可以唷？大概。\n我沒試過就是了！"
10060-210 = "生日快樂，老師！\n今天是火熱的一天呢！"
10060-220 = "沒錯！今天是我的生日！\n想要的生日禮物…？"
10060-230 = "能剷除的東西之類的？"
10060-240 = "新年快樂～！"
10060-250 = "今年請給我更多的工作…\n更多的障礙物和\n能挖掘的土地吧！！"
10060-260 = "是今天嗎？\n當乖孩子就能\n收到禮物的日子。"
10060-270 = "真好呢！我會收到什麼呢？\n真是期待！"
10060-280 = "街上到處都是打扮的\n不可思議的孩子…"
10060-290 = "今天就算被風紀委員抓到\n應該也能逃跑吧？"
10060-310 = "啊～！\n果然是老師啊！\n我在等你唷！"
10060-320 = "你很忙？抱歉！\n但是請快一點！"
10060-330 = "啊啊～確實是這樣沒錯…\n但這並不是\n會一直湧出來的溫泉。"
10060-340 = "只剩下幾個小時了！\n所以希望在乾枯之前\n請老師過來！"
10060-350 = "…嗯？對唷？\n是我一個人製作的唷！"
10060-360 = "別看我這樣，\n我可是溫泉開發部！\n再說，對需要熱水的人\n視而不見可是不行的。"
10060-370 = "更重要的是，\n這件事跟老師有關呀！\n…嘻嘻！"
10060-380 = "來吧來吧！別客氣儘管泡！\n現在的溫度最棒了！"
10060-390 = "這是惠特製的\n老師專用溫泉唷！"
10060-2600 = "咦，要給我嗎？為什麼？\n嗯～因為我是笨蛋，所以不太清楚…\n算了，只要拚命去做總會有辦法吧！\n啊哈哈哈！！"

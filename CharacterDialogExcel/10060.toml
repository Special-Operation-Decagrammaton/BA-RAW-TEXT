[translation]
10060-10 = "Bluuue! Archiiive! ♪"
10060-20 = "Yay! What do you want me to work on? Where should I dig? I can excavate whatever you want!"
10060-30 = "Wow! So this is your...?"
10060-40 = "Not...these hot springs, right?"
10060-50 = "Well, since this place is yours, I'll make it an exception."
10060-60 = "Huh? Is that...? *gasp*"
10060-70 = "There sure are a lot of people! It's bustling. I like it!"
10060-80 = "Hi Sensei! Welcome! What should we do today? Do you want to build a hot spring?"
10060-90 = "I've been waiting for this moment! Say the word and I'll get started!"
10060-100 = "Hmm... What should I do here?"
10060-110 = "Do you need to be warmed up? Or..."
10060-120 = "What do I do in my free time? Uh... I dunno..."
10060-130 = "Oh! You were looking for work!"
10060-140 = "I hate when things get complicated. You can't just ignore the problem, either..."
10060-150 = "That's why I like to get rid of things and start all over!"
10060-160 = "Are you hungry? Do you want me to make you some ramen?"
10060-170 = "Huh? Tools?"
10060-180 = "I'll use this! ♪"
10060-190 = "Adjusting the output? Hm... I dunno..."
10060-200 = "It'll work. Probably...I think! I've never tried!"
10060-210 = "Happy birthday, Sensei! It's so hot out today!"
10060-220 = "Oh yeah! Today's my birthday! Hm... What do I want as a present...?"
10060-230 = "How about an excavator?"
10060-240 = "Happy New Year!"
10060-250 = "My wish for the year...is more hot springs to build and more land to dig!"
10060-260 = "Isn't today the day nice kids get gifts?"
10060-270 = "Oh! That's so exciting! I wonder what I'll get."
10060-280 = "There's a bunch of people outside...and they look like weirdos."
10060-290 = "Maybe it'll make it easy to escape from the Prefect Team today!"
10060-310 = "Oh! Sensei, there you are! I've been waiting!"
10060-320 = "Were you busy? Sorry! It's kinda urgent!"
10060-330 = "Oh, yeah! Yeah, I made it, but... The thing is that this hot spring won't last for very long."
10060-340 = "There's only a few hours left! That's why I really wanted you to come out here before it dries up!"
10060-350 = "...Huh? Yeah... I made it on my own. Why?"
10060-360 = "Well, I'm from the Hot Springs Department, of course! It's my job to bring hot water to people in need!"
10060-370 = "And, um... I want to help you out especially! Heehee!"
10060-380 = "All right! Don't be shy! Hop on in. The water's fine!"
10060-390 = "It's a super-special hot spring I made just for you!"
10060-2600 = "What? You're giving me this? Why? Um, I don't understand... But I guess I'll just keep working hard! Hahaha!"

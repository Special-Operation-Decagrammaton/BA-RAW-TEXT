[translation]
10060-10 = "블루- 아! 카이브으~♪"
10060-20 = "야호~! 어딜 밀었으면 좋겠어?\n아니면 파낼까? 뭐든 말하라구~!"
10060-30 = "여기가 선생님의…?\n오오…!!"
10060-40 = "온천…은 안 나겠지?"
10060-50 = "뭐, 선생님의 장소니까.\n여기는 예외로 칠까?"
10060-60 = "응?\n저 사람은… 헉!"
10060-70 = "사람들이 많네.\n시끌시끌하니 좋잖아!?"
10060-80 = "오, 선생님! 어서 와~.\n오늘은 뭐 할까? 온천 개발?"
10060-90 = "기다리고 있었어, 선생님!\n뭐든지 말해!\n바로 착수할 테니!"
10060-100 = "근데 나 여기서 뭐 하면 돼?"
10060-110 = "따듯하게 덥혀줄까?\n아니면…"
10060-120 = "응? 일 없을 때?\n……뭐했더라?"
10060-130 = "아! 일을 찾았지!"
10060-140 = "복잡하게 꼬여 있는 걸\n보면 참기 어려워."
10060-150 = "밀어버리고 처음부터\n다시 하는게 빠르지!"
10060-160 = "배고파?\n라면이라도 끓여줄까?"
10060-170 = "어? 도구?"
10060-180 = "……이걸로 하지～♪"
10060-190 = "출력 조절은 가능하냐고?"
10060-200 = "될 걸? 아마도.\n해 본 적은 없지만!"
10060-210 = "생일 축하해, 선생님!\n오늘은 뜨거운 날이네!"
10060-220 = "응! 오늘이 내 생일!\n생일 선물로 갖고 싶은 거?"
10060-230 = "밀어버릴 무언가?"
10060-240 = "새해 복 많이 받아~!"
10060-250 = "올해는 더 많은 일을……\n장애물과 팔 수 있는\n땅을 주세요!!"
10060-260 = "오늘이었나?\n착하게 있으면 선물 받는 날."
10060-270 = "좋네!\n나는 뭘 받을까?\n기대된다!"
10060-280 = "밖에 신기한 모습을 한\n녀석들이 잔뜩…"
10060-290 = "오늘은 선도부한테\n걸려도 도망칠 수 있을지도?"
10060-310 = "아~!\n역시 선생님이었구나!\n기다리고 있었다고!"
10060-320 = "바빴어? 미안!\n그치만 급했거든!"
10060-330 = "아아~. 그렇긴 한데…\n이거, 계속 나오는\n온천이 아니거든?"
10060-340 = "앞으로 몇 시간밖에 안 남았어!\n마르기 전에\n선생님이 왔으면 해서!"
10060-350 = "…응? 그런데?\n혼자 만든 거야!"
10060-360 = "이래 봬도 온천개발부니까!\n아무래도, 따듯한 물이 필요한\n사람을 지나칠 순 없거든."
10060-370 = "뭣보다…\n선생님의 일이고 말이지!\n…히히!"
10060-380 = "자, 자! 사양 말고 들어가!\n지금 한창 좋을 온도라고!"
10060-390 = "메구 특제,\n선생님 전용 온천이야!"
10060-2600 = "어라, 주는 거야? 왜?\n으음~. 난 바보라서 잘 모르겠지만…\n뭐, 열심히 하면 어떻게든 되겠지!\n아하하하!!"

[translation]
16002-20 = "ถ้าต้องการคำอธิบายและไขความเข้าใจให้กระจ่าง!\nไว้ใจฉันได้เลยค่ะ!"
16002-30 = "คำตอบมักซ่อนอยู่ในคำถาม\nเสมอค่ะ แม้จะเป็นคำตอบ\nที่ผิดก็ตาม..."
16002-40 = "หือ? ใครบางคน!\nที่ไหนสักแห่ง! กำลัง\nต้องการคำอธิบายอยู่ล่ะ"
16002-50 = "ยะ... อยากอธิบายจัง!\nเดี๋ยวนี้เลย!"
16002-60 = "ไขปริศนาทั้งหมดได้แล้ว!"
16002-70 = "คำอธิบายของฉันเพอร์เฟกต์\nตลอดอยู่แล้วค่ะ ยกเว้นแค่ว่า\nมันอาจจะยาวไปสักหน่อย!"
16002-80 = "เข้ามาสิคะคุณครู!\nฉันจะอธิบายตารางงาน\nของวันนี้ให้ฟังเองค่ะ!"
16002-90 = "วันนี้เป็นวันที่ดีจังเลยนะคะ\nก่อนอื่นคุณครูช่วยมาที่\nห้องบรรยายก่อนได้มั้ยคะ?"
16002-100 = "ถ้ามีอะไรที่สงสัย\nก็ตะโกนแบบนี้ได้เลยค่ะ!"
16002-110 = "ตะโกนว่า \"โคโทริ ช่วยด้วย!\""
16002-120 = "เป็นคำถามที่ดีมากค่ะคุณครู\nฉันจะตอบคำถามให้เองค่ะ!"
16002-130 = "แว่นตานี่เหรอคะ? เท่มากเลยใช่มั้ยล่ะ?\nคุณครูก็ลองใส่ดูบ้างมั้ยคะ?"
16002-140 = "คำอธิบายคือแสงสว่างที่เอา\nชนะความมืดแห่งความไม่รู้ได้ค่ะ"
16002-150 = "แต่ถ้ามันสว่างจ้าเกินไป\nก็คงไม่ดีใช่มั้ยล่ะคะ?"
16002-160 = "อ๊ะ! มีใครบางคน\nกำลังสงสัยอะไรอยู่ค่ะ!"
16002-170 = "รีบออกปฏิบัติการกันเถอะ!"
16002-180 = "สุขสันต์วันเกิดค่ะคุณครู!\nวันเกิดคือวันพิเศษสำหรับ\nเฉลิมฉลองวันเกิดของตัวเราเอง..."
16002-190 = "อ๊ะ?! จะไปไหนเหรอคะ??"
16002-200 = "ในโอกาสที่เป็นวันเกิดของฉัน\nฉันจะเล่าเรื่องของฉันให้ฟัง..."
16002-210 = "อ๊ะ?! หยุดก่อนค่ะ!\nฉันยังพูดไม่จบเลยนะ!"
16002-220 = "เพิ่งจะเริ่มพูดเอง!"
16002-230 = "มีความสุขมากๆ ในวันปีใหม่นะคะ!"
16002-240 = "ปีนี้ฉันอยากเข้าเรียน\nวิชาของคุณครูให้มากขึ้นค่ะ"
16002-250 = "เมอร์รีคริสต์มาส!\nวันเกิดของเด็กที่ได้ชื่อว่าเป็นผู้กอบกู้\nทำไมถึงเป็นวันของคู่รักไปได้..."
16002-260 = "หืม? คนรักเหรอ...?"
16002-270 = "ทริก ออร์ ทรีต?\nถ้าไม่ให้ลูกกวาดฉันจะอธิบาย..."
16002-280 = "อ๊ะ?! ไม่ต้องให้เยอะขนาดนี้ก็ได้!"
16002-300 = "เอะ...เอ๋...!?\nทะ...ทำไมจู่ๆ\nถะ...ถึงถามเรื่องนั้นล่ะคะ...!?"
16002-310 = "ขอโทษนะคะ คือว่า...\nฉันแค่ขอถามอีกรอบได้มั้ยคะ?"
16002-320 = "เอ่อ อืม...\nงะ...งั้นเหรอคะ..."
16002-330 = "คือว่า...\nจะว่ายังไงดีล่ะคะ..."
16002-340 = "ตะ...แต่ว่า... ทำไมจู่ๆ\nถึงถามเรื่องนั้นล่ะคะ...?\nคือว่า มีเหตุผลอื่นหรือเปล่าคะ..."
16002-350 = "อ๊ะ คือว่า... ไม่ได้จำเป็นว่า\nต้องมีเหตุผลอื่นหรอกนะคะ!"
16002-360 = "นะ...แน่นอนว่าเป็นเรื่องตัวฉัน\nฉันก็ต้องรู้อยู่แล้วละค่ะ...!"
16002-370 = "คะ... คือว่าฉะ... ฉันน่ะ!\nคือว่าปกติแล้ว..."
16002-380 = "ฉันมักจะศึกษาความรู้เรื่องต่างๆ ไว้\nหรือไม่ก็นั่งคิดถึงคุณครู แล้วก็...!"
16002-390 = "อะ...เอ๋?\nเมื่อกี้ฉันพูดอะไรออกไปน่ะ...?"
16002-400 = "มักจะศึกษาหาความรู้หลายๆ อย่าง\nหรือไม่ก็นั่งคิดถึงคุณครูงั้นเหรอ...?"
16002-410 = "อะ... อะฮ่าฮ่า..."
16002-420 = "เดี๋ยวค่ะ คือว่าที่พูดไปเมื่อกี้...!\nคือ... ฮืออออ...!!"
16002-2600 = "ชื่อของอาวุธนี้ก็คือ...\nProfessor K!"

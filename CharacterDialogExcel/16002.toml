[translation]
16002-20 = "需要說明和解說的話\n就交給我吧！"
16002-30 = "答案永遠都在問題身邊。\n雖然錯誤答案也是一樣。"
16002-40 = "嗯？某個地方的某人！\n感覺好像需要說明。"
16002-50 = "唔唔，好想說明！\n現在就想！"
16002-60 = "謎底全都解開了！"
16002-70 = "我的說明一直都很完美。\n除了太長這點之外！"
16002-80 = "歡迎你來，老師！\n我來說明今天的行程！"
16002-90 = "真是美好的一天呢，老師！\n總之請先到簡報室來吧！"
16002-100 = "有疑問的話\n請出聲通知我哦！"
16002-110 = "幫幫我，亞都梨！\n像這樣！"
16002-120 = "是個好問題呢，老師！\n讓我來回答你的問題吧！"
16002-130 = "這副眼鏡？\n很帥氣對吧？\n老師要戴戴看嗎？"
16002-140 = "說明將成為克服\n無知這個黑暗的光明。"
16002-150 = "…雖然太絢爛也不行。"
16002-160 = "啊，某人現在\n正想知道些什麼呢。"
16002-170 = "老師！\n我們馬上出動吧！"
16002-180 = "生日快樂！老師！\n所謂的生日就是\n紀念自己出生的特別的日子……"
16002-190 = "啊！\n你要去哪裡啊？？"
16002-200 = "因為迎來了生日，\n稍微用我的話來說就是…"
16002-210 = "啊！請等一下！\n我的話還沒說完！"
16002-220 = "現在只是起承轉合\n的「起」而已啊！"
16002-230 = "新年快樂！"
16002-240 = "今年總覺得有種\n想要聽更多老師的課程\n的心情呢。"
16002-250 = "聖誕快樂！\n過去被稱為救世主的小孩\n誕生的日子！\n怎麼變成情人的節日了呢……"
16002-260 = "嗯？\n情人……？"
16002-270 = "不給糖就搗蛋！\n不給糖就說明…"
16002-280 = "啊，哇！\n不用這麼多！"
16002-300 = "咦……咦咦！？\n為，為什麼突然，\n咦，那，那是……！？"
16002-310 = "不好意思，以防萬一，\n可以再問一次嗎……？"
16002-320 = "咦，啊，唔……\n原，原來是這樣啊……"
16002-330 = "那，那個，\n那該怎麼說呢……"
16002-340 = "話，話說為何突然\n想知道那種事呢……？\n是不是有什麼，理由之類的……"
16002-350 = "啊，那個，沒理由\n其實也沒關係啦！"
16002-360 = "當，當然，\n畢竟是自己的事，\n我當然知道……！"
16002-370 = "那，那個，\n是，是關於我的事對吧！？\n我平常都在那個……"
16002-380 = "像是吸收各種知識，\n或是在想老師，\n然後還有……！"
16002-390 = "……？咦，我剛剛，\n說了什麼……？"
16002-400 = "吸收各種知識，\n或是在想老師……？"
16002-410 = "啊，啊哈哈……"
16002-420 = "不對剛才的是那個……！\n嗚，啊嗚……！！"
16002-2600 = "這把武器的名字是……\nProfessor K!"

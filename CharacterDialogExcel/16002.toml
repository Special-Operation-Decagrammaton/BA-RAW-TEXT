[translation]
16002-20 = "설명과 해설이 필요하다면!\n제게 맡기세요!"
16002-30 = "정답은 언제나 문제 곁에 있죠.\n오답도 그렇지만."
16002-40 = "응? 어디선가, 누군가가!\n설명을 필요로 하고 있는것 같아."
16002-50 = "으으. 설명해주고 싶어!\n지금 당장!"
16002-60 = "수수께끼는 모두 풀렸어요!"
16002-70 = "제 설명은 언제나 완벽하죠.\n지나치게 많다는 점만 빼면!"
16002-80 = "어서 오세요 선생님!\n오늘의 일정에 대해\n설명 드릴게요!"
16002-90 = "좋은 하루입니다. 선생님!\n일단 브리핑실로 와주세요!"
16002-100 = "궁금한 게 있으면\n외치세요!"
16002-110 = "도와줘요 코토리!\n라고!"
16002-120 = "좋은 질문이에요, 선생님!\n그 질문에 대답해 드리죠!"
16002-130 = "이 안경이요? 멋지지 않나요?!\n선생님도 껴보실래요?"
16002-140 = "설명은 무지라는 어둠을\n극복하는 빛이 되죠."
16002-150 = "…너무 현란하기만 해도\n안되지만."
16002-160 = "앗. 누군가가, 지금,\n궁금해하고 있어요."
16002-170 = "선생님!\n바로 출동하죠!"
16002-180 = "생일 축하 드려요 선생님!\n생일이란 자신이 태어난 날을\n기념하는 특별한 날로서…"
16002-190 = "앗!\n어디 가시는 거죠??"
16002-200 = "생일을 맞이해,\n제 이야기를 좀 해드리자면…"
16002-210 = "앗! 멈추세요!\n제 이야기는 아직 안 끝났어요!"
16002-220 = "아직 기승전결의\n기 정도라고요!"
16002-230 = "새해 복 많이 받으세요!"
16002-240 = "올해는,\n어쩐지 선생님의 강의를\n더 많이 듣고 싶네요."
16002-250 = "메리 크리스마스!\n과거 구세주라 불린 아기가\n탄생한 이날!\n어째서 연인들의 날이…"
16002-260 = "응?\n연인…?"
16002-270 = "트릭 오어 트릿!\n사탕을 주지 않으면 설명을 하겠…"
16002-280 = "앗!\n이렇게 많이는 필요 없어요!"
16002-300 = "어, 어어……!?\n어, 어째서 갑자기\n그, 그런 걸……!?"
16002-310 = "죄송해요. 혹시 모르니\n한 번만 다시 여쭤봐도……?"
16002-320 = "어, 음, 그……\n그렇군요……"
16002-330 = "그게, 뭐랄까……"
16002-340 = "그, 그런데\n왜 갑자기 그런 걸……?\n뭔가 그, 다른 이유라도……"
16002-350 = "아, 그게, 별다른 이유가\n있어야 되는 건 아니고요!"
16002-360 = "무, 물론 저에 대한 거니까\n전 알고 있지만……!"
16002-370 = "그, 그러니까 저, 저 말이죠!?\n평소에는 그게,"
16002-380 = "말하자면 다른 지식들을\n쌓는다거나 선생님 생각을\n한다거나, 그리고……!"
16002-390 = "……? 어라.\n방금 저, 무슨 말을……?"
16002-400 = "여러 지식을 쌓거나,\n선생님을 생각한다고……?"
16002-410 = "아, 아하하……"
16002-420 = "아니 방금 그건 그러니까……!\n그, 으으……!!"
16002-2600 = "이 무기의 이름은…\n프로페서 K!"

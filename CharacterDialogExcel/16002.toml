[translation]
16002-20 = "If you need an explanation or commentary, just leave it to me!"
16002-30 = "The facts are never far from the question. But neither are the lies."
16002-40 = "Oh? I sense there's someone in need of my expertise!"
16002-50 = "Ugh. I want to explain things! I have to do it!"
16002-60 = "The riddle has been solved!"
16002-70 = "My explanations are always perfect. I never skimp on the details!"
16002-80 = "Welcome, Sensei! Let me explain today's schedule!"
16002-90 = "It's a great day, Sensei! Please come to the briefing room!"
16002-100 = "If you have any questions, give a shout!"
16002-110 = "Yell my name, and I'll come running! Okay?"
16002-120 = "Great question, Sensei! Let me give you the answer!"
16002-130 = "Aren't these glasses cool?! Would you like to try them on?"
16002-140 = "Facts are the light that dispels the darkness of ignorance."
16002-150 = "...But I agree that no one likes explanations that are too flashy."
16002-160 = "Oh, there's someone who has a question."
16002-170 = "Sensei! Let's go!"
16002-180 = "Happy birthday, Sensei! A birthday is a special day to celebrate the day you were born..."
16002-190 = "Wait! Where are you going?"
16002-200 = "Since it's my birthday, let me tell you my life's story..."
16002-210 = "Please, come back! I haven't finished my explanation yet!"
16002-220 = "I'm only getting started!"
16002-230 = "Happy New Year!"
16002-240 = "I'd like to listen to more of your lectures this year."
16002-250 = "Merry Christmas! Today marks the birthday of a historical messiah. How did it become a holiday for couples...?"
16002-260 = "Huh? Lovers...?"
16002-270 = "Trick or treat! If you don't give me candy, I'll start explaining..."
16002-280 = "Oh! I don't need that much!"
16002-300 = "Wh-What...?! That's not the kind of question I was expecting!"
16002-310 = "I'm sorry, but I don't quite understand. Could you ask me that just one more time?"
16002-320 = "...So I DID hear you correctly. Um... Okay, so... Something about me..."
16002-330 = "What am I supposed to say here...?"
16002-340 = "A-And what is the reasoning behind your line of questioning? I can't fathom the logic!"
16002-350 = "Oh, uh, not that you need a specific reason or anything!"
16002-360 = "...Huh? O-Of course I can answer your question! Talking about myself should be easy..."
16002-370 = "S-So, something, something about me?! In my free time, I like to... Um..."
16002-380 = "Well...! I like researching! And learning new things! And thinking about you, and...!"
16002-390 = "...? Wait. Wh-What did I just say...?"
16002-400 = "That I like learning new things, and thinking about you...?"
16002-410 = "Aha. Ah, hahaha..."
16002-420 = "Well, what I meant was...! I was trying to say, umm...!"
16002-2600 = "The name of this weapon is Professor K!"

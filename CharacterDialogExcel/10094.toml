[translation]
10094-10 = "Blue! Archive!"
10094-20 = "What do you think of maids, Sensei? Aren't they a perfect narrative device?"
10094-30 = "Cafe... Maids... Feels like they're related, but also not..."
10094-40 = "If I worked here... I'd be cleaning this whole floor... Ugh."
10094-50 = "Cake... Black tea... Sounds delicious... Huh? I'm the one preparing them?"
10094-60 = "I want to sneak off and sleep somewhere..."
10094-70 = "A maid adventure that starts in a cafe! How does that scenario sound...?"
10094-80 = "You're here, Master!"
10094-90 = "How'd I do, Sensei? My greeting sounded just like a maid's, right?"
10094-100 = "Woo, Sensei! Maid Momoi has been waiting patiently for you!"
10094-110 = "What should I do to escape from my maid duties?"
10094-120 = "Eek! Sensei?! When'd you get here?"
10094-130 = "If people did the chores regularly, there'd be less work to get done!"
10094-140 = "Huh? I'm not wrong, but the same goes for me? That's..."
10094-150 = "Sensei! I'm bored. Let's play games together!"
10094-160 = "Huh? Am I not a maid now?"
10094-170 = "Then let's play games with maids in them!"
10094-180 = "Writing game scenarios isn't easy at all... Specifically, the thing that's hard about it is...!"
10094-190 = "...The point is, it's not easy!"
10094-200 = "If you don't know what to do, or how to get it done..."
10094-210 = "Your best option is to leave everything to your trusted maid and take a break!"
10094-220 = "Namely, me!"
10094-230 = "Wishing you a very happy birthday, master!"
10094-240 = "Huh? I should sound more maid-like? I thought I just did..."
10094-250 = "Anyway, happy birthday, Sensei! Your present is..."
10094-260 = "...the right to game all night! With me!"
10094-270 = "I don't really get it, but I heard somewhere that it's the master's responsibility to understand their maid's needs..."
10094-280 = "So, Sensei...? Don't you have something for me?"
10094-290 = "Yay! Thank you, Sensei!"
10094-300 = "Huh? Really? You have one for Midori too?"
10094-310 = "It's a new year... Time really flew... Happy New Year, Sensei."
10094-320 = "What new games are gonna release this year? I can't wait!"
10094-330 = "There are usually lots of special Christmas sales for games..."
10094-340 = "This is a chance to go shopping! Sensei!"
10094-350 = "Halloween... This, too, is a season that means a lot to the Game Development Department..."
10094-360 = "Here, take it! It's candy from me, Maid Momoi!"
10094-370 = "Huh? It's supposed to be the other way around? Really...?"
10094-390 = "Heehee... The snacks taste great..."
10094-400 = "The sunlight is warm...and the sofa is so soft..."
10094-410 = "Hmm... Cleaning...?"
10094-420 = "I'll do it...after I eat this...and take a short break..."
10094-430 = "Huh? Sensei?"
10094-440 = "Ah, I see. This...is still a dream."
10094-450 = "Wow, I can meet you in my dreams too... That's so nice..."
10094-460 = "Maybe something exciting will happen today... Heehee..."
10094-470 = "*yawn*... Yay... I got a bonus life..."
10094-2600 = "Listen, Sensei! Apparently, maids need good equipment, above all things! Infiltration, blasting things, securing confidential intel, and creating world peace... You need good equipment to achieve such things!"

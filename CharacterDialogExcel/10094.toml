[translation]
10094-10 = "블루! 아카이브!"
10094-20 = "메이드라는 거 어떻게 생각해, 선생님?\n이야기 소재로서는, 최고 아닐까?"
10094-30 = "카페... 메이드...\n관계가 있을 거 같으면서도, 없는 거 같은……"
10094-40 = "내가 여기서 일한다면……\n이 바닥 다 청소해야겠지…… 으우."
10094-50 = "케이크…… 홍차…… 맛있겠다……\n어라? 혹시 내가 준비하는 쪽?"
10094-60 = "어디선가 몰래 자고 싶다……"
10094-70 = "카페에서 시작하는 메이드 여행!\n같은 시나리오는 어떨까……?"
10094-80 = "왔는가, 나의 주인이여!"
10094-90 = "어때? 선생님?\n메이드 같은 인사지?"
10094-100 = "야호, 선생님!\n메이드 모모이,\n착하게 잘 기다리고 있었다구!"
10094-110 = "어떻게 하면~\n메이드 일로부터 도망칠 수 있을까~"
10094-120 = "으엑, 선생님!?\n언제 왔어!?"
10094-130 = "평소부터 사람들이 집안일을 했다면\n일도 줄었을 텐데~!"
10094-140 = "어? 틀린 말은 아니지만,\n나에게도 적용되는 말이라고?\n그럴 수가……"
10094-150 = "선생님~ 심심해.\n같이 게임하자~"
10094-160 = "응? 지금의 나는 메이드 아니냐고?"
10094-170 = "그러면 메이드가 나오는\n게임을 하면 되겠네!"
10094-180 = "게임 시나리오를 쓴다는 건\n쉽지 않은 일이지……\n구체적으로 어떤 일이 그러냐면……!"
10094-190 = "……아무튼 쉽지 않아!"
10094-200 = "무엇을 어떻게 할지 고민하고 있다면……"
10094-210 = "그때는 믿음직한 메이드에게\n모든 걸 맡기고, 쉬는 방법도 있어!"
10094-220 = "예를 들면, 나에게라던가!"
10094-230 = "내 주인의 생일을 축하하며!"
10094-240 = "어? 좀 더 메이드스러운\n프레이즈를 원한다고? 방금 말했잖아."
10094-250 = "그래도 역시,\n생일 축하해, 선생님!\n선물은……"
10094-260 = "나랑 같이!\n밤샘 게임 할 권리야!"
10094-270 = "정확히는 모르겠지만, \n메이드의 동향을 파악하는 것도\n주인이 할 일이래……"
10094-280 = "그러니까 선생님……?\n나한테 뭐 해 줄 거 없어?"
10094-290 = "와아! 고마워, 선생님!"
10094-300 = "어? 정말?\n미도리 것도 준비해 준 거야?"
10094-310 = "새해인가… 빠르네…\n새해 복 많이 받아, 선생님."
10094-320 = "올해는 어떤 게임이 출시될까?\n기대된다!"
10094-330 = "크리스마스에는 특별 세일 중인\n게임이 많지……"
10094-340 = "이건 쇼핑 찬스야!\n선생님!"
10094-350 = "할로윈…… 이것 또한,\n우리 게임 개발부와 인연이 있는 시즌……"
10094-360 = "자, 이거!\n메이드 모모이가 준비한 사탕이야!"
10094-370 = "어? 그거 반대라고? 그랬었나……?"
10094-390 = "우헤헤……\n과자 맛있어……"
10094-400 = "햇살도 따듯하고……\n소파도 푹신하고……"
10094-410 = "우웅…… 청소……?"
10094-420 = "할 거야…… 이것만 먹고……\n좀 쉬었다가……"
10094-430 = "어라? 선생님?"
10094-440 = "아, 그렇구나.\n이거 아직 꿈이네."
10094-450 = "꿈에서도 선생님을 만날 수 있다니……\n좋은 꿈이네……"
10094-460 = "오늘은 뭔가 재미있는 일이 생길지도……\n우헤헤……"
10094-470 = "흠냐흠냐……\n아, 보너스 목숨이다……"
10094-2600 = "들어봐, 선생님!\n메이드에게는 무엇보다도 장비가 중요하대!\n잠입, 폭파, 기밀확보. 그리고 세계 평화......\n그런 일을 하려면 좋은 장비가 있어야지!"

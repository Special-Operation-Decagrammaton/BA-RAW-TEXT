[translation]
10094-10 = "Blue! Archive!"
10094-20 = "คิดยังไงกับเมดเหรอ คุณครู?\nนี่น่าจะเป็นหัวข้อสนทนาที่ดีที่สุดเลยว่ามั้ย?"
10094-30 = "คาเฟ่... เมด... \nเหมือนมันจะเกี่ยวข้องกัน\nแต่ก็ไม่เกี่ยวกัน..."
10094-40 = "ถ้าฉันทำงานที่นี่...\nก็ต้องถูพื้นนี่ทั้งหมด\nเลยสินะ... อึก..."
10094-50 = "เค้ก... ชาแดง... น่าอร่อยจัง\nเอ๋? ฉันเหรอที่ต้อง\nเป็นคนไปเตรียมมา?"
10094-60 = "อยากไปแอบหลับ\nที่ไหนสักที่จัง..."
10094-70 = "การท่องเที่ยวของเมด\nที่เริ่มจากคาเฟ่!\nพล็อตเรื่องประมาณนี้\nดีมั้ยนะ...?"
10094-80 = "มาแล้วเหรอ นายท่านของฉัน!"
10094-90 = "เป็นไงล่ะ คุณครู?\nฉันทักทายเหมือนเมดเลยใช่มั้ย?"
10094-100 = "ยะฮู้ว คุณครู!\nเมดโมโมอิกำลังรอ\nอย่างว่านอนสอนง่ายเลยนะ!"
10094-110 = "ต้องทำยังไง~\nถึงจะหนีงานของเมดได้นะ~"
10094-120 = "อะเฮือก? คุณครู!?\nมาตั้งแต่ตอนไหนน่ะ!?"
10094-130 = "ถ้าผู้คนทำงานบ้านกันตามปกติละก็\nงานของฉันก็คงลดลงนะ~!"
10094-140 = "หืม? ที่พูดมาก็ไม่ได้ผิด\nแต่นั่นก็หมายถึงฉันด้วยงั้นเหรอ?\nไหงเป็นงั้นไปได้ล่ะ..."
10094-150 = "คุณครู~ เบื่อจังเลย\nมาเล่นเกมกันเถอะ~"
10094-160 = "หืม? จะบอกว่าตอนนี้ฉันเป็นเมดเหรอ?"
10094-170 = "งั้นก็เล่นเกม\nที่มีเมดก็แล้วกัน!"
10094-180 = "การเขียนเนื้อเรื่องเกม\nไม่ใช่เรื่องง่ายเลยจริงๆ นะ...\nถ้าถามว่าจุดไหนที่ยากละก็..."
10094-190 = "เอาเถอะ! มันไม่ง่ายแล้วกัน!"
10094-200 = "ถ้ากังวลอยู่ว่า\nจะทำอะไรแบบไหน..."
10094-210 = "ก็ให้ฝากงานทุกอย่างไว้กับ\nเมดที่น่าเชื่อถือ แล้วก็ไป\nพักผ่อนแทนนะ!"
10094-220 = "อย่างเช่น ฝากงานไว้กับฉันน่ะ!"
10094-230 = "สุขสันต์วันเกิดนะ\nนายท่านของฉัน!"
10094-240 = "หืม? อยากให้ฉันพูดให้เหมือนเมด\nมากกว่านี้เหรอ? เมื่อกี้ก็พูดไปแล้วไง"
10094-250 = "แต่ยังไงก็\nสุขสันต์วันเกิดนะคุณครู!\nของขวัญก็คือ..."
10094-260 = "สิทธิ์ในการเล่นเกมโต้รุ่ง\nกับฉันนั่นเอง!"
10094-270 = "ถึงจะไม่แน่ใจก็เถอะ\nแต่ว่ากันว่าการทำความเข้าใจเมด\nคือหน้าที่ของนายท่านนะ..."
10094-280 = "เพราะงั้นแล้ว คุณครูน่ะ...\nไม่มีอะไรจะทำให้ฉันบ้างเหรอ?"
10094-290 = "ว้าว! ขอบคุณนะคุณครู!"
10094-300 = "หืม? จริงเหรอ?\nเตรียมของมิโดริมาด้วยเหรอ?"
10094-310 = "ปีใหม่แล้วเหรอ... ไวจัง...\nสวัสดีปีใหม่นะคุณครู"
10094-320 = "ปีนี้จะมีเกมอะไรออกมาบ้างนะ?\nตื่นเต้นแล้วสิ!"
10094-330 = "ช่วงคริสต์มาสมีเกมที่\nลดราคาพิเศษเยอะเลย..."
10094-340 = "นี่คือโอกาส\nในการช้อปเลยนะคุณครู!"
10094-350 = "ฮาโลวีน... ก็เป็นเทศกาลที่\nมีความสัมพันธ์กับชมรมพัฒนาเกมนะ..."
10094-360 = "เอ้า รับนี่ไปสิ!\nลูกกวาดที่เมดโมโมอิเตรียมมาให้!"
10094-370 = "หืม? อยากได้อีกอย่างเหรอ?\nอย่างงั้นเหรอ...?"
10094-390 = "แหะๆๆ...\nขนมอร่อยจัง..."
10094-400 = "แสงแดดก็อบอุ่น...\nโซฟาก็นุ่มนิ่ม..."
10094-410 = "งืม... ทำความสะอาดเหรอ...?"
10094-420 = "เดี๋ยวค่อยทำ... ขอกินอันนี้...\nแล้วก็พักอีกหน่อยก่อน..."
10094-430 = "เอ๋? คุณครู?"
10094-440 = "อ่า เป็นอย่างนี้นี่เอง\nนี่ยังเป็นความฝันอยู่สินะ"
10094-450 = "ได้เจอคุณครู\nในความฝันด้วยเหรอเนี่ย...\nนี่คือฝันดีสินะ..."
10094-460 = "วันนี้อาจจะมีเรื่องอะไรสนุกๆ เกิดขึ้นก็ได้...\nแหะๆๆ..."
10094-470 = "งืม งืม...\nอ๊ะ ได้โบนัสพลังชีวิตเพิ่มแฮะ..."
10094-2600 = "ฟังนะคุณครู! สิ่งสำคัญที่สุด\nสำหรับเมดก็คือไอเทม! เพื่อลักลอบ\nเพื่อระเบิด ล้วงความลับ และเพื่อ\nสันติสุขของโลก... ถ้าจะทำเรื่อง\nแบบนั้นก็ต้องมีไอเทมดีๆ นะ!"

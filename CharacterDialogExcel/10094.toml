[translation]
10094-10 = "蔚藍！檔案！"
10094-20 = "老師，你覺得女僕怎麼樣？\n以故事的題材來說，簡直棒極了對吧？"
10094-30 = "咖啡廳……女僕……\n好像有關係，\n又好像沒關係……"
10094-40 = "如果我在這裡工作……\n這裡的地板，就全都得\n打掃才行對吧……嗚嗚。"
10094-50 = "蛋糕……紅茶……\n感覺很好吃……\n咦？難道說，我是\n負責準備的那方？"
10094-60 = "真想躲在某個\n地方偷偷睡覺……"
10094-70 = "從咖啡廳展開的\n女僕之旅！\n類似這樣的劇本\n怎麼樣……？"
10094-80 = "你來啦，我的主人！"
10094-90 = "怎麼樣？老師？\n是很有女僕風格的問好吧？"
10094-100 = "呀齁～老師！女僕桃井，\n一直乖乖地在等你哦！"
10094-110 = "該怎麼做～\n才能從女僕的工作中逃離呢～"
10094-120 = "呃，老師！？\n你什麼時候來的！？"
10094-130 = "要是平時大家有自己做家事，\n工作就能減輕不少了說～！"
10094-140 = "咦？雖然是這麼說沒錯，\n但這句話對我自己也適用？\n怎麼會……"
10094-150 = "老師～好閒。\n一起玩遊戲嘛～"
10094-160 = "嗯？問我現在\n不是女僕嗎？"
10094-170 = "那……只要玩有女僕\n登場的遊戲就行了吧！"
10094-180 = "寫遊戲劇本並不簡單……\n具體來說……！"
10094-190 = "……總之就是很困難！"
10094-200 = "如果正在煩惱\n該怎麼做才好的話……"
10094-210 = "那種時候，把所有事\n都交給可靠的女僕，\n去休息也可以哦！"
10094-220 = "例如，我本人之類的！"
10094-230 = "祝我的主人生日快樂！"
10094-240 = "咦？你說想聽更有\n女僕風格的祝賀詞？\n我剛不是說了嗎？"
10094-250 = "不過，說的也是。\n生日快樂，老師！\n至於禮物……"
10094-260 = "就是能和我一起！\n通霄玩遊戲的權利唷！"
10094-270 = "雖然不是很清楚，\n但據說掌握女僕的動向\n也是主人的工作……"
10094-280 = "所以老師……？\n你沒有要給我什麼嗎？"
10094-290 = "哇！謝謝你，老師！"
10094-300 = "嗯？真的嗎？連綠的份也準備了？"
10094-310 = "新年啊……真快……\n新年快樂，老師。"
10094-320 = "今年有什麼樣的\n遊戲會發售呢？\n真期待！"
10094-330 = "聖誕節的時候，\n會有很多遊戲特價……"
10094-340 = "這是購物的機會唷！老師！"
10094-350 = "萬聖節……這也是\n跟我們遊戲開發部\n頗有淵源的季節……"
10094-360 = "來，給你！\n是女僕桃井\n準備的糖果唷！"
10094-370 = "咦？應該反過來才對？\n是這樣嗎……？"
10094-390 = "唔嘿嘿……\n餅乾，真好吃……"
10094-400 = "陽光很溫暖……\n沙發也軟綿綿的……"
10094-410 = "唔唔……打掃……？"
10094-420 = "我會打掃啦……\n等我吃完這個……\n再休息一下之後……"
10094-430 = "咦？老師？"
10094-440 = "原來如此。\n這，還是在夢裡對吧。"
10094-450 = "居然連夢裡都能見到老師……\n真是場好夢呢……"
10094-460 = "今天搞不好，\n會發生開心的事……\n唔嘿嘿……"
10094-470 = "呣喵呣喵……\n啊，是額外的生命值……"
10094-2600 = "你聽我說，老師！\n聽說對於女僕來說，最重要的就是裝備！\n潛入、爆破、竊取機密。\n以及世界和平……\n想完成這些工作的話，就得有好的裝備才行！"

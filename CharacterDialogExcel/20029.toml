[translation]
20029-10 = "Blue Archive~"
20029-20 = "ทะเล...ฤดูร้อน...\nมีแต่เรื่องสนุกเยอะเลยนะคะ คุณครู\nแต่ฉันก็ไม่ลืมเรื่องการฝึกหรอกค่ะ"
20029-30 = "มาเตรียมสถานที่ที่ทุกคน\nจะพักผ่อนได้อย่างสบายๆ\nกันดีมั้ยคะ?"
20029-40 = "ที่นี่สบายดีจัง\nเหมาะกับการพักผ่อน\nมากเลยค่ะ"
20029-50 = "ทุกคนดูสนุกกันใหญ่เลย\nค่อยยังชั่วหน่อยค่ะ"
20029-60 = "สึบากิจังกับคาเอเดะจัง\nจะทำอะไรอยู่นะ..."
20029-70 = "จู่ๆ ก็รู้สึกอยากอู้ขึ้นมาเลย…\nฤดูร้อน... น่ากลัวจังเลยค่ะ!"
20029-80 = "สวัสดีค่ะ คุณครู\nฉันเตรียมพร้อมแล้วค่ะ\nสั่งมาได้ทุกอย่างเลยนะคะ"
20029-90 = "อ๊ะ คุณครู!\nไม่เป็นไรเลยค่ะ\nฉันชินกับการรอคอยแล้วค่ะ"
20029-100 = "ฤดูร้อน ทะเล... ช่างเป็นคำที่\nเหมือนเวทมนตร์เลยนะคะ"
20029-110 = "เป็นเวทมนตร์ที่ทำให้ฉัน\nเกือบลืมการฝึกฝนไปเลยค่ะ..."
20029-120 = "ฉันลองใช้การอ่านใจ...\nทายความคิดคุณครูดูดีมั้ยคะ?"
20029-130 = "คุณครู... อยากใช้เวลา\nอยู่กับฉันใช่มั้ยล่ะคะ?"
20029-140 = "ว่ายังไงล่ะคะ?\nฉันทายถูกมั้ยคะ?"
20029-150 = "วันนี้ฉันมาที่นี่\nเพื่อมาช่วยงานคุณครูนะคะ..."
20029-160 = "มะ...ไม่ไหวแล้วค่ะ มะ...มัน\nชอบคิดอย่างอื่นไปเรื่อยเลยค่ะ\nฉันคงจะฝึกฝนไม่พอเองค่ะ..."
20029-170 = "ดื่มน้ำมะนาวมั้ยคะ?\nแล้วก็มีแซนด์วิชสำหรับ\nทานรองท้องด้วย..."
20029-180 = "ฉันเตรียมมาเยอะเลยค่ะ\nถ้าคุณครูหิวก็ทานได้เลยนะคะ"
20029-190 = "ถ้าเกิดคุณครูร้อน...\nก็เข้ามาในร่มกันแดด\nกับฉันได้นะคะ"
20029-200 = "เอ่อ... หรืออยากจะ\nนอนหนุนตักมั้ยคะ?"
20029-210 = "วันเกิดคุณครู...\nเป็นวันที่ยอดเยี่ยมจริงๆ เลยค่ะ"
20029-220 = "ฮิฮิ... สุขสันต์วันเกิดนะคะ\nคุณครู!"
20029-230 = "คุณครูอวยพร...\nวันเกิดฉันเหรอคะ?"
20029-240 = "ฉันดีใจมากๆ เลยค่ะ...\nจนอธิบายเป็นคำพูด\nได้ไม่หมดเลยละค่ะ"
20029-250 = "ฮิฮิ ของขวัญ...\nฉันได้รับมาแล้วละค่ะ"
20029-260 = "ขอให้มีความสุข\nในวันปีใหม่นะคะ คุณครู"
20029-270 = "ปีใหม่แล้วสินะคะ\nเราไปขอพรด้วยกันมั้ยคะ?"
20029-280 = "ความปรารถนาของฉันเหรอคะ...?\nฮิฮิ... ความลับค่ะ"
20029-290 = "คริสต์มาสแล้วนะคะ คุณครู\nเทศกาลที่เด็กดีจะได้รับของขวัญ..."
20029-300 = "แล้ว...ว่ายังไงล่ะคะ คุณครู\nฉัน...เป็นเด็กดีหรือเปล่าคะ?"
20029-310 = "ว้าว วันฮาโลวีนละค่ะ\nทั้งลูกกวาด และของขวัญ\nก็เตรียมไว้พร้อมหมดแล้ว..."
20029-320 = "คะ? ไม่ต้องเตรียมทั้งสองอย่าง\nไว้ก็ได้งั้นเหรอคะ?"
20029-340 = "ถ้าเกิด...\nช่วงเวลานี้คงอยู่ตลอดไปได้\nก็คงดีนะคะ"
20029-350 = "ถ้าเราบันทึกช่วงเวลานี้เอาไว้\nให้เหมือนกับรูปถ่ายหรือภาพวาดได้\nถ้าทำแบบนั้นได้ละก็..."
20029-360 = "คุณครูเอง\nก็รู้สึกเหมือนกันงั้นเหรอคะ?"
20029-370 = "แบบนั้น... ไม่รู้ทำไม\nจู่ๆ ก็รู้สึกเขินขึ้นมาเลยค่ะ"
20029-380 = "วันนี้ฉัน...มีความสุขมากๆ\nจนลืมเรื่องการฝึกไปเลยค่ะ..."
20029-390 = "คือ... คุณครูคะ"
20029-400 = "สักวันหนึ่ง...\nมาสร้างช่วงเวลาดีๆ แบบนี้\nด้วยกันกับฉันอีกได้มั้ยคะ?"
20029-2600 = "ได้รับของขวัญที่ยอดเยี่ยมมา\nความรู้สึกที่เอ่อล้นในใจนี้\nฉันอยากถ่ายทอดเป็นคำพูดให้\nคุณครูฟัง แต่ว่า...เรียบเรียงคำพูด\nไม่ถูกเลย... ขอ... ขอบคุณนะคะคุณครู"

[translation]
20029-10 = "Blue Archive!"
20029-20 = "The summer... The beach... It's all so blissful, Sensei. Of course, I haven't forgotten about my training."
20029-30 = "I want to create a place where everyone can lay down their burdens."
20029-40 = "A refreshing place. A place to rest."
20029-50 = "It seems that everyone is enjoying themselves. I'm glad."
20029-60 = "I wonder what Tsubaki and Kaede are doing..."
20029-70 = "I feel so sluggish and lazy... Is this the frightful power of summer...?"
20029-80 = "Hello, Sensei. I'm ready for whatever you have in store for me today."
20029-90 = "Oh, Sensei! It's fine. I'm used to waiting."
20029-100 = "\"Summer.\" \"Beach.\" They're such magical words."
20029-110 = "So magical they almost made me forget to train..."
20029-120 = "Shall I attempt to read your mind, Sensei?"
20029-130 = "You...just want to spend some time with me, right?"
20029-140 = "Well? Am I right?"
20029-150 = "I came here today to help you work, Sensei..."
20029-160 = "But, I keep thinking of...other things... I need more training..."
20029-170 = "Would you like some lemonade? And perhaps a sandwich for a light snack..."
20029-180 = "I made plenty, so please, enjoy."
20029-190 = "If you're hot...come sit under my parasol."
20029-200 = "And...I could also offer you a lap pillow. How does that sound?"
20029-210 = "Sensei's birthday... What a fabulous day."
20029-220 = "Heehee, happy birthday, Sensei!"
20029-230 = "You're wishing me...a happy birthday?"
20029-240 = "I'm so happy, really... So much so that I can't express it with words."
20029-250 = "Heehee. I guess I already got my gift."
20029-260 = "Happy New Year, Sensei."
20029-270 = "It's the New Year already. Shall we make a wish together?"
20029-280 = "My wish? Heehee. It's a secret."
20029-290 = "It's Christmas, Sensei. The day when good children get gifts..."
20029-300 = "So...what do you think, Sensei? Was I a good child?"
20029-310 = "Wow, it's Halloween. I've prepared all of my tricks and treats..."
20029-320 = "Oh? I don't have to prepare both? Come to think of it..."
20029-340 = "If only our time here could last forever."
20029-350 = "If only we could preserve it, like with a photo or a drawing. If only that were possible..."
20029-360 = "So you feel the same way, Sensei?"
20029-370 = "That's... Somehow, that’s... I'm a bit embarrassed."
20029-380 = "Today... I nearly forgot to be a proper lady, because I... I was so happy."
20029-390 = "Um, Sensei."
20029-400 = "Maybe one day... Could we spend time together again? Just the two of us?"
20029-2600 = "What a wonderful gift... I wish I could express in words how much appreciation I feel inside, but...it's hard to organize my thoughts... Th-Thank you, Sensei."

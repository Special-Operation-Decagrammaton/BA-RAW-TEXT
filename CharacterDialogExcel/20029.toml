[translation]
20029-10 = "블루 아카이브~"
20029-20 = "여름…… 바다…… 즐거움으로\n가득하네요, 선생님.\n물론 수행도 잊지 않았어요."
20029-30 = "여러분이 편히 쉴 수 있는\n장소를 만들어 볼까요?"
20029-40 = "시원한 곳이네요.\n쉬기에 좋겠어요."
20029-50 = "다들 즐기고 있는 것 같네요.\n다행이에요."
20029-60 = "츠바키 쨩과 카에데 쨩은,\n뭘 하고 있을까요……"
20029-70 = "저도 모르게\n축 늘어지는 게……\n여름…… 무섭네요!"
20029-80 = "안녕하세요. 선생님.\n저는 준비되었답니다.\n무엇이든 말씀해 주세요."
20029-90 = "아, 선생님!\n아니요, 괜찮아요.\n기다리는 건 익숙하니까요."
20029-100 = "여름, 바다…… 참, 마법 같은\n단어들이네요."
20029-110 = "저까지도 수행을\n깜빡 잊어버릴 만큼……"
20029-120 = "독심술로……\n선생님의 생각을 맞춰볼까요?"
20029-130 = "선생님은…… 저와 함께 시간을\n보내고 싶으신 거죠?"
20029-140 = "어떤가요? 맞았나요?"
20029-150 = "오늘은 선생님의 일을\n도와 드리기 위해서 온 건데……"
20029-160 = "안 되겠네요, 저. 자꾸……\n다른 생각이 들려고 해요.\n수행 부족이네요……"
20029-170 = "레몬에이드는 어떠세요?\n그리고 가볍게 먹을 수 있는\n샌드위치도…"
20029-180 = "많이 만들어 왔으니, \n괜찮으시다면 드세요."
20029-190 = "더우시면……\n제 파라솔로 오세요."
20029-200 = "그…… 무릎베개라든지,\n어떠신가요?"
20029-210 = "선생님의 생신……\n정말 멋진 날이네요."
20029-220 = "후후, 생일 축하드립니다.\n선생님."
20029-230 = "제 생일……\n축하해 주시는 건가요?"
20029-240 = "기뻐요. 정말……\n말로 다 할 수 없을 만큼요."
20029-250 = "후훗. 선물, 이미 받아 버렸네요?"
20029-260 = "새해 복 많이 받으세요 선생님."
20029-270 = "벌써 새해군요. 같이 기도할까요?"
20029-280 = "제 소원, 이요?\n후훗…… 비밀이에요."
20029-290 = "크리스마스네요. 선생님.\n착한 아이가 선물을 받는다는……"
20029-300 = "그래서…… 어떤가요. 선생님.\n저는…… 착한 아이였나요?"
20029-310 = "와아, 할로윈이네요.\n사탕도, 장난도 전부\n준비되어 있는데……"
20029-320 = "네? 둘 다 준비할 필요는\n없다고요? 그러고 보니……"
20029-340 = "이대로……\n이 시간이 영원할 수 있다면\n좋을 텐데."
20029-350 = "이대로, 사진이나 그림처럼\n시간이 기록되어서――\n그렇게 된다면……"
20029-360 = "선생님도\n같은 마음이시라고요?"
20029-370 = "그건…… 왠지, 쑥스럽네요."
20029-380 = "저는 오늘……\n수행을 잊을 정도로……\n행복했답니다."
20029-390 = "저, 선생님."
20029-400 = "언젠가 또……\n이런 시간을 만들어 주실 수\n있으신가요?"
20029-2600 = "이렇게 멋진 선물을 받다니……\n가슴에서 넘쳐흐르는 제 마음을,\n말로 잘 전하고 싶습니다만……\n정리가 잘 안 돼서…\n그…… 감사합니다, 선생님."

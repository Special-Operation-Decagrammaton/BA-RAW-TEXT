[translation]
10092-10 = "블루 아카이브~!!"
10092-20 = "기대해도 좋아….\n아니 기대해! 나의 연주!!"
10092-30 = "꽤 넓네…\n연주하기 좋을지도."
10092-40 = "연습 좀\n하려고 했더니,\n사람이 많아…."
10092-50 = "출출하네,\n어디 단 것 좀 없나?"
10092-60 = "조금 쉴까…."
10092-70 = "어라.\n여기서 모인다고\n하지 않았나?"
10092-80 = "서, 선생님!?\n언제 왔어…!?"
10092-90 = "나, 나?\n그, 그냥 연습을 좀…."
10092-100 = "어서 와, 선생님!"
10092-110 = "호, 혹시 그…. 그…."
10092-120 = "BGM… 필요해?\n연주, 할까?"
10092-130 = "왠지, 이렇게 하고 있으면\n평소보다 자신감이 넘친단 말야."
10092-140 = "뭐, 뭐야!?\n왜 그렇게 빤히 보는데…?"
10092-150 = "원하는 게 있으면\n말로 하라고!"
10092-160 = "뭐 먹을 거라도\n가지고 올 걸 그랬나…."
10092-170 = "선생님, 먹고 싶은 거 있어?"
10092-180 = "사실 연습이 무조건\n수업보다 재밌을 줄 알았는데,"
10092-190 = "의외로 진지하게 하니\n이쪽도 힘들더라고."
10092-200 = "음? 연습으로\n바쁜 거 아니냐고?"
10092-210 = "그, 그건 그렇지만…."
10092-220 = "갑자기 왜 물어보는 거야!?\n일부러 그러는 거지!?\n느끼한 소리 하려고!!"
10092-230 = "생일 축하합니다♪\n생일 축하합니다♪"
10092-240 = "왜 부르냐고!?"
10092-250 = "쓸데없는 소리 하지 마!"
10092-260 = "으, 으응? 내 생일…?"
10092-270 = "역시, 기억하고 있었구나?"
10092-280 = "새해 복 많이 받아, 선생님!"
10092-290 = "듣고 싶은 곡 있어?"
10092-300 = "크리스마스구나!"
10092-310 = "뭐, 뭐야!?\n딱히 이제는 산타를\n믿을 나이가 아니거든!?"
10092-320 = "시끌시끌한 날이네!\n싫지 않아. 오히려\n뭐라도 하고 싶은걸?"
10092-340 = "후…. 후우….\n…돼, 됐다….\n해냈어…."
10092-350 = "그, 그래…?\n선생님이 듣기에도\n그랬어…?"
10092-360 = "장난 치는 거 아니지?\n이건…. 진짜지?"
10092-370 = "뭔가…. 가슴이 떨려…."
10092-380 = "이런 느낌은 처음이라…."
10092-390 = "…선생님…. 생각해 보면,\n선생님한테 처음으로\n보여준 것 같아."
10092-400 = "뭐랄까…. 그…."
10092-410 = "…내 '멋진' 모습….\n이라는 거…."
10092-2600 = "어떤 상황에서도 선생님은 선생님이구나….\n그러네. 나도 마찬가지겠지?\n어떤 상황에서도….\n필요하면 부르라고! 내가 갈 테니까!"

[translation]
10092-10 = "蔚藍檔案～！！"
10092-20 = "你可以期待……\n不，好好期待吧！我的演奏！！"
10092-30 = "挺寬敞的呢……\n好像很適合演奏。"
10092-40 = "本來想\n練習一下的，\n人好多……"
10092-50 = "肚子餓了，\n有沒有甜食？"
10092-60 = "要不要休息\n一下呢……"
10092-70 = "奇怪。不是說\n在這裡集合嗎？"
10092-80 = "老，老師！？\n你什麼時候來的……！？"
10092-90 = "我，我？\n只是稍微把練習……"
10092-100 = "歡迎你，老師！"
10092-110 = "如，如果那個……\n那個……"
10092-120 = "BGM……需要嗎？\n我幫你演奏吧？"
10092-130 = "總覺得，這樣\n會比平常更有自信。"
10092-140 = "怎，怎樣！？為什麼\n要那樣盯著我看啊……？"
10092-150 = "想要什麼東西的話\n就用嘴巴說嘛！"
10092-160 = "要是有帶一些\n食物來就好了……"
10092-170 = "老師，有想吃的東西嗎？"
10092-180 = "本來以為練習\n一定會比上課有趣，"
10092-190 = "結果認真做起來\n也是挺累的。"
10092-200 = "嗯？問我是不是\n忙著練習？"
10092-210 = "是，是沒錯啦……"
10092-220 = "話說為什麼突然這麼問啊！？\n你是故意的吧！？\n為了說噁心的話！！"
10092-230 = "祝你生日快樂♪\n祝你生日快樂♪"
10092-240 = "……為什麼要唱！？"
10092-250 = "別說廢話！"
10092-260 = "嗯，嗯？我的生日……？"
10092-270 = "你果然記得啊？"
10092-280 = "新年快樂，老師！"
10092-290 = "有想聽的曲子嗎？"
10092-300 = "是聖誕節！"
10092-310 = "怎，怎樣！？\n我現在也不是還相信\n聖誕老人的年紀好嗎！？"
10092-320 = "是熱鬧的日子！\n我不討厭。\n反而想做點什麼呢？"
10092-340 = "呼……呼……\n……成，成功了……\n我辦到了……"
10092-350 = "是，是嗎……？\n老師聽完也\n這麼認為嗎……？"
10092-360 = "不是跟我開玩笑的吧？\n這……是真實的感想嗎？"
10092-370 = "總覺得……心跳得很快……"
10092-380 = "這種事，還是第一次……"
10092-390 = "……老師……\n回頭想想，\n這是不是第一次\n讓老師看見呢……"
10092-400 = "怎麼說才好……那個……"
10092-410 = "……我「帥氣」的模樣……\n之類的……"
10092-2600 = "不管情況如何，老師就是老師呢……\n原來如此，我也是一樣的吧？\n無論是什麼情況……\n有需要的話就叫我吧！我會過去的！"

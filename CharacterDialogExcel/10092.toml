[translation]
10092-10 = "Blue Archive~!!"
10092-20 = "จะตั้งตารอก็ได้นะ...\nไม่สิ ตั้งตารอหน่อยนะ! การเล่นกีตาร์ของฉันน่ะ!!"
10092-30 = "กว้างจังเลยนะ...\nเหมาะกับการเล่นดนตรีเลย"
10092-40 = "ว่าจะซ้อมสักหน่อย\nแต่คนเยอะจัง..."
10092-50 = "หิวจัง\nมีอะไรหวานๆ มั้ย?"
10092-60 = "พักหน่อยดีมั้ยนะ..."
10092-70 = "เอ๋? ไม่ได้บอกว่า\nจะมาเจอกันที่นี่หรอกเหรอ?"
10092-80 = "คะ... คุณครู!?\nมาตั้งแต่ตอนไหน...!?"
10092-90 = "ฉะ... ฉันเหรอ?\nก็... ก็แค่ซ้อมอยู่นิดหน่อย..."
10092-100 = "เข้ามาสิ คุณครู!"
10092-110 = "เอ่อ... ไม่ทราบว่า... มี..."
10092-120 = "BGM มั้ย...?\nหรือให้ฉันเล่นกีตาร์?"
10092-130 = "ฉันรู้สึกว่าถ้าทำแบบนี้\nจะมั่นใจกว่าปกติน่ะ"
10092-140 = "อะ... อะไรเนี่ย!?\nทำไมถึงจ้องกันขนาดนั้นล่ะ...?"
10092-150 = "ถ้าอยากได้อะไร\nก็บอกกันสิ!"
10092-160 = "ฉันน่าจะเอา\nของกินมานะ..."
10092-170 = "คุณครู มีอะไรที่อยากกินมั้ย?"
10092-180 = "ที่จริงฉันคิดว่าการซ้อม\nจะสนุกกว่าการเรียนน่ะ"
10092-190 = "แต่พอมาเล่นจริงจัง\nก็เหนื่อยเหมือนกันนะ"
10092-200 = "หืม? ฉันยุ่งเพราะ\nการซ้อมรึเปล่าน่ะเหรอ?"
10092-210 = "กะ... ก็ยุ่งๆ อยู่หรอก..."
10092-220 = "แต่ทำไมอยู่ๆ ถึงถามขึ้นมาล่ะ!?\nตั้งใจใช่มั้ย!?\nจะพูดจาเลี่ยนๆ ล่ะสิ!!"
10092-230 = "Happy birthday to you♪\nHappy birthday to you♪"
10092-240 = "ถามว่าร้องทำไมงั้นเหรอ!?"
10092-250 = "อย่าพูดอะไรเพ้อเจ้อนะ!"
10092-260 = "หะ... หืม? วันเกิดฉันเหรอ...?"
10092-270 = "คุณครูจำได้ด้วยสินะ?"
10092-280 = "สวัสดีปีใหม่นะคุณครู!"
10092-290 = "มีเพลงที่อยากฟังมั้ย?"
10092-300 = "คริสต์มาสแล้วสินะ!"
10092-310 = "อะ... อะไรเนี่ย!?\nตอนนี้ฉันไม่ใช่เด็กที่\nยังเชื่อว่าซานต้ามีจริงหรอกนะ!"
10092-320 = "วันนี้หนวกหูจัง!\nแต่ก็ไม่ได้ไม่ชอบหรอก\nฉันกลับอยากทำอะไรมากกว่าน่ะ"
10092-340 = "ฮู่ว... ฮู่ว...\nจะ... จบแล้ว...\nทำได้แล้ว"
10092-350 = "งะ... งั้นเหรอ...?\nคุณครูฟังแล้วคิดว่า\nเป็นแบบนั้นเหรอ...?"
10092-360 = "ไม่ได้แกล้งพูดใช่มั้ย?\nพูดจริง... ใช่มั้ย?"
10092-370 = "เหมือนว่า... ใจเต้นตุบๆ เลย..."
10092-380 = "ฉันเพิ่งเคยรู้สึกแบบนี้\nเป็นครั้งแรกน่ะ..."
10092-390 = "คุณครู... พอมาคิดดูแล้ว\nนี่เป็นครั้งแรก\nที่ฉันให้คุณครูเห็นเลยนะ"
10092-400 = "ต้องเรียกว่าอะไรดีนะ... แบบว่า..."
10092-410 = "ภาพลักษณ์ที่ 'ยอดเยี่ยม'\nของฉันน่ะ"
10092-2600 = "คุณครูเป็นคุณครูในทุกๆ สถานการณ์เลยสินะ...\nนั่นสินะ ฉันเองก็คงเป็นเหมือนกัน\nไม่ว่าในสถานการณ์ไหน...\nถ้าต้องการอะไรก็เรียกนะ! ฉันจะไปหา!"

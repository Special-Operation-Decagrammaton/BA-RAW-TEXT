[translation]
10005-20 = "*yawn* Let's take it slow and steady. No point in wearing ourselves out."
10005-30 = "This seems like a nice place. I like it."
10005-40 = "Where's a good place to take a nap?"
10005-50 = "Easy does it."
10005-60 = "Hmm. This might work."
10005-70 = "Heh... It'll be okay, I think."
10005-80 = "Welcome, Sensei. I see that you're still working as hard as ever."
10005-90 = "Yo! Welcome. You've got a lot of work waiting for you."
10005-100 = "This place is cool. I like it."
10005-110 = "I imagine you have it rough, Sensei."
10005-120 = "You need me? Heh, thanks for the empty compliment."
10005-130 = "Huh? You actually mean it? Oh, o-okay... Th-Thanks."
10005-140 = "There's no shame in pacing yourself. It's important to take your time."
10005-150 = "Heh... Birthday? I've never thought about your birthday before."
10005-160 = "Ahaha, I'm just teasing. Of course I have. Happy birthday, Sensei."
10005-170 = "Huh...? My birthday?"
10005-180 = "Wh-What? There's no point in celebrating the birthday of an old-timer like me."
10005-190 = "...Well, thanks anyway. It was still nice to hear. Ahahaha."
10005-200 = "It's the start of another year. Let's make it a good one, Sensei."
10005-210 = "Ugh. Days like this are a pain when you're my age. Everyone's so lively..."
10005-220 = "Well, I guess it doesn't hurt to enjoy a holiday every once in a while."
10005-230 = "Halloween, huh? It's never really meant anything to me before."
10005-240 = "That said, you like to celebrate Halloween yourself, right Sensei?"
10005-250 = "Huh? You want me to join you? Heh, I'd love to."
10005-270 = "Wow... Amazing. I've never been to a place like this before."
10005-280 = "Look! It's a fish! Hahaha. It's so cute!"
10005-290 = "Is it okay that I'm the only one who's having so much fun...?"
10005-300 = "I shouldn't worry about that? All right, then."
10005-2600 = "Sensei, I'll try again with this, so please continue to take care of me."

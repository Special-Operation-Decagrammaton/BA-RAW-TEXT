[translation]
10005-20 = "ฮ้าว~ ทำแต่พอดีๆ เถอะ\nขอเวลาให้ได้พักผ่อนบ้าง"
10005-30 = "ที่นี่ดูดีจัง\nถูกใจที่สุดเลย"
10005-40 = "ที่ที่เหมาะกับการนอนกลางวัน\nอยู่ตรงไหนกันน้า~"
10005-50 = "เอาแต่พอดีๆ"
10005-60 = "ฮืมม\nก็อาจจะไม่แย่เท่าไรนะ"
10005-70 = "น่าจะโอเคอยู่นะ..."
10005-80 = "ยินดีต้อนรับนะคุณครู\nยังทำงานหนักอยู่เหมือนเดิมเลยนะ"
10005-90 = "โย่! เข้ามาสิ\nมีงานที่ต้องทำกองเป็นภูเขาเลยล่ะ"
10005-100 = "ที่นี่เย็นดีจังเลยน้า~"
10005-110 = "ทำงานหนักเลยนะ\nทั้งฉันแล้วก็คุณครูเลย"
10005-120 = "ต้องการฉันอย่างนั้นเหรอ?\nแหะๆ ถึงจะแค่แกล้งพูดก็เถอะ\nแต่ก็... ขอบคุณนะ"
10005-130 = "หืม? ไม่ได้แกล้งพูดหรอกเหรอ?\nเอ่อ... ขะ... ขอบคุณนะ"
10005-140 = "ไม่ต้องหักโหมขนาดนั้นก็ได้\nที่สำคัญคือค่อยๆ ใช้เวลา\nทำไปก็ได้"
10005-150 = "เอ๋? วันนี้วันเกิดงั้นเหรอ?\nฉันไม่เคยนึกถึงวันเกิดของ\nคุณครูมาก่อนเลย"
10005-160 = "ฮ่าๆๆ ล้อเล่นน่า\nก็ต้องมีอยู่แล้วสิ\nสุขสันต์วันเกิดนะ คุณครู"
10005-170 = "หืม...? วันเกิดฉันเหรอ?"
10005-180 = "อะ...อะไรกัน\nมะ...ไม่ต้องใส่ใจวันเกิด\nลุงแก่ๆ แบบนี้ก็ได้น่า"
10005-190 = "แต่ยังไง... ก็ขอบคุณนะ\nดีใจเหมือนกันแฮะ ฮะฮะฮะ"
10005-200 = "ผ่านไปอีกปีแล้วสินะ\nปีนี้ก็ฝากตัวด้วยนะ คุณครู"
10005-210 = "เฮ้อ คนอายุอานามเท่าลุงน่ะ\nไม่ค่อยอะไรกับวันนี้มากหรอก\nทุกคนดูร่าเริงจังเลยน้า..."
10005-220 = "แต่นานๆ ครั้งจะได้สนุกแบบนี้\nมันก็ไม่ได้แย่เท่าไรหรอก"
10005-230 = "นี่วันฮาโลวีนงั้นเหรอ...?\nลุงไม่ค่อยอินเท่าไรหรอก"
10005-240 = "จะว่าไปแล้ว คุณครูเองก็\nจะไปปาร์ตี้ฮาโลวีนงั้นเหรอ?"
10005-250 = "หืม? อยากให้ไปด้วยเหรอ?\nแหะๆ~ เป็นเกียรติจังเลย"
10005-270 = "แหะๆ~ สุดยอดเลย เพิ่งเคย\nมาที่แบบนี้เป็นครั้งแรกเลยนะ"
10005-280 = "ดูนั่นสิ! ปลาล่ะ!\nฮะฮ่าฮ่าฮ่า น่ารักจังเลย!!"
10005-290 = "มีแค่ฉันที่สนุกอยู่คนเดียว\nแบบนี้จะดีเหรอ"
10005-300 = "ฉันดูกังวลมากเกินไปเหรอ?\nนั่นสิน้า~"
10005-2600 = "คุณครู ฉันจะลองใช้มัน\nแล้วพยายามดูอีกครั้ง\nต่อไปก็ฝากตัวด้วยนะ"

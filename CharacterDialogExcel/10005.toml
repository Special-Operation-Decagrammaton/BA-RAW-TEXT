[translation]
10005-20 = "呼啊～隨意就好～\n因為悠哉很重要～"
10005-30 = "嗯，是個好地方呢。\n我喜歡。"
10005-40 = "適合睡午覺的好地方\n在哪裡呢～"
10005-50 = "隨意，隨意～"
10005-60 = "嗯，\n或許還不錯。"
10005-70 = "唔嘿～\n還挺不賴的嘛？"
10005-80 = "來得正好，老師。\n還是那麼辛苦呢～"
10005-90 = "啊啊，歡迎～\n積累不少工作了哦。"
10005-100 = "這裡很涼很舒服呢～"
10005-110 = "各方面都辛苦了，\n老師也是。"
10005-120 = "需要我嗎？\n嘿，就算是恭維也很感謝。"
10005-130 = "咦？不是恭維嗎？\n啊，唔，嗯…\n…謝，謝謝。"
10005-140 = "肩膀不要\n太用力唷～\n放鬆是很重要的。"
10005-150 = "嘿～是生日嗎？\n老師也有生日啊～？"
10005-160 = "啊哈哈，開玩笑的，\n肯定是有的吧。\n生日快樂，老師。"
10005-170 = "嗯…？\n我的生日？"
10005-180 = "怎，怎麼了嗎，\n不用在意大叔我的\n那種事沒關係的。"
10005-190 = "…但，但還是謝謝你。\n有點開心。唔嘿嘿。"
10005-200 = "新的一年又開始了，\n今年也請多關照囉，老師？"
10005-210 = "唔嗯～大叔我\n不擅長應付這種日子呢～\n大家都閃閃發亮的…"
10005-220 = "嘛，偶爾這樣\n也不錯。"
10005-230 = "萬聖節什麼的，\n跟我沒什麼關係…"
10005-240 = "這麼說來，\n老師也要去參加\n萬聖節派對嗎？"
10005-250 = "嗯？\n想跟我一起去嗎？\n唔嘿嘿～那真是光榮啊～"
10005-270 = "欸嘿～好厲害。\n來這樣的地方還是第一次。"
10005-280 = "你看那個！是魚！\n啊哈哈哈，好可愛！"
10005-290 = "我一個人這麼開心\n是可以的嗎…"
10005-300 = "你說這擔心是多餘的？\n…是嗎？"
10005-2600 = "老師。我會用這個\n再努力一次看看，\n以後也請多多指教了。"

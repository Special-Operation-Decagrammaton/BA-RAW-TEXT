[translation]
10005-20 = "하아~암. 적당히 하자고.\n여유가 중요한 거니까."
10005-30 = "음- 좋은 곳이야.\n마음에 들어."
10005-40 = "낮잠자기 좋은 곳은\n어딜까나~"
10005-50 = "적당히, 적당히."
10005-60 = "흐음.\n나쁘지 않을지도."
10005-70 = "헤- 괜찮지 않을까?"
10005-80 = "어서 와, 선생.\n여전히 고생이 많구만."
10005-90 = "여- 어서 오게나.\n일이 이것저것 쌓여 있다구."
10005-100 = "여기는 시원해서 좋은데?"
10005-110 = "여러가지로 고생이 많네,\n선생도."
10005-120 = "내가 필요하다고?\n으헤, 빈말이라도 고마워."
10005-130 = "응? 빈말이 아니라고?\n아, 으, 으응….\n…고, 고마워."
10005-140 = "너무 어깨에 힘을 주지\n않아도 괜찮다고.\n여유가 중요하니까 말야."
10005-150 = "헤- 생일이라니,\n선생도 생일이 있었어?"
10005-160 = "아하하- 농담이야.\n당연히 있겠지.\n축하해, 선생."
10005-170 = "어…?\n내 생일?"
10005-180 = "뭐, 뭐야.\n이 아저씨는 그런 거\n딱히 챙기지 않아도 괜찮다고."
10005-190 = "…그, 그래도 고마워.\n조금 기쁘네.\n아하하하."
10005-200 = "또 한 해가 이렇게 시작되는구만.\n올해도 잘 부탁한다고, 선생?"
10005-210 = "으헤~ 이 아저씨는\n이런 날이 곤욕이라고.\n반짝반짝하게 다들 들떠서는…."
10005-220 = "뭐, 가끔씩은 이런 것도\n나쁘지 않겠지만."
10005-230 = "할로윈, 이라니.\n별로 상관없지만 말야."
10005-240 = "그러고보니 선생도\n할로윈 파티에 가는 건가?"
10005-250 = "응?\n나랑 같이 가자고?\n으헤~ 영광인데?"
10005-270 = "헤에~ 굉장해.\n이런 곳은 처음 와 봐."
10005-280 = "저거 봐! 물고기야!\n아하하하, 귀여워!"
10005-290 = "나 혼자 이렇게 즐거워도\n되는 걸까…."
10005-300 = "괜한 걱정이라고?\n…그럴까나."
10005-2600 = "선생. 이걸로 다시\n한 번 더 노력해볼테니까,\n앞으로도 잘 부탁해."

[translation]
10026-10 = "Blue Archive！"
10026-20 = "真是，為什麼要穿這種奇怪的衣服…\n算了，意外還算方便行動所以也無所謂啦，哈哈！"
10026-30 = "總覺得，視線\n好像比平時還……\n是因為這件衣服嗎？"
10026-40 = "比女僕服還好行動呢，\n還不錯。"
10026-50 = "啊啊？\n看什麼看啊？\n想幹架嗎？啊？"
10026-60 = "……哼，\n還不錯的地方呢。\n下次再來吧。"
10026-70 = "老師他……\n不在啊，出差中嗎？\n不，不是，其實\n怎樣都無所謂……"
10026-80 = "哦，這不是老師嗎！\n我在等你哦，\n稍微賞個臉吧。"
10026-90 = "來得時機正好嘛！\n來吧，一起走吧老師！"
10026-100 = "為什麼要那樣盯著看啊……\n這個，有什麼奇怪的嗎？"
10026-110 = "……啊？\n絲卡將？"
10026-120 = "這個不能退讓，\n不管是什麼打扮。"
10026-130 = "啊～好閒……\n什麼都好，讓我工作吧。"
10026-140 = "無所事事不符合我的個性……"
10026-150 = "老師有什麼想要的東西嗎？"
10026-160 = "……不，沒什麼，\n想說有什麼的話我可以協助你。"
10026-170 = "等，不要摸耳朵！？\n……不，仔細想想，\n這好像也不是我的耳朵啊……？"
10026-180 = "呦，老師！\n生日快樂啊！"
10026-190 = "哈啊？\n是不是為了慶祝\n特別為你穿的……？"
10026-200 = "才，才不是那樣咧！？"
10026-210 = "呦，老師！你知道吧，\n今天是特別的日子哦！"
10026-220 = "啊？是不是因為生日\n而興奮到換了衣服……？"
10026-230 = "笨，才不是咧！？"
10026-240 = "呦，\n今年也請多指教啦，老師。"
10026-250 = "……彼此彼此？\n啊啊，背後就交給我吧！"
10026-260 = "聖誕禮物是小孩子收的東西……？"
10026-270 = "笨蛋，我當然知道！？\n並不是想要才來這裡的！？"
10026-280 = "今天每個人都穿著\n奇怪的衣服，所以\n我想說要配合大家。"
10026-290 = "這樣的話可以吧，怎麼樣？"
10026-310 = "哈啊……\n什，什麼啊那副眼神。"
10026-320 = "……嗯，OK。"
10026-330 = "有貼好嗎？\n啊啊，沒問題了嗎，謝啦。"
10026-340 = "……話先說在前頭，\n我平常這種事情\n是不會拜託其他人的啊。"
10026-350 = "因為是老師\n所以我才拜託的……"
10026-360 = "……嘛，算了。\n老師還是一樣，\n依然是個怪人呢。"
10026-370 = "嘛，所以說……"
10026-380 = "……明白了吧，\n這種事，\n不能跟其他傢伙說哦？"
10026-2600 = "哈，都奉獻到這個地步的話，\n就得盡情盛大的幹才行呢……\n來吧，能撐到什麼時候？"

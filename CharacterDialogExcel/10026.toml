[translation]
10026-10 = "Blue Archive!"
10026-20 = "Why pick this of all outfits? Well, it's surprisingly easy to move around in. Hahaha!"
10026-30 = "I can feel people staring... Is it because of the outfit?"
10026-40 = "It's even easier to get around in than my maid uniform. Not bad."
10026-50 = "Hey! What'cha looking at?! Better watch it!"
10026-60 = "It's not a bad place. I think I'll be coming here often."
10026-70 = "Sensei's...not here? On a business trip? I-I mean, it doesn't matter, anyway..."
10026-80 = "Oh, Sensei! I was waiting for you. You could show up more often, you know."
10026-90 = "You came at just the right time, Sensei! Let's do this!"
10026-100 = "Why are you looking at me like that? Is it that weird?"
10026-110 = "Huh? My bomber jacket?"
10026-120 = "Give it up. Wherever I go, it goes."
10026-130 = "Things are pretty slow today. How about you give me something to do instead?"
10026-140 = "I'm not really a fan of standing around and doing nothing."
10026-150 = "Do you need anything?"
10026-160 = "If there is...maybe I can help you."
10026-170 = "Hey! Hands off the bunny ears! Wait, hold on...these aren't even actually my ears...!"
10026-180 = "Hey, Sensei! Happy birthday!"
10026-190 = "H-Huh? Did I wear this to celebrate your birthday?"
10026-200 = "S-Stop fooling around!"
10026-210 = "Haha, Sensei! Today is a special day, did you know?"
10026-220 = "...Huh? Did I wear this for my birthday?"
10026-230 = "As if!"
10026-240 = "I'm looking forward to the coming year, Sensei."
10026-250 = "Really? You're looking forward to it as well? Haha! Leave it to me!"
10026-260 = "What? Only kids get Christmas presents?"
10026-270 = "I know that! Who said that's why I'm here in the first place?!"
10026-280 = "I saw a bunch of people wearing strange outfits today, so I decided to play along."
10026-290 = "This should do. How do I look?"
10026-310 = "Wh-What? Why are you looking at me like that?"
10026-320 = "Yeah, okay."
10026-330 = " Is it on? Ah. That's good. Thank you."
10026-340 = " I'm letting you know, I usually don't ask people for things like this."
10026-350 = "I asked because it was you, Sensei."
10026-360 = "Well, okay. You're still a strange person, Sensei."
10026-370 = "Well, so. How do I say this?"
10026-380 = "It's a given. You can't tell a single soul about this, okay?!"
10026-2600 = "Hah, you have to go all-out sometimes. Hope you can keep up."

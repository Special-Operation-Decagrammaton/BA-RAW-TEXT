[translation]
10026-10 = "Blue Archive!"
10026-20 = "ชุดนี่มันแปลกจริงๆ นะ...\nแต่ก็ช่วยให้ขยับตัวได้สะดวกจนน่าตกใจเลยล่ะ ฮะฮะฮ่า!"
10026-30 = "รู้สึกเหมือนว่า\nมีแต่คนจ้องเอาๆ เลยนะ...\nเพราะชุดงั้นเหรอ?"
10026-40 = "เกินคาดเลย\nชุดนี้ใส่แล้วคล่องตัว\nกว่าตอนใส่ชุดเมดอีก"
10026-50 = "อ๊ะ? มองอะไรเล่า\nยังไม่หันไปอีก?"
10026-60 = "ที่นี่ก็ไม่เลวเลยนะ\nถ้าแบบนี้ละก็\nมาบ่อยๆ คงไม่เป็นไร"
10026-70 = "คุณครู... อยู่รึเปล่า\nไปข้างนอกเหรอ?\nปะ...เปล่า ไม่มีอะไรหรอก"
10026-80 = "โอ๊ะ มาแล้วเหรอครู?\nกำลังรออยู่เลย มาเจอกันหน่อยสิ"
10026-90 = "มาได้เวลาพอดีเลยนะครู!\nไปลุยกันให้สุดเหวี่ยงเลย!"
10026-100 = "ทำไมจ้องกันแบบนั้นล่ะ\nมีอะไรแปลกรึไง?"
10026-110 = "หืม...? เสื้อซูคาจันเหรอ?"
10026-120 = "ไม่ว่ายังไง\nฉันก็ไม่ถอดเด็ดขาด"
10026-130 = "อา... ว่างจังเลย...\nช่วยสั่งงานมาหน่อยสิ\nงานอะไรก็ได้"
10026-140 = "พวกเรื่องน่าเบื่อๆ น่ะ\nมันไม่ถูกกับฉันเอาซะเลย"
10026-150 = "ครูมีอะไรที่อยากได้รึเปล่า?"
10026-160 = "เปล่าหรอก...\nถ้ามีงานอะไรละก็\nฉันจะยอมช่วยก็ได้"
10026-170 = "นี่! อย่ามาจับหูสิ!\nเดี๋ยวนะ พอมาคิดดูแล้ว\nมันไม่ใช่หูจริงๆ สักหน่อย...?"
10026-180 = "เฮ้ครู!\nสุขสันต์วันเกิดนะ!"
10026-190 = "อะ...อื้อ?\nฉันใส่ชุดนี้มาอวยพรรึเปล่างั้นเหรอ?"
10026-200 = "อย่ามาพูดเรื่อง\nไร้สาระแบบนั้นนะ!"
10026-210 = "ฮ่าฮ่า ครู! วันนี้...\nเป็นวันพิเศษใช่มะ?"
10026-220 = "หืม...?\nวันนี้เป็นวันพิเศษของครู\nเพราะงั้นฉันเลยใส่ชุดนี้มารึเปล่าน่ะเหรอ?"
10026-230 = "จะเป็นแบบนั้นได้ยังไงเล่า!"
10026-240 = "ปีนี้ก็...\nฝากตัวด้วยนะครู"
10026-250 = "หา...? ครูต่างหากที่จะต้อง\nฝากตัวกับฉันงั้นเหรอ?\nฮ่าฮ่า! ไว้ใจได้เลย!"
10026-260 = "ของขวัญวันคริสต์มาส\nเป็นของสำหรับเด็กๆ งั้นเหรอ?"
10026-270 = "นะ...แน่นอนว่าฉันก็รู้อยู่!\nฉันไม่ได้มาที่นี่เพราะอยาก\nได้ของแบบนั้นหรอกนะ!?"
10026-280 = "วันนี้เห็นคนอื่นๆ\nใส่ชุดแปลกๆ กันหมด\nเลยคิดว่าจะใส่บ้างเฉยๆ น่ะ"
10026-290 = "ชุดนี้เป็นยังไง?"
10026-310 = "อะ...อะไรเล่า\nทำไมมองฉันแบบนั้น"
10026-320 = "อื้อ... โอเค"
10026-330 = "แปะดีแล้วใช่มั้ย?\nอา... ใช้ได้เลยละ แต้งกิ้ว"
10026-340 = "บอกไว้ก่อนเลยนะ\nปกติเรื่องแบบนี้ฉันไม่ขอ\nให้คนอื่นช่วยหรอก..."
10026-350 = "แต่ที่ฉันขอให้ช่วย...\nก็เพราะว่าเป็นครูไงล่ะ..."
10026-360 = "ช่างเถอะ...\nคุณครูยังเป็นคนที่\nแปลกเหมือนเดิมเลยนะ"
10026-370 = "เพราะงั้น... จะว่ายังไงดีล่ะ..."
10026-380 = "แน่นอนว่าเรื่องนี้น่ะ\nห้ามเอาไปพูดกับคนอื่น\nเด็ดขาดเลยนะ"
10026-2600 = "เฮอะ ถ้าทำแบบนี้ละก็ คงจะ\nออกไปแบบดีๆ ไม่ได้แน่...\nเอาละ มาลองกันหน่อยแล้วกัน"

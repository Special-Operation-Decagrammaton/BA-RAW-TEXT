[translation]
10026-10 = "블루 아카이브!"
10026-20 = "정말이지, 왜 이런 이상한 옷을……\n뭐, 의외로 움직이긴 편하지만 말이야. 하하!"
10026-30 = "괜히 시선들이\n느껴지는데…….\n옷 때문인가?"
10026-40 = "메이드복 보다도\n움직이기 편하구만.\n나쁘지 않아."
10026-50 = "아앙? 뭘 보고 있냐?\n해 볼 거야? 엉?"
10026-60 = "나쁘지 않은 장소인 걸.\n이 정도면 자주\n와도 괜찮겠어."
10026-70 = "선생은…… 없나.\n출장? 아, 아니.\n별로 상관없지만……"
10026-80 = "오, 선생이잖아!\n기다렸다고, 얼굴 좀 보여 봐."
10026-90 = "딱 좋을 때 와줬잖아, 선생!\n화끈하게 가 보자고!"
10026-100 = "뭘 그렇게 빤히 보는 거야.\n뭔가 이상하냐, 이거?"
10026-110 = "앙? 스카잔?"
10026-120 = "이건 양보 못 한다고,\n어떻게 되든 간에."
10026-130 = "아- 한가하다……\n뭐라도 좋으니\n일이라도 시켜줘."
10026-140 = "지루한 건\n성미에 안 맞는다고……"
10026-150 = "선생은 뭐 필요한 거 없어?"
10026-160 = "……아니, 별로, 뭔가 있다면\n협조해줄까 해서."
10026-170 = "잠깐, 귀 만지지 마!\n……잠깐, 생각해 보니\n내 귀도 아니잖아……?"
10026-180 = "여어 선생!\n생일 축하한다고!"
10026-190 = "으, 응?\n축하해주려고 입었냐고?"
10026-200 = "마, 말도 안 되는\n소리 하지 마!"
10026-210 = "하하, 선생! 오늘은\n좀 특별한 날이지?"
10026-220 = "……응?\n생일이라서 특별히\n갈아입은 옷이냐고?"
10026-230 = "그럴 리가 있겠냐!"
10026-240 = "올해도 잘\n부탁한다고, 선생."
10026-250 = "……뭐? 선생이야말로\n잘 부탁한다고?\n하하! 맡겨둬!"
10026-260 = "크리스마스 선물은\n애들이 받는 거라고……?"
10026-270 = "알고 있다고! 별로\n그런 걸 받으러 여기에\n온 게 아니거든!?"
10026-280 = "오늘은 이놈이고 저놈이고\n다 이상한 옷을 입고 다니길래,\n맞춰줄까 해서 말이지."
10026-290 = "이거면 되겠지, 어때?"
10026-310 = "……뭐, 뭐야. 왜 그렇게 봐."
10026-320 = "……응. OK."
10026-330 = "잘 붙었어?\n아아, 괜찮네. 땡큐."
10026-340 = "……말해두지만, 보통은\n이런 거 누구한테도\n부탁하지 않으니까."
10026-350 = "선생이니까 부탁한 거지……."
10026-360 = "……뭐, 됐어.\n여전히 선생은 이상한 사람이야."
10026-370 = "뭐, 그러니까……. 음……."
10026-380 = "……알고 있겠지만 이거,\n다른 녀석들에게는 말하지 말라고."
10026-2600 = "하, 이렇게까지 받아버리면,\n진짜 화려하게 갈 수밖에 없는데…….\n자, 어디까지 감당하는지 볼까?"

[translation]
16004-10 = "Blue Archive!"
16004-20 = "평안하신지요?\n아, 이 말이 더 어울리겠군요.\n처음 뵙겠습니다!"
16004-30 = "좋은 곳이네요.\n어쩐지 그리운 느낌이 듭니다!"
16004-40 = "선생님도 피자나 핫케이크보다\n오코노미야끼를\n좋아해주셨으면…"
16004-50 = "와우~\n분위기 좋아요!"
16004-60 = "Cool~ 한 우롱차가\n좋습니다!\n커피나 콜라는 싫습니다."
16004-70 = "선생님. 평안하셨나요?"
16004-80 = "앗, 무심코 예전 학원의 말투가…"
16004-90 = "어서 오세요 선생님~\n오늘도 화끈하게 임무를 시작하죠!"
16004-100 = "백귀야행의 여름은 두근두근 합니다.\n축제가 시작되니까요!"
16004-110 = "정말이지 Kimono는 최고라고요!\n최고 of 최고!"
16004-120 = "안심하세요.\n칼등으로 쳤으니까…"
16004-130 = "앗… 다시 보니\n개머리판입니다!"
16004-140 = "불의를 용서치 않는!\n정의로운 금발 미녀!\n여기에 등장!"
16004-150 = "인사할 때는 물구나무를 서라고요?\n백귀야행의 문화는 역시 신비합니다!"
16004-160 = "Today~ is~일년에\n단 한번 뿐인, 특별한 날입니다!"
16004-170 = "Happy Birthday To You!\n선생님! 생일을 축하합니다!"
16004-180 = "오늘은 저의 생일입니다!"
16004-190 = "선생님!\n팥밥을 먹으러 가야합니다!"
16004-200 = "선생님!\n새해에는 새해맞이 행사장에 가야 합니다!"
16004-210 = "오미쿠지를 뽑으러 당장 가는 겁니다!"
16004-220 = "MerryChristmas!\n산타는 좋습니다!"
16004-230 = "선생님도 산타를\n좋아하시나요?!"
16004-240 = "귀신은 밖으로~\n복은 안으로~"
16004-250 = "엣? 절분 아니었습니까\nHalloween입니까?!"
16004-270 = "……후우…… 뭔가……\n괜히 혼자 긴장했던 것\n같은 느낌입니다……"
16004-280 = "이렇게 침착해지고보니,\n왠지 조금 부끄럽다고\n해야하나……"
16004-290 = "……후훗. 실은……전부터 쭉,\n오늘의 이 날을 기대하고\n있었습니다."
16004-300 = "저…… 오늘 이 날을\n맞이할 수 있게 되어,\n정말 기쁘게 생각합니다."
16004-310 = "……선생님은 언제나,\n제가 곤란할 때\n이끌어 주셨습니다."
16004-320 = "오늘만이 아니라,\n언제나요."
16004-330 = "중요한 것은 무엇인가,\n자신만의 방식이란\n대체 어떤 것인가……"
16004-340 = "선생님을 만나지 못했다면\n배우지 못했을 거라고 생각\n하니, 왠지 가슴이 아파옵니다."
16004-350 = "……그러니까,\n진심으로 감사드립니다."
16004-360 = "선생님,\n앞으로도 피나를……"
16004-2600 = "강해지는 것은\n무기가 아니라, 영혼입니다!"

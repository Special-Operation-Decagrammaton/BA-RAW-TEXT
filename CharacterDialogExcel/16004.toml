[translation]
16004-10 = "Blue Archive!"
16004-20 = "สบายดีรึเปล่าคะ? อ๊ะ ลืมกล่าวคำทักทายเลย\nยินดีที่ได้รู้จักค่ะ"
16004-30 = "ที่นี่ดีจังเลยน้า\nจู่ๆ ก็รู้สึกคิดถึง\nขึ้นมาเลยค่ะ!"
16004-40 = "ถ้าเกิดว่าคุณครูชอบ\nโอโคโนมิยากิมากกว่า\nพิซซ่าหรือแพนเค้กละก็..."
16004-50 = "ว้าว~\nบรรยากาศดีจังเลย!"
16004-60 = "ชาอู่หลงเย็นชื่นใจ\nน่าจะ so fresh นะคะ!\nฉันไม่ชอบดื่มโคล่า\nหรือกาแฟหรอกค่ะ"
16004-70 = "รู้สึกปลอดภัยดีไหมคะคุณครู?"
16004-80 = "อุ๊บส์ เผลอใช้คำพูดตอนอยู่\nโรงเรียนเก่าไปซะแล้ว..."
16004-90 = "เชิญค่ะคุณครู~\nวันนี้ก็มาเริ่มภารกิจ SO HOT กันเถอะค่ะ!"
16004-100 = "ฤดูร้อนที่เฮียกคิยาโค\nมันน่าตื่นเต้นมากๆ\nเพราะเรามีงานเทศกาลยังไงล่ะคะ!"
16004-110 = "ฉันว่าชุดกิโมโนเนี่ย\nElegant สุดๆ ไปเลย!\nยกให้เป็น Best of the Best เลยล่ะ!"
16004-120 = "ไม่ต้องกังวลไปหรอกค่ะ\nฉันแค่ตีด้วยสันมีดน่ะ"
16004-130 = "อ๊ะ มาดูอีกที\nมันคือด้ามปืนนี่นา ^^"
16004-140 = "ความอยุติธรรมจงมลายหายไป!\nสาวผมบลอนด์ผู้ผดุงความยุติธรรม!\nมาปรากฏตัว ณ ที่แห่งนี้แล้ว!"
16004-150 = "ตอนแนะนำตัวให้ทำท่าหกสูงเหรอคะ?\nวัฒนธรรมของเฮียกคิยาโคนี่\nลึกลับสมชื่อจริงๆ!"
16004-160 = "Today~ is~ วันสำคัญ\nวันพิเศษที่มีวันเดียวในหนึ่งปี!"
16004-170 = "Happy Birthday To You!\nสุขสันต์วันเกิดค่ะคุณครู!"
16004-180 = "วันนี้เป็นวันเกิดของฉันค่ะ!"
16004-190 = "วันนี้เราต้องไปกินข้าวธัญพืชกันนะคะ!"
16004-200 = "วันปีใหม่เราต้องไปไหว้ศาลเจ้านะคะ!"
16004-210 = "รีบไปจับใบเสี่ยงทายกันเถอะค่ะ!"
16004-220 = "เมอร์รีคริสต์มาส!\nฉันชอบลุงซานต้าจังเลยค่ะ!"
16004-230 = "คุณครูก็ชอบลุงซานต้าด้วยไหมคะ?!"
16004-240 = "ภูตผีอยู่ข้างนอก~\nความโชคดีอยู่ข้างใน~"
16004-250 = "วัน Halloween เหรอคะ?!\nคิดว่าเป็นวันแบ่งฤดูกาลซะอีก"
16004-270 = "ฮู่ว... รู้สึกเหมือน...\nตื่นเต้นมากๆ\nอยู่คนเดียวเลยค่ะ..."
16004-280 = "พอจิตใจสงบลงแล้ว\nก็รู้สึกเขินขึ้นมา\nอย่างบอกไม่ถูกเลย..."
16004-290 = "ฮุฮุ... ที่จริงแล้ว...\nฉันเฝ้ารอให้ถึงวันนี้\nมานานแล้วค่ะ"
16004-300 = "ฉัน... ดีใจมากๆ\nที่ได้จัดพิธี\nดื่มสาบานครั้งนี้ค่ะ"
16004-310 = "คุณครูคอยช่วยเหลือ\nในตอนที่ฉัน\nลำบากอยู่เสมอ"
16004-320 = "ไม่ใช่แค่ในวันนี้\nแต่ทุกครั้งเลยค่ะ"
16004-330 = "สิ่งที่สำคัญของฉันคืออะไร\nสิ่งที่เป็นตัวตนของฉันคืออะไร..."
16004-340 = "พอคิดว่าถ้าไม่ได้เจอคุณครู\nฉันคงไม่ได้เรียนรู้สิ่งเหล่านี้\nก็รู้สึกฮาร์ท โบรเคนมากเลยค่ะ"
16004-350 = "เพราะงั้น...\nขอบพระคุณนะคะคุณครู"
16004-360 = "จากนี้ไปพีน่า...\nไม่สิ... คุณครู..."
16004-2600 = "สิ่งที่แข็งแกร่งขึ้น\nไม่ใช่อาวุธ แต่เป็นจิตวิญญาณค่ะ!"

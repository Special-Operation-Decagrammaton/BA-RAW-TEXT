[translation]
16004-10 = "Blue Archive!"
16004-20 = "How do you do? Oh, where are my manners? It's a pleasure to meet you."
16004-30 = "There's something about this place. I like how nostalgic it is!"
16004-40 = "I hope you're a bigger fan of okonomiyaki than you are pizza or pancakes, Sensei."
16004-50 = "Wow! What a great atmosphere!"
16004-60 = "I prefer cool oolong tea! Not coffee or soda."
16004-70 = "How do you do, Sensei?"
16004-80 = "Oops. There I go again greeting like I used to at my old academy..."
16004-90 = "Welcome, Sensei! Let's get on with our missions!"
16004-100 = "Summer in Hyakkiyako is always exciting. That's when the festivals begin!"
16004-110 = "Everyone knows kimonos are the best. The best of the best!"
16004-120 = "Don't worry. I only hit you with the back of my sword."
16004-130 = "Wait... Actually, it was the gun stock!"
16004-140 = "Here she comes! The blonde beauty that fights injustice!"
16004-150 = "Was I supposed to do a handstand while saying hello? Hyakkiyako's culture is so different!"
16004-160 = "Today! Is! A very special day that only happens once a year!"
16004-170 = "I heard it's your birthday. Happy birthday, Sensei!"
16004-180 = "Today is my birthday!"
16004-190 = "Sensei! Let's go out for some red bean rice!"
16004-200 = "Sensei! We have to go to a shrine for the new year!"
16004-210 = "And we can't forget to get our omikuji!"
16004-220 = "Merry Christmas! Santa Claus is the best."
16004-230 = "Do you like Santa too, Sensei?"
16004-240 = "Ghosts be gone! Blessings come in!"
16004-250 = "Wait, it's Halloween? I thought it was Setsubun!"
16004-270 = "...Phew. I feel like...I was nervous for no reason..."
16004-280 = "Now that I've calmed down, I feel kind of embarrassed..."
16004-290 = "...Heehee. Actually...I've been looking forward to this day for a long time."
16004-300 = "I'm...so glad we got to have this ceremony today."
16004-310 = "...You helped me when I was in trouble."
16004-320 = "Not just today, but you always do."
16004-330 = "You've taught me what's important and how to carry my own convictions..."
16004-340 = "If I hadn't met you, I'd never know those things, and that's sad to think about."
16004-350 = "...So, I sincerely thank you."
16004-360 = "Sensei, I need you to..."
16004-2600 = "It's not the weapon that becomes stronger, but the soul!"

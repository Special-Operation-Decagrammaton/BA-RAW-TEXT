[translation]
16004-10 = "蔚藍檔案！"
16004-20 = "貴安。\n啊，用這句話好像會更自然。\n初次見面！"
16004-30 = "是個好地方呢。\n好像有股懷念的感覺！"
16004-40 = "要是老師也一樣，\n和披薩或蛋糕相比\n更喜歡什錦燒就好了…"
16004-50 = "Wow〜\n氣氛真不錯呢！"
16004-60 = "我喜歡Cool～的烏龍茶！\n不喜歡咖啡或是可樂。"
16004-70 = "您好。"
16004-80 = "啊，不小心就說了\n以前學園的口頭禪…"
16004-90 = "歡迎老師～\n今天也全力以赴，\n執行任務吧！"
16004-100 = "百鬼夜行的夏天\n會讓人心跳加快。\n因為慶典開始了！"
16004-110 = "Kimono真的最棒了！\n最棒 of the 最棒！"
16004-120 = "請放心。\n我用的是刀背…"
16004-130 = "啊…仔細一看\n不是刀而是槍啊！"
16004-140 = "絕不原諒不義之事！\n正義的金髮美女！\n在此登場，的說！"
16004-150 = "打招呼的時候要倒立嗎？\n百鬼夜行的文化果然很神奇！"
16004-160 = "Today～is～\n一年只有一次的，\n特別的日子！"
16004-170 = "Happy Birthday To You!\n老師！\n祝您生日快樂！"
16004-180 = "今天是我的生日！"
16004-190 = "老師！\n必須吃紅豆糯米飯！"
16004-200 = "老師！\n新年就該去神社！"
16004-210 = "來去抽御神籤，\n現在馬上出發吧！"
16004-220 = "Merry Christmas！\n聖誕老人太棒了！"
16004-230 = "老師也喜歡\n聖誕老人嗎！？"
16004-240 = "鬼往外～福往內～"
16004-250 = "咦？不是節分嗎？\n是Halloween嗎！？"
16004-270 = "呼……總覺得，\n好像多繞了一圈呢。"
16004-280 = "冷靜下來之後，\n突然覺得有點難為情……"
16004-290 = "……呵呵，其實……\n我之前就一直，\n期待著這一天。"
16004-300 = "我……對今天\n這一天的到來，\n真的感到很高興。"
16004-310 = "……老師總是，會在我\n不知所措的時候引導我。"
16004-320 = "……並非只有今天，\n一直都是如此。"
16004-330 = "何謂重要的事物，\n所謂只屬於自己的方式\n又是什麼……"
16004-340 = "要是沒有遇見老師，\n沒有學會這些道理……\n一想到這些，\n就讓我不禁胸口沉悶。"
16004-350 = "……所以，\n我打從心底感謝著您。"
16004-360 = "老師，今後菲娜也……"
16004-2600 = "變強的不是武器，\n而是靈魂！"

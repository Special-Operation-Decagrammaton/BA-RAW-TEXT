10041-510 = "……그건, 명령?"
10041-530 = "……선생님?\n돌아왔구나."
10041-540 = "중요한 거라도\n두고 간 거야?"
10041-550 = "……나?"
10041-560 = "나를, 걱정해서……?"
10041-570 = "그런 하찮은 것에도\n신경 쓰다니……"
10041-580 = "한가한 거구나?\n어른이면서."
10041-590 = "이 차갑고\n시끄러운 세계도……\n나도."
10041-600 = "비가 내린다고\n깨끗해지지는 않아."
10041-610 = "그렇지 않다고\n바보처럼 믿을 수\n있다면……."
10041-2600 = "더이상 이유 같은 건 묻지 않겠지만,\n내게 일부러 이런 물건을 건네주다니.\n내가 알고 있던 세계에서, 당신 같은 사람은 없었어.\n이상한 사람……. 이 힘은,\n지금은 선생님에게 맡길게."

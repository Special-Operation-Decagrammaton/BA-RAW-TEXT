[translation]
10041-10 = "Blue Archive"
10041-20 = "มิซากิจากสควอดของอาเรียส\nหรือหนึ่งในสุนัขล่าเนื้อที่สูญเสียเจ้าของไป\nทางนั้นเป็นคนกุมบังเหียนอยู่นี่ จะสั่งอะไรก็เชิญเลย"
10041-30 = "เสียงดังจังเลยนะ"
10041-40 = "มีแต่ของที่เพิ่งเคย\nเห็นอยู่เต็มไปหมด"
10041-50 = "มันสนุกขนาดนั้นเลยเหรอ?"
10041-60 = "ฉันไม่สนใจหรอก"
10041-70 = "ทำอะไรน่ะ?"
10041-80 = "ฉันกำลังรอคำสั่งอยู่ คุณครู\nเพราะงั้นวันนี้มีคำสั่งอะไร?"
10041-90 = "ดูยุ่งน่าดูเลยนะ\nผู้ใหญ่เป็นแบบนี้สินะ"
10041-100 = "ไม่ว่างานอะไร\nถ้าอยากให้ช่วย\nฉันก็จะช่วยเอง"
10041-110 = "ฉันจะทำตามที่สั่ง\nบอกมาได้ทุกเรื่องเลย"
10041-120 = "ถ้ามีเรื่องจำเป็นอะไร\nก็สั่งมาได้เลย"
10041-130 = "ฉันไม่ใช่พวกชอบ\nนั่งคุยเรื่อยเปื่อยเท่าไร"
10041-140 = "แต่ถ้าเป็นคำสั่งละก็\nก็คงต้องทำตาม"
10041-150 = "คุณครูคิดจริงๆ เหรอ\nว่าฉันจะปรับตัวเข้ากับ\nความสนุกได้?"
10041-160 = "ฉันไม่ค่อยเข้าใจเท่าไร\nที่มาแสดงความยินดี\nในวันเกิดน่ะ"
10041-170 = "แต่ว่าตอนนี้คิดว่า\nเข้าใจขึ้นมานิดหน่อยแล้ว"
10041-180 = "โชคดี...\nที่คุณครูอยู่ที่นี่ด้วย"
10041-190 = "ตอนนี้ก็ยังไม่ค่อยเข้าใจเหตุผล\nที่แสดงความยินดีในวันเกิดเท่าไร"
10041-200 = "ถ้าไม่เกิดมาตั้งแต่แรก\nก็คงไม่ต้องมานั่งเสียใจ\nกับการลาจากหรอก..."
10041-210 = "อา นี่มันก็คงจะเหมือน\nโรคชนิดหนึ่งละมั้ง..."
10041-220 = "ขอโทษนะ...\nฉันไม่ได้ตั้งใจพูดแบบนั้น"
10041-230 = "ขอบคุณนะ..."
10041-240 = "ผ่านไปอีกหนึ่งปีแล้วสินะ\nในปีนี้จะเกิดอะไรขึ้นบ้าง\nก็ไม่รู้นะ..."
10041-250 = "โทษที... ฉันไม่ค่อยชิน\nกับบรรยากาศแบบนี้เท่าไร"
10041-260 = "ฉันไม่ได้คิดจะทำ\nให้เสียบรรยากาศเลย...\nฉันจะนั่งเงียบๆ แล้วกัน"
10041-270 = "ขอโทษนะแต่ว่า...\nฉันไม่สนใจทริกออร์ทรีตหรอก"
10041-280 = "อะไรนะ...?\nฉันต้องเลือกเหรอ?\nว่าจะหลอกหรือเอาลูกกวาด?"
10041-290 = "นั่นเป็น... คำสั่งเหรอ?"
10041-300 = "ฉันกำลังรอคำสั่งอยู่ คุณครู\nเพราะงั้นคุณครู...\nวันนี้จะสั่งการอะไร?"

[translation]
10041-10 = "蔚藍檔案"
10041-20 = "我是奧利斯小隊的美咲。\n如今可說是個失去主人的獵犬……\n狗鍊拿去，隨你命令我吧。"
10041-30 = "有點吵呢……"
10041-40 = "……都是\n第一次看到的東西。"
10041-50 = "……那些有什麼有趣的？"
10041-60 = "我沒興趣。"
10041-70 = "……這是在做什麼？"
10041-80 = "……我一直在待命。\n所以，老師。\n今天的命令是什麼？"
10041-90 = "你看起來很忙呢。\n也對，畢竟你是大人。"
10041-100 = "……有什麼事嗎？\n有需要的話，我來幫忙吧。"
10041-110 = "只要你吩咐，我什麼都會做。\n儘管說吧。"
10041-120 = "只要能被人需要，\n要我做什麼都行。"
10041-130 = "我基本上，\n不會積極跟人聊天。"
10041-140 = "但如果是命令，\n那我就會服從。"
10041-150 = "老師覺得，\n我的個性有辦法\n取悅老師嗎？"
10041-160 = "我一直不太能理解\n為何要慶祝出生的日子。"
10041-170 = "但現在……\n好像有點懂了。"
10041-180 = "……很慶幸\n你能陪在我身邊。"
10041-190 = "慶祝出生之日的意義，\n我至今還是不太明白。"
10041-200 = "更何況要不是因為生，\n人也不會思考死這件事了。"
10041-210 = "不過，這……\n應該是有點病態\n的想法對吧。"
10041-220 = "抱歉，本來\n不打算說這些的……"
10041-230 = "那個，謝謝。"
10041-240 = "總算撐過一年了呢。\n雖然不知道今年會如何……"
10041-250 = "……抱歉。我不太適應\n這種歡慶節日的氣氛。"
10041-260 = "總之，我不想對\n這種美好的氣氛潑冷水，\n我會安靜待著的。"
10041-270 = "很抱歉，\n我對惡作劇沒興趣。"
10041-280 = "……咦？\n不惡作劇的話，\n就要給糖果？"
10041-290 = "……這是命令嗎？"
10041-300 = "……我一直在待命。\n所以，老師。\n今天的命令是什麼？"

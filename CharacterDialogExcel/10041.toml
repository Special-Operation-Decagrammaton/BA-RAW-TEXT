10041-500 = "……咦？\n不惡作劇的話，\n就要給糖果？"
10041-510 = "……這是命令嗎？"
10041-530 = "……老師？\n你回來啦？"
10041-540 = "難道，\n忘記重要的東西了嗎？"
10041-550 = "……我？"
10041-560 = "你說，擔心我……？"
10041-570 = "你竟然，\n會在意這種\n雞毛蒜皮的小事……"
10041-580 = "身為一個大人，\n你還真閒呢。"
10041-590 = "無論是這冰冷又紛擾\n的世界，還是我。"
10041-600 = "……不管下了多少雨，\n都無法洗乾淨。"
10041-610 = "「沒有那種事」──\n如果我能像笨蛋一樣，\n這麼相信的話……"
10041-2600 = "雖然事到如今我不會過問理由了，\n但竟然刻意給我這種東西，\n在我認知的世界中，沒有人跟你一樣了。\n真是個怪人。\n……這份力量，我現在將會託付給老師。"

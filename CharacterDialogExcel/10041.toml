[translation]
10041-10 = "Blue Archive"
10041-20 = "Misaki of the Arius Squad. In other words, the hound who lost its master. I'm under your command now."
10041-30 = "How noisy."
10041-40 = "So many unfamiliar things..."
10041-50 = "...What's fun about that?"
10041-60 = "I'm not interested."
10041-70 = "...What are you doing?"
10041-80 = "I've been waiting, Sensei. What are your orders today?"
10041-90 = "You look busy. Well, I guess adults are like that."
10041-100 = "What's going on? I can help you...if you want."
10041-110 = "I'll do what you ask. Just say the word."
10041-120 = "If there's anything you want, tell me."
10041-130 = "I'm not very good at making small talk."
10041-140 = "If that's your order, I'll follow it."
10041-150 = "Sensei, do you really think I would be an adept entertainer?"
10041-160 = "I never understood why people celebrate birthdays."
10041-170 = "But, I think...I'm beginning to."
10041-180 = "I'm...glad you're here."
10041-190 = "I still don't know why we celebrate birthdays."
10041-200 = "If we were never born, we wouldn't have to mourn death."
10041-210 = "Oh. Mourning is like a disease."
10041-220 = "...Sorry. I didn't exactly want to talk about this."
10041-230 = "...Thanks."
10041-240 = "Another year gone. I wonder what the new year will bring."
10041-250 = "...Sorry. I'm not used to this kind of atmosphere."
10041-260 = "I don't want to ruin the mood. I'll be quiet."
10041-270 = "Sorry, but I'm not interested in playing."
10041-280 = "...What? I have to choose between a trick or a treat?"

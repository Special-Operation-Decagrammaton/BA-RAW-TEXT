10041-500 = "อะไรนะ...?\nฉันต้องเลือกเหรอ?\nว่าจะหลอกหรือเอาลูกกวาด?"
10041-510 = "นั่นเป็น... คำสั่งเหรอ?"
10041-530 = "คุณครู...?\nกลับมาแล้วเหรอ?"
10041-540 = "ลืมของสำคัญไว้รึไง?"
10041-550 = "ฉันเหรอ...?"
10041-560 = "เป็นห่วงฉันงั้นเหรอ?"
10041-570 = "คุณครูเนี่ยมีเวลาใส่ใจ\nเรื่องไม่เป็นเรื่องแบบนี้ด้วยเหรอ"
10041-580 = "คงจะว่างมากล่ะสิ\nทั้งที่เป็นผู้ใหญ่แท้ๆ..."
10041-590 = "ทั้งโลกที่เย็นชา น่าหนวกหู\nแล้วก็ตัวฉันเอง..."
10041-600 = "ต่อให้ฝนตกลงมาชำระล้าง\nก็ไม่มีทางใสสะอาดขึ้น"
10041-610 = "แต่ถ้าฉันหลอกตัวเอง...\nให้เชื่อว่าไม่ใช่แบบนั้นได้ละก็..."
10041-2600 = "ฉันจะไม่ถามหาเหตุผลอีกหรอก...\nแต่ฉันไม่เคยได้ของแบบนี้มาก่อนเลย\nในโลกของฉันน่ะ ไม่มีคนอย่างคุณหรอก\nเป็นคนแปลกจริงๆ เลยนะ แต่ว่าตอนนี้\nฉันจะเชื่อใจคุณครูก็แล้วกัน"

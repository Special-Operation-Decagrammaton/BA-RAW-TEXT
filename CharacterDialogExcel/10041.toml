[translation]
10041-10 = "블루 아카이브"
10041-20 = "아리우스 스쿼드의 미사키.\n말하자면 주인을 잃은 사냥개 중에 하나.\n목줄은 그쪽에 있으니까, 마음대로 명령해."
10041-30 = "조금 시끄럽네."
10041-40 = "……처음 보는\n것들 뿐."
10041-50 = "……그거, 즐거워?"
10041-60 = "나는 관심 없어."
10041-70 = "……뭐 하는 거지?"
10041-80 = "계속 대기 중이었어.\n그래서, 선생님.\n오늘 명령은 뭐야?"
10041-90 = "뭔가 바빠 보이네.\n뭐어, 어른이니까, 인가."
10041-100 = "…무슨 일이라도?\n필요하다면 도울게."
10041-110 = "시키는 건 뭐든 할 셈이니까.\n뭐든지 말해."
10041-120 = "필요한 일이 있다면\n뭐든 상관없어."
10041-130 = "잡담은, 적극적으로 하는\n편은 아니야."
10041-140 = "그게 명령이라면\n뭐, 따르겠지만."
10041-150 = "내가, 선생님을\n재미있게 해주는\n타입이라고 생각해?"
10041-160 = "나는 태어난 날을\n축하하는 것을\n잘 이해하지 못해."
10041-170 = "하지만…\n이제는 조금 알 것 같아."
10041-180 = "당신이……\n여기 있어 줘서 다행이야."
10041-190 = "태어난 날을 축하하는 이유는\n지금도 잘 이해하지 못해."
10041-200 = "애초에 태어나지도\n않았다면 죽음을 슬퍼할\n일도 없었을 텐데."
10041-210 = "아아. 이것은 질병과도\n같은 것이겠지."
10041-220 = "미안해. 이런 걸\n말하고 싶었던 게\n아니었는데……."
10041-230 = "저기, 고마워."
10041-240 = "어떻게 한 해를 또 넘겼네.\n이번 해는 또 어떻게\n되려나 모르겠지만……."
10041-250 = "…미안. 이런 분위기는\n잘 적응이 안 되어서 말야."
10041-260 = "아무튼, 좋은 분위기에\n찬물을 끼얹고 싶지 않으니까,\n조용히 있을게."
10041-270 = "미안하지만\n장난이라면 관심 없어."
10041-280 = "……어?\n장난을 치지 않으면,\n그 대신 사탕이라고?"
10041-290 = "……그건, 명령?"
10041-300 = "계속 대기 중이었어, 선생님.\n그래서, 선생님.\n오늘 명령은 뭐야?"

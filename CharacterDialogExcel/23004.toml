[translation]
23004-20 = "สิ่งที่เพิ่มเสน่ห์ให้ผู้หญิง\nไม่ใช่เครื่องสำอาง\nแต่เป็นความมุ่งมั่นต่างหาก"
23004-30 = "หากฉันสร้างหุ่นยนต์คุณครู\nฉันอาจรวยก็ได้"
23004-40 = "จริงสิ! ฉันควรเริ่มซ่อม\nเฮลิคอปเตอร์ได้แล้ว"
23004-50 = "อืมม...\nสายชำระที่มีฟังก์ชั่นต่อสู้...\nเข้าท่าแฮะ"
23004-60 = "ทำไมไม่มีใครอยากได้\nชุดชั้นในที่ใช้พรางตัวได้บ้างนะ...?\nนั่นเป็นผลงานของฉันเลยนะ..."
23004-70 = "อืมม...\nมีอะไรที่ต้อง\nซ่อมแซมบ้างมั้ยนะ?"
23004-80 = "เชิญเลยคุณครู\nวันนี้ก็ขอรบกวนด้วยนะ"
23004-90 = "คุณครูตัดสินใจถูกแล้วละ\nที่เรียกฉันออกมา"
23004-100 = "แล้วฉันจะตอบแทนที่เลือกฉันนะ"
23004-110 = "(อืม... การอ่านใจคุณครู...\nทำไมมันยากแบบนี้นะ)"
23004-120 = "เป็นไปตามที่คิดไว้เลย...\nไม่อยากเชื่อเลยว่าเราจะได้\nอยู่ด้วยกันแบบนี้"
23004-130 = "การต่อสู้ของมิลเลเนียม\nขึ้นอยู่กับว่าเรามีผู้เชี่ยวชาญมากแค่ไหน"
23004-140 = "พวกเราทำหลายอย่างสำเร็จได้\nเพราะมีคุณครูอยู่ด้วยไงล่ะ"
23004-150 = "ความงดงามของเครื่องจักร\nคือความมีเหตุผล ความแม่นยำ\nและความเรียบง่าย"
23004-160 = "สุขสันต์วันเกิดนะคุณครู"
23004-170 = "ปีนี้คุณครู\nอายุเท่าไหร่แล้วล่ะ?"
23004-180 = "วันนี้วันเกิดฉันเหรอ?"
23004-190 = "วันนี้เหรอเนี่ย... ลืมไปเลย\nแต่มันก็ไม่ได้สำคัญอะไรหรอก..."
23004-200 = "แต่พอคุณครูมาอวยพรให้แบบนี้\nฉันกลับดีใจอย่างบอกไม่ถูก..."
23004-210 = "สวัสดีปีใหม่นะคุณครู"
23004-220 = "ปีนี้ฉันจะพัฒนาตัวเองให้มากขึ้น"
23004-230 = "ก็เพราะมีคุณครูอยู่ด้วยไงล่ะ..."
23004-240 = "อยากให้ซานต้าให้ของขวัญ\nเป็นแกดเจ็ตใหม่ล่าสุดจัง"
23004-250 = "หืม? ให้ฉันสร้างเองเหรอ?"
23004-260 = "อ่า คุณครูหมายถึง..."
23004-270 = "ให้สร้างซานตาคลอสเหรอ?"
23004-280 = "ฉันได้รับข้อเสนอให้สร้าง\nตุ๊กตาฟักทองที่ขยับตัวได้ด้วยล่ะ"
23004-290 = "แต่งานของฉันกลับโดนปฏิเสธ\nเพราะมันมีฟังก์ชั่นระเบิดตัวเองอยู่ด้วย"
23004-300 = "ทำไมถึงปฏิเสธผลงานของฉันนะ?\nหุ่นยนต์ที่ไม่มีฟังก์ชั่นระเบิดตัวเอง\nก็ไม่ต่างอะไรกับกระป๋องที่ไม่มีสมอง"
23004-320 = "ไหนดูซิ...\nอืม ดูจากรอยแตกที่แกนแล้ว\nเหมือนจะมีปัญหาที่ตัวรับน้ำหนักนะ"
23004-330 = "ถ้าแบบนี้แสดงว่า\nตลับลูกปืนมีปัญหาสินะ..."
23004-340 = "อืม ดูเหมือนว่า\nจะต้องเปลี่ยนอะไหล่แล้วละ"
23004-350 = "...คุณครู มาดูฉันซ่อมแบบนี้\nสนุกงั้นเหรอ?"
23004-360 = "ถ้าคุณครูโอเคละก็\nฉันก็ไม่มีปัญหาอะไรหรอก"
23004-370 = "แต่ว่ามันค่อนข้างอันตรายน่ะ\nฉันว่าคุณครูไปนั่งดูตรงโน้นดีกว่านะ"
23004-380 = "ตรงนี้มีพวกโลหะคมๆ\nกระจายอยู่เต็มไปหมด"
23004-390 = "ไหนจะกลิ่นน้ำมันที่ชวนเวียนหัว\nนอกจากนี้..."
23004-400 = "หน้าของฉันเปื้อนเหงื่อ\nและเขม่าเต็มไปหมดเลย..."
23004-410 = "เปล่า ไม่มีอะไรหรอก\nลืมเรื่องที่พูดเมื่อกี้ไปเถอะ"
23004-420 = "...ว่าแล้วเชียว อย่างที่คิดไว้เลย"
23004-430 = "น้ำมันหล่อลื่นแห้ง\nและลูกปืนก็สึกหมดแล้ว"
23004-440 = "ช่วยส่งประแจตรงนั้น\nมาให้หน่อยได้มั้ย?"
23004-450 = "อ่า... โทษที ที่พูดไปเมื่อกี้...\nพอดีมันพูดติดปากจนเคยชินน่ะ"
23004-460 = "...ถึงจะพูดแบบนั้น\nแต่มีใครสักคนมาช่วยแบบนี้\nมันก็ดีกว่าจริงๆ"
23004-470 = "แล้วก็คงปฏิเสธไม่ได้ด้วยว่า\nมันทำให้รู้สึกดีเหมือนกันน่ะ"
23004-480 = "หน้าของคุณครู\nก็อาจเปื้อนน้ำมันได้เหมือนกัน..."
23004-490 = "แต่คุณครูจะช่วยฉันหน่อย\nได้รึเปล่า?"
23004-2600 = "ปาฏิหาริย์ที่เกิดขึ้นด้วยมือของฉัน\nแผนการและการสร้าง\nคุณครู คอยดูฝีมือของฉันต่อไปให้ดีล่ะ"

[translation]
23004-20 = "Makeup doesn't make a girl beautiful—passion does."
23004-30 = "If I made a Sensei Bot, I could make a fortune..."
23004-40 = "Now that I think about it, the helicopter could use a tune-up."
23004-50 = "Hmm... How about a battle-ready bidet?"
23004-60 = "I'm surprised no one wants camouflage underwear. I was so confident that it would be popular..."
23004-70 = "Hmm... Is there anything that needs to be repaired?"
23004-80 = "Welcome, Sensei. Let's do our best today!"
23004-90 = "Calling upon my expertise was the right decision."
23004-100 = "I'm going to prove that to you."
23004-110 = "(Hmm. Sensei can be...very hard to read.)"
23004-120 = "I thought it might come to this. I'm looking forward to the opportunity to finally work together."
23004-130 = "Millennium battles are decided by the abilities of the technicians around you."
23004-140 = "With you by our side, our potential is greater than ever."
23004-150 = "The true beauty of a machine can be found in its logic, precision, and simplicity."
23004-160 = "Happy birthday, Sensei."
23004-170 = "So, how old are you turning this year?"
23004-180 = "Today is my birthday?"
23004-190 = "I see. It completely slipped my mind. It's never been that important to me..."
23004-200 = "But...it makes me happy that you remembered my birthday, Sensei."
23004-210 = "Happy New Year, Sensei."
23004-220 = "I'm going to be a nicer person this year..."
23004-230 = "...because I'm with you."
23004-240 = "I hope Santa brings me the latest gadget."
23004-250 = "What? You think I should make it myself?"
23004-260 = "Hmm. Well..."
23004-270 = "Making my own Santa could be difficult..."
23004-280 = "I was asked to make a moving pumpkin doll."
23004-290 = "But...mine was rejected because of its self-destruct capabilities."
23004-300 = "I don't get it. What's the point of even building a robot that can't self-destruct?"
23004-320 = "Let's see... Judging by the gap in the axle, there may be a problem with the bearings."
23004-330 = "The bearings must be defective or worn-down..."
23004-340 = "Worst-case scenario, I'll need to replace some parts altogether."
23004-350 = "Do you intend on staying to watch, Sensei?"
23004-360 = "It's no issue, however..."
23004-370 = "Engineering is dangerous work, so please observe from a safe distance."
23004-380 = "I wouldn't want you to cut yourself on any of the equipment."
23004-390 = "And the smell of oil will stick to your clothes for quite some time. B-But most of all..."
23004-400 = "My face is a mess because of the sweat and soot..."
23004-410 = "However that's irrelevant to this situation! A-Anyways... The axle..."
23004-420 = "It appears I was correct."
23004-430 = "The bearings aren't lubricated properly, so there's a significant amount of wear-and-tear."
23004-440 = "Pass me the wrench, Sensei."
23004-450 = "Ah... Sorry. That was brusque. I'm not used to having someone help me..."
23004-460 = "...Despite what I said, having someone help me is more efficient"
23004-470 = "And I would be lying if I said this doesn't boost my mood too."
23004-480 = "You may end up with a lot of grime on your face..."
23004-490 = "But would you mind lending me a hand?"
23004-2600 = "A miracle happening at my fingertips. Design and production... Sensei, look forward to my genius."

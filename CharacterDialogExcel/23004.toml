[translation]
23004-20 = "讓少女變美的\n不是化妝，而是熱情"
23004-30 = "…如果製作老師的機器人…\n也許就能成為有錢人。"
23004-40 = "這麼說來，\n差不多該整備直升機了。"
23004-50 = "唔嗯…\n有戰鬥功能的\n免治馬桶如何。"
23004-60 = "為什麼沒有人需要\n光學迷彩內衣呢…\n明明是件自信之作…"
23004-70 = "唔嗯……\n沒有什麼\n需要修理的東西嗎？"
23004-80 = "歡迎，老師。\n今天一天，請多關照囉。"
23004-90 = "找我過來\n是合理的選擇。"
23004-100 = "為了回應你的期待，\n我會努力的。"
23004-110 = "（唔嗯…老師他…\n　真的很難分析呢）"
23004-120 = "……跟計算一樣。\n可以像這樣待在一起。"
23004-130 = "千年的戰鬥，\n取決於和多優秀的\n技術人員一起合作。"
23004-140 = "而我們藉由和老師\n在一起，將更多事情\n化為了可能。"
23004-150 = "機器的真善美是\n合理、精密，以及簡單。"
23004-160 = "生日快樂，\n老師。"
23004-170 = "那麼今年的\n型號年分是多少呢？"
23004-180 = "今天是我的生日？"
23004-190 = "這樣啊。我都忘了。\n因為並不是很重要……"
23004-200 = "不過……\n能收到老師的祝福，\n總覺得很開心。"
23004-210 = "老師，新年快樂！ "
23004-220 = "今年的我，\n將成為更溫柔、\n善良的我。"
23004-230 = "…因為有老師在。"
23004-240 = "如果聖誕老人\n送我最新的機器\n就好了。"
23004-250 = "嗯？\n直接做一個就好？"
23004-260 = "那個。\n是指…"
23004-270 = "聖誕老人嗎？"
23004-280 = "有人委託我做\n會動的南瓜娃娃。"
23004-290 = "但是，結果卻以\n自爆功能為由\n退貨了。"
23004-300 = "……不能理解，\n沒有自爆的機器人\n就只是廢鐵而已。"
23004-320 = "我看看…呼呣，\n軸心周圍變鬆了呢。"
23004-330 = "也就是說，軸承…"
23004-340 = "嗯，搞不好有更換\n零件的必要也說不定呢。"
23004-350 = "……老師，\n看這個，很有趣嗎？"
23004-360 = "老師不介意的話，\n是無所謂……"
23004-370 = "不過靠近的話會很危險，\n所以我建議坐在那邊看。"
23004-380 = "這邊到處散落著\n銳利的鐵屑，"
23004-390 = "機油的味道也很重，\n而且……"
23004-400 = "臉上，變得都是\n汗水和煤灰，所以……"
23004-410 = "不，沒什麼。\n忘記我剛才說的吧。"
23004-420 = "……原來如此，\n跟我想的一樣。"
23004-430 = "似乎是潤滑油不夠，\n導致軸承部分磨損了。"
23004-440 = "那邊的板手，\n可以幫我拿過來嗎？"
23004-450 = "啊……抱歉。\n剛才的是那個，出於\n平時的習慣就不小心…"
23004-460 = "……話雖如此，\n果然旁邊有人幫忙\n會更有效率，"
23004-470 = "似乎也無法否定\n心情會變得高昂呢。"
23004-480 = "老師你也，雖然臉上\n或許會沾滿煤灰……"
23004-490 = "願意協助我嗎？"
23004-2600 = "從我指尖催生的奇蹟，\n設計和製作。\n老師，請期待我日後的表現。"

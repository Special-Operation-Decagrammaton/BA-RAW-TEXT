[translation]
23004-20 = "소녀를 아름답게 하는 것은\n화장이 아니라 열정이지"
23004-30 = "…가짜 선생님 로봇을 만들면…\n재벌이 될 수 있을지도."
23004-40 = "그러고 보니 헬기 정비도\n슬슬 해야겠군."
23004-50 = "흐음…\n전투 기능을 갖춘 비데는 어떨까."
23004-60 = "어째서 아무도 광학미채\n속옷을 필요로 하지 않는 걸까…\n자신작이었는데…."
23004-70 = "흐음……\n뭔가 수리가 필요한 거,\n없으려나."
23004-80 = "어서 와 선생님.\n오늘 하루, 잘 부탁할게."
23004-90 = "나를 불렀다는 건,\n합리적인 선택이야."
23004-100 = "그 선택에, 부응하도록 노력할게."
23004-110 = "(흐음… 선생님은…\n분석하기 참 어렵네.)"
23004-120 = "…계산대로야.\n이렇게 함께할 수 있을 줄이야."
23004-130 = "밀레니엄의 전투란,\n얼마나 우수한 기술자와\n함께 하느냐에서 결정되지."
23004-140 = "우리는, 선생님과 함께 함으로서\n더 많은 것이 가능하게 되었어."
23004-150 = "기계의 진선미란\n합리, 정밀, 그리고\n간단함이야."
23004-160 = "생일 축하해 선생님."
23004-170 = "그럼 올해로 연식이\n어떻게 되는 거야?"
23004-180 = "오늘이 내 생일이라고?"
23004-190 = "그렇군. 잊고 있었어.\n별로 중요하지 않았으니까…."
23004-200 = "하지만… 선생님이\n축하해준다는 건,\n어쩐지 기쁘네."
23004-210 = "새해 복 많이 받아 선생님."
23004-220 = "올해의 나는, 좀 더\n상냥한 내가 될 거야."
23004-230 = "…선생님이 있으니까."
23004-240 = "산타가 최신기기를\n선물해주면 좋겠는데."
23004-250 = "응? 직접 만들라고?"
23004-260 = "아. 그러니까…"
23004-270 = "산타클로스를 말이지?"
23004-280 = "움직이는 호박 인형을\n만들어 달라는 제의를 받았어."
23004-290 = "하지만 자폭 기능을\n탑재했다는 이유로 거부당했지."
23004-300 = "…이해가 안 가네.\n자폭이 없는 로봇은\n깡통일 뿐인데."
23004-320 = "어디 보자….\n흠, 축 방향에\n유격이 생겼네."
23004-330 = "그렇다는 건\n베어링 문제인가…"
23004-340 = "음, 어쩌면\n부품을 갈아야\n할 필요가 있겠어."
23004-350 = "…선생님, 이거\n지켜보는 게 재미있어?"
23004-360 = "선생님만 좋다면야\n큰 상관은 없지만…"
23004-370 = "가까이 오면 꽤 위험하니까\n저쪽에 앉아서\n지켜봐 주었으면 좋겠는데."
23004-380 = "이 근처에는 날카로운\n쇠붙이가 널려 있고,"
23004-390 = "기름 냄새도 고약하고…\n게다가…."
23004-400 = "얼굴도 땀과 검댕 때문에\n지저분하게 보이니…."
23004-410 = "아니, 아무것도 아니야.\n지금 건 잊어줘."
23004-420 = "…역시, 생각대로네."
23004-430 = "윤활유가 말라서\n베어링 부분이 마모된 것 같아."
23004-440 = "그쪽에 있는 스패너 좀\n건네줄래?"
23004-450 = "아… 미안.\n방금 그건,\n평소의 습관 때문에 그만…."
23004-460 = "…말은 그렇게 했지만 역시\n누군가가 도와주는 편이\n더 효율적이고"
23004-470 = "기분도 고양된다는 건\n부정하지 못하겠네."
23004-480 = "선생님도 얼굴에 검댕이\n잔뜩 묻을 수도 있겠지만…"
23004-490 = "도와줄래?"
23004-2600 = "내 손끝에서 이루어지는 기적.\n설계와 제작.\n선생님. 앞으로의 나를 기대해줘."

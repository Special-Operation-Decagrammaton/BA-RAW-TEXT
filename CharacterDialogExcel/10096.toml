[translation]
10096-10 = "蔚藍檔案。"
10096-20 = "我是女武神警察學園，公安局局長尾刃環奈。\n由於任務特性的緣故，\n還請您原諒我以這幅模樣向您問好的無禮。"
10096-30 = "需要救助的人……\n有嗎？"
10096-40 = "稍微休息一下吧。"
10096-50 = "為了能夠隨時出動，\n暖身運動可不能怠慢。"
10096-60 = "唔嗯……雖然\n是有幾個地方\n令人在意……"
10096-70 = "等休息結束之後\n就開始巡邏吧。"
10096-80 = "恭候多時了，老師。\n如果需要我的力量，\n請隨時告訴我。"
10096-90 = "您來了啊，老師。"
10096-100 = "從現在起\n夏萊的水上安全\n就由我來負責。"
10096-110 = "咦？這裡沒有\n游泳池……？"
10096-120 = "我還不太習慣穿泳裝……\n如果看起來很奇怪的話，\n我很抱歉。"
10096-130 = "意外總是會在\n疏於防備的時候發生。"
10096-140 = "因此為了能夠立即應變，\n我隨時都保持著警戒。"
10096-150 = "咖啡？\n因為會妨礙到工作，\n所以只喝了一杯。"
10096-160 = "人命救助姑且不論，\n我在接待和引導方面\n實在沒什麼自信……"
10096-170 = "想睡的時候\n動動身體比較好哦。"
10096-180 = "來，請起立吧。\n我來教您救生員式的\n暖身運動。"
10096-190 = "祝您生日快樂，老師。"
10096-200 = "今天一天\n還請安心度過。"
10096-210 = "老師的安全，\n就由我來守護。"
10096-220 = "啊，已經到\n我的生日了嗎？"
10096-230 = "雖然感覺和平常\n沒什麼不同……"
10096-240 = "又到新的一年了呢。\n希望今年不會發生意外。"
10096-250 = "人們越興奮的時候，\n救生員就越該繃緊神經。"
10096-260 = "……不過，只是\n跟老師喝杯咖啡的話，\n倒也無妨吧。"
10096-270 = "雖然我不是很喜歡糖……"
10096-280 = "咦？那要惡作劇……？\n如果不危險的話\n倒是無所謂……"
10096-290 = "不過那種行為……\n請，請只對我一個人做哦。"
10096-310 = "呼……的確有種\n疲勞一掃而空的感覺。"
10096-320 = "沒關係的。\n畢竟這也是\n檢查項目之一。"
10096-330 = "而且……\n認真做事的人\n本來就該獲得獎賞。"
10096-340 = "……除此之外，\n平時也總是受老師的照顧。"
10096-350 = "所以這個……\n是我送給老師的\n一點小小的禮物。"
10096-360 = "咦！？\n那，那怎麼可能呢！"
10096-370 = "我之所以在這裡，\n是為了……"
10096-380 = "……為了保護老師的安全！\n畢竟我是救生員啊！"
10096-2600 = "從老師手中獲得的信任的證明……\n原來如此，救生員的負荷相當沉重。\n為了不辜負您的期待，我會竭盡全力。"

[translation]
10096-10 = "Blue Archive"
10096-20 = "โอกาตะ คันนะ หัวหน้ากรมความมั่นคงสาธารณะ วัลคิรี่ค่ะ\nฉันแต่งชุดนี้เพราะงานใหม่ที่ได้รับมอบหมาย โปรดเข้าใจด้วยนะคะ"
10096-30 = "มีใครตกอยู่\nในอันตรายมั้ยนะ"
10096-40 = "ไปพักสักหน่อยดีมั้ยนะ"
10096-50 = "วอร์มอัปร่างกายตลอด\nเพื่อให้พร้อมทำงาน\nในทุกเมื่อ"
10096-60 = "อืม... มีส่วนที่ต้อง\nให้ความสนใจ\nอยู่หลายส่วนเลย..."
10096-70 = "ถ้าพักผ่อนเสร็จแล้ว\nก็ไปเริ่มลาดตระเวน\nก่อนแล้วกัน"
10096-80 = "กำลังรออยู่เลยค่ะคุณครู\nถ้าต้องการให้ฉันช่วย\nก็บอกฉันได้ตลอดเลยค่ะ"
10096-90 = "มาแล้วเหรอคะ\nคุณครู"
10096-100 = "จากนี้ไปฉันจะรับผิดชอบ\nเรื่องความปลอดภัยทางน้ำ\nของชาเล่ต์เองค่ะ"
10096-110 = "คะ? ที่นี่ไม่มี\nสระว่ายน้ำ... งั้นเหรอคะ?"
10096-120 = "ฉันไม่ชินกับชุดว่ายน้ำค่ะ...\nถ้ามันไม่น่ามองก็ขอโทษด้วยนะคะ"
10096-130 = "อุบัติเหตุมักเกิดขึ้น\nตอนเราไม่คาดคิดค่ะ"
10096-140 = "ฉันใส่ใจอยู่ตลอด เพื่อให้\nรับมือได้อย่างทันควันค่ะ"
10096-150 = "กาแฟเหรอคะ?\nมันขัดขวางการทำงาน\nฉันเลยดื่มไปแก้วเดียวค่ะ"
10096-160 = "ถึงจะมั่นใจเรื่องการช่วยเหลือคน\nแต่เรื่องการต้อนรับหรือแนะนำลูกค้า\nฉันไม่มั่นใจเลยค่ะ..."
10096-170 = "ตอนง่วงๆ\nต้องขยับร่างกาย\nถึงจะดีค่ะ"
10096-180 = "เอาละ ลุกขึ้นสิคะ\nฉันจะสอนวอร์มอัป\nตามแบบฉบับไลฟ์การ์ดค่ะ"
10096-190 = "สุขสันต์วันเกิดค่ะคุณครู"
10096-200 = "ขอให้วันนี้\nเป็นวันที่สบายใจนะคะ"
10096-210 = "ฉันจะดูแลความปลอดภัย\nของคุณครูเองค่ะ"
10096-220 = "อ๊ะ วันเกิดวนมาถึง\nอีกแล้วสินะคะ"
10096-230 = "แต่ฉันคิดว่า\nวันนี้ก็ไม่ต่างจากทุกวันค่ะ..."
10096-240 = "เริ่มปีใหม่แล้วนะคะ\nปีใหม่นี้\nขอให้ไม่มีอุบัติเหตุนะคะ"
10096-250 = "วันนี้เป็นวันที่ผู้คนรื่นเริงกัน\nไลฟ์การ์ดจึงต้องตั้งสติ\nเอาไว้ให้มั่นค่ะ"
10096-260 = "แต่ว่า... การมาดื่มกาแฟ\nกับคุณครู\nก็ไม่น่าเป็นอะไรนะคะ"
10096-270 = "ฉันไม่ค่อยชอบ\nลูกกวาดเท่าไรค่ะ..."
10096-280 = "คะ? ถ้างั้นจะแกล้งแทนเหรอ...?\nถ้าไม่อันตราย\nฉันก็ไม่ว่าหรอกค่ะ..."
10096-290 = "เรื่องแบบนั้น\nทะ... ทำกับฉันคนเดียวพอนะคะ"
10096-310 = "ฮู่ว รู้สึกเหมือนได้คลาย\nความเมื่อยล้าจริงๆ เลยนะคะ"
10096-320 = "ไม่เป็นไรหรอกค่ะ\nนี่ก็เป็นส่วนหนึ่งของงานค่ะ"
10096-330 = "อีกอย่าง...\nคนที่ตั้งใจทำงาน\nก็ต้องได้รับรางวัลสิคะ"
10096-340 = "แล้วฉันก็ติดหนี้บุญคุณ\nคุณครูอยู่เรื่อยเลยด้วย"
10096-350 = "เพราะงั้นนี่คือ...\nของขวัญเล็กๆ น้อยๆ\nที่ฉันมอบให้คุณครูค่ะ"
10096-360 = "คะ คะ?!\nจะ... จะเป็นแบบนั้น\nไปได้ยังไงคะ!"
10096-370 = "ที่ฉันมาอยู่ที่นี่\nก็เพื่อ..."
10096-380 = "ความปลอดภัย\nของคุณครูค่ะ!\nก็ฉันเป็นไลฟ์การ์ดนี่คะ!"
10096-2600 = "หลักฐานความไว้วางใจที่ได้จาก\nคุณครู... อย่างนี้เองสินะคะ\nไลฟ์การ์ดต้องรับผิดชอบงานหนัก\nอยู่แล้ว ฉันจะพยายามอย่างเต็มที่\nให้สมกับที่คาดหวังค่ะ"

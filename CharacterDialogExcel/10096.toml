[translation]
10096-10 = "Blue Archive."
10096-20 = "Public Peace Bureau Director Ogata Kanna from Valkyrie Police School. Forgive my rudeness in greeting you like this, but it's the nature of my duties."
10096-30 = "Anyone in danger...? Nope."
10096-40 = "I'll take a short break."
10096-50 = "I never slack off on warm-ups, so I'm ready to move out at a moment's notice."
10096-60 = "Mmm... There are a few items of concern."
10096-70 = "I'll need to get started on patrol as soon as break's over."
10096-80 = "I've been waiting, Sensei. If you need my help, let me know anytime."
10096-90 = "Welcome, Sensei."
10096-100 = "From here on out, consider me responsible for Schale's surface water safety."
10096-110 = "Huh? There's no...swimming pool here?"
10096-120 = "I'm not used to wearing swimsuits... Apologies if it's any sort of bother."
10096-130 = "Incidents happen when you're unprepared."
10096-140 = "I'm always on alert, so I can respond right away."
10096-150 = "Coffee? It gets in my way, so I only had one cup."
10096-160 = "Sure I can rescue people, but I don't know about welcoming or helping guests."
10096-170 = "When you're feeling tired, you should move your body."
10096-180 = "Then, let's get up. I'll show you a lifeguard's warm-up."
10096-190 = "Happy birthday, Sensei."
10096-200 = "I hope your day is a safe one."
10096-210 = "I'll secure Sensei's safety."
10096-220 = "Ah, it's my birthday again."
10096-230 = "It's no different from any other day..."
10096-240 = "Another new year. Let's hope there aren't any safety accidents this year."
10096-250 = "On exciting days like these, lifeguards have to be even more alert than usual."
10096-260 = "...But, well, I guess a cup of coffee with you would be okay, Sensei."
10096-270 = "I'm not a huge fan of candy..."
10096-280 = "Huh? The trick then? That's okay, as long as it's not dangerous..."
10096-290 = "But the only target...can be m-me."
10096-310 = "Ahh, I can feel all my fatigue...melting away."
10096-320 = "This is fine... We can call it...a maintenance check."
10096-330 = "Besides... People who work hard deserve a reward."
10096-340 = "And, besides that... I'm always...in your debt, Sensei."
10096-350 = "So this...is just a small token of my thanks."
10096-360 = "Wh-What?! I mean, of course not!"
10096-370 = "The reason I'm here is because..."
10096-380 = "It's for your safety! I'm a lifeguard!"
10096-2600 = "Sensei's symbol of trust... I see. A lifeguard shoulders heavy responsibilities. I'll do my best to live up to your expectations."

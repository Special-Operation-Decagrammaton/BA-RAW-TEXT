[translation]
10096-10 = "블루 아카이브."
10096-20 = "발키리 경찰학교, 공안국 국장 오가타 칸나입니다.\n임무 특성상, 이런 모습으로 인사드리는 무례를 용서해 주시기 바랍니다."
10096-30 = "위험에 빠진\n사람은……. 없나."
10096-40 = "잠깐 휴식을\n취하도록 할까."
10096-50 = "언제든지 출동할 수\n있도록, 준비운동은\n게을리하지 않아."
10096-60 = "으음……. 몇 가지\n신경 쓰이는\n부분은 있지만……."
10096-70 = "휴식이 끝나면\n순찰부터\n시작하도록 할까."
10096-80 = "기다리고 있었습니다, 선생님.\n제 힘이 필요하다면,\n언제든지 말씀해 주십시오."
10096-90 = "오셨습니까,\n선생님."
10096-100 = "현 시간부로\n샬레의 수상 안전은\n제가 책임지겠습니다."
10096-110 = "네? 여긴\n수영장이 없다…고요?"
10096-120 = "수영복은 익숙지 않습니다…….\n보기 흉하다면, 죄송합니다."
10096-130 = "사고는 예기치 않을 때\n일어나는 법이죠."
10096-140 = "바로 대처할 수 있도록,\n항상 신경 쓰고 있습니다."
10096-150 = "커피요?\n방해가 되기에,\n한 잔만 마셨습니다."
10096-160 = "사람들을 구하는 건 몰라도,\n접객이나 안내에는\n자신이 없습니다……."
10096-170 = "졸릴 때는\n몸을 움직이는 게\n좋습니다."
10096-180 = "자, 일어나시죠.\n라이프가드식 준비운동을\n알려드리겠습니다."
10096-190 = "생일 축하드립니다, 선생님."
10096-200 = "오늘 하루는\n안심하고 보내시길\n바랍니다."
10096-210 = "선생님의 안전은,\n제가 지킬 테니까요."
10096-220 = "아, 벌써 생일이\n돌아왔군요."
10096-230 = "평소와 다를 바 없다고\n생각합니다만……."
10096-240 = "또 한 해가 밝았군요.\n부디 새해에는\n안전사고가 없기를 바랍니다."
10096-250 = "사람들이 들뜨는 날일수록\n라이프가드는 신경을 곤두세워야\n하는 법입니다."
10096-260 = "……하지만, 선생님과\n커피를 마시는 정도는,\n괜찮겠죠."
10096-270 = "사탕은 그다지\n선호하지 않습니다만……."
10096-280 = "네? 그럼 장난을……?\n위험하지 않다면\n상관없습니다만……."
10096-290 = "그런 행위는……\n저, 저한테만 하시죠."
10096-310 = "후우, 확실히 피로가\n풀리는 느낌이군요."
10096-320 = "괜찮습니다.\n이것도 점검의\n일부니까요."
10096-330 = "게다가……\n열심히 일한 자에게는\n포상이 있어야죠."
10096-340 = "……그리고, 선생님께는\n늘 신세를 졌으니까요."
10096-350 = "그러니까 이건……\n제가 선생님께 드리는\n작은 선물입니다."
10096-360 = "네, 네?!\n그, 그럴 리가\n없지 않습니까!"
10096-370 = "제가 있는 이유는,\n그러니까……"
10096-380 = "……선생님의\n안전을 위해서입니다!\n저는 라이프가드니까!"
10096-2600 = "선생님께서 주신 신뢰의 증표…….\n그렇군요. 라이프가드의 어깨는 무거운 법이죠.\n기대에 저버리지 않도록, 최선을 다하겠습니다."

[translation]
23005-20 = "โอคุโซระ อายาเนะค่ะ\nตั้งแต่นี้ไป ฉันจะคอยช่วยคุณครูเองค่ะ"
23005-30 = "อ่ะฮ่า!"
23005-40 = "ดูเหมือนเป็นของแพงเลยนะคะ..."
23005-50 = "มีขนมซ่อนอยู่ที่นี่หรือเปล่านะ..."
23005-60 = "มันทำงานยังไงนะ?"
23005-70 = "ไม่เป็นไรใช่ไหมนะ...?"
23005-80 = "ยินดีต้อนรับค่ะ คุณครู\nฉันจะแจ้งตารางงานให้ทราบนะคะ"
23005-90 = "กำลังรอคุณครูอยู่เลยล่ะค่ะ"
23005-100 = "จะเริ่มจากงานไหนก่อนดีคะ?"
23005-110 = "ถ้าเป็นตารางงานล่ะก็\nฉันเตรียมไว้ให้แล้วล่ะค่ะ"
23005-120 = "คะ? วันนี้ต้องทำงานทั้งคืน\nกันสองคนเหรอคะ?"
23005-130 = "ฉะ...ฉันไม่มีปัญหาหรอกค่ะ\nตะ...แต่ว่าสายตา..."
23005-140 = "อ่า... คะ?\nล้อเล่นงั้นเหรอคะ"
23005-150 = "ค่ะ"
23005-160 = "สุขสันต์วันเกิดนะคะ\nคุณครู"
23005-170 = "ตารางงานของวันนี้เอาเป็น\nจัดปาร์ตี้วันเกิดคุณครูแทนดีไหมคะ?"
23005-180 = "คะ?\nอยากจัดปาร์ตี้กับฉันเหรอคะ?"
23005-190 = "อ่า... อ่า...\nรู้ว่าเป็นวันเกิดของฉันด้วยเหรอคะ?"
23005-200 = "อ่า... ว้าว...\nขอบคุณมากๆ เลยค่ะ..."
23005-210 = "ที่จริงแล้ว...\nฉันนึกไม่ถึงเลยค่ะ"
23005-220 = "ปีนี้ก็ฝากตัวด้วยนะคะ\nคุณครู"
23005-230 = "ได้ใช้เวลาอีก 1 ปีกับคุณครู\nแบบนี้ ฉันดีใจมากเลยค่ะ"
23005-240 = "เมอร์รี คริสต์มาส....\nบางครั้ง งานเทศกาลที่ครึกครื้น\nแบบนี้ ก็ไม่แย่เท่าไหร่นะคะ..."
23005-250 = "คะ? ไปข้างนอกเหรอคะ?\nกะ...กับฉันเหรอคะ?"
23005-260 = "แฮปปี้ฮาโลวีนค่ะ!\nเป็นวันที่แสนวุ่นวายจริงๆ เลยล่ะค่ะ\nคุณครู"
23005-280 = "หือ? คุณครู?\nอยู่ตรงนั้นเหรอคะ?"
23005-290 = "ฉันสายตาไม่ดีก็เลย...\nมองไม่ค่อยชัดค่ะ"
23005-300 = "คะ? อ่า... ที่จริงแล้ว\nปกติฉันจะไม่ค่อย\nถอดแว่นตาหรอกค่ะ"
23005-310 = "อ่า ฮะฮ่าฮ่า...\nแต่ฉันก็ไม่ใส่แว่นตอนที่\nอาบน้ำหรอกนะคะ"
23005-320 = "รู้สึกร้อนๆ ที่หน้ายังไงก็ไม่รู้ค่ะ..."
23005-330 = "ฉันรู้สึกเหมือน...\nทำให้ตัวเองขายหน้า\nต่อหน้าคุณครูอีกแล้วเลย..."
23005-340 = "คะ?! นะ...น่ารักงั้นเหรอคะ!\nพูดอะไรน่ะ..."
23005-350 = "อ่า... เอ่อ..."
23005-360 = "อย่า... อย่าจ้องฉันแบบนั้นสิคะ..."
23005-370 = "มะ... มันน่าอายนะคะ"
23005-2600 = "ฮะฮะฮะ... ของพวกนี้...\nฉันไม่รู้ว่าจะใช้มันได้ดีหรือเปล่า...\nแต่ถ้าลองหาคู่มือหรือหนังสือที่เกี่ยวข้องดู\nก็คงจะใช้ได้ใช่มั้ยล่ะคะ? ขอบคุณค่ะคุณครู!"

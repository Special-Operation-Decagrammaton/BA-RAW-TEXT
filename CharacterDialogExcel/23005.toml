[translation]
23005-20 = "I'm Okusora Ayane. You can count on my support."
23005-30 = "Ahaha!"
23005-40 = "It looks expensive..."
23005-50 = "Should I hide some snacks here...?"
23005-60 = "How does it work?"
23005-70 = "Is this okay...?"
23005-80 = "Welcome, Sensei. Allow me to go over your schedule."
23005-90 = "I-I've been waiting, Sensei."
23005-100 = "What kind of tasks are on your itinerary today?"
23005-110 = "I'll check the schedule too."
23005-120 = "Huh? We have to work all night? J-Just the two of us?"
23005-130 = "N-Not that I mind, but...what will the others think?"
23005-140 = "Oh, I see. You were just joking."
23005-150 = "Yeah."
23005-160 = "Happy birthday, Sensei."
23005-170 = "Shall I add a birthday party to today's schedule?"
23005-180 = "What? With me?"
23005-190 = "You knew it was my birthday?"
23005-200 = "Oh, wow... Thank you."
23005-210 = "To be honest, I wasn't expecting that..."
23005-220 = "I look forward to working with you this year, Sensei."
23005-230 = "I'm glad I get to spend another year with you."
23005-240 = "Christmas, huh? I suppose a festive holiday like this is okay from time to time..."
23005-250 = "Huh? Go out together? M-Me and you?"
23005-260 = "Happy Halloween! It's been so loud around here, Sensei."
23005-280 = "Huh? Sensei? Are you there?"
23005-290 = "I can hardly see... Everything is so blurry."
23005-300 = "Huh? Oh. Well, yeah. I normally don't have a reason to take them off."
23005-310 = "A-Ahaha... I pretty much only take them off in the shower."
23005-320 = "Great. I can tell I'm blushing..."
23005-330 = "I just keep embarrassing myself in front of you..."
23005-340 = "Huh?! Y-You think it's cute? I don't know what you're talking about..."
23005-350 = "U-Ugh..."
23005-360 = "P-Please, don't look at me like that..."
23005-370 = "Y-You're embarrassing me..."
23005-2600 = "Hahaha... I don't know if I can handle something like this very well, but...I'm sure it'll work out somehow if I look at manuals and stuff, right? Thank you!"

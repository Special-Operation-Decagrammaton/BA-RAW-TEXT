[translation]
23005-20 = "오쿠소라 아야네입니다.\n지금부터 선생님을 지원하겠습니다."
23005-30 = "아하하…"
23005-40 = "비싸 보이는 물건이네…"
23005-50 = "여기다 과자라도 숨겨둘까…"
23005-60 = "작동 원리가 뭐지?"
23005-70 = "이건 괜찮은 건가…?"
23005-80 = "어서 오세요, 선생님.\n일정을 보고드리겠습니다."
23005-90 = "기다리고 있었습니다, 선생님."
23005-100 = "오늘은 어떤 업무를 하실 건가요?"
23005-110 = "스케쥴이라면\n저도 체크해두겠습니다."
23005-120 = "…네?\n오늘은 단둘이 철야라고요?"
23005-130 = "저, 저는 상관없지만…\n보는 눈이……"
23005-140 = "…아아. 네.\n농담이라고요."
23005-150 = "네."
23005-160 = "생일 축하드립니다,\n선생님."
23005-170 = "오늘의 일정은\n생일 파티로 괜찮으세요?"
23005-180 = "네?\n저랑 함께요?"
23005-190 = "어, 어…\n제 생일을 알고 계셨어요?"
23005-200 = "아, 아우아…\n감사합니다……"
23005-210 = "솔직히…\n예상 못하고 있었어요…"
23005-220 = "이번 한 해도 잘 부탁드립니다,\n선생님."
23005-230 = "선생님과 함께 또 1년을\n보낼 수 있다니 기뻐요."
23005-240 = "크리스마스…\n가끔씩은 이런 요란한\n시즌도 괜찮지만……"
23005-250 = "네? 같이 외출이요?\n저, 저랑요?"
23005-260 = "해피 할로윈-!\n시끌벅적한 날들이네요, 선생님."
23005-280 = "응? 선생님?\n거기 계시죠?"
23005-290 = "눈이 나빠서…\n잘 안 보여요."
23005-300 = "네? 아. 확실히 저,\n평소엔 벗을 일이\n거의 없으니까요."
23005-310 = "아, 아하하…\n아무리 그래도 씻을 때도\n안경을 끼진 않아요."
23005-320 = "뭔가 얼굴이 뜨거워요…"
23005-330 = "선생님께\n부끄러운 모습만\n보여준 거 같아서…"
23005-340 = "네?! 귀, 귀엽다니…\n그런…"
23005-350 = "아, 아우아…"
23005-360 = "그, 그렇게 쳐다보시면…"
23005-370 = "부… 부끄러운데…"
23005-2600 = "아하하… 이런 걸 제가\n잘 다룰 수 있을까 모르겠지만…\n매뉴얼과 관련 서적들을 찾아보면\n어떻게든 되겠죠…… 감사합니다, 선생님…!"

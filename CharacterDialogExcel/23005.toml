[translation]
23005-20 = "我是奥空綾音。\n從現在起我會支援老師的。"
23005-30 = "啊哈哈…"
23005-40 = "那東西看起來很貴…"
23005-50 = "要不要在這裡藏餅乾呢……"
23005-60 = "運作原理是什麼呢？"
23005-70 = "這沒問題嗎…？"
23005-80 = "您辛苦了，老師。\n我來報告行程。"
23005-90 = "我正在等您呢，老師。"
23005-100 = "今天要進行什麼任務呢？"
23005-110 = "在行程方面，\n我也會為您確認的。"
23005-120 = "咦，今晚要兩人\n單獨熬夜是嗎！？"
23005-130 = "我，我的話，是無所謂…\n不過，周圍的視線……"
23005-140 = "……咦，啊，\n原來您是開玩笑的……"
23005-150 = "是。"
23005-160 = "祝您生日快樂，老師。"
23005-170 = "今天就來舉行生日派對，\n這樣可以嗎？"
23005-180 = "咦？\n我也一起，是嗎？"
23005-190 = "咦，啊……！\n您知道我的生日嗎！？"
23005-200 = "啊，啊嗚……\n非常感謝……"
23005-210 = "我完全，沒有預料到……"
23005-220 = "今年也請您多多指教，\n老師。"
23005-230 = "居然能和老師再多\n相處一年，我很開心。"
23005-240 = "聖誕節……\n偶爾過點這種熱鬧的\n季節也不錯……"
23005-250 = "咦？一起外出嗎？\n 跟、跟我嗎？"
23005-260 = "萬聖節快樂！\n 真是熱鬧的一天呢，老師。"
23005-280 = "……？\n……老師？\n您在那裡，對吧？"
23005-290 = "沒戴眼鏡的話……\n有點看不清楚。"
23005-300 = "咦？啊，也對。\n我的確是幾乎\n一直戴著眼鏡呢。"
23005-310 = "啊，啊哈哈……再怎麼說，\n洗臉的時候還是會拿下來的。"
23005-320 = "總，總覺得，\n臉在發燙……"
23005-330 = "被老師，看到了很害羞的場面……"
23005-340 = "咦！？可，可愛\n什麼的……哪有……"
23005-350 = "啊，啊嗚……"
23005-360 = "那，那樣一直\n盯著我看的話……"
23005-370 = "好……好害羞……"
23005-2600 = "啊哈哈…雖然不知道\n我是否駕馭得了這種東西…\n不過翻翻看說明書或相關書籍\n總會有辦法的吧？謝謝！"

[translation]
10078-10 = "蔚藍檔案～！！哈～哈哈哈哈！"
10078-20 = "哈～哈哈哈！哪裡有溫泉我們就在哪！\n不，就算沒有溫泉我們也在！\n來，爆破準備已經就緒囉！"
10078-30 = "喔？\n這裡還挺……？"
10078-40 = "如果在這裡\n挖溫泉……"
10078-50 = "……唉呦，真危險。\n有一群麻煩的傢伙在呢。"
10078-60 = "在這裡也得\n躲躲藏藏的才行嗎？"
10078-70 = "唔呣……真閒……\n來唸點書吧。"
10078-80 = "呀呀～老師！\n這裡真是個\n時髦的地方！"
10078-90 = "終於來了啊！\n我一直在等你哦，老師！"
10078-100 = "我也不是到處\n隨便亂挖的哦？"
10078-110 = "還是有一定程度的\n頭緒才行動的。"
10078-120 = "嗯？只是一個勁地挖\n可不算是溫泉開發哦？"
10078-130 = "建造我當然也喜歡！"
10078-140 = "只是通常不會進行\n到建造環節就是了！"
10078-150 = "哈～哈哈！\n唔呣，那也是一種趣味！"
10078-160 = "跟老師在一起就跟\n開發溫泉的時候一樣開心。"
10078-170 = "哈～哈哈！\n別那麼警戒嘛！"
10078-180 = "萬一我被抓了的話，\n還請一定要來探視哦！"
10078-190 = "我會等著你的！\n哈～哈哈哈哈！"
10078-200 = "哦哦～！老師，\n今天正好是你的生日對吧？"
10078-210 = "這可是特別的日子！\n這就來去做禮物吧！"
10078-220 = "唉……來夏萊的途中\n又被風紀委員追趕了。"
10078-230 = "真受不了！\n今天明明是我生日，\n難道不能通融一下嗎？"
10078-240 = "新年快樂，老師！\n又平安度過了一年呢。"
10078-250 = "好，今年也來大挖特挖吧！"
10078-260 = "聖誕節真是棒極了！\n因為警備會變薄弱，\n正好是適合開發的日子！"
10078-270 = "還真是挺吵鬧的啊！\n這樣就連挖土機的\n聲音都能蓋過……"
10078-280 = "別用那種眼神看我。"
10078-300 = "哈～哈哈哈哈！\n來得正是時候呢！"
10078-310 = "歡迎你來，老師。\n這裡是我的\n第86祕密基地。"
10078-320 = "問我在這裡做什麼？\n那還用問嗎，老師。\n說到我會做的事就只有一個。"
10078-330 = "那就是……\n尋找新的溫泉點！"
10078-340 = "哈哈，老師。\n這麼快就理解真是太好了。"
10078-350 = "沒錯，正是如此。\n我剛才正在思考\n實際要爆破的地點。"
10078-360 = "呼呣……\n這裡好嗎？"
10078-370 = "不……這裡\n也還挺……"
10078-380 = "怎麼啦，老師？\n為什麼要用\n那種眼神看我？"
10078-390 = "有什麼問題嗎？"
10078-2600 = "老師……真的可以嗎？\n繼續跟我來往，\n可是很費勁的哦？已經忠告過你囉？\n要是有什麼萬一我可不管哦！\n哈～哈哈哈哈！"

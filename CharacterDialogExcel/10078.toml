[translation]
10078-10 = "Blue Archive~!! วะฮะฮะฮ่า!"
10078-20 = "วะ~ ฮะฮะฮ่า! เพราะที่นั่นมีออนเซ็น ก็เลยมีพวกเราไง!\nไม่สิ ต่อให้ไม่มีออนเซ็นก็มีพวกเรา!\nมาเลย ฉันเตรียมพร้อมระเบิดทุกเวลา!"
10078-30 = "โอ้ว?\nถ้าเป็นที่นี่ละก็...?"
10078-40 = "ถ้าขุดบ่อออนเซ็นตรงนี้..."
10078-50 = "...โอ๊ะ อันตรายจริงๆ\nมีพวกตัวป่วนอยู่ที่นี่เยอะเลย"
10078-60 = "เวลาอยู่ที่นี่...\nก็ต้องซ่อนตัวด้วยงั้นเหรอ"
10078-70 = "อืม... เบื่อจังเลย...\nอ่านหนังสือหน่อยดีมั้ยนะ?"
10078-80 = "โห~ คุณครู!\nที่นี่ก็ค่อนข้าง\nดูดีเลยนะเนี่ย!"
10078-90 = "ในที่สุดก็มาแล้วเหรอ!\nกำลังรออยู่เลยนะคุณครู!"
10078-100 = "เห็นอย่างนี้ ฉันก็ไม่ได้\nเที่ยวขุดไปทั่วหรอกนะ"
10078-110 = "เห็นแบบนี้ฉันก็มีเซนส์\nในการเลือกอยู่เหมือนกันนะ"
10078-120 = "หืม? ก็การพัฒนาออนเซ็น\nไม่ได้มีแต่การขุดนี่นา"
10078-130 = "ฉันก็ชอบการก่อสร้าง\nเหมือนกันนะ!"
10078-140 = "แค่ส่วนมากไปไม่ถึง\nขั้นตอนการสร้างน่ะ!"
10078-150 = "วะ~ ฮะฮะฮ่า!\nแต่แบบนั้นมันก็สนุกดีไปอีกแบบ!"
10078-160 = "ถ้าได้อยู่กับคุณครู\nฉันก็สนุกเหมือนตอน\nพัฒนาออนเซ็นเลย"
10078-170 = "วะ~ ฮะฮะฮ่า!\nไม่ต้องระวังตัวขนาดนั้นก็ได้!"
10078-180 = "ถ้าฉันถูกจับตัวไป\nต้องมาเยี่ยมด้วยนะ!"
10078-190 = "แล้วฉันจะรอนะ!\nวะ~ ฮะฮะฮ่า!"
10078-200 = "โอ้ว~ คุณครู\nวันนี้วันเกิดคุณครูนี่นา!"
10078-210 = "วันพิเศษทั้งที\nฉันจะไปทำของขวัญมาให้นะ!"
10078-220 = "เฮ้อ... ระหว่างทางมาชาเล่ต์\nโดนคณะกรรมการวินัย\nไล่ตามอีกจนได้"
10078-230 = "จริงๆ เลย!\nวันนี้วันเกิดฉันทั้งที\nควรจะใจดีกับฉันหน่อยสิ?"
10078-240 = "สวัสดีปีใหม่นะคุณครู!\nผ่านไปได้อย่างราบรื่น\nอีกปีแล้วเนอะ?"
10078-250 = "เอาละ ปีนี้ก็ไปขุดให้เยอะๆ อีก!"
10078-260 = "ชอบวันคริสต์มาสจัง!\nวันนี้การเฝ้ายามจะหละหลวม\nเลยเหมาะกับการพัฒนาที่สุด!"
10078-270 = "เอะอะโวยวายกันจัง!\nแบบนี้ก็กลบเสียง\nเครื่องขุดเจาะหมดน่ะสิ..."
10078-280 = "อย่ามองด้วยสายตาแบบนั้นสิ"
10078-300 = "ว้าว~ วะฮะฮะฮ่า!\nมาได้จังหวะพอดีเลยนะ!"
10078-310 = "ยินดีต้อนรับ คุณครู~\nที่นี่คือกองบัญชาการลับ\nที่ 86 ของฉัน"
10078-320 = "ฉันมาทำอะไรอยู่ที่นี่น่ะเหรอ?\nถามแปลกๆ นะคุณครู\nงานที่ฉันทำมีเพียงอย่างเดียว"
10078-330 = "และนั่นคือ... ฉันกำลังหา\nพิกัดออนเซ็นใหม่\nอยู่ยังไงล่ะ!"
10078-340 = "ฮะฮ่า คุณครู\nดีจังเลยนะที่เราคุยกันรู้เรื่อง"
10078-350 = "อ้อ ใช่แล้วละ\nฉันกำลังตรวจสอบพื้นที่รอบๆ\nบริเวณที่จะไประเบิดอยู่น่ะ"
10078-360 = "ฮืม...\nตรงนี้จะดีมั้ยนะ?"
10078-370 = "ไม่สิ...\nตรงนี้ก็ค่อนข้าง..."
10078-380 = "อะไรกัน คุณครู?\nทำไมมองฉันด้วย\nสายตาแบบนั้นล่ะ?"
10078-390 = "มีปัญหาอะไรหรือเปล่า?"
10078-2600 = "คุณครู... ไม่เป็นไรจริงๆ เหรอ?\nมาอยู่กับฉัน มันค่อนข้างลำบาก\nเลยนะ เตือนแล้วนะ ต่อให้เกิด\nอะไรฉันก็ไม่รู้ด้วยหรอกนะ!\nวะฮะฮะฮะฮ่า!"

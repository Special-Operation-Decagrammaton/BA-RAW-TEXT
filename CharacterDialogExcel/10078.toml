[translation]
10078-10 = "블루 아카이브~!! 와핫핫핫!"
10078-20 = "와~핫핫핫! 거기에 온천이 있으니까 우리들이 있다!\n아니, 비록 온천이 없어도 우리들이 있다!\n자, 발파 준비는 다 돼 있다고!"
10078-30 = "오?\n여기라면 꽤……?"
10078-40 = "여기다\n온천을 만들면……"
10078-50 = "……이런, 위험하군.\n곤란한 놈들이 있네."
10078-60 = "여기서도\n또 숨어야 되는\n건가?"
10078-70 = "음…… 심심하군……\n공부나 좀 해볼까."
10078-80 = "이야~, 선생님!\n여기도 꽤 하이칼라\n한 곳이구만!"
10078-90 = "이제야 왔구만!\n기다리고 있었다고, 선생님!"
10078-100 = "딱히 나라고 아무 데나\n파 재끼는 건 아닌데?"
10078-110 = "어느 정도는\n맞춰가면서 하고 있지."
10078-120 = "음? 파기만 하는 건\n온천 개발이 아니잖아?"
10078-130 = "짓는 것도 물론\n좋아한다고!"
10078-140 = "보통은 짓는 데까지\n진행되지 않을 뿐!"
10078-150 = "와~핫핫!\n음, 그것 또한 일흥!"
10078-160 = "선생님이랑 있으면\n온천 개발할 때처럼 즐거워."
10078-170 = "하~핫핫!\n그렇게 경계하지 말라고!"
10078-180 = "만약 내가 붙잡히면 말이지,\n꼭 면회 와달라고!"
10078-190 = "기다리고 있을 테니까!\n하~핫핫핫!"
10078-200 = "오~! 선생님,\n오늘 마침 당신 생일이잖아!"
10078-210 = "특별한 날인데,\n선물을 만들어 오지!"
10078-220 = "하아……샬레에 오는 길에\n선도부에게 또 쫓겼지 뭐야,"
10078-230 = "정말이지!\n오늘은 내 생일인데,\n조금 봐줘야 되는 거 아닌가?"
10078-240 = "새해 복 많이 받으라고, 선생님!\n또 무사히 한 해를 넘겼네?"
10078-250 = "자, 올해도 많이 파보자고!"
10078-260 = "크리스마스는 훌륭해!\n경비가 허술해지니,\n개발하기 딱인 날이거든!"
10078-270 = "꽤 떠들썩하군!\n이거라면 굴착기의\n소리도 묻히니까…"
10078-280 = "그런 눈으로 보지 말라고."
10078-300 = "와~핫핫핫하!\n딱 좋은 타이밍에 왔네!"
10078-310 = "잘 왔어, 선생님~.\n여기가 나의 86번째\n비밀 아지트다."
10078-320 = "여기서 뭐 하냐고?\n우문이네, 선생님.\n내가 하는 일이라면 단 하나."
10078-330 = "바로…… 새로운 온천\n포인트를 찾고 있다~\n이 말이야!"
10078-340 = "하핫, 선생님.\n대화가 통해서 좋구만."
10078-350 = "아아, 맞아.\n실제로 폭파시킬 곳 주변을\n좀 맞춰보고 있었다는 거지."
10078-360 = "흠……\n여기가 좋을까?"
10078-370 = "아니……\n이쪽도 그럭저럭……"
10078-380 = "뭐야, 선생님?\n왜 그런 눈으로\n날 보는 거지?"
10078-390 = "무슨 문제라도 있나?"
10078-2600 = "선생님… 정말로 괜찮겠어?\n나랑 함께하는 거, 꽤 고생길이라고?\n충고는 했다? 어떻게 되든\n난 모르니까 말이야!\n와핫핫핫핫!"

[translation]
10078-10 = "Blue Archive!! Wahahaha!"
10078-20 = "Wahaha! Wherever there's a hot spring, so are we! And wherever there's no hot spring, we're there too! The explosives are primed for detonation!"
10078-30 = "Oh? This is...?"
10078-40 = "Right here. If we make a hot spring..."
10078-50 = "...Mm, too dangerous. Too many troublemakers here."
10078-60 = "Even here...do I need to hide...?"
10078-70 = "Mm... I'm bored... I guess I could study."
10078-80 = "Wow, Sensei! This place is pretty colorful!"
10078-90 = "You're finally here! I've been waiting, Sensei!"
10078-100 = "It's not like I'm just digging wherever I want, you know?"
10078-110 = "I have a little more sense than that."
10078-120 = "Hm? There's more to developing a hot spring than digging around in the dirt?"
10078-130 = "I like building things too, of course!"
10078-140 = "We just never get to that stage, is all!"
10078-150 = "Wahaha! It's just one of the things I love about my job!"
10078-160 = "When I'm with you, Sensei, I'm just as happy as when I'm digging up hot springs."
10078-170 = "Hahaha! Don't be so guarded!"
10078-180 = "If I'm arrested, please come visit me!"
10078-190 = "I'll be waiting! Hahaha!"
10078-200 = "Oh! Sensei, today's your birthday, isn't it?"
10078-210 = "It's a special day, so I'll make you a gift!"
10078-220 = "*sigh* The Prefect Team tried to nab me on the way to Schale. Again."
10078-230 = "Really! Can't they give me a break on my birthday, of all days?"
10078-240 = "I wish you good fortune, Sensei! We survived another year!"
10078-250 = "Now, let's have another year full of digging!"
10078-260 = "I love Christmas! Security gets lax during the holidays, making it the perfect time to develop some hot springs!"
10078-270 = "It sure is rowdy here! Even the sound of the excavator will get drowned out in this noise..."
10078-280 = "Don't give me that look."
10078-300 = "Wow! Wahaha! You couldn't have arrived at a better time!"
10078-310 = "Welcome, Sensei...to my top secret hideout! Number 86 to be exact!"
10078-320 = "What am I doing here? I can't believe you had to ask, Sensei. You know I only ever do one thing. It's my favorite thing in the whole world..."
10078-330 = "Researching new and exciting hot spring spots!"
10078-340 = "Haha! Sensei! The look on your face is priceless. Haha!"
10078-350 = "Eh-hem. Anyway... Yes, it's exactly what you think. I'm looking for the perfect spot to blast into oblivion!"
10078-360 = "Hm... Maybe here?"
10078-370 = "No. That spot's no good. It needs to be epic!"
10078-380 = "What? Sensei? Why are you looking at me like that?"
10078-390 = "What's wrong?"
10078-2600 = "Sensei... Are you sure you're okay with this? Sticking with me won't be easy. You've been warned. Whatever happens next is on you, okay? Wahaha!"

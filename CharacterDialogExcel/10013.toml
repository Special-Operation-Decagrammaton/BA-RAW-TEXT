[translation]
10013-20 = "키히히히히히히이잇--\n캬하하하아아-!"
10013-30 = "아…. 으아아아….\n어쩌지, 어쩌지."
10013-40 = "말 걸지\n말아주세요…."
10013-50 = "저는 구석에\n있겠습니다…."
10013-60 = "아, 안녕하세요…."
10013-70 = "으, 으아아아…."
10013-80 = "아…. 안녕하세요. 선생님.\n제가 여기 지키고 있었습니다."
10013-90 = "츠루기, 대기 중!\n자, 잘부탁드립니다!!"
10013-100 = "오, 오늘도 좋은 하루입니다아악!!"
10013-110 = "…아, 아냐! 이게 아냐!\n무슨 말을 해야 하지!"
10013-120 = "키히히. 이히히히힛-"
10013-130 = "…어, 어라?\n보, 보고 계셨습니까?"
10013-140 = "아….\n무….\n무엇이든 말씀해 주세요."
10013-150 = "저, 저는 어, 어른의 업무\n같은 건 잘 모르니까…!"
10013-160 = "시켜만 주십시오!"
10013-170 = "(집에 가고 싶어….\n같이 있어서 좋긴 한데\n무슨 말을 해야 할지….)"
10013-180 = "새, 생일?!\n저, 저는 뭘 해야 합니까?"
10013-190 = "뭘 해야 하죠?"
10013-200 = "새, 생일?\n제 생일 말입니까?"
10013-210 = "네?\n데, 데, 데, 데이트요?"
10013-220 = "데이트?"
10013-230 = "이, 이번 한해도\n잘부탁드립니다아-!"
10013-240 = "크리스마스….\n어른의 데이트…."
10013-250 = "아, 아무 것도 아닙니다!!"
10013-260 = "할로윈…축제…파티…."
10013-270 = "네?\n따, 딱히 아무 것도!"
10013-290 = "(도망칠까?\n지금이라도 창문으로\n뛰어내릴까?)"
10013-300 = "(죽을까? 죽겠지?\n죽고 싶어… 죽일까?\n아니, 그건 아니고…)"
10013-310 = "무, 무, 무, 무 무슨 말을,\n하…하려고…."
10013-320 = "이, 이런 곳은….\n나랑 어울리지 않는데…."
10013-330 = "아, 우우….\n아직 나는 준비가…."
10013-340 = "(갸아아아아아--!\n어째서 이런 곳에\n와버린 거냐아-!!)"
10013-2600 = "흐흐흐흐흐-\n우후후후후후후후후후-\n크하하하하하하하하하하하핫-!!"

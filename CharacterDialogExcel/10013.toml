[translation]
10013-20 = "嘰嘻嘻嘻嘻嘻嘻～～\n嘎哈哈哈哈哈！"
10013-30 = "啊…哇啊啊啊…\n怎麼辦？怎麼辦？"
10013-40 = "請不要\n跟我講話…"
10013-50 = "我要\n待在角落…"
10013-60 = "你，你好…"
10013-70 = "唔，唔啊啊啊…"
10013-80 = "您……您好，老師。\n我在這裡監視著。"
10013-90 = "弦生，待命中！\n請，請多多指教！！"
10013-100 = "今，今天\n也是個美好的一天呢呢呢！！"
10013-110 = "…不，不是！不是這樣！\n我該說什麼才好！"
10013-120 = "嘰嘻嘻。咿嘻嘻嘻嘻～"
10013-130 = "……咦，咦？\n您，您看見了嗎？\n哈哇哇哇哇哇！？！？"
10013-140 = "啊……有……\n有事請儘管說。"
10013-150 = "我，我雖然\n不，不是很清楚\n大人的工作……！"
10013-160 = "但，但是！\n請務必交給我吧！"
10013-170 = "（好想回家……\n　雖然在一起很開心，\n　但該說什麼才好呢……）"
10013-180 = "生，生日！？\n我，我該做什麼好呢？"
10013-190 = "非得做些什麼才行嗎？"
10013-200 = "生，生日？\n我的生日嗎？"
10013-210 = "咦？\n約，約，約，約會嗎？"
10013-220 = "約會？"
10013-230 = "今，今年也\n請老師多多指教～！"
10013-240 = "聖誕節…\n大人的約會…"
10013-250 = "嗚啊啊啊啊！\n什，什麼也沒有！"
10013-260 = "萬聖節…\n節慶…\n派對…"
10013-270 = "咦？\n沒，沒什麼！"
10013-290 = "（要逃跑嗎？\n現在立刻從窗戶\n跳下去？）"
10013-300 = "（會死嗎？會死吧？\n好想死……要殺掉嗎？\n不，不對不對！）"
10013-310 = "該，該，該，該，該，\n該說什麼……才好呢……"
10013-320 = "這，這種地方……\n明明不適合我……"
10013-330 = "啊，唔唔……\n我還沒做好心理準備……"
10013-340 = "（呀啊啊啊啊啊～～！\n怎麼會到這種地方來了啊啊──！！）"
10013-2600 = "呵呵呵呵呵—\n嗚呼呼呼呼呼呼呼呼呼—\n咕哈哈哈哈哈哈哈哈哈哈哈哈—！！"

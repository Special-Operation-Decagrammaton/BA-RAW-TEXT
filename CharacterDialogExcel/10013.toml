[translation]
10013-20 = "หึหึหึหึหึหึ...\nวะฮ่าฮ่าฮ่าฮ่าฮ่าๆๆ!"
10013-30 = "อ่า... อ่าาาา...\nทำยังไงดี ทำยังไงดี..."
10013-40 = "อย่ามาคุยกับฉันเลยค่ะ..."
10013-50 = "ฉันขอไปอยู่\nตรงมุมนั้นดีกว่าค่ะ"
10013-60 = "สะ...สวัสดีค่ะ"
10013-70 = "อ๊าาาาา!"
10013-80 = "สวัสดีค่ะ คุณครู\nฉันคอยเฝ้าดูตรงนี้อยู่นะคะ"
10013-90 = "ซึรุกิ! สแตนด์บาย!\nฝะ... ฝากตัวด้วยนะคะ!!"
10013-100 = "ขะ... ขอให้เป็นวันที่ดีนะคะ!"
10013-110 = "ไม่สิ! ต้องไม่ใช่แบบนี้!\nงั้นพูดอะไรดีล่ะ!?"
10013-120 = "คิคิคิ... ฮี่ฮี่ฮี่"
10013-130 = "เอ๋? คะ... คุณครูดูอยู่เหรอคะ?"
10013-140 = "เอ่อ... ตะ... ต้องการอะไรเหรอคะ?"
10013-150 = "ฉะ... ฉันไม่ค่อยรู้เรื่อง...\nงานของผู้ใหญ่หรอกค่ะ"
10013-160 = "ออกคำสั่งมาเถอะค่ะ!"
10013-170 = "(อยากกลับบ้านจัง...\nถึงจะรู้สึกดีที่ได้อยู่ด้วยกัน\nแต่ก็ไม่รู้ว่าจะพูดอะไรดี...)"
10013-180 = "วันเกิดเหรอคะ?!\nฉะ... ฉันต้องทำอะไรเหรอคะ?"
10013-190 = "จะให้ทำอะไรเหรอคะ?"
10013-200 = "วะ... วันเกิด?\nวันนี้วันเกิดของฉันเหรอคะ?"
10013-210 = "คะ? ดะ... ดะ... เดตเหรอคะ?"
10013-220 = "เดตเหรอ?"
10013-230 = "ปะ... ปีนี้ก็ขอฝากตัวด้วยนะคะ!"
10013-240 = "วันคริสต์มาส...\nวันแห่งการเดตกันแบบผู้ใหญ่..."
10013-250 = "อ๊ะ! มะ...ไม่มีอะไรหรอกค่ะ!"
10013-260 = "ฮาโลวีน... เทศกาล... ปาร์ตี้..."
10013-270 = "คะ? มะ... ไม่มีอะไรค่ะ!"
10013-290 = "(หนีกลับเลยดีมั้ย?\nหรือว่ากระโดดออกทางหน้าต่างดี?)"
10013-300 = "(จะตายรึเปล่านะ? อาจจะตายก็ได้นะ\nอยากตายจัง... ตายเลยดีมั้ย?\nไม่สิ... ไม่ใช่แบบนั้นสิ...)"
10013-310 = "มะ... มะ... มะ.. มี... มีอะไร...\nจะ...จะพูดเหรอคะ...?"
10013-320 = "ทะ... ที่แบบนี้มัน...\nไม่เหมาะกับฉันสักเท่าไรเลย..."
10013-330 = "เอ่อ... อืม...\nฉันยังไม่ได้เตรียมใจเลย..."
10013-340 = "(กรี๊ดดดดด!\nทำไมฉันถึงได้มาอยู่ในที่แบบนี้เนี่ย!!)"
10013-2600 = "หึหึหึหึ...\nฮุฮุฮุฮุฮุฮุ...\nวะฮ่ะฮ่ะฮ่าฮ่าฮ่าฮ่า...!!"

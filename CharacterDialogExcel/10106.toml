[translation]
10106-10 = "Blue-Archive."
10106-20 = "Heehee, are you surprised? Right now, I've surely changed from my past self."
10106-30 = "D-Did they realize my identity?"
10106-40 = "Since it's come to this, I'll sing a song...!"
10106-50 = "For some reason, I can't soothe this excitement."
10106-60 = "Heehee... That felt nice."
10106-70 = "Is that person...looking at me, by any chance?"
10106-80 = "Welcome, Sensei. H-How is it? Does it suit me?"
10106-90 = "I've been waiting, Sensei. I hope today is a fruitful day."
10106-100 = "Many things happen in life..."
10106-110 = "...but I never expected to be wearing a costume like this."
10106-120 = "It feels like you've seen me in this costume quite often as of late."
10106-130 = "Um... If you're okay with it, Sensei..."
10106-140 = "...could we...continue meeting like this?"
10106-150 = "Is this what one would call...a songstress?"
10106-160 = "Um... W-Would you...like an autograph?"
10106-170 = "Happy birthday, Sensei."
10106-180 = "I rushed here in this costume, so we that may celebrate."
10106-190 = "Yes. Please allow me to dedicate a song to you, Sensei."
10106-200 = "My birthday... You remembered."
10106-210 = "Heehee, for some reason, I've been feeling this way ever since you talked to me."
10106-220 = "I'm always prepared to sing."
10106-230 = "Happy New Year, Sensei. I will sing for you this year as well."
10106-240 = "Sensei, would you like to sing a hymn together?"
10106-250 = "Fufu. My costume is perfectly suited for this."
10106-260 = "Although Halloween is not just a day of costumes..."
10106-270 = "Heehee. But if this is your desire, then nothing else matters."
10106-280 = "Would you like a trick?"
10106-300 = "Th-This...?!"
10106-310 = "Wh-What is this...?!"
10106-320 = "My...poster?"
10106-330 = "I-I mean... I can see that for myself...!"
10106-340 = "You and the other Sisters...?"
10106-350 = "What... What should I say here...?"
10106-360 = "I only meant... No, I'm sorry. I didn't mean for that to sound critical..."
10106-370 = "It's just difficult to put into words..."
10106-380 = "However, yes... I can say this for certain."
10106-390 = "Truly... From the bottom of my heart,"
10106-400 = "I feel very, very grateful."
10106-2600 = "This, for me...? No, regardless of how I look, I am still myself. You're right. I'll cherish it. Thank you, Sensei."

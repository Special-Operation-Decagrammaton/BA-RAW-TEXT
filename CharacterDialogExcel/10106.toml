[translation]
10106-10 = "블루-아카이브."
10106-20 = "후후후, 놀라셨습니까?\n지금의 저는, 이전과 분명 다를 겁니다."
10106-30 = "혹, 혹시 저인걸\n눈치채고 있는\n것일까요……?"
10106-40 = "이왕 이렇게 된 거,\n차라리 한 곡을……!"
10106-50 = "왠지 들뜬 기분이\n가라앉질 않습니다."
10106-60 = "후후……\n조금 개운하네요."
10106-70 = "저분……\n혹시 절 보고\n계신 걸까요?"
10106-80 = "어서 오세요, 선생님.\n어, 어떤가요? 어울릴까요?"
10106-90 = "기다리고 있었습니다, 선생님.\n오늘이 결실이 있기를 바랍니다."
10106-100 = "다양한 일들이\n있기 마련입니다만,"
10106-110 = "설마 이런 옷을\n입게 되리라고는……"
10106-120 = "최근 선생님께,\n이 모습 자주 보여드리는\n것 같습니다."
10106-130 = "그… 선생님이\n괜찮으시다면…"
10106-140 = "앞으로도……\n이렇게 만날 수 있으면……"
10106-150 = "이것이 가희……일까요?"
10106-160 = "음……\n싸…… 싸인……\n해드릴까요?"
10106-170 = "생일 축하합니다, 선생님."
10106-180 = "축하하기 위해\n이 의상으로 달려왔습니다."
10106-190 = "네, 선생님을 위해.\n한 곡 바치게 해주세요."
10106-200 = "제 생일……\n기억해 주셨군요."
10106-210 = "후훗, 말을 걸어주셨을 때부터\n왠지 모르게\n그런 생각이 들었습니다."
10106-220 = "언제든지 노래할 준비가\n되어 있어요."
10106-230 = "새해 복 많이 받으십시오,\n선생님. 올 한 해도, 선생님을\n위해 노래하겠습니다."
10106-240 = "선생님, 함께 성가를\n바치지 않겠습니까?"
10106-250 = "후후, 그것을 위한\n의상이니까요."
10106-260 = "할로윈은 가장의\n날은 아니지만……"
10106-270 = "후후, 하지만 선생님이\n하시고 싶은 거라면\n상관없답니다."
10106-280 = "장난, 쳐 드릴까요?"
10106-300 = "이, 이건……?!"
10106-310 = "대, 대체 뭐죠……?!"
10106-320 = "제…… 포스터요?"
10106-330 = "아, 아뇨……\n그건 보면 압니다만……!"
10106-340 = "자매님들과 선생님께서……?"
10106-350 = "뭐……뭐라고 말씀드리면\n좋을까요……."
10106-360 = "그게……아뇨, 죄송합니다.\n비난하는 건 아니고……."
10106-370 = "말로 표현하는 것이\n어려울 뿐…"
10106-380 = "하지만, 그렇네요…\n이것만은 분명하게\n전해집니다."
10106-390 = "정말로……\n마음속 깊은 곳에서"
10106-400 = "너무나도,\n기쁘게 생각합니다."
10106-2600 = "저에게, 그걸…?\n아뇨, 어떤 모습이든 저는 저입니다.\n맞는 말씀입니다. 잘 받겠습니다.\n감사합니다, 선생님."

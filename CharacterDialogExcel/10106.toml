[translation]
10106-10 = "蔚藍檔案。"
10106-20 = "呵呵，嚇到您了嗎？\n怎麼樣呢……跟以往的我並不一樣唷？"
10106-30 = "難，難道早就被\n發現是我了嗎……？"
10106-40 = "唱首歌會比較好嗎……？"
10106-50 = "總覺得，有股惴惴不安，\n難以冷靜的心情。"
10106-60 = "呵呵……\n有種清爽的感覺呢。"
10106-70 = "莫非……\n有人正看著我嗎？"
10106-80 = "歡迎回來，老師。\n怎，怎麼樣呢？\n適合我嗎……？"
10106-90 = "恭候多時了，老師。\n願今日能夠有所收穫。"
10106-100 = "雖然是因為\n各式各樣的原因……"
10106-110 = "沒想到居然會\n穿上這種服裝……"
10106-120 = "最近，與老師見面的時候，\n好像總是打扮成這樣。"
10106-130 = "那個……如果\n老師不介意的話……"
10106-140 = "今後是否……\n也能像這樣見面……"
10106-150 = "這就是……所謂的歌姬嗎？"
10106-160 = "那個……\n需，需不需要\n幫您簽個名呢？"
10106-170 = "祝您生日快樂，老師。"
10106-180 = "為了向您獻上祝福，\n我穿著這身衣服趕來了。"
10106-190 = "沒錯，就是為了老師。\n請讓我為您獻唱一曲吧。"
10106-200 = "我的生日……\n原來您記得啊。"
10106-210 = "呵呵，其實\n從您開口的時候，\n我就多少有預感了。"
10106-220 = "我隨時都有做好\n唱歌的準備唷。"
10106-230 = "祝您新年快樂，老師。\n今年也由我為老師獻唱吧。"
10106-240 = "老師，要不要\n一起獻唱聖歌呢？"
10106-250 = "呵呵，這身服裝\n就是為了這件事。"
10106-260 = "雖然萬聖節\n並非變裝的日子……"
10106-270 = "呵呵，不過如果老師\n想嘗試的話倒也沒關係。"
10106-280 = "惡作劇，\n就由我來對您做吧？"
10106-300 = "這，這……！？"
10106-310 = "究，究竟是什麼……！？"
10106-320 = "我的……海報？"
10106-330 = "不，不是……\n這點我也看的出來……！"
10106-340 = "是各位修女們，和老師……？"
10106-350 = "我……我該\n說些什麼好呢……"
10106-360 = "那個……不是的。\n非常抱歉。我沒有\n責怪您的意思……"
10106-370 = "只是要用言語形容\n有點困難而已……"
10106-380 = "不過，我想……\n至少這點能清楚地告訴您。"
10106-390 = "我真的……\n打從心底"
10106-400 = "感到非常開心。"
10106-2600 = "要把這個送給我……？\n不，無論打扮如何，我依然是我。\n就像您說的一樣呢。我就恭敬地收下了。\n非常謝謝您，老師。"

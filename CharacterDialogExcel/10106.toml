[translation]
10106-10 = "Blue... Archive"
10106-20 = "ฮุฮุฮุ ตกใจเหรอคะ?\nฉันในตอนนี้ต่างกับเมื่อก่อนอย่างแน่นอนค่ะ"
10106-30 = "ระ... หรือว่า\nรู้อยู่แล้วว่า\nเป็นฉันคะ...?"
10106-40 = "ในเมื่อเป็นแบบนี้แล้ว\nงั้นก็ขอร้องสักเพลงนะคะ...!"
10106-50 = "ไม่รู้ทำไมถึง\nไม่หายตื่นเต้นเลยค่ะ"
10106-60 = "ฮุฮุ...\nโล่งใจขึ้นมาหน่อยนะคะ"
10106-70 = "คนคนนั้น...\nมองฉันอยู่หรือเปล่าคะ?"
10106-80 = "เชิญค่ะ คุณครู\nปะ... เป็นยังไงบ้างคะ?\nเข้ากับฉันมั้ยคะ?"
10106-90 = "กำลังรออยู่เลยค่ะ คุณครู\nขอให้วันนี้เกิดผลที่น่าพอใจนะคะ"
10106-100 = "ในชีวิตเรามักมีเรื่องต่างๆ\nเกิดขึ้นมากมาย"
10106-110 = "แต่ไม่คิดเลยว่า\nจะได้มาใส่ชุดแบบนี้..."
10106-120 = "ช่วงนี้เหมือนฉันให้คุณครู\nเห็นฉันในรูปลักษณ์แบบนี้\nบ่อยเลยค่ะ"
10106-130 = "เอ่อ... ถ้าคุณครู\nไม่ว่าอะไรละก็..."
10106-140 = "ต่อไป... ถ้าเราได้เจอกันแบบนี้อีก..."
10106-150 = "แบบนี้เรียกว่านักร้อง... หรือเปล่าคะ?"
10106-160 = "ถ้างั้น...\nฉันแจกละ... ลายเซ็น...\nให้มั้ยคะ?"
10106-170 = "สุขสันต์วันเกิดค่ะ คุณครู"
10106-180 = "ฉันใส่ชุดนี้มาหา\nเพื่ออวยพรให้ค่ะ"
10106-190 = "ค่ะ ฉันจะมอบหนึ่งบทเพลง\nให้คุณครูค่ะ"
10106-200 = "จำวันเกิดของฉัน...\nได้สินะคะ"
10106-210 = "ฮุฮุ ฉันคิดแบบนั้น\nตั้งแต่มาชวนคุย\nแล้วค่ะ"
10106-220 = "ฉันพร้อมร้องเพลง\nทุกเวลาเลยค่ะ"
10106-230 = "สวัสดีปีใหม่ค่ะ\nคุณครู ปีนี้ฉันก็จะร้องเพลง\nให้คุณครูอีกค่ะ"
10106-240 = "คุณครู มาร้องเพลง\nสรรเสริญด้วยกันมั้ยคะ?"
10106-250 = "ฮุฮุ นี่เป็นชุดสำหรับ\nการทำสิ่งนั้นนี่คะ"
10106-260 = "ถึงฮาโลวีนจะไม่ใช่\nวันแห่งการแต่งชุดแฟนซี..."
10106-270 = "ฮุฮุ แต่ถ้าคุณครู\nต้องการก็ย่อมได้ค่ะ"
10106-280 = "ให้ฉันแกล้งมั้ยคะ?"
10106-300 = "นะ... นี่มัน...?!"
10106-310 = "อะ... อะไรกันคะ...?!"
10106-320 = "โปสเตอร์ของฉัน... เหรอคะ?"
10106-330 = "มะ... ไม่ค่ะ...\nถ้าดูก็รู้ค่ะ...!"
10106-340 = "ซิสเตอร์คนอื่นๆ\nกับคุณครูเหรอคะ...?"
10106-350 = "ฉะ... ฉันต้องพูดว่ายังไง\nดีคะเนี่ย..."
10106-360 = "เอ่อ... ไม่ค่ะ ขอโทษด้วยค่ะ\nฉันไม่ได้จะตำหนิอะไรหรอกค่ะ..."
10106-370 = "มันแค่ยากที่จะถ่ายทอด\nออกมาเป็นคำพูดน่ะค่ะ..."
10106-380 = "แต่ว่า... นั่นสินะคะ...\nสิ่งนี้ฉันบอกได้\nอย่างชัดเจนค่ะ"
10106-390 = "ในส่วนลึก...\nของหัวใจฉัน"
10106-400 = "รู้สึกดีใจ\nมากๆ เลยละค่ะ"
10106-2600 = "ให้สิ่งนั้นกับฉันเหรอ...?\nไม่ค่ะ ไม่ว่าจะลุคไหน ฉันก็คือฉันค่ะ\nพูดถูกแล้วละค่ะ ฉันจะรับไว้ค่ะ\nขอบคุณนะคะ คุณครู"

[translation]
10082-10 = "蔚藍檔案！"
10082-20 = "百鬼夜行聯合學園所屬，百花繚亂的突擊隊長不破蓮華，在此登場！老師，不，無論是幫助師父還是「青春活動」我都會全力以赴，請多多指教！"
10082-30 = "唔，唔哇，這是…\n每個人都在\n謳歌著「青春」…\n這就是…夏萊…"
10082-40 = "唔嗯，下次要做什麼樣的\n「青春活動」好呢…？"
10082-50 = "紫那傢伙，\n有乖乖地\n好好表現嗎…"
10082-60 = "真舒服啊～\n要是我們的部室\n也這麼棒就好了…"
10082-70 = "萬一有問題學生…\n我會把他們的本性\n給改正回來。"
10082-80 = "哦，老師。\n今天也在忙夏萊的工作嗎？"
10082-90 = "我也來幫忙！"
10082-100 = "先等一下！\n老師不能翹班的吧！"
10082-110 = "既然有我看著，\n就好好認真吧。"
10082-120 = "老師也很辛苦呢。"
10082-130 = "工作，工作，又是工作…"
10082-140 = "……總～覺得\n湧出了親切感。"
10082-150 = "訓練百花繚亂的大家時，\n一天總是在轉眼之間\n就過去了……"
10082-160 = "會不會回過神來\n「青春時代」就一去不回了！？"
10082-170 = "不行不行，\n那我會很傷腦筋的！"
10082-180 = "我並不討厭百花繚亂的活動。"
10082-190 = "畢竟不能放任不管，\n而且教育後輩是\n很有意義的事，我也喜歡。"
10082-200 = "不過，那個……對了。"
10082-210 = "我想趁現在，\n創造更多這種\n閃亮耀眼的回憶。"
10082-220 = "老師應該能理解\n我的意思吧！？"
10082-230 = "老師……不，師父。\n我們是「青春師徒」對吧？"
10082-240 = "應該更……有盡情\n享受青春的義務。\n所以啊……"
10082-250 = "來！「戀愛鯉魚」\n的新書！送給你！"
10082-260 = "這也是很不得了的名作哦！\n希望你一定要看！"
10082-270 = "酸酸甜甜的劇情，\n真的會讓人心癢難耐！"
10082-280 = "我總是受到老師……\n師父的很多幫助。"
10082-290 = "所以師父也儘管開口吧。"
10082-300 = "只要是我能做到的事，\n我什麼都願意做。"
10082-310 = "老師，今天是你生日對吧？\n哈哈，我等今天這天\n不知道等多久了！"
10082-320 = "來！我們出去\n慶祝生日吧！"
10082-330 = "我們關係這麼好，\n不用計較那種小事啦。"
10082-340 = "今天就來製造\n滿滿的回憶吧！\n一定會很開心的哦？"
10082-350 = "那個……祝我生日快樂？"
10082-360 = "……啊，呃，嗯。謝謝你。"
10082-370 = "啊，不是！\n我沒有不喜歡的意思……！"
10082-380 = "只是這種事，\n我完全沒預想過……"
10082-390 = "啊，我的臉\n好像熱起來了！\n我去冷靜一下，\n稍等一會！"
10082-400 = "新年快樂，老師。\n話說……"
10082-410 = "……已經過年了嗎！？\n真是快到令人憂鬱……"
10082-420 = "不行，就連現在\n時間也在流逝！"
10082-430 = "好，今年一定要\n做很多「青春活動」！\n約好了唷！師父！"
10082-440 = "聖誕快樂，\n老師……不，師父。"
10082-450 = "啊啊，你不說我也知道。\n今天……是對「青春」\n重要的日子！"
10082-460 = "不能就這樣待著！\n百鬼夜行的燈飾，\n現在馬上去看吧！"
10082-470 = "「青春師徒」活動開始！"
10082-480 = "本來還在想街上怎麼\n這麼多奇裝異服的人，\n今天原來是萬聖節啊。"
10082-490 = "也對，那確實是\n「青春」的定番活動。"
10082-500 = "……好，不能輸給他們！\n師父！我們也來扮裝吧！"
10082-510 = "我要扮生剝鬼！\n師父你……要扮什麼？"
10082-520 = "既然要做，\n就用超高品質\n讓大家大吃一驚吧！"
10082-540 = "沒，沒錯！\n居然一眼就發現了！\n不愧是師父！"
10082-550 = "這，這是我為\n師父準備的……！"
10082-560 = "我至今為止，對老師\n說了很多任性的話……\n卻從來沒有好好報答……"
10082-570 = "還給你添了麻煩……\n那個，該說是\n感謝的心意嗎……"
10082-580 = "這，這是我第一次做的……"
10082-590 = "所以，味道\n我不太敢保證……"
10082-600 = "而且這種事，對我來說\n感覺也還有點太早了……"
10082-610 = "但，但是，\n我很努力……！"
10082-620 = "啊，呃，嗯……"
10082-630 = "那，請，請慢慢……\n享，享用……"
10082-2600 = "這，這是……傳聞中的，那個……！？\n人稱「青春」的東西對吧……！\n先，先冷靜下來……呼，呼。\n謝，謝謝你，師父……\n我會好好珍惜。"

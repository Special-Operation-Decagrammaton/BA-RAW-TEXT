[translation]
10082-10 = "Blue Archive!"
10082-20 = "หัวหน้าหน่วยจู่โจมเฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\nฟูวะ เรนเกะ ปรากฏตัวแล้ว! ฉันจะทุ่มเทกับทั้งการช่วยคุณครู\nไม่สิ ท่านอาจารย์ และกับกิจกรรมวัยรุ่นด้วย ขอฝากตัวด้วยนะ!"
10082-30 = "วะ... ว้าว ทั้งคนนั้น\nและคนนี้ ดูสนุกกับ\n<ชีวิตวัยรุ่น> กันใหญ่เลย\nนี่สินะ ชาเล่ต์..."
10082-40 = "อืม... ต่อไปจะทำ\n<กิจกรรมวัยรุ่น> อะไรดีนะ...?"
10082-50 = "ยัยยูคาริ\nทำตัวเรียบร้อย\nอยู่รึเปล่านะ..."
10082-60 = "สดชื่นจังเลย~\nถ้าห้องของฉัน\nเป็นแบบนี้บ้าง\nก็ดีน่ะสิ..."
10082-70 = "ถ้ามีพวกเด็กเกเรโผล่มา...\nฉันจะเรียกมา\nปรับทัศนคติให้ดู"
10082-80 = "โอ๊ะ คุณครู\nวันนี้ก็มีงานชาเล่ต์เหรอ?"
10082-90 = "งั้นฉันจะช่วยเอง!"
10082-100 = "หยุดเลยนะ!\nคุณครูจะโดดงาน\nไม่ได้สิ!"
10082-110 = "ฉันจับตาดูอยู่นะ\nทำให้มันจริงๆ จังๆ หน่อย"
10082-120 = "คุณครูก็เหนื่อยแย่เลยนะ"
10082-130 = "ทำงานวนไปไม่หยุดเลย..."
10082-140 = "จะว่ายังไงดีนะ ฉันเข้าใจ\nความรู้สึกพวกนั้นดีเลยละ"
10082-150 = "พอเอาแต่คุมการฝึกของทุกคน\nในเฮียกกะเรียวรันแบบนี้\nเวลาของวันนั้นจะหมดไป\nในชั่วพริบตาเลยละ"
10082-160 = "พอรู้สึกตัวอีกที\nก็เลยพบว่า <ช่วงวัยรุ่น>\nมันผ่านไปแล้วล่ะ?!"
10082-170 = "ไม่เอาด้วยหรอกนะ!\nถ้าเป็นแบบนั้นก็ลำบากแย่แน่ๆ!"
10082-180 = "ฉันไม่ได้ไม่ชอบกิจกรรม\nของเฮียกกะเรียวรันหรอก"
10082-190 = "เราเมินเรื่องวิวาทไม่ได้อยู่แล้ว\nส่วนเรื่องการสอนรุ่นน้อง\nฉันก็ชอบเพราะมันน่าภูมิใจ"
10082-200 = "แต่ว่า... ระ... เรื่องนั้นน่ะ"
10082-210 = "คือฉันอยากสร้าง\nความทรงจำที่สดใส\nของวัยรุ่นเอาไว้บ้าง\nก่อนจะสายไปกว่านี้น่ะ"
10082-220 = "คุณครูเข้าใจใช่มั้ย\nว่าฉันหมายถึงอะไร?!"
10082-230 = "คุณครู... ไม่สิ ท่านอาจารย์\nเราเป็นอาจารย์ผู้ชี้แนะ\nเรื่องวัยรุ่นกับลูกศิษย์นี่นา!"
10082-240 = "งั้นเรา... ก็ยิ่งต้อง\nสนุกกับชีวิตวัยรุ่นให้เต็มที่สิ\nและเพราะอย่างนั้น..."
10082-250 = "เอ้า! ฉันจะให้หนังสือใหม่ของ\nคุณนักเขียน <ความรักคือปลาคาร์ฟ>!"
10082-260 = "นี่เป็นผลงานชื่อดัง\nที่เหลือเชื่อเลยละ!\nต้องอ่านให้ได้นะ!"
10082-270 = "การเดินเรื่องแบบหวานอมเปรี้ยว\nอ่านแล้วอยู่ไม่สุขเลยละ!"
10082-280 = "ฉันได้รับความช่วยเหลือมากมาย\nจากคุณครู... ไม่สิ\nจากท่านอาจารย์ตลอดเลย"
10082-290 = "เพราะงั้นท่านอาจารย์ก็\nไม่ต้องปฏิเสธนะ บอกฉันได้เลย"
10082-300 = "ถ้าเป็นเรื่องที่ฉันทำได้\nไม่ว่าอะไรฉันก็จะทำให้"
10082-310 = "วันนี้วันเกิดคุณครูใช่มั้ย?\nฮะฮ่า ฉันรอวันนี้\nอยู่นานเลย!"
10082-320 = "เอาละ ไปฉลองวันเกิด\nข้างนอกกันเถอะ!"
10082-330 = "ความสัมพันธ์แบบเราน่ะ\nข้ามเรื่องหยุมหยิมไปเถอะ"
10082-340 = "วันแบบนี้เรามาสร้าง\nความทรงจำให้เยอะๆ กันเถอะ!\nต้องสนุกมากแน่เลย!"
10082-350 = "อืม... สุขสันต์วันเกิดงั้นเหรอ?"
10082-360 = "อ่า... อือ... อืม ขอบคุณนะ"
10082-370 = "อ๊ะ ไม่ใช่นะ!\nไม่ใช่ว่าฉันไม่ชอบ...!"
10082-380 = "ก็แค่ไม่คิดเลย\nว่าจะได้อะไรแบบนี้..."
10082-390 = "อ๊ะ เหมือนว่าตอนนี้\nหน้าฉันจะร้อนๆ ขึ้นมา!\nฉันขอไปจัดการตัวเองก่อน\nรอเดี๋ยวนะ!"
10082-400 = "สวัสดีปีใหม่\nคุณครู... ปีใหม่แล้วเหรอ?"
10082-410 = "นี่เราเข้าปีใหม่แล้วเหรอ?!\nน่าเศร้านะ..."
10082-420 = "ก็แบบว่า ระหว่างที่ทำนู่นทำนี่อยู่\nเวลาก็กำลังผ่านไปไงล่ะ!"
10082-430 = "ดีละ งั้นปีนี้ฉันจะ\nทำกิจกรรมวัยรุ่นให้เยอะๆ เลย!\nฉันขอสัญญาเลย ท่านอาจารย์!"
10082-440 = "เมอร์รีคริสต์มาสนะ คุณครู...\nไม่สิ ท่านอาจารย์"
10082-450 = "อ้อ ไม่ต้องบอกฉันก็รู้\nว่าวันนี้เป็นวันสำคัญ\nของวัยรุ่น!"
10082-460 = "อยู่เฉยๆ แบบนี้ไม่ได้แล้ว!\nไปดูความสว่างไสว\nของเฮียกคิยาโคกันเถอะ!"
10082-470 = "มาเริ่มกิจกรรมวัยรุ่น\nของพวกเรากันเถอะ!"
10082-480 = "ก็ว่าอยู่ว่ามีคนแต่งตัวแปลกๆ\nออกมาเดินตามถนนกันให้ว่อน\nวันนี้วันฮาโลวีนสินะ"
10082-490 = "ก็นะ นี่ถือเป็นเทศกาล\nประจำของวัยรุ่นเลย"
10082-500 = "ดีละ ฉันยอมแพ้ไม่ได้หรอก!\nท่านอาจารย์! ไปแต่งตัวกัน!"
10082-510 = "ฉันจะแต่งเป็นนามาฮาเกะ!\nแล้วท่านอาจารย์... จะเป็นอะไรดี?"
10082-520 = "ไหนๆ ก็จะแต่งแล้ว\nงั้นก็จัดเต็มให้คนอื่น\nเห็นแล้วตกใจไปเลย!"
10082-540 = "ชะ... ใช่!\nมองแว็บเดียวก็รู้เลยเหรอ!\nสมกับที่เป็นท่านอาจารย์เลย!"
10082-550 = "ฉะ... ฉันเตรียมมา\nให้ท่านอาจารย์น่ะ...!"
10082-560 = "ที่ผ่านมาฉันเอาแต่ทำตาม\nอำเภอใจกับคุณครู\nแต่ยังไม่เคยตอบแทน\nให้มันจริงๆ จังๆ เลยสักครั้ง..."
10082-570 = "และเพราะฉันสร้างปัญหาให้...\nนี่เป็นของแทนคำขอบคุณ\nจากฉันน่ะ..."
10082-580 = "ฉะ... ฉันเพิ่งเคยทำเป็นครั้งแรก... "
10082-590 = "ก็เลยรับรองไม่ได้\nว่าจะรสชาติดีรึเปล่า..."
10082-600 = "การทำแบบนี้\nสำหรับฉันแล้วมันถือว่า\nยังเร็วไปหน่อยด้วย..."
10082-610 = "ตะ... แต่ฉันก็\nตั้งใจทำให้เลยนะ...!"
10082-620 = "อ่า... เอ่อ... อืม..."
10082-630 = "ถ้างั้นก็ทะ... ทานให้\nอะ... อร่อยนะคะ..."
10082-2600 = "นะ... นี่มัน... เจ้า <วัยรุ่น>...!\nที่เคยได้ยินแค่ในข่าวลือนี่นา...!\nจะ... ใจเย็นๆ ก่อน... ฮู่ว ฮู่ว...\nขะ... ขอบคุณนะ ท่านอาจารย์\nฉันจะรักษาไว้อย่างดีเลย"

[translation]
10082-10 = "블루 아카이브!"
10082-20 = "백귀야행 연합학원 소속, 백화요란 돌격대장 후와 렌게, 여기에 등장! 선생님, 아니, 스승님을 돕는 일도 <청춘 활동>도. 전력을 다할 테니, 잘 부탁해!"
10082-30 = "우, 우와아, 이건…\n이 녀석도, 저 녀석도\n<청춘>을 즐기고 있네…\n이것이… 샬레…"
10082-40 = "으-음, 다음엔 어떤\n<청춘 활동>을 할까…?"
10082-50 = "유카리 녀석,\n제대로 얌전하게\n잘하고 있으려나…"
10082-60 = "쾌적하네~\n우리 방도 이랬으면\n좋겠는데…"
10082-70 = "만약 문제아가 있다면…\n내가 근성을\n뜯어고쳐 주겠어."
10082-80 = "오, 선생님.\n오늘도 샬레의 업무야?"
10082-90 = "나도 도울게!"
10082-100 = "잠깐 기다려!\n선생님이 땡땡이치면\n안 되잖아!"
10082-110 = "내가 보고 있으니까.\n제대로 진지하게 해."
10082-120 = "선생님도 고생이네."
10082-130 = "일에, 일에, 또 일이라니…"
10082-140 = "…뭐랄까.\n친근감이 느껴지는걸."
10082-150 = "백화요란에서 모두를\n훈련시키다 보면,\n하루가 눈 깜짝할 사이에\n가버리곤 하거든."
10082-160 = "이대로 정신을 차리고\n보니 <청춘 시절>이\n훅 지나가 버린다거나?!"
10082-170 = "아니아니, 그건\n진짜 곤란하거든!"
10082-180 = "백화요란 활동은 싫어하진 않아."
10082-190 = "싸움을 내버려 둘 수는 없고.\n후배들을 가르치는 것도,\n보람 있어서 좋아해."
10082-200 = "다만, 그… 그거야."
10082-210 = "더 늦기 전에, 좀 더 뭔가,\n반짝이는 추억을\n만들어두고 싶다고나 할까."
10082-220 = "선생님이라면 무슨\n소린지 잘 알지?!"
10082-230 = "선생님… 아니, 스승님.\n우리는 <청춘 사제관계>잖아?"
10082-240 = "그러니 더욱… 청춘을\n만끽할 의무가 있어.\n그런 의미에서…"
10082-250 = "자, <사랑은 잉어>\n작가님의 신간을 줄게!"
10082-260 = "이게 또 말도 안 되는\n명작이거든! 꼭 읽어줬으면 해!"
10082-270 = "새콤달콤한 전개가,\n진짜 참을 수가 없다니까!"
10082-280 = "늘 선생님… 스승님에겐,\n많은 도움을 받고 있어."
10082-290 = "그러니 스승님도,\n사양 말고 말해줘."
10082-300 = "내가 할 수 있는 일이라면,\n뭐든 할 테니까."
10082-310 = "선생님, 오늘 생일이지?\n하핫, 오늘이라는 날을\n얼마나 기다렸는지!"
10082-320 = "자, 밖에 나가서\n생일을 축하하자고!"
10082-330 = "우리 사이잖아?\n세세한 건 내버려두고."
10082-340 = "오늘만큼은 잔뜩\n추억을 만들자고!\n분명, 재밌을걸?"
10082-350 = "으음, 생일을 축하한다고?"
10082-360 = "…아, 으, 응. 고마워."
10082-370 = "앗, 아냐!\n싫다는 게 아니라…!"
10082-380 = "이런 거, 전혀\n예상하지 못해서…"
10082-390 = "아, 나 지금 얼굴이\n뜨거워진 거 같아!\n식히고 올 테니까.\n조금만 기다려줘!"
10082-400 = "새해 복 많이 받아.\n선생님. 이라니,"
10082-410 = "……벌써 해가 밝았다고?!\n우울해진다…"
10082-420 = "아니, 이러는 동안에도\n시간은 지나고 있어!"
10082-430 = "좋았어, 올해야말로\n잔뜩 <청춘 활동> 하자고!\n약속이야. 스승님!"
10082-440 = "메리 크리스마스야, 선생…\n아니, 스승님."
10082-450 = "아아, 말하지 않아도 알아.\n오늘은… <청춘>에게 있어,\n중요한 날!"
10082-460 = "이러고 있을 순 없지!\n백귀야행의 일루미네이션,\n지금 바로 보러 가자!"
10082-470 = "<청춘 사제관계>, \n활동 개시야!"
10082-480 = "거리에 이상한 차림을 한\n사람이 잔뜩 있다 싶었는데.\n오늘, 할로윈이었구나."
10082-490 = "하긴 <청춘>의\n단골 행사이긴 하지."
10082-500 = "…좋아, 질 수 없지!\n스승님! 분장하자!"
10082-510 = "나는 나마하게가 될게!\n스승님은… 뭘로 할래?"
10082-520 = "이왕 할 거면\n초절퀄리티로 모두를\n놀라게 하자고!"
10082-540 = "마, 맞아!\n한눈에 알아보다니!\n역시 스승님!"
10082-550 = "스, 스승님을 위해서,\n준비한 거야…!"
10082-560 = "지금까지 선생님에겐\n억지를 부리기만 했지,\n제대로 된 답례는,\n하지도 못했고……"
10082-570 = "폐를 끼쳤으니까…\n그, 감사의\n마음이라고 할까……"
10082-580 = "처, 처음 만들어본 거니까… "
10082-590 = "그다지, 맛은\n보증할 수 없을지도……"
10082-600 = "이런 거, 나에겐\n조금 이르지 않나,\n싶기도 하지만…"
10082-610 = "그, 그래도,\n열심히 했으니까…!"
10082-620 = "아, 으, 응……"
10082-630 = "그럼 마, 맛있게……\n드, 드셔주세요……"
10082-2600 = "이, 이건… 소문으로만 듣던 그…!\n<청춘>이라는 녀석이네……!\n지, 진정하자… 후우, 후우.\n고, 고마워. 스승님.\n…소중히 다룰게."

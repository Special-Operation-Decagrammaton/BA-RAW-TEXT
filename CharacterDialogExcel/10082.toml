[translation]
10082-10 = "Blue Archive!"
10082-20 = "Fuwa Renge of Hyakkiyako, Hyakkaryouran's Assault Squad Captain, reporting for duty! Together with Sensei, also known as Mentor, I'll pursue my youth! I look forward to working with you!"
10082-30 = "Wow, wow! So this is Schale! Look at everyone, basking in their youth."
10082-40 = "Hm, how should I pursue my youth?"
10082-50 = "I hope Yukari's taking care of herself..."
10082-60 = "Awesome! I wish our rooms were like this..."
10082-70 = "If there's a troublemaker... I'll discipline them for good."
10082-80 = "Sensei! Do you have work for Schale today?"
10082-90 = "I'll lend you a hand!"
10082-100 = "Hold it right there! You of all people can't be playing hooky!"
10082-110 = "Don't even think about slacking off. They don't call me Hyakkaryouran's Disciplinarian for nothing."
10082-120 = "It seems we have similar struggles, Sensei."
10082-130 = "Work is just an endless chore wheel, isn't it?"
10082-140 = "That's an experience I can relate to!"
10082-150 = "I oversee all training for Hyakkaryouran members. There's not enough hours in the day sometimes!"
10082-160 = "What if I wake up one day and find my youth's slipped right through my fingers?!"
10082-170 = "No! Nooo! I don't want to attend the funeral of my own youth!"
10082-180 = "It's not like... I love the Hyakkaryouran. I really do."
10082-190 = "I'm the Assault Squad Captain for a reason! I love fighting and teaching my underclassmen new techniques."
10082-200 = "But is that all there is to life?"
10082-210 = "I'm afraid of growing old and looking at the vast landscape of my life and only finding drills and mock battles."
10082-220 = "You're an adult, so you understand, right, Sensei?!"
10082-230 = "Our relationship is that of youth teacher and student! Mentor!"
10082-240 = "It's time to enjoy my youth! And in that spirit..."
10082-250 = "I present the latest book from the author of \"Koi About Love!\""
10082-260 = "It's mind-blowing! A masterpiece! You need to read it, Sensei."
10082-270 = "I really can't get over it. I'm looking forward to hearing what you think about the plot twist."
10082-280 = "I'm always indebted to you, Sensei... No, Mentor."
10082-290 = "Please tell me everything and anything, Mentor!"
10082-300 = "I'll do whatever is within my power."
10082-310 = "Isn't it your birthday today, Sensei? I've been counting down the days!"
10082-320 = "Let's go out and celebrate your birthday!"
10082-330 = "When it's you and me, you can forget the small stuff."
10082-340 = "We'll have the time of our life creating unforgettable memories."
10082-350 = "Um... My...birthday?"
10082-360 = "Oh. I guess it is. Thank you."
10082-370 = "Ah! I'm sorry. I didn't mean to seem ungrateful."
10082-380 = "It took me a little off guard, more than anything."
10082-390 = "Hah! You're making me blush a little, Sensei. Wait right there! I need to recollect myself."
10082-400 = "Happy New Year. Sensei."
10082-410 = "...The sun is rising already? How depressing."
10082-420 = "Time truly passes too quickly! Even at this moment of new beginnings!"
10082-430 = "This will be the year we find my youth! Promise me, Mentor!"
10082-440 = "Merry Christmas, Sensei... I mean, Mentor."
10082-450 = "You don't have to explain. Days like today are the very acme of youth!"
10082-460 = "There's no time to laze around, Sensei! We absolutely must go see Hyakkiyako's light show!"
10082-470 = "Let our youth mentorship begin!"
10082-480 = "That explains all the weird outfits I saw on the streets. It's Halloween!"
10082-490 = "I think it's a favorite holiday for a lot of students."
10082-500 = "...If that's how it is, I can't fall behind! Let's wear costumes today, Mentor!"
10082-510 = "I'll be an ogre demon! You need to pick something too!"
10082-520 = "There's no point in doing something if you're not going to put your all into it!"
10082-540 = "R-Right! You're as perceptive as always! I expect nothing less."
10082-550 = "I-I made this for you, Mentor!"
10082-560 = "I've been being so selfish this whole time. I asked so much of you and gave nothing in return."
10082-570 = "I've really been a nuisance... So, I wanted to express my gratitude."
10082-580 = "I-It's my first time making something like this..."
10082-590 = "So please don't expect restaurant-level quality..."
10082-600 = "Maybe I haven't leveled up enough for this final event of youth."
10082-610 = "B-But I put my all into it!"
10082-620 = "Ah! Um... Really?"
10082-630 = "I hope you e-enjoy it, then..."
10082-2600 = "Is...this...? A legend of legends! It's the epitome of youth! *pant* I need to calm down... Thank you, Mentor! I'll treasure it!"

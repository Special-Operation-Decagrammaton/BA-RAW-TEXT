[translation]
16010-10 = "蔚，蔚藍檔案…！"
16010-20 = "老師…如，如何…？\n我第一次做的啦啦隊服…\n…應該還不錯吧？"
16010-30 = "有人需要\n加油嗎…？"
16010-40 = "這種熱鬧的\n氣氛…\n還不錯。"
16010-50 = "好累…\n大概是有點口渴了。"
16010-60 = "那個…\n試著改造一下吧？"
16010-70 = "在這附近可以嗎？\n還是…這附近呢？"
16010-80 = "歡迎回來，老師。\n要加油嗎？要改造嗎？\n還是說…"
16010-90 = "打起精神工作吧，老師。\n如果提不起勁…\n可以隨時告訴我。"
16010-100 = "老師…總覺得你無精打采的呢？\n需要加油嗎？…很需要吧？"
16010-110 = "因為我想幫上老師的忙。\n不只是技術上…\n而是各方面。"
16010-120 = "因為這裡不是運動場…\n這個樣子有點，那個…"
16010-130 = "有種奇怪的感覺。"
16010-140 = "平常就算穿了比這個\n露出度更高的服裝\n我也不會在意…"
16010-150 = "（難道是因為我…\n　意識到老師了嗎？）"
16010-160 = "加油，加油！老師！\n一直以來，都很感謝！\n老師！謝謝！"
16010-170 = "…因為今天是特別的日子，\n我稍微拿出幹勁了。"
16010-180 = "嗯，生日快樂。\n老師。"
16010-190 = "今天是我的生日唷，老師。"
16010-200 = "所以今天…\n希望請老師幫我加油。"
16010-210 = "新年快樂，老師。\n今年我也會為了老師\n拚盡全力應援。"
16010-220 = "已經是聖誕節了呢。\n早知道就準備一套\n新設計的啦啦隊服。"
16010-230 = "啊…原來今天是萬聖節啊。\n難怪…覺得外面鬧哄哄的。"
16010-240 = "嗯…？我嗎？\n…這，這衣服的話，\n和那個沒關係…"
16010-260 = "加油，加油…老師！"
16010-270 = "上吧上吧，獲勝吧，\n老師…"
16010-280 = "嗯？\n你問是為了戰勝什麼\n而應援嗎？"
16010-290 = "是什麼呢…？應該是\n讓老師痛苦的工作，之類的吧。\n或是身為老師的職責之類的…？"
16010-300 = "如果介意的話，\n我稍微改一下\n加油的口號吧…？"
16010-310 = "堅持，到底…老師！"
16010-320 = "（…總覺得好像哪裡怪怪的。\n　老師不但沒有恢復精神，\n　看起來反而更無法集中）"
16010-330 = "（…難道我現在，\n　正在做相當\n　荒唐的事嗎…？)"
16010-2600 = "謝謝你，老師…\n我以後會繼續讓你看到。\n…至今從未見過的，\n新景色。"

[translation]
16010-10 = "Blue Archive...!"
16010-20 = "คุณครู... ปะ...เป็นไงบ้าง?\nฉันเพิ่งตัดชุดเชียร์ลีดเดอร์ครั้งแรก...\nแต่มันคง... ไม่ได้แย่เกินไปใช่มั้ย?"
16010-30 = "มะ... มีใคร\nอยากได้กำลังใจมั้ย?"
16010-40 = "บรรยากาศเสียงดัง\nอึกทึกแบบนี้...\nก็ไม่แย่เท่าไร"
16010-50 = "เหนื่อยจัง...\nเจ็บคอแล้วด้วย"
16010-60 = "ของชิ้นนั้น...\nลองเอามาปรับแต่งดีมั้ย?"
16010-70 = "ตรงนี้ดีมั้ยนะ?\nหรือว่า... ตรงนี้?"
16010-80 = "เชิญเลยคุณครู อยากจะเชียร์\nหรือว่าจะปรับแต่งอุปกรณ์ดีล่ะ?\nถ้าไม่งั้นละก็..."
16010-90 = "มาฮึดทำงานกันเถอะ คุณครู\nแต่ถ้ารู้สึกหมดแรงละก็...\nบอกฉันได้ตลอดเลยนะ"
16010-100 = "คุณครู...\nทำไมดูไม่มีแรงเลยล่ะ?\nอยากได้กำลังใจ... ใช่มั้ย?"
16010-110 = "ฉันอยากเป็นประโยชน์\nกับคุณครูบ้างน่ะ\nไม่ใช่แค่เรื่องเทคโนโลยี...\nแต่เรื่องอื่นๆ ก็ด้วย"
16010-120 = "ที่นี่ไม่ใช่สนามกีฬานะ...\nคือว่าชุดนี้มันก็เลย..."
16010-130 = "รู้สึกแปลกนิดหน่อยน่ะ"
16010-140 = "ถ้าเป็นตอนปกติ...\nเวลาใส่ชุดล่อแหลมกว่านี้\nก็ยังไม่ค่อยเขินเลยแท้ๆ..."
16010-150 = "(หรือว่าฉัน...\nจะรู้สึกเกร็งๆ...\nเพราะคุณครูอยู่ด้วยกันนะ)"
16010-160 = "ฮูเร่ ฮูเร่! คุณครู!\nขอบคุณเสมอๆ!\nขอบคุณนะ คุณครู!"
16010-170 = "วันนี้เป็นวันพิเศษ\nก็เลยตั้งใจเป็นพิเศษนิดหน่อย"
16010-180 = "อื้อ สุขสันต์วันเกิดนะ\nคุณครู"
16010-190 = "วันนี้วันเกิดของฉันละ\nคุณครู"
16010-200 = "เพราะงั้นวันนี้...\nฉันอยากได้เสียงเชียร์จากคุณครู"
16010-210 = "ขอให้มีความสุขในปีใหม่นะ คุณครู\nปีนี้ฉันก็จะตั้งใจส่งเสียงเชียร์\nเพื่อคุณครูนะ"
16010-220 = "คริสต์มาสแล้วสินะ...\nอาจต้องเตรียมชุดเชียร์\nแบบใหม่ไว้อีกก็ได้..."
16010-230 = "อ๋อ วันนี้วันฮาโลวีนสินะ\nก็คิดอยู่ว่าทำไมข้างนอก\nถึงดูเสียงดังกันจัง"
16010-240 = "หืม? ฉันเหรอ?\nชะ...ชุดนี้น่ะ\nไม่ใช่ชุดฮาโลวีนสักหน่อย..."
16010-260 = "ฮูเร่ ฮูเร่...\nคุณครู!"
16010-270 = "สู้ๆ ชนะให้ได้นะ\nคุณครู..."
16010-280 = "หืม? ฉันกำลังเชียร์\nให้เอาชนะอะไรงั้นเหรอ?"
16010-290 = "นั่นสินะ... คงเป็นพวก\nงานต่างๆ ที่รุมเร้าคุณครู\nหรือพวกความรับผิดชอบ\nในฐานะคุณครู..."
16010-300 = "ถ้าไม่ถูกใจละก็... ฉันเปลี่ยน\nเนื้อเพลงเชียร์นิดหน่อยดีมั้ย?"
16010-310 = "พยายามเข้า... สู้เค้านะ\nคุณครู!"
16010-320 = "(รู้สึกบางอย่างแปลกๆ\nคุณครูไม่ได้ดูฮึกเหิมขึ้นเลย\nแถมดูเหมือนจะไม่มีสมาธิอีกด้วย)"
16010-330 = "บางที ตอนนี้ฉัน...\nอาจจะทำเรื่องไม่เข้าท่า\nอยู่ก็ได้...)"
16010-2600 = "ขอบคุณนะ คุณครู\nต่อไปฉันจะให้คุณครูได้เห็นอีกเรื่อยๆ เลย\nพวกภาพลักษณ์ใหม่ๆ\nที่ไม่เคยแสดงให้เห็นมาก่อน"

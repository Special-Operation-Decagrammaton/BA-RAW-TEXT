[translation]
16010-10 = "B-Blue Archive...!"
16010-20 = "Sensei... Um, uh, wh-what do you think? This is my first time making a cheerleader outfit... It's not too bad, right?"
16010-30 = "Anyone here need, um...cheering?"
16010-40 = "This rowdy atmosphere... It's not all that bad."
16010-50 = "Who knew cheering was so tiring...? I'm a little thirsty."
16010-60 = "Hmm... Maybe I should tinker with this just a bit?"
16010-70 = "Is up to here good? Or...here?"
16010-80 = "Welcome back, Sensei.\nDo you want a cheer?\nSomething modded?\nOr..."
16010-90 = "Sensei, let's stay motivated! If you need more energy...just let me know."
16010-100 = "Sensei... You look worn out. Do you need a cheer? You definitely need a cheer!"
16010-110 = "I want you to rely on me, Sensei. Not just with engineering, but with other things too."
16010-120 = "This isn't a sports field, so this outfit... It's a bit..."
16010-130 = "It's so strange."
16010-140 = "I usually don't mind revealing outfits..."
16010-150 = "(...Maybe Sensei makes me self-conscious?)"
16010-160 = "Let's go, Sensei, let's go!\nI'm always grateful for you! Sensei! Thank you!"
16010-170 = "Today is a special day, so I tried to put in some effort."
16010-180 = "Sensei! Happy birthday!"
16010-190 = "Sensei, today's my birthday."
16010-200 = "And so, for today... I want to be cheered on by you!"
16010-210 = "Happy New Year, Sensei. I'll cheer you on this year again."
16010-220 = "Christmas already... Maybe I should make seasonal cheer outfits..."
16010-230 = "Oh, it's Halloween. No wonder it's so festive outside."
16010-240 = "Huh..? Me? Th-This outfit wasn't made for that..."
16010-260 = "Play, play... Sensei!"
16010-270 = "Fight, win.\nSensei..."
16010-280 = "Huh? What do I think you're fighting right now?"
16010-290 = "Um... Work, maybe? Or...your...responsibilities as a teacher?"
16010-300 = "Do...you not like it? Should I change the cheer...?"
16010-310 = "You can do it, you can do it...!\nSensei!"
16010-320 = "(...I don't get it. Instead of being motivated, Sensei seems more distracted than ever.)"
16010-330 = "(...On second thought... No, on third thought, I might be doing something absurd...)"
16010-2600 = "Thank you, Sensei. I'll keep showing you things you've never even imagined."

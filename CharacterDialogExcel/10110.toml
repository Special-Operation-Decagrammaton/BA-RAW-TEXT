[translation]
10110-10 = "Blue Archive"
10110-20 = "ไม่ได้เจอกันนานเลยนะคะ\nฉันกำลังรออยู่เลยค่ะ คุณครู"
10110-30 = "ที่นี่จัดไว้เป็นระเบียบ\nเลยนะคะ"
10110-40 = "ทั้งของตกแต่งแบบนี้ด้วย...\nน่ารักจังเลยนะคะ"
10110-50 = "ไม่เหมือนกับห้องของฉัน...\nไม่สิ ห้องแบบนี้\nคงเป็นห้องปกติน่ะค่ะ"
10110-60 = "ทุกคนต่างก็\nเรียกหาคุณครู\nหรือเปล่าคะ?"
10110-70 = "เป็นที่ที่น่าสนุกนะคะ\nฉันน่าจะแวะมาบ่อยๆ เลยค่ะ"
10110-80 = "มาแล้วสินะคะ คุณครู"
10110-90 = "ฉันกำลังเดินดูรอบๆ\nตามอำเภอใจตัวเองอยู่ค่ะ"
10110-100 = "ที่นี่คือพื้นที่ของคุณครู..."
10110-110 = "ฉันเองก็ต้อง\nทำความคุ้นเคยไว้แล้วละค่ะ"
10110-120 = "ปกติแล้วฉันจะอยู่แต่\nในห้องของตัวเอง..."
10110-130 = "การมาอยู่ที่นี่จึงเป็น\nประสบการณ์ใหม่ๆ เลยละค่ะ"
10110-140 = "แน่นอนว่าถ้าคุณครู\nเรียกให้มาหาบ่อยๆ\nมันก็คงกลายเป็น\n'ประสบการณ์ที่คุ้นเคย' นะคะ"
10110-150 = "ถ้าหากว่าไม่สะดวกละก็\nไปที่ห้องของฉัน..."
10110-160 = "ฉันแค่อยาก...\nลองพูดแบบนั้นดูน่ะค่ะ"
10110-170 = "ไม่ว่าจะคิดยังไง\nฉันก็ไม่สนหรอกค่ะ"
10110-180 = "ก็จินตนาการ... เป็นเรื่องอิสระนี่คะ"
10110-190 = "สุขสันต์วันเกิดค่ะคุณครู"
10110-200 = "ถึงนี่จะไม่ใช่ของขวัญ\nแต่ฉันก็มาหาแล้วค่ะ"
10110-210 = "จำวันเกิดฉัน... ได้ด้วยสินะคะ"
10110-220 = "จำได้ในฐานะของนักเรียน\nคนสำคัญคนหนึ่ง... ใช่มั้ยคะ?"
10110-230 = "ฮุฮุ... ฉันล้อเล่นค่ะ\nขอบคุณนะคะ"
10110-240 = "สวัสดีปีใหม่ค่ะคุณครู"
10110-250 = "ปีนี้ฉันก็จะ\nพยายามพูดคุยให้มากขึ้นค่ะ"
10110-260 = "คริสต์มาส..."
10110-270 = "รู้งี้ออกมาจากกล่องก็ดี\nฉันทำพลาดแล้วละค่ะ"
10110-280 = "ฮาโลวีนแล้วสินะคะ"
10110-290 = "ฉันขอแกล้งคุณครูได้มั้ยคะ...?"
10110-310 = "ฉันไม่รู้เลยค่ะว่าคุณครูมาแล้ว..."
10110-320 = "ถึงจะไม่ดูเป็นอย่างนั้น\nแต่เห็นอย่างนี้\nฉันก็ตกใจมากนะคะ"
10110-330 = "ฉันไม่ได้บอกว่าไม่ดีค่ะ\nการมีอะไรให้ตกใจเยอะๆ\nถือเป็นเรื่องสนุกค่ะ"
10110-340 = "มันเป็นสิ่งที่ฉัน...\nปรารถนามาโดยตลอดน่ะค่ะ"
10110-350 = "ยิ่งเป็นการที่..."
10110-360 = "คุณครูมาปรากฏตัวต่อหน้า\nอย่างกะทันหันแบบนี้แล้วด้วย..."
10110-370 = "ไหนดูซิ วันนี้...\nอ้อ นั่นสินะคะ"
10110-380 = "คุณครูมาเพราะฉันขอให้มานี่เนอะ"
10110-390 = "ขอโทษด้วยค่ะ...\nที่จริงฉันไม่ได้มีเรื่อง\nอะไรพิเศษหรอกค่ะ"
10110-400 = "ฉันแค่..."
10110-410 = "อยาก... คุยกับคุณ\nฉันก็แค่คิดแบบนี้น่ะ"
10110-2600 = "คุณครูแกล้งฉันเหรอ...?\nขอโทษด้วยค่ะ ฉันไม่ได้คาดไว้น่ะ...\nฉันยังคิดไม่ออกเลยค่ะว่าต้อง\nทำอะไรดี 'ยังคิดไม่ออกเลย'...\nฮุฮุ สนุกจังเลยนะคะ"

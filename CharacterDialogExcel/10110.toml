[translation]
10110-10 = "블루 아카이브."
10110-20 = "오랜만의 해후네요.\n기다리고 있었습니다. 선생님."
10110-30 = "꽤 정돈된 곳이네요."
10110-40 = "이런 인테리어도…\n귀엽네요."
10110-50 = "제 방과는…\n아니, 이게\n보통이겠죠."
10110-60 = "다들 선생님께서\n부르신 걸까요?"
10110-70 = "재미있는 곳이에요.\n자주 들를 거 같네요."
10110-80 = "오셨군요, 선생님."
10110-90 = "멋대로 주변을\n둘러보고 있었답니다."
10110-100 = "이곳이 선생님의 공간…"
10110-110 = "저도 익숙해져야겠네요."
10110-120 = "평소에는 늘\n제 방에만 있다 보니…"
10110-130 = "여기 있는 것만으로도,\n신선한 경험입니다."
10110-140 = "물론 선생님께서\n자주 불러 주신다면,\n이 또한 '익숙한 경험'이\n되겠지만요."
10110-150 = "혹시, 그게 어려우시다면,\n제 방으로…"
10110-160 = "…라는 건,\n그냥 해 본 말이었습니다."
10110-170 = "어떻게 받아들이시더라도\n상관없어요."
10110-180 = "상상은… 자유이니까요."
10110-190 = "생신 축하드립니다, 선생님."
10110-200 = "선물이라기에는 뭣하지만,\n제가 왔답니다."
10110-210 = "제 생일… 기억해 주고 계셨군요."
10110-220 = "그것은 소중한 한 명의\n학생으로서… 겠지요?"
10110-230 = "…후후, 농담입니다.\n감사합니다."
10110-240 = "새해 복 많이 받으세요, 선생님."
10110-250 = "올해는 저도,\n조금 더 대담해져 보려 합니다."
10110-260 = "크리스마스…"
10110-270 = "상자 속에서 나타날걸,\n실수했네요."
10110-280 = "할로윈이네요."
10110-290 = "…선생님께 장난 쳐봐도 될까요?"
10110-310 = "…오신 줄도 모르고 있었네요."
10110-320 = "그렇게 안 보이시겠지만,\n이래 봬도\n놀란 상태랍니다."
10110-330 = "나쁜 이야기는 아니에요.\n놀랄 일이 많이 있다는 건,\n즐거운 일이죠."
10110-340 = "전부터 쭉…\n바래 왔던 일이니까요."
10110-350 = "…그것도 이렇게…"
10110-360 = "눈앞에 선생님이 깜짝 나타나신,\n이런 거라면 더더욱…."
10110-370 = "어디 보죠. 오늘이…\n아, 그렇군요."
10110-380 = "제 부탁으로 와 주신 거였죠."
10110-390 = "…죄송해요.\n별다른 일이 있는 건\n아니랍니다."
10110-400 = "그저…"
10110-410 = "…단지, 당신과의\n대화를 나누고 싶다.\n그렇게 생각했을 뿐."
10110-2600 = "선생님이 저를…?\n죄송합니다, 예상하지 못했어서…\n무엇을 해야 할지 아직 예상이 가지 않네요.\n'예상이 가지 않는다'… 후후, 즐겁네요."

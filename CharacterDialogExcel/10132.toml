[translation]
10132-10 = "Blue... Archive"
10132-20 = "ถะ... ถึงจะใส่ชุดแบบนี้ ฉันก็ยังเป็นโอโนะ สึคุโยะ...!\nสมาชิกที่สง่าผ่าเผยของชมรมวิจัยศาสตร์นินจาค่ะ!"
10132-30 = "อึกก ชุดนี้มันสะดุดตา\nเกินไปหรือเปล่าคะ...?"
10132-40 = "ต้องระวังอย่าให้กาแฟ\nหกเลอะชุด..."
10132-50 = "ฉันยอมเข้าไป\nอยู่ในเฟอร์นิเจอร์นั่น\nยังดีเสียกว่าค่ะ... "
10132-60 = "พอใส่ชุดนี้\nแค่เดินก็พะวงแล้วค่ะ..."
10132-70 = "(ชุดแฟชั่นแบบต่างๆ\nช่างเตะตา\nจริงๆ เลยนะคะ...)"
10132-80 = "สะ... สวัสดีค่ะ คุณครู"
10132-90 = "วะ... วันนี้ ฉันจะเป็นนางแบบ\nเพื่อคุณครูโดยเฉพาะเลยค่ะ"
10132-100 = "กำลังรออยู่เลยค่ะ คุณครู"
10132-110 = "ไม่ทราบว่าฉัน...\nโดดเด่นมากไปหรือเปล่าคะ?"
10132-120 = "ก่อนจะเป็นนางแบบ\nฉันอยากเป็นนินจา\nให้ได้ก่อนค่ะ"
10132-130 = "เข้ามาดูชุดนี้\nใกล้ๆ ดูมั้ยล่ะคะ? "
10132-140 = "มันซับซ้อนกว่า\nที่เห็นมากเลย...\nทำเอาฉันทึ่งเลยค่ะ!"
10132-150 = "ทะ... ทำไมจู่ๆ นิตยสารที่มีรูปฉัน\nถึงมาอยู่ที่ชาเล่ต์...!"
10132-160 = "อะ... อาหารเหรอคะ?"
10132-170 = "ถะ... ถ้าไม่ใช่สลัด\nฉันกินได้หมดเลยค่ะ..."
10132-180 = "เทียบกับโซฟาใน\nสถานที่จัดงานแฟชั่นโชว์แล้ว... "
10132-190 = "เก้าอี้สำนักงานของที่นี่\nนั่งสบายกว่าเยอะเลยค่ะ"
10132-200 = "สะ... สุขสันต์วันเกิดค่ะ\nคุณครู"
10132-210 = "ฉันจะโชว์การเดินแบบนินจา\nตามที่ได้ไปฝึกมา\nให้คุณครูดูนะคะ...!"
10132-220 = "วะ... วันเกิดฉันเหรอคะ?"
10132-230 = "ช่วงนี้ฉันยุ่งมาก\nจนลืมไปเลยค่ะ"
10132-240 = "ขะ... ขอบคุณนะคะ\nคุณครู!"
10132-250 = "สวัสดีปีใหม่ค่ะ!"
10132-260 = "พรปีใหม่ของฉัน..."
10132-270 = "คือการที่คนที่ฉันชอบ\nได้เจอแต่เรื่องที่\nทำให้ยิ้มได้ค่ะ แหะๆๆ..."
10132-280 = "ปะ... ไปเดินชมถนน\nวันคริสต์มาสด้วยกันมั้ยคะ?"
10132-290 = "ตอนนี้ฉันมั่นใจ\nเรื่องการเดินแล้วค่ะ...! "
10132-300 = "ถึงจะเป็นวันฮาโลวีน"
10132-310 = "แต่ชุดแบบนี้ก็น่าจะ\nดึงดูดสายตามากไปหน่อยนะคะ?"
10132-320 = "คะ...? ตามท้องถนน\nมีคนใส่ชุดจัดเต็มกว่านี้\nเยอะเลยเหรอคะ?"
10132-340 = "อึก... "
10132-350 = "ฉันข้ามรั้วมาได้แล้ว\nก็จริงค่ะ..."
10132-360 = "แต่ว่าชุดมันไปติด..."
10132-370 = "ก็เลยขยับไม่ได้ค่ะ..."
10132-380 = "ฮือ... ขอโทษค่ะ... "
10132-390 = "ฉันไม่น่าชวนให้\nใช้ทางลัดเลย... "
10132-400 = "เอ๋...? คุณครูไปอยู่\nอีกฝั่งหนึ่งได้ยังไง...? "
10132-410 = "คะ?! มีประตูเล็กๆ\nอยู่ข้างรั้วเหรอ...?!"
10132-420 = "อึกกก...\nฉันไม่รู้เรื่องนั้นเลย... "
10132-430 = "คุณครูคะ... ช่วยแกะชุด\nที่ไปติดรั้วตาข่าย\nให้หน่อยได้มั้ยคะ?"
10132-2600 = "ฉะ... ฉันจะพยายามให้เต็มที่ค่ะ\nเพื่อเส้นทางแห่งนินจา\nของพวกเราทุกคน...!"

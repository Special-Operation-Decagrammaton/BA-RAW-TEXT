[translation]
10132-10 = "Blue, Archive."
10132-20 = "N-No matter what I'm wearing, I'm still a full-fledged member of the Ninjutsu Research Club! Ono Tsukuyo!"
10132-30 = "Ughhh. Does this outfit stand out too much...?"
10132-40 = "Don't spill coffee on your outfit... Carefully... Carefully..."
10132-50 = "I want to hide inside the furniture right now. "
10132-60 = "I can't even walk without being cautious in this outfit."
10132-70 = "(There's so many...different fashion styles.)"
10132-80 = "H-Hello, Sensei."
10132-90 = "T-Today, I'll be your personal model, Sensei."
10132-100 = "I've been waiting for you, Sensei."
10132-110 = "...Do I stand out too much?"
10132-120 = "Rather than a model, I want to become a ninja first."
10132-130 = "Would you like to take a closer look at this outfit? "
10132-140 = "It's more complicated than it looks... It's interesting!"
10132-150 = "Wh-Why is there a magazine with my pictorial here at Schale...?!"
10132-160 = "A m-meal?"
10132-170 = "I-I'm okay with anything as long as it's not salad..."
10132-180 = "I feel much more comfortable in this office chair... "
10132-190 = "...than I ever did at the fashion show venue's sofa."
10132-200 = "H-Happy birthday, Sensei."
10132-210 = "I-I'll show you my ninja walking that I practiced just for you, Sensei...!"
10132-220 = "M-My birthday?"
10132-230 = "It's been so busy lately that I forgot about it... "
10132-240 = "...Th-thank you, Sensei!"
10132-250 = "Happy New Year!"
10132-260 = "My New Year's wish..."
10132-270 = "...is for people I like to only have reasons to smile. Eheehee..."
10132-280 = "W-Would you like to walk around the Christmas streets together?"
10132-290 = "I am confident in my walking now...! "
10132-300 = "Even though it's Halloween..."
10132-310 = "...doesn't this outfit stand out too much?"
10132-320 = "...What? There's people wearing a lot worse in the streets?"
10132-340 = "Ugh... "
10132-350 = "I cleared the fence...somehow... "
10132-360 = "But my clothes got stuck..."
10132-370 = "And I can't move..."
10132-380 = "Ugh... I'm sorry... "
10132-390 = "It's all because I suggested we take a shortcut... "
10132-400 = "...Huh? How are you on the other side, Sensei...? "
10132-410 = "What?! There was a gate next to the fence...?!"
10132-420 = "Ugh... I didn't know that, I... "
10132-430 = "...Sensei, can you free the part that got stuck and help me out?"
10132-2600 = "I'll do my best. For our ninja way...!"

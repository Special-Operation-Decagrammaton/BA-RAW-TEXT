[translation]
10132-10 = "蔚藍，檔案。"
10132-20 = "我是，大野月夜！雖然穿著禮服……\n依然是千真萬確，忍術研究部的一員……！"
10132-30 = "嗚嗚……我，是不是\n太引人注目了……？"
10132-40 = "要是染到衣服的話，\n就糟糕了……要小心……"
10132-50 = "嗚嗚……還是乾脆\n躲進那邊的家具裡…… "
10132-60 = "穿著禮服的時候，\n就連走路方式……\n都得小心才行……"
10132-70 = "（大家……\n都打扮得很有個性呢）"
10132-80 = "您好……"
10132-90 = "今天的我，是老師\n專屬的模特兒……"
10132-100 = "恭候多時了，老師。"
10132-110 = "那個……如果穿著禮服\n的樣子嚇到您的話，\n我很，抱歉……"
10132-120 = "比起獨當一面的模特兒……\n我更想，成為獨當一面的忍者。"
10132-130 = "這套衣服，要不要再\n靠近一點看呢……？ "
10132-140 = "仔細看就會發現，\n做工非常細膩……\n很不可思議哦！"
10132-150 = "這，這是……我的\n寫真雜誌，為什麼\n會出現在夏萊……！"
10132-160 = "吃飯，是嗎？"
10132-170 = "我……\n除了沙拉以外，\n什麼都可以……"
10132-180 = "跟時裝秀會場的沙發相比…… "
10132-190 = "這裡的辦公椅，\n更令人，感到安心。"
10132-200 = "祝您生日快樂，老師。"
10132-210 = "因為想讓老師看……\n所以我練習了忍者台步……！\n您願意，看看嗎……？"
10132-220 = "我的生日……是嗎？"
10132-230 = "因為最近很忙……\n我完全，忘記了…… "
10132-240 = "非常感謝！"
10132-250 = "祝您新年快樂！"
10132-260 = "新年的，願望……"
10132-270 = "是希望，\n我喜歡的人們……\n都能夠面帶笑容。\n耶嘿嘿……"
10132-280 = "老師……！\n如果，您願意的話……\n要不要一起……\n到聖誕節的街上走走呢？"
10132-290 = "我對走台步，已經\n越來越有自信了……！ "
10132-300 = "就算當成萬聖節的變裝……"
10132-310 = "也還是，太華麗了吧？"
10132-320 = "咦……還有更誇張的人，\n所以沒問題……？"
10132-340 = "嗚嗚……"
10132-350 = "雖然設法翻過了柵欄……"
10132-360 = "衣服卻被勾住……"
10132-370 = "變得動彈不得……"
10132-380 = "嗚嗚……對不起…… "
10132-390 = "都怪我想走捷徑，\n才會這樣……"
10132-400 = "……奇怪？\n老師是怎麼到\n對面去的……？ "
10132-410 = "咦！？柵欄旁邊\n有個小門……！？"
10132-420 = "嗚嗚……\n我居然沒發現，\n就這樣……"
10132-430 = "老師……我的衣服，\n能請您稍微，\n幫我拉一下嗎？"
10132-2600 = "我……今後也會拚盡全力，\n好好努力的。為了大家，\n以及成為出色的忍者……！"

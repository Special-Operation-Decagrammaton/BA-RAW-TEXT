[translation]
10132-10 = "블루, 아카이브."
10132-20 = "이, 이런 차림이어도, 어엿한 인법연구부의 일원……! \n오노 츠쿠요입니다!"
10132-30 = "흐우우, 너무\n눈에 띄는\n복장일까요……?"
10132-40 = "커피가 옷에\n튀지 않게,\n조심, 조심……."
10132-50 = "차라리\n저 가구에 들어가\n있고 싶어요……. "
10132-60 = "이 옷을 입으니,\n걷는 것도\n신경 쓰여요……."
10132-70 = "(정말…… 다양한\n패션들이 눈에\n들어오네요.)"
10132-80 = "아, 안녕하세요, 선생님."
10132-90 = "오, 오늘은\n선생님만을 위한\n모델이 될게요."
10132-100 = "기다리고 있었어요, 선생님."
10132-110 = "……혹시, 눈에 너무\n띄었을까요?"
10132-120 = "한 사람의 모델 이전에,\n한 사람의 닌자가\n되고 싶어요."
10132-130 = "이 옷, 한번\n가까이서 보실래요? "
10132-140 = "보기보다 구조가\n굉장히 복잡해서……\n신기해요!"
10132-150 = "제, 제 화보가 나온\n잡지가 왜 샬레에……!"
10132-160 = "시, 식사요?"
10132-170 = "저, 저는 샐러드만\n아니면 다 좋아요……."
10132-180 = "패션쇼 행사장의\n소파보다…… "
10132-190 = "이곳의 사무용 의자가\n훨씬 더 편한 것 같아요."
10132-200 = "새, 생신 축하드려요,\n선생님."
10132-210 = "서, 선생님만을 위해\n갈고 닦은,\n저의 닌자 워킹을\n보여드릴게요……!"
10132-220 = "제, 제 생일이요?"
10132-230 = "요즘 너무\n정신이 없어서\n잊고 있었는데, "
10132-240 = "가, 감사합니다,\n선생님!"
10132-250 = "새해 복 많이 받으세요!"
10132-260 = "제 새해 소원이라면……"
10132-270 = "제가 좋아하는\n사람들에게,\n웃을 일만 생기기를,\n이에요. 에헤헤……."
10132-280 = "하, 함께 크리스마스의\n거리를 걸어보지 않으실래요?"
10132-290 = "저, 이제 워킹은\n자신 있으니까……! "
10132-300 = "아무리 할로윈이라도,"
10132-310 = "이런 옷은 너무\n눈에 띄지 않을까요?"
10132-320 = "……예? 거리에는\n이보다 더한 옷들도\n많다고요?"
10132-340 = "우읏……. "
10132-350 = "어떻게 펜스는\n넘어가기는 했는데요……. "
10132-360 = "옷이 걸려 버려서……."
10132-370 = "움직일 수가 없어요……."
10132-380 = "우으…… 죄송해요……. "
10132-390 = "제가 괜히 지름길로\n가자고 해버려서……. "
10132-400 = "……어라? 선생님은,\n어떻게 건너편에……? "
10132-410 = "네?! 펜스 옆에\n쪽문이……?!"
10132-420 = "으우우우……\n그런 것도 모르고,\n저는……. "
10132-430 = "……선생님, 철조망에\n걸린 부분을 좀 들어서\n풀어주실 수 있으신가요?  "
10132-2600 = "저, 최선을 다할게요.\n우리 모두의\n닌자의 길을 위해서……!"

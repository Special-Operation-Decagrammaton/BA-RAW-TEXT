[translation]
26011-10 = "블루 아카이브!"
26011-20 = "안녕하세요, 선생님!\n사쿠가와 중학교 1학년, 사텐 루이코입니다! 잘부탁드립니다!"
26011-30 = "어라, 저 사람은……"
26011-40 = "오오!! 왠지 여기, 굉장하네요!"
26011-50 = "언뜻 보기에\n평범한 것 같지만,\n자세히 보면 조금 특이해…\n음~! 즐거워!"
26011-60 = "말로만 듣던\n이세계 카페……."
26011-70 = "마음이 놓이는\n기분이네요. 헤헷."
26011-80 = "아! 선생님! 기다리고 있었어요!\n오늘은 뭘 하실 건가요?"
26011-90 = "어서오세요, 선생님!\n제가 할 일,\n뭐라도 있을까요?"
26011-100 = "여기는, 저희 세계와\n비슷한 거 같으면서도\n전혀 달라서… 재미있네요."
26011-110 = "네? 지금부터 산책?\n……저도 가고 싶어요!\n데려가 주세요, 선생님!"
26011-120 = "하나부터 열까지,\n재밌는 세상이네요,\n여기!"
26011-130 = "우연이긴 하지만,\n오게 돼서 다행이에요!"
26011-140 = "선생님은 어떠세요?\n저희가 오고난 후로…\n하루하루가 조금은 즐거워졌나요?"
26011-150 = "해피 버스데이-!\n생신 축하드려요,\n선생님!"
26011-160 = "뭐 가지고 싶으신\n거라도 있나요?"
26011-170 = "새해 복 많이 받으세요! 선생님!\n시간이 가는 건,\n정말 눈 깜짝할 사이네요…."
26011-180 = "올해도 잘 부탁드립니다,\n선생님!"
26011-190 = "여기도 크리스마스가 있나요!?"
26011-200 = "그럼, 산타 할아버지가\n날고 있는 걸,\n볼 수 있을까요!?"
26011-210 = "할로윈...!\n선생님! 저희도 뭐\n뒤집어 쓰러 가요!"
26011-230 = "음……. 특별히 다른 점은\n없는 것 같고……."
26011-240 = "……선생님,\n얼굴 너무 굳은 거 아니에요?\n겨우 배팅 머신인데."
26011-250 = "네! 그래도,\n아마 괜찮을 거예요."
26011-260 = "배팅에는 나름대로\n자신이 있으니까요."
26011-270 = "……뭔가요,\n그 의심의 눈초리는."
26011-280 = "그럼 내기 하나 하실래요?"
26011-290 = "3구 안에 못 치면,\n얌전히 타석에서 내려갈게요."
26011-300 = "대신,\n만약 1구라도 치게 된다면\n거기 자판기에서\n음료수 뽑아주세요!"
26011-310 = "어때요?\n선생님께도\n나쁜 이야긴 아니죠?"
26011-320 = "……히히."
26011-2600 = "네?... 이걸, 저한테…?\n묘, 묘한 기분이네요… 감사합니다.\n일, 일단, 노력 할게요!\n…이 말밖에 드리지 못해서, 죄송합니다. 하핫…."

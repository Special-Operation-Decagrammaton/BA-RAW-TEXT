[translation]
26011-10 = "蔚藍檔案！"
26011-20 = "你好，老師！\n我是柵川中學一年級的佐天涙子！請多多指教！"
26011-30 = "咦，那個人是……"
26011-40 = "哦哦！！感覺\n這裡好像很酷耶！"
26011-50 = "雖然乍看之下有點普通，\n不過只要仔細觀察\n就會發現有點特別……\n嗯～！真開心！"
26011-60 = "這就是傳說中的……\n異世界咖啡廳……"
26011-70 = "感覺很放鬆呢，嘿嘿。"
26011-80 = "老師！我在等你哦！\n今天要做什麼呢？"
26011-90 = "歡迎回來，老師！\n有什麼事需要\n我幫忙的嗎？"
26011-100 = "這裡和我們的世界\n看似很像卻又完全不同……\n真有趣呢。"
26011-110 = "咦？現在去散步？\n……我也想去！\n請帶我一起去吧，老師！"
26011-120 = "真是個什麼都\n很有趣的世界呢，\n這裡！"
26011-130 = "雖然是出於偶然……\n能來到這裡真是太好了！"
26011-140 = "老師覺得如何呢？\n在我們來到這裡之後……\n有感覺每天都稍微\n快樂了一點嗎？"
26011-150 = "Happy Birthday！\n祝你生日快樂，老師！"
26011-160 = "有沒有什麼想要的東西呀？"
26011-170 = "新年快樂！老師！\n時間的流逝，\n真的就在轉眼之間呢……"
26011-180 = "今年也請多多指教，老師！"
26011-190 = "這裡也有聖誕節嗎！？"
26011-200 = "那那～\n能看見聖誕老人\n在飛的場面嗎！？"
26011-210 = "萬聖節……！\n老師！我們也來\n喬裝打扮一下吧！"
26011-230 = "嗯……好像沒什麼……\n特別不一樣的地方。"
26011-240 = "……老師，\n你的表情會不會太嚴肅了？\n這只是個投球機而已啦。"
26011-250 = "是！不過，\n我想應該沒問題的。"
26011-260 = "畢竟我對打擊，\n還算有點自信。"
26011-270 = "……怎麼了？\n那是什麼懷疑的眼神。"
26011-280 = "那，要不要來打個賭？"
26011-290 = "要是沒在三球之內擊中的話，\n我就乖乖離開打擊區。"
26011-300 = "相反地，只要我打中一顆球，\n老師就要去那邊的自動販賣機\n買飲料請我喝！"
26011-310 = "怎麼樣？對老師來說，\n也是個不錯的提議吧？"
26011-320 = "……嘿嘿。"
26011-2600 = "咦……要把，這個給我……？\n感，感覺有點奇妙呢……謝謝你。\n總，總之，我會努力的！\n……能說的只有這些，真不好意思。哈哈……"

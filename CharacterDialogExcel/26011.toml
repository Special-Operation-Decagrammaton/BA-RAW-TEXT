[translation]
26011-10 = "Blue Archive!"
26011-20 = "สวัสดีค่ะคุณครู!\nฉันซาเต็น รุยโกะ ชั้นปีที่ 1 จากโรงเรียนมัธยมต้นซาคุงาวะค่ะ! ฝากตัวด้วยนะคะ!"
26011-30 = "เอ๋? คนคนนั้น..."
26011-40 = "โอ้ว!! ที่นี่สุดยอดไปเลยนะคะ!"
26011-50 = "ดูแวบเดียวก็เหมือนจะธรรมดา\nแต่ถ้าดูดีๆ ก็พิเศษเลยละค่ะ...\nอื้ม~! สนุกจัง!"
26011-60 = "นี่สินะคาเฟ่ต่างโลก\nที่เคยแต่ได้ยินแต่ชื่อ..."
26011-70 = "รู้สึกโล่งใจจังเลยค่ะ\nฮิฮิ"
26011-80 = "อ๊ะ! คุณครู! ฉันกำลังรออยู่เลยค่ะ!\nวันนี้จะทำอะไรเหรอคะ?"
26011-90 = "มาเลยค่ะคุณครู!\nมีงานอะไร\nให้ฉันทำมั้ยคะ?"
26011-100 = "ที่นี่เหมือนจะคล้ายกับ\nโลกของฉัน แต่ว่าก็ต่างกัน\nอย่างสิ้นเชิงเลย... สนุกจังเลยค่ะ"
26011-110 = "คะ? จะออกไปเดินเล่นเดี๋ยวนี้เลย?\n...ฉันก็อยากไปด้วยค่ะ!\nพาฉันไปด้วยนะคะคุณครู!"
26011-120 = "โลกทางนี้มีเรื่องน่าสนุก\nเต็มไปหมดเลยนะคะ"
26011-130 = "ถึงจะบังเอิญก็เถอะ\nแต่ฉันดีใจจังเลยค่ะที่ได้มาที่นี่!"
26011-140 = "แล้วคุณครูล่ะคะ?\nหลังจากที่พวกฉันมาที่นี่...\nชีวิตของคุณครูสนุกขึ้นบ้างมั้ยคะ?"
26011-150 = "แฮปปี้ เบิร์ธเดย์!\nสุขสันต์วันเกิดค่ะ\nคุณครู!"
26011-160 = "มีอะไรที่อยากได้ไหมคะ?"
26011-170 = "สวัสดีปีใหม่ค่ะคุณครู!\nเวลาผ่านไปไว\nราวกับโกหกเลยนะคะ..."
26011-180 = "ปีนี้ก็ฝากตัวด้วยนะคะ\nคุณครู!"
26011-190 = "ที่นี่ก็มีวันคริสต์มาสด้วยไหมคะ!?"
26011-200 = "ถ้างั้นฉันจะได้เห็น\nคุณลุงซานต้าตอนเหาะมา\nหรือเปล่าคะ!?"
26011-210 = "ฮาโลวีน...!\nคุณครู! ไปหาอะไร\nแต่งตัวกันเถอะค่ะ!"
26011-230 = "อืม... น่าจะไม่มีอะไร\nแตกต่างเป็นพิเศษนะ..."
26011-240 = "...คุณครู ทำสีหน้าเคร่งเครียด\nเกินไปรึเปล่าคะ? ก็แค่\nเครื่องตีลูกเบสบอลเองนะ"
26011-250 = "ค่ะ! แต่ยังไงก็\nน่าจะไหวอยู่นะคะ"
26011-260 = "เรื่องตีลูกน่ะ\nฉันมั่นใจอยู่แล้วละค่ะ"
26011-270 = "...อะไรกันคะ\nสายตาแห่งความสงสัยนั่น"
26011-280 = "ถ้างั้นมาเดิมพันกันไหมล่ะคะ?"
26011-290 = "ถ้าตีไม่โดนภายใน 3 ลูก\nฉันจะออกมาจากเขตตีลูก\nอย่างสงบเสงี่ยมเลยค่ะ"
26011-300 = "แต่ว่า ถ้าตีได้ตั้งแต่ลูกแรก\nคุณครูต้องไปกดเครื่องดื่ม\nจากตู้ตรงนั้นให้ฉันนะคะ!"
26011-310 = "ว่ายังไงล่ะคะ?\nก็ไม่ถือว่าแย่\nสำหรับคุณครูใช่ไหมคะ?"
26011-320 = "...ฮิฮิ"
26011-2600 = "คะ?...  อันนี้ ให้ฉันเหรอ...?\nระ... รู้สึกแปลกๆ นะคะเนี่ย...\nขอบคุณค่ะ ฉะ... ฉันจะพยายาม\nดูค่ะ! ... ขอโทษที่ฉันบอกได้\nแค่นี้นะคะ แหะๆ..."

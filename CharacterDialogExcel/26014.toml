[translation]
26014-10 = "Blue Archive"
26014-20 = "คาคุดาเตะ คารินจากโรงเรียนวิทย์มิลเลเนียม พร้อมแล้ว\nชะ... ชุดนี้... โอเคมั้ยนะ?"
26014-30 = "มีกระจกตรงไหน\nบ้างมั้ยนะ"
26014-40 = "เบื่อจังเลย...\nเมื่อไรคุณครูจะมานะ..."
26014-50 = "มีเฟอร์นิเจอร์น่ารักๆ\nเยอะเลยแฮะ... ถูกใจจัง"
26014-60 = "ไม่รู้สึกถึงสัญญาณของ\nศัตรูเลย งั้นก็ไม่ต้อง\nระวังตัวมากก็ได้"
26014-70 = "ทำความสะอาดบริเวณนี้...\nไม่สิ ตอนใส่ชุดนักเรียน\nไม่ทำดีกว่า"
26014-80 = "อ๊ะ คุณครู กำลังรออยู่เลย"
26014-90 = "ทำไมน่ะเหรอ...?\nจะคุ้มกันต้องมีเหตุผลด้วยเหรอ?"
26014-100 = "เข้ามาสิ คุณครู\nเหนื่อยแย่เลยนะ"
26014-110 = "อย่างที่เห็นว่าวันนี้ฉันใส่ชุดนักเรียน\nทำไมถึงใส่น่ะเหรอ?"
26014-120 = "ลองเดาดูสิ..."
26014-130 = "คงเพราะเสื้อผ้าต่างจากปกติ\nเลยรู้สึกว่าลางสังหรณ์\nแม่นยำขึ้นกว่าเดิมอีกนะ"
26014-140 = "ฉันไม่ค่อยได้ใส่\nชุดนักเรียนบ่อยๆ น่ะ...\nมีตรงไหนที่ดูไม่เข้าบ้างมั้ย?"
26014-150 = "ถะ... ถึงอย่างนั้นก็\nอย่าจ้องกันขนาดนั้นสิ...!"
26014-160 = "ไม่มีอุปสรรคในการทำภารกิจหรอก\nสั่งงานมาได้เหมือนปกติเลย"
26014-170 = "สวัสดีค่ะ คุณครู\nวันนี้ก็ขอฝากตัวด้วยนะคะ"
26014-180 = "ฉันลองทักทายแบบนักเรียนดู...\nมะ... มันแปลกหรือเปล่า?"
26014-190 = "สุขสันต์วันเกิดนะ คุณครู\nถ้าอยากได้อะไรก็บอกนะ"
26014-200 = "ฉันอยากส่งของ\nที่คุณครูชอบให้น่ะ"
26014-210 = "วันเกิด... ขอบคุณนะ\nวันนี้ฉันดีใจที่ได้...\nอยู่กับคุณครูทั้งวันเลย"
26014-220 = "สวัสดีปีใหม่นะ คุณครู\nปีนี้เรามาอยู่แบบนี้...\nกันให้บ่อยขึ้น..."
26014-230 = "มะ... ไม่มีอะไรหรอก"
26014-240 = "ชุดนี้มันธรรมดาเกินไป\nที่จะฉลองวันพิเศษ..."
26014-250 = "หืม? แต่ก็เหมาะกับฉันงั้นเหรอ...?\nขะ... ขอบคุณนะ"
26014-260 = "วันฮาโลวีนแล้วเหรอ?\nคงเพราะปกติฉัน\nไม่ค่อยใส่ชุดนักเรียน"
26014-270 = "การแต่งตัวแบบนี้จึงเหมือน\nการแต่งคอสเพลย์เลย"
26014-290 = "คะ... คุณครู\nรอเดี๋ยวนะ เดี๋ยวเดียวเท่านั้นละ"
26014-300 = "พอมาคิดดู ถ้าจะให้เลยทั้งอย่างนี้\nมันน่าจะมีปัญหานิดหน่อย...!"
26014-310 = "พะ... พอดีฉันเอาขารับมันไว้\nมันน่าจะสกปรกนิดหน่อยน่ะ..."
26014-320 = "อันนี้เดี๋ยวฉันกินเอง\nส่วนคุณครูกินอันนี้ดีกว่า...!"
26014-330 = "อ่า..."
26014-340 = "จริงสิ อันนี้ฉัน\nกัดไปแล้วคำหนึ่งนี่นา..."
26014-350 = "มะ... ไม่ เดี๋ยวก่อน! ไม่ใช่อย่างนั้นนะ\nฉันไม่ได้จะหมายความแบบนั้น...!"
26014-360 = "ไม้นี้คงไม่ได้...\n...! มะ... ไม่สิ ไม่ใช่!"
26014-370 = "มะ... ไม่ใช่นะ!\nฉันไม่ได้ตั้งใจ\nให้เป็นอย่างนั้นจริงๆ นะ!"
26014-380 = "มะ... ไม่ว่าจะให้ไม้ไหน มันก็...!"
26014-390 = "อึก... ฉันควรทำยังไงดี...!"
26014-2600 = "ทุกที่ทุกเวลา\nไม่ว่าจะชุดเมดหรือชุดนักเรียน\nฉันพร้อมจะปกป้องคุณครูเสมอ"

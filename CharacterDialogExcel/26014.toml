[translation]
26014-10 = "Blue Archive."
26014-20 = "Kakudate Karin, from Millennium Science School, preparations complete. ...I-Is this outfit okay?"
26014-30 = "I wish there were a mirror somewhere."
26014-40 = "I'm free, more or less. How about you, Sensei...?"
26014-50 = "There's lots of cute furniture... I like it."
26014-60 = "I don't sense any enemies. I suppose I can let my guard down a bit."
26014-70 = "I should clean this place up... No, not while I'm in my school uniform."
26014-80 = "Ah, Sensei, I was waiting."
26014-90 = "...Why? Does the situation call for bodyguards?"
26014-100 = "Welcome, Sensei. Good work."
26014-110 = "As you can see, I'm in my school uniform today. Why, you ask?"
26014-120 = "...Would you like to guess?"
26014-130 = "Maybe it's just because I'm dressed differently, but I feel unusually alert today."
26014-140 = "I don't usually wear my school uniform... Does everything look right?"
26014-150 = "H-Hey, don't just keep on staring like that!"
26014-160 = "Ready and waiting. Any orders you have, just give them as usual."
26014-170 = "Hello, Sensei! It's going to be a good day today."
26014-180 = "...That's how I'd greet you as a regular student. W-Was it weird?"
26014-190 = "Happy birthday, Sensei. Let me know if there's anything you want."
26014-200 = "I want to get you a present you'd like, Sensei."
26014-210 = "I have a special birthday thank you for you. I'm happy...to be able to spend the whole day with you, Sensei."
26014-220 = "Happy New Year, Sensei. I hope the new year's full of...more days like this."
26014-230 = "N-Never mind."
26014-240 = "I am dressed a little plainly for a special day..."
26014-250 = "What? It looks good on me...? Th-Thank you."
26014-260 = "It's Halloween. Maybe it's because I don't usually wear a school uniform..."
26014-270 = "...but it feels like I'm actually in a costume."
26014-290 = "S-Sensei! Wait!"
26014-300 = "Now that I think about it, it'd be problematic to give this back to you...!"
26014-310 = "I-I grabbed it with my legs, so it's a bit dirty..."
26014-320 = "Why don't I eat it, and you can take this one...?"
26014-330 = "...Ah."
26014-340 = "Right, I already took a bite out of this..."
26014-350 = "N-No, hold on! It's nothing like that. I didn't mean it like that at all...!"
26014-360 = "Right, let's go with this... ...! N-No, no!"
26014-370 = "That's not it! I really didn't mean it like that!"
26014-380 = "Wh-Whichever one I give you, it's...!"
26014-390 = "Ugh... What am I supposed to...?"
26014-2600 = "No matter the time or place, whether I'm in a maid uniform or a school uniform, I'm always prepared when it comes to protecting Sensei."

[translation]
26014-10 = "블루 아카이브."
26014-20 = "밀레니엄 사이언스 스쿨 카쿠다테 카린, 준비 완료했다.\n…이, 이 복장, 괜찮을까?"
26014-30 = "어딘가 거울이\n있으면 좋을 텐데."
26014-40 = "조금 한가한데……\n선생님은 언제쯤……."
26014-50 = "귀여운\n가구들이 많군……\n마음에 들어."
26014-60 = "적의 기척은\n없어 보이는군.\n경계를 조금\n풀어도 되겠어."
26014-70 = "이 부근의 청소를…\n…아니, 교복일 때는\n그만두자."
26014-80 = "아, 선생님, 기다리고 있었다."
26014-90 = "…왜냐고?\n호위에 이유가 필요한가."
26014-100 = "어서 와, 선생님.\n고생 많았다."
26014-110 = "보다시피, 오늘은 교복이다.\n어째서냐고?"
26014-120 = "……맞춰보겠어?"
26014-130 = "평소와 다른 옷이라서 그런지,\n어딘가 직감이\n날카로워진 기분이다."
26014-140 = "교복은 자주 입는\n편이 아니라……\n어딘가 어색한 부분은 없나?"
26014-150 = "그, 그렇다고 그렇게\n빤히 쳐다보면 곤란하다만……!"
26014-160 = "임무 수행에 지장은 없다.\n평소대로, 사양 말고 말해 줘."
26014-170 = "안녕하세요, 선생님.\n오늘 하루도, 잘 부탁드립니다."
26014-180 = "학생으로서 인사를 해봤는데…\n이, 이상한가?"
26014-190 = "생일 축하해, 선생님.\n원하는 게 있다면 말해 줘."
26014-200 = "선생님이 좋아할 만한 것을,\n보내고 싶어."
26014-210 = "생일… 고마워.\n오늘은 하루 종일, 선생님과\n함께 있을 수 있다는 게… 기뻐."
26014-220 = "새해 복 많이 받아, 선생님.\n올해에는, 좀 더 자주\n이렇게……."
26014-230 = "아, 아무것도 아니다."
26014-240 = "기념일을 보내기에는\n조금 평범한 복장이다만……"
26014-250 = "응? 어울린다고……?\n고, 고마워."
26014-260 = "할로윈인가.\n평소 교복을 그다지\n입지 않아서 그런지,"
26014-270 = "오히려 이쪽이\n분장한 것 같은 느낌이다."
26014-290 = "서, 선생님!\n자, 잠깐만!"
26014-300 = "이거 이대로 주기엔,\n뭐랄까……!"
26014-310 = "내, 내 다리로 잡은 거라서,\n조금……."
26014-320 = "이건 내가 먹고,\n선생님은 다른 쪽을……!"
26014-330 = "……아."
26014-340 = "이건 이미 내가\n한 입 먹은……."
26014-350 = "아, 아니!\n그런 의미가 아닌데……!"
26014-360 = "역시 이걸로…\n……! 아, 아니아니!"
26014-370 = "진짜로 그런 의도가……!"
26014-380 = "어, 어떤 걸 줘도,\n뭔가……!"
26014-390 = "으으……\n나는 어떻게 해야……!"
26014-2600 = "언제, 어디서든, 메이드복이든, 교복이든,\n선생님을 지키는 일이라면 나는 항상 준비돼 있다."

[translation]
26014-10 = "蔚藍檔案。"
26014-20 = "千年科學學園的角楯花凛，準備完成。\n……這，這副打扮，還行嗎？"
26014-30 = "哪裡有鏡子呢……"
26014-40 = "有了點時間……\n老師在哪裡……"
26014-50 = "這裡有很多可愛的\n家具呢……我喜歡。"
26014-60 = "似乎沒有敵人的氣息。\n可以稍微放鬆警戒。"
26014-70 = "來把這附近打掃一下……\n……不，穿著制服的時候\n還是別這麼做吧。"
26014-80 = "啊啊，老師。我正在等你。"
26014-90 = "……問我為什麼？\n護衛還需要理由嗎。"
26014-100 = "歡迎回來，老師。\n還有，辛苦了。"
26014-110 = "嗯？沒錯，今天穿著制服。\n……理由？"
26014-120 = "呵呵……會是什麼呢。\n你猜猜看吧？"
26014-130 = "可能是因為服裝與平常不同，\n直覺似乎變得更敏銳了。"
26014-140 = "我很少有穿制服的機會……\n應該沒有什麼奇怪的吧？"
26014-150 = "雖然話是這麼說……\n你，你盯太久了，老師！"
26014-160 = "對任務執行不會有影響。\n希望你能像平時一樣，\n放心地跟我說。"
26014-170 = "你好，老師。\n今天一天，也請你多多指教。"
26014-180 = "我試著以學生的身分\n來打招呼……\n會，會很奇怪嗎？"
26014-190 = "生日快樂。\n有什麼想要的東西\n就告訴我吧。"
26014-200 = "我想送能讓老師\n開心的東西。"
26014-210 = "生日……謝謝你。\n今天一整天，能和老師\n在一起……我很開心。"
26014-220 = "老師，祝你新年快樂。\n今年請更常，像這樣跟我……"
26014-230 = "沒，沒什麼。"
26014-240 = "以度過聖誕節而言，\n這套服裝感覺有點太過平凡……"
26014-250 = "……很適合所以沒關係？\n謝，謝謝你。"
26014-260 = "是萬聖節啊。\n可能因為平時\n不太穿制服的關係，"
26014-270 = "總覺得已經有在扮裝的感覺了。"
26014-290 = "……啊！老師！\n先，先等一下！"
26014-300 = "就這樣給你，\n好像有點……！"
26014-310 = "那個，畢竟是我\n用腿夾住的，所以……"
26014-320 = "這隻我來吃好了，\n老師就吃這邊的……！"
26014-330 = "……啊。"
26014-340 = "這邊是我已經吃過的……"
26014-350 = "不，不是！\n我沒有那個意思……！"
26014-360 = "果然還是把這邊的……\n……！好像，也不太對！"
26014-370 = "我真的，沒有那個意思……！"
26014-380 = "無，無論給哪邊都……\n唔唔……！"
26014-390 = "我，我該怎麼辦才好……！"
26014-2600 = "無論什麼時候，無論打扮如何，\n我都發誓會為了老師而奔走。"

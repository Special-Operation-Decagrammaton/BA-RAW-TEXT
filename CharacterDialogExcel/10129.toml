[translation]
10129-10 = "Blue... Ar... chive..."
10129-20 = "นะ... นี่เป็นส่วนหนึ่งของงานกลุ่มรักษาความสงบค่ะ\nฉันจะพยายามเพื่อความปลอดภัยของทรีนิตี้กับคุณครูค่ะ"
10129-30 = "ที่นี่เงียบสงบจังเลยนะคะ...\nเป็นเรื่องที่ดีจริงๆ ค่ะ"
10129-40 = "(คนคนนั้น...\nพยายามคุยกับฉันงั้นเหรอ?)"
10129-50 = "(หะ... หัวข้อสนทนา...\nเมื่อคืนก็เตรียมมา\nแล้วนี่นา...!)"
10129-60 = "(ฉันควรเปลี่ยนชุด\nแล้วค่อยมาใช่มั้ยคะ...?)"
10129-70 = "หาทางออก\nเรียบร้อยค่ะ"
10129-80 = "คุณครู เชิญค่ะ\nฉันกำลังรออยู่เลยค่ะ"
10129-90 = "ฉันพร้อมแล้วค่ะ\nขอบคุณที่เรียกหานะคะ"
10129-100 = "กำลังยุ่งอยู่แท้ๆ\nขอบคุณที่มาหานะคะ"
10129-110 = "ฉันออกไปทำงานของ\nกลุ่มรักษาความสงบได้ทุกเมื่อค่ะ"
10129-120 = "ปะ... เป็นยังไงบ้างคะ?"
10129-130 = "ชุดนี้...\nดูแปลกหรือเปล่าคะ?"
10129-140 = "ปะ... เปล่านะ ฉันไม่ได้ขอให้\nชมกันนะคะ!"
10129-150 = "สถานการณ์ของ\nกลุ่มรักษาความสงบ\nน่ะเหรอคะ?"
10129-160 = "โชคดีที่ทุกอย่างราบรื่นดีค่ะ"
10129-170 = "นะ... แน่นอนว่าชุดนี้\nไม่ใช่ยูนิฟอร์มของ\nกลุ่มรักษาความสงบหรอกค่ะ!"
10129-180 = "โบลต์ แคตช์!\nเทอร์ไมต์ ไวต์!"
10129-190 = "คะ... คุณครู?!\nมาอยู่ตั้งแต่เมื่อไรคะ?!"
10129-200 = "ฉันกำลังศึกษาคอนเทนต์\nสาวน้อยเวทมนตร์อยู่ค่ะ..."
10129-210 = "ที่บอกว่า 'พลังเพลิงที่เพียงพอ\nคือเวทมนตร์!'\nมันน่าสนใจดีค่ะ"
10129-220 = "ผนังนั้นในห้องทำงาน...\nเป็นผนังปลอมสินะคะ"
10129-230 = "มันดูน่าจะ\nยิงทะลุได้ง่ายเลยค่ะ"
10129-240 = "สุขสันต์วันเกิดค่ะ\nไปเดินเล่นด้วยกันมั้ยคะ?"
10129-250 = "ของขวัญวันเกิด ขอเป็น...\nบะ... บทพูดของสาวน้อยเวทมนตร์\nเหรอคะ?!"
10129-260 = "ตะ... แต่ว่าแบบนั้นมัน...!"
10129-270 = "อะ... เอ่อ..."
10129-280 = "เมจิคัล ลีริคัล...\nเทอร์ไมต์ ไวต์!"
10129-290 = "แบบนี้ใช้ได้มั้ยคะ...?"
10129-300 = "วันเกิดงั้นเหรอคะ?"
10129-310 = "อย่างนี้สินะคะ ถึงแล้วสินะ..."
10129-320 = "ฉันงานยุ่งจนลืมไปเลยค่ะ\nขอบคุณที่อวยพรให้นะคะ"
10129-330 = "ของขวัญที่ฉัน\nอยากได้น่ะเหรอคะ? อืม..."
10129-340 = "ไม่มีอะไรเป็นพิเศษค่ะ\nฉันได้มาเพียงพอ\nแล้วละค่ะ"
10129-350 = "ขึ้นปีใหม่แล้วค่ะ\nปีนี้ก็ขอฝากตัวด้วยนะคะ"
10129-360 = "คำอธิษฐานวันปีใหม่..."
10129-370 = "ฉันหวังว่าปีหน้า\nก็จะมาทักทาย\nได้แบบนี้อีกนะคะ"
10129-380 = "เป็นช่วงที่มีผู้คนออกมา\nตามท้องถนนเยอะเลยนะคะ\nฉันเข้าใจที่ตื่นเต้นกันค่ะ"
10129-390 = "ฉันดีใจที่รักษา\nความสงบสุขนั้นไว้ได้ค่ะ"
10129-400 = "ระหว่างมาที่นี่\nมีหลายคนให้ของว่างฉัน..."
10129-410 = "แล้วก็บอกฉันว่า\nอย่าแกล้งกันด้วยค่ะ..."
10129-420 = "คุณครู ฉันดูเป็นคน\nชอบแกล้งคนอื่นเหรอคะ?"
10129-440 = "คะ... คุณครู!!"
10129-450 = "มาทำอะไรที่นี่?!"
10129-460 = "ไม่สิ\nเข้ามาตั้งแต่เมื่อไรคะ!"
10129-470 = "ฉันมัวแต่ฟังเพลง\nก็เลยไม่ทันได้สังเกตเลยค่ะ..."
10129-480 = "แต่พอเป็นคุณครูที่มา\nก็โล่งอกไปทีนะคะ"
10129-490 = "อ๊ะ ชะ... ชุดนี้\nคือว่า...!"
10129-500 = "เป็นชุดที่ฉันเตรียมมา\nเพื่องานสืบสวนลับ\nของกลุ่มรักษาความสงบค่ะ..."
10129-510 = "มะ.. ไม่ใช่งานอดิเรก...!\nของฉันนะคะ! จริงๆ นะคะ!"
10129-520 = "ฉันแค่จะเช็กล่วงหน้า\nว่าไซซ์ถูกหรือเปล่า\nเท่านั้นเองค่ะ...!"
10129-530 = "(คะ... คุณครูบอกว่า\nน่ารักด้วยค่ะ...)"
10129-540 = "(ถ้าจู่ๆ จะชมกันแบบนี้...\nฟู่ว...!)"
10129-550 = "(ฉันยังไม่ชินกับ\nการถูกชมจริงๆ ด้วยค่ะ)"
10129-560 = "(ก็ดีใจอยู่หรอก...!\nแต่ก็...!)"
10129-570 = "ที่เห็นวันนี้\nให้เป็นความลับ\nกับคนอื่นนะคะ!"
10129-580 = "ก็นี่เป็นข้อมูลลับ...\nนี่คะ!"
10129-2600 = "คือว่า... ฉันคิดว่าของตกแต่งน่ารักๆ...\nมันจะเข้ากับฉันหรือเปล่าน่ะค่ะ"

[translation]
10129-10 = "蔚藍檔，檔……案。"
10129-20 = "這，這也是自衛隊任務的延伸……沒錯。\n為了三一和老師的安全，我會盡己所能。"
10129-30 = "這裡很和平呢……\n真是太好了。"
10129-40 = "（那位同學，是不是\n想要跟我搭話呢？）"
10129-50 = "（得，得找個話題……\n腦中一片空白……\n昨晚明明\n想過的說……！）"
10129-60 = "（果然，應該換件\n衣服再來的嗎……）"
10129-70 = "避難路線\n已經掌握了。"
10129-80 = "歡迎回來，老師。\n恭候多時了。"
10129-90 = "感謝您的呼喚。\n隨時可以出動哦。"
10129-100 = "在百忙之中\n還特別過來，\n真是非常感謝。"
10129-110 = "自衛隊任務，\n隨時可以進行。"
10129-120 = "怎，怎麼樣呢？"
10129-130 = "這套服裝……\n應該不奇怪吧？"
10129-140 = "不，不是。我不是\n想要被誇獎……！"
10129-150 = "自衛隊的近況……是嗎？"
10129-160 = "這個嘛，\n目前還算順利。"
10129-170 = "啊，那個……\n這並不是自衛隊的\n制服哦！"
10129-180 = "Bolt Catch！\nThermite White！"
10129-190 = "老，老師！？\n您什麼時候在那裡的！？"
10129-200 = "為了研究，我正在\n觀賞魔法少女作品……"
10129-210 = "看到某部作品說 \n「火力高就算魔法」\n……覺得非常有趣。"
10129-220 = "辦公室的那面牆……\n是臨時搭建的吧。"
10129-230 = "看起來恰好適合\n進行貫穿射擊。"
10129-240 = "祝您生日快樂。 \n不介意的話，\n要不要一起散散步呢？"
10129-250 = "咦，作為禮物……\n希，希望我說出\n魔法少女的台詞！？"
10129-260 = "不，不管怎麼說，\n那樣也太……！"
10129-270 = "唔，唔唔……"
10129-280 = "Magical, Lyrical……\nThermite White！"
10129-290 = "……這樣可以嗎？"
10129-300 = "我的生日，是嗎？"
10129-310 = "啊啊，已經到\n那一天了啊。"
10129-320 = "我完全沒意識到。\n您願意為我祝福，\n真的非常感謝。"
10129-330 = "想要的禮物，是嗎？\n唔嗯……"
10129-340 = "沒有特別想要的。\n因為我已經得到\n足夠多的東西了。"
10129-350 = "祝您新年快樂。\n今年也請多多指教。"
10129-360 = "新年的願望，是嗎……"
10129-370 = "如果明年，\n也能像這樣\n跟您問好的話，\n我會很開心的。"
10129-380 = "是街上人潮\n眾多的時期呢。\n我能理解大家會\n感到興奮的心情。"
10129-390 = "能夠守護這份平穩……\n正在守護著它這件事，\n讓我感到很高興。"
10129-400 = "來到這裡的路上，\n我從許多人手中\n收到了糖果……"
10129-410 = "還被叮囑不要惡作劇……"
10129-420 = "我有那麼像是\n會惡作劇的人嗎？"
10129-440 = "老，老師！？"
10129-450 = "有，有什麼事嗎！？"
10129-460 = "話說，您是什麼時候來的！？"
10129-470 = "因為專注在音樂上，\n我完全沒注意到……"
10129-480 = "不過，對方是\n老師真是太好了。"
10129-490 = "啊，這，\n這套衣服是，\n那個……！"
10129-500 = "是為了自衛隊的\n潛入搜查……"
10129-510 = "並，並不是\n我的興趣……！\n不是的！真的不是！"
10129-520 = "只是想先確認\n尺寸是否合適\n才會穿上……！"
10129-530 = "（被，被說可愛了……）"
10129-540 = "（突然被誇獎的話……\n　唔……！）"
10129-550 = "（我還不習慣被誇獎）"
10129-560 = "（雖然很高興……！\n　但是……！）"
10129-570 = "今天看到的事，\n請對其他人保密哦！"
10129-580 = "因為，這是機密事項……！"
10129-2600 = "那個……\n雖然這類的周邊\n確實很可愛……\n不過真的適合我嗎？"

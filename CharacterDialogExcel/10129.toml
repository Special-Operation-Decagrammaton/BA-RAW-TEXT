[translation]
10129-10 = "블루아, 아카이……. 브."
10129-20 = "이, 이것도 자경단 임무의 연장입니다.\n트리니티와 선생님의 안전을 위해, 힘내겠습니다."
10129-30 = "여기는 평화롭군요……\n정말 좋은 일입니다."
10129-40 = "(저분, 혹시\n말 걸려고\n하시는 걸까요?)"
10129-50 = "(대, 대화 주제…….\n어젯밤에 분명\n준비했는데……!)"
10129-60 = "(역시 옷, 갈아입고\n왔어야 했을까요…….)"
10129-70 = "출구 파악은\n완료했습니다."
10129-80 = "선생님, 어서오세요.\n기다리고 있었습니다."
10129-90 = "준비는 되었습니다.\n호출, 감사드립니다."
10129-100 = "바쁘신 와중에도,\n찾아주셔서 감사합니다."
10129-110 = "자경단 임무,\n언제든지 갈 수 있습니다."
10129-120 = "어, 어떤가요?"
10129-130 = "이 의상……\n이상하진 않지요?"
10129-140 = "아, 아니. 칭찬을\n부탁드린 게 아닙니다!"
10129-150 = "자경단의 근황,\n말씀이신가요."
10129-160 = "다행히 순조롭습니다."
10129-170 = "다, 당연히 이 옷이\n자경단의 제복이 된 건\n아닙니다!"
10129-180 = "볼트 캐치!\n테르밋 화이트!"
10129-190 = "서, 선생님?!\n언제부터 계셨던 건가요?!"
10129-200 = "연구차, 마법소녀물을\n보고 있었습니다만……."
10129-210 = "'충분한 화력은 마법.'\n이라는 부분이\n흥미로웠습니다."
10129-220 = "사무실의 저 벽……\n가벽이군요."
10129-230 = "관통 사격을\n가하기 좋아 보입니다."
10129-240 = "생신 축하드립니다.\n함께 산책 어떠실까요?"
10129-250 = "생신 선물로…….\n마, 마법소녀의 대사를요?!"
10129-260 = "아, 아무리 그래도 그건……!"
10129-270 = "우, 우으……."
10129-280 = "매지컬, 리리컬……\n테르밋 화이트!"
10129-290 = "……이러면 될까요?"
10129-300 = "생일, 말씀이십니까?"
10129-310 = "그렇군요. 벌써 그렇게……."
10129-320 = "바빠서 잊고 있었습니다.\n축하해주셔서 감사합니다."
10129-330 = "받고 싶은 선물,\n말씀이신가요? 으음……."
10129-340 = "특별히 없습니다.\n이미 충분히,\n받고 있으니까요."
10129-350 = "새해가 밝았습니다.\n올해도 잘 부탁드립니다."
10129-360 = "새해의 소원이라면……."
10129-370 = "다음 해에도 이렇게\n인사할 수 있으면\n좋겠습니다."
10129-380 = "거리에 사람들이\n많아지는 시기군요.\n마음이 들뜨는 것도\n이해가 갑니다."
10129-390 = "그 평온을 지킬 수 있고,\n지켜내는 것이 기쁩니다."
10129-400 = "오면서 많은 분들께서\n간식을 챙겨주셨습니다만……"
10129-410 = "동시에,\n장난은 치지 말라고도\n하시더군요……."
10129-420 = "선생님, 혹시 제가\n장난을 많이 치나요?"
10129-440 = "서, 선생님!!"
10129-450 = "여, 여기는 무슨 일로?!"
10129-460 = "아니,\n언제부터 계셨나요!"
10129-470 = "음악에 집중하느라,\n전혀 눈치채지 못했습니다……."
10129-480 = "그래도, 상대가\n선생님이셔서 다행입니다."
10129-490 = "앗, 이, 이 옷은,\n그게……!"
10129-500 = "자경단의\n잠입수사를 위해서\n준비한 옷, 인데요……."
10129-510 = "제, 제 취미는……!\n아닙니다! 정말로요!"
10129-520 = "사이즈가 맞는지,\n미리 확인하려는 것\n뿐입니다……!"
10129-530 = "(귀, 귀엽다고\n해주셨습니다……)"
10129-540 = "(갑자기\n칭찬하시면……\n우우……!)"
10129-550 = "(칭찬을 듣는 건\n역시 아직\n익숙하지 않습니다.)"
10129-560 = "(기쁘지만……!\n그렇지만……!)"
10129-570 = "오늘 보신 것,\n다른 분들에게는\n비밀입니다!"
10129-580 = "이건, 기밀 사항……\n이니까요!"
10129-2600 = "그게……\n귀여운 장식이라 생각합니다만……\n과연 제게 어울릴까요?"

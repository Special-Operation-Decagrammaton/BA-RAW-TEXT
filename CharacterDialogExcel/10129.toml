[translation]
10129-10 = "Blue A-Archive..."
10129-20 = "Th-This is also an extension of the Vigilante Crew's duties. I'll do my best for both your safety and Trinity's."
10129-30 = "It seems peaceful here... That's great."
10129-40 = "(Is that person trying to talk to me?)"
10129-50 = "(S-Small talk... I studied this last night, really!)"
10129-60 = "(M-Maybe I should've changed before coming here...)"
10129-70 = "I've located the exit."
10129-80 = "Sensei, welcome. I've been waiting for you."
10129-90 = "I've thoroughly prepared. Thank you for calling me."
10129-100 = "Thank you for visiting even when you're so busy."
10129-110 = "I'm always ready for Vigilante Crew missions."
10129-120 = "H-How is it?"
10129-130 = "My outfit... It doesn't look weird, right?"
10129-140 = "N-No. I wasn't fishing for compliments!"
10129-150 = "You're wondering how the Vigilante Crew has been lately?"
10129-160 = "Fortunately, pretty well."
10129-170 = "O-Of course, this is not going to be the official Vigilante Crew uniform!"
10129-180 = "Bolt catch! Thermite White!"
10129-190 = "S-Sensei?! Since when were you there?!"
10129-200 = "I've been watching magical girl shows for research purposes..."
10129-210 = "And it's interesting to me when they say \"sufficient firepower is magic.\""
10129-220 = "That wall in the office... The partition wall."
10129-230 = "It would be good for stopping bullets."
10129-240 = "Happy birthday. Would you like to go on a walk together?"
10129-250 = "For your birthday present... You want to hear me say a magical girl phrase?!"
10129-260 = "B-But that's...!"
10129-270 = "U-Ugh..."
10129-280 = "Magical, lyrical...Thermite White!"
10129-290 = "...Was that good enough?"
10129-300 = "It's my birthday?"
10129-310 = "Oh. Already?"
10129-320 = "I forgot about it because I was so busy. Thank you."
10129-330 = "What do I want? Hm..."
10129-340 = "Nothing really. I already have everything I need."
10129-350 = "It's the new year. I look forward to working with you again."
10129-360 = "My new year's wish?"
10129-370 = "I hope that, next year, we'll get to exchange well wishes like this again."
10129-380 = "It's that time of the year when the streets get crowded. I can understand why they're excited."
10129-390 = "Being able to protect that peace makes me happy."
10129-400 = "Many people gave me treats on my way here..."
10129-410 = "But they also warned me not to pull any tricks."
10129-420 = "Sensei, do I pull a lot of tricks?"
10129-440 = "S-Sensei!"
10129-450 = "Wh-What brings you here?!"
10129-460 = "No, how long have you been there?!"
10129-470 = "I was so focused on my music that I didn't notice you at all..."
10129-480 = "But still, I'm glad it was you, Sensei."
10129-490 = "Ah, th-this outfit is, it's, um...!"
10129-500 = "It's an outfit I prepared for the Vigilante Crew's infiltration investigation..."
10129-510 = "I-It has nothing to do with my...preferences! Really!"
10129-520 = "I was just checking to see if it's the right size...!"
10129-530 = "(S-Sensei said it's cute...)"
10129-540 = "(If you suddenly compliment me, then... Uhh...!)"
10129-550 = "(I'm still not used to hearing compliments.)"
10129-560 = "(It makes me happy...! But...!)"
10129-570 = "What you saw today has to stay a secret!"
10129-580 = "This is...top secret!"
10129-2600 = "Um... This is really cute, but does it fit me?"

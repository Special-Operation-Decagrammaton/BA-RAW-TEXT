[translation]
10020-10 = "Blue Archive."
10020-20 = "Shimoe Koharu... Mark my words. I won't be here for long!"
10020-30 = "Ugh. Normies..."
10020-40 = "Ugh..."
10020-50 = "I have no plans of getting to know you better."
10020-60 = "If I come across anything unseemly, I'll get rid of every bit of it."
10020-70 = "Everyone looks so excited."
10020-80 = "Oh, Sensei. Welcome."
10020-90 = "I've been waiting, Sensei."
10020-100 = "I-I won't forgive anyone being naughty where I can see!"
10020-110 = "Quiet about my grades...! I'm trying my best."
10020-120 = "I'm gonna do my best to quickly graduate from the Make-Up Work Club."
10020-130 = "N-Naughty things...?"
10020-140 = "No such thing allowed! I'm gonna confiscate everything and burn it into ashes!"
10020-150 = "Teacher-student relationships are completely inappropriate!"
10020-160 = "That can't happen in Kivotos!"
10020-170 = "It's your birthday, Sensei. You can relax today."
10020-180 = "No, wait! You can't slack off just because it's your birthday!"
10020-190 = "Y-You knew today is my birthday?"
10020-200 = "Th-Thank you. I didn't think you'd remember."
10020-210 = "That makes me weirdly happy..."
10020-220 = "Are you sure you want to spend your New Year's with me?"
10020-230 = "N-Not that I'd care, mind you."
10020-240 = "Nothing illicit will taint this holy night! You got that, Sensei?!"
10020-250 = "Candy? I'm too grown up for candy! I-I want something more adult-ish..."
10020-260 = "N-Never mind."
10020-280 = "Wh-What are you...?!"
10020-290 = "(O-Oh, no. This can't be happening!)"
10020-300 = "I d-didn't say something wrong, did I?"
10020-310 = "(W-Wait. At this rate, Sensei and I will be...)"
10020-320 = "(Is this what I think it is? I've read about it in books so many times. Is this really happening?!)"
10020-330 = "(What am I supposed to do? Do I close my eyes?)"
10020-340 = "(N-No way! How far will things go?!)"
10020-350 = "Sensei... I know what you're after."
10020-360 = "(This is BAD! Not good. I-I'm not ready for something like this...)"
10020-2600 = "I made it this far. Sensei, you saw it, right? This is just the beginning. Please continue to watch over me."

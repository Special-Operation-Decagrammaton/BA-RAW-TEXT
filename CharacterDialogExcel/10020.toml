[translation]
10020-10 = "蔚藍檔案。"
10020-20 = "下江小春……\n先，先告訴你，\n我可不打算在這裡待太久…！"
10020-30 = "嗚嗚……\n這些臭現充……"
10020-40 = "啊嗚嗚嗚……"
10020-50 = "我，我沒有要\n融入大家的打算。"
10020-60 = "只要有\n色色的東西，\n我全部都會沒收的。"
10020-70 = "大家，看起來都很開心呢…"
10020-80 = "啊，老師，歡迎回來。"
10020-90 = "我在等你唷，老師。"
10020-100 = "在，在我面前，\n品行不良的事是不允許的！"
10020-110 = "不要提成績的事！\n我，我有在努力了嘛……"
10020-120 = "我要加油，\n趕緊從補課部畢業。"
10020-130 = "色，色色的東西……！"
10020-140 = "那種東西不可以！\n一旦發現就要全部沒收！燒毀！"
10020-150 = "以，以學生的身分\n交往是不可以的！\n那種事不健全！"
10020-160 = "是不可以發生在\n奇普托斯的事！"
10020-170 = "今天是老師的生日對吧。\n那今天就\n稍微放鬆一點……"
10020-180 = "當，當我沒說！\n請你好好工作！"
10020-190 = "我，我的生日，你有記得啊？"
10020-200 = "謝，謝謝……\n沒想到你會記得……"
10020-210 = "好，好像有點開心……？"
10020-220 = "明明是新年，\n跟我在一起沒關係嗎？"
10020-230 = "我，我是\n無所謂啦……？"
10020-240 = "所，所有汙染神聖之夜的\n不檢點行為，全都禁止哦！\n老師，你有在聽嗎！？"
10020-250 = "糖果？\n早就那種東西畢業了哦？\n我，我喜歡更成熟的……"
10020-260 = "沒，沒什麼。"
10020-280 = "什，什麼……！？"
10020-290 = "（啊，啊咧……\n這個，難道是……！？）"
10020-300 = "我，我並沒有，說錯什麼吧？"
10020-310 = "（等一下，該不會照這樣下去，\n我，要和老師……！？）"
10020-320 = "（這，這種發展，\n我在書上看過很多次……！\n真的，真的要變成那種狀況了嗎！？）"
10020-330 = "（那，那種事情，\n或是這種事情……）"
10020-340 = "（──！？該，該不會，\n連那種事情都……！？）"
10020-350 = "終，終於露出本性了呢，\n老師……！？"
10020-360 = "（糟了糟了糟了……！\n我，我完全還沒做好任何覺悟啊！？）"
10020-2600 = "我也終於走到了這一步……\n老師，你有看到嗎？現在才是真正的開始。\n今後也請繼續看著我唷。"

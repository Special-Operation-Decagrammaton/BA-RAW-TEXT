[translation]
10020-10 = "블루 아카이브."
10020-20 = "시모에 코하루……\n말해두겠지만,\n여기 오래 있을 생각은 없으니까……!"
10020-30 = "으으…\n리얼충들…"
10020-40 = "아우우우……"
10020-50 = "치, 친해지고 싶은\n생각은 없으니까."
10020-60 = "불결한 게 보이면\n전부 몰수할 거야."
10020-70 = "다들 신나보이네……"
10020-80 = "아. 선생님, 어서 와."
10020-90 = "기다리고 있었어. 선생님."
10020-100 = "내, 내 앞에서 나쁜 짓하는 건\n용서하지 않을 테니까!"
10020-110 = "성적은 얘기하지마!\n노, 노력하고 있으니까."
10020-120 = "빨리 노력해서\n보충수업부를 졸업해 주겠어."
10020-130 = "야, 야한 거……?"
10020-140 = "그런 건 안 돼!\n발견하면 전부 몰수! 소각!"
10020-150 = "학생 신분으로\n불순 교제는 안되니까!\n그런 건 불건전해!"
10020-160 = "키보토스에서 있어선\n안될 일이라고!"
10020-170 = "선생님 생일이잖아.\n오늘은 조금\n느긋하게 해도……"
10020-180 = "여, 역시 지금 건 취소!\n성실하게 제대로 하라고!"
10020-190 = "내, 내 생일 알고 있었어?"
10020-200 = "고, 고마워……\n기억하고 있었을 줄은 몰랐는데……"
10020-210 = "조, 조금 기쁠지도……?"
10020-220 = "설날인데\n나랑 있어도 되는 거야?"
10020-230 = "나, 나는\n딱히 상관없지만…?"
10020-240 = "성스러운 밤을 더럽히는\n불결한 행동들은 전부 금지야!\n듣고 있어? 선생님?"
10020-250 = "사탕?\n그런 건 예전에 졸업했거든?\n나, 나는 좀 더 어른의……"
10020-260 = "아, 아니야."
10020-280 = "뭐, 뭐야……?!"
10020-290 = "(어, 어라……\n이거 설마……?!)"
10020-300 = "따, 딱히 내가\n틀린 말 한 건 아니잖아?"
10020-310 = "(자, 잠깐만…… 이대로라면\n설마 선생님과……)"
10020-320 = "(이, 이 전개라면……\n그 책에서 몇 번이나 봤었어……\n저, 정말 그 흐름이야?!)"
10020-330 = "(이런 거……라든가,\n저런 거……라든가……)"
10020-340 = "(서, 설마?! 그런 짓까지도……!?)"
10020-350 = "선생님, 결국\n본색을 드러내는구나……?"
10020-360 = "(큰일났다, 큰일났다,\n아, 아직 각오 같은 건\n전혀 되어 있지 않은데……?!)"
10020-2600 = "나도 여기까지 해냈어……\n\r선생님, 봤지? 이제부터 시작이라고.\n\r앞으로도 지켜봐줘."

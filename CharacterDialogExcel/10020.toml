[translation]
10020-10 = "Blue Archive"
10020-20 = "ชิโมเอะ โคฮารุ...\nขอบอกไว้ก่อนเลยนะ\nว่าฉันไม่อยากอยู่ตรงนี้นานๆ หรอก...!"
10020-30 = "จะ...\nเจ้าพวกแมลง"
10020-40 = "อะ...อ่า..."
10020-50 = "มะ... ไม่มีความคิด\nที่อยากสนิทด้วยเลย"
10020-60 = "ถ้าเจออะไรที่ไม่เหมาะสม\nฉันจะจัดการให้หมดเลย"
10020-70 = "ทุกคนดูตื่นเต้นจังเลยนะ..."
10020-80 = "อ๊ะ คุณครู\nเชิญเลย"
10020-90 = "กำลังรออยู่เลย คุณครู"
10020-100 = "ฉะ...ฉันจะไม่ยกโทษให้ใคร\nที่ประพฤติตัวไม่เหมาะสม\nต่อหน้าฉันเด็ดขาด!"
10020-110 = "ห้ามพูดเรื่องเกรดนะ!\nฉะ... ฉันก็พยายามอยู่นี่ไง"
10020-120 = "ฉันจะพยายามเต็มที่ใน\nชั้นเรียนเสริมและจะได้จบการศึกษา"
10020-130 = "ระ...เรื่องอย่างว่าเหรอ...?"
10020-140 = "ระ..เรื่องแบบนั้นยิ่งไม่ได้เลย!\nถ้าเจอฉันจะยึดแล้วเอาไปเผาให้หมดเลย!"
10020-150 = "นักเรียนห้ามมี\nความสัมพันธ์กันแบบนี้!\nมันเป็นเรื่องที่เสื่อมเสีย!"
10020-160 = "เรื่องแบบนี้ต้องไม่เกิดขึ้นในคิโวทอส!"
10020-170 = "วันเกิดคุณครูนี่นา\nงั้นวันนี้ไม่ต้องทำอะไรเยอะก็ได้..."
10020-180 = "อย่างที่คิดเลย\nยะ...ยกเลิกอันนี้ไปเลย\nทำแบบจริงใจและให้ถูกต้องหน่อยสิ!"
10020-190 = "รู้ด้วยเหรอว่าวันนี้วันเกิดฉัน?"
10020-200 = "ขะ... ขอบคุณนะ\nไม่คิดเลยว่าครูจะจำได้…"
10020-210 = "กะ... ก็แอบดีใจอยู่เหมือนกันนะ..."
10020-220 = "วันปีใหม่ทั้งที\nมาอยู่กับฉันแบบนี้ได้เหรอ?"
10020-230 = "ฉันน่ะ... เอ่อ...\nจริงๆ ก็ไม่ได้ติดอะไร"
10020-240 = "ห้ามทำอะไรสกปรก\nในวันที่ศักดิ์สิทธิ์แบบนี้นะ!\nฟังอยู่หรือเปล่า? คุณครู?"
10020-250 = "ลูกกวาดเหรอ? ฉันเรียนจบ\nชั้นประถมมานานแล้วนะ?\nฉันน่ะ... ต้อง... คุยเรื่องของผู้ใหญ่..."
10020-260 = "มะ... ไม่มีอะไรหรอก"
10020-280 = "อะไรน่ะ...?!"
10020-290 = "(ดะ.. เดี๋ยวนะ...\nแบบนี้มัน... หรือว่า...)"
10020-300 = "นี่ ฉัน... ฉันไม่ได้\nพูดอะไรผิดไม่ใช่เหรอ?"
10020-310 = "(ดะ... เดี๋ยวนะ... ถ้าเป็นแบบนี้\nฉันกับคุณครูคง...)"
10020-320 = "(ชะ...ใช่แบบที่ฉันคิดรึเปล่านะ...\nฉันเห็นในหนังสือมาหลายครั้งแล้ว…\nจะเป็นไปตามสเต็ปนั้นจริงๆ เหรอ?!)"
10020-330 = "(หรือว่าจะเป็นแบบนี้...\nหรืออาจจะแบบนั้น...)"
10020-340 = "(ยะ... อย่าบอกนะว่า?!\nจะไปถึงขั้นนั้นเลย...!?)"
10020-350 = "ในที่สุดคุณครูก็เผย...\nตัวตนแท้จริงออกมาแล้วสินะ..."
10020-360 = "(เกิดเรื่องใหญ่แล้ว เป็นเรื่องแล้ว!\nฉัน... ฉันยังไม่ได้เตรียมใจเลย...?!)"
10020-2600 = "ฉันมาไกลขนาดนี้แล้ว...\nเห็นหรือเปล่าคุณครู? นี่มันเพิ่งเริ่มต้นเท่านั้น\nต่อไปก็คอยดูฉันให้ดีล่ะ"

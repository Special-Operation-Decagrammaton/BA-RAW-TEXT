[translation]
10034-10 = "Blue Archive~"
10034-20 = "呵呵。你好，老師。\n我是修行部的三森。\n今後，請多多指教直到永遠哦。"
10034-30 = "大家看起來很開心\n真是太好了。"
10034-40 = "為了老師準備的紅茶，\n如果可以在冷掉之前\n飲用就好了……"
10034-50 = "作為修行的一環，\n要試著邀請老師\n吃飯嗎……？"
10034-60 = "楓醬，\n沒有在哪裡給老師\n添麻煩就好了……"
10034-70 = "唔嗯，有點髒亂呢。\n趁老師回來之前，\n先打掃好吧？"
10034-80 = "歡迎回來，老師。"
10034-90 = "呵呵，今天我也會\n幫老師各種忙哦。"
10034-100 = "啊，歡迎回來，老師。"
10034-110 = "來，請坐到位置上。\n再不開始工作的話\n會趕不上唷？"
10034-120 = "早上的洗臉結束了嗎？\n有沒有不吃早飯呢？"
10034-130 = "呵呵，是的，真是太好了。\n那麼，請喝美味的紅茶？"
10034-140 = "如果有需要的東西，\n請儘管吩咐。"
10034-150 = "無論是什麼事情\n都請提出。"
10034-160 = "因為老師總是很忙，"
10034-170 = "所以像這樣\n兩人獨處的時間\n很貴重呢……"
10034-180 = "咦，啊，\n我，不小心說出口……"
10034-190 = "我從小的夢想，\n那就是成為如漫畫\n和小說般裡出現的，"
10034-200 = "出色的新娘。"
10034-210 = "為了實現夢想\n今天也在修行部，\n還有這裡，\n努力學習累積經驗。"
10034-220 = "祝您生日快樂，老師。"
10034-230 = "那個……只有今天的話，\n盡情撒嬌也可以唷……？"
10034-240 = "我的，生日……是嗎？"
10034-250 = "唔呵呵，謝謝您。老師。"
10034-260 = "……今天已經是，\n最棒的一天了。"
10034-270 = "呵呵，祝您新年快樂，老師。"
10034-280 = "為了讓身體暖起來，\n來杯甜酒如何呢？"
10034-290 = "哼哼哼～哼哼哼～\n哼哼哼，哼哼～♪"
10034-300 = "是聖誕節呢，老師。"
10034-310 = "今晚一起……\n出門之類的，\n如何呢……？"
10034-320 = "Trick．or．Treat\n今天是萬聖節呢。"
10034-330 = "老，老師的話，\n對我惡作劇，\n也可以唷……？"
10034-350 = "呵呵，老師。\n再近一點看也\n沒關係唷。"
10034-360 = "我的新娘修行……\n還有，想成為大和撫子的\n我的夢想。"
10034-370 = "老師總是像這樣，\n在身旁應援，幫助著我。"
10034-380 = "謝謝您。\n……那個，我，和老師，\n今後也一直……"
10034-390 = "沒，沒什麼……！"
10034-400 = "好，好了！刺繡完成了！"
10034-410 = "我以我的方式試著努力了，\n那個，您覺得如何呢……？"
10034-2600 = "特地把這個，為了我……？\n……謝謝你，老師。\n我今後會比以往努力，一生，\n都幫上老師的忙。"

[translation]
10034-10 = "Blue Archive!"
10034-20 = "Heehee. Hello, Sensei. I'm Mimori from the Inner Discipline Club. I look forward to working with you."
10034-30 = "I'm glad that everyone seems to be smiling."
10034-40 = "I hope I can give Sensei this black tea I prepared before it gets cold..."
10034-50 = "Maybe making a meal for Sensei could be part of our training..."
10034-60 = "Kaede, you aren't bothering Sensei, are you?"
10034-70 = "It's a bit messy. Should we clean before Sensei returns?"
10034-80 = "You're back, Sensei."
10034-90 = "Heehee. I will be by your side to help you."
10034-100 = "W-Welcome, Sensei!"
10034-110 = "Please, come take your seat. If we don't get started on our tasks soon, we won't be able to finish in time, you know?"
10034-120 = "Did you wash your face this morning? You didn't skip breakfast, did you?"
10034-130 = "Heehee. Yes. Good Job. Then how about a nice cup of black tea?"
10034-140 = "If there is anything you need, whatever it may be..."
10034-150 = "Yes, you can ask me anything."
10034-160 = "You're always so busy, Sensei."
10034-170 = "The time I spend alone with you like this is precious."
10034-180 = "O-Oh. I-I just let that slip out, didn't I?"
10034-190 = "I've dreamed of becoming a proper bride ever since I was young."
10034-200 = "Like the ones I read about in mangas and novels."
10034-210 = "I'm training with the Inner Discipline Club and Schale to become a proper lady and make that dream come true."
10034-220 = "Happy birthday, Sensei."
10034-230 = "I suppose today's a free pass to act however you want, isn't it?"
10034-240 = "Oh. Are you wishing me a happy birthday?"
10034-250 = "Heehee. Yes, thank you, Sensei."
10034-260 = "Today is already wonderful."
10034-270 = "Heehee. Happy New Year, Sensei."
10034-280 = "How about some gamju to warm yourself up?"
10034-290 = "Hmm hmm hmmm. Hmmm hmmm. ♪"
10034-300 = "It's Christmas, Sensei."
10034-310 = "Would you like to go on a walk with me tonight?"
10034-320 = "Trick or treat...? Ah! Today is Halloween."
10034-330 = "I-If it's you, it's okay for you to play pranks on me, Sensei!"
10034-350 = "Heehee. Sensei. You can sit a little closer, you know."
10034-360 = "Whether it's my bridal training...or my dream to become a proper young lady."
10034-370 = "You're always there to support and encourage me."
10034-380 = "Thank you so much. That's why...I hope you and I will always be..."
10034-390 = "N-Never mind! It's nothing!"
10034-400 = "A-Anyway! All done now."
10034-410 = "I did the best I could. Do you...like it?"
10034-2600 = "Did you prepare this for me? Thank you, Sensei. I want to support you for the rest of my life."

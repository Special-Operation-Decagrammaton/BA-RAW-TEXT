[translation]
10034-10 = "블루 아카이브~"
10034-20 = "후훗, 평안하신지요. 선생님.\n수행부의 미모리입니다.\n앞으로, 오래오래 잘 부탁드려요."
10034-30 = "모두 웃고 있는 것 같아\n다행이에요."
10034-40 = "선생님을 위해 준비한 홍차,\n식기 전에 드릴 수\n있었으면……"
10034-50 = "수행의 일환으로……\n모처럼이니 선생님께\n식사 대접을\n권유해볼까요……?"
10034-60 = "카에데 쨩, 어딘가에서 선생님께 폐를 끼치거나 하지 않았으면 좋겠는데요……"
10034-70 = "으응, 주변이 조금\n어질러져 있네요.\n선생님이 돌아오시기 전에,\n청소를 해둘까요?"
10034-80 = "다녀오셨어요. 선생님."
10034-90 = "후훗, 오늘도 곁에서\n도와드릴게요."
10034-100 = "앗, 어서 오세요. 선생님."
10034-110 = "자아, 자리에 앉아 주세요.\n슬슬 업무를 시작하시지 않으면\n기한을 맞추지 못할 거라구요?"
10034-120 = "아침 세안은 끝내셨나요?\n식사를 거르시거나 하지는\n않으셨나요?"
10034-130 = "후훗, 네. 잘 하셨어요.\n그러면, 맛있는 홍차는\n어떠신가요?"
10034-140 = "필요한 일이 있으시다면\n무엇이든,"
10034-150 = "무슨 일이든\n말씀해 주세요."
10034-160 = "선생님은 늘 바쁘시니까."
10034-170 = "이렇게 단둘이 있는 시간은\n특히 소중하답니다."
10034-180 = "네? 참, 제, 제가 무슨 말을……"
10034-190 = "제 어릴 적부터의 꿈, 그것은\n만화나 소설에 나오는 것처럼,"
10034-200 = "멋진 새신부가 되는 것이었어요."
10034-210 = "꿈을 이루기 위해, 오늘도\n수행부에서, 그리고 이곳에서\n수행을 쌓고 있답니다."
10034-220 = "생일, 축하드려요. 선생님."
10034-230 = "그…, 오늘만큼은 잔뜩\n어리광을 부리셔도 된다구요...?"
10034-240 = "제..., 생일 축하, 말인가요?"
10034-250 = "우후훗, 네에.\n감사드려요. 선생님."
10034-260 = "……오늘은 제 최고의 하루네요."
10034-270 = "후훗, 새해 복 많이 받으세요.\n선생님."
10034-280 = "몸이 따듯해지도록,\n감주 한 잔 어떠신가요?"
10034-290 = "흥흥흥~ 흥흥흥~\n흥흥흥흥흥~♪"
10034-300 = "성탄절이네요. 선생님."
10034-310 = "오늘 밤은...,\n같이 산책이라도 하실래요...?"
10034-320 = "트릭 오어 트릿.\n오늘은 할로윈이네요."
10034-330 = "서, 선생님이라면, 제게\n장난을 치셔도, 좋은데요……?"
10034-350 = "후후, 선생님.\n좀 더 가까이 붙어주셔도\n괜찮아요."
10034-360 = "제가 하는 신부수행……\n그리고 요조숙녀가 되고 싶다는\n저의 꿈까지."
10034-370 = "선생님께선 항상 이렇게\n곁에서 응원해주시고 도와주셨죠."
10034-380 = "감사합니다.\n그래서…… 저, 선생님과\n앞으로도 계속해서……"
10034-390 = "아, 아무것도 아니에요!"
10034-400 = "네, 네에!\n자수, 완성했습니다!"
10034-410 = "저 나름대로 노력해 보았는데요,\n그, 어떠신가요……?"
10034-2600 = "일부러 이것을, 저를 위해……?\n…감사해요. 선생님.\n앞으로는 지금 이상으로 노력해,\n일평생 선생님을 보필하겠습니다."

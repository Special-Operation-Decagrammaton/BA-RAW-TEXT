[translation]
10034-10 = "Blue Archive~"
10034-20 = "ฮุฮุ สบายดีรึเปล่าคะ คุณครู\nมิโมริจากชมรมฝึกฝนค่ะ\nจากนี้ขอฝากตัวด้วยนะคะ"
10034-30 = "ฉันโล่งใจที่เห็นทุกคน\nหัวเราะแบบนี้ค่ะ"
10034-40 = "ชาแดงที่เตรียมไว้ให้คุณครู\nถ้านำไปให้คุณครูได้\nก่อนที่มันจะเย็นละก็..."
10034-50 = "การทำอาหารไปให้คุณครู\nคือส่วนหนึ่งของการฝึกฝน..."
10034-60 = "ถ้าคาเอเดะจังไม่ได้ก่อเรื่อง\nให้คุณครูลำบากใจก็คงดีนะคะ..."
10034-70 = "อืม... บริเวณรอบๆ เละเทะนิดหน่อย\nงั้นมาทำความสะอาดกัน\nก่อนที่คุณครูจะกลับมาดีไหม?"
10034-80 = "กลับมาแล้วเหรอคะ คุณครู"
10034-90 = "ฮุฮุ วันนี้ฉันจะคอย\nช่วยคุณครูอยู่ข้างๆ เองค่ะ"
10034-100 = "อ๊ะ เชิญเลยค่ะ คุณครู"
10034-110 = "เอาละ เชิญนั่งได้เลยค่ะ\nถ้าไม่รีบเริ่มทำงาน\nจะเสร็จไม่ทันเวลานะคะ"
10034-120 = "ตอนเช้าล้างหน้ารึยังคะ?\nและคงไม่ได้ลืมทานข้าวใช่มั้ยคะ?"
10034-130 = "ฮุฮุ เก่งมากเลยค่ะ\nถ้างั้นคุณครูจะดื่มชาแดง\nสักแก้วไหมคะ?"
10034-140 = "ถ้าคุณครูมีเรื่องจำเป็น\nไม่ว่าเรื่องไหน หรืออะไร\nก็บอกฉันได้ตลอดเลยค่ะ"
10034-150 = "ไม่ว่าเรื่องอะไร\nก็บอกฉันได้เลยนะคะ"
10034-160 = "เพราะคุณครูงานยุ่งตลอด"
10034-170 = "เวลาที่ได้อยู่ด้วยกันสองคนแบบนี้\nเป็นช่วงเวลาสำคัญกับฉันมากค่ะ"
10034-180 = "คะ? ตายจริง ฉันพูดอะไรก็ไม่รู้..."
10034-190 = "ตั้งแต่เด็กๆ แล้วที่ฉัน...\nฝันอยากเป็นเลดี้ที่เพียบพร้อม\nเหมือนในหนังสือนิยาย..."
10034-200 = "เหมือนกับเด็กสาวในนิยายหรือในการ์ตูนค่ะ"
10034-210 = "เพื่อทำให้ฝันเป็นจริง ตอนนี้ฉัน\nจึงตั้งใจพยายามฝึกฝนอย่างเต็มที่ค่ะ"
10034-220 = "สุขสันต์วันเกิดค่ะ คุณครู"
10034-230 = "คิดว่าวันนี้คงเป็นวันสบายๆ\nที่ทำตัวเหมือนเด็กได้เลย\nใช่ไหมละคะ?"
10034-240 = "นี่... อวยพรวันเกิดให้ฉัน\nเหรอคะ?"
10034-250 = "ฮุฮุ ขอบคุณค่ะ คุณครู"
10034-260 = "วันนี้เป็นวันที่วิเศษที่สุดของฉันเลยค่ะ"
10034-270 = "ฮุฮุ สวัสดีปีใหม่ค่ะ คุณครู"
10034-280 = "ดื่มสาเกหวานสักแก้ว\nให้ร่างกายอบอุ่นหน่อยดีไหมคะ?"
10034-290 = "ลัล~ ลัลลัลล้า~ ลา♪"
10034-300 = "วันคริสต์มาสค่ะ คุณครู"
10034-310 = "คืนนี้... ออกไปเดินเล่น\nด้วยกันไหมคะ?"
10034-320 = "ทริค ออร์ ทรีต...\nวันนี้เป็นวันฮาโลวีนค่ะ"
10034-330 = "ถะ... ถ้าเป็นคุณครูละก็\nจะหลอกฉันเล่นก็ได้นะคะ…!"
10034-350 = "ฮุฮุ คุณครูคะ\nเข้ามาใกล้ๆ อีกก็ได้นะคะ"
10034-360 = "ทั้งการฝึกซ้อมเป็นเจ้าสาว...\nและความฝันในการเป็น\nกุลสตรีที่เพียบพร้อมของฉัน"
10034-370 = "คุณครูคอยช่วยเหลือและ\nให้กำลังใจอยู่ข้างๆ ฉันมาตลอด"
10034-380 = "ขอบคุณนะคะ\nเพราะงั้นฉันก็อยากขอ\n...กับคุณครูไปเรื่อยๆ..."
10034-390 = "มะ...ไม่มีอะไรค่ะ!"
10034-400 = "คะ...ค่ะ!\nฉันปักเสร็จแล้วค่ะ"
10034-410 = "ฉันพยายามสุดๆ เลยนะคะ\nเป็นยังไงบ้างคะ...?"
10034-2600 = "คุณครูเตรียมไว้ให้ฉันเหรอคะ?\nขอบคุณค่ะ คุณครู\nต่อไปฉันจะตั้งใจทำงาน\nเพื่อตอนแทนคุณครูค่ะ"

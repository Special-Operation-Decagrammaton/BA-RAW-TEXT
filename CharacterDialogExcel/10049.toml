[translation]
10049-10 = "蔚藍檔案。"
10049-20 = "我是三一綜合學園，\n放學後的甜點部的杏山千紗。\n那個，請……多多，指教。"
10049-30 = "真可愛呢！\n還不錯。"
10049-40 = "這個，\n可以坐嗎……"
10049-50 = "感覺似乎看到\n什麼好吃的東西……"
10049-60 = "放鬆的時間。\n真不錯。"
10049-70 = "這是，\n老師的品味……？"
10049-80 = "啊啊。\n歡迎回來，老師。\n今天要做什麼呢？"
10049-90 = "我在等你哦，老師。\n如果有什麼需要幫忙的事\n就儘管告訴我吧。"
10049-100 = "如果有什麼事\n就儘管開口吧。"
10049-110 = "啊，但是我不太會\n讀太困難的句子……\n那種就跳過吧。"
10049-120 = "待在這裡，總覺得\n心情很平靜……\n好像有點想睡……"
10049-130 = "老師，\n現在要不要吃點東西啊？\n要去外面買點東西回來嗎？"
10049-140 = "……嗯？啊啊，別在意。\n只是在看老師工作的樣子而已。"
10049-150 = "咦，國中時期的事……？\n……我覺得你還是\n不要知道比較好。"
10049-160 = "生日快樂，老師。\n雖然沒有什麼禮物……"
10049-170 = "嗯，要不要一起散步呢？"
10049-180 = "這樣啊，是我的生日呢。\n……嗯。謝謝你，老師。\n我很開心。"
10049-190 = "新年快樂，老師。\n今年也請多多指教。"
10049-200 = "即使到了新年，\n感覺也沒有什麼\n很大的變化"
10049-210 = "……但我認為\n那樣也不錯。"
10049-220 = "是……聖誕節呢。"
10049-230 = "等等有要做什麼嗎？\n老實說，我是有\n準備了什麼……"
10049-240 = "萬聖節……真熱鬧啊。\n不過我不太喜歡\n吵吵鬧鬧的就是了……"
10049-260 = "難，難道，從一開始\n就注意到了嗎……？"
10049-270 = "這樣啊……\n也是，怎麼可能\n會沒發現呢……"
10049-280 = "不，我其實，\n也沒有刻意要\n躲著你的意思……"
10049-290 = "只是因為……\n那個……我現在……\n是素顏……"
10049-300 = "靠得太近會有點……！"
10049-310 = "話說老師，我都\n已經跟你這麼說了，\n你不要還一直靠近啊。"
10049-320 = "……是，是嗎？\n……是那樣嗎？"
10049-330 = "嘛……那就好……"
10049-340 = "……你那是什麼反應。"
10049-350 = "怎，怎樣！？\n為什麼要笑成那樣啊！？"
10049-360 = "喂──！！！"
10049-2600 = "……啊，抱歉。\n不，只是在想為什麼就連這種東西\n都願意給我……這就表示，\n將來還有很多能夠幫助老師的機會對吧？\n要是幫上忙就好了。"

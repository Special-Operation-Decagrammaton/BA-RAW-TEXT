[translation]
10049-10 = "Blue Archive"
10049-20 = "นักเรียนชั้นปีที่ 1 โรงเรียนสามัญทรีนิตี้\nเคียวยามะ คาซึสะ จากชมรมของหวานหลังเลิกเรียน\nอืม ขอ... ขอฝากตัวด้วยนะ"
10049-30 = "น่ารักจัง! ไม่แย่เลยนะเนี่ย"
10049-40 = "เรานั่งตรงนี้...\nได้รึเปล่านะ...?"
10049-50 = "เหมือนจะเห็นขนม...\nที่ดูน่าอร่อยนะ"
10049-60 = "เวลาว่างแบบนี้ ก็ไม่แย่เท่าไรนะ"
10049-70 = "สไตล์การตกแต่งนี่...\nเป็นฝีมือคุณครูเหรอ...?"
10049-80 = "ชะ...เชิญเลยค่ะคุณครู\nวันนี้จะทำอะไรกันดีล่ะ?"
10049-90 = "กำลังรออยู่เลย\nเอาละ ถ้ามีอะไรให้ช่วย\nก็บอกมาได้เลยนะ คุณครู"
10049-100 = "ถ้ามีเรื่องอะไรละก็\nบอกฉันได้ตลอดเลยนะ"
10049-110 = "อ๊ะ แต่ว่าถ้าส่งข้อความมาเป็น\nประโยคยากๆ มันต้องใช้เวลาอ่าน...\nถ้าแบบนั้นฉันขอผ่านนะ"
10049-120 = "เวลาอยู่ที่นี่แล้วสบายใจจัง...\nแถมรู้สึกง่วงนิดหน่อยด้วย"
10049-130 = "คุณครู...\nเรากินอะไรกันหน่อยมั้ย?\nหรือไปซื้ออะไรมากินกันดีล่ะ?"
10049-140 = "หืม? อ๊ะ\nไม่ต้องสนใจฉันหรอก คุณครู\nฉันก็แค่ดูคุณครูทำงานเฉยๆ เอง"
10049-150 = "เรื่องตอนสมัยม.ต้น...?\nฉันคิดว่าคุณครูไม่รู้จะดีกว่านะ"
10049-160 = "สุขสันต์วันเกิดนะ คุณครู\nถึงฉันจะไม่มีของขวัญให้ก็เถอะ..."
10049-170 = "อืม... แต่ว่าเราไปเดินเล่นกันดีมั้ย?"
10049-180 = "จริงด้วยสินะ วันนี้\nเป็นวันเกิดของฉันนี่นา\nขอบคุณนะ คุณครู ดีใจจัง"
10049-190 = "ขอให้มีความสุขวันปีใหม่นะ คุณครู\nปีนี้ก็ขอฝากตัวด้วย"
10049-200 = "ถึงจะเป็นปีใหม่\nแต่ก็ไม่ได้รู้สึกว่ามีอะไร\nเปลี่ยนแปลงไปเท่าไรเลย\n"
10049-210 = "ฉันคิดว่าเป็นแบบนั้น\nมันก็ไม่ได้แย่เท่าไรหรอก"
10049-220 = "คริสต์มาส.... สินะ"
10049-230 = "เดี๋ยวคุณครูติดงานอะไรรึเปล่า?\nคือว่าที่จริงฉันเตรียมของบางอย่าง\nเอาไว้ให้น่ะ..."
10049-240 = "ฮาโลวีน... เป็นวันที่น่าหนวกหูจริงๆ\nฉันไม่ค่อยชอบเสียงดัง\nสักเท่าไรน่ะ..."
10049-260 = "อะ... อะไรเล่า\nรู้อยู่แล้วตั้งแต่แรกเลยงั้นเหรอ?"
10049-270 = "นั่นสินะ... คงไม่มีทาง\nที่จะไม่รู้หรอก..."
10049-280 = "เดี๋ยวสิ ฉันไม่ได้\nหลบหน้าอะไรสักหน่อย..."
10049-290 = "ก็แค่... มัน...\nคือว่า... ตอนนี้ฉัน...\nหน้าสด... อยู่น่ะ..."
10049-300 = "อย่าเข้ามาใกล้นักสิ...!"
10049-310 = "เพราะงั้นคุณครู...\nก็บอกแล้วไง ว่าอย่าเข้ามาใกล้น่ะ!"
10049-320 = "งะ...งั้นเหรอ?\nอย่างนั้นเหรอ...?"
10049-330 = "ถ้าอย่างนั้น...\nก็ค่อยยังชั่วหน่อย"
10049-340 = "ท่าทางแบบนั้นมันอะไรน่ะ..."
10049-350 = "อะ... อะไรเนี่ย?!\nมันน่าขำตรงไหนกัน!?"
10049-360 = "เดี๋ยวเถอะ!!!"
10049-2600 = "อ๊ะ... โทษที\nแต่คิดว่าทำไมถึงต้องเตรียมให้ขนาดนี้...\nต่อไปฉันคงได้มีโอกาสช่วยคุณครูใช่มั้ย?\nถ้าฉันช่วยคุณครูได้ก็คงดีนะ"

[translation]
10049-10 = "블루 아카이브."
10049-20 = "트리니티 종합학원,\n방과후 디저트부의 쿄야마 카즈사.\n음, 잘…… 부탁, 드립니다."
10049-30 = "귀엽네!\n나쁘지 않아."
10049-40 = "여기, 앉아도\n괜찮을까……"
10049-50 = "뭔가 맛있을 것\n같아 보이는 게……"
10049-60 = "한가한 시간,\n나쁠 거 없지."
10049-70 = "이거,\n선생님의 센스……?"
10049-80 = "아, 어서 오세요. 선생님.\n오늘은 뭘 할 거야?"
10049-90 = "기다리고 있었어.\n자, 도울 게 있으면\n어서 말해줘. 선생님."
10049-100 = "무슨 일 있으면\n언제든지 말해."
10049-110 = "아, 하지만, 어려운 문장을\n읽는 것은 서툴러서……\n그런 건 패스."
10049-120 = "여기 있으면, 뭔가\n안정되네…… 조금\n졸린 것 같기도."
10049-130 = "선생님,\n이제 뭐 좀 먹지 그래?\n밖에서 뭐 사올까?"
10049-140 = "응? 아아,\n신경 쓰지 마, 선생님\n일하는 걸 보고 있었지."
10049-150 = "중학교 시절 얘기…?\n…모르는 게 나을 거 같은데."
10049-160 = "생일 축하해, 선생님.\n선물 같은 건 딱히 없지만……"
10049-170 = "음, 같이 산책하는 건 어때?"
10049-180 = "그렇구나, 내 생일\n이었구나. ……응.\n고마워, 선생님. 기뻐."
10049-190 = "새해 복 많이 받아, 선생님.\n올해도 잘 부탁해."
10049-200 = "새해가 되어도,\n뭔가 크게 바뀐 느낌은\n들지 않지만"
10049-210 = "……그것도 나쁘지는\n않다고 생각해."
10049-220 = "크리스마스……구나."
10049-230 = "이따가 뭐 할 일 있어?\n실은 그게, 일단 준비한게\n있어서……"
10049-240 = "할로윈…… 시끌벅적하네.\n시끄러운 건 그다지 좋아하지\n않는데 말이지……"
10049-260 = "호, 혹시\n처음부터 알고 있었던 거야……?"
10049-270 = "그런가……\n뭐, 눈치 못 챌 리가\n없긴 하겠지……"
10049-280 = "아니, 별로\n피하거나 하는 건\n아닌데 말야……"
10049-290 = "그냥 조금, 그……\n지금……\n쌩얼, 이니까……"
10049-300 = "너무 가까운 건 좀……!"
10049-310 = "그러니까 선생님,\n말하는데 다가오지 말라고!"
10049-320 = "……그, 그래?\n……그런가?"
10049-330 = "뭐…… 그렇다면\n다행이다만……"
10049-340 = "……뭐야. 그 반응……"
10049-350 = "뭐, 뭐야?!\n뭐가 그리 웃긴데!?"
10049-360 = "야-!!!"
10049-2600 = "……아, 미안.\n아니, 왜 이런 것까지 주는 걸까 해서……\n선생님을 도울 수 있는 기회가 앞으로도\n있다는 거겠지? 도움이 된다면 좋겠네."

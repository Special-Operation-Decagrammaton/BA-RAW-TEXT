[translation]
10049-10 = "Blue Archive."
10049-20 = "Trinity General School, After-School Sweets Club's Kyoyama Kazusa. Um, thanks for having me."
10049-30 = "It's a cute place... Not bad."
10049-40 = "Can we...sit here?"
10049-50 = "It looks kind of delicious..."
10049-60 = "It's relaxing. I like it."
10049-70 = "You designed this, Sensei?"
10049-80 = "There you are, Sensei. What's on the schedule?"
10049-90 = "I've been waiting. Okay, let me know if there's anything I can help with, Sensei."
10049-100 = "Let me know anytime you have something going on."
10049-110 = "Oh, but I'm not good at reading complex sentences...so I'll pass on that."
10049-120 = "It's comfortable here... It makes me kinda sleepy."
10049-130 = "Sensei. Let's eat something, okay? Should we go out and get something?"
10049-140 = "...Huh? Don't mind me. I'm watching you work."
10049-150 = "A story from my middle school days? ...I'd rather not."
10049-160 = "Happy birthday, Sensei. I didn't get anything, but..."
10049-170 = "Um, how about we take a walk together?"
10049-180 = "Oh yeah, my birthday... Thanks, Sensei. I'm glad you remembered."
10049-190 = "Happy New Year, Sensei. I'll be counting on you this year, too."
10049-200 = "I don't feel like things will change much, even when the new year comes."
10049-210 = "...But I don't think that's a bad thing."
10049-220 = "So, it's Christmas..."
10049-230 = "Do you have plans later? Actually, I prepared something..."
10049-240 = "Ugh... Halloween... I hate how loud it gets."
10049-260 = "Umm. Did you recognize me right away?"
10049-270 = "I see... Y-Yeah, figures. Of course you would..."
10049-280 = "N-No, it wasn't like I was avoiding you..."
10049-290 = "I-I just...um... Well, um... I haven't done my makeup yet."
10049-300 = "Don't look too closely...!"
10049-310 = "I told you, Sensei. Don't come any closer!"
10049-320 = "R-Really? ...Is that so?"
10049-330 = "Well... I hope that's the case..."
10049-340 = "What's with your reaction...?"
10049-350 = "H-Hey! Don't laugh! What's so funny?"
10049-360 = "Hey!!!"
10049-2600 = "Oh... I didn't know why you were giving this to me... But I guess I'll be able to help you more from here on out."

[translation]
20002-20 = "나님, 등장!\n이번 실험의 피험체는 어디에 있으려나?"
20002-30 = "후후, 이 방.\n나님의 실험실로\n써도 좋겠는데?"
20002-40 = "다음번에는\n메이를 상대로\n무얼 실험해볼까?"
20002-50 = "이 정도의 습도와 온도라면\n내 귀여운 세균들이 자라기에\n아주 좋겠어.\n후-후-후…."
20002-60 = "앗, 어디서\n치즈 냄새가 나는 것이다!"
20002-70 = "네즈스케,\n이 녀석!\n날뛰지 마!"
20002-80 = "어서 와, 선생!\n안 그래도 신약을 실험해보기\n위해 부르려던 참이었어."
20002-90 = "뭐야, 또 나님이\n보고 싶어서 온 것이냐?\n어쩔 수 없네~"
20002-100 = "나님은! 위대한 것이다!"
20002-110 = "네즈스케는\n햄스터일까, 기니피그일까?\n정답은… 다음 시간인 것이다!"
20002-120 = "세계적으로- 역사적으로-\n가장 사랑받는 캐릭터는\n언제나 쥐였던 것이다!"
20002-130 = "독과 약은 쓰임에 따라\n달라지는 양날의 검이지!"
20002-140 = "귀여운 기니피그네.\n나님의 실험에 함께 하지 않을래?"
20002-150 = "생일 축하해, 선생."
20002-160 = "응? 어떻게 생일을 기억하고\n있냐고? …그야 연구자로서\n당연한 소양인 것이다!"
20002-170 = "나님의 생일을 축하한다고?\n보기보다 기억력이 좋네, 선생!"
20002-180 = "일요일에도 출근을 하기에\n날짜를 못 세는 줄 알았는데…"
20002-190 = "올해도 잘 부탁하는 것이다, 선생.\n올해야말로 기필코 불로장생의\n약을 만들어내고 말겠어!"
20002-200 = "거대한 선물 자루를 멘 노인이\n키보토스 전역을 돌아다닌다는\n시즌이 돌아온 것이다."
20002-210 = "그 노인은 도대체 무슨 약을\n먹었기에 그 나이에도 그리\n정정한 걸까?"
20002-220 = "할로윈에 시내를 걸어 다니는\n그 시체들은 도대체 무슨 약을\n주사 맞은 것이냐?"
20002-230 = "나님이 모르는 약이 있다니,\n분해…!"
20002-250 = "나님답지 않게\n이런 실수를 하다니…"
20002-260 = "크, 큰일이야…\n선생에게서 눈을 뗄 수가 없어…"
20002-270 = "선생, 내 앞에서 떨어…\n아니 떨어지지 마!"
20002-280 = "이대로… 잠깐만 같이 있어줘…"
20002-290 = "우으… 곤란한 것이다.\n하지만 도저히 선생에게서\n눈을 뗄 수가 없어…"
20002-300 = "지금 내 눈에는 선생이…"
20002-310 = "너무나도 맛있는 치즈 덩어리로\n보이는 것이다!"
20002-320 = "안 되겠어, 선생…\n딱, 한 입만… 한 입만\n깨물게 해주면 안 될까?"
20002-2600 = "나님의 권총이 드디어 도착한 것이다!\n물론 이 무시무시한 세균 병기에\n비하면 애교 수준이지만."

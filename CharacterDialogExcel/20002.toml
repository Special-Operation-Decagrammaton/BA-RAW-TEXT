[translation]
20002-20 = "I'm here! So where's my next test subject?"
20002-30 = "Heh heh. I like this room... I think I'll make it my new lab!"
20002-40 = "What should I test on Mei next time?"
20002-50 = "The temperature and humidity are perfect for growing bacteria. Heh heh heh..."
20002-60 = "Wait. Something smells like delicious cheese!"
20002-70 = "Nezusuke, you maniac! Stop squirming!"
20002-80 = "Welcome back, Sensei! I was just about to call you to test my newest elixir."
20002-90 = "What? You came over because you wanted to hang out with me? Oh, well..."
20002-100 = "I! Am! The greatest!"
20002-110 = "Is Nezusuke is a hamster or a guinea pig? We'll find out...with our next experiment!"
20002-120 = "Everyone knows that mice make the most beloved characters in human storytelling!"
20002-130 = "Medicine and poison aren't all that different. Both are double-edged swords depending on their usage!"
20002-140 = "What an adorable guinea pig. Want to participate in my experiment?"
20002-150 = "Happy birthday, Sensei."
20002-160 = "Huh? How did I know it was your birthday? Well, us researchers just have impeccable memories!"
20002-170 = "You remembered my birthday? Your memory is better than I expected, Sensei!"
20002-180 = "I once saw you going to work on a Sunday, so I thought you had trouble remembering the days of the week."
20002-190 = "This year is going to be a great, Sensei. I swear that this is the year I will create the immortality elixir!"
20002-200 = "'Tis the season when an old man carrying a giant sack of gifts roams through all of Kivotos."
20002-210 = "What kind of supplements do you think he takes to stay fit at his age?"
20002-220 = "I wonder what kind of drugs were used to animate the corpses roaming the streets during Halloween."
20002-230 = "I can't believe I've never heard of it before. How infuriating...!"
20002-250 = "I can't believe I made such a stupid mistake... I never do this."
20002-260 = "What do I do now? I just can't take my eyes off you, Sensei..."
20002-270 = "Sensei, please don't leave... Please, stay by my side!"
20002-280 = "All I want...is for you to stay with me like this..."
20002-290 = "Agh... This is definitely not good. I still can't take my eyes off you, Sensei."
20002-300 = "You remind me of..."
20002-310 = " ...a delicious block of cheese right now!"
20002-320 = "I just can't help it... Sensei... Can I just take one bite...? It's fine, isn't it? Just a single bite?"
20002-2600 = "The Great I's Pistol is finally here! Of course, it's nothing compared to this terrifying bacteriological weapon."

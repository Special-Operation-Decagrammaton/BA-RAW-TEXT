[translation]
20002-20 = "我登場了！\n這次實驗的對象在哪裡啊？"
20002-30 = "哼哼，把這個房間，\n當成我的實驗室\n似乎也不錯呢！"
20002-40 = "下次要以梅為對象\n做什麼實驗好呢？"
20002-50 = "這種濕度和溫度，\n感覺非常適合\n培育我可愛的細菌們。\n哼哼哼哼……"
20002-60 = "啊，從某處\n飄來了起司的味道！"
20002-70 = "根津助！\n你這傢伙！不要亂跑！"
20002-80 = "歡迎回來，老師！\n我剛好想請你過來\n實驗新藥呢。"
20002-90 = "什麼？你又是為了想和我\n見面才過來的？真拿你沒辦法～"
20002-100 = "我！很偉大！"
20002-110 = "根津助是倉鼠？\n還是天竺鼠？\n答案…下回揭曉！"
20002-120 = "世界上，歷史上，\n最受歡迎的角色\n一直都是老鼠～！"
20002-130 = "毒與藥，是會根據用途\n改變定位的雙刃劍！"
20002-140 = "可愛的天竺鼠，\n要不要和我一起做實驗啊？"
20002-150 = "老師，生日快樂。"
20002-160 = "嗯？你問為什麼我會\n記得你的生日？\n這是身為研究人員的基本素養！"
20002-170 = "你要祝我生日快樂嗎？\n真看不出來，\n你記性挺好的嘛，老師！"
20002-180 = "因為你星期天也上班，\n我還以為你不會算日子呢。"
20002-190 = "今年也請多關照了，老師。\n我今年一定要做出\n長生不老的靈藥！"
20002-200 = "揹著巨大禮物袋的老人，\n在奇普托斯全區\n巡迴的季節到了。"
20002-210 = "那位老人到底吃了什麼藥\n才能這把年紀\n還那麼硬朗呢？"
20002-220 = "萬聖節的時候，\n那些在鎮上走動的屍體，\n到底注射了什麼藥呢？"
20002-230 = "居然有我不知道的藥，\n不甘心…！"
20002-250 = "真不像我，\n竟然會犯這種失誤…"
20002-260 = "怎麼會這樣，\n目光無法從老師身上移開…！"
20002-270 = "老師，從我眼前離…\n果然還是，不要離開！"
20002-280 = "就這樣…稍微\n陪我一下…"
20002-290 = "唔唔…真傷腦筋。\n但是，實在是沒辦法\n把目光從老師身上移開…"
20002-300 = "現在老師在我眼裡…"
20002-310 = "看起來就像是\n非常美味的起司塊！"
20002-320 = "不行了，老師…\n一點就好，一口…\n一口就好，可以讓我咬嗎？"
20002-2600 = "我的手槍終於送到了！\n當然，比起這些駭人的生化武器\n根本只會幫人搔搔癢而已。"

[translation]
20002-20 = "ได้เวลาของท่านซายะแล้ว! \nครั้งนี้จะได้โชว์ฝีมืออะไรนะ?"
20002-30 = "ฮุฮุ ห้องนี้มันช่างเหมาะ\nกับการใช้เป็นห้องทดลอง\nของท่านซายะเลย"
20002-40 = "คราวหน้าจะประดิษฐ์อะไร\nมาต่อสู้กับ\nพวกแมวดีนะ?"
20002-50 = "ความชื้นและอุณหภูมิประมาณ\nนี้แหละ ที่เหมาะสำหรับการเติบโต\nของแบคทีเรียที่น่ารักของฉัน\nฮุฮุฮุ..."
20002-60 = "เหมือนได้กลิ่นชีส\nมาจากที่ไหนเลย!"
20002-70 = "เนสึซึเกะ\nเจ้าเด็กคนนี้!\nดีดเกินไปแล้วนะ!"
20002-80 = "เข้ามาสิครู\nท่านซายะกำลังจะเรียกครู\nเพื่อทดลองยาตัวใหม่อยู่เลย"
20002-90 = "ว่าไงนะ? มาที่นี่เพราะ...\nคิดถึงท่านซายะอีกแล้วเหรอ?\nช่วยไม่ได้สิน้า~"
20002-100 = "เพราะท่านซายะ! คือผู้ยิ่งใหญ่!"
20002-110 = "เนสึซึเกะคือหนูแฮมสเตอร์\nหรือหนูตะเภากันแน่?\nคำตอบคือ.... ไว้จะมาบอกวันหลัง!"
20002-120 = "ตัวละครที่เป็นที่รัก\nที่แพร่หลายไปทั่วโลก\nก็คือหนูยังไงล่ะ!"
20002-130 = "ยาและพิษคือดาบสองคม\nขึ้นอยู่กับว่าเอาไปใช้ยังไง!"
20002-140 = "ไอต้าวหนูตะเภา\nไปเล่นในการทดลองของฉันไหม?"
20002-150 = "สุขสันต์วันเกิดนะครู"
20002-160 = "หืม? ทำไมถึงจำได้ว่าวันนี้เป็น\nวันเกิดน่ะเหรอ? ข้อมูลแบบนี้อยู่\nในหัวของนักวิจัยอยู่แล้ว!"
20002-170 = "มาอวยพรวันเกิดท่านซายะเหรอ?\nความจำดีกว่าที่คิดนะเนี่ย!"
20002-180 = "คิดว่าจะเป็นคนหลงๆ ลืมๆ\nที่มาโรงเรียนในวันอาทิตย์ซะอีก..."
20002-190 = "ปีนี้ก็ฝากตัวด้วยนะครู\nปีนี้ท่านซายะจะต้อง\nผลิตยาอายุวัฒนะให้จงได้!"
20002-200 = "เทศกาลของคุณปู่ที่แบก\nถุงของขวัญไปทั่วคิโวทอส\nกลับมาอีกแล้วสินะ"
20002-210 = "คุณปู่นั่นกินยาอะไรไป\nถึงได้ดูเหมือนอายุเท่าเดิม\nอยู่ทุกปีกันนะ?"
20002-220 = "พวกผีที่ออกมาเดินในเมือง\nในวันฮาโลวีนเค้าฉีดยา\nอะไรกันไปนะ แปลกจัง?"
20002-230 = "มียาที่ท่านซายะไม่รู้จักด้วยเหรอ?\nน่าโมโห...!"
20002-250 = "ไม่อยากเชื่อเลยว่าจะพลาดแบบนี้\nไม่สมกับเป็นท่านซายะเลย..."
20002-260 = "กะ.. เกิดเรื่องใหญ่แล้วล่ะฉันละสายตาจากครูไม่ได้เลย"
20002-270 = "ครู... ช่วยอยู่ห่างๆ...\nไม่สิ อย่าอยู่ห่างจากฉันนะ!"
20002-280 = "ช่วยอยู่กับฉัน...\nแบบนี้อีกหน่อยนะ..."
20002-290 = "อื้อ... แบบนี้ไม่ดีแน่ๆ\nแต่ว่า... ฉันละสายตา\nจากคุณครูไม่ได้เลย"
20002-300 = "ตอนนี้ในสายตาของฉัน..."
20002-310 = "ครูเหมือนกับชีสแสนอร่อย\nที่หอมเย้ายวนใจมากเลยล่ะ!"
20002-320 = "ไม่ไหวแล้ว... ครู\nขอฉันกัดสักคำนะ...\nไม่สิ... ขอชิมหน่อยได้ไหม?"
20002-2600 = "ในที่สุดปืนพกของท่านซายะก็มาถึงสักที!\nแน่นอนว่าถ้าเทียบกับอาวุธเคมีนี่แล้ว\nมันจะดูเป็นอาวุธเด็กๆ ไปสักหน่อยก็เถอะ"

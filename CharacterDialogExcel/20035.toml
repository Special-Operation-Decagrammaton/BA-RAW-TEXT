[translation]
20035-10 = "Blue Archive~ ฮ้าวว..."
20035-20 = "คราวนี้ฉันเป็นไกด์ละ...\nฉันจะตั้งใจทั้งเรื่องการฝึกฝนและการเป็นไกด์เลย\nฮ้าว..."
20035-30 = "ทุกคน... ทางนี้...\nเอ๋... ฉันอยู่คนเดียวเหรอ?"
20035-40 = "ฉันฝันว่าได้เป็นไกด์ให้ผู้คน...\nหรือจะไม่ใช่ฝันนะ...?"
20035-50 = "ว่ากันว่าคนเรา...\nใช้เวลา 1 ใน 3 ของชีวิต\nไปกับการนอนนะ..."
20035-60 = "การนอนหลับดีๆ\nเป็นเรื่องสำคัญ...\nมากกว่าที่คิดนะ..."
20035-70 = "ถ้าเป็นเรื่องเกี่ยวกับ\nเฮียกคิยาโคละก็...\nวางใจฉันได้เลย..."
20035-80 = "สวัสดีคุณครู... เข้ามาสิ..."
20035-90 = "ว่าแต่ตอนนี้กี่โมงแล้วเหรอ...?"
20035-100 = "ราตรีสวัสดิ์ค่ะ..."
20035-110 = "ฉันบอกลาก่อนนอนแล้ว\nคุณครูก็มานอนด้วยกันเถอะ นะ...?"
20035-120 = "งืม...\nเปล่านะ ฉันไม่ได้หลับ..."
20035-130 = "แค่ทดสอบดูน่ะว่าชาเล่ต์เป็นที่ที่\nเหมาะกับการนอนหรือเปล่า..."
20035-140 = "หมอน ผ้าห่ม\nที่ปิดตา ที่อุดหู...\nเตรียมเอาไว้หมดแล้ว"
20035-150 = "คุณครูแค่มานอนก็พอ..."
20035-160 = "ฮุฮุ วันไหนถ้าได้ไปไหนกัน\nแค่สองคนก็คงจะดีนะ"
20035-170 = "อย่างเช่นโลกแห่งความฝัน..."
20035-180 = "สิ่งสำคัญของการเป็นไกด์...\nคือความสามารถในการอธิบายน่ะ..."
20035-190 = "เพราะถ้าเป็นสิ่งที่ตัวเองรู้\nก็ต้องพูดอธิบายให้ดี..."
20035-200 = "เห็นฉันอย่างนี้\nฉันก็ไม่ได้คิดแต่เรื่องนอนนะ..."
20035-210 = "อืม... อย่างเช่น\nตอนที่เจอกับคุณครู..."
20035-220 = "วันเกิดเหรอคุณครู..."
20035-230 = "ฮุฮุ สุขสันต์วันเกิดนะ"
20035-240 = "ของขวัญก็คือ\nวันนี้ฉันจะอยู่ด้วย\nจนกว่าจะหลับเลย..."
20035-250 = "จริงสิ... วันนี้วันเกิดฉันนี่นา..."
20035-260 = "ของขวัญวันเกิดที่อยากได้...\nหน้าตักของคุณครู...\nคร่อก zzZ..."
20035-270 = "ปีใหม่แล้วแฮะ\nการเริ่มต้นของอีกปี...\nนี่คือเช้าแรกของปีเลย..."
20035-280 = "ฉันไม่ค่อยชอบตอนเช้า\nแต่ชอบปีใหม่นะ..."
20035-290 = "เมอร์รี~ คริสต์มาส~"
20035-300 = "เห็นว่านอกเฮียกคิยาโค\nจะทักทายกันแบบนี้เหรอ?"
20035-310 = "ฮาโลวีน..."
20035-320 = "เป็นวันที่ทำให้เห็นฉาก\nของถนนในความฝันเลย..."
20035-330 = "ฮุฮุ ในวันแบบนี้ฉันควร\nเป็นไกด์เรื่องอะไรดีนะ?"
20035-350 = "เฮ้อ... ปวดขานิดหน่อยนะเนี่ย"
20035-360 = "ฉันยังไม่ชินกับรองเท้าคู่นี้น่ะ อืม..."
20035-370 = "มีอะไรเหรอคุณครู?\nทำไมถึงจ้องกันขนาดนั้นล่ะ..."
20035-380 = "หืม? ฉันดูมีบางอย่าง...\nต่างไปจากปกติงั้นเหรอ...?"
20035-390 = "แปลกจัง..."
20035-400 = "ฮุฮุ แต่ว่าถ้าคุณครู\nเห็นว่าฉันเป็นอย่างนั้นละก็... \nมันก็อาจจะไม่แย่ก็ได้นะ?"
20035-410 = "นี่ คุณครู"
20035-420 = "หวังว่าคืนนี้เราสองคน...\nจะนอนหลับฝันดีนะ"
20035-2600 = "ขอบคุณนะคุณครู...\nศัตรูที่ขวางการนอนหลับ\nของคุณครู... ฉันจะ\nจัดการให้หมดเลย..."

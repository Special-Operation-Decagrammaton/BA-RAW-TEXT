[translation]
20035-10 = "Blue Archive! *yawn*..."
20035-20 = "I'm a tour guide this time... I promise I'll train hard and tour harder... *yawn*"
20035-30 = "This way everyone... Huh... No one's here..."
20035-40 = "I had a dream about being a tour guide...or was it a dream?"
20035-50 = "They say people spend a third of their lives sleeping..."
20035-60 = "Getting good sleep is so important... More than most people realize."
20035-70 = "If it's anything to do with Hyakkiyako... I'll handle it..."
20035-80 = "Hello, Sensei... Welcome..."
20035-90 = "By the way, what time is it...?"
20035-100 = "Good night..."
20035-110 = "All right. I said hello. Now, why don't we take a nap, Sensei?"
20035-120 = "Mmm... No, I wasn't sleeping..."
20035-130 = "I was only checking if Schale is a good place to rest..."
20035-140 = "Sleep pillow, blanket, sleep mask, and earplugs... I've got all my tools."
20035-150 = "Just need you now, Sensei..."
20035-160 = "Heehee. It would be nice if, someday, the two of us could go on a school trip together."
20035-170 = "Like to dreamland or something..."
20035-180 = "The key to being a tour guide...is being able to explain things effectively..."
20035-190 = "You have to convey your knowledge well..."
20035-200 = "I don't just think about sleeping, you know?"
20035-210 = "Mmm... Like when I'm with Sensei..."
20035-220 = "It's your birthday, Sensei..."
20035-230 = "Heehee. Congrats."
20035-240 = "As a present, I'll stay with you until I fall asleep..."
20035-250 = "Right... Today's my birthday..."
20035-260 = "As a birthday present... I think I'd like Sensei's lap... Zzz..."
20035-270 = "It's the start of a new year... In a sense, this must be the first morning of the year..."
20035-280 = "Mornings are rough, but I do like new years..."
20035-290 = "Merry Christmas."
20035-300 = "I heard that's how people outside of Hyakkiyako greet each other. Is it true?"
20035-310 = "Halloween..."
20035-320 = "A day when the streets become like a scene from a dream..."
20035-330 = "Heehee. Maybe I should add a few tricks to my tour today?"
20035-350 = "*sigh*... My legs are a little sore."
20035-360 = "These shoes aren't quite broken in yet."
20035-370 = "What's wrong, Sensei? You're really staring..."
20035-380 = "Huh? I seem...different from my usual self?"
20035-390 = "...That's odd."
20035-400 = "Heehee. But if you like the me that you see... Maybe that's not a bad thing..."
20035-410 = "Hey... Sensei."
20035-420 = "I hope we both have sweet dreams tonight."
20035-2600 = "Thank you, Sensei... If your enemies are keeping you up at night, I'll take them down for you..."

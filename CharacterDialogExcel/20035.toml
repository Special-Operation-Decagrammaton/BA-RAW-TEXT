[translation]
20035-10 = "블루 아카이브~ 후아암……"
20035-20 = "이번에는 가이드야……\n수행도 안내도, 열심히 할 테니까.\n후암……"
20035-30 = "모두…… 이쪽이야……\n어라…… 나 혼자인가?"
20035-40 = "사람들을\n안내하는 꿈……\n꿈이 아니었나……?"
20035-50 = "사람은……\n인생의 3분의 1을\n자면서 지낸대……"
20035-60 = "잘 자는 건\n중요한 일이야……\n생각보다도 더……"
20035-70 = "백귀야행에\n대한 거라면……\n맡겨 줘……"
20035-80 = "안녕, 선생님…… 어서 와……"
20035-90 = "그런데 지금 몇 시야……?"
20035-100 = "안녕히 주무세요……"
20035-110 = "인사도 했으니,\n선생님도 같이 자자. 응……?"
20035-120 = "음냐……\n아니야. 안 자고 있었어……"
20035-130 = "샬레가 잠들기 좋은 곳인지,\n시험해 봤을 뿐이야……"
20035-140 = "숙면 베개와 이불,\n안대랑 귀마개……\n모두 준비되어 있어."
20035-150 = "선생님만 오면 돼……"
20035-160 = "후훗. 언젠가 둘이서만,\n어딘가로 떠나는 것도 좋겠네."
20035-170 = "꿈나라라든가……"
20035-180 = "가이드에 중요한 건……\n설명하는 힘일 거야……"
20035-190 = "자기가 알고 있는 걸,\n잘 알려 줘야 하니까……"
20035-200 = "나라고 해서 언제나\n잘 생각만 하고 있는 건 아니거든……?"
20035-210 = "응…… 선생님과 만날 때라든가……"
20035-220 = "생일이구나, 선생님……"
20035-230 = "후훗. 축하해, 축하해."
20035-240 = "선물로 오늘은,\n내가 잠들 때까지\n같이 있어 줄게……"
20035-250 = "맞아…… 오늘이 내 생일이었지……"
20035-260 = "생일 선물로는 역시……\n선생님의 무릎이 좋겠어……\n코오……"
20035-270 = "새해가 됐네. 한 해의 시작……\n어떻게 보면 일 년의 제일\n첫 번째 아침……"
20035-280 = "아침은 약하지만 새해는 좋아…"
20035-290 = "메리~ 크리스마스~"
20035-300 = "백귀야행 바깥에서는,\n이렇게 인사한다며?"
20035-310 = "할로윈……"
20035-320 = "꿈속의 거리 같은\n풍경이 열리는 날이네……"
20035-330 = "후후. 이런 날은 무엇을,\n어떻게 가이드하면 좋을까?"
20035-350 = "후우……. 다리가 조금 아프네."
20035-360 = "이 신발은 아직 익숙하지 않아서. 응."
20035-370 = "왜 그래, 선생님?\n그렇게 날 바라보고……."
20035-380 = "어? 내가 뭔가……\n평소와 다른 느낌으로 보인다고……?"
20035-390 = "……이상하네."
20035-400 = "후훗.\n하지만 선생님이 그렇게\n날 봐준다고 한다면……. \n그것도 나쁘지 않을지도?"
20035-410 = "있잖아, 선생님."
20035-420 = "오늘은 우리 둘 다……\n좋은 꿈을 꾸면, 좋겠네."
20035-2600 = "고마워, 선생님……\n선생님의 수면을 가로막는 적은……\n내가 쓰러뜨려 줄게……"

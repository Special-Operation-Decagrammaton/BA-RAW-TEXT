[translation]
10027-10 = "Blue Archive."
10027-20 = "No matter my appearance, it doesn't change anything. All I have to do is complete my given task."
10027-30 = "What a well-organized place. I like it."
10027-40 = "I feel like I'm being watched..."
10027-50 = "Speaking of which, I wonder what Sensei will think of this outfit..."
10027-60 = "Hmm? Could that be...?"
10027-70 = "Nothing to do. Well, I guess it doesn't hurt to enjoy some free time once in a while."
10027-80 = "Welcome, Sensei. I thought I'd be seeing you soon."
10027-90 = "It's time for the mission, Sensei. Let's leave right away."
10027-100 = "My outfit? Is there something strange about it?"
10027-110 = "Who I am doesn't change just because of an outfit."
10027-120 = "I'm still me."
10027-130 = "Sensei? Do you have something to say?"
10027-140 = "Huh? You want to touch my ears?"
10027-150 = "The most important thing for a sniper is keeping calm."
10027-160 = "Sensei? What are you staring at...?"
10027-170 = "W-Wait, Sensei! Don't just stay silent. Say something..."
10027-180 = "When I wore the maid uniform, I worked with a sense of dutiful service, but..."
10027-190 = "...I don't know how to feel in this outfit."
10027-200 = "Happy birthday, Sensei."
10027-210 = "If there's anything you want, just let me know."
10027-220 = "Birthday? Oh, thank you... Wait, a gift?"
10027-230 = "No, you don't have to. You've already given me enough."
10027-240 = "H-Happy New Year! Was that okay?"
10027-250 = "Christmas..."
10027-260 = "I wouldn't exactly say I'm dressed for the occasion."
10027-270 = "It's not uncommon for people to wear something unusual today."
10027-280 = "So it should be okay to go outside dressed like this...right?"
10027-300 = "S-Sensei?! Wait! N-No, this is...!"
10027-310 = "Wait, I can't change my position right now!"
10027-320 = "I'm on a sniping mission!"
10027-330 = " And I can't look away from the target right now. That's why!"
10027-340 = "Huh? You don't mind?"
10027-350 = "You like it better this way?! Wait!"
10027-360 = "Y-You seem happy for some reason, but this is still...!"
10027-370 = "Still too much. I'm embarrassed!"
10027-380 = "What? Don't worry about it and focus on my job?"
10027-390 = "How am I not supposed to worry about it, dummy?!"
10027-2600 = "If I accept this, I can't make any mistakes in our next operation. I've got your back, Sensei."

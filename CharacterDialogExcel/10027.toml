[translation]
10027-10 = "Blue Archive，"
10027-20 = "無論是什麼服裝，該做的事都沒有改變。\n執行被賦予的任務……僅此而已。"
10027-30 = "很乾淨的地方，\n還不錯"
10027-40 = "……總覺得，\n感覺到很多視線"
10027-50 = "話說回來這件服裝……\n沒有問老師感想呢……"
10027-60 = "嗯……？\n在那裡的，\n難道是……？"
10027-70 = "……沒有能做的事。\n不過，偶爾有這種\n時間也不錯，嗎。"
10027-80 = "歡迎回來，老師。\n我正想說你剛好要來了。"
10027-90 = "老師，作戰時間到了。\n出發吧。"
10027-100 = "這副打扮……？\n有什麼，奇怪的嗎……？"
10027-110 = "即使服裝改變了，\n也不代表\n內在馬上就會改變。"
10027-120 = "我一如往常，嗯。"
10027-130 = "……老師，怎麼了？"
10027-140 = "……咦？耳朵，想摸嗎？"
10027-150 = "對狙撃手來說\n重要的是平常心。"
10027-160 = "……老師？\n是在盯著哪裡……"
10027-170 = "等，等等老師！？\n不要不開口，說點什麼……！"
10027-180 = "雖然穿著女僕服的時候，\n是以女僕的心情在行動……"
10027-190 = "不過這個打扮的話，\n該用什麼樣的心情才好呢……？"
10027-200 = "祝你生日快樂，老師。"
10027-210 = "如果是我可以進行的奉仕，\n希望你可以盡情說。"
10027-220 = "生日……？\n謝，謝謝……\n咦，禮物？"
10027-230 = "……不，沒關係的。\n已經，收到夠多了。"
10027-240 = "Ha，HappyNewYear……！\n……那個，這樣對嗎？"
10027-250 = "聖誕節嗎……"
10027-260 = "嘛確實，這個狀況\n也不能說不是禮物……"
10027-270 = "大家都要變裝的日子……"
10027-280 = "那麼，以這個打扮\n走在街上也沒問題嗎……？"
10027-300 = "老，老師！？\n不是的，這是那個……！"
10027-310 = "等等！\n現在沒辦法改變姿勢……！"
10027-320 = "那個，我正在執行狙擊任務中……！"
10027-330 = "無法把準心移開目標，\n所以……！"
10027-340 = "……咦，你沒關係……？"
10027-350 = "……倒不如說\n拜託我繼續保持這樣？\n等……！"
10027-360 = "總，總覺得你不知道在高興什麼，\n這畢竟是……！"
10027-370 = "果然還是不行，\n好害羞……！"
10027-380 = "耶，要我不用在意，繼續執行工作……？"
10027-390 = "我怎能不在意啊！\n笨蛋！"
10027-2600 = "收到這麼好的東西的話，\n從下次開始就更不能失誤了呢。\n……沒問題。\n老師的背後，就交給我。"

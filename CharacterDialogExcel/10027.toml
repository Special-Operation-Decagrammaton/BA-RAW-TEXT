[translation]
10027-10 = "Blue Archive"
10027-20 = "ไม่ว่าจะแต่งตัวแบบไหนก็เหมือนกันนั่นล่ะ\nสิ่งที่ฉันต้องทำก็คือทำภารกิจให้สำเร็จ"
10027-30 = "ที่นี่จัดการเรียบร้อยดีนะ\nถูกใจจัง"
10027-40 = "รู้สึกเหมือนว่า...\nมีคนจ้องอยู่เลย..."
10027-50 = "พอมาคิดดูแล้ว...\nชุดแบบนี้ คุณครู...\nจะคิดยังไงบ้างนะ"
10027-60 = "หืม...?\nที่อยู่ตรงนั้นมัน...\nหรือว่า...?"
10027-70 = "ว่างจังเลย\nแต่ว่าบางครั้ง...\nว่างๆ แบบนี้ก็ไม่เลวเลยนะ"
10027-80 = "เชิญเลยคุณครู\nฉันคิดว่าใกล้เวลาที่\nคุณครูจะมาพอดีเลย"
10027-90 = "ถึงเวลาลงมือตามแผนแล้วคุณครู\nออกเดินทางกันเถอะ"
10027-100 = "ชุดนี้...?\nมันมีอะไรแปลกงั้นเหรอ...?"
10027-110 = "ถึงจะใส่ชุดไม่เหมือนเดิม\nแต่ข้างในก็ยังเป็นฉันคนเดิมนะ"
10027-120 = "ไม่ว่าเมื่อไรฉันก็เหมือนเดิมนั่นล่ะ"
10027-130 = "คุณครู...?\nมีเรื่องอะไรงั้นเหรอ?"
10027-140 = "หืม...?\nอยากลองจับหูงั้นเหรอ?"
10027-150 = "สิ่งสำคัญสำหรับสไนเปอร์\nนั่นคือความรู้สึกที่ไม่เปลี่ยนไป"
10027-160 = "คุณครู...? คิดจะ..."
10027-170 = "ดะ...เดี๋ยวก่อนสิคุณครู!?\nอย่ามัวแต่นิ่งเงียบแบบนี้สิ..."
10027-180 = "ตอนที่ใส่ชุดเมด ฉันปฏิบัติหน้าที่\nโดยยึดหลักการบริการของเมด"
10027-190 = "แต่พอใส่ชุดนี้แล้ว\nฉันไม่รู้เลยว่าต้องปฏิบัติหน้าที่\nโดยยึดหลักการอะไร"
10027-200 = "สุขสันต์วันเกิดนะ คุณครู"
10027-210 = "ถ้ามีงานที่ฉันช่วยได้ล่ะก็\nบอกมาได้ตลอดเลยนะ"
10027-220 = "วันเกิด...?\nขะ...ขอบคุณนะ\nของขวัญเหรอ?"
10027-230 = "ไม่เป็นไรหรอก\nแค่นี้ก็พอแล้วล่ะ"
10027-240 = "แฮปปี้นิวเยียร์\nคะ...แค่นี้ก็โอเคแล้วใช่มั้ย?"
10027-250 = "วันคริสต์มาส..."
10027-260 = "ที่จริงแล้ว สถานการณ์แบบนี้\nกะ...ก็ไม่ใช่ว่าให้ของขวัญ\nไม่ได้หรอกนะ..."
10027-270 = "วันที่ทุกคนแต่งตัวแปลกๆ กัน..."
10027-280 = "ถ้างั้นใส่ชุดนี้ไปข้างนอก\nก็คงไม่เป็นไรสินะ"
10027-300 = "คะ...คุณครู!?\nเปล่านะ...!\nนะ...นี่มัน...!"
10027-310 = "เดี๋ยวสิ ตอนนี้น่ะ\nฉันเปลี่ยนท่าไม่ได้หรอกนะ...!"
10027-320 = "ฉันกำลังทำภารกิจลอบยิงอยู่น่ะ...!"
10027-330 = "พอล็อกเป้าหมายแล้ว\nก็จะขยับไม่ได้ เพราะงั้น...!"
10027-340 = "...ว่าไงนะ?\nคุณครูไม่เป็นไรงั้นเหรอ?"
10027-350 = "แบบนี้ก็ดีเหมือนกันเหรอ?\nเดี๋ยวนะ...!"
10027-360 = "รู้สึกดีใจอยู่เหมือนกัน\nแต่ถึงยังไงมันก็...!"
10027-370 = "ว่าแล้วเชียว ไม่ไหวจริงๆ\nน่าอายสุดๆ...!"
10027-380 = "อะไรนะ? ไม่ต้องสนใจ แล้วให้\nทำงานต่อได้เลยงั้นเหรอ...?"
10027-390 = "จะไม่ให้สนใจได้ยังไงเล่า\nคนบ้า...!"
10027-2600 = "ถ้ารับของชิ้นนี้มาแล้วล่ะก็\nตอนปฏิบัติภารกิจคราวหน้า\nก็คงพลาดไม่ได้แล้วล่ะ\nอื้อ ฉันจะระวังหลังให้คุณครูเอง"

[translation]
10027-10 = "블루 아카이브."
10027-20 = "어떤 모습이어도 달라지는 건 없지.\n주어진 일을 완수한다. ……그것뿐이야."
10027-30 = "잘 정리된 곳이군.\n마음에 들어."
10027-40 = "뭔가……\n시선이 느껴지는데……"
10027-50 = "그러고 보니,\n이런 복장…… 선생님은\n어떻게 생각할까……"
10027-60 = "응……? 저기에\n있는 것은, 설마\n……?"
10027-70 = "……할 일이 없어.\n하지만, 가끔은\n이런 것도 나쁘지 않아."
10027-80 = "어서 와, 선생님.\n슬슬 올 때가 되었다고\n생각하고 있었어."
10027-90 = "작전 시간이야, 선생님.\n바로 출발하지."
10027-100 = "이 모습……?\n뭔가, 이상한가……?"
10027-110 = "복장이 변한다고\n내면까지 변하지는 않는다."
10027-120 = "나는 언제나와 같다. 응."
10027-130 = "……선생님?\n무슨 일이라도 있나?"
10027-140 = "……응? 귀를 만지고 싶다고?"
10027-150 = "저격수에게 중요한 것은 평상심이다."
10027-160 = "……선생님?\n어딜 그렇게 지그시……"
10027-170 = "자, 잠깐 선생님!?\n잠자코 있지 말고, 뭔가……"
10027-180 = "메이드옷을 입었을 땐\n봉사한다는 개념으로\n활동했는데,"
10027-190 = "……이 옷은 어떤\n느낌으로 움직여야\n될 지 잘 모르겠군."
10027-200 = "생일 축하한다, 선생님."
10027-210 = "내가 할 수 있는\n일이 있다면,\n뭐든지 말만 해줘."
10027-220 = "생일…?\n고, 고맙다……\n뭐, 선물?"
10027-230 = "……아니, 괜찮아.\n이미 충분히 받았어."
10027-240 = "해, 해피 뉴 이어……!\n……저기, 이걸로 괜찮았을까?"
10027-250 = "크리스마스라……"
10027-260 = "뭐어, 확실히, 이 상황은\n선물이라고 할 수 없는 것도\n아니지만……"
10027-270 = "모두가 분장을 하는 날……"
10027-280 = "이라면, 이런 모습으로\n돌아다녀도 괜찮겠지……?"
10027-300 = "서, 선생님!?\n아니……!\n이, 이건 그……!"
10027-310 = "잠깐만, 지금은\n자세를 바꿀 수가 없어서……!"
10027-320 = "그, 지금은 저격 임무 중이고……!"
10027-330 = "타깃으로부터 조준을\n뗄 수는 없으니까……\n그래서……!"
10027-340 = "……뭐? 그쪽은 괜찮다고?"
10027-350 = "……오히려 그대로 좋다고?\n잠깐……!"
10027-360 = "뭐, 뭔가 기뻐하는 것 같지만\n그래도 역시 좀……!"
10027-370 = "역시 무리다. 부끄러워……!"
10027-380 = "뭐? 신경 쓰지 말고\n마저 하라고……?"
10027-390 = "어떻게 신경을\n안 쓰라는 거야, 바보……!"
10027-2600 = "이런 걸 받아버리면, 다음부턴 실수할 수가 없잖아.\n\r……괜찮아. 선생님의 등 뒤는 내게 맡겨줘."

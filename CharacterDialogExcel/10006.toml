[translation]
10006-20 = "You must be Sensei. I'll be accompanying you starting today. You can trust me with any mission."
10006-30 = "Oh, that feels pretty good."
10006-40 = "Let's rest a bit before we go."
10006-50 = "The Justice Task Force gives me a headache."
10006-60 = "Ugh... I guess there's no way around it. I'll help you out."
10006-70 = "*sigh* How did it come to this? Well...I suppose it's not too bad."
10006-80 = "Oh, you're here! What's today's mission, Sensei?"
10006-90 = "Don't even think about being lazy. Remember, I'll always be watching."
10006-100 = "W-Wait. I didn't mean anything weird by that!"
10006-110 = "I'm free for a while, so I can help you out a little bit."
10006-120 = "Why are there so many troublemakers in the world?"
10006-130 = "Well, I don't mean that you need to follow the rules all the time."
10006-140 = "But remember, I'll hold you accountable when you don't follow them."
10006-150 = "There's no such thing as a rule that makes sense to everyone."
10006-160 = "That's why the rules have to be enforced."
10006-170 = "Sensei, I trust your leadership."
10006-180 = "Huh?! Wh-What?! Today is your birthday?"
10006-190 = "Well, okay then. Today, I'll, um... I'll help you on any mission!"
10006-200 = "Th-Thank you for remembering."
10006-210 = "I guess this means I've grown up a bit more. Maybe I should be more serious from now on."
10006-220 = "Sensei, let's make this our year."
10006-230 = "So, it's Christmas. These days, I feel like it's lost its original meaning."
10006-240 = "Not that there aren't still some nice things about it."
10006-250 = "Trick or treat, huh? Well, it is an interesting day."
10006-260 = "What do you think, Sensei? Should we go out together?"
10006-280 = "Why are you making that face? You had better not be thinking anything lewd!"
10006-290 = "How long are you just going to stand there staring? Hurry up and help me."
10006-300 = "Ugh... Guh. Argh..."
10006-310 = "Did it hurt? I'm a Gehenna prefect. This is nothing!"
10006-320 = "It just...kind of tickled... That's all."
10006-330 = "What are you doing? The bandage is coming loose."
10006-340 = "If it's you...I don't mind it at all."
10006-350 = "So hurry up and wrap it tighter!"
10006-2600 = "I'll repay you with results. That's the only way to express what I'm feeling right now."

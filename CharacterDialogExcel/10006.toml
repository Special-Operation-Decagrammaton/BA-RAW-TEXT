[translation]
10006-20 = "นี่... คุณครูเหรอ? จากนี้ไปเรามาร่วมมือกัน\nส่งภารกิจมาให้ฉันได้เลย"
10006-30 = "อืม.. ดูไม่เลวเลยนะ"
10006-40 = "พักสักหน่อยก่อนแล้วกัน"
10006-50 = "ปวดหัวกับชมรมทวง\nความยุติธรรมชะมัด..."
10006-60 = "ช่วยไม่ได้สินะ\nฉันช่วยเอง"
10006-70 = "เฮ้อ... ทำไมถึงเป็นแบบนี้\nไปได้? เอาเถอะ...\nนี่ก็ไม่ได้แย่เท่าไหร่"
10006-80 = "มาแล้วเหรอ?\nคุณครู ภารกิจวันนี้คืออะไรเหรอ?"
10006-90 = "อย่าคิดที่จะอู้งานเชียวนะ\nแล้วฉันจะคอยจับตาดู"
10006-100 = "ไม่ได้จะทำอะไรไม่ดีสักหน่อย!"
10006-110 = "แค่ตอนนี้ว่างๆ อยู่น่ะ...\nฉันจะช่วยเอง"
10006-120 = "ทำไมพวกที่ก่อปัญหา\nถึงมีเยอะแบบนี้นะ"
10006-130 = "เฮ้อ ไม่ต้องทำตามกฎ\nตลอดเวลาก็ได้"
10006-140 = "ถ้าไม่ทำตามละก็...\nก็แค่ต้องรับผิดชอบ"
10006-150 = "ไม่มีกฎอะไรที่ทุกคน\nจะยอมรับได้ทั้งหมดหรอก"
10006-160 = "เราถึงต้องบังคับกันยังไงล่ะ"
10006-170 = "คุณครู\nฉันเชื่อในความสามารถของครูนะ"
10006-180 = "เอ๋?! เอ่อ.. แบบว่า\nวันนี้วันเกิดเหรอ?"
10006-190 = "ช่วยไม่ได้สินะ\nวันนี้ฉันจะช่วยงาน\nเป็นกรณีพิเศษแล้วกัน"
10006-200 = "ขอบคุณที่มาอวยพรนะ"
10006-210 = "ตอนนี้ฉันก็เติบโตขึ้นแล้ว...\nเรามาจริงจังกว่านี้อีกหน่อยดีมั้ย?"
10006-220 = "คุณครู\nปีใหม่นี้ก็สู้เค้านะ"
10006-230 = "วันคริสต์มาสเหรอเนี่ย?\nลืมไปแล้วว่าคริสต์มาส\nมีความหมายยังไง..."
10006-240 = "เอาเถอะ... ไม่ได้แย่เท่าไหร่หรอก"
10006-250 = "Trick or Treat งั้นเหรอ?\nมันก็น่าสนุกอยู่หรอกนะ"
10006-260 = "ว่าไงล่ะคุณครู?\nออกไปข้างนอกกันมั้ย?"
10006-280 = "อะไร ทำไมทำหน้าแบบนั้น\nคงไม่ได้คิดอะไรแปลกๆ อยู่ใช่มั้ย?"
10006-290 = "จะจ้องฉันแบบนั้นไปจนถึง\nเมื่อไหร่? รีบๆ ทำแผลสิ"
10006-300 = "อืม... อึ่ก...\nฮึ่ก...!"
10006-310 = "เจ็บรึเปล่าน่ะเหรอ?\nสำหรับกรรมการวินัยของเกเฮนน่า\nแค่นี้ไม่เท่าไหร่หรอกน่า!"
10006-320 = "แต่ว่ามัน...\nมัน...มันจั๊กจี้นิดหน่อยน่ะ"
10006-330 = "ทำอะไรน่ะ?\nผ้าพันแผลย่นหมดแล้วนะ"
10006-340 = "ถ้าเข้ามาใกล้อีก...\nฉันก็ไม่ว่าอะไรหรอก...\nถ้าเป็นคุณครูน่ะนะ"
10006-350 = "ช่วยพันแผล\nให้แน่นๆ หน่อยนะ"
10006-2600 = "ฉันจะตอบแทนด้วยผลงานดีๆ ก็แล้วกัน\nเพียงเท่านี้ก็คงจะแสดง\nให้เห็นถึงความรู้สึกของฉันได้แล้ว"

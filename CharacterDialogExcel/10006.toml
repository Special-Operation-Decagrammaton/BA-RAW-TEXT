[translation]
10006-20 = "당신이 선생님? 오늘부터 내가 함께해주겠어.\n임무라면 나한테 맡겨."
10006-30 = "호오. 제법 괜찮은 느낌이네."
10006-40 = "조금 쉬었다 가도록 하지."
10006-50 = "정의실현부 녀석들은 골치 아픈데…."
10006-60 = "나 참, 어쩔 수 없네.\n도와줄게."
10006-70 = "하아. 어쩌다 이렇게 되었는지.\n뭐… 지금도 나쁘진 않지만."
10006-80 = "아, 왔어?\n선생님. 오늘의 임무는 뭐야?"
10006-90 = "게으름 피울 생각 하지 말아줘.\n내가 언제나 지켜보고 있을 테니까."
10006-100 = "…아니, 이상한 의미는 아니니까!"
10006-110 = "당분간은 한가하니…\n조금은 도와줄게."
10006-120 = "문제를 일으키는 녀석이\n왜 이리 많은 건지."
10006-130 = "뭐, 규칙을 무조건\n따르란 건 아냐."
10006-140 = "따르지 않을 경우,\n책임을 지게 할 뿐이지."
10006-150 = "누구나 납득할 수 있는\n규칙같은 건 없어."
10006-160 = "그러니까 강제할\n필요가 있는 거고."
10006-170 = "선생님,\n당신의 지휘력은 신뢰하고 있어."
10006-180 = "응?! 뭐, 뭐?!\n오늘 생일이라고?"
10006-190 = "어, 어쩔 수 없네.\n오늘은, 그러니까,\n어떤 임무든 협력할게!"
10006-200 = "축하해줘서 고마워."
10006-210 = "나도 조금 더 성장한 거니까…\n앞으로는 좀 더 진지하게 가볼까?"
10006-220 = "선생님.\n신년에도 같이 힘내자고."
10006-230 = "크리스마스인가.\n이제 와선 원래의\n의미를 잃어버렸군."
10006-240 = "뭐, 지금도 나쁘지 않지만."
10006-250 = "Trick or Treat이라.\n뭐, 재미있는 날이긴 하지."
10006-260 = "어때 선생님.\n같이 밖에 나가볼까?"
10006-280 = "뭐야, 그 표정은.\n이상한 생각 하는 건 아니지?"
10006-290 = "언제까지 지켜 보고만\n있을 거야? 빨리해줘."
10006-300 = "우윽… 윽,\n하읏…"
10006-310 = "아팠냐고?\n게, 게헨나의 선도부원이\n겨우 이런 걸로 아파할 리가 없잖아!"
10006-320 = "다만…\n조금 간지러웠을 뿐이야."
10006-330 = "뭐하고 있어.\n붕대가 흐트러지잖아."
10006-340 = "선생님이라면…\n손이 닿는 것 정도는\n신경 쓰지 않으니까."
10006-350 = "제대로,\n끝까지 해 줘."
10006-2600 = "성과로 보답하겠어.\n그것만이 지금의 내 마음을\n증명할 수 있을 테니까."

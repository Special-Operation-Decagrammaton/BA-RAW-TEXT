[translation]
10120-10 = "蔚藍……檔案！"
10120-20 = "呀呀，老師。\n歡迎來到我的舞台。\n……你能跟上這個節奏嗎？"
10120-30 = "感覺是個能夠\n演奏出美妙聲響的地方。"
10120-40 = "能展現我的演奏\n的時刻……終於！"
10120-50 = "該把鼓放在哪裡呢……"
10120-60 = "甜食……\n在哪裡……！"
10120-70 = "老師也會來嗎……"
10120-80 = "歡迎來到我的舞台！"
10120-90 = "尼嘻，開玩笑的。\n機會難得，要不要\n來場即興演奏呀？"
10120-91 = "你來啦，觀眾啊！"
10120-92 = "來，這次的入場費就收你……\n我想想，香蕉巧克力塔怎麼樣？"
10120-100 = "歡迎回來，老師。\n要吃糖果嗎？"
10120-110 = "糖果真的很棒呢。\n還能就這樣開始練習。"
10120-120 = "如果在這裡練習，\n能為驅散老師的睡意\n有所貢獻……嗎？"
10120-130 = "究竟是為什麼呢……\n能從旋律中感受到甜美的原因。"
10120-140 = "我想裝飾得\n更搖滾一點，\n可以幫我嗎～？"
10120-150 = "Happy Birthday，老師。"
10120-160 = "有想吃的甜點嗎？"
10120-170 = "今天，是我在世上\n出道的日子……！"
10120-180 = "話說，你的行程\n有空下來吧，老師？"
10120-190 = "新年快樂，老師。"
10120-200 = "我在想要不要用鼓把煩惱\n一掃而空，要一起來嗎？"
10120-210 = "得在煙囪上放糖果才行……"
10120-220 = "這樣一來，聖誕老人\n就一定能找到了！"
10120-230 = "居然能免費拿到甜點……"
10120-240 = "真～的，是個\n美好的日子呢，老師。"
10120-260 = "這，這邊……\n在這邊……老師……"
10120-270 = "嗚嗚……\n就在鼓組的……\n裡面……"
10120-280 = "又黑又動得沙沙作響的……\n那傢伙。"
10120-290 = "不管怎麼找都找不到……"
10120-300 = "你，你在說什麼啊，老師！？"
10120-310 = "奇普托斯沒有不怕\n那東西的女高中生好嗎！？"
10120-320 = "比子彈什麼的\n還要恐怖多了好嗎！？"
10120-330 = "嗚嗚，再這樣下去……"
10120-340 = "好不容易才拿到的\n限定Macadamia餅乾……"
10120-350 = "就要變成犧牲品了……"
10120-360 = "所以拜託你了，老師……"
10120-370 = "幫幫我……"
10120-2600 = "哦哦……這種彷彿拿到了\n與指尖融為一體的鼓棒的感覺……\n讓人不禁對老師的品味著迷啊。"

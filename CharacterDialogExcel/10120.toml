[translation]
10120-10 = "Blue Archive!"
10120-20 = "ยินดีต้อนรับสู่การแสดงของฉันนะ คุณครู\nฮุฮุ คอยตามจังหวะของฉันให้ดีล่ะ"
10120-30 = "ห้องนี้เสียงก้องดีนะ"
10120-40 = "คนเยอะจัง...\nถึงเวลาที่ฉัน\nต้องแสดงแล้วเหรอ?"
10120-50 = "เอากลองวางไว้ไหนดีนะ..."
10120-60 = "ของหวานอยู่ที่ไหน...!"
10120-70 = "อีกเดี๋ยวคุณครู\nจะมาหรือเปล่านะ..."
10120-80 = "ยินดีต้อนรับสู่\nฮอลล์การแสดงของฉัน...!"
10120-90 = "ฮุฮุ ล้อเล่นน่า\nอยากฟังฉันเล่นสักรอบมั้ยล่ะ?"
10120-91 = "มาแล้วหรือ ผู้ชมเอ๋ย"
10120-92 = "ค่าเข้า... เอ๋…\nสั่งทาร์ตกล้วยช็อกโกแลต…?"
10120-100 = "มาแล้วเหรอ คุณครู?\nครูจะกินลูกอมหน่อยมั้ย?"
10120-110 = "ลูกอมมันดีนะ\nอมไว้ในปากนานๆ\nตอนซ้อมได้น่ะ"
10120-120 = "ถ้าฉันคอยตีกลองอยู่ข้างๆ\nจะช่วยให้คุณครูหายง่วงขึ้น\nบ้างมั้ย?"
10120-130 = "ทั้งที่ได้ยินเสียงดนตรี\nผ่านโสตประสาท\nแต่ทำไมถึงรู้สึกถึง\nรสหวานกลมกล่อมได้นะ..."
10120-140 = "ฉันอยากเพิ่มความร็อกที่นี่น่ะ\nคุณครูจะช่วยฉันอีกแรงใช่มั้ย?"
10120-150 = "สุขสันต์วันเกิดนะ คุณครู~"
10120-160 = "มีของหวานที่อยากกินมั้ย?"
10120-170 = "วันนี้เป็นวันที่ฉัน\nเดบิวต์ในโลกใบนี้...!"
10120-180 = "แบ่งเวลาไว้ให้ฉันแล้วใช่มั้ย คุณครู?"
10120-190 = "สวัสดีปีใหม่นะคุณครู"
10120-200 = "ปีนี้ฉันคิดว่าจะตีกลอง\nแทนการตีระฆังน่ะ คิดว่าไง?"
10120-210 = "ต้องเอาขนมไปวางไว้\nบนปล่องไฟแล้วละ"
10120-220 = "ถ้างั้นซานต้าก็จะลงไปไม่ได้ใช่มั้ย?"
10120-230 = "แจกของหวานให้ฟรีเหรอเนี่ย"
10120-240 = "วันนี้เป็นวันที่สุดยอดเลยนะ คุณครู"
10120-260 = "ทางนี้... ทางนี้คุณครู..."
10120-270 = "ฮือ... มันอยู่ตรง... ชุดกลอง..."
10120-280 = "เจ้าตัวสีดำๆ...\nเคลื่อนไหวแล้วมีเสียงแซ่กๆ..."
10120-290 = "แต่ไม่ว่าฉันจะหายังไง\nก็หามันไม่เจอเลย..."
10120-300 = "พะ... พูดอะไรน่ะคุณครู?!"
10120-310 = "ไม่มีนักเรียนหญิงคนไหนในคิโวทอส\nไม่กลัวเจ้านั่นหรอกนะ!"
10120-320 = "มันน่ากลัวยิ่งกว่า\nกระสุนปืนอีก!"
10120-330 = "อืม... ถ้าเป็นแบบนี้"
10120-340 = "คงจะต้องเสียสละ\nคุกกี้แมคคาเดเมีย"
10120-350 = "ที่ได้มาไปแน่ๆ เลย..."
10120-360 = "เพราะงั้นขอรบกวนด้วยนะ คุณครู..."
10120-370 = "ช่วยหน่อยเถอะ..."
10120-2600 = "รู้สึกเหมือนได้ไม้ตีกลองที่พอดีมือเลย...\nเซนส์ของคุณครูนี่ทำฉันทึ่งเสมอเลยนะ"

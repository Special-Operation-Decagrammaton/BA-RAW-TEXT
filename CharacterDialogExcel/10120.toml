[translation]
10120-10 = "블루…… 아카이브!"
10120-20 = "나의 무대에 온 걸 환영해, 선생님.\n후후, 나의 박자만 따라오라고."
10120-30 = "울림이 좋은 공간이네."
10120-40 = "사람이 많군……\n나의 연주를 들려줄 때인가?"
10120-50 = "드럼은 어디에 둘까……"
10120-60 = "단 것은 어디에 있는가……!"
10120-70 = "조금 있으면\n선생님도 오려나……."
10120-80 = "어서 와라,\n나의 공연장에……!"
10120-90 = "후후, 농담이야.\n그래도 내 연주 한번 들어볼래?"
10120-91 = "왔는가, 관객이여."
10120-92 = "입장료는…… 어……\n바나나 초코 타르트……? "
10120-100 = "왔어, 선생님?\n선생님도 사탕 먹을래?"
10120-110 = "사탕은 좋아.\n오랫동안 입에 문 채로\n연습할 수 있거든."
10120-120 = "내가 옆에서 드럼을 치면,\n선생님의 졸음을\n날려 버릴 수 있을까?"
10120-130 = "음악은 귀로 듣는 것인데,\n어째서 달콤하다고\n느끼는 것일까……"
10120-140 = "이 공간에 록을 더하고 싶은데,\n도와줄 거지, 선생님?"
10120-150 = "생일 축하해, 선생님~"
10120-160 = "혹시 먹고 싶은 스위츠 있어?"
10120-170 = "오늘은 내가 이 세상에\n데뷔한 날……!"
10120-180 = "시간은 빼뒀겠지, 선생님?"
10120-190 = "새해 복 많이 받아, 선생님."
10120-200 = "올해는 특별히 종 대신\n북을 쳐 볼까 하는데, 어때?"
10120-210 = "굴뚝에 사탕을 올려놔야겠어."
10120-220 = "그러면 산타도 못 지나치겠지?"
10120-230 = "무상으로 단 것을 나눠준다니,"
10120-240 = "정말 멋진 날이야, 선생님."
10120-260 = "여, 여기…… 여기야 선생님……"
10120-270 = "우으… 드럼 세트 안에… 있어…"
10120-280 = "검고 바스락거리며 움직이는….\n그 녀석이."
10120-290 = "그런데 아무리 뒤져도\n찾을 수가 없어……"
10120-300 = "무, 무슨 소리야 선생님?!"
10120-310 = "키보토스에 그것을\n무서워하지 않는 여고생은 없다고!"
10120-320 = "총알 같은 것보다\n훨씬 무서운 거라고!"
10120-330 = "우으, 이대로는…"
10120-340 = "모처럼 손에 넣은\n한정판 마카다미아 쿠키가,"
10120-350 = "희생양이 돼버릴 거야…"
10120-360 = "그러니까 부탁해, 선생님…"
10120-370 = "살려줘……"
10120-2600 = "손에 딱 맞는\n스틱을 쥔 기분이야……\n선생님의 센스는 늘 놀랍다니까."

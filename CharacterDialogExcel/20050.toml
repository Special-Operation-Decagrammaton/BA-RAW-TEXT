[translation]
20050-10 = "Blue! Archive!"
20050-20 = "My name is Usuba Ritsu! Nice to meet you!"
20050-30 = "Where would be the best place to showcase a statue?"
20050-40 = "The air feels stuffy. Maybe I should drill a hole in the wall over there?"
20050-50 = "Is there a way to express the aroma of coffee through sculpture?"
20050-60 = "I wonder if there's anything worthwhile goods..."
20050-70 = "I'm sure people back in Wildhunt would love it if I imported this cake, right?"
20050-80 = "Yahoo! Sensei, what were you up to?"
20050-90 = "The weather's so nice! Let's go outside, Sensei!"
20050-100 = "I like our club! It brings other people joy!"
20050-110 = "When you look at a rock or a clump of clay..."
20050-120 = "...don't you feel the urge to bring out the shape it carries inside?"
20050-130 = "I can't figure out your dimensions visually. "
20050-140 = "So would you mind if I hugged you, Sensei?"
20050-150 = "Being at Schale feels just as comfortable as leaning on marble!"
20050-160 = "Sensei! You should stop working for a bit and play with me!"
20050-170 = "Sensei, thank you for being born!"
20050-180 = "I'm really, really happy to have you in my life!"
20050-190 = "You know, Sensei, it's my birthday today."
20050-200 = "So you should play with me all day long!"
20050-210 = "Happy New Year, Sensei! Let's go watch them ring the bell together soon!"
20050-220 = "...Huh, it's over already? "
20050-230 = "We're getting a lot of snow! Do you want me to teach you how to sculpt with snow, Sensei?"
20050-240 = "Let's go outside, Sensei! "
20050-250 = "We need to secure candies and chocolate!"
20050-270 = "Ah, ah."
20050-280 = "So cool."
20050-290 = "Isn't this place great?"
20050-300 = "It looks like a cistern that was built a long time ago."
20050-310 = "They dug out the ground, placed dozens of stone pillars..."
20050-320 = "...and carved each and every one of them personally... "
20050-330 = "Isn't it beautiful?"
20050-340 = "I really wanted to show this to you, Sensei."
20050-350 = "Come over here."
20050-360 = "We should enjoy this scenery together."
20050-2600 = "Whoa...! I really wanted this! Thank you, Sensei!!!"

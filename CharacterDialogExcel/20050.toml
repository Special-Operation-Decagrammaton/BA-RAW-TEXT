[translation]
20050-10 = "Blue! Archive!"
20050-20 = "ชื่อของฉันก็คืออุสุบะ ริตสึ!\nขอฝากตัวด้วยนะ!"
20050-30 = "ถ้าจะจัดแสดง\nงานประติมากรรม\nจะจัดตรงไหนดีน้า~"
20050-40 = "อากาศไม่ค่อยถ่ายเทเลย~\nเจาะรูที่กำแพง\nตรงนั้นดีมั้ยนะ?"
20050-50 = "จะถ่ายทอดกลิ่นหอม\nของกาแฟออกมาเป็น\nงานประติมากรรมได้มั้ยนะ?"
20050-60 = "มีอะไรที่พอจะ\nนำเข้ามาได้บ้างมั้ยน้า~"
20050-70 = "ถ้านำเข้าเค้กจากที่นี่ได้\nเด็กๆ ไวลด์ฮันต์\nคงจะชอบเลยเนอะ?"
20050-80 = "ยะฮู้ว~ คุณครู\nทำอะไรอยู่เหรอ?"
20050-90 = "อากาศออกจะดี\nเราไปเที่ยวเล่นกันเถอะ คุณครู!"
20050-100 = "ฉันชอบชมรมของเรานะ!\nก็เราช่วยให้ผู้คน\nมีความสุขได้ยังไงล่ะ"
20050-110 = "ตอนที่เห็นหินหรือก้อนดินเหนียว"
20050-120 = "ไม่อยากเอาสิ่งที่อยู่ในนั้น\nออกมาข้างนอกเหรอ?"
20050-130 = "ให้กะด้วยสายตาอย่างเดียว\nฉันกะขนาดไม่ได้หรอก... "
20050-140 = "เข้าเรื่องเลยนะ คุณครู\nฉันขอกอดสักครั้งได้มั้ย?"
20050-150 = "การอยู่ที่ชาเล่ต์นี่สบายตัว\nเหมือนตอนนั่งพิงหินอ่อนเลยละ~"
20050-160 = "คุณครู~ พักงานไว้สักเดี๋ยว\nแล้วมาเล่นกับฉันก่อนน้าา~"
20050-170 = "คุณครู ขอบคุณที่เกิดมานะ!"
20050-180 = "พอมีคุณครูอยู่ด้วย\nฉันมีความสุขจริงๆ เลย!"
20050-190 = "วันนี้วันเกิดฉันละ คุณครู"
20050-200 = "เพราะงั้นวันนี้\nมาเล่นกับฉันทั้งวันเลยนะ!"
20050-210 = "แฮปปี้นิวเยียร์นะ คุณครู!\nอีกเดี๋ยวเราไปดู\nการตีระฆังด้วยกันนะ!"
20050-220 = "เอ๋... จบแล้วเหรอ? "
20050-230 = "หิมะตกเยอะเลย~\nฉันสอนวิธีทำรูปปั้น\nจากหิมะให้มั้ยคุณครู?"
20050-240 = "รีบออกไปกันเถอะ คุณครู! "
20050-250 = "เราก็ต้องไปเอาลูกกวาด\nกับช็อกโกแลตมาบ้างสิ!"
20050-270 = "อ่า อ่า..."
20050-280 = "สดชื่นจัง"
20050-290 = "ที่นี่ยอดไปเลยใช่มั้ยล่ะ?"
20050-300 = "มันเหมือนบ่อเก็บน้ำใต้ดิน\nที่สร้างตั้งแต่สมัยก่อนเลยละ"
20050-310 = "ขุดลงไปในดิน\nตั้งเสาหินหลายสิบต้น..."
20050-320 = "แล้วก็แกะสลักเสา\nไว้ทุกต้นเลยละ... "
20050-330 = "สวยใช่มั้ยล่ะ?"
20050-340 = "ฉันอยากให้คุณครู\nได้มาเห็นน่ะ"
20050-350 = "เอาละ มาตรงนี้สิ"
20050-360 = "มาดูวิวทิวทัศน์\nจากที่ที่ฉันอยู่กัน"
20050-2600 = "ว้าวว...!\nฉันอยากได้อันนี้มากๆ เลย!\nขอบคุณนะ คุณครู!!"

[translation]
20050-10 = "蔚藍！檔，案！"
20050-20 = "我是狂獵藝術學院的薄葉律！\n請多指教囉！"
20050-30 = "那個附近，\n能放作品嗎～？"
20050-40 = "這裡能不能再\n通風一點呢～？\n啊！……那邊，\n好像可以打個洞！"
20050-50 = "咖啡的香味……\n沒辦法表現出來嗎。"
20050-60 = "唔嗯～下次的輸入品是……"
20050-70 = "如果把這裡的蛋糕\n帶回去的話……\n學院的大家一定\n會很開心吧！"
20050-80 = "呀齁～老師，\n你在做什麼～？"
20050-90 = "天氣真好呢！\n一起去玩吧老師！"
20050-100 = "社團？我最喜歡了！\n因為能讓大家幸福！"
20050-110 = "看到岩石和黏土，\n我就會有股\n得讓裡頭的孩子"
20050-120 = "成形才可以！這樣的感覺。\n老師你呢？"
20050-130 = "只用看的不太能\n知道大小呢……"
20050-140 = "老師，可以抱緊緊嗎？"
20050-150 = "夏萊真舒服呢～\n就跟摸著大理石的時候一樣！"
20050-160 = "老～師♪\n先把工作放到一邊，\n來陪我玩嘛～！"
20050-170 = "老師，謝謝你能夠出生！"
20050-180 = "我，有老師在，\n真的很幸福！"
20050-190 = "吶吶！你知道嗎？\n今天是我的生日！"
20050-200 = "今天我想一～直跟老師玩～！"
20050-210 = "新年快樂，老師！\n一起去看敲鐘吧！！"
20050-220 = "……咦？已經結束了嗎？"
20050-230 = "老師！是雪！！\n外面一片白哦！\n機會難得，\n要不要一起用雪雕刻？"
20050-240 = "老師！快點快點～！"
20050-250 = "今天是糖果和\n巧克力的爭奪戰唷！"
20050-270 = "啊～"
20050-280 = "好涼爽……"
20050-290 = "這裡，是不是很厲害？"
20050-300 = "好像是很～久以前\n就有的地下儲水槽……"
20050-310 = "挖了很大的洞，\n又立了好多柱子……"
20050-320 = "每根上面還都有雕刻……"
20050-330 = "……很漂亮吧？"
20050-340 = "我實在很想讓老師看看。"
20050-350 = "來，過來這邊。"
20050-360 = "一起欣賞跟我相同的景色吧。"
20050-2600 = "哇！這個，我一直很想要耶！\n謝謝你，老師！好開心！"

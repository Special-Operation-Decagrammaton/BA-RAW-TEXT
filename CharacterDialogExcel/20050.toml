[translation]
20050-10 = "블! 루! 아카이, 브!"
20050-20 = "내 이름은 우스바 리츠!\n잘 부탁해!"
20050-30 = "조각을 전시한다면,\n어디가 좋을까나~"
20050-40 = "공기가 살짝 탁하네~\n저쪽 벽에\n구멍을 내볼까?"
20050-50 = "커피의 향기를 조각으로\n표현할 수 있을까?"
20050-60 = "어디 수입해 볼\n만한 게 없으려나~"
20050-70 = "이곳의 케이크를 들여가면,\n와일드헌트 아이들이\n좋아하겠지?"
20050-80 = "얏호~ 선생님,\n뭐 하고 있었어?"
20050-90 = "날씨도 좋은데,\n놀러 나가자, 선생님!"
20050-100 = "난 우리 동아리가 좋아!\n사람들을 행복하게\n해줄 수 있으니까!"
20050-110 = "돌이나 진흙 덩어리를 보면,"
20050-120 = "그 안에 있는 모습을\n밖으로 꺼내보고 싶지 않아?"
20050-130 = "눈대중만으로는\n치수를 모르겠네……. "
20050-140 = "그래서 말인데 선생님,\n한 번만 안아봐도 될까?"
20050-150 = "샬레에 있으면, 대리석에 기대어\n있는 것만큼이나 편하단 말이지~"
20050-160 = "선생님~ 일 잠깐 멈추고\n나랑 놀자아아~"
20050-170 = "선생님, 태어나줘서 고마워!"
20050-180 = "나, 선생님이 있어서\n진짜 진짜 행복해!"
20050-190 = "있잖아, 나 생일이다, 선생님?"
20050-200 = "그러니까 오늘은\n하루 종일 같이 놀자!"
20050-210 = "해피 뉴 이어, 선생님!\n이따가 같이 종 때리는 거\n보러 가자!"
20050-220 = "……어라, 벌써 끝났나? "
20050-230 = "눈이 많이 오네~\n눈으로 조각하는 방법,\n가르쳐줄까, 선생님?"
20050-240 = "어서 나가자, 선생님! "
20050-250 = "우리도 사탕과\n초콜릿을 쟁취해야지!"
20050-270 = "아, 아-"
20050-280 = "시원해-."
20050-290 = "여기, 굉장하지?"
20050-300 = "옛-날에 만들어진\n지하 저수조인 것 같더라고."
20050-310 = "땅속을 파내고,\n수십 개의 돌기둥을 세우고……."
20050-320 = "기둥 하나하나마다\n조각을 해 두었어……. "
20050-330 = "아름답지?"
20050-340 = "어떻게든 선생님한테\n보여주고 싶었어."
20050-350 = "자, 여기로 와."
20050-360 = "내가 있는 곳의 풍경,\n같이 보자."
20050-2600 = "와아아……!\n이거, 내가 정말로 갖고 싶었던 거야!\n고마워, 선생님!!"

[translation]
16012-10 = "블루 아카이브~!"
16012-20 = "선생님 새해 복 많이 받아~!\n같이 맛있는 거, 찾으러 가자!"
16012-30 = "멋지……다고 하기\n보다는, 재미있을 것\n같은 곳이네?"
16012-40 = "뭔가… 맛있는\n냄새가…"
16012-50 = "더럽히지 않도록\n조심해야지."
16012-60 = "맛있는 걸 먹으려고 하면\n꼭 방해가 들어오는 느낌이\n……"
16012-70 = "괜찮아, 분명히 클 수\n있을거야! 아직\n가능성은 있지…?"
16012-80 = "어서 와, 선생님!\n빨리 일같은 건 끝내버리고\n맛있는 거 먹으러 가자!"
16012-90 = "나도 도울테니까!"
16012-100 = "정말, 선생님 어디 갔던거야?\n엇, 왜 기다렸냐고?\n그야 선생님이……"
16012-110 = "……그런데, 무슨 말을\n하게 하는 거야!"
16012-120 = "혹시, 기모노 차림에 반했어?"
16012-130 = "다, 당연하지.\n날 그냥 먹보라고\n착각하고 있는 거 아냐?"
16012-140 = "제일 좋아하는 오세치 요리?\n음~ 고르기가 어렵네.\n왜냐면 다 맛있거든!"
16012-150 = "저기~ 언제까지\n일 하고 있을 거야~?"
16012-160 = "빨리~ 빨리~\n놀러 가자고~"
16012-170 = "하아…… 내가 요리 같은 거라도\n할 줄 알았으면, 같이 무언가\n만들어 먹기라도 하는 건데."
16012-180 = "왜 그래? 혹시\n혼자라서 쓸쓸해졌어?"
16012-190 = "따, 딱히 내가 그렇다는 건\n아니니까!"
16012-200 = "에헤헤,\n오늘은 선생님 생일이네.\n축하하러 같이 외출해줄게!"
16012-210 = "내 생일, 잊은 건 아니지?\n빨리 준비하고 나가자!"
16012-220 = "후후… 오늘은 어떤 걸\n얻어먹을까나~?"
16012-230 = "새해 복 많이 받아, 선생님!\n이 복장?"
16012-240 = "그, 그야… 설날이니까.\n어, 어때…? 뭔가 감상\n같은 거 없나~ 해서."
16012-250 = "잘 어울린다고?\n귀, 귀여워…?"
16012-260 = "스, 스톱!\n이, 이제 됐어!"
16012-270 = "크리스마스도 맛있는게 많지!\n이번에야말로…"
16012-280 = "먹을 때 방해받지\n않았으면 좋겠는데."
16012-290 = "할로윈은 다른 축제와 비교해서\n좀 아쉽하다고나 할까…\n호박만 있어서 그런가?"
16012-300 = "뭐, 맛있으니까 상관없지만!"
16012-320 = "자, 선생님. 하나 줄게."
16012-330 = "왜 그렇게 놀라는거야!\n어, 어쩌다 많이 들어가\n있던 것뿐이야!"
16012-340 = "이거, 선생님이\n사준 거기도 하고…\n거기에 오늘 하루 종일…"
16012-350 = "(생각해 보면, 오늘은\n하루 종일 선생님과……)"
16012-360 = "(나, 난 대체, 뭘\n생각하고 있는 거야!)"
16012-370 = "정말!\n내가 주겠다고 했으니까\n아무래도 좋잖아!"
16012-2600 = "나 강해졌구나…\n…한번만 말할거니까, 제대로 들어!\n그… 고마워. 다 선생님 덕분이야.\n감사하고있어."

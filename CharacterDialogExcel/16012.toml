[translation]
16012-10 = "Blue Archive!"
16012-20 = "Happy New Year, Sensei! Let's go find something delicious!"
16012-30 = "It's...pretty cool...or maybe fun would be a better description."
16012-40 = "I smell something mouth-watering..."
16012-50 = "I should be careful not to get it dirty."
16012-60 = "I always get interrupted just when I'm about to eat something good..."
16012-70 = "It's okay, I'm sure I'll grow! There's potential, right...?"
16012-80 = "Welcome, Sensei! Let's finish work quickly and go eat something yummy!"
16012-90 = "I'll help you!"
16012-100 = "Seriously, Sensei, where have you been? Oh, why I was waiting? Because you..."
16012-110 = "Wh-What am I supposed to say?!"
16012-120 = "Did you fall in love with me because of my kimono?"
16012-130 = "O-Of course. Do you think I'm just a glutton?"
16012-140 = "My favorite osechi dish? Hmm... It's hard to pick just one, because they're all so good!"
16012-150 = "Hey~ How long are you going to be working?"
16012-160 = "Hurry! Hurry! Let's go somewhere!"
16012-170 = "*sigh* I wish I knew how to cook. Then we could make something at home."
16012-180 = "What's wrong? Are you feeling lonely?"
16012-190 = "I-I'm not saying I am!"
16012-200 = "Heeheehee. Today's your birthday, Sensei. Let's go out and celebrate!"
16012-210 = "You didn't forget my birthday, did you? Let's get ready and go out!"
16012-220 = "Heehee... What are you gonna buy me today?"
16012-230 = "Happy New Year, Sensei! What? Th-This outfit...?"
16012-240 = "B-Because it's New Year's Day. Wh-What do you think?"
16012-250 = "You think I look good in it? It's cute...?"
16012-260 = "S-Stop! Th-That's enough!"
16012-270 = "There's a lot of delicious Christmas food! This time..."
16012-280 = "I hope I don't get interrupted."
16012-290 = "Halloween is kind of weak compared to other festivals... Maybe because it's so focused on pumpkins?"
16012-300 = "Well I don't mind, because they're still delicious!"
16012-320 = "Here, Sensei. I'll give you some."
16012-330 = "Wh-Why are you so surprised? I-It's just too much for just me!"
16012-340 = "This... You bought it for me... And you've been with me all day..."
16012-350 = "(Come to think of it, I spent the whole day with Sensei...)"
16012-360 = "(Wh-What am I thinking?!)"
16012-370 = "Oh, come on! I just want to give it to you. Okay?!"
16012-2600 = "I've become stronger... I'm only gonna say this once, so listen! Um... Thank you for everything, Sensei. I appreciate it."

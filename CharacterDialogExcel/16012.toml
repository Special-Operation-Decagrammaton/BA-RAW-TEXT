[translation]
16012-10 = "蔚藍檔案！"
16012-20 = "老師，新年快樂～！\n一起去尋找美味的東西吧！"
16012-30 = "真棒……與其這麼說，\n應該說是有趣的地方呢？"
16012-40 = "總覺得……\n有股好吃的味道……"
16012-50 = "得小心\n別弄髒才行。"
16012-60 = "每當我想吃美食\n的時候，感覺總是\n會被妨礙……"
16012-70 = "沒關係，一定會\n長大的！應該還有\n可能性吧……？"
16012-80 = "歡迎回來，老師！\n趕快把工作做完，\n然後去吃美食吧！"
16012-90 = "我也會幫忙的！"
16012-100 = "吼，老師跑哪去了啊？\n咦，問我為什麼要等你？\n那當然是因為老師……"
16012-110 = "……不是，\n你打算讓我說什麼呀！"
16012-120 = "難道，穿著和服的樣子\n讓你看呆了嗎？"
16012-130 = "那，那當然囉。\n你該不會以為\n我只是個貪吃鬼吧？"
16012-140 = "我最喜歡的御節料理？\n嗯～有點難選呢。\n因為每道很好吃！"
16012-150 = "吶～要工作到什麼時候啊～？"
16012-160 = "快點～快點\n一起去玩吧～"
16012-170 = "唉……要是我也擅長\n料理就好了。這樣就能\n一起做點什麼了。"
16012-180 = "怎麼了？\n覺得寂寞嗎？"
16012-190 = "我，我不是\n我有那種想法的意思！"
16012-200 = "耶嘿嘿，今天\n是老師的生日呢。\n我們一起出去慶祝吧！"
16012-210 = "我的生日，\n你應該沒有忘記吧？\n快點準備好出發吧！"
16012-220 = "呵呵……今天要讓老師\n請我吃什麼好呢～？"
16012-230 = "新年快樂，老師！\n這套打扮？"
16012-240 = "你，你想嘛……畢竟是新年。\n怎，怎麼樣呢……？\n有沒有什麼感想呢～"
16012-250 = "很適合？\n很，很可愛……？"
16012-260 = "暫，暫停！\n已，已經夠了！"
16012-270 = "聖誕節也有很多\n好吃的東西對吧！\n希望這次……"
16012-280 = "吃東西的時候\n不會被妨礙就好了。"
16012-290 = "萬聖節和其他慶典比起來\n好像有點不夠滿足……\n是因為都是南瓜嗎？"
16012-300 = "算了，只要好吃就好！"
16012-320 = "來，老師。給你一個。"
16012-330 = "呃，為什麼要那麼驚訝啊？\n只，只是碰巧裝了很多而已！"
16012-340 = "再說這也是老師\n買給我的……\n而且，今天一整天都……"
16012-350 = "（這麼說來，今天\n　一直都和老師……）"
16012-360 = "（我，我真是的，\n　在想什麼啊！）"
16012-370 = "真是的！\n我說要給你\n就是要給你啦！"
16012-2600 = "我，變強了呢……\n……我只說一次，要仔細聽唷！\n那個……謝謝你。全部，\n都是多虧了老師。我很感謝。"

[translation]
16012-10 = "Blue Archive!"
16012-20 = "คุณครู สวัสดีปีใหม่~!\nไปหาของอร่อยๆ กินกันเถอะ!"
16012-30 = "ที่นี่ดีจังเลยน้า...\nไม่สิ ต้องเรียกว่าน่าสนุก\nน่าจะเหมาะกว่า?"
16012-40 = "เหมือนได้กลิ่นของอร่อย..."
16012-50 = "ต้องระวัง\nไม่ให้ชุดเลอะด้วย"
16012-60 = "เวลาจะได้กินของอร่อยๆ\nรู้สึกเหมือนจะโดนขัดขวาง\nทุกทีเลย..."
16012-70 = "ไม่เป็นไร ต้องโตขึ้น\nกว่านี้ได้อีกแน่ๆ\nยังมีโอกาสอยู่...ใช่มั้ยนะ?"
16012-80 = "เชิญเลย คุณครู!\nรีบๆ ทำงานให้เสร็จ\nแล้วไปกินของอร่อยกันเถอะ!"
16012-90 = "ฉันจะช่วยคุณครูเอง!"
16012-100 = "จริงๆ เลยเชียว หายไปไหนมาน่ะ?\nอ๊ะ? ทำไมฉันยังรออยู่งั้นเหรอ?\nเพราะว่า..."
16012-110 = "เดี๋ยวสิ คิดจะให้ฉัน\nพูดอะไรออกมากันแน่?"
16012-120 = "หลงรักฉันในชุดกิโมโนแล้วรึไง?"
16012-130 = "งะ...แหงอยู่แล้ว\nเข้าใจผิดไปเองรึเปล่า\nว่าฉันเป็นพวกคนกินจุน่ะ?"
16012-140 = "อาหารโอเซจิที่ชอบที่สุดเหรอ?\nอืม~ เลือกยากเลยแฮะ\nก็มันอร่อยทุกอย่างเลยนี่นา!"
16012-150 = "นี่~ จะทำงาน\nไปถึงเมื่อไรน่ะ~?"
16012-160 = "เร็วๆ เข้าสิ\nจะได้ไปเที่ยวเล่นกัน~"
16012-170 = "เฮ้อ... ถ้าฉันทำอาหารเป็น\nสักอย่างละก็ คงจะทำอะไร\nกินด้วยกันได้แล้วแท้ๆ"
16012-180 = "เป็นอะไรน่ะ? หรือว่า...\nอยู่คนเดียวก็เลยเหงาเหรอ?"
16012-190 = "ฉะ...ฉันไม่ได้เป็นแบบนั้นสักหน่อย!"
16012-200 = "ฮิฮิฮิ...\nวันนี้เป็นวันเกิดคุณครูสินะ\nออกไปฉลองด้วยกันเถอะ!"
16012-210 = "คงไม่ได้ลืมวันเกิดฉันหรอกใช่มั้ย?\nรีบเตรียมตัวออกไปข้างนอกกันเถอะ!"
16012-220 = "ฮุฮุ... วันนี้จะได้กินของอร่อยๆ\nอะไรบ้างน้า~?"
16012-230 = "สวัสดีปีใหม่นะคุณครู\nหืม? ชุดนี้เหรอ?"
16012-240 = "กะ...ก็วันปีใหม่นี่นา\nปะ...เป็นไง...? มะ...ไม่รู้สึก\nประทับใจบ้างเลยรึไง..."
16012-250 = "เหมาะกับฉันดีงั้นเหรอ?\nนะ... น่ารักเหรอ...?"
16012-260 = "ยะ... หยุด!\nพะ... พอได้แล้ว!"
16012-270 = "คริสต์มาสก็มีของอร่อยๆ เยอะเลย!\nเพราะงั้นคราวนี้..."
16012-280 = "ถ้าตอนกินของอร่อยๆ\nไม่มีคนมาขัดขวางก็คงดี"
16012-290 = "ฮาโลวีนน่ะ พอเทียบกับเทศกาลอื่น\nก็น่าเสียดายอยู่นะ...\nเป็นเพราะมีแค่ฟักทองรึเปล่านะ?"
16012-300 = "แต่ก็นะ แค่อร่อยก็พอแล้ว!"
16012-320 = "เอ้า คุณครู ฉันแบ่งให้ชิ้นหนึ่ง"
16012-330 = "ตกใจอะไรขนาดนั้นเล่า!\nฉะ...ฉันแค่คิดว่ามันเยอะไป\nเท่านั้นเอง!"
16012-340 = "แล้วก็นี่น่ะ\nคุณครูก็เป็นคนซื้อให้ด้วย...\nแล้วอีกอย่างวันนี้ทั้งวัน..."
16012-350 = "(พอมาคิดๆ ดูแล้ววันนี้...\nก็ได้อยู่กับคุณครูทั้งวันเลย...)"
16012-360 = "(ฉะ... ฉันมัวคิดอะไรอยู่กันเนี่ย!)"
16012-370 = "จริงๆ เลยเชียว ฉันบอกว่า\nจะแบ่งให้แล้วไงเล่า\nไม่เป็นไรหรอกน่า!"
16012-2600 = "ฉันแข็งแกร่งขึ้นแล้วสินะ...\nฉันจะพูดแค่ครั้งเดียวเท่านั้น\nตั้งใจฟังให้ดีล่ะ! ขะ... ขอบคุณนะ\nทุกอย่างๆ ที่คุณครูช่วยเลย\nขอบคุณมากๆ เลยนะ"

[translation]
20014-10 = "Blue Archive!"
20014-20 = "โซราอิ ซากิ\nสมาชิกกองทหาร RABBIT จากสถาบัน SRT!\nแล้วคู่มือปฏิบัติการของชาเล่ต์อยู่ที่ไหนล่ะ?"
20014-30 = "ทุกคนดูขาดวินัยกันสุดๆ\nน่าสมเพชชะมัด"
20014-40 = "ไม่ว่าจะไปที่ไหน\nก็มีแต่พวกงี่เง่าทั้งนั้น"
20014-50 = "ถึงจะเป็นวันหยุดก็เถอะ\nแต่อย่างน้อยๆ\nก็ควรรักษาวินัยกันบ้างสิ"
20014-60 = "(คู่มือที่เขียนวิธีการใช้งาน\nของเจ้านี่อยู่ตรงไหน\nกันนะ...?)"
20014-70 = "(อะไรกัน ไม่ได้เขียนไว้\nในคู่มือเลยนี่นา...)"
20014-80 = "อ๊ะ คุณครูเองเหรอ"
20014-90 = "มีคนน่าสงสัยโผล่มาตรงหน้า\nฉันเกือบเผลอยิงไปแล้ว"
20014-100 = "มาช้านะ ระหว่างปฏิบัติการ\nหนึ่งนาทีหรือหนึ่งชั่วโมง\nตัดสินความเป็นความตายเลยได้นะ\nลืมไปแล้วรึไง?"
20014-110 = "ถ้ามีเวลามาล้อเล่นละก็\nช่วยตั้งใจปฏิบัติภารกิจหน่อยเถอะ"
20014-120 = "มีคำสุภาษิตกล่าวไว้ว่า\nปืนก็เหมือนเพื่อนที่ดีคนหนึ่ง"
20014-130 = "ถ้าหมั่นดูแลให้ดีๆ\nก็ไม่มีทางถูกทรยศได้หรอก"
20014-140 = "การทำงานที่ล้มเหลว\nคือสิ่งที่เกิดขึ้นกับคนขี้เกียจ"
20014-150 = "คิดแล้วเชียวว่า\nคู่มือแบบกระดาษดีที่สุด"
20014-160 = "ไม่ต้องคอยชาร์จแบต\nแล้วก็ไม่ต้องห่วงว่าจะโดนแฮ็กด้วย"
20014-170 = "เรื่องที่ไม่ได้ก็คือไม่ได้\nขณะที่ปฏิบัติภารกิจ\nจะถอดหมวกเหล็กไม่ได้เด็ดขาด"
20014-180 = "ถ้าเป็นพวกรุ่นพี่ละก็\nคงจัดการภารกิจง่ายๆ แบบนี้\nได้แบบไม่ยากแน่ๆ..."
20014-190 = "บางครั้งฉันก็โกรธ\nความอ่อนด้อยของตัวเอง..."
20014-200 = "สุขสันต์วันเกิดนะคุณครู\nไม่มีของอะไร\nที่อยากได้เลยเหรอ?"
20014-210 = "หมวกเหล็กของฉัน...?!\nหมวกที่ใส่อยู่เนี่ยนะ?"
20014-220 = "ระ...เรื่องแบบนั้น...\nถึงจะเป็นคำสั่งของคุณครูก็เถอะ…!"
20014-230 = "อ๊ะ... วันเกิดฉัน\nคุณครูจำได้ด้วยสินะ..."
20014-240 = "ขอบคุณนะคุณครู"
20014-250 = "ถ้าไม่ได้ตรวจดูสมุดพก\nบางครั้งฉันก็ลืมไป\nบ้างเหมือนกันน่ะ..."
20014-260 = "ถ้าปีนี้พวกเรา...\nกลับไปที่สถาบัน SRT ได้ก็คงดี..."
20014-270 = "คริสต์มาส... ช่วงเวลา\nที่คนส่วนใหญ่ไม่ระวังตัว\nเราต้องระวังให้มากกว่านี้สิ"
20014-280 = "คุณครู... ใครทาหน้าลายพราง\nน่ากลัวๆ แบบนั้นให้น่ะ?"
20014-290 = "แต่งคอสเพลย์วันฮาโลวีน?\nมันคืออะไรน่ะ?"
20014-300 = "อ๊ะ คุณครูเองเหรอ"
20014-310 = "มีคนน่าสงสัยโผล่มาตรงหน้า\nฉันเกือบเผลอยิงไปแล้ว"
20014-320 = "มาช้านะ ระหว่างปฏิบัติการ\nหนึ่งนาทีหรือหนึ่งชั่วโมง\nตัดสินความเป็นความตายเลยได้นะ\nลืมไปแล้วรึไง?"
20014-330 = "ถ้ามีเวลามาล้อเล่นละก็\nช่วยตั้งใจปฏิบัติภารกิจหน่อยเถอะ"
20014-340 = "มีคำสุภาษิตกล่าวไว้ว่า\nปืนก็เหมือนเพื่อนที่ดีคนหนึ่ง"
20014-350 = "ถ้าหมั่นดูแลให้ดีๆ\nก็ไม่มีทางถูกทรยศได้หรอก"
20014-360 = "การทำงานที่ล้มเหลว\nคือสิ่งที่เกิดขึ้นกับคนขี้เกียจ"
20014-370 = "คิดแล้วเชียวว่า\nคู่มือแบบกระดาษดีที่สุด"
20014-380 = "ไม่ต้องคอยชาร์จแบต\nแล้วก็ไม่ต้องห่วงว่าจะโดนแฮ็กด้วย"
20014-390 = "ถ้าเป็นพวกรุ่นพี่ละก็\nคงจัดการภารกิจง่ายๆ แบบนี้\nได้แบบไม่ยากแน่ๆ..."
20014-400 = "บางครั้งฉันก็โกรธ\nความอ่อนด้อยของตัวเอง..."
20014-410 = "ปะ...เปล่าสักหน่อย!\nฉะ...ฉันแค่ถอดมันออก\nเพราะมันเป็นปัญหาตอนปฏิบัติการ..."
20014-420 = "สุขสันต์วันเกิดนะคุณครู\nไม่มีของอะไร\nที่อยากได้เลยเหรอ?"
20014-430 = "อ๊ะ... วันเกิดฉัน\nคุณครูจำได้ด้วยสินะ..."
20014-440 = "ขอบคุณนะคุณครู"
20014-450 = "ถ้าไม่ได้ตรวจดูสมุดพก\nบางครั้งฉันก็ลืมไป\nบ้างเหมือนกันน่ะ..."
20014-460 = "ถ้าปีนี้พวกเรา...\nกลับไปที่สถาบัน SRT ได้ก็คงดี..."
20014-470 = "คริสต์มาส... ช่วงเวลา\nที่คนส่วนใหญ่ไม่ระวังตัว\nเราต้องระวังให้มากกว่านี้สิ"
20014-480 = "คุณครู... ใครทาหน้าลายพราง\nน่ากลัวๆ แบบนั้นให้น่ะ?"
20014-490 = "แต่งคอสเพลย์วันฮาโลวีน?\n\nมันคืออะไรน่ะ?"
20014-510 = "อึก... ฮึ่บบบ..."
20014-520 = "ชิ...ข้างใน...\nมันแน่นไปหมด\nไม่ยอมขยับเลย"
20014-530 = "ถ้าไม่ทำให้มันลื่นขึ้นอีก\nสักหน่อยละก็คงขยับไม่ได้แน่..."
20014-540 = "คุณครูช่วยไปหยิบ\nจาระบีที่วางอยู่ตรงนั้น...\nมาให้หน่อยฉันได้ไหม?"
20014-550 = "โอ๊ะ ตอนนี้...\nมันขยับได้แล้ว"
20014-560 = "ฮะฮะฮะ... ตอนที่ขัดสนิมออกแบบนี้\nมันทำให้รู้สึกดีสุดๆ เลยละ"
20014-570 = "อะไรนะ? ท่าขยับมือของฉัน\nมันน่าคิดไปไกลเลยไม่กล้ามอง\nตรงๆ งั้นเหรอ?"
20014-580 = "หะ...หา?! นี่เป็นงาน...\nบำรุงรักษาอุปกรณ์ที่ศักดิ์สิทธิ์นะ!\nพูดอะไรไร้สาระชะมัด?! คุณครูบ้า!"
20014-2600 = "ได้รับ RABBIT Type 26 Machine Gun\nเรียบร้อยแล้ว\nอืม ต้องรู้สึกถึงน้ำหนักปืนแบบนี้สิ\nถึงจะวางใจ..."

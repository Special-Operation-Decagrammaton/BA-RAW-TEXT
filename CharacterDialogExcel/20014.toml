20014-360 = "기능 고장은 게으름뱅이에게나\n일어나는 일이라고."
20014-370 = "역시 교범은 종이로\n된 게 제일이야."
20014-380 = "배터리를 충전할 필요도 없고,\n해킹의 염려도 없으니까."
20014-390 = "선배들이라면 이런\n단순한 당번 업무는 벌써\n끝내고도 남았을 텐데…"
20014-400 = "가끔은 내 미숙함이\n너무나도 분해…"
20014-410 = "아, 아니야! 이건 작전상의\n문제로… 아주 잠깐\n벗고 있는 것 뿐이니까…!"
20014-420 = "생일 축하해, 선생님.\n뭔가 선물로 받고\n싶은 건 없어?"
20014-430 = "……아, 생일.\n기억해 주고 있었구나."
20014-440 = "고마워, 선생님."
20014-450 = "나도 수첩을 자주 확인하지\n않으면, 종종 잊어버리곤\n한단 말이지…"
20014-460 = "올해는 SRT 특수학원으로\n돌아갈 수 있었으면…"
20014-470 = "크리스마스… 이렇게 대부분의\n사람들이 방심하는 때일수록,\n더 철저히 경계를 해야지."
20014-480 = "선생님, 그 끔찍한 안면\n위장은 누구에게 받은 거야?"
20014-490 = "…할로윈 코스프레?\n그게 뭔데?"
20014-510 = "…으읏, 으으읏…"
20014-520 = "…쳇. 내부가\n뻑뻑해서 그런지,\n조금도 움직이질 않아."
20014-530 = "좀 더,\n미끄럽게 만들지 않으면…"
20014-540 = "선생님,\n그쪽에 있는 윤활유 좀\n여기로 가져다줄래?"
20014-550 = "오, 이제야 좀 괜찮네."
20014-560 = "하아아… 이렇게\n녹을 벗겨내고 있을 때가\n제일 기분 좋아…"
20014-570 = "…뭔가 손동작이 신경 쓰여서,\n똑바로 쳐다볼 수 없다고?"
20014-580 = "하, 하아아?! 이건 신성한\n포구 수입 작업이라고! 무슨\n헛소리야, 이 바보가!"
20014-2600 = "RABBIT 26식 기관총, 수령 완료.\n…음, 역시 이 무게가 느껴져야 안심이 돼."

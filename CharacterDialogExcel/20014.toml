[translation]
20014-10 = "블루 아카이브!"
20014-20 = "SRT 특수학원,\nRABBIT 소대의 소라이 사키다.\n그래서, 샬레의 작전 교범은 어디에 있지?"
20014-30 = "다들 기강이\n잔뜩 빠져서…\n한심한 모양새야."
20014-40 = "어딜 가나 바보들 뿐이군."
20014-50 = "아무리 휴식 중이라도\n최소한의 군기는\n유지해야……"
20014-60 = "(이 물건의 사용법이\n적힌 매뉴얼은\n어디에…?)"
20014-70 = "(뭐야, 저거. 교범에서도\n본 적 없는데……)"
20014-80 = "……아, 선생님이었나."
20014-90 = "웬 수상한 사람이 얼굴을\n내밀기에 하마터면 쏠 뻔했네."
20014-100 = "……늦었잖아.\n작전 중의 1분 1초는\n생명과도 직결된다는 사실을\n벌써 잊어버린 거야?"
20014-110 = "…장난을 칠 시간이 있으면\n업무에 집중해."
20014-120 = "옛말에도 있지만,\n총기는 좋은 친구와 같아서."
20014-130 = "제대로 관리하면,\n배신하는 법이 없다고 하지."
20014-140 = "기능 고장은 게으름뱅이에게나\n일어나는 일이라고."
20014-150 = "역시 교범은 종이로\n된 게 제일이야."
20014-160 = "배터리를 충전할 필요도 없고,\n해킹의 염려도 없으니까."
20014-170 = "…안되는 건 안 돼.\n작전 중에 철모를\n벗을 수 있을 리가 없잖아."
20014-180 = "선배들이라면 이런\n단순한 당번 업무는 벌써\n끝내고도 남았을 텐데…"
20014-190 = "가끔은 내 미숙함이\n너무나도 분해…"
20014-200 = "생일 축하해, 선생님.\n뭔가 선물로 받고\n싶은 건 없어?"
20014-210 = "…내 철모?!\n지금 쓰고 있는 이거?"
20014-220 = "그, 그건 아무리…\n선생님의 명령이라도…!"
20014-230 = "……아, 생일.\n기억해 주고 있었구나."
20014-240 = "고마워, 선생님."
20014-250 = "나도 수첩을 자주 확인하지\n않으면, 종종 잊어버리곤\n한단 말이지…"
20014-260 = "올해는 SRT 특수학원으로\n돌아갈 수 있었으면…"
20014-270 = "크리스마스… 이렇게 대부분의\n사람들이 방심하는 때일수록,\n더 철저히 경계를 해야지."
20014-280 = "선생님, 그 끔찍한 안면\n위장은 누구에게 받은 거야?"
20014-290 = "…할로윈 코스프레?\n그게 뭔데?"
20014-300 = "……아, 선생님이었나."
20014-310 = "웬 수상한 사람이 얼굴을\n내밀기에 하마터면 쏠 뻔했네."
20014-320 = "……늦었잖아.\n작전 중의 1분 1초는\n생명과도 직결된다는 사실을\n벌써 잊어버린 거야?"
20014-330 = "…장난을 칠 시간이 있으면\n업무에 집중해."
20014-340 = "옛말에도 있지만,\n총기는 좋은 친구와 같아서."

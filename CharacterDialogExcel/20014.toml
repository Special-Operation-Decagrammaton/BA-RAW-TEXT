[translation]
20014-10 = "Blue Archive!"
20014-20 = "SRT Academy, RABBIT Squad's Sorai Saki. So, where's the Schale operation manual?"
20014-30 = "Everyone lacks discipline... It's a pity."
20014-40 = "There are stupidheads everywhere I go."
20014-50 = "Even if you're on a break, you should always be vigilant."
20014-60 = "(Where's the manual for using this thing?)"
20014-70 = "(What is that? It wasn't in the manual...)"
20014-80 = "Oh, it's you, Sensei."
20014-90 = "I thought it was an intruder. I almost shot you."
20014-100 = "...You're late. Don't you know that even a split second can determine life and death?"
20014-110 = "...If you have time to joke around, you should focus on our mission."
20014-120 = "Guns are like good friends."
20014-130 = "As long as you manage them well, they won't betray you."
20014-140 = "Malfunctions only happen to lazy people."
20014-150 = "Paper manuals are the best."
20014-160 = "No need to charge a battery, and there's no fear of hacking."
20014-170 = "...No means no. Why would I take my helmet off during a mission?"
20014-180 = "The upperclassmen would have already finished such a simple task by now."
20014-190 = "Sometimes, I get so frustrated with my immaturity..."
20014-200 = "Happy birthday, Sensei. Is there anything you want?"
20014-210 = "...My helmet?! The one on top of my head?"
20014-220 = "Th-That's... Even for your birthday..."
20014-230 = "...Oh, my birthday? You remembered."
20014-240 = "Thank you, Sensei."
20014-250 = "I refer to my notes a lot. Otherwise, I'd forget everything."
20014-260 = "I hope we can return to the SRT this year..."
20014-270 = "Christmas... We need to be more vigilant about security, especially since people tend to let their guards down during the holidays."
20014-280 = "Sensei, where did you get that terrible disguise?"
20014-290 = "...Halloween cosplay? What's that?"

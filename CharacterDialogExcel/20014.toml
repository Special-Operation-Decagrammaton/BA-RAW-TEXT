[translation]
20014-10 = "蔚藍檔案！"
20014-20 = "我是SRT特殊學園，\nRABBIT小隊的空井咲希。\n所以，夏萊的教戰手冊在哪裡？"
20014-30 = "大家的心態\n都老是很鬆散\n……真沒出息。"
20014-40 = "放眼望去都一副呆頭呆腦的模樣。"
20014-50 = "就算是在休息，\n也該維持住\n最低限度的軍紀……"
20014-60 = "（這個東西的\n使用說明書\n在哪裡……？）"
20014-70 = "（那是什麼？在教戰手冊中\n也沒看過……）"
20014-80 = "……啊，是老師啊。"
20014-90 = "突然冒出一個奇怪的人\n害我差點就開槍了。"
20014-100 = "……太慢了。\n作戰時每分每秒都攸關生死，\n你已經忘了嗎？"
20014-110 = "……有時間開玩笑的話，\n不如去專心工作。"
20014-120 = "俗話說，槍支就像好朋友。"
20014-130 = "只要真誠面對，\n就絕對不會背叛。"
20014-140 = "會發生功能故障，\n就證明持有者是個懶惰蟲。"
20014-150 = "教戰手冊果然還是要做成紙本。"
20014-160 = "不需要充電，\n也不用擔心被駭客攻擊。"
20014-170 = "……不行就是不行。\n哪有人會在\n作戰中脫掉鋼盔。"
20014-180 = "換作是前輩們，\n一定能更有效率地完成\n這種程度的值班任務……"
20014-190 = "有時真覺得\n自己的不成熟好丟臉……"
20014-200 = "生日快樂，老師。\n你想要什麼禮物嗎？"
20014-210 = "……咦，我的鋼盔？！\n現在戴著的這個？"
20014-220 = "就，就算是\n老師的命令也不行……！？"
20014-230 = "……啊，生日。\n你有記得啊？"
20014-240 = "謝謝你，老師。"
20014-250 = "我如果沒有常常\n確認手冊的話，\n也總是會忘記……"
20014-260 = "希望今年可以\n可以回到SRT特殊學園……"
20014-270 = "聖誕節……像這種多數人\n都會掉以輕心的時候，\n更需要徹底做好戒備。"
20014-280 = "……老師，你那個低水準的\n偽裝是跟誰拿來的？"
20014-290 = "萬聖節的角色扮演……？\n那是什麼？"
20014-300 = "……啊，是老師啊。"
20014-310 = "突然冒出一個奇怪的人\n害我差點就開槍了。"
20014-320 = "……太慢了。\n作戰時每分每秒都攸關生死，\n你已經忘了嗎？"
20014-330 = "……與其有時間開玩笑，\n不如專心在任務上。"
20014-340 = "俗話說，槍支就像好朋友。"
20014-350 = "只要真誠面對，\n就絕對不會背叛。"
20014-360 = "會發生功能故障，\n就證明持有者是個懶惰蟲。"
20014-370 = "教戰手冊果然還是要做成紙本。"
20014-380 = "不需要充電，\n也不用擔心被駭客攻擊。"
20014-390 = "換作是前輩們，\n一定能更有效率地完成\n這種程度的值班任務……"
20014-400 = "有時真覺得\n自己的不成熟好丟臉……"
20014-410 = "不，不是那樣！\n我這是因為作戰上的問題……\n暫時脫下來而已！"
20014-420 = "生日快樂，老師。\n你想要什麼禮物嗎？"
20014-430 = "……啊，生日。\n你有記得啊？"
20014-440 = "謝謝你，老師。"
20014-450 = "我如果沒有常常\n確認手冊的話，\n也總是會忘記……"
20014-460 = "希望今年可以\n可以回到SRT特殊學園……"
20014-470 = "聖誕節……像這種多數人\n都會掉以輕心的時候，\n更需要徹底做好戒備。"
20014-480 = "……老師，你那個低水準的\n偽裝是跟誰拿來的？"
20014-490 = "萬聖節的角色扮演……？\n那是什麼？"
20014-510 = "嗯，呃呃呃……！"
20014-520 = "……呿。\n是裡面堵住了嗎，\n完全拔不出來。"
20014-530 = "得要\n潤滑一下才行……"
20014-540 = "老師，\n可以把放在那邊的潤滑油\n拿給我嗎？"
20014-550 = "哦，好像\n可以了……？"
20014-560 = "啊……\n這種把鏽除掉的瞬間，\n真是太愉悅了……"
20014-570 = "……你說很在意我的手勢，\n所以有點無法直視？"
20014-580 = "啊啊啊啊！？\n這可是神聖的整備作業啊！\n在說什麼啊笨蛋！？"
20014-2600 = "RABBIT26式機關槍，確實收到了。\n……嗯，果然還是這個重量才讓人放心。"

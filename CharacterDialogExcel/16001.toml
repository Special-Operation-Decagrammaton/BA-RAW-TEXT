[translation]
16001-10 = "Blue Archive!"
16001-20 = "ลุยไปกับนายท่าน! ในวันที่แสนสนุก!\nมาลุยไปด้วยกันเลย!"
16001-30 = "อืม เสื้อดูคับๆ จัง\nน้ำหนักขึ้นรึเปล่านะ?\nหรือว่าไม่ใช่นะ...?"
16001-40 = "น่าเบื่อจัง~\nมีหนังสือการ์ตูน\nให้อ่านมั้ยนะ?"
16001-50 = "ลั้ลลัลลา~"
16001-60 = "ลั้ลลัลลา~ วันนี้ดูเหมือน~\nจะมีเรื่องดีๆ เกิดขึ้นเลยน้า~\nนายท่านก็คิดเหมือนกันใช่มั้ย?~"
16001-70 = "นายท่าน~ รีบมาสิ~\nฉันจะทำให้นายท่านรู้สึกดีเอง!"
16001-80 = "อ๊ะ?! นายท่านนี่นา!\nจะทานข้าว~ อาบน้ำ~ หรือว่า...\nฮ่าๆ!"
16001-90 = "คุณครู! ไม่สิ นายท่าน!\nเชิญเลย! วันนี้ก็มาพยายามเต็มที่นะ!"
16001-100 = "ไม่ว่าภารกิจแบบไหนก็จะ\nลุยไม่ยั้งเลย! ถ้าเป็นฉันกับ\nนายท่านล่ะก็ ไม่มีปัญหาแน่ๆ!"
16001-110 = "สวัสดี! นายท่าน! วันนี้ก็จะ\nบริการนายท่านให้เต็มที่เลยล่ะ!"
16001-120 = "อยากมาเจอฉันเหรอ? ใช่มั้ยล่ะ?"
16001-130 = "นายท่านชอบฉันใช่มั้ยล่ะ!"
16001-140 = "ถ้าเป็นงานทำความสะอาด\nหรือซักผ้าล่ะก็ ไว้ใจได้เลย!"
16001-150 = "ฉันจะเช็ดให้สะอาดหมดจดเอง!"
16001-160 = "มีภารกิจละ~\nเอาละๆ นายท่าน!\nรีบไปทำภารกิจกันเถอะ!"
16001-170 = "หยุดพัก? เรื่องนั้นไม่จำเป็นหรอก!\nไปเที่ยวกันดีกว่า!"
16001-180 = "วันเกิดของนายท่าน\nขอให้มีความสุขที่สุดในโลกเลย!"
16001-190 = "นายท่าน! วันนี้น่ะ... เป็นวันเกิด\nของเมดคนสวยของนายท่านนะ!\nจะให้ของขวัญอะไรเหรอ?"
16001-200 = "ขอให้มีความสุขในวันปีใหม่ค่ะ\nนายท่านของฉัน\nปีนี้ก็ฝากเนื้อฝากตัวด้วยนะคะ..."
16001-210 = "แบบนี้แหละ!\nทั้งปีนี้แล้วก็ปีหน้าด้วย!\nฉันจะทำให้นายท่านมีความสุขที่สุด!"
16001-220 = "เมอร์รี คริสต์มาส\nเมดคนนี้จะทำหน้าที่แทนลุงซานต้า\nฉันจะมอบของขวัญให้นายท่านเอง~"
16001-230 = "ของขวัญก็คือ... ฮุฮุ~"
16001-240 = "ว้าว~! ฮาโลวีนละ!\nดูสิๆ นายท่าน!\nบนถนนมีคนเยอะแยะเลย!\nรีบไปกันเถอะ!"
16001-260 = "ฮิฮิ...\nขึ้นมาบนตัวนายท่านแล้วละ!"
16001-270 = "อื้อ! รู้สึกตัวเบาๆ...\nถ้าเป็นตอนนี้ละก็ รู้สึกว่า\nไม่ว่าอะไรก็ทำได้ทุกอย่างเลย!"
16001-280 = "อืม ว่ายังไงดีน้า~\nความรู้สึกแบบนี้..."
16001-290 = "ก็นะ... เป็นไงๆ! แต่นแต๊น~!\nฟื้นคืนชีพกลับมาเป็น\nอาสึนะจังคนเดิมแล้ว! "
16001-300 = "นี่ก็เป็นเพราะนายท่าน\nช่วยเอาไว้สินะ ขอบคุณนะ!"
16001-310 = "ฮิฮิ ว่าแล้วเชียว\nมีนายท่านอยู่ข้างๆ แบบนี้\nใจเต้นตึกตักๆ เลยละ-"
16001-320 = "จะว่ายังไงดีนะ...\nคงติดเป็นนิสัยไปแล้วแน่ๆ!"
16001-330 = "เพราะงั้นจากนี้ไป...\nก็มาทำแบบนี้กันบ่อยๆ นะ...\nเข้าใจมั้ย?"
16001-340 = "ฝากเนื้อฝากตัวด้วยนะ\nนายท่านของอาสึนะ!"
16001-2600 = "นายท่าน! ดูสิๆ!\nอาวุธใหม่มาถึงแล้ว!\nดูเงางามสวยมากๆ เลยใช่มั้ยล่ะ?!"

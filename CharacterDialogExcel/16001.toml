[translation]
16001-10 = "蔚藍檔案！"
16001-20 = "和主人一起！\n開始快樂的一天吧！"
16001-30 = "唔嗯…衣服好緊。\n我變胖了嗎？\n還是又…？"
16001-40 = "好閒喔～\n有什麼漫畫書嗎～？"
16001-50 = "哼哼哼～♪"
16001-60 = "啦啦啦～總覺得今天\n好像會發生什麼好事～\n主人也這麼覺得吧？"
16001-70 = "主人，歡迎你來～\n我會讓你打起精神！"
16001-80 = "啊！是主人！\n你要吃飯～洗澡～？\n還是…耶嘿嘿！"
16001-90 = "老師！不對，主人！\n你好呀！今天也\n一起加油吧！"
16001-100 = "不管是什麼任務都儘管來吧！\n只要是我和主人的話就沒問題！"
16001-110 = "你好！主人！\n今天也會盡全力服侍你哦！"
16001-120 = "來見我了嗎？\n是那樣沒錯吧？"
16001-130 = "果然主人喜歡我呢！"
16001-140 = "打掃和洗衣的話交給我！"
16001-150 = "我會不留痕跡的收拾乾淨！"
16001-160 = "有任務進來了唷～\n來吧來吧，主人！\n趕快去解決吧！"
16001-170 = "休息？不需要那種東西！\n比起這個來一起玩吧！"
16001-180 = "主人的生日\n我要世界第一盛大的慶祝！"
16001-190 = "主人！今天是主人的\n可愛女僕的生日唷！\n要給我什麼禮物呢？"
16001-200 = "祝您新年快樂，\n我的主人。\n今年也請多多指教…"
16001-210 = "開玩笑的！\n今年和明年\n都會帶給你最好的快樂！"
16001-220 = "聖誕快樂！\n代替聖誕老人，\n女僕來送禮物給主人了唷！"
16001-230 = "至於禮物是什麼呢…\n呵呵。"
16001-240 = "哇啊！是萬聖節！\n你看你看！主人！\n城鎮也充滿了活力！\n趕快去看看吧！"
16001-260 = "…呵呵，\n跳到主人身上了！"
16001-270 = "嗯，身體好輕盈，\n感覺現在什麼都做的到！"
16001-280 = "唔嗯，\n該怎麼形容呢？\n這種感覺…"
16001-290 = "…算了，無所謂！鏘！\n平常的明日奈醬，復活！"
16001-300 = "這都是託主人的福唷，\n謝謝你！"
16001-310 = "呵呵。果然只要像這樣\n待在主人的身邊，\n內心就會十分雀躍呢。"
16001-320 = "……總覺得好像，\n有點上癮呢！"
16001-330 = "所以之後\n偶爾也要像這樣…\n可以嗎？"
16001-340 = "請多多指教，我的主人！"
16001-2600 = "主人！你看你看！\n新的武器送來了！\n閃閃發光的很可愛吧！？"

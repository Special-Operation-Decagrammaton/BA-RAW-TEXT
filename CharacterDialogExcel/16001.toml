[translation]
16001-10 = "블루 아카이브!"
16001-20 = "주인님과 함께! 신나는 하루! 시작하는 거야!"
16001-30 = "음. 옷이 꽉 끼는데.\n살찐 걸까?\n아니면 또…?"
16001-40 = "심심한 걸~\n만화책은\n없으려나."
16001-50 = "흥흥흥~♪"
16001-60 = "랄라라~ 오늘은 뭔가~\n좋은 일이 있을 것 같은 기분~\n주인님도 그렇지?~"
16001-70 = "주인님~ 어서 와~\n내가 기운 나게 해줄게!"
16001-80 = "앗! 주인님이다!\n식사~ 목욕~ 아니면….\n에헤헤!"
16001-90 = "선생님! 아니 주인님!\n어서 와! 오늘도 함께 열심히 하자!"
16001-100 = "어떤 미션이든 와보라지!\n나랑 주인님이라면 문제 없어!"
16001-110 = "안녕! 주인님!\n오늘도 힘껏 봉사해줄게!"
16001-120 = "날 만나러 온 거야? 그렇겠지?"
16001-130 = "역시 주인님은 날 좋아해!"
16001-140 = "청소와 세탁이라면 맡겨줘!"
16001-150 = "흔적조차 남지 않게 해줄게!"
16001-160 = "임무가 왔어~\n자자, 주인님!\n빨리 해결하러 가자!"
16001-170 = "휴식? 그런 거 필요 없어!\n그보다 같이 놀자아!"
16001-180 = "주인님의 생일을\n세상에서 제일 축하해!"
16001-190 = "주인님! 오늘은 주인님의\n예쁜 메이드의 생일이야!\n선물은 뭘 해줄 거야?"
16001-200 = "새해 복 많이 받으세요,\n나의 주인님.\n올해도 잘 부탁드려요…"
16001-210 = "랄까나!\n올해도 내년도!\n최고로 즐겁게 해줄게!"
16001-220 = "메리 크리스마스!\n산타 대신, 메이드가 주인님께\n선물을 주러 왔어요~"
16001-230 = "선물이 뭐냐면… 후훗~"
16001-240 = "와아! 할로윈이다!\n봐봐! 주인님!\n거리에 활기가 가득해!\n어서 나가보자!"
16001-260 = "…후훗,\n주인님께 올라타 버렸다!"
16001-270 = "응! 몸도 가볍고,\n지금은 뭐든\n할 수 있을 거 같아!"
16001-280 = "음. 뭘까나~ 이 느낌…."
16001-290 = "…뭐, 어때! 쨔안-!\n언제나의 아스나 쨩으로, 부활!"
16001-300 = "이것도 다 주인님 덕이겠지?\n고마워!"
16001-310 = "후후. 역시 이렇게\n주인님 곁에 있으니,\n두근두근한걸-."
16001-320 = "……뭐랄까 좀,\n습관이 될 지도!"
16001-330 = "그러니까 앞으로도\n종종 이런 식으로……\n알겠지?"
16001-340 = "잘 부탁해, 나의 주인님!"
16001-2600 = "주인님! 봐봐!\n새로운 무기가 도착했어!\n번쩍번쩍해서 귀엽지?!"

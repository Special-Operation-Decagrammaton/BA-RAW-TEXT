[translation]
16001-10 = "Blue Archive!"
16001-20 = "A fun life with my new master begins today!"
16001-30 = "Hmm. My clothes feel tight again. Did I gain weight? Or is it because...?"
16001-40 = "Boring! I wonder if there's any manga around here."
16001-50 = "Hmm hmm hmmm. ♪"
16001-60 = "La la la! I have a good feeling about today! You can feel it too, right, Master?"
16001-70 = "Master! Welcome! Let me cheer you up!"
16001-80 = "Oh, it's the master! Care for a meal? Want to wash up? Or would you like... Heehee!"
16001-90 = "Sensei! I mean, Master! Welcome! Let's give today our all!"
16001-100 = "I'm not afraid of any mission! Together, Master and I can handle anything!"
16001-110 = "Hey, Master! I'm here to serve you with everything I have, just like always!"
16001-120 = "You came to see me, right?"
16001-130 = "I knew I was Master's favorite!"
16001-140 = "Leave cleaning and washing to me!"
16001-150 = "There's no stain I can't get out!"
16001-160 = "We have a mission! Come on, Master! Let's take care of it right away!"
16001-170 = "Rest? Nope, I'm good to go! Let's play together instead!"
16001-180 = "Master, I wish you the happiest birthday in the world!"
16001-190 = "Guess what, Master! Today is your beautiful maid's birthday! So...what did you get me?"
16001-200 = "Happy New Year, Master. Here's to another year together..."
16001-210 = "And the next year and the year after that and the year after that! I'll make sure you're happy every year!"
16001-220 = "Merry Christmas! Your faithful maid has played the part of Santa and come bearing gifts!"
16001-230 = "Those gifts are... Heehee!"
16001-240 = "Whoa, it's Halloween! Look, Master! Look at how lively the streets are! We need to join them!"
16001-260 = "Heehee, I got on top of Master!"
16001-270 = "My body! It feels so light! Anything is possible!"
16001-280 = "Hmm... This feeling...?"
16001-290 = "Oh well, who cares! Ta-da! Asuna is back and ready for action!"
16001-300 = "This is all thanks to you, Master! Thank you!"
16001-310 = "Haha, having Master by my side makes my heart go wild!"
16001-320 = "I could really get used to this!"
16001-330 = "So...let's just keep it up, okay?"
16001-340 = "Best of luck to us both, my master!"
16001-2600 = "Master! Look! A new weapon arrived! Isn't it shiny and pretty?!"

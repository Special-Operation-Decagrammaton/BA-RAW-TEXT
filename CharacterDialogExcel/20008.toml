[translation]
20008-10 = "블루 아카이브"
20008-20 = "게헨나 학원 선도부 소속 선임행정관 아마우 아코.\n앞으로의 업무 협력, 모쪼록 잘 부탁드리겠습니다."
20008-30 = "과연…\n뭐, 나쁘지 않은\n시설이네요."
20008-40 = "샬레와의\n다음 제휴업무는…"
20008-50 = "부장님…밥은 잘 챙겨\n드시고 있을까요?"
20008-60 = "다들 어째 태평해 보이는\n분위기네요. 뭐,\n아무래도 좋은 일이지만…"
20008-70 = "여차하면 이곳을 그냥…\n아니, 그러면\n부장님이 곤란해하시겠죠.\n그만두도록 하죠."
20008-80 = "아, 오셨군요, 선생님.\n그럼 업무를 시작할까요?"
20008-90 = "다 끝낼 때까지는,\n돌아가실 수 없으니까 말이죠?"
20008-100 = "어라, 선생님.\n생각보다 빨리 오셨네요?\n뭐, 그건 칭찬해드리죠."
20008-110 = "선생님?\n손이 놀고 있네요?"
20008-120 = "야근이라도 하신다면\n제 퇴근도 늦어지니까\n곤란한데요."
20008-130 = "…좀처럼 진척되지를 않네요."
20008-140 = "하아, 어쩔 수 없군요."
20008-150 = "저도 도와드리겠습니다."
20008-160 = "지금부터는 식사는 물론이고,\n화장실 갈 때도 포함해서\n전부 제가 관리할 테니까요,\n제 말대로 해주세요."
20008-170 = "설마, 불만이라든지\n없으시지요?"
20008-180 = "어라, 하니까\n되시잖아요?"
20008-190 = "…잠깐만요. 선생님?\n설마 싶기는 한데…"
20008-200 = "조금전까지만 해도\n땡땡이를 쳤단 말인가요…!?"
20008-210 = "힘드실 땐 제게 말씀해주세요.\n그걸 케어하는 것 또한,\n저의 역할이니까요."
20008-220 = "생신, 축하드립니다. 선생님.\n후후. 모처럼이니,\n일주일 전부터 완벽한\n일정을 짜놓았답니다."
20008-230 = "일말의 낭비도 없는\n완벽한 하루,\n약속드리겠어요."
20008-240 = "제 생일…이요?"
20008-250 = "하아. 선생님.\n그런 것보다 중요한 일정이…"
20008-260 = "네? 생일보다\n중요한 일이란 건\n없다… 고요?"
20008-270 = "또 이런 식으로…\n뭐, 일단은\n감사하도록 하죠."
20008-280 = "새해 복 많이 받으세요.\n선생님."
20008-290 = "새해라고 해도 하는 일이\n변하는 건 아니지만요, 뭐,\n조금쯤은 도와드릴게요."
20008-300 = "자아, 선생님.\n크리스마스 이브를 저와\n함께 보내시지 않으시겠어요?"
20008-310 = "…이 많은 일을 전부\n해결하지 못하면\n퇴근은 없다는 뜻이랍니다."
20008-320 = "할로윈, 과자를\n주고 받는 날이던가요."
20008-330 = "…뭐, 일하려면,\n당분 섭취 정도는 필요하고…\n선생님도, 어떠신가요…?"
20008-350 = "으으으……\n어쩌다 이런 꼴이……"
20008-360 = "이 굴욕, 절대로\n잊지 않을 거니까요……!"
20008-370 = "엣?\n기, 기다려 주세요!\n이 이상은 약속과\n다르지 않나요!?"
20008-380 = "사, 산책!?\n제정신인가요!? 이대로!?"
20008-390 = "그, 그건 확실히……"
20008-400 = "죄, 죄송해요……\n조금 분위기를 너무\n타 버렸어요……"
20008-410 = "저, 저기……\n언제까지 이렇게 있어야\n하는 건가요……?"
20008-2600 = "정말이지, 이런 대담한 어프로치를 태연하게…\n뭐, 좋아요.\n당신의 눈앞에 있는 학생이 얼마나 우수한지,\n뼛속 깊이 알려드리죠."

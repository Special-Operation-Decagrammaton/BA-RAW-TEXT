[translation]
20008-10 = "Blue Archive。"
20008-20 = "我是隸屬於格黑娜學園風紀委員會的行政官天雨亞子。\n今後在業務合作上請務必多多指教。"
20008-30 = "原來如此……\n嘛，設備\n還不算太差。"
20008-40 = "下一個和夏萊\n的合作業務是…"
20008-50 = "委員長…有好好\n按時吃飯嗎？"
20008-60 = "總覺得這裡的氣氛\n輕飄飄的呢……\n嘛，雖然無所謂……"
20008-70 = "必要的時候就……\n不，那麼做的話，\n委員長會很困擾吧。\n暫時先放棄吧。"
20008-80 = "哎呀，您好呀老師。\n那麼就開始工作吧？"
20008-90 = "在事情做完之前\n請別以為能夠回去哦？"
20008-100 = "哎呀，老師。\n來得比預期還早呢？\n這點就稱讚您一下吧。"
20008-110 = "老師？\n您的手是不是停下來了？"
20008-120 = "如果要加班的話，\n我也得更晚回去，\n這樣我會很困擾的。"
20008-130 = "……沒什麼進展呢。"
20008-140 = "唉，真沒辦法。"
20008-150 = "我也來幫忙吧。"
20008-160 = "從現在開始，不只吃飯\n連去洗手間的時間，\n全部都由我來管理，\n請依照我的話去做。"
20008-170 = "您應該沒有什麼不滿吧？"
20008-180 = "什麼嘛，想做\n還是做得到的嘛！"
20008-190 = "話說老師，您該不會……"
20008-200 = "到剛才為止都在偷懶……！？"
20008-210 = "如果累了請馬上告訴我哦。\n負責提供照顧，\n也是我應盡的職責。"
20008-220 = "生日快樂，老師。\n呵呵，為了難得的今天，\n我從一週前\n就安排好了完美的行程。"
20008-230 = "就讓今天\n成為無懈可擊，\n非常完美的一天吧。"
20008-240 = "我的，生日……？"
20008-250 = "……老師，現在還有\n很多比那個更重要的工作──"
20008-260 = "咦？沒有比我的生日\n更重要的工作……？"
20008-270 = "又說這種話……\n好吧，姑且還是\n感謝您一下。"
20008-280 = "新年快樂，老師。"
20008-290 = "就算是新年，\n工作還是和往常一樣。\n沒辦法，就稍微幫點忙吧。"
20008-300 = "來吧老師，和我\n一起度過聖誕夜吧？"
20008-310 = "……不把這麼大量的\n工作做完，可是\n想回也回不去的哦。"
20008-320 = "萬聖節是互相\n交換零食的日子呢。"
20008-330 = "嘛，要工作的話\n的確需要攝取一點糖分…\n老師要不要也吃一點呢？"
20008-350 = "嗚嗚，這副模樣……！"
20008-360 = "這份屈辱，\n我絕對不會忘記的……！"
20008-370 = "咦！？\n請，請等一下！\n這和約好的不一樣吧！？"
20008-380 = "散，散步！？\n您是認真的嗎！？\n就現在這副模樣！？"
20008-390 = "那，那實在是有點……"
20008-400 = "對，對不起……\n我有點得意忘形了……"
20008-410 = "那，那個……\n要維持這樣\n到什麼時候才行呢……？"
20008-2600 = "真是的，這種大膽的交涉居然\n若無其事地就……好吧。\n現在在眼前的學生是多麼優秀，\n就讓您深刻體會吧。"

[translation]
20008-10 = "Blue Archive"
20008-20 = "I'm Amau Ako, the senior administrator of the Gehenna Academy Prefect Team. I look forward to our future cooperation."
20008-30 = "Hmm. The facilities here...pass, I suppose."
20008-40 = "The schedule for the next coordinated task between Schale and the Prefect Team is..."
20008-50 = "The head prefect... Do you think she's eating well?"
20008-60 = "Things are pretty easygoing around here. Well, it's probably a good thing."
20008-70 = "If need be, the Prefect Team can take over... No, that would put the head prefect on the spot. What a shame."
20008-80 = "Ah, you're here, Sensei. So, shall we start our tasks?"
20008-90 = "And please don't think about going back until you're done, okay?"
20008-100 = "Hello, Sensei. You're here earlier than I expected. That's commendable!"
20008-110 = "Sensei? Don't you think you should get to work?"
20008-120 = "It would be a shame if you have to put in overtime yet again. I don't want that either."
20008-130 = "We've barely made progress."
20008-140 = "*sigh* It can't be helped I guess."
20008-150 = "I'll help as well."
20008-160 = "Starting now, I will manage everything from your meal time to your bathroom breaks, so please do as I say."
20008-170 = "No complaints, right?"
20008-180 = "So, you can do it when it comes down to it!"
20008-190 = "Wait a sec. Sensei? Does that mean..."
20008-200 = "Were you slacking off until now?!"
20008-210 = "Let me know if you need any help. Assisting is what I'm here to do."
20008-220 = "Happy birthday, Sensei. Heehee. I already planned today's perfect schedule a week ago."
20008-230 = "I promise you an immaculate day in which not even a minute is wasted."
20008-240 = "My...birthday?"
20008-250 = "*sigh* Sensei. There are more important things scheduled than that..."
20008-260 = "Huh? There's nothing more important than my birthday?"
20008-270 = "You're so forward. Well, I mean, I'll still say thank you, though."
20008-280 = "Happy New Year, Sensei!"
20008-290 = "Of course, even if it's a new year, there are still tasks to do, right? Allow me to help."
20008-300 = "Would you like to spend Christmas Eve with me, Sensei?"
20008-310 = "In other words, you can't leave work until you finish all of your overdue tasks."
20008-320 = "Is Halloween a day where people give each other snacks?"
20008-330 = "It's been a while, so would you like to get some sweets with me?"
20008-350 = "Ugh... I can't believe this happened."
20008-360 = "I will never forget this humiliation!"
20008-370 = "Ah! Please wait! Any more than this is different than what we agreed on!"
20008-380 = "A walk? Now? Like this?!"
20008-390 = "Th-That's definitely..."
20008-400 = "S-Sorry... I meant to tease you a little, but it got out of hand..."
20008-410 = "H-How long do I have to be like this?"
20008-2600 = "A daring approach...but okay. I'll show you myself what a talented student I am."

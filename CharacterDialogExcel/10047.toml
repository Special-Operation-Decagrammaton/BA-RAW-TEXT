[translation]
10047-10 = "블루~~ …아카이브?"
10047-20 = "아까 전에… 바닷가에서 성큼성큼\n걸어가는 꽃게 씨를 발견했어.\n선생님, 같이 보러 갈래?"
10047-30 = "시~원~해~"
10047-40 = "와아, 이건….\n아이스크림?"
10047-50 = "이 근처에,\n꽃게 씨의 집을\n만들자~"
10047-60 = "손수건 OK,\n모종삽 OK….\n응, 이걸로 모래성,\n만들 수 있겠네."
10047-70 = "음양부의 모두랑\n모래뺏기 게임\n같은 게 하고 싶네~"
10047-80 = "어서 와. 선생님~\n오늘은 어쩐 일이야?"
10047-90 = "선생님, 오랜만이야…."
10047-100 = "어? 오랜만이라고\n할 정도는 아니야?\n그럼 어디부터가 오랜만이야?"
10047-110 = "이번 여름엔,\n좀 더 좋은 하이쿠를…."
10047-120 = "최근, 새로운\n하이쿠를 지어봤어.\n듣고 싶어?"
10047-130 = "응, 알았어."
10047-140 = "여름이 오고\n뜨겁고 차가워서\n맛있어졌네."
10047-150 = "모처럼 여름이고,\n좀 더 반짝반짝\n빛나는 걸…."
10047-160 = "응, 뭘 찾고 있냐고?"
10047-170 = "…뭘까나?"
10047-180 = "사람은 열심히 하면\n빛이 난다고 들었어."
10047-190 = "도대체, 어디가\n빛나는 걸까?"
10047-200 = "…이마?"
10047-210 = "오늘이, 선생님 생일이야?"
10047-220 = "그럼 바로 생일 축하해~\n선생님~ 오늘 같은 날이\n있으니까, 나는\n선생님을 만날 수 있었어…."
10047-230 = "응, 기적 같은 일이네~"
10047-240 = "내 생일…?\n고마워, 선생님."
10047-250 = "아, 그러고 보니,\n니야 부장이 선생님을\n불러오라고 했었어.\n뭔가, 축하 파티를 한대."
10047-260 = "…어, 내 생일 파티?\n그런 거야?"
10047-270 = "새해 복 많이 받아~\n올해도 잘 부탁해~\n선생님."
10047-280 = "선생님,\n메리 크리스마~스."
10047-290 = "나는 올해,\n착한 아이였을까?\n그랬다면,\n나마하게는 안 오겠네~"
10047-300 = "응? 좀 달라?"
10047-310 = "트릭 오어 트릿~"
10047-320 = "선생님은 어느 쪽? 트릭?\n그럼 나, 오어를 할래."
10047-330 = "…트릿은 누가 하는 걸까?"
10047-350 = "선생님? 왜 그래?"
10047-360 = "얼굴이 빨간데-?"
10047-370 = "괜찮다면, 상관없지만-"
10047-380 = "그보다 선생님\n여기 봐봐. 여기."
10047-390 = "거북이 씨의 등껍질은~\n엄청 딱딱한데-"
10047-400 = "사실 꼬리 부분은,\n말랑말랑해.\n말랑말~랑"
10047-410 = "어때?\n선생님도 만져볼래?\n말랑말랑하다구."
10047-420 = "선생님?\n여기야- 여기?"
10047-430 = "지금은 살짝 곤란해…?"
10047-440 = "…왜? 어째서?\n선생님~?"
10047-2600 = "이거, 주는 거야?\n와~ 고마워~ 그럼 다음엔,\n내가 줄 차례인가~?\n답례, 기대하고 있어~"

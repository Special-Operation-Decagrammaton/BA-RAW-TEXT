[translation]
10047-10 = "蔚藍～～…檔案？"
10047-20 = "剛才…在海邊發現了\n唰唰走著的梭子蟹先生。\n老師，要一起去看嗎？"
10047-30 = "真涼快～"
10047-40 = "哇，這是…\n冰淇淋？"
10047-50 = "在這附近，蓋一個\n梭子蟹先生的家吧。"
10047-60 = "手帕OK，鏟子OK…\n嗯，這樣就能\n堆一座沙堡了。"
10047-70 = "想要和陰陽部的\n大家一起在沙堆上\n玩倒桿比賽。"
10047-80 = "歡迎回來，老師\n今天怎麼樣呀～？"
10047-90 = "老師，好久不見…"
10047-100 = "咦，還不算好久不見？\n那多久才算好久不見？"
10047-110 = "這個夏天，\n要寫出更好的俳句…"
10047-120 = "最近，\n我做了新的俳句。\n想聽聽看嗎？"
10047-130 = "嗯，我知道了。"
10047-140 = "夏天到來了\n有點熱又有點冷\n真是好吃呢"
10047-150 = "難得的夏天，\n更閃閃發光的東西…"
10047-160 = "咦，你問我在找什麼？"
10047-170 = "…是什麼呢？"
10047-180 = "聽說人如果在努力\n就會發出光芒…"
10047-190 = "到底是哪裡\n會發光呢？"
10047-200 = "…額頭嗎？"
10047-210 = "今天是，老師的生日嗎？"
10047-220 = "那就馬上祝你生日快樂，老師～\n因為有了這一天\n我才能遇見老師…"
10047-230 = "嗯，像奇蹟一樣呢。"
10047-240 = "我的，生日…？\n謝謝你，老師。"
10047-250 = "啊，這麼說來，\n仁耶部長要我\n請老師過去唷。\n好像要辦慶祝派對之類的。"
10047-260 = "…咦，我的生日派對？\n是那樣嗎？"
10047-270 = "新年快樂～\n今年也請多多指教哦，老師。"
10047-280 = "老師，聖誕節快～樂。"
10047-290 = "我今年是個乖孩子嗎？\n這樣的話，就不會\n有生剝鬼來了吧。"
10047-300 = "咦，有點不對嗎？"
10047-310 = "Trick or Treat～"
10047-320 = "老師是哪邊呢？Trick？\n那我就當or吧。"
10047-330 = "…那誰要當Treat呢？"
10047-350 = "老師，你怎麼了？"
10047-360 = "臉很紅唷？"
10047-370 = "沒事就好。"
10047-380 = "比起那個，老師，\n看這裡，這裡。"
10047-390 = "烏龜先生的背殼，\n雖然非常的硬～"
10047-400 = "但其實尾巴的部分，\n是軟綿綿的。\n軟綿綿～"
10047-410 = "如何？\n老師也要摸摸看嗎？\n軟綿綿的唷。"
10047-420 = "老師？\n是這裡唷，這裡。"
10047-430 = "現在有點\n傷腦筋…？"
10047-440 = "…為什麼？怎麼了？\n老師～？"
10047-2600 = "這是要給我的嗎？\n哇～謝謝～\n那下次就輪到我囉～？\n我的回禮，請你期待哦～"

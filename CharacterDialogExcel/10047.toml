[translation]
10047-10 = "Blue Archive?"
10047-20 = "A moment ago...I found Mister Crab walking on the beach. Sensei, do you wanna go see him together?"
10047-30 = "So cool!"
10047-40 = "Wow, this is...ice cream?"
10047-50 = "Let's make a house for Mister Crab around here!"
10047-60 = "Handkerchief, check. Trowel, check... We can make a sand castle with these."
10047-70 = "I wanna play in the sand with everyone at the Yin-Yang Club."
10047-80 = "Welcome, Sensei. What brings you here today?"
10047-90 = "Sensei, long time no see."
10047-100 = "Huh? You don't think it's been that long? What's a long time then?"
10047-110 = "This summer, I want to write better haiku..."
10047-120 = "I wrote a new haiku. Wanna hear it?"
10047-130 = "Okay."
10047-140 = "Ice in midsummer\nThe cold feels so delicious\nUnderneath the sun"
10047-150 = "Waiting for summer\nExploring for something more\nThe sparkling of..."
10047-160 = "Huh? What am I looking for?"
10047-170 = "...What do you think?"
10047-180 = "I hear that people shine when they work hard."
10047-190 = "I wonder where that shine comes from?"
10047-200 = "...The forehead?"
10047-210 = "Is today your birthday, Sensei?"
10047-220 = "Then happy birthday! Sensei, because of today I was able to meet you and get to know you..."
10047-230 = "Yeah, it's like a miracle!"
10047-240 = "My birthday...? Thanks, Sensei."
10047-250 = "Oh, by the way, President Niya asked me to bring you. They're gonna party to celebrate."
10047-260 = "...Oh, my birthday party? Really?"
10047-270 = "Happy New Year! I'll be counting on you this year too, Sensei."
10047-280 = "Sensei. Merry Christmas."
10047-290 = "Was I a good kid? If I was, Krampus wouldn't exist!"
10047-300 = "Huh? It's a little different?"
10047-310 = "Trick or treat!"
10047-320 = "Which one do you want? \"Trick\"? Then, I'll take \"or.\""
10047-330 = "...So who's gonna take \"treat\"?"
10047-350 = "Sensei? What's wrong?"
10047-360 = "Why are you blushing?"
10047-370 = "If you're okay, that's all I care about."
10047-380 = "By the way, Sensei, look over here. Look."
10047-390 = "The shells of these turtles are so hard, but..."
10047-400 = "The tails are so fluffy. Fluffy!"
10047-410 = "What do you think? You wanna touch it? It's fluffy!"
10047-420 = "Sensei? Here, over here."
10047-430 = "It's not a good time...?"
10047-440 = "...Why is that? Sensei?"
10047-2600 = "Is this for me? Wow, thank you! Next time I'll give you something. I hope you're excited!"

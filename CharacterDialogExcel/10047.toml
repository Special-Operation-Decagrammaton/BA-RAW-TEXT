[translation]
10047-10 = "Blue~~ Archive!"
10047-20 = "เมื่อกี้... ฉันเห็นคุณปูม้ากำลังเดินเนิบนาบ\nอยู่ที่ชายทะเล คุณครูไปดูด้วยกันมั้ย?"
10047-30 = "สด~ชื่น~จัง~"
10047-40 = "ว้าวว นี่มันไอศกรีมเหรอ...?"
10047-50 = "พวกเรามาสร้างบ้าน\nให้คุณปูม้าตรงนี้กันเถอะ~"
10047-60 = "ผ้าเช็ดหน้า พร้อม\nพลั่วขุดดิน พร้อม\nเท่านี้เราก็มาก่อปราสาท\nทรายกันได้แล้วล่ะ"
10047-70 = "ฉันอยากจะแข่งเล่นเกม\nตักทรายกับสมาชิกชมรม\nหยินหยางทุกคนเลย"
10047-80 = "เชิญเลย คุณครู~\nวันนี้มาทำอะไรที่นี่เหรอ?"
10047-90 = "ไม่ได้เจอกันนานเลยนะ คุณครู..."
10047-100 = "หืม? คุณครูคิดว่าไม่ได้นาน\nขนาดนั้นงั้นเหรอ? แล้วแค่ไหน\nถึงเรียกว่านานล่ะ?"
10047-110 = "ฤดูร้อนคราวนี้\nอยากจะแต่งกลอนไฮกุดีๆ..."
10047-120 = "ไม่นานมานี้ ฉันเพิ่งแต่ง\nกลอนไฮกุใหม่มา อยากฟังมั้ย?"
10047-130 = "อืม เข้าใจแล้ว"
10047-140 = "ฤดูร้อนมาเยือน\nทั้งอบอ้าวและเย็นชื่น\nกลมกล่อมกว่าเดิม"
10047-150 = "คิมหันตฤดูวนมาอีกครั้ง\nระยิบระยับกว่าครั้งไหน\nเป็นประกายแวววาว..."
10047-160 = "หืม ฉันหาอะไรอยู่งั้นเหรอ?"
10047-170 = "หาอะไรนะ...?"
10047-180 = "ได้ยินว่าเพียงเรามีความเพียรพยายาม\nก็จะสามารถเปล่งประกายได้..."
10047-190 = "สงสัยจังว่ามันจะเปล่งประกาย\nที่ตรงไหนกันนะ?"
10047-200 = "หน้าผากเหรอ...?"
10047-210 = "วันนี้ วันเกิดคุณครูเหรอ?"
10047-220 = "สุขสันต์วันเกิดนะ คุณครู~\nเพราะมีวันนี้ ฉันถึงได้มาพบ\nกับคุณครู..."
10047-230 = "อืม เหมือนปาฏิหาริย์เลยนะ~"
10047-240 = "วันเกิดของฉัน...?\nขอบคุณนะคุณครู"
10047-250 = "จริงสิ หัวหน้านิยะบอกให้ฉัน\nเรียกคุณครูไปหาน่ะ เห็นว่าจะ\nจัดปาร์ตี้ฉลองอะไรสักอย่างน่ะ"
10047-260 = "งานวันเกิดของฉันเหรอ?\nจริงเหรอ?"
10047-270 = "สวัสดีปีใหม่นะ~\nปีนี้ก็ขอฝากตัวด้วย คุณครู~"
10047-280 = "คุณครู เมอร์รีคริสต์มาส~"
10047-290 = "ปีนี้ฉันเป็นเด็กดีรึเปล่านะ?\nถ้าฉันเป็นเด็กดีละก็\nภูตนามาฮาเกะก็คงไม่มาสินะ~"
10047-300 = "หืม? แตกต่างนิดหน่อยเหรอ?"
10047-310 = "ทริก ออร์ ทรีต~"
10047-320 = "คุณครูจะเลือกอะไร?\nทริกเหรอ? ถ้างั้นฉันเลือก \"ออร์\""
10047-330 = "แล้วใครจะเลือกทรีตล่ะ...?"
10047-350 = "คุณครู เป็นอะไรเหรอ?"
10047-360 = "ทำไมถึงหน้าแดงเชียว?"
10047-370 = "ถ้าคุณครูบอกว่าไม่เป็นอะไร\nก็คงไม่เป็นอะไรจริงๆ"
10047-380 = "แต่ว่านะคุณครู\nดูนี่สิ นี่น่ะ"
10047-390 = "กระดองของคุณเต่า~\nมันแข็งมากๆ เลย"
10047-400 = "แต่ที่จริงตรงส่วนหางน่ะ\nมันนุ่มนิ่มๆ นะ นู่มมม~ นิ่ม"
10047-410 = "คุณครูคิดว่ายังไงล่ะ?\nคุณครูก็ลองจับดูหน่อยมั้ย?\nบอกแล้วว่ามันนุ่มนิ่มมากๆ"
10047-420 = "คุณครู ทางนี้ ตรงนี้ล่ะ"
10047-430 = "ตอนนี้คงไม่เหมาะงั้นเหรอ?"
10047-440 = "ทำไมล่ะ...?\nมีอะไรเหรอ? คุณครู~?"
10047-2600 = "อันนี้ให้ฉันเหรอ? ว้าว~\nขอบคุณนะ~ งั้นคราวหน้า\nฉันจะเอามาให้คุณครูบ้างนะ\nตั้งตารอได้เลย~"

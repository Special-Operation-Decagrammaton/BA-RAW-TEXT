[translation]
20003-20 = "정의실현부 1학년 마시로, 부름에 따라 이곳에.\n미숙한 몸이지만, 언제나 전력을 다하겠습니다."
20003-30 = "이런 장식,\n츠루기 선배는\n싫어하려나…."
20003-40 = "하스미 선배의 날개,\n이 가구처럼 폭신해 보였지."
20003-50 = "명경지수…."
20003-60 = "츠루기 선배의 목은\n괜찮은 걸까…?"
20003-70 = "가끔은 이런 곳도\n나쁘지 않네요."
20003-80 = "예뻐라….\n후훗."
20003-90 = "어서 오세요, 선생님.\n오늘도 함께 정의를 위해 힘내죠."
20003-100 = "기다리고 있었습니다.\n바로 명령을."
20003-110 = "어라, 출격입니까?"
20003-120 = "부르셨습니까, 선생님?"
20003-130 = "저희 정의실현부의 목표는"
20003-140 = "악을 처단하고 이 학원에\n정의를 바로 세우는 것"
20003-150 = "…입니다"
20003-160 = "정의를 실현하기 위해서는"
20003-170 = "괴로운 훈련도,\n마음을 깎아내는 시련도"
20003-180 = "감내하겠다고 맹세했습니다만…."
20003-190 = "선배들과 함께 하는\n시간은 너무나도 즐거워서…."
20003-200 = "외람되지만 무심코 정의를\n잊어버릴 것만 같습니다."
20003-210 = "저…. 혹시나 해서\n드리는 말씀입니다만…"
20003-220 = "지금 만지고 계신 것은\n작전용 콘솔이 아닙니다…."
20003-230 = "생신 축하드립니다, 선생님."
20003-240 = "선생님의 하루에 정의가\n충만하길 기원하겠습니다."
20003-250 = "그렇군요.\n오늘이 제 생일이었군요."
20003-260 = "무심코 잊고 있었습니다."
20003-270 = "배려해 주신 점,\n감사드립니다."
20003-280 = "새해가 밝았군요.\n올해야말로"
20003-290 = "이 땅에서 불의를 완전히\n몰아낼 수 있도록 노력하겠습니다."
20003-300 = "트리니티의\n성스러운 날이로군요."
20003-310 = "이런 날에도 게헨나의 악당들은\n어떤 상스러운 짓을 벌이고 있을지…."
20003-320 = "트리니티의 모든 성인을\n기리는 축일이 밝았습니다."
20003-330 = "호박 귀신이요…?\n나쁜 꿈이라도 꾸셨습니까?"
20003-350 = "후우…\n오늘따라 날씨가 무덥군요."
20003-360 = "완벽한 저격을 위해서라면\n이 정도의 더위는 충분히\n감내할 수 있습니다."
20003-370 = "조금…\n땀 냄새가 나지는 않으려나…."
20003-380 = "이런 여름날에는 다른 학우들의\n하얀 교복이 그립네요."
20003-390 = "선생님…\n어쩐지 시선이 음흉합니다만…."
20003-400 = "제대로 적을 주시하고\n계신 게 맞으시지요?"
20003-2600 = "이것이야말로…\n진짜 정의…"

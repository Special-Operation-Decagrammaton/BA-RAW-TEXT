[translation]
20003-20 = "นักเรียนชั้นปีที่ 1 ชมรมทวงความยุติธรรม\nมาที่นี่ตามคำสั่งแล้วค่ะ ถึงฉันยังไม่โตเป็นผู้ใหญ่\nแต่ก็จะพยายามทำให้เต็มที่ค่ะ"
20003-30 = "ตกแต่งแบบนี้...\nรุ่นพี่ซึรุกิ\nอาจจะไม่ชอบก็ได้นะ..."
20003-40 = "ปีกของรุ่นพี่ฮาสุมิ\nดูนุ่มฟูเหมือนของตกแต่ง\nอันนี้เลย"
20003-50 = "เยือกเย็นเหมือนน้ำ..."
20003-60 = "คอของรุ่นพี่ซึรุกิ\nจะไม่เป็นอะไรใช่มั้ยนะ...?"
20003-70 = "บางที สถานที่แบบนี้ก็...\nไม่ได้แย่เท่าไรนะ"
20003-80 = "สวยจังเลย\nฮุฮุ"
20003-90 = "เชิญค่ะคุณครู วันนี้ก็มาพยายาม\nเพื่อความยุติธรรมกันเถอะค่ะ"
20003-100 = "กำลังรออยู่เลยค่ะ\nคำสั่งก็คือ..."
20003-110 = "เอ๋? บุกโจมตีเหรอคะ?"
20003-120 = "เรียกฉันเหรอคะ คุณครู?"
20003-130 = "เป้าหมายของชมรมทวง\nความยุติธรรมก็คือ"
20003-140 = "การลงโทษกลุ่มคนที่ชั่วร้าย\nและนำความยุติธรรมกลับคืนมา..."
20003-150 = "ยังโรงเรียนแห่งนี้"
20003-160 = "เพื่อรักษาความยุติธรรมเอาไว้"
20003-170 = "ฉันสาบานว่าจะอดทน\nต่อการฝึกฝนที่ทรหด\nต่อให้เป็นการฝึกฝน..."
20003-180 = "ที่ทำให้รู้สึกทรมานหัวใจก็ตาม..."
20003-190 = "ช่วงเวลาที่ได้อยู่ร่วมกัน\nกับพวกรุ่นพี่เป็นช่วงเวลาที่สนุกมาก..."
20003-200 = "ถึงจะพูดแบบนี้ก็เถอะ\nแต่บางครั้งก็เหมือนจะลืมเรื่อง\nความยุติธรรมไปสนิทเลย..."
20003-210 = "ฉัน... คือว่า...\nฉันแค่พูดเผื่อเอาไว้นะคะ..."
20003-220 = "สิ่งที่คุณครูกำลังสัมผัสอยู่ตอนนี้\nไม่ใช่คอนโซลควบคุมการปฏิบัติการ\nหรอกนะคะ..."
20003-230 = "สุขสันต์วันเกิดค่ะ คุณครู"
20003-240 = "ขอให้วันนี้คุณครู\nมีแต่ความยุติธรรมนะคะ"
20003-250 = "แบบนี้นี่เอง\nวันนี้เป็นวันเกิดของฉันสินะคะ"
20003-260 = "ฉันลืมไปซะสนิทเลยค่ะ"
20003-270 = "การที่คุณครูใส่ใจฉันแบบนี้...\nขอบคุณมากเลยค่ะ"
20003-280 = "ปีใหม่แล้วสินะคะ\nในปีนี้"
20003-290 = "ฉันจะพยายามกำจัดความอยุติธรรม\nให้หมดสิ้นไปจากโลกนี้ให้ได้ค่ะ"
20003-300 = "วันแห่งความศักดิ์สิทธิ์\nของโรงเรียนทรีนิตี้"
20003-310 = "ในวันแบบนี้ พวกวายร้ายของ\nโรงเรียนเกเฮนน่า จะคิดวางแผน\nทำเรื่องชั่วร้ายอะไรกันอยู่อีกนะ..."
20003-320 = "งานเลี้ยงฉลองที่ผู้ใหญ่ในทรีนิตี้ทุกคน\nรอคอยได้มาถึงแล้วค่ะ"
20003-330 = "ผีฟักทองเหรอคะ...? \nคุณครูฝันร้ายเหรอคะ?"
20003-350 = "ฮู่ว...\nวันนี้อากาศร้อนจริงๆ เลยนะคะ"
20003-360 = "สำหรับการเป็นสุดยอดนักแม่นปืน\nความร้อนขนาดนี้ ทนได้สบายอยู่แล้วค่ะ"
20003-370 = "ฉันคง... ไม่ได้มีกลิ่นเหงื่อ\nออกมาใช่ไหมนะ..."
20003-380 = "ในหน้าร้อนแบบนี้\nนึกถึงชุดนักเรียนสีขาว\nของโรงเรียนเลยนะคะ"
20003-390 = "คุณครู... คือสายตาของคุณครู...\nมันน่ากลัวนิดหน่อยนะคะ"
20003-400 = "ตอนนี้คุณครูกำลังจับตาดูศัตรูอยู่\nใช่มั้ยคะ?"
20003-2600 = "นี่ก็คือความยุติธรรม...\nที่แท้จริง..."

[translation]
20003-20 = "實現正義部1年級生麻白，\n因為收到呼喚而前來。\n雖然還不夠成熟，但會隨時全力以赴的。"
20003-30 = "這樣的裝潢，\n弦生前輩\n會喜歡嗎…"
20003-40 = "蓮實前輩的翅膀，\n看起來跟家具一樣鬆鬆軟軟的。"
20003-50 = "心如止水…"
20003-60 = "弦生前輩的脖子\n沒事吧…？"
20003-70 = "偶爾來這種地方\n也不錯。"
20003-80 = "好漂亮…\n呵呵。"
20003-90 = "歡迎，老師。\n今天也一起，\n為了正義\n加油吧。"
20003-100 = "恭候您的光臨。\n請馬上下令。"
20003-110 = "啊，要出擊嗎？"
20003-120 = "您叫我嗎，老師？"
20003-130 = "我們實現正義部\n的目標"
20003-140 = "是消滅邪惡，\n重建這個學園的"
20003-150 = "…正義"
20003-160 = "為了實現正義，"
20003-170 = "不管是痛苦的訓練\n還是打擊心靈的考驗，"
20003-180 = "我發誓都會熬過去…"
20003-190 = "不過跟前輩們在一起的\n時光實在太開心了…"
20003-200 = "雖然很冒昧，\n但好像情不自禁地\n忘記了正義。"
20003-210 = "那個…保險起見\n還是跟您說一下…"
20003-220 = "您現在摸的\n不是作戰用的\n控制台…"
20003-230 = "祝您生日快樂，\n老師。"
20003-240 = "希望老師的一天\n充滿正義。"
20003-250 = "這樣啊。原來\n今天是我的生日…"
20003-260 = "我完全忘記了。"
20003-270 = "謝謝您的關心。"
20003-280 = "新年快樂。\n今年，"
20003-290 = "我會更加努力地，\n將這個地方的邪惡\n完全趕走。"
20003-300 = "是三一的\n神聖之日呢。"
20003-310 = "即使是這樣的日子，\n格黑娜的惡黨們\n也會犯下惡行嗎…"
20003-320 = "紀念三一\n所有聖人的節日\n開始了。"
20003-330 = "南瓜怪…？\n做惡夢了嗎？"
20003-350 = "呼…\n今天特別熱呢。"
20003-360 = "如果是為了完美的狙擊的話，\n這種程度的炎熱\n完全是可以忍耐的。"
20003-370 = "不過會不會有點…\n汗臭味呢…？"
20003-380 = "每次遇到這種天氣，\n我都很羨慕其他學生們穿的\n白色制服。"
20003-390 = "老師…\n我怎麼覺得你的視線\n好像有點下流…"
20003-400 = "你有好好的盯著目標\n對吧？"
20003-2600 = "這才是…\n真正的正義…"

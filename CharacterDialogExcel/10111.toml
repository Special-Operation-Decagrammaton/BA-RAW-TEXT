[translation]
10111-10 = "블루 아카이브!"
10111-20 = "밀레니엄 사이언스 스쿨 미카모 네루,\n지금 도착했다고…\n앙? 이 옷?\n이상하다는 거냐?"
10111-30 = "(뭐야 저거? \n엄청 멋있잖아?!)"
10111-40 = "뭐, 나쁘지 않네.\n좀 쉴까."
10111-50 = "걸치고 있는 게\n없으니 허전하네."
10111-60 = "선생은\n언제쯤 오려나……"
10111-70 = "오! 이 가구는 좀 \n마음에 드는데?\n부실에도\n가져다 놓을까?"
10111-80 = "선생! 왔구만!"
10111-90 = "아앙? 딱히 기다린 건 아닌데?!"
10111-100 = "왜 그렇게 죽상이야?"
10111-110 = "힘내라고!\n내가 옆에 있어 줄 테니까!"
10111-120 = "뭔~가, 근질근질하단 말이지…"
10111-130 = "평소랑 달라서 그렇겠지만."
10111-140 = "하아… 상의가\n그립구만."
10111-150 = "아앙? 교복을 입으니까\n얌전해진 것 같다고?"
10111-160 = "오늘따라 기운이\n없는 것뿐이라고!"
10111-170 = "뭣……?!\n교복이 잘 어울려……?!"
10111-180 = "칭찬해도 아무것도\n안 나와, 선생!"
10111-190 = "뭐 시킬 일 없어?"
10111-200 = "아니…… 이왕 교복을 입었으니\n책상에 앉아야 할 것 같은\n기분이라."
10111-210 = "이 차림으로\n가장 마음이 놓이는 장소……?"
10111-220 = "하, 지금은 여기 같은데?"
10111-230 = "선생, 생일 축하해!"
10111-240 = "모처럼이니 놀러 나갈까?"
10111-250 = "하핫! 역시 기억하고 있었나!"
10111-260 = "고마워!"
10111-270 = "새해 복 많이 받아, 선생."
10111-280 = "응? 이 옷?"
10111-290 = "뭐어, 선생이\n어울린다고 했으니까……"
10111-300 = "새해에는 가끔 입어볼까,\n생각했을 뿐이야."
10111-310 = "크리스마스 선물이라……"
10111-320 = "그렇지, 선생,\n내 스카잔 입어 볼래?"
10111-330 = "지금은 교복이니까 난 괜찮거든!"
10111-340 = "교복…… 다른 녀석들한테는\n평범한 옷이겠지만,\n나한텐 할로윈 의상\n같은 거라고."
10111-360 = "오! 이거 봐, 선생!\n완전 별 게 다 있어!"
10111-370 = "응? 왜 그렇게 봐?"
10111-380 = "아~. 난 또.\n그야 당연하지."
10111-390 = "지금은 C&C도 아니고,\n선생과는 선후배 같은\n관계도 아니잖아."
10111-400 = "여기에 아는 사람 같은 건\n없고 말이야."
10111-410 = "지금 정도는,\n괜찮지 않냐고."
10111-420 = "아니면 뭐야,\n혹시……"
10111-430 = "평소처럼 하는 게\n더 좋은가?"
10111-440 = "하하! 그렇게\n말할 줄 알았어!"
10111-450 = "뭐, 그렇게\n시간 여유가 있는 것도\n아니니까……"
10111-460 = "슬슬 가보자고!\n다음은 저기다!"
10111-2600 = "따지고 보면 별다를 거 없는 상황인데\n왠지 모르게 특별한 느낌이 드네.\n……뭐, 상관없겠지!\n선생이랑 나 사이니까!"

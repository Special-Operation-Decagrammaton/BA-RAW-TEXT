[translation]
10111-10 = "Blue Archive!"
10111-20 = "มิคาโมะ เนรุ จากโรงเรียนวิทย์มิลเลเนียม\nเพิ่งมาถึงเมื่อกี้เลย... หืม? ชุดนี้น่ะเหรอ?\nมันแปลกรึไง?"
10111-30 = "(นั่นอะไรน่ะ?\nอย่างเจ๋งเลย!)"
10111-40 = "อืม ก็ไม่แย่เท่าไรนะ\nพักผ่อนสักหน่อยมั้ย?"
10111-50 = "พอไม่มีเสื้อคลุม\nก็รู้สึกว่างเปล่าแฮะ"
10111-60 = "ครูจะมาเมื่อไรนะ..."
10111-70 = "เฟอร์นิเจอร์อันนี้ถูกใจ\nฉันจัง ยกไปวางไว้ที่\nห้องชมรมดีมั้ยนะ?"
10111-80 = "ครู! มาแล้วเหรอ!"
10111-90 = "หืม? ฉันไม่ได้รออยู่สักหน่อย?!"
10111-100 = "ทำไมทำหน้าหมดแรงงั้นล่ะ?"
10111-110 = "สู้เค้าสิ!\nฉันจะอยู่ข้างๆ เอง!"
10111-120 = "รู้สึก~ คันไม้คันมือแปลกๆ จัง..."
10111-130 = "คงเพราะตอนนี้ฉันต่างจากปกติน่ะ"
10111-140 = "เฮ้อ... คิดถึง\nซูคาจันจังเลย"
10111-150 = "หืม? พอใส่ชุดนักเรียน\nเหมือนว่าฉันจะเรียบร้อยขึ้นเหรอ?"
10111-160 = "วันนี้ฉันแค่\nไม่ค่อยมีแรงเท่านั้นแหละ!"
10111-170 = "ว่าไงนะ...?!\nชุดนักเรียนเข้ากับฉันเหรอ...?!"
10111-180 = "ถึงจะชมกัน\nฉันก็ไม่เหลิงหรอกนะครู!"
10111-190 = "ไม่มีอะไรให้ฉันทำเหรอ?"
10111-200 = "เปล่าหรอก... ก็พอใส่ชุดนักเรียน\nก็รู้สึกเหมือนต้องนั่งทำงานที่โต๊ะน่ะ"
10111-210 = "ที่ที่ฉันสบายใจได้ที่สุด\nตอนอยู่ในชุดนี้น่ะเหรอ...?"
10111-220 = "ตอนนี้ก็น่าจะที่นี่นะ?"
10111-230 = "สุขสันต์วันเกิดนะครู!"
10111-240 = "งั้นเราออกไปเที่ยวเล่นกันมั้ย?"
10111-250 = "ฮ่าฮ่า! จำได้ด้วยสินะ!"
10111-260 = "ขอบคุณนะ!"
10111-270 = "สวัสดีปีใหม่นะครู"
10111-280 = "หืม? ชุดนี้น่ะเหรอ?"
10111-290 = "ก็... ครูบอกว่า\nมันเข้ากับฉันไม่ใช่เหรอ..."
10111-300 = "ฉันแค่คิดว่าลองใส่\nตอนปีใหม่ดูดีมั้ยน่ะ"
10111-310 = "ของขวัญคริสต์มาสเหรอ..."
10111-320 = "จริงสิ ครู\nลองใส่ซูคาจันของฉันดูมั้ยล่ะ?"
10111-330 = "ฉันให้ยืมได้นะ ก็ตอนนี้ฉันใส่ชุดนักเรียนไง!"
10111-340 = "ชุดนักเรียน... สำหรับคนอื่นๆ\nคงเป็นชุดปกติธรรมดา\nแต่สำหรับฉันมันเหมือน\nชุดวันฮาโลวีนเลยละ"
10111-360 = "อะฮ่าฮ่าฮ่า! ที่นี่มีทุกอย่างเลยแฮะ!\nฉันถูกใจที่นี่จังเลยละ ครู!"
10111-370 = "หืม? อะไรกัน?\nทำไมจ้องกันขนาดนั้นเลย?"
10111-380 = "อ๋อ~ ฉันก็นึกว่าเรื่องอะไร\nมันก็แน่อยู่แล้วละ"
10111-390 = "ก็ตอนนี้ฉันไม่ใช่ทั้ง C&C\nแล้วก็ไม่ใช่รุ่นพี่ในโรงเรียนด้วยนี่นา"
10111-400 = "ที่นี่ก็ไม่มี\nใครที่รู้จักด้วย"
10111-410 = "ไหนจะยังไม่มีเด็กๆ ที่ฉันต้องคอยดูแลอีก\nแบบนี้ถือว่าดีเลยไม่ใช่เหรอ? ว่ามั้ย?"
10111-420 = "หรือว่าครูคิดว่า..."
10111-430 = "ฉันคนเดิมดีกว่าเหรอ?"
10111-440 = "ฮ่าฮ่า! อื้อ\nกะไว้แล้วละว่าต้องพูดแบบนั้น!"
10111-450 = "ถ้างั้นจะมาพูดอย่างนี้อยู่\nก็เสียดายเวลา..."
10111-460 = "งั้นเราไปต่อกันเถอะ!\nต่อไปเราไปตรงโน้นกันนะ!"
10111-2600 = "มาคิดๆ ดูมันก็ไม่ใช่วันที่มีอะไรพิเศษ\nแต่ทำไมรู้สึกพิเศษก็ไม่รู้นะ\nเอาเถอะ... ไม่เป็นไรหรอกน่า!\nครูกับฉัน เราคนกันเองอยู่แล้ว!"

[translation]
10111-10 = "蔚藍檔案！"
10111-20 = "千年科學學園的美甘寧瑠，\n已經抵達囉……\n啊？這套衣服？有什麼奇怪的嗎？"
10111-30 = "（那是什麼？好帥！）"
10111-40 = "嗯，還不錯。\n稍微休息一下吧。"
10111-50 = "有種靜不下來的感覺……\n是因為沒穿外衣嗎？"
10111-60 = "老師他什麼時候\n會來呢……？"
10111-70 = "哦，這個挺不錯的嘛！\n都想裝飾在部室裡了。"
10111-80 = "喲，老師！"
10111-90 = "啊？我，我可沒有在等你哦！？"
10111-100 = "為什麼垂頭喪氣的啊。"
10111-110 = "我不是在你身邊嗎！"
10111-120 = "總～覺得，\n有點癢癢的感覺……"
10111-130 = "可能是跟平常不一樣的關係吧。"
10111-140 = "唉……真想念\n上衣(絲卡將)啊。"
10111-150 = "啊？穿著制服\n變得比較順從？"
10111-160 = "怎麼可能！\n只是今天稍微\n有點沒精神而已。"
10111-170 = "什麼……\n制服很適合我……！？"
10111-180 = "就，就算稱讚我\n也沒有好處的哦！"
10111-190 = "老師，你有擅長教的科目嗎？"
10111-200 = "不是……怎麼說呢？\n只是難得穿上了制服，\n想說要不要念個書而已。"
10111-210 = "現在最能放心的地方……"
10111-220 = "就是這裡吧？"
10111-230 = "今天是老師的生日對吧？\n祝你生日快樂！"
10111-240 = "機會難得，\n要不要出去玩啊？"
10111-250 = "哈哈！你果然記得嗎！"
10111-260 = "謝謝你啦！"
10111-270 = "新年快樂，老師。\n今年也請多指教啦。"
10111-280 = "嗯？為什麼穿著制服？"
10111-290 = "畢竟……\n老師說過很適合我……"
10111-300 = "想說今天穿著也不錯而已。"
10111-310 = "聖誕節啊……"
10111-320 = "啊，對了。\n禮物就送我的\n絲卡將怎麼樣？"
10111-330 = "反正我現在也沒穿，\n你就穿穿看吧！"
10111-340 = "其他人雖然每天都穿著制服，\n不過對我來說，\n這就跟變裝沒兩樣。"
10111-360 = "哦！你看，老師！\n有好多東西耶！"
10111-370 = "嗯？怎麼了嗎？"
10111-380 = "啊～這個嘛……\n畢竟……"
10111-390 = "現在又不是C&C，\n跟老師也不是\n前輩後輩的關係。"
10111-400 = "這裡也沒有認識的人嘛。"
10111-410 = "至少這種時候，\n你就網開一面吧。"
10111-420 = "還是說，你果然……"
10111-430 = "比較喜歡平常那樣嗎？"
10111-440 = "哈哈！就知道你會這麼說！"
10111-450 = "那麼，既然時間\n也不是那麼充裕……"
10111-460 = "差不多該走囉！\n接下來是那邊！"
10111-2600 = "雖然仔細想想其實跟平常完全沒兩樣……\n總～覺得有股特別的感覺。\n……算了，反正我跟老師又不是別人，\n沒必要在意這種事吧！"

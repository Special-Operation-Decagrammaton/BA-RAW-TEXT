[translation]
10111-10 = "Blue Archive!"
10111-20 = "Mikamo Neru, from Millennium Science School. I just got here... Huh? This outfit? What, do you think it's weird?"
10111-30 = "(What's that? Cool!)"
10111-40 = "Well, all right. Maybe I'll take it easy for a bit."
10111-50 = "It feels odd, since I'm not wearing something over it."
10111-60 = "I wonder when Sensei will get here..."
10111-70 = "Oh! I like this furniture. Should I get one in the club room too?"
10111-80 = "Sensei! You're here!"
10111-90 = "I mean, not that I was waiting for you in particular."
10111-100 = "What's with the long face?"
10111-110 = "Cheer up! I'll stay by your side!"
10111-120 = "For some reason, I've been antsy..."
10111-130 = "I guess it's 'cause I'm not used to this."
10111-140 = "*sigh* I miss my bomber jacket."
10111-150 = "Haah? You think I seem calmer in my school uniform?"
10111-160 = "I'm just not feeling that energetic today!"
10111-170 = "What...?! The school uniform suits me...?!"
10111-180 = "Flattery will get you nowhere, Sensei!"
10111-190 = "Is there anything I can do for you?"
10111-200 = "Well...it feels like I ought to sit at a desk, since I'm wearing a school uniform."
10111-210 = "Hmm? Where do I feel most comfortable in this outfit...?"
10111-220 = "Here, for now."
10111-230 = "Happy birthday, Sensei!"
10111-240 = "Want to celebrate together?"
10111-250 = "Haha! You remembered!"
10111-260 = "Thanks!"
10111-270 = "Happy New Year, Sensei."
10111-280 = "What? This outfit?"
10111-290 = "Well, since you said it suits me..."
10111-300 = "I thought I would wear it from time to time this year."
10111-310 = "A Christmas gift..."
10111-320 = "Right, Sensei, wanna try my bomber jacket?"
10111-330 = "I'm fine, since I'm in my school uniform right now!"
10111-340 = "A school uniform... It might be regular wear for other people, but it's like a Halloween costume for me."
10111-360 = "Oh! Look at this, Sensei! There's so much good stuff around!"
10111-370 = "Huh? What's with that look?"
10111-380 = "Ah. I see. Well, of course."
10111-390 = "I'm not C&C, or anyone's senior, right now."
10111-400 = "And there's no one I know here."
10111-410 = "I don't have anyone to look after, so this much should be fine. Right?"
10111-420 = "Unless Sensei, by any chance..."
10111-430 = "Do you prefer the usual?"
10111-440 = "Haha! Yeah, I knew you'd say that!"
10111-450 = "Well, it's not like there's much time to spare..."
10111-460 = "Let's get going! Over there next!"
10111-2600 = "I suppose it's not much different from the usual, but it feels special somehow. ...Well, I guess it doesn't matter! Since it's between you and me, Sensei!"

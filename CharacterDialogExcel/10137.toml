[translation]
10137-10 = "브을루우~아카이~브~"
10137-20 = "수고하심다- 발키리 경찰학교,\n공안국의 시마 코노카임다.\n오늘 운세, 같이 보시겠슴까?"
10137-30 = "사아람들이-\n마않-구나아-"
10137-40 = "(자아,\n범죄자는…….\n뭐, 여기는 없나.)"
10137-50 = "엥? 내 뱃지……\n어디에 뒀지……."
10137-60 = "평화롭구만-\n아휴…… 재미없어."
10137-70 = "이거,\n법적으로 괜찮은 검까?"
10137-80 = "안녕하심까-\n식사는 하셨슴까?"
10137-90 = "못 본 사이에\n전과라도 생기셨슴까……"
10137-100 = "막 이래, 농담임다!"
10137-110 = "제가 없어도\n발키리는 괜찮슴다."
10137-120 = "오히려, 제가 거기 있으면\n범죄율이 확 늘게 됨다."
10137-130 = "자-꾸 시비 튼다고 해야 하나."
10137-140 = "그래서, 여기 있는 게 더 좋나?\n막 이럼다."
10137-150 = "선생님, 글솜씨 죽이네요~\n좋겠다아."
10137-160 = "그래도 저,\n시말서 하고 반성문 하나는\n진짜 잘 씀다."
10137-170 = "나중에 필요하면\n도와드리겠슴다!"
10137-180 = "흐흥, 음흠흠~"
10137-190 = "……티백, 갈아야지."
10137-200 = "30번 우리니까\n그냥 맹물 같네……."
10137-210 = "징계! 징계! 징계!"
10137-220 = "반복해서 듣다 보면\n웃기지 않슴까?"
10137-230 = "그만 좀 들어야 하는데……."
10137-240 = "선생님, 오늘 운세는\n어떠셨슴까?"
10137-250 = "선생님, 생신 축하드림다!"
10137-260 = "뭘 좋아하실지 모르니까,"
10137-270 = "지금부터 쇼핑 어떠심까!"
10137-280 = "해피 버~스데이~투~미~\n해피 버~스데이~투~미~"
10137-290 = "해피 버~스데이~\n디어 코노카~"
10137-300 = "선생님,\n새해 복 많이 받으십쇼!"
10137-310 = "올해 첫 양아치 단속,\n같이 가시죠~!"
10137-320 = "크리스마스 말임다……\n다들 좋은 게 좋다지만……"
10137-330 = "산타는 주거 침입 상습범 아님까?"
10137-340 = "아까 오는 길에\n사탕 안 주면\n장난친다는 검다."
10137-350 = "할로윈인 거 진작 말하지……."
10137-360 = "강도인 줄 알고\n수갑 채웠었슴다."
10137-380 = "아-아, 쫄딱 젖었네."
10137-390 = "으으…… 추워."
10137-400 = "비, 결국 내리기 시작했네요."
10137-410 = "밤까지 안 그칠 거라던데……\n하아……."
10137-420 = "뭐, 머리도 식히고 마침 좋슴다."
10137-430 = "네? 아아, 으음-"
10137-440 = "속상하지 않았다면,\n거짓말임다."
10137-450 = "이것저것 허탕 쳤고,\n쫄딱 젖어버렸고……."
10137-460 = "그래도, 운세대로 됐슴다."
10137-470 = "버디가 옆에 있으니,\n좋은 하루가 됐네요."
10137-480 = "……선생님 덕분임다."
10137-490 = "그러니, 어느 쪽이냐면-"
10137-500 = "행복합니다."
10137-510 = "……앗 아뇨, 그!"
10137-520 = "이렇게 비 피할 곳도 있어서\n럭키-! 그래서 행복하구나-\n라는 의미에서!"
10137-530 = "그, 그런 거…… 임다……."
10137-2600 = "아, 바로 이검다!\n이게 있으면 말을 길게 안 해도 됨다!"

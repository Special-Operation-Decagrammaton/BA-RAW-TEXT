[translation]
20027-10 = "Blue Archive."
20027-20 = "It's fishing time. Sensei."
20027-30 = "I don't think I can catch...anything here..."
20027-40 = "Is that...?"
20027-50 = "If only there were a fishing hole..."
20027-60 = "...Hm... Could we catch anything here?"
20027-70 = "...Huh? That sound..."
20027-80 = "Welcome, Sensei."
20027-90 = "You just got here...so maybe I shouldn't say this, but..."
20027-100 = "Let's go outside..."
20027-110 = "I've been waiting, Sensei."
20027-120 = "We don't get this kind of opportunity often."
20027-130 = "Let's make the most of it."
20027-140 = "Sensei, is there anything you want to do?"
20027-150 = "Should we go out and do something? Or are you hungry?"
20027-160 = "I wore this for you, Sensei."
20027-170 = "I'm going to catch a big one. Just wait."
20027-180 = "Air conditioners and fans are great, but..."
20027-190 = "...cooling off in the water is better."
20027-200 = "Sensei, do you know how to swim? Should I teach you?"
20027-210 = "Happy birthday, Sensei."
20027-220 = "A birthday meal... How does sashimi sound?"
20027-230 = "Ah! My birthday..."
20027-240 = "You remembered. Thank you, Sensei."
20027-250 = "It's the...new year. Happy New Year, Sensei."
20027-260 = "Yeah. Let's continue traveling together in the new year too."
20027-270 = "Christmas..."
20027-280 = "I thought the water would be warm...but it's very cold."
20027-290 = "...A little too cold."
20027-300 = "Halloween... I saw some people wearing pumpkins on their heads."
20027-310 = "...Should I try wearing one too?"
20027-330 = "I'm back, Sensei."
20027-340 = "Yes. I got it. Now, I can make the dish..."
20027-350 = "The dish I saw in the pamphlet, I mean."
20027-360 = "I've got my cookware ready. Everything's set."
20027-370 = "...I'm glad you came here with me."
20027-380 = "I might have given up if I was alone."
20027-390 = "Hmm... Not true. I was able to do this...and I was able to think like this..."
20027-400 = "Only...because you were watching over me."
20027-410 = "Thank you...Sensei."
20027-2600 = "Even at a place like this... Sensei is always the same. Thank you for always supporting...I mean, helping me."

[translation]
20027-10 = "Blue Archive"
20027-20 = "ได้เวลาไปตกปลาแล้วละ\nไปกันเถอะ คุณครู"
20027-30 = "ที่นี่น่ะ...\nคงจับอะไรไม่ได้หรอก"
20027-40 = "นั่นมัน...?"
20027-50 = "ถ้ามีบ่อตกปลาละก็..."
20027-60 = "อืม... จะจับอะไรได้ที่นี่บ้างนะ?"
20027-70 = "หืม...? เสียงเมื่อกี้นี้มัน..."
20027-80 = "มาแล้วเหรอคุณครู"
20027-90 = "พูดคำนี้กับคนที่เพิ่งมาถึง\nอาจดูไม่เหมาะเท่าไหร่..."
20027-100 = "...แต่ออกไปข้างนอกกันเถอะ"
20027-110 = "กำลังรออยู่เลย คุณครู"
20027-120 = "โอกาสแบบนี้ไม่ได้มีบ่อยๆ นี่นะ"
20027-130 = "เรามาลองทำสิ่งที่ทำได้\nให้ได้มากที่สุดเถอะ"
20027-140 = "คุณครูมีเรื่องอะไรที่อยากทำ\nงั้นเหรอ?"
20027-150 = "อยากออกไปทำอะไรที่ไหนมั้ย?\nหรือว่าหิวแล้วรึเปล่า?"
20027-160 = "ชุดนี้น่ะ ฉันใส่เพื่อคุณครูเลยนะ"
20027-170 = "อืม คอยก่อนล่ะ\nฉันจะจับปลาตัวใหญ่มาให้เอง"
20027-180 = "พัดลมหรือแอร์มันก็ดีอยู่หรอก..."
20027-190 = "...แต่ได้ลงไปว่ายน้ำเย็นๆ\nน่าจะดีกว่านะ"
20027-200 = "มาคิดดูแล้ว... คุณครูน่ะ\nว่ายน้ำเป็นรึเปล่า?\nให้ฉันสอนให้มั้ย?"
20027-210 = "สุขสันต์วันเกิดนะคุณครู"
20027-220 = "อาหารวันเกิด...\nเอาเป็นซาซิมิดีมั้ย?"
20027-230 = "อ่า... วันเกิดฉัน..."
20027-240 = "จำได้ด้วยสินะ\nขอบคุณนะ คุณครู"
20027-250 = "ปีใหม่...แล้วสินะ\nสุขสันต์วันปีใหม่นะ คุณครู"
20027-260 = "อืม ปีใหม่นี้ไว้พวกเรา...\nก็ไปหลายๆ ที่ด้วยกันนะ"
20027-270 = "ช่วงคริสต์มาส...."
20027-280 = "คิดว่าในน้ำน่าจะอุ่น...\nแต่มันเย็นสุดๆ เลย"
20027-290 = "...คงฝืนเกินไปสินะ"
20027-300 = "ฮาโลวีน...\nฉันเห็นคนใส่หัวฟักทองด้วยละ"
20027-310 = "...ฉันลองใส่บ้างดีมั้ยนะ"
20027-330 = "...คุณครู กลับมาแล้ว"
20027-340 = "...อืม สำเร็จแล้ว\nตอนนี้ก็ทำอาหารได้แล้ว"
20027-350 = "เมนูที่ฉันเห็นมาจากใบปลิวนั่นน่ะ"
20027-360 = "ฉันเตรียมอุปกรณ์ทำอาหารไว้แล้ว\nไม่ต้องห่วง"
20027-370 = "...โชคดีที่คุณครูมาด้วย"
20027-380 = "ถ้ามาคนเดียวละก็\nฉันอาจล้มเลิกไป\nกลางคันก็ได้"
20027-390 = "อืม... ไม่ใช่หรอก\nการที่ตอนนี้ฉันคิดได้แบบนี้"
20027-400 = "ทั้งหมดเป็นเพราะ\nมีคุณครูอยู่ด้วยไงล่ะ"
20027-410 = "...คุณครู ขอบคุณนะ"
20027-2600 = "แม้แต่ที่นี่เอง...\nคุณครูก็ยังเหมือนเดิมเลยนะ\nคอยสนับสนุน...ไม่สิ\nคอยช่วยกันตลอด ขอบคุณนะ"

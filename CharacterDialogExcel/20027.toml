[translation]
20027-10 = "블루 아카이브."
20027-20 = "출조의 시간이야, 선생님. 가자."
20027-30 = "여기서는…\n잡을 수 없겠어."
20027-40 = "저건…?"
20027-50 = "낚시터가 있다면…"
20027-60 = "…어라, 잡힐까?"
20027-70 = "…응? 방금 그 소리는…."
20027-80 = "왔구나, 선생님."
20027-90 = "오자마자 하는 말로는\n조금 안 맞을 수도 있지만…."
20027-100 = "…나갈까. 밖으로."
20027-110 = "기다리고 있었어. 선생님."
20027-120 = "자주 있는 기회가 아니니까."
20027-130 = "할 수 있는 것들을\n최대한 해보자."
20027-140 = "선생님, 뭐 하고 싶은 거 있어?"
20027-150 = "어딘가 가서, 뭐라도 할까?\n아니면 배고파?"
20027-160 = "이거, 선생님을 위해 입은 거야."
20027-170 = "응, 거물 잡아 올 테니까 기대해."
20027-180 = "에어컨이나\n선풍기도 좋지만…."
20027-190 = "물속이 더 좋은 것 같아."
20027-200 = "그러고 보니 선생님은,\n수영할 줄 알아? 가르쳐줄까?"
20027-210 = "생일 축하해, 선생님."
20027-220 = "생일상….\n생선회로도 괜찮아?"
20027-230 = "아, 생일…."
20027-240 = "기억하고 있었구나,\n고마워. 선생님."
20027-250 = "새해…구나.\n새해 복 많이 받아, 선생님."
20027-260 = "응. 새해에도 같이,\n여기저기 다니자."
20027-270 = "크리스마스…라."
20027-280 = "물속이 오히려 따듯하지…는 않지."
20027-290 = "…역시 무리일까."
20027-300 = "할로윈…\n호박 머리를 쓴 사람들을 봤어."
20027-310 = "…나도 써볼까."
20027-330 = "…다녀왔어, 선생님."
20027-340 = "…응. 성공했어.\n이걸로, 만들 수 있어."
20027-350 = "팸플릿에서 보았던,\n그 요리."
20027-360 = "요리도구도\n준비해 뒀으니까,\n문제없어."
20027-370 = "…선생님이 같이\n와 줘서 다행이야."
20027-380 = "혼자였다면, 도중에\n그만뒀을지도 몰라."
20027-390 = "으으응….\n그렇지 않아. 지금도,\n이걸 생각하게 된 계기도."
20027-400 = "전부…. 선생님이\n있어 줬기 때문."
20027-410 = "…선생님. …고마워."
20027-2600 = "이런 곳까지 와서도….\n선생님은 똑같구나.\n항상 지원…아니.\n…도와줘서, 고마워."

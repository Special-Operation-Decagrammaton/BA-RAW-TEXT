[translation]
20027-10 = "蔚藍檔案。"
20027-20 = "垂釣時間到了，老師。我們走吧。"
20027-30 = "在這裡…\n好像抓不到。"
20027-40 = "那是…？"
20027-50 = "如果有釣點的話…"
20027-60 = "…那個，能抓得到嗎？"
20027-70 = "…嗯？剛才的聲音是…"
20027-80 = "歡迎回來，老師。"
20027-90 = "雖然這種話\n可能不適合對\n才剛來的人說…"
20027-100 = "…要不要，到外頭去？"
20027-110 = "我在等你唷，老師。"
20027-120 = "畢竟這種機會\n不是每次都有。"
20027-130 = "能做的事會\n試著盡可能去做。"
20027-140 = "老師，有什麼想做的事嗎？"
20027-150 = "有沒有想去哪裡，想做什麼？\n還是肚子餓了？"
20027-160 = "這個，是為了老師而穿的。"
20027-170 = "嗯，我會去抓條大魚的，\n期待一下吧。"
20027-180 = "冷氣跟電風扇\n雖然也不錯…"
20027-190 = "但我可能更喜歡水裡。"
20027-200 = "這麼說來…\n老師會游泳嗎？要不要教你？"
20027-210 = "生日快樂，老師。"
20027-220 = "生日大餐…\n吃生魚片可以嗎？"
20027-230 = "啊，生日…"
20027-240 = "原來你記得啊，\n謝謝你，老師。"
20027-250 = "新年…到了呢。\n祝你新年快樂，老師。"
20027-260 = "嗯。新的一年也\n一起去各種地方吧。"
20027-270 = "聖誕節…嗎？"
20027-280 = "水裡…不會比較溫暖。"
20027-290 = "…果然不行嗎。"
20027-300 = "萬聖節…我看到\n戴著南瓜的人了唷。"
20027-310 = "…我也來戴戴看吧？"
20027-330 = "…我回來了，老師。"
20027-340 = "…嗯，成功了。\n…用這個，就可以做了。"
20027-350 = "在手冊上看過的，\n那道料理。"
20027-360 = "料理工具也準備好了，\n沒問題。"
20027-370 = "…幸好老師有一起來。"
20027-380 = "只有我一個人的話，\n說不定中途就放棄了。"
20027-390 = "不…沒有那種事。\n不管是現在，\n還是我能這麼想的契機。"
20027-400 = "全部…都是\n因為有老師在。"
20027-410 = "…老師…謝謝你。"
20027-2600 = "即使來到這種地方…\n老師還是老樣子呢。\n謝謝你總是一直支援…不。\n…一直幫助我們。"

[translation]
10108-10 = "Blue Archive"
10108-20 = "เรียกหากันกลางดึกแบบนี้เลยเหรอ...\nตะ... แต่ว่าไม่ว่าอยู่ในชุดไหน เวลาใด ฉันก็พร้อมเสมอค่ะ\nไว้เตรียมรับบทลงโทษของวันนี้ทีหลังนะคะ"
10108-30 = "เหมือนจะ...\nง่วงหน่อยๆ เลย"
10108-40 = "มีตรงไหนที่\nไปพักได้บ้างมั้ยนะ..."
10108-50 = "สถานที่ที่ไม่อบอุ่นเกินไป\nแล้วก็ไม่เย็นเกินไปด้วย..."
10108-60 = "(หรือสถานที่ที่\nนอนข้างๆ คุณครูได้...)"
10108-70 = "มีชาอะไรบ้างนะ\nที่ช่วยในการนอนหลับ..."
10108-80 = "อ๊ะ มาแล้วเหรอคะ คุณครู"
10108-90 = "รอนานหรือเปล่าน่ะเหรอคะ?\nกะ... ก็ไม่ได้ขนาดนั้นนะคะ...?"
10108-100 = "สวัสดีค่ะ คุณครู"
10108-110 = "วันนี้ชุดของฉัน\nดูสบายตัวดีงั้นเหรอคะ?"
10108-120 = "ก็คุณครูเรียกมากะทันหัน\nก็เลยช่วยไม่ได้...!"
10108-130 = "ถ้าเป็นไปได้ฉันก็...\nอยากเลือกชุดสวยๆ กว่านี้นะ"
10108-140 = "จะว่าไปแล้ว ตอนคุณครูนอน\nใส่ชุดนอนแบบไหนเหรอคะ?"
10108-150 = "ปะ... เปล่าค่ะ!\nฉันไม่ได้คิดอย่างอื่นเลย!"
10108-160 = "ก็แค่สงสัยเฉยๆ... ค่ะ..."
10108-170 = "ชีวิตที่มีกฎเกณฑ์\nโภชนาการ การนอนหลับ\nทุกอย่างล้วนสำคัญหมดเลยค่ะ"
10108-180 = "แล้วฉันก็ช่วยดูแลทุกเรื่อง\nอยู่ข้างๆ ได้ด้วยนะคะ"
10108-190 = "ถะ... ถ้าคุณครู\nไม่ว่าอะไรน่ะนะ..."
10108-200 = "การนอนไม่พอทำให้\nตรรกะสับสน และทำให้\nผิดพลาดบ่อยๆ ด้วยค่ะ"
10108-210 = "ก็คนเราไม่ใช่เครื่องคิดเลข\nที่สมบูรณ์แบบไปหมดนี่คะ"
10108-220 = "ตอนพักผ่อน ได้พักผ่อนเต็มที่มั้ยคะ?"
10108-230 = "ดูจากใบหน้าและผิวแล้ว\nเหมือนจะได้พักผ่อน\nแต่ก็เหมือนจะไม่ด้วย..."
10108-240 = "บางครั้งฉันก็คิดว่า\nอยากตื่นมาเจอยามเช้าพร้อมกับ\nคนที่อยากตื่นมาด้วยค่ะ"
10108-250 = "มะ... ไม่ได้มีความหมายอะไรพิเศษ\nหรอกนะคะ!"
10108-260 = "สุขสันต์วันเกิดค่ะ คุณครู"
10108-270 = "ส่วนของขวัญ... ฉันจะ\nให้ยืมหมอนของฉันวันหนึ่งค่ะ!"
10108-280 = "..."
10108-290 = "ละ... ล้อเล่นค่ะ ไม่ต้องรับไว้\nอย่างจริงจังขนาดนั้นก็ได้!"
10108-300 = "จำวันเกิดฉันได้ด้วยสินะคะ\nคุณครู ขอบคุณนะคะ"
10108-310 = "ส่วนของขวัญ... ถ้าเป็นของที่\nคุณครูให้ ไม่ว่าอะไรฉันก็ชอบค่ะ"
10108-320 = "คะ? สิ่งที่มีอยู่ตอนนี้\nให้ได้ทุกอย่างเลย\nงั้นก็ให้ฉันเลือกเหรอคะ?"
10108-330 = "ถ้างั้น..."
10108-340 = "คุณครูเตรียมใจไว้แล้วใช่มั้ยคะ...?"
10108-350 = "ปีใหม่แล้วนะคะ คุณครู\nได้ใช้วันแรกของปี\nกับคุณครูเลยแบบนี้..."
10108-360 = "ถ้าเป็นเมื่อก่อน คงเป็น\nเรื่องที่คาดไม่ถึงจริงๆ นะคะ"
10108-370 = "ที่ผ่านมาฉันคิดว่า\nคริสต์มาสเป็นแค่วันที่\nมีแต่งานยุ่งค่ะ"
10108-380 = "แต่ว่าครั้งนี้...\nเป็นยังไงน่ะเหรอคะ?"
10108-390 = "ฮุฮุ...\nลองเดาดูสิคะ"
10108-400 = "วันฮาโลวีนแล้วค่ะ...\nฉันคิดว่าใส่ชุดนี้ออกมา\nทั้งอย่างนี้ก็ได้เสียอีก..."
10108-410 = "นี่มันเป็นเรื่องที่\nต้องดีใจหรือเปล่าคะ..."
10108-430 = "คะ... คุณครู?\nมาทำอะไรที่นี่เวลานี้..."
10108-440 = "คะ... คือว่า\nอันนี้... คือ..."
10108-450 = "ฉันนอนไม่หลับ\nก็เลยลงมาเดินเล่น"
10108-460 = "แล้วก็เห็นไก่ทอดเอ็นเจล\nในใบปลิวของร้านสะดวกซื้อ..."
10108-470 = "แต่ก็ช่วยไม่ได้นี่คะ!"
10108-480 = "ก็ไก่ทอดเอ็นเจล\nที่ทอดใหม่ๆ ในเวลานี้"
10108-490 = "มันทั้งร้อนและ\nชุ่มฉ่ำที่สุดเลยนี่คะ!\nถ้าไม่ซื้อก็เสียดายแย่ค่ะ"
10108-500 = "แต่ว่า...\nฉันไม่ได้ออกมากินมื้อดึก"
10108-510 = "แบบนี้ทุกคืนหรอกนะคะ..."
10108-520 = "ถ้าไม่ติดอะไรละก็"
10108-530 = "คุณครูก็ลองชิมสักคำมั้ยคะ?"
10108-2600 = "ขอบคุณนะคะ คุณครู\nอาวุธชิ้นนี้อาจจะจัดการสิ่งที่\nกีดขวางการนอนหลับได้\nอย่างมีเหตุผลก็ได้ค่ะ"

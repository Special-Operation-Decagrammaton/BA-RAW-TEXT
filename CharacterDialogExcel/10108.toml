[translation]
10108-10 = "Blue Archive"
10108-20 = "Calling me so late in the night... O-Of course, regardless of what I'm wearing, I'm always ready to go. Just know that I'll collect my dues later."
10108-30 = "I think I'm a little sleepy."
10108-40 = "Is there anywhere I can rest...?"
10108-50 = "Somewhere neither too warm nor too cool..."
10108-60 = "(Maybe lying next to Sensei, or something like that...)"
10108-70 = "What kind of tea helps promote a good night's sleep?"
10108-80 = "...Ah. You're here, Sensei."
10108-90 = "Was I waiting for long? N-No, not really."
10108-100 = "Hello, Sensei."
10108-110 = "I look really comfy today?"
10108-120 = "Well, you called me so suddenly, I had no choice...!"
10108-130 = "...I did want to pick out a prettier outfit."
10108-140 = "By the way, what kind of pajamas do you wear to sleep, Sensei?"
10108-150 = "Ah, no! I'm not thinking of anything else!"
10108-160 = "I was just curious..."
10108-170 = "A proper schedule, nutritional intake, sleep. They're all important."
10108-180 = "I can be by your side and take care of you, you know?"
10108-190 = "I-If that's okay with you, Sensei..."
10108-200 = "Lack of sleep disrupts logic and causes you to make frequent errors."
10108-210 = "No person is a perfect computer after all."
10108-220 = "Are you resting well when you take breaks?"
10108-230 = "Looking at your face and skin, it seems like you may not be getting enough rest..."
10108-240 = "Sometimes, I think it would be nice to greet the morning next to someone I want to wake up with."
10108-250 = "I-I don't mean anything by that!"
10108-260 = "Happy birthday, Sensei."
10108-270 = "As a gift...I'll lend you my pillow for a day!"
10108-280 = "..."
10108-290 = "I'm just kidding. Please don't take that seriously!"
10108-300 = "You remembered my birthday. Thank you, Sensei."
10108-310 = "For a gift... I'd be happy with anything from you."
10108-320 = "What? ...I can have whatever I want of yours, so I should choose?"
10108-330 = "Then, perhaps..."
10108-340 = "Are you sure about this, Sensei...?"
10108-350 = "It's the new year, Sensei. I can't believe I'm spending the first day of the year with you..."
10108-360 = "Back in the day, I really wouldn't have imagined this happening."
10108-370 = "Until now, I've only ever thought of Christmas as another busy day."
10108-380 = "...You're asking how this year is so far?"
10108-390 = "Heehee... Can you take a guess?"
10108-400 = "It's Halloween... Someone told me I could just go out wearing this outfit..."
10108-410 = "Should I be happy about that...?"
10108-430 = "S-Sensei? What are you doing here, at this time?"
10108-440 = "S-So... Well... Um..."
10108-450 = "I couldn't fall asleep, so I took a walk..."
10108-460 = "...and the angel chicken shown in the convenience store flyer caught my eye..."
10108-470 = "I couldn't help it!"
10108-480 = "The angel chicken is freshly fried around this time."
10108-490 = "It's so warm and juicy! It's more of a loss to NOT buy it!"
10108-500 = "And...it's not like I come here..."
10108-510 = "...for a late night snack every day... "
10108-520 = "I-If you want..."
10108-530 = "Do you want to try a bite, Sensei?"
10108-2600 = "Thank you, Sensei. With this weapon, maybe I can reasonably get rid of anything that disturbs my sleep?"

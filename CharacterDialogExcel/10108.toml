[translation]
10108-10 = "蔚藍檔案。"
10108-20 = "居然這麼晚還把我找來……\n當，當然我完全沒問題的！不過今天的事，\n我之後會好好討回來的，請做好心理準備哦？"
10108-30 = "好像……有點睏。"
10108-40 = "哪裡有可以休息\n的地方……"
10108-50 = "不會太熱\n也不會太冷\n的地方……"
10108-60 = "（跟老師一起\n躺下之類的……）"
10108-70 = "有什麼有助於\n放鬆的茶嗎……？"
10108-80 = "啊，你來啦，老師。"
10108-90 = "我，我沒有等很久唷……！"
10108-100 = "你好，老師。"
10108-110 = "今天的打扮很隨興……？"
10108-120 = "還不是因為老師突然\n叫我才會……！"
10108-130 = "就算是我，也會想穿\n更可愛的衣服的說……"
10108-140 = "這麼說來，\n老師睡覺的時候\n會穿什麼衣服呢？"
10108-150 = "我我，我沒有\n在想什麼虧心事哦！"
10108-160 = "就只是，有點，\n好奇而已……"
10108-170 = "規律的生活、\n營養攝取、睡眠。\n這些全都很重要。"
10108-180 = "要，要我幫你\n管理也可以哦？"
10108-190 = "如，如果老師\n不介意的話……"
10108-200 = "睡眠不足會擾亂思考迴路，\n進而引發失誤。"
10108-210 = "畢竟人類並不像\n機械一樣完美啊。"
10108-220 = "你有好好休息嗎？"
10108-230 = "確實，從表情來看\n好像是有那種感覺，\n卻又好像沒有……"
10108-240 = "有時候，我會心想\n「要是能跟憧憬的人\n一起迎接早晨就好了……」\n類似這種事情。"
10108-250 = "我，我沒有特別的意思哦！？"
10108-260 = "祝你生日快樂，老師！"
10108-270 = "作為禮物……\n就把我的枕頭借你一天吧！"
10108-280 = "……"
10108-290 = "我，我是開玩笑的！\n請你不要當真好嗎！？"
10108-300 = "我的生日，原來你記得啊。\n老師，謝謝你。"
10108-310 = "至於禮物……\n只要是老師給的，\n我什麼都喜歡。"
10108-320 = "咦？「只要是現在有的\n東西無論什麼都給你，\n優香自己選」……？"
10108-330 = "那，那麼……"
10108-340 = "……你已經準備好了吧，老師？"
10108-350 = "祝你新年快樂，老師。\n新年第一天居然能\n跟老師一起度過……"
10108-360 = "回想之前發生的事……\n真是令人感到難以想像呢。"
10108-370 = "以前聖誕節什麼的，\n對我而言只是個\n忙碌的日子罷了。"
10108-380 = "……問我這次怎麼樣？"
10108-390 = "呵呵……\n老師可以猜猜看呀？"
10108-400 = "是萬聖節呢……\n雖然有人跟我說過\n直接穿這樣出去\n也沒問題……"
10108-410 = "但這，是應該感到\n高興的事情嗎……"
10108-430 = "老，老師？\n這個時間你怎麼會……"
10108-440 = "那，那個……\n這個是，因為……"
10108-450 = "我有點睡不著，\n所以就出來散步……"
10108-460 = "結果那邊海報上的\n「天使炸雞」一下映入眼簾──"
10108-470 = "但，但是，這也沒辦法吧？"
10108-480 = "這個時段的天使炸雞，\n可是剛炸好的！"
10108-490 = "熱呼呼又有滿滿的肉汁！\n怎麼可能不買！"
10108-500 = "所，所以那個……\n我其實，也不是天天都……"
10108-510 = "會吃宵夜的……"
10108-520 = "那個……不介意的話……"
10108-530 = "老師要不要也吃一口？"
10108-2600 = "謝謝你，老師。\n用這個似乎就能把\n妨礙睡眠的要素合理地排除了。"

[translation]
10108-10 = "블루 아카이브"
10108-20 = "이런 늦은 밤에 호출하시다니….\n무, 물론 저야 언제 어떤 차림이든 준비 만전이지만요.\n오늘의 벌충은 나중에 제대로 받아낼 테니 각오하세요."
10108-30 = "조금……\n졸린 것 같기도."
10108-40 = "어디 쉴 만한\n자리는 없을까……"
10108-50 = "너무 따듯하지도\n시원하지도\n않은 장소가……"
10108-60 = "(선생님과 함께,\n곁에 눕는다든가…)"
10108-70 = "숙면에 좋은 차가\n뭐가 있었더라……"
10108-80 = "아, 오셨군요, 선생님."
10108-90 = "많이 기다렸냐고요?\n그, 그렇게까지는요……?"
10108-100 = "안녕하세요, 선생님."
10108-110 = "오늘은 편해\n보이는 복장이라고요?"
10108-120 = "그야 선생님이 갑자기\n부르셔서 어쩔 수 없이…!"
10108-130 = "…가능하면 더 예쁜\n옷을 고르고 싶었는데"
10108-140 = "그러고 보니,\n선생님께서는 주무실 때\n어떤 잠옷을 입으시나요?"
10108-150 = "아, 아뇨!\n다른 생각을 하는 건 아니고!"
10108-160 = "그냥, 궁금해서…… 요……"
10108-170 = "규칙적인 생활,\n영양 섭취, 수면.\n하나같이 중요한 것들이에요."
10108-180 = "제가, 곁에서\n챙겨 드릴 수 있는데 말이죠?"
10108-190 = "서, 선생님만\n괜찮으시다면……"
10108-200 = "부족한 잠은 논리를\n흐트러트리고, 잦은 오류를\n범하게 되죠."
10108-210 = "사람은 완전무결한\n계산기가 아니니까요."
10108-220 = "쉴 때는 푹 쉬고 계신가요?"
10108-230 = "얼굴이나 피부를 보니\n그러신 것 같기도,\n아닌 것 같기도……"
10108-240 = "가끔은, 함께 일어나고 싶은\n사람과 같이, 아침을 맞이했으면\n좋겠다는 생각이 들어요."
10108-250 = "트, 특별한 의미는 없으니까요!"
10108-260 = "생일 축하드려요, 선생님."
10108-270 = "선물로…… 제 베개를\n하루 빌려드릴게요!"
10108-280 = "……"
10108-290 = "노, 농담이니까 진지하게\n받지 말아 주세요!"
10108-300 = "제 생일, 기억해 주셨군요.\n선생님. 감사합니다."
10108-310 = "선물은…… 선생님께서 주시는\n거라면, 뭐든 좋아요."
10108-320 = "네? 지금 갖고 있는 거라면\n무엇이든 줄 수 있으니,\n제가 골라보라고요?"
10108-330 = "그럼, 혹시……"
10108-340 = "각오는 되셨겠죠, 선생님……?"
10108-350 = "새해가 되었네요. 선생님.\n첫날을 선생님과\n함께 보내게 되다니…"
10108-360 = "……예전 같았으면 정말, \n생각도 못 할 일이었겠네요."
10108-370 = "지금껏 크리스마스는\n그저 바쁜 날이라고만\n생각했었어요."
10108-380 = "……이번에는\n어떻냐, 고요?"
10108-390 = "후후……\n한 번 맞춰 보시겠어요?"
10108-400 = "할로윈이네요…… 이 복장\n그대로 나가도\n될 거라는 말을 들었는데……"
10108-410 = "이건, 기뻐해야\n하는 일일까요……"
10108-430 = "서, 선생님?\n이 시간에 여기는 무슨 일로…"
10108-440 = "그, 그러니까 이건…\n그…"
10108-450 = "잠이 오지 않는 김에\n산책을 나왔는데,"
10108-460 = "편의점 전단지의\n엔젤 치킨이 눈에 들어와서—"
10108-470 = "하, 하지만 어쩔 수 없잖아요!"
10108-480 = "이 시간의 엔젤 치킨은\n막 튀겨낸 것이라,"
10108-490 = "제일 따듯하고\n육즙도 촉촉하다고요! \n안 사는 게 손해잖아요?"
10108-500 = "그러니까……\n매일 이렇게 밤마다 나와서"
10108-510 = "야식을 먹고 있는 건 아니니까…"
10108-520 = "혹시 괜찮으시다면"
10108-530 = "선생님도 한 입, 드시겠어요?"
10108-2600 = "감사합니다. 선생님.\n이 무기라면 숙면에 방해되는 것들을 \n합리적으로 정리할 수 있을지도요?"

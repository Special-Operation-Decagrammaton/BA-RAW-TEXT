[translation]
26007-10 = "Blue Archive!"
26007-20 = "โอ... โอคุโซระ อายาเนะค่ะ\nปะ...เป็นยังไงคะ ใส่ชุดแบบนี้แล้วมันเขินนิดหน่อยน่ะค่ะ"
26007-30 = "พอได้ลองใส่\nชุดนี้ดูจริงๆ...\nก็รู้สึกเขินอยู่หน่อยๆ ค่ะ..."
26007-40 = "ทุกคนหายไปไหนกันหมดนะคะ...?"
26007-50 = "บริเวณที่ที่จะนั่งพักผ่อน\nได้อย่างสบายๆ..."
26007-60 = "อืม...?\nนั่นอะไรน่ะคะ?"
26007-70 = "รู้สึกเหมือน...\nสดชื่นขึ้นเยอะเลยค่ะ"
26007-80 = "ชะ...เชิญค่ะ คุณครู!"
26007-90 = "อ๊ะ คุณครู\nฉันกำลังรออยู่เลยค่ะ"
26007-100 = "หืม? ปะ...เป็นอะไรเหรอคะ...?"
26007-110 = "ชุดนี้น่ะเหรอคะ?"
26007-120 = "อะ.. อืม...\nฉันอยากให้ได้ฟีลฤดูร้อนน่ะค่ะ..."
26007-130 = "เป็นยังไงบ้างคะ?\nพะ...พอใช้ได้รึเปล่าคะ...?"
26007-140 = "ฉันมักแต่จะคิดเรื่องงาน\nที่จะต้องทำอยู่ตลอด..."
26007-150 = "พอได้มาพักผ่อนชิวๆ แบบนี้\nเลยรู้สึกแปลกๆ นิดหน่อยค่ะ"
26007-160 = "พอใส่ชุดแบบนี้...\nไม่รู้เหมือนกันว่าทำไม\nถึงรู้สึกผ่อนคลายมากเลยค่ะ"
26007-170 = "สุขสันต์วันเกิดค่ะ คุณครู!"
26007-180 = "การได้มาเจอคุณครูแบบนี้\nและการได้มาใช้เวลาด้วยกันแบบนี้\nฉันมีความสุขมากเลยค่ะ"
26007-190 = "คะ... คุณครู...?\nคือว่าวันนี้..."
26007-200 = "อ๊ะ ขอบคุณค่ะ\nได้ใช้เวลาร่วมกับคุณครูก็รู้สึกดีแล้ว\nแถมยังได้คำอวยพรจากคุณครูอีกด้วย..."
26007-210 = "เป็นวันที่เกินฝันเลยค่ะ"
26007-220 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่ค่ะ!!"
26007-230 = "ปีนี้ก็ขอให้คุณครู\nมีแต่เรื่องสนุกๆ ตลอดปีเลยนะคะ!"
26007-240 = "เมอร์รี คริสต์มาส~!\nถะ...ถ้าคุณครูไม่รีแอ็กอะไรเลย\nฉะ...ฉันก็เขินเป็นนะคะ...\n"
26007-250 = "วันฮาโลวีนนี่เอง...\nทุกคนถึงได้แต่งตัวแปลกๆ กัน..."
26007-260 = "ปะ...เปล่าค่ะ ชุดของฉัน\nมะ...ไม่ได้มีความหมายแบบนั้นหรอกค่ะ!?"
26007-280 = "อืม ถ้างั้นฉัน...\nถ่ายจากมุมข้างๆ ได้หรือเปล่าคะ?"
26007-290 = "ถ้าทำแบบนี้...\nจะดูดีรึเปล่าคะ?"
26007-300 = "เอ่อ ฉันต้องทำยังไง...\nเพื่อให้เห็นเฮลิคอปเตอร์ดีคะ...?"
26007-310 = "ขอโทษด้วยค่ะ\nฉันไม่ค่อยถนัด\nกับเรื่องพวกนี้เท่าไร..."
26007-320 = "คือว่า... คุณครูคะ?\nถ้าจะถ่ายรูปเป็นที่ระลึก..."
26007-330 = "ช่วยถ่ายให้เห็นเฮลิคอปเตอร์\nอีกหน่อยจะดีกว่ามั้ยคะ...?"
26007-340 = "มะ... ไม่ได้ถ่ายเฮลิคอปเตอร์\nแต่ถ่ายรูปที่ระลึกของฉันเหรอคะ...?"
26007-350 = "ยะ... อย่างนั้นเหรอคะ!?\nอะ...เอ๋...!?"
26007-360 = "คือ... คือว่าเรื่องนั้น\nเปล่าค่ะ... ก็ไม่ได้ไม่ชอบหรอกค่ะ...!"
26007-370 = "แต่จู่ๆ... ก็รู้สึกร้อนๆ\nที่หน้าขึ้นมาค่ะ..."
26007-2600 = "ให้ของที่ยอดเยี่ยมแบบนี้กับฉัน...\nฉันได้แต่รับความหวังดีจากคุณครู\nเสมอๆ เลยนะคะ เพราะงั้นฉันจะพยายาม\nตอบแทนคุณครูให้ได้ค่ะ!"

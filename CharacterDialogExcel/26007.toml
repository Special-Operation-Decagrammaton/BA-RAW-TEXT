[translation]
26007-10 = "블루 아카이브!"
26007-20 = "오, 오쿠소라 아야네입니다.\n어, 어떤가요…이런 모습, 조금 부끄럽네요."
26007-30 = "여, 여기에 이런 모습으로\n있는 건 조금…\n부끄럽네요…"
26007-40 = "어라,\n다들 어디에……?"
26007-50 = "어디 느긋하게\n있을 만한 곳은…"
26007-60 = "음…?\n저건 뭐죠…?"
26007-70 = "괜히 기분이\n좋아지네요."
26007-80 = "어서 오세요, 선생님!"
26007-90 = "아, 선생님.\n기다리고 있었어요."
26007-100 = "음? 왜, 왜 그러세요…?"
26007-110 = "이 모습이요?"
26007-120 = "으, 음…\n여름 기분을 좀 내보려고…"
26007-130 = "어떤가요?\n괘, 괜찮아 보이시나요…?"
26007-140 = "항상 이래저래\n해야 할 일들만 생각했는데…"
26007-150 = "왠지 이렇게 느긋한\n시간은 신기한 기분이네요."
26007-160 = "이런 복장으로는.\n왠지 마음이 해이해져\n버리고 마네요."
26007-170 = "생일 축하드려요, 선생님!"
26007-180 = "선생님과 이렇게 만난 것도,\n느긋하게 보낼 수 있는것도…\n정말로 기쁘답니다."
26007-190 = "서, 선생님…\n그… 오늘은…"
26007-200 = "아… 감사합니다. 이렇게\n지내는 것만으로도 즐거운데\n생일 축하까지 받다니…"
26007-210 = "사치스러운 하루네요."
26007-220 = "새해 복 많이 받으세요!!"
26007-230 = "올해도 즐거운 일이\n잔뜩 생기시길 바랄게요!"
26007-240 = "메리 크리스마스-!\n…뭐, 뭐라도 반응을,\n해 주시지 않으면, 부끄러워요…"
26007-250 = "그렇군요. 할로윈이니까\n다들 특이한 복장을…"
26007-260 = "아, 아뇨, 제 이 복장은\n그런 의미가 아니라…?"
26007-280 = "으음, 저는 여기\n옆에서 찍히면 될까요…?"
26007-290 = "이런 식으로…\n괜찮아 보이나요?"
26007-300 = "어, 어떻게 해야\n헬기가 잘 보일까요…?"
26007-310 = "죄송합니다,\n이런 건 익숙하지 않아서…"
26007-320 = "저기… 선생님?\n수리 기념사진이라면…"
26007-330 = "좀 더 헬기를 중심으로\n찍는 편이 좋지 않을까요…?"
26007-340 = "…예? 헬기가 아니라,\n제 기념 사진이요…?"
26007-350 = "그, 그랬던 건가요!?\n으에에!?"
26007-360 = "그, 그건 좀…\n아니, 싫다는 건 아니지만…!"
26007-370 = "왠지 갑자기,\n얼굴이 뜨거워지는데요…"
26007-2600 = "이렇게 대단한 것을, 저에게…\n선생님에게는 늘, 이런 식으로\n받기만 하네요. 조금이라도\n보답할 수 있도록 노력하겠습니다!"

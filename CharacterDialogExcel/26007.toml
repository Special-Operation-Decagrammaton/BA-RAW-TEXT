[translation]
26007-10 = "Blue Archive!"
26007-20 = "I-I'm Okusora Ayane. H-How do I look? I feel kind of embarrassed."
26007-30 = "Wearing this makes me feel a little shy..."
26007-40 = "I wonder where everyone is...?"
26007-50 = "Let's see where I can relax..."
26007-60 = "Hmm? What's that...?"
26007-70 = "I feel good for some reason."
26007-80 = "Welcome, Sensei!"
26007-90 = "Oh, Sensei! I've been waiting for you."
26007-100 = "Hmm...? Wh-What's wrong?"
26007-110 = "Hm? My appearance?"
26007-120 = "U-Um...I wanted to get into the summer mood..."
26007-130 = "How is it? D-Does it look okay...?"
26007-140 = "I'm always thinking about what has to be done next..."
26007-150 = "It's an interesting feeling to be relaxing like this."
26007-160 = "Wearing something like this makes me feel lazy."
26007-170 = "Happy birthday, Sensei!"
26007-180 = "I'm so glad that I got to see you and spend some relaxing time with you."
26007-190 = "S-Sensei... Um... Today..."
26007-200 = "Oh, thank you. I was already having a blast. I didn't expect I'd get a birthday wish too..."
26007-210 = "What a luxurious day."
26007-220 = "Happy New Year!"
26007-230 = "I hope you have loads of fun this year!"
26007-240 = "Merry Christmas! P-Please react well or I'm gonna be embarrassed..."
26007-250 = "I see. They're all wearing interesting clothes for Halloween..."
26007-260 = "N-No, that's not why I'm wearing this outfit..."
26007-280 = "Umm... From this side maybe...?"
26007-290 = "Like this... How does this look?"
26007-300 = "Wh-What's the best angle for the helicopter?"
26007-310 = "I'm really not used to things like this..."
26007-320 = "If this is to document the helicopter repairs..."
26007-330 = "...shouldn't the helicopter be in the center of the photo...?"
26007-340 = "I-It's not about the helicopter, but about me...?"
26007-350 = "Oh, r-really?! Whaaa?!"
26007-360 = "I mean... That's kind of... I mean, I'm not saying I don't like it, but...!"
26007-370 = "I feel like I'm blushing all of a sudden..."
26007-2600 = "Something so great, for me... I'm always receiving things from you. I'll do my very best to pay you back for everything!"

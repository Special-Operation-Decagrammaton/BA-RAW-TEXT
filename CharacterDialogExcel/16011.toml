[translation]
16011-10 = "蔚藍檔案。"
16011-20 = "哎呀，老師。在這裡也碰面了呢。\n我是三一綜合學園，實現正義部的羽川蓮實。\n這次由我代表三一擔任實行委員。請老師多多指教。"
16011-30 = "…這地方\n整裡得真好呢。"
16011-40 = "這裡明明不是競賽場，\n我這身服裝\n會不會很奇怪…？"
16011-50 = "那…那個是…？"
16011-60 = "跟平常不一樣，\n有點想\n跑步了呢。"
16011-70 = "（唔…\n減肥的大敵…)"
16011-80 = "恭候多時了，老師。\n今天的賽程表在這裡。"
16011-90 = "您辛苦了，老師。\n今天過得如何呢？"
16011-100 = "是因為這身服裝\n比平常穿的方便行動嗎？"
16011-110 = "好像稍微有點\n興奮的感覺呢。"
16011-120 = "雖然太過興奮\n不太好…\n只是稍微的話…"
16011-130 = "是因為做了不少運動嗎，\n好像有點餓了…"
16011-140 = "運動不論何時做都很好。\n因為有健康的身體\n才有健全的精神啊。"
16011-150 = "老師，如果不介意的話…\n蜂蜜漬檸檬\n您想不想嚐嚐看呢？"
16011-160 = "祝您生日快樂，老師。"
16011-170 = "能和老師一起迎接\n今天這樣的日子，\n我感到非常開心。"
16011-180 = "…有什麼\n想要的東西嗎？"
16011-190 = "…我的生日？"
16011-200 = "因為被工作追著跑，\n我忘得一乾二淨了呢。"
16011-210 = "您能記得\n真是非常感謝，老師。"
16011-220 = "新年快樂，老師。"
16011-230 = "我今年也會繼續\n運動、鍛鍊身體，\n努力度過健康的一年。"
16011-240 = "聖誕節快樂，老師。\n您不介意的話，\n要不要一起出去走走？"
16011-250 = "這副模樣看起來也像…\n萬聖節裝扮嗎？"
16011-260 = "如果老師這麼想的話，\n我沒有意見…嗯。"
16011-280 = "唔嗯…嗚…\n咕…呼…！"
16011-290 = "雖然已經預料到了…\n看來還是有點困難呢。"
16011-300 = "老師，不好意思…\n如您所見，\n變成這種情況了…"
16011-310 = "儘管不是這樣，\n您也很忙碌的…"
16011-320 = "還給您添了\n更多麻煩，\n真的非常抱歉。"
16011-330 = "到去年為止\n明明還很常穿這件衣服的，"
16011-340 = "怎麼…\n才過了一年就變成這樣…"
16011-350 = "不，不，\n其實也沒差那麼多…"
16011-360 = "那個…其實，\n體重應該沒什麼改變…\n才對。"
16011-370 = "大，大概…"
16011-2600 = "謝謝您，老師。\n簡直像是得到錦旗一樣的感覺。\n只要老師陪在我的身邊，\n我今後也不會輸的。\n所以以後也請多多指教囉。"

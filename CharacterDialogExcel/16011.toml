[translation]
16011-10 = "Blue Archive"
16011-20 = "อ๊ะ คุณครู เจอกันอีกแล้วนะคะ สมาชิกชมรมทวงความยุติธรรม\nฮาเนกาวะ ฮาสุมิค่ะ ครั้งนี้ฉันรับเป็นตัวแทนของทรีนิตี้\nทำหน้าที่เป็นคณะกรรมการจัดงาน ขอฝากเนื้อฝากตัวด้วยนะคะ"
16011-30 = "ที่นี่... จัดการได้\nเป็นระเบียบมากเลยค่ะ"
16011-40 = "ไม่ได้อยู่ที่สนามกีฬาแล้ว\nพอใส่ชุดแบบนี้\nมันแปลกรึเปล่าคะ...?"
16011-50 = "เอ๋... นั่นมัน...?"
16011-60 = "รู้สึกอยากวิ่ง\nขึ้นมานิดหน่อย\nต่างจากทุกวันเลยค่ะ"
16011-70 = "(อึก... ศัตรูของ...\nการไดเอต...)"
16011-80 = "ฉันกำลังรออยู่เลยค่ะคุณครู\nตารางการแข่งขันของวันนี้\nอยู่ทางนี้ค่ะ"
16011-90 = "เชิญค่ะคุณครู\nวันนี้เป็นยังไงบ้างคะ?"
16011-100 = "คงเป็นเพราะชุดนี้ เลยทำให้\nเคลื่อนไหวสะดวกกว่าปกติ"
16011-110 = "รู้สึกมันจะหลวมๆ\nนิดหน่อยนะคะ"
16011-120 = "ถ้ามันหลวมเกินไป\nก็คงจะไม่ดีเท่าไร\nแต่ถ้าเท่านี้ละก็..."
16011-130 = "คงเพราะวันนี้ขยับตัวมากเกินไป\nเลยรู้สึกหิวๆ นิดหน่อย..."
16011-140 = "การออกกำลังกายเป็นสิ่งที่ดีนะคะ\nเพราะจิตใจที่แจ่มใสอยู่ในร่างกาย\nที่สมบูรณ์ยังไงละคะ"
16011-150 = "ถ้าคุณครูไม่ว่าอะไรละก็...\nลองรับประทานมะนาวดองน้ำผึ้ง\nที่ฉันทำดูหน่อยมั้ยคะ?"
16011-160 = "สุขสันต์วันเกิดค่ะคุณครู"
16011-170 = "ฉันดีใจมากๆ\nที่ได้ใช้เวลาร่วมกับคุณครู\nในวันสำคัญแบบนี้ค่ะ"
16011-180 = "คุณครู... กำลังมองหาอะไร\nอยู่รึเปล่าคะ?"
16011-190 = "วันเกิดฉันเหรอคะ...?"
16011-200 = "ฉันงานยุ่งมากๆ\nจนลืมสนิทเลยค่ะ"
16011-210 = "ขอบคุณที่จำวันเกิด\nของฉันได้นะคะ คุณครู"
16011-220 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ คุณครู"
16011-230 = "ปีนี้ฉันก็จะพยายามฝึกร่างกาย\nเพื่อให้มีสุขภาพที่แข็งแรง\nไปตลอดทั้งปีค่ะ"
16011-240 = "เมอร์รี คริสต์มาสค่ะ คุณครู\nถ้าคุณครูสะดวกละก็...\nเราออกไปข้างนอกด้วยกันมั้ยคะ?"
16011-250 = "ชุดนี้ดูเหมือนเป็นชุดที่ใส่...\nในวันฮาโลวีนเหรอคะ?"
16011-260 = "ถ้าคุณครูคิดแบบนั้นละก็...\nฉันก็คง... "
16011-280 = "อะ...อื้อ ฮึบ...\nอื้อ ฮึก...!"
16011-290 = "ว่าแล้วเชียว\nยังไงก็ไม่ไหวสินะคะ"
16011-300 = "คุณครู... ขอโทษด้วยนะคะ...\nอย่างที่เห็นสถานการณ์\nกลายเป็นแบบนี้ไปแล้ว..."
16011-310 = "ทั้งๆ ที่คุณครูงานยุ่งมาก"
16011-320 = "ดูเหมือนฉันจะทำให้คุณครู\nลำบากโดยเปล่าประโยชน์ซะแล้ว\nขอโทษด้วยนะคะ"
16011-330 = "เมื่อปีที่แล้ว\nยังใส่ได้พอดีอยู่เลยแท้ๆ..."
16011-340 = "ไม่รู้ทำไม...\nแค่ 1 ปีถึงได้เป็นแบบนี้..."
16011-350 = "มะ... ไม่นะคะ\nมันก็ไม่น่าจะต่างกันเยอะขนาดนี้..."
16011-360 = "คือว่าน้ำหนัก...\nก็ไม่น่าจะเปลี่ยนไปเยอะขนาดนั้น"
16011-370 = "คะ... คิดว่านะคะ"
16011-2600 = "ขอบคุณค่ะคุณครู\nรู้สึกเหมือนได้ธงชนะเลิศเลยค่ะ\nถ้ามีคุณครูอยู่ด้วยแบบนี้ละก็\nต่อไปคงไม่มีทางแพ้แน่นอนค่ะ\nเพราะงั้นขอฝากเนื้อฝากตัวด้วยนะคะ"

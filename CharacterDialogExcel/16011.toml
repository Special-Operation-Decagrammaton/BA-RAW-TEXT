[translation]
16011-10 = "블루 아카이브."
16011-20 = "아, 선생님. 여기서도 뵙는군요.\n트리니티 종합학원, 정의실현부의 하네카와 하스미.\n이번에 트리니티를 대표하여 실행위원을 맡게 되었습니다. 모쪼록 잘 부탁드립니다."
16011-30 = "…잘 정돈된\n곳이네요."
16011-40 = "경기장도 아닌데\n이 복장인 건\n이상한가요…?"
16011-50 = "어라… 저건…?"
16011-60 = "평소와는 다르게\n조금 달리고\n싶어지네요."
16011-70 = "(윽… 다이어트의\n적이…)"
16011-80 = "기다리고 있었습니다, 선생님.\n오늘의 경기 일정은 이쪽입니다."
16011-90 = "어서 오세요, 선생님.\n오늘 하루는 어떠셨나요?"
16011-100 = "이 복장은 평소보다\n움직이기 편해서 그런지,"
16011-110 = "조금은 들뜨게\n되는 것 같아요."
16011-120 = "너무 들뜨는 건\n좋지 않겠지만,\n조금 정도라면…"
16011-130 = "움직임이 많은 날이라 그런지,\n조금 허기진 것 같기도…"
16011-140 = "운동은 언제나 좋죠.\n건강한 몸에, 건강한 정신이\n깃드는 법이니까요."
16011-150 = "혹시 괜찮으시다면…\n레몬 벌꿀 절임이라던가,\n어떠신가요?"
16011-160 = "생일 축하드립니다, 선생님."
16011-170 = "오늘 같은 날을\n선생님과 함께하게 돼\n매우 기쁘게 생각합니다."
16011-180 = "…뭔가 갖고 싶은 것이라도\n있습니까?"
16011-190 = "…제 생일이요?"
16011-200 = "업무에 쫓긴 나머지\n완전히 잊고 있었습니다."
16011-210 = "기억해주셔서\n감사합니다, 선생님."
16011-220 = "새해 복 많이\n받으십시오, 선생님."
16011-230 = "올해도 계속 운동으로\n신체를 단련하며, 건강한\n한 해를 보낼 수 있도록\n노력하겠습니다."
16011-240 = "메리 크리스마스입니다, 선생님.\n혹시 괜찮으시다면, 함께\n외출이라도 나가보실까요?"
16011-250 = "이 복장도 할로윈 가장…\n으로 보일까요?"
16011-260 = "선생님이 그렇게 생각하신다면,\n저는 딱히… 네…"
16011-280 = "으음… 윽…\n읏… 흐읏…!"
16011-290 = "예상은 했지만,\n역시 무리인 것 같군요."
16011-300 = "선생님, 죄송합니다…\n보시다시피 이런\n상황이 되어 버려서…"
16011-310 = "그러잖아도 바쁘실 텐데,"
16011-320 = "공연히 곤란하게\n만들어드린 것 같아\n죄송합니다."
16011-330 = "작년만 해도\n곧잘 입던 옷이었는데"
16011-340 = "어째서\n1년 사이에 이런…"
16011-350 = "아, 아뇨.\n그렇게 큰 차이는…"
16011-360 = "그게… 그렇게 체중은\n변하지 않았을…텐데"
16011-370 = "…아, 아마도…"
16011-2600 = "감사합니다, 선생님.\n마치 우승기를 받은 것 같은 기분이에요.\n선생님이 함께해주시는 이상,\n이제부터 패배는 없을 겁니다.\n그러니 앞으로도 잘 부탁드립니다."

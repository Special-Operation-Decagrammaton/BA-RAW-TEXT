[translation]
16011-10 = "Blue Archive."
16011-20 = "Ah, Sensei. I didn't expect to see you here. Hanekawa Hasumi of Trinity General School's Justice Task Force, reporting for duty. As of now, I'm representing Trinity on the Executive Committee. I look forward to working with you."
16011-30 = "...It's certainly well-organized."
16011-40 = "...Is it weird to be wearing this outfit outside the stadium?"
16011-50 = "Huh? Is that...?"
16011-60 = "I don't usually feel this way, but I have the urge to go on a run all of a sudden."
16011-70 = "(Ugh... A diet's worst enemy...)"
16011-80 = "I've been waiting for you, Sensei. Today's game schedule is over here."
16011-90 = "Welcome, Sensei. How has your day been?"
16011-100 = "Maybe because this outfit is much more comfortable compared to what I usually wear..."
16011-110 = "Putting this on uplifts my spirits a little."
16011-120 = "I shouldn't let myself get too excited... But maybe a little bit is okay..."
16011-130 = "Maybe it's because I've been moving around so much today. I'm a bit hungry..."
16011-140 = "Exercise is good for more than just your body. You can't have a sound mind without a sound body."
16011-150 = "If you want... Would like to try some of the honeyed lemons I made?"
16011-160 = "Happy birthday, Sensei."
16011-170 = "I'm positively elated to be spending a day such as this with you, Sensei."
16011-180 = "...Is there anything you wish to have?"
16011-190 = "...My birthday?"
16011-200 = "I've been so bogged down by work that it completely slipped my mind."
16011-210 = "Thank you for remembering, Sensei."
16011-220 = "Happy New Year, Sensei."
16011-230 = "My resolution this year is to continue focusing on my body and health."
16011-240 = "Merry Christmas, Sensei. If you were free, I was thinking we could go somewhere together?"
16011-250 = "Does this outfit...look like a Halloween costume?"
16011-260 = "If that's how you feel, Sensei, then I suppose it's fine..."
16011-280 = "Um... Ugh... Argh... Ugh!"
16011-290 = "As I suspected... It's simply more than I can handle."
16011-300 = "I apologize, Sensei. As you can see...the situation is quite..."
16011-310 = "I'm sure you already have a lot on your plate..."
16011-320 = "And now I feel that I've inadvertently put you in an awkward position. I'm terribly sorry."
16011-330 = "I used to wear this all the time... Up until last year."
16011-340 = "How could so much have changed in a year?"
16011-350 = "Oh, uh, I mean... It's not that much of a difference..."
16011-360 = "It's just... My weight shouldn't...have changed that much..."
16011-370 = "No way... Right?"
16011-2600 = "Thank you, Sensei. I feel as if I've earned the championship banner. As long as you are with me, I can't lose. If it's okay... I'll continue to lean on you, Sensei"

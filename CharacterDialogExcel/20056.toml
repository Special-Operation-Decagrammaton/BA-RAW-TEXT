[translation]
20056-10 = "블루~ 아카이브!"
20056-20 = "니하하하!\n이 코유키에게 와버리셨군요! 선생님!"
20056-30 = "(어디 보자,\n숨을 만한\n곳이…….)"
20056-40 = "(여기……\n세미나 카드로도\n결제 되려나?)"
20056-50 = "설마 여기까지\n쫓아오지는\n않겠지……?"
20056-60 = "선생님? 선생님!\n어디 계세요?"
20056-70 = "오늘의 커피는……\n원두가 랜덤?! \n으으, 랜덤은\n싫은데……."
20056-80 = "아! 오셨나요, 선생님!"
20056-90 = "마침 카드팩 뜯으려는\n참이었다고요!"
20056-100 = "안녕하십니까, 선생님!"
20056-110 = "여기 과자 먹어도 되죠?"
20056-120 = "물론 이미 먹고 있었지만요!\n니하하하!"
20056-130 = "당번 업무요?"
20056-140 = "잠깐만요,\n일단 돗자리부터\n펴겠습니다!"
20056-150 = "자 자, 일단 오락실부터\n다녀오자고요, 선생님?"
20056-160 = "빨리, 빨리 와 보세요,\n선생님!"
20056-170 = "……불 좀 꺼주세요!"
20056-180 = "샬레는 좋네요!"
20056-190 = "추적용 드론도 없고,\n진입 차단용 셔터도 없고……."
20056-200 = "샬레를 제 반성실로\n쓰는 건……"
20056-210 = "되겠죠?\n된다고 말해주세요!"
20056-220 = "해피한 버스데이입니다,\n선생님!"
20056-230 = "밤새 같이\n놀아보자고요!!"
20056-240 = "제가 받고 싶은\n선물 말인가요?!"
20056-250 = "흐으으응~?"
20056-260 = "정말 물어본 거\n후회 안 하시죠?"
20056-270 = "오늘은 한 해의\n마지막 날!"
20056-280 = "그러니까 오늘은\n뭘 저질러도 수습은\n내년에 하면 된다고요!\n니하하하!"
20056-290 = "……네?\n마지막 날 아니라고요?"
20056-300 = "벌써 새해라고요?\n어째서죠?!"
20056-310 = "산타가 선물 놓고\n가기 편하도록,"
20056-320 = "보안은 다 해제시켜 놨다고요!\n잘했죠?"
20056-330 = "이런 옷을 입고도\n인파 속에 숨는 게\n가능하다니……!"
20056-340 = "좋은 날이네요!"
20056-360 = "아아!\n왜 지금\n그걸 내냐고요!!"
20056-370 = "제가 먼저 낸 다음에\n내라고 말씀드렸잖아요!"
20056-380 = "제 완벽한 작전을\n부정할 생각이신가요?!"
20056-390 = "선생님을 위해\n새벽부터 일어나\n자리까지 잡았는데!!"
20056-400 = "……예?\n그것과 이건\n별개의 이야기?"
20056-410 = "그렇게 따지면\n선생님 쪽이 코인은\n더 많이 냈다고요?"
20056-420 = "으음……\n그건 그렇긴 하지만……."
20056-430 = "그럼 쌤쌤으로 하죠!\n일단 휴전!"
20056-440 = "맞아요!\n다음번엔 진짜\n잘 될 테니까요!!"
20056-450 = "……니히히!"
20056-460 = "……니히히!"
20056-2600 = "……분명, 저의 최고의 행운은\n선생님이겠죠!\n그러니까! 최선을 다하겠습니다!\n감사합니다!"

[translation]
10068-10 = "Blue! Archive!"
10068-20 = "Hi, hello! Everyone's superstar savior, Uzawa Reisa, is here!"
10068-30 = "Oh, this is...a lot of people..."
10068-40 = "Should I just go...?"
10068-50 = "No, I have to push forward as normally as possible in times like this!"
10068-60 = "I-I gotta stop... Everyone's gonna think I'm strange."
10068-70 = "This seems like a really safe place!"
10068-80 = "There you are, Sensei!"
10068-90 = "Uzawa Reisa, reporting for duty!"
10068-100 = "Oh! It's Sensei's grand entrance!"
10068-110 = "So, what's the plan for today?"
10068-120 = "You called me, Sensei? What did you wanna talk about?"
10068-130 = "Ah, was my voice...too loud?"
10068-140 = "Your head was ringing? Oh no! Sorry!"
10068-150 = "Hmm. Interesting!"
10068-160 = "I've noticed that when I come here, some of my tension just goes away!"
10068-170 = "Um, do you have an errand for me to run, maybe?"
10068-180 = "It feels a bit weird to just stand here..."
10068-190 = "Have no fear! No matter what happens..."
10068-200 = "I, Uzawa Reisa, will be by your side, Sensei!"
10068-210 = "Happy birthday, Sensei!"
10068-220 = "Since it's a special day, we should do something special! Ooh, I know! Let's go on a patrol together!"
10068-230 = "You remembered my birthday? Thanks!"
10068-240 = "A whole lot of people have wished me a happy birthday this year!"
10068-250 = "It makes me happy to have lived this long!"
10068-260 = "Even though... Well, it's true I'm only 15..."
10068-270 = "Happy New Year, Sensei!"
10068-280 = "I'll be counting on you for backup this year!"
10068-290 = "Merry Christmas!"
10068-300 = "Huh? A gift exchange?"
10068-310 = "Aaah! I forgot! I forgot!"
10068-320 = "I'm really not used to this kind of thing..."
10068-330 = "If there's no candy, I won't stand for being teased!"
10068-340 = "...Huh? Did I interpret something wrong?"
10068-360 = "This is a bit strange. It's..."
10068-370 = "It's the first time I've watched the sunrise with someone..."
10068-380 = "It may even be..."
10068-390 = "The longest amount of time I've spent with someone else... haha."
10068-400 = "Um... Did I say something weird again?"
10068-410 = "I'm still a little sleepy... I might be rambling."
10068-420 = "But even so, you always seem to understand me, Sensei."
10068-430 = "So, um... Please understand me this time, too. Heehee."
10068-440 = "Mmm... It's nice..."
10068-450 = "Sensei... Thanks... Heehee..."
10068-2600 = "I can't...really believe it. I'm really helping you, Sensei? I always hope I am, but..."

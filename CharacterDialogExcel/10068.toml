[translation]
10068-10 = "Blue! Archive!!"
10068-20 = "มาแล้วค่า มาแล้ว!\nอุซาวะ เรอิสะ ซูเปอร์สตาร์ของทุกคนมาปรากฏตัวแล้วค่ะ!"
10068-30 = "คะ... คนเยอะจัง..."
10068-40 = "ไปอยู่ตรงไหนดีนะ..."
10068-50 = "ไม่สิ\nยิ่งเป็นแบบนี้\nยิ่งต้องทำตามปกติ...!"
10068-60 = "มะ... ไม่เอาดีกว่า\nเดี๋ยวคนอื่นจะมอง\nว่าเราเป็นคนแปลกๆ"
10068-70 = "ที่นี่เป็นที่ที่วางใจได้สินะคะ!"
10068-80 = "มาแล้วเหรอคะคุณครู!"
10068-90 = "อุซาวะ เรอิสะ\nกำลังรออยู่เลยค่ะ!"
10068-100 = "คุณครู 'ปรากฏตัว' มาแล้วสินะคะ!!"
10068-110 = "งั้นวันนี้จะให้ทำอะไรดีคะ!"
10068-120 = "เรียกฉันเหรอคะคุณครู!\nไม่ว่าอะไรก็สั่งมาได้เลยค่ะ!"
10068-130 = "อ๊ะ หรือว่าฉัน...\nพูดเสียงดังไปหน่อยคะ?"
10068-140 = "ดังจนปวดหัวเลยสินะคะ...\nขอโทษค่ะ...!"
10068-150 = "อืม... แปลกจังเลยนะคะ"
10068-160 = "เวลามาที่นี่...\nมักรู้สึกหมดแรงขึ้นมายังไงไม่รู้..."
10068-170 = "มะ... ไม่มีงานอะไร\nจะให้ฉันทำเลยเหรอคะ?"
10068-180 = "ถ้าแค่ให้ยืนอยู่เฉยๆ แบบนี้\nมันรู้สึกแปลกๆ น่ะค่ะ..."
10068-190 = "ต่อไปไม่ว่าจะมีเรื่องอะไร\nก็หายห่วงได้เลยค่ะ!"
10068-200 = "เพราะข้างๆ คุณครู\nมีอุซาวะ เรอิสะ\nคนนี้อยู่ด้วยไงล่ะคะ!"
10068-210 = "สุขสันต์วันเกิดค่ะคุณครู!!!"
10068-220 = "วันนี้เป็นวันที่พิเศษมาก\nเราออกไปลาดตระเวน\nด้วยกันมั้ยคะ?"
10068-230 = "อ๊ะ วันนี้เป็นวันเกิดฉันเหรอคะ? ขอบคุณที่จำได้นะคะ!"
10068-240 = "มีคนเข้ามาอวยพรวันเกิด\nให้ฉันเยอะเลยละค่ะ!"
10068-250 = "พออายุมากขึ้น\nก็ได้ฟังคำอวยพรเยอะเลยค่ะ!"
10068-260 = "ถึงฉันจะเพิ่งอายุ 15 เองก็เถอะค่ะ!"
10068-270 = "สวัสดีปีใหม่ค่ะคุณครู!"
10068-280 = "ปีนี้ก็ฝากตัวด้วยนะคะ!"
10068-290 = "เมอร์รี คริสต์มาส~!!"
10068-300 = "คะ? แลกของขวัญกันเหรอคะ?"
10068-310 = "อ๊ะ... อ่า...!?  ฉันลืมไปเลยค่ะ...!"
10068-320 = "พอดีฉันไม่ค่อย\nชินกับอะไรแบบนี้เท่าไร...!"
10068-330 = "วันนี้ถ้าไม่มีลูกกวาด\nก็จะโดนแกล้งได้ค่ะ!"
10068-340 = "...คะ?\nฉันตีความตรงไหน\nผิดไปงั้นเหรอคะ?"
10068-360 = "รู้สึกแปลกดีนะคะ\nเพราะนี่เป็นครั้งแรก..."
10068-370 = "ที่ฉันได้มาดูพระอาทิตย์ขึ้น\nกับใครแบบนี้น่ะค่ะ..."
10068-380 = "จะว่าไปแล้ว\nการได้มาอยู่กับใครสองคน..."
10068-390 = "ครั้งนี้อาจจะนานที่สุด\nเท่าที่เคยเลยก็ได้ค่ะ แหะๆ"
10068-400 = "อืม... ฉันพูดอะไรแปลกๆ\nออกไปอีกจนได้นะคะ..."
10068-410 = "ที่จริงฉันแอบง่วงนิดหน่อยน่ะ...\nฉันไม่รู้ตัวหรอกค่ะว่าฉันพูดอะไรอยู่..."
10068-420 = "ตะ... แต่ว่าคุณครูก็...\nรู้ทุกอย่างเลย..."
10068-430 = "งั้นครั้งนี้ก็... ช่วยรู้เหมือนทุกครั้ง\nด้วยนะคะ ฮิฮิ..."
10068-440 = "อืม... ดีจังเลยนะคะ..."
10068-450 = "คุณครู...\nขอบคุณค่ะ ฮิฮิ..."
10068-2600 = "ที่จริง ฉันยังไม่รู้สึกว่าเป็นความจริง\nเลยค่ะ ฉัน... กำลังเป็นประโยชน์\nต่อคุณครูจริงๆ มั้ยนะ...\nฉันหวังจากใจจริงเสมอเลยค่ะ\nว่าจะเป็นประโยชน์กับคุณครู"

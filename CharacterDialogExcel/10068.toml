[translation]
10068-10 = "蔚藍！檔案！！"
10068-20 = "聽到呼叫就飛奔而來！\n大家的超級巨星，宇沢澪紗登場！"
10068-30 = "人，人好多……"
10068-40 = "要待在哪邊才好……"
10068-50 = "不對，越是\n這種時候\n就越要像平常一樣…！"
10068-60 = "果，果然還是算了…\n會被當成怪人的。"
10068-70 = "是個舒服的地方呢！"
10068-80 = "歡迎回來，老師！"
10068-90 = "宇沢澪紗，\n正在待命！"
10068-100 = "是老師的「登場」呢！！"
10068-110 = "那麼，今天要做什麼呢！"
10068-120 = "你找我嗎，老師！\n有什麼事請儘管吩咐！"
10068-130 = "啊，難道，我的\n聲音……太大了嗎？"
10068-140 = "說不定會有回音……\n對不起……"
10068-150 = "嗯……真神奇。"
10068-160 = "該說只要待在這裡，\n就會有點放鬆嗎……"
10068-170 = "要，要不要幫你\n跑腿之類的？"
10068-180 = "那個……一直站在這裡，\n總覺得有點靜不下來……"
10068-190 = "今後，不管發生什麼\n都請放心吧！"
10068-200 = "因為老師的身邊有我，\n宇沢澪紗在！"
10068-210 = "生日快樂，老師！！！"
10068-220 = "因為是非常特別的一天，\n一起巡邏之類的怎麼樣呀！"
10068-230 = "啊，我的生日嗎？謝謝你！"
10068-240 = "最近，祝我\n生日快樂的人很多！"
10068-250 = "……真的是，\n活久了什麼都會見到呢！"
10068-260 = "雖然我才15歲就是了！"
10068-270 = "新年快樂，老師！"
10068-280 = "今年也請多多指教哦！"
10068-290 = "聖誕快樂～！！"
10068-300 = "咦？交換禮物？"
10068-310 = "啊，啊啊……！？\n我忘記了……！"
10068-320 = "我還不太習慣\n這種事情……！"
10068-330 = "是只要沒有糖果，\n就會被搗蛋的日子！"
10068-340 = "……咦？解釋有點奇怪？"
10068-360 = "……總覺得，\n有種神奇的感覺。\n像這樣……"
10068-370 = "和別人一起看日出，\n這還是第一次……"
10068-380 = "這麼說來，\n和別人獨處的時間……"
10068-390 = "這說不定，也是\n最長的一次……哈哈。"
10068-400 = "唔嗯……感覺好像\n又說了奇怪的話……"
10068-410 = "其實我還有點睏……\n自己在說些什麼，\n也不是很……"
10068-420 = "不，不過老師你……\n總是會理解我……"
10068-430 = "這次也……請像平時一樣，\n理解我哦。嘿嘿……"
10068-440 = "嗯……真不錯呢……"
10068-450 = "老師……\n謝謝你……\n嘻嘻……"
10068-2600 = "其實，我還沒有真實感。\n我……真的有幫上\n老師的忙嗎……\n要是有就好了，\n我一直是真心這麼希望著。"

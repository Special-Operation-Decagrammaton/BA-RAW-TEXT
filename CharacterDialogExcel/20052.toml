[translation]
20052-10 = "Blue Archive ฮิ ฮิ ฮิ"
20052-20 = "ตีพิมพ์ พิมพ์เพิ่ม วางจำหน่าย คือคติของชมรมสื่อสิ่งพิมพ์ค่ะ\nสวัสดีค่ะ คุณครู อารามากิ ยาคุโมะค่ะ"
20052-30 = "ไหนดูซิ...\nถ้าจะเปิดตลาดใหม่..."
20052-40 = "เป็นสถานที่ที่\nอบอุ่นและสบาย\nจังเลยนะคะ..."
20052-50 = "ถ้าทำหน้าร้าน\nไว้ตรงโน้นละก็...?\nฮิ ฮิ ฮิ"
20052-60 = "งานเขียนในยุคนี้เหมือน\nการทำธุรกิจบนแพลตฟอร์ม\nมากกว่าค่ะ"
20052-70 = "กำไรจากที่นี่\nจะได้วันละเท่าไรนะ...?"
20052-80 = "ว้าว~ มาแล้วเหรอคะ\nคุณครู"
20052-90 = "ฉันรอจน\nรากงอกแล้วค่ะ"
20052-100 = "งั้นเรามาเริ่มหารือ\nเกี่ยวกับธุรกิจระหว่าง"
20052-110 = "ชมรมสื่อสิ่งพิมพ์กับ\nชาเล่ต์กันเลยมั้ยคะ? ฮิ ฮิ ฮิ"
20052-120 = "ฉันกำลังรออยู่เลยค่ะ\nคุณครู!"
20052-130 = "ระหว่างรอ\nฉันลองเขียนลิสต์\nหนังสือที่ควรมีเพิ่ม"
20052-140 = "ในชาเล่ต์ไว้น่ะค่ะ"
20052-150 = "ถ้าสงสัยเล่มไหนละก็...\nฉันจะรีบเอามาให้เลยค่ะ\nฮิ ฮิ ฮิ"
20052-160 = "การเขียนแผนธุรกิจ\nก็เหมือนงานอดิเรกของฉันค่ะ"
20052-170 = "แปลกงั้นเหรอคะ?\nก็อาจจะมองอย่างนั้นก็ได้..."
20052-180 = "แต่ฉันชอบเรื่องการ\nคิดถึงความเป็นไปได้น่ะค่ะ"
20052-190 = "การได้เขียนความคิด\nของตัวเองออกมา\nมันก็สนุกดีนะคะ?"
20052-200 = "แบบนั้นไม่ใช่แผนธุรกิจ แต่เป็น...\nบันทึกเพ้อฝันงั้นเหรอคะ?"
20052-210 = "พูดอะไรแบบนั้นคะ!\nมันต่างจากบันทึกเพ้อฝันนะคะ!"
20052-220 = "ถ้าถามว่าต่างกันตรงไหน...\nก็ตรง เอ่อ..."
20052-230 = "การเจรจางบประมาณ\nกับสำนักเลขาธิการ\nเป็นเรื่องยากเสมอเลยค่ะ..."
20052-240 = "แต่ถึงยังไง... สุดท้ายแล้ว\nขอแค่ได้งบประมาณมา\nก็พอแล้วค่ะ"
20052-250 = "ส่วนที่ไม่พอ ไว้ชมรม\nสื่อสิ่งพิมพ์ทำยอดถล่มทลาย!"
20052-260 = "แล้วค่อยไปขอเบิกจาก\nสำนักเลขาธิการในยอดเท่ากัน...\nก็เท่ากับทำเงินได้ 2 เท่าแล้วค่ะ\nฮิ ฮิ ฮิ"
20052-270 = "ฉันใช้การจราจรหลายๆ แบบ\nระหว่างมาที่ชาเล่ต์ค่ะ"
20052-280 = "สิ่งอำนวยความสะดวกทางรถไฟ\nของที่นี่น่าอิจฉาจังเลยค่ะ..."
20052-290 = "ที่จริงไม่ได้มี\nมีแค่เรื่องนั้น\nที่ฉันอิจฉาหรอกนะคะ..."
20052-300 = "อุตสาหกรรมการพิมพ์ในปัจจุบัน\nมันน่ากลุ้มนิดหน่อย~ น่ะค่ะ"
20052-310 = "โดยเฉพาะงานเขียน\nที่เป็นรองสื่อวิดีโออยู่ค่ะ"
20052-320 = "ฉันก็เลยได้ข้อสรุปแล้วค่ะ"
20052-330 = "ชมรมสื่อสิ่งพิมพ์จะเข้าสู่\nตลาดสื่อวิดีโอไปด้วยเลยค่ะ!"
20052-340 = "อ๋า~ ฉันพูดจริงนะคะ"
20052-350 = "ฉันอยากย้ายมาเรียน\nที่ชาเล่ต์จังเลยค่ะ"
20052-360 = "ทั้งอบอุ่น\nสิ่งอำนวยความสะดวกก็พร้อม\nมีโอกาสทางธุรกิจเยอะ\nแล้วก็มีคุณครูด้วย"
20052-370 = "ย้ายไม่ได้ เพราะชาเล่ต์\nไม่ใช่โรงเรียนงั้นเหรอคะ?"
20052-380 = "ค่ะ... ความจริงย่อมเป็น\nสิ่งที่เย็นชาอยู่แล้วค่ะ..."
20052-390 = "ใครกันเนี่ย\nตัวเอกของวันนี้นี่คะ"
20052-400 = "สุขสันต์วันเกิดค่ะ คุณครู\nฉันมีของขวัญเล็กๆ น้อยๆ ให้"
20052-410 = "นี่ค่ะ บัตรกำนัลซื้อหนังสือ\nแล้วฉันจะรอให้ไปใช้นะคะ...\nฮิ ฮิ ฮิ"
20052-420 = "วันนี้วันที่ 18 พ.ค. นะคะ~?"
20052-430 = "ลืมอะไรไปหรือเปล่าคะ~?\nไม่มีอะไรจะบอกฉันเหรอคะ?"
20052-440 = "สมกับที่เป็นคุณครูเลย!\nกะไว้แล้วค่ะว่าต้อง\nจำวันเกิดของฉันได้!"
20052-450 = "ปีใหม่แล้วสินะคะ อืม..."
20052-460 = "ธุรกิจส่วนใหญ่\nมักจะวางแผนอีเวนต์\nทุกปีใหม่เลยค่ะ"
20052-470 = "นี่เป็นเรื่องหนึ่งที่\nต้องตัดสินใจค่ะ..."
20052-480 = "ถึงจะไม่มีผลอะไรมากนัก\nเพราะทุกคนก็ทำกันหมด"
20052-490 = "แต่ถ้าไม่ทำ\nก็จะตามตลาดไม่ทัน..."
20052-500 = "คริสต์มาสเป็นช่วงสำคัญ\nของการทำธุรกิจเลยค่ะ!"
20052-510 = "ยิ่งเป็นตอนแบบนี้\nแผนธุรกิจพื้นๆ"
20052-520 = "ที่หยิบอะไรก็ได้มาขาย\nจะทำให้ธุรกิจเจ๊งค่ะ"
20052-530 = "วันนี้วันฮาโลวีนสินะคะ"
20052-540 = "แต่ว่า นับตั้งแต่\nฉันได้เจอคุณครู\nฉันก็สงสัยมาตลอดค่ะ"
20052-550 = "ระหว่างการได้\nลูกกวาดจากคุณครู\nกับการได้แกล้งคุณครู"
20052-560 = "อันไหนจะดีกว่านะคะ~?"
20052-580 = "โอ้ว... อบอุ่นจังเลยค่ะ"
20052-590 = "รู้สึกดีกว่าที่คิดนะเนี่ย..."
20052-600 = "พูดจบปุ๊บ\nก็หนาวขึ้นปั๊บเลยค่ะ"
20052-610 = "ฮัดชิ่ว!"
20052-620 = "เสร็จหรือยังคะ?\nถ้างั้นก็ ถึงตาคุณครูแล้วค่ะ"
20052-630 = "เอ๋ จะสั่งให้ฉันทำ\nคนเดียวหรอกเหรอคะ?"
20052-640 = "อะไรกัน แบบนี้มัน\nสบายเกินไปแล้ว\nนะคะคุณครู"
20052-650 = "ความหนาวในเรดวินเทอร์\nเป็นสิ่งที่ยุติธรรม\nทั่วถึงทุกคนนะคะ ฮิ ฮิ ฮิ"
20052-2600 = "เครื่องมือจะดีหรือไม่\nขึ้นอยู่กับวิธีที่คนนำไปใช้ค่ะ\nสิ่งนี้น่าจะช่วยให้รักษาข้อตกลง\nในสัญญาให้ 'ชัดเจน' ยิ่งขึ้นนะคะ ฮิฮิฮิ"

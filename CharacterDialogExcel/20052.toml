[translation]
20052-10 = "蔚藍，檔案。呣呵呵。"
20052-20 = "印刷、裝訂、管理、流通──\n與書本相關的事宜，歡迎向赤冬出版部部長，\n荒槇八雲洽談。呣呵呵。"
20052-30 = "那麼……\n新的銷路在……"
20052-40 = "這裡，溫暖得\n令人安心呢……"
20052-50 = "要是在那邊設個\n販售區……呣呵呵。"
20052-60 = "最近的文學，\n就跟平台商業一樣呢。"
20052-70 = "那麼，今天的\n銷售額是……？"
20052-80 = "哎呀～我還在想\n您什麼時候會來呢……"
20052-90 = "我可是伸長脖子\n等著您唷，老師。"
20052-100 = "那麼話不多說，\n關於出版部與夏萊的\n新合作專案──"
20052-110 = "就讓我們來，\n好好談談吧。\n呣呵呵。"
20052-120 = "我一直等著您哦，老師。"
20052-130 = "在這裡等待的期間，\n我針對夏萊的書架\n必須要有的好書──"
20052-140 = "以出版部部長的身分\n進行嚴選後，\n把清單整理好了。"
20052-150 = "……只要您一句話，\n立刻就能送來哦。\n呣呵呵。"
20052-160 = "事業計畫書的撰寫，\n就和我的興趣差不多。\n沒錯。"
20052-170 = "很奇怪？\n嗯，我想也是吧。"
20052-180 = "我喜歡思考可能性。"
20052-190 = "想到什麼就寫什麼，\n其實意外地有趣哦？"
20052-200 = "……那不是計畫書，\n而是靈感筆記？"
20052-210 = "您在說什麼啊！\n才不是靈感筆記本哦？"
20052-220 = "問我哪裡不是……\n那個，就是說……"
20052-230 = "受不了，和事務局\n間的交涉預算……\n真的是累死人了。"
20052-240 = "不過……只要最後能\n把預算爭取到就行了。"
20052-250 = "如果能提出足以讓事務局\n求之若渴的魅力企劃……"
20052-260 = "就能獲得比沒能用部費名目\n爭取的錢更多的預算……！\n呣呵呵。"
20052-270 = "在抵達夏萊之前，\n我使用了各式各樣的\n交通手段……"
20052-280 = "這附近的鐵道設施\n真的很完善……\n真讓人羨慕呢……"
20052-290 = "……雖然讓我羨慕的，\n還不只這些就是了。"
20052-300 = "最近，出版業界\n稍微～有點嚴峻呢。"
20052-310 = "文字被影像\n壓過去的傾向\n依舊沒停過～"
20052-320 = "於是，我們就察覺到了。"
20052-330 = "只要出版部也開始\n經手影像的話，\n就能一石二鳥了！"
20052-340 = "唉……撇開場面話不說，\n夏萊真是個好地方呢。"
20052-350 = "我甚至都想轉學到這裡來了。"
20052-360 = "既溫暖，\n設施又齊全，\n事業機會也多……\n還有老師在。"
20052-370 = "……夏萊不是學校，\n所以不能轉學？"
20052-380 = "……我就這樣\n再度被現實的\n嚴苛給擊垮了呢。"
20052-390 = "哎呀哎呀，\n這不是今天的主角嗎。"
20052-400 = "祝您生日快樂，老師。\n我這裡有一份小小的禮物。"
20052-410 = "來，是圖書禮券。\n……期待您前來消費唷。\n呣呵呵。"
20052-420 = "今天是5月18日哦～？"
20052-430 = "您沒有忘記吧～？\n有沒有什麼話\n要對我說呀～？"
20052-440 = "不愧是老師！\n居然清楚記得我的生日！"
20052-450 = "新的一年開始了呢，\n唔嗯……"
20052-460 = "世上的事業大多\n會配合新年商戰\n計畫各種活動──"
20052-470 = "不過這同時也是種兩難呢……"
20052-480 = "因為大家都做的關係，\n經濟效果其實有限……"
20052-490 = "可是如果不做的話，\n又會在競爭中落後……"
20052-500 = "聖誕節前後是旺季，\n這種說法經常能聽見呢。"
20052-510 = "然而認為這個時期\n推出什麼都能賣的──"
20052-520 = "那種草率輕浮又廉價的企劃，\n可是會讓事業走向失敗的。"
20052-530 = "今天是萬聖節嗎。"
20052-540 = "這是我從認識老師之後\n就湧現的疑問……"
20052-550 = "從老師那裡拿到糖果，\n和獲得對老師惡作劇的權利──"
20052-560 = "究竟哪邊比較划算呢～？"
20052-580 = "哦哦……軟綿綿的呢。"
20052-590 = "意外還挺不錯的……\n也說不定。"
20052-600 = "……本來是這麼想的，\n果然很冷呢。"
20052-610 = "哈啾！"
20052-620 = "拍好了嗎？\n那麼接下來輪到老師了。"
20052-630 = "咦？\n……您該不會打算\n只讓我一個人做吧？"
20052-640 = "真是的，那樣未免有點\n想得太簡單了吧？老師？"
20052-650 = "赤冬的的嚴寒，\n對所有人都是平等的唷？\n呣呵呵。"
20052-2600 = "笨蛋和剪刀都取決於如何使用……\n看來今後似乎能讓人\n「確實」遵守契約了呢……呣呵呵。"

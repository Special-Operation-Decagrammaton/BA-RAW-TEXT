[translation]
20047-10 = "蔚藍……檔案。"
20047-20 = "身為百花繚亂的作戰參謀……\n游泳什麼的就跟兒戲沒兩樣。\n……我已經把教材讀得滾瓜爛熟了。來，出發吧。"
20047-30 = "哼嗯……老師\n有這種興趣啊？"
20047-40 = "放輕鬆……\n深呼吸……\n要浮在水上……\n真困難……"
20047-50 = "陽光恰到好處的\n地方……在哪裡呢？"
20047-60 = "泳裝……是不是\n有點太小了？"
20047-70 = "蓮華他，\n游得還真好……"
20047-80 = "歡迎回來，老師。"
20047-90 = "我們的約定，你沒有忘記吧？\n……會幫我上游泳課吧？"
20047-100 = "天氣真不錯。"
20047-110 = "那麼，要去海邊了。\n快點準備一下吧。"
20047-120 = "就像你知道的一樣，\n我不諳水性。"
20047-130 = "海什麼的就更不用說了。\n不過……"
20047-140 = "如果是和大家一起……\n也不壞吧。"
20047-150 = "……你知道嗎？\n「大家」之中也包含你哦。"
20047-160 = "啊啊，這個？\n是被百花繚亂\n的大家推薦的。"
20047-170 = "說是穿起來\n超級適合之類的。"
20047-180 = "……你也這麼覺得啊。"
20047-190 = "是嗎……那就好。"
20047-200 = "下次一起去買泳裝吧。"
20047-210 = "不是買我的，是買你的。\n我會幫你挑選的。"
20047-220 = "當然，是依照我的喜好。\n不接受反駁。"
20047-230 = "最好記又簡單的\n游泳方式是哪種？"
20047-240 = "狗爬式？\n……揍你哦。"
20047-250 = "我不會游泳這個弱點，\n你已經知道了。"
20047-260 = "所以你也告訴我吧？\n你的弱點。"
20047-270 = "要組成同盟的話，\n就得互相袒露弱點才行。"
20047-280 = "因為我們是命運共同體\n……對吧？"
20047-290 = "今天很特別。\n畢竟是你出生的日子啊。"
20047-300 = "……雖然我沒想到\n有天會穿成這樣來慶祝\n某人的生日就是了。"
20047-310 = "老師你……\n想要什麼樣的回憶呢？"
20047-320 = "今天是我的生日。\n你還記得吧？"
20047-330 = "接下來的行程，\n全部都取消吧。"
20047-340 = "要和你一起度過的作戰，\n我已經全部擬定好了。"
20047-350 = "……你本來就\n把行程空出來了？"
20047-360 = "是嗎。\n我認為這是個好決定。"
20047-370 = "因為今天是新年，\n我嘗試了不合時宜……"
20047-380 = "會留下強烈印象的服裝……\n你覺得怎麼樣？"
20047-390 = "呵呵，不覺得是與\n作戰參謀相符的奇策嗎？"
20047-400 = "這副打扮？是我\n「不打算離開這裡」\n的意思表示。"
20047-410 = "我今天想在這裡度過。"
20047-420 = "而你，會陪在我身邊對吧？"
20047-430 = "因為是萬聖節，\n我試著變裝了一下……"
20047-440 = "選擇泳裝的理由……？"
20047-450 = "因為想看你那副\n驚訝的表情。"
20047-460 = "呵呵，惡作劇成功。"
20047-480 = "怎麼樣？\n還不賴吧？"
20047-490 = "是我為了今天而做的。"
20047-500 = "來，好好享受吧。"
20047-510 = "其實……\n這全部，\n都是第一次。"
20047-520 = "無論是在製作東西的時候，\n一直浮現某個人的臉……"
20047-530 = "還是把毫無防備的模樣，\n展現給某個人看。"
20047-540 = "雖然……我沒打算\n連是誰都說出來就是了。"
20047-550 = "……今後也待在我身邊吧。"
20047-560 = "你的身旁，\n就由我來守護。"
20047-570 = "……這個同盟，是永恆的哦。"
20047-2600 = "哼嗯……這就是老師表現信任的方式啊。\n那麼，往後就更加……盡情地依賴我吧。\n就像我相信著你一樣。\n……你做得到吧？"

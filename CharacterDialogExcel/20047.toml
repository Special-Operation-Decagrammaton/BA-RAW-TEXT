[translation]
20047-10 = "Blue...Archive."
20047-20 = "I'm the Hyakkaryouran's operations officer. I have no issues with swimming. I've thoroughly studied the literature for today."
20047-30 = "Hmm, so this is where your inclinations lie."
20047-40 = "Relax...deep breaths... Float upon the water... It's rather difficult..."
20047-50 = "Where does the sunlight hit best?"
20047-60 = "This swimsuit... It's a bit tight."
20047-70 = "How is Renge so adept at swimming?"
20047-80 = "Welcome, Sensei."
20047-90 = "You promised to instruct me in swimming today. You didn't forget, did you?"
20047-100 = "The weather is pleasant."
20047-110 = "We depart for the beach. Make your preparations."
20047-120 = "You're well aware that I find submerging myself in the water distasteful."
20047-130 = "Therefore, I also find the beach distasteful. However..."
20047-140 = "...if it is together with everyone... It's acceptable."
20047-150 = "Feel honored. That \"everyone\" includes you as well."
20047-160 = "I chose this swimsuit with everyone from the Hyakkaryouran."
20047-170 = "They praised me the moment I put it on."
20047-180 = "...You are in agreement?"
20047-190 = "Thank you."
20047-200 = "We should go swimsuit shopping together in the future."
20047-210 = "Not for me. I shall choose one for you."
20047-220 = "Naturally, it will be one to my liking. I will not hear any objections."
20047-230 = "What is the easiest stroke to learn, Sensei?"
20047-240 = "Doggy paddle...? Fufu, are you TRYING to get scolded by me?"
20047-250 = "You now know my weakness: I cannot swim."
20047-260 = "Therefore, you must also reveal your weakness to me."
20047-270 = "Allies should share their vulnerabilities with each other."
20047-280 = "After all, we share a common fate...yes?"
20047-290 = "This day is a special one. It's your birthday."
20047-300 = "...I never could have predicted I would celebrate someone's birthday dressed like so."
20047-310 = "Sensei... What kind of memories do you wish to make?"
20047-320 = "Sensei. Today is my birthday."
20047-330 = "Therefore, expect to clear your schedule for the remainder of the day."
20047-340 = "I've planned every minute detail of our \"Spend Time Together Operation.\""
20047-350 = "...Hm? You've already cleared it?"
20047-360 = "I suppose you pass."
20047-370 = "I've attempted to wear a special outfit for New Year's..."
20047-380 = "...in order to ensure it is an unforgettable one."
20047-390 = "Fufu. My clever tactics are rather befitting of an operations officer, yes?"
20047-400 = "By wearing this outfit, I am messaging my unwillingness to venture outdoors this Christmas."
20047-410 = "I wish to remain here today."
20047-420 = "You'll stay by my side, yes?"
20047-430 = "I donned a special Halloween outfit just for you, Sensei."
20047-440 = "Why swimwear...?"
20047-450 = "For the opportunity to behold your shock and surprise, of course."
20047-460 = "Fufu. Prank successful."
20047-480 = "How is it? Quite nice, right?"
20047-490 = "I built it for you."
20047-500 = "So enjoy to your heart's content."
20047-510 = "To confess... This was a first for me."
20047-520 = "To be thinking of someone while creating something."
20047-530 = "And to lower my defenses so completely in front of someone."
20047-540 = "I will not...specify who, though."
20047-550 = "...Please continue to stay by my side."
20047-560 = "And I shall stay by yours."
20047-570 = "...This alliance is eternal."
20047-2600 = "Hm... So this is how you express your trust. If that is so, you should...rely on me more. Just as I trust you. ...You're capable of this, yes?"

[translation]
20047-10 = "Blue... Archive"
20047-20 = "ฉันคือที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน\nการว่ายน้ำน่ะไม่ใช่ปัญหาหรอก\nฉันอ่านหนังสือว่ายน้ำมาหลายเล่มเพื่อวันนี้เลย"
20047-30 = "ฮืม คุณครูมีรสนิยม\nแบบนี้เองสินะ"
20047-40 = "ผ่อนคลาย... หายใจเข้าลึกๆ\nทำไมการลอยตัวในน้ำ...\nมันถึงยากจัง..."
20047-50 = "ตรงไหนบ้างนะ\nที่แสงแดดส่องถึง?"
20047-60 = "ชุดว่ายน้ำตัวนี้มัน...\nรัดไปนิดหน่อยนะ"
20047-70 = "ทำไมเรนเกะถึง\nว่ายน้ำเก่งแบบนั้นนะ?"
20047-80 = "เข้ามาสิ คุณครู"
20047-90 = "ไม่ลืมใช่มั้ยว่าวันนี้ก็\nจะมาสอนฉันว่ายน้ำน่ะ?"
20047-100 = "อากาศดีจังเลยนะ"
20047-110 = "แน่นอนสิ ก็เราจะไปทะเล\nกันนี่นา รีบเตรียมตัวเร็วเข้า"
20047-120 = "คุณก็น่าจะรู้ว่า\nฉันไม่ค่อยชอบ\nลงน้ำสักเท่าไร"
20047-130 = "ฉันก็เลยไม่ชอบทะเลด้วย\nแต่ว่า..."
20047-140 = "ถ้าได้อยู่กับทุกคน...\nมันก็ไม่แย่นะ"
20047-150 = "ถือว่าเป็นเกียรติเลยนะ\nเพราะทุกคนที่ฉันพูดถึง\nก็มีคุณอยู่ด้วย"
20047-160 = "ชุดว่ายน้ำชุดตัวนี้\nทุกคนในเฮียกกะเรียวรัน\nช่วยกันเลือกให้น่ะ"
20047-170 = "พอเห็นชุด ทุกคนก็\nบอกว่าเหมาะกับฉันเลย"
20047-180 = "คุณก็คิดเหมือนกันงั้นเหรอ...?"
20047-190 = "ขอบใจนะ"
20047-200 = "ไว้เราไปเลือก\nชุดว่ายน้ำด้วยกันนะ"
20047-210 = "ไม่ใช่ของฉัน ของคุณต่างหาก\nเดี๋ยวฉันเลือกให้เอง"
20047-220 = "แต่ฉันจะเลือกตามรสนิยมของฉันนะ\nขอไม่ฟังความเห็นต่างด้วย"
20047-230 = "คุณครู ท่าว่ายน้ำอะไร\nที่ฝึกง่ายที่สุดเหรอ?"
20047-240 = "ท่าลูกหมาตกน้ำ... งั้นเหรอ?\nฮุฮุ อยากโดนดุสินะ"
20047-250 = "คุณรู้จุดอ่อนของฉัน\nว่าฉันว่ายน้ำไม่เป็น"
20047-260 = "เพราะงั้นก็บอกจุดอ่อน\nของคุณมาบ้างสิ"
20047-270 = "ถ้าจะเป็นพันธมิตรกัน\nก็ต้องบอกจุดอ่อนกันสิ"
20047-280 = "ก็เพราะว่าเรา\nลงเรือลำเดียวกัน... แล้วนี่นา?"
20047-290 = "วันนี้เป็นวันพิเศษ\nเพราะว่าเป็นวันเกิดของคุณ"
20047-300 = "ไม่คิดเลยนะว่าฉันจะได้\nอวยพรวันเกิดใคร\nในชุดแบบนี้น่ะ..."
20047-310 = "คุณครู... อยากสร้าง\nความทรงจำแบบไหนเหรอ?"
20047-320 = "คุณครู วันนี้วันเกิดฉันละ"
20047-330 = "เพราะงั้นวันนี้ก็\nทำตัวให้ว่างทั้งวันเลยนะ"
20047-340 = "ก็ฉันวางแผนที่จะ\nใช้เวลาทั้งวันกับคุณ\nไว้หมดแล้วน่ะสิ"
20047-350 = "หืม...? ตั้งใจทำตัวให้ว่าง\nอยู่แล้วงั้นเหรอ?"
20047-360 = "ใช้ได้เลยนะ"
20047-370 = "วันนี้วันปีใหม่\nฉันก็เลยใส่ชุดพิเศษๆ ดู"
20047-380 = "จะได้เป็นที่จดจำ\nมากกว่าเวลาอื่นไงล่ะ"
20047-390 = "ฮุฮุ เป็นอุบายที่สมกับ\nปรึกษายุทธศาสตร์เลยว่ามั้ย?"
20047-400 = "การใส่ชุดแบบนี้\nกระทั่งในวันคริสต์มาส\nคือการแสดงความตั้งใจว่า\nฉันไม่อยากออกไปข้างนอกน่ะ"
20047-410 = "วันนี้ฉันอยากอยู่ที่นี่"
20047-420 = "คุณก็จะอยู่ข้างๆ กันใช่มั้ย?"
20047-430 = "ฉันใส่ชุดฮาโลวีน\nสุดพิเศษมา\nเพื่อคุณครูเลย"
20047-440 = "เหตุผลที่เลือก\nชุดว่ายน้ำน่ะเหรอ...?"
20047-450 = "ฉันอยากเห็นใบหน้าที่\nประหลาดใจแบบนั้นไง"
20047-460 = "ฮุฮุ\nแกล้งสำเร็จแล้ว"
20047-480 = "เป็นยังไงล่ะ?\nใช้ได้เลยใช่มั้ย?"
20047-490 = "ฉันถักมันไว้\nเพื่อวันนี้เลย"
20047-500 = "หวังว่า\nคุณจะสนุกให้เต็มที่เลยนะ"
20047-510 = "ที่จริง...\nนี่เป็นครั้งแรกเลยละ"
20047-520 = "ที่ฉันทำอะไร\nแล้วนึกถึงหน้าของ\nใครบางคนตลอดเลย"
20047-530 = "รวมถึงการให้ใครได้เห็น\nฉันที่ผ่อนคลายแบบนี้ด้วย"
20047-540 = "ฉันจะ... ไม่บอกหรอกนะ\nว่าคนคนนั้นคือใคร"
20047-550 = "แต่ต่อไปก็ช่วยอยู่ข้างๆ ฉันด้วยนะ..."
20047-560 = "ฉันเองก็จะคอยปกป้องคุณ\nอยู่ข้างๆ เหมือนกัน"
20047-570 = "พันธมิตรของเรา\nจะไม่มีวันเสื่อมคลายนะ..."
20047-2600 = "ฮืม... นี่คือความน่าเชื่อถือในแบบ\nคุณครูสินะ งั้นต่อไปก็...\nมาพึ่งพิงฉันให้มากขึ้นนะ\nเหมือนที่ฉันพึ่งพิงคุณไง\nทำได้ใช่มั้ย...?"

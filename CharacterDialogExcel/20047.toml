[translation]
20047-10 = "블루…… 아카이브."
20047-20 = "나는 백화요란의 작전 참모.\n수영 정도는 아무런 문제 없어.\n오늘을 위해 다양한 수영 교본을 탐독했으니까."
20047-30 = "흐음, 선생님은\n이런 취향이구나."
20047-40 = "힘을 빼고… 심호흡…\n물에 뜨는 거… 어렵네…."
20047-50 = "햇볕이 잘 드는 곳은\n어디지?"
20047-60 = "이 수영복……\n조금 꽉 끼네."
20047-70 = "렌게는 어떻게 그렇게\n수영을 잘할까?"
20047-80 = "어서 와, 선생님."
20047-90 = "오늘도 수영을 알려주겠다는\n약속, 잊지 않았지?"
20047-100 = "좋은 날씨네."
20047-110 = "그럼, 바다로 갈 거니까.\n어서 준비해."
20047-120 = "당신도 알겠지만,\n나는 물에 들어가는 걸\n별로 좋아하지 않아."
20047-130 = "그래서 바다도 싫어.\n하지만……"
20047-140 = "모두와 함께라면……\n나쁘지 않아."
20047-150 = "영광으로 생각해.\n그 모두엔 당신도 포함되니까."
20047-160 = "이 수영복은 백화요란의\n모두와 함께 고른 거야."
20047-170 = "다들 보자마자\n나랑 잘 어울린다더라."
20047-180 = "……당신이 보기에도 그렇다고?"
20047-190 = "고마워."
20047-200 = "언제 같이 수영복을\n고르러 가자."
20047-210 = "내 거 말고, 당신 거.\n골라줄 테니까."
20047-220 = "물론 내 취향인 걸로 사는 거야.\n불만은 듣지 않겠어."
20047-230 = "선생님. 가장 배우기 쉬운\n수영이 뭘까?"
20047-240 = "개헤엄…… 이라고?\n후후, 혼나고 싶구나?"
20047-250 = "당신은 수영을 못하는\n나의 약점을 알고 있어."
20047-260 = "그러니까, 당신의 약점도\n나에게 알려줘."
20047-270 = "동맹을 맺는다면,\n약점을 공유해야지."
20047-280 = "왜냐하면,\n운명공동체… 잖아?"
20047-290 = "오늘은 정말 특별한 날이네.\n당신의 생일이니까."
20047-300 = "…이런 차림으로 누군가의\n생일을 축하해주는 날이\n올 줄은 생각도 못 했어."
20047-310 = "선생님은… 어떤 추억을\n만들고 싶어?"
20047-320 = "선생님. 오늘은 내 생일이야."
20047-330 = "그런 이유로, 지금부터\n모든 일정을 비우도록 해."
20047-340 = "당신과 시간을 보내기\n위한 작전은, 전부\n짜두었으니까."
20047-350 = "……응? 미리 시간을 비웠다고?"
20047-360 = "제법이네."
20047-370 = "오늘은 새해니까\n특별한 옷을 입어봤어."
20047-380 = "이러면 그 어느 때보다\n기억에 남을 테니까."
20047-390 = "후훗, 작전참모다운\n기책이라고 생각하지 않아?"
20047-400 = "크리스마스에도\n이런 옷차림이라는 건,\n밖에 나가기 싫다는\n강력한 의지의 표명이야."
20047-410 = "오늘은 여기서\n보내고 싶어."
20047-420 = "당신은, 옆에\n있어 줄 거지?"
20047-430 = "선생님을 위해\n특별 할로윈 의상을\n입어봤어."
20047-440 = "수영복을 고른\n이유…?"
20047-450 = "그 놀란 표정을\n보고 싶어서."
20047-460 = "후후,\n장난 성공."
20047-480 = "어때?\n꽤나 좋지 않아?"
20047-490 = "오늘을 위해\n만들어 봤지."
20047-500 = "마음껏\n즐겨줬으면 좋겠어."
20047-510 = "사실……\n처음이야."
20047-520 = "뭔가를 만들며\n그 사람의 얼굴이\n계속 떠오른 것도."
20047-530 = "이렇게 무방비한 모습을\n다른 사람에게 보이는 것도."
20047-540 = "딱히…… 누구라고까지는\n말하지는 않겠지만."
20047-550 = "……앞으로도 내 곁에 있어 줘."
20047-560 = "나도 항상 당신의 곁을\n지킬 테니까."
20047-570 = "……이 동맹은,\n영원한 거야."
20047-2600 = "흐음…… 이것이, 선생님 나름의 신뢰구나.\n그럼, 앞으로는 좀 더……\n의지하도록 해.\n내가 당신을 신뢰하는 것처럼.\n……할 수 있지?"

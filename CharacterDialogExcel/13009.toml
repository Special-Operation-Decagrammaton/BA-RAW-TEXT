[translation]
13009-10 = "Blue...Archive..."
13009-20 = "I thought this moment...was a dream. Hello, Sensei. I'll be working with you from now on."
13009-30 = "This place is so comfy that I could see myself taking a nap here."
13009-40 = "It feels like I'm dreaming. I wonder why..."
13009-50 = "Ahahaha! Ah, whew... All that laughing made me sleepy."
13009-60 = "Wow! I think I can get a good rest here."
13009-70 = "Heeheehee. A new pillow should be arriving soon. I can't wait."
13009-80 = "Ahahaha! In the dream I just had, Sensei was... Oh my goodness, it was too funny! Ahaha!"
13009-90 = "Ahahaha! I slept great. Hmm? You've never seen me like this before?"
13009-100 = "*yawn* G'morning, Sensei."
13009-110 = "Huh? It's not morning?"
13009-120 = "Who cares...?"
13009-130 = "Zzz. Sorry, Sensei... I think I need some more sleep."
13009-140 = "Do you wanna lie down too...Sensei?"
13009-150 = "*yawn* Huh? When did you get here, Sensei?"
13009-160 = "Now's the perfect time for a nap..."
13009-170 = "I think we'd both be more productive...after a good nap."
13009-180 = "What am I never able to get a good night's rest?"
13009-190 = "Heh heh. Should I tell you, Sensei?"
13009-200 = "Well..."
13009-210 = "It's hard to sleep when I know that I get to see you when I wake up."
13009-220 = "I'm so happy."
13009-230 = "(I wish this moment could last forever. I feel so comfy.)"
13009-240 = "Happy birthday, Sensei."
13009-250 = "Care to take a celebratory birthday nap? *yawn* You can use my lap as a pillow."
13009-260 = "Today is...my birthday?"
13009-270 = "What better way to celebrate than by sleeping in more?"
13009-280 = "Happy New Year. My resolution is to wake up earlier this year."
13009-290 = "I love Christmas..."
13009-300 = "It's not a typical holiday in Hyakkiyako..."
13009-310 = "...but it's still a holy night that many people find joy during."
13009-320 = "It'd be a waste to sleep today."
13009-330 = "Let's go outside, Sensei."
13009-340 = "It's going to feel like a dreamscape, even when we're awake."
13009-360 = "Sensei. You're here..."
13009-370 = "Yup. It's training. I was meditating..."
13009-380 = "You think I was just dozing off...?"
13009-390 = "Not at all. This is all part of my training..."
13009-400 = "I didn't expect to find such a good training spot nearby."
13009-410 = "I'm so happy. It feels like a dream..."
13009-420 = "Am I this happy thanks to you, Sensei?"
13009-430 = "Mmm! Don't just stand there, Sensei."
13009-440 = "Let's lie down and..."
13009-450 = "...nap together."
13009-2600 = "This weapon is... Is this a dream? My dream came true, then."

[translation]
13009-10 = "蔚藍…檔案…"
13009-20 = "我以為是夢的，這個瞬間…\n你好，老師。\n今後請你多多指教囉。"
13009-30 = "總覺得這裡是個\n會讓人想睡覺的悠閒空間呢～"
13009-40 = "感覺像在做夢一樣。\n為什麼呢？"
13009-50 = "啊哈哈！\n啊──…\n一笑就想睡了。"
13009-60 = "哇～這裡的話\n好像能好好休息～"
13009-70 = "呵呵呵。\n新的枕頭送來囉。\n太令人期待了。"
13009-80 = "啊哈哈哈！剛，剛才…！\n夢裡的…老師…啊～不行，\n真的太有趣了！啊哈哈。"
13009-90 = "啊哈哈哈！啊～睡得好飽！\n嗯？第一次看到這副模樣？"
13009-100 = "哈啊～\n早安……老師。"
13009-110 = "咦？已經不是早上了？"
13009-120 = "沒關係吧～"
13009-130 = "呼啊。老師…對不起…\n我再睡一下。"
13009-140 = "老師也要…躺這裡嗎？"
13009-150 = "呼啊～咦？\n老師。你來啦？"
13009-160 = "明明是適合午睡的好時間…"
13009-170 = "先睡一覺的話，\n工作也會更順利不是嗎？"
13009-180 = "晚上做了什麼\n才會這麼想睡覺？"
13009-190 = "呵呵。要告訴老師嗎～"
13009-200 = "呼啊…嗯…"
13009-210 = "睡醒之後\n最先見到的人\n是老師的話…"
13009-220 = "…真好呢。"
13009-230 = "（希望時間能就這麼停下來。\n總覺得，心情非常愉快。）"
13009-240 = "生日快樂，老師。"
13009-250 = "我讓老師膝枕，\n要不要睡一下呀？"
13009-260 = "今天是…\n我的生日…？"
13009-270 = "得多睡一點留念才行…\n這樣真好呢。"
13009-280 = "新年快樂。\n今年會再努力一點起床的哦。"
13009-290 = "我喜歡聖誕節…"
13009-300 = "雖然在百鬼夜行是\n比較少見的節慶"
13009-310 = "因為這是很多人\n都會露出幸福表情的，\n神聖的夜晚哦。"
13009-320 = "今天是捨不得\n拿來睡覺的日子呢。"
13009-330 = "我們去街上吧，老師。"
13009-340 = "就算醒著，肯定也能有\n像是在夢裡一樣的感覺的。"
13009-360 = "老師…\n來了啊…"
13009-370 = "嗯，現在正在修行中…\n正在坐禪…"
13009-380 = "我是不是在打瞌睡…？"
13009-390 = "不是唷…\n這也是修行的一環…"
13009-400 = "沒想到附近有\n這麼適合修行的好地方…"
13009-410 = "好幸福。\n好像在做夢…"
13009-420 = "這份幸福，\n也是託老師的福嗎…？"
13009-430 = "嗯…好了，\n那個…老師也別\n愣在那裡。"
13009-440 = "和我一起…"
13009-450 = "…睡吧？"
13009-2600 = "這個武器是……我在做夢嗎……\n一直期盼著的事，成真了。"

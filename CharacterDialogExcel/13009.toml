[translation]
13009-10 = "Blue… Archive…"
13009-20 = "ความรู้สึกนี้... คิดว่าฝันไปซะอีก\nสวัสดีคุณครู ฝากตัวด้วยนะ"
13009-30 = "ที่นี่ดูผ่อนคลายจังเลย\nฉันชักจะง่วงแล้วสิ~"
13009-40 = "รู้สึกเหมือนฝันอยู่เลย\nทำไมนะ?"
13009-50 = "อะฮ่าฮ่าฮ่า!\nฮ้าวว~ หัวเราะจนง่วงเลย"
13009-60 = "ว้าว~ ถ้าเป็นที่แบบนี้ล่ะก็\nฉันนอนหลับปุ๋ยได้เลยล่ะ~"
13009-70 = "ฮุฮุฮุฮุ\nฉันสั่งหมอนใบใหม่ไปล่ะ\nรอไม่ไหวแล้ว"
13009-80 = "อะฮ่ะฮ่า! เมื่อกี๊.. เจอคุณครู...\nในความฝันด้วยล่ะ...\nตลกที่สุดเลย ฮ่ะฮ่ะฮ่าา"
13009-90 = "อะฮ่ะฮ่า! ได้นอนเต็มอิ่มเลย\nว่าไงนะ? ไม่เคยเห็นอะไร\nแบบนี้มาก่อนเหรอ?"
13009-100 = "ฮ้าวว\nคุณครู~ อรุณสวัสดิ์"
13009-110 = "หืม? นี่ไม่ใช่ตอนเช้าเหรอ?"
13009-120 = "ก็แล้วยังไงล่ะ~"
13009-130 = "งืมม คุณครู... ขอโทษนะ...\nขอนอนต่ออีกหน่อยนะ zzZ"
13009-140 = "คุณครูก็... มานอนตรงนี้ไหม?"
13009-150 = "เอ๋? มาจริงๆ เหรอเนี่ย?"
13009-160 = "เวลานี้ช่างเหมาะกับการนอนกลางวัน..."
13009-170 = "ถ้าได้นอนสักตื่น…\nก็คงจะมีแรงทำงานนะ"
13009-180 = "ตอนกลางคืนทำอะไร\nถึงได้มาง่วงแบบนี้น่ะเหรอ?"
13009-190 = "ฮุฮุ บอกคุณครูดีมั้ยน้า~"
13009-200 = "อืมมม..."
13009-210 = "คนแรกที่ฉันเจอหลังจากตื่นนอน\nก็คือคุณครูไงล่ะ..."
13009-220 = "ชอบแบบนี้จังเลย"
13009-230 = "(อยากให้เวลาหยุดอยู่ตรงนี้จัง\nรู้สึกสบายใจอย่างบอกไม่ถูกแฮะ)"
13009-240 = "สุขสันต์วันเกิดนะคุณครู"
13009-250 = "ฉันจะให้นอนหนุนตัก...\nมานอนสักงีบไหมล่ะ?"
13009-260 = "วันนี้...\nเป็นวันเกิดฉันงั้นเหรอ...?"
13009-270 = "ถ้างั้นก็ต้องนอนเยอะๆ\nฉลองวันเกิดหน่อยแล้ว"
13009-280 = "สวัสดีปีใหม่\nปีนี้ฉันจะลองนอนให้น้อยลงดู"
13009-290 = "ชอบวันคริสต์มาสจัง..."
13009-300 = "ถึงจะไม่ได้เป็นเทศกาลพิเศษ\nของชาวเฮียกคิยาโคก็เถอะ"
13009-310 = "แต่ก็เป็นคืนศักดิ์สิทธิ์\nที่ผู้คนต่างก็... มีความสุขด้วยกัน"
13009-320 = "เวลาดีๆ แบบนี้ฉันไม่อยากนอนเลย"
13009-330 = "ออกไปเที่ยวเล่นกันเถอะคุณครู!"
13009-340 = "ถึงตอนนี้จะตื่นอยู่...\nแต่รับรองว่ามันจะดีราวกับฝันไปเลยล่ะ"
13009-360 = "มาแล้วเหรอคุณครู?"
13009-370 = "อื้มม... ฉันกำลังฝึกอยู่น่ะ...\nนอนฝึกสมาธิอยู่..."
13009-380 = "ไม่เหมือนนอนฝึก\nแต่เหมือนนอนง่วงงั้นเหรอ?"
13009-390 = "เปล่าสักหน่อย\nนี่เป็นส่วนหนึ่ง\nของการฝึกต่างหาก"
13009-400 = "ไม่คิดเลยว่าแถวนี้จะมี\nที่ที่เหมาะกับการฝึกฝน..."
13009-410 = "มีความสุขจัง\nเหมือนกำลังฝันอยู่เลย..."
13009-420 = "ความสุขทั้งหมดนี่\nเกิดขึ้นเพราะคุณครูรึเปล่านะ...?"
13009-430 = "อืม... คือ...\nคุณครูเองก็อย่ามัวแต่\nยืนอยู่อย่างนั้นสิ"
13009-440 = "มานอนฝึก... ด้วยกัน"
13009-450 = "ตรงนี้ไหม...?"
13009-2600 = "อาวุธนี่... ฝันหรือเปล่านะ...\nความปรารถนาของฉัน... เป็นจริงแล้วสินะ"

[translation]
13003-10 = "블루 아카이브."
13003-20 = "정의실현부의 하네카와 하스미.\n선생님의 지시를 기다리고 있습니다."
13003-30 = "저도 언젠간\n귀여운 짧은 치마를…"
13003-40 = "이 공간, 마음에 드네요.\n자주 오고 싶어집니다."
13003-50 = "가끔씩은 이런 여유도\n괜찮군요."
13003-60 = "맛있어 보이는 게 있지만…\n참아야합니다."
13003-70 = "정의실현부의 원칙은\n심플합니다.\n불의를 용서치 않는거죠."
13003-80 = "안녕하세요.\n오늘 선생님과 처음 만난 사람은\n저인가요?"
13003-90 = "…기쁘네요."
13003-100 = "늦으셨네요.\n또 늦잠 주무신 건가요?\n자꾸 절 기다리게 하시면…"
13003-110 = "직접 깨우러 가겠습니다."
13003-120 = "이번엔 어떤 임무를\n수행하면 될까요?"
13003-130 = "필승법? 음. 저도 하나 알아요.\n끝없는 연습 말이죠."
13003-140 = "잘 웃지 않는다는 얘기를\n가끔씩 듣는데, 선생님이\n볼 때도 그런 것 같나요?"
13003-150 = "정의실현부에는 사랑과\n평화가 가득합니다."
13003-160 = "네?\n농담하는 게 아닙니다만?"
13003-170 = "천천히 업무를 보셔도 됩니다,\n선생님."
13003-180 = "이런 여유로운 것도\n싫어하지 않아서."
13003-190 = "생일이시라고요?"
13003-200 = "축하드려요.\n근데 저는 당장 드릴 수 있는 게\n없는데…"
13003-210 = "어…\n원하시는 게 있으신가요?"
13003-220 = "제 생일…\n보통은 동아리의 동료들과\n함께 보냈는데 이번엔\n선생님과 보내게 되었네요."
13003-230 = "후후.\n뭔가 조금 색다른 기분이네요."
13003-240 = "선생님 덕분에,\n작년은 특별한 한 해였습니다.\n올해에도 잘 부탁드립니다."
13003-250 = "메리 크리스마스입니다.\n이 성스러운 밤에도\n선생님과 함께 있게 되었네요."
13003-260 = "할로윈이라…\n너무 들뜨는 건 조금\n곤란하지 않나 싶지만…"
13003-270 = "오늘은 선생님과 함께니까…\n괜찮지 않을까요?"
13003-290 = "아아. 다 젖어버렸네요.\n곤란하게도."
13003-300 = "흐음.\n쉽게 그칠 것 같진 않은 비네요."
13003-310 = "저와 함께 여기에 꼼짝없이\n갇혀있어야겠네요?"
13003-320 = "후후,\n이런 일은 예상하지 못했는데."
13003-330 = "잠깐이라면…\n이런 여유도 괜찮겠죠."
13003-340 = "…저에겐 사치스럽지만\n소중한 시간입니다."
13003-2600 = "선생님께서 주신 이 힘……\n소중하게 쓰겠습니다."

[translation]
13003-10 = "Blue Archive"
13003-20 = "ฮาเนกาวะ ฮาสุมิ ชมรมทวงความยุติธรรมค่ะ\nรอคำสั่งจากคุณครูอยู่ค่ะ"
13003-30 = "สักวันหนึ่ง ฉันเอง...\nก็อยากจะลองใส่กระโปรงสั้นๆ..."
13003-40 = "ที่นี่ถูกใจฉันมากเลย\nรู้สึกอยากมาบ่อยๆ เลยค่ะ"
13003-50 = "ได้มีเวลาว่างแบบนี้บ้าง\nก็ดีเหมือนกันนะคะ"
13003-60 = "ถึงจะดูน่าอร่อยก็ตาม...\nแต่ก็ต้องอดทนไว้ค่ะ"
13003-70 = "กฎของชมรมทวงความยุติธรรม\nเรียบง่ายมากค่ะ ก็คือไม่ยกโทษ\nให้กับความอยุติธรรมทุกเรื่อง"
13003-80 = "สวัสดีค่ะ\nวันนี้คนที่พบคุณครูเป็นคนแรก\nคือฉันใช่มั้ยคะ?"
13003-90 = "มีความสุขจังเลยค่ะ"
13003-100 = "มาช้านะคะ\nมัวแต่นอนกลางวันอีกแล้วเหรอคะ\nถ้าให้ฉันต้องรอบ่อยๆ แบบนี้ละก็..."
13003-110 = "ฉันจะไปปลุกคุณครูเองนะคะ"
13003-120 = "ครั้งนี้จะให้ทำภารกิจ\nอะไรเหรอคะ?"
13003-130 = "วิธีชนะเหรอคะ? อืม ฉันรู้อยู่\nวิธีหนึ่งค่ะ นั่นคือการฝึกซ้อม\nอย่างไม่มีที่สิ้นสุดยังไงล่ะคะ"
13003-140 = "เรื่องที่บอกว่าฉันไม่ค่อยยิ้ม\nก็เคยได้ยินมาบ้างเหมือนกันค่ะ\nเวลาที่มองฉัน คุณครูคิดแบบนั้นรึเปล่าคะ?"
13003-150 = "ชมรมทวงความยุติธรรม\nมีแต่ความรักและความสงบสุขค่ะ"
13003-160 = "คะ?\nไม่ได้ล้อเล่นนะคะ"
13003-170 = "ค่อยๆ จัดการงานไปก็ได้ค่ะ\nคุณครู"
13003-180 = "การที่ได้มีเวลาว่างแบบนี้บ้าง...\nฉันไม่ได้รังเกียจหรอกนะคะ"
13003-190 = "วันเกิดของคุณครูเหรอคะ?"
13003-200 = "สุขสันต์วันเกิดนะคะ\nแต่ว่าตอนนี้ฉันไม่มีของขวัญอะไร...\nที่จะให้คุณครูได้เลยค่ะ"
13003-210 = "อ่า...\nคุณครูมีอะไรรึเปล่าคะ?"
13003-220 = "วันเกิดของฉัน... ปกติจะใช้เวลาฉลอง\nวันเกิดกับเพื่อนๆ ในชมรม แต่ว่าครั้งนี้\nฉันได้ใช้เวลาร่วมกับคุณครูล่ะค่ะ"
13003-230 = "ฮุฮุ\nรู้สึกสดชื่นมากกว่าทุกวันเลยค่ะ"
13003-240 = "ขอบคุณคุณครูที่ทำให้\nปีที่แล้วเป็นปีที่พิเศษอีกหนึ่งปีเลยค่ะ\nปีนี้ก็ฝากตัวด้วยนะคะ"
13003-250 = "เมอร์รีคริสต์มาสค่ะ\nในคืนวันคริสต์มาสแบบนี้\nฉันได้ใช้เวลาร่วมกับคุณครูนะคะ"
13003-260 = "วันนี้เป็นวันฮาโลวีน...\nมันอาจจะยากสักหน่อย\nที่จะทำให้ฉันตื่นเต้นมากเป็นพิเศษ..."
13003-270 = "วันนี้ได้อยู่กับคุณครู...\nคงไม่เป็นไรใช่มั้ยคะ?"
13003-290 = "อ่า... เปียกหมดเลยนะคะ\nแย่จัง..."
13003-300 = "อืม... ดูเหมือนว่าฝนจะ\nไม่หยุดตกง่ายๆ เลยนะคะ"
13003-310 = "ดูเหมือนว่าคุณครูจะต้องติดอยู่ที่นี่\nกับฉันไปอีกสักพักแล้วนะคะ"
13003-320 = "ฮิฮิ... ไม่นึกเลยว่าจะเป็นแบบนี้"
13003-330 = "ถ้างั้นขอพักสักหน่อย\nคงไม่เป็นไรนะคะ"
13003-340 = "สำหรับฉันแล้ว นี่เป็นช่วงเวลาที่มีค่า\nและสำคัญกับฉันมากเลยค่ะ"
13003-2600 = "ความแข็งแกร่งที่คุณครูมอบให้...\nฉันจะรักษาไว้อย่างดีเลยค่ะ"

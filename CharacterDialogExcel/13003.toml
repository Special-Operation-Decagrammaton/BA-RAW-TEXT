[translation]
13003-10 = "Blue Archive."
13003-20 = "Hanekawa Hasumi of the Justice Task Force. Awaiting orders, Sensei."
13003-30 = "Someday, I'll wear a cute, short skirt..."
13003-40 = "I like it here. It makes me want to stop by more often."
13003-50 = "It's nice to have time off like this on occasion."
13003-60 = "It looks delicious...but I really shouldn't."
13003-70 = "The Justice Task Force has a simple credo: Never forgive injustice."
13003-80 = "Hello. Am I the first one to greet you today?"
13003-90 = "...I'm glad, then."
13003-100 = "You're late. You overslept again, didn't you? It's rude to keep a lady waiting, so..."
13003-110 = "...next time I'll come wake you myself."
13003-120 = "What kind of mission should we carry out today?"
13003-130 = "A sure way to win? Well, I do know of one. Endless training."
13003-140 = "People tell me I don't laugh very often. Do you think that too, Sensei?"
13003-150 = "The Justice Task Force is made of love and peace."
13003-160 = "What? No, I wasn't joking."
13003-170 = "You can take your time with the work, Sensei."
13003-180 = "I don't mind a more relaxed pace."
13003-190 = "It's your birthday?"
13003-200 = "Happy birthday. But I don't have anything to give you..."
13003-210 = "Uh... Is there something you'd like?"
13003-220 = "My birthday... I usually spend my birthday with my clubmates, but today, I'm spending it with you."
13003-230 = "Haha. It feels a bit different."
13003-240 = "Last year was special thanks to you. Let's have another good year together."
13003-250 = "Merry Christmas. I'm happy to spend a holy night like this with you."
13003-260 = "It's Halloween... That alone isn't too exciting."
13003-270 = "But if you're with me...maybe it is."
13003-290 = "Ah. We're drenched. This isn't good..."
13003-300 = "Hmm. The rain isn't showing signs of letting up."
13003-310 = "Well, then, I suppose we're stuck here together, aren't we?"
13003-320 = "Heehee. This wasn't how I expected this evening to go."
13003-330 = "I don't mind relaxing like this...if it's just for a little while."
13003-340 = "It's rare that I get opportunities like this, but I always cherish them."
13003-2600 = "This power you gave me... I will cherish it."

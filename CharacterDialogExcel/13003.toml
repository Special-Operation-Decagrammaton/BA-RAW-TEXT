[translation]
13003-10 = "蔚藍檔案。"
13003-20 = "實現正義部，羽川蓮實。\n正在等候老師的指示。"
13003-30 = "總有一天\n我也要穿可愛的迷你裙…"
13003-40 = "這個空間，我很喜歡。\n不管幾次都想來呢。"
13003-50 = "偶爾有這種\n閒暇也不錯呢。"
13003-60 = "雖然有看起來\n很好吃的東西…\n不過要忍耐才行。"
13003-70 = "實現正義部的原則\n很簡單。不饒恕\n不義，僅此而已。"
13003-80 = "您好。\n今天第一個見到老師的人\n是我嗎？"
13003-90 = "…真開心。"
13003-100 = "來得真慢呢。\n又睡過頭了嗎？\n如果再這樣讓我等的話…"
13003-110 = "我會直接去叫醒您的。"
13003-120 = "這次該執行\n什麼樣的任務才好呢？"
13003-130 = "必勝法是嗎？\n嗯，我也知道一個，\n那就是無止盡的練習。"
13003-140 = "雖然偶爾會被\n別人說我不常笑，\n在老師眼裡也是這樣嗎？"
13003-150 = "實現正義部\n充滿了愛與和平。"
13003-160 = "什麼？\n這不是在開玩笑唷？"
13003-170 = "工作慢慢做\n也沒關係唷，老師。"
13003-180 = "因為這種悠閒的時間，\n我也不討厭。"
13003-190 = "是您的生日嗎？"
13003-200 = "生日快樂。\n不過，我現在沒有\n可以給您的禮物……"
13003-210 = "那個…\n您有沒有什麼想要的東西呢？"
13003-220 = "我的生日…\n之前總是跟社團的夥伴們\n一起度過，不過這次\n卻和老師一起度過了呢。"
13003-230 = "呵呵，總覺得\n有股新鮮的感覺呢。"
13003-240 = "托老師的福，\n去年是個特別的一年，\n今年也請多多指教。"
13003-250 = "聖誕快樂。\n這個神聖的夜晚\n也能和老師在一起呢。"
13003-260 = "萬聖節啊…\n太興奮的話\n雖然有點困擾…"
13003-270 = "但是今天跟老師在一起…\n應該沒關係吧？"
13003-290 = "啊啊，全身都濕透了呢。\n真傷腦筋。"
13003-300 = "唔嗯，雨，\n似乎不會馬上停呢。"
13003-310 = "我們兩人被困在這裡，\n無計可施了呢？"
13003-320 = "呵呵，雖然沒想到會發生這種事。"
13003-330 = "如果只是一會兒…\n像這樣的時間也不錯吧。"
13003-340 = "…雖然奢侈，\n但對我來說是很寶貴的時間。"
13003-2600 = "老師給我的這份力量…\n我會珍惜地使用的。"

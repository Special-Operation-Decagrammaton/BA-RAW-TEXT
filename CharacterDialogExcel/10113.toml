[translation]
10113-10 = "Blue Archive"
10113-20 = "สวัสดีค่ะ คุณครู ฉันฮิมูโระ เซนะ จากชมรมหน่วยแพทย์ฉุกเฉิน สถาบันเกเฮนน่าค่ะ\nไหนๆ ก็เป็นวันหยุด งั้นมาอยู่กับฉันมั้ยคะ?"
10113-30 = "ดูเป็นสถานที่ที่ปลอดภัย\nดีนะคะ"
10113-40 = "ถึงจะไม่มีงาน\nแต่ฉันก็ไม่ควรวางใจ\nอย่างสิ้นเชิงค่ะ"
10113-50 = "ถ้าได้มาที่นี่กับคุณครู\nก็น่าจะดีนะคะ..."
10113-60 = "เฟอร์นิเจอร์\nที่วางไว้ตรงนั้น...\nมันกวนใจฉันค่ะ"
10113-70 = "ยิ่งเป็นที่แบบนี้ ก็ยิ่ง\nต้องระวัง ไม่ให้มีศพ...\nไม่สิ ไม่ให้มีผู้ป่วยค่ะ"
10113-80 = "มาแล้วเหรอคะ คุณครู"
10113-90 = "ฉันได้วันหยุดพอดี\nก็เลยแวะมาหาค่ะ"
10113-100 = "คุณครูทำงาน แต่ฉันหยุด..."
10113-110 = "ใช้โอกาสนี้เปลี่ยน\nวันทำงานของคุณครู\nเป็นวันหยุดสักวันมั้ยคะ?"
10113-120 = "งานอดิเรกของฉันคือการ\nเตรียมพร้อมและจัดเรียงยาค่ะ"
10113-130 = "ฉันรู้ดีค่ะว่ามันไม่ใช่\nงานอดิเรกทั่วไปสักเท่าไร"
10113-140 = "แต่ฉันก็\nสนุกกับมันนะคะ"
10113-150 = "การเตรียมพร้อมทำงานในชาเล่ต์\nก็เป็นเรื่องสนุกดีนะคะ"
10113-160 = "แค่มีคุณครูอยู่ที่นี่\nแค่นี้ก็เพียงพอแล้วค่ะ"
10113-170 = "คุณครูอยู่กับฉันแล้ว\nไม่สะดวกตรงไหนหรือเปล่าคะ?"
10113-180 = "กลับดีใจมากกว่างั้นเหรอคะ?"
10113-190 = "ขอบคุณนะคะ"
10113-200 = "ถ้างั้นฉันก็จะ\nดีใจอย่างเปิดเผยด้วยค่ะ"
10113-210 = "ถามว่าฉันชอบทะเล\nหรือเปล่าน่ะเหรอคะ?"
10113-220 = "ไม่รู้สิคะ"
10113-230 = "แต่ฉันแน่ใจว่ามันเป็น\nที่ที่ฉันไม่คุ้นเคยค่ะ"
10113-240 = "แต่ว่าที่นั่น ฉันน่าจะได้เห็น\nศพจมน้ำที่แปลกประหลาด..."
10113-250 = "ขอโทษที่เสียมารยาทค่ะ ที่นั่นฉัน\nน่าจะได้เห็นผู้ป่วยฉุกเฉินน่ะค่ะ"
10113-260 = "มันยากที่จะใช้คำพูดให้ชัดเจน\nแต่การได้ใช้เวลากับคุณครู"
10113-270 = "สำหรับฉันแล้วเป็นเวลาที่\nแปลกใหม่มากๆ เลยค่ะ"
10113-280 = "อีกนัยหนึ่ง ก็หมายความว่า\nเป็นช่วงเวลาแสนพิเศษค่ะ"
10113-290 = "หรืออีกนัยหนึ่ง ก็หมายความว่า\nคุณครูเป็นคนสำคัญของฉันไปแล้วค่ะ"
10113-300 = "วันนี้เป็นวันเกิดของคุณครูสินะคะ"
10113-310 = "ระวังอย่าทานเค้กกับของหวาน\nให้มากเกินไปนะคะ"
10113-320 = "ถ้าเกิดเรื่องอะไรขึ้นมา ฉันจะ\nปฐมพยาบาลให้คุณครูเองค่ะ"
10113-330 = "ขอแจ้งให้ทราบว่าวันนี้\nคือวันเกิดของฉันค่ะ"
10113-340 = "คะ? รู้อยู่แล้ว ก็เลยซื้อเค้ก\nมาไว้แล้วงั้นเหรอคะ?"
10113-350 = "..."
10113-360 = "ขอบคุณนะคะ คุณครู\nถ้างั้นฉันจะป้อน\nคำแรกให้ก่อนนะคะ"
10113-370 = "ปีใหม่แล้วสินะคะ\nขอให้เป็นอีกปีที่สุขภาพ\nร่างกายแข็งแรงนะคะ"
10113-380 = "คริสต์มาสเป็นวันที่ดี\nอย่างแน่นอนค่ะ"
10113-390 = "ถ้าไม่นับปัจจัยเสี่ยงอย่างไฟไหม้\nการหกล้ม และการเป็นหวัด\nจากอุณหภูมิที่เปลี่ยนละก็นะ"
10113-400 = "ไม่ต้องกังวลเกินไปนะคะ\nฉันอยู่ตรงนี้ทั้งคนค่ะ"
10113-410 = "วันฮาโลวีนสินะคะ ต้องระวัง\nอย่ากินของหวานให้มากเกินไปนะคะ"
10113-420 = "ฉันพูดแบบนี้เพราะ\nเป็นห่วงคุณครูจากใจจริงค่ะ"
10113-440 = "รู้สึกว่าน้ำทะเล\nเย็นจริงๆ ด้วยค่ะ"
10113-450 = "สำหรับบางคน อุณหภูมิ\nร่างกายอาจลดลงก็ได้ค่ะ"
10113-460 = "แล้วก็อาจทำให้\nสติเลือนรางไปชั่วครู่ด้วยค่ะ"
10113-470 = "อ๊ะ คำพูดเมื่อกี้..."
10113-480 = "คงเป็นคำพูดที่\nทำลายบรรยากาศสินะคะ"
10113-490 = "ฉันเองก็แอบตกใจ\nตัวเองเหมือนกันค่ะ"
10113-500 = "แต่ถึงอย่างนั้น คุณครูคะ\nถ้าวันนี้ได้ใช้เวลาอย่างเต็มที่\nด้วยความแปลกใหม่แบบนี้แล้วละก็"
10113-510 = "ครั้งนี้ฉันว่าลองใช้คำพูดแบบใหม่ดู\nก็ไม่น่าจะเสียหายนะคะ"
10113-520 = "น้ำตรงนี้มัน... เย็นจริงๆ เลยค่ะ"
10113-530 = "แต่... มันไม่ใช่ความเย็น\nที่ทำให้อารมณ์เสียหรอกค่ะ"
10113-2600 = "ต่อให้เวรออฟ แต่การเตรียมอุปกรณ์ก็สำคัญค่ะ\nก็เพราะศพ... เพราะผู้ป่วยฉุกเฉินไม่รอเรานี่คะ"

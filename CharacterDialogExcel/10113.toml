[translation]
10113-10 = "블루 아카이브"
10113-20 = "안녕하십니까. 선생님. 게헨나 학원 응급의학부 히무로 세나입니다.\n마침 휴일이기도 하니, 함께 어떠신가요."
10113-30 = "안전해 보이는\n장소로군요."
10113-40 = "한가하지만, 완전히\n마음을 놓으면\n안 되겠지요."
10113-50 = "선생님과 함께 오면\n좋을 것 같습니다만……"
10113-60 = "저 가구의 배치……\n신경 쓰입니다."
10113-70 = "이런 곳일수록 시체……\n환자 발생을\n주의해야 합니다."
10113-80 = "어서 오십시오. 선생님."
10113-90 = "마침 저 역시 휴일이기에,\n찾아와 보았습니다."
10113-100 = "선생님은 근무, 저는 휴일……"
10113-110 = "이 참에 선생님의 근무일을, \n오늘 하루만 휴일로\n바꾸는 것은 어떨까요?"
10113-120 = "제 취미라고 할 것은 약품\n정비와 대기하기 정도입니다."
10113-130 = "물론 일반적이지 않은\n취미라는 것은 알고 있습니다만."
10113-140 = "저는,\n나름대로 즐기고 있습니다."
10113-150 = "샬레에서의 대기라는 것도\n즐거운 경험입니다."
10113-160 = "특히 여기에 선생님이\n계시다는 사실 하나만으로도요."
10113-170 = "선생님은 저와 함께여서\n불편하지 않으신가요?"
10113-180 = "오히려 기쁘시다고요?"
10113-190 = "감사합니다."
10113-200 = "그렇다면 저 역시 솔직하게\n기뻐하도록 하겠습니다."
10113-210 = "바다를 좋아하느냐고\n물으셨습니까?"
10113-220 = "잘은 모르겠습니다만,"
10113-230 = "저에게 익숙하지 않은\n장소라는 것만은 확실합니다."
10113-240 = "그렇지만 그곳에서라면\n특이한 익사체……"
10113-250 = "실례했습니다. 응급환자를\n볼 수 있을 것 같습니다."
10113-260 = "잘 표현하기는 어렵습니다만,\n선생님과 보내는 시간은."
10113-270 = "저에게 있어, 매우 신선하게\n다가오는 시간입니다."
10113-280 = "다른 말로는\n특별한 시간이기도 합니다."
10113-290 = "또 다른 말로는, 선생님은 이미\n저의 특별한 분이라는 뜻입니다."
10113-300 = "생일이시군요, 선생님."
10113-310 = "케이크 및 단 음식의 과도한\n섭취에는 주의해 주십시오."
10113-320 = "여차할 경우, 제가 선생님의\n응급 처치를 담당하겠습니다."
10113-330 = "오늘은 저의 생일임을\n보고드립니다."
10113-340 = "네? 그럴 줄 알고\n이미 케이크를 사 오셨다고요?"
10113-350 = "……"
10113-360 = "감사합니다. 선생님.\n그러면 우선 첫입을\n먹여 드리겠습니다."
10113-370 = "새해가 되었군요.\n올 한 해도 건강 무탈한 나날이\n계속되기를 바라겠습니다."
10113-380 = "크리스마스는 물론\n좋은 날입니다."
10113-390 = "화재, 넘어짐, 기온차에 의한\n감기 같은 불안\n요소를 제외한다면요."
10113-400 = "너무 걱정하지 마십시오.\n제가 있지 않습니까."
10113-410 = "할로윈이군요. 당류의 과다한\n섭취에는 항상 주의해 주십시오."
10113-420 = "진심으로, 선생님을\n생각해서 드리는 말입니다."
10113-440 = "확실히, 물이\n차가운 느낌입니다."
10113-450 = "사람에 따라서는\n체온 저하를 일으킬지도요."
10113-460 = "잠깐이나마, 의식이 흐려질 수도\n있을 것 같습니다."
10113-470 = "아, 방금은……"
10113-480 = "'분위기를 해친다'는\n말이었겠네요."
10113-490 = "저 자신도 약간이나마\n놀라고 있습니다."
10113-500 = "그렇지만, 선생님.\n이렇게 새로움으로 가득한\n하루를 보냈다면."
10113-510 = "이번만이라도, 새로운 언어를\n사용해 보아도 좋지 않을까요."
10113-520 = "……이 물은 정말로 차갑군요."
10113-530 = "그렇지만…… 기분 나쁜\n차가움은, 아닌 것 같습니다."
10113-2600 = "비번이라고 해도, 장비 손질은 중요한 것입니다.\n시체…… 응급 환자는, 우리의 사정을 기다려 주지 않으니까요."

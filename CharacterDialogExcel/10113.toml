[translation]
10113-10 = "蔚藍檔案"
10113-20 = "你好，老師。\n我是格黑娜學園急救醫學部所屬的冰室瀬奈。\n由於今天是休假日……不介意的話，要一起出門嗎？"
10113-30 = "這裡似乎是安全的呢。"
10113-40 = "雖然是個安穩的空間，\n也不能放鬆警戒。"
10113-50 = "真想跟老師\n一起來呢……"
10113-60 = "那個家具的配置……\n讓人有點在意。"
10113-70 = "這種地方，必須格外留意\n避免屍……傷患出現才行。"
10113-80 = "歡迎回來，老師。"
10113-90 = "因為是難得的休假日，\n所以我決定來夏萊看看。"
10113-100 = "老師在值勤中，\n我則是在放假……"
10113-110 = "機會難得，今天這天\n老師要不要也休息呢？"
10113-120 = "興趣……？\n應該是藥品的整理和待命吧。"
10113-130 = "雖然我也明白，\n這並非常見的興趣……"
10113-140 = "但我還挺樂在其中的哦。"
10113-150 = "在夏萊待命\n也挺開心的呢。"
10113-160 = "因為這裡有老師在。"
10113-170 = "跟我在一起\n不會覺得不自在嗎？"
10113-180 = "……反而很開心？"
10113-190 = "謝謝你。"
10113-200 = "那麼，我也該\n坦率地感到快樂吧。"
10113-210 = "大海，是嗎？"
10113-220 = "這個嘛……\n會喜歡上的理由，"
10113-230 = "似乎與我有點無緣，\n這點我倒是明白。"
10113-240 = "不過在大海的話，\n應該能見到特別的屍……"
10113-250 = "……失禮了。\n我是說應該能見到傷患才對。"
10113-260 = "雖然有點難用言語形容，\n不過與老師共度的時光──"
10113-270 = "對我來說都無比新鮮。"
10113-280 = "特別的時光……\n該這麼說嗎。"
10113-290 = "意思是老師你……\n已經是我重要的人了。"
10113-300 = "祝你生日快樂，老師。"
10113-310 = "蛋糕或糖分的過量攝取，\n還請多加留意。"
10113-320 = "要是有什麼萬一，\n我會負責進行應急處置的。"
10113-330 = "今天是我的生日。"
10113-340 = "咦？已經買好蛋糕了……？"
10113-350 = "……"
10113-360 = "謝謝你，老師。\n那麼第一口就讓給老師吧。"
10113-370 = "新年到了呢。\n希望今年一整年\n都是充滿健康的日子。"
10113-380 = "聖誕節是個美好的日子。"
10113-390 = "前提是必須撇除受傷、\n火災、身體不適等等的\n不確定因素就是了。"
10113-400 = "請不要那麼擔心。\n因為這裡有我在。"
10113-410 = "萬聖節到了呢。\n還請留意糖類的過度攝取。"
10113-420 = "我是為了老師著想哦。\n是真的。"
10113-440 = "……確實，水有點冷呢。"
10113-450 = "這樣可能會引發失溫症。"
10113-460 = "有些人，甚至會\n出現意識矇矓的情況。"
10113-470 = "啊啊，這樣……"
10113-480 = "會破壞掉「氣氛」對吧。"
10113-490 = "……連我自己，\n也感到有點驚訝。"
10113-500 = "但是，既然像這樣\n度過了充滿新鮮事物的一天，"
10113-510 = "僅限這次，嘗試使用新的\n表達方式，或許也不錯。"
10113-520 = "……這些水真的很冷。"
10113-530 = "不過……這並不是\n會讓人不舒服的冷。"
10113-2600 = "即使是休假，整備也很重要。\n畢竟屍……\n傷患可不會明白我們的狀況。"

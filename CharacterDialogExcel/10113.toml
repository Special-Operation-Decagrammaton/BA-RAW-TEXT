[translation]
10113-10 = "Blue Archive"
10113-20 = "Hello, Sensei. This is Himuro Sena from Gehenna Academy's Medical Emergency Club. I happen to be on my day off. Would you like to join me?"
10113-30 = "This seems to be a safe place."
10113-40 = "Although it's my day off, I shouldn't let my guard down completely."
10113-50 = "This looks like a nice place to spend time with you, Sensei..."
10113-60 = "That furniture's placement... It's bothering me."
10113-70 = "We need to be especially careful of bodies... I mean, MEDICAL EMERGENCIES, in a place like this."
10113-80 = "Welcome, Sensei."
10113-90 = "I happen to be on my day off, so I decided to come for a visit."
10113-100 = "Sensei's at work, I'm on a day off..."
10113-110 = "What if you took a day off too? Just one."
10113-120 = "My hobbies are organizing medicine and being on standby."
10113-130 = "Of course, I know those aren't ordinary hobbies."
10113-140 = "But I enjoy doing them."
10113-150 = "Being on standby at Schale is a fun experience."
10113-160 = "Especially when you're here, Sensei."
10113-170 = "I'm not making you uncomfortable being here, am I, Sensei?"
10113-180 = "Oh, you're actually happy?"
10113-190 = "Thank you."
10113-200 = "I'll just let myself enjoy this moment, then."
10113-210 = "You want to know if I like the ocean?"
10113-220 = "I'm not really sure, honestly."
10113-230 = "I'm not too familiar with the ocean."
10113-240 = "But it would be a new experience to see a drowned..."
10113-250 = "...Excuse me. A new kind of emergency patient."
10113-260 = "It's hard to describe, but time I spend with you, Sensei..."
10113-270 = "...it's always a fresh experience to me."
10113-280 = "In other words, every moment with you is special."
10113-290 = "Because you're a special person to me, Sensei."
10113-300 = "It's your birthday, Sensei."
10113-310 = "Please be careful with excessive consumption of cake and other sugary foods."
10113-320 = "If needed, I'll take charge of your emergency response."
10113-330 = "I would like to report that today is my birthday."
10113-340 = "What? You already knew, and you bought a cake?"
10113-350 = "..."
10113-360 = "Thank you, Sensei. I'll give you the first bite, then."
10113-370 = "It's New Year's. I hope you have another safe and healthy year."
10113-380 = "Christmas is indeed a good day."
10113-390 = "If we exclude all the factors like fire, slipping on ice, and catching colds, that is."
10113-400 = "But don't worry too much. I'm here."
10113-410 = "It's Halloween. Please be careful with your sugar intake."
10113-420 = "I'm saying this because I'm genuinely concerned for you, Sensei."
10113-440 = "The water definitely feels cold."
10113-450 = "It might cause hypothermia for some people."
10113-460 = "Someone might even lose consciousness, at least for a moment."
10113-470 = "Ah, that's..."
10113-480 = "what people would call \"ruining the ambiance.\""
10113-490 = "I'm a bit surprised myself."
10113-500 = "But Sensei? After a whole day of new things like this..."
10113-510 = "Maybe just this once, trying out new expressions too might not be a bad idea."
10113-520 = "...The water is really cold."
10113-530 = "But...it's not the uncomfortable kind of cold, I don't think."
10113-2600 = "Even when I'm off duty, equipment maintenance is still important. Bodies... I mean emergency patients, don't wait for us."

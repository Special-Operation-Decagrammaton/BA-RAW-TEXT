[translation]
9009003-10 = "กำลังรออยู่เลยค่ะ คุณครู"
9009003-20 = "เหตุการณ์ต่างๆ ที่เกิดขึ้นในคิโวทอส\nจะมอบหมายให้ <ชาเล่ต์> เป็นผู้จัดการ"
9009003-30 = "มาเริ่มกันเลยเถอะค่ะ"
9009003-40 = "เราจะปล่อยให้เหตุการณ์พวกนี้\nเกิดขึ้นไม่ได้ค่ะ"
9009003-50 = "ช่วยไม่ได้นะคะ\nตอนที่มีเพียง <ชาเล่ต์> ที่จะจัดการได้"
9009003-60 = "ฉันทราบดีค่ะ\nว่ากำลังขอให้คุณครูทำงานที่ยากลำบาก"
9009003-70 = "....\nขอบคุณที่ตั้งใจทำงานนะคะ"
9009003-80 = "ความมุ่งมั่นของคุณครู\nคงทำให้เก็บข้อมูลดีๆ ได้แน่ค่ะ"
9009003-90 = "ฉันกำลังรออยู่เลยค่ะ\nคุณครูคะ"
9009003-100 = "เหตุการณ์ต่างๆ ที่เกิดขึ้นในคิโวทอส\nจะมอบหมายให้ <ชาเล่ต์> เป็นผู้จัดการ"
9009003-110 = "มาเริ่มกันเลยเถอะค่ะ"
9009003-120 = "เราจะปล่อยให้เหตุการณ์พวกนี้\nเกิดขึ้นไม่ได้ค่ะ"
9009003-130 = "ช่วยไม่ได้นะคะ\nตอนที่มีเพียง <ชาเล่ต์> ที่จะจัดการได้"
9009003-140 = "ฉันทราบดีค่ะ\nว่ากำลังขอให้คุณครูทำงานที่ยากลำบาก"
9009003-150 = "...\nขอบคุณที่ตั้งใจทำงานนะคะ"
9009003-160 = "ความมุ่งมั่นของคุณครู\nคงทำให้เก็บข้อมูลดีๆ ได้แน่ค่ะ"

[translation]
9009003-10 = "恭候光臨。\n老師。"
9009003-20 = "在奇普托斯發生的各種事件，\n希望能交由「夏萊」負責處理。"
9009003-30 = "我們馬上開始吧。"
9009003-40 = "我不能允許這樣的事情存在。"
9009003-50 = "沒辦法。\n因為現在只有「夏萊」是空閒的。"
9009003-60 = "我知道我讓您很辛苦，\n老師。"
9009003-70 = "……\n辛苦了。"
9009003-80 = "老師的活躍，\n值得學習。"

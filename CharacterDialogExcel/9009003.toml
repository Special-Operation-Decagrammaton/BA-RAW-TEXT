[translation]
9009003-10 = "기다리고 있었습니다.\n선생님."
9009003-20 = "키보토스에서 벌어지는 다양한 사건들,\n<샬레>가 맡아주었으면 합니다."
9009003-30 = "바로 시작하시죠."
9009003-40 = "이런 사건들이 존재한다는 것을\n용납할 수 없습니다."
9009003-50 = "어쩔수 없겠죠.\n지금 손이 남는 건 <샬레> 뿐이니."
9009003-60 = "고생시키고 있다는 것은\n인지하고 있습니다, 선생님."
9009003-70 = "….\n수고하시는군요."
9009003-80 = "선생님의 활약,\n좋은 견학이 됩니다."

[translation]
9009003-10 = "お待ちしておりました。\n先生。"
9009003-20 = "キヴォトスで行われる様々な事件の数々を、\n「シャーレ」に担当してほしいのです。"
9009003-30 = "早速始めましょう。"
9009003-40 = "このような事件が存在することが\n許せません。"
9009003-50 = "仕方ありません。\n今手が空いているのは\n「シャーレ」だけですから。"
9009003-60 = "苦労させてしまっていることは\n承知しております、先生。"
9009003-70 = "……。\nお疲れ様です。"
9009003-80 = "先生のご活躍、\n勉強になります。"

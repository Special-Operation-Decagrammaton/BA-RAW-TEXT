[translation]
20031-10 = "蔚藍檔案～"
20031-20 = "呀齁～老師，歡迎來到227號溫泉浴場。\n別在意我，放輕鬆吧。"
20031-30 = "（好像從某處傳來\n　一股寒氣……）"
20031-40 = "（這種熱鬧的感覺，\n　真是久違了……\n　但我並不討厭）"
20031-50 = "嗯～真香。"
20031-60 = "咦……？\n這個壞了嗎？"
20031-70 = "這一杯是……\n敬離去的冬天。"
20031-80 = "227號溫泉浴場，開始營業囉。"
20031-90 = "歡迎你來，老師。\n要來杯迎賓飲料嗎？"
20031-100 = "嗯～可能是\n泡了熱水澡的關係，\n身體好像有點發熱……"
20031-110 = "我最近得知，\n聽說牛奶也能\n發酵成那樣哦？"
20031-120 = "也就是說，如果用\n水果牛奶就能……"
20031-130 = "別用那種眼神看我。\n我不會做的啦。"
20031-140 = "和香真了不起呢。\n我就沒有和香\n的那種熱情……"
20031-150 = "就算在溫泉遇到熊\n也別嚇一跳哦。\n因為牠是我們的職員。"
20031-160 = "……當然是開玩笑的。"
20031-170 = "老師，請你別逞強哦。\n要是老師難過的話，\n很多孩子都會傷心的。"
20031-180 = "生日快樂，老師。\n我為今天準備了特別的泡澡。\n待會一起去泡吧。"
20031-190 = "咦，你想自己享受？"
20031-200 = "為～什～麼～啊～～"
20031-210 = "要買好吃的東西給我？\n因為是我的生日？"
20031-220 = "呵呵，該買什麼好呢……"
20031-230 = "不過，只要是老師買的\n不管是什麼都沒關係。"
20031-240 = "……除了咖哩之外。"
20031-250 = "（希望今年也是\n　跟去年類似的一年）"
20031-260 = "啊，老師，我做了和\n烤火雞很搭的飲料，\n你拿一點回去吧。"
20031-270 = "發酵的話……\n應該還沒才對。\n是還沒哦，呵呵。"
20031-280 = "我認為南瓜不管是香氣\n還是糖分都很適合。"
20031-290 = "啊，我指的是南瓜汁。\n別在意別在意。"
20031-310 = "來，老師。\n棉被外面很冷對吧？"
20031-320 = "別固執了，\n過來這邊吧。"
20031-330 = "棉被軟綿綿的，\n還很溫暖唷？"
20031-340 = "我想在這裡\n很快就能睡著。"
20031-350 = "如果，只蓋棉被\n還是會冷……"
20031-360 = "我可以當你的\n熱水袋唷。"
20031-370 = "咦？本來的熱水袋……？"
20031-380 = "那個……裡面，\n都被我喝光了。"
20031-390 = "因為，棉被裡……\n正好是適合加熱\n漿果汁的溫度……"
20031-400 = "剛才工作的時候，\n就把熱水袋裡面\n換成特製漿果汁了。"
20031-410 = "不過……這也沒辦法吧？\n既然事已至此，又沒有其他\n能讓身體暖和的方法……"
20031-420 = "所以今晚，老師就\n就當我的熱水袋吧。"
20031-2600 = "這個嘛，武器沒機會登場\n就再好不過了……\n但是需要的話，也沒辦法。"

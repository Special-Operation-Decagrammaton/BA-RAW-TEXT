[translation]
20031-10 = "Blue Archive~"
20031-20 = "ยะฮู้ว~ ยินดีต้อนรับสู่ออนเซ็น No.227\nไม่ต้องสนใจฉันหรอกนะ ทำตัวตามสบายเลย"
20031-30 = "(รู้สึกถึงความหนาว\nจากที่ไหนไม่รู้แฮะ...)"
20031-40 = "(เสียงเอะอะแบบนี้\nถึงจะไม่ได้เจอมานานแล้ว\nแต่ก็ไม่ได้เกลียดหรอกนะ)"
20031-50 = "อืม กลิ่นหอมจัง"
20031-60 = "เอ๋? นี่มัน...\nเสียแล้วหรือเปล่านะ?"
20031-70 = "แก้วนี้สำหรับ...\nฤดูหนาวที่เพิ่งผ่านไป"
20031-80 = "ออนเซ็น No.227\nเปิดให้บริการแล้วนะ~"
20031-90 = "เชิญเลยคุณครู\nรับเวลคัมดริ้งสักแก้วมั้ย?"
20031-100 = "อืม... เพราะไปอยู่ใน\nบ่อร้อนๆ มาหรือเปล่านะ\nรู้สึกตัวร้อนนิดๆ แฮะ..."
20031-110 = "ฉันเพิ่งรู้มาเมื่อไม่นานมานี้เอง\nเห็นว่าถ้าหมักนมก็จะได้\nแอลกอฮอล์ด้วยนะ"
20031-120 = "งั้นถ้าเอานมผลไม้ไปใส่..."
20031-130 = "อย่ามองด้วยสายตาแบบนั้นสิ\nฉันไม่ทำหรอก"
20031-140 = "โนโดกะน่ะสุดยอดไปเลย\nสำหรับฉัน ไม่มีใครมุ่งมั่น\nได้เหมือนโนโดกะแล้ว"
20031-150 = "ต่อให้เจอหมีในออนเซ็น\nก็อย่าตกใจจนเกินไปล่ะ\nหมีเป็นพนักงานของเราน่ะ"
20031-160 = "แน่นอน...\nเรื่องนั้นฉันล้อเล่นน่ะ"
20031-170 = "คุณครู อย่าหักโหมนะ\nถ้าคุณครูเจ็บป่วยไป\nจะมีคนเสียใจเยอะเลย"
20031-180 = "สุขสันต์วันเกิดนะคุณครู\nฉันเตรียมบ่อพิเศษสำหรับวันนี้\nไว้เลยนะ เอาไว้ไปลงด้วยกันนะ"
20031-190 = "หืม? อยากลงคนเดียวงั้นเหรอ?"
20031-200 = "ทำไมกันล่ะ~~~??"
20031-210 = "จะเลี้ยงของอร่อยๆ ฉันเหรอ?\nเพราะวันนี้เป็นวันเกิดฉันเหรอ?"
20031-220 = "ฮุฮุ จะขออะไรดีนะ..."
20031-230 = "แต่ถ้าเป็นของที่คุณครูซื้อให้\nไม่ว่าอะไรฉันก็โอเคทั้งนั้นแหละ"
20031-240 = "...ยกเว้นแกงกะหรี่นะ"
20031-250 = "(ขอให้ปีนี้ไม่มีอะไรเปลี่ยนไป\nเหมือนกับปีที่แล้วนะ)"
20031-260 = "อ๊ะ คุณครู ฉันทำเครื่องดื่ม\nที่เข้ากับไก่งวงย่างมาแหละ\nเดี๋ยวเอาไปแก้วหนึ่งนะ"
20031-270 = "มันน่าจะยังไม่ได้หมักนะ...\nน่าจะนะ ฮุฮุฮุ..."
20031-280 = "ฟักทองทั้งมีกลิ่นหอม\nและมีความหวานเพียงพอ\nน่าจะใช้ได้เลยนะ..."
20031-290 = "อ้อ ฉันหมายถึงน้ำฟักทองน่ะ\nไม่ต้องใส่ใจหรอก ไม่ต้องใส่ใจ"
20031-310 = "เอาละ คุณครู\nอยู่นอกผ้าห่มหนาวใช่มั้ย?"
20031-320 = "อย่าดื้อเลยน่า\nเข้ามาเถอะ"
20031-330 = "ผ้าห่มทั้งนุ่มนิ่ม\nทั้งอบอุ่นเลยนะ?"
20031-340 = "ถ้ามาอยู่ข้างในนี้\nแป๊บเดียวก็หลับแล้วละ"
20031-350 = "ถ้าหากว่าแค่นอนห่มผ้า\nแล้วยังไม่หายหนาวละก็..."
20031-360 = "เดี๋ยวฉันเป็นกระเป๋าน้ำร้อน\nให้เองนะ"
20031-370 = "หืม? กระติกน้ำร้อน\nที่มีอยู่น่ะเหรอ...?"
20031-380 = "เอ่อ คือว่า...\nฉันดื่มไปหมดแล้วน่ะ"
20031-390 = "พอดีว่าข้างในผ้าห่ม\nทำให้มอร์สอุ่นขึ้นได้\nในอุณหภูมิที่พอดีเลย"
20031-400 = "เมื่อกี้ระหว่างทำงาน\nฉันเปลี่ยนน้ำในขวด\nให้เป็นมอร์สสูตรพิเศษ"
20031-410 = "แต่ยังไงก็ช่วยไม่ได้นี่นา?\nในเมื่อเป็นแบบนี้แล้ว เราไม่มีวิธีอื่น\nที่จะทำให้ร่างกายอบอุ่นแล้ว"
20031-420 = "เพราะงั้นคืนนี้คุณครู\nต้องมาเป็นกระเป๋าน้ำร้อน\nให้ฉันแล้วละ"
20031-2600 = "อยากให้ไม่มีเรื่องที่\nต้องใช้อาวุธเลย...\nแต่ถ้าจำเป็นก็ต้องใช้แหละเนอะ"

[translation]
20031-10 = "Blue Archive!"
20031-20 = "Hello Sensei! Welcome to Hot Spring Resort No. 227. Please make yourself at home."
20031-30 = "(I feel a strange chill...)"
20031-40 = "(It's been a while since it was this rowdy, but...I don't hate it.)"
20031-50 = "Mmm! Smells good."
20031-60 = "Oh? Did this go...bad?"
20031-70 = "And here's to...winters past."
20031-80 = "Hot Springs Resort No. 227 is officially open."
20031-90 = "Welcome, Sensei. Can I get you started with something to drink?"
20031-100 = "Mm... Maybe it's because I just got out of the bath, but I feel a bit hot..."
20031-110 = "I only just heard about this, but did you know you can ferment milk to make alcohol?"
20031-120 = "So, if I take some fruit milk and..."
20031-130 = "Don't look at me like that. I won't actually do it."
20031-140 = "Nodoka is amazing. I just don't have that kind of passion."
20031-150 = "Don't pay it any mind if you run into a bear in the hot spring. They work here."
20031-160 = "...I'm kidding, of course."
20031-170 = "Don't overdo it, Sensei. There are a lot of students who would be sad if you got sick."
20031-180 = "Happy birthday, Sensei. I've prepared a special bath for you today. Let's go in together later."
20031-190 = "Aww... You don't want me to join you?"
20031-200 = "But whyyyyy?"
20031-210 = "You want to buy me something tasty? For my birthday?"
20031-220 = "Heehee. What should I ask for..."
20031-230 = "Well, if you're the one buying, I'm happy with anything."
20031-240 = "...Except for curry."
20031-250 = "(May this year, like the last, be a year of no change.)"
20031-260 = "Ah, Sensei. I mixed some drinks that compliment grilled turkey. Grab one on your way out."
20031-270 = "They shouldn't be fermented...yet. Heehee..."
20031-280 = "Pumpkins have a good fragrance and plenty of sugar, so it should work..."
20031-290 = "Pumpkin juice! I'm talking about pumpkin juice. Don't worry about it."
20031-310 = "Now, Sensei. Isn't it cold outside the futon?"
20031-320 = "Don't be stubborn. Climb in."
20031-330 = "The futon is nice and fluffy and warm, you know?"
20031-340 = "Bundled up in here, you'll fall asleep in no time."
20031-350 = "And if the futon isn't warm enough..."
20031-360 = "Then I volunteer to be your own personal heater."
20031-370 = "Hm? I did have a hot water bottle to keep the bedding warm..."
20031-380 = "But the thing is... I drank it up."
20031-390 = "See, the inside of the futon was the perfect temperature for mors."
20031-400 = "So before work, I emptied the hot water bottle and filled it with mors."
20031-410 = "But what's done is done. That's our situation, and there's no other way to warm up."
20031-420 = "So for tonight, you'll just have to be the heater."
20031-2600 = "Well, I'm sure we won't need our weapons, but...if it comes down to it, we'll use them."

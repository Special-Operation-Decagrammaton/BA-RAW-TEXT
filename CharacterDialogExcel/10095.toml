[translation]
10095-10 = "蔚藍，檔案。"
10095-20 = "今天……我嘗試扮演一名女僕。\n請多多指教……主人。"
10095-30 = "女僕……咖啡廳……\n果然還是太普通了……"
10095-40 = "感覺能當成主題的\n東西有好多……"
10095-50 = "這裡的清掃，\n感覺很辛苦……"
10095-60 = "會玩遊戲的女僕\n有新鮮感嗎……？\n還是其實不會呢……"
10095-70 = "在這裡打工之類的，\n有辦法嗎……？"
10095-80 = "歡迎回來，老師！\n我很想見到你！\n今天要從哪裡開始協助呢？"
10095-90 = "歡迎回來，主人！\n我很想見到你！\n今天要為你做什麼呢？"
10095-100 = "既然穿上了女僕裝，\n就要以完美的女僕為目標。"
10095-110 = "然後……女僕就\n必須要有「主人」！"
10095-120 = "那個……適合我嗎？"
10095-130 = "……很可愛，是嗎？"
10095-140 = "聽你這麼說……\n感覺真開心，耶嘿嘿。"
10095-150 = "雖然是因為各種原因\n才穿上女僕裝……"
10095-160 = "但我現在很慶幸自己有這麼做，\n況且老師也很照顧我。"
10095-170 = "要打掃夏萊的話，\n我會全力以赴哦。\n比我們的部室\n認真十倍……！"
10095-180 = "咦？希望部室的打掃\n也多用點力……？"
10095-190 = "擔任值日生的日子，\n我總是會很興奮。\n在開始的一個小時前\n就會心癢難耐、覺得很幸福。"
10095-200 = "今天是主人的生日對吧？"
10095-210 = "耶嘿嘿。\n記住主人的生日\n也是女僕的工作哦！"
10095-220 = "雖然生日通常會和\n家人一起度過……"
10095-230 = "但我……今天……\n就算只有今天也好……\n我想和老師一起度過……"
10095-240 = "新年快樂，老師。"
10095-250 = "可以的話，要不要\n一起出門參拜呀？"
10095-260 = "聖誕節……\n有沒有什麼想吃的呢？"
10095-270 = "聽說女僕常會在紀念日\n準備特別的料理。"
10095-280 = "……我，雖然\n對料理不是特別在行，\n但我會努力的！"
10095-290 = "剛才被別人說在萬聖節\n變裝成女僕會不會太俗氣了……\n可是這又不是變裝！"
10095-310 = "非，非常抱歉。主人！"
10095-320 = "我，又不小心搞錯，\n跌倒了……"
10095-330 = "沒關係……的。\n如果是主人的指責……"
10095-340 = "無論什麼……\n我都願意接受……"
10095-350 = "……感，感覺怎麼樣？"
10095-360 = "可，可是這就是\n那種情境呀！"
10095-370 = "請你幫我拍照的人，\n也是我……"
10095-380 = "那個，老師？"
10095-390 = "今天的女僕綠，\n您還滿意嗎？"
10095-2600 = "筆、打掃用具、槍……\n從道具的觀點來看有點類似。\n如果有更好的工具，\n就能完成更多的工作吧。\n謝謝你，主人。\n我絕對不會忘記的。"

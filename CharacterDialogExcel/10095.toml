[translation]
10095-10 = "블루, 아카이브."
10095-20 = "오늘은…… 메이드가 되어 보았어요.\n잘 부탁드립니다…… 주인님."
10095-30 = "메이드…카페……\n역시 너무 식상하네요…"
10095-40 = "모티브가 될 만한 게 가득해…"
10095-50 = "여기 청소, 힘들 것 같아……"
10095-60 = "게임을 하는 메이드는 신선할까...?\n실은 그렇지도 않은가…"
10095-70 = "여기서 아르바이트 같은 거,\n할 수 있나...?"
10095-80 = "어서 오세요, 선생님!\n보고 싶었어요!\n그러면 오늘은 무엇부터 도와드릴까요?"
10095-90 = "어서 오세요,\n주인님! 보고 싶었어요!\n오늘은 무엇을 할까요?"
10095-100 = "메이드복을 입었으니,\n완벽한 메이드를 목표로 합니다."
10095-110 = "그리고… 메이드에게\n필요한 것은 '주인님'입니다!"
10095-120 = "그…… 어울리나요?"
10095-130 = "……귀엽다, 구요?"
10095-140 = "그렇게 말씀해 주시니…\n기뻐요. 에헤헤."
10095-150 = "여러 가지 이유로 메이드복을 입게 되었지만……"
10095-160 = "지금은 다행이라고 생각하게 되었어요.\n선생님께서 봐주고 계시기도 하고요."
10095-170 = "샬레의 정리라면, 전력으로 할게요.\n저희 부실의 10배는 꼼꼼하게……!"
10095-180 = "어? 부실 정리에도\n힘을 써 주었으면 좋겠다고요...?"
10095-190 = "당번 날은, 두근두근 거려요.\n당번 시작 1시간 정도 전부터\n들뜨고, 행복해져요."
10095-200 = "오늘은 주인님의 생일이죠?"
10095-210 = "에헤헤. 주인님의 생일을\n기억해 두는 것도 메이드의 일이니까요!"
10095-220 = "생일은 보통,가족과 함께 보내는 것이지만…"
10095-230 = "저…… 오늘은…… 오늘만은……\n선생님과 함께 보내고 싶어요……"
10095-240 = "새해 복 많이 받으세요 선생님."
10095-250 = "괜찮다면 함께 소원을 빌러\n나가지 않으시겠어요?"
10095-260 = "크리스마스……\n뭐 먹고 싶은 거 있으세요?"
10095-270 = "메이드는, 기념일에\n특별한 요리를 만들곤 했대요."
10095-280 = "……저, 요리는 그렇게까지\n특기는 아니지만, 힘낼게요!"
10095-290 = "할로윈에 메이드 가장은\n좀 수수하지 않냐는 말을 들었어요……\n가장이 아닌데 말이죠!"
10095-310 = "죄, 죄송합니다. 주인님!"
10095-320 = "저, 또다시 실수해 버려서, 넘어져서……"
10095-330 = "괜찮…… 습니다. 주인님께서,\n내리시는 질책이라면……"
10095-340 = "어떤 것이라도……\n받아들일 테니까요……"
10095-350 = "……어, 어떤가요?"
10095-360 = "하, 하지만 이건 그런 상황이니까요!"
10095-370 = "사진을 찍어달라고 부탁한 건,\n제 쪽이었고……"
10095-380 = "저기, 선생님?"
10095-390 = "오늘의 메이드 미도리는,\n만족스러우셨나요?"
10095-2600 = "펜도, 청소용품도, 총도……\n도구라는 점에서는 비슷하죠.\n더 좋은 도구가 있다면,\n더 많은 일을 할 수 있을 거고요.\n감사합니다, 주인님.\n절대로, 잊지 않을게요."

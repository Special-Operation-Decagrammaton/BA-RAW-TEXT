[translation]
10095-10 = "Blue Archive"
10095-20 = "วันนี้... ฉันลองเป็นเมดดูค่ะ\nขอฝากตัวด้วยนะคะ... นายท่าน"
10095-30 = "เมด... คาเฟ่...\nน่าเบื่อจังเลยนะคะ..."
10095-40 = "มีแรงบันดาลใจ\nเพียบเลย..."
10095-50 = "ทำความสะอาดที่นี่\nน่าจะเหนื่อยเลยนะ..."
10095-60 = "เมดที่เล่นเกม\nจะแปลกใหม่มั้ยนะ...?\nหรือที่จริงอาจจะไม่ก็ได้..."
10095-70 = "ทำงานพาร์ทไทม์ที่นี่\nได้มั้ยนะ...?"
10095-80 = "เชิญค่ะคุณครู!\nคิดถึงจังเลยค่ะ!\nงั้นวันนี้ให้ฉันช่วยอะไรก่อนดีคะ?"
10095-90 = "ยินดีต้อนรับค่ะ\nนายท่าน! คิดถึงจังเลยค่ะ!\nวันนี้ทำอะไรดีคะ?"
10095-100 = "ไหนๆ ก็ได้ใส่ชุดเมดแล้ว\nฉันเลยตั้งใจว่าจะเป็น\nเมดที่สมบูรณ์แบบค่ะ"
10095-110 = "และก็... สิ่งที่จำเป็นสำหรับเมด\nก็คือ 'นายท่าน' ค่ะ!"
10095-120 = "คือว่า... ชุดนี้เหมาะกับฉันมั้ยคะ?"
10095-130 = "น่ารัก... งั้นเหรอคะ?"
10095-140 = "ได้ยินคำแบบนั้นก็...\nน่าดีใจนะคะ แหะๆๆ"
10095-150 = "ถึงฉันจะมาใส่ชุดเมด\nด้วยเหตุผลหลายๆ อย่าง..."
10095-160 = "แต่ตอนนี้ฉันคิดว่าดีแล้วละค่ะที่ได้ใส่\nแล้วก็มีคุณครูคอยดูฉันอยู่ด้วยนี่คะ"
10095-170 = "ฉันจะตั้งใจทำความสะอาดชาเล่ต์เลยค่ะ\nจะตั้งใจทำมากกว่าที่ชมรม 10 เท่าเลย...!"
10095-180 = "เอ๋? อยากให้ฉันใส่ใจ\nเรื่องการเก็บกวาดห้องชมรมด้วยเหรอ...?"
10095-190 = "พอเป็นวันเข้าเวร ฉันใจเต้นตึกตักเลยค่ะ\nตื่นเต้นและมีความสุขล่วงหน้า\nก่อนเข้าเวร 1 ชั่วโมงเลยนะคะ"
10095-200 = "วันนี้วันเกิดนายท่านใช่มั้ยคะ?"
10095-210 = "แหะๆๆ การจำวันเกิดของนายท่าน\nก็เป็นงานของเมดเหมือนกันค่ะ!"
10095-220 = "ปกติแล้วในวันเกิด\nจะต้องอยู่กับครอบครัว..."
10095-230 = "แต่... วันนี้... ในวันนี้...\nฉันอยากอยู่กับคุณครูค่ะ..."
10095-240 = "สวัสดีปีใหม่ค่ะคุณครู"
10095-250 = "ถ้าไม่ติดอะไร เราออกไป\nขอพรด้วยกันมั้ยคะ?"
10095-260 = "วันคริสต์มาส...\nมีอะไรที่อยากกินมั้ยคะ?"
10095-270 = "ว่ากันว่าในวันครบรอบ\nเมดจะทำอาหารที่พิเศษค่ะ"
10095-280 = "ฉันไม่ได้เก่งเรื่องทำอาหาร\nขนาดนั้น แต่ก็จะพยายามค่ะ!"
10095-290 = "ได้ยินว่าการคอสเพลย์เป็นเมดใน\nวันฮาโลวีน มันเรียบง่ายไปหน่อยค่ะ...\nฉันไม่ได้คอสเพลย์สักหน่อย!"
10095-310 = "ขะ... ขอโทษนะคะ นายท่าน!"
10095-320 = "ฉันเผลอทำพลาดจนหกล้มอีกแล้ว..."
10095-330 = "ไม่เป็นไร... หรอกค่ะ\nถ้าเป็นการตำหนิ\nจากนายท่านละก็..."
10095-340 = "ไม่ว่าจะเป็นอะไร...\nฉันก็จะรับไว้ค่ะ..."
10095-350 = "ปะ... เป็นยังไงบ้างคะ?"
10095-360 = "ตะ... แต่ว่าเรากำลังอยู่ใน\nสถานการณ์แบบนั้นนี่คะ!"
10095-370 = "แล้วคนที่ขอให้ช่วยถ่ายรูปให้ก็คือฉัน..."
10095-380 = "คือว่า คุณครูคะ"
10095-390 = "วันนี้เมดมิโดริ\nทำได้น่าพอใจมั้ยคะ?"
10095-2600 = "ปากกา อุปกรณ์ทำความสะอาด ปืน...\nทุกอย่างเป็นเครื่องมือเหมือนกันค่ะ\nถ้ามีเครื่องมือที่ดีกว่านี้\nก็จะทำงานได้มากกว่านี้ค่ะ\nขอบคุณนะคะนายท่าน\nฉันจะไม่ลืมเด็ดขาดเลยค่ะ"

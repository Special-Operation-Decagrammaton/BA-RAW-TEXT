[translation]
10119-10 = "블루 아카이브."
10119-20 = "백귀야행 연합학원, 백화요란 분쟁조정위원회.\n고료 나구사. 이 힘은, 모두를 지키기 위해 쓰겠어."
10119-30 = "아야메라면,\n여기서 무얼 했을까."
10119-40 = "이런 장소에,\n내가 있어도 되는 걸까?"
10119-50 = "(이건…… 닭꼬치\n굽는 냄새?)"
10119-60 = "조금, 덥지만……\n다른 사람에게는\n이 정도가 적당하겠지."
10119-70 = "현기증이……\n조금만 쉬었다 갈까."
10119-80 = "선생님, 어서 와."
10119-90 = "오늘의 할 일은……\n무엇부터 시작하면 좋을까?"
10119-100 = "아, 선생님……"
10119-110 = "다행이야, 돌아왔군."
10119-120 = "……미안,\n아직 고쳐지질 않아서."
10119-130 = "곁에 있지 않으면,"
10119-140 = "다들 사라질까 두려워."
10119-150 = "그러니 너무 오래"
10119-160 = "혼자 두지 말아줘."
10119-170 = "샬레 업무는 신선해서 좋아."
10119-180 = "백화요란에도\n사무 작업은 꽤 있지만,"
10119-190 = "아무래도 샬레만큼\n본격적이지는 않으니까."
10119-200 = "저, 선생님."
10119-210 = "어째서 내가 올 때마다\n닭꼬치를 준비하는 거야?"
10119-220 = "물론 좋아하긴 하지만……"
10119-230 = "샬레의 집무실은\n꼬치구이를 하기에\n적합한 장소가 아니니까."
10119-240 = "내 얼굴에 뭐라도 묻었어?\n왜 그렇게 빤히……?"
10119-250 = "피부가 눈처럼 하얘서\n저절로 시선이 간다고?"
10119-260 = "으음, 정말 새삼스럽네."
10119-270 = "단단한 얼음을\n만들기 위해서는,"
10119-280 = "오랜 시간 동안 천천히\n공을 들여 얼려야\n한다고 하는데……"
10119-290 = "온도는 달라도,\n어쩐지 쇠를 달구는\n과정과 비슷한 느낌이네."
10119-300 = "세상의 모든 물질은\n고독할수록 단단해지는 걸까."
10119-310 = "우리 <백화요란\n분쟁조정위원회>는\n이름 그대로,"
10119-320 = "분쟁 상황을\n조정하는 데 특화되어 있어."
10119-330 = "물론……"
10119-340 = "총을 쓰기 전에\n조정되면 좋겠지만……"
10119-350 = "이상하지?"
10119-360 = "누군가 거기 있는\n것만으로 이렇게 감사한\n마음이 들다니."
10119-370 = "그래서일까, 오늘은 나에게도\n각별하게 느껴져."
10119-380 = "생일 축하해, 선생님."
10119-390 = "아, 생일…… 기억해주고\n있었구나. 고마워."
10119-400 = "원래 생일을, 그다지\n특별하게 생각하진 않았는데."
10119-410 = "앞으로는\n조금 좋아질 거 같아."
10119-420 = "새해 복 많이 받아.\n선생님."
10119-430 = "올해는 조금 더,\n선생님께 기대도 괜찮지……?"
10119-440 = "나는 겨울이 좋아."
10119-450 = "모든 것이 하얗게 물들면,\n나도 조금은\n평범하게 느껴지거든."
10119-460 = "그래서 겨울의 중턱에\n위치한 이 축제가."
10119-470 = "정말 마음에 들어."
10119-480 = "아, 미안.\n잠깐 할로윈에 대해\n생각하느라."
10119-490 = "나는 언제나 내가 되고 싶은\n나 자신을 연기하고 있으니,"
10119-500 = "사실상 언제나 코스프레를\n하고 있는 셈이지."
10119-510 = "후후,"
10119-520 = "그러니 오늘이야말로\n나를 위한 날인지도 몰라."
10119-540 = "동이 트기 직전의\n이 순간이…… 어둠이\n가장 깊은 때이지."
10119-550 = "나는…… 이 칠흑 같은\n어둠이 두려웠어."
10119-560 = "어둠을 밝힐 만큼\n반짝이지도 않고,"
10119-570 = "밤이 지나가는 걸\n견디는 것조차도……\n나에게는 힘든 일이었으니까."
10119-580 = "다른 이를 연기하며-\n그림자에 섞인 채 평정을\n가장하며 숨어있을 수밖에,\n없었던 거야."
10119-590 = "하지만, 더 이상은 아냐."
10119-600 = "밤은 언젠가 끝날 테고-\n내 그림자가 땅에 드리울 것을,\n알고 있으니까."
10119-610 = "그러니―"
10119-620 = "황혼 앞에서 이름을 고한다."
10119-630 = "……나는 백화요란\n분쟁조정위원회의 부장,"
10119-640 = "고료 나구사!"
10119-2600 = "알고 있겠지만, 이 총은 자격 없는 자가 쥐어서는 안 되는 물건. 그래. 고료 나구사가 갖기에는 너무 무거운 의미를 갖고 있어. 그럼에도 선생님이 내게 맡겨 준다면, 다시 한 번 나를 믿어준다면…… 온 힘을 다해 발버둥 쳐볼게."

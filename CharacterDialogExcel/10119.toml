[translation]
10119-10 = "Blue Archive"
10119-20 = "คณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\nโกเรียว นางุสะ... ฉันจะใช้พลังนี้เพื่อปกป้องทุกคน "
10119-30 = "ถ้าเป็นอายาเมะ\nจะทำอะไรที่นี่นะ?"
10119-40 = "ให้ฉันมาอยู่ใน\nที่ที่แบบนี้ได้ด้วยเหรอ?"
10119-50 = "(นี่มัน... กลิ่นย่าง\nยากิโทริ?)"
10119-60 = "ถึงจะร้อนนิดหน่อย...\nแต่สำหรับคนอื่นแล้ว\nก็น่าจะพอดีละเนอะ"
10119-70 = "เวียนหัวจัง...\nพักก่อนแล้วค่อยไปต่อดีมั้ยนะ?"
10119-80 = "คุณครู เข้ามาสิ"
10119-90 = "งานของวันนี้...\nให้เริ่มจากตรงไหนดีล่ะ?"
10119-100 = "อ๊ะ คุณครู..."
10119-110 = "โล่งอกไปทีที่กลับมาแล้ว"
10119-120 = "ขอโทษนะ...\nฉันยังแก้นิสัยนี้ไม่ได้น่ะ"
10119-130 = "พอทุกคนไม่อยู่ข้างๆ ฉัน"
10119-140 = "ฉันก็กลัวว่าทุกคนจะหายไป"
10119-150 = "เพราะงั้นก็อย่า"
10119-160 = "ปล่อยฉันไว้คนเดียวนานเกินไปนะ"
10119-170 = "ฉันชอบมาทำงานของชาเล่ต์จัง"
10119-180 = "ในเฮียกกะเรียวรัน\nก็มีงานธุรการอยู่บ้างเหมือนกัน"
10119-190 = "แต่ก็ไม่จริงจังเท่า\nงานของชาเล่ต์หรอก"
10119-200 = "เอ่อ คุณครู"
10119-210 = "ทำไมถึงทำยากิโทริ\nไว้ทุกครั้งที่ฉันมาเลยล่ะ?"
10119-220 = "ฉันก็ชอบมันอยู่หรอกนะ..."
10119-230 = "แต่สำนักงานของชาเล่ต์\nไม่ใช่ที่ที่เหมาะกับ\nการย่างอาหารเสียบไม้หรอก"
10119-240 = "มีอะไรติดหน้าฉันเหรอ?\nทำไมถึงจ้องกันแบบนั้น...?"
10119-250 = "ฉันมีผิวขาวราวกับหิมะ\nก็เลยมองมาโดยไม่รู้ตัวงั้นเหรอ?"
10119-260 = "อืม น่าประหลาดใจจริงๆ"
10119-270 = "ถ้าจะทำน้ำแข็ง\nก้อนแข็งๆ ละก็"
10119-280 = "ได้ยินว่าต้องค่อยๆ ทำ\nและต้องพิถีพิถันอยู่นานเลย..."
10119-290 = "ถึงอุณหภูมิจะต่างกัน\nแต่รู้สึกว่ามันคล้ายกับ\nการตีเหล็กกล้าเลยละ"
10119-300 = "วัตถุทั้งหมดในโลก\nยิ่งโดดเดี่ยวก็ยิ่งแข็งแกร่งหรือเปล่านะ?"
10119-310 = "คณะไกล่เกลี่ยข้อพิพาท\nเฮียกกะเรียวรันของเรา\nเชี่ยวชาญด้านการไกล่เกลี่ย"
10119-320 = "สถานการณ์ขัดแย้ง\nตามชื่อเลยละ"
10119-330 = "แน่นอนว่า..."
10119-340 = "ถ้าไกล่เกลี่ยกันได้\nก่อนใช้ปืนก็ดีน่ะนะ..."
10119-350 = "แปลกใช่มั้ยล่ะ?"
10119-360 = "แค่การที่มีใครอยู่ตรงนั้น\nเราก็รู้สึกขอบคุณได้ขนาดนี้เลย"
10119-370 = "นั่นอาจเป็นเหตุผลที่วันนี้\nเป็นวันพิเศษสำหรับฉันก็ได้"
10119-380 = "สุขสันต์วันเกิดนะ คุณครู"
10119-390 = "อ่า... จำวันเกิด...\nของฉันได้ด้วยสินะ ขอบคุณนะ"
10119-400 = "ปกติแล้วฉันไม่ได้\nให้ความสำคัญกับวันเกิดเท่าไร"
10119-410 = "แต่จากนี้ไป\nฉันน่าจะชอบมันมากขึ้นแล้วละ"
10119-420 = "สวัสดีปีใหม่นะ\nคุณครู"
10119-430 = "ปีนี้ฉันขอพึ่งพาคุณครู\nอีกหน่อยได้ใช่มั้ย...?"
10119-440 = "ฉันชอบฤดูหนาวน่ะ"
10119-450 = "ถ้าทุกอย่างเป็นสีขาวโพลน\nฉันจะรู้สึกว่าตัวเองกลมกลืน\nกับทุกอย่างขึ้นมาหน่อยน่ะ"
10119-460 = "ฉันก็เลยชอบ\nงานเทศกาลฤดูหนาว"
10119-470 = "ที่จัดในเชิงเขาน่ะ"
10119-480 = "อ๊ะ ขอโทษที\nฉันมัวแต่คิด\nเกี่ยวกับฮาโลวีนอยู่น่ะ"
10119-490 = "ฉันสวมบทบาทเป็น\nตัวเองที่อยากเป็นอยู่ตลอด"
10119-500 = "งั้นก็เหมือนว่าฉันคอสเพลย์\nเป็นตัวเองอยู่ตลอดเวลานั่นละ"
10119-510 = "ฮุฮุ"
10119-520 = "วันนี้อาจจะเป็น\nวันสำหรับฉันเลยก็ได้นะ"
10119-540 = "ช่วงเวลาก่อนรุ่งสาง\nแบบนี้... เป็นช่วงเวลาที่\nมืดมิดที่สุดเลยละ"
10119-550 = "ฉัน... กลัวความมืด\nที่ดำสนิทแบบนี้"
10119-560 = "ในค่ำคืนที่ไม่มีแสงใด\nที่ส่องสว่างไล่ความมืดได้"
10119-570 = "แม้แต่การทนรอ\nให้ค่ำคืนเลยผ่านไป...\nก็เป็นเรื่องยากสำหรับฉัน"
10119-580 = "ฉันเคยต้องแสดงเป็นคนอื่น\nทำตัวกลมกลืนไปกับเงา\nต้องแอบซ่อนและแสร้งว่าไม่เป็นไร"
10119-590 = "แต่ฉันจะไม่ทำอย่างนั้นอีกต่อไปแล้วละ"
10119-600 = "เพราะฉันรู้ว่าเมื่อค่ำคืนผ่านพ้นไป\nเงาของฉันก็จะปรากฏที่พื้นในที่สุด"
10119-610 = "เพราะงั้น..."
10119-620 = "ฉันขอประกาศชื่อของฉัน\nต่อหน้าห้วงอัสดง"
10119-630 = "ฉันคือ... หัวหน้าคณะไกล่เกลี่ย\nข้อพิพาทเฮียกกะเรียวรัน"
10119-640 = "โกเรียว นางุสะ!"
10119-2600 = "คุณครูก็คงรู้ว่าปืนนี้เป็นของคนที่มีสิทธิ์\nสืบทอดเท่านั้น ใช่แล้วละ มันมีความหมาย\nมากเกินกว่าที่โกเรียว นางุสะจะถือไว้ได้\nแต่ถ้าคุณครูไว้ใจฉันและเชื่อฉันอีกครั้ง...\nฉันก็จะพยายามอย่างสุดความสามารถเลย"

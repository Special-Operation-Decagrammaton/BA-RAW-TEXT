[translation]
10119-10 = "Blue Archive."
10119-20 = "Allied Hyakkiyako Academy, Hyakkaryouran Resolution Council.\nGoryou Nagusa. I'll use my strength to protect everyone."
10119-30 = "What would Ayame have done here?"
10119-40 = "Is it okay for me to be here?"
10119-50 = "(This is...the smell of chicken skewers?)"
10119-60 = "It's a bit hot for me...but certainly others must enjoy it."
10119-70 = "I'm getting dizzy... Perhaps I should take a break."
10119-80 = "Welcome, Sensei."
10119-90 = "Where shall we begin our work today?"
10119-100 = "Ah, Sensei..."
10119-110 = "I'm relieved. You've returned."
10119-120 = "...My apologies. I've found myself unable to correct this habit."
10119-130 = "When people wander from my side..."
10119-140 = "...I fear they'll disappear."
10119-150 = "So I ask of you..."
10119-160 = "...to not leave me alone for long."
10119-170 = "I enjoy the change of pace while working at Schale."
10119-180 = "The Hyakkaryouran has its own administrative work..."
10119-190 = "...but I find Schale is more professional in its processes."
10119-200 = "Um, Sensei..."
10119-210 = "Why is it that you always prepare chicken skewers for my visits?"
10119-220 = "Naturally, I find them delicious, however..."
10119-230 = "Schale's office is hardly suitable for grilling chicken."
10119-240 = "Is my face marred in some way?\nWhy do you gaze upon me so intently?"
10119-250 = "You find my snow-white skin \"eye catching\"?"
10119-260 = "Mmm. How surprising."
10119-270 = "The process of properly freezing hard ice..."
10119-280 = "It is a timely and meticulous one."
10119-290 = "Although entirely different temperatures, it is reminiscent of the steel heating process."
10119-300 = "Perhaps isolation begets rigor in all things of this world."
10119-310 = "As the name would suggest, the Hyakkaryouran Resolution Council..."
10119-320 = "...specializes in resolving conflicts."
10119-330 = "Naturally..."
10119-340 = "...problems would ideally be resolved without resorting to violence."
10119-350 = "Rather odd, yes?"
10119-360 = "Simply having someone by my side evokes gratitude in me."
10119-370 = "Perhaps that's why today feels special for me as well."
10119-380 = "Happy birthday, Sensei."
10119-390 = "Ah, my birthday... You remembered. Thank you."
10119-400 = "I've never thought much of my birthday."
10119-410 = "But perhaps I'll regard it more warmly from now on."
10119-420 = "Happy New Year, Sensei."
10119-430 = "For this next year, I may continue leaning on you, yes?"
10119-440 = "I like winter."
10119-450 = "When the landscape turns white, it feels like I'm able to blend in with the background."
10119-460 = "So this festival takes place in the height of winter."
10119-470 = "I like it quite a bit."
10119-480 = "Ah, apologies. I was contemplating \"Halloween.\""
10119-490 = "I'm always pretending to be the person I wish I were..."
10119-500 = "...therefore, I'm always in costume."
10119-510 = "Fufu."
10119-520 = "This day may be made just for me."
10119-540 = "This moment, just before the sun rises...is when the darkness dominates."
10119-550 = "This pitch-black darkness... I've always feared it."
10119-560 = "I don't shine enough to lift that darkness."
10119-570 = "Nor could I...endure through the passing of the night."
10119-580 = "I had no choice but to hide, pretending to be someone else, blending into the shadows, feigning composure."
10119-590 = "But not anymore."
10119-600 = "I know that the night will pass with time...and my shadow will cast over the earth."
10119-610 = "So..."
10119-620 = "I declare my name to the spirit realm."
10119-630 = "...I am the President of the Hyakkaryouran Resolution Council..."
10119-640 = "Goryou Nagusa!"
10119-2600 = "You're well aware of this, but it is only with the Authority of the Presidency that one can be worthy of holding this gun. That's right. It bears too much meaning for someone such as me, Goryou Nagusa. However, if you truly wish to place your trust in me once again... I shall fight with all my might."

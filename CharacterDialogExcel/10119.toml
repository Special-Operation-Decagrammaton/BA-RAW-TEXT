[translation]
10119-10 = "蔚藍檔案。"
10119-20 = "百鬼夜行聯合學園，\n百花繚亂紛爭調停委員會──御稜名草。\n這股力量，是為了守護大家而存在的。"
10119-30 = "如果是菖蒲的話……\n會怎麼度過呢。"
10119-40 = "真的能待在這裡嗎……"
10119-50 = "（這是……\n烤雞……？）"
10119-60 = "雖然有點熱……\n但對大家來說\n肯定很舒服吧。"
10119-70 = "有點頭暈……\n休息一下吧。"
10119-80 = "啊啊，歡迎回來，老師。"
10119-90 = "今天該做些什麼，\n請告訴我吧。"
10119-100 = "啊，老師……\n歡迎回來。"
10119-110 = "你能回來，真是太好了。"
10119-120 = "那個……我有點不安。"
10119-130 = "害怕大家會離我而去……"
10119-140 = "或者消失不見……"
10119-150 = "請不要……讓我獨自一人。"
10119-160 = "對不起。"
10119-170 = "夏萊的工作……\n有點新鮮。"
10119-180 = "雖然在百花繚亂\n也有做文書工作……"
10119-190 = "不過並不像夏萊這麼正式。"
10119-200 = "那個……在夏萊值班的日子"
10119-210 = "感覺經常在烤烤雞……\n是我的錯覺嗎？"
10119-220 = "雖然……我也喜歡……"
10119-230 = "但我覺得還是\n別在這裡烤比較好。"
10119-240 = "……怎麼了嗎？"
10119-250 = "白皙的肌膚讓你看傻了……？"
10119-260 = "是嗎……虧你不會看膩呢。"
10119-270 = "堅硬的冰塊……"
10119-280 = "聽說要慢慢花時間才會凍結。"
10119-290 = "總覺得……\n跟鍛造鋼鐵有點類似。"
10119-300 = "……也許越是孤獨，\n就越容易變得頑固吧。"
10119-310 = "「百花繚亂紛爭調停委員會」，"
10119-320 = "顧名思義，是為了\n調停紛爭而存在。"
10119-330 = "其實……"
10119-340 = "要是能在拔槍之前\n平息就好了。"
10119-350 = "好奇怪。"
10119-360 = "光是待在身邊，\n就覺得這麼幸福。"
10119-370 = "對我來說，感覺也像\n自己的事一樣特別。"
10119-380 = "……祝你生日快樂。"
10119-390 = "……你記得啊。\n謝謝你。"
10119-400 = "至今為止，我並\n沒有特別在意……"
10119-410 = "不過今後……或許會認為\n是個特別的日子也說不定。"
10119-420 = "新年快樂。"
10119-430 = "今年……我想再多依賴你一點。\n可以嗎……？"
10119-440 = "我喜歡冬天。"
10119-450 = "因為一切都被白色給覆蓋，\n就不必再去在意了。"
10119-460 = "所以這個季節的──"
10119-470 = "深冬的慶典，我非常喜歡。"
10119-480 = "……我思考了有關萬聖節的事。"
10119-490 = "既然我總是在扮演\n自己想成為的模樣……"
10119-500 = "能算是一直都在Cosplay嗎？"
10119-510 = "呵呵。"
10119-520 = "今天這一天，或許就是\n為了我而存在的也說不定。"
10119-540 = "黎明前的這個瞬間──\n是黑暗最深沉的時候。"
10119-550 = "我……曾經\n害怕著這片漆黑。"
10119-560 = "無論是眩目到\n足以點亮闇夜──"
10119-570 = "還是在黎明之前\n隱忍下去……\n我都無法辦到。"
10119-580 = "只能藉由扮演他人──\n混入陰影中故作鎮定而已。"
10119-590 = "但是──現在不一樣了。"
10119-600 = "因為我已經明白\n夜晚終將結束──\n我的影子也會\n落映在地面上了。"
10119-610 = "所以──"
10119-620 = "就讓我向黃昏報上名號吧。"
10119-630 = "我是百花繚亂紛爭調停\n委員會的委員長──"
10119-640 = "御稜名草！"
10119-2600 = "……這把槍，是沒有資格就不能持有的東西。\n沒錯──讓御稜名草持有它的意義，\n我想老師應該很清楚。\n即使如此……你還是願意託付給我，\n願意相信我的話……\n我也會試著傾盡全力掙扎的。"

[translation]
10091-10 = "아, 아…… 블루 아카이브."
10091-20 = "보컬이라니……\n뭐, 이렇게 된 이상 열심히 할게.\n잘 부탁해, 선생님."
10091-30 = "우와…… 사람 많아!\n괜찮아? 여기."
10091-40 = "여기서 부르면\n 튀겠지?"
10091-50 = "좀 불렀더니, 배고파졌네."
10091-60 = "튀지는 않지? ……뭐,\n너무 신경 쓰는 건가."
10091-70 = "다들, 어디 있는 거야."
10091-80 = "왔구나, 선생님.\n어때? 어울리는 것 같아?"
10091-90 = "아, 선생님! 여기, 여기!"
10091-100 = "모처럼이니까……\n한 곡 불러줄까?"
10091-110 = "한, 한번 말해봤어……\n농담이야, 농담."
10091-120 = "응? 마스크?"
10091-130 = "…아, 선생님이\n생각하는 것과는 달라."
10091-140 = "생각보다 움직이기 편하다,\n이거."
10091-150 = "평상복 레퍼토리에 추가할까."
10091-160 = "여기서 연습을…"
10091-170 = "…하는 건, 역시 민폐겠지."
10091-180 = "선생님, 오늘 생일이지?"
10091-190 = "괜찮다면 같이\n노래방이라도……"
10091-200 = "가, 갈래요?"
10091-210 = "그……\n추, 축하 노래라도\n해줄까……해서."
10091-220 = "오늘은 내 생일이야."
10091-230 = "그 …선생님……\n'그거' 불러주면 안 돼?"
10091-240 = "새해 복 많이 받으세요,\n선생님."
10091-250 = "올 한 해도 잘 부탁드립니다."
10091-260 = "크리스마스, 라……\n나, 올해 착한 아이였을까?"
10091-270 = "할로윈? 아아……\n어쩐지 시끄럽더라."
10091-280 = "선생님… 나한테 뭐\n줄 거 있지 않아?"
10091-300 = "……자, 빨리!"
10091-310 = "아~ 해봐!\n떨어지기 전에!"
10091-320 = "선생님이 안 먹어주면,\n나도 못 먹으니까!"
10091-330 = "자, 아~!"
10091-340 = "……응?"
10091-350 = "괜찮아?\n먼저 먹으라고...?"
10091-360 = "어…?\n이 스푼, 카즈사꺼고?"
10091-370 = "……응?\n……어라?"
10091-380 = "스푼……?\n내꺼……?"
10091-390 = "……어."
10091-400 = "우와아아아!? \n방금 한 말 취소!"
10091-2600 = "정말, 설마 이렇게 될 줄이야.\n후후… 새삼스럽지만,\n선생님을 만나서 정말 다행이다.\n……감사합니다."

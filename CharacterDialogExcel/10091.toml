[translation]
10091-10 = "Ah, ah... Blue Archive."
10091-20 = "A vocalist... Well, since it's come to this, I'll do my best. Looking forward to working with you, Sensei."
10091-30 = "Whoa... There's a crowd! I wonder if it'll be okay here?"
10091-40 = "I'd stick out if I sing here, no?"
10091-50 = "Singing made me hungry."
10091-60 = "I don't stand out, right? ...Well, maybe I'm worrying too much."
10091-70 = "Where...is everyone?"
10091-80 = "You're here, Sensei. What do you think? Does it look good?"
10091-90 = "Ah, Sensei! Here, over here!"
10091-100 = "Considering the occasion... Want me to sing something?"
10091-110 = "G-Gotcha... It was just a joke, okay?"
10091-120 = "Hm? This mask?"
10091-130 = "...Ah, it's not what you think, Sensei."
10091-140 = "This is actually more comfortable than I expected."
10091-150 = "Maybe I'll start wearing it as one of my casual outfits too..."
10091-160 = "Practicing here..."
10091-170 = "...would be a nuisance, I suppose."
10091-180 = "Sensei, it's your birthday today, right?"
10091-190 = "If it's not a bother, do you want to go karaoke somewhere..."
10091-200 = "...w-with me?"
10091-210 = "Uh... I-I was thinking, maybe I could sing you a happy birthday song...or something."
10091-220 = "Today's my birthday."
10091-230 = "So... Sensei... Could you sing \"that\" for me?"
10091-240 = "Happy New Year, Sensei."
10091-250 = "Looking forward to working together this year too, Sensei."
10091-260 = "Christmas... Was I a good girl this year?"
10091-270 = "Halloween? Ah... No wonder it's been so loud."
10091-280 = "Sensei... Don't you have something to give me?"
10091-300 = "...Now, hurry!"
10091-310 = "Say \"ah\"! Before it drops!"
10091-320 = "If you don't eat it, then I can't have mine either!"
10091-330 = "Now, say \"ahhh\"!!"
10091-340 = "...Huh?"
10091-350 = "It's fine? For me to have mine first...?"
10091-360 = "Huh...? This spoon, it's mine?"
10091-370 = "...Hm? ...Huh?"
10091-380 = "Spoon...? Mine...?"
10091-390 = "...Ah."
10091-400 = "Whoaaa! Forget what I just said!"
10091-2600 = "Seriously, how did it end up like this? Heehee... This is a little off topic, but I'm really glad that I met you, Sensei. So...thank you."

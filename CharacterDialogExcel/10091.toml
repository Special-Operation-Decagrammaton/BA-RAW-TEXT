[translation]
10091-10 = "啊，啊……蔚藍檔案。"
10091-20 = "居然是主唱啊……\n好吧，既然如此，我會認真的。\n請多指教囉，老師。"
10091-30 = "哇……人好多！\n沒問題嗎？這裡。"
10091-40 = "在這裡唱歌\n會很顯眼吧？"
10091-50 = "才小唱一下，\n肚子就餓了。"
10091-60 = "不會太顯眼吧？\n……嗯，是我\n想太多了吧。"
10091-70 = "大家，會在哪裡呢？"
10091-80 = "你來啦，老師。\n怎麼樣？適合我嗎？"
10091-90 = "啊，老師！這裡，這裡！"
10091-100 = "機會難得……\n要不要唱一首？"
10091-110 = "只，只是說說而已……\n開玩笑的，開玩笑的。"
10091-120 = "嗯？口罩？"
10091-130 = "……啊啊，跟老師\n想的那種不一樣哦。"
10091-140 = "比想像中還方便\n行動呢，這個。"
10091-150 = "要不要加入便服清單呢？"
10091-160 = "在這裡練習……"
10091-170 = "……的話，\n果然會造成困擾吧。"
10091-180 = "老師，今天是你生日對吧？"
10091-190 = "可以的話，一起\n去卡拉OK……"
10091-200 = "要，要嗎？"
10091-210 = "那個……\n想，想說可以唱點\n祝福的歌……之類的。"
10091-220 = "今天是我的生日。"
10091-230 = "那個……老師……\n可以為我唱「那個」嗎？"
10091-240 = "祝你新年快樂，老師。"
10091-250 = "今年也請多多指教。"
10091-260 = "聖誕節啊……\n我，今年算是乖孩子嗎？"
10091-270 = "萬聖節？啊啊……\n難怪覺得鬧哄哄的。"
10091-280 = "老師……你是不是\n有東西要給我？"
10091-300 = "……好了，快點！"
10091-310 = "啊～！\n在掉下去之前！"
10091-320 = "要是老師不吃的話，\n我也沒辦法吃了！"
10091-330 = "來，啊～！"
10091-340 = "……咦？"
10091-350 = "沒關係？\n我先吃……？"
10091-360 = "咦……？\n畢竟這個湯匙，是千紗的？"
10091-370 = "……嗯？\n……咦？"
10091-380 = "湯匙……？\n我的……？"
10091-390 = "……啊。"
10091-400 = "哇啊啊啊啊！？\n剛才的當我沒說！"
10091-2600 = "真的是，沒想到會變成這樣。\n呵呵……雖然現在說可能有點晚了，\n但能見到老師真是太好了。\n……謝謝你。"

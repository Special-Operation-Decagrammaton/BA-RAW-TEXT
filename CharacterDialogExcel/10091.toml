[translation]
10091-10 = "อ่า... อ่า... Blue Archive"
10091-20 = "ฉันได้ร้องนำเหรอเนี่ย...\nก็ได้ ในเมื่อเป็นแบบนี้แล้ว ฉันจะพยายามแล้วกัน\nรบกวนด้วยนะคุณครู"
10091-30 = "ว้าว... คนเยอะจัง!\nที่นี่จะโอเคมั้ยนะ?"
10091-40 = "ถ้าฉันร้องเพลงที่นี่\nคงดึงดูดสายตาอยู่เนอะ?"
10091-50 = "พอใช้พลังร้องไปนิดหน่อย\nก็เริ่มหิวซะแล้ว"
10091-60 = "ยังไม่สะดุดตาใครใช่มั้ย?\nเฮ้อ... ฉันคิดมากไปมั้ยนะ"
10091-70 = "ทุกคนไปอยู่ไหนกันน่ะ"
10091-80 = "มาแล้วเหรอคุณครู\nเป็นไงบ้าง? เหมาะกับฉันมั้ย?"
10091-90 = "อ๊ะ คุณครู! ทางนี้เลย! ทางนี้!"
10091-100 = "ไหนๆ ก็ได้โอกาสแล้ว...\nฉันร้องเพลงให้ฟังมั้ย?"
10091-110 = "ฉัน... แค่ลองพูดดูน่ะ...\nล้อเล่นน่ะ ล้อเล่น"
10091-120 = "หืม? หน้ากากเหรอ?"
10091-130 = "อ้อ... ไม่เหมือนกับที่\nคุณครูคิดหรอกนะ"
10091-140 = "อันนี้มัน...\nเคลื่อนไหวได้สะดวกกว่าที่คิดน่ะ"
10091-150 = "ตอนใส่ชุดธรรมดา\nก็ใส่ด้วยดีมั้ยนะ?"
10091-160 = "ถ้าซ้อมตรงนี้..."
10091-170 = "คงรบกวนคนอื่นเนอะ"
10091-180 = "วันนี้วันเกิดคุณครูใช่มั้ย?"
10091-190 = "ถ้าไม่ติดอะไร\nเราไปคาราโอเกะ..."
10091-200 = "กัน... มั้ยคะ?"
10091-210 = "เอ่อ...\nฉันว่าจะร้องเพลง\nฉลองวันเกิด... ให้น่ะ"
10091-220 = "วันนี้วันเกิดฉันละ"
10091-230 = "เอ่อ... คุณครู...\nร้อง 'เพลงนั้น' ให้ฟังหน่อยได้มั้ย?"
10091-240 = "สวัสดีปีใหม่ค่ะ\nคุณครู"
10091-250 = "ปีนี้ก็ขอฝากตัวด้วยนะคะ"
10091-260 = "คริสต์มาส...\nปีนี้ฉันเป็นเด็กดีมั้ยนะ?"
10091-270 = "ฮาโลวีนเหรอ? อ้อ...\nก็ว่าอยู่ว่าทำไมเสียงดังกัน"
10091-280 = "คุณครู... ไม่มีอะไร\nจะให้ฉันเหรอ?"
10091-300 = "เอ้า เร็วสิ!"
10091-310 = "อ้าม อ้าปากสิ~!\nก่อนที่ฉันจะทำมันหกน่ะ!"
10091-320 = "เพราะถ้าคุณครูไม่กิน\nฉันก็ไม่ได้กินนะ!"
10091-330 = "เอ้า อ้าม~!"
10091-340 = "หืม...?"
10091-350 = "ไม่เป็นไรงั้นเหรอ?\nให้ฉันกินก่อนเหรอ...?"
10091-360 = "หืม...? ช้อนคันนี้\nเป็นของคาซึสะงั้นเหรอ?"
10091-370 = "หืม...?\nเอ๋...?"
10091-380 = "ช้อนคันนี้...?\nเป็นของฉันงั้นเหรอ...?"
10091-390 = "อ๋า..."
10091-400 = "เหวอออ!?\nที่พูดไปเมื่อกี้ขอยกเลิกนะ!"
10091-2600 = "จริงๆ เลยเชียว คิดไม่ถึงเลยว่าจะเป็นแบบนี้\nฮุฮุ... ถึงจะไม่เคยบอกมาก่อนก็เถอะ\nแต่ฉันโชคดีจริงๆ ที่ได้เจอคุณครู\nขอบคุณนะคะ..."

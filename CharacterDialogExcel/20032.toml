[translation]
20032-10 = "블루 아카이브"
20032-20 = "평소보다 몸이 가벼운 느낌이야.\n시원해서 그런가?"
20032-30 = "히마리 선배가\n없는 틈에……"
20032-40 = "여기에\n빙수가 있으면,\n완벽할 텐데."
20032-50 = "에어컨의\n스위치가……"
20032-60 = "점점 더워지는데…\n사람이 많아서 그런가."
20032-70 = "여기라면,\n평생 지낼 수\n있을 것 같아."
20032-80 = "어서 와, 선생님.\n방, 시원하게 해뒀어."
20032-90 = "수고했어 선생님.\n……왜 놀라는 거야?"
20032-100 = "왜 아직도\n이 차림이냐고?"
20032-110 = "……마음에 들었으니까?"
20032-120 = "여기… 너무 더워…\n에어컨 온도, 낮춰도 돼?"
20032-130 = "역시, 재킷 벗을까……"
20032-140 = "속옷은 안되고\n수영복은 괜찮아……?"
20032-150 = "대체 뭐가 다른 거야?\n방수기능의 유무?"
20032-160 = "책상 밑에서\n이런 잡지를 발견했어.\n좋은 자료가 많아."
20032-170 = "……왜 그래, 선생님. 놀라서는."
20032-180 = "생일 축하해, 선생님.\n오늘은 선생님이 좋아하는\n옷으로 지내려고 하는데…"
20032-190 = "뭔가 리퀘스트\n같은 거 있어?"
20032-200 = "선생님이 같이\n있어 준다고 해서,"
20032-210 = "최고 효율의\n생일 플랜을 만들어 왔어."
20032-220 = "오늘은 1초도\n낭비하고 싶지 않아."
20032-230 = "새해 복 많이 받아 선생님.\n올해는 스스로 납득할 수\n있는 실력을 갖췄으면 좋겠네."
20032-240 = "크리스마스네.\n이날에 어울리는 옷을\n가져왔으니까 갈아입고……"
20032-250 = "……음, 지금의\n모습이 제일…?"
20032-260 = "할로윈은 좋은 것 같아.\n뭘 입어도 다들 좋아해 주거든."
20032-280 = "응?\n춥지 않아. 괜찮아."
20032-290 = "반대로, 지금이\n시원해서 딱 좋아."
20032-300 = "기분 좋아…\n선생님도 들어올래?"
20032-310 = "흐~음. 그럼 됐지만."
20032-320 = "곧 나갈 테니까,\n조금만 기다려 줘. 선생님."
20032-2600 = "옷이나 환경이 바뀌어도……\n이게 있으면 안심이야."

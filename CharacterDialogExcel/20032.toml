[translation]
20032-10 = "蔚藍檔案"
20032-20 = "身體好像比平常輕盈。\n是因為很涼爽的關係嗎？"
20032-30 = "陽葵前輩不在，\n趕快趁現在……"
20032-40 = "要是這裡有\n刨冰就完美了。"
20032-50 = "空調的開關在……"
20032-60 = "越來越熱了……\n畢竟這裡人多。"
20032-70 = "感覺能在這裡\n過一輩子呢。"
20032-80 = "歡迎回來，老師。\n我先讓房間涼快起來囉。"
20032-90 = "辛苦你了，老師。\n……怎麼這麼驚訝？"
20032-100 = "問我為什麼\n總是這副打扮……？"
20032-110 = "……因為我喜歡？"
20032-120 = "這裡……太熱了……\n可以把空調的溫度\n調低一點嗎？"
20032-130 = "果然還是\n把夾克脫掉好了……"
20032-140 = "內衣不行，\n但泳裝就可以……？"
20032-150 = "究竟差在哪裡？\n防水功能的有無？"
20032-160 = "我在書桌底下\n發現了這種雜誌唷。\n有很多好資料。"
20032-170 = "……怎麼了？老師。\n突然這麼慌張。"
20032-180 = "生日快樂，老師。\n我今天打算穿老師\n喜歡的衣服……"
20032-190 = "有什麼要求嗎？"
20032-200 = "因為老師說要\n跟我一起……"
20032-210 = "所以我制訂了\n最高效率的生日計劃。"
20032-220 = "今天連1秒\n都不想浪費。"
20032-230 = "新年快樂，老師。\n今年希望可以擁有\n自己能接受的實力。"
20032-240 = "是聖誕節呢。\n我帶了適合這一天的\n衣服，我這就去換……"
20032-250 = "……嗯？\n現在這樣最好看……？"
20032-260 = "萬聖節真不錯呢。\n不管穿什麼，\n大家都會喜歡。"
20032-280 = "嗯？\n不冷哦。別擔心。"
20032-290 = "我反而，覺得現在\n很涼，溫度剛剛好。"
20032-300 = "真舒服……\n老師要不要也進來？"
20032-310 = "哼嗯～好吧。"
20032-320 = "我再泡一下就出去，\n稍等我一下哦，老師。"
20032-2600 = "即使服裝和環境改變……\n只要有這個就沒問題了。"

[translation]
16015-10 = "Blue, Archive!"
16015-20 = "Sensei... I'm going to show you! ...The part of me that's capable of change!"
16015-30 = "What a pretty place!"
16015-40 = "Everyone looks very cool!"
16015-50 = "Would it be a nuisance if I practiced here...?"
16015-60 = "I'm getting a bit hungry..."
16015-70 = "I wonder what song everyone would enjoy?"
16015-80 = "Welcome, Sensei! Is there a song you'd like to listen to?"
16015-90 = "Oh, Sensei! I've been waiting for you."
16015-100 = "What kind of songs do you typically listen to, Sensei?"
16015-110 = "Although I'm not quite at a professional level..."
16015-120 = "I can play proficiently now!"
16015-130 = "Hm? It feels as if I have an entirely different aesthetic now?"
16015-140 = "Um... Which one seems better...?"
16015-150 = "Now that I think about it, the mint candy I bought..."
16015-160 = "Heehee. Would you like to try it?"
16015-170 = "Heeheeheeheehee..."
16015-180 = "Hm? ...Heehee. Nothing."
16015-190 = "Honestly, I was worried at first. I thought I might have done something unnecessary..."
16015-200 = "In the end... I'm glad I did! Thank you, Sensei!"
16015-210 = "Happy birthday, Sensei!"
16015-220 = "I've prepared a song for you, Sensei!"
16015-230 = "Would you like to hear it?"
16015-240 = "My birthday? Ah... Y-Yes!"
16015-250 = "If you don't mind, would you go watch a live show with me...?"
16015-260 = "Happy New Year, Sensei!"
16015-270 = "I'm already wondering what sort of things are going to happen this year!"
16015-280 = "Merry Christmas! Was I a good kid this year?"
16015-290 = "Halloween... What a good day! There's a lot of different costumes I want to try on!"
16015-310 = "Heehee... Now, Sensei!"
16015-320 = "Come here! Don't be shy!"
16015-330 = "...? Sensei...? What's wrong?"
16015-340 = "Did I... Did I make you uncomfortable?"
16015-350 = "Hmph! But I went to all this effort..."
16015-360 = "I realize I'm being stubborn again, but... Can you humor me a little, please?"
16015-370 = "...Heeheehee. Okay! Yay!"
16015-380 = "(...I should thank the clouds for this rain today.)"
16015-390 = "On my mark, we're going to run out together! Are you ready?"
16015-400 = "Let's go!"
16015-2600 = "I never even fathomed a day like this would come. These kinds of things can really happen, after all. I'm very happy."

[translation]
16015-10 = "블루-, 아카이브!"
16015-20 = "선생님……. 보여드릴게요.\n달라질 수 있었던 제 모습!"
16015-30 = "예쁜 장소……!"
16015-40 = "다들 멋진 모습!"
16015-50 = "여기서 연습하면\n민폐려나……?"
16015-60 = "조금 배고파졌어…"
16015-70 = "다들 어떤 노래를\n좋아할까?"
16015-80 = "어서 오세요, 선생님!\n듣고 싶은 곡이라도\n있으신가요?"
16015-90 = "아, 선생님!\n기다리고 있었어요!"
16015-100 = "선생님은,\n보통 어떤 곡 들으세요?"
16015-110 = "아무래도\n프로 수준은 아니지만,"
16015-120 = "나름대로\n연주할 수 있게\n되었습니다!"
16015-130 = "네? 이미지가\n확 변한 거 같다고요?"
16015-140 = "어…… 어느 쪽이\n나아 보여요……?"
16015-150 = "그러고 보니\n새로 산 민트 사탕이……."
16015-160 = "후후. 드셔 보실래요?"
16015-170 = "후후후후후…"
16015-180 = "응? …후후.\n아무것도 아니에요."
16015-190 = "솔직히 처음에는 걱정이었어요.\n괜한 짓을 한 게 아닐까\n하고……."
16015-200 = "그래도……. 해서 다행이에요!\n감사합니다, 선생님!"
16015-210 = "생일 축하해요, 선생님!"
16015-220 = "선생님을 위한 한 곡을\n준비했습니다!"
16015-230 = "들어보실래요?"
16015-240 = "제 생일이요?\n아아…… 마, 맞아요!"
16015-250 = "괜찮으시다면,\n같이 라이브라도……!"
16015-260 = "새해 복 많이 받으세요,\n선생님!"
16015-270 = "올 한 해는\n또 무슨 일이 생길지,\n벌써부터 기대돼요!"
16015-280 = "메리 크리스마스~!\n올해의 저는,\n착한 아이였을까요?"
16015-290 = "할로윈… 좋은 날이죠!\n여러가지 가장을\n해보고 싶어요!"
16015-310 = "에헤헤…….\n자요, 선생님!"
16015-320 = "이쪽으로!\n사양 마시고!"
16015-330 = "……? 선생님……?\n왜 그러세요?"
16015-340 = "혹시….\n곤란하시게 만든 걸까요?"
16015-350 = "우움~!\n모처럼 용기를 냈는데……."
16015-360 = "억지 부리고 있는 저도\n그렇지만…. 그래도 조금은\n맞춰 주셨으면 해요."
16015-370 = "……후후후.\n네! 좋아요!"
16015-380 = "(…이 비에 감사해야겠는걸)"
16015-390 = "제가 신호하면,\n같이 달리는 거예요!\n준비 되셨죠?"
16015-400 = "그럼 갑니다~!"
16015-2600 = "이런 날이 올 줄은, 생각도 못 했어요.\n……정말 이런 일이 일어날 수도 있군요.\n…너무 기뻐요."

[translation]
16015-10 = "Blue Archive!"
16015-20 = "คุณครู... ฉันจะให้ดูภาพลักษณ์\nของฉันที่เปลี่ยนไปค่ะ!"
16015-30 = "สถานที่สวยๆ...!"
16015-40 = "ทุกคนดูยอดเยี่ยม!"
16015-50 = "ถ้าฉันซ้อมที่นี่\nจะเป็นการรบกวน\nคนอื่นรึเปล่านะ...?"
16015-60 = "ชักจะหิวนิดหน่อยแล้วสิ..."
16015-70 = "ทุกคนจะชอบ\nเพลงแบบไหนกันนะ?"
16015-80 = "เชิญค่ะคุณครู!\nมีเพลงอะไรที่\nอยากฟังรึเปล่าคะ?"
16015-90 = "อ๊ะ คุณครู!\nฉันกำลังรออยู่เลยค่ะ!"
16015-100 = "คุณครู\nปกติฟังเพลงแบบไหนเหรอคะ?"
16015-110 = "ถึงฉันจะยัง\nไม่ถึงระดับมือโปร"
16015-120 = "แต่ยังไงก็\nพอเล่นเป็นบ้างน่ะค่ะ!"
16015-130 = "คะ? ภาพลักษณ์ของฉัน\nดูเปลี่ยนไปเลยงั้นเหรอคะ?"
16015-140 = "ดะ... ด้านไหนที่\nดีขึ้นเหรอคะ...?"
16015-150 = "จะว่าไป ฉันมี\nลูกอมรสมินต์ที่ซื้อมาใหม่..."
16015-160 = "ฮุฮุ ลองทานดูมั้ยคะ?"
16015-170 = "ฮุฮุฮุฮุฮุฮุ..."
16015-180 = "หืม? ฮุฮุ...\nไม่มีอะไรทั้งนั้นค่ะ"
16015-190 = "บอกตรงๆ ว่าตอนแรกฉันกังวลค่ะ\nว่าจะทำอะไรไม่เข้าท่าหรือเปล่า..."
16015-200 = "แต่ถึงยังไงก็... ค่อยยังชั่วนะคะ!\nขอบคุณค่ะคุณครู!"
16015-210 = "สุขสันต์วันเกิดค่ะ คุณครู!"
16015-220 = "ฉันเตรียมเพลงไว้\nเพื่อคุณครูด้วยค่ะ"
16015-230 = "ลองฟังดูมั้ยคะ?"
16015-240 = "วันเกิดฉันเหรอคะ?\nอ๊ะ... จะ... จริงด้วยค่ะ!"
16015-250 = "ถ้าสะดวกละก็\nมาเล่นดนตรีสดด้วยกันมั้ยคะ...!"
16015-260 = "สวัสดีปีใหม่ค่ะ\nคุณครู!"
16015-270 = "ปีนี้จะมีเรื่องอะไรเกิดขึ้นนะ\nรอไม่ไหวแล้วสิคะเนี่ย!"
16015-280 = "เมอร์รี คริสต์มาส~!\nปีนี้ฉันเป็น\nเด็กดีหรือเปล่านะคะ?"
16015-290 = "ฮาโลวีน... เป็นวันที่ดีค่ะ!\nฉันอยากลองแต่งตัว\nหลายๆ แบบดูค่ะ"
16015-310 = "แหะๆๆ...\nเอาละค่ะ คุณครู!"
16015-320 = "เข้ามาสิคะ!\nห้ามปฏิเสธนะคะ!"
16015-330 = "...? คุณครู...?\nเป็นอะไรไปคะ?"
16015-340 = "หรือว่า...\nฉันทำให้คุณครูลำบากใจคะ?"
16015-350 = "งื้ออ~!!\nอุตส่าห์รวบรวมความกล้าแล้วเชียว..."
16015-360 = "ฉันก็รู้ว่าตัวเองดื้อ...\nแต่ถึงยังไง... ก็อยากให้ช่วย\nคล้อยตามหน่อยนะคะ"
16015-370 = "ฮุฮุฮุ...\nค่ะ! ดีเลยค่ะ! "
16015-380 = "(ต้องขอบคุณฝน\nที่ตกลงมาพอดีเลย...)"
16015-390 = "ถ้าฉันให้สัญญาณ\nก็ออกวิ่งไปพร้อมกันนะคะ!\nพร้อมแล้วใช่มั้ยคะ?"
16015-400 = "ถ้างั้นก็ไปกันเลยค่า~!"
16015-2600 = "ไม่คิดเลยนะคะว่าจะมีวันแบบนี้\nเรื่องแบบนี้เกิดขึ้นได้จริงๆ สินะคะ\nดีใจจังเลยค่ะ"

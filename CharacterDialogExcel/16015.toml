[translation]
16015-10 = "蔚藍，檔案！"
16015-20 = "老師……請看著吧。\n我改變後的面貌！"
16015-30 = "漂亮的地方……！"
16015-40 = "大家都打扮得很漂亮。"
16015-50 = "在這裡練習\n會造成困擾嗎……？"
16015-60 = "有點餓了……"
16015-70 = "大家喜歡\n什麼曲子呢？"
16015-80 = "歡迎回來，老師！\n有想聽的曲子嗎？"
16015-90 = "啊，老師！\n我一直在等你哦！"
16015-100 = "老師你，平常\n都聽什麼曲子呢？"
16015-110 = "雖然實在不到職業水準，"
16015-120 = "但已經多少能夠演奏了！"
16015-130 = "嗯？形象看起來\n好像變了很多，是嗎？"
16015-140 = "哪……哪種\n比較好呢……？"
16015-150 = "這麼說來，\n我有新買的薄荷糖……"
16015-160 = "呵呵，要吃吃看嗎？"
16015-170 = "呵呵，唔呵呵……"
16015-180 = "嗯？\n……呵呵。\n什麼都沒有。"
16015-190 = "老實說，一開始我很擔心。\n是不是做了多餘的事……"
16015-200 = "不過……幸好當時有做！\n謝謝你，老師！"
16015-210 = "祝你生日快樂，老師！"
16015-220 = "我為老師準備了一曲！"
16015-230 = "要聽聽看嗎？"
16015-240 = "我的生日嗎？\n啊……沒，沒錯！"
16015-250 = "如果可以的話，\n要不要一起去演唱會……！"
16015-260 = "新年快樂，老師！"
16015-270 = "今年會發生什麼，\n我已經開始期待了！"
16015-280 = "聖誕快樂～！\n今年的我，\n是個乖孩子嗎？"
16015-290 = "萬聖節……是個好日子呢！\n我想嘗試各種裝扮！"
16015-310 = "耶嘿嘿……\n請進，老師！"
16015-320 = "來這邊！\n不用客氣！"
16015-330 = "……？老師……？\n怎麼了嗎？"
16015-340 = "難道……\n讓你為難了嗎？"
16015-350 = "唔～！\n好不容易鼓起勇氣了說……"
16015-360 = "雖然說要亂來的\n我也有錯……\n可是，還是希望能\n稍微配合一下。"
16015-370 = "……哼哼哼。\n來！請進！"
16015-380 = "（……好像得\n　感謝這場雨呢）"
16015-390 = "我一發出信號，\n就一起跑唷！\n準備好了吧？"
16015-400 = "那要出發囉～！"
16015-2600 = "這一天居然會到來，我怎麼想也沒想到。\n……原來這種事真的會發生。\n……我真的很開心。"

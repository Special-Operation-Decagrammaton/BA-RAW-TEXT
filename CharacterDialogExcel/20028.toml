[translation]
20028-10 = "Blue Archive!"
20028-20 = "M-My name is Wakaba Hinata! Tell me whatever you need, and I shall do my best!"
20028-30 = "Such lovely decor you have here...!"
20028-40 = "If you'd like something moved, do not hesitate to ask!"
20028-50 = "Hm? I feel as though someone is calling me..."
20028-60 = "Such a comfortable place we have here."
20028-70 = "Sensei... Where could you be...?"
20028-80 = "I-I'm indebted to you for all you've done, Sensei."
20028-90 = "What would you say to a nice walk on the beach...?"
20028-100 = "Welcome, Sensei."
20028-110 = "I-I pray your day is filled with love and happiness."
20028-120 = "Please let me help you with your work, Sensei!"
20028-130 = "Do I like summer...?"
20028-140 = "Yes, of course! I also like spring, autumn, and winter."
20028-150 = "I wish to treasure the joy of summer and the joy of the seaside."
20028-160 = "Hmm... To be honest, I find this outfit somewhat...embarrassing..."
20028-170 = "Ah, but my swimsuit won't interfere with my prayers, of course!"
20028-180 = "Happy birthday, Sensei!"
20028-190 = "I hope that I can say happy birthday to you again next year."
20028-200 = "Oh, my birthday... You remembered!"
20028-210 = "Thank you... I'm so very happy."
20028-220 = "Happy New Year, Sensei."
20028-230 = "I wish you good health in the year to come."
20028-240 = "It's Christmas!"
20028-250 = "This is a very special day for the Sisterhood."
20028-260 = "...M-My outfit doesn't really matter!"
20028-270 = "It's Halloween! I'm so happy to see that everyone is having fun!"
20028-290 = "Mmm... Hmm...? That's odd..."
20028-300 = "This... This is actually quite comfortable..."
20028-310 = "It's just warm enough, and there's still a nice breeze. The shade keeps the sun out of my eyes."
20028-320 = "It's rather cozy... I feel as if I could drift off into sleep."
20028-330 = "But it's still... Well, if I'm the only one lying down, and Sensei isn't resting..."
20028-340 = "It still feels like I'm doing something wrong."
20028-350 = "Oh, okay. Then, as you say."
20028-360 = "I will let go and relax."
20028-370 = "Hmm... Zzz... Hehehe..."
20028-380 = "...Huh!? Wh-What was that!?"
20028-390 = "P-Please forget that. I beg of you to forget what you just heard! Sensei!!"
20028-2600 = "I...don't know how to thank you enough... In fact, words may not be enough to express my gratitude. I'll repay your kindness with my actions, Sensei."

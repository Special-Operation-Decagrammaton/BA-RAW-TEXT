[translation]
20028-10 = "Blue Archive!"
20028-20 = "วะ...วาคาบะ ฮินาตะค่ะ\nฉะ...ฉันจะตั้งใจทำให้ดีที่สุด\nพะ...เพราะงั้นบอกมาได้ทุกเรื่องเลยนะคะ!"
20028-30 = "สไตล์การตกแต่งที่นี่\nน่ารักมากๆ เลยค่ะ...!"
20028-40 = "คือว่า... ถ้าเป็นเรื่อง\nขนย้ายสัมภาระละก็\nบอกฉันได้ตลอดเลยนะคะ!"
20028-50 = "เอ๋? รู้สึกเหมือนมีคน\nกำลังเรียกฉันอยู่เลย..."
20028-60 = "ที่นี่ดูดีแล้วก็\nสบายมากเลยค่ะ"
20028-70 = "คุณครู...\nอยู่ที่ไหนคะ...?"
20028-80 = "ขะ...ขอบคุณที่\nทำงานหนักนะคะ คุณครู"
20028-90 = "อะ...ออกไปเดินเล่น\nริมหาดด้วยกันดีมั้ยคะ?"
20028-100 = "เชิญเลยค่ะ คุณครู"
20028-110 = "วะ...วันนี้\nก็ขอให้เป็นวันที่เต็มไปด้วย\nความรักและความสุขนะคะ"
20028-120 = "ขอให้ฉันได้ช่วยงาน\nคุณครูด้วยเถอะค่ะ!"
20028-130 = "ชอบฤดูร้อน...หรือเปล่า\nงั้นเหรอคะ?"
20028-140 = "ค่ะ ต้องชอบสิคะ!\nแล้วก็ชอบฤดูใบไม้ผลิ\nฤดูใบไม้ร่วง แล้วก็ฤดูหนาวด้วยค่ะ!"
20028-150 = "ความเพลิดเพลินที่มีแค่ในฤดูร้อน\nความสนุกที่สัมผัสได้แค่ในทะเล\nฉันอยากเก็บรักษามันไว้ให้ดีที่สุดค่ะ"
20028-160 = "อืม... ถ้าให้พูดตามตรงละก็\nฉันรู้สึกอายนิดหน่อย...\nที่ต้องใส่ชุดว่ายน้ำค่ะ"
20028-170 = "ตะ...แต่ถึงจะใส่ชุดว่ายน้ำ\nก็ไม่ได้มีปัญหาหรือรบกวน\nการสวดอธิษฐานหรอกนะคะ"
20028-180 = "สุขสันต์วันเกิดค่ะ คุณครู!"
20028-190 = "หวังว่าวันนี้ในปีหน้า...\nฉันจะมีโอกาสได้อวยพร\nคุณครูอีกนะคะ"
20028-200 = "อ๊ะ คุณครู...\nจำวันเกิดฉันได้ด้วยเหรอคะ!"
20028-210 = "ขอบคุณนะคะ...\nฉันดีใจมากเลยค่ะ"
20028-220 = "ขอให้มีความสุขในวันปีใหม่นะคะ คุณครู"
20028-230 = "ขอให้ปีนี้คุณครู\nมีสุขภาพที่แข็งแรงตลอดปีนะคะ"
20028-240 = "วันคริสต์มาสแล้วนะคะ!"
20028-250 = "วันนี้ก็เป็นวันพิเศษ\nสำหรับชมรมซิสเตอร์ของเรา\nเหมือนกันค่ะ"
20028-260 = "ชะ...ชุดนี้ มันไม่ได้เกี่ยวกันเลยนะคะ!"
20028-270 = "วันฮาโลวีนแล้วค่ะ!\nทุกคนดูสนุกสนานกันแบบนี้\nฉันดีใจจังเลยค่ะ!"
20028-290 = "อืม... หืม...?\nเอ๋...?"
20028-300 = "ตรงนี้มันสบาย\nกว่าที่คิดอีกนะคะ..."
20028-310 = "ลมพัดเย็นสบาย ไม่เย็น\nจนเกินไป... และมีร่มเงาบังแดด\nไม่ให้ส่องโดนหน้าด้วย..."
20028-320 = "อุ่นสบายดีจัง...\nถ้านอนอยู่ตรงนี้ละก็\nคงจะเผลอหลับแน่ๆ เลยค่ะ"
20028-330 = "แต่ว่า... เอ่อ...\nถ้ามีแต่ฉันคนเดียวที่ได้นอนพัก\nทั้งที่อยู่กับคุณครูแบบนี้..."
20028-340 = "มะ...มันรู้สึกผิด...\nยังไงก็ไม่รู้ค่ะ"
20028-350 = "ขะ... เข้าใจแล้วค่ะ\nถ้างั้นฉันจะทำตาม\nที่คุณครูบอก..."
20028-360 = "ปล่อยใจให้สบายๆ..."
20028-370 = "...อืม...\nงืมๆๆ ฮิฮิ..."
20028-380 = "...ฮึก!?\nมะ...เมื่อกี้ฉันทำอะไรไป...!?"
20028-390 = "ชะ...ช่วยลืมไปด้วยนะคะ\nช่วยลืมเรื่องเมื่อกี้ไปให้หมด\nด้วยนะคะ คุณครู!!"
20028-2600 = "ฉัน...ไม่รู้ว่าจะขอบคุณคุณครูยังไงดี...\nไม่สิ ถ้าให้บอกเป็นคำพูด\nคงไม่มีทางพูดออกไปหมดได้แน่ๆ ค่ะ\nความกรุณาที่ได้รับมาในครั้งนี้...\nฉันจะตอบแทนด้วยการกระทำค่ะ คุณครู"

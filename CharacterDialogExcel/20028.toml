[translation]
20028-10 = "블루 아카이브!"
20028-20 = "와, 와카바 히나타라고 합니다!\n열심히 할 테니, 뭐든 말씀해 주세요!"
20028-30 = "여기 인테리어,\n너무 귀여워요…!"
20028-40 = "저기,\n짐 옮기는 거라면,\n언제든지!"
20028-50 = "어라? 이름을\n불린 것 같은 느낌이…."
20028-60 = "편안하고,\n멋진 장소네요."
20028-70 = "선생님은….\n어디에 계실까요……?"
20028-80 = "수, 수고 많으십니다. 선생님."
20028-90 = "그…같이 해변 산책이라도,\n어떠세요?"
20028-100 = "어서 오세요, 선생님."
20028-110 = "오, 오늘도\n사랑과 기쁨이 가득한\n하루가 되길 바랍니다."
20028-120 = "선생님이 하시는 일,\n꼭 도와드릴 수 있게 해주세요!"
20028-130 = "여름 좋아, 하냐구요…?"
20028-140 = "네, 그럼요!\n봄도 가을도 겨울도\n너무 좋아요."
20028-150 = "여름만의 즐거움,\n바다만의 즐거움을,\n소중히 하고 싶습니다."
20028-160 = "음…사실대로 말씀드리자면,\n수영복을 입고 있는 것은…\n조금, 부끄럽습니다."
20028-170 = "수, 수영복이라도\n기도하는 데에는\n전혀 문제 없어요!"
20028-180 = "생일 축하해요, 선생님!"
20028-190 = "내년 이날도, 축하의 말을\n전할 수 있기를 바랍니다."
20028-200 = "아, 제 생일…\n기억해 주셨군요!"
20028-210 = "감사합니다…\n정말 기뻐요."
20028-220 = "새해 복 많이 받으세요, 선생님."
20028-230 = "건강한 한 해가 되시길,\n진심으로 기원합니다."
20028-240 = "성탄제네요!"
20028-250 = "우리 시스터후드에게\n특별한 날이에요."
20028-260 = "…복, 복장은, 관계없으니까요!"
20028-270 = "할로윈이군요!\n모두가 즐거워 보여서,\n저도 기쁘네요!"
20028-290 = "으음…. 으으음…?\n어라…?"
20028-300 = "여기… 생각했던 것\n이상으로 편하네요…."
20028-310 = "적당히 시원하고,\n너무 춥지도 않고…\n얼굴은 그늘에 가려지고…."
20028-320 = "따끈따끈해서…\n누워 있으면,\n잠이 들 것 같아요."
20028-330 = "그런데 그…\n선생님 앞에서 저만,\n누워있는 건…"
20028-340 = "뭐, 뭔가…\n죄송한 것 같은…."
20028-350 = "아, 알겠어요.\n그럼 말씀대로…."
20028-360 = "마음을 놓고…\n편안하게…"
20028-370 = "…흐으응….\n음냐…. 흐헤헤…."
20028-380 = "…헉!?\n저, 저 방금 무슨…!?"
20028-390 = "잊, 잊어주세요,\n지금 건 잊어주세요!\n선생님!!"
20028-2600 = "정말… 뭐라고 감사 드려야 할지….\n아니. 말만으로는\n다 전달할 수 없을 지도요.\n네. 주신 이 은혜….\n꼭 행동으로 보답하겠습니다. 선생님."

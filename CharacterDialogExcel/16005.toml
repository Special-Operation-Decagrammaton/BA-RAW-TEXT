[translation]
16005-10 = "蔚藍檔案-"
16005-20 = "咿嘻嘻……啊，老，老師……！？"
16005-30 = "我，我在這裡，\n真的沒關係嗎……"
16005-40 = "唔，啊唔！？\n老，老師……！？"
16005-50 = "這，這個……\n那個……唔……\n唔啊啊啊啊啊啊！"
16005-60 = "比戰場上，\n還要沒辦法靜下心來……"
16005-70 = "對，對我來說那個，\n這種地方\n有點……！"
16005-80 = "歡，歡迎回來老師！"
16005-90 = "今，今天也，\n請多指教……"
16005-100 = "恭，恭候多時了！\n老師！"
16005-110 = "咿嘻……咿嘻嘻……\n咿嘻嘻嘻嘻！！"
16005-120 = "唔呵呵呵呵"
16005-130 = "咿呀哈哈哈哈！！！\n唔呵呵！！"
16005-140 = "……啊。\n老，老師……？"
16005-150 = "您，您是什麼時候……"
16005-160 = "咦……？\n從剛才開始一直都在……！？\n怎，怎麼會……！！"
16005-170 = "這，這個是……那個……"
16005-180 = "該怎麼說明才好……"
16005-190 = "老，老師的生日……！\n如，如果是我能做到的事，\n請儘管說，老師……！"
16005-200 = "……咦？生日……？\n要，要慶祝我的生日……！？"
16005-210 = "……謝，謝謝您，老師……！"
16005-220 = "今，今年也請多指教，老師……！"
16005-230 = "也，也許是不適合\n這種日子的打扮也說不定……"
16005-240 = "……咦？\n反而還不錯，是嗎……？"
16005-250 = "街道綻放著詭異的光芒，\n很熱鬧……"
16005-260 = "這就是，\n萬聖節……"
16005-280 = "嘰嘻，\n桀哈哈哈哈！"
16005-290 = "啊，對不起……\n謝謝您，老師。"
16005-300 = "能像這樣在海邊玩，\n這還是頭一次。\n雖然很開心，"
16005-310 = "但也比想像中還要耗體力呢……"
16005-320 = "有點累了。"
16005-330 = "……對了老師。\n我突然想起來，"
16005-340 = "這套泳裝一直都，\n有點緊……"
16005-350 = "不知道是不是，\n尺寸不合呢……"
16005-360 = "啊，咦咦……\n您，您怎麼了！？"
16005-370 = "我，我，我又，\n做錯了什麼嗎……！？"
16005-2600 = "唔呵呵呵……這樣就，確實的……\n唔呵呵哈哈哈哈！！！"

[translation]
16005-10 = "Blue Archive"
16005-20 = "คิคิคิ...! อ่า... คะ...คุณครู...?"
16005-30 = "ฉะ...ฉันมาที่นี่\nได้จริงๆ เหรอคะ..."
16005-40 = "อะ...อึ่ก...!?\nคุณครู...!?"
16005-50 = "คะ...คือ...เอ่อ...\nอะ... อ๊าาากกกกกก!"
16005-60 = "คิดแล้วเชียวว่าอยู่ในเขตต่อสู้\nยังสบายใจกว่า..."
16005-70 = "ที่แบบนี้...\nฉะ...ฉัน..."
16005-80 = "มะ... มาแล้วเหรอคะ คุณครู!"
16005-90 = "วะ...วันนี้\nขอรบกวนด้วยนะคะ..."
16005-100 = "ฉะ...ฉันกำลังรออยู่เลยค่ะ\nคุณครู!"
16005-110 = "ฮะฮะ...ฮิฮิฮิ...\nคิกๆๆ ฮิฮิฮิ!!"
16005-120 = "คิกๆ...ฮะฮ่าฮ่าฮ่า!"
16005-130 = "วะฮะฮะฮ่าฮ่า!!\nกรั่กๆๆ...!!"
16005-140 = "...เอ๋?\nคะ...คุณครู..?"
16005-150 = "คะ...คุณครูมาตั้งแต่เมื่อไร..."
16005-160 = "เอ๋...? ถ้างั้นตั้งแต่เมื่อกี้\nคุณครูก็...!?"
16005-170 = "นี่มัน...คือว่า..."
16005-180 = "ฉันไม่รู้จะอธิบายยังไงดี..."
16005-190 = "วะ...วันเกิดงั้นเหรอ...\nมะ...ไม่ว่าเรื่องอะไร\nก็บอกมาได้เลยนะคะคุณครู...!"
16005-200 = "...เอ๋? วันเกิดเหรอ?\nอวยพรวันเกิดเหรอคะ...!?"
16005-210 = "ขะ...ขอบคุณค่ะ... คุณครู"
16005-220 = "ปีนี้ก็ขอฝากตัวด้วยนะคะ\nคุณครู…"
16005-230 = "ฉันคิดว่าชุดนี้\nดูไม่เหมาะกับวันนี้สักเท่าไร..."
16005-240 = "...คะ? ทำแบบนี้ต่อไป\nก็ได้งั้นเหรอคะ...?"
16005-250 = "ถนนก็เริ่มดูเป็นประกาย\nและก็ดูพลุกพล่าน..."
16005-260 = "คือว่า...ฮาโลวีน..."
16005-280 = "คิกๆ...คิกๆๆๆ"
16005-290 = "อ๊ะ... ขอโทษค่ะ\nขอบคุณนะคะ... คุณครู"
16005-300 = "ฉันเพิ่งเคย...\nมาเที่ยวที่ทะเลเป็นครั้งแรก..."
16005-310 = "มันสนุกดีนะคะ\nแต่ว่าการมาเที่ยวทะเล...\nใช้พลังงานมากกว่าที่คิดอีกนะคะ"
16005-320 = "เฮ้อ...\nฉันรู้สึกเหนื่อยนิดหน่อยค่ะ"
16005-330 = "คุณครูคะ...\nจู่ๆ ฉันก็คิดขึ้นมา..."
16005-340 = "ชุดว่ายน้ำนี่...\nมันค่อนข้างอึดอัดนิดหน่อยค่ะ..."
16005-350 = "หรือว่าไซซ์มันไม่พอดี...\nหรือเปล่านะคะ?"
16005-360 = "อะ...เอ๋...\nทำไมมองแบบนั้นล่ะคะ?"
16005-370 = "ฉะ...ฉัน...ฉันเผลอ\nทำอะไรผิดไปอีกรึเปล่าคะ...?!"
16005-2600 = "ฮิฮิฮิฮิ...\nคราวนี้ละก็...\nฮี่ฮี่ฮี่ฮี่ฮี่ฮี่ฮี่....!!!"

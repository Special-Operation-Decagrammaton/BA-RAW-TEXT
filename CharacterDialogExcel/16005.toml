[translation]
16005-10 = "블루 아카이브으-"
16005-20 = "키히히……! 아. ……서, 선생님?"
16005-30 = "저, 정말로 여기 있어도\n괜찮은 걸까……."
16005-40 = "으, 으헉!?\n선생님……!?"
16005-50 = "그, 그게…… 저기……\n으으…… 으아아아-!"
16005-60 = "차라리 싸움터가\n마음 편해……."
16005-70 = "저, 저는……\n이런 장소는 좀……!"
16005-80 = "오, 오셨습니까. 선생님!"
16005-90 = "오, 오늘도\n잘 부탁드립니다……."
16005-100 = "기, 기다리고 있었습니다.\n선생님!"
16005-110 = "크히…… 히히히……\n크히히히히!!"
16005-120 = "키-햐하하하"
16005-130 = "하하하하!!!!\n캬캬캬캬!!"
16005-140 = "……에?\n서, 선생님……?"
16005-150 = "어, 언제부터 거기에……"
16005-160 = "에……?\n아까 전부터 계속……!?\n그, 그럼……!!"
16005-170 = "이, 이건……그러니까……"
16005-180 = "어떻게 설명 드려야 할지……"
16005-190 = "새, 생일이라니……\n뭐, 뭐든지 말씀만\n해주십시오, 선생님……!"
16005-200 = "……에? 생일……?\n제, 제 생일 축하를……!?"
16005-210 = "……가, 감사합니다……선생님."
16005-220 = "올해도 잘 부탁드립니다,\n선생님……."
16005-230 = "뭐, 뭔가 이 날에\n맞는 옷이 아닌 것 같은……"
16005-240 = "……네? 이것대로\n괜찮으시다고요……?"
16005-250 = "거리 전체가 이상하게\n빛나고, 번화하고……"
16005-260 = "이것이, 할로윈……"
16005-280 = "카하하하하하-"
16005-290 = "아, 죄송합니다.\n……감사합니다, 선생님."
16005-300 = "이렇게 바다에서 논 건\n처음이라……."
16005-310 = "즐겁습니다만, 생각보다\n체력이 필요한 일이었군요……."
16005-320 = "……조금 지쳤습니다."
16005-330 = "그러고 보니 선생님,\n갑자기 든 생각인데……."
16005-340 = "이 수영복, 조금 갑갑해서……."
16005-350 = "혹시 사이즈가\n안 맞는 걸까요……."
16005-360 = "어, 어라……\n왜 그러십니까?"
16005-370 = "제, 제, 제가\n또 뭔가 실수를……?!"
16005-2600 = "으흐흐흐…… 이걸로 확실하게…….\n으히히히히히!!!"

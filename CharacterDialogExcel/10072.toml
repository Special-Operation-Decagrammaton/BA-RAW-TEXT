[translation]
10072-10 = "블루 아카이브."
10072-20 = "RABBIT 2, 작전 준비 완료.\n바다에서도 경계 임무는 소홀히 할 수 없지!"
10072-30 = "(역시 실내에서\n이 차림은 조금\n움직이기 불편하네…)"
10072-40 = "(저건… 먹을 수\n있으려나…?)"
10072-50 = "다음 작전에는…\n저런 차림을 하는 것도\n나쁘지 않겠네."
10072-60 = "설마 저건…\n교범으로만 확인했던\n그 무기…?"
10072-70 = "정찰 중 이상 없음."
10072-80 = "어서 와, 선생님.\n마침 총기의 정비를\n하던 중이었어."
10072-90 = "우, 우왓?\n어느 틈에 온 거야?"
10072-100 = "따, 딴짓하고\n있었던 거 아니거든?!"
10072-110 = "오늘도 날씨가 무덥네."
10072-120 = "열사병 대책은\n확실히 하고 있어?"
10072-130 = "탈수는 조심해야 해.\n수분 보충 잘하고."
10072-140 = "그리고, 염분도\n섭취해 두는 게 좋아."
10072-150 = "사실 바다는 그렇게\n좋아하지 않아."
10072-160 = "총기의 기능 고장이\n일어나기 쉬우니까."
10072-170 = "하지만 어떤 환경에서도\n완벽히 대응할 수 있어야\nSRT의 학생이라고 할 수 있겠지."
10072-180 = "바닷가에서는 방수 처리를 한\n전술지도를 사용하고 있어."
10072-190 = "모에는 방수 성능이 있는\nGPS 장비를 쓰라고 했지만…"
10072-200 = "그건 싫어.\n종이 지도에는 종이 지도 만의\n가치가 있는 법이니까!"
10072-210 = "(임무가 아닌 형태로\n다른 대원들과 함께\n바다에 올 수 있었다면\n더 좋았을 텐데…)"
10072-220 = "평소의 철모는\n어디에 두었냐고?"
10072-230 = "이 부니햇이\n지금은 철모 대신이야."
10072-240 = "이래 보여도 방탄 섬유로\n만든 물건이라고…?"
10072-250 = "생일 축하해, 선생님."
10072-260 = "오래 걸리는 일이라면\n내가 대신 해 둘 테니까,\n오늘은 먼저 들어가서\n푹 쉬도록 해."
10072-270 = "생일날 까지 야근을 하면…\n그것도 좀 서글프잖아."
10072-280 = "…생일 선물?\n딱히… 필요는 없는데…"
10072-290 = "혹시 선생님만 괜찮다면…\n같이 저녁이나 먹자."
10072-300 = "메뉴는 편의점 폐기든\n뭐든 상관없으니까."
10072-310 = "새해 복 많이 받아, 선생님.\n올해의 목표…?"
10072-320 = "글쎄… 가능하다면\n1주일에 한 번\n신선한 생선 요리를…"
10072-330 = "아, 아니…\n역시 SRT 특수학원의\n부활이지!"
10072-340 = "아, 선생님.\n저녁에 시간이 남으면\n코우사기 공원에 들려줘."
10072-350 = "크리스마스 기념이라며\n모에가 커다란\n칠면조를 가져왔는데,"
10072-360 = "RABBIT 소대끼리만\n먹기에는 너무 많은 것\n같아서 말이야."
10072-370 = "샬레에서 바비큐를\n하기는 어려울 테니…\n공원에서 같이 파티하자."
10072-380 = "최근에, 호박이 들어간\n편의점 도시락이\n자주 보이는 것 같은데…"
10072-390 = "그렇다는 말은…\n이게 그 말로만 듣던\n할로윈 시즌이라는 건가?"
10072-410 = "(자, 선생님.\n진정하고 이쪽을 봐.)"
10072-420 = "(그래, 천천히.\n천천히 숨을 내쉬는 거야.)"
10072-430 = "(후훗, 역시 선생님이야.\n배우는 속도가 빠르네.)"
10072-440 = "(…뭔가 묘한 기분이네.)"
10072-450 = "(바닷속에서 선생님과 단둘이, \n아무 말 없이 시선과\n손짓만으로 대화를 하려니…)"
10072-460 = "(마치 뭔가…)"
10072-470 = "(…응? 어쩐지 호흡이\n어려워 보인다고?)"
10072-480 = "(아니야, 아무것도\n문제없어. 괜찮아!)"
10072-490 = "(다만 평소와는 다르게…\n호흡이 조금 불안정하네.)"
10072-500 = "(…역시 선생님과 하는\n다이브는 내게는 조금\n일렀을지도 모르겠어.)"
10072-2600 = "RABBIT 26식 기관총, 수령 완료.\n물이 들어가도 고장 나지 않도록\n방수처리도 완벽히 했어.\n물론 전투가 끝나면\n열심히 닦고 기름을 쳐야겠지만…"

[translation]
10072-10 = "Blue Archive"
10072-20 = "RABBIT 2 เตรียมพร้อมปฏิบัติการ\nจะประมาทเรื่องภารกิจเฝ้าระวังทางทะเลไม่ได้เด็ดขาด!"
10072-30 = "(ว่าแล้วเชียวชุดนี้...\nใส่ในอาคารแล้วเคลื่อนไหว\nไม่สะดวกจริงๆ ด้วย...)"
10072-40 = "(อันนั้น...\nกินได้รึเปล่านะ...?)"
10072-50 = "ปฏิบัติการครั้งหน้า...\nใส่ชุดแบบนั้นดูบ้างก็คงไม่แย่..."
10072-60 = "อย่าบอกนะว่า...\nนั่นเป็นอาวุธ...\nที่เคยเห็นในคู่มือน่ะ?"
10072-70 = "อยู่ระหว่างลาดตระเวน\nไม่พบสิ่งผิดปกติ"
10072-80 = "เชิญเลยคุณครู\nฉันกำลังซ่อมบำรุงปืนอยู่เลย"
10072-90 = "วะ...ว้าก?!\nมาตอนไหนเนี่ย?"
10072-100 = "ฉะ...ฉันไม่ได้อู้\nสักหน่อยนะ?!"
10072-110 = "วันนี้ก็ร้อนสุดๆ ไปเลย"
10072-120 = "เตรียมแผนรับมือ\nโรคลมแดดไว้แล้วใช่มั้ย?"
10072-130 = "ระวังอาการขาดน้ำด้วยล่ะ\nเตรียมน้ำดื่มเอาไว้ให้ดี"
10072-140 = "แล้วก็เตรียมเกลือเอาไว้ด้วย\nก็ดีนะ"
10072-150 = "อันที่จริง ฉันไม่ได้\nชอบทะเลขนาดนั้นหรอก"
10072-160 = "มันทำให้ปืนชำรุดได้ง่ายน่ะ"
10072-170 = "แต่ว่าต้องเตรียมพร้อมรับมือ\nให้ได้ในทุกสถานการณ์ ถึงจะเรียก\nได้ว่าเป็นนักเรียนของ SRT นะ"
10072-180 = "ตอนอยู่ในทะเล ฉันใช้แผนที่\nที่เคลือบสารกันน้ำแล้วน่ะ"
10072-190 = "ถึงโมเอะจะบอกว่า\nให้ใช้อุปกรณ์ GPS\nแบบกันน้ำได้ก็เถอะ..."
10072-200 = "แต่ฉันไม่ชอบน่ะ\nแผนที่แบบกระดาษ มันก็\nมีคุณค่าในแบบของมันเอง!"
10072-210 = "(ถ้าได้มาทะเลพร้อมกับคนอื่นๆ\nโดยไม่ต้องมาทำภารกิจแบบนี้\nก็คงดีกว่านี้...)"
10072-220 = "หมวกเหล็กที่ใส่ประจำ\nไปไหนแล้วน่ะเหรอ?"
10072-230 = "ก็ใส่หมวกปีกกว้างนี่\nแทนหมวกเหล็กอยู่ไงล่ะ"
10072-240 = "เห็นแบบนี้ก็เป็นหมวกที่ทำ\nมาจากวัสดุกันระเบิดเลยนะ..."
10072-250 = "สุขสันต์วันเกิดนะ คุณครู"
10072-260 = "ถ้ามีงานอะไรที่ใช้เวลานาน\nเดี๋ยวฉันจะทำให้เอง\nวันนี้คุณครูรีบกลับไปพักผ่อนเถอะ"
10072-270 = "ถ้าต้องทำงานโต้รุ่งในวันเกิดละก็...\nแบบนั้นก็ดูเศร้าเอาเรื่องอยู่นะ"
10072-280 = "...ของขวัญวันเกิด\nอืม... ไม่ได้อยากได้อะไร\nเป็นพิเศษหรอก..."
10072-290 = "แต่ถ้าคุณครูสะดวกละก็...\nไปกินมื้อเย็นด้วยกันนะ"
10072-300 = "จะเป็นเมนูของเหลือจากร้านสะดวกซื้อ\nหรืออะไรก็ได้หมดเลย"
10072-310 = "สวัสดีปีใหม่นะคุณครู\nเป้าหมายของปีนี้น่ะเหรอ...?"
10072-320 = "นั่นสินะ... ถ้าเป็นไปได้\nก็อยากได้ปลาสดๆ\nอาทิตย์ละครั้ง..."
10072-330 = "ปะ...เปล่านะ\nมะ...หมายถึงฟื้นฟู\nสถาบันพิเศษ SRT ต่างหาก!"
10072-340 = "อ๊ะ คุณครู ถ้าตอนเย็นมีเวลา\nแวะมาที่โคะอุซางิ การ์เด้น\nหน่อยนะ"
10072-350 = "โมเอะเอาไก่งวงมา\nฉลองวันคริสต์มาสน่ะ"
10072-360 = "มันตัวใหญ่เกินไป\nแค่สมาชิกกองทหาร RABBIT\nคงกินไม่หมดหรอก"
10072-370 = "จะไปทำบาร์บีคิว\nที่ชาเล่ต์ก็คงไม่ได้...\nมาปาร์ตี้ที่สวนด้วยกันเถอะ"
10072-380 = "ช่วงนี้เหมือนจะเห็นข้าวกล่อง\nที่ใส่ฟักทองในร้านสะดวกซื้อ\nบ่อยๆ นะ..."
10072-390 = "ถ้างั้นหมายความว่า...\nนี่เป็นเทศกาลฮาโลวีน\nที่เคยได้ยินมางั้นเหรอ?"
10072-410 = "(เอาละ คุณครู\nใจเย็นๆ แล้วมองมาทางนี้สิ)"
10072-420 = "(ใช่แล้ว ค่อยๆ...\nค่อยๆ หายใจออกอย่างช้าๆ)"
10072-430 = "(ฮิฮิ... สมกับที่เป็นคุณครูจริงๆ\nเรียนรู้ได้ไวมากเลยนะ)"
10072-440 = "(...รู้สึกแปลกๆ จังแฮะ)"
10072-450 = "(พอมาอยู่ใต้น้ำกับคุณครูสองคน\nโดยไม่พูดอะไร และใช้แค่สายตา\nกับท่าทางสื่อสารกันแบบนี้...)"
10072-460 = "(มันเหมือนกับ...)"
10072-470 = "(หืม...? ฉันเหมือนหายใจ\nไม่ค่อยสะดวกงั้นเหรอ?)"
10072-480 = "(เปล่า!\nไม่มีอะไร ฉันไม่เป็นไร!)"
10072-490 = "(แต่จังหวะการหายใจมันไม่ค่อย\nเสถียรเหมือนตอนปกติเลยแฮะ...)"
10072-500 = "(...ว่าแล้วเชียว การมาดำน้ำ\nกับคุณครูแบบนี้ มันคงจะ\nเร็วเกินไปสำหรับฉันสินะ..)"
10072-2600 = "ได้รับ RABBIT Type 26 Machine Gun\nเรียบร้อยแล้ว เตรียมอุปกรณ์กันน้ำไม่ให้\nเกิดชำรุดตอนลงน้ำไว้เรียบร้อย\nถึงจะต้องเช็ดทำความสะอาด\nตอนที่ต่อสู้เสร็จแล้วก็เถอะ..."

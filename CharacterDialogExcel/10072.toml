[translation]
10072-10 = "蔚藍檔案。"
10072-20 = "RABBIT2，作戰準備完畢。\n就算是在海邊，也不能疏忽警戒任務哦！"
10072-30 = "（果然穿成這樣，\n在室內不太\n方便行動呢…）"
10072-40 = "（那東西…\n真的可以吃嗎…？）"
10072-50 = "下次作戰的時候…\n穿成那個樣子，\n說不定也不錯。"
10072-60 = "那該不會…\n是只有在\n教戰手冊裡看過\n那個武器…？"
10072-70 = "偵察中，沒有異常。"
10072-80 = "你來啦，老師。\n我正好要進行\n槍隻的整備。"
10072-90 = "唔，唔哇！？\n你什麼時候來的？"
10072-100 = "我，我可沒在偷懶哦！？"
10072-110 = "今天也很熱呢。"
10072-120 = "有做好中暑對策嗎？"
10072-130 = "要小心脫水哦，\n記得多補充水分。"
10072-140 = "還有，也要攝取鹽分比較好。"
10072-150 = "其實，我沒有\n那麼喜歡海。"
10072-160 = "因為槍械很容易壞…"
10072-170 = "但是，無論怎麼樣的環境\n都要能完美應對，\n這樣才是SRT的學生。"
10072-180 = "我在海邊會使用\n做過防水處理的\n戰術地圖。"
10072-190 = "雖然萌推薦我用\n有防水功能的GPS裝備…"
10072-200 = "不過我不喜歡。\n紙本有紙本才有的價值啊！"
10072-210 = "（要是能用任務以外\n　的形式跟其他隊員一起\n　來海邊就好了…）"
10072-220 = "你問我平時的鋼盔怎麼了？"
10072-230 = "這頂奔尼帽就是\n用來代替鋼盔的。"
10072-240 = "別看它這樣，它可是\n用防彈素材製成的哦？"
10072-250 = "生日快樂，老師。"
10072-260 = "很花時間的工作，\n我會幫你完成的。\n今天就先回去休息吧。"
10072-270 = "畢竟如果連生日當天\n都要加班…就太可憐了。"
10072-280 = "…生日禮物？\n我其實…也不需要…"
10072-290 = "不過，如果老師願意的話…\n一起去吃晚餐吧。"
10072-300 = "就算是吃便利商店的\n便當或是什麼都行。"
10072-310 = "新年快樂，老師。\n今年的目標…？"
10072-320 = "這個嘛…可以的話，\n希望每週能吃一次\n新鮮的魚料理…"
10072-330 = "啊，不是…\n是SRT特殊學園能復活！"
10072-340 = "啊，老師。\n晚上有時間的話，\n能不能來\n兔寶寶公園一趟？"
10072-350 = "因為是聖誕節，\n萌帶了一隻\n超大的火雞回來。"
10072-360 = "只靠RABBIT小隊\n的話可能吃不完。"
10072-370 = "不過要在夏萊烤肉\n又有點難…\n就在公園開派對吧。"
10072-380 = "感覺最近\n經常看到\n有放南瓜的便利商店便當…"
10072-390 = "難道…\n這就是傳說中的\n萬聖節季？"
10072-410 = "（來，老師，\n　保持冷靜，看我這邊）"
10072-420 = "（沒錯沒錯，慢慢來。\n　慢慢地吐氣）"
10072-430 = "（呵呵，不愧是老師。\n　學的速度真快）"
10072-440 = "（…有股奇妙的感覺）"
10072-450 = "（在海中和老師兩人獨處，\n不發一語，只憑\n視線和手勢對話…）"
10072-460 = "（簡直就像…）"
10072-470 = "（…咦？我看起來\n　有點呼吸困難？）"
10072-480 = "（沒事，完全沒有問題。\n　我不要緊！）"
10072-490 = "（總覺得跟平常不一樣…\n　呼吸不太穩定）"
10072-500 = "（…和老師一起潛水，\n　對我來說\n　可能還太早了啊）"
10072-2600 = "RABBIT26式機關槍，我確實收到了。\n為了避免在水中損壞，\n也做好了完善的防水處理。\n當然，在戰鬥結束之後\n還是得仔細整備才行…"

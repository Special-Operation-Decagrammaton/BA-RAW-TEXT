[translation]
10001-20 = "接下來要做什麼？\n告訴我吧，老師。"
10001-30 = "怎麼回事？\n感覺心裡有點悸動。"
10001-40 = "這是最近的流行呀？"
10001-50 = "哼嗯……"
10001-60 = "在這個地方\n也不能脫衣服嗎……？"
10001-70 = "好美的空間。\n雖然我其實不太懂。"
10001-80 = "老師，\n我等你好久了。"
10001-90 = "…哎呀，老師？\n你什麼時候來的？"
10001-100 = "特異現象搜查部的英美。\n待命中。"
10001-110 = "我常常被人指責\n叫我要看場合再脫衣服。"
10001-120 = "明明就是炎熱時\n幫自己自然調節體溫的行為，\n大家是怎麼了呢？"
10001-130 = "不覺得這裡有點熱嗎？"
10001-140 = "常常聽到有人說我沒有感情，\n但我不太懂那是什麼意思。"
10001-150 = "學校，有辦法\n順利畢業嗎……"
10001-160 = "今天是老師出生的日子嗎？ "
10001-170 = "嗯，\n那就是個幸福的日子呢。"
10001-180 = "因為要是沒有今天，\n我就無法遇見老師了。"
10001-190 = "生日……？\n啊，這麼說來\n確實有那種東西呢。"
10001-200 = "不慶祝也沒關係哦。\n反正也沒什麼意義。"
10001-210 = "嗯？如果還是想\n幫我慶祝的話……\n謝，謝謝你……"
10001-220 = "明明就跟昨天沒什麼不同， \n是個平凡的一天。"
10001-230 = "卻有一種新鮮的感覺，\n不覺得很神奇嗎？"
10001-240 = "嗯。\nHappy New Year。"
10001-250 = "聽說今天是個特別的日子，\n為什麼對情侶來說\n也是個特別的日子呢？"
10001-260 = "告訴我，老師。"
10001-270 = "在萬聖節當天不給糖果的話，\n會遇到怎樣的惡作劇呢…？"
10001-290 = "老師，這件怎麼樣？\n適合我嗎？"
10001-300 = "內衣也是衣服的一種，\n給別人看也沒關係吧。"
10001-310 = "這件內衣，\n對我來說有點小耶…\n沒有更大的尺寸嗎？"
10001-320 = "唔──嗯…不行。\n果然我還是，\n直接穿給你看吧。"
10001-330 = "唔嗯…？\n不能在這裡換？\n可是更衣室很小很不方便耶…"
10001-2600 = "新手也能容易上手的……\n多用途戰術執行工具。"

[translation]
10001-20 = "ฉันควรทำอะไรเหรอ? สอนหน่อยสิคุณครู"
10001-30 = "ความรู้สึกนี้มัน...\nทำไมสั่นหวิวๆ นะ"
10001-40 = "ช่วงนี้เค้าฮิต\nอะไรแบบนี้กันเหรอ?"
10001-50 = "อืม..."
10001-60 = "ถ้าเป็นที่แบบนี้ล่ะก็\nฉันว่าถอดเสื้อผ้าออก...\nก็น่าจะได้นะ?"
10001-70 = "ที่นี่สวยจังเลย\nแต่ฉันไม่รู้อะไรมากหรอก"
10001-80 = "คุณครู\nกำลังรออยู่เลย"
10001-90 = "เอ๊ะ... คุณครูเหรอ?\nมาตั้งแต่เมื่อไหร่น่ะ?"
10001-100 = "เอมิจากชมรมปรากฏการณ์\nลี้ลับ กำลังรอคำสั่งอยู่"
10001-110 = "ฉันโดนดุบ่อยเลยว่าไม่ให้\nเที่ยวถอดเสื้อผ้าไปเรื่อย..."
10001-120 = "แต่มันก็ไม่ผิดไม่ใช่เหรอ\nที่จะต้องปรับตัวตามอุณหภูมิ\nที่ร้อนขึ้น? ทำไมถึงมาดุฉันล่ะ?"
10001-130 = "คุณครูว่าอากาศมันร้อนขึ้นมั้ย?"
10001-140 = "หลายคนบอกว่าฉันดูไร้ความรู้สึก\nแต่ฉันก็ไม่รู้หรอกว่านั่นแปลว่าอะไร"
10001-150 = "จะเรียนจบไปได้ด้วยดีมั้ยนะ..."
10001-160 = "คุณครูเกิดวันนี้เหรอ?"
10001-170 = "อืม... ถ้าอย่างนั้น\nมันก็ต้องเป็นวันแห่งความสุขน่ะสิ"
10001-180 = "เพราะถ้าไม่มีวันนี้\nฉันก็คงไม่ได้พบคุณครู"
10001-190 = "วันเกิดเหรอ?\nจริงด้วย... ฉันลืมเรื่องวันเกิดไปเลย"
10001-200 = "แต่ไม่ต้องอวยพรก็ได้\nมันไม่ใช่เรื่องใหญ่อะไรหรอก"
10001-210 = "หืม? แต่ถ้ามาอวยพรให้แบบนี้...\nขะ... ขอบคุณนะ"
10001-220 = "วันนี้ก็เป็นวันธรรมดาๆ\nไม่ต่างจากเมื่อวานเลย..."
10001-230 = "การได้รู้สึกอะไรใหม่ๆ\nมันดีจังเลยว่ามั้ย?"
10001-240 = "อืม... แฮปปี้นิวเยียร์"
10001-250 = "ว่ากันว่าวันนี้คือวันพิเศษของคู่รัก\nว่าแต่ทำไมมันถึงพิเศษเหรอ?"
10001-260 = "บอกหน่อยสิคุณครู"
10001-270 = "ถ้าไม่ให้ลูกกวาดฮาโลวีน\nจะโดนแกล้งอะไรนะ...?"
10001-290 = "คุณครู ชุดนี้เป็นยังไงบ้าง\nเหมาะกับฉันรึเปล่า?"
10001-300 = "ชุดชั้นในก็เป็นเสื้อผ้าเหมือนกันนี่\nทำไมถึงใส่ให้คนอื่นดูไม่ได้กันล่ะ..."
10001-310 = "เสื้อชั้นในตัวนี้\nคงจะเล็กไปหน่อยสำหรับฉัน...\nมีไซซ์ใหญ่กว่านี้มั้ยนะ"
10001-320 = "อืม... ไม่ดีกว่า\nฉันจะลองเปลี่ยน\nให้คุณครูดูก่อนดีกว่า"
10001-330 = "ว่าไงนะ...?\nเปลี่ยนตรงนี้ไม่ได้เหรอ?\nก็ห้องเปลี่ยนชุดมันแคบไปนี่นา"
10001-2600 = "อุปกรณ์ทางยุทธวิธีที่หลากหลาย...\nที่มือใหม่ก็ใช้ได้ง่าย..."

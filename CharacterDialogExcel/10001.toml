[translation]
10001-20 = "What do I need to do? Teach me, Sensei."
10001-30 = "I've started to feel excited for some reason. I wonder why."
10001-40 = "Is this what's popular in the world today?"
10001-50 = "Hmm..."
10001-60 = "Would it be okay to undress in a place like this?"
10001-70 = "What a beautiful place. Or so I assume. I don't have an eye for it."
10001-80 = "I've been waiting for you, Sensei."
10001-90 = "...Huh? Sensei? When did you get here?"
10001-100 = "Eimi of the Super Phenomenon Task Force. Standing by."
10001-110 = "I've been instructed several times to be mindful of where I take off my clothing."
10001-120 = "It's only logical to undress in order to regulate one's body temperature when overheating. I do not understand why people react so strangely."
10001-130 = "Isn't it kind of hot in here?"
10001-140 = "I often hear that I lack emotion, but I don't really understand what that means."
10001-150 = "It won't affect my graduation, will it...?"
10001-160 = "Today marks the anniversary of when you were born, Sensei?"
10001-170 = "I see. That makes it a joyous occasion."
10001-180 = "You and I would have never met if not for that day."
10001-190 = "Birthday...? Oh, right. I forgot that I had one."
10001-200 = "You don't have to congratulate me. It's not something I celebrate."
10001-210 = "Huh? If you insist... Th-Thanks."
10001-220 = "Today is no different from any other day."
10001-230 = "But it feels special anyway. Isn't that strange?"
10001-240 = "Yes. Happy New Year."
10001-250 = "I heard that today is a special day, but what would make it special for lovers?"
10001-260 = "Illuminate me, Sensei."
10001-270 = "How severe will the \"trick\" consequence be if I don't give out treats on Halloween?"
10001-290 = "Sensei, what about this one? Does this suit me?"
10001-300 = "Underwear is just a type of clothing. I don't see why you can't show other people."
10001-310 = "This underwear looks a bit small... I wonder if there's a bigger size."
10001-320 = "Ah... This won't do. I'm just going to try it on, and then we can see how it looks."
10001-330 = "Wait, I can't change here? Ugh... Fitting rooms are always so cramped..."
10001-2600 = "A multipurpose tactical tool... It's easy to use, even for beginners."

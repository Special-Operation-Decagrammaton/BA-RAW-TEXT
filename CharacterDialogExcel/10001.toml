[translation]
10001-20 = "지금부터 무얼 하면 되지? 가르쳐 줘, 선생님."
10001-30 = "어째서일까.\n왠지, 설레기 시작했어."
10001-40 = "요즘은 이런 게\n유행하는 걸까."
10001-50 = "흐음…"
10001-60 = "이곳에서라면\n옷을 벗어도…안 되나?"
10001-70 = "아름다운 공간이네.\n사실 잘 모르겠지만."
10001-80 = "선생님.\n기다리고 있었어."
10001-90 = "…어라, 선생님?\n언제 온거야?"
10001-100 = "초현상 특무부의 에이미.\n대기 중."
10001-110 = "아무 데서나 벗지 말라고\n지적을 많이 받았어."
10001-120 = "더우면 체온조절을 하는 것이\n자연스러운 행동인데\n왜 다들 저러는 걸까."
10001-130 = "여기 조금 덥지 않아?"
10001-140 = "감정이 없다는 얘기는 자주 듣지만\n그게 무슨 의미인지는 잘 몰라."
10001-150 = "학교, 무사히 졸업할 수 있을까…"
10001-160 = "오늘이 선생님이 태어난 날이야?"
10001-170 = "응.\n그렇다면 행복한 날이네."
10001-180 = "오늘이 없었으면 선생님을\n만나지도 못했을 테니까."
10001-190 = "생일…?\n아, 그러고 보니 그런 게 있었지."
10001-200 = "딱히 축하해주지 않아도 돼.\n큰 의미는 없으니까."
10001-210 = "응? 그래도 축하해주면…\n고, 고마워…"
10001-220 = "어제와 다르지 않은,\n그냥 평범한 하루인데…"
10001-230 = "새로운 기분이 드는 것은\n신기한 일이지?"
10001-240 = "응. 해피 뉴 이어."
10001-250 = "오늘은 특별한\n날이라고 들었는데,\n어째서 연인들에게도\n특별한 날인거야?"
10001-260 = "가르쳐 줘, 선생님."
10001-270 = "할로윈에 사탕을 주지 않으면\n어떤 장난을 당하는 걸까…?"
10001-290 = "선생님, 이 옷은 어때?\n잘 어울려?"
10001-300 = "속옷도 옷의 일종이니\n남에게 보여주어도\n상관없지 않을까."
10001-310 = "이 속옷은 나에게는\n조금 작을 것 같은데…\n더 큰 사이즈는 없으려나."
10001-320 = "음… 안 되겠다.\n역시 갈아입고 직접 입은\n모습을 보여줄게."
10001-330 = "응…?\n여기서 갈아입으면 안 돼?\n탈의실은 좁아서 귀찮은데…"
10001-2600 = "초보자도 쓰기 쉬운…\n다목적 전술시행 도구."

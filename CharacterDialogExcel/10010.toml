[translation]
10010-20 = "아비도스 대책위원회 2학년\n스나오오카미 시로코야. 잘 부탁해."
10010-30 = "음… 제법 넓은 곳이네.\n적당히 운동하기에\n충분하겠어."
10010-40 = "음…"
10010-50 = "다음 라이딩은\n어디로 가지?"
10010-60 = "선생님은 방과 후엔\n무슨 일을 할까…?"
10010-70 = "그러고 보니\n총기 점검 시간이네."
10010-80 = "시킬 일이 있다면\n뭐든 말해줘."
10010-90 = "어서 와. 선생님.\n오늘도 잘 부탁해."
10010-100 = "선생님을 돕기 위해\n여기 있는 거니까."
10010-110 = "(왜 이렇게 빤히\n쳐다보는 걸까.)"
10010-120 = "…저기, 내 얼굴에\n뭐라도 묻었어?"
10010-130 = "그냥 보고싶어서라고?\n…그, 그렇군."
10010-140 = "이렇게 함께 있는 것도\n나쁘지 않아."
10010-150 = "생일 축하해. 선생님.\n기념으로 같이 조깅이라도\n하지 않을래?"
10010-160 = "…싫다고?"
10010-170 = "내 생일…\n기억하고 있을 줄은\n몰랐어."
10010-180 = "아니, 당연히 기뻐.\n응. 진심이야."
10010-190 = "새해 복 많이 받아. 선생님.\n올해도 잘 부탁해."
10010-200 = "메리 크리스마스.\n오늘은 특별한 날이라고해."
10010-210 = "어떻게 특별한지는\n배우지 못했지만…"
10010-220 = "가르쳐주지 않을래,\n선생님?"
10010-230 = "… 할로윈.\n특별한 기억은 없어.\n도시는 늘 조용했으니까."
10010-240 = "응.\n떠들썩한 도시를\n볼 수 있었으면 좋겠네."
10010-260 = "뭔가 시킬 거라도 있어?"
10010-270 = "(무슨 생각을\n하는지 궁금해.)"
10010-280 = "(이제 뭘 하려는 걸까…?)"
10010-290 = "선생님을 돕기 위해\n여기 있는 거니까."
10010-300 = "그, 그렇게 쓰다듬으면…\n딱히 곤란하진 않지만…"
10010-2600 = "나는 이제 조금 더 강해진 거겠지?\n음. 이걸로 모두의 힘이 될 수 있다면"

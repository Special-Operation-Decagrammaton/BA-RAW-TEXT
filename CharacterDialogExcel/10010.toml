[translation]
10010-20 = "ฉันคือสึนาโอกามิ ชิโรโกะ\nคณะกรรมการแผนงานชั้นปีที่ 2 โรงเรียนอะบิดอส ฝากตัวด้วยนะ"
10010-30 = "ที่นี่กว้างจัง...\nเหมาะกับการใช้\nออกกำลังกายเลยแฮะ"
10010-40 = "อืม..."
10010-50 = "จุดหมายต่อไป\nคือที่ไหนนะ?"
10010-60 = "หลังเลิกเรียน\nคุณครูจะทำอะไรนะ?"
10010-70 = "จะว่าไป\nนี่มันเวลาตรวจสภาพปืนนี่นา"
10010-80 = "ถ้ามีอะไรให้ช่วยก็บอกได้นะ"
10010-90 = "มาแล้วเหรอ? คุณครู\nวันนี้ก็ฝากตัวด้วยนะ"
10010-100 = "ฉันมาที่นี่\nเพื่อช่วยเหลือคุณครู..."
10010-110 = "(ทำไมถึงเอาแต่จ้องแบบนี้ล่ะ?)"
10010-120 = "คือว่า... หน้าฉัน...\nมีอะไรติดอยู่งั้นเหรอ?"
10010-130 = "แค่อยากมองเฉยๆ งั้นเหรอ?\nกะ.. ก็ได้"
10010-140 = "การได้อยู่ด้วยกันแบบนี้\nมันก็ไม่ได้แย่เท่าไหร่"
10010-150 = "สุขสันต์วันเกิดนะคุณครู\nเราออกไปวิ่งฉลองวันเกิด\nด้วยกันไหม?"
10010-160 = "ไม่อยากไปเหรอ...?"
10010-170 = "ไม่นึกเลยว่าคุณครู...\nจะจำวันเกิดของฉันได้"
10010-180 = "ไม่หรอก ต้องดีใจอยู่แล้ว\nฉันพูดจริงๆ นะ"
10010-190 = "สวัสดีปีใหม่\nปีนี้ก็ฝากตัวด้วยนะ"
10010-200 = "เมอร์รีคริสต์มาส\nว่ากันว่าวันนี้คือวันพิเศษล่ะ"
10010-210 = "แต่ฉันไม่รู้หรอกนะ\nว่ามันพิเศษยังไง..."
10010-220 = "คุณครูพอจะบอกหน่อยได้ไหม\nว่ามันพิเศษยังไง?"
10010-230 = "อืม... วันฮาโลวีน...\nฉันไม่มีความทรงจำพิเศษอะไร\nเพราะเมืองก็ยังคงเงียบอยู่ทุกวัน"
10010-240 = "เฮ้อ..\nอยากออกไปเห็น\nเมืองที่มีเสียงเอะอะบ้างจัง"
10010-260 = "มีงานอะไรจะให้ทำรึเปล่า?"
10010-270 = "(สงสัยจังว่าคิดอะไรอยู่)"
10010-280 = "(ตอนนี้คิดจะทำอะไรน่ะ...?)"
10010-290 = "ฉันมาที่นี่\nเพื่อช่วยเหลือคุณครู..."
10010-300 = "ถะ... ถ้าเอามือลูบแบบนั้นล่ะก็...\nที่จริงฉันก็ไม่ได้รู้สึกแย่อะไรหรอก..."
10010-2600 = "ตอนนี้ฉันแข็งแรงขึ้นกว่าเดิมบ้างแล้วนะ?\nอืม... ถ้าเป็นกำลังให้กับทุกคนได้ละก็..."

[translation]
10010-20 = "阿拜多斯對策委員會2年級生。\n砂狼白子。請多指教。"
10010-30 = "嘿…\n是還蠻寬敞的地方呢。\n以做適度的運動來說足夠了。"
10010-40 = "呼呣…"
10010-50 = "下次的騎行\n要去哪裡呢？"
10010-60 = "老師放學後\n在做什麼工作呢…？"
10010-70 = "話說回來\n到檢查槍械的時間了呢。"
10010-80 = "如果有想要我做的事\n儘管說。"
10010-90 = "歡迎你，老師。\n今天也多請指教。"
10010-100 = "我是為了幫忙老師\n才會在這裡唷。"
10010-110 = "（為什麼要那樣盯著我看呢？）"
10010-120 = "…那個，我的臉上\n有沾到什麼嗎？"
10010-130 = "咦，只是想看我的臉？\n…是，是嗎。"
10010-140 = "像這樣在一起\n也不錯呢。"
10010-150 = "生日快樂，老師。\n作為紀念要一起慢跑嗎？"
10010-160 = "…不要嗎？"
10010-170 = "我的生日…\n沒想到會被記得。"
10010-180 = "不，當然很高興。\n嗯。是真的唷。"
10010-190 = "新年快樂，老師。\n今年也請多指教。"
10010-200 = "聖誕快樂。\n聽說今天是特別的日子。"
10010-210 = "雖然不知道\n有什麼特別的…"
10010-220 = "老師，可以告訴我嗎？"
10010-230 = "…萬聖節。\n沒有特別的記憶。\n因為都市總是很安靜。"
10010-240 = "嗯。\n可以看到熱鬧的都市\n就好了呢。"
10010-260 = "有什麼要我做的事嗎？"
10010-270 = "（老師在想什麼，令人好在意）"
10010-280 = "（接下來\n打算做什麼呢…？）"
10010-290 = "我是為了幫忙老師\n才會在這裡的。"
10010-300 = "就，就算被這樣摸…\n也沒有什麼困擾的…"
10010-2600 = "我也有變得稍微比較強了嗎？\n嗯，這樣的話就能成為大家的力量。"

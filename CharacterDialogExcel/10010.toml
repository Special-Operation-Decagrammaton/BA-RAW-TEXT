[translation]
10010-20 = "Second-year of Abydos' Foreclosure Task Force, Sunaookami Shiroko. Hello."
10010-30 = "Hmm... This place is spacious. I could get a decent workout in here."
10010-40 = "Hmm."
10010-50 = "What ride should I go on next?"
10010-60 = "I've always wondered what you do here, Sensei."
10010-70 = "That reminds me: my gun could use a cleaning."
10010-80 = "If there's something you need done, you can always let me know."
10010-90 = "Welcome, Sensei. It's good to see you again."
10010-100 = "I'm here to help, Sensei."
10010-110 = "(Why is Sensei staring at me like that?)"
10010-120 = "...Hey, is there something on my face?"
10010-130 = "You just felt like staring...? I-I see."
10010-140 = "Being together like this isn't so bad."
10010-150 = "Happy birthday, Sensei. Why not celebrate by going on a jog together?"
10010-160 = "...Is that a no?"
10010-170 = "I didn't think you'd remember my birthday."
10010-180 = "No, of course I'm glad. I mean it."
10010-190 = "Happy New Year, Sensei. I'll be counting on you this year too."
10010-200 = "Merry Christmas. I've heard that today is a special day."
10010-210 = "Though, I don't know why it's special..."
10010-220 = "Will you teach me, Sensei?"
10010-230 = "Halloween. I've never experienced it due to how desolate our district is."
10010-240 = "Yeah. I don't mind being in a vibrant city for a change."
10010-260 = "Is there something you want to talk to me about?"
10010-270 = "(What could Sensei be thinking? I wish I knew.)"
10010-280 = "(What could they be up to?)"
10010-290 = "I just want to be clear that I'm your ally, Sensei."
10010-300 = "When you...pat me on the head like that... No, it doesn't bother me or anything."
10010-2600 = "I'm a little stronger now, right? Well, as long as it becomes a source of strength for everyone."

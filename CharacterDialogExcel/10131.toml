[translation]
10131-10 = "Blue Archive ค่ะ"
10131-20 = "สุภาพนอบน้อม แต่ก็มุ่งมั่นทำอย่างต่อเนื่อง\nมิโยชิ ทาคาเนะจากชมรมสื่อสิ่งพิมพ์\nของสถาบันสหภาพเรดวินเทอร์ค่ะ ขอฝากตัวด้วยนะคะ"
10131-30 = "สถานที่นี้\nบรรยากาศดี\nจังเลยนะคะ"
10131-40 = "ที่นี่มี Wi-Fi หรือเปล่าคะ?\nฉันต้องอัปโหลด\nบทวิจารณ์ด้วยสิ..."
10131-50 = "คุยไปด้วยดื่มชาไปด้วย\nดีเลยค่ะ ดีจริงๆ นะคะ"
10131-60 = "(จะวิจารณ์พื้นที่นี้\nยังไงดีนะ...)"
10131-70 = "สะดวกให้ถ่ายรูป\nหรือเปล่านะ...?"
10131-80 = "สุขสบายดีหรือเปล่าคะ คุณครู?\nวันนี้เป็นวันที่ดีจังเลยนะคะ"
10131-90 = "ก็ฉันได้มาเจอ\nคุณครูแบบนี้นี่คะ"
10131-100 = "ฉันดีใจที่\nได้มาพบคุณครูค่ะ"
10131-110 = "ตายจริง\nฉันพูดจริงจังไปหน่อยหรือเปล่าคะ?"
10131-120 = "อะ... อืม... ถ้างั้น..."
10131-130 = "สวัสดีค่ะ คุณครู!"
10131-140 = "ที่เรดวินเทอร์\nเราจะเล่นปาหิมะกันบ่อยๆ ค่ะ"
10131-150 = "แต่ก็มีข้อปฏิบัติอยู่อย่างหนึ่ง\nเราจะใส่หินไว้ในก้อนหิมะค่ะ!"
10131-160 = "ถ้าโดนของแบบนั้นเข้า\nก็คงเจ็บมากใช่มั้ยล่ะคะ...?"
10131-170 = "คะ? อยากให้ฉัน 'หัวเราะแบบนั้น'\nให้ฟังเหรอคะ...?\nทะ... ทำไมล่ะคะ?! แต่ว่าฉัน..."
10131-180 = "อะ... อึก...\nเข้าใจ... แล้วค่ะ\nถ้าอยากฟังละก็..."
10131-190 = "โอโฮะโฮะโฮะโฮะ!"
10131-200 = "จากนี้ไป...\nฉันจะไม่ทำแล้วค่ะ...!"
10131-210 = "ไม่ทราบว่าคุณครูชอบ\nไอซ์ฮอกกี้มั้ยคะ?\nฉันชอบค่ะ!"
10131-220 = "ทีมเวิร์กของ 6 คน\nรองเท้าสเก็ต ไม้ฮอกกี้..."
10131-230 = "ใช้ตัวเข้าปะทะ เอาไหล่กระแทก\nการต่อสู้ที่ดุเดือด...!"
10131-240 = "และผลลัพธ์ที่เหลือเชื่อ\nกับการปฏิวัติของผู้ชม\nจากการแข่ง!"
10131-250 = "อ๊ะ...?\nส่วนสุดท้าย\nเอาเป็นว่าไม่ได้ยิน..."
10131-260 = "การวิจารณ์คือการถ่ายทอด\nช่วงเวลาหนึ่งของเรื่องราว\nกับความรู้สึกของเราต่อเรื่องนั้นค่ะ"
10131-270 = "ในแง่นั้น ก็น่าจะคล้าย\nกับการถ่ายรูปนะคะ"
10131-280 = "ฮุฮุ\nที่ฉันจะบอกก็คือ... เอ่อ"
10131-290 = "ขอให้ฉันถ่ายรูป\nคุณครูได้มั้ยคะ?"
10131-300 = "บางทีก็มีคนเรียกฉันว่า\nคุณหนูผู้สูงศักดิ์..."
10131-310 = "ถึงจะเข้าใจผิด\nก็ควรเอาแต่พอดีสิคะ"
10131-320 = "ฉันคือมิโยชิ ทาคาเนะ\nไม่ได้มากหรือน้อย\nไปกว่านั้นเลยค่ะ!"
10131-330 = "คะ...? 'เข้าใจแล้ว\nท่านหญิงแห่งอาณาจักรหิมะ'\nงั้นเหรอคะ?"
10131-340 = "คุณ ครู!!!"
10131-350 = "คะ? วันนี้เหรอคะ?\nมีอะไรเหรอคะ?"
10131-360 = "ก็แค่ 1 ใน 365 วัน\nที่ผ่านไปอย่างนับไม่ถ้วนเองค่ะ"
10131-370 = "ฮุฮุ ฉันล้อเล่นค่ะ คุณครู"
10131-380 = "สุขสันต์วันเกิดค่ะ"
10131-390 = "ถ้างั้นจากนี้ไป\nให้ฉันคุยเกี่ยวกับ\nคุณครูกับวันเกิดของคุณครู"
10131-400 = "ตามความประทับใจ\nของฉันดีมั้ยคะ?"
10131-410 = "คะ? วันนี้เหรอคะ?"
10131-420 = "1 ใน 365 วัน\nที่ผ่านไปอย่างนับไม่ถ้วนสินะคะ"
10131-430 = "ค่ะ...\nใช่... ค่ะ..."
10131-440 = "อึกกก..."
10131-450 = "จะ... จริงๆ เลยเชียว!\nแกล้งกันแรงเลยนะคะ!"
10131-460 = "คิดว่าลืมวันเกิดของฉัน\nจริงๆ แล้วนะคะ!"
10131-470 = "ฉันจะให้รับผิดชอบ\nอย่างถึงที่สุดเลยค่ะ"
10131-480 = "สวัสดีปีใหม่ค่ะ\nคุณครู"
10131-490 = "ปีนี้ก็ขอฝากตัวด้วยนะคะ"
10131-500 = "เช่นเดียวกับการที่ประโยคแรก\nของเรื่องเป็นสิ่งสำคัญ\nทั้งปีนี้จะเป็นยังไง"
10131-510 = "ก็ขึ้นอยู่กับการใช้เวลา\nในช่วงปีใหม่ค่ะ"
10131-520 = "เพราะงั้นจะ\nลองทานส้มดูมั้ยคะ?"
10131-530 = "ปีใหม่ในเรดวินเทอร์\nจะขาดส้มบนโต๊ะโคทัตสึ\nไม่ได้เลยค่ะ"
10131-540 = "คริสต์มาส..."
10131-550 = "เรื่องราวของซานตาคลอส\nถูกส่งต่อมาจากหลายแหล่งเลยค่ะ"
10131-560 = "ในเรดวินเทอร์\nมีคู่หูของซานตาคลอส\nที่ชื่อว่า 'คุณหนูหิมะ' ด้วยนะคะ"
10131-570 = "ใช่ค่ะ เป็นคู่หูที่\nต่างจากกวางเรนเดียร์..."
10131-580 = "เพราะงั้นวันนี้\nฉันจะเป็นคุณหนูหิมะ\nของคุณครูให้เองค่ะ"
10131-590 = "ถ้านึกถึงที่มา\nของวันฮาโลวีน..."
10131-600 = "ในบางความหมายแล้ว\nวันฮาโลวีนอาจจะ"
10131-610 = "เป็นวันแห่งแรงบันดาลใจ\nสำหรับผู้สร้างสรรค์ก็ได้นะคะ"
10131-620 = "แต่นอกเหนือจากเรื่องนั้นแล้ว"
10131-630 = "ถึงจะให้ลูกกวาดฉัน\nฉันก็จะแกล้งอยู่ดีค่ะ"
10131-640 = "เดี๋ยวเหอะ!"
10131-660 = "ดูสิคะ คุณครู\nแสงเหนือค่ะ"
10131-670 = "ในเรื่องราวเก่าแก่บอกว่า\nนี่คือการเต้นรำอย่าง\nเพลิดเพลินในงานเลี้ยง"
10131-680 = "ของเหล่าผู้พิทักษ์ท้องฟ้า\nที่องอาจและแกร่งกล้าค่ะ"
10131-690 = "คนที่คิดว่า\nจะอยู่ด้วยกันไปตลอด"
10131-700 = "ตอนนี้\nกลับไม่ได้เจอกันแล้ว"
10131-710 = "ส่วนโลกก็เอาแต่หนาวเหน็บ\nอย่างที่เป็นมาตลอด"
10131-720 = "แต่ถึงยังไง การที่ฉัน\nมองดูแสงเหนือ\nและมีความหวังขึ้นมาได้..."
10131-730 = "คงเป็นเพราะ\nฉันมี 'ผู้ร่วมทาง'"
10131-740 = "ที่จะอยู่กับฉันตรงนี้\nไปจนสุดทางน่ะค่ะ"
10131-750 = "ฮุฮุ ค่ะ ตอนนี้พล็อต\nเป็นแบบนั้นค่ะ 'คุณครู'"
10131-760 = "รบกวน\nถ่ายรูปให้สวยๆ นะคะ"
10131-2600 = "เคยได้ยินมั้ยคะ ที่บอกว่า\nปากกาทรงพลังกว่าปืนน่ะค่ะ\nค่ะ ใช่แล้วค่ะ ฮุฮุ... มา 'สนทนา'\nอย่างลึกซึ้งกับคนที่... ส่งความเห็น\nที่ไม่รักษาน้ำใจต่อบทวิจารณ์ของฉันกันเถอะค่ะ"

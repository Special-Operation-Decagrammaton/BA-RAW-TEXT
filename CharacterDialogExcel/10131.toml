[translation]
10131-10 = "블루 아카이브, 이어요."
10131-20 = "예의를 잊지 않고, 그러면서도 꾸준하게.\n붉은겨울 연방학원 출판부의\n미요시 타카네입니다. 잘 부탁드려요."
10131-30 = "이 장소,\n좋은 분위기네요."
10131-40 = "와이파이가 잘\n되려나요?\n평론을 업로드\n해야 하는데……"
10131-50 = "차와 함께하는\n이야기, 좋죠. \n정말로요."
10131-60 = "(이 공간을 어떻게\n평론해 볼까……)"
10131-70 = "사진 촬영, \n괜찮으려나요……?"
10131-80 = "평안하셨는지요, 선생님.\n오늘은 좋은 날이네요."
10131-90 = "이렇게,\n선생님과 만났으니까요."
10131-100 = "만나 뵐 수 있어서\n기쁘답니다. 선생님."
10131-110 = "어머나,\n조금 딱딱했을까요?"
10131-120 = "으, 으음. 그렇다면……"
10131-130 = "안녕하세요, 선생님!"
10131-140 = "붉은겨울에서는\n자주 눈싸움을 하곤 하죠."
10131-150 = "거의 유일한 금기가 있다면, \n눈뭉치 안에\n돌멩이를 넣는 거예요!"
10131-160 = "그런 거,\n맞으면 너무 아프잖아요……?"
10131-170 = "네? '그 웃음소리'를\n들려주었으면 한다고요……?\n어, 어째서요?!\n그렇지만 저는……"
10131-180 = "으, 으으……\n알겠, 어요.\n정 그러시다면……"
10131-190 = "오–호호호호!"
10131-200 = "……이제\n안 할 거니까요……!"
10131-210 = "혹시 아이스하키,\n좋아하세요?\n저는 좋아해요!"
10131-220 = "여섯 명의 팀웍,\n스케이트, 스틱……"
10131-230 = "바디 체킹, 숄더 태클,\n와일드 파이트……!"
10131-240 = "그리고 납득 안 되는 결과와\n그로 인한 관객의\n쿠데타까지!"
10131-250 = "앗…… \n마지막은\n못 들은 것으로……"
10131-260 = "평론은 이야기의 어떤 순간과\n그 감상을 나만의 문장으로\n남기는 행위죠."
10131-270 = "그런 의미에서는, 사진과\n비슷할지도 모르겠어요."
10131-280 = "후후,\n그러니까요…… 저기."
10131-290 = "선생님의 사진을,\n찍게 해주실 수 있을까요?"
10131-300 = "가끔 저를\n귀한 집 아가씨라고\n하는 분도 계시는데……"
10131-310 = "착각에도 정도가 있죠."
10131-320 = "저는 미요시 타카네이고,\n그 이상도 이하도\n아니라구요!"
10131-330 = "네……?\n'알겠습니다.\n겨울왕국의 공녀님.'\n이라고요?"
10131-340 = "선–생–님–!!!"
10131-350 = "네? 오늘이요?\n뭔가 있었나요?"
10131-360 = "무수히 지나가는,\n365일 중 하루인데요."
10131-370 = "후후. 농담이에요, 선생님."
10131-380 = "생일, 축하드립니다."
10131-390 = "그러면 지금부터,\n선생님과\n선생님의 생일에 대해"
10131-400 = "저 나름의 감상을\n이야기해 보도록 할까요?"
10131-410 = "네? 오늘이요?"
10131-420 = "무수히 지나가는,\n365일 중 하루죠."
10131-430 = "네……\n그렇, 죠……"
10131-440 = "우우우우우……"
10131-450 = "저, 정말!\n장난이 심하시네요!"
10131-460 = "제 생일, 진짜로\n잊어버리신 줄 알았잖아요!"
10131-470 = "그 책임,\n확실하게\n받아낼 테니까요?"
10131-480 = "새해 복 많이 받으세요,\n선생님."
10131-490 = "올해도\n잘 부탁드립니다."
10131-500 = "이야기의 첫 문장이\n중요한 것처럼, 설날을\n어떻게 보내는지에 따라서,"
10131-510 = "그 한 해가\n결정되기 마련이죠."
10131-520 = "그래서 말인데요.\n귤 드실래요?"
10131-530 = "붉은겨울의 설날에는,\n코타츠에 귤이 정석이니까요."
10131-540 = "크리스마스……"
10131-550 = "산타클로스의 이야기는\n여러 곳에서 내려오고 있죠."
10131-560 = "붉은겨울에서는,\n'눈 아가씨'라는\n산타클로스의\n파트너가 있답니다."
10131-570 = "네, 순록과는\n다른 파트너……"
10131-580 = "그러니까 오늘은,\n제가 선생님의 눈 아가씨가\n되어 드릴게요."
10131-590 = "할로윈의\n유래를 생각하면……"
10131-600 = "어떤 의미로는\n할로윈이야말로,"
10131-610 = "창작자들에게 영감을 주는\n날일지도 모르겠네요."
10131-620 = "그런 것과는 별개로,"
10131-630 = "저는 사탕을 주셔도\n장난을 칠 거지만요?"
10131-640 = "에잇!"
10131-660 = "보세요.\n오로라예요."
10131-670 = "예전 이야기에서는,\n하늘을 지키는 멋지고\n강한 분들이."
10131-680 = "연회를 즐기며\n춤을 추는 모습이라고 했죠."
10131-690 = "늘 같이 있을 것이라고\n생각했던 분들과는"
10131-700 = "이제,\n만날 수 없게 되었고."
10131-710 = "세상은 언제나처럼,\n가도 가도 추울 뿐이겠지만."
10131-720 = "그럼에도 제가 오로라를\n올려다보며\n희망을 갖는 것은……."
10131-730 = "이 자리에 저와 마지막까지\n함께해 주실."
10131-740 = "'동반자'께서 계시기\n때문이겠지요."
10131-750 = "후훗. 네.\n지금은 그런\n설정이랍니다. '선생님'."
10131-760 = "사진,\n잘 부탁드릴게요?"
10131-2600 = "펜은 총보다 강하다, 라는 말을\n아시나요? 네, 맞아요. 후훗……\n제 평론에 무심한 말을 보낸 분들과……\n사려 깊은…… '대화'를\n나누어 보도록 하죠."

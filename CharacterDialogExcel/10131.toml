[translation]
10131-10 = "Blue Archive."
10131-20 = "Be polite, but be persistent. I'm Miyoshi Takane from Red Winter Federal Academy's Publishing Department. Nice to meet you."
10131-30 = "This place possesses a charming atmosphere."
10131-40 = "Is the Wi-Fi good here? I must upload my critique..."
10131-50 = "Sharing stories over tea. How quaint. Truly."
10131-60 = "(How should I review this place...?)"
10131-70 = "Is photography permitted...?"
10131-80 = "How have you been, Sensei? Today is an exquisite day."
10131-90 = "Because I was able to meet you like this."
10131-100 = "I'm quite delighted to make your acquaintance, Sensei."
10131-110 = "Oh my, was I a touch too formal?"
10131-120 = "M-Mmm. In that case..."
10131-130 = "Hello, Sensei!"
10131-140 = "We frequently have snowball fights in Red Winter."
10131-150 = "If there's one forbidden rule, it's hiding a rock in the snowball!"
10131-160 = "Something like that would hurt a lot, you know...?"
10131-170 = "What? You want to hear \"that laugh\"...? Wh-Why?! But I..."
10131-180 = "U-Ugh... Okay. If you insist..."
10131-190 = "O-Ohohohoho!"
10131-200 = "...I'm not doing that again...!"
10131-210 = "Do you like ice hockey? I love it!"
10131-220 = "Six players working as a team, the skates, the sticks..."
10131-230 = "Body checks, shoulder tackles, wild brawls...!"
10131-240 = "And even results that make no sense and the ensuing revolt from the crowd!"
10131-250 = "Ah... Forget about the last part..."
10131-260 = "Critique is the act of capturing a moment and using your own words to share your impressions."
10131-270 = "I suppose it's similar to photography in that sense."
10131-280 = "Fufu, So... Um."
10131-290 = "Will you allow me to take a photo of you, Sensei?"
10131-300 = "Some people think I'm a lady born from nobility..."
10131-310 = "There must be limits to their delusions."
10131-320 = "I am Miyoshi Takane, no more, no less!"
10131-330 = "What...? Oh. \"Princess of the Frozen Kingdom\" then, got it."
10131-340 = "Sensei!!"
10131-350 = "What? Today? Did something special happen today?"
10131-360 = "It's just another day out of the 365 that pass by."
10131-370 = "Fufu. I'm just kidding, Sensei."
10131-380 = "Happy birthday."
10131-390 = "Now then, shall I start my critique..."
10131-400 = "...of you and your birthday?"
10131-410 = "Oh, what are my plans today?"
10131-420 = "...Nothing in particular. It's just another day, right?"
10131-430 = "Unless...it isn't?"
10131-440 = "Ugh..."
10131-450 = "S-Seriously! Did you think that was funny?"
10131-460 = "I really thought you forgot my birthday!"
10131-470 = "I'm going to make sure that you pay for that, okay?"
10131-480 = "Happy New Year, Sensei."
10131-490 = "I look forward to another great year together."
10131-500 = "Just like how first line of the story is important, the way you spend the first day of the year..."
10131-510 = "...stages how the rest of the year will go."
10131-520 = "That said... Would you like some clementines?"
10131-530 = "It's a Red Winter tradition to enjoy clementines near the heater."
10131-540 = "Christmas..."
10131-550 = "The story of Santa Claus is passed down in many places."
10131-560 = "In Red Winter, Santa Claus has a partner called the \"Snow Maiden.\""
10131-570 = "Yes, quite a different partner from a reindeer..."
10131-580 = "Which is why, for today, I'll be your Snow Maiden."
10131-590 = "If you think about the origins of Halloween..."
10131-600 = "In a way, Halloween..."
10131-610 = "...inspires creators with new ideas."
10131-620 = "Apart from that, though..."
10131-630 = "...I'll pull a trick even if you give me treats, you know?"
10131-640 = "Hiyah!"
10131-660 = "Sensei, look... An aurora."
10131-670 = "Old stories say that the light is of..."
10131-680 = "...guardians of the heavens enjoying a banquet."
10131-690 = "The ones who I thought would be with me forever..."
10131-700 = "...can no longer be found."
10131-710 = "And the world continues to feel cold and far."
10131-720 = "But I can still look up at the aurora and have hope because..."
10131-730 = "My \"partner,\" who will stay by my side until the end..."
10131-740 = "...is right here."
10131-750 = "Fufu. Yes. That's the prelude to this story."
10131-760 = "Please take a good photo, okay?"
10131-2600 = "Do you know the saying, \"the pen is mightier than the gun\"? Yes, it's true. Fufu... Let's have an in-depth...\"discussion\" with those who ignorantly replied to my reviews."

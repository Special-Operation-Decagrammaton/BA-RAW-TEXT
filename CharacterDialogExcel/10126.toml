[translation]
10126-10 = "Blue... Archive... Heehee."
10126-20 = "Itagaki Kanoe from Wildhunt Art Academy... I knew...we'd meet today. Red thread connects us, after all... Heehee."
10126-30 = "I've never been somewhere like this... Not even in my previous life."
10126-40 = "I'll also bring...occult merch."
10126-50 = "There's \"something\"...over there."
10126-60 = "Is there...somewhere small and dark?"
10126-70 = "Should I try a summoning ritual here?"
10126-80 = "Sensei, I've been waiting for you."
10126-90 = "For longer than you know. Since my previous life."
10126-100 = "Welcome, Sensei..."
10126-110 = "I...tend to have low body temperature..."
10126-120 = "I need someone to help me warm up... Heehee..."
10126-130 = "Thanks to this hair tie..."
10126-140 = "I can see \"them.\""
10126-150 = "Heehee..."
10126-160 = "Just kidding..."
10126-170 = "This potion I made..."
10126-180 = "Would you like to try it?"
10126-190 = "I put in...a \"few things\" for you, Sensei."
10126-200 = "Fate...is real..."
10126-210 = "Our meeting...is proof of that."
10126-220 = "I...can mimic any voice."
10126-230 = "Let me know if there's a voice you want to hear. I'll make it happen..."
10126-240 = "Happy birthday, Sensei..."
10126-250 = "Your birthday...is on the same date as your previous life. Heehee."
10126-260 = "Today is the All Souls' Day..."
10126-270 = "And my birthday."
10126-280 = "All the sleeping souls..."
10126-290 = "Let's pray for them together."
10126-300 = "Hello, Sensei."
10126-310 = "Happy New Year."
10126-320 = "Didn't I sound like an adult? Heehee..."
10126-330 = "Spending Christmas with you makes Kanoe happy, Sensei! ♡"
10126-340 = "I'll stay right by your side all day! ♡"
10126-350 = "Halloween..."
10126-360 = "The day when Occult Society shines the brightest from the darkness."
10126-370 = "Now, let's make jack-o'-lanterns... Heehee."
10126-390 = "Sensei. Um, before we start recording...there's something I want you to know."
10126-400 = "Th-The thing is... There's something I've been hiding from you..."
10126-410 = "I'm...very shy, and I'm not a good talker either."
10126-420 = "And in order to hide that, I've been faking that gloomy personality..."
10126-430 = "The reason I got into the occult...was because I wanted to change myself."
10126-440 = "The only person who knows the real me...is you, Sensei."
10126-450 = "So...would you please keep it a secret?"
10126-460 = "I-I trust you, Sensei, so..."
10126-470 = "...Heehee, eheehee. Did you really fall for that, Sensei?"
10126-480 = "...Sensei, you like cute things, right?"
10126-490 = "That means, you...also like me, right?"
10126-500 = "Ehee...!"
10126-2600 = "As expected of Sensei... You know well. Eheehee."

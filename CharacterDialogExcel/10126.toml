[translation]
10126-10 = "Blue... Archive... ฮิฮิ"
10126-20 = "อิตากาคิ คาโนเอะจากสถาบันศิลปะไวลด์ฮันต์...\nฉันรู้อยู่แล้วละ... ว่าเราจะได้เจอกันวันนี้\nก็เราสองคนถูกผูกกันไว้ด้วยด้ายแดงนี่นะ... ฮิฮิ"
10126-30 = "ในชาติที่แล้ว\nไม่เห็นเคยมา\nที่แบบนี้เลย..."
10126-40 = "เอาสินค้ารหัสยศาสตร์\nมาวางไว้ด้วยดีกว่า..."
10126-50 = "ทางโน้น...\nมี \"อะไรบางอย่าง\" อยู่น่ะ"
10126-60 = "ไม่มีที่มืดๆ แคบๆ...\nเลยเหรอ..."
10126-70 = "ลองทำพิธีอัญเชิญ...\nดูที่นี่มั้ย?"
10126-80 = "ครู กำลังรออยู่เลย"
10126-90 = "รอมาตลอดทั้งแต่ชาติก่อนเลยละ"
10126-100 = "เข้ามาสิ ครู..."
10126-110 = "ฉัน...\nอุณหภูมิร่างกายค่อนข้างต่ำน่ะ..."
10126-120 = "เลยต้องการคนที่\nร่างกายอบอุ่นน่ะ... ฮิฮิ"
10126-130 = "ต้องขอบคุณทรงผมนี่จริงๆ..."
10126-140 = "ที่ทำให้ฉัน\nถูกมองเห็นได้น่ะ"
10126-150 = "ฮิฮิ..."
10126-160 = "ล้อเล่นน่ะ..."
10126-170 = "อยากลองชิม..."
10126-180 = "โพชั่นที่ฉันทำมั้ย?"
10126-190 = "ฉันใส่ 'ส่วนผสมอะไรหลายๆ อย่าง'\nเพื่อครูเลยนะ..."
10126-200 = "โชคชะตา... มีอยู่จริง..."
10126-210 = "การพบพานของเรา...\nคือเรื่องพิสูจน์ยังไงล่ะ"
10126-220 = "ฉัน...\nทำเสียงได้หลายอย่างเลยนะ"
10126-230 = "ถ้ามีเสียงที่อยากให้ทำ\nก็บอกมาได้เลย\nฉันจะทำให้เอง"
10126-240 = "สุขสันต์วันเกิดนะครู..."
10126-250 = "วันเกิดในชาตินี้...\nก็เป็นวันเดียวกับชาติก่อนเลยนะ\nฮิฮิ"
10126-260 = "วันนี้คือวันรำลึกถึงวิญญาณ..."
10126-270 = "และเป็นวันเกิดของฉันด้วย"
10126-280 = "มาร่วมกันอธิษฐาน..."
10126-290 = "เพื่อดวงวิญญาณที่หลับใหลกันเถอะ"
10126-300 = "สวัสดีค่ะคุณครู"
10126-310 = "ขอให้มีความสุขในวันปีใหม่นะคะ"
10126-320 = "คำพูดเมื่อกี้ดูเป็นผู้ใหญ่เกินไปเหรอ?\nฮิฮิ..."
10126-330 = "ได้ใช้เวลาวันคริสต์มาส\nร่วมกับคุณครูแบบนี้\nคาโนเอะมีความสุขจัง♡"
10126-340 = "วันนี้จะไม่ยอม\nให้ห่างตัวเด็ดขาดเลยละ♡"
10126-350 = "ฮาโลวีน..."
10126-360 = "ชมรมวิจัยรหัสยศาสตร์ในความมืด\nในวันที่เปล่งประกายที่สุด"
10126-370 = "เอาละ\nลองทำโคมไฟฟักทองดีมั้ยนะ...\nฮิฮิ"
10126-390 = "คุณครู\nเอ่อ ก่อนจะบันทึกเสียง...\nฉันมีอะไรอยากให้ฟังก่อนน่ะ"
10126-400 = "ทะ... ที่จริงแล้ว... ฉัน\nมีบางอย่างที่ปิดบังไว้อยู่น่ะ..."
10126-410 = "ฉะ... ฉัน...\nเป็นคนขี้อาย\nแถมพูดไม่ค่อยเก่งด้วย"
10126-420 = "เลยแกล้งทำเป็น\nนิสัยมืดมนเพื่อปกปิด\nเรื่องนั้นเอาไว้"
10126-430 = "เรื่องที่หลงใหลในรหัสยศาสตร์...\nก็เป็นเพราะฉันอยากเปลี่ยนตัวเอง"
10126-440 = "คนที่เห็นด้านนี้ของฉัน...\nมีแค่คุณครูนะ"
10126-450 = "เพราะงั้น...\nช่วยเก็บเป็นความลับไว้ได้มั้ย?"
10126-460 = "ฉะ... ฉันไว้ใจ\nคุณครูนะ..."
10126-470 = "ฮิฮิ... อิฮิฮิ\nครู... เชื่อรึเปล่า?"
10126-480 = "ครูชอบสิ่งของ\nที่น่ารักๆ ใช่มั้ย?"
10126-490 = "งั้น... ครูก็คงจะ\nชอบฉันด้วยสินะ?"
10126-500 = "ฮิฮิ...!"
10126-2600 = "สมกับเป็นครูจริงๆ...\nรู้อยู่แล้วสินะ อิฮิฮิ"

[translation]
10126-10 = "蔚藍……檔案……咿嘻。"
10126-20 = "狂獵藝術學院的板垣鹿江……\n今天會見面的事……我早就知道了唷。\n因為我們，是被紅線牽住的關係……咿嘻。"
10126-30 = "我在前世……\n沒來過這種地方……"
10126-40 = "神秘學道具……\n也得擺好才行。"
10126-50 = "那邊……\n有「東西」呢。"
10126-60 = "狹窄又黑暗的地方……\n沒有嗎……"
10126-70 = "召喚儀式……在這裡\n舉行也可以吧？"
10126-80 = "老師，我在等你唷。"
10126-90 = "從前世開始，直到現在。"
10126-100 = "歡迎回來，老師……"
10126-110 = "我……體溫很低。"
10126-120 = "所以，不在身旁\n幫我暖和起來……\n是不行的……咿嘻。"
10126-130 = "多虧了這個髮圈……"
10126-140 = "我，能「看見」哦。"
10126-150 = "咿嘻……"
10126-160 = "開玩笑的……"
10126-170 = "我的特製藥水……"
10126-180 = "需要嗎？"
10126-190 = "我為老師……\n加入了「各種東西」。"
10126-200 = "命運是……\n「存在」的唷……"
10126-210 = "我們的相遇……\n就是證明。"
10126-220 = "我可以發出任何\n聲音唷……"
10126-230 = "如果有想聽的聲音，\n儘管跟我說……"
10126-240 = "生日快樂……老師。"
10126-250 = "前世也……\n為你祝福過呢。\n咿嘻嘻……"
10126-260 = "今天是死者之日……"
10126-270 = "也是我的生日。"
10126-280 = "想著沉睡的靈魂們……"
10126-290 = "一起祈禱吧。"
10126-300 = "新年快樂，老師。"
10126-310 = "今年也請您多多指教。"
10126-320 = "剛才那樣，\n有成熟的感覺嗎？\n咿嘻……"
10126-330 = "聖誕節居然能\n跟老師一起度過，\n鹿江好開心♡"
10126-340 = "今天不會再\n放開老師了♡"
10126-350 = "萬聖節……"
10126-360 = "是神秘研在黑暗中\n閃耀的日子。"
10126-370 = "來，一起做南瓜燈吧……\n咿嘻。"
10126-390 = "老，老師……\n那個，在錄音之前……\n我想先告訴你一件事。"
10126-400 = "其，其實……\n我，有件事一直瞞著你……"
10126-410 = "我，我呢……\n是個很害羞的人，\n不太擅長說話。"
10126-420 = "為了掩飾這點，\n才會扮演陰沉的角色……"
10126-430 = "之所以會接觸神秘學，\n也是因為想改變自己。"
10126-440 = "知道這件事的……\n只有老師。"
10126-450 = "所以……要替我保密哦？"
10126-460 = "我，我相信\n老師唷……"
10126-470 = "……咿嘻，咿嘻嘻。\n吶，你相信了嗎？"
10126-480 = "老師你，喜歡\n可愛的東西對吧？"
10126-490 = "那麼，應該……\n也喜歡我，對吧？"
10126-500 = "咿嘻……！"
10126-2600 = "不愧是老師……\n你很懂呢。咿嘻嘻。"

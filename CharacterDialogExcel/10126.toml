[translation]
10126-10 = "블루…… 아카이브…… 히힛."
10126-20 = "와일드헌트 예술학원 이타가키 카노에……\n오늘의 만남도…… 알고 있었어.\n우린 붉은 실로 이어져 있으니까…… 히히."
10126-30 = "전생에서도……\n이런 곳에는\n와 본 적 없어……"
10126-40 = "오컬트 굿즈들도……\n가져다 놔야지."
10126-50 = "저쪽……\n\"뭔가\" 있네."
10126-60 = "좁고 어두운 곳……\n없을까……"
10126-70 = "소환 의식……\n이쪽에서 해볼까?"
10126-80 = "선생, 기다렸어."
10126-90 = "전생부터, 쭉."
10126-100 = "어서 와, 선생……"
10126-110 = "난……\n체온이 낮은 편이야……"
10126-120 = "따뜻하게 해 줄 사람이\n필요해…… 히히……"
10126-130 = "이 머리끈 덕분에……"
10126-140 = "나,\n보인단 말이지."
10126-150 = "히힛……"
10126-160 = "농담이야……."
10126-170 = "내가 만든 포션……"
10126-180 = "먹어볼래?"
10126-190 = "선생을 위해……\n'여러 가지'를 넣어 봤어."
10126-200 = "운명은…… 존재해……."
10126-210 = "우리의 만남이……\n그걸 증명하지."
10126-220 = "난……\n어떤 목소리든 낼 수 있어."
10126-230 = "원하는 목소리가 있다면\n말해.\n그대로 해줄 테니까……."
10126-240 = "생일 축하해, 선생……"
10126-250 = "이번 생의 생일도……\n전생과 같은 날이네.\n히히."
10126-260 = "오늘은 위령의 날……"
10126-270 = "동시에 내 생일이지."
10126-280 = "잠든 영혼을 위해……"
10126-290 = "함께 기도하자."
10126-300 = "안녕하십니까, 선생님."
10126-310 = "새해 복 많이 받으십시오."
10126-320 = "방금 거, 어른스러웠지?\n히힛……."
10126-330 = "크리스마스를\n선생님과 보내다니,\n카노에 기뻣♡"
10126-340 = "오늘은 절대로\n떨어지지 않을 거야♡"
10126-350 = "할로윈……"
10126-360 = "암흑 속에서 오컬연이\n가장 빛나는 날."
10126-370 = "자,\n호박 랜턴을 만들어 볼까……\n히히."
10126-390 = "선생님.\n그, 녹음하기 전에……\n들어줬으면 하는 게 있어."
10126-400 = "사, 사실은…… 나,\n계속 숨기던 게 있어서……."
10126-410 = "나, 난…… \n부끄럼쟁이에\n말도 잘하지 못해."
10126-420 = "그걸 숨기기 위해,\n음침한 성격을\n연기했었어……."
10126-430 = "오컬트에 빠진 것도……\n자신을 바꾸고 싶어서였어."
10126-440 = "이 모습을 아는 건……\n선생님뿐이야."
10126-450 = "그러니까……\n비밀로 해줄래?"
10126-460 = "서, 선생님을\n믿으니, 까……"
10126-470 = "……히히, 이히히.\n선생, 믿었어?"
10126-480 = "선생은,\n귀여운 걸 좋아하지?"
10126-490 = "그럼,\n나도……\n좋아, 하는 거네?"
10126-500 = "이힛……!"
10126-2600 = "역시 선생……\n잘 알고 있, 네. 이히힛."

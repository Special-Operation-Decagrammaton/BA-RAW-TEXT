[translation]
10043-10 = "후후, 블루~ 아카이브~"
10043-20 = "가령 뜨거운 햇살 아래일지라도, 차디찬 물속일지라도… 어디서든 따르겠어요. 그러니 이번 여름도, 저에게서 떨어지지 말아주세요. 다.앙.신♥"
10043-30 = "이곳은 시원하네요.\n우후후…♥"
10043-40 = "이 차림새,\n얼른 선생님께\n보여드리고 싶은데…"
10043-50 = "하아… 당신…\n대체 어디에…?"
10043-60 = "조금 소란스럽네요…"
10043-70 = "어디선가, 시선이…\n이것은 설마, 선생님의…?\n우후훗…"
10043-80 = "어머나, 선생님.\n어서 오세요."
10043-90 = "이 와카모,\n일일천추 같은 마음으로\n기다리고 있었답니다♥"
10043-100 = "어서 오세요. 선생님.\n준비는 완벽하답니다."
10043-110 = "자아, 무엇이든지 말씀해주세요."
10043-120 = "후훗, 우후훗…"
10043-130 = "저에게 무엇이든 말씀해주세요."
10043-140 = "네, 문자 그대로\n<무엇이든>…말이지요♥"
10043-150 = "여름이라고 하면,\n누구나 느슨해지고,\n마음이 달뜨는 계절…"
10043-160 = "그렇다면,\n어떤 일이 일어나더라도\n이상하지 않겠지요?"
10043-170 = "후훗…"
10043-180 = "당신, 좀 더 곁으로\n다가가도 괜찮을까요?\n…네? 얼마든지?"
10043-190 = "아, 아앗…!?"
10043-200 = "아, 저기, 그럼 그, 그게…"
10043-210 = "앗, 네, 네엣…\n시, 실례하겠습니다…"
10043-220 = "모처럼이니 선생님과 함께\n산책이 하고 싶었습니다만."
10043-230 = "이런 더위라면,\n해가 질 때까지\n기다리는 게 좋겠네요."
10043-240 = "여름은 낮이 길어 곤란하네요."
10043-250 = "언제쯤이면 당신과 함께\n산책을 하러 갈 수 있을까요…"
10043-260 = "여름에 가면이라니,\n답답하지 않느냐…인가요?"
10043-270 = "후후, 괜찮답니다.\n이 가면은 특별 주문한,\n여름 전용이기에♥"
10043-280 = "물론 당신이 원하신다면…\n이 아래를 보여드리는 것도,\n얼마든지…"
10043-290 = "…우후후, 어떠신가요?"
10043-300 = "선생님이 태어나신,\n오늘이란 날이 있었기에. 저는\n당신과 만날 수 있었습니다."
10043-310 = "그렇게 생각하면,\n오늘 같은 날이\n이 얼마나 훌륭한 날인지…"
10043-320 = "생일, 진심으로\n축하드려요. 당신-"
10043-330 = "저의, 생일, 말인가요…?"
10043-340 = "아아, 저, 당장이라도\n쓰러질 것만 같아요…\n여름 때문이 아니라,\n너무나도 기뻐서…"
10043-350 = "선생님, 감사합니다…♥"
10043-360 = "우후훗,\n새해 복 많이 받으세요.\n선생님."
10043-370 = "이렇게 또 당신과\n함께 해를 거듭하여, 추억을\n쌓아가는군요."
10043-380 = "메리 크리스마스예요…\n다앙신♥"
10043-390 = "이런 특별한 날,\n이런 특별한 차림으로…\n단 둘이서…"
10043-400 = "오늘 하루,\n무척이나 기대되네요…\n우후후훗."
10043-410 = "트릭 오어 트릿입니다.\n선생님."
10043-420 = "네?\n할로윈용 가면…말인가요?"
10043-430 = "그, 그것은…\n있냐고 한다면,\n있긴 합니다만."
10043-440 = "어머나, 선생님.\n어서 오세요."

10043-810 = "후훗, 정말 따듯하네요…"
10043-820 = "물론 모닥불 탓도\n있겠습니다만…"
10043-830 = "당신의 목소리,\n그 한 마디 한 마디가…"
10043-840 = "지금은 오직 저만을 위해,\n자아내진 말이라 생각하면…"
10043-850 = "…아직 저는,\n여러모로 부족한 몸이기에."
10043-860 = "이렇게 당신 곁에 있으면서,\n잔뜩 폐를 끼치고"
10043-870 = "또다시 잘못을\n저지를지도 모른답니다."
10043-880 = "그럼에도,\n제가 이렇게 당신의…"
10043-890 = "선생님 곁에 있어도, 괜찮을까요…?"
10043-900 = "감사합니다…"
10043-910 = "그런 당신이기에, 저는…"
10043-2600 = "저를 위해, 이런 물건을…?\n이 와카모, 다시금 맹세하겠습니다…\n당신과 제 앞을 가로막는 것이 있다면,\n이 힘으로 전부 부숴버리겠다고.\n후후, 우후후훗…♥"

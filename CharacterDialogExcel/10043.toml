10043-640 = "ฤดูร้อนที่รอคอยมาถึงแล้ว...\nถ้าอย่างนั้น คุณท่านคะ...\nวาคาโมะเตรียมใจพร้อมแล้วค่ะ"
10043-650 = "วาคาโมะผู้นี้ ถ้าเป็นคุณท่านละก็\nคงจะเผยทุกอย่างให้เห็นได้...!"
10043-660 = "เพราะมีวันนี้ที่เป็นวันเกิดของคุณท่าน\nเลยทำให้ฉันได้พบ\nกับคุณท่านได้ค่ะ"
10043-670 = "พอคิดแบบนั้นแล้ว\nวันนี้ก็ดูเป็นวันที่...\nยิ่งใหญ่มากเลยค่ะ..."
10043-680 = "สุขสันต์วันเกิดนะคะ\nคุณท่าน-"

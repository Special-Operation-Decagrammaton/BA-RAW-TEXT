[translation]
10043-10 = "ฮุฮุ Blue~ Archive~"
10043-20 = "แม้จะอยู่ท่ามกลางแดดร้อนจัด หรือในน้ำที่เย็นจัด ไม่ว่าที่ไหนฉันก็จะติดตามคุณท่านไปค่ะ ดังนั้นในฤดูร้อนนี้... ได้โปรดอย่าอยู่ห่างจากฉันเลยนะคะ คุณ.ท่าน.♡"
10043-30 = "ที่นี่เย็นสบายจังเลยค่ะ\nฮุฮุฮุ~☆"
10043-40 = "ฉันอยากให้คุณครู\nได้เห็นชุดนี้\nไวๆ จังเลย..."
10043-50 = "เฮ้อ... คุณท่าน…\nไปอยู่ที่ไหนกันนะ...?"
10043-60 = "เสียงดังกันจังเลยนะคะ..."
10043-70 = "รู้สึกถึงสายตาจากที่ไหนสักแห่ง...\nหรือว่าเป็นสายตาของคุณท่าน...? ฮุฮุฮุ..."
10043-80 = "อ๊ะ คุณท่าน เชิญค่ะ"
10043-90 = "วาคาโมะผู้นี้รอคอยคุณท่าน\nมาโดยตลอดเลยค่ะ♥"
10043-100 = "เชิญค่ะ คุณครู\nเตรียมพร้อมแล้วค่ะ"
10043-110 = "เอาละ ไม่ว่าเรื่องไหน\nก็บอกฉันได้ตลอดเลยนะคะ"
10043-120 = "ฮุฮุฮุ... ฮุฮุฮุ..."
10043-130 = "บอกฉันได้ทุกเรื่องเลยค่ะ"
10043-140 = "ค่ะ \"ทุกเรื่อง\" เลยค่ะ♥"
10043-150 = "ถ้าพูดถึงฤดูร้อนก็คงเป็นฤดู\nที่ใครๆ ต่างก็ทำตัวสบายๆ\nและรู้สึกตื่นเต้น..."
10043-160 = "ถ้าเป็นอย่างนั้น...\nถึงจะเกิดเรื่องอะไรขึ้น\nก็คงไม่แปลกใช่มั้ยคะ?"
10043-170 = "ฮุฮุ..."
10043-180 = "คุณท่านคะ... ฉันขอขยับเข้าไป\nใกล้คุณท่านอีกนิดได้หรือเปล่าคะ?\nคะ?... ได้เสมอเลยเหรอคะ?"
10043-190 = "อา... อ๊ะ...?!"
10043-200 = "เอ่อ คือว่า... ถ้างั้น..."
10043-210 = "อ๊ะ คะ...ค่ะ\nขะ... ขอเสียมารยาทหน่อยนะคะ"
10043-220 = "ฉันอยากไปเดินเล่นพร้อมกับ\nคุณท่านมานานแล้ว"
10043-230 = "แต่ถ้าอากาศร้อนแบบนี้\nเรารอให้พระอาทิตย์ตกดินก่อน\nแล้วค่อยไปเดินเล่นกันดีกว่าค่ะ"
10043-240 = "ในฤดูร้อนแบบนี้ช่วงกลางวัน\nจะยาวกว่าสินะคะ"
10043-250 = "เมื่อไรจะได้มีโอกาส\nไปเดินเล่นกับคุณท่านบ้างนะ..."
10043-260 = "ใส่หน้ากากในฤดูร้อน\nแล้วไม่ร้อนบ้างเลยน่ะหรือคะ?"
10043-270 = "ฮุฮุ ไม่เป็นไรค่ะ\nหน้ากากนี้เป็นชนิดสั่งทำพิเศษ\nสำหรับใส่ในฤดูร้อนค่ะ♥"
10043-280 = "แน่นอนว่าถ้าคุณท่านต้องการ\nวาคาโมะยินดีที่จะถอดออก...\nให้คุณท่านได้ชมสิ่งที่อยู่ข้างใต้ค่ะ"
10043-290 = "ฮุฮุฮุ ว่าอย่างไรคะ?"
10043-300 = "เพราะมีวันนี้ที่เป็นวันเกิดของคุณท่าน\nฉันถึงได้พบกับคุณท่านค่ะ"
10043-310 = "พอคิดแบบนั้นแล้ว\nวันนี้ก็ดูเป็นวันที่...\nยิ่งใหญ่มากเลยค่ะ..."
10043-320 = "วาคาโมะขอยินดีกับวันนี้นะคะ คุณท่าน-"
10043-330 = "วันเกิดของฉันงั้นเหรอคะ...?"
10043-340 = "อา... ฉันรู้สึกเหมือนว่า\nจะเป็นลมเลยค่ะ\nไม่ใช่เพราะแดดร้อนหรอกค่ะ\nแต่เพราะดีใจมากเกินไปค่ะ..."
10043-350 = "คุณท่าน ขอบคุณค่ะ...♥"
10043-360 = "ฮุฮุฮุ...!\nขอให้มีความสุขมากๆ\nในวันปีใหม่ค่ะ\nคุณครู"
10043-370 = "ปีนี้ฉันก็จะได้ใช้เวลา\nสร้างความทรงจำ\nร่วมกับคุณท่านอีกสินะคะ"
10043-380 = "เมอร์รี คริสต์มาสค่ะ...\nคุณท่าน♥"
10043-390 = "วันพิเศษแบบนี้\nด้วยชุดพิเศษแบบนี้...\nเพียงแค่สองคน..."
10043-400 = "ฉันรอคอยวันนี้...\nมาโดยตลอดเลยค่ะ\nฮุฮุฮุฮุ"
10043-410 = "ทริก ออร์ ทรีตค่ะ คุณครู"
10043-420 = "คุณครูคะ? หมายถึงหน้ากากวันฮาโลวีนเหรอคะ?"
10043-430 = "ถะ...ถ้าถามว่า\nมีหน้ากากแบบนั้นรึเปล่า\nอันที่จริงก็มีอยู่ค่ะ"
10043-440 = "อ๊ะ คุณท่าน เชิญค่ะ"

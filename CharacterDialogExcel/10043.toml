10043-780 = "คะ? หน้ากากวันฮาโลวีน\nน่ะเหรอคะ?"
10043-790 = "ถะ...ถ้าถามว่า\nมีหน้ากากแบบนั้นรึเปล่า\nอันที่จริงก็มีอยู่ค่ะ"
10043-810 = "ฮุฮุ อุ่นจังเลยค่ะ..."
10043-820 = "แน่นอนว่าอาจจะเป็นเพราะ\nมีกองไฟอยู่ก็จริง..."
10043-830 = "แต่คำพูดของคุณท่าน\nทุกๆ คำพูด..."
10043-840 = "ตอนนี้พอคิดว่าคุณท่าน\nพูดคำเหล่านั้นเพื่อวาคาโมะแล้ว..."
10043-850 = "ตัวฉันในตอนนี้...\nยังบกพร่องในหลายๆ เรื่อง"
10043-860 = "เวลาที่อยู่เคียงข้างคุณท่าน\nก็มักสร้างปัญหาให้คุณท่านบ่อยๆ..."
10043-870 = "แล้วก็อาจจะทำอะไร\nผิดพลาดไปอีกก็ได้ค่ะ"
10043-880 = "แต่ถึงอย่างนั้นฉันก็ยังอยาก\nที่จะขออยู่เคียงข้างคุณท่าน"
10043-890 = "แบบนี้ต่อไปได้หรือเปล่าคะ...?"
10043-900 = "ขอบคุณมากค่ะ..."
10043-910 = "เพราะคุณท่านเป็นแบบนี้ ตัวฉัน..."
10043-2600 = "ของแบบนี้... เพื่อคนอย่างฉัน...?\nวาคาโมะผู้นี้ขอให้คำสัตย์ค่ะ...\nหากมีสิ่งใดมาขัดขวางระหว่างฉันกับคุณท่าน\nฉันจะใช้พลังทั้งหมดที่มีทำลายให้หมด\nฮุฮุฮุฮุ ฮุฮุฮุฮุ...♥"

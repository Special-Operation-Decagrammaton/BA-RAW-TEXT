10043-620 = "그, 너무 그렇게\n지그시 바라보시면… 저…"
10043-630 = "지금은 역시,\n그… 부끄러워요…"
10043-640 = "모처럼 찾아온 여름…\n그렇다면… 마음의 준비는\n이미 마쳤답니다."
10043-650 = "이 와카모, 당신께라면\n어떠한 모습을 보이더라도…!"

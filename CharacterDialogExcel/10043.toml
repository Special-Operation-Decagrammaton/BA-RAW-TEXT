[translation]
10043-10 = "呵呵，蔚藍～檔案～"
10043-20 = "即使在烈陽照射，或是冰冷的水中…\n無論何處都會跟隨您。因此這個夏天，\n也請不要離開我的身邊哦？閣・下♥"
10043-30 = "這裡很涼快呢，\n唔呵呵…♥"
10043-40 = "這個模樣，\n雖然想趕快\n讓老師看到…"
10043-50 = "唉…閣下，\n究竟去哪裡了…？"
10043-60 = "有點吵雜呢…"
10043-70 = "感覺到，有視線…\n這該不會是，\n老師的…？唔呵呵…"
10043-80 = "哎呀，老師。\n歡迎回來。"
10043-90 = "若藻我，\n以一日千秋的心意\n恭候多時了♥"
10043-100 = "歡迎回來，老師。\n準備萬全了。"
10043-110 = "來吧，請儘管\n進行吩咐。"
10043-120 = "唔呵，唔呵呵…"
10043-130 = "請儘管吩咐。"
10043-140 = "是的，就是字面上的\n「儘管」…沒錯♥"
10043-150 = "提起夏天，就是\n任何人都變得開放，\n內心變得雀躍的季節…"
10043-160 = "既然如此，\n無論發生任何事\n都不奇怪對吧？"
10043-170 = "唔呵…"
10043-180 = "閣下，可以再更靠近\n您身邊嗎…？\n…咦，多近都行？"
10043-190 = "咦，咦咦…！？"
10043-200 = "啊，那個，那麼這，這個…"
10043-210 = "啊，好，好的…\n失，失禮了…"
10043-220 = "機會難得，想說要和\n老師一起散步的…"
10043-230 = "但是這個炎熱程度，\n似乎等到日落會比較好呢"
10043-240 = "夏天白天很長\n真讓人困擾"
10043-250 = "得等到什麼時候，\n才能和閣下一起\n去散步呢…"
10043-260 = "您說夏天戴面具\n不會覺得悶…嗎？"
10043-270 = "唔呵，沒問題的。\n這個面具是專門訂製，\n夏天專用的呀♥"
10043-280 = "當然閣下期望的話…\n讓您看這下面的模樣，\n我也並不…"
10043-290 = "…唔呵呵，\n請問要怎麼做呢？"
10043-300 = "因為有老師誕生的這一天\n我才能和閣下\n萍水相逢。"
10043-310 = "這麼思考的話，\n今天這一天\n是多麼美妙的日子啊…。"
10043-320 = "衷心祝您生日快樂，\n閣下。"
10043-330 = "我的，生日…？"
10043-340 = "啊啊，我，現在\n就快暈倒了…\n並不是因為夏天，\n而是實在太開心…"
10043-350 = "老師，非常感謝您…♥"
10043-360 = "唔呵呵，祝您\n新年快樂。老師。"
10043-370 = "能像這樣與閣下\n年復一年的度過，回憶\n日積月累呢。"
10043-380 = "聖誕快樂，\n閣下…♥"
10043-390 = "在這種特別的日子\n以特別的模樣單獨兩人…"
10043-400 = "今天一天，\n非常期待呢…\n唔呵呵呵。"
10043-410 = "不給糖就搗蛋，\n老師。"
10043-420 = "咦？萬聖節用的\n面具…嗎？"
10043-430 = "那，那是…\n要說有的話，\n是有沒錯。"
10043-440 = "哎呀，老師。\n歡迎回來。"
10043-450 = "若藻我，\n以一日千秋的心意\n恭候多時了♥"

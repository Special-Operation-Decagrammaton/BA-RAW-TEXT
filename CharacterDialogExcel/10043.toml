[translation]
10043-10 = "Heehee. Blue Archive!"
10043-20 = "Even under the scorching sun, or in ice-cold water...I'll follow you anywhere. So this summer, please don't leave me, my darling ♥"
10043-30 = "This place is cool. Heeheehee... ♥"
10043-40 = "This outfit... I can't wait to show you..."
10043-50 = "*sigh* ...Where are you now...?"
10043-60 = "It's kind of noisy here..."
10043-70 = "I feel a gaze... Could it be from Sensei? Heeheehee..."
10043-80 = "Oh, Sensei. Welcome."
10043-90 = "I, Wakamo, have been waiting for you. A day feels like a thousand years! ♥"
10043-100 = "Welcome, Sensei. Preparations are complete."
10043-110 = "Now, please tell me anything."
10043-120 = "Heehee, heeheehee..."
10043-130 = "You can tell me anything."
10043-140 = "Yes, \"anything.\" ♥"
10043-150 = "During summer, everyone lets their guard down and gets excited..."
10043-160 = "So, it's not an exaggeration to say that anything can happen!"
10043-170 = "Heehee..."
10043-180 = "Can I move just a little closer to you? ...Huh? That close?"
10043-190 = "O-Oh...?!"
10043-200 = "Oh, um, that's..."
10043-210 = "Oh, o-okay... E-Excuse me..."
10043-220 = "I've been wanting to take a walk with you, but..."
10043-230 = "It's too hot today, so it'd be best to wait until the sun goes down."
10043-240 = "The days are longer in the summer, which doesn't help."
10043-250 = "When will I be able to take a walk with you...?"
10043-260 = "You're asking if wearing a mask during summer feels stuffy?"
10043-270 = "Heehee, it's okay. This mask is made specially for summer. ♥"
10043-280 = "If you want...I'd be happy to show you what's underneath..."
10043-290 = "...Heehee, how is it?"
10043-300 = "Because you were born on this day, I was able to meet you."
10043-310 = "When I think about that, I realize how special a day like this is..."
10043-320 = "I wish you a happy birthday!"
10043-330 = "Are you asking about my birthday?"
10043-340 = "Oh, I feel like I'm about to pass out... Not because of the heat, but because I'm so happy..."
10043-350 = "Sensei, thank you... ♥"
10043-360 = "Heehee. Happy New Year, Sensei."
10043-370 = "We're spending time together and making memories again."
10043-380 = "Merry Christmas... Darling ♥"
10043-390 = "On a day like this, wearing something special... Just you and I..."
10043-400 = "I'm so excited about today... Heeheehee."
10043-410 = "Trick or treat, Sensei!"
10043-420 = "Huh? A Halloween mask...?"
10043-430 = "Th-That's... If you're asking if I have one, I guess I should say I do, but..."

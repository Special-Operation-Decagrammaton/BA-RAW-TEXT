[translation]
16018-10 = "Blue Archive!"
16018-20 = "I'm Komakaze Rabu, captain of the Splash Helmet Gang. H-Hold on, Sensei!! Personal space! Don't run at me like that!"
16018-30 = "Is there no...hat hanger?"
16018-40 = "That face looks really familiar..."
16018-50 = "(Should I...talk to them?)"
16018-60 = "This place isn't half bad. The roof doesn't even leak."
16018-70 = "The kids would've really liked to come visit..."
16018-80 = "Oh, Sensei. Yahoo."
16018-90 = "What should we do today? Play baseball?"
16018-100 = "Hey, Sensei."
16018-110 = "Got any cool stories?"
16018-120 = "Sensei, you ever think about wearing a helmet?"
16018-130 = "You'd look good in one!"
16018-140 = "Helmets are cool and practical, you know?"
16018-150 = "It protects your skull, AND it looks cool. Isn't that the best?"
16018-160 = "(Looks like most people here at Schale don't wear helmets...)"
16018-170 = "(I feel so anxious all of a sudden!)"
16018-180 = "Sensei, why do you have so much work?"
16018-190 = "You always come running, anytime, anywhere, so I thought you didn't do much."
16018-200 = "Hmm, mmm, mhmm..."
16018-210 = "Mhm! Helmets are the best!"
16018-220 = "Huh, isn't today your birthday, Sensei?"
16018-230 = "Happy birthday! You should eat lots of yummy food!"
16018-240 = "You know, it feels like the gang is hiding something from me."
16018-250 = "They said they have something serious to tell me. What could they be up to?"
16018-260 = "It's the new year. Let's stay healthy and make lots of money!"
16018-270 = "Merry Christmas, Sensei!"
16018-280 = "Well, Santa didn't visit this bad kid..."
16018-290 = "...but I think it's still okay for me to have fun!"
16018-300 = "*huff* *huff*"
16018-310 = "It was rough..."
16018-320 = "People kept going, \"Trick or treat...?\""
16018-330 = "I didn't have any treats to give!"
16018-340 = "So they all pulled tricks on me! Ugh!"
16018-360 = "One, two, three, four, five, six. Perfect!"
16018-370 = "Rescued all six of them!"
16018-380 = "You should listen to your mommy, okay?"
16018-390 = "Momma Duck also seems to be doing fine now..."
16018-400 = "...so that's another problem solved!"
16018-410 = "Wh-Wh-Wh-What are you talking about?!"
16018-420 = "Sensei, isn't that a bit rude?"
16018-430 = "Huh?...Ah?! That's..."
16018-440 = "Ah, ah! So that's what you meant!"
16018-450 = "Of course, a leader should have a compassionate side too!"
16018-460 = "(Is Sensei doing this on purpose? Maybe they're just clumsy?)"
16018-470 = "(Even if they are, it pisses me off. But it's worse if it was on purpose!)"
16018-480 = "(...There's no way that was on purpose... Right...?)"
16018-2600 = "Yeah! This is it! This is it! Thank you, Sensei!"

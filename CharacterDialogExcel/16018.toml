[translation]
16018-10 = "蔚藍檔案！"
16018-20 = "我是嘩啦嘩啦頭盔團的隊長，\n河駒風良舞。等等，老師！！\n太近了啦！離遠一點！！"
16018-30 = "有可以掛頭盔\n的地方嗎？"
16018-40 = "總覺得……\n好像在哪裡\n見過……？"
16018-50 = "（可以上前\n搭話嗎……？）"
16018-60 = "這裡，還挺不錯的嘛。\n又可以遮雨。"
16018-70 = "要是有把頭盔團的\n大家一起帶來\n就好了……"
16018-80 = "哎呀，老師。\n呀齁～"
16018-90 = "今天要做什麼呢？\n打棒球？"
16018-100 = "歡迎，老師。"
16018-110 = "有沒有什麼\n有趣的話題呀？"
16018-120 = "對頭盔有興趣嗎？"
16018-130 = "老師的話，感覺\n一定很適合的哦？"
16018-140 = "頭盔除了帥氣之外，\n還很實用哦？"
16018-150 = "能保護頭部又很好看。\n棒極了對吧？"
16018-160 = "（……來夏萊的人，\n　幾乎都沒戴頭盔呢）"
16018-170 = "（連我看了都開始\n　坐立難安了……\n　總覺得靜不下來！）"
16018-180 = "老師你……\n原來那麼忙碌嗎？"
16018-190 = "因為總是在各個地方\n跑來跑去的，\n還以為是個閒人呢。"
16018-200 = "哼哼，哼哼，\n嗯哼哼～哼……"
16018-210 = "嗯哼～頭盔讚啦！！"
16018-220 = "哎呀，今天不是\n老師的生日嗎？"
16018-230 = "祝你生日快樂！\n要吃很多\n好吃的東西哦！"
16018-240 = "總覺得……從昨天\n開始，我家的孩子們\n就一直在竊竊私語。"
16018-250 = "說是有正經事要談\n所以要我過去……\n到底打算做什麼呢。"
16018-260 = "新的一年到了呢！\n希望今年大家也能\n健健康康賺大錢！"
16018-270 = "Merry Christmas，老師！"
16018-280 = "嗯，雖然壞孩子不會被\n聖誕老人找上門……"
16018-290 = "至少能在心情上\n享受一下吧？"
16018-300 = "哈啊，哈啊……"
16018-310 = "累，累死我了……"
16018-320 = "一邊說不給糖果\n就要惡作劇一邊\n跑過來，那些傢伙……"
16018-330 = "但是我又沒有\n帶著糖果……"
16018-340 = "結果他們就一直搗蛋！\n真是的！！"
16018-360 = "一、二、三、\n四、五、六。\n很好！"
16018-370 = "六隻全都到齊了呢！"
16018-380 = "要乖乖聽媽媽的話哦，你們。"
16018-390 = "母鴨看起來也沒問題了呢。"
16018-400 = "這樣就圓滿落幕了！"
16018-410 = "你，你你你……\n你在說什麼啊！！"
16018-420 = "老師，那句話不會有點失禮嗎？"
16018-430 = "咦？\n……啊！？\n那個……"
16018-440 = "啊，啊啊！\n原，原來是那個意思啊！？"
16018-450 = "當，當然！我可是隊長呢！\n這種程度做不到怎麼行呢！"
16018-460 = "（老師也真是的，\n　真的只是說錯話嗎？\n　還是是故意的……？）"
16018-470 = "（不管哪種都讓人火大！\n　如果是故意的就更氣了！！）"
16018-480 = "（該不會，真的是故意……\n　那麼說的吧……？）"
16018-2600 = "哎呀！這個我一直想要呢！\n謝謝啦，老師♪"

[translation]
16018-10 = "블루 아카이브!"
16018-20 = "퐁당퐁당 헬멧단 대장, 코마카제 라브다.\n자, 잠깐 선생!! 가까워! 달려들지 마!!"
16018-30 = "모자걸이가…….\n없나?"
16018-40 = "어디서 많이 본 것\n같은데……."
16018-50 = "(말……. \n걸어봐도 되나?)"
16018-60 = "여기, 그럭저럭\n좋잖아.\n비도 안 새고."
16018-70 = "우리 애들도 데려오면\n좋을 텐데……."
16018-80 = "어라, 선생. 얏호-."
16018-90 = "오늘은 뭐할까? 야구?"
16018-100 = "어서 와, 선생."
16018-110 = "뭔가,\n재미있는 이야기 없어?"
16018-120 = "선생 말이지,\n헬멧 써볼 생각 없어?"
16018-130 = "선생은 분명\n잘 어울릴 것 같아!"
16018-140 = "헬멧은 멋있고,\n실용적이잖아?"
16018-150 = "머리를 지켜주고\n보기에도 좋아. 최고지?"
16018-160 = "(샬레에 오는 사람들,\n대부분 헬멧은 안 쓰네.)"
16018-170 = "(지켜보는 나까지\n불안하고 허전해!)"
16018-180 = "선생,\n일이 뭐 이렇게 많아?"
16018-190 = "맨날 어디든 달려오니까,\n일이 없는 줄 알았어."
16018-200 = "흐흥, 흐응,\n음흠흠-"
16018-210 = "음흠-,\n헬멧 최-고-"
16018-220 = "어라, 오늘\n선생 생일 아냐?"
16018-230 = "축하해!\n맛있는 거\n많이많이 먹으라구!"
16018-240 = "있지, 우리 애들이 어제부터\n뭔가 숨기는 것 같아."
16018-250 = "진지하게 할 이야기 있다고\n오라는데, 뭘까?"
16018-260 = "새해가 밝았구만.\n건강하고 돈 많이 벌자구!"
16018-270 = "메리 크리스마스, 선생!"
16018-280 = "뭐, 나쁜 아이에게\n산타는 오지 않았지만……"
16018-290 = "즐기는 것쯤은 괜찮잖아!"
16018-300 = "허억, 헉……."
16018-310 = "힘들었어……."
16018-320 = "사탕 아니면 장난이라면서\n오는데……."
16018-330 = "사탕이 없어서"
16018-340 = "장난만 엄청 당했다고!\n씨이!"
16018-360 = "하나, 둘, 셋, 넷,\n다섯, 여섯. 좋아!"
16018-370 = "여섯 마리 전부\n다 구했네!"
16018-380 = "엄마 말을 잘 들어야지,\n알겠니?"
16018-390 = "엄마 오리도\n이젠 괜찮아 보이고,"
16018-400 = "이걸로 한 건\n해결, 이네!"
16018-410 = "뭐, 뭐뭐뭐,\n뭔 소리하는 거야!!!"
16018-420 = "선생,\n그거 좀 실례 아냐?"
16018-430 = "으에?……\n앗! 그러니까……."
16018-440 = "아, 아!\n역시 그런 의미지!"
16018-450 = "물론 리더는\n그런 포용적인\n면모가 있어야지!"
16018-460 = "(선생은 말실수를\n많이 하는 건지,\n일부러 이러는 건지……)"
16018-470 = "(실수여도 열받고,\n노린 거면 더 열받아!)"
16018-480 = "(……진짜로 노리고 그러는\n건…… 아니겠지……?)"
16018-2600 = "오, 이거지 이거야-\n고마워, 선생!"

[translation]
16018-10 = "Blue Archive!"
16018-20 = "ฉันโคะมาคาเสะ ราบุ หัวหน้าแก๊งหมวกกันน็อกป๋อมแป๋ม\nดะ... เดี๋ยวสิ ครู!! ใกล้ไปแล้ว อย่าวิ่งเข้ามาสิ!!"
16018-30 = "มีที่แขวนหมวก...\nบ้างมั้ยนะ?"
16018-40 = "เหมือนเคยเห็นบ่อยๆ\nจากที่ไหนเลย..."
16018-50 = "(ชวนคุย...ได้มั้ยนะ?)"
16018-60 = "ที่นี่ถือว่าใช้ได้เลยนะ\nน้ำฝนไม่หยดด้วย"
16018-70 = "อยากพาเด็กๆ ในแก๊ง\nมาด้วยจัง..."
16018-80 = "นี่ ครู ยะฮู้ว!"
16018-90 = "วันนี้ทำอะไรกันดี?\nเล่นเบสบอลมั้ย?"
16018-100 = "เข้ามาสิ ครู"
16018-110 = "ไม่มีเรื่องสนุกๆ\nจะเล่าบ้างเหรอ?"
16018-120 = "ครูไม่อยากลองใส่\nหมวกกันน็อกบ้างเหรอ?"
16018-130 = "มันน่าจะเหมาะ\nกับครูเลยนะ!"
16018-140 = "ก็หมวกกันน็อกมันเท่\nแล้วก็ใช้งานได้จริงนี่นา?"
16018-150 = "ทั้งช่วยปกป้องหัว\nภายนอกก็ดูสวยด้วย สุดยอดไปเลยว่ามั้ย?"
16018-160 = "(คนที่มาชาเล่ต์ส่วนใหญ่\nไม่ใส่หมวกกันน็อกกันแฮะ)"
16018-170 = "(ฉันก็พลอยว้าวุ่นใจ\nและโล่งหัวไปด้วยเลย!)"
16018-180 = "ครู มีงานอะไรเยอะขนาดนั้นน่ะ?"
16018-190 = "เห็นชอบวิ่งไปนู่นมานี่ทุกวัน\nก็นึกว่าไม่ค่อยมีงานเสียอีก"
16018-200 = "ฮืม ฮืมม\nฮื้มมม ฮืม"
16018-210 = "ฮื้มมม\nหมวกกันน็อก เท่ระเบิด"
16018-220 = "เอ๋ วันนี้\nวันเกิดครูไม่ใช่เหรอ?"
16018-230 = "สุขสันต์วันเกิดนะ!\nกินของอร่อยๆ\nเยอะๆ เลยนะ!"
16018-240 = "ตั้งแต่เมื่อวานละ เด็กๆ ในแก๊ง\nเหมือนจะซ่อนอะไรฉันอยู่เลย"
16018-250 = "ไหนบอกว่าให้มาเพราะมี\nเรื่องสำคัญจะพูดไง มีอะไรเหรอ?"
16018-260 = "ขึ้นปีใหม่แล้วสินะ\nมาแข็งแรงและหาเงินให้ได้เยอะๆ กันเถอะ!"
16018-270 = "เมอร์รีคริสต์มาสนะ ครู!"
16018-280 = "ถึงซานต้าจะไม่มาหา\nเด็กไม่ดี..."
16018-290 = "แต่สนุกไว้ก่อนก็ได้นี่เนอะ!"
16018-300 = "แฮ่ก... แฮ่ก..."
16018-310 = "เหนื่อยจัง..."
16018-320 = "ไหนบอกว่าทริกออร์ทรีต\nแล้วให้มาหาไง..."
16018-330 = "แต่มาแล้วไม่ได้ขนม"
16018-340 = "แล้วก็โดนแกล้งอย่างเดียวเลย!\nชิ!"
16018-360 = "หนึ่ง สอง สาม สี่\nห้า หก ดีละ!"
16018-370 = "หาเจอครบ\nหกตัวแล้ว!"
16018-380 = "ต้องเชื่อฟังแม่กันสิ\nเข้าใจมั้ย?"
16018-390 = "แม่เป็ดก็\nเหมือนจะไม่เป็นไรแล้ว"
16018-400 = "งั้นก็ถือว่าคลี่คลาย\nเรื่องนี้ได้แล้วเนอะ!"
16018-410 = "อะไรๆๆๆ\nพูดอะไรเนี่ย!!!"
16018-420 = "ครู\nแบบนั้นมันเสียมารยาทนะ?"
16018-430 = "หืม? อ๊ะ...!?\nคะ...คือว่า..."
16018-440 = "อ่า อ๊ะ!\nหมายความอย่างนั้นละ!"
16018-450 = "คนเป็นหัวหน้า\nก็ต้องมีมุมที่\nใจกว้างแบบนั้นละ!"
16018-460 = "(ครูนี่ละก็ พลั้งปากไป\nหรือว่าตั้งใจกันแน่...?)"
16018-470 = "(ไม่ว่าจะแบบไหนก็น่าโมโห!\nถ้าจงใจจะยิ่งโมโหกว่าเดิมอีก!)"
16018-480 = "(คงไม่ได้ตั้งใจ\nจริงๆ... หรอกเนอะ...?)"
16018-2600 = "โอ้ นี่ละ แบบนี้ละ\nขอบคุณนะ ครู!"

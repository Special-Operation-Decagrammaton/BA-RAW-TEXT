[translation]
20012-10 = "블루 아카이브."
20012-20 = "게헨나 응급의학부 부장.\n히무로 세나입니다.\n잘 부탁드립니다."
20012-30 = "흠…… 여긴 모두\n이상 없어 보이는군요."
20012-40 = "시…… 아뇨.\n부상자는\n없는 것 같군요?"
20012-50 = "휴식하기에는\n딱 좋아 보이는\n장소로군요."
20012-60 = "가끔은 이런 것도\n나쁘지 않군요."
20012-70 = "선생님은, 어디에……"
20012-80 = "수고하셨습니다, 선생님.\n기다리고 있었습니다."
20012-90 = "준비는 되어 있습니다.\n무엇이든 지시해 주십시오."
20012-100 = "부르셨습니까?"
20012-110 = "대단한 일이 아니더라도,\n뭣하면 개인적인 용무라도\n괜찮습니다만."
20012-120 = "기본적으로 저희는 부상,\n즉 외과 상황에 대응합니다."
20012-130 = "감기 같은 쪽은\n대응하지 않습니다."
20012-140 = "기다리는 것에는 익숙합니다."
20012-150 = "그리고 갑자기\n부름을 받는 것에도요."
20012-160 = "이 자리에\n서 있다는 것은,"
20012-170 = "그만큼 신뢰받고 있다고\n해석해도 좋은 걸까요."
20012-180 = "지금은 아무 일도 일어나지\n않고 있는 것 같군요.\n……쉴 수 있을 때\n쉬어 두시겠습니까."
20012-190 = "생일 축하드립니다.\n선생님."
20012-200 = "좋은 날이니만큼, 사고 없이\n지나가길 바라겠습니다."
20012-210 = "그러고 보니 오늘은\n저의 생일입니다."
20012-220 = "……그냥 보고 드리는 것입니다."
20012-230 = "아, 생일…….\n축하해 주시는 겁니까?"
20012-240 = "…감사합니다. 기쁩니다."
20012-250 = "정신 차리고 보니\n어느덧 새해입니다."
20012-260 = "새로운 한 해도\n잘 부탁드립니다.\n선생님."
20012-270 = "크리스마스라…….\n좋은 날이지만,"
20012-280 = "저희에겐 평소보다 더\n바쁜 날이기도 합니다."
20012-290 = "만일, 선물을 받을 수 있다면\n혼자만의 시간……"
20012-300 = "아뇨, 둘만의 안정되는 시간을\n갖고 싶네요."
20012-310 = "이렇게 요란한 날에는, 사고나\n부상이 뒤따르게 마련입니다.\n준비를 해 두어야겠죠."
20012-330 = "……괜찮으시면\n같이 드시겠습니까?\n편의점 음식이지만……."
20012-340 = "이렇게 대기하고 있지 않으면\n안 되기 때문에, 간단한\n것으로 해결해 둘까 했습니다."
20012-350 = "그나저나 어쩐 일이십니까.\n이런 곳까지……."
20012-360 = "……네? 힘들 것 같아서,\n격려하려고 생각하셨다고요……?"
20012-370 = "과연. 그렇군요."
20012-380 = "……일부러 이런 곳 까지\n와 주시다니, 감사드립니다.\n선생님."
20012-390 = "예상하지 못했던\n전개이기는 했습니다만……"
20012-400 = "선생님과 이렇게\n있을 수 있다는 것은,\n솔직히 기쁩니다."
20012-2600 = "해당 장비 확실히 양도받았습니다.\n보다 본격적으로 지원하겠으니,\n앞으로도 모쪼록 잘 부탁드립니다."

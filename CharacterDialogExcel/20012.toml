[translation]
20012-10 = "Blue Archive."
20012-20 = "I'm Himuro Sena, president of Gehenna's Medical Emergency Club. A pleasure to meet you."
20012-30 = "Hmm... Everything seems fine here."
20012-40 = "Any corp—I mean. Is anyone injured?"
20012-50 = "This looks like a good place to take a break."
20012-60 = "I don't mind something like this every once in a while."
20012-70 = "Where are you, Sensei...?"
20012-80 = "Welcome, Sensei. I've been waiting for you."
20012-90 = "Everything is ready. Just let me know, Sensei."
20012-100 = "You called for me?"
20012-110 = "It's fine if it's not anything big, even if it's just a personal matter."
20012-120 = "My club's basic purpose is to respond to medical emergencies, including surgical ones."
20012-130 = "We don't attend to common ailments such as colds."
20012-140 = "I'm used to waiting."
20012-150 = "And I'm used to being called suddenly."
20012-160 = "Being in this position..."
20012-170 = "...means that you're trusted."
20012-180 = "It's smart to rest when you have a chance and there's nothing else to do."
20012-190 = "Happy birthday, Sensei."
20012-200 = "I hope today passes without incident."
20012-210 = "I just remembered today is my birthday."
20012-220 = "Not that it holds any significance."
20012-230 = "You're...wishing me a happy birthday?"
20012-240 = "Thank you. I'm happy to hear that."
20012-250 = "It's already time for the new year."
20012-260 = "I look forward to working with you this year too, Sensei."
20012-270 = "Christmas is great time of year..."
20012-280 = "...but we tend to be busier than usual."
20012-290 = "If it's a day for gift giving, I just want my gift to be time alone..."
20012-300 = "I mean, maybe some time alone for the two of us."
20012-310 = "Trouble typically arises on days such as today. I have to be more alert."
20012-330 = "I don't have much, but would you like some? All I have is food from a convenience store."
20012-340 = "There isn't time to go anywhere when I'm on standby, so this is the best I can do."
20012-350 = "Anyway, Sensei. What brings you here? It's out of your way."
20012-360 = "Huh? You came to check on me because I looked exhausted?"
20012-370 = "So that's why. Of course."
20012-380 = "Now I understand. Thank you for checking on me, Sensei."
20012-390 = "I wasn't really expecting you to come here..."
20012-400 = "...but I'm always happy to be with you."
20012-2600 = "The equipment has been transferred. We'll be able to provide more support now. We look forward to working with you."

[translation]
20012-10 = "蔚藍檔案。"
20012-20 = "格黑娜學園急救醫學部的部長，\n氷室瀬奈。\n今後請多指教。"
20012-30 = "呼呣……\n似乎沒有什麼異常呢。"
20012-40 = "屍……不，\n似乎沒有傷患呢？"
20012-50 = "以休息來說\n是個不錯的場所呢。"
20012-60 = "偶爾有這樣的時間，\n也不錯。"
20012-70 = "老師，在哪裡……"
20012-80 = "辛苦你了，老師。\n我一直在等你。"
20012-90 = "已經準備好了，\n請儘管吩咐。"
20012-100 = "……你叫我嗎？"
20012-110 = "就算不是重要的事，\n有什麼個人的私事也沒關係。"
20012-120 = "基本上我們的專業是\n身體的傷，也就是外科。"
20012-130 = "因此，感冒之類的\n是管轄外唷。"
20012-140 = "我已經習慣等待了。"
20012-150 = "還有，\n突然的呼叫也是。"
20012-160 = "站在這個地方就代表著，"
20012-170 = "受到了那種程度的信賴，\n這麼解釋可以嗎？"
20012-180 = "現在沒有發生\n什麼特別的事呢。\n……趁可以休息的\n時候休息一下吧。"
20012-190 = "祝你生日快樂，老師。"
20012-200 = "今天這美好的日子，\n我希望你可以不受傷、\n無事故地度過。"
20012-210 = "……話說今天，\n是我的生日呢。"
20012-220 = "沒事，我只是隨口說說而已。"
20012-230 = "啊……你願意為我慶祝嗎？"
20012-240 = "……謝謝你。我很開心。"
20012-250 = "回過神來不知不覺間，\n已經到新年了呢。"
20012-260 = "這新的一年，\n也請你多多指教。\n老師。"
20012-270 = "聖誕節……\n或許是個好日子沒錯，"
20012-280 = "但其實對我們來說，\n經常會是比平時\n還要忙碌的一天。"
20012-290 = "如果，可以收到\n禮物的話，我想要\n一個人的時間……"
20012-300 = "不，想要只有彼此，\n和平安穩的時間呢。"
20012-310 = "這種喧囂的日子，\n往往伴隨著事故和受傷。\n得做好準備才行。"
20012-330 = "……不介意的話，\n要一起吃嗎？\n雖然只是超商的食物……"
20012-340 = "因為必須像這樣待命，所以\n想吃點簡單的東西填飽肚子。"
20012-350 = "話說回來，老師有什麼事嗎？\n怎麼會來這裡……"
20012-360 = "……咦？覺得我好像很辛苦，\n所以想來慰勞我……？"
20012-370 = "……原來如此，是這樣啊。"
20012-380 = "……居然還特地跑來找我，\n非常謝謝你，老師。"
20012-390 = "雖然是個\n意料之外的發展……"
20012-400 = "能像這樣和老師待在一起，\n說實話我很開心。"
20012-2600 = "這裡的裝備，確實收到了。\n今後應該可以做到更正式的支援。\n……今後也，\n請多多指教。"

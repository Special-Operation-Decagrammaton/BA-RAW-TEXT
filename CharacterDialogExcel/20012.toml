[translation]
20012-10 = "Blue Archive"
20012-20 = "หัวหน้าหน่วยแพทย์ฉุกเฉิน\nแห่งเกเฮนน่า ฮิมูโระ เซนะ\nขอฝากตัวด้วยนะคะ"
20012-30 = "อืม ที่นี่ดูไม่มีอะไร\nผิดปกตินะคะ"
20012-40 = "ไม่มีศพ...\nเอ่อ... คนเจ็บใช่ไหมคะ?"
20012-50 = "ถ้างั้นก็คงพักผ่อนได้ค่ะ\nที่นี่ดูดีเลยนะคะ"
20012-60 = "บางครั้งการทำแบบนี้\nก็ไม่ได้แย่เท่าไรนะคะ"
20012-70 = "ฉันอยากพบคุณครูค่ะ..."
20012-80 = "เหนื่อยหน่อยนะคะ คุณครู\nฉันกำลังรออยู่เลยค่ะ"
20012-90 = "ทุกอย่างเตรียมพร้อมแล้ว\nบอกมาได้เลยค่ะคุณครู"
20012-100 = "เรียกฉันเหรอคะ?"
20012-110 = "จะเป็นเรื่องธุระส่วนตัว\nก็ได้หมดเลยค่ะ"
20012-120 = "ที่จริงเราดูแลเรื่องบาดแผล\nภายนอกหรือเคสที่ต้องผ่าตัดค่ะ"
20012-130 = "ถ้าอาการป่วยอย่างเป็นไข้หวัด\nเราจะไม่ได้รักษาให้ค่ะ"
20012-140 = "ฉันชินกับการรอคอยแล้วค่ะ"
20012-150 = "แล้วฉันก็ชินที่ถูกเรียก\nกะทันหันบ่อยๆ แล้วค่ะ"
20012-160 = "การที่ได้ทำงานตำแหน่งนี้..."
20012-170 = "หมายถึงว่าได้รับ\nความไว้วางใจไงล่ะคะ"
20012-180 = "การพักผ่อนตอนที่ว่าง\nเป็นสิ่งที่ดีที่สุดค่ะ"
20012-190 = "สุขสันต์วันเกิดค่ะ\nคุณครู"
20012-200 = "วันนี้เป็นวันดี\nขอให้วันนี้ไม่มี\nอุบัติเหตุเกิดขึ้นค่ะ"
20012-210 = "ฉันเพิ่งนึกขึ้นได้\nว่าวันนี้เป็นวันเกิดของฉันค่ะ"
20012-220 = "แค่รายงานให้ทราบเท่านั้นค่ะ"
20012-230 = "คุณครู...\nอวยพรให้ฉันเหรอคะ?"
20012-240 = "ขอบคุณค่ะ ฉันดีใจมากเลยค่ะ"
20012-250 = "พอรู้ตัวอีกที\nก็ปีใหม่แล้วนะคะ"
20012-260 = "ในปีใหม่นี้\nขอฝากตัวด้วยนะคะ\nคุณครู"
20012-270 = "วันคริสต์มาส...\nเป็นวันดีก็จริง"
20012-280 = "แต่สำหรับพวกเราแล้ว\nจะเป็นวันที่งานยุ่งกว่าวันอื่นค่ะ"
20012-290 = "ถ้าเป็นวันที่ให้ของขวัญกัน...\nฉันอยากได้เวลาที่อยู่ลำพัง"
20012-300 = "ฉันหมายถึงเวลาที่\nได้อยู่ลำพังกันสองคนค่ะ"
20012-310 = "วันที่ครึกครื้นแบบนี้\nมักมีอุบัติเหตุเกิดขึ้นค่ะ\nสำหรับฉันเป็นวันที่\nจะต้องใส่ใจมากกว่าวันอื่นค่ะ"
20012-330 = "ถ้าคุณครูไม่ว่าอะไร\nมาทานด้วยกันมั้ยคะ?\nฉันมีแค่อาหารจากร้านสะดวกซื้อเท่านั้น"
20012-340 = "พอดีฉันต้องคอยอยู่\nแสตนบายฉุกเฉินแบบนี้\nก็เลยเลือกของที่กินได้ง่ายๆ ค่ะ"
20012-350 = "คุณครูมีอะไรเหรอคะ?\nถึงได้มาที่นี่..."
20012-360 = "คะ...? แวะมาให้กำลังใจฉัน\nเพราะคิดว่าฉันน่าจะเหนื่อยเหรอคะ?"
20012-370 = "งั้นเหรอคะ แบบนี้นี่เอง"
20012-380 = "เข้าใจแล้วค่ะ...\nขอบคุณที่แวะมานะคะ\nคุณครู"
20012-390 = "ฉันคิดไม่ถึงเลยค่ะ\nว่าคุณครูจะแวะมาที่นี่"
20012-400 = "แต่ได้อยู่กับคุณครูแค่สองคน\nในสถานการณ์แบบนี้\nฉันดีใจมากนะคะ"
20012-2600 = "ฉันจะขอรับอุปกรณ์นั้นไว้ค่ะ\nเราจะช่วยสนับสนุนอย่างจริงจังค่ะ\nจากนี้ไปก็ขอฝากตัวด้วยนะคะ"

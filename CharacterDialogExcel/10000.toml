[translation]
10000-20 = "You want my services? Heh heh. I'd be happy to, but we aren't cheap, Sensei."
10000-30 = "It's hard to imagine our office looking like this."
10000-40 = "I wonder how much the rent would be."
10000-50 = "Haha. The future of Problem Solver is looking pretty bright."
10000-60 = "*sigh* This reminds me of back when I was in middle school."
10000-70 = "I oughta throw a shindig for my employees in a place like this."
10000-80 = "Welcome, Sensei! I'll be your bodyguard again today!"
10000-90 = "I've been waiting for you. Problem Solver 68 is ready to tackle anything."
10000-100 = "Ha. I'm looking forward to working with you."
10000-110 = "Hahaha! You wanna see what I can do, right?"
10000-120 = "...Huh? You don't?"
10000-130 = "You have to work overtime all night...? B-But what about our date?"
10000-140 = "Y-You don't recall making such a promise? Ahaha! I guess we never did agree on that, did we?"
10000-150 = "Heh heh. Nothing gets by Problem Solver 68. Happy birthday, Sensei."
10000-160 = "Huh? It was yesterday? S-Sorry..."
10000-170 = "...Wait! It is today!"
10000-180 = "Today is the birthday of yours truly! You'd better remember it!"
10000-190 = "One day, it will be one of Kivotos' holidays."
10000-200 = "Happy New Year to you. Expect me to deliver the best solutions for your requests this year."
10000-210 = "Christmas... Oh, right. The most recent request I received..."
10000-220 = "...was to eliminate a \"Santa Claus\"."
10000-230 = "Whoa, whoa, whoa! Wh-What is that freaky thing?"
10000-240 = "N-Nope! I wasn't surprised at all. Not me! You think I'm lying?!"
10000-260 = "(Heh. One look at my professional side and you'll fall in love. I hope you're ready!)"
10000-270 = "(Wait, did they call the wrong number?! We're not a sushi restaurant!)"
10000-280 = "Hmm. That might not be doable. We have our hands full right now."
10000-290 = "(Delivery? This is getting ridiculous!)"
10000-300 = "Uh-huh. Right. Of course. I understand."
10000-310 = "(Why won't this idiot just hang up? Why are we still talking?)"
10000-320 = "Hmm. That's a challenge. Looking at this quarter's forecast, the current interest rate is..."
10000-330 = "(How much is our sushi? We don't even do that!)"
10000-340 = "Oh, yes. Understood. I see."
10000-350 = "(Who cares what your favorite sushi is...? Ugh. What's wrong with this lunatic?)"
10000-360 = "Huh? You think they called the wrong number?"
10000-370 = "Wh-What are you talking about? This is a proper work call!"
10000-2600 = "Heeheehee. With this... I can take out anyone or anything with one shot."

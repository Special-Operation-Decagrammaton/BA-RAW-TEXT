[translation]
10000-20 = "呵呵，想要讓我協助你嗎？\n嘛，雖然不會拒絕。\n不過要僱用我可不便宜唷？老師。"
10000-30 = "把我們的事務所\n也裝飾成這樣吧…"
10000-40 = "這裡的租金\n要多少呢。"
10000-50 = "呵呵呵，\n便利屋的前途\n一片光明啊。"
10000-60 = "唉，讓我想起了\n國中的時候呢。"
10000-70 = "我和我的員工們\n得在這樣的地方\n辦一次慶功宴才行呢。"
10000-80 = "老師！歡迎你來。\n今天我也會\n保護老師的！"
10000-90 = "等你很久了。\n不管是什麼委託，便利屋\n都一定會達成的！"
10000-100 = "呵呵。\n和老師的合作，\n我很期待哦。"
10000-110 = "啊哈哈！\n想見識我的能力對吧？"
10000-120 = "…咦？\n不是嗎？"
10000-130 = "今天要加班到很晚…？\n那今天晚上的約會\n你打算怎麼辦？"
10000-140 = "沒，沒有那種約定？\n啊，啊哈哈！\n這樣子啊，我也真是的。"
10000-150 = "呵呵。老師，我們便利屋的\n調查沒有漏洞。\n祝你生日快樂。"
10000-160 = "咦，是昨天嗎？\n對…對不起…"
10000-170 = "…怎麼可能嘛！\n是今天沒錯啊！！"
10000-180 = "給我記好了，\n今天是我的生日！"
10000-190 = "總有一天會成為\n奇普托斯的節日的。"
10000-200 = "新年快樂。嘛，\n今年也一樣，無論怎樣的委託，\n都會拿出最好的成果的。"
10000-210 = "聖誕節啊…\n這麼說來，\n最近收到的委託是"
10000-220 = "「聖誕老人」的\n排除吧…"
10000-230 = "嗚哇啊啊啊！\n那，那是什麼奇怪的東西！"
10000-240 = "沒，沒有，\n我完全沒有被嚇到，\n是真的！！"
10000-260 = "（哼哼，可別被我工作的樣子\n迷住了唷？）"
10000-270 = "（呃，打錯電話了吧！\n我們又不是壽司店！？）"
10000-280 = "唔──嗯。有點困難呢。\n我們現在，行程上有點緊迫。"
10000-290 = "（配送？很明顯沒有吧！）"
10000-300 = "啊啊，是，是。\n我能理解。"
10000-310 = "（快察覺打錯電話掛斷啊，\n話很多耶…）"
10000-320 = "唔──嗯。這個問題有點困難呢。\n在本季度會計上…\n因為最近利率的問題…"
10000-330 = "（別問我\n壽司多少錢啊！）"
10000-340 = "啊啊，是。\n我確認過了。\n原來如此。"
10000-350 = "（我才不想知道\n你對壽司的偏好啊…\n搞什麼，這個人）"
10000-360 = "嗯？\n你問說是不是打錯了？"
10000-370 = "你，你在說什麼？！\n我正在工作啊！"
10000-2600 = "呵呵呵。有了這個的話……\n不管是什麼目標，都能一擊解決。"

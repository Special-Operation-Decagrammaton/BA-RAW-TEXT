[translation]
10000-20 = "후후, 이 몸과 동업하고 싶다고?\n뭐, 거절하진 않겠지만.\n우리는 비싸다고. 선생님."
10000-30 = "우리 사무실도\n이렇게 꾸미면…."
10000-40 = "여기는 월세가\n얼마려나."
10000-50 = "후후후.\n흥신소의 앞날은\n밝아."
10000-60 = "하아.\n중학교 때가\n생각나네."
10000-70 = "직원들이랑\n이런 곳에서 회식\n한 번은 해야겠지."
10000-80 = "선생님! 어서 와.\n오늘도 이 몸이\n선생님을 경호해주지!"
10000-90 = "기다리고 있었어.\n무슨 의뢰든, 흥신소는 반드시\n수행해 줄 테니까!"
10000-100 = "훗.\n선생님과의 협업,\n기대하고 있다고."
10000-110 = "하하하!\n나의 능력이 보고 싶겠지?"
10000-120 = "…응?\n아니라고?"
10000-130 = "오늘은 밤새 야근…?\n그, 그럼 끝나고 데이트는?"
10000-140 = "그, 그런 약속 없었다고?\n아, 아하하!\n그랬었지, 참."
10000-150 = "후후. 선생님. 우리 흥신소의\n조사에는 빈틈이 없어.\n생일 축하해."
10000-160 = "엣, 어제였다고?\n미… 미안…."
10000-170 = "…이 아니라!\n오늘 맞잖아!!"
10000-180 = "잘 기억해두라고,\n오늘이 바로\n이 몸의 생일이니까!"
10000-190 = "언젠가 키보토스의\n국경일 중 하나가 될 거야."
10000-200 = "새해 복 많이 받으라고.\n뭐, 이번 한 해도 무슨 의뢰든,\n최고의 결과로 함께 해주지."
10000-210 = "크리스마스라….\n그러고 보니\n가장 최근에 받은 의뢰가"
10000-220 = "'산타클로스'를\n제거해 달라 였지…."
10000-230 = "우와와와앗!\n뭐, 뭐야 그 기괴한 건!"
10000-240 = "아, 아니야,\n하나도 안 놀랐거든?\n진짜거든?!"
10000-260 = "(훗, 내 일하는 모습에\n반하면 곤란하다고?)"
10000-270 = "(잘못 걸었잖아!!\n초밥집을 왜 찾아!)"
10000-280 = "흐음. 곤란하네요,\n저희가 지금 일이 꽉 차있어서."
10000-290 = "(배달? 안되는 게 뻔하잖아!)"
10000-300 = "아아, 네, 네.\n이해합니다."
10000-310 = "(잘못 걸었으면\n빨리 끊을 것이지\n뭐이리 말이 많아…?)"
10000-320 = "으음. 어려운 문제군요.\n이번 분기 회계상으로는….\n요즘 기준 금리가…."
10000-330 = "(초밥 가격을\n왜 물어보는 거야?!)"
10000-340 = "아아, 네. 확인했습니다.\n그렇군요."
10000-350 = "(네 초밥 취향 따위\n궁금하지 않다구….\n뭐야, 이 녀석.)"
10000-360 = "응?\n잘못 걸린 거 아니냐고?"
10000-370 = "무, 무슨 얘길 하는 거야?\n일하는 중이잖아!"
10000-2600 = "후후후. 이거라면…….\n무엇이든 한 발로 끝장이네."

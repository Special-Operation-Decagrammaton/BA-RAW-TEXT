[translation]
10000-20 = "ฮุฮุ อยากร่วมงานกับฉันงั้นเหรอ?\nฉันก็จะไม่ปฏิเสธหรอกนะ\nแต่ค่าตัวของพวกเราไม่ใช่ถูกๆ นะคุณครู"
10000-30 = "ถ้าจัดห้องทำงาน\nของพวกเราแบบนี้ละก็..."
10000-40 = "ที่นี่ค่าเช่ารายเดือนเท่าไหร่นะ?"
10000-50 = "ฮุฮุฮุ\nหน่วยรับจ้างสารพัดของเรา\nต้องไปได้สวยแน่ๆ"
10000-60 = "เฮ้อ คิดถึงตอนอยู่ม.ต้นจัง"
10000-70 = "ต้องเลี้ยงข้าวพนักงาน\nในที่แบบนี้ดูบ้างแล้ว"
10000-80 = "คุณครู! มาแล้วเหรอ?\nวันนี้ฉันจะคุ้มกันคุณครูให้เอง!"
10000-90 = "กำลังรออยู่เลย ไม่ว่าจะ\nงานอะไร หน่วยรับจ้างสารพัด\nก็ทำให้ได้ทั้งนั้น!"
10000-100 = "ฮุฮุ ฉันกำลังรอที่จะ\nได้ร่วมงานกับคุณครูอยู่เลย"
10000-110 = "ฮ่าฮ่าฮ่า! อยากเห็น\nความสามารถของฉันล่ะสิ?"
10000-120 = "หืม...? ไม่ใช่เหรอ?"
10000-130 = "วันนี้อยู่ทำงานจนดึกเลยเหรอ...?\nแล้วเดตของเราคืนนี้ล่ะ?"
10000-140 = "ไม่เคยมีนัดอะไรแบบนั้นงั้นเหรอ?\nอ่อ.. อะฮ่าฮ่า! จริงด้วย! ฉันนี่นะ..."
10000-150 = "ฮุฮุ ไม่ผิดแน่นอน หน่วยรับจ้าง\nของเรา ไม่เคยสืบอะไรพลาดมาก่อน\nสุขสันต์วันเกิดนะ"
10000-160 = "หา? เมื่อวานนี้ต่างหากเหรอ?\nขะ... ขอโทษนะ"
10000-170 = "ขอโทษอะไรกันล่ะ!\nวันนี้ถูกแล้วไม่ใช่เหรอ!!"
10000-180 = "วันนี้เป็นวันเกิดของฉัน\nจำเอาไว้ให้ขึ้นใจด้วยล่ะ!"
10000-190 = "สักวันหนึ่ง วันนี้จะต้องได้เป็น\nวันหยุดประจำปีของคิโวทอส\nอย่างแน่นอน!"
10000-200 = "สวัสดีปีใหม่\nปีนี้ฉันก็จะเต็มที่\nกับทุกงานที่เข้ามา"
10000-210 = "วันคริสต์มาส... จะว่าไป\nงานที่เพิ่งได้รับมาล่าสุดนี้"
10000-220 = "คือการกำจัด\n'ซานตาคลอส' นี่นา..."
10000-230 = "เฮือกกก!\nนะ... นี่มันของพิลึกอะไรกัน!"
10000-240 = "มะ... ไม่ใช่นะ\nไม่ได้ตกใจอะไรเลย\nจริงๆ นะ!"
10000-260 = "(หึ พอเห็นฉันจริงจังกับการทำงาน\nจะต้องหลงเสน่ห์ฉันแน่ๆ?)"
10000-270 = "(ห้ะ โทรมาผิดแล้วย่ะ!!\nที่นี่ไม่ใช่ร้านซูชิสักหน่อย!)"
10000-280 = "อืม... คงไม่ได้หรอกค่ะ\nตอนนี้พวกเรางานยุ่งมากเลย"
10000-290 = "(สั่งอาหารเรอะ? จะบ้าเรอะ?\nใครจะไปส่งให้ได้!)"
10000-300 = "อ๋อ ค่ะ เข้าใจแล้วค่ะ"
10000-310 = "(ถ้าโทรผิดก็รีบๆ วางไปสิยะ!\nจะมาพูดให้ยืดยาวเปลือง)"
10000-320 = "อืมม ค่อนข้างลำบากเลยนะคะ\nดูตามเศรษฐกิจของไตรมาสนี้แล้ว...\nดอกเบี้ยช่วงนี้มันก็ค่อนข้าง..."
10000-330 = "(จะถามเรื่องราคาซูชิอีกทำไมเนี่ย)"
10000-340 = "อ๋อ ค่ะ รับทราบค่ะ\nอย่างนั้นเหรอคะ?"
10000-350 = "(ใครอยากรู้กันยะว่าชอบกิน\nซูชิแบบไหน อะไรเนี่ย เจ้าหมอนี่)"
10000-360 = "หืม? คิดว่าโทรมาผิดเหรอคะ?"
10000-370 = "พูดอะไรน่ะ? \nฉันกำลังคุยงานอยู่ต่างหาก"
10000-2600 = "ฮุฮุฮุ ถ้ามีอาวุธนี่ละก็...\nไม่ว่าใครหรืออะไรก็จัดการได้ในนัดเดียวแน่"

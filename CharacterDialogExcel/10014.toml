[translation]
10014-20 = "이즈나! 선생님의… 아니, 주군의 부름을\n듣고 달려왔습니다~! 닌닌!"
10014-30 = "앗, 앗, 주군!"
10014-40 = "닌자란 자고로 어둠을 틈타\n살아가는 존재…\n어둠을… 어둠…\n금세 눈이 나빠질 거 같아요…"
10014-50 = "정보를 수집하기 위해선…\n이 근처에 숨는 게 좋을까요?"
10014-60 = "이렇게나 넓으면,\n이즈나류 인법 오의\n108 그림자 분신술을\n사용할 수 있을지도…"
10014-70 = "주군의 명을 기다리며\n대기하는 이 시간…\n심심해요~"
10014-80 = "앗, 주군!\n기다리고 있었습니다!\n오늘도 잘 부탁드려요!\n닌닌~"
10014-90 = "어서 오세요. 주군!\n이즈나가 어제 공부한\n인법을 보여드릴게요!"
10014-100 = "이즈나의 꿈은\n키보토스 최고의\n닌자가 되는 거예요."
10014-110 = "그러니 오늘도 같이\n수행해주실 거죠…?"
10014-120 = "주군, 오늘의 임무는 뭔가요?\n적진 정찰? 후방 침투?!"
10014-130 = "…네? 내일 있을\n시험 공부, 라고요?"
10014-140 = "주군, 오늘도\n순찰을 나가실 거죠?"
10014-150 = "그림자처럼\n따르겠습니다!\n닌닌~!"
10014-160 = "이래 봬도 이즈나는\n닌자니까, 미인계도\n자신이 있습니다!"
10014-170 = "주군을 상대로라면\n얼마든지!"
10014-180 = "네? 주군에게 그런 걸\n쓰면 안 된다구요?"
10014-190 = "하지만… 그럼 쓸 상대가\n없어져 버리는데요…?"
10014-200 = "주군!\n생일 축하드려요!"
10014-210 = "오늘을 완벽한\n생일로 만들기 위해.\n이즈나, 하루종일\n주군 곁을 지키겠습니다!"
10014-220 = "네, 네엣?\n이, 이즈나의 생일을\n축하해주신다고요?"
10014-230 = "가, 감사합니다.\n주, 주구운…"
10014-240 = "주군과 함께하는\n설날이라니! 근사하네요!"
10014-250 = "새해 복 많이 받으세요.\n주군!"
10014-260 = "메리 크리스마스입니다!\n주군!"
10014-270 = "특별히 오늘을\n위해 준비한 성탄절\n인법을 보여드릴게요!"
10014-280 = "할로윈. 오늘은\n귀신과 이매망량이\n돌아다니는 날…"
10014-290 = "그래도 걱정마세요.\n주군."
10014-300 = "이 이즈나가\n트릭 오어 트릿으로부터\n완벽하게 지켜드릴게요!"
10014-320 = "앗, 주군, 주군!\n지금 거 보셨나요?!"
10014-330 = "잉어가 폴짝!\n하고 뛰어올랐어요!"
10014-340 = "앗, 그러네요.\n이즈나, 진정하자…\n진정하자 진정…"
10014-350 = "에헷, 에헤헤헷."
10014-360 = "네! 즐거워요!\n이렇게나 즐거운 건\n역시…"
10014-370 = "역시 제일로 좋아하는\n주군과 함께라서\n일까요?"
10014-380 = "오늘 같은 날은\n이즈나에게 잊지 못할\n평생의 추억이 될 거예요."
10014-390 = "네에, 주군!\n비록 불초한 몸이지만…!"
10014-400 = "앞으로 이즈나를\n잘 부탁드립니다. 주군.\n에헤헷!"
10014-2600 = "이, 이것이 최첨단을 달리는\n닌자의 무기…! 이걸로 이즈나도\n엘리트 닌자가 될 수 있을까요!?"

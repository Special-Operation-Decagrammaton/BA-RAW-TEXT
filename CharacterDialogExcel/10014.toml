[translation]
10014-20 = "Sensei—er, my lord! Izuna heard your call and came right over! Nin nin!"
10014-30 = "O-Oh, my lord!"
10014-40 = "A ninja lives in the shadows, forever lurking in the dark... It's not good for your eyesight."
10014-50 = "Should we hide somewhere nearby to gather information?"
10014-60 = "This place is big enough for Izuna to use her Secret Izuna-Style Ninjutsu 108 Shadow Clone technique..."
10014-70 = "I am awaiting my lord's orders... I'm so bored!"
10014-80 = "Oh, my lord! I've been waiting for you! I'm looking forward to today! Nin nin!"
10014-90 = "Welcome, my lord! I want to show you the ninjitsu I studied yesterday!"
10014-100 = "Izuna's dream is to become the best ninja in Kivotos."
10014-110 = "You'll work with me again today, won't you...?"
10014-120 = "What will today's mission be, my lord? Scouting the enemy camp? Rear infiltration?!"
10014-130 = "Huh? Studying for tomorrow's test?"
10014-140 = "Are you going out on a patrol today, my lord?"
10014-150 = "I'll stick by you as though I were your shadow! Nin nin!"
10014-160 = "I may be a ninja, but I can also play the role of the femme fatale!"
10014-170 = "Especially with you, my lord!"
10014-180 = "What? I'm not supposed to use my skills on you?"
10014-190 = "Then...I'll have no one else to use it on..."
10014-200 = "Happy birthday, my lord!"
10014-210 = "Izuna vows to stay by your side and make this the best birthday ever!"
10014-220 = "Wh-What? You want to wish ME a happy birthday?"
10014-230 = "Th-Thank you, m-my lord..."
10014-240 = "I'm spending New Year's Day with my lord! This is great!"
10014-250 = "Happy New Year, my lord!"
10014-260 = "Merry Christmas, my lord!"
10014-270 = "I prepared Christmas ninjutsu specially for today!"
10014-280 = "Halloween. Today is the day when ghosts and goblins walk among us..."
10014-290 = "But don't worry, my lord."
10014-300 = "Izuna will keep you safe from their trick and treating ways!"
10014-320 = "Oh, my lord, my lord! Did you see that?!"
10014-330 = "The carp! It jumped out of the water!"
10014-340 = "Oh, I see. Calm down, Izuna... Calm down..."
10014-350 = "Heh. Heehee."
10014-360 = "Uh-huh! I think I'm having fun because..."
10014-370 = "...I'm spending time with my favorite person, my lord!"
10014-380 = "This day has given Izuna memories to cherish forever."
10014-390 = "I'd like that! I know I can be a handful sometimes..."
10014-400 = "...but I hope you'll allow your ninja to remain by your side, my lord!"
10014-2600 = "Th-This is a cutting-edge ninja weapon...! Can Izuna become an elite ninja with this?!"

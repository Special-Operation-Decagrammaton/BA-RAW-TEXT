[translation]
10014-20 = "伊樹菜登場！\n為了回應老師……不，是主公的呼喚，\n飛奔前來了～！忍忍！"
10014-30 = "啊，主公～！"
10014-40 = "忍者自古以來就是\n活在黑暗的世界裡……\n黑暗……黑暗之中……\n感覺視力會變差呢？"
10014-50 = "這也是為了蒐集情報……\n 躲在這附近好嗎？"
10014-60 = "這麼寬敞的話，或許可以\n使用伊樹菜流忍法奧義\n「百八式．影分身之術」\n也說不定……"
10014-70 = "靜靜地等待\n主公的命令……\n嗯～閒下來了……"
10014-80 = "啊，主公！\n恭候多時了！\n今天也請多多指教！\n忍忍！"
10014-90 = "歡迎回來，主公！\n要不要看看伊樹菜\n昨天習得的忍法呀！？"
10014-100 = "伊樹菜的夢想\n是成為奇普托斯\n最厲害的忍者。"
10014-110 = "所以，那個，今天也\n可以陪我一起修行嗎……？"
10014-120 = "主公，今天的任務是什麼呢？\n是偵查嗎？還是潛入敵陣呢？"
10014-130 = "……咦，是準備\n明天的考試嗎！？"
10014-140 = "主公，今天\n也會去巡邏對吧？"
10014-150 = "伊樹菜也會像影子一樣\n跟過去的！忍忍～！"
10014-160 = "別看伊樹菜這樣，\n伊樹菜也是個忍者，\n所以對美人計有自信！"
10014-170 = "如果是對主公使用的話！"
10014-180 = "咦？不能對主公\n使用那個技能，是嗎？"
10014-190 = "可是這樣就沒有\n可以使用的對象了……？"
10014-200 = "主公！\n生日快樂！"
10014-210 = "為了讓今天\n是個美好的一天，\n伊樹菜一整天都會\n守在主公身邊的！"
10014-220 = "咦，啊！\n主，主公祝伊樹菜\n生日快樂嗎？"
10014-230 = "謝，謝謝。\n主公……！"
10014-240 = "和主公一起\n迎接的新年！真棒！"
10014-250 = "新年快樂，\n主公！"
10014-260 = "聖誕快樂！\n主公！"
10014-270 = "為了今天而準備的\n聖誕節版忍法，請看吧！"
10014-280 = "萬聖節，\n也就是魑魅魍魎\n徘徊的日子……"
10014-290 = "但是主公，\n請不用擔心。"
10014-300 = "小女伊樹菜\n會從不給糖就搗蛋手中\n完美地保護主公的！"
10014-320 = "啊，主公，主公！\n你有看到那個嗎！？"
10014-330 = "鯉魚跳出水面了唷！"
10014-340 = "啊，說得也是呢。\n冷靜點，伊樹菜……\n讓精神安定下來……"
10014-350 = "……欸嘿，欸嘿嘿嘿。"
10014-360 = "是的！很開心，\n能這麼開心，\n果然是因為……"
10014-370 = "和最喜歡的主公在一起吧？"
10014-380 = "今天這一天，\n對伊樹菜來說\n肯定會是一生的回憶。"
10014-390 = "……！是的，主公！\n雖然小女不才……！"
10014-400 = "不過以後也請\n多多關照伊樹菜！\n欸嘿嘿！"
10014-2600 = "這，這就是最先進的忍者武器……！\n有了這個的話，伊樹菜\n就能成為中忍了嗎！？"

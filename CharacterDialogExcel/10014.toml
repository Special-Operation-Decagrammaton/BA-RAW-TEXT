[translation]
10014-20 = "อิซุนะ! ฉันได้ยินเสียงเรียกของคุณครู... ไม่สิ นายท่าน\nเลยรีบวิ่งมาเลยค่ะ! นินนิน~!"
10014-30 = "อ๊ะ นายท่าน!"
10014-40 = "นินจาเป็นสิ่งมีชีวิต\nที่อาศัยอยู่ในความมืด...\nความมืด... ความมืด...\nอีกหน่อยสายตาต้องแย่ลงๆ แน่เลยค่ะ"
10014-50 = "เพื่อรวบรวมข้อมูล...\nฉันไปซ่อนตัวอยู่ในที่ใกล้ๆ\nดีไหมนะ?"
10014-60 = "บริเวณกว้างขนาดนี้\nชักไม่แน่ใจแล้วว่า\nจะใช้วิชานินจาเงา\nแยกร่างอิซุนะ 108 ได้รึเปล่า..."
10014-70 = "ฉันกำลังรอคำสั่งจากนายท่าน\nช่วงเวลาที่รอแบบนี้....\nเบื่อจังเลย~"
10014-80 = "อ๊ะ นายท่าน! กำลังรออยู่เลยค่ะ!\nวันนี้ก็รบกวนด้วยนะคะ นินนิน~!"
10014-90 = "เชิญค่ะ นายท่าน!\nอิซุนะจะแสดงวิชานินจา\nที่ร่ำเรียนมาให้นายท่านดูเอง!"
10014-100 = "ความฝันของอิซุนะก็คือ\nการได้เป็นสุดยอดนินจา\nในคิโวทอสค่ะ"
10014-110 = "เพราะงั้นแล้ว วันนี้...\nออกไปปฏิบัติการด้วยกันไหมคะ....?"
10014-120 = "นายท่าน วันนี้มีภารกิจอะไรคะ?\nลาดตระเวนตรวจจับศัตรู?\nบุกโจมตีจากด้านหลัง?!"
10014-130 = "คะ....? ให้อ่านหนังสือ...\nเตรียมสอบวันพรุ่งนี้เหรอคะ?"
10014-140 = "นายท่านคะ วันนี้จะ\nออกไปลาดตระเวนใช่ไหมคะ?"
10014-150 = "ฉันจะติดตามนายท่าน\nเหมือนเป็นเงาตามตัวเลยค่ะ!\nนินนิน~!"
10014-160 = "ถึงจะเห็นแบบนี้ แต่ว่าอิซุนะก็\nเป็นนินจา เพราะงั้นฉันมั่นใจ\nเรื่องการใช้วิชาเสน่ห์ยวนใจนะคะ!"
10014-170 = "ถ้าหากนายท่านเป็นศัตรูล่ะก็...\nฉันพร้อมทุกเมื่อเลย!"
10014-180 = "คะ? จะบอกว่าห้ามทำแบบนั้น\nกับนายท่านงั้นเหรอคะ?"
10014-190 = "แต่ว่า... ถ้างั้นคนที่จะใช้วิชา\nนี้ด้วย ก็ไม่มีแล้วน่ะสิคะ...?"
10014-200 = "นายท่าน!\nสุขสันต์วันเกิดค่ะ!"
10014-210 = "เพื่อทำให้วันเกิดนายท่าน\nออกมาเพอร์เฟกต์ที่สุด\nอิซุนะจะคอยอยู่ข้างนายท่าน\nตลอดทั้งวันเลยค่ะ!"
10014-220 = "คะ...คะ?\nอะ...อวยพรวันเกิด\nให้กับอิซุนะเหรอคะ?"
10014-230 = "ขะ...ขอบคุณมากค่ะ\nนะ...นายท่าน..."
10014-240 = "ได้ใช้เวลาร่วมกับนายท่าน\nในวันปีใหม่เหรอเนี่ย!\nสุดยอดไปเลยค่ะ!"
10014-250 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ นายท่าน!"
10014-260 = "เมอร์รี คริสต์มาสค่ะ!\nนายท่าน!"
10014-270 = "ฉันจะแสดงวิชานินจา\nเคล็ดวิชาพิเศษ\nสำหรับวันคริสต์มาสให้ดูค่ะ!"
10014-280 = "ฮาโลวีน วันนี้ วันที่ดวงวิญญาณ\nและภูตพรายกลับมายังโลก"
10014-290 = "แต่ไม่ต้องห่วงนะคะ\nนายท่าน"
10014-300 = "อิซุนะ\nจะคอยปกป้องนายท่าน\nจากทริก ออร์ ทรีตเองค่ะ!"
10014-320 = "อ๊ะ นายท่านคะ! นายท่าน!\nเห็นนี่ไหมคะ?!"
10014-330 = "ปลาคาร์พกระโดดขึ้นมา!\nแล้วก็กระโดดขึ้นมาอีกที!"
10014-340 = "อ๊ะ จริงด้วยค่ะ\nอิซุนะ ใจเย็นๆ ก่อนนะ...\nสงบใจเข้าไว้..."
10014-350 = "อ่าแหะๆ ฮิฮิฮิฮิ"
10014-360 = "ค่ะ! สนุกมากเลยค่ะ!\nที่ได้ทำเรื่องสนุกๆ\nแบบนี้..."
10014-370 = "เป็นเพราะว่าได้อยู่กับ\nนายท่านที่ชอบที่สุด\nหรือเปล่านะคะ?"
10014-380 = "วันนี้จะเป็นวันที่อิซุนะ\nจะจดจำไปตลอดชีวิตเลยค่ะ"
10014-390 = "ค่ะ! นายท่าน!\nถึงอิซุนะจะยัง\nไม่เพียบพร้อมก็เถอะ!"
10014-400 = "ต่อจากนี้ไป อิซุนะ\nขอฝากตัวด้วยนะคะ!\nนายท่าน ฮิฮิฮิ!"
10014-2600 = "นะ...นี่มันอาวุธนินจาที่ติดตั้ง\nเทคโนโลยีขั้นสูงเอาไว้...!\n(กลืนน้ำลาย) ถ้ามีอาวุธชิ้นนี้\nอิซุนะจะกลายเป็นสุดยอดนินจาได้ใช่มั้ยคะ!?"

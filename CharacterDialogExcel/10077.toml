[translation]
10077-10 = "蔚藍檔案～"
10077-20 = "咦，是來接我的嗎？跟我說一聲的話我就過去了說～\n重新自我介紹，我是三一綜合學園，實現正義部的一花。請多指教！"
10077-30 = "哦～是這裡嗎？\n老師的咖啡廳！"
10077-40 = "原來如此。\n是這種興趣啊……"
10077-50 = "這裡很和平，\n真棒呢！"
10077-60 = "好放鬆……"
10077-70 = "要幫忙\n整理一下嗎……"
10077-80 = "歡迎回來～老師！\n今天一整天，\n我也會加油的唷～！"
10077-90 = "鏘鏘～！\n一花登場！"
10077-100 = "……不對，\n是老師登場！"
10077-110 = "哎呀～\n這裡的工作真快樂呢！"
10077-120 = "啊，不是指工作簡單，\n而是有方向性的意思唷。"
10077-130 = "最困難的……\n應該是紛爭的仲裁吧。"
10077-140 = "喔，老師也這麼覺得嗎？\n我們是同道中人呢。"
10077-150 = "大家明明不必全力以赴，\n適可而止就好了說……"
10077-160 = "如果我也像老師一樣\n有所背負……就能\n著迷於某種事物嗎？"
10077-170 = "有事相求嗎？\n要做什麼都行哦！"
10077-180 = "能依照指示\n做事這點，\n我有自信！"
10077-190 = "生日快樂，\n老師！！"
10077-200 = "有遇到什麼好事嗎？\n沒有的話，\n現在一起去創造吧！"
10077-210 = "……那個，在生日\n特地來這裡的理由\n是嗎……？"
10077-220 = "這個嘛……\n因為是生日，所以\n才會來……之類的？嘻嘻。"
10077-230 = "新年快樂，\n老師！"
10077-240 = "希望今年\n一定要能\n悠閒地度過！"
10077-250 = "今天從一早\n就暈頭轉向的\n實在很抱歉！"
10077-260 = "因為實現正義部\n經常被叫來叫去……"
10077-270 = "搞得我眼花撩亂～！"
10077-280 = "不知為何有股\n不好的預感……"
10077-290 = "不過其實，\n應該也沒什麼吧？\n哈哈！"
10077-310 = "哈哈！老師，\n我在這裡！這裡！\n有看到嗎？"
10077-320 = "啊～其實這只是\n普通的氣球……"
10077-330 = "總覺得只要拿著這個，\n看起來就像遊樂園裡\n興高采烈的孩子一樣呢…哈哈。"
10077-340 = "啊！這不是我的哦！\n……那個，只是因為\n一些原因，才會……"
10077-350 = "咦，咦……\n是沒錯啦……\n不過你怎麼會知道呢？"
10077-360 = "為什麼呢……？\n是能從我的表情看出來嗎……？"
10077-370 = "算了……\n從這個角度看老師，\n還是第一次呢。"
10077-380 = "該說觀點不同，\n看法也會跟著\n改變嗎……"
10077-390 = "……總覺得很有趣。"
10077-400 = "這種感覺，我喜歡！\n……哈哈！"
10077-2600 = "該怎麼說呢……那個……\n能收到這麼好的東西，\n我當然非常感激……\n但我是否有那個價值就……\n不過……我很高興。真的。"

[translation]
10077-10 = "Blue Archive."
10077-20 = "Oh, have you come to pick me up? I would have gone myself if you'd asked. Once again, I am Ichika of the Trinity General School Justice Task Force. Please look after me!"
10077-30 = "Ah, so this is it? Sensei's Cafe!"
10077-40 = "I see. So this is how you like it..."
10077-50 = "I like how peaceful it is here!"
10077-60 = "I'm relaxing..."
10077-70 = "Should I at least help clean...?"
10077-80 = "Welcome, Sensei! I'll do my best today too!"
10077-90 = "Ta-da! Ichika is here!"
10077-100 = "Or rather, it's Sensei that's here!"
10077-110 = "My, working here is quite comfortable!"
10077-120 = "Ah. I'm not saying that it's easy, of course. It's just very pleasant."
10077-130 = "My most difficult work... I'd say it's breaking up fights."
10077-140 = "Oh, you too, Sensei? We're the same."
10077-150 = "I wish that everyone would simply relax and not get so worked up..."
10077-160 = "If I'm given a great responsibility, like Sensei has been... Will I be able to immerse myself in it completely?"
10077-170 = "Do you have a task for me? I'll do whatever you need!"
10077-180 = "I'm confident that I can complete any job you give me!"
10077-190 = "Happy birthday, Sensei!"
10077-200 = "Has anything good happened to you today? If not, let's make sure something good happens right now!"
10077-210 = "Hm... You want to know why I came all the way here on my birthday?"
10077-220 = "Right... Maybe I came...BECAUSE it's my birthday. Heehee!"
10077-230 = "Happy New Year, Sensei!"
10077-240 = "I pray that this year, I might enjoy some leisure!"
10077-250 = "I'm sorry it's been so hectic since this morning!"
10077-260 = "The Justice Task Force has been called on to take care of all kinds of things."
10077-270 = "My head is spinning!"
10077-280 = "Somehow, I've got a bad feeling..."
10077-290 = "Well, I'm sure it'll turn out all right, no? Haha!"
10077-310 = "Haha! Sensei! Over here! Here! Can you see me?"
10077-320 = "Ah! This is just a balloon..."
10077-330 = "But, when I'm holding it... I look like a kid having fun at an amusement parks... Haha."
10077-340 = "Oh! This isn't mine though! It's just... One thing led to another, and..."
10077-350 = "Well, uh... Yes, that's it... How did you know?"
10077-360 = "Huh...? Am I really that easy to read?"
10077-370 = "Ah. Well, whatever... You know, I've never seen you from this angle before."
10077-380 = "It's a whole new perspective. Everything looks...different."
10077-390 = "It's kinda fun."
10077-400 = "I think I like it! Haha!"
10077-2600 = "What should I say...? I'm thankful that you're treating me so kindly, but I don't know if I deserve it... Still... I'm happy. Really."

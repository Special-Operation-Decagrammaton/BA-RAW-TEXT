[translation]
26004-20 = "책에 담긴 이야기처럼\n우리의 이야기가 시작됩니다!"
26004-30 = "책이 부족해 보여요.\n책장을 가득 채워야겠네요."
26004-40 = "와. 책보기 딱 좋은 방이네요."
26004-50 = "앗. 이 책 못 봤던 건데!"
26004-60 = "후후후후훗!\n플래그가 섰다고요~"
26004-70 = "헤헤. 헤헤헤!\n좋은 생각이 떠올랐어요!"
26004-80 = "어서 오세요 선생님!\n전에 드린 책은 읽어보셨어요?"
26004-90 = "오늘은 어떤 책을\n추천해드릴까요?"
26004-100 = "용돈을 받으면 일단 책을 사요.\n옷이나 음식은 그다음이죠."
26004-110 = "어떤 책을 좋아하냐고요?\n음… 전 가리지 않고 다 읽으니…"
26004-120 = "선생님, 그 책은 추천하고 싶지 않네요.\n거기서부터 4페이지 뒤에\n주인공이 허무하게 죽거든요."
26004-130 = "…어, 제가 스포했나요?"
26004-140 = "여기에도 좀 더 책이\n많으면 좋을 거 같은데…\n제가 몇 권 추천해드릴까요?"
26004-150 = "다들 조금 더 책을\n많이 읽었으면 좋겠는데…"
26004-160 = "생일 축하드려요. 선생님!\n원하시는 책이 있다면,\n뭐든 말씀해 주세요!"
26004-170 = "후훗. 저도 책은 정말 좋아하지만…\n생일 때마다 오직 책만 받으니,\n좀 아쉽네요."
26004-180 = "오늘은 선생님께\n특별한 선물을 받고 싶어요!"
26004-190 = "새해 복 많이 받으세요!\n올 한 해도 잘 부탁드려요."
26004-200 = "메리 크리스마스~\n선생님, 오늘은 정말 특별한 날이에요!"
26004-210 = "이런 날에 선생님과 함께 있으니…\n…기쁘네요, 헤헤!"
26004-220 = "할로윈이 시작되었어요, 후훗!\n괴기소설이나 납량소설의\n특집을 준비해야겠네요."
26004-240 = "그…… 우, 우연이네요.\n하필이면 딱 이렇게……"
26004-250 = "먼저 찾아서 선생님께\n알려드리려고 했는데……"
26004-260 = "……아뇨.\n그래도 먼저 집은 건\n저니까요. 그렇죠?"
26004-270 = "음~. 어떻게 할까~.\n정 필요하시다면\n양보해 드릴 수도……"
26004-280 = "……농담이에요."
26004-290 = "대여기록만 찍고 바로 드릴게요.\n찾을 수 있어서 다행이었네요."
26004-300 = "어때요?\n도서관에서의 이런 시간도……\n나름대로 즐겁지 않나요?"
26004-310 = "다른 곳에서는\n맛볼 수 없는 거니까……\n여기서만의 일이랄까……"
26004-320 = "그러니 앞으로도,\n필요하시다면 언제든\n찾아와 주세요."
26004-330 = "저……\n기다리고 있을게요!"
26004-2600 = "후후. 책 반납을 연체하신 분들은 각오해 주세요."

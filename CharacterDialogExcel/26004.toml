[translation]
26004-20 = "We've turned the first page of our story!"
26004-30 = "I don't see enough books here. You need to stuff that bookshelf."
26004-40 = "Oooh. This room is perfect for reading."
26004-50 = "Oh, I've never seen this book before!"
26004-60 = "Heh heh heh! Everything's coming together!"
26004-70 = "Heehee! I have an idea!"
26004-80 = "Welcome, Sensei! Did you read the book I gave you?"
26004-90 = "What kind of book shall I recommend to you today?"
26004-100 = "Whenever I have spending money, I buy a book first. Clothes or food are secondary."
26004-110 = "What kinds of books do I like? Hmm... I'm not choosy when it comes to reading."
26004-120 = "Sensei, I wouldn't recommend that book. Four pages from where you are, the main character dies in vain."
26004-130 = "...Whoops Was that a spoiler?"
26004-140 = "It'd be nice if there were more books here. Can I recommend a few?"
26004-150 = "I wish people would read a little more..."
26004-160 = "Happy birthday, Sensei! Please let me know if there are any books you're interested in!"
26004-170 = "Heehee, I love books, but...they're all I get on my birthday, it feels like sort of a letdown."
26004-180 = "Today, I'd like to get a special gift from you!"
26004-190 = "Happy New Year! I'll be counting on you in the months to come."
26004-200 = "Merry Christmas! Today's a special day, Sensei!"
26004-210 = "I'm so glad we can spend time together on a day like this... Teehee."
26004-220 = "Halloween is almost here! I'll have to pick out a special mystery or horror novel."
26004-240 = "Wh-What a coincidence."
26004-250 = "I was trying to find it first, for Sensei."
26004-260 = "And it looks like I won! Heehee."
26004-270 = "Hm, should I let you have it?"
26004-280 = "...I'm kidding."
26004-290 = "I'll make a record of the rental and give it to you. I'm happy you found it."
26004-300 = "How was it? Did you enjoy your time at the library?"
26004-310 = "There's no place like this library. I think it's a really unique experience."
26004-320 = "Please come anytime you need anything."
26004-330 = "I'll be waiting!"
26004-2600 = "Heeheehee. Those who have overdue books are in big trouble now."

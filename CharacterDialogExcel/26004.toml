[translation]
26004-20 = "就像書中的故事一樣，\n我們的故事，開始了！"
26004-30 = "書還不夠呢。\n得擺滿書櫃才行。"
26004-40 = "哇，對看書來說，\n這個房間最適合了呢。"
26004-50 = "啊，這本書我還沒看過！"
26004-60 = "呵呵呵！\nFlag立起來了唷～"
26004-70 = "呵呵，哈哈！\n浮現了一個不錯的想法！"
26004-80 = "歡迎回來，老師！\n之前給你的書，有看了嗎？"
26004-90 = "今天要推薦\n什麼樣的書呢？"
26004-100 = "拿到零用錢的話就會先買書，\n再來才是衣服或食物。"
26004-110 = "我喜歡哪種書，是嗎？\n唔嗯……我沒有特別的喜好\n全部的書都看……"
26004-120 = "老師，那本書\n我並不推薦唷。\n因為從那邊開始4頁之後\n主角會死得不明不白。"
26004-130 = "……咦，我劇透了嗎？"
26004-140 = "這裡也再多放一點\n書比較好吧……\n要不要我拿幾本\n推薦的書過來呢？"
26004-150 = "希望大家能看更多的書……"
26004-160 = "祝你生日快樂，老師！\n如果有想要的書，\n儘管說吧！"
26004-170 = "呵呵。雖然我\n打從心底喜歡書……\n但每次生日都只收到書，\n還是覺得有點遺憾。"
26004-180 = "今天想要收到老師\n特別的禮物！"
26004-190 = "新年快樂！\n今年也拜託你了。"
26004-200 = "聖誕快樂～\n老師，今天是很特別的日子唷！"
26004-210 = "這樣的日子能和老師在一起…\n我很開心，嘿嘿！"
26004-220 = "萬聖節開始了！\n呵呵，看來要準備詭異小說\n或是恐怖小說特輯才行呢。"
26004-240 = "那個……真，真巧呢。\n沒想到居然會剛好同時……"
26004-250 = "本來想先找到，\n然後再向老師\n報告的……"
26004-260 = "……不。\n先摸到書的人或許\n是我……對吧？"
26004-270 = "唔嗯，該怎麼做呢～\n如果你說無論如何\n都想要的話，\n讓給你也不是不行……"
26004-280 = "……我是開玩笑的。"
26004-290 = "等我寫好借書紀錄後，\n馬上就拿給你。\n能順利找到真是太好了。"
26004-300 = "怎麼樣呀？\n在圖書館的這種時間……\n不覺得很開心嗎？"
26004-310 = "該說是其他地方\n體驗不到的呢，還是\n該說是這裡獨有的呢……"
26004-320 = "……所以，今後也請務必，\n在喜歡的時候來這裡哦。"
26004-330 = "……我，會等著你的！"
26004-2600 = "呵呵。逾期還書的人\n請做好覺悟哦。"

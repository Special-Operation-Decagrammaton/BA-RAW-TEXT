[translation]
20041-10 = "블루, 아카이브"
20041-20 = "밀레니엄 사이언스 스쿨, \n세미나의 츠카츠키 리오야.\n가장 합리적인 답을 제시해 줄게."
20041-30 = "이곳의 배치를\n보다 합리적으로\n설정하려면……"
20041-40 = "저 물건,\n과연 필요한 걸까……"
20041-50 = "카페인이 필요하다면\n캡슐로 섭취하면 될 텐데."
20041-60 = "최대 다수의\n최대 행복……\n여기에도 적용되려나……"
20041-70 = "……붐비는 곳은\n피하도록 하자."
20041-80 = "어서 와. 선생."
20041-90 = "나도 방금 도착했어."
20041-100 = "후후. 합리적으로\n동선을 산정한 결과야."
20041-110 = "딱 맞춰 왔네, 선생."
20041-120 = "이게 오늘 스케쥴이야.\n참고해 줘."
20041-130 = "합리적인 것이 가장 효율적인"
20041-140 = "것이라고 생각하고 있었지만……"
20041-150 = "지금은, 꼭 그렇지만도\n않은 것 같아."
20041-160 = "밤하늘을 올려다본\n적이 있어, 선생?"
20041-170 = "별빛은 모두, 생각보다\n더 엄청난 과거에서 온 것이지."
20041-180 = "그러니까 밤하늘을\n올려다볼 때 우리는,"
20041-190 = "과거와 현재를 동시에\n경험하게 되는 거야."
20041-200 = "……그렇지만 거기에도,"
20041-210 = "미래는 보이지 않지만."
20041-220 = "미래라는 건 불확정 요소의\n덩어리라고 할 수 있지."
20041-230 = "그것을 불안 요소로 받아들일지,"
20041-240 = "가능성으로써\n희망을 가져야 할지……"
20041-250 = "아직도 해답을\n내지 못하고 있어."
20041-260 = "하지만……"
20041-270 = "그 미래에 당신이 있다면……"
20041-280 = "다른 가설을 세울 수 있을지도\n모르겠다는 생각이 들어."
20041-290 = "만일 밀레니엄 학생들 중\n누군가가 샬레에 오게 된다면,"
20041-300 = "꼭 일정을 공유해 주었으면 해."
20041-310 = "약속, 해 줄 수 있지……?"
20041-320 = "산책이라도 나가자고?"
20041-330 = "아니야. 그건\n비합리적인 행동이야."
20041-340 = "무엇보다 위험해."
20041-350 = "그러니까 여기에서,\n쭉 같이 있자."
20041-360 = "……왜 갑자기 내가\n부끄러워지지? 나 뭔가\n이상한 말이라도 했어……?"
20041-370 = "생일 축하해. 선생.\n당신이라는 가능성이\n세계와 마주한 기념일이네."
20041-380 = "생일 축하…… 사실 지금까지\n그다지 받아 본 적 없었어."
20041-390 = "이런…… 기분이었구나."
20041-400 = "고마워. 선생. 진심으로."
20041-410 = "'1년이 시작한다'는\n개념 자체가 비합리적이야."
20041-420 = "계절이 한번 돈 것뿐이지."
20041-430 = "그래도, 뭐.\n사회 통념이라는 것에 따라…"
20041-440 = "새해 복 많이 받아. 선생."
20041-450 = "크리스마스…… 정말\n하나도 모르겠어.\n기념일이라는 건 도대체……"
20041-460 = "어? 선물? 날 위해서?"
20041-470 = "그, 고마워, 선생."
20041-480 = "……전혀 논리는 모르겠지만.\n호의는 받아둘게."
20041-490 = "분장을 하고\n사탕을 요구하는 날이라니,"
20041-500 = "의미를 모르겠어."
20041-510 = "하지만 선생이라면……"
20041-520 = "트릭 오어 트릿."
20041-530 = "어때? 후후."
20041-550 = "이런 일을 하기 위해서,\n당신을 부른 건 아니었지만……"
20041-560 = "직접 할 거야.\n선생은 앉아 있도록 해."
20041-570 = "서, 선생은 자신의 위치에\n대해서 자각할 필요가 있어."
20041-580 = "이런 걸로 시간을\n낭비하는 건 비합리적이야."
20041-590 = "다른 중요한 일들이 더 많잖아?"
20041-600 = "무, 무슨…… 말을……"
20041-610 = "나를, '보살핀다'……?!"
20041-620 = "이…… 이해할 수 없어.\n그런……"
20041-630 = "……하긴. 당신은 늘 그랬지."
20041-640 = "……알았어."
20041-650 = "그렇다면 끝까지 받도록 할게."
20041-660 = "당신의 그……\n'보살핌'이라는 거."
20041-2600 = "사격은 서투르지만…… \n키보토스에서 총이 없다는 건, 비합리적이니까.\n나 자신 정도는 지켜 보이도록 할게.\n그리고 선생까지도."

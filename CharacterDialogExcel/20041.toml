[translation]
20041-10 = "Blue, Archive"
20041-20 = "Tsukatsuki Rio, from Millennium Science School's Seminar. I'll provide you with the most rational approach to every issue."
20041-30 = "To optimize the layout here..."
20041-40 = "...Are you sure that thing needs to be right there?"
20041-50 = "If you need caffeine, you could always take supplements."
20041-60 = "\"The greatest good for the greatest number...\" I wonder if that applies here too..."
20041-70 = "...Let's avoid any crowded places."
20041-80 = "Welcome, Sensei."
20041-90 = "I just got here myself."
20041-100 = "Fufu. I calculated the most efficient, logical path."
20041-110 = "Just in time, Sensei."
20041-120 = "This is today's schedule. Please take note of it."
20041-130 = "I thought that being rational..."
20041-140 = "...meant maximum efficiency."
20041-150 = "But now, I don't think that's always the case."
20041-160 = "Have you ever gazed at the stars, Sensei?"
20041-170 = "The stars' light comes from the past, farther back than you can imagine."
20041-180 = "So when we stare at the night sky..."
20041-190 = "...we're experiencing past and present at the same time."
20041-200 = "Although we can't..."
20041-210 = "...see the future in them."
20041-220 = "The future is like a cloud of uncertainty."
20041-230 = "Whether to be anxious about that..."
20041-240 = "...or to celebrate its potential..."
20041-250 = "I haven't been able to answer that yet."
20041-260 = "But..."
20041-270 = "If you're in that future..."
20041-280 = "I think I can at least refine my hypothesis."
20041-290 = "If any of the Millennium students end up coming to Schale..."
20041-300 = "...please share their schedule with me."
20041-310 = "Do you promise?"
20041-320 = "Out for a walk?"
20041-330 = "No. That's an irrational act."
20041-340 = "More than that, it's dangerous."
20041-350 = "So let's just stay here together forever."
20041-360 = "...Why am I suddenly feeling embarrassed? Did I say something weird...?"
20041-370 = "Happy birthday, Sensei. Today's the day you arrived in the world, all full of potential."
20041-380 = "Birthday wishes... I don't usually get very many of those."
20041-390 = "So this... This is how it feels."
20041-400 = "Thank you, Sensei. I mean it."
20041-410 = "The whole concept of a \"new year\" is irrational in itself."
20041-420 = "Seasons cycle, that's all."
20041-430 = "But, well...since it's a social norm..."
20041-440 = "Happy New Year, Sensei."
20041-450 = "I...really don't understand Christmas. Just what are holidays...?"
20041-460 = "What? A present? For me?"
20041-470 = "Um, thank you, Sensei."
20041-480 = "...I don't understand the logic at all. But I'll accept your kindness."
20041-490 = "A day for wearing costumes and demanding candy..."
20041-500 = "I don't get the meaning of it."
20041-510 = "But if it's you, Sensei..."
20041-520 = "Trick or treat."
20041-530 = "How is it? Fufu."
20041-550 = "This wasn't the reason I called you..."
20041-560 = "I'll do it myself. You should sit down."
20041-570 = "S-Sensei, you really ought to be more aware of your position."
20041-580 = "It's irrational to waste time on this."
20041-590 = "Aren't there many more important things for you to do?"
20041-600 = "Wh-What are you...saying...?"
20041-610 = "Taking care of me...?!"
20041-620 = "I...I don't understand. That's..."
20041-630 = "Well...you've always been that kind of person."
20041-640 = "...Okay."
20041-650 = "I'll accept it all, then."
20041-660 = "Your...\"taking care,\" I mean."
20041-2600 = "I'm not a great shot...but it's irrational to not have a gun in Kivotos. I'll try to protect myself, at least. And you too, Sensei."

[translation]
20041-10 = "Blue Archive"
20041-20 = "สึคัตสึกิ ริโอะ สังกัดเซมิน่าแห่งโรงเรียนวิทย์มิลเลเนียม\nฉันจะหาคำตอบที่สมเหตุสมผลที่สุดให้เอง"
20041-30 = "ถ้าจะจัดระเบียบ\nที่แห่งนี้ให้\nสมเหตุสมผลขึ้น..."
20041-40 = "ของอันนั้น\nมันจำเป็นจริงๆ เหรอ..."
20041-50 = "ถ้าต้องการคาเฟอีน\nก็กินแบบแคปซูลก็ได้"
20041-60 = "ความสุขที่มากที่สุด\nของคนจำนวนมากที่สุด...\nใช้ได้กับที่นี่ด้วยมั้ยนะ..."
20041-70 = "หลีกเลี่ยงสถานที่\nที่แออัดกันเถอะ..."
20041-80 = "มาแล้วเหรอ ครู"
20041-90 = "ฉันก็เพิ่งมาถึงเหมือนกัน"
20041-100 = "ฮุฮุ เป็นผลลัพธ์จากการ\nเลือกเส้นทางที่สมเหตุสมผลน่ะ"
20041-110 = "มาพอดีเลยนะ ครู"
20041-120 = "นี่คือตารางของวันนี้\nช่วยดูให้ทีสิ"
20041-130 = "ฉันเคยคิดว่าความสมเหตุสมผล"
20041-140 = "คือสิ่งที่มีประสิทธิภาพที่สุด..."
20041-150 = "แต่ว่าตอนนี้ ดูจะไม่ต้อง\nเป็นอย่างนั้นตลอดก็ได้"
20041-160 = "ครูเคยเงยหน้ามอง\nท้องฟ้ายามค่ำคืนหรือเปล่า?"
20041-170 = "แสงดาวทั้งหมดมาจากอดีต\nอันไกลโพ้นเกินคาดเลยละ"
20041-180 = "เพราะงั้นพวกเราที่มอง\nท้องฟ้ายามค่ำคืน "
20041-190 = "ก็กำลังอยู่กับอดีต\nและปัจจุบันไปพร้อมๆ กัน"
20041-200 = "ถึงแม้ว่าที่นั่น..."
20041-210 = "จะไม่เห็นอนาคตก็เถอะ"
20041-220 = "แต่อนาคตก็เรียกได้ว่าเป็น\nกลุ่มก้อนของปัจจัยที่ไม่แน่นอน"
20041-230 = "เราควรเอามาเป็นความกังวล"
20041-240 = "หรือว่าเอามาเป็นความหวัง\nตามความเป็นไปได้..."
20041-250 = "ตอนนี้ฉันยัง\nหาคำตอบไม่ได้เลย"
20041-260 = "แต่ว่า..."
20041-270 = "ถ้าในอนาคตนั้นมีคุณอยู่ด้วย "
20041-280 = "ฉันว่าก็อาจจะตั้ง\nสมมติฐานอื่นได้ก็เป็นได้"
20041-290 = "ถ้ามีนักเรียนมิลเลเนียม\nคนไหนมาที่ชาเล่ต์ละก็"
20041-300 = "ฉันอยากให้ครูบอกตารางหน่อย"
20041-310 = "สัญญา... กันได้ใช่มั้ย...?"
20041-320 = "จะชวนไปเดินเล่นงั้นเหรอ?"
20041-330 = "ไม่ได้หรอก นั่นเป็นการกระทำ\nที่ไม่สมเหตุสมผลน่ะ "
20041-340 = "ที่สำคัญคือมันอันตราย"
20041-350 = "เพราะงั้นเราอยู่ที่นี่\nด้วยกันไปเรื่อยๆ เถอะ"
20041-360 = "ทำไมจู่ๆ ถึง\nรู้สึกเขินขึ้นมาล่ะ...? หรือว่า\nฉันพูดอะไรแปลกๆ ออกไป...?"
20041-370 = "สุขสันต์วันเกิดนะ ครู\nเป็นวันที่ความเป็นไปได้\nที่เรียกว่าคุณได้เกิดขึ้นบนโลกสินะ"
20041-380 = "อวยพรวันเกิดเหรอ... ที่จริงแล้ว\nฉันไม่เคยได้รับมาก่อนเลย"
20041-390 = "มันเป็น... ความรู้สึกแบบนี้สินะ"
20041-400 = "ขอบคุณจริงๆ นะ ครู "
20041-410 = "แนวคิดที่ว่า 'เริ่มอีกปีแล้ว'\nมันไม่สมเหตุสมผลเลย"
20041-420 = "มันก็แค่เปลี่ยนฤดูกาลอีกรอบเอง"
20041-430 = "แต่ก็นะ คงต้องยึดตาม\nบรรทัดฐานทางสังคม..."
20041-440 = "สวัสดีปีใหม่นะ ครู"
20041-450 = "คริสต์มาส...\nฉันไม่รู้จักเทศกาลนี้เลย\nวันเทศกาลคืออะไรกันนะ..."
20041-460 = "หืม? ของขวัญ? ให้ฉันเหรอ?"
20041-470 = "ขะ... ขอบคุณนะครู"
20041-480 = "ถึงจะไม่เข้าใจตรรกะเลย...\nแต่ฉันจะรับความปรารถนาดีไว้แล้วกัน"
20041-490 = "วันที่แต่งคอสเพลย์\nแล้วขอลูกกวาดกินเนี่ยนะ"
20041-500 = "ไม่เห็นเข้าใจความหมายเลย "
20041-510 = "แต่ถ้าเป็นครูแล้ว..."
20041-520 = "จะทริกออร์ทรีตล่ะ?"
20041-530 = "เป็นยังไงล่ะ? ฮุฮุ"
20041-550 = "ฉันไม่ได้เรียกครูมา...\nด้วยจุดประสงค์แบบนี้สักหน่อย..."
20041-560 = "ถ้าจะพูดถึงขนาดนั้น\nให้ฉันเก็บกวาดเองก็ได้นะ"
20041-570 = "คะ... ครูต้องตระหนักถึง\nตำแหน่งของตัวเองบ้างสิ"
20041-580 = "คุณน่ะ มีงานที่\nสำคัญกว่านี้ตั้งเยอะ"
20041-590 = "มาเสียเวลากับเรื่องแบบนี้\nมันไม่สมเหตุสมผลเลยนะ"
20041-600 = "พะ... พูดอะไรแบบนั้น..."
20041-610 = "บอกว่า... ดูแลฉันงั้นเหรอ?!"
20041-620 = "มะ... ไม่เห็นจะเข้าใจเลย\nแต่ถึงจะไม่เข้าใจก็เถอะ..."
20041-630 = "แต่ก็นะ... ก็คุณเป็น\nคนแบบนี้อยู่ตลอดนี่นา"
20041-640 = "งั้นก็ได้..."
20041-650 = "งั้นฉันจะขอรับไว้ละนะ"
20041-660 = "การดูแล'... จากคุณน่ะ"
20041-2600 = "ถึงฉันจะไม่ถนัดยิงปืน...\nแต่การไม่พกปืนในคิโวทอส\nคือเรื่องไม่สมเหตุสมผล\nฉันจะลองปกป้องตัวเองดู\nแล้วก็ครูด้วย"

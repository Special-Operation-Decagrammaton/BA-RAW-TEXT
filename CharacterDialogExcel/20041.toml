[translation]
20041-10 = "蔚藍，檔案。"
20041-20 = "我是千年科學學園，\n研討會的調月莉央。\n最合理的答案，就由我來向你提示。"
20041-30 = "要追求合理的\n配置的話……"
20041-40 = "那個東西，感覺\n欠缺實用性……"
20041-50 = "咖啡因不是只要藉由\n膠囊攝取就好了嗎？"
20041-60 = "最大多數的\n最大幸福……\n在這裡也能適用嗎……"
20041-70 = "……避開\n人多的地方吧。"
20041-80 = "歡迎回來，老師。\n我也是剛剛才到。"
20041-90 = "我計算了老師抵達的時機……"
20041-100 = "看來結果並沒有錯呢。"
20041-110 = "相當準時呢，老師。"
20041-120 = "這是今天的行程表。\n麻煩你過目一下吧。"
20041-130 = "我認為追求合理\n就能帶來最大效率。"
20041-140 = "但絕對沒有那麼簡單吧。"
20041-150 = "是你讓我產生了這種想法。"
20041-160 = "老師，你有\n仰望過夜空嗎？"
20041-170 = "星星的光，\n全都來自於過去。"
20041-180 = "換言之──\n當我們觀察星星的時候，"
20041-190 = "可以說是同時捕捉了\n「過去」與「現在」呢。"
20041-200 = "……但即使如此，"
20041-210 = "「未來」依舊\n是無法觀測的。"
20041-220 = "所謂的「未來」就是\n不確定因素的集合體。"
20041-230 = "是該為其感到擔憂，"
20041-240 = "還是抱著希望\n將其視為可能性……"
20041-250 = "我始終沒能給出答案。"
20041-260 = "不過……"
20041-270 = "如果那個未來有你在……"
20041-280 = "也許能建立\n不同的假設也說不定呢。"
20041-290 = "當千年的學生\n造訪夏萊的時候，"
20041-300 = "麻煩將日程分享給我。"
20041-310 = "拜託你了。"
20041-320 = "現在去散步……？"
20041-330 = "恕我拒絕。\n這是不合理的行動。"
20041-340 = "而且會有危險。"
20041-350 = "不要離開我。\n今後也一直待在我身邊吧。"
20041-360 = "我，我……是不是\n說了什麼不適當的話……？"
20041-370 = "是像你這樣的可能性\n降生於世界的紀念日呢。\n……祝你生日快樂，老師。"
20041-380 = "生日……其實我\n至今都不太能習慣。"
20041-390 = "不過……原來\n會產生這種感受啊。"
20041-400 = "……謝謝你，老師。"
20041-410 = "「一年開始了」這個\n概念本身是不合理的。"
20041-420 = "不過是季節輪轉一次而已。"
20041-430 = "……不過，我也理解\n不能無視社會的規範意識。"
20041-440 = "新年快樂，老師。"
20041-450 = "……真是無法理解。聖誕節？\n所謂的紀念日，究竟……"
20041-460 = "禮物……？要給我……？"
20041-470 = "那個，謝謝你，老師。"
20041-480 = "……雖然這完全不合邏輯。\n但我就接受你的好意吧。"
20041-490 = "變裝後要求別人給糖什麼的……"
20041-500 = "雖然我還是無法理解……"
20041-510 = "但對象是老師的話……\n好吧……？"
20041-520 = "Trick or Treat。"
20041-530 = "……呵呵。"
20041-550 = "我並不是為了\n讓你做這種事，\n才請你過來的……"
20041-560 = "我自己來就行了。\n老師你請坐吧。"
20041-570 = "你，你應該更有\n身為老師的自覺才對。"
20041-580 = "為了這種事浪費時間\n是不合理的。"
20041-590 = "你還有其他更重要的工作吧？"
20041-600 = "……！\n你，你在說什麼……"
20041-610 = "「照顧」我……！？"
20041-620 = "我……我不太能理解……\n不過……"
20041-630 = "……你，就是這樣的人呢。"
20041-640 = "……知道了。"
20041-650 = "我就接受到最後吧。"
20041-660 = "接受你……\n所謂的「照顧」。"
20041-2600 = "雖然我不擅長射擊……\n但我會保護好自己的。\n還有……老師你也是。"

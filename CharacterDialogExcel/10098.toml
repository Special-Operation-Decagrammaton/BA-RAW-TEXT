10098-610 = "ออกไปข้างนอกกันมั้ย ครู?"
10098-630 = "อ่า... เวลาผ่านไป\nขนาดนี้แล้วเหรอเนี่ย"
10098-640 = "ถ้าแบบนี้ คงจะต้อง\nรออยู่เฉยๆ จนกว่า\nพระอาทิตย์จะขึ้นแล้วสินะ"
10098-650 = "หืม?"
10098-660 = "โธ่เอ๊ย... ต้องมาอยู่\nกับลุงแก่ๆ แบบนี้\nมีอะไรน่าสนุกกันเล่า"
10098-670 = "อะ...อะแหะๆ~ ยังไม่เลิก\nพูดแบบนั้นอีกงั้นเหรอ..."
10098-680 = "ตาลุงคนนี้...\nก็เขินอยู่หน่อยๆ นะ~"
10098-690 = "เอาเถอะ... ถ้าเกิดว่า\nครูอยากจะเป็นไซคิกละก็\nลุงจะยอมเล่นด้วยก็แล้วกัน"
10098-700 = "ถ้างั้นเรามากินมื้อค่ำแบบง่ายๆ\nของฮีโร่กับไซคิกกัน\n...ถึงจะเป็นแค่อาหารฉุกเฉินก็เถอะ"
10098-710 = "ก็นะ เรื่องนั้นมันก็ใช่อยู่หรอก..."
10098-720 = "แต่ลุงน่ะ\nชอบของพวกนี้นะ\nยอมๆ ให้หน่อยเถอะน่า~"
10098-2600 = "ถ้าต้องการความแข็งแกร่งของลุงคนนี้\nก็บอกได้ตลอดเลยนะ\nเพราะครูสำคัญที่สุดเสมอๆ ยังไงล่ะ"

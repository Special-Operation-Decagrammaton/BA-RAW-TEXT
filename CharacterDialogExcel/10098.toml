[translation]
10098-10 = "Blue Archive."
10098-20 = "Oh my... Things have snowballed! This... I'm going to have to help."
10098-30 = "(Cover...check. Exit...check.)"
10098-40 = "Should I check the ammo first?"
10098-50 = "Eh... I don't feel comfortable... I might miss Sensei at times like these..."
10098-60 = "This hairstyle is convenient for me...but I hope it doesn't look strange."
10098-70 = "I...don't feel like taking a nap today."
10098-80 = "Ooh, Sensei! Good work!"
10098-90 = "How was the trip here? Did anyone follow you?"
10098-100 = "Good luck with your work day, Sensei."
10098-110 = "This old-timer will be watching."
10098-120 = "Hmm... Does Sensei like this kind of outfit?"
10098-130 = "Hmm... I'm not sure..."
10098-140 = "I always carry candy around with me. Sugar levels matter! Sensei, do you need one too?"
10098-150 = "Ugh... Argh."
10098-160 = "Excuse me, Sensei. Could you massage my shoulders?"
10098-170 = "Wearing this is making me feel stiff."
10098-180 = "Standing with your back to the wall is fundamental in indoor warfare!"
10098-190 = "Right there, just like that. It's quite useful, so keep it in mind!"
10098-200 = "Sensei, are you working overnight?"
10098-210 = "Here, have some warm coffee."
10098-220 = "It'll get you ready for nighttime combat."
10098-230 = "Happy birthday, Sensei!"

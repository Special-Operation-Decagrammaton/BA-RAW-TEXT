[translation]
10098-10 = "블루 아카이브."
10098-20 = "이야~ 일이 커져 버렸네~ 이건…\n아저씨가 나서지 않으면 안 되겠어."
10098-30 = "(엄폐물… 체크.\n출입구… 체크.)"
10098-40 = "우선은 탄약부터\n점검할까."
10098-50 = "으헤… 마음이\n편치 않네… 이럴 때는\n선생이 보고 싶을지도…"
10098-60 = "이 헤어스타일, 편하긴 한데…\n이상하게 보이지는\n않으려나?"
10098-70 = "오늘은 낮잠 잘 생각이…\n들지 않네."
10098-80 = "오, 선생, 수고했어~"
10098-90 = "오는 길에 괜찮았어~?\n미행 같은 건 없었고?"
10098-100 = "오늘 업무도 힘내, 선생."
10098-110 = "아저씨가 지켜볼 테니까."
10098-120 = "어라, 선생님은\n이런 복장이 좋은가…"
10098-130 = "음… 아저씨는\n잘 모르겠는걸…"
10098-140 = "당분은 중요하니까~\n사탕을 가지고 다니거든.\n선생도 하나, 필요해?"
10098-150 = "으읏… 읏차."
10098-160 = "선생, 미안한데,\n마사지 좀\n부탁해도 될까나?"
10098-170 = "이 차림으로 있자니\n어깨가 결려서 말이야."
10098-180 = "벽을 등진다.\n이게 실내전의 기본이지~."
10098-190 = "맞아, 지금 그 위치.\n나름 유용하니까\n기억해 두라고~"
10098-200 = "선생, 오늘도 야근?"
10098-210 = "자, 따뜻한 커피야."
10098-220 = "이걸로 야간전에 대비해."
10098-230 = "선생, 생일 축하해~"
10098-240 = "선물은… 음,"
10098-250 = "내 총이라도 만져 볼래~?"
10098-260 = "아, 내 생일이구나?\n나는 별생각 없지만…"
10098-270 = "선생이 기억해 주는 건…\n조금 기쁠지도."
10098-280 = "새해 복 많이 받으라구,\n선생."
10098-290 = "올해는 선생님도 나도,\n느긋하게 지낼 수\n있으면 좋겠네~"
10098-300 = "크리스마스 선물이라…"
10098-310 = "받는다면, 총 정비 세트가 좋겠다."
10098-320 = "슬슬 새로 샀으면 좋겠다고\n생각하고 있거든~"
10098-330 = "으헤~ 오늘이라면,\n이런 복장도 평범해 보일까?"
10098-340 = "선생, 같이 나가보지 않을래~?"

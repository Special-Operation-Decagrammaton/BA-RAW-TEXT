[translation]
10098-10 = "蔚藍檔案。"
10098-20 = "哎呀～事情大條了呢……\n這下……大叔我不得不出馬了呢。"
10098-30 = "（掩蔽物……確認。\n　出入口……確認）"
10098-40 = "總之，先\n確認彈藥吧。"
10098-50 = "唔嘿……\n有點靜不下來呢……\n這種時候，好像有點\n想見到老師……"
10098-60 = "這個髮型，確實是\n挺方便的沒錯……\n不會怪怪的嗎？"
10098-70 = "今天不太想睡午覺啊……"
10098-80 = "哦～老師，辛苦了～"
10098-90 = "來的路上還好嗎～？\n沒有人跟蹤你吧～？"
10098-100 = "老師～今天工作也加油哦～"
10098-110 = "大叔我會好～好\n看著你的唷？"
10098-120 = "咦，老師喜歡\n這種打扮嗎……"
10098-130 = "唔嗯……大叔我\n有點無法理解……"
10098-140 = "糖分是很重要的哦～\n所以我都會隨身帶著糖果～\n老師要不要也來一顆？"
10098-150 = "嗯～哈啊。"
10098-160 = "老師～不好意思，\n能請你幫我按摩一下嗎～？"
10098-170 = "打扮成這副模樣，\n肩膀很快就僵硬了。"
10098-180 = "背要緊貼牆壁。\n這是室內戰的基本哦～"
10098-190 = "沒錯，就是現在那個位置。\n還算是挺管用的，\n所以要記好喔～"
10098-200 = "老師今天也要加班嗎～？"
10098-210 = "來，熱咖啡。"
10098-220 = "用這個來迎接夜戰吧。"
10098-230 = "老師，生日快樂～"
10098-240 = "至於禮物嘛……唔嗯……"
10098-250 = "要不要摸摸看我的槍呀～？"
10098-260 = "啊啊，原來是我的生日嗎……\n其實我不是很在意的……"
10098-270 = "不過老師能夠記得……\n好像有點開心。"
10098-280 = "新年快樂，老師。"
10098-290 = "要是今年老師和我，\n都能悠悠哉哉的就好了～"
10098-300 = "聖誕禮物嗎……"
10098-310 = "如果能收到的話，\n槍的整備套裝好像不錯。"
10098-320 = "最近剛好想買套新的來換了～"
10098-330 = "唔嘿～今天的話，\n就算穿成這副模樣，\n看起來應該也很正常吧？"
10098-340 = "老師，要不要\n一起出去走走～？"
10098-350 = "哦～老師，辛苦了～"

10098-610 = "선생, 같이 나가보지 않을래~?"
10098-630 = "이야, 벌써 시간이\n이렇게 되었네."
10098-640 = "꼼짝없이 해가 뜰 때까지\n기다릴 수밖에."
10098-650 = "응?"
10098-660 = "에이에이, 이런 아저씨랑\n같이 있어 봤자\n뭐가 재밌다구."
10098-670 = "으, 으헤에~. 그 설정,\n계속 가는 것이려나…"
10098-680 = "아저씨는 조금\n부담스러울지도~."
10098-690 = "…뭐어, 선생이 사이드킥을\n하고 싶다면 맞춰주지\n못 할 것도 없지만."
10098-700 = "그럼, 히어로와 사이드킥의\n조촐한 저녁 식사야.\n…비상식량이지만."
10098-710 = "뭐어, 그건 맞지만…"
10098-720 = "아저씨는\n이런 걸 좋아한다구.\n너그럽게 봐줘~."
10098-2600 = "…아저씨의 힘이 필요하면,\n언제든지 말해줘야 해?\n선생은, 언제나 최우선이니까."

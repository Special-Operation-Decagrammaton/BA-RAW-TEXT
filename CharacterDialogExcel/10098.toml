[translation]
10098-10 = "Blue Archive"
10098-20 = "อ่า~ เรื่องลุกลามไปใหญ่โตซะแล้ว~\nลุงคนนี้คงต้องออกโรงแล้วละ"
10098-30 = "(วัตถุกำบัง... พร้อม\nทางเข้าออก...\nตรวจเรียบร้อย)"
10098-40 = "ก่อนอื่นเริ่มจาก\nตรวจสอบระเบิด\nก่อนดีมั้ยนะ"
10098-50 = "แหะๆ... ไม่ค่อยสบายใจ\nเลยแฮะ\nเวลาแบบนี้คิดถึงคุณครูจัง..."
10098-60 = "ผมทรงนี้ก็สบายดีอยู่หรอก...\nแต่ไม่ดูแปลกตาเกินไป\nใช่มั้ยนะ?"
10098-70 = "วันนี้ฉันไม่รู้สึก\nอยากนอนกลางวันเลย"
10098-80 = "โอ้ เหนื่อยหน่อยนะ ครู~"
10098-90 = "ระหว่างทางที่มา ปลอดภัยดีใช่มั้ย~?\nไม่มีใครสะกดรอยตามแน่นะ?"
10098-100 = "งานวันนี้ก็พยายามเข้านะ ครู"
10098-110 = "ลุงคนนี้จะคอยดูแลให้เอง"
10098-120 = "เอ๋ ครูชอบชุดแบบนี้งั้นเหรอ..."
10098-130 = "อืม... ลุงก็ไม่ค่อยเข้าใจ\nเท่าไรแฮะ"
10098-140 = "น้ำตาลเป็นสิ่งสำคัญนะ~\nเพราะงั้นเลยพกลูกอม\nติดตัวไปไหนมาไหนด้วย\nจะกินสักอันมั้ย ครู?"
10098-150 = "โอ๊ะ... โอ๊ย..."
10098-160 = "ครู ขอโทษนะ...\nแต่ช่วยนวดให้หน่อย\nได้รึเปล่า?"
10098-170 = "พอใส่ชุดนี้แล้ว\nมันปวดไหล่น่ะ"
10098-180 = "การหันหลังเข้ากำแพง\nเป็นพื้นฐานของการต่อสู้ในอาคารนะ~"
10098-190 = "ใช่แล้ว เพราะตำแหน่งในตอนนี้\nมันจะทำให้ได้เปรียบในทางใด\nทางหนึ่งน่ะ\nจำเอาไว้ให้ดีล่ะ~"
10098-200 = "วันนี้ก็ทำงานดึกอีกแล้วเหรอครู?"
10098-210 = "เอ้า กาแฟร้อนๆ"
10098-220 = "ใช้เจ้านี่เป็นของรับมือสำหรับ\nสงครามตอนกลางคืนซะสิ"
10098-230 = "สุขสันต์วันเกิดนะ ครู~"
10098-240 = "ของขวัญ... อืม"
10098-250 = "อยากลองจับปืนของฉันดูมั้ย~?"
10098-260 = "อ่า วันเกิดฉันเหรอเนี่ย?\nฉันไม่ได้คิดถึงเรื่องอะไร\nเป็นพิเศษหรอก..."
10098-270 = "แต่การที่ครูจำวันเกิดของฉันได้...\nมันชวนให้ดีใจอยู่นะ"
10098-280 = "ขอให้มีความสุขในวันปีใหม่นะ\nครู"
10098-290 = "ในปีนี้ขอให้ทั้งฉันและครู\nได้มีเวลาแบบสบายๆ\nแล้วกันนะ~"
10098-300 = "ของขวัญคริสต์มาส..."
10098-310 = "ถ้ามีใครให้ ก็อยากได้เป็น\nเซ็ตซ่อมบำรุงปืนน่ะ"
10098-320 = "ฉันกำลังคิดว่า\nจะซื้อใหม่เร็วๆ นี้น่ะ"
10098-330 = "แหะๆ~ ถ้าเป็นวันแบบนี้ละก็\nชุดแบบนี้ก็ดูธรรมดาๆ ใช่รึเปล่านะ?"
10098-340 = "ออกไปข้างนอกกันมั้ย ครู?"
10098-350 = "โอ้ เหนื่อยหน่อยนะ ครู~"
10098-360 = "ระหว่างทางที่มา ปลอดภัยดีใช่มั้ย~?\nไม่มีใครสะกดรอยตามแน่นะ?"

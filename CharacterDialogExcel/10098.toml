10098-630 = "哎呀～時間都\n已經這麼晚了呀。"
10098-640 = "事到如今，\n也只能等到早上了呢。"
10098-650 = "……咦？"
10098-660 = "又來了又來了～\n跟這種大叔待在一起，\n其實一點也不有趣吧～"
10098-670 = "唔，唔嘿～那個設定，\n還要堅持下去嗎……？"
10098-680 = "對大叔我來說，\n負擔好像有點重呢～"
10098-690 = "……算了，如果老師\n願意擔任夥伴職位的話……\n我就配合一下吧。"
10098-700 = "那麼，英雄和夥伴\n就來吃點簡單的晚餐吧。\n……雖然只是緊急口糧。"
10098-710 = "這個嘛，雖然那麼說也沒錯～"
10098-720 = "大叔我就是喜歡這個。\n你就體諒一下吧～"
10098-2600 = "……如果需要大叔的力量的話，\n隨時要告訴我哦？\n因為老師的事對我來說，\n永遠是最優先的。"

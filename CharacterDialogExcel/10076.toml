[translation]
10076-10 = "蔚藍！檔案！"
10076-20 = "需要解說或應援的話，\n就交給我吧！"
10076-30 = "哦哦！居然\n有這麼多人！"
10076-40 = "如果在這裡，或許\n要演講也行！？"
10076-50 = "老師的裝修……\n很有意思呢！"
10076-60 = "哦呀，那個是……！"
10076-70 = "機會難得，試著來\n找找應援看台吧？"
10076-80 = "你好，老師！\n今天一天也要加油！\n加油！……唷！"
10076-90 = "恭候多時了，老師！\n需要我的應援嗎？"
10076-100 = "……需，需要吧？"
10076-110 = "嗯？應援裝是嗎？"
10076-120 = "怎麼樣？\n可愛嗎？"
10076-130 = "唔嗯……\n雖然不知道原因……"
10076-140 = "好像有點，\n害羞的感覺……"
10076-150 = "不，不要只是一直\n盯著我看，說點什麼吧！"
10076-160 = "現在是夏萊的值日生，\n所以是為老師應援！"
10076-170 = "知道啦啦隊\n的起源嗎？"
10076-180 = "啊……這樣啊。"
10076-190 = "祝你生日快樂，\n老師！！"
10076-200 = "因為今天是特別的日子，\n所以為你帶來\n特別的表演！"
10076-210 = "我，我的生日……！？\n沒，沒想到你會記得……"
10076-220 = "我很開心，啊哈哈。"
10076-230 = "新年快樂！"
10076-240 = "老師難受的時候，\n我隨時會去應援的唷！"
10076-250 = "聖誕～快樂！！\n啊，至於聖誕節\n的由來……"
10076-260 = "哦哦，外面\n很嘈雜呢！"
10076-270 = "呼呣……大家，\n知道萬聖節\n是什麼樣的節日嗎？"
10076-290 = "咦，咦咦……？"
10076-300 = "呣，呣呣……\n手應該要……\n碰到，才對呀……？"
10076-310 = "怎麼會……！\n在這裡用力的話──！？"
10076-320 = "咿咿咿！？\n痛，痛痛痛痛痛痛痛……！！？"
10076-330 = "真，真奇怪……！\n明明有按照\n調查結果進行啊……！"
10076-340 = "雖然知道會因人而異，\n沒想到會差這麼多……"
10076-350 = "再，再來一次……\n……！？痛痛痛！\n痛啊啊啊啊啊！！"
10076-360 = "我，我已經，不行了……\n嗚嗚嗚……那，那個……\n老師，這……"
10076-370 = "這副模樣，\n本來沒打算……\n讓你看到的……"
10076-380 = "卻讓你……看到\n這麼狼狽的樣子……"
10076-390 = "嗚嗚嗚嗚……"
10076-2600 = "我來為你說明這把槍吧……！\n……呵呵，開玩笑的。\n老師已經知道了對吧。\n……這種事漸漸增加的話，\n總有一天……"

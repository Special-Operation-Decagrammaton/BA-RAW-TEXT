[translation]
10076-10 = "블루~! 아카이브!"
10076-20 = "해설과 응원이 필요하다면,\n제게 맡겨주세요!"
10076-30 = "오! 이렇게\n많은 사람들이!"
10076-40 = "여기라면 강연도\n가능할지도!"
10076-50 = "선생님의 인테리어……\n흥미롭군요!"
10076-60 = "어라, 저건……!"
10076-70 = "이왕이니\n응원할 단상을\n찾아볼까요?"
10076-80 = "오셨군요, 선생님!\n오늘 하루도 힘내라!\n힘내라! ……입니다!"
10076-90 = "기다리고 있었습니다, 선생님!\n제 응원이 필요하신가요?"
10076-100 = "……피, 필요하시죠?"
10076-110 = "음? 이 복장이요?"
10076-120 = "어떤가요?\n예쁜 것 같나요?"
10076-130 = "아, 으음…….\n뭔가, 이유는 모르겠지만"
10076-140 = "조금…….\n부끄러운 것 같기도……."
10076-150 = "그, 그렇게 보지만 말고\n뭐라도 말씀해 주세요!"
10076-160 = "지금은 샬레의 당번이니까,\n선생님만을 위한 응원이라고요!"
10076-170 = "치어리더의 기원을\n아시나요?"
10076-180 = "앗…… 그렇군요."
10076-190 = "생일 축하 드립니다,\n선생님!!"
10076-200 = "오늘은 특별한 날이니만큼,\n특별한 퍼포먼스를\n보여드릴게요!"
10076-210 = "제, 제 생일...!?\n설, 설마 기억해주고\n계실 거라고는 생각 못 했어요…"
10076-220 = "기쁘네요, 아하핫."
10076-230 = "새해 복\n많이 받으세요!"
10076-240 = "선생님이 힘들 땐,\n언제든지 응원하러 갈게요!"
10076-250 = "메리-크리스마스!!\n아, 참고로 크리스마스의\n유래는……"
10076-260 = "와, 밖이 굉장히\n소란스럽네요!"
10076-270 = "음~ 다들 할로윈이\n어떤 날인지는\n아시는 걸까요?"
10076-290 = "앗, 어라……?"
10076-300 = "음, 으음……\n팔이…… 닿아야,\n하는데……?"
10076-310 = "이럴 수가…!\n여기서 힘을 빡 주면――!?"
10076-320 = "히이익!?\n아, 아야야야야야야……!"
10076-330 = "이, 이상하네요…!\n찾아본 대로,\n하고 있는데…!"
10076-340 = "사람마다 편차가 있다는 건\n알고 있었지만,\n이 정도일 줄은……."
10076-350 = "다, 다시 한번만 더…….\n아, 아아아……!\n아야야……!!"
10076-360 = "더, 더는 무리…\n으으으… 저, 저기…\n선생님, 이건…"
10076-370 = "이런 모습을\n보여 드리려던 게\n아니었는데……."
10076-380 = "못난 모습을……\n보이고 말았어요……"
10076-390 = "으으으으……."
10076-2600 = "이 총에 대해 설명해드리죠…!\n...후후, 농담입니다.\n선생님은 이미 아시니까요.\n……이런 게 점점 늘어나면, 언젠가는…"

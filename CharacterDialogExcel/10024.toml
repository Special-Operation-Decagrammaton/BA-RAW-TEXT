[translation]
10024-10 = "蔚藍檔案"
10024-20 = "啊。嗯，正在騎行。\n老師也一起如何？首先簡單來個大約200km。"
10024-30 = "今天的平均速度……\n 嗯，感覺變快了……"
10024-40 = "嗯……\n想把汗弄乾。"
10024-50 = "下次要去看看哪裡呢……"
10024-60 = "為了不在途中累倒，\n必須攝取熱量才行。"
10024-70 = "團體騎行\n似乎也很開心……"
10024-80 = "歡迎回來，老師。\n現在要一起\n去騎行嗎？"
10024-90 = "在等你唷。\n這次要去哪裡呢？"
10024-100 = "最近在為了\n提升節奏而練習。"
10024-110 = "是在低速檔下\n將踏板踩得更快的方式唷。"
10024-120 = "最近因為委員會的活動很忙，\n所以沒有什麼騎行的時間。"
10024-130 = "所以今天打算\n久違的試著跑步。"
10024-140 = "老師要不要，\n也試試看騎行？"
10024-150 = "我會在前面擋住風\n老師跟在我身後就行了。"
10024-160 = "我想那樣的話\n肯定會很輕鬆。"
10024-170 = "雖然想買的配件有很多……\n不過只能忍耐了嗎。"
10024-180 = "畢竟自行車的配件很貴呢。"
10024-190 = "其實這件運動服，\n是和大家成對的，"
10024-200 = "但是大家說不想穿……\n總之我一個人先穿了。"
10024-210 = "今天，\n是老師的生日……？"
10024-220 = "那就當作祝賀……\n去騎行吧？"
10024-230 = "我的生日？……啊啊。\n已經到這一天了啊……\n謝，謝謝。"
10024-240 = "我知道可以看見日出的\n山岳路線。"
10024-250 = "騎一整晚，\n從山頂上看太陽昇上來。"
10024-260 = "要一起去嗎？\n海拔大約2000m。"
10024-270 = "這種日子也是自行車？嗯……\n因為也沒什麼約定……。"
10024-280 = "這樣的話，就當作\n從現在開始和老師有約定吧。"
10024-290 = "咦，去除騎行？\n唔，嗯……"
10024-300 = "啊……萬聖節……\n是今天來著嗎。"
10024-310 = "我想想……那就，\nTrick or Riding……？"
10024-330 = "……謝謝你，老師。"
10024-340 = "那個， 該怎麼說呢……"
10024-350 = "像這樣確實的\n從某人那裡得到支援，\n還是第一次……"
10024-360 = "……只要和老師在一起，\n每天都會發生新的事情呢。"
10024-370 = "（……？為什麼呢。\n心臟的聲音，停不下來……）"
10024-380 = "……真奇怪。\n這種感覺，也是第一次。"
10024-2600 = "這是為了騎行用而特別改造的輕量型個人槍械。\n因為很輕所以也能進行敏捷的戰術行動，\n當然在長距離的騎行時也不會造成負擔。"

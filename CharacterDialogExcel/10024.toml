[translation]
10024-10 = "블루 아카이브"
10024-20 = "아아, 응. 라이딩 중이었어.\n선생님도 같이 하지 않을래?\n우선 가볍게 200km 정도."
10024-30 = "오늘 평속은…\n음, 조금 빨라진 느낌…"
10024-40 = "음… 땀을\n식히고 싶은데."
10024-50 = "다음엔 어디로\n가볼까…"
10024-60 = "칼로리를\n섭취해둬야\n지치지 않아."
10024-70 = "그룹 라이딩도\n즐거울 거 같은데…"
10024-80 = "어서 와, 선생님.\n함께 라이딩 가지 않을래?"
10024-90 = "기다리고 있었어.\n이번엔 어디로 가볼까?"
10024-100 = "요즘은 케이던스를\n높이려고 연습하고 있어."
10024-110 = "저단 기어로 놓고\n페달을 더 빠르게\n돌리는 방식이지."
10024-120 = "요즘 위원회 활동으로\n바빠져서 라이딩할\n시간이 별로 없어."
10024-130 = "그래서 오늘은\n모처럼 달려보려고."
10024-140 = "선생님도 배워보지\n않을래, 라이딩?"
10024-150 = "내가 앞에서\n바람을 막아주면\n선생님이 따라오는 거야."
10024-160 = "그럼 한결 쉬울 테니까."
10024-170 = "사고 싶은 부품이 많지만…\n참을 수밖에 없어."
10024-180 = "자전거 부품은 비싸거든."
10024-190 = "사실 이 저지는\n단체로 여러 개 맞춘 건데,"
10024-200 = "모두들 입는 걸\n한사코 거부해서……\n일단은 혼자 입고 있어."
10024-210 = "오늘이 선생님의 생일……?"
10024-220 = "그럼 축하하는 의미로\n라이딩 갈래?"
10024-230 = "내 생일? ……아아.\n벌써 그렇게 됐나…\n고, 고마워."
10024-240 = "일출을 볼 수 있는\n산악 코스를 알고 있어."
10024-250 = "밤새 달리다가\n정상에서 떠오르는\n해를 보는 거야."
10024-260 = "같이 가지 않을래?\n해발 2,000m밖에\n되지 않아."
10024-270 = "이런 날에도 자전거냐고?\n음…… 딱히 약속이 없어서……"
10024-280 = "그럼 지금이라도\n선생님과 약속을\n잡아도 괜찮아."
10024-290 = "라이딩은 빼고?\n으, 으음……"
10024-300 = "아… 할로윈……\n오늘이었나."
10024-310 = "음… 그럼\n트릭 오어 라이딩……?"
10024-330 = "……고마워, 선생님."
10024-340 = "그,\n뭐라고 해야 할까……"
10024-350 = "이렇게 누군가에게\n서포트 받아보는 게\n처음이라……"
10024-360 = "……선생님과 함께\n있으면, 매일매일 새로운\n일들이 일어나네."
10024-370 = "(……? 왜지?\n심장 소리가 멈추지 않아……)"
10024-380 = "……이상하네.\n이런 것도 처음이야."
10024-2600 = "이건 라이딩용으로 특별히 개조된 경량형 개인화기야.\n가벼운만큼 좀 더 민첩한 전술행동이 가능하고.\n물론 장거리 라이딩 때에도 부담이 적지."

[translation]
10024-10 = "Blue Archive"
10024-20 = "I was just cycling. Want to join me, Sensei? It'll just be a light 200 kilometers."
10024-30 = "Today's average pace is... Hmm. Just a little faster than my average."
10024-40 = "I need to cool off."
10024-50 = "Where should we go next?"
10024-60 = "We need to fill up on calories so that we don't get tired."
10024-70 = "Group-cycling would be fun too..."
10024-80 = "Welcome, Sensei. Would you like to go cycling with me?"
10024-90 = "I was waiting for you. Where should we go today?"
10024-100 = "I've been working on improving my cadence when cycling."
10024-110 = "I heard pedaling faster while at a lower gear makes for good practice."
10024-120 = "I haven't had as much time to cycle lately due to task force work."
10024-130 = "That's why I'd like to go the distance today."
10024-140 = "Would you like to learn how to cycle, Sensei?"
10024-150 = "I can be in front and block the wind while you follow behind."
10024-160 = "That will make it much easier for you."
10024-170 = "There's lots of parts I want to buy, but I need to hold off."
10024-180 = "Bicycle parts are expensive."
10024-190 = "Actually, I made several of these jerseys hoping to go cycling as a group."
10024-200 = "But the others refused, so it's just me."
10024-210 = "It's Sensei's birthday today?"
10024-220 = "Would you like to go cycling to celebrate?"
10024-230 = "My birthday?....Oh. I suppose it is. Th-Thank you."
10024-240 = "I know a mountain course where you can see the sunrise from."
10024-250 = "We can ride through the night and watch the sunrise from the peak."
10024-260 = "Would you like to go with me? It's only 2,000 meters above sea level."
10024-270 = "Why am I cycling on a day like this? Well...I didn't have any other plans..."
10024-280 = "So I'm fine with making plans with you right now."
10024-290 = "Cycling is off limits? Hmm..."
10024-300 = "Today is Halloween?"
10024-310 = "Hmm. How about Trick-or-Cycling...?"
10024-330 = "...Thank you, Sensei."
10024-340 = "Umm, I don't know what to say, but..."
10024-350 = "I've never received support like this before..."
10024-360 = "Sensei, when I'm around you...something new happens every day."
10024-370 = "(Hmm? What's happening? My heart won't stop racing...)"
10024-380 = "Strange... This is a pretty new experience too..."
10024-2600 = "This is a lightweight personal weapon developed for riding and more agile tactics. It's great for enduring long-distance rides as well."

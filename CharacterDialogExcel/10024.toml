[translation]
10024-10 = "Blue Archive"
10024-20 = "อา... ฉันกำลังปั่นจักรยานอยู่น่ะ\nมาปั่นจักรยานด้วยกันมั้ยคุณครู?\nเริ่มจากระยะสั้นๆ 200 กิโลเมตรก่อน"
10024-30 = "ความเร็วในการปั่นวันนี้...\nอืม ดูเหมือนจะเร็วขึ้นนิดนึง..."
10024-40 = "อืม... ตอนนี้\nฉันอยากเช็ดเหงื่อออกสักหน่อย"
10024-50 = "คราวหน้า...\nไปที่ไหนดีนะ..."
10024-60 = "ไม่รู้สึกเหนื่อยหรอก\nเพราะฉันกินอาหารมา\nในแคลลอรี่ที่เหมาะสมแล้ว"
10024-70 = "ปั่นจักรยานเป็นกลุ่ม...\nก็ดูน่าสนุกเหมือนกันนะ..."
10024-80 = "เชิญเลยคุณครู \nไปปั่นจักรยานด้วยกันมั้ย?"
10024-90 = "กำลังรออยู่เลย\nคราวนี้ไปที่ไหนดีล่ะ?"
10024-100 = "ช่วงนี้ฉันกำลังฝึก\nเพื่อเพิ่มรอบขาอยู่น่ะ"
10024-110 = "ปรับเกียร์ลงเป็นเกียร์ต่ำ\nแล้วก็ใช้วิธีปั่นให้เร็วขึ้น\nยังไงล่ะ"
10024-120 = "ช่วงนี้ฉันยุ่งนิดหน่อย เพราะติด\nกิจกรรมของชมรม เลยไม่ค่อย\nจะมีเวลาปั่นจักรยานเท่าไร"
10024-130 = "เพราะงั้นวันนี้...\nฉันกะว่าจะลองปั่นจักรยานดูน่ะ"
10024-140 = "คุณครูลองหัดดูบ้างมั้ย...\nปั่นจักรยานน่ะ?"
10024-150 = "ฉันจะคอยอยู่ข้างหน้า\nบังลมให้\nคุณครูตามฉันมาก็แล้วกัน "
10024-160 = "แบบนี้น่าจะง่ายกว่า"
10024-170 = "ฉันอยากซื้ออะไหล่หลายอย่างเลย...\nแต่ก็คงต้องอดทนไว้ก่อน"
10024-180 = "อุปกรณ์ของจักรยานน่ะ\nมันแพงมากเลยนะ"
10024-190 = "ที่จริงเสื้อตัวนี้\nทำมาเพื่อใส่กันเป็นกลุ่มน่ะ... "
10024-200 = "เพราะทุกๆ คน\nบอกว่ายังไงก็ไม่ยอมใส่...\nฉันเลยใส่อยู่คนเดียว"
10024-210 = "วันเกิดงั้นเหรอ...? "
10024-220 = "ถ้างั้นเพื่อเป็นการฉลอง...\nไปขี่จักรยานกันดีมั้ย?"
10024-230 = "วันเกิดฉันเหรอ? อ่า... \nถึงวันเกิดฉันแล้วสินะ...\nขะ...ขอบคุณนะ "
10024-240 = "ฉันรู้จักเส้นทางปั่นจักรยาน\nที่จะมองเห็นพระอาทิตย์ขึ้นได้ด้วยนะ"
10024-250 = "วิ่งมาตลอดทั้งคืน แล้วก็\nได้เห็นพระอาทิตย์ขึ้น\nในตอนเช้าแค่นั้นเอง"
10024-260 = "ไปด้วยกันมั้ยล่ะ?\nสูงจากระดับน้ำทะเล\nแค่ 2000 เมตรเอง"
10024-270 = "อากาศแบบนี้ก็ปั่นจักรยานงั้นเหรอ?\nอืม... ฉันไม่มีธุระที่ไหน..."
10024-280 = "เพราะงั้นตอนนี้\nสัญญากับคุณครูไว้ก่อน\nก็คงไม่เป็นไร"
10024-290 = "ที่ไหนก็ได้เว้นแต่ปั่นจักรยานเหรอ?\nอะ...อืม..."
10024-300 = "อ่า... ฮาโลวีน...\nวันนี้แล้วเหรอ"
10024-310 = "อืม... ถ้างั้น\nทริก ออร์ ไรดิ้ง...?"
10024-330 = "อืม... ขอบคุณนะคุณครู"
10024-340 = "อา...\nต้องพูดยังไงดีนะ..."
10024-350 = "เป็นครั้งแรกเลย\nที่ได้กำลังใจจากใครแบบนี้..."
10024-360 = "ถ้าอยู่กับคุณครู...\nก็จะได้เจอเรื่องแบบนี้\nทุกวันเลยสินะ"
10024-370 = "(ทำไมกันนะ?...\nเสียงหัวใจเต้นโครมครามเลย...)"
10024-380 = "แปลกจัง\nเพิ่งเคยเป็นแบบนี้เลยล่ะ"
10024-2600 = "นี่เป็นอาวุธประจำตัวน้ำหนักเบา\nที่ดัดแปลงสำหรับการปั่นจักรยาน\nโดยเฉพาะ มีน้ำหนักเบาเลยทำให้\nปฏิบัติยุทธวิธีได้คล่องตัวมากขึ้น\nช่วยลดภาระการปั่นจักรยานระยะไกลด้วย"

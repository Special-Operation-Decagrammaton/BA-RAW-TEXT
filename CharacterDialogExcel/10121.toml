[translation]
10121-10 = "蔚藍～！檔案～！"
10121-20 = "百花繚亂紛爭調停委員會，勘解由小路紫……\n華麗地夏日～出道～的說！\n在海邊也會大顯身手的哦！"
10121-30 = "無論何時何地，\n小女子都是\n完～美！的說！"
10121-40 = "啊啊！\n這就是老師\n說過的……！"
10121-50 = "這是……？\n所謂的海邊禮儀，\n之類的東西嗎？"
10121-60 = "好像有點冷……\n哈啾！"
10121-70 = "哼～哼哼～\n超無敵的～\n紫出動啦～♪"
10121-80 = "老師～！！\n是海哦，是海～！！"
10121-90 = "工作結束之後，\n要不要一起出去走走？"
10121-100 = "「群島啊\n　碎成千片\n　夏之海──」"
10121-110 = "……啊，老師！\n恭候多時了！"
10121-120 = "不愧是老師！\n即使面對大海\n也毫不動搖的身影……"
10121-130 = "小女子都因為太開心而\n興奮不已，一直無法\n冷靜下來了說……"
10121-140 = "這就是真正的大人，對吧！\n請務必讓我以您為榜樣！"
10121-150 = "為什麼時間會\n過得這麼快呢……"
10121-160 = "哈……！這就是那著名的，\n夏日～時光嗎！？"
10121-170 = "哼哼哼哼～♪"
10121-180 = "咦？工作中看起來也很開心？"
10121-190 = "沒錯！超開心的！\n因為可以跟老師在一起呀！"
10121-200 = "集中，集中……"
10121-210 = "啊啊……！\n果然因為這段時間太快樂了，\n無法集中精神！"
10121-220 = "老師，\n小女子該怎麼辦……！！"
10121-230 = "呀，呀啊！？"
10121-240 = "我，我可沒有打瞌睡哦！"
10121-250 = "身為菁～英，怎麼可能\n因為玩水就，累倒……"
10121-260 = "Happy Birthday～！\n今年第一個祝福，\n就由小女子收下了！"
10121-270 = "啊啊！莫非小女子\n不是第一個嗎……？"
10121-280 = "不過，這也是件好事！"
10121-290 = "畢竟這就是有那麼多人\n都在意老師的證據！"
10121-300 = "啊，老師。\n小女子的生日，\n您有記得呢。"
10121-310 = "小女子，收到了\n許多人的祝福……\n真的覺得自己很幸福。"
10121-320 = "但是果然……\n來自老師的話語，\n還是我最想要的……"
10121-330 = "小女子真是個\n貪心的孩子……"
10121-340 = "Happy New Year～的說！"
10121-350 = "謹此向您\n致上新年的問候！"
10121-360 = "如果可以的話，\n真想就這樣和老師\n一起度過一整天……"
10121-370 = "新年是最容易鬆懈的時期……\n百花繚亂也會變得忙碌！"
10121-380 = "雖然今天很遺憾地\n無法陪您……"
10121-390 = "不過相對的，我今年\n也會跟您一起FIGHT～！"
10121-400 = "還請您多多指教囉，老師！"
10121-410 = "老師！\nMerry Christmas～！"
10121-420 = "和老師一起來的冬日海邊……\n真是別有風情。"
10121-430 = "當然，我不會跑到海裡去的！"
10121-440 = "只要這樣待在一起……\n就已經很幸福了。"
10121-450 = "哼哼！小女子，\n學會了一種新文化！"
10121-460 = "聽說今天是要扮成Monster，\n去拿糖果的日子！"
10121-470 = "啊啊……！\n但是穿著泳裝，是不是\n沒辦法變成Monster呢！？"
10121-490 = "（老師！您來找\n　小女子了呢！）"
10121-500 = "（平常只能從遠處\n　眺望的大海……）"
10121-510 = "（竟然隱藏著如此\n　美麗的景色）"
10121-520 = "（而且，還能跟老師，\n　像這樣單獨欣賞……）"
10121-530 = "（啊啊，小女子\n　是多麼幸福啊）"
10121-540 = "（咦……老師？\n　您的臉色好像\n　有點……？）"
10121-550 = "（小女子，做了什麼\n　奇怪的事嗎？）"
10121-560 = "（上面……？\n　上面只有太陽\n　而已唷……）"
10121-570 = "（咦……？\n　不是這個意思……？）"
10121-2600 = "這是小女子和老師約定的象徵。\n每當看到它的時候，\n小女子都一定會想起老師吧。\n真是的……老師可真壞心眼。"

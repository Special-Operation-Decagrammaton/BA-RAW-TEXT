[translation]
10121-10 = "Blue~! Archive~!"
10121-20 = "คาเดโนะโคจิ ยูคาริ จากคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน...\nขอเดบิว~ รับฤดูร้อนอย่างเฉิดฉายเจ้าค่ะ!\nต่อให้อยู่ในชายหาด~ ข้าก็จะโชว์ฝีมือเต็มที่เจ้าค่ะ!"
10121-30 = "ไม่ว่าที่ไหนเมื่อไร\nข้าก็จะเผชิญหน้าอย่าง\nเพอร์เฟกต์โตะ~ เจ้าค่ะ!"
10121-40 = "อ๊ะ! นี่คือสิ่งที่\nท่านอาจารย์เคยพูดถึง!"
10121-50 = "ส่วนนี่คือ...?\nเอชิ~เคโตะ~\nเวลามาทะเลสินะเจ้าคะ?"
10121-60 = "ชุดนี้มันออกจะ\nหนาวๆ หน่อยนะ...\nฮัดชิ้ว!"
10121-70 = "ฮืม~ ฮืมม~♪ เรือรบไร้พ่าย\nยูคาริปรากฏตัวแล้วเจ้าค่ะ~♪"
10121-80 = "ท่านอาจารย์~~!!\nมีทะเลด้วยละเจ้าค่ะ ทะเล~~!!"
10121-90 = "ไว้งานเสร็จแล้ว\nออกไปเดินดูด้วยกันมั้ยเจ้าคะ?"
10121-100 = "เกาะน้อยใหญ่\nกระจัดกระจายอยู่ทั่ว\nทะเลฤดูร้อน"
10121-110 = "อ๊ะ... ท่านอาจารย์?\nข้ากำลังรออยู่เลยเจ้าค่ะ!"
10121-120 = "สมกับที่เป็นท่านอาจารย์!\nทะเลอยู่ตรงหน้าแท้ๆ\nแต่ก็ยังแน่วแน่เหมือนเคย!"
10121-130 = "แต่ข้าสนุกจน\nอยู่ไม่สุขเลย..."
10121-140 = "ผู้ใหญ่เป็นอย่างนี้สินะเจ้าคะ!\nข้าจะเอาอย่างบ้างเจ้าค่ะ!"
10121-150 = "พออยู่ที่ทะเล เวลาก็\nผ่านไปไวจังเลยนะเจ้าคะ"
10121-160 = "เฮือก! หรือว่านี่คือ\nซามา~ไทมุ~ เจ้าคะ?!"
10121-170 = "ฮืม~ ฮืม♪"
10121-180 = "คะ? ข้าดูเพลิดเพลิน\nแม้ในเวลางานเหรอเจ้าคะ?"
10121-190 = "ก็เพราะได้อยู่กับ\nท่านอาจารย์ไงเจ้าคะ!"
10121-200 = "ตั้งใจหน่อย ตั้งใจ..."
10121-210 = "อ๊ะ! ข้าสนุกกับช่วงเวลานี้\nจนไม่มีสมาธิแล้วเจ้าค่ะ!"
10121-220 = "ท่านอาจารย์\nข้าควรทำยังไงดี...!"
10121-230 = "ฮะ... เฮือก?!"
10121-240 = "ข้าไม่ได้เผลองีบนะเจ้าคะ!"
10121-250 = "อิล~ลีทอย่างข้าไม่มีทาง\nเล่นสนุกในทะเลจนเหนื่อยหรอก...!"
10121-260 = "แฮป~ ปี้~ เบิร์ธ~ เดย์~!\nข้าขอเป็นคนอวยพร\nเป็นคนแรกนะเจ้าคะ!"
10121-270 = "อ๊ะ! ข้าไม่ใช่\nคนแรกเหรอเจ้าคะ?"
10121-280 = "ถ้างั้นก็ยิ่งดีเจ้าค่ะ!"
10121-290 = "นั่นแปลว่ามีคนที่คิดถึง\nท่านอาจารย์เยอะเลยนี่เจ้าคะ!"
10121-300 = "อ๊ะ ท่านอาจารย์\nจำวันเกิดข้าได้สินะเจ้าคะ"
10121-310 = "ข้าโชคดีที่มีหลายคน\nมาอวยพรวันเกิดให้..."
10121-320 = "แต่ข้าอยากได้คำอวยพร\nจากท่านอาจารย์ที่สุดเจ้าค่ะ"
10121-330 = "เหตุใดข้าถึง\nเป็นคนโลภเช่นนี้นะเจ้าคะ?"
10121-340 = "แฮป~ ปี้~ นิว~ เยียร์~! เจ้าค่ะ!"
10121-350 = "ข้าขอมาอวยพรปีใหม่เจ้าค่ะ!"
10121-360 = "ถ้าเป็นไปได้ข้าก็\nอยากใช้เวลาช่วงปีใหม่\nอยู่กับท่านอาจารย์"
10121-370 = "ปีใหม่เป็นช่วงที่\nจิตใจผ่อนคลายที่สุด...\nส่วนเฮียกกะเรียวรันก็งานยุ่งเจ้าค่ะ!"
10121-380 = "ถึงจะน่าเสียดายที่วันนี้\nเราไม่ได้อยู่ด้วยกัน..."
10121-390 = "แต่ปีนี้ต้องมาไฟท์โตะ~!\nไปด้วยกันนะเจ้าคะ"
10121-400 = "รบกวนด้วยนะเจ้าคะ ท่านอาจารย์!"
10121-410 = "ท่านอาจารย์!\nเมอร์รี่~ คริสต์~ สะ~ มาส~!\nเจ้าค่ะ!"
10121-420 = "ทะเลฤดูหนาว...\nที่ได้อยู่กับท่านอาจารย์\nช่างมีกลิ่นอายดีจังเลยเจ้าค่ะ"
10121-430 = "ต่อให้จะเอาตัวไปแช่\nในน้ำเย็นๆ ไม่ได้ก็ตามเจ้าค่ะ~"
10121-440 = "แค่การได้อยู่ด้วยกันแบบนี้...\nข้าก็มีความสุขแล้วเจ้าค่ะ"
10121-450 = "ฮึ่ม! ข้าเองก็ได้เรียนรู้\nวัฒนธรรมใหม่มาเจ้าค่ะ!"
10121-460 = "วันนี้ถ้าแต่งตัวเป็นสัตว์ประหลาด\nเราก็จะได้แคนดี้~ เจ้าค่ะ!"
10121-470 = "อ๊ะ! พอมาคิดดูแล้ว\nชุดว่ายน้ำมันไม่ใช่\nชุดสัตว์ประหลาดนี่นา?!"
10121-490 = "(ท่านอาจารย์! ตามหาข้าที่อยู่\nในทะเลจนเจอสินะเจ้าคะ!)"
10121-500 = "(พื้นทะเลที่มักเห็น\nเวลามองเท้าลงมา)"
10121-510 = "(ข้าไม่คิดเลยว่ามันจะซ่อน\nทัศนียภาพที่งดงามไว้ถึงเพียงนี้)"
10121-520 = "(แล้วก็ไม่คิดเลยว่า\nจะได้มองท่านอาจารย์\nในที่แบบนี้ด้วย)"
10121-530 = "(อ่า... ทำไมข้าถึงได้\nโชคดีเช่นนี้นะเจ้าคะ?)"
10121-540 = "(เอ๋? ท่านอาจารย์?\nทำไมถึงทำหน้าแบบนั้นล่ะ...?)"
10121-550 = "(ข้าทำอะไรผิดไป\nหรือเปล่าเจ้าคะ?)"
10121-560 = "(ข้างบน? ข้างบนก็\nมีแต่พระอาทิตย์นะ...)"
10121-570 = "(เจ้าคะ?\nไม่ใช่เรื่องนั้นเหรอเจ้าคะ?)"
10121-2600 = "ของขวัญนี้คือคำสัญญาระหว่างข้า\nกับท่านอาจารย์เจ้าค่ะ ข้าจะเก็บไว้\nในอ้อมแขน ทุกครั้งที่หยิบมาดูก็คง\nคิดถึงท่านอาจารย์นะเจ้าคะ\nว่าเหตุใดถึงขี้แกล้งแบบนี้น่ะเจ้าค่ะ"

[translation]
10121-10 = "블루~! 아카이브~!"
10121-20 = "백화요란 분쟁조정위원회, 카데노코지 유카리……\n화려하게 여름 데뷔~ 이와요!\n비~치에서도 멋지게 활약해 보겠사와요!"
10121-30 = "언제 어디서나\n퍼어~펙투한\n모습으로 임하겠사와요!"
10121-40 = "앗! 이것은 선생님이\n전에 말씀하신!"
10121-50 = "이것은……?\n바다의 에튀~켓~\n이라는 걸까요?"
10121-60 = "이 복장은 조금\n쌀쌀한 듯한…… 푸엥힛!"
10121-70 = "흐~흐흥~♪ 초무적 전함,\n유카리 출동이어요~♪"
10121-80 = "선생님~~!!\n바다가 있사와요, 바다~~!!"
10121-90 = "일이 끝나면 함께 나가서\n구경하지 않으시겠어요?"
10121-100 = "섬섬들이여\n천 갈래 흐트러져\n여름의 바다"
10121-110 = "……아, 선생님!\n기다리고 있었사와요!"
10121-120 = "역시나, 선생님!\n바다를 눈앞에 두고도\n의연한 태도!"
10121-130 = "소녀는 즐거워서\n안절부절못하는데……."
10121-140 = "그야말로 어른이네요!\n그 자세 본받겠사와요!"
10121-150 = "바다에서는 시간이 어찌나\n빨리 지나는지 모르겠사와요."
10121-160 = "헉! 이게 말로만 듣던\n서머~ 타임~이란 걸까요?!"
10121-170 = "흐흐~흥♪"
10121-180 = "네? 일하면서도\n즐거워 보인다고요?"
10121-190 = "그야 선생님과 함께인걸요!"
10121-200 = "집중, 집중……."
10121-210 = "아앗! 역시 이 시간이 너무\n즐거워서 집중할 수가 없사와요!"
10121-220 = "선생님, 소녀는 대체\n어떻게 해야……!"
10121-230 = "하, 히얏?!"
10121-240 = "꾸벅꾸벅 졸지 않았사와요!"
10121-250 = "엘~리트인 소녀가 바다에서\n노느라 지치거나 할 리가……!"
10121-260 = "해애~ 피 버스데~이~!\n올해 첫 축하는 소녀가\n받아 가겠사와요!"
10121-270 = "아앗! 혹시 소녀가\n처음이 아닐까요?"
10121-280 = "그러면 더욱 좋사와요!"
10121-290 = "선생님을 생각하는 사람이\n그만큼 많다는 뜻이니까요!"
10121-300 = "아, 선생님.\n소녀의 생일, 기억해 주셨군요."
10121-310 = "복에 겨워 많은 분들께서\n소녀를 축하해 주셨지만……."
10121-320 = "역시 누구보다 선생님께\n가장 축하받고 싶었사와요."
10121-330 = "어쩜 소녀는\n이렇게 욕심쟁이일까요?"
10121-340 = "해애~피 뉴우 이어~! 이어요!"
10121-350 = "삼가 새해 인사 올리겠사와요!"
10121-360 = "마음만 같아서는 이대로\n선생님과 함께\n설을 지새우고 싶지만."
10121-370 = "새해는 가장 마음이\n해이해지는 시기……\n백화요란은 바빠집니다!"
10121-380 = "안타깝게도 오늘은 함께하지\n못 하게 되었습니다만……."
10121-390 = "대신, 올 한해도 함께 파이팅~!\n해주셔야 해요!"
10121-400 = "잘 부탁드려요, 선생님!"
10121-410 = "선생님!\n메~리 크리수마~수~! 이어요!"
10121-420 = "선생님과 함께하는\n겨울 바다……\n무척이나 정취가 있네요."
10121-430 = "물론 이런 얼음물에\n들어갈 수 없겠지만요~"
10121-440 = "이렇게 함께 있는 걸로도……\n행복하답니다."
10121-450 = "흐흥! 소녀도\n새로운 문화를 배웠답니다!"
10121-460 = "오늘은 괴물로 분장하면\n캔디~를 받는 날이라고요!"
10121-470 = "아앗! 생각해 보니,\n수영복은 괴물 분장이\n아닌 것이?!"
10121-490 = "(선생님! 바닷물 속에 있는\n소녀를 찾아내어 주셨군요!)"
10121-500 = "(언제나 발치에서\n내려다볼 뿐이던 바닷속에,)"
10121-510 = "(이토록이나 아름다운 풍경이\n숨겨져 있을 줄이야.)"
10121-520 = "(그리고 그런 장소에서\n선생님과 마주 보며\n함께 하게 될 줄이야.)"
10121-530 = "(아아, 소녀는 어쩜\n이렇게 행운아일까요?)"
10121-540 = "(어라, 선생님?\n표정이 뭔가, 어라라……?)"
10121-550 = "(소녀, 무언가 잘못했사와요?)"
10121-560 = "(위에? 위에는\n해님 말고 아무것도…….)"
10121-570 = "(네? 그게 아니어요?)"
10121-2600 = "이 선물은 소녀와 선생님의 약조입니다.\n언제나 품에 지니며, 볼 때마다 선생님을 떠올리겠지요.\n어찌나 짖궂으신 분인지."

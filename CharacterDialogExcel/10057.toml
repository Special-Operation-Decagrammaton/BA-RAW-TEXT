[translation]
10057-10 = "블루 아카이브."
10057-20 = "후훗, 새해 복 많이 받으세요.\n후리소데 차림에 꽃을 피우고,\n새로운 마음으로 미지의 음식을 찾으러 갑시다."
10057-30 = "요리가 위대한 것은,\n거기에 모든 것이\n담겨 있기 때문이죠."
10057-40 = "드레스 코드나\n로케이션도, 미식의\n중요한 요소라고\n말할 수 있겠지요."
10057-50 = "이 시기에는 특별한\n요리가 눈에 띄곤 해서…\n후훗, 기대가 되네요."
10057-60 = "후리소데에는\n나름 익숙해져 있답니다."
10057-70 = "멋진 요리를\n찾을 수 있으면\n좋겠는데…"
10057-80 = "후훗. 어서 오세요, 선생님.\n오늘은 미식과 만나셨나요?"
10057-90 = "평안하신가요, 선생님.\n그러면, 저와 함께 새해의\n미식찾기를 떠나기로 하죠."
10057-100 = "…선생님은 후리소데를\n좋아하시나요? 네?\n잘 어울린다구요? 우후후…\n당, 당연하죠."
10057-110 = "갑자기 따뜻하고 부드러운\n맛의 음식이 먹고싶어졌어요.\n…선생님과 이야기하고\n있기 때문일까요."
10057-120 = "오세치는 본디 조림 계열의\n음식으로만 이루어지죠."
10057-130 = "최근에는 그렇지 않은 경우도\n많은 듯 합니다만……"
10057-140 = "물론, 저는 어느 쪽이든\n좋아한답니다."
10057-150 = "계절 음식은 모두 매력적이죠…\n설날이라고 하면, 오세치나\n오조니, 오시루코……"
10057-160 = "아아…… 배가 고파졌어요."
10057-170 = "미식이란, 보편적인\n가치가 있는 것이지요."
10057-180 = "……물론 선생님도\n동의해 주시겠지요?"
10057-190 = "오늘은 선생님 생일이죠.\n원하시는 식사가 있으실까요?"
10057-200 = "제가 선생님 입맛에 맞는\n가게를 예약하도록 할게요."
10057-210 = "선생님이 제 생일을\n축하해 주시다니…… 기쁩니다."
10057-220 = "우후훗, 오늘은 에스코트\n해주시겠어요?"
10057-230 = "선생님과 함께라면…\n어떤 식사라도 미식이 되니까요."
10057-240 = "새해 복 많이 받으세요,\n선생님."
10057-250 = "후훗… 설날이 되었네요.\n모처럼이니 후리소데로\n갈아입고 왔습니다."
10057-260 = "특별한 요리를 즐기기 위해서는\n우선 복장부터, 이니까요."
10057-270 = "선생님, 크리스마스 잘 보내고\n계신가요? 여러가지 것들이\n달콤하고 따듯하게\n느껴지는 날입니다…"
10057-280 = "후훗, 이것도 선생님\n덕분입니다."
10057-290 = "할로윈이네요. 맛있는\n호박파이를 가져왔습니다만…"
10057-300 = "선생님도 한입, 어떠신가요?"
10057-320 = "미식에 있어서 중요한 것은,\n요리와 상대… 그리고 시기."
10057-330 = "그것들 만큼이나,\n미식을 즐기는 상황도,\n빼놓을 수 없는 존재죠."
10057-340 = "우후훗. 그런고로, 오늘은 서로\n먹여 주기를 해 보도록 할까요?"
10057-350 = "우선은 저부터…\n자, 선생님. 입을 벌리고…\n아~ 해 주세요."
10057-360 = "저, 정말, 어서요.\n저도… 부끄럽습니다만…"
10057-370 = "선생님께서 먹어 주실 때까지,\n저는 이대로 있을거랍니다?"
10057-380 = "자요…… 아~"
10057-2600 = "특별한 시기에 맛보는 특별한 음식은\n한층 더 각별한 것이지요.\n이것으로 한층 더 미식의 길에……\n그리고 선생님에게 다가갈 수\n있게 된 것 같습니다. 언제나\n감사드리고 있답니다. 선생님?"

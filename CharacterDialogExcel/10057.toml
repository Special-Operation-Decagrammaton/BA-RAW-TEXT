[translation]
10057-10 = "Blue Archive."
10057-20 = "Heh heh, Happy New Year. I'm prepared with a floral furisode and an open mind. Let's find some intriguing new food to try!"
10057-30 = "True epicurianism involves all aspects of life."
10057-40 = "Location and appropriate dress are essential elements of fine dining."
10057-50 = "This is the time of year for special dishes. Heehee, I'm quite excited."
10057-60 = "I've worn furisodes quite frequently, actually."
10057-70 = "I hope we find food that's truly worthy of savoring."
10057-80 = "Heh heh heh, welcome, Sensei. Have you enjoyed any epicurean experiences today?"
10057-90 = "How are you, Sensei? Why don't we look for a fine dining experience for the New Year?"
10057-100 = "Sensei, do you like furisodes? ...Huh? You think I look good in one? Heh... O-Of course I do!"
10057-110 = "Hm... Suddenly, I'm craving something warm and soft to eat. Could it be because I'm talking to you?"
10057-120 = "Osechi are typically all boiled foods."
10057-130 = "However, it seems these days that's not always the case."
10057-140 = "My opinion? I think either way is delicious."
10057-150 = "What's more appetizing than seasonal food? For the New Year, we could have osechi, ozoni, oshiruko..."
10057-160 = "Oh... Now I'm hungry!"
10057-170 = "The value of gourmet food is universal."
10057-180 = "...You agree, right Sensei?"
10057-190 = "Sensei! It's your birthday today. What would you like to eat?"
10057-200 = "I'll make us reservations at a restaurant that I'm sure you'll enjoy."
10057-210 = "Oh! You're celebrating my birthday...? I'm so happy."
10057-220 = "Heh heh heh, please go out to eat with me today."
10057-230 = "As long as I'm with you...every meal will be gourmet."
10057-240 = "Happy New Year, Sensei!"
10057-250 = "It's New Year's Day! I've changed into my furisode to celebrate."
10057-260 = "It's very important to wear the proper outfit to enjoy a celebratory meal."
10057-270 = "Sensei, how's your Christmas going? Everything I eat today tastes especially sweet and warm."
10057-280 = "Heehee. I think...that's all thanks to you, Sensei."
10057-290 = "Happy Halloween! I brought a delicious pumpkin pie with me today."
10057-300 = "Would you like a bite, Sensei?"
10057-320 = "Many things are important for a true gourmet experience: the food itself, the person you eat with, the timing..."
10057-330 = "And, of course, the way in which you eat is just as crucial."
10057-340 = "Heh heh heh. So, I was thinking...why don't we feed each other today?"
10057-350 = "I'll feed you first, Sensei. Now then, open your mouth and say ahhh..."
10057-360 = "H-Hurry up already. I'm embarrassed too..."
10057-370 = "Until you take a bite from my hand, I'm not moving an inch!"
10057-380 = "Now then... Ahhh..."
10057-2600 = "Special foods that you only eat once a year make a holiday seem magical. With this experience, I'm getting closer to true epicurianism, and...closer to you, too, Sensei. I truly always appreciate you."

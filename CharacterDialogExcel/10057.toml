[translation]
10057-10 = "Blue Archive"
10057-20 = "ฮุฮุ ขอให้มีความสุขในวันปีใหม่นะคะ\nออกไปค้นหาอาหารแห่งจิตใจใหม่ๆ\nพร้อมกับชุดกิโมโนฟุริโซเดะนี่กันเถอะค่ะ"
10057-30 = "สิ่งที่ยอดเยี่ยมสำหรับอาหาร\nคือการที่ทุกสิ่งทุกอย่าง\nรวมอยู่ในนั้นแล้วยังไงล่ะคะ"
10057-40 = "ทั้งเสื้อผ้าและสถานที่\nไม่ว่าจะดูยังไง ทั้งสองอย่าง\nก็เป็นสิ่งสำคัญสำหรับ\nอาหารเลิศรสสินะคะ"
10057-50 = "ช่วงเวลาแบบนี้...\nมักมีอาหารพิเศษหลายอย่าง...\nฮุฮุ ฉันตั้งตารอเลยละค่ะ"
10057-60 = "ฉันชินกับชุดฟุริโซเดะ\nแล้วละค่ะ"
10057-70 = "ถ้าครั้งนี้พวกเรา\nค้นพบอาหารที่ยอดเยี่ยม\nก็คงจะดีนะคะ"
10057-80 = "ฮุฮุ เชิญเลยค่ะคุณครู\nวันนี้เจออาหารเลิศรสแล้วรึยังคะ?"
10057-90 = "สบายดีรึเปล่าคะคุณครู\nถ้าอย่างนั้นพวกเราไปตามหา\nอาหารเลิศรสด้วยกันมั้ยคะ?"
10057-100 = "คุณครูชอบฟุริโซเดะ\nหรือเปล่าคะ? อะไรนะคะ?\nเหมาะกับฉันดีงั้นเหรอคะ? ฮุฮุฮุ...\nกะ...ก็แน่นอนอยู่แล้วค่ะ"
10057-110 = "จู่ๆ ฉันก็อยากกินอาหารอุ่นๆ\nรสชาตินุ่มลิ้นขึ้นมาเลยค่ะ\nเป็นเพราะคุยอยู่กับคุณครู\nหรือเปล่านะ...?"
10057-120 = "พื้นฐานของโอเซจิทำมาจาก\nอาหารประเภทต้มค่ะ"
10057-130 = "แต่ช่วงหลังๆ นี้ก็ไม่ค่อย\nทำแบบนั้นอยู่เยอะเหมือนกันค่ะ..."
10057-140 = "แน่นอนว่าส่วนตัวแล้วฉัน\nชอบทั้งสองแบบเลยค่ะ"
10057-150 = "อาหารตามเทศกาลมันมีเสน่ห์ค่ะ...\nถ้าเป็นวันปีใหม่ละก็ ต้องเป็นโอเซจิ\nหรือโอโซนิ หรือไม่ก็โอชิรุโกะ..."
10057-160 = "อา... ชักจะหิวขึ้นมาซะแล้วละค่ะ"
10057-170 = "อาหารรสเลิศน่ะ มีความอร่อย\nที่เป็นสากลไงล่ะคะ"
10057-180 = "คุณครูเองก็เห็นด้วยกับฉัน\nใช่รึเปล่าคะ?"
10057-190 = "วันนี้เป็นวันเกิดคุณครูสินะคะ\nมีอาหารที่อยากทานรึเปล่าคะ?"
10057-200 = "ฉันจะจองร้านอาหารอร่อยๆ\nที่ถูกปากคุณครูให้เองค่ะ"
10057-210 = "คุณครูอวยพรวันเกิดให้ฉันแบบนี้\nมีความสุขจังเลยค่ะ..."
10057-220 = "อุฮุฮุ วันนี้ช่วยไปกับฉัน\nได้หรือเปล่าคะ?"
10057-230 = "ถ้าไปกับคุณครูละก็...\nไม่ว่าอาหารแบบไหน\nก็เป็นอาหารเลิศรสได้ค่ะ"
10057-240 = "ขอให้มีความสุขในวันปีใหม่นะคะ\nคุณครู"
10057-250 = "ฮุฮุ... ปีใหม่แล้วนะคะ\nเพราะงั้นฉันถึงเปลี่ยนมาเป็น\nกิโมโนฟุริโซเดะค่ะ"
10057-260 = "เพราะเสื้อผ้าที่สวมใส่\nเป็นจุดเริ่มต้นของการสนุก\nกับอาหารพิเศษค่ะ"
10057-270 = "คุณครู สนุกกับวันคริสต์มาสรึเปล่าคะ\nวันนี้เป็นวันที่เราจะได้รู้สึกถึง\nความอบอุ่นและหวานหอม\nหลายๆ อย่างเลยค่ะ..."
10057-280 = "ฮุฮุ นี่ก็เป็นเพราะคุณครู\nเลยนะคะ"
10057-290 = "ฮาโลวีนแล้วสินะคะ\nฉันเอาพายฟักทองอร่อยๆ มาด้วยค่ะ..."
10057-300 = "คุณครูลองชิมดูสักคำดีมั้ยคะ?"
10057-320 = "สิ่งสำคัญของอาหารเลิศรส\nก็คืออาหารกับเพื่อนร่วมโต๊ะ และเทศกาล"
10057-330 = "นอกจากนี้... สถานการณ์\nที่ทำให้เพลิดเพลินกับอาหารเลิศรส\nก็ขาดไปไม่ได้เช่นกันค่ะ"
10057-340 = "ฮุฮุฮุ เพราะงั้นวันนี้เรามา\nผลัดกันป้อนดีมั้ยคะ?"
10057-350 = "เริ่มจากคุณครูก่อน...\nเร็วสิคะคุณครู อ้าปาก แล้ว…\nอ้าม~ สิคะ"
10057-360 = "ธะ... โธ่ เร็วๆ สิคะ\nฉันเอง... ก็เขินเหมือนกันนะคะ"
10057-370 = "จนกว่าคุณครูจะยอมทาน\nฉันจะนั่งอยู่แบบนี้\nไม่ขยับไปไหนเลยค่ะ"
10057-380 = "เร็วสิคะ... อ้าม~"
10057-2600 = "อาหารพิเศษที่ได้ลิ้มรสในเทศกาลพิเศษ\nคงพิเศษขึ้นมาอีกระดับเลยค่ะ\nและปืนด้ามนี้ก็จะทำให้ฉันได้เข้าใกล้...\nเส้นทางของอาหารเลิศรส\nแล้วก็คุณครูด้วยค่ะ ไม่ว่าเมื่อไร\nก็ขอบคุณเสมอๆ เลยนะคะคุณครู"

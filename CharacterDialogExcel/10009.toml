[translation]
10009-10 = "蔚藍檔案～！"
10009-20 = "哇！！你是來找我的嗎？\n一起去吃好吃的東西吧！！"
10009-30 = "如果有會結出\n漢堡的樹就太棒了！\n不知道什麼時候\n會發明出來呢？"
10009-40 = "好！\n來去找食物！"
10009-50 = "好，\n今天也加油吧！"
10009-60 = "我的專長？\n嗯！當然是吃東西啊！"
10009-70 = "用餐時間到了\n一定要叫我一聲唷！"
10009-80 = "歡迎老師！\n我等你好久了！\n我們快去吃飯吧！"
10009-90 = "啊…你要工作啊？"
10009-100 = "老師！\n今天我們去吃什麼好呢～"
10009-110 = "先執行任務？ "
10009-120 = "不對吧，應該先吃飯！"
10009-130 = "難道沒有\n教訓黑心餐廳的\n任務嗎？"
10009-140 = "夏萊附近\n有什麼好吃的店嗎？"
10009-150 = "因為三一那邊的餐廳\n我全都吃過了…"
10009-160 = "啊！\n這不能說嗎…？"
10009-170 = "嗯？那餅乾要給我嗎？"
10009-180 = "老師果然是好人！"
10009-190 = "（剛剛那個\n　章魚鬆餅…\n　看起來真好吃…）"
10009-200 = "帶來幸福的青鳥…？"
10009-210 = "感覺…\n跟雞肉的味道\n應該很像吧～"
10009-220 = "老師！你今天生日嗎？"
10009-230 = "那我們把咖啡廳包下來，\n吃一整天的蛋糕吧！"
10009-240 = "今天一整天，\n我都會陪你！"
10009-250 = "鏘～！知道今天\n是什麼日子嗎？"
10009-260 = "嘿嘿！是盡情\n吃遍美食的日子～！"
10009-270 = "所以，一起來吃蛋糕吧！\n特別分你吃一點也可以唷？"
10009-280 = "今天是元旦！\n我們要趕快\n去吃年糕和紅豆湯！"
10009-290 = "去那裡的話\n還能喝到甜酒耶！"
10009-300 = "聖誕節啊…"
10009-310 = "讓人想到好吃的\n火雞和鮮奶油蛋糕～"
10009-320 = "把這兩項混著一起吃\n會更好吃吧～"
10009-330 = "嗨～老師！\nTreat or Treat！\n我們快出去吧！"
10009-340 = "聽說有西瓜般大的糖果喔！"
10009-360 = "看，看貓咪們\n吃得津津有味，\n不小心就……！"
10009-370 = "呃，呼咦咦咦？！\n等，等等！\n不要抓～！"
10009-380 = "為什麼～！？\n貓咪們襲擊過來了～！"
10009-390 = "可，可是！\n看起來很好吃嘛！"
10009-400 = "而，而且！\n我，是美食研究會的一員！"
10009-410 = "在意的東西\n首先要吃過才行！"
10009-420 = "而且這個\n還寫著「鮪魚味」、「高級」……！"
10009-430 = "這麼好的東西\n只有你們吃\n不可原諒！"
10009-440 = "美味的東西，\n要一起分享才行！"
10009-450 = "啊好痛！\n所，所以說抱歉嘛！"
10009-460 = "但是，\n已經吃下的東西\n也沒辦法了吧…？"
10009-470 = "唔咦咦！\n不要咬我～！"
10009-2600 = "又多了一個\n享用美食的道具！\n但當然不是筷子之類的東西……\n用這個來嚐遍各種美食吧，老師！"

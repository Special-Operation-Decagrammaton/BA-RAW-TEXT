[translation]
10009-10 = "Blue Archive~!"
10009-20 = "ว้าว!! คุณครูเรียกฉันออกมาใช่ม้า?\nไปกินของอร่อยกันเถอะ!!"
10009-30 = "อยากให้มีต้นไม้ที่ออกลูก\nเป็นแฮมเบอร์เกอร์จัง!\nในอนาคตคงจะมีแหละเนอะ"
10009-40 = "ดีล่ะ!\nฉันออกไปหาของกินดีกว่า!"
10009-50 = "สู้ๆ!วันนี้ก็สู้ๆ นะ!"
10009-60 = "ความสามารถพิเศษเหรอ?\nจะเป็นอะไรไปได้!\nต้องเรื่องกินอยู่แล้ว!"
10009-70 = "ถ้ามีอะไรอร่อยๆ\nก็เรียกกันบ้างสิ?!"
10009-80 = "ยินดีต้อนรับนะคุณครู\nกำลังรออยู่เลย!\nรีบไปกินข้าวกันเถอะ!"
10009-90 = "อ่า... ต้องทำงานงั้นเหรอ?"
10009-100 = "คุณครู!\nวันนี้ไปกินอะไรกันดีน้า~"
10009-110 = "ต้องทำภารกิจก่อนงั้นเหรอ?"
10009-120 = "ไม่สิ ต้องกินข้าวก่อน!"
10009-130 = "ไม่มีภารกิจให้ไปสั่งสอนร้าน\nที่ทำอาหารไม่ได้เรื่องเลยเหรอ?"
10009-140 = "แถวๆ ชาเล่ต์\nจะมีร้านเด็ดอะไรบ้างนะ?"
10009-150 = "ร้านในทรีนิตี้\nฉันก็ไปตระเวนกินมาหมดแล้ว..."
10009-160 = "อ๊ะ! หรือว่าไม่ควรพูดออกมานะ...?"
10009-170 = "หือ? จะให้ขนมนั่นเหรอ?"
10009-180 = "คุณครูของฉันใจดีที่สุดเลย!"
10009-190 = "(แพนเค้กปลาหมึกเมื่อกี้นี้...\nน่ากินมากเลย...)"
10009-200 = "นกสีน้ำเงินที่นำพาความสุขมาให้เหรอ...?"
10009-210 = "อืม... ไก่ทอดน่ากินจัง"
10009-220 = "คุณครู! วันนี้วันเกิดเหรอ?"
10009-230 = "ถ้างั้นเรามาเหมาคาเฟ่\n แล้วกินเค้กให้พุงกางกันไปเลย!"
10009-240 = "ฉันจะอยู่เป็นเพื่อนทั้งวันเลย!"
10009-250 = "เซอร์ไพรส์~\nรู้ไหมวันนี้วันอะไร?"
10009-260 = "อะแฮ่ม!\nวันที่ต้องกินของอร่อยยังไงล่ะ!"
10009-270 = "ไปกินเค้กกันเถอะ! แล้วจะแบ่ง\nให้กินเป็นกรณีพิเศษเลย!"
10009-280 = "ปีใหม่แล้ว!\nต้องไปกินเค้กข้าวกับถั่วแดงต้ม!"
10009-290 = "ทางนู้นมีสาเกหวานให้ดื่มด้วยล่ะ!"
10009-300 = "วันคริสต์มาส..."
10009-310 = "เหมาะกับการกินเค้ก..\nเค้กครีมสดหน้าไก่งวง!"
10009-320 = "ช่างเป็นวัตถุดิบ\nที่เข้ากันมากเลยล่ะ~"
10009-330 = "สวัสดีคุณครู!\nTreat or Treat?\nรีบออกไปกันเถอะ!"
10009-340 = "เห็นว่ามีลูกอมขนาดเท่าฟักทองด้วย!"
10009-360 = "เห็นน้องแมวกินกันดูน่าอร่อยมาก\nฉันก็เลยอดใจไม่ไหว…!"
10009-370 = "อ๊ายยย?! ดะ...เดี๋ยวก่อนสิ\nอย่ามาข่วนฉันนะ!"
10009-380 = "มุแงงง~!? พวกน้องแมว\nบุกเข้ามาแล้ว~!"
10009-390 = "ตะ...แต่ว่า! รสชาติ\nมันน่าอร่อยมากเลยนี่!"
10009-400 = "ละ... แล้วอีกอย่าง! ฉันเป็น\nสมาชิกของชมรมชิมอาหารนะ!"
10009-410 = "ถ้ามีของที่น่าสนใจ\nแล้วไม่ลองกินละก็...!"
10009-420 = "แล้วนี่มันเขียนไว้ว่า\n<ขนมรสทูน่าชั้นดี> เลยนะ…!"
10009-430 = "ของน่าอร่อยแบบนี้\nเก็บไว้กินคนเดียวแบบนี้\nยกโทษให้ไม่ได้!"
10009-440 = "ของอร่อยน่ะ ต้องแบ่งกันกินสิ!"
10009-450 = "― อ๊ะ! ถะ...ถ้าอย่างนั้น\nฉันขอโทษก็ได้!"
10009-460 = "แต่ว่าอันที่กินไปแล้ว\nก็คงทำอะไรไม่ได้...?"
10009-470 = "แงงง!! อย่ากัดนะ~!"
10009-2600 = "ตอนนี้ฉันก็ได้อุปกรณ์\nสำหรับใช้กินของอร่อยๆ เพิ่มมาอีกชิ้นแล้ว!\nถึงจะไม่ใช่พวกตะเกียบก็เถอะ...\nใช้อุปกรณ์อันนี้ไปกินของอร่อยๆ กันเถอะคุณครู!"

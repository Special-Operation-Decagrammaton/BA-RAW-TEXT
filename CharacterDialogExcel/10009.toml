[translation]
10009-10 = "Blue Archive!"
10009-20 = "Whoa! Did you find me? Let's eat something good together!!"
10009-30 = "I wish there was a tree that grew hamburgers. A hamburger tree... Science can make that happen, right?"
10009-40 = "All right! I'm on the hunt for some food!"
10009-50 = "Here we go! Let's make today a great one!"
10009-60 = "What's my specialty you ask? Yup, it's eating!"
10009-70 = "Supper time? You should have said so sooner!"
10009-80 = "Welcome, Sensei! I've been waiting! Let's go eat!"
10009-90 = "Oh... You have work to do?"
10009-100 = "Sensei! What should we eat today?"
10009-110 = "You're saying missions are more important?"
10009-120 = "Wrong answer! Food always comes first!"
10009-130 = "Are there any missions where we punish naughty restaurants by eating all their food?"
10009-140 = "I wonder if there are any good places near Schale."
10009-150 = "I did raid a restaurant near Trinity..."
10009-160 = "Oh! Should I not have said that...?"
10009-170 = "Huh? Are you giving me this cracker?"
10009-180 = "Thanks, Sensei! You're so sweet!"
10009-190 = "(That octopus pancake from before looked pretty good...)"
10009-200 = "A bluebird that brings happiness...?"
10009-210 = "Hmm... I bet it tastes like chicken."
10009-220 = "Is it your birthday, Sensei?"
10009-230 = "Let's rent a cafe and eat cake all day long!"
10009-240 = "I'll be with you the whole time!"
10009-250 = "Ta-da! Guess what day it is!"
10009-260 = "Ahem! It's a day for eating yummy food!"
10009-270 = "Let's have cake together! I'll make a special exception and share it with you!"
10009-280 = "It's New Year's Day! Get ready for rice cakes and red bean soup!"
10009-290 = "I heard that you can get gamju over there!"
10009-300 = "Christmas..."
10009-310 = "Turkey and whipped cream cake are so yummy!"
10009-320 = "They're even better together!"
10009-330 = "Treat or treat, Sensei! Let's go already!"
10009-340 = "I've heard there are candies the size of watermelons!"
10009-360 = "Th-The cats were enjoying themselves eating so much! I-I couldn't help it!"
10009-370 = "Eh?! H-Hey, don't scratch me!"
10009-380 = "Wha~?! I'm being attacked by angry cats!"
10009-390 = "B-But they looked so good!"
10009-400 = "B-Besides! I'm a member of the Gourmet Research Society!"
10009-410 = "I have a duty to taste everything!"
10009-420 = "I mean, come on! Premium tuna flavor..."
10009-430 = "Why should you guys get to eat such delicacies and not me?!"
10009-440 = "They need to learn to share!"
10009-450 = "I-I'm sorry, all right?"
10009-460 = "There's nothing I can do about what's already eaten, though..."
10009-470 = "Eek! Don't bite me!"
10009-2600 = "It's another tool to eat delicious food with! Of course, these aren't like chopsticks, but...let's eat a bunch of different foods with it, Sensei!"

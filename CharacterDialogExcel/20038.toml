[translation]
20038-10 = "Blue Archive"
20038-20 = "ยินดีต้อนรับสู่เรดวินเทอร์... ไม่สิ ซานไห่จิงค่ะ\nฉันจะสนับสนุนอย่างเต็มที่เพื่อไม่ให้\nต้องอับอายต่ออำนาจแห่งหนวดเลยค่ะ"
20038-30 = "ฮู่ว... แถวนี้อากาศเย็นนิดหน่อย\nเลยหายใจโล่งขึ้นแล้วค่ะ"
20038-40 = "(ชาดำไม่ใส่แยม...?\nเป็นวิธีชงชาที่\nไม่เหมือนใครจริงๆ เลยนะคะ)"
20038-50 = "ดีไซน์นี้... ต้องเก็บไว้\nเป็นแบบอ้างอิงตอนทำกู้ด\nของเชริโน่จังซะแล้วค่ะ"
20038-60 = "เป็นเพราะชุดมันเบารึเปล่า\nนะคะ? เลยขยับตัวสะดวก\nขึ้นเยอะเลย"
20038-70 = "ตอนนี้ฉันจะแจ้งข่าวสาร\nของท่านเชริโน่ผู้ยิ่งใหญ่\nให้ทุกคนได้ทราบค่ะ!"
20038-80 = "เชิญเลยค่ะ\nจะสั่งอะไรดีคะ?"
20038-90 = "ฉันลองเลียนแบบพนักงานของ\nย่านการค้าเทพเต่าดำดูน่ะค่ะ\nเป็นยังไงบ้างคะ? ฮุฮุ"
20038-100 = "กำลังรออยู่เลยค่ะ คุณครู\nรับชาเย็นๆ ดื่มให้ชื่นใจ\nสักแก้วมั้ยคะ?"
20038-110 = "ฮู่ว... ถ้าจะให้ชิน\nกับความร้อนแบบนี้ละก็\nคงจะต้องใช้เวลาสักพักเลยค่ะ"
20038-120 = "อาจเป็นเพราะซานไห่จิงเป็นที่\nที่ให้ความสำคัญกับการศึกษามากๆ\nก็เลยเจอเด็กๆ ได้ทั่ว\nเขตปกครองตนเองเลยนะคะ"
20038-130 = "ฉันชอบพวกเด็กๆ นะคะ\nเพราะพวกเธอคืออนาคต\nของสถาบันของเรานี่คะ"
20038-140 = "การแสดงของชมรมการแสดงงิ้ว...\nทำให้คิดขึ้นมาว่าวาทศิลป์เอง\nก็มีหลายรูปแบบเหมือนกันนะคะ"
20038-150 = "ในตอนกล่าวสุนทรพจน์ประจำปี\nคราวหน้า ฉันจะลองเอา\nการแสดงงิ้วมาใช้ดูค่ะ ฮุฮุ"
20038-160 = "อาหารที่ย่านการค้าเทพเต่าดำ\nอร่อยทุกอย่างเลยก็จริง\nแต่ว่ารู้สึกเลี่ยนไปหน่อย..."
20038-170 = "ฉันเป็นห่วงว่ามันอาจจะ\nไม่ดีต่อสุขภาพของเชริโน่จังได้ค่ะ"
20038-180 = "ก่อนหน้านี้ฉันมอบหนวดสุดเท่\nเป็นของขวัญให้ท่านประมุขของมังกรดำไป\nแต่ก็โดนปฏิเสธมาอย่างสุภาพค่ะ"
20038-190 = "ฉันคิดว่าเหมาะกับเธอดีออก..."
20038-200 = "สุขสันต์วันเกิดนะคะ คุณครู"
20038-210 = "ฉันซื้อเกี๊ยวไส้เนื้อสูตรพิเศษของ\nย่านการค้าเทพเต่าดำมาค่ะ\nสนใจมั้ยคะ?"
20038-220 = "อืม... ที่ติดอยู่บนหัวฉัน\nไม่ใช่เกี๊ยวไส้เนื้อหรอกนะคะ"
20038-230 = "อ่า... วันนี้เป็นวันเกิดของฉันสินะคะ\nพอจดจ่ออยู่กับงานเพียงอย่างเดียว\nก็ลืมไปซะสนิทเลยค่ะ"
20038-240 = "ไม่ต้องใส่ใจเรื่องของขวัญหรอกค่ะ"
20038-250 = "แต่ถ้าคุณครูอยากให้ละก็..."
20038-260 = "สนใจมาพักงีบกลางวัน\nด้วยกันมั้ยคะ? ฮุฮุ"
20038-270 = "ขอให้มีความสุขในวันปีใหม่นะคะ คุณครู\nความฝันแรกในวันปีใหม่ของคุณครู\nคืออะไรเหรอคะ?"
20038-280 = "ความฝันแรกของฉัน...\nฉันฝันร้ายว่าจู่ๆ เชริโน่จัง\nสูงทันฉันขึ้นมาด้วยละค่ะ..."
20038-290 = "ปาร์ตี้คริสต์มาสในซานไห่จิง\nก็ไม่แย่เท่าไรนะคะ"
20038-300 = "แต่น่าเสียดายที่ไม่มี\nการตกแต่งด้วยช่อมิสเซิลโทค่ะ"
20038-310 = "ฉันยืมหน้ากากของชมรมการแสดงงิ้ว\nมาสองสามอันเพื่อไว้แต่งตัว\nในวันฮาโลวีนค่ะ"
20038-320 = "พอคิดดูแล้วมีหน้ากาก\nที่วาดรูปหนวดไว้อยู่\nเยอะแยะเลยนะคะ..."
20038-330 = "บางทีนักเรียนของซานไห่จิง\nอาจจะชอบหนวดก็ได้นะคะ?"
20038-350 = "สายลมเย็นสบาย...\nร่มเงาที่พอเหมาะ...\nนอกจากนี้ยังใช้พัดช่วยพัดได้..."
20038-360 = "ฮุฮุ นี่เป็นครั้งแรกที่ฉัน\nได้สัมผัสประสบการณ์แบบนี้เลยค่ะ"
20038-370 = "ประสบการณ์แต่ละอย่างนี้\nคงทำให้สายตาของฉันกว้างไกลขึ้นสินะคะ"
20038-380 = "ตายจริง? แต่ว่ามันอาจจะ\nไม่ได้สนุกอะไรหรอกนะคะ?"
20038-390 = "ฮุฮุ คุณครู\nอย่ามัวมองจากที่ตรงนั้นเลยค่ะ...\nมาทางนี้สิคะ"
20038-400 = "เอาละค่ะ ฉันจะใช้พัด\nพัดให้คุณครูเองค่ะ"
20038-2600 = "มีคำกล่าวว่าคำพูดหนึ่งคำอาจสร้าง\nบาดแผลร้ายแรงกว่ากระสุนปืนอยู่ก็จริง...\nแต่ฉันว่าเวลาโน้มน้าวใจ\nใช้ปืนคุยกันจะเร็วกว่านะคะ!"

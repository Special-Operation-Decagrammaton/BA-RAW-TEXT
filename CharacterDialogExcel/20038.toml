[translation]
20038-10 = "Blue Archive."
20038-20 = "Welcome to Red Winter―I mean, Shanhaijing. I will do my very best to help, so I don't bring shame to the authority of the mustache."
20038-30 = "Whew... It's cooler here. I finally feel like I can breathe."
20038-40 = "(Black tea? And no jam? What an unusual tea ceremony.)"
20038-50 = "I'll have to take notes on this design for Cherino's merch!"
20038-60 = "Maybe it's because of the light clothes, but it feels easier to move."
20038-70 = "Now, let's share news of the great Cherino!"
20038-80 = "Welcome. Can I take your order?"
20038-90 = "...I was trying to act like a Black Tortoise Promenade waitress. How did I do? Heehee."
20038-100 = "I've been waiting, Sensei. Would you like a cup of iced tea?"
20038-110 = "Argh... It'll take me a while to get used to this heat."
20038-120 = "There are a lot of kids around the district! Maybe it's because Shanhaijing prioritizes education."
20038-130 = "Do you like children? I suppose they are the future of the academy."
20038-140 = "I had a chance to think about the communication skills demonstrated in the Peking Opera Club's performances..."
20038-150 = "Heehee, I'll have to use a Peking opera during my next routine office speech."
20038-160 = "All of the food from the Black Tortoise Promenade was delicious, but it was a little greasy..."
20038-170 = "I'm worried it may be bad for Cherino's health."
20038-180 = "Once, I gave the president of the Genryumon a wonderful mustache, but she politely declined it."
20038-190 = "I'm sure it would've looked good..."
20038-200 = "Happy birthday, Sensei."
20038-210 = "I bought you special meat dumplings from the Black Tortoise Promenade. How are they?"
20038-220 = "Um... These aren't dumplings on my head, though."
20038-230 = "Oh, today is my birthday. I was so engrossed in work that I forgot."
20038-240 = "Don't worry about gifts."
20038-250 = "...But if you really want to give me something..."
20038-260 = "Would you spend naptime with me? Heehee."
20038-270 = "Happy New Year, Sensei. What was your first dream of the year?"
20038-280 = "My first dream...was a nightmare that Cherino grew taller than me..."
20038-290 = "...Christmas parties in Shanhaijing aren't bad."
20038-300 = "It's a shame they don't have mistletoe, though."
20038-310 = "I borrowed a few masks from the Peking Opera Club for Halloween."
20038-320 = "Now that I think about it, a lot of the masks had mustaches on them..."
20038-330 = "Maybe Shanhaijing students like mustaches, too."
20038-350 = "A cool breeze... Adequate shade... And a nice fan for circulation..."
20038-360 = "Heehee. This is a new experience for me."
20038-370 = "Experiences like this contribute to and broaden your perspectives."
20038-380 = "Oh my. It might not be as interesting as you think."
20038-390 = "Heehee, Sensei. Don't just watch from there... Come over here."
20038-400 = "Now, allow me to fan you."
20038-2600 = "They say a word can be more powerful than a bullet... But when it comes to persuading someone, guns are faster."

[translation]
20038-10 = "블루 아카이브."
20038-20 = "붉은겨울…… 아니, 산해경에 어서 오세요.\n수염의 권위에 부끄럽지 않도록\n성심성의껏 힘을 보태겠습니다."
20038-30 = "후우…… 이 주변은\n조금 서늘하니\n살 것 같네요."
20038-40 = "(잼 없이 홍차를…?\n독특한 다법이네요.)"
20038-50 = "이 디자인은…\n체리노 쨩의 굿즈를\n만들 때 참고해야겠네요."
20038-60 = "가벼운 옷차림이라\n그런 걸까요?\n움직임이 편해졌네요."
20038-70 = "지금부터 위대한\n체리노 님의 뉴스를\n전해 드리겠습니다!"
20038-80 = "어서 오세요.\n주문은 무엇으로 하시겠습니까?"
20038-90 = "……현무상회의 점원 흉내를\n내보았는데. 어땠나요? 후후."
20038-100 = "기다리고 있었습니다, 선생님.\n시원한 냉차라도\n한 잔 내어드릴까요?"
20038-110 = "후우…… 이 더위,\n익숙해지려면\n시간이 걸릴 것 같네요."
20038-120 = "산해경은 교육을 중시하는\n곳이라 그런지, 자치구 곳곳에서\n아이들과 자주 마주치게 되네요."
20038-130 = "어린아이는 좋아한다고요?\n학원의 미래라고도\n할 수 있으니까요."
20038-140 = "경극부의 공연… 화술에도\n여러 종류가 있다는 것을\n다시 한번 생각해 보는\n계기가 되었습니다."
20038-150 = "다음번 사무국 정기 연설 때는\n경극을 활용해 봐야겠어요,\n후후."
20038-160 = "현무상회의 음식은\n모두 맛있었지만,\n조금 기름져서……"
20038-170 = "체리노 쨩의 건강에\n나쁠까 걱정되네요."
20038-180 = "전에 현룡문의 문주님께\n선물로 멋진 수염을 드렸는데,\n정중히 거절하시더군요."
20038-190 = "분명 잘 어울렸을 텐데……"
20038-200 = "생일 축하드립니다, 선생님."
20038-210 = "현무상회의 특제 고기만두를\n사 왔는데, 어떠신가요."
20038-220 = "으음… 제 머리에 달린 건 \n고기만두가 아닌데요?"
20038-230 = "아, 오늘이 제 생일이었군요.\n일에 집중하다 보니\n깜빡 잊고 있었네요."
20038-240 = "선물은 신경 쓰지 마세요."
20038-250 = "……그래도 신경 쓰이신다면……"
20038-260 = "낮잠 시간에 함께\n해주시겠어요? 후후."
20038-270 = "새해 복 많이 받으세요, 선생님.\n새해 첫 꿈은\n어떤 꿈을 꾸셨나요?"
20038-280 = "저는 첫 꿈으로……\n체리노 쨩에게 키를 추월당하는\n악몽을 꾸었답니다……"
20038-290 = "……산해경에서의\n크리스마스 파티도 괜찮네요."
20038-300 = "겨우살이 장식이 없다는\n점은 조금 아쉽지만요."
20038-310 = "할로윈 가장을 위해\n경극부에서 가면을\n몇 개 빌려왔답니다."
20038-320 = "그러고 보니\n수염이 그려져 있는\n탈이 많네요…"
20038-330 = "사실 산해경의 학생들도\n수염을 좋아하는 걸지도?"
20038-350 = "시원한 바람…\n적당히 좋은 그늘…\n거기에 부채로 바람을 쐬고…"
20038-360 = "후후. 확실히 이건\n처음 경험하는 일이에요."
20038-370 = "이런 경험 하나하나가\n시야를 넓혀주는 것이겠죠."
20038-380 = "어머나? 그다지 재미있지\n않을 수도 있을 텐데요?"
20038-390 = "후후, 선생님.\n그런 곳에서 보지 말고……\n이쪽으로 오세요."
20038-400 = "자, 부채로 부채질해\n드릴 테니까요."
20038-2600 = "한마디 말이 총보다\n더 큰 힘을 발휘할 수 있다고 하지만……\n……그래도 역시 설득에는\n총이 더 빠르니까요!"

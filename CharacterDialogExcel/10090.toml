[translation]
10090-10 = "블루 아카이브"
10090-20 = "안녕하세요, 선생님.\n백귀야행연합학원 소속 마츠리운영관리부의 사토하마……\n우미카입니다. 축제, 좋아하세요?"
10090-30 = "카페 축제라는 걸,\n제안해 볼까……?"
10090-40 = "사람들이 많이\n돌아다니네……\n흠, 흐음……"
10090-50 = "이대로도 충분히\n좋은 곳이지만.\n뭔가를 조금만 더한다면……"
10090-60 = "사장님이라면\n어떻게 생각하실까……"
10090-70 = "기모노풍 바니걸은 좀……"
10090-80 = "아, 선생님!\n어서 오세요.\n뭘 도와드리면 될까요?"
10090-90 = "오셨군요, 선생님!\n무엇부터 시작할까요?"
10090-100 = "최선을 다하겠습니다!"
10090-110 = "샬레는 뭔가 신기하네요……\n설렌다는 점에서는 뭔가……"
10090-120 = "축제 현장 같아요!"
10090-130 = "새롭고 신나는 걸 보는 게 좋아요.\n그런 분위기 속에서 함께 있는 게 좋아요."
10090-140 = "선생님과 함께 있는 게……\n역시, 좋아요."
10090-150 = "백귀야행에 와서 많은 것을 배우고,\n많은 것들이 바뀌었지만."
10090-160 = "그래도, 저는 축제가 제일 좋아요."
10090-170 = "더 많은 것을 배워서,\n잘하고 싶어요."
10090-180 = "그러니까, 선생님.\n이것저것 많이 가르쳐 주세요."
10090-190 = "백야당 일이 끝나면 축제 준비를 하고.\n틈틈이 강의도 들어야 하고,\n시험 준비도 해야 하고……"
10090-200 = "할 일이 너무 많아요!"
10090-210 = "네? 샬레도……\n그렇다고요……?"
10090-220 = "선생님! 들었어요!\n오늘이 생일이시군요!"
10090-230 = "그래서 말인데요……\n오늘 열리는 축제를\n제가 안내해 드릴게요!"
10090-240 = "키보토스에서는 어디선가\n오늘도 축제가 열리고 있으니까요!"
10090-250 = "네? 네. 맞아요……\n오늘은 제 생일이었네요."
10090-260 = "에헤헤.\n선생님께 축하받을 수 있다니……\n왠지, 굉장히 기쁘네요."
10090-270 = "새해네요!\n새해 축제에 갑시다!"
10090-280 = "그런 게 있냐고? 있죠!\n없으면 만들면 돼요!"
10090-290 = "크리스마스……\n축제의 날이네요!\n가만히 있을 수 없죠!\n빨리 나가요, 선생님!"
10090-300 = "할로윈은 유쾌한 축제죠!\n퍼레이드, 과자, 분장,\n그리고 Trick or Treat!"
10090-310 = "선생님은 어떤 분장을 좋아하세요?\n제가 전부 준비할게요!"
10090-330 = "축제에 어서 오세요, 선생님!"
10090-340 = "에헤헤. 어때요?\n지금까지 계속 준비하고 있던 건……\n전부 이 순간을 위해서였어요!"
10090-350 = "누구에게도 알리지 않았고,\n누구도 초대하지 않았답니다."
10090-360 = "이 축제는……\n선생님을 위한 것이니까요!"
10090-370 = "다른 누구도 없는,\n저와 선생님만의 축제……"
10090-380 = "조금 부끄럽기도 하지만……\n마음에 드셨으면 좋겠어요!"
10090-2600 = "저… 그게…… 감사, 합니다. 선생님!\n아으으, 이런 걸 받을 수 있을 거라고는\n생각도 못 하고 있었어서……\n저, 열심히 할게요.\n앞으로도 지켜봐 주세요!"

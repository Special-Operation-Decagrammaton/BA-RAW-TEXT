[translation]
10090-10 = "蔚藍檔案"
10090-20 = "你好，老師。\n我是百鬼夜行聯合學園所屬，\n節慶營運管理部的里浜……海花。\n你喜歡慶典嗎？"
10090-30 = "咖啡廳慶典，\n要不要提案看看……？"
10090-40 = "有很多人走來走去……\n 呼呣，呼呣呣……"
10090-50 = "雖然這樣也已經\n是個很好的地方，\n但感覺再加上\n一些東西的話……"
10090-60 = "如果是社長\n會怎麼想呢……"
10090-70 = "和服風格的\n兔女郎有點……"
10090-80 = "啊，老師！歡迎你來。\n我該幫忙什麼呢？"
10090-90 = "你來了呢，老師！\n該從哪裡做起呢？"
10090-100 = "我會全力以赴的！"
10090-110 = "夏萊感覺很不可思議呢……\n該說讓人有點興奮嗎……"
10090-120 = "就像慶典現場一樣！"
10090-130 = "我喜歡看新奇又有趣的東西，\n也喜歡融入那種氛圍之中。"
10090-140 = "跟老師待在一起……\n果然很喜歡。"
10090-150 = "來到百鬼夜行之後\n學到了很多東西，\n也發生了許多改變。"
10090-160 = "不過，我還是\n最喜歡慶典。"
10090-170 = "我想要學習更多東西，\n並且變得更加熟練。"
10090-180 = "所以，老師。\n請教導我更多\n不同的事吧。"
10090-190 = "百夜堂的工作結束之後\n要準備慶典，\n要抽空上課，\n還要準備考試……"
10090-200 = "該做的事太多了！"
10090-210 = "咦？夏萊也一樣……\n是那樣嗎……？"
10090-220 = "老師！我聽說了！\n今天是你的生日呢！"
10090-230 = "所以……\n今天舉辦的慶典\n就由我來導覽吧！"
10090-240 = "在奇普托斯的某處，\n今天也會有慶典展開的！"
10090-250 = "咦？是的，沒錯……\n今天是我的生日呢。"
10090-260 = "耶嘿嘿。\n居然能收到老師的祝福……\n總覺得非常開心呢。"
10090-270 = "新年到了！\n去參加新年的慶典吧！"
10090-280 = "問我有沒有那種東西？\n有呀！沒有的話辦一個就行了！"
10090-290 = "聖誕節……\n是慶典的日子呢！\n不能就這樣坐著不動！\n趕快出門吧，老師！"
10090-300 = "萬聖節是愉快的慶典呢！\n遊行、餅乾、變裝，\n還有Trick or Treat！"
10090-310 = "老師喜歡怎麼樣的變裝呢？\n我全都會準備好哦！"
10090-330 = "歡迎來到慶典，老師！"
10090-340 = "耶嘿嘿。怎麼樣呀？\n至今為止一直準備的……\n全部，都是為了這個瞬間！"
10090-350 = "沒有被任何人知道，\n也沒有招待任何人。"
10090-360 = "因為這場慶典……\n是專屬於老師的！"
10090-370 = "沒有其他人，\n只有我和老師的慶典……"
10090-380 = "雖然有點不好意思……\n希望你能喜歡！"
10090-2600 = "那個……就是……\n非常謝謝你。老師！\n啊嗚嗚，因為我沒想到\n居然能收到這種東西……\n我會努力的，\n以後也請守望著我！"

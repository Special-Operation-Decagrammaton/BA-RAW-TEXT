[translation]
10090-10 = "Blue Archive"
10090-20 = "Greetings, Sensei. I'm Satohama Umika from the Allied Hyakkiyako Academy Festival Operations Department. Do you enjoy festivals?"
10090-30 = "Hmm, what if I suggested something like a Cafe Festival...?"
10090-40 = "There are so many people out and about... Hm...hmm..."
10090-50 = "While it's already a great place, how about we add a little something extra..."
10090-60 = "How would the boss feel about it?"
10090-70 = "A bunny girl in a kimono is a bit much..."
10090-80 = "Oh! Welcome, Sensei! How may I assist you?"
10090-90 = "You're here, Sensei! Where shall we start?"
10090-100 = "I'll give it my all!"
10090-110 = "Schale is quite intriguing... There's just something so...exhilarating about it."
10090-120 = "It feels like a festival!"
10090-130 = "I like seeing new and exciting things. That kind of atmosphere makes me come alive."
10090-140 = "Hanging out with Sensei... Yes, I think I like it."
10090-150 = "Since coming to Hyakkiyako, I've learned a lot. And so many things have changed."
10090-160 = "But even so, I've never stopped loving festivals."
10090-170 = "I'm eager to learn more and excel."
10090-180 = "So please, Sensei. Teach me all you can!"
10090-190 = "After my work at Momoyodou's done, I need to start preparing for the festival. And somewhere in there I need to fit in lectures and studying too."
10090-200 = "There's too much to do!"
10090-210 = "Oh? It's the same over at Schale?"
10090-220 = "Sensei! I heard it's your birthday today!"
10090-230 = "How about I show you around a local festival to celebrate!"
10090-240 = "There's another festival in Kivotos today!"
10090-250 = "Huh? Oh, that's right... Today is my birthday, too."
10090-260 = "Heeheehee. Getting birthday wishes from you... I don't know why, but it makes me really happy."
10090-270 = "It's the New Year! Let's go to the New Year's festival!"
10090-280 = "Does something like that exist? Of course it does! If not, we'll just make one!"
10090-290 = "Christmas... What a festive day! We can't just stay in. Get up, let's go out, Sensei!"
10090-300 = "Halloween is such a fun festival! It has parades, candy, costumes, and trick-or-treat!"
10090-310 = "What are you dressing up as, Sensei? I'll handle all the preparations!"
10090-330 = "Welcome to the festival, Sensei!"
10090-340 = "Heeheehee. What do you think? All my work and preparations...were for this exact moment!!"
10090-350 = "I didn't tell anyone, and there were no invitations."
10090-360 = "This festival...is just for you, Sensei!"
10090-370 = "A festival all for you and me, with no interruptions..."
10090-380 = "It's a bit embarrassing, but...I hope you like it!"
10090-2600 = "Um...thank you, Sensei! Wow, I never thought I'd get something like this... Please continue to watch over me! I won't let you down."

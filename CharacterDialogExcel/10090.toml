[translation]
10090-10 = "Blue Archive"
10090-20 = "สวัสดีค่ะคุณครู\nฉัน ซาโตฮามะ อุมิกะ จากชมรมจัดงานเทศกาล...\nสังกัดสหพันธ์เฮียกคิยาโคค่ะ คุณครูชอบงานเทศกาลมั้ยคะ?"
10090-30 = "ลองเสนอให้จัด\nเทศกาลคาเฟ่ดูดีมั้ยนะ...?"
10090-40 = "ผู้คนเดินกัน\nขวักไขว่เลยแฮะ...\nฮืม..."
10090-50 = "แบบนี้ก็ถือว่าเป็น\nสถานที่ที่ใช้ได้อยู่นะ\nแต่ถ้าเพิ่มอะไรนิดหน่อย..."
10090-60 = "ถ้าเป็นท่านประธาน\nจะคิดอย่างไรนะ..."
10090-70 = "ชุดบันนี่เกิร์ลที่มีกลิ่นอาย\nของกิโมโนมันออกจะ..."
10090-80 = "อ๊ะ คุณครู! เชิญค่ะ\nให้ฉันช่วยอะไรดีคะ?"
10090-90 = "มาแล้วเหรอคะคุณครู!\nเริ่มจากอะไรดีคะ?"
10090-100 = "ฉันจะพยายาม\nอย่างเต็มที่เลยค่ะ!"
10090-110 = "ชาเล่ต์นี่แปลกดีนะคะ...\nในแง่ของความตื่นเต้นแล้ว..."
10090-120 = "เหมือนเป็นที่จัดงาน\nเทศกาลเลยค่ะ!"
10090-130 = "ฉันชอบดูอะไรที่สดใหม่\nและสนุกค่ะ แล้วก็ชอบอยู่ด้วยกัน\nในบรรยากาศแบบนั้นค่ะ"
10090-140 = "การได้อยู่กับคุณครู...\nเป็นสิ่งที่ดีจังเลยค่ะ"
10090-150 = "ฉันได้เรียนรู้อะไรมากมาย\nที่เฮียกคิยาโค และมีหลายอย่าง\nที่เปลี่ยนไป"
10090-160 = "แต่ยังไงฉันก็\nชอบงานเทศกาลที่สุดค่ะ"
10090-170 = "ฉันอยากเรียนรู้ให้มากกว่านี้\nและทำให้ดีขึ้นค่ะ"
10090-180 = "เพราะงั้น คุณครูคะ\nช่วยสอนสิ่งต่างๆ กับฉันด้วยนะคะ"
10090-190 = "เสร็จงานที่ร้านเฮียกคิยาโคแล้ว\nก็ต้องเตรียมจัดเทศกาล\nไหนจะต้องหาเวลาเข้าเรียน\nและเตรียมอ่านหนังสือสอบอีก..."
10090-200 = "งานฉันเยอะมากเลยค่ะ!"
10090-210 = "คะ? ชาเล่ต์ก็เป็นอย่างนั้น...\nเหมือนกันเหรอคะ...?"
10090-220 = "คุณครู! ฉันได้ข่าวมาค่ะ!\nวันนี้เป็นวันเกิดเหรอคะเนี่ย!"
10090-230 = "เพราะงั้น...\nฉันจะแนะนำงานเทศกาล\nที่จัดวันนี้ให้เองค่ะ!"
10090-240 = "วันนี้ก็มีงานเทศกาล\nจัดอยู่สักที่ในคิโวทอสน่ะค่ะ"
10090-250 = "คะ? ค่ะ ใช่ค่ะ...\nวันนี้วันเกิดของฉันค่ะ"
10090-260 = "แหะๆๆ\nคุณครูมาอวยพรฉันด้วยเหรอเนี่ย...\nฉันดีใจมากๆ เลยค่ะ"
10090-270 = "ปีใหม่แล้วค่ะ!\nไปเที่ยวเทศกาลปีใหม่กันเถอะค่ะ!"
10090-280 = "มีเทศกาลแบบนั้นหรือเปล่า\nน่ะเหรอคะ? ก็ต้องมีสิคะ!\nถ้าไม่มีก็จัดขึ้นก็ได้ค่ะ!"
10090-290 = "วันคริสต์มาส...\nวันแห่งงานเทศกาลสินะคะ!\nอยู่เฉยๆ ไม่ได้แล้วค่ะ!\nรีบออกไปกันเถอะค่ะคุณครู!"
10090-300 = "ฮาโลวีนเป็นเทศกาลที่สนุกค่ะ!\nทั้งพาเหรด ขนม แต่งตัวเป็นผี\nแล้วก็ Trick or Treat!"
10090-310 = "คุณครูชอบแต่งเป็นผีแบบไหนเหรอคะ?\nฉันจะเตรียมให้ทั้งหมดเลยค่ะ!"
10090-330 = "เชิญเข้าสู่งานเทศกาลค่ะคุณครู!"
10090-340 = "แหะๆๆ เป็นยังไงบ้างคะ?\nที่ฉันตั้งใจเตรียมมาตลอดจนถึงตอนนี้...\nทั้งหมดก็เพื่อช่วงเวลานี้เลยค่ะ!"
10090-350 = "ฉันไม่บอกให้ใครอื่นรู้\nและไม่ได้เชิญคนอื่นมาเลยค่ะ"
10090-360 = "เพราะงานเทศกาลนี้...\nจัดขึ้นเพื่อคุณครูเท่านั้นค่ะ!"
10090-370 = "งานเทศกาลที่ไม่มีใครอื่น\nนอกจากฉันและคุณครู..."
10090-380 = "ถึงแม้จะรู้สึกเขินอยู่นิดหน่อย...\nแต่ก็หวังว่าจะถูกใจคุณครูนะคะ!"
10090-2600 = "อ่า... คือว่า... ขอบคุณ...\nนะคะ... คุณครู! อึก... ฉันไม่คิด\nเลยค่ะว่าจะได้อะไรแบบนี้ด้วย...\nฉัน... จะตั้งใจทำเต็มที่ค่ะ\nช่วยเฝ้าดูฉันด้วยนะคะ!"

[translation]
20021-10 = "블루 아카이브!"
20021-20 = "메리 크리스마스~!\n산타 할아버지 대신 하나에가 왔어요!"
20021-30 = "안녕하세요!\n산타복이지만\n하나에예요~!"
20021-40 = "수술과 선물이\n필요하신 분,\n계신가요?"
20021-50 = "크리스마스에도\n구호기사단은 준비\n되어 있답니다."
20021-60 = "굴뚝은…\n어디에 있을까요?"
20021-70 = "크리스마스에는 자선\n이벤트가 있어요.\n저도 거기에서 모두와\n같이 노래를 부를 거예요~"
20021-80 = "선생님, 선생님!\n원하시는 건 없으신가요?"
20021-90 = "산타인 제가\n선물을 드리려구요~!"
20021-100 = "선생님, 요즘 바쁘신 것\n같네요…… 오늘도 귀가가\n늦기도 하셨고,"
20021-110 = "피로가 풀리는\n간단한 수술을 할까요?"
20021-120 = "저는 오늘도 건강해요!\n선생님은 별 일 없으신가요?"
20021-130 = "아플 때에는,\n하나에를 불러 주세요!"
20021-140 = "주사도 수술도\n선물해 드릴 테니까요!"
20021-150 = "겨울에는 동상에\n주의하셔야 해요!"
20021-160 = "조금이라도 잘못되면,\n환부를 절단해야 하니까요!"
20021-170 = "크리스마스가 기다려지네요!\n가슴이 두근두근 거려요 !"
20021-180 = "선생님도 기대되셨으면\n좋겠어요!"
20021-190 = "선생님, 선생님!\n크리스마스 선물로\n커다란 토끼 인형은 어때요?"
20021-200 = "와, 생일 축하해요!"
20021-210 = "네, 여기 선물 안에 선물을\n넣어봤어요! 어때요!"
20021-220 = "음......마트료시카,\n같다구요?"
20021-230 = "오늘은 제 생일이에요!\n선물은…"
20021-240 = "선생님이 갖고 싶네요!\n에헤헤."
20021-250 = "선생님, 벌써 새해에요!\n새해 복 많이 받으세요!"
20021-260 = "크리스마스는 지나버렸지만,\n아직 산타복이어도 괜찮을까요?"
20021-270 = "선생님, 크리스마스예요!"
20021-280 = "올해도 산타 할아버지,\n와 주시려나."
20021-290 = "할로윈도 정말 좋아하는\n축제 중 하나예요!"
20021-300 = "하지만…… 왠지\n치료나 수술이 필요한\n사람이 많은 것 같네요?"
20021-320 = "이건… 제가\n산타 할아버지를 맞이하는\n준비예요."
20021-330 = "산타 할아버지가 춥지 않게\n벽난로에 불을 넣고…"
20021-340 = "크리스마스 트리를 귀엽게\n꾸미는 거예요."
20021-350 = "산타 할아버지,\n기다리고 있어요~"
20021-360 = "그렇게 하면,\n반드시 양말에 선물을\n넣어 주시거든요!"
20021-370 = "그리고 올해에는 말이죠……"
20021-380 = "꼭 산타께\n보답해 드릴 거예요!"
20021-390 = "에헤헤, 어때요?\n직접 만든 과자와\n신선한 우유라구요!"
20021-2600 = "좋았어, 준비 오케이예요!"

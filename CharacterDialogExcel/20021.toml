[translation]
20021-10 = "Blue Archive!"
20021-20 = "เมอร์รีคริสต์มาส~!\nฮานาเอะมาแทนคุณลุงซานต้าค่ะ!"
20021-30 = "สวัสดีค่ะ!\nถึงจะอยู่ในชุดซานต้า\nแต่นี่คือฮานาเอะนะคะ~!"
20021-40 = "มีใครที่ต้องการ\nรับการผ่าตัด\nและของขวัญมั้ยคะ?"
20021-50 = "ชมรมอัศวินบรรเทาทุกข์\nเตรียมตัวพร้อม\nแม้ในวันคริสต์มาสค่ะ"
20021-60 = "ปล่องไฟ...\nอยู่ที่ไหนนะคะ?"
20021-70 = "ฉันจะไปร้องเพลง\nในงานการกุศลวันคริสต์มาส\nร่วมกับทุกๆ คนด้วยค่ะ~"
20021-80 = "คุณครูคะ! คุณครู!\nมีอะไรที่อยากได้มั้ยคะ?"
20021-90 = "ซานต้าคนนี้ตั้งใจว่า\nจะให้ของขวัญคุณครูค่ะ~!"
20021-100 = "คุณครู ช่วงนี้คุณครู\nดูจะยุ่งๆ นะคะ...\nวันนี้ก็เหมือนจะกลับดึกด้วย"
20021-110 = "ให้ฉันผ่าตัดเล็กๆ ให้\nเพื่อช่วยคลายเหนื่อยมั้ยคะ?"
20021-120 = "วันนี้ฉันก็แข็งแรงดีค่ะ!\nแล้วคุณครูล่ะคะเป็นไงบ้าง?"
20021-130 = "เวลาที่ไม่สบาย\nก็เรียกฮานาเอะได้เลยค่ะ!"
20021-140 = "ฉันมีให้ครบเลยค่ะ ทั้งของขวัญ\nผ่าตัด และฉีดยา!"
20021-150 = "ในฤดูหนาวต้องระวัง\nหิมะกัดนะคะ..."
20021-160 = "เพราะถ้าเป็นแผลเยอะละก็\nต้องตัดส่วนนั้นทิ้งเลยค่ะ!"
20021-170 = "อยากให้ถึงคริสต์มาสแล้วค่ะ!\nหัวใจฉันเต้นตึกตักเลย!"
20021-180 = "หวังว่าคุณครูก็จะ\nตั้งตารอเหมือนกันนะคะ!"
20021-190 = "คุณครูคะ! คุณครู!\nรับของขวัญคริสต์มาส\nเป็นตุ๊กตากระต่ายตัวใหญ่\nดีมั้ยคะ?"
20021-200 = "ว้าว สุขสันต์วันเกิดค่ะ!"
20021-210 = "ใช่ค่ะ ฉันเอาของขวัญ\nใส่ไว้ในของขวัญอีกทีค่ะ! เป็นไงคะ!"
20021-220 = "อืม... เหมือนตุ๊กตาแม่ลูกดก\nงั้นเหรอคะ?"
20021-230 = "วันนี้วันเกิดของฉันค่ะ!\nส่วนของขวัญ..."
20021-240 = "ฉันอยากได้คุณครูค่ะ!\nแหะๆๆ"
20021-250 = "ปีใหม่แล้วค่ะคุณครู!\nขอให้โชคดีในวันปีใหม่นะคะ!"
20021-260 = "ถึงคริสต์มาสจะผ่านไปแล้ว\nแต่ยังใส่ชุดซานต้าต่อได้มั้ยคะ?"
20021-270 = "คุณครู คริสต์มาสแล้วค่ะ!"
20021-280 = "ปีนี้คุณลุงซานต้า\nจะมาอีกมั้ยนะ"
20021-290 = "ฮาโลวีนเป็นเทศกาลหนึ่ง\nที่ฉันชอบมากๆ เลยค่ะ!"
20021-300 = "แต่ว่า... ถ้างั้นก็แสดงว่า\nจะมีคนที่ต้องรักษา หรือไม่ก็\nต้องผ่าตัดเพียบเลยสินะคะ?"
20021-320 = "นี่คือ... การเตรียมตัว\nเพื่อรอรับ\nคุณลุงซานต้าค่ะ"
20021-330 = "จุดไฟที่เตาผิงติดผนัง\nเพื่อให้คุณลุงซานต้าไม่หนาว..."
20021-340 = "แล้วก็ตกแต่งต้นคริสต์มาส\nให้น่ารักๆ ค่ะ"
20021-350 = "เพื่อจะบอกว่า\nคุณลุงซานต้า\nฉันรออยู่นะคะ~"
20021-360 = "ถ้าทำแบบนั้น\nซานต้าจะใส่ของขวัญ\nไว้ให้ในถุงเท้าค่ะ!"
20021-370 = "และในปีนี้..."
20021-380 = "ฉันต้องตอบแทน\nคุณซานต้าให้ได้เลยค่ะ!"
20021-390 = "แหะๆๆ เป็นไงบ้างคะ?\nนี่คือขนมที่ฉันทำเอง\nและนมสดๆ เลยค่ะ!"
20021-2600 = "เอาละ เตรียมพร้อมแล้วค่ะ! "

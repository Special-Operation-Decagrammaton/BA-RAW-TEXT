[translation]
20021-10 = "Blue Archive!"
20021-20 = "Merry Christmas! Surprise! You get me instead of Santa!"
20021-30 = "Hi! It's Hanae, Santa outfit edition!"
20021-40 = "Does anyone need surgery...or a gift?"
20021-50 = "Remedial Knights are ready to serve, even on Christmas!"
20021-60 = "Where...is the chimney?"
20021-70 = "There's a Christmas charity event where yours truly is gonna sing along with everyone!"
20021-80 = "Sensei, Sensei! Do you want anything?"
20021-90 = "I'm Santa, so I wanna give you a gift!"
20021-100 = "Sensei, you seem busy these days! You even went home late today too."
20021-110 = "I know! I can operate on you to help with your fatigue."
20021-120 = "I'm feeling really good today, Sensei! How about you?"
20021-130 = "You can come see me whenever you're not feeling good!"
20021-140 = "I'll gift you some surgeries and injections!"
20021-150 = "You gotta be careful for frostbite in the winter..."
20021-160 = "Otherwise, your affected limbs might have to be amputated!"
20021-170 = "My heart's beating so fast in anticipation for Christmas!"
20021-180 = "I hope you're just as excited as I am, Sensei."
20021-190 = "Sensei, Sensei! For a Christmas gift, what do you think about a huge bunny doll?"
20021-200 = "Wow, happy birthday!"
20021-210 = "Yes, I put a gift inside of a gift! Isn't it cool?!"
20021-220 = "Hmm... It reminds you of matryoshka dolls?"
20021-230 = "It's my birthday! For my present..."
20021-240 = "I want Sensei! Heeheehee."
20021-250 = "Sensei, the new year is already here! Happy New Year!"
20021-260 = "...Am I still allowed to wear my Santa outfit after Christmas is over?"
20021-270 = "Sensei! It's Christmas!"
20021-280 = "I wonder if Santa will come again this year."
20021-290 = "It's Halloween! One of my favorite festivals!"
20021-300 = "But...festivals mean lots of people who need medical help!"
20021-320 = "This is...my way of preparing for Santa Claus to come!"
20021-330 = "I got the fireplace nice and toasty, so Santa won't be cold."
20021-340 = "And I decorated the Christmas tree with lots of pretty decorations."
20021-350 = "It's how I say, \"Santa, I've been waiting for you!\""
20021-360 = "Then he'll leave me a little gift in my stocking!"
20021-370 = "But this year..."
20021-380 = "I'm gonna turn it around and give back to Santa!"
20021-390 = "Heeheehee. What do you think? Homemade cookies and fresh milk!"
20021-2600 = "All right, I'm ready!"

[translation]
20021-10 = "蔚藍檔案！"
20021-20 = "聖誕快樂～！\n作為聖誕老人的代替，\n花繪來了唷！"
20021-30 = "你好！\n雖然穿著聖誕服，\n不過是花繪唷～！"
20021-40 = "需要手術和禮物的人～\n有在這裡嗎～？"
20021-50 = "即使是聖誕節，\n救護騎士團的準備\n也非常完善！"
20021-60 = "煙囪……\n會在哪裡呢？"
20021-70 = "聖誕節會有慈善活動。\n我也會在那裡和大家\n一起唱歌唷～"
20021-80 = "老師，老師！\n有沒有想要的東西呀？"
20021-90 = "我這個聖誕老人\n會送給你唷～！"
20021-100 = "老師，你最近好像\n很忙呢……\n今天也很晚回來。"
20021-110 = "要不要幫你做個\n消除疲勞的簡單手術？"
20021-120 = "我今天也很有精神！\n老師也別來無恙嗎？"
20021-130 = "身體不舒服的時候\n請呼叫花繪！"
20021-140 = "不管是注射還是手術，\n都會送給你哦！"
20021-150 = "冬天的時候\n請小心凍傷哦！"
20021-160 = "因為稍有不慎\n就必須要對患部\n進行切除才行！"
20021-170 = "聖誕節真讓人等不及呢！\n心情都興奮起來了！"
20021-180 = "老師也一樣期待的話，\n我會很開心的！"
20021-190 = "老師，老師！\n聖誕禮物送一隻\n大大的兔子玩偶怎麼樣呀？"
20021-200 = "哇，生日快樂！"
20021-210 = "來，請收下！我在禮物\n裡面放了禮物！怎麼樣呀！"
20021-220 = "咦……\n很像套娃……是嗎？"
20021-230 = "今天是我的生日！\n禮物的話……"
20021-240 = "我想要老師！耶嘿嘿。"
20021-250 = "老師，已經是新年了唷！\n新年快樂！"
20021-260 = "聖誕節都過了\n還穿聖誕服沒關係嗎？"
20021-270 = "老師，是聖誕節唷！"
20021-280 = "今年聖誕老人\n也會來嗎。"
20021-290 = "萬聖節也是我很\n喜歡的慶典之一！"
20021-300 = "但是……總覺得\n需要治療和手術的人\n似乎很多呢？"
20021-320 = "這是……我自己\n為了迎接聖誕老人\n所做的準備。"
20021-330 = "為了不讓聖誕老人覺得冷，\n把壁爐的火點起來……"
20021-340 = "還在聖誕樹上\n加上了可愛的裝飾。"
20021-350 = "聖誕老人，\n我在等你唷～"
20021-360 = "這麼一來，\n聖誕老人一定會\n在襪子裡放禮物的！"
20021-370 = "而且我今年……"
20021-380 = "想要答謝聖誕老人！"
20021-390 = "耶嘿嘿，怎麼樣呀？\n是我親手做的餅乾和\n新鮮的牛奶！"
20021-2600 = "好，準備OK！"

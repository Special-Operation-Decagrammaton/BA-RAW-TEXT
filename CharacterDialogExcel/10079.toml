[translation]
10079-10 = "블루 아카이브!"
10079-20 = "토키와다이 중학교 2학년 미사카 미코토.\n내 도움이 필요하면 말해줘."
10079-30 = "여기가\n샬레의 카페……."
10079-40 = "뭐, 뭐야.\n저건……!?"
10079-50 = "신기한 게 많네."
10079-60 = "이, 이건 꽤\n귀여울 지도……."
10079-70 = "음? 누가 불렀나?"
10079-80 = "아, 선생님. 여기야 여기.\n왜 이제 오는 거야. 기다리고 있었는데."
10079-90 = "수고많았어, 선생님.\n나?\n계속 여기 있었는데."
10079-100 = "왠지 혼자 나가는 건\n아직 허들이 높다고나 할까……."
10079-110 = "정전 때 도와줬으면 좋겠다고?\n예이, 예이, 농담이지?"
10079-120 = "……뭐, \n못 도와줄 것도 없지만."
10079-130 = "가~끔, 학원도시랑 \n비슷하다고 느낄 때가 있어,\n여기."
10079-140 = "선생님,\n괜찮으면 바람 좀\n쐬지 않을래?"
10079-150 = "여기는 말하는\n고양이도 많던데…\n도대체 어떻게 된 일일까?"
10079-160 = "아, 아니!\n아무것도 아냐!"
10079-170 = "오! 선생님,\n오늘 생일이야?\n축하해!\n뭐 갖고 싶은 거 있어?"
10079-180 = "어? 고, 고마워.\n설마 생일도 여기서\n보내게 될줄이야...."
10079-190 = "아하하......\n조금 복잡한 기분이야."
10079-200 = "새해 복 많이 받아,\n선생님!"
10079-210 = "그러고 보니\n여기는 새해에 뭐 해?"
10079-220 = "크리스마스라…\n여기서도 챙기는구나.\n선생님은 나갈 약속이라도 있어?"
10079-230 = "뭔가 밖이 소란스럽네.\n이런 날은 왠지 이런저런 일이 생기던데…"
10079-250 = "으으으으음~~~."
10079-260 = "계속 보다 보니,\n조금 귀여워 보이는\n것 같기도……."
10079-270 = "그래서, 이건 돼지야……?\n아니면 하마?"
10079-280 = "……뭐!? 새!?\n거짓말이지!?"
10079-290 = "그, 그야 그렇지만……."
10079-300 = "하하……. 뭐,\n아무래도 좋나."
10079-310 = "뭐랄까,\n잘 생각해 보니……."
10079-320 = "이거 선생님이\n준 선물인 거잖아."
10079-330 = "……소중히 할게."
10079-340 = "고마워, 선생님."
10079-2600 = "솔직히 말해서, 좀 신기하다고나 할까…….\n평소에는 이런 거, 가지고 다니지 않으니까.\n일부러 준비해 줘서.... 고마워.\n기대에 부응할 수 있도록, 제대로 할게."

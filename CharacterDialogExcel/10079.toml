[translation]
10079-10 = "Blue Archive!"
10079-20 = "I'm Tokiwadai Middle School second-year Misaka Mikoto. Let me know if you need my help."
10079-30 = "So this is Schale's Cafe..."
10079-40 = "Wh-What...is this...?!"
10079-50 = "There's so much to take in."
10079-60 = "Th-This is...kind of cute..."
10079-70 = "Oh? Do you need something?"
10079-80 = "Sensei, over here. You're pretty late! I've been waiting."
10079-90 = "Great work, Sensei. Oh, me? I've been here all along."
10079-100 = "Going outside by myself is still a tall order..."
10079-110 = "You want me to help out during power outages...? You're kidding, right?"
10079-120 = "...I guess I could help if you really need me to."
10079-130 = "Sometimes I think this place is just like my Academy City."
10079-140 = "Sensei, do you want to get some fresh air?"
10079-150 = "So, um... What's with all the talking cats?"
10079-160 = "N-No! It's nothing!"
10079-170 = "Oh! Sensei, isn't it your birthday today? Happy Birthday! Is there anything special you want?"
10079-180 = "Th-Thank you. I didn't think I'd spend my birthday here..."
10079-190 = "Ahaha... It's a weird feeling."
10079-200 = "Happy New Year, Sensei!"
10079-210 = "Say, what do people do for New Year's around here, anyway?"
10079-220 = "So, you've got Christmas here too... Do you have any plans today, Sensei?"
10079-230 = "It's pretty lively outside. So holidays like this are the same wherever you go..."
10079-250 = "Mmmm..."
10079-260 = "When I look at it closely, I guess it does look a bit cute..."
10079-270 = "So, this is a pig...? Or maybe a hippo?"
10079-280 = "...What?! A bird?! You're kidding!"
10079-290 = "I-I suppose, but..."
10079-300 = "Haha... Well, I guess it's all right."
10079-310 = "You know, if I think about it..."
10079-320 = "This is a gift from Sensei."
10079-330 = "...I'll be sure to treasure it."
10079-340 = "Thank you, Sensei."
10079-2600 = "To be honest, I guess it's a bit interesting... People don't usually carry something like this around. Thank you for preparing it... I'll make sure to live up to your expectations."

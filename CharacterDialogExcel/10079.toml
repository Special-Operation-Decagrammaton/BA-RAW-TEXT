[translation]
10079-10 = "蔚藍檔案！"
10079-20 = "常盤台中學二年級，御坂美琴。\n需要我的幫忙就告訴我吧。"
10079-30 = "這裡是夏萊的\n咖啡廳……"
10079-40 = "什，什麼啊。\n那個東西……！？"
10079-50 = "稀奇古怪的東西\n還真不少呢。"
10079-60 = "這，這好像\n還挺可愛的……"
10079-70 = "嗯？有人叫我嗎？"
10079-80 = "啊，老師，這邊這邊。\n來得有點晚哦，我在等你呢。"
10079-90 = "辛苦你了，老師。\n我嗎？一直待在這裡啊。"
10079-100 = "總覺～得要一個人出門，\n難度還是有點高……"
10079-110 = "希望我能在停電的時候幫忙？\n懂了懂了，是在開玩笑吧。"
10079-120 = "……雖然，\n也不是不行啦。"
10079-130 = "我偶～爾，\n會覺得和學園都市\n有點像呢，這裡。"
10079-140 = "老師，如果方便的話，\n要不要去吹吹風？"
10079-150 = "這裡會說話的貓\n還真多呢……\n究竟是怎麼回事？"
10079-160 = "啊，沒事！\n我什麼都沒說！"
10079-170 = "哦！老師，\n今天是你生日？\n恭喜你！\n有什麼想要的東西嗎？"
10079-180 = "咦？謝，謝謝。\n沒想到竟然連生日\n都在這裡度過……"
10079-190 = "啊哈哈……\n心情有點複雜呢。"
10079-200 = "新年快樂，老師！"
10079-210 = "這麼說來，\n這裡新年的時候\n都會做什麼呢？"
10079-220 = "聖誕節啊……\n原來這邊也會慶祝啊。\n老師有要出門的邀約嗎？"
10079-230 = "外面好像鬧哄哄的呢。\n這種日子總～覺得\n會發生各種事……"
10079-250 = "唔～～～嗯。"
10079-260 = "其實看久了，\n好像開始覺得\n有點可愛……"
10079-270 = "話說，這是豬嗎……？\n還是河馬？"
10079-280 = "……咦，鳥！？\n騙人的吧！？"
10079-290 = "是，是沒錯啦……"
10079-300 = "啊哈哈……算了，\n是什麼都無所謂。"
10079-310 = "話說回來，仔細想想……"
10079-320 = "這個，是老師\n送我的禮物對吧。"
10079-330 = "……我會好好珍惜的。"
10079-340 = "謝謝你，老師。"
10079-2600 = "老實說，我覺得有點新奇……\n畢竟平常不會隨身攜帶這種東西。\n特地為我準備……真的很感謝。\n為了回應期待，我會努力的。"

[translation]
10079-10 = "Blue Archive!"
10079-20 = "มิซากะ มิโคโตะ ชั้นปีที่ 2 โรงเรียนมัธยมต้นโทคิวะได\nอยากให้ฉันช่วยอะไรก็บอกได้เลยนะ"
10079-30 = "ที่นี่คือคาเฟ่\nของชาเล่ต์งั้นเหรอ..."
10079-40 = "นะ...นั่นมันอะไรน่ะ...?!"
10079-50 = "มีอะไรน่าตื่นตาตื่นใจ\nเยอะจัง"
10079-60 = "นะ... นี่มัน\nน่ารักเหมือนกันนะเนี่ย..."
10079-70 = "หืม? มีใครเรียกรึเปล่านะ?"
10079-80 = "อ๊ะ คุณครู ทางนี้ๆ\nทำไมเพิ่งมาเอาตอนนี้ล่ะ\nฉันรออยู่ตั้งนานแล้วนะ"
10079-90 = "ทำได้ดีมากเลยนะคุณครู\nฉันเหรอ? ฉันก็อยู่ตรงนี้\nตลอดเลยนะ"
10079-100 = "ให้ออกไปไหนมาไหนคนเดียว\nฉันว่ามันก็ยังยากอยู่นะ..."
10079-110 = "อยากให้ฉันไปช่วย\nตอนไฟดับงั้นเหรอ?\nอะไรกัน พูดเล่นใช่มั้ย?"
10079-120 = "...แต่ก็นะ\nก็ใช่ว่าฉันจะไปช่วยไม่ได้"
10079-130 = "บางครั้งฉันก็รู้สึกว่า\nที่นี่มีความคล้ายกับ\nเมืองแห่งการศึกษาน่ะ"
10079-140 = "คุณครู ถ้าไม่ติดอะไร\nเราออกไปรับลมกันหน่อยมั้ย?"
10079-150 = "ที่นี่มีแมว\nที่พูดได้เยอะเลย...\nนี่มันเกิดขึ้นได้ยังไงกัน?"
10079-160 = "มะ... ไม่!\nไม่มีอะไรสักหน่อย!"
10079-170 = "โอ๊ะ! คุณครู\nวันนี้วันเกิดคุณครูเหรอ?\nยินดีด้วยนะ! มีอะไรที่\nอยากได้เป็นพิเศษมั้ย?"
10079-180 = "เอ๋? ขะ... ขอบคุณนะ\nไม่คิดเลยว่าจะได้\nมาฉลองวันเกิดที่นี่...."
10079-190 = "อะฮะฮ่ะฮ่ะ...\nรู้สึกแปลกๆ แฮะ"
10079-200 = "สวัสดีปีใหม่นะ คุณครู!"
10079-210 = "จะว่าไปแล้วตอนปีใหม่\nคนที่นี่ทำอะไรกันเหรอ?"
10079-220 = "คริสต์มาส...\nคนที่นี่ก็มีวันนี้สินะ\nคุณครูมีนัดต้องออกไป\nข้างนอกรึเปล่า?"
10079-230 = "ข้างนอกดูเอะอะจังเลยนะ\nในวันแบบนี้มีเรื่องเกิดขึ้นเยอะเลย..."
10079-250 = "อืมมมม~~~"
10079-260 = "พอดูไปนานๆ เข้า\nน้องก็น่ารักอยู่\nเหมือนกันนะเนี่ย..."
10079-270 = "ตกลงว่า น้องเป็นหมูเหรอ...?\nหรือว่าฮิปโป?"
10079-280 = "...ว่าไงนะ!? นกเหรอ!?\nล้อกันเล่นรึเปล่า!?"
10079-290 = "มะ... มันก็จริงอยู่หรอก..."
10079-300 = "ฮะฮ่า... เอาเถอะ\nจะยังไงก็ได้แหละ"
10079-310 = "จะว่ายังไงดีนะ\nพอมาคิดดูดีๆ แล้ว..."
10079-320 = "นี่เป็นของขวัญที่\nคุณครูให้มานี่นา"
10079-330 = "...ฉันจะรักษาอย่างดีเลย"
10079-340 = "ขอบคุณนะ คุณครู"
10079-2600 = "พูดตามตรงนี่ก็เป็นเรื่องแปลกใหม่\nอยู่นะ... ปกติแล้วฉันไม่พกอะไร\nแบบนี้ติดตัวน่ะ ขอบคุณที่หามาให้นะ\nฉันจะทำให้ดี ไม่ให้ผิดหวังเลย"

[translation]
10066-10 = "블루 아카이브!"
10066-20 = "메이드로 전직했어도, 아리스는 아리스입니다.\n지켜봐 주세요, 선생님!"
10066-30 = "……어디서부터\n청소할까요?"
10066-40 = "서브 퀘스트가 발생할\n것 같은 장소입니다…!"
10066-50 = "아리스, 알고 있어요.\n세상에는\n메이드 카페라는 게 있대요!"
10066-60 = "메이드에게는\n주인이 필요해요.\n아리스의 주인은…\n물론 선생님입니다!"
10066-70 = "메이드 레벨이 올랐어요!\n아리스와 메이드복의 궁합,\n조금 좋아졌습니다."
10066-80 = "어서 오세요, 주인님!"
10066-90 = "메이드 아리스에게\n무엇이든 맡겨주세요."
10066-100 = "뭐든지 말해주세요."
10066-110 = "지금의 아리스는\n선생님의 메이드니까요!"
10066-120 = "오늘의 아리스는 메이드이자 용사!"
10066-130 = "즉 메이드 용사입니다!"
10066-140 = "메이드 용사란 메이드와 용사의\n경지에 이른 끝에 있습니다."
10066-150 = "RPG로 비유하자면 상급직입니다!"
10066-160 = "메이드 옷으로 갈아입으니,\n청소 스킬이 는 것 같아요!"
10066-170 = "선생님, 혹시 청소할 곳이 있나요?"
10066-180 = "메이드는 다양한\n일을 해낸다고 들었어요!"
10066-190 = "요리, 청소, 세탁♪\n파괴에 강습, 경비에 세계평화까지!"
10066-200 = "저격수에게 중요한 것은\n평상심이라고 들었습니다."
10066-210 = "서, 선생님?\n그렇게 머리를 쓰다듬으시면……?"
10066-220 = "후아아아…… 아리스는\n평상심이 깨지고 말았습니다……"
10066-230 = "선생님, 오늘 스케줄 알려주세요!"
10066-240 = "하루 종일 뒹굴뒹굴하는 건가요?\n네? 아리스도…?"
10066-250 = "네! 아리스도 뒹굴뒹굴하겠습니다!"
10066-260 = "생일 축하해요, 선생님!"
10066-270 = "기념 아이템은\n뭐가 좋으신가요?"
10066-280 = "게임개발부 친구들,\n그리고 선생님과 만난 날…"
10066-290 = "그날 있었던 일을,\n아리스는 잊지 않을 거예요."
10066-300 = "선생님,\n앞으로도 잘 부탁드립니다!"
10066-310 = "새해 복 많이 받으세요, 선생님!"
10066-320 = "메이드 아리스의 첫 일,\n뭐가 좋으세요?"
10066-330 = "……옆에 있기만 해도 된다구요?"
10066-340 = "아리스, 알고 있습니다."
10066-350 = "게임이든 현실이든, \n크리스마스는 이벤트의 시간입니다!"
10066-360 = "해피 할로윈!"
10066-370 = "다 같이 게임 캐릭터처럼\n가장하는 날이네요!"
10066-380 = "아니면…\n게임이 현실이 되는 날일까요?"
10066-400 = "선, 선생님!?\n아리스, 아직\n준비 중이라서……"
10066-410 = "메이드를 극복하고,\n전직한 아리스의 모습……"
10066-420 = "선생님께 보여드리려고\n생각했는데……"
10066-430 = "아리스가 준비를 끝낼 때까지,\n조금만 기다려 주세요."
10066-440 = "맞아요!\n이제 메이드는 무섭지 않아요!"
10066-450 = "이건 전부 선생님이\n계셔 주었기 때문입니다."
10066-460 = "선생님과 함께라면……"
10066-470 = "아리스는 어떤 던전이든\n공략할 수 있으니까요."
10066-480 = "네! 아리스,\n모험 준비가 끝났어요!"
10066-2600 = "이건… 아리스와 선생님의\n힘으로 강화한 전설의 성검…!\n감사합니다 선생님!\n아리스, 메이드 레벨을 더 올려서\n메이드 용사가 되겠습니다!"

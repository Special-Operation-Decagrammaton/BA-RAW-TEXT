[translation]
10066-10 = "Blue Archive!"
10066-20 = "ถึงจะเปลี่ยนคลาสเป็นเมด แต่อาริสึก็คืออาริสึคนเดิมค่ะ\nคอยเฝ้าดูอาริสึด้วยนะคะคุณครู!"
10066-30 = "...ให้เริ่มทำความสะอาด\nจากตรงไหนดีคะ?"
10066-40 = "ที่นี่เหมือนจะมี\nเควสรองให้เล่นเลยค่ะ...!"
10066-50 = "อาริสึรู้ดีค่ะว่าในโลกนี้\nมีสิ่งที่เรียกว่า\nเมดคาเฟ่อยู่ด้วยค่ะ!"
10066-60 = "ถ้าเป็นเมดก็ต้องมีนายท่าน\nนายท่านของอาริสึ...\nแน่นอนว่าต้องเป็นคุณครูค่ะ!"
10066-70 = "เลเวลเมดเพิ่มขึ้นแล้วค่ะ!\nอาริสึกับชุดเมดเริ่มเหมาะกัน\nขึ้นมานิดหน่อยแล้วค่ะ"
10066-80 = "เชิญเลยค่ะนายท่าน!"
10066-90 = "ไม่ว่าเรื่องอะไร\nก็ให้เมดอาริสึทำได้เลยค่ะ"
10066-100 = "วางใจได้ทุกเรื่องเลยค่ะ"
10066-110 = "ก็อาริสึในตอนนี้\nคือเมดของคุณครูยังไงล่ะคะ!"
10066-120 = "อาริสึในวันนี้เป็นทั้งเมดและผู้กล้า!"
10066-130 = "หรือเรียกได้ว่าผู้กล้าเมดค่ะ!"
10066-140 = "ผู้กล้าเมดก็คือที่สุดของ\nทั้งเมดและผู้กล้าค่ะ"
10066-150 = "ถ้าเทียบกับเกม RPG\nก็ต้องเป็นอาชีพสูงสุดค่ะ!"
10066-160 = "พอเปลี่ยนมาใส่ชุดเมด\nก็เหมือนว่าสกิลทำความสะอาด\nจะพัฒนาขึ้นเลยค่ะ!"
10066-170 = "คุณครู มีตรงไหนจะให้\nทำความสะอาดมั้ยคะ?"
10066-180 = "ได้ยินมาว่า เมดทำงานได้\nหลายแบบเลยค่ะ!"
10066-190 = "ทั้งทำอาหาร ทำความสะอาด ซักผ้า♪\nทำลายล้าง โจมตี เฝ้ายาม\nแล้วก็พิทักษ์สันติ!"
10066-200 = "ได้ยินมาว่าสิ่งสำคัญ\nของสไนเปอร์\nก็คือความสงบทางใจค่ะ"
10066-210 = "คะ... คุณครู?\nถ้ามาลูบหัวกันแบบนี้ละก็..."
10066-220 = "แหะๆ... เดี๋ยวความสงบทางใจ\nของอาริสึก็แตกกระเจิงหรอกคะ..."
10066-230 = "คุณครูคะ บอกตารางงานวันนี้\nมาหน่อยสิคะ!"
10066-240 = "กลิ้งไปกลิ้งมาทั้งวันเลยเหรอคะ?\nคะ? อาริสึก็ด้วย...?"
10066-250 = "ค่ะ! อาริสึก็จะกลิ้งไปกลิ้งมาด้วยค่ะ!"
10066-260 = "สุขสันต์วันเกิดค่ะคุณครู!"
10066-270 = "อยากได้ไอเทมอะไร\nเป็นของขวัญเหรอคะ?"
10066-280 = "วันที่ได้เจอเพื่อนๆ ชมรมพัฒนาเกม\nและคุณครู..."
10066-290 = "เรื่องที่เกิดขึ้นในวันนั้น\nอาริสึจะไม่ลืมเลยค่ะ"
10066-300 = "คุณครู\nต่อไปก็ขอฝากตัวด้วยนะคะ!"
10066-310 = "สวัสดีปีใหม่ค่ะคุณครู!"
10066-320 = "วันแรกของเมดอาริสึ\nให้ทำอะไรดีคะ?"
10066-330 = "...ให้อยู่ข้างๆ กันก็พอเหรอคะ?"
10066-340 = "อาริสึรู้ดีค่ะ"
10066-350 = "ไม่ว่าจะในเกมหรือชีวิตจริง\nคริสต์มาสคือเทศกาล\nที่ต้องเฉลิมฉลองค่ะ!"
10066-360 = "แฮปปี้ฮาโลวีน!"
10066-370 = "ถึงวันที่ทุกคนแต่งตัว\nเหมือนตัวละครในเกมแล้วค่ะ"
10066-380 = "หรือว่านี่คือ...\nวันที่เกมกลายเป็นความจริงคะ?"
10066-400 = "คะ... คุณครู!?\nอาริสึยังเตรียมตัว\nอยู่เลย..."
10066-410 = "อาริสึคิดว่าจะให้คุณครูได้เห็น\nอาริสึที่ก้าวข้ามชุดเมด"
10066-420 = "แล้วเปลี่ยนคลาส\nมาได้แล้วน่ะค่ะ..."
10066-430 = "คุณครูช่วยรออีกนิด\nจนกว่าอาริสึจะเตรียมตัวเสร็จ\nได้มั้ยคะ"
10066-440 = "ใช่แล้วค่ะ!\nตอนนี้อาริสึไม่กลัวเมดแล้วค่ะ!"
10066-450 = "ทั้งหมดนี้เป็นเพราะ\nคุณครูอยู่ข้างๆ กันไงคะ"
10066-460 = "เพราะถ้าอยู่กับคุณครู..."
10066-470 = "ไม่ว่าจะดันเจี้ยนแบบไหน\nอาริสึก็ฝ่าฟันได้ค่ะ!"
10066-480 = "ค่ะ! อาริสึพร้อม\nออกผจญภัยแล้วค่ะ!"
10066-2600 = "นี่คือ... ดาบวิเศษในตำนานที่อัปเกรด\nจากพลังของอาริสึกับคุณครูค่ะ...!\nขอบคุณค่ะ คุณครู!\nอาริสึจะอัปเลเวลเมดให้มากขึ้น\nแล้วเป็นผู้กล้าเมดให้ได้ค่ะ!"

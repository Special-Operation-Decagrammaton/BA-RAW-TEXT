[translation]
10066-10 = "Blue Archive!"
10066-20 = "Although I look like a maid now, in truth I am still Aris. Please continue to support me, Sensei."
10066-30 = "Where shall I begin to clean?"
10066-40 = "This looks like a location that will trigger a side quest!"
10066-50 = "I have heard tell that this world holds places called \"maid cafes.\""
10066-60 = "A maid needs a master. My master must be you, Sensei!"
10066-70 = "My maid level has gone up! Wearing this maid uniform has improved my stats!"
10066-80 = "Welcome, Master!"
10066-90 = "Aris the maid is here to take care of everything!"
10066-100 = "Tell me anything."
10066-110 = "For now, I am your maid, Sensei!"
10066-120 = "I am both a hero and a maid today."
10066-130 = "So that makes me a hero maid!"
10066-140 = "A hero maid has to have all the skills of both a hero and a maid."
10066-150 = "So that means it is an advanced class!"
10066-160 = "When I wear a maid uniform, I feel as if my cleaning skill level has increased!"
10066-170 = "Sensei, do you need me to clean somewhere?"
10066-180 = "I have heard that a maid has many duties!"
10066-190 = "Cooking, cleaning, laundry, destruction, ambushes, security and even world peace! ♪"
10066-200 = "I have heard that a calm mind is very important for a sniper."
10066-210 = "Um, S-Sensei? When you pat my head like that..."
10066-220 = "Augh... I have lost my calm mind..."
10066-230 = "Sensei, what is on your task list for the day?"
10066-240 = "Oh, you are going to spend all day vegging out? And you want me to join you?"
10066-250 = "Yes! I will veg out as well!"
10066-260 = "Happy birthday, Sensei!"
10066-270 = "What would you like as a gift item?"
10066-280 = "The day I met you and my friends in the Game Development Department..."
10066-290 = "I will not ever forget that day."
10066-300 = "Sensei, I look forward to many more days together!"
10066-310 = "Happy New Year, Sensei!"
10066-320 = "What is my first task as a maid?"
10066-330 = "Is it truly all right for me to just spend time with you?"
10066-340 = "I know."
10066-350 = "In games or in reality... Christmas is a time for events!"
10066-360 = "Happy Halloween!"
10066-370 = "Today is a day people when disguise themselves as video game characters!"
10066-380 = "Or...is it that video games are becoming reality today...?"
10066-400 = "S-Sensei?! I am still preparing..."
10066-410 = "I wanted to show you that I had overcome my fears and successfully changed my class to a maid..."
10066-420 = "That is the side of me that I want to show you."
10066-430 = "So, please wait until I am ready."
10066-440 = "That is correct! I am no longer afraid of maids!"
10066-450 = "I could achieve this only because you were here for me, Sensei."
10066-460 = "If I'm with you..."
10066-470 = "Then I can take on any dungeon in the world."
10066-480 = "Yes! I am ready for a new adventure!"
10066-2600 = "This...this is a legendary holy sword, imbued with both my strength and Sensei's! Thank you! I will raise my level even higher to become a maid hero worthy of this!"

[translation]
10066-10 = "蔚藍檔案！"
10066-20 = "就算轉職成女僕，愛麗絲還是愛麗絲。\n請拭目以待，老師！"
10066-30 = "……要從哪裡\n開始打掃呢？"
10066-40 = "像是會發生\n支線任務的地方……！"
10066-50 = "愛麗絲知道。\n世界上似乎有個\n叫做女僕咖啡廳的地方！"
10066-60 = "女僕必須要有主人。\n愛麗絲的主人……\n當然是老師！"
10066-70 = "女僕等級提升了！\n愛麗絲和女僕裝的相性，\n稍微變好了。"
10066-80 = "歡迎回來，主人！"
10066-90 = "任何事情都請\n交給女僕愛麗絲。"
10066-100 = "請儘管吩咐。"
10066-110 = "因為現在的愛麗絲\n是老師的女僕！"
10066-120 = "今天的愛麗絲\n是女僕也是勇者！"
10066-130 = "也就是女僕勇者！"
10066-140 = "所謂女僕勇者，位於\n女僕和勇者極限的前方。"
10066-150 = "用RPG來舉例的話\n就是高等職業！"
10066-160 = "換上女僕裝之後，\n感覺打掃技能升級了！"
10066-170 = "老師，你有需要\n打掃的地方嗎？"
10066-180 = "聽說女僕\n會做各種工作！"
10066-190 = "料理、打掃、洗衣服♪\n從破壞到強襲，\n從警備到世界和平！"
10066-200 = "聽說對狙擊手來說\n平常心是很重要的。"
10066-210 = "老，老師？\n頭被這樣摸的話……？"
10066-220 = "……呼哇。愛麗絲\n失去了平常心……"
10066-230 = "老師，請告訴愛麗絲\n你今天的行程！"
10066-240 = "要耍廢一整天是嗎……？\n咦？愛麗絲也要……？"
10066-250 = "是！\n愛麗絲也要耍廢！"
10066-260 = "祝你生日快樂，老師！"
10066-270 = "你喜歡哪種紀念道具呢？"
10066-280 = "和遊戲開發部的大家，\n還有老師相遇的日子……"
10066-290 = "那天所發生的事情，\n愛麗絲不會忘記的。"
10066-300 = "老師，今後\n也請你多多指教！"
10066-310 = "新年快樂，老師！"
10066-320 = "女僕愛麗絲的第一項工作，\n該做什麼好呢？"
10066-330 = "……待在\n你旁邊就好了嗎？"
10066-340 = "愛麗絲知道。"
10066-350 = "無論是遊戲還是現實，\n聖誕節就是活動的時間！"
10066-360 = "萬聖節快樂！"
10066-370 = "是大家像遊戲角色\n一樣變裝的日子呢！"
10066-380 = "或者說……是遊戲\n變成現實的日子？"
10066-400 = "老，老師！？\n愛麗絲，還在\n準備中……"
10066-410 = "克服了女僕，\n轉職後的\n愛麗絲的模樣……"
10066-420 = "雖然想讓老師看……"
10066-430 = "在愛麗絲的\n準備完成之前，\n請再稍等一下。"
10066-440 = "沒錯！\n已經不怕女僕了！"
10066-450 = "這全部都是\n因為有老師在。"
10066-460 = "只要和老師在一起……"
10066-470 = "愛麗絲無論什麼地城\n都可以攻略。"
10066-480 = "好！愛麗絲，\n做好冒險的準備了！"
10066-2600 = "這是……用愛麗絲和老師\n的力量強化的傳說聖劍……！\n謝謝你，老師！\n愛麗絲，會繼續提高女僕等級\n成為女僕勇者的！"

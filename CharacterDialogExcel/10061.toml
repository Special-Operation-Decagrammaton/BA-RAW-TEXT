[translation]
10061-10 = "蔚藍檔案。"
10061-20 = "我是三一綜合學園，\n修女會所屬的歌住櫻子。\n願安寧日日與您同在。"
10061-30 = "這裡是\n老師加以裝飾的…"
10061-40 = "各式各樣的人\n都來了呢。"
10061-50 = "和教堂的氣氛\n相當不同呢。"
10061-60 = "偶爾……\n來這種地方也不錯。"
10061-70 = "雖然形態不同，\n依然能讓人心情平靜。"
10061-80 = "恭候多時了，老師。\n願祝福今天也與您同在。"
10061-90 = "啊，老師……\n我正在為老師\n獻上祈禱。"
10061-100 = "在夏萊輔佐老師……"
10061-110 = "因為和平常的工作不同，\n讓人有點緊張。"
10061-120 = "教堂的工作……是嗎？"
10061-130 = "沒問題的。\n我已經調整好日程了。"
10061-140 = "是，老師。\n如果有我能做的事，\n請儘管說……"
10061-150 = "無論是和教堂相關的工作，\n還是一般的業務，\n或是除此之外的事……\n請您儘管吩咐。"
10061-160 = "你似乎很疲倦呢。\n有沒有什麼\n我能幫忙的呢？"
10061-170 = "是個充滿感謝的\n特別日子呢。"
10061-180 = "對我來說……也是如此。"
10061-190 = "謝謝您，老師。"
10061-200 = "生日獲得祝福……\n果然是件幸福的事呢。"
10061-210 = "一年過去，\n迎來了新的一年。"
10061-220 = "希望今年對老師來說\n也會是幸福的一年。"
10061-230 = "是的。\n今天毫無疑問\n是個特別的日子。"
10061-240 = "希望也能傳達給老師。"
10061-250 = "慶典之日的前夕……\n是最嘈雜的一天呢。"
10061-260 = "不，我並不討厭。因為\n喜悅是越分享就越龐大的。"
10061-280 = "雖然想盡可能\n不要對老師有所隱瞞……"
10061-290 = "但以我的立場來說，\n要向您揭示一切有些困難──"
10061-300 = "不過，我認為即便只是\n「存在著祕密這個事實」……"
10061-310 = "能夠傳達給您，\n真是太好了。"
10061-320 = "我不認為能夠\n獲得您的諒解。"
10061-330 = "也不會有所盼望……"
10061-340 = "儘管如此，想把我真實的一面\n展現給您的心情……還是有的。"
10061-350 = "那個……這樣的我真的可以嗎，\n我也曾對此感到不安。"
10061-360 = "比想像中更快\n獲得答案了呢。"
10061-370 = "真的……\n非常謝謝您，老師。"
10061-2600 = "您將慈悲賜給了我呢。\n我會感激地收下的。\n希望有朝一日，\n能報答這份恩惠的那天能夠到來。"

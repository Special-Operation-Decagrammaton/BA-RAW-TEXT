[translation]
10061-10 = "Blue Archive."
10061-20 = "I'm Utazumi Sakurako of the Sisterhood of Trinity General School. May you have a blessed day today."
10061-30 = "So, Sensei, this is the place you worked to create?"
10061-40 = "It seems to have welcomed many different sorts of people."
10061-50 = "It's quite different from the cathedral."
10061-60 = "Although...I certainly wouldn't mind visiting once in a while."
10061-70 = "It may be different, yet I feel at peace here."
10061-80 = "I've been waiting for you, Sensei. May you be blessed, today and all days."
10061-90 = "Oh, Sensei... I was praying for you just now."
10061-100 = "I'm supposed to assist you at Schale..."
10061-110 = "It's different from my usual work, so I'm a bit nervous."
10061-120 = "Work at the cathedral?"
10061-130 = "It's okay. I've been organizing my schedule."
10061-140 = "Yes, Sensei. If there's anything I might be able to do..."
10061-150 = "Anything regarding the cathedral, or any other work...please let me know."
10061-160 = "You seem tired. Is there anything I can do for you?"
10061-170 = "Today is a special day. I am full of gratitude."
10061-180 = "That's how I feel too."
10061-190 = "Thank you, Sensei."
10061-200 = "It's nice that someone's celebrating my birthday."
10061-210 = "A year has already passed. It's time to welcome the New Year."
10061-220 = "I wish great happiness for you in the New Year, Sensei."
10061-230 = "Yes. Today is special, without question."
10061-240 = "I hope you can feel it, too."
10061-250 = "The day before a festival... Those are the busiest days."
10061-260 = "No, I'm not saying I don't like it. The more the merrier."
10061-280 = "I don't want to hide anything... Not from you, of all people."
10061-290 = "But, in my position, it's hard for me to reveal everything..."
10061-300 = "Still, it is a relief just to be able to tell you"
10061-310 = "that I have a secret to keep."
10061-320 = "I know you may not understand."
10061-330 = "I don't expect that..."
10061-340 = "Nonetheless, I...I want you to accept me for who I am."
10061-350 = "Um... I was nervous. I thought you might not trust me once you knew..."
10061-360 = "I never dreamed I would get that answer, and so soon."
10061-370 = "I sincerely thank you, Sensei."
10061-2600 = "You're so generous. Thank you. I hope I can repay your kindness one day."

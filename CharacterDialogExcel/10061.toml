[translation]
10061-10 = "Blue Archive"
10061-20 = "ซิสเตอร์จากโรงเรียนสามัญทรีนิตี้\nอุทะซุมิ ซากุระโกะค่ะ\nขอสันติสุขและสวัสดีจงมีแด่คุณครูนะคะ"
10061-30 = "ที่นี่คือสถานที่...\nที่คุณครูจัดเตรียมไว้ให้..."
10061-40 = "มีคนมาที่นี่\nเยอะเลยนะคะ"
10061-50 = "บรรยากาศดูแตกต่าง\nจากที่วิหารเลยนะคะ"
10061-60 = "บางครั้งที่แบบนี้...\nก็ดีเหมือนกันนะคะ"
10061-70 = "ถึงรูปแบบจะต่างกัน\nแต่บรรยากาศก็สงบสุขดีนะคะ"
10061-80 = "กำลังรออยู่เลยค่ะคุณครู\nวันนี้เราก็มาสวดขอพรด้วยกันนะคะ"
10061-90 = "อ๊ะ คุณครู...\nฉันกำลังสวดขอพร\nเพื่อคุณครูอยู่เลยค่ะ"
10061-100 = "ได้มาช่วยเหลือ\nคุณครูที่ชาเล่ต์..."
10061-110 = "มันต่างจากงานที่ทำทุกวันน่ะค่ะ\nฉันก็เลยตื่นเต้นนิดหน่อย"
10061-120 = "งานของทางวิหาร... น่ะเหรอคะ?"
10061-130 = "ไม่เป็นไรค่ะ ฉันจัดการ\nตารางงานไว้เรียบร้อยแล้วค่ะ"
10061-140 = "ค่ะ คุณครู\nถ้าเป็นงานที่ฉันทำได้ละก็\nไม่ว่างานอะไร ฉันก็ยินดีค่ะ..."
10061-150 = "ทั้งงานของทางวิหาร\nและงานต่างๆ ทั่วไป\nรวมถึงงานอื่นๆ...\nไม่ว่างานอะไรก็บอกได้เลยค่ะ"
10061-160 = "คุณครูดูเหนื่อยๆ นะคะ\nมีงานอะไรที่ฉัน\nพอจะช่วยได้รึเปล่าคะ?"
10061-170 = "วันนี้เป็นวันพิเศษ\nที่อัดแน่นไปด้วย\nความรู้สึกขอบคุณค่ะ"
10061-180 = "สำหรับฉันด้วยน่ะค่ะ..."
10061-190 = "ขอบคุณนะคะคุณครู"
10061-200 = "การได้รับคำอวยพรวันเกิดแบบนี้\nเป็นเรื่องที่มีความสุขจริงๆ ด้วยค่ะ"
10061-210 = "ตอนนี้ผ่านไปหนึ่งปีแล้ว\nและปีใหม่ก็กำลังจะมาถึงแล้วนะคะ"
10061-220 = "ฉันจะสวดขอพรให้ปีนี้\nเป็นปีที่มีความสุขสำหรับ\nคุณครูนะคะ"
10061-230 = "ค่ะ วันนี้เป็นวันที่แตกต่าง\nจากทุกวันเลยนะคะ"
10061-240 = "ถ้าส่งไปถึงคุณครูด้วย\nก็คงดีนะคะ"
10061-250 = "วันก่อนงานเทศกาล...\nเป็นวันที่คนแน่นขนัดที่สุดแล้วค่ะ"
10061-260 = "เปล่าค่ะ ฉันไม่ได้ไม่ชอบหรอกค่ะ\nความสุขน่ะ ยิ่งแบ่งปันกัน\nก็จะยิ่งได้รับเพิ่มพูนขึ้นค่ะ"
10061-280 = "หากเป็นไปได้ ฉันไม่อยาก\nปิดบังคุณครูหรอกค่ะ..."
10061-290 = "ด้วยสถานะของฉัน...\nคงจะเปิดเผยทุกอย่างไม่ได้..."
10061-300 = "แต่ถึงยังไง สำหรับฉัน...\nแค่ได้บอกเรื่องที่ว่า"
10061-310 = "'ที่จริงแล้วมีความลับ'\nก็ถือว่าโชคดีแล้วค่ะ"
10061-320 = "ฉันไม่คิดว่าคุณครู\nจะเข้าใจหรอกค่ะ"
10061-330 = "และฉันก็ไม่ได้คาดหวังเอาไว้ด้วย..."
10061-340 = "แต่ถึงยังไง... ฉันก็รู้สึก...\nอยากเปิดเผยตัวจริงของฉัน\nให้คุณครูได้เห็นค่ะ"
10061-350 = "ฉันกังวลว่าคุณครูจะโอเคหรือเปล่า...\nที่ฉันเป็นแบบนี้..."
10061-360 = "แต่กลับได้รับคำตอบเรื่องนั้น\nเร็วกว่าที่คิดอีกนะคะ"
10061-370 = "ขอบคุณจริงๆ ค่ะ...\nคุณครู"
10061-2600 = "คุณครูเอื้อเฟื้อความเมตตา\nให้กับฉันสินะคะ ขอบคุณค่ะ\nสักวันหนึ่งฉันจะตอบแทน\nความเมตตานี้อย่างแน่นอนค่ะ"

[translation]
10061-10 = "블루 아카이브."
10061-20 = "트리니티 종합학원,\n시스터후드 소속의 우타즈미 사쿠라코입니다.\n늘 안녕이 함께하시길."
10061-30 = "이곳이\n선생님께서 꾸미신…"
10061-40 = "다양한 분들이\n와 계시군요."
10061-50 = "성당과는 분위기가\n많이 다르네요."
10061-60 = "가끔은…\n이런 곳도 좋겠지요."
10061-70 = "형태는 다르지만,\n평안해지는 기분입니다."
10061-80 = "기다리고 있었습니다, 선생님.\n오늘도 축복이 함께하시길."
10061-90 = "아, 선생님…\n마침, 선생님을 위해\n기도하고 있었답니다."
10061-100 = "샬레에서\n선생님을 보좌……"
10061-110 = "평소의 일과는 달라서,\n조금 긴장됩니다."
10061-120 = "성당 일… 말씀이신가요?"
10061-130 = "괜찮습니다.\n일정 정리는 해 두고 왔거든요."
10061-140 = "네, 선생님.\n제가 할 수 있는\n일이 있다면, 무엇이든…"
10061-150 = "성당에 관한 일도,\n일반적인 업무도,\n그 이외에도…\n무엇이든 말씀해 주세요."
10061-160 = "지쳐 보이시는군요.\n제가 해드릴 수 있는\n일이 있을까요?"
10061-170 = "감사로 가득한\n특별한 날이네요."
10061-180 = "저에게 있어도… 그래요."
10061-190 = "감사합니다, 선생님."
10061-200 = "생일을 축하받는 건…\n역시 행복한 일이네요."
10061-210 = "한해가 지나고 새로운 해를\n맞이할 수 있었습니다."
10061-220 = "올해도 선생님께서\n행복한 해가 되시기를\n기도합니다."
10061-230 = "네. 오늘은 틀림없이\n각별한 날입니다."
10061-240 = "선생님께도,\n전해졌으면 좋겠습니다만."
10061-250 = "축제 전날…\n가장 북적이는 날이네요."
10061-260 = "아뇨, 싫다는 건 아닙니다.\n기쁨은 나눌수록 커지니까요."
10061-280 = "선생님께는 가급적\n숨기고 싶지 않았습니다만…"
10061-290 = "제 입장 상,\n모든 걸 밝히기는 어렵고…"
10061-300 = "그래도 저에게\n'비밀이 있다는 사실'만이라도"
10061-310 = "전할 수 있어서 다행입니다."
10061-320 = "이해해주실 거라고는\n생각하지 않습니다."
10061-330 = "그것을 바라는 일도…"
10061-340 = "그럼에도, 제 본모습을\n보여드리고픈 마음이… 있답니다."
10061-350 = "그… 그런 저라도 괜찮을지…\n불안함이 있었는데…"
10061-360 = "생각보다 빨리,\n대답을 받아버렸군요."
10061-370 = "진심으로…\n감사드립니다, 선생님."
10061-2600 = "저에게 자비를 베풀어 주시는군요.\n감사합니다. 언젠가 이 은혜를\n갚을 수 있는 날이 오기를."

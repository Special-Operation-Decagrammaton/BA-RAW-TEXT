[translation]
10083-10 = "蔚藍，檔案。"
10083-20 = "百鬼夜行聯合學園所屬，百花繚亂的作戰參謀，桐生桔梗。\n為了日後的良好關係，我會協助夏萊的工作。\n……當然，我也希望得到相應的幫助。\n事情就是這樣……請多指教囉，老師。"
10083-30 = "下一個作戰，\n就趁現在制定吧。"
10083-40 = "有沒有能讓人\n靜下心來的地方……"
10083-50 = "我可是百花繚亂……\n不能做出草率的事。"
10083-60 = "老師……\n下班了嗎……"
10083-70 = "真無聊。\n堂堂夏萊也不過如此。"
10083-80 = "歡迎回來，老師。\n來，這裡，坐我旁邊吧。\n現在要開始工作了，不是嗎？"
10083-90 = "今天也很忙嗎？"
10083-100 = "啊啊，我知道。\n不用在意我。"
10083-110 = "你工作的時候，\n我會乖乖坐在這裡。"
10083-120 = "謝謝我幫忙\n夏萊的工作……？"
10083-130 = "呵呵，老師。\n你真的以為\n我是來幫你的嗎？"
10083-140 = "我可是百花繚亂的參謀哦？"
10083-150 = "夏萊的分析什麼的\n早就已經結束了。"
10083-160 = "只要我有心，\n要讓夏萊癱瘓\n簡直易如反掌。"
10083-170 = "……剛才是開玩笑的。\n別露出那種表情。"
10083-180 = "值日生的工作\n比想像中還無聊呢。"
10083-190 = "本來還期待會有\n更戲劇性的發展。"
10083-200 = "來，儘管開口吧。\n值日生必須聽從\n老師的命令。"
10083-210 = "……是這種契約吧？\n……不是嗎？"
10083-220 = "你腳踏實地做的工作，\n全都是為了奇普托斯。"
10083-230 = "……其中也有\n為我們百花繚亂\n所做的事。對吧？"
10083-240 = "……嗯，真慶幸\n能見到老師。真的。"
10083-250 = "……請不要\n一言不發就消失。"
10083-260 = "一直待在我看得到的地方……\n感覺得到體溫的距離吧。"
10083-270 = "……我所希望的，\n就只有這些了。"
10083-280 = "你的生日？\n當然記得。"
10083-290 = "我比你更期待今天的到來。"
10083-300 = "恭喜你，老師。"
10083-310 = "讓你度過有意義的\n一天的作戰，\n我已經準備好了。"
10083-320 = "來，我們出發吧，老師。"
10083-330 = "沒錯，今天是我的生日。\n更真誠地祝福我吧。"
10083-340 = "記得要把之後的\n行程全部取消哦。"
10083-350 = "因為你接下來的時間，\n我全部都打算獨占。"
10083-360 = "新年快樂，老師。"
10083-370 = "……我想說的只有這個。"
10083-380 = "畢竟現在你我都在這裡。\n又何必多說什麼呢？"
10083-390 = "聖誕快樂，老師。"
10083-400 = "……要去買火雞嗎？"
10083-410 = "我覺得偶爾\n融入這種氣氛\n好像也不錯。"
10083-420 = "Trick or Treat，老師。\n搗蛋還是糖果……\n來，選吧。"
10083-430 = "……選糖果？"
10083-440 = "……哼，真沒意思。"
10083-450 = "那，這次輪到我了。\n我當然要選搗蛋。"
10083-460 = "來吧，那麼老師你要\n怎麼搗蛋呢？呵呵。"
10083-480 = "來的真準時呢，老師。"
10083-490 = "還是跟以前一樣\n傻里傻氣的表情。"
10083-500 = "也許是吧……\n畢竟某人曾這麼說過。"
10083-510 = "好好休息就和工作一樣……\n不，比那還重要。"
10083-520 = "呵呵，優秀的參謀，\n就連別人的金玉良言\n也會銘記於心哦。"
10083-530 = "你看，想推薦\n給老師的書……\n有這麼多。"
10083-540 = "啊，不過在那之前……\n房間的打掃，\n還有綠茶一杯……\n可以麻煩你嗎？"
10083-550 = "這是你自己說過的吧？\n應該不會拒絕吧？"
10083-560 = "沒錯……\n你就是這樣的人……\n雖然我早就知道了。"
10083-570 = "算了，無所謂。\n桐生桔梗絕不會浪費\n這難得的大好機會。"
10083-580 = "我會使盡渾身解數\n向你撒嬌的……\n要做好覺悟哦……呵呵。"
10083-2600 = "這是信任我的證據？\n還是你的躊躇？\n……其實是什麼都無所謂。\n不過我是會把這種事加倍奉還的類型，\n要做好覺悟哦。呵呵，好像越來越有趣了。"

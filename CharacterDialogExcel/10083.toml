[translation]
10083-10 = "Blue Archive"
10083-20 = "คิริว คิเคียว ที่ปรึกษายุทธศาสตร์เฮียกกะเรียวรัน\nสังกัดสหพันธ์เฮียกคิยาโค ฉันจะช่วยงานของชาเล่ต์เพื่อรักษา\nความสัมพันธ์ที่ดีของเราในอนาคต ...แน่นอนว่าฉันก็หวังว่าจะ\nได้ความช่วยเหลือเช่นกัน ถ้างั้นก็... รบกวนด้วยนะคุณครู"
10083-30 = "ตอนนี้มาวางแผน\nปฏิบัติการต่อไปกันเถอะ"
10083-40 = "มีที่ตรงไหน\nสงบๆ มั้ยนะ..."
10083-50 = "ฉันคือเฮียกกะเรียวรันนะ...\nจะทำอะไรชุ่ยๆ ไม่ได้หรอก"
10083-60 = "คุณครู...\nป่านนี้งานจะเสร็จรึยังนะ..."
10083-70 = "น่าเบื่อชะมัด\nถึงจะบอกว่าเป็นชาเล่ต์\nแต่ก็มีแค่ที่เห็นสินะ "
10083-80 = "เข้ามาสิ คุณครู\nมาตรงนี้ มานั่งข้างๆ ฉัน\nเราต้องทำงานกันไม่ใช่เหรอ?"
10083-90 = "วันนี้ก็งานยุ่งเหรอ?"
10083-100 = "อ้อ ฉันรู้อยู่แล้วละ\nไม่ต้องห่วงฉันหรอก"
10083-110 = "ระหว่างที่คุณทำงาน ฉันจะ\nนั่งอย่างเรียบร้อยอยู่ตรงนี้"
10083-120 = "ขอบใจที่มาช่วยงาน\nของชาเล่ต์งั้นเหรอ...?"
10083-130 = "ฮุฮุ คุณครูคิดจริงๆ เหรอ\nว่าฉันมาที่นี่เพื่อช่วยคุณน่ะ"
10083-140 = "ฉันคือที่ปรึกษายุทธศาสตร์\nของเฮียกกะเรียวรันนะ"
10083-150 = "ฉันวิเคราะห์เกี่ยวกับชาเล่ต์\nเสร็จไปนานแล้ว "
10083-160 = "แค่ฉันตั้งใจจริง\nการทำให้ชาเล่ต์หมดอำนาจ\nก็ไม่ใช่เรื่องยากหรอก"
10083-170 = "เมื่อกี้ฉันล้อเล่นนะ\nอย่าทำหน้าแบบนั้นสิ"
10083-180 = "งานเข้าเวรเป็นอะไรที่\nง่ายกว่าที่คิดอีกนะ"
10083-190 = "อุตส่าห์หวังว่าจะได้เจอ\nอะไรที่น่าเร้าใจ\nกว่านี้หน่อยเสียอีก"
10083-200 = "เอาละ สั่งมาได้ทุกอย่างเลย\nนักเรียนเข้าเวรจะทำตามคำสั่ง\nของคุณครูเอง"
10083-210 = "ก็ตามสัญญามันเป็นอย่างนั้น\nไม่ใช่เหรอ?"
10083-220 = "งานที่คุณทำอย่างเอาจริงเอาจัง\nทั้งหมดก็น่าจะเพื่อคิโวทอส"
10083-230 = "และในนั้นก็ต้องมีงานที่ทำ\nเพื่อเฮียกกะเรียวรันด้วย ใช่มั้ย?"
10083-240 = "อื้ม ดีจังที่ฉัน\nได้มาเจอคุณครู ดีจริงๆ เลย"
10083-250 = "ห้ามหายหรือเป็นอะไรไป\nโดยไม่บอกกล่าวนะ"
10083-260 = "ต้องอยู่ในสายตาของฉัน...\nและอยู่ในที่ที่ฉันรู้สึกถึง\nอุณหภูมิร่างกายได้นะ"
10083-270 = "สิ่งที่ฉันปรารถนา\nก็มีแค่เท่านั้นละ "
10083-280 = "วันเกิดคุณน่ะเหรอ?\nฉันจำได้อยู่แล้ว"
10083-290 = "ฉันรอให้ถึงวันนี้\nมากกว่าคุณอีกนะ"
10083-300 = "สุขสันต์วันเกิดนะคุณครู"
10083-310 = "แผนการสำหรับหนึ่งวัน\nที่มีความหมายนี้\nฉันเตรียมเอาไว้หมดแล้ว"
10083-320 = "เอาละ ไปข้างนอกกันเถอะ คุณครู"
10083-330 = "ใช่ วันนี้วันเกิดฉัน\nอวยพรให้มันจริงใจ\nกว่านี้หน่อยสิ"
10083-340 = "ฉันยกเลิกตารางงาน\nหลังจากนี้หมดแล้ว"
10083-350 = "เพราะจากนี้ไปฉันจะยึด\nเวลาทั้งหมดของคุณนะ"
10083-360 = "สวัสดีปีใหม่ คุณครู"
10083-370 = "ที่ฉันอยากพูดก็มีแค่นั้นละ"
10083-380 = "ตอนนี้คุณกับฉัน\nอยู่ด้วยกันที่นี่แล้ว\nจะไปต้องการอะไรอีก?"
10083-390 = "เมอร์รีคริสต์มาสนะ คุณครู"
10083-400 = "ไปซื้อไก่งวงกันมั้ย?"
10083-410 = "บางครั้งการทำตัว\nให้เข้ากับบรรยากาศแบบนี้\nมันก็ดีเหมือนกันน่ะ"
10083-420 = "คุณครู ทริก ออร์ ทรีต\nเลือกมาว่าจะให้แกล้ง\nหรือจะเอาขนม"
10083-430 = "จะเอาเป็นขนมเหรอ?"
10083-440 = "ฮึ่ม ไม่สนุกเลยคนคนนี้"
10083-450 = "เอาละ ต่อไปตาฉัน\nฉันเลือกแกล้งอยู่แล้ว"
10083-460 = "ถ้างั้นคุณครู\nจะแกล้งอะไรฉันนะ\nฮุฮุ"
10083-480 = "มาตรงเวลาเลยนะ\nคุณครู"
10083-490 = "ยังทำหน้าทึ่มๆ เหมือนเดิมเลยนะ"
10083-500 = "งั้นเหรอ...\nมีใครบางคนบอกไว้น่ะ"
10083-510 = "ว่าการพักผ่อน\nสำคัญพอๆ กับการทำงาน\nไม่สิ สำคัญมากกว่าต่างหาก"
10083-520 = "ฮุฮุ ที่ปรึกษาที่ยอดเยี่ยม\nย่อมจดจำคำพูด\nของคนอื่นได้ดีอยู่แล้ว"
10083-530 = "ดูสิ หนังสือที่ฉัน\nอยากแนะนำคุณครู\nมีเยอะขนาดนี้เลย"
10083-540 = "อ่า แต่ก่อนหน้านั้น...\nช่วยทำความสะอาดห้อง แล้วก็\nขอชาเขียวให้ฉันแก้วหนึ่งได้มั้ย?"
10083-550 = "ตัวเองเคยบอกไว้เองไม่ใช่เหรอ?\nคงจะไม่ปฏิเสธหรอกใช่มั้ย?"
10083-560 = "อืม...\nคุณก็เป็นคนอย่างนี้ละ\n...ฉันรู้อยู่แล้ว"
10083-570 = "แต่ก็ไม่เป็นไรหรอก\nเพราะฉัน คิริว คิเคียว\nไม่ปฏิเสธโอกาสที่ตัวเองรอคอยหรอก"
10083-580 = "ฉันจะยอมให้ตามใจจนเต็มที่\nงั้นก็เตรียมตัวไว้ล่ะ...  ฮุฮุ"
10083-2600 = "นี่คือสิ่งพิสูจน์ความไว้ใจในตัวฉัน\nหรือเป็นความหลงใหลของคุณกันแน่?\nจะเป็นอะไรก็ได้ทั้งนั้น เพราะฉันเป็นคนที่\nตอบแทนเรื่องแบบนี้เต็มที่อยู่แล้ว\nเตรียมตัวไว้ได้เลย ฮุฮุ ต้องสนุกขึ้นแน่ๆ"

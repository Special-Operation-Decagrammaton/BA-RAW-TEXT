[translation]
10083-10 = "블루, 아카이브."
10083-20 = "백귀야행 연합학원 소속, 백화요란의 작전참모, 키류 키쿄.\n앞으로도 양호한 관계를 위해, 샬레의 일을 돕겠어.\n……물론 그만큼 이쪽도 도움을 받을 생각이지만 말이야.\n그런 의미에서… 잘 부탁해, 선생님."
10083-30 = "다음 작전,\n지금 세워놓자."
10083-40 = "어딘가, \n진정되는 장소는……"
10083-50 = "나는 백화요란인걸…\n어설픈 짓은 할 수 없어."
10083-60 = "선생님…\n일 끝났으려나…"
10083-70 = "지루해라.\n샬레라고 해도,\n이 정도인 거네. "
10083-80 = "어서 와. 선생님.\n자, 여기, 내 옆에 앉아.\n지금부터 일, 해야 하잖아?"
10083-90 = "오늘도 바빠?"
10083-100 = "아아, 알고 있어.\n나는 신경 쓰지 마."
10083-110 = "당신이 일하는 동안, 여기\n얌전히 앉아 있을 테니까."
10083-120 = "샬레의 일을\n도와줘서 고맙다고……?"
10083-130 = "후후, 선생님. 내가\n당신을 돕기 위해 왔다고,\n정말 그렇게 생각하는 거야?"
10083-140 = "나는 백화요란의 작전참모라고?"
10083-150 = "샬레에 대한 분석 같은 건\n이미 끝났어. "
10083-160 = "마음만 먹으면\n샬레를 무력화하는 건\n어렵지 않아."
10083-170 = "…지금 건 농담이야.\n그런 얼굴 하지 마."
10083-180 = "당번 일이라는 건,\n생각보다 단조롭구나."
10083-190 = "조금 더,\n드라마틱한 전개를\n기대하고 있었는데."
10083-200 = "자, 뭐든지 말해.\n당번은 선생님의 명령에 따른다."
10083-210 = "…그런 계약이잖아?\n아니야?"
10083-220 = "당신이 착실하게\n하고 있는 일은 전부,\n키보토스를 위한 것."
10083-230 = "…그중에는 우리 백화요란을\n위한 일도 있을 테고. 그렇지?"
10083-240 = "…응, 선생님을 만나서,\n다행이야. 정말로."
10083-250 = "…말도 없이\n사라지거나 하지 마."
10083-260 = "항상 내 눈이 닿는 장소에…\n체온이 전해지는 거리에\n있도록 해."
10083-270 = "…바라는 건, 단지\n그것뿐이니까. "
10083-280 = "당신의 생일?\n그야 기억하지."
10083-290 = "당신 이상으로 오늘이란 날을\n기대하고 있었으니까."
10083-300 = "축하해. 선생님."
10083-310 = "의미 있는 하루를\n보내기 위한 작전이라면,\n이미 다 준비해놨어."
10083-320 = "자, 나가자. 선생님."
10083-330 = "그래, 오늘은 내 생일이야.\n좀 더 진심을 담아\n축하하도록 해."
10083-340 = "이 이후의 일정도,\n전부 취소하고."
10083-350 = "지금부터 당신의 시간은,\n전부 내가 독점할 예정이니까."
10083-360 = "새해 복 많이 받아. 선생님."
10083-370 = "…하고 싶은 말은 그것뿐."
10083-380 = "그야, 지금 여기엔\n당신과 내가 있어.\n이 이상 또 뭐가 필요한데?"
10083-390 = "메리 크리스마스야. 선생님."
10083-400 = "…칠면조라도 사러 갈래?"
10083-410 = "가끔은 이런 분위기에\n어울리는 것도,\n좋을 것 같아서 말이야."
10083-420 = "트릭 오어 트릿, 이야. 선생님.\n장난이랑 과자, 자 골라봐."
10083-430 = "…과자로 한다고?"
10083-440 = "…흥, 재미없는 사람."
10083-450 = "자, 이번엔 내 차례야.\n나는 당연히 장난으로 하겠어."
10083-460 = "자, 그럼 선생님은\n무슨 장난을 쳐주려나?\n후후."
10083-480 = "늦지 않았네.\n선생님."
10083-490 = "여전히 얼빠진 표정이네."
10083-500 = "글쎄……\n누군가가 말했었지."
10083-510 = "휴식을 취하는 건,\n일하는 것만큼이나, 아니,\n그 이상으로 중요하다, 고."
10083-520 = "후후, 우수한 참모는\n타인의 금언도 제대로\n기억해두는 법이야."
10083-530 = "봐, 선생님에게\n추천하고 싶은 책이\n이렇게나 많아."
10083-540 = "아, 그 전에……\n방 청소랑, 녹차 한잔.\n부탁해도 될까?"
10083-550 = "본인이 직접 말한 거잖아?\n거절하지는 않겠지?"
10083-560 = "그래……\n당신은 그런 사람이었지.\n…알고 있었지만."
10083-570 = "뭐, 상관없나.\n나 키류 키쿄는 모처럼의\n기회를 발로 차진 않아."
10083-580 = "전력을 다해\n응석을 부릴 테니,\n각오하도록 해…… 후후."
10083-2600 = "이건 나에 대한 신뢰의 증거?\n아니면 당신의 미혹일까?\n…어느 쪽이라도 좋지만. 나, 이런 건\n착실히 배로 갚아주는 타입이니까.\n각오하도록 해. 후후, 재미있어졌을지도."

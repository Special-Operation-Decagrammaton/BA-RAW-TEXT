[translation]
26010-10 = "Blue... A-Archive..."
26010-20 = "R-RABBIT 4, reporting for duty. Should I...really be dressed like this...?"
26010-30 = "Everyone's wearing these amazing outfits..."
26010-40 = "U-Ugh..."
26010-50 = "Even though I'm wearing a s-swimsuit...no one is noticing me."
26010-60 = "(I wonder what they're talking about...)"
26010-70 = "Wh-Where did everyone g-go?"
26010-80 = "Oh, S-Sensei...! I've been waiting f-for you."
26010-90 = "I-I've been here for a w-while..."
26010-100 = "Y-You didn't forget about me, right...?"
26010-110 = "M-Memories about the ocean..."
26010-120 = "I don't think I have th-that many good m-memories..."
26010-130 = "...Is there a-anything I can help you with?"
26010-140 = "M-Maybe go out and buy some drinks...?"
26010-150 = "...What? My o-outfit is a p-p-problem?"
26010-160 = "W-Why...?"
26010-170 = "You think it's...c-cute...?! Oh... Th-Thank you..."
26010-180 = "I-I'm a little embarrassed b-by your c-compliment..."
26010-190 = "I think fishing is a perfect hobby for a s-sniper."
26010-200 = "P-Preparing your equipment and waiting for a b-bite is very similar..."
26010-210 = "...The principle is the same."
26010-220 = "I can swim...a-a little bit."
26010-230 = "I'm not very good at the b-butterfly stroke, though..."
26010-240 = "H-Happy birthday... Sensei...!"
26010-250 = "I-If I catch something good while fishing today..."
26010-260 = "It'll b-be your g-gift, Sensei... O-Only if you want though!"
26010-270 = "My b-birthday... You remembered!"
26010-280 = "...Th-Thank you so much!"
26010-290 = "H-Happy New Year, Sensei!"
26010-300 = "D-Does anyone ever...throw away osechi dishes...?"
26010-310 = "M-Moe promised to cook a big t-turkey for Christmas."
26010-320 = "I-I'm looking forward to it..."
26010-330 = "I-If it's okay with you, Sensei... W-Will you join us?"
26010-340 = "I might be just a l-little cold wearing this..."
26010-350 = "I wish I could drink a n-nice, warm pumpkin tea..."
26010-370 = "Heehee... Even you didn't notice me, Sensei. My disguise is perfect...again."
26010-380 = "There's an old saying: to hide a tree, put it in a forest..."
26010-390 = "If I want to blend in with the fishermen, then I'd better do some fishing, myself."
26010-400 = "...I just wish the seagulls would stop trying to nest"
26010-410 = "on my head..."
26010-420 = "Oh well. I'm used to things like that..."
26010-430 = "Heehee... Heeheehee..."
26010-440 = "I chose this place because I happen to have a fishing rod,"
26010-450 = "but it really is a perfect spot for an undercover stakeout."
26010-460 = "Visibility here is really good, so I've got excellent sight lines."
26010-470 = "There's a nice breeze to keep me cool, and I have a straw hat to shade my face..."
26010-480 = "A-And...today…"
26010-490 = "Se-Se-Sensei..."
26010-500 = "is here with me..."
26010-2600 = "RABBIT Type 39 Rifle, a-acquired. Sniping on the ocean has m-many difficulties due to the w-wind and waves. But if it's within 1 km... I-I can do it..."

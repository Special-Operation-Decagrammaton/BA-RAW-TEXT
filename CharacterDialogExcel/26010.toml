[translation]
26010-10 = "블루……아, 아카이브……"
26010-20 = "R…… RABBIT 4, 준비 완료했습니다.\n정말…… 이런 차림으로도 괜찮은가요……?"
26010-30 = "멋진 옷을 입은\n사람들이 잔뜩……"
26010-40 = "우, 우으으으……"
26010-50 = "수영복 차림인데도……\n아무도 신경쓰질 않아……"
26010-60 = "(무슨 이야기를\n하고 있는 걸까……?)"
26010-70 = "다들 어디에\n간 거야……?"
26010-80 = "아, 서, 선생님……!\n기다리고…… 있었어요."
26010-90 = "저…… 실은 아까전부터\n여기 있었는데……"
26010-100 = "저, 저, 잊으신 거 아니죠……?"
26010-110 = "바다에 대한\n추억이라면……"
26010-120 = "그다지 좋은 기억은\n많이 없는 것 같네요……"
26010-130 = "……뭔가, 도와드릴\n일은 없을까요?"
26010-140 = "나가서 마실것이라도\n사 온다든가……"
26010-150 = "……네? 이 복장으로는\n문제가 있다고요?"
26010-160 = "어, 어째서……"
26010-170 = "귀, 귀엽다고……요?\n가, 감사합니다……"
26010-180 = "저 같은 못난이에게는\n과분한 칭찬이에요……"
26010-190 = "낚시는 저격수에게\n딱 맞는 취미인 것 같아요."
26010-200 = "준비를 갖춘 채\n계속 기다린다는\n점이라던가……"
26010-210 = "……원리도\n거의 비슷하고요."
26010-220 = "수영이라면 조금은……\n할 수 있어요."
26010-230 = "접영은 아직\n잘 못하지만……"
26010-240 = "새, 생일 축하드려요……\n선생님……"
26010-250 = "오늘 낚시에서\n뭔가 좋은 게 낚이면……"
26010-260 = "꼭 선생님께\n선물로 드릴게요!"
26010-270 = "제 생일……\n기억해 주셨군요!"
26010-280 = "……정말 감사해요!"
26010-290 = "새해 복 많이 받으세요,\n선생님!"
26010-300 = "그…… 오세치 요리도……\n폐기로 나올 때가\n있을까요……?"
26010-310 = "올해 크리스마스에는\n모에 쨩이 커다란 칠면조를\n구워준다고 해서,"
26010-320 = "조금 기대하고 있어요……"
26010-330 = "괘, 괜찮으시다면 선생님도……\n함께 하시겠어요?"
26010-340 = "조금 쌀쌀해져서\n그런지……"
26010-350 = "따듯한 호박차나 한 잔\n마시고 싶네요……"
26010-370 = "후후…… 선생님께서\n바로 눈치 못채다니,\n이번 위장도 완벽했나 보네요."
26010-380 = "나무를 숨기려면\n숲이 좋다는 말처럼……"
26010-390 = "낚시꾼들 사이에 섞여 있으려면\n낚시하는 모습이\n자연스러우니까요."
26010-400 = "……갈매기나 바닷새가\n자꾸 머리에 올라타려 하는 건,"
26010-410 = "조금 곤란하지만……"
26010-420 = "이런 일은……\n익숙하거든요……"
26010-430 = "후후, 후후후……"
26010-440 = "마침 낚시 도구가 있어\n이곳으로 한 거지만,"
26010-450 = "잠복하기에\n딱 좋은 장소네요."
26010-460 = "시야도 탁 트인 곳이라,\n주변을 감시하기에도 완벽해요."
26010-470 = "바람도 선선하게 불어서\n덥지도 않고, 볕을 가려줄\n밀짚모자도 있고……"
26010-480 = "그, 그리고……\n오늘은……"
26010-490 = "서, 서, 선생님도……"
26010-500 = "……함께 계시니까요."
26010-2600 = "RABBIT 39식 소총…… 수, 수령했습니다.\n바닷가에서의 저격은 바람도 세고, 습기도 많아서……여러모로 어려운 점이 많지만……\n그래도 1km까지라면……\n어떻게든 될 것 같아요……"

[translation]
26010-10 = "蔚藍……檔、檔案……"
26010-20 = "R……RABBIT4，準備完畢。\n真的……可以穿成這樣嗎……？"
26010-30 = "穿著漂亮的人\n有好多……"
26010-40 = "嗚，嗚嗚嗚……"
26010-50 = "就算穿著泳裝……\n也不會被人注意到……"
26010-60 = "（究竟在聊些\n　什麼呢……？）"
26010-70 = "大家……\n跑去哪裡了……？"
26010-80 = "啊，老，老師……！\n我一直，在等你……"
26010-90 = "那個……其實我從剛才\n就一直在這裡了……"
26010-100 = "你，你該不會忘記我了吧……？"
26010-110 = "海邊的回憶……"
26010-120 = "好，好像沒什麼\n好的印象……"
26010-130 = "……有沒有什麼，\n我能幫忙的事呢？"
26010-140 = "像是買飲料之類的……"
26010-150 = "……咦？\n穿成這樣到外面去\n會有問題……？"
26010-160 = "為，為什麼……"
26010-170 = "很，很可愛是嗎……？\n非，非常感謝。"
26010-180 = "像我這種土妹\n實在是承擔不起……"
26010-190 = "釣魚說不定是個\n很適合狙擊手的興趣。"
26010-200 = "像是要做好準備\n並耐心等待……"
26010-210 = "就連原理也很類似。"
26010-220 = "游泳我稍微\n……會一點。"
26010-230 = "雖然還不太\n擅長蝶式……"
26010-240 = "生，生日快樂……\n老師……"
26010-250 = "今天，如果釣到\n什麼好東西的話……"
26010-260 = "我一定會\n送給老師當禮物的！"
26010-270 = "我的生日……\n你有記得呢！"
26010-280 = "……真的很謝謝你！"
26010-290 = "新年快樂，老師。"
26010-300 = "那個……御節料理……\n有可能會出現在\n報廢便當裡嗎……？"
26010-310 = "今年的聖誕節，\n萌醬好像要烤很大的\n火雞給我們吃，"
26010-320 = "所以，有點期待……"
26010-330 = "可，可以的話老師……\n要不要也來一起來吃？"
26010-340 = "不知道是不是因為有點冷\n所以……"
26010-350 = "好想喝一杯\n暖暖的南瓜茶……"
26010-370 = "呵呵……居然連老師也\n沒有馬上發現，\n看來這次的偽裝也很完美。"
26010-380 = "就像「想要隱藏一棵樹，就要藏\n在森林裡」這句話說的一樣……"
26010-390 = "想融入釣客之中的話，\n釣魚是最自然的。"
26010-400 = "……雖然海鷗或海鳥\n一直想站在我的頭上，"
26010-410 = "讓我有點困擾……"
26010-420 = "不過這種事……\n我已經習慣了……"
26010-430 = "呵呵，呵呵呵……"
26010-440 = "雖然是因為正好有釣具\n才選擇了這裡，"
26010-450 = "真是個非常\n適合潛伏的地方呢。"
26010-460 = "視野很開闊，\n要監視這附近也是最適合的。"
26010-470 = "風很涼爽，所以不會很熱，\n還有能夠遮陽的草帽……"
26010-480 = "而，而且……\n今天……"
26010-490 = "老，老，老師也……"
26010-500 = "……在我身邊。"
26010-2600 = "RABBIT39式步槍……領，領取完畢。\n在海邊狙擊不僅風大，濕氣也很強……\n所以會有點困難……\n不過，在1km以內的話……\n應該還是辦得到……"

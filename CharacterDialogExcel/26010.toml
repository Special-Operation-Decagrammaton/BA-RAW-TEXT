[translation]
26010-10 = "Blue... Archive..."
26010-20 = "R...RABBIT 4 เตรียมพร้อมแล้วค่ะ\nชะ...ชุดแบบนี้ไม่เป็นไรจริงๆ ใช่มั้ยคะ...?"
26010-30 = "มีคนใส่ชุดน่ารักๆ...\nเต็มไปหมดเลย..."
26010-40 = "ฮะ...ฮือ..."
26010-50 = "ถึงฉันจะใส่ชุดว่ายน้ำแล้ว...\nแต่ก็ไม่มีใครมองเห็น..."
26010-60 = "(พูดเรื่องอะไรอยู่นะ...?)"
26010-70 = "ทะ...ทุกคนหาย\nไปไหนกันหมดน่ะ...?"
26010-80 = "อ๊ะ คะ...คุณครู...!\nฉะ...ฉันกำลังรอ...อยู่เลยค่ะ"
26010-90 = "ฉัน...อยู่ที่นี่\nมาตั้งแต่เมื่อกี้แล้ว..."
26010-100 = "ละ...ลืมใช่มั้ยคะ...?"
26010-110 = "ถ้าเป็นความทรงจำ\nเกี่ยวกับทะเลละก็..."
26010-120 = "ฉันไม่ค่อยมีความทรงจำดีๆ\nเท่าไหร่หรอกค่ะ..."
26010-130 = "...มีงานอะไร\nที่ฉันช่วยได้รึเปล่าคะ?"
26010-140 = "อย่างเช่นให้ออกไป\nซื้อเครื่องดื่ม..."
26010-150 = "คะ...? ชุดนี้\nมีปัญหาอยู่นิดหน่อย\nเหรอคะ?"
26010-160 = "ทะ... ทำไมล่ะ...?"
26010-170 = "มะ... มันดูน่ารัก...เหรอคะ?\nขะ...ขอบคุณค่ะ..."
26010-180 = "ดะ...ดูเป็นคำชมที่เกินจริง\nสำหรับเด็กหน้าตาดูไม่ได้อย่างฉันค่ะ..."
26010-190 = "การตกปลาน่าจะเป็นงานอดิเรก\nที่เหมาะกับสไนเปอร์นะคะ"
26010-200 = "อย่างเช่นการเตรียมตัวให้พร้อม\nแล้วก็รอคอย..."
26010-210 = "...หลักการก็ค่อนข้างคล้ายกันค่ะ"
26010-220 = "เรื่องว่ายน้ำ...\nฉันพอจะว่ายได้อยู่ค่ะ"
26010-230 = "แต่ว่ายท่าผีเสื้อ\nยังว่ายไม่ได้ค่ะ..."
26010-240 = "สะ...สุขสันต์วันเกิดค่ะ คุณครู..."
26010-250 = "ถ้าวันนี้ตกปลาอะไรดีๆ มาได้..."
26010-260 = "ฉันจะเอาไปมอบให้เป็น\nของขวัญวันเกิดคุณครูนะคะ!"
26010-270 = "วันเกิดของฉัน...\nคุณครูจำได้ด้วยสินะคะ!"
26010-280 = "...ขอบพระคุณมากค่ะ!"
26010-290 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะ คุณครู!"
26010-300 = "อะ...อาหารโอเซจิ...\nจะมีเหลือมาทิ้ง...\nบ้างหรือเปล่านะ...?"
26010-310 = "คริสต์มาสปีนี้ โมเอะจังบอกว่า\nจะอบไก่งวงตัวใหญ่ๆ..."
26010-320 = "ฉันเลยรู้สึกคาดหวังนิดหน่อยค่ะ......"
26010-330 = "ถะ...ถ้าคุณครูสะดวกละก็...\nมาฉลองด้วยกันมั้ยคะ?"
26010-340 = "อาจเป็นเพราะชุดที่ใส่อยู่\nมันบางเกินไป..."
26010-350 = "ก็เลยอยากดื่มชาฟักทองอุ่นๆ\nสักถ้วยขึ้นมาค่ะ..."
26010-370 = "ฮิฮิ... แม้แต่คุณครูเอง\nก็ยังไม่สังเกตเลย ดูเหมือนว่า\nคราวนี้จะปลอมตัวสำเร็จแล้วค่ะ"
26010-380 = "เหมือนคำกล่าวที่ว่าถ้าจะซ่อนต้นไม้\nก็ควรเอาไปซ่อนในป่า..."
26010-390 = "ถ้าจะแฝงตัวเข้าไปในกลุ่มนักตกปลา\nการมานั่งตกปลาแบบนี้ก็ดู\nเป็นธรรมชาติกว่าสินะคะ"
26010-400 = "...แต่พวกนกนางนวล\nกับพวกนกทะเลชอบมานั่ง\nบนหัวบ่อยๆ แบบนี้"
26010-410 = "มันก็ลำบากอยู่นิดหน่อยค่ะ..."
26010-420 = "แต่ว่าฉัน...\nชินกับเรื่องแบบนี้แล้วค่ะ"
26010-430 = "ฮิฮิ... ฮิฮิฮิ..."
26010-440 = "ฉันเลือกที่นี่\nเพราะมันมีอุปกรณ์ตกปลาอยู่"
26010-450 = "แต่ว่าก็เป็นสถานที่\nที่เหมาะกับการพรางตัวเลยนะคะ"
26010-460 = "ที่นี่เป็นสถานที่เปิด เลยเป็นที่ที่เหมาะ\nสำหรับจับตาดูบริเวณรอบๆ ค่ะ"
26010-470 = "แถมลมก็พัดอยู่ตลอด\nทำให้ไม่ร้อนมาก แล้วก็ยัง\nมีหมวกฟางที่ใช้บังแดดอยู่..."
26010-480 = "ละ...แล้วก็...\nวันนี้..."
26010-490 = "กะ...กะ...ก็มีคุณครู..."
26010-500 = "ยะ...อยู่กับฉันด้วยนี่คะ"
26010-2600 = "ได้รับ RABBIT Type 39 Rifle... แล้วค่ะ\nที่ทะเลลมแรง และมีความชื้นสูง...\nละ...และมีเรื่องยากๆ หลายอย่างก็จริง\nแต่ถ้าเป็นในระยะ 1 กิโลเมตรละก็...\nยังไงก็ไม่มีปัญหาค่ะ..."

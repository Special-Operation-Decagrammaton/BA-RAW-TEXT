[translation]
10053-10 = "Blue Archive!"
10053-20 = "ฮิฮิ... ฉันเตรียมทุกอย่างเอาไว้พร้อมแล้ว\nวันนี้การคำนวณของฉัน จะไม่ผิดพลาดแน่นอนค่ะ!"
10053-30 = "เหนื่อยจังเลย\nพักที่นี่สักหน่อยได้มั้ยนะ..."
10053-40 = "ถ้าไม่เตรียมพร้อม\nดูแลร่างกายเอาไว้\nตั้งแต่ช่วงปกติคงไม่ดีแน่..."
10053-50 = "คาเฟ่นี้น่าสนใจจัง...\nเกินจากที่คาดการณ์ไว้เลย"
10053-60 = "ถึงจะรู้อยู่แล้วก็เถอะ\nแต่ว่าการออกกำลังกาย\nไม่ใช่เรื่องง่ายๆ เลยนะ..."
10053-70 = "หวังว่าจะไม่ล้มละลายนะ..."
10053-80 = "เชิญค่ะคุณครู\nกำลังรออยู่เลยค่ะ"
10053-90 = "เอาละ... งานที่ค้างอยู่\nกองเป็นภูเขาเลยนะคะ!"
10053-100 = "มาสายนะคะ!"
10053-110 = "..."
10053-120 = "ฉันจะยอมแค่ครั้งนี้\nครั้งเดียวนะคะ"
10053-130 = "ครั้งต่อไป\nช่วยมาให้เร็วกว่านี้ด้วยค่ะ"
10053-140 = "ได้ยินว่าแค่เปลี่ยนชุดที่ใส่\nก็เปลี่ยนอารมณ์ได้แล้วค่ะ"
10053-150 = "ฉันเองก็ไม่ค่อยเข้าใจเท่าไร..."
10053-160 = "ว่าแต่ว่า... ชุดนี้เป็นยังไงบ้างคะ?"
10053-170 = "ทั้งในฐานะนักบัญชี และนักกีฬา"
10053-180 = "ไม่ว่าในฐานะไหน\nฉันก็จะทำให้ดีที่สุดค่ะ"
10053-190 = "สะ...ใส่ชุดนี้แล้วดูสดใสดี\nงั้นเหรอคะ?"
10053-200 = "จะ... จู่ๆ พูดอะไรคะเนี่ย...!"
10053-210 = "ตะ...แต่ก็...\nขอบคุณค่ะคุณครู..."
10053-220 = "มัดผมหางม้าแบบนี้\nเหมาะกับฉันดีงั้นเหรอคะ?"
10053-230 = "คะ... คุณครูก็ชอบพูดแบบนี้\nตลอดเลยนะคะ...!"
10053-240 = "อันที่จริงฉันเอง...\nก็ไม่ได้เกลียดอะไรหรอกค่ะ"
10053-250 = "มันอาจเป็นเรื่องที่มองข้ามไปง่ายๆ"
10053-260 = "แต่ว่าเรื่องกำลังกายก็เป็นหัวข้อหนึ่ง\nที่วิเคราะห์ได้ด้วยวิทยาศาสตร์นะคะ"
10053-270 = "ถึงในระหว่างวิ่งก็ไม่ค่อยได้คิด...\nอะไรแบบนั้นเท่าไรก็เถอะค่ะ"
10053-280 = "สุขสันต์วันเกิดค่ะคุณครู"
10053-290 = "ถ้านับจากวันที่คุณครูเกิดมา\nตอนนี้คุณครูก็จะอายุ..."
10053-300 = "ฮิฮิ... ไม่ต้องกังวลหรอกค่ะ\nฉันไม่นับก็ได้ค่ะ"
10053-310 = "คุณครู...\nจำได้ด้วยงั้นเหรอคะ?"
10053-320 = "วันนี้เป็นวันเกิดของฉันค่ะ"
10053-330 = "ฉันเคลียร์ตารางงานให้ว่าง\nเพื่อวันนี้เลย..."
10053-340 = "แล้วคุณครู... มีเวลาว่างรึเปล่าคะ?"
10053-350 = "ขอให้มีความสุขในวันปีใหม่ค่ะ\nคุณครู"
10053-360 = "ปีนี้ก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
10053-370 = "ถ้าคุณครูสะดวกละก็...\nมาวิ่งออกกำลังกายครั้งแรก\nของปีด้วยกันมั้ยคะ?"
10053-380 = "ฉันไม่ค่อยเข้าใจเท่าไร\nว่าทำไมคนอื่นๆ ถึงตื่นเต้น\nเรื่องวันคริสต์มาสกัน..."
10053-390 = "แต่พอคิดว่าจะได้ใช้เวลากับคุณครู..."
10053-400 = "ก็เหมือนจะเข้าใจ\nความรู้สึกของพวกเขาค่ะ"
10053-410 = "วันที่ต้องแต่งชุดแฟนซี...\nวันที่ได้ลูกกวาด...\nเดี๋ยวนะ ลูกกวาด?!"
10053-420 = "วันแห่งแคลอรี่ชัดๆ เลย!"
10053-430 = "ถะ... ถึงจะใส่ชุดพละอยู่\nฉันก็จะไม่ประมาทเด็ดขาดค่ะ!"
10053-450 = "แฮ่ก...แฮ่ก..."
10053-460 = "ไม่อยากเชื่อเลยว่าแค่ไม่กี่เดือน\nร่างกายก็อ่อนแอลงขนาดนี้แล้ว..."
10053-470 = "อย่างน้อยเพื่อไม่ให้เสียชื่อ\nในงานเทศกาลฮาโลเฟสติวัล..."
10053-480 = "ฉันต้องฝึกร่างกาย\nให้พร้อมกว่านี้แล้วละค่ะ"
10053-490 = "อ๊ะ คุณครูเอง...\nก็ดื่มน้ำสักหน่อยมั้ยคะ?"
10053-500 = "เอ้า นี่ค่ะ..."
10053-510 = "ระ... รอเดี๋ยวก่อนค่ะคุณครู!\nคะ... คิดอีกที ตอนนี้คงไม่ดีเท่าไรค่ะ!"
10053-520 = "(น้ำขวดที่ฉันดื่มแล้ว...\nถ้าเกิดคุณครูดื่มต่อละก็\nมันจะกลายเป็น...)"
10053-530 = "(จูบทางอ้อมน่ะสิ...)"
10053-540 = "(ไม่ได้ๆ ถึงจะเป็น\nสถานการณ์แบบนี้ก็เถอะ...)"
10053-550 = "(แต่ก็จะให้เกิดเรื่องน่าอาย\nแบบนั้นไม่ได้!)"
10053-560 = "(แต่ว่าถ้าเป็นคุณครูละก็...)"
10053-570 = "คุณครู…\nดื่มสักอึกก่อนมั้ยคะ?"
10053-2600 = "เป็นอุปกรณ์ที่สมเหตุสมผล...\nและเหมาะกับการออกกำลังกาย\nดีนะคะ ขอบคุณค่ะคุณครู"

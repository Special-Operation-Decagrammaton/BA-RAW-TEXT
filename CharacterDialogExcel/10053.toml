[translation]
10053-10 = "蔚藍檔案！"
10053-20 = "呵呵……準備萬無一失。\n我今天的計算，不會有任何失誤唷！"
10053-30 = "有點累了……\n要在這裡休息嗎。"
10053-40 = "平常不注意\n身體管理的話…"
10053-50 = "這間咖啡廳，真有趣。\n可能在我的計算之外。"
10053-60 = "雖然我很清楚，\n運動並不容易呢。"
10053-70 = "希望不會破產…"
10053-80 = "歡迎回來，老師。\n我一直在等你。"
10053-90 = "……來，一點一滴累積的\n工作已經像座山一樣了唷！"
10053-100 = "你遲到了！"
10053-110 = "……"
10053-120 = "這次就不跟你計較了。"
10053-130 = "下次開始，\n請早點來哦？"
10053-140 = "常有人說只要換套衣服\n就能轉換心情對吧。"
10053-150 = "雖然我不太清楚……"
10053-160 = "……話說回來，\n這套衣服，你覺得怎麼樣？"
10053-170 = "無論作為會計還是選手。"
10053-180 = "我都會全力以赴。"
10053-190 = "這副模樣\n很新鮮……是嗎？"
10053-200 = "怎，怎麼突然這麼說！？"
10053-210 = "唔……那個……\n謝謝……"
10053-220 = "馬尾很適合我，是嗎？"
10053-230 = "老，老師總是\n說這種口是心非\n的場面話……！"
10053-240 = "……雖然我\n並不討厭就是了……"
10053-250 = "雖然時常被忽略，"
10053-260 = "但體育也是能以科學\n分析的理系科目之一唷？"
10053-270 = "……雖然我在跑步\n的時候並不這麼認為。"
10053-280 = "生日快樂，老師。"
10053-290 = "如果從出生當天\n開始計算天數……"
10053-300 = "呵呵，還是別算了吧。"
10053-310 = "老師……\n那個，你記得嗎？"
10053-320 = "今天是我的生日。"
10053-330 = "我為了今天\n空出行程了。"
10053-340 = "老師你……\n有時間嗎？"
10053-350 = "新年快樂，老師。"
10053-360 = "今年也請多多指教哦。"
10053-370 = "如果可以的話，\n今年第一次跑步，\n要不要和我一起呀？"
10053-380 = "把聖誕節當成\n特異點的人們的心情\n雖然我不太理解……"
10053-390 = "但想到能和老師\n在一起的話……"
10053-400 = "好像就能稍微理解了。"
10053-410 = "裝扮、惡作劇、\n糖果，還有……"
10053-420 = "卡路里的日子！"
10053-430 = "就，就算穿著體育服，\n我也不會大意的哦！"
10053-450 = "哈啊，哈啊……"
10053-460 = "沒想到才過了短短幾個月，\n我的體力居然會下降這麼多……"
10053-470 = "為了不在\n「晄輪大祭」上丟臉……"
10053-480 = "得要更認真鍛鍊體力才行。"
10053-490 = "啊，老師\n也要喝水嗎？"
10053-500 = "來，請……"
10053-510 = "請，請等一下，老師！\n果，果然現在還不行！"
10053-520 = "（要是老師現在\n喝了這瓶我喝過的\n寶特瓶的水……）"
10053-530 = "（那不就是事實上的間接接…)"
10053-540 = "（不行不行，\n就算是這種情況）"
10053-550 = "（那種不知羞恥的事情\n也是不可以的……！）"
10053-560 = "（可是…如果是老師的話…）"
10053-570 = "只能……\n喝一口唷……？"
10053-2600 = "這是很合理……\n而且非常適合運動的裝備呢。\n謝謝你，老師。"

[translation]
10053-10 = "블루 아카이브!"
10053-20 = "후후…… 준비만전이에요.\n오늘의 제 계산에, 실수는 없을 테니까요!"
10053-30 = "조금 지쳤는데……\n여기서 쉴 수\n있으려나."
10053-40 = "평소부터\n체력 관리에\n신경 쓰지 않으면…"
10053-50 = "이 카페는 인상적이네.\n조금, 계산 외야."
10053-60 = "알고는 있었지만,\n운동이란 게 쉽지가\n않네……"
10053-70 = "파산하지 않았으면\n좋겠는데……"
10053-80 = "어서 오세요. 선생님.\n기다리고 있었답니다."
10053-90 = "……자, 쌓인 일이\n산더미처럼 있으니까요!"
10053-100 = "늦으셨잖아요!"
10053-110 = "……."
10053-120 = "이번만, 봐 드릴 테니까요."
10053-130 = "다음부터는\n일찍 와 주셔야 해요?"
10053-140 = "옷을 갈아입는 것만으로도\n기분전환이 된다고들 하죠."
10053-150 = "저는 잘 모르겠지만……"
10053-160 = "……그래서,\n이 복장. 어떠신가요?"
10053-170 = "회계로서도 선수로서도,"
10053-180 = "어느 쪽이든\n최선을 다할 뿐이에요."
10053-190 = "이 의상, 신선…… 하다고요?"
10053-200 = "가, 갑자기 무슨 말씀을……!"
10053-210 = "우읏…… 그……\n감사합니다……"
10053-220 = "포니테일이 잘 어울린다고요?"
10053-230 = "서, 선생님은 언제나\n마음에도 없는 소리를……!"
10053-240 = "……그게 싫다는 건,\n아니지만요……"
10053-250 = "간과하기 쉽지만,"
10053-260 = "체육도 과학적으로\n분석할 수 있는\n이과 과목 중 하나랍니다?"
10053-270 = "……달리는 중에는\n그런 생각이 잘 안 들지만요."
10053-280 = "생일 축하드립니다. 선생님."
10053-290 = "태어나신 날로부터\n날짜를 계산하면……"
10053-300 = "후훗. 그만두기로 하죠."
10053-310 = "선생님……\n혹시 기억하시나요?"
10053-320 = "오늘은 제 생일이랍니다."
10053-330 = "오늘을 위해\n스케줄을 비워 두었는데,"
10053-340 = "선생님은……\n시간 어떠신가요?"
10053-350 = "새해 복 많이 받으세요,\n선생님."
10053-360 = "올해도 잘 부탁드리겠습니다."
10053-370 = "혹시 괜찮으시다면\n첫 달리기, 함께 어떠신가요?"
10053-380 = "크리스마스를 특이점으로\n삼고 싶어 하는 사람들의 마음은\n잘 모르겠지만……"
10053-390 = "선생님과 함께\n보낸다고 생각하면……"
10053-400 = "조금 알 것 같기도 하네요."
10053-410 = "분장과 장난과 사탕,\n그리고……"
10053-420 = "칼로리의 날!"
10053-430 = "체, 체육복을 입고 있다고 해서\n방심하지는 않을 거예요!"
10053-450 = "하아, 하아…"
10053-460 = "설마 고작 몇 달 사이에\n이렇게 체력이 약해졌을 줄이야…"
10053-470 = "황륜대제에서 부끄러운 모습을\n보이지 않기 위해서라도…"
10053-480 = "더 열심히 체력 관리를 해야겠어요."
10053-490 = "아, 선생님도\n물 필요 하신가요?"
10053-500 = "네. 여기……"
10053-510 = "자, 잠시만 기다려주세요,\n선생님! 여, 역시 지금은\n안 되겠어요!"
10053-520 = "(지금 여기서\n내가 입을 댄 페트병으로\n선생님이 물을 마신다면…)"
10053-530 = "(사실상의 간접 키…)"
10053-540 = "(아니, 아니. 아무리 이런\n상황이라고는 하지만)"
10053-550 = "(그런 파렴치한 짓이\n용납될 리가…!)"
10053-560 = "(하지만… 선생님이라면…)"
10053-570 = "한 모금만……\n드셔야 해요……?"
10053-2600 = "합리적이고……\n운동에도 매우 적합한 장비네요.\n감사합니다. 선생님."

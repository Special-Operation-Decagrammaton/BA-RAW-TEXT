[translation]
10114-10 = "Blue Archive!"
10114-20 = "เชิญค่ะ! คุณครู!\nเลือกเมนูได้แล้วก็เรียกฉันนะคะ!\nฉันจะไปตั้งใจทำมาให้เลยค่ะ!"
10114-30 = "ว้าว! คาเฟ่สวยจังเลยค่ะ!\nต้องดูและเรียนรู้\nในฐานะพนักงานเสิร์ฟแล้ว..."
10114-40 = "การตกแต่งร้าน\nน่าทึ่งจังเลยค่ะ..."
10114-50 = "(สูตรนี้มันต้องเป็น...!)"
10114-60 = "เดินแบบนี้\nแล้วก็แบบนี้...\nเป็นตัวอย่างที่ดีเลยนะคะ"
10114-70 = "เป็นพนักงานเสิร์ฟ\nแต่กลับมาพักผ่อนที่คาเฟ่\nมันดูย้อนแย้งจังเลยนะคะ..."
10114-80 = "ว้าว! คุณครู คุณครู!"
10114-90 = "ฉันรอนานหรือเปล่าน่ะเหรอคะ? ไม่เลยค่ะ!\nตอนที่รอ ฉันก็มีความสุขค่ะ!"
10114-100 = "ยินดีต้อนรับสู่\n<คาเฟ่ชาเล่ต์> ค่ะ 'คุณลูกค้า'"
10114-110 = "ปะ... เป็นยังไงบ้างคะ?\nคุณครู? ฉันดูเหมาะมั้ยคะ?"
10114-120 = "ช่วงนี้ฉันเหมือนจะ...\nทำอาหารได้\nนิดหน่อยเลยค่ะ!"
10114-130 = "เป็นเพราะฉัน\nพยายามในหลายๆ อย่าง"
10114-140 = "หรือเป็นเพราะคุณครูคอยช่วยนะ?"
10114-150 = "ฉันยังทำไม่สำเร็จ\nอยู่บ่อยๆ เหมือนเดิมค่ะ"
10114-160 = "ถ้าฉันทำให้ใครบางคน\nได้ชิมของอร่อยๆ"
10114-170 = "และถ้าคนนั้นชื่นชอบ\nอาหารของฉันละก็..."
10114-180 = "แค่ได้คิดแบบนั้น\nฉันก็ตื่นเต้นมากแล้วค่ะ"
10114-190 = "ตอนนี้อาหารที่ฉันมั่นใจที่สุด\nก็คือพาร์เฟต์ค่ะ!"
10114-200 = "บางทีมันอาจเป็นอย่างเดียว\nที่ฉันทำเป็นก็ได้ค่ะ..."
10114-210 = "ก็มันเป็นของหวานที่\nแค่ต้องใส่วัตถุดิบเป็นชั้นๆ นี่คะ..."
10114-220 = "มีหลายคนที่ถามฉันว่า\nงานพาร์ทไทม์ลำบากหรือเปล่า..."
10114-230 = "ถ้าเทียบกับงานของชมรม\nก็ไม่ลำบากค่ะ!"
10114-240 = "ฉันจะไม่ละทิ้ง\nความพยายามเด็ดขาดค่ะ"
10114-250 = "ฉันจะได้... ไม่เสียใจ\nในภายหลังยังไงล่ะคะ"
10114-260 = "ถ้ามีอะไรผิดพลาด..."
10114-270 = "ตอนนั้น... ช่วยจับมือ\nฉันไว้ด้วยนะคะ คุณครู"
10114-280 = "ตายจริง วันนี้คือ!\nวันเกิดของคุณครูสินะคะ!"
10114-290 = "ฉันทำพาร์เฟต์\nฉลองวันเกิดมาให้ค่ะ!"
10114-300 = "ฉันตั้งใจทำสุดฝีมือเลยนะ..."
10114-310 = "ถ้าไม่ติดอะไร ลองทานดูสิคะ!"
10114-320 = "ของขวัญวันเกิดฉันเหรอคะ?\nถ้างั้น..."
10114-330 = "วันนี้ช่วยอยู่กับฉัน\nสักวันจะได้มั้ยคะ...?"
10114-340 = "สวัสดีปีใหม่ค่ะ คุณครู!"
10114-350 = "ไปทัวร์คาเฟ่รับปีใหม่\nกับพนักงานเสิร์ฟจูริมั้ยคะ?"
10114-360 = "คริสต์มาสก็ต้องมีไก่งวง\nหรือไม่ก็ไก่ทอดสิคะ!"
10114-370 = "ขอโทษนะคะ คุณครู..."
10114-380 = "ไก่ทอดวิ่งหนีไปแล้วค่ะ..."
10114-390 = "นี่คือวันแห่งฟักทอง คอสเพลย์\nและลูกกวาดสินะคะ!"
10114-400 = "เอ่อ... คุณครูคะ?"
10114-410 = "วันนี้..."
10114-420 = "ฉันขอ... แกล้ง...\nได้มั้ยคะ...?"
10114-440 = "ยินดีต้อนรับสู่\n<คาเฟ่ชาเล่ต์> ค่ะ"
10114-450 = "ค่ะ สเปเชียลพาร์เฟต์\nที่สั่งได้แล้วค่ะ!"
10114-460 = "ฮุฮุ... รู้สึกแปลกใหม่จังเลยค่ะ"
10114-470 = "ที่นี่คือคาเฟ่สำหรับ\nคุณครูเท่านั้น"
10114-480 = "แล้วฉันก็ได้เป็น\nพนักงานเสิร์ฟคนเดียวของคาเฟ่นี้..."
10114-490 = "คุณครู รู้หรือเปล่าคะ?"
10114-500 = "คำว่าพาร์เฟต์...\nแปลว่าสมบูรณ์แบบค่ะ"
10114-510 = "แน่นอนว่าฉันยังไม่สมบูรณ์แบบ\nแล้วก็ยังไม่เก่งเท่าไรด้วย..."
10114-520 = "แต่สักวันหนึ่ง...\nฉันก็คิดว่าอยากทำให้ได้ค่ะ"
10114-530 = "ทำ 'พาร์เฟต์'...\nหรืออาหารที่สมบูรณ์แบบน่ะค่ะ"
10114-2600 = "ในบางแง่แล้ว พนักงานเสิร์ฟ\nก็ต้องพกปืนไม่ใช่เหรอคะ?\nแน่นอนว่านี่เป็นเรื่องปกติในคิโวทอส...\nแต่ก็ควรมีไว้เพื่อลูกค้าที่ร้องขอมากเกินไป\nและเพื่อทำให้วัตถุดิบที่ฉุนเฉียวสงบลง..."

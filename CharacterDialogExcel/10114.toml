[translation]
10114-10 = "블루 아카이브!"
10114-20 = "어서 오세요! 선생님!\n메뉴가 정해지시면, 불러주세요!\n최선을 다해 준비하겠습니다!"
10114-30 = "와아! 멋진 카페네요!\n웨이트리스로서\n보고 배울 일이……"
10114-40 = "인테리어가\n엄청나네요……"
10114-50 = "(이 레시피는,\n분명……!)"
10114-60 = "동선을 이렇게,\n그리고 이렇게……\n참고가 되네요."
10114-70 = "웨이트리스가\n카페에서 휴식이라니,\n아이러니하네요……"
10114-80 = "와아! 선생님, 선생님!"
10114-90 = "많이 기다렸냐구요? 전혀요!\n기다리는 시간도, 행복했는걸요!"
10114-100 = "<카페 샬레>에,\n어서 오십시오. 손님."
10114-110 = "어, 어떠셨나요,\n선생님? 저, 어울렸나요?"
10114-120 = "저 최근, 약간이지만……\n요리를 할 수 있게\n된 것 같아요!"
10114-130 = "여러 가지로\n노력했기 때문일까요."
10114-140 = "아니면 선생님 덕분일까요?"
10114-150 = "실패하는 경우가,\n여전히 더 많지만요……"
10114-160 = "누군가에게 맛있는 것을\n맛보게 해 줄 수 있다면,"
10114-170 = "그 사람이 제 요리를\n좋아해 준다면……"
10114-180 = "그런 걸 생각하는 것만으로,\n너무 두근거려요."
10114-190 = "지금으로서 가장\n자신 있는 요리는, 파르페예요!"
10114-200 = "……어쩌면, 유일하게 가능한\n요리일지도 모르지만요."
10114-210 = "재료들을 잘 쌓는 게\n중요한 디저트니까요……"
10114-220 = "아르바이트 일이 힘들지\n않냐고 묻는 분들이 많으신데…"
10114-230 = "급양부 일에 비하면, 괜찮아요!"
10114-240 = "노력만큼은 절대 그만두지\n않으려고 해요."
10114-250 = "그래야…… 후회라도\n하지 않을 테니까요."
10114-260 = "혹시 뭔가 잘 안된다면……"
10114-270 = "그때는, 제 손을\n잡아 주세요. 선생님."
10114-280 = "오늘은, 세상에!\n선생님의 생일이었네요!"
10114-290 = "생일 축하 파르페를\n만들어 봤어요!"
10114-300 = "……최선을 다해 만들었답니다."
10114-310 = "괜찮다면, 드셔 주세요!"
10114-320 = "제 생일 선물, 말씀인가요?\n그렇다면……"
10114-330 = "오늘 하루만이라도,\n저와 같이 있어 주시겠어요……?"
10114-340 = "새해 복 많이 받으세요, 선생님!"
10114-350 = "웨이트리스 주리와 함께 하는\n새해 카페 투어, 어떠신가요?"
10114-360 = "크리스마스는 역시\n칠면조 아니면 치킨이죠!"
10114-370 = "……죄송해요, 선생님."
10114-380 = "치킨이 달려서 도망쳤어요……"
10114-390 = "호박과 분장, 사탕의 날이네요!"
10114-400 = "저…… 선생님?"
10114-410 = "오늘만큼은……"
10114-420 = "장난…… 치셔도,되는데요……?"
10114-440 = "<카페 샬레>에\n오신 것을 환영합니다."
10114-450 = "네, 주문하신\n스페셜 파르페입니다!"
10114-460 = "후훗…… 신기한 기분이네요."
10114-470 = "여기는 선생님만을\n위한 카페이고."
10114-480 = "제가 그 카페의\n한 명뿐인 웨이트리스라니……"
10114-490 = "선생님, 알고 계신가요?"
10114-500 = "파르페는……\n완벽하다는 뜻을 갖고 있대요."
10114-510 = "물론 저는 아직 완벽은커녕,\n능숙하지도 않지만……"
10114-520 = "언젠가는……\n저도 만들고 싶어요."
10114-530 = "'파르페'……\n완벽한 요리를요."
10114-2600 = "어떻게 보면 말이에요. 웨이트리스에게도 총은 필요하지 않을까요?\n물론 키보토스에서는 당연한 말이겠지만……\n그것 말고도, 무리한 요구를 하는 손님이라든가.\n날뛰기 시작한 식재료를 조용히 시킨다든가……"

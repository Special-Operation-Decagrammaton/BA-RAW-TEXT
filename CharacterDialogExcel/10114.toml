[translation]
10114-10 = "Blue Archive!"
10114-20 = "Welcome, Sensei! Please call me when you've picked out something from the menu! I'll do my best to prepare whatever you choose!"
10114-30 = "Whoa! What a cool cafe! There are always new things to learn as a waitress..."
10114-40 = "The interior is incredible..."
10114-50 = "(This recipe, it must be...!)"
10114-60 = "Hmm, so it goes like this, and then like that... This is a good reference."
10114-70 = "A waitress resting at a cafe, how ironic..."
10114-80 = "Whoa! Sensei, Sensei!"
10114-90 = "Did I wait long? Not at all! And I enjoyed the wait, even!"
10114-100 = "Welcome to Cafe Schale."
10114-110 = "H-How was that, Sensei? Did it sound okay?"
10114-120 = "Lately, I've, um... I've been learning to cook a little!"
10114-130 = "Is it all my hard work and experimentation paying off?"
10114-140 = "Or is it thanks to Sensei?"
10114-150 = "I still fail more than I succeed, though..."
10114-160 = "...but if I can get someone to taste something delicious..."
10114-170 = "...if they enjoy my dish..."
10114-180 = "Just thinking about that makes my heart skip a beat."
10114-190 = "My signature dish, for now, is parfait!"
10114-200 = "...Technically, it's my only dish, but still."
10114-210 = "Since it's a dessert, the important thing is to stack the ingredients nicely..."
10114-220 = "A lot of people ask me if working part time is hard..."
10114-230 = "It's fine compared to School Lunch Club!"
10114-240 = "I always try to give it my best effort, without giving up."
10114-250 = "That way...I won't have any regrets."
10114-260 = "But if things don't work out..."
10114-270 = "...if that happens, please hold my hand. Sensei."
10114-280 = "Oh, my goodness! It's your birthday, Sensei!"
10114-290 = "I tried making your birthday parfait!"
10114-300 = "...I did my best with it."
10114-310 = "Please try it, if you don't mind!"
10114-320 = "What do I want for my birthday? Well, since you ask..."
10114-330 = "Would you stay with me? Even if it's just for today...?"
10114-340 = "Happy New Year, Sensei!"
10114-350 = "How about a New Year's cafe tour with Waitress Juri?"
10114-360 = "For Christmas, you've got to have chicken or turkey!"
10114-370 = "...I'm sorry, Sensei."
10114-380 = "The chicken ran away..."
10114-390 = "It's a day for pumpkins, costumes, and candy!"
10114-400 = "Um... Sensei?"
10114-410 = "Just for today..."
10114-420 = "You can pull tricks, you know..."
10114-440 = "Welcome to Cafe \"Schale\"!"
10114-450 = "Yes, here's the special parfait you ordered!"
10114-460 = "Fufu... This is an interesting feeling..."
10114-470 = "This is a cafe just for you, Sensei."
10114-480 = "And I'm the only waitress here..."
10114-490 = "Sensei, did you know?"
10114-500 = "Parfait...means \"perfect\"."
10114-510 = "I'm not perfect. I'm not even proficient."
10114-520 = "But one day...I want to make..."
10114-530 = "...the perfect parfait."
10114-2600 = "If you think about it, a waitress does need a gun. I mean, it's only natural in Kivotos. Besides that, you sometimes get unreasonable customers, or the ingredients start acting up..."

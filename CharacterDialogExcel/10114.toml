[translation]
10114-10 = "蔚藍～檔～案！"
10114-20 = "歡迎光臨！老師！\n決定好要點什麼之後請跟我說！\n我會帶著愛情來服務的！"
10114-30 = "哇！是間很棒的\n咖啡廳呢！\n請務必讓我見學！"
10114-40 = "哇……這個裝潢真棒……"
10114-50 = "（啊，這個\n食譜是……！）"
10114-60 = "動線是這樣……嗎。\n讓我上了一課。"
10114-70 = "明明是服務生，卻在\n咖啡廳休息……總覺得\n有股奇怪的感覺呢……"
10114-80 = "歡迎回來，老師！"
10114-90 = "呵呵，請別在意。\n因為等待老師的時間\n也非常幸福。"
10114-100 = "歡迎光臨！\n「Café．Schale」開幕了！"
10114-110 = "剛，剛才那樣……你覺得如何？\n看起來有像個服務生嗎？"
10114-120 = "我，好像多少……\n能做出料理了！"
10114-130 = "也許是練習的成果\n展現出來了。"
10114-140 = "或者也可能是\n託老師的福……？"
10114-150 = "啊哈哈……雖然失敗收場\n的情況，還是比較多……"
10114-160 = "如果能讓某個人\n品嚐到美味的料理……"
10114-170 = "如果那個人能夠\n喜歡我做的料理……"
10114-180 = "……光是這樣想，\n心裡就覺得很滿足。"
10114-190 = "我最有自信的料理是百匯！"
10114-200 = "……或許也能說\n是唯一的料理吧。"
10114-210 = "畢竟只是把食材\n堆起來而已……"
10114-220 = "打工是嗎？\n其實並沒有很辛苦哦。"
10114-230 = "和供給部的工作相比，\n根本不算什麼！"
10114-240 = "……今後，我也\n想繼續努力下去。"
10114-250 = "因為我不希望留下遺憾。"
10114-260 = "假如，遇到不太順利的時候……"
10114-270 = "還請……握住我的手哦，老師。"
10114-280 = "祝你生日快樂！"
10114-290 = "我做了慶生百匯！"
10114-300 = "……是我投入\n滿滿的愛情做出來的哦。"
10114-310 = "不介意的話，請好好享用！"
10114-320 = "生日……想要的東西，是嗎？\n我想想……"
10114-330 = "我可以，收下老師的一天嗎？"
10114-340 = "新年快樂，老師！"
10114-350 = "現在跟我來場新年的\n咖啡廳巡禮……如何？"
10114-360 = "說到聖誕節，\n就會想到火雞對吧！"
10114-370 = "那個……對不起……"
10114-380 = "烤雞……跑走了……"
10114-390 = "屬於南瓜、糖果、變裝\n跟惡作劇的日子到了！"
10114-400 = "那個……老師？"
10114-410 = "就是……今天……"
10114-420 = "對我惡作劇，\n也沒關係唷……？"
10114-440 = "歡迎光臨「Café．Schale」！"
10114-450 = "來，這是您點的特製百匯！"
10114-460 = "呵呵……感覺真不可思議。"
10114-470 = "這裡是老師專屬的咖啡廳──"
10114-480 = "我則是那間咖啡廳裡……\n唯一的服務生……"
10114-490 = "老師，你知道嗎？"
10114-500 = "百匯這個詞……\n似乎有「完美」的意思。"
10114-510 = "雖然我的料理技術\n別說是完美……\n甚至還差得很遠……"
10114-520 = "但是有朝一日……\n我也希望能夠做出來。"
10114-530 = "「Parfait」……完美的料理。"
10114-2600 = "雖然在奇普托斯是理所當然的事，\n但我認為服務生也應該攜帶槍枝才對！\n為了應對胡亂點餐的客人，\n以及鎮壓開始作亂的食材──咦，不對嗎？"

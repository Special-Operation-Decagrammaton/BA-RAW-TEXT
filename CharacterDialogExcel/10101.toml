10101-540 = "糖果……惡作劇……\n唔嗯……"
10101-550 = "我還是不太清楚……\n只要選其中一樣就行了嗎？"
10101-570 = "表演結束後的觀眾席，\n實在有點冷清啊。"
10101-580 = "眾多的觀眾散去，\n燈光盡數消失……"
10101-590 = "五彩斑斕的舞台，\n也不留痕跡地\n沉入寂靜之中。"
10101-600 = "原本充滿熱情與歡聲的空間\n突然安靜下來……\n實在讓人不禁感到哀傷。"
10101-610 = "……不過，現在已經不要緊了。"
10101-620 = "雖然什麼都沒有改變……\n卻已經能淡然地看待。"
10101-630 = "……也許是因為\n老師在我身邊的關係吧。"
10101-2600 = "雖然將來充滿了變數，\n但有一件事我可以斷言。\n從老師手中獲得的\n這份信賴的證明……\n我會一輩子好好珍惜。"

10101-570 = "There's something lonely about looking down at the seats after the concert ends."
10101-580 = "The audience members have dispersed, the lights dimmed."
10101-590 = "That brilliant stage has fallen silent without a single trace."
10101-600 = "Seeing that place filled with passion and cheers, suddenly become so still... There's a desolate feel to it."
10101-610 = "...Still, it's okay now."
10101-620 = "Although not much has changed... I feel more at ease."
10101-630 = "Yes... Perhaps because you are with me, Sensei."
10101-2600 = "The future is always unclear, but I do know one thing. I'll always cherish...this proof of your trust, Sensei."

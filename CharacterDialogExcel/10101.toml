10101-570 = "ที่นั่งผู้ชมหลังจบการแสดง\nดูเงียบเหงาจังเลยนะ"
10101-580 = "ผู้ชมมากมายก็กลับกันไป\nไฟก็ปิดหมดแล้ว..."
10101-590 = "ถ้าที่นี่เป็นที่ที่เงียบสงบตั้งแต่แรก\nก็คงเป็นอีกเรื่อง..."
10101-600 = "พอที่ที่เต็มไปด้วยความร้อนแรง\nและเสียงตะโกน กลับเงียบสงบลง...\nฉันก็รู้สึกเปล่าเปลี่ยวนิดๆ นะ"
10101-610 = "แต่ยังไงตอนนี้ก็ไม่เป็นไรแล้วละ"
10101-620 = "ถึงจะไม่มีอะไรเปลี่ยนแปลง\nมากมาย แต่ฉันก็สบายใจ"
10101-630 = "นี่อาจเป็นเพราะ\nมีคุณครูอยู่ข้างๆ ก็ได้"
10101-2600 = "ถึงอนาคตจะไม่แน่นอน\nแต่มีอย่างหนึ่งที่ฉันรับรองได้\nหลักฐานของความไว้ใจ\nที่ฉันได้รับจากครู...\nฉันจะรักษามันไว้ตลอดเลย"

[translation]
10101-10 = "Blue Archive"
10101-20 = "ที่นี่คือที่ทำงานพาร์ทไทม์ครั้งนี้สินะ...\nฉันเพิ่งเคยมาทะเลครั้งแรก แต่ก็วางใจได้เลย"
10101-30 = "ฉันซ้อมที่นี่\nจะได้มั้ยนะ?"
10101-40 = "เครื่องประดับอันนั้น...\nน่าจะเหมาะกับ\nอาสึโกะเลยนะ"
10101-50 = "แถวนี้เสียงดังจัง\nมิซากิคงไม่ชอบเท่าไรนะ"
10101-60 = "คาเฟ่... ถ้ามีนิตยสาร\nที่ฮิโยริชอบก็ดีสินะ"
10101-70 = "บัญชีรายรับรายจ่าย\nต้องอยู่ที่นี่สิ..."
10101-80 = "อ๊ะ ครู ฉันกำลังรออยู่เลย\nงานวันนี้คืออะไรเหรอ?"
10101-90 = "อืม~ อืม~ อืม~"
10101-100 = "คะ... ครู?!\nมะ... เมื่อกี้ ได้ยินหรือเปล่า...?"
10101-110 = "ถึงจะเป็นงานพาร์ทไทม์\nแต่ก็ทำลวกๆ ไม่ได้หรอก"
10101-120 = "ฉันเต็มที่กับงาน\nที่ได้รับมอบหมายอยู่แล้ว"
10101-130 = "ต้องเอาค่าจ้างงานต่อไป\nไปซื้อของขวัญให้มิซากิแล้วละ..."
10101-140 = "ชุดนี้น่ะ\nฉันแค่ใส่เพราะมันจำเป็น\nต่อการทำงานพาร์ทไทม์..."
10101-150 = "แต่ถ้าครูบอกว่าชอบ\nฉันก็จะใส่ไปเรื่อยๆ"
10101-160 = "ทะเล งานเทศกาล..."
10101-170 = "อยากไปกับอาซึสะ\nสักวันจังเลยนะ"
10101-180 = "ทั้งทะเล ทั้งงานพาร์ทไทม์\nเป็นเรื่องที่ฉันไม่รู้เลย"
10101-190 = "แต่ก็จะอ้างว่าเป็นสิ่งที่\n'ไม่คุ้นเคย' ไปตลอดไม่ได้หรอก\nฉันจะทำให้เต็มที่"
10101-200 = "วันเกิดสินะครู"
10101-210 = "ฉันเตรียมเพลงสำหรับวันดีๆ มาให้\nไปนั่งตรงนั้นสิ\nฉันจะเล่นให้ฟังตอนนี้เลย"
10101-220 = "วันเกิดฉัน…"
10101-230 = "อ่า... ฉันมัวแต่\nจดจ่ออยู่กับงาน\nก็เลยลืมไปเลย"
10101-240 = "ถึงจะไม่คุ้นเคย\nแต่ก็ต้องพูดขอบคุณ\nให้มันจริงใจสินะ"
10101-250 = "ขอบคุณนะครู"
10101-260 = "สวัสดีปีใหม่นะครู"
10101-270 = "ขอให้เป็นปีที่\nมีรอยยิ้มเยอะๆ นะ"
10101-280 = "คริสต์มาสสินะ ฉันทำเพลงแครอล\nมา 2-3 เพลงน่ะ"
10101-290 = "ลองฟังดูมั้ย? ครู"
10101-300 = "อืม ขนม แกล้งกัน..."
10101-310 = "ฉันยังไม่ค่อยรู้เท่าไร\nแต่แค่เลือก 1 ใน 2 อย่างนี้ก็ได้ใช่มั้ย?"
10101-320 = "อ๊ะ ครู ฉันกำลังรออยู่เลย\nงานวันนี้คืออะไรเหรอ?"

[translation]
10101-10 = "블루 아카이브."
10101-20 = "여기가 이번 아르바이트 장소군…\n바다는 처음이지만, 맡겨 줘."
10101-30 = "여기서\n연습해도 되나?"
10101-40 = "저 장식…\n아츠코에게\n어울릴 것 같군."
10101-50 = "이 주변은 소란스럽군.\n미사키는 그다지\n좋아하지 않겠어."
10101-60 = "카페라… 히요리가\n좋아하는 잡지가\n있으면 좋겠는데."
10101-70 = "분명 여기에,\n가계부가…"
10101-80 = "아, 선생. 기다리고 있었다.\n오늘 업무는 뭐지?"
10101-90 = "음~ 음~ 음~"
10101-100 = "서, 선생?!\n바, 방금 거, 들었나…?"
10101-110 = "아르바이트라고 해서\n대충 하는 일은 있을 수 없어."
10101-120 = "맡은 일에는 언제나\n최선을 다하고 있다."
10101-130 = "다음 급료로 미사키에게\n선물을 해야겠어…"
10101-140 = "이 복장은,\n아르바이트할 때 필요하니까\n입고 있는 것뿐이지만…"
10101-150 = "선생이 마음에 들어 한다면,\n앞으로도 입도록 하지."
10101-160 = "바다, 축제…"
10101-170 = "언젠가, 아즈사와도\n함께 가보고 싶군."
10101-180 = "바다도, 아르바이트도\n모르는 일투성이다."
10101-190 = "하지만 언제까지나 '낯설다'고\n핑계 댈 수는 없지.\n전력을 다하겠어."
10101-200 = "생일이군, 선생."
10101-210 = "기쁜 날에\n최적의 곡을 준비했다.\n거기 앉아주겠나.\n지금부터 연주하지."
10101-220 = "내 생일…"
10101-230 = "아아… 일에\n몰두하고 있어서\n잊고 있었다."
10101-240 = "익숙하지 않아도,\n감사의 말은\n제대로 해야지."
10101-250 = "고맙다, 선생."
10101-260 = "새해 복 많이 받아라, 선생."
10101-270 = "웃음 가득한\n한 해가 되기를 빌겠다."
10101-280 = "크리스마스군. 캐럴을\n몇 곡 샘플링해 왔다."
10101-290 = "들어주겠나? 선생."
10101-300 = "으음, 과자, 장난…"
10101-310 = "아직 잘 모르겠다만,\n둘 중에 선택하면 되는 건가?"
10101-320 = "아, 선생. 기다리고 있었다.\n오늘 업무는 뭐지?"
10101-330 = "음~ 음~ 음~"

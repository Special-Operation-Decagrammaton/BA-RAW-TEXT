10101-490 = "고맙다, 선생."
10101-500 = "새해 복 많이 받아라, 선생."
10101-510 = "웃음 가득한\n한 해가 되기를 빌겠다."
10101-520 = "크리스마스군. 캐럴을\n몇 곡 샘플링해 왔다."
10101-530 = "들어주겠나? 선생."
10101-540 = "으음, 과자, 장난…"
10101-550 = "아직 잘 모르겠다만,\n둘 중에 선택하면 되는 건가?"
10101-570 = "종연 후의 객석은,\n쓸쓸한 것이군."
10101-580 = "그 많던 관객은 빠지고,\n조명은 모두 꺼지고…"
10101-590 = "화려한 무대는\n흔적도 없이,\n정적에 잠겨 있다."
10101-600 = "열기와 함성으로 가득했던 공간이\n갑자기 조용해지니… 어딘가,\n애틋한 느낌마저 든다."
10101-610 = "…그래도 지금은 괜찮다."
10101-620 = "변한 것은 아무것도 없지만,\n평온하게 있을 수 있다."
10101-630 = "…선생님이\n옆에 있으니까,\n일지도 모르겠군."
10101-2600 = "장래는 불확실하지만,\n한 가지만은 장담할 수 있어.\n선생으로부터 받은\n이 신뢰의 증거는…\n끝까지, 소중히 하겠다."

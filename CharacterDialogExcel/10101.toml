[translation]
10101-10 = "Blue Archive."
10101-20 = "This is where I'll be working this time. I've never had a part-time job at the beach before, but you can count on me."
10101-30 = "Can I practice here?"
10101-40 = "That decoration...I think it would suit Atsuko."
10101-50 = "It's noisy around here. I don't think Misaki would care for it much."
10101-60 = "A cafe, huh? Hopefully they have some magazines that Hiyori would like."
10101-70 = "I distinctly remember putting the ledger right here..."
10101-80 = "Oh, Sensei. I was waiting for you. What do I need to do today?"
10101-90 = "Hmm, mm, mmm!"
10101-100 = "S-Sensei?! D-did you hear me just now...?"
10101-110 = "Part-time job or not, I can't slack off."
10101-120 = "I always do my best at whatever I'm given."
10101-130 = "I should buy a present for Misaki with my next paycheck."
10101-140 = "I'm only wearing this outfit because I need it for my part-time job..."
10101-150 = "But if you like it, Sensei, I can wear it again sometime."
10101-160 = "The beach, the festival..."
10101-170 = "I'd like to go with Azusa one day."
10101-180 = "There are so many things I don't know about. Like the beach, or normal part-time work."
10101-190 = "But I can't always excuse myself under the pretext of it being \"unfamiliar.\" I'll give it my best shot."
10101-200 = "Sensei, it's your birthday."
10101-210 = "I prepared the best song for a happy day. If you take a seat, I'll perform it now."
10101-220 = "My birthday..."
10101-230 = "Ahh... I forgot. I was so immersed in the work."
10101-240 = "I'm not used to thanking people, but I should."
10101-250 = "Thank you, Sensei."
10101-260 = "Happy New Year, Sensei."
10101-270 = "I hope you have a joyful year."
10101-280 = "It's Christmas. I sampled a few carols."
10101-290 = "Would you like to listen to them?"
10101-300 = "Hmm, trick OR treat..."
10101-310 = "I'm not sure...but I think I'm supposed to choose one. Right?"

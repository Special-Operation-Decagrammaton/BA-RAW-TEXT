[translation]
10101-10 = "蔚藍檔案。"
10101-20 = "這裡就是這次的打工地點嗎……\n雖然是第一次來到海邊，不過交給我吧。"
10101-30 = "可以在這裡練習嗎？"
10101-40 = "那個裝飾……\n感覺很適合敦子。"
10101-50 = "這附近吵吵鬧鬧的。\n美咲可能不太喜歡。"
10101-60 = "咖啡廳啊……\n要是能找到日和\n喜歡的雜誌就好了。"
10101-70 = "我記得這裡，\n應該有記帳本……"
10101-80 = "老師，我正在等你。\n今天的工作是什麼？"
10101-90 = "嗯～嗯～嗯～"
10101-100 = "老，老師！？剛，剛才的，\n你都聽到了嗎……？"
10101-110 = "就算只是打工，\n敷衍了事也是不行的。"
10101-120 = "交待給我的工作，\n我全都會全力以赴。"
10101-130 = "用下次的薪水\n買禮物給美咲吧……"
10101-140 = "這套服裝，雖然是因為\n打工方面有必要才穿……"
10101-150 = "如果老師喜歡的話，\n之後也繼續穿著吧。"
10101-160 = "大海、慶典……"
10101-170 = "真希望有朝一日，\n也能和梓一起造訪。"
10101-180 = "無論大海還是打工，\n對我來說都充滿著未知。"
10101-190 = "但是不能永遠拿「陌生」\n當藉口。我會盡己所能。"
10101-200 = "是你的生日啊，老師。"
10101-210 = "為了值得慶祝的日子，\n我準備了最適合的歌。\n請在那邊坐著吧，\n我現在開始演奏。"
10101-220 = "我的生日……"
10101-230 = "啊啊……\n最近忙著工作，\n都忘了這件事。"
10101-240 = "就算還不習慣，\n也得好好表達謝意才行。"
10101-250 = "謝謝你，老師。"
10101-260 = "新年快樂，老師。"
10101-270 = "希望會是充滿笑容的一年……\n我會為你祈禱的。"
10101-280 = "是聖誕節啊。\n我對幾首頌歌\n進行了取樣。"
10101-290 = "你願意聽聽看嗎？老師。"
10101-300 = "糖果……惡作劇……\n唔嗯……"
10101-310 = "我還是不太清楚……\n只要選其中一樣就行了嗎？"
10101-320 = "老師，我正在等你。\n今天的工作是什麼？"
10101-330 = "嗯～嗯～嗯～"

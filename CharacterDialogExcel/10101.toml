10101-470 = "啊啊……\n最近忙著工作，\n都忘了這件事。"
10101-480 = "就算還不習慣，\n也得好好表達謝意才行。"
10101-490 = "謝謝你，老師。"
10101-500 = "新年快樂，老師。"
10101-510 = "希望會是充滿笑容的一年……\n我會為你祈禱的。"
10101-520 = "是聖誕節啊。\n我對幾首頌歌\n進行了取樣。"

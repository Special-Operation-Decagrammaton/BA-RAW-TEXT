[translation]
20049-10 = "블루, 아카이브"
20049-20 = "덥고, 끈적이고……\n그래서, 뭐 할 거야?"
20049-30 = "지루해……."
20049-40 = "(저건…… 뭘까?)"
20049-50 = "남들은 평소에\n이렇게 지내는구나……."
20049-60 = "그러니까,\n관심 없다니까.\n……진짜로."
20049-70 = "(선생님……\n뭐 하고 있으려나……)"
20049-80 = "또 지각이야?\n하아……나도, 이제 막 왔지만."
20049-90 = "……기다리고 있던 건 아니니까.\n그……수고했어."
20049-100 = "바다에 흥미……?\n없어."
20049-110 = "……물이 많기는 했어.\n마실 수 있는 것도 아니었지만."
20049-120 = "바다의 추억……?\n딱히 상관없잖아, 그런 거."
20049-130 = "'재밌었으니까 또 가자'……?"
20049-140 = "그런 걸 가볍게 말해버리고……."
20049-150 = "……그래서, 언제 갈 거야?"
20049-160 = "……전부 쓸데없는\n거라고 생각해.\n바다도, 수영복도."
20049-170 = "……선생님에게는\n전부 쓸데없지 않다고?"
20049-180 = "그러니까,\n이상한 소리 하지 말라니까……!"
20049-190 = "……여기에 있으면, 깨끗한 물을\n마음대로 마실 수 있구나."
20049-200 = "아니, 아무것도 아니야……."
20049-210 = "다들, 바다를 즐겼으려나.\n나……?"
20049-220 = "재미없었어. 요만큼도."
20049-230 = "그……딱히, 별 뜻은 없는데……\n갖고 싶은 거라던가, 있어?"
20049-240 = "무, 물어본 것뿐이니까!"
20049-250 = "생명도 죽음도, 무의미해.\n그러니, 축하할 필요도 없어."
20049-260 = "선생님이 축하해 준다고 해도,\n하나도……."
20049-270 = "……"
20049-280 = "고마워."
20049-290 = "새해가 시작됐네.\n예전의 나라면, 또 죽음에\n가까워졌다고 말했으려나……."
20049-300 = "지금은 어떠냐고?"
20049-310 = "왜…… 그런 걸 묻는 거야?"
20049-320 = "여전히 이런 분위기는\n잘 모르겠지만…… 그래도,\n다들 즐거워하는 것 같으니까."
20049-330 = "장난과 과자의 교섭…….\n무슨 의미가 있는 거야?"
20049-340 = "이거, 사탕……?\n나, 딱히 장난은 안 쳤는데."
20049-350 = "어라……\n오늘은 그런 날이 아니었던가."
20049-370 = "음……."
20049-380 = "조금 더…… 이쪽도 파내고……."
20049-390 = "여기에 나뭇가지를……\n이 각도로……."
20049-400 = "……응, 이걸로 됐으려나."
20049-410 = "……어라?"
20049-420 = "왜 내가 모래성 같은 걸\n만들고 있는 거지……?"
20049-430 = "……읏! 선생님……!"
20049-440 = "처음부터\n이럴 계획이었구나……!"
20049-450 = "……전혀,\n요만큼도 즐기고 있지 않으니까!"
20049-2600 = "이런 곳에서 쓰려나…….\n'무기도 사용하기 나름'?\n하아…… 그런 쪽으로 말은 잘하지.\n알았어…… 고마워."

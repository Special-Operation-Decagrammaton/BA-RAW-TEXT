[translation]
20049-10 = "Blue Archive"
20049-20 = "ทั้งร้อน ทั้งเหนียวตัว...\nแล้วจะทำอะไรต่อล่ะ?"
20049-30 = "เบื่อจัง..."
20049-40 = "(นั่น.... อะไรน่ะ?)"
20049-50 = "ปกติคนอื่นๆ\nใช้ชีวิตกันแบบนี้สินะ..."
20049-60 = "แต่ว่านะ\nฉันไม่สนใจหรอก\nจริงๆ นะ..."
20049-70 = "(คุณครู...\nจะทำอะไรอยู่นะ...)"
20049-80 = "มาช้าอีกแล้วเหรอ?\nเฮ้อ... ฉันเองก็เพิ่งมาเหมือนกันน่ะ"
20049-90 = "ฉันไม่ได้รอหรอกนะ...\nอืม... ทำได้ดีมาก"
20049-100 = "ความสนุกที่ทะเล...?\nไม่มีหรอก"
20049-110 = "มีแต่น้ำเยอะไปหมด\nแถมไม่ใช่น้ำที่ดื่มได้เลยด้วย"
20049-120 = "ความทรงจำที่ทะเล...?\nเรื่องพวกนั้นไม่สำคัญหรอก"
20049-130 = "บอกว่า 'ครั้งนี้สนุกมาก\nไว้ไปกันใหม่อีกนะ' เหรอ...?"
20049-140 = "พูดอะไรแบบนั้นออกมาง่ายๆ เลยนะ..."
20049-150 = "แล้ว... จะไปเมื่อไรล่ะ?"
20049-160 = "ฉันคิดว่าทุกอย่าง\nมันไม่สำคัญเลยสักนิด\nทั้งทะเล ทั้งการว่ายน้ำ"
20049-170 = "ทุกๆ อย่างไม่ใช่เรื่องไร้สาระ\nสำหรับคุณครูเหรอ?"
20049-180 = "ก็บอกแล้วไง\nว่าอย่าพูดอะไรแปลกๆ น่ะ...!"
20049-190 = "ถ้าอยู่ที่นี่ก็จะได้ดื่มน้ำสะอาด\nได้ตามที่ต้องการสินะ"
20049-200 = "เปล่าหรอก ไม่มีอะไร..."
20049-210 = "ทุกคนจะสนุกกับ\nการมาเที่ยวทะเลรึเปล่านะ?\nฉันเหรอ...?"
20049-220 = "ไม่สนุกเลย... แม้แต่นิดเดียว"
20049-230 = "อืม... มันไม่มีความหมายพิเศษอะไรหรอกนะ...\nคุณครูมีอะไรที่ต้องการรึเปล่า?"
20049-240 = "ฉะ... ฉันก็แค่ถามเฉยๆ เอง!"
20049-250 = "ทั้งชีวิตและความตาย มันไม่มีความหมายเลย\nเพราะงั้นไม่จำเป็นต้องอวยพรหรอก"
20049-260 = "ถึงคุณครูจะอวยพรให้\nแต่ก็ไม่มีอะไร..."
20049-270 = "......"
20049-280 = "ขอบคุณนะ"
20049-290 = "ปีใหม่แล้วสินะ\nถ้าเป็นเมื่อก่อนนี้ ฉันคงจะพูดว่า\nความตายใกล้เข้ามาแล้วละมั้ง..."
20049-300 = "ตอนนี้เป็นยังไงน่ะเหรอ?"
20049-310 = "ทำไม... ถึงถามเรื่องนั้นล่ะ?"
20049-320 = "ฉันยังไม่ค่อยเข้าใจ\nบรรยากาศแบบนี้สักเท่าไร...\nแต่ดูเหมือนทุกคนจะสนุกกันมาก"
20049-330 = "การต่อรองเรื่องล้อเล่นและขนม...\nมันมีความหมายยังไงกัน?"
20049-340 = "นี่มันลูกกวาด...?\nฉันไม่ได้เล่นทริกออร์ทรีตอะไรสักหน่อย"
20049-350 = "เอ๋...\nวันนี้ก็เป็นวันแบบนั้นไม่ใช่เหรอ"
20049-370 = "อืม..."
20049-380 = "ขุดลงไปตรงนี้... อีกหน่อย..."
20049-390 = "เอากิ่งไม้ตรงนี้...\nมาแต่งมุมตรงนี้..."
20049-400 = "อื้อ... เสร็จเรียบร้อยแล้วละนะ"
20049-410 = "เอ๋...?"
20049-420 = "ทำไมฉันถึงเหมือนกำลัง\nก่อปราสาททรายอยู่เลยล่ะ...?"
20049-430 = "อึก...! คุณครู...!"
20049-440 = "วางแผนเอาไว้\nอยู่แล้วสินะ...!"
20049-450 = "บอกแล้วไงว่า...\nไม่ได้สนุกเลยแม้แต่นิดเดียว!"
20049-2600 = "จะใช้ในที่แบบนี้ได้มั้ยนะ...\n'อาวุธขึ้นอยู่กับวิธีใช้งาน' งั้นเหรอ?\nเฮ้อ... พูดอะไรแบบนั้นเก่งจังเลยนะ\nเข้าใจแล้ว... ขอบคุณนะ"

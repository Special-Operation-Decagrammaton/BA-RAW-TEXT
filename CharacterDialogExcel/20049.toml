[translation]
20049-10 = "Blue, Archive"
20049-20 = "It's so hot and humid. What do we do now?"
20049-30 = "I'm bored..."
20049-40 = "(What...is that?)"
20049-50 = "So this is how people spend their free time..."
20049-60 = "Like I said, not interested. Seriously."
20049-70 = "(I wonder...what Sensei's doing now.)"
20049-80 = "You're late again? *sigh* I guess I just got here too."
20049-90 = "...I wasn't waiting for you. But, um... Good job."
20049-100 = "Am I interested in the beach? No. Not at all."
20049-110 = "...There's a lot of water. It's not drinkable, though."
20049-120 = "My memories at the beach...? Doesn't matter."
20049-130 = "\"It was fun, so let's go together again\"...?"
20049-140 = "You say things like that without batting an eye..."
20049-150 = "...Well, when are we going?"
20049-160 = "...They're all meaningless, in my opinion. The beach, this swimsuit."
20049-170 = "...They're not meaningless to you?"
20049-180 = "Like I said, stop saying stuff like that!"
20049-190 = "...I can drink as much clean water as I want here."
20049-200 = "No, it's nothing..."
20049-210 = "I wonder if they enjoyed the beach. ...What about me?"
20049-220 = "Not at all. It was boring."
20049-230 = "Um. Don't think too much of this, but...is there anything you want?"
20049-240 = "I-It's just a question!"
20049-250 = "Life and death, it's all in vain. So there's no reason to celebrate."
20049-260 = "Even if you celebrate..."
20049-270 = "..."
20049-280 = "Thank you."
20049-290 = "It's the new year. In the past, I would've said I was one step closer to death again."
20049-300 = "...What would I say now?"
20049-310 = "Why...are you asking me something like that?"
20049-320 = "I still can't buy into this kind of thing...but it does seem like everyone's having fun."
20049-330 = "A negotiation for tricks and treats... What is the point?"
20049-340 = "Is this candy...? I didn't pull a trick or anything."
20049-350 = "Oh...? Is today not that kind of day?"
20049-370 = "Hm..."
20049-380 = "A bit more... Dig out here too..."
20049-390 = "And this stick...can go right here..."
20049-400 = "...Hm, I suppose that should do it."
20049-410 = "Wait..."
20049-420 = "Why am I the one building this...?"
20049-430 = "...Ugh! Sensei...!"
20049-440 = "So this was your plan all along...!"
20049-450 = "...Don't think I'm enjoying this, not at all!"
20049-2600 = "I wonder if I'd even use it here... \"It's up to me how I use it\"? *sigh* You always have a way with words. Fine... Thank you."

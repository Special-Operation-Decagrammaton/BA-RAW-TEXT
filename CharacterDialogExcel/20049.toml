[translation]
20049-10 = "蔚藍，檔案。"
20049-20 = "不只熱，還黏黏的……\n所以呢，要做什麼？"
20049-30 = "好無聊……"
20049-40 = "（那是……什麼？）"
20049-50 = "其他人平常都是\n這樣度過的啊……"
20049-60 = "就說了，我沒興趣。\n……是真的。"
20049-70 = "（老師……在做什麼呢）"
20049-80 = "又遲到？\n唉……我也是\n剛剛才到而已。"
20049-90 = "……我並沒有在等你。\n那個……辛苦了。"
20049-100 = "對大海的興趣……？\n沒有。"
20049-110 = "……有好多水呢。\n雖然不能喝就是了。"
20049-120 = "對大海的回憶……？\n那種事情無所謂吧。"
20049-130 = "「因為很開心，所以\n　再去一次吧」……？"
20049-140 = "那種話說得倒輕鬆……"
20049-150 = "……所以呢，\n要什麼時候去？"
20049-160 = "……我認為全部\n都是沒意義的東西。\n無論是大海，還是泳裝。"
20049-170 = "……對老師來說\n並不是全部都沒意義？"
20049-180 = "就跟你說，別講\n奇怪的話了……！"
20049-190 = "……在這裡的話，\n乾淨的水就能隨便喝了呢。"
20049-200 = "不，沒什麼……"
20049-210 = "大家，在海邊玩得開心嗎。\n我……？"
20049-220 = "我不開心哦。\n完全沒有。"
20049-230 = "那個……就是，\n我沒什麼特別的意思……\n你有想要的東西嗎？"
20049-240 = "只，只是隨口問問而已！"
20049-250 = "是生是死都沒有意義。\n所以，也沒必要慶祝。"
20049-260 = "就算老師幫我慶祝，\n也什麼都……"
20049-270 = "……"
20049-280 = "……謝謝你。"
20049-290 = "新的一年開始了呢。\n如果是以前的我，\n大概會說又更接近\n死亡了吧……"
20049-300 = "問我現在怎麼樣？"
20049-310 = "為什麼……要問這種事情？"
20049-320 = "這種氣氛，雖然\n還不太習慣……\n大家看起來都很開心呢。"
20049-330 = "惡作劇和糖果的交涉……\n有什麼意義呢？"
20049-340 = "這是，糖果……？\n我又沒有惡作劇。"
20049-350 = "奇怪……今天\n不是那種日子嗎？"
20049-370 = "嗯……"
20049-380 = "再稍微……\n把這邊也削掉……"
20049-390 = "這裡插上樹枝……\n從這個角度……"
20049-400 = "……嗯，這樣就行了吧。"
20049-410 = "……咦？"
20049-420 = "為什麼我，會在堆\n沙堡這種東西……？"
20049-430 = "……唔！\n老師……！"
20049-440 = "你從一開始就在\n打這種主意吧……！"
20049-450 = "……我完全，\n就連一點都\n不覺得好玩！"
20049-2600 = "這種地方會用到嗎……\n「武器也要看怎麼用」？\n唉……你可真會說這種話啊。\n知道了……謝謝你。"

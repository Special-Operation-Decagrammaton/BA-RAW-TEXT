[translation]
13010-10 = "蔚藍檔案"
13010-20 = "條件已經達成了。\n我們今天將會把這瞬間\n定義為緣分，並且去證明它。"
13010-30 = "咦？\n之前有\n這種空間嗎？"
13010-40 = "這樣下去會破產的…\n不縮減消費的話…"
13010-50 = "嗯？\n不休息一下再走嗎？\n大概有1890秒左右的空閒。"
13010-60 = "總覺得今天會\n發生有意思的事。\n以機率來說～"
13010-70 = "老師，今天我也會全力\n助你一臂之力。"
13010-80 = "歡迎你來，老師。\n我們這就開始反省會吧。"
13010-90 = "啊，你去哪裡？"
13010-100 = "老～師～\n請再努力一下！"
13010-110 = "老師，\n現在我對老師的行動\n大概有34點想說的話。"
13010-120 = "（…雖然其中有一句\n是特別的話）"
13010-130 = "不過最近感覺\n有點老師的樣子了。"
13010-140 = "咦？\n你說是我的功勞嗎？"
13010-150 = "咦？\n…那，那當然！"
13010-160 = "老師，在開始進行業務之前，\n請先確立將來的目標和方向性。"
13010-170 = "祝你生日快樂，老師。"
13010-180 = "老師從出生到今天\n大概…"
13010-190 = "什麼？\n不要計算？"
13010-200 = "今天是我生日。\n禮物，我要自己挑。"
13010-210 = "好，要不要到外面去？\n就算不是貴森森的東西也好！"
13010-220 = "在數學方面，開始是很重要的。\n要開始今年的第一天嗎？"
13010-230 = "聖誕節… \n這種日子一點都沒意思。"
13010-240 = "但是有老師在，\n所以有一點開心。"
13010-250 = "和學園都市的人口相比，\n目前在奇普托斯流通的"
13010-260 = "糖果數量和卡路里是…\n（嘟嘟嚷嚷）"
13010-280 = "真是的…既然是大人，\n就請像大人一樣\n有計畫地消費。"
13010-290 = "已經不是拿到零用錢\n就一口氣花掉的小孩子了唷？"
13010-300 = "而且，\n會像這樣幫忙整理發票的，\n只有我而已…"
13010-310 = "下次，\n我絕對不會幫忙的唷！"
13010-320 = "15天前在便利商店買的\n雞肉三明治，500元…\n購買新刊漫畫，450元…"
13010-330 = "嗯…？前天晚上，\n「軟綿綿俱樂部」，\n2萬元…？"
13010-340 = "老，老師！\n這到底是什麼，\n這發票！"
13010-350 = "應當成為學生們模範的教育者，\n竟然，去這種，可疑的店…！"
13010-360 = "不敢相信！\n太差勁了！"
13010-370 = "耶，是名叫「軟綿綿俱樂部」的\n手機遊戲的轉蛋…？"
13010-380 = "…呼。\n我還以為一定是那個…"
13010-390 = "不對不對！\n就算這樣，\n一次花2萬元也太多了！"
13010-400 = "禁止衝動購物！\n消費要好好地計畫！"
13010-2600 = "這…超加分的！"

[translation]
13010-10 = "블루 아카이브"
13010-20 = "조건은 클리어 되었어요.\n우리는 오늘 이 순간을.\n인연이라 정의하고, 증명하게 될 거예요."
13010-30 = "어라?\n이런 공간이\n있었나?"
13010-40 = "이대로면 파산하겠어….\n소비를 줄이지 않으면…."
13010-50 = "응?\n잠깐 쉬고 가지 않을래요?\n약 1890초 정도는 여유가 있으니까."
13010-60 = "어쩐지 오늘은 재미있는\n일이 있을 것 같아.\n확률적으로~"
13010-70 = "선생님. 오늘도 전력으로\n당신을 보좌하겠어요."
13010-80 = "어서 오세요 선생님.\n지금부터 반성회를 시작하죠."
13010-90 = "앗, 어딜 가시는거죠?"
13010-100 = "선~ 생~ 님~\n조금 더 노력해주세요!"
13010-110 = "선생님.\n지금 선생님의 행동에\n대해 하고 싶은 말은\n약 서른네 개 정도입니다."
13010-120 = "(…그 중에 하나는\n특별한 말이지만.)"
13010-130 = "최근엔 그래도\n선생님다워 진 것 같네요."
13010-140 = "네?\n제 덕분이라고요?!"
13010-150 = "우웃….\n다, 당연하죠!"
13010-160 = "선생님.\n업무를 시작하기 전에\n먼저 앞으로의 목표와\n방향성을 준비해주세요."
13010-170 = "생일 축하 드려요 선생님."
13010-180 = "오늘로 선생님이 태어난지\n약…"
13010-190 = "네?\n계산하지 말라고요?"
13010-200 = "오늘은 제 생일이에요.\n선물은, 제가 고르겠어요."
13010-210 = "자, 밖으로 나가보실까요?\n비싼 게 아니라도 좋으니까!"
13010-220 = "수학에서도 시작은 중요하죠.\n올해의 처음을, 시작해볼까요?"
13010-230 = "크리스마스라…\n이런 날은 하나도 안 재밌지만."
13010-240 = "선생님이 있어서,\n약간은 즐겁네요."
13010-250 = "학원도시의 인구에 비례해볼 때\n현재 키보토스에 유통되는"
13010-260 = "사탕의 개수와 그 칼로리는….\n(중얼중얼)"
13010-280 = "정말이지…\n어른이면 어른답게 제대로\n계획적인 소비를 해주세요."
13010-290 = "용돈을 받아서\n흥청망청 써버리는\n어린 아이도 아니잖아요?"
13010-300 = "게다가 이렇게 영수증\n정리를 도와드리는 건\n저 밖에 없으니까…."
13010-310 = "다음번에는 절대로\n도와드리지 않을 테니까요!"
13010-320 = "보름 전 편의점에서 구매한\n치킨 샌드위치가 500엔….\n신간 만화책 구입에 450엔…."
13010-330 = "으응…? 그제 밤\n<클럽 말랑말랑>에서 2만엔…?"
13010-340 = "서, 선생님!\n도대체 뭔가요, 이 영수증은!"
13010-350 = "타의 모범이 되어야 할 교육자가\n이런 저질스러운 곳에 가시다니…"
13010-360 = "믿을 수가 없어요!\n최악이에요!"
13010-370 = "아, <클럽 말랑말랑>이라는 이름의\n가챠 게임이라고요?"
13010-380 = "어휴.\n저는 또…."
13010-390 = "아니. 그렇다 하더라도\n한 번에 2만엔은 너무 심하잖아요!"
13010-400 = "충동 구매는 금지! 앞으로\n소비는 계획적으로 해주세요!"
13010-2600 = "이건… 엄청나게 플러스가 될 거야!"

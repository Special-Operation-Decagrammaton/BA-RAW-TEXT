[translation]
13010-10 = "Blue Archive"
13010-20 = "เคลียร์เงื่อนไขได้แล้วค่ะ\nพวกเราจะกำหนดตัวแปรช่วงเวลานี้ว่าคือโชคชะตา\nและทำการพิสูจน์ตัวแปรนั้นให้เห็นเอง"
13010-30 = "เอ๋? มีที่แบบนี้\nอยู่ด้วยงั้นเหรอ?"
13010-40 = "ขืนเป็นแบบนี้คงล้มละลายแน่ๆ\nถ้าไม่ลดค่าใช้จ่ายลงละก็..."
13010-50 = "อื้อ? แวะพักกันก่อนแล้วค่อย\nไปดีมั้ยคะ? เรามีเวลาเหลือ\nประมาณ 1,890 วินาทีค่ะ"
13010-60 = "รู้สึกเหมือนว่าวันนี้\nจะมีเรื่องสนุกๆ เกิดขึ้น\nถ้าคิดเป็นอัตราส่วนแล้วล่ะก็~"
13010-70 = "คุณครูคะ วันนี้ฉันก็จะสนับสนุนคุณครู\nอย่างสุดความสามารถเลยค่ะ"
13010-80 = "เชิญเลยค่ะ คุณครู\nเราจะเริ่มการประชุมพิจารณา\nทบทวนกันแล้วนะคะ"
13010-90 = "อ๊ะ จะไปไหนคะ?"
13010-100 = "คุณ~ ครู~ คะ~\nตั้งใจกว่านี้หน่อยสิคะ!"
13010-110 = "คุณครูคะ มีเรื่องที่ฉันอยากพูด\nเกี่ยวกับการกระทำของคุณครูในตอนนี้\nสักประมาณสามสิบเรื่องได้เลยค่ะ"
13010-120 = "(และหนึ่งในนั้น\nก็มีคำพูดที่พิเศษอยู่ด้วย)"
13010-130 = "ช่วงนี้ฉันคิดว่า... ฉันเหมือน\nคุณครูขึ้นมาทุกวันๆ แล้วละค่ะ"
13010-140 = "คะ? \nเพราะฉันเหรอคะ?!"
13010-150 = "ฮึฮึ\nนะ... แน่นอนอยู่แล้วค่ะ!"
13010-160 = "คุณครูคะ ก่อนที่จะเริ่มภารกิจ\nเรามากำหนดเป้าหมาย\nกับเส้นทางที่จะใช้ก่อนเถอะค่ะ"
13010-170 = "สุขสันต์วันเกิดนะคะ คุณครู"
13010-180 = "ถ้านับถึงวันนี้ คุณครูก็เกิดมาแล้ว\nประมาณ..."
13010-190 = "คะ?\nไม่ต้องคำนวณงั้นเหรอคะ?"
13010-200 = "วันนี้เป็นวันเกิดของฉันค่ะ\nขอฉันเลือกของขวัญเองนะคะ"
13010-210 = "ถ้างั้น... ออกไปข้างนอกกันมั้ยคะ?\nไม่ต้องเป็นของแพงๆ ก็ได้ค่ะ!"
13010-220 = "ในวิชาคณิตศาสตร์เอง จุดเริ่มต้น\nก็เป็นเรื่องสำคัญมากนะคะ!\nเรามาเริ่มต้นปีนี้... ด้วยกันมั้ยคะ?"
13010-230 = "วันคริสต์มาส...\nวันแบบนี้ไม่เห็นมีอะไรสนุกเลย"
13010-240 = "แต่เพราะมีคุณครูอยู่ด้วย\nเลยสนุกขึ้นมานิดหน่อยแล้วค่ะ"
13010-250 = "เมื่อเทียบกับสัดส่วนประชากรที่อยู่ใน\nเมืองแห่งการศึกษา จำนวนลูกกวาด\nที่ขายอยู่ในเมืองคิโวทอส..."
13010-260 = "กับปริมาณแคลอรี...\n(งึมงำๆ)"
13010-280 = "จริงๆ เลยเชียว... ถ้าเป็นผู้ใหญ่ละก็\nควรวางแผนค่าใช้จ่าย\nให้สมกับที่เป็นผู้ใหญ่หน่อยสิคะ"
13010-290 = "คุณครูไม่ใช่เด็กๆ ที่เอาค่าขนม\nไปซื้อของเล่นจนหมดทันที\nที่ได้รับเงินมาสักหน่อยนะคะ?"
13010-300 = "นอกจากนี้ คนที่จะช่วยคุณครู\nจัดการเรื่องใบเสร็จได้แบบนี้\nคงมีแค่ฉันคนเดียวค่ะ..."
13010-310 = "แต่ว่าคราวหน้า\nฉันจะไม่ช่วยคุณครูอีกแล้วค่ะ!"
13010-320 = "สองอาทิตย์ก่อนที่ร้านสะดวกซื้อ\nซื้อแซนวิชไก่ 500 เยน...\nหนังสือการ์ตูนรายสัปดาห์ 450 เยน..."
13010-330 = "หืม? วันก่อนมีใบเสร็จค่าบริการ\n<คลับนุ่มนิ่มนุ่มฟู> 20,000 เยน...?"
13010-340 = "คะ...คุณครูคะ!\nใบเสร็จนี่มันอะไรกันคะ!"
13010-350 = "ครูผู้สอนที่ควรจะเป็นแบบอย่าง\nให้คนอื่นกลับไปเที่ยวสถานที่\nแบบนั้น..."
13010-360 = "ฉันไม่อยากเชื่อเลยจริงๆ ค่ะ!\nแย่ที่สุดเลย!"
13010-370 = "อ่า... <คลับนุ่มนิ่มนุ่มฟู>...\nเป็นชื่อเกมหมุนกาชางั้นเหรอคะ?"
13010-380 = "เฮ้อ...\nฉันคิดว่า... คุณครู..."
13010-390 = "เดี๋ยวสิ กดกาชาทีเดียว 20,000 เยน\nมันก็มากไปอยู่ดีนะคะ!"
13010-400 = "ห้ามกดพร่ำเพรื่อนะคะ!\nต้องใช้เงินเท่าที่จำเป็นเท่านั้น!"
13010-2600 = "นี่มัน... เยี่ยมสุดๆ ไปเลย!"

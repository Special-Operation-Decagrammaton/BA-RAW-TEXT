[translation]
16017-10 = "B... Blue... Archive... บะ... แบบนี้ถูกมั้ยคะ...?"
16017-20 = "อะ... อุตสึมิ อาโอบะ...\nจากสะ... สถาบันการรถไฟไฮแลนเดอร์ค่ะ..."
16017-30 = "ทะ... ทุกคนดูมีความสุขจัง...\nมีเรื่องน่าสนุก\nอะไรขนาดนั้นเหรอ..."
16017-40 = "ทั้งกว้างและก็สวยจังค่ะ...\nอยากให้ห้องอยู่เวรของเรา\nเป็นแบบนี้บ้างจัง..."
16017-50 = "คะ... คนที่ไม่เข้าพวก\nอย่างฉันจะมาอยู่ใน\nที่แบบนี้ได้เหรอคะ..."
16017-60 = "(รู้สึกเหมือน\nได้กลิ่นน้ำมันเลย...\nมันกวนใจชะมัด...)"
16017-70 = "ใจเย็นๆ แล้วหายใจเข้าลึกๆ...\nฮึบ... ฮ่า..."
16017-80 = "ชะ... เชิญค่ะ\nคุณครู..."
16017-90 = "ฉะ... ฉันกำลังเดินดูรอบๆ\nเผื่อจะมีงานที่ทำได้น่ะค่ะ..."
16017-100 = "สำนักงานชาเล่ต์...\nกลิ่นหอมจัง..."
16017-110 = "อ๊ะ... เฮือก...\nฉะ... ฉันเสียงดังไปใช่มั้ยคะ??"
16017-120 = "ถ้ามีงานให้ฉันทำ\nก็เรียกฉันนะคะ..."
16017-130 = "มะ... ไม่มีอะไร\nให้ฉันซ่อมเหรอคะ..."
16017-140 = "มันเป็นงานที่ฉัน\nมั่นใจมากที่สุดน่ะค่ะ..."
16017-150 = "เอ่อ... ขนมที่อยู่ในห้องครัว"
16017-160 = "ขอฉันกินได้มั้ยคะ...?\nหะ... เห็นว่ามีข้าวเกรียบอยู่น่ะ..."
16017-170 = "ที่ไฮแลนเดอร์\nมะ... ไม่มีขนมแบบนี้น่ะ..."
16017-180 = "แหะๆ... จะทานให้อร่อยเลยค่ะ"
16017-190 = "ฉัน... ไม่ค่อยสันทัดเรื่อง\nงะ... งานเอกสารสำคัญๆ..."
16017-200 = "แต่ว่า\nถ้าให้คำนวณอะไรง่ายๆ\nฉันก็พอทำได้ค่ะ..."
16017-210 = "เอ่อ..."
16017-220 = "ฉันเอาบะหมี่ถ้วย\nมาจากห้องอยู่เวรด้วย..."
16017-230 = "คะ... คุณครูก็\nมาทานด้วยกันมั้ยคะ...?"
16017-240 = "เอ่อ... ฉันได้ยินมาว่าวันนี้\nเป็นวันเกิดของคุณครูค่ะ..."
16017-250 = "ฉันอยากจะให้อะไรคุณครูบ้าง..."
16017-260 = "ก็เลยเอานี่มาค่ะ!\nปะ... ประแจเลื่อน..."
16017-270 = "สุขสันต์วันเกิด\nจากใจจริงเลยค่ะ...!"
16017-280 = "คะ?! ฉะ... ฉันเหรอคะ?"
16017-290 = "ก็จริงอยู่ที่... วันนี้วันเกิดฉัน...!"
16017-300 = "อะ... เอ่อ..."
16017-310 = "ที่จริง...\nถ้าบอกว่าไม่คาดหวังเลย\nก็คงเป็นการโกหก..."
16017-320 = "ขอบคุณนะคะ...\nฉันดีใจ... มากเลยค่ะ"
16017-330 = "หวังว่าจะเป็นปีที่ดีนะ..."
16017-340 = "ฉันขอคาดหวัง\nสักนิดหน่อยจะได้มั้ยคะ"
16017-350 = "ของขวัญ... คริสต์มาส..."
16017-360 = "มะ... ไม่ดีกว่า...\nฉันไม่เหมาะกับของแบบนั้น..."
16017-370 = "ฉันไม่อยากผิดหวังด้วย"
16017-380 = "อย่าคิดเรื่องนั้นดีกว่า..."
16017-390 = "พะ... พวกชุด\nคอสเพลย์น่ะ..."
16017-400 = "น่าจะมีคนที่ใส่แล้วเหมาะ\nอยู่บ้างนะคะ..."
16017-420 = "ยะ... อย่ามา\nตรงนี้นะคะ...\nแง...!"
16017-430 = "ชะ... ชุดของฉัน..."
16017-440 = "มะ... มีกลิ่นน้ำมัน\nฉุนเลยค่ะ...\nมะ... มันไม่ดีค่ะ..."
16017-450 = "ฉะ... ฉันจะรีบไปถอดชุดออก...\nชะ... ช่วยรอตรงนั้นก่อนนะคะ...!"
16017-460 = "คะ?\nหมายความว่ายังไง..."
16017-470 = "เอ่อ... หมายความว่า..."
16017-480 = "อ๊ายย...?! บะ... แบบนั้นมัน!!"
16017-490 = "วะ... ว้ายยยย!!"
16017-2600 = "ถะ... ถ้ามีใคร\nทำให้อารมณ์ไม่ดี...\nหะ... ให้เอาอันนี้\nยิงได้เลยใช่มั้ยคะ...?"

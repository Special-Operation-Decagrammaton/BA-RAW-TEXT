[translation]
16017-10 = "브, 블루 아카이브…… 이, 이거 맞나요……?"
16017-20 = "하, 하이랜더 철도학원…… 우, 우츠미 아오바예요……"
16017-30 = "모, 모두\n행복해 보여……\n뭐가 그렇게\n즐거운 걸까……"
16017-40 = "넓고 좋네요……\n우리 숙직실도\n이러면 좋을 텐데……"
16017-50 = "저, 저처럼 안 어울리는\n사람이 이런 곳에\n있어도 되는 걸까요……"
16017-60 = "(왠지 기름 냄새가\n배어버린 것 같은\n기분이…… 신경 쓰여……)"
16017-70 = "진정하고 심호흡을…\n스- 하아…"
16017-80 = "어, 어서 오세요.\n선생님……"
16017-90 = "하, 할 일이 없는지\n둘러보고 있었어요……"
16017-100 = "샬레의 사무실……\n……좋은 냄새……"
16017-110 = "아, 핫……\n모, 목소리 너무 컸죠……??"
16017-120 = "맡길 일이 있으시면,\n꼭 불러주세요……"
16017-130 = "뭐, 뭔가\n수리할 거 없을까요……"
16017-140 = "그나마 제일\n자신 있는 분야라……"
16017-150 = "그…… 탕비실 간식"
16017-160 = "먹어도 되나요……?\n싸, 쌀과자 있던데……"
16017-170 = "하이랜더에서는 이런 과자,\n아, 안 나와서…"
16017-180 = "헤헤…… 잘 먹겠습니다."
16017-190 = "저…… 주, 중요한 문서\n같은 건 잘 모르지만……"
16017-200 = "그래도\n간단한 계산 정도는\n할 수 있으니까요……"
16017-210 = "저……"
16017-220 = "숙직실에서\n컵라면 가져왔는데……"
16017-230 = "서, 선생님도\n같이 드실래요……?"
16017-240 = "그…\n오늘, 생일이시라고\n들었어요……"
16017-250 = "뭐라도 드리고 싶어서……"
16017-260 = "모, 몽키 스패너!\n가져왔어요……"
16017-270 = "생일, 진심으로\n축하드려요……!"
16017-280 = "옛?! 저, 저요?"
16017-290 = "제 생일……이 맞긴 한데……!"
16017-300 = "그, 그그……"
16017-310 = "사실……\n기대하지 않았다고 하면\n거짓말이니까…"
16017-320 = "……감사해요……\n정말로…… 기뻐요."
16017-330 = "좋은 한 해가 되기를…"
16017-340 = "조금은,\n기대해 봐도 되려나요."
16017-350 = "크리스마스…… 선물……"
16017-360 = "아, 아니……\n그런 건 안 어울리니까……"
16017-370 = "실망하고 싶지 않으니까"
16017-380 = "생각하지 말자……"
16017-390 = "뭐, 뭔가 분장 같은 건\n조금……"
16017-400 = "좀 더 잘 어울리는 사람들이\n있지 않을까 하네요……"
16017-420 = "여, 여기\n오지 말아주세요……\n으아……!"
16017-430 = "오, 옷에……서……"
16017-440 = "기, 기름 냄새가\n많이 나서요……\n조, 좋지 않아요……"
16017-450 = "그, 금방 벗을 테니까……\n그, 거기서 기다려주세요……!"
16017-460 = "예?\n그게 무슨 말씀……"
16017-470 = "……어…… 그러니까……"
16017-480 = "……아아앗?! 그, 그게!!"
16017-490 = "우, 우와아아앗!!"
16017-2600 = "거, 거슬리는\n사람이 있으면……\n이, 이걸로\n쏴버리면 되는 거죠……?"

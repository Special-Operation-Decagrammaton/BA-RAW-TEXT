[translation]
16017-10 = "B-Blue Archive... W-Was that right...?"
16017-20 = "H-Highlander Railroad Academy... U-Utsumi Aoba..."
16017-30 = "E-Everyone seems happy... I wonder why..."
16017-40 = "It's spacious and nice... I wish our night duty room was like this..."
16017-50 = "I-Is it okay for someone as unworthy as me to be here...?"
16017-60 = "(I feel like I reek of oil... It's bothering me...)"
16017-70 = "Calm down, and take a deep breath... *inhale* *exhale*"
16017-80 = "W-Welcome...Sensei..."
16017-90 = "I-I was looking around to see if there was anything I could do..."
16017-100 = "The Schale Office...smells nice..."
16017-110 = "Ah, huh... I-I was speaking too loudly, wasn't I?"
16017-120 = "Please call me if there's anything you need at all..."
16017-130 = "I-Is there anything I can repair...?"
16017-140 = "That's the only thing I'm confident about..."
16017-150 = "Um... The snacks in the lounge..."
16017-160 = "...can I eat them? I saw r-rice crackers..."
16017-170 = "W-We don't have those at Highlander..."
16017-180 = "Heehee... Thank you for the snack."
16017-190 = "I...don't know much about important p-paperwork..."
16017-200 = "...but at the very least, I can do basic calculations..."
16017-210 = "I..."
16017-220 = "...brought some cup ramen from the night duty room..."
16017-230 = "W-Would you like to have some with me, Sensei...?"
16017-240 = "Um... I heard that today's your birthday..."
16017-250 = "I wanted to get you something, so..."
16017-260 = "...a m-monkey spanner! For you..."
16017-270 = "I wish you a truly happy birthday...!"
16017-280 = "What?! M-Me?"
16017-290 = "It is...my birthday, but...!"
16017-300 = "U-Uhh..."
16017-310 = "Honestly... I'd be lying if I said I hadn't been looking forward to it..."
16017-320 = "...Thank you... I'm truly...happy."
16017-330 = "Here's to another good year..."
16017-340 = "Maybe I can look forward to this one..."
16017-350 = "A Christmas...gift..."
16017-360 = "N-No... That doesn't suit me..."
16017-370 = "I don't want to feel disappointed..."
16017-380 = "...so let's not think about it..."
16017-390 = "Wh-When it comes to costumes, I think..."
16017-400 = "...they're more fitting for other people..."
16017-420 = "D-Don't come in here... Ugh...!"
16017-430 = "M-My...clothes..."
16017-440 = "...they reek of o-oil... Not... Not good at all..."
16017-450 = "I-I'm just going to take these off... So, please...wait right there...!"
16017-460 = "Huh? What...do you mean...?"
16017-470 = "...Uh... So..."
16017-480 = "...Aah?! W-Well!!!"
16017-490 = "W-Waahh!!!"
16017-2600 = "I-If there are people bothering me...I can sh-shoot them with this, right...?"

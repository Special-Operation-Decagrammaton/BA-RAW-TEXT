[translation]
10002-20 = "미식연구회에 오신 걸 환영합니다.\n궁극의 맛을 찾아\n함께 모험을 떠나볼까요?"
10002-30 = "미식의 길은 역시 멀고도 험하군요."
10002-40 = "맛있다는 건 뭘까요?\n우리에게 무슨 의미가 있을까요?"
10002-50 = "맛있는 것.\n그것은 존귀한 것입니다."
10002-60 = "궁극의 맛을 찾기 위해\n오늘도 최선을…."
10002-70 = "음식에 관한 궁금한 게 있다면\n저를 찾아오시길."
10002-80 = "후훗, 언제봐도 질리지 않는\n얼굴이에요."
10002-90 = "어머? 칭찬한 거예요.\n좋은 의미로. 후훗…."
10002-100 = "…그건 저도\n마찬가지라고요?"
10002-110 = "어머, 평안하신가요.\n우후훗."
10002-120 = "붕어빵요? 제가 가장 좋아하는\n음식이죠. 후후."
10002-130 = "고급 음식점을 좋아하냐고요?\n후후. 싫어하지 않아요."
10002-140 = "하지만 제가 가장\n좋아하는 건…."
10002-150 = "사랑하는 사람과 함께하는\n식사랍니다♡"
10002-160 = "예쁘다…라니,\n무무무무무무슨소릴 하시는 건지."
10002-170 = "생일 축하드려요, 선생님…\n생일에는 역시 케이크가\n제격이죠."
10002-180 = "신선한 생크림을 올려도 좋고,\n농후한 치즈를 잔뜩 올리거나,"
10002-190 = "신선한 과일을 올려도 좋고요."
10002-200 = "어머나, 제 생일을\n기억해주고 계셨다니.\n후후후. 기뻐요."
10002-210 = "오늘은 근사한 곳에서\n맛있는 걸 함께 먹는 건가요?\n기대하고 있을게요."
10002-220 = "새해 복 많이 받으세요 선생님.\n설날이라면… 역시 떡국이죠."
10002-230 = "구워도 좋고\n그냥 넣어도 좋고."
10002-240 = "감자와 경단을 넣고\n맑게 끓여낸 뒤 코타츠 위에서\n먹는 맛… 후후후."
10002-250 = "메리 크리스마스.\n오늘은 부쉬 드 노엘도 좋고\n시나몬 쿠키도 괜찮죠."
10002-260 = "하지만 촛불을 켜놓고 마주 앉아\n먹는 것이라면 무엇이든\n상관없을 것 같아요. 후후후."
10002-270 = "키보토스에서 가장 맛있는\n사탕에 대해 아시나요?\n모르신다고요?"
10002-280 = "전 알아요."
10002-290 = "선생님이 들고 있는 사탕이죠.\n제게도… 주시겠어요?"
10002-310 = "후후, 이렇게 함께\n귀가하는 길이라니,\n붕어빵도 이렇게 잔뜩 사버렸구요."
10002-320 = "붕어빵은 조금\n소박하지 않냐구요?"
10002-330 = "아뇨… 저에겐 최고로\n사치스러운 순간인걸요."
10002-340 = "자, 선생님.\n이거 드릴게요."
10002-350 = "…아뇨. 아아- 하셔야죠."
10002-360 = "제일 좋아하는 사람과 함께\n제일 좋아하는 음식을 먹는다.\n이게 바로…."
10002-370 = "응? 그 표정은 뭔가요?"
10002-380 = "후훗. 그런 반응도\n싫어하지 않습니다."
10002-390 = "춥지 않냐고요?"
10002-400 = "아뇨. 따뜻해요.\n정말로."
10002-2600 = "미식가의 길은, 수행자의 길과 같군요.\n궁극이라 부르는 것을 추구하고, 탐구하고,\n또한 앞으로 나아간다. 우후후……. 이것으로\n저도 또 조금은, 앞으로 나아갈 수 있을 것 같네요."

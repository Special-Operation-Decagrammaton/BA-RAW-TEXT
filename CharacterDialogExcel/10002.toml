[translation]
10002-20 = "ยินดีต้อนรับเข้าสู่ชมรมชิมอาหารค่ะ\nออกไปผจญภัยเพื่อลิ้มรสอาหารอันโอชะกันไหมคะ?"
10002-30 = "หนทางนี้ทั้งยาวไกลและอันตราย"
10002-40 = "ความอร่อยมันคืออะไรกันนะ?\nแล้วมันมีความหมายยังไง\nกับเราเหรอคะ?"
10002-50 = "ของอร่อยก็คือ\nของที่เลอค่ายังไงล่ะคะ"
10002-60 = "วันนี้ฉันก็จะใส่เต็มที่\nเพื่อจะได้กินของอร่อยๆ"
10002-70 = "หากสงสัยอะไรเรื่องอาหาร\nก็มาหาฉันได้เลย"
10002-80 = "ฮุฮุ ใบหน้าของคุณครูเนี่ย\nดูเท่าไรก็ไม่เบื่อเลยค่ะ"
10002-90 = "อุ๊บส์! นั่นคำชมนะคะ!\nไม่ได้มีความหมายไม่ดีเลย"
10002-100 = "ฉันเองก็...\nเป็นแบบนั้นเหมือนกันเหรอคะ?"
10002-110 = "โอ๊ะ สบายดีหรือเปล่าคะ\nฮุฮุฮุ"
10002-120 = "ขนมไทยากิเหรอคะ? นั่นคืออาหาร\nที่ฉันชอบมากที่สุดเลยค่ะ ฮุฮุ"
10002-130 = "ฉันชอบร้านอาหารหรูๆ ไหมน่ะเหรอ?\nฮุฮุ ก็ไม่ได้ไม่ชอบนะคะ"
10002-140 = "ทั้งนี้ทั้งนั้น\nสิ่งที่ฉันชอบที่สุด..."
10002-150 = "ก็คือการได้ทานอาหาร\nกับคนที่ฉันรักยังไงล่ะคะ♡"
10002-160 = "คุณครูเพิ่งบอกว่า... ฉันสวยเหรอคะ?\nบ้าน่าาา พูดอะไรก็ไม่รู้"
10002-170 = "สุขสันต์วันเกิดนะคะคุณครู\nวันเกิดทั้งที จะไม่มีเค้กได้ยังไงคะ"
10002-180 = "เอาแบบหน้าครีมสดก็ดี\nไม่ก็โรยด้วยชีสเข้มข้น!"
10002-190 = "หรือจะเป็นผลไม้สดๆ ก็น่าจะอร่อยนะคะ"
10002-200 = "ตายจริง! คุณครูจำวันเกิด\nของฉันได้ด้วยเหรอคะ?\nฮุฮุฮุ ดีใจจังเลยค่ะ"
10002-210 = "วันนี้เราจะไปกินของอร่อย\nในที่ที่บรรยากาศดีๆ ใช่ไหมคะ?\nแล้วจะตั้งตารอนะคะ"
10002-220 = "สุขสันต์วันปีใหม่นะคะคุณครู\nปีใหม่แบบนี้ก็ต้องกินซุปเค้กข้าว"
10002-230 = "จะปิ้งเค้กข้าวก่อนแล้วค่อยใส่\nหรือว่าจะใส่ไปแบบนั้นเลยก็ได้"
10002-240 = "ใส่มันฝรั่งแล้วเคี่ยวจนน้ำซุปใส\nแล้วเอามากินบนโต๊ะโคทัตสึ...\nมันต้องอร่อยมากแน่ๆ ฮุฮุฮุ"
10002-250 = "เมอร์รีคริสต์มาสค่ะ\nวันนี้ต้องกินเค้กขอนไม้\nไม่ก็คุกกี้ซินนามอน"
10002-260 = "แต่หากได้จุดเทียนสลัวๆ\nแล้วนั่งกินด้วยกันแล้วล่ะก็\nจะให้กินอะไรก็ได้ ฮุฮุฮุ"
10002-270 = "คุณครูรู้จักลูกกวาดที่อร่อยที่สุด\nของคิโวทอสไหมคะ? ไม่รู้จักเหรอ?"
10002-280 = "แต่ฉันรู้ค่ะ"
10002-290 = "ลูกกวาดที่คุณครูถืออยู่ยังไงล่ะคะ\nขอฉันบ้างได้ไหม...?"
10002-310 = "ฮุฮุ ไม่คิดเลยนะคะ\nว่าจะได้กลับบ้านด้วยกัน\nแถมยังซื้อขนมไทยากิมาเยอะแยะอีก"
10002-320 = "ไทยากิ ไม่ดูเรียบง่าย\nไปหน่อยงั้นเหรอคะ?"
10002-330 = "ไม่เลยค่ะ... สำหรับฉันแล้ว\nช่วงเวลานี้มันพิเศษที่สุดเลยค่ะ"
10002-340 = "คุณครูคะ\nลองทานขนมนี่สิคะ"
10002-350 = "...ไม่เอาค่ะ อ้าปากสิคะ... \"อ้าม~\""
10002-360 = "การได้กินของโปรด\nกับคนที่ชอบแบบนี้...\nนี่มันคงเป็น..."
10002-370 = "หืม? ทำไมทำหน้าแบบนั้นล่ะคะ?"
10002-380 = "ฮุฮุ ฉันไม่ติดใจ\nที่ทำหน้าแบบนั้นหรอกค่ะ"
10002-390 = "กลัวว่าฉันจะหนาวเหรอคะ?"
10002-400 = "ไม่หนาวเลย กลับอบอุ่นด้วยซ้ำ\nจริงๆ นะคะ"
10002-2600 = "เส้นทางของนักชิม\nก็ไม่ได้แตกต่างกับเส้นทางของนักฝึกฝนหรอกค่ะ\nทั้งการใฝ่หาสิ่งที่สุดยอด\nเสาะหา และมุ่งไปสู่เป้าหมายค่ะ\nฮุฮุ.. เพราะงั้นด้วยอาวุธนี้...\nฉันก็คงจะมุ่งไปสู่เป้าหมายได้อีกขั้นแล้วค่ะ"

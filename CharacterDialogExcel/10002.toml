[translation]
10002-20 = "Welcome to the Gourmet Research Society. Are you ready to go on an adventure in search for the pinnacle of taste?"
10002-30 = "A gourmand's journey is long and treacherous..."
10002-40 = "What is deliciousness? What does it mean to us?"
10002-50 = "Delicious food is a gift from the divine."
10002-60 = "I live every day striving to find the apex of taste."
10002-70 = "I'd be glad to answer any questions you have about fine foods."
10002-80 = "Heehee. I never get tired of seeing your face."
10002-90 = "Oh, that was a compliment. You should take it. Heehee..."
10002-100 = "You feel the same way about me?"
10002-110 = "Oh, how have you been? Heeheehee."
10002-120 = "Taiyaki? It's my favorite food. Heehee."
10002-130 = "Do I enjoy going to gourmet restaurants? Heehee. I suppose I don't mind them."
10002-140 = "But what I enjoy more than anything else..."
10002-150 = "...is sharing a meal with someone I love. ♥"
10002-160 = "Pretty...? Wh-What are you talking about?"
10002-170 = "Happy birthday, Sensei. No birthday is complete without a cake."
10002-180 = "Fresh whipped cream is always good, or you could put lots of rich cheese on top."
10002-190 = "Fresh fruit would be good too."
10002-200 = "Oh, you remembered my birthday. Heehee. I'm flattered."
10002-210 = "Are we going out to a nice restaurant? I'm looking forward to it."
10002-220 = "Happy New Year, Sensei. I would recommend...rice cake soup."
10002-230 = "We can grill the rice cake first or just throw it in as is."
10002-240 = "Throw in potatoes and dumplings, boil them in broth... Baby, you got a stew to go with your kotatsu. Heehee."
10002-250 = "Merry Christmas. A yule log cake would be appropriate. Cinnamon cookies are fine too."
10002-260 = "As long we're together and by the candlelight, I don't care what we eat. Heehee..."
10002-270 = "Do you know what Kivotos' most delicious candy is? You don't?"
10002-280 = "Well, I do."
10002-290 = "It's the candy you're holding right now. So...can I have some too?"
10002-310 = "Heh. I'm enjoying walking home together. We have a bunch of taiyaki now too."
10002-320 = "Don't I think it's a bit underwhelming?"
10002-330 = "No... To me, this moment is the pinnacle of luxury."
10002-340 = "Here, Sensei. This is for you."
10002-350 = "...No. Open your mouth. Say \"ahhh.\""
10002-360 = "Eating my favorite food with my favorite person. This is..."
10002-370 = "Hmm? Why are you looking at me like that?"
10002-380 = "Heh... Still, it doesn't particularly bother me."
10002-390 = "Aren't I cold?"
10002-400 = "No. I feel warm, actually."
10002-2600 = "The path of a gourmand is no different from that of a trainer. Seeking finality, exploring, and moving forward. Heehee... With this, I am indeed able to move forward."

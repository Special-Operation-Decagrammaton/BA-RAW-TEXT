[translation]
10002-20 = "歡迎來到美食研究會。\n為了追求究極的美味，\n一起去冒險吧！"
10002-30 = "美食之道果然很艱難呢。"
10002-40 = "所謂的好吃究竟是什麼呢？\n對我們的意義又是什麼呢？"
10002-50 = "好吃。那是\n尊貴的東西呢。"
10002-60 = "為了追求究極的美味，\n今天也要全力以赴…"
10002-70 = "對食物有什麼疑問的話\n歡迎隨時來找我。"
10002-80 = "呵呵，\n是張不管看幾次\n都不會膩的臉呢。"
10002-90 = "哎呀？這可是在稱讚你哦？\n是正面的意思哦，呵呵…"
10002-100 = "…你說我也一樣\n是嗎？"
10002-110 = "哎呀？貴安。\n呵呵…"
10002-120 = "鯛魚燒嗎？\n那是我最喜歡\n的食物哦。呵呵。"
10002-130 = "你問我喜不喜歡高級餐廳嗎？\n呵呵，不討厭哦。"
10002-140 = "不過，\n我最喜歡的是…"
10002-150 = "和心愛的人一起\n吃飯這件事哦♡"
10002-160 = "真可愛…？\n在，在在在在\n在說什麼呢！？"
10002-170 = "生日快樂，老師。\n生日果然應該要有蛋糕呢。"
10002-180 = "加新鮮的生奶油也好，\n大量濃厚的起司也可以，"
10002-190 = "放點新鮮的水果也不錯呢。"
10002-200 = "哎呀，居然\n記得我的生日嗎？\n呵呵呵，真令人開心。"
10002-210 = "今天要在時髦的店裡\n一起吃好吃的東西嗎？\n我很期待哦。"
10002-220 = "新年快樂，老師。\n說到新年…果然要吃年糕湯呢。"
10002-230 = "把年糕烤一烤直接吃也好\n或是直接放進湯裡吃也可以。"
10002-240 = "加一點馬鈴薯和雞肉丸\n燉煮後在暖桌上\n享用的那種味道…呵呵呵。"
10002-250 = "聖誕快樂。\n這種日子來點樹幹蛋糕\n或是肉桂餅乾都不錯呢。"
10002-260 = "不過，如果可以\n點著蠟燭面對面的話，\n不管吃什麼\n感覺都會很美味呢，呵呵呵。"
10002-270 = "你知道奇普托斯\n最好吃的糖果是哪一種嗎？\n不知道嗎？"
10002-280 = "我知道哦，"
10002-290 = "就是老師手上的糖果哦。\n可以…給我嗎？"
10002-310 = "呵呵，竟然可以\n一起回家，\n還買了這麼多鯛魚燒。"
10002-320 = "你問我鯛魚燒\n不會太樸素嗎？"
10002-330 = "不…對我來說，\n這是最奢侈的瞬間了。"
10002-340 = "來，老師。\n這個送你。"
10002-350 = "…不對。\n你要說「啊──」才對。"
10002-360 = "和最喜歡的人一起\n吃最喜歡的食物。\n這正是…"
10002-370 = "嗯？你那個表情\n怎麼了嗎？"
10002-380 = "唔呵呵。那種反應，\n我也不討厭。"
10002-390 = "你問我會不會冷嗎？"
10002-400 = "不，很溫暖唷。\n真的。"
10002-2600 = "美食家之道和修行者之道\n並沒有什麼不同呢。\n追求極致、探究極致，並不停向前邁進，\n呵呵…有了這個，我就可以\n再稍微向前邁進了呢。"

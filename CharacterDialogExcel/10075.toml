[translation]
10075-10 = "Blue Archive!"
10075-20 = "Hallo! I'm Himeki Meru from the Knowledge Liberation Front! But you can call me by my pen name, Meruri. Nice to meet you, Sensei."
10075-30 = "Now, where can I find some inspiration...?"
10075-40 = "Wait, wait... That view. Maybe...?"
10075-50 = "I really do need to work on my drawing skills..."
10075-60 = "If only my hands were faster...and my eyes and mind!"
10075-70 = "I publish all of my fan fiction under my pen name."
10075-80 = "Oh, welcome, Sensei!"
10075-90 = "All right, get to work! I'll be drawing!"
10075-100 = "LATE!!"
10075-110 = "Oh, you didn't make me wait. I also just got here."
10075-120 = "Mm-hmm, mm-hmm..."
10075-130 = "Sensei, is it okay if I bring my art supplies here?"
10075-140 = "It's just that...I'd like to get some of my own work done while I'm here."
10075-150 = "I know it's a bit off task, but...I've got a lot to do..."
10075-160 = "Art and knowledge both come from freedom."
10075-170 = "So starting now...I'm going to start freely drawing you!"
10075-180 = "This is your battlefield, Sensei...!"
10075-190 = "I feel it... I can feel it. The energy! The chaos!"
10075-200 = "The greatest fan book authors start with a blank page..."
10075-210 = "In other words, I also have what it takes to become a great fan book author!"
10075-220 = "Happy birthday, Sensei! Congrats!"
10075-230 = "To celebrate, I'll draw your portrait!"
10075-240 = "Sensei, did you know? It's my birthday today!"
10075-250 = "...No, no. You don't need to take me anywhere! That's too much hassle!"
10075-260 = "Instead...let's just order some delivery."
10075-270 = "Ah, another year begins. Happy New Year, Sensei."
10075-280 = "Half of me wants to go out to celebrate the New Year, half of me wants to stay in."
10075-290 = "Is there any way we can take care of this online?"
10075-300 = "When I was younger, I really wanted a Greatest Couple fan book for Christmas!"
10075-310 = "...Oh, I wished my little heart out for that book."
10075-320 = "Ultimately, I realized I'd have to draw it myself if I wanted to make my heart's wish come true."
10075-330 = "Halloween... Is the season of the pumpkin upon us...?!"
10075-340 = "We have no choice... Let's go out, Sensei! It's time to gather supplies!"
10075-360 = "I'm not doing anything that amazing."
10075-370 = "I just don't have anything else I can do, or anything else I'm good at..."
10075-380 = "Maybe that's why... Why I keep wanting to create."
10075-390 = "But this, right now... It doesn't feel wrong or bad."
10075-400 = "Here, in this workshop, I feel like I can really talk to you."
10075-410 = "Because look... Creation necessitates change, right?"
10075-420 = "And you, you're someone who helps me change, Sensei."
10075-430 = "Ugh... I just said something super cringey."
10075-440 = "Uh, just pretend you didn't hear anything! Forget it! Forget it right now! Ahahaha!"
10075-2600 = "They say that a skilled painter doesn't discriminate between brushes. Still, her tools are important. What I'm trying to say is thank you, Sensei."

[translation]
10075-10 = "Blue Archive~"
10075-20 = "ยะโฮ่~! ฮิเมกิ เมรุจากชมรมแนวร่วมปลดปล่อยความรู้!\nเรียกว่าเมรูริก็ได้ อ๊ะ มันเป็นนามปากกาน่ะ\nขอฝากตัวด้วยนะ คุณครู "
10075-30 = "แรงบันดาลใจ...\nแรงบันดาลใจอยู่ไหน…!"
10075-40 = "รอก่อน... รอก่อน...\nภาพนั้น... บางที...?"
10075-50 = "คิดแล้วเชียวว่าต้องฝึก\nสกิลวาดรูปให้มากกว่านี้..."
10075-60 = "ถ้าวาดได้เร็วขึ้นกว่านี้ละก็...\nความคิดแล้วก็สายตา\nต้องไวขึ้นด้วย!"
10075-70 = "ตอนที่ปล่อยโดจินชิออกไปน่ะ\nต้องใช้นามปากกาสิ"
10075-80 = "โอ๊ส เชิญเลย ครู!"
10075-90 = "ถ้างั้นก็เริ่มทำงานกันกันเถอะ~\nฉันจะวาดรูปรอเอง~"
10075-100 = "สายซะแล้ว~"
10075-110 = "อ๊ะ ขอโทษที่ทำให้รองั้นเหรอ?\nไม่เลยๆ ฉันก็เพิ่งมาถึงเอง"
10075-120 = "อืมๆ อื้ม..."
10075-130 = "ฉันขอเอาอุปกรณ์ของฉัน\nมาที่นี่ได้มั้ยครู?"
10075-140 = "ตอนอยู่ที่นี่\nฉันก็อยากทำงาน\nของตัวเองบ้างน่ะ"
10075-150 = "ถึงมันจะดูนอกเรื่องสักหน่อยก็เถอะ...\nแต่ฉันเองก็กำลังยุ่งอยู่เหมือนกันนะ..."
10075-160 = "ทั้งศิลปะ และความรู้...\nต่างเป็นสิ่งที่บ่มเพาะมาจาก\nความอิสระทั้งนั้น"
10075-170 = "เพราะงั้นตั้งแต่นี้ไป...\nฉันจะวาดรูปครูอย่างอิสระ!"
10075-180 = "ที่นี่...\nคือสนามรบของครู...!"
10075-190 = "สัมผัสได้... ฉันสัมผัสได้\nพลังงานแห่งความโกลาหล!"
10075-200 = "นักวาดโดจินที่ยิ่งใหญ่น่ะ ก็เริ่มจาก\nการนั่งกอดหน้ากระดาษเปล่า\nกันทั้งนั้นแหละ"
10075-210 = "หรือก็คือฉันเองก็มีคุณสมบัติ\nที่จะได้เป็นนักวาดโดจินผู้ยิ่งใหญ่\nเหมือนกันไงล่ะ!"
10075-220 = "วันเกิดครูเหรอ\nสุขสันต์วันเกิดนะ ครู!"
10075-230 = "และในวันพิเศษอย่างนี้\nฉันจะวาดภาพเหมือนคุณครู\nให้เป็นของขวัญเอง!"
10075-240 = "คุณครูรู้หรือเปล่า?\nวันนี้น่ะเป็นวัน...\nวันเกิดของเมรุยังไงล่ะ!"
10075-250 = "...ไม่ๆ... ไม่ได้หมายความว่า\nจะชวนไปข้างนอกสักหน่อย!\nเรื่องแบบนั้นน่ารำคาญจะตาย!"
10075-260 = "ถ้างั้น... สั่งอะไรมากินหน่อยดีมั้ย?"
10075-270 = "อ่า~ ถึงวันปีใหม่อีกปีแล้ว\nสุขสันต์วันปีใหม่นะ ครู"
10075-280 = "ใจหนึ่งก็อยากออกไปขอพรปีใหม่\nแต่อีกใจก็ไม่อยากออกไปเลย~"
10075-290 = "ทำให้ขอพรออนไลน์ไม่ได้หรือไงนะ?"
10075-300 = "ตอนเด็กๆ ฉันเคยขอพรว่า\nอยากได้โดจินชิคู่ชิป\nคนโปรดที่นักวาดชื่อดัง\nเป็นคนวาด!"
10075-310 = "...เคยขอพรไปแบบนั้นด้วยละ"
10075-320 = "แต่สุดท้ายก็รู้ว่าถ้าอยากให้\nโดนใจตัวเองที่สุด ก็ควรจะต้อง\nวาดขึ้นมาเองน่ะ"
10075-330 = "ฮาโลวีน…\nเทศกาลแห่งฟักทองงั้นเหรอ...?"
10075-340 = "ช่วยไม่ได้นะ...\nออกไปกันเถอะครู!\nได้เวลาไปรวบรวมข้อมูลแล้ว!"
10075-360 = "ที่จริงฉันก็ไม่ได้ทำเรื่องอะไร\nที่มันยิ่งใหญ่ขนาดนั้นสักหน่อย"
10075-370 = "ฉันแค่ไม่มีอะไรอย่างอื่นที่ทำได้\nแล้วก็ไม่ได้มีทักษะพิเศษอะไร"
10075-380 = "บางทีเพราะแบบนั้น\nฉันถึงแค่อยากสร้างสรรค์\nผลงานต่อไปแบบนี้"
10075-390 = "ฉันว่าแบบนี้\nมันก็ไม่ได้แย่เท่าไร"
10075-400 = "หมายถึงที่แบบนี้น่ะ...\nการได้พูดคุยกับคุณครูแบบนี้\nมันอาจจะดีก็ได้"
10075-410 = "เพราะว่า…\nการสร้างสรรค์ผลงานน่ะ มันต้อง\nอาศัยความเปลี่ยนแปลงใช่มั้ยล่ะ?"
10075-420 = "แล้วคุณครูก็เป็นคนที่\nนำความเปลี่ยนแปลง\nมาให้ฉัน"
10075-430 = "อึก... เมื่อกี้ฉัน\nพูดเรื่องน่าอายออกไปซะแล้ว"
10075-440 = "อ๊า! ทำเป็นไม่ได้ยินไปก็แล้วกันนะ!\nลืมไปซะ ลืมให้หมดเลยด้วย!\nอะฮ่าฮ่าฮ่า!"
10075-2600 = "ถึงลายมือจะไม่ได้ขึ้นอยู่กับปากกา\nแต่ยังไงอุปกรณ์ก็เป็น\nสิ่งสำคัญอย่างหนึ่ง\nเอาเป็นว่าขอบคุณนะ ครู"

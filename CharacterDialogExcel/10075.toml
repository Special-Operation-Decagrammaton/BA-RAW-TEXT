[translation]
10075-10 = "蔚藍檔案"
10075-20 = "呀齁～！我是知識解放戰線的姬木愛瑠！\n叫我「Meruri」也行唷，啊，那個是我的筆名。\n請多指教，老師。"
10075-30 = "素材……\n素材在哪裡……！"
10075-40 = "等等等等……\n那個情景，\n說不定……？"
10075-50 = "果然……\n還是想要更強\n的畫力啊……"
10075-60 = "能不能再讓手速\n更快一點呢……\n眼睛和腦袋也順便！"
10075-70 = "出同人誌的時候，\n不會用本名的哦。"
10075-80 = "哦，歡迎你來，老師！"
10075-90 = "那，開始工作吧～\n我會畫下來的！"
10075-100 = "你～好～慢～"
10075-110 = "抱歉讓我久等了？\n不會啊？我也才剛到而已啊？"
10075-120 = "呼呣呼呣……"
10075-130 = "老師，可以把我的資料\n拿來這裡嗎？"
10075-140 = "沒有啦，我只是……\n想當成工作室用而已。"
10075-150 = "雖然說這些可能有點晚，\n但老師你……過著\n很忙碌的生活呢……"
10075-160 = "無論藝術還是知識，\n全都是由自由萌芽的。"
10075-170 = "所以我從現在起……\n要自由地畫老師的素描！"
10075-180 = "這裡是，\n老師的戰場……！"
10075-190 = "感覺得到……\n我能感覺到……\n修羅場的氣息！"
10075-200 = "每位偉大的同人作家，\n起初也曾抱持著\n一片空白的原稿……"
10075-210 = "也就是說，\n我也有成為偉大\n同人作家的素養哦！"
10075-220 = "是你的生日呢！\n恭喜你，老師！"
10075-230 = "今天一定\n要送老師的\n肖像畫當禮物！"
10075-240 = "老師你知道嗎？\n今天是我……\n姬木愛瑠的生日唷！"
10075-250 = "……不是不是，\n我沒有要約老師\n一起出門的意思！\n那樣太麻煩了！"
10075-260 = "比起那個……\n要不要，來叫外送？"
10075-270 = "啊～啊～新年到了。\n新年快樂，老師。"
10075-280 = "想去參拜的心情有一半，\n不想出門的心情也有一半～"
10075-290 = "這種事，\n就不能線上做嗎～"
10075-300 = "以前，「聖誕禮物\n想收到神繪師畫的\n我推CP的同人誌！」"
10075-310 = "……我曾經這麼許願過。"
10075-320 = "但最終我得到了\n「自己心中最棒的萌點\n只能自己畫出來」的結論。"
10075-330 = "萬聖節……\n南瓜相關創作\n的旺季……！"
10075-340 = "沒辦法了……\n出門吧老師！\n資料收集時間到囉！"
10075-360 = "我其實，\n也不是在做什麼\n了不起的事。"
10075-370 = "畢竟我沒有其他想做的事，\n也沒有其他技能……"
10075-380 = "所以我……\n才會持續創作著也說不定。"
10075-390 = "總覺得……\n這樣也不錯。"
10075-400 = "在這種地方……\n和老師談論這些，\n也還不賴。"
10075-410 = "因為，你想想……\n創作不是需要變化嗎？"
10075-420 = "而老師，也是\n為我帶來變化的人。"
10075-430 = "嗚哇……\n我好像說了\n很害羞的話。"
10075-440 = "啊～剛才當我沒說！\n忘了吧忘了吧！啊哈哈哈！"
10075-2600 = "雖然有句話說「善書不擇筆」，\n但工具還是很重要的。\n那個……就是，謝謝你的意思。老師。"

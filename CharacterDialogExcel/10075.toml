[translation]
10075-10 = "블루 아카이브~"
10075-20 = "야호~! 나는 지식해방전선의 히메키 메루!\n메루리라고 불러도 돼, 아, 이건 펜네임이야.\n잘 부탁해, 선생."
10075-30 = "소재……\n소재는 어디냐……!"
10075-40 = "기다려, 기다려……\n저 광경은,\n어쩌면……?"
10075-50 = "역시 그림 실력이\n더 필요해……"
10075-60 = "조금 더 손이 빨라지지는\n않으려나…… 거기에\n눈과 머리 회전도!"
10075-70 = "동인지를 낼 때는,\n펜네임을 사용하지."
10075-80 = "오, 어서 와. 선생!"
10075-90 = "그러면, 일을 시작해 보라고~\n나는 그걸 그리고 있을 테니까!"
10075-100 = "늦~ 어~"
10075-110 = "기다리게 해서 미안하다고?\n아니? 지금 막 왔는데?"
10075-120 = "흐음, 흐음……"
10075-130 = "선생. 여기에 내 자료,\n가져와도 돼?"
10075-140 = "아니, 그냥…… \n작업실로 하고 싶어서 말이야."
10075-150 = "새삼스럽지만……\n바쁜 인생을 보내고 있구만……"
10075-160 = "예술도 지식도,\n모두 자유로부터 싹트는 법."
10075-170 = "그러니까 나는 지금부터……\n자유롭게 선생을 스케치하겠어!"
10075-180 = "여기가\n선생의 전장……!"
10075-190 = "느껴져…… 느껴진다고.\n수라장의 기운이!"
10075-200 = "위대한 동인 작가들은 모두,\n처음에는 백지 원고를 안고 있었어……"
10075-210 = "즉, 나도 위대한 동인 작가가 될\n소양이 있다는 거야!"
10075-220 = "생일이구나, 축하해! 선생!"
10075-230 = "오늘이야말로,\n선생의 초상화를 선물해 줄게!"
10075-240 = "선생, 알고 있어?\n오늘은 바로 나……\n메루의 생일이라고!"
10075-250 = "……아니, 아니.\n같이 나가자는 의미가 아니야!\n그런 거 귀찮고!"
10075-260 = "그보다……\n배달, 시키지 않을래?"
10075-270 = "아~ 아~ 새해가 되어 버렸어.\n새해 복 많이 받아, 선생."
10075-280 = "새해 기원은\n하러 가고 싶은 마음 반,\n나가기 싫은 마음 반~"
10075-290 = "이런 거,\n온라인으로 어떻게 안 되려나~"
10075-300 = "예전에, 크리스마스 선물로\n금손님이 그린\n최애 커플 동인지가 갖고 싶어!"
10075-310 = "……라고 소원을\n빈 적이 있었는데 말야."
10075-320 = "결국 내가 최고로 심쿵하려면\n스스로 그릴 수밖에 없는\n결론이 되어 버렸지."
10075-330 = "할로윈……\n호박 모티브의 시즌인가……!"
10075-340 = "어쩔 수 없구만……\n나가자, 선생!\n자료 수집 시간이야!"
10075-360 = "딱히 나는,\n대단한 일을 하고 있는 게 아니야."
10075-370 = "달리 하고 싶은 것도,\n스킬도 없고……."
10075-380 = "그러니까 나는……\n창작을 계속하고 있을 뿐인지도."
10075-390 = "뭔가……\n이런 것도 나쁘지 않네."
10075-400 = "이런 장소에서 말야……\n이런 대화를, 선생과 나누는 거.\n좋을지도."
10075-410 = "왜냐면 봐,\n창작에는 변화가 필요하잖아?"
10075-420 = "선생은, 나에게 변화를 가져다주는\n사람이기도 하니까."
10075-430 = "우와- ……\n지금 부끄러운 거\n말해 버렸을지도."
10075-440 = "아- 지금은 못 들은 걸로!\n잊어버려, 잊어버려! 아하하하!"
10075-2600 = "명필은 붓을 가리지 않는다지만,\n그래도 도구는 중요하니까 말야.\n저기…… 그러니까, 고맙다는 뜻이야. 선생."

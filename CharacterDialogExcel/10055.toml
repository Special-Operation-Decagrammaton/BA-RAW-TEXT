[translation]
10055-10 = "蔚藍檔案"
10055-20 = "啊，老師。工作前\n要不要喝一杯啊？\n呵呵……不是酒啦，放心吧。"
10055-30 = "有好多\n可愛的東西呢。"
10055-40 = "那個是……？ "
10055-50 = "這溫度\n正適合發酵。"
10055-60 = "這裡真溫暖呢。\n……真想\n多待在這裡一下。"
10055-70 = "把這個和那個\n混合一下……"
10055-80 = "歡迎你來，老師。\n現在正好有空……"
10055-90 = "要不要一起聊個天？"
10055-100 = "歡迎回來，老師。\n你看起來有點累呢……"
10055-110 = "要不要喝這個？"
10055-120 = "夏萊的採光很好\n所以很溫暖。"
10055-130 = "感覺稍微放空\n就會睡著……"
10055-140 = "嗯？需要我幫忙嗎？"
10055-150 = "下次由我來\n招待老師吧。"
10055-160 = "哼～哼哼～♪"
10055-170 = "之前為什麼要在\n配給用的康波特裡摻酒？"
10055-180 = "這個嘛……"
10055-190 = "因為是很久以前的事，\n所以想不起來了……呵呵。"
10055-200 = "生日快樂，老師。"
10055-210 = "要不要來一杯\n慶祝的康波特？"
10055-220 = "這麼說來今天\n是我的生日呢。"
10055-230 = "我不會許什麼亂來的願望，\n所以放心吧……呵呵。"
10055-240 = "新年快樂，老師。"
10055-250 = "畢竟是新年，\n喝點甜酒可以吧？"
10055-260 = "……嗯？不行嗎？"
10055-270 = "聖誕快樂，老師。\n有沒有想要什麼？"
10055-280 = "我？"
10055-290 = "……我現在\n就很滿足了。"
10055-300 = "有點想喝南瓜汁。"
10055-310 = "當然是\n沒有發酵的哦。"
10055-330 = "真是漂亮的夜景呢……"
10055-340 = "謝謝你讓我看到\n這麼美的景色，老師。"
10055-350 = "……你能這麼說，\n我很高興。"
10055-360 = "但我，果然還是\n喜歡現在的地方。"
10055-370 = "……在這種都市裡，\n看不太到星星對吧。"
10055-380 = "在太過明亮的光線之中，\n會連星星都看不清楚的……"
10055-390 = "所以，我只要能在\n黑夜中眺望，就很滿足了。"
10055-400 = "只要有重要的人，\n和好喝的飲料的話……"
10055-410 = "無論在什麼地方都無所謂嘛。"
10055-2600 = "這把榴彈發射器，用來點火的時候很棒，\n但用來打獵感覺有點微妙呢。\n……不過，用來驅趕熊應該很夠用了。"

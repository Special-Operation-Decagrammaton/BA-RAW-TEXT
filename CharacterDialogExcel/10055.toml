[translation]
10055-10 = "블루 아카이브~"
10055-20 = "아, 선생님.\n일하기 전에 가볍게 한 잔 어때?\n후후…… 술은 아니니까 안심해."
10055-30 = "귀여운 것들이\n잔뜩 있네."
10055-40 = "저건……?"
10055-50 = "발효에 딱 좋은\n온도인걸."
10055-60 = "이곳은 따듯하네……\n조금만 더\n머무르고 싶어."
10055-70 = "이거랑 저걸\n조금 섞어서…"
10055-80 = "어서 와, 선생님.\n마침 한가하던 참이었는데……"
10055-90 = "같이 수다라도 떨지 않을래?"
10055-100 = "어서 와, 선생님.\n뭔가 피곤해 보이네."
10055-110 = "이거라도 마실래?"
10055-120 = "샬레는 볕이 잘 들어서\n따듯하네."
10055-130 = "멍하니 있다가는\n잠이 들 것 같아……"
10055-140 = "응? 뭔가 도와줄까?"
10055-150 = "다음번엔 내가\n선생님을 초대해볼까~"
10055-160 = "흠~ 흠흠~ 흠~♪"
10055-170 = "왜 전에 배급용 캄포트에\n술을 섞었느냐고?"
10055-180 = "글쎄……"
10055-190 = "오래 전 일이라\n기억이 잘 안 나는 걸.\n후후."
10055-200 = "생일 축하해, 선생님."
10055-210 = "축하의 캄포트라도\n한 잔 어때?"
10055-220 = "그러고 보니 오늘이\n내 생일이었네."
10055-230 = "무리한 부탁은 하지 않을테니까\n안심해. 후후."
10055-240 = "새해 복 많이 받아, 선생님."
10055-250 = "새해니까 기념으로 감주 한 잔\n정도는 괜찮겠지?"
10055-260 = "……응? 역시 안 돼?"
10055-270 = "메리 크리스마스, 선생님.\n뭔가 받고 싶은 선물\n이라도 있어?"
10055-280 = "……나?"
10055-290 = "……나는 지금\n이대로도 충분해."
10055-300 = "호박 주스가 마시고 싶은\n기분인걸……"
10055-310 = "물론\n발효되지 않은 것으로."
10055-330 = "아름다운 야경이네……"
10055-340 = "이런 멋진 풍경을 보여줘서\n고마워, 선생님."
10055-350 = "그렇게 말해 주는 건\n기쁘지만……"
10055-360 = "나는, 역시\n지금의 장소가 좋아."
10055-370 = "이런 도시에서는\n별이 잘 보이질 않거든."
10055-380 = "너무 밝은 빛 속에서는,\n별을 찾을 수 없게\n되어버리니까……"
10055-390 = "그러니까, 나는 어둠 속에서\n바라보는 것으로 충분해."
10055-400 = "소중한 사람, 그리고\n맛있는 음료만 있다면……"
10055-410 = "장소는 어디든 상관없어."
10055-2600 = "이 유탄발사기. 불을 붙일 때는 좋은데,\n사냥에 쓰기에는 미묘하단 말이지.\n……그래도 뭐, 곰을 쫓아내기엔 충분할지도."

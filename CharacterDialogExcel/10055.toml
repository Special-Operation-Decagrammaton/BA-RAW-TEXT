[translation]
10055-10 = "Blue Archive~"
10055-20 = "อ๊ะ คุณครู มาดื่มสักแก้วก่อนไปทำงานมั้ย?\nฮุฮุ... ไม่ใช่เหล้าหรอก รับรองปลอดภัย"
10055-30 = "มีของน่ารักๆ เยอะแยะเลย"
10055-40 = "นั่นมัน...?"
10055-50 = "อุณหภูมิเหมาะ\nสำหรับการหมักเลย"
10055-60 = "ตรงนี้อุ่นดีจัง...\nอยากอยู่ตรงนี้ต่ออีกหน่อยจัง"
10055-70 = "เอาอันนี้กับอันนั้น\nมาผสมกันนิดหน่อย..."
10055-80 = "เข้ามาสิคุณครู\nฉันกำลังว่างอยู่พอดี..."
10055-90 = "มาคุยกันหน่อยมั้ย?"
10055-100 = "เข้ามาสิคุณครู\nคุณครูดูเหนื่อยๆ นะ"
10055-110 = "ดื่มนี่หน่อยมั้ย?"
10055-120 = "แดดส่องเข้ามาในชาเล่ต์\nแบบนี้อบอุ่นดีจัง"
10055-130 = "นั่งเหม่อลอยแบบนี้\nเดี๋ยวคงเผลอหลับแน่..."
10055-140 = "หืม? ให้ฉันช่วยอะไรมั้ย?"
10055-150 = "ครั้งต่อไปให้ฉัน\nเป็นฝ่ายเชิญคุณครูดีมั้ย~"
10055-160 = "ฮื้มม~ ฮืม ฮื้มม~♪"
10055-170 = "ทำไมกัมปอตที่เอาไปแจก\nถึงผสมเหล้าด้วยงั้นเหรอ?"
10055-180 = "นั่นสินะ..."
10055-190 = "เรื่องมันนานมาแล้ว\nฉันจำไม่ได้แล้วละ ฮิฮิ"
10055-200 = "สุขสันต์วันเกิดนะคุณครู"
10055-210 = "มาดื่มกัมปอตฉลองกัน\nสักแก้วมั้ยล่ะ?"
10055-220 = "จะว่าไป วันนี้คือ\nวันเกิดของฉันนี่นา"
10055-230 = "ฉันไม่ขอให้ทำอะไร\nที่หนักหนาเกินไปหรอก\nวางใจได้เลย ฮิฮิ"
10055-240 = "สวัสดีปีใหม่นะคุณครู"
10055-250 = "ปีใหม่ทั้งที จัดสาเกหวานสักแก้ว\nคงไม่เป็นไรเนอะ?"
10055-260 = "หืม...? ไม่ได้งั้นเหรอ?"
10055-270 = "เมอร์รีคริสต์มาสนะคุณครู\nมีของขวัญอะไรที่อยากได้มั้ย?"
10055-280 = "ฉันเหรอ...?"
10055-290 = "ตอนนี้เท่าที่ฉันมี...\nก็เพียงพอแล้วละ"
10055-300 = "รู้สึกอยากกินน้ำฟักทองจัง..."
10055-310 = "แน่นอนว่า...\nไม่ใช่น้ำฟักทองหมักนะ"
10055-330 = "เป็นวิวที่สวยจังเลย..."
10055-340 = "ขอบคุณที่พามาดูทิวทัศน์\nที่สวยงามแบบนี้นะคุณครู"
10055-350 = "พูดแบบนั้น ฉันก็ดีใจนะ\nแต่ว่า..."
10055-360 = "ฉันน่ะ ชอบสถานที่\nที่อยู่ตอนนี้มากกว่า..."
10055-370 = "เพราะในเมืองแบบนี้น่ะ\nมองไม่ค่อยเห็นดาวเท่าไหร่"
10055-380 = "เพราะในที่ที่สว่างเกินไป\nจะไม่สามารถมองเห็นดวงดาวได้..."
10055-390 = "เพราะงั้นการที่ฉันได้มอง\nจากความมืดก็เพียงพอแล้วละ"
10055-400 = "ขอแค่มีคนสำคัญ\nและเครื่องดื่มอร่อยๆ..."
10055-410 = "จะอยู่ที่ไหนก็ไม่สำคัญหรอก"
10055-2600 = "ปืนยิงระเบิดอันนี้ เวลาใช้จุดไฟก็ดีอยู่นะ\nแต่จะใช้ล่าสัตว์ก็คงแปลกเกินไป\nแต่ก็นะ... น่าจะเอาไว้ใช้ไล่หมีได้อยู่"

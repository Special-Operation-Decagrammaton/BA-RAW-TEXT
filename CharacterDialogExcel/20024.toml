[translation]
20024-10 = "Blue Archive"
20024-20 = "สบายดีหรือเปล่าคะ? โฮสต์แห่งสภาน้ำชา\nโรงเรียนสามัญทรีนิตี้ คิริฟุจิ นางิสะค่ะ\nฉันจะพยายามช่วยเหลือคุณครูอย่างสุดความสามารถค่ะ"
20024-30 = "ฮุฮุ\nสบายดีหรือเปล่าคะ?"
20024-40 = "กลิ่นหอมกรุ่นของกาแฟ...\nบางครั้งก็ไม่ได้แย่\nสักเท่าไรนะคะ"
20024-50 = "(ที่นี่เป็นสถานที่รวมตัว\nของนักเรียนหลายคน\nถ้าไม่เตรียมตัวให้ดีละก็...)"
20024-60 = "ตายจริง...\nขนมของว่าง\nดูน่ารักจังเลยค่ะ"
20024-70 = "(เก้าอี้ที่นี่...\nดูนุ่มนิ่มมากเลยนะคะ)"
20024-80 = "สบายดีหรือเปล่าคะ\nคุณครู"
20024-90 = "อาจจะช้าไปสักหน่อย\nแต่ฉันเตรียมน้ำชา\nไว้ให้แล้วค่ะ"
20024-100 = "เชิญเข้ามาเลยค่ะ คุณครู"
20024-110 = "ถ้าคุณครูสะดวก\nก่อนจะเริ่มงานของวันนี้\nมาดื่มชาแดงสักถ้วยก่อนเป็นยังไงคะ?"
20024-120 = "ฮุฮุ\nวันนี้ก็อากาศดีมากเลยนะคะ"
20024-130 = "หลังทำงานเสร็จแล้ว\nไปเดินเล่นกันดีมั้ยคะ?"
20024-140 = "เอ๋? เครื่องอบแก้วของฉัน\nที่ใช้สำหรับวางแก้วอยู่ไหนนะ..."
20024-150 = "อา..."
20024-160 = "เวลาที่จดจ่ออยู่กับงานมากเกินไป\nก็มักเผลอลืมความจริงที่ว่าที่นี่\nคือห้องทำงานของชาเล่ต์บ่อยๆ เลยค่ะ"
20024-170 = "ต้องขออภัยด้วยนะคะ"
20024-180 = "ห้องทำงานของชาเล่ต์\nไม่ค่อยมีคนคอยเพ่งเล็ง\nเหมือนกับที่สภาน้ำชา\nเลยรู้สึกโล่งใจนิดหน่อยน่ะค่ะ"
20024-190 = "เพื่อเป็นตัวอย่างที่ดีให้กับนักเรียน\nของโรงเรียนทรีนิตี้ การใส่ใจสายตา\nของคนรอบข้างเป็นเรื่องสำคัญมากค่ะ"
20024-200 = "(เป็นเพราะ...\nรู้สึกจิตใจสงบรึเปล่านะ...\nเลยรู้สึกง่วงนิดหน่อยค่ะ...)"
20024-210 = "งานของทางสภาน้ำชา\nส่วนมากเป็นการจัดการเอกสาร\nการเลือกเก้าอี้ดีๆ จึงเป็นสิ่งสำคัญค่ะ"
20024-220 = "คุณครูเองก็ลองหาเก้าอี้ตัวใหม่\nมาไว้ที่ชาเล่ต์ดูบ้างดีมั้ยคะ?"
20024-230 = "สุขสันต์วันเกิดค่ะ\nคุณครู"
20024-240 = "ฉันเตรียมใบชา\nชนิดพิเศษเอาไว้แล้ว"
20024-250 = "ถ้าทำงานเสร็จแล้ว\nช่วยมาที่ระเบียง\nสภาน้ำชาด้วยนะคะ"
20024-260 = "หมายถึง...\nของขวัญวันเกิดเหรอคะ...?"
20024-270 = "อืม ฉันไม่มีอะไร\nที่อยากได้เป็นพิเศษหรอกค่ะ"
20024-280 = "ถ้าได้ใช้เวลาหนึ่งวันกับคุณครูละก็\nคงไม่มีของขวัญอะไร\nที่ดีกว่านี้อีกแล้วค่ะ"
20024-290 = "ขอให้มีความสุข\nในวันปีใหม่นะคะ"
20024-300 = "ปีนี้ก็รบกวนคุณครู\nช่วยแนะนำพวกเราด้วยนะคะ"
20024-310 = "ปีนี้ก็ใกล้จะผ่านไป...\nอีกหนึ่งปีแล้วนะคะ"
20024-320 = "ได้รับประทานเค้กวันคริสต์มาส\nแล้วหรือยังคะคุณครู?"
20024-330 = "คือว่าถ้าคุณครูยังไม่ได้ทาน...\nฉันเตรียม 'คริสต์มาส พุดดิ้ง' ไว้\nมาทานด้วยกันมั้ยคะ?"
20024-340 = "นี่เป็นชาฟักทองที่วางขาย\nเฉพาะวันฮาโลวีน\nที่คุณมิกะให้ฉันมาค่ะ..."
20024-350 = "แต่ว่ารสชาติมัน...\nแปลกๆ นิดหน่อยค่ะ"
20024-360 = "หืม? นี่ไม่ใช่ชาฟักทอง...\nแต่เป็นครีมซุปฟักทองเหรอคะ...?"
20024-370 = "คุณมิกะ!!"
20024-390 = "ฮุฮุ... กลิ่นหอมอ่อนๆ\nของมะกรูด หอมสดชื่น...\nดีจังเลยนะคะ"
20024-400 = "(นี่มัน... กลิ่นสาหร่าย\nกลิ่นนี้มัน\nหลอกกันไม่ได้เลยค่ะ...)"
20024-410 = "แถมรสชาติหอมสดชื่น\nที่ติดลิ้นหลังจากดื่ม...\nก็เข้ากับของว่างมากเลยด้วย..."
20024-420 = "(รสสาหร่ายแรงมาก...\nจนตีกับรสชาติของขนม\nที่ทานเข้าไปเลย...)"
20024-430 = "คุณครูเองก็เพิ่งเคยชิม\nรสชาติแบบนี้เหมือนกันเหรอคะ?"
20024-440 = "ก็... น่าจะใช่แหละค่ะ...\nมันคือใบชาที่หาซื้อ\nยากอยู่เหมือนกันนี่คะ ฮุฮุฮุ..."
20024-450 = "(...คงไม่ได้ถูกจับได้ใช่มั้ยนะ?\nถึงกลิ่นจะไม่ค่อยหอมเท่าไร\nแต่สีชาก็ไม่ได้แย่ขนาดนั้นนี่เนอะ...)"
20024-460 = "(ถ้ารู้ว่าจะเป็นแบบนี้ ฉันไม่เล่นใหญ่\nแล้วสั่งชาแดงธรรมดาๆ...\nมาตั้งแต่แรกก็ดี...)"
20024-2600 = "ฉันชอบใช้ปืนพกขนาดเล็กนี้มาก\nเพราะมันไม่เป็นอุปสรรคเวลาชงชาค่ะ\nแต่อาจไม่ค่อยมีประโยชน์สำหรับใช้\nป้องกันตัวสักเท่าไร หากเกิดอะไรขึ้น...\nต้องขอรบกวนด้วยนะคะ คุณครู"

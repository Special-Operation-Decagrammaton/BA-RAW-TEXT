[translation]
20024-10 = "Blue, Archive."
20024-20 = "How are you? I'm Kirifuji Nagisa, host of the Tea Party at Trinity General School. I'll do my best to assist you."
20024-30 = "Heehee. How are you?"
20024-40 = "The aroma of coffee...is nice from time to time."
20024-50 = "(This place is full of students. I shouldn't let my guard down...)"
20024-60 = "Oh, those treats look so pretty."
20024-70 = "(The chairs here look quite comfortable.)"
20024-80 = "How have you been, Sensei?"
20024-90 = "I was preparing tea while waiting for you."
20024-100 = "Welcome, Sensei."
20024-110 = "If you'd like, how about a cup of black tea before work?"
20024-120 = "Heehee. The weather is nice today as well."
20024-130 = "How about we take a stroll after work?"
20024-140 = "Huh? Where did the cup warmer go...?"
20024-150 = "Oh...!"
20024-160 = "I'm so focused on the task that I keep forgetting this is the Schale office..."
20024-170 = "Excuse me."
20024-180 = "There aren't eyes everywhere in the Schale office like there are in the Tea Party office. I feel more comfortable here."
20024-190 = "So as to be a role model to Trinity students, I have to be aware of my surroundings."
20024-200 = "(For some reason...I feel calm...and my eyelids keep closing...)"
20024-210 = "Tea Party tasks are usually desk jobs, so a quality chair is very important."
20024-220 = "Why don't you get a new chair for your Schale office?"
20024-230 = "Happy birthday, Sensei."
20024-240 = "I've prepared special tea leaves."
20024-250 = "Please come to the Trinity terrace when you're done."
20024-260 = "A birthday...gift?"
20024-270 = "Hmm, I don't really want anything specific, but..."
20024-280 = "If I could spend a day with you, that would be the best gift I could think of."
20024-290 = "I wish you all the best for the New Year."
20024-300 = "I'll be counting on you for your guidance again this year."
20024-310 = "...This year is almost over."
20024-320 = "Did you eat any Christmas cake, Sensei?"
20024-330 = "If you haven't yet, I prepared some Christmas pudding. Why don't you join me?"
20024-340 = "This is the limited edition Halloween pumpkin tea I got from Mika, but..."
20024-350 = "it tastes a bit strange..."
20024-360 = "...Huh? It's not pumpkin tea, but pumpkin soup paste...?"
20024-370 = "Mi—ka!"
20024-390 = "Heehee...the subtle scent of bergamot is so refreshing."
20024-400 = "(This is definitely kelp... The smell is unmistakable...)"
20024-410 = "And its unique, crisp aftertaste goes well with snacks..."
20024-420 = "(The kelp is too strong...and tastes are colliding in my mouth...)"
20024-430 = "Sensei, is it your first time tasting something like this?"
20024-440 = "I-I see... This kind of tea isn't easy to come by. Hee...heehee..."
20024-450 = "(You haven't discovered my little deception, have you? The smell may be...significantly off, but at least the color is right...)"
20024-460 = "(If I knew this would happen, I would've just ordered my normal black tea.)"
20024-2600 = "I've been carrying this pistol because it's small and doesn't interfere when I'm making tea, but I'm not sure how good it is for self-protection. If something happens...I'll be counting on you, Sensei."

[translation]
20024-10 = "블루, 아카이브."
20024-20 = "평안하신가요. 트리니티 종합학원, 티파티의\n호스트를 맡고 있는 키리후지 나기사라고 합니다.\n미력하지만 선생님께 도움이 되도록 노력하겠습니다."
20024-30 = "후훗.\n평안하신지요?"
20024-40 = "커피의 향도…\n가끔은 나쁘지\n않네요."
20024-50 = "(이곳은 많은 학생들이\n모이는 장소. 더욱 정신을\n바짝 차리지 않으면……)"
20024-60 = "어머나.\n예쁜 모양의\n다과로군요."
20024-70 = "(이곳의 의자는\n꽤 푹신해보이는군요.)"
20024-80 = "평안하신지요,\n선생님."
20024-90 = "조금 늦어지시는 것 같아,\n미리 차를 준비하고\n있었답니다."
20024-100 = "어서 오세요, 선생님."
20024-110 = "괜찮으시다면\n업무를 시작하시기 전에\n홍차 한 잔, 어떠신가요?"
20024-120 = "후후.\n오늘도 날씨가 좋네요."
20024-130 = "일과가 끝난 뒤에\n산책이라도 어떠신가요?"
20024-140 = "어라? 잔을 덥힐 때 쓰는\n제 전용 워머가 어디에……"
20024-150 = "아……"
20024-160 = "업무에 집중하다보니 자꾸\n이곳이 샬레의 집무실이라는\n사실을 잊게 되네요……"
20024-170 = "실례했습니다."
20024-180 = "샬레의 사무실은 티파티와\n달리 보는 눈이 적어 조금\n안심이 되네요."
20024-190 = "트리니티의 학생들에게 모범이\n되기 위해서는 언제나 남의 눈을\n의식하는 것이 중요합니다."
20024-200 = "(뭔가……\n마음이 진정되어서 그런가,\n졸음이 오는 것 같네요……)"
20024-210 = "티파티의 업무는 탁상 작업이\n많다 보니, 의자를 고르는 일은\n중요합니다."
20024-220 = "선생님도 샬레에 새 의자를\n들여보시는 건 어떠신가요?"
20024-230 = "생신 축하드립니다,\n선생님."
20024-240 = "특별한 찻잎을\n준비했으니,"
20024-250 = "업무를 마치시면\n트리니티의 테라스로\n와 주세요."
20024-260 = "생일 선물……\n말씀이신가요?"
20024-270 = "음, 특별히 뭔가 갖고\n싶은 물건은 없습니다만……"
20024-280 = "선생님과 하루를 함께\n보낼 수 있다면, 이 이상의\n선물은 없겠지요."
20024-290 = "신년의 기쁨을\n담아 인사드립니다."
20024-300 = "올 한 해도 변함없는 지도편달,\n부탁드리겠습니다."
20024-310 = "……올 한 해도 거의\n끝나가는군요."
20024-320 = "선생님,\n크리스마스 케이크는 드셨나요?"
20024-330 = "혹시, 아직이시라면\n'크리스마스 푸딩'을\n준비했는데. 함께 어떠신지요?"
20024-340 = "이건 미카 씨로부터 받은\n할로윈 한정 호박차입니다만……"
20024-350 = "맛이 조금\n이상하네요……"
20024-360 = "……응? 호박차가 아니라…\n호박 스프 페이스트……?"
20024-370 = "미—카—씨—!"
20024-390 = "후후… 은은하게 풍기는\n베르가모트의 풍미가\n상쾌하니 좋네요."
20024-400 = "(이건, 역시 다시마……\n속일 수 없는 향기가\n나고 있어요….)"
20024-410 = "특유의 산뜻한\n뒷맛이 다과와\n정말 잘 어울려서…."
20024-420 = "(다시마의 맛이 너무\n강해서…… 입 안에서 과자의\n맛과 충돌하고 있어…….)"
20024-430 = "선생님께서도\n이런 맛은 처음이신가요?"
20024-440 = "그, 그렇겠지요…\n쉽게 구할 수 없는 종류의\n찻잎이기도 하고… 후,후후…."
20024-450 = "(……들킨 건 아니겠지요?\n향기는 좀 그렇지만,\n색만큼은 그럴싸하니까……)"
20024-460 = "(이럴 줄 알았으면 무리하지\n말고 평범한 홍차를\n시킬 걸 그랬어요…….)"
20024-2600 = "이 권총은 크기가 작아, 차를 우리는 데 방해가\n되지 않기 때문에 애용해 왔습니다만.\n호신의 목적으로는 그다지 도움이 되지\n않을지도 모르겠네요. 만약의 경우에는……\n잘 부탁드리겠습니다, 선생님."

[translation]
20024-10 = "蔚藍，檔案。"
20024-20 = "貴安。我是三一綜合學園，\n擔任茶會主席的桐藤渚。\n儘管只是微薄之力，但我會盡力幫上老師的忙。"
20024-30 = "呵呵。\n貴安。"
20024-40 = "咖啡的香氣…\n偶爾這樣也不錯呢。"
20024-50 = "（這裡是許多學生\n聚集的地方，得更加\n繃緊神經才行……）"
20024-60 = "哎呀，真是\n可愛的茶點呢。"
20024-70 = "（這裡的椅子\n似乎相當柔軟呢）"
20024-80 = "貴安，老師。"
20024-90 = "您似乎晚到了一些，\n我已經泡好茶\n等著您了。"
20024-100 = "歡迎回來，老師。"
20024-110 = "不介意的話，\n在開始工作之前\n要不要來杯紅茶呢？"
20024-120 = "呵呵。\n今天也是好天氣呢。"
20024-130 = "每日的工作結束後\n要不要去散步呢？"
20024-140 = "咦？用來加熱茶具的\n加熱器，放到哪去了……"
20024-150 = "啊……"
20024-160 = "一專注於工作，\n就不小心忘記這裡是\n夏萊的辦公室了……"
20024-170 = "失禮了。"
20024-180 = "夏萊的辦公室和茶會不同，\n他人的目光很少，\n能讓人放心呢。"
20024-190 = "為了成為三一學生的模範，\n時時注意他人的目光\n是很重要的。"
20024-200 = "（總覺得……\n　是因為很安心嗎，\n　變得有點睏……）"
20024-210 = "茶會的工作\n很多都是桌上作業，\n所以挑選椅子是很重要的。"
20024-220 = "老師願意的話，\n要不要幫夏萊\n買張新的椅子呢？"
20024-230 = "生日快樂，老師。"
20024-240 = "我準備了\n特別的茶葉。"
20024-250 = "工作結束後，\n請來三一的露臺\n一趟吧。"
20024-260 = "生日禮物……是嗎？"
20024-270 = "那個，\n雖然沒有什麼\n特別想要的禮物……"
20024-280 = "如果能和老師\n共度一天，\n就是最好的禮物了。"
20024-290 = "新年快樂。"
20024-300 = "今年依然\n請您不吝指教。"
20024-310 = "……今年也\n快結束了呢。"
20024-320 = "老師，您吃過\n聖誕節蛋糕了嗎？"
20024-330 = "如果還沒的話，\n我準備了「聖誕布丁」，\n要不要一起享用呢？"
20024-340 = "這是從彌香同學那裡收到的\n萬聖節限定南瓜茶……"
20024-350 = "不過味道有點微妙……"
20024-360 = "……咦？\n不是南瓜茶……\n而是南瓜濃湯……？"
20024-370 = "彌─香─同─學─！"
20024-390 = "呵呵……隱約散發出\n佛手柑的風味，\n相當清爽，真不錯呢。"
20024-400 = "（……這個，果然是昆布……\n　散發著一股難以\n　蒙混過去的味道呢……）"
20024-410 = "這股清新的餘韻，\n非常適合搭配茶點呢……"
20024-420 = "（昆布的湯汁過於濃烈，\n　正在嘴裡和點心的味道\n　互相衝突……）"
20024-430 = "……？老師也是\n第一次品嚐到這種味道嗎？"
20024-440 = "也，也對……\n畢竟是不太容易取得的\n茶葉……呵，呵呵……"
20024-450 = "（……應該沒穿幫吧？\n　雖然味道有點那個，\n　顏色倒還挺像的……）"
20024-460 = "（早知道會這樣的話\n　就不該逞強，買普通的\n　紅茶就好了……）"
20024-2600 = "因為這把手槍很小，在泡茶時\n不會造成妨礙，所以我一直都很喜歡。\n不過，它或許不太適合用來護身。\n若是有什麼萬一……\n就麻煩您了哦，老師。"

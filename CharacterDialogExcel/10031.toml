[translation]
10031-10 = "Blue~Archive"
10031-20 = "哼哼，今年也想委託我？\n真是沒辦法呢，老師這個人。\n我的活躍，今年也在身邊見證吧。"
10031-30 = "唔……才剛新年，\n錢包就好輕……"
10031-40 = "作為領導人重要的東西，\n那就是從容唷。"
10031-50 = "咦，社長一般，\n必須給社員紅包才行嗎！？"
10031-60 = "高價的和服，\n會讓人緊張呢……\n得小心走路才行……"
10031-70 = "累了呢……\n話說回來，\n我家的社員在哪？"
10031-80 = "歡迎你回來，老師。\n好了，要開始今天的行程了唷。"
10031-90 = "等你很久了唷。\n來吧，讓我來引導老師。"
10031-100 = "今年也要和我們簽約呢，\n真是明智的判斷♪"
10031-110 = "頭髮，捲得這麼高會不會重？"
10031-120 = "並不會，真要說的話，\n設計髮型的價錢非常高呢……"
10031-130 = "咦？\n什，什麼都沒有啦……！"
10031-140 = "這件和服，很漂亮吧？\n很美吧？"
10031-150 = "我比較美……？"
10031-160 = "不，不用說場面話！"
10031-170 = "哼哼哼，要是小看我們\n便利屋準備周到的程度，\n我會很困擾的。"
10031-180 = "咦，什，什麼意思……？"
10031-190 = "就是，生，生日快樂，的意思！"
10031-200 = "哼哼，今天是特別\n的日子唷，老師。"
10031-210 = "咦，你知道？"
10031-220 = "啊……這個，\n那個，謝，謝謝……"
10031-230 = "新年快樂，老師。"
10031-240 = "今年會是比去年，更加\n特別的一年唷，哼哼。"
10031-250 = "聖誕快樂～！\n為什麼這麼興奮？"
10031-260 = "因為，\n距離新年還差一點呀♪"
10031-270 = "……Trick．or．Treat？"
10031-280 = "在那邊坐下吧，老師。"
10031-290 = "因為我要告訴你\n與萬聖節相比，\n新年更勝一籌的理由。"
10031-310 = "呵呵，走得太慢了唷，老師。\n咦？是我太快了？\n才沒有那種事呢。"
10031-320 = "不過，為了無論什麼時候\n都不會耽誤到重要的事，\n平時就有在留意就是了，\n畢竟我是社長。"
10031-330 = "早起的鳥兒有蟲吃……"
10031-340 = "今年的便利屋\n會比去年更敏銳、\n更積極地展開活動哦。"
10031-350 = "當然，老師也要一起。"
10031-360 = "我們便利屋的活動，\n已經少不了\n老師這位合夥人了。"
10031-370 = "像這樣一起工作的時間，\n今後也能\n一直持續下去就好了呢。"
10031-380 = "……啊，只是在說工作！\n是指工作上的事！"
10031-390 = "（不，不行，我現在\n　在說什麼，連我自己\n　都搞不清楚了……！）"
10031-2600 = "這就是所謂的，如虎添翼呢。\n……沒說錯吧？"

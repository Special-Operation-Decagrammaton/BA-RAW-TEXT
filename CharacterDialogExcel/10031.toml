[translation]
10031-10 = "블루 아카~이브"
10031-20 = "후훗, 올해도 나에게 의뢰하고 싶다고?\n정말 어쩔 수 없네, 선생님은.\n내 활약, 올해도 바로 곁에서 지켜보도록 해."
10031-30 = "읏… 새해 벽두부터,\n쪼들리겠는데…."
10031-40 = "리더에게 있어\n중요한 것,\n그건 여유야."
10031-50 = "엇, 사장은 보통,\n직원들에게 세뱃돈도\n줘야 하는 거야?!"
10031-60 = "비싼 기모노라,\n긴장되네….\n조심해서 움직이지\n않으면…."
10031-70 = "지쳤어…… 그런데,\n우리 직원들은\n어디 간 거야?"
10031-80 = "어서 와, 선생님.\n자, 오늘 스케쥴을\n시작하자고."
10031-90 = "기다리고 있었어.\n자, 내가 선생님을\n에스코트 해줄게."
10031-100 = "올해도 우리와 계약을 한 거네,\n탁월한 선택이야♪"
10031-110 = "뒷머리, 이렇게나\n높게 묶어서 힘들지 않냐고?"
10031-120 = "딱히? 굳이 이야기하자면,\n지갑이 힘들어하기는 했는데…"
10031-130 = "응?\n아, 아무것도 아냐…!"
10031-140 = "이 기모노, 이쁘지?\n아름답지?"
10031-150 = "내 쪽이, 더 이쁘다고……?"
10031-160 = "이, 입에 발린 말, 하지 마!"
10031-170 = "후후후, 우리 흥신소의\n준비성을 얕보면 곤란해."
10031-180 = "어, 무, 무슨 뜻이냐고……?"
10031-190 = "그, 새, 생일 축하한단\n이야기야."
10031-200 = "후후, 오늘은\n특별한 날이야. 선생님."
10031-210 = "어?\n이미 알고 있었다고?"
10031-220 = "아…. 그게,\n그, 고, 고, 고마워……."
10031-230 = "새해 복 많이 받아. 선생님."
10031-240 = "올해는 작년보다,\n더 특별한 한 해가\n될 거야. 후후."
10031-250 = "메리 크리스마스~\n왜 이렇게 들떴냐고?"
10031-260 = "그야 새해가 얼마 안 남았잖아?"
10031-270 = "……트릭 오어 트릿?"
10031-280 = "거기 앉아, 선생님."
10031-290 = "할로윈보다 설날이 더 나은\n이유를 알려줄 테니까."
10031-310 = "후후, 걷는 게 느리잖아.\n선생님. 응? 내가 빠르다고?\n그런 게 아니야."
10031-320 = "뭐, 언제 어디서나 약속에\n늦지 않으려고 평소부터\n신경 쓰고 있을 뿐이니까.\n사장으로서."
10031-330 = "일찍 일어난 새가\n벌레를 잡는다……."
10031-340 = "올해 흥신소는,\n작년 이상으로 기민하게,\n적극적으로 움직일 거야."
10031-350 = "물론, 선생님도 함께야."
10031-360 = "우리 흥신소의 활동은,\n이제 동업자인 선생님 없이\n한다는 건 말이 되지 않으니까."
10031-370 = "그렇게 함께 일하는 시간이,\n앞으로도 쭉, 계속\n이어졌으면 좋겠네."
10031-380 = "……어, 어디까지나 업무!\n업무 쪽의 이야기니까!"
10031-390 = "(아, 안돼, 지금, 내가\n무슨 말을 하고 있는 건지,\n스스로도 잘 모르겠어……!)"
10031-2600 = "이게 바로, 호랑이 등에 날개, 란 거네.\n…맞지?"

[translation]
10031-10 = "Blue Archive"
10031-20 = "ฮุฮุฮุ ปีนี้ก็จะเรียกใช้ฉันด้วยเหรอ?\nช่วยไม่ได้นะ ปีนี้ก็คอยอยู่ข้างๆ ฉัน\nแล้วก็คอยดูสิ่งที่ฉันจะทำให้ดีล่ะ"
10031-30 = "ปีใหม่นี้ธุรกิจคงไปได้สวยแน่ๆ"
10031-40 = "ต้องรักษาภาพลักษณ์\nของผู้นำเอาไว้ให้ดี"
10031-50 = "ถ้าเป็นหัวหน้า\nต้องให้เงินปีใหม่\nกับลูกน้องด้วยงั้นเหรอ?!"
10031-60 = "ชุดกิโมโนที่ยืมมาแพงมาก\nเพราะงั้นตอนขยับต้องระวังมากๆ"
10031-70 = "เหนื่อยจังเลย...\nว่าแต่คนอื่นๆ หายไปไหนกันนะ?"
10031-80 = "เชิญเลย คุณครู\nงั้นก็มาเริ่มงานของวันนี้กันเถอะ"
10031-90 = "กำลังรออยู่เลยละ\nเอาละ คุณครู \nฉันจะคอยคุ้มครองคุณครูเอง"
10031-100 = "คุณครู ปีนี้เซ็นสัญญากับเรา\nเป็นตัวเลือกที่ถูกต้องแล้วละ♪"
10031-110 = "มัดผมเป็นมวยสูงแบบนี้\nลำบากรึเปล่าน่ะเหรอ?"
10031-120 = "ไม่นะ ถ้าจะพูดให้ถูกก็คือ...\nลำบากเงินในกระเป๋ามากกว่า"
10031-130 = "หืม? มะ...ไม่มีอะไรหรอก!"
10031-140 = "กิโมโนชุดนี้สวยใช่มั้ย?\nคุณครูก็คิดว่าสวยมากเลยใช่มั้ย?"
10031-150 = "ฉันสวยกว่าอีกงั้นเหรอ...?"
10031-160 = "อย่าพูดอะไรเลี่ยนๆ แบบนั้นสิ!"
10031-170 = "ฮุฮุฮุ อย่าประเมินการเตรียมพร้อม\nของหน่วยรับจ้างสารพัดเราต่ำเกินไปสิ"
10031-180 = "อืม... หมายความว่ายังไงเหรอ...?"
10031-190 = "ก็... สุขสันต์วันเกิดนะ"
10031-200 = "ฮุฮุ วันนี้เป็นวันพิเศษนะ คุณครู"
10031-210 = "เอ๊ะ? รู้แล้วงั้นเหรอ?"
10031-220 = "ขะ...ขอบคุณนะ"
10031-230 = "ขอให้มีความสุขในปีใหม่นะ คุณครู"
10031-240 = "ปีนี้จะต้องเป็นปีที่พิเศษมากๆ\nกว่าปีที่แล้วอย่างแน่นอน ฮุฮุ"
10031-250 = "เมอร์รีคริสต์มาส~\nทำไมฉันถึงตื่นเต้นน่ะเหรอ?"
10031-260 = "ก็มันใกล้ถึงปีใหม่แล้วนี่นา?"
10031-270 = "ทริก ออร์ ทรีต...?"
10031-280 = "นั่งสิ คุณครู"
10031-290 = "ฉันจะบอกให้ฟังเอง\nว่าทำไมวันปีใหม่ถึง\nเป็นวันที่ดีกว่าวันฮาโลวีน"
10031-310 = "ฮุฮุ คุณครูเดินช้าไปแล้วนะ\nหืม? ฉันเดินเร็วงั้นเหรอ?\nเปล่าสักหน่อย"
10031-320 = "ฉันก็แค่พยายามใส่ใจมากขึ้น\nเพื่อจะได้ไม่สายเท่านั้นเอง\nก็ฉันเป็นหัวหน้านี่นา"
10031-330 = "นกที่ตื่นเช้า มักจับหนอน\nได้ก่อนเสมอนะ"
10031-340 = "ปีนี้หน่วยรับจ้างสารพัดของเรา\nจะต้องรุ่งเรืองมากกว่าปีที่แล้ว\nเป็นเท่าตัวเลย"
10031-350 = "แน่นอน... ว่าต้องมี\nคุณครูร่วมด้วยไงล่ะ"
10031-360 = "ตอนนี้คุณครูเป็นหุ้นส่วน\nในธุรกิจของเราเพราะงั้น\nจะขาดคุณครูไปไม่ได้สิ"
10031-370 = "การได้ใช้เวลาร่วมกับคุณครู\nถ้าเป็นแบบนี้ต่อไปก็คงดีนะ"
10031-380 = "คิดไปถึงไหนกันน่ะ\nฉันพูดถึงเรื่องงานต่างหาก"
10031-390 = "(เดี๋ยวสิ ฉันพูดอะไรอยู่เนี่ย)"
10031-2600 = "นี่สินะที่เรียกว่า \"เสือติดปีก\"\nใช่รึเปล่านะ?"

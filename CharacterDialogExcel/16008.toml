[translation]
16008-10 = "Blue...Archive."
16008-20 = "Huh? Me? I think you've got the wrong girl. What do you want from a lazy Public Safety Bureau member like me?"
16008-30 = "The sofa here isn't too shabby."
16008-40 = "I want to put one in the Public Safety Bureau office."
16008-50 = "I want to actively do absolutely nothing..."
16008-60 = "Ah... I feel like I hear an ominous siren somewhere..."
16008-70 = "I hope the higher-ups won't come all the way here."
16008-80 = "Hey, Sensei. You're here."
16008-90 = "Good job, Sensei."
16008-100 = "Actually, I wasn't doing anything."
16008-110 = "*yawn* So sleepy."
16008-120 = "I don't know why Kirino goes to such lengths."
16008-130 = "If the police are idle, that means the city is at peace..."
16008-140 = "That's why, for a peaceful city, the police should be lazy!"
16008-150 = "Old-fashioned donuts. The name is corny..."
16008-160 = "...but the taste is undefeated."
16008-170 = "A donut without a hole isn't a donut..."
16008-180 = "It's just fried dough!"
16008-190 = "Huh? It's your birthday today?"
16008-200 = "I didn't get you a gift or anything..."
16008-210 = "I have no other option. I'll look the other way if you commit a crime, but just for today, Sensei."
16008-220 = "Isn't it unfair how we have to go to school or work on our birthdays?"
16008-230 = "I wanted to rest and do nothing today..."
16008-240 = "I packed something special for lunch today."
16008-250 = "The New Year's osechi lunch box? No, it's a box of donuts from Master Donuts."
16008-260 = "I don't really like Christmas..."
16008-270 = "...but the bargain-priced cakes after the holidays are always welcome!"
16008-280 = "There are fools in monster masks running rampant around the city?"
16008-290 = "Here. I wrote down the Security Bureau's number. Call them."
16008-310 = "Ah... This is heaven."
16008-320 = "Sitting on the warm hood of a car with some donuts and coffee."
16008-330 = "Nothing beats a good stakeout!"
16008-340 = "Ah, Sensei. You have to be careful."
16008-350 = "Don't let your guard down. The suspect could pass by at any moment."
16008-360 = "(*nom* Mmm mmm.)"
16008-370 = "What goes better with iced coffee than a good old-fashioned donut? Heehee."
16008-380 = "Hmm? What's the matter, Sensei? Do you want a donut?"
16008-2600 = "Valkyrie Police School's standard issue firearms are sturdy and easy to maintain, but their accuracy isn't the greatest..."

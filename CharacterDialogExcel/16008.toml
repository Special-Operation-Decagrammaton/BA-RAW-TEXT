[translation]
16008-10 = "Blue Archive"
16008-20 = "เอ๋ ฉันเหรอ? มาหาผิดคนรึเปล่า?\nมีธุระอะไรกับจอมขี้เกียจ\nแห่งสำนักรักษาความปลอดภัยกัน...?"
16008-30 = "โซฟาตัวนี้ก็ไม่เลวเลยนะ?"
16008-40 = "อยากได้โซฟาแบบนี้ไปไว้\nที่สำนักรักษาความปลอดภัย\nสักตัวจังเลยน้า"
16008-50 = "ยิ่งรู้สึกไม่อยากทำอะไร\nสักอย่างเลย..."
16008-60 = "อ๊ะ เหมือนได้ยินเสียง\nไซเรนจากที่ไหนสักแห่ง..."
16008-70 = "หวังว่าพวกเบื้องบน\nคงไม่มาที่นี่กันหรอกนะ...?"
16008-80 = "อ๊ะ คุณครู มาแล้วเหรอ?"
16008-90 = "เหนื่อยหน่อยนะ คุณครู"
16008-100 = "ถึงที่จริงแล้วฉันจะไม่ได้\nทำอะไรอยู่ก็เถอะ"
16008-110 = "ฮ้าวว...\nง่วงจังเลย..."
16008-120 = "ทำไมคิริโนะ ถึงคิดจะใช้ชีวิต\nที่ลำบากแบบนั้นกันนะ..."
16008-130 = "การที่ตำรวจว่างงานหมายถึง\nบ้านเมืองสงบสุขไงล่ะ..."
16008-140 = "เพราะงั้นแล้ว เพื่อความสงบสุข\nของบ้านเมือง ตำรวจอย่างฉัน\nจะต้องทำตัวขี้เกียจเข้าไว้!"
16008-150 = "โอลด์ แฟชั่น...\nถึงชื่อฟังดูเชยไปสักหน่อย"
16008-160 = "แต่ว่ารสชาติของมัน\nไม่ได้เชยเหมือนชื่อหรอกนะ"
16008-170 = "โดนัทที่ไม่มีรูตรงกลาง\nไม่ใช่โดนัทหรอก..."
16008-180 = "มันก็แค่แป้งทอดไม่ใช่รึไง...?"
16008-190 = "เอ๊ะ? วันนี้...\nเป็นวันเกิดคุณครูเหรอ?"
16008-200 = "ฉันไม่ได้เตรียมของขวัญ\nไว้ให้คุณครูเลย..."
16008-210 = "ช่วยไม่ได้นะ...\nถ้าวันนี้คุณครูก่ออาชญากรรม\nฉันจะทำเป็นไม่เห็นไปก็แล้วกัน"
16008-220 = "ต้องไปโรงเรียนหรือ\nไปทำงานในวันเกิด\nมันไม่แปลกเกินไปหน่อยรึไง?"
16008-230 = "วันนี้ฉันอยากนอนพักสบายๆ\nแบบไม่ต้องทำอะไรเลย..."
16008-240 = "มื้อกลางของวันวันนี้...\nฉันซื้อข้าวกล่องชุดพิเศษมา"
16008-250 = "ชุดโอเซจิปีใหม่รึเปล่าน่ะเหรอ?\nไม่ใช่หรอก ชุดบ็อกเซ็ตของ\n<มาสเตอร์โดนัท> ต่างหาก"
16008-260 = "ฉันไม่ได้ชอบเทศกาล\nคริสมาสต์ขนาดนั้นหรอกนะ..."
16008-270 = "แต่สำหรับเค้กลดราคาพิเศษ\nหลังจากจบงานเทศกาลน่ะ\nฉันพร้อมกินตลอดเลยนะ!"
16008-280 = "ที่ในเมืองมีคนแปลกๆ\nใส่หน้ากากสัตว์ประหลาด\nวิ่งไปมาเต็มไปหมดเลย"
16008-290 = "เอ้า... ฉันเขียนเบอร์โทร\nสำนักความมั่นคงให้แล้ว\nโทรไปที่นั่นก็แล้วกัน"
16008-310 = "เฮ้อ~ เหมือนอยู่บนสวรรค์เลย"
16008-320 = "ได้นั่งบนฝากระโปรงรถ\nรับแดดอุ่นๆ แล้วก็ดื่มด่ำ\nกับกาแฟและโดนัทแบบนี้..."
16008-330 = "อา... งานเฝ้าจับคนร้ายนี่\nดีสุดๆ เลย!"
16008-340 = "อ๊ะ คุณครูต้องคอย\nเฝ้าดูรอบๆ ให้ดีนะ"
16008-350 = "พวกคนร้ายอาจจะโผล่มา\nตอนที่กินโดนัทอยู่ก็ได้"
16008-360 = "(ง่ำๆ ง่ำ ง่ำ...)"
16008-370 = "ว่าแล้วเชียวโดนัทที่\nเหมาะกับการดื่มกาแฟ\nต้องโอลด์ แฟชั่น..."
16008-380 = "หืม? มีอะไรเหรอ คุณครู?\nจะกินโดนัทสักชิ้นไหมล่ะ?"
16008-2600 = "ปืนของสถาบันฝึกตำรวจวัลคิรี่\nแข็งแรงทนทานแล้วก็ดูแลง่าย\nแต่เรื่องความแม่นยำไม่ค่อยดีเท่าไร"

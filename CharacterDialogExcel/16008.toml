[translation]
16008-10 = "블루…… 아카이브."
16008-20 = "에, 나? 사람 잘못 찾은 거 아냐?\n나 같은 게으름뱅이에게,\n무슨 볼일이 있다는 거야……"
16008-30 = "오, 이 소파는\n제법 나쁘지 않은데?"
16008-40 = "이건 생활안전국\n사무실에도 하나\n들여놓고 싶네."
16008-50 = "더 적극적으로\n아무것도\n안 하고 싶다…"
16008-60 = "아…… 뭔가, 사이렌\n소리가 들리는 것\n같은 기분이……"
16008-70 = "……설마 높으신 분들이\n여기까지 찾아오지는\n않겠지?"
16008-80 = "아, 선생. 왔어?"
16008-90 = "수고했어, 선생."
16008-100 = "뭐, 난 아무 것도\n안 하고 있지만."
16008-110 = "하암……\n졸려……"
16008-120 = "어째서 키리노는 그렇게\n사서 고생을 하려는 걸까……"
16008-130 = "경찰이 한가하다는 건\n도시가 평화롭다는 뜻……"
16008-140 = "즉, 반대로 생각하면,\n평화를 위해서라면\n게으른 편이 좋은 거야!"
16008-150 = "올드 패션드……\n이름은 미묘하지만,"
16008-160 = "맛은 최고란 말이지."
16008-170 = "구멍이 없는 도넛은\n도넛이 아니라……"
16008-180 = "그냥, 튀긴 빵 아냐……?"
16008-190 = "……응? 오늘이\n선생의 생일이야?"
16008-200 = "아…… 선물이라든가 아무것도\n준비하지 못했는데……"
16008-210 = "……하는 수 없지.\n오늘은 선생이 범죄를 저질러도\n특별히 못 본 척해줄게."
16008-220 = "생일에도 학교나 회사에\n나가야 하는 거, 이상하지 않아?"
16008-230 = "축하해주고 싶다면,\n오늘 정도는 쉬게 해 달라구……"
16008-240 = "오늘 점심에는\n특별한 도시락을 싸왔어."
16008-250 = "새해의 오세치 도시락이냐고?\n아니, <마스터 도너츠>의\n박스 세트인데?"
16008-260 = "크리스마스 자체는\n그다지 좋아하지 않지만……"
16008-270 = "연휴가 끝난 뒤의\n특가 케이크만큼은\n언제나 환영이지!"
16008-280 = "시내에 괴물 탈을\n뒤집어쓴 바보들이\n날뛰고 있다고?"
16008-290 = "아…… 알았어,\n여기. 전화 걸면\n경비국으로 연결되니까,\n그 쪽에 부탁해."
16008-310 = "하아……\n이거야말로 천국……"
16008-320 = "따뜻한 보닛 위에서,\n도넛에 커피까지……"
16008-330 = "이야, 잠복근무는 최고야!"
16008-340 = "아, 선생.\n주변을 잘 지켜봐야 해."
16008-350 = "이러고 있는 사이에,\n범인이 지나갈 지도\n모르니까 말이지."
16008-360 = "(냠. 우물우물……)"
16008-370 = "역시 커피와 함께 먹는다면,\n올드 패션드가 최고네…… 후훗."
16008-380 = "응? 왜 그래, 선생?\n도넛, 먹고 싶어?"
16008-2600 = "발키리 경찰 학교의 제식 총기는\n튼튼해서 좋은 느낌이란 말이지.\n뭐, 명중률은 별로긴 하지만……"

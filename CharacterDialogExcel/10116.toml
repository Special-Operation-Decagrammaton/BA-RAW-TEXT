[translation]
10116-10 = "蔚，蔚藍檔案。"
10116-20 = "我是奧利斯小隊的沙織……\n這個，是為了任務而穿的。\n……是真的。"
10116-30 = "似乎很適合用於\n潛入作戰的練習啊。"
10116-40 = "總有一天，要讓\n那些孩子們也……\n穿上禮服。"
10116-50 = "有在任務之外的場合\n穿上這個的機會嗎……"
10116-60 = "能感受到視線……\n莫非，我很顯眼嗎？"
10116-70 = "便利屋68……果然\n不是泛泛之輩啊……"
10116-80 = "歡迎回來，老師……\n我正在等你。"
10116-90 = "……用這副打扮迎接，\n讓人有點害羞啊。"
10116-100 = "是服裝的影響嗎？\n似乎能做到比平時\n更加大膽的舉動。"
10116-110 = "不管什麼任務都會執行。"
10116-120 = "聽說這樣的禮服，\n是在特別的日子穿的。"
10116-130 = "雖然我之前\n並不知道這件事……"
10116-140 = "我沒有別的意思。\n只是……覺得\n既然都換上了，\n就想讓你看看。"
10116-150 = "……穿上這件衣服的時候，\n可以再去見你嗎？"
10116-160 = "……因為光是那樣，\n就會成為特別的一天了。"
10116-170 = "為了今天，我練習了舞步。\n要一起來跳支舞嗎？"
10116-180 = "我誕生的日子，\n並不存在什麼意義……\n……以前我是這麼想的。"
10116-190 = "不過，現在已經不一樣了……\n這也是多虧了老師啊。"
10116-200 = "已經去參拜過了嗎？\n我剛才也去過了。"
10116-210 = "至於許了什麼願望……是祕密。"
10116-220 = "聖夜，似乎要跟\n重要的人一起度過。"
10116-230 = "……我沒有別的意思。"
10116-240 = "以萬聖節的變裝來說\n好像不太適合……\n再戴點東西比較好嗎？"
10116-250 = "歡迎回來，老師……\n我正在等你。"
10116-260 = "……用這副打扮迎接，\n讓人有點害羞啊。"
10116-270 = "是服裝的影響嗎？\n似乎能做到比平時\n更加大膽的舉動。"
10116-280 = "不管什麼任務都會執行。"
10116-290 = "聽說這樣的禮服，\n是在特別的日子穿的。"
10116-300 = "雖然我之前\n並不知道這件事……"
10116-310 = "我沒有別的意思。\n只是……覺得\n既然都換上了，\n就想讓你看看。"
10116-320 = "……穿上這件衣服的時候，\n可以再去見你嗎？"
10116-330 = "……因為光是那樣，\n就會成為特別的一天了。"
10116-340 = "為了今天，我練習了舞步。\n要一起來跳支舞嗎？"
10116-350 = "我誕生的日子，\n並不存在什麼意義……\n……以前我是這麼想的。"
10116-360 = "不過，現在已經不一樣了……\n這也是多虧了老師啊。"
10116-370 = "已經去參拜過了嗎？\n我剛才也去過了。"
10116-380 = "至於許了什麼願望……是祕密。"
10116-390 = "聖夜，似乎要跟\n重要的人一起度過。"
10116-400 = "……我沒有別的意思。"
10116-410 = "以萬聖節的變裝來說\n好像不太適合……\n再戴點東西比較好嗎？"
10116-430 = "這，這樣就行了嗎……？"
10116-440 = "既然老師都這麼說了……\n但是，這還是有點……"
10116-450 = "這是平常，我絕對\n不會擺出的姿勢。"
10116-460 = "雙手都被占用，\n讓人有點不安。"
10116-470 = "不信任搭擋的話\n很難做到。"
10116-480 = "難道這……就是\n表明這點的問候，是嗎？"
10116-490 = "既然如此……\n在老師滿意之前，\n我就維持這樣吧。"
10116-500 = "這就是……我信賴的證明。"
10116-2600 = "託你的福，能執行的工作變得更多樣了。\n無論委託還是任何事情，我都會回應的。"

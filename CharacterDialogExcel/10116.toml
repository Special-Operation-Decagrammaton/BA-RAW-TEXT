10116-410 = "ชุดนี้ไม่เหมาะ\nกับฮาโลวีนเลย\nฉันไปแต่งคอสเพลย์หน่อยดีมั้ย?"
10116-430 = "ทะ... ทำแบบนี้ได้อยู่มั้ย...?"
10116-440 = "ถ้าครูว่าอย่างนั้นละก็...\nแต่ว่า... นี่มันค่อนข้างจะ..."
10116-450 = "ถ้าเป็นปกติ ฉันไม่ทำ\nท่าทางแบบนี้เด็ดขาด"
10116-460 = "พอมือทั้งสองข้างไม่เป็นอิสระ\nมันก็อึดอัดนิดหน่อยนะ"
10116-470 = "ถ้าไม่เชื่อใจคู่เต้น\nก็คงยากละนะ"
10116-480 = "หรือว่านี่จะเป็น...\nการทักทายเพื่อพิสูจน์สิ่งนั้นน่ะ?"
10116-490 = "ถ้างั้น... ฉันจะอยู่ในท่านี้\nจนกว่าครูจะพอใจเลย"
10116-500 = "นี่คือ... หลักฐานของความเชื่อใจของฉันน่ะ"
10116-2600 = "ฉันน่าจะทำงานที่หลากหลายขึ้นได้แล้ว\nต้องการอะไรก็บอกมาได้เลย"

10116-410 = "이 의상은 할로윈과\n어울리지 않는군.\n조금 분장이라도 해볼까?"
10116-430 = "이, 이렇게 하면 될까…?"
10116-440 = "선생이 그렇게 말한다면…\n하지만, 이건 조금…"
10116-450 = "평소라면, 절대 하지 않았을 자세야."
10116-460 = "양손이 자유롭지 못하니,\n조금 불안하군."
10116-470 = "파트너를 신뢰하지\n않는다면 어렵겠어."
10116-480 = "설마 이건……\n그걸 증명하는 인사였던 건가?"
10116-490 = "그렇다면……\n선생이 만족할 때까지\n이 자세로 있어 주지."
10116-500 = "이것이…… 내 신뢰의 증거다."
10116-2600 = "좀 더 다양한 업무를 할 수 있겠군.\n필요한 건 뭐든 말해라."

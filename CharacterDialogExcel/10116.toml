[translation]
10116-10 = "브, 블루 아카이브."
10116-20 = "아리우스 스쿼드의 사오리다…\n이건, 임무를 위해 입은 것이다…\n정말이다."
10116-30 = "흠, 위장 업무를\n배우기 좋은 장소군."
10116-40 = "언젠가,\n그 아이들에게도…\n드레스를."
10116-50 = "일 외에도 이런 드레스를\n입는 날이……\n나에게도 올까?"
10116-60 = "내가 눈에 띄는 건가?\n주변의 시선이\n느껴지는군."
10116-70 = "흥신소 68……\n역시 대단한 자들이다."
10116-80 = "이 복장으로 선생을 기다리니\n왠지 부끄럽군."
10116-90 = "아무튼 어서 와라."
10116-100 = "왔군. 오늘의 나는\n평소보다 대담하다."
10116-110 = "무슨 일이든 맡겨라."
10116-120 = "사람들의 말을 들어보니,\n이런 드레스는\n특별한 날에만 입는다고 한다."
10116-130 = "나는 그런 줄도 모르고\n선생과 만나며 이 옷을 입었지."
10116-140 = "다른 뜻은 없었다.\n그저…… 선생에게 좋은 모습을\n보이고 싶었을 뿐이야."
10116-150 = "…이 옷을 입게 되는 날에,\n또 만나러 가도 괜찮을까?"
10116-160 = "…그것만으로\n특별한 날이 될 테니까."
10116-170 = "오늘을 위해, 스텝을 연습했다.\n함께, 춰 주지 않겠나?"
10116-180 = "내 생일에 큰 의미는 없어.\n……라고\n얼마 전까지 생각했었다."
10116-190 = "하지만 지금은 아니야.\n모두 선생 덕분이다."
10116-200 = "선생. 새해 소원은 빌었나?\n나도 빌었다."
10116-210 = "내용은…… 비밀이다."
10116-220 = "성야엔 소중한 사람과\n시간을 보낸다더군."
10116-230 = "그냥…… 그렇다는 뜻이다.\n다른 의미는 없어."
10116-240 = "이 의상은 할로윈과\n어울리지 않는군.\n조금 분장이라도 해볼까?"
10116-250 = "이 복장으로 선생을 기다리니\n왠지 부끄럽군."
10116-260 = "아무튼 어서 와라."

[translation]
10116-10 = "B... Blue... Archive"
10116-20 = "ฉันซาโอริ สควอดของอาเรียส...\nฉันใส่ชุดนี้เพราะงานหรอกนะ...\nจริงๆ นะ"
10116-30 = "ฮืม เป็นที่ที่เหมาะกับ\nการเรียนรู้ภารกิจปลอมตัวเลย"
10116-40 = "สักวันหนึ่ง\nเด็กๆ พวกนั้น...\nคงได้ใส่ชุดเดรสบ้าง"
10116-50 = "จะมีวันที่ได้ใส่\nชุดเดรสแบบนี้...\nแต่ไม่ใช่เพราะงานมั้ยนะ?"
10116-60 = "ฉันเตะตามากเลยเหรอ?\nรู้สึกถึงสายตาที่มองมาเลย"
10116-70 = "หน่วยรับจ้างสารพัด 68...\nเป็นพวกคนที่น่าทึ่งเลยละ"
10116-80 = "พอมารอครูในชุดนี้\nมันก็น่าเขินอยู่นะ"
10116-90 = "เอาเถอะ รีบเข้ามาสิ"
10116-100 = "มาแล้วเหรอ ฉันในวันนี้\nใจกล้ามากกว่าปกตินะ"
10116-110 = "ไม่ว่างานอะไรก็สั่งมาได้เลย"
10116-120 = "พอฟังจากที่คนอื่นพูด\nได้ยินว่าชุดแบบนี้\nใส่กันแต่ในวันพิเศษ"
10116-130 = "แต่ฉันไม่รู้\nก็เลยใส่ชุดนี้มาเจอครูน่ะ"
10116-140 = "มันไม่ได้มีความหมายอื่นหรอก\nฉันแค่... อยากให้ครูได้เห็น\nภาพลักษณ์ดีๆ ของฉันน่ะ"
10116-150 = "วันที่ฉันได้ใส่ชุดนี้...\nฉันขอไปเจออีกได้มั้ย?"
10116-160 = "เพียงแค่นั้น...\nก็คงเป็นวันพิเศษแล้วละ"
10116-170 = "ฉันฝึกเต้นมาเพื่อวันนี้เลย\nมาเต้นด้วยกันมั้ยล่ะ?"
10116-180 = "วันเกิดฉันไม่มีความหมายอะไรมากหรอก\nฉันคิดแบบนั้น...\nจนกระทั่งเมื่อไม่นานมานี้น่ะ"
10116-190 = "แต่ตอนนี้ไม่ใช่อย่างนั้นแล้ว\nต้องขอบคุณครูเลยนะ"
10116-200 = "ครู ขอพรปีใหม่แล้วหรือยัง?\nฉันขอพรแล้ว"
10116-210 = "ขอเรื่องอะไร... เป็นความลับ"
10116-220 = "ได้ยินว่าคืนที่ศักดิ์สิทธิ์\nต้องใช้เวลาอยู่กับคนสำคัญ"
10116-230 = "ฉันแค่... บอกให้รู้เฉยๆ น่ะ\nไม่มีความหมายอะไรอื่นหรอก"
10116-240 = "ชุดนี้ไม่เหมาะ\nกับฮาโลวีนเลย\nฉันไปแต่งคอสเพลย์หน่อยดีมั้ย?"
10116-250 = "พอมารอครูในชุดนี้\nมันก็น่าเขินอยู่นะ"
10116-260 = "เอาเถอะ รีบเข้ามาสิ"
10116-270 = "มาแล้วเหรอ ฉันในวันนี้\nใจกล้ามากกว่าปกตินะ"

[translation]
10093-10 = "블루 아카이브~"
10093-20 = "아! 쌤이다! 야호-! 키라라야!\n나 기다리고 있었어? 아하핫! 기쁘다!"
10093-30 = "어디, 친해질 만한 친구가 있으려나~"
10093-40 = "꽤 넓은 곳이네!\n완전 마음에 들지도!"
10093-50 = "앗? 쌤! 쌤! 여기야!"
10093-60 = "각도를 이렇게 하면…… 응!\n셀카 찍기에 딱일 거 같아!"
10093-70 = "이 카페, 파르페도 파는 걸까?\n달콤한 게 먹고 싶은데~"
10093-80 = "안녕, 쌤!\n오늘도 바빠?"
10093-90 = "오늘의 당번은\n키라라 쨩입니다~"
10093-100 = "완전 떨리지 않아?\n선생님도 그래?"
10093-110 = "어제 친구들과 갔던 카페가 말야,\n완전 엄청났어!\n다음에 같이 가자!"
10093-120 = "쌤, 피곤하지 않아?\n잠깐 저쪽에서 눈 좀 붙일까?"
10093-130 = "우와…… 이 업무량,\n나라면 포기했을지도!\n쌤, 유능하구나?"
10093-140 = "쌤, 어제 찍은 내 셀카 볼래?\n어때? 귀엽게 나왔지?"
10093-150 = "응? 배경화면……?"
10093-160 = "그, 그건 좀 부끄러울지도?!"
10093-170 = "일 같은 건 후딱 끝내고,\n놀러 가자!"
10093-180 = "생일 축하해, 선생님!"
10093-190 = "선물은…… 나야!"
10093-200 = "오늘 하루, 선생님과\n계속 함께니까, 잘 부탁해!"
10093-210 = "아하핫!\n역시 기억해 주고 있었네!"
10093-220 = "고마워!\n덕분에 기운 100% 회복!"
10093-230 = "새해에는 작년보다 완전\n반짝반짝하고 왁자지껄했으면 좋겠네!"
10093-240 = "아, 쌤!\n메리 크리스마스!"
10093-250 = "이 사탕? 쌤한테 줄게!\n자, 아~ 해 봐!"
10093-270 = "왜 그래, 쌤?\n우물쭈물하고?"
10093-280 = "그러고 있다간,\n쉬는 시간 끝나버리는데?"
10093-290 = "아~ 혹시 페디큐어 바르는 법 몰라?"
10093-300 = "그거라면 쉬워!\n우선 바를 곳을 잘 살펴보고……"
10093-310 = "읏…… 마, 맞아! 그렇게!"
10093-320 = "그…… 근데……\n얼굴, 너무 가까운 거 아닌가……\n아하핫!"
10093-330 = "쌤, 콧김이 엄청 닿고 있는데……?"
10093-340 = "쌤의 손에 맡기는 건\n역시 조금 부끄러울지도……"
10093-350 = "아하핫! 아냐!\n벼, 별말 안 했어!"
10093-360 = "얼른 바르고 공부하자!"
10093-2600 = "쌤…… 이거, 나한테 주는 거라고?\n때, 땡큐……! 아니, 이럴 땐 제대로\n인사해야 하려나.\n고마워, 선생님."

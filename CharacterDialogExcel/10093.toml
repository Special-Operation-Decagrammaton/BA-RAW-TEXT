[translation]
10093-10 = "Blue Archive~"
10093-20 = "อ๊ะ! ครูนี่นา! ยะโฮ! นี่คิราระเอง!\nกำลังรอฉันอยู่เหรอ? อะฮ่าฮ่า! ดีใจจัง!"
10093-30 = "จะมีเพื่อนคนไหน\nที่จะสนิทด้วยได้มั้ยน้า~"
10093-40 = "ที่นี่กว้างจังเลย!\nถูกใจจัง!"
10093-50 = "อ๊ะ? ครู! ครู!\nทางนี้!"
10093-60 = "ถ้าจัดองศาแบบนี้ละก็...\nอื้ม! ก็จะเหมาะกับ\nการถ่ายรูปเซลฟี่เลย!"
10093-70 = "คาเฟ่นี้ขายพาร์เฟต์\nด้วยมั้ยนะ?\nอยากกินอะไรหวานๆ จัง~"
10093-80 = "ไฮฮาย ครู!\nวันนี้ก็งานยุ่งเหมือนเดิมเหรอ?"
10093-90 = "คนเข้าเวรวันนี้ก็คือ\nคิราระจังเองค่า~"
10093-100 = "น่าตื่นเต้นมากเลยใช่มั้ย?\nครูก็เป็นเหมือนกันหรือเปล่า?"
10093-110 = "ร้านคาเฟ่ที่ฉันไปกับเพื่อนมาเมื่อวาน\nมันสุดยอดไปเลยละ! คราวหน้าเราไป\nด้วยกันนะ!"
10093-120 = "ครู เหนื่อยหรือเปล่า?\nไปนอนพักสายตาทางนั้นหน่อยมั้ย?"
10093-130 = "ว้าว... งานกองโตขนาดนี้\nเป็นฉันคงยอมแพ้ไปแล้วละ!\nครูคงเก่งไม่เบาเลยนะ?"
10093-140 = "ครู อยากดูรูปเซลฟี่ที่ถ่ายเมื่อวานมั้ย?\nเป็นไง? น่ารักใช่มั้ยล่ะ?"
10093-150 = "หืม? รูปหน้าจอเหรอ...?"
10093-160 = "ระ... เรื่องนั้น\nมันน่าอายอยู่หน่อยๆ นะ!"
10093-170 = "รีบเคลียร์งานให้เสร็จ\nแล้วไปเที่ยวเล่นกันเถอะ!"
10093-180 = "สุขสันต์วันเกิดนะคุณครู!"
10093-190 = "ของขวัญคือ... ฉันเอง!"
10093-200 = "วันนี้ฉันจะอยู่กับคุณครูทั้งวัน\nฝากตัวด้วยนะ!"
10093-210 = "อะฮ่าฮ่า!\nจำได้ด้วยสินะ!"
10093-220 = "ขอบคุณนะ!\nฉันอารมณ์ดีขึ้นมา 100% เลย!"
10093-230 = "ถ้าปีใหม่นี้เปล่งประกายและ\nครึกครื้นกว่าปีที่แล้วก็ดีสินะ!"
10093-240 = "อ๊ะ ครู!\nเมอร์รีคริสต์มาส!"
10093-250 = "ลูกกวาดนี้เหรอ?\nฉันให้ครูก็ได้!\nเอ้า อ้าปากสิ อ้าม~!"
10093-270 = "เป็นอะไรไปล่ะครู?\nทำไมทำท่าอึกอักแบบนั้นล่ะ?"
10093-280 = "ถ้ามัวอึกอักอยู่แบบนั้น\nเดี๋ยวจะหมดเวลาพักนะ?"
10093-290 = "อ๋อ~ หรือว่า\nไม่รู้วิธีทาเล็บเท้างั้นเหรอ?"
10093-300 = "เรื่องง่ายๆ น่า!\nก่อนอื่นก็ให้ตั้งใจดูตำแหน่ง\nที่จะทาให้ดีๆ..."
10093-310 = "อึก... ชะ... ใช่แล้ว!\nแบบนั้นละ!"
10093-320 = "ตะ... แต่ว่า... เอาหน้าเข้าไป\nใกล้มากเกินไปรึเปล่า...\nอะฮ่าฮ่า!"
10093-330 = "ครู... ไอลมหายใจ\nออกมาเยอะจังเลย...?"
10093-340 = "พอให้ครูทำให้\nมันก็เขินอยู่นะ..."
10093-350 = "อะฮ่าฮ่า! ไม่หรอก!\nมะ... ไม่มีอะไรหรอก!"
10093-360 = "รีบๆ ทาแล้วไปเรียนกันเถอะ"
10093-2600 = "ครู... อันนี้ให้ฉันงั้นเหรอ?\nตะ... แต๊งกิ้วนะ...!\nไม่สิ เวลาแบบนี้ต้อง\nขอบคุณให้เหมาะสมรึเปล่านะ\nขอบคุณนะคุณครู"

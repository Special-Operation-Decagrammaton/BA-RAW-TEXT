[translation]
10093-10 = "蔚藍檔案"
10093-20 = "啊！是老師！呀齁～！是綺羅羅唷！\n你一直在等我嗎？啊哈哈！真開心！"
10093-30 = "會不會有感覺能\n當朋友的孩子呢～"
10093-40 = "是個挺寬敞的地方呢！\n超喜歡的！"
10093-50 = "啊？老師！老師！這邊！"
10093-60 = "把角度調成這樣……嗯！\n好像很適合自拍！"
10093-70 = "這間咖啡廳也有賣聖代嗎？\n我想吃點甜的東西～"
10093-80 = "你好呀～老師！\n今天也很忙嗎？"
10093-90 = "今天的值日生是\n綺羅羅醬哦～"
10093-100 = "不覺得超興奮的嗎？\n老師也這麼覺得？"
10093-110 = "昨天和朋友去的咖啡廳，\n真的超棒的！\n下次一起去吧！"
10093-120 = "老師，你是不是有點累？\n去那邊小睡一下吧？"
10093-130 = "嗚哇……這個工作量，\n換作是我可能就放棄了！\n老師，你真優秀呢～"
10093-140 = "老師，要看我昨天的自拍嗎？\n怎麼樣？很可愛吧？"
10093-150 = "嗯？設成手機桌布……？"
10093-160 = "那，那樣好像有點害羞！？"
10093-170 = "工作什麼的趕緊做完，\n一起去玩吧！"
10093-180 = "生日快樂，老師！"
10093-190 = "禮物是……我唷！"
10093-200 = "今天一整天，我會一直\n跟老師在一起，請多指教囉！"
10093-210 = "啊哈哈！\n你果然記得啊！"
10093-220 = "謝啦！託你的福，\n恢復了100%的元氣唷！"
10093-230 = "希望新年會比去年\n更加閃亮、更加熱鬧！"
10093-240 = "啊，老師！\n聖誕快樂！"
10093-250 = "這個糖果？送給老師！\n來，啊～一下！"
10093-270 = "怎麼啦，老師？\n為什麼扭扭捏捏的。"
10093-280 = "再那樣下去的話，\n休息時間就要結束囉？"
10093-290 = "啊～難道說，\n你不知道該怎麼\n塗指甲油嗎？"
10093-300 = "方法很簡單唷！\n先把要塗的地方\n仔～細看清楚……"
10093-310 = "呀啊……\n呃，嗯！就是那樣！"
10093-320 = "那，那個……\n臉，是不是靠太近了……\n啊哈哈！"
10093-330 = "老師，連呼吸都能\n明顯感覺到了耶……？"
10093-340 = "交，交給老師，\n果然好像有點\n太難為情了……"
10093-350 = "啊哈哈！沒事！\n什，什麼都沒有！"
10093-360 = "趕緊塗好，回去讀書吧！"
10093-2600 = "老師……這個，是要給我的嗎？\n謝，謝啦……！不對，這種時候應該好好\n道謝才對吧。\n謝謝你，老師。"

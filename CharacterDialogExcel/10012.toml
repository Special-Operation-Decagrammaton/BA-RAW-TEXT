[translation]
10012-20 = "體能訓練是科學。\n是千年的最先進的理論大放異彩的領域。"
10012-30 = "嘿…"
10012-40 = "有可以訓練的地方嗎…"
10012-50 = "這裡看起來\n是適合自由重量的地方。"
10012-60 = "咦？\n要一起做伸展運動嗎？"
10012-70 = "好，下次要一起長跑訓練吧？"
10012-80 = "歡迎回來，指導員。\n今天也一起努力吧。"
10012-90 = "恭候光臨。\n那就開始訓練吧。"
10012-100 = "只要觀點改變，\n世界看起來就不一樣了。"
10012-110 = "樓梯也是\n很棒的運動器具。"
10012-120 = "那麼首先，\n讓我們從長跑訓練開始吧。"
10012-130 = "嗯？\n為什麼不是穿制服嗎？"
10012-140 = "因為不方便訓練。"
10012-150 = "最近學生之間\n流行肌肉訓練唷。"
10012-160 = "……嗯，抱歉。\n這是我的妄想。"
10012-170 = "大腿被稱為\n第二個心臟，\n必須好好鍛練。"
10012-180 = "指導員，生日快樂。\n我準備了禮物……"
10012-190 = "咦？難不成是\n啞鈴是嗎？"
10012-200 = "謝謝你的祝福。"
10012-210 = "想要的東西是嗎？"
10012-220 = "那…最高級的蛋白質…不對！"
10012-230 = "我，我想要\n可愛的貓玩偶！"
10012-240 = "如果能許願的話，\n希望今年一整年\n大家都能過得健康。"
10012-250 = "所謂聖誕節，"
10012-260 = "聽說是救世主\n誕生的日子。"
10012-270 = "雖然我不太清楚，\n但那個救世主\n肯定一身肌肉。"
10012-280 = "指導員，\n你要吃\n蛋白質糖果嗎？"
10012-290 = "咦？\n味道嗎？"
10012-300 = "…我也有過，覺得那個很重要\n的時期。"
10012-320 = "如何呢指導員，\n運動，很開心吧？"
10012-330 = "有沒有，\n變健康的感覺呢？"
10012-340 = "啊，那個…\n請，請不要一直盯著看。"
10012-350 = "（畢竟鍛鍊中\n的樣子很難堪…）"
10012-360 = "請，請問您在\n看哪裡呢…？"
10012-370 = "…指導員，\n我有個請求。"
10012-380 = "今後，\n也一起運動吧。"
10012-390 = "我希望指導員\n可以一直保持健康。"
10012-400 = "理，理由嗎？\n那，那是…"
10012-410 = "呵呵。\n請猜猜看。"
10012-2600 = "之所以能駕馭這種東西，\n也都歸功於訓練的成果。\n但我不會安於現狀，\n我會繼續努力的，指導員。"

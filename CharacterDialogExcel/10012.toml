[translation]
10012-20 = "웨이트 트레이닝은 과학입니다.\n밀레니엄의 첨단 이론이 빛을 발하는 영역이죠."
10012-30 = "흐음…"
10012-40 = "트레이닝할 곳이 있으려나…"
10012-50 = "프리웨이팅하기 좋아 보이네요."
10012-60 = "응? 함께 스트레칭 하자고요?"
10012-70 = "네? 다음은 같이 로드워크를…?"
10012-80 = "어서 오세요. 트레이너.\n오늘도 함께 정진하도록 하죠."
10012-90 = "기다리고 있었습니다.\n그럼 트레이닝을 시작하죠."
10012-100 = "보는 관점을 바꾸면\n세상이 달라 보입니다."
10012-110 = "계단조차도 훌륭한\n운동기구입니다."
10012-120 = "그럼 먼저,\n로드워크부터 시작하시죠."
10012-130 = "네?\n어째서 교복을\n입지 않냐고요?"
10012-140 = "트레이닝에 불편하니까요."
10012-150 = "요즘 학생들 사이에서는\n근육 운동이 유행입니다."
10012-160 = "…네, 죄송합니다.\n제 망상입니다."
10012-170 = "허벅지는 제2의\n심장이라고 불립니다.\n단련하셔야 합니다."
10012-180 = "트레이너.\n생일 축하합니다.\n선물을 준비했는데…"
10012-190 = "네?\n덤벨이냐고요?"
10012-200 = "축하해주셔서 감사합니다."
10012-210 = "갖고 싶은 거요?"
10012-220 = "음…\n최고급 프로틴…\n이 아니라!"
10012-230 = "귀, 귀여운 고양이 인형이\n갖고 싶습니다!"
10012-240 = "바라는 것이 있다면,\n올 한 해도 모두 건강하게\n보냈으면 해요."
10012-250 = "크리스마스란,"
10012-260 = "성인이 태어난 날이라더군요."
10012-270 = "잘 모르지만, 성인이란\n분명 근육질일 겁니다."
10012-280 = "트레이너.\n단백질 사탕 드시겠습니까?"
10012-290 = "네?\n맛이요?"
10012-300 = "…저도 그런 게 중요하다\n믿었던 적이 있었죠."
10012-320 = "어때요 트레이너,\n운동, 재미있죠?"
10012-330 = "건강해진다는\n느낌이 들지 않나요?"
10012-340 = "어, 어…\n너, 너무 쳐다보지 말아 주세요."
10012-350 = "(트레이닝 중에는\n흉한 모습이어서……)"
10012-360 = "어, 어딜 보고… 계신 건가요?"
10012-370 = "트레이너. 부탁이 있어요."
10012-380 = "앞으로도, 계속 함께,\n운동하시죠."
10012-390 = "저는 트레이너가\n건강해졌으면 좋겠습니다."
10012-400 = "이, 이유?\n그, 그건…"
10012-410 = "후훗.\n맞춰보세요."
10012-2600 = "이런 것을 다룰 수 있게 된 것도\n트레이닝의 성과입니다.\n하지만 안주하지 않고\n계속 노력하겠습니다, 트레이너."

[translation]
10012-20 = "เวท เทรนนิ่งคือวิทยาศาสตร์ชนิดหนึ่ง\nมันคือความรุ่งโรจน์แห่งเทคโนโลยีของโรงเรียนมิลเลเนียม"
10012-30 = "อืม..."
10012-40 = "มีที่ให้ฝึกซ้อมมั้ยนะ..."
10012-50 = "เหมาะกับการออกกำลังกาย\nแบบฟรีเวทเลยนะคะ"
10012-60 = "หือ? จะให้ฉันยืดเส้นด้วยเหรอคะ?"
10012-70 = "คะ? ต่อไปวิ่งออกกำลังกาย...?"
10012-80 = "เชิญเลยค่ะ เทรนเนอร์\nวันนี้ก็มาทำงานให้เต็มที่กันเถอะนะคะ"
10012-90 = "กำลังรออยู่เลยค่ะ\nถ้างั้นก็เริ่มการฝึกกันเลยเถอะค่ะ"
10012-100 = "ถ้าเปลี่ยนมุมมองล่ะก็\nสิ่งที่เราเห็นก็จะเปลี่ยนไปด้วยค่ะ"
10012-110 = "บันไดเป็นอุปกรณ์ออกกำลังกาย\nที่ยอดเยี่ยมมากเลยนะคะ"
10012-120 = "ถ้างั้นก่อนอื่นก็มาเริ่มจาก\nการวิ่งออกกำลังกายกันเถอะค่ะ"
10012-130 = "คะ? ทำไมฉันถึง...\nไม่ใส่ชุดนักเรียนน่ะเหรอคะ?"
10012-140 = "มันออกกำลังกายไม่สะดวกน่ะค่ะ"
10012-150 = "ตอนนี้พวกนักเรียนคนอื่นๆ\nกำลังฮิตการฟิตร่างกายกันมากเลยค่ะ"
10012-160 = "ค่ะ... ขอโทษนะคะ\nฉันพูดมากไปเองค่ะ"
10012-170 = "ต้นขาถือเป็นหัวใจดวงที่สอง\nของร่างกายคนเราเลยนะคะ\nจะต้องฝึกให้แข็งแรงนะคะ"
10012-180 = "เทรนเนอร์ สุขสันต์วันเกิดนะคะ\nฉันเตรียมของขวัญมาให้แล้วแต่ว่า..."
10012-190 = "คะ?\n\"ใช่ดัมเบลรึเปล่า\" งั้นเหรอคะ?"
10012-200 = "ขอบคุณที่อวยพรให้นะคะ"
10012-210 = "ของที่อยากได้น่ะเหรอคะ?"
10012-220 = "อืม...\nโปรตีนเกรดพรีเมียม...\nมะ...ไม่ใช่นะคะ!"
10012-230 = "ฉัน... ฉันอยากได้\nตะ...ตุ๊กตาแมวน่ารักๆ ค่ะ!"
10012-240 = "สิ่งที่ฉันต้องการ...\nคืออยากให้ทุกๆ คนมีสุขภาพ\nที่แข็งแรงในปีนี้นะคะ"
10012-250 = "ได้ยินว่าวันคริสต์มาสคือ..."
10012-260 = "วันที่จะได้กลายเป็นผู้ใหญ่นี่คะ"
10012-270 = "ถึงฉันจะไม่ค่อยรู้... แต่คำว่า\nเป็นผู้ใหญ่คงหมายถึงการมี\nกล้ามเนื้อที่แข็งแรงแน่ๆ"
10012-280 = "เทรนเนอร์คะ\nอยากลองชิมลูกกวาด\nรสโปรตีนล้วนดูมั้ยคะ?"
10012-290 = "คะ?\nใช่มั้ยคะ?"
10012-300 = "ฉันเองก็เคยคิดว่าเรื่องแบบนั้น\nสำคัญมากๆ เหมือนกันค่ะ"
10012-320 = "เป็นยังไงคะ เทรนเนอร์\nออกกำลังกายสนุกรึเปล่าคะ?"
10012-330 = "ตอนนี้รู้สึกว่าร่างกาย\nแข็งแรงขึ้นบ้างรึเปล่าคะ?"
10012-340 = "อ๊ะ... เอ่อ...\nอย่า... อย่าจ้องฉันแบบนั้นสิคะ"
10012-350 = "(เพราะเวลาที่ออกกำลังกาย\nสภาพคงดูไม่ดีเท่าไหร่...)"
10012-360 = "เทรนเนอร์คะ... มองอะไรคะ?"
10012-370 = "เทรนเนอร์คะ ฉันมีเรื่องจะขอรบกวนค่ะ"
10012-380 = "ต่อไป...\nมาออกกำลังด้วยกันอีกนะคะ"
10012-390 = "ฉันอยากให้เทรนเนอร์\nมีสุขภาพที่แข็งแรงค่ะ"
10012-400 = "หะ... เหตุผลเหรอคะ?\nคือ...เรื่องนั้น..."
10012-410 = "ฮุฮุ ลองเดาดูสิคะ"
10012-2600 = "การที่ฉันทำเรื่องพวกนี้สำเร็จได้\nก็เป็นผลของการฝึกค่ะ\nแต่แค่นี้ยังไม่พอหรอกนะคะ\nฉันจะพยายามต่อไปค่ะเทรนเนอร์"

[translation]
16013-10 = "브, 블루 아카이브!"
16013-20 = "서, 선생님을 감시하기 위해 왔어!\n야한 건 안 돼! 금지!\n절대 용서하지 않으니까…!"
16013-30 = "으으, 사람이\n 너무 많아…"
16013-40 = "저, 저건…!?"
16013-50 = "혹, 혹시, 나만\n이렇게 입고\n있는 건가…!?"
16013-60 = "선생님… 어딨어…"
16013-70 = "이, 이거는, 좋아서\n입고 있는 건 아닌데!"
16013-80 = "기다리고 있었어, 선생님!\n오늘은 뭘 할 거야?"
16013-90 = "선생님, 늦었잖아!\n정말… 뭐 하고 있었어!?"
16013-100 = "어? 이 복장…?"
16013-110 = "왜, 왜 그런 걸\n왜 물어보는 거야?\n야한 건 안 돼! 사형!"
16013-120 = "서류작업?\n그, 그런건 잘 모르겠지만…"
16013-130 = "그, 그 대신 여길 지켜줄게!"
16013-140 = "선생님, 항상\n이런 식으로 일하는구나…\n힘들어 보여…"
16013-150 = "계속 여기 있으면 안 질려?\n산이라든가 바다라든가,\n가고 싶지 않아?"
16013-160 = "후훗, 선생님.\n내가 함께라서 든든하지?"
16013-170 = "선생님, 오늘 생일이지?\n갖고 싶은 거 있어?\n뭐든지 말해!"
16013-180 = "앗…야한 건 안 되니까!"
16013-190 = "아, 내 생일…\n기억하고 있었구나…"
16013-200 = "후후. 고마워."
16013-210 = "새해 복 많이 받으세요, 선생님!\n올해도 바다에 가고 싶네… 후훗"
16013-220 = "크리스마스구나…"
16013-230 = "어? 밖에 나가?\n이 차림으로!?"
16013-240 = "…뭐, 무슨 생각을\n하고 있는거야!\n변태! 사형!!"
16013-250 = "할로윈 코스튬!?\n수영복이!?"
16013-260 = "어떻게 생각하면\n그렇게 되는 거야!?"
16013-280 = "…저기…"
16013-290 = "…선생님…?\n언제까지 이러고 있는 거야…?\n의미를 모르겠어…"
16013-300 = "그런가… 음…"
16013-310 = "그럼 돌아갈까…"
16013-320 = "…헉!!"
16013-330 = "(아니지, 아니야. 아니야!\n내가 무슨 소릴!)"
16013-340 = "(위험해! 또 선생님한테\n속을 뻔했어.)"
16013-350 = "(경계를 늦추다니…\n안 돼, 절대 안 돼!)"
16013-360 = "날 방심하게 하려고 해도\n소용 없다구!"
16013-370 = "…흠!"
16013-2600 = "이, 이건…음…\n안, 안 돼, 제대로 말해야지…\n고, 고마워 선생님! 앞으로도 열심히 할게!\n이, 이제 됐지?\n나도, 고맙다는 말 정도는 할 수 있어!"

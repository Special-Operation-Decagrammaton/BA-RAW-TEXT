[translation]
16013-10 = "蔚、蔚藍檔案！"
16013-20 = "我，我是來監視老師的！\n不可以色色！禁止！\n絕對不能容許…！"
16013-30 = "嗚嗚，\n 人太多了…"
16013-40 = "那，那個是…！？"
16013-50 = "難，難道，\n穿成這樣的，\n只有我…！？"
16013-60 = "老師…在哪裡…"
16013-70 = "這，這也不是\n因為喜歡才穿的！"
16013-80 = "我在等你哦，老師！\n今天要做什麼呢？"
16013-90 = "老師，你好慢！\n真是的…都在做什麼啊！？"
16013-100 = "咦？這副打扮……？"
16013-110 = "為，為什麼\n要問那種事啊？\n不可以色色！死刑！"
16013-120 = "文書作業？\n那，那種事，\n我不是很清楚…"
16013-130 = "但，但相對的，\n我會幫你守住這裡！"
16013-140 = "老師你，原來總是\n這樣工作的啊…\n看起來好辛苦…"
16013-150 = "一直待在這裡不會膩嗎？\n會不會想去\n山裡或海邊走走？"
16013-160 = "呵呵，老師。\n有我在身邊，\n心裡踏實多了吧？"
16013-170 = "老師，今天是你生日對吧？\n有什麼想要的嗎？\n儘管開口吧！"
16013-180 = "啊…色色的不行哦！"
16013-190 = "啊，我的生日…\n你居然記得啊…"
16013-200 = "呵呵。謝謝你。"
16013-210 = "新年快樂，老師！\n今年也想去海邊呢…呵呵。"
16013-220 = "聖誕節啊…"
16013-230 = "咦？要外出嗎？\n穿成這樣！？"
16013-240 = "…你，你在想什麼啊！？\n變態！死刑！！"
16013-250 = "萬聖節裝扮！？\n穿泳裝！？"
16013-260 = "到底是怎麼\n想成那樣的啊！？"
16013-280 = "…那個…"
16013-290 = "…老師…就是…\n你要這樣到什麼時候…？\n無法理解…"
16013-300 = "是嗎…嗯…"
16013-310 = "那，我就回去吧…"
16013-320 = "…哈！！"
16013-330 = "（不行不行不行！\n　我剛才在說什麼啊！）"
16013-340 = "（好險！差點\n　又被老師騙了）"
16013-350 = "（竟然放鬆了警戒…\n　不行，絕對不行！）"
16013-360 = "就算想讓我大意\n也是沒用的！"
16013-370 = "…哼！"
16013-2600 = "這，這是……嗯……\n不，不行，得好好說清楚才行……\n謝，謝謝老師！我之後也會努力的！\n這，這樣可以了吧！？\n就算是我，道謝還是做得到的！"

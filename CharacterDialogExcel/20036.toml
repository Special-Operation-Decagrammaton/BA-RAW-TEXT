[translation]
20036-10 = "Blue Archive!"
20036-20 = "ต้องเป็น 'การพักผ่อนที่ดีที่สุด'!\nห้ามอ่อนข้ออะไรทั้งนั้น!"
20036-30 = "อืม...\nทุกคนดูยุ่งกันจังเลย"
20036-40 = "จู่ๆ ก็อยากเล่น\nปืนฉีดน้ำขึ้นมาแฮะ"
20036-50 = "ทำบาร์บีคิวกันมั้ย?"
20036-60 = "ทำความสะอาดไว้\nดีมั้ยนะ"
20036-70 = "ฮู่วว... สดชื่นจัง"
20036-80 = "เข้ามาสิคุณครู!\nที่นี่สดชื่นจังเลยนะ!"
20036-90 = "มาช้านะคุณครู!\nรู้มั้ยฉันรอนานแค่ไหน!?"
20036-100 = "ทะเลเย็นสบายดีจัง!"
20036-110 = "พอมาเที่ยวกันทุกคน...\nฉันก็สนุกมากเลย"
20036-120 = "ถ้าสนุกสุดเหวี่ยง\nก็ไม่มีอะไรให้เสียดาย!"
20036-130 = "เฮ้อ... เหนื่อยจัง..."
20036-140 = "มะ... ไม่ได้สิ!\nเสียดายเวลาพักหมด!"
20036-150 = "คุณครู... เอ่อ...\nชุดว่ายน้ำชุดนี้เป็นยังไงบ้าง?"
20036-160 = "แฮปปี้ เบิร์ธเดย์!\nไปเที่ยวเล่นกันเถอะ!"
20036-170 = "วันเกิดฉันเหรอ...?"
20036-180 = "นั่นสินะ...\nถ้างั้นวันนี้ทั้งวัน เรามา...! "
20036-190 = "ทำอะไรดีนะ?"
20036-200 = "เหมือนฉันเคยมีชุด\nสำหรับปีใหม่ด้วยนะ..."
20036-210 = "เอาเถอะ ไม่เป็นไรหรอก\nสวัสดีปีใหม่นะคุณครู"
20036-220 = "ปีที่ผ่านมา\nฉันเป็นเด็กดีหรือเปล่านะ..."
20036-230 = "คะ... คุณครู... ว่าไงล่ะ?"
20036-240 = "ฮาโลวีนเหรอ!?\nชุดว่ายน้ำไม่ใช่ชุดคอสเพลย์\nสักหน่อย!?"
20036-250 = "ถึงมันอาจจะใช่\nในสายตาคนมองก็เถอะ...!"
20036-270 = "คะ... แค่นี้ก็น่าจะพอแล้วมั้ง?\nลงได้แล้วละ..."
20036-280 = "ใช่ว่าตอนนี้ฉัน\nอยากเลิกแล้วหรอกนะ..."
20036-290 = "ดะ... เดี๋ยวสิ!! ทำอะไรน่ะ!\nคุณครู! มันโคลงเคลงนะ!"
20036-300 = "บานาน่าโบ๊ทอันนี้\nมันคว่ำง่ายนะ!! หยุดนะ!"
20036-310 = "อะไรกัน\nมันน่าสนุกงั้นเหรอ"
20036-320 = "คุณครู อย่าแกล้งกันเล่นสิ"
20036-330 = "เฮ้อ... ช่างเถอะ\nคุณครูก็เป็นคนอย่างนี้อยู่แล้ว"
20036-340 = "ฉันควรจะคิดไว้แท้ๆ\nว่าต้องเป็นอย่างนี้..."
20036-350 = "เอาเถอะ ไม่เป็นไรหรอก\nฉันก็คิดอะไรขึ้นมาได้น่ะ"
20036-360 = "เอาละ คุณครู! มาเปลี่ยนกัน!!\nรอบนี้เป็นตาของคุณครูบ้างแล้ว!"
20036-2600 = "เอาแต่เล่นสนุกอยู่อย่างนี้ก็ได้เหรอ...\nตะ... แต่ในเมื่อคุณครูบอกว่าไม่เป็นไร!\nงั้นก็รับผิดชอบด้วยนะ?"

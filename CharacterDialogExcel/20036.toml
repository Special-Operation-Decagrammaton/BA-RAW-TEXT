[translation]
20036-10 = "블루 아카이브!"
20036-20 = "\"최고의 휴가\"로 만들겠어!\n타협은 없다고!"
20036-30 = "흐응……\n다들 바빠 보이네."
20036-40 = "갑자기 물총싸움이\n하고 싶네."
20036-50 = "바비큐 할까?"
20036-60 = "……청소 좀 해둘까."
20036-70 = "후우……. 시원하다."
20036-80 = "어서 오세요, 선생님!\n여기는 시원하네!"
20036-90 = "늦었다고, 선생님!\n얼마나 기다렸는 줄 알아!?"
20036-100 = "역시 바다는 시원하네!"
20036-110 = "모두 함께 놀러 와서…….\n너무 즐거워."
20036-120 = "전력을 다해서 놀면 후회도 없지!"
20036-130 = "하… 피곤하다……."
20036-140 = "안, 안 돼!\n휴식하는 시간도 아까워!"
20036-150 = "선생님……. 그…….\n이 수영복, 어떻게 생각해?"
20036-160 = "해피 버스데이!\n같이 놀자!"
20036-170 = "내 생일……?"
20036-180 = "그렇네……. 그럼\n오늘 하루 계속 같이...!"
20036-190 = "……뭐하고 놀지?"
20036-200 = "새해 복장도\n있었던 것 같은데……."
20036-210 = "뭐, 상관없나.\n새해 복 많이 받아, 선생님."
20036-220 = "올 한 해,\n나는 착한 아이였을까……."
20036-230 = "……서, 선생님……어때?"
20036-240 = "할로윈!?\n수영복은 가장이 아닌데!?"
20036-250 = "보기에 따라서는\n맞을지도 모르지만…!"
20036-270 = "이, 이 정도면 괜찮지 않을까?\n슬슬 내려가자……."
20036-280 = "이제 그만하고 싶다든가,\n그런 건 아니지만……."
20036-290 = "잠, 잠깐!! 선생님!\n뭐 하는 거야! 흔들리잖아!"
20036-300 = "이 보트, 뒤집히기\n쉽다고!! 하지 마!"
20036-310 = "아니, 재미있을 것\n같아서라니."
20036-320 = "선생님, 사람 가지고 놀지 마."
20036-330 = "……하아. 아니다. 선생님은\n원래 그런 사람이니까."
20036-340 = "이럴 거라고\n예상했어야 했는데……."
20036-350 = "뭐 괜찮아. 나도\n생각난 게 있어서."
20036-360 = "자, 선생님! 교대야!!\n이번에는 선생님 차례라고!"
20036-2600 = "이렇게 놀기만 해도 괜찮은 건가...\n선, 선생님이 괜찮다고 했으니까!\n제대로 책임져!?"

[translation]
20036-10 = "蔚藍檔案！"
20036-20 = "我一定要度過「最棒的休假」！\n不會妥協的哦！"
20036-30 = "總覺得……\n大家好像都很忙呢。"
20036-40 = "好像有點想玩水槍。"
20036-50 = "要不要來烤肉？"
20036-60 = "……要不要\n打掃一下？"
20036-70 = "呼……真舒服。"
20036-80 = "歡迎你，老師！\n這裡真涼快呢！"
20036-90 = "你好慢哦，老師！\n打算讓我等多久啊？"
20036-100 = "果然海邊很涼快呢！"
20036-110 = "大家能一起來玩……\n真的很開心。"
20036-120 = "只要全力玩樂\n就不會後悔了！"
20036-130 = "哈啊……好累……"
20036-140 = "不，不行！\n連休息都是在浪費時間！"
20036-150 = "老師……那個……\n這套泳裝，你覺得怎麼樣？"
20036-160 = "Happy Birthday！\n一起來玩吧！"
20036-170 = "我的生日……？"
20036-180 = "說的也是……那今天\n一整天就一直一起……！"
20036-190 = "……做什麼好呢？"
20036-200 = "總覺得應該也有\n新年的服裝才對……"
20036-210 = "算了。\n新年快樂，老師。"
20036-220 = "今年這一年，\n我是個乖孩子嗎……"
20036-230 = "……老，老師……你覺得呢？"
20036-240 = "萬聖節！？\n泳裝又不是變裝！！"
20036-250 = "雖然根據觀點不同，\n那麼說可能也沒錯……！"
20036-270 = "這，這樣應該就行了吧？\n差不多該下船了……"
20036-280 = "雖然我也沒有，\n不想繼續的意思……"
20036-290 = "等，等等！！老師！\n你在做什麼啦！很晃耶！"
20036-300 = "這艘船，很容易\n翻船的啦！！別鬧了！"
20036-310 = "不是，說什麼\n好像很有趣……"
20036-320 = "老師，別拿別人來玩樂。"
20036-330 = "……唉，算了。\n反正老師本來就是這種人。"
20036-340 = "我早該預料到\n你會做這種事才對……"
20036-350 = "好吧，沒關係。\n我也是有備而來的。"
20036-360 = "來吧，老師！我們交換！！\n這次輪到老師了唷！"
20036-2600 = "這樣只顧著玩真的沒問題嗎……\n是，是老師你說可以的哦！\n要負起責任哦！？"

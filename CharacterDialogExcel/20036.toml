[translation]
20036-10 = "Blue Archive!"
20036-20 = "I WILL make this the \"best vacation\"! No compromises!"
20036-30 = "Hm... It looks like everyone's busy."
20036-40 = "I have the sudden urge to have a water gun fight..."
20036-50 = "Is it barbecue time?"
20036-60 = "...I guess I should clean up a bit."
20036-70 = "Phew... That feels better."
20036-80 = "Welcome, Sensei! It's cool here!"
20036-90 = "You're late, Sensei! Do you know how long I waited?!"
20036-100 = "The ocean is refreshing, after all!"
20036-110 = "I'm really happy... I get to come and play with everyone."
20036-120 = "If I go all out on having fun, I won't have any more regrets!"
20036-130 = "*sigh*... I'm tired..."
20036-140 = "N-No! Even time spent resting is a waste!"
20036-150 = "Sensei... Um... What do you think of this swimsuit?"
20036-160 = "Happy birthday! Let's play together!"
20036-170 = "My birthday...?"
20036-180 = "Right... For the entire day, we should...!"
20036-190 = "...What should we play with?"
20036-200 = "I think there was a New Year outfit too..."
20036-210 = "Well, I guess it doesn't matter. Happy New Year, Sensei."
20036-220 = "I wonder if I was a good kid this year..."
20036-230 = "What do you think? S-Sensei?"
20036-240 = "Halloween?! A swimsuit isn't a costume, though?!"
20036-250 = "I guess it could be, depending on how you look at it!"
20036-270 = "I think that should be enough. Let me get off this thing."
20036-280 = "It's not that I want to stop or anything, but..."
20036-290 = "W-Wait!! What are you doing, Sensei?! You're rocking it!"
20036-300 = "Y-You're going to flip it over! Stop it!"
20036-310 = "What do you mean, \"this will be fun\"?!"
20036-320 = "Sensei, quit messing with me!"
20036-330 = "...Ah... Never mind. This is just like you, you know."
20036-340 = "I should have expected this..."
20036-350 = "Oh, it's fine. I just had an idea..."
20036-360 = "All right, Sensei! It's your turn now!"
20036-2600 = "Is it okay to just play around like this...? Y-You're the one who approved it! So you better take responsibility, okay?!"

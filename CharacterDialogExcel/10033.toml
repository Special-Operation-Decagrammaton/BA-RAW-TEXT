[translation]
10033-10 = "蔚藍檔案，呼呼呼。"
10033-20 = "唔呵呵……終於找到了。\n不會再讓您逃走了，閣下♥\n請不要再從我身邊，離開了哦……？"
10033-30 = "假如是平常的話，\n是沒辦法這麼悠閒的呢……"
10033-40 = "唔呵呵呵呵♡"
10033-50 = "啊啊，閣下，\n您在哪裡呢？"
10033-60 = "哎呀哎呀。"
10033-70 = "呵呵呵，\n真令人困擾呢。"
10033-80 = "您回來了嗎，老師？"
10033-90 = "若藻我，一直於此"
10033-100 = "恭候著閣下的歸來。"
10033-110 = "恭候多時了，老師。\n呵呵呵呵呵♥"
10033-120 = "您期望的是什麼呢？"
10033-130 = "無論是任何事物，\n都已經做好準備了。"
10033-140 = "來吧，請對我，\n下達任何命令吧。"
10033-150 = "全都是閣下的所有物。\n這身體、心靈、全部。"
10033-160 = "您期望的事，\n請儘管說。"
10033-170 = "沒錯，任何事♡"
10033-180 = "啊啊，明明現在就想\n讓閣下緊抱著我……"
10033-190 = "竟然必須忍耐，\n這是多麼刻苦的試煉啊……"
10033-200 = "這副面具，\n您還喜歡嗎？"
10033-210 = "呵呵，我也非常中意。"
10033-220 = "如果您希望的話，\n隨時都可以摘下來唷……？"
10033-230 = "……面具的裡面，\n您不在意嗎？"
10033-240 = "閣下出生的日子……"
10033-250 = "這麼值得喜悅的日子\n竟然可以與閣下在一起，\n真是有如美夢。"
10033-260 = "哎呀，我的生日，\n您記住了嗎？"
10033-270 = "啊啊，好開心……\n我，已經沒有\n任何留念了……"
10033-280 = "祝您新年快樂。"
10033-290 = "希望今年也能與閣下一起，\n製造快樂的回憶。"
10033-300 = "聖誕節，情侶們\n究竟會做什麼事呢？"
10033-310 = "唔呵呵呵，我，\n對這種事情不太了解♡"
10033-320 = "是否可以，請您\n一步一步教導我呢？\n老．師？"
10033-330 = "明明這副面具\n並不是萬聖節用的。"
10033-340 = "剛才被路過的人詢問，\n令我的心情變得有些難過。"
10033-350 = "您回來了嗎，老師？"
10033-360 = "若藻我，一直於此"
10033-370 = "恭候著閣下的歸來。"
10033-380 = "恭候多時了，老師。\n呵呵呵呵呵♥"
10033-390 = "您期望的是什麼呢？"
10033-400 = "無論是任何事物，\n都已經做好準備了。"
10033-410 = "來吧，請對我，\n下達任何命令吧。"
10033-420 = "全都是閣下的所有物。\n這身體、心靈、全部。"
10033-430 = "您期望的事，\n請儘管說。"
10033-440 = "沒錯，任何事♡"
10033-450 = "啊啊，明明現在就想\n讓閣下緊抱著我……"
10033-460 = "竟然必須忍耐，\n這是多麼刻苦的試煉啊……"
10033-470 = "就算您那樣一直盯著，\n我的臉龐……"
10033-480 = "見過我的素顏的，\n僅僅只有閣下……"
10033-490 = "……不過，被那樣盯著\n看的話……很害羞的。"
10033-500 = "閣下出生的日子……"
10033-510 = "這麼值得喜悅的日子\n竟然可以與閣下在一起，\n有如美夢。"
10033-520 = "哎呀，我的生日，\n您記住了嗎？"
10033-530 = "啊啊，好開心……\n我，已經沒有\n任何留念了……"
10033-540 = "祝您新年快樂。"
10033-550 = "希望今年也能和閣下一起，\n製造快樂的回憶。"
10033-560 = "聖誕節，情侶們\n究竟會做什麼事呢？"
10033-570 = "唔呵呵呵，我，\n對這種事情不太了解♡"
10033-580 = "是否可以，請您\n一步一步教導我呢？\n老．師？"
10033-600 = "好開心……！\n若藻我，一心只想\n像這樣與閣下相見……！"
10033-610 = "以求直接，將這份心情……\n這份思念，傳達給您……"
10033-620 = "能如這般與您相會，\n肯定也是……受紅線\n連繫的命運所引導……"
10033-630 = "啊，啊……那，那樣\n盯著我看的話……！"
10033-640 = "就算是我，\n也是會害羞的……"
10033-650 = "僅僅因為閣下的視線，\n就從身體各處，溢出了\n心癢難耐的感覺……"
10033-660 = "不過……假如閣下\n如此希望的話……\n好的♡"
10033-670 = "來，請來這邊。\n再更加，靠近我身邊……\n唔呵呵呵呵♡"
10033-2600 = "好了，若藻我，\n已經做好準備了。\n使用這個，將閣下的敵人\n一個不剩地排除。\n哼哼哼哼哼哼哼……"

[translation]
10033-10 = "블루 아카이브. 후후후."
10033-20 = "우후후 드디어 찾.았.다.\n이제 놓치지 않아요. 당신♥\n제 눈에서 벗어나지 말아 주세요."
10033-30 = "평상시라면 이렇게\n여유를 부릴 수\n없을 텐데 말이죠…."
10033-40 = "우후후후후♡"
10033-50 = "하아~\n당신은 어디 계시려나."
10033-60 = "이런이런."
10033-70 = "후후후. 곤란하네요."
10033-80 = "다녀오셨어요, 선생님?"
10033-90 = "이 와카모, 여기서\n당신이 돌아오시기를"
10033-100 = "오매불망 기다리고 있었답니다."
10033-110 = "기다리고 있었답니다, 선생님.\n후후후후후♥"
10033-120 = "무엇을 원하시나요?"
10033-130 = "설령 어떤 일이라도\n할 준비가 되어 있답니다."
10033-140 = "자아. 무엇이든\n저에게 시켜주세요."
10033-150 = "전부 당신 것이랍니다.\n이 몸도, 마음도 전부."
10033-160 = "원하시는 것은, 뭐든지\n말씀해 주세요."
10033-170 = "네, 뭐든지♡"
10033-180 = "아아, 당장에라도\n당신께 안기고 싶지만…."
10033-190 = "참아야만 한다니\n이 무슨 가혹한 시험인지…."
10033-200 = "이 가면이 마음에 드시나요?"
10033-210 = "후훗. 저도\n좋아하는 가면이랍니다."
10033-220 = "원하신다면, 언제든\n벗기셔도 괜찮답니다……?"
10033-230 = "……가면 안쪽, 신경 쓰이지\n않으시나요?"
10033-240 = "당신이 태어난 날..."
10033-250 = "이런 기쁜 날\n함께 있을 수 있다니\n꿈만 같아요."
10033-260 = "어머나. 제 생일을\n기억해 주신 건가요?"
10033-270 = "아아, 기뻐요-\n저는 더 이상\n여한이 없습니다-"
10033-280 = "새해 복, 많이 받으시길."
10033-290 = "올해도 당신과 함께\n즐거운 추억을 남기고 싶네요."
10033-300 = "크리스마스에는 연인들은\n무슨 일을 하나요?"
10033-310 = "우후후후.\n저는 잘 모르는데♡"
10033-320 = "몸소 가르쳐주실 수 있나요?\n선.생.님.?"
10033-330 = "이 가면은 할로윈 용이 아니랍니다."
10033-340 = "아까 누가 물어봐서\n조금 서글퍼졌어요."
10033-350 = "다녀오셨어요, 선생님?"
10033-360 = "이 와카모, 여기서\n당신이 돌아오시기를"
10033-370 = "오매불망 기다리고 있었답니다."
10033-380 = "기다리고 있었답니다, 선생님.\n후후후후후♥"
10033-390 = "무엇을 원하시나요?"
10033-400 = "설령 어떤 일이라도\n할 준비가 되어 있답니다."
10033-410 = "자아. 무엇이든\n저에게 시켜주세요."
10033-420 = "전부 당신 것이랍니다.\n이 몸도, 마음도 전부."
10033-430 = "원하시는 것은, 뭐든지\n말씀해 주세요."
10033-440 = "네, 뭐든지♡"
10033-450 = "아아, 당장에라도\n당신께 안기고 싶지만…."
10033-460 = "참아야만 한다니\n이 무슨 가혹한 시험인지…."
10033-470 = "제 얼굴을 그렇게\n뚫어져라 보셔도......"
10033-480 = "맨얼굴을 보여 드리는 건\n오직 당신뿐이라......"
10033-490 = "......그렇게 쳐다보시면\n부끄러워요."
10033-500 = "당신이 태어난 날..."
10033-510 = "이런 기쁜 날\n함께 있을 수 있다니\n꿈만 같아요."
10033-520 = "어머나. 제 생일을\n기억해 주신 건가요?"
10033-530 = "아아, 기뻐요-\n저는 더 이상\n여한이 없습니다-"
10033-540 = "새해 복, 많이 받으시길."
10033-550 = "올해도 당신과 함께\n즐거운 추억을 남기고 싶네요."
10033-560 = "크리스마스에는 연인들은\n무슨 일을 하나요?"
10033-570 = "우후후후.\n저는 잘 모르는데♡"
10033-580 = "몸소 가르쳐주실 수 있나요?\n선.생.님.?"
10033-600 = "기뻐요……. 이 와카모,\n모든 것은 이렇게\n당신과 만나기 위해서……!"
10033-610 = "어떻게든 직접,\n제 기분을, 이 감정을,\n전해드리고 싶어서……."
10033-620 = "이렇게 만나게 된 것 또한 분명,\n붉은 실로 맺어진 운명의 인도겠죠……."
10033-630 = "아아……. 그, 그렇게\n뚫어져라 쳐다보시면……"
10033-640 = "아무리 저라고 해도,\n부끄러워져 버리고 말아요……."
10033-650 = "당신의 그런 시선만으로도,\n몸 이곳저곳에서,\n안타까움이 흘러 넘쳐서……."
10033-660 = "하지만……. 당신이\n그렇게나 원하신다면…….\n네♡"
10033-670 = "자아, 부디 이쪽으로,\n좀 더 좀 더 저의 곁으로…….\n우후후♡"
10033-2600 = "자아, 이 와카모. 이미 준비는 되어 있습니다.\n이것으로, 당신의 적을 남김없이 제거하겠습니다.\n후후후후후후후……."

[translation]
10033-10 = "Blue Archive ฮุฮุฮุ"
10033-20 = "ฮุฮุฮุ ในที่สุดก็...เจอ-ตัว-แล้ว\nฉันจะไม่ปล่อยไปแล้วนะคะ คุณท่าน♥\nอย่าหายไปจากสายตาของฉันนะคะ"
10033-30 = "ถ้าเป็นเวลาปกติ\nฉันคงไม่ได้ผ่อนคลาย\nแบบนี้หรอกค่ะ..."
10033-40 = "ฮุฮุฮุ♥"
10033-50 = "เฮ้อ~\nคุณท่านอยู่ที่ไหนนะ..."
10033-60 = "อุ๊ย แหมๆ"
10033-70 = "ฮุฮุฮุ แบบนี้มันลำบากนะคะ"
10033-80 = "กลับมาแล้วเหรอคะ คุณครู?"
10033-90 = "วาคาโมะผู้นี้เฝ้ารอ\nให้คุณท่านกลับมาที่นี่"
10033-100 = "อยู่ตลอดเวลาเลยค่ะ"
10033-110 = "กำลังรออยู่เลยค่ะ คุณครู\nฮุฮุฮุฮุฮุฮุ♥"
10033-120 = "ต้องการอะไรหรือคะ?"
10033-130 = "ไม่ว่าเรื่องไหนฉันก็พร้อม\nจะทำทุกอย่างเลยค่ะ"
10033-140 = "ไม่ว่าเรื่องอะไรก็บอกมาได้เลยค่ะ"
10033-150 = "ทุกสิ่งทุกอย่างของฉัน\nเป็นของคุณท่านทั้งหมดค่ะ\nทั้งร่างกาย และทั้งหัวใจของฉัน..."
10033-160 = "หากคุณท่านต้องการอะไร\nก็บอกฉันได้เลยนะคะ"
10033-170 = "ค่ะ ทุกๆ อย่างเลยค่ะ♡"
10033-180 = "อา... ตอนนี้ฉันอยากรีบไป\nโอบกอดคุณท่านจัง..."
10033-190 = "แต่ก็ได้แต่อดทนเอาไว้\nช่างเป็นการทดสอบที่โหดร้ายจริงๆ..."
10033-200 = "คุณท่านชอบหน้ากากอันนี้มั้ยคะ?"
10033-210 = "ฮุฮุ ฉันก็ชอบเหมือนกันค่ะ"
10033-220 = "ถ้าคุณท่านต้องการ\nจะถอดออกเมื่อไรก็ได้นะคะ...?"
10033-230 = "คุณท่านไม่สงสัยเรื่องใบหน้า\nภายใต้หน้ากากนี่หรือคะ?"
10033-240 = "วันเกิดของคุณท่าน..."
10033-250 = "ได้อยู่ด้วยกัน\nในวันที่น่ายินดีแบบนี้\nเหมือนความฝันเลยค่ะ"
10033-260 = "อุ๊ย แหมๆ คุณท่าน\nจำวันเกิดฉันได้ด้วยเหรอคะ?"
10033-270 = "ดีใจจังเลย\nฉันไม่ต้องการอะไรอีกแล้วค่ะ"
10033-280 = "ขอให้มีความสุขในวันปีใหม่นะคะ"
10033-290 = "ในปีนี้ฉันก็อยากสร้าง\nความทรงจำสนุกๆ กับคุณท่านค่ะ"
10033-300 = "ในวันคริสต์มาส\nพวกคู่รักจะทำอะไรกันเหรอคะ?"
10033-310 = "ฮุฮุฮุ\nฉันไม่รู้เลยค่ะ♡"
10033-320 = "ช่วยบอกฉันหน่อยได้ไหมคะ?\nคุณ-ครู?"
10033-330 = "หน้ากากนี่ไม่ได้มีไว้สำหรับวันฮาโลวีนค่ะ"
10033-340 = "เมื่อกี้มีใครบางคนถาม\nฉันเลยรู้สึกเศร้านิดหน่อยค่ะ"
10033-350 = "กลับมาแล้วเหรอคะ คุณครู?"
10033-360 = "วาคาโมะผู้นี้\nเฝ้ารอให้คุณท่าน"
10033-370 = "กลับมาที่นี่อยู่ตลอดเลยค่ะ"
10033-380 = "กำลังรออยู่เลยค่ะ คุณครู\nฮุฮุฮุฮุฮุฮุ♥"
10033-390 = "ต้องการอะไรหรือคะ?"
10033-400 = "ไม่ว่าเรื่องไหนฉันก็พร้อม\nจะทำทุกอย่างเลยค่ะ"
10033-410 = "ไม่ว่าเรื่องอะไรก็บอกมาได้เลยค่ะ"
10033-420 = "ทุกสิ่งทุกอย่างของฉัน\nเป็นของคุณท่านทั้งหมดค่ะ\nทั้งร่างกาย และทั้งหัวใจของฉัน..."
10033-430 = "หากคุณท่านต้องการอะไร\nก็บอกฉันมาได้เลยนะคะ"
10033-440 = "ค่ะ ทุกๆ อย่างเลยค่ะ♡"
10033-450 = "อา... ตอนนี้ฉันอยากรีบไป\nโอบกอดคุณท่านจัง..."
10033-460 = "แต่ก็ได้แต่อดทนเอาไว้\nช่างเป็นการทดสอบที่โหดร้ายจริงๆ..."
10033-470 = "ถึงแม้จะจ้องหน้าฉัน\nแบบนั้น..."
10033-480 = "คนที่ฉันให้เห็นใบหน้าจริง\nมีเพียงคุณท่านคนเดียวนะคะ..."
10033-490 = "ถ้าเล่นจ้องกันแบบนี้\nฉันเขินนะคะ"
10033-500 = "วันเกิดของคุณท่าน..."
10033-510 = "ได้อยู่ด้วยกัน\nในวันที่น่ายินดีแบบนี้\nเหมือนความฝันเลยค่ะ"
10033-520 = "อุ๊ย ตายจริง คุณท่าน\nจำวันเกิดฉันได้ด้วยเหรอคะ?"
10033-530 = "ดีใจจังเลย\nฉันไม่ต้องการอะไรอีกแล้วค่ะ"
10033-540 = "ขอให้มีความสุขในวันปีใหม่นะคะ"
10033-550 = "ในปีนี้ฉันก็อยากสร้าง\nความทรงจำสนุกๆ กับคุณท่านค่ะ"
10033-560 = "ในวันคริสต์มาส\nพวกคู่รักจะทำอะไรกันเหรอคะ?"
10033-570 = "ฮุฮุฮุ\nฉันไม่รู้เลยค่ะ♡"
10033-580 = "ช่วยบอกฉันหน่อยได้ไหมคะ?\nคุณ-ครู?"
10033-600 = "มีความสุขจัง วาคาโมะผู้นี้\nทำทุกอย่างเพื่อให้ได้มา\nพบกับคุณท่าน...!"
10033-610 = "ไม่ว่ายังไงฉันก็อยากจะส่ง\nความรู้สึกนี้ให้คุณท่านรับรู้\nด้วยตัวเอง..."
10033-620 = "การที่ได้มาพบกันแบบนี้\nอาจเป็นเพราะด้ายแดง\nที่ผูกเราไว้ด้วยกัน..."
10033-630 = "อา... ถะ...ถ้าคุณท่าน\nยังจ้องกันแบบนั้นละก็..."
10033-640 = "ถึงจะเป็นฉันคนนี้\nก็เขินเป็นเหมือนกันนะคะ..."
10033-650 = "เพียงแค่สายตาของคุณท่าน\nก็ทำให้ฉันรู้สึกสั่นสะท้าน\nไปทั่วร่างกาย..."
10033-660 = "แต่ว่าถ้าคุณท่าน\nต้องการเช่นนั้น...\nก็ได้เสมอเลยค่ะ♡"
10033-670 = "เอาละค่ะคุณท่าน\nมาอยู่ใกล้ๆ ฉันอีกนิด...\nฮุฮุฮุ♡"
10033-2600 = "วาคาโมะผู้นี้เตรียมพร้อมแล้วค่ะ\nจะใช้ปืนนี้กำจัดศัตรูของคุณท่าน\nไปให้หมดเองค่ะ ฮุฮุฮุ ฮุฮุฮุ..."

[translation]
20016-10 = "하아… 블루 아카이브~"
20016-20 = "하아, 어쩌다 이렇게 되어버린 걸까요.\n뭐, 이렇게 된 이상, 해야 할 일은 하겠지만요."
20016-30 = "조용히 책을\n읽을만한 장소가…"
20016-40 = "아아. 귀찮아…"
20016-50 = "너무 북적이는 건\n조금…"
20016-60 = "어딘가,\n들키지 않을만한 곳이…"
20016-70 = "과연, 여기라면\n들키지 않을 것 같네요."
20016-80 = "하아, 뭔가요.\n당번이라니…"
20016-90 = "네네. 부탁받은 이상\n열심히 하겠습니다."
20016-100 = "아아… 어서 오세요. 선생님.\n자, 귀찮은 일이\n잔뜩 기다리고 있다구요."
20016-110 = "후우…"
20016-120 = "살짝 딴 데서\n농땡이 부리지 않을래요?"
20016-130 = "…열심히 하고 있다구요?"
20016-140 = "귀찮지만…\n하아, 어쩔 수 없죠."
20016-150 = "뭔가요.\n해야 할 일은\n다 끝내뒀는데요."
20016-160 = "어쩐 일이신가요?\n뭔가 부탁할 거라도?"
20016-170 = "그런 표정 안 지으셔도,\n오늘이 선생님의 생일이라는\n건 알고 있어요."
20016-180 = "…어쩔 수 없죠.\n축하 정도는 해드릴게요."
20016-190 = "생일 축하합니다.\n선생님."
20016-200 = "…네? 제 생일…?\n어떻게 그걸…"
20016-210 = "아뇨,\n별로 싫다는 게 아니라…"
20016-220 = "잠깐 떨어져 주세요.\n지금은 다가오지\n말아주세요…"
20016-230 = "새해 복 많이 받으세요."
20016-240 = "그렇네요,\n새해 소원이라면…"
20016-250 = "올해는 귀찮은 일이,\n가능한 한 적었으면\n좋겠네요."
20016-260 = "모두 들떠 있는\n분위기네요…"
20016-270 = "아뇨, 딱히 싫진 않아요."
20016-280 = "밖에 나가는 것도 좀 그렇고,\n어쩔 수 없죠. 선생님이랑\n같이 있어 드릴까요."
20016-290 = "자, 냉큼 사탕 주세요."
20016-300 = "……응? 제대로 말해달라고요?"
20016-310 = "네네~\n트릭 오어 트릿~"
20016-330 = "후후, 제법 나쁘지\n않은 곳이지요?"
20016-340 = "이 푹신푹신한 방석,\n가지런히 놓인 여러 간식들."
20016-350 = "거기다 책과 게임까지 잔뜩."
20016-360 = "저만의, 제가 자랑하는\n쉼터라구요. 어떠신가요?"
20016-370 = "후후, 좀 더 감탄하고,\n칭찬하셔도 좋다구요?"
20016-380 = "그럼 공범도 있겠다.\n늘 그랬듯이 오늘도\n땡땡이 쳐볼까요?"
20016-390 = "네~? 선생님?"
20016-2600 = "하아, 정말… 이렇게까지 해주신다면,\n저도 진심으로 할 수밖에 없잖아요."

[translation]
20016-10 = "哈啊…蔚藍檔案～"
20016-20 = "唉，為什麼會變成這樣……\n嘛都這樣了，該做的事還是會做唷。"
20016-30 = "可以安靜\n看書的地方……"
20016-40 = "啊啊，\n真麻煩……"
20016-50 = "太吵鬧的地方\n有點……"
20016-60 = "哪裡有，\n不會被發現的地方……"
20016-70 = "原來如此，這裡的話\n或許不會被發現呢。"
20016-80 = "唉，什麼值日制嘛……"
20016-90 = "是是，既然被拜託了\n就會努力唷。"
20016-100 = "啊啊……歡迎回來，老師。\n你看，麻煩的工作\n已經堆積如山了唷。"
20016-110 = "呼……"
20016-120 = "要不要稍微\n去哪裡偷懶？"
20016-130 = "……我有確實在做唷？"
20016-140 = "雖然很麻煩……\n唉，真沒辦法呢。"
20016-150 = "怎麼了？該做的事\n都確實完成了啊？"
20016-160 = "怎麼了，\n有什麼請求嗎？"
20016-170 = "就算不擺出那種表情，\n我也知道今天是老師的生日。"
20016-180 = "……真沒辦法呢，\n就幫你慶祝吧。"
20016-190 = "祝你生日快樂，老師。"
20016-200 = "……什麼？我的生日……\n你從哪裡得知的……"
20016-210 = "不，\n也不是說討厭……"
20016-220 = "請先到那邊去，\n現在不要靠近我。"
20016-230 = "祝你新年快樂"
20016-240 = "我想想，\n真要說有什麼願望的話……"
20016-250 = "今年的麻煩事，\n盡可能少一些就好了呢。"
20016-260 = "大家都很興奮呢……"
20016-270 = "不，也不是說討厭。"
20016-280 = "出去外面也有點那個，\n因為沒辦法\n就跟老師在一起吧……"
20016-290 = "來，請快點給我糖果。"
20016-300 = "……咦？\n想要我好好說出來？"
20016-310 = "是是，\nTrick or Treat～"
20016-330 = "呵呵，不覺得\n這裡很不錯嗎？"
20016-340 = "這鬆軟的坐墊，\n品項齊全的各種零嘴。"
20016-350 = "再加上\n很多書本和遊戲。"
20016-360 = "這就是我，\n引以為傲的專屬休息空間。\n你覺得如何啊？"
20016-370 = "哼哼，老師可以再多佩服我一點，\n再多稱讚我一點唷？"
20016-380 = "那麼，既然今天\n有人陪我當共犯，那今天\n也像往常一樣盡情偷懶吧。"
20016-390 = "是吧，老師？"
20016-2600 = "唉，真是的……被做到這種程度，\n不就不得不認真了嗎。"

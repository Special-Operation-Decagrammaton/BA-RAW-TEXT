[translation]
10058-10 = "Blue Archive!"
10058-20 = "หัวหน้าชมรมอัศวินบรรเทาทุกข์ อาโอโมริ มิเนะค่ะ\nคนที่ต้องการให้ช่วยบรรเทาทุกข์อยู่ที่ไหนคะ?"
10058-30 = "ไม่มีคนที่ต้องการ...\nให้ช่วยอยู่เลยเหรอคะ?"
10058-40 = "เป็นสถานที่ที่ทำให้\nรู้สึกสงบนะคะ"
10058-50 = "จัดพิธีชงชาที่นี่\nดีมั้ยคะ?"
10058-60 = "การพักผ่อนเป็นสิ่งที่สำคัญ\nสำหรับทุกคนนะคะ แน่นอนว่า\nสมาชิกชมรมอัศวิน\nบรรเทาทุกข์ก็ด้วยค่ะ"
10058-70 = "ดื่มชาแดงหลังอาหาร\nสักแก้ว เพื่อความงาม\nและสุขภาพที่ดีค่ะ"
10058-80 = "เชิญค่ะคุณครู\nวันนี้เรามาพยายาม\nเพื่อความสงบสุขของคิโวทอส\nด้วยกันนะคะ"
10058-90 = "คุณครูคะ เป็นอะไรรึเปล่าคะ?\nมีเรื่องอะไรงั้นเหรอคะ?"
10058-100 = "ไม่เป็นไรค่ะ ฉันคุ้นชิน\nกับการรอคอยแล้วค่ะ\nไม่ต้องเป็นห่วงหรอกค่ะ"
10058-110 = "มีเรื่องอะไรเหรอคะ?\nหากต้องการให้ฉันช่วย\nก็เรียกฉันได้ตลอดเลยนะคะ"
10058-120 = "วันนี้คุณครูคงยุ่งสินะคะ...\nฉันจะช่วยคุณครูทำงานเองค่ะ"
10058-130 = "ถ้าคุณครูเหนื่อยละก็\nบอกฉันได้ตลอดเลยนะคะ"
10058-140 = "ไม่ว่าจะเป็นชาแดง ขนม\nหรือหมอนหนุนตัก...\nถ้าเป็นสิ่งที่ฉันทำได้ละก็\nฉันจะจัดเตรียมให้ทุกอย่างเลยค่ะ"
10058-150 = "คงไม่มีอะไรดีไปกว่า\nการที่ชมรมอัศวินบรรเทาทุกข์\nไม่ต้องไปบรรเทาทุกข์หรอกค่ะ"
10058-160 = "หวังว่าวันที่สงบสุขแบบนี้\nจะดำเนินต่อไปเรื่อยๆ นะคะ"
10058-170 = "ถึงอาคารของชมรมอัศวิน\nบรรเทาทุกข์จะดีมากแล้วก็ตาม\nแต่ที่นี่ดูดีมากเลยนะคะ"
10058-180 = "หรือว่าจะย้ายสาขาทำการมาดีนะ..."
10058-190 = "ปะ... เปล่าค่ะ ฉันแค่พึมพำคนเดียวค่ะ\nคุณครูอย่าสนใจเลยค่ะ"
10058-200 = "คุณครู สุขสันต์วันเกิดค่ะ"
10058-210 = "ฉันเตรียมอุปกรณ์ฉุกเฉิน\nสำหรับรักษาบาดแผลต่างๆ\nไว้ให้แล้วค่ะ เป็นยังไงบ้างคะ...?"
10058-220 = "ขอรับไว้แค่น้ำใจก็พองั้นเหรอคะ?\nถ้างั้น... ก็ได้ค่ะ"
10058-230 = "คุณครูจำวันเกิดฉันได้งั้นเหรอคะ?\nขอบคุณค่ะ..."
10058-240 = "ฉันดีใจมากเลยค่ะ"
10058-250 = "ถ้างั้น... วันนี้ฉันจะขอเอาแต่ใจ\nสักหน่อย ได้หรือเปล่าคะ? ฮิฮิ..."
10058-260 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ"
10058-270 = "เอาละค่ะ คุณครู...\nไปกันเลยมั้ยคะ?"
10058-280 = "ในปีนี้ฉันก็จะช่วยเหลือทุกคน\nอย่างเต็มที่เลยค่ะ"
10058-290 = "ได้ยินว่าวันคริสต์มาส\nคือวันแห่งการ \"แบ่งปัน\" และ\nวันแห่งการ \"ขอบคุณ\" ค่ะ"
10058-300 = "คะ... คุณครู ของขวัญวันคริสต์มาส\nมีอะไรที่อยากได้รึเปล่าคะ?"
10058-310 = "พอถึงวันฮาโลวีน คนอื่นๆ\nมักบอกฉันว่า \"แต่งชุดคอสเพลย์\nเป็นอัศวินเท่ดีจัง\" แบบนี้น่ะค่ะ"
10058-320 = "ทั้งที่ฉันใส่ชุดนี้ประจำแท้ๆ\nพอได้ยินแบบนั้นทุกปีก็รู้สึกเศร้าค่ะ"
10058-340 = "คุณครู... เป็นอะไรรึเปล่าคะ?\nบาดเจ็บตรงไหนรึเปล่าคะ?"
10058-350 = "อากาศตอนกลางคืนนี่\nทำให้รู้สึกดีจังเลยนะคะ"
10058-360 = "กลิ่นของต้นหญ้า...\nเสียงน้ำไหล... ช่วยทำให้\nจิตใจสงบมากเลยค่ะ"
10058-370 = "...เป็นอะไรเหรอคะ?"
10058-380 = "เจิดจ้า...เกินไปงั้นเหรอคะ?"
10058-390 = "ฮุฮุ... อาจจะเป็นอย่างนั้นก็ได้ค่ะ"
10058-400 = "ถ้าคุณครูรู้สึกไม่สบายตัว\nจะเอนมาซบไหล่ฉัน หรือว่า\nจะนอนหนุนตักฉันก็ได้นะคะ"
10058-410 = "ไม่ต้องกังวลนะคะ\nไม่ว่าจะเกิดเรื่องอะไรขึ้น\nฉันก็จะปกป้องคุณครูเองค่ะ"
10058-2600 = "ขอบคุณที่เป็นห่วงนะคะ\nฉันจะทุ่มเทสุดกำลัง\nเพื่อสนับสนุนคุณครูเองค่ะ"

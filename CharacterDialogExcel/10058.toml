[translation]
10058-10 = "Blue Archive!"
10058-20 = "I'm Aomori Mine, Remedial Knights captain. Does anyone need medical assistance?"
10058-30 = "I'm keeping an eye out for people who are ill or injured."
10058-40 = "This place is so calming."
10058-50 = "It's a lovely spot for a tea party. Shall we?"
10058-60 = "Taking breaks is important for your health. The Remedial Knights aren't exempt from that."
10058-70 = "Drinking black tea after a meal is a boon for health and beauty."
10058-80 = "Welcome, Sensei. Let's work together towards peace in Kivotos, as always."
10058-90 = "Sensei, what's wrong? Did something happen?"
10058-100 = "Please don't worry about me. I'm used to waiting!"
10058-110 = "Does anything hurt? Please call on me any time you need help."
10058-120 = "You certainly seem busy. I can help with anything you need."
10058-130 = "If you're tired, just say so."
10058-140 = "I'll take care of anything you need, like black tea or snacks. If you want, you can even use my lap for taking a nap..."
10058-150 = "The ideal situation is one in which the Remedial Knights aren't needed at all."
10058-160 = "I hope we'll continue to see such peaceful days."
10058-170 = "The Remedial Knights' building is decent, but this place..."
10058-180 = "Hm, maybe it's time to relocate..."
10058-190 = "Oh? No, no, just talking to myself. Don't worry about it!"
10058-200 = "Happy birthday, Sensei."
10058-210 = "I've put together a first aid kit that can take care of a plethora of injuries. So? What do you think?"
10058-220 = "It's the thought that counts? I...see..."
10058-230 = "You remembered! Thank you..."
10058-240 = "I'm so happy."
10058-250 = "If it's okay... Can I ask you to spoil me today? Heehee."
10058-260 = "Happy New Year."
10058-270 = "Okay, Sensei. Shall we?"
10058-280 = "I'll still help everyone who needs medical attention this year."
10058-290 = "I've heard it said that Christmas is a day for giving gifts to show your appreciation."
10058-300 = "Um... Sensei. In that case, what kind of a gift would you like?"
10058-310 = "Every Halloween, people always come up to me to tell me how nice my \"knight costume\" is."
10058-320 = "But...this is just what I always wear! I don't appreciate hearing it year after year."
10058-340 = "Sensei, is everything okay? Are you hurt anywhere at all?"
10058-350 = "Ah, the night air is lovely!"
10058-360 = "The sweet smell of the grass, the soft sounds of the river... It's such a calming atmosphere."
10058-370 = "...What's wrong?"
10058-380 = "It's blinding?"
10058-390 = "I understand. Heehee."
10058-400 = "If you're nervous, you can lean on me! Or, if you'd like to close your eyes, you can put your head on my lap."
10058-410 = "Don't worry, Sensei. No matter what happens, I'll be here to protect you."
10058-2600 = "Thank you so much for your kindness. I'll do everything I can to be helpful to you."

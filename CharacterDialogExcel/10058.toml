[translation]
10058-10 = "蔚藍檔案！"
10058-20 = "我是救護騎士團團長蒼森美禰。\n需要救護的人在哪裡呢？"
10058-30 = "沒有…\n需要救護的人嗎？"
10058-40 = "這裡…會讓\n心情平靜下來呢。"
10058-50 = "在這裡舉辦\n茶會如何呢？"
10058-60 = "無論對誰來說\n休息都是必要的。\n當然，救護騎士團也是。"
10058-70 = "為了健康和美容，\n用餐後請喝一杯紅茶。"
10058-80 = "非常歡迎您的到來，老師。\n今天也為了奇普托斯的和平\n一起努力吧。"
10058-90 = "老師，今天\n發生了什麼事嗎？"
10058-100 = "沒關係，我已經\n習慣等待了，\n您不需要在意。"
10058-110 = "發生了什麼事嗎？\n如果需要我的幫忙，\n請隨時告知。"
10058-120 = "看來您今天也很忙呢…\n請讓我幫點忙吧。"
10058-130 = "覺得疲倦的時候\n請隨時跟我說。"
10058-140 = "紅茶、茶點、膝枕…\n只要是我能做到的事，\n請儘管說。"
10058-150 = "沒有比救護騎士團\n無須出動更好的事。"
10058-160 = "希望那樣安穩的日子\n能一直維持下去。"
10058-170 = "雖然救護騎士團的建築很\n不錯，但這裡也相當棒呢。"
10058-180 = "還是乾脆\n把支部搬遷到這裡…"
10058-190 = "啊，沒什麼。\n我在自言自語，請別在意。"
10058-200 = "老師，祝您生日快樂。"
10058-210 = "我準備了可以應對\n各種傷勢的急救箱，\n老師覺得怎麼樣呢…？"
10058-220 = "……有這份心意就足夠了？\n這樣呀……"
10058-230 = "……您有記得呢。\n謝謝您……"
10058-240 = "我非常開心。"
10058-250 = "那麼……今天稍微\n撒嬌一下也沒關係吧？\n呵呵。"
10058-260 = "新年快樂。"
10058-270 = "來，老師……\n我們走吧。"
10058-280 = "今年我也會對大家\n伸出救援之手。"
10058-290 = "聽說聖誕節是「感謝」\n與「分享」的日子。"
10058-300 = "那個…老師，聖誕節\n禮物該送什麼比較好呢？"
10058-310 = "到了萬聖節的時候，常會聽見\n「真是不錯的騎士Cosplay呢」\n之類的話。"
10058-320 = "但這對我來說是日常服裝…\n每年都覺得很遺憾。"
10058-340 = "老師，您還好嗎？\n有沒有哪裡受傷？"
10058-350 = "夜晚的空氣真舒服呢……"
10058-360 = "草的香氣與潺潺流水……\n能讓內心平靜下來。"
10058-370 = "……您怎麼了？"
10058-380 = "很耀眼……是嗎？"
10058-390 = "呵呵，或許\n真的是那樣呢。"
10058-400 = "如果覺得靜不下來，\n要倚靠著我，或是在我的\n膝蓋上休息\n也沒關係唷。"
10058-410 = "請別擔心。\n不管發生什麼事，\n我都一定會\n保護老師的。"
10058-2600 = "感謝您的關心。\n……我會賭上一切，\n成為老師的助力。"

[translation]
10058-10 = "블루 아카이브!"
10058-20 = "구호기사단 단장 아오모리 미네라고 합니다.\n구호가 필요한 분은 어디 계신가요?"
10058-30 = "구호가 필요한 분은…\n안 계시려나요."
10058-40 = "여기는… 기분이\n편안해지는군요."
10058-50 = "여기서 다과회를\n여는 건 어떨까요?"
10058-60 = "누구에게나 휴식은\n필요합니다. 물론,\n구호기사단에게도."
10058-70 = "건강과 미용을 위해서,\n식후 한 잔의 홍차를."
10058-80 = "어서 오세요, 선생님.\n오늘도 키보토스의 평화를 위해\n함께 노력합시다."
10058-90 = "선생님, 오늘\n무슨 일 있으셨나요?"
10058-100 = "괜찮습니다, 기다리는 것은\n익숙해져 있기 때문에\n걱정하지 않으셔도 됩니다."
10058-110 = "무슨 일 있으신가요?\n제 손길이 필요하시면\n언제든지 불러주세요."
10058-120 = "오늘도 바쁘신 듯 하군요……\n무언가 돕게 해 주십시오."
10058-130 = "피곤하시다면 언제든\n말씀해 주십시오."
10058-140 = "홍차나 다과, 무릎베개…\n제가 할 수 있는 것이라면\n무엇이든 준비하겠습니다."
10058-150 = "구호기사단이 나설 차례가\n없는 것보다 더 좋은 것은\n없겠지요."
10058-160 = "그런 평온한 나날이\n계속되기를 바랍니다."
10058-170 = "구호기사단 건물도 나쁘지\n않지만 이곳도 꽤 멋지네요."
10058-180 = "아예 지부를 이전하는 것도…"
10058-190 = "아, 아뇨. 혼잣말이니\n신경쓰지 마세요."
10058-200 = "선생님. 생일 축하드립니다."
10058-210 = "여러 부상에 대응할 수 있는\n구급 상자를 준비했습니다만,\n어떠신가요…?"
10058-220 = "…마음만으로 충분하다구요?\n그렇, 군요…."
10058-230 = "…기억해 주셨군요.\n감사합니다…."
10058-240 = "굉장히, 기쁩니다."
10058-250 = "그럼… 오늘은 조금\n어리광부려도 괜찮을까요? 후후."
10058-260 = "새해 복 많이 받으세요."
10058-270 = "자, 선생님… 가 보실까요?"
10058-280 = "올해도 모두에게 구호의\n손길을 내밀어드릴 겁니다."
10058-290 = "크리스마스는 '감사'를\n'나누기' 위한 날이라고\n들었습니다."
10058-300 = "그…. 선생님, 크리스마스\n선물은 뭐가 좋으세요?"
10058-310 = "할로윈 날이 되면\n'멋진 기사 코스프레네요'라는\n말을 듣곤 합니다."
10058-320 = "저에게는 평상복입니다만…\n매년, 정말 억울하다구요."
10058-340 = "선생님, 괜찮으십니까?\n다친 곳은 없으신가요?"
10058-350 = "밤공기는 기분이 좋네요."
10058-360 = "풀의 향기에, 강의 물소리…\n마음이 안정됩니다."
10058-370 = "…왜 그러시죠?"
10058-380 = "눈부시다… 고요?"
10058-390 = "후후, 확실히\n그럴지도 모르겠네요."
10058-400 = "불안하시다면,\n저에게 기대거나\n무릎을 베고 주무셔도\n괜찮아요."
10058-410 = "걱정하실 필요 없습니다.\n설령 무슨 일이 있어도,\n제가 반드시 선생님을\n지켜 드릴테니까요."
10058-2600 = "신경 써주셔서 감사합니다.\n…저의 모든것을 걸고,\n선생님의 힘이 되겠습니다."

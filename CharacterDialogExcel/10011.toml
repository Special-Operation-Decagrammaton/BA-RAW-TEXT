[translation]
10011-20 = "我是培育支援部梅花園的教官，旬。\n我家的孩子們就拜託你囉，\n老．師？"
10011-30 = "呵呵，下次把大家\n帶來這裡一起上課吧？"
10011-40 = "明明還沒到午覺時間…\n卻有點想睡了…"
10011-50 = "梨花有好好地\n照顧孩子們嗎…"
10011-60 = "哎呀，真可愛…"
10011-70 = "呵呵，真討人喜歡～"
10011-80 = "歡迎你來，老師。\n要先吃飯呢？\n還是先洗澡呢？"
10011-90 = "還是…先上課？"
10011-100 = "上次上到一半的課程\n我們繼續開始吧，呵呵…"
10011-110 = "真是的～老師不能\n向我撒嬌唷。"
10011-120 = "不過偶爾一次的話…\n可以原諒你唷？"
10011-130 = "呵呵，今天也\n請多多指教哦？"
10011-140 = "對～是旬哦～"
10011-150 = "乖孩子，乖孩子～"
10011-160 = "繼續摸的話…"
10011-170 = "會被罵的唷？"
10011-180 = "Happy Birth Day\nTo You♪\nHappy Birth Day\nTo You♬"
10011-190 = "Happy Birth Day\nDear 老師～♪\nHappy Birth Day\nTo You♬"
10011-200 = "呼…又大了\n一歲呢…"
10011-210 = "我的年齡是嗎？\n呵呵，這是祕密唷。"
10011-220 = "呵呵，今年也\n請多多指教哦～"
10011-230 = "噓，老師。\n聖誕老人的裝扮\n請小心不要露餡了哦。"
10011-240 = "畢竟小朋友單純的童心\n比什麼都重要嘛。"
10011-250 = "哎呀，小朋友們不知道\n從哪裡拿到了一堆糖果呢。"
10011-260 = "Trick…"
10011-270 = "然後是什麼來著？"
10011-290 = "哎呀，\n你醒了嗎？"
10011-300 = "今天…\n真的很開心。\n呵呵。"
10011-310 = "哎呀，\n已經到了小朋友們\n要回來的時間了呢。"
10011-320 = "老師是不是也差不多該\n回去工作會比較好…"
10011-330 = "不，果然還是…呵呵，\n請再稍微休息一下吧，老師。"
10011-340 = "今天的授課\n會由我來代替老師的。"
10011-350 = "啊啊…真可愛…\n呵呵。"
10011-2600 = "雖然不想使用它……\n不過愛的鞭策\n有時也是必要的。"

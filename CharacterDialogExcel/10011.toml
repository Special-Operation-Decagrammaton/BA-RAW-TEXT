[translation]
10011-20 = "훈육지원부 매화원의 교관, 슌이라고 합니다.\n저희 아이들을 잘 부탁드릴게요, 선.생.님?"
10011-30 = "후후, 다음에는 이곳에서\n다 같이 수업을 할까요?"
10011-40 = "낮잠 시간은 아직인데…\n어쩐지 잠이 오네요…"
10011-50 = "린카는 아이들을\n잘 돌보고 있으려나…"
10011-60 = "어머나, 예뻐라…"
10011-70 = "후후, 사랑스럽네요~"
10011-80 = "어서 오세요, 선생님.\n식사부터 하실래요,\n목욕부터 하실래요?"
10011-90 = "아니면… 수업부터?"
10011-100 = "지난번에 하던 수업을\n다시 시작하죠, 후후…"
10011-110 = "정말~ 선생님은 제게\n어리광 부리시면 안 돼요."
10011-120 = "하지만 가끔이라면…\n봐드릴게요?"
10011-130 = "후훗, 오늘도\n잘 부탁드릴게요?"
10011-140 = "네~ 슌이랍니다~"
10011-150 = "착하다, 착해~"
10011-160 = "자꾸 손대시면…"
10011-170 = "떽, 할거에요?"
10011-180 = "생일 축하합니다~ ♪\n생일 축하합니다~ ♬"
10011-190 = "사랑하는 선생님~ ♪\n생일 축하합니다~ ♬"
10011-200 = "후우… 또 한 살,\n나이를 먹고 말았네요…"
10011-210 = "제 나이가 몇이나고요?\n후후, 비밀이랍니다."
10011-220 = "후후, 올 한 해도\n잘 부탁드려요~."
10011-230 = "쉿, 선생님.\n산타 분장을 들키지 않게\n조심하세요."
10011-240 = "아이들의 동심은\n그 무엇보다 소중하니까요."
10011-250 = "어머, 아이들이 어디서\n사탕을 잔뜩 받아왔네요."
10011-260 = "트릭…"
10011-270 = "뭐라고 하더라?"
10011-290 = "어머, 일어나셨군요."
10011-300 = "오늘은… 정말 즐거웠어요.\n후후."
10011-310 = "어머,\n아이들이 돌아올 시간이네요."
10011-320 = "슬슬 돌아가 보셔야 하지\n않으시겠어요?"
10011-330 = "아니… 후훗,\n좀 더 쉬세요, 선생님."
10011-340 = "오늘 수업은 제가 대신 할게요."
10011-350 = "아아… 귀여워라…\n후훗."
10011-2600 = "이걸 쓰고 싶지는 않았지만…\n따끔한 사랑의 매도 가끔은\n필요한 법이랍니다."

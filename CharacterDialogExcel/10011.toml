[translation]
10011-20 = "ฉันชื่อชุน ผู้ฝึกสอนของชมรมดูแลวินัยแห่งสวนต้นบ๊วยค่ะ\nขอฝากเด็กๆ ของฉันด้วนะคะ คุณครู~"
10011-30 = "ฮุฮุ คราวหน้าพวกเรา\nมานั่งเรียนกันที่นี่ดีไหมคะ?"
10011-40 = "ยังไม่ถึงเวลานอนกลางวันเลย...\nทำไมถึงได้ง่วงแบบนี้นะ..."
10011-50 = "รินกะจะดูแลเด็กๆ ดีรึเปล่านะ..."
10011-60 = "อุ๊ย สวยจังเลย... "
10011-70 = "ฮุฮุ น่ารักจังเลยค่ะ~"
10011-80 = "เชิญค่ะ คุณครู\nจะทานอาหารก่อนไหมคะ?\nหรือว่าจะอาบน้ำก่อนดีคะ?"
10011-90 = "หรือว่า... จะเริ่ม \"เรียน\" ก่อนดีคะ?"
10011-100 = "เรามาเรียนกันต่อ....\nจากบทเรียนครั้งก่อนเถอะค่ะ ฮิฮิ"
10011-110 = "โธ่~ คุณครูอย่างอแงใส่ฉันสิคะ"
10011-120 = "แต่ว่าถ้านานๆ ทีละก็...\nฉันจะยอมให้แล้วกันนะคะ"
10011-130 = "ฮุฮุ วันนี้ก็ขอฝากตัวด้วยนะคะ"
10011-140 = "ค่า~ ชุนเองค่ะ~"
10011-150 = "เก่งจัง~ เก่งมากเลยค่ะ~!"
10011-160 = "ถ้ามาแตะบ่อยๆ แบบนี้..."
10011-170 = "ฉันจะดุแล้วนะคะ"
10011-180 = "แฮปปี้ เบิร์ธเดย์ ทูยู~ ♪\nแฮปปี้ เบิร์ธเดย์ ทูยู~ ♪"
10011-190 = "แฮปปี้ เบิร์ธเดย์ เดียร์ มาย เซ็นเซ~ ♪\nแฮปปี้ เบิร์ธเดย์ ทูยู~ ♪"
10011-200 = "เฮ้อ... อายุเพิ่มขึ้น\nอีกหนึ่งปีแล้วนะคะ..."
10011-210 = "ฉันอายุเท่าไหร่น่ะเหรอคะ?\nฮุฮุ ความลับค่ะ"
10011-220 = "ฮุฮุ ปีนี้ก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
10011-230 = "ชู่ว คุณครูคะ\nต้องระวังไม่ให้จับได้\nว่าแต่งตัวเป็นซานต้านะคะ"
10011-240 = "ความเชื่อของพวกเด็กๆ\nเป็นเรื่องสำคัญมากนะคะ"
10011-250 = "ตายจริง พวกเด็กๆ\nได้ลูกกวาดมาเยอะเลยนะคะ"
10011-260 = "ทริก..."
10011-270 = "ต้องพูดว่ายังไงน้า?"
10011-290 = "อุ๊ย ตื่นแล้วเหรอคะ"
10011-300 = "วันนี้ฉันสนุกมากเลยค่ะ ฮุฮุ"
10011-310 = "ตายจริง ถึงเวลาที่\nพวกเด็กๆ จะกลับมาแล้วค่ะ"
10011-320 = "คุณครูเองก็จะต้อง\nกลับแล้วรึเปล่าคะ?"
10011-330 = "เปล่าหรอกค่ะ... ฮุฮุ\nพักต่ออีกหน่อยเถอะค่ะ คุณครู"
10011-340 = "เดี๋ยววันนี้ฉันจะเข้าคลาสแทนเองค่ะ"
10011-350 = "อา... น่ารักจัง ฮุฮุ"
10011-2600 = "ถึงไม่ค่อยอยากใช้สักเท่าไร...\nแต่บางครั้งการหวดแส้แห่งความรัก\nให้แสบๆ คันๆ ก็คงจำเป็นเหมือนกันค่ะ"

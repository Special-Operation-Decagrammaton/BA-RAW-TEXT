[translation]
10011-20 = "I'm Shun, an instructor at the Disciplinary Support Department, known as Plum Blossom Garden. Please take good care of our children, Sensei."
10011-30 = "Heehee. Should we have a class here next time?"
10011-40 = "It's not nap time yet...but I'm still sleepy..."
10011-50 = "I wonder if Rinka is taking good care of the children..."
10011-60 = "Oh, my. How pretty..."
10011-70 = "Heehee. How adorable!"
10011-80 = "Welcome back, Sensei. What would you like to do first? Eat or take a bath?"
10011-90 = "Or...would you rather have class first?"
10011-100 = "Then let's pick up where we left off. Heehee..."
10011-110 = "Come on, Sensei! You can't act like a child when you're with me."
10011-120 = "If it's only every once in a while... I'll let it slide."
10011-130 = "Heehee. I'm excited for today!"
10011-140 = "Yes, it's Shun!"
10011-150 = "Nice! Very nice!"
10011-160 = "If you keep doing that..."
10011-170 = "...I'm gonna yell at you!"
10011-180 = "Happy birthday to you! ♪ Happy birthday to you! ♬"
10011-190 = "Happy birthday, dear Sensei! ♪ Happy birthday to you! ♬"
10011-200 = "Phew... Another year gone by. I'm getting older."
10011-210 = "How old am I? Heehee."
10011-220 = "Heehee. I'm looking forward to another year of us working together!"
10011-230 = "Hush, Sensei. Be careful not to get caught wearing the Santa costume."
10011-240 = "You mustn't take away the children's sense of belief."
10011-250 = "Oh, the children received so much candy."
10011-260 = "Trick or..."
10011-270 = "How does it go again?"
10011-290 = "Goodness. You're awake."
10011-300 = "Today...was quite enjoyable. Heehee."
10011-310 = "Oh, dear. It's time for the children to come in."
10011-320 = "Should you head back now?"
10011-330 = "No...heehee. You should rest a little more, Sensei."
10011-340 = "Don't worry about today's class... I'll substitute for you."
10011-350 = "Aw... You're so cute. Heehee."
10011-2600 = "I didn't want to use this, but sometimes tough love is necessary."

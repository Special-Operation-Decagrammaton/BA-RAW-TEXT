[translation]
10008-10 = "블루 아카이브"
10008-20 = "아앙???\n나참, 결국 만나버렸잖아.\n이렇게 된 이상 도와줄 수 밖에."
10008-30 = "흠.\n꽤 괜찮은 곳이군."
10008-40 = "뭐야.\n격려해 주는 거야?\n하! 재미있네."
10008-50 = "가장 재미있는 거?\n흠. 이기는 거지."
10008-60 = "에… 그, 그러니까…\n바, 바보 선생!"
10008-70 = "으음… 부끄럽지만.\n고, 고맙다고!"
10008-80 = "저기… 그러니까…\n가, 같이 나가자구!"
10008-90 = "여. 선생. 늦었잖아."
10008-100 = "자. 선생.\n오늘도 신나게 가보자구."
10008-110 = "나참. 나를 기다리게 하다니,\n어이가 없네."
10008-120 = "자~ 청소라도 하러 갈까?"
10008-130 = "최고와 일한다는 감각,\n이제 알겠지?"
10008-140 = "일은 확실하게 한다고."
10008-150 = "도움이 필요하면 언제든 말해.\n뭐든지 해줄 테니까."
10008-160 = "여 선생. 해피 버스 데이라구!\n그… 우연히…\n얻은 케잌이 있는데…"
10008-170 = "…머, 먹을래?"
10008-180 = "하하 선생!\n오늘이 무슨 날인지 알아?\n몰라도 상관 없어."
10008-190 = "나는 선물을 받아야겠어.\n지.금.당.장!"
10008-200 = "여 선생. 해피 뉴이어다.\n올해도… 그러니까…"
10008-210 = "아 진짜! 잘 부탁한다고!!"
10008-220 = "여 선생. 메리 크리스마스… 잖아?"
10008-230 = "…없어?\n선물 말야!"
10008-240 = "여 선생.\n트릭 오얼 트릿이라구."
10008-250 = "…에?\n무슨 뜻인지 모르는거냐?!"
10008-270 = "어서 와 선생.\n나만의 특등석에 온 걸 환영해!"
10008-280 = "나는 이 학교가 좋아.\n그리고… 이 순간도."
10008-290 = "무섭지 않냐고? 그렇지 않아.\n단지, 설레기는 하네."
10008-300 = "뭐, 가끔 땡땡이 치는 것도\n즐거운 걸. 하하하!"
10008-2600 = "도깨비에겐 방망이, 용에겐 날개.\n그리고 나에겐 두 자루의 서브머신건!"

[translation]
10008-10 = "Blue Archive"
10008-20 = "เอ๋???\nเจอกันจนได้สินะ\nงั้นก็คงต้องเข้าไปช่วยแล้ว"
10008-30 = "อืม...\nที่นี่ไม่เลวเลยนะ"
10008-40 = "อะไรน่ะ มาให้กำลังใจฉันเหรอ?\nเฮอะ! บันเทิงชะมัด"
10008-50 = "สิ่งที่สนุกที่สุดเหรอ?\nอืม... การได้เอาชนะไง"
10008-60 = "เอ่อ... ก็แบบ...\nครูเนี่ยไม่รู้อะไรเลย!"
10008-70 = "อืม... ขอบคุณนะ\nแอบเขินอยู่นะเนี่ย..."
10008-80 = "เอ่อ... คือว่า...\nออกไปข้างนอกด้วยกันเถอะ!"
10008-90 = "นี่ครู... มาสายนะ"
10008-100 = "เอาล่ะ! \nวันนี้ก็สู้เค้านะครู"
10008-110 = "เหอะ... ปล่อยให้ฉันรอเหรอ?\nไม่อยากจะเชื่อเลย"
10008-120 = "ดีละ~ ไปทำความสะอาดกัน!"
10008-130 = "ทีนี้รู้แล้วใช่มั้ยว่าการทำงาน\nกับคนเก่งมันเป็นยังไง?"
10008-140 = "ทำงานให้มันดีๆ เหอะ"
10008-150 = "ถ้าอยากให้ช่วยก็บอก\nแล้วฉันจะทำให้เอง"
10008-160 = "นี่ ครู! แฮปปี้เบิร์ธเดย์!\nเอ่อ... เค้กนี่...\nฉันบังเอิญได้รับมา..."
10008-170 = "จะ... จะกินมั้ยล่ะ?"
10008-180 = "นี่ครู!\nรู้มั้ยว่าวันนี้วันอะไร?\nไม่รู้ก็ไม่เป็นไรหรอกนะ"
10008-190 = "แต่ฉันต้องได้ของขวัญนะ!\nส่ง มา เดี๋ยว นี้ เลย!"
10008-200 = "นี่ครู! แฮปปี้นิวเยียร์!\nปีนี้ก็... เอ่อ..."
10008-210 = "แบบว่า... ฝากตัวด้วยนะ!!"
10008-220 = "นี่ครู! เมอร์รีคริสต์มาส"
10008-230 = "ไหนล่ะ...?\nไหนของขวัญ!"
10008-240 = "นี่ครู\nทริก ออร์ ทรีต?"
10008-250 = "หา...?\nไม่รู้ว่านั่นแปลว่าอะไรเหรอ?!"
10008-270 = "เข้ามาสิครู\nขอต้อนรับสู่ที่นั่งพิเศษของฉัน!"
10008-280 = "ฉันชอบโรงเรียนนี้\nแล้วก็... ชอบเวลานี้ด้วย"
10008-290 = "ฉันน่ะเหรอ? ไม่กลัวหรอก\nก็แค่ตื่นเต้นนิดหน่อย"
10008-300 = "ก็นะ บางครั้งการได้โดดเรียน\nมันก็สนุกดีนี่ ฮ่าฮ่าฮ่า!"
10008-2600 = "มอบกระบองให้ยักษ์ ติดปีกให้มังกร\nเพราะงั้นสำหรับฉันก็คือปืนกลมือคู่ยังไงล่ะ!"

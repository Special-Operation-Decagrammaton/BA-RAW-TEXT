[translation]
20026-10 = "Blue Archive"
20026-20 = "งานโยธา งานก่อสร้าง งานรื้อถอน... ถ้าต้องการความช่วยเหลือ\nก็ติดต่อมาได้ทุกเมื่อ ยิ่งถ้าเป็นเรื่องต่อสู้และปลุกระดม...\nยิ่งพร้อมช่วยเหลือเต็มที่!"
20026-30 = "สิ่งสำคัญที่สุดในไซต์งาน\nคือต้องปลอดภัยไว้ก่อน\nรองลงมาก็ความปลอดภัย"
20026-40 = "รูปแบบการก่อสร้างของที่นี่...\nถือว่าไม่เลวเลยแฮะ"
20026-50 = "ถ้ามอบหมายงาน\nให้ชมรมผู้รับจ้าง\nงานแค่นี้..."
20026-60 = "ทำงาน 3 วันต่อสัปดาห์...\nมันจะฟังดูดีแค่ไหนกันนะ..."
20026-70 = "รู้สึกว่าพุดดิ้งของที่นี่...\nต่างไปจากอันที่สำนัก\nเลขาธิการส่งมาแฮะ"
20026-80 = "เอาละ วันนี้ก็ปลอดภัยไว้ก่อนนะ!"
20026-90 = "เรามาสร้างสถิติปลอดอุบัติเหตุ\nอันใหม่ของชาเล่ต์กันเถอะ!"
20026-100 = "มาสายสินะ... หรือจะเป็น\nการก่อวินาศกรรม?"
20026-110 = "ครูของชาเล่ต์ก่อวินาศกรรม..."
20026-120 = "เพื่อพิสูจน์อะไรนั้น\nฉันไม่รู้หรอกนะ..."
20026-130 = "ปลอดภัย เยี่ยม!\nตรวจสอบ เยี่ยม!\nปลอดอุบัติเหตุ เยี่ยม!"
20026-140 = "ถ้าเป็นพุดดิ้งละก็\nฉันชอบหมดนั่นละ\nไม่สนหรอกว่าจะใส่อะไร"
20026-150 = "ใส่ครีมคัสตาร์ด\nใส่ช็อกโกแลตหรือผสมผลไม้\nฉันก็ชอบหมดเลย..."
20026-160 = "ยกเว้นพุดดิ้งใส่น้ำเปล่า..."
20026-170 = "(เหตุผลในการประท้วงครั้งต่อไป\nควรใช้อันไหนดีนะ...?)"
20026-180 = "คุณครู ฉันว่าคุณครูทำงานกะดึก\nบ่อยเกินไปแล้วนะ...?"
20026-190 = "ได้ค่าทำงานล่วงเวลาครบมั้ยเนี่ย?"
20026-200 = "ตอนนี้รุ่นพี่จะทำอะไรอยู่นะ...?"
20026-210 = "หวังว่าจะสบายดีนะ"
20026-220 = "สุขสันต์วันเกิด คุณครู"
20026-230 = "วันนี้เรามาแสดงความยินดี\nฉลองการเกิดมาของสหาย\nอีกคนกันเถอะ "
20026-240 = "ฮุฮุ... คุณครูรู้ไหมว่าวันนี้วันอะไร?"
20026-250 = "ใช่แล้ว วันครบรอบอันยิ่งใหญ่ที่ชาวเมือง"
20026-260 = "ลุกขึ้นมาพกอาวุธอย่างกล้าหาญ\nเพื่ออิสรภาพของตนเอง"
20026-270 = "หืม... วันเกิดฉันเหรอ?"
20026-280 = "อ๋อ ลืมไปเลย..."
20026-290 = "ปีนี้ขอให้ยึดสำนักเลขาธิการ\nสหภาพเรดวินเทอร์"
20026-300 = "แล้วมาสร้างเป็นสวรรค์บนดิน\nเพื่อชาวแรงงานได้สำเร็จด้วยเถิด...!"
20026-310 = "ให้ของขวัญเฉพาะเด็กดี\nเท่านั้นหรอกเหรอ..."
20026-320 = "ตาซานตาคลอสนั่น\nต้องเป็นพวกชนชั้นกลาง\nนิสัยร้ายกาจแน่เลย"
20026-330 = "วันก่อนฉันเคยกินพุดดิ้งฟักทอง\nลิมิเต็ดเอดิชั่นวันฮาโลวีนอยู่นะ..."
20026-340 = "รสหวานอ่อนๆ ของมัน\nมีความหรูหรามากจริงๆ..."
20026-350 = "ฉันคิดว่าถ้าวางขายเป็นของกินเล่น\nเสาร์อาทิตย์ฉันก็มีแรงทำงานนะ..."
20026-360 = "เฮือก? ฉะ... ฉันพูดอะไรออกไปเนี่ย...?!"
20026-380 = "ฮุฮุ คงเป็นเพราะวันนี้อากาศหนาว\nฉันเลยมองเห็นระยะไกลได้ชัดแจ๋ว"
20026-390 = "นี่ คุณครูก็อย่ามัวยืนตรงนั้น\nขึ้นมามองจากบนนี้ดูสิ"
20026-400 = "ไม่ต้องกังวลหรอกน่า"
20026-410 = "เราสร้างให้มันมั่นคงพอที่จะรับ\nน้ำหนักช้างได้ทั้งตัวเลยนะ"
20026-420 = "ว่าแต่นั่งร้านอันนี้..."
20026-430 = "มิน่าฉันถึงรู้สึกว่ามันคล้ายกับ\nชมรมผู้รับจ้างของเรา"
20026-440 = "มันคืออุปกรณ์สำคัญ\nขาดไม่ได้สำหรับ\nการก่อสร้างด้วยซ้ำ"
20026-450 = "แต่มันกลับหายไปหลังเสร็จงาน\nราวกับไม่เคยมีอยู่ตั้งแต่แรก..."
20026-460 = "คงเพราะแบบนั้นแหละมั้ง\nพอเทียบกับวิวในไซต์งานแล้ว"
20026-470 = "ฉันชอบวิวนี้\nที่มองจากปลายเท้า\nของตัวเองที่สุดเลย"
20026-480 = "ก้าวออกจากชายขอบ\nอาคารก่อสร้าง\nอีกสักก้าว"
20026-490 = "เพื่อมองใครบางคนทุ่มเท\nหยาดเหงื่อแรงกาย\nอยู่นอกกำแพงนี้"
20026-500 = "วิวที่เรา... ไม่อาจสัมผัสได้\nจากอาคารที่สร้างเสร็จแล้ว"
20026-510 = "ฉันอยากให้คุณครู\nได้มาเห็นด้วยน่ะ"
20026-2600 = "อุปกรณ์ที่มั่นคงและเชื่อถือได้\nคือพาร์ทเนอร์ที่ดีที่สุด\nของไซต์งานก่อสร้างแล้ว\nเจ้านี่ไม่เคยทำให้\nฉันผิดหวังเลยสักครั้ง"

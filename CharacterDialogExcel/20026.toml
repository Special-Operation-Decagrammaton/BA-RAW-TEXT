[translation]
20026-10 = "블루, 아카이브."
20026-20 = "토목, 건설, 철거……\n용역이 필요한 때라면 언제든 연락줘.\n투쟁과 선동이라면…… 더더욱 환영이고!"
20026-30 = "현장에서 가장 중요한 건,\n첫째도 안전.\n둘째도 안전이야."
20026-40 = "이곳의 건축 양식은……\n나쁘진 않다고 해두겠어."
20026-50 = "우리 용역부에게 맡기면,\n이 정도쯤은……"
20026-60 = "주3일 노동…… 이 얼마나\n아름다운 울림인지……"
20026-70 = "이곳의 푸딩은……\n사무국에서 보급하는 것과는\n뭔가 달라 보이네."
20026-80 = "자, 오늘도 안전제일!"
20026-90 = "샬레 무사고 신기록을 노려보자고!"
20026-100 = "……지각이군. 사보타주인가?"
20026-110 = "샬레의 선생이 사보타주를 해서"
20026-120 = "도대체 무얼 증명하려는 건지,\n나는 모르겠지만……"
20026-130 = "안전, 좋아! 확인, 좋아!\n무사고, 좋아!"
20026-140 = "푸딩이라면 무엇을 넣어도\n다 좋아하는 편이야."
20026-150 = "커스터드 크림을 넣은 것도,\n초콜릿을 넣은 것도,\n과일을 섞은 것도……"
20026-160 = "……물 탄 푸딩만 빼고."
20026-170 = "(다음번 쿠데타의 명분은\n무엇으로 하는 게 좋으려나……?)"
20026-180 = "선생, 너무 자주\n야근을 하는 것 같은데……?"
20026-190 = "초과 근무 수당은\n제대로 받고 있는 거야?"
20026-200 = "선배는 지금쯤\n무얼 하고 있으려나……?"
20026-210 = "잘 지내고 있었으면 좋겠는데."
20026-220 = "축하해. 선생."
20026-230 = "오늘, 또 한 명의 동지가\n태어난 것을 기념하며 축하하자. "
20026-240 = "후후…… 선생,\n오늘이 무슨 날인지 알아?"
20026-250 = "맞아. 시민들이 자유를 위해\n무기를 들고,"
20026-260 = "용감하게 일어난\n위대한 기념일이지!"
20026-270 = "응…… 내 생일……?"
20026-280 = "……아, 잊고 있었어."
20026-290 = "올해야말로\n붉은겨울 학원\n사무국을 점거하고"
20026-300 = "노동자를 위한 지상낙원을\n건설할 수 있기를……!"
20026-310 = "착한 아이에게만\n선물을 분배하다니……"
20026-320 = "산타클로스, 그 녀석은\n악랄한 부르주아일 게 분명해."
20026-330 = "일전에 할로윈 한정 호박 푸딩을\n먹어본 적이 있었는데……"
20026-340 = "은은한 단맛이\n정말 고급스러워서……"
20026-350 = "그게 간식으로 나온다면 주말에도\n일할 수 있다고 생각했었어……"
20026-360 = "으햑? 내, 내가\n무슨 소리를……?!"
20026-380 = "후후, 오늘은 날이 추워서\n그런지 멀리까지 잘 보이네."
20026-390 = "자, 선생도 거기 있지 말고\n이 위에 올라와서 봐 봐."
20026-400 = "걱정하지 않아도 괜찮아."
20026-410 = "코끼리가 올라가도 괜찮을 만큼\n튼튼하게 지었으니까."
20026-420 = "그러고 보니 이 비계,"
20026-430 = "어쩐지 우리 용역부를\n닮은 것 같네."
20026-440 = "건설에 빠트릴 수 없는\n중요한 자재지만,"
20026-450 = "작업이 끝나면 처음부터\n존재하지 않았던 것처럼\n사라져야 하니……"
20026-460 = "그래서일까.\n현장의 그 어느 풍경보다"
20026-470 = "발판 위에서 내려다보는\n이 경치를, 나는 제일 좋아해."
20026-480 = "건물의 가장자리에서\n한 걸음 더 나아가,"
20026-490 = "누군가가 이 외벽 밖에서\n분주히 땀을 흘렸다는 흔적의 시선."
20026-500 = "……완성된 건물에서는\n느낄 수 없는 이 시선을,"
20026-510 = "나는 선생과 공유하고 싶었어."
20026-2600 = "튼튼하고 신뢰할 수 있는 장비야말로\n현장의 가장 좋은 파트너지.\n그런 의미에서……\n이 녀석은 나를 한 번도\n실망시킨 적이 없어."

[translation]
20026-10 = "蔚藍，檔案。"
20026-20 = "土木、建造、拆除……\n需要工務人員的時候，隨時歡迎聯絡。\n如果是革命或示威的話……就更加歡迎了！"
20026-30 = "現場最重要的項目，\n第一個是安全，\n第二個也是安全。"
20026-40 = "這裡的建築樣式……\n……就說一聲還不錯吧。"
20026-50 = "交給我們工務部的話，\n這種程度……"
20026-60 = "每週工作三天……\n聽起來是多麼美妙……"
20026-70 = "這裡的布丁……\n跟事務局普發的\n好像不太一樣呢。"
20026-80 = "來，今天也是安全第一！"
20026-90 = "朝著創造夏萊無意外\n新紀錄的目標前進吧！"
20026-100 = "……你遲到了。\n是想罷工嗎？"
20026-110 = "夏萊的老師藉由罷工"
20026-120 = "究竟能證明什麼，\n我倒是不太理解就是了……"
20026-130 = "安全，很好！\n確認，很好！\n無意外，很好！"
20026-140 = "只要是布丁，\n無論混了什麼我都喜歡。"
20026-150 = "不管是卡士達奶油、\n巧克力，還是水果……"
20026-160 = "……加水的\n布丁是例外。"
20026-170 = "（下次政變的名目\n　要用什麼好呢……？）"
20026-180 = "老師，你加班的\n頻率是不是太高了……？"
20026-190 = "有完整領到加班費嗎？"
20026-200 = "前輩現在\n在做些什麼呢……？"
20026-210 = "希望他也過得很好。"
20026-220 = "恭喜你，老師。"
20026-230 = "今天，就讓我們來慶祝\n你這名新同志的誕生吧。"
20026-240 = "呵呵……老師，\n今天是什麼日子，你知道嗎？"
20026-250 = "說的沒錯。就是\n市民們為了自由而拿起武器，"
20026-260 = "勇敢地挺身而出的\n偉大紀念日……！"
20026-270 = "嗯……我的生日……？"
20026-280 = "……啊，我都忘了。"
20026-290 = "今年一定要占領\n赤冬聯邦學園的事務局，"
20026-300 = "並建造一座\n勞動者的地上樂園……！"
20026-310 = "居然只把禮物\n配給給乖孩子……"
20026-320 = "可惡的聖誕老人，那傢伙\n肯定是惡毒的布爾喬亞沒錯。"
20026-330 = "過去，我曾經吃過\n萬聖節限定的\n加了南瓜的布丁……"
20026-340 = "淡淡的甜味\n相當有高級感……"
20026-350 = "如果配給的點心是這個，\n要我週末工作也沒問題……"
20026-360 = "唔呀！？我，我剛才\n說了什麼……！？"
20026-380 = "呵呵，因為今天很冷，\n能清楚看到很遠的地方呢。"
20026-390 = "來吧，老師也別站在那裡，\n爬上來吧。"
20026-400 = "不必擔心。"
20026-410 = "這裡建造得很堅固，\n就算是大象爬上來也不會壞。"
20026-420 = "……這麼說來，這個鷹架，"
20026-430 = "和我們工務部，\n在某些方面\n感覺有點類似呢。"
20026-440 = "雖然是建設\n不可或缺的重要材料，"
20026-450 = "但只要工程結束，\n就會像從未存在過一般\n消失得無影無蹤──"
20026-460 = "或許是因為這樣吧。\n比起現場的任何風景，"
20026-470 = "從鷹架上俯瞰的這個景色，\n才是我最喜歡的。"
20026-480 = "在建築物的邊緣\n向外一步之遙的距離，"
20026-490 = "某個人在這片外牆的外側\n拚命揮灑汗水的、\n充滿痕跡的視角。"
20026-500 = "……在完工的建築物上\n感受不到的這個景色。"
20026-510 = "我想要，和老師共享。"
20026-2600 = "堅固又值得信賴的裝備\n才是現場最好的夥伴。\n在這個意義上……\n這傢伙從來沒有\n讓我失望過。"

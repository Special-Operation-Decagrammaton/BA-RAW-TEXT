[translation]
10138-10 = "흥, 블루 아카이브!"
10138-20 = "와일드헌트 예술학원의 키누이 레나야.\n두고 보라고. 오컬트 따위,\n전부 사이비라는 걸 증명해 낼 테니까!"
10138-30 = "저 사람한텐\n어떤 옷이 어울릴까?"
10138-40 = "여기라면 이상한 일은\n일어나지 않겠지……?\n아무래도……."
10138-50 = "이 배치……\n선생님도 나름\n센스가 있네."
10138-60 = "저 디자인은\n오컬트지……?\n선생님도\n영향을 받은 걸까."
10138-70 = "저, 저쪽에서\n뭔가 이상한 소리가\n들렸는데……."
10138-80 = "늦어!! 계속 기다렸다고!?"
10138-90 = "어서 와, 선생님.\n내가 뭘 도와주면 돼?"
10138-100 = "여긴 제대로 정리가\n잘 되어 있구나."
10138-110 = "우리 기숙사는……\n치워도 치워도 끝이 없어서."
10138-120 = "하아, 선배들이\n이상한 걸 가져오니까……."
10138-130 = "기숙사 배정 받은 날은\n지금도 잊을 수가 없어……."
10138-140 = "4동 404호라고?\n오컬트를 안 믿어도\n불길하지 않아?"
10138-150 = "왜 다들 오컬트 같은 걸\n쉽게 믿는 걸까."
10138-160 = "그런 거 전부 과학적으로\n증명할 수 있는데.\n……선생님도 그렇게 생각하지?"
10138-170 = "그나저나 선생님은\n시간 있을 때 뭐 해?"
10138-180 = "나? 나는 이것저것\n만들어보는 거려나."
10138-190 = "괜찮으면 같이 해보지 않을래?"
10138-200 = "따, 딱히 나한테\n뭘 만들어 달라는 건 아니니까!"
10138-210 = "왜 요즘 자꾸\n이상한 일이 생길까?"
10138-220 = "선배들 말대로……\n점이라도 봐야 하나?"
10138-230 = "으으, 그런 건\n믿지 않기로 했는데!"
10138-240 = "어? 선생님,\n생일이구나? 몰랐어."
10138-250 = "등 뒤에 숨긴 거……?"
10138-260 = "서, 선물 아니야!\n우연히 쇼핑을\n갔다 온 것뿐이니까!"
10138-270 = "오늘, 선배들이\n생일 파티를 해준대."
10138-280 = "선생님도 와.\n맛있는 게 잔뜩 있어. 아마도."
10138-290 = "새해 복 많이 받아, 선생님.\n새해니까 같이\n소원이라도 빌어볼래?"
10138-300 = "따, 딱히 소원 비는 것 정도는\n오컬트 아니니까!"
10138-310 = "난 산타는 어렸을 때부터\n안 믿었어."
10138-320 = "잘 때 몰래 베개맡에 온다고?"
10138-330 = "그런 거 너무 무섭지 않아?!"
10138-340 = "음…… 이 방,\n좀 더 할로윈스러움이\n있으면 좋겠는데."
10138-350 = "앗……오컬트 이야기가 아니라!\n디자인적인 이야기야!"
10138-370 = "있지, 난 어렸을 때부터\n손재주가 좋았어."
10138-380 = "리본 같은 걸 만들어서,\n친구에게 주곤 했지."
10138-390 = "다들 좋아해 줘서 기뻤어."
10138-400 = "……그렇게 깨달은 거야."
10138-410 = "이렇게 작은 것으로도,"
10138-420 = "누군가를 기쁘게\n할 수 있구나, 라고."
10138-430 = "그래서 패션 디자이너를\n꿈꾸게 됐던 거야."
10138-440 = "내가 디자인한\n옷이라든가 악세서리를,"
10138-450 = "모두가 즐겨주면 나도 기쁘니까."
10138-460 = "그런 거,\n선생님도 어떤 건지 이해하지?"
10138-470 = "그런 것도 있어서,\n이렇게 신경 써주는\n거라고 생각하는데."
10138-480 = "어……?\n오늘은 어땠냐고……?"
10138-490 = "샤아악! 마, 말하게 하지 마!\n바보 선생님!"
10138-2600 = "작다고 바보 취급하면 큰코다칠 거야.\n이렇게 보여도, 총은 잘 다룬다고!\n쏜 자국으로 그림을 그릴 수 있을 정도……\n진짜라구?!"

[translation]
26005-20 = "อย่าดูถูกว่าฉันตัวเล็กนะ!\nถึงจะเล็กก็เล็กพริกขี้หนูแล้วกัน!"
26005-30 = "ฉันยังโตได้กว่านี้อีก...\nเชื่อกันบ้างสิ! ฮึ่ม!"
26005-40 = "ฮิฮิ นอนสักงีบ\nแล้วค่อยไปต่อดีมั้ย?"
26005-50 = "(เฮ้อ... ทำไมคุณครูถึง\nไม่มีเซนส์เอาซะเลย)"
26005-60 = "อยากกินของหวานอร่อยๆ!\nอ๊ะ! นั่นคุณครูนี่นา!"
26005-70 = "ฮือ ฉันไม่ชอบนมจืด\nยิ่งรู้ว่าต้องกินนมให้มากๆ\nก็ยิ่งไม่ชอบ!\nหืม? นะ.. นมสตรอว์เบอร์รี่เหรอ?"
26005-80 = "อย่ามาลูบหัวฉันนะ!\nชิ... ฉันไม่ชอบถูกมองว่าเป็นเด็ก"
26005-90 = "อีกไม่กี่ปีฉันก็จะคงถูกมองว่า...\nเป็นคนรักมากกว่าเป็นน้องสาว\nใช่มั้ย?"
26005-100 = "ฉันดื่มนมครั้งละ 1 ลิตรเลยละ\nแล้วก็ดื่มทุกวันเลยด้วย!"
26005-110 = "ถ้าต้องอยู่เวร ก็แสดงว่าฉันจะ\nได้มีเวลากินขนมอร่อยๆ\nกับคุณครูใช่มั้ย?"
26005-120 = "วันนี้ก็ตั้งใจเข้าล่ะ!\nแล้วฉันจะช่วยอีกแรง!"
26005-130 = "เอ๋?\nทำไมสีหน้าคุณครูดูไม่ดีเลย?"
26005-140 = "ปะ.. ไปกินของหวานอร่อยๆ กันมั้ย?"
26005-150 = "ฮึ่ม! ตราบใดที่ฉันอยู่ตรงนี้\nก็อย่าหวังว่าจะอู้งานได้เลย!\nตั้งสติ! นี่มันเวลาทำงานนะ!\nเริ่มทำงานกันเถอะ!"
26005-160 = "คุณครู สุขสันต์วันเกิดนะ!\nแถวนี้มีร้านของหวานอร่อยๆ ด้วยละ\nไปกันเถอะ!"
26005-170 = "ขะ... ขอบคุณนะ"
26005-180 = "(จะต้องผ่านวันเกิดอีกกี่ปี\nฉันถึงจะโตเป็นสาว\nและอยู่ข้างๆ คุณครูได้นะ?)"
26005-190 = "มะ.. ไม่ได้คิดอะไรอยู่สักหน่อย\nจะจ้องจนลูกตาทะลุออกมา\nเลยหรือไง?!"
26005-200 = "สวัสดีปีใหม่! เป้าหมายของปีนี้เหรอ?\nก็เห็นกันอยู่ชัดๆ อยู่แล้วนี่!\nฉันจะต้องหุ่นดีให้ได้!!"
26005-210 = "เมอร์รีคริสต์มาส\nฉันชอบวันคริสต์มาส!\nเพราะถนนทุกเส้น\nเต็มไปด้วยสีที่ฉันชอบไง!"
26005-220 = "Trick or Treat~\nนี่คือฮาโลวีนพิเศษของ\nชมรมของหวานหลังเลิกเรียน!\nไปกันเถอะ!"
26005-230 = "ถึงฉันจะไม่ค่อยสนใจเรื่องผีเท่าไร\nแต่วันนี้เราจะได้กินขนม\nกันไม่อั้นเลยนะ!"
26005-250 = "จริงๆ เลย จะบอกว่าคุณครู\nทำฉันตกใจทุกครั้งเลยได้มั้ยนะ..."
26005-260 = "หรือจะบอกว่า\nเดาทางไม่ออกดีนะ..."
26005-270 = "...หืม? ทำไมถึงจ้องเขม็งแบบนั้นล่ะ?"
26005-280 = "นี่... คงไม่ได้คิดอะไรแปลกๆ\nอยู่หรอกใช่มั้ย?"
26005-290 = "ฉันไม่ใช่ของเล่นของคุณครูนะ"
26005-300 = "ถ้าไม่ล้อเล่นกันแค่พอดีๆ\nฉันจะโกรธจริงๆ แล้วนะ"
26005-310 = "...เปล่าหรอก ที่จริงฉันก็\nไม่ได้เกลียดอะไรขนาดนั้นหรอก..."
26005-320 = "ฮุฮุ..."
26005-330 = "(สักวันหนึ่ง...)"
26005-340 = "(วันที่จะได้...\nเดินเคียงข้างกันไปแบบนี้\nคงจะมาถึงใช่มั้ย...?)"
26005-2600 = "ถ้ารับของแบบนี้มาละก็ คงจะต้อง...\nพยายามอย่างสุดขั้วไปเลยสินะ!"

[translation]
26005-20 = "Don't underestimate me because I'm small! I have big potential, you know!"
26005-30 = "I'm not even done growing yet... How do I know? Just trust me!"
26005-40 = "Heehee. Maybe I should take a nap before I go."
26005-50 = "*sigh* How can you be so oblivious?"
26005-60 = "I wanna eat some yummy desserts! Oh! Sensei!"
26005-70 = "Ugh! Regular milk leaves such a gross taste in my mouth. O-Oh. It's strawberry milk?"
26005-80 = "D-Don't pat my head like that! Hmph. I'm not a little kid, okay?!"
26005-90 = "Do you think, in a few years, I'll look more like a lover than a sibling?"
26005-100 = "I've been chugging a liter of milk. Every! Single! Day!"
26005-110 = "I-If I'm on duty…that means I get to have snack time with you too, right, Sensei?"
26005-120 = "Do your best today! I'll help you however I can!"
26005-130 = "Sensei? You're not looking too good..."
26005-140 = "Sh-Should we try some dessert therapy?"
26005-150 = "As long as I'm here, don't even think about slacking off. That's what I thought! Now, back to work!"
26005-160 = "Happy birthday, Sensei! There's a decent dessert place nearby. Let's go!"
26005-170 = "Th-Thank you for remembering."
26005-180 = "(I wonder how many years it'll take for people to start thinking we look good side-by-side...)"
26005-190 = "Why are you looking at me like that? I-I wasn't thinking anything weird! I swear!"
26005-200 = "Happy New Year! My New Year's resolution? To have a nice body, of course!"
26005-210 = "Merry Christmas! I love the holidays! The streets and windows are all decked out with my favorite colors!"
26005-220 = "Trick-or-treat! It's a super special Halloween for the After-School Sweets Club! Let's go!"
26005-230 = "I don't really care about the ghosts, but the candy aspect is very important to me!"
26005-250 = "Wow. You never fail to surprise me..."
26005-260 = "You're so unpredictable."
26005-270 = "What's that look you're giving me?"
26005-280 = "I know you're planning some funny business!"
26005-290 = "Don't toy with me, Sensei!"
26005-300 = "You better stop it, or I'm gonna get really mad."
26005-310 = "Well... It's not like I completely hate it when you tease me...I guess..."
26005-320 = "Heehee."
26005-330 = "(Maybe one day...)"
26005-340 = "(...One day we'll get to walk side-by-side again.)"
26005-2600 = "If I accept something like this... All right! I'll do my best with it!"

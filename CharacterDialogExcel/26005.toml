[translation]
26005-20 = "別看我小就瞧不起我！\n我的可能性可是非常大的！"
26005-30 = "……我的成長\n還沒有結束！相信我！"
26005-40 = "呵呵。\n要不要睡一覺呢。"
26005-50 = "唉……老師為什麼\n這麼不會看氣氛呢。"
26005-60 = "想吃好吃的甜點～！\n啊！老師！"
26005-70 = "嗯？咦……我討厭牛奶。\n我也知道不喝不行，\n所以才更討厭！\n咦？那個是，草，草莓牛奶嗎？"
26005-80 = "不要摸我的頭！\n真是的……\n我不喜歡被當成小朋友。"
26005-90 = "我…要再過幾年…\n才不會被當成妹妹，\n而是被視為情人呢？"
26005-100 = "牛奶我喝了1L。\n因為沒有其他辦法，\n只好每天，每天，每天喝！"
26005-110 = "當，當值日生的話，也會有時間\n和老師一起吃好吃的點心對吧？"
26005-120 = "來，今天也加油吧！\n我會幫你的！"
26005-130 = "那個，老師，\n你累了嗎？"
26005-140 = "要，要不要去吃好吃的甜點？"
26005-150 = "哼！只要有我在\n就放棄偷懶吧！\n來，工作時間到了唷！\n開始執行任務吧！"
26005-160 = "生日快樂，老師！\n附近有間很棒的甜點店，\n一起去吧！"
26005-170 = "謝，謝謝你的祝福。"
26005-180 = "（還要再過幾次生日…\n　才能在老師身邊時\n　讓人感到很相配呢？）"
26005-190 = "我，我沒有在想什麼\n奇怪的事哦？為什麼\n要那樣盯著我看啦！？"
26005-200 = "新年快樂！\n我今年的目標？\n那還用問嗎！\n當然是能有副Nice Body囉！"
26005-210 = "聖誕快樂！\n我喜歡聖誕節！\n因為大街上充滿了\n我喜歡的顏色！"
26005-220 = "Trick or Treat～\n對放學後的甜點部來說\n特別的日子，就是萬聖節唷！\n一起到外面去吧！"
26005-230 = "雖然對幽靈沒有興趣，\n但是糖果很重要！"
26005-250 = "真的是，該說\n總是被老師嚇到，"
26005-260 = "還是該說一直被老師\n耍得團團轉呢……"
26005-270 = "……嗯？\n你看什麼看得\n目不轉睛？"
26005-280 = "我說，\n你該不會又在\n想一些奇怪的事吧？"
26005-290 = "我可不是\n老師的玩具。"
26005-300 = "不適可而止的話，\n我真的會生氣喔。"
26005-310 = "……不過，\n我也不是真的\n打從心底討厭……"
26005-320 = "……呵呵。"
26005-330 = "（總有一天……）"
26005-340 = "（有朝一日能像這樣\n站在身旁……堂堂正正\n並肩走著的日子……）"
26005-2600 = "都收到這種東西了……\n也只能認真地努力了吧！"

[translation]
10100-10 = "蔚藍檔案。"
10100-20 = "阿拜多斯的砂狼白子。\n嗯，又要請你多多指教囉，老師。"
10100-30 = "這裡……\n還不錯……"
10100-40 = "真和平呢，這裡。"
10100-50 = "嗯，就休息一下吧。"
10100-60 = "這是……什麼？\n可以打開來看嗎……？"
10100-70 = "（這個家具……\n　是老師的喜好嗎……）"
10100-80 = "你好像挺忙的……\n需要幫忙嗎？"
10100-90 = "嗯，我在等你哦，老師。\n在工作做完之前，\n我是不會放你回去的。"
10100-100 = "老師，文書作業，\n我幫你完成一些了哦。"
10100-110 = "嗯？明明沒有教過，\n我是怎麼完成的？"
10100-120 = "……之前處理過類似的事。"
10100-130 = "休息室裡的\n零食，是……"
10100-140 = "抱歉，我稍微吃了一點。"
10100-150 = "多吃點也沒關係？"
10100-160 = "……謝謝你。"
10100-170 = "老師，你要工作到很晚嗎？"
10100-180 = "那我也一起陪你吧。"
10100-190 = "為什麼那樣一直\n盯著我看……？"
10100-200 = "嗯，誰先眨眼對決，我接受了。"
10100-210 = "放眼望去，全都是\n令人懷念的事物。"
10100-220 = "生日快樂。"
10100-230 = "那個，可以的話\n要不要一起騎車……"
10100-240 = "嗯？那個提案今天\n已經聽到第二次了？"
10100-250 = "是我的生日呢。\n謝謝你。"
10100-260 = "……老師，\n也幫這邊的我\n祝福一下吧。"
10100-270 = "新年快樂，老師。"
10100-280 = "新的一年又開始了呢。\n老師今年的目標是什麼？"
10100-290 = "是聖誕節……\n要給我的禮物呢？"
10100-300 = "呵呵，開玩笑的。\n聖誕快樂，老師。"
10100-310 = "不給糖就搗蛋。"
10100-320 = "嗯，先講的人是我。\n糖果我就收下了。"
10100-340 = "一如既往呢，這裡。"
10100-350 = "發生改變的，\n只有我自己嗎。"
10100-360 = "嗯……不過，看見這些\n沒有改變的事物之後，\n稍微安心了。"
10100-370 = "老師，我……\n想重新嘗試騎自行車。"
10100-380 = "雖然可能會遇到\n許多困難……"
10100-390 = "但是，只要老師\n能陪著我……\n感覺應該能做到。"
10100-400 = "嗯，謝謝你。老師。"
10100-2600 = "你竟然為我做到這種程度。\n沒，沒有。我不是有什麼不滿。\n只是，有點驚訝而已……"

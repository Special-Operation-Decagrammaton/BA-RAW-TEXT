[translation]
10100-10 = "Blue Archive."
10100-20 = "I’m Sunaookami Shiroko of Abydos. Yes. Nice to meet you again, Sensei."
10100-30 = "It's...not so bad here..."
10100-40 = "It's peaceful here."
10100-50 = "Yeah... I might as well take a rest now that I'm here."
10100-60 = "What's this...? Am I allowed to open it...?"
10100-70 = "(Does Sensei like this kind of furniture...?)"
10100-80 = "You look busy. Need a hand?"
10100-90 = "Yeah, I was waiting, Sensei. I won't let you leave until it's done."
10100-100 = "Sensei, I finished some of the documents."
10100-110 = "Hmm? How did I do it when you didn't tell me how?"
10100-120 = "...I have some experience with them."
10100-130 = "About the snacks in the lounge..."
10100-140 = "I'm sorry, I ate a few."
10100-150 = "I can have more?"
10100-160 = "...Thanks."
10100-170 = "Sensei, are you still working?"
10100-180 = "I'll stay with you."
10100-190 = "Why are you staring at me...?"
10100-200 = "A staring contest? Game on."
10100-210 = "It's full of things I miss."
10100-220 = "Happy birthday."
10100-230 = "Why don't we go cycling together?"
10100-240 = "What? I already asked you that?"
10100-250 = "It's my birthday? Thanks."
10100-260 = "...Sensei, I wish you'd congratulate the \"me\" here too."
10100-270 = "Happy New Year, Sensei."
10100-280 = "It's the beginning of another year. What are your new year's resolutions?"
10100-290 = "It's Christmas... Did you get me anything?"
10100-300 = "Just kidding. Merry Christmas, Sensei."
10100-310 = "Trick or treat."
10100-320 = "...I said it first. I'll take your treats."
10100-340 = "Yes... This place is the same."
10100-350 = "Perhaps the only thing that has changed is me."
10100-360 = "Yes... Despite that, some things remain constant. That gives me comfort."
10100-370 = "Sensei, I believe I'll try cycling again."
10100-380 = "I expect there'll be many obstacles along the way, but..."
10100-390 = "I think I'll be able to...as long as you are with me, Sensei..."
10100-400 = "Yes. Thank you, Sensei."
10100-2600 = "You would go to those lengths for me? Oh, I'm not complaining. I'm just...surprised."

[translation]
10100-10 = "Blue Archive"
10100-20 = "สึนาโอกามิ ชิโรโกะจากอะบิดอส\nอื้อ ขอฝากตัวอีกครั้งนะคุณครู"
10100-30 = "ที่นี่...\nก็ไม่แย่เท่าไรนะ..."
10100-40 = "ที่นี่... สงบสุขดีจัง"
10100-50 = "อื้อ ไหนๆ ก็มาที่นี่แล้ว\nก็ขอใช้เวลาพักผ่อน\nสักหน่อยแล้วกัน"
10100-60 = "นี่มัน... อะไรน่ะ?\nลองดึงดูได้มั้ยนะ...?"
10100-70 = "(เฟอร์นิเจอร์อันนี้\nเป็นแบบที่\nคุณครูชอบรึเปล่านะ...)"
10100-80 = "ดูงานยุ่งนะ...\nให้ช่วยมั้ย?"
10100-90 = "อื้อ กำลังรออยู่เลย คุณครู\nฉันจะไม่ปล่อยไปไหน\nจนกว่าจะเสร็จงานเลย"
10100-100 = "คุณครู ทำงานเอกสาร\nเสร็จไป 2-3 อย่างแล้วละ"
10100-110 = "หืม? ยังไม่ได้บอกวิธีทำ\nแล้วฉันทำได้ยังไงน่ะเหรอ?"
10100-120 = "ก่อนหน้านี้ก็เคยทำมาเยอะแล้วนี่นา"
10100-130 = "ขนมที่อยู่ที่ห้องพักผ่อนน่ะ..."
10100-140 = "ขอโทษนะ ฉันแอบกินไปนิดหน่อยน่ะ"
10100-150 = "กินอีกก็ได้งั้นเหรอ?"
10100-160 = "ขอบคุณนะ..."
10100-170 = "คุณครูทำงานจนดึกเลยเหรอ?"
10100-180 = "ถ้างั้นฉัน... จะอยู่ด้วยเอง"
10100-190 = "ทำไมจ้องแบบนั้น...?"
10100-200 = "อื้อ ฉันจะแข่งจ้องตาด้วยเอง"
10100-210 = "ทั้งที่นี่แล้วก็ที่นั่น\nมีแต่สิ่งที่คิดถึงเต็มไปหมดเลยนะ"
10100-220 = "สุขสันต์วันเกิดนะ"
10100-230 = "ถ้าสะดวกละก็ไปปั่นจักรยานด้วยกัน..."
10100-240 = "หืม? ฉันชวนแบบนี้\nวันนี้นับเป็นครั้งที่สองแล้วงั้นเหรอ?"
10100-250 = "วันนี้เป็นวันเกิดฉันนี่เอง\nขอบคุณนะ"
10100-260 = "คุณครู อวยพรวันเกิด\nให้ตัวฉันทางนี้ด้วยแล้วกันนะ"
10100-270 = "สวัสดีปีใหม่นะคะคุณครู"
10100-280 = "เริ่มต้นปีใหม่อีกหนึ่งปีแล้วสินะ\nเป้าหมายปีนี้ของคุณครูล่ะ?"
10100-290 = "คริสต์มาส...\nเตรียมของขวัญให้ฉันรึยัง?"
10100-300 = "ล้อเล่นน่ะ\nเมอร์รีคริสต์มาสนะ คุณครู"
10100-310 = "ทริก ออร์ ทรีต"
10100-320 = "ฉันเป็นฝ่ายพูดก่อน\nจะขอรับขนมไปละนะ"
10100-340 = "อื้อ เหมือนเดิมเลยนะ\nที่นี่น่ะ"
10100-350 = "สิ่งที่เปลี่ยนไป\nอาจมีแค่ตัวฉันอย่างเดียวก็ได้"
10100-360 = "อื้อ... แต่ว่ามัน\nก็มีบางสิ่งที่ไม่เปลี่ยนไปด้วย\nเลยรู้สึกอุ่นใจนิดหน่อย"
10100-370 = "คุณครู ฉันน่ะ...\nคิดว่าจะปั่นจักรยานอีกครั้งละ"
10100-380 = "อาจมีเรื่องยากลำบากต่างๆ\nเกิดขึ้นมากมายแต่ว่า..."
10100-390 = "ถ้ามีคุณครูอยู่ด้วย...\nฉันคิดว่าคงทำได้น่ะ"
10100-400 = "อื้อ ขอบคุณนะ คุณครู "
10100-2600 = "ทำให้ฉันถึงขนาดนี้เลยเหรอ\nปะ...เปล่าหรอก\nไม่ได้ไม่พอใจอะไร\nแค่ตกใจนิดหน่อยน่ะ"

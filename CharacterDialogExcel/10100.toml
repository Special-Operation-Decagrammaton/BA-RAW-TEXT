[translation]
10100-10 = "블루 아카이브."
10100-20 = "아비도스의 스나오오카미 시로코.\n응, 다시 한번 잘 부탁해. 선생님."
10100-30 = "이곳은……\n나쁘지 않네……"
10100-40 = "평화롭네, 여기는."
10100-50 = "응, 온 김에\n휴식을 취해둬야겠네."
10100-60 = "이건…… 뭐지?\n뜯어봐도 되나……?"
10100-70 = "(이 가구는,\n선생님 취향일까……)"
10100-80 = "바빠 보이는데……\n도와줄까?"
10100-90 = "응, 기다리고 있었어, 선생님.\n일이 끝날 때까지는,\n보내지 않을 테니까."
10100-100 = "선생님, 서류 몇 개는\n끝내 뒀어."
10100-110 = "응? 안 가르쳐 줬는데\n어떻게 했냐고?"
10100-120 = "……전에 많이 해봤으니까."
10100-130 = "휴게실에 있는\n과자, 말인데……"
10100-140 = "미안, 내가 몇 개 먹었어."
10100-150 = "더 먹어도 된다고?"
10100-160 = "……고마워."
10100-170 = "선생님, 늦게까지 일이야?"
10100-180 = "나도, 같이 있어 줄게."
10100-190 = "어째서 그렇게 빤히……?"
10100-200 = "응, 눈싸움, 받아줄게."
10100-210 = "여기도 저기도,\n그리운 것들뿐이네."
10100-220 = "생일, 축하해."
10100-230 = "괜찮으면 함께 라이딩……"
10100-240 = "응? 이 제안은\n오늘로 두 번째라고?"
10100-250 = "내 생일이구나. 고마워."
10100-260 = "……선생님, 이쪽의\n나에게도, 축하 인사를\n전해 줬으면 해."
10100-270 = "새해 복 많이 받아, 선생님."
10100-280 = "또 새로운 한 해가 시작되네.\n선생님의 올해 목표는?"
10100-290 = "크리스마스……\n내 선물은 준비했어?"
10100-300 = "장난이야.\n메리 크리스마스, 선생님."
10100-310 = "트릭 오어 트릿."
10100-320 = "……내가 먼저 말했어.\n과자, 받을게."
10100-340 = "여전하네,\n여기는."
10100-350 = "변한 건\n나 혼자만일지도."
10100-360 = "응…… 그치만 변하지\n않은 것도 있어서,\n조금 안심했어."
10100-370 = "선생님, 나,\n자전거 다시 타볼까 해."
10100-380 = "이런저런 어려움이\n있을지도 모르지만……"
10100-390 = "선생님이 있어 준다면……\n할 수 있을 것 같아."
10100-400 = "응. 고마워. 선생님."
10100-2600 = "나에게, 이렇게까지\n해주는 거구나.\n아, 아니, 불만이 아니라,\n조금 놀라서…"

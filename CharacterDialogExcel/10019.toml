[translation]
10019-10 = "블루 아카이브."
10019-20 = "시라스 아즈사. 트리니티 학원에 전학온 지는 얼마되지 않았어.\n특기는 단독 행동. 장점은 작아서 엄폐가 쉽다는 거 정도…일까.\n또 궁금한 거 있어?"
10019-30 = "흐음. 뭐, 나쁘지 않네."
10019-40 = "(신기한 게 많아…)"
10019-50 = "저건 뭘까?"
10019-60 = "후후. 재미있네."
10019-70 = "귀, 귀여워……!"
10019-80 = "선생님. 기다리고 있었어.\n오늘의 임무는 뭐지?\n내가 도와줄 일이 있어?"
10019-90 = "돌아왔구나. 선생님.\n내가 해야 할\n일이 있다면 알려줘."
10019-100 = "모든 것이 헛되다면\n우리는 어째서 살아있는 걸까……"
10019-110 = "응?\n아, 아무 것도 아니야."
10019-120 = "임무. 목표. 달성."
10019-130 = "다른 걸 생각해본 적은 없었어…"
10019-140 = "지금까지는."
10019-150 = "내가 도움이 되고 있는 걸까……"
10019-160 = "그렇다고?"
10019-170 = "으, 으응……"
10019-180 = "……나도 알아.\n내가 재미 없다는 걸.\n그런 걸 기대했다면, 미안해."
10019-190 = "나는… 언젠가"
10019-200 = "선생님의 기대를\n배신할지도 몰라."
10019-210 = "모든 것이 헛되더라도\n선생님이 있다면\n괜찮다고 생각해……"
10019-220 = "생일 축하해요."
10019-230 = "내 생일을……\n축하해 주는 거야?"
10019-240 = "태어난 걸,\n축하 받아도 된다고?"
10019-250 = "……기뻐, 고마워."
10019-260 = "이번 한해도 수고 많았어.\n내년에도 함께……"
10019-270 = "아, 아무것도 아니야!"
10019-280 = "크리스마스……\n성야의 날이라면,\n일년 중에서 가장 소중한 날."
10019-290 = "이런 날에 나 같은 게\n같이 있어도 괜찮을까……?"
10019-300 = "뭔가 잔뜩\n시끌벅적한 날이지만,\n딱히 관심은 없어."
10019-310 = "…선생님이 좋아한다면 뭐,\n조금은 신경써보겠지만."
10019-330 = "놀리려는 거지?\n그렇지?"
10019-340 = "…뭐, 그래도\n선생님이라면\n상관없지만…."
10019-350 = "……으으응! 귀여워.\n이 인형, 꼭 가지고\n싶었던 아이야."
10019-360 = "에헤헤헤헤….\n헤헤헤…."
10019-370 = "……\n…응? 아니,\n아무것도 아니야."
10019-380 = "(….말하지 않을 거야.\n선생님을 곤란하게\n하진 않을 거니까.)"
10019-390 = "그런데 어떻게 이런\n귀여운 장소를 알고 있는 거야?"
10019-400 = "좋아한다고?\n정말로?"
10019-410 = "지금 날\n아이 취급하는 거야?"
10019-420 = "뭐……\n딱히 상관없지만."
10019-2600 = "이 힘을 어떻게 쓸지는 선생님이 정해줬으면 해.\n나는 지금… 선생님을 위해서 있는 거니까."

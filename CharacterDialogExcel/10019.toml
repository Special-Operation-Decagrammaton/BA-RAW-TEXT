[translation]
10019-10 = "Blue Archive."
10019-20 = "I'm Shirasu Azusa, a transfer to Trinity. I work solo and can take cover easily due to my size. Any other questions?"
10019-30 = "Hmm. Not bad, I suppose."
10019-40 = "(So many interesting things...)"
10019-50 = "What's that?"
10019-60 = "Heehee. That's funny."
10019-70 = "So cute!"
10019-80 = "I've been waiting, Sensei. What's today's mission? Anything I can help with?"
10019-90 = "You're back, Sensei. Let me know if there's anything you need done."
10019-100 = "If life has no intrinsic meaning, then why do we live at all?"
10019-110 = "Huh? Oh, it's nothing."
10019-120 = "Missions. Objectives. Achievements."
10019-130 = "I've never really thought about much else..."
10019-140 = "...until now, anyway."
10019-150 = "I wonder if I'm being helpful..."
10019-160 = "I am?"
10019-170 = "I-I see..."
10019-180 = "It's okay. I know I'm no fun. Sorry to disappoint you."
10019-190 = "One of these days..."
10019-200 = "...I might fall short of your expectations."
10019-210 = "Even if none of this matters, it's okay if I'm with you."
10019-220 = "Happy birthday."
10019-230 = "Are you really...celebrating my birthday?"
10019-240 = "Is it really okay to celebrate a birthday like mine?"
10019-250 = "I was happy to hear it... Thank you."
10019-260 = "Here's to surviving another year. I hope next year we'll..."
10019-270 = "N-Nothing!"
10019-280 = "Christmas... A holy day, and one of the most important of the year."
10019-290 = "Is it really okay for someone like me to be with you like this today?"
10019-300 = "It's loud and crazy. I just don't care for it."
10019-310 = "But if you like it, then I'll do my best to care."
10019-330 = "You're going to tease me again, aren't you?"
10019-340 = "Well, I'm used to it. I don't mind it coming from you."
10019-350 = "Ugh! So cute! It's just what I've always wanted."
10019-360 = "Heeheehee... Heehee..."
10019-370 = "Huh? Oh, it's nothing."
10019-380 = "(I shouldn't say anything. It would only complicate things between us.)"
10019-390 = "So how did you learn about such a cute place?"
10019-400 = "You like these things? Really?"
10019-410 = "Are you treating me like a child?"
10019-420 = "Well...not that I mind."
10019-2600 = "Sensei, I want you to decide how I should use this power. Because I am here for you."

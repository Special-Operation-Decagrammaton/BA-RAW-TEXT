[translation]
10019-10 = "蔚藍檔案。"
10019-20 = "白洲梓。剛轉學到三一學園沒多久。\n專長是獨自行動。優點是體型小，較容易掩蔽……\n還想知道什麼嗎？"
10019-30 = "嗯呣。嘛，\n還不錯。"
10019-40 = "（有好多\n新奇的東西…）"
10019-50 = "那個是什麼？"
10019-60 = "呵呵。真有趣。"
10019-70 = "好，好可愛……！"
10019-80 = "老師，我一直在等你。\n今天的任務是什麼？\n有需要我幫助的地方嗎？"
10019-90 = "你回來了啊？老師。\n請告訴我\n該做什麼事情。"
10019-100 = "如果一切都是徒勞，\n那我們又是為何活著呢……"
10019-110 = "啊，不，什麼都沒有。"
10019-120 = "任務，目標，\n將其達成。"
10019-130 = "除此之外的事情，\n我從沒想過……"
10019-140 = "直到現在。"
10019-150 = "我有幫上忙嗎……"
10019-160 = "咦，當，當然有？"
10019-170 = "這，這樣啊……"
10019-180 = "……我知道。我一點也不有趣。\n如果對此有所期待的話，抱歉。"
10019-190 = "我…某天…"
10019-200 = "也許會背叛\n老師的期待。"
10019-210 = "就算一切都是徒勞的，\n只要有老師在，\n我認為那也沒關係……"
10019-220 = "祝你生日快樂。"
10019-230 = "是在祝我……\n生日快樂嗎？"
10019-240 = "我的出生，\n是可以被慶祝的嗎？"
10019-250 = "……我很開心。謝謝。"
10019-260 = "今年也辛苦了。\n明年也要一起……"
10019-270 = "什，什麼都沒有！"
10019-280 = "聖誕節……\n說起聖誕祭，\n也是一年中相當重要的日子。"
10019-290 = "在這種日子和我一起\n也沒有關係嗎……？"
10019-300 = "總覺得是個\n非常熱鬧的日子，\n但我不是特別有興趣。"
10019-310 = "…但是，\n如果老師喜歡的話，\n我也可以陪你。"
10019-330 = "你絕對在戲弄我吧，\n老師。"
10019-340 = "……嘛，不過，\n也不是真的\n打從心底討厭……"
10019-350 = "唔唔，好可愛……！\n這孩子，\n我一直想見他……！"
10019-360 = "欸嘿，欸嘿嘿……\n欸嘿嘿……"
10019-370 = "……\n……那個，\n不，沒什麼……"
10019-380 = "（明明，\n不能再拉近距離了……）"
10019-390 = "不過，老師怎麼會知道\n這種可愛的地方？"
10019-400 = "……老師也喜歡？\n真的嗎？"
10019-410 = "沒有把我當小孩子，\n在附和我吧？"
10019-420 = "……嘛，\n其實怎樣都無所謂。"
10019-2600 = "希望老師幫我決定\n如何運用這股力量。\n因為我…現在是為了老師而在這裡的。"

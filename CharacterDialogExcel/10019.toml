[translation]
10019-10 = "Blue Archive"
10019-20 = "ชิราสึ อาซึสะ เพิ่งย้ายมาที่สถาบันทรีนิตี้ได้ไม่นาน\nความสามารถพิเศษคือทำอะไรคนเดียว\nจุดแข็งคือตัวเล็กซ่อนตัวได้ง่าย สงสัยอะไรอีกมั้ย?"
10019-30 = "อืม ก็ไม่ได้แย่เท่าไรนะ"
10019-40 = "(มีอะไรน่าตื่นเต้นเยอะเลย...)"
10019-50 = "นั่นอะไรน่ะ?"
10019-60 = "หุหุ สนุกจัง"
10019-70 = "นะ...น่ารักจังเลย...!"
10019-80 = "คุณครู กำลังรออยู่เลย\nภารกิจวันนี้คืออะไรเหรอ?\nมีงานอะไรให้ฉันช่วยมั้ย?"
10019-90 = "คุณครูกลับมาแล้วสินะ\nบอกฉันก่อนสิ\nว่าฉันต้องทำอะไร"
10019-100 = "ถ้าชีวิตไร้ความหมายที่แท้จริง\nแล้วเราจะมีชีวิตอยู่ไปเพื่อสิ่งใด?"
10019-110 = "หืม?\nมะ.. ไม่มีอะไรหรอก"
10019-120 = "รับภารกิจและทำเป้าหมาย\nให้สำเร็จ"
10019-130 = "ฉันไม่เคยคิดอะไร\nนอกเหนือจากเรื่องนี้เลย"
10019-140 = "จนถึงตอนนี้..."
10019-150 = "ฉันมีประโยชน์บ้างมั้ยนะ...?"
10019-160 = "มีงั้นเหรอ?"
10019-170 = "อะ...อื้อ"
10019-180 = "ฉันเองก็รู้ว่าฉันเป็นคนคุยไม่สนุก\nถ้าคาดหวังอะไรแบบนั้นละก็\nขอโทษด้วยนะ"
10019-190 = "บางทีสักวันหนึ่ง..."
10019-200 = "ฉันอาจจะทรยศ\nความคาดหวังของคุณครูก็ได้"
10019-210 = "แม้ทุกอย่างจะสูญเปล่า\nแต่หากมีคุณครูอยู่ละก็\nฉันว่ามันก็โอเคนะ..."
10019-220 = "สุขสันต์วันเกิดนะ"
10019-230 = "นี่คุณครู...\nฉลองวันเกิดให้ฉันจริงๆ เหรอ?"
10019-240 = "ฉลองวันเกิดให้ฉันแบบนี้...\nไม่เป็นไรจริงๆ เหรอ?"
10019-250 = "ดีใจจัง... ขอบคุณนะ"
10019-260 = "ขอบคุณที่เหน็ดเหนื่อยด้วยกันมา\nในปีนี้นะ ปีหน้าเราก็..."
10019-270 = "มะ.. ไม่มีอะไรหรอก!"
10019-280 = "วันคริสต์มาส...\nวันแห่งความศักดิ์สิทธิ์\nที่สำคัญที่สุดของปี"
10019-290 = "ในวันแบบนี้ให้คนอย่างฉัน\nอยู่ด้วยจะไม่เป็นไรเหรอ?"
10019-300 = "คนอื่นก็คงจะสนุก\nจนอึกทึกครึกโครม\nแต่ฉันก็ไม่ได้สนใจหรอก"
10019-310 = "แต่ถ้าคุณครูชอบละก็...\nฉันก็จะพยายามลองสนใจดู"
10019-330 = "ล้อเล่นใช่มั้ยเนี่ย?\nใช่มั้ยนะ?"
10019-340 = "ถ้าเป็นคุณครูละก็\nฉันไม่ติดอะไรหรอก..."
10019-350 = "งือ...! น่ารักจังเลย\nอยากได้ตุ๊กตา\nแบบนี้มานานแล้ว"
10019-360 = "ฮิฮิฮิ...\nฮิฮิ..."
10019-370 = "...\nหือ...? เปล่า\nไม่มีอะไรหรอก"
10019-380 = "(...ไม่บอกหรอก\nว่าฉันไม่ได้อยากทำให้\nคุณครูลำบากใจน่ะ)"
10019-390 = "แต่ว่าทำไมคุณครู\nรู้จักสถานที่น่ารักๆ แบบนี้ได้ล่ะ?"
10019-400 = "อย่างนั้นเหรอ?\nไม่คิดเลยว่าคุณครูจะชอบแบบนี้?"
10019-410 = "อย่าทำเหมือน...\nว่าฉันเป็นเด็กๆ สิ?"
10019-420 = "แต่ถึงอย่างนั้น\nมันก็ไม่เป็นไรหรอก"
10019-2600 = "คุณครูตัดสินใจได้เลย\nว่าจะให้ฉันใช้พลังนี้ยังไง\nก็ฉัน... อยู่ที่นี่เพื่อคุณครูนี่นา"

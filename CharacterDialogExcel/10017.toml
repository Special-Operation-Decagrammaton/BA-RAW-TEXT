[translation]
10017-20 = "붉은겨울 학원 서기장의 행차다!\n영광으로 알도록, 콤라드!"
10017-30 = "음, 좋아좋아.\n서기장은\n만족했다."
10017-40 = "음, 별 이상 없군."
10017-50 = "에헴.\n이 몸의\n행차시다."
10017-60 = "오늘도 평화롭군.\n좋아. 이게 다\n이 몸의 덕인 거야!"
10017-70 = "(수염…\n잘 붙어있지?)"
10017-80 = "기다리고 있었다! 콤라드!\n할 일이 태산이야!\n게으름은 용서하지 않는다!"
10017-90 = "왔는가! 콤라드!\n그대와 함께 해결해야 할 임무가\n잔뜩 있으니 각오해 두게!"
10017-100 = "나를 불렀나, 콤라드?"
10017-110 = "오늘도 이 몸과 함께!\n열심히 혁명에 동참하는 거다!"
10017-120 = "나의 권위가 느껴지나?"
10017-130 = "그치만 두려워하지 않아도 돼.\n이 몸은 관대하니까."
10017-140 = "응?\n수염이 떨어졌다고?"
10017-150 = "히, 히야아아아?! 아, 안돼.\n내 권위가…?"
10017-160 = "뭐야… 잘 붙어있잖아!\n장난치면 숙청해버릴 거야?"
10017-170 = "헤헤… 에헤헤헤…\n콤라드, 오늘도 같이\n있으니까 좋아."
10017-180 = "생일이라고?\n정말?"
10017-190 = "좋아, 콤라드의 탄생일을\n학원기념일로 지정해야겠어!"
10017-200 = "아, 으, 으응….\n어쩐지 부끄러워…."
10017-210 = "생일 축하라니,\n권위가 떨어지는 느낌이야…."
10017-220 = "무, 물론 고마워,\n콤라드!"
10017-230 = "새해가 밝았다네, 콤라드.\n이번 한 해의 계획은 세웠는가?"
10017-240 = "딱히 없다면 이 몸과 함께\n논의해보아도 좋아!"
10017-250 = "오늘은 크리스마스!\n긴 수염의 붉은 뚱보가\n인민들에게 선물을 나눠 준다니…"
10017-260 = "이거 굉장해!\n나도 선물 받고 싶어!"
10017-270 = "할로윈이라면,\n다들 뭔가 요란한 분장을\n해대서 말야."
10017-280 = "아, 이 수염은\n할로윈 분장이 아니라니까!"
10017-290 = "물어보지 마!\n숙청해버린다?"
10017-300 = "기다리고 있었다! 콤라드!\n할 일이 태산이야!\n게으름은 용서하지 않는다!"
10017-310 = "왔는가! 콤라드!\n그대와 함께 해결해야 할 임무가\n잔뜩 있으니 각오해 두게!"
10017-320 = "나를 불렀나, 콤라드?"
10017-330 = "오늘도 이 몸과 함께!\n열심히 혁명에 동참하는 거다!"
10017-340 = "나의 권위가 느껴지나?"
10017-350 = "그치만 두려워하지 않아도 돼.\n이 몸은 관대하니까."
10017-360 = "헤헤… 에헤헤헤…\n콤라드, 오늘도 같이\n있으니까 좋아."
10017-370 = "어…. 콤라드 앞에서만\n맨얼굴 보, 보여주는 거니까!"
10017-380 = "놀리면 안 돼!\n숙청할 거야?"
10017-390 = "아, 아아…. 이제 슬슬\n수염을 붙이게 해줘-"
10017-400 = "맨얼굴은 부끄럽단 말야-"
10017-410 = "생일이라고?\n정말?"
10017-420 = "좋아, 콤라드의 탄생일을\n학원기념일로 지정해야겠어!"
10017-430 = "아, 으, 으응….\n어쩐지 부끄러워…."
10017-440 = "생일 축하라니,\n권위가 떨어지는 느낌이야…."
10017-450 = "무, 물론 고마워,\n콤라드!"
10017-460 = "새해가 밝았다네, 콤라드.\n이번 한 해의 계획은 세웠는가?"
10017-470 = "딱히 없다면 이 몸과 함께\n논의해보아도 좋아!"
10017-480 = "오늘은 크리스마스!\n긴 수염의 붉은 뚱보가\n인민들에게 선물을 나눠 준다니…"
10017-490 = "이거 굉장해!\n나도 선물 받고 싶어!"
10017-510 = "꺄하하하하-,\n그 정도로는 안 돼, 좀 더 크게,\n더 크게 해야지."
10017-520 = "에, 에, 엣-취!\n…훌쩍."
10017-530 = "에잇, 방해야!\n지금은 집중하고 있다고!"
10017-540 = "춥지 않냐고?\n몸이 허약하군, 콤라드!\n이 정도는 끄떡없어-!"
10017-550 = "아직 3시간은\n더 놀 수 있단 말이다!"
10017-560 = "좋은 생각이 났어,\n콤라드는 거기서\n눈사람을 만들어!"
10017-570 = "이쪽에서 우리들이\n만든 걸 그 옆에 두는 거다!"
10017-580 = "응? 왜?\n괜찮지 않나?"
10017-590 = "…그 둘 사이에\n작은 눈사람도 만들까?"
10017-600 = "아! …무, 물론 콤라드가\n괜찮다면 말이야!"
10017-2600 = "아주 마음에 들어… 이것이야말로 나의 권위\n나의 힘! 그리고 나의 수염!\n이제는 두려워질 정도로군…\n하지만 걱정하지 말게, 콤라드.\n이 몸은 언제나 그대의 편이니까!"

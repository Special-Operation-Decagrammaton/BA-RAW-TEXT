[translation]
10017-20 = "ผู้นำแห่งสหภาพเรดวินเทอร์ปรากฏตัวแล้ว!\nถือว่าเป็นเกียรติของเธอนะสหาย!"
10017-30 = "อืม ดีเลยๆ\nถูกใจผู้นำคนนี้มากเลย"
10017-40 = "อืม ไม่มีอะไรผิดปกติแฮะ"
10017-50 = "อะแฮ่ม\nหลีกทางให้ท่านผู้นี้ด้วย"
10017-60 = "วันนี้ก็สงบสุขดีจัง\nที่สงบสุขแบบนี้\nก็เพราะเราเลยนะ"
10017-70 = "(หนวดเรายังอยู่ดีใช่มั้ย...?)"
10017-80 = "กำลังรออยู่เลยสหาย!\nมีงานกองรอเป็นภูเขาเลยนะ\nเราไม่ให้อภัยแก่ความเกียจคร้านแน่!"
10017-90 = "มาแล้วเหรอสหาย?\nเรามีภารกิจต้องทำด้วยกันเยอะเลย\nเตรียมตัวไว้ให้ดีล่ะ!"
10017-100 = "อยากเจอเราหรือสหาย?"
10017-110 = "วันนี้จะได้ปฏิรูปครั้งใหญ่\nกับเรายังไงล่ะ!"
10017-120 = "รู้สึกถึงอำนาจของเรามั้ย?"
10017-130 = "แต่ไม่ต้องกลัวไปหรอกนะ\nเราไม่ได้ใจร้ายอะไรขนาดนั้น"
10017-140 = "ว่าไงนะ?\nหนวดของเราหลุดงั้นเหรอ?"
10017-150 = "ม่ายยยยยย! ไม่ได้นะ\nนั่นมันอำนาจของเรา..."
10017-160 = "อะไรกัน... มันก็ติดอยู่ดีแล้วนี่!\nแกล้งกันแบบนี้เดี๋ยวเจอดีแน่!"
10017-170 = "ฮิฮิ... ฮิฮิ...\nดีจังเลยนะ\nที่วันนี้ก็ได้อยู่กับสหาย"
10017-180 = "วันนี้วันเกิดสหายเหรอ?\nจริงเหรอ?"
10017-190 = "วันเกิดสหายทั้งที ต้องกำหนด\nให้เป็นวันหยุดของสหภาพ!"
10017-200 = "เอ่อ... อืม...\nแบบนี้มันก็น่าเขินนะ..."
10017-210 = "พอมีคนมาอวยพรวันเกิด\nรู้สึกว่าตัวเล็กลงยังไงไม่รู้..."
10017-220 = "ตะ... แต่ก็ขอบคุณนะสหาย!"
10017-230 = "ปีใหม่แล้วสินะสหาย\nวางแพลนของปีนี้ไว้หรือยัง?"
10017-240 = "หากไม่มีแผนอะไรล่ะก็\nลองมาหารือกับเราก็ได้นะ!"
10017-250 = "วันคริสต์มาสล่ะ!\nวันที่ตาแก่จ้ำม่ำใส่ชุดแดง\nจะมอบของขวัญให้กับเด็กๆ..."
10017-260 = "วิเศษไปเลยใช่มั้ยล่ะ\nเราก็อยากได้ของขวัญเหมือนกันนะ!"
10017-270 = "วันฮาโลวีนน่ะเหรอ?\nเราว่ามันคือวันแต่งคอสเพลย์\nระดับชาติมากกว่า"
10017-280 = "แต่ว่าหนวดของเรา\nไม่ใช่คอสตูมฮาโลวีนนะ!"
10017-290 = "เลิกถามได้แล้ว!\nเดี๋ยวเก็บซะเลย!"
10017-300 = "กำลังรออยู่เลยสหาย!\nมีงานกองรอเป็นภูเขาเลยนะ\nเราไม่ให้อภัยแก่ความเกียจคร้านแน่!"
10017-310 = "มาแล้วเหรอสหาย?\nเรามีภารกิจต้องทำด้วยกันเยอะเลย\nเตรียมตัวไว้ให้ดีล่ะ!"
10017-320 = "อยากเจอเราหรือสหาย?"
10017-330 = "วันนี้จะได้ปฏิรูปครั้งใหญ่\nกับเรายังไงล่ะ!"
10017-340 = "รู้สึกถึงอำนาจของเรามั้ย?"
10017-350 = "แต่ไม่ต้องกลัวไปหรอกนะ\nเราไม่ได้ใจร้ายอะไรขนาดนั้น"
10017-360 = "ฮิฮิ... ฮิฮิ...\nดีจังเลยนะ\nที่วันนี้ก็ได้อยู่กับสหาย"
10017-370 = "อืม... มีแค่สหายคนเดียวเท่านั้นนะ\nที่ได้เห็นหน้าสดของเรา!"
10017-380 = "อย่ามาล้อเล่นนะ!\nอยากโดนดีรึไง?"
10017-390 = "พอแล้ว... ตอนนี้ขอให้เรา\nได้ติดหนวดเถอะนะ น้าาาา"
10017-400 = "หน้าสดแบบนี้เราก็อายเป็นนะ..."
10017-410 = "วันนี้วันเกิดสหายเหรอ?\nจริงเหรอ?"
10017-420 = "วันเกิดสหายทั้งที ต้องกำหนด\nให้เป็นวันหยุดของสหภาพ!"
10017-430 = "เอ่อ... อืม...\nแบบนี้มันก็น่าเขินนะ..."
10017-440 = "พอมีคนมาอวยพรวันเกิด\nรู้สึกว่าตัวเล็กลงยังไงไม่รู้..."
10017-450 = "ตะ... แต่ก็ขอบคุณนะสหาย!"
10017-460 = "ปีใหม่แล้วสินะสหาย\nวางแพลนของปีนี้ไว้หรือยัง?"
10017-470 = "หากไม่มีแผนอะไรล่ะก็\nลองมาหารือกับเราก็ได้นะ!"
10017-480 = "วันคริสต์มาสล่ะ!\nวันที่ตาแก่จ้ำม่ำใส่ชุดแดง\nจะมอบของขวัญให้กับเด็กๆ..."
10017-490 = "วิเศษไปเลยใช่มั้ยล่ะ\nเราก็อยากได้ของขวัญเหมือนกันนะ!"
10017-510 = "ฮ่ะฮ่ะฮ่า แค่นั้นยังไม่พอหรอก\nต้องใหญ่กว่านี้อีก\nต้องจัดใหญ่จัดเต็มกว่านี้!"
10017-520 = "ฮะ.. ฮะ... ฮัดชิ้ว! งื้อออ..."
10017-530 = "เฮ้ อย่ามาขัดขวางนะ!\nตอนนี้เรากำลังตั้งใจอยู่!"
10017-540 = "เราหนาวรึเปล่าน่ะเหรอ?\nร่างกายปวกเปียกซะจริงเลยนะ\nแค่นี้ไม่เท่าไรหรอก!"
10017-550 = "เรายังเล่นต่อได้\nอีกสามชั่วโมงเลยละ!"
10017-560 = "เรามีความคิดดีๆ แล้วละ\nสหาย ไปปั้นตุ๊กตาหิมะตรงนั้นสิ!"
10017-570 = "แล้วเอาอันที่พวกเราทำตรงนี้\nไปวางไว้ข้างๆ นั้น!"
10017-580 = "หืม? ทำไมล่ะ?\nไม่โอเคเหรอ?"
10017-590 = "ตรงระหว่างสองตัวนั้น\nเราปั้นตุ๊กตาหิมะตัวเล็กๆ\nขึ้นมาอีกตัวดีมั้ย?"
10017-600 = "อ๊ะ! ได้อยู่แล้ว\nถ้าสหายโอเคก็ไม่มีปัญหา!"
10017-2600 = "ถูกใจมากเลยละ\nอำนาจของเรา! พลังของเรา! หนวดของเรา!\nตอนนี้คงจะค่อยๆ กลัวขึ้นมาแล้วสินะ...\nแต่ไม่ต้องกังวลหรอกสหาย\nเราจะคอยอยู่กับสหายตลอดเอง"

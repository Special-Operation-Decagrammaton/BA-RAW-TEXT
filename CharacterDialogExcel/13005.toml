[translation]
13005-20 = "มีแต่คนพูดว่าหน้าของฉันดูน่ากลัว\nแต่ที่หน้าบึ้งแบบนี้ ฉันไม่ได้โกรธอะไรหรอกนะ"
13005-30 = "เฮ้อ...\nน่ากังวลจัง"
13005-40 = "อืม...\nรู้สึกสนุก\nขึ้นมาหน่อยแล้วสิ"
13005-50 = "แผนการในอนาคตเหรอ...\nอืม จะไม่เป็นไรใช่มั้ยนะ"
13005-60 = "ฉันดูน่ารัก... แบบไม่เคยเห็น\nมาก่อนเหรอ? อืม... แกล้งพูดแบบนี้...\nฉันไม่ตลกด้วยหรอกนะ"
13005-70 = "รู้อยู่แล้วแหละน่า\nว่าฉันดูน่ากลัว"
13005-80 = "มาแล้วเหรอครู?\nงั้นมาเริ่มงานกันเลยไหม?"
13005-90 = "มีงานจ้างเข้ามาใหม่น่ะ\nรู้สึกคุ้นเคยจัง"
13005-100 = "บางมุมในชาเล่ต์\nก็คล้ายหน่วยรับจ้างเหมือนกันนะ"
13005-110 = "มีธุระอะไรเหรอ?\nถ้ามีปัญหาอะไร ฉันก็จะยินดีช่วย"
13005-120 = "รู้อยู่แล้วน่าว่าฉันดูน่ากลัว\nก็ฉันถูกเข้าใจผิดมาตลอดนี่นา"
13005-130 = "ฉันดูน่ารัก... งั้นเหรอ?\nอย่ามาแกล้งกันสิครู"
13005-140 = "ฉันจะช่วยครูเอง ฉันสัญญา"
13005-150 = "ฉันเต็มที่กับทุกงานจ้างอยู่แล้ว"
13005-160 = "นั่นคือสิ่งที่มือโปรเค้าทำกัน"
13005-170 = "สุขสันต์วันเกิดนะครู"
13005-180 = "อืม.. ฉันควรชวนคุยอะไร\nในวันแบบนี้ดีนะ..?"
13005-190 = "วันเกิดเหรอ?\nอะ... เอ่อ..."
13005-200 = "ถ้าไม่นับหน่วยรับจ้าง\nนี่เป็นครั้งแรกที่มีคนอื่นมาอวยพรน่ะ"
13005-210 = "ขะ... ขอบคุณนะ"
13005-220 = "ปีใหม่แล้ว..."
13005-230 = "ปีนี้ก็ฝากตัวด้วยนะ"
13005-240 = "เมอร์รีคริสต์มาส\nนี่คือวันของคู่รักสินะ..."
13005-250 = "อืมม"
13005-260 = "ถนนดูสว่างไสว\nและเต็มไปด้วยความหวาน\nแต่ฉันไม่คุ้นกับบรรยากาศนี้หรอก..."
13005-270 = "อืม..."
13005-280 = "แต่เราลองไปข้างนอกด้วยกันดูไหม?"
13005-300 = "ครูไม่เห็นต้องตามมาถึงที่นี่เลย"
13005-310 = "หรือว่าจะไม่อยู่นะ..."
13005-320 = "ฉันแวะมาที่นี่เพราะฝนตกน่ะ"
13005-330 = "คงไม่เป็นไรหรอก\nเพราะน้องอยู่ลำพังได้"
13005-340 = "มันดีซะอีกที่ไม่ต้องไปถูกมัด\nแล้วก็ไม่ต้องบาดเจ็บ..."
13005-350 = "แต่ว่าการอยู่ตัวคนเดียว\nมันก็เหงานะ..."
13005-360 = "ที่ฉันทำแบบนี้\nเพราะปล่อยไว้เฉยๆ ไม่ได้"
13005-370 = "ไม่ได้มีจุดประสงค์อื่นหรอก\nทีนี้เข้าใจหรือยังล่ะ?"
13005-2600 = "ฉันไม่คัดค้านการตัดสินใจของครูหรอก\nเฮ้อ... เปล่าหรอก\nฉันจะพยายามทำให้ได้ตามที่คาดหวังก็แล้วกันนะ"

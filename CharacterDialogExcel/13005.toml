[translation]
13005-20 = "I'm not mad or anything. People always say I look scary."
13005-30 = "*sigh* That's worrying."
13005-40 = "Well, I guess my interest is piqued at least a little."
13005-50 = "Our plan for the future? ...It'll work itself out."
13005-60 = "You didn't realize I could be so cute...? Hmph. That's a lame joke."
13005-70 = "I'm fully aware of how intimidating I can be, though."
13005-80 = "Welcome, Sensei. Well, then. Let's get to work."
13005-90 = "We got a new request in. You know, this sort of work feels familiar."
13005-100 = "I guess Schale reminds me of Problem Solver to some extent."
13005-110 = "Do you need something? I can handle whatever you need, you know."
13005-120 = "...I get it. My face scares people. They get the wrong idea sometimes."
13005-130 = "You think I'm...cute? Stop teasing me, Sensei."
13005-140 = "I'm here to help you. That's what we agreed on."
13005-150 = "I'll put all I have into knocking out requests."
13005-160 = "That's what being professional is all about."
13005-170 = "Happy birthday, Sensei."
13005-180 = "I'm not really sure what else you're supposed to say on birthdays..."
13005-190 = "Happy birthday? Hmm."
13005-200 = "It's just... This is the first time anyone outside Problem Solver has noticed."
13005-210 = "Th-Thanks..."
13005-220 = "It's New Year's Day."
13005-230 = "I'll be relying on you a lot this year as well."
13005-240 = "Merry Christmas. I've heard this is considered a romantic holiday..."
13005-250 = "Hmm..."
13005-260 = "Bright decorations, and so many sweets. I'm just not used to stuff like that."
13005-270 = "Well..."
13005-280 = "...should we go sightseeing together anyway?"
13005-300 = "You really didn't need to follow me all this way, Sensei."
13005-310 = "I guess it's not here..."
13005-320 = "I only came here because it was raining."
13005-330 = "It'll be fine. Cats can look after themselves."
13005-340 = "Not being tied down by someone, not being hurt by others...can be a good thing..."
13005-350 = "But still, having no one to rely on can feel a bit lonely..."
13005-360 = "A part of me can't just leave it alone. That's all."
13005-370 = "That's all there is to it. Got it, Sensei?"
13005-2600 = "Although I don't disagree with your decisions... *sigh* Never mind. I'll try to meet your expectations."

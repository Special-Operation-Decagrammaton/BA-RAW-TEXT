[translation]
13005-20 = "화난 건 아니니 오해하진 마. 선생.\n얼굴이 무섭다는 말은 자주 들으니까."
13005-30 = "하아….\n걱정이네."
13005-40 = "흠,\n조금은 흥미가\n생기는데."
13005-50 = "앞으로의\n계획은…\n뭐, 괜찮으려나."
13005-60 = "의외로… 귀엽다고?\n흠. 재미없는… 농담이네."
13005-70 = "뭐, 무섭게 생겼다는 건\n알고 있어."
13005-80 = "어서 와, 선생.\n그럼 일을 시작해볼까."
13005-90 = "다음 의뢰가 들어왔어.\n어쩐지 익숙하네."
13005-100 = "샬레는 흥신소랑\n닮은 구석이 있는 거 같아."
13005-110 = "볼일이라도 있어?\n뭐, 문제가 있으면\n해결해 주겠지만."
13005-120 = "…알아.\n무서운 얼굴이라는 거.\n오해를 자주 받으니까."
13005-130 = "귀엽…다고?\n장난하지 마, 선생."
13005-140 = "선생을 돕겠어.\n그것이 약속이니까."
13005-150 = "의뢰에는\n최선을 다하도록 할게."
13005-160 = "그것이 프로의 자세니까."
13005-170 = "생일 축하해 선생."
13005-180 = "음, 이런 날엔\n무슨 얘길 해야하는 거지…."
13005-190 = "생일?\n으음."
13005-200 = "아니, 흥신소 이외의 사람에게\n축하 받는건 처음이라…."
13005-210 = "고, 고마워…"
13005-220 = "새해라…."
13005-230 = "올 한 해도,\n잘 부탁해."
13005-240 = "메리 크리스마스.\n연인들의 날이라…."
13005-250 = "흐음…."
13005-260 = "거리가 눈부시고,\n달콤한 것으로 가득 하네.\n난 익숙하지 않은 분위기라…."
13005-270 = "음,"
13005-280 = "그래도 밖으로\n같이 한 번 나가볼까?"
13005-300 = "여기까지 따라 올 필요는\n없는데 말야, 선생."
13005-310 = "지금 없는 건가…."
13005-320 = "그냥 비가 오니까\n와 봤던 거뿐이야."
13005-330 = "…아마 괜찮겠지.\n혼자서도 잘 지내는\n녀석이니까."
13005-340 = "얽매이는 것도,\n상처받을 일도 없으니\n좋지만…."
13005-350 = "그래도 혼자는\n쓸쓸하니까…."
13005-360 = "…내버려 둘 수 없는\n녀석이니까. 그냥 그뿐이야."
13005-370 = "다른 뜻은 아니라고.\n응, 선생?"
13005-2600 = "선생의 결정에 이견은 없지만 말야.\n하아… 아무것도 아니야.\n기대하는 만큼 열심히 노력해 볼게."

[translation]
10050-10 = "블루 아카이브!"
10050-20 = "훈육지원부 '매화원'의 코코나입니다!\n아, 아닙니다! 이래도 어엿한 교관이라구요!?"
10050-30 = "이건, 도대체……?"
10050-40 = "뭔가 이상한\n물건이 많네요."
10050-50 = "이거, 매화원에도\n놓아 두고 싶은데……"
10050-60 = "슌 언니,\n어디로 가\n버렸을까……?"
10050-70 = "아이들의\n교육에 좋겠어요."
10050-80 = "어서 오세요, 선생님!\n아, 아니, 기다렸다거나\n하는 것은……"
10050-90 = "그러니까, 뭐 조금은…"
10050-100 = "숙녀를 기다리게 하시다니,\n감점이에요!"
10050-110 = "네, 그럼 오늘도\n잘 부탁드려요."
10050-120 = "저도 수업할 줄 알거든요?\n제 수업, 들어 보시겠어요?"
10050-130 = "코, 코코나 쨩이라고\n부르지 말아주세요!\n어린 아이 같잖아요!"
10050-140 = "무슨 일이세요?"
10050-150 = "그냥 불러 봤다구요……?\n뭐예요, 그게……"
10050-160 = "아아, 정말. 찔러 대지\n말아 주세요!\n어린애가 아니니까요!"
10050-170 = "생일 축하드려요.\n선생님. 어때요? 제대로\n기억하고 있었다구요."
10050-180 = "……제 생일도,\n기억하고 계신가요?"
10050-190 = "제 생일……\n기억해 주셨군요?"
10050-200 = "에헤헤, 고맙습니다!"
10050-210 = "새해 복 많이\n받으세요 선생님!"
10050-220 = "저는 올해도 교관으로서 열심히\n할 테니 응원해 주셨으면 해요."
10050-230 = "올해도 잘 부탁드릴게요!"
10050-240 = "크리스마스…\n산타 할아버지는\n올해도 올까요?"
10050-250 = "아, 아뇨! 저는 교관이니까,\n기대하고 있거나\n그런게 아니라…!"
10050-260 = "할로윈 사탕, 이요?"
10050-270 = "저, 저는 물론\n주는 쪽이에요!\n교관이니까요!"
10050-280 = "그렇지만, 일단 사탕을\n싫어하진 않으니까요……"
10050-300 = "그래도……\n제가 당근을 싫어하는 게\n변하는 건 아니에요."
10050-310 = "모처럼 선생님과 오기도 했고,\n어엿한 교관이니까 어쩔 수 없이\n먹고 있을 뿐이에요."
10050-320 = "아시겠어요?\n정말, 선생님은\n언제나 억지로……"
10050-330 = "만약 당근을 반드시\n먹어야 하는 경우라면……\n다음부터는, 여기로 올 거에요."
10050-340 = "선생님과 처음\n함께 온 장소, 이기도 하고……"
10050-350 = "아시겠어요? 좋아하게\n된 게 아니라구요?\n아시겠죠?"
10050-360 = "뭐……\n당근도, 그렇게까지\n나쁘지는 않네요."
10050-2600 = "때로는 엄격하게, 때로는 상냥하게……\n해야 할 때 제대로 할 수 있는 것이,\n좋은 교관이라고 생각합니다.\n저도, 할 거예요!"

[translation]
10050-10 = "Blue Archive!"
10050-20 = "ฝ่ายสนับสนุนด้านวินัยแห่ง 'สวนต้นบ๊วย' โคโคน่าค่ะ!\nมะ...ไม่นะคะ! เห็นแบบนี้ฉันก็เป็นผู้ฝึกสอนที่องอาจนะคะ!"
10050-30 = "นี่มันอะไรน่ะ...?"
10050-40 = "มีของที่ดูแปลกตา\nเยอะแยะเลยนะคะ"
10050-50 = "อืม... อยากเอาอันนั้น\nไปไว้ที่สวนต้นบ๊วยบ้างจัง"
10050-60 = "พี่ชุน…\nหายไปไหนกันนะ...?"
10050-70 = "ดูเป็นประโยชน์...\nกับพวกเด็กๆ ดีเลยละค่ะ"
10050-80 = "เชิญค่ะ คุณครู!\nเปล่านะคะ...\nฉันไม่ได้รอสักหน่อย"
10050-90 = "ที่จริงก็... นิดหน่อย..."
10050-100 = "ทำให้สุภาพสตรีรอแบบนี้\nจะถูกตัดคะแนนนะคะ!"
10050-110 = "ถ้าอย่างนั้นวันนี้ก็\nต้องขอรบกวนด้วยนะคะ"
10050-120 = "ฉันก็สอนได้นะคะ คุณครู\nสนใจเข้าคลาสที่ฉันสอนมั้ยคะ?"
10050-130 = "คะ...โคโคน่าจังงั้นเหรอ?\nบอกว่าอย่าเรียกแบบนั้นไงคะ\nฉันไม่ใช่เด็กๆ แล้วนะคะ!"
10050-140 = "มีงานอะไรรึเปล่าคะ?"
10050-150 = "แค่ลองเรียกเฉยๆ งั้นเหรอคะ...?\nอะไรกันคะนั่นน่ะ..."
10050-160 = "อ๊าย จริงๆ เลย\nอย่าสะกิดบ่อยๆ สิคะ!\nไม่ใช่เด็กๆ แล้วนะคะ!"
10050-170 = "สุขสันต์วันเกิดค่ะ คุณครู\nเป็นยังไงบ้างคะ?\nฉันจำได้แม่นเลยค่ะ"
10050-180 = "คุณครูจำวันเกิดของฉัน...\nได้รึเปล่าคะ?"
10050-190 = "คุณครูจำวันเกิดของฉัน...\nได้ด้วยเหรอคะเนี่ย?"
10050-200 = "ฮิฮิฮิ... ขอบคุณมากเลยนะคะ!"
10050-210 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่ค่ะ คุณครู!"
10050-220 = "ปีนี้ฉันจะตั้งใจทำหน้าที่ผู้ฝึกสอน\nคุณครูเป็นกำลังใจให้ด้วยนะคะ"
10050-230 = "ปีนี้ก็ขอรบกวนด้วยนะคะ!"
10050-240 = "คริสต์มาส....\nปีนี้คุณลุงซานต้า...\nจะมาหารึเปล่าคะ?"
10050-250 = "มะ... ไม่มีอะไรค่ะ! ฉันเป็นผู้ฝึกสอน\nเพราะงั้นไม่ได้คาดหวัง\nเรื่องพวกนั้นสักหน่อยค่ะ!"
10050-260 = "ลูกกวาดฮาโลวีนเหรอคะ?"
10050-270 = "นะ...แน่นอนค่ะ\nฉันต้องเป็นฝ่ายแจกลูกกวาด\nก็ฉันเป็นผู้ฝึกสอนนี่คะ!"
10050-280 = "แต่ว่า... ฉันเอง...\nก็ไม่ได้ไม่ชอบลูกกวาดหรอกค่ะ"
10050-300 = "แต่ถึงยังไง...\nเรื่องที่ฉันไม่ชอบแคร์รอต\nก็ไม่เปลี่ยนไปหรอกนะคะ"
10050-310 = "แต่เพราะว่าวันนี้มากับคุณครู\nและฉันก็เป็นผู้ฝึกสอน เลยต้องกิน\nอย่างหลีกเลี่ยงไม่ได้ค่ะ"
10050-320 = "เข้าใจมั้ยคะ?\nคุณครูนี่จริงๆ เลย\nชอบบังคับกันอยู่เรื่อย..."
10050-330 = "ถ้าเกิดต้องกินแคร์รอตละก็\nเอาไว้คราวหน้า ฉันจะมาที่นี่ค่ะ"
10050-340 = "ก็ที่นี่เป็นที่แรก\nที่ฉันได้มากับคุณครูนี่นา..."
10050-350 = "เข้าใจมั้ยคะ?\nไม่ใช่ว่าเพราะชอบหรอกนะคะ\nเข้าใจใช่มั้ยคะ!"
10050-360 = "แต่ก็นะ...\nแคร์รอตมันก็...\nไม่ได้เลวร้ายเท่าไรหรอกค่ะ"
10050-2600 = "บางครั้งก็ต้องเข้มงวด บางครั้งก็ใจดี...\nฉันคิดว่าการวางตัวให้เหมาะสม\nคือการเป็นผู้ฝึกสอนที่ดีค่ะ\nเพราะงั้นฉันก็จะทำแบบนั้นค่ะ!"

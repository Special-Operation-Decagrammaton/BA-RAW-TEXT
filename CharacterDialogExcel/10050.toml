[translation]
10050-10 = "蔚藍檔案！"
10050-20 = "我是培育支援部「梅花園」的心菜！\n不，不是啦！我是一名合格的教官唷！？"
10050-30 = "這個，\n到底是……？"
10050-40 = "總覺得有很多\n奇怪的東西呢。"
10050-50 = "這個，梅花園\n也想要呢……"
10050-60 = "旬姐姐，\n跑去哪裡了……？"
10050-70 = "這似乎對\n教育有幫助。"
10050-80 = "歡迎回來，老師！\n啊，不是，也沒有\n一直在等你什麼的……"
10050-90 = "那個，是有一點點啦……"
10050-100 = "居然讓優秀的淑女等，\n要扣分！"
10050-110 = "那麼，\n今天也請\n多多指教唷。"
10050-120 = "我也經常教課唷……\n老師也要來聽聽看嗎？"
10050-130 = "請，請不要叫我\n心菜醬！這樣不是\n像小孩子一樣嗎！"
10050-140 = "怎麼了嗎？"
10050-150 = "……咦，只是想叫一下？\n什麼意思……"
10050-160 = "啊啊討厭，\n請別再摸我了！\n我不是小孩子！"
10050-170 = "祝你生日快樂，老師。\n怎麼樣，\n我記得很清楚吧。"
10050-180 = "……我的生日，\n老師也會記得吧？"
10050-190 = "啊，我的生日……\n你還記得呢。"
10050-200 = "耶嘿嘿，謝謝你！"
10050-210 = "新年快樂，\n老師！"
10050-220 = "我今年也會以教官\n的身分好好努力，如果\n願意支持我的話我會很高興的。"
10050-230 = "今年也請多多指教！"
10050-240 = "聖誕節…\n聖誕老人\n今年也會來嗎？"
10050-250 = "啊，不是！畢竟我是教官，\n其實也沒什麼期待的意思……！"
10050-260 = "萬聖節的糖果嗎？"
10050-270 = "我，我當然是\n給的那一方啊！\n因為我是教官啊！"
10050-280 = "不過那個，我也\n不討厭糖果就是了……"
10050-300 = "那個……這不代表\n我已經喜歡上紅蘿蔔了哦。"
10050-310 = "只是既然都跟老師一起來了，\n身為一名優秀的教官，\n不得不吃而已。"
10050-320 = "明白了嗎？\n真是的，老師總是\n愛強迫人……"
10050-330 = "如果碰到無論如何\n都得吃紅蘿蔔的情況……\n從下次開始，我會到這裡來。"
10050-340 = "畢竟是和老師一起來過的店，\n這也是一部分原因……"
10050-350 = "聽懂了嗎？\n沒有喜歡上哦？\n明白嗎？"
10050-360 = "不過……\n紅蘿蔔，或許\n也沒有那麼糟。"
10050-2600 = "有時嚴格、有時善良……\n該做的時候就要做到最好，\n我認為那樣才是好的教官。\n我也要變成那樣！"

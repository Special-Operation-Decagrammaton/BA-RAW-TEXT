[translation]
10050-10 = "Blue Archive!"
10050-20 = "I'm Kokona of the Disciplinary Support Department's Plum Blossom Garden! N-No! I'm a full-fledged instructor!"
10050-30 = "What...is this?"
10050-40 = "There sure are a lot of weird items."
10050-50 = "I want to put this in the Plum Blossom Garden, too."
10050-60 = "Where did Shun go...?"
10050-70 = "It'll be good for educating kids."
10050-80 = "Welcome, Sensei! N-No, I wasn't really waiting..."
10050-90 = "Well, I guess a little..."
10050-100 = "How can you make a lady wait? You've lost points!"
10050-110 = "Yes, I'm looking forward to working with you today."
10050-120 = "I know how to teach a class. Do you wanna take my class?"
10050-130 = "P-Please don't call me Kokona without my title! I'm not just some little kid, you know?!"
10050-140 = "What's going on?"
10050-150 = "You called me just because? What the..."
10050-160 = "Ack! D-Don't poke me! Hmph! I'm not a little kid."
10050-170 = "Happy birthday, Sensei! Aren't you proud? I remembered!"
10050-180 = "...Do you know my birthday, Sensei?"
10050-190 = "My birthday... You remembered."
10050-200 = "Heeheehee. Thank you."
10050-210 = "Happy New Year, Sensei!"
10050-220 = "I'll be working hard as an instructor this year, too. I could really use your support."
10050-230 = "I'll be counting on you this year again!"
10050-240 = "Christmas... Will Santa Claus come again this year?"
10050-250 = "N-No! I'm an instructor. So it's not like I'm looking forward to it or anything...!"
10050-260 = "Halloween sweets?"
10050-270 = "I-I'm the one who'll be giving them out because I'm an instructor!"
10050-280 = "But it's not like I don't like sweets..."
10050-300 = "But...Just so you know... I still hate carrots."
10050-310 = "I'm just eating them for you...and because I'm an instructor. It's not because I want to."
10050-320 = "Do you understand, Sensei? It's not my fault you're so stubborn!"
10050-330 = "I guess... If I absolutely have to eat them—carrots, I mean... I'll come here."
10050-340 = "This is the first place I ever visited with you."
10050-350 = "So it's special now. Know what I mean? It's not the carrots. It's the company. Okay?"
10050-360 = "Anyway... I guess... Carrots aren't as bad as I thought."
10050-2600 = "Sometimes strict, sometimes kind.\nThings a good teacher keeps in mind.\nYou do your best, and when you do,\nI think to myself, \"I can too!\""

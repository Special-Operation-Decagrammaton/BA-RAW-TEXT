[translation]
9009005-420 = "おかえりなさい、先生。\nお仕事を選んでください。"
9009005-430 = "ここで先生のスケジュールを\n決めることができます。"
9009005-440 = "今日はどのお仕事から\n始めますか？"
9009005-450 = "生徒さんたちがお待ちです。\n私は先生をサポートします。"
9009005-460 = "先生は……\nいつも通りですね。\n安心しました。"
9009005-470 = "待機中。\n自由にスケジュールを\n選んでください。"
9009005-480 = "うーん……。"
9009005-490 = "芽、いつでるんでしょうね？"
9009005-500 = "……もう少し、\n見守りましょう。"
9009005-510 = "あ。"

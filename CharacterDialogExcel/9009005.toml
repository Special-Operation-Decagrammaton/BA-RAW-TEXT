[translation]
9009005-10 = "접속 확인."
9009005-20 = "[USERNAME] 선생님.\n기다리고 있었습니다."
9009005-30 = "업무를 시작할 시간입니다.\n[USERNAME] 선생님."
9009005-40 = "어떤 업무를 하실 겁니까,\n선생님?"
9009005-50 = "대기 중.\n해결이 필요한 작업들이\n다수 존재합니다."
9009005-60 = "여기서 선생님의 다양한 업무를\n진행할 수 있습니다."
9009005-70 = "[USERNAME] 선생님.\n원하시는 업무를 선택해 주십시오."
9009005-80 = "해결해 주셔야 할 업무들입니다.\n그럼 부탁드립니다."
9009005-90 = "혼란. 이해할 수 없는 행동입니다.\n찌르지 말아주세요. 고장납니다."
9009005-100 = "이해했습니다. 선생님은 지금\n딱히 할 일이 없는 것이군요.\n심심한 것이군요."
9009005-110 = "음……."
9009005-120 = "으음……."
9009005-130 = "……."
9009005-140 = "아……!"
9009005-150 = "이곳은…… 그런 건가요."
9009005-160 = "…그렇군요."
9009005-170 = "음… 과연."
9009005-180 = "음… 그런 구조군요."
9009005-190 = "……아."
9009005-200 = "비가 오면 이걸로……."
9009005-210 = "도움이 될 수 있겠죠…?"
9009005-220 = "저도… 함께…"
9009005-230 = "아."
9009005-240 = "저기, 보이나요? 프라나 쨩?"
9009005-250 = "저것 말인가요, 선배?"
9009005-260 = "네! 저거요!"
9009005-270 = "저긴 어때요?"
9009005-280 = "음……."
9009005-290 = "…앗."
9009005-300 = "지이-"
9009005-310 = "으음……"
9009005-320 = "…시선이 느껴지고 있습니다만."
9009005-330 = "…곤란하네요."
9009005-340 = "아."
9009005-350 = "인증 완료."
9009005-360 = "접속을 환영합니다,\n[USERNAME] 선생님."
9009005-370 = "선생님의 접속 프로세스를\n확인했습니다.\n잘 부탁드립니다."
9009005-380 = "싯딤의 상자 제약 해제\n프로세스 <베레스 웃사>\n한정 가동 중."
9009005-390 = "대기 중. 선생님,\n명령을 내려주십시오."
9009005-400 = "지금의 저는 무적입니다.\n평소보다 2배 강합니다."
9009005-410 = "아로나 선배와\n힘을 합쳐서,\n선생님을 지원합니다."

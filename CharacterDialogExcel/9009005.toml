[translation]
9009005-10 = "確認連線。"
9009005-20 = "[USERNAME]老師。\n我一直在等你。"
9009005-30 = "到了該開始工作的時間了。\n[USERNAME]老師。"
9009005-40 = "要從哪份工作開始呢？\n老師？"
9009005-50 = "待機中。\n必須解決的作業仍存在許多。"
9009005-60 = "在這裡可以進行\n老師的各種工作。"
9009005-70 = "[USERNAME]老師。\n請選擇想要進行的工作。"
9009005-80 = "必須解決的工作還有很多。\n那麼，就拜託你了。"
9009005-90 = "混亂。是無法理解的行動。\n請不要戳我。會故障的。"
9009005-100 = "我明白了。老師現在\n沒有特別要做的事對吧。\n很閒對吧。"
9009005-110 = "唔嗯……"
9009005-120 = "唔──嗯……"
9009005-130 = "……"
9009005-140 = "啊……！"
9009005-150 = "這裡……\n是這麼回事啊。"
9009005-160 = "……是這麼回事啊。"
9009005-170 = "呼呣……原來如此。"
9009005-180 = "呼呣……\n是那種構造呀。"
9009005-190 = "……啊。"
9009005-200 = "下雨的話就用這個……"
9009005-210 = "能派上用場嗎……？"
9009005-220 = "我也……一起……"
9009005-230 = "啊。"
9009005-240 = "那個，看得見嗎？星奈醬？"
9009005-250 = "你是指那個嗎，前輩？"
9009005-260 = "沒錯！就是那個！"
9009005-270 = "那邊怎麼樣呢？"
9009005-280 = "唔嗯……"
9009005-290 = "……啊。"
9009005-300 = "盯──"
9009005-310 = "唔嗯……"
9009005-320 = "……感覺到了視線。"
9009005-330 = "……覺得困擾。"
9009005-340 = "啊。"
9009005-350 = "認證完畢。"
9009005-360 = "歡迎，\n[USERNAME]老師。"
9009005-370 = "已確認老師的\n連接程序。\n萬事拜託了。"
9009005-380 = "希迪姆的箱子，制約解除。\n程序「Perez-Uzzah」\n限定啟動中。"
9009005-390 = "待命中。\n老師，請下達命令。"
9009005-400 = "現在的我是無敵的，\n比平常還要強2倍。"
9009005-410 = "我會和彩奈前輩\n合力，支援老師。"

[translation]
9009005-10 = "ยืนยันการล็อกอิน"
9009005-20 = "กำลังรออยู่เลยค่ะ\nคุณครู [USERNAME]"
9009005-30 = "ได้เวลาเริ่มงานแล้วค่ะ\nคุณครู [USERNAME]"
9009005-40 = "จะเริ่มจากงานไหนก่อนดีคะ?\nคุณครู?"
9009005-50 = "กำลังรอคำสั่ง\nมีงานที่ต้องรีบจัดการ\nอยู่เยอะมากเลยค่ะ"
9009005-60 = "คุณครูสามารถเลือกงานต่างๆ\nได้จากตรงนี้ค่ะ"
9009005-70 = "คุณครู [USERNAME]\nโปรดเลือกภารกิจที่จะทำด้วยค่ะ"
9009005-80 = "นี่เป็นงานที่ต้องจัดการให้เสร็จค่ะ\nถ้างั้นฉันขอฝากด้วยนะคะ"
9009005-90 = "สับสน พฤติกรรมที่ไม่สามารถเข้าใจได้\nอย่าสะกิดฉันค่ะ เดี๋ยวจะพังเอาได้  "
9009005-100 = "เข้าใจแล้วค่ะ คุณครูกำลังว่างงาน\nแล้วก็คงเบื่อๆ อยู่สินะคะ"
9009005-110 = "อืม..."
9009005-120 = "อืม..."
9009005-130 = "..."
9009005-140 = "อ้อ...!"
9009005-150 = "ที่นี่... งั้นเหรอคะ"
9009005-160 = "อย่างนี้นี่เอง... "
9009005-170 = "อืม... อย่างที่คิดไว้เลย"
9009005-180 = "อืม... โครงสร้างแบบนี้นี่เอง"
9009005-190 = "อ่า..."
9009005-200 = "ถ้าฝนตกก็ใช้เจ้านี่..."
9009005-210 = "น่าจะพอช่วยได้ใช่ไหมคะ...?"
9009005-220 = "ฉันเอง... ก็..."
9009005-230 = "อ๊ะ"
9009005-240 = "นี่ เห็นรึเปล่า? พลาน่าจัง?"
9009005-250 = "หมายถึงนั่นเหรอคะ รุ่นพี่?"
9009005-260 = "ค่ะ ตรงนั้นค่ะ!"
9009005-270 = "ดูเป็นยังไงบ้างคะ?"
9009005-280 = "อืม..."
9009005-290 = "อ๊ะ...."
9009005-300 = "(จ้อง...)"
9009005-310 = "อืม..."
9009005-320 = "รู้สึกถึงสายตาที่มองมานะคะ"
9009005-330 = "แบบนี้ลำบากใจนะคะ..."
9009005-340 = "อ๊ะ"
9009005-350 = "ยืนยันสำเร็จ"
9009005-360 = "ยินดีต้อนรับเข้าสู่การเชื่อมต่อค่ะ\nคุณครู [USERNAME]"
9009005-370 = "ฉันตรวจสอบกระบวนการ\nเชื่อมต่อของคุณครูแล้วค่ะ\nรบกวนด้วยนะคะ"
9009005-380 = "ยกเลิกการควบคุมกล่องแห่งซิสดิม\nกระบวนการ <พีเรซ อัซซาห์>\nกำลังทำงานอย่างจำกัด"
9009005-390 = "กำลังรอคำสั่ง คุณครู\nช่วยออกคำสั่งด้วยค่ะ"
9009005-400 = "ตอนนี้ฉันเป็นอมตะค่ะ\nแข็งแกร่งกว่าปกติ 2 เท่าค่ะ"
9009005-410 = "ฉันจะรวมพลังกับรุ่นพี่อะโรน่า\nแล้วสนับสนุนคุณครูค่ะ"

[translation]
9009005-10 = "接続確認。"
9009005-20 = "[USERNAME]先生。\nお待ちしておりました。"
9009005-30 = "お仕事を始める時間です。\n[USERNAME]先生。"
9009005-40 = "どのお仕事から始めますか。\n先生？"
9009005-50 = "待機中。\n解決しなければならない作業が\n多数存在しています。"
9009005-60 = "ここで先生の様々なお仕事を\n進行できます。"
9009005-70 = "[USERNAME]先生。\nご希望のお仕事を選んでください。"
9009005-80 = "解決していただかねばならない\nお仕事がたくさんあります。\nでは、お願いします。"
9009005-90 = "混乱。理解できない行動です。\nつつかないでください。故障します。"
9009005-100 = "理解しました。先生は今\n特にやるべきことがないのですね。\n暇なのですね。"
9009005-110 = "うーん……。"
9009005-120 = "うーん……。"
9009005-130 = "……。"
9009005-140 = "あ……！"
9009005-150 = "ここは……\nそういうことなのですね。"
9009005-160 = "……そういうことですね。"
9009005-170 = "ふむ……なるほど。"
9009005-180 = "ふむ……\nそういう構造なんですね。"
9009005-190 = "……あ。"
9009005-200 = "雨が降ったらこれで……"
9009005-210 = "役に立つのでしょうか……？"
9009005-220 = "私も……一緒に……"
9009005-230 = "あ。"
9009005-240 = "あれ、見えますか？プラナちゃん？"
9009005-250 = "あれのことですか、先輩？"
9009005-260 = "はい！あれです！"
9009005-270 = "あっちはどうですか？"
9009005-280 = "うーん……。"
9009005-290 = "……あっ。"
9009005-300 = "じー"
9009005-310 = "うーん……。"
9009005-320 = "……視線を感じます。"
9009005-330 = "……困ります。"
9009005-340 = "あ。"
9009005-350 = "認証完了。"
9009005-360 = "ようこそ、\n[USERNAME]先生。"
9009005-370 = "先生の接続\nプロセスを確認。\nよろしくお願いします。"
9009005-380 = "シッテムの箱、制約解除。\nプロセス「ペレツ･ウザ」\n限定稼働中。"
9009005-390 = "待機中。\n先生、ご命令を。"
9009005-400 = "今の私は無敵です、\n普段の2倍は強いです。"
9009005-410 = "アロナ先輩と力を\n合わせて、先生を\nサポートします。"

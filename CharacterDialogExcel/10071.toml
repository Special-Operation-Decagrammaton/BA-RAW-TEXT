[translation]
10071-10 = "블루 아카이브."
10071-20 = "RABBIT 1, 환복을 완료했습니다.\n지금부터 잠입 작전을 시작합니다."
10071-30 = "(샤워를 하고 싶은데…)"
10071-40 = "어디선가\n맛있는 냄새가…"
10071-50 = "(좀 더 귀여운\n수영복으로\n할 걸 그랬네요…)"
10071-60 = "여기가 선생님의…\n저는 지금 무엇을…"
10071-70 = "…선생님은…\n어디에 계실까요…"
10071-80 = "어서 오십시오, 선생님."
10071-90 = "준비는 만전입니다.\n어떤 명령이라도 완벽하게\n수행해 보이겠습니다."
10071-100 = "안녕하세요, 선생님.\n기다리고 있었습니다."
10071-110 = "네…?\n수영복 차림으로 기다리느라\n춥지는 않았냐고요?"
10071-120 = "문제없습니다. \n어떤 모습이든, 선생님을\n기다리는 시간은\n힘들지 않으니까요."
10071-130 = "저… 이 수영복,\n제게 잘 어울리나요?"
10071-140 = "지금까지는 SRT 학원의\n지정 수영복만\n입어왔기 때문에,"
10071-150 = "이렇게 귀여운 디자인은\n조금… 안정이 되질 않네요."
10071-160 = "사키 만큼은 아니지만…\n수영이라면 조금은\n자신 있습니다."
10071-170 = "지금은 작전 중이 아니니…\n작전 이외의 것도,\n도와드릴 수 있습니다."
10071-180 = "토끼는 물을\n싫어하기 때문일까요…?"
10071-190 = "토끼 무늬의 수영복은\n보지 못한 것 같네요."
10071-200 = "그에 비해, 소는\n수영을 잘해서 그런지\n소 무늬의 수영복은\n팔고 있는 것을 보았습니다."
10071-210 = "토끼 무늬가\n있어도 좋았을 텐데…"
10071-220 = "좀 더 편하게\n불러 주셔도 괜찮습니다."
10071-230 = "저희는 언제나\n선생님을 위해\n대기 중이니까요."
10071-240 = "생일 축하드립니다, 선생님."
10071-250 = "저… 그다지\n여유가 없었기 때문에,\n선물은 준비하지\n못했습니다만…"
10071-260 = "대신 오늘은\n무엇이든 하겠습니다.\n무엇이든 지시를."
10071-270 = "제 생일…인가요."
10071-280 = "후훗…"
10071-290 = "선물이라면\n이미 받았으니\n괜찮습니다."
10071-300 = "새해에도 잘 부탁드립니다,\n선생님."
10071-310 = "올해는\n작전이 아니더라도\n함께 바다에…"
10071-320 = "…죄송합니다.\n신경 쓰지 말아주세요."
10071-330 = "오늘은 이 복장이\n어울리는 날은 아니네요."
10071-340 = "…다음번에는,\n어울리는 복장으로…"
10071-350 = "바깥이 시끄럽네요…"
10071-360 = "오늘은 이 시간을\n소중히 간직하고 싶었는데."
10071-380 = "좋은 아침입니다."
10071-390 = "선생님께서도\n아침 산책을 나오셨나요?"
10071-400 = "저는 평소에 하던\n조깅의 대신으로\n수영을 하러 나왔답니다."
10071-410 = "모처럼 바닷가에 왔으니\n평소와는 다른 운동을 하는 것도\n나쁘지 않겠다 싶어서요."
10071-420 = "…이른 아침부터\n이런 흐트러진 모습을\n보여드려서 조금 부끄럽네요."
10071-430 = "…에취."
10071-440 = "조금, 너무 오래\n머물러 버린 것 같네요…\n몸이 차가워지기 시작했어요."
10071-450 = "…그렇네요."
10071-460 = "토끼는 물에 들어가면\n위험하다고들 하지만…"
10071-470 = "저는 토끼가 아니니까요."
10071-2600 = "RABBIT 31식 기관단총, 수령했습니다.\n수중전에 대비하여 내부 부품을\n일부 교체했습니다만……\n그, 외부 파츠도 귀여운 것으로\n교체하는 것이 좋았으려나요…?"

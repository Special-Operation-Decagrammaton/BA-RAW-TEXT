[translation]
10071-10 = "Blue Archive"
10071-20 = "RABBIT 1 เปลี่ยนชุดเรียบร้อยแล้วค่ะ\nตั้งแต่นี้ไปจะเริ่มปฏิบัติการแฝงตัวค่ะ"
10071-30 = "(อยากอาบน้ำจัง...)"
10071-40 = "เหมือนได้กลิ่นของอร่อย\nจากที่ไหนสักแห่ง..."
10071-50 = "(น่าจะใส่ชุดว่ายน้ำ\nที่น่ารักๆ กว่านี้มา...)"
10071-60 = "ที่นี่คือที่ของคุณครู…\nแล้วฉันมาทำอะไรที่นี่นะ...?"
10071-70 = "คุณครู...\nอยู่ที่ไหนกันนะ...?"
10071-80 = "เชิญค่ะ คุณครู"
10071-90 = "ฉันเตรียมพร้อมแล้วค่ะ ไม่ว่าคุณครูจะสั่งอะไร\nฉันจะปฏิบัติตามคำสั่ง\nทุกอย่างให้สำเร็จให้ได้ค่ะ"
10071-100 = "มาแล้วเหรอคะ คุณครู\nฉันกำลังรออยู่เลยค่ะ"
10071-110 = "คะ...?\nมารอทั้งๆ ที่ใส่ชุดว่ายน้ำ\nแบบนี้ หนาวรึเปล่าน่ะเหรอคะ?"
10071-120 = "ไม่มีปัญหาค่ะ\nไม่ว่าจะสวมชุดไหนก็ตาม\nเวลาที่ต้องรอคุณครู\nฉันไม่เคยเหนื่อยเลยค่ะ"
10071-130 = "คือ... ชุดว่ายน้ำชุดนี้\nเหมาะกับฉันรึเปล่าคะ?"
10071-140 = "จนถึงตอนนี้ฉันเคยใส่แต่\nชุดว่ายน้ำของสถาบัน SRT เท่านั้น"
10071-150 = "ชุดว่ายน้ำน่ารักๆ แบบนี้...\nมันไม่ค่อยปลอดภัยเลยค่ะ"
10071-160 = "ถ้าเป็นเรื่องว่ายน้ำ\nถึงจะไม่ได้เก่งเท่าซากิ\nแต่ฉันก็มั่นใจอยู่นะคะ"
10071-170 = "ตอนนี้ไม่ได้อยู่ระหว่างปฏิบัติการ...\nฉันยินดีช่วยเรื่องอื่นๆ ด้วยนะคะ"
10071-180 = "เพราะว่ากระต่าย\nไม่ชอบน้ำรึเปล่านะคะ...?"
10071-190 = "เลยไม่ค่อยเห็นชุดว่ายน้ำ\nลายน้องกระต่ายสักเท่าไรเลยค่ะ"
10071-200 = "วัวคงจะว่ายน้ำเก่งกว่าสินะคะ\nเพราะงั้นก็เลยเห็นว่ามี\nชุดว่ายน้ำลายวัวขายอยู่ด้วยค่ะ"
10071-210 = "ถ้ามีชุดว่ายน้ำลายกระต่ายบ้าง\nก็คงดีนะคะ..."
10071-220 = "เรียกฉันมาบ่อยๆ ก็ได้นะคะ"
10071-230 = "ฉันสแตนด์บายเพื่อคุณครู\nอยู่ตลอดเวลาเลยละค่ะ"
10071-240 = "สุขสันต์วันเกิดค่ะ คุณครู"
10071-250 = "คือว่า... ฉันไม่ค่อยมีงบเท่าไร\nเลยไม่ได้เตรียมของขวัญ\nมาให้คุณครู..."
10071-260 = "เพื่อเป็นการทดแทน วันนี้\nฉันยินดีทำทุกอย่างเลยค่ะ\nเชิญสั่งได้ทุกอย่างเลยค่ะ"
10071-270 = "วันเกิดฉัน... งั้นเหรอคะ?"
10071-280 = "ฮิฮิ..."
10071-290 = "ฉันคิดว่าฉัน...\nได้ของขวัญมาแล้วละค่ะ\nเพราะงั้นไม่ต้องหรอกค่ะ"
10071-300 = "ปีนี้ก็ขอฝากเนื้อฝากตัวด้วยนะคะ\nคุณครู"
10071-310 = "ปีนี้...\nต่อให้ไม่มีภารกิจ...\nก็ขอให้ได้ไปทะเลด้วยกันอีก... "
10071-320 = "...ขอโทษค่ะ\nคุณครูไม่ต้องใส่ใจก็ได้ค่ะ"
10071-330 = "วันแบบนี้...\nใส่ชุดนี้คงไม่เหมาะสินะคะ"
10071-340 = "คราวหน้า...\nฉันจะใส่ชุดที่เหมาะๆ มา..."
10071-350 = "ข้างนอกเสียงดังจังเลยนะคะ"
10071-360 = "ฉันอยากจะรักษา\nช่วงเวลาพิเศษในวันนี้ไว้\nให้ดีที่สุด..."
10071-380 = "อรุณสวัสดิ์ค่ะ"
10071-390 = "คุณครูเองก็ออกมาเดินเล่น\nตอนเช้าเหรอคะ?"
10071-400 = "ปกติฉันจะออกมาวิ่งจ้อกกิ้งทุกวัน\nแต่วันนี้ฉันออกมาว่ายน้ำแทนค่ะ"
10071-410 = "ไหนๆ ก็ได้มาทะเลทั้งที\nการได้ออกกำลังกายอย่างอื่น\nบ้างก็ไม่เลวเลยค่ะ"
10071-420 = "ไม่คิดเลยว่าจะให้คุณครู\nเห็นสภาพไม่เรียบร้อยแบบนี้\nตั้งแต่เช้าตรู่ รู้สึก... อายจังเลยค่ะ"
10071-430 = "ฮะ... ฮัดชิ่ว"
10071-440 = "ดูเหมือน... ฉันจะแช่น้ำ\nนานเกินไปหน่อยค่ะ\nรู้สึกตัวเริ่มเย็นๆ แล้วด้วยค่ะ"
10071-450 = "...นั่นสินะคะ"
10071-460 = "ถ้ากระต่ายอยู่ในน้ำนานๆ\nอาจจะเป็นอันตรายได้..."
10071-470 = "แต่ว่า... ฉันไม่ใช่กระต่ายสักหน่อยนี่คะ"
10071-2600 = "ได้รับปืน RABBIT Type 31\nSubmachine Gun มาแล้วค่ะ ฉันปรับ\nเปลี่ยนวัสดุนิดหน่อยเพื่อรับมือกับ\nภารกิจในทะเล หรือว่าควรปรับแต่ง\nวัสดุภายนอกให้ดูน่ารักๆ ด้วยมั้ยคะ...?"

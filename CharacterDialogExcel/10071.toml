[translation]
10071-10 = "Blue Archive."
10071-20 = "RABBIT 1, outfit change completed. Undercover operation commencing."
10071-30 = "(I want to take a shower...)"
10071-40 = "There's a delicious smell coming from somewhere..."
10071-50 = "(I should have chosen a cuter swimsuit...)"
10071-60 = "This is Sensei's... What am I doing...?"
10071-70 = "Sensei... Where could you be...?"
10071-80 = "Welcome, Sensei."
10071-90 = "Preparations are complete. Whatever your command, I will complete it perfectly."
10071-100 = "Welcome, Sensei. I've been waiting for you."
10071-110 = "...Hm? Wasn't I cold, waiting for you in my swimsuit?"
10071-120 = "That wasn't a problem. Regardless of the situation, waiting for you is never difficult, Sensei."
10071-130 = "So...this swimsuit... Does it look good on me?"
10071-140 = "I've only ever worn SRT Academy's standard-issue swimsuits before, so..."
10071-150 = "...this cute design feels a bit unnatural to me."
10071-160 = "I'm pretty good at swimming, although Saki can still beat me..."
10071-170 = "Since I'm off-duty right now... I can help you with non-mission related things."
10071-180 = "Could it be because rabbits don't like water...?"
10071-190 = "I don't think I've ever seen a rabbit-pattern swimsuit."
10071-200 = "Maybe that means cows are good swimmers, since cow print suits are pretty popular."
10071-210 = "A rabbit pattern would be really nice though..."
10071-220 = "Please don't hesitate to call on me for help."
10071-230 = "I'll always be there for you, Sensei."
10071-240 = "Happy birthday, Sensei."
10071-250 = "I've...been pretty busy recently, so I wasn't able to prepare a gift, but..."
10071-260 = "Instead, I'll do anything you ask today. Anything at all."
10071-270 = "Is it my...birthday?"
10071-280 = "Heehee..."
10071-290 = "I think I've already received my gift... So it's okay."
10071-300 = "I'm looking forward to the new year, Sensei."
10071-310 = "This year, even if we don't have a mission, let's go to the ocean..."
10071-320 = "...I'm sorry. Don't mind me."
10071-330 = "Today is not the day for this outfit."
10071-340 = "...Next time, I'll wear something more appropriate..."
10071-350 = "It's noisy outside..."
10071-360 = "I wanted to treasure the memories we made today."
10071-380 = "Good morning."
10071-390 = "Are you out for a morning stroll?"
10071-400 = "I usually go jogging in the morning, but I'm here for a swim today."
10071-410 = "Since we're at the beach, I thought it might be nice to try something new."
10071-420 = "I didn't expect you'd see me like this... I'm a little embarrassed."
10071-430 = "Achoo!"
10071-440 = "I think I've been out here for too long. I'm getting a little cold."
10071-450 = "You have a point."
10071-460 = "They say rabbits shouldn't go in the water, but..."
10071-470 = "I'm not a rabbit."
10071-2600 = "RABBIT Type 31 Submachine Gun , acquired. The internal workings have been modified to operate underwater, but maybe we could also modify the exterior to be...cuter?"

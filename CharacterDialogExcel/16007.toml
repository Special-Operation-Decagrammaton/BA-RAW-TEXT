[translation]
16007-10 = "블루 아카이브."
16007-20 = "이렇게 만나 뵈어 영광입니다, 선생님.\n괜찮으시다면 위대하신 체리노 회장의\n위업에 대해 한번 들어보시겠어요?"
16007-30 = "선동은 사소한 것부터\n천천히…"
16007-40 = "후후, 체리노 회장에게\n잘 어울릴듯한\n귀여운 물건이네요."
16007-50 = "이 공간은\n따듯해서 좋네요."
16007-60 = "다음 번에는 꼭\n체리노 회장과\n이곳에…!"
16007-70 = "어라? 어디선가\n회장님의 기척이…"
16007-80 = "어서 오세요, 선생님.\n혹시 오시는 길에\n체리노 회장, 못 보셨나요?"
16007-90 = "후후. 기다리고 있었답니다,\n선생님. 오늘도 키보토스의\n혁명을 위해 함께 힘쓰죠!"
16007-100 = "체리노 회장님의\n일거수일투족은 모두\n이 노트에 기록하고 있답니다."
16007-110 = "선생님도 혹시…\n읽어보고 싶으신가요?"
16007-120 = "안 돼요.\n소녀의 비밀이랍니다."
16007-130 = "붉은겨울 학원이\n키보토스를 장악하는\n그날을 대비해"
16007-140 = "지금부터\n화술을 갈고\n닦지 않으면…"
16007-150 = "후후, 체리노 회장님의\n콧수염. 귀엽지 않나요?"
16007-160 = "생일 축하드려요,\n선생님. 선물로 제가\n제일 소중하게 여기는…"
16007-170 = "체리노 회장님의 다 쓴\n칫솔을 드릴게요!"
16007-180 = "제 생일 말인가요?"
16007-190 = "후후, 부디 체리노 회장님의\n생일도 축하해 주세요."
16007-200 = "물론 이렇게 축하해주셔서\n저도 기쁘네요."
16007-210 = "올해는 꼭…\n붉은겨울 학원이 키보토스\n제일의 학원이 되기를…"
16007-220 = "체리노 회장님의 눈치가\n빨라져서 큰일이에요…"
16007-230 = "사실은 산타클로스가\n없다는 사실을\n눈치채시면 안 되는데…"
16007-240 = "아이 참, 제게 장난을\n치셔도 아무것도\n드릴 수 없어요."
16007-250 = "제 사탕은 모두\n체리노 회장님을\n위한 것이니까요."
16007-270 = "후우, 아무 것도 보이지\n않을 정도의 엄청난\n눈보라였네요……"
16007-280 = "선생님도 겉옷을\n벗는 게 어떠신가요?"
16007-290 = "젖은 옷을 그대로 입고 있으면\n감기에 걸릴 수도 있다고요?"
16007-300 = "……선생님?\n무슨 일 있으신가요.\n뭔가, 신경 쓰이는 일이라도?"
16007-310 = "그 표정은, 혹시……"
16007-320 = "조금 전의 연설로는 부족해서,\n체리노 회장님의 이야기를 더\n듣고 싶어지신 건가요?"
16007-330 = "이런 타이밍이기도 하고,\n마침 잘 되었네요."
16007-340 = "그럼 눈이 그칠 때까지,\n함께 체리노 회장님의\n위대함에 대해\n이야기를 나누도록 하죠!"
16007-2600 = "저를 위해서 이 총을…?\n후후, 감사드려요. 선생님."

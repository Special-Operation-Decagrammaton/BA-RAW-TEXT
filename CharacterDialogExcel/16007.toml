[translation]
16007-10 = "Blue Archive。"
16007-20 = "能這樣與老師見面，感到十分光榮。\n可以的話，作為問候的代替，要不要聽聽\n偉大潔莉諾會長的豐功偉業呢？"
16007-30 = "煽動是要從細微之處\n開始慢慢地……"
16007-40 = "呵呵，似乎是\n很適合潔莉諾會長的\n可愛的小東西呢。"
16007-50 = "這個空間\n好暖和，真不錯呢。"
16007-60 = "下次一定要和\n潔莉諾會長一起來這裡…！"
16007-70 = "咦？不知道從哪裡\n傳來了會長的氣息…"
16007-80 = "歡迎回來，老師。\n請問回來的時候有沒有\n在哪裡看到潔莉諾會長呢？"
16007-90 = "呵呵，恭候多時了，老師。\n今天也為奇普托斯的\n革命一起奮鬥吧！"
16007-100 = "潔莉諾會長的\n一舉手一投足\n全都記錄在這本筆記裡。"
16007-110 = "難道……\n老師也想讀讀看嗎？"
16007-120 = "不行，\n這是女孩子的祕密唷。"
16007-130 = "為了赤冬聯邦學園\n掌握奇普托斯的那一天，"
16007-140 = "必須從現在開始\n磨練話術才行……"
16007-150 = "呵呵，潔莉諾會長的鬍子，\n不覺得很可愛嗎？"
16007-160 = "祝您生日快樂，老師。\n作為禮物，\n把我珍藏的寶物……"
16007-170 = "潔莉諾會長用過的\n牙刷送給老師！"
16007-180 = "我的生日，是嗎？"
16007-190 = "呵呵，也請老師別忘了，\n祝賀潔莉諾會長的生日。"
16007-200 = "啊啊，當然，\n能收到這樣的祝福\n我也很開心。"
16007-210 = "希望今年……\n赤冬聯邦學園能夠成為\n奇普托斯第一的學園……"
16007-220 = "最近潔莉諾會長的直覺\n變得十分敏銳\n真是不妙……"
16007-230 = "其實聖誕老人\n不存在這件事\n可不能讓他知道啊……"
16007-240 = "哎呀哎呀，就算來找我，\n我也沒有東西可以給您唷。"
16007-250 = "因為我的糖果\n全都是潔莉諾會長的。"
16007-270 = "呼，什麼都看不見的程度，\n很強的暴風雪呢……"
16007-280 = "老師也，\n把上衣脫掉如何呢？"
16007-290 = "就那樣一直穿著溼掉的衣服的話，\n會感冒的唷？"
16007-300 = "……老師？\n怎麼了嗎，\n有什麼在意的事情嗎？"
16007-310 = "那個表情，該不會……"
16007-320 = "光憑剛才的演說還不夠，\n想聽更多潔莉諾會長的事嗎？"
16007-330 = "反正是這種時機，\n正合適呢。"
16007-340 = "那麼在雪停之前，\n讓我們一起談論關於\n潔莉諾會長的偉大吧♪"
16007-2600 = "為了我把這把槍……？\n呵呵，謝謝您。老師。"

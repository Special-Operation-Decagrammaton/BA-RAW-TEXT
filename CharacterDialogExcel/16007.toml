[translation]
16007-10 = "Blue Archive."
16007-20 = "Nice to meet you, Sensei. Are you here to learn about the accomplishments of the great President Cherino?"
16007-30 = "Instigation starts slowly, with the smallest things..."
16007-40 = "Heehee, it's a cute item that suits President Cherino."
16007-50 = "This space is nice because it's warm."
16007-60 = "Next time, I'm definitely coming here with President Cherino!"
16007-70 = "Huh? I sense the president somewhere."
16007-80 = "Welcome, Sensei. Did you happen to see President Cherino on your way here?"
16007-90 = "Heehee, I've been waiting for you. Let's work together for the revolution of Kivotos today, Sensei!"
16007-100 = "President Cherino's every move is recorded in this notebook."
16007-110 = "Do you want to maybe...read it?"
16007-120 = "No. It's a girl's secret."
16007-130 = "In preparation for the day Red Winter Academy takes over Kivotos..."
16007-140 = "...we need to diligently prepare our speeches."
16007-150 = "Heehee, isn't President Cherino's mustache just so cute?"
16007-160 = "Happy birthday, Sensei. As a gift, I present you my most treasured item."
16007-170 = "President Cherino's pre-used toothbrush!"
16007-180 = "Are you asking about my birthday?"
16007-190 = "Please remember to celebrate President Cherino's birthday as well."
16007-200 = "Of course, I am happy you're celebrating with me like this."
16007-210 = "This year... I hope Red Winter Academy will become the best academy in Kivotos..."
16007-220 = "President Cherino is picking up on things so quickly these days. It's terrible!"
16007-230 = "She can't find out that Santa Claus isn't real."
16007-240 = "Trick all you want—I still can't give you anything back."
16007-250 = "All of my candy is reserved for President Cherino."
16007-270 = "Whoa, that's a huge snowstorm."
16007-280 = "Come on, Sensei, take off your outerwear right now."
16007-290 = "You might catch a cold if you keep those wet clothes on."
16007-300 = "Sensei, what've you been looking at this whole time?"
16007-310 = "Are you also..."
16007-320 = "...interested in President Cherino's great achievements?"
16007-330 = "Well, this timing works out well, so that's great."
16007-340 = "Then, let's talk about the greatness of the president until the snow stops!"
16007-2600 = "You got this gun for me...? Heehee, thank you, Sensei."

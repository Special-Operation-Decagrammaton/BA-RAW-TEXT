[translation]
16007-10 = "Blue Archive"
16007-20 = "ยินดีที่ได้พบค่ะคุณครู\nคุณครูสนใจจะฟังเรื่องความสุดยอด\nของประธานเชริโน่ผู้ยิ่งใหญ่หน่อยไหมคะ?"
16007-30 = "คำพูดส่งเสริมจะต้องเริ่ม\nจากเรื่องเล็กๆ ค่อยๆ ปลูกฝังไป..."
16007-40 = "ฮุฮุ ของชิ้นเล็กน่ารักๆ\nดูเหมาะกับท่านประธานนะคะ"
16007-50 = "ที่นี่...\nอบอุ่นดีจังเลยนะคะ"
16007-60 = "คราวหน้า\nฉันจะต้องมาที่นี่\nกับประธานเชริโน่ให้ได้...!"
16007-70 = "เอ๋? รู้สึกเหมือนเห็น\nเงาของท่านประธาน..."
16007-80 = "เชิญค่ะคุณครู ระหว่างทางที่มา\nพบท่านประธานเชริโน่บ้างรึเปล่าคะ?"
16007-90 = "ฮุฮุ ฉันกำลังรออยู่เลยค่ะ\nวันนี้ก็มาพยายามไปด้วยกัน\nเพื่อการปฏิวัติคิโวทอสเถอะนะคะ!"
16007-100 = "ทุกย่างก้าวของท่านประธาน\nถูกบันทึกเอาไว้ในสมุดเล่มนี้แล้วค่ะ"
16007-110 = "คุณครูอยากลองอ่านดูเหรอคะ?"
16007-120 = "คงไม่ได้หรอกค่ะ มันเป็น\nความลับของสาวน้อยนะคะ"
16007-130 = "เพื่อเตรียมพร้อมสำหรับ\nวันที่สหภาพเรดวินเทอร์\nจะได้ยึดครองคิโวทอส"
16007-140 = "หากไม่ขัดเกลาทักษะการพูด\nเอาไว้ล่วงหน้าล่ะก็..."
16007-150 = "ฮุฮุ หนวดของท่านประธาน\nน่ารักไหมคะ?"
16007-160 = "สุขสันต์วันเกิดค่ะ คุณครู\nฉันขอมอบของขวัญเป็นแปรงสีฟัน..."
16007-170 = "ที่ใช้แล้วของประธาน\nให้กับคุณครูค่ะ!"
16007-180 = "วันเกิดฉันเหรอคะ?"
16007-190 = "ฮุฮุ คุณครูช่วยใส่ใจกับวันเกิด\nของประธานเชริโน่ด้วยนะคะ"
16007-200 = "แน่นอนว่าฉันดีใจ\nที่คุณครูอวยพรให้นะคะ"
16007-210 = "ในปีนี้ สหภาพเรดวินเทอร์\nจะต้องเป็นโรงเรียนที่ยิ่งใหญ่\nในคิโวทอสให้ได้..."
16007-220 = "เรื่องใหญ่แล้วนะคะ\nที่ประธานเชริโน่เหมือน\nจะรู้ทันแล้วค่ะ"
16007-230 = "จะให้รู้ความจริงที่ว่า\nซานตาคลอสไม่มีจริง\nไม่ได้นะคะ..."
16007-240 = "เฮ้อ ถึงจะมาหลอกแบบนี้\nฉันก็ไม่มีขนมให้หรอกนะคะ"
16007-250 = "เพราะลูกกวาดที่ฉันมี\nทั้งหมดเตรียมไว้ให้\nประธานเชริโน่ค่ะ"
16007-270 = "ฮู่ว... ดูเหมือนว่า\nพายุหิมะหนักมากเลยนะคะ"
16007-280 = "เอาละค่ะ คุณครูเองก็\nถอดเสื้อคลุมออกด้วยดีมั้ยคะ"
16007-290 = "ถ้าใส่เสื้อเปียกๆ แบบนั้น...\nจะเป็นหวัดได้นะคะ"
16007-300 = "คุณครูคะ...\nมีเรื่องอะไรรึเปล่าคะ?\nเห็นมองฉันมาตั้งแต่เมื่อกี้นี้แล้ว"
16007-310 = "สีหน้าแบบนั้น หรือว่า..."
16007-320 = "หรือเรื่องที่เล่าไปเมื่อครู่\nยังไม่เพียงพอ คุณครู...\nเลยอยากจะฟังอีกเหรอคะ?"
16007-330 = "ฮุฮุ ถือเป็นไทม์มิ่งที่ดีเลยนะคะ"
16007-340 = "ถ้าอย่างนั้นก็มาพูดคุยถึงเรื่อง\nความยิ่งใหญ่ของประธานเชริโน่\nจนกว่าหิมะจะหยุดตกกันเถอะค่ะ!"
16007-2600 = "ปืนสำหรับฉันเหรอคะ...?\nฮุฮุ ขอบคุณนะคะ คุณครู"

[translation]
26008-10 = "블루~ 아카이브!"
26008-20 = "여름 하면 바다의 집!\n무대가 바다라도 마츠리운영관리부는 멈추지 않아요!\n카와와 시즈코, 갑니다!"
26008-30 = "여름의 신규\n주력 상품…\n음. 뭔가 힌트가…"
26008-40 = "프랜차이즈 운영이,\n이렇게 큰일일 줄은…\n회의, 회의, 회의!\n그리고 또 회의가…"
26008-50 = "뭔가,\n다음 축제에서 활용할\n수 있을 만한 게…"
26008-60 = "언젠가 백야당을,\n키보토스 최고의\n찻집으로…!"
26008-70 = "좋은 영감이\n떠올랐어!\n예스!"
26008-80 = "아, 선생님!\n어서 오세요~!\n오늘도 덥네요."
26008-90 = "여기, 음료수 드세요!"
26008-100 = "…응, 좋은 흐름이었어."
26008-110 = "더워어어…"
26008-120 = "서, 선생님?!\n언제부터……! 저기,\n그러니까, 어서 오세요~!"
26008-130 = "바다의 집에 있을 때는,\n그쪽으로도 만나러\n와주셔야 해요?"
26008-140 = "백야당은 언제나\n당신의 곁에!"
26008-150 = "이 문구, 괜찮았죠?\n어떠신가요?"
26008-160 = "어…\n수영복이, 귀여워…?\n어울린다고요…?"
26008-170 = "또또…\n백야당의 오너에게\n그런 영업 토크는…"
26008-180 = "엇, 그렇지 않다고요?\n진심?"
26008-190 = "저, 정말, 이럴 때만\n진지한 척하지\n말아 주세요~!"
26008-200 = "여러 매장을 관리하는 건\n힘들지 않냐고요?"
26008-210 = "음, 뭐, 그렇죠."
26008-220 = "…힘들다고 하면,\n도와주실래요?"
26008-230 = "선생님과 같이 있으면\n매일 여름 축제\n같은 기분이에요."
26008-240 = "…후훗, 모르시겠다면,\n아직은 알 필요 없답니다."
26008-250 = "생일 축하드려요, 선생님!"
26008-260 = "지금 마침 백야당\n바다의 집에서 생일 한정\n특별 메뉴를 출시했거든요.\n어떠세요?"
26008-270 = "…참고로,\n선생님 전용이라구요?"
26008-280 = "제 생일…?\n윽, 방심하고 있던 차에\n직설적인 공격…"
26008-290 = "네?, 아, 신경 쓰지 마세요.\n싫거나 그런 건 아니니까!"
26008-300 = "…에헷, 에헤헷"
26008-310 = "새해 복 많이 받으세요!\n벌써 새해인가요, 바로 얼마\n전까지 여름이었던 거 같은데…"
26008-320 = "좋아,\n아무튼 새해에도\n활기차게 가죠!"
26008-330 = "여름도 백야당!\n크리스마스도 백야당!\n축제는 일 년 내내\n계속되고 있어요!"
26008-340 = "그런고로, 자,\n함께 해요! 선생님!"
26008-350 = "과자를 안 사주시면\n장난칠 거예요?"
26008-360 = "…노, 농담이에요!\n억지로 사지 않아도\n괜찮으니까요!"
26008-370 = "뭐, 저로서는\n어느 쪽이든 이득이지만요…"
26008-390 = "선생님, 저,\n제가 해야 할 일을 알았어요."
26008-400 = "생각해 보면\n당연한 거였는데,\n이제서야 깨닫다니…\n시즈코, 일생의 불찰!"
26008-410 = "알고 계실지도 모르겠지만,\n전 정말 욕심꾸러기라구요?"
26008-420 = "하고 싶은 것도,\n갖고 싶은 것도 많지만,\n그 중 하나도\n포기할 수 없어요."
26008-430 = "모두를 즐겁게 하는 것도,\n사업가로 성공하는 것도!"
26008-440 = "백야당을 키보토스\n최고의 찻집으로\n만드는 것도!"
26008-450 = "저는, 전부\n놓치고 싶지 않아요.\n전부!"
26008-460 = "물론… 선생님도요!"
26008-2600 = "항상 이렇게 저를 신경써주고…\n감사합니다, 선생님.\n선생님이 계신다면 백야당은\n앞으로도 발전할 수 있을 것 같아요!\n…응, 방금 나쁘지 않았어."

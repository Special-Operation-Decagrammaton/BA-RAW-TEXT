[translation]
26008-10 = "Blue~~ Archive!"
26008-20 = "ถ้าพูดถึงฤดูร้อนก็ต้องร้านริมทะเล!\nถึงจะเป็นที่ทะเล แต่ชมรมจัดงานเทศกาลก็ไม่หวั่นค่ะ!\nคาวาวะ ชิซุโกะ ลุยละนะ!"
26008-30 = "จะเลือกอาหารอะไร\nเป็นเมนูหลัก\nของฤดูร้อนดีนะ..."
26008-40 = "การบริหารร้านสาขา\nมีแต่ประชุมๆ เหนื่อยจัง...\nประชุมแล้วก็ประชุมอีก..."
26008-50 = "มีอะไรที่จะเอามาใช้จัดงาน\nเทศกาลคราวหน้าได้ไหมนะ..."
26008-60 = "สักวันหนึ่งร้านเฮียกคิยาโค\nจะต้องเป็นร้านน้ำชา\nอันดับหนึ่ง\nในคิโวทอสให้ได้...!"
26008-70 = "เหมือนจะมีไอเดียดีๆ\nแล้วละค่ะ เยส!"
26008-80 = "อ๊ะ คุณครู!\nยินดีต้อนรับค่า~!\nวันนี้ร้อนจังเลยนะคะ"
26008-90 = "นี่เครื่องดื่มค่ะ!"
26008-100 = "อื้อ มาได้จังหวะดีมากเลยค่ะ"
26008-110 = "เฮ้อ ร้อนจังเลย..."
26008-120 = "อุ๊ย มาแล้วเหรอคะ คุณครู?\nฉันกำลังรออยู่เลยค่ะ"
26008-130 = "ตอนที่อยู่ที่ร้านริมทะเล\nคุณครูช่วยมาหาฉัน\nที่ร้านด้วยได้มั้ยคะ?"
26008-140 = "ร้านเฮียกคิยาโคของเรา\nจะอยู่เคียงข้างคุณค่ะ!"
26008-150 = "ประโยคเมื่อกี้โอเครึเปล่าคะ?\nโอเคแล้วใช่มั้ยคะ?"
26008-160 = "คะ?\nชุดว่ายน้ำนี่... น่ารักเหรอคะ?\nเหมาะกับฉันดีเหรอคะ?"
26008-170 = "เอาอีกแล้วนะคะ พูดหว่านเสน่ห์แบบนี้...\nกับเจ้าของร้านอีกแล้ว..."
26008-180 = "ไม่ได้พูดเล่นๆ งั้นเหรอคะ?\nพูดจากใจ...?"
26008-190 = "จะ...จริงๆ เลยนะคะ\nเวลาแบบนี้ช่วยจริงจังด้วยค่ะ!"
26008-200 = "การดูแลร้านหลายๆ ร้านพร้อมกัน\nแบบนี้เหนื่อยหรือเปล่าน่ะเหรอคะ?"
26008-210 = "อืม... นั่นสินะคะ "
26008-220 = "ถ้าบอกว่าเหนื่อย...\nคุณครูจะมาช่วยฉันมั้ยคะ?"
26008-230 = "ถ้าได้อยู่กับคุณครู\nคงรู้สึกเหมือนกับ\nทุกๆ วันคือวันเทศกาลฤดูร้อนเลยค่ะ"
26008-240 = "ฮิฮิ ถ้าคุณครูไม่เข้าใจ\nตอนนี้ยังไม่ต้องเข้าใจก็ได้ค่ะ"
26008-250 = "สุขสันต์วันเกิดค่ะ คุณครู! "
26008-260 = "ตอนนี้ที่ร้านเฮียกคิยาโค\nร้านสาขาริมทะเลมีเมนูใหม่\nสำหรับวันเกิดโดยเฉพาะด้วยค่ะ\nสนใจรึเปล่าคะ?"
26008-270 = "อ๋อ ฉันลืมบอกไปค่ะ\nเป็นเมนูพิเศษสำหรับคุณครูด้วยค่ะ"
26008-280 = "วันเกิดของฉัน...?\nอึก... ตอนที่กำลังเผลอ...\nก็จู่โจมกันจะๆ แบบนี้เลย..."
26008-290 = "คะ? ไม่มีอะไรค่ะๆ\nฉันไม่ได้ไม่ชอบหรอกนะคะ!"
26008-300 = "ฮิฮิ... ฮิฮิ..."
26008-310 = "ขอให้มีความสุขมากๆ ในวันปีใหม่ค่ะ!\nฤดูร้อนเพิ่งจะผ่านไปเอง\nตอนนี้ก็เป็นปีใหม่แล้วนะคะ"
26008-320 = "ดีเลยค่ะ!\nยังไงก็ถึงปีใหม่แล้ว\nเราก็มาลุยกันให้สุดเหวี่ยงเถอะค่ะ!"
26008-330 = "ไม่ว่าจะฤดูร้อนหรือคริสต์มาส\nร้านเฮียกคิยาโคของเรา\nก็จะจัดเทศกาลตลอดทั้งปีค่ะ!"
26008-340 = "เพราะงั้น... มาลุยกันเถอะค่ะ!\nคุณครู"
26008-350 = "ถ้าไม่ซื้อขนมให้\nฉันจะหลอกคุณครูนะคะ?"
26008-360 = "ละ...ล้อเล่นค่ะ!\nคุณครูไม่ต้องฝืนซื้อก็ได้ค่ะ\nไม่เป็นไรหรอกค่ะ!"
26008-370 = "มะ...ไม่ว่ายังไง\nฉันก็ได้ประโยชน์อยู่แล้วนี่..."
26008-390 = "คุณครูคะ คือ...\nฉันรู้แล้วละค่ะว่าจะทำอะไร"
26008-400 = "พอมาคิดดูแล้ว...\nฉันคิดว่ามันชัดเจนมากค่ะ\nตอนนี้ถึงได้รู้ว่า…ชิซุโกะน่ะ\nละเลยกับชีวิตเกินไปค่ะ!"
26008-410 = "คุณครูอาจจะรู้แล้วก็ได้\nฉันน่ะ... เป็นคนโลภมากค่ะ"
26008-420 = "ทั้งสิ่งที่อยากทำ\nทั้งสิ่งที่อยากได้\nฉันปล่อยไม่ได้สักอย่างเลยค่ะ"
26008-430 = "ทั้งอยากทำให้ทุกคนมีรอยยิ้ม\nและอยากพัฒนาธุรกิจ"
26008-440 = "ทั้งเรื่องที่อยากทำให้เฮียกคิยาโค\nเป็นร้านน้ำชาอันดับหนึ่ง\nในคิโวทอสด้วยค่ะ!"
26008-450 = "ฉันน่ะ... ไม่อยากจะ\nพลาดทุกอย่างนี้ค่ะ\nทุกๆ อย่างเลยค่ะ!"
26008-460 = "แน่นอนว่า... เรื่องของคุณครูด้วยค่ะ!"
26008-2600 = "คุณครูคอยใส่ใจฉันตลอด...\nขอบคุณนะคะ คุณครู\nถ้าคุณครูอยู่ด้วย ร้านของเรา\nก็คงจะพัฒนาต่อไปได้เรื่อยๆ ค่ะ!\nอื้อ แบบนี้ใช้ได้แล้วค่ะ"

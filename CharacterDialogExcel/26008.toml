[translation]
26008-10 = "Blue Archive!"
26008-20 = "The Beach Shack represents summer! The Festival Operations Department never stops working, even overseas! Kawawa Shizuko is on it!"
26008-30 = "What would be good as a main summer product...?"
26008-40 = "Operating a franchise is so hard. It's just meeting after meeting..."
26008-50 = "I have a feeling it could be used for the next festival..."
26008-60 = "I want to make Momoyodou home to the best tea house in Kivotos!"
26008-70 = "I have a great idea! Yeah!"
26008-80 = "Oh, Sensei. Welcome! It's hot today."
26008-90 = "Here, have a drink!"
26008-100 = "...Yeah, it was flowing well."
26008-110 = "*sigh* It's so hot..."
26008-120 = "You're here, Sensei! I've been waiting for you!"
26008-130 = "When I'm at the Beach Shack, can you please come see me there?"
26008-140 = "Momoyodou will always be with you!"
26008-150 = "That's a good phrase, right?"
26008-160 = "Huh? You think this swimsuit is cute? It looks good on me?"
26008-170 = "Again... You're paying lip service because I'm the owner of Momoyodou..."
26008-180 = "What? Really? You're being serious?"
26008-190 = "S-Seriously, don't act like you mean that at a time like this!"
26008-200 = "Is it hard to manage multiple shops?"
26008-210 = "Umm, well, yeah. I guess."
26008-220 = "...If I said it was hard, would you help me?"
26008-230 = "When I'm with you, I feel like I'm at a summer festival."
26008-240 = "...Heehee, if you're not sure, you don't need to know yet."
26008-250 = "Happy birthday, Sensei!"
26008-260 = "Just in time, the Momoyodou summer house released a special limited birthday menu. What do you think?"
26008-270 = "So...it's exclusively for you, Sensei?"
26008-280 = "My birthday...? Ugh... You got me. I lowered my guard..."
26008-290 = "Huh? Oh, don't worry. It's not that I don't like it!"
26008-300 = "...Heehee, heehee."
26008-310 = "Happy New Year! Time flies. I feel like summer was just yesterday..."
26008-320 = "Great! Anyway, let's keep moving forward this new year!"
26008-330 = "Momoyodou for summer! Momoyodou for Christmas! The festival must go on all year around!"
26008-340 = "So, let's go! Sensei!"
26008-350 = "Trick or treat!"
26008-360 = "...I-I'm just kidding! You don't have to get me anything!"
26008-370 = "W-Well, either way, I'll be grateful..."
26008-390 = "Sensei. I...know what I have to do now."
26008-400 = "Come to think of it, it's pretty obvious. I can't believe I just realized...it was due to my negligence!"
26008-410 = "You may already know, but I'm really ambitious!"
26008-420 = "There are a lot of things I want to do and have. I can't give up any of them."
26008-430 = "I want to make everyone happy and become a successful businesswoman!"
26008-440 = "I want to make Momoyodou home to the best tea house in Kivotos!"
26008-450 = "I don't want to miss out on anything!"
26008-460 = "Of course...that includes you!"
26008-2600 = "You're always so considerate of me... Thank you, Sensei. As long as you're here, Momoyodou will keep evolving! Did that sound cool?"

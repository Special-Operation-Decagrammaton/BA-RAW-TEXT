[translation]
26008-10 = "蔚藍～檔案！"
26008-20 = "說到海邊，就是海之家！就算舞台是海邊，\n節慶營運管理部也不會停下來唷！\n河和靜子，出動～！"
26008-30 = "夏天新的\n主打商品…嗯…\n有沒有什麼靈感…"
26008-40 = "沒想到連鎖經營這麼辛苦…會議、會議、會議！\n然後又是會議啊…"
26008-50 = "有什麼，可以在下次的祭典\n派上用場的東西…"
26008-60 = "總有一天，\n要把百夜堂變成\n奇普托斯第一的茶室…！"
26008-70 = "啊，想到好點子了！\nYES！"
26008-80 = "啊，老師！\n歡迎回來～！\n今天真熱呢～"
26008-90 = "來，請收下飲～料！"
26008-100 = "…嗯，這個流程不錯。"
26008-110 = "好熱…"
26008-120 = "呃老師！？\n是什麼時候…！\n那個，歡迎光臨～！"
26008-130 = "我在海之家的時候，\n也請到那邊找我哦？"
26008-140 = "百夜堂會一直\n陪伴在你身邊！"
26008-150 = "這段招呼語，\n不覺得不錯嗎？\n怎麼樣呢？"
26008-160 = "咦…泳衣，很可愛…？\n很適合…？"
26008-170 = "又，又來了…\n對百夜堂的老闆\n那種營業措辭…"
26008-180 = "咦，不是那樣？\n是認真的？"
26008-190 = "真，真是的，\n請不要只在這種時候\n才擺出認真的表情！"
26008-200 = "管理複數店鋪\n會不會很辛苦？"
26008-210 = "唔嗯…\n算是吧。"
26008-220 = "…我說會辛苦的話，\n你會幫我嗎？"
26008-230 = "和老師在一起的話，\n感覺每天都像夏日祭典一樣。"
26008-240 = "…呵呵。\n不知道意思的話，\n先這樣也沒關係哦。"
26008-250 = "祝你生日快樂，老師！"
26008-260 = "現在海之家的百夜堂正好\n推出了生日限定菜單。\n要不要試試？"
26008-270 = "…順帶一提，\n是老師專用的唷？"
26008-280 = "我的，生日…？\n咕，在我大意的時候\n這麼直球的攻擊…"
26008-290 = "咦，啊，\n不，請不用在意。\n並不是討厭之類的！"
26008-300 = "…耶嘿，耶嘿嘿。"
26008-310 = "新年快樂！已經新年了嗎，\n明明前陣子還是夏天的感覺…"
26008-320 = "好，總之新年也要，\n有精神的努力！"
26008-330 = "夏天也要百夜堂！\n聖誕節也要百夜堂！\n祭典要持續一整年！"
26008-340 = "就是這樣，\n來走吧！老師！"
26008-350 = "不買點心給我的話，\n我就要惡作劇了唷？"
26008-360 = "…開，開玩笑的！\n不用勉強買給我\n也沒關係！"
26008-370 = "嘛，對我來說\n哪邊都有利益…"
26008-390 = "老師。我，明白\n自己該做什麼了。"
26008-400 = "仔細想想，\n明明都是理所當然的事，\n居然到現在才醒悟……\n這是靜子我，一生的失敗！"
26008-410 = "雖然老師可能早就知道了，\n我這個人可是很貪心的唷？"
26008-420 = "想做的事、想要的東西都很多，\n但我一個都不會放棄。"
26008-430 = "讓大家感到開心，\n還有生意上的成功！"
26008-440 = "就連讓百夜堂成為奇普托斯\n最棒的喫茶店也是！"
26008-450 = "我，全部都不想放棄！全部！"
26008-460 = "當然……還有老師也是！"
26008-2600 = "總是像這樣，\n注意到我…\n謝謝你，老師。\n有老師在的話，感覺百夜堂\n就還能夠繼續進化！\n…嗯，剛才的感覺不錯？"

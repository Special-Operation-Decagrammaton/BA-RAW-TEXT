[translation]
10123-10 = "블루 아카이브!"
10123-20 = "저를 기다리셨나요, 선생님?\n후후. 아니죠. 기다린 건, 저겠네요."
10123-30 = "생각보다 아담한 장소네요."
10123-40 = "과연……. \n여긴\n이런 느낌이군요?"
10123-50 = "어라, 저 사람은……."
10123-60 = "후후, 가서 말이나\n한번 걸어볼까요."
10123-70 = "시선이 느껴지는데…….\n옷 때문일까요?"
10123-80 = "기다리고 있었어요, 선생님."
10123-90 = "……네. 이 복장으로요."
10123-100 = "어서 오세요, 선생님."
10123-110 = "오늘도 '즐거운' 하루를\n기대하고 있어요."
10123-120 = "뭘 그렇게 뚫어지듯"
10123-130 = "보고 계신가요?"
10123-140 = "아, 선글라스요? 후후……."
10123-150 = "뺄 수 없죠."
10123-160 = "지금은 패션의 일부니까요."
10123-170 = "마음에 드신 모양이네요."
10123-180 = "가게, 소개시켜 드릴까요?"
10123-190 = "이런 날인데, \n안에만 계실 건가요?"
10123-200 = "슬리퍼? \n아아, 귀엽지 않나요?"
10123-210 = "좀 더 \n가까이서 \n보시겠어요?"
10123-220 = "이런 날에는 또, "
10123-230 = "이런 날에 맞는 \n복장이어야죠."
10123-240 = "무슨 상관이냐고요?"
10123-250 = "그건……. 후후후."
10123-260 = "제 생일인데"
10123-270 = "어째서 제가 와야 하는지\n의문스럽네요."
10123-280 = "일 끝나시면……. "
10123-290 = "제 방으로 갈까요?"
10123-300 = "새해 복 많이 받으세요,\n선생님."
10123-310 = "……"
10123-320 = "평범하게 인사해서"
10123-330 = "놀라셨나요?"
10123-340 = "크리스마스에 \n어울리는 옷은"
10123-350 = "아니네요."
10123-360 = "다음에는……. "
10123-370 = "준비해 봐야겠어요."
10123-380 = "시끌벅적한 날이네요.\n마음에 들어요."
10123-400 = "여기까지 오니\n바람도 선선해지는군요."
10123-410 = "다른 차도 없고…….\n좋네요."
10123-420 = "드라이브는 어떠실까요?\n많이 놀라셨나요?"
10123-430 = "갑작스럽기도 하고,"
10123-440 = "예상외이기도 하셨겠죠."
10123-450 = "그 표정을 보니……."
10123-460 = "오길 잘했다는\n생각이 드네요."
10123-470 = "사실 별다른\n이유는 없어요."
10123-480 = "그저 한 번쯤 해보고\n싶었을 뿐."
10123-490 = "이런 걸 \n뭐라고 하죠……?"
10123-500 = "……납치?"
10123-510 = "후후…….\n농담이에요."
10123-520 = "그렇지만 아직은…….\n그래요."
10123-530 = "선생님을 집으로 \n돌려보내 드리기 전까진,\n농담이 아닌 걸로 하죠."
10123-2600 = "한 번은 말리실 줄 알았는데, \n결국 이렇게 나오시는군요.\n좋습니다. 선생님이 원하신다면…….\n끝까지 함께 가시죠."

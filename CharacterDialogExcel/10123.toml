[translation]
10123-10 = "Blue Archive!"
10123-20 = "รอฉันอยู่เหรอคะ คุณครู?\nฮุฮุ ไม่หรอกค่ะ ฉันต่างหากล่ะคะที่เป็นฝ่ายรอ"
10123-30 = "เป็นที่ที่เล็กกว่าที่คิดนะคะ"
10123-40 = "อืม... ที่นี่\nเป็นแบบนี้เองสินะคะ?"
10123-50 = "เอ๋? คนนั้นคือ..."
10123-60 = "ฮุฮุ เข้าไปหา\nแล้วชวนคุยดีมั้ยคะ?"
10123-70 = "เหมือนมีใครมองมาเลย...\nเป็นเพราะชุดหรือเปล่าคะ?"
10123-80 = "ฉันกำลังรออยู่เลยค่ะ คุณครู"
10123-90 = "ค่ะ... รอในชุดนี้ค่ะ"
10123-100 = "เชิญค่ะ คุณครู"
10123-110 = "ฉันหวังว่าวันนี้ก็\nจะเป็นวันที่ 'สนุก' ค่ะ"
10123-120 = "จ้องอะไรกัน"
10123-130 = "ขนาดนั้นเลยคะ?"
10123-140 = "อ๊ะ แว่นกันแดดเหรอคะ? ฮุฮุ..."
10123-150 = "ขาดไม่ได้หรอกค่ะ"
10123-160 = "ตอนนี้มันเป็นส่วนหนึ่งของแฟชั่นค่ะ"
10123-170 = "ดูจะถูกใจนะคะ"
10123-180 = "ฉันแนะนำร้านให้มั้ยคะ?"
10123-190 = "ในวันแบบนี้\nจะทำแต่งานเหรอคะ?"
10123-200 = "รองเท้าแตะ?\nอ้อ น่ารักใช่มั้ยคะ?"
10123-210 = "อยากดูใกล้ๆ\nกว่านี้อีกหน่อย\nมั้ยล่ะคะ?"
10123-220 = "ในวันแบบนี้น่ะ "
10123-230 = "ฉันก็ต้องใส่ชุด\nที่เข้ากับวันแบบนี้สิคะ"
10123-240 = "เกี่ยวอะไรกันน่ะเหรอคะ?"
10123-250 = "ก็มัน... ฮุฮุฮุ"
10123-260 = "วันเกิดฉันแท้ๆ"
10123-270 = "แต่ทำไมฉันต้อง\nเป็นฝ่ายมาหาก็ไม่รู้นะคะ"
10123-280 = "ถ้าเสร็จงานแล้ว... "
10123-290 = "ไปห้องฉันกันมั้ยคะ?"
10123-300 = "สวัสดีปีใหม่ค่ะ\nคุณครู"
10123-310 = "..."
10123-320 = "ฉันทักทายแบบธรรมดาทั่วไป"
10123-330 = "ก็เลยตกใจเลยเหรอคะ?"
10123-340 = "นี่มันไม่ใช่ชุดที่\nเหมาะกับคริสต์มาส"
10123-350 = "เลยนะคะ"
10123-360 = "ไว้คราวหน้า... "
10123-370 = "ต้องเตรียมตัวใหม่แล้วค่ะ"
10123-380 = "เป็นวันแห่งความวุ่นวายเลยนะคะ\nฉันชอบค่ะ"
10123-400 = "พอมาถึงที่นี่\nลมก็พัดเย็นขึ้นนะคะ"
10123-410 = "รถคันอื่นก็ไม่มี...\nดีจังเลยค่ะ"
10123-420 = "นั่งรถเล่นเป็นยังไงบ้างคะ?\nตกใจมากหรือเปล่าคะ?"
10123-430 = "คงรู้สึกทั้งกะทันหัน"
10123-440 = "และเกินคาดด้วยสินะคะ"
10123-450 = "ดูจากสีหน้าแล้ว..."
10123-460 = "ฉันว่าฉันทำได้ดีเลยค่ะ\nที่มาที่นี่"
10123-470 = "ที่จริงฉันไม่มีเหตุผล\nอะไรพิเศษหรอกค่ะ"
10123-480 = "ก็แค่อยากลองทำ\nดูสักครั้งน่ะค่ะ"
10123-490 = "การทำแบบนี้\nเรียกว่าอะไรเหรอคะ...?"
10123-500 = "ลักพาตัวหรือเปล่านะ...?"
10123-510 = "ฮุฮุ...\nล้อเล่นค่ะ"
10123-520 = "แต่ถึงยังไงตอนนี้...\nใช่ค่ะ"
10123-530 = "จนกว่าฉันจะยอม\nปล่อยคุณครูกลับบ้าน\nคิดว่ามันไม่ใช่เรื่องล้อเล่นแล้วกันค่ะ"
10123-2600 = "คิดว่าจะห้ามกันเสียอีก\nสุดท้ายก็เอาอย่างนี้สินะคะ\nก็ดีค่ะ ถ้าคุณครูต้องการ\nก็ไปด้วยกันให้สุดเลยค่ะ"

[translation]
10123-10 = "蔚藍檔案！"
10123-20 = "老師，讓你久等了嗎？\n呵呵，不對。真正在等待的人，是我才對。"
10123-30 = "是個比想像中\n更加雅致的場所呢。"
10123-40 = "原來如此……\n這裡，是這種氛圍嗎。"
10123-50 = "哎呀，那位是……"
10123-60 = "呵呵，試著搭話看看吧？"
10123-70 = "感覺到了視線……\n是服裝造成的嗎？"
10123-80 = "我正在等你，老師。"
10123-90 = "……沒錯，就是用這副打扮。"
10123-100 = "歡迎你來，老師。"
10123-110 = "期待今天也是\n「愉快」的一天哦。"
10123-120 = "那麼熱切地盯著我看……"
10123-130 = "有什麼地方讓你在意的嗎？"
10123-140 = "啊啊，太陽眼鏡是嗎？\n呵呵……"
10123-150 = "這是不會拿下來的哦。"
10123-160 = "因為它已經是時尚的一部分了。"
10123-170 = "看來，老師似乎也對\n太陽眼鏡很感興趣呢。"
10123-180 = "有在販售的商店，\n要為你介紹一下嗎？"
10123-190 = "明明是這種天氣，\n還要窩在房裡嗎？"
10123-200 = "涼鞋？沒錯，\n不覺得很可愛嗎？"
10123-210 = "要靠近點看嗎？"
10123-220 = "我認為這種日子，"
10123-230 = "應該有更適合的\n打扮才對……"
10123-240 = "問我有什麼關係？"
10123-250 = "這個嘛……呵呵。"
10123-260 = "明明是我的生日，"
10123-270 = "為何是我要過來呢？"
10123-280 = "工作結束之後……"
10123-290 = "要請你過來我的房間唷？"
10123-300 = "新年快樂，老師。"
10123-310 = "……"
10123-320 = "普通的問候"
10123-330 = "讓你嚇到了嗎？"
10123-340 = "這並不是適合聖誕節"
10123-350 = "的服裝呢。"
10123-360 = "下次……"
10123-370 = "好好準備一下吧。"
10123-380 = "今天是熱鬧的一天呢。\n我還挺喜歡的。"
10123-400 = "來到這裡之後，\n連風也變舒適了呢。"
10123-410 = "又沒有其他車子……\n感覺真好。"
10123-420 = "覺得這趟兜風怎麼樣？\n嚇到你了嗎？"
10123-430 = "畢竟是個突然的邀請，"
10123-440 = "你想必也沒預料到吧？"
10123-450 = "看見那個表情……"
10123-460 = "我覺得有邀請你\n真是太好了。"
10123-470 = "其實並沒有\n什麼特別的理由。"
10123-480 = "只是想嘗試一次而已。"
10123-490 = "這種行為，\n該怎麼形容來著……？"
10123-500 = "……綁架？"
10123-510 = "呵呵……開玩笑的。"
10123-520 = "不過至少現在……我想想。"
10123-530 = "在把老師送回家之前，\n就當作不是玩笑吧。"
10123-2600 = "本來一度好奇是否會被阻止，\n結果你居然選擇這麼做啊。\n好吧。如果老師如此期望的話……\n就讓我陪伴你到最後一刻吧。"

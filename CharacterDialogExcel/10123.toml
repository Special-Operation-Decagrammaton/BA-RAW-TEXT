[translation]
10123-10 = "Blue Archive!"
10123-20 = "Were you waiting for me, Sensei? Fufu. No. I suppose I was the one who was waiting."
10123-30 = "It's cozier than I expected."
10123-40 = "I see... So this is what it's like here?"
10123-50 = "Oh, isn't that...?"
10123-60 = "Fufu, maybe I'll go talk to her."
10123-70 = "I feel like people are staring at me... Is it because of my outfit?"
10123-80 = "I've been waiting for you, Sensei."
10123-90 = "...Yes. In this outfit."
10123-100 = "Welcome, Sensei."
10123-110 = "I'm looking forward to another \"fun\" day."
10123-120 = "What are you..."
10123-130 = "...staring at so intently?"
10123-140 = "Ah, my sunglasses? Fufu..."
10123-150 = "No, I can't remove them."
10123-160 = "It's part of my outfit right now."
10123-170 = "Do you like them?"
10123-180 = "I can show you where I purchased them."
10123-190 = "Do you intend to stay indoors on such a beautiful day?"
10123-200 = "Slippers? Ah, they're cute, yes?"
10123-210 = "Would you like a better view?"
10123-220 = "A day like this... "
10123-230 = "...calls for the perfect outfit."
10123-240 = "...What do those have to do with each other?"
10123-250 = "That's... Fufufu."
10123-260 = "It's my birthday..."
10123-270 = "...so I'm a tad confused why I had to be the one to come over."
10123-280 = "When you finish your work... "
10123-290 = "...shall we go to my room?"
10123-300 = "Happy New Year, Sensei."
10123-310 = "..."
10123-320 = "Did my mundane greeting..."
10123-330 = "...surprise you, Sensei?"
10123-340 = "I suppose this outfit isn't quite suited..."
10123-350 = "...for Christmas."
10123-360 = "Next time... "
10123-370 = "...I'll prepare something more appropriate."
10123-380 = "It's a busy day. I like it."
10123-400 = "The breeze feels refreshing out here."
10123-410 = "There are no cars around, either... This is nice."
10123-420 = "How's the drive? Were you surprised?"
10123-430 = "It must've been sudden,"
10123-440 = "and unexpected."
10123-450 = "Looking at your expression..."
10123-460 = "I'm glad we came here."
10123-470 = "There's no special meaning to it."
10123-480 = "I just wanted to try it at some point."
10123-490 = "What do you call this again...?"
10123-500 = "...Kidnapping?"
10123-510 = "Heh... I'm just joking."
10123-520 = "But, still... Yeah."
10123-530 = "Until I send you back home, let's say I'm not joking."
10123-2600 = "I did believe you'd at least try to stop me, but I see how you intend to play it. Fine, Sensei. If this is what you want... We'll stay together until the very end."

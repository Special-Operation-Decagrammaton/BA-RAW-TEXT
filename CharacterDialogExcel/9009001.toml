[translation]
9009001-10 = "い、い、いらっしゃいませ！\n…先生！"
9009001-20 = "暇だなぁ…。\n…え、うわあ！？\nい、いつから来てました？！"
9009001-30 = "24時間！いつでも訪問してください！\nコンビニみたいなものですから！"
9009001-40 = "任務には…その、\nじゅ、充分な準備が必要だと\n思います！"
9009001-50 = "ですから…いっぱい買った方が\nいいですよ！うちのお店の物は買った方が\n絶対にお得ですって！"
9009001-60 = "あ、あの、そんなにじっと\n見つめられると\n困ってしまうのですが…！"
9009001-70 = "ひぁっ！お、おでこは\n触らないでください！"
9009001-80 = "大人のカード…見せていただいても\nよろしいでしょうか？"
9009001-90 = "で、ですが…うちのお店は！\nすごく良心的なお値段ですから！"
9009001-100 = "ありがとうございました！"
9009001-110 = "また来てくださいね、先生。"

[translation]
9009001-10 = "歡，歡，歡迎光臨！\n……老師！"
9009001-20 = "好閒啊……\n……咦，唔哇啊！\n什，什麼時候來的？"
9009001-30 = "24小時！請隨時來拜訪！\n就和便利商店一樣！"
9009001-40 = "進行任務…那個，\n需，需要做好充足的準備，\n我是這麼認為的！"
9009001-50 = "所以……買多一點比較好唷！\n我們店裡的東西，買了絕對划算！"
9009001-60 = "那，那個，\n被那樣盯著看的話，\n有一點困擾……！"
9009001-70 = "咿！\n請，請不要碰我的額頭！"
9009001-80 = "大人的卡片……\n可以給我看一下嗎？"
9009001-90 = "但，但是……我們店裡，\n價格都非常良心！"
9009001-100 = "非常謝謝！"
9009001-110 = "請再來唷，老師。"

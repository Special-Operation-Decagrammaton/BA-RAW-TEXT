[translation]
13006-20 = "จ๊ะเอ๋~ ได้เจอกันแล้วนะ!\nเรามาเล่นสนุกกันเถอะคุณครู!"
13006-30 = "ไม่เป็นไรหรอกน่า\nถ้าสนุกซะอย่าง"
13006-40 = "เอ๋?\nนั่นก็ดูไม่เลวเลยนะ"
13006-50 = "ฮุฮุ~♥ "
13006-60 = "ลูบหัวเค้าหน่อย~"
13006-70 = "ไปเล่นสนุกด้วยกันเถอะน้า~"
13006-80 = "ว่าไง~ คุณครู~\nฉันมาแกล้งคุณครูล่ะ~"
13006-90 = "วันนี้จะทำภารกิจอะไรเหรอ?\nเริ่มที่อะไรสนุกๆ ก่อนดีกว่า!"
13006-100 = "คุณครู วันนี้เราเล่นอะไรกันดีล่ะ?"
13006-110 = "อะไรนะ? ไม่มีเวลางั้นเหรอ? \nค่อยทำงานทีหลังไม่ได้เหรอ...?"
13006-120 = "มาเล่นสนุกกันต่อจากครั้งที่แล้วดีไหม?"
13006-130 = "อันนั้นน่ะ... ครูก็สนุกใช่ไหมล่ะ?"
13006-140 = "ฮุฮุ~♥\nดูทำหน้าเขินเข้าสิ"
13006-150 = "เอ๊ะ... แกล้งเยอะไปรึเปล่านะ?\nจะโดนดุไหมเนี่ย..."
13006-160 = "วันนี้วันเกิดคุณครูเหรอ?!\nงั้นก็เป็นวันพิเศษน่ะสิ!\nไปฉลองกันเถอะ!"
13006-170 = "ฉันจะจัดปาร์ตี้\nในห้องหน่วยรับจ้าง!"
13006-180 = "วันนี้วันเกิดเค้าเอง!"
13006-190 = "คุณครู~\nจะมาเล่นกับเค้าใช่มั้ย~?!"
13006-200 = "ปีใหม่ทั้งที\nต้องเล่นสนุกให้มากกว่าปีเก่า~"
13006-210 = "ฮุฮุ ตั้งตารอแล้ว~♥"
13006-220 = "เซอร์ไพรซ์~\nของขวัญวันคริสต์มาส\nก็คือเค้าเอง!"
13006-230 = "อยากแกะริบบิ้นออกเหรอ?\nฮุฮุฮุ"
13006-240 = "ถ้าไม่ให้ขนมกินล่ะก็~\nเค้าจะแกล้งนะ~"
13006-250 = "ว่าไงนะ? จะให้จริงเหรอ?\nจริงๆ อยากแกล้งคุณครู\nมากกว่าได้ขนมอีก..."
13006-270 = "ฮิฮิ น่าเสียดายจัง\nฮุฮุฮุ ถูกจับได้ซะแล้ว~♪"
13006-280 = "คุณครู\nผู้ว่าจ้างของวันนี้ไม่ใช่ใครอื่น\nแต่เป็นมุสึกิคนนี้นี่เอง~"
13006-290 = "ถ้าอย่างนั้น จะให้เค้าทำงาน\nของหน่วยรับจ้างสารพัด\nคนเดียวได้ยังไง~?"
13006-300 = "ฮิฮิ เป็นยังไงบ้างคุณครู?\nการแกล้งของเค้า\nมันสมบูรณ์แบบเลยใช่ไหมล่ะ?"
13006-310 = "ฮ่าๆ ดูสีหน้าคุณครูสิตลกสุดๆ ไปเลย ฮ่ะฮ่ะฮ่า~♪"
13006-320 = "วันนี้ได้ทำอะไร\nกับคุณครูเยอะแยะเลย"
13006-330 = "ทั้งกินเครป ทั้งไปสวนสนุก\nอ้อ แล้วก็ไปก่อเรื่องด้วยกัน\nที่ห้องสมุดด้วย…!"
13006-340 = "อ๊า~ เกือบจะหลอกได้จน\nถึงที่สุดแล้วด้วย น่าเสียดายจัง~"
13006-350 = "คราวหน้า เค้าจะต้องหลอก\nคุณครู ให้ถึงที่สุดให้ได้เลย\nคอยดูแล้วกัน~!"
13006-360 = "ฮ้าา\nวันนี้สนุกมากเลย!"
13006-2600 = "คุณครู! ดูสิ~ ดูนี่สิ~\nอาวุธนี้น่ะ...\nดูแข็งแกร่งแล้วก็น่ารักสุดๆ เลย!"

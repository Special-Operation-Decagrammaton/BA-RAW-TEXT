[translation]
13006-20 = "鏘──！終於登場了！\n來，讓我們開心地玩吧，老師！"
13006-30 = "開心就\n沒問題了。"
13006-40 = "哼嗯？\n那個\n看起來也不錯嘛？"
13006-50 = "咯呵呵～♥"
13006-60 = "摸摸我吧～"
13006-70 = "一起來～玩～吧～"
13006-80 = "你好呀～老師～\n我來處罰了唷～"
13006-90 = "今天要執行什麼任務呢？\n從好玩的開始吧！"
13006-100 = "老師，今天要玩什麼呢？"
13006-110 = "什麼！？你很忙？\n工作晚點再做嘛！\n不行嗎？"
13006-120 = "要不要繼續玩上次的遊戲？"
13006-130 = "那個…很好玩對吧？"
13006-140 = "咯呵呵～♥\n害羞的表情，真有趣。"
13006-150 = "咦，玩笑開過頭了嗎？\n好像會被教訓…"
13006-160 = "老師的生日！？\n這是非常重要的日子啊！\n來慶祝吧！"
13006-170 = "在便利屋的辦公室\n舉辦派對吧！"
13006-180 = "今天是我的生日唷！"
13006-190 = "老師～\n你會…陪我玩的吧～？！"
13006-200 = "今年要玩得\n比去年更開心～"
13006-210 = "咯呵呵，真讓人期待～♥"
13006-220 = "鏘鏘──！\n聖誕節的禮物\n就是我！"
13006-230 = "解開蝴蝶結就可以了唷？\n咯呵呵呵♥"
13006-240 = "不給點心的話～\n就要搗蛋了唷～"
13006-250 = "嗯？真的要給我嗎？\n比起點心，我更喜歡搗蛋的說。"
13006-270 = "啊～啊，真──可惜。\n咯呵呵，\n結果還是被發現了～♪"
13006-280 = "之所以隱瞞，\n是因為今天的\n可愛委託人不是別人，\n正是無月醬哦～"
13006-290 = "仔細想想，老師～\n便利屋的委託，\n本來就不可能只靠我一個人\n去解決吧？"
13006-300 = "啊哈，怎麼樣？老師？\n我的惡作劇，\n很完美吧？"
13006-310 = "呀哈，怎麼啦，老師，\n那副呆頭呆腦的表情。\n受不了！啊哈哈～♪"
13006-320 = "今天和老師做了好多事呢──"
13006-330 = "吃了可麗餅，\n也去了遊樂園，\n啊，還在圖書館\n成為了共犯…！"
13006-340 = "啊～啊，還以為可以\n完美地騙到最後的，\n好可惜～"
13006-350 = "下次絕對會\n騙到最後的，\n敬請期待吧～！"
13006-360 = "啊──，今天真的好好玩！"
13006-2600 = "老師！\n你看你看～這把武器，\n看起來很強，而且又好可愛！"

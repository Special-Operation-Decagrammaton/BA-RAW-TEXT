[translation]
13006-20 = "짜잔~ 드디어 등장!\n응, 이제 재밌게 놀자, 선생님!"
13006-30 = "재밌으니까\n괜찮아."
13006-40 = "흐응?\n저것도\n좋아보이는데?"
13006-50 = "후후~♥"
13006-60 = "쓰담쓰담 해줘~"
13006-70 = "같이 놀~자아~"
13006-80 = "안녕~ 선생님~\n혼내주러 왔어~"
13006-90 = "오늘은 어떤 임무를 수행할거야?\n재미있는거부터 하자!"
13006-100 = "선생님, 오늘은 뭐하고 놀까?"
13006-110 = "뭐어? 바쁘다고?\n일 같은 건 나중에 하면 안돼?"
13006-120 = "저번에 하던 놀이 마저 할까?"
13006-130 = "그거… 재밌었지?"
13006-140 = "후후~♥\n부끄러워하는 표정 재밌어."
13006-150 = "어라, 너무 놀렸나.\n이거 혼날지도…."
13006-160 = "선생님의 생일이라고?!\n완전 대단한 날이잖아!\n축하하자!"
13006-170 = "흥신소 사무실에서\n파티를 여는 거야!"
13006-180 = "오늘은 내 생일이야!"
13006-190 = "선생님~\n놀아… 줄 거지~?!"
13006-200 = "새해에는 작년보다\n더 즐겁게 노는 거야~"
13006-210 = "우후후 기대된다~♥"
13006-220 = "짜잔짜잔~\n크리스마스 프레젠트는\n바로 나야!"
13006-230 = "리본을 풀면 된다고?\n쿠후후후♥"
13006-240 = "과자를 주지 않으면~\n장난칠 거다~"
13006-250 = "응? 정말 주는 거야?\n과자보단 장난치는 쪽이\n더 좋은데."
13006-270 = "아아~ 아쉬워라.\n쿠흐흣, 결국 들켜버렸네~♪"
13006-280 = "선생님. 오늘의 귀여운\n의뢰인은 다름 아닌,\n이 무츠키 쨩이었습니다~"
13006-290 = "그도 그럴게,\n원래부터 흥신소의 의뢰를\n나 혼자 해결할 리가 없잖아~?"
13006-300 = "아핫, 어땠어? 선생님?\n그래도 내 장난~\n완벽하게 먹혀들었던 거지?"
13006-310 = "꺄핫, 뭐야, 선생님의 얼빠진 얼굴,\n무지 웃겨. 아하핫~♪"
13006-320 = "오늘 선생님이랑\n여러가지를 했네."
13006-330 = "크레이프도 먹고,\n유원지도 들렀고,\n아, 도서관에선\n공범이 되기까지…!"
13006-340 = "아아~ 마지막까지 완벽하게\n속일 수 있었는데. 아쉬워라~"
13006-350 = "그래도 다음 번에는\n반드시 끝까지 속여줄 테니까.\n기대하라구~!"
13006-360 = "아,\n오늘 엄청 재밌었다!"
13006-2600 = "선생님! 봐봐~ 봐봐~\n이 무기, 엄청 강해 보이는 데다가 귀여워!"

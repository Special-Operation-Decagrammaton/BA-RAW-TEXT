[translation]
13006-20 = "Ta-da! I'm finally here! All right, Sensei, let's have some fun!"
13006-30 = "As long as it's fun, it's okay."
13006-40 = "Hmm? That doesn't look half-bad either!"
13006-50 = "Heehee! ♥"
13006-60 = "One head pat, please!"
13006-70 = "Let's play together!"
13006-80 = "Hello, Sensei! I'm here to give YOU a lesson!"
13006-90 = "What kind of mission are we doing today? Let's start with something fun!"
13006-100 = "What should we do for fun today, Sensei?"
13006-110 = "What? You're busy? Can't you do work stuff some other time?"
13006-120 = "Should we pick up where we left off last time?"
13006-130 = "That was fun...wasn't it?"
13006-140 = "Heehee! It's funny seeing you get all embarrassed. ♥"
13006-150 = "Huh? Was I teasing you too much? I hope I don't get in trouble..."
13006-160 = "Wait, it's your birthday, Sensei?! We have to celebrate the occasion!"
13006-170 = "We can throw a party at the Problem Solver office!"
13006-180 = "Today's my birthday!"
13006-190 = "Sensei... You'll spend it with me...riiight?"
13006-200 = "We'll have even more fun this year than we did last year!"
13006-210 = "Heehee, I can't wait! ♥"
13006-220 = "Drum roll, please! Your Christmas present is...me!"
13006-230 = "Want to unwrap your present? Heeheehee!"
13006-240 = "You know how this works! Trick or treat!"
13006-250 = "Huh? You're giving me a treat? I'm more of a trick kind of gal, though."
13006-270 = "Ah, what a shame. Looks like I've finally been caught! ♪"
13006-280 = "Sensei. Today's cute client was none other than me!"
13006-290 = "Honestly, though, I can't take care of a Problem Solver mission all by myself."
13006-300 = "What do you think, Sensei? My prank worked flawlessly, didn't it?"
13006-310 = "What's up with that dumbfounded look? It's so funny! Ahaha! ♪"
13006-320 = "We did a lot of fun stuff today."
13006-330 = "We ate crepes, stopped by a theme park, and we were partners in crime at the library!"
13006-340 = "Ah... I could've had you tricked the whole time. What a shame!"
13006-350 = "But next time, I'll be sure to keep you fooled until the end! Look forward to it!"
13006-360 = "Ah, I had so much fun today!"
13006-2600 = "Sensei! Look! Look! This weapon seems really powerful, and it's cute!"

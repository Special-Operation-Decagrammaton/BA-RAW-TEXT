[translation]
10016-10 = "Blue Archive."
10016-20 = "I'm the best player around! I'll help you out."
10016-30 = "Hmm... This game is actually kinda fun."
10016-40 = "I hear this game's getting a sequel. That's it, I'm getting a part-time job."
10016-50 = "When I'm all grown up...I might grow out my hair."
10016-60 = "C'mon... C'mon... The claw picked it up!"
10016-70 = "All right, now I just need to... Clear!"
10016-80 = "Welcome, Sensei. Let's be sure to work hard today as well."
10016-90 = "I'm going to work hard so today is special for both of us."
10016-100 = "I'm worried about the Game Development Department."
10016-110 = "I know I'll be okay as long as I'm with you..."
10016-120 = "You played our game too, right? Which part was your favorite?"
10016-130 = "I want to draw even more beautiful things... But I need to practice."
10016-140 = "Can you help me?"
10016-150 = "I don't want my art to just be about moe, I want it to convey \"love\" too."
10016-160 = "Hmm... It's a tight budget again this month."
10016-170 = "Do we get paid if we're on the roster?"
10016-180 = "I want to wish you a happy birthday, Sensei!"
10016-190 = "I don't know what you like, so..."
10016-200 = "Do you wanna come pick something out with me?"
10016-210 = "I think birthdays should always be spent with family."
10016-220 = "So I've got to hang out with Momoi today. Wanna come with, Sensei?"
10016-230 = "Happy New Year! I'll be counting on you this year as well."
10016-240 = "Merry Christmas! Today's a day made for couples."
10016-250 = "...I-Is something I heard once!"
10016-260 = "I'm not usually a big Halloween fan, but maybe with you, and everyone else, this year..."
10016-270 = "I think it'll be fun. I'm excited!"
10016-290 = "I've never taken an interest in anything other than retro games before..."
10016-300 = "I guess the arcade has lots of different kinds of games."
10016-310 = "I feel like I'm broadening my horizons. This was a good learning opportunity."
10016-320 = "Thank you, Sensei. For bringing me here..."
10016-330 = "I'm having so much fun thanks to you."
10016-340 = "Oh, right..."
10016-350 = "Can you keep what happened today a secret from my sister?"
10016-360 = "Seriously, you can't tell her!"
10016-2600 = "I don't know if this is the right way to describe a weapon, but it's beautiful. I'm happy."

[translation]
10016-10 = "Blue Archive"
10016-20 = "ฉันจะซัพพอร์ตคุณครูด้วยสุดยอดการเล่มเกมให้ดู!"
10016-30 = "อืม...\nเกมนี้ สนุกดีจัง"
10016-40 = "อืม... เกมนี้\nมีภาคต่อออกมาแล้วนี่นา...\nดีล่ะ ไปทำงานพิเศษดีกว่า"
10016-50 = "ถ้าฉันโตกว่านี้....\nจะลองไว้ผมยาวดีมั้ยน้า"
10016-60 = "ขอร้องล่ะ... ออกมาซะทีเถอะ...\nออกมาสิ... ออกมาแล้ว!"
10016-70 = "ดีล่ะ\nถ้าเล่นแบบนี้ต่อไปล่ะก็...\nเคลียร์!"
10016-80 = "เชิญค่ะ คุณครู\nวันนี้ก็รบกวนด้วยนะคะ"
10016-90 = "ฉันจะพยายามให้ดีที่สุดค่ะ!\nเพื่อให้วันของฉันกับคุณครู\nเป็นวันที่น่าจดจำค่ะ"
10016-100 = "ฉันรู้สึกเป็นห่วงเพื่อนๆ\nในชมรมพัฒนาเกมค่ะ"
10016-110 = "ฉันได้อยู่กับคุณครูแบบนี้\nมันก็ดีอยู่หรอก..."
10016-120 = "อ๊ะ คุณครูเองก็เคยเล่นเกมของ\nพวกเราใช่มั้ยคะ? คุณครูว่า\nพาร์ทไหนสนุกที่สุดเหรอคะ?"
10016-130 = "ฉันอยากวาดภาพที่สวยๆ ให้มากขึ้น\nกว่านี้ค่ะ และเพื่อแบบนั้นแล้ว...\nฉันจะต้องมีประสบการณ์มากกว่านี้"
10016-140 = "คุณครูจะช่วยฉันหน่อยได้มั้ยคะ?"
10016-150 = "ตอนที่ฉันวาดรูป ฉันไม่ได้อยากให้มี\nบรรยากาศ \"โมเอะโมเอะ\" อย่างเดียว\nแต่อยากให้มี \"ความรัก\" แฝงอยู่ใน\nรูปที่วาดด้วยค่ะ"
10016-160 = "อืม... เดือนนี้...\nเงินค่าขนมก็ดูจะไม่พออีกแล้ว"
10016-170 = "ถ้าได้เป็นตัวแทนนักเรียนล่ะก็\nจะมีเงินค่าขนมรายเดือนด้วยมั้ยคะ?"
10016-180 = "คุณครูคะ\nสุขสันต์วันเกิดนะคะ"
10016-190 = "แต่ว่าฉันไม่รู้ว่าคุณครูชอบอะไรเลย"
10016-200 = "ถ้างั้นเราไปเลือกของขวัญ\nด้วยกันมั้ยคะ?"
10016-210 = "วันเกิดก็ต้องใช้เวลา\nอยู่กับครอบครัวสิคะ"
10016-220 = "ถ้างั้นก็มีพี่... แล้วก็คุณครู\nฉลองกัน... ดีมั้ยคะ?"
10016-230 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ\nปีนี้ก็ขอฝากตัวด้วยนะคะ"
10016-240 = "เมอร์รีคริสต์มาส\nเอ่อ... ได้ยินว่าวันนี้\nเป็นวันของคู่รักค่ะ"
10016-250 = "กะ...ก็แค่ได้ยินมาแบบนั้นค่ะ!"
10016-260 = "ฉันไม่ได้ชอบวันฮาโลวีนขนาดนั้น\nก็จริงอยู่... แต่ว่าตั้งแต่ปีนี้ไป\nฉันมีคุณครูแล้วก็ทุกๆ คนอยู่ด้วย..."
10016-270 = "มันคงจะสนุกขึ้นแน่เลยค่ะ\nฉันรอแทบไม่ไหวแล้วล่ะ"
10016-290 = "นอกจากเกมเรโทรแล้ว\nฉันก็ไม่เคยสนใจเกม\nประเภทอื่นมาก่อนเลย..."
10016-300 = "ในร้านเกม...\nก็มีเกมแบบนี้อยู่ด้วยสินะคะ"
10016-310 = "รู้สึกเหมือนเปิดแมพใหม่ขึ้นมา\nอีกหน่อยแล้วค่ะ\nได้รู้อะไรใหม่ๆ แล้วล่ะ"
10016-320 = "ขอบคุณมากนะคะ คุณครู\nที่พาฉันมาที่นี่..."
10016-330 = "เพราะงั้นฉันถึงได้สนุกมากแบบนี้"
10016-340 = "อ๊ะ จริงด้วย..."
10016-350 = "แล้วก็... เรื่องในวันนี้ห้ามเอา\nไปบอกพี่สาวนะคะ เป็นความลับนะคะ"
10016-360 = "ห้ามเด็ดขาดเลยนะคะ!"
10016-2600 = "ไม่รู้ว่าคำพูดแบบนี้\nจะใช้ได้กับอาวุธหรือเปล่า...\nแต่มันสวยมากเลยค่ะ มีความสุขจัง"

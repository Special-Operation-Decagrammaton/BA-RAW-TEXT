[translation]
10016-10 = "蔚藍檔案。"
10016-20 = "我會用最好的表現幫助老師。"
10016-30 = "嘿……\n這個遊戲，有趣。"
10016-40 = "唔嗯，那個遊戲\n好像出續作了……\n好！去打工吧！"
10016-50 = "等我再長大一點……。\n要不要把頭髮留長呢。"
10016-60 = "拜託……快出現……\n出現吧……出現了！"
10016-70 = "好。\n這樣就……\n過關了！"
10016-80 = "歡迎你，老師。\n今天也請多多指教。"
10016-90 = "我會全力以赴。\n為了讓老師和我的今天\n能成為有意義的一天。"
10016-100 = "我很擔心遊戲開發部的孩子們。"
10016-110 = "我因為跟老師\n待在一起……所以沒關係。"
10016-120 = "啊，老師也\n玩過我們的遊戲吧？\n你覺得哪裡最有趣呢？"
10016-130 = "我想畫一些\n更美麗的東西。為此……\n我需要大量的經驗。"
10016-140 = "老師也會幫我嗎？"
10016-150 = "我畫圖的時候\n不只想表現出「萌」，\n也想融入「可愛」的感覺。"
10016-160 = "唔嗯。這個月的\n零用錢也快見底了……"
10016-170 = "當值日生的話\n有薪水能領嗎？"
10016-180 = "老師，真心祝你\n生日快樂。"
10016-190 = "可是我不知道\n老師喜歡什麼……"
10016-200 = "要不要一起去挑呢？"
10016-210 = "生日就是要和家人\n一起度過才行。"
10016-220 = "和姐姐……還有老師\n一起……怎麼樣呀？"
10016-230 = "恭祝新年快樂。\n今年一整年，\n也請多多指教！"
10016-240 = "聖誕節快樂！\n那個……今天\n好像是情侶們的日子。"
10016-250 = "我，我只是說說而已！"
10016-260 = "我雖然沒那麼喜歡萬聖節，\n但是從今年開始有老師\n和大家在，所以……"
10016-270 = "很開心。\n很期待。"
10016-290 = "雖然一直以來\n都對點陣風格之外的遊戲\n沒什麼興趣……"
10016-300 = "原來在遊戲中心裡\n還有這種遊戲呀。"
10016-310 = "感覺自己的視野好像變廣了，\n我學到了很多。"
10016-320 = "……謝謝你，\n老師，能夠帶我來這裡。"
10016-330 = "……多虧了老師，\n我現在非常的開心。"
10016-340 = "啊，對了……。"
10016-350 = "今天的事，\n要對姐姐……\n保密唷？"
10016-360 = "絕對！絕對要喔！"
10016-2600 = "雖然不知道對武器用這種\n形容方式適不適合……\n真美呢。我很開心。"

[translation]
10016-10 = "블루 아카이브."
10016-20 = "최고의 플레이로 선생님을 도울게요."
10016-30 = "흐음……\n이 게임, 재미있네."
10016-40 = "으음. 이 게임\n후속작이 나왔다는데…….\n좋아. 아르바이트 하자."
10016-50 = "좀 더 어른이 되면…….\n머리를 길러볼까."
10016-60 = "제발……나와라……\n나와라……나왔다!"
10016-70 = "좋아.\n이대로만 가면……\n클리어!"
10016-80 = "어서 오세요, 선생님.\n오늘도 잘 부탁 드려요."
10016-90 = "최선을 다할게요.\n선생님과 저의 오늘이\n의미 있도록."
10016-100 = "게임개발부 애들이 걱정이네요."
10016-110 = "저야 선생님이랑\n있어서……좋지만."
10016-120 = "앗, 선생님도\n저희 게임 해보셨죠?\n어떤 점이 가장\n재미있으셨나요?"
10016-130 = "더 아름다운 것들을\n그리고 싶어요. 그러기 위해선….\n많은 경험이 필요해요."
10016-140 = "선생님이 도와주실거죠?"
10016-150 = "저도 그림을 그릴때\n'모에' 뿐만 아니라\n'사랑스러움'을 담고 싶어요."
10016-160 = "으음. 이번 달도\n용돈이 간당간당 한데."
10016-170 = "당번 학생이 되면\n급여가 나오나요?"
10016-180 = "선생님. 생일 진심으로\n축하드려요."
10016-190 = "근데 뭘 좋아하실지 몰라서…"
10016-200 = "같이 고르러 가실래요?"
10016-210 = "생일은 가족과\n함께 보내야 해요."
10016-220 = "언니랑……선생님도\n함께……어떠세요?"
10016-230 = "새해 복 많이 받으세요.\n올 한 해도, 잘 부탁 드려요!"
10016-240 = "메리 크리스마스!\n그……. 오늘은\n연인들을 위한 날이래요."
10016-250 = "그, 그냥 그렇다고요!"
10016-260 = "할로윈은 그렇게\n좋아하진 않지만\n올해부터는, 선생님과\n모두가 있으니까……."
10016-270 = "즐거울 것 같아\n기대가 돼요."
10016-290 = "이제까지 도트 게임 외에는\n별로 관심을 갖지 않았는데…."
10016-300 = "오락실에는 이런\n게임도 있는 거네요."
10016-310 = "시야가 넓어지는 것 같아요.\n공부가 되었어요."
10016-320 = "…고마워요. 선생님.\n이곳에 데려와 주셔서…."
10016-330 = "덕분에 지금 저 엄청 즐거워요."
10016-340 = "아, 맞다…."
10016-350 = "오늘 일은,\n언니에게는… 비밀이에요?"
10016-360 = "절대로, 절대로요!"
10016-2600 = "무기에 이런 표현을 하는 게\n맞을지는 모르겠지만….\n아름답네요. 기뻐요."

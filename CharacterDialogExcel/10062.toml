[translation]
10062-10 = "블루 아카이브"
10062-20 = "밀레니엄 사이언스 스쿨, C&C 소속, 콜사인 04.\n아스마 토키입니다.\n완벽한 보좌를 약속드립니다."
10062-30 = "여기는……\n무엇을 하는 공간일까요."
10062-40 = "카페……\n들어 본 적은 있습니다."
10062-50 = "당분이 함유된 음료는,\n피로회복에\n매우 효과적입니다."
10062-60 = "저도 차 정도는\n끓일 수 있습니다.\n그렇다고 할까요,\n익숙합니다."
10062-70 = "여기 인테리어는\n참고가 되겠네요."
10062-80 = "오셨습니까, 선생님."
10062-90 = "기다리고 있었습니다.\n오늘도 보좌하겠습니다."
10062-100 = "와주셔서 감사합니다, 선생님."
10062-110 = "무얼 해드릴까요?"
10062-120 = "당번…… 입니까.\n지시를 받은 이상은\n선처하겠습니다."
10062-130 = "……끝나면, 상 주세요."
10062-140 = "선생님은 좀처럼\n지시를 내리지 않는 편이군요."
10062-150 = "그렇다면 마음대로\n해도 상관없지요?"
10062-160 = "쉬는 시간이\n필요하지 않냐고요?"
10062-170 = "선생님 덕분에\n충분히 쉬고 있습니다."
10062-180 = "토끼 흉내라면\n조금 낼 수 있습니다."
10062-190 = "뿅."
10062-200 = "……신속히 칭찬해 주십시오."
10062-210 = "무엇이든 지시해 주십시오."
10062-220 = "C&C의 이름에 부끄럽지 않도록,\n최선을 다해 처리하겠습니다."
10062-230 = "생일 축하드립니다.\n선생님. 짝짝짝."
10062-240 = "생일을 기념하는 것은,\n보좌하는 자로서의 의무이니까요."
10062-250 = "네? 생일……?"
10062-260 = "아…… 축하해 주셔서\n감사합니다."
10062-270 = "말로만 끝내실\n생각은 아니시겠지요?"
10062-280 = "나가시죠.\n제가 보좌하겠습니다."
10062-290 = "새해입니다."
10062-300 = "심기일전, 새로운 메이드로\n버전업했습니다."
10062-310 = "이로써, 한층 더 완벽한\n보좌를 할 수 있을 것입니다."
10062-320 = "침묵하지 마시고,\n신속하게 고개를 끄덕여주세요."
10062-330 = "이럴 때의 인사말 정도는,\n저도 알고 있습니다."
10062-340 = "메리 크리스마스, 이지요."
10062-350 = "그러면 이제부터 하늘을 날면서\n선생님의 안전을 위협하는,"
10062-360 = "산타클로스라는 강적을\n격추하고 오겠습니다."
10062-370 = "할로윈을 기념해 최강의\n메이드 모드를 전개하였습니다."
10062-380 = "……여기는\n'평소와 다름없어!'라고\n태클을 걸어야 하는 부분인데요."
10062-400 = "누추한 곳이지만,\n어서 오십시오. 선생님."
10062-410 = "언제나처럼, 장비 점검을\n하고 있었습니다."
10062-420 = "걱정을 끼쳐 드려 죄송합니다."
10062-430 = "네, 항상 최상의 상태를\n유지할 수 있도록 하고 있습니다."
10062-440 = "C&C라는 이름에 걸맞는,"
10062-450 = "그런 메이드가\n되기 위해서라도요."
10062-460 = "그런…… 가요?\n특별한 일은 아니라고 생각합니다만."
10062-470 = "선생님께서 그렇게\n말씀해주신다니…… 조금은……"
10062-480 = "결정했습니다."
10062-490 = "오늘의 정비는,\n평소보다 완벽하게\n실행하겠습니다."
10062-500 = "목표는 <키보토스 최강의 메이드>,\n<메이드 중의 메이드>입니다."
10062-510 = "그러면 선생님……"
10062-520 = "옆에서, 지켜봐 주세요?"
10062-2600 = "이렇게까지 신경 써 주시다니……\n결정했습니다. 앞으로 신변 경호는\n모두 맡겨주십시오."

[translation]
10062-10 = "蔚藍檔案"
10062-20 = "我是千年科學學園，C&C所屬，代號04。\n飛鳥馬季。\n向您承諾會提供完美的輔佐。"
10062-30 = "這裡……是個\n什麼樣的空間呢。"
10062-40 = "咖啡廳……\n有聽說過。"
10062-50 = "含有糖分的飲料\n對恢復疲勞\n非常有效。"
10062-60 = "即使是我，泡茶\n這種事還是會的……\n不如說，我很熟練。"
10062-70 = "這裡的裝潢\n似乎能當成參考呢。"
10062-80 = "您來了啊，老師。"
10062-90 = "恭候多時了。\n我今天也會輔佐您。"
10062-100 = "非常感謝您願意過來，老師。"
10062-110 = "需要什麼幫忙嗎？"
10062-120 = "值日生……是嗎。\n既然已經收到指示，\n我會妥善處理的。"
10062-130 = "……結束之後\n請給我獎勵。"
10062-140 = "老師是不太會\n下指示的人呢。"
10062-150 = "那麼，我隨意行動\n應該也沒關係吧？"
10062-160 = "您問我需不需要\n休息時間是嗎？"
10062-170 = "託老師的福，\n我已經休息夠了。"
10062-180 = "要模仿兔子的話我稍微會一些。"
10062-190 = "蹦。"
10062-200 = "……請趕快誇獎我。"
10062-210 = "請您儘管指示。"
10062-220 = "為了不愧對C&C的名號，\n我會全力以赴的。"
10062-230 = "祝您生日快樂，\n老師。啪啪啪。"
10062-240 = "慶祝生日是身為\n輔佐之人的義務。"
10062-250 = "什麼？生日……？"
10062-260 = "啊……謝謝您的祝福。"
10062-270 = "您該不會打算\n只用嘴巴說說吧？"
10062-280 = "走吧。\n我會輔佐您的。"
10062-290 = "新年到了。"
10062-300 = "改變心情，\n升級成新的女僕了。"
10062-310 = "這樣就能進行\n更加完美的輔佐了。"
10062-320 = "請別一言不發，\n迅速點頭吧。"
10062-330 = "這種時候的問候\n我還是知道的。"
10062-340 = "聖誕節快樂，對吧。"
10062-350 = "那麼從現在起，在空中四處飛行\n對老師安全造成威脅的"
10062-360 = "名為聖誕老人的敵人，\n我將進行擊落。"
10062-370 = "為了紀念萬聖節，\n我開啟了最強的女僕模式。"
10062-380 = "……這裡應該要用\n「和平常沒兩樣吧！」\n來吐槽唷。"
10062-400 = "抱歉是個髒亂的地方，\n請進。老師。"
10062-410 = "我和往常一樣\n正在進行裝備的檢查。"
10062-420 = "讓您費心了，\n我感到非常抱歉。"
10062-430 = "是的，為了讓裝備隨時都能\n維持在最佳的狀態。"
10062-440 = "也是為了成為\n配得上C&C之名的，"
10062-450 = "那種女僕。"
10062-460 = "是……這樣嗎。\n我認為這不是什麼\n特別的事。"
10062-470 = "老師您這麼說……\n讓我有點……"
10062-480 = "我決定了。"
10062-490 = "今天的整備，\n要進行得比平時更完美。"
10062-500 = "目標是\n「奇普托斯最強的女僕」、\n「女僕中的女僕」。"
10062-510 = "那麼，老師……"
10062-520 = "還請您在身旁，\n守望著我哦？"
10062-2600 = "您竟然為我如此費心……\n我決定了。今後，\n隨身護衛的一切都交給我負責吧。"

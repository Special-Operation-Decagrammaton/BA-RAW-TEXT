[translation]
10062-10 = "Blue Archive"
10062-20 = "สมาชิกชมรม C&C โรงเรียนวิทย์มิลเลเนียม\nรหัสประจำตัวซีโร่โฟร์ อาซุมะ โทคิค่ะ\nฉันรับรองว่าจะช่วยสนับสนุนอย่างเต็มที่ค่ะ"
10062-30 = "ที่นี่... เป็นสถานที่\nสำหรับอะไรกันคะ"
10062-40 = "คาเฟ่...\nเคยได้ยินมาบ้างค่ะ"
10062-50 = "เครื่องดื่มที่ผสมน้ำตาล\nมีประสิทธิภาพคลายความ\nเหนื่อยล้าได้ดีมากค่ะ"
10062-60 = "ถ้าชาละก็... ฉันเองก็ชงได้\nนะคะ จะว่ายังไงดีล่ะคะ\nพอจะคุ้นเคยอยู่ค่ะ"
10062-70 = "การตกแต่งภายในที่นี่\nดูหรูหราดีนะคะ"
10062-80 = "มาแล้วเหรอคะคุณครู"
10062-90 = "กำลังรออยู่เลยค่ะ\nวันนี้ฉันก็จะคอยสนับสนุนเองค่ะ"
10062-100 = "ขอบคุณที่มานะคะคุณครู"
10062-110 = "ให้ฉันช่วยอะไรดีคะ?"
10062-120 = "เข้าเวร... เหรอคะ?\nในเมื่อรับคำสั่งมาแล้ว\nฉันก็จะปฏิบัติตามค่ะ"
10062-130 = "...ถ้าเสร็จแล้ว ขอรางวัลด้วยนะคะ"
10062-140 = "คุณครูก็ยังคงเป็นคนที่ไม่ค่อย\nออกคำสั่งเหมือนเดิมเลยนะคะ"
10062-150 = "ถ้างั้นฉันจะทำตามที่ต้องการ\nก็คงไม่เป็นไรใช่มั้ยคะ?"
10062-160 = "ฉันต้องการเวลาพัก\nรึเปล่าน่ะเหรอคะ?"
10062-170 = "ต้องขอบคุณคุณครู...\nฉันได้พักเต็มที่แล้วละค่ะ"
10062-180 = "ฉันเลียนแบบกระต่าย\nได้นิดหน่อยค่ะ"
10062-190 = "ดึ๋งๆ"
10062-200 = "รีบๆ ชมฉันสิคะ"
10062-210 = "ออกคำสั่งมาได้ทุกอย่างเลยค่ะ"
10062-220 = "ฉันจะพยายามทำให้เต็มที่\nเพื่อไม่ให้เสียชื่อ C&C ค่ะ"
10062-230 = "สุขสันต์วันเกิดค่ะ\nคุณครู (แปะๆๆ)"
10062-240 = "การฉลองวันเกิด เป็นหน้าที่\nของฉันในฐานะผู้สนับสนุนค่ะ"
10062-250 = "คะ? วันเกิด...?"
10062-260 = "อ่า... ขอบคุณนะคะ\nที่อวยพรให้ฉัน"
10062-270 = "คงไม่ได้คิดจะจบแค่มา\nอวยพรวันเกิดเฉยๆ ใช่มั้ยคะ?"
10062-280 = "ไปกันเถอะค่ะ\nฉันจะคอยสนับสนุนเองค่ะ"
10062-290 = "ปีใหม่แล้วนะคะ"
10062-300 = "ฉันอัปเดตเวอร์ชัน\nเป็นสาวใช้รุ่นใหม่แล้วค่ะ"
10062-310 = "แบบนี้ ฉันก็จะสนับสนุนคุณครู\nได้สมบูรณ์แบบขึ้นอีกขั้นแล้วค่ะ"
10062-320 = "อย่าเอาแต่เงียบสิคะ\nช่วยพยักหน้าเห็นด้วยรัวๆ ด้วยค่ะ"
10062-330 = "ฉันรู้จักคำพูดที่เหมาะสม\nกับช่วงเวลาแบบนี้อยู่นะคะ"
10062-340 = "\"เมอร์รี คริสต์มาส\" สินะคะ"
10062-350 = "ถ้าอย่างนั้น ตอนนี้ฉันจะไปสอย\nศัตรูที่แข็งแกร่งที่คอยคุกคาม"
10062-360 = "ความปลอดภัยคุณครู\nให้ร่วงลงมาจากฟ้าเองค่ะ"
10062-370 = "ฉันเปลี่ยนโหมดเป็นสาวใช้สุดแกร่ง\nเพื่อฉลองวันฮาโลวีนค่ะ"
10062-380 = "ตอนนี้... คงจะเป็นตอนที่\nต้องแตะมือกัน แล้วพูดว่า\n\"ไม่ต่างจากปกติเลยนะ!\" สินะคะ"
10062-400 = "ที่นี่อาจดูซอมซ่อไปสักหน่อย\nแต่ก็ขอต้อนรับค่ะ คุณครู"
10062-410 = "ฉันก็แค่ซ่อมบำรุงอุปกรณ์\nตามที่ทำเป็นประจำเองค่ะ"
10062-420 = "ขอโทษที่ทำให้เป็นห่วงนะคะ"
10062-430 = "ค่ะ ฉันพยายามเตรียมตัว\nให้อยู่ในสถานะที่เตรียมพร้อม\nที่สุดเสมอค่ะ"
10062-440 = "เพื่อให้กลายเป็นสาวใช้..."
10062-450 = "ที่เหมาะสมกับชื่อของ\nชมรม C&C ค่ะ"
10062-460 = "อย่างนั้น... เหรอคะ?\nฉันไม่ได้คิดว่ามันเป็นเรื่อง\nพิเศษอะไรหรอกค่ะ"
10062-470 = "แต่ถ้าคุณครู\nพูดแบบนั้นละก็ มันรู้สึก..."
10062-480 = "ฉันตัดสินใจแล้วค่ะ"
10062-490 = "วันนี้ฉันจะตั้งใจเตรียม\nอุปกรณ์ให้สมบูรณ์แบบ\nกว่าทุกวันเลยค่ะ"
10062-500 = "เป้าหมายคือ\n<สาวใช้สุดแกร่งในคิโวทอส>\n<เมด ออฟ เมด> ค่ะ"
10062-510 = "เพื่อการนั้นแล้ว คุณครู..."
10062-520 = "คอยช่วยอยู่ข้างๆ ฉันหน่อยได้มั้ยคะ?"
10062-2600 = "คุณครูใส่ใจกันแบบนี้...\nฉันตัดสินใจแล้วค่ะ\nจากนี้ไปเรื่องการคุ้มกันคุณครู\nให้เป็นหน้าที่ของฉันได้เลยค่ะ"

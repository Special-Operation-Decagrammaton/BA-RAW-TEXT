[translation]
10062-10 = "Blue Archive"
10062-20 = "Millennium Science School, C&C call sign Zero-Four. Asuma Toki. I promise perfect assistance."
10062-30 = "What's this space for?"
10062-40 = "A cafe... I've heard of it."
10062-50 = "Beverages containing sugar can be very effective for recovering from fatigue."
10062-60 = "At the very least, I can make tea. I'm familiar with that."
10062-70 = "I'll make note of the interior here."
10062-80 = "You're here, Sensei."
10062-90 = "I've been waiting. I'll be assisting you today."
10062-100 = "Thank you for coming, Sensei."
10062-110 = "What can I do for you?"
10062-120 = "Report for duty? At your command."
10062-130 = "...Please give me a reward when I'm done."
10062-140 = "You rarely give orders, Sensei."
10062-150 = "Does that mean I can do as I please?"
10062-160 = "Do I need a break?"
10062-170 = "I've been taking enough breaks, thanks to you."
10062-180 = "I have a little bunny rabbit impression I can do."
10062-190 = "Boing."
10062-200 = "...Please hurry and compliment me."
10062-210 = "Give me an order."
10062-220 = "I'll do my best to honor the name of C&C."
10062-230 = "Happy birthday, Sensei. A round of applause for you."
10062-240 = "It's my job as your assistant to celebrate your birthday."
10062-250 = "Huh? My birthday...?"
10062-260 = "Oh... Thank you for celebrating that."
10062-270 = "You know actions speak louder than words, right?"
10062-280 = "Let's go out. I'll assist you."
10062-290 = "It's the New Year."
10062-300 = "I'm turning over a new leaf. I've upgraded to an updated maid version."
10062-310 = "I'll be able to assist you even more efficiently now."
10062-320 = "Please don't keep quiet. Hurry, respond."
10062-330 = "I know what I'm supposed to say in this situation."
10062-340 = "It's \"Merry Christmas.\""
10062-350 = "Then I shall shoot down the formidable flying enemy..."
10062-360 = "...known as Santa Claus that is threatening your safety."
10062-370 = "To celebrate Halloween, I've activated my most powerful maid mode."
10062-380 = "This is where you say, \"You don't look any different than usual!\""
10062-400 = "There's not much to see, but welcome, Sensei."
10062-410 = "I was checking my equipment, as usual."
10062-420 = "I'm sorry to cause you concern."
10062-430 = "Yes. I always try to maintain peak condition."
10062-440 = "To honor the name of C&C,"
10062-450 = "I want to be a great maid."
10062-460 = "Do you...really think so? It doesn't seem that special to me."
10062-470 = "But hearing you say that makes me think..."
10062-480 = "I'm determined."
10062-490 = "Today's maintenance will be performed even more effectively than usual."
10062-500 = "The goal is to become the best maid in Kivotos. The maid of all maids."
10062-510 = "Well, Sensei..."
10062-520 = "Please watch carefully, all right?"
10062-2600 = "Thanks for caring... I've decided to provide complete personal protection for you from now on. Please leave everything to me."

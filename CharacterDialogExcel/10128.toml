[translation]
10128-10 = "블루 아카이브! 입니다!"
10128-20 = "탁월한 선택이십니다, 고객……아니, 선생님!\n……소개가 늦었습니다. 와일드헌트 예술학원 2학년,\n와카사 후유입니다. 앞으로, 기억해 두세요!"
10128-30 = "뭐야, 제법 좋은\n비즈니스 미팅\n장소가 있었잖아?"
10128-40 = "스크린을 설치한다면,\n어디가 좋을까……."
10128-50 = "(원두가 제법 괜찮은걸?\n이것도 한 번\n수입해 볼까나?)"
10128-60 = "그런데……\n선생님은 안 오시려나."
10128-70 = "(저, 저거 설마\n사감대인가? 어쩌지?\n도망쳐야 하나?!)"
10128-80 = "기다리고 있었습니다, 선생님!"
10128-90 = "앉아보시죠, 선생님.\n저희의 비즈니스에 대해\n이야기를 좀 나눠 보죠."
10128-100 = "흐음, 이것이 내근직의\n업무라는 것인가요……."
10128-110 = "호오? 드디어 특수교역부의\n고문을 맡을 생각이 드셨나요?"
10128-120 = "쾌적한 오피스군요."
10128-130 = "저희 특수교역부의 거점으로……\n쓰면 안 되겠죠?"
10128-140 = "편안하네요……"
10128-150 = "여기서만큼은 좀 풀어져도……"
10128-160 = "흐아암……. "
10128-170 = "저기, 그렇게 자꾸 찌르시면……"
10128-180 = "……옆에 딱 붙어 앉을 거예요?"
10128-190 = "해피 버스데이, 선생님!"
10128-200 = "그, 축하 영상을 찍어 왔는데,"
10128-210 = "보, 볼래요……?"
10128-220 = "생일 선물……\n제가 갖고 싶은\n물건, 인가요……."
10128-230 = "물건은 필요 없으니까……\n하루 동안,"
10128-240 = "선생님의 시간을\n받을 수 있을까요?"
10128-250 = "새해 복 많이 받으세요, 선생님."
10128-260 = "이거요? 제야의 종\n타종 영상 녹화본입니다."
10128-270 = "어때요? 이런 것도\n과연 예술이 될 수 있을까요?"
10128-280 = "……우리, 천천히 이야기를\n나눠 보지 않을래요?"
10128-290 = "마침 산타복 한 벌\n구해둔 게 있는데……"
10128-300 = "호, 혹시 궁금하신가요……?"
10128-310 = "조금만 기다리세요, 선생님. "
10128-320 = "마침 맛 좋은\n호박 하나를 입수했거든요!"
10128-340 = "이곳은 스크린의 뒤편이에요."
10128-350 = "즉, 작품의 뒷면……."
10128-360 = "작가만이\n드나들 수 있는 공간이죠."
10128-370 = "이곳에 들어올\n유일한 방법은…… 작가인 저의\n허락을 받는 것뿐이죠. "
10128-380 = "그러니까, 여기는 지금……"
10128-390 = "선생님과 저,\n단둘만 있……는……."
10128-400 = "그 아니아니아니!\n그, 그게 아니라……!"
10128-410 = "아무튼! 도시락을\n만들어 왔는데요……."
10128-420 = "그게, 혹시,\n괜찮으시다면……."
10128-430 = "……도시락, 먹고 갈래요?"
10128-2600 = "이건 언젠가 반드시 갚겠습니다……!\n그것이 비즈니스니까요!\n그러니까…… 그때까지, 곁에 있어 주세요."

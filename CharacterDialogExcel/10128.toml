[translation]
10128-10 = "是蔚藍檔案唷～！"
10128-20 = "哦呀……眼光真好呢，客人……不，老師！\n……自我介紹晚了。我是狂獵藝術學院二年級，\n若狹冬。往後請多指教！"
10128-30 = "嘿～感覺很適合\n當成會面的場所呢。"
10128-40 = "要設置螢幕的話，\n該選哪裡好呢……"
10128-50 = "（這裡的咖啡，用了\n不錯的豆子呢……\n這也要進貨看看嗎？）"
10128-60 = "話說……\n老師不會來嗎。"
10128-70 = "（那是……舍監隊！？\n怎麼辦……要逃嗎！？）"
10128-80 = "恭候多時囉，老師！"
10128-90 = "來，請坐。\n開始談生意的事吧。"
10128-100 = "嗯……這就是\n內勤的工作嗎……"
10128-110 = "怎麼樣？\n特殊交易部顧問的位子，\n隨時為你保留喔？"
10128-120 = "這裡很舒適……沒錯。\n是個很棒的辦公室。"
10128-130 = "……當成\n我們的據點……\n應該不行對吧？"
10128-140 = "真讓人放鬆呢……"
10128-150 = "稍微放鬆一下肩膀\n也沒關係吧……"
10128-160 = "呼啊～"
10128-170 = "真是的……\n再這樣戳下去的話……\n我就把縫隙填滿囉？"
10128-180 = "如果緊緊貼在一起，\n就不能惡作劇了吧？"
10128-190 = "生日快樂！老師！"
10128-200 = "我把慶祝的影片\n做好帶來了……"
10128-210 = "要，要一起看嗎……？"
10128-220 = "生日禮物……\n我想要的東西，是嗎……"
10128-230 = "我不需要東西……#n所以一天就好……"
10128-240 = "能把老師的時間給我嗎？"
10128-250 = "新年快樂，老師。"
10128-260 = "……什麼？\n啊啊，這個是嗎？\n是昨天的錄影資料。"
10128-270 = "電視上播的除夜鐘聲。\n總共108次。"
10128-280 = "那麼……該怎麼\n把這個變成藝術呢。"
10128-290 = "我剛好有進貨時拿到的\n聖誕服裝……"
10128-300 = "你，你有興趣嗎……？"
10128-310 = "請稍等一下，老師。"
10128-320 = "我剛好拿到了\n新鮮的南瓜！"
10128-340 = "這裡，是螢幕的另一邊。"
10128-350 = "也就是舞台後方……"
10128-360 = "只有作家才能\n進出的空間。"
10128-370 = "進入這裡唯一的方法……\n就是向身為作家的我取得許可。"
10128-380 = "所以，現在這裡──"
10128-390 = "就是老師和我，\n兩人……獨處的……"
10128-400 = "等等！不對不對不對！\n我，我不是那個意思！"
10128-410 = "總之！我帶了\n做好的便當過來……"
10128-420 = "那個，如果，\n不介意的話……"
10128-430 = "……要一起吃嗎？"
10128-2600 = "獲得多少投資就要給出更高的回報。\n這就是商業！所以……\n在能回報的時刻到來之前，\n請待在我身邊吧，老師。"

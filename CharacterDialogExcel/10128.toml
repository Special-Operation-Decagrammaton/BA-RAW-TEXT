[translation]
10128-10 = "Blue Archive! ค่ะ!"
10128-20 = "เป็นตัวเลือกที่ยอดเยี่ยมเลยค่ะ คุณลูกค้า... ไม่สิ คุณครู!\nลืมแนะนำตัวไปเลย... ฉันวากาสะ ฟุยุ ชั้นปีที่ 2\nจากสถาบันศิลปะไวลด์ฮันต์ค่ะ ช่วยจำฉันไว้ด้วยนะคะ!"
10128-30 = "อะไรกัน นี่เป็นสถานที่\nที่เหมาะกับการคุยธุรกิจเลยนี่?"
10128-40 = "ถ้าจะติดตั้งจอโปรเจคเตอร์\nจะติดตรงไหนดีนะ..."
10128-50 = "(เมล็ดกาแฟรสชาติใช้ได้เลย\nลองนำเข้าดูดีมั้ยนะ?)"
10128-60 = "ว่าแต่... คุณครูไม่มาเหรอ?"
10128-70 = "(ตะ... ตรงโน้นคือ\nฝ่ายดูแลหอพักหรือเปล่า?\nทำไงดีล่ะ? ต้องหนีมั้ยเนี่ย?!)"
10128-80 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!"
10128-90 = "นั่งก่อนสิคะ คุณครู\nมาคุยเกี่ยวกับธุรกิจ\nของเรากันดีกว่าค่ะ"
10128-100 = "ฮืม นี่คือสิ่งที่เรียกว่า\nงานสำนักงานเหรอคะ..."
10128-110 = "ในที่สุดก็คิดจะเป็นที่ปรึกษา\nให้ชมรมการค้าพิเศษแล้วเหรอคะ?"
10128-120 = "เป็นออฟฟิศที่ปลอดโปร่งจังเลยค่ะ"
10128-130 = "ขอใช้เป็นฐานของ...\nชมรมการค้าพิเศษได้มั้ยคะ?"
10128-140 = "สบายจังเลยค่ะ..."
10128-150 = "ขอผ่อนคลายที่นี่หน่อยเถอะ..."
10128-160 = "ฮ้าวว... "
10128-170 = "นี่ ถ้าเอาแต่สะกิดกันอย่างนั้น..."
10128-180 = "ฉันจะไปนั่งเกาะข้างๆ เลยนะคะ"
10128-190 = "แฮปปี้เบิร์ธเดย์นะ คุณครู!"
10128-200 = "เอ่อ ฉันถ่ายวิดีโออวยพรมาให้"
10128-210 = "ยะ... อยากดูมั้ยคะ...?"
10128-220 = "ของขวัญวันเกิด...\nหมายถึงสิ่งที่\nฉันอยากได้เหรอคะ..."
10128-230 = "ฉันไม่อยากได้สิ่งของหรอก.....\nแต่ขอเป็น..."
10128-240 = "เวลาจากคุณครู\nทั้งวันเลยได้มั้ยคะ?"
10128-250 = "สวัสดีปีใหม่นะคะ คุณครู"
10128-260 = "นี่น่ะเหรอคะ? วิดีโอ\nตีระฆังส่งท้ายปีเก่าค่ะ"
10128-270 = "เป็นยังไงคะ? ของแบบนี้\nก็พอเป็นงานศิลปะได้มั้ยคะ?"
10128-280 = "เรามาค่อยๆ...\nคุยกันดีมั้ยคะ?"
10128-290 = "ฉันหาชุดซานต้า\nไว้ได้ชุดหนึ่งพอดี..."
10128-300 = "ยะ... อยากเห็นมั้ยคะ...?"
10128-310 = "ช่วยรอสักครู่นะคะ คุณครู "
10128-320 = "ฉันหาฟักทองรสชาติดี\nมาได้ลูกหนึ่งพอดีเลยค่ะ!"
10128-340 = "ที่นี่คือด้านหลังจอโปรเจคเตอร์ค่ะ"
10128-350 = "หรือก็คือด้านหลังของผลงาน..."
10128-360 = "เป็นที่ที่เจ้าของผลงานเท่านั้น\nที่เข้ามาได้ค่ะ"
10128-370 = "วิธีเดียวที่จะเข้ามาที่นี่ได้...\nก็คือการได้รับอนุญาต\nจากฉันที่เป็นเจ้าของผลงานค่ะ "
10128-380 = "เพราะงั้นตอนนี้ ที่นี่..."
10128-390 = "มีแค่คุณครูกับฉัน\nสองคน... เท่านั้น..."
10128-400 = "ไม่สิ ไม่ๆๆ!\nมะ... ไม่ใช่อย่างนั้น...!"
10128-410 = "เอาเป็นว่า! ฉันทำข้าวกล่อง\nมาด้วยค่ะ..."
10128-420 = "เอ่อ คือว่า\nถ้าไม่ว่าอะไร...."
10128-430 = "กินข้าวกล่องก่อนไปมั้ยคะ?"
10128-2600 = "ไว้สักวันหนึ่งฉันจะมาตอบแทนค่ะ...!\nก็นี่เป็นธุรกิจนี่คะ!\nเพราะงั้นก็... ช่วยอยู่ข้างกัน\nจนถึงตอนนั้นด้วยนะคะ"

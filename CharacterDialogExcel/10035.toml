[translation]
10035-10 = "블루……아카이브……"
10035-20 = "으, 으어어……!?\n아…… 선생님, 이셨군요……\n누군가 싶어 깜짝 놀랐습니다……"
10035-30 = "여, 여기는……\n대체……?"
10035-40 = "시, 시선이\n느껴져……\n으으으……"
10035-50 = "바, 밖에 있는\n것보단 나을지도\n모르지만……"
10035-60 = "으, 으음……\n저, 저건……?"
10035-70 = "가, 가능한 한\n말 걸지 말아줬으면…\n아, 서, 선생님은\n예외예요……"
10035-80 = "수, 수고하셨습니다,\n선생님…… 실은 그게,\n선생님께 추천하고픈\n아이들이, 있어서……"
10035-90 = "……으에에!? 서, 선생님?\n어라, 어, 언제부터\n거기에 계셨어요……?"
10035-100 = "따, 딱히 아무 것도\n안 했는데요……!?"
10035-110 = "진짜 그냥 책만\n보고 있었는데요……!?"
10035-120 = "보통은 늘 있던 고서관이\n아니면 안절부절못하는데……"
10035-130 = "여긴 뭐랄까, 좀……\n선생님이 계셔서\n느낌이 다른 걸까요……?"
10035-140 = "아, 그…… 그……\n아, 아뇨……\n아무 것도 아닙니다……"
10035-150 = "선생님은\n늘 바빠 보이시네요……"
10035-160 = "저, 저라도 뭔가\n도와드릴 게 있을까요?"
10035-170 = "마, 만약 있으시다면\n꼭……!"
10035-180 = "이곳에도, 책이 가득해……"
10035-190 = "……아. 보면 안 되는\n것도 있나요?\n죄, 죄송합니다……!"
10035-200 = "새, 생신 축하드립니다,\n선생님……!"
10035-210 = "오늘 하루는 쉬시면서……\n같이 책이라도 보실래요……?"
10035-220 = "오, 오늘은 일단……\n제 생일, 이라서……"
10035-230 = "그, 만약 괜찮으시다면,\n그……"
10035-240 = "여, 옆에 앉아도……\n괜찮을까요……?"
10035-250 = "올해의 저는……\n뭔가 달라질 수 있을까요?"
10035-260 = "선생님과 함께라면……\n기대해도 될 지도……"
10035-270 = "으으……\n시끄러운 날이에요……"
10035-280 = "소란스러운 건\n싫습니다만……"
10035-290 = "아, 그래도…… 이런 날에\n따듯한 벽난로 앞 독서는,\n꽤 좋아한답니다……"
10035-300 = "경비, 경비 시스템을\n강화해야 해요!"
10035-310 = "오늘은 무례한 바깥 놈들이\n많이 찾아오는 날!"
10035-320 = "사탕이니 뭐니 억지로\n들이닥친다니까요……!"
10035-330 = "정말……!"
10035-350 = "가, 감사합니다. 선생님.\n그…… 챙겨 주셔서……"
10035-360 = "……이거, 말인가요?\n저기, 해독 작업 중이었어요."
10035-370 = "이 고서관에는……\n옛날 말로 쓰여진 책이,\n많이 있어요."
10035-380 = "이 아이들도, 누군가에게\n전하고 싶은 것들을 품은 채,\n기다리고 있었을 텐데……"
10035-390 = "달리 할 사람도 없고요……\n그래서, 제가……"
10035-400 = "……죄송해요.\n재미없는 이야기……였죠?"
10035-410 = "……!! 어, 그게, 그……\n그, 그렇게까지 칭찬해\n주시면 그……"
10035-420 = "무슨 말씀을 드려야 좋을지……\n말이, 잘 떠오르지 않네요……\n흐……"
10035-2600 = "소, 솔직히 말씀드리면 아직 잘……\n모르겠어요, 어째서 이런 저에게\n이렇게까지…… 그 , 그래도……\n이렇게까지 해 주신 이상,\n네! 여, 열심히 하겠습니다……!"

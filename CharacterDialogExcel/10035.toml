[translation]
10035-10 = "Blue...Archive."
10035-20 = "Wh-What?! Oh... It's you, Sensei. I thought you were an outsider."
10035-30 = "Wh-What is this place?"
10035-40 = "I-I can feel someone looking at me... Ugh..."
10035-50 = "It's better than being outside, though."
10035-60 = "Huh? What's that...?"
10035-70 = "P-Please don't talk to me...unless you're Sensei."
10035-80 = "Th-Thank you for your hard work, Sensei... Well, frankly, there are some children I'd like to recommend to you..."
10035-90 = "Oh, S-Sensei? When did you get here?"
10035-100 = "N-No, I wasn't up to anything in particular."
10035-110 = "I was just reading a book!"
10035-120 = "I usually feel anxious unless I'm in the old library."
10035-130 = "This place is somehow different. Maybe it's your presence."
10035-140 = "Oh, um... No. It's nothing..."
10035-150 = "You always seem busy, Sensei."
10035-160 = "I-Is there anything I can do to help?"
10035-170 = "I-If there's something I can do, please let me know!"
10035-180 = "There are lots of books here too..."
10035-190 = "Ah, some of them are forbidden? I-I'm sorry."
10035-200 = "H-Happy birthday, Sensei!"
10035-210 = "How about taking a day off? Maybe we can read together. If you'd like..."
10035-220 = "T-Today is my birthday, Sensei."
10035-230 = "If it's okay..."
10035-240 = "...could I...sit next to you?"
10035-250 = "Do you think I can change for the better this year?"
10035-260 = "Maybe I could...with your help."
10035-270 = "Ugh. What a noisy day."
10035-280 = "I don't like loud noises..."
10035-290 = "I like to read in front of a heater on a day like this."
10035-300 = "The security system must be enhanced!"
10035-310 = "Today, a lot of rude people from the outside will show up!"
10035-320 = "They'll barge in making a fuss about candy or whatever..."
10035-330 = "Seriously!"
10035-350 = "Th-Thank you, Sensei. I, um...appreciate it."
10035-360 = "Oh, this? I was in the middle of deciphering these texts."
10035-370 = "This old library... It's home to several books written in ancient languages."
10035-380 = "Each of these precious children have stories to tell. They've been waiting to share them with the world."
10035-390 = "So I want to help them tell their stories."
10035-400 = "Sorry. You must find this to be droll, right?"
10035-410 = "...! U-Um, I...guess. I-I'm not used to compliments..."
10035-420 = "I don't know what to say... The words completely escape me... Heh."
10035-2600 = "I-I honestly don't get why you would care about someone like me. But I-I'll...try my best. I swear it."

[translation]
10035-10 = "Blue... Archive..."
10035-20 = "อะ... เอ๋...!?\nอ๊ะ... คุณครูมาแล้วเหรอคะ...\nฉันตกใจเพราะนึกว่าคนอื่นค่ะ..."
10035-30 = "ทะ...ที่นี่มัน...\nอะ...อะไรกัน...?"
10035-40 = "สะ...สายตา...\nรู้สึกถึงสายตาแปลกๆ...\nเต็มไปหมด ฮือออ...!"
10035-50 = "อาจจะดีกว่า\nอยู่ข้างนอกก็ได้..."
10035-60 = "อะ...อืม...\nนะ...นั่นมัน...?"
10035-70 = "ถะ...ถ้าเป็นไปได้\nอย่ามาคุยกับฉันเลยค่ะ...\nตะ...แต่ว่าคุณครูน่ะ...\nเป็นข้อยกเว้นค่ะ"
10035-80 = "นะ...เหนื่อยหน่อยนะคะ\nคุณครู... ที่จริงแล้ว...\nฉันอยากแนะนำเด็กคนหนึ่ง\nให้คุณครูค่ะ..."
10035-90 = "เอ๋...?! คะ...คุณครู?\nเอ๋? มาอยู่ตรงนั้น\nตั้งแต่เมื่อไรกันคะ...?"
10035-100 = "ฉันไม่ได้ทำอะไร\nสักหน่อยนะคะ...!?"
10035-110 = "ฉันแค่อ่านหนังสือ\nอยู่เฉยๆ เองนะคะ...!?"
10035-120 = "ปกติถ้าไม่ใช่ที่ห้องสมุดเก่า\nก็จะค่อนข้างกังวลน่ะ..."
10035-130 = "แต่ที่นี่มันต่างออกไป...\nอาจเป็นเพราะมีคุณครู\nอยู่ด้วยรึเปล่านะ...?"
10035-140 = "เอ่อ... คะ...คือว่า...\nมะ...ไม่ใช่ค่ะ\nไม่มีอะไรค่ะ..."
10035-150 = "คุณครู...\nดูยุ่งอยู่ตลอดเลยนะคะ..."
10035-160 = "มีอะไรที่ฉันช่วยได้รึเปล่าคะ?"
10035-170 = "ถ้ามีอะไรให้ช่วย\nก็บอกได้นะคะ…!"
10035-180 = "ที่นี่มีหนังสือให้อ่านเยอะมาก…"
10035-190 = "อา... หรือว่ามีอะไร\nที่ฉันไม่ควรเห็นเหรอคะ?\nขะ... ขอโทษค่ะ…!"
10035-200 = "สะ...สุขสันต์วันเกิดค่ะ\nคุณครู...!"
10035-210 = "วันนี้หยุดพักหนึ่งวัน..\nแล้วมาอ่านหนังสือกับฉันดีมั้ยคะ...?"
10035-220 = "คะ...คือว่าวันนี้\nเป็นวันเกิดของฉันค่ะ..."
10035-230 = "คะ...คือถ้าคุณครูไม่ว่าอะไร...\nคือว่า..."
10035-240 = "มานั่งด้วยกัน...\nได้มั้ยคะ?"
10035-250 = "ปีใหม่ของฉัน...\nจะมีอะไรเปลี่ยนไปรึเปล่าคะ?"
10035-260 = "ถ้าได้อยู่กับคุณครู...\nอาจจะเปลี่ยนไปก็ได้..."
10035-270 = "ฮือออ...\nวันนี้ครึกครื้นดีนะคะ..."
10035-280 = "แต่ฉันไม่ชอบ\nเรื่องน่าหนวกหูแบบนี้เท่าไร..."
10035-290 = "วันแบบนี้การได้อ่านหนังสือ\nอยู่หน้าฮีตเตอร์อุ่นๆ แบบนี้\nฉันชอบมากเลยค่ะ..."
10035-300 = "ต้องปรับปรุง\nระบบความปลอดภัยให้ดีขึ้นค่ะ!"
10035-310 = "วันนี้เป็นวันที่พวกเด็กจอมป่วน\nมาที่นี่กันเยอะๆ!"
10035-320 = "แล้วก็บังคับเอาลูกกวาด\nหรือขนมอื่นๆ มาให้ค่ะ!"
10035-330 = "จริงๆ เลย...!"
10035-350 = "ขะ...ขอบคุณมากค่ะ คุณครู\nขอบคุณ... ที่ดูแลฉัน..."
10035-360 = "อันนี้... ที่ฉันทำอยู่น่ะเหรอคะ?\nกำลังถอดความหนังสืออยู่น่ะค่ะ"
10035-370 = "ที่ห้องสมุดเก่านี่...\nมีหนังสือโบราณที่อ่านยาก\nอยู่ค่อนข้างเยอะเลยค่ะ"
10035-380 = "เด็กๆ พวกนี้\nก็คงจะอยากบอกสิ่งที่ตัวเองมี\nให้ใครบางคนได้รับรู้แน่ๆ ค่ะ"
10035-390 = "แต่ก็ไม่มีใครแวะมาอ่านเลยค่ะ...\nเพราะงั้นแล้วฉันก็เลย..."
10035-400 = "ขอโทษนะคะ...\nมันไม่สนุกเลย...ใช่มั้ยคะ?"
10035-410 = "...!! เอ่อ... คือว่า... คือ...\nถะ...ถ้ามาชมกันแบบนี้ละก็\nคือว่า..."
10035-420 = "ฉันไม่รู้ว่าต้องตอบยังไง...\nคิดคำพูดไม่ออกเลยค่ะ... ฮือ..."
10035-2600 = "ที่จริง... ฉันก็ยังไม่เข้าใจเลยค่ะ\nทำไมคุณครูถึงใส่ใจฉันแบบนี้\nทำไมต้องคอยดูแลคนอย่างฉัน\nตะ...แต่ว่าฉันจะตั้งใจทำให้ดีที่สุดค่ะ…!"

[translation]
10035-10 = "蔚藍……檔案"
10035-20 = "唔啊啊……！？\n啊，是，老師啊……\n還以為是誰，嚇了一跳……"
10035-30 = "這，這裡……\n到底是……？"
10035-40 = "感，感覺到視線……\n唔……"
10035-50 = "比，比起在外面，\n還要好也說不定……"
10035-60 = "這個……\n那，那個是……？"
10035-70 = "可，可以盡可能的\n不要和我搭話的話……\n啊，老，老師是例外……"
10035-80 = "辛，辛苦了，老師……\n其實那個，我有個想\n推薦給老師的孩子……"
10035-90 = "……咦啊！？老，老師……！？\n啊咧，從，從什麼時候\n在那裡的……？"
10035-100 = "沒，沒做什麼\n奇怪的事唷……！？"
10035-110 = "只，只是真的\n在看書而已……！"
10035-120 = "雖然平常在古書館以外的\n地方的話，會靜不下心來……"
10035-130 = "不過這裡總覺得，還蠻……\n是因為有老師在的，\n關係嗎……？"
10035-140 = "啊，那，那個……\n不，不是……\n什麼都，沒有……"
10035-150 = "老師，\n似乎總是很忙呢……"
10035-160 = "我，我有什麼，\n可以幫上忙的地方嗎？"
10035-170 = "如，如果有的話，\n務必……！"
10035-180 = "這裡也有，很多書……"
10035-190 = "……咦，也有不要看\n會比較好的東西嗎？\n不，不好意思……！"
10035-200 = "祝，祝你生日快樂，\n老師……！"
10035-210 = "今天休息一天……\n可以的話要一起，\n看書嗎……？"
10035-220 = "今，今天姑且是，\n我的生日，所以……"
10035-230 = "如，如果可以的話，\n那個……"
10035-240 = "坐，坐在……\n老師旁邊，可以嗎……？"
10035-250 = "新的一年……\n我能，做到\n改變自己嗎……？"
10035-260 = "如果是和老師一起，\n說不定……"
10035-270 = "唔……\n真，真是吵鬧的日子呢……"
10035-280 = "吵鬧的環境，\n我並不喜歡……"
10035-290 = "啊，不過……這種日子，\n在溫暖的暖爐前看書，\n我還蠻喜歡的……"
10035-300 = "警，警備系統\n必須強化才行……！"
10035-310 = "今天是，得意忘形的無禮之徒\n會大量前來的日子……！"
10035-320 = "會說糖果還是怎樣的，\n硬是擠過來……！"
10035-330 = "啊啊真是……！"
10035-350 = "謝，謝謝你，老師……\n那個，幫大忙了……"
10035-360 = "……這個，是嗎？\n那個，我正在進行解讀作業。"
10035-370 = "這個古書館裡……用過去的\n語言所寫成的書，有很多。"
10035-380 = "這些孩子們也是\n帶著想要傳達的事情，\n就這麼一直，\n在這裡等著才對……"
10035-390 = "因為也沒有其他人能做……\n所以就由我來……"
10035-400 = "……對不起，這些話\n一點也不有趣……對吧？"
10035-410 = "……！啊，呃，那個……\n被這麼誇獎的話，那個……"
10035-420 = "該怎麼回答才好呢……\n想說的話，突然\n想不到了呢……嘿嘿……"
10035-2600 = "老，老實說，\n我還不是很清楚……為什麼對這樣的我，\n做這麼多事……不，不過……\n既然被如此善待……\n是……！我，我會試著努力的……！"

[translation]
23007-10 = "Blue Archive."
23007-20 = "I'm Urawa Hanako. I look forward to working with you, in all kinds of ways."
23007-30 = "What a cute, cozy place!"
23007-40 = "Did you do the interior design, Sensei? It's adorable!"
23007-50 = "Maybe I should casually just leave something behind..."
23007-60 = "Or, hm... Maybe I should play a prank..."
23007-70 = "Heehee. This is so much fun!"
23007-80 = "You're here, Sensei! I look forward to working with you today."
23007-90 = "Heehee. I've been waiting, Sensei."
23007-100 = "Heehee, I guess it's kind of fun to be on duty like this."
23007-110 = "I think it's just the two of us here..."
23007-120 = "Maybe I'm kind of excited?"
23007-130 = "Huh? What do I mean?"
23007-140 = "I'm not sure... What DO I mean?"
23007-150 = "Do you need me to do anything, Sensei?"
23007-160 = "Heehee. I just wanted to see that expression of yours, Sensei."
23007-170 = "Happy birthday, Sensei."
23007-180 = "Is there a particular gift you've been wanting? If not..."
23007-190 = "...I could always be your gift."
23007-200 = "Um... A birthday gift..."
23007-210 = "Oh, you're the gift, Sensei? Heehee. Just what I wanted!"
23007-220 = "When can I unwrap it?"
23007-230 = "I look forward to working with you this year, Sensei."
23007-240 = "I'm sure I'll make lots of mistakes, but please don't leave me, okay?"
23007-250 = "A holy night. I'm so excited..."
23007-260 = "Huh? I was just talking to myself. Please pay it no mind."
23007-270 = "It's Halloween. It's the day everyone shows a little more skin..."
23007-280 = "Huh? That's not what it is?"
23007-300 = "Welcome, Sensei."
23007-310 = "Thanks for coming."
23007-320 = "It's nice and cool here. I love it."
23007-330 = "This is my super special place... Heehee..."
23007-340 = "What do you think, Sensei?"
23007-350 = "Shall we undress here?"
23007-360 = "Heehee... When you get undressed in broad daylight like this..."
23007-370 = "...doesn't it make you a little excited?"
23007-380 = "It feels like you're doing something you shouldn't be."
23007-2600 = "You are so silly, Sensei. Do you really want to see everything from me? Heehee! I'm talking about my skill. What were you thinking?"

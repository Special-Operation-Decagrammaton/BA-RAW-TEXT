[translation]
23007-10 = "블루 아카이브."
23007-20 = "우라와 하나코입니다.\n앞으로 여러가지 잘 부탁드립니다.\n……네. '여러가지'로."
23007-30 = "어머나,\n귀여운 곳이네요~."
23007-40 = "이 인테리어는\n선생님께서?\n멋지네요."
23007-50 = "여기다가 두고 가면,\n누군가 놀라려나요……?"
23007-60 = "후훗,\n장난이라도 좀 쳐볼까요?"
23007-70 = "이 공간,\n보는 것만으로도 즐겁네요."
23007-80 = "오셨나요, 선생님?\n오늘도 잘부탁드립니다."
23007-90 = "후훗.\n기다리고 있었습니다. 선생님."
23007-100 = "후훗.\n여기서 '당번' 하는 것도,\n굉장히 재미있네요?"
23007-110 = "지금 여기는\n저희 둘뿐인 것 같고……"
23007-120 = "이건 기대해도 되는 걸까요?"
23007-130 = "무슨 의미……냐고요?"
23007-140 = "그건 이제, 선생님이\n생각하신 쪽으로……"
23007-150 = "선생님, 제가\n해줬으면 하는 게 있으신가요?"
23007-160 = "후훗.\n선생님의 그 표정이\n보고싶었어요."
23007-170 = "생일 축하드립니다, 선생님."
23007-180 = "받고 싶은 선물이\n따로 있으신가요?\n없으시다면……"
23007-190 = "그건' 어떠세요?"
23007-200 = "생일선물이라…"
23007-210 = "아, 선생님이 선물이라니,\n멋지네요."
23007-220 = "포장은 제가\n풀어봐도 될까요?"
23007-230 = "이번 해에도 여러모로\n잘 부탁드립니다. 선생님."
23007-240 = "곤란하게 만들 일이\n많겠지만, 절 버리진\n말아주세요?"
23007-250 = "거룩한 밤……\n아아, 무척 기대되네요……"
23007-260 = "……아.\n혼잣말이었어요.\n신경 쓰지 마세요."
23007-270 = "할로윈이라고 하면,\n자연스럽게 대담한\n노출을 할 수 있는 날……"
23007-280 = "……네?\n오해라고요?"
23007-300 = "어서 오세요. 선생님."
23007-310 = "와 주셔서 감사해요."
23007-320 = "여기 있으면 시원해서\n굉장히 기분 좋거든요."
23007-330 = "저만을 위한\n특등석이랄까… 후훗…"
23007-340 = "모처럼이니\n선생님도 어떠신가요?"
23007-350 = "여기서 같이 벗어 보실까요?"
23007-360 = "우후후.\n이렇게 대낮부터 벗고 있다는 게,"
23007-370 = "어쩐지 신나는 기분이\n들지 않나요?"
23007-380 = "하면 안되는 짓을 한다.\n그런 느낌이 들어서."
23007-2600 = "……선생님은 곤란한 분이시네요.\n그렇게 제 '모든 것'이 보고 싶으신가요?\n후훗……\n실력의 이야기에요. 무슨 생각 하셨나요?"

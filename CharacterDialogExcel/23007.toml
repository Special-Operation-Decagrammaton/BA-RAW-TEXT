[translation]
23007-10 = "Blue Archive"
23007-20 = "ฉันอุราวะ ฮานาโกะค่ะ\nจากนี้ก็ขอฝากตัวในหลายๆ เรื่องด้วยนะคะ\nใช่แล้วค่ะ \"หลายๆ เรื่อง\" เลยค่ะ"
23007-30 = "ตายจริง\nที่นี่ดูน่ารักดีนะคะ~"
23007-40 = "คุณครู\nตกแต่งที่นี่เองเหรอ?\nสุดยอดเลยนะคะ"
23007-50 = "ถ้าหนีไปจากที่นี่ตอนนี้เลย\nจะทำให้ใครตกใจมั้ยนะ...?"
23007-60 = "ฮุฮุ แกล้งหยอกเล่น\nสักหน่อยดีมั้ยคะ?"
23007-70 = "แค่ได้มองดูที่นี่\nก็สนุกแล้วละค่ะ"
23007-80 = "มาแล้วเหรอคะคุณครู?\nวันนี้ก็ฝากตัวด้วยนะคะ"
23007-90 = "ฮิฮิ ฉันกำลังรออยู่เลยค่ะ"
23007-100 = "ฮุฮุ การมา 'เข้าเวร' แบบนี้\nฉันว่ามันก็สนุกดีนะคะ"
23007-110 = "ตอนนี้ที่นี่...\nมีแค่เราเพียงสองคนเท่านั้น"
23007-120 = "แบบนี้ฉันแอบคาดหวังได้หรือเปล่าคะ?"
23007-130 = "หมายความว่า... ยังไงน่ะเหรอคะ?"
23007-140 = "เรื่องนั้นคราวนี้...\nอาจเหมือนกับที่คุณครูคิด..."
23007-150 = "คุณครูคะ มีอะไรให้ฉันช่วยหรือเปล่าคะ"
23007-160 = "ฮิฮิ ฉันอยากเห็นสีหน้าแบบนั้น\nของคุณครูอีกครั้งน่ะค่ะ"
23007-170 = "สุขสันต์วันเกิดค่ะคุณครู"
23007-180 = "มีของขวัญที่อยากได้รึเปล่าคะ?\nถ้าไม่มีละก็..."
23007-190 = "เอาเป็น \"อันนั้น\" มั้ยคะ?"
23007-200 = "ของขวัญวันเกิด..."
23007-210 = "คุณครูคือของขวัญของฉันเหรอคะ?\nสุดยอดเลยค่ะ"
23007-220 = "ฉันขอแกะของขวัญได้มั้ยคะ?"
23007-230 = "ในปีนี้ ฉันก็ขอ...\nฝากตัวด้วยนะคะ คุณครู"
23007-240 = "ถึงฉันจะทำให้คุณครู\nลำบากหลายๆ เรื่อง\nแต่ก็ห้ามทิ้งฉันเด็ดขาดนะคะ"
23007-250 = "คืนวันคริสต์มาส...\nอา... ฉันตั้งตารอแล้วค่ะ"
23007-260 = "อา...\nฉันพูดคนเดียวน่ะ\nไม่ต้องใส่ใจหรอกค่ะ"
23007-270 = "ถ้าเป็นวันฮาโลวีนล่ะก็\nเป็นวันที่ฉันจะได้...\nใส่ชุดที่ดูล่อแหลมนิดๆ ได้..."
23007-280 = "คะ...?\nเข้าใจผิดเหรอคะ?"
23007-300 = "สวัสดีค่ะ คุณครู"
23007-310 = "ขอบคุณที่มานะคะ"
23007-320 = "ที่นี่อากาศเย็นสบาย\nฉันก็เลยชอบมากเลยค่ะ"
23007-330 = "ที่นี่เป็นที่พิเศษ\nของฉันคนเดียวค่ะ ฮิฮิ"
23007-340 = "ที่นี่ยอดเยี่ยมมาก\nคุณครูคิดว่าเป็นยังไงคะ?"
23007-350 = "มาลองถอดด้วยกันมั้ยคะ?"
23007-360 = "ฮิฮิฮิ ถ้าให้ถอดของพวกนี้ออก\nตอนกลางวันแสกๆ แบบนี้ละก็..."
23007-370 = "มันก็ดูน่าตื่นเต้นดีไม่ใช่เหรอคะ?"
23007-380 = "รู้สึกเหมือนกำลัง...\nทำเรื่องต้องห้ามอยู่เลย"
23007-2600 = "คุณครูนี่รับมือยากจริงๆ นะคะ...\nอยากเห็น \"ทุกๆ อย่าง\" ของฉันเหรอคะ?\nฮิฮิ.. พูดถึงทักษะของฉันต่างหากค่ะ\nคิดอะไรเหรอคะ"

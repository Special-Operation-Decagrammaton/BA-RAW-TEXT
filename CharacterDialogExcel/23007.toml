[translation]
23007-10 = "蔚藍檔案。"
23007-20 = "我是浦和花子。以後各方面就拜託你了。……是的，就是「各方面」。"
23007-30 = "哎呀，\n是個可愛的地方呢～"
23007-40 = "這個裝潢\n是老師設計的？\n真棒。"
23007-50 = "放在這裡的話，\n會有人嚇一跳嗎……？"
23007-60 = "嘿嘿，\n要開個小玩笑嗎？"
23007-70 = "這個空間，\n光用看的就很開心。"
23007-80 = "老師，你來了嗎？\n今天也要拜託你了。"
23007-90 = "呼呼，\n我正在等你呢。老師，"
23007-100 = "嘿嘿。\n在這裡當「值日生」\n也非常有趣呢！"
23007-110 = "現在在這裡的\n只有我們兩個人……"
23007-120 = "這樣可以期待一下嗎？"
23007-130 = "什麼意思……是嗎？"
23007-140 = "那當然，是老師\n期望的那個意思。"
23007-150 = "老師，你有\n希望我幫忙的事嗎？"
23007-160 = "呵呵，\n我想看看老師的\n那個表情。"
23007-170 = "老師，祝你生日快樂。"
23007-180 = "你想收到\n什麼禮物呢？\n沒有的話……"
23007-190 = "「那個」怎麼樣？"
23007-200 = "生日禮物，是嗎……"
23007-210 = "啊，老師就是禮物，\n這樣也許不錯呢。"
23007-220 = "至於包裝，可以\n由我來拆嗎……？"
23007-230 = "今年也請你\n多多指教。老師，"
23007-240 = "雖然會有很多\n會造成困擾的事情，\n但也請不要拋棄我。"
23007-250 = "神聖的夜晚……\n啊啊，非常期待呢……"
23007-260 = "……啊，\n只是自言自語而已。\n請不用在意。"
23007-270 = "說到萬聖節，\n是可以放心大膽地\n穿著暴露一點的日子……"
23007-280 = "……什麼？\n我誤會了嗎？"
23007-300 = "您好，老師。"
23007-310 = "您願意過來，真是感激不盡。"
23007-320 = "這裡很涼快，\n非常舒服。"
23007-330 = "對我而言\n就像是貴賓席一樣，\n呵呵……"
23007-340 = "機會難得，\n老師覺得如何呢？"
23007-350 = "要在這裡，\n一起脫掉嗎……？"
23007-360 = "像這樣\n在大白天就展露肌膚，"
23007-370 = "不覺得很開心嗎？"
23007-380 = "感覺就像是……\n做了不該做的事。"
23007-2600 = "……真是拿老師沒辦法。\n老師就這麼想看「我的全部」嗎？\n呵呵……\n我是說全部的實力啦，你想到哪裡去了？"

[translation]
20004-10 = "블루 아카이브."
20004-20 = "트리니티 정의실현부 1학년, 마시로.\n어떤 장소라도, 어떤 상황이라도,\n전력으로 선생님을 지원하겠습니다."
20004-30 = "뭔가 수상한 시선이\n느껴집니다만……"
20004-40 = "설마, 이런 곳에서도\n분란을 일으키려는\n문제 학생은 없겠지요?"
20004-50 = "(다음엔,\n선배들과 함께……)"
20004-60 = "(마침 좋은 곳에\n저격 포인트가 있군요.)"
20004-70 = "(호수의 물처럼\n흔들림 없이\n잔잔하게……)"
20004-80 = "어서 오세요, 선생님.\n오늘의 훈련은 무엇인가요?"
20004-90 = "기다리고 있었습니다, 선생님.\n바로 물놀이를……"
20004-100 = "아니, 훈련을 하러 떠나죠!"
20004-110 = "드디어 출격이군요!"
20004-120 = "어떤 환경에서도\n정의는 변치 않습니다!"
20004-130 = "귀여운 수영복은 정의……"
20004-140 = "과연, 마음에 새겨두겠습니다."
20004-150 = "……이것 말인가요?\n평범한 아이스 캔디입니다만?"
20004-160 = "제가 먹던 것이라도\n괜찮으시다면……\n드시겠습니까?"
20004-170 = "생신 축하드립니다, 선생님."
20004-180 = "선생님의 오늘 하루가\n완벽하도록 제가 옆에서\n밀착 경호를 하겠습니다."
20004-190 = "제 생일 선물 말입니까?\n그렇군요……"
20004-200 = "선생님과 함께 아이스 캔디를\n먹을 수 있다면, 그걸로\n충분합니다."
20004-210 = "새해 복 많이 받으시길.\n올해의 여름 훈련도\n기대하고 있겠습니다."
20004-220 = "어느새 여름이 지나고\n크리스마스가……"
20004-230 = "즐거운 시간은 참 빨리 가네요."
20004-240 = "학생 식당에서 나오는\n따끈한 호박 스프가\n그리워지는 계절이네요……"
20004-260 = "선생님은 아이스 캔디를\n깨물어서 드시나요,\n녹여서 드시나요?"
20004-270 = "저는 천천히\n녹여 먹는 편입니다."
20004-280 = "그 편이 아이스 캔디의\n맛을 오래 즐길 수 있거든요."
20004-290 = "냠…… 핥짝, 핥짝."
20004-300 = "……네?\n먹는 방법이\n이상하다고요?"
20004-310 = "저는 평범하다고 생각합니다만……\n뭔가 이상한가요?"
20004-320 = "선생님……\n어쩐지 또 수상한 표정을\n짓고 계십니다만……"
20004-2600 = "이것 또한…… 진짜 정의……?"

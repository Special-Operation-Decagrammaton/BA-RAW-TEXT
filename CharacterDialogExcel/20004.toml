[translation]
20004-10 = "Blue Archive."
20004-20 = "Trinity Justice Task Force first-year, Mashiro. Wherever it may be, under any circumstance, I will support you, Sensei—with all my might."
20004-30 = "Something feels suspicious, but..."
20004-40 = "Surely there won't be students causing a commotion at a place like this, right?"
20004-50 = "(It would've been great to come here with the upperclassmen.)"
20004-60 = "(This location offers a great vantage point.)"
20004-70 = "(Tranquil and still, like water...)"
20004-80 = "Welcome, Sensei! How shall we train today?"
20004-90 = "I've been waiting, Sensei. Let's go and have fun in the water..."
20004-100 = "I mean, let's go begin training!"
20004-110 = "Alas, let's sortie!"
20004-120 = "Justice is never out of season!"
20004-130 = "Cute swimsuits are justice...?"
20004-140 = "I'll keep that in mind."
20004-150 = "You mean this? It's a normal popsicle."
20004-160 = "Are you okay with eating something that I've been eating?"
20004-170 = "Happy birthday, Sensei."
20004-180 = "I'll stay by your side and protect you so that your day can be perfect, Sensei."
20004-190 = "A birthday present? I see..."
20004-200 = "...but this popsicle is more than enough for me, as long as I'm with you, Sensei."
20004-210 = "Happy New Year. I'm already looking forward to this year's summer training."
20004-220 = "Summer is over and now it's already Christmas."
20004-230 = "Good times fly by so quickly."
20004-240 = "I'm starting to enjoy the warm pumpkin soup served in the dining hall."
20004-260 = "Sensei, how do you like to enjoy a popsicle? Do you prefer to lick it?"
20004-270 = "I prefer to let mine melt first."
20004-280 = "It's easier to enjoy the flavor for longer."
20004-290 = "Mmm. *lick* *lick*"
20004-300 = "What? Is there something wrong with how I'm eating?"
20004-310 = "I think that's pretty normal. Is it strange?"
20004-320 = "Sensei... You're making a strange face again..."
20004-2600 = "Is this also...true justice?"

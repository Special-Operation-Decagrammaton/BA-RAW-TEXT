[translation]
20004-10 = "蔚藍檔案。"
20004-20 = "三一實現正義部1年級，麻白。無論在何處，遇到任何狀況，都會全力支援老師。"
20004-30 = "感覺到一股\n可疑的視線……"
20004-40 = "該不會，這裡也有\n想要引起混亂的\n問題學生吧？"
20004-50 = "（下次，\n　和前輩們一起……）"
20004-60 = "（這裡很適合\n　當成狙擊點呢）"
20004-70 = "（心如止水。\n　將搖晃緩緩\n　靜靜地……）"
20004-80 = "歡迎回來，老師。\n今天的訓練是什麼呢？"
20004-90 = "恭候多時了，老師。\n馬上去玩水……"
20004-100 = "不，去訓練吧！"
20004-110 = "出擊時間到了呢！"
20004-120 = "無論在任何地方，\n正義都是不變的！"
20004-130 = "可愛的泳裝是正義……"
20004-140 = "原來如此，我會謹記在心。"
20004-150 = "……這個嗎？\n只是普通的冰棒哦？"
20004-160 = "不介意被我\n吃過的話……\n要不要吃？"
20004-170 = "祝您生日快樂，老師。"
20004-180 = "為了讓老師的這一天\n能更加完美，我會在\n身旁進行貼身護衛。"
20004-190 = "生日禮物是嗎？\n這個嘛……"
20004-200 = "只要能和老師\n一起吃冰棒，\n就已經足夠了。"
20004-210 = "祝您新年快樂。\n今年的夏季訓練\n也很讓人期待呢。"
20004-220 = "不知不覺間，\n夏天已經過去，\n到了聖誕節……"
20004-230 = "快樂的時光\n總是過得特別快呢。"
20004-240 = "是讓人想念學生餐廳供應的\n熱呼呼南瓜濃湯的季節呢。"
20004-260 = "老師吃冰棒時，\n是咬著吃的那派嗎？\n還是舔著吃的那派呢？"
20004-270 = "我是，慢慢\n舔著吃的那派。"
20004-280 = "因為這樣，\n才能長時間享受\n冰棒的味道。"
20004-290 = "哈呣……\n舔……舔……"
20004-300 = "……什麼？\n吃的方式有點……？"
20004-310 = "在我看來，\n一如往常啊……\n有什麼奇怪的嗎？"
20004-320 = "……老師？\n總覺得你又露出了\n奇怪的表情……"
20004-2600 = "這個也是……真正的正義……？"

[translation]
20004-10 = "Blue Archive"
20004-20 = "นักเรียนชั้นปีที่ 1 ชมรมทวงความยุติธรรม\nมาชิโระค่ะ ไม่ว่าที่ไหนและเมื่อไร\nฉันจะคอยสนับสนุนคุณครูสุดกำลังเลยค่ะ"
20004-30 = "รู้สึกได้ถึงสายตา\nที่น่าสงสัยอยู่นะ..."
20004-40 = "หวังว่าที่นี่\nคงจะไม่มีเด็กนักเรียนเกเร\nที่สร้างความวุ่นวายนะคะ"
20004-50 = "(คราวหน้าถ้าได้มา\nกับพวกรุ่นพี่คงดีนะ...)"
20004-60 = "(ว่าแล้วเชียวที่ดีๆ แบบนี้...\nต้องมีจุดซุ่มยิงเหมาะๆ อยู่)"
20004-70 = "(นิ่งสงบ ไร้ความเคลื่อนไหว\nเหมือนกับน้ำในทะเลสาบ)"
20004-80 = "เชิญค่ะคุณครู\nวันนี้จะฝึกอะไรกันดีคะ?"
20004-90 = "ฉันกำลังรออยู่เลยค่ะคุณครู\nไปเล่นน้ำกันเถอะ..."
20004-100 = "เอ๊ะ ไม่สิ เราไปฝึกกันเถอะค่ะ!"
20004-110 = "ในที่สุดก็ได้เวลาบุกแล้วสินะคะ!"
20004-120 = "แต่ไม่ว่าในสถานการณ์แบบไหน\nความยุติธรรมก็ไม่เปลี่ยนไปค่ะ!"
20004-130 = "ชุดว่ายน้ำที่น่ารัก\nคือความยุติธรรม...?"
20004-140 = "ฉันจะจำให้ขึ้นใจเลยค่ะ"
20004-150 = "อันนี้เหรอคะ?\nก็แค่ไอติมแท่งเองนะคะ?"
20004-160 = "ถึงฉันจะทานไปบ้างแล้ว...\nถ้าคุณครูโอเคจะแบ่ง\nไอติมของฉันไปทานมั้ยคะ"
20004-170 = "สุขสันต์วันเกิดค่ะคุณครู"
20004-180 = "ฉันจะคอยคุ้มกันคุณครูอยู่ข้างๆ\nตลอด เพื่อให้วันนี้เป็นวันที่\nสมบูรณ์แบบของคุณครูค่ะ"
20004-190 = "ของขวัญวันเกิดฉันเหรอคะ?\nอย่างนี้นี่เอง..."
20004-200 = "ของขวัญ...\nแค่ได้กินไอศกรีมแท่งกับคุณครู\nฉันก็พอใจแล้วค่ะ"
20004-210 = "ขอให้มีความสุขในวันปีใหม่นะคะ\nฉันจะตั้งตารอการฝึกภาคฤดูร้อน\nของปีนี้อีกนะคะ"
20004-220 = "รู้ตัวอีกทีฤดูร้อนก็ผ่านไปแล้ว\nและคริสต์มาสก็กำลัง..."
20004-230 = "ช่วงเวลาดีๆ\nผ่านไปเร็วจังเลยนะคะ"
20004-240 = "ไม่รู้ทำไม จู่ๆ ก็นึกถึง\nซุปฟักทองร้อนๆ\nของโรงอาหารขึ้นมาค่ะ..."
20004-260 = "คุณครูชอบกัดไอติมเป็น\nคำแล้วค่อยกินหรือเปล่าคะ?\nหรือว่าค่อยๆ เลียให้ละลายคะ?"
20004-270 = "ส่วนฉันน่ะ\nชอบเลียให้ละลาย\nอย่างช้าๆ ค่ะ"
20004-280 = "ถ้ากินแบบนั้นจะลิ้มรส\nความอร่อยของไอติม\nได้นานขึ้นค่ะ"
20004-290 = "ง่ำ... แผล็บ... แผล็บ"
20004-300 = "เอ๋...?\nวิธีกินของฉัน\nมันแปลกงั้นเหรอคะ?"
20004-310 = "ฉันคิดว่ามันธรรมดานะคะ\nแบบนี้มันแปลกเหรอคะ?"
20004-320 = "ทำไมคุณครูถึง...\nทำหน้าตามีพิรุธ\nแบบนั้นล่ะคะ?"
20004-2600 = "นี่คือ... ความยุติธรรมที่แท้จริง...?"

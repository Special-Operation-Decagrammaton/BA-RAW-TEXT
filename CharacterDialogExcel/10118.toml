[translation]
10118-10 = "Blue Archive~!"
10118-20 = "ทั้งเรื่องควบคุมรถไฟ ทั้งเรื่องสร้างรางรถไฟ!\nให้เป็นหน้าที่ของฉันได้เลย! วะฮะฮ่า~!"
10118-30 = "อ้อ~ ที่นี่น่ะเหรอ?\nแหะๆ..."
10118-40 = "วันนี้มาอู้งาน\nที่นี่ดีมั้ยนะ?"
10118-50 = "มีอะไรน่าสนุกเยอะแยะเลย!\nรู้งี้มาตั้งนานแล้ว~"
10118-60 = "คุณครูไปอยู่ไหนเนี่ย?\nฉันมีเรื่องอยากบอกนะ...\nอ๊ะ ลืมไปแล้ว"
10118-70 = "ฮืม~ สบายใจจังเลย~\nแบบนี้อาจจะผล็อยหลับไปก็ได้นะ?\nแต่ถ้าเป็นแบบนั้น\nคงเสียดายเวลาเนอะ? อะฮ่า!"
10118-80 = "อะไรกัน เพิ่งจะมาเหรอ?"
10118-90 = "ฉันรออยู่นะ! วะฮะฮ่า~"
10118-100 = "คุณครู~ มาช้านะ!"
10118-110 = "ทำให้นักเรียนเวรต้องรองั้นเหรอ"
10118-120 = "แต่ที่จริง\nฉันก็เพิ่งมาเหมือนกัน!!"
10118-130 = "งั้นจะทำอะไรดี?\nสั่งได้ทุกอย่างเลยนะ!"
10118-140 = "อ๊ะ แต่ไม่เอาพวก\nงานเอกสารนะ"
10118-150 = "งั้นก็ไม่มีอะไรให้ทำงั้นเหรอ...?"
10118-160 = "คุณครูงานยุ่งกว่าที่คิดนะเนี่ย"
10118-170 = "งั้นฉันจะป้อนขนมให้แล้วกัน"
10118-180 = "เอ้า อ้าม!"
10118-190 = "วะฮะฮ่า!"
10118-200 = "คุณครูมีมุมที่เงอะงะอยู่นะเนี่ย"
10118-210 = "โดยเฉพาะอย่างยิ่ง..."
10118-220 = "ไม่บอกหรอก! วะฮะฮ่า!"
10118-230 = "เดี๋ยวนะ จิ้มกันมากไปแล้วหรือเปล่า?"
10118-240 = "ไม่มีอะไรทำเหรอ!"
10118-250 = "มายั่วยุฉันงั้นเหรอ\nเตรียมตัวโดนเหมือนกันแล้วใช่มั้ย?"
10118-260 = "ง่า~ ฉันไม่อยาก\nทำงานที่ไม่สนุกนะ~"
10118-270 = "วันนี้วันเกิดคุณครูใช่มั้ย?\nฉันรู้อยู่หรอกน่า~"
10118-280 = "สุขสันต์วันเกิด!\nแต่ฉันไม่มีของขวัญให้นะ"
10118-290 = "หืม ฉันเหรอ? หมายถึงอะไรน่ะ?"
10118-300 = "หืม? ทำไม ทำไม?"
10118-310 = "ของขวัญวันเกิดเหรอ~? จริงเหรอ?"
10118-320 = "วะฮะฮ่า ขอบคุณนะ!\nฉันกับฮิคาริจะเก็บมันไว้อย่างดีนะ~!"
10118-330 = "ปีใหม่แล้วนะเนี่ย~\nปีนี้จะเกิดเรื่องอะไรบ้างนะ?"
10118-340 = "คุณครู ตั้งปณิธานปีใหม่\nไว้ว่ายังไงเหรอ?"
10118-350 = "ช่วงเวลาแบบนี้\nมันรู้สึกจั๊กจี้จัง~"
10118-360 = "รู้สึกเหมือนบางอย่าง\nที่นุ่มละมุนเลย? วะฮะฮ่า~"
10118-370 = "ถ้าได้อยู่กับคุณครู\nก็น่าจะสนุกนะ! มาอยู่ด้วยกันเถอะ!"
10118-380 = "อ๊ะ! ลืมเอาลูกกวาดมา!"
10118-390 = "งั้นก็ต้องโดนแกล้ง\nอย่างช่วยไม่ได้สินะ... ทำไงดีเนี่ย?"
10118-410 = "วิวจากห้องควบคุมเป็นยังไงบ้าง?"
10118-420 = "ในเวลานี้วิวสวยมากเป็นพิเศษเลยละ"
10118-430 = "ฉันชอบพระอาทิตย์ตกดินน่ะ"
10118-440 = "เรามีระบบเดินรถอัตโนมัติ\nแต่ฉันไม่ค่อยได้ใช้หรอก"
10118-450 = "ก็มันไม่สนุกนี่นา?\nต้องควบคุมรถไฟด้วยมือฉันสิ"
10118-460 = "โอ๊ะ? คุณครูก็ลองดูสักครั้งมั้ยล่ะ?"
10118-470 = "วะฮะฮ่า~! ล้อเล่นหรอกน่า ล้อเล่น!"
10118-480 = "ก็คุณครูไม่มีใบขับขี่รถไฟนี่"
10118-490 = "ถึงยังไงฉันก็ให้มือใหม่\nมาขับไม่ได้หรอก"
10118-2600 = "ว้าว ให้ฉันเหรอ?\nดีละ! จะใช้อันนี้จัดการ\nสิ่งกีดขวางให้เรียบเลย! วะฮะฮ่า!"

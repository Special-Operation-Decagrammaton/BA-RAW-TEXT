[translation]
10118-10 = "블루 아카이브~!"
10118-20 = "열차 조종이든 선로 건설이든!\n뭐든 맡겨! 파햐햐~!"
10118-30 = "아~ 여기가 그?\n헤에……"
10118-40 = "오늘은 여기서\n농땡이 좀 부리다 갈까?"
10118-50 = "재밌어 보이는 게\n꽤 많잖아! 진작 올걸~"
10118-60 = "선생님은 어디 있지?\n할 말이 있었는데…\n아, 까먹었다."
10118-70 = "하~ 마음이 편하네~\n이러다 잠들어버릴지도?\n하지만 그러면\n시간이 아깝겠지? 아핫!"
10118-80 = "뭐야, 이제 오는 거야?"
10118-90 = "기다렸다구! 파햐햐~"
10118-100 = "선생님~ 늦어!"
10118-110 = "당번을 기다리게 하다니."
10118-120 = "뭐, 사실 나도\n방금 왔지만 말야!!"
10118-130 = "그래서, 뭐할 거야?\n아무거나 맡겨줘!"
10118-140 = "아, 그런데 서류 작업\n같은 건 빼고."
10118-150 = "……그럼 할 일이 없다고?"
10118-160 = "선생님, 생각보다 바쁘구나."
10118-170 = "그럼 과자라도 먹여줄게."
10118-180 = "자, 아- 해!"
10118-190 = "파햐햣!"
10118-200 = "선생님, 은근히 어설픈\n부분이 있네."
10118-210 = "구체적으로는…"
10118-220 = "알려줄 리가 없잖아! 파햐햐!"
10118-230 = "잠깐, 너무 찌르는 거 아냐?"
10118-240 = "할 일 없어?"
10118-250 = "날 자극했으니,\n그만한 각오는 되어 있겠지?"
10118-260 = "으에~ 재미없는 일은\n하기 싫은데~?"
10118-270 = "오늘 선생님 생일이지?\n알고 있다고~"
10118-280 = "생일 축하해!\n뭐, 선물은 딱히 없지만."
10118-290 = "어, 나? 무슨 말이야?"
10118-300 = "응? 왜, 왜?"
10118-310 = "생일 선물~? 진짜?"
10118-320 = "파햐햐, 고마워!\n히카리랑 같이 간직할게~!"
10118-330 = "벌써 새해네~\n올해는 또 무슨 일이 일어날까?"
10118-340 = "선생님, 새해 결심은\n뭘로 했어?"
10118-350 = "이 시기에는\n괜스레 간질간질하지~"
10118-360 = "뭔가, 이렇게 푹신푹신한?\n그런 느낌? 파햐햐~"
10118-370 = "선생님과 있으면 엄청\n즐거울 것 같아! 함께 보내자구!"
10118-380 = "아! 사탕 안 챙겨왔다!"
10118-390 = "그럼 장난을 당할\n수밖에 없는데…… 어쩌지?"
10118-410 = "운전실의 풍경은 어때?"
10118-420 = "이 시간대는 특히 장관이지."
10118-430 = "좋아하거든. 노을 말야."
10118-440 = "자동 운행 시스템도 있는데,\n나는 잘 안 써."
10118-450 = "왜냐면 재미없잖아?\n운전은 역시 내 손으로 해야지."
10118-460 = "오? 선생님도 한번 해볼래?"
10118-470 = "파햐햐~! 농담이야, 농담!"
10118-480 = "선생님, 기관사 면허 없잖아."
10118-490 = "아무리 그래도 쌩초보한테\n맡길 수는 없지."
10118-2600 = "우왓, 나 주는 거?\n좋았어! 방해물은 이걸로\n다 치워주지! 파햐햐!"

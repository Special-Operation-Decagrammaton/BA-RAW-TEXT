[translation]
10118-10 = "蔚藍檔案～！"
10118-20 = "不管是駕駛列車還是建設鐵路！\n儘管交給我吧！噗哈哈～！"
10118-30 = "啊～這就是那個地方嗎？\n嘿～"
10118-40 = "今天就在這裡偷懶吧♪"
10118-50 = "有好多有趣的東西耶！\n早知道就早點來了～"
10118-60 = "其實有話想跟老師說的，\n可是他又不在……好吧，\n算了。反正我也忘了。"
10118-70 = "哈～真放鬆～\n再這樣下去都快睡著了。\n但是那樣好像有點\n浪費時間？啊哈！"
10118-80 = "我說，你打算讓我\n等到什麼時候啊？"
10118-90 = "歡迎回來！噗哈～"
10118-100 = "老師你好慢哦～！"
10118-110 = "怎麼能讓值日生等呢。"
10118-120 = "不過，其實我也\n才剛到就是了！"
10118-130 = "所以要做什麼？\n儘管開口吧。"
10118-140 = "啊～不過文書工作\n之類的先別。"
10118-150 = "……「那就沒事可做了」？"
10118-160 = "老師原來都在\n忙那種工作啊。"
10118-170 = "那我來餵你吃點心吧。"
10118-180 = "來，啊～！"
10118-190 = "噗哈哈！"
10118-200 = "老師原來也有\n不靈光的一面呢。"
10118-210 = "具體來說……"
10118-220 = "怎麼可能告訴你咧～\n噗哈哈！"
10118-230 = "等一下，\n你戳過頭了吧？"
10118-240 = "很閒嗎？"
10118-250 = "既然敢招惹我，\n想必已經做好\n相應的覺悟了吧？"
10118-260 = "咦～我不想做\n不好玩的事哦～？"
10118-270 = "今天是老師的生日對吧？\n我知道啦～♪"
10118-280 = "生日快樂！\n嗯，雖然沒有禮物就是了。"
10118-290 = "啊？我？你在說什麼啊？"
10118-300 = "咦？怎麼了怎麼了？"
10118-310 = "生日禮物？真的嗎！？"
10118-320 = "噗哈！謝啦～\n我跟光會好好珍惜它的。"
10118-330 = "已經過新年了啊～\n不知道今年會發生什麼事。"
10118-340 = "老師，你新年的抱負是什麼？"
10118-350 = "這個時期，總是\n讓人莫名靜不下來呢～"
10118-360 = "有點這種，\n該說輕飄飄的感覺嗎？\n究竟是為什麼呢？噗哈～"
10118-370 = "和老師在一起感覺超開心的！\n一起過節吧。"
10118-380 = "啊，忘記帶糖果了！"
10118-390 = "這下只能接受搗蛋了……\n怎麼辦才好。"
10118-410 = "駕駛室看出去的景色如何啊？"
10118-420 = "這個時段特別漂亮呢。"
10118-430 = "我還挺喜歡的……夕陽。"
10118-440 = "雖然有自動駕駛系統，\n但我並不常用。"
10118-450 = "畢竟那樣不是很無聊嗎？\n駕駛果然還是得親手來才行。"
10118-460 = "哦？老師也想試試看嗎～？"
10118-470 = "啊哈哈哈～！\n開個玩笑，開個玩笑啦！"
10118-480 = "老師又沒有司機的駕照。"
10118-490 = "再怎麼樣都不會\n給菜鳥碰的唷。"
10118-2600 = "這是什麼？要給我嗎？\n好耶♪就用這個把障礙物\n一掃而空吧！噗哈哈！"

[translation]
10125-10 = "妞呵呵～蔚藍檔案！"
10125-20 = "我是狂獵藝術學院，神秘學研究會的白尾繪梨。\n世界裡充滿了魔法。\n沒錯，就像這場邂逅一樣！"
10125-30 = "會不會在某個地方\n發生騷靈現象呢……"
10125-40 = "妞呵……感覺能\n浮現新的魔法……"
10125-50 = "呣呣……感知到\n濃厚的魔力囉。"
10125-60 = "妞呵呵……\n外出真讓人興奮呢！"
10125-70 = "把這裡當成工房\n的話……說不定\n能誕生出傑作……！"
10125-80 = "恭候多時了，御者！"
10125-90 = "今天也努力進行\n魔法的研究吧！"
10125-100 = "哦，御者！"
10125-110 = "我正好抽到了\n「命運之輪」的牌！"
10125-120 = "感覺會成為魔法般\n的一天呢，御者！"
10125-130 = "昨天，我聽說了學院\n新的靈異話題！"
10125-140 = "妞呵呵～好奇嗎？\n果然，御者也是\n「這一邊」的人呢！"
10125-150 = "啊，御者！\n我正好在辦公室的\n地板上畫魔法陣。"
10125-160 = "請放心！\n並不是爆炸魔法。\n妞呵呵。"
10125-170 = "御者，你知道嗎？"
10125-180 = "如果一邊開槍，\n一邊吟唱強化魔法……"
10125-190 = "威力就會提升！"
10125-200 = "總有一天，我也要\n創作出像「創世的影像」\n那樣的傑作……！"
10125-210 = "御者，請守望著\n我的藝術活動吧！"
10125-220 = "祝你生日快樂，御者！"
10125-230 = "御者的肖像畫，\n我幫你掛在這裡囉！"
10125-240 = "開心嗎？\n當然開心吧！"
10125-250 = "沒有像今天一樣特別的日子了。\n因為今天不只是我的生日……"
10125-260 = "也是萬聖節哦！"
10125-270 = "這兩者的交會……\n簡直就是命運吧？\n妞呵呵！"
10125-280 = "新年到了呢……"
10125-290 = "希望今年也是\n充滿魔法的一年！"
10125-300 = "聖誕節，是和重要的人\n一起度過的日子……"
10125-310 = "御者，你居然這麼\n沉迷於我的魔法啊！\n我很高興！"
10125-320 = "今天整條街上\n都充滿了魔力！"
10125-330 = "那麼，該做什麼樣的\n惡作劇呢……妞呵呵。"
10125-350 = "……我想起了\n第一次畫畫的日子。"
10125-360 = "那時……\n我筆直地、純粹地，"
10125-370 = "面對著畫布。"
10125-380 = "而現在的我……\n並不一樣。"
10125-390 = "變得不知道\n該畫什麼才好，\n失去了自信……"
10125-400 = "就在那時，\n御者告訴了我。"
10125-410 = "名為「夢想」的魔法，\n早已寄宿在心裡。"
10125-420 = "只要有夢想……\n從今以後，似乎就\n不會再迷失方向了。"
10125-430 = "御者……可以的話，\n能跟我走上同樣的道路嗎？"
10125-440 = "色彩繽紛、\n充滿夢想的──\n魔法之路！"
10125-2600 = "妞呵呵呵，\n是我專用的魔法杖！\n我一定會用完美的魔法\n回應你的期待！"

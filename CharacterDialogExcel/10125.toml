[translation]
10125-10 = "뉴후후, 블루 아카이브!"
10125-20 = "와일드헌트 예술학원, 오컬연 \n시라오 에리라고 합니다. 세계는 마법으로\n가득 차 있어요. 그래요, 이 만남처럼요!"
10125-30 = "어디\n폴터가이스트 현상\n안 일어나려나……"
10125-40 = "오오,\n뭔가 마법 주문이\n떠오르는 곳이네요."
10125-50 = "이곳에서\n진한 마나의 기운이\n느껴져요."
10125-60 = "뉴후후…… 외출은\n두근두근하네요!"
10125-70 = "여기를 아틀리에로\n한다면……\n걸작이 나올지도……!"
10125-80 = "기다리고 있었습니다, 마스터."
10125-90 = "오늘도 함께 마법을 연구하죠!"
10125-100 = "오, 마스터!"
10125-110 = "마침 <운명의 수레바퀴> \n카드를 뽑은 참입니다!"
10125-120 = "오늘도 마법 같은 하루네요,\n마스터!"
10125-130 = "어제는 우리 학원에 숨어있는\n새로운 오컬트를 찾아냈어요."
10125-140 = "뉴후후, 궁금하시죠?\n역시 마스터는\n저희 쪽이라니까요."
10125-150 = "아, 마스터!\n마침 사무실 바닥에\n마법진을 그리고 있었습니다."
10125-160 = "안심해 주세요!\n폭발 마법은 아니니까요.\n뉴후훗."
10125-170 = "마스터. 혹시 이거 아시나요?"
10125-180 = "총을 쏘면서\n강화 마법을 외우면……"
10125-190 = "위력이 더 강해져요!"
10125-200 = "저도 언젠가\n<창세의 초상> 같은\n멋진 작품을 그릴 거예요."
10125-210 = "마스터.\n제 예술 활동,\n계속 지켜봐 주세요!"
10125-220 = "생일 축하드려요, 마스터!"
10125-230 = "마스터의 초상화,\n여기에다가 장식해 둘게요!"
10125-240 = "기쁘시죠? 그렇죠?"
10125-250 = "오늘은 평범한 날이 아니에요.\n제 생일이면서"
10125-260 = "할로윈 데이니까요!"
10125-270 = "이 두 가지의 교차……\n이것이야말로 운명 아닐까요?\n뉴후훗!"
10125-280 = "신년이네요……."
10125-290 = "올해에도,\n마법 같은 일들이 가득하기를!"
10125-300 = "크리스마스는, \n소중한 사람과 보내는 날……"
10125-310 = "마스터, 그렇게\n제 마법에 푹 빠지시다니!\n기뻐요!"
10125-320 = "오늘은 온 거리가\n마력으로 가득해요!"
10125-330 = "자, 어떤 장난을 쳐볼까요……\n뉴후후."
10125-350 = "……처음 회화를 그렸을 때가\n생각나요."
10125-360 = "그때는…… \n정직하게, 순수하게"
10125-370 = "캔버스와 마주했었어요."
10125-380 = "지금의 저는…… \n아닌 것 같아요."
10125-390 = "무엇을 그리면 좋을지\n방황하다가, 자신감을 \n잃어버리게 되어서……"
10125-400 = "그러던 중,\n마스터께서 알려 주셨어요."
10125-410 = "<꿈>이라는 마법이,\n이미 마음속에 깃들어 있다고."
10125-420 = "꿈이 있다면……\n더 이상, 길을 헤매는 일은\n없을 거예요."
10125-430 = "마스터……\n괜찮다면, 저와 같은 길을\n걷지 않으시겠어요?"
10125-440 = "형형색색의 꿈으로 가득한,\n마법의 길을!"
10125-2600 = "뉴후후, 이것은 저의 전용 마법 지팡이!\n좀 더 완벽한 마법으로 보답하겠습니다!"

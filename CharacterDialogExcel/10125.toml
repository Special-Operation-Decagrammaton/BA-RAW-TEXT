[translation]
10125-10 = "อุฮุฮุ Blue Archive!"
10125-20 = "ชิราโอะ เอริจากชมรมวิจัยรหัสยศาสตร์ สถาบันศิลปะไวลด์ฮันต์ค่ะ\nโลกนี้เต็มไปด้วยเวทมนตร์\nใช่แล้วค่ะ เหมือนการพบกันในครั้งนี้ไงล่ะคะ!"
10125-30 = "ไม่มีปรากฏการณ์\nโพลเทอร์ไกสต์\nเกิดขึ้นเลยเหรอ..."
10125-40 = "โอ้... เป็นที่ที่เหมือน\nทำให้นึกถึงคาถาเวท\nบางอย่างได้เลย"
10125-50 = "สัมผัสได้ถึง\nมานาที่รุนแรง\nได้จากที่นี่ค่ะ"
10125-60 = "อุฮุฮุ ตื่นเต้นจังเลยค่ะ\nที่จะได้ออกไปข้างนอก"
10125-70 = "ถ้าใช้ที่นี่เป็นสตูดิโอ\nทำงานละก็... อาจทำ\nผลงานชิ้นเอกได้เลยนะ...!"
10125-80 = "กำลังรออยู่เลยค่ะมาสเตอร์"
10125-90 = "วันนี้ก็มาวิจัยเวทมนตร์กันเถอะค่ะ"
10125-100 = "โอ๊ะ มาสเตอร์!"
10125-110 = "สุ่มได้การ์ดวงล้อแห่งโชคชะตา\nพอดีเลยค่ะ!"
10125-120 = "วันนี้ก็เป็นวันที่เหมือน\nเวทมนตร์วิเศษเลยค่ะ\nมาสเตอร์!"
10125-130 = "เมื่อวานเราค้นพบเรื่องเร้นลับใหม่ๆ\nที่ซ่อนอยู่ในโรงเรียนด้วยค่ะ"
10125-140 = "อุฮุฮุ อยากรู้เหรอคะ?\nคิดแล้วเชียวว่ามาสเตอร์\nจะต้องอยู่ฝ่ายฉันจริงๆ ด้วย"
10125-150 = "อ๊ะ มาสเตอร์!\nฉันกำลังวาดวงเวท\nไว้ที่พื้นสำนักงานค่ะ"
10125-160 = "วางใจได้เลยค่ะ!\nไม่ใช่เวทมนตร์ระเบิดหรอกค่ะ\nอุฮุฮุ"
10125-170 = "มาสเตอร์ รู้รึเปล่าคะ?"
10125-180 = "ตอนที่ยิงปืน\nแล้วร่ายคาถาเสริมพลัง..."
10125-190 = "จะยิ่งทำให้ยิงได้แรงขึ้นค่ะ!"
10125-200 = "สักวันหนึ่งฉันก็จะ\nสร้างผลงานที่สุดยอดเหมือน\nภาพต้นกำเนิดแห่งสรรพสิ่งให้ได้ค่ะ"
10125-210 = "มาสเตอร์\nช่วยเฝ้าดูผลงานศิลปะ\nของฉันต่อไปด้วยนะคะ!"
10125-220 = "สุขสันต์วันเกิดค่ะ มาสเตอร์!"
10125-230 = "ฉันจะติดภาพเหมือนของมาสเตอร์\nเอาไว้ที่นี่นะคะ!"
10125-240 = "ดีใจใช่มั้ยคะ? ใช่มั้ยคะ?"
10125-250 = "วันนี้ไม่ใช่วันธรรมดาๆ นะคะ\nวันนี้เป็นวันเกิดของฉัน"
10125-260 = "และเป็นวันฮาโลวีนด้วยค่ะ!"
10125-270 = "จุดตัดของสองอย่างนี้...\nแบบนี้เป็นโชคชะตาไม่ใช่เหรอคะ?\nอุฮุฮุ!"
10125-280 = "ปีใหม่แล้วสินะคะ..."
10125-290 = "ปีนี้ก็ขอให้\nเต็มไปด้วยเรื่องมหัศจรรย์ค่ะ!"
10125-300 = "มาสเตอร์\nวันที่ใช้เวลากับคนสำคัญ..."
10125-310 = "มาสเตอร์ชอบเวทมนตร์\nของฉันขนาดนั้นเลยเหรอเนี่ย\nดีใจจังเลยค่ะ!"
10125-320 = "วันนี้ถนนทั้งสาย\nจะเต็มไปด้วยเวทมนตร์ค่ะ!"
10125-330 = "เอาละ จะล้อเล่นแบบไหนดีนะคะ...\nอุฮุฮุ"
10125-350 = "ฉันนึกถึงตอนที่\nวาดภาพครั้งแรกเลยค่ะ"
10125-360 = "ตอนนั้น...\nฉันเผชิญหน้ากับผ้าใบแคนวาส"
10125-370 = "อย่างซื่อสัตย์และบริสุทธิ์ใจ"
10125-380 = "ฉันในตอนนี้...\nเหมือนไม่ใช่ตัวฉันเองเลยค่ะ"
10125-390 = "ฉันไม่รู้ว่าจะวาดอะไรดีและ\nสูญเสียความมั่นใจไปหมด..."
10125-400 = "และในตอนนั้นเอง\nมาสเตอร์ก็ทำให้ฉันได้รู้ค่ะ"
10125-410 = "ว่าเวทมนตร์ที่ชื่อว่า <ความฝัน>\nมันอยู่ในใจของฉันอยู่แล้ว"
10125-420 = "ถ้ามีความฝันละก็...\nไม่มีทางที่จะ\nหลงทางอีกแน่นอนค่ะ"
10125-430 = "มาสเตอร์...\nถ้าไม่รบกวนเกินไป\nช่วยเดินไปกับฉันได้มั้ยคะ?"
10125-440 = "เดินไปด้วยกันบน\nเส้นทางแห่งเวทมนตร์\nที่เต็มไปด้วยความฝัน\nอันสดใสนี้กันนะคะ!"
10125-2600 = "อุฮุฮุ ไม้กายสิทธิ์ของฉันสินะ!\nฉันจะตอบแทนด้วยเวทมนตร์\nที่สมบูรณ์แบบเองค่ะ!"

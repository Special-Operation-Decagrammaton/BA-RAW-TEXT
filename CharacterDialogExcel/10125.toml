[translation]
10125-10 = "Nyuhuhu, Blue Archive!"
10125-20 = "I'm Shirao Eri, of Wildhunt Art Academy's Occult Society. The world is full of magic. Yes, even this meeting!"
10125-30 = "I wonder if there'll be poltergeist phenomenon somewhere..."
10125-40 = "Ooh, I feel inspiration for my magic spells residing here!"
10125-50 = "I can sense strong mana coming from here."
10125-60 = "Nyuhuhu... An outing is so exciting!"
10125-70 = "If this was my atelier...I could create a masterpiece!"
10125-80 = "I was waiting for you, Master."
10125-90 = "Let's study magic together today as well!"
10125-100 = "Oh, Master!"
10125-110 = "I just happened to pull the \"Wheel of Fortune\" card!"
10125-120 = "It's a magical day, Master!"
10125-130 = "We discovered a new phenomenon, hidden in our academy yesterday."
10125-140 = "Nyuhuhu, you want to know more? I knew you were one of us, Master!"
10125-150 = "Ah, Master! I was drawing a magic circle on the office floor."
10125-160 = "Don't you worry! It's not explosion magic. Nyuhuhu."
10125-170 = "Master. Did you know?"
10125-180 = "If you chant an enhancement spell while shooting..."
10125-190 = "Your gun will have more firepower!"
10125-200 = "One day, I'm going to create an incredible piece like the \"Portrait of Genesis.\""
10125-210 = "Master! Please look forward to my artistic endeavors!"
10125-220 = "Happy birthday, Master!"
10125-230 = "I'll place your portrait over here, Master!"
10125-240 = "You're happy, right?"
10125-250 = "Today's no ordinary day. It's my birthday..."
10125-260 = "...AND it's Halloween!"
10125-270 = "For these two to intersect... It must be fate, right? Nyuhuhu!"
10125-280 = "It's New Year's..."
10125-290 = "May this year also be filled with magical events!"
10125-300 = "Christmas is a day you spend with someone special..."
10125-310 = "Master, I'm so happy to see that you're that captivated by my magic!"
10125-320 = "The whole street is filled with magic power today!"
10125-330 = "Now, what kind of prank should I pull today... Nyuhuhu."
10125-350 = "...This reminds me of the first time I ever picked up a brush."
10125-360 = "Back then... I was so fresh and pure..."
10125-370 = "...when I faced that canvas."
10125-380 = "But now... I don't feel that way anymore."
10125-390 = "I lost the magic of my inspiration...and with it, I lost my confidence."
10125-400 = "But then, you told me, Master..."
10125-410 = "...that dreams are a magic all their own, right here in my heart."
10125-420 = "That those dreams could keep me from getting lost on the path."
10125-430 = "Master...if you don't mind, would you like to walk the path with me?"
10125-440 = "The path of magic, full of colorful dreams!"
10125-2600 = "Nyuhuhu, this is my exclusive magic wand! I'll repay you with even more perfect magic!"

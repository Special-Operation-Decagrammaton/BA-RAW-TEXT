[translation]
20019-10 = "Blue Archive"
20019-20 = "I'm Akane, Master's maid... Or, I suppose I'm Master's pet bunny now!"
20019-30 = "Everything is neatly organized. Cleaning...is important."
20019-40 = "Welcome. I assume your order is...black tea? Heehee."
20019-50 = "Master, you need to know... You are a special person."
20019-60 = "Is there anything else that needs taking care of?"
20019-70 = "Can I commit to the way of the bunny as I hop alongside Master...?"
20019-80 = "I've been waiting for you, Master."
20019-90 = "Akane is a loyal bunny to Master and Master alone."
20019-100 = "Boing, boing!"
20019-110 = "Are you back, Master? Everything is set and ready."
20019-120 = "I am nothing if not an industrious little rabbit."
20019-130 = "Is it fun being...a rabbit? Heehee. I guess..."
20019-140 = "Does it look fun?"
20019-150 = "If there's anything you need, never hesitate to ask. Don't leave me waiting."
20019-160 = "The time I've spent with you is irreplaceable."
20019-170 = "There is no better cleaning equipment than a bomb."
20019-180 = "Kidding, kidding... Please don't stare at me like that, Master."
20019-190 = "I believe that a bunny is the perfect form for an operative."
20019-200 = "And an even more perfect form for a maid."
20019-210 = "Happy birthday, Master!"
20019-220 = "Starting today, you can expect special bunny bonuses!"
20019-230 = "What is a special bunny bonus?"
20019-240 = "Hahaha, I wonder..."
20019-250 = "Don't worry. Bunnies are too cute to be scary. Especially this one..."
20019-260 = "My birthday? You remembered?"
20019-270 = "Thank you, Master. I'm jumping with joy!"
20019-280 = "Happy New Year, Master!"
20019-290 = "It's already a new year! I wish only the best for you, Master."
20019-300 = "It's Christmas, Master!"
20019-310 = "Every day is special with you, Master, but today feels particularly special."
20019-320 = "Could you stay and comfort a cold bunny?"
20019-330 = "Oh, it's Halloween. I guess my outfit will blend right in."
20019-340 = "Trick-or-treat? I'm more of a trick-and-treat person."
20019-360 = "I'm sorry. My thoughts aren't very maid-like."
20019-370 = "I was losing confidence in myself."
20019-380 = "Master, you have so much riding on you...but you're always smiling."
20019-390 = "But me... I couldn't even... I couldn't take that weight off your shoulders..."
20019-400 = "But what you said... I think that's enough to make me feel confident again."
20019-410 = "I'll always do my best in serving you, even if I stumble along the way. Master."
20019-2600 = "This will help me to become an even better bunny."

[translation]
20019-10 = "蔚藍檔案"
20019-20 = "我是主人的女僕，朱音。\n不對…現在是主人的兔子，\n這樣說比較對嗎？"
20019-30 = "整頓得\n相當乾淨呢。\n打掃是…很重要的。"
20019-40 = "歡迎光臨。\n請問要來點紅茶嗎？\n…呵呵。"
20019-50 = "主人真的是…\n很特別的人。"
20019-60 = "還能再稍微\n整理一下的\n地方是…？"
20019-70 = "趁這個機會\n和主人一起走走\n兔子之路也不錯…？"
20019-80 = "我在等著您哦，主人。"
20019-90 = "朱音是主人專屬的\n忠實兔子。"
20019-100 = "蹦蹦！"
20019-110 = "歡迎回來，主人。\n準備全部都已經完成了…"
20019-120 = "因為我是勤快的兔子。"
20019-130 = "能當兔子開不開心\n是嗎…？\n呵呵，這個嘛…"
20019-140 = "在您看來如何呢？"
20019-150 = "有什麼要求的話\n請隨時告訴我。\n我會等著您的。"
20019-160 = "和主人在一起的這一刻，\n對我來說是無可取代的\n寶貴時間。"
20019-170 = "炸彈是最有效率的\n清掃工具唷。"
20019-180 = "開，開玩笑的…\n請不要用那種眼神盯著我，\n主人。"
20019-190 = "成為兔子這件事，\n是為了成為更完美\n特務的一步。"
20019-200 = "或者說，是為了更接近\n完美女僕的一步也說不定呢。"
20019-210 = "祝您生日快樂，主人！"
20019-220 = "今天敬請期待\n兔子提供的\n特別服務哦？"
20019-230 = "您問兔子的特別\n服務是指什麼嗎？"
20019-240 = "呵呵…這個嘛，\n會是什麼呢？"
20019-250 = "別擔心。\n一點都不可怕唷～\n來，好乖好乖…"
20019-260 = "您記住了\n我的生日嗎？"
20019-270 = "非常感謝您，主人。\n沒有什麼比這件事\n更值得開心了。"
20019-280 = "新年快樂，\n主人。"
20019-290 = "…已經是新年了呢。\n希望今年真的\n能發生許多好事…"
20019-300 = "是聖誕節呢，主人。"
20019-310 = "雖然和主人在一起\n的每一天都很特別…\n但今天是更特別的日子。"
20019-320 = "為了怕冷的兔子…\n您願意陪在我身邊嗎？"
20019-330 = "啊，是萬聖節呢。\n就連我的服裝，今天\n看起來也會很普通吧。"
20019-340 = "所以…該做什麼\n惡作劇好呢？\n就算給我糖果，\n還是會搗蛋的哦？"
20019-360 = "非常抱歉…\n這種想法，對一個女僕來說\n明明是不及格的。"
20019-370 = "我…失去了自信。"
20019-380 = "主人明明總是\n背負著很多事情，\n卻總是是笑著說沒關係。"
20019-390 = "而我…卻完全無法，\n替主人背負那些重擔…"
20019-400 = "但是，因為主人的\n話語，我似乎能\n再次向前邁進了。"
20019-410 = "今後，不才小女，\n還請您多多指教。\n主人。"
20019-2600 = "這樣就能更完美地…\n成為「兔子」了。"

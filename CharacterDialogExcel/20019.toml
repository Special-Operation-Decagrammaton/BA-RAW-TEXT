[translation]
20019-10 = "Blue Archive"
20019-20 = "สาวใช้ของนายท่าน อาคาเนะค่ะ\nไม่สิ... หรือต้องเรียกว่ากระต่ายของนายท่านดีล่ะคะ?"
20019-30 = "จัดการเอาไว้ได้เป็นระเบียบมาก\nเลยนะคะ การทำความสะอาด...\nก็เป็นเรื่องสำคัญค่ะ "
20019-40 = "ยินดีต้อนรับค่ะ\nต้องการสั่งเมนูชาแดงเหรอคะ?\nฮุฮุ..."
20019-50 = "นายท่านนี่...\nเป็นคนพิเศษจริงๆ เลยนะคะ"
20019-60 = "ไม่มีตรงไหน\nที่ต้องจัดการเพิ่มเลยเหรอคะ...?"
20019-70 = "ตอนเช้าแบบนี้\nไปเดินเล่นในสวนด้วยกัน\nกับนายท่านดีมั้ยนะ?"
20019-80 = "ฉันกำลังรออยู่เลยค่ะ นายท่าน"
20019-90 = "อาคาเนะเป็นกระต่ายที่ซื่อสัตย์\nของนายท่านคนเดียวค่ะ"
20019-100 = "ดึ๋ง~ ดึ๋ง~!"
20019-110 = "กลับมาแล้วเหรอคะ~ นายท่าน\nทุกอย่างเตรียมพร้อมเรียบร้อยแล้วค่ะ"
20019-120 = "ฉันเป็นกระต่ายที่ขยันขันแข็งน่ะค่ะ"
20019-130 = "ได้เป็นกระต่าย...\nสนุกรึเปล่าน่ะเหรอคะ?\nฮิฮิ นั่นสินะคะ…?"
20019-140 = "นายท่านคิดว่ายังไงคะ?"
20019-150 = "หากนายท่านต้องการอะไร\nก็บอกฉันได้ตลอดเลยนะคะ\nฉันกำลังรออยู่ค่ะ"
20019-160 = "ช่วงเวลาที่ได้อยู่กับนายท่าน\nคือช่วงเวลาที่ล้ำค่าสำหรับฉัน\nที่เอาอะไรมาแลกก็ไม่ยอมค่ะ"
20019-170 = "ระเบิดก็เป็นอุปกรณ์ทำความสะอาด\nที่มีประสิทธิภาพดีเยี่ยมอย่างหนึ่งนะคะ"
20019-180 = "ฉะ... ฉันล้อเล่นค่ะ\nถ้ามองด้วยสายตาแบบนั้น\nฉันลำบากใจนะคะ นายท่าน"
20019-190 = "ฉันคิดว่าการเป็นกระต่าย\nก็เป็นอีกเส้นทางหนึ่ง\nสำหรับการที่จะเป็น\nสายลับที่สมบูรณ์แบบค่ะ"
20019-200 = "และยิ่งกว่านั้นก็ยังเป็น\nเส้นทางสำหรับการเป็นเมด\nที่สมบูรณ์แบบด้วยค่ะ"
20019-210 = "สุขสันต์วันเกิดค่ะนายท่าน!"
20019-220 = "วันนี้นายท่านตั้งตารอ\nการบริการสุดพิเศษ\nจากกระต่ายได้เลยค่ะ"
20019-230 = "การบริการสุดพิเศษจากกระต่าย\nคืออะไรงั้นเหรอคะ?"
20019-240 = "ฮุฮุฮุ...\nนั่นสิน้า คืออะไรกันนะคะ?"
20019-250 = "ไม่เป็นไรหรอกค่ะ\nไม่ใช่เรื่องน่ากลัวหรอกค่ะ\nเอาละๆ เป็นเด็กดีนะคะ~"
20019-260 = "นายท่าน...\nจำวันเกิดฉันได้ด้วยเหรอคะ?"
20019-270 = "ขอบคุณค่ะนายท่าน\nอาคาเนะน่ะ...\nมีความสุขสุดๆ เลยค่ะ"
20019-280 = "ขอให้มีความสุขในวันปีใหม่นะคะ\nนายท่าน"
20019-290 = "ปีใหม่แล้วสินะคะ...\nปีนี้ก็ขอให้มีแต่เรื่องดีๆ\nตลอดทั้งปีเลยนะคะ"
20019-300 = "คริสต์มาสแล้วค่ะ นายท่าน"
20019-310 = "ถึงทุกวันที่ได้อยู่กับนายท่าน\nจะเป็นวันพิเศษอยู่แล้วก็ตาม...\nแต่วันนี้ยิ่งพิเศษกว่าทุกวันเลยนะคะ"
20019-320 = "นายท่านจะใช้เวลาอยู่ด้วยกัน...\nกับกระต่ายขี้หนาวคนนี้ใช่มั้ยคะ?"
20019-330 = "อ๊ะ ฮาโลวีนแล้วนะคะ\nวันนี้ชุดของฉัน...\nดูธรรมดาไปเลยนะคะ"
20019-340 = "เพราะงั้น...\nเราจะมาเล่นหลอกอะไรกันดีคะ?\nถึงจะให้ขนม ฉันก็จะหลอกอยู่ดีค่ะ"
20019-360 = "ต้องขออภัยด้วยจริงๆ ค่ะ\nทั้งที่ความคิดแบบนี้ถือว่า\nขาดคุณสมบัติในฐานะของเมดแท้ๆ"
20019-370 = "ฉันน่ะ ไม่มั่นใจเลยละค่ะ"
20019-380 = "นายท่านน่ะ ไม่ว่าเมื่อไรก็คอยแบกรับ\nภาระต่างๆ อยู่เสมอ แต่ถึงอย่างนั้น\nนายท่านก็หัวเราะ แล้วบอกว่าไม่เป็นไร"
20019-390 = "ฉันน่ะ ไม่เคยที่จะแบ่งเบา\nภาระพวกนั้นจากนายท่านได้เลย..."
20019-400 = "แต่ว่าคำตอบของนายท่าน\nทำให้ฉันกลับมามีความมั่นใจ\nได้อีกครั้งแล้วค่ะ"
20019-410 = "ถึงฉันจะยังอ่อนหัดอยู่...\nแต่จากนี้ไปก็ขอรบกวนด้วยนะคะ\nนายท่าน"
20019-2600 = "ถ้ามีสิ่งนี้ก็คงจะทำให้ฉัน...\nเป็น 'กระต่าย' ที่สมบูรณ์แบบ\nได้สินะคะ"

[translation]
20019-10 = "블루 아카이브"
20019-20 = "주인님의 메이드, 아카네입니다.\n아뇨… 지금은, 주인님의 토끼라고 해야 할까요?"
20019-30 = "깔끔하게\n정돈되어 있군요.\n청소는…. 중요합니다."
20019-40 = "어서 오십시오.\n주문은 홍차입니까?\n…후훗"
20019-50 = "주인님은 정말…\n특별한 분이십니다."
20019-60 = "조금 더 정리할 곳은\n없는 걸까요…?"
20019-70 = "이참에, 주인님과\n함께 토끼의 길을\n걸어 보는 것도…?"
20019-80 = "기다리고 있었습니다, 주인님."
20019-90 = "아카네는 주인님만의\n충실한 토끼입니다."
20019-100 = "뿅뿅!"
20019-110 = "다녀오셨어요, 주인님?\n준비는 모두 끝마쳐 두었답니다."
20019-120 = "부지런한 토끼니까요."
20019-130 = "토끼가 되는 것은\n즐겁냐…… 고요?\n우후후. 그렇네요……"
20019-140 = "어떻게 보이세요?"
20019-150 = "원하는 게 있으시다면\n언제든 말씀해 주세요.\n기다리고 있겠습니다."
20019-160 = "주인님과 함께하는 이 시간이,\n제게는 무엇과도 바꿀 수 없는\n소중한 시간이랍니다."
20019-170 = "폭탄은 가장 효과적인\n청소 도구 중 하나죠."
20019-180 = "노, 농담이에요.\n그런 눈으로 바라보시면\n곤란하답니다, 주인님."
20019-190 = "토끼가 되는 것도,\n보다 완벽한 에이전트가\n되기 위한 길이라고\n생각하고 있습니다."
20019-200 = "아니면 보다 완벽한\n메이드가 되기 위한 길이거나요."
20019-210 = "생일 축하합니다, 주인님!"
20019-220 = "오늘은 토끼로부터의\n특별한 봉사를\n기대해 주시기 바랍니다."
20019-230 = "토끼의 특별한\n봉사, 가 뭐냐구요?"
20019-240 = "우후후…\n글쎄요, 뭘까요?"
20019-250 = "괜찮아요.\n무섭지 않답니다.\n자아, 착하죠. 착하죠…."
20019-260 = "제 생일,\n기억해 주신 건가요?"
20019-270 = "감사합니다, 주인님.\n아카네는 이보다\n기쁠 수 없답니다."
20019-280 = "새해 복 많이 받으세요,\n주인님."
20019-290 = "…벌써 신년이네요.\n올해는 정말\n좋은 일이 많으시길…"
20019-300 = "크리스마스로군요, 주인님."
20019-310 = "주인님과 함께라면\n매일이 특별하지만…\n오늘은 조금 더 특별한 날이죠."
20019-320 = "추워하는 토끼를 위해…\n함께 있어 주시겠어요?"
20019-330 = "아, 할로윈이로군요.\n제 복장도 오늘만큼은\n평범하게 보이겠지요."
20019-340 = "그래서…\n어떤 장난이 좋으세요?\n과자를 주셔도,\n장난은 칠 거니까요?"
20019-360 = "죄송합니다. 이런 생각,\n메이드로서는 실격일 텐데."
20019-370 = "저는 자신감을 잃고 있었어요."
20019-380 = "주인님은 늘\n많은 것을 짊어지시고,\n그러신데도 괜찮다며 웃으시고."
20019-390 = "저는… 전혀 그 짐을\n대신해서 들어드리지 못하고…"
20019-400 = "그렇지만 주인님의\n대답으로, 다시 자신감을\n찾을 수 있을 것 같아요."
20019-410 = "앞으로도, 부족한 몸이지만\n아무쪼록 잘 부탁드립니다.\n주인님."
20019-2600 = "이걸로 좀 더 완벽한…\n'토끼'가 될 수 있겠네요."

[translation]
26012-10 = "블루 아카이브!"
26012-20 = "발키리 경찰학교 소속, 생활안전국 라이프가드, 키리노입니다!\n위험한 상황은 본관에게 맡겨주세요!"
26012-30 = "응! 안전해 보이는\n곳이네요!"
26012-40 = "저 사람, 조금\n걱정되는데…\n눈여겨봐야겠네요."
26012-50 = "(봉사, 경청, 성실,\n그리고 미소!\n잊지 말아야겠죠!)"
26012-60 = "이거… 워터파크에도\n있으면 좋겠네요!"
26012-70 = "AED의 위치는……."
26012-80 = "기다리고 있었습니다, 선생님!\n준비운동부터 시작할까요?"
26012-90 = "안녕하세요, 선생님!\n오늘도 안전한 하루,\n보내고 계신가요?"
26012-100 = "물에 들어갈 때는\n심장에서 먼 곳부터\n적셔야 합니다!"
26012-110 = "음? 본관의 도움이\n필요하신 건가요?!"
26012-120 = "반응 확인, 긴급 신고,\n호흡 확인…… 그다음은……"
26012-130 = "마, 말하지 마세요! \n기억날 것 같습니다!"
26012-140 = "물에 빠졌을 때는 걱정 마세요!\n본관이 구해드릴 테니까요!"
26012-150 = "수난 사고는 언제든지\n발생할 수 있는 법입니다!"
26012-160 = "샬레의 사무실도\n예외는 아닙니다!"
26012-170 = "축하드려요, 선생님!"
26012-180 = "워터파크에 방문하시면,\n생일 선물로 슬라이드를\n연속 두 번 태워 드릴게요!"
26012-190 = "축하해 주셔서 감사합니다!"
26012-200 = "선생님도 즐겁고\n안전한 하루 되세요."
26012-210 = "올해는 모두가\n안전하게 지낼 수 있기를."
26012-220 = "메리 크리스마스입니다!"
26012-230 = "선생님, 본관의 단골집에서\n같이 드시지 않을래요?"
26012-240 = "떠들썩한 축제에는\n위험이 도사리기 마련이죠!"
26012-250 = "수영장은 아니지만,\n안전사고에 유의해야겠습니다!"
26012-270 = "선생님! 괜찮으세요?!"
26012-280 = "다행이다…… 눈을 뜨셨군요."
26012-290 = "큰일 난 줄 알았습니다."
26012-300 = "심폐소생술은……\n필요 없을 것 같네요."
26012-310 = "물가에서는 언제나\n주변 상황에 주의를\n기울여야 해요!"
26012-320 = "아무리 수영에\n자신 있는 사람이라도,\n불의의 사태는 언제든\n발생할 수 있으니까요."
26012-330 = "물론 본관과 같은 라이프가드가\n있다면 문제없지만요!"
26012-340 = "본관이 언제나 지켜보고\n있을 테니 안심해 주세요!"
26012-2600 = "사, 사격이 우수한 편은 아니지만,\n선생님의 안전을 위해서라면\n최선을 다할게요!"

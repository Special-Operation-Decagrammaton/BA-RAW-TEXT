[translation]
26012-10 = "蔚藍檔案！"
26012-20 = "我是女武神警察學園所屬，生活安全局救生員的桐乃！\n危險狀況就交給本官吧！"
26012-30 = "嗯！看起來\n是個安全的地方呢！"
26012-40 = "那個人，讓人\n有點擔心呢……\n得盯著他才行。"
26012-50 = "（奉獻、傾聽、\n　誠實，以及笑容！\n　千萬不能忘記！）"
26012-60 = "這個……\n真希望水上樂園\n裡面也有呢！"
26012-70 = "AED的位置在……"
26012-80 = "恭候多時了，老師！\n要不要做點暖身運動呢？"
26012-90 = "您好，老師！\n今天也有度過\n安全的一天嗎？"
26012-100 = "進入水裡的時候，\n要從離心臟遠的\n地方開始入水哦！"
26012-110 = "嗯？需要\n本官的幫助嗎！？"
26012-120 = "確認反應、緊急報告、\n確認呼吸……接下來是……"
26012-130 = "請，請先別說出來！\n我就快想起來了！"
26012-140 = "就算溺水也不必擔心！\n本官會去救您的！"
26012-150 = "水上意外隨時都\n有可能會發生！"
26012-160 = "就連夏萊的辦公室\n也不例外！"
26012-170 = "恭喜您，老師！"
26012-180 = "下次來水上樂園的時候，\n作為生日禮物，我會讓您\n連續坐兩次滑水道！"
26012-190 = "非常感謝您的祝福！"
26012-200 = "請老師您也度過\n快樂又安全的一天。"
26012-210 = "今年希望大家\n都能過得安全。"
26012-220 = "聖誕快樂！"
26012-230 = "老師，要不要去本官\n常去的店裡一起吃飯呀？"
26012-240 = "熱鬧的慶典\n常伴隨著危險！"
26012-250 = "雖然不是泳池，\n我還是想留意\n是否發生意外！"
26012-270 = "老師！您沒事吧！？"
26012-280 = "太好了……您醒過來了。"
26012-290 = "還以為真的要出大事了。"
26012-300 = "心肺復甦術……\n似乎不需要呢。"
26012-310 = "在水邊時，\n必須隨時注意\n周圍的狀況！"
26012-320 = "因為無論是對游泳\n多有自信的人，\n還是隨時可能發生意外。"
26012-330 = "當然，有像\n本官一樣的救生員在\n就不會有問題了！"
26012-340 = "本官會隨時守望著您，\n請儘管放心！"
26012-2600 = "雖，雖然我並不擅長射擊，\n但我會為了老師全力以赴！"

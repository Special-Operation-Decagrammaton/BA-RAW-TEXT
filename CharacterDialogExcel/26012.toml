[translation]
26012-10 = "Blue Archive!"
26012-20 = "ไลฟ์การ์ดคิริโนะจากสำนักรักษาความปลอดภัย สถาบันวัลคิรี่ค่ะ!\nหากมีเหตุอันตราย วางใจฉันได้เลยค่ะ!"
26012-30 = "อื้ม! ที่นี่ดู\nปลอดภัยดีนะคะ!"
26012-40 = "คนนั้นน่าเป็นห่วง\nอยู่นะคะ... คงต้อง\nให้ความสนใจแล้วค่ะ"
26012-50 = "(จิตอาสา รับฟัง ซื่อสัตย์\nและรอยยิ้ม!\nห้ามลืมเลยนะคะ!)"
26012-60 = "อันนี้... อยากให้มี\nในสวนน้ำด้วยจังค่ะ!"
26012-70 = "เครื่องกระตุกไฟฟ้าหัวใจ\nอยู่ไหนนะ..."
26012-80 = "กำลังรออยู่เลยค่ะคุณครู!\nมาวอร์มอัปกันก่อนมั้ยคะ?"
26012-90 = "สวัสดีค่ะคุณครู!\nวันนี้ก็ปลอดภัยดี\nใช่มั้ยคะ?"
26012-100 = "เวลาลงน้ำ ต้องให้\nจุดที่ไกลหัวใจ\nเปียกก่อนค่ะ!"
26012-110 = "หืม? ต้องการความช่วยเหลือ\nจากฉันเหรอคะ?! "
26012-120 = "เช็กการตอบสนอง แจ้งเหตุฉุกเฉิน\nเช็กการหายใจ... ต่อไปก็..."
26012-130 = "ยะ... อย่าพูดสิคะ! \nเหมือนจะนึกออกแล้วค่ะ!"
26012-140 = "ตอนตกน้ำ ไม่ต้องห่วงนะคะ!\nฉันจะช่วยเองค่ะ!"
26012-150 = "อุบัติเหตุทางน้ำ\nเกิดขึ้นได้ทุกเมื่อค่ะ!"
26012-160 = "ที่สำนักงานชาเล่ต์\nก็ไม่เว้นค่ะ!"
26012-170 = "สุขสันต์วันเกิดค่ะคุณครู!"
26012-180 = "ถ้ามาที่สวนน้ำ\nฉันจะให้เล่นสไลเดอร์\nเป็นของขวัญวันเกิด 2 รอบค่ะ!"
26012-190 = "ขอบคุณที่อวยพรให้นะคะ!"
26012-200 = "คุณครูเองก็มีวันที่\nสนุกและปลอดภัยนะคะ"
26012-210 = "หวังว่าปีนี้ ทุกคน\nจะปลอดภัยนะคะ"
26012-220 = "เมอร์รีคริสต์มาสค่ะ!"
26012-230 = "คุณครู ไปกินข้าวที่ร้านประจำ\nของฉันด้วยกันมั้ยคะ?"
26012-240 = "ในเทศกาลที่วุ่นวาย\nย่อมมีอันตรายซ่อนอยู่ค่ะ!"
26012-250 = "ถึงจะไม่ใช่สระว่ายน้ำ\nแต่ก็ต้องระวังอุบัติเหตุค่ะ!"
26012-270 = "คุณครู! เป็นยังไงบ้างคะ?! "
26012-280 = "โล่งอกไปที... ลืมตาแล้วสินะคะ"
26012-290 = "นึกว่าเกิดเรื่องใหญ่แล้วซะอีกค่ะ"
26012-300 = "การปั๊มหัวใจ...\nฉันว่าคงไม่จำเป็นแล้วละค่ะ"
26012-310 = "ถ้าอยู่ริมน้ำ\nเราต้องหมั่นระมัดระวัง\nสถานการณ์รอบๆ นะคะ!"
26012-320 = "ต่อให้เป็นคนที่ว่ายน้ำเก่งแค่ไหน\nก็อาจเจอเหตุการณ์ที่ไม่คาดคิดได้ค่ะ"
26012-330 = "แต่ก็แน่นอนว่าถ้ามีไลฟ์การ์ด\nอย่างฉันอยู่ ก็ไม่เป็นปัญหาหรอกค่ะ!"
26012-340 = "ฉันจะคอยสอดส่องอยู่ทุกเมื่อ\nงั้นก็วางใจได้เลยค่ะ!"
26012-2600 = "ฉะ... ฉันยิงปืนไม่ค่อยเก่ง\nแต่เพื่อความปลอดภัยของคุณครู\nฉันจะทำให้เต็มที่ค่ะ!"

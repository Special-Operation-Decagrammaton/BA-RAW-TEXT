[translation]
26012-10 = "Blue Archive!"
26012-20 = "Lifeguard Kirino of Valkyrie's Public Safety Bureau at your service! I'll handle any dangerous situation!"
26012-30 = "Yes! This looks like a safe spot!"
26012-40 = "I'm a little worried about that person. I should keep an eye on them."
26012-50 = "(Service, sensitivity, sincerity, and smiles! Don't forget!)"
26012-60 = "This... I wish we had this at the water park!"
26012-70 = "The AED is located at..."
26012-80 = "I've been waiting for you, Sensei! Shall we start the warm-up exercises?"
26012-90 = "Hello, Sensei! Are you having a safe day today?"
26012-100 = "When entering the water, start by getting the parts furthest from your heart wet!"
26012-110 = "Hm? Do you need my assistance?"
26012-120 = "Check for reactions, call emergency services, check breathing...then..."
26012-130 = "D-Don't say anything! I think it's coming back to me!"
26012-140 = "Don't worry if you fall into the water! I'll come save you!"
26012-150 = "Water accidents can happen at any time!"
26012-160 = "Even Schale's office isn't an exception!"
26012-170 = "Happy birthday, Sensei!"
26012-180 = "If you visit the water park, I'll let you ride the slide two times in a row, as a birthday treat!"
26012-190 = "Thank you for the birthday wishes!"
26012-200 = "I hope you have a safe and enjoyable day, Sensei!"
26012-210 = "Let's keep everyone safe this year!"
26012-220 = "It's a very Merry Christmas!"
26012-230 = "Sensei, how about a meal at my favorite spot in the main building?"
26012-240 = "During a lively festival, dangers are bound to arise!"
26012-250 = "It's not a swimming pool, but you still need to be cautious for safety risks!"
26012-270 = "Sensei! Are you okay?!"
26012-280 = "Thank goodness you've opened your eyes."
26012-290 = "You scared me for a second."
26012-300 = "Looks like CPR won't be necessary."
26012-310 = "When you're near water, you should always stay alert to your surroundings!"
26012-320 = "Even the most capable swimmer can face unexpected situations at any time."
26012-330 = "Of course, with a lifeguard like me on duty, there's no need to worry!"
26012-340 = "I'll always keep a close eye on things. You'll be safe!"
26012-2600 = "I'm not the best shot, but I'll put my all into ensuring your safety, Sensei!"

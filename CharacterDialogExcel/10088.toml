[translation]
10088-10 = "블루 아카이브."
10088-20 = "안녕. 별로… 익숙한 옷이 아니라서\n좀 이상하다면 미안. 잘 부탁해, 선생."
10088-30 = "나쁘지 않은\n센스인걸."
10088-40 = "시선이\n느껴지는데…"
10088-50 = "…흠. 선생은,\n이런 취향이구나?"
10088-60 = "…뭔가 마음이 편해져."
10088-70 = "어디 앉을 데 없을까."
10088-80 = "왔구나, 선생.\n오늘은 뭘 할까?"
10088-90 = "안녕, 선생.\n오늘 일정 있어?"
10088-100 = "딱히 없다면… 그…"
10088-110 = "아냐, 아무것도."
10088-120 = "이 드레스…\n…잘 어울린다고…?"
10088-130 = "…고마워.\n그렇게 말해주니 기뻐."
10088-140 = "선생 마음에 든다면,\n앞으로도 입어볼까."
10088-150 = "아… 그러니까,\n가끔, 말야."
10088-160 = "왠지, 평소와 다른\n느낌이 들어."
10088-170 = "나답지 않다고나 할까…\n왜지…"
10088-180 = "뭐… 그것도\n나쁘진 않겠지. 후후."
10088-190 = "…아, 지금 얘기,\n비밀로 해줘. 알았지?"
10088-200 = "생일 축하해, 선생.\n뭐 해줬으면 하는 거, 있어?"
10088-210 = "…아, 한다고는 해도\n일은 아니니까."
10088-220 = "내 생일…?"
10088-230 = "아, 그랬지."
10088-240 = "고마워.\n생각도 안 하고 있었네."
10088-250 = "새해 복 많이 받아, 선생."
10088-260 = "모처럼 드레스도 입었겠다…"
10088-270 = "파티라도 할래?"
10088-280 = "크리스마스라…"
10088-290 = "어? 이런 차림으로\n같이 걸으면 오해받을 텐데,\n괜찮아?"
10088-300 = "할로윈의 가장…?"
10088-310 = "나는 이미 준비 다 됐어."
10088-330 = "…좋네."
10088-340 = "이렇게…\n누군가와 함께 멍하니\n시간을 보내다니."
10088-350 = "…거의 해본 적 없는 거 같아."
10088-360 = "…맞아, 항상 혼자.\n그게 좋다고 생각했었고."
10088-370 = "…정말?"
10088-380 = "후후, 다행이다,\n선생님도 좋아해 줘서."
10088-390 = "좋지, 이렇게 조용히 지내는 거."
10088-400 = "…아, 그렇다고 평소가\n싫다는 건 아니지만."
10088-410 = "…선생님이라면 알겠지."
10088-420 = "후우… 저기…"
10088-430 = "…조금만…"
10088-440 = "조금만 더… 여기 있어 줘."
10088-2600 = "가끔 생각해. 지금까지 여러 가지 받아왔지만…\n제대로 돌려줄 수 있을까 하고.\n하지만… 아마 그런 날은 오지 않을 테니,\n먼저 말해둘게. …고마워, 선생.\n앞으로도…열심히 할게."

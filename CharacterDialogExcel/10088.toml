[translation]
10088-10 = "Blue Archive."
10088-20 = "Hey. These kinds of clothes aren't my usual style. Sorry if I'm weird about it. I'm putting my trust in you, Sensei."
10088-30 = "Not bad. You've got a pretty strong fashion sense."
10088-40 = "I feel like I'm being watched..."
10088-50 = "Hmm... So this is your idea of fashion, Sensei?"
10088-60 = "...Hmm, I feel pretty comfy."
10088-70 = "I really could use a place to sit down."
10088-80 = "Oh, Sensei. You're here. What shall we do today?"
10088-90 = "Hey, Sensei. Got any plans?"
10088-100 = "If there's nothing in particular...then maybe..."
10088-110 = "No, never mind."
10088-120 = "This dress suits me?"
10088-130 = "...Thank you... Happy to hear it."
10088-140 = "If you like it, maybe I should wear it more often."
10088-150 = "Oh... I mean, once in a while."
10088-160 = "Something feels different today for some reason."
10088-170 = "I don't feel like my usual self... I wonder why..."
10088-180 = "Then again, I don't really mind. Heehee."
10088-190 = "...Oh, but keep what I said a secret, okay?"
10088-200 = "Happy birthday, Sensei. Anything you want?"
10088-210 = "...Ah. I did say anything but I'm not helping you work."
10088-220 = "My birthday?"
10088-230 = "Oh, right."
10088-240 = "Thanks. I wasn't even thinking about it."
10088-250 = "Happy New Year, Sensei."
10088-260 = "Since I'm already dressed up..."
10088-270 = "Wanna throw a party?"
10088-280 = "It's Christmas..."
10088-290 = "Hm? Walking together in this outfit might cause some misunderstandings. Are you all right with that?"
10088-300 = "A Halloween costume?"
10088-310 = "I'm already set."
10088-330 = "...This is nice."
10088-340 = "Just idly spending time with someone..."
10088-350 = "...I rarely ever have the chance to do something like this."
10088-360 = "...And it was always by myself. I used to think that was the best."
10088-370 = "...Really?"
10088-380 = "Heehee. I'm glad you like it too, Sensei."
10088-390 = "It's nice, having quiet moments like this."
10088-400 = "...I mean...not that I don't enjoy how things usually are."
10088-410 = "...You know what I mean, Sensei."
10088-420 = "*sigh*...Hey..."
10088-430 = "...How about..."
10088-440 = "How about we...stay out here a little bit longer?"
10088-2600 = "Sometimes I wonder... I've been given so much... I don't know if I could ever pay it back. Maybe I never will... In that case, thank you, Sensei. I'll keep doing the best I can."

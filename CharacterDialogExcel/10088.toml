[translation]
10088-10 = "蔚藍檔案。"
10088-20 = "你好。因為……不是我習慣穿的衣服，\n如果有點奇怪的話，抱歉……請多指教，老師。"
10088-30 = "品味還不錯呢。"
10088-40 = "好像感覺\n到了視線……"
10088-50 = "……哼嗯，原來\n老師喜歡這種啊？"
10088-60 = "……感覺很平靜。"
10088-70 = "感覺能坐的地方…\n沒有嗎？"
10088-80 = "歡迎你來，老師。\n今天要做什麼好呢？"
10088-90 = "你好，老師。\n今天有行程嗎？"
10088-100 = "沒有的話……\n那個……"
10088-110 = "不，沒什麼。"
10088-120 = "這套禮服……\n很適合我……？"
10088-130 = "……謝謝。\n你能這麼說讓我很高興。"
10088-140 = "要是老師喜歡的話，\n我以後要不要也這樣穿？"
10088-150 = "啊……那個，\n我是說……偶爾。"
10088-160 = "總覺得，有股跟\n平時不一樣的感覺。"
10088-170 = "該說不太像我嗎……\n為什麼呢……"
10088-180 = "不過……這樣也\n不錯吧。呵呵。"
10088-190 = "……啊，剛才說的話，\n別跟其他人說哦。知道嗎？"
10088-200 = "生日快樂，老師。\n有沒有什麼希望我為你做的事？"
10088-210 = "……啊，雖然我說做，\n但指的不是工作哦。"
10088-220 = "我的生日……？"
10088-230 = "啊，說的也是。"
10088-240 = "謝謝你。\n我完全忘記了。"
10088-250 = "新年快樂，老師。"
10088-260 = "難得穿了禮服……"
10088-270 = "要不要辦個派對？"
10088-280 = "聖誕節啊……"
10088-290 = "……嗯？穿成這樣\n一起出去的話，會被人\n誤會的唷。沒關係嗎？"
10088-300 = "萬聖節的裝扮……？"
10088-310 = "我已經準備好了。"
10088-330 = "……真不錯呢。"
10088-340 = "像這樣……\n和某個人一起\n放空度過時間……"
10088-350 = "……好像幾乎沒做過這種事。"
10088-360 = "……沒錯，總是獨自一人。\n我其實覺得那樣也不錯。"
10088-370 = "……真的嗎？"
10088-380 = "呵呵，太好了，\n老師你也喜歡。"
10088-390 = "很棒對吧，像這樣\n靜靜消磨時間的感覺。"
10088-400 = "……啊，不過我沒有\n討厭平常生活的意思。"
10088-410 = "……老師應該明白吧。"
10088-420 = "呼……那個……"
10088-430 = "……稍微……"
10088-440 = "再稍微……\n多待一會吧。"
10088-2600 = "我有時候會這麼想。\n至今為止接受的這麼多東西……\n我真的能夠好好回報嗎。\n可是……那種日子好像不會到來，\n所以我就先說了……謝謝你，老師。\n我以後……也會努力的。"

[translation]
10088-10 = "Blue Archive"
10088-20 = "สวัสดี ฉันไม่ค่อยชินกับชุดนี้เท่าไร\nถ้ามันดูแปลกๆ ก็ขอโทษนะ ฝากตัวด้วยนะครู"
10088-30 = "เซนส์ไม่เลวเลยนะเนี่ย"
10088-40 = "รู้สึกเหมือน\nมีคนจ้องอยู่เลย..."
10088-50 = "ฮึ่ม... ครูชอบ\nอะไรแบบนี้สินะ?"
10088-60 = "รู้สึกสบายใจขึ้นมาเลย"
10088-70 = "มีที่ให้นั่งพักบ้างมั้ยนะ"
10088-80 = "มาแล้วเหรอครู\nวันนี้ทำอะไรดี?"
10088-90 = "สวัสดี ครู\nวันนี้มีงานมั้ย?"
10088-100 = "ถ้าไม่มีละก็... อืม..."
10088-110 = "ไม่หรอก ไม่มีอะไร"
10088-120 = "ชุดเดรสนี้...\nเหมาะกับฉันงั้นเหรอ...?"
10088-130 = "ขอบคุณนะ...\nพูดอย่างนั้นฉันก็ดีใจนะ"
10088-140 = "ถ้าถูกใจครูละก็\nไว้ต่อไปฉันก็ใส่อีกดีมั้ย"
10088-150 = "อ่า... แบบว่า\nนานๆ ทีถึงจะใส่น่ะ"
10088-160 = "ไม่รู้ทำไมถึงรู้สึกว่า\nแตกต่างจากปกติน่ะ"
10088-170 = "เหมือนไม่เป็นตัวเองเลย...\nทำไมกันนะ..."
10088-180 = "ก็นะ... อันนั้นก็\nคงไม่แย่หรอกเนอะ ฮุฮุ"
10088-190 = "อ่า... เรื่องที่คุยตอนนี้\nเก็บไว้เป็นความลับนะ เข้าใจมั้ย?"
10088-200 = "สุขสันต์วันเกิดนะครู\nมีอะไรที่อยากให้ฉันทำให้มั้ย?"
10088-210 = "อ่า... ถึงจะบอกว่าทำ\nแต่มันก็ไม่ใช่งานหรอก"
10088-220 = "วันเกิดฉันเหรอ?"
10088-230 = "อ่า จริงด้วย"
10088-240 = "ขอบคุณนะ\nฉันลืมคิดไปเลย"
10088-250 = "สุขสันต์วันปีใหม่นะครู"
10088-260 = "ไหนๆ ก็ใส่ชุดเดรสมาแล้ว..."
10088-270 = "มาจัดปาร์ตี้กันมั้ย?"
10088-280 = "วันคริสต์มาส..."
10088-290 = "อืม...? ถ้าออกไปด้วยกันทั้งอย่างนี้\nอาจถูกเข้าใจผิดได้นะ จะโอเคเหรอ?"
10088-300 = "การแกล้งกันในวันฮาโลวีน..."
10088-310 = "ฉันเตรียมพร้อมแล้วละ"
10088-330 = "ดีจังเลยนะ..."
10088-340 = "ที่ได้...\nมาอยู่กับใครสักคน\nแล้วนั่งเหม่อลอยแบบนี้"
10088-350 = "เหมือนว่า... ฉันไม่เคยทำมาก่อนเลย"
10088-360 = "ใช่... ปกติฉันคิดว่า\nชอบอยู่คนเดียวมาตลอด"
10088-370 = "จริงเหรอ...?"
10088-380 = "ฮุฮุ ค่อยยังชั่วนะ\nที่คุณครูก็ชอบทำแบบนี้ด้วย"
10088-390 = "มันดีอยู่แล้วละ\nที่ได้มาอยู่เงียบๆ แบบนี้น่ะ"
10088-400 = "อ้อ... แต่ก็ใช่ว่า\nฉันจะไม่ชอบเวลาปกติหรอกนะ"
10088-410 = "แต่ถ้าเป็นคุณครู... ก็น่าจะเข้าใจนะ"
10088-420 = "ฮู่ว... เอ่อ..."
10088-430 = "ช่วยอยู่ด้วยกันต่อ..."
10088-440 = "อีกนิด... อีกนิดหนึ่งเถอะนะ"
10088-2600 = "บางทีฉันก็คิดว่าที่ผ่านมาได้รับอะไร\nตั้งมากมาย... แต่จะตอบแทนกลับดีๆ\nได้บ้างมั้ย แต่ว่า... บางทีวันนั้นอาจจะ\nไม่มาถึงก็ได้ งั้นฉันจะบอกไว้ก่อน\nขอบคุณนะครู ต่อไปฉันก็จะพยายามนะ"

[translation]
23000-20 = "ยินดีต้อนรับค่ะ คุณครู\nคุณครูชอบไอศกรีมแบบไหนเหรอคะ?"
23000-30 = "อืม... กินอะไรดีน้า..."
23000-40 = "วันนี้ฉันก็...\nรสมินต์กับสตรอว์เบอร์รี่\nแล้วกัน~"
23000-50 = "ไอศกรีม~\nไอศกรีม~"
23000-60 = "หลังเลิกเรียน\nก็ต้องเป็นของหวานสิคะ!"
23000-70 = "มินต์กับสตรอว์เบอร์รี่น่ะ\nสุดยอดไปเลย!"
23000-80 = "คุณครู~ มาแล้วเหรอคะ?\nวันนี้ก็จะไปกินของหวาน\nด้วยกันอีกใช่มั้ยคะ?"
23000-90 = "คุณครู มาช้านะคะ~"
23000-100 = "ไปซื้อไอศกรีม\nด้วยกันเถอะค่ะ!"
23000-110 = "อื้มมม~\nฉันชอบของหวานๆ ที่สุดเลย~"
23000-120 = "คุณครูก็ชอบทานไอศกรีมเหมือนกัน\nใช่มั้ยคะ? ใช่หรือเปล่าคะ?"
23000-130 = "หลังเลิกเรียน\nก็ได้เวลาของหวานแล้ว~"
23000-140 = "เพื่อขนมหวานแสนอร่อย~\nวันนี้ก็มาพยายามไปด้วยกันนะคะ!"
23000-150 = "หือ? คุณครูคะ\nสีหน้าคุณครู... ดูเหมือน\nกังวลอะไรบางอย่างเลยนะคะ"
23000-160 = "เวลาแบบนี้ ดีล่ะ!\nไปกินขนมหวาน\nด้วยกันนะคะ!"
23000-170 = "คุณครู!\nสุขสันต์วันเกิดค่ะ!"
23000-180 = "วันนี้ฉันจองร้านขนมหวาน...\nร้านพิเศษเอาไว้แล้วนะคะ!"
23000-190 = "รีบไปกันเถอะค่ะ! คุณครู!"
23000-200 = "คุณครูขา~\nวันนี้เป็นวันเกิดของฉันค่ะ!\nไปกินไอศกรีมด้วยกันเถอะนะคะ!"
23000-210 = "หืม? ทำไมน่ะเหรอคะ?"
23000-220 = "ไม่เป็นไรหรอกค่ะ~\nคุณครูคือของขวัญของฉันยังไงล่ะคะ!"
23000-230 = "คุณครู~\nขอให้มีความสุขมากๆ ในวันปีใหม่นะคะ"
23000-240 = "วันนี้เราก็มาพยายาม~\nสู้ๆ ไปด้วยกันนะคะ~"
23000-250 = "ว้าว คุณครูคะ~!\nวันคริสต์มาสค่ะ!"
23000-260 = "ในวันแบบนี้...\nไอศกรีมเหมาะที่สุดแล้วค่ะ!\nไปด้วยกันมั้ยคะ?"
23000-270 = "ฮิฮิ\nวันนี้คือวันฮาโลวีนค่ะ"
23000-280 = "เรามาแต่งตัวเป็นผีแล้วออกไป\nรับขนมหวานด้วยกันมั้ยคะ?"
23000-290 = "ทริก ออร์ ทรีต~"
23000-310 = "ขอบคุณที่เลี้ยงไอศกรีมฉันนะคะ\nคุณครู"
23000-320 = "มัน... หวานอร่อยดีจังเลยค่ะ!"
23000-330 = "ฉันไม่ได้กินไอศกรีม\nที่ขายข้างนอกคาเฟ่แบบนี้\nมานานมากๆ แล้วค่ะ"
23000-340 = "แถมยังได้นั่งกินไอศกรีม\nกับคุณครูแบบนี้ด้วย ฮิฮิ..."
23000-350 = "มะ...ไม่เลยค่ะ\nไม่เป็นไรจริงๆ ค่ะ"
23000-360 = "ฉันกลับ...รู้สึกคิดถึงบรรยากาศ\nและความสุขแบบนี้ซะอีกค่ะ"
23000-370 = "มันทั้งสนุก...แล้วก็..."
23000-380 = "จะว่ายังไงดีนะ...\nคนที่อยู่แถวๆ นี้ก็ไม่เยอะด้วย..."
23000-390 = "จะบอกว่า...\nตื่นเต้นได้มั้ยนะ"
23000-400 = "มะ... มะ... ไม่มีอะไรค่ะ!"
23000-410 = "ช่วยลืมที่ฉันพูดไปเมื่อกี้ทีนะคะ!"
23000-420 = "แหะๆ ฮ่าๆๆๆ..."
23000-430 = "ขอบคุณนะคะ คุณครู"
23000-440 = "วันนี้คุณครูทำให้ฉัน\nมีความสุขมากเลยละค่ะ"
23000-2600 = "...อะ...อาวุธนี่...\nขอบคุณนะคะคุณครู\nถึงฉันจะกลัวการแข็งแกร่งขึ้น...\nแต่ถ้าอยู่กับคุณครูละก็\nฉันก็ไม่กลัวค่ะ!"

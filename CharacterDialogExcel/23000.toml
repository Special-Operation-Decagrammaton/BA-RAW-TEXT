[translation]
23000-20 = "반가워요, 선생님~\n선생님은 무슨 아이스크림을 좋아하세요?"
23000-30 = "음,\n뭘 먹을까나…"
23000-40 = "오늘도 역시\n민트&딸기~"
23000-50 = "아이스크림~\n아이스크림~"
23000-60 = "방과 후엔\n역시 디저트죠!"
23000-70 = "민트와 딸기는 최고!"
23000-80 = "선생님~ 오셨어요?\n오늘도 같이 디저트\n먹으러 가실 거죠?"
23000-90 = "선생님, 늦었다구요~"
23000-100 = "같이 아이스크림\n사먹으러 가요!"
23000-110 = "흠흠~\n달콤한 건 너무 좋아요~"
23000-120 = "선생님도 아이스크림\n좋아하죠? 그렇죠?"
23000-130 = "방과 후엔\n디저트 타임~"
23000-140 = "맛있는 디저트를 위해~\n오늘도 같이 힘내요!"
23000-150 = "응? 선생님.\n고민이 있어 보이는\n얼굴이네요."
23000-160 = "그럴 땐, 자자!\n맛있는 디저트를 먹으러!\n함께 가는 거예요!"
23000-170 = "선생님!\n생일 축하드려요!"
23000-180 = "제가 특별히!\n맛있는 디저트 집을\n예약해 뒀다구요!"
23000-190 = "자자, 어서 가요! 선생님!"
23000-200 = "선생님~\n오늘은 제 생일이에요!\n같이 아이스크림 먹으러 가요!"
23000-210 = "응?\n선물은 안받냐구요?"
23000-220 = "괜찮아요~\n선생님이 제 선물인걸요!"
23000-230 = "선생님~\n새해 복 많이 받으세요~"
23000-240 = "올해도 맛있는 디저트를 위해!\n함께 힘내요~"
23000-250 = "와, 선생님~!\n크리스마스예요!"
23000-260 = "이런 날엔 역시\n아이스크림이 어울리죠!\n같이 갈까요?"
23000-270 = "헤헷,\n오늘은 할로윈이네요."
23000-280 = "같이 유령 분장하고\n달콤한 걸 얻으러 가볼까요?"
23000-290 = "Trick or Treat~"
23000-310 = "제 것도 사주셔서 감사해요.\n선생님."
23000-320 = "다, 달콤해서 맛있네요!"
23000-330 = "카페가 아닌 밖에서\n먹는 아이스크림은\n정말 오랜만이네요."
23000-340 = "그것도 선생님과 함께라니. 헤헷."
23000-350 = "아, 아니에요. 정말 괜찮아요."
23000-360 = "되려 그립고, 기쁜 느낌인 걸요."
23000-370 = "즐겁고, 그리고…"
23000-380 = "뭐라고 해야 할까…\n주변에 사람도 적고…"
23000-390 = "굉장히, 두근두근 거린다고\n해야 할까…"
23000-400 = "아, 아, 아니에요!"
23000-410 = "방금 제가 한 말은 잊어주세요!"
23000-420 = "하하, 하하하하…"
23000-430 = "고마워요, 선생님."
23000-440 = "오늘은 선생님 덕분에\n정말 행복한 하루가 된 것 같아요."
23000-2600 = "…이 무기는…\n감사합니다. 선생님.\n강해진다는 건 조금 두렵지만…\n선생님과 함께라면 괜찮아요!"

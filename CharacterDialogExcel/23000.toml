[translation]
23000-20 = "Well met, Sensei! What kind of ice cream do you like?"
23000-30 = "Hmm. What to eat..."
23000-40 = "You can't go wrong with strawberry mint!"
23000-50 = "Ice cream! Ice cream!"
23000-60 = "School is out! It'd be a crime not to enjoy some dessert!"
23000-70 = "Strawberry and mint are the best!"
23000-80 = "There you are, Sensei. You're going to come with me to get dessert, yes?"
23000-90 = "Sensei, you're late!"
23000-100 = "Let's go get some ice cream!"
23000-110 = "Yummm... Nothing beats sweets!"
23000-120 = "You like ice cream too, right?"
23000-130 = "After-school time is dessert time!"
23000-140 = "Let's give it our all today and earn some tasty desserts for later!"
23000-150 = "Is something wrong, Sensei? You look like something's on your mind."
23000-160 = "In that case, come on! Let's go get some sweets!"
23000-170 = "Happy birthday, Sensei!"
23000-180 = "I made a reservation at a great dessert place!"
23000-190 = "Come on, Sensei. Let's go already!"
23000-200 = "Sensei! Today is my birthday! Let's go get ice cream together!"
23000-210 = "Huh? Do I want a present?"
23000-220 = "I've already received one! You're the only gift I need, Sensei!"
23000-230 = "Happy New Year! Sensei!"
23000-240 = "Let's make it another good one, filled with plenty of tasty desserts!"
23000-250 = "Look, Sensei. It's Christmas!"
23000-260 = "What better day to enjoy ice cream together? Let's go!"
23000-270 = "Heehee. Today is Halloween."
23000-280 = "Let's dress up as ghosts and go get ourselves some sweets!"
23000-290 = "Trick or treat!"
23000-310 = "Aw. Thank you for treating me, Sensei."
23000-320 = "It's so...sweet!"
23000-330 = "It's been a long time since I've had ice cream not from a cafe."
23000-340 = "It's even better having it with you."
23000-350 = "N-No, it's really okay."
23000-360 = "I would say it's more fun this way."
23000-370 = "I'm enjoying myself because..."
23000-380 = "Well, you know. It's just the two of us here..."
23000-390 = "My heart feels like it's going to leap out of my chest."
23000-400 = "I-I mean, nothing!"
23000-410 = "You didn't hear anything!"
23000-420 = "Haha, hahaha..."
23000-430 = "Thank you, Sensei."
23000-440 = "I think today will be a good one thanks to you."
23000-2600 = "This weapon is... Thank you, Sensei. Finding strength isn't easy, but you give me the confidence I need to try!"

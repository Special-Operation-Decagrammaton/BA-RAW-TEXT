[translation]
10056-10 = "블루 아카이브."
10056-20 = "메리 크리스마스! 구호기사단의 세리나입니다!\n특별한 크리스마스 보내세요!"
10056-30 = "모두, 감기\n조심하세요."
10056-40 = "구급약도 선물이\n될 수 있으려나……"
10056-50 = "착한 아이에게\n보내는 선물……\n뭐가 좋을까요?"
10056-60 = "무리하면 안 돼요.\n건강이 최고랍니다."
10056-70 = "여러분의 건강을\n진심으로 기원\n하겠습니다."
10056-80 = "어서 오세요, 선생님!\n오늘의 세리나는\n산타랍니다. 후훗."
10056-90 = "돌아오셨군요, 선생님!\n메리 크리스마스!"
10056-100 = "아이들에게 건네주는\n선물로 고민이신가요?"
10056-110 = "저와 같이 생각해 볼까요……\n후훗."
10056-120 = "아이들의 꿈을 위해서라도\n산타는 필요하답니다."
10056-130 = "만약 내가 진짜\n산타였다면……"
10056-140 = "좀 더 선생님에게\n도움이 됐을까…?"
10056-150 = "부르셨나요?\n네. 선생님의 세리나예요."
10056-160 = "오늘의 세리나는\n산타랍니다."
10056-170 = "언제든지 말씀해 주세요."
10056-180 = "마음의 준비라면……\n되어 있으니까요."
10056-190 = "선생님, 생일 축하드려요!"
10056-200 = "선물, 기대하며\n기다려 주세요."
10056-210 = "생일…… 제, 생일이요……?"
10056-220 = "앗, 바빠서 잊고 있었어요!\n고맙습니다!"
10056-230 = "얼마 전에 크리스마스\n였던 거 같은데,\n벌써 설이네요."
10056-240 = "새해 복 많이 받으세요."
10056-250 = "앞으로도 여러분의\n행복이 계속된다면,\n저도 기쁠 거예요."
10056-260 = "크리스마스네요!\n어떤가요…… 어울리나요?"
10056-270 = "이 차림으로 걷다 보니\n할로윈 복장으로 오해받았어요."
10056-280 = "그런 의도는 아니었는데…"
10056-300 = "선, 선생님?\n이 목도리를… 저에게?"
10056-310 = "하, 하지만…\n오늘은 제가 산타인데요."
10056-320 = "사실은, 제가\n선물을 드려야 하는데……"
10056-330 = "선생님께서 선물을 주시다니……"
10056-340 = "네? 산타도 보상을\n받아도 좋다, 고요……?"
10056-350 = "그렇게 말씀하신다면……"
10056-360 = "후훗……"
10056-370 = "감사합니다. 소중히 할게요."
10056-2600 = "와, 감사합니다. 알고 계신가요?\n산타 할아버지는 우는 아이\n에게는 선물을 줄 수 없대요.\n그러니까 선생님은 울면 안 돼요?"

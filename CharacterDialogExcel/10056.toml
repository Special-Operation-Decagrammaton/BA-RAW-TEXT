[translation]
10056-10 = "蔚藍檔案。"
10056-20 = "聖誕快樂！我是救護騎士團的芹奈！\n一起度過特別的聖誕節吧！"
10056-30 = "請大家\n小心不要感冒了。"
10056-40 = "急救藥品\n也能當禮物嗎……"
10056-50 = "送給乖孩子\n的禮物……\n什麼比較好呢？"
10056-60 = "逞強是不行的唷。\n健康最重要。"
10056-70 = "我誠心祈禱，\n大家都能身體健康。"
10056-80 = "歡迎回來，老師！\n今天的芹奈是\n聖誕老人唷？呵呵。"
10056-90 = "我在等你哦，老師！\n聖誕快樂！"
10056-100 = "你在煩惱要送孩子們\n什麼禮物嗎？"
10056-110 = "要不要跟我一起想……\n呵呵。"
10056-120 = "為了孩子們的夢想，\n聖誕老人是必要的。"
10056-130 = "如果我是真的\n聖誕老人……"
10056-140 = "就能幫老師\n更多的忙嗎……？"
10056-150 = "你找我嗎？\n是的，我是老師的芹奈。"
10056-160 = "今天的芹奈是\n聖誕老人唷。"
10056-170 = "隨時都可以叫我哦。"
10056-180 = "心理準備……\n我已經做好了。"
10056-190 = "老師，生日快樂！"
10056-200 = "至於禮物，\n請懷抱期待等著哦。"
10056-210 = "生日……\n我的，生日嗎……？"
10056-220 = "啊，忙到\n我都忘記了！\n非常感謝！"
10056-230 = "聖誕節剛過完，\n已經是新年了呢。"
10056-240 = "新年快樂。"
10056-250 = "今後大家能\n一直幸福下去的話，\n我也很開心。"
10056-260 = "聖誕節到了呢！\n怎麼樣……適合我嗎？"
10056-270 = "穿著這身打扮走動，\n被誤以為是萬聖節的變裝了。"
10056-280 = "但我並沒有意識到……"
10056-300 = "老，老師？要把\n這條圍巾……送給我嗎？"
10056-310 = "可，可是……\n今天的我是聖誕老人唷。"
10056-320 = "本來，我才是\n要送禮物一方才對……"
10056-330 = "老師卻送禮物給我……"
10056-340 = "咦？聖誕老人也該\n得到獎勵……？"
10056-350 = "既然老師這麼說……"
10056-360 = "呵呵。"
10056-370 = "謝謝，我會好好珍惜的。"
10056-2600 = "哇，謝謝。你知道嗎？\n聖誕老人是不會\n送禮物給正在哭的孩子的。\n所以，請老師不要哭哦？"

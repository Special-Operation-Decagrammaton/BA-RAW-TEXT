[translation]
10056-10 = "Blue Archive"
10056-20 = "เมอร์รีคริสต์มาส~! เซรินะจากชมรมอัศวินบรรเทาทุกข์ค่ะ!\nขอให้เป็นคริสต์มาสที่พิเศษนะคะ!"
10056-30 = "ทุกคน\nระวังเป็นหวัดนะคะ"
10056-40 = "ยาในชุดปฐมพยาบาล\nใช้เป็นของขวัญได้มั้ยนะ..."
10056-50 = "จะส่งของขวัญอะไร\nให้เด็กที่ว่านอนสอนง่าย\nดีเหรอคะ?"
10056-60 = "อย่าหักโหมนะคะ\nสุขภาพสำคัญที่สุดค่ะ"
10056-70 = "ฉันขออวยพรให้\nทุกคนมีสุขภาพดีนะคะ"
10056-80 = "เข้ามาสิคะคุณครู!\nวันนี้เซรินะ\nเป็นซานต้าค่ะ ฮิฮิ"
10056-90 = "กลับมาแล้วเหรอคะคุณครู?\nเมอร์รีคริสต์มาส~!"
10056-100 = "กำลังกลุ้มใจว่าจะให้\nของขวัญอะไรเด็กๆ เหรอคะ?"
10056-110 = "มาคิดด้วยกันกับฉันมั้ยคะ...\nฮิฮิ"
10056-120 = "เราต้องมีซานต้าค่ะ\nอย่างน้อยก็เพื่อ\nความฝันของเด็กๆ ค่ะ"
10056-130 = "ถ้าฉันเป็น\nซานต้าจริงๆ ละก็..."
10056-140 = "จะช่วยเหลือคุณครู\nได้มากกว่านี้มั้ยนะ?"
10056-150 = "เรียกฉันเหรอคะ?\nฉันเองค่ะ เซรินะของคุณครูเองค่ะ!"
10056-160 = "วันนี้เซรินะ\nเป็นซานต้าค่ะ"
10056-170 = "บอกมาได้ตลอดเลยค่ะ"
10056-180 = "เพราะฉันเตรียมใจ\nไว้พร้อมตลอดแล้วค่ะ"
10056-190 = "คุณครู สุขสันต์วันเกิดค่ะ!"
10056-200 = "ช่วยตั้งตารอรับ\nของขวัญด้วยนะคะ"
10056-210 = "วันเกิด... วันเกิดฉันเหรอคะ...?"
10056-220 = "อ๊ะ ฉันยุ่งจนลืมไปเลยค่ะ!\nขอบคุณนะคะ!"
10056-230 = "คริสต์มาสเพิ่งผ่านไป\nเมื่อไม่นานมานี้เอง\nปีใหม่แล้วเหรอคะเนี่ย"
10056-240 = "สวัสดีปีใหม่นะคะ"
10056-250 = "ถ้าทุกคนมีความสุข\nอย่างนี้ไปเรื่อยๆ\nฉันก็จะดีใจด้วยค่ะ"
10056-260 = "คริสต์มาสมาถึงแล้วค่ะ!\nเป็นไงคะ... เข้ากับฉันมั้ยคะ?"
10056-270 = "พอฉันเดินในชุดนี้\nมีคนเข้าใจผิดว่าเป็น\nชุดฮาโลวีนด้วยละค่ะ"
10056-280 = "ฉันไม่ได้ตั้งใจให้เป็นแบบนั้นนะ..."
10056-300 = "คะ... คุณครู?\nผ้าพันคอนี้... ให้ฉันเหรอคะ?"
10056-310 = "ตะ... แต่ว่า...\nวันนี้ฉันคือซานต้านะคะ"
10056-320 = "ที่จริงฉันต้อง\nเป็นฝ่ายให้ของขวัญสิ..."
10056-330 = "กลับเป็นคุณครูที่ให้ของขวัญแทน..."
10056-340 = "คะ? ซานต้าก็รับรางวัล\nได้เหมือนกันเหรอคะ...?"
10056-350 = "ถ้าคุณครูว่าอย่างนั้นก็..."
10056-360 = "ฮุฮุ..."
10056-370 = "ขอบคุณมากเลยนะคะ\nฉันจะรักษาอย่างดีเลยค่ะ"
10056-2600 = "ว้าว ขอบคุณค่ะ! คุณครูรู้อยู่แล้วเหรอคะ?\nคุณลุงซานต้าบอกว่าจะไม่ให้\nของขวัญเด็กที่ร้องไห้ค่ะ\nเพราะงั้นคุณครูก็ห้ามร้องนะคะ"

[translation]
16014-10 = "Blue Archive！嘿嘿！"
16014-20 = "伊吹登場！老師，讓你久等囉～！"
16014-30 = "七乘一等於…七…\n七乘二等於…十四…"
16014-40 = "這裡是哪裡？\n伊吹，可以探險嗎～？"
16014-50 = "該跟老師\n玩什麼好呢……"
16014-60 = "大人喜歡\n這種東西嗎……？\n唔嗯～不太理解……"
16014-70 = "伊吹，\n一個人很無聊……"
16014-80 = "啊！是老師！\n歡迎回來～！"
16014-90 = "伊吹，有乖乖等著喔！\n稱讚我稱讚我！"
16014-100 = "伊吹，來幫忙了唷！\n該做什麼呢～？"
16014-110 = "在那之前，\n先享受零食時間……？\n嗯！伊吹也覺得那樣很棒！"
16014-120 = "「營業費執行結算明細」……\n那是什麼意思……？"
16014-130 = "耶嘿嘿，\n有話要跟伊吹說嗎～？"
16014-140 = "好！\n伊吹也請你多多指教！"
16014-150 = "老師，\n聽說你工作很累！\n伊吹也來幫忙！"
16014-160 = "伊吹也辦得到唷！\n儘管開口吧～！"
16014-170 = "老師！生日快樂！\n有收到很多禮物嗎～？"
16014-180 = "那伊吹，就把\n老師抱得緊緊的！"
16014-190 = "哇哇，伊吹的生日，\n你有記得嗎？\n謝謝你，老師！"
16014-200 = "我超開心的！\n現在說不定能\n飛到天上哦！"
16014-210 = "新年快樂，老師！\n嗯……？這是什麼？"
16014-220 = "壓歲錢？\n用來買伊吹\n想要的東西的……\n零用錢……？"
16014-230 = "那！伊吹想要老師！\n來，這是壓歲錢！\n請收下！"
16014-240 = "伊吹，有乖乖\n當好孩子唷……！\n真想收到聖誕老人\n送的禮物……"
16014-250 = "嘎哦！不惡作劇的話，\n糖果會被吃掉哦！"
16014-260 = "……咦？\n不是這樣……？"
16014-280 = "今天伊吹是老師唷！"
16014-290 = "從現在開始……\n要上算術課！"
16014-300 = "伊吹，對算術很有自信！"
16014-310 = "昨天考試拿了100分，\n還拿到了花丸印章！"
16014-320 = "耶嘿嘿……\n那，老師……\n伊吹老師要出問題了！"
16014-330 = "這邊！有冰淇淋2個，\n還有布丁1個。\n全部有幾個呢～？"
16014-340 = "噗噗～！真可惜！"
16014-350 = "正確答案是～……"
16014-360 = "「如果有3個點心\n就會超級幸福～」唷！"
16014-370 = "啊！吃完之後，\n別忘記要刷牙哦！"
16014-380 = "伊吹我呀，每天3次，\n都有好好刷牙唷！"
16014-2600 = "哇啊……哇啊啊！\n這個，要送給伊吹嗎？真的嗎？\n……咦，因為是伊吹才有……？\n唔哇！老師！好開心！我會好好珍惜的！"

[translation]
16014-10 = "Blue Archive! แหะๆ!"
16014-20 = "อิบูกิมาแล้วค่า! คุณครูรออิบูกินานเลยใช่มั้ย?"
16014-30 = "เจ็ดหนึ่งเจ็ด...\nเจ็ดสองสิบสี่..."
16014-40 = "ที่นี่มันอะไรกันเนี่ย?\nอิบูกิขอสำรวจดูได้มั้ย~?"
16014-50 = "จะเล่นอะไร\nกับคุณครูดีนะ..."
16014-60 = "พวกผู้ใหญ่ชอบอะไร\nแบบนี้เหรอ...?\nอืม~ ไม่รู้เลยแฮะ"
16014-70 = "อิบูกิ\nอยู่คนเดียวไม่สนุกเลย..."
16014-80 = "อ๊ะ คุณครูนี่นา!\nยินดีต้อนรับกลับมาค่า~!"
16014-90 = "อิบูกิ รอคุณครูอยู่อย่างสงบเสงี่ยมเลยนะ!\nชมหน่อยสิ ชมอิบูกิหน่อย~!"
16014-100 = "อิบูกิมาช่วยคุณครูแล้ว!\nให้อิบูกิทำอะไรดี?"
16014-110 = "ก่อนอื่นให้เริ่มจาก\nกินขนมกันก่อนเหรอ...?\nอื้อ! เอาตามนั้นแหละ!"
16014-120 = "รายงานสรุปค่าดำเนินธุรกิจ...\n...อย่างนั้นเหรอ? หมายถึงอะไรนะ...?"
16014-130 = "ฮิฮิฮิ...\nมีอะไรจะบอกอิบูกิงั้นเหรอ~?"
16014-140 = "ค่ะ!\nอิบูกิก็ขอฝากเนื้อฝากตัวด้วยนะคะ!"
16014-150 = "คุณครู\nได้ยินว่าทำงานเหนื่อยมากเลยใช่มั้ย!\nเดี๋ยวอิบูกิจะช่วยเองนะ!"
16014-160 = "อิบูกิก็ทำได้เหมือนกัน!\nบอกมาได้ทุกอย่างเลย~!"
16014-170 = "คุณครู! แฮปปี้เบิร์ธเดย์!\nได้ของขวัญเยอะรึเปล่า~?"
16014-180 = "ถ้างั้นเดี๋ยวอิบูกิ\nจะให้ของขวัญคุณครูเอง~!"
16014-190 = "ว้าว คุณครู\nจำวันเกิดของอิบูกิได้ด้วยเหรอ?\nขอบคุณน้า คุณครู!"
16014-200 = "ดีใจจังเลย!\nจนเหมือนตัวจะลอย\nขึ้นไปบนฟ้าได้เลยละ!"
16014-210 = "สวัสดีปีใหม่นะ\nคุณครู! หืม...? นี่อะไรน่ะ?"
16014-220 = "เงินปีใหม่?\nเงินค่าขนม\nเอาไว้ซื้อของ...\nที่อิบูกิอยากได้...?"
16014-230 = "ถ้างั้น...! อิบูกิ\nอยากได้คุณครูละ!\nเอ้า นี่เงินปีใหม่ค่ะ!"
16014-240 = "อิบูกิ\nเป็นเด็กดีมาตลอด...!\nเลยอยากได้ของขวัญ\nจากคุณลุงซานต้า..."
16014-250 = "ฮื้อ! ถ้าไม่แกล้งหลอกกันละก็\nจะกินขนมให้หมดเลยนะ!"
16014-260 = "...เอ๋?\nไม่ใช่แบบนี้งั้นเหรอ?"
16014-280 = "วันนี้น่ะ อิบูกิเป็นคุณครูนะ!"
16014-290 = "ตั้งแต่นี้ไปคาบเรียน\nวิชาเลขจะเริ่มขึ้นแล้วค่ะ!"
16014-300 = "อิบูกิน่ะ\nมั่นใจเรื่องวิชาเลขนะ!"
16014-310 = "เมื่อวานสอบวิชาเลข\nได้ 100 คะแนนเต็ม\nแล้วก็ได้ตราประทับ\nคำชมมาด้วยนะ~!"
16014-320 = "แหะๆๆ... ถ้างั้น... เอาละ คุณครู\nคุณครูอิบูกิจะถามคำถามแล้วนะคะ!"
16014-330 = "ตรงนี้! มีไอศกรีมอยู่ 2 อัน\nแล้วก็มีพุดดิ้งอยู่ 1 อัน\nทั้งหมดมีอยู่กี่อันคะ~?"
16014-340 = "แอ๊ดดด! น่าเสียดาย!"
16014-350 = "คำตอบคือ~"
16014-360 = "ถ้ามีของว่างอยู่มากกว่าสามอย่าง\nจะยิ่งมีความสุขมากขึ้น~ ไงล่ะ!"
16014-370 = "อ๊ะ! หลังกินของว่างแล้ว\nก็อย่าลืมแปรงฟันด้วยล่ะ!"
16014-380 = "อิบูกิน่ะ\nแปรงฟันอย่างถูกวิธี\nสามครั้งต่อวันเลยนะ!"
16014-2600 = "วะ...ว้าวววว!\nให้เจ้านี่กับอิบูกิงั้นเหรอ? จริงเหรอ?\n...พะ...เพราะเป็นอิบูกิ...?\nว้าว! คุณครู! ดีใจจัง จะเก็บไว้อย่างดีเลย!"

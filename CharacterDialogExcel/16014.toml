[translation]
16014-10 = "블루 아카이브! 헤헷!"
16014-20 = "이부키 등장! 선생님, 오래 기다렸지?"
16014-30 = "칠 곱하기 일은… 칠,\n칠 곱하기 이는… 십사…"
16014-40 = "여긴 뭐야?\n이부키, 탐험해도 돼~?"
16014-50 = "선생님이랑\n뭐 하고 놀까…"
16014-60 = "어른은 이런 걸 좋아해…?\n음~ 잘 모르겠어."
16014-70 = "이부키,\n혼자서는 재미없어…"
16014-80 = "아! 선생님이다!\n다녀오셨어요~!"
16014-90 = "이부키, 얌전히 기다렸어!\n칭찬해 줘 칭찬!"
16014-100 = "이부키, 도와주러 왔어!\n뭐하면 돼~?"
16014-110 = "그전에,\n간식타임을 갖자고…?\n응! 이부키도 그게 좋아!"
16014-120 = "사업비 집행 정산 내역서……\n…라니, 무슨 의미……?"
16014-130 = "에헤헤,\n이부키한테 할 말이 있어~?"
16014-140 = "네!\n이부키도 잘 부탁합니다!"
16014-150 = "선생님,\n일 힘들다고 들었어!\n이부키도 도와줄게!"
16014-160 = "이부키도 할 수 있어!\n뭐든지 말해~!"
16014-170 = "선생님! 생일 축하해!\n선물 많이 받았어~?"
16014-180 = "그럼 이부키는\n선생님을 꼬옥~ 해 줄게!"
16014-190 = "우와, 이부키 생일,\n기억해 준 거야?\n고마워, 선생님!"
16014-200 = "너무 기뻐!\n지금이라면 하늘도\n날 수 있을지도 몰라!"
16014-210 = "새해 복 많이 받아,\n선생님! 응…? 이건 뭐야?"
16014-220 = "세뱃돈?\n이부키가 갖고 싶은 걸\n사는데 쓰는…\n용돈…?"
16014-230 = "그럼! 이부키는\n선생님이 갖고 싶어!\n자, 여기 세뱃돈이에요!"
16014-240 = "이부키, \n착한 아이로 지냈어…!\n산타 할아버지한테\n선물, 받고 싶다…"
16014-250 = "어흥! 장난을 치지 않으면\n과자를 먹어버리겠다!"
16014-260 = "……어라?\n이게 아닌가?"
16014-280 = "오늘은 이부키가 선생님이야!"
16014-290 = "지금부터……\n산수 수업을 하겠습니다!"
16014-300 = "이부키, 산수는 자신 있어!"
16014-310 = "어제 시험에서\n100점 맞아서, \n칭찬 도장도 받았어!"
16014-320 = "에헤헤… 그럼 선생님에게, \n이부키 선생님의 문제입니다!"
16014-330 = "여기! 아이스크림 2개랑\n푸딩 1개가 있습니다. \n전부 몇 개일까요~?"
16014-340 = "때앵~! 아깝다!"
16014-350 = "정답은~…"
16014-360 = "'간식이 3개나 있으면\n너무 행복해~'야!"
16014-370 = "앗! 먹고 나면,\n양치하는 거 잊지 마!"
16014-380 = "이부키는 말야,\n매일 3번,\n제대로 양치질하고 있어!"
16014-2600 = "우와… 우와악!\n이거, 이부키 주는 거야? 정말로?\n……어, 이부키니까……?\n우와! 선생님! 기뻐! 소중히 할게!"

[translation]
10039-10 = "Blue... Archive"
10039-20 = "คาซุมิซาวะ มิยุ...\nจากกองทหาร RABBIT สถาบันพิเศษ SRT ค่ะ...\nยังกลับ...ไม่ได้...ใช่มั้ยคะ...?"
10039-30 = "เอ่อ.. คือว่า..."
10039-40 = "(ฉันอยากเป็นฝ่าย...\nชวนคุยก่อนบ้าง...\nตะ...แต่กลัวจังเลย...)"
10039-50 = "(ถ้าได้ดื่มโกโก้ร้อนสักแก้ว\nก็คงดีนะ...)"
10039-60 = "(คิดแล้วเชียว...\nว่ายัยขี้เหร่อย่างฉัน...\nไม่เหมาะกับที่นี่จริงๆ ด้วย...)"
10039-70 = "มะ...มีที่ซ่อน\nตรงไหนบ้างนะ...?"
10039-80 = "นะ...เหนื่อยหน่อยนะคะ\nคุณครู..."
10039-90 = "ตะ...ตอนที่คุณครูสะดวก\nช่วยเรียกฉันด้วยนะคะ...\nฉะ...ฉันเป็นคนรอเก่งค่ะ..."
10039-100 = "คะ...คุณครูคะ...\nจำชื่อของฉันได้รึเปล่าคะ...?"
10039-110 = "ให้ทำความรู้จักเพื่อนใหม่เหรอคะ\nเรื่องยากๆ แบบนั้นมัน..."
10039-120 = "ถ้ากองทหาร RABBIT...\nสนิทกันทุกคน\nก็น่าจะดีนะคะ..."
10039-130 = "ถะ...ถ้าฉันมีตัวตน...\nเหมือนสมาชิกคนอื่นๆ ก็คงดีนะคะ..."
10039-140 = "มนุษย์จืดจางอย่างฉัน...\nเหมือนกับพวกก้อนกรวด\nที่มีอยู่เต็มไปหมดนี่แหละค่ะ..."
10039-150 = "ทำไมคนอย่างฉัน\nถึงเข้าเรียนที่ SRT ได้นะ..."
10039-160 = "คะ... คุณครูคะ...\nได้ยินว่าวันนี้เป็นวันเกิด..."
10039-170 = "ถะ...ถึงคนที่ไม่มีที่อยู่\nเป็นหลักแหล่งอย่างฉัน\nจะให้ของขวัญที่เหมาะสมไม่ได้ก็ตาม..."
10039-180 = "เพราะงั้นอย่างน้อย...\nฉันก็อยากอวยพรให้คุณครูค่ะ..."
10039-190 = "คะ... คะ?\nวันเกิดฉันเหรอคะ...?"
10039-200 = "ทะ...ทำไมคุณครู...\nถึงจำวันเกิดของฉันได้คะ...\nเรื่องแบบนั้น..."
10039-210 = "ขะ... ขอบคุณมากค่ะ...!\nฉะ...ฉันดีใจจริงๆ ค่ะ...!"
10039-220 = "ถ้าปีนี้พวกเรา\nกลับไปที่สถาบัน SRT ได้\nก็คงจะดีนะคะ..."
10039-230 = "ซานตาคลอสคงไม่ให้ของขวัญ\nกับเด็กดื้อหรอกใช่มั้ยคะ..."
10039-240 = "ไม่สิ... บางทีซานตาคลอส\nอาจลืมไปว่าฉันมีตัวตนอยู่\nเหมือนกันก็ได้นะคะ..."
10039-250 = "พอนึกดูแล้วตอนเด็กๆ\nตอนเทศกาลฮาโลวีน\nฉันเคยแต่งเป็นผีด้วยค่ะ"
10039-260 = "ถึงจะไม่มีใคร\nสังเกตเห็นฉันก็เถอะค่ะ..."
10039-280 = "ควบคุมลมหายใจ..."
10039-290 = "ตั้งสมาธิ... เล็งไปที่เป้าหมาย..."
10039-300 = "ระยะห่าง 1,150 เมตร\nความเร็วลมจากทาง\nตะวันออกเฉียงเหนือ 15 น็อต"
10039-310 = "ถ้าคำนวณความคลาดเคลื่อน...\nจากอุณหภูมิและความชื้นแล้ว..."
10039-320 = "คะ... คือว่า...คุณครูคะ\nช่วยเลิกแกล้งฉันก่อน\nได้รึเปล่าคะ...?"
10039-330 = "จุดที่เล็งเป้ายิง\nมันสั่นไปหมดแล้วค่ะ..."
10039-340 = "งั้นเหรอคะ... มันก็ไม่ได้\nกวนอะไรมากหรอกค่ะ"
10039-350 = "คงอยากให้เป็นการฝึกซุ่มยิง\nในสถานการณ์ที่ใกล้เคียงกับ\nการต่อสู้จริงสินะคะ"
10039-360 = "ที่ SRT เองเคยผ่านการฝึก\nที่คล้ายกันมาเหมือนกันค่ะ"
10039-370 = "อะ...อ๊าย...!"
10039-380 = "คะ...คุณครูคะ! ยะ...ยังไงก็เถอะค่ะ\nมะ...มาหายใจข้างๆ หูกันแบบนี้...!?"
10039-390 = "(ฮือออ...\nละ...ลมหายใจของคุณครู...\nอยู่ใกล้มากๆ เลย...)"
10039-400 = "(จะ...จุดเล็งเป้าเคลื่อนแล้ว…!)"
10039-2600 = "ได้รับ RABBIT Type 39 Rifle แล้วค่ะ\nคิดแล้วเชียว...\nว่ามันหนักนิดหน่อยค่ะ..."

[translation]
10039-10 = "브, 블루…… 아카이브……"
10039-20 = "SRT 특수학원, RABBIT 소대의\n카스미자와 미유입니다…… 저……\n이만 돌아가면…… 안 되겠죠……?"
10039-30 = "아, 저기……"
10039-40 = "(먼저 말을 걸고\n싶은데…… 너무\n무서워……)"
10039-50 = "(따듯한 코코아나\n한 잔 마셨으면……)"
10039-60 = "(역시 나 같은\n못난이는 이런 장소에\n어울리지 않아……)"
10039-70 = "뭐, 뭔가,\n엄폐물은……?"
10039-80 = "수, 수고하셨습니다.\n선생님……"
10039-90 = "선생님께서 편하실 때\n불러 주세요…… 그,\n기다리는 건 특기니까요……"
10039-100 = "저, 선생님…… 제 이름,\n기억하고 계신가요……?"
10039-110 = "새 친구를 사귄다니,\n그렇게 어려운 일은……"
10039-120 = "RABBIT 소대원들이,\n더 사이좋게 지냈으면\n좋겠는데……"
10039-130 = "좀 더, 다른 소대원들처럼\n존재감이 있었으면……"
10039-140 = "저 같은 건, 어디에나 있는\n조약돌 같은 거니까요……"
10039-150 = "애초에 어째서\n저 같은 게, SRT에……"
10039-160 = "서, 선생님……\n오늘 생신이라고 들어서……"
10039-170 = "노숙을 하고 있는 처지에\n제대로 된 선물은 드릴\n수 없지만……"
10039-180 = "저, 축하 드린다는 말 만큼은……\n꼭 전해 드리고 싶었어요……"
10039-190 = "네, 네?\n제 생일이요……?"
10039-200 = "어, 어째서\n기억하고 계신 건가요……\n그런……"
10039-210 = "가, 감사합니다……\n정말, 기뻐요……!"
10039-220 = "올해는 SRT로\n돌아갈 수 있으면\n좋겠어요……"
10039-230 = "산타클로스는 나쁜 아이에게는\n선물을 주지 않는다던데……"
10039-240 = "아니…… 어쩌면 산타클로스도\n제 존재를 잊어버린 걸지도\n모르겠네요……"
10039-250 = "그러고 보니 어릴적\n할로윈 축제 때 유령으로\n분장했던 적이 있었어요."
10039-260 = "아무도 제 존재를\n알아차리지 못했지만요……"
10039-280 = "호흡을 가다듬고……"
10039-290 = "목표에 집중……"
10039-300 = "거리는 1,150m,\n바람은 동북동에서 15노트."
10039-310 = "온습도로 인한\n오차를 보정하면……"
10039-320 = "저, 저기…… 선생님.\n괜찮으시다면, 그런 장난을 치는\n건 그만둬 주지 않으실래요……"
10039-330 = "그게, 조준점이\n흐트러지는데요……"
10039-340 = "……그렇군요.\n이건 방해가 아니라,"
10039-350 = "실전에 가까운 상황에서의\n저격을 위한 훈련이군요."
10039-360 = "SRT에서도 비슷한 훈련을\n했던 것 같은 기분이……"
10039-370 = "흐, 흐익……?"
10039-380 = "서, 선생님……!\n아무리 그래도, 귀에\n입김을 불어 넣는 건……!?"
10039-390 = "(으으……\n서, 선생님의 숨결이,\n가까이에서……)"
10039-400 = "(조, 조준이 흔들려……!)"
10039-2600 = "RABBIT 39식 소총, 수령했습니다.\n…역시, 조금 무겁네요…"

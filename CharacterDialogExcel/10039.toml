[translation]
10039-10 = "蔚，蔚藍……檔案……"
10039-20 = "我是SRT特殊學園\nRABBIT小隊的霞沢美優……\n那個，我可以回……應該不行吧……？"
10039-30 = "啊，那個，我……"
10039-40 = "（想要主動搭話，\n　但是……好可怕……）"
10039-50 = "（想要，喝杯\n　熱可可……）"
10039-60 = "（像我這種半吊子，感覺\n不能待在這種地方……）"
10039-70 = "有，有沒有，\n掩蔽物呢……？"
10039-80 = "辛，辛苦你了，老師……"
10039-90 = "請在老師方便的時候\n呼喚我吧……\n那個，我很擅長等待……"
10039-100 = "那個……老師……\n我的名字，\n你還記得嗎……？"
10039-110 = "結交新朋友，\n實在太困難了……"
10039-120 = "RABBIT小隊，\n如果感情可以更好\n就好了……"
10039-130 = "如果我可以像其他隊員一樣\n更有存在感……"
10039-140 = "像我這種人，就像是\n隨處可見的小石頭……"
10039-150 = "話說，為什麼我這種人\n能夠進入SRT呢……"
10039-160 = "老，老師，那個……\n我聽說今天\n是你的生日……"
10039-170 = "我們現在露宿街頭，\n所以沒有辦法送你\n像樣的禮物……"
10039-180 = "不過，\n想說至少一定要\n說出祝福的言語……"
10039-190 = "咦……要祝我\n生日快樂……？"
10039-200 = "你，你怎麼會……\n記得那種事……"
10039-210 = "謝，謝謝老師……\n我真的……很開心……！"
10039-220 = "希望今年，\n可以回到SRT學園……"
10039-230 = "聽說聖誕老人\n不會送禮物給壞孩子……"
10039-240 = "不對，說不定\n聖誕老人也早就\n忘記我的存在了……"
10039-250 = "這讓我想到，\n我以前有在萬聖節\n打扮成幽靈。"
10039-260 = "卻完全沒有人注意到我……"
10039-280 = "調整呼吸……"
10039-290 = "專注於目標……"
10039-300 = "距離1,150m，\n風向為東北東，風速15節……"
10039-310 = "矯正溫濕度\n產生的誤差……"
10039-320 = "那，那個……老師，\n可以的話，那種惡作劇\n麻煩請停下來……"
10039-330 = "那個，\n會讓我沒辦法瞄準的……"
10039-340 = "……原來如此。\n這不是妨礙，"
10039-350 = "而是要在接近實戰的狀況下\n進行狙擊訓練\n對吧……"
10039-360 = "在SRT，\n好像也有類似的訓練……"
10039-370 = "噫噫……！？"
10039-380 = "老，老師……！\n就算這樣，在耳邊\n吹氣也有點……！？"
10039-390 = "（唔……老，老師的\n　呼吸靠得好近……）"
10039-400 = "（沒，沒辦法\n　瞄準……！）"
10039-2600 = "RABBIT39式步槍，領取完畢。\n……果然有點重呢。"

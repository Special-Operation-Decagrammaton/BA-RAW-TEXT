[translation]
10084-10 = "Blue, Archive."
10084-20 = "I found you. Whether it's in the mountains or the seas... I'll capture your voice, Sensei. Wherever you are."
10084-30 = "This is... It's been trending on social media recently."
10084-40 = "I know this song... Ugh. What was it called?"
10084-50 = "I swear I left it somewhere around here..."
10084-60 = "I finished the recording."
10084-70 = "(What was that sound? I don't think I've heard that before.)"
10084-80 = "Ah. You changed shoes, Sensei."
10084-90 = "I was trying to figure out why the sounds of your footsteps were slightly different."
10084-100 = "Sensei! W-Welcome."
10084-110 = "Don't make that face. I didn't do anything nefarious. Not really."
10084-120 = "All I did was... Well, I was warming up your chair for you. Something like that..."
10084-130 = "I recommend you dress for the weather when you go out this weekend."
10084-140 = "Temperatures are calculated to drop off quite a bit."
10084-150 = "...Why did I say \"when\"? How do I know your schedule?"
10084-160 = "Um..."
10084-170 = "I just...thought there might be a possibility? Haha."
10084-180 = "Winter is my favorite season to visit the mountains."
10084-190 = "The quiet of winter is perfect for recording all kinds of sounds."
10084-200 = "Which means you should be careful talking about secrets on a snowy mountain."
10084-210 = "Sounds carry further than you would think in that environment."
10084-220 = "Why do communications towers have to be at the very top of mountains?"
10084-230 = "Not that I don't understand the science behind it..."
10084-240 = "But they're so difficult to get to! How am I supposed to install my wire tap?"
10084-250 = "...Red Winter Academy's propaganda broadcasts are even reaching all the way out here."
10084-260 = "There's less radio wave interference around this time of year."
10084-270 = "That school has some terrifying propaganda."
10084-280 = "Keep an eye out for wildlife if you're in the mountains."
10084-290 = "Most especially snakes."
10084-300 = "I've heard stories of people having to abandon a hike after encountering a snake with only a hammer and pot to protect themselves."
10084-310 = "Happy birthday, Sensei."
10084-320 = "Your gift is this ASMR track. It will help you get better sleep."
10084-330 = "Listen to it before you go to bed tonight."
10084-340 = "M-My birthday?"
10084-350 = "Oh. Thank... Thank you."
10084-360 = "Let me just... Okay, ready. Please repeat exactly what you just said."
10084-370 = "Happy New Year, Sensei."
10084-380 = "I'm strangely happy I get to be the first person to greet you in the new year."
10084-390 = "Days like today are special. Lovers exchange sweet words and wishes for the future..."
10084-400 = "It makes me feel something on the inside."
10084-410 = "...Huh? That's eavesdropping?"
10084-420 = "Oh. Really? It is? Are you sure?"
10084-430 = "The sound of a knife carving through the thick skin of a pumpkin... Now that's music to my ears."
10084-440 = "I got so carried away with the sound of my slices, I made too many jack-o-lanterns."
10084-450 = "You should have one! S-Since I have extra and all that..."
10084-470 = "Sensei, please lower your voice."
10084-480 = "Stay quiet, but come closer to the tree..."
10084-490 = "Try listening to the sound within."
10084-500 = "Can you hear that?"
10084-510 = "It's water flowing up through the tree."
10084-520 = "This tree shed all of its leaves, as if it gave up on living."
10084-530 = "But even so, it's working hard to drink up the water."
10084-540 = "Even though this mountain seems to have gone silent, it actually cries out with all kinds of sounds..."
10084-550 = "...Heehee. You know, I think I could listen to them forever and never grow bored."
10084-2600 = "I've been considering modifying my gun to play your voice every time I pull the trigger. That would be nice."

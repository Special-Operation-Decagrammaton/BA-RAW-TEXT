[translation]
10084-10 = "蔚藍，檔案。"
10084-20 = "原來在這裡啊。不管是山上還是海邊……\n我都不會漏聽老師的聲音。"
10084-30 = "這就是……最近\nSNS上話題火熱的\n裝潢是嗎……"
10084-40 = "現在播放的這首…\n想不到曲名…"
10084-50 = "……明明放在\n這附近啊……"
10084-60 = "……錄音完畢。"
10084-70 = "（唔嗯…？剛才\n　好像聽見了\n　令人在意的事…）"
10084-80 = "啊，老師，\n你換鞋子了呢。"
10084-90 = "因為腳步聲不同……\n我嚇了一跳。"
10084-100 = "啊，老師……\n歡迎回來。"
10084-110 = "我，我沒有……\n在做什麼奇怪的事。"
10084-120 = "只，只是\n幫老師把椅子\n坐暖而已。"
10084-130 = "這週末請穿\n暖一點再外出。"
10084-140 = "聽說寒流會造成\n氣溫急遽下降。"
10084-150 = "為什麼知道要外出是嗎……？"
10084-160 = "呃，這個……"
10084-170 = "是偶然。"
10084-180 = "我個人比較\n喜歡冬天的山。"
10084-190 = "因為連遠處的聲音\n都能聽得很清楚。"
10084-200 = "所以……在冬天\n的山裡交談時，\n請務必留意。"
10084-210 = "不適合進行\n祕密談話。"
10084-220 = "為什麼電波塔幾乎\n都在山頂上呢……"
10084-230 = "唉，雖然知道原因……"
10084-240 = "但因為很難靠近，\n每次要去聽的時候\n都很累人……"
10084-250 = "……這個時期，經常\n會受到赤冬聯邦學園\n宣傳廣播的干擾。"
10084-260 = "居然連這種地方\n都能聽見……"
10084-270 = "那個學園的宣傳方式\n還挺令人頭痛的。"
10084-280 = "冬天山上的野生動物……"
10084-290 = "尤其是蛇請特別留意。"
10084-300 = "我聽說在登山時\n因為遇到蛇而放棄\n爬山的人相當多。"
10084-310 = "祝你生日快樂，老師。"
10084-320 = "為了讓老師舒適入睡，\n我準備了自製的\nASMR音檔。"
10084-330 = "今晚，請在睡前聽聽看吧。"
10084-340 = "我，我的生日是嗎？"
10084-350 = "啊……謝，謝謝\n你的祝福。"
10084-360 = "……剛才那句話，\n麻煩再說一次。"
10084-370 = "祝你新年快樂。"
10084-380 = "……今年最棒的這句話……\n希望能讓老師聽見，\n所以我真的很開心。"
10084-390 = "在今天這樣的日子，\n聽著戀人之間的\n甜蜜通話……"
10084-400 = "總覺得我也\n心動了起來……"
10084-410 = "……咦？你問那\n是不是竊聽……？"
10084-420 = "那，呃，那個……\n不是唷……？"
10084-430 = "因為削南瓜的聲音\n意外的好聽……"
10084-440 = "等回過神來，\n才發現已經做了\n好幾個南瓜裝飾。"
10084-450 = "不介意的話，\n請老師收下一個吧。"
10084-470 = "老師，\n先降低音量。"
10084-480 = "安靜地……\n靠近樹木……"
10084-490 = "將裡頭的聲音，\n用耳朵仔細聆聽。"
10084-500 = "……有聽到嗎？"
10084-510 = "通過樹幹內部的水\n所發出的聲音。"
10084-520 = "雖然這棵樹，已經讓樹葉\n全數脫落……看起來就像\n已經放棄了生存一樣……"
10084-530 = "其實它就連現在，\n也正用力地將水吸上去。"
10084-540 = "乍看之下，看似\n寂靜的這座森林……\n其實也充滿\n許許多多的聲音……"
10084-550 = "……呵呵，\n看來聽膩這種事……\n之後再也不會發生了呢。"
10084-2600 = "如果能用老師的聲音\n來代替槍聲就好了……\n我打算認真思考能不能實現。"

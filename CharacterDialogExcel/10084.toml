[translation]
10084-10 = "Blue Archive"
10084-20 = "อยู่ตรงนี้สินะคะ ไม่ว่าจะบนภูเขาหรือในทะเล...\nฉันก็จะไม่พลาดเสียงของคุณครูหรอกค่ะ"
10084-30 = "นี่มัน... เฟอร์นิเจอร์\nที่นิยมอยู่ในโซเชียล\nมีเดียตอนนี้สินะคะ..."
10084-40 = "เพลงที่เล่นอยู่ตอนนี้...\nชื่อเพลงอะไรนะ...\nนึกไม่ออกเลยค่ะ"
10084-50 = "จำได้ว่าวางไว้\nแถวนี้นี่นา..."
10084-60 = "บันทึกเสียงเสร็จแล้วค่ะ"
10084-70 = "(หืม...?\nเมื่อกี้เหมือนได้ยิน\nเสียงน่าสนใจเลย...)"
10084-80 = "อ๊ะ คุณครู\nเปลี่ยนรองเท้าใหม่สินะคะ"
10084-90 = "พอดีเสียงเดินเปลี่ยนไป\nเล่นเอาฉันตกใจเลยค่ะ"
10084-100 = "อ๊ะ คุณครู...\nเชิญค่ะ"
10084-110 = "ฉะ... ฉัน...\nไม่ได้ทำเรื่องอะไร\nแปลกๆ อยู่นะคะ"
10084-120 = "ฉะ... ฉันแค่กำลัง\nทำให้เก้าอี้อุ่น\nเพื่อคุณครูน่ะค่ะ"
10084-130 = "สุดสัปดาห์นี้ จะไปไหน\nก็แต่งตัวให้อุ่นๆ นะคะ"
10084-140 = "เห็นว่ากระแสลมหนาวทำให้\nอุณหภูมิลดฮวบเลยละค่ะ"
10084-150 = "ฉันรู้ได้ยังไงว่าคุณครูจะ\nไปข้างนอกน่ะเหรอคะ...?"
10084-160 = "เอ่อ... คือว่า..."
10084-170 = "แค่บังเอิญน่ะค่ะ"
10084-180 = "ส่วนตัวแล้วฉันชอบ\nภูเขาในฤดูหนาวค่ะ"
10084-190 = "ในฤดูหนาว เราจะได้ยินเสียง\nแม้แต่จากที่ไกลๆ ค่ะ"
10084-200 = "เพราะงั้น... ถ้าจะคุยอะไร\nบนภูเขาในฤดูหนาว\nก็ระวังด้วยนะคะ"
10084-210 = "ข้างบนนั้นไม่เหมาะ\nกับการคุยเรื่องลับๆ น่ะค่ะ"
10084-220 = "ทำไมหอส่งสัญญาณส่วนใหญ่\nถึงไปอยู่บนภูเขากันนะ..."
10084-230 = "ไม่สิ เหตุผลน่ะฉันรู้อยู่..."
10084-240 = "แต่มันเข้าถึงยาก\nทุกครั้งที่ฉันดักฟัง\nเป็นอันต้องลำบากทุกทีค่ะ"
10084-250 = "หมู่นี้มีโฆษณาชวนเชื่อของ\nเรดวินเทอร์มาแทรกบ่อยๆ เลยค่ะ..."
10084-260 = "ส่งคลื่นวิทยุมาถึงที่นี่เลยเหรอเนี่ย..."
10084-270 = "โฆษณาชวนเชื่อของโรงเรียนนั้น\nชวนปวดหัวไม่เบาเลยค่ะ"
10084-280 = "ภูเขาในฤดูหนาวจะมีสัตว์ป่า..."
10084-290 = "ต้องระวังงูด้วยนะคะ"
10084-300 = "ได้ยินมาว่ามีคนไม่น้อย\nที่แบกไหขึ้นเขาไปด้วย\nแต่ก็ต้องล้มเลิก\nเพราะเจองูด้วยนะคะ"
10084-310 = "สุขสันต์วันเกิดค่ะคุณครู"
10084-320 = "ฉันเตรียมไฟล์ ASMR ที่\nทำขึ้นเองมาให้ คุณครูฟัง\nแล้วจะได้หลับสบายค่ะ"
10084-330 = "ก่อนนอนคืนนี้\nช่วยเปิดฟังด้วยนะคะ"
10084-340 = "วะ... วันเกิด... ฉันเหรอคะ?"
10084-350 = "อ่า... ขะ... ขอบคุณนะคะ\nที่มาอวยพรวันเกิดฉัน"
10084-360 = "ที่คุณครูพูดไปเมื่อกี้\nฉันขอฟังอีกรอบได้มั้ยคะ?"
10084-370 = "สวัสดีปีใหม่ค่ะ"
10084-380 = "ดีใจจังเลยค่ะที่\nเอ่ยคำทักทายแรกของปี\nกับคุณครูได้"
10084-390 = "พอวันนี้ฉันได้ฟัง\nการสนทนาแสนหวาน\nของเหล่าคู่รัก"
10084-400 = "ก็รู้สึกว่าฉัน\nอารมณ์อ่อนไหว\nอย่างไม่รู้ตัวเลยค่ะ..."
10084-410 = "คะ? นั่นคือการดักฟัง\nรึเปล่าน่ะเหรอคะ...?"
10084-420 = "เอ่อ นั่นมัน...\nอ่า... ไม่ใช่ค่ะ..."
10084-430 = "เสียงแกะสลักฟักทอง\nน่าฟังกว่าที่คิดนะคะ..."
10084-440 = "พอรู้ตัวอีกที\nฉันก็แกะฟักทองตกแต่ง\nไว้หลายลูกเลยค่ะ"
10084-450 = "ถ้าไม่ว่าอะไร คุณครูก็\nเอาไปสักลูกมั้ยคะ?"
10084-470 = "คุณครู\nช่วยเบาเสียงด้วยค่ะ"
10084-480 = "กลั้นหายใจ\nแล้วเดินไปที่ต้นไม้..."
10084-490 = "แล้วตั้งใจฟังเสียง\nที่ดังมาจากในต้นไม้สิคะ"
10084-500 = "ได้ยินมั้ยคะ?"
10084-510 = "เสียงของน้ำ\nที่ไหลขึ้นมาตามลำต้น"
10084-520 = "ต้นไม้ต้นนี้ใบร่วงหมดแล้ว\nดูเหมือนว่ามันละทิ้ง\nความตั้งใจที่จะมีชีวิตต่อ"
10084-530 = "แต่ตอนนี้\nมันก็ออกแรงดึงน้ำ\nมาเลี้ยงตัวเองอยู่นะคะ"
10084-540 = "กับป่าที่ดูเงียบสงบ\nนี้ก็เหมือนกัน\nที่จริงแล้วมันเต็มไปด้วย\nเสียงสะท้อนสารพัด..."
10084-550 = "ฮุฮุ ต่อไปฉันก็คงไม่เบื่อ\nเพราะมีเสียงแบบนี้\nให้ฟังค่ะ"
10084-2600 = "ถ้าฉันได้ยินเสียงคุณครู\nในทุกครั้งที่ยิงปืนก็ดีน่ะสิ...\nต้องลองคิดประดิษฐ์\nอย่างจริงจังแล้วละค่ะ"

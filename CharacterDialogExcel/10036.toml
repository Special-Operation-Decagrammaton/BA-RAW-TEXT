[translation]
10036-10 = "蔚、蔚藍檔案！"
10036-20 = "我，我叫若葉日向……\n請多指教……"
10036-30 = "總，總覺得那個……\n令人，緊張呢……"
10036-40 = "好厲害，\n有各種東西……"
10036-50 = "偶，偶爾在這種地方，\n悠哉一下也可以吧……？"
10036-60 = "唉，累了……"
10036-70 = "這，這麼悠閒可以嗎……？"
10036-80 = "啊，歡迎回來，老師！\n希望今天，\n也會是安詳的一天……！"
10036-90 = "辛苦了，老師！\n我剛好收拾好這邊了……！"
10036-100 = "其實我，非常喜歡\n能幫上某人的忙……！"
10036-110 = "不，不過那個，我……\n有確實幫上\n老師的忙嗎……？"
10036-120 = "我，總是犯錯……"
10036-130 = "明明都讓我負責了\n諸多事項的管理的說……"
10036-140 = "請，請務必讓我做任何事！\n無論如何，我都會加油的……！"
10036-150 = "總覺得最近，流傳著\n很多關於我的奇怪傳聞……？"
10036-160 = "就算詢問修女會的各位，\n也不願意告訴我……"
10036-170 = "搬運行李和收拾之類的，\n那種事的話請務必交給我……！"
10036-180 = "別看我這樣，\n我也是個管理負責人！"
10036-190 = "老師，祝您生日快樂！"
10036-200 = "對我來說，今天也是\n非常特別的重要日子！"
10036-210 = "老，老師……那個，\n就是……其實……"
10036-220 = "今，今天，\n是我的，生日……！\n這個，所以今天……那個，"
10036-230 = "可以一直待在我身邊嗎……！？"
10036-240 = "新年到了呢……"
10036-250 = "希望今年，\n可以讓老師看到\n我更多出色的身姿……！"
10036-260 = "今天是聖誕祭呢……！"
10036-270 = "雖然到處都是不足之處，\n不過我也是修女會的一員。"
10036-280 = "今天，請務必\n讓我為老師祈禱。"
10036-290 = "啊，今天是萬聖節嗎……？"
10036-300 = "所以，剛才外面\n才會有各種打扮的人……"
10036-310 = "……啊。以，以防萬一，\n我的這身不是扮裝，\n而是平常的打扮哦……！？"
10036-330 = "那個……\n很抱歉，老師。"
10036-340 = "我好像，造成了\n您的困擾……"
10036-350 = "本來以為，不是\n什麼大不了的事……"
10036-360 = "而且我也一直以\n強壯的身體為傲，\n真是沒臉見人……"
10036-370 = "我會照老師所說，\n稍微休息一下。"
10036-380 = "所以，那個……\n這段期間……\n能請老師陪在我身邊嗎？"
10036-390 = "那樣的話，\n心情會比較自在……"
10036-400 = "是，謝謝您。"
10036-410 = "……老師您，真是溫柔呢。"
10036-2600 = "沒，沒想到會這麼備受期待……\n……我很開心。\n我會努力，回應期待的……！"

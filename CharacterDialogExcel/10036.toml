[translation]
10036-10 = "Blue Archive!"
10036-20 = "วะ...วาคาบะ ฮินาตะค่ะ\nขอฝากตัวด้วยนะคะ..."
10036-30 = "ฉะ...ฉันรู้สึก...\nสงบใจไม่ได้เลยค่ะ"
10036-40 = "สุดยอดเลยค่ะ...\nมีของตั้งหลายอย่าง..."
10036-50 = "บางครั้งการนอนพัก\nสบายๆ ในที่แบบนี้\nก็เป็นเรื่องที่ดีใช่มั้ยคะ...?"
10036-60 = "อืม เหนื่อยจังเลย..."
10036-70 = "มะ...มานอนพักแบบนี้\nจะไม่เป็นอะไรใช่มั้ยคะ...?"
10036-80 = "มะ...มาแล้วเหรอคะ คุณครู!\nขอให้วันนี้เป็นอีกหนึ่งวัน...\nที่สงบสุขค่ะ...!"
10036-90 = "อ๊ะ มาแล้วเหรอคะ คุณครู\nฉันเพิ่งจะจัดของเสร็จเองค่ะ...!"
10036-100 = "ทะ...ที่จริงแล้วการได้ทำ\nสิ่งที่มีประโยชน์กับใครบางคน\nเป็นเรื่องที่สนุกจริงๆ นะคะ...!"
10036-110 = "ฉะ...ฉันสงสัยว่าตัวเอง\nช่วยเหลือคุณครูได้บ้างรึเปล่าคะ?"
10036-120 = "ฉันมักจะทำพลาดบ่อยๆ..."
10036-130 = "ทั้งที่ฉันเป็นผู้ดูแลแท้ๆ...\nฉันเป็นแบบนี้จะไม่เป็นไร\nแน่เหรอคะ"
10036-140 = "บะ...บอกมาได้ทุกอย่างเลยค่ะ\nฉันจะพยายามทำให้เต็มที่ค่ะ...!"
10036-150 = "ช่วงนี้มีข่าวลือแปลกๆ...\nเกี่ยวกับฉันเยอะมากเลยค่ะ\nเพราะอะไรกันนะ...?"
10036-160 = "พวกพี่ๆ ซิสเตอร์คนอื่น\nก็ไม่ยอมบอกอะไรฉันเลย..."
10036-170 = "ถะ...ถ้าเป็นเรื่องยกของ\nหรือการจัดการของก็ไว้ใจฉัน\nได้เลยค่ะ…!"
10036-180 = "เห็นอย่างนี้ฉันก็เป็นผู้ดูแลนะคะ!"
10036-190 = "สุขสันต์วันเกิดค่ะ คุณครู!"
10036-200 = "วันนี้เป็นวันพิเศษมาก\nสำหรับฉันเลยค่ะ!"
10036-210 = "คะ... คุณครู...\nคือ... คือว่าวันนี้..."
10036-220 = "วะ... วันนี้เป็นวันเกิด\nขะ...ของฉันค่ะ...!\nเพราะงั้นวันนี้...!"
10036-230 = "คุณครูช่วยอยู่กับฉันได้มั้ยคะ?"
10036-240 = "วันปีใหม่..."
10036-250 = "ปีนี้ฉันอยากจะให้คุณครู\nให้เห็นภาพลักษณ์ที่ดีขึ้น\nของฉันค่ะ…!"
10036-260 = "วันนี้เป็นวันคริสต์มาสค่ะ!"
10036-270 = "ถึงฉันจะยังบกพร่องอยู่\nแต่ฉันก็เป็นซิสเตอร์\nของชมรมซิสเตอร์ค่ะ"
10036-280 = "วันนี้ฉันจะอธิษฐานเพื่อคุณครูค่ะ"
10036-290 = "วันนี้เป็นวันฮาโลวีนเหรอคะ...?"
10036-300 = "เพราะงั้นคนอื่นๆ ที่ข้างนอก\nเลยใส่เสื้อผ้าแบบนั้นกัน..."
10036-310 = "อ๊ะ... บอกไว้ก่อนนะคะ\nฉันไม่ได้แต่งชุดพิเศษอะไร...\nแต่นี่เป็นชุดจริงๆ ของฉันค่ะ...!"
10036-330 = "คือว่า... ขอโทษด้วยค่ะ คุณครู..."
10036-340 = "ฉันรู้สึกเหมือนว่าตัวเอง...\nเป็นภาระให้กับคุณครู..."
10036-350 = "ที่ผ่านมาฉันคิดมาตลอด\nว่ามันอาจไม่ใช่เรื่องใหญ่อะไร..."
10036-360 = "และเอาแต่ภูมิใจกับร่างกาย\nที่แข็งแรงของตัวเอง\nฉันรู้สึกละอายจริงๆ ค่ะ..."
10036-370 = "ตอนนี้ฉันจะพักผ่อน\nตามที่คุณครูบอกนะคะ"
10036-380 = "แต่ว่าคุณครูจะช่วย...\nอยู่ข้างๆ ฉันสักพักได้มั้ยคะ?"
10036-390 = "ถ้าคุณครูอยู่ด้วย...\nฉันจะรู้สึกสบายใจค่ะ..."
10036-400 = "จะอยู่กับฉันเหรอคะ?\nขอบคุณมากค่ะ"
10036-410 = "คุณครูเนี่ย...\nใจดีมากเลยนะคะ"
10036-2600 = "ได้รับการคาดหวังแบบนี้\nฉันมีความสุขมากเลยค่ะ!\nฉันจะเติมเต็มความคาดหวังให้ได้ค่ะ"

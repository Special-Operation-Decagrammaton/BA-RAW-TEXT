[translation]
10036-10 = "브, 블루 아카이브!"
10036-20 = "와, 와카바 히나타라고 합니다……\n잘 부탁드립니다……"
10036-30 = "뭐, 뭔가 그……\n긴장…… 하게\n되네요……"
10036-40 = "굉장해,\n다양한 물건이……"
10036-50 = "가, 가끔은 이런\n곳에서 천천히\n쉬는 것도\n괜찮겠죠……?"
10036-60 = "으음……\n피곤해……"
10036-70 = "이, 이렇게\n쉬고 있어도\n괜찮은 걸까……?"
10036-80 = "오, 오셨군요. 선생님!\n오늘도 평안한 하루\n되시길……!"
10036-90 = "아. 오셨군요, 선생님!\n그렇잖아도 마침 정리가\n막 끝났거든요……!"
10036-100 = "시, 실은 저……\n누군가에게 도움이 되는 게\n너무 기뻐서……!"
10036-110 = "그, 그래서 그…… 저……\n제대로 선생님께 도움이,\n되고 있는 걸까요?"
10036-120 = "저는 늘 실수가 많아서……"
10036-130 = "모처럼, 관리를 맡겨 주셨는데\n이래도 괜찮을까요……"
10036-140 = "뭐, 뭐든지 시켜만 주세요!\n일단은 힘내 볼 테니까요……!"
10036-150 = "최근에 저와 관련된\n이상한 소문이\n많다고 하던데요……?"
10036-160 = "자매님들께 여쭤봐도\n가르쳐 주질 않으셔서……"
10036-170 = "짐 나르기나 물건 정리 등,\n잡다한 일이라면 부디,\n제게 맡겨 주세요……!"
10036-180 = "이래 봬도\n관리 담당자니까요!"
10036-190 = "선생님, 생일 축하드려요!"
10036-200 = "저에게도 오늘은, 정말\n특별하고 중요한 날이네요!"
10036-210 = "서, 선생님……\n그…… 그게,\n저…… 오늘은……"
10036-220 = "오, 오늘은\n제 생일, 인데요……!\n그, 그래서 오늘…… 그,"
10036-230 = "계속 같이\n있어 주실 수 있을까요……!?"
10036-240 = "새해라……"
10036-250 = "올해는 좀 더,\n선생님께 대견한 모습을\n보여드릴 수 있도록……!"
10036-260 = "오늘은 성탄절이네요!"
10036-270 = "부족하지만 그래도 저 또한\n시스터후드의 시스터."
10036-280 = "오늘은 꼭, 선생님을\n위해 기도하겠습니다."
10036-290 = "아, 오늘이\n할로윈인가요……?"
10036-300 = "그래서 아까까지 바깥에\n다양한 차림새의 사람들이……"
10036-310 = "……아. 그,\n혹시나 해서 말인데요,\n이 옷은 꾸미려던 게 아니라\n제 평소 복장이니까요……!"
10036-330 = "……저기, 죄송했습니다.\n선생님."
10036-340 = "뭔가…… 폐를\n끼치게 되어버려서……"
10036-350 = "별 일 아니라고만,\n생각하고 있었던 터라……"
10036-360 = "튼튼한 몸이 자랑이었는데,\n면목 없습니다……"
10036-370 = "말씀하신 대로,\n좀 쉬도록 할게요."
10036-380 = "그래서 저기, 잠시동안……\n같이 있어 주시겠어요?"
10036-390 = "그런 편이,\n마음도 더 편안하고……"
10036-400 = "네. 감사합니다."
10036-410 = "……선생님께선 상냥하시군요."
10036-2600 = "이, 이렇게까지 기대를\n받을 거라곤……\n…기뻐요. 힘내서,\n기대에 부응해 보겠습니다……!"

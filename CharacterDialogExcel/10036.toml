[translation]
10036-10 = "B-Blue Archive!"
10036-20 = "I-I'm Wakaba Hinata. Nice to meet you."
10036-30 = "I-I can't sit still for some reason."
10036-40 = "There are so many different things here..."
10036-50 = "I-It's probably not a bad idea to rest somewhere like this every once in a while, right?"
10036-60 = "Hmm... I'm tired."
10036-70 = "Is it really okay for me to relax like this?"
10036-80 = "Y-You're here, Sensei! Peace be with you today!"
10036-90 = "Oh, you're here, Sensei! Just in time! I'm done organizing."
10036-100 = "T-Truth is...I love being able to help others!"
10036-110 = "I-I just wonder...if I'm helpful to you in any way."
10036-120 = "Even though I'm supposed to be a manager..."
10036-130 = "...I'm always making mistakes... Is that really okay?"
10036-140 = "J-Just tell me what to do! I'll do my best no matter what!"
10036-150 = "I heard there are a lot of rumors going around about me. I wonder what they're about."
10036-160 = "No one in the Sisterhood will tell me..."
10036-170 = "If you need to move stuff or tidy things up, please leave it to me."
10036-180 = "I'm a manager, after all!"
10036-190 = "Happy birthday, Sensei!"
10036-200 = "Your birthday is a very special day for me too!"
10036-210 = "S-Sensei... So, um, today..."
10036-220 = "T-Today is my birthday! S-So would you..."
10036-230 = "...mind spending it with me?"
10036-240 = "A new year..."
10036-250 = "This year, I want to show you an even better version of myself, Sensei."
10036-260 = "It's Christmas Day!"
10036-270 = "I may be lacking, but I'm still part of the Sisterhood, so..."
10036-280 = "...I'll pray for you, Sensei."
10036-290 = "Oh, is today Halloween?"
10036-300 = "Th-That's why people are wearing those outfits..."
10036-310 = "Oh. I just want to make it clear. This is no costume. It's my normal attire!"
10036-330 = "U-Um, I'm so sorry...Sensei."
10036-340 = "I never wanted to be a burden to you."
10036-350 = "I can push through this...or so I thought."
10036-360 = "I'm useless if I'm not healthy. It's so embarrassing..."
10036-370 = "But you're right. I should be resting."
10036-380 = "So, if...it's not too much to ask, would you mind staying with me for a bit?"
10036-390 = "I'd feel a lot better with you here..."
10036-400 = "You will? Thank you."
10036-410 = "You're so sweet, Sensei."
10036-2600 = "I didn't expect to get so much attention. But...I'm glad! I'll try to live up to everyone's expectations!"

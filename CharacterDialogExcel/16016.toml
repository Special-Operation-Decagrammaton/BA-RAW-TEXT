[translation]
16016-10 = "Blue Archive!"
16016-20 = "ชมรมอัศวินบรรเทาทุกข์...\nไม่สิ เมมเบอร์วงแอนทีก เซราฟิม\nอาโอโมริ มิเนะค่ะ ฝากตัวด้วยนะคะ"
16016-30 = "สถานที่แห่งนี้..."
16016-40 = "ถูกใจฉันมาก\nเลยละค่ะ"
16016-50 = "ฉันต้องซ้อมเต้นสิ..."
16016-60 = "ฮุฮุ ผู้ชมมากัน\nเยอะเลยนะคะ..."
16016-70 = "ถ้าไม่ฝึกซ้อมให้สมกับ\nที่คาดหวังละก็..."
16016-80 = "เชิญค่ะ คุณครู"
16016-90 = "ฉันมีเรื่องอยากปรึกษาค่ะ\nพอมีเวลาสักเดี๋ยวมั้ยคะ?"
16016-100 = "มาได้จังหวะพอดีเลยนะคะ\nฉันเพิ่งซ้อมใหญ่เสร็จเมื่อกี้เลยค่ะ"
16016-110 = "ชุดแบบนี้ในที่แบบนี้...\nรู้สึกแปลกจังเลยนะคะ"
16016-120 = "ดูเหนื่อยนะคะ...\nฉันร้องเพลงคลายความ\nเหนื่อยล้าให้เอามั้ยคะ?"
16016-130 = "ปกติฉันเป็นฝ่ายเรียนรู้\nจากคุณครูอยู่เสมอ..."
16016-140 = "แต่ถ้าเป็นเรื่องเต้นและเพลง\nฉันสามารถสอนให้ได้ค่ะ"
16016-150 = "ถ้าต้องการอะไร\nก็บอกได้ทุกอย่างเลยนะคะ"
16016-160 = "นี่ก็เป็นแฟนเซอร์วิส\nอย่างหนึ่งค่ะ"
16016-170 = "สุขสันต์วันเกิดค่ะ คุณครู"
16016-180 = "ฉันร้องเพลงอวยพรให้มั้ยคะ?"
16016-190 = "จำได้สินะคะ..."
16016-200 = "เอ่อ... เพื่อเป็นของขวัญวันเกิด..."
16016-210 = "ออกไปข้างนอกกับฉัน\nหน่อยได้มั้ยคะ?"
16016-220 = "สวัสดีปีใหม่ค่ะ\nคุณครู"
16016-230 = "ปีนี้หวังว่าจะได้เจอฉันบนเวที\nมากกว่าฉันที่เป็น\nหัวหน้าชมรมอัศวินฯ นะคะ"
16016-240 = "วันที่ศักดิ์สิทธิ์...\nคือวันแห่งการ\nร้องเพลงคริสต์มาสใช่มั้ยคะ?"
16016-250 = "ชะ... ชุดนี้\nก็เพื่อการนั้น..."
16016-260 = "แต่ว่า...\nถ้าถามว่าใช่ชุดแฟนซีหรือเปล่า\nก็อาจจะใช่ก็ได้นะคะ"
16016-270 = "ความสัมพันธ์นี้... เหมือนผู้จัดการ\nของไอดอลเลยนะคะ คุณครูช่วย\nสนับสนุนจนฉันอยู่บนเวทีหลักได้\nถ้าเป็นอย่างนั้นได้ก็ดีน่ะสิ...\nน่าเสียดายนะคะ"
16016-280 = "นะ... นี่มัน... แบบว่า..."
16016-290 = "เหมือนจะแตกต่าง...\nจากที่ฉันคิดไว้เลยค่ะ..."
16016-300 = "มะ... ไม่ค่ะ!\nฉะ... ฉันไม่ได้ไม่ชอบ\nหรอกค่ะ..."
16016-310 = "ตะ... แต่ว่า..!\nฉันก็ไม่ได้ชอบค่ะ...!"
16016-320 = "ฉันชอบ\nอะไรน่ารักๆ\nก็จริง..."
16016-330 = "แต่การที่ฉัน\nเป็นสิ่งที่น่ารักเสียเอง"
16016-340 = "คะ... คือว่า...\nฉันไม่ได้คาดหวัง..."
16016-350 = "ให้เกิดสถานการณ์แบบนี้นะคะ...!"
16016-360 = "ละ... ล้อฉันเล่นเหรอคะ\nคุณครู?"
16016-370 = "ยะ... อย่าพูด\nอะไรแบบนั้นสิคะ...!"
16016-380 = "ฉะ... ฉัน...\nควรทำยังไงดีคะ.."

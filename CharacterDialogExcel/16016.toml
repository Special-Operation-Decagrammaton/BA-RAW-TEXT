[translation]
16016-10 = "Blue Archive!"
16016-20 = "Aomori Mine from the Remedial Knights...no, Antique Seraphim. I look forward to working with you."
16016-30 = "This place..."
16016-40 = "I heartily approve."
16016-50 = "I must practice my dancing."
16016-60 = "Fufu. There are many members in the audience."
16016-70 = "I must practice vigorously to live up to their expectations!"
16016-80 = "Welcome, Sensei."
16016-90 = "I wish to consult with you about something. Do you happen to have a moment?"
16016-100 = "Excellent timing. We've just finished rehearsal."
16016-110 = "This place, in a costume like this... It feels odd."
16016-120 = "You seem tired... Would a song relieve that fatigue?"
16016-130 = "I am always learning one lesson or another from you."
16016-140 = "However, in the realm of song and dance, I am the one qualified to teach you."
16016-150 = "If you have any request, please feel free to let me know."
16016-160 = "This is also part of fan service."
16016-170 = "Happy birthday, Sensei."
16016-180 = "May I sing you a song to celebrate?"
16016-190 = "...You remembered."
16016-200 = "Um... As a birthday gift..."
16016-210 = "Would you participate in an excursion, with me?"
16016-220 = "Happy New Year, Sensei."
16016-230 = "I hope to see more days on the stage than at a medical site, this year."
16016-240 = "A holy day.. A day to sing carols, is that right?"
16016-250 = "Th-The intention of this costume isn't that..."
16016-260 = "...but, if you were to categorize it as a costume, that could be correct."
16016-270 = "Our relationship...is similar to that of an idol and her manager. I stand on the main stage, while you support me. Such a situation would have been excellent. What a shame."
16016-280 = "Th-This is... It's..."
16016-290 = "This is not...quite what I expected...!"
16016-300 = "N-No! I-I'm not averse to it or anything of the sort..."
16016-310 = "H-However! I am not implying that I enjoy it either...!"
16016-320 = "I mean, it is a fact that I appreciate cute things..."
16016-330 = "But for me to be the one who is \"cute\"..."
16016-340 = "I... What I am saying is...! I wasn't..."
16016-350 = "...presuming that to be the situation...!"
16016-360 = "A-Are you making fun of me, Sensei?"
16016-370 = "D-Do not say such things...!"
16016-380 = "Wh-What...should I do...?!"

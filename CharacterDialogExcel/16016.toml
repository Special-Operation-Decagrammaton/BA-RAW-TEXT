[translation]
16016-10 = "蔚藍檔案！"
16016-20 = "我是救護騎士團……\n不，是Antique Seraphim的成員，名叫蒼森美禰。\n請多多指教。"
16016-30 = "這裡……"
16016-40 = "我非常滿意。"
16016-50 = "雖然想做\n舞蹈的練習……"
16016-60 = "呵呵，觀眾\n很多呢……"
16016-70 = "為了回應期待，\n得努力練習才行……！"
16016-80 = "歡迎回來，老師。"
16016-90 = "我有事情想跟您商量，\n方便占用您一些時間嗎？"
16016-100 = "您來得正是時候呢。\n就在剛才，彩排已經結束了。"
16016-110 = "以這副打扮擔任值日生，\n有種奇妙的感覺呢。"
16016-120 = "您看起來似乎很累呢……\n能恢復疲勞的歌曲，\n要不要聽聽看呢？"
16016-130 = "雖然平時總是\n老師教導我……"
16016-140 = "但如果是舞蹈和歌唱，\n或許我也能教您也說不定。"
16016-150 = "如果您有什麼要求的話，\n請您儘管告訴我。"
16016-160 = "因為這也是\n粉絲服務的一環。"
16016-170 = "祝您生日快樂，老師。"
16016-180 = "作為祝福，能讓我\n為您獻唱一曲嗎？"
16016-190 = "……原來您記得啊。"
16016-200 = "那個……\n作為生日禮物……"
16016-210 = "要不要跟我\n一起出門呢？"
16016-220 = "祝您新年快樂，老師。"
16016-230 = "祈望今年並非在救護現場，\n而是在舞台上相見的日子\n能夠越來越多。"
16016-240 = "神聖的日子……\n吟唱頌歌的日子，\n這麼理解應該沒錯吧？"
16016-250 = "這，這副打扮，\n並沒有那個意思……"
16016-260 = "……不過，要\n稱之為變裝的話，\n似乎也沒錯。"
16016-270 = "這樣的關係……\n簡直就像偶像和經紀人一樣呢。\n老師進行支援，而我則站上舞台。\n如果真是如此就好了……真可惜。"
16016-280 = "這，這是……那個……"
16016-290 = "感覺跟我預期的……\n不太一樣……！"
16016-300 = "不，不是的！\n我沒有……\n不喜歡的意思……"
16016-310 = "但，但是！\n也沒有覺得喜歡……！"
16016-320 = "確實，我自己也喜歡\n可愛的東西沒錯……"
16016-330 = "但「可愛」的對象\n是自己就……"
16016-340 = "那，那個……\n這種情況……"
16016-350 = "不在我的預期之內……！"
16016-360 = "您，您是在\n取笑我對吧，老師？"
16016-370 = "請，請您別說那種話……！"
16016-380 = "我，我……\n該怎麼辦才好……！"

[translation]
16016-10 = "블루 아카이브!"
16016-20 = "구호기사단…아뇨, 앤틱 세라핌 멤버.\n아오모리 미네라고 합니다. 잘 부탁드립니다."
16016-30 = "이 장소는…"
16016-40 = "무척이나\n마음에 드는군요."
16016-50 = "춤 연습을\n해야 하는데…"
16016-60 = "후후, 관객들이\n많이 계시네요…"
16016-70 = "기대에\n부응할 수 있도록,\n연습하지 않으면…!"
16016-80 = "어서 오세요, 선생님."
16016-90 = "상담하고 싶은 것이\n있습니다만,\n잠깐 시간 괜찮으실까요?"
16016-100 = "마침 좋은 타이밍에 오셨네요.\n조금 전 리허설이 끝났습니다."
16016-110 = "이런 옷으로 이런 장소…\n묘한 기분이네요."
16016-120 = "피곤하신 모양이군요…\n피로회복의 노래 같은 건,\n어떠실까요?"
16016-130 = "늘 선생님께 배우는\n저입니다만…"
16016-140 = "춤과 노래라면\n알려드릴 수 있을 것 같아요."
16016-150 = "뭔가 요청이 있으시면,\n뭐든지 말씀해 주세요."
16016-160 = "이것도 팬 서비스의\n일환입니다."
16016-170 = "생일 축하합니다, 선생님."
16016-180 = "축하로 한 곡 불러도 될까요?"
16016-190 = "…기억해 주셨군요."
16016-200 = "그…생일 선물로…"
16016-210 = "함께 외출하지\n않으시겠어요?"
16016-220 = "새해 복 많이 받으세요,\n선생님."
16016-230 = "올해는 구호의 장이 아닌\n무대에서 만나는 날이\n많아지기를 기원합니다."
16016-240 = "성스러운 날…\n캐롤을 부르는 날, 이\n맞을까요?"
16016-250 = "이, 이 복장은,\n그런 의미는…"
16016-260 = "…하지만,\n가장이냐고 물어본다면,\n맞을지도 모르겠네요."
16016-270 = "이 관계…꼭 아이돌과 매니저 같네요.\n선생님이 지원해 주고,\n내가 메인 무대에 선다.\n정말 그랬다면 좋았을 텐데…\n아쉽네요."
16016-280 = "이, 이건… 그러니까…"
16016-290 = "생각했던 것과…\n다른 것 같습니다만…!"
16016-300 = "아, 아뇨!\n싫다는 건\n아니지만요……!"
16016-310 = "그, 그치만!\n좋아한다는 것도\n아니고……!"
16016-320 = "확실히, 제가 귀여운 걸\n좋아하는 건\n사실이지만…"
16016-330 = "「귀엽다」의 대상이\n자신이라는 것은…"
16016-340 = "그, 그러니까…\n그런 상황을…"
16016-350 = "상정하고 있던 것은…!"
16016-360 = "놀, 놀리는 건가요,\n선생님?"
16016-370 = "그, 그런 말\n하지 말아주세요…!"
16016-380 = "저, 저…\n어떻게 하면……!"

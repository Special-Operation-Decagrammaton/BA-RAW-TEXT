[translation]
20005-10 = "Blue Archive!"
20005-20 = "I-I know this look is still very modest. But if you're okay with it, I'm happy to help!"
20005-30 = "It's a little embarrassing to wear this in a cafe."
20005-40 = "The furniture has a summer vibe too..."
20005-50 = "(No wonder. I had a feeling I was attracting attention.)"
20005-60 = "(The warmth of the summer sun feels great...)"
20005-70 = "(Is there any summer-exclusive Peroro merch?)"
20005-80 = "Sensei, it's the ocean! The ocean is waiting for us!"
20005-90 = "The weather's nice today, Sensei. Are you up for a walk on the beach?"
20005-100 = "I heard we were going to the beach, so I put this on."
20005-110 = "How does it look? Is it too plain?"
20005-120 = "We can't leave out Peroro, even during a vacation on the beach!"
20005-130 = "I thoroughly prepared waterproofing measures to prevent Peroro's soft feathers from getting wet!"
20005-140 = "Hmm? Sensei, have you seen Crusadie that was parked at the front of the Schale building?"
20005-150 = "Happy birthday, Sensei!"
20005-160 = "I want you to have my cherished Peroro tube as a gift!"
20005-170 = "What do I want for my birthday?"
20005-180 = "Thanks, but I'm okay."
20005-190 = "Having a vacation with Sensei is the best birthday gift for me!"
20005-200 = "Happy New Year, Sensei!"
20005-210 = "I can't wait for summer this year as well!"
20005-220 = "I saw Peroro buried in the snow in front of the Schale building earlier."
20005-230 = "It was only wearing a Santa hat. Won't it get cold in this weather?"
20005-240 = "H-Halloween costume? This is just a typical swimsuit. Ahaha... I can understand the confusion, though."
20005-260 = "Let's clean! Every nook and cranny! ♪"
20005-270 = "I can't let Crusadie get rusty."
20005-280 = "We're all supposed to share it, so it needs to be returned in good condition."
20005-290 = "Careful, Sensei. If you stay there, you might get hit by a stream of water."
20005-300 = "You don't mind because you're wearing a swimsuit?"
20005-310 = "Well, that's true. Speaking of which, let's go swimming together next time!"
20005-2600 = "This firearm is waterproof, right...?"

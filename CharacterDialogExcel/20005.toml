[translation]
20005-10 = "Blue Archive!"
20005-20 = "ถ้าคุณครูโอเคกับฉันที่ดูธรรมดาๆ แบบนี้...\nก็ขอรบกวนด้วยนะคะ!"
20005-30 = "ใส่ชุดแบบนี้ในคาเฟ่...\nรู้สึกเขินนิดหน่อยค่ะ"
20005-40 = "มีเฟอร์นิเจอร์ที่เข้ากับ\nช่วงฤดูร้อนอยู่เยอะแยะเลย..."
20005-50 = "(ดูเหมือนฉันกำลัง\nเป็นจุดสนใจอยู่เลยล่ะค่ะ...)"
20005-60 = "(แสงแดดอบอุ่นของฤดูร้อน...\nทำให้รู้สึกดีจังเลย...)"
20005-70 = "(จะมีสินค้าลิมิเต็ดเอดิชั่น\nของเพโรโร่คอลเลกชัน\nฤดูร้อนมั้ยนะ...?)"
20005-80 = "คุณครูคะ ทะเลค่ะ... ทะเล!\nตอนนี้ท้องทะเลกำลัง\nร้องเรียกพวกเราอยู่นะคะ!"
20005-90 = "วันนี้อากาศดีจังเลยนะคะคุณครู\nคุณครูอยากไปเดินเล่น\nที่ชายหาดกับฉันมั้ยคะ?"
20005-100 = "พวกเราจะไปทะเลกัน\nฉันก็เลยลองใส่ชุดนี้มาค่ะ..."
20005-110 = "คุณครูคิดว่ายังไงบ้างคะ?\nดูธรรมดาเกินไปหรือเปล่าคะ?"
20005-120 = "ตอนที่มาสนุกกับการพักผ่อน\nที่ทะเลในฤดูร้อนแบบนี้ จะลืม\nตุ๊กตาท่านเพโรโร่ได้ยังไงกันคะ!"
20005-130 = "เพื่อไม่ให้ขนนุ่มๆ ของท่านเพโรโร่\nต้องเปียกน้ำ ฉันเลยเตรียมวิธีป้องกัน\nไว้แล้วด้วยค่ะ!"
20005-140 = "เอ๋...? คุณครู ไม่เห็นครูเซเดอร์จัง\nที่จอดอยู่ตรงด้านหน้าอาคาร\nชาเล่ต์เหรอคะ?"
20005-150 = "สุขสันต์วันเกิดค่ะคุณครู!"
20005-160 = "ถ้างั้นเพื่อเป็นการฉลอง...\nฉันจะให้ห่วงยางท่านเพโรโร่\nที่ฉันหวงมากๆ เป็นของขวัญคุณครูค่ะ!"
20005-170 = "ฉันอยากได้อะไร...\nเป็นของขวัญวันเกิดงั้นเหรอคะ?"
20005-180 = "ขอบคุณนะคะ\nแต่ไม่เป็นไรหรอกค่ะ"
20005-190 = "การได้มาเที่ยวพักผ่อนกับคุณครู\nแบบนี้ เป็นของขวัญที่ดีที่สุดสำหรับ\nฉันเลยล่ะค่ะ!"
20005-200 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ คุณครู"
20005-210 = "ฉันจะตั้งตารอฤดูร้อนปีนี้\nด้วยเหมือนกันค่ะ!"
20005-220 = "เมื่อกี้ที่หน้าอาคารของชาเล่ต์\nฉันเห็นท่านเพโรโร่\nโดนฝังอยู่ในกองหิมะด้วยค่ะ"
20005-230 = "ถ้าใส่หมวกซานต้าแบบตัวเปล่าๆ\nในอากาศแบบนี้\nมันจะไม่หนาวเหรอคะ...?"
20005-240 = "อ่า นี่วันฮาโลวีนเหรอคะ? นี่มันก็แค่\nชุดว่ายน้ำธรรมดาเองนะ? อ่า แหะๆ...\nถึงจะไม่เหมาะกับฤดูนี้เท่าไรก็เถอะค่ะ..."
20005-260 = "เช็ดๆ ถูๆ~\nให้สะอาดทุกซอกทุกมุม~"
20005-270 = "ฉันจะปล่อยให้ครูเซเดอร์จัง\nขึ้นสนิมไม่ได้หรอกค่ะ"
20005-280 = "นี่เป็นของที่ทุกคนใช้ร่วมกันนี่คะ\nเพราะงั้นก็ควรจะทำความสะอาด\nก่อนจะเอาไปคืนค่ะ"
20005-290 = "อ๊ะ คุณครูคะ\nถ้ามายืนใกล้แบบนี้\nเดี๋ยวจะโดนน้ำจนตัวเปียกนะคะ"
20005-300 = "ใส่ชุดว่ายน้ำอยู่แล้ว\nถึงเปียกก็ไม่เป็นไรเหรอคะ?"
20005-310 = "ค่ะ ก็จริงนะคะ\nถ้างั้นคราวหน้า\nพวกเราไปว่ายน้ำด้วยกันนะคะ!"
20005-2600 = "ปืนด้ามนี้กันน้ำได้ใช่มั้ยคะ?"

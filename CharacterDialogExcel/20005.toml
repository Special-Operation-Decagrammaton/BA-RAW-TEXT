[translation]
20005-10 = "蔚藍檔案！"
20005-20 = "雖，雖然還是一如往常平凡的我……不過還是請多指教！"
20005-30 = "這種打扮在咖啡廳……\n有點害羞呢。"
20005-40 = "夏天氣氛的家具有好多……"
20005-50 = "（總，總覺得\n　好像被注視著……？）"
20005-60 = "（夏天溫暖的陽光……\n好舒服……）"
20005-70 = "（不知道有沒有\n夏日限定的\n佩洛洛大人周邊呢……？）"
20005-80 = "老師！是海唷，大海！\n大海正在等著我們！"
20005-90 = "今天天氣真好呢，老師。\n要不要一起沿著海邊散步呀？"
20005-100 = "因為要去海邊，\n所以稍微打扮了一下……"
20005-110 = "請，請問如何呢？\n會，太平凡嗎……？"
20005-120 = "就算是\n在夏天的海邊渡假，\n也不能少了\n佩洛洛大人的玩偶！"
20005-130 = "為了不讓\n佩洛洛大人的羽毛濕掉\n也有徹底做好防水對策！"
20005-140 = "……咦？老師，本來停在\n夏萊前面的十字軍醬，\n請問老師知道跑去哪裡了嗎？"
20005-150 = "祝你生日快樂，老師！"
20005-160 = "當作慶祝，\n把我的這個\n佩洛洛大人的泳圈送給你！"
20005-170 = "有沒有什麼生日想要的東西\n……是嗎？"
20005-180 = "……謝謝老師，\n不過沒關係。"
20005-190 = "因為和老師一起度過的\n這次渡假，對我來說\n就是最棒的生日禮物！"
20005-200 = "祝你新年快樂，老師。"
20005-210 = "今年的夏天，\n我也會期待著哦！"
20005-220 = "剛才在夏萊的建築物前，\n看見被雪埋住的佩洛洛大人……"
20005-230 = "以裸體的狀態，\n只戴著聖誕老人的帽子，\n會不會冷呢……？"
20005-240 = "咦，萬聖節的服裝？\n啊，不，\n這是普通的泳衣……\n啊哈哈，\n雖然也許有點不合季節……"
20005-260 = "哼哼～♪\n每個角落都變乾淨吧～♪"
20005-270 = "可不能讓十字軍醬生鏽呢！"
20005-280 = "畢竟這是大家一起使用的東西，\n必須乾乾淨淨的送回學校才行。"
20005-290 = "啊，老師。\n太靠近的話，\n可能會被水淋濕喔！"
20005-300 = "你說因為穿著泳裝，\n所以濕了也沒關係嗎？"
20005-310 = "確實如此呢。\n啊，那麼機會難得，\n待會兒一起去游泳吧！"
20005-2600 = "這把槍械，\n有經過防水加工嗎……？"

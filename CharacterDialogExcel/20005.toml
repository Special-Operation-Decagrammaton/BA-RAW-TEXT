[translation]
20005-10 = "블루 아카이브!"
20005-20 = "언제나처럼 수수한 저입니다만……\n잘 부탁드려요!"
20005-30 = "카페에서 이 차림은……\n조금 부끄럽네요."
20005-40 = "여름 분위기의\n가구가 잔뜩……."
20005-50 = "(어쩐지 주목받고\n있는 것 같아요.)"
20005-60 = "(여름의 따사로운\n햇살이……\n기분 좋아요…….)"
20005-70 = "(여름 한정의\n페로로 님 굿즈는\n없으려나……?)"
20005-80 = "선생님. 바다예요, 바다!\n바다가 저희를\n기다리고 있어요!"
20005-90 = "오늘은 날씨가 좋네요, 선생님.\n같이 해변 산책이라도\n하지 않으시겠어요?"
20005-100 = "바다에 간다고 해서\n조금 멋을 부려봤는데……"
20005-110 = "보시기에 어떠신가요?\n너무 평범해 보이지는 않나요?"
20005-120 = "여름 바다에서 바캉스를\n즐길 때도 페로로 님의\n인형은 빼놓을 수 없죠!"
20005-130 = "페로로 님의 부드러운 깃털이\n젖지 않도록 방수 대책도\n철저히 준비했답니다!"
20005-140 = "……어라?\n선생님. 샬레 건물\n앞에 주차되어 있던\n크루세이더 쨩, 못 보셨나요?"
20005-150 = "생일 축하드려요, 선생님!"
20005-160 = "축하의 의미로\n제가 아끼는 페로로 님\n튜브를 선물해 드릴게요!"
20005-170 = "뭔가 생일 선물로 바라는 것……\n말인가요?"
20005-180 = "……감사합니다.\n그래도 괜찮아요."
20005-190 = "선생님과 함께하는\n이 바캉스가 제게는\n최고의 생일 선물이니까요!"
20005-200 = "새해 복 많이 받으세요,\n선생님."
20005-210 = "이번 여름도\n기대하고 있을게요!"
20005-220 = "아까 샬레의 건물\n앞에서 눈에 파묻힌\n페로로 님을 보았어요."
20005-230 = "맨 몸에 산타 모자만\n쓰고 있었는데, 이 날씨에\n춥지 않을까요……?"
20005-240 = "하, 할로윈 의상이요?\n이건 그냥 평범한 수영복인데요?\n아하하……조금 계절에\n어울리지 않는 차림이지만요……."
20005-260 = "구석~ 구석~\n깨끗해져라~."
20005-270 = "크루세이더 쨩을,\n녹슬게 할 순 없으니까요."
20005-280 = "원래 모두가 함께\n사용하는 물건이고\n깨끗이 제자리에\n돌려놔야 할 텐데."
20005-290 = "아, 선생님.\n너무 가까이 계시면\n물줄기에 젖을지도 몰라요?"
20005-300 = "수영복을 입고 있으니\n젖어도 상관없다고요?"
20005-310 = "확실히 그렇네요.\n아, 그럼 모처럼이기도 하니\n다음번엔 같이 수영하러 가요!"
20005-2600 = "이 총기, 방수 처리는\n되어 있겠죠……?"

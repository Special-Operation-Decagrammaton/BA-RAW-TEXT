[translation]
13011-10 = "蔚藍檔案！"
13011-20 = "從現在起，超級有趣的故事要開始囉！"
13011-30 = "遊戲～遊戲～\n我想玩遊戲～"
13011-40 = "咦？這不是我小時候\n玩過的那套遊戲嗎！？"
13011-50 = "唔嗯，這樣部員們\n的零食費還不夠。\n是不是該去打工呢。"
13011-60 = "啊！突然有個\n好劇本的點子浮現了！"
13011-70 = "太好了！\n過關了！！"
13011-80 = "歡迎回來，老師！\n趕快開始任務吧！"
13011-90 = "準備完成！走吧，老師！\n去完成下一個任務！"
13011-100 = "喜歡玩遊戲的人和\n遊戲玩得好的人\n經常不一樣哦。"
13011-110 = "老師是哪一種呢？"
13011-120 = "啊！今天是\n新遊戲發售的日子！"
13011-130 = "本來今天打算\n要去打副本的說！\n居然輪到我值班……！"
13011-140 = "……算了，\n反正這裡我也喜歡。"
13011-150 = "老師！任務什麼的\n以後再做就好\n總之先去玩遊戲吧！"
13011-160 = "老師真好……\n有想要的遊戲的話\n隨時都能買對吧？"
13011-170 = "老師！生日快樂！\n今天和遊戲開發部的大家\n一起去吃好吃的吧！"
13011-180 = "老師！今天是\n我和綠的生日哦！"
13011-190 = "買可以2個人\n一起玩的遊戲給我嘛～"
13011-200 = "新年快樂！\n今年也開心地玩遊戲吧！"
13011-210 = "聖誕節啊……\n唔嗯～"
13011-220 = "如果老師穿上紅色衣服\n送我遊戲機的話\n那就是最棒的聖誕節了呢！"
13011-230 = "哇啊！萬聖節到了！\n總覺得好興奮！\n老師！快給我糖果吧！"
13011-250 = "老師！你看！\n我這邊的印章\n全都集滿了唷！"
13011-260 = "這樣一來就是任務完成了，對吧！\n太好了！"
13011-270 = "一開始還想說\n不知道會怎麼樣呢……"
13011-280 = "老師果然和我\n很合拍呢！"
13011-290 = "呃，哇啊！？\n老師！？"
13011-300 = "都滿身大汗了！\n還好嗎！？"
13011-310 = "啊哈，沒事真是太好了。\n今天也託老師的福，\n過得非常開心唷！"
13011-320 = "如果以後\n還有這種活動的話，"
13011-330 = "那個時候，\n我們再一起參加吧！\n老師！"
13011-2600 = "這……這就是……我的固有武器！\n這樣一來我也是超強化型JK了！"

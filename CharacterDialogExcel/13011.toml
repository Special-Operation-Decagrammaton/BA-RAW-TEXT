[translation]
13011-10 = "블루 아카이브!"
13011-20 = "재미있는 이야기가!\n지금부터 시작될 거야!"
13011-30 = "게임~ 게임~\n게임이 하고 싶어~"
13011-40 = "어라? 이거 어렸을 때\n봤던 그 시리즈인데?!"
13011-50 = "으음. 아무래도 부원들\n간식비가 부족한데.\n아르바이트라도 할까."
13011-60 = "앗! 갑자기 근사한\n시나리오가 떠올랐어!"
13011-70 = "좋았어!\n클리어다!!"
13011-80 = "어서 와 선생님!\n빨리 임무를 시작하자!"
13011-90 = "준비는 끝났어!\n가자 선생님! 퀘스트를\n클리어 하는거야!"
13011-100 = "게임을 즐기는 사람과\n잘하는 사람은 달라."
13011-110 = "선생님은 어떤 사람이야?"
13011-120 = "앗! 오늘 신작 게임\n발매하는 날인데"
13011-130 = "원래 오늘 레이드\n가기로 한 날인데!\n당번을 맡게 됐잖아!"
13011-140 = "…뭐, 이것도 괜찮지만."
13011-150 = "선생님! 임무 같은 건\n나중에 해도 좋으니까\n일단 게임이나 하러 가자!"
13011-160 = "선생님은 좋겠다…….\n갖고 싶은 게임 있으면\n언제든 살 수 있고."
13011-170 = "선생님! 생일 축하해!\n오늘 게임개발부랑\n맛있는 거 먹으러 가자!"
13011-180 = "선생님! 오늘은\n나와 미도리의 생일이야!"
13011-190 = "같이 할 수 있는\n2인용 게임 사줘~"
13011-200 = "해 피 뉴 이 어!\n올 한 해도 즐겁게 게임하자!"
13011-210 = "크리스마스라……\n하아."
13011-220 = "선생님이 빨간 옷 입고\n게임기 선물해주면\n최고의 성탄일 텐데!"
13011-230 = "와아! 할로윈이다!\n어쩐지 설레! 선생님!\n어서 사탕 사줘!"
13011-250 = "이거 봐봐! 선생님!\n이 스탬프 카드, 다 채웠어!"
13011-260 = "이걸로 퀘스트 클리어! 엣-헴!"
13011-270 = "불가능해 보일 것만\n같던 퀘스트였지만."
13011-280 = "응!\n역시 선생님과 나,\n환상의 콤비네!"
13011-290 = "우와아앗! 선생님!"
13011-300 = "얼굴이 땀으로 범벅이네?!\n괜찮아?"
13011-310 = "아하핫! 괜찮다니 다행이네~\n그래도 오늘- 선생님 덕분에\n엄청 재미있었어!"
13011-320 = "다음에 또 이런\n이벤트가 있다면……."
13011-330 = "응, 그때 다시 같이\n참가하자! 선생님!"
13011-2600 = "이… 이것이…… 내 전용장비!\n이것으로 나도, 초강화형 여고생!"

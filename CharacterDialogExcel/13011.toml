[translation]
13011-10 = "Blue Archive!"
13011-20 = "เรื่องราวที่สนุกสนาน\nจะเริ่มขึ้น ณ บัดนี้!"
13011-30 = "เกม~ เกม~\nอยากเล่นเกม~"
13011-40 = "หืม? นี่มันเรื่องที่ี่\nฉันเคยดูตอนเด็กๆ นี่นา!"
13011-50 = "ค่าอาหารว่างของชมรม\nน่าจะไม่พอล่ะ\nไปทำงานพาร์ทไทม์ดีมั้ยนะ?"
13011-60 = "อ๊ะ?! อยู่ๆ ก็คิดเนื้อเรื่อง\nที่ยอดเยี่ยมได้!"
13011-70 = "เยี่ยมเลย! เคลียร์!!"
13011-80 = "ยินดีต้อนรับนะคุณครู\nมาเริ่มภารกิจกัน!"
13011-90 = "เตรียมตัวพร้อมแล้ว!\nไปกันเถอะคุณครู!\nเราต้องเคลียร์เควสให้ได้!"
13011-100 = "มันไม่เหมือนกันหรอกนะ\nคนที่ชอบเล่นเกม\nกับคนที่เล่นเกมเก่งน่ะ"
13011-110 = "คุณครูล่ะเป็นคนแบบไหน?"
13011-120 = "อ๊ะ?! วันนี้คือวันเปิดตัวเกมใหม่!"
13011-130 = "วันนี้ว่าจะลงเรดแล้วเชียว!\nแต่ก็ต้องมาอยู่เวรซะได้!"
13011-140 = "แต่นี่ก็... ไม่ได้แย่เท่าไหร่หรอก"
13011-150 = "คุณครู! ภารกิจน่ะเอาไว้ทำ\nทีหลังก็ได้ ก่อนอื่นเรามา\nเล่นเกมกันก่อนดีมั้ย?"
13011-160 = "อิจฉาคุณครูจัง...\nถ้ามีเกมที่อยากได้\nก็ซื้อได้ทันทีเลยไงล่ะ"
13011-170 = "คุณครู! สุขสันต์วันเกิด!\nวันนี้ไปกินของอร่อยๆ\nกับชมรมพัฒนาเกมกันเถอะ!"
13011-180 = "คุณครู! วันนี้คือ\nวันเกิดของฉันกับมิโดริล่ะ!"
13011-190 = "ซื้อเกมที่เล่น 2 คน\nให้หน่อยน้า~"
13011-200 = "แฮป ปี้ นิว เยียร์!\nปีนี้ก็มาเล่นเกมให้สุดเหวี่ยง\nกันไปเลย!"
13011-210 = "วันคริสต์มาส...\nเฮ้อ..."
13011-220 = "ถ้าคุณครูใส่ชุดสีแดง\nแล้วซื้อเครื่องเล่นเกมให้ล่ะก็\nจะเป็นคริสต์มาสที่ดีที่สุดเลยล่ะ"
13011-230 = "ว้าว! วันนี้วันฮาโลวีนล่ะ!\nตื่นเต้นอย่างบอกไม่ถูกเลย!\nคุณครู! ซื้อลูกกวาดให้หน่อยสิ!"
13011-250 = "ดูนี่สิ! คุณครู!\nฉันเก็บแสตมป์ได้ครบแล้ว!"
13011-260 = "อ่ะแฮ่ม! เควสเคลียร์!"
13011-270 = "ตอนแรกคิดว่า\nจะทำเควสไม่ผ่านซะแล้ว"
13011-280 = "อื้ม! ว่าแล้วเชียว\nฉันกับคุณครู\nเราเป็นทีมที่ลงตัวจริงๆ!"
13011-290 = "อ๊ะ! คุณครู!"
13011-300 = "ทำไมเหงื่อโชกหน้าขนาดนั้น?!\nเป็นอะไรรึเปล่า?"
13011-310 = "ฮ่ะฮ่ะฮ่า! แต่วันนี้ฉันก็\nสนุกมากๆ เลยละ\nเพราะมีคุณครูอยู่ด้วยไง!"
13011-320 = "เอาไว้คราวหน้า...\nถ้ามีอีเวนต์แบบนี้อีกละก็"
13011-330 = "ไว้เราสองคนมา...\nมาเล่นด้วยกันแบบวันนี้กันนะ!\nคุณครู!"
13011-2600 = "นะ... นี่มัน...อุปกรณ์เฉพาะสินะ!\nเท่านี้ฉันก็เป็นเด็กนักเรียนที่ OP แล้วล่ะ!"

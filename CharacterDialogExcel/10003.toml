[translation]
10003-20 = "아하하… 부족한 저이지만\n잘 부탁드려요."
10003-30 = "페로로 님 굿즈…"
10003-40 = "아하하… 어떨까나."
10003-50 = "다음 번엔\n다 같이 와도\n괜찮을지도."
10003-60 = "이런 것도\n즐거울 거 같아요~"
10003-70 = "음…\n어떠려나…"
10003-80 = "선생님, 잘 부탁드려요."
10003-90 = "앗. 선생님.\n다녀오셨어요?"
10003-100 = "최선을 다해볼게요."
10003-110 = "이거요?\n페로로 님이에요."
10003-120 = "귀엽죠?"
10003-130 = "…고민요? 저는 너무\n평범한 게 아닐까요…?"
10003-140 = "시키실 일이라도\n있으신가요?"
10003-150 = "아하하… 그렇게 흔들어도\n아무것도 나오지\n않는다고요…"
10003-160 = "선생님이 많은 것을\n가르쳐주셔서, 정말 행복해요.\n앞으로도 열심히 할게요!"
10003-170 = "그게 제가 드릴 수 있는,\n최고의 선물일테니까!"
10003-180 = "선생님!\n생일축하 해주셔서 감사합니다!\n저 정말 기뻐요!"
10003-190 = "새, 새해 복 많이 받으세요!\n올 한 해도 선생님과 함께…\n최선을 다할게요!"
10003-200 = "메리 크리스마스~\n성탄절이에요."
10003-210 = "트리니티에서 가장\n특별한 날이죠."
10003-220 = "그리고…\n저에게도요."
10003-230 = "와앗!\n깜짝이야."
10003-240 = "아, 오늘이 할로윈이군요."
10003-260 = "이제 또 어딜 가볼까요?\n저기? 응, 저쪽은 어때요?"
10003-270 = "응, 어디든 괜찮아요.\n선생님과 함께니까-!"
10003-280 = "선생님, 저기 좀 보세요!\n저기, 앗, 저기도요!"
10003-290 = "늘 보던 거리였는데도\n왜 이렇게 새롭게 보일까요?"
10003-300 = "으응? 언제까지 거기\n앉아계실 거예요?"
10003-310 = "자!\n좀 더 여기저기 보러 돌아다녀요!"
10003-320 = "네? 그 각도에서 보는\n풍경이 좋다고요?"
10003-2600 = "이… 이 무기는… 설마?!\n이걸로 저는 조금 더 자신감을\n가져도 괜찮은 거겠죠?!"

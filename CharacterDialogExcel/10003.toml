[translation]
10003-20 = "อะฮะฮ่ะ... ฉันอาจจะยังไม่เก่งพอแต่ก็...\nฝากเนื้อฝากตัวด้วยนะคะ"
10003-30 = "ของสะสมเพโรโร่..."
10003-40 = "ฮะฮะ... ถ้าอย่างนั้น"
10003-50 = "เอาไว้คราวหน้า\nมาด้วยกัน...\nจะได้รึเปล่านะ"
10003-60 = "ของพวกนี้\nก็ดูน่าสนุกเหมือนกันนะ~"
10003-70 = "อืม...\nยังไงดีน้า..."
10003-80 = "คุณครูคะ ขอฝากตัวด้วยนะคะ"
10003-90 = "อ๊ะ คุณครู\nกลับมาแล้วเหรอคะ?"
10003-100 = "ฉันจะพยายามเต็มที่ค่ะ"
10003-110 = "สิ่งนี้น่ะเหรอคะ?\nนี่คือท่านเพโรโร่ค่ะ"
10003-120 = "น่ารักใช่มั้ยคะ?"
10003-130 = "เรื่องกังวลเหรอคะ? คงเป็น...\nเรื่องที่ฉันดูธรรมดาไปละมั้งคะ...?"
10003-140 = "มีงานอะไรให้ช่วยหรือเปล่าคะ?"
10003-150 = "อ่ะฮ่าฮ่า... ถึงจะเขย่ามันแบบนั้น\nมันก็ไม่มีอะไรออกมาหรอกนะคะ..."
10003-160 = "คุณครูสอนเรื่องต่างๆ ให้แบบนี้\nฉันมีความสุขมากเลยล่ะค่ะ\nต่อไปฉันก็จะพยายามให้มากขึ้นค่ะ!"
10003-170 = "เพราะนั่นคงเป็นของขวัญที่ดีที่สุด...\nที่ฉันจะมอบให้คุณครูได้แล้วล่ะค่ะ!"
10003-180 = "คุณครู!\nขอบคุณที่อวยพรวันเกิดให้นะคะ!\nฉันดีใจมากๆ เลยค่ะ!"
10003-190 = "ขะ...ขอให้มีความสุขมากๆ นะคะ!\nปีนี้คุณครูกับฉัน ฉันจะพยายาม...\nให้เต็มที่ไปพร้อมกับคุณครูค่ะ!"
10003-200 = "เมอร์รีคริสต์มาส~\nวันนี้วันคริสต์มาสค่ะ"
10003-210 = "เป็นวันที่พิเศษที่สุด\nในโรงเรียนทรีนิตี้เลยค่ะ"
10003-220 = "แล้วก็...\nสำหรับฉันด้วยค่ะ"
10003-230 = "อ๊าา!\nตกใจหมดเลย"
10003-240 = "อ่า... วันนี้วันฮาโลวีนนี่เอง"
10003-260 = "ตอนนี้จะไปที่ไหนกันต่อดีคะ?\nไปทางนั่นดีมั้ยคะ?\nอือ ไปที่นั่นกันดีมั้ยคะ?"
10003-270 = "อืม ไปที่ไหนก็ได้ค่ะ\nถ้าได้ไปกับคุณครู!"
10003-280 = "คุณครูคะ ดูตรงนั้นสิคะ!\nอ๊ะ ตะ...ตรงนั้นด้วยค่ะ!"
10003-290 = "ฉันเคยมาแถวนี้หลายครั้งแล้ว\nแต่ไม่รู้ว่าทำไมวันนี้ถึงดูต่างไป\nจากทุกๆ ครั้งกันนะ?"
10003-300 = "หืม? คุณครูมานั่งอยู่ตรงนี้\nตั้งแต่เมื่อไหร่เหรอคะ?"
10003-310 = "เอาล่ะค่ะ!\nไปเดินดูรอบๆ กันดีกว่าค่ะ!"
10003-320 = "คะ? วิวตรงมุมนั้น\nสวยดีงั้นเหรอคะ?"
10003-2600 = "อะ...อาวุธนี่...หรือว่า?!\nถ้ามีสิ่งนี้ละก็\nฉันคงจะมั่นใจขึ้นได้อีกนิดนึงใช่มั้ยคะ?!"

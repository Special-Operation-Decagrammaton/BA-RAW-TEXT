[translation]
10074-10 = "Blue Archive~!"
10074-20 = "ได้เล่นน้ำเย็นสดชื่น อารมณ์ก็จะดีขึ้นด้วยค่ะ♡\nคุณครูเอง... ก็มาเล่นน้ำกัน... สักหน่อยมั้ยคะ?"
10074-30 = "ตายจริง คนคนนั้น..."
10074-40 = "สถานที่สวยๆ แบบนี้..."
10074-50 = "ถ้าเล่นน้ำที่นี่ละก็...\nคงโดนดุแน่เลยค่ะ"
10074-60 = "ฮุฮุ\nรู้สึกได้ถึงสายตา\nที่เร่าร้อนเลยนะคะ♡"
10074-70 = "ฉันขอเข้าไปใกล้ๆ\nกว่านี้ได้หรือเปล่าคะ?"
10074-80 = "ฉันกำลังรออยู่เลยค่ะ\nคุณครู"
10074-90 = "แน่นอนว่า...\nรออยู่ด้วยชุดนี้ค่ะ♡"
10074-100 = "มาแล้วเหรอคะ คุณครู\nออกไปเดินเล่นด้วยกัน\nก่อนจะเริ่มงานมั้ยคะ?"
10074-110 = "แค่รู้สึกว่าตัวเองคิดอะไรซุกซน\nกว่าเมื่อก่อนมากขึ้นนิดหน่อยค่ะ"
10074-120 = "โดยเฉพาะตอนที่\nอีกฝ่ายเป็นคุณครูน่ะค่ะ"
10074-130 = "ถ้าเป็นสิ่งที่ฉันทำได้ละก็...\nบอกฉันมาได้ทุกอย่างเลยค่ะ"
10074-140 = "อ๊า... ถ้าคุณครูจับตรงนั้น มัน...\nฮุฮุฮุ♡"
10074-150 = "ฮุฮุ ขอโทษค่ะ\nฉันไม่ได้ตั้งใจที่จะทำให้\nคุณครูลำบากใจเลยค่ะ"
10074-160 = "คะ? ชุดนี้เหรอคะ?\nฉันคิดว่าสวมทับมา\nหลายชั้นแล้วนะคะ"
10074-170 = "วันนี้เป็นวันเกิด\nของคุณครูสินะคะ?"
10074-180 = "ของขวัญจากฉัน... ฮุฮุฮุ♡"
10074-190 = "วันเกิดฉัน...\nอ่า จริงด้วยค่ะ"
10074-200 = "ของขวัญ...?"
10074-210 = "ฉันได้รับของขวัญ\nมาตลอดแล้วละค่ะ"
10074-220 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ คุณครู"
10074-230 = "ปีนี้หวังว่าอากาศจะอบอุ่น\nแบบนี้ไปเรื่อยๆ เลยนะคะ"
10074-240 = "คริสต์มาส..."
10074-250 = "ถ้าใส่ชุดนี้ออกไปข้างนอกละก็\nคงจะได้เห็นสีหน้าตกใจ\nของทุกคนแน่ๆ เลยค่ะ♡"
10074-260 = "วันนี้วันฮาโลวีนละค่ะ\nฉันกำลังคิดว่าแอบไปแนะนำชุดนี้\nให้ทุกคนแบบเงียบๆ ดีหรือเปล่าน่ะค่ะ"
10074-280 = "ตามมาถึงที่นี่จนได้เลยสินะคะ\nหรือไม่ก็... เป็นเรื่องบังเอิญ\nงั้นเหรอคะ?"
10074-290 = "ก็เป็นงานของคุณครูนี่นา...\nคงเป็นเรื่องบังเอิญแน่ๆ เลย\nสินะคะ"
10074-300 = "ฮุฮุ... ไม่ต้องตกใจ\nขนาดนั้นก็ได้ค่ะ\nฉันใส่เสื้อผ้าอยู่นะคะ"
10074-310 = "ฉันก็แค่อยากสัมผัส\nอุณหภูมิของน้ำดูน่ะค่ะ"
10074-320 = "คุณครูเองก็...\nอยากลองมาทางนี้ดูมั้ยคะ?"
10074-330 = "ที่นี่... มันตรงกันข้าม\nกับน้ำพุของทรีนิตี้เลยค่ะ"
10074-340 = "ไม่มีผู้คน...\nมีแค่ทิวทัศน์ตามธรรมชาติ..."
10074-350 = "ค่ะ ไม่มีการตกแต่งประดับประดาใดๆ\nมีเพียงแค่ภาพลักษณ์ดั้งเดิม\nอย่างที่ควรเป็น"
10074-360 = "เพราะงั้น...\nฉันเลยอยากให้คุณครู\nได้สัมผัสสิ่งพวกนั้นด้วยกันค่ะ"
10074-370 = "ถ้าเกิดว่าคุณครู...\nอยากลองดูน่ะค่ะ"
10074-2600 = "ชีวิตคนเรามีเรื่องเกิดขึ้นมากมาย...\nแต่สิ่งที่ฉันเป็นในตอนนี้...\nตัวฉันในอดีตคงจะคาดไม่ถึงเลยค่ะ\nนั่นเป็นเพราะคุณครูเลยค่ะ\nขอบคุณนะคะ"

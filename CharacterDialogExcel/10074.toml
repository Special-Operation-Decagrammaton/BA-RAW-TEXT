[translation]
10074-10 = "蔚藍檔案！"
10074-20 = "沐浴在清涼的水中，心情也會舒暢許多唷♡\n老師你……要不要……也來玩水呀？"
10074-30 = "哎呀，\n那個人是……"
10074-40 = "居然有這麼\n可愛的地方……"
10074-50 = "在這裡玩水的話，\n會被罵的呢。"
10074-60 = "呵呵，能感受到\n熱烈的視線♡"
10074-70 = "我可以\n再靠近一點嗎？"
10074-80 = "我一直在等你唷，老師。"
10074-90 = "當然，一～直\n都是這副模樣♡"
10074-100 = "歡迎回來，老師。\n要不要和我一起，\n來個工作前的散步呢？"
10074-110 = "我自己也覺得\n好像變得比以前\n更壞心眼了。"
10074-120 = "尤其是在面對\n老師的時候。"
10074-130 = "如果有什麼我能做的，\n還請儘管告訴我哦。"
10074-140 = "啊啊，摸那邊的話……\n呵呵呵♡"
10074-150 = "呵呵，對不起。\n我沒有想讓老師\n為難的意思。"
10074-160 = "嗯？衣服，是嗎？\n我覺得這樣已經\n穿得相當厚重了。"
10074-170 = "我記得，今天是\n老師的生日對吧？"
10074-180 = "我送的禮物是……\n唔呵呵♡"
10074-190 = "我的生日……\n啊啊，說的也是。"
10074-200 = "禮物……？"
10074-210 = "平時就已經\n收到了唷？"
10074-220 = "新年快樂，老師。"
10074-230 = "今年這樣安穩的日子\n也能持續下去，\n我打從心底這麼祈望。"
10074-240 = "聖誕節……"
10074-250 = "穿成這樣到外面去的話，\n感覺能見到大家\n目瞪口呆的表情呢♡"
10074-260 = "今天是萬聖節。\n我會試著不著痕跡地\n將這副打扮推薦給大家哦。"
10074-280 = "居然能找到這裡呢。\n還是說，只是偶然呢？"
10074-290 = "畢竟是老師你……\n想必是偶然對吧。"
10074-300 = "呵呵……\n請不要那麼驚慌。\n衣服我有好好穿著。"
10074-310 = "只是想感受\n水的溫度而已。"
10074-320 = "老師也……\n請過來這邊吧？"
10074-330 = "這裡……\n和三一的噴泉，\n樣貌完全相反。"
10074-340 = "人跡罕至的、\n自然的姿態……"
10074-350 = "沒錯。是毫無裝飾的、\n最原本的模樣。"
10074-360 = "所以，\n希望能和老師\n一起感受。"
10074-370 = "……只要老師\n不介意的話。"
10074-2600 = "雖說人生在世，世事難料……\n現在的我，是從前的我\n怎麼也想像不到的吧。\n這都多虧了老師。謝謝你。"

[translation]
10074-10 = "Blue Archive!"
10074-20 = "The refreshing water feels so good. Sensei, do you like playing...in the water?"
10074-30 = "Oh my, that person..."
10074-40 = "What a cute place..."
10074-50 = "I think we'll get in trouble if we play in the water here."
10074-60 = "Heehee, I feel someone's eyes on me. ♡"
10074-70 = "May I get closer?"
10074-80 = "I've been waiting for you, Sensei."
10074-90 = "Dressed like this the whole time, of course. ♡"
10074-100 = "There you are, Sensei. Would you like to go on a walk with me before work?"
10074-110 = "I think I've become more mischievous than I used to be."
10074-120 = "Especially when it comes to you, Sensei."
10074-130 = "If there's anything I can do for you, just let me know."
10074-140 = "Aah, if you touch me there... Heehee. ♡"
10074-150 = "Heehee, I'm sorry. I didn't mean to give you a hard time, Sensei."
10074-160 = "Am I underdressed? And here I thought I was wearing too much."
10074-170 = "Today's your birthday, right, Sensei?"
10074-180 = "My gift is... Heeheehee. ♡"
10074-190 = "My birthday... Oh, right."
10074-200 = "A gift...?"
10074-210 = "I've already got one!"
10074-220 = "Happy New Year, Sensei."
10074-230 = "I hope we enjoy another peaceful year."
10074-240 = "Christmas..."
10074-250 = "If I go out dressed like this, I'll be sure to draw attention. ♡"
10074-260 = "It's Halloween. I think everyone should wear a costume just like this one."
10074-280 = "How serendipitous, running into you here. Or...is it?"
10074-290 = "With you, I never quite know. Let's just chalk it up to a coincidence."
10074-300 = "Heehee. Please don't be so concerned. I'm still properly dressed."
10074-310 = "I wanted to feel the cool water on my skin."
10074-320 = "Would you...like to join me?"
10074-330 = "I promise... This situation is nothing like the Trinity fountain."
10074-340 = "No one is around, and we're in nature..."
10074-350 = "Yes. Everything is as it should be, without any gaudy embellishments."
10074-360 = "So, I'd like to just be with you. Here, in this moment."
10074-370 = "...If you're okay with that."
10074-2600 = "Life changes everyone, but the old me would never have imagined today's me. And it's all thanks to you, Sensei."

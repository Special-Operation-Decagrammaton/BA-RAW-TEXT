[translation]
16000-20 = "저, 제가 와도 괜찮은 걸까요?\n쓸모없다고 생각되면 어, 언제든지 말씀해주세요…"
16000-30 = "숨을 곳은 어디…"
16000-40 = "여기 있어도\n괜찮은 걸까요."
16000-50 = "사람 많은 곳은\n싫어…\n숨고 싶어…"
16000-60 = "그, 그러니까…\n헤헤… 제, 제가\n도와드릴 게 있을까요?"
16000-70 = "서, 선생님.\n고맙… 습… 아, 아니!\n죄송합니다!"
16000-80 = "저, 저기… 저를 부르신 게 맞나요?\n뭔가 착각하신 거 아닌가요?"
16000-90 = "저따위가 여기 있어도\n되는 걸까요…"
16000-100 = "네? 제가 필요하다고요?"
16000-110 = "어, 으어, 그, 그런…"
16000-120 = "선생님께 도움이 되도록\n최선을 다할 테니…"
16000-130 = "…고맙습니다. 선생님."
16000-140 = "네?\n너무 긴장하지 말라고요?\n티, 티가 났나요?!"
16000-150 = "(죽고싶어 죽고싶어 죽고싶어\n죽고싶어 죽고싶어 죽고싶어.)"
16000-160 = "새, 생일 축하드립니다!"
16000-170 = "무, 물론 저따위가 축하드려봤자\n기분 나쁘시겠지만…!"
16000-180 = "태, 태어나서 죄송합니다!"
16000-190 = "네?\n추, 축하한다고요?"
16000-200 = "새, 새해 복 많이 받으세요!"
16000-210 = "올해도 선생님과…\n다 없애버릴게요~"
16000-220 = "이번 성탄도,\n선생님과 함께라서…\n기뻐요."
16000-230 = "무, 물론 저한테\n자격이 있는지는\n모르겠지만…!"
16000-240 = "아아.\n오늘이 할로윈이었군요."
16000-250 = "갑자기 귀신 분장한 사람들이\n몰려와서 쏴버렸는데…"
16000-260 = "…미안합니다."
16000-280 = "아, 응? 에…!?\n어, 어어어, 어째서?\n으에!?"
16000-290 = "어, 어째서…!\n어째서 선생님께서\n여기 계시는지…!?"
16000-300 = "제, 제가 또\n이상한 실수를…!"
16000-310 = "아, 호, 혹시\n장소 전달을\n잘못 알고…?"
16000-320 = "아, 그, 그게 말이죠.\n여기는 그…\n뭐라고 해야 하나…"
16000-330 = "그, 제가 잡초라던가…\n그런 걸 키우는 장소입니다만…\n그게…"
16000-340 = "죄, 죄송합니다, 선생님.\n제가 또 실수로…\n소중한 분을, 이런 곳에…"
16000-350 = "…어? 아…?\n저, 바, 방금 뭐,\n뭐뭐뭐 뭔가 또\n엄청난 소리를…!?"
16000-360 = "(죽고싶어죽고싶어죽고싶어\n죽고싶어죽고싶어죽고싶어\n죽고싶어죽고싶어…)"
16000-2600 = "선생님이 싫어하시는 건,\n제가 다… 없애버릴게요!"

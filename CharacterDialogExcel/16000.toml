[translation]
16000-20 = "那個，我可以進來嗎？\n如果覺得我礙事，\n請，請隨時跟我說…"
16000-30 = "可以躲藏的地方\n在哪裡…"
16000-40 = "待在這裡\n也沒關係嗎？"
16000-50 = "我不喜歡\n人多的地方…\n想躲藏起來…"
16000-60 = "那，那個…耶嘿嘿…\n有，有我能幫忙的事嗎？"
16000-70 = "老，老師。\n非，非常…謝謝您…\n沒，沒事！對不起！"
16000-80 = "那，那個…\n您叫我嗎？\n不是認錯人了嗎？"
16000-90 = "我這種人\n真的可以待在這裡嗎…"
16000-100 = "是？您需要我嗎？"
16000-110 = "呃，唔唔，怎，怎麼會…"
16000-120 = "為了幫上老師的忙，\n我會拚盡全力的…"
16000-130 = "…非常謝謝您。老師。"
16000-140 = "咦？要我\n不用這麼緊張？\n被，被發現了嗎？"
16000-150 = "（好想死好想死好想死\n　好想死好想死好想死）"
16000-160 = "祝，祝老師生日快樂！"
16000-170 = "不，不過，\n就算收到我這種人的祝福，\n想必只會覺得反胃吧…"
16000-180 = "我，我活著真是抱歉！"
16000-190 = "咦？祝，祝福我是嗎？"
16000-200 = "新，新年快樂！"
16000-210 = "今年，也要和老師…\n一起把所有東西\n都消滅掉。"
16000-220 = "這次聖誕節，\n也能和老師在一起…\n我很開心。"
16000-230 = "雖，雖然\n不知道我\n有沒有那種資格…！"
16000-240 = "啊啊，\n原來今天\n是萬聖節啊。"
16000-250 = "突然有一群\n裝扮成怪物的人跑來\n害我不自覺就開槍了…"
16000-260 = "…對不起。"
16000-280 = "啊，咦？咦……！？\n為，為為為什麼，咦！？"
16000-290 = "為，為什麼……！？\n為什麼老師會，\n會在這裡……！？"
16000-300 = "我，我該不會\n又犯了什麼大錯……！？"
16000-310 = "啊，難，難道說\n我傳錯地點了……！？"
16000-320 = "啊，就，就是，\n這，這裡是那個……\n該怎麼說呢……"
16000-330 = "就是，我培育雜草……\n這類東西的地方……"
16000-340 = "對，對不起，老師，\n又因為我的失誤……\n把重要的人\n帶來這種地方……"
16000-350 = "咦，啊……我，我剛剛，\n是，是是是不是，\n又出言不遜了……！？"
16000-360 = "（好，好想死好想死\n好想死好想死好想死\n好想死好想死必須死……！）"
16000-2600 = "老師討厭的東西，\n我會讓它們…全部消失！"

[translation]
16000-20 = "ฉันมาด้วยแบบนี้ ไม่เป็นไรใช่มั้ยคะ?\nถ้าคุณครูคิดว่าฉันไม่จำเป็นละก็... บอกฉันได้ตลอดเลยนะคะ"
16000-30 = "ไปหลบ... ตรงไหนดี"
16000-40 = "อยู่ที่นี่\nได้รึเปล่านะ"
16000-50 = "ไม่ชอบที่ที่\nคนเยอะๆ เลย...\nอยากหาที่ซ่อนจัง..."
16000-60 = "พะ...เพราะงั้น...\nแหะๆ คือมะ...มี\nมีอะไรให้ฉันช่วยมั้ยคะ?"
16000-70 = "คะ...คุณครูคะ\nขะ...ขอบคุณ... ไม่สิ!\nขอโทษนะคะ!"
16000-80 = "คะ...คุณครู... ระ...เรียกฉันใช่ไหมคะ?\nคุณครูเข้าใจอะไรผิดรึเปล่าคะ?"
16000-90 = "ฉันอยู่ที่นี่ได้จริงๆ...\nใช่ไหมคะ..."
16000-100 = "คะ? คุณครูอยากให้ฉันอยู่เหรอคะ?"
16000-110 = "คะ...คือว่า ระ...เรื่องนั้น"
16000-120 = "ฉะ...ฉันจะพยายามอย่างเต็มที่\nเพื่อช่วยคุณครู..."
16000-130 = "ขอบคุณนะคะ... คุณครู"
16000-140 = "คะ? \"ไม่ต้องตื่นเต้น\" งั้นเหรอคะ?\nหะ... เห็นชัดขนาดนี้เลยเหรอคะ?!"
16000-150 = "(น่าอายจังเลย ไม่อยากอยู่แล้ว\nไม่อยากอยู่แล้ว ไม่อยากอยู่แล้ว)"
16000-160 = "สะ...สุขสันต์วันเกิดค่ะ!"
16000-170 = "กะ...การที่ฉันมาอวยพรวันเกิด\nคุณครูแบบนี้... อาจทำให้คุณครู\nรู้สึกไม่ดี...!"
16000-180 = "ขะ...ขอโทษที่ฉันมีตัวตน\nอยู่บนโลกนี้นะคะ!"
16000-190 = "คะ?\n\"ยะ...ยินดีด้วย\" งั้นเหรอคะ?"
16000-200 = "ขะ...ขอให้มีความสุขมากๆ นะคะ!"
16000-210 = "ในปีนี้... ฉันกับคุณครู...\nก็มาช่วยล้างบางทุกๆ อย่าง\nด้วยกันอีกนะคะ~"
16000-220 = "วันคริสต์มาสนี้\nมีคุณครูอยู่ด้วย...\nฉันมีความสุขมากค่ะ"
16000-230 = "ถะ...ถึงฉันไม่รู้\nว่าตัวเองมีสิทธิ์...\nหรือเปล่าก็เถอะนะคะ!"
16000-240 = "อ่า...\nวันนี้เป็นวันฮาโลวีนนี่เอง"
16000-250 = "จู่ๆ ก็เห็นคนที่แต่งตัวเป็นผี\nมารวมตัวกันแบบนี้\nฉันเลยเผลอยิงไปแล้วค่ะ..."
16000-260 = "ขอโทษด้วยนะคะ..."
16000-280 = "หะ...หืม? เอ๋...!?\nอะ...เอ๋ ทำไมกันล่ะ?\nเอ๋!?"
16000-290 = "ทะ...ทำไม...!\nทะ...ทำไมคุณครู\nถึงมาอยู่ที่นี่...!?"
16000-300 = "ระ...หรือว่าฉัน\nทำอะไรพลาดไปอีกแล้ว...!"
16000-310 = "อ๊ะ ระ...หรือว่า\nฉันส่งพิกัดที่อยู่ไปผิด...?"
16000-320 = "เอ่อ...คะ...คือว่า...\nที่นี่... จะเรียกว่ายังไงดีนะ..."
16000-330 = "คือว่าที่นี่คือ...\nสถานที่สำหรับเลี้ยงวัชพืช...\nน่ะค่ะ..."
16000-340 = "ขะ...ขอโทษค่ะ คุณครู\nฉันทำพลาด...\nที่เชิญคนสำคัญมาที่แบบนี้..."
16000-350 = "...เอ๋? เอ่อ...?\nมะ...เมื่อกี้ฉัน...\nพะ... พะ... พูดอะไร...\nที่เกินตัวไปอีกแล้ว...!?"
16000-360 = "(อยากตายจังเลยอยากตายจังเลย\nอยากตายจังเลยอยากตายจังเลย...)"
16000-2600 = "อะไรที่คุณครูไม่ชอบ...\nฉันจะ...จัดการพวกมันให้หมดเลยค่ะ!"

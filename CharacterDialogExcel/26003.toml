[translation]
26003-20 = "請問有受傷了的人嗎？\n我會立刻趕過去唷。"
26003-30 = "這裡，有身體不舒服的人嗎？"
26003-40 = "是個只要看著，\n心裡就會變溫暖的空間呢。"
26003-50 = "這種地方的話，\n我想患者們也很快就會痊癒。"
26003-60 = "偶爾像這樣，\n享受餘裕也不錯呢。"
26003-70 = "啊…漂亮的粉紅色…"
26003-80 = "歡迎您，老師。\n今天的身體狀況如何呢？"
26003-90 = "我等您很久了，老師。\n今天也為了和平的世界\n一起加油吧！"
26003-100 = "啊，是新的患者嗎？"
26003-110 = "似乎很疲勞呢…\n要不要我幫您揉肩呢？"
26003-120 = "疲勞是萬病之源！\n請不要過於勉強哦。"
26003-130 = "只要想到患者們的事，\n胸口總是會感到悶痛。"
26003-140 = "我不會原諒擾亂和平的惡黨！"
26003-150 = "祝您生日快樂，老師！\n祝您今天一天，\n都充滿幸福！"
26003-160 = "謝謝您為我慶祝。\n生日禮物，是嗎？"
26003-170 = "光是老師的笑容\n就很足夠了唷！"
26003-180 = "祝您新年快樂！\n為了不要在新年就感冒，\n請確實的穿得暖暖和和的哦！"
26003-190 = "聖誕快樂，老師。\n希望大家今天都不要吵架，\n度過和平的一天。"
26003-200 = "我收到萬聖節的糖果了！"
26003-210 = "雖然糖果很甜很好吃\n不過吃太多的話\n一定會蛀牙…"
26003-230 = "真是的，老師……"
26003-240 = "真的是，嚇了一跳……"
26003-250 = "……感覺真不可思議。"
26003-260 = "我是第一次遇到這種事，\n總覺得有些不知所措……"
26003-270 = "真的是……"
26003-280 = "……這樣的人，\n我還是第一次遇到。"
26003-290 = "對不起，\n我有點混亂……"
26003-300 = "非常感謝，\n我很開心……！"
26003-310 = "……託老師的福。"
26003-320 = "……是託老師的福，\n才有這種心情哦。"
26003-2600 = "不能因為注射會痛就逃跑唷！"

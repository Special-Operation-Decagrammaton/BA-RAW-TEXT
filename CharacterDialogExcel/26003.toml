[translation]
26003-20 = "다치신 분은 어디에 계신가요?\n제가 바로 찾아갈게요."
26003-30 = "여기, 아프신 분은 없으신가요?"
26003-40 = "보고만 있어도\n마음이 따듯해지는 공간이네요."
26003-50 = "이런 곳이라면\n환자들도 빨리 완쾌할 수 있을 거예요."
26003-60 = "가끔은 이런 여유를\n즐기는 것도 나쁘지 않네요."
26003-70 = "아… 예쁜 핑크빛이다…"
26003-80 = "어서 오세요, 선생님.\n오늘 컨디션은 어떠신가요?"
26003-90 = "기다리고 있었어요, 선생님.\n오늘도 평화로운 세계를\n위해 함께 노력하죠!"
26003-100 = "앗, 새로운 환자인가요?"
26003-110 = "피곤해 보이시네요…\n어깨라도 주물러 드릴까요?"
26003-120 = "피로는 만병의 원인!\n너무 무리하지 마세요."
26003-130 = "아픈 환자들을 생각하면\n언제나 가슴이 아파요…"
26003-140 = "평화를 깨트리는 악당은\n용서할 수 없어요!"
26003-150 = "생일 축하드려요, 선생님!\n오늘 하루는 행복만\n가득하시길 바랄게요!"
26003-160 = "생일 축하해 주셔서 감사합니다.\n…생일 선물요?"
26003-170 = "선생님의 웃는 얼굴만으로도 충분해요!"
26003-180 = "새해 복 많이 받으세요!\n새해부터 감기에 걸리지 않도록\n옷은 꼭 따듯하게 입으세요!"
26003-190 = "메리 크리스마스, 선생님.\n오늘만큼은 모두 싸우지 말고\n평화로운 하루가 되었으면 좋겠네요."
26003-200 = "할로윈 사탕을 선물받았어요!"
26003-210 = "사탕은 달콤하지만…\n너무 많이 먹으면,\n이가 썩어버릴 거에요…"
26003-230 = "정말이지, 선생님은…"
26003-240 = "진짜로 깜짝 놀랐다고요."
26003-250 = "…이상한 기분이네요."
26003-260 = "이런 걸 받는 건 처음이라,\n조금 당황스럽다고\n해야 하나…"
26003-270 = "정말……"
26003-280 = "…이런 분을 만난 건,\n처음이랍니다."
26003-290 = "죄송합니다. 아직\n약간 정신이 없어서…"
26003-300 = "감사합니다.\n정말로 기뻐요…!"
26003-310 = "…선생님 덕분이네요."
26003-320 = "…선생님 덕분이랍니다.\n이 기분은."
26003-2600 = "주사가 아프다고\n도망치시면 안 돼요!"

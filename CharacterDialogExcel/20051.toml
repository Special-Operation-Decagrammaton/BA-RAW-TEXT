[translation]
20051-10 = "블루! 아카이브!!"
20051-20 = "왔습니다, 또 왔습니다!\n이번엔 마법소녀, 우자와 레이사의 등장입니다!"
20051-30 = "오, 오늘도……\n사람이 많아……."
20051-40 = "최, 최대한, 평소대로……."
20051-50 = "(앗, 나도 저거 아는데!)"
20051-60 = "다들 즐거워 보이네요!"
20051-70 = "(아앗…… 내 자리에…….)"
20051-80 = "후후, 늦으셨군요. 선생님.\n아뇨, 속상하지 마시길!"
20051-90 = "정의의 편은 그 누구보다도\n빠르게 달려오는 법이니까요!"
20051-100 = "자경단의 우자와 레이사는\n잊어주세요……."
20051-110 = "오늘의 저는……\n슈프림 매지컬 자경단,\n우자와 레이사니까요!"
20051-120 = "선생님의 부름에 응해……!"
20051-130 = "테르밋 핑크,\n여기 등장! 입니다!"
20051-140 = "자경단에 유니폼이 있다면\n어떨까요!"
20051-150 = "이왕이면 이런,\n멋진 게 좋겠네요!"
20051-160 = "볼트 포워드!\n테르밋 핑크……!"
20051-170 = "앗! 선생님 안녕하세요!\n대사 연습 중이었습니다……."
20051-180 = "선생님은\n'마법리버' 3기 4화의\n명대사를 알고 계신가요?"
20051-190 = "'우정과 화력은\n뜨거울수록 좋다', 입니다!\n명언이죠!"
20051-200 = "뭔가 입이 심심하네요……\n그렇지!"
20051-210 = "빵이라도 사다 드릴까요,\n선생님!"
20051-220 = "선생님, 생일 축하드립니다!"
20051-230 = "제게 정말 마법이 있다면,\n축복 마법이라도\n걸어드리고 싶어요! 에헤헤-"
20051-240 = "생일이요? 누구요?\n아앗! 제 생일이군요!"
20051-250 = "축하해주셔서 감사합니다!\n에헤-"
20051-260 = "선생님, 새해 복 많이 받으세요!\n올해도 정의가 가득하기를!"
20051-270 = "매지컬 크리스마스!"
20051-280 = "앗! 매지컬이 아니라 메리였죠!"
20051-290 = "트릭 오어 매직!\n해피 할로윈입니다!"
20051-300 = "마녀 분장이요?\n아뇨! 마법소녀입니다!"
20051-310 = "마녀와 마법소녀는\n완전 다른 거 아니에요?"
20051-330 = "세이-프!!"
20051-340 = "후후……연의 평화는\n지켜졌습니다!"
20051-350 = "물에 떨어지기 직전!\n이렇게 잡아냈으니까요!"
20051-360 = "모두를 위해서라면,\n자경단은 주저하지 않습니다!"
20051-370 = "불 속이건, 물 속이건,\n어디든지 뛰어들 테니까요!"
20051-380 = "니헤헤-"
20051-390 = "영웅의 옷이란 자고로,"
20051-400 = "영웅의 일을 할 때야말로\n빛나는 법!"
20051-410 = "그리고, 이건 세탁기에\n돌려도 괜찮거든요!"
20051-420 = "게다가……선생님께\n배웠으니까요."
20051-430 = "주저하지 않는 자야말로,\n모두를 지킬 수 있다, 라고요!\n에헤헷!"
20051-440 = "헤헤, 에, 엣……\n에츄!!"
20051-450 = "우으으……."
20051-2600 = "선생님은, 항상 상냥하게 대해주시는군요…….\n이렇게 함께 있으면……\n저, 최강이 될 수 있을 것만 같아요……!"

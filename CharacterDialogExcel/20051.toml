[translation]
20051-10 = "蔚藍檔案！！"
20051-20 = "聽到呼叫就飛奔而來！再次登場！\n魔法少女，Magical宇沢澪紗，登場！"
20051-30 = "今，今天也……\n好多人……"
20051-40 = "盡，盡量，\n像平常一樣……"
20051-50 = "（啊！剛才的……\n是我知道的話題！）"
20051-60 = "大家，看起來\n都很開心呢！"
20051-70 = "（啊啊……\n座位被占走了……）"
20051-80 = "呵呵呵……\n你來遲了呢，老師。\n沒事沒事，請不要灰心！"
20051-90 = "因為正義的夥伴，總是會\n比任何人都快趕到現場！"
20051-100 = "請忘記自衛隊的\n宇沢澪紗……"
20051-110 = "因為今天的我……\n是Supreme Magical自衛隊\n的宇沢澪紗！"
20051-120 = "回應老師的呼喚……！"
20051-130 = "Thermite Pink，在此登場！"
20051-140 = "自衛隊也來做套制服怎麼樣呢！"
20051-150 = "既然要做的話，\n我喜歡這種帥氣的！"
20051-160 = "Bolt Forward！\nThermite Pink……！"
20051-170 = "啊！你好呀老師！\n我正好在練習台詞……"
20051-180 = "老師知道《魔法liber》\n第三季第四集的名台詞嗎？"
20051-190 = "就是「友情跟火力越熱烈越好」\n這一句！是句很棒的話對吧！"
20051-200 = "肚子有點餓了呢……對了！"
20051-210 = "我打算去買麵包，\n老師也要吃嗎？"
20051-220 = "老師，祝你生日快樂！"
20051-230 = "如果我能用魔法的話，\n就能幫老師施展祝福魔法了呢！\n耶嘿嘿。"
20051-240 = "生日？誰的生日？\n……啊啊！是我的！"
20051-250 = "謝謝你為我祝福！\n耶嘿嘿……"
20051-260 = "老師，祝你新年快樂！\n希望今年也能成為\n充滿正義的一年！"
20051-270 = "Magical～Christ～mas！"
20051-280 = "哇！不是Magical，\n是Merry才對！"
20051-290 = "Trick or Magic！\nHappy Halloween！"
20051-300 = "魔女的變裝？不對不對！\n這是魔法少女！"
20051-310 = "魔女跟魔法少女\n完全不一樣哦？"
20051-330 = "Safe！"
20051-340 = "呵呵……風箏的\n和平守護成功！"
20051-350 = "就在掉進水裡的前一刻！\n像這樣被我抓住了！"
20051-360 = "只要是為了大家，\n自衛隊絕不會猶豫！"
20051-370 = "無論是火中，還是水中！\n任何地方都會縱身而入！"
20051-380 = "咿嘿嘿……！"
20051-390 = "所謂英雄的服裝──"
20051-400 = "只有在履行英雄\n職責的時候才會閃耀！"
20051-410 = "另外，這套衣服\n可以丟洗衣機，\n所以沒問題的！"
20051-420 = "而且……\n老師曾經教過我。"
20051-430 = "只有不迷惘的人──\n才能守護大家！耶嘿嘿！"
20051-440 = "嘿嘿，耶，耶嘿……\n哈啾！！"
20051-450 = "嗚嗚……"
20051-2600 = "老師你，總是那麼溫柔呢……\n像這樣待在一起的時候……\n我，有種自己能變成最強的感覺……！"

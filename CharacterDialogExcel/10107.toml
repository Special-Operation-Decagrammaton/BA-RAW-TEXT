[translation]
10107-10 = "블루~ 아카이브~!"
10107-20 = "호외요, 호외!\n만마전의 서기, 모토미야 치아키가\n샬레에 찾아왔습니다~!"
10107-30 = "신기한 장소네요~!"
10107-40 = "이건, 좋은 기삿거리가\n될지도 모르겠네요!"
10107-50 = "아! 저분과도 친구가\n되고 싶어요~!"
10107-60 = "여기다가 <주간 만마전>\n스탠드를 놓는다면……."
10107-70 = "아, 이건 이부키 쨩이\n좋아할 것 같네요~!"
10107-80 = "앗! 다녀오셨어요~!"
10107-90 = "마침 선생님 인터뷰가\n필요한 시점이었습니다!"
10107-100 = "안녕하세요, 선생님~!\n오늘 하루도 힘내볼까요!"
10107-110 = "네에~!\n모토미야 치아키,\n대기 중입니다~!"
10107-120 = "뭔가 기삿거리, 아니,\n도와드릴 일이 있을까요~?"
10107-130 = "이번 주 <주간 만마전>은\n보셨나요?"
10107-140 = "특별부록 '귀여운\n이부키 쨩 브로마이드'가\n정말 대박이에요!"
10107-150 = "다음 주 <주간 만마전>에\n실을 마코토 선배의\n사진이에요~!"
10107-160 = "네? 너무 작아서\n잘 안 보이신다고요?"
10107-170 = "일하는 선생님의 모습!\n자! 여기 보세요~!"
10107-180 = "표정이 굳어 있는데요~\n자, 릴렉스, 릴렉스~"
10107-190 = "서기로서도, 당번으로서도\n무엇이든 하니까요!"
10107-200 = "언제든 말씀해 주세요,\n선생님~!"
10107-210 = "생일 축하드립니다!"
10107-220 = "'선생님이 태어난 날' 특집을\n기획해 보았어요!"
10107-230 = "그럼 인터뷰 답변을\n부탁드립니다!"
10107-240 = "앗, 제 생일이네요?"
10107-250 = "편집하느라 깜빡했습니다~!\n아하하! 알려 주셔서 감사합니다!"
10107-260 = "새해 복 많이 받으세요, 선생님!"
10107-270 = "올해 첫 <주간 만마전>을\n가장 먼저 읽을 수 있는\n기회를 드릴게요!"
10107-280 = "메리 크리스마스입니다~!"
10107-290 = "트리 옆에 서 보세요!\n사진 찍어 드리겠습니다~!"
10107-300 = "오늘을 줄곧 기다렸습니다!"
10107-310 = "길에 특이한 분들이 잔뜩!\n친구 만들고 올게요~!"
10107-330 = "아하핫! 셔터 찬스, 잡았습니다!"
10107-340 = "선생님의 졸던 표정!\n다음 호 표지 감이라구요~!"
10107-350 = "이걸로 <주간 만마전>\n특집호도 준비 만전!"
10107-360 = "역시 이 치아키,\n이번에도 특종을 잡아냈네요~!"
10107-370 = "후후!\n서기의 행동력을\n얕보면 안 되거든요!"
10107-380 = "그렇지!\n이 기세로 선생님의 비밀까지\n파헤쳐 볼까요……?"
10107-390 = "양말에 난 구멍의 비밀,\n같은……!"
10107-400 = "엣?! 짓궂은 아이는\n'책상 아래에 가두는 형'에\n처한다고요……?!"
10107-410 = "죄, 죄송합니다~!\n나가게 해주세요~!"
10107-2600 = "너무 기뻐요!\n특종을 잡았을 때처럼,\n아니면 그 이상으로!"

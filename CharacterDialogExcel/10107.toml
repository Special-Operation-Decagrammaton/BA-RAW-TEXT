[translation]
10107-10 = "Blue~ Archive~!"
10107-20 = "ฉบับพิเศษค่า ฉบับพิเศษ!\nเลขาของแพนเดโมเนียม โซไซตี้ โมโตมิยะ จิอากิ\nมาถึงชาเล่ต์แล้วค่า~!"
10107-30 = "เป็นที่ที่น่าสนใจ\nจังเลยนะคะ~!"
10107-40 = "อาจจะมีเรื่องที่\nเอาไปทำข่าวดีๆ\nได้เลยนะคะ!"
10107-50 = "อ๊ะ! ฉันก็อยากเป็นเพื่อน\nกับคนนั้นด้วยค่ะ~!"
10107-60 = "ถ้าตั้งแผง <แพนเดโมเนียม\nโซไซตี้รายสัปดาห์>\nเอาไว้ที่นี่ละก็..."
10107-70 = "อ๊ะ อันนี้อิบูกิจัง\nคงจะชอบน่าดูเลยนะคะ~!"
10107-80 = "อ๊ะ! กลับมาแล้วเหรอคะ~!"
10107-90 = "ฉันมีเรื่องต้องสัมภาษณ์\nคุณครูพอดีเลยค่ะ!"
10107-100 = "สวัสดีค่ะ คุณครู~!\nวันนี้ก็มาพยายามกันนะคะ!"
10107-110 = "ค่า~!\nโมโตมิยะ จิอากิ\nกำลังสแตนด์บายค่ะ~!"
10107-120 = "มีเรื่องอะไรให้ทำข่าว ไม่สิ\nมีเรื่องอะไรให้ฉันช่วยมั้ยคะ~?"
10107-130 = "อ่าน <แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nฉบับสัปดาห์นี้แล้วหรือยังคะ?"
10107-140 = "'รูปของอิบูกิจังสุดน่ารัก'\nในภาคผนวกพิเศษ\nวิเศษมากๆ เลยละค่ะ!"
10107-150 = "นี่คือรูปรุ่นพี่มาโคโตะที่จะอยู่ใน\n<แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nฉบับสัปดาห์หน้าค่ะ~!"
10107-160 = "คะ? รูปเล็กเกินไป\nจนเห็นไม่ชัดงั้นเหรอคะ?"
10107-170 = "ท่าทางของคุณครูตอนทำงาน!\nเอาละ! มองมาทางนี้ค่ะ~!"
10107-180 = "สีหน้าแข็งทื่อจังเลยค่ะ~\nเอาละ ผ่อนคลายหน่อย ผ่อนคลาย~"
10107-190 = "ฉันทำได้ทุกอย่าง ทั้งในฐานะเลขา\nและในฐานะนักเรียนเวรเลยค่ะ!"
10107-200 = "สั่งงานฉันได้ทุกเมื่อเลยนะคะ\nคุณครู~!"
10107-210 = "สุขสันต์วันเกิดค่ะ!"
10107-220 = "ฉันวางแผนว่าจะออกนิตยสาร\nฉบับพิเศษ 'วันที่คุณครูเกิด' ค่ะ!"
10107-230 = "งั้นช่วยตอบ\nบทสัมภาษณ์หน่อยนะคะ!"
10107-240 = "อ๊ะ... วันเกิดของฉันนี่คะ?"
10107-250 = "มัวแต่ตัดต่อข่าวจนลืมไปเลยค่ะ~!\nอะฮ่าฮ่า! ขอบคุณที่ช่วยบอกนะคะ!"
10107-260 = "สวัสดีปีใหม่ค่ะคุณครู!"
10107-270 = "ฉันจะให้โอกาสในการอ่าน\n<แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nเล่มแรกของปีก่อนใครเลยค่ะ!"
10107-280 = "เมอร์รีคริสต์มาสค่ะ!"
10107-290 = "ไปยืนข้างต้นไม้สิคะ!\nฉันจะถ่ายรูปให้ค่ะ~!"
10107-300 = "ฉันรอคอยวันนี้มานานเลยค่ะ!"
10107-310 = "บนถนนมีคนที่มีเอกลักษณ์เยอะแยะเลย!\nฉันขอไปหาเพื่อนใหม่ก่อนนะคะ~!"
10107-330 = "อะฮ่าฮ่า! ได้จังหวะกดชัตเตอร์แล้ว!"
10107-340 = "หน้าคุณครูตอนสัปหงก!\nเหมาะเอาขึ้นปกฉบับหน้าเลยละค่ะ~!"
10107-350 = "เตรียม <แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nฉบับพิเศษเสร็จแล้ว!"
10107-360 = "จิอากิคนนี้\nทำสกู๊ปพิเศษได้อีกแล้วนะคะ~!"
10107-370 = "ฮุฮุ!\nอย่าดูถูกความสามารถ\nของเลขานุการสิคะ!"
10107-380 = "จริงด้วย! ในเมื่อเป็นอย่างนี้\nก็ขุดคุ้ยความลับของคุณครูเลยดีมั้ยนะ...?"
10107-390 = "อย่างเช่นความลับที่ว่า\nถุงเท้าเป็นรู...!"
10107-400 = "คะ?! เด็กซุกซนจะถูกลงโทษ\nให้โดนขังไว้ใต้โต๊ะ งั้นเหรอคะ...?!"
10107-410 = "ขะ... ขอโทษด้วยค่ะ~!\nปล่อยฉันออกไปเถอะค่ะ~!"
10107-2600 = "ดีใจจังเลยค่ะ!\nเหมือนตอนได้ทำสกู๊ปพิเศษเลย\nไม่สิ ยิ่งไปกว่านั้นอีก!"

[translation]
10107-10 = "蔚藍～檔案～！"
10107-20 = "號外，號外～！\n萬魔殿的書記，元宮千秋\n已經抵達夏萊囉～！"
10107-30 = "這裡，真有趣呢～！"
10107-40 = "有股這能成為\n獨家新聞的預感！"
10107-50 = "啊！我想和\n那個人當朋友！"
10107-60 = "如果把《週刊萬魔殿》\n的攤位設在這裡……"
10107-70 = "這個是……！\n伊吹醬肯定會非常開心！"
10107-80 = "啊！老師歡迎回來～！"
10107-90 = "我想馬上開始採訪，\n請問可以嗎～？"
10107-100 = "你好呀，老師～！\n今天也一起加油吧～！"
10107-110 = "是～！\n元宮千秋，\n正在待命～！"
10107-120 = "有什麼素材……\n有什麼需要幫忙的嗎～？"
10107-130 = "本週的《週刊萬魔殿》，\n你看過了嗎？"
10107-140 = "特別附錄的\n＜可愛伊吹醬相片＞\n真是太讚了！"
10107-150 = "這是下週的《週刊萬魔殿》\n要刊登的真琴前輩的照片～"
10107-160 = "……嗯？\n小到完全看不見？"
10107-170 = "老師工作中的模樣！\n來！眼睛看這邊～！"
10107-180 = "表情有點僵硬唷～\n來，放輕鬆放輕鬆～"
10107-190 = "無論做為書記還是值日生，\n任何事我都會做的！"
10107-200 = "請隨時跟我說哦，老師～！"
10107-210 = "生日快樂！"
10107-220 = "我規劃了\n＜老師出生的那天＞特輯！"
10107-230 = "那麼採訪的回答就麻煩你囉！"
10107-240 = "咦，話說我的生日到了呢。"
10107-250 = "編輯得太投入害我都忘了呢～！\n啊哈哈！謝謝你！"
10107-260 = "新年快樂！"
10107-270 = "我會讓老師成為《週刊萬魔殿》\n新年號的第一位讀者！"
10107-280 = "聖誕快樂～！"
10107-290 = "來來，請站在樹前面吧！\n要拍照囉～！"
10107-300 = "今天這一天，\n我一～直非常期待！"
10107-310 = "路上到處都是特別的人！\n我要去跟他們交朋友囉～！"
10107-330 = "啊哈哈！\n按下快門的好時機，\n被我捕捉到了！"
10107-340 = "老師打瞌睡的表情！\n剛好適合當下期的封面！"
10107-350 = "這樣《週刊萬魔殿》特刊號的\n準備就萬無一失了！"
10107-360 = "不愧是我！\n又掌握到獨家新聞了～！"
10107-370 = "哼哼！書記的行動力，\n可是不容小覷的唷～！"
10107-380 = "啊對了！不如趁勢，\n來一窺老師的祕密吧……？"
10107-390 = "比如襪子破洞的謎團，\n之類的……！"
10107-400 = "咦！？要對調皮的孩子處以\n「關在桌子底下之刑」……！？"
10107-410 = "對，對不起嘛～！\n拜託放我出去～！"
10107-2600 = "好耶～！我真的很開心！\n跟發現特大新聞的時候相比\n有過之而無不及……！"

[translation]
10107-10 = "Blue Archive!"
10107-20 = "Extra, extra! The Pandemonium Society's secretary, Motomiya Chiaki, is at Schale!"
10107-30 = "What an interesting place!"
10107-40 = "This might make for a good headline!"
10107-50 = "Ah! I want to be friends with that person too!"
10107-60 = "If we place the \"Weekly Pandemonium Society\" stand here..."
10107-70 = "Ah, Ibuki might like this!"
10107-80 = "Ah! You're back!"
10107-90 = "I just happened to need an interview with you!"
10107-100 = "Hello, Sensei! Let's have another great day!"
10107-110 = "Yes! Motomiya Chiaki, on standby!"
10107-120 = "Are there any leads... I mean, anything I can help with?"
10107-130 = "Did you read the new edition of \"Weekly Pandemonium Society\" yet?"
10107-140 = "The special addendum \"Cute Ibuki Bromide\" is a total hit!"
10107-150 = "It's a picture of Makoto that'll be in the next issue of \"Weekly Pandemonium Society\"!"
10107-160 = "What? It's too small to see?"
10107-170 = "Sensei at work! Now, look over here!"
10107-180 = "Your face is so stiff. Relax, relax!"
10107-190 = "As a secretary and student rep, I can do anything!"
10107-200 = "Let me know if there's anything you need, Sensei!"
10107-210 = "Happy birthday!"
10107-220 = "I planned a special \"The Day Sensei was Born\" issue!"
10107-230 = "Now then, please answer the interview questions!"
10107-240 = "Oh, it's my birthday?"
10107-250 = "I've been so busy editing that I totally forgot! Ahaha! Thanks for letting me know!"
10107-260 = "Happy New Year, Sensei!"
10107-270 = "I'll give you the opportunity to read the first issue of \"Weekly Pandemonium Society\" before anyone else!"
10107-280 = "Merry Christmas!"
10107-290 = "Please stand next to the tree! I'll take a picture of you!"
10107-300 = "I've been waiting for this day!"
10107-310 = "There are a lot of interesting people on the street! I'm going to go make lots of friends!"
10107-330 = "Ahaha! Yes! Got it! Perfect shot!"
10107-340 = "Sensei's dozing face! It'll be great for next issue's cover!"
10107-350 = "That's a wrap for this special issue of \"Weekly Pandemonium Society\"!"
10107-360 = "I, Chiaki, have scored myself yet another exclusive report!"
10107-370 = "Heehee! Never underestimate a secretary's resolve!"
10107-380 = "Ooh! Maybe while I'm at it, I can find out your secrets too...!"
10107-390 = "Like, why do you have holes in your socks?"
10107-400 = "What?! Your secret is you lock naughty students up under your desk...?"
10107-410 = "I-I'm sorry! Please forgive me!"
10107-2600 = "I'm so happy! It's like when I get a lead for an exclusive news story, or maybe even better than that!"

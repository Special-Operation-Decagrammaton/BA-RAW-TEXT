[translation]
10021-10 = "Blue Archive"
10021-20 = "ชิราสึ อาซึสะ มาถึงพื้นที่เป้าหมายแล้ว\nและตรงไปยังเป้าหมายต่อไปทันที\n...ฉันไม่ได้ตื่นเต้นอะไรสักหน่อย"
10021-30 = "ที่นี่ก็สะดวกสบายอยู่\nไม่แย่เท่าไร"
10021-40 = "ไม่รู้ทำไม...\nเหมือนรู้สึกว่ามีใครจ้องอยู่เลย..."
10021-50 = "ฮุฮุ..."
10021-60 = "นี่ก็น่ารักไม่ใช่เล่น..."
10021-70 = "ฉันอาจจะ\nแค่เหนื่อยนิดหน่อยน่ะ..."
10021-80 = "กำลังรออยู่เลยละคุณครู\nรีบไปกันเถอะ\nภารกิจต่อไปคืออะไรเหรอ?"
10021-90 = "แบบนี้...\nถ้าเป็นแบบนี้ต่อไป..."
10021-100 = "...อืม?\nมะ... มาตั้งแต่เมื่อไรน่ะ?"
10021-110 = "ทำไมคุณครู...\nถึงจ้องตาเป็นมันแบบนั้นล่ะ?"
10021-120 = "วะ...ว่าแล้วเชียว\nเสื้อตัวนี้...\nมันเด่นไปหรือเปล่า?"
10021-130 = "ที่จริงแล้วตัวฉันเอง\nไม่มีความสามารถ\nในการตัดสินใจหรอก"
10021-140 = "ตัวฉันในตอนนี้...\nเป็นยังไงนะ..."
10021-150 = "คือ...\nถ้าคุณครูบอกว่าดีละก็\nฉันจะเชื่อคุณครูก็แล้วกัน"
10021-160 = "หืม?\nฉันทำอะไรอยู่งั้นเหรอ?"
10021-170 = "ฉันไม่ได้ทำอะไร\nเป็นพิเศษหรอก"
10021-180 = "แล้วก็...\nฉันชอบมากเลยละ"
10021-190 = "ถ้าได้อยู่กับคุณครู\nก็จะได้มีประสบการณ์เรื่องใหม่ๆ\nหลายๆ อย่างเลยสินะ"
10021-200 = "ของพวกนี้น่ะ ถ้าเป็นเมื่อก่อน...\nฉันคงไม่เคยคิดถึงเรื่องพวกนี้แน่ๆ"
10021-210 = "ชุดนี่ไม่ได้ช่วยในการพรางตัว\nหรือการป้องกันตัวเลยสักนิดเดียวนะ"
10021-220 = "หืม...?\nทำให้ฉันแข็งแรงขึ้นงั้นเหรอ?\n...หมายความว่ายังไงน่ะ? "
10021-230 = "สุขสันต์วันเกิดนะ คุณครู"
10021-240 = "ไม่อยากเชื่อเลยว่าฉันจะ\nพูดคำคำนี้ออกไปได้แบบสบายๆ"
10021-250 = "ดีใจจังเลย..."
10021-260 = "อืม...?\nสุขสันต์วันเกิด...?"
10021-270 = "อืม... \nขอบคุณนะคุณครู"
10021-280 = "ผ่านไปด้วยดีอีกหนึ่งปีแล้วสินะ\nฤดูร้อนครั้งนี้..."
10021-290 = "ปะ...เปล่านะ ฉันไม่ได้\nตั้งตารออะไรสักหน่อย"
10021-300 = "ฉันคิดว่าชุดนี้\nไม่เหมาะกับฉันเลย..."
10021-310 = "...แบบนี้ดีกว่างั้นเหรอ?"
10021-320 = "ฉันไม่เข้าใจความหมายหรอก..."
10021-330 = "ก็นะ... มันเป็นวันที่ทุกคน\nจะใส่เสื้อผ้าที่ดูสวยๆ นี่นา"
10021-340 = "ฉันเอง... แค่เท่านี้...\nก็คิดว่าโอเคแล้วละ"
10021-360 = "ว้าว..."
10021-370 = "ฉันเพิ่งเคยเห็นเลย\nที่ที่เป็นประกาย\nและสวยแบบนี้ วิเศษไปเลย"
10021-380 = "ฉันมองเห็นทุกอย่างได้...\nโดยไม่มีอะไรมาขวางเลย..."
10021-390 = "มันรู้สึก...\nน่าแปลกใจจริงๆ นะ.."
10021-400 = "ที่จริง...\nฉันไม่ค่อยชอบ\nพื้นที่เปิดโล่งแบบนี้เท่าไร"
10021-410 = "ไม่มีสถานที่ให้ซ่อนตัว...\nแถมเฝ้าระวังบริเวณรอบๆ ก็ยาก"
10021-420 = "แต่ว่าตอนนี้...\nฉันไม่ได้กังวลเรื่องพวกนั้นเลย"
10021-430 = "คงเป็นเพราะ...\nแบบนี้... อืม..."
10021-440 = "เพราะตอนนี้ฉันมองเห็น\nทุกอย่างได้เต็มสองตาไงล่ะ"
10021-450 = "แล้วก็เพราะมีคุณครู\nอยู่ด้วย..."
10021-2600 = "นี่ละที่ฉันต้องการ\nขอบคุณนะ ฉันจะไม่ทำให้ผิดหวังแน่นอน"

[translation]
10021-10 = "蔚藍檔案。"
10021-20 = "白洲梓，到達目標地點的海邊。\n立刻開始預定的任務。\n……並沒有開心到忘我之類的，不是那樣的。"
10021-30 = "意外的容易活動，\n還不錯……"
10021-40 = "感覺好像有視線……"
10021-50 = "……呵呵。"
10021-60 = "果然這個，\n很可愛……"
10021-70 = "也許有點累了也說不定……"
10021-80 = "我在等你，老師。\n趕快走吧，\n下一個任務是什麼？"
10021-90 = "可以的話，\n就這樣一直……"
10021-100 = "……嗯？\n咦，老師，你是\n從什麼時候就……？"
10021-110 = "為，為什麼要那樣\n一直盯著我看……？"
10021-120 = "果，果然這樣有點\n太花俏了嗎……？"
10021-130 = "老實說，我自己\n不是很清楚。"
10021-140 = "自己現在是什麼樣子，\n還有究竟是好是壞……"
10021-150 = "所以……\n老師認為好的話，\n那就好。"
10021-160 = "嗯？\n我在做什麼……？"
10021-170 = "沒在做什麼哦。"
10021-180 = "……這種時間也不錯。"
10021-190 = "和老師一起就能\n體驗到各種事。"
10021-200 = "這種事，\n之前完全無法想像。"
10021-210 = "這個，既不能偽裝，\n作為防禦也不可靠……"
10021-220 = "……但就是這點好？\n……什麼意思？"
10021-230 = "生日快樂，老師。"
10021-240 = "能一起生活在有餘裕\n說這種事的日子裡……"
10021-250 = "我真的，很開心。"
10021-260 = "嗯……？\n生日……？"
10021-270 = "……是嗎。\n……謝謝你，老師。"
10021-280 = "一年又平安結束了。\n下個夏天也，再次……"
10021-290 = "不，不是，\n並不是在期待……"
10021-300 = "我認為這不是\n在這種日子該穿的衣服……"
10021-310 = "……所以才好？"
10021-320 = "不明白你的意思……"
10021-330 = "嘛，畢竟是\n大家穿著花俏衣服的日子。"
10021-340 = "我也像這樣……\n稍微陽光一點也可以吧。"
10021-360 = "哇……"
10021-370 = "我第一次看到這種景色……\n眼前的東西全都閃閃亮亮的，\n太厲害了……"
10021-380 = "居然有像這樣，\n完全沒有任何阻礙，\n一望無盡的地方……"
10021-390 = "有種，\n不可思議的感覺……"
10021-400 = "照理說，\n像這種遼闊的地方\n我不是很喜歡。"
10021-410 = "無處躲藏，\n也很難警戒四周……"
10021-420 = "但是現在……\n完全沒有感到不安。"
10021-430 = "這肯定是因為，\n唔……"
10021-440 = "現在我的視野裡，\n總是像這樣……"
10021-450 = "……有老師在吧。"
10021-2600 = "我剛好想要這種東西，\n謝謝。我不會讓你後悔的。"

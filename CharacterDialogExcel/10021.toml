[translation]
10021-10 = "블루 아카이브."
10021-20 = "시라스 아즈사. 목표 지점인 바다에 도착.\n곧바로 다음 목표를 이행하지.\n……딱히 들떴다거나 그런 건 아니야."
10021-30 = "의외로 움직이기도\n편하고, 나쁘지 않아\n……"
10021-40 = "왠지 시선이\n느껴지는데……"
10021-50 = "……후후."
10021-60 = "역시 이거 귀여워……"
10021-70 = "조금 피곤할 지도\n모르겠네……"
10021-80 = "기다리고 있었어, 선생님.\n빨리 가자.\n다음 임무는 뭐야?"
10021-90 = "이대로……\n이대로 쭉……"
10021-100 = "……음?\n어, 언제 왔어……?"
10021-110 = "뭐, 뭘 그렇게\n빤히 보는 거야……?"
10021-120 = "여, 역시…\n너무 요란한가?\n옷이…?"
10021-130 = "솔직히 스스로는\n판단할 능력이 없어."
10021-140 = "지금의 내\n모습이 어떤지……"
10021-150 = "그러니……\n선생님이 좋다면\n그 판단을 따를 거야."
10021-160 = "응?\n뭘 하고 있냐고?"
10021-170 = "딱히 아무 것도\n하지 않고 있어."
10021-180 = "……그리고\n그게 마음에 들어."
10021-190 = "선생님이랑 있으면\n여러 가지\n경험을 하게 되네."
10021-200 = "지금의 이런 것들,\n예전이었다면 상상도\n못했을 거야."
10021-210 = "위장에도 방어에도\n도움이라곤\n되지 않는 옷이네."
10021-220 = "……응?\n오히려 더 강하다고?\n……무슨 의미야?"
10021-230 = "생일 축하해. 선생님."
10021-240 = "이런 말을 여유롭게 나눌 수 있는,\n함께하는 나날들……"
10021-250 = "정말로 기뻐."
10021-260 = "응……?\n생일 축하……?"
10021-270 = "……응.\n……고마워. 선생님."
10021-280 = "또 한 해를 무사히 넘겼네.\n이번 여름도……"
10021-290 = "아, 아니. 그렇게\n기대하고 있는 건……"
10021-300 = "전혀 어울리지 않는\n복장이라 생각하는데……"
10021-310 = "……그래서 더 좋다고?"
10021-320 = "의미를 모르겠어……"
10021-330 = "뭐, 모두가 요란한 복장을\n입고 있는 날이니까."
10021-340 = "나도…… 이 정도는\n괜찮을 거라 생각해."
10021-360 = "와……"
10021-370 = "이런 건 처음이야……\n눈에 비치는 게 전부 반짝반짝……\n굉장해……"
10021-380 = "이렇게 방해받지 않고,\n전부 내다볼 수 있는\n장소가 있었다니……"
10021-390 = "뭔가……\n신기한 느낌……"
10021-400 = "사실 이렇게 탁 트인 위치는\n별로 좋아하지 않았어."
10021-410 = "숨을 곳도 없고……\n주변 경계도 힘들고……"
10021-420 = "그치만 지금은……\n불안하지 않아."
10021-430 = "분명, 이건……\n응……"
10021-440 = "지금의 내 시야에는,\n항상 이렇게……"
10021-450 = "……선생님이\n보이고 있으니까."
10021-2600 = "바로 이런 게 필요했던 참이야.\n\r고마워, 후회하지 않게 해줄게."

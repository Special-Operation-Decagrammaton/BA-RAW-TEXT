[translation]
10021-10 = "Blue Archive."
10021-20 = "Shirasu Azusa. Arrived at the objective. Let's go straight to the next, not that I'm particularly excited."
10021-30 = "This place isn't so uncomfortable. Not bad."
10021-40 = "I feel like I'm being watched."
10021-50 = "Heehee."
10021-60 = "I have to admit this is cute..."
10021-70 = "Might be just a bit tired..."
10021-80 = "I've been waiting. Hurry, Sensei. What's the next mission?"
10021-90 = "I hope...this can continue..."
10021-100 = "Hmm? When did you arrive?"
10021-110 = "Wh-Why are you staring at me?"
10021-120 = "I knew it. Is my outfit too flashy?"
10021-130 = "To be honest, I don't have the ability to judge for myself."
10021-140 = "I'm not sure how I look..."
10021-150 = "If this is what you want Sensei, then I'll follow your decision."
10021-160 = "Hmm? What am I doing?"
10021-170 = "Nothing in particular, really."
10021-180 = "And that's how I like it."
10021-190 = "I get to experience a lot of new things when I'm with you."
10021-200 = "I never could have imagined this in the past."
10021-210 = "These clothes offer no particular defense to my midsection."
10021-220 = "Hmm? You think it makes it more powerful? What is that supposed to mean?"
10021-230 = "Happy birthday, Sensei."
10021-240 = "The days we can relax and talk together..."
10021-250 = "I'm really glad to have them."
10021-260 = "Hmm? Happy...birthday?"
10021-270 = "Oh, yes... Thank you, Sensei."
10021-280 = "Another year safely gone by. Hopefully this summer as well..."
10021-290 = "N-No. It's not that I'm looking forward to..."
10021-300 = "I don't think the outfit is suitable at all..."
10021-310 = "But that makes it better?"
10021-320 = "I don't understand."
10021-330 = "Well, people often wear flashy clothing today."
10021-340 = "So I think this will be fine."
10021-360 = "Wow..."
10021-370 = "I've never seen so many shining and beautiful things at once before... It's amazing!"
10021-380 = "I can see everything in just a glance here. Nothing is in the way."
10021-390 = "I've...never felt this way before."
10021-400 = "Typically, I wouldn't like such an exposed location."
10021-410 = "There's nowhere to take cover and securing the perimeter is difficult."
10021-420 = "Yet, interestingly, I'm not very concerned."
10021-430 = "So maybe...this is... Right."
10021-440 = "Because right now..."
10021-450 = "...I have Sensei in my sights."
10021-2600 = "This is exactly what I needed. Thank you. I'll make sure you won't regret it."

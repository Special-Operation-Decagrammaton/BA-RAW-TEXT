[translation]
10028-10 = "Blue Archive，"
10028-20 = "鏘～！你看你看，主人！\n是兔女郎裝的明日奈唷！"
10028-30 = "蹦蹦！\n兔女郎的明日奈參上！"
10028-40 = "這裡也是\n非常開心的地方呢！"
10028-50 = "啊哈哈哈！\n這是什麼好有趣！"
10028-60 = "咦，主人去哪裡了呢？\n要去找主人嗎～？"
10028-70 = "遊樂園之類的，\n常有像我這樣的兔子在呢！"
10028-80 = "歡迎回來，主人！\n我以可愛兔女郎的樣子\n在等你唷！"
10028-90 = "主人感興趣的是\n耳朵？尾巴？還是～"
10028-100 = "嗯，怎麼了嗎？\n中意這件衣服？\n那主人也要穿看看嗎？"
10028-110 = "不可以讓兔子感到寂寞唷。"
10028-120 = "所以，要被主人多摸摸才行！"
10028-130 = "啊哈哈哈哈！\n等，好癢哦\n主人～！"
10028-140 = "嗯……有點閒呢……"
10028-150 = "呃雖然那麼想，\n不過主人剛好來了\nALL OK！哇～咿！"
10028-160 = "兔子是怎麼帶去散步的呢？"
10028-170 = "……主人，\n現在要試試看嗎？"
10028-180 = "HappyBirthday，主人！\n因為是生日，\n就把這個可愛兔女郎裝的\n明日奈送給老師當禮物！"
10028-190 = "主人，\n知道今天是什麼日子嗎？"
10028-200 = "呵呵，那～麼，\n今天就讓老師\n比以往多陪我玩吧！"
10028-210 = "新年開始了呢，主人！\n沒關係，今年明日奈\n也會在你身邊的！"
10028-220 = "聖誕快樂，主人！"
10028-230 = "嗯？\n明明是聖誕節\n為什是兔女郎的模樣？"
10028-240 = "那個那個，\n兔子聖誕老人的那個！"
10028-250 = "大家都打扮得好有趣呢！\n但是明日奈穿這個服裝的話\n似乎也不會輸，"
10028-260 = "來吧，主人！\n一起突擊～！"
10028-280 = "咦？這時間\n有什麼事？主人。"
10028-290 = "……我？如同你所看到的，\n我當然是來洗衣服啊！"
10028-300 = "……你問我來洗衣服\n為什麼是這個模樣？"
10028-310 = "那當然是因為\n全部都丟去洗了啊。"
10028-320 = "因為連內衣都丟進去了，\n所以沒有其他衣服能穿──？"
10028-330 = "咦──，我沒有騙人啊～\n……那要親眼確認看看嗎？"
10028-340 = "啊哈哈，臉紅了！\n不過主人\n來這邊要做什麼？"
10028-350 = "……嗯？是來看我的？\n這個時間？"
10028-360 = "好開心！\n我正好覺得\n一個人好無聊！"
10028-370 = "謝謝你，主人！！\n那，要玩什麼呢？"
10028-2600 = "鏘～！\n兔女郎裝的明日奈，完全體！\n開玩笑的！"

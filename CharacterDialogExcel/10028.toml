10028-50 = "Hahahahahaha! What's this? Fun!"
10028-60 = "Hmm, I wonder where Master is? Shall I start looking?"
10028-70 = "It's not uncommon to see a bunny like me at a theme park, right?"
10028-80 = "There you are, Master! Me and my cute bunny outfit have been waiting!"
10028-90 = "What's your favorite part of it, Master? The ears? The tail? Or...?"
10028-100 = "Hmm? What's wrong? I thought you liked it. Do you want to try it on for yourself?"
10028-110 = "It's natural for bunnies to seek attention."
10028-120 = "That's why you have to pet them, Master!"
10028-130 = "Hahahahaha! It tickles, Master!"
10028-140 = "Hmm. I'm kinda bored."
10028-150 = "But you know, I'm happy as long as you're here, Master!"
10028-160 = "Can a pet bunny be taken for a walk?"
10028-170 = "Wanna try it, Master?"
10028-180 = "Happy birthday, Master! It's your birthday, so here's your gift: a cute bunny girl Asuna!"
10028-190 = "Do you know what day it is, Master?"
10028-200 = "Haha. That means you have to play with me even more today than you usually do!"

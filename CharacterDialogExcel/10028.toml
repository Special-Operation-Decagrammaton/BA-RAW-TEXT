[translation]
10028-10 = "Blue Archive"
10028-20 = "แต่นแต๊น~! ดูนี่สินายท่าน!\nบันนี่อาสึนะเองค่า~!"
10028-30 = "กระโดดดึ๋งดั๋ง~\nบันนี่อาสึนะเองค่า~!"
10028-40 = "ที่นี่เป็นสถานที่\nที่ดูน่าสนุก\nสุดยอดไปเลยเนอะ!"
10028-50 = "ฮ่ะฮ่ะฮ่ะฮ่าฮ่าา!\nอะไรกันเนี่ย?\nสนุกดีจัง!"
10028-60 = "อืม~ นายท่าน...\nอยู่ที่ไหนกันนะ?\nฉันไปหาดีมั้ย?"
10028-70 = "ตอนนี้ที่สวนสนุกน่ะ\nมีคุณบันนี่เหมือนกับฉัน\nอยู่เต็มไปหมดเลยนะ!"
10028-80 = "เชิญเลยนายท่าน!\nฉันใส่ชุดบันนี่น่ารักๆ\nรอนายท่านอยู่แล้วล่ะ!"
10028-90 = "นายท่านสนใจอะไรงั้นเหรอ?\nหู? หาง? หรือว่า~"
10028-100 = "หืม? ทำไมเหรอ?\nนายท่านชอบชุดนี้เหรอ?\nถ้างั้นนายท่านลองใส่ดูมั้ย?"
10028-110 = "เป็นธรรมชาติของกระต่าย\nที่อยากให้คนสนใจนะ"
10028-120 = "เพราะงั้นนายท่านช่วย\nลูบหัวให้บ่อยๆ ก็พอแล้วล่ะ"
10028-130 = "ฮ่ะฮ่ะฮ่ะฮ่าา!\nมันจักกะจี้นะนายท่าน!"
10028-140 = "อืมมม~ น่าเบื่อจังเลยน้า..."
10028-150 = "กำลังเบื่ออยู่พอดีเลย\nนายท่านมาแบบนี้\nฉันก็มีความสุขแล้วล่ะ~! ว้าว!"
10028-160 = "กระต่ายบ้านไปเดินเล่นยังไงกันนะ?"
10028-170 = "นายท่าน... อยากไปเดินเล่นมั้ย?"
10028-180 = "แฮปปี้เบิร์ธเดย์ นายท่าน!\nวันนี้เป็นวันเกิดของนายท่าน\nนี่ของขวัญ... บันนี่อาสึนะไงล่ะ!"
10028-190 = "นายท่านคะ!\nรู้มั้ยว่าวันนี้วันอะไร~?"
10028-200 = "ฮิฮิ ถ้างั้นวันนี้นายท่าน\nต้องมาเล่นกับฉันเยอะๆ นะ~!"
10028-210 = "เริ่มต้นปีใหม่แล้วนะนายท่าน!\nไม่ต้องห่วง ปีนี้อาสึนะ...\nก็จะคอยอยู่ข้างๆ นายท่านเอง!"
10028-220 = "เมอร์รีคริสต์มาสนะนายท่าน!"
10028-230 = "หืม? ทำไมถึงแต่งชุดบันนี่\nในวันคริสต์มาสน่ะเหรอ?"
10028-240 = "เพราะฉันคือซานตาบันนี่ไงล่ะ! "
10028-250 = "ทุกคนแต่งตัวดูน่าสนุกจัง!\nแต่ถ้าอาสึนะใส่ชุดนี้อยู่ล่ะก็\nไม่มีทางแพ้แน่"
10028-260 = "เอาล่ะ นายท่าน~! บุกพร้อมกันเลย!"
10028-280 = "เอ๊ะ? ดึกขนาดนี้แล้ว\nมีอะไรรึเปล่านายท่าน?"
10028-290 = "ฉันเหรอ...?\nอย่างที่เห็น\nฉันก็มาซักผ้าน่ะสิ"
10028-300 = "หืม...?\nแค่มาซักผ้าทำไมต้อง\nใส่ชุดนี้ด้วยน่ะเหรอ?"
10028-310 = "ก็เพราะว่าชุดอื่นๆ ที่มี\nฉันเอามาซักหมดแล้วไงล่ะ"
10028-320 = "พวกชุดชั้นในก็เอามาซักหมดเลย\nไม่มีเหลือสักชุดเลยละ"
10028-330 = "เอ๋~ ไม่ได้โกหกสักหน่อย!\nนายท่านจะพิสูจน์ให้เห็นกับตาเลยมั้ย?"
10028-340 = "ฮ่าฮ่าฮ่า หน้าแดงแจ๋เลย!\nว่าแต่ว่านายท่านมาที่นี่ทำไมเหรอ?"
10028-350 = "หืม? มาหาฉันงั้นเหรอ?\nดึกป่านนี้แล้วเนี่ยนะ?"
10028-360 = "ดีจัง! ฉันกำลังเบื่อๆ\nเพราะต้องอยู่คนเดียว\nพอดีเลย!"
10028-370 = "ขอบคุณนะนายท่าน!!\nเอาละ ถ้างั้น...\nเราจะเล่นอะไรกันดี?"
10028-2600 = "แต่นแต๊น~!\nบันนี่อาสึนะ มาแล้ว~!"

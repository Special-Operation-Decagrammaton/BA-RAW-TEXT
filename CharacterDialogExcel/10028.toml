[translation]
10028-10 = "블루 아카이브."
10028-20 = "쨔쟌-! 이것 봐, 주인님!\n토끼 아스나입니다!"
10028-30 = "깡총깡총~.\n토끼 아스나입니다~."
10028-40 = "여기도 되게\n재밌어보이는\n곳이네!"
10028-50 = "아하하하하하!\n이거 뭐야?\n재미있어!"
10028-60 = "음~. 주인님은\n어디에 있을까?\n찾으러 가볼까?"
10028-70 = "놀이공원 같은 데도\n종종, 지금의 나같은\n토끼들이 있더라!"
10028-80 = "어서 와, 주인님!\n귀여운 토끼 차림으로\n기다렸어!"
10028-90 = "주인님이 흥미 있는 것은,\n귀? 꼬리? 아니며언~"
10028-100 = "응? 왜 그래?\n이 옷 마음에 들었어?\n그러면 주인님도 입어 볼래?"
10028-110 = "토끼 씨는 외로워지면 안 된대."
10028-120 = "그러니까, 주인님이 잔뜩\n쓰다듬어주었으면 해!"
10028-130 = "아하하하하!\n간지러워, 주인님!"
10028-140 = "음, 좀 한가하네……"
10028-150 = "하고 생각했는데,\n마침 주인님이 와 줬으니까\n모두 오케이! 와-이!"
10028-160 = "토끼는 어떻게 산책을 가는 걸까?"
10028-170 = "……주인님, 지금부터 해 볼래?"
10028-180 = "해피 버스데이-주인님!\n생일이니까 주인님께는,\n귀여운 바니걸 아스나를 선물!"
10028-190 = "주인님,\n오늘이 무슨 날인지 알아?"
10028-200 = "후훗, 그러면, 오늘은 여느 때보다\n더 많이 놀아 줘야 할 거야!"
10028-210 = "새로운 한 해가 시작됐어, 주인님!\n괜찮아. 올해도 아스나가\n옆에 있어 줄 테니까!"
10028-220 = "메리 크리스마스, 주인님!"
10028-230 = "응?\n크리스마슨데 왜 토끼냐고?"
10028-240 = "토끼 산타-! 라는 거지!"
10028-250 = "다들 재미있는 옷을 입고 있네!\n하지만 아스나도 이 옷이라면\n지지 않을 것 같은데,"
10028-260 = "자아, 주인님! 같이 돌격이야!"
10028-280 = "어라? 이런 시간에\n웬일이야, 주인님?"
10028-290 = "……나? 나야 보는대로\n빨래하러 왔지!"
10028-300 = "……빨래하러 왔는데\n왜 그 모습이냐고?"
10028-310 = "그야 나머지는\n전부 다 빨고 있으니까."
10028-320 = "지금은 속옷까지 다 빨아서,\n다른 게 없는 걸?"
10028-330 = "에~. 거짓말 아닌데?\n그럼 직접 보고 확인해볼래?"
10028-340 = "아하하, 얼굴 빨개!\n그런데 주인님은\n여기 왜 온 거야?"
10028-350 = "……응? 나 보러 왔다고?\n이 시간에?"
10028-360 = "신난다!\n마침 혼자 있기\n지루하던 참이었는데!"
10028-370 = "고마워, 주인님!!\n자, 그럼 뭐 하고 놀까?"
10028-2600 = "쨔안-! 토끼 아스나, 완전체!\n등~장이야~!"

[translation]
16009-10 = "Blue! Archive!"
16009-20 = "Heehee... Thanks for waiting! Chidori Michiru, president of the Ninjutsu Research Club has arrived! Looking forward to working with you, Sensei"
16009-30 = "Now, what video should I upload to the channel next?"
16009-40 = "Michiruchi, a Girl's Ninja Scroll... Going for a hundred subscribers!"
16009-50 = "Oh! I just thought of a new ninjutsu!"
16009-60 = "When is the new issue of Kama-Boke Gale Battle coming out?"
16009-70 = "Ugh, there are a bunch of students... I don't wanna go near them..."
16009-80 = "Sensei! You're late!"
16009-90 = "First, can I show you the ninjutsu I made today?"
16009-100 = "Oh...hi, Sensei. I prepared perfectly for the task, but..."
16009-110 = "Please help me with my homework first! Please!"
16009-120 = "Although the Ninjutsu Research Club hasn't been officially recognized..."
16009-130 = "...I won't give up! One day, ninjas will be official too!"
16009-140 = "What if, for some reason, everyone becomes a ninja like in the zombie movies?"
16009-150 = "The underclassmen are working hard to promote our ninja way."
16009-160 = "Izuna and Tsukuyo... They're so great!"
16009-170 = "Ugh... I can't seem to increase my subscriber count for Michiruchi, a Girl's Ninja Scroll. What am I doing wrong?"
16009-180 = "...A deduction?"
16009-190 = "Huh? What? Seduction?!"
16009-200 = "Wh-Wh-What are you talking about, Sensei? Am I supposed to blow kisses at the camera or something?!"
16009-210 = "I can't do something so shameless!"
16009-220 = "There you are, Sensei! Happy birthday!"
16009-230 = "Heehee! Today, the Ninjutsu Research Club has prepared something incredible for you."
16009-240 = "It's called the \"All-Day Ambush Operation\"!"
16009-250 = "All day today, Izuna, Tsukuyo, and I..."
16009-260 = "Will appear out of nowhere to surprise you! Heehee! Starting now!"
16009-270 = "Whoa?! You're wishing me h-happy birthday?!"
16009-280 = "Oh, I see...but I'm still happy to be congratulated. It feels pretty nice!"
16009-290 = "H-Heehee... Heeheehee..."
16009-300 = "Happy New Year, Sensei."
16009-310 = "I'm positive that this year is gonna be the year of the ninja. That's what my ninja intuition is telling me!"
16009-320 = "It's the holiday season...which means Christmas is coming soon!"
16009-330 = "All those things labeled \"limited edition,\" they're the devil..."
16009-340 = "My wallet is getting thinner and thinner. Please...no more..."
16009-350 = "Trick or treat! It's like a jutsu to get candy."
16009-360 = "What if I say, \"Trick or ninja!\"?! You think they would subscribe?"
16009-370 = "Huh? Too much? I thought so..."
16009-390 = "Let me show you!"
16009-400 = "This is the brand new Michiru-style ninjutsu!"
16009-410 = "Ninjutsu! Sparkling Fire technique!"
16009-420 = "Hahaha, Sensei! What'd you think? Wasn't it so cool?!"
16009-430 = "How do I look on the screen?"
16009-440 = "It's got a fantastic ninja feel... It's perfect!"
16009-450 = "I'm the most powerful president of the Ninjutsu Research Club!"
16009-460 = "Oh, it's gonna get even better from now. Keep watching!"
16009-470 = "One, two!"
16009-2600 = "Whoa, this is for me?! I-It's a bit much... Well, okay, fine! You can count on me, Sensei! I'll show you the power of Michiru-style ninjutsu!!"

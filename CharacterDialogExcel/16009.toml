[translation]
16009-10 = "블루! 아카이브!"
16009-20 = "후후후… 오래 기다렸어-!\n인법연구부의 부장! 치도리 미치루……\n여기에 등장! 앞으로 잘 부탁해! 선생 공!"
16009-30 = "자, 다음엔 채널에\n어떤 영상을 올려볼까?"
16009-40 = "<소녀인법첩\n미치룻치>…\n노려라, 구독자 수 100명!"
16009-50 = "아, 새로운\n인법이 떠올랐다!"
16009-60 = "어라… <카마보코\n돌풍전> 신간 발매일이\n언제더라?"
16009-70 = "…으으, 여기저기 다른\n학생들이… 별로 가까이\n가고 싶지 않은데…"
16009-80 = "아, 선생 공!\n늦었잖아!"
16009-90 = "일단 오늘 내가 만든\n자작 인법, 보지 않을래?"
16009-100 = "아, 오셨소이까. 선생 공.\n업무의 준비는 완벽히\n해두었, 다만…"
16009-110 = "그전에 숙제 좀 도와주라!\n부탁해!"
16009-120 = "인법연구부는,\n아직 정식으로 인가\n받지 못했지만…"
16009-130 = "그래도 포기하지 않아.\n언젠가 닌자가 공식적으로\n인정 받는 날이 올 터!"
16009-140 = "어떤 원인으로 모두가\n좀비처럼 닌자가 된다거나\n하지는 않을까…"
16009-150 = "닌자를 널리 알리기\n위해서 후배들도 열심히\n해주고 있어."
16009-160 = "이즈나도 츠쿠요도,\n엄청 좋은 애들이라니깐!"
16009-170 = "으으… 좀처럼 <소녀인법첩 미\n치룻치>의 구독자 수가 오르\n질않아. 뭐가 부족한 걸까?"
16009-180 = "…공룡인가?"
16009-190 = "응-? 뭐야,\n전에 말했던 [미인계]……?"
16009-200 = "무, 무, 무슨 소리를\n하는 거야?! 선생 공?!\n그거, 카메라를 향해\n키스 마크라도 날리란 거야?!"
16009-210 = "그런 파렴치한 건\n절대로 무리라고?!"
16009-220 = "앗! 선생 공 발견!\n생일 축하해-!"
16009-230 = "후후, 오늘은 인법연구부\n모두가 선생 공을 위해\n엄청난 걸 준비했어."
16009-240 = "이름하여\n<하루 종일 매복 대작전!>"
16009-250 = "오늘 하루 내내,\n나도, 이즈나도, 츠쿠요도!"
16009-260 = "어디서든지 나타나서\n깜짝 놀라게 해줄게!\n히히! 자, 그럼 시작!"
16009-270 = "우갸아앗!?\n새, 생일 축하한다고?"
16009-280 = "아- 뭔가 했네… 그래도\n선생 공에게 축하받다니…\n뭐, 나쁘지 않은걸?"
16009-290 = "후, 후훗, 후후후…"
16009-300 = "새해 복 많이 받아. 선생 공."
16009-310 = "단언컨대 올해는 닌자의 해가\n될 거야. 내 닌자 센서가,\n그렇게 속삭이고 있어!"
16009-320 = "크리스마스인가-\n…이런 시기에는,\n반드시 나온단 말이지."
16009-330 = "무슨 무슨\n<한정판>이라고 하는,\n악마의 상술이…"
16009-340 = "정말이지,\n지갑이 힘들어하니까,\n봐달라고…"
16009-350 = "트릭 오어 트릿\n이라고 말하면, 과자를\n받을 수 있어…"
16009-360 = "그럼 <트릭 오어 닌자!>\n라고 하면, 모두 우리\n채널을 구독해주지 않을까…?"
16009-370 = "응? 무리라고?\n그렇겠지…"
16009-390 = "그럼 보여드리겠소이다!"
16009-400 = "내가 고안해낸,\n새로운 미치루류 인법을!"
16009-410 = "<인법!\n반짝반짝 파이어의 술!>"
16009-420 = "아하핫! 선생 공-!\n어때어때?\n느낌 있지 않아??"
16009-430 = "내 멋진 모습,\n잘 나오고 있어?"
16009-440 = "이 닌자다운\n판타스틱함… 완벽해!"
16009-450 = "역시 나야말로,\n인법연구부 최강의 부장!"
16009-460 = "아, 여기서부터가 또\n굉장하니까.\n잘 보고 있으라구!"
16009-470 = "하나- 둘!"
16009-2600 = "우오… 이런 것까지 나한테……!?\n사, 살짝 부담스러운데……\n……으응, 그래도 맡겨줘, 선생 공!\n보여드리겠소이다, 미치루류 인법……\n그 진수를!"

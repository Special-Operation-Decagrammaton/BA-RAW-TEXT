[translation]
16009-10 = "Blue Archive!"
16009-20 = "ฮุฮุฮุ... ข้าน้อยรออยู่นานแล้วละ-!\nหัวหน้าชมรมวิจัยศาสตร์นินจา! จิโดริ มิจิรุ...\nมาปรากฏตัวที่นี่แล้ว! ฝากตัวด้วยนะ ท่านอาจารย์!"
16009-30 = "เอาละ ต่อไปจะอัปวิดีโอ\nแบบไหนลงช่องดีนะ?"
16009-40 = "<วิถีนินจาสาว\n มิจิรุจจี้>...\nเป้าหมายผู้ติดตาม 100 คน!"
16009-50 = "อ๊า คิดเคล็ดวิชาใหม่\nขึ้นมาได้แล้วล่ะ!"
16009-60 = "เอ๋...? <คามาโบโกะ ภาควายุสลาตัน>\nเล่มใหม่ วางขายเมื่อไรนะ?"
16009-70 = "ทะ... ที่ไหนๆ\nก็มีนักเรียนเต็มไปหมด\nไม่ค่อยอยากเข้าไปใกล้เลย..."
16009-80 = "อ๊ะ ท่านอาจารย์...!\nมาช้านะ!"
16009-90 = "ก่อนอื่นมาดูเคล็ดวิชา\nที่ข้าน้อยคิดค้นขึ้นก่อนดีมั้ย?"
16009-100 = "มะ...มาแล้วเหรอ ท่านอาจารย์\nเตรียมการสำหรับภารกิจ\nเอาไว้พร้อมแล้วแต่ว่า..."
16009-110 = "มาช่วยข้าน้อยทำการบ้าน\nก่อนเถอะ! ขอร้องล่ะ!"
16009-120 = "ถึงชมรมวิจัยศาสตร์นินจา\nจะยังไม่ได้รับการยอมรับ\nอย่างเป็นทางการก็เถอะ..."
16009-130 = "แต่ข้าน้อยก็จะไม่ยอมแพ้\nวันที่นินจาได้รับการยอมรับ\nจะต้องมาถึงอย่างแน่นอน!"
16009-140 = "มีอะไรบางอย่างที่ทำให้ทุกคน\nกลายเป็นนินจาเหมือนกับ\nกลายเป็นซอมบี้ได้มั้ยนะ..."
16009-150 = "พวกรุ่นน้องเอง\nก็พยายามอย่างเต็มที่\nเพื่อให้นินจาเป็นที่รู้จัก"
16009-160 = "ทั้งอิซุนะและสึคุโยะ\nก็เป็นเด็กดีกันทุกคนเลย!"
16009-170 = "อืม... จำนวนคนติดตาม\n<ช่องวิถีนินจาสาว มิจิรุจจี้> เพิ่มขึ้น\nไม่เท่าไรเลย ยังขาดอะไรอยู่อีกนะ?"
16009-180 = "ไดโนเสาร์เหรอ?"
16009-190 = "หืม-? อะไรกัน\n[เคล็ดลับความงาม]\nที่บอกไปเมื่อคราวก่อนเหรอ...?"
16009-200 = "พะ...พะ...พูดอะไรน่ะ\nท่านอาจารย์?! มะ...หมายความว่า\nให้ส่งจูบใส่กล้องงั้นเหรอ?!"
16009-210 = "เรื่องน่าขายหน้าแบบนั้น\nมะ...ไม่ไหวหรอกนะ?!"
16009-220 = "อ๊ะ! เจอท่านอาจารย์แล้ว!\nสุขสันต์วันเกิด--!"
16009-230 = "ฮุฮุ วันนี้ชมรมวิจัยศาสตร์นินจา\nจัดเตรียมทุกอย่าง\nไว้เพื่อท่านอาจารย์แล้ว"
16009-240 = "ชื่อของมันก็คือ...\n<ปฏิบัติการซุ่มโจมตีตลอดวัน!>"
16009-250 = "วันนี้ตลอดทั้งวัน...\nข้าน้อย อิซุนะและสึคุโยะ"
16009-260 = "จะซุ่มอยู่ที่ใดที่หนึ่งและโผล่มา\nทำให้ท่านอาจารย์ตกใจตลอดวัน!\nฮิฮิ! เอาละ... ถ้างั้นก็เริ่มได้เลย!"
16009-270 = "วะ...ว้าก?!\nสะ...สุขสันต์วันเกิดเหรอ?"
16009-280 = "อา... งั้นเหรอ.. แต่ได้รับคำอวยพร\nจากท่านอาจารย์แบบนี้\nก็ไม่แย่เท่าไรนะ?"
16009-290 = "ฮุ ฮุฮุ ฮุฮุฮุ...!"
16009-300 = "สวัสดีปีใหม่นะ ท่านอาจารย์"
16009-310 = "ปีนี้จะต้องเป็นปีแห่งนินจาแน่นอน\nลางสังหรณ์นินจาของฉัน\nมันบอกแบบนั้น!"
16009-320 = "คริสมาสต์...\nในเวลาแบบนี้\nข้าน้อยต้องมาอยู่แล้วสิ"
16009-330 = "อะไรกันๆ\nอำนาจแห่งปีศาจ\nที่เรียกว่า <ลิมิเต็ดอิดิชั่น> เนี่ย..."
16009-340 = "จริงๆ เลยเชียว\nสงสารกระเป๋าตังสุดๆ เลย\nปรานีกันบ้างเถอะ..."
16009-350 = "ถ้าพูดว่า\nทริก ออร์ ทรีต...?\nก็จะได้รับขนม..."
16009-360 = "งั้นถ้าพูดว่า...\n<ทริก ออร์ นินจา!> ล่ะ\nทุกคนจะกดติดตามช่องข้าน้อยมั้ย...?"
16009-370 = "หือ? เกินไปงั้นเหรอ?\nก็นั่นน่ะสินะ..."
16009-390 = "ถ้างั้น...\nข้าน้อยจะแสดงให้ดูแล้วนะ!"
16009-400 = "เคล็ดวิชานินจาแบบใหม่...\nที่ข้าน้อยคิดค้นขึ้น!"
16009-410 = "<เคล็ดวิชานินจา!\nเปลวอัคคีประกายแสง!>"
16009-420 = "อ่ะฮะฮะ! ท่านอาจารย์-!\nเป็นยังไงบ้าง?\nใช้ได้เลยใช่มั้ย??"
16009-430 = "ถ่ายวิดีโอภาพลักษณ์\nสุดยอดของข้าน้อย\nออกมาได้ดีรึเปล่า??"
16009-440 = "ความมหัศจรรย์ที่สมกับ\nเป็นนินจาแบบนี้\nสมบูรณ์แบบที่สุด!"
16009-450 = "สมแล้วล่ะที่ข้าน้อย...\nเป็นหัวหน้าสุดแกร่ง\nแห่งชมรมวิจัยศาสตร์นินจา!"
16009-460 = "อ๊ะ... ความสุดยอด\nจะเริ่มต้นจากตรงนี้แล้วนะ\nคอยดูข้าน้อยให้ดีล่ะ!"
16009-470 = "หนึ่ง สอง...!"
16009-2600 = "ว้าว... ให้ของแบบนี้กับข้าน้อย...?!\nระ...รู้สึกเกรงใจนิดหน่อย...\nอื้ม... ไว้ใจได้เลย ท่านอาจารย์!\nถ้างั้นข้าน้อยจะแสดงให้ดู... วิชานินจา!"

[translation]
16009-10 = "蔚藍！檔案！"
16009-20 = "哼哼哼……久等了～！\n忍術研究部部長，千鳥三千留……\n在此登場！今後請多指教哦，老師大人！"
16009-30 = "那麼～下次要在頻道\n上傳什麼樣的影片呢？"
16009-40 = "「少女忍法帖小小三千留」……\n目標，頻道訂閱數100人！"
16009-50 = "啊，想到新的忍術了！"
16009-60 = "咦……《魚板疾風傳》\n的新刊發售日，\n是什麼時候來著？"
16009-70 = "唔，到處都有別校的學生……\n不太想接觸……"
16009-80 = "啊，老師大人！\n真是的，好慢啊！"
16009-90 = "總之今天要不要看，\n我自創的忍術？"
16009-100 = "你來了嗎？老師大人。\n任務準備雖然\n完美地準備完成……"
16009-110 = "但在那之前，先幫我做作業吧！\n拜託你了！"
16009-120 = "雖然忍術研究部，\n還沒被正式認可……"
16009-130 = "不過我不會放棄。\n總有一天，忍者大家認可的\n日子一定會到來！"
16009-140 = "會不會因為某些原因，\n讓大家像殭屍一樣\n變成忍者呢……"
16009-150 = "為了廣泛宣傳忍者，\n後輩們也都在努力。"
16009-160 = "伊樹菜和月夜，\n都是非常好的孩子！"
16009-170 = "唔……「少女忍法帖小小三千留」\n的頻道訂閱數沒在增加……\n是缺少了什麼呢？"
16009-180 = "……恐龍要素之類的？"
16009-190 = "嗯～？什麼，之前\n說過的「色誘之術」……？"
16009-200 = "你，你你你在說什麼呀\n老師大人！？那個，\n就是對著相機飛吻的事吧！？"
16009-210 = "那種不知羞恥的事\n絕對不行！"
16009-220 = "啊，發現老師大人！\n生日快樂～！"
16009-230 = "呵呵，今天忍術研究部\n一起為老師大人\n準備了很厲害的東西。"
16009-240 = "命名為……\n「一日埋伏大作戰」！"
16009-250 = "今天一天，\n我和伊樹菜還有月夜也是！"
16009-260 = "會在任何地方出現嚇老師！\n嘻嘻，那就開始！！"
16009-270 = "唔咿呀！？生，生日？"
16009-280 = "啊～，還以為是什麼……而且，\n沒想到可以讓老師大人幫我慶祝\n……嘛，還不錯呢？"
16009-290 = "呵，呵呵，呵呵呵呵……"
16009-300 = "新年快樂，老師大人。"
16009-310 = "我可以斷言，\n今年會是忍者的一年。\n我的忍者雷達是這麼說的！"
16009-320 = "聖誕節嗎……\n這種時期，絕對會出現呢。"
16009-330 = "什麼「限定版」之類的\n惡魔的陷阱……"
16009-340 = "真的是，\n以錢包的角度來說很困擾，\n希望可以放過我……"
16009-350 = "只要說Trick or Treat的話，\n就能拿到糖果……"
16009-360 = "那麼說「Trick or Ninja！」的話，\n大家不就會訂閱頻道了嗎……？"
16009-370 = "咦，也許不行？\n我想也是……"
16009-390 = "那麼，我這就讓你看看！"
16009-400 = "我所構思的，\n新三千留流忍術！"
16009-410 = "「忍法．閃亮\n火焰之術！」"
16009-420 = "啊哈哈，老師大人──！\n怎麼樣啊？\n感覺很不錯吧？"
16009-430 = "有好好拍下\n我的英姿嗎？"
16009-440 = "這極具忍者風格，\n拍案叫絕的感覺……太完美了！"
16009-450 = "我果然是，\n忍術研究部最強的部長！"
16009-460 = "啊，接下來\n還會更有看頭，好好看清楚喔！"
16009-470 = "一～二！！"
16009-2600 = "唔哦～連這種東西都要給我……！？\n雖，雖然有點感覺到責任感……\n……不對，不過交給我，老師大人！\n就讓你見識吧，三千留忍術……\n其中的真髓！"

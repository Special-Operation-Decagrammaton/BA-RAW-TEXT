[translation]
10086-10 = "Blue Archive."
10086-20 = "Sorasaki Hina. Gehenna's Head Prefect. I-I tried on the dress you picked out, Sensei. How do I look?"
10086-30 = "I can't get myself to calm down while I'm in a dress."
10086-40 = "I want to sit down and practice."
10086-50 = "Look how they shine."
10086-60 = "Phew, I'm a bit tired..."
10086-70 = "As the head prefect, I must remain sharp."
10086-80 = "Hello, Sensei. Is there anything I can help you with?"
10086-90 = "Ah, Sensei. This way. Over here."
10086-100 = "Ah? Huh? I-It's cute?"
10086-110 = "Th-Thank you... Th-That's..."
10086-120 = "This is the dress that you recommended."
10086-130 = "It's really pretty, but it probably doesn't suit—"
10086-140 = "...Huh? It looks great on me?"
10086-150 = "Wh-What are you saying, Sensei?!"
10086-160 = "I've been practicing piano a lot lately."
10086-170 = "It's been a while since I focused on anything besides my Prefect Team duties. It feels...refreshing."
10086-180 = "Something about this dress makes me want to sit up straight."
10086-190 = "My heart's pounding more than usual. I wonder if that's why?"
10086-200 = "Even in a dress, It's still me. I will continue to serve at your side, Sensei."
10086-210 = "So... Don't run away."
10086-220 = "\"Hina's strict, but she's still cute,\" you say?"
10086-230 = "Ugh. Really. Wh-Wh-What are you even saying?"
10086-240 = "...I mean, I'm happy. But s-still... Really."
10086-250 = "Happy birthday, Sensei."
10086-260 = "I... There is a song I've been practicing today. If it's all right...could you take a listen?"
10086-270 = "You actually were going to ask me to play it yourself, you say?"
10086-280 = "It-It's not that special or any—No."
10086-290 = "I prepared this song for you. So I shall perform it to the best of my abilities."
10086-300 = "Ah, today is my birthday. That's right."
10086-310 = "Thank you for remembering, Sensei."
10086-320 = "Something that I want? Well..."
10086-330 = "It's enough to have you here, Sensei..."
10086-340 = "I'm truly grateful, Sensei."
10086-350 = "The sun rises once again. Happy New Year, Sensei."
10086-360 = "I guess this is the start of yet another year with you."
10086-370 = "Heehee. It's quite a pleasant thought for me."
10086-380 = "Merry Christmas, Sensei."
10086-390 = "On a day like this, I'm sure I wouldn't look out of place even in a dress like this, right?"
10086-400 = "Huh? Let's go somewhere that matches my dress?"
10086-410 = "W-Wait, Sensei... H-Hold on!"
10086-420 = "It's Halloween. Trick or treat."
10086-430 = "Just for today, I have permission to play tricks on you, right?"
10086-450 = "Starting now...I'll play for you."
10086-460 = "N-No. That was... It wasn't just the two of us then..."
10086-470 = "The...reason I kept practicing was..."
10086-480 = "So I could play for you..."
10086-490 = "If I quit before you heard my song...I don't think I could forgive myself."
10086-500 = "H-Huh? I mean, it—it's not that serious..."
10086-510 = "And if your expectations are too high...I might struggle to get through it."
10086-520 = "Uh... O-Okay..."
10086-530 = "Yeah... This is the way you've always been."
10086-540 = "Okay... Please, listen closely."
10086-550 = "...This is my encore performance. Just for you."
10086-2600 = "For me? Thank you, Sensei. You always talk to me about trust. I want to return that feeling. So please, listen until the very end."

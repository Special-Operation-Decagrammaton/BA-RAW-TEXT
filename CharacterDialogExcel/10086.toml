[translation]
10086-10 = "蔚藍檔案。"
10086-20 = "格黑娜學園所屬，風紀委員長空崎陽奈。\n那個……我試著穿了老師為我挑的禮服。\n適合我嗎……？"
10086-30 = "穿著禮服，有點\n靜不下來……"
10086-40 = "想找個地方坐著\n練習一下……"
10086-50 = "全都在閃閃發亮。"
10086-60 = "呼，總覺得\n有點累……"
10086-70 = "身為風紀委員長，\n得打起精神來才行。"
10086-80 = "歡迎你，老師。\n有什麼我能\n幫上忙的嗎？"
10086-90 = "啊，老師。\n這裡，這裡唷。"
10086-100 = "咦？嗯？\n可，可愛？"
10086-110 = "謝，謝謝……\n那，那個……"
10086-120 = "這套，禮服……\n是老師為我挑的呢。"
10086-130 = "……雖然非常漂亮，\n但果然對我還是……"
10086-140 = "……咦？\n你說很適合我……？"
10086-150 = "你，你在說什麼啊，\n老師……！？"
10086-160 = "我最近在練習鋼琴。"
10086-170 = "因為很久沒投入風紀\n委員業務以外的事物，\n感覺好像有點新鮮。"
10086-180 = "穿上禮服後，\n會稍微比較筆挺。"
10086-190 = "可能因為是這樣，\n稍微比平常更怦然心動。"
10086-200 = "就算穿著禮服，我還是我。\n今天也會在身邊\n協助老師的工作。"
10086-210 = "所以……\n不可以逃跑唷。"
10086-220 = "「雖然嚴厲，但陽奈\n　果然很可愛」……"
10086-230 = "唔，真是的，\n你，你，你\n在說什麼啊。"
10086-240 = "……雖然我很高興，\n可，可是……真是的。"
10086-250 = "生日快樂，老師。"
10086-260 = "那個……\n我為今天練了一首曲子。\n可以的話……願意聽聽嗎？"
10086-270 = "……你說反而\n是你想拜託我？"
10086-280 = "其，其實也不是什麼\n值得那麼做的……不。"
10086-290 = "這是為你準備的曲子。\n我，會盡全力演奏。"
10086-300 = "啊，今天是我的生日，是嗎。\n這麼說來，確實如此。"
10086-310 = "謝謝你為我祝福。\n老師。"
10086-320 = "想要的東西？\n這個嘛……"
10086-330 = "老師願意這樣過來\n就已經心滿意足了……吧。"
10086-340 = "一直以來謝謝你，老師。"
10086-350 = "又到新年了呢。\n祝你新年快樂，老師。"
10086-360 = "這樣又和你一起\n迎接新的一年了呢。"
10086-370 = "呵呵。這對我來說\n是件非常開心的事。"
10086-380 = "聖誕快樂，老師。"
10086-390 = "像今天這樣的日子，\n就算穿著禮服和你在一起，\n應該也不會突兀吧？"
10086-400 = "咦……？一起去和禮服\n相襯的地方……看看？"
10086-410 = "那，那個，老師……\n等，等等……！？"
10086-420 = "是萬聖節呢。\n不給糖就搗蛋。"
10086-430 = "今天的話，就算\n對你惡作劇……\n也沒關係吧？"
10086-450 = "從現在開始……\n我會為老師演奏。"
10086-460 = "啊，不，那個時候……\n畢，畢竟不是兩人獨處……"
10086-470 = "那個……之所以\n一直練習鋼琴……"
10086-480 = "也是想彈給老師聽……"
10086-490 = "要是就這樣，沒能\n展現出來的話……\n感覺絕對會後悔。"
10086-500 = "呃，嗯？不，\n也，也不是那麼\n厲害的表演哦……"
10086-510 = "那麼期待的話……\n好像有點傷腦筋。"
10086-520 = "啊……\n唔，唔嗯……"
10086-530 = "沒錯……你，\n一直都是那樣的人。"
10086-540 = "嗯……那，\n要仔細聽哦。"
10086-550 = "……獻給你的，我的演奏。"
10086-2600 = "要把這個給我……謝謝你，老師。\n你一直以來對我說的話語、信賴。\n你那耿直的心，我也希望能率直地回應。\n所以，請守望我到最後吧。"

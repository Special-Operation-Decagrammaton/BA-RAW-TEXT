[translation]
10086-10 = "Blue Archive"
10086-20 = "ประธานกรรมการโซระซากิ ฮินะ สังกัดสถาบันเกเฮนน่า\nคือว่า... ฉันลองใส่ชุดเดรสที่คุณครูเลือกให้แล้ว\nแต่ว่ามัน... เข้ากับฉันมั้ยนะ?"
10086-30 = "พออยู่ในชุดเดรส\nก็ใจไม่ค่อยสงบเลย..."
10086-40 = "ฉันอยากไปหาที่นั่ง\nแล้วก็ฝึกซ้อมจัง..."
10086-50 = "ทุกคนสวยสง่ากันมากเลย"
10086-60 = "ฮู่ว มิน่าล่ะ\nถึงได้เหนื่อยๆ..."
10086-70 = "ในฐานะประธานกรรมการ\nฉันต้องตั้งสติให้ดีๆ แล้ว"
10086-80 = "เข้ามาสิ คุณครู\nมีเรื่องอะไรให้ฉันช่วยมั้ย?"
10086-90 = "อ๊ะ คุณครู\nตรงนี้ ฉันอยู่นี่"
10086-100 = "เอะ? เอ๋?\nฉะ... ฉันน่ารักเหรอ?"
10086-110 = "ขะ... ขอบคุณนะ\nคะ... คือว่า..."
10086-120 = "ชะ... ชุดนี้...\nเป็นชุดที่คุณครู\nเลือกให้"
10086-130 = "มันสวยมากเลยนะ\nแต่สำหรับฉันแล้วมัน..."
10086-140 = "หืม...?\nเหมาะกับฉันงั้นเหรอ?"
10086-150 = "พะ... พูดอะไร\nของคุณครูน่ะ...?!"
10086-160 = "ช่วงนี้ฉันพยายาม\nซ้อมเปียโนอยู่"
10086-170 = "นานแล้วที่ฉันไม่ได้จดจ่อกับงานอื่น\nที่ไม่ใช่ของคณะกรรมการวินัยแบบนี้\nรู้สึก... แปลกใหม่ดีนะ"
10086-180 = "พอได้ใส่ชุดเดรส\nฉันก็รู้สึกต้องมั่นใจขึ้น"
10086-190 = "เพราะแบบนี้รึเปล่านะ\nฉันก็เลยตื่นเต้น\nมากกว่าปกตินิดหน่อย"
10086-200 = "ถึงจะใส่ชุดเดรส แต่ฉันก็เป็นฉัน\nวันนี้ฉันก็จะซัพพอร์ต\nงานของคุณครูอยู่ข้างๆ"
10086-210 = "เพราะงั้น...\nห้ามหนีกันไปไหนนะ"
10086-220 = "<ถึงจะเข้มงวด แต่ฮินะก็น่ารักอยู่ดี>\nงั้นเหรอ..."
10086-230 = "อึก จริงๆ เลย\nพะ... พะ... พูดอะไร\nออกมาเนี่ยคุณ"
10086-240 = "มันก็... น่าดีใจอยู่หรอก\nตะ... แต่... จริงๆ เลย..."
10086-250 = "สุขสันต์วันเกิดนะ คุณครู"
10086-260 = "คือว่า...\nฉันมีเพลงที่ฝึกมาสำหรับวันนี้\nถ้าไม่ติดอะไร... ก็มาฟังดูมั้ย?"
10086-270 = "คุณครูมีบางอย่างที่...\nอยากขอร้องมากกว่างั้นเหรอ?"
10086-280 = "มะ... มันไม่ใช่เรื่องที่\nต้องพูดถึงขนาดนั้นหรอก..."
10086-290 = "นี่เป็นเพลงที่ฉันเตรียมมาเพื่อคุณ\nเพราะงั้น ฉันจะเล่นให้เต็มที่เลย"
10086-300 = "วันนี้เป็นวันเกิดฉันสินะ\nจะว่าไปก็เป็นอย่างนั้น"
10086-310 = "ขอบคุณที่มาอวยพรนะ\nคุณครู"
10086-320 = "ของที่อยากได้น่ะเหรอ?\nไม่รู้สิ..."
10086-330 = "แค่คุณครูมาอวยพร\nให้ฉันแบบนี้\nก็... เพียงพอแล้ว"
10086-340 = "ฉันรู้สึกขอบคุณคุณครูตลอดเลยนะ"
10086-350 = "ปีใหม่อีกแล้วเหรอ\nสวัสดีปีใหม่นะ\nคุณครู"
10086-360 = "ฉันได้มีปีใหม่แบบนี้\nไปพร้อมกับคุณสินะ"
10086-370 = "ฮุฮุ สำหรับฉันแล้ว\nเป็นเรื่องที่น่ายินดีมากเลยละ"
10086-380 = "เมอร์รีคริสต์มาสนะ\nคุณครู"
10086-390 = "ในวันแบบนี้ ต่อให้ฉัน\nใส่ชุดเดรสอยู่กับคุณ\nก็ไม่ได้ดูแปลกใช่มั้ย?"
10086-400 = "หืม...?\nชวนไปที่ที่...\nเหมาะกับชุดเดรสเหรอ?"
10086-410 = "ดะ... เดี๋ยวก่อน คุณครู...\nดะ... เดี๋ยวสิ...?!"
10086-420 = "ฮาโลวีนแล้วสินะ\nทริก ออร์ ทรีต?"
10086-430 = "วันนี้ต่อให้ฉัน\nแกล้งคุณเล่น...\nก็ไม่เป็นไรใช่มั้ย?"
10086-450 = "จากนี้ไป...\nฉันจะเล่นดนตรีเพื่อคุณครู"
10086-460 = "อ่า... ไม่หรอก ก็ตอนนั้น...\nระ... เราไม่ได้อยู่กัน\nแค่สองคนนี่นา"
10086-470 = "ที่ฉัน... ฝึกซ้อม\nเปียโนอยู่เรื่อยๆ..."
10086-480 = "ก็เพื่อจะเล่นให้คุณครูฟัง..."
10086-490 = "เพราะถ้าไม่ได้เล่นให้ฟัง...\nฉันก็คงเสียดายแน่ๆ"
10086-500 = "หะ... หืม?\nมะ... ไม่หรอก ฉันไม่ได้\nจะเล่นใหญ่ขนาดนั้นสักหน่อย"
10086-510 = "ถ้าคาดหวังขนาดนั้นละก็...\nฉันก็ลำบากใจนะ"
10086-520 = "อ่า...\nอะ... อื้ม..."
10086-530 = "ก็ได้...\nคุณน่ะ... ก็เป็นแบบนั้นตลอด"
10086-540 = "อืม...\nถ้างั้นก็ตั้งใจฟังนะ"
10086-550 = "บทเพลงจากฉัน...\nที่เล่นเพื่อคุณเท่านั้น"
10086-2600 = "อันนี้ให้ฉันเหรอ... ขอบคุณนะคุณครู\nคำว่าเชื่อใจที่คุณบอกฉันตลอด\nฉันก็อยากตอบจิตใจที่ซื่อตรงนั้น\nอย่างซื่อตรง เพราะงั้นก็ช่วยดู\nจนจบเลยนะ"

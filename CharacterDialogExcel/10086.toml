[translation]
10086-10 = "블루 아카이브."
10086-20 = "게헨나 학원 소속, 선도부장 소라사키 히나.\n그…… 선생님이 골라준 드레스를 입어, 봤는데.어울리, 려나……?"
10086-30 = "드레스 차림이면,\n진정이 되질 않네……"
10086-40 = "어딘가 앉아서,\n연습해 두고\n싶은 참인데……"
10086-50 = "모두 반짝이고 있구나."
10086-60 = "후우,\n어쩐지 조금 지쳤어……"
10086-70 = "선도부장으로서,\n정신 똑바로 차려야겠지."
10086-80 = "어서 와. 선생님.\n뭔가 도와줄 일이\n있을까?"
10086-90 = "아, 선생님.\n여기. 여기야."
10086-100 = "어? 응?\n귀, 귀엽다고?"
10086-110 = "고, 고마워……\n그, 그게……"
10086-120 = "이, 드레스…\n선생님이 골라준\n물건이었지."
10086-130 = "……굉장히 예쁘지만,\n역시 나에게는……"
10086-140 = "……어?\n잘 어울린……다고?"
10086-150 = "무, 무슨 소리를 하는 거야.\n선생님……?!"
10086-160 = "최근엔 피아노 연습에\n힘쓰고 있어."
10086-170 = "오랜만에 선도부 업무\n이외에 몰두하고 있어서,\n좀 신선한 기분이야."
10086-180 = "드레스를 입으면,\n조금 등을 펴게 돼."
10086-190 = "그래서일까,\n평소보다 좀 더,\n두근거려."
10086-200 = "드레스를 입어도, 나는 나.\n오늘도 선생님의 일을,\n옆에서 서포트할게."
10086-210 = "그러니……\n도망가면 안 돼."
10086-220 = "<엄하지만 그래도 역시\n히나는 귀엽다>라니…"
10086-230 = "읏, 정말,\n무, 무, 무슨 소리를\n하는 거야. 당신은."
10086-240 = "……그야, 기쁘긴 하지만,\n그, 그래도… 아이, 참."
10086-250 = "생일 축하해. 선생님."
10086-260 = "그……\n오늘을 위해 연습한 곡이 있어.\n괜찮다면…… 들어줄래?"
10086-270 = "……오히려 자기가\n부탁하고 싶을 정도, 라니."
10086-280 = "그, 그렇게까지\n말할만한 건…… 아니."
10086-290 = "당신을 위해 준비한 곡이니까.\n나, 전력을 다해 연주할게."
10086-300 = "아, 오늘은 내 생일, 이구나.\n그러고 보면 그랬, 었지."
10086-310 = "축하해줘서, 고마워.\n선생님."
10086-320 = "갖고 싶은 거?\n글쎄…"
10086-330 = "선생님이 이렇게\n와주는 것만으로도\n충분…한데."
10086-340 = "항상 고마워. 선생님."
10086-350 = "또 해가 밝았네.\n새해 복 많이 받아.\n선생님."
10086-360 = "이렇게 새로운 해를\n당신과 쌓아가는 거네."
10086-370 = "후후. 나에게는\n무척 기쁜 일이야."
10086-380 = "메리 크리스마스.\n선생님."
10086-390 = "오늘 같은 날엔 드레스 차림으로\n당신과 함께 있어도,\n별나게 보이진 않겠지?"
10086-400 = "어…?\n드레스에 어울리는 장소로…\n가보자고?"
10086-410 = "저, 저기, 선생님……\n자, 잠깐……?!"
10086-420 = "할로윈이네,\n트릭 오어 트릿."
10086-430 = "오늘만큼은,\n당신에게 장난을 쳐도……\n괜찮지?"
10086-450 = "지금부터……\n선생님을 위해 연주할게."
10086-460 = "아, 아니. 그때는……\n두, 둘만 있던 게,\n아니었으니까…… "
10086-470 = "그…… 피아노를\n계속 연습했던 건……"
10086-480 = "선생님에게\n들려주기 위해서……"
10086-490 = "이대로, 들려주지 못하면……\n분명 후회할 것 같았으니까."
10086-500 = "으, 응?\n아니, 그, 그렇게\n대단한 건 아니, 야……"
10086-510 = "그런 식으로 기대하면……\n좀 곤란할지도."
10086-520 = "아……\n으, 으응……"
10086-530 = "그래……\n당신은, 늘 그랬지."
10086-540 = "응……\n그럼, 제대로 들어줘."
10086-550 = "……당신에게 전하는,\n나만의 연주를."
10086-2600 = "이것을, 내게… 고마워. 선생님.\n언제나 당신이 내게 주는 말, 신뢰.\n그 올곧은 마음에, 나도 올곧게 답하고 싶어. 그러니까 부디, 마지막까지 지켜봐 줘."

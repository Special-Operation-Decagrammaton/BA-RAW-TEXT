[translation]
13002-20 = "อาคาริจากชมรมชิมอาหารค่ะ\nตั้งแต่นี้ไป...\nจะไปกินของอร่อยๆ กับฉันไหมคะ?"
13002-30 = "อืม... ไม่มีของกินอยู่เลยหรือไงน้า"
13002-40 = "อืม... ไม่ว่าจะดูยังไง...\nรอบๆ ตัวคุณครูก็มี\nแต่เด็กผู้หญิงเยอะเกินไปนะ..."
13002-50 = "ฮุฮุฮุฮิ..."
13002-60 = "วันนี้พวกเรา~\nก็จะไปกินของอร่อยๆ\nด้วยกันค่ะ!"
13002-70 = "ว้าว! เมนูวันนี้\nคือสเต๊กล่ะ!\nรีบไปที่โรงอาหารกันเถอะค่ะ!"
13002-80 = "วันนี้เป็นวันที่ดีจังเลยค่ะ คุณครู"
13002-90 = "วันนี้จะไปกินอะไรเหรอคะ?"
13002-100 = "ฮุฮุ อรุณสวัสดิ์ค่ะ"
13002-110 = "ขนมที่วางอยู่ตรงนี้หายไปไหน\nหมดงั้นเหรอคะ?"
13002-120 = "อืม... ฉันก็ไม่รู้เหมือนกันค่ะ"
13002-130 = "คุณครู... ฮุฮุฮุ\nแค่คิดก็สนุกแล้วล่ะ"
13002-140 = "มีงานอะไรจะให้ฉันทำรึเปล่าคะ?"
13002-150 = "แค่บอกว่ากินเยอะเฉยๆ\nจะเรียกว่านักชิมไม่ได้หรอกนะคะ"
13002-160 = "ฉันเป็นนักชิม ที่กินของอร่อยๆ\n\"เยอะๆ\" ต่างหากล่ะคะ"
13002-170 = "ไดเอต..."
13002-180 = "นั่นสิคะ ฉันเป็นพวกที่\nถึงจะกินมากแค่ไหน\nน้ำหนักก็ไม่ขึ้นเลยค่ะ~"
13002-190 = "สุขสันต์วันเกิดค่ะ คุณครู"
13002-200 = "วันนี้ฉันจะยอม\nพับแขนเสื้อขึ้นเป็นพิเศษ\nเพื่อทำอาหารเลยค่ะ!"
13002-210 = "ขอบคุณที่อวยพรวันเกิดให้ฉันค่ะ"
13002-220 = "คุณครูจะซื้อเค้กให้เหรอคะ?"
13002-230 = "ฮิฮิ ถ้าฉันจะขอเบิ้ลจำนวนเค้ก\nนิดหน่อย... จะได้ไหมคะ?"
13002-240 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ~"
13002-250 = "ปีใหม่ปีนี้ ก็ขอให้เป็น\nปีที่ได้กินเยอะๆ อีกนะคะ~"
13002-260 = "เมอร์รี คริสต์มาส~"
13002-270 = "คุณครูคะ~ มาเร็วๆ สิคะ~\nมีไก่งวงอบกับเค้ก แล้วก็\nของอร่อยๆ อีกเยอะ รออยู่นะคะ"
13002-280 = "ถ้าคุณครูไม่ให้ลูกกวาดฉันล่ะก็\nฉันจะหลอกคุณครูให้ดูเลย"
13002-290 = "อืม... ถึงจะได้ลูกกวาดมาแล้ว\nแต่จู่ๆ ก็อยากแกล้งคุณครูขึ้นมา\nทำยังไงดีคะ?"
13002-310 = "อื้ม! อร่อยจังเลย~!"
13002-320 = "ถ้าเป็นซูชิแบบนี้ละก็\nไม่ว่าเมื่อไรฉันก็กินได้ค่ะ"
13002-330 = "ฉันกินซูชินี่ไปกี่ชิ้นแล้ว\nน่ะเหรอคะ?"
13002-340 = "คุณครูจำซูชิทุกชิ้นไป\nจนถึงตอนนี้ได้ทั้งหมด\nหรือเปล่าคะ?"
13002-350 = "ฉันคิดว่าฉันกินไปได้\nประมาณร้อยจานแล้ว..."
13002-360 = "แต่นับว่ากินน้อยกว่า\nปกตินะคะ"
13002-370 = "นี่ยังไม่ได้ครึ่งกระเพาะ\nของฉันเลยค่ะ!"
13002-380 = "คุณครูแน่ใจนะคะว่าจะ\nไม่ว่าอะไรถ้าฉันกินอีก?"
13002-390 = "คุณครูเหงื่อไหลไม่หยุดเลย\nฉันเห็นเหงื่อหยดมาที่\nหน้าผากของคุณครูนะคะ!"
13002-400 = "อ่า~ ข้าวปั้นในจานสีทองนี่\nจะมีรสชาติแบบไหนกันน้า~"
13002-410 = "คุณครูแน่ใจนะคะ\nว่าไม่เป็นอะไร?"
13002-420 = "ถ้าคุณครูไม่ว่าอะไร\nฉันจะกินซูชิ 1,000 เยนนี่นะคะ"
13002-2600 = "ถ้าตัดสินแพ้ชนะกัน\nในงานแข่งกินจุได้ก็คงดีแท้ๆ...\nถึงฉันจะไม่ชอบใช้กำลังแก้ปัญหาก็เถอะ\nฉันเองก็เตรียมพร้อมแล้วค่ะ!"

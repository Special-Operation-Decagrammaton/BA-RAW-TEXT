[translation]
13002-20 = "I'm Akari of the Gourmet Research Society. Shall we find something delicious to try together?"
13002-30 = "Hmm. Where would be good to eat?"
13002-40 = "Hmm. No matter how I look at it, you're always surrounded by too many girls."
13002-50 = "Heeheehee..."
13002-60 = "Let's all go out and eat something delicious together!"
13002-70 = "Wow! Steak is on today's menu! Let's go to the dining hall!"
13002-80 = "Good day, Sensei."
13002-90 = "What kind of food should we try today?"
13002-100 = "Heehee. Good morning."
13002-110 = "You're asking me where the cookies went?"
13002-120 = "My, I have no clue at all!"
13002-130 = "Isn't daydreaming fun, Sensei? Heehee."
13002-140 = "Is there anything you want me to do?"
13002-150 = "I may eat a lot, but I'm still a gourmet."
13002-160 = "I'm simply a gourmet that enjoys eating a lot of gourmet food."
13002-170 = "A diet...?"
13002-180 = "I don't know. I never gain weight no matter how much I eat!"
13002-190 = "Happy birthday, Sensei."
13002-200 = "Today is your special day, so it'd be my pleasure to make you something special."
13002-210 = "Thank you for the birthday wishes."
13002-220 = "You'd like to buy me cake?"
13002-230 = "Hmm. How many cakes should I have? The same number as my age?"
13002-240 = "Happy New Year!"
13002-250 = "I hope you get to eat all the food in the world this year!"
13002-260 = "Merry Christmas!"
13002-270 = "Sensei! Hurry up! There's turkey, cake, and so many other dishes waiting!"
13002-280 = "If you don't give me treats, I'll pull a trick."
13002-290 = "Hmm. What should I do if I want to play my tricks and eat the treats too?"
13002-310 = "Mmm. Delicious!"
13002-320 = "I could eat this sushi every day!"
13002-330 = "How much sushi have I eaten so far?"
13002-340 = "Sensei, do you remember how many pieces of sushi you've eaten in your life?"
13002-350 = "I think I've had about a hundred plates..."
13002-360 = "But I've been eating less than usual."
13002-370 = "I'm not even half-full yet!"
13002-380 = "Are you sure you don't mind if I eat more?"
13002-390 = "You've been sweating. I see beads of sweat dripping down your forehead!"
13002-400 = "Ooh... I wonder what the sushi on this golden plate would taste like!"
13002-410 = "Sensei, are you sure you're okay?"
13002-420 = "I'm gonna eat this 1,000-yen sushi if that's okay with you!"
13002-2600 = "It'd be nice if everyone could just settle their scores with eating contests. Doing it through strength isn't ideal, but I'm ready nonetheless."

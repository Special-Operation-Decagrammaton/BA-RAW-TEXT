[translation]
13002-20 = "我是美食研究會的亞伽里。\n今後一起去吃美食吧！"
13002-30 = "唔嗯，哪裡有吃的呢。"
13002-40 = "唔嗯…不管怎麼想…\n老師身邊的\n女孩子都太多了…"
13002-50 = "呵呵呵呵…"
13002-60 = "今天也要和大家一起～\n去吃美食！"
13002-70 = "哇～\n聽說今天的餐點是牛排！\n趕快去餐廳吧！"
13002-80 = "你好，老師。"
13002-90 = "今天要去吃什麼樣的料理呢？"
13002-100 = "呵呵。你好。"
13002-110 = "剛才放在這裡的點心？"
13002-120 = "唔嗯，我不知道～"
13002-130 = "老師……呵呵呵。\n光是想像就很開心呢。"
13002-140 = "有什麼需要幫忙的嗎？"
13002-150 = "就算吃得很多，\n也不代表不是美食家。"
13002-160 = "我是吃「很多」\n美食的美食家。"
13002-170 = "減肥嗎……"
13002-180 = "這個嘛。我是吃再多\n也不會胖的體質～"
13002-190 = "祝你生日快樂，老師。"
13002-200 = "今天就特別\n由我捲起袖子\n來做料理吧。"
13002-210 = "你能為我祝福，\n真的非常感謝。"
13002-220 = "要請我吃蛋糕是嗎？"
13002-230 = "嘿……\n吃幾十個也可以嗎？"
13002-240 = "新年快樂～"
13002-250 = "今年也是可以\n吃很多的一年就好了呢～"
13002-260 = "聖誕快樂～"
13002-270 = "老師～快一點～\n火雞、蛋糕，\n還有很多料理在等我們呢～"
13002-280 = "不給糖果\n就要搗蛋了唷～"
13002-290 = "唔嗯……我想要糖果\n也想要搗蛋，該怎麼辦呢？"
13002-310 = "嗯嗯，好吃～！"
13002-320 = "這麼美味的壽司，\n要我吃多少都行！"
13002-330 = "你問我在這期間\n吃了幾個壽司嗎？"
13002-340 = "呵呵，老師，\n你會記得你目前為止\n吃過多少壽司嗎？\n…開玩笑的。"
13002-350 = "唔──嗯，\n大概100盤吧…"
13002-360 = "但是，跟平時比起來\n我已經吃得算少了。"
13002-370 = "我現在連五分飽\n都還不到呢！"
13002-380 = "真的可以讓我繼續吃嗎？"
13002-390 = "老師的額頭\n從剛剛就一直\n在冒冷汗耶？"
13002-400 = "啊，這個金色盤子\n上的壽司，\n肯定很好吃吧～"
13002-410 = "老師，\n我可以吃這個嗎？"
13002-420 = "我要吃掉這個\n一盤1000元的壽司囉？"
13002-2600 = "如果大家能用大胃王比賽\n來決定勝負的話就好了。\n雖然我不喜歡用力量解決問題，\n不過這樣我也準備好了！"

[translation]
13002-20 = "미식연구회의 아카리예요.\n지금부터 같이 맛있는 걸\n먹으러 갈까요?"
13002-30 = "흐음, 어디 먹을 게 없을까요."
13002-40 = "흐음… 아무리 생각해도…\n선생님 주변에\n여자애들이 너무 많아…"
13002-50 = "후후후후…."
13002-60 = "오늘도 모두와 함께~\n맛있는 걸 먹으러\n가는 거에요!"
13002-70 = "와아! 오늘 메뉴는\n스테이크래요!\n어서 식당으로 가요!"
13002-80 = "좋은 하루 입니다. 선생님."
13002-90 = "오늘은 어떤 요리를 먹으러 갈까요?"
13002-100 = "후훗. 좋은 아침이에요."
13002-110 = "여기 있던 과자 어디갔냐고요?"
13002-120 = "응, 잘 모르겠는데요~"
13002-130 = "선생님을…. 후후후.\n상상만으로도 즐겁네요."
13002-140 = "시키실 일이 있으신가요?"
13002-150 = "많이 먹는다고,\n미식가가 아닌 것은 아니죠."
13002-160 = "저는 맛있는 것을\n'많이' 먹는 미식가니까요."
13002-170 = "다이어트라…"
13002-180 = "글쎄요. 저는 아무리\n먹어도 안 찌는 체질이라~"
13002-190 = "생일 축하해요. 선생님."
13002-200 = "오늘만큼은 특별히,\n제가 팔을 걷어붙여\n요리하도록 하죠."
13002-210 = "생일 축하해 주셔서, 감사해요."
13002-220 = "케이크를 사주신다고요?"
13002-230 = "헤에…. 두 자리수 정도는\n먹어도 괜찮은 걸까요?"
13002-240 = "새해 복 많이 받으세요~"
13002-250 = "올해도 많이 먹는\n새해 되시길 바라요~"
13002-260 = "메리 크리스마스~"
13002-270 = "선생님~ 서둘러요~\n칠면조랑 케이크랑 수많은\n요리들이 기다리고 있다고요~"
13002-280 = "사탕을 주지 않으면\n장난을 칠 거에요."
13002-290 = "흐음… 사탕도 받고\n장난도 치고 싶은데 어떡하죠?"
13002-310 = "으음, 맛있어~!"
13002-320 = "이런 초밥이라면 얼마든지\n먹을 수 있겠어요!"
13002-330 = "그 사이에 몇 개의\n초밥을 먹은 거냐고요?"
13002-340 = "후후, 선생님은 이제까지\n먹은 초밥의 개수를\n일일이 기억하시나요?"
13002-350 = "대략 100 접시 정도려나…."
13002-360 = "그래도 평소에 비하면\n소식하는 편이에요."
13002-370 = "아직 배가 반도\n차지 않았는 걸요!"
13002-380 = "정말 더 먹어도 괜찮으시겠어요? "
13002-390 = "아까 전부터 선생님의\n이마에서 식은땀이\n흘러내리고 있는데요?"
13002-400 = "아아~ 이 황금색 접시에\n담긴 초밥은 어떤 맛이 나려나~"
13002-410 = "선생님,\n정말로 괜찮으시겠어요?"
13002-420 = "여기 1000엔 짜리 초밥,\n먹어버릴 거라구요?"
13002-2600 = "모두가 많이 먹기 대회로\n승부를 정하면 좋을 텐데…\n힘으로 해결하고 싶지는 않았지만\n저도 이걸로, 준비 완료예요!"

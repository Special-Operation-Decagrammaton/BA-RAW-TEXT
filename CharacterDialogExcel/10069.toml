[translation]
10069-10 = "Blue Archive"
10069-20 = "My name is Akeshiro Rumi. I am president of Shanhaijing Academy's Black Tortoise Promenade. You can call me Rumi."
10069-30 = "The decor here... I wonder how it would look at the Promenade?"
10069-40 = "The snacks here too... We could learn from this."
10069-50 = "It's been too long since I've relaxed like this..."
10069-60 = "Let's hope our Genryumon friends don't try to pick a fight with me."
10069-70 = "So peaceful... Yes, this is nice."
10069-80 = "Oh, Sensei. There you are."
10069-90 = "I thought you forgot about us. Haha."
10069-100 = "Hello, Sensei."
10069-110 = "Making the president of the Black Tortoise Promenade wait... How bold of you."
10069-120 = "This is Schale... Ah, sorry."
10069-130 = "I rarely spent so much time away from the kitchen. It's not what I expected."
10069-140 = "To a chef, the kitchen is a battlefield..."
10069-150 = "Does that mean this is Sensei's battlefield?"
10069-160 = "Sure you have something I can use to cook here..."
10069-170 = "I was thinking about making something."
10069-180 = "Food is important, isn't it, Sensei?"
10069-190 = "Don't skip meals, and don't eat just anything. Got it?"
10069-200 = "The reason I like cooking? Well... Cooking is always honest."
10069-210 = "The more effort you put in, the better it tastes. The more you study, the more opportunities open up."
10069-220 = "In a way... It's like you, Sensei."
10069-230 = "I remembered, Sensei. It's your birthday, right?"
10069-240 = "That's why I made some long noodles for you. I also have some peaches for dessert. Make sure you eat everything!"
10069-250 = "My birthday...? Thanks, Sensei."
10069-260 = "It's been a while since I celebrated it with anyone..."
10069-270 = "When you're the merchant guild president, it's easy to lose track of the days."
10069-280 = "Happy New Year. I'll be counting on you this year too."
10069-290 = "New Year means it's time for jiaozi dumplings! And kagami mochi! And steamed fish and rice cake soup and..."
10069-300 = "Huh? You think that your stomach will burst if you eat all that...?"
10069-310 = "Christmas... It's not a holiday that's very familiar to me, but I enjoy the atmosphere."
10069-320 = "Today, I plan to make some tanghulu. What do you think?"
10069-330 = "Halloween... I'm not quite used to it, but I do know what it is."
10069-340 = "Let's see... Should I try making some pumpkin mooncakes?"
10069-360 = "Aaah... Look at that. It got a little...see-through."
10069-370 = "Oh, don't worry about it. A little steam won't kill me."
10069-380 = "...If I knew this was going to happen, I would have worn cuter underwear."
10069-390 = "It's a real shame, you know?"
10069-400 = "Haha! You don't have to look away. I don't mind at all."
10069-410 = "I didn't know there was such a side to you, Sensei... Haha! I like it!"
10069-420 = "It's not like this happens very often, so...shall I make you even more uncomfortable...?"
10069-2600 = "It's important to use weapons that fit well in your hands, whether on the battlefield or in the kitchen."

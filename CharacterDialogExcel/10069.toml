[translation]
10069-10 = "블루 아카이브"
10069-20 = "내 이름은 아케시로 루미. \n산해경 고급 중학교 현무상회에서 회장을 하고 있어.\n편하게 루미라고 불러줘."
10069-30 = "이곳의 인테리어…\n우리 상회에도\n활용해 볼까?"
10069-40 = "여기의 다과도,\n참고가 많이 되네."
10069-50 = "이렇게 한가롭게\n시간을 보낸 게,\n얼마 만이었더라…"
10069-60 = "여기서 현룡문 애들하고\n싸우는 것만은,\n봐줬으면 좋겠네."
10069-70 = "평화롭구나…\n응, 좋은 일이야."
10069-80 = "뭐야, 선생님이구나."
10069-90 = "여기 오는 걸\n잊어버린 줄 알았어. 하하."
10069-100 = "어서 와, 선생님."
10069-110 = "현무상회의 회장을\n기다리게 하다니,\n배짱 좋은걸?"
10069-120 = "여기가 샬레…\n아아, 미안. "
10069-130 = "주방 밖에 나온 건\n오랜만이라서.\n좀 놀랐네."
10069-140 = "요리사에게\n주방은 전쟁터…"
10069-150 = "그렇다면 이곳은\n선생님의 전쟁터, 인가."
10069-160 = "여기, 간단한\n조리기구 정도는 있겠지?"
10069-170 = "아니, 뭐 좀 만들까 해서."
10069-180 = "밥은 중요하다고? 선생님."
10069-190 = "거르지 말 것,\n적당히 때우지 말 것.\n알았지?"
10069-200 = "요리를 좋아하는 이유?\n으음… 요리는 솔직해서, 일까."
10069-210 = "수고를 들인 만큼\n맛있어지고, 연구한 만큼\n가능성이 생기지."
10069-220 = "선생님이랑…\n조금 비슷한 거\n같기도 하네."
10069-230 = "하하, 기억하고 있어,\n오늘 선생님 생일이지?"
10069-240 = "그래서, 장수면을 만들었어.\n디저트로 복숭아도 있고.\n끝까지 열심히 먹어야 해?"
10069-250 = "내 생일…?\n고마워 선생님."
10069-260 = "다른 사람한테\n축하받는 건 오랜만이네."
10069-270 = "상인회장을 하다 보면,\n날짜 감각이\n없어지는 경우가 많아서."
10069-280 = "새해 복 많이 받아!\n올해도 잘 부탁해!"
10069-290 = "새해라면 챠오즈지!\n여기 거울떡과 생선조림,\n떡국도 준비되어 있어.\n그리고…"
10069-300 = "응?\n다 먹으면 배가\n터질 것 같다고…?"
10069-310 = "크리스마스라…\n그렇게 익숙한 날은 아니지만\n분위기가 있어서 좋은 날이야."
10069-320 = "오늘은 탕후루를\n만들려고 해. 어때?"
10069-330 = "할로윈이라… \n익숙하진 않지만,\n무슨 날인지는 알고 있어."
10069-340 = "자, 호박이 들어간\n월병이라도 만들까?"
10069-360 = "아… 그렇군.\n조금, 비쳐 보이는 건가. "
10069-370 = "뭐, 신경 쓰지 마.\n닳는 것도 아니니."
10069-380 = "…이렇게 될 줄 알았으면,\n더 귀여운 속옷을\n입고 왔을 텐데."
10069-390 = "좀, 아쉬울지도?"
10069-400 = "하핫. 뭘 시선을 돌리고 그래.\n난 전혀 신경 쓰지 않는다고?"
10069-410 = "선생님은 의외로\n그런 구석이 있구나…\n후훗, 마음에 들었어."
10069-420 = "모처럼이니까,\n더 곤란하게 해 버릴까…?"
10069-2600 = "손에 잘 맞는 도구는 중요하지.\n주방용품이든, 총이든 말이야."

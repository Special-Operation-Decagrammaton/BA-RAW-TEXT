[translation]
10069-10 = "Blue Archive"
10069-20 = "ฉันชื่ออาเคชิโระ รูมิ ประธานย่านการค้าเทพเต่าดำ\nโรงเรียมัธยมซานไห่จิง เรียกเป็นกันเองว่ารูมิก็พอ"
10069-30 = "การตกแต่งภายในของที่นี่...\nเราลองปรับใช้กับ\nย่านการค้าของเราดีมั้ย?"
10069-40 = "ของว่างตรงนี้\nก็เอาไว้ศึกษา\nเป็นแนวทางได้เยอะเลย"
10069-50 = "นานแล้วนะที่ไม่ได้\nใช้เวลาว่าง\nอย่างสบายๆ แบบนี้..."
10069-60 = "หวังว่าพวกมังกรดำ\nจะไม่มาหาเรื่องทะเลาะ\nกับฉันที่นี่นะ..."
10069-70 = "สงบดีจัง...\nอืม ช่างเป็นเรื่องราวดีๆ"
10069-80 = "อะไรกัน คุณครูเองเหรอ"
10069-90 = "นึกว่าลืมมาหากันแล้วซะอีก ฮ่าฮ่า"
10069-100 = "เชิญเลยคุณครู"
10069-110 = "ทำให้ประธานย่านการค้า\nเทพเต่าดำรอได้นี่\nใจกล้าไม่เบาเลยนะ?"
10069-120 = "ที่นี่คือชาเล่ต์... อ้าว โทษที "
10069-130 = "ไม่ได้ออกมาจากห้องครัวมานานน่ะ\nก็เลยตกใจนิดหน่อย"
10069-140 = "ห้องครัวก็คือ\nสนามรบสำหรับเชฟ..."
10069-150 = "แล้วที่นี่เป็นสนามรบ\nของคุณครูหรือเปล่านะ"
10069-160 = "ที่นี่น่าจะมีอุปกรณ์\nเครื่องครัวง่ายๆ ที่ใช้\nทำอาหารอยู่ได้ใช่มั้ยนะ...?"
10069-170 = "เปล่า แค่คิดว่าจะ\nทำอะไรสักหน่อยน่ะ"
10069-180 = "เรื่องอาหารการกิน\nเป็นเรื่องสำคัญนะ คุณครู"
10069-190 = "อย่าอดอาหาร อย่ากินแค่แบบผ่านๆ ล่ะ\nเข้าใจหรือเปล่า?"
10069-200 = "เหตุผลที่ชอบทำอาหารเหรอ?\nอืม… คงเพราะการทำอาหาร\nมันตรงไปตรงมาน่ะ"
10069-210 = "ยิ่งเอาใจใส่ก็ยิ่งอร่อยมากขึ้น\nยิ่งศึกษาหาข้อมูล\nมันก็ยิ่งมีความเป็นไปได้"
10069-220 = "มันก็ค่อนข้างจะ...\nแอบๆ คล้ายคุณครูอยู่นะ"
10069-230 = "ฮ่าฮ่า จำได้สิ\nวันนี้วันเกิดครูใช่มั้ยล่ะ?"
10069-240 = "ฉันถึงได้ทำบะหมี่อายุยืนนี่ไง\nมีลูกพีชเป็นของหวานด้วยนะ\nต้องกินให้หมดเลยนะ"
10069-250 = "วันเกิดฉันเหรอ...?\nขอบใจนะคุณครู"
10069-260 = "ไม่ได้รับคำอวยพรจากคนอื่น\nมานานเลยแฮะ"
10069-270 = "พอทำงานเป็นประธานกลุ่มการค้าแล้ว\nฉันมักจะลืมวันเวลาอยู่บ่อยๆ น่ะ"
10069-280 = "สวัสดีปีใหม่!\nปีนี้ก็ฝากตัวด้วยนะ!"
10069-290 = "ปีใหม่ทั้งทีก็ต้องมีเกี๊ยวซ่า!\nแล้วก็คางามิโมจิและปลาผัดเผ็ด\nมีซุปโมจิเตรียมไว้ด้วยนะ\nและก็…"
10069-300 = "หืม? ถ้ากินหมดนี่\nมีหวังท้องแตกแน่เลยงั้นเหรอ…?"
10069-310 = "คริสต์มาสเหรอ...\nถึงจะไม่ใช่วันที่คุ้นเคยขนาดนั้น\nแต่ก็เป็นวันที่บรรยากาศดี"
10069-320 = "วันนี้ว่าจะทำถังหูลู่ละ\nว่าไง?"
10069-330 = "ฮาโลวีนเหรอ...\nถึงจะไม่คุ้นเคย\nแต่ก็รู้หรอกว่าเป็นวันอะไร"
10069-340 = "เอาละ ทำขนมไหว้พระจันทร์\nไส้ฟักทองดีมั้ย?"
10069-360 = "อ่า... ดูสิ ดูเหมือน...\nจะมองทะลุได้เลย"
10069-370 = "เอาเถอะ ไม่ต้องใส่ใจหรอก\nมันไม่ได้สึกหรออะไรนี่นะ"
10069-380 = "ถ้ารู้ว่าจะเป็นแบบนี้\nฉันคงใส่ชุดชั้นในน่ารักๆ\nมาแล้วละ"
10069-390 = "คิดแล้ว...\nมันน่าเสียดายมากเลยว่ามั้ย?"
10069-400 = "ฮ่ะฮ่า ทำไมเบือนหน้าหนีแบบนั้นล่ะ\nฉันไม่ได้คิดอะไรมากสักหน่อย?"
10069-410 = "คุณครูมีมุมแบบนั้นด้วย\nต่างจากที่ฉันคิดไว้เลยแฮะ...\nฮุฮุ โดนใจดีจัง"
10069-420 = "ไม่ใช่เรื่องที่เกิดขึ้นบ่อยๆ นี่นา...\nฉันทำให้คุณครู\nว้าวุ่นใจขึ้นอีกหน่อยดีมั้ยนะ…?"
10069-2600 = "อุปกรณ์ที่เหมาะมือเป็นสิ่งสำคัญเลยนะ\nไม่ว่าจะเป็นอุปกรณ์ เครื่องครัวหรือว่าปืน"

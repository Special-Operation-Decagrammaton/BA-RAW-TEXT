[translation]
10051-10 = "Blue Archive."
10051-20 = "Millennium's Cheer Captain, Shiraishi Utaha. With ice-cold reason or fiery hot passion, I'll never stop cheering for those I care for."
10051-30 = "A space brimming with passion."
10051-40 = "Cheers up high!\nDon't be shy!\nIf we try,\nwe'll reach the sky!"
10051-50 = "I want to play a big game with everyone here..."
10051-60 = "(Heehee, I suddenly have a fun idea for a cheer.)"
10051-70 = "We need more...spirit."
10051-80 = "Welcome, Sensei. If you need support in the form of a cheer burning with unmitigated passion... I'm always ready."
10051-90 = "Sensei, the first step to cheering for others is cheering for yourself!"
10051-100 = "Whether you're healthy or sick, energy is the best medicine."
10051-110 = "Especially if you need to kick-start your creativity."
10051-120 = "Feeling down?\nI see that frown.\nYour mood'll rebound,\njust hear my cheer resound!\n...I'll try again later."
10051-130 = "As long as you're here, Sensei..."
10051-140 = "I feel like I can do anything."
10051-150 = "Being a meister sometimes means\ncheering on for your machines.\nDon't get us wrong,\nwe think on them long,\nbut whatever we make\nmight have a mistake!\n...Maybe our new club motto?"
10051-160 = "I'm glad I get to see this side of you, Sensei."
10051-170 = "What do you think? Do you like it?"
10051-180 = "Oh, Sensei, today's your birthday, right?"
10051-190 = "Today's importance\ncertainly warrants\na special cheer\nonly you can hear!"
10051-200 = "My birthday? Time really flies."
10051-210 = "Thank you, but today doesn't feel particularly special."
10051-220 = "Thanks to you, Sensei,"
10051-230 = "every day feels like a celebration."
10051-240 = "Thank you, Sensei."
10051-250 = "Today's a new year.\nLet's start with a cheer.\nSome energy we'll ignite\nby chanting with might!\n...Wait, should I have created some sort of cheer-amplifying device?"
10051-260 = "Santa is so dedicated. I wonder if he has someone who cheers him on."
10051-270 = "...Perhaps the dreams and wishes of children are the cheers he hears."
10051-280 = "The explosion of certain pumpkin lanterns...of all the pumpkin lanterns in the lounge... Let's just say it wasn't an intentional design choice."
10051-290 = "I just thought that the pumpkin lanterns would sparkle extra bright at 60 frames a second. I was technically correct."
10051-310 = "Millennium! Millennium! Let's go, here we come!"
10051-320 = "Strike 'em hard, strike 'em dumb, let's go, Millennium!"
10051-330 = "Heh heh, what do you think, Sensei? Simply amazing, right?"
10051-340 = "This whole cheer is performed by machines directed by wireless signals."
10051-350 = "Even the most complicated routine can be performed perfectly."
10051-360 = "What? If I'm going to use machines anyway, wouldn't it be easier to just use a digital billboard?"
10051-370 = "Sensei! Please don't squeeze the romance out of performance!"
10051-380 = "Analog panels moving in perfect sync with each other,"
10051-390 = "will give the cheer a sense of emotion and kinetic energy that a digital billboard could never convey."
10051-400 = "Making someone's heart beat faster isn't something to be optimized."
10051-2600 = "Being filled with passion\nis a meister's inspiration!"

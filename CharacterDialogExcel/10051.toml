[translation]
10051-10 = "蔚藍檔案。"
10051-20 = "千年的應援團長，白石詠葉。\n我會用冰冷的理性和炙熱的熱情\n為大家加油。"
10051-30 = "真是個\n充滿熱情的空間。"
10051-40 = "從這裡應援的話，\n聲音會傳到哪兒呢？"
10051-50 = "想在這裡，\n和大家一起\n做團體操…"
10051-60 = "（呵呵，想到了\n　有趣的應援計畫）"
10051-70 = "怎麼會…\n沒什麼幹勁呢。"
10051-80 = "嗨，老師。\n需要應援的話，\n請隨時告訴我。"
10051-90 = "來吧，老師，\n今天也鼓起幹勁，\n充滿活力地開始一天吧！"
10051-100 = "鼓勵他人\n是很重要的。"
10051-110 = "哪怕是為了獲得\n創新的成果。"
10051-120 = "遇到困難了嗎？\n沒關係，\n再試試看吧"
10051-130 = "像這樣\n和老師在一起…"
10051-140 = "感覺什麼事都辦得到。"
10051-150 = "所謂的巨匠，也許就\n像是機器們的應援團長\n一般的存在吧…"
10051-160 = "讓老師看到\n這種面貌也不壞呢。"
10051-170 = "怎麼樣？\n有稍微…感覺到新鮮了嗎？"
10051-180 = "啊啊，今天是\n老師的生日啊。"
10051-190 = "今天一整天，我來當\n老師專屬的應援團長吧。"
10051-200 = "我的生日…？\n已經到這個時候了呀。"
10051-210 = "啊啊，但是\n我沒有什麼特別的感覺。"
10051-220 = "因為老師\n都在為我加油打氣，"
10051-230 = "讓我一整年\n都像在過生日一樣。"
10051-240 = "謝謝你，老師。"
10051-250 = "新年到了呢。\n為了讓大家從新年第一天\n就能打起精神，\n我們來應援合戰吧。"
10051-260 = "聖誕老人很熱情呢。\n有誰也在幫他\n加油打氣嗎？"
10051-270 = "啊啊…孩子們的夢想和希望，\n也許就是熱情的泉源。"
10051-280 = "那個…我不是故意把\n休息室的南瓜燈\n都炸爛的…"
10051-290 = "我只是覺得…南瓜\n以60幀的速度閃爍\n會比較漂亮…"
10051-310 = "加油！加油！\n千年！"
10051-320 = "上吧！上吧！獲勝吧！\n千年！"
10051-330 = "呵呵…怎麼樣，老師？\n不覺得眼前的景象很壯觀嗎？"
10051-340 = "這個團體操，\n使用了搭載\n新型藍牙裝置的機器人，"
10051-350 = "所以不管是多複雜的編舞\n都能完美演繹。"
10051-360 = "…嗯？你說與其\n在表演中使用機器，\n直接設置螢幕\n不是更有效率？"
10051-370 = "老師，\n別說那種\n缺乏浪漫的話。"
10051-380 = "由類比的面板同時運動\n完成的景象，"
10051-390 = "有著螢幕\n無法比擬的\n震撼力與感動唷。"
10051-400 = "歸根究柢，能讓內心\n瞬間激動的浪漫，\n本來就和「效率」\n相去甚遠。"
10051-2600 = "熱情的香氣，\n是磨亮巨匠靈感的\n動力。"

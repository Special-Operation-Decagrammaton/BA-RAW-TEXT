[translation]
10051-10 = "Blue Archive"
10051-20 = "หัวหน้ากองเชียร์ของมิลเลเนียม ชิราอิชิ อุทาฮะ\nขอส่งแรงเชียร์ให้ทุกคนด้วยความมุ่งมั่นที่ร้อนแรง และตรรกะที่สุขุม"
10051-30 = "เป็นสถานที่ที่เต็มไปด้วย\nความมุ่งมั่นจริงๆ นะ"
10051-40 = "ถ้าตั้งกองเชียร์ที่นี่\nจะส่งเสียงเชียร์ไปได้\nถึงที่ไหนกันนะ?"
10051-50 = "อยากลองทำ\nแปรอักษรที่นี่\nดูจังเลย..."
10051-60 = "(ฮุฮุ คิดวิธีเชียร์สนุกๆ ได้แล้วละ)"
10051-70 = "รู้สึกเหมือน...\nเสียงเชียร์ดังไม่พอเลย"
10051-80 = "เชิญเลย คุณครู\nถ้าต้องการเสียงเชียร์\nก็บอกได้ตลอดเลยนะ"
10051-90 = "เอาละ คุณครู\nวันนี้ก็รวบรวมแรงกายแรงใจ\nมาทำให้วันนี้เป็นวันที่เต็มที่กันเถอะ!"
10051-100 = "การเสริมขวัญกำลังใจคน\nก็เป็นเรื่องสำคัญนะ"
10051-110 = "โดยเฉพาะเวลาที่ต้องการ\nผลงานที่สร้างสรรค์ยังไงล่ะ"
10051-120 = "เจอเรื่องลำบากงั้นเหรอ?\nไม่เป็นไร ถ้างั้นพวกเรา\nมาลองทำด้วยกันอีกครั้งเถอะ"
10051-130 = "ถ้าได้อยู่กับคุณครูแบบนี้ละก็..."
10051-140 = "ฉันรู้สึกว่าทำได้ทุกอย่างเลยละ"
10051-150 = "ในอีกความหมายหนึ่ง\nของการเป็นไมสเตอร์\nก็อาจหมายถึงคนที่เป็นหัวหน้า\nกองเชียร์หุ่นยนต์ก็ได้นะ..."
10051-160 = "การได้แสดงภาพลักษณ์แบบนี้\nให้คุณครูได้เห็น ก็ไม่แย่เท่าไรนะ"
10051-170 = "เป็นยังไง รู้สึกสดชื่น\nขึ้นมาบ้างรึเปล่า?"
10051-180 = "อ๊ะ วันนี้เป็นวันเกิด\nของคุณครูนี่นา"
10051-190 = "วันนี้ ฉันจะเป็นหัวหน้ากองเชียร์\nให้กับคุณครูแค่คนเดียว\nก็แล้วกันนะ"
10051-200 = "วันเกิดฉันเหรอ...?\nเวลาผ่านไปขนาดนี้\nแล้วเหรอเนี่ย..."
10051-210 = "ขอบคุณนะ แต่ว่าฉัน...\nไม่ได้รู้สึกว่ามันพิเศษอะไรหรอก"
10051-220 = "พอคุณครูช่วยให้กำลังใจฉันแบบนี้"
10051-230 = "เลยรู้สึกเหมือนทุกวันคือวันเกิดเลยละ"
10051-240 = "ขอบคุณนะ คุณครู"
10051-250 = "ปีใหม่แล้วสินะ\nฉันจะร้องเพลงเชียร์\nเพื่อเป็นกำลังใจให้ทุกคน\nในวันเริ่มต้นปีใหม่นี้เอง"
10051-260 = "คุณลุงซานต้านี่ไฟแรงจริงๆ เลยนะ\nมีใครคอยส่งแรงเชียร์ให้หรือเปล่านะ?"
10051-270 = "บางที... อาจจะมีความฝัน\nและความหวังของเด็กๆ\nเป็นกำลังใจก็ได้"
10051-280 = "เอ่อ... ฉันไม่ได้ตั้งใจ\nที่จะทำให้โคมไฟรูปฟักทอง\nในห้องนั่งเล่นระเบิดหรอกนะ"
10051-290 = "ฉันก็แค่คิดว่าปรับไฟ...\nที่ลูกฟักทองให้เปล่งแสง\nระยิบระยับที่ 60 เฟรมก็คงสวยดี..."
10051-310 = "ฮูเร่ ฮูเร่! มิลเลเนียม!"
10051-320 = "สู้เค้า! ชนะให้ได้! มิลเลเนียม!"
10051-330 = "ฮุฮุ... เป็นไงบ้าง คุณครู?\nเป็นภาพที่สุดยอดมากเลยใช่มั้ย?"
10051-340 = "การแปรอักษรครั้งนี้น่ะ\nเราใช้หุ่นยนต์ที่ติดตั้ง\nอุปกรณ์บลูทูธรุ่นใหม่ล่าสุด\nไว้ไงล่ะ"
10051-350 = "ถึงจะเป็นข้อความที่ซับซ้อน\nก็สามารถแปรอักษรออกมา\nได้อย่างสมบูรณ์"
10051-360 = "หืม...? ถ้าใช้หุ่นยนต์\nในการแปรอักษรแบบนี้\nติดตั้งป้ายแอลอีดีแทน...\nน่าจะดูง่ายกว่างั้นเหรอ?"
10051-370 = "คุณครู... ช่วยอย่าพูดอะไร\nที่มันดูไร้ความโรแมนติกได้มั้ย?"
10051-380 = "ภาพวิวที่สมบูรณ์แบบ\nจากป้ายอนาล็อกพวกนี้"
10051-390 = "มันมีความมุ่งมั่นและ\nความรู้สึกที่ป้ายแอลอีดี\nเทียบไม่ได้อยู่ด้วยนะ"
10051-400 = "ความโรแมนติกที่ทำให้ใจเต้นแรง\nมันไม่ใช่สิ่งที่สร้างออกมาได้ง่ายๆ\nหรอกนะ"
10051-2600 = "เพียงแค่รู้สึกถึงความร้อนแรง\nก็ปลุกไฟในตัว\nของไมสเตอร์ได้แล้วละ"

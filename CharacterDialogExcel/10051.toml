[translation]
10051-10 = "블루 아카이브."
10051-20 = "밀레니엄의 응원단장, 시라이시 우타하.\n차가운 이성과 뜨거운 열정으로, 모두를 응원하겠어."
10051-30 = "열정으로 가득찬\n공간이네."
10051-40 = "여기에서 응원을\n하게 되면, 어디까지\n소리가 닿을까?"
10051-50 = "이곳에서 다같이\n매스게임을\n해 보고 싶은데…"
10051-60 = "(후후, 재미있는\n응원 계획이\n떠올랐어.)"
10051-70 = "뭔가… 기합이\n부족한 것 같은데."
10051-80 = "어서 와, 선생님.\n응원이 필요하다면,\n언제든 이야기해 줘."
10051-90 = "자, 선생님.\n오늘도 기합 넣어서\n힘차게 하루를 시작하자고!"
10051-100 = "사람의 기운을\n북돋우는 것은 중요한 일이지."
10051-110 = "창의적인 결과물을\n얻기 위해라서도 말이야."
10051-120 = "힘든 일이 있었다고?\n괜찮아. 일단은\n다시 한번 해보는 거야."
10051-130 = "이렇게 선생님과 있으면…"
10051-140 = "뭐든지 해낼 수 있을 것 같아."
10051-150 = "마이스터란,\n어떤 의미에서는\n기계들의 응원단장같은\n존재일지도 모르겠네…"
10051-160 = "선생님께 이런 모습을\n보여 주는 것도 나쁘지 않네."
10051-170 = "어때? 조금은…\n신선하게 느껴져?"
10051-180 = "아, 오늘이\n선생님의 생일이구나."
10051-190 = "오늘 하루만큼은\n내가 선생님만의\n응원단장이 되어줄게."
10051-200 = "내 생일…?\n시간이 벌써\n그렇게 되었나."
10051-210 = "고마워. 하지만\n특별한 느낌은 안 나네."
10051-220 = "선생님이 나를\n응원해 준 덕분에,"
10051-230 = "매일매일이 생일 같은 기분이야."
10051-240 = "고마워, 선생님."
10051-250 = "새해가 되었구나.\n새해 첫날부터 모두가\n기운을 낼 수 있도록,\n응원전을 시작해 볼까."
10051-260 = "산타는 정말 열정적이네.\n누군가에게 응원이라도\n받고 있는 걸까?"
10051-270 = "아… 아이들의\n꿈과 희망이 그 열정의\n원천일지도 모르겠네."
10051-280 = "그… 휴게실에 장식된\n호박 램프를 전부 폭파시킨 건\n고의가 아니었어…"
10051-290 = "그저 나는…\n호박이 60 프레임으로\n반짝이면 예쁠거라고 생각해서…"
10051-310 = "플레이, 플레이! 밀레니엄!"
10051-320 = "싸워라! 이겨라! 밀레니엄!"
10051-330 = "후후… 어때, 선생님?\n대단한 광경이라고\n생각되지 않아?"
10051-340 = "이 매스게임에는\n신형 블루투스 장치를\n탑재한 로봇을\n사용하고 있기 때문에,"
10051-350 = "아무리 복잡한 군무라도\n완벽하게 연출할 수 있어."
10051-360 = "…응?\n연출에 기계를 사용할 거라면\n전광판을 설치하는 게\n더 효율적이지 않겠느냐고?"
10051-370 = "선생님,\n낭만이 없는 이야기는\n하지 말아줘."
10051-380 = "아날로그 패널이\n동시에 펼쳐지며\n완성하는 풍경에는"
10051-390 = "전광판은 비교도\n되지 않을 정도의\n박력과 감동이 있으니까."
10051-400 = "본래 사람의 가슴을 뛰게\n만드는 로망은 효율과는\n거리가 먼 법이거든."
10051-2600 = "열정의 향기야말로,\n마이스터의 영감을\n일깨우는 동력이지."

[translation]
20042-10 = "蔚藍檔案……"
20042-20 = "嗚嗚……露營……\n明明是假日還得外出嗎……？"
20042-30 = "今天好不想出門……"
20042-40 = "啊，湧現了\n超棒的靈感！"
20042-50 = "之前千尋前輩\n借給我的簡易床墊，\n要不要試用看看呢？"
20042-60 = "什麼？這個名稱\n奇怪的WiFi是……"
20042-70 = "（這裡也能安裝\n毀滅狂戰士嗎？\n……試試看吧！）"
20042-80 = "啊，老師，你好呀。"
20042-90 = "咦……\n又要出門嗎……？"
20042-100 = "今天真冷呢！"
20042-110 = "為了變得暖和一點，\n我讓辦公室的電器\n增加了一點負載唷！"
20042-120 = "雖然在塗鴉的時候\n也經常爬上高樓，"
20042-130 = "但是跟登山的感覺\n又不太一樣呢。"
20042-140 = "果然沒有WiFi的話\n就會有種能量\n耗盡的感覺……"
20042-150 = "如果不只是秋天，\n連其他季節也能留住楓葉的話，\n山上的景色就能更鮮豔了吧……"
20042-160 = "不過……楓葉本來就是\n因為持續時間不長\n才顯得有價值吧？"
20042-170 = "這個辮子？"
20042-180 = "嗯，是我自己綁的。"
20042-190 = "因為綁丸子頭有點花時間，\n所以假日就不太想綁……"
20042-200 = "千尋前輩他，\n怎麼有辦法\n那麼早就過來呢？"
20042-210 = "該不會……\n他都12點前就睡了！？"
20042-220 = "說到塗鴉的材料，\n除了油漆之外還有很多種哦。"
20042-230 = "就像之前，我在洞窟裡\n畫壁畫的時候一樣！"
20042-240 = "畢竟要清除油漆也挺累人的……"
20042-250 = "之後來找找可以\n重複使用的天然材料吧。"
20042-260 = "哇，老師！\n祝你生日快樂！"
20042-270 = "為了幫你慶祝，\n我在夏萊的外牆\n畫了一幅巨大的\n老師肖像畫──"
20042-280 = "啊哈哈，\n開個玩笑，開個玩笑啦。"
20042-290 = "有什麼想要的東西就跟我說吧。\n什麼都可以唷！"
20042-300 = "哇……又到\n我的生日了啊。"
20042-310 = "呵呵，不用送禮物啦。"
20042-320 = "畢竟我總是受到\n老師的幫助嘛。"
20042-330 = "老師，新年快樂。"
20042-340 = "今天傍晚，如果有時間的話\n我們就在光之海岸見面吧！"
20042-350 = "啊……那個，\n光之海岸是\n遊戲的地名唷！"
20042-360 = "聖誕快樂，老師！"
20042-370 = "今天天氣很冷，\n我們就在房間裡\n做很多聖誕花環吧。"
20042-380 = "要多到能把夏萊完全蓋住！"
20042-390 = "呀齁！萬聖節到囉，老師。"
20042-400 = "這也是個能讓藝術之魂\n盡情燃燒的日子呢。"
20042-410 = "怎麼樣？要不要\n跟我一起燃燒呀？"
20042-430 = "唔，唔呃呃……"
20042-440 = "又在同一個地方\n死掉了……"
20042-450 = "話說手把的操作\n也太難了吧……"
20042-460 = "明明只剩下\n最後的頭目而已……"
20042-470 = "我卻總是在\n同一個地方失誤……"
20042-480 = "跟平時不同\n所以難度提高了……\n可能是這樣吧。"
20042-490 = "莫名激起了我的求勝心。"
20042-500 = "畢竟也沒有其他娛樂……"
20042-510 = "反而讓我更專注在遊戲當中了。"
20042-520 = "難道說，這就是\n所謂露營的醍醐味嗎？"
20042-530 = "咦！？已經這麼晚了嗎！？\n怎麼辦才好……"
20042-540 = "老師～只要再一次就好……"
20042-550 = "這次真的是最後一次了……"
20042-560 = "再等我一下下！"
20042-2600 = "這把機關槍，雖然改造得很酷……\n但要帶著登山實在有點太重了……\n差不多得進行輕量化了。"

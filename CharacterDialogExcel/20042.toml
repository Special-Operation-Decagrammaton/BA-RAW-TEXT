[translation]
20042-10 = "블루 아카이브……"
20042-20 = "으으, 캠핑이라니……\n휴일인데 또 밖에 나가야 하는 거야……?"
20042-30 = "오늘은 이 밖으로\n나가고 싶지 않아…"
20042-40 = "아, 좋은 영감이\n떠올랐어!"
20042-50 = "전에 치히로 선배에게\n빌린 1회용 침대를\n이 근처에 설치해 볼까?"
20042-60 = "뭐지? 이 이상한\n이름의 WIFI는…"
20042-70 = "(여기에도 BOOM을\n설치할 수 있으려나?\n……한번 도전해 볼까!)"
20042-80 = "아, 선생님. 왔어?"
20042-90 = "혹시 지금부터\n또 나갈 건 아니지……?"
20042-100 = "선생님, 오늘 진짜 춥지?"
20042-110 = "그럴 줄 알고, 내가 따듯하도록\n사무실에 있는 전자기기에\n잔뜩 과부하를 걸어 뒀어!"
20042-120 = "그래피티를 할 때도 높은\n빌딩에 자주 올라가긴 했지만,"
20042-130 = "뭔가 산에 오르는 건\n다른 느낌이야."
20042-140 = "역시 WIFI가 없으면\n에너지가 뚝 끊기는\n느낌이랄까……"
20042-150 = "가을뿐만 아니라 봄, 여름,\n겨울에도 단풍이 남아 있다면\n산의 풍경이 더 다채롭게\n느껴질 텐데…"
20042-160 = "하지만 역시 단풍은\n오래 머무르지 않기 때문에\n더 가치 있는 거겠지?"
20042-170 = "이 땋은 머리말이야?"
20042-180 = "응, 내가 직접 땋은 거야."
20042-190 = "평소의 당고머리는 만드는 데\n시간이 많이 걸려서\n휴일에는 하기 귀찮단 말이지…"
20042-200 = "치히로 선배는 어떻게\n매일 그렇게 일찍 일어나서\n부실에 오는 거지?"
20042-210 = "설마… 12시 이전에\n잠자리에 눕는 건가?!"
20042-220 = "그래피티의 재료는\n페인트 말고도 여러 가지를\n쓸 수 있어."
20042-230 = "지난번에 동굴 벽화를\n그렸을 때처럼 말이지!"
20042-240 = "페인트는 지우기도 어려우니까…"
20042-250 = "앞으로는 재활용이\n가능한 천연 재료를\n좀 더 찾아봐야겠어."
20042-260 = "와아, 선생님!\n생일 축하해!"
20042-270 = "선생님의 생일 선물로\n샬레 빌딩의 외벽에\n거대한 선생님 초상화를\n그려놓고 왔는데—"
20042-280 = "아하하, 농담이야, 농담.\n그렇게 놀라지 마."
20042-290 = "대신 받고 싶은 선물이\n있으면 말해줘. 뭐든지!"
20042-300 = "우와… 어느새 내 생일이\n다시 돌아왔네."
20042-310 = "후후, 선물은 괜찮아."
20042-320 = "선생님에게는 항상 여러모로\n도움을 받고 있으니까."
20042-330 = "선생님, 새해 복 많이 받아."
20042-340 = "오늘 저녁에 시간 되면\n빛의 해안에서 보자!"
20042-350 = "거기가 어디냐고……?\n아, 게임 이야기라는 걸\n깜박했네."
20042-360 = "메리 크리스마스, 선생님!"
20042-370 = "오늘은 추우니까 실내에서\n크리스마스 리스를\n잔뜩 만들자."
20042-380 = "샬레 건물을 가득 덮을 만큼!"
20042-390 = "야호! 할로윈이야, 선생님."
20042-400 = "상상력과 예술혼을\n마음껏 불태울 수 있는 날이지."
20042-410 = "어때? 나랑 함께\n예술혼을 불태워 볼래?"
20042-430 = "우으, 우으으……"
20042-440 = "또 같은 지점에서\n죽어버렸어……"
20042-450 = "패드를 조작하는 게\n생각보다 어려워서……"
20042-460 = "이제 마지막 보스만 남았는데,"
20042-470 = "같은 곳에서 실수를\n반복한단 말이지."
20042-480 = "평소와 다르게\n난이도가 올라서……\n그런 걸까."
20042-490 = "묘한 승부욕이 생기더라고."
20042-500 = "주변에 즐길 거리도\n없다 보니……"
20042-510 = "더 게임에 집중하게 된달까."
20042-520 = "설마, 이게 말로만 듣던\n캠핑의 묘미라는 건가?"
20042-530 = "엣! 벌써 시간이 그렇게?!\n어쩌지……"
20042-540 = "선생님, 다시 한 판만……"
20042-550 = " 이번이 진짜 마지막이니까……"
20042-560 = "조금만 기다려줘!"
20042-2600 = "이 기관총, 멋진 느낌으로 개조하긴 했지만\n산행에 가져가기에는 너무 무거워…\n슬슬 경량화를 해야 할지도."

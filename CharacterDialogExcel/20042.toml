[translation]
20042-10 = "Blue Archive..."
20042-20 = "Ugh, camping... I have to go outside again on my day off...?"
20042-30 = "I don't want to go outside today..."
20042-40 = "Ah, I just got a great idea!"
20042-50 = "Should I try installing the one-time bed I borrowed from Chihiro around here?"
20042-60 = "Huh? What is this wi-fi with a weird name...?"
20042-70 = "(Can I install BOOM on this too? ...Let's give it a shot!)"
20042-80 = "Ah, Sensei. You're here?"
20042-90 = "You're not planning on going back outside right now, are you...?"
20042-100 = "Isn't it really cold today, Sensei?"
20042-110 = "I predicted this, which is why I overloaded a bunch of electronic devices in the office!"
20042-120 = "I go up on tall buildings a lot when I'm graffiting..."
20042-130 = "...but climbing a mountain feels a little different."
20042-140 = "It definitely feels like my energy levels drop without Wi-Fi access..."
20042-150 = "The mountain's scenery would feel more colorful if the fall foliage stayed throughout spring, summer, and winter..."
20042-160 = "But I guess fall foliage is more valuable because it doesn't stay long, right?"
20042-170 = "These braids?"
20042-180 = "Yeah, I did them myself."
20042-190 = "My usual dango hair takes a long time to do, so I'm too lazy to do it on my days off..."
20042-200 = "How does Chihiro wake up and get to club room so early everyday?"
20042-210 = "Could it be...that she goes to bed before midnight?!"
20042-220 = "You can use a lot of things besides paint to graffiti."
20042-230 = "Like how I drew the cave mural last time!"
20042-240 = "Since it's hard to get paint off..."
20042-250 = "...I should look for natural, recyclable materials more often."
20042-260 = "Yay, Sensei! Happy birthday!"
20042-270 = "I drew a giant portrait of you on the outer walls of the Schale building for your birthday gift..."
20042-280 = "Ahaha, I was kidding. You don't need to be so shocked."
20042-290 = "But if there IS any gift you want, let me know!"
20042-300 = "Whoa... It's already my birthday again."
20042-310 = "Heehee, I don't need any presents."
20042-320 = "Because I'm always getting lots of help from you, Sensei."
20042-330 = "Happy New Year, Sensei."
20042-340 = "Catch me on Coast of Light when you have time this afternoon!"
20042-350 = "Where is that...? Ah, I forgot to mention that it's from a game."
20042-360 = "Merry Christmas, Sensei!"
20042-370 = "Since it's cold outside, let's stay in and make lots of Christmas wreaths today."
20042-380 = "Let's make enough to fully cover the Schale building!"
20042-390 = "Yahoo! It's Halloween, Sensei."
20042-400 = "It's the day I can freely set my imagination and artistic soul ablaze."
20042-410 = "What do you say? Would you like to set your soul ablaze with me?"
20042-430 = "U-Ughhh..."
20042-440 = "I died at the same spot again..."
20042-450 = "Mhm. Using this controller is harder than I expected..."
20042-460 = "I'm on the final boss..."
20042-470 = "...but I keep making the same mistakes over and over again."
20042-480 = "Yeah, but these controls are making it super hard..."
20042-490 = "And now my competitive spirit has risen to the challenge."
20042-500 = "And because there's no distractions here..."
20042-510 = "...I feel like I can really focus on just the game."
20042-520 = "Could this be the \"joy\" in camping that everyone always talks about?"
20042-530 = "Ah, it's already that late? What do I do...?"
20042-540 = "Sensei, this really, truly is"
20042-550 = " my last try..."
20042-560 = "So please wait just a little longer!"
20042-2600 = "I modded this machine gun to make it look cool, but it's too heavy to bring hiking... Maybe I'll have to shave off some weight."

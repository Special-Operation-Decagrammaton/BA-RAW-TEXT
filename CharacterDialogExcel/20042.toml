[translation]
20042-10 = "Blue Archive..."
20042-20 = "อึก ตั้งแคมป์...\nวันหยุดทั้งที ต้องออกมาข้างนอกเหรอเนี่ย...?"
20042-30 = "วันนี้ฉันไม่อยาก\nออกไปข้างนอกเลย..."
20042-40 = "อ๊ะ ได้แรงบันดาลใจ\nดีๆ แล้ว!"
20042-50 = "เอาเตียงเดี่ยวที่เมื่อก่อน\nเคยยืมรุ่นพี่จิฮิโระมา\nวางไว้แถวนี้ดีมั้ยนะ?"
20042-60 = "อะไรน่ะ? ชื่อ WIFI\nแปลกๆ อันนี้..."
20042-70 = "(ที่นี่ก็ติดตั้ง BOOM\nไว้ได้มั้ยนะ?\nลองดูดีกว่า...!)"
20042-80 = "อ๊ะ คุณครู มาแล้วเหรอ?"
20042-90 = "ไม่ได้จะออกไป\nข้างนอกตอนนี้ใช่มั้ย...?"
20042-100 = "คุณครู วันนี้หนาวมากเลยเนอะ?"
20042-110 = "พอรู้อย่างนี้ ฉันก็เลยเปิด\nอุปกรณ์อิเล็กทรอนิกส์ในห้อง\nเอาไว้ให้เครื่องร้อนเลยละ!"
20042-120 = "ตอนวาดกราฟิตี้ ฉันได้ขึ้น\nไปบนอาคารสูงๆ บ่อยๆ"
20042-130 = "แต่มันต่างจาก\nการปีนเขาอยู่นะ"
20042-140 = "ถ้าไม่มี WIFI\nฉันก็รู้สึก\nหมดพลังจริงๆ ด้วย..."
20042-150 = "นอกจากฤดูใบไม้ผลิ\nถ้ามีใบไม้เปลี่ยนสีในฤดูอื่นด้วย\nทิวทัศน์ของภูเขา\nก็น่าจะสีสันสดใสกว่านี้นะ..."
20042-160 = "แต่พอใบไม้เปลี่ยนสี\nอยู่ได้ไม่นาน\nก็เลยยิ่งมีคุณค่าใช่มั้ย?"
20042-170 = "ผมเปียนี้น่ะเหรอ?"
20042-180 = "อื้อ ฉันถักมันเองละ"
20042-190 = "ปกติฉันจะทำเป็นทรงดังโงะ\nแต่มันใช่เวลานาน\nแล้ววันหยุดฉันก็ขี้เกียจทำด้วย..."
20042-200 = "รุ่นพี่จิฮิโระตื่นเช้า\nแล้วมาห้องชมรม\nได้ยังไงทุกวันๆ นะ?"
20042-210 = "หรือว่า... นอนตั้งแต่\nก่อนเที่ยงคืนแล้ว?!"
20042-220 = "วัสดุทำภาพกราฟิตี้น่ะ\nนอกจากสีแล้วก็ยังใช้\nอย่างอื่นได้เยอะแยะเลย"
20042-230 = "เหมือนกับตอนที่ฉันวาด\nผนังถ้ำเมื่อคราวก่อนไง!"
20042-240 = "เพราะสีมันก็ลบยาก\nอยู่เหมือนกัน..."
20042-250 = "สงสัยต่อไปฉันต้องหา\nวัสดุธรรมชาติที่ใช้ซ้ำได้\nให้มากขึ้นแล้วละ"
20042-260 = "ว้าว คุณครู!\nสุขสันต์วันเกิดนะ!"
20042-270 = "ฉันไปวาดรูปเหมือน\nขนาดใหญ่ของคุณครู\nไว้นอกผนังอาคารชาเล่ต์\nเป็นของขวัญวันเกิดคุณครูน่ะ..."
20042-280 = "อะฮ่าฮ่า ล้อเล่น ฉันล้อเล่น\nไม่ต้องตกใจขนาดนั้นหรอก"
20042-290 = "แต่ถ้ามีของขวัญที่อยากได้\nก็บอกกันนะ ได้ทุกอย่างเลย!"
20042-300 = "ว้าว... วันเกิดฉัน\nมาถึงอีกแล้วสินะ"
20042-310 = "ฮุฮุ ไม่ต้องให้ของขวัญหรอก"
20042-320 = "ก็ฉันได้ความช่วยเหลือมากมาย\nจากคุณครูอยู่เสมอเลยนี่นะ"
20042-330 = "คุณครู สวัสดีปีใหม่นะ"
20042-340 = "เย็นวันนี้ เราไป\nชายหาดแห่งแสงกันเถอะ!"
20042-350 = "ที่นั่นอยู่ไหนน่ะเหรอ...?\nอ๊ะ ลืมไปเลยว่า\nพูดเรื่องเกมอยู่"
20042-360 = "เมอร์รีคริสต์มาสนะ คุณครู!"
20042-370 = "วันนี้หนาว เรามาทำ\nดอกไม้วันคริสต์มาส\nในห้องกันให้ได้เยอะๆ เถอะ"
20042-380 = "เอาให้ติดได้ทั่วอาคารชาเล่ต์ไปเลย!"
20042-390 = "ยะฮู้ว! ถึงวันวันฮาโลวีนแล้วละคุณครู"
20042-400 = "เป็นวันที่ใช้จินตนาการและ\nจิตวิญญาณศิลปินได้เต็มที่เลยละ"
20042-410 = "ว่าไงล่ะ? มาจุดประกาย\nจิตวิญญาณศิลปินกับฉันมั้ย?"
20042-430 = "โธ่... ฮึ่ย..."
20042-440 = "ตายตรงจุดเดิม\nอีกแล้ว..."
20042-450 = "อื้อ ฉันบังคับเกมด้วยเครื่องนี้\nยากกว่าที่คิดน่ะ..."
20042-460 = "ฉันว่าจะแค่ตีบอสตัวสุดท้ายให้ตาย"
20042-470 = "แต่ก็ตายที่เดิม\nอยู่ซ้ำๆ เลย"
20042-480 = "คือว่า... มันยากขึ้น\nเพราะบังคับยากขึ้นน่ะ..."
20042-490 = "ฉันก็เลยเกิดความอยากเอาชนะขึ้นมา"
20042-500 = "แล้วแถวนี้ก็ไม่มีอะไร\nอย่างอื่นให้เล่นสนุกด้วย"
20042-510 = "ฉันก็เลยยิ่งโฟกัส\nกับเกมได้มากขึ้น"
20042-520 = "หรือว่านี่คือเสน่ห์ของแคมป์ปิ้ง\nตามที่ได้ยินมา?"
20042-530 = "อ๊ะ เวลาผ่านไปขนาดนั้นแล้วเหรอ?\nยุ่งแล้วละสิ..."
20042-540 = "คุณครู นี่ตาสุดท้ายแล้ว"
20042-550 = "ตาสุดท้ายแล้วจริงๆ..."
20042-560 = "ช่วยรอฉันเดี๋ยวหนึ่งนะ!"
20042-2600 = "ฉันดัดแปลงปืนกลอันนี้ให้เท่ขึ้น\nแต่มันหนักเกินจะเอาไปเดินป่า...\nน่าจะต้องลดน้ำหนักมันแล้วละ"

[translation]
20010-10 = "蔚藍檔案"
20010-20 = "歡迎來到227號溫泉浴場，老師。\n我和香，身為溫泉浴場的女將，\n將會誠心誠意款待老師！"
20010-30 = "要是227號溫泉浴場\n也有這種家具就太好了。"
20010-40 = "這間咖啡廳\n無論何時都很多人……\n到底有什麼祕訣呢？"
20010-50 = "嗚喔……\n看起來很高級的東西……"
20010-60 = "（咦？剛才老師明明\n　還在這附近啊……）"
20010-70 = "（舊校舍……\n　還不想回去……）"
20010-80 = "227號溫泉浴場，\n現在開始營業！"
20010-90 = "歡迎回來，老師。\n請問要先用餐呢？\n還是要先洗澡呢？"
20010-100 = "……？\n啊，不，那個！"
20010-110 = "在我們的溫泉浴場，\n那種服務是，那個……"
20010-120 = "老師，這套和服……\n你覺得怎麼樣呢？"
20010-130 = "這是我努力租來的……"
20010-140 = "……適合嗎？\n耶嘿，耶嘿嘿……"
20010-150 = "作為赤冬聯邦學園\n唯一的溫泉浴場，\n我會努力不辜負這個名號！"
20010-160 = "耶嘿，耶嘿嘿……"
20010-170 = "啊，不，我，\n我沒有在看喔……！"
20010-180 = "老師，想要泡湯的話，\n請一定要來我們溫泉浴場喔。\n一定喔！知道了嗎？"
20010-190 = "溫泉開發部的人也是……\n總覺得格黑娜似乎\n有很多奇怪的學生呢？"
20010-200 = "生日快樂，老師！"
20010-210 = "要不要今天一天，\n就在我們的溫泉浴場\n好好放鬆休息呢？"
20010-220 = "啊，對喔，今天是我生日……"
20010-230 = "那，那麼，既然這樣……"
20010-240 = "今天可以稍微\n撒嬌一下嗎……？"
20010-250 = "希望今年也能吃到很多\n好吃又好看的食物……！"
20010-260 = "在宴席料理中\n加入聖誕節蛋糕，\n果然會很奇怪嗎……？"
20010-270 = "為了慶祝萬聖節，\n我們227號溫泉浴場現在\n正在贈送南瓜口味的\n「好粗棒」！"
20010-290 = "哈啊……真是不錯的溫泉呢。\n只是泡著，\n疼痛就好像都消失了一樣。"
20010-300 = "周圍的景色也很漂亮……"
20010-310 = "庭園也打造的很棒，\n真的是很美的地方呢。"
20010-320 = "雖然因為有屋頂的關係，\n看不到星空，\n有點可惜……"
20010-330 = "……不，或許這樣也好。"
20010-340 = "竟然能和老師兩個人\n享受溫泉，\n這樣的幸福……"
20010-350 = "得對星星保密才行。"
20010-2600 = "我反而希望在溫泉浴場\n使用這個武器的機會能少一點……\n不過真的需要的時候……我會好好使用！"

[translation]
20010-10 = "Blue Archive."
20010-20 = "Welcome to Hot Springs Resort No. 227, Sensei. As the hostess of the hot springs resort, I will serve you wholeheartedly!"
20010-30 = "It'd be nice to have furniture like this at our hot springs resort."
20010-40 = "This cafe is always full of people. I wonder what their secret is."
20010-50 = "This is probably...expensive, right?"
20010-60 = "(I'm sure I saw Sensei somewhere near here.)"
20010-70 = "(I don't want to return to the Former Institute just yet...)"
20010-80 = "Hot Springs Resort No. 227, open for business!"
20010-90 = "Welcome back, Sensei. What would you like to do first? Eat or take a bath?"
20010-100 = "Huh? Ah, th-that's!"
20010-110 = "Our hot springs resort does not offer that kind of service!"
20010-120 = "What do you think of this kimono, Sensei?"
20010-130 = "I paid a lot to rent it."
20010-140 = "Does it look good on me? Heehee..."
20010-150 = "I will try my best not to bring shame to the name of the one and only hot springs resort at Red Winter Academy!"
20010-160 = "Heh, heeheehee."
20010-170 = "I-I wasn't staring, okay?"
20010-180 = "Sensei, if you're going to take a bath, please come to our hot springs. Don't take a bath anywhere else! Got it?"
20010-190 = "Including the Hot Springs Development Department members, there are a lot of weird students at Gehenna for some reason."
20010-200 = "Happy birthday, Sensei!"
20010-210 = "How about relaxing leisurely at our hot springs today?"
20010-220 = "Today is my birthday."
20010-230 = "So, just this once, can I..."
20010-240 = "...ask you to spoil me today?"
20010-250 = "I hope to eat lots of delicious food this year as well..."
20010-260 = "Would it be weird to add Christmas cake to the kaiseki course meal?"
20010-270 = "To commemorate Halloween, we here at Hot Springs Resort No. 227 are giving away pumpkin-flavored corn sticks!"
20010-290 = "*sigh* This bath is perfect. It feels like the pain in my ankle is going away."
20010-300 = "The scenery around here is really beautiful."
20010-310 = "The well-maintained garden is really a beautiful place."
20010-320 = "It's a shame the roof is blocking the night sky."
20010-330 = "Actually, I think that this is fine as well."
20010-340 = "This extravagant moment enjoying this hot spring with you, Sensei..."
20010-350 = "We'll have to keep it a secret. Even from the stars in the sky."
20010-2600 = "I hope I don't have to use this weapon at the hot springs resort... Though if I have to, I will!"

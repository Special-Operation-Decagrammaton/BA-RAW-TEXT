[translation]
20010-10 = "Blue Archive"
20010-20 = "ขอต้อนรับสู่ออนเซ็น No.227 ค่ะคุณครู\nฉันเป็นผู้ดูแลของออนเซ็นนี้ โนโดกะค่ะ\nฉันจะบริการคุณครูอย่างเต็มที่เลยค่ะ!"
20010-30 = "ถ้าออนเซ็นของเรา\nมีอุปกรณ์พวกนี้ด้วย\nก็คงดีนะคะ"
20010-40 = "คาเฟ่นี้\nมีคนเยอะตลอดเลยค่ะ\nเขามีเคล็ดลับอะไรกันนะ?"
20010-50 = "ว้าว...\nของชิ้นนี้ดูน่าจะแพง\nมากเลยนะคะ"
20010-60 = "(เอ๊ะ รู้สึกเหมือนว่าเห็น\nคุณครูอยู่แถวๆ นี้เลยนะ...)"
20010-70 = "(ไม่อยากกลับไป\nที่อาคารเรียนเก่าเลย...)"
20010-80 = "ออนเซ็น No.227\nเปิดบริการแล้วค่ะ!"
20010-90 = "เชิญค่ะคุณครู\nจะเริ่มจากทานอาหารก่อน\nหรือว่าจะอาบน้ำก่อนดีคะ?"
20010-100 = "เอ๋...? โอ๊ะ? นั่นมัน!"
20010-110 = "ที่ออนเซ็นของเรา\nไม่มีบริการแบบนั้น…"
20010-120 = "คุณครูคิดว่า...\nกิโมโนชุดนี้เป็นยังไงบ้างคะ?"
20010-130 = "ฉันอุตส่าห์เช่าชุดมา\nในราคาแพงมากเลยนะคะ..."
20010-140 = "เหมาะกับฉันรึเปล่าคะ...?\nแหะๆ..."
20010-150 = "ในฐานะออนเซ็นแห่งเดียว\nในสหภาพเรดวินเทอร์\nฉันจะพยายามอย่างเต็มที่ค่ะ!"
20010-160 = "แหะๆ... แหะๆ..."
20010-170 = "ฉะ...ฉันไม่ได้\nมองอยู่หรอกนะคะ!"
20010-180 = "ถ้าคุณครูอยากแช่น้ำ\nจะต้องมาที่ห้องอาบน้ำ\nของพวกเรานะคะ ต้องมานะคะ!"
20010-190 = "พวกชมรมพัฒนาออนเซ็น\nก็เหมือนกัน... ดูเหมือนว่า\nที่เกเฮนน่าจะมีเด็กแปลกๆ\nเยอะเลยนะคะ"
20010-200 = "สุขสันต์วันเกิดค่ะคุณครู!"
20010-210 = "วันนี้คุณครูมาพักผ่อน\nที่ออนเซ็นของเรา\nให้ผ่อนคลายดีไหมคะ?"
20010-220 = "อ๊ะ พอนึกดูแล้ว\nวันนี้เป็นวันเกิดของฉันนี่นา"
20010-230 = "ถ้างั้นละก็..."
20010-240 = "ฉันจะขอทำตัวแบบเด็กๆ สักหน่อย\nคุณครูจะว่าไหมคะ?"
20010-250 = "ปีนี้ก็ขอให้\nได้กินของอร่อยๆ อีกเยอะๆ..."
20010-260 = "ถ้าเอาเค้กวันคริสต์มาส\nมารวมไว้ในคอร์สอาหารไคเซกิ\nจะแปลกรึเปล่าคะ?"
20010-270 = "ออนเซ็น No.227 ของเรา\nแจกขนมข้าวโพดอบกรอบรสฟักทอง\nเพื่อเป็นการฉลองวันฮาโลวีนค่ะ!"
20010-290 = "อ่า... ดีจังเลยนะคะ\nอาการเจ็บที่ข้อเท้า\nตอนนี้...หายเป็นปลิดทิ้งเลยค่ะ"
20010-300 = "วิวรอบๆ ที่นี่\nก็สวยงามมากเลยค่ะ"
20010-310 = "ไฟที่ประดับสวนตอนกลางคืน\nก็สวยงามมากๆ เลยค่ะ"
20010-320 = "น่าเสียดาย...\nพอหลังคามันบังอยู่แบบนี้...\nเลยอดเห็นวิวกลางคืนเลยนะคะ"
20010-330 = "ไม่สิ พอมาคิดดูแล้ว\nอาจถือว่าโชคดีก็ได้ค่ะ"
20010-340 = "ช่วงเวลาล้ำค่าที่ได้แช่ออนเซ็น\nกับคุณครูแค่สองคนแบบนี้น่ะ..."
20010-350 = "ฉันไม่อยากให้ดวงดาว\nบนท้องฟ้าเห็นหรอกนะคะ"
20010-2600 = "ถ้าไม่จำเป็นต้องใช้อาวุธนี้\nที่ออนเซ็นก็คงดีนะคะ...\nแต่ถ้าจำเป็นจริงๆ ฉันก็จะใช้ค่ะ!"

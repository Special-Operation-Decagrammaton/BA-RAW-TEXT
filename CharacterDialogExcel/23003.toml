[translation]
23003-20 = "很高興見到你，老師。\n千年的力量，就讓老師見識看看吧。"
23003-30 = "飲料販賣機，\n能不能讓它只會掉出\n能量飲料呢…？"
23003-40 = "唔嗯…\n先稍微睡一下\n再繼續吧？"
23003-50 = "糖分不足…"
23003-60 = "這邊改成這樣，\n那邊改成那樣的話…\n好，\n馬上來改造看看吧！"
23003-70 = "呼嗯～嗯？\n啊啊，你問我在做什麼嗎？\n我在玩新的遊戲。"
23003-80 = "嗨，老師。\n要不要來杯咖啡呀？"
23003-90 = "歡迎你來，老師。\n比我預期的時間\n早到了約43秒呢。"
23003-100 = "別看我這個樣子，\n我可是挺會玩遊戲的唷。"
23003-110 = "老師要不要跟我對戰看看？"
23003-120 = "作弊…？"
23003-130 = "就算是駭客，\n也不會在為了\n追求快樂的遊戲裡\n使用那種東西吧。"
23003-140 = "我們做的事情，\n看起來有那麼過激嗎？"
23003-150 = "知識必須要是自由的…"
23003-160 = "嗯，果然是句好話呢。"
23003-170 = "這甜甜的碳酸飲料\n才是知性人的飲料唷。"
23003-180 = "生日快樂，老師。"
23003-190 = "就把今天不管寫出\n怎麼樣的程式碼\n都不會出現bug的\n晴之加護賜給你吧。"
23003-200 = "唔嗯，雖然\n我說的樹莓派\n不是指這個……"
23003-210 = "不過還是謝謝你幫我慶祝生日。"
23003-220 = "Hello,\nNew World."
23003-230 = "你知道那個嗎，老師？"
23003-240 = "聖誕節是一年之中\n做最多「那個」的一天。"
23003-250 = "哼哼，那就是…\n駭入唷。"
23003-260 = "你問我怎麼不出去\n享受節慶嗎？"
23003-270 = "萬聖節的節慶，\n在螢幕裡也在舉行嘛。"
23003-290 = "唉…\n這場午後雷陣雨來的真突然。"
23003-300 = "最近就連天氣預報\n都不值得信任了，真傷腦筋。"
23003-310 = "那…\n接下來要做什麼呢？"
23003-320 = "（嗯…剛剛那句話\n會不會聽起來很奇怪啊？）"
23003-330 = "（不過我也是第一次來網咖，\n不知道其他人\n都在這種地方做什麼…）"
23003-340 = "（話說這個空間\n好窄…\n老師的臉好近…）"
23003-350 = "你，你說，\n你要先去沖澡？\n等等，為，為什麼？！"
23003-360 = "啊，你說頭髮被雨淋濕\n要去洗一下？…抱歉\n我誤會了。啊不，別在意。"
23003-370 = "原來網咖\n還設有盥洗設備啊。"
23003-380 = "啊，老師，你看。\n飲料吧是免費的耶。不知道有沒有能量飲料？"
23003-390 = "不只可以自由使用網路，\n連飲料也是免費。\n太完美了，\n完全就是為我這種人準備的空間啊！"
23003-400 = "在這裡要我待多久\n都可以。"
23003-410 = "那個…剛剛這句\n並沒有奇怪的意思。\n你不要誤會了…"
23003-2600 = "雖然是老舊的武器……不過這個武器\n承載著無法數值化的回憶。"

[translation]
23003-20 = "Nice to meet you, Sensei. I'll show you what a Millennium girl can do."
23003-30 = "If only there were a way to have the vending machine stocked with only energy drinks."
23003-40 = "Hmm... Why don't we continue after taking a nap?"
23003-50 = "Need...more...sugar..."
23003-60 = "If I fix this part this way, and that part thataway... Good. Time for some modifications."
23003-70 = "Hmm. Huh? What was I doing just now? I was playing a new game."
23003-80 = "Hello, Sensei. Would you like a cup of coffee?"
23003-90 = "Welcome, Sensei. You're here approximately 43 seconds earlier than I expected."
23003-100 = "Believe it or not, I'm pretty good at games."
23003-110 = "You wanna test my skills, Sensei?"
23003-120 = "Cheat...?"
23003-130 = "I may be a hacker, sure, but that would take all the fun out."
23003-140 = "Do people think hackers are just a bunch of cheaters or something?"
23003-150 = "I hack because knowledge should be free."
23003-160 = "That's what I believe."
23003-170 = "The sweetest soda is the drink of intellectuals."
23003-180 = "Happy birthday, Sensei."
23003-190 = "Today, I bestow unto you Hare's Protection. It's code which will protect you from every bug regardless of what coding language you use."
23003-200 = "Um, this isn't what I meant by Raspberry Pi..."
23003-210 = "Still, thank you for remembering my birthday."
23003-220 = "Hello, new world."
23003-230 = "Did you know, Sensei?"
23003-240 = "Christmas is the time of year where people do a certain something together."
23003-250 = "Heh heh. You know what I mean... Hacking, of course."
23003-260 = "Why am I not outside enjoying the festival?"
23003-270 = "Because the Halloween Festival can be enjoyed the same from behind a screen."
23003-290 = "*sigh* That rain shower came out of nowhere."
23003-300 = "It's hard to trust the weather reports these days."
23003-310 = "So, what should we do now?"
23003-320 = "(Oh, no... Was that a weird thing to say?)"
23003-330 = "(This is my first time at an internet cafe. I don't know what you're supposed to do at a place like this.)"
23003-340 = "(Besides, this place is so small...and Sensei's face is so close...)"
23003-350 = "You're gonna go freshen up? What do you mean?"
23003-360 = "Oh, you're gonna wash the rain from your hair? ...No, forget I asked."
23003-370 = "Do internet cafes have showers?"
23003-380 = "Hey, Sensei. I was told the drink bar is free. I wonder if they have energy drinks."
23003-390 = "Not only is the internet free, but the drinks are free too. Amazing! This is the perfect place for someone like me!"
23003-400 = "I could stay here forever."
23003-410 = "Oh... I hope I'm not coming off weird. Don't get me wrong..."
23003-2600 = "It's an old weapon... This weapon contains memories that cannot be quantified."

[translation]
23003-20 = "만나서 반가워, 선생님.\n밀레니엄의 힘을, 선생님에게 보여줄게."
23003-30 = "음료수 자판기에서\n에너지 드링크만 나오게\n만들 수는 없을까…?"
23003-40 = "으음….\n잠깐 한숨 자고\n계속할까?"
23003-50 = "당분이\n부족해…."
23003-60 = "여길 이렇게 고치고,\n저길 저렇게 고치면….\n좋아.\n바로 개조해볼까?"
23003-70 = "흐음… 응?\n아, 무얼 하고 있었냐고?\n신작 게임을 하고 있었어."
23003-80 = "안녕, 선생님.\n커피 한잔할래?"
23003-90 = "어서 와, 선생님.\n내 예상보다 약 43초\n빨리 도착했네."
23003-100 = "이래 봬도 게임은\n제법 잘하는 편이야."
23003-110 = "선생님도 한 번 상대해볼래?"
23003-120 = "치트…?"
23003-130 = "아무리 해커라지만 재미로 하는\n게임에 그런 걸 쓸 리가 없잖아."
23003-140 = "우리가 하는 일이\n그렇게 과격해 보이나?"
23003-150 = "지식은 자유로워야 한다…."
23003-160 = "음, 역시 좋은 말이야."
23003-170 = "이 달콤한 탄산음료야말로\n지성인의 음료지."
23003-180 = "생일 축하해, 선생님."
23003-190 = "오늘 하루는 어떤 코드를\n쓰더라도 버그가 나지 않는\n하레의 가호를 내려줄게."
23003-200 = "으음, 내가 말한\n라즈베리 파이는\n이게 아닌데…"
23003-210 = "그래도 생일 챙겨줘서 고마워."
23003-220 = "안녕, 새로운 세상."
23003-230 = "그거 알아, 선생님?"
23003-240 = "크리스마스는 1년 중에 \"이게\"\n가장 많이 이루어지는 날이야."
23003-250 = "후후, 그건 바로…\n해킹이야."
23003-260 = "밖의 축제를 즐기러\n나가지 않느냐고?"
23003-270 = "할로윈 축제는 모니터\n안에서도 열리고 있는 걸."
23003-290 = "하아……\n갑자기 소나기라니."
23003-300 = "요새는 일기예보도\n완전히 신뢰하기가 어렵다니까."
23003-310 = "그럼, 지금부터 무얼 할까?"
23003-320 = "(아니… 방금 그 말은\n이상한 소리처럼 들렸으려나?)"
23003-330 = "(하지만 넷카페는 나도 처음이고,\n다른 사람들은 이런 곳에서\n무얼 하는지도 모르니….)"
23003-340 = "(게다가 이 공간은 너무 좁아서…\n선생님의 얼굴이 가까워….)"
23003-350 = "머, 먼저 씻고 오겠다고?\n잠깐, 무슨 생각을 하는 거야?!"
23003-360 = "아. 비에 젖은 머리를 씻고 온다고?\n……미안, 아니, 신경쓰지마."
23003-370 = "넷카페에는\n샤워시설도 있는 건가."
23003-380 = "이것 봐, 선생님.\n드링크 바는 무료래.\n에너지 드링크도 있으려나?"
23003-390 = "인터넷도 자유롭게 쓸 수 있는데,\n드링크도 무료라니.\n굉장하네, 완전히 나 같은\n사람들을 위한 공간이잖아?"
23003-400 = "여기서라면 언제까지고\n계속 머무를 수 있겠어."
23003-410 = "그러니까… 이상한 의미로\n한 말이 아니니까.\n오해하지 말아줘…."
23003-2600 = "낡은 무기지만… 이 무기에는\n수치화할 수 없는 추억이 담겨있어."

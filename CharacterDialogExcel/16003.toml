[translation]
16003-20 = "자경단 임무의 연장인가요…\n트리니티의 안전을 위해서라면 얼마든지 협력하겠습니다."
16003-30 = "(이곳은\n평화롭군요.)"
16003-40 = "(아… 이 장식,\n귀여워…)"
16003-50 = "(이런 귀여운 물건은\n나와는\n안 어울릴지도…)"
16003-60 = "이곳의 보안은…\n훌륭하군요.\n흠 잡을 곳이 없습니다."
16003-70 = "휴식도\n임무의 일부."
16003-80 = "어서 오세요, 선생님.\n바쁘신 줄 알고 있지만\n그래도 자주 뵈었으면 좋겠습니다."
16003-90 = "선생님, 기다리고 있었습니다.\n빨리 함께 순찰을 나가죠."
16003-100 = "제 인상이 그렇게\n차가워 보이나요…?"
16003-110 = "자경단 활동 말입니까?\n물론 힘들지만…\n누군가는 해야 할 일이니까요."
16003-120 = "쉬고 있을 시간은 없습니다."
16003-130 = "정의란 사소한 것부터 하나씩\n바로잡는 게 중요합니다."
16003-140 = "무언가… 제가 실수라도?"
16003-150 = "생신 축하드립니다, 선생님."
16003-160 = "오늘은 선생님의 생신이기도 하니\n순찰 대신 느긋하게 산책이나\n하는 게 어떨까요?"
16003-170 = "태어난 날을 기념하는 것에\n큰 의미는 없다지만 선생님께\n축하를 받을 수 있다니…"
16003-180 = "왠지 큰 득을 본 기분이네요."
16003-190 = "선생님의 새해 목표는 뭔가요?\n저는… 늘 그랬듯이 더 열심히\n순찰을 도는 것뿐입니다."
16003-200 = "연휴를 앞두고 다들\n마음이 풀어지는 시기네요."
16003-210 = "이런 때일수록 더 엄격하게\n거리를 정비하죠!"
16003-220 = "이상한 녀석들이 거리에 가득…\n할로윈이란 이런 축제인가요?"
16003-240 = "……예쁘네요."
16003-250 = "여기서라면, 별을\n잡을 수 있을 것만 같아요."
16003-260 = "최근에는 이렇게 느긋하고,\n차분한 시간도\n보낼 수 있게 되었네요……"
16003-270 = "……선생님과\n만났을 무렵부터,\n인지도 모릅니다."
16003-280 = "……선생님."
16003-290 = "괜찮으시다면\n앞으로도 함께\n해주실 수 있을까요?"
16003-300 = "저는 언제나,\n재미없는 이야기를 계속 하게\n될지도 모르겠습니다만……"
16003-310 = "그래도 언젠가는 저도……"
16003-320 = "……네. 언젠가, 반드시."
16003-2600 = "역시 손에 익은 무기를\n사용하는 게 최고군요."

[translation]
16003-20 = "Does this count as a part of the Vigilante Crew's duties? I'll do what's necessary to uphold Trinity's peace."
16003-30 = "(It's so peaceful here.)"
16003-40 = "(Wow... This decoration is so cute.)"
16003-50 = "(Something this cute probably wouldn't look good on someone like me...)"
16003-60 = "The security here is exceptional. I can't find a single flaw."
16003-70 = "Breaks are also an important part of missions."
16003-80 = "Welcome, Sensei. I know you keep a busy schedule, but I'd like to see you more often...if possible."
16003-90 = "I've been waiting for you, Sensei. Let's hurry and start our patrol."
16003-100 = "Am I really that standoffish...?"
16003-110 = "You mean the Vigilante Crew? It's a tough job, but someone has do it."
16003-120 = "There's no time to rest."
16003-130 = "The best way to serve justice is one step at a time."
16003-140 = "Did I...make a mistake?"
16003-150 = "Happy birthday, Sensei."
16003-160 = "Today's your special day, so let's go for a walk instead of a patrol."
16003-170 = "My birthday has never been particularly important to me, but hearing Sensei wish me well..."
16003-180 = "...is something I could get used to."
16003-190 = "What's your New Year's resolution? Mine is to patrol with even more vigilance this year."
16003-200 = "It's the time before the holidays when everyone starts to relax a little."
16003-210 = "So we should be more vigilant than ever during our patrols."
16003-220 = "Are the streets always full of weird people during Halloween?"
16003-240 = "...It's beautiful."
16003-250 = "I feel like I could reach the stars from here."
16003-260 = "I've been enjoying these moments of reprieve lately..."
16003-270 = "I think it's been that way since I met you."
16003-280 = "...Sensei."
16003-290 = "Do you think we could hang out here and there?"
16003-300 = "I know I talk about boring stuff all the time, but..."
16003-310 = "Maybe someday, I'll..."
16003-320 = "...Yes, one day..."
16003-2600 = "It's always best to use a weapon you're comfortable with."

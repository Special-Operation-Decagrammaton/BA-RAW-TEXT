[translation]
16003-20 = "ส่วนหนึ่งของภารกิจของกลุ่มรักษาความสงบเหรอคะ...\nเพื่อความปลอดภัยของทรีนิตี้\nไม่ว่าเมื่อไรฉันก็ยินดีให้ความร่วมมือค่ะ"
16003-30 = "(ที่นี่เงียบสงบดีจังเลย)"
16003-40 = "(อ่า... ของตกแต่งอันนี้\nน่ารักจังเลย...)"
16003-50 = "(ของน่ารักๆ แบบนี้\nคงไม่เหมาะ\nกับฉันหรอกมั้ง...)"
16003-60 = "การรักษาความปลอดภัยที่นี่...\nยอดเยี่ยมมากเลยนะคะ\nอืม... ไม่มีที่ติเลย"
16003-70 = "การพักผ่อนก็เป็น\nส่วนหนึ่งของภารกิจค่ะ"
16003-80 = "เชิญค่ะ คุณครู\nฉันรู้ว่าคุณครูงานยุ่ง แต่ว่า...\nถ้าเราได้เจอกันบ่อยอีกนิด\nก็คงดีนะคะ"
16003-90 = "ฉันกำลังรอคุณครูอยู่เลยค่ะ\nรีบออกไปลาดตระเวนกันเถอะค่ะ"
16003-100 = "สีหน้าของฉันมัน...\nดูเย็นชางั้นเหรอคะ...?"
16003-110 = "งานของกลุ่มรักษาความสงบเหรอคะ?\nถึงอาจจะลำบากอยู่บ้าง...\nแต่ก็เป็นงานที่ใครสักคนต้องทำนี่คะ"
16003-120 = "ไม่มีเวลามามัวหยุดพักหรอกค่ะ"
16003-130 = "สิ่งสำคัญของความยุติธรรมคือ\nการเริ่มแก้ไขสิ่งเล็กๆ น้อยๆ\nไปทีละอย่างค่ะ"
16003-140 = "รู้สึกเหมือน... ฉันทำอะไรผิดไปเลย?"
16003-150 = "สุขสันต์วันเกิดค่ะ คุณครู"
16003-160 = "วันนี้เป็นวันเกิดของคุณครู\nพวกเราเดินเล่นกันแบบสบายๆ\nแทนการลาดตระเวนดีมั้ยคะ?"
16003-170 = "การฉลองวันเกิด ไม่ได้มี\nความหมายมากมายอะไรหรอกค่ะ\nแต่พอได้คำอวยพรจากคุณครูแบบนี้..."
16003-180 = "รู้สึกเหมือนได้สิ่งดีๆ มาเยอะแยะเลยค่ะ"
16003-190 = "เป้าหมายในปีนี้ของคุณครูคืออะไรเหรอคะ?\nฉันเอง... ก็จะพยายามออกลาดตระเวน\nให้ดียิ่งขึ้นค่ะ"
16003-200 = "ใกล้ถึงวันหยุดยาวแล้ว\nคงเป็นเวลาที่ทุกคนจะได้พักผ่อน\nอย่างสบายใจแล้วสินะคะ"
16003-210 = "ในช่วงเวลาแบบนี้ยิ่งต้อง\nออกตรวจตราตามถนนให้เข้มงวดขึ้นค่ะ!"
16003-220 = "มีผู้คนแปลกๆ อยู่เต็มถนนเลย...\nเทศกาลวันฮาโลวีนงั้นเหรอคะ?"
16003-240 = "สวยจังเลย..."
16003-250 = "ถ้าอยู่ที่นี่ละก็ รู้สึกเหมือน\nจะคว้าดวงดาวมาได้เลยค่ะ"
16003-260 = "ตอนนี้ก็ได้ใช้เวลาแบบสบายๆ\nไม่รีบร้อนแล้วนะคะ..."
16003-270 = "คงจะตั้งแต่...\nที่ฉันได้พบกับ\nคุณครูน่ะค่ะ..."
16003-280 = "คุณครูคะ..."
16003-290 = "ต่อจากนี้ไป\nช่วยมาใช้เวลาแบบนี้\nด้วยกันอีกได้มั้ยคะ?"
16003-300 = "ฉันน่ะ...\nอาจจะเผลอพูด\nเรื่องที่ไม่สนุกออกไปก็ได้..."
16003-310 = "แต่สักวันหนึ่ง ฉันเองก็..."
16003-320 = "ค่ะ สักวันหนึ่ง..."
16003-2600 = "การใช้อาวุธที่คุ้นเคย\nเป็นเรื่องที่ดีที่สุดแล้วจริงๆ ค่ะ"

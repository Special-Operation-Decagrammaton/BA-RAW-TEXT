[translation]
16003-20 = "是自衛隊任務的延伸對吧。\n如果是為了三一的安全，\n無論多久我都願意協助。"
16003-30 = "（這裡很和平呢）"
16003-40 = "（啊…這個裝飾，\n　好可愛…）"
16003-50 = "（這麼可愛的東西\n　應該不適合我…）"
16003-60 = "這個地方的治安…\n很優秀呢。\n找不到缺點。"
16003-70 = "休息也是任務的一部分。"
16003-80 = "歡迎你，老師。\n我知道你很忙，不過還是\n希望能盡可能跟你見面。"
16003-90 = "老師，我一直在等你。\n快跟我去巡邏吧。"
16003-100 = "我給人的印象\n有那麼冷漠嗎…？"
16003-110 = "自衛隊的活動是嗎？\n當然很累沒錯…\n不過這是必須有人\n去做的事。"
16003-120 = "沒時間休息了。"
16003-130 = "所謂的正義，\n從小事情開始\n導正是很重要的。"
16003-140 = "我做了什麼…失禮的事嗎？"
16003-150 = "祝您生日快樂，\n老師。"
16003-160 = "今天是老師的生日，\n以悠閒的散步\n代替巡邏如何呢？"
16003-170 = "雖然說紀念出生的日子\n沒有什麼重大的意義，\n但竟然能收到老師的祝福…"
16003-180 = "好像得到了\n很大的好處呢。"
16003-190 = "老師的新年目標是什麼呢？\n我的話…跟往常一樣\n要更努力巡邏。"
16003-200 = "連假近在眼前，\n是大家放鬆下來的時期呢。"
16003-210 = "這種時候，\n就該更嚴格的巡邏吧！"
16003-220 = "街上都是奇怪的傢伙…\n萬聖節是這種節慶嗎？"
16003-240 = "……真美呢。"
16003-250 = "在這裡，\n星星彷彿觸手可及。"
16003-260 = "最近可以像這樣，\n度過悠閒\n平靜的時光……"
16003-270 = "……或許是從遇見\n老師的那一刻開始的吧。"
16003-280 = "……老師。"
16003-290 = "如果可以的話，\n今後，還能和我\n待在一起嗎？"
16003-300 = "雖然我可能，\n還是會一直說些\n無趣的話……"
16003-310 = "不過總有一天，我也……"
16003-320 = "……嗯。\n總有一天，一定可以。"
16003-2600 = "果然用順手的武器\n感覺最棒了。"

[translation]
10046-10 = "Blue Archive!"
10046-20 = "นายท่าน! ฤดูร้อนค่ะ ทะเลค่ะ!\nอิซุนะค่ะ! มาเล่นสนุกด้วยกัน\nกับอิซุนะเยอะๆ เลยนะคะ นินนิน~!"
10046-30 = "ต่อไปพวกเราจะทำอะไรดีนะ?\nตีแตงโม? หรือเล่นสาดน้ำ~?\nอิซุนะอยากเล่นทั้งหมดเลยค่ะ~"
10046-40 = "อิซุนะ นินนิน~"
10046-50 = "ตอนนี้ท่านหัวหน้า\nกับท่านสึคุโยะ\nจะทำอะไรกันอยู่นะ~?"
10046-60 = "เคล็ดวิชานินจาอิซุนะฉบับฤดูร้อน\nเสร็จสมบูรณ์แล้วค่ะ อิซุนะควรรีบ\nคิดเคล็ดวิชาฉบับฤดูหนาวไว้แล้วล่ะ"
10046-70 = "แอร์นี่ยอดเลยนะคะ! ในฤดูร้อน\nก็ยังให้ลมเย็นแบบนี้ได้ตลอด\nนะ...แน่นอนว่าถ้าเป็นนินจาละก็\nร้อนแค่ไหนก็ทนได้อยู่แล้วละค่ะ~!"
10046-80 = "ฮิฮิฮิ เชิญเลยค่ะ นายท่าน!"
10046-90 = "ฤดูร้อนนี้ อิซุนะก็จะปกป้อง\nนายท่านเองค่ะ นินนิน!"
10046-100 = "นายท่าน! อิซุนะกำลังรออยู่เลยค่ะ!\nวันนี้เราจะทำอะไรกันดีคะ?"
10046-110 = "ในวันที่อากาศร้อนแบบนี้\nนายท่านเองก็คงพยายาม\nทำงานอย่างหนักอยู่สินะคะ...!"
10046-120 = "ถ้างั้นอิซุนะก็จะคอย\nเป็นกำลังใจให้เองค่ะ!"
10046-130 = "อืม~ อิซุนะ...\nจะทำอะไรเพื่อ\nนายท่านได้บ้างนะ...?"
10046-140 = "อ๊ะ ให้อิซุนะใช้วิชานินจา\nพัดความร้อนออกไป\nดีมั้ยคะ?"
10046-150 = "วิชานินจา! ลมเย็นสบาย~!\nฟู่ว~ ฟู่ววว~!"
10046-160 = "เกมตีแตงโม...\nก่อปราสาททราย...\nและที่ขาดไม่ได้คือบิงซูถั่วแดง!"
10046-170 = "อิซุนะ มีสิ่งที่อยากทำ\nร่วมกับนายท่านในฤดูร้อนนี้\nเต็มไปหมดเลยค่ะ~"
10046-180 = "ฉันดูมาจากคัมภีร์วิชานินจา\nเลยคิดว่าควรฝึกเคล็ดวิชาช่วยหายใจ\nเผื่อเกิดอุบัติเหตุในทะเลไว้ค่ะ!"
10046-190 = "เพราะงั้น นายท่านคะ\nนายท่านช่วยอิซุนะ\nฝึกเคล็ดวิชาช่วยหายใจได้มั้ยคะ?"
10046-200 = "อ๊ะ ตอนนี้นายท่านไม่ว่างสินะคะ?"
10046-210 = "เข้าใจแล้วค่ะ~!\nถ้างั้นอิซุนะจะรอ\nนายท่านอยู่ตรงนี้ค่ะ!"
10046-220 = "ถ้าคราวหน้ามีโอกาส\nฉันอยากมาเที่ยวทะเล\nพร้อมกับนายท่านแล้วก็...\nท่านหัวหน้าและท่านสึคุโยะด้วยค่ะ!"
10046-230 = "สุขสันต์วันเกิดค่ะ~!\nนายท่าน!"
10046-240 = "วันนี้เป็นวันพิเศษ!\nอิซุนะจะจัดการทุกอย่าง\nให้นายท่านเองค่ะ!"
10046-250 = "อิซุนะจะสร้างความทรงจำ\nที่ประทับใจจนลืมไม่ลง\nในฤดูร้อนให้นายท่านเองค่ะ!"
10046-260 = "คะ? ค่ะ! เข้าใจแล้วค่ะ!"
10046-270 = "ถ้างั้นอิซุนะจะคอยนั่งอยู่\nข้างๆ นายท่านเองค่ะ นินนิน!"
10046-280 = "วันนี้เป็นวันพิเศษ!\nวันนี้เป็นวันเกิดของอิซุนะค่ะ!"
10046-290 = "ฮิฮิฮิ... ขอบคุณค่ะ\nที่จำวันเกิดอิซุนะได้!"
10046-300 = "แค่นายท่านอวยพรวันเกิด\nให้แบบนี้ หัวใจของอิซุนะ\nก็พองโตนุ่มฟูแล้วค่ะ!"
10046-310 = "อิซุนะโชคดีมากเลยค่ะ\nขอบคุณมากๆ ค่ะ!"
10046-320 = "ขอให้มีความสุขในวันปีใหม่ค่ะ!"
10046-330 = "ได้ฉลองปีใหม่\nกับนายท่านอีกแบบนี้\nอิซุนะใจฟูมากเลยค่ะ!"
10046-340 = "ทั้งในฤดูร้อนนี้ และฤดูร้อนต่อไป\nก็มาเล่นกับอิซุนะเยอะๆ เลยนะคะ!"
10046-350 = "คริสต์มาสค่ะ นายท่าน!\nอิซุนะดีใจมากที่ได้อยู่กับ\nนายท่านในวันพิเศษแบบนี้"
10046-360 = "สำหรับอิซุนะแล้ว\nวันนี้เป็นวันที่พิเศษมากๆ\nเลยค่ะ!"
10046-370 = "คือว่า... แล้วนายท่าน\nรู้สึกยังไงบ้างคะ?"
10046-380 = "งั้นเหรอคะ? ฮิฮิฮิ\nดีใจจังเลยค่ะ"
10046-390 = "ฮาโลวีนละค่ะ นายท่าน!\nพอใส่ชุดแบบนี้มันเหมือนกับ...\nชุดเทศกาลฮาโลวีนมั้ยคะ?"
10046-400 = "ถ้างั้น... นายท่าน!\nทริก ออร์ ทรีตคะ...?"
10046-420 = "(ทำไมกันนะ ตั้งแต่...\nตอนที่นายท่านบอกว่า\nจะสอนอิซุนะว่ายน้ำ...)"
10046-430 = "(หัวใจของอิซุนะ มันก็เต้นแรง\nจนเหมือนจะระเบิดออกมาเลย...!)"
10046-440 = "(และเมื่อกี้ ตอนที่นายท่าน...\nจับมือของอิซุนะ... )"
10046-450 = "(แล้วก็... ตรงอื่นที่นายท่านสัมผัส\nไม่รู้ทำไม จู่ๆ ก็รู้สึกร้อนๆ ขึ้นมา...)"
10046-460 = "คือว่า...นายท่านคะ\nเมื่อกี้นี้น่ะ คือว่าฉันแค่\nรู้สึกตกใจนิดหน่อยน่ะค่ะ..."
10046-470 = "วันนี้อิซุนะรู้สึก...\nมีความสุขมากๆ เลยค่ะ!"
10046-480 = "เพราะงั้นแล้ว คือว่า...\nจะว่ายังไงดีล่ะคะ คือว่า...!"
10046-490 = "ถ้านายท่านไม่ว่าอะไร\nฉันจะขอรบกวนนายท่านอีก..."
10046-500 = "เอาไว้คราวหน้านายท่าน\nช่วยสอนเรื่องการว่ายน้ำ\nให้ฉันอีกได้มั้ยคะ?"
10046-510 = "ฮิฮิฮิ... ค่ะ\nขอบคุณค่ะ!"
10046-520 = "หลังจากนี้ก็ขอรบกวนด้วยนะคะ\nนายท่าน!"
10046-2600 = "นายท่านอุตส่าห์เตรียมอุปกรณ์\nนินจาสำหรับฤดูร้อนมาให้อิซุนะ...!\nอิซุนะดีใจมากค่ะ นายท่าน\nจากนี้ไปอิซุนะจะพยายามเต็มที่\nเพื่อตอบแทนนายท่านค่ะ ฮิฮิฮิ!"

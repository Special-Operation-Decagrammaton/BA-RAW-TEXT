[translation]
10046-10 = "蔚藍檔案──！"
10046-20 = "主公！是夏天，是大海，是伊樹菜！\n會和伊樹菜一起，盡情的玩吧！？\n忍忍！"
10046-30 = "接下來要玩什麼呢？\n打西瓜嗎？水槍嗎？\n不管是哪個伊樹菜都好期待！"
10046-40 = "伊樹菜伊樹菜～\n♪～♪～♪～"
10046-50 = "部長和月夜大人，\n現在在做什麼呢？"
10046-60 = "伊樹菜流忍術・夏季版本\n已經完成了\n接下來也必須考慮冬季版本呢…"
10046-70 = "冷氣真厲害呢！\n沒想到夏天也能這麼涼快……！\n當，當然！這種程度忍者可以忍受！"
10046-80 = "耶嘿嘿！\n歡迎回來，主公！"
10046-90 = "這個夏天，伊樹菜\n也會保護主公的哦！\n忍忍！"
10046-100 = "主公！伊樹菜，\n恭候多時了！\n今天要來玩什麼呢？"
10046-110 = "即使在這種炎熱的天氣，\n主公也在工作呢…！"
10046-120 = "那麼不才伊樹菜！\n會在身邊為您應援！"
10046-130 = "嗯…伊樹菜能為主公做的事…"
10046-140 = "啊，用伊樹菜的忍術\n將炎熱吹走如何！"
10046-150 = "忍術！微風之術！！\n呼～，呼～！"
10046-160 = "打西瓜，用沙子堆城堡，\n還有最重要的刨冰！"
10046-170 = "伊樹菜，在這個夏天\n有好多想和主公一起\n享受的事情！"
10046-180 = "雖然是在忍術圖鑑中看見的，\n為了應對海邊的事故，先學會\n「人工呼吸之術」似乎比較好！"
10046-190 = "所以主公，可以請您協助\n「人工呼吸之術」的學習嗎？"
10046-200 = "…啊，現在有點困難嗎！"
10046-210 = "知道了！那麼伊樹菜，\n會在這裡等候著！"
10046-220 = "下次想和部長及月夜閣下\n還有主公，大家一起去海邊玩！"
10046-230 = "祝您生日快樂，主公！"
10046-240 = "因為今天是特別的日子，\n所以請全都交給伊樹菜！"
10046-250 = "要讓今天成為不輸給\n夏日回憶的，美好的一天！"
10046-260 = "…咦？是！明白了。"
10046-270 = "那麼伊樹菜，會先全力地\n坐在主公的身旁哦！忍忍！"
10046-280 = "對了！今天是\n伊樹菜的生日！"
10046-290 = "耶嘿嘿，\n謝謝您記得！"
10046-300 = "光是主公為伊樹菜慶祝，\n伊樹菜的內心就變得非常溫暖！"
10046-310 = "…伊樹菜是個幸福的人。\n真的，非常謝謝您！"
10046-320 = "新年快樂！"
10046-330 = "沒想到\n又能和主公一起\n迎接新年，\n伊樹菜好感激！"
10046-340 = "這次的夏天，\n還有下個夏天也是！\n和伊樹菜一起\n盡情玩耍吧！"
10046-350 = "是聖誕節唷！主公！\n沒想到今天這一天\n可以和主公一起度過…"
10046-360 = "對伊樹菜來說，\n今天似乎會成為\n非常特別的日子！"
10046-370 = "那個…主公覺得呢？"
10046-380 = "…是這樣嗎，\n耶嘿嘿，好開心。"
10046-390 = "是萬聖節呢，主公！\n這個打扮，\n也看起來像變裝嗎？"
10046-400 = "這樣的話…主公，\n不給糖就搗蛋！"
10046-420 = "（究竟是為什麼呢…\n　自從主公說要教\n　伊樹菜游泳的瞬間…）"
10046-430 = "（伊樹菜的心臟，\n　就跳得…非常厲害…)"
10046-440 = "（剛才被主公握住的，\n　伊樹菜的手…"
10046-450 = "還有其他被主公\n觸碰到的地方，\n感覺有些熾熱…）"
10046-460 = "那個，主公。\n剛才那個，雖然\n有些手忙腳亂…"
10046-470 = "不過今天一天…\n伊樹菜非常的開心，\n非常幸福！"
10046-480 = "所以，就是…\n該怎麼說呢那個…！"
10046-490 = "如果可以，稍微\n說點任性的話…"
10046-500 = "下次可以…再教一次\n伊樹菜游泳嗎？"
10046-510 = "耶嘿嘿…好的，\n非常感謝！"
10046-520 = "伊樹菜，今後也要\n請您多多指教囉！主公！"
10046-2600 = "主公親自準備的…\n為了伊樹菜的夏季用忍具…！\n好開心，主公！伊樹菜，\n今後也會為了回應主公的期待，\n盡全力的哦！耶嘿嘿！"

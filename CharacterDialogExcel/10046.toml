[translation]
10046-10 = "블루 아카이브-!"
10046-20 = "주군! 여름이에요! 바다예요! 이즈나예요!\n이즈나와 함께, 잔뜩 놀아주실 거죠?!\n닌닌~!"
10046-30 = "다음엔 무엇을\n하고 놀까요?\n수박 깨기? 물총\n싸움~? 이즈나,\n전부 기대돼요~"
10046-40 = "이즈나이즈나~\n캥캥~♪"
10046-50 = "부장과 츠쿠요\n공은, 지금쯤 무얼\n하고 있을까요~?"
10046-60 = "이즈나류 인법의 여름\n버전은 완성되었지만,\n다음은 겨울 버전도\n생각해둬야겠네요…"
10046-70 = "에어컨이란 건 굉장하네요!\n여름에도 이렇게나\n시원하다니~ 무, 물론!\n닌자라면 이런 더위쯤은\n참을 수 있지만요~!"
10046-80 = "에헤헷!\n어서 오세요! 주군!"
10046-90 = "이번 여름도 이즈나는\n주군을 지키겠습니다!\n닌닌!"
10046-100 = "주군! 이즈나,\n기다리고 있었습니다!\n오늘은 무얼 하고 놀까요?"
10046-110 = "이렇게나 더운 날에도\n주군은 열심히\n일을 하시는 거군요…!"
10046-120 = "그럼 불초 이즈나!\n옆에서 응원할게요!"
10046-130 = "으~음, 이즈나가\n주군을 위해\n할 수 있는 일…"
10046-140 = "아, 이즈나의 인법으로\n더위를 날려버리는 건\n어떨까요!"
10046-150 = "인법! 산들바람의 술~!\n후~ 후우~!"
10046-160 = "수박 깨기,\n모래성 만들기, 그리고\n뭐니 뭐니 해도 팥빙수!"
10046-170 = "이즈나,\n이번 여름에 주군과\n함께 하고 싶은 게\n잔뜩이에요~"
10046-180 = "인법도감에서 봤습니다만,\n바다의 사고에 대비해서\n「인공호흡의 술」을 익혀두면\n좋다는 모양이에요!"
10046-190 = "그래서 말이지만 주군,\n「인공호흡의 술」을 배우는 걸\n도와주시지 않겠나요?"
10046-200 = "…아, 지금은 조금\n곤란하신 거군요!"
10046-210 = "알겠습니다!\n그럼 이즈나, 여기서\n기다리고 있겠습니다!"
10046-220 = "다음번엔\n부장과 츠쿠요 공.\n그리고 주군과 다 같이\n바다에 놀러 가고 싶어요!"
10046-230 = "생일 축하드려요!\n주군!"
10046-240 = "오늘은 특별한 날이니까!\n모든 걸 이즈나에게\n맡겨주세요!"
10046-250 = "여름의 추억에 못지 않은,\n멋진 날로 만들어 보겠습니다!"
10046-260 = "…네? 넷! 알겠습니다!"
10046-270 = "그러면 이즈나, 우선은\n전력으로 주군 곁에\n앉아 있을게요! 닌닌-!"
10046-280 = "그랬네요!\n오늘은 이즈나의\n생일이었습니다!"
10046-290 = "에헤헷, 기억해주셔서\n감사합니다!"
10046-300 = "주군이 축하해\n주시는 것만으로도,\n마음이 엄청\n따끈따끈해져요!"
10046-310 = "…이즈나는 행운아네요!\n정말로 감사합니다!"
10046-320 = "새해 복 많이 받으세요!"
10046-330 = "주군과 함께 다시\n새해를 맞이할 수 있다니,\n이즈나 감격했어요!"
10046-340 = "이번 여름에도, 그다음에도!\n이즈나와 함께 잔뜩 놀아요!"
10046-350 = "크리스마스네요! 주군!\n오늘 같은 날을 주군과\n함께 할 수 있다니,"
10046-360 = "이즈나에게 오늘은,\n무척 특별한 날이\n될 거예요!"
10046-370 = "저… 주군은\n어떠신가요?"
10046-380 = "…그런가요?\n에헤헷, 기쁘네요."
10046-390 = "할로윈이에요. 주군!\n이 모습도, 할로윈 변장처럼\n보일까요?"
10046-400 = "만약 그렇다면… 주군!\n트릭 오어 트릿-이에요!"
10046-420 = "(어째서일까요. 주군이,\n수영을 가르쳐준다고\n했을 때부터)"
10046-430 = "(이즈나의 가슴이,\n엄청… 콩닥거리고 있어요…!)"
10046-440 = "(아까 전에\n주군께서 잡아주셨던,\n이즈나의 손이…"
10046-450 = "그것 말고도 주군께서\n건드린 부분이,\n어째선지 조금 뜨거워서…)"
10046-460 = "저기, 주군.\n아까 전엔 그게,\n조금 당황했습니다만…"
10046-470 = "오늘 하루…\n이즈나는 엄청\n즐겁고! 행복했어요!"
10046-480 = "그러니까, 그…\n뭐라고 해야할까요.\n그게…!"
10046-490 = "조금만, 억지를\n부려도 괜찮다면…"
10046-500 = "다음에 또…\n한 번 더 수영을,\n가르쳐주시지 않을래요?"
10046-510 = "에헤헷… 네,\n감사합니다!"
10046-520 = "이즈나를, 앞으로도\n잘 부탁드려요! 주군!"
10046-2600 = "주군께서 직접 준비해주신…\n이즈나를 위한 여름용 닌자도구…!\n기뻐요! 주군! 이즈나! 앞으로도\n주군의 기대에 부응하기 위해!\n전력을 다하겠습니다! 에헤헷!"

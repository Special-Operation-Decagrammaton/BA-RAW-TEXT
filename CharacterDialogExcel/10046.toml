[translation]
10046-10 = "Blue Archive!"
10046-20 = "My lord, it's summer! We're on the beach! Can you play with Izuna?! Nin nin!"
10046-30 = "What should we play next? Watermelon crush? Water guns? Izuna is excited about everything!"
10046-40 = "Izuna, on the lookout! ♪"
10046-50 = "What do you think the president and Tsukuyo are doing right now?"
10046-60 = "The Izuna-Style Ninjutsu: Summer Version is complete! Izuna should consider a winter version too."
10046-70 = "AC is so wonderful! Izuna can't believe it can keep her cool in this heat! I-Izuna means, a ninja can withstand this kind of heat without a problem!"
10046-80 = "Heeheehee! Welcome, my lord!"
10046-90 = "This summer, I'll protect you as I always do, my lord! Nin nin!"
10046-100 = "My lord! I've been waiting for you! What should we do today?"
10046-110 = "You're working so hard, even on such a hot day, my lord...!"
10046-120 = "Though I'm unworthy, I'll support you!"
10046-130 = "Umm, is there anything I can do for you, my lord...?"
10046-140 = "Oh, how about I use Izuna-style ninjutsu to defeat this heat?!"
10046-150 = "Ninjutsu Breeze technique! *blowing*"
10046-160 = "Crushing watermelons, building sand castles, and most importantly, eating shaved ice!"
10046-170 = "I have so many things I want to do with you this summer!"
10046-180 = "I saw in the ninjutsu codex that it's good to learn the CPR technique just in case there's an accident at sea!"
10046-190 = "So, my lord, can you help me learn CPR?"
10046-200 = "...Oh, are you not available right now?"
10046-210 = "Okay! Then I'll wait for you right here!"
10046-220 = "When we have a chance next time, I'd love to play at the beach with the president, Tsukuyo, and you, my lord!"
10046-230 = "Happy birthday! My lord!"
10046-240 = "Today is a special day! Let me take care of everything!"
10046-250 = "I'll make your day even more spectacular than the greatest summer memory!"
10046-260 = "...Huh? Yes, I got it!"
10046-270 = "Then, first I'll do my absolute best to sit next to you! Nin nin!"
10046-280 = "Right! Today is my birthday!"
10046-290 = "Heeheehee, thank you for remembering!"
10046-300 = "It warms my heart to hear you wish me happy birthday!"
10046-310 = "...I'm so lucky! Thank you so much!"
10046-320 = "Happy New Year!"
10046-330 = "I can't believe I get to welcome the new year with you. I'm so moved!"
10046-340 = "This summer, and the next one! Let's have lots of fun together!"
10046-350 = "It's Christmas, my lord! I can't believe I get to spend time with you today."
10046-360 = "It's gonna be such a special day for me!"
10046-370 = "Um... What do you think, my lord?"
10046-380 = "...Really? Heehee, I'm so happy."
10046-390 = "It's Halloween, my lord! Does it look like I'm wearing a Halloween costume?"
10046-400 = "If it does... My lord! Trick or treat!"
10046-420 = "(Wh-What is this? Since you said you'd teach me how to swim...)"
10046-430 = "(My heart has been...beating so fast?!)"
10046-440 = "(When you held my hands before...my hands felt so warm...)"
10046-450 = "And the other part you touched...somehow felt a little warm too...)"
10046-460 = "Um, my lord. About before, um...I was a bit embarrassed, but..."
10046-470 = "Today...was such a fun and happy day!"
10046-480 = "So, um... What should I say? Umm...!"
10046-490 = "If you don't mind me asking..."
10046-500 = "Would you be willing to...teach me how to swim one more time?"
10046-510 = "Heeheehee... Okay. Thank you!"
10046-520 = "I'll be counting on you! My lord!"
10046-2600 = "You prepared a summer ninja tool just for Izuna! Izuna is so happy, my lord! Izuna will do her best to live up to your expectations! Heeheehee!"

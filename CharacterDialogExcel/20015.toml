[translation]
20015-10 = "Blue~~ Archive!"
20015-20 = "มาสคอตแห่งชมรมฝึกฝน! ปาป๊าม~ ปรากฏตัวแล้ว!\nรอฉันอยู่ใช่ไหม คุณครู! แล้ววันนี้เราจะเล่นอะไรกันดีล่ะ?"
20015-30 = "ฮู่ว... ง่วงจัง...\nตาจะปิดแล้ว... Zzz..."
20015-40 = "ถ้าตามการสำรวจของฉันแล้ว...!\nที่นี่เป็นสถานที่ที่เหมาะ\nที่จะเล่นไล่จับที่สุด"
20015-50 = "ฮืมฮื้ม~♪\nนี่ๆ~! วันนี้เราจะเล่นอะไรกันดี?!"
20015-60 = "ได้ยินมาจากทีวีว่าการพักผ่อน\nก็เป็นเรื่องสำคัญในการเป็น\nเลดี้ที่เพียบพร้อม...!"
20015-70 = "รุ่นพี่สึบากิ\nกับรุ่นพี่มิโมริ\nตอนนี้กำลังทำอะไรกันอยู่น้า~"
20015-80 = "อ๊ะ คุณครู!\nรออยู่เลย รออยู่เลย!\nวันนี้เราเล่นอะไรกันดีล่ะ?"
20015-90 = "คุณครู มาช้านะ~!\nตอนนี้ <มูชิควีน>\nเริ่มไปแล้วนะ?!"
20015-100 = "วันนี้เราจะเล่นอะไรกันดี...?"
20015-110 = "นะ...แน่นอนว่าฉันจะทำการบ้าน\nด้วยนะ!"
20015-120 = "การฝึกฝนเป็นเรื่องสำคัญ\nต่อการเป็นเลดี้ที่เพียบพร้อม!"
20015-130 = "หืม? ฝึกฝนแบบไหนน่ะเหรอ?"
20015-140 = "ก่อนอื่นวันนี้...\nจะต้องกระโดดเชือก\nให้ได้ 100 ครั้ง!"
20015-150 = "อ๊ะ คุณครูรู้อยู่แล้วเหรอ?\nว่าที่คิโวทอสก็มีฮีโร่\nแห่งความยุติธรรมอยู่น่ะ!"
20015-160 = "พวกไคเทน... อะไรสักอย่าง"
20015-170 = "หืม? ไม่ใช่ฮีโร่แห่งความยุติธรรมเหรอ?\nอ้าว ไม่ใช่หรอกเหรอ?"
20015-180 = "หืม... เรื่องของผู้ใหญ่เหรอ?\nเข้าใจยากจังเลยน้า~"
20015-190 = "วันนี้ก็ทำงานเหรอ คุณครู?\nการทำงาน... สนุกขนาดนั้นเลยเหรอ?"
20015-200 = "เอ๋...? คุณครู?\nทำไมทำหน้าหดหู่แบบนั้นล่ะ?"
20015-210 = "เป็นอะไรรึเปล่า...?!\nรู้สึกผิดเลย..."
20015-220 = "ไม่ต้องห่วง\nมีฉันอยู่ทั้งคนนะ!"
20015-230 = "นี่ก็เป็นการฝึกอย่างหนึ่ง\nเพื่อการเป็นเลดี้ที่เพียบพร้อม!"
20015-240 = "วันนี้คาเอเดะ\nจะเป็นเลขาให้คุณครูเอง!\nฮิฮิฮิ! ดีใจใช่มั้ยล่ะ?"
20015-250 = "อ๊ะ คุณครู!\nสุขสันต์วันเกิดนะ!"
20015-260 = "เอ้านี่! ของขวัญสุดพิเศษ\nที่ฉันเตรียมมาในวันนี้!"
20015-270 = "หืม? ข้างในมีอะไรงั้นเหรอ?\nจั๊กจั่นที่ฉันจับได้เมื่อคราวที่แล้วน่ะ!"
20015-280 = "เอ้า รีบๆ เปิดดูสิ!"
20015-290 = "เอ๋ สุขสันต์วันเกิดงั้นเหรอ?"
20015-300 = "อื้อ ขอบคุณนะ คุณครู!\nแบบนี้ฉันก็คงจะเข้าใกล้ความเป็น\nเลดี้ที่เพียบพร้อมไปอีกขั้นแล้วใช่มั้ย?"
20015-310 = "ถ้าเป็นแบบนั้นก็ดีนะ!"
20015-320 = "สวัสดีปีใหม่--! คุณครู!"
20015-330 = "หืม? ให้เงินปีใหม่เหรอ? จริงเหรอ...?!"
20015-340 = "ไชโยยยย-! ชอบคุณครูที่สุดเลย!"
20015-350 = "เมอร์รี คริสต์มาส~!\nฉันจะเรียกรุ่นพี่มิโมริกับ\nรุ่นพี่สึบากิมา"
20015-360 = "แล้วจัดปาร์ตี้ด้วยกันดีกว่า!\nอยากกินไก่ทอดแล้ว~!"
20015-370 = "คราวก่อนฉันเห็นจากทีวี...\nเทศกาลที่เรียกว่าฮาโลวีน...\nเป็นการสมรู้ร่วมคิดกัน\nของบริษัทลูกกวาดล่ะ!"
20015-380 = "มาหลอกใช้ความฝันอันบริสุทธิ์\nยกโทษให้ไม่ได้!\nฉันไม่เห็นด้วยอย่างสุดขั้ว!"
20015-390 = "หืม...? ขนมอันนี้...\nให้ฉันเหรอ?"
20015-400 = "ว้าว~!\nฮิฮิฮิ! ขอบคุณนะ!"
20015-420 = "ฮิฮิ..."
20015-430 = "ไม่รู้ทำไมวันนี้...\nถึงมีเรื่องมากมายเกิดขึ้นเต็มไปหมด"
20015-440 = "เป็นวันที่ยุ่งมาก...\nจนหัวหมุนทั้งวันเลย..."
20015-450 = "วันนี้เพราะมีคุณครูอยู่คอยช่วย...\nฉันอาจเข้าใกล้การเป็นเลดี้\nที่เพียบพร้อมอีกหนึ่งก้าวแล้วก็ได้?!"
20015-460 = "ขอบคุณนะ! คุณครู!"
20015-470 = "ที่ไม่ว่าเมื่อไร\nก็คอยช่วยเหลือฉันตลอด!"
20015-480 = "จริงเหรอ?! เข้าใจแล้ว!"
20015-490 = "ถ้างั้นฉันจะใส่ความรู้สึกขอบคุณ\nทั้งหมดลงไปในการโจมตีครั้งนี้\nเลยแล้วกัน!"
20015-500 = "รับไปซะ ท่าไม้ตายของ\n<แรบบิท ดริลฮอร์น ระดับ UR>\nดริล อิมแพ็ก-!!"
20015-510 = "ฮิฮิฮิ!"
20015-2600 = "ว้าววว เท่สุดๆ... ฮิฮิ... โอ้...\nว้าว... แบบนี้จะแข็งแกร่งขึ้น\nได้อีกใช่มั้ย? ฮิฮิฮิ!\nฉันแข็งแกร่งกว่าเดิมแล้ว!\nคุณครู ขอบคุณนะ-!"

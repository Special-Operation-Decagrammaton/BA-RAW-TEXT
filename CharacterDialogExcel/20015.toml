[translation]
20015-10 = "蔚藍～～檔案！"
20015-20 = "修行部的吉祥物，鏗鏘登場！\n久等了老師！所以，今天要做什麼呢？"
20015-30 = "呼啊，好睏……\n眼睛，已經……\n嗯呣……"
20015-40 = "根據我的測定……\n這裡是，最適合\n捉迷藏的地方！"
20015-50 = "哼哼～♪\n吶吶，\n今天要做什麼？"
20015-60 = "為了成為出色的淑女，\n休息也是很重要的……！\n之前在電視看到的！"
20015-70 = "椿前輩和三森前輩\n現在在做什麼呢～"
20015-80 = "啊，老師！\n我等好久了！\n今天要做什麼？"
20015-90 = "老師好慢！\n『甲蟲皇后』已經開始了唷！？"
20015-100 = "今天要玩什麼……"
20015-110 = "當，當然也會寫作業！"
20015-120 = "為了成為出色的淑女，\n每天的鍛鍊是必須的！"
20015-130 = "咦，鍛鍊的內容？"
20015-140 = "今天先來個\n跳繩100次！"
20015-150 = "啊，老師知道嗎？\n奇普托斯也有正義的英雄耶！"
20015-160 = "記得是，凱坦……\n什麼來著？"
20015-170 = "咦，不是正義的英雄嗎？\n有點不一樣？"
20015-180 = "……唔嗯，有什麼\n大人的原因嗎？真難懂呢。"
20015-190 = "老師今天也要工作？\n工作，有那麼有趣？"
20015-200 = "……咦，老師？\n為什麼露出那種表情？"
20015-210 = "還，還好嗎……！？\n總覺得很抱歉……"
20015-220 = "不用擔心，\n我會陪著老師的！"
20015-230 = "這也是將來，為了成為\n出色淑女的訓練。"
20015-240 = "今天就由我，\n來當老師的秘書！\n耶嘿嘿！開心嗎？"
20015-250 = "啊，老師！\n生日快樂！"
20015-260 = "是的！為了今天準備的，\n來自我特別的生日禮物！"
20015-270 = "咦，內容物？\n是我之前抓到的蟬唷！"
20015-280 = "好了好了，快點打開！"
20015-290 = "咦，生日？"
20015-300 = "嗯，謝謝～老師！\n這樣一來，我也朝著\n出色的淑女邁進一步了嗎？"
20015-310 = "如果有就好了！"
20015-320 = "新年快樂，老師！"
20015-330 = "咦，要給我壓歲錢嗎？\n真的？"
20015-340 = "太好了～～！最喜歡老師了！"
20015-350 = "聖誕快樂～！\n叫上椿前輩和三森前輩，"
20015-360 = "大家一起開派對吧！\n想趕快吃烤雞！"
20015-370 = "之前，在電視上看到……\n聽說萬聖節，是糖果製造商的陰謀！"
20015-380 = "竟然利用純粹的夢想\n不可原諒！斷然反對！"
20015-390 = "……咦？這個糖果，\n要給我嗎？"
20015-400 = "太好了～！\n欸嘿嘿，謝謝！"
20015-420 = "……呵呵。"
20015-430 = "總覺得今天，\n發生了好多事喔。"
20015-440 = "雖然是個令人\n暈頭轉向的一天……"
20015-450 = "但多虧了老師，\n我好像又朝完美淑女\n更進一步了！？"
20015-460 = "謝謝你，老師！"
20015-470 = "謝謝你，\n總是幫助我！"
20015-480 = "真的嗎！？太好了！"
20015-490 = "那麼，我就用這喜悅的心情\n……向老師發動攻擊！"
20015-500 = "接招吧，「鑽魂兔．究級體」的\n鑽頭衝擊──！！"
20015-510 = "嘻嘻嘻！"
20015-2600 = "唔哦～好帥……嘿……哦哦……\n哇……這個，該不會是可以\n變得更強的東西？啊哈哈！\n我，似乎更加PowerUp了！\n老師，謝謝你～！"

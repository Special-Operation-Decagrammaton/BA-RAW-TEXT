[translation]
20015-10 = "블루~~ 아카이브!"
20015-20 = "수행부의 마스코트, 빠밤! 하고 등장!\n기다렸지. 선생님! 그럼 오늘은 뭘 하고 놀까?"
20015-30 = "후아, 졸려…\n눈이, 더는…\n으므……"
20015-40 = "내 측정에 의하면……\n여기는, 술래잡기에\n최적인 장소!"
20015-50 = "흥흥~♪\n저기저기, 오늘은 뭐해?"
20015-60 = "멋진 레이디가 되기 위해선,\n휴식도 중요한 법…!\n이라고 하는 걸 TV에서 봤어."
20015-70 = "츠바키 선배랑\n미모리 선배.\n지금쯤 뭘 하고 있으려나~"
20015-80 = "앗, 선생님!\n기다렸어, 기다렸어!\n오늘은 뭘 할 거야?"
20015-90 = "선생님! 늦었잖아~!\n벌써 <무시퀸>\n시작해버렸다구?!"
20015-100 = "오늘은 뭘 하고 놀면…"
20015-110 = "무, 물론 숙제도 할 거니까!"
20015-120 = "멋진 레이디가 되기 위해,\n매일매일 단련이 필수야!"
20015-130 = "응? 무슨 단련이냐고?"
20015-140 = "오늘은 일단,\n줄넘기 100번!"
20015-150 = "아, 선생님 알고 있어?\n키보토스에는 정의의\n히어로라는 게 있대!"
20015-160 = "그러니까, 카이텐… 뭐더라?"
20015-170 = "응? 정의의 히어로가\n아니야? 조금 달라?"
20015-180 = "…으-음, 뭔가 어른의\n사정 같은 거야? 어렵네~"
20015-190 = "선생님은 오늘도 일이야?\n일이라는 거, 그렇게 재밌어?"
20015-200 = "…어? 선생님?\n왜 그런 얼굴을 하는 거야?"
20015-210 = "괘, 괜찮아…?!\n뭔가, 미안…"
20015-220 = "걱정 마,\n내가 있으니까!"
20015-230 = "이것도 나중에 멋진 레이디가\n되기 위한 훈련이니까."
20015-240 = "오늘은 내가\n선생님의 비서가 되어줄게!\n에헤헷! 기쁘지?"
20015-250 = "앗, 선생님!\n생일 축하해!"
20015-260 = "자, 여기! 오늘을 위해\n준비한, 내 특제 생일 선물!"
20015-270 = "응? 내용물이 뭐냐고?\n내가 저번에 잡은 매미야!"
20015-280 = "자자, 빨리 열어봐!"
20015-290 = "어, 생일 축하한다고?"
20015-300 = "응, 고마워- 선생님!\n이걸로 나도 멋진 레이디에\n한 걸음 더 가까워졌을까?"
20015-310 = "그랬으면 좋겠다!"
20015-320 = "새해 복 많이 받아-! 선생님!"
20015-330 = "응? 세뱃돈을 준다고? 정말?!"
20015-340 = "앗싸-! 선생님이 제일로 좋아!"
20015-350 = "메리 크리스마스~!\n츠바키 선배랑 미모리\n선배를 불러서."
20015-360 = "다 같이 파티를 하자!\n빨리 치킨 먹고 싶어~!"
20015-370 = "저번에, TV에서 봤는데…\n할로윈이라는 건,\n제과 회사의 음모래!"
20015-380 = "순수한 꿈을 이용하다니!\n용서할 수 없어!\n단호하게 반대야!"
20015-390 = "...응? 이 과자,\n나 주는 거야?"
20015-400 = "와아~!\n에헤헷! 고마워!"
20015-420 = "……후후."
20015-430 = "왠지 오늘은,\n어-엄청 많은 일들이 있었네."
20015-440 = "무지 정신없는\n하루였지만……"
20015-450 = "오늘 선생님 덕분에,\n또 한 걸음. 멋진 레이디에\n가까워졌을지도?!"
20015-460 = "고마워! 선생님!"
20015-470 = "항상 날 도와줘서!"
20015-480 = "진짜?! 알았어!"
20015-490 = "그럼 이 기쁜 마음을\n듬뿍 담아, 선생님한테\n공격이야!"
20015-500 = "받아라,\n<드릴혼 토끼 · 궁극체>의\n드릴 임팩트-!!"
20015-510 = "니히힛!"
20015-2600 = "우오- 멋있어… 헤에… 오오…\n와아… 이거, 혹시 더 강해질 수\n있는 거야? 아하핫,\n나, 더욱더 파워업해버릴 것 같아!\n선생님, 고마워-!"

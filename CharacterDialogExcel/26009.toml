[translation]
26009-10 = "蔚藍……檔案……"
26009-20 = "我是花岡柚子……\n因為各種原因……所以現在打扮成這樣。\n還請，多多指教……"
26009-30 = "現在的我是女僕……\n要去打掃一下嗎……"
26009-40 = "會做遊戲的\n女僕……\n說不定很新奇？"
26009-50 = "嗚嗚……好想\n找地方躲起來……"
26009-60 = "紙箱雖然是\n潛入的必備道具……"
26009-70 = "歡迎回來，主人。\n嗚嗚，果然很害羞……"
26009-80 = "噫呀！？是，是誰！？"
26009-90 = "啊，是老師啊，\n太好了……歡迎回來。"
26009-100 = "老師，我一直在等你……"
26009-110 = "看到你來我很開心。"
26009-120 = "雖然我不是\n很擅長打掃……"
26009-130 = "如果是，老師的請求……"
26009-140 = "咦？很適合我嗎？"
26009-150 = "真是的……\n請不要捉弄我！"
26009-160 = "……如，如果\n你說是真心的\n那就當作是吧……"
26009-170 = "為什麼貓耳\n和女僕裝這麼適合呢？"
26009-180 = "貓比起女僕好像\n更偏向主人那邊……"
26009-190 = "這個……說不定\n能當作遊戲的參考。"
26009-200 = "這件衣服飾邊很多……\n好害羞……"
26009-210 = "生，生日快樂，主人。"
26009-220 = "開，開玩笑的……\n畢竟我是女僕。"
26009-230 = "我的生日，\n你記得嗎？謝謝你。"
26009-240 = "那個……不特別\n做什麼也沒關係。"
26009-250 = "和老師……不對，\n和主人在一起\n就是最幸福的了。"
26009-260 = "總，總之就是\n這樣的設定……！"
26009-270 = "新年快樂，主人。"
26009-280 = "……果，果然還是\n用老師來稱呼比較好吧？"
26009-290 = "聖誕老人好像\n會從煙囪進來……"
26009-300 = "雖然遊戲開發部\n沒有煙囪……"
26009-310 = "有機會的話\n我想進去看看。"
26009-320 = "感覺會很舒服，\n待起來很棒……"
26009-330 = "萬聖節……"
26009-340 = "是變裝過的人會\n充滿街道的節日呢。"
26009-350 = "對我來說，\n該說果然無緣嗎……"
26009-360 = "如果是遊戲活動的話……\n倒是常常參加。"
26009-380 = "那個，這個是……"
26009-390 = "好像是在我睡覺的時候，\n跑進來的……"
26009-400 = "那個……因為休息室裡\n還有其他人……"
26009-410 = "只要坐在那裡，\n就會有人來搭話……"
26009-420 = "「緞帶是在哪買的？」 或是，"
26009-430 = "「放假都在做什麼？」 \n之類的……"
26009-440 = "會被問各種問題，\n所以就下意識地逃跑了……"
26009-450 = "而我找到的，\n就是這裡……"
26009-460 = "沒想到……\n居然會是貓咪的休息室……"
26009-470 = "噫呀！？\n請，請等一下！"
26009-480 = "我出去！\n現，現在就出去……\n好癢！"
26009-2600 = "居，居然為我\n做到這種程度……怎麼會……\n我真的非常開心。\n……我，會更努力的。\n……請看著我哦，老師！"

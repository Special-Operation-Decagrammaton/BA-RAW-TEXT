[translation]
26009-10 = "Blue... Archive..."
26009-20 = "ฉันคือ... ฮานาโอกะ ยูสึค่ะ\nพอดีฉันมีเหตุจำเป็น... ก็เลยได้ใส่ชุดแบบนี้ค่ะ\nฝากตัวด้วยนะคะ..."
26009-30 = "ในเมื่อตอนนี้ฉันเป็นเมด...\nไปทำความสะอาด\nสักหน่อยดีมั้ยนะ..."
26009-40 = "เมดที่สร้างเกม\nก็น่าจะ...\nแปลกใหม่ดีนะ?"
26009-50 = "งือ...\nอยากไปซ่อนตัว\nที่ไหนสักที่จัง..."
26009-60 = "กล่องกระดาษแข็งนี่...\nต้องเอาไว้ใช้\nตอนลักลอบบุกนี่นา..."
26009-70 = "ยินดีต้อนรับค่ะ นายท่าน\nงือ เขินจริงๆ ด้วย..."
26009-80 = "อ๊าย?!?  คะ... ใครน่ะ!?"
26009-90 = "อ่า คุณครูนี่เอง\nโล่งอกไปทีค่ะ...... เข้ามาสิคะ"
26009-100 = "คุณครู ฉันกำลังรออยู่เลยค่ะ......"
26009-110 = "ดีใจจังค่ะที่แวะมา"
26009-120 = "ฉันไม่ค่อยสันทัด\nเรื่องทำความสะอาดเท่าไร..."
26009-130 = "แต่ถ้าคุณครูขอให้ช่วยละก็..."
26009-140 = "คะ? ดูเหมาะดีเหรอคะ?"
26009-150 = "จริงๆ เลย... อย่าแกล้งกันสิคะ!"
26009-160 = "ถะ...ถ้าพูดจากใจจริงละก็\nงั้นก็ได้..."
26009-170 = "ทำไมหูแมว\nถึงเข้ากับชุดเมดล่ะคะ?"
26009-180 = "แมวน่าจะเป็นนายท่าน\nมากกว่าเป็นเมดนะ..."
26009-190 = "นี่อาจจะ...\nเอาไว้ใช้อ้างอิงในเกมก็ได้"
26009-200 = "ชุดนี้มีระบายเยอะจัง...\nเขินจังเลยค่ะ..."
26009-210 = "สะ... สุขสันต์วันเกิดนะคะนายท่าน"
26009-220 = "ฉันลองพูดดูน่ะค่ะ...\nก็เป็นเมดแล้วนี่คะ"
26009-230 = "จำวันเกิดฉันได้ด้วยเหรอคะ?\nขอบคุณนะคะ"
26009-240 = "คือว่า...ไม่ต้องทำอะไร\nเป็นพิเศษให้หรอกค่ะ"
26009-250 = "การได้อยู่กับคุณครู... ไม่สิ\nการได้อยู่กับนายท่าน\nคือความสุขที่สุดแล้วค่ะ"
26009-260 = "กะ... ก็วางเรื่องไว้\nให้เป็นแบบนี้ก่อนค่ะ...!"
26009-270 = "สวัสดีปีใหม่ค่ะนายท่าน"
26009-280 = "หะ... ให้เรียกว่าคุณครู\nจะดีกว่ามั้ยคะ?"
26009-290 = "ว่ากันว่าคุณลุงซานต้า\nจะลงมาทางปล่องไฟค่ะ"
26009-300 = "ถึงชมรมพัฒนาเกม\nจะไม่มีปล่องไฟก็เถอะ..."
26009-310 = "ถ้ามีโอกาส\nฉันก็อยากเข้าไปสักครั้งนะคะ"
26009-320 = "มันน่าจะเล็ก\nและอบอุ่นดีค่ะ..."
26009-330 = "ฮาโลวีน..."
26009-340 = "เป็นเทศกาลที่มีคนแต่งชุดฮาโลวีน\nออกมาเดินตามถนนกันเยอะเลยนะคะ"
26009-350 = "ต้องบอกว่าเทศกาลนี้\nไม่เกี่ยวกับฉันมั้ยนะคะ..."
26009-360 = "ถึงแม้จะมีกิจกรรมในเกม...\nบ่อยๆ ก็เถอะค่ะ"
26009-380 = "เอ่อ... คือว่า..."
26009-390 = "ฉันกำลังนอนอยู่\nแต่น้องก็เข้ามา..."
26009-400 = "คือว่า... ในห้องพักผ่อน\nก็มีคนอื่นอยู่ด้วย..."
26009-410 = "ถ้าไปนั่งพัก\nก็จะมีคนเข้ามาชวนคุย..."
26009-420 = "ทั้ง 'ซื้อริบบิ้นจากไหนมา?'"
26009-430 = "แล้วก็ 'วันหยุดทำอะไร?'\nทำนองนี้น่ะค่ะ..."
26009-440 = "ระหว่างที่ถูกยิงคำถามต่างๆ\nฉันก็เลยหนีออกมา\nโดยที่ไม่ได้ตั้งใจ..."
26009-450 = "และที่ที่มาเจอ\nก็คือที่นี่ค่ะ..."
26009-460 = "แต่ว่า... มันดันเป็น\nที่พักผ่อนของแมวนี่สิ..."
26009-470 = "อ๊าย...?!\nระ... รอเดี๋ยวสิคะ!"
26009-480 = "ฉันจะออกไปแล้วค่ะ!\nจะ... จะออกไปเดี๋ยวนี้แหละค่ะ...\nมันจั๊กจี้นะคะ!"
26009-2600 = "ทะ... ทำให้ถึงขนาดนี้เลย...\nแบบนั้น... ฉันดีใจมากเลยค่ะ\n...ฉันจะพยายามให้มากขึ้นนะคะ\n...คอยเฝ้าดูฉันนะคะคุณครู!"

[translation]
26009-10 = "Blue...Archive..."
26009-20 = "It's me, Hanaoka Yuzu... Um, I look a little different right now because of...a few reasons. Thanks for your help..."
26009-30 = "I'm a maid right now... So maybe I should...clean something?"
26009-40 = "Is a maid that develops games...something people would like?"
26009-50 = "Ugh...I wanna hide somewhere..."
26009-60 = "For an infiltration mission...cardboard boxes are a necessity."
26009-70 = "Welcome, Master. Um...like I thought, it's too embarrassing..."
26009-80 = "Eeek! W-Who?!"
26009-90 = "Oh, it's just you, Sensei. That's a relief. I mean, welcome."
26009-100 = "I've been waiting, Sensei..."
26009-110 = "I'm happy that you're here."
26009-120 = "I'm not very good at cleaning, but..."
26009-130 = "If you ask me to, Sensei..."
26009-140 = "What? You're saying I...look good?"
26009-150 = "Um, I'd rather you didn't make fun of me..."
26009-160 = "Y-You're not? You mean it? Then...that's just..."
26009-170 = "Why do people wear cat ears with maid uniforms, I wonder?"
26009-180 = "Cats don't seem like they'd make good maids... If anything, they're more the master type..."
26009-190 = "This...may be a good reference for the game."
26009-200 = "This frilly outfit...it's a bit embarrassing."
26009-210 = "H-Happy birthday, Master."
26009-220 = "I just thought I should try it once, since I'm a maid..."
26009-230 = "Oh, you remembered my birthday? Thank you."
26009-240 = "It's all right. There's no need to do anything special."
26009-250 = "Just being with you, Sensei... I mean, being with you, Master is enough to make me happy."
26009-260 = "Um, I-I mean... As a maid, that's my official stance!"
26009-270 = "Happy New Year, Master."
26009-280 = "...U-um, maybe it's better if I just call you Sensei."
26009-290 = "I heard Santa comes in through the chimney."
26009-300 = "It's too bad we don't have a chimney in the Game Development Department..."
26009-310 = "I'd like to go inside one, if I have the chance."
26009-320 = "A chimney looks pretty cozy..."
26009-330 = "Halloween..."
26009-340 = "The streets are full of people in costumes, but..."
26009-350 = "It's not a holiday I care much about."
26009-360 = "I'm familiar with it from game events, though."
26009-380 = "Ah, um... So..."
26009-390 = "They seemed to have come in...while I was sleeping..."
26009-400 = "Um, it's just... There were a lot of other people in the break room..."
26009-410 = "And if I go sit there, they'll start talking to me..."
26009-420 = "I'd have to answer all sorts of questions, like, 'Where did you buy that ribbon?'"
26009-430 = "Or 'What do you like to do for fun?'"
26009-440 = "And all sorts of others... So I ran away."
26009-450 = "And I found this place..."
26009-460 = "Turns out...it was a cat break room..."
26009-470 = "Eeek! Hang on, p-please!"
26009-480 = "I'm getting out! I'm getting out right now... That tickles!"
26009-2600 = "This... You must've gone to such lengths for this... I'm so happy! I promise to work even harder from now on, Sensei... You'll see!"

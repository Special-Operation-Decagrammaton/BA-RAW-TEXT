[translation]
10025-10 = "Blue Archive!"
10025-20 = "อย่าทำเหมือนฉันเป็นเด็กนะคะ!\nถึงจะตัวเล็กแต่หัวใจฉันก็เป็นผู้ใหญ่กว่าทุกคนนะคะ!"
10025-30 = "(ได้มาชมคาเฟ่จาก\nมุมมองนี้ก็แปลกดีนะ...)"
10025-40 = "เหลือตัวแค่นี้แล้ว...\nพวกเด็กๆ อาจไม่ยอมรับ\nฉันก็ได้นะคะ"
10025-50 = "(ถ้าฉัน...\nเขย่งเท้าอีกสักหน่อย\nก็น่าจะเอื้อมถึงนะ...!)"
10025-60 = "อืม...\nง่วงจังเลยค่ะ..."
10025-70 = "ฉันกลายเป็นเด็กแล้ว...\nเพราะงั้นขอนอนกลางวัน\nสักหน่อยคงได้ใช่มั้ยคะ"
10025-80 = "เชิญค่ะคุณครู\nคาบเรียนของวันนี้...\nขอฝากด้วยนะคะ"
10025-90 = "ฮ้าวววว..."
10025-100 = "ช็อกโกแลตสตรอว์เบอร์รี่\nที่โรยด้วยลูกเกด..."
10025-110 = "...อ๊ะ? คุณครู?"
10025-120 = "ฉะ...ฉันไม่ได้ง่วงสักหน่อยนะคะ"
10025-130 = "ฉันจะนั่งรอเฉยๆ ให้สมกับที่\nเป็นเด็กดีของคุณครูเลยค่ะ!"
10025-140 = "ค่ะ! ถึงฉันจะกลายเป็นเด็ก\nแต่ฉันก็คือชุนค่ะ!"
10025-150 = "คุณครู คุณครูคะ!\nของขวัญ ช็อกโกแลตรัมเรซิน\nจาก <โรซี่> มาถึงแล้วค่ะ!"
10025-160 = "ขอฉันชิมคำนึง\nได้มั้ยคะ?"
10025-170 = "ห้ามกินขนมก่อนกินอาหารเหรอคะ?"
10025-180 = "แต่ว่า...\nมันดูน่ากินมากเลย..."
10025-190 = "ขอชิมแค่คำเดียวก่อน...\nก็ไม่ได้เหรอคะ"
10025-200 = "แฮปปี้ เบิร์ธ เดย์ ทูยู~♪\nแฮปปี้ เบิร์ธเดย์ ทูยู~ ♪"
10025-210 = "แฮปปี้ เบิร์ธเดย์ เดียร์คุณครู..."
10025-220 = "อึ่ก เผลอกัดลิ้นตัวเองอีกแล้ว..."
10025-230 = "วันนี้เป็นวันเกิดของฉันเหรอคะ?"
10025-240 = "ฉันลืมสนิทเลยค่ะ"
10025-250 = "ส่วนเรื่องอายุ...\nปีนี้ฉันอายุเท่าไรแล้วนะ?"
10025-260 = "สวัสดีปีใหม่ค่ะ ขอให้มีความสุขนะคะ\nคุณครู! ไปดื่มสาเกหวานๆ\nที่ศาลเจ้าตรงนั้นกันเถอะค่ะ!"
10025-270 = "คิดแล้วเชียว... ซานต้า\nคงไม่มาหาฉันหรอกค่ะ"
10025-280 = "ไม่เป็นไรหรอกค่ะ\nเพราะว่าคริสต์มาสปีนี้\nได้อยู่กับคุณครูด้วยนี่นา!"
10025-290 = "ฮุฮุ ฉันเด็กลงแบบนี้แล้ว\nต้องได้รับลูกกวาดแน่ๆ เลยค่ะ!"
10025-310 = "ฮิฮิ ที่นี่น่ะยังเหมือนเดิม\nไม่เคยเปลี่ยนเลยค่ะ"
10025-320 = "คำสัญญาที่ให้ไว้กับตัวเอง\nที่ฉันเขียนเอาไว้บนผนัง...\nยังอยู่เหมือนเดิมเลยนะคะ"
10025-330 = "คิดถึงตอนนั้นจัง..."
10025-340 = "พอมาดูคำสัญญาที่เคยเขียนไว้\nส่วนใหญ่ฉันก็ทำได้สำเร็จ\nเกือบทั้งหมดแล้วละค่ะ"
10025-350 = "ถ้างั้น... ไหนๆ ก็มาแล้ว\nคราวนี้ฉันเขียนคำขอพร\nเอาไว้ล่วงหน้าเลยดีมั้ยคะ?"
10025-360 = "บอกไม่ได้หรอกค่ะ\nนี่เป็นความลับขั้นสุดยอด!"
10025-370 = "ก็เพราะว่ามันคือ...\nความลับของเด็กยังไงล่ะคะ\nฮุฮุฮุ"
10025-2600 = "ถึงมันจะค่อนข้างใหญ่ไปหน่อยสำหรับฉันในตอนนี้...\nแต่ว่าฉันก็คุ้นเคยกับอาวุธชิ้นนี้ที่สุดแล้วค่ะ!"

[translation]
10025-10 = "블루 아카이브!"
10025-20 = "어, 어린아이 취급하지 말아주세요!\n이래봬도 마음만은 여전히 모두의 언니니까요!"
10025-30 = "(이런 시선에서 보는\n카페도 신기하네요……)"
10025-40 = "으음… 이 키로는,\n모두에게도 조금\n불편할지 모르겠네요."
10025-50 = "(조, 조금 더…\n발돋움을 하면,\n어떻게든…!)"
10025-60 = "으음…\n졸려졌어요…"
10025-70 = "지금은 모처럼 이런\n몸이니… 낮잠\n정도는 괜찮겠죠?"
10025-80 = "어서 오세요, 선생님.\n오늘의 수업도\n잘 부탁드릴게요!"
10025-90 = "흠냐, 흠냐…"
10025-100 = "럼 레이즌이 들어간\n딸기 초콜릿은…"
10025-110 = "……으, 으앗? 선생님?"
10025-120 = "조, 졸고 있지 않았거든요?"
10025-130 = "착한 아이처럼 얌전히\n기다리고 있을게요!"
10025-140 = "네! 이런 몸이지만,\n여전히 슌이랍니다!"
10025-150 = "선생님, 선생님!\n<로지스>의 럼 레이즌\n초콜릿이 선물로 들어왔어요!"
10025-160 = "바로 하나만\n먹어보면 안 될까요?"
10025-170 = "식사 전이니 간식은 안 된다고요?"
10025-180 = "하, 하지만……\n이렇게 맛있어 보이는데……"
10025-190 = "하나만 먹을 테니까……\n안 될까요?"
10025-200 = "생일 축하합니다~♪\n생일 축하합니다~♬"
10025-210 = "사랑하늦……"
10025-220 = "윽, 혀 깨물었어요……"
10025-230 = "앗, 오늘이 제 생일, 이었나요?"
10025-240 = "까맣게 잊어버리고 있었어요."
10025-250 = "저기, 그렇다는 것은\n올해가…… 이럴 때는,\n몇 살이 되는 걸까요?"
10025-260 = "새해 복 많이\n받으세요, 선생님!\n이 앞의 사찰에 같이\n감주 마시러 가요!"
10025-270 = "산타는…… 역시 제게는\n찾아와 주지 않겠죠……"
10025-280 = "그래도 괜찮아요.\n올해의 크리스마스는\n선생님과 함께니까요!"
10025-290 = "후후, 지금의 저라면\n사탕을 받을 수 있겠네요!"
10025-310 = "후후, 이곳은 하나도\n변하지 않았네요."
10025-320 = "제가 벽에 적어 둔\n자신과의 약속도……\n그 때 그대로네요."
10025-330 = "그리워라……"
10025-340 = "이 약속들, 지금에 와서\n이렇게 보니, 대부분\n지킬 수 있었던 것들이네요."
10025-350 = "그럼 모처럼이기도 하고,\n이번에는 여기에\n미래의 소원이라도 적어 볼까요?"
10025-360 = "알려드릴 수 없어요.\n비밀이니까요!"
10025-370 = "어른에게는 알려드릴 수 없는,\n어린아이만의 비밀… 이니까요.\n후후."
10025-2600 = "지금의 제게는 조금 큰 것 같지만……\n그래도 역시 이 무기가 제일이네요!"

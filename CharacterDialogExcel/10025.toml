[translation]
10025-10 = "蔚藍檔案！"
10025-20 = "請，請不要把我當成小孩看待……！\n我的內心仍然是所有人的姊姊！"
10025-30 = "（從這個角度\n看到的咖啡廳，\n感覺好神奇……）"
10025-40 = "嗯……這個身高，\n對大家來說，\n可能也會有點不方便吧。"
10025-50 = "（只，只要……\n腳再踮高一點點，\n就可以了……！）"
10025-60 = "唔……\n開始想睡覺了……"
10025-70 = "現在難得變成這種身體了，\n睡個午覺應該不會怎樣吧？"
10025-80 = "歡迎回來，老師！\n今天的課程\n也拜託您了！"
10025-90 = "唔唔……"
10025-100 = "有加蘭姆葡萄的\n草莓巧克力，我有點……"
10025-110 = "……嗯呃，啊\n哇哇！老師！？"
10025-120 = "我、我可沒有在打瞌睡喔！"
10025-130 = "我會像乖孩子一樣\n乖乖等你的！"
10025-140 = "是！雖然身體變成這樣，\n但我仍然是旬！"
10025-150 = "老師，老師！\n有人送我「Roses」的\n蘭姆葡萄巧克力耶！"
10025-160 = "我，我現在可以，\n 吃一個看看嗎……？"
10025-170 = "你說吃飯前不能吃零食……？"
10025-180 = "但，但是……\n它看起來那麼好吃……"
10025-190 = "……我，我只會吃一個……\n這樣也不行嗎？"
10025-200 = "祝你生日快樂～♪\n祝你生日快樂～♬"
10025-210 = "祝你生日怪……"
10025-220 = "嗚嗚，吃螺絲了……"
10025-230 = "啊，今天是我的生日嗎……？"
10025-240 = "我完全忘了呢……"
10025-250 = "那個，\n也就是說我今年……\n我現在這樣，\n應該算幾歲呢？"
10025-260 = "新年快樂，老師！\n一起去之前去過的神社\n喝杯甜酒吧！"
10025-270 = "聖誕老人……\n一定不會來找我吧……"
10025-280 = "但是沒關係，\n因為今年的聖誕節，\n我會跟老師一起度過！"
10025-290 = "呵呵，我現在這模樣，\n應該能收到糖果吧！"
10025-310 = "唔呵呵，這裡面\n幾乎沒什麼變化呢。"
10025-320 = "我寫下的，\n和自己的約定……\n也還是當時的樣子。"
10025-330 = "真叫人懷念……"
10025-340 = "這些約定，現在看來，\n幾乎都有遵守呢。"
10025-350 = "那麼機會難得，\n這次要不要在這裡\n寫下將來的夢想呢？"
10025-360 = "那，那個不能說！\n是祕密……！"
10025-370 = "是不能讓大人知道的，\n專屬於小孩的祕密……\n呵呵。"
10025-2600 = "儘管對現在的我來說好像有點大……\n但果然是我用得最順手的武器！"

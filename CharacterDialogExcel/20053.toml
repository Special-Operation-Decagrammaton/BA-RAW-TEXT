[translation]
20053-10 = "블루~ 흠흠, 아카이브?"
20053-20 = "안녕하신가, 선생 공!\n이번 임무는 무려 잠입이라고! \n그러니 잘 부탁해!"
20053-30 = "후후…… 나를 알아보는\n사람이 있으면 어떡하지……?"
20053-40 = "이 드레스…… 역시 이런\n곳에서 입기에는 과한가……?"
20053-50 = "(드레스…… 커피……\n떠오른다! 새로운 콘텐츠가!)"
20053-60 = "나중에는 꼭……! 이곳에서\n구독자들과 팬 미팅을……!"
20053-70 = "(좋아, 일단! ……제일\n구석진 자리가 어디지?)"
20053-80 = "왔구나, 선생 공!"
20053-90 = "츠쿠요가 고데기를 빌려줬는데,\n혹시 어떻게 쓰는지 알고 있어?"
20053-100 = "기다리고 있었습니다, 선생님."
20053-110 = "……아냐, 아무리 드레스를\n입었어도 이런\n말투는 아닌 것 같아."
20053-120 = "옷이란 것은 예쁜 만큼\n불편해지는 것일까……."
20053-130 = "이 옷, 불편하긴 해도 닌자 도구를\n숨길 수 있는 공간이\n많은 건 마음에 든단 말이지."
20053-140 = "닌자란 의상이 아니라\n마음가짐에 의해\n결정되는 것……!"
20053-150 = "그러니 드레스를 입어도\n닌자인 것이다!"
20053-160 = "라멘 먹고 싶지만……\n역시 이런 옷을\n입고는 무리겠지……."
20053-170 = "이것이 미치루류\n드레스 코~드라고? 냐하하!"
20053-180 = "선생 공의 생일을 기념해서,\n특별히 차려 입어 보았지!"
20053-190 = "……응? 그럼 내가\n선물인 거냐고? "
20053-200 = "아, 아니야!\n아니, 그래도 상관없지만,\n오히려 좋지만,"
20053-210 = "그게 아니고…… 우냐아악!"
20053-220 = "오늘은, 내 생일 기념\n라이브 방송이 예정되어 있다고?"
20053-230 = "그리고 스페셜 게스트이자\n나를 위한 선물은……\n바로 선생 공!"
20053-240 = "자, 어서 내 옆에 앉아서\n카메라를 바라봐 줘!"
20053-250 = "새해 복 많이 받아, 선생 공!"
20053-260 = "역시 새해에는 시대극이지!"
20053-270 = "그런 의미에서……\n함께 시대극 릴레이 상영회, 어때?"
20053-280 = "선생 공, 혹시 알고 있었어?"
20053-290 = "'산타' 또한 옷을 갈아입은\n닌자라는 사실을……!"
20053-300 = "이 마름쇠들?"
20053-310 = "그야 우리의 사탕을\n노리는 자들을 위한 함정이지!"
20053-320 = "……농담이야.\n그냥 마름쇠 모양 사탕이야."
20053-340 = "안에 든 건…… 반지, 네?!"
20053-350 = "수리검 장식이\n달려 있어서 멋지잖아?!\n우아아아!"
20053-360 = "……응? 에? 선생 공?\n끼는 거야……?"
20053-370 = "아, 아니, 상관은 없지만……! "
20053-380 = "(어라? 반지를,\n상대에게 건넨다……?) "
20053-390 = "(이건…… 고백 같잖아?!) "
20053-400 = "자, 잠깐만 기다려봐, 선생 공!"
20053-410 = "이건 절대로 노린 게 아니라……\n아니, 그게……! "
20053-420 = "우으, 우냐아아악……!"
20053-2600 = "나…… 나에게 이런……!\n하지만 선생 공의 판단이라면!\n응! 감사합니다!"

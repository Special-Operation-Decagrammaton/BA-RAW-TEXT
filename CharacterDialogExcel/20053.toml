[translation]
20053-10 = "Blue, ahem, Archive?"
20053-20 = "Hello, Honorable Sensei! This mission's an infiltration! Please take care of me!"
20053-30 = "Fufu... What should I do if someone recognizes me...?"
20053-40 = "Is this dress...too much to be wearing here?"
20053-50 = "(A dress... Coffee... I'm getting an idea! For new content!)"
20053-60 = "Next time for sure...! I'll hold a fan meeting with my subscribers here...!"
20053-70 = "(Perfect, for now! ...Where's the most secluded spot here?)"
20053-80 = "You're here, Honorable Sensei!"
20053-90 = "Tsukuyo lent me her curling iron. Do you know how to use one?"
20053-100 = "I've been waiting, Sensei."
20053-110 = "...No, even in a dress, speaking like that doesn't suit me."
20053-120 = "Why is it that as clothes get prettier, they get more uncomfortable...?"
20053-130 = "It's uncomfortable, but there's lots of different places to hide my ninja gear!"
20053-140 = "Mindset makes a ninja, not the outfit!"
20053-150 = "So even if I'm wearing a dress, I'm still a ninja!"
20053-160 = "I want ramen...but I probably shouldn't while I'm wearing this..."
20053-170 = "This is the Michiru-style dress code, you know? Nyahaha!"
20053-180 = "I wore this especially for your birthday, Honorable Sensei!"
20053-190 = "...Hm? Does that mean I'm the gift? "
20053-200 = "N-No! Well, I mean, I wouldn't mind. I'd actually like it."
20053-210 = "Wait, no! NYOOO!"
20053-220 = "My birthday live stream is scheduled for today."
20053-230 = "The special guest, and my gift...is none other than Honorable Sensei!"
20053-240 = "Here, come sit next to me and look at the camera!"
20053-250 = "Happy New Year, Honorable Sensei!"
20053-260 = "You've got to start the new year with period dramas!"
20053-270 = "That said... Would you like to binge some with me?"
20053-280 = "Did you know, Honorable Sensei?"
20053-290 = "That \"Santa\" is just a ninja, disguised in different clothes...!"
20053-300 = "These caltrops?"
20053-310 = "Of course, it's a trap for those after our candies!"
20053-320 = "...Just kidding. They're just caltrop-shaped candies."
20053-340 = "Inside, there's...a ring! What?!"
20053-350 = "I-Isn't it amazing with the shuriken decoration?! Whoa!"
20053-360 = "...Hm? Eh? Honorable Sensei? Are you putting it on...?"
20053-370 = "N-No, it's not like it matters...! "
20053-380 = "(Huh? Giving a ring to someone...?) "
20053-390 = "(Isn't this...like a confession?!) "
20053-400 = "H-Hold on, Honorable Sensei!"
20053-410 = "This was definitely not intentional... I mean, well...! "
20053-420 = "Ugh, aaaah...!"
20053-2600 = "This... This for me...! But if it's Honorable Sensei's decision! Yes! Thank you!"

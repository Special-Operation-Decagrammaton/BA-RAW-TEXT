[translation]
20053-10 = "Blue~ อะแฮ่ม Archive?"
20053-20 = "สวัสดี ท่านอาจารย์!\nภารกิจครั้งนี้คือการแฝงตัว!\nงั้นก็รบกวนด้วยนะ!"
20053-30 = "ฮุฮุ... ถ้ามีคนจำได้\nจะทำยังไงดีล่ะ...?"
20053-40 = "ชุดนี้... ใส่ในที่แบบนี้\nมันจะเวอร์ไปหรือเปล่า...?"
20053-50 = "(ชุดเดรส... กาแฟ...\nคิดคอนเทนต์ใหม่ออกแล้ว!)"
20053-60 = "ไว้ต่อไป...!\nต้องจัดแฟนมีตติ้งกับ\nผู้ติดตามที่นี่ให้ได้เลย...!"
20053-70 = "(ดีละ งั้นก่อนอื่นก็!\nที่ที่...อยู่ในหลืบที่สุด\nอยู่ตรงไหนนะ?)"
20053-80 = "มาแล้วเหรอ ท่านอาจารย์!"
20053-90 = "สึคุโยะให้ข้าน้อยยืมที่หนีบผมมา\nว่าแต่รู้มั้ยว่ามันใช้ยังไงน่ะ?"
20053-100 = "กำลังรออยู่เลยค่ะ คุณครู"
20053-110 = "ไม่สิ... ถึงจะใส่\nชุดเดรสแบบนี้\nแต่การพูดแบบนั้นก็ไม่ได้อยู่ดี"
20053-120 = "เสื้อผ้ายิ่งสวยๆ\nก็ยิ่งไม่สบายตัวใช่มั้ยนะ..."
20053-130 = "ถึงชุดนี้จะไม่สบายตัว\nแต่ข้าน้อยก็ถูกใจ เพราะมีที่\nให้ซ่อนอาวุธนินจาเยอะเลยละ"
20053-140 = "นินจาถูกกำหนดด้วย\nความตั้งใจจริง\nไม่ใช่ชุดที่ใส่หรอก...!"
20053-150 = "เพราะงั้นต่อให้ใส่ชุดเดรส\nก็ยังเป็นนินจาอยู่ดี!"
20053-160 = "อยากกินราเม็งจัง...\nแต่ถ้าใส่ชุดนี้\nคงกินไม่สะดวกละเนอะ..."
20053-170 = "นี่คือเดรสโค้ด~\nตามวิถีมิจิรุเลยนะ อะฮะฮ่า!"
20053-180 = "ข้าน้อยใส่ชุดนี้มาเนื่องในโอกาส\nวันเกิดท่านอาจารย์เลยนะ!"
20053-190 = "หืม...? ถ้างั้นข้าน้อยก็เป็น\nของขวัญหรือเปล่าน่ะเหรอ?"
20053-200 = "มะ... ไม่ใช่นะ!\nไม่สิ จะเป็นแบบนั้นก็ไม่เป็นไร\nอาจจะดีเลยด้วยซ้ำ"
20053-210 = "ไม่ใช่สิ... ว้ากกก!"
20053-220 = "วันนี้จะมีไลฟ์\nฉลองวันเกิดข้าน้อยเลยละ"
20053-230 = "แล้วคนที่เป็นแขกคนพิเศษ\nและเป็นของขวัญให้ข้าน้อย...\nก็คือท่านอาจารย์!"
20053-240 = "เอาละ รีบเข้ามานั่งข้างๆ\nแล้วมองไปที่กล้องนะ!"
20053-250 = "สวัสดีปีใหม่นะ ท่านอาจารย์!"
20053-260 = "ปีใหม่กับละครย้อนยุค\nเป็นของคู่กัน!"
20053-270 = "เพราะงั้น... ไปดูละครย้อนยุค\nแบบมาราธอนกันมั้ย?"
20053-280 = "ท่านอาจารย์ รู้หรือเปล่า?"
20053-290 = "ว่าที่จริงแล้ว 'ซานต้า' คือ\nนินจาที่เปลี่ยนไปใส่ชุดนั้นน่ะ...!"
20053-300 = "มาคิบิชินี่น่ะเหรอ?"
20053-310 = "คือกับดักสำหรับคนที่\nจ้องจะกินลูกกวาดของพวกเราไง!"
20053-320 = "ล้อเล่นน่า...\nก็แค่ลูกกวาดรูปมาคิบิชิน่ะ"
20053-340 = "ข้างในคือ... แหวนนี่นา?!"
20053-350 = "มะ... มีชูริเคนห้อยอยู่ด้วย\nเท่สุดๆ ไปเลย!\nว้าววว!"
20053-360 = "หืม...? ท่านอาจารย์?\nจะใส่งั้นเหรอ...?"
20053-370 = "มะ... ไม่หรอก\nข้าน้อยไม่ติดอะไร...! "
20053-380 = "(เอ๋? ถ้ายื่นแหวน\nให้คนอื่น...?) "
20053-390 = "(นี่มัน... เหมือนสารภาพรักเลย?!) "
20053-400 = "ระ... รอเดี๋ยวนะ ท่านอาจารย์!"
20053-410 = "ข้าน้อยไม่ได้ตั้งใจให้เป็นแบบนี้...\nไม่สิ คือว่า...! "
20053-420 = "วะ... ว้ากกก...!"
20053-2600 = "หะ... ให้ของแบบนี้กับข้าน้อยเหรอ...!\nแต่ถ้าท่านอาจารย์คิดมาแล้วละก็!\nอื้อ! ขอบคุณมากเลยนะ!"

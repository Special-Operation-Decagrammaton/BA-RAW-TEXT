[translation]
13004-20 = "嗯嗯，終於到了！\n請多指教，老師！"
13004-30 = "真開心～☆"
13004-40 = "嗯？那個是什麼呢？"
13004-50 = "好漂亮的東西啊。\n送給大家當禮物吧…"
13004-60 = "果然還是讓\n阿拜多斯偶像計畫\n復活吧～☆"
13004-70 = "因為我們的孩子們\n全～都很可愛。"
13004-80 = "嗯嗯～！歡迎你老師。\n我一直在等你來。"
13004-90 = "祝今天也是美好的一天～\n老師！不管什麼都請交給我。"
13004-100 = "今天也辛苦了～☆"
13004-110 = "嗯？\n膝枕嗎？"
13004-120 = "那個要等天色\n再暗一點時再說。"
13004-130 = "不行，撒嬌要等工作結束唷～"
13004-140 = "我想想……\n老師，作為代替\n我幫你按摩吧？"
13004-150 = "老師只要在身邊，\n就感覺好安心。"
13004-160 = "祝老師生日快樂！"
13004-170 = "如果老師沒有來\n阿拜多斯的話……"
13004-180 = "真是無法想像！\n老師！你能過來，\n真的很謝謝你！"
13004-190 = "今天是我的生日。\n老師，有準備送給我的禮物嗎？"
13004-200 = "是的，不管是什麼都沒關係。\n只要是老師選的東西的話。"
13004-210 = "祝你新年快樂。\n今年就……\n和老師……呵呵☆"
13004-220 = "老師，為了新年\n去購物吧？"
13004-230 = "我會成為聖誕老人的～☆"
13004-240 = "唔哇！\n嚇我一跳！"
13004-250 = "老師～\n請不要嚇我啦～"
13004-270 = "好，現在是清理耳朵的時間唷。\n不可以亂動唷，老師？"
13004-280 = "不可以動來動去。\n因為現在\n要放這個進去唷？"
13004-290 = "覺得癢的話要跟我說唷？\n嗯嗯。乖孩子，好乖好乖。"
13004-300 = "那個…仔細想想，\n這個有點…讓人害羞呢？\n總覺得老師的臉靠得很近…那個…"
13004-310 = "這是只提供給老師的服務，\n是我們兩個的祕．密唷？"
13004-320 = "嗯？那樣躺著的話，\n只能看到老師的背後…\n那個…那樣的話…鼻子呼吸的氣息…"
13004-330 = "老師，不行！\n請躺好！"
13004-2600 = "嗯嗯。\n雖然我認為所謂的力量是把雙面刃，\n不過如果是為了老師和大家我想是必要的。\n我會珍惜使用的，請守望著我哦。老師。"

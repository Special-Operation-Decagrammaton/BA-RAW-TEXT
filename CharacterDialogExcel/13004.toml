[translation]
13004-20 = "응응, 드디어 도착!\n잘 부탁해요, 선생님!"
13004-30 = "즐거워라~☆"
13004-40 = "응? 저건 뭘까요?"
13004-50 = "예쁜 물건이네요.\n모두에게 선물로\n줄까…"
13004-60 = "역시 아비도스\n아이돌 프로젝트를\n부활시켜야겠어요☆"
13004-70 = "우리 애들은\n모~두 귀여우니까."
13004-80 = "응응~! 어서 오세요 선생님.\n오시기만을, 기다리고 있었어요."
13004-90 = "오늘도 좋은 하루~\n선생님! 뭐든지 맡겨주세요."
13004-100 = "오늘도 수고하셨어요☆"
13004-110 = "응?\n무릎베개를 하고 싶다고요?"
13004-120 = "그건 좀 더 어두워졌을 때~"
13004-130 = "안돼요, 어리광은\n일 다 끝나고 나서예요~"
13004-140 = "음…\n대신, 선생님.\n안마해 드릴까요?"
13004-150 = "선생님이 곁에 있으니,\n어쩐지 안심이 돼요."
13004-160 = "생일 축하합니다!"
13004-170 = "선생님이 아비도스에\n오지 않았더라면…"
13004-180 = "상상도 안돼요!\n선생님!\n와주셔서 감사해요!"
13004-190 = "오늘은 제 생일이랍니다.\n선생님,\n제 선물은 준비해 두셨나요?"
13004-200 = "응응☆ 뭐든 좋아요.\n선생님이 준비해준거라면~"
13004-210 = "새해 복 많이 받으세요.\n올해는…\n선생님과… 후훗☆"
13004-220 = "선생님.\n새해를 맞이하기 위해\n쇼핑이라도 갈까요?"
13004-230 = "제가 산타클로스가\n되어 드릴 테니까요~"
13004-240 = "우왓!\n깜짝이야!"
13004-250 = "선생님~\n너무 놀래키지 말아주세요."
13004-270 = "자아, 귀청소 시간이에요.\n얌전히 있어야 해요, 선생님?"
13004-280 = "꼼지락거리면 안돼요.\n지금부터 이걸 넣을 거라구요?"
13004-290 = "간지러우면 얘기해야 해요?\n응응. 착하다, 착해."
13004-300 = "어… 생각해 보니까 이거 조금…\n부끄러운데요? 뭔가 선생님 얼굴이\n엄청 가까워서… 저기…"
13004-310 = "이건 선생님한테만\n해주는 서비스니까,\n우리 둘만의 비.이.밀.이에요?"
13004-320 = "응? 그렇게 누우면 선생님\n뒤통수 밖에 안 보이는데…\n어… 게다가… 콧바람이…"
13004-330 = "안돼요, 선생님!\n똑바로 누우셔야죠!"
13004-2600 = "응응, 힘이라는 건 양날의 검이라고 생각하지만,\n선생님과 모두를 위해서라면 필요하다고 생각해요.\n소중하게 쓸 테니까 지켜봐 주세요. 선생님."

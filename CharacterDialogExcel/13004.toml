[translation]
13004-20 = "Yup yup, I'm finally here! I look forward to working with you, Sensei!"
13004-30 = "This is so fun! ☆"
13004-40 = "Hmm? What could that be?"
13004-50 = "It's so pretty. Maybe the others would like it as a gift..."
13004-60 = "We should revive the Abydos Idol Project. ☆"
13004-70 = "All of our students are super adorable after all."
13004-80 = "Yup, yup! Hello, Sensei. I've been waiting for you to get here."
13004-90 = "Let's have another great day today! You can count on me, Sensei!"
13004-100 = "You've got this like always. ☆"
13004-110 = "Hmm? You wanna lay your head in my lap?"
13004-120 = "Maybe when it gets a little darker..."
13004-130 = "Nope! You can rest after you're done with work!"
13004-140 = "Um...Sensei. Why don't I give you a shoulder massage?"
13004-150 = "I feel at ease when I have you with me."
13004-160 = "Happy birthday!"
13004-170 = "If you hadn't come to Abydos..."
13004-180 = "I don't even want to imagine it, Sensei! Thank you for everything!"
13004-190 = "Today's my birthday. Did you get me a gift, Sensei?"
13004-200 = "Yup, yup! I'd be happy with anything. As long as it's a gift from you! ☆"
13004-210 = "Happy New Year. This will be the year that you and I... Heehee! ☆"
13004-220 = "Sensei. Should we go shopping together?"
13004-230 = "Let me be your Santa Claus!"
13004-240 = "Whoa! You surprised me!"
13004-250 = "Sensei! Please don't scare me like that."
13004-270 = "Here we go. One ear cleaning coming right up. You have to stay still. All right, Sensei?"
13004-280 = "Don't fidget. I'm putting it in now, okay?"
13004-290 = "Let me know if it tickles. There we go. That's good. Perfect."
13004-300 = "Um... Come to think of it... Do you find this a little embarrassing? Our faces are pretty close to one another... Well..."
13004-310 = "This is a special service just for you. It's our little secret. Okay?"
13004-320 = "Hmm? If you lie like that, I can only see the back of your head… Uh... More importantly...I can feel your breath..."
13004-330 = "This isn't working, Sensei! Go back to the other position!"
13004-2600 = "Yes, I think power is a double-edged sword, but it is necessary for Sensei and everyone else. I'll use it wisely, so please keep watching out for me."

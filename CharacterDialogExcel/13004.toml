[translation]
13004-20 = "อื้ม อื้ม! ได้เจอกันสักที!\nฝากตัวด้วยนะคะคุณครู!"
13004-30 = "สนุกจังเลย~☆"
13004-40 = "หือ? นั่นอะไรน่ะ"
13004-50 = "ของน่ารักๆ นี่นา\nให้เป็นของขวัญทุกคน\nดีไหมนะ..."
13004-60 = "จะต้องฟื้นฟู\nโปรเจกต์ไอดอล\nของอะบิดอสแล้วละ☆"
13004-70 = "พวกเพื่อนๆ ของเรา\nน่า...รักทุกคนเลยนี่นา"
13004-80 = "อื้ม~! เชิญเลยค่ะ คุณครู\nกำลังรอคุณครูอยู่เลยค่ะ"
13004-90 = "ขอให้เป็นวันที่ดีนะคะ~\nไว้ใจฉันได้ทุกเรื่องเลยค่ะ คุณครู!"
13004-100 = "วันนี้ก็ขอบคุณมากนะคะ"
13004-110 = "หือ?\nอยากนอนหนุนตักเหรอคะ?"
13004-120 = "เรื่องนั้น... รอตอนที่มืดอีกหน่อย~"
13004-130 = "งอแงแบบนี้ไม่ได้นะคะ\nต้องทำงานให้เสร็จก่อนค่ะ~"
13004-140 = "อืม...\nแต่ว่า... คุณครูคะ\nฉันนวดให้ดีไหมคะ?"
13004-150 = "มีคุณครูอยู่ข้างๆ แบบนี้\nรู้สึกปลอดภัยขึ้นเยอะเลยค่ะ"
13004-160 = "สุขสันต์วันเกิดนะคะ!"
13004-170 = "ถ้าเกิดว่าคุณครู...\nไม่ได้มาที่อะบิดอสละก็..."
13004-180 = "ฉันนึกไม่ออกเลยค่ะ!\nคุณครู!\nขอบคุณที่มานะคะ!"
13004-190 = "วันนี้เป็นวันเกิดของฉันค่ะ\nคุณครู มีของขวัญมาให้ฉันด้วย\nใช่ไหมคะ?"
13004-200 = "อื้อออ☆ ถ้าเป็นของขวัญที่คุณครูให้ละก็\nไม่ว่าอะไรฉันก็ชอบทุกอย่างเลยค่ะ~"
13004-210 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ ในปีนี้...\nฉันกับคุณครู... ฮุฮุ☆"
13004-220 = "คุณครูคะ\nปีใหม่ทั้งที...\nไปช็อปปิ้งกันดีไหมคะ?"
13004-230 = "ฉันจะเป็นซานตาคลอส\nให้คุณครูเองค่ะ~"
13004-240 = "ว้าววว!\nตกใจหมดเลยค่ะ!"
13004-250 = "คุณครู~\nอย่าทำให้ตกใจแบบนี้สิคะ"
13004-270 = "เอาละค่ะ เดี๋ยวฉันปั่นหูให้นะคะ\nอยู่นิ่งๆ ก่อนนะคะ คุณครู"
13004-280 = "อย่าขยับตัวแบบนี้สิคะ\nเดี๋ยวฉันจะค่อยๆ ปั่นหูให้นะคะ"
13004-290 = "ถ้ารู้สึกคันมากๆ ก็บอกนะคะ\nอื้ม เก่งมากค่ะ เก่งมาก~"
13004-300 = "อ่า... พอคิดๆ ดูแล้วแบบนี้มัน...\nรู้สึกเขินอยู่นะคะ หน้าของคุณครู...\nอยู่ใกล้มากๆ แบบนี้"
13004-310 = "นี่เป็นบริการพิเศษสำหรับคุณครูเท่านั้น\nเพราะงั้นเป็นความลับระหว่าง\nพวกเรา สองคน นะคะ"
13004-320 = "หือ? ถ้าคุณครูนอนแบบนั้น\nฉันจะเห็นแค่หลังของคุณครูนะคะ...\nแล้วก็ลมหายใจของคุณครู..."
13004-330 = "ไม่ได้นะคะ คุณครู!\nนอนดีๆ สิคะ!"
13004-2600 = "อื้อ... ฉันคิดว่าความแข็งแกร่งมันเป็นดาบสองคม\nแต่ถ้าเพื่อคุณครูกับทุกคนแล้วละก็ ฉันคิดว่าเป็นสิ่งจำเป็นค่ะ ฉันจะใช้ความแข็งแกร่งให้เป็นประโยชน์ เป็นกำลังใจให้ฉันด้วยนะคะ คุณครู"

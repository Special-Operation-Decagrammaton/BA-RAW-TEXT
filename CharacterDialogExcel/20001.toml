[translation]
20001-10 = "블루 아카이브"
20001-20 = "원래 나의 주인은 밀레니엄이지만\n오늘만큼은…\n선생님이 주인님이다."
20001-30 = "수학 공부를 해야 하는데.\n하아.\n숫자는 지긋지긋해."
20001-40 = "예쁜 곳이군…\n나도 언젠가 근사한…\n앗?\n드, 들은 건 아니겠지?!"
20001-50 = "때로는\n휴식도 중요하지."
20001-60 = "귀여운 것? 좋아한다.\n그것도 엄청.\n뭔가 문제라도?"
20001-70 = "네루 선배나 아스나 선배는\n언제나 앞장서니까.\n나? 그들의 등 뒤를\n지키는 게 내 역할이지."
20001-80 = "음. 선생님인가.\n……기다렸다."
20001-90 = "선생님의 스케쥴은 확인했다.\n오늘도 잘 부탁한다."
20001-100 = "타겟 확인.\n목표를 제거한다."
20001-110 = "…농담이야. 숨지 않아도 돼."
20001-120 = "문제 없다. 선생님.\n그 이슈는 이미 해결했다."
20001-130 = "…어떻게? 그, 그건…!\n…궁금해 하지 않아도 된다."
20001-140 = "오늘은 무슨 임무를 수행할 거지?\n무엇이든, 난 도울 테지만."
20001-150 = "축하해 선생님.\n무뚝뚝해서…\n말은 잘 못하지만."
20001-160 = "선생님이 이곳에 와\n진심으로, 기뻐."
20001-170 = "생일이라…\n딱히 기뻐한 적은 없지만."
20001-180 = "선생님이 축하해주니…\n특별한 느낌이 드네."
20001-190 = "새해 복 많이 받아 선생님.\n올해도 잘 부탁한다."
20001-200 = "크리스마스라…\n산타는 필요 없어."
20001-210 = "선생님이 있으니까."
20001-220 = "트릿 오어 파이어!\n사탕을 주지 않으면 발포하겠다!"
20001-230 = "…어? 이런 거 아냐?"
20001-250 = "저, 정말로…\n이런 게 포상이 되는 건가…?"
20001-260 = "어… 음… 어쩐지…"
20001-270 = "엄청나게 부끄럽네.\n하지만 선생님이 좋다면…"
20001-280 = "응? 좀 더 힘껏…?\n아, 알겠다."
20001-290 = "선생님이 좋다면…\n나도… 좋다."
20001-300 = "아앗! 가, 갑자기 일어나지 마!\n위험하다고!"
20001-2600 = "전쟁의 승률은\n무기의 발전에 비례하는 법이지.\n선생님. 앞으로의 내 활약을 기대해줘."

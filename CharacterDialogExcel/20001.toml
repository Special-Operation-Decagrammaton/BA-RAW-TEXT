[translation]
20001-10 = "Blue Archive"
20001-20 = "ที่จริงนายท่านของฉันคือมิลเลเนียม\nแต่ว่าวันนี้... คุณครูคือนายท่านของฉัน"
20001-30 = "ถึงเวลาเรียนคณิตศาสตร์แล้ว...\nเฮ้อ... ตัวเลขน่าเบื่อที่สุด"
20001-40 = "ที่นี่งดงามจริงๆ...\nสักวันฉันก็จะงดงาม...\nอ๊ะ? คงไม่ได้ยินใช่มั้ยนะ?!"
20001-50 = "บางครั้ง\nเวลาพักผ่อนก็สำคัญนะ"
20001-60 = "ของน่ารักๆ เหรอ? ชอบสิ\nเรื่องนั้นมัน...\nมีปัญหาอะไรงั้นเหรอ?"
20001-70 = "รุ่นพี่เนรุกับรุ่นพี่อาสึนะ\nมักจะอยู่แนวหน้าเสมอ\nฉันน่ะเหรอ? ฉันก็คอยปกป้อง\nพวกเขาจากทางด้านหลังยังไงล่ะ"
20001-80 = "คุณครูเหรอ...\nฉันกำลังรออยู่เลย"
20001-90 = "ฉันดูตารางสอนของคุณครูแล้วล่ะ\nวันนี้ก็ฝากตัวด้วยนะ"
20001-100 = "พบเป้าหมาย\nกำจัดเป้าหมาย"
20001-110 = "ล้อเล่นน่า... ไม่ต้องซ่อนก็ได้"
20001-120 = "ไม่มีปัญหาหรอกคุณครู\nปัญหานั้นคลี่คลายได้แล้ว"
20001-130 = "คลี่คลายยังไงน่ะเหรอ?\nเอ่อ... อย่าสงสัยเลยจะดีกว่า"
20001-140 = "วันนี้จะทำภารกิจอะไรเหรอ?\nแต่ไม่ว่าจะทำอะไร\nฉันก็พร้อมช่วยอยู่แล้ว"
20001-150 = "ถึงฉันจะเงียบๆ และพูดไม่ค่อยเก่ง\nแต่ก็สุขสันต์วันเกิดนะคุณครู"
20001-160 = "ฉันดีใจมากเลย\nที่มีคุณครูอยู่ตรงนี้"
20001-170 = "วันเกิดเหรอ...\nฉันไม่เคยฉลองอะไร\nเป็นพิเศษหรอก"
20001-180 = "แต่พอคุณครูมาอวยพรแบบนี้...\nก็รู้สึกเหมือนเป็นวันพิเศษขึ้นมาเลยละ"
20001-190 = "สุขสันต์วันปีใหม่\nปีนี้ก็ฝากตัวด้วยนะ"
20001-200 = "วันคริสต์มาสเหรอ?\nฉันไม่ต้องการซานต้าหรอก"
20001-210 = "เพราะฉันมีคุณครูแล้วไงล่ะ"
20001-220 = "ทริก ออร์ ไฟร์?!\nถ้าไม่ให้ลูกกวาด ฉันจะยิงจริงๆ นะ!"
20001-230 = "อ้าว? ปกติไม่ได้พูดแบบนี้กันเหรอ?"
20001-250 = "นะ... นี่คือ...\nของรางวัลจริงๆ น่ะเหรอ...?"
20001-260 = "เอ่อ... อืม... ฉัน..."
20001-270 = "รู้สึกเขินจังเลย\nแต่ถ้าคุณครูชอบ..."
20001-280 = "ว่าไงนะ?\nให้ฉัน... ออกแรงอีก?\nเอ่อ... ก็ได้"
20001-290 = "ถ้าคุณครูชอบล่ะก็...\nฉันก็... ชอบด้วย"
20001-300 = "อ๊ะ! อย่าลุกพรวดแบบนี้สิ!\nมันอันตรายนะ!"
20001-310 = "นะ... นี่คือ...\nของรางวัลจริงๆ น่ะเหรอ...?"
20001-320 = "อืมม... รู้สึก..."
20001-330 = "รู้สึกเขินจังเลย\nแต่ถ้าคุณครูชอบ..."
20001-2600 = "การแพ้ชนะของการต่อสู้\nวัดกันที่ชั้นเชิงของอาวุธสินะ\nคุณครู คอยดูฝีมือของฉันให้ดีล่ะ"

[translation]
20001-10 = "Blue Archive"
20001-20 = "Originally, Millennium was my master, but starting today...you're my master, Sensei."
20001-30 = "*sigh* I hate having to study math. I'm so sick of numbers."
20001-40 = "What a nice place. Someday, I'd love to... Oh! D-Did you hear that just now?!"
20001-50 = "Taking a rest is sometimes important too."
20001-60 = "Cute things? Sure, I like them. A lot. Is there something wrong with that?"
20001-70 = "Neru and Asuna always take the lead. My responsibility is to cover for them."
20001-80 = "There you are, Sensei. I've...been waiting."
20001-90 = "I had checked your schedule, and I'm looking forward to working with you today."
20001-100 = "Target confirmed. Proceeding with elimination."
20001-110 = "...Only kidding. You don't have to hide."
20001-120 = "No problem, Sensei. That issue has already been taken care of."
20001-130 = "How? Th-That's...! On a need-to-know basis."
20001-140 = "What mission will you see to today? I'll be there to help no matter what."
20001-150 = "Happy birthday, Sensei. I may not be the best when it comes to expressing these sorts of things..."
20001-160 = "...but I'm truly glad to have you in my life."
20001-170 = "My birthday... I've never really celebrated it or anything."
20001-180 = "But it does feel different...to hear you wish me a happy one."
20001-190 = "Happy New Year, Sensei. I'll be counting on you again this year."
20001-200 = "Christmas, huh? I don't need Santa..."
20001-210 = "...because I have you."
20001-220 = "Treat or fire! Surrender the candy, or I will open fire!"
20001-230 = "Huh? Is that not how the saying goes?"
20001-250 = "I-Is this really...a reward?"
20001-260 = "So... Um. This is..."
20001-270 = "...really embarrassing. But if this is really what you want, Sensei."
20001-280 = "You want me to do it a little harder...? O-Okay."
20001-290 = "As long as you're happy, Sensei...then I'm happy too."
20001-300 = "Ah! D-Don't get up so suddenly! I could have fallen!"
20001-310 = "I-Is this really...a reward?"
20001-320 = "So... Um. This is..."
20001-330 = "...really embarrassing. But if this is really what you want, Sensei."
20001-2600 = "The chance of winning a war is proportional to the development of weapons. Watch this, Sensei."

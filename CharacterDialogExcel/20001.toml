[translation]
20001-10 = "蔚藍檔案"
20001-20 = "雖然我原本的主人是千年，\n但今天…\n老師是我的主人。"
20001-30 = "我得學數學才行。\n唉，\n數字好討厭。"
20001-40 = "是個漂亮的地方呢…\n我有朝一日也要有個時髦的…\n啊？你，你聽到了嗎！？"
20001-50 = "偶爾休息也很重要。"
20001-60 = "可愛的東西？我喜歡，\n而且還是超喜歡，\n有什麼問題嗎？"
20001-70 = "因為寧瑠前輩和明日奈前輩\n都會打頭陣。\n我呢？守在他們身後\n是我的職責。"
20001-80 = "嗯？是老師嗎。\n…我一直在等你。"
20001-90 = "確認好老師的行程了。\n今天也請多多指教。"
20001-100 = "目標確認。\n目標排除。"
20001-110 = "…我開玩笑的。\n不用躲起來唷。"
20001-120 = "沒有問題。老師。\n那件事我已經解決了。"
20001-130 = "…怎麼解決的？\n那，那個…！\n…不用介意也沒關係。"
20001-140 = "今天要執行\n什麼任務？\n不管是什麼，\n我都會幫忙的。"
20001-150 = "恭喜你，老師。\n雖然我很木訥… \n不太會講話。 "
20001-160 = "但老師來到這個地方，\n我真的很高興。"
20001-170 = "生日啊…\n雖然不是什麼\n值得開心的事。"
20001-180 = "但老師祝福我的話，\n有種特別的感覺呢。"
20001-190 = "祝老師新年快樂。\n今年也請多指教。"
20001-200 = "聖誕節啊…\n不需要聖誕老人。"
20001-210 = "因為有老師在。"
20001-220 = "Treat or Fire！\n不給糖就開砲！"
20001-230 = "…咦？\n不是這樣嗎？"
20001-250 = "這，這真的…\n能夠當作獎勵嗎…？"
20001-260 = "呃…不…果然…"
20001-270 = "害羞死了。\n但是，如果老師喜歡的話…"
20001-280 = "嗯？再用力一點…？\n我，我知道了。"
20001-290 = "老師喜歡的話…\n我也…可以。"
20001-300 = "啊啊！\n不，不要突然站起來！\n很危險的！"
20001-310 = "這、這種東西…\n真的可以當獎勵…？"
20001-320 = "呃…嗯…怎麼辦……"
20001-330 = "超害羞耶。\n但要是老師喜歡…"
20001-2600 = "戰爭的勝率\n和武器的先進程度成正比，\n老師。敬請期待我日後的表現。"

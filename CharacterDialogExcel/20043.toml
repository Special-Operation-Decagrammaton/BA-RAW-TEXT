[translation]
20043-10 = "블루, 아카이브!"
20043-20 = "새해야, 선생님! 미식 모험, 떠나지 않을래?"
20043-30 = "올해의 새로운\n음식에는\n뭐가 있을까?"
20043-40 = "미~식~탐~험~\n신나는 세계!"
20043-50 = "여기에 어울리는\n음식은 어떤 걸까?"
20043-60 = "우선 내가 만든\n특제 소스를\n가져와야지!"
20043-70 = "정어리 민트 타코야키\n좋아하는 사람?"
20043-80 = "와! 선생님이다!\n어서 와, 어서 와!"
20043-90 = "오느라 힘들었지, 선생님?\n내가 꼭 안아 줄게!"
20043-100 = "응?\n마음만 받겠다고?"
20043-110 = "그것도 좋네!"
20043-120 = "일이 끝나면 같이\n맛있는 거 먹으러 가자,\n선생님!"
20043-130 = "어? 일이 언제 끝날지……\n선생님도 잘 모르겠다고?"
20043-140 = "그럴 수가……\n쓸쓸해……"
20043-150 = "나 있잖아.\n선생님과 만나서\n많은 게 바뀐 것 같아!"
20043-160 = "구체적으로\n뭐가 바뀌었냐고?"
20043-170 = "……"
20043-180 = "아무튼 그래!"
20043-190 = "혹시 목이 안 좋으면\n이야기해 줘."
20043-200 = "바로바로……\n짠맛 감초 사탕을\n가져왔거든!"
20043-210 = "이거 정말\n독특하게 맛있어!\n그리고 목에도 좋대!"
20043-220 = "선생님의 특별한\n시간은 어떤 거야?"
20043-230 = "나는 맛있는 것을\n찾아다니거나, \n특별한 맛을 찾아다니거나\n그런 거였는데."
20043-240 = "지금은 어쩐지,\n선생님과 같이 있는\n시간이 가장 특별해."
20043-250 = "나에게 있어서\n미식이란, 새로움을\n찾는 과정인 것 같아."
20043-260 = "그래서 더 새로운 시도를\n해 보고 싶은 거고."
20043-270 = "선생님은…… 어때?"
20043-280 = "기억하고 있었어!\n오늘 선생님의 생일이지?"
20043-290 = "잊어버리지 않도록,\n잘 적어 두었거든!"
20043-300 = "자, 자! 여기\n케이크도 사 왔어!"
20043-310 = "괜찮아! 아직은\n이즈미 특제 파우더를\n뿌리지 않았거든!"
20043-320 = "내 생일, 기억해 줬구나.\n정말로 기뻐!"
20043-330 = "케이크도\n준비해 뒀으니까\n같이 먹자!"
20043-340 = "응? 선생님이\n케이크를 사 줘야\n하는 것 아니냐고?"
20043-350 = "무슨 소리야, 선생님!\n생일에는 케이크를 먹는다는\n사실만이 중요한 거라구!\n다른 건 아무래도 좋아!"
20043-360 = "새해를 맞아\n기모노를 입었어!\n어때? 어울려?"
20043-370 = "기모노 차림으로\n음식을 먹을 때는, \n주의할 게 많아서\n문제이긴 하지만 말이야……"
20043-380 = "칠면조! 치킨!\n특제 파이와 에그노그!"
20043-390 = "거기에 이즈미 특제\n소스만 있으면,\n크리스마스 준비 끝!"
20043-400 = "걱정하지 마, 선생님.\n선생님 건 따로 챙겨 줄게!"
20043-410 = "할로윈~ 사탕~\n특제 호박파이~"
20043-420 = "이즈미 특제 아이싱을 뿌리면,\n더 독특한 맛이 날 거야!"
20043-430 = "아, 너무 많이\n뿌려 버렸다……"
20043-450 = "있잖아, 선생님."
20043-460 = "새해 음식에는, 오세치 말고도\n여러 가지가 있대."
20043-470 = "그래서 많이 준비해 봤어!"
20043-480 = "나? 나는……"
20043-490 = "선생님이 먹는 것만 봐도,\n행복하다구?"
20043-500 = "그리고, 선생님이랑 이렇게"
20043-510 = "단둘이 있다는 것만으로도\n더 행복하고!"
20043-520 = "앗! 그러니까……"
20043-530 = "조금, 부끄러운 말 해버렸다……"
20043-540 = "그, 그래도! 행복하니까!"
20043-550 = "괜찮아! 문제없어!"
20043-2600 = "미식 모험에는 어떤 위험이\n기다리고 있을지 몰라.\n그러니까 내가 이걸로\n선생님을 지켜 줄게!"

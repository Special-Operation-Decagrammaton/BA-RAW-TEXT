[translation]
20043-10 = "蔚藍檔案！"
20043-20 = "新年快樂～！老師！\n今年也朝美食的冒險出發吧！"
20043-30 = "今年會遇見\n什麼樣的味道呢～？"
20043-40 = "美～食的～探～險～\n真令人期待！"
20043-50 = "這裡的話……\n我好像想吃那個！"
20043-60 = "首先得把\n「我特製．祕傳醬汁」\n帶來才行！"
20043-70 = "沙丁魚薄荷章魚燒，\n要不要吃呀？"
20043-80 = "啊！歡迎回來～！\n我在等你唷，老師！"
20043-90 = "老師，今天也辛苦了！\n來，給你歡迎回來的抱抱～！"
20043-100 = "……咦，你心領了？\n是嗎？"
20043-110 = "既然老師都這麼說了……"
20043-120 = "老師！工作結束之後，\n一起去吃好吃的吧！"
20043-130 = "咦？不知道什麼時候\n才會結束……？"
20043-140 = "怎麼這樣……\n我好寂寞哦……"
20043-150 = "我，在遇見老師之後\n改變了很多哦！"
20043-160 = "比如……\n具體來說呢～"
20043-170 = "……"
20043-180 = "總之就是變了哦！"
20043-190 = "喉嚨如果不舒服的話\n就跟我說吧。"
20043-200 = "鏘～！\n是鹽味的甘草糖！"
20043-210 = "這個，聽說對喉嚨很好！\n味道也非常有趣唷！"
20043-220 = "老師老師！\n你覺得什麼樣的\n時光是特別的？"
20043-230 = "我呢，覺得是尋找美食，\n或者遇見嶄新味道的時候\n……本來是這樣的。"
20043-240 = "不過現在，跟老師共度\n的時光，才是最特別的。"
20043-250 = "美食能帶給我\n想像不到的興奮感。"
20043-260 = "所以呢，我才會想試著\n多挑戰各種嶄新的東西～！"
20043-270 = "吶，老師覺得呢？"
20043-280 = "啊，我記得哦！\n今天是老師的生日對吧？"
20043-290 = "為了避免忘記，\n我有好好寫下來哦！\n耶嘿嘿！"
20043-300 = "鏘鏘～！\n我買了蛋糕過來！"
20043-310 = "……「我特製．粉末」？\n還沒撒上去哦？"
20043-320 = "啊！我的生日！\n你有記得嗎？\n好開心！"
20043-330 = "耶嘿嘿，一起來吃蛋糕吧～！"
20043-340 = "咦？被祝福的那方\n準備蛋糕，有點奇怪？"
20043-350 = "沒有那種事唷！\n「吃蛋糕」才是重點！\n其他事情都不重要哦！"
20043-360 = "耶嘿嘿！因為是正月\n所以我穿上了和服！\n怎麼樣呀？"
20043-370 = "不過，吃飯的時候\n會有點辛苦。\n因為必須注意袖子才行……"
20043-380 = "火雞跟雞肉！\n百果餡餅和蛋奶酒！"
20043-390 = "再加上「我特製．祕傳醬汁」\n……聖誕節的準備就完美了！"
20043-400 = "啊，當然也有老師的份哦～！"
20043-410 = "糖果跟南瓜派～\n感覺很好吃！"
20043-420 = "淋上「我特製．糖霜」之後，\n感覺味道會變得更～有趣！"
20043-430 = "啊，加太多了……"
20043-450 = "你知道嗎，老師。"
20043-460 = "聽說新年的料理，\n除了御節料理之外\n還有很多種類哦！"
20043-470 = "所以呢，我準備了非～常多！"
20043-480 = "我？我的話……"
20043-490 = "只要看著老師吃，\n就覺得很幸福了哦？"
20043-500 = "還有……\n能像這樣和老師"
20043-510 = "兩人待在一起就滿足了！\n大概吧！"
20043-520 = "啊！那個……"
20043-530 = "說了有點令人\n害羞的話……"
20043-540 = "可，可是！真的很幸福！"
20043-550 = "所以沒問題！沒事的！"
20043-2600 = "美食的冒險，\n有時也伴隨著危險……\n所以，我會保護老師的！"

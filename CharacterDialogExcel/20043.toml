[translation]
20043-10 = "Blue Archive!"
20043-20 = "It's New Year's, Sensei! Would you like to go on a dining adventure?"
20043-30 = "What new foods are we going to discover this year?"
20043-40 = "Dining! Adventure! A world of fun?"
20043-50 = "What kind of food would go well with this?"
20043-60 = "I should start by bringing out my very own custom special sauce!"
20043-70 = "Does anyone here like sardine mint takoyaki?"
20043-80 = "Yay! It's Sensei! Welcome, welcome!"
20043-90 = "It was a rough trip, wasn't it, Sensei? You deserve a big hug!"
20043-100 = "What? You appreciate the thought, but it's okay?"
20043-110 = "That's fine too!"
20043-120 = "Hey Sensei, after you finish work, let's go out for something delicious!"
20043-130 = "What? You don't...know when you'll be done with work?"
20043-140 = "Aww, but I'm lonely now..."
20043-150 = "You know, I think meeting you has changed me a lot."
20043-160 = "What do I mean, specifically? Well..."
20043-170 = "..."
20043-180 = "Anyways, yeah!"
20043-190 = "Let me know if your throat hurts."
20043-200 = "Because...I brought salty licorice!"
20043-210 = "It's oddly tasty! And also good for your throat!"
20043-220 = "What's one of your special moments, Sensei?"
20043-230 = "For me, all my special moments were about searching for something tasty, finding unique flavors, that kind of thing."
20043-240 = "But now, I think being with you is the most special moment of all."
20043-250 = "For me, gourmet food feels like a process of finding something new."
20043-260 = "Which is why I always want to try new things."
20043-270 = "What about you...Sensei?"
20043-280 = "I remembered! It's your birthday, right, Sensei?"
20043-290 = "I wrote it down so I wouldn't forget!"
20043-300 = "Okay, okay! Here, I bought a cake!"
20043-310 = "Don't worry! I haven't sprinkled Izumi's special powder on it yet!"
20043-320 = "You remembered my birthday. I'm so happy!"
20043-330 = "I brought a cake too, so let's share it together!"
20043-340 = "Hm? You think you should be the one to buy the cake?"
20043-350 = "What are you talking about, Sensei? The important thing is eating a cake on my birthday. The details are just...whatever!"
20043-360 = "I wore a kimono for New Year's! What do you think, does it look good?"
20043-370 = "Though wearing a kimono does make eating food more challenging... That's a problem......"
20043-380 = "Turkey! Chicken! Special pie and eggnog!"
20043-390 = "And with Izumi's special sauce on top of that, we're all set for Christmas!"
20043-400 = "Don't worry, Sensei. I'll get you your portion!"
20043-410 = "Halloween! Candy! Special pumpkin pie!"
20043-420 = "And for even more interesting flavor, Izumi's special icing!"
20043-430 = "Ah, I put too much on..."
20043-450 = "As you can see, Sensei..."
20043-460 = "...there are many other New Year's foods besides osechi."
20043-470 = "So I prepared everything I could think of!"
20043-480 = "Me? I..."
20043-490 = "I'm happy just watching you eat, you know?"
20043-500 = "Also, us being alone together..."
20043-510 = "...just me and you, Sensei, that makes me even more happy!"
20043-520 = "Ah! Well..."
20043-530 = "I said something a bit embarrassing..."
20043-540 = "A-Anyway! Since I'm happy..."
20043-550 = "...it's okay! There's no problem!"
20043-2600 = "You never know what kind of danger awaits on a dining adventure. So I'll protect you with this, Sensei!"

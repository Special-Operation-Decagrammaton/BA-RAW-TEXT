[translation]
20043-10 = "Blue Archive!"
20043-20 = "ปีใหม่แล้ว คุณครู! ไปผจญภัยหาอาหารเลิศรสกันเถอะ!"
20043-30 = "อาหารใหม่ๆ ของปีนี้\nจะมีอะไรบ้างนะ?"
20043-40 = "สำ~ รวจ~\nอาหาร~ เลิศรส\nโลกที่น่าตื่นเต้น!"
20043-50 = "อาหารที่เหมาะกับที่นี่\nจะเป็นอาหารยังไงนะ?"
20043-60 = "ก่อนอื่นต้องไปเอา\nซอสสูตรพิเศษ\nที่ฉันทำมาแล้วละ!"
20043-70 = "มีใครชอบทาโกะยากิ\nปลาซาร์ดีนมิ้นต์ช็อกบ้าง?"
20043-80 = "ว้าว! คุณครูนี่นา!\nเข้ามาเร็ว เร็วเข้า!"
20043-90 = "เดินทางมาเหนื่อยเลยใช่มั้ยคุณครู?\nฉันจะกอดให้เอง!"
20043-100 = "หืม? ขอรับไว้\nแค่ความตั้งใจเท่านั้นเหรอ?"
20043-110 = "แบบนั้นก็ดีเหมือนกันนะ!"
20043-120 = "ไว้เสร็จงานแล้ว\nเราไปกินของอร่อยด้วยกันเถอะ\nคุณครู!"
20043-130 = "หืม? คุณครูก็ไม่รู้...\nว่างานจะเสร็จเมื่อไรงั้นเหรอ?"
20043-140 = "ได้ไงเนี่ย...\nเหงาจัง..."
20043-150 = "ฉันน่ะ\nพอได้เจอคุณครู ฉันก็\nก็เปลี่ยนไปหลายอย่างเลย!"
20043-160 = "มีอะไรที่เปลี่ยนไป\nในเชิงรูปธรรมบ้างน่ะเหรอ?"
20043-170 = "..."
20043-180 = "เอาเถอะน่า!"
20043-190 = "ถ้าเจ็บคอละก็\nบอกฉันได้เลยนะ"
20043-200 = "ก็เพราะว่า...\nฉันเอาลูกอมชะเอมรสเค็ม\nมาน่ะสิ!"
20043-210 = "อันนี้มันอร่อย\nไม่เหมือนใครเลยละ!\nแล้วมันก็ทำให้ชุ่มคอด้วยนะ!"
20043-220 = "เวลาแสนพิเศษของคุณครู\nเป็นแบบไหนเหรอ?"
20043-230 = "ของฉันเป็นเวลาที่\nได้ออกไปหาของอร่อยๆ\nหรือไม่ก็หารสชาติที่พิเศษๆ\nประมาณนี้น่ะ"
20043-240 = "แต่ตอนนี้เวลาที่\nฉันได้อยู่กับคุณครู\nมันพิเศษที่สุดเลย"
20043-250 = "สำหรับฉันแล้ว\nการชิมอาหารน่าจะเป็น\nกระบวนการตามหาสิ่งใหม่ๆ"
20043-260 = "ฉันก็เลยอยากลอง\nทำอะไรที่แปลกใหม่กว่าเดิม"
20043-270 = "แล้วคุณครูล่ะ... คิดว่ายังไง?"
20043-280 = "ฉันจำได้ขึ้นใจเลยละ!\nวันนี้วันเกิดคุณครูใช่มั้ย?"
20043-290 = "ฉันจดเอาไว้\nจะได้ไม่ลืมน่ะ!"
20043-300 = "เอาละๆ! นี่ไง\nฉันซื้อเค้กมาด้วย!"
20043-310 = "ไม่เป็นไรเลย! ฉันยังไม่ได้โรย\nแป้งสูตรพิเศษของอิซุมิ\nไปหรอกน่า!"
20043-320 = "จำวันเกิดฉันได้สินะ\nดีใจที่สุดเลย!"
20043-330 = "ฉันเตรียมเค้ก\nเอาไว้แล้วด้วย\nมากินด้วยกันเถอะ!"
20043-340 = "หืม? คุณครูต้องเป็น\nคนซื้อเค้กให้มากกว่า\nอย่างงั้นเหรอ?"
20043-350 = "พูดอะไรของคุณครูน่ะ!\nที่สำคัญมันแค่\nเราได้กินเค้กในวันเกิดต่างหาก!\nส่วนเรื่องอื่นไม่เป็นไรหรอก!"
20043-360 = "ฉันใส่ชุดกิโมโนรับปีใหม่น่ะ!\nเป็นไงบ้าง? เข้ากับฉันมั้ย?"
20043-370 = "เวลากินอาหารตอนใส่ชุดกิโมโน\nต้องระวังหลายเรื่อง\nมันก็เลยเป็นปัญหาเหมือนกัน..."
20043-380 = "ไก่งวง! ไก่ทอด!\nพายสูตรพิเศษกับเอ๊กน็อก!"
20043-390 = "แล้วถ้ามีซอสสูตรพิเศษ\nของอิซุมิอีกอย่าง ก็ถือว่า\nเตรียมอาหารคริสต์มาสเสร็จแล้ว!"
20043-400 = "ไม่ต้องห่วงนะ คุณครู\nฉันจะเตรียมของคุณครูไว้ให้ต่างหาก!"
20043-410 = "ฮาโลวีน~ ลูกอม~\nพายฟักทองสูตรพิเศษ~"
20043-420 = "ถ้าโรยไอซิ่งตำรับของอิซุมิ\nก็จะยิ่งได้รสที่แปลกใหม่!"
20043-430 = "อ่า...\nโรยเยอะเกินไปแล้ว..."
20043-450 = "นี่ คุณครู"
20043-460 = "อาหารปีใหม่น่ะ นอกจากโอเซจิแล้ว\nยังมีอย่างอื่นอีกเยอะเลยละ"
20043-470 = "ฉันก็เลยเตรียมมาให้เพียบเลย!"
20043-480 = "ฉันเหรอ? ฉันน่ะ..."
20043-490 = "แค่ได้เห็นคุณครูกิน\nฉันก็มีความสุขแล้ว"
20043-500 = "อีกอย่าง ยิ่งได้มาอยู่"
20043-510 = "กับคุณครูตามลำพังแบบนี้\nฉันก็ยิ่งมีความสุขนะ!"
20043-520 = "อ๊ะ! เมื่อกี้..."
20043-530 = "เผลอพูดอะไรน่าอายออกไปจนได้..."
20043-540 = "ตะ... แต่ถึงยังไง! ฉันก็มีความสุขนี่เนอะ!"
20043-550 = "งั้นก็ไม่เป็นไรหรอก! ไม่มีปัญหา!"
20043-2600 = "การผจญภัยเพื่ออาหารเลิศรส\nจะมีอันตรายอะไรรออยู่บ้างก็ไม่รู้\nฉันก็เลยจะปกป้องคุณครู\nด้วยสิ่งนี้ให้เลย!"

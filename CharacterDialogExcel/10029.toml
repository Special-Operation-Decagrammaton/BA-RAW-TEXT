[translation]
10029-10 = "Blue Archive!"
10029-20 = "โอ๊สสส ยินดีที่ได้รู้จักนะคุณครู\nวันนี้ฟ้าก็สดใสเหมือนลูกกวาดเลย"
10029-30 = "ไหนดูซิมีขนมอยู่บ้างมั้ย..."
10029-40 = "ครึกครื้นจังเลยน้า\nบรรยากาศดีจัง"
10029-50 = "น่า-เบื่อ-จัง-เลย"
10029-60 = "คุณครูเอง...\nก็อยู่ที่นี่ด้วยเหรอ...?"
10029-70 = "โอ้...!\nนั่นมัน...!"
10029-80 = "เชิญเลยคุณครู\nกินอะไรก่อนดีมั้ย?"
10029-90 = "ฮิฮิฮิ\nกำลังรออยู่เลยละ~"
10029-100 = "อะไรน่ะคุณครู?\nรู้สึกหิวเหรอ?\nเอาขนมหน่อยมั้ย?"
10029-110 = "ฉันมีเรื่องสงสัยอยู่\nปกติแล้วคุณครู\nบ้วนปากด้วยอะไรเหรอ?"
10029-120 = "ฉันก็ไม่ได้พูดแต่เรื่องขนม\nทั้งวันหรอกนะ"
10029-130 = "ต้องแยกระหว่างกระเพาะ\nใส่ขนมกับกระเพาะใส่\nอาหารสิ ใช่มั้ยล่ะ?"
10029-140 = "ปรัชญาที่แฝงอยู่ในขนมหวานนี้..."
10029-150 = "น่าประทับใจใช่มั้ยล่ะ?"
10029-160 = "วันเกิดของคุณครู...!"
10029-170 = "ช่วยไม่ได้นะ\nวันนี้ฉันจะเลี้ยงเอง!"
10029-180 = "คุณครู คุณครู\nรู้มั้ยว่าวันนี้วันอะไร?"
10029-190 = "ฉันคาดหวังอยู่น้า~?"
10029-200 = "เอาล่ะ ปีนี้จะมีอะไรใหม่ๆ\nบ้างมั้ยนะ?"
10029-210 = "มาตั้งตารอด้วยกันเถอะนะคุณครู!"
10029-220 = "ในปีนี้\nซานต้าทอดทิ้งฉันไปแล้วหรือไง!"
10029-230 = "เดี๋ยวสิ หรือว่าคุณครูคือซานต้าของฉัน~"
10029-240 = "วันนี้เป็นวันที่...\nจะได้รับลูกกวาดเยอะแยะเลย...!"
10029-250 = "ไปกันเถอะคุณครู!\nยังมีพื้นที่ในกระเพาะเหลือ\nพอจะใส่ขนมลงไปอีกเยอะเลย!"
10029-270 = "ดูนี่สิคุณครู...! สุดยอด!\nมีอยู่เยอะแยะเลย!"
10029-280 = "ขนมนี่ ฉันเพิ่งเคยเห็นครั้งแรก\nอันนั้นก็เพิ่งเคยเห็นเลย..."
10029-290 = "มีแต่ขนมที่เพิ่งเคยเห็น\nทั้งนั้นเลย...!!"
10029-300 = "อ๊ะ โทษที โทษที\nจู่ๆ ฉันก็ตื่นเต้น ลืมตัวไปหน่อย"
10029-310 = "ขอบคุณนะคุณครู"
10029-320 = "ที่มาเป็นเพื่อนกับฉันแบบนี้"
10029-330 = "ฉันรู้สึก... ขอบคุณจริงๆ"
10029-340 = "ได้อยู่กับคุณครูแบบนี้...\nมันสนุกมากเลยล่ะ"
10029-2600 = "โอ้... เยี่ยมไปเลย...\nแน่ใจใช่มั้ย?\nไม่มีการคืนของหรอกนะ~?"

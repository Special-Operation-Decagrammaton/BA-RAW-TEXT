[translation]
10029-10 = "Blue……Archive！"
10029-20 = "呀呀～能見到你很開心唷，老師。\n看來今天也會是像糖果一樣，甜～甜的一天呢。"
10029-30 = "有沒有什麼零食……"
10029-40 = "嗯，\n氣氛真好呢～"
10029-50 = "真～閒～啊～"
10029-60 = "咦，老師呢……？"
10029-70 = "哦哦……！\n這個是……！"
10029-80 = "歡迎回來，老師。\n要不要先吃點什麼？"
10029-90 = "嘻嘻，在等你唷～"
10029-100 = "怎麼了嗎，老師？\n……嘴饞嗎？\n要不要給你糖果？"
10029-110 = "話說老師，你喜歡\n吃什麼來去除口中的味道呢？"
10029-120 = "就算是我，\n也不會整天都在講零食的事唷～"
10029-130 = "老師……你有聽說過\n「另一個胃」嗎？"
10029-140 = "這也是甜點中蘊含的哲學……"
10029-150 = "怎麼樣？感動了嗎？"
10029-160 = "老師的生日……"
10029-170 = "沒辦法，\n今天我請客吧！"
10029-180 = "老師，老師。\n今天是什麼日子\n你一定知道對吧？"
10029-190 = "我超～級期待的唷？"
10029-200 = "那麼今年的新產品\n會是怎樣的感覺呢？"
10029-210 = "一起去買吧，老師！"
10029-220 = "究竟今年聖誕老人\n會不會也拋下我不管呢！"
10029-230 = "還是今年的聖誕老人\n就是老師！？"
10029-240 = "今天是可以\n收到一堆糖果的日子……！"
10029-250 = "要走了唷，老師！\n啊，把那個地方空下來吧！\n從今天開始，那裡\n暫時就是放糖果的地方了！"
10029-270 = "你看你看，老師！\n好厲害……！有這麼多！！"
10029-280 = "而且，每一個都\n沒有看過！！"
10029-290 = "全都是第一次\n見到的零食……！！"
10029-300 = "……啊哈，抱歉抱歉。\n突然放鬆了下來。"
10029-310 = "謝謝你，老師。"
10029-320 = "像這樣陪著我。"
10029-330 = "真的很感謝你哦。"
10029-340 = "像這樣和老師待在一起，\n又開心又有趣。"
10029-2600 = "唔哦，這個真厲害呢……\n真的可以給我嗎？\n不可以退貨喔～？"

[translation]
10029-10 = "블루~아카이브!"
10029-20 = "어이어이, 반갑다고. 선생님.\n오늘도 달콤한 캔디 같은 하루."
10029-30 = "어디 간식거리 없나……"
10029-40 = "활기차네.\n분위기 좋은걸."
10029-50 = "심-심-하-다-."
10029-60 = "선생님도\n여기 있나……?"
10029-70 = "오오……!\n저건……!"
10029-80 = "어서 와, 선생님.\n우선 뭐 좀 먹을래?"
10029-90 = "히.히.히.\n기다리고 있었다구~."
10029-100 = "뭐야, 선생님?\n입이 심심해?\n사탕이라도 줄까?"
10029-110 = "그런데 선생님,\n평소 입가심으로는\n뭘 선호하는 편이야?"
10029-120 = "나라고 늘 간식 이야기만\n하는 건 아니라구~"
10029-130 = "선생님.\n'간식 배'\n라고 들어봤어?"
10029-140 = "이 디저트에 담긴 철학……"
10029-150 = "어때, 감동하겠어?"
10029-160 = "선생님의 생일……!"
10029-170 = "어쩔 수 없군.\n오늘은 내가 쏜다!"
10029-180 = "선생님, 선생님.\n오늘 무슨 날인지……\n알고 있지?"
10029-190 = "엄-청 기대하고 있다고~?"
10029-200 = "자, 올해에는\n무슨 신상이 나올까?"
10029-210 = "같이 사러 가자고, 선생님!"
10029-220 = "과연 올해에도\n산타는 날 버릴 것인가!"
10029-230 = "아니, 어쩌면 당신이 나의 산타일까!"
10029-240 = "오늘은 사탕을\n잔뜩 받을 수 있는 날……!"
10029-250 = "가자고, 선생님!\n저장할 공간은 충분하지?\n오늘부터 당분간,\n사탕 둘 곳이 될 테니까!"
10029-270 = "봐봐, 선생님! 대단해……\n이렇게 가득!!"
10029-280 = "거기에, 이것도 저것도\n본 적도 없어!!"
10029-290 = "처음으로 본\n과자들뿐이야……!!"
10029-300 = "……아핫. 미안, 미안.\n뭔가 갑자기 맥이 풀려버려서."
10029-310 = "고마워, 선생님."
10029-320 = "이렇게 어울려 줘서."
10029-330 = "정말로 감사하고 있어."
10029-340 = "선생님과 이렇게 있어서\n기쁘고 즐거워."
10029-2600 = "오오…… 대단하잖아……\n나 주는 거 확실하지?\n반품 같은 건 없다고~?"

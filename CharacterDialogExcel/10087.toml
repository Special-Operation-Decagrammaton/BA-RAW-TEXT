[translation]
10087-10 = "蔚藍檔案"
10087-20 = "呵呵，老師。這件禮服怎麼樣啊？\n……這時只要坦率地稱讚就行了唷。\n……不過話雖如此，老師的意見終究也只是參考而已。"
10087-30 = "現在的我…\n是一名間諜…\n哼哼～"
10087-40 = "陽奈委員長，\n會在哪裡呢？"
10087-50 = "這副打扮，因為方便\n行動所以我很喜歡…\n可是好像有點冷…"
10087-60 = "呼，希望至少\n今天不會\n發生麻煩…"
10087-70 = "（呵呵，在這裡\n　悠閒一下…）"
10087-80 = "歡迎回來，老師。"
10087-90 = "今天就由我，天雨亞子\n特．別．助你一臂之力♪"
10087-100 = "哎呀，老師。\n是不是來得有點晚呀？"
10087-110 = "算了，沒關係……"
10087-120 = "今天就由我來\n輔佐老師。\n還請多多指教哦。"
10087-130 = "終於自己親赴\n現場的優秀行政官。"
10087-140 = "沒錯……那就是我。"
10087-150 = "沒錯，這套禮服\n就是我的覺悟。"
10087-160 = "將它穿在身上的期間，\n我就是完美的特務。"
10087-170 = "要說得更詳細一點的話…\n現在的我是間諜電影的女主角…"
10087-180 = "有著如此\n堅忍不拔的心。"
10087-190 = "就算換上禮服，\n我還是我。"
10087-200 = "在老師的業務輔佐方面\n是萬無一失的。"
10087-210 = "……所以，請專注在工作上吧。"
10087-220 = "咦？覺得我\n好像比平常興奮？"
10087-230 = "……那會不會是錯覺？\n就算身上穿著的東西\n改變，我還是我哦。"
10087-240 = "如果硬要說的話，我認為\n「這是能進一步協助\n陽奈委員長的機會」。真的。"
10087-250 = "咦？有我幫忙，\n非常有幫助……？"
10087-260 = "這，這樣啊……\n我的輔佐能讓您\n滿意真是太好了。"
10087-270 = "……更對我的價值\n有所理解，好好\n感謝我也沒關係哦？"
10087-280 = "呵呵……"
10087-290 = "老師，祝您生日快樂。"
10087-300 = "機會難得……\n今天要不要\n跟我一起度過？"
10087-310 = "問我具體要做什麼……"
10087-320 = "我想想…那個…\n通，通宵玩\n填字遊戲之類的…？"
10087-330 = "請，請不要笑！\n我沒想到居然\n會被這麼問嘛！"
10087-340 = "哎呀，是在慶祝\n我的生日嗎？"
10087-350 = "謝謝您。\n那麼，畢竟是生日……"
10087-360 = "……任何事\n都能拜託您？"
10087-370 = "呵呵……說這種話沒關係嗎？\n我會拜託您什麼事……\n您明明還不知道。"
10087-380 = "祝您新年快樂，老師。"
10087-390 = "又這樣一起\n迎接新年了呢。"
10087-400 = "……第一次見面時，\n完全沒想過\n能度過這樣的時間。"
10087-410 = "總覺得感慨萬千呢。"
10087-420 = "聖誕快樂。\n老師。"
10087-430 = "光是聖誕節這個名字\n就有一種特別的感覺呢。"
10087-440 = "如果願意的話，\n一起去燈飾閃閃發亮\n的街上走走……如何？"
10087-450 = "……這種時候請\n馬上說OK好不好。"
10087-460 = "是啊，我當然知道。\n今天是萬聖節。"
10087-470 = "是人們選擇糖果或搗蛋\n互相交流的日子……"
10087-480 = "老師要選哪一個呢？"
10087-490 = "……應該不會，\n選擇搗蛋……對吧？"
10087-510 = "這，這樣下去我會很困擾的！\n如果被其他人發現的話……"
10087-520 = "就要出大事了……！"
10087-530 = "居，居然偏偏\n在這種時候……！"
10087-540 = "果然，是因為和老師\n一起來的關係……？"
10087-550 = "老師！\n請想想辦法！"
10087-560 = "在我發生大事之前，快點！"
10087-570 = "咦？怎，怎麼了嗎？\n那個表情……"
10087-580 = "……嗯？"
10087-590 = "怎，怎麼了？\n您到底發現了什麼……？"
10087-600 = "這，這是，因為……\n退貨的話，各方面\n都有點麻煩……"
10087-610 = "那個……因為風紀\n委員會的工作很忙，\n該說是沒時間嗎……"
10087-620 = "總是就是那樣！\n就請當作是那樣吧！"
10087-2600 = "始終給予支援，真是感激不盡。\n雖然老師應該也已經知道──\n我，天雨亞子絕不會讓您失望。\n無論是過去，還是未來。\n敬請期待未來的我哦。"

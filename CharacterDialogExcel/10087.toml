[translation]
10087-10 = "Blue Archive"
10087-20 = "Heehee. Oh, Sensei. How's my dress? Do give your honest opinion. I only need it as a reference."
10087-30 = "Right now, I'm a spy. Heehee."
10087-40 = "I wonder where President Hina is?"
10087-50 = "This outfit is quite comfortable and easy to move in. ...It does feel a bit cold."
10087-60 = "Phew. I hope there's no trouble, at least for today."
10087-70 = "(Heehee. I should take my time with this...)"
10087-80 = "Welcome, Sensei."
10087-90 = "Just for today, you have I, Amau Ako's help. It's Just. For. You! ♪"
10087-100 = "Oh my, Sensei. Aren't you running a little late?"
10087-110 = "Well, it doesn't matter."
10087-120 = "I shall be assisting you today. I look forward to working with you."
10087-130 = "A great senior administrator is one who puts themselves out in the field."
10087-140 = "Yes... That's me."
10087-150 = "You see, this dress reflects my resolve."
10087-160 = "In it, I'm the perfect secret agent."
10087-170 = "To be more specific... I'm like the heroine in a spy film."
10087-180 = "I have that kind of determination."
10087-190 = "Even if I'm in this fancy dress, I'm still me."
10087-200 = "To support Sensei, one must be flawless."
10087-210 = "...So with that said, make sure you stay focused too."
10087-220 = "Huh? I sound more excited than usual?"
10087-230 = "...Are you sure you're not mistaken? Even with a change of clothes, I'm still me."
10087-240 = "Speaking candidly, I consider this a chance to show extra support to Head Prefect Hina. Really."
10087-250 = "Huh? I'm a lifesaver?"
10087-260 = "I see... I'm happy to hear you're pleased with my assistance."
10087-270 = "...Although, I do wish you'd show appreciation for my talents more often."
10087-280 = "Heehee..."
10087-290 = "Sensei, happy birthday."
10087-300 = "It's been a while, so... Why don't you spend the day with me?"
10087-310 = "\"What are we going to do,\" you say?"
10087-320 = "Well...uh... H-How about an all-night crossword puzzle marathon, or..."
10087-330 = "D-Don't laugh! I didn't think you'd actually ask for my input!"
10087-340 = "Oh my, are you congratulating me on my birthday?"
10087-350 = "Thank you. Hmm? Since it's my birthday..."
10087-360 = "I can ask for anything? Is that so?"
10087-370 = "Heehee... Are you sure about that, Sensei? You have no idea what I'll ask for..."
10087-380 = "Happy New Year, Sensei!"
10087-390 = "Here we are, ringing in the new year again."
10087-400 = "...When we first met, I never thought that we'd be able to spend time together like this."
10087-410 = "Hm, it's a bit overwhelming."
10087-420 = "Merry Christmas, Sensei."
10087-430 = "Just the name Christmas makes me feel like something magical is in the air."
10087-440 = "If you don't mind, shall we walk through the illuminated streets together?"
10087-450 = "...You're supposed to say \"Yes, of course!\""
10087-460 = "Yes, I know. Today is Halloween."
10087-470 = "Trick or treat? This is the choice that people are faced with on this day."
10087-480 = "Which would you prefer, Sensei?"
10087-490 = "...There's no way you'd choose...a trick...would you?"
10087-510 = "Th-This is really bad! If someone else notices..."
10087-520 = "It'll be huge trouble!"
10087-530 = "Wh-Why now of all times?!"
10087-540 = "Is it because I came here with you, Sensei?!"
10087-550 = "Sensei! Please...just do something!"
10087-560 = "Before I end up in a tabloid!"
10087-570 = "Hm? Wh-What is it? What's with that look?"
10087-580 = "...Huh?"
10087-590 = "Wh-What is it? Just what did you find?"
10087-600 = "Th-That's, uh... Returning...purchases tends to be a lot of effort..."
10087-610 = "And...I was too busy with Prefect Team work, so I had no time..."
10087-620 = "Look, it is what it is! Let's just leave it at that!"
10087-2600 = "Thank you for your continued support. As you know, Sensei... I, Amau Ako, have never let you down. Not now, and not ever. I look forward to continue working with you."

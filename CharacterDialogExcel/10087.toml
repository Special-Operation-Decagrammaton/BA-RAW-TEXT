[translation]
10087-10 = "Blue Archive"
10087-20 = "ฮุฮุ คุณครู ชุดนี้เป็นยังไงบ้างคะ?\nอยู่ที่นี่น่ะ ชมฉันอย่างเปิดเผยได้เลยค่ะ...\nแต่ถึงอย่างนั้น ความคิดเห็นของคุณครูจะถูกใช้สำหรับ\nอ้างอิงเท่านั้นค่ะ"
10087-30 = "ตอนนี้ฉัน...\nเป็นสายลับคนหนึ่ง...\nฮึ่ม"
10087-40 = "ท่านประธานฮินะ\nไปอยู่ที่ไหนนะคะ?"
10087-50 = "ฉันชอบที่ใส่ชุดนี้แล้ว\nเคลื่อนไหวสะดวกดีค่ะ...\nแต่มันก็หนาวอยู่หน่อยๆ..."
10087-60 = "ฮู่ว หวังว่าวันนี้\nจะไม่เกิดปัญหา\nอะไรนะ..."
10087-70 = "(ฮุฮุ อยู่ที่นี่แล้ว\nชิลจังเลยนะคะ...)"
10087-80 = "กลับมาแล้วเหรอคะ คุณครู"
10087-90 = "วันนี้ฉัน อามาอุ อาโกะ\nจะช่วยเหลือคุณ\nเป็นพิเศษเลยค่ะ♪"
10087-100 = "โอ๊ะ คุณครู\nมาช้าไปหน่อยรึเปล่าคะ?"
10087-110 = "แต่ก็ไม่เป็นไรหรอกค่ะ"
10087-120 = "วันนี้ฉันจะเป็นผู้ช่วย\nให้คุณครูเองค่ะ\nขอฝากตัวด้วยนะคะ"
10087-130 = "ในที่สุดเจ้าหน้าที่ที่ยอดเยี่ยม\nก็ได้ออกไปหน้างานแล้ว"
10087-140 = "ค่ะ... คือฉันเองค่ะ"
10087-150 = "ค่ะ ชุดนี้เป็นความตั้งใจของฉันค่ะ"
10087-160 = "ระหว่างที่สวมใส่ชุดนี้อยู่\nฉันคือสายลับที่สมบูรณ์แบบค่ะ"
10087-170 = "ถ้าจะพูดให้ชัดกว่านี้...\nตอนนี้ฉันคือตัวเอกในหนังสายลับ..."
10087-180 = "ฉันมีจิตใจที่หนักแน่น\nขนาดนั้นเลยละค่ะ"
10087-190 = "ถึงจะเปลี่ยนมาใส่ชุดเดรส\nแต่ฉันก็คือฉันค่ะ"
10087-200 = "ฉันไม่มีข้อบกพร่องในการ\nช่วยเหลืองานของคุณครูหรอกค่ะ"
10087-210 = "เพราะงั้นก็ช่วยจดจ่อ\nกับงานด้วยนะคะ"
10087-220 = "คะ? เหมือนฉันจะดูตื่นเต้น\nมากกว่าปกติเหรอคะ?"
10087-230 = "คิดไปเองรึเปล่าคะ?\nถึงเสื้อผ้าบนตัวจะเปลี่ยนไป\nแต่ฉันก็เป็นฉันค่ะ"
10087-240 = "ถ้าจะให้พูดละก็ ฉันคิดว่านี่คือ\nโอกาสที่จะช่วยท่านประธานฮินะ\nได้มากขึ้นค่ะ จริงๆ นะคะ"
10087-250 = "คะ? รอดมาได้เพราะฉันช่วยไว้เหรอคะ...?"
10087-260 = "ยะ... อย่างนั้นเหรอคะ...\nถ้าพอใจกับการช่วยเหลือของฉัน\nก็โล่งอกไปทีนะคะ"
10087-270 = "เข้าใจคุณค่าของฉันให้มากขึ้น\nแล้วรู้สึกขอบคุณก็ได้นะคะ"
10087-280 = "ฮุฮุ..."
10087-290 = "คุณครู สุขสันต์วันเกิดค่ะ"
10087-300 = "ไหนๆ ก็ถึงวันนี้แล้ว...\nวันนี้มาใช้เวลา\nอยู่กับฉันมั้ยคะ?"
10087-310 = "ถ้าถามว่าทำอะไร\nอย่างเป็นรูปธรรมบ้าง..."
10087-320 = "ไม่รู้สิคะ... คง... ตะ... โต้รุ่ง\nแล้วเล่นปริศนาอักษรไขว้กัน...?"
10087-330 = "ยะ... อย่าขำสิคะ!\nก็ฉันไม่ทันได้คิดนี่คะ\nว่าคุณครูจะถามน่ะ!"
10087-340 = "โอ๊ะ มาอวยพรวันเกิด\nให้ฉันเหรอคะเนี่ย?"
10087-350 = "ขอบคุณนะคะ\nในเมื่อวันนี้เป็นวันเกิด..."
10087-360 = "งั้นฉันจะขอร้อง\nอะไรก็ได้นะคะ"
10087-370 = "ฮุฮุ... พูดแบบนั้นได้\nไม่เป็นไรใช่มั้ยคะ?\nทั้งๆ ที่ไม่รู้ว่า\nฉันจะขอร้องอะไรน่ะนะ"
10087-380 = "สวัสดีปีใหม่ค่ะ\nคุณครู"
10087-390 = "ได้มาฉลองปีใหม่\nด้วยกันแบบนี้แล้วนะคะ"
10087-400 = "ตอนเจอกันครั้งแรก\nฉันไม่คิดเลยค่ะว่า\nเราจะได้ใช้เวลา\nอยู่ด้วยกันแบบนี้"
10087-410 = "รู้สึกซาบซึ้งจังเลยนะคะ"
10087-420 = "เมอร์รีคริสต์มาสค่ะ\nคุณครู"
10087-430 = "แค่ได้ยินชื่อวันคริสต์มาส\nก็รู้สึกถึงความพิเศษแล้วนะคะ"
10087-440 = "ถ้าไม่ติดอะไร เราไปเดิน\nบนถนนที่ประดับไฟสว่างไสว\nด้วยกันมั้ยคะ?"
10087-450 = "ต้องตอบ OK\nเดี๋ยวนี้เลยนะคะ"
10087-460 = "ค่ะ ฉันรู้ดีค่ะ\nว่าวันนี้เป็นวันฮาโลวีน"
10087-470 = "วันที่ผู้คนออกมา\nมีปฏิสัมพันธ์กัน\nและถามว่าทริก ออร์ ทรีต..."
10087-480 = "คุณครูจะเลือก\nแบบไหนเหรอคะ?"
10087-490 = "ไม่ได้จะเลือกทริก\nใช่มั้ยคะ...?"
10087-510 = "บะ... แบบนี้ก็แย่เลยสิคะ!\nถ้าคนอื่นเห็นขึ้นมาละก็..."
10087-520 = "จะเป็นเรื่องใหญ่ได้นะคะ...!"
10087-530 = "เฮ้อ... ทำไมกันนะ\nทำไมต้องเป็นจังหวะนี้ด้วย...!"
10087-540 = "หรือว่าเพราะใส่ชุดนี้\nมากับคุณครูงั้นเหรอ...?"
10087-550 = "คุณครู!\nทำอะไรสักอย่างสิคะ!"
10087-560 = "ก่อนที่ฉันจะเจอเรื่องใหญ่น่ะ!\nเร็วๆ เข้าสิ!"
10087-570 = "หืม? อะ... อะไรกันคะ?\nสีหน้าแบบนั้น?"
10087-580 = "เอ๋...?"
10087-590 = "อะ... อะไรกันคะ?\nเจออะไรงั้นเหรอคะ...?"
10087-600 = "ระ... เรื่องนั้น... คือว่า\nถ้าจะเอาไปคืน\nก็ต้องใช้ความพยายามมาก..."
10087-610 = "แล้ว... งานของคณะกรรมการวินัย\nก็ยุ่งด้วย ฉันก็เลย...\nไม่มีเวลาน่ะค่ะ"
10087-620 = "เอาเถอะค่ะ ให้รู้ไว้ว่า\nเป็นแบบนั้นก็แล้วกันค่ะ!"
10087-2600 = "ขอบคุณที่ช่วยสนับสนุนกันตลอดนะคะ\nคุณครูเองก็อาจจะรู้อยู่แล้วว่าฉัน\nอามาอุ อาโกะ จะไม่ทำให้ผิดหวังค่ะ\nทั้งที่ผ่านมาจนถึงตอนนี้และในอนาคตด้วย\nช่วยคาดหวังในตัวฉันหลังจากนี้ด้วยนะคะ"

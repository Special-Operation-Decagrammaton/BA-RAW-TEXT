[translation]
10087-10 = "블루 아카이브"
10087-20 = "후후, 선생님. 어떠신가요, 이 드레스? …여기선 솔직하게 칭찬해 주시면 된다구요. …뭐, 그렇다고는 해도 선생님의 의견은 어디까지나 참고용일 뿐이지만요. "
10087-30 = "지금의 전…\n한 명의 스파이…\n흐흥."
10087-40 = "히나 부장님께선,\n어디 계신 걸까요."
10087-50 = "이 차림새, 움직이기\n편해서 좋아합니다만…\n조금 추운 것 같기도…"
10087-60 = "후우, 오늘만큼은\n트러블이 없었으면\n좋겠는데…"
10087-70 = "(후후, 여기에선\n여유를 가지고…)"
10087-80 = "어서 오세요. 선생님."
10087-90 = "오늘은 저 아마우 아코가,\n특.별.히. 당신을\n도와드리겠다구요♪"
10087-100 = "어머, 선생님.\n살짝 늦으신 거 아니신가요?"
10087-110 = "뭐, 상관없지만요."
10087-120 = "오늘은 제가 선생님을\n보좌하겠습니다.\n잘 부탁드릴게요."
10087-130 = "드디어 스스로 현장으로\n향한 우수한 행정관."
10087-140 = "네… 그게 저랍니다."
10087-150 = "네, 이 드레스는 제 각오입니다."
10087-160 = "이것을 몸에 걸치고 있는 동안,\n저는 완벽한 에이전트입니다."
10087-170 = "좀 더 자세히 말하자면…\n지금 저는 스파이 영화의 히로인…"
10087-180 = "그만큼 강인한 마음을\n가지고 있는 거죠."
10087-190 = "드레스로 갈아입었다고 해도\n저는 접니다."
10087-200 = "선생님의 업무 보좌에\n빈틈이란 없으니까요."
10087-210 = "…그러니, 일에 집중해 주세요."
10087-220 = "네? 왠지 평소보다\n들뜬 거 같다고요?"
10087-230 = "…그건 착각이 아니신지?\n몸에 두른 것이 달라졌어도\n저는 저니까요."
10087-240 = "굳이 말한다면 <이것으로\n좀 더 히나 부장님의 보좌를\n할 수 있는 기회>라고 \n생각하는 정도라구요. 정말로요."
10087-250 = "네? 도와준 덕분에 살았다고요…?"
10087-260 = "그, 그렇군요…\n제 보좌에 만족하셨다니\n다행이에요."
10087-270 = "…좀 더 제 가치를 이해하고,\n감사해 주셔도 된다구요?"
10087-280 = "후훗…"
10087-290 = "선생님, 생신 축하드립니다."
10087-300 = "모처럼 이기도 하니…\n오늘은 저와 함께\n하지 않으실래요?"
10087-310 = "…구체적으로 무엇을 하느냐…"
10087-320 = "글쎄요… 그… 바, 밤새\n십자말풀이를 한다, 든가…?"
10087-330 = "우, 웃지 마세요!\n설마 물어보실 줄은\n몰랐다구요!"
10087-340 = "어머, 제 생일을\n축하해 주시는 거네요?"
10087-350 = "감사합니다.\n그럼 생일이기도 하니까…"
10087-360 = "…무엇이든\n부탁해도 된다구요?"
10087-370 = "후후… 그런 말씀을\n하셔도 괜찮으시겠어요?\n제가 무슨 부탁을 할지…\n전혀 모르시면서."
10087-380 = "새해 복 많이 받으세요.\n선생님."
10087-390 = "이렇게 또 함께 새해를\n맞이하게 되었네요."
10087-400 = "…처음 만났을 땐,\n이런 식으로 시간을\n보낼 수 있으리라고는\n생각도 못 했는데."
10087-410 = "뭔가, 감개무량하네요."
10087-420 = "메리 크리스마스랍니다.\n선생님."
10087-430 = "성탄절이라는 이름만으로도\n뭔가 특별한 느낌이 드네요."
10087-440 = "만약 괜찮다면, 같이\n일루미네이션이 빛나는 거리를\n걷거나 하는 건 어떠신가요?"
10087-450 = "…여기선 바로\nOK를 해주셔야죠."
10087-460 = "네, 알고 있답니다.\n오늘은 할로윈."
10087-470 = "과자냐 장난이냐를\n선택하면서 사람들이\n교류하는 날…"
10087-480 = "선생님은 어느 쪽으로\n하시겠나요?"
10087-490 = "…설마,\n장난을 택하시는 건…\n아니겠지요?"
10087-510 = "이, 이대로는 곤란해요!\n만약 다른 사람이\n눈치채거나 하면…"
10087-520 = "큰일이 나버린다구요…!"
10087-530 = "하, 하필이면\n이런 타이밍에…!"
10087-540 = "역시 이건 선생님과\n함께 왔기 때문에…?"
10087-550 = "선생님!\n어떻게든 해주세요!"
10087-560 = "저에게 큰일이\n나기 전에 빨리!"
10087-570 = "응? 뭐, 뭔가요?\n그 표정은?"
10087-580 = "……어어?"
10087-590 = "뭐, 뭔가요?\n대체 뭘 발견하신 거죠…?"
10087-600 = "그, 그것은, 그\n…반품에는, 여러 가지\n수고가 드는 법이니까…"
10087-610 = "그… 선도부 일이\n바쁘다 보니, 시간이\n없었다고나 할까…"
10087-620 = "아무튼 그런 거니까!\n그냥 그런 걸로 해둬요!"
10087-2600 = "변함없는 지원, 감사드립니다.\n선생님도 이미 잘 알고 계시겠지만──\n저, 아마우 아코는 당신을 결코\n실망시키지 않습니다. 지금까지도,\n앞으로도. 이후의 저에게\n부디 기대해 주세요."

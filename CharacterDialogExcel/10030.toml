[translation]
10030-10 = "Blue Archive，"
10030-20 = "過猶如不及……\n今天就把工作忘掉，\n和我一起休息吧？"
10030-30 = "身體有點\n暖暖的……"
10030-40 = "感覺腦袋放鬆下來了。"
10030-50 = "這副打扮，該不會\n太過頭了……？"
10030-60 = "大家，\n看起來很開心呢"
10030-70 = "有沒有可以坐下來\n休息的地方……？"
10030-80 = "歡迎回來，老師。\n恭候多時了。"
10030-90 = "辛苦了，老師。\n首先從生命徵象檢測開始吧。"
10030-100 = "雖然我在休息中\n會試著忘記業務的事……"
10030-110 = "不過越是那麼想著，\n腦裡就越會浮現工作的事……"
10030-120 = "總覺得在這裡\n穿著這種服裝，那個……"
10030-130 = "有點，緊張呢。"
10030-140 = "時而休息也是必要的……\n雖然是對自己說的，\n不過也想傳達給老師呢。"
10030-150 = "溫泉……我原本以為\n是和我沒有緣分的地方。"
10030-160 = "自身的身體管理，\n也是工作的一部份呢。"
10030-170 = "……我有點，疏忽了也說不定。"
10030-180 = "祝您生日快樂，老師。\n因為是特別的日子，那個……"
10030-190 = "如果是為了老師，\n什麼都……"
10030-200 = "咦……？\n我的生日，是嗎……？\n我想想……"
10030-210 = "像這樣和老師在一起，\n對我來說就是禮物了。"
10030-220 = "今年一年，\n也請多指教，老師。"
10030-230 = "今後也，那個……"
10030-240 = "能和我在一起的話，\n我會很開心。"
10030-250 = "是，聖誕節呢。\n咦？你說，不會冷嗎……？"
10030-260 = "呵呵……是的，\n我有讓身體暖起來所以沒問題。"
10030-270 = "是很熱鬧的日子呢。老師。"
10030-280 = "糖果……雖然沒有，\n不過溫泉蛋之類的如何呢……？"
10030-300 = "這麼豪華的溫泉，\n竟然可以兩個人獨自享受……\n人生真是，\n難以預料會發生什麼呢。"
10030-310 = "有朝一日……\n也許，這樣的未來也……"
10030-320 = "啊，沒，沒什麼！\n請別在意……！"
10030-330 = "不那個，如果真的能夠成真的話……"
10030-340 = "那種美好的日子，\n也不是，\n沒有想像過…………"
10030-350 = "學生和老師，現在，\n光是這樣就十分幸福了。\n真的……"
10030-2600 = "從這份重量，我感覺到了責任……\n為了可以確實回應，\n我會盡力而為的。"

[translation]
10030-10 = "Blue Archive"
10030-20 = "การฝืนเกินไปก็อาจเป็นผลเสียได้\nวันนี้มาลืมเรื่องงานต่างๆ แล้วมาใช้เวลาพักผ่อนกับฉันมั้ยคะ?"
10030-30 = "รู้สึกเหมือนร่างกาย\nอบอุ่นขึ้นมากเลยค่ะ"
10030-40 = "รู้สึกหัวโล่ง\nโปร่งสบายมากเลยค่ะ"
10030-50 = "เอ๊ะ... ทำไม...\nถึงเป็นแบบนี้ไปได้นะ?"
10030-60 = "ทุกคนดูสนุกกันมาก\nเลยนะคะ"
10030-70 = "สถานที่สำหรับ\nนั่งพักผ่อน...อยู่ไหนนะ"
10030-80 = "เชิญค่ะคุณครู\nฉันกำลังรออยู่เลยค่ะ"
10030-90 = "มาแล้วเหรอคะคุณครู\nมาวัดชีพจรกันก่อนเลยนะคะ"
10030-100 = "ในช่วงที่พักผ่อน ฉันจะ\nพยายามลืมเรื่องงานไปค่ะ"
10030-110 = "แต่ว่ายิ่งพยายามมากเท่าไร\nก็จะยิ่งคิดมากขึ้น..."
10030-120 = "ฉันไม่รู้ว่าทำไมเหมือนกัน\nแต่ว่าพอใส่ชุดแบบนี้แล้ว..."
10030-130 = "ฉันกังวลนิดหน่อยค่ะ"
10030-140 = "บางครั้งการพักผ่อนก็จำเป็นค่ะ\nฉันเองก็อยากบอกคำนี้กับคุณครู\nเหมือนกันค่ะ"
10030-150 = "ออนเซ็น... ฉันไม่คิดเลย\nว่าตัวเองจะมาสถานที่แบบนี้ค่ะ"
10030-160 = "การดูแลตัวเองก็เป็น\nงานที่สำคัญมากนะคะ"
10030-170 = "ดูเหมือนว่าฉันจะละเลย\nการดูแลตัวเองไปสักหน่อยค่ะ"
10030-180 = "สุขสันต์วันเกิดค่ะคุณครู\nวันนี้เป็นวันพิเศษ"
10030-190 = "ถ้าคุณครูมีของที่อยากได้...\nบอกฉันได้เลยนะคะ..."
10030-200 = "คะ...? วันเกิดของฉันเหรอคะ...?\nนั่นสินะคะ..."
10030-210 = "แค่ได้มาเจอคุณครูแบบนี้\nก็เป็นของขวัญล้ำค่าสำหรับฉันแล้วค่ะ"
10030-220 = "ปีนี้ก็ขอฝากตัวด้วยนะคะ\nคุณครู"
10030-230 = "ต่อจากนี้ไป..."
10030-240 = "ถ้าคุณครูอยู่กับฉันแบบนี้\nก็มีความสุขแล้วค่ะ"
10030-250 = "คริสต์มาสแล้วสินะคะ\nคะ? ฉันหนาวรึเปล่าน่ะเหรอคะ?"
10030-260 = "ฮิฮิ ไม่เป็นไรค่ะ\nตอนนี้รู้สึกอบอุ่นแล้วค่ะ"
10030-270 = "วันนี้ครึกครื้นดีนะคะ คุณครู"
10030-280 = "ถึงจะไม่มีลูกกวาด มีแต่\nไข่ต้มออนเซ็นได้หรือเปล่าคะ?"
10030-300 = "ไม่คิดเลยว่าจะได้มาแช่ออนเซ็น\nสุดหรูกันสองคนแบบนี้ บางครั้ง\nเราก็ไม่รู้เลยว่าจะเกิดอะไรขึ้นนะคะ"
10030-310 = "สักวันหนึ่ง บางที...\nในอนาคตก็อาจจะมีโอกาส..."
10030-320 = "อ๊ะ เปล่าค่ะ ไม่มีอะไรค่ะ\nไม่ต้องใส่ใจหรอกค่ะ…!"
10030-330 = "แต่ถ้า... สักวันหนึ่ง...\nมันจะเป็นจริงขึ้นมาละก็..."
10030-340 = "ฉันคงรู้สึกดีใจมากจน\nคิดภาพไม่ออกเลยแน่ๆ ค่ะ"
10030-350 = "ฉันคิดว่าความสัมพันธ์ตอนนี้\nแบบคุณครูกับนักเรียนแบบนี้\nก็เพียงพอแล้วค่ะ จริงๆ นะคะ..."
10030-2600 = "ฉันรับรู้ถึงน้ำหนักของความรับผิดชอบ\nที่แบกรับอยู่แล้วค่ะ ฉันจะพยายาม\nให้ถึงที่สุดเพื่อไม่ให้ลืมความรู้สึกนี้ค่ะ"

[translation]
10081-10 = "是蔚藍～～～檔案！"
10081-20 = "小女子名叫勘解由小路紫！\n身為榮譽百花繚亂的一員……\n我會為了老師，誠心誠意地竭盡全力！"
10081-30 = "呼呣呼呣原來如此，\n這裡就是夏～萊……！\n……真是個雅緻的地方！"
10081-40 = "雖然一大早\n就開始鍛鍊…\n呼啊，睏意\n突然來襲了。"
10081-50 = "（總覺得，有股\n　不尋常的氣息……\n　夏～萊或許是伏魔殿\n　也說不定！）"
10081-60 = "嘿咻。\n身為百花繚亂的一員，\n若是不能擔任眾人的模範…"
10081-70 = "哼哼～哼～♪\n紫快速進擊～！"
10081-80 = "呵呵！\n歡迎大駕光臨！老師！\n工作的準備已經\n做得Per～fect了唷！"
10081-90 = "來，歡迎！\n您請坐！"
10081-100 = "是！小女子我，\n一直等著這一刻的到來！"
10081-110 = "今天一整天\n也請多多指教哦，老師！"
10081-120 = "呼呣呼呣，原來如此。\n所謂夏～萊的工作，\n就是指這種事情啊。\n我學到了很多！"
10081-130 = "百花繚亂的工作\n和值日生的工作……\n雖然都不容易……"
10081-140 = "但小女子會完美完成的！\n沒錯！畢竟小女子我，\n可是百花繚亂的菁～英呢！"
10081-150 = "哼哼～哼～♪\n無敵的百花繚亂～\n紫傳說才剛開始～而已哦♪"
10081-160 = "是，老師！\n如果找小女子有事的話，\n無論何時都請儘管吩咐！"
10081-170 = "那麼，今天的工作\n結束後要做什麼呢？"
10081-180 = "要去點心店嗎？\n還是要去遊～戲中心\n創下新紀錄？"
10081-190 = "唔嗯，要選哪一個\n真讓人煩惱。"
10081-200 = "Happy～Birth～Day～！\n祝您生日快樂！老師！"
10081-210 = "這麼值得慶祝的日子\n能一起度過真是幸福！\n小女子，勘解由小路紫，\n會讓老師度過最棒的生日！"
10081-220 = "那麼首先，就從製作\n願～望清單開始……！"
10081-230 = "……什麼？\n比起那個，能跟小女子\n共創回憶就夠了……？"
10081-240 = "啊嗚……\n總，總覺得……\n好像反而變成了\n更難的問題……"
10081-250 = "當，當然，我並\n不討厭就是了……"
10081-260 = "啊，那個……您竟然\n沒有忘記小女子的生日……\n光是收到老師的祝福……"
10081-270 = "那個……就讓我\n不禁嘴角失守……"
10081-280 = "所謂的幸福，其實比\n想像中更近在眼前，\n我再次感受到了這點……"
10081-290 = "Happy～New～Year～！\n向您獻上新春的祝福！老師！"
10081-300 = "隨著新的一年到來\n而感到心潮澎湃的，\n肯定不只小女子一人對吧！"
10081-310 = "所以，還請……\n為了避免發生不好的事……\n今晚也一起巡邏吧！"
10081-320 = "Merry～Christmas～！老師！"
10081-330 = "正好剛才蓮華前輩、\n桔梗前輩……以及\n名草前輩都在找您！"
10081-340 = "請老師一定要在百花繚亂\n品嚐過聖～誕～羊羹再走！"
10081-350 = "呵呵！一定會度過\n一段非常愉快的時光！"
10081-360 = "小女子，\n剛剛出門的時候\n嚇了一大跳！"
10081-370 = "街上充斥著魑魅魍魎……\n究竟是怎麼回事！我很疑惑！"
10081-380 = "咦？Halloween～？\n扮成妖怪取樂的活動是嗎？"
10081-390 = "老師玩笑也開過頭了！\n離節分還早得很呢！\n居然想矇騙小女子，\n真是太可愛了！"
10081-410 = "唔呵呵，這裡，\n小女子在這裡，老師。"
10081-420 = "沒關係的。\n其實沒有等很久。"
10081-430 = "只是比約好的時間，\n稍微提早1小時出發而已。"
10081-440 = "不，並不是因為\n什麼特別的理由，\n只是……"
10081-450 = "今天要去哪裡、\n要做些什麼、又會教導\n什麼樣的新事物……"
10081-460 = "一旦開始思考這些……\n就實在有些坐立難安……"
10081-470 = "啊，另外想告訴您……\n小女子就連這等待的\n時間都很喜歡唷？"
10081-480 = "只要和老師在一起，\n就連等待的時間，也是讓人\n感到心胸澎湃的美好時光。"
10081-490 = "來吧，現在不是\n說這些的時候了！"
10081-500 = "呵呵！今天也向小女子，\n教導這炫目美麗的世界吧！\n老師！"
10081-2600 = "咦？要把這個，給小女子……？\n是信賴的象徵……？也就是信物嗎！？\n既然如此，小女子為了不讓老師失望，\n今後也會讓傳說延續下去！"

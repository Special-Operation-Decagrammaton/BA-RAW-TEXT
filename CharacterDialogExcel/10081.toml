[translation]
10081-10 = "Blue~~~ Archive!"
10081-20 = "ข้ามีนามว่าคาเดโนะโคจิ ยูคาริ!\nในฐานะสมาชิกเฮียกกะเรียวรันที่น่าภาคภูมิใจ...\nข้าจะพยายามอย่างเต็มที่เพื่อท่านอาจารย์เจ้าค่ะ!"
10081-30 = "ฮืมม ที่นี่คือชัล~เลต์เหรอ...!\nมีเสน่ห์เฉพาะตัวมากเลยเจ้าค่ะ!"
10081-40 = "ข้าตื่นมาฝึกฝนตั้งแต่เช้าตรู่...\nฮ้าว...\nความง่วงถามหาแล้วเจ้าค่ะ"
10081-50 = "(รู้สึกได้ถึงกลิ่นอาย\nผิดปกติบางอย่าง\nชัล~เลต์อาจเป็นแหล่ง\nรวมตัวของปีศาจก็ได้เจ้าค่ะ!)"
10081-60 = "ฮึบ! ต้องเป็นตัวอย่างให้ทุกคน\nในฐานะสมาชิกเฮียกกะเรียวรัน..."
10081-70 = "ฮุ~ ฮุฮุ~♪\nนี่คือเวลาแห่งความก้าวหน้า\nของยูคาริเจ้าค่ะ~!"
10081-80 = "ฮุฮุ เชิญเลยเจ้าค่ะ! ท่านอาจารย์!\nถ้าเป็นเรื่องเตรียมงานละก็\nข้าเตรียมไว้อย่างเพอร์~เฟกต์โตะ~\nแล้วเจ้าค่ะ!"
10081-90 = "เอาละ!\nมานั่งตรงนี้เลยเจ้าค่ะ!"
10081-100 = "ข้ากำลังรอ\nเวลานี้อยู่เลยเจ้าค่ะ!"
10081-110 = "วันนี้ก็รบกวนด้วยนะเจ้าคะ!\nท่านอาจารย์!"
10081-120 = "ฮืม ฮืม... งานของชัล~เลต์\nเป็นแบบนี้เองสินะเจ้าคะ\nข้าได้เรียนรู้มากมายเลยเจ้าค่ะ!"
10081-130 = "ทั้งงานเฮียกกะเรียวรันและ\nงานเข้าเวรตัวแทน\nถึงจะไม่มีงานไหนง่ายเลย..."
10081-140 = "แต่ข้าจะทำงานทั้งสองอย่าง\nให้สมบูรณ์แบบเลยเจ้าค่ะ!\nใช่เจ้าค่ะ! เพราะข้าคือ\nอิล~ลีทแห่งเฮียกกะเรียวรัน!"
10081-150 = "ฮุ~ ฮุฮุ~♪\nเฮียกกะเรียวรันฆ่าไม่ตาย~\nตำนานของยูคาริ\nเพิ่งจะเริ่มขึ้นเองเจ้าค่ะ~"
10081-160 = "เจ้าค่ะ ท่านอาจารย์!\nถ้ามีธุระกับข้าละก็\nไม่ว่าจะยามใด\nก็บอกข้าได้เต็มที่เลยเจ้าค่ะ!"
10081-170 = "เอาละ ถ้าเสร็จงานของวันนี้\nจะทำอะไรดีเจ้าคะ?"
10081-180 = "ไปร้านขนมขบเคี้ยวกันมั้ยเจ้าคะ?\nหรือว่าไปเกมเซ็นเตอร์~\nแล้วทำลายสถิติใหม่ดีเจ้าคะ?"
10081-190 = "อืม... คิดไม่ตกเลยเจ้าค่ะ\nว่าจะเลือกทำอะไรดี"
10081-200 = "แฮป~ ปี้~ เบิร์ธ~ เดย์~!\nสุขสันต์วันเกิดเจ้าค่ะ! ท่านอาจารย์!"
10081-210 = "ข้ามีความสุขที่เราได้อยู่ด้วยกัน\nในวันที่น่าปลื้มปิติแบบนี้เจ้าค่ะ!\nข้าน้อย คาเดโนะโคจิ ยูคาริ จะทำให้\nวันนี้เป็นวันเกิดที่ดีที่สุดเลยเจ้าค่ะ!"
10081-220 = "งั้นก่อนอื่นก็\nเขียนรายการ\nวิช~ ลิสสึทึ~ ก่อน...!"
10081-230 = "เจ้าคะ...? แค่ได้มี\nความทรงจำร่วมกับข้า\nก็เพียงพอแล้วเหรอเจ้าคะ...?"
10081-240 = "อ่า... บะ...แบบนั้น\nเป็นคำขอที่ยุ่งยาก\nเอาการเลยนะเจ้าคะ"
10081-250 = "นะ...แน่นอนว่าข้าน้อย\nไม่ได้รังเกียจเลยเจ้าค่ะ"
10081-260 = "อ่า... คือว่า... จำวันเกิดของข้า\nได้ด้วยเหรอเจ้าคะ...\nแค่ท่านอาจารย์มาอวยพร..."
10081-270 = "ข้าก็เผลอยิ้มออกมา\nโดยไม่รู้ตัวเลยเจ้าค่ะ..."
10081-280 = "จู่ๆ ข้าก็รู้สึกว่า\nความสุขอยู่ใกล้ตัว\nมากกว่าที่คิดอีกเจ้าค่ะ..."
10081-290 = "แฮป~ ปี้~ นิว~ เยียร์~!\nสวัสดีปีใหม่เจ้าค่ะ!\nท่านอาจารย์!"
10081-300 = "คนที่ตื่นเต้นกับวันปีใหม่\nต้องไม่ได้มีแค่\nข้าคนเดียวแน่นอนเจ้าค่ะ!"
10081-310 = "เพราะงั้น เพื่อไม่ให้เกิด...\nเหตุการณ์ที่ไม่ดี...\nวันนี้ข้าก็เลยจะไป\nลาดตระเวนด้วยเจ้าค่ะ!"
10081-320 = "เมอร์รี่~ คริสต์~ สะ~ มาส~ เจ้าค่ะ!\nท่านอาจารย์!"
10081-330 = "เมื่อกี้ข้าเพิ่งเรียกรุ่นพี่เรนเกะ\nรุ่นพี่คิเคียว...\nแล้วก็รุ่นพี่นางุสะ\nมาพอดีเลยเจ้าค่ะ!"
10081-340 = "ท่านอาจารย์ก็มาเฮียกกะเรียวรัน\nแล้วทานขนมโยคังด้วยกัน\nในวันคริสต์~ สะ~ มาส~ สิเจ้าคะ!"
10081-350 = "ฮุฮุ ต้องเป็น\nช่วงเวลาแห่งความสนุก\nมากๆ แน่นอนเจ้าค่ะ!"
10081-360 = "อึก! ข้าเพิ่งออกไปข้างนอกมา\nตกใจหมดเลยเจ้าค่ะ!"
10081-370 = "เจอภูตผีปีศาจ\nเต็มถนนเลย...\nนี่มันเรื่องอะไรกันเนี่ย!"
10081-380 = "เจ้าคะ? ฮัล~โล~ วีน?\nหมายถึงวันที่แต่งตัวเป็นผี\nแล้วออกมาเล่นสนุกเหรอเจ้าคะ?"
10081-390 = "ท่านอาจารย์ก็แกล้งกันเกินไปเจ้าค่ะ!\nอีกตั้งนานกว่าจะถึงเทศกาลเซ็ตสึบุน!\nคิดจะหลอกข้างั้นเหรอ\nน่ารักที่สุดเลย!"
10081-410 = "ฮุฮุฮุ ทางนี้ๆ\nข้าอยู่ตรงนี้เจ้าค่ะท่านอาจารย์"
10081-420 = "ไม่เป็นไรเจ้าค่ะ\nข้าไม่ได้รอนาน\nอะไรเลยเจ้าค่ะ"
10081-430 = "ข้าแค่ออกมาเร็วกว่า\nเวลานัดแค่หนึ่งชั่วโมง\nเองเจ้าค่ะ"
10081-440 = "เปล่าเจ้าค่ะ ไม่ได้มีเหตุผล\nอะไรเป็นพิเศษ ข้าก็แค่..."
10081-450 = "วันนี้จะไปไหน\nจะได้ทำอะไร\nท่านอาจารย์จะสอน\nอะไรใหม่ๆ ให้..."
10081-460 = "พอคิดอะไรแบบนี้\nข้าก็เลยอดใจรออยู่เฉยๆ\nไม่ได้..."
10081-470 = "อ่า... ถ้าจะให้สรุปเลยละก็\nการได้รอแบบนี้ก็เป็น\nความเพลิดเพลินอย่างหนึ่ง\nสำหรับข้าเลยละเจ้าค่ะ"
10081-480 = "เพราะถ้าได้อยู่กับท่านอาจารย์\nการรอคอยก็เป็นช่วงเวลที่น่าตื่นเต้น\nและยอดเยี่ยมมากเจ้าค่ะ"
10081-490 = "เอาละ ตอนนี้ไม่ใช่เวลา\nมาทำแบบนี้อยู่นะเจ้าคะ!"
10081-500 = "ฮุฮุ วันนี้ก็ช่วยทำให้ข้า\nได้ตื่นตากับโลกที่สวยงาม\nด้วยนะเจ้าคะ! ท่านอาจารย์!"
10081-2600 = "เจ้าคะ? อันนี้ ให้ข้าเหรอ...?\nของที่เป็นสัญลักษณ์\nของความไว้วางใจสินะเจ้าคะ...?!\nถ้างั้นต่อไปข้าก็จะสร้างตำนาน\nให้ท่านอาจารย์ไม่ผิดหวังเลยเจ้าค่ะ!"

[translation]
10081-10 = "블루~~~ 아카이브이어요!"
10081-20 = "소녀는 카데노코지 유카리라 하여요!\n자랑스러운 백화요란의 일원으로서……\n선생님을 위해 성심성의껏 노력하겠사와요!"
10081-30 = "흠흠,\n과연 이곳이 샬-레……!\n……정취가 있는 곳이어요!"
10081-40 = "아침 일찍부터 단련을\n하고 있었는데….\n후아암, 졸음이\n쏟아지는 것이어요."
10081-50 = "(뭔가, 범상치 않은 기척들이……\n샬-레는, 실은 복마전이었을지도\n모르겠사와요!)"
10081-60 = "영-차. \n백화요란으로서,\n모두의 모범이 되지 않으면…"
10081-70 = "흐흥~ 흥~♪\n유카리 쾌진격이어요~!"
10081-80 = "후훗,\n어서 오시어요! 선생님!\n업무 준비라면\n퍼어~펙투하게 되어 있답니다!"
10081-90 = "자아, 여기!\n앉아주시어요!"
10081-100 = "네, 소녀는,\n이때를 기다리고 있었사와요!"
10081-110 = "오늘 하루도\n잘 부탁드리어요! 선생님!"
10081-120 = "흐음, 흐음, 과연.\n샤알-레의 업무란 이런 것이로군요.\n많은 공부가 되었사와요!"
10081-130 = "백화요란의 업무와 당번 업무.\n양쪽 다 쉽지 않은 일이지만…."
10081-140 = "저는 전부 완벽하게\n해내겠사와요!\n네! 소녀는 백화요란의\n엘리~트인걸요!"
10081-150 = "흐흥~ 흥~♪\n무적의 백화요란~\n유카리 전설은 이제 막\n시작되었을 뿐이어요~"
10081-160 = "네, 선생님!\n소녀에게 용무가 있으시다면,\n언제 어느때라도 \n마음껏 말씀해주시어요!"
10081-170 = "자, 오늘 일이 끝나면\n어떻게 할까요?"
10081-180 = "막과자 가게로 갈까요?\n아니면, 게~임센터어-에서\n기록 갱신?"
10081-190 = "으음, 어떤 걸로 할지\n고민이어요."
10081-200 = "해애~피 버스데~이~!\n생일, 축하드리어요! 선생님!"
10081-210 = "이런 경사스러운 날을\n함께 할 수 있어 행복한 것이어요!\n소녀, 카데노코지 유카리가\n최고의 생일로 만들어드리겠사와요!"
10081-220 = "그럼 우선,\n위~시리스-투 작성부터…!"
10081-230 = "…네? 그런 것보다\n소녀와 추억을\n만들 수 있으면 충분해…?"
10081-240 = "아으…. 오, 오히려…\n어려운 문제가 되어버린\n느낌이어요."
10081-250 = "무, 물론 싫지는,\n않지만요……."
10081-260 = "아, 저기…. 소녀의 생일을\n기억하고 있어주셨다니….\n선생님께서 축하해 주신 것만으로도…"
10081-270 = "그, 저도 모르게\n입가가 풀어져서…."
10081-280 = "행복이란, 생각보다\n가까이 있다는 걸\n새삼 실감했사와요…."
10081-290 = "해애~피 뉴우 이-어~!\n새해 복 많이 받으시어요!\n선생님!"
10081-300 = "새해가 밝아\n두근두근하고 있는 건,\n분명 소녀뿐만이\n아닐 것이어요!"
10081-310 = "그러니까 부디……\n불의의 사고가 일어나지 않도록…….\n오늘 밤도 함께\n순찰을 도는 것이어요!"
10081-320 = "메~리 크리수마~수~이어요!\n선생님!"
10081-330 = "마침 아까 렌게 선배,\n키쿄 선배……\n그리고 나구사 선배도\n부른 참이어요!"
10081-340 = "부디 선생님께서도 백화요란에서\n크리수마~수~ 양갱을\n드시고 가시와요!"
10081-350 = "후후, 분명!\n무척 즐거운 시간이\n될 것이어요!"
10081-360 = "저! 방금 외출을 했다가\n깜짝 놀라버렸사와요!"
10081-370 = "거리에 이매망량이\n넘쳐나는 게……\n대체 무슨 일인가! 싶어서!"
10081-380 = "네? 할로~윈?\n귀신 분장을 하고 노는 행사,\n말인가요?"
10081-390 = "선생님도 농담이 지나치시와요!\n절분은 아직 멀었는데!\n소녀를 속이려고 하시다니,\n귀여우셔라!"
10081-410 = "우후훗, 여기여요,\n소녀는 여기 있사와요. 선생님."
10081-420 = "괜찮답니다.\n그렇게 오래 기다리진\n않았사와요."
10081-430 = "약조하였던 시간보다\n고작 1시간 정도 일찍\n발걸음을 옮겼을 뿐이기에."
10081-440 = "아뇨, 뭔가\n특별한 이유가 있어\n그런 게 아니라, 단지……."
10081-450 = "오늘은 어디를 갈까.\n무엇을 할까.\n또 어떤 새로운 것을\n가르쳐 주실까."
10081-460 = "그런 생각을 했더니,\n얌전히 기다릴 수가\n없어서……."
10081-470 = "아, 말씀드리자면.\n소녀는 이렇게 기다리는 시간도\n좋아한답니다?"
10081-480 = "선생님과 함께라면,\n기다리는 시간조차 두근거리는\n멋진 시간이 될 테니까요."
10081-490 = "자아. 이러고 있을 때가\n아니어요!"
10081-500 = "후훗, 오늘도 소녀에게,\n눈부시게 아름다운 세계를\n가르쳐 주시와요! 선생님!"
10081-2600 = "네? 이것을, 소녀에게…?\n이것은 신뢰의 상징이라 하는…? 그 증표라는 것이군요?!\n그렇다면 소녀는 선생님을 실망시키지 않도록\n앞으로도 전설을 써내려가겠사와요!"

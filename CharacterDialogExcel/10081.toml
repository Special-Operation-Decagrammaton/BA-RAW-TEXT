[translation]
10081-10 = "Bluuuue Archive!"
10081-20 = "I'm Kadenokouji Yukari! As a proud member of the Hyakkaryouran, I'll do my utmost to live up to my duty, Sensei!"
10081-30 = "Ahem. So, this is Schale? It's very charming!"
10081-40 = "I had to wake up really early to catch the train this morning. So sleepy... *yawn*"
10081-50 = "(There's an ominous presence here... Could Schale be a sanctuary for evil demons?!)"
10081-60 = "Hup! As a member of Hyakkaryouran, I want to set a good example for the other students."
10081-70 = "Hm, hmm. Here I come! ♪"
10081-80 = "Heehee. Welcome, Sensei! Time to work!"
10081-90 = "Here, this way! Please sit down!"
10081-100 = "Yes! I've been waiting for this moment!"
10081-110 = "Welcome, Sensei. Let's do our best today!"
10081-120 = "Hm, hmm. I see. This is a typical work day at Schale. I'm learning so much!"
10081-130 = "It's not easy to work at the Hyakkaryouran. I mean, it's hard here too, but..."
10081-140 = "It's all going to work out perfectly! Yes! Because I'm an elite member of the Hyakkaryouran!"
10081-150 = "Hm, hmm. The invincible Hyakkaryouran! This is only the beginning of the legend of Yukari! ♪"
10081-160 = "Yes, Sensei! Please don't hesitate to ask me for anything you need!"
10081-170 = "So, what should we do after work today?"
10081-180 = "Should we go get some junk food? Or break someone's high score at the arcade?"
10081-190 = "Hm, so many options... How do we choose?"
10081-200 = "Happy birthday! You must be so excited, Sensei"
10081-210 = "I'm so excited to celebrate your special day together! I, Kadenokouji Yukari, will make sure you have the best birthday ever!"
10081-220 = "All right! Let's start with working on your wish list!"
10081-230 = "...Huh? You just want to...make memories...with me...?"
10081-240 = "Ugh... That's a much more difficult request..."
10081-250 = "I-I do like the idea of that though..."
10081-260 = "Oh! Um... Y-You remembered my birthday? Wow... Hearing your birthday wishes..."
10081-270 = "Oh, geez... Um. I can't stop smiling."
10081-280 = "Happiness isn't always a far-off dream, I guess..."
10081-290 = "Happy New Year! I wish you all the best in the new year, Sensei!"
10081-300 = "I'm sure I'm not the only one who's super excited about the new year!"
10081-310 = "Um, to make sure nothing bad happens... Let's go on a patrol again tonight!"
10081-320 = "Merry Christmas, Sensei!"
10081-330 = "I've already invited Renge, Kikyou, and Nagusa!"
10081-340 = "I hope you'll come and enjoy some red bean jelly at the Hyakkaryouran!"
10081-350 = "Heehee! It'll be lots of fun! I promise!"
10081-360 = "Ack! I went outside, and it was shocking!"
10081-370 = "The streets are filled with goblins! What in the world is happening?!"
10081-380 = "...Huh? It's Halloween? People just dress up as monsters today?"
10081-390 = "You're joking! It's not Setsubun yet! You tried to trick me. How cute!"
10081-410 = "Heehee, here! I'm here, Sensei."
10081-420 = "It's okay. I didn't wait long at all."
10081-430 = "It's my fault for getting here an hour early."
10081-440 = "Ah, there's no special reason. It's just..."
10081-450 = "Where will we go today? What are we going to do? What new thing will I learn from you?"
10081-460 = "I had all of those thoughts running through my head, and I couldn't wait for another moment."
10081-470 = "You don't need to worry. I actually enjoy waiting."
10081-480 = "In fact, it makes finally being with you even better."
10081-490 = "All right then, there's no time for us to waste!"
10081-500 = "Heehee. Please, show me more of this beautiful world, Sensei!"
10081-2600 = "Huh? Is this for me...? A symbol of trust?! I have to work hard to be legendary enough to meet your expectations!"

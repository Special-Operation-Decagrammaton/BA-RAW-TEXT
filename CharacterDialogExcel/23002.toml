[translation]
23002-10 = "Blue Archive!"
23002-20 = "นางฟ้าสีขาว!\nมาหาคุณแล้วค่ะ!!"
23002-30 = "ลั้ลลา~ วันนี้!~\nใครจะต้องผ่าตัดกันนะ?\nไม่มีเลยเหรอ~"
23002-40 = "ทั้งการช่วยเหลือ! ความหวัง!\nแล้วก็ความรัก! ฮานาเอะน่ะ...\nมีทุกๆ อย่างเลยไงล่ะ!"
23002-50 = "อยากไปเล่นกับคุณกระต่าย\nคุณแมวเหมียว\nเร็วๆ จังเลยน้า"
23002-60 = "ได้เจอเพื่อนใหม่หลายคน\nฉันเลยรู้สึกสนุกมากๆ\nทุกวันเลยค่ะ!"
23002-70 = "สวัสดีค่ะ!\nฮานาเอะค่ะ!\nขอฝากตัวด้วยนะคะ!"
23002-80 = "มีจดหมายฉบับใหม่เข้ามาค่ะคุณครู!\nวันนี้ก็ไปลุยภารกิจแสนสนุกด้วยกันนะคะ!"
23002-90 = "กลับมาแล้วเหรอคะคุณครู?\nฉันกำลังรอคุณครูอยู่เลย!"
23002-100 = "คุณครูดูสีหน้าไม่ดีเลย\nให้ฉันปฐมพยาบาลให้ดีมั้ยคะ?!"
23002-110 = "หากต้องการรอยยิ้มและความสดใส!\nก็ปล่อยเป็นหน้าที่ของฮานาเอะได้เลยค่ะ!"
23002-120 = "คุณครูมีสไตล์ที่ชอบมั้ยคะ?"
23002-130 = "คงจะเป็นหญิงสาวที่น่ารักสดใสใช่มั้ยคะ?!"
23002-140 = "วันนี้มีงานที่ต้องทำเพียบเลย\nจะมามัวโอ้เอ้ไม่ได้นะคะ!"
23002-150 = "อ๊ะ รู้สึกเหมือนว่าวันนี้\nจะมีเรื่องดีๆ เกิดขึ้นเลยล่ะ!"
23002-160 = "นี่คือวันแห่งความยินดี!\nสุขสันต์วันเกิดนะคะคุณครู!"
23002-170 = "วันนี้เป็นวันเกิดของฉันค่ะ!\nส่วนของขวัญวันเกิดน่ะ..."
23002-180 = "ขอเป็นเวลาที่คุณครูจะให้ฉันได้มั้ยคะ?"
23002-190 = "Happy New Year!\nปีนี้ก็ขอให้เป็นปีที่มีความสุขนะคะ!"
23002-200 = "ขอให้มีความสุขในวันคริสต์มาสนะคะ!\nถ้าเป็นนักเรียนหญิงของโรงเรียนทรีนิตี้\nไม่ว่าใครก็ตื่นเต้นกับวันนี้ทั้งนั้นแหละค่ะ!"
23002-210 = "เทศกาลฮาโลวีนเริ่มแล้ว!\nรีบออกไปกันเถอะค่ะ~\nไปงานเทศกาลกัน!"
23002-230 = "เอาละ ถ้างั้นเดี๋ยวฉัน\nจะเริ่มฆ่าเชื้อที่แผลให้"
23002-240 = "ช่วยถอดถุงเท้าออก\nแล้วอยู่นิ่งๆ ด้วยนะคะ"
23002-250 = "ถ้าไม่ล้างแผลให้สะอาด\nจะทำให้ผิวเกิดการระคายเคือง"
23002-260 = "และอาจเป็นอันตรายได้ค่ะ"
23002-270 = "อาจจะแสบสักหน่อย\nแต่ช่วยอดทนหน่อยนะคะ!"
23002-280 = "เอา~ละ...!\nล้างแผลให้สะอาด\nล้างแผลให้สะอาด~!"
23002-290 = "ค่ะ อดทนได้ดีมากเลยค่ะ!\nอดทนอีกนิดเดียวนะคะ"
23002-300 = "ถ้าอย่างนั้นฉันจะร่ายมนต์\nช่วยให้แผลของคุณครู\nหายเร็วให้เป็นพิเศษนะคะ"
23002-310 = "ถ้างั้น... ความเจ็บปวดเอ๋ย\nความเจ็บปวดเอ๋ย...\nจงหายไป~"
23002-320 = "เป็นยังไงบ้างคะ?\nไม่เจ็บเลยใช่มั้ยคะ?"
23002-2600 = "อาวุธนี่...\nมีความรักอัดแน่นอยู่เต็มเลยนะคะ!"

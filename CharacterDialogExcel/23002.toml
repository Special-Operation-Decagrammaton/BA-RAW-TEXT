[translation]
23002-10 = "Blue Archive!"
23002-20 = "Your Ministering Angel has arrived!"
23002-30 = "Lalala! Is there anyone in need of an operation?"
23002-40 = "Salvation! Hope! And love! Hanae has it all!"
23002-50 = "I can't wait to play with the bunnies and kitties!"
23002-60 = "I have so much fun these days now that I have so many friends!"
23002-70 = "Hi, I'm Hanae! I'm happy to be working with you!"
23002-80 = "You have some new mail, Sensei. Let's go on some fun missions together!"
23002-90 = "Welcome back, Sensei! I've been waiting for you."
23002-100 = "*gasp* Sensei, your face is so pale! Do you need me to perform first aid?"
23002-110 = "I'm here to help you get better and put a smile on your face!"
23002-120 = "What type of girl do you like, Sensei?"
23002-130 = "I bet you like the cute, bubbly types, don't you?"
23002-140 = "We have lots to do today, so no slacking off!"
23002-150 = "Hey! I have a good feeling about today."
23002-160 = "Today's the best day of the year! Happy birthday, Sensei!"
23002-170 = "Today's my birthday! So for a birthday gift..."
23002-180 = "...I want you to spend the day with me!"
23002-190 = "Happy New Year! I hope you have a really good one."
23002-200 = "Christmas is a time for everyone to be happy! Every Trinity girl likes to celebrate Christmas."
23002-210 = "Halloween has only just begun. Let's go! The festival should start soon!"
23002-230 = "All right, I'm going to disinfect the wound,"
23002-240 = "so take off your sock and don't move."
23002-250 = "If I don't disinfect your wound properly, you might get an infection."
23002-260 = "This is dangerous stuff."
23002-270 = "It might sting a little, but I know you can do it!"
23002-280 = "Here we go! Let's get this cleaned up!"
23002-290 = "All right, good job. We're almost done."
23002-300 = "How about I cast a spell on you, Sensei? It'll help your wound heal quickly."
23002-310 = "Pain, pain, go away!"
23002-320 = "There! It doesn't hurt at all, right?"
23002-2600 = "This weapon... It's full of love!"

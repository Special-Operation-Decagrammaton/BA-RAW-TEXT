[translation]
23002-10 = "블루 아카이브!"
23002-20 = "백의의 천사가!\n당신을 찾아왔어요!!"
23002-30 = "랄라~ 수술이\n필요한 사람?\n누구 없으려나~"
23002-40 = "구원도! 희망도!\n그리고 사랑도!\n하나에는\n전부 갖고 있죠!"
23002-50 = "빨리 토끼랑\n고양이랑\n놀고 싶다!"
23002-60 = "친구가 많이 생겨서\n매일매일이\n즐거워요!"
23002-70 = "안녕하세요!\n하나에예요!\n잘 부탁드려요!"
23002-80 = "선생님! 새로운 편지가 왔어요!\n즐거운 임무, 오늘도 시작해요!"
23002-90 = "꺄아! 어서 오세요!\n선생님이 오시길 기다렸다고요!"
23002-100 = "앗 선생님! 안색이 안 좋아요!\n간단히 수술해 드릴까요?!"
23002-110 = "활력과 미소를 원하신다면!\n하나에에게 맡기세요!"
23002-120 = "선생님이 좋아하는 타입은?"
23002-130 = "발랄하고 귀여운 소녀겠죠?!"
23002-140 = "오늘은 할 일이 잔뜩 있으니까\n게으름 피우시면 안 돼요!"
23002-150 = "앗! 뭔가 좋은 일이\n일어날 것 같은 예감!"
23002-160 = "오늘은 최고로 기쁜 날이에요!\n선생님! 생일 축하해요!"
23002-170 = "오늘은 제 생일이에요!\n생일 선물로…"
23002-180 = "선생님의 하루를 받고 싶어요!"
23002-190 = "해피 뉴이어!\n올해도! 행복한 한 해되세요!"
23002-200 = "모두가 행복한 크리스마스예요!\n트리니티 여학생이라면,\n누구나 설레는 날이죠!"
23002-210 = "앗. 할로윈이 시작되었어요.\n빨리 나가봐요~ 축제가 시작되니까!"
23002-230 = "자. 그럼 지금부터\n상처를 소독할 테니,"
23002-240 = "양말을 걷고\n얌전히 기다려주세요."
23002-250 = "제대로 상처를\n소독하지 않으면\n상처에 염증이 일어나"
23002-260 = "큰일이 생길지도\n모르니까요."
23002-270 = "조금 아플지도 모르지만,\n꾹 참아주세요!"
23002-280 = "영~ 차……!\n깨끗해져라,\n깨끗해져라~!"
23002-290 = "네, 잘 참으셨어요!\n조금만 더 힘내세요."
23002-300 = "특별히 덤으로,\n상처가 빨리 낫는\n마법의 주문을 걸어드릴게요."
23002-310 = "그럼……\n아픈 거, 아픈 거……\n다 날아가라~!"
23002-320 = "어떤가요?\n하나도 안 아프죠?"
23002-2600 = "이 무기는…\n사랑이 가득 담겨 있어요!"

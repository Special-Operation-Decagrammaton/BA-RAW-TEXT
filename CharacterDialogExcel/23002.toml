[translation]
23002-10 = "蔚藍檔案！"
23002-20 = "白衣天使！\n來找你了！！"
23002-30 = "啦啦～\n需要手術的人～？\n在哪裡呢～"
23002-40 = "不管是救援！希望！\n還是愛！\n花繪全部都準備好了唷！"
23002-50 = "好想趕快\n跟兔子和貓咪玩啊！"
23002-60 = "交到很多朋友，\n每天都很開心！"
23002-70 = "你好！\n我是花繪！\n請多多指教！"
23002-80 = "老師！有新的信寄來了！\n快樂的任務，今天也開始吧！"
23002-90 = "呀啊！歡迎你來！\n我一直在等老師來唷！"
23002-100 = "啊，老師！你的臉色好差！\n要不要做個簡單的手術呀！？"
23002-110 = "想要活力和笑容的話！\n就交給我花繪吧！"
23002-120 = "老師喜歡的類型是？"
23002-130 = "活潑可愛的少女對吧！？"
23002-140 = "今天要做的事情很多\n不可以偷懶唷！"
23002-150 = "啊！總覺得有預感\n會有好事發生！"
23002-160 = "今天是最開心的日子！\n老師！生日快樂！"
23002-170 = "今天是我的生日！\n我想收到的生日禮物是……"
23002-180 = "老師的一天！"
23002-190 = "新年快樂！\n希望今年\n也是幸福的一年！"
23002-200 = "是大家都會幸福的聖誕節！\n是每個三一的女學生，\n都會心動不已的日子唷！"
23002-210 = "啊。萬聖節開始了。\n我們趕快到外面去吧～\n慶典就要開始了！"
23002-230 = "那麼，首先要\n消毒傷口，"
23002-240 = "請脫下襪子\n並乖乖的唷！"
23002-250 = "不好好消毒的話，\n傷口會發炎，"
23002-260 = "甚至變得更嚴重喔。"
23002-270 = "可能會有點痛，\n請忍耐一下吧！"
23002-280 = "嘿咻……！\n變乾淨吧……！"
23002-290 = "很好，忍住了呢！\n還差一點點唷──"
23002-300 = "作為贈品，\n我來施一道\n能讓傷口好得更快的\n魔法咒語吧！"
23002-310 = "那麼，痛痛，\n飛走吧～！"
23002-320 = "如何？\n不痛了吧？"
23002-2600 = "這個武器裡……\n有著滿滿的愛！"

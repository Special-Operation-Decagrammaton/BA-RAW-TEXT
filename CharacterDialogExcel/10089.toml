[translation]
10089-10 = "蔚藍檔案。"
10089-20 = "哎呀，這次是什麼樣的委託呢？\n還是說，是商業提案？\n不過無論是什麼……你願意過來我都很高興哦，老師"
10089-30 = "那，那個人是……！？\n但如果是這裡\n應該沒問題吧……？"
10089-40 = "這裡的氛圍……\n我並不討厭。"
10089-50 = "是時候該完成一件\n規模大一點的工作……"
10089-60 = "哪裡會有適合\n的客戶呢……"
10089-70 = "唔嗯……\n這個月的營運費\n該怎麼辦呢……"
10089-80 = "歡迎回來，老師。"
10089-90 = "趕緊討論工作的事吧？"
10089-100 = "我正在等你。\n今天的委託是什麼呢？"
10089-110 = "你當然會護送我的對吧？"
10089-120 = "無論什麼委託\n都儘管開口吧。"
10089-130 = "因為今天的我們……是特別的。"
10089-140 = "畢竟難得穿了正裝……"
10089-150 = "我說，老師，\n要不要一起出門？"
10089-160 = "你，你說禮服\n很適合我……！？"
10089-170 = "那，那當然囉！\n我可是社長啊！"
10089-180 = "……呵呵。"
10089-190 = "唔……這件禮服，\n感覺清潔費就很貴……"
10089-200 = "呃，嗯！？沒，沒有，\n我什麼話都沒說！"
10089-210 = "我說，偶爾聊聊\n工作以外的事也可以哦？"
10089-220 = "呵呵呵，今天是個\n非常特別的日子呢……"
10089-230 = "我當然還記得。"
10089-240 = "祝你生日快樂，老師。"
10089-250 = "咦，咦……！？雖然是\n我的生日……沒錯……\n你居然記得嗎！？"
10089-260 = "謝，謝，謝謝……"
10089-270 = "祝你新年快樂，老師。"
10089-280 = "雖然不必多說，不過我們的\n合作關係依然會持續下去。\n今年也請多多指教。"
10089-290 = "對我們便利屋來說\n雖然是和平常\n沒兩樣的日子……"
10089-300 = "不過，只要跟老師在一起，\n感覺就能成為有意義的日子。"
10089-310 = "街上很熱鬧呢……"
10089-320 = "老師覺得如何？\n要不要辦個派對？"
10089-340 = "唉……事情居然會變成這樣，\n真是想都沒想過。"
10089-350 = "不過……\n就像老師說的一樣，\n這樣其實也不錯。"
10089-360 = "其實，我一直\n覺得不可思議……"
10089-370 = "打扮得那麼正式的大人，\n為什麼偏偏要在\n這種地方吃飯呢……"
10089-380 = "但是……現在，\n我好像多少能明白了。"
10089-390 = "就算理由各不相同……"
10089-400 = "我想，大家應該\n都是這種心情吧。"
10089-410 = "……老師你，\n想必也是這樣的吧。"
10089-420 = "呵呵……\n我也或多或少……\n更接近老師一點了嗎？"
10089-2600 = "都相處這麼久了。\n「相信你」這種話……已經不必多說了吧。\n嗯……之後也請多多指教，老師。\n……沒錯，這樣就已經夠了。"

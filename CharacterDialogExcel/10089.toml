[translation]
10089-10 = "블루 아카이브."
10089-20 = "어머, 이번에는 어떤 의뢰?\n아니면 비즈니스 제안일까?\n뭐 어느 쪽이든… 와줘서 기뻐, 선생님."
10089-30 = "저, 저 사람은……!?\n하지만 여기라면…\n괜찮겠지……?"
10089-40 = "여기 분위기… 싫지 않아."
10089-50 = "슬슬 큰일을 하나\n멋지게 하고 싶은데……"
10089-60 = "어디 적당한 거래처,\n없을까나……"
10089-70 = "음…\n이번 달 운영비,\n어쩌지……"
10089-80 = "어서 와, 선생님."
10089-90 = "바로, 일 얘기를 해볼까?"
10089-100 = "기다리고 있었어.\n오늘의 의뢰는 뭐야?"
10089-110 = "물론 에스코트해 주겠지?"
10089-120 = "어떤 부탁이든 말해줘."
10089-130 = "오늘의 우리는… 특별하니까."
10089-140 = "모처럼의 정장이니……"
10089-150 = "있잖아, 선생님, 같이 외출할까?"
10089-160 = "드, 드레스가 잘 어울린다고…!?"
10089-170 = "당, 당연하지!\n나는 사장이니까!"
10089-180 = "…후후."
10089-190 = "으… 이 드레스, 세탁비 비쌀 것 같아…"
10089-200 = "으응!? 아무 말도 안 했어!"
10089-210 = "있잖아, 가끔은 일 말고\n다른 얘기도 해도 된다고?"
10089-220 = "후후후,\n오늘은 유난히 특별한 날이네…"
10089-230 = "당연히 기억하고 있지."
10089-240 = "생일 축하해, 선생님."
10089-250 = "어, 어…!?\n내 생일… 이긴 하지만…\n기억해 준 거야!?"
10089-260 = "고, 고, 고마워…"
10089-270 = "새해 복 많이 받아, 선생님."
10089-280 = "당연한 이야기지만,\n우리의 협력 관계는 계속되니까.\n올해도 잘 부탁해."
10089-290 = "우리 흥신소에 있어서는,\n평소와 다름없는 날이지만……"
10089-300 = "그러게, 선생님과 함께라면\n의미 있는 날이 될 것 같아."
10089-310 = "거리가 들떠있네…"
10089-320 = "선생님은 어때?\n파티라도 열까?"
10089-340 = "하아……\n이렇게 될 줄은 생각도 못 했어."
10089-350 = "하지만… 선생님 말대로\n이런 것도 나쁘지는 않네."
10089-360 = "솔직히, 신기했거든……"
10089-370 = "잘 차려 입은 어른이\n왜 이런 곳에서 굳이\n밥을 먹는지……"
10089-380 = "하지만…… 지금은 조금 알 것 같아."
10089-390 = "각자 이유는 달라도……"
10089-400 = "분명, 다들 이런 기분이었구나, 하고."
10089-410 = "…선생님도, 분명 그렇겠지."
10089-420 = "후후… 나도 조금은…\n선생님이랑 비슷해졌나?"
10089-2600 = "오랜 시간을 보내왔는데. 신뢰한다, 라는 말…\n새삼스럽네. 그래… 앞으로도 잘 부탁해, 선생님.\n…응, 이것만으로 충분해."

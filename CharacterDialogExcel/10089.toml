[translation]
10089-10 = "Blue Archive."
10089-20 = "So, what kind of commission do you have for me? Or is it a new business deal? Well, whatever it is... I'm glad you came, Sensei."
10089-30 = "Th-That person is...?! But it should be fine here, right...?"
10089-40 = "This place isn't too bad."
10089-50 = "I think it's time to take on a new project. Something big...and ambitious!"
10089-60 = "I wonder if I'll ever find a worthy business partner?"
10089-70 = "Hmm... How am I going to cover this month's operating expenses?"
10089-80 = "Welcome, Sensei."
10089-90 = "Shall we get down to business?"
10089-100 = "I've been waiting for you! What's the job for today?"
10089-110 = "You'll be by my side, won't you?"
10089-120 = "Whatever you need, just let me know."
10089-130 = "Today's pretty special..."
10089-140 = "Because we're all dressed up!"
10089-150 = "Hey, Sensei, wanna go paint the town?"
10089-160 = "You think my dress is very fashionable?!"
10089-170 = "O-Of course it is! To be the boss, you have to dress like one!"
10089-180 = "...Heehee."
10089-190 = "Ugh... Cleaning this dress is gonna be expensive... I know it."
10089-200 = "H-Huh?! I didn't say anything!"
10089-210 = "You know, it's okay to talk about things besides work too."
10089-220 = "Heehee, today's an exceptionally special day..."
10089-230 = "Of course, I remembered!"
10089-240 = "Happy birthday, Sensei."
10089-250 = "Oh?! Um...it is my birthday... You remembered?"
10089-260 = "Th-Thank you..."
10089-270 = "Happy New Year, Sensei."
10089-280 = "It's a given our partnership will continue. Here's to another successful business year."
10089-290 = "Just another day for Problem Solver 68..."
10089-300 = "Yeah. With you, maybe it'll be a meaningful one."
10089-310 = "The streets are buzzing..."
10089-320 = "Hey, Sensei. Would you like to throw a party?"
10089-340 = "*sigh*...I never thought things would turn out this way."
10089-350 = "But...as you said, it isn't all bad."
10089-360 = "Honestly, it's rather fascinating..."
10089-370 = "To think that a well-to-do adult...would dine at a place like this..."
10089-380 = "But now... I think I understand a little more."
10089-390 = "Though our reasons may vary..."
10089-400 = "I'm sure everyone has felt this way before."
10089-410 = "...Even you, Sensei."
10089-420 = "Heehee... Maybe I'm starting to become a bit like you?"
10089-2600 = "Despite spending so much time together, hearing you say \"I trust you\" still feels...strange. Even so... I'm looking forward to working with you, Sensei. That's all that needs to be said."

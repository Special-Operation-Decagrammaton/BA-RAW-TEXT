[translation]
10089-10 = "Blue Archive"
10089-20 = "ตายจริง ครั้งนี้เป็นภารกิจแบบไหนเหรอ?\nหรือเป็นข้อเสนอทางธุรกิจ?\nแต่ไม่ว่าจะเป็นเรื่องไหน... ก็ขอบคุณที่มานะคุณครู"
10089-30 = "คะ... คนนั้น...!?\nแต่ว่าถ้าเป็นที่นี่...\nคงไม่เป็นไรหรอกเนอะ...?"
10089-40 = "บรรยากาศที่นี่...\nไม่เลวเลยนะ"
10089-50 = "ฉันอยากทำงานใหญ่ๆ\nอย่างเท่ๆ สักงานจังเลย..."
10089-60 = "ไม่มีผู้ว่าจ้างที่เหมาะๆ\nอยู่เลยหรือไงนะ..."
10089-70 = "อืม... ค่าใช้จ่ายเดือนนี้\nจะทำยังไงดีนะ"
10089-80 = "เข้ามาสิ คุณครู"
10089-90 = "มาคุยเรื่องงานกันเลยมั้ย?"
10089-100 = "ฉันกำลังรออยู่เลย\nภารกิจวันนี้คืออะไรเหรอ? "
10089-110 = "จะให้มาช่วยคุ้มกันใช่มั้ย?"
10089-120 = "ไม่ว่าเรื่องอะไรก็บอกได้เลย"
10089-130 = "เพราะวันนี้มัน... ค่อนข้างพิเศษน่ะ"
10089-140 = "ไม่ได้แต่งเต็มแบบนี้มานานแล้วนะ..."
10089-150 = "นี่ คุณครู ออกไปข้างนอก\nด้วยกันมั้ย?"
10089-160 = "ฉะ... ฉันเหมาะกับชุดเดรสเหรอ...!?"
10089-170 = "กะ... ก็แน่นอนอยู่แล้ว!\nก็ฉันเป็นประธานนี่! "
10089-180 = "ฮุฮุ..."
10089-190 = "ฮือ... ชุดนี้ถ้าเอาไปซักรีด\nต้องแพงแน่เลย..."
10089-200 = "หืม!? ฉันไม่ได้พูดอะไรสักหน่อย!"
10089-210 = "นี่ บางครั้งคุยเรื่องอื่น\nแทนเรื่องงานก็ได้นะ"
10089-220 = "ฮุฮุฮุ\nวันนี้เป็นวันพิเศษจังเลยนะ..."
10089-230 = "ฉันต้องจำได้อยู่แล้วละ"
10089-240 = "สุขสันต์วันเกิดนะคุณครู"
10089-250 = "หะ... หืม...!?\nเป็นวันเกิด... ของฉันก็จริง...\nแต่คุณครูจำได้ด้วยเหรอ!?"
10089-260 = "ขะ... ขะ... ขอบคุณนะ..."
10089-270 = "สวัสดีปีใหม่นะคุณครู"
10089-280 = "ถึงจะเป็นเรื่องแน่นอนอยู่แล้ว\nแต่ความร่วมมือของเรา\nก็ยังคงดำเนินไป\nงั้นปีนี้ก็ฝากตัวด้วยนะ"
10089-290 = "สำหรับหน่วยรับจ้างสารพัดแล้ว\nวันนี้ไม่ต่างจากวันอื่นๆ หรอก..."
10089-300 = "นั่นสิ ถ้าอยู่กับคุณครู\nมันก็เหมือนจะเป็นวันพิเศษนะ"
10089-310 = "บนถนนดูสนุกกันจังเนอะ..."
10089-320 = "แล้วคุณครูล่ะ?\nจะปาร์ตี้อะไรมั้ย?"
10089-340 = "เฮ้อ... คิดไม่ถึงเลยนะ\nว่าจะเป็นแบบนี้"
10089-350 = "แต่ว่า... อย่างที่คุณครูว่าเลยนะ\nว่าเรื่องแบบนี้ก็ไม่ได้แย่เท่าไร"
10089-360 = "ที่จริงมันน่าแปลกใจมากเลยนะ..."
10089-370 = "ผู้ใหญ่ที่แต่งตัวดีแบบนี้\nทำไมถึงมากินอาหาร\nในที่แบบนี้นะ..."
10089-380 = "แต่ว่าตอนนี้ฉันเหมือนจะเข้าใจ\nนิดหน่อยแล้วละ"
10089-390 = "ต่อให้แต่ละคนมีเหตุผลต่างกัน..."
10089-400 = "แต่ทุกคนมีอารมณ์แบบนี้\nด้วยกันทั้งนั้นสินะ"
10089-410 = "คุณครูเองก็...\nคงจะเป็นแบบนั้นด้วย"
10089-420 = "ฮุฮุ.. ฉันเองก็...\nคล้ายๆ กับคุณครูขึ้นบ้างมั้ยนะ?"
10089-2600 = "เรารู้จักกันมาก็นานแล้ว แต่คำที่\nบอกว่าเชื่อใจกัน... มันฟังดู\nแปลกใหม่ดีนะ อืม... ต่อไปก็ขอ\nฝากตัวด้วยนะ คุณครู\nอืม... แค่นี้ก็เพียงพอแล้วละ"

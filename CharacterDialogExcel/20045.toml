[translation]
20045-10 = "Blue Archive~"
20045-20 = "อาซาฮินะ พีน่า จากชมรมจัดงานเทศกาล\nสหพันธ์เฮียกคิยาโคค่ะ\nฉันจะเป็นไกด์ให้ทุกคนค่ะ!"
20045-30 = "Wow~ เหมือนออฟฟิศ\nของอัศวินเลย\nเท่จังเลยค่ะ!"
20045-40 = "(TV เครื่องนี้...\nดูหนังได้ด้วย!)"
20045-50 = "บรรยากาศแบบนี้\nเหมือนเคยเห็น\nจากที่ไหนมาก่อนเลยค่ะ!"
20045-60 = "มีคนเท่ๆ\nเต็มไปหมดเลย...\nพีน่าก็จะไม่ยอมแพ้ค่ะ!"
20045-70 = "พอเห็นคุณครูพักผ่อน\nฉันก็อยากนอนกลางวัน..."
20045-80 = "มากันครบแล้วค่ะ\nคุณครู!"
20045-90 = "คุณครู! วันนี้พีน่า\nเป็นไกด์ค่ะ!"
20045-100 = "การใส่ชุดสีดำ\nแล้วนำทางทุกคน..."
20045-110 = "แบบนี้ก็เหมือนกับ\nอัศวินเลยนะคะ?!"
20045-120 = "เฮียกคิยาโคก็เหมือนกับ\nสวนหน้าบ้านของฉันค่ะ!"
20045-130 = "ถ้าเป็นเรื่องการนำทาง\nให้เป็นหน้าที่ของฉันเลยค่ะ!"
20045-140 = "ฉันจะต้อนรับ\nด้วยวิถีของพวกเราค่ะ!"
20045-150 = "เตรียมตัวเตรียมใจให้พร้อมนะคะ!"
20045-160 = "ถ้าได้อยู่กับคุณครู\nพีน่าจะอยู่ยงคงกระพันค่ะ!"
20045-170 = "คุณครู\nวันนี้ Birthday ใช่มั้ยคะ?"
20045-180 = "ถ้าเป็นการเตรียมงานเลี้ยง\nก็ไม่มีปัญหาค่ะ"
20045-190 = "วันนี้เป็นวันเกิด\nของพีน่าค่ะ!"
20045-200 = "Happy birthday\nto me~!"
20045-210 = "Happy New Year!"
20045-220 = "สวัสดีปีใหม่ค่ะ บอส!"
20045-230 = "ไม่สิ... คุณครูต่างหาก!"
20045-240 = "โฮ่ โฮ่ โฮ่\nMerry Christmas ค่ะ!\nคุณครู!"
20045-250 = "Trick or Treat!\nHalloween แล้วค่ะ!"
20045-270 = "อะ... อื้ม!! เฮ้อ!"
20045-280 = "สงสัยฉัน\nกำลังประหม่าอยู่น่ะค่ะ"
20045-290 = "ตอนอยู่กับลูกทัวร์\nฉันมัวแต่ตั้งใจทำงาน\nก็เลยไม่รู้ตัว..."
20045-300 = "พอได้อยู่กับคุณครูแบบนี้\nฉันโล่งใจมากเลยค่ะ"
20045-310 = "ถ้าอยากคล่องแคล่ว\nก็ต้องยืดกล้ามเนื้อ!\nอีกครั้งหนึ่ง!"
20045-320 = "อืม... อืม... อึก!"
20045-330 = "คะ? ฉันดูดี...\nตอนรีแล็กซ์เหรอคะ?"
20045-340 = "อะ... เอ่อ...\nพลังและความรับผิดชอบ\nเป็นสิ่งที่สำคัญของคนเป็นไกด์..."
20045-350 = "แต่ตอนอยู่ด้วยกันสองคน...\nจะว่ายังไงดีนะ..."
20045-360 = "ฉัน...\nก็รู้สึกฉันโล่งใจน่ะค่ะ..."
20045-2600 = "เหมือนฉันเติบโตขึ้นอีกขั้น\nไม่สิ 500 ขั้นไปเลยค่ะ!"

[translation]
20045-10 = "Blue Archive～"
20045-20 = "我是百鬼夜行聯合學園，\n節慶營運管理部的朝比奈菲娜！\n將為各位進行導覽！"
20045-30 = "Wow～就像任俠電影\n裡的場景一樣，真酷！"
20045-40 = "（這台電視……\n能看電影！）"
20045-50 = "總覺得有種\n似曾相識的感覺！"
20045-60 = "厲害的人真多……\n菲娜也不能輸！"
20045-70 = "莫名有點睏了……"
20045-80 = "大家都到齊囉，頭兒！\n……不，老師！"
20045-90 = "老師！今天是由菲娜\n擔任值日導覽員哦！"
20045-100 = "穿著制服，\n身先眾人指引道路……"
20045-110 = "簡直就像任俠一樣呢！"
20045-120 = "百鬼夜行就像\n我的後院一樣！"
20045-130 = "需要導覽就交給我吧！"
20045-140 = "我會用我們的作法來迎接！"
20045-150 = "請做好覺悟！"
20045-160 = "只要跟老師一起\n就是無敵的！"
20045-170 = "老師，今天是\nBirthday對吧？"
20045-180 = "宴會的準備\n已經萬無一失了！"
20045-190 = "今天是菲娜的Birthday！"
20045-200 = "Happy birthday\nto me～！"
20045-210 = "Happy New Year！"
20045-220 = "新年快樂，頭兒！"
20045-230 = "……啊不對，老師！"
20045-240 = "齁齁齁～\nMerry Christmas，老師！"
20045-250 = "Trick or Treat！\nHalloween到了！"
20045-270 = "唔嗯，哈！"
20045-280 = "……總覺得，\n好像太緊張了。"
20045-290 = "跟客人們在一起\n的期間很投入，\n所以沒注意到……"
20045-300 = "像這樣跟老師待在一起，\n心情才放鬆了下來。"
20045-310 = "想要行動敏捷，\n伸展是必要的！\n再來一次！"
20045-320 = "嗯，嗯嗯，唔嗯～！"
20045-330 = "咦？最好放鬆一下\n肩膀的力氣……是嗎？"
20045-340 = "那，那個……該說\n這是為了以導覽員\n的身分振作嗎……"
20045-350 = "兩人獨處的話……\n那個……"
20045-360 = "就會不自覺地\n放鬆下來……"
20045-2600 = "一個階段……\n不，感覺成長了五百個階段呢！"

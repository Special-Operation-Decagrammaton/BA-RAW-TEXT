[translation]
20037-10 = "Blue Archive..."
20037-20 = "อึก... จะสั่งงานน่ารำคาญอะไรอีกเหรอ...?\nถ้าเป็นคำขอจากครู ฉันก็จะช่วยให้อยู่หรอกนะ..."
20037-30 = "มีที่ไหนที่แอบกิน\nโดนัทได้มั้ยนะ?"
20037-40 = "อย่าบอกนะว่า\nจะทำงานที่นี่ด้วย...?\nเอาจริงเหรอ~?"
20037-50 = "(ถ้าใส่แว่นกันแดด\nแล้วนั่งหลับ... จะดูเหมือน\nว่าทำงานอยู่มั้ยนะ...?)"
20037-60 = "ชุดว่ายน้ำชุดนี้\nไม่ค่อยหวือหวา\nก็เลยไม่สะดุดตาน่ะ"
20037-70 = "แต่วันนี้ก็ไม่มีเรื่องให้\nต้องลงสระว่ายน้ำ\nคงไม่เป็นไรหรอกเนอะ"
20037-80 = "อ้าว ครู~ วันนี้ไม่ไปสระว่ายน้ำเหรอ?"
20037-90 = "เหนื่อยหน่อยนะครู ขอโทษนะ\nช่วยหยิบรีโมทตรงนั้นให้หน่อยสิ"
20037-100 = "หืม? งานเหรอ?\nถ้าไลฟ์การ์ดไม่ค่อยมีงาน\nก็ถือว่าดีไม่ใช่เหรอ?"
20037-110 = "แปลกชะมัด ฉันไม่ได้ไม่ชอบ\nการว่ายน้ำหรอก แต่พอมันเป็นงาน\nก็เลยขี้เกียจทำขึ้นมาเนี่ยน่ะสิ"
20037-120 = "ถ้าการกินโดนัทเป็นงาน\nฉันจะขี้เกียจด้วยมั้ยนะ?\nแต่ก็... ไม่คิดว่าจะลองดูหรอกนะ"
20037-130 = "พอมีฉันอยู่ วันนี้ชาเล่ต์\nก็ปลอดภัยเลยนะ"
20037-140 = "ฮุฮุ ไม่ต้องตอบแทนอะไรหรอก\nแค่โดนัทกล่องเดียวก็พอแล้วละ"
20037-150 = "ได้ยินมาว่าโดนัทกับแก้วมัค\nที่จริงแล้วมันคล้ายกัน...\nไม่เห็นจะเข้าใจเลย..."
20037-160 = "หืม? งานเอกสารเหรอ?\nถ้าปกติก็ว่าไปอย่าง\nแต่ตอนนี้ฉันเป็นไลฟ์การ์ดนะ"
20037-170 = "ถ้ามีเรื่องอันตรายระหว่าง\nทำงาน ฉันจะช่วยเอง"
20037-180 = "สุขสันต์วันเกิดนะครู\nเอาบัตรสวนน้ำ\nเป็นของขวัญมั้ย?"
20037-190 = "ของขวัญวันเกิดเหรอ...\nอยากได้วันพักร้อน..."
20037-200 = "หืม? ให้มาพักที่ชาเล่ต์ได้งั้นเหรอ?"
20037-210 = "ต้องอย่างนี้สิครู! ฉันเชื่อครูอยู่แล้ว!"
20037-220 = "สวัสดีปีใหม่นะครู\nหวังว่าปีนี้งานจะน้อยลงนะ"
20037-230 = "จะมีใครมาเล่นน้ำ\nในฤดูนี้ด้วยเหรอ"
20037-240 = "เมอร์รี คริสต์มาส\nกินเค้กกันเถอะครู"
20037-250 = "ฮาโลวีนเป็นวันแห่ง\nความปั่นป่วนเลยละ..."
20037-260 = "ถึงจะแต่งตัวออกไปแบบนี้\nก็คงไม่เกิดประโยชน์หรอก"
20037-270 = "เพราะงั้นฉันจะอยู่\nเฉยๆ ตรงนี้แล้วกัน"
20037-290 = "เอ๊ะ... เอ๋...?"
20037-300 = "ฮึบบบบ!"
20037-310 = "อึก..."
20037-320 = "อะ... ออกไม่ได้อะ...\nฉันคงไม่ต้องอยู่อย่างนี้\nทั้งชีวิตใช่มั้ย...?"
20037-330 = "นี่ ครู มาช่วยหน่อยสิ!"
20037-340 = "ต่อไปฉันจะอู้งานให้น้อยลง\nแล้วจะตั้งใจทำงานด้วย..."
20037-350 = "แล้วก็จะแบ่งโดนัทที่ซ่อนไว้ให้ด้วย!"
20037-360 = "เฮือก!? ยะ... อย่าแตะกัน\nจากข้างหลังสิ เดี๋ยวเหอะ!?"
20037-2600 = "อืม คิดไม่ถึงเลยนะว่าจะทำให้\nถึงขนาดนี้ ถ้าครูมีเรื่องอะไร\nฉันจะช่วยอย่างสุดความสามารถเลย\nแต่ขอพักจนกว่าจะมีเรื่องได้มั้ย?"

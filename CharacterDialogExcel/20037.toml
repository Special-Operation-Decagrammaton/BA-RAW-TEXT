[translation]
20037-10 = "블루 아카이브……"
20037-20 = "으윽, 또 귀찮은 일을 시키려고……?\n뭐, 선생의 부탁이라면 일단 어울려 주겠지만……"
20037-30 = "도넛을 숨어서\n먹을 수 있는 곳은\n없을까?"
20037-40 = "설마, 여기서도 일…?\n설마 설마~?"
20037-50 = "(선글라스를 쓰고\n앉아서 잔다면… 일하는\n것처럼 보일까…?)"
20037-60 = "이 수영복, 비교적\n수수해서 눈에\n안 띈단 말이지."
20037-70 = "뭐, 오늘은 풀장에\n들어갈 일도 없으니,\n괜찮겠지."
20037-80 = "아 선생~ 오늘은 풀장 안 가?"
20037-90 = "수고했어, 선생. 미안한데,\n저기 리모컨 좀 집어줄래?"
20037-100 = "어? 임무? 라이프가드 일은\n없는 편이 좋잖아?"
20037-110 = "참 이상해. 수영은\n싫어하지 않는데,\n일이 되면 엄청\n귀찮아진단 말이지."
20037-120 = "도넛 먹는 것도 일이\n되면 귀찮아지려나?\n…뭐, 시험해 볼 생각은\n없지만."
20037-130 = "내가 있으니까,\n오늘의 샬레는 안전하네."
20037-140 = "후후, 답례 같은 건 됐어.\n도넛 한 박스 주면 충분해."
20037-150 = "도넛과 머그컵은 사실\n같다는 말을 들었는데……\n그게 무슨 뜻인지 도통……"
20037-160 = "으응? 서류 업무?\n평소라면 몰라도, 지금\n나는 라이프가드라구."
20037-170 = "일하다 위험한 일이\n있으면 도와줄게."
20037-180 = "생일 축하해, 선생.\n선물로 워터파크 이용권이라도\n챙겨 줄까?"
20037-190 = "생일선물… 휴가받고 싶다…"
20037-200 = "어? 샬레에서 쉬어도 된다고?"
20037-210 = "역시 선생! 믿고 있었다고!"
20037-220 = "새해 복 많이 받으라구, 선생.\n올해에는 일거리가 많이\n줄었으면 좋겠네."
20037-230 = "설마, 이런 계절에 물놀이를\n하는 사람이 어디 있겠어."
20037-240 = "크리스마스\n케이크나 먹자, 선생."
20037-250 = "할로윈이라, 말썽이\n많은 날이지만……"
20037-260 = "이런 차림으로 나가봤자,\n전혀 도움 안 될걸?"
20037-270 = "그러니까 여기서 가만히\n있을게~"
20037-290 = "어, 어라라……?"
20037-300 = "으그그그그긋!"
20037-310 = "……크흑."
20037-320 = "아, 안 빠져……\n평생 이렇게 살아야\n하는 건 아니겠지……?"
20037-330 = "저기, 선생. 좀 도와줘!"
20037-340 = "앞으로는 땡땡이도 덜 치고,\n일도 열심히 할 테니까……"
20037-350 = "그리고 숨겨둔 도넛도 줄 테니까!"
20037-360 = "히익!? 뒤, 뒤쪽에서\n손대는 건 좀!?"
20037-2600 = "음. 설마 이렇게까지 해줄 줄이야.\n선생한테 무슨 일이 생기면\n최선을 다해 구조할게.\n……그때까지는 쉬어도 될까?"

[translation]
20037-10 = "蔚藍檔案……"
20037-20 = "呃，又想叫我去做麻煩的事了……？\n不過，既然是老師的請求，姑且還是會配合就是了……"
20037-30 = "有感覺能躲起來吃\n甜甜圈的地方嗎？"
20037-40 = "該不會，連在這裡\n都要工作……？\n不會吧不會吧～？"
20037-50 = "（戴著墨鏡睡覺\n　的話……看起來\n　會像在工作嗎……？）"
20037-60 = "這件泳裝\n還挺樸素的，\n不是很吸睛。"
20037-70 = "算了，反正今天\n也不會進到泳池\n裡……無所謂吧。"
20037-80 = "啊，老師～\n今天不到泳池去嗎？"
20037-90 = "辛苦啦，老師。不好意思，\n能幫我拿一下那邊的遙控器嗎？"
20037-100 = "嗯？任務？救生員的工作，\n不是沒有才好嗎？"
20037-110 = "真的很不可思議呢。\n我本來其實並不討厭游泳，\n可是一變成工作之後\n突然就覺得很麻煩……"
20037-120 = "要是吃甜甜圈也變成工作的話，\n我會覺得麻煩嗎？\n……算了，反正我也不想嘗試。"
20037-130 = "多虧有我在，\n今天的夏萊也很安全呢。"
20037-140 = "呵呵，不用給什麼謝禮啦。\n只要一盒甜甜圈就行了。"
20037-150 = "我有聽過甜甜圈和馬克杯\n其實是一樣的……但那是\n什麼意思，我完全不理解……"
20037-160 = "嗯？文書工作？\n平時的話就算了，\n現在我可是救生員啊。"
20037-170 = "工作中如果發生\n危險的話我再幫你。"
20037-180 = "生日快樂，老師。\n作為禮物，要不要送你\n水上樂園的門票呀？"
20037-190 = "生日禮物……\n我想要休假……"
20037-200 = "咦？可以在夏萊休息？"
20037-210 = "不愧是老師！相信你果然沒錯！"
20037-220 = "新年快樂，老師。\n要是今年工作能減少就好了呢。"
20037-230 = "應該，沒有人會在\n這樣的季節玩水吧？"
20037-240 = "來吃個聖誕節蛋糕吧，老師。"
20037-250 = "萬聖節啊。雖然是\n惡作劇會增加的日子……"
20037-260 = "但我這副打扮就算出去，\n也完全派不上用場哦？"
20037-270 = "所以我還是乖乖\n待在這裡吧～"
20037-290 = "咦，咦咦……？"
20037-300 = "呃咕咕咕！"
20037-310 = "……唔。"
20037-320 = "爬，爬不出來……\n該不會一輩子\n都得這樣了吧……？"
20037-330 = "我說，老師。稍微幫幫我吧！"
20037-340 = "以後我會減少\n偷懶的次數，\n工作也會認真做的……"
20037-350 = "而且，還會把\n祕藏的甜甜圈也給你！"
20037-360 = "呀啊！？被，被從\n後面摸好像有點……！？"
20037-2600 = "唔嗯，沒想到事情會變成這樣。\n如果老師出了什麼事的話，\n我一定會盡全力救你的。\n……在那之前可以先休息嗎？"

[translation]
20037-10 = "Blue Archive..."
20037-20 = "Ugh, you're going to make me do something bothersome again...? Well, since it's a request from you, I'll at least play along..."
20037-30 = "Is there anywhere I can hide and eat donuts?"
20037-40 = "Surely I don't have to work here too...? Surely? SURELY?"
20037-50 = "(If I sit and sleep with sunglasses on...would it look like I'm working...?)"
20037-60 = "This swimsuit is rather plain, so it doesn't stand out."
20037-70 = "Well, nothing's going to make me get into the pool today, so I suppose it'll be fine."
20037-80 = "Ah, Sensei! You're not going to the pool today?"
20037-90 = "Good work, Sensei. Sorry to ask, but could you grab that remote over there?"
20037-100 = "Huh? My job? Isn't it a good thing if the lifeguard has nothing to do?"
20037-110 = "How odd. I don't hate swimming, but it's suddenly such a bother when it becomes work."
20037-120 = "Would eating donuts also become a pain if it was for work? ...Well, I don't plan on testing that one out, though."
20037-130 = "Since I'm here, Schale is safe today as well."
20037-140 = "Heehee, no need for repayment. A box of donuts will be enough."
20037-150 = "I heard that donuts and mugs are the same... But I don't quite understand what it means..."
20037-160 = "Hm? Paperwork? I might've done that in the past, but I'm a lifeguard right now."
20037-170 = "I'll help you if something dangerous happens during work."
20037-180 = "Happy birthday, Sensei. Do you want...a Water Park Wristband as a present?"
20037-190 = "Birthday present... I want a vacation..."
20037-200 = "Huh? I can take a break at Schale?"
20037-210 = "As expected of Sensei! I knew I could trust you!"
20037-220 = "Happy New Year, Sensei. I hope there'll be less work this year."
20037-230 = "Don't tell me that there are people who go out to play in water in this season..."
20037-240 = "Let's have Christmas cake already, Sensei."
20037-250 = "Halloween, it's a day full of trouble..."
20037-260 = "But if I go out in this outfit, I won't be of any help, you know?"
20037-270 = "So I'll just stay still here!"
20037-290 = "Huh? What the...?"
20037-300 = "Eeeek!"
20037-310 = "...Agh!"
20037-320 = "Ah, it won't come off... Am I going to have to live like this forever...?"
20037-330 = "Hey, Sensei? Little help?"
20037-340 = "I'll stop slacking off and work even harder..."
20037-350 = "I'll even give you the donuts I've been hiding!"
20037-360 = "Aack! Grabbing me from the back is ONE way to..."
20037-2600 = "Um. To do this much for me... If something happens to Sensei, I'll do my best to rescue you. ...Can I take a break until then, though?"

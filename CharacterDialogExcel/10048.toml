10048-590 = "老師，你怎麼會在這裡……？"
10048-600 = "呃……哈啊……"
10048-610 = "……別擔心，\n這是常有的事。"
10048-620 = "我只是在最後關頭，\n鬆懈了……"
10048-630 = "明明什麼都沒改變……\n是我誤會了。"
10048-640 = "咳咳，咳咳……！"
10048-650 = "不要露出那種表情，\n我已經習慣疼痛了。"
10048-660 = "和以往沒什麼不同。\n事到如今也不值一提了。"
10048-670 = "現在這樣就行了……"
10048-680 = "再稍微，維持這樣……"
10048-2600 = "你……為什麼可以信賴我？\n明明發生了那種事……\n遭到背叛，也無所謂嗎？\n雖然我還有很多不懂的事，\n即便如此……我還是會，竭盡全力。"

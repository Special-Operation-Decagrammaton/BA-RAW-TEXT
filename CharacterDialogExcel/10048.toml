10048-570 = "그저 헛될 뿐이야."
10048-590 = "선생…… 어째서 여기에?"
10048-600 = "크윽…… 하아아……"
10048-610 = "……신경쓰지 마.\n자주 있는 일이니까."
10048-620 = "그저 내 마무리가\n어설펐을 뿐이야……"
10048-630 = "아무 것도\n달라진 게 없는데……\n멋대로 착각해버린 거지."
10048-640 = "콜록, 콜록……"
10048-650 = "그런 표정 짓지 마.\n고통은 익숙하니까."
10048-660 = "지금껏 해온 것과\n다를 건 없어.\n새삼스러울 것도 없지."
10048-670 = "지금은 이걸로 괜찮아……"
10048-680 = "조금만 더, 이대로……"
10048-2600 = "당신은… 어떻게 나를 신뢰할 수 있지?\n그런 일이 있었는데도…\n배신을 당해도 상관없다는 건가?\n아직 나는 모르는 것투성이지만, 그래도…\n나는, 최선을 다하겠어."

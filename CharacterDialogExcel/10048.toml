[translation]
10048-10 = "블루 아카이브"
10048-20 = "아리우스 스쿼드의 사오리다.\n…선생에게는 여러 가지로 신세를 졌었지.\n적어도 신세진만큼의 일은 하겠어. 잘 부탁해."
10048-30 = "흠…"
10048-40 = "이런 장소는\n익숙해지지 않는군…"
10048-50 = "이건, 뭐지…?"
10048-60 = "이해하지 못하겠어…"
10048-70 = "그렇군. 이것은\n그런 것인가…"
10048-80 = "준비라면 되어 있어.\n무슨 일이 있으면\n말하도록 해, 선생."
10048-90 = "기다리고 있었다. 선생."
10048-100 = "…뭐지, 그 반응은."
10048-110 = "내가 도움이 되고 있나?"
10048-120 = "…그럼 됐어. 그것만으로도\n나는 여기에 있을 수 있다."
10048-130 = "모든 것은 헛될 텐데\n어째서 우리들은\n살아있는 걸까…"
10048-140 = "나는 아직\n그 답을 알지 못해."
10048-150 = "나는… 앞으로도,\n발버둥 칠 수밖에 없어."
10048-160 = "명령을 내려줘. 선생.\n나는 그걸 위해\n여기 있는 거니까."
10048-170 = "나는 아직 살아있어도\n괜찮은 걸까…"
10048-180 = "…선생의 생일,\n이라고 들었어."
10048-190 = "미안하지만,\n이럴 땐 무엇을 해야하는지\n나는 잘 몰라."
10048-200 = "다만… 당신이 없었다면\n나도 여기 없었겠지."
10048-210 = "그러니까, 선생.\n다시 한번 감사하지."
10048-220 = "…나는 이제까지 생일 같은걸,\n축하해 본 적이 거의 없었다."
10048-230 = "그래서 그 단어를\n받아들이는 방법도\n아직 잘 몰라."
10048-240 = "그럴 자격이 있는지도 말이야."
10048-250 = "언젠가 이 날을, 진심으로\n축하할 수 있는 날이\n오게 될까…?"
10048-260 = "한 해의 끝인가. 그렇군.\n이 세계에서 보내는 하루하루는,\n여전히 차갑고 고통스럽지만…"
10048-270 = "그런데도,\n시간은 흘러가는 건가."
10048-280 = "성야인가…\n딱히 별 느낌은 없어."
10048-290 = "이 세계의 고통이,\n그런 걸로 줄어들\n거라고는 생각지 않아."
10048-300 = "…모든 것은. 헛될 뿐이야."
10048-310 = "아무래도 축제 같지만…\n특별히 흥미는 없어."
10048-320 = "그저 헛될 뿐이야."
10048-330 = "준비라면 되어 있어.\n무슨 일이 있으면\n말하도록 해, 선생."

10048-590 = "คุณครู... ทำไมถึงมาอยู่ที่นี่ได้?"
10048-600 = "อึก... เฮ้อ..."
10048-610 = "ไม่ต้องห่วงหรอก\nเรื่องแบบนี้เกิดขึ้นบ่อยแล้ว"
10048-620 = "ฉันก็แค่ไม่ระวังตัวเอง..."
10048-630 = "ไม่มีอะไรเปลี่ยนไปเลยแท้ๆ...\nฉันเข้าใจผิดไปเอง"
10048-640 = "แค่กๆ แค่กๆ..."
10048-650 = "อย่าทำหน้าแบบนั้นสิ\nฉันชินกับความเจ็บปวดแล้วละ"
10048-660 = "มันก็เป็นแบบนี้มาตลอด\nไม่มีอะไรเปลี่ยน ไม่ใช่เรื่อง\nที่ต้องตกใจเลย"
10048-670 = "แค่นี้ฉันไม่เป็นไรหรอก"
10048-680 = "ฉันขออยู่แบบนี้...\nอีกสักหน่อยนะ"
10048-2600 = "นี่คุณ... เชื่อใจฉันได้ยังไงกันนะ?\nหลังจากเกิดเรื่องแบบนั้น...\nไม่กลัวว่าฉันจะหักหลังเลยเหรอ?\nมีอีกหลายอย่างที่ฉันยังไม่รู้\nแต่ฉันจะพยายามให้ดีที่สุดแล้วกัน"

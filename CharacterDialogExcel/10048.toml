[translation]
10048-10 = "Blue Archive"
10048-20 = "ซาโอริจากสควอดของอาเรียส\nฉันติดหนี้บุญคุณคุณครูไว้หลายอย่าง\nฉันจะพยายามตอบแทนคุณครูให้ได้ ฝากตัวด้วยละ"
10048-30 = "อืม..."
10048-40 = "ฉันไม่คุ้นกับสถานที่แบบนี้เลย"
10048-50 = "นี่อะไรน่ะ...?"
10048-60 = "ไม่เห็นจะเข้าใจเลย..."
10048-70 = "งั้นเหรอ มันใช้แบบนั้นเองเหรอ"
10048-80 = "ฉันพร้อมแล้วละ ถ้ามีเรื่องอะไร\nก็บอกมาได้เลยนะ คุณครู"
10048-90 = "กำลังรออยู่เลย คุณครู"
10048-100 = "ทำไมทำท่าแบบนั้นล่ะ?"
10048-110 = "ฉันยังมีประโยชน์\nสำหรับคุณครูมั้ย...?"
10048-120 = "งั้นก็โอเค ถ้าแบบนั้น\nฉันก็อยู่ที่นี่ต่อได้แล้วละ"
10048-130 = "ถ้าทุกอย่างมันไร้ความหมาย\nแล้วทำไมพวกเราถึงยังมีชีวิต\nอยู่กันล่ะ..."
10048-140 = "ตอนนี้ตัวฉันเอง...\nก็ยังตอบคำถามนี้ไม่ได้"
10048-150 = "จากนี้ไปตัวฉัน...\nก็คงต้องดิ้นรนต่อไป"
10048-160 = "ช่วยออกคำสั่งด้วย คุณครู\nฉันอยู่ที่นี่เพื่อรับคำสั่ง"
10048-170 = "ตัวฉันยังมีชีวิตต่อไป...\nแบบนี้ได้ใช่มั้ย...?"
10048-180 = "ได้ยินว่าวันนี้เป็นวันเกิดคุณครู"
10048-190 = "โทษที ฉันไม่รู้ว่าเวลาแบบนี้\nควรจะพูดอะไรดี"
10048-200 = "แต่ถ้าไม่มีคุณครูละก็\nฉันเองก็คงไม่ได้มาอยู่ที่นี่"
10048-210 = "เพราะงั้นฉันเลยอยากขอบคุณน่ะ"
10048-220 = "จนถึงตอนนี้ฉันไม่เคย\nอวยพรวันเกิดใครมาก่อน"
10048-230 = "เพราะงั้นเลยไม่รู้ว่าจะต้อง\nรับคำอวยพรจากคุณครูยังไงดี"
10048-240 = "และฉันก็ไม่รู้ว่าตัวเอง\nคู่ควรกับคำอวยพรนั่นรึเปล่า"
10048-250 = "ในอนาคตจะมีวันที่ฉันฉลอง\nวันเกิดได้จริงๆ รึเปล่านะ...?"
10048-260 = "ผ่านไปหนึ่งปีแล้วเหรอ\nแต่วันแต่ละวันในโลกใบนี้...\nยังโหดร้ายและน่าเจ็บปวดเหมือนเดิม..."
10048-270 = "แต่ว่าวันเวลาผ่านไปเร็วจังเลยนะ"
10048-280 = "ค่ำคืนศักดิ์สิทธิ์...\nมันก็ไม่ใช่อะไรแปลกใหม่สักหน่อย"
10048-290 = "ความเจ็บปวดของโลกใบนี้\nหลังจากวันนี้มันจะทุเลาลงไป\nบ้างรึเปล่านะ"
10048-300 = "หึ ทุกอย่างมันเปล่าประโยชน์"
10048-310 = "ฉันไม่สนใจพวกงานเทศกาลหรอก"
10048-320 = "มันก็แค่เรื่องไร้สาระเท่านั้น"
10048-330 = "ฉันเตรียมพร้อมแล้วล่ะ\nมีอะไรก็บอกมาได้เลยนะ ครู"
10048-340 = "กำลังรออยู่เลย คุณครู"

[translation]
10059-10 = "Blue Archive~☆"
10059-20 = "มิโซโนะ มิกะ มาแล้ว~☆ แบบนี้ใช่มั้ยนะ?\nอ๊ะ ฉันกับคุณครูนี่ คงไม่ต้องทำความรู้จักกันใหม่ก็ได้สินะ?\nจากนี้ไปก็ฝากด้วยล่ะ คุณครู"
10059-30 = "หืม~ ถึงจะแคบไปหน่อย...\nแต่ที่นี่ก็ใช้ได้อยู่นะ"
10059-40 = "อ่ะฮะฮะฮะ!\nนี่มันอะไรกัน\nน่าขำสุดๆ☆"
10059-50 = "เมื่อก่อนฉันเอง\nก็เคยมีของที่เหมือนกัน\nกับอันนี้อยู่นะ..."
10059-60 = "ดูเหมือนที่นี่\nจะไม่น่าเบื่อเลยนะ"
10059-70 = "คุณครู...\nไม่อยู่ที่นี่เหรอ..."
10059-80 = "คุณครู! กลับมาแล้วเหรอ?\nฉันกำลังรออยู่เลย!"
10059-90 = "เชิญเลยคุณครู ไม่ต้องห่วงนะ\nตอนคุณครูไม่อยู่ ฉันจะดูแลให้\nอย่างดีเลย"
10059-100 = "วันนี้อากาศดีจังเลยนะ ว่ามั้ย?"
10059-110 = "เอาแต่ทำงานในวันอากาศดีแบบนี้\nน่าเสียดายจะตายไป?"
10059-120 = "ถ้าเสร็จงานแล้ว\nออกไปเดินเล่นกันดีมั้ย?"
10059-130 = "นี่... การเข้าเวรตัวแทนน่ะ\nมันเป็นแบบนี้งั้นเหรอ?"
10059-140 = "ฉะ... ฉันก็ไม่ได้\nคาดหวังอะไรอยู่หรอก..."
10059-150 = "อะ...อื้อ\nฉะ...ฉันก็ไม่ได้เบื่อเลยสักนิด..."
10059-160 = "ให้ฉันช่วยอะไรมั้ย?\nถ้าให้ฉันช่วยละก็\nฉันจะตั้งใจทำเต็มที่เลย!"
10059-170 = "ฮิฮิ...\nคุณครูตอนทำงาน\nเป็นแบบนี้เองสินะ"
10059-180 = "คุณครู! สุขสันต์วันเกิด!"
10059-190 = "ให้ฉันร้องเพลง\nอวยพรวันเกิดให้มั้ย?"
10059-200 = "หืม? เขินงั้นเหรอ?"
10059-210 = "เอ๋... นี่คุณครู\nรู้วันเกิดของฉันด้วยเหรอ?"
10059-220 = "อะ... อื้อ... ขอบคุณนะ..."
10059-230 = "อ่ะฮะฮะฮะ... รู้เข้าจนได้"
10059-240 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะ คุณครู!"
10059-250 = "ถึงฉันจะดื้อเป็นแบบนี้\nแต่ปีนี้ก็ขอฝากตัวด้วยนะ☆"
10059-260 = "นี่เป็นค่ำคืนอันศักดิ์สิทธิ์น่ะ คุณครู"
10059-270 = "วันนี้มีตารางงานอะไรหรือเปล่า?"
10059-280 = "ถ้าไม่มีละก็ มาใช้เวลาคืนนี้\nอยู่กับฉันดีมั้ย?"
10059-290 = "แฮปปี้ ฮาโลวีน~☆\nได้ยินว่ามีเครื่องประดับพิเศษ\nที่วางขายเฉพาะวันนี้ด้วยละ!"
10059-300 = "ออกไปช้อปปิ้งด้วยกันมั้ย?"
10059-320 = "ชู่ว... คุณครูถูกหลอกแล้วละ"
10059-330 = "ทำยังไงดีล่ะ? แบบนี้ก็คงต้อง\nอยู่กับฉันจนถึงเช้าแล้วแหละ?"
10059-340 = "เชื่อคำพูดของฉัน\nง่ายๆ แบบนี้ด้วยเหรอเนี่ย...\nคุณครูนี่จริงๆ เลย..."
10059-350 = "ฉันบอกไปแล้วนี่นา\nว่าอย่าเชื่อใจฉันขนาดนั้นน่ะ..."
10059-360 = "หืม? ถ้าทำเสียงดังที่นี่ละก็\nจะถูกทุกคนจับได้เอานะ...\nไม่เป็นไรแน่เหรอ?"
10059-370 = "...ฉันน่ะไม่เป็นไรหรอก"
10059-380 = "หืม...? นี่ โกรธกันเหรอ?"
10059-390 = "คุณครูก็รู้อยู่แล้วไม่ใช่รึไง\nเรื่องที่ฉันเป็นเด็กเจ้าปัญหาน่ะ...?"
10059-400 = "คือว่า... ฉันไม่ได้คิดจะ\nทำให้คุณครูลำบากหรอกนะ"
10059-410 = "ฉันก็แค่ไม่อยากให้คุณครู\nเกลียดฉันน่ะ..."
10059-420 = "แต่ว่า... แค่แป๊ปเดียว...\nขอแค่ช่วงเวลาสั้นๆ แบบนี้ก็ได้..."
10059-430 = "ฉันอยากใช้เวลาอยู่กับคุณครู..."
10059-2600 = "อา... ฉันดีใจที่เอ็นดูฉันแบบนี้นะแต่ว่า...\nถ้าเป็นแบบนี้อาจจะกลับไป\nเป็นเหมือนเดิมไม่ได้นะ? คุณครู...\nแบบนั้นจะไม่เป็นไรแน่เหรอ?\nฉันน่ะ... ไม่เป็นอะไรอยู่แล้ว☆"

[translation]
10059-10 = "블루 아카이브~☆"
10059-20 = "미소노 미카. 드디어 등장~☆ 그런 느낌일까?\n앗, 나와 선생님 사이니까, 아이스브레이킹은 없어도 되겠지?\n앞으로 잘 부탁해. 선생님."
10059-30 = "흐응~ 조금 좁지만…\n이건 이거대로\n좋지 않아?"
10059-40 = "아하핫!\n뭐야 이거,\n완전 웃겨☆"
10059-50 = "나도 예전엔,\n이거랑 비슷한 거\n가지고 있었는데……"
10059-60 = "여기는 심심하지\n않을 것 같아."
10059-70 = "선생님은\n여기 없는 건가…"
10059-80 = "선생님! 돌아왔구나?\n기다리고 있었어!"
10059-90 = "어서 와, 선생님!\n착하게 잘 지키고 있었어."
10059-100 = "응, 오늘도 좋은 날씨지?"
10059-110 = "이런날 일만 하는 건\n아깝지 않아?"
10059-120 = "……괜찮다면, 일이 끝나고\n산책이라도 가지 않을래?"
10059-130 = "저기… 당번이라는 건\n원래 이런 거야?"
10059-140 = "따, 딱히 뭘\n기대한 건 아닌데…"
10059-150 = "으응…\n딱히 심심한 건 아니지만…"
10059-160 = "뭔가 도와줄까?\n맡겨만 주면, 열심히 할게!"
10059-170 = "…헤에.\n선생님이 일하는 모습,\n이런 느낌이구나…"
10059-180 = "생일 축하해, 선생님!"
10059-190 = "생일 축하 노래\n불러줄까?"
10059-200 = "응? 부끄럽다고?"
10059-210 = "어라… 내 생일,\n알고 있었어?"
10059-220 = "으, 으응… 고마워…"
10059-230 = "아하하. 들켜버렸네."
10059-240 = "새해 복 많이 받으세요,\n선생님!"
10059-250 = "이런 나지만,\n올해도 잘 부탁해☆"
10059-260 = "성스러운 밤이네, 선생님."
10059-270 = "오늘은 뭔가 일정 있어?"
10059-280 = "……괜찮다면,\n나와 함께 보내지 않을래?"
10059-290 = "해피 할로윈~☆\n오늘만 판매하는\n한정 액세서리가 있대!"
10059-300 = "함께 쇼핑이라든가,\n어떨까나?"
10059-320 = "……선생님은, 속은 거야."
10059-330 = "어떡하지? 이제, 아침까지\n여기 있을 수 밖에 없는데?"
10059-340 = "이렇게 간단히\n나를 믿어버리다니,\n선생님도 정말이지…"
10059-350 = "그렇게 나를 믿지 말라고\n말했는데도…"
10059-360 = "응? 여기에서 소란 피웠다간……\n모두에게 들켜버릴 거야? 괜찮아?"
10059-370 = "…나는 딱히 상관없지만."
10059-380 = "……어라.\n혹시…… 화났어?"
10059-390 = "내가 문제아라는 것 쯤,\n선생님도 알고 있었잖아……?"
10059-400 = "저기…… 곤란하게\n만들려는 건 아니었어."
10059-410 = "선생님에게\n미움받는 건……\n싫어……"
10059-420 = "하지만… 조금만…\n아주 잠깐이라도 좋으니까…"
10059-430 = "선생님과,\n함께 있고 싶었어……"
10059-2600 = "아… 이렇게 잘해주는 건 기쁘지만…\n이러다가는 돌이킬 수\n없어질 지도 모르는데? 선생님…\n그래도 괜찮아?\n나는… 별로 상관없지만☆"

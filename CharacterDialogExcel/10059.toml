[translation]
10059-10 = "Blue Archive! ☆"
10059-20 = "Don't worry, I, Misono Mika, have finally arrived! Oh, we're already well acquainted, so let's skip the formalities, okay? I'm looking forward to working with you, Sensei."
10059-30 = "Hmm, it's a bit tight...but I think it'll be okay anyway!"
10059-40 = "Hahaha! What's this? So silly!"
10059-50 = "You know, I used to have something like this before..."
10059-60 = "Well, I don't think I'll be bored around here."
10059-70 = "Hm, I guess Sensei isn't around..."
10059-80 = "Sensei! You're back! You kept me waiting, you know!"
10059-90 = "Welcome! Don't worry, I was perfectly well-behaved while you were gone."
10059-100 = "It's a beautiful day, isn't it?"
10059-110 = "It seems like a shame to spend it cooped up inside."
10059-120 = "...If it's all right with you, let's go for a walk after work?"
10059-130 = "Is this how student duty is supposed to be?"
10059-140 = "I mean, I didn't really know what to expect, but..."
10059-150 = "Well... I'm not really bored or anything!"
10059-160 = "If you need help, I'm at your service! You can count on me to do my very best."
10059-170 = "Oh... I see. That's how you look when you're working."
10059-180 = "Happy birthday, Sensei!"
10059-190 = "Should I sing Happy Birthday to you?"
10059-200 = "Huh? Are you embarrassed?"
10059-210 = "Oh... How did you know it was my birthday?"
10059-220 = "Yeah, um... Thanks..."
10059-230 = "Hahaha, it looks like you got me."
10059-240 = "Happy New Year, Sensei!"
10059-250 = "I might not deserve it, but I'm still looking forward to the New Year with you. ☆"
10059-260 = "Tonight is a holy night, Sensei."
10059-270 = "Do you have any plans today?"
10059-280 = "Then, if you don't mind... Let's spend it together."
10059-290 = "Happy Halloween! ☆ Did you hear? Some of the stores have limited-edition accessories that are only available today!"
10059-300 = "We could go shopping, or something like that?"
10059-320 = "...Sensei, I tricked you."
10059-330 = "What should we do now? It looks like we're stuck here until morning."
10059-340 = "You trusted me so easily! Really, Sensei..."
10059-350 = "I told you...so many times not to trust me..."
10059-360 = "Hmm? If you cause a scene here, everyone will find out. Are you sure you want that to happen?"
10059-370 = "Of course, it doesn't matter to me either way."
10059-380 = "What? ...You aren't mad, are you?"
10059-390 = "You should know me by now. You knew I was trouble, Sensei. Didn't you...?"
10059-400 = "Hey... I didn't mean to upset you..."
10059-410 = "...I don't like it when you're mad at me, Sensei..."
10059-420 = "It was harmless fun. Just for a moment..."
10059-430 = "I just wanted to spend one more moment with you, Sensei."
10059-2600 = "I'd never say no to such kindness from you, but this might cross a line. Not that it matters to me, but...Sensei, are you gonna be okay? ☆"

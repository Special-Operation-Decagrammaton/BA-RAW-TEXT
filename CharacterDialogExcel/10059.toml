[translation]
10059-10 = "蔚藍檔案～☆"
10059-20 = "聖園彌香，終於登場～☆的感覺嗎？\n啊，以我和老師的交情，應該不需要破冰活動了吧？\n以後也請你多多指教哦，老師。"
10059-30 = "哼～嗯。\n雖然有點擠…\n不過好像也不錯？"
10059-40 = "啊哈哈！\n這是什麼啊，\n真有趣～☆"
10059-50 = "我以前也有\n和這個類似的\n東西呢…"
10059-60 = "這裡好像\n不會無聊。"
10059-70 = "老師\n不在嗎…"
10059-80 = "老師，歡迎回來！\n我在等你唷！"
10059-90 = "歡迎回來，老師！\n我有乖～乖地看家唷。"
10059-100 = "嗯～今天也是好天氣呢！"
10059-110 = "這種日子只用來工作\n會不會太可惜了？"
10059-120 = "……可以的話，工作結束後\n要不要去散個步呢？"
10059-130 = "那個……值日生\n就是這樣的工作嗎？"
10059-140 = "我，我也不是\n在期待著什麼……"
10059-150 = "唔～嗯……\n雖然不是很無聊……"
10059-160 = "我來幫點忙吧？\n只要交代我，\n我就會努力去做的！"
10059-170 = "嘿……\n老師工作的樣子\n原來是這種感覺啊……"
10059-180 = "生日快樂，老師！"
10059-190 = "要不要幫你唱\n生日快樂歌？"
10059-200 = "咦，會害羞？"
10059-210 = "咦……我的生日，\n原來你知道啊？"
10059-220 = "唔，唔嗯……謝謝你……"
10059-230 = "啊哈哈，被發現了呀。"
10059-240 = "新年快樂，老師！"
10059-250 = "雖然是這樣的我，\n今年也請多多指教哦☆"
10059-260 = "是神聖的夜晚呢，老師。"
10059-270 = "今天有什麼計畫嗎？"
10059-280 = "……可以的話，\n要不要和我一起過呢？"
10059-290 = "萬聖節快樂☆\n好像有賣\n今天限定的飾品唷！"
10059-300 = "一起去購物之類的，\n怎麼樣呀？"
10059-320 = "……老師你，被我騙了唷。"
10059-330 = "怎麼辦呢？\n已經，只能在這裡\n待到早上了唷？"
10059-340 = "居然這麼簡單\n就相信我，\n老師也真是……"
10059-350 = "明明說過那麼多次\n「不要相信我」了……"
10059-360 = "嗯？在這裡吵鬧的話……\n會被大家發現的唷？\n沒關係嗎？"
10059-370 = "……我是，無所謂啦。"
10059-380 = "……咦？\n難道……你生氣了？"
10059-390 = "我是問題兒童這種事，\n老師也很清楚吧……？"
10059-400 = "那個……我不是想\n造成你的困擾。"
10059-410 = "也不想被老師……討厭……"
10059-420 = "但是……一下下……\n真的只要一下下就好……"
10059-430 = "我想，\n跟老師待在一起……"
10059-2600 = "啊……雖然你對我這麼好讓我很開心……\n但是這樣下去的話，\n說不定會變得無法挽回唷？老師。\n……這樣可以嗎？\n我是……無所謂啦☆"

[translation]
26006-20 = "คุณใช่คุณครูที่ฉันคอยส่องกล้องมองรึเปล่านะ...?\nตะ...ตื่นเต้นจังเลยค่ะ!"
26006-30 = "ฮุฮุ\nเจอเฟอร์นิเจอร์สวยๆ แล้ว!"
26006-40 = "มีอะไรอยู่ด้านบนนั้นบ้างนะ...?"
26006-50 = "ถ้าไม่รีบหนีออกไป\nจากห้องเรียนพิเศษ\nแล้วล่ะก็..."
26006-60 = "ทิวทัศน์ของที่นี่\nสวยจังเลยนะคะ~"
26006-70 = "คุณครู~\nอยู่ที่ไหนน้า?"
26006-80 = "ฉันอุตส่าห์คิดว่า\nเดี๋ยวคุณครูก็กลับมานะคะ!"
26006-90 = "ฉันน่ะ...\nคอยจับตาดูคุณครูอยู่นะคะ!"
26006-100 = "เอ๋?\nเมื่อกี้คุณครูยังอยู่ตรงนี้เลย..."
26006-110 = "อ๊ะ! ตกใจหมดเลย!\nมะ... มาตั้งแต่เมื่อไหร่คะ?\nคะ... คุณครูจับตาดูฉันอยู่\nอย่างนั้นเหรอคะ!"
26006-120 = "ฮ่าฮ่า...\nการเฝ้าจับตาดูคุณครูแบบนี้\nสนุกที่สุดแล้วจริงๆ ด้วย"
26006-130 = "ฮุฮุ...\nต่อให้มองหน้าคุณครูตลอดแบบนี้\nฉันก็ไม่เบื่อเลยค่ะ!"
26006-140 = "อึ่ก... ไม่ใช่เรื่องที่\nทำได้กับใครก็ได้หรอกนะคะ"
26006-150 = "พอคิดว่า...\nจักรวาลที่กว้างใหญ่ขนาดไหน"
26006-160 = "มันทำให้ฉันคิดว่า\nชีวิตของคนเรา...\nมันไม่จีรังอะไรเลยค่ะ"
26006-170 = "ฮุฮุ ถ้าได้มีโอกาสไปนอนดู\nท้องฟ้าตอนกลางคืนกับคุณครูบ้าง\nก็คงจะดีนะคะ"
26006-180 = "สุขสันต์วันเกิดค่ะคุณครู"
26006-190 = "ขอให้วันนี้ เจอแต่เรื่องดีๆ\nฉันจะคอยปกป้องคุณครู\nไม่ให้เจอเรื่องไม่ดีเองค่ะ!"
26006-200 = "คุณครูรู้รึเปล่าคะ ในคืนวันเกิด\nของฉัน หากมองขึ้นไปบน\nท้องฟ้าตอนกลางคืน"
26006-210 = "จะมองเห็นดาวฝาแฝดที่อยู่ด้วยกัน\nเคลื่อนผ่านไปทางท้องฟ้าทิศตะวันตก\nด้วยล่ะค่ะ และวันนั้นก็คือ..."
26006-220 = "วันนี้ค่ะ!"
26006-230 = "และปีนี้... ฉันขอให้ได้\nออกไปจากที่นี่ และกลับไป\nที่โรงเรียนสาขา..."
26006-240 = "วิวตอนกลางคืนในวันคริสต์มาส\nถ้ามองจากที่ไกลๆ"
26006-250 = "จะสว่างระยิบระยับสวยงาม\nเหมือนท้องฟ้าตอนกลางคืนเลยค่ะ"
26006-260 = "วันฮาโลวีนปีนี้\nคุณครูจะให้ลูกกวาด\nกับพวกเรามั้ยน้า..."
26006-280 = "อ๊ะ! ดาวตกนี่!\nอ๊ะ... ตรงนั้นก็ด้วย!\nตรงโน้นก็มี...!"
26006-290 = "ดาวตกเต็มฟ้าเลยค่ะ!\nตกลงมาเหมือนสายฝน\nเลยล่ะค่ะ!"
26006-300 = "ได้เห็นวิวสวยๆ แบบนี้กับตา\nมันเหมือนความฝันเลยนะคะ"
26006-310 = "ขอพรเหรอคะ?"
26006-320 = "ไม่ดีกว่าค่ะ...\nวันนี้ไม่ดีกว่าค่ะ"
26006-330 = "การได้ดูวิวสวยๆ แบบนี้\nร่วมกับคนสำคัญ..."
26006-340 = "ถ้าฉันขอพรไปมากกว่านี้\nอาจจะถูกคุณดวงดาว\nโกรธเอาได้…"
26006-350 = "วันนี้... แค่เท่านี้\nฉันก็พอใจแล้วล่ะค่ะ"
26006-2600 = "ขอบคุณค่ะคุณครู!\nฉันจะเก็บรักษาให้ดี\nเหมือนกับกล้องโทรทรรศน์เลยค่ะ!"

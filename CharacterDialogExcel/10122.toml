[translation]
10122-10 = "Blue Archive~ อะฮ่าฮ่า☆"
10122-20 = "มิโซโนะ มิกะ ปรากฏตัวอีกครั้ง~☆ น่าจะประมาณนี้ละนะ\nงั้นครั้งนี้ก็ขอฝากตัวด้วยนะ คุณครู!"
10122-30 = "อะฮ่าฮ่า แปลกจัง~"
10122-40 = "ฮืม~ ทุกคนแวะมา\nที่ชาเล่ต์กันแบบนี้สินะ"
10122-50 = "(แต่ละคนก็คงมี\nเรื่องกังวลของตัวเอง\nเหมือนกับฉันละนะ...)"
10122-60 = "คุณครู\nจะมาเมื่อไรนะ..."
10122-70 = "อันนี้ฉันใช้\nได้หรือเปล่านะ?"
10122-80 = "อ๊ะ! คุณครู!"
10122-90 = "ฉันพร้อมแล้ว!"
10122-100 = "ให้ฉันช่วย\nทำอะไรก่อนดี?"
10122-110 = "กลับมาแล้วเหรอคะคุณ!"
10122-120 = "อาบน้ำก่อนมั้ย?\nหรือจะทานข้าวก่อน?"
10122-130 = "หรือว่า..."
10122-140 = "อะฮะฮ่า\nล้อเล่นล้อเล่น☆"
10122-150 = "ไม่ว่าอะไรก็สั่งมาได้เลย♪"
10122-160 = "แต่ก็ไม่รู้หรอกนะ\nว่าจะทำได้ดีหรือเปล่า☆"
10122-170 = "คุณครูเนี่ย\nสุดยอดไปเลยนะ..."
10122-180 = "งานดูไม่สนุกสักนิด\nแต่ก็ยังตั้งใจทำ..."
10122-190 = "หืม? ทำไมฉันถึง\nใส่ชุดว่ายน้ำน่ะเหรอ?"
10122-200 = "เอ่อ...\nมาถามตรงๆ กันแบบนี้\nฉันก็เขินนะคะ..."
10122-210 = "วันนี้ไม่มีเรื่องอะไรเลยแฮะ~"
10122-220 = "หืม? ฉันไม่ได้\nเบื่อเลยสักนิดนะ?"
10122-230 = "ก็ฉันอยู่\nกับคุณครูแล้วไง♪"
10122-240 = "สงบสุขไว้ก่อนงั้นเหรอ..."
10122-250 = "อืม ก็น่าจะเป็นอย่างนั้นนะ!"
10122-260 = "คุณ ครู!!\nวันนี้วันเกิดใช่มั้ย?"
10122-270 = "ฉันอยากมาบอก\nต่อหน้าอยู่พอดี\nดีจังเลยนะ... ที่ได้เจอกันแบบนี้"
10122-280 = "สุขสันต์วันเกิดนะ!"
10122-290 = "ขอให้เป็นวันที่ยอดเยี่ยมเลยนะ...!"
10122-300 = "ว้าว~ อะฮะฮ่า..."
10122-310 = "วันนี้มีคนติดต่อมา\nเพราะเป็นเวรของฉัน"
10122-320 = "กะไว้... แล้วเชียว"
10122-330 = "ฉันจะไม่ลืมวันนี้เด็ดขาดเลย"
10122-340 = "สวัสดีปีใหม่นะ!\nคุณครู!"
10122-350 = "ปีนี้ฉันจะพยายาม\nให้ไม่แพ้\nคุณครูเลยละ!"
10122-360 = "คุณครู... วันนี้\nเป็นวันอะไรรู้หรือเปล่า...?"
10122-370 = "วันนี้ให้เป็น\nเวรฉันได้เหรอ?"
10122-380 = "หืม...?"
10122-390 = "อ่า จริงเหรอ...?"
10122-400 = "ฮุฮุ... ได้เลย!"
10122-410 = "วันนี้ก็มาพยายามกันเถอะ!\nคุณครู♪"
10122-420 = "วันนี้วันฮาโลวีน!\nคุณครู!"
10122-430 = "ถ้าไม่ให้ลูกกวาดกันละก็~\nโดนแกล้งนะ~?"
10122-440 = "ไม่สิ...! ไม่เห็นต้องระวังตัว\nกันขนาดนั้นก็ได้นี่?"
10122-450 = "ฉันไม่ได้จะหลอกอะไรนะ!"
10122-470 = "เอ่อ... คุณครู"
10122-480 = "ฉัน... ดีใจจัง\nที่ได้มาเห็นวิวแบบนี้\nกับคุณครู"
10122-490 = "ทั้งเรื่องกลุ้มใจ..."
10122-500 = "ทั้งเรื่องกังวลในอนาคต..."
10122-510 = "และความไม่แน่ใจ...\nถึงตอนนี้มันจะยังอยู่"
10122-520 = "แต่พอฉัน..."
10122-530 = "มองท้องฟ้าที่เต็มไปด้วย\nดวงดาวแบบนี้"
10122-540 = "ทุกอย่างมันก็เหมือน...\nเป็นเรื่องเล็กน้อยไปเลยละ"
10122-550 = "ฉันคิดแบบนั้นน่ะ"
10122-560 = "คุณครู\nเคยบอกฉันไว้ว่า"
10122-570 = "ช่วงเวลาในขณะนี้\nจะคอยสนับสนุน..."
10122-580 = "ตัวฉันในอนาคตไปเรื่อยๆ\nอื้อ"
10122-590 = "เพราะงั้น..."
10122-600 = "ฉันเองก็จะมีความสุขขึ้นนะ"
10122-2600 = "อันนี้... ให้ฉันเหรอ? โกหกน่า~!\nหืม... จริงเหรอ?\nเฮ้อ... คุณครูเนี่ยไม่ไหวเลยจริงๆ\nชอบทำหน้าไม่รู้ไม่ชี้อยู่เรื่อยเลย\nแบบนี้ไม่ได้สิ... ฉันก็อยากตอบแทนอะไรบ้างนะ..."

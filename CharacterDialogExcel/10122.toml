[translation]
10122-10 = "蔚藍檔案～啊哈哈☆"
10122-20 = "聖園彌香，穿上泳裝再次登場～☆的感覺嗎？\n接下來也請多指教囉，老師！"
10122-30 = "啊哈哈，真奇怪～"
10122-40 = "哼嗯～大家是\n這樣來夏萊的啊。"
10122-50 = "（大家想必也有\n煩惱吧。就像\n我一樣……）"
10122-60 = "老師，\n什麼時候會來呢～"
10122-70 = "這個，摸摸看\n應該沒問題吧……？"
10122-80 = "啊！老師！"
10122-90 = "我已經準備好了唷！"
10122-100 = "要從哪裡幫忙好呢？"
10122-110 = "歡迎回來，\n親．愛．的！"
10122-120 = "要先洗澡？\n還是先吃飯？"
10122-130 = "還是說──"
10122-140 = "鬧你玩的啦。\n開個玩笑開個玩笑☆"
10122-150 = "任何事都交給我吧♪"
10122-160 = "雖然能不能做好\n我也不知道就是了☆"
10122-170 = "老師你，果然\n很厲害呢……"
10122-180 = "工作明明一點也不有趣，\n卻還這麼努力……"
10122-190 = "……問我為什麼穿著泳裝？"
10122-200 = "這……突然被\n這樣問，還真\n讓人害羞呢……"
10122-210 = "今天什麼事都沒有呢～"
10122-220 = "咦，一點也\n不無聊唷？"
10122-230 = "畢竟是跟老師\n在一起嘛♪"
10122-240 = "和平最棒啊……"
10122-250 = "說的也是！"
10122-260 = "老師！今天是\n你生日對吧？"
10122-270 = "因為想要直接當面對你說，\n能這樣見面……真是太好了。"
10122-280 = "祝你生日快樂！"
10122-290 = "希望今天能成為\n非常美好的一天……！"
10122-300 = "哎呀～啊哈哈……"
10122-310 = "今天，接到是我當\n值日生的聯絡之後……"
10122-320 = "就想說……\n會不會是這樣了。"
10122-330 = "今天的事，\n我永遠不會忘記的。"
10122-340 = "新年快樂～！\n老師！"
10122-350 = "今年，為了不輸\n給老師的努力，\n我也會加油的！"
10122-360 = "老師……知道今天\n是什麼日子嗎……？"
10122-370 = "今天的值日生，\n是我沒關係嗎？"
10122-380 = "……咦？"
10122-390 = "那是真的嗎……？"
10122-400 = "……呵呵。\n好～！"
10122-410 = "今天也加油吧！\n老師♪"
10122-420 = "今天是萬聖節唷！\n老師！"
10122-430 = "不給糖的話～\n就要搗蛋囉～？"
10122-440 = "……不是！\n沒必要那麼警戒吧？"
10122-450 = "真的沒有任何陷阱啦！"
10122-470 = "那個，老師。"
10122-480 = "我……能跟老師一起看見\n這片景色，真是太好了。"
10122-490 = "雖然擔心的事情……"
10122-500 = "對未來的煩惱……"
10122-510 = "還有不安……\n都依然存在。"
10122-520 = "不過……"
10122-530 = "當我看著這片星空……"
10122-540 = "就會有種一切好像都只是\n微不足道的小事……"
10122-550 = "這樣的感覺。"
10122-560 = "老師，你之前\n跟我說過對吧。"
10122-570 = "現在的這個瞬間，\n將來也會一直……"
10122-580 = "支撐著我。"
10122-590 = "所以……"
10122-600 = "我也會，變得幸福的。"
10122-2600 = "要把這個……給我？騙人～！\n……咦，真的嗎？\n吼唷……老師真的很狡猾耶。\n總是用若無其事的表情做出這種事情。\n這樣犯規啦……要是我也能回敬就好了……"

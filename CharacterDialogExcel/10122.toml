[translation]
10122-10 = "Blue Archive! Ahaha! ☆"
10122-20 = "Once more, I, Misono Mika, have arrived! Looking forward to working with you again, Sensei! ☆"
10122-30 = "Ahaha, so weird!"
10122-40 = "Hm, so everyone takes turns visiting Schale like this."
10122-50 = "(They must all have their own worries, right? Just like me...)"
10122-60 = "I wonder when Sensei will get here..."
10122-70 = "Can I use this?"
10122-80 = "Ah! Sensei!"
10122-90 = "I'm ready!"
10122-100 = "What should I help out with first?"
10122-110 = "Welcome back, daaah-ling!"
10122-120 = "Would you like a bath? Dinner first?"
10122-130 = "Or..."
10122-140 = "Ahaha, just kidding! ☆"
10122-150 = "Just leave it to me! ♪"
10122-160 = "I can't guarantee I'll do a good job, though! ☆"
10122-170 = "You really are amazing, Sensei..."
10122-180 = "You work so hard...on super-boring stuff..."
10122-190 = "Hm? Why am I wearing a swimsuit?"
10122-200 = "Uhm... Now that you're asking, it's embarrassing..."
10122-210 = "Nothing's going on today..."
10122-220 = "Eh? I'm actually not bored at all, though."
10122-230 = "It must be because I'm with you, Sensei! ♪"
10122-240 = "Peace above all, they say..."
10122-250 = "Sure! I guess that makes sense!"
10122-260 = "Senseiii! It's your birthday, right?"
10122-270 = "I wanted to tell you this in person. I'm really happy...that we met."
10122-280 = "Happy birthday!"
10122-290 = "I hope you have the best day!"
10122-300 = "Wow... Ahaha..."
10122-310 = "I was told that I'm on Student Rep duty today."
10122-320 = "At first, I was like, no way!"
10122-330 = "I'll always remember today!"
10122-340 = "Happy New Year! Sensei!"
10122-350 = "This year, I'll work hard just as you do, Sensei!"
10122-360 = "Sensei... Do you know what day it is?"
10122-370 = "Are you really okay with me being the Student Rep today?"
10122-380 = "...Huh?"
10122-390 = "Um, really...?"
10122-400 = "...Fufu. Got it!"
10122-410 = "Let's do our best today too, Sensei! ♪"
10122-420 = "It's Halloween, Sensei!"
10122-430 = "If you don't give me treats... I'll pull a trick! Got it?"
10122-440 = "Hold up! You don't have to be THAT nervous! ...Do you?"
10122-450 = "I have no tricks or ulterior motives!"
10122-470 = "Um, Sensei."
10122-480 = "I'm...glad that I was able to watch this scenery with you."
10122-490 = "Concerns..."
10122-500 = "Worries..."
10122-510 = "The anxiety... It's still there."
10122-520 = "But still..."
10122-530 = "When I stare at the sky full of stars like this..."
10122-540 = "...perhaps it's all trivial."
10122-550 = "That's what it feels like."
10122-560 = "Sensei, you told me this before."
10122-570 = "That this exact moment will continue to..."
10122-580 = "...hold me in the future. Yeah."
10122-590 = "So..."
10122-600 = "I'll be happy too."
10122-2600 = "This is...for me? You're kidding! Seriously? *sigh* You're so unfair, Sensei. You always do this kind of stuff like it's nothing. It's just not fair... I really wanted to repay you for everything..."

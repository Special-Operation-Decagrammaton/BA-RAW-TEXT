[translation]
10122-10 = "블루아카이브~ 아하하☆"
10122-20 = "미소노 미카, 다시 한번 등장~☆ 같은 느낌이려나.\n그럼, 이번에도 잘 부탁해. 선생님!"
10122-30 = "아하핫, 이상해~"
10122-40 = "흐응~ 다들 이런 식으로\n샬레를 방문하는구나."
10122-50 = "(다들 자기만의 고민이\n있겠지? 나처럼…….)"
10122-60 = "선생님,\n언제 오려나……."
10122-70 = "이거, 내가 써도\n되는 걸까?"
10122-80 = "앗! 선생님!"
10122-90 = "난 준비 됐어!"
10122-100 = "뭐부터\n도와주면 될까?"
10122-110 = "다녀오셨어요, 다.앙.신!"
10122-120 = "목욕부터?\n식사부터?"
10122-130 = "아니면―"
10122-140 = "아하하,\n농담농담☆"
10122-150 = "뭐든 맡겨달라구♪"
10122-160 = "뭐, 잘 해낼지는\n모르겠지만☆"
10122-170 = "선생님은 역시\n대단하네……."
10122-180 = "일, 전혀 재미없는데도\n열심히 하고……."
10122-190 = "응? 왜 수영복을\n입고 있냐고?"
10122-200 = "어……\n이렇게 정식으로\n물으니 부끄럽네……."
10122-210 = "오늘,\n별일 없네~"
10122-220 = "에, 전혀\n지루하지 않은데?"
10122-230 = "선생님이랑\n함께 있잖아♪"
10122-240 = "평화 제일인가……."
10122-250 = "뭐어, 그럴지도!"
10122-260 = "선.생.님!!\n오늘 생일이지?"
10122-270 = "직접 얼굴을 보면서\n말하고 싶었어.\n이렇게 만나서…… 다행이야."
10122-280 = "생일 축하해!"
10122-290 = "멋진 하루가 되길……!"
10122-300 = "이야~ 아하하……"
10122-310 = "오늘 당번이라고\n연락받아서 말이야."
10122-320 = "설마……. 했지."
10122-330 = "오늘 일은 절대 잊지 않을게."
10122-340 = "새해 복 많이 받아!\n선생님!"
10122-350 = "올해는 선생님에게\n지지 않을 정도로\n열심히 할게!"
10122-360 = "선생님…… 오늘이\n무슨 날인지 알고 있어……?"
10122-370 = "오늘 당번,\n나로 괜찮아?"
10122-380 = "……응?"
10122-390 = "그, 정말이야……?"
10122-400 = "……후훗. 좋아!"
10122-410 = "오늘도 열심히 해보자!\n선생님♪"
10122-420 = "오늘은 할로윈이야!\n선생님!"
10122-430 = "과자를 주지 않으면~,\n장난친다~?"
10122-440 = "……아니! 그렇게 경계하지\n않아도 되지 않아?"
10122-450 = "속임수도 장치도 없으니까!"
10122-470 = "저기, 선생님."
10122-480 = "나…… 이런 광경을\n선생님과 볼 수 있어서\n다행이야."
10122-490 = "걱정거리도……"
10122-500 = "앞으로의 고민도……"
10122-510 = "불안함도……\n아직은, 남아 있어."
10122-520 = "그래도……"
10122-530 = "이렇게 별이 가득한\n하늘을 보고 있으면,"
10122-540 = "……전부, 사소한 게\n아닐까 하고."
10122-550 = "그런 생각이 들어."
10122-560 = "선생님,\n말해 줬었지."
10122-570 = "지금의 이 순간이,\n앞으로도 계속……"
10122-580 = "나를 지탱해 줄 거라고.\n응."
10122-590 = "그러니까……"
10122-600 = "나도, 행복해질 거야."
10122-2600 = "이걸…… 내게? 거짓말~!\n……에, 정말로?\n하아…… 선생님, 정말 치사하네.\n항상 시치미 뗀 얼굴로 이런다니까.\n반칙이라구…… 나도 뭔가 보답하고 싶은데………"

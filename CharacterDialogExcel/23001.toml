[translation]
23001-20 = "급양부의 후우카입니다.\n먹고 싶은 음식이 있다면 언제든 말씀해주세요."
23001-30 = "여기서도 요리를\n할 수 있을까?"
23001-40 = "오늘 저녁은\n뭘 하지…"
23001-50 = "재료가\n모자라겠는 걸."
23001-60 = "슈퍼에 들려야\n할 지도…"
23001-70 = "요리를 시작해 볼까."
23001-80 = "수고하셨습니다!\n따뜻한 식사를\n준비해놨는데,\n지금 드실래요?"
23001-90 = "선생님, 계란은\n반숙이 좋으세요?\n써니사이드 업?\n아니면 계란말이로?"
23001-100 = "끼니는 제때 챙겨 먹고 있는 거예요?\n뭐라도 해드릴까요?"
23001-110 = "모두에게 요리를 해주는 거,\n힘들지만 괜찮아요."
23001-120 = "아하하…\n신경 써 주시는 거예요?"
23001-130 = "좋아하는 음식,\n궁금해요."
23001-140 = "응?\n왜냐구요?"
23001-150 = "비밀이에요!"
23001-160 = "음…, 좀 더 선생님이\n기운 날 만한 음식이\n뭐가 있을까나…"
23001-170 = "선생님,\n생일 축하드려요."
23001-180 = "오늘 같은 날에는\n더 특별한 걸 먹어야겠지만…"
23001-190 = "저기, 괘… 괜찮다면\n제가 선생님의 생일 음식을\n만들어도 될까요?"
23001-200 = "어라… 제 생일요?"
23001-210 = "아, 아하하…\n언제나 다른 사람의\n생일을 신경쓰기만 해서…"
23001-220 = "…기뻐요.\n고맙습니다."
23001-230 = "새로운 한 해가 시작되네요!"
23001-240 = "떡국을 만들어볼까 하는데,\n괜찮으세요?"
23001-250 = "크리스마스…"
23001-260 = "특별한 저녁 식사를\n만들어볼까 하는데…"
23001-270 = "무, 물론 선생님이\n괜찮으시다면요!"
23001-280 = "호박 스프라든가,\n호박 파이라든가,\n호박죽이라든가,"
23001-290 = "만들 수 있는 것들은\n전부 만들어볼까 해요."
23001-300 = "할로윈이잖아요?\n선생님은 어떤 걸\n좋아하시나요?"
23001-320 = "이럴 줄 알았어요.\n또 인스턴트만 드신 거죠?"
23001-330 = "안돼요, 식사는 제대로\n챙겨서 드셔야죠."
23001-340 = "제가 금방 해드릴 테니까,\n조금만 기다려주세요."
23001-350 = "정말이지, 건강을 챙기지 않는 건\n선생님의 나쁜 버릇이라구요."
23001-360 = "네? 매, 매일 제가 만드는 음식을\n먹고 싶다고요?"
23001-370 = "아, 아하하…\n서, 선생님이 괜찮다면…\n저는 상관은 없는데…"
23001-2600 = "아하하…\n이런 지원은 익숙하지 않지만,\n선생님께 도움이 될 수 있도록\n최선을 다할게요."

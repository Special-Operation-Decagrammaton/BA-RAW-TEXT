[translation]
23001-20 = "我是供給部的風華。\n如果有什麼想吃的，歡迎隨時告訴我。"
23001-30 = "這裡也可以\n料理嗎？"
23001-40 = "今天的晚餐\n該煮什麼呢…"
23001-50 = "這樣的話，\n食材可能不夠。"
23001-60 = "可能得跑\n一趟超市才行…"
23001-70 = "開始料理吧。"
23001-80 = "辛苦了！\n我準備了\n熱騰騰的食物，\n要現在吃嗎？"
23001-90 = "老師，你喜歡\n半熟蛋嗎？\n太陽蛋？\n還是蛋捲呢？"
23001-100 = "有好好吃飯嗎？\n要不要幫你做點吃的？"
23001-110 = "雖然幫所有人準備料理很累，\n但是沒關係。"
23001-120 = "啊哈哈…\n你在替我擔心嗎？"
23001-130 = "想知道你\n喜歡吃的東西。"
23001-140 = "嗯？\n你問我為什麼？"
23001-150 = "是祕密！"
23001-160 = "唔嗯…能讓老師\n更有精神的那種料理，\n該做什麼好呢…"
23001-170 = "老師，\n祝你生日快樂。"
23001-180 = "雖然像今天這種日子\n應該要吃更特別的東西…"
23001-190 = "那個，可…可以的話，\n可以讓我幫老師\n準備生日的料理嗎？"
23001-200 = "咦…我的生日嗎？"
23001-210 = "啊，啊哈哈…\n一直以來，我都\n只在意別人的生日…"
23001-220 = "…我很開心。\n非常感謝。"
23001-230 = "新的一年開始了呢！"
23001-240 = "我想煮年糕湯，\n你覺得怎麼樣呢？"
23001-250 = "聖誕節…"
23001-260 = "我想準備\n特別的晚餐…"
23001-270 = "當，當然，\n如果老師你不介意的話！"
23001-280 = "南瓜濃湯、\n南瓜派、\n南瓜焗烤之類的，"
23001-290 = "我想把能做的料理\n全部都做做看。"
23001-300 = "畢竟是萬聖節嘛！\n老師喜歡\n什麼種類的料理呢？"
23001-320 = "我就知道是這樣。\n你又只吃速食品了，對吧？"
23001-330 = "不行，一定要按時\n好好吃飯。 "
23001-340 = "我馬上幫你準備，\n請稍等。"
23001-350 = "真是的，不注意健康\n是老師的壞習慣唷。"
23001-360 = "咦？你，你說想要每天都吃\n我做的食物嗎？"
23001-370 = "啊，哈哈…\n只，只要老師好…\n我都沒關係…"
23001-2600 = "啊哈哈……\n雖然我不習慣這種支援，\n但是為了能幫得上老師的忙，\n我會全力以赴的。"

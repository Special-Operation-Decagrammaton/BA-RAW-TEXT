[translation]
23001-20 = "I'm Fuuka from the School Lunch Club. Let me know if you're hungry. I'll whip something up for you."
23001-30 = "Is it all right if I use your kitchen?"
23001-40 = "What would you like for dinner?"
23001-50 = "We're running low on ingredients."
23001-60 = "Maybe I should stop by the grocery store."
23001-70 = "Let's get cooking."
23001-80 = "Good work out there! I made you dinner and it's still warm. Would you like me to serve it to you?"
23001-90 = "How do you like your eggs, Sensei? Soft-boiled? Sunny-side up? How about a rolled omelet?"
23001-100 = "I hope you're not skipping meals! Do you want me to make something for you?"
23001-110 = "Cooking for everyone is hard work, but I'll be okay."
23001-120 = "Ahaha... Are you worried about me?"
23001-130 = "I'm curious. What kind of food do you like?"
23001-140 = "Huh? Why am I asking?"
23001-150 = "That's a secret!"
23001-160 = "Hmm. I wonder what kind of foods would be the best for your health..."
23001-170 = "Happy birthday, Sensei."
23001-180 = "Today is a special occasion, so you should eat something nice."
23001-190 = "U-Um, if it's okay, can I make you something for your birthday?"
23001-200 = "Oh... My birthday?"
23001-210 = "A-Ahaha... I'm better at remembering other people's."
23001-220 = "It's sweet you remembered. It makes me happy."
23001-230 = "A new year has arrived!"
23001-240 = "I was gonna make some rice cake soup. Is that okay with you?"
23001-250 = "Christmas..."
23001-260 = "I'm thinking of making a special dinner."
23001-270 = "B-But only if you're okay with it!"
23001-280 = "Pumpkin soup, pumpkin pie, pumpkin porridge..."
23001-290 = "I'm planning to make everything I can."
23001-300 = "It's Halloween, right? What kinds of treats do you like, Sensei?"
23001-320 = "I knew it. You've been eating frozen food again!"
23001-330 = "They're not good for you. You have to think about your health."
23001-340 = "Making something better won't even take long, so just wait a moment."
23001-350 = "Seriously, Sensei. Your worst habit is the way you ignore your health."
23001-360 = "Huh? You want me to cook for you every day?"
23001-370 = "Oh, hahaha. I... If you really want me to, I don't mind..."
23001-2600 = "Hahaha... I'm not used to this kind of support, but I will do my best to be of service, Sensei."

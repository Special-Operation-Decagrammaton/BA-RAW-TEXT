[translation]
23001-20 = "ฟูกะจากชมรมโภชนาการค่ะ\nถ้ามีอาหารที่อยากกินล่ะก็ บอกฉันได้ตลอดเลยนะคะ"
23001-30 = "ที่นี่เองก็...\nทำอาหารได้รึเปล่านะ?"
23001-40 = "มื้อเย็นวันนี้\nทำอะไรดีน้า..."
23001-50 = "สงสัยว่า\nวัตถุดิบจะไม่พอแล้วล่ะมั้ง"
23001-60 = "อาจจะต้องแวะไป\nร้านขายของก็ได้..."
23001-70 = "มาเริ่มทำอาหารกันเลยดีกว่า~"
23001-80 = "เหนื่อยมั้ยคะคุณครู?\nฉันเตรียมอาหารร้อนๆ เอาไว้ให้แล้ว\nจะทานเลยมั้ยคะ?"
23001-90 = "คุณครูคะ ชอบไข่ดาวสุกแค่ไหนคะ?\nให้ทอดแค่ด้านเดียว?\nหรือว่าให้ทำไข่ม้วนด้วยดีคะ?"
23001-100 = "คุณครูทานอาหารตรงเวลาหรือเปล่าคะ?\nให้ฉันทำอะไรให้ทานมั้ยคะ?"
23001-110 = "การทำอาหารให้ทุกคนได้ทาน\nถึงจะเหนื่อยอยู่บ้าง แต่ก็สบายมากค่ะ"
23001-120 = "แหะๆ เป็นห่วงฉันเหรอคะ?"
23001-130 = "ฉันอยากรู้...\nว่าคุณครูชอบทานอะไรค่ะ"
23001-140 = "หืม? ทำไมน่ะเหรอคะ?"
23001-150 = "ความลับ!"
23001-160 = "อืม... อาหารที่จะเพิ่มพลังให้คุณครู\nจะมีอะไรบ้างน้า..."
23001-170 = "คุณครูคะ\nสุขสันต์วันเกิดค่ะ"
23001-180 = "ในวันแบบนี้ควรจะต้อง\nทานอะไรที่พิเศษหน่อยสิคะ..."
23001-190 = "คือว่า... ถ้าคุณครูไม่ว่าอะไร\nให้ฉันทำอาหารฉลองวันเกิด\nให้คุณครูได้มั้ยคะ?"
23001-200 = "เอ๋? วันนี้วันเกิดฉันเหรอคะ?"
23001-210 = "อ่ะฮะฮะฮะ... ฉันมัวแต่สนใจ\nจำวันเกิดของคนอื่นน่ะค่ะ..."
23001-220 = "ดีใจจังที่คุณครูจำได้ ขอบคุณนะคะ"
23001-230 = "เริ่มปีใหม่แล้วค่ะ!"
23001-240 = "ฉันว่าจะทำซุปเค้กข้าวค่ะ\nคุณครูคิดว่าไงคะ?"
23001-250 = "เมอร์รี คริสต์มาส...."
23001-260 = "ฉันคิดว่า\nจะทำมื้อเย็นสุดพิเศษน่ะค่ะ..."
23001-270 = "นะ...แน่นอนว่า...\nถ้าคุณครูโอเคนะคะ!"
23001-280 = "ซุปฟักทอง\nหรือพวกพายฟักทอง\nหรือจะโจ๊กฟักทองก็ดี..."
23001-290 = "ฉันว่าจะทำอาหารทุกชนิด\nที่ทำได้เลยล่ะค่ะ"
23001-300 = "ก็วันฮาโลวีนทั้งทีนี่คะ\nแล้วคุณครู\nชอบแบบไหนเหรอคะ?"
23001-320 = "คิดแล้วเชียว ทานแต่อาหาร\nสำเร็จรูปอีกแล้วเหรอคะ?"
23001-330 = "ไม่ได้นะคะ ต้องกินอาหาร\nให้ถูกสุขลักษณะนะคะ"
23001-340 = "เดี๋ยวฉันจะทำอาหารให้เอง\nรอสักครู่นะคะ"
23001-350 = "จริงๆ เลยเชียว ไม่ดูแลสุขภาพแบบนี้\nจะติดเป็นนิสัยที่ไม่ดีนะคะ"
23001-360 = "คะ? ยะ...อยากกินอาหารที่ฉัน\nทำให้ทุกวันเหรอคะ?!"
23001-370 = "อ่า ฮะฮะฮะ...\nถะ...ถ้าคุณครูโอเคล่ะก็...\nถ้างั้น ฉันจะทำให้ทานเองค่ะ"
23001-2600 = "ฮะฮ่ะฮ่า... ฉันไม่ค่อยชิน\nกับการสนับสนุนนี้เท่าไร แต่จะพยายาม\nให้เต็มที่ เพื่อเป็นประโยชน์ให้คุณครูค่ะ"

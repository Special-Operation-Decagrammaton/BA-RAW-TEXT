[translation]
20023-10 = "蔚藍檔案。"
20023-20 = "我是女武神警察學園公安局的局長尾刃環奈。\n要審問犯罪者的話，請交給我。"
20023-30 = "這裡的咖啡…\n味道真不錯。"
20023-40 = "好累…"
20023-50 = "這種地方居然有\n兔子偵探系列的\n新作…？"
20023-60 = "唔，防衛室\n傳來了聯絡……"
20023-70 = "希望今天奇普托斯\n也能很和平。"
20023-80 = "恭候多時了，老師。"
20023-90 = "如果需要公安局\n的力量，請隨時告知。"
20023-100 = "…有事件嗎？"
20023-110 = "請稍等。\n我這就去發行搜查令。"
20023-120 = "要讓公安局出動\n需要很多文件……"
20023-130 = "我偶爾會羨慕夏萊\n能夠迅速地進行應對。"
20023-140 = "當然，我並沒有\n能夠背負這些的\n能力與權限……"
20023-150 = "我想去泡點咖啡…\n老師也要喝嗎？"
20023-160 = "生活安全局的孩子們\n是很優秀的警察…"
20023-170 = "但要擔任重大案件\n的負責人還太早了。"
20023-180 = "我並不喜歡甜甜圈。\n因為手會弄髒。"
20023-190 = "狂犬這個綽號…"
20023-200 = "那個…因為很羞恥，\n請盡量別在別人面前\n這樣叫我。"
20023-210 = "今天是您的生日呀。\n恭喜您。"
20023-220 = "身為女武神警察學園的\n在籍人員，"
20023-230 = "我沒辦法直接\n送禮物給您……"
20023-240 = "不介意的話，\n我請您去我常去的店裡吃飯吧。"
20023-250 = "啊…今天是我的生日啊。"
20023-260 = "雖然一早就被\n局裡的人們恭喜…"
20023-270 = "我誤以為是在祝賀\n昨天順利逮捕\n犯人的事情了。"
20023-280 = "祝您新年快樂。"
20023-290 = "今年要是能\n少在搜查中碰面\n就好了呢。"
20023-300 = "……難道，您今天也要加班？"
20023-310 = "很遺憾，\n我今天也得值班。"
20023-320 = "……難得的聖誕節。"
20023-330 = "別喝黑咖啡，改喝\n香甜的拿鐵怎麼樣呢？"
20023-340 = "我這就去拿。"
20023-350 = "萬聖節……"
20023-360 = "又回到會拖慢搜查\n的麻煩時期了呢。"
20023-370 = "如果變裝隊伍中\n混入了犯人，"
20023-380 = "比對照片的難度\n就會大大提升…"
20023-390 = "真傷腦筋。"
20023-410 = "沒想到老師會來\n這種路邊攤……"
20023-420 = "真是出乎我的意料…"
20023-430 = "是嗎？"
20023-440 = "我在這裡\n最能放鬆。"
20023-450 = "就算是大家害怕的\n不眠不休的公安局的局長…"
20023-460 = "…也是需要，\n能夠卸下鎧甲的地方。"
20023-470 = "所以今天，"
20023-480 = "如果您能當作\n沒看見的話，我會很感激的。"
20023-2600 = "這麼說來，我曾經因為\n無法操縱這把槍而費了一番功夫。\n到了熟悉這把槍的現在，\n卻幾乎沒有機會使用，真是遺憾……"

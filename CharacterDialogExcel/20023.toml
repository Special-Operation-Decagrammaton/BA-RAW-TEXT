[translation]
20023-10 = "블루 아카이브."
20023-20 = "발키리 경찰학교, 공안국의 국장 오가타 칸나입니다.\n범죄자의 심문이라면 맡겨주십시오."
20023-30 = "이곳의 커피는\n향이 제법 괜찮은 걸."
20023-40 = "피곤하군…"
20023-50 = "이런 곳에\n탐정토끼 시리즈의\n신작이…?"
20023-60 = "윽, 방위실로부터\n연락이…"
20023-70 = "오늘도 키보토스가\n평화롭기를."
20023-80 = "기다리고 있었습니다, 선생님."
20023-90 = "공안국의 힘이\n필요하시다면, 언제든지."
20023-100 = "…사건입니까?"
20023-110 = "잠시만 기다려주십시오.\n곧 영장을 청구해 오겠습니다."
20023-120 = "공안국의 출동에는\n필요한 서류가 많다보니,"
20023-130 = "가끔은 샬레의 신속한 대응이\n부러울 때도 있습니다."
20023-140 = "물론 제게는 이를 책임질 능력도\n권한도 없습니다만…"
20023-150 = "커피를 내려오려 합니다만…\n선생님께서도 드시겠습니까?"
20023-160 = "생활안전국의 아이들은\n좋은 경찰이긴 합니다만…"
20023-170 = "중범죄의 무게를 짊어지기에는\n아직 너무 무르지요."
20023-180 = "도넛은 그리 좋아하지 않습니다.\n손이 더러워지니까요."
20023-190 = "미친개라는 별명은…"
20023-200 = "그… 부끄러우니 가급적\n다른 사람들 앞에서는\n부르지 말아주셨으면 합니다."
20023-210 = "오늘이 생일이셨군요.\n축하드립니다."
20023-220 = "발키리 경찰학교의\n공직자로서"
20023-230 = "직접 선물을 드리기는\n어렵습니다만…"
20023-240 = "혹시 괜찮으시다면\n단골 가게에서 한 턱 내지요."
20023-250 = "아… 오늘이 제 생일이었군요."
20023-260 = "국원들이 아침부터\n축하한다고 인사를 건네기에,"
20023-270 = "어제 체포한\n범죄자의 이야기인줄\n착각하고 있었습니다."
20023-280 = "새해 복 많이 받으시길."
20023-290 = "올해는 수사 업무로\n얼굴을 뵙는 일은\n적었으면 좋겠군요."
20023-300 = "…설마 오늘도 야근이십니까?"
20023-310 = "유감스럽게도\n저도 오늘은 당직입니다."
20023-320 = "…모처럼의 크리스마스니"
20023-330 = "블랙 커피 대신\n달콤한 라떼는 어떠십니까?"
20023-340 = "바로 준비해 오겠습니다."
20023-350 = "할로윈이라…"
20023-360 = "수사를 지연시키는\n골치 아픈 시기가 돌아왔군요."
20023-370 = "가장 행렬 속에\n범죄자가 섞여버리면"
20023-380 = "몽타주를 대조하기가\n어려워지기 때문에…"
20023-390 = "골치가 아픕니다."
20023-410 = "선생님께서 이런\n포장마차에 오실 줄이야…"
20023-420 = "예상 밖이로군요."
20023-430 = "그렇습니까?"
20023-440 = "저는 이 장소가\n가장 편하게 느껴집니다."
20023-450 = "모두가 두려워하는 불휴의\n공안국 국장이라도…"
20023-460 = "…갑옷을 벗어 둘\n장소 정도는 필요하니까요."
20023-470 = "그러니 오늘은."
20023-480 = "못 본 것으로\n해주시면 감사하겠습니다."
20023-2600 = "그러고보면 이 총을 제대로 다루지 못해\n애를 먹던 시절도 있었지요.\n정작 총에 익숙해진 지금은\n사용할 때가 거의 없는 것이 유감입니다만…"

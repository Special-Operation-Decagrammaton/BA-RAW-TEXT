[translation]
20023-10 = "Blue Archive"
20023-20 = "หัวหน้ากรมความมั่นคงสาธารณะ สถาบันวัลคิรี่\nโอกาตะ คันนะค่ะ ถ้าเป็นเรื่องสอบสวนอาชญากรละก็\nให้เป็นหน้าที่ฉันได้เลยค่ะ"
20023-30 = "กาแฟของที่นี่\nกลิ่นหอมใช้ได้เลยนะ"
20023-40 = "เหนื่อยจัง..."
20023-50 = "ในที่แบบนี้...\nมีผลงานใหม่ของซีรีส์\nกระต่ายนักสืบด้วย...?"
20023-60 = "อึก... มีสายเข้า\nจากสำนักป้องกัน..."
20023-70 = "วันนี้ก็ขอให้\nคิโวทอสสงบสุขนะ"
20023-80 = "กำลังรออยู่เลยค่ะ คุณครู"
20023-90 = "หากต้องการใช้อำนาจของ\nกรมความมั่นคงสาธารณะ\nก็บอกฉันได้ตลอดเลยนะคะ"
20023-100 = "เกิดเหตุอะไรงั้นเหรอคะ?"
20023-110 = "รอสักครู่นะคะ\nฉันจะไปขอหมายเรียกมาให้ค่ะ"
20023-120 = "การออกปฏิบัติการของ\nกรมความมั่นคงสาธารณะ\nต้องใช้เอกสารเยอะมาก"
20023-130 = "บางครั้งฉันก็รู้สึกอิจฉาชาเล่ต์\nที่ออกปฏิบัติการได้อย่างรวดเร็ว\nอยู่เหมือนกันค่ะ"
20023-140 = "ถึงฉันจะยังไม่มีอำนาจ\nและความสามารถที่จะรับผิดชอบ\nได้ถึงขนาดนั้นก็เถอะ..."
20023-150 = "ฉันกำลังจะไปเติมกาแฟค่ะ...\nคุณครูจะรับด้วยมั้ยคะ?"
20023-160 = "พวกเด็กๆ ที่สำนักรักษาความปลอดภัย\nเป็นตำรวจที่ดีนะคะ..."
20023-170 = "แต่ก็ยังคงห่างไกลที่จะรับผิดชอบ\nความหนักหนาของอาชญากรรม\nที่ร้ายแรงอยู่ค่ะ"
20023-180 = "ฉันไม่ได้ชอบโดนัทขนาดนั้นหรอกค่ะ\nมันทำให้มือเลอะน่ะค่ะ"
20023-190 = "ชื่อเล่น \"หมาบ้า\" เนี่ย..."
20023-200 = "มันน่าอายนะคะ เพราะงั้น\nถ้าเป็นไปได้ เวลาอยู่ต่อหน้า\nคนอื่น ก็อย่าเรียกแบบนั้นนะคะ"
20023-210 = "วันนี้เป็นวันเกิดของคุณครูสินะคะ\nสุขสันต์วันเกิดค่ะ"
20023-220 = "ในฐานะเจ้าหน้าที่\nของสถาบันฝึกตำรวจวัลคิรี่"
20023-230 = "ฉันคงให้ของขวัญคุณครู\nได้ลำบากนิดหน่อย..."
20023-240 = "ถ้าคุณครูสะดวกละก็...\nฉันจะพาไปเลี้ยงที่ร้านประจำค่ะ"
20023-250 = "อา... วันนี้เป็นวันเกิดฉันสินะคะ"
20023-260 = "พวกเจ้าหน้าที่\nมาแสดงความยินดีตั้งแต่เช้า..."
20023-270 = "ฉันดันเข้าใจผิดไปว่า\nพวกนั้นหมายถึงเรื่องที่\nจับคนร้ายได้เมื่อวานน่ะค่ะ"
20023-280 = "ขอให้มีความสุขในวันปีใหม่ค่ะ"
20023-290 = "หวังว่าปีนี้เราจะได้พบกัน\nเพราะเรื่องการสอบสวน\nน้อยลงนะคะ"
20023-300 = "...วันนี้ก็ทำงานดึกอีกเหรอคะ?"
20023-310 = "น่าเศร้านะคะ...\nวันนี้ฉันต้องเข้าเวรเหมือนกันค่ะ"
20023-320 = "...วันนี้เป็นวันคริสต์มาส"
20023-330 = "ดื่มกาแฟหวานๆ อย่างลาเต้\nแทนกาแฟดำดีมั้ยคะ?"
20023-340 = "ฉันจะไปเตรียมมาให้ค่ะ"
20023-350 = "ฮาโลวีน..."
20023-360 = "เทศกาลน่าปวดหัว\nที่ทำให้การสอบสวนล่าช้า\nกลับมาอีกแล้วสินะคะ"
20023-370 = "ถ้าเกิดมีคนร้ายปะปนมา\nในขบวนแฟนซีละก็..."
20023-380 = "จะจับภาพคนร้าย\nได้ยากขึ้นอีก..."
20023-390 = "มันก็เลยน่าปวดหัวน่ะค่ะ"
20023-410 = "ฉันคิดไม่ถึงเลย\nว่าคุณครูจะมาร้านแผงลอยแบบนี้..."
20023-420 = "คิดไม่ถึงเลยจริงๆ"
20023-430 = "อย่างนั้นเหรอคะ?"
20023-440 = "ฉันรู้สึกว่าที่นี่\nสบายที่สุดเลยค่ะ"
20023-450 = "ถึงจะเป็นหัวหน้าของ\nกรมความมั่นคงสาธารณะที่บ้างาน\nและเป็นที่เกรงกลัวของทุกคน..."
20023-460 = "แต่ยังไงก็ต้องมีสถานที่ที่จะ\nถอดชุดเกราะออกได้เหมือนกันนะคะ"
20023-470 = "เพราะงั้นวันนี้..."
20023-480 = "ถ้าวันนี้คุณครูทำเป็นไม่เห็น\nก็จะขอบคุณมากเลยค่ะ"
20023-2600 = "พอมาคิดดูแล้ว... มีช่วงเวลาที่ฉัน\nเคยใช้เจ้านี่ได้ไม่ดีเท่าไรด้วยนะ\nตอนนี้พอใช้ปืนจนชินแล้ว\nก็น่าเสียดายที่ไม่ค่อยได้มี\nโอกาสได้ใช้เลย..."

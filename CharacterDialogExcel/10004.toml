[translation]
10004-20 = "風紀委員長陽奈。\n我想你應該知道我的名字…請多指教。"
10004-30 = "可愛的東西…"
10004-40 = "雖然很想睡午覺…"
10004-50 = "好像沒有\n太大的問題。\n真是萬幸。"
10004-60 = "可以自在一點\n對吧？"
10004-70 = "有點不好意思啊…"
10004-80 = "啊啊，\n我一直在等你，老師。 "
10004-90 = "不需要給我\n特別待遇。"
10004-100 = "在這裡只是一個\n成員而已。"
10004-110 = "那個…請，請你\n不要那樣撫摸我好嗎？"
10004-120 = "畢竟是風紀委員長，\n可，可能會被別人看到…"
10004-130 = "被看到也沒關係！？\n你，你在說什麼！？"
10004-140 = "別想矇混過關！\n要好好做事！"
10004-150 = "我會盡全力協助\n老師想做的事。\n必要的時候請開口吧。"
10004-160 = "（想要撒嬌。\n想要嬉鬧。\n想要發牢騷…）"
10004-170 = "（但如果是我來做的話，\n只會覺得噁心吧…）"
10004-180 = "什麼？\n我，我在想什麼嗎？\n沒，沒什麼！！"
10004-190 = "老師…今天是您的生日啊，\n我可以為您\n獻上祝福嗎？"
10004-200 = "還是說…\n想讓可愛的傢伙\n為您慶祝…"
10004-210 = "不，不是嗎？"
10004-220 = "啊，啊啊。謝謝，老師。\n是我的生日嗎…\n我都忘了。"
10004-230 = "嗯？\n一起出門嗎？"
10004-240 = "新年到了呢。\n今年也請多多關照。"
10004-250 = "我也會再加油的。"
10004-260 = "聖誕節…\n這種日子和我在一起\n也沒關係嗎？"
10004-270 = "雖然…我很開心…"
10004-280 = "其實我不了解萬聖節，\n也沒參加過什麼節慶。"
10004-290 = "但是熱鬧的氣氛\n有很好地轉達到了。"
10004-310 = "被那樣盯著看的話…\n就算是我也會害羞的。"
10004-320 = "真是不可思議呢。\n和老師在一起\n總覺得很安心。"
10004-330 = "其實…\n我喜歡老師的那種表情。"
10004-340 = "哈啊…\n什麼都不想思考。"
10004-2600 = "任何故事都有結局。\n我會見證到最後一刻的。"

[translation]
10004-20 = "ฉันคือฮินะ ประธานคณะกรรมการวินัย\nคงจะเคยได้ยินชื่อของฉันมาแล้วใช่มั้ย? ฝากตัวด้วยนะ"
10004-30 = "ของน่ารักพวกนี้..."
10004-40 = "อยากนอนกลางวันจัง..."
10004-50 = "ถือว่าโชคดี\nที่ไม่มีปัญหาใหญ่อะไร\nดีแล้วล่ะ"
10004-60 = "แบบนี้แอบไป\nผ่อนคลายสักหน่อย\nก็คงได้สินะ?"
10004-70 = "น่าอายจัง..."
10004-80 = "อ่า... กำลังรอคุณครูอยู่เลย"
10004-90 = "ไม่จำเป็นต้องดูแลฉัน\nเป็นพิเศษกว่าคนอื่นหรอก"
10004-100 = "สำหรับที่นี่แล้ว\nฉันก็แค่เจ้าหน้าที่คนหนึ่งน่ะ"
10004-110 = "คือว่า... ช่วยหยุด...\nลูบหัวแบบนั้นได้มั้ย?"
10004-120 = "ฉันเป็นถึงประธานกรรมการวินัยนะ\nอีกอย่าง... อาจจะมีใครมาเห็นก็ได้"
10004-130 = "จะเห็นก็ให้เห็นไปงั้นเหรอ?!\nพูดอะไรบ้าๆ ของครูน่ะ?!"
10004-140 = "อย่ามาทำเป็นไม่รู้ไม่ชี้นะ!\nตั้งใจทำงานด้วย งานน่ะ งาน!"
10004-150 = "ถ้ามีอะไรให้ช่วย และไม่เกิน\nความสามารถของฉันล่ะก็\nบอกมาได้เลย ฉันจะช่วยเอง"
10004-160 = "(อยากทำตัวเป็นเด็ก\nอยากซุกซนใส่\nแล้วก็อยากอ้อนด้วย..)"
10004-170 = "(แต่ถ้าทำแบบนั้นไป\nก็คงจะน่าเกลียดแย่...)"
10004-180 = "หืม?! ฉะ.. ฉันเหมือนคิด\nอะไรอยู่อย่างนั้นเหรอ?\nเปล่านะ... ไม่ได้คิดอะไรเลย!!"
10004-190 = "คุณครู... วันนี้วันเกิดเหรอ\nฉันคนนี้... อวยพรวันเกิด\nให้คุณครูได้ใช่มั้ย?"
10004-200 = "หรือว่าอยากได้\nคำอวยพรจากคนที่น่ารักกว่านี้นะ..."
10004-210 = "ไม่ใช่เหรอ?"
10004-220 = "อ่า... ขอบคุณนะคุณครู\nฉันลืมไปเลยว่าวันนี้\nเป็นวันเกิดตัวเอง..."
10004-230 = "หืม? จะชวนไป\nข้างนอกด้วยกันงั้นเหรอ?"
10004-240 = "ปีใหม่แล้วสินะ\nปีนี้ก็ฝากตัวด้วยนะ"
10004-250 = "แล้วฉันจะพยายามให้มากขึ้น..."
10004-260 = "เมอร์รีคริสต์มาส...\nวันพิเศษทั้งที\nแต่มาอยู่กับฉันแบบนี้ได้เหรอ?"
10004-270 = "จริงๆ ฉันก็ดีใจนะ..."
10004-280 = "ฉันไม่ค่อยรู้จักวันฮาโลวีนหรอก\nอีกอย่าง ฉันไม่เคยไป\nตามเทศกาลอะไรเลย"
10004-290 = "แต่ก็รับรู้ได้นะว่ารอบตัว\nมีแต่บรรยากาศน่าสนุก"
10004-310 = "ถ้าคุณครูเอาแต่จ้องฉันแบบนั้น...\nฉันก็เขินเป็นเหมือนกันนะ"
10004-320 = "แปลกจังเลย\nพอได้อยู่กับคุณครูแบบนี้...\nรู้สึกผ่อนคลายจัง"
10004-330 = "ที่จริงแล้ว...ฉันชอบ\nสีหน้าแบบนั้นของคุณครูนะ"
10004-340 = "เฮ้อ... ฉันไม่อยาก\nคิดถึงเรื่องอื่นอีกแล้วล่ะ"
10004-2600 = "ทุกเรื่องราวย่อมมีตอนจบ\nคุณครูจะช่วยเขียนเรื่องราวตอนจบไปกับฉันได้มั้ย"

[translation]
10004-20 = "선도부장, 히나다.\n내 이름은 알고 있겠지만…. 잘 부탁해."
10004-30 = "귀여운 물건…."
10004-40 = "낮잠 자고 싶지만…."
10004-50 = "큰 문제는\n없는 것 같네.\n다행히."
10004-60 = "느긋하게 있어도\n되겠지?"
10004-70 = "조금 민망한데…"
10004-80 = "아아,\n기다리고 있었어, 선생님."
10004-90 = "딱히 특별대우를\n해줄 필요는 없어."
10004-100 = "여기서는 그저 한 명의\n부원일 뿐이니까."
10004-110 = "저기… 그, 그렇게\n쓰다듬지 말아줄래?"
10004-120 = "일단은 그래도 선도부장이고\n누, 누가 볼지도 모르고…."
10004-130 = "봐도 상관없다고?!\n무, 무슨 소릴 하는 거야?!"
10004-140 = "대충 넘어가려고 하지 마!\n일은 제대로 해야지!"
10004-150 = "선생님이 원하는 건\n힘이 닿는 대로 도울 테니까.\n말만 해."
10004-160 = "(어리광 부리고 싶어.\n장난치고 싶어.\n징징대고 싶어….)"
10004-170 = "(그치만 내가 했다간\n징그럽기만 하겠지….)"
10004-180 = "뭐?!\n무, 무슨 생각을 하냐고?\n아, 아무 것도!!"
10004-190 = "선생님… 오늘 생일이라니,\n축하를 받는 사람이\n나여도 괜찮은 거야?"
10004-200 = "좀 더….\n귀여운 녀석에게\n받고 싶다거나…."
10004-210 = "아, 아니라고?"
10004-220 = "아, 아아. 고마워, 선생님.\n내 생일이라니….\n잊고 있었어."
10004-230 = "응?\n같이 외출하자고?"
10004-240 = "새해가 밝았네.\n이번 한 해도 잘 부탁해."
10004-250 = "나도 조금은 더 힘낼 테니까."
10004-260 = "크리스마스….\n이런 날에 나와 함께 있어도\n괜찮은 거야?"
10004-270 = "나는… 기쁘지만…."
10004-280 = "사실 할로윈은 잘 몰라.\n축제에 가본 적도\n별로 없으니까 말야."
10004-290 = "하지만 떠들썩한 분위기는\n잘 전달되고 있어."
10004-310 = "그렇게 빤히 쳐다보면…\n아무리 나라도 부끄러워."
10004-320 = "신기하지?\n선생님과 함께 있으면\n어쩐지 안심이 돼."
10004-330 = "사실은…\n당신의 그런 표정을 좋아했어."
10004-340 = "하아….\n아무것도 생각하고 싶지 않아."
10004-2600 = "어떤 이야기라도 끝은 있어.\n내가 그 마지막까지 지켜봐줄게."

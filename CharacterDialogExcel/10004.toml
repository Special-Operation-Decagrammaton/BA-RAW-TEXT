[translation]
10004-20 = "Nice to meet you. I'm the head prefect, Hina, though I sincerely hope that went without saying."
10004-30 = "Cute stuff..."
10004-40 = "If only I could take a nap..."
10004-50 = "Thankfully, there are no pressing concerns."
10004-60 = "You don't mind if I take it easy, do you?"
10004-70 = "This is a little embarrassing..."
10004-80 = "Ah, I've been waiting for you, Sensei."
10004-90 = "There's no need to treat me any differently."
10004-100 = "As long as I'm here, I'm like every other club member."
10004-110 = "Hey... C-Can you not pet me like that?"
10004-120 = "I'm the head prefect. Someone might see us..."
10004-130 = "What do you mean it's okay if we're seen?! Wh-What has gotten into you?!"
10004-140 = "No cutting corners! Do your job properly!"
10004-150 = "I will aid you to the best of my ability. Call on me if need be."
10004-160 = "(I want Sensei to spoil me. I wish I could have some fun... Maybe whine a little too...)"
10004-170 = "(But it'd probably be odd coming from me...)"
10004-180 = "Wh-What's on my mind? N-Nothing! Nothing at all!"
10004-190 = "Sensei... I hear it's your birthday. Are you sure I can wish you a happy birthday?"
10004-200 = "Wouldn't you rather hear that from someone cuter than me?"
10004-210 = "N-No?"
10004-220 = "Th-Thank you, Sensei. I had forgotten all about my birthday."
10004-230 = "Hmm? You'd like for us to go out together?"
10004-240 = "It's a new year. Here's to another great year together."
10004-250 = "I'll keep trying my hardest too."
10004-260 = "Christmas... Are you okay with spending a day this special with me?"
10004-270 = "That... That makes me happy."
10004-280 = "I don't know much about Halloween. I haven't been to any festivals."
10004-290 = "But even I can feel the buzz in the atmosphere."
10004-310 = "When you stare at me like that...even I can get a bit embarrassed."
10004-320 = "I don't get it. I feel so at ease when we're together."
10004-330 = "The truth is...seeing you smile makes me happy."
10004-340 = "*sigh* I don't want to think about anything."
10004-2600 = "Every story has an ending. I'll see it through with you."

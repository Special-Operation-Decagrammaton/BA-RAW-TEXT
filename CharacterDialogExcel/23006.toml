[translation]
23006-20 = "อ่ะฮิฮิ ชิซุโกะ ชมรมจัดงานเทศกาลค่ะ~\nขอฝากตัวด้วยนะคะ คุณครู\nใช่แล้วค่ะ คอมเมนต์สำหรับการค้าค่ะ\nใช้สำหรับการค้าค่ะ!"
23006-30 = "โมเอะๆ คิ้วๆ อาอิ๊ง~...\nบะ...แบบนี้ใช่มั้ย?"
23006-40 = "เราจะต้องวางแผนให้ละเอียด\nสำหรับการจัดงานเทศกาล\nครั้งต่อไปค่ะ"
23006-50 = "เมนูใหม่ของร้านเฮียกคิยาโค\nคืออะไรน้า?"
23006-60 = "ถ้าเพื่องานเทศกาลแล้วล่ะก็...\nฉันจะพยายาม...\nอย่างเช่นแปลงร่างเป็น\nบันนี่เกิร์ลใส่หูกระต่าย..."
23006-70 = "ที่นี่เหมาะจะใช้เป็น\nร้านค้าชั่วคราว\nของร้านเฮียกคิยาโคเลยนะ?"
23006-80 = "ฮิฮิ กลับมาแล้วเหรอคะ\nคุณครูขา~ เมี๊ยวเมี๊ยว~"
23006-90 = "ฮุฮุ บริการได้เพอร์เฟกต์มาก!"
23006-100 = "งือ... เหนื่อยจังเลย"
23006-110 = "อ๊ะ คุณครู! มาแล้วเหรอคะ?\nนั่งก่อนสิคะ นั่งเลย~…\nห้ามปฏิเสธ~"
23006-120 = "เชิญค่ะคุณครู วันนี้จะให้ฉัน\nช่วยทำภารกิจไหนดีคะ?\nไม่ว่าเรื่องไหนก็ไว้ใจได้เลยค่ะ~!"
23006-130 = "ไม่รู้ว่าทำไมพอมีคุณครูอยู่ด้วย\nก็มักจะสบายใจอยู่เสมอเลยค่ะ"
23006-140 = "จะบอกว่าเป็นเพราะ...\nคุณครูงั้นเหรอคะ?"
23006-150 = "อ่า~ พอกลับไปก็ยังมีงานของ\nร้านเฮียกคิยาโครออยู่อีกค่ะ"
23006-160 = "ไม่อยากกลับไปใช่มั้ยน่ะเหรอคะ?"
23006-170 = "ฮุฮุ เปล่าหรอกค่ะ นั่นน่ะ...\nมันเป็นงานที่ฉันต้องทำยังไงล่ะคะ"
23006-180 = "คะ? ฉันน่ารักงั้นเหรอคะ?"
23006-190 = "ยะ...อย่าล้อเล่นสิคะ!\nถ้าคุณครูเห็นตัวตนจริงๆ\nของฉันล่ะก็..."
23006-200 = "แบบนี้น่ะเหรอน่ารัก?\nอะ...อึ่ก..."
23006-210 = "คุณครูคะ ปกติจะเก็บกระเป๋าเงิน\nไว้อย่างดีรึเปล่าคะ?\nต้องระวังตลอดนะคะ"
23006-220 = "เพราะงานเทศกาลที่สนุกสนาน\nกับขนมอันมิตสึของร้านเฮียกคิยาโค\nจะทำให้อดใจไว้ไม่ไหวยังไงล่ะคะ"
23006-230 = "สุขสันต์วันเกิดค่ะ คุณครูคะ"
23006-240 = "เอาล่ะ ไปที่ร้านเฮียกคิยาโคกัน\nเถอะค่ะ เราจะจัดเทศกาลฉลอง\nวันเกิด โดยใช้อำนาจของหัวหน้า\nชมรมจัดงานเทศกาลไงล่ะคะ!"
23006-250 = "เอ๋!!\nอะ...อวยพร\nวันเกิดให้ฉันเหรอคะ?"
23006-260 = "อะ...อ๊ะ ยะ...อย่ามองนะคะ!\nตอนนี้ สีหน้าของฉันคงจะ\nน่าเกลียดมากๆ แน่เลยค่ะ!"
23006-270 = "อ่า แหะๆ... แหะๆๆ..."
23006-280 = "แฮปปี้~ นิว~ เยียร์~\nใช้เวลาวันปีใหม่ ซุกตัวรับ\nไออุ่นจากโต๊ะโคทัตสึกัน~"
23006-290 = "ขออีกห้านาที..."
23006-300 = "วันนี้เป็นวันคริสต์มาสค่ะ!\nวันงานเทศกาล! จะขาด\nชมรมเทศกาลอย่างเราไป\nไม่ได้สิคะ! ไปค่ะ! คุณครู!"
23006-310 = "ทริก ออร์ ทรีต!\nเอาล่ะ ถ้ามีเด็กนักเรียนคนไหน\nแวะเข้ามาแกล้งล่ะก็ บังคับให้\nซื้ออันมิตสึของร้านเลยนะคะ คุณครู!"
23006-320 = "คะ? ไม่ได้เหรอคะ?\nทำไมล่ะคะ?"
23006-340 = "ฮุฮุ\nกลับมาแล้วเหรอคะ นายท่าน~"
23006-350 = "ค่า ค่า~ \nอย่างที่เห็นตอนนี้...\nฉันกำลังโดดงานอยู่~"
23006-360 = "น่าแปลกจริงๆ นะคะ\nเรื่องแบบนี้...\nปกติไม่ควรทำแท้ๆ..."
23006-370 = "แต่พอได้อยู่กับคุณครูแล้ว..."
23006-380 = "คือว่าช่วยมานั่งข้างๆ\nฉันหน่อยสิคะ คุณครูคะ"
23006-390 = "มาทำให้ฉันกลายเป็นแบบนี้\nต้องรับผิดชอบด้วยนะคะ?"
23006-2600 = "ของที่ไม่มีวางขาย\nในเทศกาลไหนๆ เลยสินะคะ\nฮิฮิฮิ ฉันจะรักษาอย่างดีเลยค่ะ คุณครู!"

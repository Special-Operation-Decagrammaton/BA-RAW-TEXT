[translation]
23006-20 = "耶嘿嘿，我是節慶營運管理部的靜子～\n 之後請多指教囉，老師？咦？\n……啊啊，沒錯沒錯你說的對，這是營業用的台詞！"
23006-30 = "萌耶萌耶啾～\n…這樣對嗎？"
23006-40 = "為了下一個慶典，\n得徹底計畫一下才行。"
23006-50 = "百夜堂的新餐點，\n要推出什麼呢……？"
23006-60 = "在下次的慶典上\n做點大膽的嘗試…\n所有人穿成和服風的\n兔女郎…之類的？"
23006-70 = "這裡，很適合\n當作百夜堂的\n臨時店面呢！"
23006-80 = "啊，歡迎回來，\n老師！喵喵！"
23006-90 = "……嗯，剛才那樣很完美。"
23006-100 = "嗚嗚……好累……"
23006-110 = "啊，老師，歡迎回來！\n來來～請來這裡，\n不用客氣～！"
23006-120 = "你叫我嗎？\n今天要協助什麼樣的工作？\n任何事都儘管交給我吧～！"
23006-130 = "最近只要待在身邊，就會\n不知不覺地放鬆下來呢～"
23006-140 = "……這都怪老師唷？"
23006-150 = "啊，回去之後還有\n百夜堂的工作要做。"
23006-160 = "……真辛苦，是嗎？"
23006-170 = "不會不會，這不算什麼～\n這也是我該做的。"
23006-180 = "咦？很可愛，是嗎？"
23006-190 = "請，請不要揶揄我了…\n老師不是也知道\n我的真面目嗎……"
23006-200 = "……那樣很可愛？\n唔，呃……"
23006-210 = "老師，你是管得住錢包的人嗎？\n還是小心一點比較好哦！"
23006-220 = "百鬼夜行的慶典和百夜堂\n的餡蜜，可是有著足以\n撬開錢包的魅力哦？"
23006-230 = "祝你生日快樂，老師！"
23006-240 = "來，到百夜堂去吧。\n我會以節慶營運管理部\n部長的權限，為你舉辦\n慶典般的慶生大會！"
23006-250 = "咦，要，要慶祝\n我的生日是嗎？"
23006-260 = "……！啊，\n請，請不要看我！\n現在，我的表情\n八成難以見人……！"
23006-270 = "……耶嘿，\n耶嘿嘿……！"
23006-280 = "HappyNewYear～！\n畢竟是新年，就在\n暖桌裡悠哉一下吧～"
23006-290 = "等一下，再，\n再5分鐘就好……！"
23006-300 = "今天是聖誕節！是節慶之日！\n我們節慶營運管理部\n當然不會錯過囉！\n來，我們走吧，老師！"
23006-310 = "Trick or Treat！\n來吧老師，對來要糖果的學生\n就強迫推銷百夜堂的餡蜜吧！"
23006-320 = "咦？不行嗎？\n為什麼！？"
23006-340 = "呵呵，歡迎回來～\n主人～？"
23006-350 = "就是說呀～\n就跟老師看到的一樣，\n我正在偷懶ING喔～"
23006-360 = "……真是不可思議呢。\n明明不能做這種事，\n應該要打起精神才行，\n我一直都是這麼想的說……"
23006-370 = "只要和老師待在一起……\n總覺得力氣都不見了……"
23006-380 = "來吧，老師？\n請到這邊來。"
23006-390 = "……把我變成這樣的責任，\n你會承擔的吧？"
23006-2600 = "這是無論在什麼慶典上\n都找不到的非賣品呢。\n耶嘿嘿，我會好好珍惜的。老師！"

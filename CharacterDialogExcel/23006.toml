[translation]
23006-20 = "에헤헤, 마츠리운영관리부의 시즈코예요~\n앞으로 잘 부탁드려요. 선생님.\n아…네네, 영업용 멘트예요. 영업용!"
23006-30 = "모에모에 큐~웅….\n이, 이게 맞을까?"
23006-40 = "다음 축제 준비를 위해\n철저한 계획을 세워야지."
23006-50 = "백야당의 신메뉴,\n뭘로 할까?"
23006-60 = "축제를 위해서라면\n과감한 시도를….\n전원 기모노풍 바니걸\n착용이라던가…."
23006-70 = "여기, 백야당의\n임시 가게로 써도\n괜찮을 거 같은데?"
23006-80 = "에헤헷, 다녀오셨어요.\n선생님~ 냥냥!"
23006-90 = "…후후, 완벽한 접대였어."
23006-100 = "으어… 지친다…"
23006-110 = "앗, 선생님. 오셨어요?\n자, 앉아요. 앉아~\n사양하지 마시고~"
23006-120 = "네에~ 선생님. 오늘은\n어떤 업무를 도와드릴까요?\n무엇이든 맡겨만 주세요~!"
23006-130 = "선생님과 함께 있으면\n저도 모르게 풀어진다니까요."
23006-140 = "이거… 전부\n선생님 탓이라구요?"
23006-150 = "아아~ 돌아가면 또 백야당의\n업무가 기다리고 있겠지요."
23006-160 = "돌아가기 싫냐고요?"
23006-170 = "후후. 전혀요. 그야,\n제가 해야 할 일인걸요?"
23006-180 = "네? 제가 귀엽다고요?"
23006-190 = "노, 놀리지 마세요!\n선생님은 제 본모습도\n아시고 계시면서…"
23006-200 = "그게 귀여운 거다?\n으, 으윽…."
23006-210 = "선생님, 평소 지갑 간수는\n잘 하고 계신가요?\n늘 조심하셔야 해요?"
23006-220 = "즐거운 축제와 백야당의\n안미츠는 사정을\n봐주지 않으니까요."
23006-230 = "생일 축하드려요. 선생님."
23006-240 = "자아, 백야당으로 가죠.\n마츠리운영관리부 부장의\n권한으로 생일 축제를 열 테니까요!"
23006-250 = "네혯?!\n제, 제 생일을\n축하한다고요?"
23006-260 = "우, 우앗. 보, 보지 마세요!\n지금! 분명 엄청\n꼴사나운 얼굴일 테니까…!"
23006-270 = "에, 에헷, 에헤헷…."
23006-280 = "하-피 뉴우 이~아~\n새해부터 코타츠 안에서\n꾸벅꾸벅~"
23006-290 = "5분만 더어…!"
23006-300 = "오늘은 크리스마스!\n축제의 날! 저희 마츠리부가\n빠질 순 없어요. 가죠. 선생님!"
23006-310 = "트리크 오-아 트리-토!\n자자, 장난치러 오는\n학생이 있다면 백야당의\n안미츠를 강매하죠. 선생님!"
23006-320 = "네? 안된다고요?\n어째서?"
23006-340 = "후후후,\n다녀오셨어요-주인─님."
23006-350 = "네에네에~ 보시다시피\n현재진행형으로\n땡땡이 중이에요오~"
23006-360 = "참 신기해요.\n이런 거, 원래는 해서는\n안 되는 일인데…"
23006-370 = "선생님과 같이 있다 보면…\n마음이 편해져서…"
23006-380 = "자아,\n제 옆에 앉아주세요.\n선생님."
23006-390 = "절 이렇게 만들어버린 이상,\n책임져 주셔야해요?"
23006-2600 = "이거, 어떤 축제에서도 구할 수 없는\n비매품, 이네요. 에헤헷,\n소중히 여길게요. 선생님!"

[translation]
23006-20 = "I'm Shizuko of the Festival Operations Department! I look forward to working with you, Sensei... Huh? I'm trying to be professional here!"
23006-30 = "Moe moe...kyun! D-Did I do it right?"
23006-40 = "I need to get back to preparing for the festival."
23006-50 = "How should we spruce up Momoyodou's menu?"
23006-60 = "Maybe we should try something bold... Like kimono-style bunny girl outfits."
23006-70 = "Do you think we could use this place as a temporary shop for Momoyodou?"
23006-80 = "Heehee, you're back, Sensei!"
23006-90 = "Heehee. That was perfect."
23006-100 = "Ugh. I'm getting exhausted..."
23006-110 = "Oh, Sensei, you're here! Sit down, sit down! Please, make yourself comfortable!"
23006-120 = "Yes, Sensei? Which task can I help you with today? You can count on me!"
23006-130 = "I don't know why I always let my guard down when I'm with you."
23006-140 = "Is it...just because of who you are, Sensei?"
23006-150 = "Ah... When I go back to Momoyodou, there will be a lot of work waiting for me."
23006-160 = "Do I not wanna go back?"
23006-170 = "Heehee. That's not it. It's what I'm supposed to do."
23006-180 = "What? You think I'm cute?"
23006-190 = "D-Don't tease me like that! You know how I really am. I'm so..."
23006-200 = "That's what's cute about me? U-Ugh..."
23006-210 = "You're careful with your wallet, right, Sensei? You need to be careful with it, okay?"
23006-220 = "The festival and Momoyodou's anmitsu are waiting for us."
23006-230 = "Happy birthday, Sensei."
23006-240 = "Now, let's go to Momoyodou. The Festival Operations Department president declares that it's time for a birthday party!"
23006-250 = "What?! You want to celebrate my birthday?"
23006-260 = "A-Ah! D-Don't look at me! I know my face looks really weird right now!"
23006-270 = "Heh. Heh heh. Heh heh heh..."
23006-280 = "Happy New Year! I'm going to spend New Year's Day dozing on the kotatsu!"
23006-290 = "Five more minutes..."
23006-300 = "Today is Christmas! Let's go Sensei! The Festival Department can't just sit around do nothing."
23006-310 = "Trick or treat! If the students try to trick us, they'll have to order our anmitsu!"
23006-320 = "What? We can't force them to? Why not?"
23006-340 = "Heehee. Welcome back, Master."
23006-350 = "You bet I am! I'm slacking off as we speak!"
23006-360 = "It's a little funny. Technically, this is against the rules."
23006-370 = "But when I'm with you..."
23006-380 = "Come sit next to me, Sensei."
23006-390 = "It's your fault I've changed so much, so it's time you owe up to it."
23006-2600 = "This is something that's not for sale at any festival, right? Heeheehee, I'll cherish it, Sensei!"

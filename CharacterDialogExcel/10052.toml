[translation]
10052-10 = "Blue Archive!"
10052-20 = "เลขานุการของเซมิน่า อุชิโอะ โนอาค่ะ\nขอฝากเนื้อฝากตัวด้วยนะคะ คุณครู\n...ในหลายๆ เรื่องเลยค่ะ"
10052-30 = "(คาเฟ่นี้รู้สึกเหมือน\nกับอยู่ในความฝัน...\nที่ไม่มีทางเป็นไปได้เลยค่ะ)"
10052-40 = "(มาลืมเรื่องน่าเบื่อ\nแล้วหลงอยู่ใน\nความฝันดีกันมั้ยคะ)"
10052-50 = "เฟอร์นิเจอร์อันนี้...\nอยากเอาไปวางไว้ในห้อง\nพักผ่อนของเซมิน่าจังค่ะ ฮุฮุ"
10052-60 = "โครงสร้างของที่นี่...\nน่าประทับใจมากเลยค่ะ"
10052-70 = "ฮุฮุ ภาพแบบนี้\nอยากให้ยูกะจัง\nได้เห็นบ้างจังเลย"
10052-80 = "เชิญค่ะ คุณครู"
10052-90 = "ตรวจดูตารางงานของวันนี้\nหรือยังคะ?"
10052-100 = "ฮุฮุ มาสายนะคะ\nคุณครู"
10052-110 = "ถึงจะมองกันแบบนั้น\nก็ลบความจริงเรื่องมาสาย\nไม่ได้หรอกนะคะ"
10052-120 = "คราวหน้าก็ช่วยมา\nให้เร็วขึ้นอีกสักนิดนะคะ"
10052-130 = "(จ้อง...)"
10052-140 = "อ๊ะ ไม่ต้องใส่ใจหรอกค่ะ\nแค่กำลังสังเกตการณ์อยู่น่ะค่ะ"
10052-150 = "คุณครูนึกเรื่องสนุกๆ\nอะไรได้งั้นเหรอคะ?"
10052-160 = "บอกได้เลยนะคะ\nฉันจะจดบันทึกไว้ทันทีเลยค่ะ"
10052-170 = "บันทึกรวมที่ฉันเขียนน่ะเหรอคะ...?"
10052-180 = "เพิ่งเอามาแสดงในงาน\nมิลเลเนียมไพรซ์ที่ผ่านมาน่ะค่ะ"
10052-190 = "ทุกคนก็อ่านกันหมดนะคะ"
10052-200 = "แต่ว่าไม่มีใครบอกความรู้สึก\nหลังอ่านจบเลยละค่ะ..."
10052-210 = "แปลกจังเลยนะคะ"
10052-220 = "ยูกะจังเป็นคนที่แสดง\nความรู้สึกได้หลากหลาย\nถ้าอยู่ด้วยกันก็คงไม่เบื่อเลยค่ะ"
10052-230 = "เพราะงั้นบางครั้งฉันก็เลย...\nเผลอแหย่เธอเล่น\nโดยไม่รู้ตัวน่ะค่ะ ฮุฮุ"
10052-240 = "ความอยากรู้อยากเห็นเป็นแรงกระตุ้น\nที่ทำให้วิทยาศาสตร์ก้าวหน้าก็จริง\nแต่บางครั้งมันก็สร้างความลำบาก\nให้ได้เรานะคะ"
10052-250 = "มันเป็นทั้งความเจ็บปวด\nอย่างแปลกประหลาด\nผสมกับความปรารถนาที่น่ากลัว..."
10052-260 = "สุขสันต์วันเกิดค่ะคุณครู"
10052-270 = "ตามที่บันทึกไว้\nวันนี้ก็เป็นวันธรรมดา\nเหมือนกับวันอื่นๆ ทั่วไป..."
10052-280 = "แต่หวังว่าวันนี้จะเป็นวันที่\nคุณครูมีความสุขนะคะ"
10052-290 = "ฉันไม่คิดว่าการบันทึก\nและรำลึกถึงวันเกิด\nจะมีความหมายอะไร\nมากมาย..."
10052-300 = "แต่ว่าการได้รับคำอวยพรแบบนี้...\nฉันรู้สึกดีใจมากเลยค่ะ"
10052-310 = "ขอบคุณที่จำวันเกิดฉันได้นะคะ"
10052-320 = "ขอให้มีความสุขมากๆ\nในวันปีใหม่นะคะ"
10052-330 = "ปีนี้ก็ขอฝากเนื้อฝากตัวด้วยนะคะ\nคุณครู"
10052-340 = "วันคริสต์มาส..."
10052-350 = "ถึงที่โรงเรียนมิลเลเนียม\nจะไม่ได้มีการฉลองอะไร\nเป็นพิเศษ"
10052-360 = "แต่ทำไมถึงได้รู้สึกว่า\nวันนี้ว่างจังเลยนะคะ"
10052-370 = "ถ้าคุณครูสะดวกละก็\nหลังจากเสร็จงานแล้ว"
10052-380 = "เราไปกินมื้อค่ำ\nด้วยกันดีมั้ยคะ ฮุฮุ"
10052-390 = "วันแห่งการเฉลิมฉลอง\nและสรรเสริญผู้ล่วงลับ\nที่ไม่มีใครจดจำสินะคะ"
10052-400 = "คงต้องตั้งใจทำงานอย่างหนัก\nเพื่อให้ไม่มีใครถูกหลงลืม\nและไม่ถูกบันทึกเอาไว้แล้วละค่ะ"
10052-420 = "รู้สึกแปลกๆ จังเลยค่ะ..."
10052-430 = "รู้สึกต่างจากตอนที่\nเขียนลงบนกระดาษเลยค่ะ\nรู้สึกดีกว่ามากเลยค่ะ"
10052-440 = "เดิมทีการบันทึกน่ะคือการถ่ายทอด\nความคิดในตอนปัจจุบันไปยังอนาคต"
10052-450 = "พอฝนหยุดตก และดวงอาทิตย์\nกลับมาส่องแสง มันก็จะหายไป..."
10052-460 = "การบันทึกความจริงและเหตุผล...\nหน้าต่างกระจกพวกนี้...\nมันดูเปราะบางมากเลยนะคะ"
10052-470 = "แต่ว่าเพราะแบบนั้นฉันถึงได้...\nรู้สึกชอบกระดานจดบันทึก\nขนาดใหญ่แบบนี้มากกว่าค่ะ ฮุฮุ"
10052-2600 = "โครงสร้างของชุดแปลงอันนี้\nน่าสนใจดีนะคะ\nทำให้รู้สึกอยากทดลอง...\nหลายๆ อย่างขึ้นมาเลยค่ะ ฮุฮุ "

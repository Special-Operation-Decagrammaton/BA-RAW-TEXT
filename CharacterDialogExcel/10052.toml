[translation]
10052-10 = "Blue Archive!"
10052-20 = "I am Ushio Noa, Seminar's secretary. I look forward to your support, Sensei."
10052-30 = "(This cafe feels like a fantasy...)"
10052-40 = "(It makes me want to let my worries fade away as I lose myself in the dream.)"
10052-50 = "I would love to have furniture like this in the Seminar lounge. Heehee."
10052-60 = "The way this space is structured and put together is very impressive."
10052-70 = "Heehee. Yuuka would love it here."
10052-80 = "Welcome, Sensei."
10052-90 = "Would you like to check today's schedule?"
10052-100 = "Heehee, aren't you a bit late, Sensei?"
10052-110 = "Look at me that way all you want, it won't make you any less tardy."
10052-120 = "You can, however, be less late in the future. I would appreciate it."
10052-130 = "(staaare)"
10052-140 = "Oh, don't mind me. I'm just...observing."
10052-150 = "Anything interesting on your mind?"
10052-160 = "Please let me know so I can record it immediately."
10052-170 = "The poetry I wrote...?"
10052-180 = "I submitted it to The Millennium Prize."
10052-190 = "Everyone read it,"
10052-200 = "but no one gave me their feedback."
10052-210 = "Strange, isn't it?"
10052-220 = "Yuuka is so expressive. It's never boring when she's around."
10052-230 = "But it means I can't help but tease her, heehee."
10052-240 = "Curiosity is the driving force behind scientific development, but it can also be the driving force behind distress."
10052-250 = "It's a bizarre sensation. Fear being dragged forward by desire..."
10052-260 = "Happy birthday, Sensei."
10052-270 = "On a calendar, it looks like just another day..."
10052-280 = "But for you, at least, I hope it feels even a little more special."
10052-290 = "I don't see much meaning into keeping track of the day of one's birth, but..."
10052-300 = "It's nice to be congratulated by others."
10052-310 = "Thank you for thinking of me."
10052-320 = "Happy New Year."
10052-330 = "I look forward to working with you this year, Sensei."
10052-340 = "Christmas..."
10052-350 = "It's not a special holiday at Millennium School,"
10052-360 = "but it certainly feels special today."
10052-370 = "If you have some time after work,"
10052-380 = "why don't we add dinner to tonight's schedule? Heehee."
10052-390 = "A special day to remember the oft forgotten dead..."
10052-400 = "I will need to work more diligently, so no one else is left unrecorded and forgotten."
10052-420 = "How strange..."
10052-430 = "It's different than writing on paper. It's more...exuberant."
10052-440 = "Records carry meaning into the future."
10052-450 = "But when the rain stops and the sun rises, these words will fade, just as temporary as the moment that created them."
10052-460 = "This glass pane is too frail to bear the weight of truth or reason."
10052-470 = "But...that's precisely why I like this large glass page."
10052-2600 = "This conversion kit is so interesting. It makes me want tinker around... Whoops."

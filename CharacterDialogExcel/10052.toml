[translation]
10052-10 = "블루 아카이브!"
10052-20 = "세미나의 서기, 우시오 노아입니다.\n잘 부탁드리겠습니다, 선생님.\n……여러모로요."
10052-30 = "(이 카페는 마치\n몽상가들의 꿈처럼\n느껴지네요…)"
10052-40 = "(잠시 권태를 잊고\n백일몽에 잠겨볼까요.)"
10052-50 = "이 가구,\n세미나의 휴게실에도\n들여놓고 싶네요.\n후후."
10052-60 = "이 공간의 구조는…\n인상적이네요."
10052-70 = "후후, 이 광경은\n유우카 쨩에게도\n보여주고 싶네요."
10052-80 = "어서 오세요, 선생님."
10052-90 = "오늘의 스케줄을 확인하시겠어요?"
10052-100 = "후후, 조금 늦으셨네요,\n선생님."
10052-110 = "그렇게 쳐다보셔도 지각한 사실은\n지워드릴 수 없으니까요."
10052-120 = "다음 번에는\n조금 더 일찍 찾아와주세요."
10052-130 = "(지이……)"
10052-140 = "아, 신경쓰지 마세요.\n관찰하고 있는 것 뿐이니까요."
10052-150 = "뭔가 재미있는 생각이\n떠오르셨나요?"
10052-160 = "바로 받아 적을테니\n부디 들려주시길."
10052-170 = "제가 쓴 시집, 말씀인가요…?"
10052-180 = "지난 밀레니엄 프라이스에\n출품했었지요."
10052-190 = "어째서인지 다들\n잘 읽어주시면서도,"
10052-200 = "제대로 된 감상은 들려주지\n않으시더라고요……"
10052-210 = "신기한 일이네요."
10052-220 = "유우카 쨩은 감정 표현이 풍부해서\n함께 있으면 질리지가 않아요."
10052-230 = "그래서 가끔은 저도 모르게…\n짓궂은 장난을 치고 만답니다. 후후."
10052-240 = "호기심은 과학을 발전시키는\n동력이지만, 종종 우리를\n괴롭게 하지요."
10052-250 = "그것은 기이한 아픔이자,\n공포 섞인 욕망…"
10052-260 = "생일 축하드립니다, 선생님."
10052-270 = "기록상으로는 평소와 다를 바 없는,\n평범한 하루일지라도…"
10052-280 = "오늘은 조금 더\n행복한 하루가 되셨으면 좋겠네요."
10052-290 = "태어난 날을 기록하고 회상하는\n행위에 특별한 의미는 없다지만…"
10052-300 = "그래도 축하를 받는 건\n기쁜 일이네요."
10052-310 = "기억해 주셔서 감사합니다."
10052-320 = "새해 복 많이 받으세요."
10052-330 = "올해도 잘 부탁드립니다,\n선생님."
10052-340 = "크리스마스라…"
10052-350 = "밀레니엄 학원에서는\n특별한 축일이 아닙니다만,"
10052-360 = "어쩐지 오늘은 한가한 느낌이네요."
10052-370 = "…혹시 괜찮으시다면\n일이 끝난 뒤에"
10052-380 = "저녁이라도 함께\n어떠신가요? 후후."
10052-390 = "기억되지 못한 망자들을 기리는\n축제의 날이네요."
10052-400 = "기록되지 못하여\n잊히는 사람이 없도록,\n더욱 충실히 일해야겠어요."
10052-420 = "…신기하네요."
10052-430 = "종이에 글씨를 쓸 때와는 달리,\n기분이 고양되는 것 같아요."
10052-440 = "기록이란 본래 현재의 의사를\n미래에 전달하기 위한 수단일 텐데."
10052-450 = "비가 그치고 해가 뜨면\n사라져 버리는 찰나의 기록이라니…"
10052-460 = "이성과 진실, 합리를 기록하기에\n이 유리판은 너무나도 연약하네요."
10052-470 = "하지만…… 그래서 저는\n이 거대한 서판이\n더 마음에 들어요. 후후."
10052-2600 = "이 컨버전 키트의 구조는 인상적이네요.\n조금… 여러가지를 시도해보고\n싶어졌어요. 후훗."

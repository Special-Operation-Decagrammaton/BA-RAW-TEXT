10075-ProfileIntroductionTw = "赤冬聯邦學園所屬，圖書委員會「知識解放戰線」的一員。\n\n和同屬知識解放戰線的紅葉不同，不僅是喜歡二創作品，還親自投入創作活動。筆名為「Meruri」。主要從看起來感情很好，或反向從看起來感情不好的學生身上獲取靈感。身為宿敵的三一和格黑娜學生自然也成為愛瑠的創作對象，使愛瑠在學園外也一樣惡名昭彰。"

10075-WeaponDescTh = "ปืนพกที่ทำขึ้นเป็นพิเศษสำหรับเมรุโดยเฉพาะ\n\nถึงชื่อที่ตั้งให้อาจดูเหมือนตั้งแบบขอไปที แต่นั่นก็เพราะเธอคิดชื่ออื่นไม่ออกแล้ว เลยใช้ชื่อนี้แทน..."
10075-ProfileIntroductionTh = "สมาชิกชมรมอ่านหนังสือของสหภาพเรดวินเทอร์ <ชมรมแนวร่วมปลดปล่อยความรู้>\n\nต่างจากโมมิจิที่เป็นสมาชิกชมรมเดียวกัน เมรุไม่ได้หยุดอยู่แค่การเสพ\nผลงานโดจินเท่านั้น แต่เธอก็ยังมีส่วนร่วมในการสร้างสรรค์ผลงานอย่าง\nกระตือรือร้น โดยใช้นามปากกาว่า 'เมรูริ' เธอมักจะสร้างสรรค์ผลงาน\nโดยใช้คู่ชิปที่สนิทกัน หรือคู่แค้นคู่อริมาเป็นแก่นเรื่องของผลงาน\nดังนั้นนักเรียนของโรงเรียนทรีนิตี้และสถาบันเกเฮนน่าที่เป็นไม้เบื่อไม้เมา\nกันมาตลอดจึงเป็นเป้าหมายหลักของเมรุ ชื่อเสียงในทางลบของเธอ\nจึงเป็นที่รู้จักไปทั่ว แม้แต่นอกสหภาพเรดวินเทอร์"
10075-CharacterSSRNewTh = "ตื่นได้แล้ว...\nต้องมา...วาดรูปสิ..."

10075-ProfileIntroductionKr = "붉은겨울 학원의 도서 동아리 <지식해방전선>의 부원.\n\n\r같은 동아리 부원인 모미지와는 달리, 2차 창작물을 소비하는 데에서 그치지 않고 적극적으로 창작 활동에 나선다. 필명은 메루리. 사이가 좋아 보이거나, 혹은 역으로 나빠 보이는 학생들에게서 주로 소재를 발견하곤 한다. 앙숙 관계인 트리니티와 게헨나의 학생들 역시 메루의 탐색 대상에서 벗어날 수 없기에, 붉은겨울 학원 밖에서도 악명이 높은 편이다."

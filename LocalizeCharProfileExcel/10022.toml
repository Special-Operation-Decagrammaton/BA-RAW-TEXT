10022-ProfileIntroductionJp = "Gehenna Academy head prefect visiting the beach for summer boot camp.\n\nShe may be aloof about most things, but was convinced to visit the beach for training. She's rarely been to the beach, so her swimsuit and floats are a little dated. She's slightly embarrassed they still fit her. Regardless, she will not hesitate to enforce discipline even during the summer or against the raging sea."
10022-CharacterSSRNewJp = "My duties don't change simply because it is summertime."

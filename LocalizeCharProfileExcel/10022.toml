10022-WeaponNameTh = "Destroyer of Denouement"
10022-WeaponDescTh = "ปืนกลอเนกประสงค์ที่เป็นเหมือนอวัยวะส่วนหนึ่งของฮินะ\n\nถึงจะมาเที่ยวที่ชายหาดที่มีบรรยากาศแตกต่างไปจากสถาบัน\nเกเฮนน่าก็ตาม แต่ความทรงพลังก็ไม่ได้เปลี่ยนแปลง"
10022-ProfileIntroductionTh = "ประธานคณะกรรมการวินัยเกเฮนน่าที่มาทะเลเพื่อร่วมการฝึกภาคฤดูร้อน\n\nถึงเธอจะเป็นเด็กสาวจอมขี้เกียจและขี้รำคาญในหลายๆ เรื่องแต่ครั้งนี้ เธอกลับคิด อยากจะร่วมฝึกด้วย เนื่องจากเธอไม่ค่อยได้ไปเที่ยวทะเลบ่อยนัก ชุดว่ายน้ำและห่วงยางที่ใช้ จึงเป็นของเดิมทั้งหมด และเธอก็รู้สึกกังวลว่ามันจะใช้งานได้อยู่หรือไม่ อีกทั้งถึงแม้ฤดูกาลจะเปลี่ยนผันเป็นฤดูร้อน และมาถึงทะเลแล้วก็ตาม แต่เธอก็ยังคงไม่ลังเลที่จะทำทุกอย่างเพื่อรักษาระเบียบวินัยเอาไว้"
10022-CharacterSSRNewTh = "ถึงจะเป็นฤดูร้อน แต่งานที่ฉันต้องจัดการก็ไม่ได้ลดลงหรอกนะ"

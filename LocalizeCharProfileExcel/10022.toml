10022-WeaponDescKr = "히나가 수족처럼 다루는 다목적 기관총.\n\n\r평소의 게헨나 학원이 아닌 다소 들뜬 분위기를 풍기는 바다에 찾아왔어도 그 엄격함은 변하지 않는다."
10022-ProfileIntroductionKr = "하계 합숙 훈련을 위해 바다를 찾은 게헨나 학원의 선도부장.\n\n\r만사를 귀찮아하는 게으름뱅이 소녀지만, 이번만큼은 훈련을 위해 의욕을 내어 해변을 찾았다. 바다를 찾은 적이 별로 없기에, 수영복은 물론 사용하는 튜브도 전부 과거의 물건. 이것을 아직도 사용할 수 있단 사실을 살짝 신경 쓰고 있다. 그 외엔 계절이 여름이 되어도, 무대가 바다가 되어도 여전히 풍기를 지키는데 망설임이 없다."
10022-CharacterSSRNewKr = "여름이 되어도, 해야할 일은 변하지 않아."

10035-ProfileIntroductionKr = "트리니티 도서부의 도서부장.\n\n사람보다 책이 좋다고 할 정도로 책을 사랑하는 소녀로, 특히 세월의 흔적을 느낄 수 있는 오래된 책을 좋아한다. 평상시에는 아무도 오지 않는 고서관에 틀어박혀 책을 읽거나 고서를 관리하며 시간을 보낸다."

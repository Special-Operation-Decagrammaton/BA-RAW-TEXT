10035-ProfileIntroductionTw = "三一綜合學園所屬，圖書委員會的委員長。\n\n是一位非常愛書但討厭人類的少女，至於何為因何為果並不清楚。特別喜歡古書，每天都待在被稱為「古書館」的地方解讀和管理古書，過著深居簡出的生活。對知識的求知慾及古書相關的技術都是一流水準，被周圍的人稱為「古書館的魔術師」。"

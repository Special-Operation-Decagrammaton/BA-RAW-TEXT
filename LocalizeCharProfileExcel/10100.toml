10100-WeaponDescKr = "시로코가 애용하는 돌격소총.\n\n\r오랫동안 사용해 온 듯 군데군데 수리된 흔적들이 남아 있지만, 꼼꼼하게 정비해 왔기 때문에 사용하는 데는 아무런 문제가 없다."
10100-ProfileIntroductionKr = "프레나파테스와 함께 다른 세계에서 이곳으로 넘어온 또 다른 세계의 시로코.\n\n\r이 세계의 시로코와 동일한 존재이지만, 조금 더 시간이 흐른 모습을 하고 있다. 시로코와 마찬가지로 아비도스를 아끼고 학원과 자치구의 부흥을 위해 수단과 방법을 가리지 않는 엉뚱한 모습을 보여줄 때도 있다."
10100-CharacterSSRNewKr = "그러니까 아마도 나도……\n\r괜찮을 거야.  "

10109-WeaponDescKr = "노아가 사용하는 컨버전 키트가 부착된 권총.\n\n문진으로도 사용할 수 있는 적당한 무게의 이 권총은 노아가 사랑하는 심야의 독서에 곁들이기에 걸맞다."
10109-ProfileIntroductionKr = "안온한 휴식을 즐기기 위해 파자마로 갈아입은 세미나의 서기.\n\n쉬이 다른 사람과 섞이려 들지 않는 서기의 휴일은 대체로 고요하지만, 세미나의 부원들과 함께하는 순간만큼은 예외다. 귀여운 후배와 정 많은 동기가 오해를 거듭하며 소란을 키워 나가도 노아는 말없이 그 광경을 지켜볼 뿐이다. 가벼운 미소와 약간의 기록을 곁들여."
10109-CharacterSSRNewKr = "어둠은 그 어떤 색과도 닮지 않았네요…"

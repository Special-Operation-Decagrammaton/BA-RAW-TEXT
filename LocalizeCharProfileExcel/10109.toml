10109-WeaponDescTh = "ปืนพกที่ติดชุดคอนเวอร์ชันที่โนอาใช้\n\nมีน้ำหนักพอดีกับการใช้เป็นที่ทับกระดาษ เหมาะกับการอ่านหนังสือยามดึก กิจวัตรสุดโปรดของโนอา"
10109-ProfileIntroductionTh = "เลขานุการแห่งเซมิน่าที่เปลี่ยนมาใส่ชุดนอนเพื่อการพักผ่อนอย่างสงบสุข\n\nโดยทั่วไปแล้ววันหยุดของเลขาที่ไม่ค่อยสุงสิงกับใครง่ายๆ นั้นจะสงบสุข แต่เมื่อได้อยู่ร่วมกับสมาชิกของเซมิน่าก็จะเป็นไปอีกแบบ แม้รุ่นน้องที่น่ารัก และเพื่อนร่วมชั้นที่ผูกพันกันจะเข้าใจผิดซ้ำไปซ้ำมาและก่อปัญหาอยู่เรื่อยๆ แต่โนอาก็จะเฝ้าดูเหตุการณ์นั้นพร้อมกับรอยยิ้มเล็กๆ และจดบันทึกอะไร\nนิดหน่อยโดยไม่พูดอะไร"
10109-CharacterSSRNewTh = "ไม่มีสีใดเหมือนความมืดมิดเลยค่ะ..."

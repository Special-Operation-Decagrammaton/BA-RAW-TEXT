10109-WeaponDescTw = "裝上了乃愛使用的轉換套件的手槍。\n\n這把重量適中的手槍也能當成鎮紙，正好適合乃愛在深夜讀書時搭配使用。"
10109-ProfileIntroductionTw = "千年科學學園所屬，為了享受安穩的休息而換上睡衣的研討會書記。\n\n無法輕易與他人打成一片的書記，其休假日大多過得十分平靜……除了與研討會成員共度的時間之外。即便可愛後輩與熱情同窗的接連誤會導致風波越演越烈，乃愛依舊在一旁默默看著這一切。輕輕一笑，再加上幾行紀錄。"
10109-CharacterSSRNewTw = "黑暗與任何顏色都有所不同……"

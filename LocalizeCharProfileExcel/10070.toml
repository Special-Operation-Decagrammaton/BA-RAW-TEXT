10070-WeaponDescTw = "美奈愛用的兩把手槍。\n\n左為玄龍，右為白虎。這就是最棒的戰友……美奈是這麼主張的。有時感性或許比理性更加重要。"
10070-ProfileIntroductionTw = "山海經高級中學所屬，學生會「玄龍門」的執行部長兼學生會長護衛。\n\n與給人帥氣冷徹印象的外表不同，其實是名復古黑色電影的重度愛好者。憧憬著電影中會出現的帥氣場景和台詞。儘管時常為了耍帥說出電影般的台詞而吃上苦頭，「玄龍門」的部員們似乎決定不去在意這件事。"
10070-CharacterSSRNewTw = "火花就由我一個人承擔吧。\n──這才是最佳策略"

10070-HobbyTh = "ดูภาพยนตร์ (แนวบู๊แอ็กชัน)"
10070-WeaponNameTh = "Wise Dragon, White Tiger"
10070-WeaponDescTh = "ปืนพกสองกระบอกประจำตัวมินะ\n\nมือขวาเหนี่ยวไกพยัคฆ์ขาว มือซ้ายเหนี่ยวไกมังกรดำ เธอประกาศอย่างแน่วแน่ว่าปืนพกสองกระบอกนี้... คือสหายร่วมรบเคียงบ่าเคียงไหล่ อาจจะมีบางช่วงที่อารมณ์สำคัญกว่าสติ"
10070-ProfileIntroductionTh = "หัวหน้าคณะกรรมการ <มังกรดำ> ของสภานักเรียนควบตำแหน่งผู้พิทักษ์ สังกัดการคุ้มครองประธานสภานักเรียนโรงเรียนซานไห่จิง\n\nชอบจินตนาการถึงฉากและบทพูดเท่ๆ ที่มักจะมีในภาพยนตร์เพราะคลั่งไคล้\nภาพยนตร์ฟิล์มนัวร์คลาสสิกเป็นอย่างมาก ต่างจากภาพลักษณ์ภายนอกที่ดูเท่ และสุขุมนุ่มลึก หลายครั้งมักจะทำตัวเท่ไม่ดูสถานการณ์จนเจอเรื่องไม่ดี แต่กองกำลัง <มังกรดำ> ก็ทำเป็นไม่รู้ไม่เห็นเพราะไม่อยากให้เธอเสียความรู้สึก"
10070-CharacterSSRNewTh = "ปัญหาของเรา เราก็ควรจัดการเอง\nอย่าให้ใครต้องมารับเคราะห์ด้วยเลย"

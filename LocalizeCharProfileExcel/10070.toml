10070-WeaponDescEn = "Mina's beloved two-handed pistols.\n\nThe White Tiger in her right hand and the Wise Dragon in her left, she affectionally calls these two her true comrades-in-arms. Perhaps emotion and reason can work in tandem at times."
10070-ProfileIntroductionEn = "Executive Officer of Genryumon, Shanhaijing's student council, and the Student Council President's personal bodyguard.\n\nDespite her calm and collected demeanor, she's a hardcore classic noir movie buff. She likes to quote scenes and lines from movies, although often incorrectly. She gets into trouble trying to be cool at inappropriate times, but Genryumon members do their best to mitigate the damage."
10070-CharacterSSRNewEn = "One must fight their own battles.\nNo good comes from involving others."

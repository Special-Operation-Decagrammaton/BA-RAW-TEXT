10070-WeaponDescKr = "미나가 애용하는 두 자루 권총.\n\n오른손에 백호, 왼손에 현룡. 이 두 자루의 권총이야말로 최고의 전우……라고 그녀는 주장한다. 이성보다 감성이 중요할 때가 있는지도 모른다."
10070-ProfileIntroductionKr = "산해경 학원의 학생회 <현룡문>의 집행부장이자, 학생회장을 호위하는 직속 경호원.\n\n쿨하고 냉철해 보이는 인상과는 달리, 실상은 중증의 고전 느와르 영화 마니아로, 영화에서나 나올 법한 멋진 상황과 대사를 동경하고 있다. 상황 파악을 하지 못하고 멋을 부리다가 호되게 당하는 일도 종종 있지만, <현룡문>의 부원들은 그녀의 기분이 상하지 않도록 짐짓 모른 척해주고 있다."
10070-CharacterSSRNewKr = "불똥은 혼자서 뒤집어써야지.\n엮여서 좋을 건 없으니까."

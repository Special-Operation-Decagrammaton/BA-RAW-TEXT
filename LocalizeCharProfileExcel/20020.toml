[translation]
20020-StatusMessageTh = "ผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ"
20020-FullNameTh = "อาเกโบชิ ฮิมาริ"
20020-FamilyNameTh = "อาเกโบชิ"
20020-PersonalNameTh = "ฮิมาริ"
20020-SchoolYearTh = "ชั้นปีที่ 3"
20020-CharacterAgeTh = "17 ปี"
20020-BirthdayTh = "10 ธ.ค."
20020-HobbyTh = "ดูดวงรายวัน, เรื่องลึกลับ"
20020-WeaponNameTh = "Clifftop Bloom"
20020-WeaponDescTh = "ปืนพกของฮิมาริ\n\nปืนที่มีลักษณะภายนอกที่สวยงามและเรียบหรู ปกติจะไม่ค่อยเห็นฮิมาริใช้ปืนนี้เท่าไร ซึ่งเธอก็ได้กล่าวเอา\nไว้ว่า \"ปกติแล้วดอกไม้ที่แบ่งบานริมหน้าผาน่ะ ไม่ได้หาดู\nได้ง่ายๆ หรอกนะคะ ฉันก็เหมือนดอกไม้พวกนั้นยังไงล่ะคะ\" "
20020-ProfileIntroductionTh = "อดีตหัวหน้าชมรมเวอริทัส กลุ่มแฮ็กเกอร์แห่งโรงเรียนมิลเลเนียม ปัจจุบันดำรงตำแหน่งเป็นหัวหน้าชมรมปรากฏการณ์ลี้ลับ\n\nแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษ และผู้ที่เป็น 1 ใน 3\nคนที่ได้รับปริญญาบัตรสาขา <ผู้รอบรู้> ที่ถูกบันทึกไว้ในประวัติศาสตร์\nของโรงเรียนมิลเลเนียม แต่ว่าเรื่องนั้นคือเรื่องจริงหรือไม่ และปริญญา\nสาขานั้นมีอยู่จริงหรือไม่นั้นกลับถูกเก็บไว้เป็นความลับ ฮิมาริดูเหมือน\nจะเป็นสาวน้อยแสนสวย... ผู้มากด้วยความลับ นอกจากเรื่องนั้นแล้ว\nเธอนับว่าเป็นแฮ็กเกอร์ยอดอัจฉริยะที่มีอยู่เพียงหยิบมือเท่านั้น และยัง\nมีรสนิยมแปลกๆ ที่ชอบเกี่ยวกับสิ่งลึกลับอีกด้วย"
20020-CharacterSSRNewTh = "ฮุฮุ ถึงเวลาแฮ็กเกอร์สาวอัจฉริยะ\nผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษออกโรงแล้วสินะคะ?"

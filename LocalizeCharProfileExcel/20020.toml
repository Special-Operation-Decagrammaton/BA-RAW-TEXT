[translation]
20020-StatusMessageKr = "밀레니엄 최고의 천재병약미소녀, 네. 저랍니다."
20020-FullNameKr = "아케보시 히마리"
20020-FamilyNameKr = "아케보시"
20020-PersonalNameKr = "히마리"
20020-SchoolYearKr = "3학년"
20020-CharacterAgeKr = "17세"
20020-BirthdayKr = "12월 10일"
20020-HobbyKr = "오늘의 운세 보기, 오컬트 전반"
20020-WeaponNameKr = "절벽 위의 꽃"
20020-WeaponDescKr = "히마리가 가지고 있는 권총.\n\n\r심플하고 아름다운 외관을 자랑하는 총. 평소 히마리가 사용하는 모습을 보기는 힘들지만, '원래부터 절벽 위의 꽃이란 쉬이 눈에 담을 수 없는 법이에요. 마치 저처럼!' 이라고 히마리는 말한다."
20020-ProfileIntroductionKr = "밀레니엄 학원의 해커 동아리 베리타스의 전 부장이자 현 초현상특무부의 부장.\n\n\r자칭 초천재병약미소녀해커이자, 밀레니엄 역사상 단 세 명밖에 받지 못한 학위 <전지>의 소유자라고 하지만. 그게 진실인지, 그런 학위가 실존하는지조차 전부 베일에 싸여있다. 히마리 왈 비밀이 많은 소녀는 아름다운 법… 이라는 모양. 그것과는 별개로 실제 손에 꼽을 실력을 갖춘 천재 해커이며, 동시에 오컬트에 사족을 못 쓰는 기묘한 취향을 가진 소녀이기도 하다."
20020-CharacterSSRNewKr = "후훗, 이건 밀레니엄의 초천재병약미소녀해커가\n\r활약할 차례인 거네요?"

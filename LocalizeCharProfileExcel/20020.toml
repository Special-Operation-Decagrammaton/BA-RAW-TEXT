20020-WeaponDescTw = "陽葵所持有的手槍。\n\n是把外觀簡約美麗的槍。平常很難看到陽葵使用這把槍，他本人表示：「所謂的高嶺之花，本來就不容易看到……就像我一樣吧？」"
20020-ProfileIntroductionTw = "千年科學學園所屬，駭客集團「貝里塔斯」的前部長，現為特異現象搜查部的部長。\n\n自稱是超天才病弱美少女駭客，並取得千年史上僅有三人得到的「全知」學位……至於其說法是真是假，以及該學位是否實存，目前仍包覆在神祕的面紗中。陽葵曾表示「越神祕的女孩越美麗」……也許是吧。不過他確實是能力首屈一指的天才駭客，同時也非常喜歡神祕的事物，是個擁有奇特愛好的少女。"
20020-CharacterSSRNewTw = "呵呵，輪到千年的超天才清楚系病弱美少女駭客\n出場了嗎？"

20020-WeaponNameEn = "Clifftop Bloom"
20020-WeaponDescEn = "Himari's pistol.\n\nA gun with a simple and elegant exterior. Himari uses it sparingly. \"A flower blooming on a rocky clifftop is an extraordinary sight. Just like that flower, I'm in bloom.\" - Himari"
20020-ProfileIntroductionEn = "The former president of Veritas, a hacker club at the Millennium School, and the current president of the Super Phenomenon Task Force.\n\nShe styles herself as a super genius hacker, and claims she has a degree in Omniscience, which only three people have received in Millennium's history. However, no one's ever been able to confirm the existence of such a degree. Himari relishes this, believing that secrets make a girl more beautiful. None can deny that she is an extremely talented hacker with a strange taste for the occult."
20020-CharacterSSRNewEn = "Haha! Is it finally time to shine for Millennium's super genius hacker?"

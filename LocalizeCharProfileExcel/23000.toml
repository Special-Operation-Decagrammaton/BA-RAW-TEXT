23000-ProfileIntroductionKr = "트리니티 방과후 디저트부 소속의 명랑한 부원.\n\n\r느긋하고 여유로운 성품의 소유자로 친구들과 디저트를 먹으며 떠드는 시간을 무엇보다 소중히 여긴다. 좋아하는 디저트는 달콤한 아이스크림으로, 최근에는 민트초코 맛에 푹 빠져있다."

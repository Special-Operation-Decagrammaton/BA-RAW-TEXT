10041-WeaponDescTh = "ปืนยิงมิสไซล์ขนาดใหญ่ที่มิซากิใช้\n\nหลังจากยิงออกไป มิสไซล์จะแยกออกมาเป็น\nกระสุนหลายนัดทำให้เกิดระเบิดเป็นวงกว้าง"

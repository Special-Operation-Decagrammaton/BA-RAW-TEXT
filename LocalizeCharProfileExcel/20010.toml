20010-WeaponDescTw = "和香經常攜帶的衝鋒槍。\n\n主要用於導覽溫泉浴場周邊昏暗的夜路，不過似乎在請擾人的客人回去時也會使用。"
20010-ProfileIntroductionTw = "赤冬聯邦學園所屬，受到停學處分而被禁閉於舊校舍227號特別班級中，碰巧成為了「227號溫泉浴場」女將的學生。\n\n突然於舊校舍湧出的溫泉，使他一口氣變成了有錢人。但也因此，以赤冬為首，開始有許多形形色色的學生來訪，或者是以各種理由來妨礙營業，使他依舊備嘗辛苦。"
20010-CharacterSSRNewTw = "真心誠意地迎接客人！"

20010-WeaponDescKr = "노도카가 늘 휴대하고 있는 기관단총.\n\n보통은 온천장의 어두운 밤길을 안내할 때 쓰이지만, 진상 손님을 응대할 때도 필요하다."
20010-ProfileIntroductionKr = "거대한 온천장을 특별반의 학생들과 함께 운영 중인 227호 온천장의 여주인.\n\n붉은겨울 사무국으로부터 정학 처분을 받은 상황 자체는 변치 않았지만, 구교사에서 갑작스럽게 온천이 터지며 거대한 돈방석에 앉게 되었다. 하지만 개성 강한 붉은겨울 연방학원의 다른 학생들이 여러 가지 이유로 영업을 방해하러 오는 탓에 그녀의 마음고생은 계속된다."
20010-CharacterSSRNewKr = "성심을 다해 손님 여러분을 모시겠습니다!"

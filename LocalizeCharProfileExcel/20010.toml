20010-WeaponDescTh = "ปืนกลมือที่โนโดกะพกติดตัวอยู่เสมอ\n\nปกติจะใช้เพื่อส่องไฟนำทางบนถนนยามค่ำคืนรอบออนเซ็น แต่บางครั้งก็มีประโยชน์ในการจัดการพวกลูกค้าน่ารำคาญ"
20010-ProfileIntroductionTh = "นายหญิงแห่งออนเซ็น No.227 ที่เปิดให้บริการร่วมกับสมาชิกคนอื่นๆ ในห้องเรียนพิเศษ\n\nเนื่องจากยังถูกสั่งพักการเรียนชั่วคราวจากสำนักเลขาธิการเรดวินเทอร์อยู่\nและจู่ๆ ก็เกิดการระเบิดออนเซ็นที่อาคารเรียนเก่าขึ้น ทำให้เธอมีวิธีหา\nเงินก้อนใหญ่ แต่ว่านักเรียนคนอื่นๆของสถาบันสหภาพเรดวินเทอร์ ต่างเข้ามาขัดขวาง การทำธุรกิจไม่หยุดหย่อนด้วยสารพัดเหตุผล ทำให้เธอต้องพยายามอย่างหนักต่อไป"
20010-CharacterSSRNewTh = "เราจะให้บริการคุณอย่างเต็มที่เลยค่ะ!"

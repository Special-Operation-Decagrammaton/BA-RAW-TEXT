10098-ProfileIntroductionTh = "เด็กสาวจอมขี้เกียจ มีตำแหน่งเป็นรองประธานนักเรียน และหัวหน้าคณะกรรมการแผนงาน ของโรงเรียนมัธยมอะบิดอส\n\nโฮชิโนะในรูปลักษณ์ปัจจุบันมาพร้อมกับอาวุธที่เธอเก็บรักษาไว้ต่างหาก เธอในตอนนี้ดูพร้อมกับการต่อสู้มากขึ้น ถึงจะเป็นโฮชิโนะคนเดิม แต่เมื่อติดอาวุธแล้วเธอก็ดูจริงจังกว่าปกติเล็กน้อย"
10098-CharacterSSRNewTh = "ลุงจะขอเอาจริงหน่อยละนะ\nแหะๆ~ แต่ก็เขินอยู่นิดหนึ่งแฮะ"

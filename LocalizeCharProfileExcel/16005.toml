16005-WeaponDescTh = "ปืนลูกซองคู่ที่เป็นอาวุธของซึรุกิ\n\nถึงจะอยู่ในน้ำหรือว่าถูกทรายกลบก็ไม่มีผลต่อพลังการยิง\nที่รุนแรง"
16005-ProfileIntroductionTh = "ประธานชมรมทวงความยุติธรรมแห่งโรงเรียนทรีนิตี้ เธอมาเที่ยวทะเล\nเพื่อตามหาความโรแมนติกตามแบบฉบับวัยรุ่น...\n\nเธอพยายามอย่างเต็มที่เพื่อจะสะกดกลั้นอารมณ์รุนแรงที่ทำให้เธอได้\nรับฉายาว่า \"อาวุธกลยุทธ์แห่งทรีนิตี้\" เอาไว้และสนุกกับวันหยุดพักผ่อน\nตามประสาวัยรุ่น แต่แล้วการมาเที่ยวพักผ่อนที่ทะเลฤดูร้อนกลับไม่ได้\nเป็นไปตามที่เธอคิดเอาไว้"

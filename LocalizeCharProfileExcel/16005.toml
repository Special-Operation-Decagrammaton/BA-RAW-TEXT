16005-WeaponDescKr = "츠루기가 사용하는 두 자루의 산탄총.\n\n모래나 물속에 들어갔다 나와도 아무 문제 없이 포화를 내뿜을 수 있다."
16005-ProfileIntroductionKr = "청춘의 낭만을 좇아 여름 바다를 찾아온 트리니티 정의실현부의 부장.\n\n모처럼 얻은 여름 휴가를 즐기기 위해, 트리니티의 전략병기라고 불릴 만큼 폭력적인 자신의 기질을 억눌러가며 청춘을 즐기려 하지만…… 여름의 바다는 그녀의 뜻대로 흘러가지 않는다."

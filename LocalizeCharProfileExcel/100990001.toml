100990001-ProfileIntroductionKr = "아비도스의 학생회장이자 대책위원회 부장을 맡고 있는 게으름뱅이 소녀.\n\n현재 모습은 호시노가 따로 보관하고 있던 무장을 장비한 것으로, 조금 더 전투에 적합한 상태를 취하고 있다. 언제나의 호시노지만, 무장을 갖춘 것만으로도 평소보다 조금 진지해졌다."

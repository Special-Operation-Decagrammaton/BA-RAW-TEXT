10019-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อาซึสะใช้เป็นประจำ\n\nปืนที่มีคำกล่าวว่า \"ทุกสิ่งล้วนไร้ความหมาย ไม่ว่าจะพยายามเท่าไหร่ก็ไร้ความหมาย\" สลักอยู่ที่ตัวปืน"
10019-ProfileIntroductionTh = "แม่มดน้ำแข็งแห่งชมรมชั้นเรียนเสริม ของสถาบันทรีนิตี้\n\nเธอลาออกจากโรงเรียนเดิม แล้วมาเข้าเรียนที่สถาบันทรีนิตี้ ด้วยเหตุผลบางอย่าง แม้จะเป็นคนขี้เหงา แต่ก็มักเว้นระยะห่างจากคนอื่น เพราะกลัวว่าจะทำให้คนอื่นเดือดร้อน ทำให้นักเรียนคนอื่นจากชมรม ชั้นเรียนเสริมเป็นห่วงเธอ"
10019-CharacterSSRNewTh = "ทุกอย่างเปล่าประโยชน์ และชีวิตก็ไร้ความหมาย\nแต่ว่า... ฉันอยากมีความเชื่อ... เชื่อในตัวคุณยังไงล่ะ"

10019-WeaponDescKr = "아즈사가 아끼는 돌격소총.\n\n\r총열에는 '헛되고 헛되도다 모든 것이 헛되도다.'라는 문구가 새겨져 있다."
10019-ProfileIntroductionKr = "트리니티 보충수업부의 얼음마녀.\n\n\r다니던 학교를 자퇴하고, 모종의 이유로 트리니티 학원에 다니게 되어 다시 학업에 힘쓰고 있다. 외로움을 많이 타면서도 다른 사람들에게 폐를 끼칠까 자발적으로 관계를 멀리하고 있어서 보충수업부의 학생들에게 걱정을 끼치고 있다."
10019-CharacterSSRNewKr = "모든 것은 헛되고 삶에 의미는 없어.\n\r하지만…… 믿고 싶어져. 당신의 말을."

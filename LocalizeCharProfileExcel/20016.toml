20016-WeaponDescEn = "A pistol Iroha carries around.\nSince Iroha is the tank commander of the Pandemonium Society, she always complains that it's cumbersome to carry around something she never uses. But she still maintains it perfectly, which is typical Iroha-behavior."
20016-ProfileIntroductionEn = "A member of the Pandemonium Society.\n\nThere's nothing Iroha hates more than being bothered. She spends much of her time trying to figure out how to escape company. She even constantly carries a book around so people will leave her alone, but the Pandemonium Society (Makoto, to be exact) always interrupts her anyway. She begrudgingly serves as an executive of the Pandemonium Society, only finding comfort in their mascot, Ibuki."
20016-CharacterSSRNewEn = "Do you need me? Oh, well. All right, then."

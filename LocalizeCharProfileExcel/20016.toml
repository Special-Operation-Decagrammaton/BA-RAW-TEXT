20016-WeaponNameTh = "Pandemonium Society Standard Gun"
20016-WeaponDescTh = "ปืนพกที่อิโรฮะใช้เป็นประจำ\n\nในฐานะที่อิโรฮะเป็นหัวหน้าพลขับรถถังของทาง\nแพนเดโมเนียม โซไซตี้ เธอจึงไม่ค่อยได้มีโอกาสใช้ปืนพก\nและมักจะบ่นว่ามันเป็นปัญหาอยู่เสมอ แต่เธอก็คอยดูแล\nบำรุงรักษาอย่างดีสมกับเป็นอิโรฮะ"
20016-ProfileIntroductionTh = "สมาชิกของแพนเดโมเนียมโซไซตี้\n\nเด็กสาวผู้ที่เกลียดสิ่งที่น่ารำคาญเป็นที่สุดจนเธอมักจะหาทางหนี จากสิ่งที่น่ารำคาญอยู่บ่อยๆ อิโรฮะมักจะแกล้งทำเป็นอ่านหนังสือ และพยายามหลบหลีกไม่ให้เตะตาคนอื่น แต่ความพยายามของเธอ ก็มักถูกสมาชิกแพนเดโมเนียม (ให้เจาะจงก็คือมาโคโตะ) ทำลาย เธอต้องคอยทำงานต่างๆ ของแพนเดโมเนียม โซไซตี้ และมักจะมี สีหน้าที่อิดโรยจากงานอยู่เสมอ และผู้ที่คอยเป็นที่พึ่งให้อิโรฮะอยู่ตลอด ก็มีเพียงอิบูกิมาสคอตของแพนเดโมเนียม โซไซตี้เท่านั้น"
20016-CharacterSSRNewTh = "ต้องการฉันงั้นเหรอคะ?\nช่วยไม่ได้นะคะ..."

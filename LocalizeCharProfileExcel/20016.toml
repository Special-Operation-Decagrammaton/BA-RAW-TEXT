20016-WeaponDescKr = "이로하가 휴대하고 있는 권총.\n\n만마전의 전차장을 맡고 있는 이로하로서는 평소 사용할 일이 많지 않아 늘 거추장스럽다고 불평하고 있지만, 정작 매일 같이 빈틈없이 정비해두고 있는 부분이 이로하답다."
20016-ProfileIntroductionKr = "판데모니움 소사이어티 소속의 의원.\n\n귀찮은 걸 극도로 싫어해 언제나 도망칠 궁리를 하고 있는 귀차니스트. 매번 독서하는 척을 하며, 남의 눈에 띄지 않도록 숨으려고 드는 이로하지만. 그 시도는 번번이 만마전(정확히는 마코토)에 의해 저지당하고 있다. 하는 수 없이 만마전의 업무를 대행하며 피곤한 나날을 보내고 있는 만마전의 실무자. 그런 이로하에게 있어 유일한 안식처가 되어주는 것은 만마전의 마스코트인 이부키 뿐이다."
20016-CharacterSSRNewKr = "제가 필요하신 거죠?\n이것 참, 어쩔 수 없네요."

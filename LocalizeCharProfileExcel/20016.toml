20016-WeaponDescTw = "伊呂波攜帶的手槍。\n\n身為萬魔殿戰車長的他很少有使用的機會，雖然就算只有這種尺寸也時常說隨身攜帶很麻煩，但是他卻還是每天一絲不苟地整理維護，能從中看出與伊呂波相似的地方。"
20016-ProfileIntroductionTw = "格黑娜學園所屬，「萬魔殿」的議員之一。\n\n雖然基本上是個討厭麻煩的人，但他所屬的格黑娜學園卻總是問題百出，且學生會「萬魔殿」（準確來說是真琴）自然是不會讓他如意的。\n是個時常把「真沒辦法」、「好麻煩」掛在嘴邊，淡然面對源源不斷產生的問題與業務的中階管理者。被同樣所屬「萬魔殿」，如吉祥物一般的存在「伊吹」所治癒，今天也一邊嘆著氣一邊執行著業務。"
20016-CharacterSSRNewTw = "……需要我？\n真是的，真沒辦法呢"

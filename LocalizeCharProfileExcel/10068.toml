10068-WeaponDescEn = "Reisa's precious shotgun.\n\nIt's immediately obvious whose weapon this is with the carefully customized gun barrel. She may be small and cute, but her experience defending justice in Trinity makes her just as fierce!"
10068-ProfileIntroductionEn = "A member of the Vigilante Crew who tends to show up suddenly and unannounced.\n\nReisa is rambunctious and loud, so much so that she's often taken for a joke. But there's no one more passionate about Vigilante Crew activities than she is. She likes to make an entrance when she bursts on to the scene, and is always testing out different heroic introductions."
10068-CharacterSSRNewEn = "The ace, hero, arbitrator, knight, and star. I am...Uzawa Reisa!"

10068-WeaponDescKr = "레이사의 소중한 산탄총.\n\n정성스럽게 커스터마이징된 총신은 누가 봐도 레이사 본인의 총이다. 귀여운 외관과 달리, 굉장한 수의 전장을 헤쳐 나온 경험이 담겨 있다."
10068-ProfileIntroductionKr = "트리니티 곳곳에서 갑작스레 출몰하는 자경단 멤버.\n\n요란하고 시끄러운 분위기 때문에 장난으로 오인을 받을 때도 있지만, 사실 누구보다 진지하게 자경단 활동을 하고 있다. 늘 자기소개를 하지만 그때마다 멘트가 조금씩 달라진다."
10068-CharacterSSRNewKr = "에이스, 히어로, 심판자, 기사, 스타.\n그리고……. 우자와, 레이사."

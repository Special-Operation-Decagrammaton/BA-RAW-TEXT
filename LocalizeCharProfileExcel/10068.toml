10068-HobbyTh = "ขอท้าต่อสู้, แนะนำตัวเอง"
10068-WeaponNameTh = "Shooting☆Star"
10068-WeaponDescTh = "ปืนลูกซองที่เรอิสะหวงแหน\n\nปืนที่ใครเห็นก็รู้ว่าถูกปรับแต่งอย่างเอาใจใส่เพื่อเรอิสะโดยเฉพาะ แม้จะมีรูปลักษณ์ที่น่ารัก แต่ก็ผ่านการต่อสู้มาแล้วหลายสมรภูมิ"
10068-ProfileIntroductionTh = "สมาชิกกลุ่มรักษาความสงบที่มาปรากฏตัวอย่างกะทันหันในทรีนิตี้\n\nนิสัยที่เอะอะวุ่นวายทำให้บางครั้งเธอถูกเข้าใจผิด แต่ในความเป็นจริง เธอทำงานให้กลุ่มรักษาความสงบอย่างจริงจังมากกว่าใคร แม้จะชอบพูดแนะนำตัวตลอดเวลา แต่ทุกครั้งก็จะเปลี่ยนคำพูดไปทีละนิด"
10068-CharacterSSRNewTh = "เอซ ฮีโร่ ผู้พิพากษา อัศวิน สตาร์\nและฉันคือ... อุซาวะ เรอิสะ!"

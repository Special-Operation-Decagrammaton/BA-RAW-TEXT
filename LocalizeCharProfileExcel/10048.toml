10048-WeaponDescKr = "사오리가 사용하는 돌격소총.\n\n철저히 효율만을 고려하여 사오리가 직접 커스텀 한 물건. 그 총구로 한 번 먹잇감을 포착하면, 대상을 쓰러트리기 전까진 절대로 목표물을 놓치지 않는다."
10048-ProfileIntroductionKr = "아리우스 학원 내에서 엘리트 특수 부대로 취급되고 있는 아리우스 스쿼드의 리더.\n\n목표를 위해서라면 수단과 방법을 가리지 않는 냉정한 모습과 때로 감정을 솔직하게 드러내는 뜨거운 모습이 공존하는 소녀. 게릴라 전술에 대해서는 타의 추종을 불허하는 전문가이지만, 정작 생활 상식에선 나사가 빠진 모습을 보이기도 한다. 아리우스 스쿼드의 전투력은 처음부터 끝까지 사오리가 훈련시킨 결과라고 한다."
10048-CharacterSSRNewKr = "아직도 길 위에서 헤매고 있지만,\n그래도 언젠가는......."

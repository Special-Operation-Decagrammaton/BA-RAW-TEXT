10048-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ซาโอริใช้\n\nปืนที่ซาโอริปรับแต่งด้วยตัวเองโดยคำนึงถึงประสิทธิภาพ\nอย่างละเอียด เมื่อเล็งเป้าหมายแล้ว จะไม่มีวันยิงพลาด\nจนกว่าเป้าหมายนั้นจะพ่ายแพ้ไป"
10048-ProfileIntroductionTh = "หัวหน้าของสควอดของอาเรียสที่นับเป็นกองกำลังพิเศษชั้นยอด ภายในโรงเรียนสาขาอาเรียส\n\nเด็กสาวสองขั้วที่ดูเย็นชาและทำได้ทุกวิถีทางเพื่อให้บรรลุเป้าหมาย แต่บางครั้งก็เผลอแสดงอารมณ์ของตัวเองออกมาอย่างซื่อตรง\nเธอเป็นผู้เชี่ยวชาญด้านยุทธวิธีกองโจรที่ไม่มีใครเทียบได้ แต่ก็เป็น\nเด็กสาวที่ยังขาดทักษะทั่วไปที่ใช้ในชีวิตประจำวัน กล่าวกันว่าความ\nสามารถในการต่อสู้อันเหนือชั้นของสควอดของอาเรียส เป็นผลมาจาก\nการเคี่ยวฝึกฝนของซาโอริตั้งแต่ต้นจนจบ"
10048-CharacterSSRNewTh = "ฉันยังคงเดินวนอยู่บนเส้นทางนี้\nแต่ในสักวันหนึ่ง..."

10048-WeaponDescTw = "沙織使用的突擊步槍。\n\n由沙織獨力改造，徹底追求效率的槍械。一旦鎖定獵物，直到對方倒下之前絕不會讓目標逃走。"
10048-ProfileIntroductionTw = "奧利斯分校所屬，學園內被視為精英特殊部隊的奧利斯小隊隊長。\n\n同時具有為達目的不擇手段的冷靜，以及時而表現出的激情。在游擊戰術上是他人無法匹敵的專家，不過在日常生活中也能見到他不諳世事的一面。據說奧利斯小隊的戰鬥力，正是他所訓練出來的成果。"
10048-CharacterSSRNewTw = "還在半途中迷惘──\n即使如此，總有一天……"

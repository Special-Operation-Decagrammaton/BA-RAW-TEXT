20042-ProfileIntroductionTw = "適逢寒冬而換上溫暖衣物的貝里塔斯的成員。\n\n雖然因為突然必須離開溫暖的室內進行戶外活動而略顯消沉，不過在從陌生的環境汲取到新的靈感後已漸漸開始適應。然而無法連接能夠分享這股獨特靈感的網路論壇，似乎依然令他感到有點遺憾。"

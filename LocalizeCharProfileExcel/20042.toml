20042-WeaponDescKr = "마키가 그라피티를 그릴 때 자주 사용하는 다목적 기관총.\n\n캠핑이나 야외 활동에 가져가기에는 조금 무거운 편이지만, 불타는 예술혼은 장소를 가리지 않는다."
20042-ProfileIntroductionKr = "추운 겨울을 대비하여 포근한 옷으로 갈아입은 베리타스의 부원.\n\n따듯한 실내를 떠나 뜻밖의 야외 활동을 하게 되어 다소 의기소침해진 상태지만, 낯선 풍경에서 새로운 영감을 얻어가며 그럭저럭 적응해 나가고 있다. 다만 이 독특한 영감을 공유하기 위한 온라인 커뮤니티에 접속할 수 없다는 사실 만큼은 조금 유감이다."
20042-CharacterSSRNewKr = "이 영감을 담아낼 수 있는 좋은 캔버스가 어디 없을까?"

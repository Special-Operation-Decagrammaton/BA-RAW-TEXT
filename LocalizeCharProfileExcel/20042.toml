20042-WeaponDescJp = "Maki's multipurpose machine gun, often used to write graffiti.\n\nIt's a bit too heavy to bring along to camping trips and other outdoor activities, but her burning passion for art is not limited by location."
20042-ProfileIntroductionJp = "A member of Veritas who dressed up in warm clothes to fight the cold winter.\n\nAlthough she's feeling a bit down from leaving the warm indoors for unexpected outdoor activities, she's getting new inspirations from the unfamiliar scenery, and is making it through somehow. It's a bit of a shame that she can't log in to online communities to share this unique inspiration."
20042-CharacterSSRNewJp = "Is there a good canvas I can use to express this inspiration?"

20042-WeaponDescTh = "ปืนกลอเนกประสงค์ที่มากิใช้บ่อยๆ ตอนทำงานกราฟิตี้\n\nปืนนี้อาจหนักไปหน่อยที่จะเอามาออกแคมป์\nหรือทำกิจกรรมกลางแจ้ง แต่จิตวิญญาณที่ร้อนแรงของศิลปะ\nก็ไม่ถูกจำกัดด้วยสถานที่อยู่แล้ว"
20042-ProfileIntroductionTh = "สมาชิกชมรมเวอริทัสที่เปลี่ยนมาใส่ชุดที่อบอุ่นเพื่อเตรียมรับฤดูหนาวที่หนาวเย็น\n\nมากิรู้สึกหดหู่เล็กน้อยที่ต้องออกจากห้องที่อบอุ่นมาทำกิจกรรมกลางแจ้งอย่างไม่\nคาดคิด แต่ก็พอปรับตัวได้บ้างเพราะได้รับแรงบันดาลใจใหม่ๆ จากสภาพแวดล้อม\nที่ไม่คุ้นเคย แต่สิ่งที่เสียใจก็คงเป็นการที่เธอไม่สามารถเข้าถึงชุมชนออนไลน์ เพื่อแบ่งปันแรงบันดาลใจที่พิเศษนี้ได้"
20042-CharacterSSRNewTh = "พอจะมีผ้าใบดีๆ ที่ใส่แรงบันดาลใจนี้ลงไปได้มั้ยนะ?"

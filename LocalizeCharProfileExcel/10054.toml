10054-WeaponDescTw = "瑪麗持有的手槍。\n\n平時只是用於發射宣告比賽開始的信號彈這類和平的用途……但偶爾也會在無意間將槍口指向不良學生。"
10054-ProfileIntroductionTw = "三一綜合學園所屬，為了參加晄輪大祭而換上體育服的修女會少女。\n\n聽到「為奇普托斯的和平祈禱的慶典」這句話，他便以愉悅的心情自願接下實行委員的工作。但出乎意料的是，大會期間爭執與糾紛不斷，再加上特有的獻身性格，使得他一直被捲入麻煩之中。"
10054-CharacterSSRNewTw = "希望大家能帶著微笑\n度過這次的大運動會……"

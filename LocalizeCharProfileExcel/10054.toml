10054-WeaponDescEn = "A pistol carried by Mari.\n\nIt's usually used for peaceful purposes, such as to signal the start of a match. However, at times Mari finds it inadvertently pointed towards troublemaking students. "
10054-ProfileIntroductionEn = "A student from the Sisterhood. She's dressed in track clothes to participate in the Kivotos Halo Festival.\n\nShe eagerly volunteered for the Executive Committee, believing deeply in the festival's purpose: wishing for peace in Kivotos. However, the festival has been mired in trouble and conflict, and, due to her dedication, Mari has been caught up by it too."
10054-CharacterSSRNewEn = "May we enter this field day as competitors and leave as friends..."

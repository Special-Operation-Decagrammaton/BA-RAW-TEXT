[translation]
10054-StatusMessageTh = "ขอให้เป็นเทศกาลที่มีแต่สันติสุขค่ะ"
10054-FullNameTh = "อิโอจิ มารี"
10054-FamilyNameTh = "อิโอจิ"
10054-PersonalNameTh = "มารี"
10054-SchoolYearTh = "ชั้นปีที่ 1"
10054-CharacterAgeTh = "15 ปี"
10054-BirthdayTh = "12 ก.ย."
10054-HobbyTh = "สวดภาวนา, การคิดไตร่ตรอง"
10054-WeaponNameTh = "Piety"
10054-WeaponDescTh = "ปืนพกที่มารีมักจะพกติดตัวไปด้วยเสมอ\n\nปกติจะมีไว้ใช้เพื่อสร้างความสงบสุข เช่นเดียวกับการใช้\nเป็นปืนยิงบอกสัญญาณเริ่มการแข่งขัน แต่ก็มีบางครั้ง\nที่มารีเผลอใช้ปืนนี้กับกลุ่มนักเลงโดยไม่ได้ตั้งใจ "
10054-ProfileIntroductionTh = "เด็กสาวจากชมรมซิสเตอร์ที่เปลี่ยนโฉมมาใส่ชุดพละเพื่อเข้าร่วมงาน\nฮาโลเฟสติวัลในครั้งนี้\n\nเธอภาวนาถึงงานเทศกาลที่สงบสุข และสมัครเข้าไปช่วยงานของ\nคณะกรรมการจัดงานด้วยความยินดี แต่ว่าคำภาวนาของเธอไม่เป็นผล เกิดการต่อสู้และปัญหาต่างๆ ตลอดงานเทศกาล ด้วยบุคลิกที่เป็นคนเอื้อเฟื้อและมีน้ำใจ ทำให้เธอพบกับปัญหาต่างๆ นาๆ อย่างไม่หยุดหย่อน"
10054-CharacterSSRNewTh = "หวังว่าทุกคนจะเก็บความไม่พอใจกันเอาไว้\nแล้วมาร่วมมือกันในงานมหกรรมกีฬาครั้งนี้..."

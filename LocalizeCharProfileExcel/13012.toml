13012-HobbyTh = "เสาะหาร้านเด็ด"
13012-WeaponNameTh = "Valkyrie Service Pistol No.3"
13012-WeaponDescTh = "ปืนพกรุ่นมาตรฐานที่คิริโนะได้รับจากสถาบันฝึกตำรวจวัลคิรี่\n\nคิริโนะมักพูดว่าที่ทักษะการยิงปืนของเธออยู่ในเกณฑ์ต่ำกว่า\nมาตรฐานก็เป็นเพราะปืนพกด้ามนี้"
13012-ProfileIntroductionTh = "นักเรียนตำรวจผู้แสนกระตือรือร้นจากสำนักรักษาความปลอดภัยแห่งสถาบันฝึก ตำรวจวัลคิรี่\n\nด้วยความเลื่อมใสในเหล่ารุ่นพี่ที่คอยดูแลความปลอดภัยให้กับเมืองแห่งการศึกษา เธอจึงสมัครเข้าเรียนที่สถาบันฝึกตำรวจวัลคิรี่ แต่เนื่องจากมีทักษะการยิงปืนที่ต่ำ กว่าเกณฑ์ จึงถูกย้ายมายังสำนักรักษาความปลอดภัยแทน แต่ว่าเธอก็ยังคงพยายามทำงานอย่างหนัก และไม่ละทิ้งความฝันที่จะได้เป็น เจ้าหน้าที่ตำรวจที่เก่งกาจที่สามารถปราบปรามเหล่าอาชญากรได้"

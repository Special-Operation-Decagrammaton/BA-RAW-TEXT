13012-WeaponDescKr = "키리노가 발키리 경찰학교에서 지급받은 제식 권총.\n\n키리노는 자신의 형편없는 사격 실력을 종종 이 권총의 탓으로 돌리곤 한다."
13012-ProfileIntroductionKr = "발키리 경찰학교 생활안전국의 열혈 경찰 학생.\n\n학원도시의 치안을 유지하는 선배들의 모습을 동경해 발키리 경찰 학교에 진학하였으나, 사격솜씨가 형편 없었던 탓에 한직인 생활안전국으로 전과하게 되었다. 하지만 여전히 범인을 멋지게 제압하는 경찰이 되고자 하는 꿈을 버리지 않고 여러 방면에서 노력하고 있다."

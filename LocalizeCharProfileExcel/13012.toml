13012-WeaponDescTw = "女武神警察學園配發給桐乃的制式手槍。\n\n雖然桐乃認為自己的槍法古怪是因為這把槍有問題，但槍沒有任何異常。"
13012-ProfileIntroductionTw = "女武神警察學園所屬，生活安全局的熱血系學生。\n\n因為憧憬警察維持學園都市治安的英姿而就讀女武神警察學園，但由於槍法上的致命傷，所以被安插在生活安全局。\n即使如此，他仍為了當上能華麗壓制犯人的警察的夢想而不放棄，每天都在努力著。"

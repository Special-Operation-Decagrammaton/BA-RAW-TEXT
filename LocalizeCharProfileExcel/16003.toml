16003-ProfileIntroductionKr = "트리니티 학생들의 안전을 책임지는 자경단의 멤버.\n\n\r트리니티의 학생들이 다른 학원에게 습격당하는 일이 잦아지자, 이를 막기 위해 자진하여 거리 순찰을 나서기 시작했다. 불타는 정의감 때문에 냉철하고 차가운 성격으로 오해받는 일이 잦지만, 사실은 상냥한 면모도 가지고 있다."

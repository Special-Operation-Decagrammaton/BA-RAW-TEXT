16010-ProfileIntroductionKr = "대운동회를 맞이해 치어리더 차림을 한 엔지니어부의 부원.\n\n평소의 코스프레 취미로 다져진 재봉 스킬을 살려 엔지니어부의 부원들이 입을 의상을 직접 디자인하고 제작했다. 다만 치어리더 의상은 오래전에 만들어 두었던 것을 재활용한지라, 짧은 치마의 길이가 살짝 신경 쓰인다."

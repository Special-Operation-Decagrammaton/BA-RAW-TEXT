16010-WeaponDescTh = "ปืนครกที่ฮิบิกิใช้เป็นประจำ\n\nฮิบิกิจะเก็บปืนเอาไว้ในกระเป๋าเพื่อให้ง่ายต่อการเคลื่อน\nย้ายในระหว่างเชียร์กีฬา"
16010-ProfileIntroductionTh = "สมาชิกชมรมวิศวกรรมที่เปลี่ยนโฉมใหม่มาเป็นหัวหน้ากองเชียร์ในงานมหกรรม\nแข่งขันกีฬา\n\nด้วยทักษะการตัดเย็บชุดคอสเพลย์เป็นงานอดิเรก เธอจึงออกแบบชุดให้กับ\nสมาชิกชมรมวิศวกรรมใส่ด้วยตัวเอง แต่ว่าชุดเชียร์ลีดเดอร์เป็นชุดเก่าที่\nเคยตัดเอาไว้แล้ว เธอจึงค่อนข้างกังวลว่าชุดจะสั้นเกินไป"

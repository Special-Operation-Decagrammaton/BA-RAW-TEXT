[translation]
16006-StatusMessageTh = "นี่คือทริปสำหรับตามหาของอร่อยในฤดูร้อนล่ะ!"
16006-FullNameTh = "ชิชิโทอุ อิซุมิ"
16006-FamilyNameTh = "ชิชิโทอุ"
16006-PersonalNameTh = "อิซุมิ"
16006-SchoolYearTh = "ชั้นปีที่ 2"
16006-CharacterAgeTh = "16 ปี"
16006-BirthdayTh = "11 พ.ค."
16006-HobbyTh = "ทำและกินอาหารแปลกๆ"
16006-WeaponNameTh = "Daily Cutlery"
16006-WeaponDescTh = "ปืนกลหนักที่อิซุมิใช้เป็นประจำ\n\nไม่ว่าจะบนบกหรือในน้ำ ปืนของอิซุมิก็พร้อมสำหรับการบุกไปชิมอาหารในฤดูร้อน! อีกทั้งยังมาพร้อมกับฟังก์ชั่นกันน้ำอีกด้วย!"
16006-ProfileIntroductionTh = "เด็กสาวสมาชิกชมรมชิมอาหาร โรงเรียนเกเฮนน่าที่รักการกินเป็นชีวิตจิตใจ\nแม้ในฤดูร้อนที่อากาศร้อนจัด\n\nและในฤดูร้อนนี้ เธอได้ถือแตงโมและกล่องน้ำแข็งไปที่ชายหาดในคิโวทอส\nเพื่อค้นหาอาหารสุดพิเศษของฤดูร้อน เช่น ปลาไหลย่างรสช็อกโกแลต\nน้ำแข็งไสรสเผ็ดจัดจ้าน แตงโมที่โรยด้วยช็อกโกแลตมินต์ และอื่นๆ\nอิซุมิเป็นนักชิมและนักค้นหาอาหารเลิศรส ที่ไม่เป็นสองรองใครในคิโวทอส\nและถึงแม้จะเป็นทะเลที่ร้อนจัดในฤดูร้อน การตามหาอาหารแสนอร่อยของ\nเธอก็ยังคงดำเนินต่อไป"

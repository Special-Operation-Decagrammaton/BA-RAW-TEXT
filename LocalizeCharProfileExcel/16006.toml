16006-WeaponDescKr = "이즈미가 사용하는 묵직한 기관총.\n\n오늘도 이즈미의 총은 여름의 미식을 찾아 어김없이 불을 뿜는다! 방수기능도 완비!"
16006-ProfileIntroductionKr = "게헨나 미식연구회의 일원으로 무더운 여름에도 식욕이 왕성한 먹보 소녀.\n\n여름을 맞이해, 한 손엔 수박을, 다른 한 손에는 아이스박스를 들고선 이름난 여름 별미를 찾아 이번엔 특별히 키보토스의 해변가를 찾아왔다. 초코맛 장어구이, 매운맛 빙수, 민트초코를 뿌린 수박 등등. 키보토스에서도 둘째 가라면 서러울 각종 별미를 추구하는 그녀의 괴식 탐구 활동은, 뜨거운 여름 바다에서도 계속해서 이어진다."

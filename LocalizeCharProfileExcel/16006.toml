16006-WeaponDescEn = "A heavy machine gun used by Izumi.\n\nEven now, Izumi's gun burns in search of a gourmet summer experience! It's even complete with waterproof functionality!"
16006-ProfileIntroductionEn = "A Gehenna Gourmet Research Society member with a gluttonous appetite even during the summer.\n\nShe visits the beach with a watermelon in one hand and an ice cooler in the other in search of renown summer delicacies: Chocolate-flavored grilled unagi, spicy shaved ice, watermelon sprinkled with mint chocolate, and more. Her pursuit of various delicacies in Kivotos are second to none as her peculiar excursions continue even on the hot summer beach."

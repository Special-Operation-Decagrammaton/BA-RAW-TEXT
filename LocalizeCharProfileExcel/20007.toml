20007-WeaponDescTh = "ปืนขนาดใหญ่ที่มิกุใช้สำหรับยิงไอเทมต่างๆ เช่นเสื้อเชิ้ตไปให้แฟนๆ ในคอนเสิร์ต\n\nที่ตัวปืนมีไฟแอลอีดีประดับอยู่ที่ ดังนั้นในคอนเสิร์ตจะมีแสงไฟสวยงามสว่างขึ้นพร้อมรับ จังหวะเสียงดนตรีในคอนเสิร์ต"
20007-ProfileIntroductionTh = "นักร้องเสมือนที่มีบุคลิกสดใสและชอบร้องเพลง\n\nเดิมทีมิกุเป็นนักร้องเสมือนเท่านั้น แต่ด้วยเทคโนโลยีของคิโวทอสทำให้เธอ\nสามารถมีตัวตนขึ้นมาบนโลกแห่งความจริงได้ ด้วยความที่เธอเป็นนักร้อง\nผู้ที่ขับขานเสียงเพลงผ่านกาลเวลาได้อย่างไร้ขีดจำกัด\nทำให้เธอมีแฟนคลับลับๆ มากมายในคิโวทอส"
20007-CharacterSSRNewTh = "มาฟังเพลงของฉันกันนะคะ!"

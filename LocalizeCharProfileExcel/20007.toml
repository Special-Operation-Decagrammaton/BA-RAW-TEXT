[translation]
20007-StatusMessageKr = "키보토스에서의 라이브 콘서트, 기대해 주세요!"
20007-FullNameKr = "하츠네 미쿠"
20007-FamilyNameKr = "하츠네"
20007-PersonalNameKr = "미쿠"
20007-CharacterAgeKr = "16세"
20007-BirthdayKr = "8월 31일"
20007-HobbyKr = "노래, 댄스"
20007-WeaponNameKr = "공연용 티셔츠 캐논"
20007-WeaponDescKr = "미쿠가 공연에서 티셔츠와 같은 굿즈를 나누어 줄 때 사용하는 거대한 가스건.\n\n표면에는 다이오드 등이 박혀 있어 콘서트의 음악에 맞추어 아름다운 빛으로 반짝인다."
20007-ProfileIntroductionKr = "노래 부르기를 좋아하는 명랑한 성격의 버추얼 싱어.\n\n본래는 현실의 신체를 갖지 않은 가상의 존재였지만, 라이브 공연을 앞두고 키보토스의 기술력을 빌려 현실 세계로 나오게 되었다. 시간과 공간을 초월하여 노래를 전달할 수 있는 버추얼 싱어의 특성상 키보토스에도 그녀의 숨은 팬이 꽤 존재한다고 한다."
20007-CharacterSSRNewKr = "제 노래를 들어주세요!"

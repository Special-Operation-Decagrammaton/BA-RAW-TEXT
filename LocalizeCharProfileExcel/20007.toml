20007-ProfileIntroductionTw = "常保開朗，最喜歡唱歌的虛擬歌手。\n\n原本是沒有現實身體的電子存在，但在奇普托斯的技術幫助下獲得了肉體，來到這個世界。因為虛擬歌手的歌聲可以超越時間與空間，奇普托斯也有許多他的隱藏粉絲，非常期待能在這個世界舉辦預定的演唱會。"

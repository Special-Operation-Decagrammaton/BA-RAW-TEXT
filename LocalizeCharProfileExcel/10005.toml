10005-WeaponDescKr = "호시노가 애용하는 심플한 디자인의 산탄총.\n\n게으름 부리길 좋아하는 호시노이지만 총기의 상태만큼은 언제나 완벽하다."
10005-ProfileIntroductionKr = "아비도스의 부학생회장이자 대책위원회 부장을 맡고 있는 게으름뱅이 소녀.\n\n아저씨 같은 말투를 즐겨 쓰며 업무보다는 장난치기를 좋아한다. 때문에 평상시에는 위원회 회원들에게 자주 혼나지만, 일단 임무가 시작되면 다른 아이들을 지켜주기 위해 가장 앞에서 분투한다."
10005-CharacterSSRNewKr = "낮잠 시간은 한참 지났는데 말이지.\n뭐, 어쩔 수 없나."

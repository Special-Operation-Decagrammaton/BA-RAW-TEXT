10005-ProfileIntroductionTw = "阿拜多斯高中所屬，阿拜多斯學生會的前副會長，現在擔任對策委員會委員長的懶惰蟲少女。\n\n特徵是像大叔一樣的口氣，比起工作更喜歡玩樂。\n因此他平常老是被委員會的成員們罵，不過一旦任務開始，他就會為了保護其他成員在最前線奮戰。"

10081-WeaponNameKr = "백화요란 제식 소총 - 소녀의 결의"
10081-WeaponDescKr = "유카리가 사용하는 백화요란의 제식 소총.\n\n과거 중학생 때 처음으로 눈에 각인한 동경의 상징이자, 소녀가 꿈을 꾼 끝에 각고의 노력을 통해 마침내 손에 넣은 결의의 증거. 거기에 담겨 있는 마음은 결코 그 누구에게도 지지 않는다."
10081-ProfileIntroductionKr = "백귀야행 학원 백화요란 분쟁조정위원회의 1학년 부원\n\n유서 깊은 카데노코지 가문의 후계자이지만, 가문의 업을 잇기보다 과거 자신이 동경하게 된 백화요란에 입부하기를 선택한 소녀. 거기에 강한 자부심을 가지고 있으며, 행동력만큼은 타의 추종을 불허한다. 때로는 문제에 부닥쳐 쓰러질 때도 있지만, 금세 밝은 얼굴로 훌훌 털고 일어나기를 주저하지 않는 장한 성격. 백화요란의 선배들을 존경하고 있으며, 그중에서도 특히나 나구사를 존경하고 있다."
10081-CharacterSSRNewKr = "저 유카리! 쾌진격의 시간이어요!"

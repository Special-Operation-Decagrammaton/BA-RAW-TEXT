10081-StatusMessageTh = "ท่านอาจารย์! ข้าเล่น MOMOTALK แล้วเจ้าค่ะ!"
10081-FullNameTh = "คาเดโนะโคจิ ยูคาริ"
10081-FamilyNameTh = "คาเดโนะโคจิ"

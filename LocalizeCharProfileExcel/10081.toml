10081-HobbyTh = "สวดอธิษฐาน, ค้นหาขนมใหม่ๆ"
10081-WeaponNameTh = "Hyakkaryouran Rifle - A Girl's Determination"
10081-WeaponDescTh = "ปืนไรเฟิลรุ่นมาตรฐานของเฮียกกะเรียวรันที่ยูคาริใช้\n\nเป็นทั้งสัญลักษณ์ของความปรารถนาอันแรงกล้าที่เธอมี\nในวัยมัธยมต้น ความตั้งใจจริง และความพยายามอย่าง\nเต็มที่ที่จะทำตามความฝัน และมีเจตนารมณ์ที่ไม่ยอม\nสยบให้ใครแฝงอยู่ในนั้น"
10081-ProfileIntroductionTh = "สมาชิกชั้นปีที่ 1 จากคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\n\nเธอเป็นทายาทตระกูลคาเดโนะโคจิที่มีประวัติยาวนาน แต่ก็เลือกที่จะ\nเข้าชมรมเฮียกกะเรียวรันที่ตัวเองปรารถนามากกว่าจะสืบทอดงานของ\nตระกูล\nเธอเป็นคนมีความทะนงตัวเป็นอย่างมาก เรื่องพลังที่ล้นเหลือไม่เป็น\nรองใคร ถึงบางครั้งจะเจอปัญหาจนเสียสูญ แต่ด้วยนิสัยใจคอที่เข้มแข็ง เธอก็พร้อมจะลุกขึ้นมาใหม่ด้วยใบหน้าที่มีรอยยิ้มสดใส เธอเคารพ\nรุ่นพี่ในเฮียกกะเรียวรัน โดยเฉพาะนางุสะที่เธอเคารพมากเป็นพิเศษ"
10081-CharacterSSRNewTh = "ข้าน้อย...ยูคาริ!\nนี่คือเวลาแห่งความก้าวหน้าของข้าเจ้าค่ะ!"

10081-WeaponDescEn = "Yukari's standard-issue Hyakkaryouran rifle.\n\nThese standard rifles were objects of admiration for her back in middle school. Finally owning one is proof of how hard she's worked to achieve her dream. She's known for her limitless determination."
10081-ProfileIntroductionEn = "A first-year member of Hyakkiyako's Hyakkaryouran Resolution Council.\n\nDespite being a descendant of the historic Kadenokouji family, she admired the Hyakkaryouran and joined them instead of following her duties. She has a strong sense of pride in being a member, and nothing can stop her from doing all she can to serve the council. It's not an easy path, but she's strong and easily brushes things off. She really looks up to the upperclassmen of Hyakkaryouran, especially Nagusa."
10081-CharacterSSRNewEn = "It's time! Here I come!"

10081-WeaponDescTw = "紫所使用的百花繚亂制式步槍。\n\n是在中學時期初次銘刻於眼中的憧憬象徵，也是少女在刻苦努力後實現了夢想的證明。其中蘊含的心意絕對不會輸給任何人。"
10081-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會的一年級生。\n\n雖然是歷史悠久的勘解由小路家族的繼承人，但是比起繼承家族的事業，優先選擇加入了自己昔日所憧憬的百花繚亂。對此懷抱強烈的自豪感，有著無人能及的行動力。儘管有時會因遭遇困難而感到挫敗，卻總是能隨即展現出開朗的一面，毫不遲疑地重新振作。對百花繚亂的前輩們心懷敬意，其中格外尊敬名草。"
10081-CharacterSSRNewTw = "勘解由小路紫！快速進擊的時刻到了！"

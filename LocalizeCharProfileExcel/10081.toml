[translation]
10081-StatusMessageKr = "선생님! 소녀도 모모톡에 가입했사와요!"
10081-FullNameKr = "카데노코지 유카리"
10081-FamilyNameKr = "카데노코지"
10081-PersonalNameKr = "유카리"

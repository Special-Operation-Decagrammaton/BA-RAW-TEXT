13003-ProfileIntroductionTh = "รองประธานชมรมทวงความยุติธรรมของสถาบันทรีนิตี้\n\nนอกจากนี้ยังทำหน้าที่เป็นผู้บัญชาการกลยุทธ์ของชมรมแทนหัวหน้า\nซึรุกิที่บ้าระห่ำ เธอดูเหมือนนักเรียนสาวที่ฉลาดและเยือกเย็นของทรีนิตี้\nแต่เธอก็เป็นหนึ่งในสมาชิกชมรมทวงความยุติธรรม บางครั้งก็ทำอะไร\nไม่ยั้งคิดอย่างเยือกเย็น"

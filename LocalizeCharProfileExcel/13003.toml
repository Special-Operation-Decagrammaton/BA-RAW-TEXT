13003-ProfileIntroductionKr = "트리니티 정의실현부의 2인자.\n\n광란의 아이콘인 부장 츠루기를 대신해 정의실현부의 전술지휘관 역할도 담당하고 있다. 때문에 침착한 지적인 트리니티 여학생처럼 보이기도 하지만, 그녀 역시 정의실현부의 일원이다. 누구보다도 침착하게, 무모한 행동을 하기도 한다."

10053-WeaponDescTh = "ปืนกลมือที่ยูกะใช้\n\nในงานฮาโลเฟสติวัลครั้งนี้ ปืน Logic & Reason\nก็ยังคงเป็นตัวช่วยสำคัญในเวลาที่ยูกะจะต้อง\nตัดสินใจอะไรอย่างมีเหตุผล"
10053-ProfileIntroductionTh = "นักบัญชีแห่งเซมิน่าที่มาในชุดกีฬาสำหรับเข้าร่วมงานฮาโลเฟสติวัล\n\nถึงจะต้องพบกับความลำบากในการเตรียมพร้อมสำหรับกิจกรรมใหญ่\nที่ทางมิลเลเนียมเป็นเจ้าภาพ ในวันก่อนเปิดงาน ด้วยความเอาใจใส่\nจากนักเรียนคนอื่นๆ ทำให้เธอได้พักผ่อนเต็มที่ในวันก่อนเปิดงาน\nทำให้เธอสดชื่นและเตรียมพร้อมสุดๆ\nในฐานะกรรมการของสภานักเรียน และผู้จัดงานของโรงเรียนเจ้าภาพ\nยูกะจึงสมัครลงแข่งกีฬาตามธรรมเนียมเท่านั้น แต่ความอยากเอาชนะ\nของเด็กนักเรียนคนอื่นๆ กระตุ้นต่อมความอยากเอาชนะของเธอขึ้นมา"
10053-CharacterSSRNewTh = "เตรียมพร้อมสำหรับฮาโลเฟสติวัลครั้งนี้แล้ว!"

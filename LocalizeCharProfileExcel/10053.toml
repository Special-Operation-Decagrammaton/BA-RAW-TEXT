10053-WeaponDescKr = "유우카가 사용하는 두 정의 기관단총.\n\n이번 황륜대제에서도 로직 앤 리즌은 유우카의 합리적이고 이성적인 판단을 대변한다."
10053-ProfileIntroductionKr = "황륜대제 참가를 위해 체육복으로 갈아입은 세미나의 회계.\n\n밀레니엄 주최의 빅 이벤트를 앞두고 오랫동안 격무에 시달려왔지만, 개회 전날만큼은 다른 학생들의 배려로 잠을 푹 잤기 때문에 컨디션은 최상의 상태다. 주최교의 학생회 임원이자 실행위원으로서 유우카는 이성적으로 대회에 임하려 했지만, 승부욕 강한 학생들이 그녀의 호승심을 계속해서 긁어온다."
10053-CharacterSSRNewKr = "이번 황륜대제의 준비도 완벽해!"

10053-ProfileIntroductionTw = "千年科學學園所屬，為了參加晄輪大祭而換上體育服的研討會會計。\n\n為了準備由千年主辦的大型活動而忙得不可開交，但在活動舉辦的前一天，因為其他學生的照顧而好好睡了一覺，現在身體處於最佳狀態。優香身為主辦學校學生會的幹部兼實行委員，雖然想以理性面對大會，但求勝心強的學生們卻一直刺激著他的好勝心。"
10053-CharacterSSRNewTw = "晄輪大祭的準備也很完美！"

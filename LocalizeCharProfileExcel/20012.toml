20012-ProfileIntroductionTw = "格黑娜學園所屬，急救醫學部的部長。\n\n總是在格黑娜每日發生的事故中運送著傷患，表情平淡，從未流露出絲毫不滿。雖然擁有無數拯救傷員的經歷，但因其稱呼傷患為「屍體」的習慣和粗魯的手法，被一部分的學生敬而遠之。"

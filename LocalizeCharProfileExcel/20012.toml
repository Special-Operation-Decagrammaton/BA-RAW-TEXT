20012-WeaponDescKr = "세나의 소드오프 유탄 발사기.\n\n응급 출동 시 방해물들을 빠르게 치우기 위한 도구이다. 가끔은 방해꾼도 치운다."
20012-ProfileIntroductionKr = "사건사고가 끊이질 않는 게헨나의 응급의학부 부장.\n\n어떤 상황 속에서도 늘 무뚝뚝한 얼굴로 부상자들을 실어 나른다. 부상자들을 화물처럼 취급하는 딱딱한 모습과 달리, 게헨나 전역의 수많은 부상자를 이송하면서도 불평 한마디 한 적이 없다."
20012-CharacterSSRNewKr = "시체……아니, 부상자는 어디에 있습니까?"

20012-WeaponDescTh = "ปืนยิงระเบิด M79 Sawed-Off ของเซนะ\n\nอุปกรณ์สำหรับใช้กำจัดสิ่งกีดขวางได้อย่างรวดเร็ว\nในกรณีที่มีการขนย้ายผู้ป่วยฉุกเฉิน บางครั้งก็ใช้กำจัด\nผู้เข้ามาขัดขวางเธอ"
20012-ProfileIntroductionTh = "หัวหน้าหน่วยแพทย์ฉุกเฉินแห่งโรงเรียนเกเฮนน่า ที่มักเกิดอุบัติเหตุต่างๆ ไม่หยุดหย่อน \n\nไม่ว่าในสถานการณ์ไหน เธอก็มักจะเข้าไปรับตัวผู้ป่วยด้วยสีหน้าเรียบเฉย ถึงแม้เธอจะมีท่าทางที่เย็นชาและปฏิบัติกับผู้ป่วยเหมือนเป็นสิ่งของ แต่เธอก็ไม่เคยปริปากบ่นเมื่อต้องไปดูแล หรือไปรับส่งผู้ป่วยทั่วเกเฮนน่า"
20012-CharacterSSRNewTh = "ศพ... ไม่สิ ผู้บาดเจ็บอยู่ที่ไหนเหรอคะ?"

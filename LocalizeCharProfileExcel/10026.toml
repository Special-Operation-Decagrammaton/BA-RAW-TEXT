10026-ProfileIntroductionTh = "หัวหน้าชมรม C&C ที่จำใจเปลี่ยนเป็นชุดบันนี่เกิร์ล เพื่อปฏิบัติภารกิจพิเศษ\n\nถึงจะเป็นชุดที่ปกติเนรุจะไม่มีวันใส่เด็ดขาดก็ตาม แต่เพื่อปฏิบัติภารกิจให้สำเร็จ\nเธอจึงยอมใส่ชุดนี้โดยไม่ลังเล และยอมอดทนต่อสถานการณ์ต่างๆ\nแต่ดูเหมือนจะมีเพียงแค่เรื่องเสื้อซูคาจันเท่านั้นที่เธอไม่ยอมถอดอย่างเด็ดขาด"
10026-CharacterSSRNewTh = "จริงๆ เลยนะ แบบนี้ไม่ถูกใจเอาซะเลย"

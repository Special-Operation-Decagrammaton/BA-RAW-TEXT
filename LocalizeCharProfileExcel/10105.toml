10105-ProfileIntroductionTw = "三一綜合學園所屬，偶像團體「Antique Seraphim」的領袖。\n\n雖然一開始只是為了協助他人而加入，但在不知不覺中已逐漸成長為能在舞台上獨當一面，為某個人歌唱的專屬偶像。\n在「為了所有人的幸福而努力」的層面上，或許早在穿上偶像服之前，便已充分展現了成為偶像的潛力。"

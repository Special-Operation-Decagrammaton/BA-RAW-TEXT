23003-ProfileIntroductionTw = "千年科學學園所屬，駭客集團「貝里塔斯」的工程師。\n\n在以聰明的人眾多聞名的千年學園中，他依然是首屈一指的天才少女。千年學園產出最先進的機器，絕大多數都是從他手中開發出來的。\n儘管有著如此輝煌的實力和成果，他也不會擺架子自以為是，反而願意傾聽其他學生的心聲，是名善良的少女。"

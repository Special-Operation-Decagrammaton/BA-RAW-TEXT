23003-ProfileIntroductionKr = "밀레니엄 학원의 해커 집단, 베리타스의 엔지니어.\n\n\r머리 좋은 사람이 많기로 유명한 밀레니엄 학원에서도 손꼽히는 천재로 밀레니엄의 최첨단 기기들은 대부분 그녀의 손에서 개발되었다. 하지만 이런 성과에도 불구하고 잘난척하거나 으스대지 않고 다른 학생들의 말에 귀를 기울여주는 상냥한 소녀다."

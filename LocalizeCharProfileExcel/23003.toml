23003-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ฮาเระใช้\n\nปืนที่มีฟังก์ชั่นล้ำสมัยมากมายทั้งการเล็งเป้าอัตโนมัติ\nแต่ว่าฮาเระกลับไม่เคยใช้ฟังก์ชั่นพวกนี้เลย"
23003-ProfileIntroductionTh = "วิศวกรของชมรมเวอริทัส สังกัดกลุ่มแฮ็กเกอร์ ประจำโรงเรียน\nวิทย์มิลเลเนียม\n\nอัจฉริยะที่โดดเด่นแห่งโรงเรียนวิทย์มิลเลเนียม ที่ขึ้นชื่อว่ามีหัวกะทิอยู่\nมากมาย อุปกรณ์จากเทคโนโลยีชั้นสูงของมิลเลเนียมส่วนใหญ่มาจาก\nฝีมือของเธอ ถึงจะเป็นอัจฉริยะแต่เธอก็ไม่เคยอวดเก่ง\nแต่กลับมีนิสัยอ่อนโยนและรับฟังนักเรียนคนอื่นอยู่เสมอ"

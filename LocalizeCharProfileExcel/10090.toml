[translation]
10090-StatusMessageTh = "ถ้ามีข่าวเรื่องเทศกาลก็บอกฉันด้วยนะคะ!"
10090-FullNameTh = "ซาโตฮามะ อุมิกะ"
10090-FamilyNameTh = "ซาโตฮามะ"
10090-PersonalNameTh = "อุมิกะ"
10090-SchoolYearTh = "ชั้นปีที่ 1"
10090-CharacterAgeTh = "15 ปี"
10090-BirthdayTh = "1 ก.ค."
10090-HobbyTh = "เที่ยวงานเทศกาล, สะสมโบรชัวร์งานเทศกาล"
10090-WeaponNameTh = "Festival Fever"
10090-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อุมิกะใช้เป็นประจำ\n\nเธอยืนยันว่าปืนนี้เป็นของใช้ที่เหมาะกับทุกสถานการณ์ใน\nงานเทศกาล ไม่ว่าจะใช้แจ้งเปิดเทศกาลหรือใช้ในการคลี่\nคลายปัญหาเล็กน้อยที่เกิดขึ้นในงานก็ตาม"
10090-ProfileIntroductionTh = "สมาชิกชั้นปีที่ 1 สังกัดชมรมจัดงานเทศกาล\n\nเธอออกตัวว่าตัวเองมาจากชนบท จึงสนใจในงานเทศกาลที่จัดขึ้นในใจ\nกลางเมืองมานานแล้ว เรียกได้ว่าเป็นผู้เชี่ยวชาญที่จดจำทุกงานเทศกาล\nที่จัดขึ้นในคิโวทอสได้ แต่ถ้าได้เอ่ยปากพูด เธอจะพูดเรื่องยิบย่อยของ\nงานเทศกาลแบบน้ำไหลไฟดับ เลยได้ยินหลายคนบอกว่าเธอจะเป็นคน\nสวยถ้าปิดปากเงียบเสีย"
10090-CharacterSSRNewTh = "ฉันมาที่นี่เพราะได้ยินว่าจะมีงานเทศกาลค่ะ!\nอ่า... หรือว่าไม่มีคะ?"

10090-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，節慶營運管理部的1年級成員。\n\n出身鄉下，從以前就對在都市舉行的節慶活動充滿興趣。是能記住奇普托斯全境所有節慶活動的專家。一開口就會滔滔不絕地談論各種冷門節慶，因此常收到不開口就是個美人的評價。"

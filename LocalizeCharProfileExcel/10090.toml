10090-WeaponNameKr = "축제의 열기"
10090-WeaponDescKr = "우미카가 애용하는 돌격소총\n\n축제의 시작을 알리는 데에도, 축제에서 일어나는 사소한 트러블을 해결하는 데에도, 어떤 상황에서도 안성맞춤인 축제 용품이라고 그녀는 주장한다."
10090-ProfileIntroductionKr = "마츠리운영관리부 소속의 1학년 부원.\n\n시골 출신이라 도심에서 열리는 축제에 대해 예전부터 관심이 많았다고 한다. 키보토스 전역에서 열리는 축제는 전부 기억할 정도의 전문가. 입만 열면 모든 대화가 각종 마이너한 축제 이야기로 말이 빨라지기 때문에, 입만 다물고 있으면 미인이라는 소리를 자주 듣는다."
10090-CharacterSSRNewKr = "축제가 열린다는 소식을 듣고 찾아왔는데요!\n어…… 아닌가요?"

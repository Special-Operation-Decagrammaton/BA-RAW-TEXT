10119-WeaponNameTw = "百蓮"
10119-WeaponDescTw = "儘管各處都有磨損與修補的痕跡，依舊散發著難以言喻的神祕氣息的步槍。\n\n作為繼承自大預言者葛葉的資格象徵，能夠使用這把「百蓮」就代表著身為百花繚亂正統繼承者的資格。"
10119-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會擁有神祕氣質的少女。\n\n原本是百花繚亂的副委員長，在前任委員長菖蒲失蹤後繼承了委員長的象徵「百蓮」。雖然個性膽小、容易動搖又不太相信自己，卻也擁有為了守護重要之人克服恐懼、勇敢向前的堅定意志。"
10119-CharacterSSRNewTw = "盼望百花綻放的那刻到來"

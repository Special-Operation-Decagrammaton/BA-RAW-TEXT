10119-WeaponDescJp = "An old rifle that exudes a sense of power.\n\nIt's the proof of the Authority of the Presidency, passed down by the Great Prophet Kuzunoha. Only the rightful successor of the Hyakkaryouran is able to wield the Hundred Lotus."
10119-ProfileIntroductionJp = "A member of the Hyakkaryouran Resolution Council, who gives off a mysterious aura.\n\nAlthough she was only the Hyakkaryouran Resolution Council's vice president, Nagusa received the Authority of the Presidency, the Hundred Lotus, when former president Ayame disappeared. Despite being an indecisive person, riddled with fears and insecurities, she continues to put one foot in front of the other for the sake of those she holds dear."
10119-CharacterSSRNewJp = "I await the day when hundreds of flower species bloom in tandem."

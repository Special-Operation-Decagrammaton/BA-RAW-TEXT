10119-WeaponDescTh = "ปืนไรเฟิลเก่าที่แม้จะสึกหรอและร่องรอยการซ่อมแซม\nให้เห็นหลายจุด แต่ก็มีพลังงานลึกลับที่ไม่อาจอธิบายได้\nปืนนี้เป็นหลักฐานแสดงคุณสมบัติที่สืบทอดมาจาก\nผู้พยากรณ์ใหญ่คุซึโนฮะ การที่ใช้ปืนนี้ได้ยังเป็นการพิสูจน์\nด้วยว่าเป็นผู้สืบทอดที่เหมาะสมของเฮียกกะเรียวรัน"
10119-ProfileIntroductionTh = "เด็กสาวจากคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน ผู้มีชีวิตประจำวันลึกลับ\n\nเดิมทีนางุสะเป็นรองหัวหน้าเฮียกกะเรียวรัน แต่หลังจากอายาเมะ ผู้เป็นหัวหน้าคนก่อนหายตัวไป นางุสะก็ได้รับปืนที่เป็นหลักฐานยืนยัน\nตำแหน่งของหัวหน้ามา แม้จะมีบุคลิกที่ไม่เด็ดขาด ขี้กลัว และไม่เชื่อมั่น\nในตัวเอง แต่หากเป็นการทำเพื่อคนที่รัก นางุสะก็จะเอาชนะความกลัว และก้าวไปข้างหน้าได้อย่างตั้งใจ"
10119-CharacterSSRNewTh = "รอเวลาที่ดอกไม้ร้อยดอกผลิบานพร้อมกัน"

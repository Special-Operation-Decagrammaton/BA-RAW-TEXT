10119-WeaponDescKr = "곳곳이 닳아 떨어져 덧대 보수한 흔적이 남아있지만, 형용할 수 없는 신비한 기운을 발산하는 낡은 소총.\n\n대 예언자 쿠즈노하로부터 계승되어 온 자격의 증거로, 이 백련을 사용할 수 있다는 것은 백화요란의 적법한 계승자라는 증거이기도 하다."
10119-ProfileIntroductionKr = "신비로운 인상을 지닌 백화요란 분쟁조정위원회 소속의 소녀.\n\n본래는 백화요란의 부부장이었으나 선대 부장인 아야메가 사라진 뒤, 부장의 증표인 백련을 넘겨받게 되었다. 두려움이 많고 쉽게 스스로를 믿지 못하는 우유부단한 성격의 소유자지만, 그럼에도 소중한 사람을 위해서라면 두려움을 물리치고 앞으로 나아갈 수 있는 심지를 갖추고 있다."
10119-CharacterSSRNewKr = "백 가지 꽃이 함께 만발하는 그 순간을 기다리며"

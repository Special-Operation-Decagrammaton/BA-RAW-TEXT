13011-ProfileIntroductionJp = "Scenario writer of the Game Development Department at the Millennium School.\n\nBoth Momoi and her twin sister, Midori, develop games with the Game Development Department. Though her lighthearted and cheerful personality previously put her at odds with her more introverted little sister, the two are now inseparable thanks to their shared love of video games. "

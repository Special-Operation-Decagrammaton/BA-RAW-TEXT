13011-WeaponDescKr = "모모이가 사용하는 소총.\n\n\r소중한 여동생에게서 받은 액세서리가 달려 있어, 곤란할 때 그걸 만지고 있다 보면 아이디어가 번쩍 떠오르는 모양이다."
13011-ProfileIntroductionKr = "밀레니엄 학원, 게임개발부의 시나리오 라이터.\n\n\r쌍둥이 여동생인 미도리와 함께 게임개발부에서 게임을 개발하고 있다. 가볍고 쾌활한 성격의 소유자로 소심한 성격의 여동생과는 사이가 좋지 못한 편이었지만, 게임에 대한 열정으로 의기투합하여 현재는 둘도 없는 단짝이 되었다."

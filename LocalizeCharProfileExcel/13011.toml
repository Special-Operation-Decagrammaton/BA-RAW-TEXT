13011-WeaponDescTh = "ปืนไรเฟิลยาวจู่โจมที่เป็นอาวุธของโมโมอิ\n\nปืนคู่ใจของโมโมอิ มีเครื่องประดับจากน้องสาวคนสำคัญติดอยู่\nและในตอนที่ต้องใช้ความคิด เพียงแค่ลูบปืนคู่ใจนี้ก็มักจะได้\nไอเดียใหม่ๆ เสมอ"
13011-ProfileIntroductionTh = "นักเขียนเนื้อเรื่องของชมรมพัฒนาเกม แห่งโรงเรียนวิทย์มิลเลเนียม\n\nเธอกำลังพัฒนาเกมร่วมกับมิโดริ น้องสาวฝาแฝดของเธอ มีนิสัยเป็นกันเองและร่าเริง ไม่ค่อยจะถูกกับน้องสาวที่เป็นคนขี้กลัว แต่เมื่อเป็นเรื่องของเกมแล้ว ทั้งคู่จะร่วมมือกันด้วยความมุ่งมั่น จนเป็นหนึ่งเดียวกัน "

10047-WeaponDescKr = "치세가 아끼는 다연발 유탄발사기.\n\n이번엔 특별히 여름맞이 콜라보의 일환으로 선생님의 아이디어를 받아 치세가 직접 쓴 하이쿠를 탄환에 새겼다. 시중에는 판매하지 않는, 치세만의 소중한 물건이다."
10047-ProfileIntroductionKr = "여름 햇살 아래에서도 변함없이 멍하니 있기를 좋아하는 음양부의 전파계 소녀.\n\n수영복 차림으로 갈아입으면서 아이돌력(?)이 더욱 올라간 덕분에, 그녀를 지켜보는 팬들의 아우성은 여름의 햇살만큼이나 강해졌지만. 역시나 본인은 전혀 신경 쓰는 기색 없이, 오늘도 치세는 선생님과 함께 반짝임을 찾거나, 거북이를 콕콕 찌르는 등 충실한 여름을 보내고 있다."
10047-CharacterSSRNewKr = "바다엔, 신기한 게 잔뜩이네~"

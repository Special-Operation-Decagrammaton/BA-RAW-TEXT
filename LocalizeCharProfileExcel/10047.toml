10047-WeaponDescTw = "知世珍惜的榴彈發射器。\n\n這次接受了老師的點子，將知世所寫的夏日俳句刻在子彈上。市面上沒有販售，是知世專屬的貴重槍械。"
10047-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，即使在夏日豔陽下依然思緒放空的陰陽部電波系少女。\n\n換上泳裝後偶像魅力（？）更加提升，使關注他的粉絲尖叫聲變得和夏日豔陽一樣火熱。然而知世本人對此毫不在意。今天也和老師一起尋找閃亮，過著充實的夏天。"
10047-CharacterSSRNewTw = "海裡有很多不可思議的東西呢～"

10047-WeaponDescEn = "Chise's favorite multi-grenade launcher. As part of a special summer collaboration, Chise engraved a haiku inspired by Sensei onto her ammo. It's a precious item unique to Chise, and it's not sold on the market."
10047-ProfileIntroductionEn = "An airhead who's a member of the Yin-Yang Club. She likes to hang out in the sunlight. When she started wearing a swimsuit, her popularity skyrocketed and her following grew as strong as the summer sunshine. As expected, she doesn't seem to care about her popularity at all. Chise is spending a fulfilling summer with Sensei, looking for sparkles and poking turtles."
10047-CharacterSSRNewEn = "The ocean is full of interesting things!"

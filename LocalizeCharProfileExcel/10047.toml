10047-ProfileIntroductionJp = "An airhead who's a member of the Yin-Yang Club. She likes to hang out in the sunlight. When she started wearing a swimsuit, her popularity skyrocketed and her following grew as strong as the summer sunshine. As expected, she doesn't seem to care about her popularity at all. Chise is spending a fulfilling summer with Sensei, looking for sparkles and poking turtles."

23007-ProfileIntroductionKr = "보충수업부의 다정다감한 아가씨.\n\n겉으로 보기엔 정말 정숙하고 기품있는 아가씨로 보이지만, 입을 열면 온갖 에로한 말들을 쏟아내는 문제아다. 하나코의 본모습을 아는 보충수업부는 하나코가 입을 열 때마다 긴장하고 주변을 살펴보게 된다."

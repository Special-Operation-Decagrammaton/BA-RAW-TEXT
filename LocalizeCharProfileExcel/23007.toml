23007-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ฮานาโกะใช้เป็นประจำ\n\nปืนที่มีชื่อที่เรียบง่ายจนน่าแปลกใจ\nแต่หากถามถึงที่มาของชื่อปืน ฮานาโกะจะไม่ยอมบอกอยู่ดี"
23007-ProfileIntroductionTh = "เด็กสาวผู้อ่อนโยนจากชมรมชั้นเรียนเสริม ของสถาบันทรีนิตี้\n\nเด็กสาวที่ภายนอกดูสงบเสงี่ยม และสง่างาม แต่เมื่อได้ปริปากพูดอะไรแล้ว จะพูดแต่เรื่องแนวอีโรติก สมาชิกชมรมรู้ตัวตนที่แท้จริงของฮานาโกะดี\nเมื่อฮานาโกะจะพูดอะไรก็จะประหม่า และตรวจดูว่ารอบๆ มีใครอยู่บ้าง"

20030-WeaponDescKr = "하루나의 저격소총.\n\n\r날카로운 시선으로, 운동 중이든 언제든, 미식으로의 길을 그녀는 찾아낸다."
20030-ProfileIntroductionKr = "황륜대제를 맞아 체육복으로 갈아입은 하루나.\n\n\r언제, 어떤 곳이라도 하루나의 미식에 대한 탐구는 계속된다. 아니, 오히려 황륜대제라는 키보토스 최대의 체육제에서만 맛볼 수 있는 미식을 찾는 중이다. 특별히 뜨거워진 분위기 덕분일까, 평소보다 조금 신이 나 있는 듯이 보이기도, 어딘가 친절해진 듯이 보이기도 한다. "
20030-CharacterSSRNewKr = "몸을 움직이는 만큼, 식욕이 돌겠죠.\n\r함께 떠나시겠어요?"

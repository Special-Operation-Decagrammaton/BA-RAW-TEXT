[translation]
20030-StatusMessageTh = "ความสัมพันธ์ของอาหารเลิศรสกับการออกกำลังกาย"
20030-FullNameTh = "คุโรดาเตะ ฮารุนะ"
20030-FamilyNameTh = "คุโรดาเตะ"
20030-PersonalNameTh = "ฮารุนะ"
20030-SchoolYearTh = "ชั้นปีที่ 3"
20030-CharacterAgeTh = "17 ปี"
20030-BirthdayTh = "1 มี.ค."
20030-HobbyTh = "ตระเวนกินร้านเด็ด, เขียนรายการอาหาร"
20030-WeaponNameTh = "Ideal"
20030-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงของฮารุนะ\n\nด้วยสายตาที่เฉียบคมของเธอ ฮารุนะก็ได้พบหนทาง\nแห่งอาหารเลิศรส ไม่ว่าจะเป็นตอนแข่งกีฬาหรือใน\nเวลาใดก็ตาม"
20030-ProfileIntroductionTh = "ฮารุนะเปลี่ยนมาสวมชุดออกกำลังกายเพื่อฉลองงานแข่งกีฬาฮาโลเฟสติวัล\n\nการแสวงหาเส้นทางแห่งอาหารเลิศรสของฮารุนะยังคงดำเนินต่อไป\nไม่ว่าในสถานที่ไหนหรือเวลาใด ตอนนี้เธออยู่ระหว่างตามหาอาหารแสน\nอร่อยที่จะลิ้มรสได้เพียงในงานเทศกาลแข่งกีฬาที่ใหญ่ที่สุดของคิโวทอส <ฮาโลเฟสติวัล> อาจเป็นเพราะบรรยากาศที่ร้อนแรงเป็นพิเศษ ทำให้เธอดูตื่นเต้นและเป็นมิตรขึ้นกว่าปกติเล็กน้อย "
20030-CharacterSSRNewTh = "ยิ่งขยับร่างกาย ความอยากอาหารก็ยิ่งเพิ่มขึ้นค่ะ\nอยากไปด้วยกันกับฉันมั้ยคะ?"

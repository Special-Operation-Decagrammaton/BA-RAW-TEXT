20030-WeaponDescTw = "羽留奈的狙擊步槍。\n\n即便是在運動中，銳利的目光依舊尋找著美食之路。"
20030-ProfileIntroductionTw = "格黑娜學園所屬，為了參加晄輪大祭而換上體育服的美食研究會會長。\n\n無論何時何地，對美食的探求都不曾停止。正為了尋找只有在晄輪大祭這奇普托斯最盛大的大運動會才能品嚐到的美食而四處徘徊。也許是受到現場熱烈氣氛的影響，似乎顯得比平常更為興奮與親切。"
20030-CharacterSSRNewTw = "動得越多，肚子就會越餓。\n來，一同踏上美食之旅吧。"

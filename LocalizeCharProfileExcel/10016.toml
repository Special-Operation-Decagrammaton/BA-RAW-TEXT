10016-WeaponDescKr = "미도리가 사용하는 소총.\n\n소중한 언니에게서 받은 액세서리가 달려 있어, 곤란할 때 그걸 만지고 있다 보면 영감이 샘솟는 모양이다."
10016-ProfileIntroductionKr = "밀레니엄 학원, 게임개발부의 일러스트레이터.\n\n쌍둥이 언니인 모모이와 함께 게임개발부에서 게임을 개발하고 있다. 소심하고 내성적인 성격의 소유자로 활발한 성격의 언니와는 사이가 좋지 못한 편이었지만, 게임에 대한 열정으로 의기투합하여 현재는 둘도 없는 단짝이 되었다."
10016-CharacterSSRNewKr = "이번 일러스트는 제 자신작이에요!"

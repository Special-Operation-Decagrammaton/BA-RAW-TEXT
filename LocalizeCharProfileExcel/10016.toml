10016-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่มิโดริใช้\n\nปืนคู่ใจของมิโดริ มีเครื่องประดับจากพี่สาวคนสำคัญติด\nอยู่ และในตอนที่ต้องใช้ความคิด เพียงแค่ลูบปืนคู่ใจนี้ก็\nมักจะได้แรงบันดาลใจใหม่ๆ เสมอ"
10016-ProfileIntroductionTh = "นักออกแบบของชมรมพัฒนาเกมแห่งโรงเรียนวิทย์มิลเลเนียม\n\nเธอกำลังพัฒนาเกมในชมรมพัฒนาเกมร่วมกับโมโมอิ พี่สาวฝาแฝด มีนิสัยขี้กลัวและเก็บตัว ไม่ค่อยจะถูกกับพี่สาวที่เป็นคนร่าเริง แต่เมื่อเป็นเรื่องเกมแล้ว ทั้งคู่จะร่วมมือกันและเข้าขากันอย่างดีเยี่ยม"
10016-CharacterSSRNewTh = "ฉันเป็นคนออกแบบภาพประกอบในครั้งนี้ล่ะ!"

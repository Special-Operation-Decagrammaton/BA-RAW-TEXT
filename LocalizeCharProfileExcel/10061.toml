10061-WeaponDescTh = "ปืนที่ซากุระโกะดูแลบำรุงรักษา และให้ความเคารพในแบบ\nฉบับของซากุระโกะ\n\nเป็นเรื่องยากที่คนอื่นจะมีโอกาสได้แตะต้องปืนกระบอกนี้"
10061-ProfileIntroductionTh = "ซิสเตอร์ผู้แสนซื่อตรงแห่งชมรมซิสเตอร์ โรงเรียนทรีนิตี้\n\nเด็กสาวผู้มุ่งมั่นทำทุกสิ่งด้วยความจริงใจ และได้รับความไว้วางใจจาก\nผู้คนมากมาย\nเธอมักทำหน้าที่ด้วยจิตใจที่บริสุทธิ์ แต่ว่าเพราะความไร้เดียงสาของเธอ ทำให้บางครั้งก็แอบหลงไปตามแฟชั่นหรือเรื่องอินเทรนด์บ้าง"
10061-CharacterSSRNewTh = "ฉันคอยจับตาดู...\nทุกการเคลื่อนไหวของคุณอยู่นะคะ"

20017-ProfileIntroductionKr = "소심하고 우울한 인상을 지닌 아리우스 스쿼드의 일원.\n\n\r언제나 무거운 짐을 잔뜩 짊어진 채 아리우스의 다른 학생들을 따라다니고 있다. 자존감이 낮고 네거티브한 성격의 소유자로 세상만사를 염세적으로 바라보고 있다."

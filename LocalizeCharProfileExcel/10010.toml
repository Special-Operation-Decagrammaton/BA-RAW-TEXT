10010-ProfileIntroductionKr = "스포츠를 좋아하는 아비도스 대책위원회의 행동반장.\n\n\r기본적으로 말수가 적고 표정 변화가 거의 없어 차갑다는 인상을 주곤 하지만, 사실은 누구보다 아비도스 학원을 아끼는 소녀이다. 학원의 부흥을 위해서는 수단과 방법을 가리지 않으며, 가끔 엉뚱한 발상을 내놓을 때도 있다."

10010-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ชิโรโกะใช้เป็นประจำ\n\nเธอมักจะซ่อมบำรุงอย่างละเอียด ทำให้เตรียมพร้อมลุยได้ในทุกสถานการณ์"
10010-ProfileIntroductionTh = "หัวหน้าความประพฤติคณะกรรมการแผนงาน ของโรงเรียนมัธยมอะบิดอส ผู้ชื่นชอบกีฬาเป็นชีวิตจิตใจ\n\nสาวพูดน้อยต่อยหนัก ผู้เป็นเจ้าของใบหน้าเรียบเฉย ภายนอกอาจจะดูเย็นชา แต่เธอก็หวงแหนโรงเรียนมากกว่าใครอื่น เธอยอมทำทุกวิถีทางเพื่อฟื้นฟูโรงเรียน และบางครั้งเธอก็เสนอความคิดแปลกๆ ออกมา"
10010-CharacterSSRNewTh = "อยากให้ฉันช่วยเหรอ?"

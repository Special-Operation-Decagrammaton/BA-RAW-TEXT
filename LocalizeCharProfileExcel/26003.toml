26003-ProfileIntroductionTw = "三一綜合學園所屬，為救護騎士團獻身的善良少女。\n\n熱愛公益服務且品性善良，由於對健康問題時常過度擔心，周圍的同學經常說「他像媽媽一樣」。\n儘管討厭紛爭，但面對威脅和平的敵人，他也會毅然決然與之對抗。"

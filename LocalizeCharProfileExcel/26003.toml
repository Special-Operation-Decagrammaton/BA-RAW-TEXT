26003-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ประดิษฐ์ขึ้นพิเศษของเซรินะ\n\nการเหนี่ยวไกไม่ได้หมายความว่าจะเป็นการฉีดยาเสมอไป"
26003-ProfileIntroductionTh = "เด็กสาวผู้อ่อนโยน จากชมรมอัศวินบรรเทาทุกข์ ของสถาบันทรีนิตี้\n\nเด็กสาวใจดีที่ชอบการทำงานช่วยเหลือผู้อื่น เธอใส่ใจและกังวลเรื่อง\nสุขภาพมากเกินไป จนถูกมองว่าเป็นแม่ของเพื่อนนักเรียนด้วยกัน\nเธอมีจิตใจบอบบาง ไม่ชอบการทะเลาะและความขัดแย้ง แต่หากอยู่\nต่อหน้าศัตรูที่มาคุกคามสันติภาพ เธอก็พร้อมที่จะต่อสู้อย่างเด็ดขาด"

26003-ProfileIntroductionKr = "트리니티 구호기사단 소속의 상냥한 소녀.\n\n봉사활동을 즐겨 하는 선량한 성품의 소유자로, 건강에 관해서는 지나칠 정도로 걱정이 많기 때문에 주변의 학우들로부터 엄마 같다는 평가를 종종 듣기도 한다. 다툼과 분쟁을 싫어하는 심약한 성품의 소유자지만, 평화를 위협하는 적 앞에서는 언제나 단호하게 맞서 싸울 준비가 되어 있다."

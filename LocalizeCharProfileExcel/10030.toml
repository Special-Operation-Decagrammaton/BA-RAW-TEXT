10030-ProfileIntroductionTh = "ผู้รับผิดชอบด้านสุขอนามัยของคณะกรรมการวินัยเกเฮนน่าที่บังเอิญ ได้ไปที่ออนเซ็นระหว่างที่ปฏิบัติหน้าที่\n\nเธอยังคงพบปัญหาที่ชวนปวดหัวไม่หยุดแม้แต่ตอนอยู่ที่ออนเซ็น\nตั้งแต่การลงมือสั่งเวชภัณฑ์ใหม่ไปจนถึงแผนการลับของชมรม\nพัฒนาออนเซ็น ทิวทัศน์ที่สวยงามของออนเซ็นทำให้ชินัตสึที่รู้สึก\nเหน็ดเหนื่อยกับชีวิตประจำวันรู้สึกอยากขี้เกียจขึ้นมา"
10030-CharacterSSRNewTh = "วันนี้... อยากผ่อนคลายจังเลย"

13010-ProfileIntroductionKr = "밀레니엄 학원 학생회, 세미나의 회계.\n\n\r이과의 비율이 높은 밀레니엄에서도 손꼽히는 수학의 귀재로 밀레니엄의 예산 관리를 총괄하고 있다. 특기는 주산으로 머리가 복잡하거나 심적인 갈등이 있을 때면 주판알을 튕기며 마음을 다스리는 버릇이 있다."

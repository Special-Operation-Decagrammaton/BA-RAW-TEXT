13010-ProfileIntroductionTh = "กรรมการสภานักเรียน และนักบัญชีของชมรมเซมิน่า แห่งโรงเรียนวิทย์มิลเลเนียม\n\nหัวกะทิด้านคณิตศาสตร์ ผู้ที่อยู่ท่ามกลางกลุ่มนักเรียนวิทยาศาสตร์\nของโรงเรียนวิทย์มิลเลเนียม มีหน้าที่ดูแลงบประมาณของโรงเรียน\nความสามารถพิเศษคือการดีดลูกคิด เพื่อทำให้จิตใจสงบในเวลาที่\nต้องคิดอะไรซับซ้อน หรือเมื่อเกิดความขัดแย้งในใจ"

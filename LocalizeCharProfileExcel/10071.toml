10071-WeaponDescKr = "미야코가 SRT 특수학원에서 지급받은 제식 기관단총.\n\n높은 신뢰성을 지닌 기관단총으로 고온다습한 바닷가에서도 효과적으로 작전을 수행할 수 있다."
10071-ProfileIntroductionKr = "잠입 작전을 위해 외진 어촌 마을을 방문한 RABBIT 소대의 소대장.\n\n편의점에 납품되는 도시락의 이상을 조사하기 위해 관광객으로 위장한 채 바닷가를 찾아왔다. 주민들의 적대적인 반응부터, 마을 전체에서 풍기는 퀴퀴한 비린내까지…… 관광과는 어울리지 않는 수상한 공간이지만, 그래도 귀여운 수영복만큼은 포기할 수 없다."
10071-CharacterSSRNewKr = "여기는 RABBIT 1.\n방금 막 바다에 도착했습니다."

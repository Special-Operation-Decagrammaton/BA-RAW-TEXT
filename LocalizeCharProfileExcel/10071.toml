10071-WeaponDescTh = "ปืนกลมือมาตรฐานที่มิยาโกะได้รับจากสถาบัน SRT\n\nปืนกลมือที่มีประสิทธิภาพการทำลายล้างศัตรูสูง\nใช้ได้อย่างมีประสิทธิภาพแม้แต่ในตอนที่อยู่ในพื้นที่\nที่มีความชื้นสูง"
10071-ProfileIntroductionTh = "หัวหน้ากองทหาร RABBIT ที่มายังหมู่บ้านชาวประมงเพื่อปฏิบัติภารกิจแฝงตัว\n\nเธอปลอมตัวเป็นนักท่องเที่ยวมาที่ชายหาด เพื่อตรวจสอบเรื่องผิดปกติ เกี่ยวกับข้าวกล่องที่ส่งไปขายที่ร้านสะดวกซื้อ ตั้งแต่ปฏิกิริยาที่ไม่เป็นมิตร ของชาวบ้าน ไปจนถึงกลิ่นเหม็นคาวที่โชยไปทั่วหมู่บ้าน... นับว่าเป็นพื้นที่ ที่น่าสงสัยและไม่เหมาะกับการท่องเที่ยว แต่ว่าเธอก็ไม่ยอมแพ้ เพราะจะได้ ใส่ชุดว่ายน้ำน่ารักๆ"
10071-CharacterSSRNewTh = "นี่คือ RABBIT 1\nเพิ่งมาถึงทะเลเมื่อสักครู่นี้ค่ะ"

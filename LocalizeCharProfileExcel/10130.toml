10130-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่สุบารุใช้\n\nสุบารุปรับแต่งโดยคำนึงถึงฟังก์ชันการใช้งาน และสัญลักษณ์ที่สื่อถึง การที่มันดูไม่มีลักษณะเด่นใดๆ กลับยิ่งให้ความรู้สึกที่หนักแน่น"
10130-ProfileIntroductionTh = "เด็กสาวที่เป็นผู้นำของกลุ่มนักเรียนที่เหลืออยู่ในโรงเรียนสาขาอาเรียส\n\nสุบารุเป็นรุ่นพี่ที่น่าเชื่อถือและได้รับการยอมรับอย่างดีจากทุกคน ทัศนคติที่อ่อนโยนและความใจดีของเธอทำให้ผู้คนที่พบเจอรู้สึกประทับใจ แต่หากเป็นเรื่องที่จำเป็นต้องทำ โดยเฉพาะเรื่องที่เป็นประโยชน์ต่อรุ่นน้อง สุบารุก็พร้อมแสดงด้านที่แตกต่างออกมา"
10130-CharacterSSRNewTh = "ยินดีต้อนรับสู่อาเรียสค่ะ"

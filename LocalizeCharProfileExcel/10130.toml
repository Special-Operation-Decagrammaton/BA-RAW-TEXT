10130-WeaponDescKr = "스바루가 사용하는 돌격소총.\n\n기능성과 상징성을 고려하여 스바루가 세부 조정 및 커스텀을 거친 무기. 큰 특징은 없어 보이지만, 그렇기에 더욱 절실함이 담긴 것이기도 하다."
10130-ProfileIntroductionKr = "아리우스 분교의 남은 학생들을 이끌고 있는 소녀.\n\n모두에게 좋은 평판을 받고 있는 믿음직한 선배. 부드럽고 친절한 태도로 만나는 사람에게 자연스러운 호감을 산다. 그러나 해야 할 때라고 생각하면, 특히 그것이 후배들을 위하는 일이라고 판단한다면, 얼마든지 다른 면모를 내보일 준비가 되어 있다."
10130-CharacterSSRNewKr = "아리우스에 오신 것을 환영합니다."

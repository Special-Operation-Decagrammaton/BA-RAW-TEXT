16009-BirthdayKr = "2월 22일"
16009-HobbyKr = "새로운 자작 인법 개발, 동영상 만들기"
16009-WeaponNameKr = "미치루류 오버플로우 샷건"
16009-WeaponDescKr = "미치루가 늘 애용하고 있는 산탄총.\n\n직접 만든 인법용 탄환을 쓰기 위해, 총구 아래에 추가 산탄총 파츠를 달기도 하는 등 마구잡이로 개조한 물건. 미치루 왈 \"이것이야말로 로망!\" 이라는 모양이다."
16009-ProfileIntroductionKr = "백귀야행 학원 인법연구부의 부장 겸 동영상 채널 <소녀인법첩 미치룻치>의 운영자.\n\n어째서인지 늘 근거 없는 자신감에 차 있는 소녀. 닌자라면 장르를 불문하고 무척이나 좋아하는 닌자 오타쿠이기도 하며, 인법연구부를 만든 것도, 닌자 관련 동영상 채널을 운영하는 것도 전부 그 때문. 키보토스에 전례 없는 닌자 붐을 불러오고자, 오늘도 인법연구부 멤버들과 함께 좌충우돌 종횡무진으로 활약하고 있다."

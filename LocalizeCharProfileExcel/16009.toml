[translation]
16009-StatusMessageTh = "กดติดตามช่อง <วิถีนินจาสาว มิจิรุจจี้> ด้วยนะ!"
16009-FullNameTh = "จิโดริ มิจิรุ"
16009-FamilyNameTh = "จิโดริ"
16009-PersonalNameTh = "มิจิรุ"
16009-SchoolYearTh = "ชั้นปีที่ 3"
16009-CharacterAgeTh = "17 ปี"
16009-BirthdayTh = "22 ก.พ."
16009-HobbyTh = "คิดค้นวิชานินจาใหม่, ถ่ายวิดีโอ"
16009-WeaponNameTh = "Michiru-Style Overflow Shotgun"
16009-WeaponDescTh = "ปืนลูกซองที่มิจิรุใช้เป็นประจำ\n\nปืนลูกซองที่มิจิรุดัดแปลงเพิ่มเติมเพื่อใช้สำหรับยิง\nกระสุนนินจาพิเศษ แม้จะดูเหมือนใช้งานค่อนข้างยาก\nแต่มิจิรุมักจะพูดเสมอว่า \"นี่แหละรสชาติแห่งโรแมนติก!\""
16009-ProfileIntroductionTh = "หัวหน้าชมรมวิจัยศาสตร์นินจาแห่งสหพันธ์เฮียกคิยาโค และผู้ดำเนินรายการช่อง <วิถีนินจาสาว มิจิรุจจี้>\n\n เด็กสาวผู้มีมีความมั่นใจท่วมท้นอยู่เสมอ มิจิรุเป็นนินจาโอตาคุที่ชื่นชอบศาสตร์แห่งนินจาอย่างมาก ไม่ว่าจะเป็นนินจาประเภทไหน จึงทำให้เธอก่อตั้งชมรมวิจัยศาสตร์นินจา และช่องวิดีโอเกี่ยวกับนินจาขึ้นเธอและสมาชิกชมรมมักจะทำกิจกรรมต่างๆ และอัปโหลดวิดีโอในช่องเสมอๆ เพื่อสร้างความนิยมเกี่ยวกับนินจาขึ้นในคิโวทอส"

[translation]
16009-StatusMessageKr = "<소녀인법첩 미치룻치> 채널 구독 부탁해!"
16009-FullNameKr = "치도리 미치루"
16009-FamilyNameKr = "치도리"
16009-PersonalNameKr = "미치루"
16009-SchoolYearKr = "3학년"

16009-WeaponDescEn = "Michiru's favorite shotgun.\n\nIt's been modified in different ways, like putting an additional shotgun part under the muzzle so she could use ninjutsu bullets she made herself. Michiru says these are amalgams of her aspiration."
16009-ProfileIntroductionEn = "The president of the Hyakkiyako Academy Ninjutsu Research Club and admin of the video channel Michiruchi, a Girl's Ninja Scroll.\n\nMichiru tends to operate from a place of complete, unfounded confidence. As a ninja otaku, she works tirelessly with the other members to make ninjas popular throughout Kivotos. Her dreams are to make the Ninjutsu Research Club officially recognized and to reach 100 subscribers on her video channel."

16009-WeaponDescTw = "三千留一直很愛用的散彈槍。\n\n為了使用親自製作的忍法子彈，進行了在槍口下加裝散彈槍模組之類的隨意改造。據說三千留曾表示：「這才是浪漫！」。"
16009-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，總是莫名充滿自信的忍術研究部部長。\n\n是個電影、動畫和周邊都喜歡的忍者宅，因而成立「忍術研究部」、創立「少女忍法帖 小小三千留」頻道，並上傳許多影片。為了讓整個奇普托斯都了解忍者的好，今天也和忍術研究部的成員們一起四處奔走著。"

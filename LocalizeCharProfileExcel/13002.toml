13002-ProfileIntroductionTw = "格黑娜學園所屬，美食研究會的成員。\n\n常常被認為是個老實的少女，但其實是在奇普托斯的大胃王比賽中不曾錯失冠軍寶座的美食鬥士。\n基本上品性溫和善良，但他也有像格黑娜的學生一樣無法抗拒讓他人受苦的一面。"

13002-WeaponDescKr = "아카리가 애용하는 돌격소총.\n\n\r욕심 많은 대식가인 아카리의 주무장답게 유탄발사기를 포함한 다양한 총기 액세서리가 달려있다."
13002-ProfileIntroductionKr = "게헨나 미식연구회의 부원.\n\n\r여려 보이는 겉모습과 달리 많은 양의 음식을 먹어 치우는 대식가로, 키보토스 내 대식대회에서 챔피언 자리를 놓치지 않는 우수한 푸드 파이터다. 기본적으로는 온화하고 선량한 성품의 소유자지만, 악동이 많은 게헨나 학원의 학생답게 타인을 골탕 먹이는 흉악한 장난에도 일가견이 있다."

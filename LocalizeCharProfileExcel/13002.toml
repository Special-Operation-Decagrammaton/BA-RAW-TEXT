13002-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อาคาริใช้เป็นประจำ\n\nปืนที่มียุทโธปกรณ์และอุปกรณ์เสริมต่างๆ ของปืนติดไว้พร้อมสรรพสมกับเป็นปืนของอาคาริ นักชิมจอมเขมือบ"
13002-ProfileIntroductionTh = "สมาชิกชมรมชิมอาหาร ของสถาบันเกเฮนน่า\n\nอาคาริกินอาหารได้ไม่อั้น ผิดกับรูปร่างภายนอกของเธอ เจ้าของฉายานักกินดีเด่น ผู้ครองตำแหน่งชนะเลิศ ในศึกแข่งกินในคิโวทอส โดยพื้นฐานแล้วเป็นคนอ่อนโยน และจิตใจดี แต่บางครั้งเธอก็มีความคิดโหดร้าย และก่อปัญหาให้ผู้อื่น สมกับเป็นนักเรียนเกเฮนน่าจอมอันธพาล"

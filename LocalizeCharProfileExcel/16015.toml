16015-ProfileIntroductionTw = "三一綜合學園所屬，放學後的甜點部的成員，同時也是臨時組成的樂團「Sugar Rush」的團長。\n\n因為想改變平凡的自己而帶領大家參加樂團活動。其實已經成為了凝聚團體的核心人物，卻只有本人沒發現這一點。"

16015-WeaponDescKr = "아이리가 아끼는 기관단총.\n\n\r늘 한결같은 모습으로 꾸며져 있는 외관이, 아이리 스스로도 놓치고 있던 무언가를 상기시켜 준다."
16015-ProfileIntroductionKr = "방과후 디저트부의 부원이자 급조된 밴드 <슈가러시>의 리더.\n\n\r수수한 자신을 바꾸고 싶다는 생각에 모두를 이끌고 밴드 이벤트에 참여하였다. 실은 모두의 구심점이라는 대단한 존재임을, 오직 본인만이 모르고 있다."

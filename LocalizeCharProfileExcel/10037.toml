10037-ProfileIntroductionTw = "赤冬聯邦學園所屬，負責維持治安的保安委員會委員長。\n\n據說是個只要發現違反校規的學生，就會毫不猶豫地施加嚴厲處罰的冷血之人，然而實際上只是個想法單純，只會執行潔莉諾會長命令的傻瓜。喜歡「突擊」這個詞彙，每當赤冬學園內發生問題總會率先挺身而出，但因為是個天生的路癡而經常迷路。"
10037-CharacterSSRNewTw = "我，既不會逃也不會躲！"

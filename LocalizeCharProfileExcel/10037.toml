10037-WeaponDescKr = "마리나가 애용하는 드럼 탄창이 달린 기관단총.\n\n엄청난 발사 속도로 붉은겨울 사무국의 권위를 의심하는 자들을 분쇄할 수 있다."
10037-ProfileIntroductionKr = "붉은겨울 학원의 치안을 담당하는 보안위원회의 위원장.\n\n교칙을 위반하는 학생을 발견하면 문답 무용으로 무자비한 징계를 내리기 때문에 피도 눈물도 없는 냉혈한으로 알려져 있으나, 사실은 별 생각 없이 체리노 회장의 명령을 수행하는 바보에 가깝다. 돌격이라는 말을 좋아하여 붉은겨울 학원 내에서 문제가 벌어지면 제일 먼저 뛰쳐나가지만, 타고난 길치라 길을 잃는 일이 잦다."
10037-CharacterSSRNewKr = "도망치는 건 조금도 도움이 되지 않아!"

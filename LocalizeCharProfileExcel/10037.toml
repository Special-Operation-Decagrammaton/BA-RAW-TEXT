10037-WeaponDescTh = "ปืนกลมือที่มารินะใช้เป็นประจำ\n\nสามารถกำจัดผู้ที่เคลือบแคลงในอำนาจของ\nสำนักเลขาธิการเรดวินเทอร์ไปได้อย่างรวดเร็ว\nด้วยความเร็วการยิงที่น่ามหัศจรรย์"
10037-ProfileIntroductionTh = "หัวหน้าคณะความมั่นคงที่รับผิดชอบการดูแลความสงบสุขของสหภาพ\nเรดวินเทอร์\n\nเธอถูกขนานนามว่าเป็นผู้ที่เลือดเย็นจากการลงโทษเหล่านักเรียนที่\nทำผิดกฎอย่างไร้ความปรานี แต่ความจริงแล้วเธอดูเหมือนจะเป็นเด็ก\nสาวไร้เดียงสาที่คอยทำตามคำสั่งของประธานเชริโน่โดยไม่คิดอะไร\nเสียมากกว่า เธอมีนิสัยชอบคำว่า 'จู่โจม' และเมื่อเหล่าเด็กมีปัญหา\nก่อความไม่สงบขึ้นในสหภาพเรดวินเทอร์ เธอจะรีบรุดไปยังที่เกิดเหตุ\nทันที แต่ด้วยนิสัยชอบหลงทิศ เลยมักจะหลงทางอยู่บ่อยๆ"
10037-CharacterSSRNewTh = "ถึงจะหนีไปก็ไม่ช่วยอะไรหรอกนะ!"

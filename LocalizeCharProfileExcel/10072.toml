10072-WeaponDescKr = "사키가 SRT 특수학원에서 지급받은 제식 기관총.\n\n습기와 염분에 취약하므로 바다와 같은 다습한 환경에서는 자주 기능 고장을 일으키지만, 성실한 사키에게는 큰 문제가 되지 않는다."
10072-ProfileIntroductionKr = "잠입 작전을 위해 외진 어촌 마을을 방문한 RABBIT 소대의 포인트맨.\n\n언제나 FM을 중시하는 사키답게 잠입 작전임에도 불구하고 전투에 필요한 장비들을 모두 빼놓지 않고 가방에 담아 챙겨왔다. 수영복 차림이라도 성실한 점은 변하지 않는 모양."
10072-CharacterSSRNewKr = "여기는 RABBIT 2.\n현 시간부로 잠입 작전을 개시한다."

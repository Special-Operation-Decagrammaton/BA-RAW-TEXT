10072-HobbyTh = "บำรุงรักษาปืน, เก็บสะสม"
10072-WeaponNameTh = "RABBIT Type 26 Machine Gun"
10072-WeaponDescTh = "ปืนกลมาตรฐานที่ซากิได้รับจากสถาบันพิเศษ SRT\n\nเนื่องจากเป็นปืนที่มีความไวต่อความชื้นและความเค็ม\nเมื่อนำมาใช้ในบริเวณที่มีความชื้นสูงอย่างริมทะเล\nจึงมักเกิดปัญหาฟังก์ชันของปืนเสียหายบ่อยๆ แต่เรื่องนั้น\nก็ไม่เป็นปัญหาสำหรับซากิที่บำรุงรักษาปืนอยู่เสมอ"
10072-ProfileIntroductionTh = "พลชี้เป้าของกองทหาร RABBIT ที่มายังหมู่บ้านชาวประมง เพื่อปฏิบัติภารกิจแฝงตัว\n\nซากิให้ความสำคัญกับการทำตามระเบียบเสมอ ดังนั้นถึงแม้จะเป็นปฏิบัติการแฝงตัว เธอก็พกอุปกรณ์ที่จำเป็นสำหรับการต่อสู้ไว้ในกระเป๋าอยู่ตลอด ถึงจะเปลี่ยนมา เป็นชุดว่ายน้ำแล้วก็ตาม แต่เธอก็ยังขยันขันแข็งไม่เปลี่ยนแปลง"
10072-CharacterSSRNewTh = "นี่คือ RABBIT 2\nจะเริ่มปฏิบัติการแฝงตัวตั้งแต่นี้ไป"

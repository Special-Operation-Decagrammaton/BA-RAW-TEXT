10072-WeaponDescEn = "Standard machine gun issued to Saki from SRT Academy.\n\nIt frequently malfunctions in humid environments like the beach, because it's vulnerable to rusting. This isn't a problem to Saki though, who diligently cleans her guns with every use."
10072-ProfileIntroductionEn = "The RABBIT Squad's point woman, who is visiting a remote fishing village on an undercover operation.\n\nAlways focused on doing things by-the-book, Saki has come with a bag packed with everything needed for a mission, including her manuals. Despite being in a swimsuit, her work ethic remains the same."
10072-CharacterSSRNewEn = "This is RABBIT 2.\nCommencing undercover operation."

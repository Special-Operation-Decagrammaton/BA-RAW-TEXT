23004-WeaponDescTh = "ปืนกลมือดีไซน์เรียบง่ายที่อุทาฮะปรับปรุงด้วยตัวเอง\n\nปืนที่มีความแข็งแรงทนทานสูง ในบางครั้ง\nก็ใช้แทนอุปกรณ์ต่างๆ เช่นค้อนได้"
23004-ProfileIntroductionTh = "หัวหน้าชมรมวิศวกรรม ของโรงเรียนวิทย์มิลเลเนียม\n\nเธอประดิษฐ์หุ่นยนต์ออกมามากมาย หนึ่งในนั้นคือ \"สายฟ้า\" หุ่นยนต์ที่สร้างไว้เป็นเพื่อน และได้รับการประเมินว่ามีทักษะในการสู้รบ เทียบเท่ากับหุ่นยนต์ของ PMC หลายร้อยตัว"

23004-ProfileIntroductionKr = "밀레니엄 학원, 엔지니어부의 부장.\n\n\r엔지니어부의 부장이라는 직함을 증명이라도 하듯 다양한 로봇을 발명하였으며, 특히 그녀의 애완 로봇 \"천둥이\"는 PMC의 전투용 오토마타 수백 대에 달하는 전투능력을 갖추었다고 평가받고 있다."

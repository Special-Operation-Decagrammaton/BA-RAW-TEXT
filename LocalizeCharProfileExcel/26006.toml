26006-ProfileIntroductionEn = "A student suspended from Red Winter Academy and on probation in Former Institute 227.\n\nShe was suspended for constantly monitoring Sensei through a telescope. Nodoka wants to observe the world's beauty and sees Sensei in the same vein. Being in Spec Ops No. 227 has taught her to be careful with what little money she has to get by."

26006-WeaponDescKr = "노도카가 천체 관측을 하러 나갈 때 자주 사용하는 기관단총.\n\n어두운 밤길을 환히 밝혀줄 수 있는 플래시 라이트가 포함되어 있다."
26006-ProfileIntroductionKr = "붉은겨울 학원으로부터 정학 처분을 받고 구교사 227호에서 근신 중인 특별 학생.\n\n정학 사유는 망원경으로 선생님을 지속적으로 관찰하며 스토킹했기 때문이다. 그녀는 세상의 아름다운 것을 직접 눈으로 관찰하고 싶어 하며, 선생님 또한 그 대상으로 여기고 있다. 227호 특별반에서 오랫동안 고생을 해 온 탓에 가난뱅이 근성이 몸에 잔뜩 배어 있다."

26006-ProfileIntroductionTw = "赤冬聯邦學園所屬，然而受到停學處分，現在是在舊校舍227號特別班裡反省中的學生。\n\n被停學的原因是「用望遠鏡之類的物品進行騷擾行為」。\n想親眼觀察世界上美好事物的欲望很強，而老師也是其對象之一。因為在227號特別班吃苦很長一段時間，已經染上了貧窮的性格。"

26006-WeaponDescTh = "ปืนกลมือที่โนโดกะพกติดตัวไปด้วยเป็นประจำในตอนที่\nออกไปดูดาว\n\nทั้งยังมีไฟฉายไว้ใช้สำหรับส่องไฟในตอนเดินบนถนนที่\nมืดสนิทอีกด้วย"
26006-ProfileIntroductionTh = "นักเรียนพิเศษที่ถูกสหภาพเรดวินเทอร์พักการเรียน\nตอนนี้อยู่ระหว่างถูกทำโทษกักตัวอยู่ที่ห้อง 227 ของโรงเรียน\n\nสาเหตุที่ถูกพักการเรียน เป็นเพราะใช้กล้องส่องทางไกลลอบส่องคุณครู และแอบติดตามอย่างลับๆ เธออยากสังเกตความงามของโลกใบนี้ด้วยตาตัวเอง และหนึ่งในเป้าหมายนั้นก็รวมคุณครูอยู่ด้วย การที่ต้องลำบากอยู่ในห้องเรียนพิเศษ 227 อยู่นาน ทำให้ตอนนี้เธอมีเลือดนักสู้อยู่อย่างเต็มเปี่ยม"

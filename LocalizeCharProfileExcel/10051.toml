10051-ProfileIntroductionTh = "หัวหน้าชมรมวิศวกรรมที่แปลงโฉมใหม่มาเป็นหัวหน้ากองเชียร์ในงาน\nมหกรรมแข่งขันกีฬา\n\nถึงจะได้รับมอบหมายให้ดูแลกองเชียร์อย่างกะทันหัน แต่ในฐานะไมสเตอร์ เธอก็พยายามสุดความสามารถเพื่อทำภารกิจที่ได้รับมอบหมาย และพยายามส่งเสียงเชียร์อย่างสุดกำลังกว่ากองเชียร์อื่นๆ แต่บางครั้ง ความมุ่งมั่นของเธอก็ทำให้หลงลืมวัตถุประสงค์หลักของการเชียร์ไปบ้าง\nก็ตาม..."
10051-CharacterSSRNewTh = "ใส่ไปให้สุดแรงเลย!"

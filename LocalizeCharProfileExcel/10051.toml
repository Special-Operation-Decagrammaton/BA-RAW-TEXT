10051-WeaponDescKr = "우타하가 소유하고 있는 심플한 디자인의 기관단총.\n\n응원 중에는 방해가 되지 않도록 천둥이의 내부에 수납하고 있다."
10051-ProfileIntroductionKr = "대운동회를 맞이해 응원단장 차림을 한 엔지니어부의 부장.\n\n비록 갑작스럽게 맡게 된 응원 업무이지만, 의뢰를 맡으면 언제나 최선을 다하는 마이스터답게 그녀의 열정은 그 어떤 응원단장보다 뜨겁게 타오른다. 가끔은 그 열정이 지나쳐 본 목적을 잊어버리기도 하지만……"

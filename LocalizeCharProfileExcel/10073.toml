10073-WeaponDescTh = "ปืนไรเฟิลกำจัดเสียงดังรบกวนที่อุยพกติดตัวมาทำงาน\nนอกสถานที่ด้วย\n\nถึงจะเป็นเกาะร้างที่ปราศจากความวุ่นวาย แต่กลับมีเรื่องให้เธอใช้ปืนมากจนน่าประหลาดใจ"
10073-ProfileIntroductionTh = "หัวหน้าชมรมอ่านหนังสือของทรีนิตี้ที่ออกมาสำรวจซากโบราณ\nจากคำไหว้วานของชมรมซิสเตอร์\n\nถึงแม้เธอจะไม่ชอบการออกมาข้างนอกและทำกิจกรรมที่ต้องเคลื่อนไหว\nร่างกายมากก็ตาม แต่เธอก็ออกสำรวจอย่างจริงจังด้วยความหลงใหลใน\nหนังสือเก่า โบราณวัตถุ และโบราณสถานต่างๆ"
10073-CharacterSSRNewTh = "แฮ่ก... แฮ่ก... อึก...\nแบบนี้มันแย่ที่สุด... "

10087-WeaponDescKr = "아코가 가지고 있는 권총.\n\n\r행정관으로서의 능력을 증명해 주는 권총으로 아코가 언제나 소중히 다루는 물건임과 동시에 지금은 게헨나 특별 에이전트의 비밀 무기로서 활약하고 있다……는 설정이 붙어 있다."
10087-ProfileIntroductionKr = "게헨나 선도부의 선임 행정관이자 선도부장 히나의 비서.\n\n\r게헨나 특별 파티를 맞이하여, 변함없이 히나의 곁에서 보좌하기 위해 본인 또한 과감히 드레스를 입게 되었다. 평소에도 빈틈없는 일 처리 실력으로 뭇 선도부원들의 존경을 받는 그녀이지만, 이번엔 거기서 한 발짝 더 나아가, 완벽한 에이전트로서 활약할 예정……이라고 아코는 자신만만하게 말하고 있다."
10087-CharacterSSRNewKr = "제가 나선 만큼, 이번 미션에 빈틈은 없어요!"

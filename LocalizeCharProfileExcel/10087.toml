10087-WeaponDescTw = "亞子所持有的手槍。\n\n亞子一向相當珍惜地使用這把象徵著行政官能力的手槍。目前同時也作為格黑娜特務的祕密武器發揮作用……設定上是這樣的。"
10087-ProfileIntroductionTw = "格黑娜學園所屬，風紀委員會的上級行政官，同時也是風紀委員長陽奈的祕書。\n\n在迎接格黑娜特別派對的同時，為了一如既往地從旁輔佐陽奈，本人也果斷地穿上了禮服。平時處理事情的能力也滴水不漏，受風紀委員會眾成員所敬仰，不過這次預計還會更上一層樓，作為完美的特務大顯身手……自信滿滿的亞子如是說。"
10087-CharacterSSRNewTw = "只要我出手，這次任務就萬無一失！"

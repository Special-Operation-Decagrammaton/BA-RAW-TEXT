10087-WeaponNameTh = "Hot Shot"
10087-WeaponDescTh = "ปืนพกที่อาโกะใช้เป็นประจำ\n\nหลังจากเพียรพยายามอย่างหนัก อาโกะได้เลื่อนตำแหน่ง\nเป็นเจ้าหน้าที่อาวุโส และได้รับปืนแสนสำคัญกระบอกนี้มา\nเธอพกติดตัวไปด้วยเสมอ และในครั้งนี้เธอก็พกมาด้วย\nในฐานะอาวุธลับของเจ้าหน้าที่ลับพิเศษจากเกเฮนน่า..."
10087-ProfileIntroductionTh = "เจ้าหน้าที่อาวุโสของคณะกรรมการวินัยและเลขานุการของประธานฮินะ\n\nอาโกะเปลี่ยนเป็นชุดเดรส และคอยอยู่เคียงข้างและสนับสนุนฮินะเช่นเคย\nในงานปาร์ตี้สุดพิเศษแห่งเกเฮนน่า เธอมักจะได้รับความเคารพจาก\nสมาชิกคณะกรรมการวินัยหลายๆ คนสำหรับทักษะการทำงานที่สมบูรณ์\nแบบและไร้ที่ติ และในครั้งนี้ อาโกะก็มั่นใจอย่างเต็มเปี่ยมว่าจะทำหน้าที่\nเป็น \"เจ้าหน้าที่ลับ\" ได้อย่างสมบูรณ์แบบอีกเช่นกัน"
10087-CharacterSSRNewTh = "เมื่อฉันลงมือเองแบบนี้\nภารกิจนี้ย่อมไม่มีช่องโหว่แน่นอนค่ะ!"

[translation]
20033-StatusMessageTh = "เราคือผู้นำที่แท้จริงของเกเฮนน่า!"
20033-FullNameTh = "ฮานุมะ มาโคโตะ"
20033-FamilyNameTh = "ฮานุมะ"
20033-PersonalNameTh = "มาโคโตะ"
20033-SchoolYearTh = "ชั้นปีที่ 3"
20033-CharacterAgeTh = "18 ปี"
20033-BirthdayTh = "19 มี.ค."
20033-HobbyTh = "วางแผน, คิดแผนลับ, เล่นกับอิบูกิ"
20033-WeaponNameTh = "The Honored One"
20033-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่มาโคโตะใช้\n\nมาโคโตะได้มอบหมายให้ช่างฝีมือที่มีชื่อเสียงสร้างขึ้น\nเป็นปืนชั้นเลิศในหมู่ปืนชั้นสูง เพื่อแสดงถึงอำนาจของตน เนื่องจากมาโคโตะเป็นผู้นำสูงสุด ที่ออกคำสั่งอยู่เบื้องหลังมากกว่าออกไปต่อสู้เอง จึงดูเหมือนไม่ค่อยได้ใช้งานปืนนี้เท่าไรนัก"
20033-ProfileIntroductionTh = "ประธานของแพนเดโมเนียมโซไซตี้\n\nมาโคโตะเป็นผู้ที่มีความทะเยอทะยานสูงและเป็นนักวางแผนตัวฉกาจที่ซื่อตรง\nต่อความรู้สึกของตนเองมาก และไม่ลังเลที่จะใช้ทุกวิธีเพื่อให้ได้ในสิ่งที่ต้องการ\nทำให้บางครั้งมักเจอกับเรื่องน่าปวดหัวเพราะท่าทาง และทัศนคติของตนเอง\nแต่เธอก็เป็นคนที่มุ่งมั่นและยืนหยัดอย่างภาคภูมิ นอกจากนี้เธอยังรักและเอ็นดู\nอิบูกิเหมือนน้องสาวแท้ๆ และปฏิบัติต่ออิโรฮะเหมือนน้องสาว\nคนหนึ่งด้วยเช่นกัน"
20033-CharacterSSRNewTh = "เอาละ คุณครู!\nได้เวลาก้าวไปพร้อมกับแพนเดโมเนียม โซไซตี้แล้ว!"

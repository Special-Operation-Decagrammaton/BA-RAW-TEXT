20033-WeaponDescTw = "真琴所使用的狙擊步槍。\n\n真琴為了展現自己的權威，親自委託在格黑娜也赫赫有名的名將製作，屬於精品中的精品。不過比起親自上陣，這位萬魔殿的議長更偏好坐鎮指揮，因此並不常使用。"
20033-ProfileIntroductionTw = "格黑娜學園所屬，萬魔殿的議長。\n\n為了想要得到的東西不惜策劃陰謀詭計，是忠於欲望的野心家兼陰謀家。有時會因為這種行事風格而受到傷害或挫折，不過馬上就能再次振作並捲土重來，是一位剛強的少女。順帶一提，他將伊吹當成妹妹疼愛，同樣地也將伊呂波當成妹妹使喚。"
20033-CharacterSSRNewTw = "來吧！老師！\n是時候和我們萬魔殿共同邁進了！"

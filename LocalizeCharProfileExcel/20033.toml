[translation]
20033-StatusMessageKr = "이 몸이 바로 게헨나의 진정한 리더다!"
20033-FullNameKr = "하누마 마코토"
20033-FamilyNameKr = "하누마"
20033-PersonalNameKr = "마코토"
20033-SchoolYearKr = "3학년"
20033-CharacterAgeKr = "18세"
20033-BirthdayKr = "3월 19일"
20033-HobbyKr = "계략, 음모 꾸미기, 이부키랑 놀아주기"
20033-WeaponNameKr = "유아독존"
20033-WeaponDescKr = "마코토가 사용하는 저격소총.\n\n\r자신의 권위를 드러내기 위해, 게헨나에서도 유명한 장인에게 마코토가 직접 의뢰하여 제작한 명품 중의 명품. 다만 직접 나서기보다 뒤에서 군림하는 쪽을 선호하는 만마전의 의장님이다 보니, 사용할 일은 그다지 많지 않다는 모양이다."
20033-ProfileIntroductionKr = "판데모니움 소사이어티의 의장.\n\n\r얻고자 하는 게 있다면 흉계를 꾸미는 것도 마다하지 않는, 욕망에 솔직한 야심가이자 음모가. 때로는 그런 태도 때문에 아픈 꼴을 당하고 고꾸라질 때도 있지만, 금세 개의치 않고 자리를 털고 일어나는 강단 있는 소녀. 참고로 이부키를 동생처럼 무척이나 귀여워하고 있으며, 마찬가지로 늘 이로하를 동생처럼 부려 먹고 있다."
20033-CharacterSSRNewKr = "자아! 선생이여!\n\r우리 판데모니움 소사이어티와 함께할 때다!"

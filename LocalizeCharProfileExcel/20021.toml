20021-ProfileIntroductionEn = "A member of the Trinity Remedial Knights. She's wearing a Santa costume to celebrate Christmas.\n\nBecause she has a very active personality, Hanae needs a Santa costume that allows her freedom of movement. For a girl who finds everything exciting, Christmas is nothing less than a month-long festival. She carries bundles of presents everywhere she goes, and rings a bell to fill everyone with the spirit of the season."

20021-WeaponDescTh = "ปืนไรเฟิลจู่โจมของฮานาเอะ\n\nปืนของเธอได้สร้างความสุขและเสียงหัวเราะแห่งความสุข\nให้กับทุกๆ คนแม้แต่ในเทศกาลวันคริสต์มาส"
20021-ProfileIntroductionTh = "ฮานาเอะที่แปลงโฉมมาในชุดซานต้าสาวสำหรับวันคริสต์มาส\n\nฮานาเอะเปลี่ยนชุดมาเป็นชุดซานต้าสาวและทำภารกิจได้อย่างสดใสร่าเริง เช่นเดียวกับวันอื่นๆ ถึงทุกอย่างจะน่าตื่นตาตื่นใจและดูน่าสนุกสนานสุดๆ แต่สำหรับฮานาเอะแล้วเธอสนุกกับเทศกาลคริสต์มาสมากๆ เธอถือถุงของขวัญและสั่นกระดิ่ง แล้วนำความสุขไปมอบให้กับทุกๆ คน"
20021-CharacterSSRNewTh = "เมอร์รี คริสต์มาส~! นางฟ้าแห่งอัศวินบรรเทาทุกข์\nมาพบทุกคนแทนคุณลุงซานต้าแล้วค่ะ!"

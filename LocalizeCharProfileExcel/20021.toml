20021-ProfileIntroductionKr = "크리스마스를 맞아 산타 복장을 한 하나에.\n\n평소 활발한 하나에답게 산타 복장도 활동하기 편한 것으로 골랐다. 모든 것이 신나고 즐겁기만 한 하나에에게, 크리스마스는 그야말로 축제 그 자체다. 선물 꾸러미를 들고 종을 울리며, 모두에게 기쁜 소식을 전하러 자선 활동에 나선다."
20021-CharacterSSRNewKr = "메리 크리스마스~!\n이번에는 산타 할아버지 대신 구호의 천사가 찾아왔어요!"

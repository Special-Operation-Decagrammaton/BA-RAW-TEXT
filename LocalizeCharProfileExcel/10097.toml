10097-WeaponDescKr = "모에가 SRT 특수학원에서 지급받은 제식 권총.\n\n튼튼한 몰리브덴 합금으로 프레임이 제작되어, 고온다습한 바닷가에서도 빠른 연사를 가할 수 있다."
10097-ProfileIntroductionKr = "잠입 작전을 위해 외진 어촌 마을을 방문한 RABBIT 소대의 오퍼레이터.\n\n평소와는 다른 환경에서 여러 가지 무기를 시험해 볼 생각에 잔뜩 들떠 있다. 다른 소대원들과는 달리 아슬아슬한 디자인의 수영복을 입고 있는데, 본인의 말에 따르면 이 또한 파멸의 일부라는 모양이다."
10097-CharacterSSRNewKr = "여기는 RABBIT 3.\n그래서, 미사일은 언제 쏠 수 있는 거야?"

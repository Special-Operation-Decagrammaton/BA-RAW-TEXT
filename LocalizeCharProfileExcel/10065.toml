[translation]
10065-StatusMessageKr = "업무 상담은 부담 없이 부탁드립니다."
10065-FullNameKr = "쿠와카미 카호"
10065-FamilyNameKr = "쿠와카미"
10065-PersonalNameKr = "카호"
10065-SchoolYearKr = "3학년"
10065-CharacterAgeKr = "17세"
10065-BirthdayKr = "10월 9일"
10065-HobbyKr = "백귀야행 문화 홍보, 백귀야행 굿즈 수집"
10065-WeaponNameKr = "전략홍보팀장의 노하우"
10065-WeaponDescKr = "카호가 평소 사용하는 소총.\n\n\r백귀야행을 알리기 위한 홍보 수단 중 하나로써, 백귀야행 특유의 멋스러움을 알리고자 카호가 직접 특별히 주문 제작하여 만든 소총. 덕분에 홍보에 톡톡히 도움이 되는 것은 물론, 그 위력은 학원의 문제아들을 진정시키는 데에도 탁월한 효과를 보여준다."
10065-ProfileIntroductionKr = "백귀야행 학원 음양부의 부부장 겸 관광문화산업 홍보지원팀의 전략홍보팀장.\n\n\r백귀야행의 홍보를 담당하고 있는 음양부원으로서, 그 누구보다 백귀야행의 문화를 사랑하고 함께 문화를 만들어 나가는 학생들을 아끼는 소녀. 이런 모습 때문인지 일부 백귀야행 학생들에겐 <부장님보다 더 부장님다운 카호 님>이라고 불리기도 한다는 모양. 참고로 음양부 내에서는 귀중한 상식인 포지션을 맡고 있기도 하다."
10065-CharacterSSRNewKr = "제가 알고 있는 백귀야행의 멋진 모습들을,\n\r선생님께도 알려 드리겠습니다."

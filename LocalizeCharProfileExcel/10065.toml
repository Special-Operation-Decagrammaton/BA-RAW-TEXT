[translation]
10065-StatusMessageTh = "ปรึกษาเรื่องงานได้เลยนะคะ"
10065-FullNameTh = "คุวาคามิ คาโฮะ"
10065-FamilyNameTh = "คุวาคามิ"
10065-PersonalNameTh = "คาโฮะ"
10065-SchoolYearTh = "ชั้นปีที่ 3"
10065-CharacterAgeTh = "17 ปี"
10065-BirthdayTh = "9 ต.ค."
10065-HobbyTh = "โปรโมตวัฒนธรรมเฮียกคิยาโค, สะสมกู้ดเฮียกคิยาโค"
10065-WeaponNameTh = "The Lead Strategist's Expertise"
10065-WeaponDescTh = "ปืนไรเฟิลประจำตัวคาโฮะ\n\nปืนไรเฟิลที่คาโฮะสั่งทำเป็นพิเศษเพื่อโปรโมตเอกลักษณ์ และวัฒนธรรมอันโดดเด่นของเฮียกคิยาโค เป็นหนึ่งในแนวทางการประชาสัมพันธ์เพื่อโปรโมตเฮียกคิยาโคด้วย อานุภาพของมัน ได้ประจักษ์แก่สายตาด้วยการกำราบเด็กมีปัญหาในสหพันธ์"
10065-ProfileIntroductionTh = "รองหัวหน้าชมรมหยินหยางสหพันธ์เฮียกคิยาโคควบตำแหน่งหัวหน้าทีม\nประชาสัมพันธ์เชิงกลยุทธ์ของทีมสนับสนุนการประชาสัมพันธ์อุตสาหกรรม\nการท่องเที่ยวและวัฒนธรรม\n\nในฐานะสมาชิกชมรมหยินหยางที่รับผิดชอบงานประชาสัมพันธ์ของ\nสหพันธ์เฮียกคิยาโค เธอคือเด็กสาวผู้รักวัฒนธรรมเฮียกคิยาโคมากกว่าใครๆ\nและคอยเอาใจใส่นักเรียนที่ร่วมใจสืบสานวัฒนธรรมด้วย คงเป็นเพราะ\nภาพลักษณ์เหล่านี้ เธอจึงถูกเหล่านักเรียนเฮียกคิยาโคขนานนามว่า\n<ท่านคาโฮะผู้เหมือนหัวหน้ายิ่งกว่าหัวหน้า> ขอบอกว่าเธอดำรงตำแหน่ง\nวิทยากรทรงคุณวุฒิในชมรมหยินหยางด้วยนะ"
10065-CharacterSSRNewTh = "ฉันขอเล่าถึงภาพลักษณ์สุดเท่ของสหพันธ์เฮียกคิยาโค\nจากที่ทราบมา ให้คุณครูฟังด้วยเลยนะคะ"

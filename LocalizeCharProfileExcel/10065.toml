10065-WeaponDescTw = "佳穗平常使用的步槍。\n\n佳穗為了傳達百鬼夜行的美好之處而親自訂做的步槍。不只對宣傳有幫助，其威力用於讓學園的問題兒童冷靜下來也有卓越的效果。"
10065-ProfileIntroductionTw = "百鬼夜行學園聯合學園，陰陽部的副部長兼觀光文化產業宣傳支援部的戰略領袖。\n\n比任何人都熱愛百鬼夜行的文化，並且重視創造文化的學生的少女。也許是因為他的這副模樣，部分百鬼夜行的學生似乎會稱他為「比部長更像部長的佳穗大人」。順帶一提，他在陰陽部裡是貴重的常識人角色。"
10065-CharacterSSRNewTw = "百鬼夜行的各種魅力，\n我也會告訴老師的"

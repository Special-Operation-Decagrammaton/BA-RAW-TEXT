13004-ProfileIntroductionKr = "아비도스 대책위원회의 일원.\n\n\r다정다감하고 상냥한 성품의 소유자로 극단적인 성격이 많은 대책위원회의 회원들을 하나로 뭉쳐주는 정신적 지주 역할을 하고 있다. 겉으로 내색하진 않지만 부유한 부잣집의 영애로, 대책위원회 간식비의 대부분은 그녀의 용돈에서 나오고 있다."

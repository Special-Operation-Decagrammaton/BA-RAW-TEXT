13004-ProfileIntroductionTh = "สมาชิกคณะกรรมการแผนงาน ของโรงเรียนมัธยมอะบิดอส\n\nด้วยนิสัยอ่อนโยนและเรียบร้อย โนโนมิมีบทบาทสำคัญในการดึงสติ ของสมาชิกคณะกรรมการแผนงาน ที่ชอบทำอะไรที่แบบสุดขั้ว แม้ว่าเธอจะไม่แสดงออกเท่าไหร่ แต่เธอเป็นลูกคุณหนูที่บ้านมีฐานะ และช่วยออกค่าขนม ของคณะกรรมการแผนงานอยู่เสมอ"
13004-CharacterSSRNewTh = "ได้เวลาออกโรงแล้วสินะ!"

10029-ProfileIntroductionTw = "三一綜合學園所屬，放學後的甜點部的首席麻煩製造者，自稱是浪漫主義者。\n\n會突然說些富有哲學性的奇怪發言，愛用甜點作譬喻的女孩。總會說出離奇的話，將大家捲入其中，但本意只是「想和大家一起分享浪漫」這種純粹的心情。不過，因為「浪漫」的定義總是在改變，所以也無法否定「被他牽著鼻子走」的印象。"
10029-CharacterSSRNewTw = "……老師有認真思考過，關於海綿蛋糕的事嗎？"

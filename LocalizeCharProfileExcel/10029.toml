10029-WeaponDescKr = "나츠의 기관단총.\n\n\r사색하는 것을 즐기는 나츠가 마지막 수단으로 꺼내드는 도구이다."
10029-ProfileIntroductionKr = "트리니티 방과후 디저트부 소속의 일원으로, 트러블 메이커의 필두이자 자칭 로맨티스트.\n\n\r묘하게 철학적인 말을 하거나, 만사를 디저트에 빗대어 표현하는 버릇이 있다. 늘 엉뚱한 일로 주변을 곤란하게 만들지만, 모두와 함께 로망을 공유하고 싶다는 순수한 마음 때문. 이야기하는 「로망」의 정의가 항상 바뀌기 때문에, 옆에서 보면 모두가 나츠에게 「휘둘리고 있다」는 인상을 부정할 순 없다."
10029-CharacterSSRNewKr = "쇼트케이크에 대하여 고찰해 본 적 있어? 선생님."

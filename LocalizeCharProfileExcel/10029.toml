10029-WeaponDescTh = "ปืนกลมือที่นัตสึใช้เป็นประจำ\n\nสำหรับนัตสึที่ชอบการคิดไตร่ตรองคนเดียว การคว้าปืนออกมาใช้จึงมักจะเป็นทางเลือกสุดท้ายของเธอ"
10029-ProfileIntroductionTh = "สมาชิกชมรมของหวานหลังเลิกเรียนแห่งโรงเรียนทรีนิตี้ นัตสึถูกขนานนามว่า เป็นตัวสร้างปัญหาอันดับหนึ่ง แต่เธอมักจะเรียกตัวเองว่าผู้นิยมความโรแมนติก\n\nเธอชอบพูดถึงปรัชญาต่างๆ ที่ยากจะเข้าถึงและอุปมากับของหวานอยู่บ่อยๆ คำพูดที่น่าฉงนของเธอมักจะทำให้คนรอบข้างมึนบ่อยๆ แต่ที่จริงเธอเพียง แค่อยากจะแบ่งปันความโรแมนติกกับทุกๆ คนก็เท่านั้น แต่ทว่าคำนิยาม ของคำว่าโรแมนติกของเธอมัก \"เปลี่ยนแปลง\" อยู่บ่อยๆ เลยมักทำให้คนรอบข้างต้องปวดหัวอยู่ตลอด"
10029-CharacterSSRNewTh = "เคยศึกษาเรื่องชอร์ตเค้กมาก่อนรึเปล่าคุณครู?"

20027-WeaponNameTh = "WHITE FANG 465"
20027-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ชิโรโกะนำมาใช้ที่ทะเล\n\nด้วยความที่ชิโรโกะหมั่นบำรุงรักษาปืนอยู่เป็นประจำ ทำให้\nไม่มีปัญหาเมื่อเจอกับความชื้นและความเค็มของเกลือทะเล"
20027-ProfileIntroductionTh = "หัวหน้าความประพฤติของคณะกรรมการแผนงานที่มายังรีสอร์ตบนเกาะร้าง ในช่วงฤดูร้อน\n\nแม้จะอยู่ในสถานการณ์ที่น่ากังวล เธอก็ยังคงเป็นผู้นำในการจัดการงานต่างๆ ที่จำเป็น เช่น การฟื้นฟูรีสอร์ต และออกรวบรวมเสบียงอาหาร ถึงจะเปลี่ยนมาใส่ชุดว่ายน้ำแล้ว แต่แรงใจและความซื่อตรงที่เป็นเอกลักษณ์ ก็คงเหมือนเดิมไม่เปลี่ยน"
20027-CharacterSSRNewTh = "ไม่ได้ตื่นเต้นอะไรเกินไปสักหน่อย\nแค่ทำงานที่ต้องทำก็เท่านั้นเอง"

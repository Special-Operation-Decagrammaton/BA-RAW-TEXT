10115-ProfileIntroductionTh = "แบตเตอร์ลำดับที่ 4 ของชมรมเบสบอลแห่งมิลเลเนียม\n\nมีความปรารถนาอันแรงกล้าที่จะปฏิรูปชมรมเบสบอลของมิลเลเนียมที่ดู\nจะใกล้เคียงกับชมรมฟิสิกส์พลศาสตร์มากกว่า แม้จะเข้ากันได้กับสึมิเระที่มี\nพละกำลังล้นหลาม แต่เมื่อได้ทำอะไรด้วยกันจริงๆ เรย์ก็จะอ่อนกำลังไปก่อน"
10115-CharacterSSRNewTh = "ฝึกซ้อมให้เหมือนแข่ง แข่งให้เหมือนฝึกซ้อม!"

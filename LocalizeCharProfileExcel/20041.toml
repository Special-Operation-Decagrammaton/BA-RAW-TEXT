20041-WeaponDescKr = "리오의 호신용 권총.\n\n\r사격에 서툰 리오지만, 키보토스에서 총이 없다는 것은 비합리적이라는 이유로 소지 중이다."
20041-ProfileIntroductionKr = "밀레니엄 학원 학생회 <세미나>의 회장.\n\n\r바라는 것은 밀레니엄과 세계의 안전. 그것을 위해서라면 수단과 방법을 가리지 않는다. 그 결과, 모두에게 <빅 시스터>라고 불리게 되었다는 모양. 여러모로 독특한 센스와 감성의 소유자. 일부 학생들에게만 알려져 있는 <아방가르드군> 역시, 그 센스의 일부만이 발현된 것이라고 한다."
20041-CharacterSSRNewKr = "우리는 빛이 없는 곳에서 만날 거야."

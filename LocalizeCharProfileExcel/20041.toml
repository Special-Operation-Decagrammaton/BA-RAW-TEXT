20041-WeaponDescTh = "ปืนป้องกันตัวของริโอะ\n\nแม้จะไม่เก่งเรื่องการยิงปืน แต่จะไม่พกปืนในคิโวทอสก็ไม่ได้ ริโอะจึงพกปืนนี้ติดตัวไว้"
20041-ProfileIntroductionTh = "ประธาน <เซมิน่า> ผู้เป็นสภานักเรียนของมิลเลเนียม\n\nริโอะทำได้ทุกอย่างเพื่อความปลอดภัยในมิลเลเนียมและโลกใบนี้ที่เธอปรารถนา และดูเหมือนว่านั่นจะทำให้ทุกคนเรียกเธอว่า <บิ๊กซิสเตอร์>\nริโอะเป็นคนที่มีเซ้นส์ และความรู้สึกที่ไม่เหมือนใครในหลายๆ ด้าน ว่ากันว่า <หุ่นรบล้ำยุค> ที่มีนักเรียนน้อยคนรู้จักก็มาจากเซ้นส์นั้นของเธอ"
20041-CharacterSSRNewTh = "เราจะได้เจอกันในที่ที่ไร้แสงสว่าง"

20041-WeaponDescJp = "Rio's self-defense pistol.\n\nAlthough she's not a particularly good shot, she carries it everywhere with her, reasoning that it would be foolish not to carry a gun in Kivotos."
20041-ProfileIntroductionJp = "President of Seminar, the student council of Millennium School.\n\nHer desires for peace, in Millennium and the world, drive her to do whatever she thinks is necessary. As a result, she became known as everyone's \"big sister.\" Her stylistic and aesthetic tastes are quite unique. Her Avant Guard robot corps, which is known only to a few students, exemplifies those tastes."
20041-CharacterSSRNewJp = "We'll meet again in a place where light doesn't shine."

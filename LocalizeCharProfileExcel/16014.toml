16014-WeaponDescEn = "Ibuki's favorite firearm.\n\nIt was originally just a ceremonial rifle given to her by the Pandemonium Society, but she quickly made it her own by decorating it with her favorite stickers and accessories. It's one of her most prized possessions."
16014-ProfileIntroductionEn = "A member of the Pandemonium Society and a mascot of sorts.\n\nDespite being an elementary school student at Gehenna, she was recognized for her smarts and abilities and invited to the esteemed Pandemonium Society. She's the youngest member of the club and is excessively doted on by her seniors. In return, Ibuki does her utmost to not be a burden to her fellow club members and follows directions as best she can."

16014-WeaponDescTh = "ปืนที่อิบูกิหวงแหนเป็นอย่างมาก\n\nปืนไรเฟิลมาตรฐานที่ได้รับสืบทอดมาจากรุ่นพี่ในแพนเด\nโมเนียม โซไซตี้ที่ใช้งานและบำรุงรักษาอย่างดีมาตลอด อิบูกิได้นำสติกเกอร์กับของตกแต่งมาประดับไว้อย่าง\nสวยงาม และกลายเป็นสมบัติที่อิบูกิรักและหวงแหนมาก"
16014-ProfileIntroductionTh = "สมาชิกและมาสคอตสุดน่ารักของแพนเดโมเนียม โซไซตี้\n\nถึงแม้เดิมทีเธอจะอยู่ในสังกัดของโรงเรียนประถมเกเฮนน่า แต่ด้วยความ\nสามารถอันเป็นที่ยอมรับและได้รับเลือกให้เข้าเป็นหนึ่งในสมาชิกของ\nแพนเดโมเนียม โซไซตี้ที่มีเพียงนักเรียนหัวกะทิเท่านั้นที่เข้าร่วมได้ ถึงแม้เธอจะอายุน้อยที่สุดในบรรดาสมาชิกแพนเดโมเนียม โซไซตี้ แต่ด้วยท่าทางที่น่ารักและความจริงใจ ทำให้อิบูกิกลายเป็นที่รักของ\nสมาชิกทุกๆ คน และเธอก็พยายามอย่างเต็มที่ในทุกๆ วันเพื่อที่จะไม่เป็น\nภาระให้กับรุ่นพี่คนอื่นๆ"

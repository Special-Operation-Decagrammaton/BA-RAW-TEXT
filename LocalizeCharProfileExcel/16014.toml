16014-WeaponDescKr = "이부키가 소중히 여기고 있는 총기.\n\n\r원래는 만마전의 선배들에게 물려받은 제식 소총이었지만 꾸준히 아끼며 사용해 온 결과, 지금은 평소 이부키가 마음에 들어 하는 스티커를 붙이거나, 액세서리를 달아 꾸며놓는 등. 이제는 이부키의 둘도 없는 소중한 보물이 되었다고 한다."
16014-ProfileIntroductionKr = "판데모니움 소사이어티 소속의 의원이자 마스코트 격인 소녀.\n\n\r본디 게헨나 학원 초등부 소속이지만, 그 능력을 인정받아 게헨나에서도 우수한 학생만이 들어갈 수 있다는 만마전에 들어왔다. 만마전 내에서 나이는 제일 어리지만 특유의 성실함과 귀여움으로 모두에게 사랑을 받고 있다. 그만큼 선배들에게 폐가 되지 않도록 오늘도 노력하고 있는 바른생활 어린이."

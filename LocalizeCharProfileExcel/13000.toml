13000-ProfileIntroductionKr = "밀레니엄 학원의 비밀 조직, C&C의 에이전트.\n\n콜사인은 제로쓰리로 \"청소\"에 특화된 요원이다. 부드러운 인상을 바탕으로 적진에 침투하여 폭약으로 진영을 깨끗이 청소해 버리기 때문에 \"청소의 명인\"이라는 이명으로도 알려져 있다."

13000-ProfileIntroductionTh = "สายลับขององค์กรลับ \"C&C\" แห่งโรงเรียนวิทย์มิลเลเนียม\n\nเจ้าหน้าที่พิเศษในการ \"ทำความสะอาด\" เจ้าของรหัสประจำตัวซีโร่ทรี เป็นที่รู้จักกันในชื่อ \"ผู้เชี่ยวชาญด้านการทำความสะอาด\" เพราะเธอบุกเข้าหาศัตรู และกวาดล้างฝ่ายตรงข้ามอย่างราบคาบ ด้วยบุคลิกที่อ่อนโยน"

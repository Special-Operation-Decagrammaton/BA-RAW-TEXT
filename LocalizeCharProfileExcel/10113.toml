10113-WeaponDescTh = "ปืนยิงระเบิดขนาดสั้นของเซนะ\n\nสมรรถนะยังคงไม่เปลี่ยนแปลงแม้จะอยู่ในช่วงวันหยุด"
10113-ProfileIntroductionTh = "เซนะ หัวหน้าชมรมหน่วยแพทย์ฉุกเฉินแห่งสถาบันเกเฮนน่าที่หยิบชุดลำลอง\nมาใส่ในวันหยุด\n\nถึงจะอยู่ในช่วงวันพักผ่อน แต่เซนะก็ยังไม่ลืมจิตวิญญาณของหัวหน้าหน่วย\nแพทย์ฉุกเฉิน ที่จริงต้องบอกว่าเธอแอบตื่นเต้นว่าจะมีเรื่องสนุกอะไรเกิดขึ้น\nหรือเปล่า ในวันเวรออฟ เซนะจะสังเกตสถานการณ์รอบๆ ด้วยความอยากรู้\nอยากเห็นและอารมณ์ที่ผ่อนคลายกว่าปกติ"
10113-CharacterSSRNewTh = "ฉันเวรออฟ ก็เลยมาแจ้งให้ทราบค่ะ"

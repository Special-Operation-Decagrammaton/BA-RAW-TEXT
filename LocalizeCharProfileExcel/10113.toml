10113-WeaponDescKr = "세나의 단축형 유탄발사기.\n\n휴일이라고 해도, 그 기능은 특별히 달라지지 않는다."
10113-ProfileIntroductionKr = "휴일을 맞아, 스스로 고른 사복으로 갈아입은 세나.\n\n휴식 중이지만 응급의학부장으로서의 소명은 잊지 않고 있다. 그렇다고 할까, 사실은 무슨 흥미로운 일이 일어나지 않을까 내심 두근거리고 있다. 평소와는 조금 다르게, 더 가벼워진 기분으로 호기심을 내보이며 주위를 둘러보는 게헨나의 응급의학부장님."
10113-CharacterSSRNewKr = "비번일이 되었기에, 이에 보고드립니다."

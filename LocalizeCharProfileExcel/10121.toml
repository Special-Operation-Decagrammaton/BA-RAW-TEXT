10121-WeaponDescKr = "유카리가 사용하는 백화요란의 제식 소총.\n\n소녀에게 있어, 둘도 없는 소중한 보물이기에, 혹시 젖을세라 꼼꼼하게 방수 대책을 마련해 두었다."
10121-ProfileIntroductionKr = "여름을 맞아 수영복을 입은 백화요란 분쟁조정위원회의 부원.\n\n좋아하는 선배들과 백야수상제에 참가해 매우 들떠 있다. 특유의 밝은 성격과 거침없는 행동력은 바다에서도 여전하다."
10121-CharacterSSRNewKr = "바다에서도 퍼어~펙투한 소녀를 보여 드리겠사와요!"

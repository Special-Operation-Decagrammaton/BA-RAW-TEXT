10121-WeaponDescTh = "ปืนไรเฟิลรุ่นมาตรฐานของเฮียกกะเรียวรันที่ยูคาริใช้\n\nสำหรับยูคาริแล้วปืนนี้เป็นสมบัติล้ำค่าหาใดเปรียบ เธอจึงเตรียมแผนรับมือไว้อย่างรอบคอบเพื่อไม่ให้เปียกน้ำ"
10121-ProfileIntroductionTh = "สมาชิกแห่งคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันที่ใส่ชุดว่ายน้ำรับฤดูร้อน\n\nยูคาริตื่นเต้นมากที่ได้เข้าร่วมเทศกาลสวนน้ำเฮียกคิยาโคกับเหล่ารุ่นพี่ที่\nเธอชอบ แม้อยู่ในทะเล เธอก็ยังคงมีบุคลิกสดใสอันเป็นเอกลักษณ์และ\nยังกล้าหาญเหมือนเคย"
10121-CharacterSSRNewTh = "ข้าจะแสดงความเพอร์เฟกต์โตะ~ แม้อยู่ในทะเลเจ้าค่ะ!"

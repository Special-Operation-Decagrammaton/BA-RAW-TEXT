10121-WeaponDescTw = "紫所使用的百花繚亂制式步槍。\n\n對他而言是無可取代的珍寶，因此特地準備了周全的防水措施以免弄濕。"
10121-ProfileIntroductionTw = "為了迎接夏天而換上泳裝的百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會的成員。\n\n因為能和喜歡的前輩們一起參加百夜水上祭而相當興奮。其特有的開朗性格與果斷的行動力，就連在海邊也絲毫不減。"

13008-WeaponDescTw = "茜香出門打工時總會隨身攜帶的突擊步槍。\n\n槍身受到細心的整備，可從中窺見茜香一絲不苟且誠實的一面。"
13008-ProfileIntroductionTw = "阿拜多斯高中所屬，阿拜多斯對策委員會的難相處會計。\n\n時常碎碎念，是會毫不猶豫地表露自己感情的類型。\n雖然時常把「這種學園最好快點完蛋！」當成口頭禪，但其實是個能為了償還學園的債務而瞞著大家打工的、深愛著學校的孩子。"

13008-HobbyTh = "เก็บเงิน, ทำงานพิเศษ"
13008-WeaponNameTh = "Sincerity"
13008-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่เซริกะนำติดตัวไปทำงานพาร์ทไทม์เสมอ\n\nปืนที่ได้รับการบำรุงและทำความสะอาดอยู่เสมอ\nราวกับเป็นเครื่องยืนยันความมุ่งมั่นของเซริกะ"
13008-ProfileIntroductionTh = "เหรัญญิกจอมเข้มงวดแห่งคณะกรรมการแผนงาน ของโรงเรียนมัธยมอะบิดอส\n\nมีนิสัยขี้บ่น และไม่ลังเลที่จะเปิดเผยความรู้สึกของตัวเองออกมา ชอบบ่นว่า \"โรงเรียนแบบนี้ ขอให้เจ๊งสักวัน!\" จนเป็นนิสัย แต่ที่จริงแล้วเธอผูกพัน กับโรงเรียนมาก จนไปแอบทำงานพิเศษ เพื่อหาเงินมาใช้หนี้ของโรงเรียน"

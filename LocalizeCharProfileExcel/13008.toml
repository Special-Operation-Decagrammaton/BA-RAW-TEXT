13008-WeaponDescKr = "세리카가 아르바이트를 나갈 때 늘 휴대하는 돌격소총.\n\n세리카의 성실함을 증명하듯 언제나 깨끗이 정비되어 있다."
13008-ProfileIntroductionKr = "아비도스 대책위원회의 깐깐한 회계.\n\n잔소리가 심하고, 자신의 감정을 드러내는 데 주저함이 없다. 입버릇처럼 '이딴 학원, 망해버려!' 라는 말을 내뱉곤 하지만, 실은 남몰래 학원의 빚을 갚기 위해 아르바이트를 하고 있을 정도로 학원에 대한 애정이 깊은 편이다."

20024-WeaponNameTh = "Royal Blend"
20024-WeaponDescTh = "ปืนพกสั้นที่นางิสะใช้เป็นประจำ\n\nด้วยการออกแบบที่เรียบง่าย ถึงพกติดตัวไปงานเลี้ยง\nน้ำชาที่หรูหราก็ไม่เป็นที่สะดุดตา เหมาะกับโฮสต์ของ\nงานเป็นอย่างดี นางิสะมักใช้ไล่แขกที่ไม่ได้รับเชิญที่มา\nก่อกวนในงาน"
20024-ProfileIntroductionTh = "หัวหน้าสมาพันธ์นักเรียน <ฟีเลียส> หนึ่งในกลุ่มผู้ก่อตั้งโรงเรียน\nสามัญทรีนิตี้ และโฮสต์ของสภานักเรียน <สภาน้ำชา>\n\nถึงแม้เธอจะมีน้ำเสียงที่นุ่มนวล และฟังดูเป็นมิตร แต่เธอไม่ใช่คน\nที่จะเปิดเผยสิ่งที่คิด หรือสิ่งที่อยู่ในใจออกมาให้คนอื่นเห็นง่ายๆ\nคนรอบข้างจึงพบว่าเธอเป็นคนที่เข้าหาได้ยาก\nงานอดิเรกของเธอคือการจัดเตรียมใบชาและเครื่องดื่มสำหรับ\nงานเลี้ยงน้ำชา นักเรียนของโรงเรียนทรีนิตี้หลายคนเองก็อยากเข้า\nร่วมงานเลี้ยงน้ำชากับเธอเช่นกัน"
20024-CharacterSSRNewTh = "...สบายดีหรือเปล่าคะ?\nฉันมาทักทายในฐานะตัวแทนของทรีนิตี้ค่ะ"

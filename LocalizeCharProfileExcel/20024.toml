20024-WeaponDescJp = "Nagisa's favorite small pistol.\n\nIts classic design fits the appearance of a host at elegant tea parties. It's essential for chasing away uninvited guests who demean the dignity of tea parties."
20024-ProfileIntroductionJp = "The leader of Filius, one of the allied factions that makes up Trinity General School, and the host of the Tea Party.\n\nAlthough she has a sweet and friendly demeanor, she rarely reveals her true feelings, so she's not very approachable. Her hobby is preparing tea and refreshments for tea parties. Many Trinity students long to attend her get-togethers."
20024-CharacterSSRNewJp = "And how are you? Greetings from Trinity."

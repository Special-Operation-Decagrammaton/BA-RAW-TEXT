20024-WeaponDescTw = "渚愛用的手槍。\n\n古典的設計讓它在茶會也不會顯得突兀。時常被用來驅逐降低茶會格調的不速之客。"
20024-ProfileIntroductionTw = "三一綜合學園所屬，擔任構成三一的學生聯盟「聖子派」的領袖，同時也是學生會「茶會」的主席。\n\n雖然說話溫柔和藹，但因為幾乎不會展現真心，被評為難以相處且充滿謎團的人物。興趣是準備茶會使用的茶葉與茶點。許多三一的學生都非常期盼被招待到他的茶會的那天。"
20024-CharacterSSRNewTw = "……貴安。\n我代表三一向您問好"

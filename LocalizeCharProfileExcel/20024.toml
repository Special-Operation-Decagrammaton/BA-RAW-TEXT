20024-WeaponDescKr = "나기사가 애용하는 단축형 권총.\n\n클래식한 디자인 덕분에 기품 있는 다과회에서도 튀지 않고 자연스럽게 호스트와 어우러진다. 다과회의 품위를 떨어트리는 불청객을 쫓는 용도로도 자주 사용된다."
20024-ProfileIntroductionKr = "트리니티 종합학원을 구성하고 있는 학생 연합 <필리우스>의 수장이자, 학생회인 <티파티>의 호스트.\n\n나긋나긋하고 다정한 말씨를 가지고 있지만, 속내를 쉽게 내비치지 않기 때문에 주변 사람들은 그녀에게 쉽게 다가가지 못하고 어려워한다. 취미는 티파티에 쓸 찻잎과 다과를 준비하는 것으로, 많은 트리니티의 학생들이 그녀와 함께하는 티파티를 동경하고 있다."
20024-CharacterSSRNewKr = "…평안하신가요?\n트리니티를 대표하여 인사드립니다."

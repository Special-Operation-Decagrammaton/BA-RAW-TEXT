20019-ProfileIntroductionKr = "잠입을 위해 바니걸 복장으로 갈아입은 C&C의 에이전트.\n\n낯선 환경이지만 바니걸 복장을 솔선해서 준비하거나, C4를 터트려 장애물을 치워버리는 등, 평소와 변함없이 침착하게 작전을 수행해 나간다. 하지만 평소와는 다른 복장에 조금 들떴는지, 살짝 상기된 표정을 완전히 숨기지는 못하고 있다."
20019-CharacterSSRNewKr = "주인님의 메이드……\n아니, 지금은 주인님의\n토끼라고 해야 할까요?"

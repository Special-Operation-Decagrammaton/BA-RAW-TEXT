10011-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่มีลวดลายหอยมุกประดับอยู่\n\nไม่ว่าจะเป็นเด็กดื้อขนาดไหน แต่เมื่ออยู่ต่อหน้าชุน\nที่ถือปืน <Halcon de Amor> ก็จะกลายเป็นเด็กดีทันที"
10011-ProfileIntroductionTh = "ผู้ฝึกสอนของชมรมดูแลวินัยแห่งสวนต้นบ๊วย\n\nด้วยนิสัยที่อ่อนโยนและมีเมตตา ทำให้ผู้ฝึกสอนคนนี้ได้รับความเชื่อมั่น จากนักเรียนสวนต้นบ๊วย และนักเรียนคนอื่นในซานไห่จิงด้วย เนื่องจากทำภารกิจผู้ฝึกสอนมาเป็นเวลานาน จึงไม่ค่อยโกรธ เมื่อเด็กนักเรียนเล่นแหย่กัน แต่ถ้ามีใครพูดถึงเรื่องอายุละก็ เธอจะอ่อนไหวเป็นพิเศษ"
10011-CharacterSSRNewTh = "ไม่ได้งอแงระหว่างรอใช่ไหมคะ?\nเป็นเด็กดีจังเลยนะคะ~"

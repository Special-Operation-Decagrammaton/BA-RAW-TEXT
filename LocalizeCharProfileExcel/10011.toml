10011-WeaponDescTw = "旬所使用的狙擊步槍。\n\n不管是怎樣的問題兒童，只要旬一拿出這把槍都會馬上變成溫柔的好孩子。當然他從來沒有對園裡的幼童們使用過。"
10011-ProfileIntroductionTw = "山海經高級中學所屬，培育支援部「梅花園」的教官。\n\n「梅花園」除了是園的名字之外也是社團的名字。個性善良且為人寬厚，除了梅花園的學生之外，也深得山海經其他學生的信任。\n由於擔任教官許久，就算年幼學生惡作劇也不太會生氣。唯獨只要有人提及自己的年紀，就會產生​敏感反應。"
10011-CharacterSSRNewTw = "乖乖地等著嗎？\n真是個好孩子呢～"

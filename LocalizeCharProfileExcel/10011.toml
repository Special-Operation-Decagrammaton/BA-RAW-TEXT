10011-WeaponDescKr = "슌이 사용하는 자개 장식이 박힌 저격소총.\n\n\r어떤 말썽꾸러기도 슌이 들고 있는 <사랑의 매> 앞에서는 착한 아이가 된다."
10011-ProfileIntroductionKr = "산해경 훈육지원부, 매화원의 교관.\n\n\r매화원의 어린 학생들을 가르치는 교관으로, 상냥하고 너그러운 성품 덕분에 매화원 학생뿐만 아니라 산해경의 다른 학생들로부터도 많은 신임을 받고 있다. 오랫동안 교관 업무를 수행하느라 어린 학생들의 짓궂은 장난에도 좀처럼 화를 내는 일이 없지만, 자신의 나이를 언급하는 것만큼은 예민하게 반응한다."
10011-CharacterSSRNewKr = "얌전히 기다리고 있었나요? \n착한아이네요~"

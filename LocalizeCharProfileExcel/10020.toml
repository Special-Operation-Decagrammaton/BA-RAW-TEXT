10020-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่โคฮารุใช้\n\nชื่อปืนของโคฮารุตั้งขึ้นในตอนที่เธอเข้าร่วมชมรม\nทวงความยุติธรรม"
10020-ProfileIntroductionTh = "สมาชิกชมรมชั้นเรียนเสริมของสถาบันทรีนิตี้\n\nเดิมทีเธออยู่ชมรมทวงความยุติธรรม แต่ทำคะแนนได้ไม่ดี เลยถูกบังคับ\nให้มาอยู่ที่ชมรมชั้นเรียนเสริมแทน เธอคิดว่าตัวเองคือนักเรียนหัวกะทิ\nแต่จริงๆ แล้วเป็นเด็กท้ายห้องที่เรียนไม่ค่อยรู้เรื่อง งานอดิเรกคือการสะสม\nนิตยสารโรแมนซ์ เวลาที่เห็นอะไรนิดหน่อยก็จะคิดลึกไปไกล แล้วก็จะเขิน\nอยู่คนเดียว"
10020-CharacterSSRNewTh = "ของที่ไม่เหมาะสมทุกอย่างต้องกำจัดให้หมด!"

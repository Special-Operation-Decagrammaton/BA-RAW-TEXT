10020-ProfileIntroductionKr = "트리니티 보충수업부의 일원.\n\n\r본래 정의실현부 소속이었지만 성적이 떨어지며 유급 위기에 처해 강제로 보충수업부에 편입되었다. 본인은 스스로를 엘리트라고 생각하고 있지만, 실제로는 학교 수업도 따라가지 못할 정도의 바보. 야한 잡지를 수집하는 취미가 있어 사소한 것을 보고도 금세 야한 망상을 부풀려 부끄러워한다."

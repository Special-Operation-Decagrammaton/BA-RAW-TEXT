10108-WeaponDescTh = "ปืนกลมือที่ยูกะใช้\n\nแม้จะเป็นอาวุธที่ยืนยันความมีเหตุผลและวิจารณญาณ\nของเธอ แต่ก็ช่วยขับไล่โรคนอนไม่หลับเรื้อรังให้ไม่ได้"
10108-ProfileIntroductionTh = "นักบัญชีแห่งเซมิน่าที่เปลี่ยนมาใส่ชุดนอนเพื่อการพักผ่อนอย่างสบายๆ\n\nเธอผู้นี้ทำหน้าที่ของตนได้อย่างสมบูรณ์แบบตามกำหนดการเสมอ แต่\nปัญหาที่เกิดอย่างไม่หยุดหย่อน กับโรคนอนไม่หลับเรื้อรังก็ทำให้เธอไม่\nค่อยได้พักผ่อนตามที่ตั้งใจไว้ วันนี้ยูกะมาในชุดนอนที่สบายตัวและหมอน\nนุ่มนิ่มเพื่อการพักผ่อนอย่างสมบูรณ์แบบ... แต่เด็กเกเรในมิลเลเนียมที่\nก่อเหตุไม่เลือกเวลาก็ทำให้การหลับสนิทในวันนี้ดูห่างไกลออกไป"
10108-CharacterSSRNewTh = "นักบัญชีที่ยอดเยี่ยมก็ต้องเตรียมพักผ่อนอย่างเยี่ยมยอด!"

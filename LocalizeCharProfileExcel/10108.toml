10108-WeaponDescKr = "유우카가 사용하는 두 정의 기관단총.\n\n\r그녀의 합리와 이성을 증명해 온 두 자루의 총기도 만성적인 불면증만큼은 쫓을 수가 없었다."
10108-ProfileIntroductionKr = "느긋한 휴식을 즐기기 위해 파자마로 갈아입은 세미나의 회계.\n\n\r언제나 일정에 맞추어 완벽하게 업무를 수행해 온 그녀이지만, 끊이지 않는 사건 사고에 만성적인 불면증까지 겹쳐 휴식만큼은 의도대로 취한 경우가 오히려 드물다. 완벽한 휴식을 위해 오늘도 푹신한 베개와 부드럽게 몸을 감싸주는 파자마를 장비했지만… 밤낮을 가리지 않는 밀레니엄의 악동들 탓에 오늘의 숙면도 요원하다."
10108-CharacterSSRNewKr = "우수한 회계는 숙면 준비도 완벽한 법!"

10108-WeaponDescTw = "優香使用的兩把衝鋒槍。\n\n即便是一直為他證明合理與理性的兩把槍，似乎也趕不走失眠的症狀。"
10108-ProfileIntroductionTw = "千年科學學園所屬，為了悠閒休息而換上睡衣的研討會會計。\n\n總是完美執行著工作的他，由於接連不斷的意外事故與慢性失眠，鮮少能如願好好休息。雖然準備了蓬鬆的枕頭和輕柔的睡衣……可惜拜某位不分晝夜的千年頑童所賜，想睡個好覺似乎仍是遙遙無期。"
10108-CharacterSSRNewTw = "一名優秀的會計，連睡前的準備都是完美無缺！"

10108-ProfileIntroductionJp = "Seminar's accountant, sporting her pajamas to enjoy a leisurely rest. She always performs her duties perfectly and on time. However, constant issues at school, in conjunction with her chronic insomnia, has made it difficult for her to get rest. She's equipped herself with a fluffy pillow and soft, well-fitted pajamas to achieve the perfect rest, but the mischievous members of Millennium, who seem to have little regard for daytime or nighttime, seem determined to disturb her peace."
10108-CharacterSSRNewJp = "An excellent accountant is always ready for a good night's sleep!"

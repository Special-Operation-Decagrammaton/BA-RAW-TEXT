23002-WeaponDescTw = "花繪診療患者時攜帶的突擊步槍。\n\n似乎只要帶著這把槍，不管是什麼樣的患者都會露出笑容（？）。"
23002-ProfileIntroductionTw = "三一綜合學園所屬，救護騎士團的開朗新人。\n\n雖然是個對每件事都很積極且充滿活力的少女。但有時看到病患就會過於小題大作，反而讓情況惡化。\n雖然有點少根筋，但神奇的是，他照顧的病患不管什麼病都會馬上痊癒。"

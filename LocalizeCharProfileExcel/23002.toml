23002-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ฮานาเอะใช้ตอนรักษาคนไข้\n\nเพียงแค่มีปืนกระบอกนี้ ก็จะทำให้คนไข้ทุกคนมีรอยยิ้มที่\nเปี่ยมสุขอยู่เสมอ"
23002-ProfileIntroductionTh = "เด็กปีหนึ่งที่แสนสดใสร่าเริง ของชมรมอัศวินบรรเทาทุกข์ แห่งสถาบันทรีนิตี้\n\nเป็นคนมองโลกในแง่บวก มีชีวิตชีวา แต่เมื่อพบคนไข้ เธอจะจริงจังเกินไป จนบางครั้งก็ทำให้สถานการณ์แย่ลง แม้จะเป็นเด็กสาวที่แปลกในหลายๆ ด้าน แต่เธอก็รักษาคนไข้ให้หายดีได้ ไม่ว่าจะป่วยด้วยโรคอะไรมาก็ตาม"

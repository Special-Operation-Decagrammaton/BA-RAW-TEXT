23002-ProfileIntroductionKr = "트리니티 구호기사단의 명랑하고 쾌활한 신입생.\n\n\r매사에 긍정적이고 활기찬 성격의 소유자지만, 환자를 보았다 하면 지나치게 요란을 떨어 상황을 더욱 악화시키곤 한다. 여러모로 엉뚱한 소녀이지만 그녀의 응원을 받은 환자는 신기하게도 어떤 병이든 금세 치유된다고 한다."

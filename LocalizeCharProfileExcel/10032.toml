10032-WeaponDescJp = "A multipurpose machine gun that Mutsuki always carries.\n\nQuietly kept in her bag as she celebrates New Year's. But, as Mutsuki always says with a smile, \"I'm always up for a prank or two...\""
10032-ProfileIntroductionJp = "Problem Solver 68's resident go-getter and chief of staff.\n\nShe goes to the New Year event with Aru to celebrate the upcoming new year. Mutsuki puts more effort into dressing up nicely for New Year's, but it doesn't change how she laughs and thoroughly enjoys watching the troubles that arise from her evil deeds. This troublemaker enjoys the new year with Aru, who always seems to be in trouble for one reason or another."
10032-CharacterSSRNewJp = "Heeheehee! Let's have a lot of fun this year, Sensei!"

10032-WeaponDescTh = "ปืนกลที่มุสึกิพกติดตัวไปด้วยไม่เคยห่าง\nเนื่องจากมุสึกิแต่งชุดกิโมโนให้สมกับเทศกาลวันปีใหม่\nเธอจึงเก็บปืนเอาไว้ในกระเป๋าเงียบๆ\nแต่มุสึกิพูดด้วยรอยยิ้มเอาไว้ว่า ไม่ว่าเมื่อไรปืนกระบอกนี้\nก็พร้อมสำหรับการกลั่นแกล้งสนุกๆ ตลอดเวลา"
10032-ProfileIntroductionTh = "ผู้ควบตำแหน่งหัวหน้าปฏิบัติการ และหัวหน้าหน่วยจู่โจมแห่ง\nหน่วยรับจ้างสารพัด 68\n\nมุสึกิไปร่วมงานเทศกาลปีใหม่ร่วมกับอารุ\nเนื่องจากในวันปีใหม่ เธอจึงแต่งตัวต่างไปจากวันอื่นๆ แต่ว่ารอยยิ้มซุกซนเวลาที่ทำเรื่องร้ายกาจ หรือสร้างปัญหา ก็ไม่ได้หายไปจากใบหน้าเธอ\nปีศาจตัวน้อยไม่ลังเลที่จะร่วมวงสนุกสนานในวันเทศกาลปีใหม่ ร่วมกับอารุที่ครั้งนี้ก็เจอปัญหาที่น่าปวดหัวหลายๆ อย่าง"
10032-CharacterSSRNewTh = "ฮุฮุฮุ~! ปีนี้ก็มาเล่นสนุกกันอีกน้า คุณครู!"

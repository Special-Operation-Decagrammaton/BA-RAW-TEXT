10032-WeaponDescKr = "무츠키가 가지고 다니는 다목적 기관총.\n\n\r새해를 맞이해 꾸며 입은 만큼, 이번엔 얌전히 가방에 보관하고 있는 모양이지만. 언제든지 남을 골탕 먹일 준비는 되어있다…고 무츠키는 웃으며 말한다."
10032-ProfileIntroductionKr = "흥신소 68의 행동대장 겸 돌격대장.\n\n\r새해를 맞이하여 아루와 함께 새해맞이 행사장을 찾아 놀러 왔다. 해가 바뀌어 평소보다 더 공을 들여 꾸미긴 했지만, 악행을 저지르고 그럴 때마다 일어나는 트러블을 보며, 깔깔 웃으며 좋아하는 모습은 어디 가지 않았다. 이번에도 어김없이 여러 이유로 고생하는 아루의 바로 곁에서, 새해를 만끽하기를 주저하지 않는 소악마 아가씨."
10032-CharacterSSRNewKr = "쿠후훗~! 올해도 잔뜩 같이 놀자. 선생님!"

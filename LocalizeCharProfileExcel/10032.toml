10032-WeaponDescTw = "無月總是攜帶在身上的機槍。\n\n為了迎接新年而打扮的他，包包裡卻還是裝著槍。根據無月的說法，是為了在緊急情況時能馬上取出，而且完全不影響他惡作劇。"
10032-ProfileIntroductionTw = "格黑娜學園所屬，便利屋68的行動隊長兼突擊隊長。\n\n為了迎接新年和亞瑠去參拜（玩耍），重新打扮了一番。因為是難得的新年所以打扮起來特別有幹勁，但內心卻一如往常，享受著惡作劇及製造糾紛。面對即使新年也一如往常遇到問題的亞瑠，自己也一如往常地坐在特等席旁觀。以自己的風格享受新年，我行我素的小惡魔系少女。"
10032-CharacterSSRNewTw = "咯呵呵♪今年也一起盡情的玩吧，老師！"

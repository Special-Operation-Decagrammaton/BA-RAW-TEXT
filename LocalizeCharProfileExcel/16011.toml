16011-WeaponDescKr = "하스미가 애용하는 저격소총.\n\n황륜대제 기간에도 불의를 심판하기 위해 그녀의 총 끝은 빛난다."
16011-ProfileIntroductionKr = "황륜대제 참가를 위해 체육복으로 갈아입은 정의실현부의 부부장.\n\n대외업무에 익숙지 않은 츠루기를 대신하여 실행위원을 맡게 되었다. 회장의 들뜬 분위기 속에서도 하스미는 냉정하게 실행위원으로서의 책무를 다하려 했지만…… 쉴 새 없이 나타나는 불량 학생들과 노점상에서 풍겨오는 달콤한 냄새가 그녀를 괴롭게 한다."

16011-WeaponDescTw = "蓮實愛用的狙擊步槍。\n\n在晄輪大祭期間，他的槍口依然為了審判不義而閃爍著光芒。"
16011-ProfileIntroductionTw = "三一綜合學園所屬，為了參加晄輪大祭而換上體育服的實現正義部副部長。\n\n代替不熟對外業務的弦生擔任實行委員。即使會場充滿熱烈的氣氛，蓮實依然想保持冷靜，克盡執行委員的職責……但不斷出現的問題學生和攤販的陣陣撲鼻香氣讓他飽受折磨。"

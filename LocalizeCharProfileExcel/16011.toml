16011-ProfileIntroductionEn = "Vice president of the Justice Task Force. She's wearing track clothes to participate in the Kivotos Halo Festival.\n\nShe joined the Executive Committee in place of Tsurugi, who's inexperienced with administrative work. Hasumi is trying to do her best and stay composed despite the president's excitement, but between troublemaking students and the smell of sweets coming from street vendors, distractions are everywhere."

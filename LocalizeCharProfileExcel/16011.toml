16011-HobbyTh = "อ่านหนังสือ, สังเกตผู้คน"
16011-WeaponNameTh = "Impalement"
16011-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่ฮาสุมิใช้เป็นประจำ\n\nในงานเทศกาลฮาโลเฟสติวัลเอง ฮาสุมิก็ใช้ปืนของเธอ เพื่อตัดสินความยุติธรรมเช่นกัน"
16011-ProfileIntroductionTh = "รองประธานชมรมทวงความยุติธรรมที่เปลี่ยนโฉมมาใส่ชุดพละเพื่อเข้าร่วม\nงานฮาโลเฟสติวัลในครั้งนี้\n\nฮาสุมิรับหน้าที่เป็นคณะกรรมการจัดงานแข่งกีฬาแทนซึรุกิที่ไม่ค่อยสันทัด\nเรื่องการติดต่องานภายนอก ฮาสุมิอาจตัดสินใจและทำหน้าที่ของ\nคณะกรรมการจัดงานได้อย่างดีเยี่ยมในงานแข่งขันที่บรรยากาศดุเดือด...\nแต่ในขณะเดียวกันเธอก็ถูกพวกเด็กเกเรคอยออกมาก่อกวนไม่หยุดหย่อน\nและถูกกลิ่นหอมหวานของขนมจากร้านค้ายั่วยวนให้ลำบากใจตลอดเวลา"

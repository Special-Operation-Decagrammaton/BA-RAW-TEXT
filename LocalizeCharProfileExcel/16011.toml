[translation]
16011-StatusMessageTh = "สอบถามเรื่องงานแข่งกีฬา ได้ที่คณะกรรมการจัดงาน"
16011-FullNameTh = "ฮาเนกาวะ ฮาสุมิ"
16011-FamilyNameTh = "ฮาเนกาวะ"
16011-PersonalNameTh = "ฮาสุมิ"

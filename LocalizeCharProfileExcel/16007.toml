16007-BirthdayTh = "10 พ.ย."
16007-HobbyTh = "ปลุกระดม"
16007-WeaponNameTh = "Vernost"
16007-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่โทโมเอะใช้เป็นประจำ\n\nตัวปืนติดตั้งกล้องสโคปความละเอียดสูงไว้ ทำให้สามารถกำจัดคนที่สงสัยว่าจะเป็นกบฎ หรือสงสัยในอำนาจของประธานเชริโน่ได้"
16007-ProfileIntroductionTh = "หัวหน้าเลขาแห่งสำนักเลขาธิการเรดวินเทอร์และคนสนิทของท่านประธานเชริโน่\n\nเธอเป็นผู้เชี่ยวชาญด้านการใช้คำพูดและการถ่ายทอดเรื่องราวต่างๆ\nได้อย่างน่าเชื่อถือ เธอได้สัญจรปราศรัยภายในโรงเรียนเป็นประจำ\nเพื่อสร้างความนับถือและความภักดีต่อประธานเชริโน่ให้กับทุกๆ คน\nเชริโน่เชื่อว่าเป็นเพราะเสน่ห์ของตนเลยทำให้โทโมเอะภักดีต่อเธอ\nแต่ที่จริงแล้วเป็นเพราะโทโมเอะหลงใหลในตัวของเชริโน่ต่างหาก\n"

[translation]
16007-StatusMessageTh = "สนใจเรื่องความยิ่งใหญ่ของท่านประธานเชริโน่เหรอคะ?"
16007-FullNameTh = "ซาชิโระ โทโมเอะ"
16007-FamilyNameTh = "ซาชิโระ"

16007-WeaponDescKr = "토모에가 사용하는 기다란 저격소총.\n\n고배율의 조준경이 달려, 멀리서도 체리노 회장의 권위를 의심하는 불순분자를 처분할 수 있다."
16007-ProfileIntroductionKr = "붉은겨울 사무국의 비서실장이자 체리노 회장의 최측근.\n\n무슨 말이든 그럴싸하게 포장하여 전달할 수 있는 연설의 달인으로, 체리노 회장에 대한 충성심을 고취시키기 위해 학원 내에서 정기적으로 연설을 하고 있다. 체리노는 토모에가 자신의 카리스마에 감화되어 충성을 다하는 것이라고 믿고 있으나, 사실 토모에는 체리노를 맹목적으로 귀여워할 뿐이다."

16013-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงของโคฮารุที่ปรับแต่งมาเพื่อสำรวจเกาะ\n\nและเตรียมพร้อมด้านการป้องกันความชื้นกับไอความ\nเค็มของน้ำทะเลมาอย่างดีเกินคาด"
16013-ProfileIntroductionTh = "สมาชิกของชมรมชั้นเรียนเสริมที่ร่วมเดินทางมาเพื่อจับตาคุณครู\n\nถึงเธอจะมีหน้าที่ที่ต้องคอยจับตาดูทุกคน แต่เธอก็ไม่ได้รู้สึกแย่กับ\nสถานการณ์ที่ได้เพลิดเพลินกับการพักผ่อนกึ่งทำงานแบบนี้เช่นกัน"

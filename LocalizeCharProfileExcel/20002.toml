20002-ProfileIntroductionTh = "นักประดิษฐ์อัจฉริยะ จากโรงเรียนมัธยมซานไห่จิง\n\nเด็กอัจฉริยะที่ได้ใบปริญญาถึง 6 ใบตั้งแต่สมัยประถมศึกษา แต่นิสัยช่างก่อปัญหาของเธอ ทำให้เธอเป็นที่รู้จักในฉายา \"นักสร้างปัญหา\" มากกว่า \"อัจฉริยะ\" เนสึซึเกะคือ หนูเพื่อนซี้ที่อยู่กับเธอมาตั้งแต่เด็ก สำหรับเธอแล้วเนสึซึเกะ คือครอบครัวที่สำคัญคนหนึ่ง"
20002-CharacterSSRNewTh = "เรื่องการวิจัยวางใจท่านซายะได้เลย!"

20002-ProfileIntroductionTw = "山海經高級中學所屬的天才發明家。\n\n雖然是個讀小學時就已經取得六個學位的天才。但比起天才這個稱號，他更以是愛整人鬧事的麻煩製造者為人所知。\n總是一起行動的老鼠根津助從小就是沙耶的好夥伴。對沙耶來說，牠是如同家人一般重要的存在。"

20002-ProfileIntroductionKr = "산해경 학원의 천재 발명가.\n\n소학교 시절에 이미 학위를 여섯 개나 땄을 정도의 천재지만, 천재라는 별명보다는 사람을 골탕 먹이고 말썽을 일으키는 트러블 메이커로 더 잘 알려져 있다. 함께 다니는 쥐, 네즈스케는 어릴 적부터 함께 한 단짝으로 사야에게는 소중한 가족과도 같은 존재이다."
20002-CharacterSSRNewKr = "실험이라면 나님에게 맡겨달라고!"

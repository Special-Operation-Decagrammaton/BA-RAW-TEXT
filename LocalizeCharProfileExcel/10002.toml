10002-WeaponDescKr = "하루나가 다루는 우아한 느낌의 저격소총.\n\n\r그 스코프를 통해 바라보는 건 궁극의 미식에 이르기 위한 길이라고 본인은 주장한다."
10002-ProfileIntroductionKr = "게헨나 미식연구회의 부장.\n\n\r겉모습만 두고 보면 부잣집 아가씨와 같은 고고한 기품을 드러내고 있지만, 먹는 일만 관련되면 앞뒤를 가리지 않는 열혈 속성의 미식가이다. 식탐에 비해 입이 짧아 음식은 많이 먹지 못하는 편. 좋아하는 음식은 모츠나베나 호루몬 구이 같은 기름진 음식이라고 한다."
10002-CharacterSSRNewKr = "미식의 세계로 함께 떠나볼까요?"

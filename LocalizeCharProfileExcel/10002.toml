10002-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่ให้ความรู้สึกสง่างามของฮารุนะ\n\nฮารุนะบอกว่าสิ่งที่มองผ่านกล้องสโคปก็คือหนทาง ที่นำไปสู่การเป็นสุดยอดนักชิม"
10002-ProfileIntroductionTh = "หัวหน้าชมรมชิมอาหาร ของสถาบันเกเฮนน่า\n\nภายนอกดูเป็นลูกคุณหนูที่มีเสน่ห์ และดูหรูหรา แต่หากเป็นเรื่องอาหารละก็ เธอคือนักชิมเลือดร้อน ที่พร้อมจะต่อสู้ทุกวิถีทางเพื่อของกิน\nฮารุนะเป็นคนที่กินอะไรได้น้อย เมื่อเทียบกับความอยากอาหารที่ไม่สิ้นสุด ของเธอ อาหารที่ชอบคืออาหารมันๆ เลี่ยนๆ อย่างหม้อไฟเครื่องใน และไส้ย่าง"
10002-CharacterSSRNewTh = "มาเข้าวงการชิมอาหารด้วยกันไหมคะ?"

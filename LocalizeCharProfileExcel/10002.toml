10002-WeaponDescTw = "羽留奈所用的狙擊步槍。\n\n據他本人宣稱，瞄準鏡的前方是通往究極美食的道路。"
10002-ProfileIntroductionTw = "格黑娜學園所屬，美食研究會的會長。\n\n雖然從外表來看是個散發高傲氣質的富家千金，但是只要和食物有關，他就是個不顧一切的熱血美食家。\n和想吃美食的心情相反，胃口很小，所以吃得並不多。\n據說他愛吃大腸鍋和內臟燒烤等油膩的食物。"
10002-CharacterSSRNewTw = "要一起啟程前往，美食的世界嗎？"

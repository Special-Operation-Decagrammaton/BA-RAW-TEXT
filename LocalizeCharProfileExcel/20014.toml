20014-WeaponDescJp = "A standard machine gun Saki received from SRT Academy.\nIt's hard to maintain, but it guarantees great firepower as long as it's serviced well."
20014-ProfileIntroductionJp = "The point woman of SRT Academy RABBIT Squad. Call sign is \"RABBIT 2.\"\n\nSaki enrolled in SRT Academy to live the life of discipline she'd always dreamed of. When the academy closed down, she, along with her squad, refused to give up on their school and began camping out in the park in protest. A star student, she still carries around her textbooks and SRT manuals to this day. She enjoys foraging for wild greens and trash that can be repurposed as supplies."
20014-CharacterSSRNewJp = "Call sign, RABBIT 2. Sensitivity is good."

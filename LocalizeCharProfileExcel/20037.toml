20037-WeaponDescTh = "ปืนไรเฟิลรุ่นมาตรฐานที่ฟุบุกิได้รับมาจากสถาบัน\nฝึกตำรวจวัลคิรี่\n\nเธอหวังว่าจะไม่มีเรื่องต้องใช้ปืนนี้ในพื้นที่ที่ถูกส่งตัว\nมาทำงาน"
20037-ProfileIntroductionTh = "นักเรียนตำรวจจอมขี้เกียจจากสำนักรักษาความปลอดภัยที่ถูกส่งตัวมาทำงาน\nเป็นไลฟ์การ์ด\n\nเธอมาด้วยความชิลว่าจะได้มาสวนน้ำในฤดูร้อน แต่ก็คิดอยู่ตลอดว่าต้องทำอย่างไร ถึงจะไม่ต้องเหน็ดเหนื่อยมากในสวนน้ำ"
20037-CharacterSSRNewTh = "ขี้เกียจอะ... ฉันต้องทำจริงๆ เหรอ?"

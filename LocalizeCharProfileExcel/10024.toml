10024-ProfileIntroductionKr = "여름을 맞아 본격적으로 채비하고 나선 대책위원회 행동반장.\n\n평소보다 완벽한 준비를 위해, 항상 입던 교복이 아닌 사이클 저지로 갈아입었다. 키보토스 종단을 성공하겠다는 황당한 목표 또한 늘 그래왔듯 진심이다."

10024-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่ชิโรโกะใช้เป็นประจำ\n\nปืนที่ได้รับการบำรุงรักษาอย่างพิถีพิถันและปรับปรุงส่วนต่างๆ อยู่เสมอเพื่อเตรียมพร้อมสำหรับการเดินทางไกล"
10024-ProfileIntroductionTh = "หัวหน้าความประพฤติของคณะกรรมการแผนงานที่เตรียมการรับมือสำหรับ ฤดูร้อนอย่างจริงจัง\n\nเพื่อการเตรียมตัวให้สมบูรณ์แบบ เธอจึงเปลี่ยนเป็นสวมชุดปั่นจักรยานแทนชุด นักเรียนที่ใส่ประจำ และมุ่งมั่นที่จะทำตามเป้าหมายที่ยิ่งใหญ่ อย่างการปั่นจักรยานจากเหนือจรดใต้ของคิโวทอสอย่างจริงจังเสมอ"
10024-CharacterSSRNewTh = "ฉันไปก่อนนะคุณครู แล้วจะติดต่อมา"

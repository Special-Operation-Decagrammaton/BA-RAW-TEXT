10114-ProfileIntroductionTh = "จูริในเครื่องแบบเด็กพาร์ทไทม์ที่คาเฟ่\n\nเธอทำให้ทุกคนเห็นภาพลักษณ์ที่ประสบความสำเร็จในการทำอาหารได้\nอย่างน่าประหลาดใจ... แต่สุดท้ายก็เจอผลลัพธ์แบบเดิมทุกครั้งไป แต่ถึงอย่างไรจูริก็ดีใจกับความสำเร็จเพียงชั่วขณะนั้น และยังเป็นหญิงสาว\nนิสัยดีและน่าชื่นชมที่ยังพากเพียรพยายามอยู่เสมอ"
10114-CharacterSSRNewTh = "ฉันเริ่มทำงานพาร์ทไทม์แล้วค่ะ!"

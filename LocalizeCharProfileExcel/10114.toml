10114-WeaponDescKr = "주리의 산탄총.\n\n급양부 활동이든 아르바이트 활동이든, 이것은 필수품이다.……그런 것이라고, 그녀는 주장한다."
10114-ProfileIntroductionKr = "카페의 아르바이트생으로서 제복을 갖춰 입게 된 주리.\n\n놀랍게도 그토록 바라던 요리에 성공하는 모습을 보여 주는가 했으나…… 결국, 언제나와 같은 결과를 맞이하고 만다. 하지만 일시적으로나마 요리에 성공했다는 사실에 진심으로 기뻐하며, 오늘도 수행과 정진을 멈추지 않는 착하고 기특한 아가씨."
10114-CharacterSSRNewKr = "아르바이트, 시작했답니다!"

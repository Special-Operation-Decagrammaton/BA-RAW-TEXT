10080-ProfileIntroductionKr = "토키와다이 중학교 소속의 기품 넘치는 여중생.\n\n명문교인 토키와다이 중학교 중에서도 최대 파벌을 이끄는 실력자로, 학원 도시에 7명밖에 존재하지 않는 초능력자 레벨 5 중 한 명이다. 사용하는 초능력은 타인의 정신을 조종하는 심리 장악(멘탈 아웃)이지만, 키보토스로 전이된 뒤에는 능력을 사용하는 데에 약간의 어려움을 겪고 있다. 같은 레벨 5의 초능력자이며, 자신의 능력이 통하지 않는 미사카 미코토를 다소 꺼려한다."

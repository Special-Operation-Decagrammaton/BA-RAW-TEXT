10080-ProfileIntroductionTw = "常盤台中學所屬，氣場強大的女國中生。\n\n為率領名門學校常盤台中學內最大派系的強者，同時也是學園都市僅有七名的超能力者「LEVEL5」中的一人。所使用的超能力為能夠操控他人心智的「心理掌握(Mental Out)」。但在被傳送至奇普托斯後，似乎無法像以前一樣隨心所欲地使用能力。對同為「LEVEL5」超能力者，自己的能力卻無法對其造成影響的御坂美琴其實有些反感。"

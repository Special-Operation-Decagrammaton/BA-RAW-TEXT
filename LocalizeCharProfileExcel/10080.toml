10080-ProfileIntroductionTh = "นักเรียนมัธยมต้นผู้มีความหรูหราจากโรงเรียนมัธยมต้นโทคิวะได\n\nผู้มีความสามารถที่เป็นผู้นำกลุ่มขนาดใหญ่ที่สุดในโรงเรียนมัธยมต้นโทคิวะได ที่มีชื่อเสียง เธอเป็นหนึ่งในผู้มีพลังเลเวล 5 ซึ่งมีเพียง 7 คนเท่านั้นในเมือง แห่งการศึกษา มิซากิมีพลังในการควบคุมจิตใจของคนอื่น (เมนทัลเอาต์) แต่หลังจากย้ายมาที่คิโวทอส เธอก็พบกับความยากลำบากในการใช้พลังนี้ พลังของมิซากิใช้ไม่ได้ผลกับมิซากะ มิโคโตะที่เป็นหนึ่งในผู้ใช้พลังเลเวล 5 เหมือนกัน ทำให้เธอสงสัยในตัวของมิโคโตะ"
10080-CharacterSSRNewTh = "อืม~ จะทำยังไงดีนะ? อ้อ หมายถึงฉันเหรอ?"

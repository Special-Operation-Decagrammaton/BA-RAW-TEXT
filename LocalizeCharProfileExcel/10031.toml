10031-WeaponDescKr = "아루가 평소에도 애지중지 아끼는 고풍스러운 디자인의 반자동 저격소총.\n\n\r아루가 말하길, 새해를 맞이하며 연륜이 쌓인 만큼 그 하드보일드함도 자신과 마찬가지로 더욱 레벨업했다는 모양이다."
10031-ProfileIntroductionKr = "흥신소 68의 영원한 사장.\n\n\r새해를 맞이하여 흥신소 사업이 번창하기를 바라는 마음에, 비싼 돈을 들여 머리를 세팅하고 옷까지 빌려 입고서 새해맞이 행사장을 찾았다. 덕분에 평소보다 더욱 어깨에 힘이 들어간 탓인지, 여느 때보다 여유 넘치는 걸음걸이와 느긋한 어조로 기품 있는 사장님을 연기하고 있다."
10031-CharacterSSRNewKr = "후후후, 올해의 첫 의뢰란 거지?\n\r좋아. 멋지게 해결해줄게."

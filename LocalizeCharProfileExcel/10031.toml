10031-WeaponDescTw = "亞瑠平常十分珍惜的古風設計狙擊步槍。\n\n據他所說，迎接新的一年後歲月增長，這把槍也像自己一樣更加的硬派……的樣子。"
10031-ProfileIntroductionTw = "格黑娜學園所屬，迎接新年的便利屋68自稱社長。\n\n為了祈願便利屋在新的一年更加興旺，便先從形式上著手，花大錢設計髮型和租借和服，從新年初就幹勁滿滿。因其身上的裝束，比平時還要有精神，情緒也更高昂。以符合自己想像的方式展現從容的步伐和語調，扮演著有氣質的社長（但內心還是一如往常）。"
10031-CharacterSSRNewTw = "原來如此，今年第一項的委託呢？看好了，讓我來絢麗的解決"

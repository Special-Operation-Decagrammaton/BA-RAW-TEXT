10031-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงดีไซน์สไตล์ย้อนยุคที่อารุแสนจะหวงแหน และทะนุถนอมอย่างดี\n\nอารุได้กล่าวไว้ว่า ยิ่งวันปีเปลี่ยนผ่าน ปืนกระบอกนี้\nก็จะยิ่งเพิ่มความร้ายกาจขึ้นเช่นเดียวกับตัวเธอ"
10031-ProfileIntroductionTh = "ประธานตลอดกาลของหน่วยรับจ้างสารพัด 68\n\nในเทศกาลวันปีใหม่อารุหวังให้ธุรกิจของหน่วยรับจ้างสารพัดรุ่งเรือง\nยิ่งขึ้น จึงยอมควักเงินจำนวนมากเพื่อแต่งหน้าทำผม และเช่าชุด\nไปร่วมขอพรในวันปีใหม่ อาจเป็นเพราะเธอดูมีความมั่นใจมากกว่าปกติ\nเลยแสดงท่าทางที่สง่างามสมกับเป็นประธานออกมาให้เห็นได้"
10031-CharacterSSRNewTh = "ฮุฮุฮุ คำขอว่าจ้างแรกของปีนี้ใช่มั้ย?\nดีล่ะ เดี๋ยวฉันจะจัดการให้เอง"

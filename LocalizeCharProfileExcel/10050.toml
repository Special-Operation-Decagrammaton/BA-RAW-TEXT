10050-WeaponDescTh = "ปืนไรเฟิลจู่โจมประสิทธิภาพสูงสำหรับปกป้องศักดิ์ศรี\nของผู้หญิงและเพื่อทำหน้าที่ของครูฝึกให้สำเร็จ"
10050-ProfileIntroductionTh = "นักเรียนชั้นปีที่ 1 ผู้รับผิดชอบหน้าที่ผู้ฝึกสอน และเป็นสมาชิกของฝ่ายสนับสนุนด้านวินัย สวนต้นบ๊วย\n\nแม้ว่าจะยังควรเรียนอยู่ในโรงเรียนประถมศึกษา แต่โคโคน่าก็ได้รับการยอมรับว่ามี\nความสามารถด้านการเรียนที่โดดเด่น จึงได้รับหน้าที่ให้เป็นผู้ฝึกสอน\nเหล่าเด็กอนุบาลมักจะเรียกเธอว่า \"โคโคน่าจัง\" และปฏิบัติกับเธออย่างสนิทสนม แต่ทว่าโคโคน่ากลับไม่ชอบชื่อเล่นนั้นเลย"
10050-CharacterSSRNewTh = "ฝ่ายสนับสนุนด้านวินัยแห่ง 'สวนต้นบ๊วย' โคโคน่าค่ะ!\nมะ...ไม่นะคะ! เห็นแบบนี้ฉันก็เป็นผู้ฝึกสอนที่องอาจนะคะ!"

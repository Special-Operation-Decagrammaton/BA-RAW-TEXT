10050-ProfileIntroductionKr = "산해경 훈육지원부, 매화원의 교관을 맡고 있는 1학년 학생.\n\n본래는 소학교에 다닐 나이지만 뛰어난 학습능력을 인정받아 교관의 권한까지 받게 되었다. 원생들은 코코나를 '코코나 쨩'이라고 부르며 친근하게 따르곤 하지만, 코코나는 그 호칭을 그다지 달가워하지 않는다고 한다."
10050-CharacterSSRNewKr = "훈육지원부 '매화원'의 코코나입니다!\n아, 아닙니다! 이래도 어엿한 교관이라구요!?"

10050-ProfileIntroductionTw = "山海經高級中學所屬，擔任培育支援部「梅花園」教官的1年級學生。\n\n雖然是該就讀小學的年紀，但因為卓越的學習能力受到認可而獲得教官的權限。\n園生們都親切地叫他「心菜醬」，但心菜本人並不喜歡那個稱呼。"

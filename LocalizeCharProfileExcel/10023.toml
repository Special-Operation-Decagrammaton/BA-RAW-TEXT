10023-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่อิโอริใช้เมื่อต้องออกไปจัดการเด็กๆ ที่ชอบแหกกฎ\n\nปืนที่บรรจุกระสุนรูปร่างคล้ายขวดน้ำอัดลม ช่วยเพิ่มพลังให้รุนแรงขึ้น"
10023-ProfileIntroductionTh = "ผู้เชี่ยวชาญพิเศษผู้ไร้ความปรานีแห่งคณะกรรมการวินัยเกเฮนน่าที่มา\nเข้าร่วมการฝึกภาคฤดูร้อน\n\nเธอมาจับตาดูเหล่าเด็กเจ้าปัญหาแห่งเกเฮนน่าร่วมกับสมาชิก\nคณะกรรมการวินัยคนอื่นๆ เพื่อให้แน่ใจว่าพวกเธอจะไม่ออกนอกเส้น\nทางไปจากชายหาด ถึงภายนอกจะดูเฉยชา แต่ที่จริงแล้วเธอรู้สึก\nไม่พอใจอย่างมากที่การฝึกภาคฤดูร้อนที่รอคอยมาอย่างยาวนานได้ถูก\nกลุ่มอันธพาลมาก่อกวนอยู่เรื่อยๆ"
10023-CharacterSSRNewTh = "หวังว่าคงไม่มีพวกงี่เง่าชอบแหกกฎอยู่แถวนี้นะ"

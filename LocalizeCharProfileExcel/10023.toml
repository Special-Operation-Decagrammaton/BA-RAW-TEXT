10023-ProfileIntroductionTw = "格黑娜學園所屬，參加夏季合宿訓練的風紀委員會之「冷酷的專家」。\n\n為了不讓問題兒童們因為夏天而得意忘形，和其他的風紀委員前來海邊監視。因為問題兒童們源源不絕，導致難得來海邊卻一直在戰鬥，內心感到不滿，但沒有表現出來。"

10023-WeaponDescKr = "이오리가 규칙 위반자들을 선도할 때 사용하는 저격소총.\n\n탄산음료 병 모양의 총류탄을 더해 위력을 강화했다."
10023-ProfileIntroductionKr = "하계 합숙 훈련에 참여한 게헨나 선도부의 냉혹한 스페셜리스트.\n\n다른 선도부원들과 함께 게헨나의 문제아들이 바닷가에서 일탈을 저지르지 못하도록 열심히 감시하고 있다. 겉으로는 내색하고 있지 않지만, 바보들이 끊임없이 나타나는 바람에 모처럼의 여름 합숙이 엉망이 된 것을 내심 못마땅하게 여기고 있다."
10023-CharacterSSRNewKr = "분위기에 취해 교칙을 위반하는 바보는 없겠지?"

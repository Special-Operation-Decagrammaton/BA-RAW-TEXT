10118-WeaponDescKr = "노조미의 전용 권총.\n\n평소에 사용할 일은 적지만, 항상 깔끔하게 정비되어 있기에 열차 운행에 방해되는 요소들을 제때 치울 수 있다."
10118-ProfileIntroductionKr = "하이랜더 철도학원의 중앙관제센터 소속 간부.\n\n쾌활하고 발랄한 성격이지만 사소한 것은 신경 쓰지 않는 타입. 때문에 쌍둥이 언니인 히카리와 함께 사고를 일으키는 경우가 잦다. 거의 대부분 흥미 본위로 움직이는 경우가 많지만, 열차 운행에 대해서만큼은 책임감을 발휘하는 편."

10118-WeaponDescTh = "ปืนพกของโนโซมิ\n\nแม้จะไม่มีโอกาสได้ใช้งานบ่อยนักในชีวิตประจำวัน แต่ก็ได้รับการบำรุงรักษาอยู่เสมอจนหยิบมาใช้จัดการ\nสิ่งที่ขัดขวางการเดินรถไฟได้อย่างทันท่วงที"
10118-ProfileIntroductionTh = "ผู้บริหารสังกัดศูนย์ควบคุมกลางแห่งสถาบันการรถไฟไฮแลนเดอร์\n\nโนโซมิมีนิสัยร่าเริงและกระตือรือร้น แต่ก็เป็นคนประเภทที่ไม่สนใจเรื่อง\nหยุมหยิม จึงมักก่อปัญหาร่วมกับฮิคาริ แฝดผู้พี่อยู่บ่อยๆ แม้ส่วนใหญ่จะ\nทำอะไรด้วยความสนุกสนาน แต่เมื่อเป็นเรื่องการเดินรถไฟ ก็ค่อนข้าง\nแสดงความรับผิดชอบให้เห็น"
10118-CharacterSSRNewTh = "วะฮะฮ่า! รอกันอยู่ใช่มั้ย?"

10118-ProfileIntroductionEn = "An officer of Highlander Railroad Academy's Central Control Center.\n\nShe has a bright and cheery personality but a total disregard for fastidiousness or attention to detail. She and her twin sister, Hikari, cause all kinds of havoc. She tends to follow the call of her own desires, but her responsible side takes the stage when she's operating trains."
10118-CharacterSSRNewEn = "Pahyahyahya! Were you waiting for me?"

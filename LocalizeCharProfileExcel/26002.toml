26002-WeaponDescKr = "주리가 가지고 있는 산탄총.\n\n본래의 용도는 급양부에서 난동부리는 문제아들을 제압하기 위한 것이지만, 어째서인지 주리는 이걸 조리도구로 사용한다."
26002-ProfileIntroductionKr = "게헨나 학원의 식당을 관리하는 급양부의 부원.\n\n후우카와 마찬가지로 학생들을 위해 열심히 음식을 만드는 노력파 소녀지만, 그녀의 요리 솜씨는 나쁜 수준을 넘어 괴멸적인 지경인지라 급식에 별 도움이 되지 않고 있다. 하지만 후우카의 격려와 지도 속에 그녀는 오늘도 더 나은 요리를 만들기 위해 노력하고 있다."

26002-ProfileIntroductionEn = "A member of the School Lunch Club that manages Gehenna Academy's dining hall.\n\nLike Fuuka, she's a hard worker who pours her heart and soul into cooking meals for the other students. However, her cooking is so bad that it's grotesque, so her efforts are ultimately useless. But she continues to strive to hopefully improve her cooking under Fuuka's encouragement and guidance."

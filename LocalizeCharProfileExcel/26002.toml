26002-WeaponDescTh = "ปืนลูกซองที่จูริใช้เป็นประจำ\n\nจุดประสงค์เดิมคือใช้ในกำราบเหล่าเด็กมีปัญหา ที่ก่อปัญหาในชมรมโภชนาการ\nแต่ว่าจูริกลับนำปืนนี้ไปใช้ในการทำอาหาร"
26002-ProfileIntroductionTh = "สมาชิกชมรมโภชนาการของสถาบันเกเฮนน่า มีหน้าที่ดูแลโรงอาหาร\n\nสาวน้อยที่ตั้งใจทำอาหาร เพื่อแจกจ่ายเพื่อนนักเรียนเหมือนกับฟูกะ แต่ทักษะการทำอาหารของเธอนั้น ไม่เอาไหนเสียเลย ที่จริง เธอไม่ได้มีส่วนช่วยในการเตรียมอาหารมากนัก แต่ด้วยกำลังใจ และการแนะนำของฟูกะ เธอจึงตั้งปณิธาน ว่าจะพยายามฝึกฝนความสามารถทุกวัน"

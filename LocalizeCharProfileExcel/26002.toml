26002-WeaponDescTw = "茱莉所持有的霰彈槍。\n\n原本的用途是用來壓制在供給部搗亂的問題兒童，\n不過不知從何時起茱莉開始用這把槍料理食物了。"
26002-ProfileIntroductionTw = "格黑娜學園所屬，負責管理格黑娜學園餐廳的供給部的成員。\n\n和風華一樣是為了學生們努力製作餐點的少女，但他的料理手藝已經超越糟糕的等級來到毀滅的境界，因此對供餐並沒有什麼幫助。\n然而在風華的鼓勵和指導下，他今天也為了做出更好的料理而努力著。"

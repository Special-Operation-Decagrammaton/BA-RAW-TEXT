[translation]
20005-StatusMessageTh = "ใครอยากดูห่วงยางเพโรโร่ที่ฉันซื้อมาใหม่บ้างคะ?"
20005-FullNameTh = "อะจิทานิ ฮิฟุมิ"
20005-FamilyNameTh = "อะจิทานิ"

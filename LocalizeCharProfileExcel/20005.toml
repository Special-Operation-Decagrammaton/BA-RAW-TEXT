20005-HobbyTh = "สะสมกู้ดเพโรโร่, ช้อปปิ้ง, ฟังคนอื่นพูด"
20005-WeaponNameTh = "My Necessity"
20005-WeaponDescTh = "ปืนไรเฟิลที่เป็นอาวุธที่ฮิฟุมิมักจะพกไปยังสถานที่ต่างๆ เสมอ\n\nปืนดีไซน์น่ารักสดใสเป็นสิ่งที่ขาดไม่ได้ในการพักผ่อนที่ชายหาด"
20005-ProfileIntroductionTh = "สาวน้อยผู้อ่อนโยนจากชมรมชั้นเรียนเสริม โรงเรียนสามัญทรีนิตี้ ที่มาเที่ยวพักผ่อนฤดูร้อนที่ทะเลกับเพื่อนๆ\n\nเธอถึงกับแอบไปยืมรถถังครูเซเดอร์ของโรงเรียนออกมา\nเพื่อเพื่อนคนสำคัญที่ไม่เคยมาเที่ยวทะเล และก็ต้องเจอปัญหาใหญ่ หลังจากถูกชมรมทวงความยุติธรรมจับได้\nแม้แต่ในตอนที่ขับรถถังเอง นิสัยจอมซุ่มซ่ามของเธอ ก็ทำให้เกิด\nปัญหาหลายอย่างขึ้น เช่น เร่งความเร็วของรถถังโดยไม่ได้ตั้งใจ ทำให้เกิดปัญหาต่างๆ ตามมา"
20005-CharacterSSRNewTh = "อ่าฮะฮะ... ชุดว่ายน้ำของฉันเรียบๆ แบบนี้ก็รู้สึกเขินๆ อยู่หน่อยนะคะ"

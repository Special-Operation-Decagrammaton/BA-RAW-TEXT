20005-ProfileIntroductionTw = "三一綜合學園所屬，與友人一起來到海邊的，補課部情感豐富的少女。\n\n為了沒有去過海邊的梓，做出了悄悄偷走三一的十字軍戰車（本人說是「借的」）這種誇張的行為。但不出所料被實現正義部發現，以此為契機被捲入了大型事件。即使坐上了戰車，冒失的性格仍分毫不減，或者該說有了戰車的力量後，反而讓騷動變得更加嚴重。"

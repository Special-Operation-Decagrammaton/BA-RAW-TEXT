26004-ProfileIntroductionKr = "트리니티 도서부 소속의 사서.\n\n\r책을 정말 좋아하는 독서광 소녀로 트리니티 도서관의 방대한 장서를 모두 읽어 본 몇 안 되는 학생 중 하나이다. 책을 읽는 것만큼 책을 권하는 것도 좋아하여, 상대를 만나면 상대의 취향에 맞는 책을 추천해주려고 한다."

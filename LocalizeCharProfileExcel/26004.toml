26004-WeaponDescTh = "ปืนไรเฟิลที่ชิมิโกะใช้\n\nปืนที่ช่วยให้สามารถรักษากฎของห้องสมุดเอาไว้ได้ในเวลา\nที่เกิดเรื่องวุ่นวายต่างๆ ขึ้น"
26004-ProfileIntroductionTh = "บรรณารักษ์แห่งชมรมอ่านหนังสือในทรีนิตี้\n\nเด็กสาวที่ชอบอ่านหนังสือมาก เป็นหนึ่งในนักเรียนไม่กี่คน ที่อ่านหนังสือของห้องสมุดทรีนิตี้จนหมดทุกเล่ม เธอชอบแนะนำหนังสือให้คนอื่น พอๆ กับที่เธอชอบอ่านเอง และจะแนะนำให้เหมาะกับรสนิยมของอีกฝ่าย"

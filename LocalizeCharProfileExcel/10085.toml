10085-WeaponDescTw = "晴使用的無托式突擊步槍。\n\n搭載在野外也能輕鬆生火的點火功能，以及猛獸出現時可協助瞄準的自動瞄準裝置。然而當熊真的出現的時候，晴卻會因為驚慌失措而無法正常使用它的功能。"
10085-ProfileIntroductionTw = "適逢寒冬而換上溫暖衣物的貝里塔斯的成員。\n\n久違離開了舒適的室內，來到了幾乎接收不到電波的露營場，所以情緒似乎比平常低落。雖然能忍受大多數室外的不便，卻無論如何也不能放棄充滿碳酸的能量飲料。"
10085-CharacterSSRNewTw = "無論天氣再冷，都不能忍受不冷不熱的妖怪MAX"

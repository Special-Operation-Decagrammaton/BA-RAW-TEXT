10085-WeaponDescEn = "Hare's bullpup assault rifle.\n\nIt's been modded for the outdoors with various new features: ignition for starting a campfire and an automatic bear-targeting feature. It couldn't account for user panic when Hare actually encountered a bear, however."
10085-ProfileIntroductionEn = "This Veritas member is bundled up to withstand the winter's cold.\n\nHare can't remember the last time she's left the confines of her desk, and she can't help but be a little nervous at a campsite with no Wi-Fi. While she's accepted losing most of her creature comforts, she draws the line at no cans of Frenzy MAX."

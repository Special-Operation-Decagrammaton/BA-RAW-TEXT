10085-WeaponNameKr = "자동 표적 조준 장치"
10085-WeaponDescKr = "하레가 사용하는 불펍 방식의 돌격소총.\n\n야외에서도 쉽게 불을 피울 수 있도록 해주는 착화 기능을 포함하여, 맹수가 나타났을 때 자동으로 조준을 돕는 표적 조준 장치 등이 탑재되어 있다. 하지만 정작 실제로 곰이 나타났을 때의 하레는 당황해서 총기의 기능을 제대로 사용하지 못했다."
10085-ProfileIntroductionKr = "추운 겨울을 대비하여 따듯한 아웃웨어를 차려입은 베리타스의 부원.\n\n간만에 안락한 실내를 떠나 전파도 거의 터지지 않는 캠핑장에 오게 되어 평소보다 텐션이 떨어져 있다. 야외에서의 불편함은 대부분 감내할 준비가 되어 있지만, 탄산이 가득 찬 에너지 드링크를 마시는 것만큼은 야외에서도 포기할 수 없다."
10085-CharacterSSRNewKr = "아무리 날씨가 추워도 미적지근한 요괴 MAX는 용납할 수 없지."

10084-WeaponDescKr = "코타마가 늘 휴대하고 다니는 권총.\n\n\r격발 소음을 극도로 억제한 이 권총은 조용한 산속에서도 야생 동물들의 경계를 사지 않고도 작전을 수행할 수 있다."
10084-ProfileIntroductionKr = "추운 겨울을 맞아 따듯한 옷으로 갈아입은 베리타스의 부원.\n\n\r치히로의 권유로 떠밀리듯 야외에 나오게 되었지만, 평소에는 녹음하기 어려운 환경음을 녹음할 모처럼의 기회라는 생각에 조금은 들떠있다. 자연환경에서 녹음할 수 있는 모든 종류의 소리를 선호하지만, 제일 좋아하는 것은 역시 선생님의 목소리이다."
10084-CharacterSSRNewKr = "선생님의 발소리가 가까워져 오는 것을 기다리고 있었습니다."

10131-WeaponDescKr = "타카네가 자기 취향껏 꾸민 권총.\n\n총기로서의 기본 기능 외에도, 자신의 분노를 표출하는 데에도 사용된다는 모양이다……."
10131-ProfileIntroductionKr = "붉은겨울 학원의 출판 동아리 <출판부>의 부원.\n\n겉으로는 예의를 중시하고, 언어도 품위 있게 사용한다. 평론 실력 역시 상당하지만, 종종 자기 주관을 지나치게 집어넣어 본의 아닌 물의를 일으키는 경우가 있다. 지식해방전선과는 묘한 라이벌 관계를 형성하고 있는 모양."
10131-CharacterSSRNewKr = "평안하신지요. 추천해 드릴 작품이 있는데, 어떠실까요?"

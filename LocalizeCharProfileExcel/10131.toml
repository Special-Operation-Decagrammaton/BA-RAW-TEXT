10131-ProfileIntroductionTh = "สมาชิก <ชมรมสื่อสิ่งพิมพ์> ของสหภาพเรดวินเทอร์\n\nดูจากภายนอก ทาคาเนะให้ความสำคัญกับมารยาท และใช้ภาษาอย่างสง่างาม แม้ทักษะการวิจารณ์จะค่อนข้างดี แต่ก็มักจะใส่ความคิดเห็นส่วนตัวมากเกินไป บางครั้งจึงเกิดปัญหาโดยไม่ได้ตั้งใจ ดูเหมือนว่าทาคาเนะจะไม่ค่อยลงรอยกับ ชมรมแนวร่วมปลดปล่อยความรู้เท่าไรนัก"
10131-CharacterSSRNewTh = "สุขสบายดีหรือเปล่าคะ? ฉันมีหนังสืออยากแนะนำ สนใจมั้ยล่ะคะ?"

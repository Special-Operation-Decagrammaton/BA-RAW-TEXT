26011-ProfileIntroductionEn = "A cheerful student from Sakugawa Middle School.\n\nShe was introduced to Misaka Mikoto, an upperclassman from Tokiwadai Middle School, by her good friend and classmate Uiharu Kazari. Although she is a Level 0 without any powers, she has good instincts and a knack for tracking down clues. Her favorite things are urban legends and desserts. She makes a point of trying out new desserts in her free time."

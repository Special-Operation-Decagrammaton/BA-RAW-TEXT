26011-WeaponDescTh = "ปืนประจำตัวที่ชมรมวิศวกรรมประดิษฐ์ให้ซาเต็น รุยโกะ\n\nแข็งแรงขนาดที่จับเหวี่ยงยังไงก็ไม่หักง่ายๆ"
26011-ProfileIntroductionTh = "นักเรียนมัธยมต้นที่สดใส\n\nซาเต็นเป็นเพื่อนสนิทของอุยฮารุ คาซาริที่เป็นเพื่อนร่วมชั้นกัน โดยอุยฮารุเป็นคนแนะนำรุ่นพี่มิซากะ มิโคโตะจากโรงเรียนมัธยมต้น\nโทคิวะได\nถึงซาเต็นจะเป็นผู้ใช้พลังเลเวล 0 แต่ก็เป็นคนที่มีเซนส์ดีและหาเบาะแส\nสำคัญได้บ่อยๆ ของที่ชอบคือตำนานของเมืองและของหวาน เมื่อถึงวันหยุดมักจะออกไปสำรวจหาของหวานกิน"

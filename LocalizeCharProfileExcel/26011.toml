26011-ProfileIntroductionTw = "柵川中學所屬，充滿元氣的女國中生。\n\n與同年級的初春飾利非常要好，在對方的介紹之下認識了常盤台中學的前輩御坂美琴。雖然是名「LEVEL0」的無能力者，其神準的直覺經常能找到決定性的線索。喜歡的東西是都市傳說和甜點。假日時經常外出進行甜點調查。"

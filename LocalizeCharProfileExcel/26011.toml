26011-WeaponDescKr = "사텐 루이코를 위해 엔지니어 부에서 만들어 준 전용 총기.\n\n손으로 직접 휘둘러도 부서지지 않을 만큼 튼튼하다."
26011-ProfileIntroductionKr = "사쿠가와 중학교 소속의 명랑한 여중생.\n\n동급생인 우이하루 카자리의 절친한 친구이며, 우이하루로부터 토키와다이 중학교의 선배, 미사카 미코토를 소개받았다. 레벨 0의 무능력자이지만 감이 좋고 결정적인 단서를 찾는 경우가 많다. 좋아하는 것은 도시 전설과 디저트. 휴일이 되면 자주 디저트 조사를 하러 나간다."

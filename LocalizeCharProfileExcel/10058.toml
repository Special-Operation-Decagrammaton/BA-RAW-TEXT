10058-ProfileIntroductionTw = "三一綜合學園所屬，救護騎士團的團長。性格正直堅定，卻也有著過激一面的白衣戰士。\n\n據說「美禰團長來破壞，騎士團來治療」這個救護騎士團的傳言已經傳遍整個三一。然而即使是這樣的他，也有藉由整頓自己的裝備和邀請熟人舉行茶會來療癒心靈的一面。此外，據說其對紅茶的造詣之深，甚至能和實現正義部的蓮實匹敵。"
10058-CharacterSSRNewTw = "我是救護騎士團團長蒼森美禰。\n需要救護的人在哪裡呢？"

10058-WeaponDescKr = "미네의 샷건.\n\n구호란 때로 양면성을 지닐 수 있다고 그녀는 주장한다. 이 무기야말로 그녀의 주장에 대한 하나의 근거가 될지도 모른다……"
10058-ProfileIntroductionKr = "트리니티 구호기사단의 단장. 올곧고 심지가 굳으나 과격한 면도 있는 백의의 전사.\n\n'미네가 부수고 기사단이 치료한다'는 명성(?)은 이미 트리니티 전역에서 유명하다. 여유가 생기면 자신의 장비를 정비하거나, 다과를 준비하여 지인들을 초대해 마음을 달랜다. 홍차에 대한 조예는 정의실현부의 하스미와 비교해도 결코 밀리지 않는다는 말이 있다."
10058-CharacterSSRNewKr = "구호기사단 단장 아오모리 미네라고 합니다.\n구호가 필요한 분은 어디 계신가요?"

10058-ProfileIntroductionEn = "The captain of the Trinity Remedial Knights. A true knight in shining armor, she's upright and resolute, but she has a radical side as well.\n\nShe has a reputation in Trinity: Mine destroys things, and her knights pick up the pieces. She spends her spare time maintaining her equipment and making snacks and drinks for get-togethers with her friends. Some say that she knows as much about black tea as Hasumi of the Justice Task Force."

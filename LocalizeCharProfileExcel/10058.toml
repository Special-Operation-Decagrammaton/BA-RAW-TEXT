10058-WeaponDescTh = "ปืนลูกซองของมิเนะ\n\nมิเนะมักยืนกรานอยู่เสมอว่า 'การบรรเทาทุกข์' มีสองวิธี\nและอาวุธนี้อาจเป็นเครื่องพิสูจน์คำยืนกรานของเธอก็ได้..."
10058-ProfileIntroductionTh = "หัวหน้าชมรมอัศวินบรรเทาทุกข์ของโรงเรียนทรีนิตี้ อัศวินสีขาวที่มีนิสัยเข้มแข็ง และซื่อตรงอย่างที่สุด\n\nเธอมีชื่อเสีย(?) ที่ดังไปทั่วทรีนิตี้ในเรื่องที่ว่า \"มิเนะคือฝ่ายทำลายล้าง\nและสมาชิกอัศวินคนอื่นๆ คือผู้รักษา\" หากมีเวลาว่าง เธอมักจะซ่อมบำรุง อุปกรณ์ของตัวเอง เตรียมขนม ของว่าง และชวนคนสนิทมาใช้เวลา ผ่อนคลายร่วมกัน มีคนร่ำลือว่าความรู้เรื่องชาของเธอไม่ได้ด้อยกว่าฮาสุมิ จากชมรมทวงความยุติธรรมเลย"
10058-CharacterSSRNewTh = "หัวหน้าชมรมอัศวินบรรเทาทุกข์ อาโอโมริ มิเนะค่ะ\nคนที่ต้องการให้ช่วยบรรเทาทุกข์อยู่ที่ไหนคะ?"

10078-WeaponDescTw = "佳澄總是隨身攜帶的手槍。\n\n雖然大部分的情況是為了炒熱氣氛而對空開火，但與其嬌小可愛的外觀不同，實際威力非常強猛。"
10078-ProfileIntroductionTw = "格黑娜學園所屬，溫泉開發部的部長。\n\n主張源泉流經之地都該開發成溫泉，無論指定的位置上有任何東西都會將其炸毀。雖然獲得了部員的全面支持，不過實際上是名被正式通緝的犯罪者。"
10078-CharacterSSRNewTw = "溫泉開發的定義，我有告訴過你嗎？"

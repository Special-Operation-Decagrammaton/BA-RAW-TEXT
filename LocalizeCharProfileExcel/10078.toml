10078-HobbyTh = "ใช้ระเบิดพังทลาย, พัฒนาออนเซ็น"
10078-WeaponNameTh = "Red Rector"
10078-WeaponDescTh = "ปืนพกที่คาสุมิพกไว้ข้างกายตลอด\n\nส่วนใหญ่จะใช้ยิงขึ้นไปบนฟ้าเพื่อสร้างบรรยากาศ แต่ถึงจะขนาดเล็กและภายนอกดูน่ารัก แต่ก็เสียงดัง และมีอานุภาพรุนแรง"
10078-ProfileIntroductionTh = "หัวหน้าชมรมพัฒนาออนเซ็นแห่งเกเฮนน่า\n\nคาสุมิเชื่อว่าพื้นดินที่น้ำพุร้อนไหลผ่านควรสร้างเป็นบ่อออนเซ็นทั้งหมด\nถ้าเธอกำหนดสถานที่แล้ว ไม่ว่าที่นั่นจะเคยมีอะไรอยู่ก็จะระเบิดทิ้งไม่ให้\nเหลือซาก เธอได้รับการสนับสนุนอย่างดีจากสมาชิกชมรม แต่ตามจริงแล้วเธอเป็นคืออาชญากรที่ถูกตามตัว"
10078-CharacterSSRNewTh = "ฉันบอกนิยามของการพัฒนาออนเซ็นไปหรือยังนะ?"

20015-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，修行部的元氣成員。\n\n原本是個住在百鬼夜行相當鄉下的地方的搗蛋鬼，偶然遇見椿和三森之後，萌生了「想要成為像他們一樣的淑女！」的想法而加入了修行部。雖然每天都為了接近理想而努力著，他的修行卻不知為何大多都與麻煩相連。"
20015-CharacterSSRNewTw = "為了成為出色的淑女！\n來吧，老師，今天也鼓足幹勁向前走吧！"

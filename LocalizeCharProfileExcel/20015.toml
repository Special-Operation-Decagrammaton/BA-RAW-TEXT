20015-WeaponDescKr = "카에데가 늘 가지고 다니는 신호 권총.\n\n\r말 그대로 무언가를 발견하면 신호로 알려주기 위해 사용하는 물건으로, 카에데는 주로 사건을 일으키는 문제아를 발견했을 때, 혹은 희귀한 무시퀸 카드를 발견했을 때 쏘아 올리고는 한다."
20015-ProfileIntroductionKr = "백귀야행 학원 수행부 소속의 의욕 넘치는 부원.\n\n\r원래는 동네에서 유명한 개구쟁이였지만, 우연히 츠바키와 미모리를 만난 뒤, 그 둘처럼 멋진 레이디가 되고 싶다는 생각을 가지고 수행부에 입부했다. 매일 같이 멋진 레이디가 되기 위한 수행을 게을리하지 않지만, 어째서인지 카에데가 수행을 했다 하면 그 대부분은 좌충우돌 트러블로 이어진다."
20015-CharacterSSRNewKr = "멋진 레이디가 되기 위해!\n\r선생님! 오늘도 출동이야!"

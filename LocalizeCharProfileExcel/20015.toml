[translation]
20015-StatusMessageTh = "นี่ๆ~! วันนี้เราจะเล่นอะไรกันดีล่ะ?!"
20015-FullNameTh = "อิซามิ คาเอเดะ"
20015-FamilyNameTh = "อิซามิ"
20015-PersonalNameTh = "คาเอเดะ"
20015-SchoolYearTh = "ชั้นปีที่ 1"
20015-CharacterAgeTh = "15 ปี"
20015-BirthdayTh = "9 ก.ค."
20015-HobbyTh = "เล่นสนุก (อยู่ระหว่างฝึกอดทน), จับด้วงกว่างโกลเด้นเฮอร์คิวลิส"
20015-WeaponNameTh = "Funny Fireworks"
20015-WeaponDescTh = "ปืนยิงพลุให้สัญญาณที่คาเอเดะมักพกติดตัวอยู่เสมอ\n\nปืนยิงพลุให้สัญญาณที่ใช้ส่งสัญญาณเมื่อพบอะไรบางอย่าง\nและส่วนใหญ่คาเอเดะมักจะใช้ยิงเมื่อพบเด็กเกเรหรือการ์ด\nมูชิควีนที่หายาก"
20015-ProfileIntroductionTh = "สมาชิกผู้มีความกระตือรือร้นสูงของชมรมฝึกฝนแห่งสหพันธ์เฮียกคิยาโค\n\nเธอเป็นเด็กจอมซนที่ทุกคนรู้จักอย่างดี แต่หลังจากได้พบกับสึบากิ และมิโมริเข้าโดยบังเอิญ เธอก็ได้เข้าร่วมชมรมฝึกฝน ด้วยความปรารถนา จะเป็นเลดี้ที่เพียบพร้อม เหมือนกับรุ่นพี่ทั้งสองคน คาเอเดะไม่เคยละเลย การฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อมในทุกๆ วัน แต่เป็นเพราะอะไรบางอย่าง เวลาที่คาเอเดะลงมือฝึกมักจะเกิดปัญหาตามมาทุกครั้ง"
20015-CharacterSSRNewTh = "คุณครู! วันนี้ฉันก็จะออกปฏิบัติการ\nเพื่อการเป็นเลดี้ที่เพียบพร้อมล่ะ!"

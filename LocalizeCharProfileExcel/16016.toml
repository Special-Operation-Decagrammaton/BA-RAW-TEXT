16016-ProfileIntroductionTh = "เมมเบอร์วงไอดอล <แอนทีก เซราฟิม> แห่งทรีนิตี้\n\nมิเนะเข้าร่วมอีเวนต์ไอดอลเพื่อให้ตัวเองเป็นหัวหน้าชมรมอัศวินบรรเทาทุกข์\nที่เป็นมิตรกับทุกคน แม้จะยังเห็นความแน่วแน่อันเป็นเอกลักษณ์ประจำตัวอยู่ แต่มิเนะก็เหมือนจะซื่อสัตย์กับตัวเองมากขึ้นเรื่องที่เธอชอบอะไรน่ารักๆ"

20022-WeaponDescKr = "후우카의 기관단총.\n\n\r신년을 맞아, 사용할 일이 없기를 바라는 후우카이지만, 세상은 언제나 그녀의 뜻대로 돌아가지 않는다……"
20022-ProfileIntroductionKr = "새해를 맞아 기모노를 차려 입은 후우카.\n\n\r올해에야말로 제발 평온한 나날이 지속되기를 바라지만, 그녀를 둘러싼 환경이 그것을 허락해 줄지는 아직 미지수인 듯하다."
20022-CharacterSSRNewKr = "해넘이 국수는 드셨나요. 선생님?\n\r올해에는 선생님도 저도, 무탈한 한 해가 되었으면 좋겠네요."

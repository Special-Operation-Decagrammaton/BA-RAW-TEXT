20022-ProfileIntroductionTh = "ฟูกะเปลี่ยนมาสวมชุดกิโมโนเพื่อฉลองปีใหม่\n\nเธอคาดหวังว่าปีใหม่นี้จะนำพาความสงบและสันติมาสู่ชีวิตของเธอ\nแต่ก็ดูไม่ค่อยแน่ใจเท่าไรว่าสภาพแวดล้อมรอบตัวเธอจะยอมให้เธอ\nมีความสงบสุขได้หรือไม่..."
20022-CharacterSSRNewTh = "ทานโทชิโคชิโซบะรึยังคะ คุณครู?\nขอให้ทั้งฉันและคุณครูไม่เจอเรื่องวุ่นวายอะไรในปีนี้นะคะ"

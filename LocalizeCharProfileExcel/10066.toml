10066-WeaponDescTh = "ปืนเรลกันของอาริสึ\n\nได้รับการฟื้นฟูการจ่ายพลังงานและสมรรถภาพ\nจนสามารถใช้ลอบยิงได้ แม้การลอบยิงด้วยเรลกัน\nจะเป็นเรื่องยาก แต่ถ้าเป้าหมายแตกกระเจิงได้\nก็ถือว่าเป็นการลอบยิงแล้ว"
10066-ProfileIntroductionTh = "สมาชิกชมรมพัฒนาเกมของมิลเลเนียมที่ได้ใส่ชุดเมด เพราะถูกเข้าใจผิด\nว่าเป็นสมาชิก C&C\n\nแม้จะยังไม่คุ้นชินกับชุดเมด แต่อาริสึก็ทุ่มเทอย่างสุดความสามารถ\nเพื่อก้าวข้ามความเคอะเขินนี้ และพยายามที่จะทำภารกิจให้สำเร็จ\nด้วยท่าทีที่สดใสร่าเริงที่เป็นเอกลักษณ์ประจำตัว"
10066-CharacterSSRNewTh = "ปาปัม ปาปัม─!\nอาริสึเปลี่ยนคลาสมาเป็นผู้กล้าเมดแล้วค่ะ!"

26010-WeaponDescKr = "미유가 SRT 특수학원에서 지급받은 제식 소총.\n\n볼트액션 특유의 단순하고 튼튼한 구조 덕분에 거친 해풍 속에서도 고장 나는 일 없이 적을 저격할 수 있다."
26010-ProfileIntroductionKr = "잠입 작전을 위해 외진 어촌 마을을 방문한 RABBIT 소대의 저격수.\n\n어촌 마을에서의 작전을 위해 낚시 도구를 챙겨와 시간 대부분을 부둣가에서 보내고 있다. 가끔 예상치 못한 대어를 낚아 다른 낚시꾼들의 이목을 끌기도 하지만…… 그녀의 타고난 존재감은 이 기묘한 마을에서도 여전하다."

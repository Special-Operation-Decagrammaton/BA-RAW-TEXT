26010-HobbyTh = "นั่งจินตนาการ (ด้านลบ), หนีความจริง, สะสมก้อนกรวด"
26010-WeaponNameTh = "RABBIT Type 39 Rifle"
26010-WeaponDescTh = "ปืนไรเฟิลมาตรฐานที่มิยุได้รับจากสถาบัน SRT\n\nด้วยรูปลักษณ์ที่เรียบง่ายและมีความทนทานสูงที่เป็น\nเอกลักษณ์ของปืนประเภทโบลด์ แอ็กชัน จึงใช้ยิงศัตรูได้\nอย่างไม่ต้องกลัวจะเสียหาย แม้อยู่ท่ามกลางลมทะเลที่รุนแรง"
26010-ProfileIntroductionTh = "สไนเปอร์ของกองทหาร RABBIT ที่มายังหมู่บ้านชาวประมงเพื่อปฏิบัติภารกิจแทรกซึม\n\nเธอจึงนำอุปกรณ์ตกปลามาด้วย เพื่อปฏิบัติการแทรกซึมตัวเข้าไปในหมู่บ้านชาวประมง มิยุใช้เวลาส่วนใหญ่อยู่ที่บริเวณท่าเทียบเรือ บางครั้งเธอก็ตกปลาตัวใหญ่ได้โดยไม่คาดคิด จนตกเป็นที่จับตาของนักตกปลาคนอื่นๆ... แต่ว่าแม้จะมาที่หมู่บ้านนี้แล้วก็ตาม ความจืดจางที่เป็นเอกลักษณ์ของเธอก็ยังคงแสดงให้เห็นอยู่"

26010-WeaponDescTw = "美優被SRT特殊學園配給的制式狙擊步槍。\n\n多虧了手動槍機特有的單純又堅固的構造，使其即使遭遇強勁的海風也不會故障，能夠狙擊敵人。"
26010-ProfileIntroductionTw = "為了潛入作戰而造訪漁村的SRT特殊學園所屬，RABBIT小隊的狙擊手。\n\n帶著釣具在碼頭邊悠閒地垂釣著。偶爾會因為釣到大魚而受到周圍釣客的注目……但其與生俱來的低存在感，即使在這奇妙的漁村裡似乎依舊健在。"

26010-WeaponDescEn = "Standard rifle issued to Miyu from SRT Academy.\n\nThe simple yet sturdy construction of the bolt-action allows you to snipe down enemies in harsh sea winds without malfunctioning."
26010-ProfileIntroductionEn = "The RABBIT Squad's sniper, who's visiting a remote fishing village on an undercover operation.\n\nShe brought her fishing tackle to blend in and spends most of her time at the docks. Occasionally, she catches an unexpected big fish and attracts the attention of other anglers, but...her natural lack of presence remains strong even in this peculiar village."

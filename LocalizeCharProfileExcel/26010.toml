[translation]
26010-StatusMessageTh = "พรุ่งนี้... ก็จะเป็นวันพรุ่งนี้ที่ต่างออกไป"
26010-FullNameTh = "คาซุมิซาวะ มิยุ"
26010-FamilyNameTh = "คาซุมิซาวะ"

10046-HobbyKr = "두루마리 인법 공부, 주군 호위하기"
10046-WeaponNameKr = "이즈나류 슈퍼 닌자 도구"
10046-WeaponDescKr = "이즈나가 애용하는 기관단총.\n\n\r문자 그대로 최첨단 닌자 도구이기 때문에 방수 기능도 완비! 즉 바닷속에서 사용하는 것도 문제가 없다. 주군을 위한 이즈나의 어깨 마사지엔 빈틈이 없는 것이다."
10046-ProfileIntroductionKr = "여름의 수련을 위해 바다를 찾아온 백귀야행 학원 인법연구부 소속의 소녀.\n\n\r평소에도 무척이나 활기차지만, 이번엔 여름 태양의 에너지를 받은 탓인지 평소보다 200%는 더 기운찬 모습을 보여주고 있는 닌자 소녀. 보다 여름에 어울리는 닌자가 되기 위해, 오늘도 이즈나는 수련이라는 명목으로 이곳저곳을 쏘다니며 주군과 함께 여름을 만끽하고 있다."
10046-CharacterSSRNewKr = "이번 여름! 이즈나,\n\r주군과 함께 열심히 수련하겠어요!"

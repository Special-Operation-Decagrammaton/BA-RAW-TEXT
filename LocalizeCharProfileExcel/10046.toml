[translation]
10046-StatusMessageTh = "ฤดูร้อนแบบนี้... ก็ต้องฝึกฝนกันที่ทะเลสิคะ! นินนิน!"
10046-FullNameTh = "คุดะ อิซุนะ"
10046-FamilyNameTh = "คุดะ"
10046-PersonalNameTh = "อิซุนะ"
10046-SchoolYearTh = "ชั้นปีที่ 1"
10046-CharacterAgeTh = "15 ปี"
10046-BirthdayTh = "16 ธ.ค."
10046-HobbyTh = "ศึกษาคัมภีร์ศาสตร์นินจา, คุ้มกันนายท่าน"
10046-WeaponNameTh = "Izuna-Style Super Ninja Tool"
10046-WeaponDescTh = "ปืนกลมือที่อิซุนะใช้เป็นประจำ\n\nอาวุธนินจาที่ล้ำสมัยสมชื่อ เลยสามารถกันน้ำได้อย่าง\nสมบูรณ์แบบ! สามารถนำไปใช้ใต้น้ำได้อย่างไร้กังวล\nเป็นอุปกรณ์นินจาไร้ที่ติเพื่อคุ้มครองนายท่าน"
10046-ProfileIntroductionTh = "เด็กสาวสมาชิกชมรมวิจัยศาสตร์นินจาของสหพันธ์เฮียกคิยาโค ที่เดินทางมาฝึกฝนที่ทะเลฤดูร้อน\n\nนินจาสาวที่เปี่ยมไปด้วยพลังอยู่เสมอ และเมื่อมาถึงที่ทะเลแล้ว พลังงานของเธอพุ่งสูงถึง 200 เปอร์เซนต์ สาวน้อยนินจาที่พลังล้นเป็นพิเศษเมื่ออยู่ท่ามกลางแสงแดดของฤดูร้อน แม้ในวันหยุดฤดูร้อน อิซุนะก็ยังคงฝึกฝนเพื่อที่จะเป็นนินจาที่เหมาะสม และใช้ข้ออ้างการฝึกฝนเล่นสนุกในฤดูร้อนไปกับนายท่านของเธอ"
10046-CharacterSSRNewTh = "ฤดูร้อนคราวนี้!\nอิซุนะจะตั้งใจฝึกฝนกับนายท่านค่ะ!"

10046-WeaponDescTw = "伊樹菜愛用的衝鋒槍。\n\n就如字面上的意思，因為是最尖端的忍者道具，所以也能完美防水！也就是說，也能在海裡使用。為了守護主公，忍具沒有破綻。"
10046-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，為了修行而造訪海邊的忍術研究部少女。\n雖然伊樹菜平常就很有活力，但這次似乎受到夏日能量的影響，將以200%的活力迎接主公。為了成為更符合夏天的忍者，伊樹菜今天也以修行的名目，和主公一起盡情享受著夏天。"
10046-CharacterSSRNewTw = "不才伊樹菜！這個夏天也\n與主公一同盡全力修行！"

10086-ProfileIntroductionJp = "The Head Prefect of the Gehenna Academy sporting a beautiful dress for the upcoming party.\n\nThis is the type of event she'd usually think of as a bother, but the promise of Sensei's presence at Gehenna's party has piqued her interest. She might not even be aware of the enthusiasm oozing out of her as she diligently practices her piano solo."

10086-WeaponNameKr = "종막의 디스트로이어"
10086-WeaponDescKr = "히나가 수족처럼 다루는 다목적 기관총.\n\n\r평소 교칙을 어기고 풍기를 어지럽히는 것이라면 전부 처벌하는 무자비함을 보여주는 물건이지만, 이번만큼은 특별히 자신을 향한 엄격함과 누군가를 위한 마음을 한껏 담아 다루고 있다."
10086-ProfileIntroductionKr = "파티를 위해 특별히 드레스 차림으로 갈아입은 게헨나 학원의 선도부장.\n\n\r만사를 귀찮아하는 게으름뱅이 소녀지만, 선생님이 게헨나 특별 파티를 기대하고 있다는 이야기에 평소보다 조금 더 노력하고자 마음먹은 상태. 덕분에 틈틈이 선생님을 위한 피아노 연주를 열심히 준비하는 등, 여느 때보다 더욱더 풋풋한 소녀심이 피어난 상태가 되었지만, 본인은 깨닫지 못하고 있다."
10086-CharacterSSRNewKr = "당신을 위해, 나는 노력하겠어."

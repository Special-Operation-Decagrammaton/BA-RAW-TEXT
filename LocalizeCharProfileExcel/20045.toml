20045-WeaponDescTh = "ปืนกลที่เป็นอาวุธของพีน่า\n\nพีน่าระดมยิงไม่ยั้งจนเหมือนกับสาดกระสุนใส่ศัตรู นั่นคือสิ่งที่ทำให้หัวใจของเธอรู้สึกเร่าร้อนและตื่นเต้นขึ้น"
20045-ProfileIntroductionTh = "พีน่าที่ได้รับหน้าที่ไกด์ในงานทัศนศึกษา\n\nสมาชิกที่กระตือรือร้นของชมรมจัดงานเทศกาล แม้จะได้มาเป็นไกด์ แต่ก็ไม่ทิ้งความร่าเริงและนิสัยการมองโลกในแง่บวกอันเป็นเอกลักษณ์\nของตัวเอง พีน่าใช้ประโยชน์จากจุดเด่นนี้แล้วอุทิศตนในการทำงานไกด์\nเป็นอย่างมาก แต่เธอก็น่าจะต้องระมัดระวังตัวมากกว่าเดิมเล็กน้อยเพื่อ\nไม่ให้สับสนระหว่างการทัศนศึกษากับการทำกิจกรรมของอัศวิน"
20045-CharacterSSRNewTh = "ฉันมาผดุงความยุติธรรมแล้วค่ะ!"

20045-WeaponDescKr = "피나의 거치식 기관총.\n\n쉴 새 없이 쏟아내는 열기는 피나 본인의 마음만큼이나 뜨겁다."
20045-ProfileIntroductionKr = "수학여행을 맞아 가이드 역할을 수행하게 된 피나.\n\n가이드가 되었어도 특유의 쾌활함과 명랑함, 긍정적인 성격은 변하지 않았다. 오히려 그 점을 살려 한층 더 가이드 일에 열중하는, 마츠리운영관리부의 열정적인 부원. 단지 협객 체험과 수학여행을 혼동하는 것은 아닐지, 조금 주의 깊게 보살펴 줄 필요가 있을지도 모른다."

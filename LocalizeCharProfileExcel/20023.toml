20023-WeaponDescJp = "The standard pistol that Kanna received from Valkyrie Police School.\n\nDespite its rugged design, it's light and easy to operate. Kanna prefers it, since she spends more time on paperwork than fieldwork."
20023-ProfileIntroductionJp = "A police student in charge of the Public Peace Bureau at Valkyrie Police School.\n\nShe's better known by the nickname \"Feral Hound,\" because she never gives up on a crime once it's in her sights. She'll investigate tenaciously until she uncovers the truth. People see her as hot-tempered because of her unusual, ferocious looks and her nickname, but in reality she's calm and down-to-earth."
20023-CharacterSSRNewJp = "I will serve the citizens faithfully."

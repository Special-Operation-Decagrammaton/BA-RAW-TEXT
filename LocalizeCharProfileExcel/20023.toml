[translation]
20023-StatusMessageTh = "เพื่อความปลอดภัยของคิโวทอส ไว้วางใจวัลคิรี่"
20023-FullNameTh = "โอกาตะ คันนะ"
20023-FamilyNameTh = "โอกาตะ"
20023-PersonalNameTh = "คันนะ"
20023-SchoolYearTh = "ชั้นปีที่ 3"

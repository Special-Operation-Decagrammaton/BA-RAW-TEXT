20023-WeaponDescKr = "칸나가 발키리 경찰학교에서 지급받은 제식 권총.\n\n투박한 디자인의 권총이지만 가볍고 조작이 간편하기 때문에 현장 출동보다 서류 작업이 잦은 칸나는 이 권총을 애용하고 있다."
20023-ProfileIntroductionKr = "발키리 경찰학교, 공안국의 국장 업무를 맡고 있는 경찰 학생.\n\n한번 목표로 삼은 범죄는 포기하지 않고 집요하게 탐문하여 진상을 밝혀내기 때문에 세간에는 '미친개'라는 별명으로 더 잘 알려져 있다. 특유의 사나운 인상과 별명 때문에 다혈질인 학생이라는 오해를 자주 받지만, 실제로는 매사에 침착하고 현실적인 가치관의 소유자이다."
20023-CharacterSSRNewKr = "시민을 위해 성실히 봉사하겠습니다."

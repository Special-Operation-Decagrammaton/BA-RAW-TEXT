20023-WeaponDescTw = "女武神警察學園配給的制式手槍。\n\n設計雖然單純，但輕盈且容易操作。比起執行現場任務更常進行文件作業的環奈相當愛用這把手槍。"
20023-ProfileIntroductionTw = "女武神警察學園所屬，擔任公安局局長的學生。\n\n對於決定負責的案件，會以不知放棄為何的執著進行審問進而揭發真相，因此以「狂犬」之名為人所知。由於其剛正的氣質和綽號的原因，經常被誤認為激情的類型，實際上是個能隨時保持冷靜，擁有現實價值觀的人。"
20023-CharacterSSRNewTw = "為了市民，誠心誠意地奉獻"

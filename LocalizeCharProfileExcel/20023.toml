20023-HobbyTh = "อ่านหนังสือ, ดูหนัง (สืบสวนสอบสวน)"
20023-WeaponNameTh = "Valkyrie Service Pistol No.17"
20023-WeaponDescTh = "ปืนพกรุ่นมาตรฐานที่คันนะได้รับจากสถาบันวัลคิรี่\n\nถึงจะเป็นปืนที่มีการออกแบบที่ดูธรรมดาๆ\nแต่ก็เป็นปืนที่มีน้ำหนักเบา และใช้งานได้ง่าย\nคันนะที่ปฏิบัติงานภาคสนามมากกว่างานนั่งโต๊ะชอบปืน\nกระบอกนี้มาก"
20023-ProfileIntroductionTh = "นักเรียนตำรวจจากสถาบันฝึกตำรวจวัลคิรี่ ทำหน้าที่เป็นหัวหน้ากรม\nความมั่นคงสาธารณะ\n\nด้วยนิสัยที่ไม่ยอมแพ้ และมุ่งมั่นสืบหาความจริงของอาชญากรรมที่เล็ง\nไว้อย่างไม่ลดละ ทำให้เธอเป็นที่รู้จักในฐานะฉายา 'หมาบ้า' ด้วยลักษณะ\nเฉพาะตัวที่มีเอกลักษณ์และฉายาของเธอ จึงทำให้ถูกเข้าใจผิดบ่อยๆ\nว่าเป็นคนหัวร้อน แต่ที่จริงแล้ว เธอเป็นคนที่นิสัยเยือกเย็น และตัดสิน\nทุกอย่างตามความเป็นจริง"
20023-CharacterSSRNewTh = "จะตั้งใจทำงานอาสาอย่างมุ่งมั่นเพื่อพลเมืองค่ะ"

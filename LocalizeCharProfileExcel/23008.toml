23008-WeaponDescKr = "마리가 소지하고 다니는 권총.\n\n늘 지니고 다니긴 하지만, 실제로 쏘는 것을 본 사람은 거의 없다."
23008-ProfileIntroductionKr = "시스터후드 소속의 신실하고 자애로운 소녀.\n\n언제나 상냥하고 부드러운 미소로 트리니티의 학생들을 맞이한다. 귀여운 인상이지만, 차분하고 마음이 편해지는 분위기라 상담하러 오는 학생들이 많다. 늘 스스로가 부족하다고 여기기 때문에, 다른 선배들처럼 훌륭한 시스터가 되겠다는 꿈을 가지고 있다."

23008-WeaponDescTw = "瑪麗持有的手槍。\n\n雖然總是隨身攜帶著，卻幾乎沒聽說有人曾目擊瑪麗開槍的場景。"
23008-ProfileIntroductionTw = "三一綜合學園所屬，修女會虔誠且誠實的少女。\n\n乍看之下給人一種可愛的印象，但久了便被他一貫的溫柔笑容及沉穩的氣質所吸引，前來諮詢的學生不勝枚舉。覺得自己還不夠成熟，想早點和其他前輩一樣成為出色的修女。"

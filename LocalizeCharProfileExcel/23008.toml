23008-ProfileIntroductionEn = "A sincere and benevolent girl affiliated with the Sisterhood.\n\nShe always greets Trinity students with a friendly smile. Despite her cuteness, many come to her for counseling because of the calm and relaxing air about her. She is self-critical and always considers herself as lacking, but she dreams of becoming a great Sister like her upperclassmen."

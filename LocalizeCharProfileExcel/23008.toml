23008-WeaponDescTh = "ปืนพกที่มารีมักจะพกติดตัวไปด้วยเสมอ\n\nถึงแม้มารีจะพกปืนติดตัวอยู่ตลอดเวลา แต่เธอก็แทบจะไม่ได้ใช้มันยิงใครเลย"
23008-ProfileIntroductionTh = "เด็กสาวผู้ซื่อสัตย์และมีจิตใจดีงามจากชมรมซิสเตอร์\n\nเธอจะทักทายนักเรียนคนอื่นๆ ของโรงเรียนทรีนิตี้ด้วยรอยยิ้มที่อ่อนโยน\nและเป็นมิตรอยู่เสมอ ด้วยภาพลักษณ์ของเด็กสาวน่ารักที่มีบรรยากาศ\nรอบตัวดูผ่อนคลายจึงทำให้เด็กนักเรียนคนอื่นๆ มักจะมาปรึกษากับเธอ\nแต่เธอมักคิดว่าตัวเองยังบกพร่องอยู่ และมีความฝันอยากจะเป็นซิสเตอร์\nที่น่านับถือเหมือนกับรุ่นพี่คนอื่นๆ"

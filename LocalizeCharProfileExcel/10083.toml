10083-WeaponNameKr = "백화요란 제식 소총 - 검푸른 지혜"
10083-WeaponDescKr = "키쿄가 곁에서 떼놓지 않는 소총.\n\n\r백화요란에서 작전참모를 맡고 있는 키쿄이기에, 실제 전장에서 이를 사용하는 일은 드물지만. 완벽한 승리를 위해서라면 스스로를 미끼로 사용하는 것도 주저하지 않는 키쿄이기에, 이 총의 도움을 받은 일도 적지 않다는 모양."
10083-ProfileIntroductionKr = "백귀야행 학원 백화요란 분쟁조정위원회의 작전참모.\n\n\r상식과 논리, 이성을 중시하는 소녀. 백화요란을 아끼고 있기에 이를 위협하는 이가 있다면 주저 없이 적의를 보이기도 한다. 즉 적과 아군 구분이 명확한 타입. 작전참모로서 승리를 중요시하지만, 그보다 더 중요하게 여기는 것이 아군의 안전으로. 냉혹하면서 상냥한 것이 바로 키쿄라는 소녀이다."
10083-CharacterSSRNewKr = "나와 함께 하고자 하는 당신의 판단.\n\r그것이 틀림없었다는 걸 보여줄게."

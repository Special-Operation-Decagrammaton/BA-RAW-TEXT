10083-WeaponDescJp = "A rifle Kikyou is never seen without.\n\nAs operations officer of the Hyakkaryouran, she's rarely on the front lines. But when she is, her smarts and this trusty weapon always lead her to victory."
10083-ProfileIntroductionJp = "Operations Officer of Hyakkiyako Academy's Hyakkaryouran Resolution Council.\n\nKikyou values logic and reason above all else. This combined with her deep loyalty to the Hyakkaryouran can make her a terrifying foe to face. She may be the mastermind behind all Hyakkaryouran strategy and operations, but she would never sacrifice an ally's safety for a victory. To her, there are only enemies or allies. Her ruthlessness terrifies her foes, while her kindness endears her to her fellow club members."
10083-CharacterSSRNewJp = "You won't regret standing by my side.\nI'll prove my worth."

10083-StatusMessageTh = "เรียนรู้ สั่งสอน เติบโต"
10083-FullNameTh = "คิริว คิเคียว"
10083-FamilyNameTh = "คิริว"
10083-PersonalNameTh = "คิเคียว"
10083-SchoolYearTh = "ชั้นปีที่ 2"

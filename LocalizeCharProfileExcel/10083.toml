10083-HobbyTh = "เล่นพันด้าย, อ่านตำรายุทธศาสตร์, รับแสงแดด"
10083-WeaponNameTh = "Hyakkaryouran Rifle - Keen Wisdom"
10083-WeaponDescTh = "ปืนไรเฟิลที่คิเคียวไม่เคยเอาไว้ห่างกาย\n\nปืนของคิเคียวที่เป็นที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน จึงไม่ถูกใช้นักในสนามจริง แต่เพื่อชัยชนะที่สมบูรณ์แบบ คิเคียวก็ไม่ลังเลที่จะใช้ตัวเองเป็นเหยื่อล่อ และปืนนี้ก็เป็นประโยชน์ในการนี้อยู่บ่อยครั้ง"
10083-ProfileIntroductionTh = "ที่ปรึกษายุทธศาสตร์จากคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\n\nเด็กสาวที่ให้ความสำคัญกับความรู้ ตรรกะและเหตุผล\nหากมีใครมาคุกคามเฮียกกะเรียวรันที่เธอหวงแหน เธอก็จะมองว่าเป็นศัตรู\nอย่างไม่ลังเล และเป็นคนที่ขีดเส้นแบ่งพวกพ้องและศัตรูอย่างชัดเจน\nในฐานะที่ปรึกษายุทธศาสตร์ คิเคียวมองว่าชัยชนะเป็นสิ่งสำคัญ\nแต่สิ่งที่สำคัญกว่านั้นคือความปลอดภัยของพวกพ้อง\nเด็กสาวที่ไร้ความปรานีแต่มีจิตใจอ่อนโยน เธอคนนี้คือคิริว คิเคียว"
10083-CharacterSSRNewTh = "ฉันจะพิสูจน์ให้เห็นเองว่า\nคุณตัดสินใจถูกแล้วที่มาร่วมทางกับฉัน"

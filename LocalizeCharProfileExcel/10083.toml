10083-WeaponDescTw = "桔梗隨身攜帶的步槍。\n\n由於桔梗本身擔任作戰參謀，很少有在戰場中使用它的機會。但若是為了取得完美的勝利，桔梗也會毫不猶豫以自己為餌，因此受這把槍幫助的情況似乎也不在少數。"
10083-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會的作戰參謀。\n\n重視常識、邏輯和理性的少女。由於十分愛護百花繚亂，只要有人對百花繚亂造成威脅就會毫不猶豫地展現敵意，屬於敵我分明的類型。雖然是名重視勝利的作戰參謀，但更重視我方的安全。\n「冷酷而和藹」指的就是這位名叫桔梗的少女。"
10083-CharacterSSRNewTw = "我會向你證明和我在一起是正確的決定"

10018-ProfileIntroductionKr = "밀레니엄 게임개발부의 부장.\n\n사람을 대하는 것을 어려워하는 대인기피증 소녀로 대부분의 시간을 게임개발부 내의 캐비닛 안에서 보내고 있다. 하지만 게임에 대한 열정만큼은 그 누구에게도 뒤지지 않는다. 게임을 제작하는 것과 플레이하는 것 모두를 좋아한다."

10064-WeaponDescTh = "ปืนพกที่คาโยโกะพกติดตัวเป็นประจำ\n\nปืนพกที่ส่งเสียงคำรามกึกก้องทุกครั้งที่ยิงออกไป นอกจากมีประโยชน์ในตอนที่ใช้ไล่ผู้ว่าจ้างที่นิสัยไม่ดีแล้ว ยังสามารถใช้ไล่โชคร้ายในวันปีใหม่ออกไปได้ด้วย"
10064-ProfileIntroductionTh = "หัวหน้าฝ่ายของหน่วยรับจ้างสารพัด 68\n\nเพื่อร่วมฉลองปีใหม่ เธอจึงเลือกที่จะแต่งตัวให้เหมือนกับสมาชิกคนอื่นๆ เธอดูเป็นธรรมชาติเหมือนคุ้นชินกับชุดนี้เป็นอย่างดี แม้ว่าคาโยโกะแสดงให้เห็นอย่างชัดเจนว่าเธอรู้สึกรำคาญกับความวุ่นวาย ภายในงานฉลองปีใหม่ แต่ถ้าเพื่อสมาชิกคนอื่นๆ ของหน่วยรับจ้างสารพัด 68 แล้วละก็ เธอก็ไม่ลังเลที่จะใช้สติปัญญาที่เฉียบแหลมของเธอเลย"
10064-CharacterSSRNewTh = "ขอให้ปีนี้\nเต็มไปด้วยสิ่งดีๆ"

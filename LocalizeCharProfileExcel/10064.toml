10064-WeaponDescKr = "카요코가 늘 휴대하고 다니는 권총.\n\n사격할 때마다 엄청난 굉음을 내는 이 권총은 무례한 의뢰인을 쫓을 때뿐만 아니라, 새해의 액운을 쫓는 데에도 유용하게 쓰인다."
10064-ProfileIntroductionKr = "흥신소 68의 과장.\n\n새해를 맞이해 다른 멤버들과 마찬가지로 꾸며 입었지만, 마치 평소에도 자주 입었던 것처럼 그 행동거지에 어색함은 없다. 새해맞이 행사장에서 벌어진 소동에 귀찮아하는 기색을 역력히 드러내지만, 흥신소 68의 멤버들을 위해서라면 지혜를 빌려주는 것을 주저하지 않는다."
10064-CharacterSSRNewKr = "올 해는 부디,\n좋은 울림이 가득하기를."

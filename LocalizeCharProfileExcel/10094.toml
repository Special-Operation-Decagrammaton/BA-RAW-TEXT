10094-WeaponDescKr = "모모이가 사용하는 돌격소총.\n\n\r스스로도 잘은 모르겠지만, 메이드에게는 소총이 필요하다고 아무튼 주장하는 중이다."
10094-ProfileIntroductionKr = "밀레니엄 학원, 게임 개발부의 시나리오 라이터.\n\n\r어쩌다 보니 C&C로 오해를 받아, 메이드복까지 입게 되고 말았다. 오해를 풀 사이도 없이 사건에 휘말리고, 휘말리고, 또다시 휘말려 들어가지만…… 특유의 밝고 당당한 태도로, 다가오는 모든 역경에 맞서 나간다."
10094-CharacterSSRNewKr = "최고의 메이드, 여기에 등장! 그러니까 우선 게임부터 하자, 선생님!"

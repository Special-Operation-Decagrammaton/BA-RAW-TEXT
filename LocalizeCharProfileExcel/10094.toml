10094-ProfileIntroductionTh = "นักเขียนเนื้อเรื่องจากชมรมพัฒนาเกมแห่งโรงเรียนมิลเลเนียม\n\nเธอโดนเข้าใจผิดว่าเป็น C&C จนต้องใส่ชุดเมด ทั้งเข้าไปพัวพันกับ\nเหตุการณ์ต่างๆ ซ้ำแล้วซ้ำเล่าจนไม่มีเวลาแก้ไขความเข้าใจผิด แต่ด้วยทัศนคติที่สดใสและมั่นใจ เธอจึงเผชิญหน้ากับเคราะห์ร้ายทั้งหมดที่เข้ามาได้"
10094-CharacterSSRNewTh = "สุดยอดเมดปรากฏตัวแล้ว! งั้นเราไปเล่นเกมกันก่อนเถอะคุณครู!"

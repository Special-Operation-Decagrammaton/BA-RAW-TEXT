10124-ProfileIntroductionTw = "三一綜合學園所屬，為了護衛茶會而來到海邊的實現正義部副部長。\n\n雖然公私分明的蓮實並未顯露出來，其實對能來到海邊一事由衷感到開心。或許他才是這次渡假最大的受益者也說不定。由於進行過嚴格的自我管理，即使穿上泳裝也絲毫不必擔心……吧。"
10124-CharacterSSRNewTw = "果然這樣的打扮，對我來說太可愛了吧……？"

10124-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่ฮาสุมิใช้เป็นประจำ\n\nลำกล้องที่เป็นประกายอยู่เสมอสะท้อนให้เห็นถึง ความตั้งใจจริงที่ไม่เคยยอมแพ้ในทุกสถานการณ์"
10124-ProfileIntroductionTh = "รองหัวหน้าชมรมทวงความยุติธรรมที่มาชายหาดเพื่อคุ้มกันสภาน้ำชา\n\nแม้จะเป็นคนเคร่งครัดเรื่องการแบ่งเวลางานและเวลาส่วนตัว แต่ฮาสุมิก็ไม่แสดงออกและมีความสุขมากที่ได้มาทะเล เธออาจเป็นผู้ได้รับ\nผลประโยชน์สูงสุดในวันหยุดพักร้อนนี้ก็ได้ ฮาสุมิดูแลร่างกายมาอย่างพิถีพิถัน จึงไม่มีอะไรให้กังวลเมื่อต้องใส่ชุดว่ายน้ำ น่าจะนะ..."
10124-CharacterSSRNewTh = "ชุดนี้มันน่ารักเกินไปสำหรับฉันหรือเปล่าคะ...?"

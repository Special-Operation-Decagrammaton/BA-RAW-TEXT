26005-ProfileIntroductionKr = "트리니티 방과후 디저트부 소속의 부원.\n\n작은 키와 체형이 콤플렉스인 난폭한 소동물 같은 소녀. 늘 어른스러워지고 싶다고 생각하지만, 생각하는 게 얼굴에 그대로 드러나기에 큰 성과는 없다. 다만 디저트 카페를 순회하며 한정판 디저트를 맛볼 때만큼은 누구보다 활짝 웃는다."

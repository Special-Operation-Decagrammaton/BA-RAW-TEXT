26005-WeaponDescTh = "ปืนไรเฟิลเฉพาะของโยชิมิ\n\nการต่อสู้แย่งชิงขนมหวานในคิโวทอส บางครั้งก็ต้องใช้ความแข็งแกร่งไปพร้อมกัน"
26005-ProfileIntroductionTh = "สมาชิกชมรมของหวานหลังเลิกเรียน แห่งสถาบันทรีนิตี้\n\nเด็กสาวจอมหน้าบึ้งที่อ่อนไหวกับรูปร่าง และส่วนสูงที่ไม่ถึงเมตรครึ่งของ\nตัวเอง เธออยากจะเป็นผู้ใหญ่ให้มากกว่านี้ แต่ความคิดของเธอก็แสดง\nออกมาทางสีหน้าที่บึ้งตึง จนยิ่งเหมือนเด็กมากกว่าเดิม แต่หากได้ตระเวน\nตามคาเฟ่ของหวาน และลิ้มรสของหวานลิมิเต็ดแล้วละก็ ความบูดบึ้งบน\nใบหน้าจะเปลี่ยนเป็นรอยยิ้มทันที"

10103-WeaponDescTw = "瑪麗娜愛用的衝鋒槍。\n\n無論身在何處，穿著什麼服裝，都會毫不留情地打擊膽敢挑戰赤冬事務局權威的人。"
10103-ProfileIntroductionTw = "為了迎接與山海經的交流會而換上旗袍的赤冬聯邦學園所屬，擔任保安委員長的瑪麗娜。\n\n無論是對熊貓的熱情還是對山海經接待的認可，都忠實地享受著交流會本來的目的。\n儘管本人由於身穿與赤冬風格大相逕庭的服裝而感到不知所措，旁人給予的評價卻截然不同。"
10103-CharacterSSRNewTw = "真……真的沒問題嗎？\n要打扮成這樣？"

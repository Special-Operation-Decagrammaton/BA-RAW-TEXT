10103-WeaponDescKr = "마리나가 애용하는 기관단총.\n\n장소가 어디이든, 어떤 복장이든, 붉은겨울 사무국의 권위를 의심하는 자들을 쓰러트려 나간다."
10103-ProfileIntroductionKr = "산해경과의 교류회를 맞아 치파오로 갈아입은 마리나.\n\n판다에 열광하거나 산해경의 접대를 인정하는 등, 교류회 본연의 목적을 충실하게 즐기는 중.\n붉은겨울과는 완전히 다른 스타일의 옷차림에 본인은 당황하는 눈치이지만, 주위로부터의 평가는 사뭇 다른 듯하다."
10103-CharacterSSRNewKr = "어…… 괘, 괜찮은가? 이런 차림이라도?"

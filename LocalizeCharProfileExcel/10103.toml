10103-WeaponDescTh = "ปืนกลมือที่มารินะใช้เป็นประจำ\n\nไม่ว่าจะอยู่ที่ไหนหรือใส่ชุดอะไร อาวุธชิ้นนี้ก็จัดการ\nคนที่สงสัยในอำนาจของสำนักเลขาธิการเรดวินเทอร์ได้"
10103-ProfileIntroductionTh = "มารินะที่ใส่ชุดกี่เพ้าให้เข้ากับงานแลกเปลี่ยนของซานไห่จิง\n\nเธอกำลังเพลิดเพลินตามวัตถุประสงค์ของงานแลกเปลี่ยน ทั้งยังตื่นเต้นกับหมีแพนด้าและประทับใจการต้อนรับของซานไห่จิง\nแม้มารินะจะดูสับสนกับสไตล์การแต่งตัวที่แตกต่างกับของเรดวินเทอร์\nอย่างสิ้นเชิง แต่เธอก็ได้รับคำชื่นชมจากคนรอบข้างอยู่ไม่น้อย"
10103-CharacterSSRNewTh = "อ่า... ตะ... แต่งตัวแบบนี้... ก็ได้อยู่ใช่มั้ย?"

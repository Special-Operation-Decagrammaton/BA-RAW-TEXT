20006-HobbyTh = "ทำวิจัย"
20006-WeaponNameTh = "The Great I's Pistol"
20006-WeaponDescTh = "ปืนพกที่ซายะประดิษฐ์และปรับปรุงหลายอย่างขึ้นเอง\n\nปืนพกดีไซน์สีชมพูสดใส เป็นสิ่งที่แสดงให้เห็นถึงแฟชั่นที่\nโดดเด่น แม้แต่ในวันหยุดพักผ่อนของเธอ"
20006-ProfileIntroductionTh = "นักประดิษฐ์อัจฉริยะแห่งโรงเรียนซานไห่จิงที่สบโอกาสได้หลีกหนีจากชีวิต ประจำวันที่แสนวุ่นวายของเธอมาใช้วันหยุดสบายๆ ได้\n\nซายะในช่วงวันหยุดจะกระตือรือร้นในการเล่นสเกตบอร์ดอย่างสนุกสนาน\nและเดินท่องเที่ยวไปตามท้องถนนต่างจากในตอนปกติที่เธอมักจะขลุกตัว\nอยู่ในห้องแล็บและอุทิศตนให้กับการค้นคว้าตัวยาใหม่ๆ\nถึงแม้จะเป็นช่วงวันหยุด แต่ความอยากรู้อยากเห็นในการค้นคว้าสิ่งใหม่ๆ อย่างไม่หยุดหย่อนของเธอก็ยังเหมือนเดิมไม่เปลี่ยนแปลง"
20006-CharacterSSRNewTh = "ถึงฉันจะเป็นอัจฉจริยะแต่ก็ต้องการเวลาพักบ้างเหมือนกันนะ ฮุฮุฮุ"

20006-ProfileIntroductionTw = "山海經高級中學所屬，脫離繁忙日常，久違地享受假日的天才發明家。\n\n和平時關在研究室埋頭研究新藥的身姿不同，假日的沙耶展現出活潑的樣子，以滑板在街上來回奔走。\n不過即使是假日，他追求新穎事物與知識的好奇心也依然沒有改變。"

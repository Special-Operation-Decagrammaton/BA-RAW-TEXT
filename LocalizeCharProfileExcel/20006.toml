20006-StatusMessageTh = "ไม่มีอะไรที่ท่านซายะคนนี้ไม่รู้หรอกนะ!"
20006-FullNameTh = "ยาคูชิ ซายะ"
20006-FamilyNameTh = "ยาคูชิ"

20006-WeaponDescKr = "사야가 직접 개조한 사제 권총.\n\n\r분홍색으로 슬라이드가 강조된 권총은 휴일을 보낼 때에도 빼놓을 수 없는 멋진 패션 아이템이다."
20006-ProfileIntroductionKr = "바쁜 일상에서 벗어나 모처럼 여유로운 휴일을 보내게 된 산해경의 천재 발명가.\n\n\r연구실에 틀어박혀 신약 연구에만 몰두하는 평소의 모습과는 달리, 휴일의 사야는 스케이트 보드를 타고 거리를 누빌 정도로 활동적이다. 하지만 새로운 것을 끊임없이 탐구하는 그녀의 지적 호기심만큼은 휴일에도 변함이 없다."
20006-CharacterSSRNewKr = "천재에게도 휴식은 필요한 법이라구. 후-후-후."

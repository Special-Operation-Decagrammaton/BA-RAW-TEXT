20038-WeaponDescTh = "ไรเฟิลซุ่มยิงของโทโมเอะ\n\nเธอบอกว่าไม่อยากใช้ปืนในงานแลกเปลี่ยน แต่นั่นก็ขึ้นอยู่กับเวลาและสถานการณ์..."
20038-ProfileIntroductionTh = "โทโมเอะที่ใส่ชุดกี่เพ้าให้เข้ากับงานแลกเปลี่ยนของซานไห่จิง\n\nแม้จะไม่ชินกับสภาพแวดล้อมของซานไห่จิงที่ต่างกับเรดวินเทอร์\nแต่โทโมเอะก็ปรับตัวได้อย่างรวดเร็วจนกลมกลืนไปกับสภาพแวดล้อม\nแบบใหม่นี้ เธอไม่รู้สึกอึดอัดกับเครื่องแต่งกายแบบใหม่\nแต่กลับสนใจมากกว่า ในงานแลกเปลี่ยนครั้งนี้ วาทศิลป์ที่เฉียบคม\nและความสามารถในการอ่านสถานการณ์อย่างทะลุปรุโปร่งของเธอ\nก็น่าจับตามองยิ่งนัก"
20038-CharacterSSRNewTh = "สถานที่กับเสื้อผ้าที่แปลกใหม่ ถือเป็นเรื่องดีนะคะ\nเราจะคุยเรื่องอะไรกันก่อนดีคะ?"

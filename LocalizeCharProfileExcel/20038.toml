20038-WeaponDescKr = "토모에의 저격 소총\n\n\r교류회 현장에서까지 사용하고 싶지는 않다고 주장하지만, 그것은 또한 때와 상황에 달린 것이다…"
20038-ProfileIntroductionKr = "산해경과의 교류회를 맞아 치파오로 갈아입은 토모에.\n\n\r붉은겨울과 다른 산해경이라는 환경에 낯설어할 만도 하지만, 빠르고 능숙하게 적응하여 주위와 융화된다. 새로 입게 된 옷에도 생소해하기보다는 호기심으로 접근하는 편.\n\r이번 교류회에서도 그녀의 날카로운 화술과 통찰력을 주목하는 편이 좋을지도 모른다."
20038-CharacterSSRNewKr = "신선한 장소와 신선한 옷. 좋은 일이네요.\n\r무엇부터 이야기해 볼까요?"

16008-ProfileIntroductionEn = "A laid-back administrative advisor of Valkyrie Police School.\n\nShe entered Valkyrie longing for a laid-back, easygoing life as a civil servant. She remains negligent, enjoying life as it is without being swayed by money or fame even when a case is sent to the Public Safety Bureau. Her favorite activity is eating donuts while listening to the radio."

16008-WeaponDescTh = "ปืนไรเฟิลรุ่นมาตรฐานที่ฟุบุกิได้รับจากสถาบัน\nฝึกตำรวจวัลคิรี่\n\nพลังโดยรวมของปืนไม่ได้ด้อยกว่าปืนอื่นๆ เลย\nแต่เนื่องจากฟุบุกิไม่ได้สนใจบำรุงรักษาเท่าไร\nเลยไม่สามารถแสดงศักยภาพได้อย่างเต็มที่"
16008-ProfileIntroductionTh = "ผู้ช่วยฝ่ายธุรการผู้รักความสบายของสำนักรักษาความปลอดภัย\nแห่งสถาบันฝึกตำรวจวัลคิรี่\n\nเธอเข้าเรียนที่สถาบันฝึกตำรวจวัลคิรี่ด้วยความปรารถนาที่จะใช้ชีวิต\nเจ้าหน้าที่รัฐแบบสบายๆ แม้จะมีเหตุแจ้งเข้ามาที่สำนักรักษาความปลอดภัย\nแต่ท่าทางของเธอก็ยังคงสบายๆ ไม่เปลี่ยน เธอมีความคิดที่จะใช้ชีวิต\nเรียบง่ายอย่างสบายๆ และสนุกสนาน โดยที่ไม่ถูกอำนาจของเงิน\nและชื่อเสียงครอบงำ สิ่งที่โปรดปรานมากที่สุดก็คือการนั่งกินโดนัทและฟังวิทยุไปด้วย"

16008-WeaponDescTw = "女武神警察學園配發給吹雪的制式步槍。\n\n雖然擁有不凡的威力，但因為吹雪疏於管理，所以無法發揮它原有的性能。"
16008-ProfileIntroductionTw = "女武神警察學園所屬，生活安全局的懶散學生。\n\n憧憬悠閒的公務員生活，因此就讀女武神警察學園。每當生活安全局收到什麼投訴，基本上都以一貫毫無誠意的態度處理，享受著不受金錢和名譽影響的窗邊族生活。最喜歡的事是邊吃甜甜圈邊聽廣播。"

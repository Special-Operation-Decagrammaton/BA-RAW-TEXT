16008-WeaponDescKr = "후부키가 발키리 경찰학교에서 지급받은 제식 소총.\n\n\r자체 위력은 나쁘지 않지만 후부키가 관리를 소홀히 한 탓에 제 성능을 내지 못하고 있다."
16008-ProfileIntroductionKr = "발키리 경찰학교, 생활안전국의 느긋한 행정지도원.\n\n\r느긋하고 여유로운 공무원의 삶을 동경하여 발키리 경찰학교에 입학하였다. 어쩌다 생활안전국에 사건이 들어와도 무성의한 태도로만 일관하며, 돈이나 명예에 휩쓸리지 않는 안빈낙도의 삶을 즐기고 있다. 가장 좋아하는 일은 도넛을 먹으며 라디오를 듣는 것."

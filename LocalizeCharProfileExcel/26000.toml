26000-ProfileIntroductionTh = "ฝ่ายสาธารณสุขของคณะกรรมวินัย แห่งสถาบันเกเฮนน่า\n\nหนึ่งในไม่กี่คนของคณะกรรมการวินัยที่ให้ความสำคัญกับระเบียบ ข้อบังคับ และขั้นตอน มีหน้าที่เป็นคนห้ามปราม ไม่ให้สมาชิกคณะกรรมการฯ อย่างอาโกะ และอิโอริก่อเรื่องวุ่นวาย\nเป็นคนพูดห้วนๆ จึงดูเย็นชาเหมือนกับสมาชิกคณะกรรมการฯ คนอื่น แต่เมื่ออยู่ต่อหน้าสัตว์ที่น่ารัก เธอจะกลายเป็นเด็กสาวอ่อนโยน"

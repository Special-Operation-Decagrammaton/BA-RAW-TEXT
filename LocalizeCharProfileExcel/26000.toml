26000-ProfileIntroductionTw = "格黑娜學園所屬，風紀委員會的救護負責人。\n\n重視規定、紀律及程序，是風紀委員會裡為數不多有常識的人。在亞子或伊織等等風紀委員暴走時負責阻止他們的人。\n說話語氣生硬，雖然給人「典型的風紀委員」的冷漠印象，但其實是個對可愛的動物毫無招架之力的善良少女。"

26000-ProfileIntroductionKr = "게헨나 학원 선도부의 보건 담당.\n\n규정, 규율, 절차를 중시하는 선도부의 몇 안 되는 상식인으로, 아코나 이오리 같은 다른 선도부원들이 폭주하지 않도록 잡아주는 브레이커 역할을 맡고 있다. 말투가 딱딱하여 일견 다른 선도부원들처럼 차가운 인상을 주곤 하지만, 귀여운 동물 앞에서는 한없이 약해지는 상냥한 소녀다."

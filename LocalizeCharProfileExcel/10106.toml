10106-WeaponDescKr = "아이돌 복장으로 바뀐 의상과 달리, 디자인의 변화가 없는 총.\n\n늘 한결같은 사쿠라코의 마음을 의미하는 듯하다."
10106-ProfileIntroductionKr = "트리니티의 아이돌 유닛 <앤틱 세라핌>의 일원.\n\n시스터후드에 얽혀 있는 오해들을 해소하고 이미지를 개선하기 위해, 스스로 아이돌 이벤트에 지원하였다. 스스로 가지고 있는 자신에 대한 불안과 달리, 사실 시스터후드 내에서 전폭적인 응원과 사랑을 받고 있다."

16004-WeaponDescKr = "피나의 거치식 기관총.\n\n\r쉴 새 없이 쏟아내는 열기는 피나 본인의 마음만큼이나 뜨겁다."
16004-ProfileIntroductionKr = "백귀야행 학원에 입학한 협객을 동경하는 소녀.\n\n\r항상 쾌활하고 명랑하며, 다른 사람을 돕는 것에 즐거움을 느낀다. 협객에 대해서 아는 것이라고는 영화에서 본 게 다이기 때문에 실제 협객과 거리가 있지만. 자신이 꿈꾸는 협객의 길을 걷는데, 망설임이 없는 소녀."

16004-WeaponDescTh = "ปืนกลที่เป็นอาวุธของพีน่า\n\n พีน่าระดมยิงไม่ยั้งจนเหมือนกับสาดกระสุนใส่ศัตรู นั่นคือสิ่งที่ทำให้หัวใจของเธอรู้สึกเร่าร้อน และตื่นเต้นขึ้น"
16004-ProfileIntroductionTh = "สาวน้อยจากสหพันธ์เฮียกคิยาโค ผู้ใฝ่ฝันในการเป็นนักสู้ที่กล้าหาญ\n\nเป็นคนสดใส ร่าเริง ความสนุกของเธอคือการได้ช่วยเหลือคนอื่น เธอรู้จักการต่อสู้ที่กล้าหาญผ่านการดูหนังเท่านั้น ชีวิตจริงจึงยังห่างไกลจากคำว่านักสู้ แต่เธอก็ยังเดินตามความฝัน ในการเป็นนักสู้ที่กล้าหาญอย่างจริงจัง"

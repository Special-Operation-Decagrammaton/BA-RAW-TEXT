10014-WeaponNameTh = "Izuna-Style Super Ninja Tool"
10014-WeaponDescTh = "ปืนกลมือที่อิซุนะใช้เป็นประจำ\n\nอาวุธนินจาที่ล้ำสมัย เมื่อรวมกับศาสตร์นินจาสไตล์อิซุนะ\nจะสามารถใช้ยิงระเบิด หรือใช้นวดไหล่ให้คุณครูก็ได้\nความสามารถในการใช้งานจะไร้ขีดจำกัด"
10014-ProfileIntroductionTh = "เด็กสาวจากชมรมวิจัยศาสตร์นินจา แห่งสหพันธ์เฮียกคิยาโค\n\nเธอเป็นคนร่าเริง มีชีวิตชีวา แต่การไล่ตามความฝันอันมีค่าที่คนอื่นไม่สามารถ เข้าใจได้ทำให้เธอต้องใช้ชีวิตราวกับคนโดดเดี่ยว ความฝันของเธอ คือการเป็นสุดยอดนินจาแห่งคิโวทอส เพื่อจะได้เป็นนินจาที่ยิ่งใหญ่และองอาจ เธอมุ่งมั่น ในการฝึกฝนและมักจะเรียนคุณครูว่า \"นายท่าน\" อยู่เสมอ"
10014-CharacterSSRNewTh = "ขอทำทุกอย่างเพื่อนายท่าน!"

10014-WeaponDescTw = "伊樹菜愛用的衝鋒槍。\n\n是最先進的忍具，搭配伊樹菜流忍法一起使用，可以發射煙霧彈，也可以幫主公按摩肩膀，用途無限大。"
10014-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，忍術研究部的少女。\n\n雖然是個性格開朗且充滿活力的少女，因為追求他人無法理解的夢想，至今為止都是一個人孤獨的成長。\n那個夢想就是「成為奇普托斯最強的忍者」。\n為了成為出色的忍者，今天也過著一邊稱老師為「主公！」一邊進行護衛(也可以單純說是跟著老師)的生活。"
10014-CharacterSSRNewTw = "如果是為了主公的話！"

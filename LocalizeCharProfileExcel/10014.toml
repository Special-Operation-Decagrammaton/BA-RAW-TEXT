10014-HobbyKr = "두루마리 인법 공부, 주군 호위하기"
10014-WeaponNameKr = "이즈나류 슈퍼 닌자 도구"
10014-WeaponDescKr = "이즈나가 애용하는 기관단총.\n\n최첨단 닌자 도구로, 이즈나류 인법과 연계하여 던진 연막탄을 쏘아 맞히거나 주군의 어깨를 마사지하는데 사용하는 등, 용도는 무궁무진하다."
10014-ProfileIntroductionKr = "백귀야행 학원 인법연구부 소속의 소녀.\n\n밝고 활기찬 성격을 가진 소녀지만, 남들이 이해하지 못하는 소중한 꿈을 추구해온 결과, 이제까지 외톨이로 지내왔다. 그 꿈이란 바로 키보토스 최고의 닌자가 되는 것. 오늘도 어엿한 닌자가 되기 위해, 그리고 훌륭한 닌자가 되기 위해, 이즈나는 선생님을 '주군!' 이라고 부르며 갖은 활동에 매진하고 있다."
10014-CharacterSSRNewKr = "주군을 위해서라면!"

10092-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่โยชิมิพกติดตัวไปด้วยเสมอ\n\nปกติแล้วจะใช้เป็นอาวุธเพื่อเอาชนะในศึกของหวาน เสียงของปืนสดชื่นและไพเราะไม่ต่างจากเสียงกีตาร์ของโยชิมิ"
10092-ProfileIntroductionTh = "สมาชิกชมรมของหวานหลังเลิกเรียนและมือกีตาร์ของวง <ชูการ์รัช> ที่ตั้งขึ้นมาอย่างเร่งด่วน\n\nถึงจะตั้งวงดนตรีขึ้นมาแบบสถานการณ์พาไป แต่โยชิมิก็ตั้งใจว่าถ้าจะทำแล้ว ก็ต้องทำให้จริงจัง นอกจากกีตาร์แล้ว เธอยังรับผิดชอบเรื่องไอคอน และสัญลักษณ์ของวง รวมถึงเครื่องแต่งกายของสมาชิกในวงด้วย"
10092-CharacterSSRNewTh = "ตั้งใจดูให้ดีล่ะ!\nฉันไม่เล่นให้ดูซ้ำสองหรอกนะ!"

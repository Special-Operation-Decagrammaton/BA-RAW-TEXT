100050001-WeaponDescTh = "ปืนลูกซองดีไซน์เรียบง่ายที่โฮชิโนะใช้\n\nถึงโฮชิโนะจะชอบขี้เกียจก็ตาม แต่ว่าสภาพปืนก็ยังอยู่ในสภาพสมบูรณ์เสมอ"
100050001-ProfileIntroductionTh = "เด็กสาวจอมขี้เกียจ มีตำแหน่งเป็นรองประธานนักเรียน และหัวหน้าคณะกรรมการแผนงาน ของโรงเรียนมัธยมอะบิดอส\n\nติดนิสัยพูดจาเหมือนคนมีอายุ และชอบแกล้งคนเล่นมากกว่าทำงาน เธอถูกสมาชิกคนอื่นๆ ดุอยู่บ่อยๆ แต่หากได้เริ่มภารกิจแล้ว เธอจะต่อสู้อยู่ในแนวหน้า เพื่อปกป้องคนอื่นๆ \nหลังจากตอบรับตำแหน่งประธานนักเรียน โฮชิโนะก็ค่อยๆ ร่าเริงขึ้น บางทีนี่อาจเป็นตัวตนที่แท้จริงของโฮชิโนะก็ได้"
100050001-CharacterSSRNewTh = "นี่มันเลยเวลานอนกลางวันไปแล้วนี่นา...\nฮ้าวว แต่ก็ช่วยไม่ได้นะ"

100050001-ProfileIntroductionEn = "The Abydos Student Council president and president of the Foreclosure Task Force.\n\nActs more like a tired old timer and would rather play pranks than do actual work. This often gets her into trouble with her fellow task force members, but once on a mission, she fights harder on the front lines than anyone else to keep her friends safe.\nAfter accepting the position of student council president, Hoshino has become more cheerful. Perhaps this is her true self."

100050001-WeaponDescTw = "星野愛用的簡約風格散彈槍。\n\n雖然星野本人很怠惰，不過絕不會在槍枝的整備上偷懶。"
100050001-ProfileIntroductionTw = "阿拜多斯高中所屬，阿拜多斯學生會的學生會長，同時也擔任對策委員會委員長的懶惰蟲少女。\n\n特徵是像大叔一樣的口氣，比起工作更喜歡玩樂。因此他平常老是被委員會的成員們罵，不過一旦任務開始，他就會為了保護其他成員在最前線奮戰。\n接下學生會長的職位後漸漸變得開朗。或許這才是星野本來的樣子也說不定。"
100050001-CharacterSSRNewTw = "完全沒睡到午覺耶\n算了，也沒辦法吧"

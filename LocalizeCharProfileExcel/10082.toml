10082-WeaponDescJp = "Renge's favorite rifle.\n\nA ceremonial Hyakkaryouran rifle, modified to fit her unique style. It's a trusty companion that's never failed her. Paired with her excellent marksmanship, she's a deadly threat in battle."
10082-ProfileIntroductionJp = "The Assault Squad Captain of Hyakkiyako Academy's Hyakkaryouran Resolution Council.\n\nRenge has a strong sense of justice and duty. She is often called Hyakkaryouran's Disciplinarian because of her strict teaching methods. She is soft-hearted and cares deeply for her underclassmen. She's always taken pride in her Hyakkaryouran responsibilities and has cherished every moment with the club. However, Renge sometimes regrets watching her youth pass her by while she was immersed in her duties. She's passionate about training and marksmanship, but is an idealist who dreams of a life like the ones she sees in mangas and movies."
10082-CharacterSSRNewJp = "We're the authors of my youth, Sensei!"

10082-WeaponNameTw = "百花繚亂制式步槍─青春的火花"
10082-WeaponDescTw = "蓮華愛用的步槍。\n\n蓮華依照自己的喜好對百花繚亂的制式步槍進行改造而成的物品。蓮華表示每當自己展開突擊時，這把槍都會無時無刻地守在身邊，是非常可靠的戰友。在蓮華以這把槍施展的百花繚亂射擊術面前，敵人將不復存在。"
10082-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會的突擊隊長。\n\n正義感和責任感很強。雖然疼愛後輩，卻同時也是教育時絕不手軟的百花繚亂魔鬼教官。認為百花繚亂的活動很有意義，所以並不後悔加入，但是對無法享受青春深感遺憾，因而希望體驗到漫畫或小說中常見的那種戲劇性青春。是名今天也期待著命運般的青春努力訓練、充滿夢想的少女。"
10082-CharacterSSRNewTw = "我的青春故事，就從見到師父的這一刻開始！\n嗯，就當成這樣吧！"

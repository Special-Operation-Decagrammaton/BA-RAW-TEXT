10082-StatusMessageTh = "ตอนนี้คือเวลาแห่งชีวิตวัยรุ่น!"
10082-FullNameTh = "ฟูวะ เรนเกะ"
10082-FamilyNameTh = "ฟูวะ"
10082-PersonalNameTh = "เรนเกะ"
10082-SchoolYearTh = "ชั้นปีที่ 2"

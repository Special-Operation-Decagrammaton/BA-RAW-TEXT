[translation]
10082-StatusMessageKr = "지금이 바로 청춘이야!"
10082-FullNameKr = "후와 렌게"
10082-FamilyNameKr = "후와"
10082-PersonalNameKr = "렌게"
10082-SchoolYearKr = "2학년"
10082-CharacterAgeKr = "16세"
10082-BirthdayKr = "7월 23일"
10082-HobbyKr = "라이트문예 소설 읽기, 단련 "
10082-WeaponNameKr = "백화요란 제식 소총 - 청춘의 불꽃"
10082-WeaponDescKr = "렌게가 소중히 애용하고 있는 소총.\n\n\r백화요란의 제식 소총을 렌게가 나름의 취향대로 개조하고 꾸민 물건, 렌게가 말하길 자신이 돌격할 때라면 언제나 그 곁을 지켜주는 믿음직한 전우라고. 이 총을 활용해 렌게가 펼치는 백화요란의 사격술 앞에 적은 없다."
10082-ProfileIntroductionKr = "백귀야행 학원 백화요란 분쟁조정위원회의 돌격대장.\n\n\r정의감과 책임감이 강한 성격. 후배들을 아끼지만 그만큼 교육할 때는 절대 봐주는 것이 없는 백화요란의 귀신 교관이기도 하다. 백화요란 활동에 보람을 느끼고 있기에, 입부한 것에 후회는 없지만, 그 대신 청춘을 즐기지 못한 것에 아쉬움을 가지고 있으며, 그 반동으로 만화나 소설에 나올 법한 극적인 청춘을 바라고 있다. 오늘도 운명적인 청춘을 꿈꾸며 훈련에 매진하는 꿈 많은 소녀.\r"
10082-CharacterSSRNewKr = "나의 청춘 이야기는 스승님을 만난 지금부터 시작이야!\n\r응, 그런 걸로 해두자고!"

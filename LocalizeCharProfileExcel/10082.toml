10082-HobbyTh = "อ่านไลต์โนเวล, ฝึกฝน "
10082-WeaponNameTh = "Hyakkaryouran Rifle - Blazing Youth"
10082-WeaponDescTh = "ปืนไรเฟิลที่เรนเกะใช้อย่างทะนุถนอม\n\nปืนรุ่นมาตรฐานของเฮียกกะเรียวรันที่เรนเกะปรับปรุง\nและตกแต่งตามความชื่นชอบ เรนเกะบอกว่าปืนนี้คือสหายร่วมรบ ที่น่าเชื่อถือที่อยู่ข้างๆ เธอเสมอเมื่อถึงเวลาโจมตี เมื่อใช้ปืนนี้ จะไม่มีใครสยบวิถีการยิงปืนของเธอได้"
10082-ProfileIntroductionTh = "หัวหน้าหน่วยจู่โจมจากคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน\nสหพันธ์เฮียกคิยาโค\n\nเธอเป็นคนที่มีจิตใจยุติธรรมและมีความรับผิดชอบ แม้ว่าจะเอ็นดูรุ่นน้อง แต่พอเวลาฝึกก็จะไม่ใจดีด้วยเด็ดขาด จนได้ฉายาว่าเป็นผู้ฝึกอสูรแห่ง เฮียกกะเรียวรัน เรนเกะรู้คุณค่าของหน้าที่งานของเฮียกกะเรียวรันดี เธอจึงไม่เสียใจที่เข้าชมรมมา แต่กลับรู้สึกเสียดายที่ไม่สามารถสนุกกับ\nช่วงเวลาวัยรุ่นของตัวเองได้ เธอเลยหวังว่าจะมีช่วงเวลาวัยรุ่นที่เคยเห็น\nจากในการ์ตูนหรือนิยาย และยังมีความฝันที่มุ่งมั่นในการฝึกฝนมากมาย"
10082-CharacterSSRNewTh = "เรื่องราววัยรุ่นของฉันเริ่มขึ้นนับจากนี้ที่ได้เจอคุณครู!\nอื้ม เอาเป็นแบบนี้แล้วกัน!"

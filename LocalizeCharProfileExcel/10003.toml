10003-WeaponDescTh = "ปืนไรเฟิลที่ฮิฟุมิมักจะพกไปยังสถานที่ต่างๆ เสมอ\n\nปืนเล็กกะทัดรัดน่ารักสีชมพูหวานแหววเป็นสิ่งที่ขาดไม่ได้\nในตอนที่ฮิฟุมิออกไปข้างนอก"
10003-ProfileIntroductionTh = "สาวน้อยผู้อ่อนโยน จากชมรมชั้นเรียนเสริม โรงเรียนสามัญทรีนิตี้\n\nแม้รูปร่างหน้าตา และผลงานของเธอไม่โดดเด่นเท่าไหร่ แต่เธอก็เป็นที่รู้จัก ด้วยนิสัยที่อ่อนโยน คอยรับฟังเรื่องราว และความกังวลของคนรอบข้างอยู่เสมอ แต่บางครั้งบรรยากาศก็ชอบพาให้ เธอก่อปัญหาโดยไม่ได้ตั้งใจ"
10003-CharacterSSRNewTh = "จากนี้ไปฉันจะสู้!\nสู้ไปกับคุณครูค่ะ!"

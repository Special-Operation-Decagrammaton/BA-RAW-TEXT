10089-ProfileIntroductionTh = "ประธานของหน่วยรับจ้างสารพัด 68 ที่มาทำภารกิจแฝงตัว\n\nแม้จะเป็นชุดในสไตล์ที่ไม่ได้หยิบมาใส่บ่อยๆ แต่ถ้าดูผ่านๆ จะเห็นว่าแสดงได้\nอย่างแนบเนียนมาก แม้อารุจะดีใจที่ได้ทำงานร้ายๆ หลังจากห่างหายไปนาน แต่เธอก็ไม่ได้แสดงความดีใจนี้ออกมาทางสีหน้าแต่อย่างใด"
10089-CharacterSSRNewTh = "ในที่สุดวันนี้ก็มาถึงสินะ\nจับตาดูให้ดีๆ ละ"

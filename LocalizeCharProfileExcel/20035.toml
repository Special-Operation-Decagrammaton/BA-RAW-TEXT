20035-ProfileIntroductionKr = "언제나 어디서나 잘 자는 수행을 멈추지 않는 수행부의 부장님.\n\n\r수학여행을 맞아 백귀야행을 안내하는 가이드로서의 역할을 시작했지만, 수면에 대한 수행 역시 놓치고 싶지 않은듯 하다. 때로는 졸면서, 때로는 날카롭게 핵심을 찌르면서, 그녀는 어떻게든 양쪽 모두를 충실하게 이행한다."

20000-ProfileIntroductionTh = "สมาชิกชมรมวิศวกรรม โรงเรียนวิทย์มิลเลเนียม\n\nเมื่อเทียบกับนักเรียนคนอื่นแล้ว ฮิบิกิเป็นคนไม่ค่อยเข้าสังคม และพูดไม่ค่อยเก่ง เธอเกิดมาพร้อมกับพรสวรรค์ด้านวิศวกรรม จึงประดิษฐ์อุปกรณ์ที่น่าตื่นตาตื่นใจได้หลายอย่าง สิ่งประดิษฐ์ของเธอ ส่วนใหญ่เป็นงานชั้นเยี่ยมไร้ที่ติ แถมยังชอบใส่ฟังก์ชั่นแปลกๆ เข้าไปในสิ่งประดิษฐ์ จนทำให้ผู้ใช้งานสับสนอยู่บ่อยๆ"
20000-CharacterSSRNewTh = "มีอุปกรณ์อะไรให้ปรับปรุงมั้ย?"

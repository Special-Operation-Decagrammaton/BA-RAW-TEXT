20000-ProfileIntroductionTw = "千年科學學園所屬，工程師部的成員。\n\n雖然稍微缺乏社交能力且說話較木訥，但他與生俱有的工學才能相當突出，發明了不少神奇的物品。\n他的發明幾乎毫無缺點，全部都被稱為傑作也不為過。但每個作品一定會帶有一個奇怪的功能，經常讓使用者不知所措。"

20000-ProfileIntroductionKr = "밀레니엄 학원, 엔지니어부의 부원.\n\n다른 학생들에 비해 사교성이 부족하고 말투도 어눌한 편이지만, 타고난 공학적 재능을 바탕으로 여러 가지 신기한 물건들을 발명하고 있다. 그녀의 발명품은 대부분 흠잡을 곳 없는 걸작이지만, 이상한 기능이 꼭 하나씩 포함되어 사용자를 당혹게 만들곤 한다."

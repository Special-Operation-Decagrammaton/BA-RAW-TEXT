20046-WeaponDescKr = "니야가 항상 소지하고 다니는 권총.\n\n\r언제나 가장 잘 보이는 곳에 비치할 뿐, 직접 쏘거나 하는 모습을 본 사람은 극히 드물다."
20046-ProfileIntroductionKr = "백귀야행 연합학원 음양부의 부장.\n\n\r외부인에게는 학생회장으로 알려졌지만, 연합학원의 구조상 훨씬 복잡한 사정으로 묶여 있다. 그 때문에 <일하지 않는 부장>으로 더욱 잘 알려져 있다……고 변명하나, 일하기 싫어하는 성격은 천성이다. 언제나 흥미 본위로 사건을 저지르는 듯이 보이지만, 그 이면에는 남에게 밝히지 않는 속내가 있는 듯하다."
20046-CharacterSSRNewKr = "아~ 역시, 안 하면 안 되겠죠~?\n\r네~ 네~ 일하겠습니다~"

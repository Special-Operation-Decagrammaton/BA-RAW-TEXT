20046-WeaponDescTw = "仁耶總是隨身攜帶的手槍。\n\n雖然總是放在最顯眼的位置，但實際看過他開槍的人卻少之又少。"
20046-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，陰陽部的部長。\n\n雖然在外人眼中是學生會長，不過由於聯合學園的架構相當複雜，實際牽扯的內情遠比表面來的多。因此，他更廣為人知的稱號是「不工作的部長」……雖然如此為自己辯解，其實不愛工作是他與生俱來的天性。儘管看似總是因興趣惹事生非，其背後似乎隱藏著不願吐露的真實想法。"
20046-CharacterSSRNewTw = "啊～果然不做不行對吧～？\n好好好～我會工作的啦～"

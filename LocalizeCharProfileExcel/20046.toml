20046-WeaponDescTh = "ปืนพกคู่ใจของนิยะ\n\nถูกวางไว้ในที่ที่มองเห็นได้ชัดเจนที่สุด แต่มีเพียงไม่กี่คนเท่านั้นที่ได้เห็นมันถูกใช้งานโดยตรง"
20046-ProfileIntroductionTh = "หัวหน้าชมรมหยินหยางแห่งสหพันธ์เฮียกคิยาโค\n\nแม้คนภายนอกจะรู้จักนิยะในตำแหน่งประธานนักเรียน แต่เนื่องจาก\nโครงสร้างของโรงเรียนที่เป็นสหพันธ์ เธอจึงตกอยู่ในสถานการณ์\nสุดซับซ้อน ด้วยเหตุนี้นิยะจึงเป็นที่รู้จักมากกว่าในฐานะ <หัวหน้าที่\nไม่ทำการทำงาน>... แต่ต่อให้แก้ตัวอย่างไร นิยะก็ต้องยอมรับว่า\nเธอไม่ชอบทำงานจริงๆ นิยะดูเป็นคนที่ชอบก่อเรื่องตามความอยากรู้\nอยากเห็นของตัวเอง แต่เบื้องหลังทั้งหมดนั้นนิยะเหมือนจะมีเจตนาที่\nไม่เปิดเผยให้ใครรู้"
20046-CharacterSSRNewTh = "อ้อ~ ยังไงก็ต้องทำใช่มั้ยคะ~?\nค่า~ ค่ะ~ ทราบแล้วค่ะ~"

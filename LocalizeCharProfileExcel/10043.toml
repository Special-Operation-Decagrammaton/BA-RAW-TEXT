10043-WeaponDescKr = "와카모가 언제나 애용하는 소총.\n\n뜨거운 여름을 맞이해 들뜨고 고양된 와카모의 기분에 맞춰, 그 총구는 방해하는 모든 것들을 향해 여름 무더위보다도 뜨겁고 격렬한 진홍빛 불꽃을 내뿜는다."
10043-ProfileIntroductionKr = "<일곱 죄수> 중 한 명으로, 여름을 맞이하여 보다 화려한 꽃처럼 피어난 소녀.\n\n그녀가 수영복 차림으로 바다를 찾은 건 어디까지나 선생님에게 보여주기 위해서이며, 얼굴에 미소를 띠고 있는 건 이 여름 바다에서 우연히 선생님을 발견했기 때문이다. 이처럼 뜨거운 여름 햇살 아래, 그 뜨거움에 지지 않을 만큼 선생님을 향한 정열적인 어프로치가 시작된, 언제나 변함없이 연심에 전력투구 중인 소녀."
10043-CharacterSSRNewKr = "후후훗, 이 와카모, 여기에 찾아왔답니다.\n다.앙.신♡"

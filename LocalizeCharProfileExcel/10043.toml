10043-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，「七罪人」之一，為了迎接夏天，綻放得更加艷麗的少女。\n\n之所以穿泳裝到海邊，只是為了讓老師看見。之所以露出笑容，是因為和老師的相遇。無論夏天的豔陽有多炎熱，都會以不輸夏天的熱情向老師獻殷情。在戀情方面依舊比任何人都全力以赴的少女。"

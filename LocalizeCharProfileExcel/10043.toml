10043-ProfileIntroductionEn = "One of the Seven Prisoners. A girl who blooms like a colorful flower in summer.\n\nShe arrived on the beach in her swimsuit to show it off to Sensei and ended up with a huge smile on her face because she ran into Sensei just in time. Her passion toward Sensei is as strong as the summer sun. She always tries her best to get closer to them."
10043-CharacterSSRNewEn = "Heeheehee! I came here to find you, darling! ♥"

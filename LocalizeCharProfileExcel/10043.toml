10043-WeaponDescTh = "ปืนไรเฟิลที่วาคาโมะใช้\n\nปืนที่ปล่อยเปลวไฟสีแดงชาดร้อนระอุยิ่งกว่าความร้อน\nในฤดูร้อนเพื่อกำจัดสิ่งกีดขวางทุกชนิด เหมาะกับ\nวาคาโมะที่อารมณ์พุ่งพล่านในฤดูร้อน"
10043-ProfileIntroductionTh = "หนึ่งใน <เจ็ดอาชญากร> หญิงสาวที่แบ่งบานงดงามราวกับดอกไม้หลากสีสัน ในฤดูร้อน\n\nวาคาโมะใส่ชุดว่ายน้ำไปที่ทะเลเพื่อให้คุณครูได้ชื่นชม การที่เธอมีรอยยิ้ม ที่สดใสเสมอเป็นเพราะเธอได้มาพบกับคุณครูที่ชายหาดได้ทันเวลา แม้แสงแดดในฤดูร้อนจะร้อนระอุแค่ไหน ก็ไม่อาจเทียบเท่าความรู้สึกของวาคาโมะ ที่มีต่อคุณครูได้ไม่ว่าเมื่อไรเธอก็เป็นสาวน้อยที่ทุ่มเทเพื่อความรักอย่างเต็มที่เสมอ"
10043-CharacterSSRNewTh = "ฮุฮุฮุ... วาคาโมะผู้นี้ มาหาคุณท่านที่นี่แล้วค่ะ\nคุณ.ท่าน.♡"

10045-WeaponDescTh = "ปืนลูกซองของโฮชิโนะที่ได้รับการปรับแต่งให้เหมาะสม\nกับการใช้งานที่ทะเลฤดูร้อน\n\nได้รับการดูแลอย่างดีสำหรับการใช้งานต่างๆ เช่น ไล่แมลงตามทางเดินในป่า และอื่นๆ"

20039-ProfileIntroductionTw = "山海經高級中學所屬，掌管學園所有事務的學生會「玄龍門」的會長，或稱門主。\n\n老派而具威嚴的說話方式，加上帶有神祕感的形象，是名散發著難以接近氣質的少女。本人則十分善用這種形象來執行職務。\n其「變裝暗訪」鮮少有人能夠察覺，不過對知情者來說反而是另一種看點。"
20039-CharacterSSRNewTw = "來，讓妾身看看汝的能耐吧？"

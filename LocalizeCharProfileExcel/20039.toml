20039-WeaponDescKr = "키사키가 애용하는 기관단총.\n\n\r상대를 알고 자신을 아는 것으로부터 모든 것이 시작된다고, 그녀는 생각하고 있다."
20039-ProfileIntroductionKr = "산해경 학원의 모든 일을 총괄하는 학생회, <현룡문>의 회장, 혹은 문주.\n\n\r고풍스러우면서도 위압감이 느껴지는 말투와 어딘가 신비롭게까지 느껴지는 인상이 어우러져, 좀처럼 다가가기 힘든 분위기를 풍기는 소녀. 본인은 오히려 그런 이미지를 직무 수행에 활용하고 있는 듯이 보이기도 한다.\r좀처럼 눈치채는 사람이 없는 그녀의 '변장 암행'은, 그 실체를 아는 사람들에게는 또 하나의 구경거리라고도 한다. "
20039-CharacterSSRNewKr = "자아, 내게 무엇을 보여 주겠느냐?"

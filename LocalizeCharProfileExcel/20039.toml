20039-WeaponDescTh = "ปืนกลมือที่คิซากิใช้เป็นประจำ\n\nเจ้าของอาวุธชิ้นนี้เชื่อว่าทุกอย่างเริ่มต้นจากการรู้จัก\nตนเองและฝ่ายตรงข้าม"
20039-ProfileIntroductionTh = "ประมุขของ <มังกรดำ> สภานักเรียนที่ดูแลงานทั้งหมดของซานไห่จิง\n\nเธอเป็นเด็กสาวผู้มีรูปลักษณ์ภายนอกลึกลับ ทั้งยังพูดด้วยสำเนียง\nแบบโบราณแต่น่าเกรงขาม จึงดูยากต่อการเข้าหา แต่เจ้าตัวมองว่า\nภาพลักษณ์เช่นนี้เหมาะสมแล้วกับการปฏิบัติหน้าที่ประมุข\nเธอสามารถปลอมตัวเพื่อปฏิบัติหน้าที่โดยไม่มีใครสังเกตได้ แต่สำหรับคนที่ดูออกก็จะเฝ้าดูอย่างยิ้มแย้ม"
20039-CharacterSSRNewTh = "เอาละ จะแสดงฝีมืออะไรให้เราดูเล่า?"

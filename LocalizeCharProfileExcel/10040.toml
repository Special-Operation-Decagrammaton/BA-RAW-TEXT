10040-HobbyKr = "나무로 변장하기, 남몰래 숨죽이기"
10040-WeaponNameKr = "츠쿠요류(?) 기관단총"
10040-WeaponDescKr = "츠쿠요가 소중히 여기고 있는 기관단총.\n\n총에 그리 익숙지 않은 츠쿠요를 위해, 미치루와 이즈나가 직접 나서서 조금씩이지만 겉을 꾸미거나 개조를 도와준 물건. 그렇기에 츠쿠요에게 있어선 무엇과도 바꿀 수 없는 귀중한 보물이다."
10040-ProfileIntroductionKr = "백귀야행 학원 인법연구부 소속의 소녀.\n\n어렸을 때부터 커다란 덩치로 놀림받아온 탓에, 지금은 틈만 나면 어딘가에 숨으려고 드는 소녀. 언제나 우물쭈물하면서 타인과 제대로 대화도 나누지 못하는 소심한 츠쿠요지만, 정작 한 가지 결심하면 앞뒤 가리지 않고 해내는 실행력 또한 가지고 있다. 닌자에 대해선 잘 모르지만, 자신을 인정해준 미치루, 그리고 이즈나와 함께 인법연구부 활동에 매진하고 있다."
10040-CharacterSSRNewKr = "이, 이런 커다랗기만 한 저라도……\n잔뜩 노력해서, 선생님께 도움이 되고 싶어요!"

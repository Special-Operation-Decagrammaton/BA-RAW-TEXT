[translation]
10040-StatusMessageKr = "얼른 어엿한 닌자가 될 수 있기를…."
10040-FullNameKr = "오노 츠쿠요"
10040-FamilyNameKr = "오노"
10040-PersonalNameKr = "츠쿠요"

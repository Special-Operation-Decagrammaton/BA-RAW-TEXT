10040-WeaponDescTw = "月夜很珍惜的衝鋒槍。\n\n為了不是很會用槍的月夜，三千留和伊樹菜幫忙做了許多裝飾和改造的槍械。對月夜來說是無可取代的寶物。"
10040-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，忍術研究部的成員。\n\n從小就因為體型而被嘲笑，造成他現在只要有機會就會設法躲起來。膽小的他總是猶豫不決，幾乎無法與人交流，然而只要對一件事下定決心，他就會毫不猶豫地執行。雖然對忍者還不太了解，依然與認可他的三千留、伊樹菜一起埋首於忍術研究部的活動之中。"
10040-CharacterSSRNewTw = "雖然是，只有高大的我……\n不過會為了可以幫上老師，盡全力加油……！"

16001-ProfileIntroductionTw = "千年科學學園所屬，祕密組織「C&C」的特務。\n\n代號為「Zero One」，是透過卓越且如同動物般的感覺與直覺度過無數難關的老手。\n雖然經常在執行任務時隨便相信他人而自曝身分，或者把可疑的物品全部摧毀之類令人難以理解的行動，但最終總是能拿出好成果。"

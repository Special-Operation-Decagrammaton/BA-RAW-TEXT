16001-ProfileIntroductionEn = "An agent of C&C, a secret organization of the Millennium School.\n\nArmed with brutal instinct and intuition, Asuna is a seasoned veteran who has successfully overcome countless challenges under the call sign Zero-One. She is also something of a loose cannon, doing things such as revealing her identity on secret missions and smashing anything that looks suspicious without a second thought. However, she always manages to produce great results in the end."

16001-WeaponDescKr = "아스나가 사용하는 돌격소총.\n\n무언가 떠들썩하고 즐거울 것 같은 이름이지만, 그 이유에 관해서는 어째선지 잊어버린 듯하다."
16001-ProfileIntroductionKr = "밀레니엄 학원의 비밀 조직, C&C의 에이전트.\n\n콜사인은 제로원으로 탁월한 동물적 감각과 직관으로 수많은 문제를 헤쳐나온 베테랑이다. 임무 중 멋대로 사람을 믿고 정체를 드러내거나, 의심되는 물건은 모조리 부수는 등 이해할 수 없는 행동을 자주 저지르지만, 성과는 언제나 좋은 편이다."

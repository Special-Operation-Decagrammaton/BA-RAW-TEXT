16001-ProfileIntroductionTh = "ตัวแทนขององค์กรลับ \"C&C\" แห่งโรงเรียนวิทย์มิลเลเนียม\n\nนักสู้ที่มีสัญชาตญาณ และประสาทสัมผัสดีเกินมนุษย์ เจ้าของรหัสประจำตัวซีโร่วัน เธอมักจะทำสิ่งที่ไม่อาจเข้าใจได้ระหว่างทำภารกิจ เช่น เชื่อใจคนง่าย และเผยตัวตนออกมาตามอำเภอใจ หรือทำลายสิ่งของน่าสงสัย แต่ภารกิจของเธอก็สำเร็จอยู่ตลอด"

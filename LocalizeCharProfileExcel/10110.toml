10110-WeaponDescEn = "Seia's favorite pistol.\n\nIt has an elegant and stable design, as expected of a Tea Party member. It's always loaded, just like Seia, who's not hesitant to spit harsh words when the situation calls for it."
10110-ProfileIntroductionEn = "A member of the Tea Party, from Trinity General School, and leader of Sanctus.\n\nOthers find her pedantic and unpredictable. A bit capricious and impulsive, rather like a noble. Following her recovery from an assassination attempt, she's shown more of her stubborn and childish side."

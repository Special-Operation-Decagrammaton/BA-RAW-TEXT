10110-WeaponDescTh = "ปืนพกที่เซอาใช้เป็นประจำ\n\nมีดีไซน์ที่แสดงออกถึงความมั่นคงและความสง่างาม สมกับที่เป็นอาวุธของสมาชิกสภาน้ำชา บรรจุกระสุนไว้พร้อมเสมอ เหมือนกับเซอาที่ไม่ลังเลที่จะใช้คำพูดเสียดแทงบางโอกาส"
10110-ProfileIntroductionTh = "สมาชิกสภาน้ำชาและหัวหน้ากลุ่ม <ซางตุส> หนึ่งในกลุ่มพันธมิตรที่\nประกอบกันเป็นโรงเรียนสามัญทรีนิตี้\n\nมักถูกคนรอบข้างมองว่าเป็นคนที่ชอบอวดภูมิความรู้และเข้าใจได้ยาก มีบุคลิกคล้ายคนชั้นสูงที่ทำตามอำเภอใจตัวเองเล็กน้อย ตั้งแต่หายจากอาการป่วยเธอก็มักจะแสดงพฤติกรรมดื้อรั้น และขี้เล่นเหมือนเด็กมากขึ้นกว่าเดิม"
10110-CharacterSSRNewTh = "ทุกเส้นทางล้วนเชื่อมต่อกันเป็นหนึ่งเดียวค่ะ"

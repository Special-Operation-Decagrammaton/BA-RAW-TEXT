10110-WeaponDescTw = "聖亞愛用的手槍。\n\n設計突顯著身為茶會成員的氣質與安穩。如同隨時都能毫不猶豫地給出犀利批判的聖亞一般，總是處於上膛狀態。"
10110-ProfileIntroductionTw = "三一綜合學園所屬，擔任構成三一的學生聯盟「聖靈派」的領袖。\n\n在旁人眼中是個衒學且難以捉摸，就像任性貴族一般的人。在恢復健康後似乎變得更加固執，經常露出孩子氣的一面。"

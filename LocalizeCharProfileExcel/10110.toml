10110-WeaponDescKr = "세이아가 애용하는 권총.\n\n티파티의 멤버다운 기품과 안정감이 돋보이는 디자인이다. 때로는 독설도 주저하지 않는 세이아처럼, 항시 장전된 상태."
10110-ProfileIntroductionKr = "트리니티 종합학원을 구성하고 있는 티파티의 일원이자 <상투스>의 수장.\n\n주변에서는 현학적이고 종잡기 어려운 사람으로 여겨지고, 조금은 제멋대로인 귀족과 같은 면모가 있다. 건강이 돌아온 이후로는 전보다 조금 더 고집스럽고 장난기 있는 어린아이 같은 모습도 종종 보인다."
10110-CharacterSSRNewKr = "이렇듯, 모든 길은 하나로 이어지게 마련입니다."

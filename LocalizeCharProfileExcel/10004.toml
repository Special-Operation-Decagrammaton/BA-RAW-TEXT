10004-WeaponDescJp = "A multipurpose machine gun Hina wields as naturally as any limb.\n\nBlows away school rule violators and degenerates with its ruthlessly destructive power."
10004-ProfileIntroductionJp = "Head prefect of the Gehenna Academy Prefect Team.\n\nSomewhat aloof and considers almost everything a bother and a chore, but is still every bit the head prefect of the Prefect Team when it comes to rules and regulations.\nHer general response to most things is \"Ugh, so annoying,\" but she's ruthless and decisive when it comes to matters on the battlefield.\nFeared and respected by the enemies of Gehenna."
10004-CharacterSSRNewJp = "It's annoying, but I should take care of it.\nThat's my job."

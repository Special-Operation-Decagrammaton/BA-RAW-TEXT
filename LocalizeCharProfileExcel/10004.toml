10004-WeaponNameKr = "종막의 디스트로이어"
10004-WeaponDescKr = "히나가 수족처럼 다루는 다목적 기관총.\n\n\r교칙을 어기고 풍기를 어지럽히는 것은 전부 파괴해버리는 무자비함을 자랑한다."
10004-ProfileIntroductionKr = "게헨나 학원의 선도부장.\n\n\r평소에는 만사를 귀찮아하는 게으름뱅이 소녀이지만, 교칙과 관련된 문제에서는 엄격한 선도부장의 면모를 보인다. '귀찮아'라는 말을 입버릇처럼 달고 살지만, 전장에서는 조금의 망설임도 없이 상황을 판단한다. 때문에 게헨나를 적대하는 조직들은 그녀의 등장을 가장 두려워한다."
10004-CharacterSSRNewKr = "귀찮지만 할 일은 해야겠지.\n\r그게 내 의무니까."

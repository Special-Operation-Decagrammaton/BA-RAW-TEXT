10004-WeaponDescTw = "陽奈視為自身手腳般的機關槍。\n\n只要看到違反校規、擾亂風紀的事物就會以無慈悲的破壞力將其剷除。"
10004-ProfileIntroductionTw = "格黑娜學園所屬，所有人都害怕的風紀委員長。\n\n雖然基本上是個怕麻煩少女，但是面對校規相關的問題時就會變得嚴格。\n嘴上說著「真麻煩」，在戰場上卻能毫不迷惘、冷靜且迅速地判斷情況並採取行動。\n戰鬥能力相當驚人，因此和格黑娜敵對的組織比什麼都害怕他的登場。"
10004-CharacterSSRNewTw = "雖然很麻煩，不過必須做該做的事\n因為那就是我的義務"

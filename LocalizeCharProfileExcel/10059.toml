10059-WeaponDescKr = "미카가 애용하는 기관단총.\n\n\r원래는 특별할 것 없는 평범한 트리니티제 기관단총이지만, 미카가 평소 여러모로 정성 들여 꾸민 덕에, 지금은 어두운 곳이라면 별처럼 반짝이는 특별한 외관을 갖게 된 물건. 언제나 어디서나 미카의 손이 되어 활약한다."
10059-ProfileIntroductionKr = "트리니티 종합학원을 구성하고 있는 학생 연합 <파테르>의 전 수장이었던 소녀.\n\n\r전 티파티 멤버 중 한 명으로, 또 다른 티파티의 수장인 나기사와는 오랫동안 함께 자라온 소꿉친구 관계. 하지만 정치적으로 대립하고 있는 입장이기에, 공사 구분은 확실하게 하고 있다. 늘 즐겁다는 듯이 웃으며 발랄하고 쾌활한 모습을 보여주는 그녀이지만, 그 이면에는 남들에게 섣불리 말하지 못하는 고민을 안고 있기도 하는 등. 그 속을 쉬이 알 수 없는 소녀."
10059-CharacterSSRNewKr = "응! 오래 기다렸지?\n\r이제 내가 활약할 차례인 거네☆"

10059-WeaponDescTw = "彌香愛用的衝鋒槍。\n\n在平凡無奇的三一製衝鋒槍上，彌香用心加上了裝飾。現在有著能在黑暗中如星星般閃爍的特別外觀。隨時隨地都會為彌香大顯身手。"
10059-ProfileIntroductionTw = "三一綜合學園所屬，擔任構成三一的學生聯盟「聖父派」前任領袖的少女。\n\n原本是茶會的一員，和主席渚是青梅竹馬。然而由於政治上屬於對立立場，在公私方面區分得很清楚。\n雖然總是露出開心的笑容，展現天真無邪的樣子，但心裡似乎有著無法與他人訴說的煩惱。"
10059-CharacterSSRNewTw = "嗯，讓你久等了！\n今後無論什麼事都包在我身上吧☆"

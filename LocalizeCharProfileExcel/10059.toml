10059-WeaponDescJp = "Mika's favorite submachine gun.\n\nIt was originally an ordinary Trinity-made submachine gun before Mika decorated it with love. Now, it shines like a star in the dark sky. You can be sure it's had a role in everything Mika does."
10059-ProfileIntroductionJp = "The former leader of Pater, one of the allied factions that makes up Trinity General School.\n\nA former Tea Party member and a childhood friend of Nagisa, another member of the Tea Party. When the two clash politically, she draws a clear line between their public disagreements and their private friendship.\nShe seems lively and cheerful, and she's never without a smile. However, her demeanor hides worries that she can't reveal, making her something of an enigma."

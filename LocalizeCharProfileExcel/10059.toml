10059-WeaponDescTh = "ปืนกลมือที่มิกะใช้เป็นประจำ\n\nปืนกลมือธรรมดาที่ผลิตโดยโรงเรียนทรีนิตี้ แต่เพราะมิกะ\nเอาของกระจุกกระจิกมาตกแต่งอย่างใส่ใจ จนมีรูปลักษณ์\nพิเศษและส่องประกายเหมือนดวงดาวแม้อยู่ในที่มืดมิด\nไม่ว่าที่ไหนและเมื่อไรก็เหมาะสำหรับให้มิกะใช้งานเสมอ"
10059-ProfileIntroductionTh = "เด็กสาว อดีตหัวหน้ากลุ่ม <ปาเตอร์> หนึ่งในสภานักเรียนของโรงเรียน\nสามัญทรีนิตี้\n\nมีความสัมพันธ์เป็นเพื่อนสมัยเด็กที่โตมาด้วยกันกับนางิสะ สมาชิก\nสภาน้ำชา แต่เนื่องจากสถานการณ์ที่ต้องรับมือด้านการเมืองต่างๆ\nทำให้พวกเธอแยกเรื่องความสัมพันธ์ส่วนตัวกับเรื่องงานออกจากกัน\nอย่างเด็ดขาด เธอมักจะมีรอยยิ้มที่สดใส และมีท่าทางสบายๆ ที่ดูไม่\nจริงจังอยู่เสมอ แต่ในอีกด้านหนึ่ง เธอก็มีเรื่องกังวลต่างๆ ที่บอกใคร\nออกมาตรงๆ ไม่ได้ และเก็บอยู่ภายในใจ เป็นเด็กสาวที่ไม่อาจรู้ได้ว่า\nภายในใจเธอคิดอะไรอยู่"
10059-CharacterSSRNewTh = "หืม? รอนานรึเปล่า?\nตอนนี้ถึงตาฉันแสดงฝีมือแล้วสินะ☆"

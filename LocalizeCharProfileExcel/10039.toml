10039-ProfileIntroductionTw = "SRT特殊學園所屬，RABBIT小隊的狙擊手。\n\n因為具有狙擊手的才能而進入SRT特殊學院就讀，然而學園卻突然被關閉。現在過著和小隊成員們一起在公園露宿的生活。存在感薄弱，雖然對狙擊任務很有幫助，但不僅是敵人，就連隊友也時常忘記他的存在。\n代號為「RABBIT4」。"

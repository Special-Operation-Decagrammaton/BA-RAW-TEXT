10039-WeaponDescTh = "ปืนไรเฟิลมาตรฐานที่มิยุได้รับจากสถาบัน SRT\n\nปืนที่ถูกสร้างขึ้นมาให้มีอัตราความแม่นยำ และมีอัตราการยิงที่รุนแรงอย่างน่าอัศจรรย์"
10039-ProfileIntroductionTh = "สไนเปอร์ของกองทหาร RABBIT แห่งสถาบันพิเศษ SRT รหัสประจำตัว <RABBIT 4>\n\nมิยุสมัครเข้าเรียนที่สถาบันพิเศษ SRT ด้วยพรสวรรค์ที่โดดเด่นในฐานะ\nสไนเปอร์ แต่สถาบันพิเศษ SRT ปิดตัวลงอย่างกะทันหัน ตอนนี้เธอจึง\nไร้ที่อยู่ และไปอาศัย อยู่ที่สวนสาธารณะกับสมาชิกคนอื่นๆ\nเนื่องจากตัวตนของเธอมักจืดจางในสายตาคนอื่นๆ จึงทำให้เธอสามารถ\nปฏิบัติงานในฐานะสไนเปอร์ได้อย่างดี แต่ในบางครั้งนอกจากศัตรูจะไม่\nสังเกตเห็นเธอแล้ว สมาชิกคนอื่นๆ ก็เผลอลืมเธอไปบ้างเช่นกัน"
10039-CharacterSSRNewTh = "ระ...ระ...RABBIT 4 ค่ะ เรียกฉันเหรอคะ...?"

10039-WeaponDescKr = "미유가 SRT 특수학원에서 지급받은 제식 소총.\n\n강력한 한 발을 위해 정밀하게 가공되어 명중률이 매우 높다."
10039-ProfileIntroductionKr = "SRT 특수학원 RABBIT 소대의 저격수. 콜사인은 <RABBIT 4>.\n\n타고난 저격수의 재능을 살려 SRT 특수학원에 입학하였으나, 갑작스럽게 학원이 폐쇄되며 현재는 공원에서 소대원들과 함께 노숙을 하고 있다. 존재감이 약하기 때문에 저격 임무 중에 기척을 지우는 데에는 능하지만, 적뿐만 아니라 아군조차도 그녀의 존재를 잊어버릴 때가 많다."
10039-CharacterSSRNewKr = "여, 여기는 RABBIT 4. 부, 부르셨나요……?"

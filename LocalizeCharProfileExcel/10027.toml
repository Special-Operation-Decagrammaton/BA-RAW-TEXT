10027-ProfileIntroductionTh = "สายลับของ C&C ที่เข้าร่วมปฏิบัติการในแนวหน้าเป็นครั้งแรก\n\nเธอมุ่งมั่นที่จะปฏิบัติภารกิจให้สำเร็จ โดยไม่รู้สึกกระอักกระอ่วนกับชุดที่ใส่ หรือแม้แต่สายตาของคนรอบข้างเลย\nแต่ทว่าการได้รับความสนใจจากคนรอบข้างมากขึ้นกว่าปกติ ทำให้เธอรู้สึกประหม่าเล็กน้อย"
10027-CharacterSSRNewTh = "ไม่ว่าจะภารกิจไหนก็ไม่มีปัญหา"

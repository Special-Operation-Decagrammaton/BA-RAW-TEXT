10123-WeaponDescKr = "세이아가 애용하는 권총.\n\n\r옷차림이 가벼워졌다 한들 특유의 화법도, 화력도 무뎌지지 않았다. 일신한 차림새만큼이나, 과감한 파지법을 선보이고 있다."
10123-ProfileIntroductionKr = "유유자적한 여름휴가를 보내고 있는 티파티의 일원이자 <상투스>의 수장.\n\n\r전환이 빠른 성격 덕분에, 평소 티파티로서의 책임과 마음가짐에서 벗어나, 완전히 휴양 상태로 돌입했다. 평소에도 그렇지만, 지금은 특히나 자신을 억제하지 않아, 각종 기행을 선보이며 주변 사람들을 놀라게 하고 있다."
10123-CharacterSSRNewKr = "후후. 달라진 것은, 겉모습만이 아닐 겁니다."

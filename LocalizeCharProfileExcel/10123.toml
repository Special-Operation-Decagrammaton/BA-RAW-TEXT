10123-WeaponDescTw = "聖亞愛用的手槍。\n\n即使換上輕便的服裝，其獨特的說話方式與火力依舊銳利。就連持槍姿勢也與煥然一新的服裝同樣顯得更加大膽。"
10123-ProfileIntroductionTw = "正在享受悠哉暑假的三一綜合學園所屬、茶會的一員、「聖靈派」的領袖。\n\n由於性格轉換相當迅速，已暫時拋開平時作為茶會成員的責任與心態，完全進入了渡假模式。儘管平常也是如此，但在放飛自我時所展現的驚人舉動，依舊讓周圍的人感到訝異。"
10123-CharacterSSRNewTw = "呵呵，有所改變的並不只有外表而已哦"

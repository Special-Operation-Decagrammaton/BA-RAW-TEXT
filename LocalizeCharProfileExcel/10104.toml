10104-WeaponDescKr = "레이죠가 사용하는 자동소총.\n\n\r총과 권의 조화를 위해, 그녀 나름의 개량이 더해져 있다. 사격 실력은…… 끊임없는 훈련을 통해, 개선되었다고 한다"
10104-ProfileIntroductionKr = "산해경의 상인 연합 동아리인 <현무상회> 본점의 매니저이자, 그 상회장을 호위하는 직속 경호원.\n\n\r상당한 쿵후 매니아로, 한 유명 무술가의 어록과 행동을 상황과 관계없이 따라 하려는 기행을 보이기도 한다. 쿨하고 냉정해 보이는 외관과는 달리, 상황에 따라서는 뜨거운 혈기를 가감 없이 내보이기도 하는 소녀."
10104-CharacterSSRNewKr = "혹시, 쿵후나 무술에 관심이 있으신가요?"

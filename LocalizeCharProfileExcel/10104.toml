10104-WeaponDescTh = "ปืนไรเฟิลอัตโนมัติที่เรย์โจวใช้\n\nได้รับการปรับแต่งตามแบบฉบับของเรย์โจว์เพื่อความ\nกลมกลืนระหว่างปืนและกำปั้น ส่วนทักษะการยิงนั้น...\nเจ้าตัวบอกว่าพัฒนาขึ้นแล้วด้วยการฝึกฝนที่ไม่หยุดหย่อน"
10104-ProfileIntroductionTh = "ควบตำแหน่งผู้จัดการของสำนักงานใหญ่ <ย่านการค้าเทพเต่าดำ> ชมรมสมาคมผู้ค้าของซานไห่จิง และผู้พิทักษ์ประธานย่านการค้าแห่งนี้\n\nเธอคลั่งไคล้กังฟูมาก จึงมักจะเลียนแบบคำพูดและพฤติกรรมของ\nนักสู้ที่มีชื่อเสียงโดยไม่คำนึงถึงสถานการณ์ แม้ภายนอกจะดูเท่\nและเย็นชา แต่เธอก็เป็นเด็กสาวที่กระตือรือร้นและเลือดร้อนได้\nตามสถานการณ์ที่เผชิญ"
10104-CharacterSSRNewTh = "สนใจในกังฟูหรือศิลปะการป้องกันตัวมั้ยคะ?"

10042-WeaponDescKr = "아츠코가 사용하는 기관단총.\n\n짧은 총신에 비해 강력한 화력을 지니고 있기에 근거리에서의 전투에 적합하다."
10042-ProfileIntroductionKr = "늘 방독면을 쓴 채 신비로운 분위기를 풍기는 아리우스 스쿼드의 일원.\n\n딱히 의도한 것은 아니지만, 식사나 수면을 할 때 이외에는 거의 언제나 방독면을 쓰고 있다. 스쿼드의 리더인 사오리로부터는 공주님이라고 불리고 있으며, 자신의 정체에 대해 많은 것을 숨기고 있다."
10042-CharacterSSRNewKr = "이 길에도 꽃이 많이 피어 있으면 좋겠네."

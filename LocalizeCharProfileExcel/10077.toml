10077-BirthdayTh = "11 พ.ย."
10077-HobbyTh = "ช่วยเหลือคนอื่น, ลองทำนู่นนี่หลายๆ อย่าง"
10077-WeaponNameTh = "Red Dragon"
10077-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อยู่คู่กับอิจิกะในทุกสถานการณ์\n\nถึงรูปลักษณ์ภายนอกจะดูอ่อนโยนและเรียบง่าย แต่ภายในพร้อมรับมือกับงานที่ดุเดือดและรุนแรงอยู่ทุกเมื่อ"
10077-ProfileIntroductionTh = "สมาชิกชมรมทวงความยุติธรรมที่มีสีหน้าผ่อนคลายอยู่เสมอ\n\nในชมรมทวงความยุติธรรมที่มีนักเรียนที่อุปนิสัยหลากหลาย\nอิจิกะเป็นสายยืดหยุ่นและคอยไกล่เกลี่ยให้เพื่อนๆ ได้เป็นอย่างดี\nนอกจากนี้ยังมีความสัมพันธ์ที่ดีกับเพื่อนต่างโรงเรียน เธอเป็นที่รู้จัก\nในเรื่องสีหน้าที่อ่อนโยนและนุ่มนวล ทว่านั่นไม่ใช่บุคลิกของเธอโดยกำเนิด แต่เป็นผลจากความพยายามของเธอต่างหาก"
10077-CharacterSSRNewTh = "เอ๋? อีกนานเลยกว่าจะถึงเวลานัด รอฉันอยู่เหรอคะ?"

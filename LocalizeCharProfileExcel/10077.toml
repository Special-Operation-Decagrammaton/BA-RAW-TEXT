[translation]
10077-StatusMessageTh = "ชมรมทวงความยุติธรรม ใจดีกับทุกคนเสมอนะคะ!"
10077-FullNameTh = "นากามาสะ อิจิกะ"
10077-FamilyNameTh = "นากามาสะ"
10077-PersonalNameTh = "อิจิกะ"
10077-SchoolYearTh = "ชั้นปีที่ 2"

10091-ProfileIntroductionTh = "สมาชิกชมรมของหวานหลังเลิกเรียน ควบตำแหน่งร้องนำ และมือเบสของวง <ชูการ์รัช> ที่ตั้งขึ้นมาอย่างเร่งด่วน\n\nคาซึสะเผลอพูดบางอย่างผิดไปจนจับพลัดจับผลูมาอยู่ในตำแหน่งร้องนำ แต่ด้วยนิสัยของเธอ จึงไม่ได้คิดหนีไปไหน ตอนนี้เธอคุ้นเคยกับความสับสน อลหม่านที่เธอกับทุกคนต้องเจอ ก็เลยยอมรับเรื่องที่เกิดขึ้นได้อย่างไม่สะทกสะท้าน"
10091-CharacterSSRNewTh = "แต่ละวันมีเรื่องเข้ามาไม่ซ้ำกันเลยละ"

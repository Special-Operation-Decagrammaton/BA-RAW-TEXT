10091-ProfileIntroductionKr = "방과후 디저트부의 부원이자 급조된 밴드 <슈가러시>의 메인 보컬 겸 베이스.\n\n말 한 마디 잘못 했다가 졸지에 리드 보컬이 돼 버렸지만, 성격상 도망치지는 않는다. 모두와 함께하는 이 요란한 난장판도 이제는 익숙한지 태연하게 받아들인다."

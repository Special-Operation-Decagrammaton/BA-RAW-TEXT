10021-WeaponDescKr = "아즈사의 돌격소총.\n\n바다를 보며 마음이 들뜬 주인과는 달리 여느 때와 같은 빛을 내고 있다."
10021-ProfileIntroductionKr = "난생처음 바다라는 곳에 놀러 오게 된 보충수업부의 얼음마녀.\n\n평소처럼 다른 사람들에게 폐를 끼치지 않기 위해 차갑고 냉정한 모습을 유지하려 하지만, 즐거운 바다의 분위기와 함께 온 친구들이 그녀를 가만히 내버려 두지 않는다. 때문에 다른 사람들의 시선을 계속 신경 쓰고 있지만, 주변 사람들이 보기에는 언제나의 아즈사일 뿐이다."
10021-CharacterSSRNewKr = "바다…… 익숙하지 않은 곳이지만……"

10021-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อาซึสะใช้\n\nปืนที่ส่องประกายเงางามอยู่เสมอ ต่างจากเจ้าของที่ดู\nตื่นเต้นเป็นพิเศษเมื่อได้มาเห็นทะเล"
10021-ProfileIntroductionTh = "แม่มดน้ำแข็งแห่งชมรมชั้นเรียนเสริมที่ได้มาพักผ่อนที่ทะเลเป็นครั้งแรก\n\nเธอพยายามรักษาภาพลักษณ์ที่ดูเย็นชาและเงียบขรึมให้เป็นปกติ\nเพราะไม่อยากสร้างปัญหาให้กับคนอื่นๆ แต่เพื่อนๆ ก็อยากให้เธอ\nได้สนุกกับการมาเที่ยวทะเลครั้งแรก จึงทำให้อาซึสะกังวลว่าคนอื่นจะคิดอย่างไรกับเธอ\nแต่สำหรับคนอื่นๆ แล้ว อาซึสะก็ยังคงเป็นอาซึสะคนเดิม"
10021-CharacterSSRNewTh = "ทะเลเหรอ... ฉันยังไม่ชินกับที่แบบนี้เท่าไร"

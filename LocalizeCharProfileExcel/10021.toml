10021-ProfileIntroductionTw = "三一綜合學園所屬，初次來到海邊玩耍的補課部冰之魔女。\n\n為了不給任何人添麻煩而想要保持著「一如往常冷靜的自己」，不過首次來到的海邊及同行的友人似乎不會讓他如願。對初次來到的海邊與來自周圍的視線感到緊張，使他和平常相比有些坐立難安。"

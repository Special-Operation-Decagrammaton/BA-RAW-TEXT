13001-WeaponDescTw = "知世平時隨身攜帶的榴彈發射器。\n\n似乎在每顆砲彈上都寫著知世創作的俳句。\n陰陽部現正販售中。"
13001-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，陰陽部的天然電波系少女。\n\n因為極其喜愛俳句之類的傳統文化而加入了陰陽部。\n由於外貌和舉止充滿著獨特的神祕氣息，因而成為百鬼夜行學生們羨慕的對象，但本人對此幾乎沒有自覺。"

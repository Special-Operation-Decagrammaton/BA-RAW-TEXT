13001-WeaponDescKr = "치세가 가지고 있는 다연발 유탄발사기.\n\n탄환 하나하나에 치세가 고심해서 지은 하이쿠 구절이 쓰여져 있다. 음양부의 굿즈로 판매중."
13001-ProfileIntroductionKr = "백귀야행 학원 음양부에 소속된 전파계 소녀.\n\n하이쿠와 같은 전통문화를 무척이나 좋아하여 음양부에 입부하였다. 외모와 분위기에서 풍기는 특유의 신비로운 느낌 덕분에 백귀야행의 학생들로부터 선망의 대상으로 여겨지고 있지만, 본인은 그런 사실을 거의 인지하지 못하고 있다."

10052-WeaponDescTh = "ปืนพกที่ติดชุดคอนเวอร์ชันที่โนอาใช้\n\nหากยืดส่วนสต็อกปืนออกมาจะสามารถกำจัดศัตรู\nได้อย่างรวดเร็วเช่นเดียวกับปืนกลมือ"
10052-ProfileIntroductionTh = "เลขานุการแห่ง <เซมิน่า> และหนึ่งในสภานักเรียนของโรงเรียนมิลเลเนียม\n\nหน้าที่หลักของเธอส่วนใหญ่จะเป็นการตัดสินใจภาระงานต่างๆ ของเซมิน่า หรือการจดบันทึกการประชุม อีกทั้งยังทำหน้าที่เป็นตัวแทนด้านสิทธิบัตร คอยดูแลเรื่องการจดสิทธิบัตรสิ่งประดิษฐ์ต่างๆ ของนักเรียนโรงเรียน\nมิลเลเนียม เนื่องจากมีความจำที่เป็นเลิศ เพียงแค่อ่านข้อมูลครั้งเดียว เธอก็จดจำข้อมูลต่างๆ ได้อย่างสมบูรณ์แบบ  "
10052-CharacterSSRNewTh = "สนใจจะไปตะลุยโลกที่อยู่เหนือตรรกะใดๆ กับฉันมั้ยคะ?"

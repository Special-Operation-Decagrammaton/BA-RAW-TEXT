10052-WeaponDescKr = "노아가 사용하는 컨버전 키트가 부착된 권총.\n\n\r개머리판을 길게 늘여 견착하면 기관단총처럼 빠른 연사로 적을 제압할 수 있다."
10052-ProfileIntroductionKr = "밀레니엄 학원 학생회, <세미나>의 서기.\n\n\r주된 업무는 세미나의 결정이나 회의 내용을 기록하는 일이며, 밀레니엄의 학생들이 개발한 제품의 특허를 등록하거나 감정하는 변리사 업무도 맡고 있다. 기억력이 매우 뛰어나기 때문에 한 번 보고 들은 내용은 거의 완벽하게 암기할 수 있다."
10052-CharacterSSRNewKr = "합리와 이성의 세계로,\n\r저와 함께 떠나보시겠어요?"

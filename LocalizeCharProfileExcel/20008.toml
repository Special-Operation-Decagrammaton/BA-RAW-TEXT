20008-WeaponDescTw = "亞子隨身攜帶的手槍。\n\n經過刻苦的努力，亞子就任行政官時被交付的重要之物。總是攜帶於身，非常珍惜地對待。"
20008-ProfileIntroductionTw = "格黑娜學園所屬，風紀委員會的上級行政官，同時也是風紀委員長陽奈的祕書。\n\n乍看之下給人一種親切善良的印象，但對於違規的學生可是毫不留情。總是在風紀委員長陽奈的身邊輔佐。因此也被格黑娜的學生稱為「陽奈的寵物」，不過本人並不是特別在意。"
20008-CharacterSSRNewTw = "既然有我的協助，就不允許失誤唷？"

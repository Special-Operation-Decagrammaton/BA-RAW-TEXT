20008-WeaponDescKr = "아코가 가지고 있는 권총.\n\n각고의 노력 끝에 행정관 위치에 오른 아코를 위해 특별히 수여된 권총. 항상 가지고 다니면서 늘 소중히 다루고 있다."
20008-ProfileIntroductionKr = "게헨나 선도부의 선임 행정관이자 선도부장 히나의 비서.\n\n언제나 히나의 곁에서 머무르며 그녀를 보좌한다. 일견 보기에는 친절하고 선량한 인상의 소녀지만, 교칙위반자를 상대할 때는 사정을 봐주지 않고 무자비하게 진압한다. 게헨나의 학생들로부터 '히나의 펫'이라는 멸칭으로 종종 불리고 있지만, 본인은 그다지 신경 쓰지 않는다."
20008-CharacterSSRNewKr = "제가 나선 이상, 실수는 용납하지 않겠어요."

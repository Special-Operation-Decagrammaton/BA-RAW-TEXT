20008-WeaponDescJp = "A pistol used by Ako.\n\nThis pistol was awarded to Ako for reaching the position of senior administrator with painstaking effort. She always carries it with her and takes very good care of it."
20008-ProfileIntroductionJp = "Senior administrator of the Gehenna Prefect Team and secretary to the head prefect, Hina.\n\nAko is always by Hina's side, assisting her. At first glance, she appears to be kind and good-natured, but she ruthlessly suppresses rule-breakers, showing no mercy. The students of Gehenna often call her \"Hina's pet,\" but she doesn't seem to mind."

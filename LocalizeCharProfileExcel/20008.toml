[translation]
20008-StatusMessageTh = "ห้ามติดต่อเรื่องอื่นนอกจากเรื่องงาน"
20008-FullNameTh = "อามาอุ อาโกะ"
20008-FamilyNameTh = "อามาอุ"
20008-PersonalNameTh = "อาโกะ"
20008-SchoolYearTh = "ชั้นปีที่ 3"
20008-CharacterAgeTh = "17 ปี"
20008-BirthdayTh = "22 ธ.ค."
20008-HobbyTh = "ฮินะ"
20008-WeaponNameTh = "Hot Shot"
20008-WeaponDescTh = "ปืนพกที่อาโกะใช้เป็นประจำ\n\nหลังจากเพียรพยายามอย่างหนัก อาโกะได้เลื่อนตำแหน่ง\nเป็นเจ้าหน้าที่อาวุโส และได้รับปืนพกด้ามนี้มาเป็นพิเศษ\nเธอจึงพกติดตัวไปด้วยตลอดเวลาและคอยบำรุงรักษา\nอย่างดี"
20008-ProfileIntroductionTh = "ผู้ดำรงตำแหน่งเจ้าหน้าที่อาวุโสของคณะกรรมการวินัยเกเฮนน่า และพ่วงด้วยตำแหน่งเลขานุการของฮินะ\n\nไม่ว่าเมื่อไหร่ก็มักจะคอยอยู่เคียงข้างและช่วยเหลือฮินะอยู่เสมอ หากมองผิวเผิน จะคิดว่าเธอเป็นเด็กสาวที่ใจดีมีเมตตา แต่เมื่อต้องรับมือกับเหล่าเด็กที่ชอบละเมิดกฎ เธอจะจัดการปราบปรามอย่างเด็ดขาดและไม่ปรานี ถึงนักเรียนคนอื่นๆ จะตั้งฉายา และเรียกเธอว่า \"สุนัขรับใช้ของฮินะ\" แต่เธอก็ไม่ได้สนใจเท่าไร"
20008-CharacterSSRNewTh = "ตราบใดที่ฉันอยู่ที่นี่ ฉันจะไม่ยกโทษให้ความผิดพลาดเด็ดขาด"

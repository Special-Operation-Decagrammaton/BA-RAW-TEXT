20047-WeaponDescTw = "桔梗總是隨身攜帶的步槍。\n\n即使在海邊這種不利的戰場，也為了獲得完美的勝利而做好了萬全的準備。"
20047-ProfileIntroductionTw = "為了迎接夏天而換上泳裝的百鬼夜行聯合學園所屬，百花繚亂紛爭調停委員會的作戰參謀。\n\n雖然大膽展現了平時不曾展露的自己，但對於不會游泳一事仍羞於啟齒。最終在百夜水上祭的氣氛帶動下參加了活動。"
20047-CharacterSSRNewTw = "我怎麼會在海邊……"

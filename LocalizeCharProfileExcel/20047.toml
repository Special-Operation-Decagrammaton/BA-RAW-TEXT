20047-ProfileIntroductionTh = "ที่ปรึกษายุทธศาสตร์แห่งคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันที่ใส่ชุดว่ายน้ำ\nรับฤดูร้อน\n\nแม้คิเคียวจะเปิดเผยรูปลักษณ์ของตัวเองที่ไม่เคยให้ใครเห็นมาก่อนในชุดว่ายน้ำ แต่เธอก็ยังอายที่จะบอกใครว่าเธอว่ายน้ำไม่เป็น และสุดท้ายก็บรรยากาศพาไป\nจนต้องไปเข้าร่วมเทศกาลสวนน้ำเฮียกคิยาโค"
20047-CharacterSSRNewTh = "ทำไมถึงได้มาทะเล..."

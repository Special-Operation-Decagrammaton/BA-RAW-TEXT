20040-WeaponDescKr = "사츠키가 애용하는 권총.\n\n\r이름은 거창하지만, 아픈 것을 싫어하는 사츠키답게 위력보다는 휴대의 간편함이 돋보인다."
20040-ProfileIntroductionKr = "판데모니움 소사이어티 소속의 의원이자 정보부장.\n\n\r타인을 조종하고자 하는 의욕이 가득하기에 갖가지 최면 요법에 심취해 있지만, 실제로 성공한 케이스는 손에 꼽을 정도. 하지만 수많은 실패에도 아랑곳하지 않고 거침없이 전진해 나가는 당찬 소녀. 언제나 여유로운 태도와 말투를 보여주지만, 의외로 벌레와 무서운 것에는 면역이 없다."
20040-CharacterSSRNewKr = "자아~ 자아~\n\r당신은 만마전에 충성하고 싶어진다~"

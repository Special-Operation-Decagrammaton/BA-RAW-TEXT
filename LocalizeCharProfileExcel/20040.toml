20040-ProfileIntroductionTw = "格黑娜學園所屬，「萬魔殿」的議員兼情報部長。\n\n由於充滿想要操控他人的欲望而沉迷於各種催眠療法，可惜實際成功的案例卻屈指可數。不過儘管經歷了無數次失敗，他仍是個無所畏懼且勇往直前的少女。雖然態度和語氣總是顯得從容不迫，但面對昆蟲與可怕的東西時意外地沒轍。"
20040-CharacterSSRNewTw = "來吧～來吧～\n你越來越想效忠於萬魔殿了～"

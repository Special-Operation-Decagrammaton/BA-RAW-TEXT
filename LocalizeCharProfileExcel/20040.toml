20040-HobbyTh = "ศึกษาการควบคุมจิตใจ, ช้อปปิ้ง"
20040-WeaponNameTh = "NK Delta"
20040-WeaponDescTh = "ปืนพกที่ซัตสึกิใช้เป็นประจำ\n\nถึงชื่อจะอลังการ แต่จุดเด่นอยู่ที่การพกพาสะดวก\nมากกว่าอานุภาพของปืน สมกับเป็นอาวุธของซัตสึกิ\nผู้ไม่ชอบความเจ็บปวด"
20040-ProfileIntroductionTh = "สมาชิกและหัวหน้าฝ่ายข่าวกรองของแพนเดโมเนียม โซไซตี้\n\nซัตสึกิหลงใหลในการสะกดจิตบำบัด เพราะมีความตั้งใจที่จะควบคุมคนอื่น แต่เคสที่ประสบความสำเร็จจริงๆ มีน้อยมากจนนับนิ้วได้ แม้จะล้มเหลวมานับไม่ถ้วน แต่เด็กสาวผู้กล้าหาญคนนี้ก็ไม่หวั่นไหว และก้าวไปข้างหน้าอย่างไม่ลังเล แม้จะพูดและทำตัวชิลอยู่เสมอ แต่ถ้าเจอแมลงและอะไรที่น่ากลัวก็ต้องยอมแพ้ทุกที"
20040-CharacterSSRNewTh = "เอาละ~ เอาละ~\nแล้วคุณจะอยากจงรักภักดีกับแพนเดโมเนียม โซไซตี้~"

23001-WeaponDescTw = "風華經常帶在身上的衝鋒槍。\n\n偶爾用來壓制在餐廳製造騷動的問題兒童，不過大部分的情況下在真的開火之前對方就會安份下來，所以似乎並不常用到。"
23001-ProfileIntroductionTw = "格黑娜學園所屬，負責管理格黑娜學園餐廳的供給部的成員。\n\n每天早上都為格黑娜學生準備非常大量的食物，是格黑娜少有的，善良認真的學生。\n料理手藝還算不錯，但由於餐廳人手不足，其料理實力時常被低估。\n但他並未就此放棄，每天都為了提供更好的餐點而不斷努力著。"

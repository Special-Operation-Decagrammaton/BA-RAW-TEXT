23001-WeaponDescJp = "A submachine gun Fuuka carries everywhere.\n\nIt was originally intended to control the occasional troublemakers in the dining hall, but those troublemakers usually quiet down before Fuuka gets to use it."
23001-ProfileIntroductionJp = "A member of the School Lunch Club that manages Gehenna Academy's dining hall.\n\nA kind and earnest student, making her a bit of a rarity at Gehenna. She prepares and serves hundreds of meals every morning for the students of Gehenna. She's a good cook, but her skills are written off due to the dining hall's lack of manpower. Still, she refuses to give up and is constantly looking for ways to improve the menu."

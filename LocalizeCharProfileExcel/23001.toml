23001-WeaponDescKr = "후우카가 늘 소지하고 있는 기관단총.\n\n가끔 식당에서 난동을 부리는 문제아들을 제압하기 위한 용도의 물건이지만, 그런 문제아 대부분은 사용하기도 전에 얌전해지기 때문에 그다지 자주 쓰이진 않는다."
23001-ProfileIntroductionKr = "게헨나 학원의 식당을 관리하는 급양부의 부원.\n\n게헨나에서 보기 드문 상냥하고 성실한 학생으로 매일 아침마다 게헨나 학생들을 위해 수백인 분의 음식을 준비하고 배식하고 있다. 음식 솜씨는 좋은 편이지만, 식당의 인력 부족으로 인해 실력을 평가 절하당하는 중. 하지만 그녀는 포기하지 않고 더 나은 식단을 제공하기 위해 꾸준히 노력하고 있다."

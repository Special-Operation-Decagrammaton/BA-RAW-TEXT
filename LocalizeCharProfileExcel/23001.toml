23001-WeaponDescTh = "ปืนกลมือที่ฟูกะใช้เป็นประจำ\n\nฟูกะจะใช้กำราบพวกเด็กที่สร้างความวุ่นวายที่โรงอาหารบาง\nครั้ง แต่ส่วนใหญ่เด็กมีปัญหาพวกนั้นก็มักจะสงบลงก่อน\nเธอจึงไม่ค่อยได้ใช้งานสักเท่าไร"
23001-ProfileIntroductionTh = "สมาชิกชมรมโภชนาการของสถาบันเกเฮนน่า มีหน้าที่ดูแลโรงอาหาร\n\nนักเรียนผู้อ่อนโยน และขยันที่พบได้ยากในสถาบันเกเฮนน่า\nทุกเช้าเธอจะเตรียมอาหารให้กับนักเรียนคนอื่นๆ เสมอ ฟูกะมีฝีมือ\nในการทำอาหารค่อนข้างดีมาก แต่ความสามารถของเธอถูกลดทอน\nเพราะปัญหาขาดบุคลากรในโรงอาหาร แต่เธอก็ไม่ยอมแพ้\nและพยายามต่อไป เพื่อส่งต่ออาหารที่ดีขึ้นให้ทุกคน"

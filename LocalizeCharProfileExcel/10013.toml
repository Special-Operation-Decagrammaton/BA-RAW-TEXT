10013-ProfileIntroductionTw = "三一綜合學園所屬，實現正義部的部長，同時也是三一的戰略兵器。\n\n生性好戰且暴力，一旦遇到不滿的事物就會先破壞再說。\n幸虧有副部長蓮實而勉強帶領著實現正義部。雖然弦生就像無法控制的狂犬，但在老師面前卻會表現出如同藏不住害羞的少女的一面。"

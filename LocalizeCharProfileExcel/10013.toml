10013-WeaponDescKr = "츠루기가 사용하는 두 자루의 산탄총.\n\n한쪽이 '블러드'고 다른 한쪽이 '건파우더'다. 똑같이 무시무시하며 딱히 구분하지는 않는다."
10013-ProfileIntroductionKr = "트리니티 정의실현부의 부장이자, 트리니티의 공식 전략병기.\n\n호전적이고 폭력적인 성격의 소유자로 마음에 들지 않는 것이 있다면 일단 부수고 본다. 부부장인 하스미의 능력 덕분에 정의실현부는 가까스로 유지되는 중. 통제할 수 없는 광견 같은 츠루기지만, 선생님 앞에서는 부끄러움을 감추지 못하는 소녀 같은 면모를 보이기도 한다."
10013-CharacterSSRNewKr = "자아, 사냥의 시간이다-!"

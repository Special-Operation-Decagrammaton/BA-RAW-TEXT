10013-ProfileIntroductionTh = "ประธานชมรมทวงความยุติธรรม และอาวุธยุทธวิธีของสถาบันทรีนิตี้\n\nมีนิสัยก้าวร้าว และชอบใช้ความรุนแรง หากมีเรื่องไม่ถูกใจ ก็จะใช้กำลังเข้าใส่ก่อน ชมรมทวงความยุติธรรมยังอยู่ได้ด้วยความสามารถของรองประธานฯ ฮาสุมิ ถึงปกติจะก้าวร้าวจนควบคุมไม่ได้ แต่เมื่ออยู่ต่อหน้าคุณครูแล้ว เธอจะกลายเป็นเด็กสาวที่เก็บอาการเขินไว้ไม่อยู่"

10033-WeaponDescTw = "若藻愛用的步槍。\n\n與古風的外觀相反，總是飄散著火焰和火藥的氣味。現在大多時候是朝向老師身邊的「礙事者」發射。"
10033-ProfileIntroductionTw = "百鬼夜行學園所屬，因為停學處分而被送入矯正局，但從中越獄的「七罪人」之一。\n\n由於無差別且大規模的破壞行為而被稱為「災厄之狐」，令人畏懼的少女。動機及目的也被謎團所包圍。隱藏在假面下的素顏有如「惡鬼般恐怖」、「惡魔般醜陋」等的傳聞雖然不絕於耳，但人們只是畏懼著未知的事物。"

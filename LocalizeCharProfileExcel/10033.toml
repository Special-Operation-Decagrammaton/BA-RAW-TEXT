10033-WeaponDescTh = "ปืนไรเฟิลที่วาคาโมะใช้\n\nปืนที่มีพลังรุนแรงและมีกลิ่นของดินปืนและระเบิดติดอยู่\nเสมอ แตกต่างจากรูปลักษณ์ที่ดูล้าสมัยอย่างยิ่ง ปกติมัก\nจะถูกใช้เพื่อทำลาย หรือกำจัดผู้ที่คิดจะคุกคามคุณครู"
10033-ProfileIntroductionTh = "เด็กนักเรียนของสหพันธ์เฮียกคิยาโคที่มีสถานะถูกพักการเรียน และขณะนี้เป็นหนึ่งใน <เจ็ดอาชญากร> ที่หลบหนีการจับกุมของสำนักรักษาความปลอดภัย\n\nด้วยนิสัยที่ชอบทำลายล้างตามอำเภอใจ เธอจึงถูกตั้งฉายาให้ว่า \"จิ้งจอกแห่งความพินาศ\" และเป็นที่หวาดกลัวของคนอื่นๆ ทั้งแรงจูงใจ และเป้าหมายของเธอต่างเป็นปริศนา กล่าวกันว่าใบหน้าภายใต้ หน้ากากนั้นเป็นใบหน้าที่สุดแสนน่ากลัว น่าเกลียดราวกับปีศาจ มีข่าวลือกับเธอมากมาย แต่ทว่าข่าวลือก็เป็นเพียงข่าวลือเท่านั้น"
10033-CharacterSSRNewTh = "อา... ในที่สุดก็ได้พบกับคุณแล้วนะคะ♡"

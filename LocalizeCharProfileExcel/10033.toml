10033-ProfileIntroductionKr = "백귀야행 연합학원에서 정학당하고, 교정국에서는 탈옥까지 한 <일곱 죄수> 중 한 명.\n\n평소 기분이 내키는 대로 무차별 파괴를 일삼고 있기에 <재액의 여우>라고 불리며 두려움의 대상이 되었다. 동기와 목적도 일체 수수께끼에 싸여 있으며, 들리기로는 가면 밑의 얼굴이 굉장히 무섭다. 악마처럼 흉측하다. 등의 소문이 끊이지 않지만, 어디까지나 소문은 소문일 뿐이다."

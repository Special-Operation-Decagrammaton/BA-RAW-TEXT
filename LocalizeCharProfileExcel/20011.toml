20011-WeaponDescTw = "茜香打工時也隨身攜帶的突擊步槍。\n\n即使是巫女的打工也不例外。因為是新年，所以也使用於平靜對他人造成困擾的問題兒童上。"
20011-ProfileIntroductionTw = "阿拜多斯對策委員會所屬，身穿巫女服裝的可靠（？）會計擔當。\n\n為了盡可能地幫上對策委員會的忙，一直從事著各式各樣的兼職打工，認真且努力。迎接新年的他，選擇了當巫女的兼差。即便不是特別喜歡巫女，對其也沒有深厚的認識，但因為具備了「被交付了就會好好完成」的性格，所以這次仍是全力以赴（但背後也有「如果更像巫女的話，時薪會上升」的原因）。"
20011-CharacterSSRNewTw = "祈禱而已，如果是為了老師的話不管幾次都……"

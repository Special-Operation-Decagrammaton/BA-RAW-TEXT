20011-WeaponDescKr = "세리카가 아르바이트를 나갈 때 늘 휴대하는 돌격소총.\n\n\r무녀 아르바이트 또한 예외가 아닌지라, 새해맞이 행사장에서 난동을 피우는 문제아들을 조용히 만드는 데에도 쓰인다."
20011-ProfileIntroductionKr = "아비도스 대책위원회의 똑 부러지는 회계.\n\n\r대책위원회의 도움이 되고자 여러 아르바이트를 하며 노력해오던 성실한 소녀가 이번엔 새해를 맞이하여 새롭게 무녀(아르바이트)가 되었다. 보다 완벽한 무녀 아르바이트생을 연기해주면 높은 시급을 준다는 소리를 듣고 이번에도 어김없이 전력을 다해 노력하고 있다."
20011-CharacterSSRNewKr = "뭐, 선생님을 위해서라면 기도 정도는 해줄게."

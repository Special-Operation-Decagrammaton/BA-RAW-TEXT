20011-WeaponNameTh = "Sincerity"
20011-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่เซริกะนำติดตัวไปทำงานพาร์ทไทม์เสมอ\n\nใช้งานได้ครอบคลุมถึงงานพาร์ทไทม์มิโกะ\nและงานส่วนใหญ่ก็คือจัดการพวกเด็กมีปัญหาที่มาสร้าง\nความวุ่นวายในงานเทศกาลฉลองวันปีใหม่"
20011-ProfileIntroductionTh = "เหรัญญิกที่ชาญฉลาดของคณะกรรมการแผนงาน\n\nเด็กสาวผู้ขยันหมั่นเพียรในการทำงานพาร์ทไทม์เพื่อช่วยเหลือ\nคณะกรรมการแผนงาน ครั้งนี้เธอได้รับบทเป็นมิโกะ (งานพาร์ทไทม์) ในงานเทศกาลวันปีใหม่ เธอได้ยินมาว่าหากแสดงเป็นมิโกะได้อย่าง\nสมบูรณ์แบบจะได้รับค่าจ้างต่อชั่วโมงที่แพงขึ้น คราวนี้เธอจึงพยายามตั้งใจทำงานอย่างหนัก"
20011-CharacterSSRNewTh = "ฉันจะอฐิษฐานเพื่อคุณครูนะคะ"

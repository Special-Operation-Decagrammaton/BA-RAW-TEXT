10140-WeaponDescKr = "쿠루미가 SRT 특수학원에서 지급받은 제식 기관단총.\n\n가벼운 무게와 높은 안정성으로 방패와 함께 사용하기에 큰 무리가 없다. 다른 기관단총에 비해 소음도 적어, 선두에서 초병을 은밀히 처리하는 데에도 용이하다."
10140-ProfileIntroductionKr = "SRT 특수학원 FOX 소대의 포인트맨. 콜사인은 <FOX 3>.\n\n뛰어난 신체 능력과 위기 상황에서의 빠른 임기응변이 장점인 학생으로, 본능적인 전투에 특화되어 있는 포인트맨. 감정의 기복이 심하고, 단순한 성격의 소유자지만 그 덕분에 소대의 작전 중 위험한 상황을 빠르게 극복할 수 있었다.\n\n본인은 신경 쓰지 않는 척 하고 있지만 자신의 작은 체구에 은근히 콤플렉스를 갖고 있다."
10140-CharacterSSRNewKr = "눈이 멀고 싶지 않다면.\n내 방패에서 시선을 떼는 게 좋을 거야."

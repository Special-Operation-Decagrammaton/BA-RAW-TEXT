20009-WeaponDescKr = "체리노가 누군가를 숙청할 때 사용하는 권총.\n\n고온다습한 환경에서도 녹이 슬지 않도록 토모에가 일부 소재를 개조해주었다."
20009-ProfileIntroductionKr = "227호 온천장에 휴양을 즐기러 온 붉은겨울 연방학원의 회장.\n\n처음에는 허가 없이 온천장을 세운 특별반을 못마땅히 여겨 철거하려 했지만, 노도카를 비롯한 특별반 학생들의 접대가 생각보다 마음에 들어 온천장에 눌러앉게 되었다. 온천장의 휴게시설과 먹거리에는 대단히 만족하고 있지만, 정작 온천욕은 그리 좋아하지 않는다."
20009-CharacterSSRNewKr = "<숙청군 1호>의 위용 앞에 무릎을 꿇어라!"

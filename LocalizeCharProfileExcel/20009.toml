20009-WeaponDescTw = "潔莉諾在肅清時使用的手槍。\n\n為了能在溫泉浴場這種高溫多濕的環境也不會生鏽，智惠似乎進行了改造。"
20009-ProfileIntroductionTw = "赤冬聯邦學園所屬，於227號溫泉浴場享樂的學生會長。\n\n最初雖然無法容忍在未經自己許可下建設溫泉浴場，認為這種東西必須撤除並肅清才行。然而，抵達後馬上被和香他們說服，在溫泉浴場盡情享受了一番。雖然對於溫泉浴場和食物感到滿足，但好像不太喜歡溫泉本身。"
20009-CharacterSSRNewTw = "在「肅清君1號」的面前，跪下吧！"

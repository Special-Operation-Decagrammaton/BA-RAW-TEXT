20009-ProfileIntroductionTh = "ประธานนักเรียนแห่งสหภาพเรดวินเทอร์ที่มาพักผ่อนในวันหยุดที่ออนเซ็น\nเลขที่ 227\n\nในตอนแรกเธอไม่พอใจที่กลุ่มห้องเรียนพิเศษสร้างออนเซ็นโดยไม่ได้รับ\nอนุญาต และมาที่ออนเซ็นเพื่อสั่งให้รื้อถอน แต่เธอกลับถูกใจการต้อนรับ\nของโนโดกะและกลุ่มห้องเรียนพิเศษ จึงตัดสินใจเข้าพักที่ออนเซ็น\nถึงแม้จะพอใจกับสิ่งอำนวยความสะดวกและอาหารที่ออนเซ็นก็ตาม\nแต่ว่าเธอกลับไม่ชอบการลงแช่ออนเซ็นเอามากๆ"
20009-CharacterSSRNewTh = "จงคุกเข่าต่อความยิ่งใหญ่ของ <ผู้กวาดล้าง No.1> ซะ!"

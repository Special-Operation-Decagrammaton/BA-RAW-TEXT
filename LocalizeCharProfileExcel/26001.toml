26001-ProfileIntroductionTh = "แฮ็กเกอร์ของชมรมเวอริทัส สังกัดกลุ่มแฮ็กเกอร์ ประจำโรงเรียนวิทย์มิลเลเนียม\n\nทักษะพิเศษของเธอคือการดักฟัง สิ่งที่ชอบคือการแอบฟังความลับของคนอื่น เธอเข้ากับคนอื่นได้ยาก ขนาดที่ใช้คำพูดสุภาพกับรุ่นน้องปี 1 ถึงจะเป็นเด็กขี้อาย และพูดน้อยในความเป็นจริง แต่ในโลกอินเทอร์เน็ต เธอคือนักพูดที่มากับคำพูดน่าตกใจเสมอ"

26001-ProfileIntroductionEn = "A hacker of Veritas, Millennium Science School's infamous hacking group.\n\nWiretapping is her specialty, and she takes great pleasure in eavesdropping on other people's private conversations. A socially awkward young lady who addresses even younger students with formal deference. In real life, she's mousy and shy, but on the internet she's a surprisingly glib wordsmith."

26001-ProfileIntroductionTw = "千年科學學園所屬，駭客集團「貝里塔斯」的駭客。\n\n專長是竊聽，是個喜歡偷聽別人私密談話的、有點怪異的少女。\n不太擅長人際關係，是對年紀較小的1年級學生也會用敬語的類型。\n雖然在現實生活中是內向且沉默寡言的少女，在網路上卻非常會聊。"

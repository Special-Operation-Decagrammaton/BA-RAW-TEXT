26001-ProfileIntroductionKr = "밀레니엄 학원의 해커 집단, 베리타스의 해커.\n\n\r특기는 도청으로, 타인의 비밀스러운 이야기를 엿듣는 것을 좋아한다. 대인관계는 서투른 편으로 1학년에게도 존댓말을 할 정도로 사람을 어려워한다. 현실에서는 소심하고 말수가 적은 소녀이지만, 넷상에서는 놀랄만한 달변가가 된다."

10117-ProfileIntroductionTw = "高地人鐵道學園所屬，中央管制中心的幹部。\n\n駕駛列車的才能為天才等級，因此和雙胞胎妹妹希望一起被提拔為幹部。對於文書和管理工作方面一竅不通。忠於當下慾望、不顧他人臉色且我行我素的行事風格，經常導致各種事件發生。"

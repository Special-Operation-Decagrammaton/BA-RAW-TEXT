10117-ProfileIntroductionKr = "하이랜더 철도학원의 중앙관제센터 소속 간부.\n\n열차 운전에 천재적인 재능이 있어 쌍둥이 동생인 노조미와 함께 간부로 발탁되었지만, 서류나 관리 업무는 완전히 꽝. 순간순간의 욕구에 매우 충실하고 다른 사람의 눈치를 안 보는 마이페이스인지라 온갖 사건을 몰고 다닌다."

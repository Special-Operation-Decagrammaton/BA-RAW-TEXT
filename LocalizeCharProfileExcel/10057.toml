10057-WeaponDescTw = "羽留奈使用的狙擊步槍。\n\n即使到了新的一年，也只有這把槍最適合擔任他探究美食的夥伴了吧。"
10057-ProfileIntroductionTw = "格黑娜學園所屬，迎接新年換上和服的美食研究會會長。\n\n抱持著對美食來說，穿著符合時節的服裝也是探索美食一環的信念，盛裝打扮後踏上了美食之路。雖然從外表看起來是無比優雅的大小姐……\n還是祈禱準備的食物能符合他心中的美食吧。"
10057-CharacterSSRNewTw = "這個時期的料理都很有魅力呢……\n說到新年，就會想到御節料理、年糕湯、紅豆湯……\n啊啊……肚子都餓了呢"

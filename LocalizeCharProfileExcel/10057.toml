[translation]
10057-StatusMessageTh = "ช่วงปีใหม่ก็ใช้เวลาค้นหารสชาติที่ล้ำเลิศ"
10057-FullNameTh = "คุโรดาเตะ ฮารุนะ"
10057-FamilyNameTh = "คุโรดาเตะ"
10057-PersonalNameTh = "ฮารุนะ"
10057-SchoolYearTh = "ชั้นปีที่ 3"
10057-CharacterAgeTh = "17 ปี"
10057-BirthdayTh = "1 มี.ค."
10057-HobbyTh = "ตระเวนกินร้านเด็ด, เขียนรายการอาหาร"
10057-WeaponNameTh = "Ideal"
10057-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่ฮารุนะใช้เป็นประจำ\n\nแม้จะเป็นช่วงปีใหม่ การตระเวนชิมอาหารของฮารุนะก็ยัง\nดำเนินต่อไปอย่างต่อเนื่อง และไม่มีใครเหมาะที่จะเป็น\nคู่หูตระเวนชิมกับเธอมากกว่าปืนด้ามนี้อีกแล้ว"
10057-ProfileIntroductionTh = "หัวหน้าชมรมชิมอาหารที่แปลงโฉมมาในชุดกิโมโนต้อนรับวันปีใหม่\n\nเธอเชื่อว่าอาหารเลิศรสนั้นมีสถานที่กับช่วงเวลาที่เหมาะสม และการแต่งกายให้\nเหมาะสมกับช่วงเวลานั้นๆ ก็เป็นส่วนหนึ่งของภารกิจของชมรมชิมอาหาร\nครั้งนี้เธอจึงออกเดินทางสู่เส้นทางของการชิมอาหารด้วยการสวมชุดกิโมโนที่แสน\nสง่างาม ดูภายนอกเธอดูเหมือนคุณหนูผู้ดีตระกูลเก่า... แต่หากเป็นไปได้\nอย่าให้เธอได้ไปพบกับอาหารที่ไม่เหมาะสมกับรสนิยมของเธอจะเป็นสิ่งที่ดีที่สุด "
10057-CharacterSSRNewTh = "อาหารตามเทศกาลดูน่าหลงใหลไปหมดเลยนะคะ...\nถ้าเป็นวันปีใหม่ละก็ต้องโอเซจิหรือโอโซนิ หรือไม่ก็โอชิรุโกะ...\nอะ... อ่า ชักจะหิวขึ้นมาแล้วละค่ะ"

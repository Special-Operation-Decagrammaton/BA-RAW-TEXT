10057-HobbyKr = "맛집 탐방, 미식 리스트 작성"
10057-WeaponNameKr = "Ideal"
10057-WeaponDescKr = "하루나가 다루는 저격소총.\n\n새해에도 계속되는 그녀의 미식 탐구에, 이 총만큼 어울리는 파트너는 없을 것이다."
10057-ProfileIntroductionKr = "새해를 맞아 기모노를 차려 입은 미식연구회의 부장.\n\n미식에는 장소와 시기가 있으며, 시기에 맞는 차림을 하는 것도 미식 탐구의 일환이라는 신념 하에, 우아한 기모노를 입고 미식의 길을 나선다. 겉모습만 보면 더없이 고풍스러운 아가씨이지만……가능하다면, 그녀에게 격에 맞지 않는 음식이 차려지는 일만은, 일어나지 않기를 바라는 것이 좋다."
10057-CharacterSSRNewKr = "계절 음식은 모두 매력적이죠……\n설날이라고 하면, 오세치나 오조니, 오시루코…….\n아아…… 배가 고파졌어요."

10057-WeaponDescJp = "A sniper rifle used by Haruna.\n\nShe will have no partner more suitable than this gun as she continues the path of a true gourmand."
10057-ProfileIntroductionJp = "The president of the Gourmet Research Society, who got dressed up in a kimono for the New Year.\n\nShe believes all aspects of a situation are crucial for a gourmand: not just the time and place of the meal, but also wearing the appropriate outfit. Therefore, she has set out on the path of epicureanism wearing a kimono. She certainly seems elegant and refined, but...if she's served food that doesn't meet her standards, watch out."
10057-CharacterSSRNewJp = "What's more appetizing than seasonal food? For the New Year, we could have osechi, ozoni, oshiruko... Oh, now I'm hungry."

23005-ProfileIntroductionTh = "เลขาผู้ซื่อสัตย์ของคณะกรรมการแผนงาน โรงเรียนอะบิดอส\n\nเธอให้ความสำคัญกับทฤษฎี และกฎระเบียบ ปัจจุบันกำลังพยายามอย่างจริงจัง ที่จะฟื้นฟูโรงเรียนมัธยมอะบิดอส"

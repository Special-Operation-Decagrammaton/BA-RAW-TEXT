20013-WeaponDescKr = "치히로가 사용하는 자동소총.\n\n\r그녀의 말에 따르면 암호화된 비밀번호를 알아내는 가장 빠른 수단이라고 한다."
20013-ProfileIntroductionKr = "밀레니엄 학원의 해커 집단, 베리타스의 부부장.\n\n\r우수한 해킹 실력을 갖춘 천재 프로그래머로, 업무에 필요한 일이라면 잠입이나 발로 뛰는 일도 마다하지 않는 행동파 해커이기도 하다. 악동이 많기로 유명한 베리타스 내에서는 보기 드문 상식인으로, 올바른 해커 윤리에 대해 부원들에게 늘 강조한다."
20013-CharacterSSRNewKr = "새로운 보안 취약점이 발견된 모양이네."

20013-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่จิฮิโระใช้เป็นประจำ\n\nจิฮิโระกล่าวว่าเป็นอุปกรณ์ที่ช่วยให้เข้าถึงรหัสลับ\nได้รวดเร็วที่สุด"
20013-ProfileIntroductionTh = "รองหัวหน้าเวอริทัส กลุ่มแฮ็กเกอร์แห่งโรงเรียนมิลเลเนียม\n\nโปรแกรมเมอร์อัจฉริยะที่มีพรสวรรค์ด้านการแฮ็กข้อมูลที่เป็นเลิศ หากเป็นเรื่องที่จำเป็นสำหรับการทำงาน ต่อให้เป็นการแฝงตัวหรือเรื่องอื่นๆ เธอก็ไม่ลังเลที่จะทำ เธอเป็นคนทั่วไปที่หาได้ยากในหมู่เวอริทัสที่มีชื่อเสียง ในด้านความร้ายกาจ และมักจะเน้นย้ำเรื่องจรรยาบรรณที่ถูกต้อง ของแฮ็กเกอร์ให้กับสมาชิกของเธอเสมอๆ"
20013-CharacterSSRNewTh = "ดูเหมือนว่าจะพบช่องโหว่ด้านความปลอดภัยใหม่อีกแล้ว"

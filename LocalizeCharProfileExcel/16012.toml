16012-WeaponDescTh = "ปืนกลมือที่เป็นอาวุธของจุนโกะ\n\nหากมีใครที่คิดขัดขวางการลิ้มรสอาหารที่แสนอร่อย\nก็จะได้รู้ซึ้งถึงรสชาติความเผ็ดร้อนของปืนนี้แน่นอน"
16012-ProfileIntroductionTh = "จุนโกะในชุดกิโมโนต้อนรับวันปีใหม่\n\nเธอเปลี่ยนชุดใหม่ พร้อมกับโอบอุ้มความฝันต่างๆ รวมถึงความคาดหวัง\nเกี่ยวกับอาหารวันปีใหม่เอาไว้ แต่เธอก็มักจะน็อตหลุดทุกครั้ง\nเวลาที่ถูกขัดขวางตอนลิ้มรสอาหารอร่อยๆ เสมอ"

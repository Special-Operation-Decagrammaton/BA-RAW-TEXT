20052-WeaponDescTw = "八雲平時隨身攜帶的手槍。\n\n「槍有很多用途」這句話是八雲經常掛在嘴邊的口頭禪。在用途之中，似乎也包含幫拖稿的作家找回勤奮的樣子。"
20052-ProfileIntroductionTw = "赤冬聯邦學園所屬，出版部的部長。\n\n也兼任雜誌《赤熊》的主編。一旦下定決心要做某件事就沒有人能攔得住，為了出版部的利益可以不擇手段的無敵部長大人。但是他的內在似乎也藏著一顆純真的心……"

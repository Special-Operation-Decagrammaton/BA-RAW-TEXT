20052-ProfileIntroductionEn = "The president of the Publishing Department, the Red Winter Academy's publishing club.\n\nShe also serves as Chief Editor for the \"Red Bear\" magazine. She's unstoppable once she sets her mind on something, and this invincible president will do anything for the Publishing Department's profit. But she also seems to be hiding a pure heart lying beneath her cunning exterior..."
20052-CharacterSSRNewEn = "By any chance, are you interested in books?\nEh, let's just have a talk."

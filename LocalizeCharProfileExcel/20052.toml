20052-WeaponDescTh = "ปืนพกที่ยาคุโมะพกติดตัวอยู่เสมอ\n\nยาคุโมะมักพูดว่าปืนนำไปใช้งานได้หลายอย่าง หนึ่งในนั้นก็คือเอาไว้เพื่อทำให้นักเขียนที่ส่งงาน\nไม่ตรงเวลา 'ขยัน' ทำงานมากขึ้น"
20052-ProfileIntroductionTh = "หัวหน้า <ชมรมสื่อสิ่งพิมพ์> ของสหภาพเรดวินเทอร์\n\nนอกจากนี้ยังควบตำแหน่งบรรณาธิการของนิตยสาร 'เรดแบร์' เมื่อตัดสินใจอะไรแล้ว ไม่ว่าใครก็หยุดยาคุโมะไม่ได้ และเพื่อประโยชน์ของ\nชมรมสื่อสิ่งพิมพ์แล้ว ไม่มีอะไรที่ยาคุโมะจะไม่ทำ แต่ดูเหมือนว่าจะมีจิตใจ\nที่ไร้เดียงสาซ่อนอยู่เบื้องหลังตัวตนนั้น..."
20052-CharacterSSRNewTh = "สนใจเกี่ยวกับหนังสือมั้ยคะ?\nเอาน่า เรามาคุยกันเถอะค่ะ"

13013-WeaponDescKr = "모미지가 사용하는 휴대용 RPG.\n\n\r지켜야 할 것을 지킨다면, 이 '수칙'이 발동될 일은 없을 것이다……"
13013-ProfileIntroductionKr = "붉은겨울 학원의 도서관에서 지식을 위해 투쟁하는 문학소녀.\n\n\r빵과 간식을 위해 싸우는 붉은겨울 학원 대부분의 학생들과는 달리, 그녀는 도서관에 더 많은 장서를 유치하기 위해 싸우고 있다. 실상은 중증의 오타쿠로, 사무국에 구입을 요청하는 대부분의 책이 사리사욕에 따라 신청한 도서들이며, 그 덕에 요청의 대부분이 기각되기 마련이지만, 모미지는 포기하지 않는다."

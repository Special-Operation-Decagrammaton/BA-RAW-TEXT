13013-ProfileIntroductionTh = "เด็กสาวนักวรรณกรรมที่ต่อสู้เพื่อความรู้ในห้องสมุดของสหภาพเรดวินเทอร์\n\nต่างจากเด็กนักเรียนส่วนใหญ่ของสหภาพเรดวินเทอร์ที่พยายามต่อสู้เพื่อ\nของว่างและขนมปัง โมมิจิกลับต่อสู้เพื่อการเพิ่มจำนวนหนังสือในห้องสมุด\nที่จริงแล้ว โมมิจิเป็นโอตาคุตัวยง และหนังสือส่วนใหญ่ที่เธอยื่นคำร้องซื้อ\nไปทางสำนักเลขาธิการก็เป็นหนังสือตามความชอบส่วนตัวของเธอทั้งนั้น\nทำให้คำขอส่วนใหญ่ถูกปฏิเสธกลับมา แต่โมมิจิก็ยังคงไม่ลดละความพยายาม"

13013-ProfileIntroductionTw = "赤冬聯邦學園所屬，「知識解放戰線」的文學少女。\n\n和時常為了麵包和點心而戰的赤冬其他學生不同，他是為了讓圖書館引進更多藏書而戰。其實是個重度御宅族，向事務局申請購入的書籍也大多都是出於私人的理由，因此申請常常被駁回，但紅葉依舊會鍥而不捨地申請下去。"

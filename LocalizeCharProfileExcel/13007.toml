13007-ProfileIntroductionTh = "นักกินจอมเรื่องมากแห่งชมรมชิมอาหาร ของสถาบันเกเฮนน่า\n\nจุนโกะต่างจากสมาชิกชมรมคนอื่นที่กินจุ และชอบกินอะไรแปลกๆ เธอเป็นคนที่ดื่มด่ำในรสชาติอาหารธรรมดาๆ แต่หากเจอของอร่อยอยู่ตรงหน้า ก็จะควบคุมตัวเองไม่ได้"

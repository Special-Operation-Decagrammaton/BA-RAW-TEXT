13007-WeaponDescKr = "준코가 사용하는 두 정의 돌격소총.\n\n강력한 연사력을 지닌 이 총들만 있으면 어떤 상황에서도 식탁을 지배할 수 있다."
13007-ProfileIntroductionKr = "게헨나 미식연구회의 까탈스러운 폭식가.\n\n괴식을 먹어 치우거나 폭식을 일삼는 다른 미식연구회의 부원들과는 달리 상식적인 미식을 즐기는 편이나, 맛있는 음식을 눈앞에 두면 이성을 잃어버리곤 한다."

10025-ProfileIntroductionTh = "ผู้ฝึกสอนแห่งสวนต้นบ๊วยที่ดื่มยาที่ซายะปรุงขึ้นแล้วย้อนวัย\nกลับมาเป็นเด็กอีกครั้ง\n\nถึงแม้ร่างกายจะกลายเป็นเด็กแต่จิตใจของเธอยังคงเป็นผู้ใหญ่\nเธอจึงพยายามวางตัวให้สง่างามเหมือนตอนที่เป็นผู้ใหญ่ แต่ว่า...\nด้วยเหตุผลบางอย่าง ร่างกายที่เด็กลงของเธอก็เผลอแสดง\nท่าทางแบบเด็กๆ สมวัยออกมา..."

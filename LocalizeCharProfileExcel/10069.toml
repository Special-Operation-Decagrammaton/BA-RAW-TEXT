10069-WeaponDescTw = "瑠美愛用的衝鋒槍。\n\n雖然有著「複習學過的知識領悟出新的道理」的意思，但他似乎更關注「新事物」的樣子。"
10069-ProfileIntroductionTw = "山海經高級中學所屬，美食街「玄武商會」的會長。\n\n擁有足以將曾經只是平凡商店街的玄武商會成長為奇普托斯首屈一指的美食街的卓越經營能力。雖然被警戒著獨立勢力成長的山海經學生會敵視，但瑠美本人似乎對促進商會發展之外的事沒有興趣。"

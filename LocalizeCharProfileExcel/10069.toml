10069-WeaponDescKr = "루미가 애용하는 기관단총.\n\n'옛것을 익히고, 새것을 안다.' 는 뜻이지만, 아무래도 그녀는 '새것' 쪽에 눈길이 더 가는 모양이다."
10069-ProfileIntroductionKr = "산해경 학원 내에 존재하는 미식 거리, <현무상회>를 총괄하는 상회의 회장.\n\n탁월한 운영 능력의 소유자로 평범한 먹자골목에 불과했던 현무상회를 키보토스 전역에서 손꼽는 미식 거리로 성장시켰다. 그 때문에 독자적인 세력이 성장하는 것을 경계하는 산해경 학생회로부터는 눈엣가시로 여겨지고 있지만, 루미 본인은 상회를 발전시키는 것 이외의 일에는 관심이 없다고 한다."
10069-CharacterSSRNewKr = "혹시 배고픈 사람, 있어?"

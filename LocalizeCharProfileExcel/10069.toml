10069-WeaponDescJp = "Rumi's favorite submachine gun.\n\nNamed after an old idiom that goes, \"learn from the old to know the new.\" Rumi has always seemed more interested in the \"new\" aspect."
10069-ProfileIntroductionJp = "President of the Black Tortoise Promenade, a food district in Shanhaijing Academy.\n\nPossessing exceptional operational skills, Rumi has grown the Black Tortoise Promenade from a run-of-the-mill food alley into one of the most sought-after food districts in Kivotos. This has made her a thorn in the side of the Shanhaijing Student Council, who is wary of the growth of independent factions. Rumi denies this and claims she isn't interested in anything other than cooking and advancing the promenade."

10069-WeaponDescTh = "ปืนกลมือประจำตัวรูมิ\n\nถึงจะหมายความว่า 'เรียนรู้สิ่งเก่าเพื่อเข้าใจสิ่งใหม่' แต่ดูเหมือนเธอจะให้ความสนใจกับ 'สิ่งใหม่' มากกว่า"
10069-ProfileIntroductionTh = "ประธานย่านการค้าที่ดูแลถนนอาหารรสเลิศและ <ย่านการค้าเทพเต่าดำ> ในเขตโรงเรียนซานไห่จิง\n\nเธอมีทักษะการบริหารอันยอดเยี่ยม ทำให้ย่านการค้าเทพเต่าดำที่เคยเป็น\nแค่ย่านร้านอาหารธรรมดากลายเป็นถนนอาหารรสเลิศที่ขึ้นชื่อในคิโวทอส ด้วยเหตุนี้จึงเป็นที่ขัดหูขัดตาของสภานักเรียนซานไห่จิงที่เฝ้ามองการเติบโต\nอย่างอิสระ แต่รูมิก็บอกว่าเธอไม่สนใจอะไรนอกจากการพัฒนาย่านการค้า"
10069-CharacterSSRNewTh = "มีใครหิวข้าวอยู่หรือเปล่า?"

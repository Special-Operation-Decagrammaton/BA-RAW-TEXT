13014-ProfileIntroductionTh = "หัวหน้าหน่วยจู่โจมแห่งคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันที่ใส่ชุดว่ายน้ำ\nรับฤดูร้อน\n\nเรนเกะก็เข้าร่วมเทศกาลสวนน้ำเฮียกคิยาโคกับสมาชิกในชมรมเพื่อสนุกไปกับ\nการเป็นวัยรุ่นในฤดูร้อน ไม่ว่าใครก็ไม่อาจหยุดยั้งแพชชั่นและความปรารถนา\nอันแรงกล้าที่จะคว้าชัยชนะของเธอได้"

10063-ProfileIntroductionTw = "千年科學學園所屬，學生會「研討會」如麻煩製造機一般的天才少女。\n\n對於解讀數學暗號有著天賦之才，然而本人對此完全沒有自覺。此外，十分喜愛自己無法控制的、與運氣相關的要素，時常用各種方法測試自己的運氣。儘管苦難重重也依然不放棄。"

10063-WeaponDescTh = "ปืนกลที่ผ่านความยากลำบากและเรื่องราวต่างๆ มากับโคยูกิ\n\nครั้งหนึ่งเคยจมอยู่ใต้ทะเล ระหว่างซ่อมจึงได้เปลี่ยนสีไป\nจากสีเดิม นอกจากประสิทธิภาพที่ดีเยี่ยม ยังอึด ถึก ทน\nเช่นเดียวกับโคยูกิที่มีนิสัยไม่กังวลกับเรื่องเล็กๆ น้อยๆ"
10063-ProfileIntroductionTh = "เด็กสาวอัจฉริยะที่เป็นสาเหตุความปวดหัวของสมาชิกชมรมเซมิน่า\nแห่งโรงเรียนมิลเลเนียม\n\nถึงแม้เธอจะมีพรสวรรค์ในการถอดรหัสทางคณิตศาสตร์ที่ไม่มีใครเทียบได้\nแต่ทว่าเธอกลับไม่รู้จักประมาณตน เธอพยายามทดลองเสี่ยงโชค\nด้วยวิธีต่างๆ อยู่เสมอ แม้จะเจอปัญหาต่างๆ แต่ก็ไม่ค่อยยอมแพ้ง่ายๆ"
10063-CharacterSSRNewTh = "ตอนที่อะไรไม่เป็นไปดั่งที่ใจคิด\nนั่นแหละคือสีสันของชีวิต"

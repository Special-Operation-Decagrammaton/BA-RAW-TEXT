10034-WeaponDescKr = "미모리가 평소 가지고 다니는 자동권총.\n\n처음으로 요조숙녀가 되고자 하는 꿈을 가졌을 때 장만한 물건으로, 늘 품에서 떨어트리지 않고 소중히 다루고 있다."
10034-ProfileIntroductionKr = "백귀야행 학원 수행부의 상냥한 부부장.\n\n언제나 부드러운 미소를 띤 채, 누구에게나 상냥하게 대하는 모습 덕에 모두에게 인망이 높은 소녀. 수행부의 부장인 츠바키와는 소꿉친구 사이, 그녀가 수행부에 들어온 이유는 어려서부터 읽었던 순정만화의 영향으로 요조숙녀가 되고자 하는 꿈을 가졌기 때문이다. 그 꿈을 이루기 위해, 오늘도 그녀는 요리나 청소에 매진하며 열심히 수행하고 있다."
10034-CharacterSSRNewKr = "아직 부족한 몸입니다만.......\n수행의 성과를 보여드릴게요."

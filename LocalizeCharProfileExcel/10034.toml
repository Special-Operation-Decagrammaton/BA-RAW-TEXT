10034-ProfileIntroductionTw = "百鬼夜行學園所屬，修行部的溫柔副部長。\n\n總是保持著開朗的笑容與沉穩的舉止，因此非常受大家景仰。受年幼時閱讀的少女漫畫影響，抱有成為「大和撫子」的夢想，從而進入了修行部。與青梅竹馬兼部長的椿一起，每天都在進行料理及打掃之類的修行。"

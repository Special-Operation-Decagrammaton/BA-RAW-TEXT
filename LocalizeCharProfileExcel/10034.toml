10034-WeaponDescTh = "ปืนพกอัตโนมัติที่มิโมริพกติดตัวเป็นประจำ\n\nปืนพกที่มิโมริซื้อเป็นอย่างแรกในตอนที่เธอมีความฝัน\nอยากจะเป็นกุลสตรีที่เพียบพร้อม และเป็นสิ่งของที่เธอ\nพกติดตัวตลอดด้วยความหวงแหน"
10034-ProfileIntroductionTh = "รองหัวหน้าชมรมฝึกฝนของสหพันธ์เฮียกคิยาโค\n\nเด็กสาวที่มีรอยยิ้มอ่อนโยนบนใบหน้าเสมอ และเนื่องจากมีนิสัยอ่อนโยน ทำให้เธอเป็นที่ชื่นชอบของทุกคน มิโมริเป็นเพื่อนสมัยเด็กของสึบากิ หัวหน้าชมรมฝึกฝน และที่เธอเข้าร่วมชมรมฝึกฝน ก็เพราะเธอมีความฝัน ที่อยากจะเป็นกุลสตรีที่เพียบพร้อม ซึ่งได้อิทธิพลมาจากมังงะตาหวาน ที่อ่านในสมัยเด็กๆ และเพื่อทำให้ความฝันเป็นจริง เธอจึงพยายามฝึก\nอย่างหนักให้เป็นกุลสตรีที่เพียบพร้อมทั้งด้านการทำอาหารและการทำ\nความสะอาด"
10034-CharacterSSRNewTh = "ถึงฉันยังต้องฝึกฝนอีกมาก\nแต่ก็จะแสดงผลของการฝึกฝนให้เห็นเองค่ะ"

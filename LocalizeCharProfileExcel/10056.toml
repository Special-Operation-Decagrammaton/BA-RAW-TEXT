10056-WeaponDescTh = "ปืนไรเฟิลจู่โจมของเซรินะ\n\nไม่ได้มีไว้ใช้ฉีดยาของจริง แต่อาจมีไว้ใช้ยิงความรักของเซรินะก็เป็นได้"
10056-ProfileIntroductionTh = "เซรินะที่แปลงโฉมมาในชุดฉลองเทศกาลคริสต์มาส\n\nเซรินะเปลี่ยนเป็นชุดซานตาคลอสสุดน่ารักเหมาะกับหน้าที่ที่ตนเองได้รับ ภาพของเธอที่ร้องเพลงฉลองพิเศษ และมอบของขวัญแฮนเมดให้กับ\nคนอื่นๆ ด้วยตัวเอง ทำให้รู้สึกเหมือนกับเห็นนางฟ้าที่ลงมาอวยพรใน\nวันคริสต์มาสเลยทีเดียว "
10056-CharacterSSRNewTh = "ชมรมอัศวินบรรเทาทุกข์นำความสุขแห่งวันคริสต์มาส\nมามอบให้ทุกคนแล้วค่ะ เมอร์รี คริสต์มาสค่ะ!"

20004-WeaponDescTw = "麻白在實現正義部活動時所使用的狙擊槍。\n\n即使身處光芒閃爍的沙灘，他也一如往常地貫徹著正義。"
20004-ProfileIntroductionTw = "三一綜合學園所屬，以陪同弦生部長的形式來到了海邊，實現正義部的誠實委員。\n\n閃耀的大海，熠熠發光的沙灘。即使身處於這樣任誰會興奮的情境，麻白首先思考的仍是正義和訓練。要說為何的話，因為那就是他所相信的正義。"

13005-WeaponDescKr = "카요코가 늘 휴대하고 다니는 권총.\n\n그 이름처럼 사격할 때마다 엄청난 굉음을 내기 때문에 실내에서는 꼭 소음기를 장착해야 한다."
13005-ProfileIntroductionKr = "흥신소 68의 과장.\n\n다른 흥신소 68의 멤버들과는 다르게 악의가 없음에도 불구하고 타고난 얼굴이 무섭다는 이유 하나만으로 불량배로 오인받곤 한다. 카요코 본인은 그런 오해들에 대해 침묵으로 일관하는 중이지만, 오히려 그 때문에 무서운 사람이라는 이미지가 더욱 짙어지고 있다."

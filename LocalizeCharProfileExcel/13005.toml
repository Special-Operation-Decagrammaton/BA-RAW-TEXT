13005-WeaponDescTw = "佳世子經常隨身攜帶的手槍。\n\n直接使用的話會名副其實地在每次射擊時發出巨大轟鳴聲，因此基本上都裝著消音器。"
13005-ProfileIntroductionTw = "格黑娜學園所屬，便利屋68的課長。\n\n和其他便利屋68的成員不同，儘管他沒有惡意，只因為天生擁有著一張嚇人的臉蛋，經常被誤認為是不良少女。\n面對那種誤會，佳世子本人一律沉默以對。但反而因此陷入了加深自己可怕形象的惡性循環。"

13005-WeaponDescTh = "ปืนพกของคาโยโกะที่เธอมักจะพกติดตัวไปด้วยเสมอ\n\nปืนพกที่ส่งเสียงดังสนั่นสมกับชื่อทุกครั้งที่ยิงออกไป\nเพื่อลดเสียงเวลายิงภายในอาคารจึงต้องใส่ที่เก็บเสียงเสมอ"
13005-ProfileIntroductionTh = "หัวหน้าฝ่ายของหน่วยรับจ้างสารพัด 68\n\nคาโยโกะต่างจากสมาชิกหน่วยรับจ้างสารพัด 68 คนอื่นตรงที่เธอไม่ สนใจในเรื่องที่ไม่ดี เหตุผลเดียวที่เธอถูกเข้าใจผิดว่าเป็นอันธพาล คือหน้าตาที่น่ากลัวของเธอ เธอเลือกที่จะนิ่งเฉยให้กับการที่คนอื่นเข้าใจเธอผิด แต่ความเงียบของเธอ ยิ่งทำให้เธอดูน่ากลัวมากขึ้น"

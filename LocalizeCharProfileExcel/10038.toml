10038-WeaponDescKr = "미야코가 SRT 특수학원에서 지급받은 제식 기관단총.\n\n높은 신뢰성을 지닌 기관단총으로 극한의 상황에서도 효과적으로 적을 섬멸할 수 있다."
10038-ProfileIntroductionKr = "SRT 특수학원 RABBIT 소대의 소대장. 콜사인은 <RABBIT 1>.\n\n정의롭게 작전을 수행하는 선배들의 모습을 동경하여 SRT 특수학원에 입학하였으나, 갑작스럽게 학원이 폐쇄되며 현재는 공원에서 소대원들과 함께 노숙을 하고 있다. 표정 변화가 드물고 감정을 드러내는 일이 거의 없기 때문에 주변으로부터 무뚝뚝하다는 평가를 받고 있지만, 사실은 언제나 소대원들을 걱정하는 상냥한 마음씨의 소유자다."
10038-CharacterSSRNewKr = "RABBIT 1. 작전을 시작합니다."

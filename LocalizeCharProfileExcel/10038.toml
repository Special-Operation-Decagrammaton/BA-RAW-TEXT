10038-WeaponDescTh = "ปืนกลมือมาตรฐานที่มิยาโกะได้รับจากสถาบัน SRT\n\nปืนกลมือที่มีประสิทธิภาพการทำลายล้างศัตรูสูง และกำจัดศัตรูได้อย่างแม่นยำแม้อยู่ในสถานการณ์วิกฤต"
10038-ProfileIntroductionTh = "หัวหน้ากองทหาร RABBIT แห่งสถาบันพิเศษ SRT รหัสประจำตัว\n<RABBIT 1>\n\nมิยาโกะสมัครเข้าเรียนที่สถาบันพิเศษ SRT เพราะรู้สึกชื่นชมเหล่ารุ่นพี่ ที่ปฏิบัติงานด้วยความยุติธรรม แต่สถาบันพิเศษ SRT กลับปิดตัวอย่างกะทันหัน ตอนนี้เธอจึงไร้ที่อยู่ และไปอาศัยอยู่ที่สวนสาธารณะกับสมาชิกคนอื่นๆ เธอไม่ค่อยแสดงออก และไม่ค่อยเปิดเผยอารมณ์ให้คนอื่นได้รับรู้เท่าไรนัก คนส่วนใหญ่จึงมักจะตัดสินว่าเธอเป็นคนขวานผ่าซาก แต่ที่จริงแล้ว เธอเป็นคนจิตใจดี และคอยเป็นห่วงสมาชิกกองทหารอยู่เสมอ"
10038-CharacterSSRNewTh = "RABBIT 1 ออกปฏิบัติการค่ะ"

10038-ProfileIntroductionTw = "SRT特殊學園所屬，RABBIT小隊的小隊長。\n\n因為憧憬著前輩們的活躍而進入SRT特殊學園就讀，然而學園卻突然被關閉。現在過著和小隊成員們一起在公園露宿的生活。因為表情的變化很少，也幾乎不曾表露感情，身邊的人都覺得他很木訥。不過其實時常在心裡關心著隊員們，擁有一顆溫柔的心。\n代號為「RABBIT1」。"
10038-CharacterSSRNewTw = "這裡是RABBIT1，即刻開始作戰"

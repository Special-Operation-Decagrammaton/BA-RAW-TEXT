26012-WeaponDescTh = "ปืนพกรุ่นมาตรฐานที่คิริโนะได้รับมาจากสถาบันฝึกตำรวจวัลคิรี่\n\nความรับผิดชอบในหน้าที่ไลฟ์การ์ดของเธอในตอนนี้ ทำให้เธอรู้สึกว่าตัวเองยิงแม่นขึ้น"
26012-ProfileIntroductionTh = "นักเรียนตำรวจไฟแรงจากสำนักรักษาความปลอดภัย สถาบันฝึกตำรวจวัลคิรี่ ปัจจุบันอยู่ในโหมดไลฟ์การ์ด\n\nแม้ความสามารถจะไม่มากเท่าความมุ่งมั่นตั้งใจในการทำภารกิจ แต่เธอก็ทำภารกิจอย่างขยันขันแข็ง และพยายามอย่างสุดกำลัง เพื่อทำงานไลฟ์การ์ดที่ได้รับมอบหมาย"

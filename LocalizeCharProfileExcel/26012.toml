26012-ProfileIntroductionKr = "발키리 경찰학교 생활안전국의 열혈 경찰 학생. 이번에는 라이프가드 모드.\n\n임무에 대한 의욕은 넘치지만 실력은 그에 미치지 못한다. 그럼에도 불구하고 업무에 성실히 임하고 있으며, 라이프가드 역할을 수행하기 위해 노력을 아끼지 않고 있다."

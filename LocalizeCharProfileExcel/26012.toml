26012-ProfileIntroductionTw = "被派遣擔任救生員一職的女武神警察學園所屬，生活安全局的熱血警察學生。這次切換成了救生員模式。\n\n對任務充滿熱誠，可惜實力卻沒能跟上鬥志。不過即便如此，他依然兢兢業業地執行著自己的任務，不遺餘力地做好救生員該做的工作。"

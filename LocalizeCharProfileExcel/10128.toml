10128-ProfileIntroductionTh = "ผู้รับผิดชอบด้านธุรกิจและกลวิธีของชมรมการค้าพิเศษที่ลักลอบ\nทำการค้าผิดกฎหมาย\n\nทำหน้าที่รับงานและพบปะลูกค้า เสมือนหน้าตาของชมรมการค้าพิเศษ แม้จะมีความมั่นใจในตัวเองสูงและทำตัวตามสบายเสมอ แต่ถ้าสถานการณ์ไม่เป็นไปตามที่คาดหวัง ฟุยุก็จะจิตหลุดให้เห็นได้ง่ายๆ"
10128-CharacterSSRNewTh = "อยากได้สินค้าอะไรหรือเปล่าคะ?"

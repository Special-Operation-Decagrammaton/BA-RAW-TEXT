10036-WeaponDescTh = "ปืนพกที่ฮินาตะพกติดตัวไปด้วยเสมอ\n\nฮินาตะมักใช้เพื่อช่วยเหลือผู้คนที่ลำบาก เช่น ใช้สะเดาะกุญแจที่พัง"
10036-ProfileIntroductionTh = "เด็กสาวที่ใสซื่อบริสุทธิ์จากชมรมซิสเตอร์\n\nเด็กสาวผู้รับผิดชอบการดูแลมหาวิหารของทรีนิตี้ มักจะมุ่งมั่นตั้งใจทำงานที่ได้รับมอบหมายให้สำเร็จอย่างขยันขันแข็ง แต่ว่าด้วยนิสัยโก๊ะกังของเธอ จึงมักทำให้ก่อเรื่องผิดพลาดเล็กๆ น้อยๆ ขึ้นบ่อยๆ จึงทำให้เธอไม่ค่อยมั่นใจในตัวเอง ถึงในกระเป๋าใบใหญ่ ที่เธอถือติดตัวเป็นประจำจะมีปืนกลขนาดใหญ่อยู่ข้างใน แต่เธอก็หิ้วไปไหนมาไหนได้อย่างสบายๆ เหมือนไม่หนัก"
10036-CharacterSSRNewTh = "มีอะไรให้ฉันช่วยหรือเปล่าคะ?"

10036-ProfileIntroductionTw = "三一綜合學園所屬，修女會勤勞又善良的少女。\n\n負責三一大教堂的管理重責，能勤勞地完成交付的工作，對任何人都很親切。但是個性迷糊，經常會出錯，對自己比較沒有信心。\n雖然每天帶在身上的背包裡裝著巨大的設置型榴彈機關槍，但從來都沒有顯露出很重的感覺。"

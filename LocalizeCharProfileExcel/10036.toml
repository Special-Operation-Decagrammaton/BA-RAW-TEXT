10036-WeaponDescKr = "히나타가 항상 소지하고 다니는 권총.\n\n보통은 고장난 자물쇠를 따는 등 곤란한 사람들을 돕기 위해 사용된다."
10036-ProfileIntroductionKr = "시스터후드 소속의 성실하고 선량한 소녀.\n\n트리니티 대성당의 관리라는 중책을 맡고 있는 책임자로, 주어진 일은 성실히 완수하며 누구에게나 친절하다. 하지만 덜렁대는 성격 탓에 실수를 자주 저질러 스스로에 대한 자신감은 부족한 편. 늘 들고 다니는 가방에는 거대한 설치형 유탄 기관총이 들어 있지만, 무거워하는 기색을 내비친 적은 한 번도 없다."
10036-CharacterSSRNewKr = "뭔가 도움이 필요하신가요?"

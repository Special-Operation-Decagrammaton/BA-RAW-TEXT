10096-WeaponDescTh = "ปืนพกรุ่นมาตรฐานที่คันนะได้รับมาจากสถาบัน\nฝึกตำรวจวัลคิรี่\n\nถูกปรับแต่งให้กันน้ำได้เพื่อให้ใช้ลงพื้นที่ได้อย่าง\nมีประสิทธิภาพ"
10096-ProfileIntroductionTh = "หัวหน้ากรมฯ แห่งสถาบันฝึกตำรวจวัลคิรี่ที่ถูกส่งตัวมาเป็นไลฟ์การ์ด\n\nแม้จะมีความสามารถในการว่ายน้ำ ตรวจจับอันตราย และวิเคราะห์\nสถานการณ์ในระดับสูงกว่าเกณฑ์เฉลี่ย แต่รูปลักษณ์เฉพาะตัวของเธอ ทำให้ต้องเผชิญความยากลำบากในงานบริการเพื่อประชาชนในครั้งนี้"
10096-CharacterSSRNewTh = "ถ้ามีสถานการณ์ฉุกเฉินก็เรียกได้เลย แล้วฉันจะรีบไป"

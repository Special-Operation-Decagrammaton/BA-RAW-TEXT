20029-WeaponDescKr = "미모리의 자동권총.\n\n요조숙녀를 향한 수행은 어디에서든 멈추지 않는다. 그것이 여름의 바다라고 해도."
20029-ProfileIntroductionKr = "여름이라는 시기, 바다라는 장소를 맞아 수영복으로 갈아입은 수행부의 부부장.\n\n언제나 부드러운 미소와 상냥한 태도로 모두의 인망을 사고 있는 소녀. 그렇게 평소에는 늘 차분한 모습을 보여주는 그녀지만, 특별히 수영복으로 갈아입은 지금만큼은 평소보다 조금 더 들떠 보이는 기색이다."
20029-CharacterSSRNewKr = "이대로, 이 시간이 끝나지 않을 수 있다면……"

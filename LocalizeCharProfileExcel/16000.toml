16000-ProfileIntroductionEn = "A senior member of Problem Solver 68.\n\nHer gloomy personality has made her the target of bullies since childhood. Only recently was Aru able to help her put a stop to the harassment. Since then, she has been the youngest senior member of Problem Solver 68. She may be timid and have painfully low self-esteem, but may also be the most terrifying member of her club because of her ideas alone."

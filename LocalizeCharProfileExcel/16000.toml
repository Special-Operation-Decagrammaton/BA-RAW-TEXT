16000-ProfileIntroductionKr = "흥신소 68의 정직원.\n\n\r어둡고 음침한 성격 때문에 어릴 적부터 계속 괴롭힘을 당해오다가 최근에야 아루의 도움으로 괴롭힘에서 벗어나게 되었다. 이후 흥신소 68의 정규직 막내로 활동하는 중. 소심하고 자존감이 낮지만 발상만큼은 흥신소 직원 중 제일 무서울지도?"

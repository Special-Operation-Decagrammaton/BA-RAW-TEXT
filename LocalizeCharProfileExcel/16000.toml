16000-WeaponDescTh = "ปืนลูกซองของฮารุกะที่เธอใช้ในการไล่แมลง\n\nอีกทั้งยังใช้กำจัด \"สิ่งมีชีวิตที่เหมือนแมลง\" อีกด้วย"
16000-ProfileIntroductionTh = "พนักงานประจำของหน่วยรับจ้างสารพัด 68\n\n เธอถูกรังแกในโรงเรียนมาตั้งแต่เด็ก เพราะมีบุคลิกที่ดูเศร้าหมอง\nแต่ด้วยความช่วยเหลือของอารุ ทำให้เธอไม่ตกเป็นเป้าอีกต่อไป\nปัจจุบันเธอเป็นพนักงานประจำ และเป็นน้องเล็กที่สุดในหน่วยรับจ้าง\nสารพัด 68 ถึงเธอจะขี้กลัว และขาดความภูมิใจในตัวเอง แต่ความคิด\nของเธอเรียกได้ว่า น่ากลัวที่สุดในหน่วยเลย"

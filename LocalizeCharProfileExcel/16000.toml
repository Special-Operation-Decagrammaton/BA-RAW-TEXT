16000-ProfileIntroductionTw = "格黑娜學園所屬，便利屋68的職員。\n\n由於個性黑暗陰沉，從小就一直被欺負。直到最近才在亞瑠的幫助下擺脫被欺負的困境。之後，他便作為便利屋68年紀最小的員工活動著。\n雖然膽小且自尊心很低，但他的突發奇想說是便利屋職員中最可怕的也不為過。"

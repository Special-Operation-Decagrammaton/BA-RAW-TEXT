20036-WeaponDescTw = "隨著茜香來到渡假村的突擊步槍。\n\n就連休假時也不曾懈怠。為了享受最充實的休假而保持著最佳狀態。"
20036-ProfileIntroductionTw = "為了享受最棒的休假而來到渡假村的阿拜多斯高中所屬，對策委員會的會計負責人。\n\n即使面對接踵而來的失敗也不氣餒，拿出和打工時同樣認真的態度來享受休假。儘管乍看之下像是被休假計畫追著跑，其實已經在不知不覺中，和大家度過了一段美好的時光。"
20036-CharacterSSRNewTw = "這次休假！我一定要好好享受！！"

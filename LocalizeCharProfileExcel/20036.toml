20036-WeaponDescKr = "휴가 중의 리조트까지 따라온 세리카의 돌격소총.\n\n휴가 중이라도 헤이해짐은 없다. 오히려 최고로 성실한 휴가를 즐기기 위해 최상의 상태를 유지한다."
20036-ProfileIntroductionKr = "최고의 휴가를 즐기기 위해 리조트를 찾은 대책위원회의 회계.\n\n거듭되는 실패에도 굴하지 않고, 휴가 또한 아르바이트만큼이나 성실하게 즐기고자 한다. 얼핏 그마저도 쫓기는 것처럼 보이지만, 자기도 모르게 모두와 함께하는 시간을 잘 즐기고 있다."
20036-CharacterSSRNewKr = "반드시 즐기고야 말 테니까! 최고의 휴가!!"

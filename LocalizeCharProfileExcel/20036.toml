20036-WeaponDescTh = "ปืนไรเฟิลจู่โจมของเซริกะที่ติดตัวเธอมาด้วยถึงรีสอร์ต\nที่มาพักร้อน\n\nต่อให้เป็นช่วงลาพักร้อนก็ไม่มีทางแยกจากกัน ตอนนี้อยู่ในสภาพดีที่สุดเพื่อเพลิดเพลินกับวันหยุดสุดขีด"
20036-ProfileIntroductionTh = "เหรัญญิกแห่งคณะกรรมการแผนงานที่มาพักร้อนที่รีสอร์ต\n\nเธอไม่ยอมแพ้ต่อความล้มเหลวซ้ำแล้วซ้ำเล่า และตั้งใจทุ่มเทให้กับวันหยุดพักร้อน ไม่ต่างกับการทำงานพิเศษ ถ้ามองผ่านๆ อาจดูเหมือนกำลังถูกไล่ล่าโดยอะไรสักอย่าง แต่จริงๆ แล้วเธอกำลังเพลิดเพลินอยู่กับทุกคนโดยที่เธอเองก็ไม่รู้ตัว"
20036-CharacterSSRNewTh = "พักร้อนนี้ฉันต้องสนุกให้ได้! สุดยอดแห่งการพักร้อน!"

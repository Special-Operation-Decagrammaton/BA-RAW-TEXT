10060-ProfileIntroductionTw = "格黑娜學園所屬，溫泉開發部的心臟，也是開發現場的作業班長。\n\n打從心底相信「拆除」可以解決所有的問題。\n豪爽豁然的性格與出眾的拆除能力受到溫泉開發部所有人的信賴。"

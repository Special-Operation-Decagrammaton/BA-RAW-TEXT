10060-WeaponDescEn = "Megu's one-of-a-kind flamethrower. When she takes it out, it becomes like an extension of her.\n\nNo one else can handle it due to the immense amounts of heat it gives off. Its interesting name comes from a pun that someone made about her once."
10060-ProfileIntroductionEn = "The backbone of the Hot Springs Department and foreman at their construction sites.\n\nShe believes with all her heart that demolition can solve any problem.\nHer personality is bold and confident, and she's earned the trust of everyone in the Hot Springs Department due to her excellent demolition skills."
10060-CharacterSSRNewEn = "Is there a problem? Let me handle it!"

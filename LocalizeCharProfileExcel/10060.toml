10060-WeaponDescKr = "현장에선 메구와 한 몸이나 다름없는, 메구 전용의 화염방사기.\n\n\r엄청난 열기를 내뿜기 때문에 다른 사람들은 감당조차 하기 어렵다. 이름이 이상한 이유는, 누군가 던졌던 말장난을 마음에 들어해 그대로 이름 붙였기 때문이다."
10060-ProfileIntroductionKr = "온천개발부의 중추이자 개발현장의 작업반장.\n\n\r매사의 모든 문제를 '치워버리는 것'으로 해결할 수 있다고 믿는다. 호탕하고 시원한 성격, 발군의 철거 능력으로 온천개발부 모두에게서 두터운 신임을 얻고 있다."
10060-CharacterSSRNewKr = "장애물이라고? 전부 나한테 맡기시라!"

10060-WeaponDescTh = "เครื่องพ่นไฟที่เมกุใช้ประจำ ราวกับเป็นอวัยวะชิ้นหนึ่ง\n\nเครื่องพ่นไฟนี้ปล่อยไฟอุณหภูมิสูงจนใครๆ ก็ไม่อาจต้าน\nทานได้ ชื่อที่เป็นเอกลักษณ์นี้ได้มาจากคำพูดเล่นตลก\nของใครคนหนึ่ง แต่เมกุดันชอบใจ จึงนำมาตั้งเป็นชื่อปืนของตนเอง"
10060-ProfileIntroductionTh = "หัวหน้าทีมงานภาคสนาม และแกนนำของชมรมพัฒนาออนเซ็น\n\nเธอมีความเชื่อและศรัทธาอย่างสุดหัวใจว่า ปัญหาทุกอย่างสามารถแก้ไขได้ด้วย \"การกำจัดทิ้ง\"\nด้วยอุปนิสัยที่ร่าเริง และใจกว้างของเธอ รวมถึงทักษะการรื้อถอนที่โดดเด่น ทำให้เธอเป็นที่ไว้วางใจของสมาชิกชมรมพัฒนาออนเซ็นคนอื่นๆ อย่างมาก"
10060-CharacterSSRNewTh = "สิ่งกีดขวางเหรอ? ปล่อยให้เป็นหน้าที่ฉันเอง!"

10120-ProfileIntroductionTw = "三一綜合學園所屬，放學後的甜點部的成員，同時也是臨時組成的樂團「Sugar Rush」的鼓手兼行程管理負責人。\n\n雖然看似對「搖滾」精神有著最深刻的洞察，他本人卻從未好好解釋過。因為解釋這件事情……並不搖滾。"
10120-CharacterSSRNewTw = "啊啊……要跟我一同踏上「搖滾」之路嗎？"

10120-WeaponDescJp = "Natsu's submachine gun.\n\nA weapon used as a last resort by the typically peaceful Natsu, because sometimes the world demands action, not contemplation. Its bullets fire with a rhythmic cadence, much like a drumbeat."
10120-ProfileIntroductionJp = "A member of the After-School Sweets Club and the drummer and schedule manager of the hastily formed band Sugar Rush.\n\nShe enjoys philosophizing on the meaning of \"rock,\" but she never fully defines it. Because, of course, it is not \"rock\" to explain."
10120-CharacterSSRNewJp = "Ah... Let us walk the path of ROCK together."

10120-ProfileIntroductionKr = "트리니티 방과후 디저트부의 부원이자 급조된 밴드 <슈가러시>의 드러머이자 스케줄 관리 담당.\n\n'록'의 정신에 대해 가장 깊이 통찰하고 있는 듯하지만, 본인도 제대로 설명해 주지는 않는다. 그것을 설명하는 것은 록하지 못하기에."

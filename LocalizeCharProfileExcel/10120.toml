10120-WeaponDescTh = "ปืนกลมือของนัตสึ\n\nมันคือทางออกสุดท้ายของปัญหาที่ไม่อาจแก้ไขได้ ด้วยการคิดเพียงอย่างเดียว แต่ในโลกที่ซับซ้อนนี้ บางครั้งก็ต้องมีวิธีแก้ไขที่ก้าวหน้ากว่านั้น"
10120-ProfileIntroductionTh = "สมาชิกชมรมของหวานหลังเลิกเรียนแห่งโรงเรียนทรีนิตี้ ควบตำแหน่งผู้จัดตารางเวลา และมือกลองของวง <Sugar Rush> ที่ตั้งขึ้นมาเร่งด่วน\n\nถึงจะดูเหมือนว่าเธอเข้าใจในจิตวิญญาณเพลง 'ร็อก' อย่างลึกซึ้ง แต่ก็ไม่อาจอธิบายออกมาได้ เพราะการอธิบายมันไม่ร็อก"
10120-CharacterSSRNewTh = "เทส เทส... อยากก้าวไปด้วยกันมั้ย? ก้าวไปสู่เส้นทาง 'ร็อก'"

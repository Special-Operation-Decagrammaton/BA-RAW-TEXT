26008-HobbyTh = "ต้อนรับลูกค้า, แสดงเป็นไอดอล"
26008-WeaponNameTh = "Sakura Bonbon"
26008-WeaponDescTh = "ปืนลูกซองแบบโยนลำ (ปั้มแอ็กชัน) ที่ชิซุโกะนำมาใช้ที่ทะเลฤดูร้อนด้วย\n\nปืนที่มีกลิ่นของอันมิตสึจางๆ ติดอยู่ แต่ในตอนนี้มีกลิ่นของน้ำทะเลกระจายไปทั่ว"
26008-ProfileIntroductionTh = "หัวหน้าชมรมจัดงานเทศกาลที่กระตือรือร้นสุดๆ แม้ในฤดูร้อน\n\nหัวหน้าชมรมผู้มีความปรารถนาที่จะขยายสาขาร้านเฮียกคิยาโค\nไปให้ทั่วคิโวทอส ในวันนี้ความฝันของเธอก็ดำเนินต่อไป\n ถึงแม้จะยากลำบากแค่ไหน หรือมีอุปสรรคใดก็ไม่หวั่น หากเป็น\nสถานที่ที่เธอสามารถก้าวเข้าไปถึงแล้วละก็ สาวน้อยแห่งฤดูร้อน\nผู้ไม่หวั่นเกรงสิ่งใดก็จะไปให้ถึงทุกที่"

26008-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，即使在夏天也依然充滿野心的節慶營運管理部部長。\n\n為了讓百夜堂成長為奇普托斯頂尖連鎖店，今天也要燃燒熱情。無論任何阻礙，只要有偶像鐵拳就不成問題。只要是伸手可及的東西就都要爭取，夏日少女天下無敵。"

26008-HobbyKr = "귀여운 접객, 아이돌 펀치"
26008-WeaponNameKr = "사쿠라 봉봉"
26008-WeaponDescKr = "여름에도, 바다에서도 시즈코가 사용하는 펌프 액션 산탄총.\n\n\r여전히 안미츠의 냄새가 은은하게 감돌지만, 이제 그 향기를 전 바다를 향해 넓힐 때다."
26008-ProfileIntroductionKr = "여름에도 여전히 야심과 포부로 가득 찬 마츠리운영관리부의 부장님.\n\n\r백야당을 전 키보토스적인 프랜차이즈로 성장시키기 위한 부장님의 열정은 오늘도 계속된다. 어떤 고난도, 장애물도 아이돌 펀치와 함께라면 문제 되지 않는다. 닿을 수 있는 것이라면, 무엇이든 쟁취해내고야 마는 여름의 소녀에게 두려울 것은 없다."

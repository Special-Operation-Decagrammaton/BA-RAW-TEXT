10126-WeaponDescTh = "ปืนลูกซองที่คาโนเอะชอบใช้\n\nปืนนี้ยิงออกได้ด้วยปฏิกิริยาเคมีจากการเล่นแร่แปรธาตุ... แน่นอนว่านี่เป็นเพียงคำกล่าวอ้างของคาโนเอะเท่านั้น"
10126-ProfileIntroductionTh = "สมาชิกชมรมวิจัยรหัสยศาสตร์ที่ศึกษาสารพันเรื่องลึกลับในศิลปะ\n\nคาโนเอะเป็นนักเรียนชั้นปีที่ 3 เพียงคนเดียวในชมรมรหัสยศาสตร์ ถึงจะไม่ใช่ประธานชมรม แต่เธอก็รับหน้าที่ผู้ช่วยดูแลสมาชิกในชมรม รูปลักษณ์และพฤติกรรมที่ชวนสงสัยทำให้เกิดข่าวลือว่า เธอเองคือสิ่งลึกลับดีๆ อย่างหนึ่ง"
10126-CharacterSSRNewTh = "ฉันจับตาดู... มาตั้งแต่ชาติก่อนเลยละ..."

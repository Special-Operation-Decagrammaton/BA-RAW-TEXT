10017-WeaponDescKr = "체리노가 누군가를 숙청할 때 사용하는 권총.\n\n방아쇠를 당길 필요도 없이 총구를 겨누고 \"숙청!\" 이라고 외치면 숙청된다."
10017-ProfileIntroductionKr = "붉은겨울 학원의 학생회장.\n\n권력에 대한 집착과 욕심이 어마어마하며, 매주 혁명으로 실각해도 어떻게 해서든 학생회장의 자리에 복귀하곤 한다. 코에 달고 있는 가짜 콧수염은 권위의 상징으로, 체리노는 자신의 권위가 이 콧수염에서 나온다고 믿고 있다."
10017-CharacterSSRNewKr = "가장 높은 권위와 마주할 수 있는 영광을!"

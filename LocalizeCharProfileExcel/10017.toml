10017-ProfileIntroductionTw = "赤冬聯邦學園所屬，蠻橫又孩子氣的學生會長。\n\n對權力的執著與慾望十分驚人，即使每週都因為革命而失勢，卻能不斷設法回到學生會長的寶座。\n貼在鼻子下面的鬍子據潔莉諾所說是「權威的象徵」、以及「所謂的權威就是由鬍子而來的」。"

26009-ProfileIntroductionKr = "C&C로 오해받아 메이드복을 입게 된 밀레니엄 게임개발부의 부장.\n\n새로운 옷을 입었어도 소심한 성격은 그대로이나, 그 덕분에 할 수 있는 일이 늘어나기도 했다. 익숙하지 않은 사건들뿐이지만, 게임개발부의 모두와 함께 극복하려 한다."

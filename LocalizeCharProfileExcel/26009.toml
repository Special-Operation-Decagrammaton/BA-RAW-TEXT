26009-ProfileIntroductionTh = "หัวหน้าชมรมพัฒนาเกมของมิลเลเนียมที่ได้ใส่ชุดเมดเพราะถูกเข้าใจผิดว่าเป็น C&C\n\nแม้จะได้ใส่ชุดใหม่ แต่นิสัยขี้กลัวก็ยังคงเหมือนเก่า แต่นั่นก็ทำให้เธอทำอะไรได้\nมากขึ้นกว่าเดิมด้วย แม้ต้องเจอแต่เหตุการณ์ที่ไม่คุ้นเคย แต่เธอก็ตั้งใจจะฝ่าฟัน\nไปให้ได้พร้อมกับชมรมพัฒนาเกม"

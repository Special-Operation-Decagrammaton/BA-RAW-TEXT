10079-ProfileIntroductionTw = "常盤台中學所屬的女國中生。\n\n為超能力者雲集的「學園都市」裡也僅有七名的頂尖超能力者「LEVEL5」中的一人。所使用的超能力為能夠自由操控強大電能的「電擊能力者(Electro Master)」，但在被傳送至奇普托斯後，似乎無法像以前一樣隨心所欲地使用能力。面對任何人都會以親切的態度對待，由於心地善良所以和其他學生的關係都不錯。是青蛙角色「呱太」的粉絲。"

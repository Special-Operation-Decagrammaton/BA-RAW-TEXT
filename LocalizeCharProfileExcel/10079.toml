10079-WeaponDescKr = "미사카 미코토를 위해 엔지니어부에서 만들어 준 전용 총기.\n\n전기 능력자인 그녀를 위해, '특별한' 기능도 추가돼 있다."
10079-ProfileIntroductionKr = "토키와다이 중학교 소속의 여중생.\n\n수많은 초능력자가 존재하는 학원도시에서도 7명 밖에 없는 정상급 초능력자 레벨 5 중 한 명. 사용하는 초능력은 강력한 전기를 자유자재로 조종하는 전격 사용(일렉트로마스터)이지만, 키보토스로 전이된 이후 능력 사용에 어려움을 겪고 있다. 누구에게나 편한 말투로 대하며, 상냥한 마음씨라 다른 학생들과도 사이가 좋다. 개구리 캐릭터 <게코타>의 팬이다."
10079-CharacterSSRNewKr = "정말이지, 이곳도 정신없긴 매한가지네."

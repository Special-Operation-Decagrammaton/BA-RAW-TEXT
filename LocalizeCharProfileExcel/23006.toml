23006-WeaponDescTw = "靜子所使用的泵動式霰彈槍。\n\n據靜子所說，似乎是「隱約散發出百夜堂招牌商品餡蜜的香氣，世上獨一無二的珍品」。"
23006-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，節慶營運管理部的部長。\n\n同時也是百鬼夜行的傳統茶室「百夜堂」的看板娘兼老闆。\n雖然平常是「在百夜堂工作的冒失女孩」，不過那只不過是身為看板娘的一面而已。\n實際上是為了慶典成功和提高百夜堂的營收的話，什麼事都會完成的、具有專家氣質的少女。\n然而只要鬆懈下來就會率直地表現出感情，因此不只是親近的朋友，就連老師已經看穿了。"

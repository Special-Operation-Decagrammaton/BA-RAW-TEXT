23006-WeaponDescKr = "시즈코가 사용하는 펌프 액션 산탄총.\n\n시즈코가 말하길 '백야당의 명물인 안미츠의 냄새가 은은하게 감도는, 이 세상에 단 하나뿐인 물건'이라는 모양이다."
23006-ProfileIntroductionKr = "백귀야행 학원 마츠리운영관리부의 부장.\n\n동시에 백귀야행의 전통 찻집 <백야당>의 마스코트 소녀. 평소 덜렁이를 연기하지만, 그건 어디까지나 팔리는 아이돌로서 꾸며낸 모습. 실제로는 축제의 성공과 백야당의 매출을 위해서라면 어떤 일이든 해내는 프로 내숭쟁이. 다만 매사 감정 표현이 솔직하기 때문에 친한 친구들은 물론, 선생님에겐 전부 들통나 있다."

13006-ProfileIntroductionTw = "格黑娜學園所屬，便利屋68的行動派。\n\n和時常因罪惡感而煩惱的亞瑠不同，是個可以毫不猶豫地做壞事、以混亂為樂的小惡魔一般的少女。\n和亞瑠是青梅竹馬，因此比任何人都清楚他只是在虛張聲勢，然而卻不會特別為他著想。"

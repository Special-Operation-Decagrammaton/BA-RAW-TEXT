13006-WeaponDescKr = "무츠키가 가지고 다니는 다목적 기관총.\n\n재미있는 장난을 위해서라면 화력도 중요하다, 고 무츠키는 말한다."
13006-ProfileIntroductionKr = "흥신소 68의 행동대장 겸 돌격대장.\n\n어느 정도 양심의 가책을 느낄 줄 아는 아루와는 달리 거리낌 없이 악행을 저지르고 말썽을 즐기는 소악마 같은 소녀. 아루와는 오랜 친구 사이로 그녀의 허세를 누구보다도 잘 이해하고 있지만, 딱히 배려해주지는 않는다."

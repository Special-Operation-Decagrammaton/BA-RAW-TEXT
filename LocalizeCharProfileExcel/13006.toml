13006-WeaponDescTh = "ปืนกลที่มุสึกิพกติดตัวไปด้วยไม่เคยห่าง\n\nมุสึกิบอกเอาไว้ว่า ปืนก็เป็นส่วนประกอบหนึ่งของการ\nกลั่นแกล้งที่สำคัญ"
13006-ProfileIntroductionTh = "ผู้ควบตำแหน่งหัวหน้าปฏิบัติการ และหัวหน้าหน่วยจู่โจม แห่งหน่วยรับจ้างสารพัด 68\n\nเธอต่างจากอารุที่มีจิตสำนึก และความรู้สึกผิดชอบชั่วดี มุสึกิเป็นปีศาจน้อย ที่ก่อเรื่องไม่ดีได้อย่างไม่ลังเล เธอเป็นเพื่อนกับอารุมานาน จนรู้นิสัยของอารุดีกว่าใคร แต่ก็ไม่ได้แปลว่าเธอจะยอมให้อารุเสมอไป"

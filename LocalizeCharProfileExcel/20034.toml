20034-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อาคาริใช้เป็นประจำ\n\nทุกอย่างที่เป็นอุปสรรคในการท่องเที่ยวและการกิน\nของเธอจะต้องมาเจอกับปืนนี้ก่อน"
20034-ProfileIntroductionTh = "อาคาริที่เปลี่ยนมาใส่ชุดที่เข้ากับปีใหม่\n\nแม้ว่าเธอจะยิ้มอย่างอ่อนโยนเหมือนทุกครั้ง แต่สีหน้าก็ดูมีความตื่นเต้น\nกว่าปกติอยู่เล็กน้อย นี่อาจเป็นเพราะความคาดหวังที่มีต่อปีใหม่ หรือว่าจะเป็นอย่างอื่น..."
20034-CharacterSSRNewTh = "ปีใหม่ก็ต้องตัดสินใจสิคะว่าจะกินอะไรก่อน\nแล้วก็จะกินมากแค่ไหนด้วยค่ะ"

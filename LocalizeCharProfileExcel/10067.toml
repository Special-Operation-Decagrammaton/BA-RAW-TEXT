10067-WeaponDescKr = "토키 전용의 돌격소총.\n\n\r통상 임무뿐만이 아니라 비밀 작전에도 적합하다고 그녀는 주장한다. 그 주장에 대한 증명은, 보통 그녀 스스로의 손으로 이루어진다."
10067-ProfileIntroductionKr = "잠입 작전 복장이라면 당연히 바니걸이라고 생각해 갈아입은 C&C의 에이전트.\n\n\r평소 특수한 포지션에 있었기 때문에 접할 길이 별로 없었던 잠입 임무를 맡은 덕에, 평소보다 조금 더 텐션이 올라가 있는 상태. 다른 C&C 선배들의 발자취를 따라갈 수 있게 되어 내심 기쁜 듯한 모습을 보여주지만, 본인은 짐짓 아닌 척하고 있다."
10067-CharacterSSRNewKr = "작전수행준비, 완료. 언제든 갈 수 있습니다.\n \r이 복장……? 뭔가 문제라도?"

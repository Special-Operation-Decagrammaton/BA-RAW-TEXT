10067-WeaponDescTh = "ปืนไรเฟิลจู่โจมของโทคิ\n\nยืนยันโดยเจ้าตัวว่าไม่ได้เหมาะแค่กับภารกิจทั่วไปเท่านั้น\nแต่ยังเหมาะกับปฏิบัติการลับด้วย และเจ้าตัวมักจะพิสูจน์\nให้เห็นเองว่าการยืนยันของเธอนั้นถูกต้อง"
10067-ProfileIntroductionTh = "สายลับ C&C ที่เปลี่ยนมาใส่ชุดบันนี่เกิร์ล เพราะคิดว่าชุดนี้เหมาะกับ ปฏิบัติการแฝงตัว\n\nโดยปกติแล้วเธอจะได้อยู่ในตำแหน่งพิเศษจนแทบไม่มีโอกาสทำภารกิจแฝงตัว ตอนนี้เธอจึงตื่นเต้นกว่าเดิมเล็กน้อย แม้จะดูเหมือนแอบดีใจที่ได้เดินตามรอย เหล่ารุ่นพี่ C&C คนอื่น แต่เธอก็แกล้งทำเป็นเหมือนไม่ได้ตื่นเต้นดีใจอะไร"
10067-CharacterSSRNewTh = "พร้อมออกปฏิบัติการ เรียกใช้ฉันได้ตลอดเลยนะคะ\nชุดนี้น่ะเหรอ...? มันมีปัญหาอะไรรึเปล่าคะ?"

10067-WeaponDescTw = "季專用的突擊步槍。\n\n不只是一般任務，此武器也很適合執行隱密作戰是他的主張。這個主張將會由他親自證明。"
10067-ProfileIntroductionTw = "對潛入作戰當然要穿兔女郎裝深信不疑的千年科學學園所屬，祕密組織「C&C」的特務。\n\n平常擔任特殊職務而少有機會能接觸潛入任務，因此心情似乎比平常更高昂。對於能夠執行與C&C的前輩們相同的任務顯得相當開心，但本人卻故作鎮定。"
10067-CharacterSSRNewTw = "作戰執行準備完畢。隨時都能出發。\n 這副打扮……？有什麼問題嗎？"

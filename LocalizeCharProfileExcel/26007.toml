26007-ProfileIntroductionTh = "เลขาของคณะกรรมการแผนงานอะบิดอสที่มาเที่ยวทะเลในฤดูร้อน\n\nเธอพยายามลืมความลำบากที่พบตอนอยู่โรงเรียน และตัดสินใจจะใช้ช่วงเวลาวันหยุดพักผ่อนอย่างมีความสุข แต่เธอก็ไม่สามารถปกปิดความกังวลใจเอาไว้ได้ทั้งหมด"

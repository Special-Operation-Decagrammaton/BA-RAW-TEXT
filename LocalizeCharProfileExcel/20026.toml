20026-ProfileIntroductionTw = "赤冬聯邦學園所屬，工務部的部長。\n\n無論是大規模的土木工程或建築等等，只要是需要人力的地方都會派遣人力並在現場指揮。雖然工作能力相當優秀，但動不動就會發起罷工及示威導致他在雇主間是惡名昭彰的存在。"

20026-WeaponDescKr = "미노리가 애용하는 튼튼한 돌격소총.\n\n단순한 구조의 이 돌격소총은 그 이름처럼 미노리가 나아가는 투쟁의 길 앞에서 묵묵히 불을 밝혀 왔다."
20026-ProfileIntroductionKr = "붉은겨울 연방학원의 용역부를 이끌고 있는 용역부장.\n\n대규모의 토목 공사 등 인력이 필요한 곳이면 어디든 달려가 인력을 파견하고 현장을 지휘한다. 맡겨진 일을 처리하는 능력은 우수하지만, 사소한 일로도 걸핏하면 파업과 시위를 일삼기 때문에 고용주들로부터의 악명이 높은 편이다."
20026-CharacterSSRNewKr = "키보토스의 모든 푸딩은\n투쟁하는 학생들을 위한 것이다!"

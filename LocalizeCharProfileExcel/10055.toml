10055-ProfileIntroductionTw = "赤冬聯邦學園所屬，但遭受停學處分，目前在舊校舍227號特別班反省中的學生。\n\n停學原因是在「配給用康波特」中偷偷加入酒精。和227號特別班的和香是青梅竹馬，有傳聞說當和香受到懲戒處分被趕去特別班時，他會為了見和香而故意闖禍。但無論事件的真相為何，他非常喜歡自己做的康波特，因此總是裝在口袋的威士忌瓶裡隨身攜帶。"
10055-CharacterSSRNewTw = "需要能溫暖身體的東西嗎？\n呵呵……交給我吧。"

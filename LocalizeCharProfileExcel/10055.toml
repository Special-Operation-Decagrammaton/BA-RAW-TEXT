10055-ProfileIntroductionJp = "A student suspended from Red Winter Academy and on probation in Former Institute 227.\n\nShe was suspended for mixing alcohol into the school-issued kompot. She's an old friend of Nodoka from Spec Ops No. 227. The rumor is that she caused trouble on purpose after Nodoka was sent to Former Institute 227 as punishment in order to join her friend. Whether or not this is true, she loves homemade kompot and always carries a flask in her pocket. "

10055-WeaponNameTh = "Spring Punch"
10055-WeaponDescTh = "ปืนยิงระเบิดที่ชิกุเระพกติดตัวไปด้วยเป็นประจำ\n\nปืนยิงระเบิดที่มีอานุภาพรุนแรง จนทำให้ศัตรูหมดสติไปได้ สมกับชื่อของมัน"
10055-ProfileIntroductionTh = "นักเรียนพิเศษที่ได้รับโทษพักการเรียนจากทางสหภาพเรดวินเทอร์ และต้องมาเก็บตัวที่อาคารเรียนเก่า ห้องพิเศษ 227\n\nเหตุผลที่เธอถูกพักการเรียนก็เพราะแอบผสมแอลกอฮอลล์ลงในกัมปอต\nที่เตรียมไว้สำหรับแจกจ่าย เธอเป็นเพื่อนกับโนโดกะ นักเรียนห้องพิเศษ 227 มานาน มีข่าวลือว่าตอนที่โนโดกะถูกลงโทษย้ายมาที่ห้องพิเศษ 227 ชิกุเระตั้งใจก่อเรื่องให้ถูกย้ายมาที่ห้องเรียนพิเศษ เพื่อให้ได้เจอเพื่อนของเธอ นอกจากนั้น เธอยังชื่นชอบกัมปอตมากเป็นพิเศษ จนถึงกับนำใส่ขวดวิสกี้ พกติดตัวไปที่ต่างๆ ด้วยเสมอ "
10055-CharacterSSRNewTh = "อยากได้เครื่องดื่มอบอุ่นร่างกายรึเปล่า?\nฮิฮิ... ขอให้บอกแล้วกัน"

10055-WeaponDescKr = "시구레가 늘 휴대하고 다니는 다연발 유탄발사기.\n\n\r이 유탄에 직격당한 상대는 그 이름처럼 정신을 차릴 수 없게 된다."
10055-ProfileIntroductionKr = "붉은겨울 학원으로부터 정학 처분을 받고 구교사 227호에서 근신 중인 특별 학생.\n\n\r정학 사유는 배급용 캄포트에 몰래 알코올을 섞었기 때문이다. 227호 특별반의 노도카와는 오랜 친구로, 소문에 따르면 노도카가 징계 조치로 특별반으로 쫓겨나자, 친구를 만나기 위해 일부러 사고를 저질렀다는 설도 있다. 사건의 진상과는 별개로 직접 담근 캄포트를 무척이나 좋아하여 포켓 위스키병에 담아 언제나 휴대하고 다닌다."
10055-CharacterSSRNewKr = "혹시 몸을 데울만한 게 필요해?\n\r후훗…… 말만 하라고."

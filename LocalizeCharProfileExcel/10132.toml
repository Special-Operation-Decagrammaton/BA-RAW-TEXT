10132-HobbyTh = "แปลงร่างเป็นต้นไม้, ฝึกกลั้นหายใจอย่างลับๆ"
10132-WeaponNameTh = "Tsukuyo-Style Submachine Gun"
10132-WeaponDescTh = "ปืนกลมือที่สึคุโยะหวงแหน ไม่ได้รับการตกแต่งอะไร\nเป็นพิเศษแม้ตอนพกขึ้นรันเวย์\n\nเหตุผลก็เพราะทุกส่วนที่มิจิรุกับอิซุนะช่วยตกแต่งให้นั้น สวยงามที่สุดแล้ว"
10132-ProfileIntroductionTh = "สมาชิกชมรมวิจัยศาสตร์นินจาของสหพันธ์เฮียกคิยาโค\n\nสึคุโยะถูกว่าจ้างให้มาเป็นบอดี้การ์ดในงานแฟชั่นโชว์ แต่ก็ได้เดบิวต์เป็น\nนางแบบในงาน เมื่อความสูงที่เป็นปมด้อยมาตลอดกลับเป็นข้อได้เปรียบ\nในวงการนางแบบ สึคุโยะจึงต้องชั่งใจระหว่างการเป็นนางแบบกับการทำ\nกิจกรรมของชมรม"
10132-CharacterSSRNewTh = "ฉะ... ฉันมีพรสวรรค์\nในการเป็นนางแบบจริงๆ เหรอคะ...?"

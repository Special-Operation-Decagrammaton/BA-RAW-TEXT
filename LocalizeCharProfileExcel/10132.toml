10132-WeaponNameKr = "츠쿠요류(?) 기관단총"
10132-WeaponDescKr = "츠쿠요가 소중히 여기는 기관단총. 무대 위로 지니고 오를 때에도 특별히 꾸미지는 않았다.\n\n미치루와 이즈나가 꾸며준 모든 부분이, 이미 그 무엇보다 아름다웠기 때문이다."
10132-ProfileIntroductionKr = "백귀야행 연합학원 소속, 인법연구부의 부원.\n\n패션쇼의 경호원으로서 고용되었다가 어쩌다 모델로 데뷔하게 된다. 그런데 콤플렉스인 키가 모델 업계에서는 오히려 강점이 된 상황. 때문에 모델 활동과 동아리 사이에서 고민하고 있는 듯하다."
10132-CharacterSSRNewKr = "저, 정말로 제게\n모델의 재능이 있다고요……?"

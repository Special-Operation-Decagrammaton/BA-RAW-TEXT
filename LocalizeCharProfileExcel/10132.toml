10132-StatusMessageTh = "สุดท้ายแล้วฉันจะเป็นนินจาที่สง่างามค่ะ!"
10132-FullNameTh = "โอโนะ สึคุโยะ"
10132-FamilyNameTh = "โอโนะ"
10132-PersonalNameTh = "สึคุโยะ"
10132-SchoolYearTh = "ชั้นปีที่ 1"

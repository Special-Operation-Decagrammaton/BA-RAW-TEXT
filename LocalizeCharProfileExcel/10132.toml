10132-WeaponDescTw = "月夜珍視的衝鋒槍。即使帶著它登上舞台，也沒有另外特別裝飾。\n\n因為三千留和伊樹菜幫忙裝飾的每一個部分，已經讓它比任何東西都更美麗。"
10132-ProfileIntroductionTw = "百鬼夜行聯合學園所屬，忍術研究部的成員。\n\n原本只是受僱擔任時裝秀的警備員，卻在因緣際會之下以模特兒的身分出道了。平時感到自卑的身高，在模特兒業界反而成為了優勢，因此似乎正在煩惱模特兒與社團之間該如何取捨。"
10132-CharacterSSRNewTw = "我，我真的有當模特兒的才能嗎……？"

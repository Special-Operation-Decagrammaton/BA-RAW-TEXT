10062-WeaponDescKr = "토키 전용의 돌격소총.\n\n\r특별한 외관만큼이나 특별한 성능으로, 임무 달성의 방해물을 분쇄한다. 그 이름은 스스로 지은 것이 아니라, 누군가로부터 하사받은 것이라고 한다."
10062-ProfileIntroductionKr = "밀레니엄 학원의 비밀 조직 C&C의 다섯 번째 에이전트.\n\n\rC&C 소속이지만, 그간 리오의 전속 메이드이자 보디가드로 활동해 왔기에, 토키의 얼굴을 알고 있는 사람은 거의 없다. 하이테크 무기나 기술을 기반으로 싸우는 우수한 비밀 에이전트. 사실은 단독 행동만 하는 입장이라 살짝 외로움을 탄다고도 한다."
10062-CharacterSSRNewKr = "맡겨만 주십시오.\n\r저는 완벽한 요원이자 메이드이기에."

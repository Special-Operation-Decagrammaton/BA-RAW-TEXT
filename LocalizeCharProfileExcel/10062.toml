10062-WeaponDescEn = "Toki's one-of-a-kind assault rifle.\n\nWith performance as exceptional as its appearance suggests, it can crush any obstacle and complete any mission. She didn't name it herself, but it's unknown who did."
10062-ProfileIntroductionEn = "The mysterious fifth agent of Millennium's secret spy agency, C&C.\n\nAlthough she technically belongs to C&C, she's been Rio's exclusive maid and bodyguard for some time, so few know who Toki is. While she is a superior secret agent who's at ease with high-tech weaponry and technology, she seems to be a bit lonely as she always works solo."
10062-CharacterSSRNewEn = "Leave it to me. I'm both the perfect agent and the perfect maid."

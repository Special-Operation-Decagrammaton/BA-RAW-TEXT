10062-ProfileIntroductionJp = "The mysterious fifth agent of Millennium's secret spy agency, C&C.\n\nAlthough she technically belongs to C&C, she's been Rio's exclusive maid and bodyguard for some time, so few know who Toki is. While she is a superior secret agent who's at ease with high-tech weaponry and technology, she seems to be a bit lonely as she always works solo."
10062-CharacterSSRNewJp = "Leave it to me. I'm both the perfect agent and the perfect maid."

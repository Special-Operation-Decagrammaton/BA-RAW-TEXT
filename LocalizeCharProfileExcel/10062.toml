10062-WeaponDescTh = "ปืนไรเฟิลจู่โจมของโทคิ\n\nด้วยประสิทธิภาพที่พิเศษพอๆ กับรูปลักษณ์ภายนอก\nไม่ว่าเมื่อไรก็ทำลายสิ่งกีดขวางเพื่อทำให้ภารกิจสำเร็จได้\nว่ากันว่าชื่อนี้โทคิไม่ได้ตั้งเอง แต่เป็นชื่อที่ใครบางคนตั้งให้"
10062-ProfileIntroductionTh = "สายลับคนที่ห้าของ C&C องค์กรลับแห่งโรงเรียนมิลเลเนียม\n\nเธอเป็นสมาชิกชมรม C&C แต่เนื่องจากเป็นสาวใช้ และผู้คุ้มกันหนึ่งเดียว\nของริโอะ จึงมีคนเพียงไม่กี่คนเท่านั้นที่รู้จักหน้าค่าตาของโทคิ เธอคือ\nสายลับชั้นยอดที่ต่อสู้ด้วยเทคโนโลยีและอาวุธไฮเทค แต่อันที่จริงแล้ว โทคิแอบรู้สึกเหงานิดๆ เพราะต้องคอยทำงานคนเดียวอยู่ตลอด"
10062-CharacterSSRNewTh = "ไว้ใจได้เลยค่ะ\nฉันคือสายลับและสาวใช้ที่สมบูรณ์แบบ"

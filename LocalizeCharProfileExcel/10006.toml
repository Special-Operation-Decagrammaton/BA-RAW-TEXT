10006-WeaponDescKr = "이오리가 규칙 위반자들을 선도할 때 사용하는 저격소총.\n\n스코프도 달려 있지 않은 단순한 형태의 저격소총이지만, 스페셜리스트는 도구를 가리지 않는다."
10006-ProfileIntroductionKr = "게헨나 학원 선도부의 냉혹한 스페셜리스트.\n\n선도부의 행동대장으로 규칙을 위반한 학생들을 발견하면 압도적인 힘으로 무자비하게 처단한다. 일 처리도 빠르고 전투 센스도 나쁘지 않은 편이지만, 적을 발견하면 앞뒤를 가리지 않고 달려드는 무대포 성향 때문에 단순한 함정에도 쉽게 빠지곤 한다."
10006-CharacterSSRNewKr = "교칙을 위반하는 녀석들은 용서하지 않겠어!"

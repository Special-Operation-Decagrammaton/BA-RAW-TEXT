10006-WeaponDescTw = "伊織應對違規者們引起的問題時所使用的狙擊步槍。\n\n雖然是未配有瞄準鏡且型態單純的款式，不過伊織表示「真正的專家是不會選擇道具的」。"
10006-ProfileIntroductionTw = "格黑娜學園所屬，風紀委員會的冷酷專家。\n\n身為風紀委員會的突擊隊長，只要發現違反校規的學生，就會以壓倒性的力量立刻進行懲處。\n雖然腦袋轉得很快、辦事迅速且戰鬥判斷力也不差，不過有著一旦發現敵人就無法瞻前顧後的一面，連地洞這種單純的陷阱也很容易中。"
10006-CharacterSSRNewTw = "違反校規的傢伙們不可原諒！"

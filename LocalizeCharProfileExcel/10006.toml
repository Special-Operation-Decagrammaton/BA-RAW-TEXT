10006-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่อิโอริใช้เมื่อต้องออกไปจัดการเด็กที่ชอบแหกกฎ\n\nแม้เป็นแค่ปืนไรเฟิลซุ่มยิงธรรมดาที่ไม่ได้ติดกล้องสโคปเอาไว้\nแต่อิโอริก็พูดไว้ว่า \"ผู้เชี่ยวชาญจะไม่เลือกอุปกรณ์ที่ใช้\""
10006-ProfileIntroductionTh = "ผู้เชี่ยวชาญพิเศษแสนเหี้ยมโหดของคณะกรรมการวินัย สถาบันเกเฮนน่า\n\nในฐานะหัวหน้าความประพฤติของคณะกรรมการวินัย หากเธอพบนักเรียน\nที่ละเมิดกฎ เธอจะลงโทษด้วยพลังที่เหนือกว่าอย่างไร้ความปรานี เธอทำงานได้อย่างรวดเร็ว และค่อนข้างหัวไวในการต่อสู้ แต่บางครั้งก็ตก\nหลุมพรางตื้นๆ ของศัตรู เพราะเป็นคนไม่ระวังหน้าระวังหลัง"
10006-CharacterSSRNewTh = "ไม่ยกโทษให้พวกที่ละเมิดกฎเด็ดขาด!"

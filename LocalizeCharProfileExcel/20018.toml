20018-ProfileIntroductionTw = "SRT特殊學園所屬，RABBIT小隊的報務員。\n\n因為憧憬火力強大的武器而進入SRT特殊學園就讀，然而學園卻突然關閉。現在過著和小隊成員們一起在公園露宿的生活。雖然有著奇特的癖好，對於爆破或讓事情功虧一簣感到愉悅，但身為報務員的能力無庸置疑。重度愛好甜食，隨時都會咬著棒棒糖。\n代號為「RABBIT3」。"
20018-CharacterSSRNewTw = "這裡是RABBIT3。下一個爆破地點在哪？"

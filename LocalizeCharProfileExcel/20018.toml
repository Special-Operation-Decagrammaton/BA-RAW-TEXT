20018-WeaponDescTh = "ปืนพกมาตรฐานที่โมเอะได้รับจากสถาบัน SRT\n\nถึงแม้จะเป็นปืนปก แต่มีอัตราการยิงสูงที่สามารถยิง\nหมดแม็กได้ในพริบตา"
20018-ProfileIntroductionTh = "โอเปอเรเตอร์ของกองทหาร RABBIT แห่งสถาบันพิเศษ SRT รหัสประจำตัว <RABBIT 3>\n\nโมเอะสมัครเข้าเรียนที่สถาบันพิเศษ SRT ด้วยความหลงใหลในอาวุธ ที่มีพลังทำลายล้างสูง แต่สถาบันพิเศษ SRT ปิดตัวลงอย่างกะทันหัน ตอนนี้เธอจึงไร้ที่อยู่และไปอาศัยอยู่ที่สวนสาธารณะกับสมาชิกคนอื่นๆ เธอมีรสนิยมแปลกๆ ชื่นชอบการระเบิดและทำลายสิ่งของ ถึงจะมีรสนิยมแปลกๆ แต่ความสามารถโอเปอเรเตอร์ของเธอ ก็ไม่เป็นสองรองใคร เธอเป็นคนติดของหวานขั้นรุนแรง จึงมักจะอมอมยิ้มไว้ในปากเสมอ"
20018-CharacterSSRNewTh = "นี่คือ RABBIT 3 สถานที่ทิ้งระเบิดต่อไปคือที่ไหน?"

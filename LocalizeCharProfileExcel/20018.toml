20018-WeaponDescKr = "모에가 SRT 특수학원에서 지급받은 제식 권총.\n\n권총임에도 불구하고 빠른 연사력을 보유하고 있어 순식간에 탄창을 비울 수 있다."
20018-ProfileIntroductionKr = "SRT 특수학원 RABBIT 소대의 오퍼레이터.\n콜사인은 <RABBIT 3>.\n\n막강한 화력을 보유한 SRT 특수학원의 무기를 동경하여 입학하였으나, 갑작스럽게 학원이 폐쇄되며 현재는 공원에서 소대원들과 함께 노숙을 하고 있다. 무언가를 폭파하거나 망치는 것에서 희열을 느끼는 기이한 취향의 소유자이지만, 오퍼레이터의 능력만큼은 확실한 편이다. 중증의 당분 중독자라 언제나 막대사탕을 입에 물고 있다."
20018-CharacterSSRNewKr = "여기는 RABBIT 3. 다음 폭격 장소는 어디야?"

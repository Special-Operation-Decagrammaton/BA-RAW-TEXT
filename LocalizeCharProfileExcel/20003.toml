20003-WeaponDescTw = "麻白在實現正義部活動時所使用的狙擊槍。\n\n體積上不便於隨身攜帶，不過對於胸懷正義的麻白來說不構成任何問題。"
20003-ProfileIntroductionTw = "三一綜合學園所屬，實現正義部的率直成員。\n\n隨身帶著一把和身高不合的反物資步槍，默默執行火力支援任務的少女。\n平時雖然話少但並不怕生，也並非不擅長人際關係。如果提及和正義有關的話題，他反而會變得多話。"

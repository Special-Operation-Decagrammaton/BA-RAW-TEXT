20003-WeaponDescKr = "마시로가 정의실현부 활동을 할 때 사용하는 저격총.\n\n\r들고 다니기에는 다소 버거운 크기를 갖고 있지만, 정의를 향한 마시로의 신념 앞에서는 아무런 문제도 되지 않는다."
20003-ProfileIntroductionKr = "트리니티 학원 정의실현부의 성실한 부원.\n\n\r키에 맞지 않는 거대한 대물저격총을 가지고 다니며 묵묵히 화력지원 임무를 수행한다. 말수가 적은 편이지만 낯을 가리거나 대인관계가 서투른 것은 아니며, 정의와 관련된 화제를 언급하면 오히려 말이 많아지기도 한다."
20003-CharacterSSRNewKr = "정의가 필요한 곳은 어디입니까?"

20003-HobbyTh = "ขึ้นไปอยู่บนที่สูงๆ เขียนบันทึกสังเกตการณ์"
20003-WeaponNameTh = "Manifestation of Justice"
20003-WeaponDescTh = "ปืนไรเฟิลซุ่มยิงที่มาชิโระใช้ปฏิบัติภารกิจชมรมทวงความ\nยุติธรรม\n\nถึงขนาดจะใหญ่เทอะทะไม่เหมาะต่อการพกพา แต่เมื่ออยู่\nต่อหน้าความมุ่งมั่นในความยุติธรรมของมาชิโระแล้ว\nเรื่องขนาดก็ไม่ใช่ปัญหา"
20003-ProfileIntroductionTh = "สมาชิกที่ซื่อสัตย์ของชมรมทวงความยุติธรรมของสถาบันทรีนิตี้\n\nแม้เธอจะตัวเล็กแต่อาวุธคู่กายของเธอ คือปืนสไนเปอร์ขนาดใหญ่ คอยช่วยภารกิจของทีมแบบเงียบๆ แต่เฉียบขาด แม้จะเป็นคนพูดน้อย แต่เธอก็มีมนุษยสัมพันธ์ และเข้ากับคนอื่นได้ดี และหากได้พูดเรื่องความยุติธรรม เธอจะพูดมากขึ้นกว่าปกติ"
20003-CharacterSSRNewTh = "บอกฉันได้เลยค่ะว่าที่ไหนต้องการความยุติธรรม"

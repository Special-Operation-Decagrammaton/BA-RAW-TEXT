10015-ProfileIntroductionTw = "千年科學學園所屬，遊戲開發部的成員。\n\n是在廢墟發現的來歷不明的少女。包含年齡在內的所有情報都無從得知。現在與桃井、綠和柚子一起享受著遊戲，已經變成了一名重度​遊戲愛好者。\n說話時有點生硬不自然，但那是因為他的語句幾乎都是由懷舊遊戲的台詞所構成。"

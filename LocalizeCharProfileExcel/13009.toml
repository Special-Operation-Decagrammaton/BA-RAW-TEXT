13009-WeaponDescTh = "ปืนกลมือที่เป็นอาวุธของสึบากิ\n\nสึบากิเลือกใช้ปืนขนาดเล็กเหมาะมือและน่ารัก\nเพื่อไม่ให้เป็นอุปสรรคต่อการฝึกฝนในชีวิตประจำวัน\nอีกทั้ง Sleeping Companion I ก็คือหมอนที่ติดอยู่ด้านในโล่ของเธอ"
13009-ProfileIntroductionTh = "หัวหน้าชมรมฝึกฝนของสหพันธ์เฮียกคิยาโค\n\n การฝึกฝนในทุกๆ วันของเธอก็เพื่อ 'การได้นอนหลับสบายอย่างเต็มตื่นกว่าที่เคย' การฝึกฝนของเธอ ทำให้เธอนอนหลับได้แม้กระทั่งตอนนั่ง ยืน หรือแม้แต่ตอนทานอาหาร และนี่ทำให้เธอได้ฉายาว่า 'องค์หญิงขี้เซา' ถึงแม้เธอจะสัปหงกอยู่ตลอดเวลา แต่ในเวลากลางคืน เธอจะแอบออกไปตรวจตราตามท้องถนน"

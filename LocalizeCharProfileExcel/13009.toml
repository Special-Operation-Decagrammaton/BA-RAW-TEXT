13009-WeaponDescKr = "츠바키가 사용하는 기관단총.\n\n평소 하는 수행에 방해되지 않도록 작고 아담한 물건을 골랐다. 참고로 숙면 도우미Ⅰ 은 방패 안에 들어 있는 베개."
13009-ProfileIntroductionKr = "백귀야행 학원 수행부의 부장.\n\n평소 수행하는 것은 다름 아닌 '보다 편안하고 완전한 숙면'을 위한 수행. 그 덕에 앉아서도, 서서도, 심지어 밥을 먹으면서도 잘 수 있게 되었다. 그래서 붙은 별명이 잠자는 공주. 그렇게 늘 꾸벅꾸벅 조는 것 같지만, 밤이 찾아오면 거리를 지키기 위해 몰래 활약한다."

10093-WeaponDescTh = "ปืนที่คิราระพกติดตัวไปด้วยเสมอ\n\nปืนกระบอกนี้ได้รับการตกแต่งตามรสนิยมของคิราระ เลยดูเป็นแฟชั่นไอเทมมากกว่าที่จะเป็นปืน ส่วนชื่อของปืนมาจากเมนูเครปที่คิราระชื่นชอบเป็นที่สุด"
10093-ProfileIntroductionTh = "นักเรียนมัธยมปลายที่นิสัยร่าเริงจากสถาบันเกเฮนน่า\n\nคิราระคาดหวังให้มีเรื่องที่แปลกใหม่และตื่นเต้นเกิดขึ้นอยู่เสมอ เธอมีมนุษยสัมพันธ์ดีมากเสียจนสามารถพูดคุยกับคนที่เพิ่งเคยเจอครั้งแรกได้ ราวกับเป็นเพื่อนที่สนิทกันมานาน"
10093-CharacterSSRNewTh = "วันนี้จะเกิดเรื่องตื่นเต้นอะไรอีกนะ?"

26015-HobbyTh = "ช่วยเหลือคนอื่น, ลองทำนู่นนี่หลายๆ อย่าง"
26015-WeaponNameTh = "Red Dragon"
26015-WeaponDescTh = "ปืนไรเฟิลจู่โจมที่อยู่ข้างกายอิจิกะทั้งในยามสุขและทุกข์\n\nแม้ภายนอกดูสะอาดสะอ้านจากการดัดแปลงอย่างพิถีพิถัน แต่มีก็ร่องรอยเสียหายจากการใช้งานอย่างไม่ระวังให้เห็นอยู่บ้าง"
26015-ProfileIntroductionTh = "สมาชิกชมรมทวงความยุติธรรมที่พยายามผ่อนคลายให้ได้แม้จะอยู่ในทะเล\n\nอิจิกะเป็นที่รู้จักในเรื่องความใจดีและผ่อนคลาย แต่ตอนนี้เธอกำลังได้รับ\nบททดสอบความอดทนกับการเจอศัตรูทางธรรมชาติที่เลวร้ายที่สุดในชีวิต เธออาจไม่รู้ตัวว่าตอนนี้ตัวเองแสดงความรู้สึกอย่างตรงไปตรงมามากกว่าปกติ"

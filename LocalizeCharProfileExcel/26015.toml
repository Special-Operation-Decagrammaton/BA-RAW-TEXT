26015-WeaponDescKr = "이치카와 동고동락을 함께한 돌격소총.\n\n\r성실한 총기 수입으로 멀끔한 외형과 달리, 거친 사용법으로 여기저기 손상이 남아 있다."
26015-ProfileIntroductionKr = "바다에서도 여유로운 모습을 잃지 않으려고 노력 중인 정의실현부 부원.\n\n\r언제나 친절하고 여유로운 모습으로 알려진 이치카이지만, 인생 최악의 천적과의 재회로 인내심을 시험받는 중. 그 때문일까, 자각하고 있지 않지만, 평소보다 감정을 솔직히 드러내고 있는 듯하다."

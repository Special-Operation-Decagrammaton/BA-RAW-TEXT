26014-ProfileIntroductionKr = "밀레니엄 엑스포에서 가이드 역할로 투입된 C&C의 에이전트.\n\n단순히 가이드만 할 뿐 아니라, 유사시 학생들의 경호도 겸하고 있다.평범한 교복이지만, 오히려 동아리 특성상 자주 입지 못한 옷이었기에 내심 즐기고 있다. 처음에는 생소해하던 다른 학생들도 특유의 친절함에 빠르게 친숙해진다."

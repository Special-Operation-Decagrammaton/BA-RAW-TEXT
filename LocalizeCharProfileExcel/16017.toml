16017-WeaponDescTh = "ปืนลูกซองของอาโอบะ\n\nแสดงถึงค่านิยมของ 'การไม่คาดหวัง' ในชื่อที่ขัดแย้งกัน มาพร้อมประสิทธิภาพในการเป่าสิ่งรบกวนสารพัดออกไป"
16017-ProfileIntroductionTh = "วิศวกรสังกัดฝ่ายบริหารการขนส่งสินค้าแห่งสถาบันการรถไฟไฮแลนเดอร์\n\nแม้จะชอบเขินและเก็บตัว แต่ลึกๆ แล้วมีนิสัยชอบพูดทิ่มแทง คำพูดของ\nอาโอบะแอบแฝงไปด้วยเจตนาร้ายอย่างจริงใจ แต่เธอก็พูดอย่างฉะฉาน และนุ่มนวลจนจับสังเกตในทันทีได้ยาก อาโอบะต้องทนทุกข์กับงานหนัก และความไม่เป็นธรรมต่างๆ อยู่บ่อยๆ จึงชิงชังต่อโชคชะตานี้อยู่ไม่น้อย"

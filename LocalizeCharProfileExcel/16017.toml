16017-WeaponDescKr = "아오바의 전용 산탄총.\n\n'기대하지 않는다'는 가치관을 역설적인 이름으로 투영했다. 온갖 거슬리는 것들을 날려버리기 적합하다."
16017-ProfileIntroductionKr = "하이랜더 철도학원의 화물운송 관리부 소속 엔지니어.\n\n부끄러움이 많고 내향적이지만, 은근히 독설가 기질이 있다. 조곤조곤한 말투에 진심 어린 악의를 담아내기에 대화를 하다 보면 바로 알아채기가 쉽지 않다. 항상 격무에 시달리며 이런저런 부조리를 많이 겪다 보니, 세상에 대한 불만이 하늘을 찌른다."

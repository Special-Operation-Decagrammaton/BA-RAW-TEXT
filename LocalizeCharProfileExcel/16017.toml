16017-WeaponDescTw = "青葉的專用散彈槍。\n\n憤世嫉俗的名稱顯示著他「不抱期待」的價值觀。適合用來掃蕩任何礙眼的東西。"
16017-ProfileIntroductionTw = "高地人鐵道學園所屬，貨物輸送管理部的工程師。\n\n個性內向害羞，但隱約帶有毒舌的屬性。總是用平靜溫和的語調表達發自內心的惡意，因此在對話時不容易立刻察覺。總是被繁重的工作追著跑，經常經歷各種不合理的情況，對世界懷抱著強烈的怨氣。"

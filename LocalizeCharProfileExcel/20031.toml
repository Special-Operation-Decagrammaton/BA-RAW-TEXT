20031-WeaponDescKr = "시구레가 늘 휴대하고 다니는 다연발 유탄발사기.\n\n셰이커를 흔들듯 유탄을 멋지게 재장전하는 시구레의 모습은 227호 온천장의 볼거리 중 하나라며 손님들에게 호평받고 있다."
20031-ProfileIntroductionKr = "특별반의 학생들과 함께 227호 온천장을 운영하는 특별반의 정학생.\n\n구교사에서 갑작스럽게 온천이 터지며 노도카와 함께 거대한 온천장을 운영하게 되었다. 노도카와 달리 온천장을 확장하고 돈을 벌어들이는 일에는 크게 관심이 없는 것처럼 보이지만, 다양한 음료수와 다과를 마음껏 만들 수 있는 환경만큼은 그녀에게도 퍽 달가운 모양이다."
20031-CharacterSSRNewKr = "따듯한 물로 피부를 적셨으니, 이제는 몸속을 적셔줄 차례네."

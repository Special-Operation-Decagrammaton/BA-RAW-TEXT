20031-WeaponNameTh = "Spring Punch"
20031-WeaponDescTh = "ปืนยิงระเบิดที่ชิกุเระพกติดตัวไปด้วยเป็นประจำ\n\nการรีโหลดกระสุนอย่างงดงามเหมือนเขย่า\nกระบอกเชคเกอร์ของชิกุเระเป็นสิ่งที่หาชมได้ใน\nออนเซ็น No.227 และเธอก็ได้รับคำวิจารณ์ที่ดี ในเรื่องนี้จากลูกค้าอยู่บ่อยๆ"
20031-ProfileIntroductionTh = "นักเรียนที่ถูกพักการเรียนแห่งห้องเรียนพิเศษ ปัจจุบันกำลังเปิด\nกิจการออนเซ็น No.227 ร่วมกับนักเรียนจากห้องเรียนพิเศษ\n\nที่เธอได้มาเปิดกิจการออนเซ็นขนาดใหญ่กับโนโดกะ เป็นเพราะจู่ๆ น้ำพุร้อนก็ระเบิดออกมาในอาคารเรียนเก่า ชิกุเระไม่ได้สนใจเรื่อง\nการขยายกิจการออนเซ็นหรือการหาเงินเหมือนกับโนโดกะมากนัก\nเพราะแค่สภาพแวดล้อมที่ทำให้เธอสามารถทำเครื่องดื่ม\nและของว่างต่างๆ ได้ก็เป็นที่น่าพอใจสำหรับเธอแล้ว"
20031-CharacterSSRNewTh = "ทำให้ผิวชุ่มชื้นด้วยน้ำอุ่นแล้ว ต่อไปก็ถึงเวลาทำให้ร่างกายได้ชุ่มชื้นบ้างแล้วละ"

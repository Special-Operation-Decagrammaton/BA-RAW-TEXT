20031-WeaponDescTw = "時雨總是帶在身邊的連發式榴彈發射器。\n\n時雨如搖動雪克杯一般帥氣地裝填榴彈的身影是227號溫泉浴場的看頭之一，很受顧客好評。"
20031-ProfileIntroductionTw = "和特別班的學生一起經營227號溫泉浴場的赤冬聯邦學園所屬，227號特別班的停學生。\n\n舊校舍突然湧出溫泉，於是便與和香一起經營起大規模的溫泉浴場。雖然看似與和香不同，對使溫泉浴場繁盛起來沒有太大的興趣，但能盡情製作各種飲料與點心的環境似乎讓他很滿意。"
20031-CharacterSSRNewTw = "以熱水滋潤皮膚之後，接著就輪到體內了"

10007-ProfileIntroductionKr = "밀레니엄 학원의 해커 동아리, 베리타스의 부원.\n\n\r그래피티 그리기를 좋아하는 장난꾸러기 소녀로, 베리타스의 엠블렘 또한 그녀의 작품이다. 매사에 진지하지 않고 무슨 일이든 가볍게 여기기 때문에 다른 동아리와의 트러블이 잦은 편이다."

1616764732 = "アイアン・メイデン"
931273608 = "ラッキーアニマル"
514500469 = "今週の運勢は最悪！朝の占いで、コノカは3日後に人生最悪の日が訪れると告げられた。そんな事情をSNSで友達にこぼしていると、コノカは幸運の象徴にまつわる話題を見つけるのだった。"
427498716 = "ツチノコ探し"
3051451417 = "幸運をもたらすという蛇――ツチノコを探すために休みを取るとカンナに報告するコノカ。別件でその場に居合わせた先生は、カンナの頼みでコノカに同行することになった。バスに揺られて、目撃談のある田舎町を訪れた2人は、コノカの「友人たち」と合流するのだった。"
1657577479 = "そういう設定の少女"
907137836 = "コノカの友人は、オカルト研究会のレナと、「モー超常現象研究所」の所長を名乗るツバサだった。ツバサとのオカルト話に花を咲かせるレナだが、あくまで本人はツチノコの存在を信じていないと主張する。"
1462024252 = "幽霊バス"
3930709287 = "宿泊先の山小屋に向かう一行は、その道中で不気味な老人から忠告を受ける。コノカは怖がっていたが、一行は気にせず山小屋に到着する。休憩もそこそこに調査に出発した一行は目的地に向かう途中、巷で噂の「幽霊バス」に遭遇してしまう。一度は惑わされたもののコノカの機転で無事に撃退し、正しいバスに乗り込むのだった。"
3598423513 = "生きて動く石像"
166220328 = "調査中、自分の所属していた部活はすでに廃部になっていることをレナに明かすツバサ。一方、単独で調査していたコノカは、地中から不吉な箱を見つけてしまう。埋めなおすことを提案するコノカをよそにツバサが箱を開けると、中には石像が収められていた。材質や劣化の状態から、誰かのイタズラだろうと判断するツバサだったが、コノカが地中深く埋めなおしてしまう。去り際、先生は埋めたはずの石像と目が合うのだった。"
3910110965 = "山小屋に近づく影"
1933749352 = "夕方遅くに宿へ戻り、強行軍でぐったりする一行。ひとり元気なコノカが夕食の準備を買って出ると、ツバサとレナは疲れ果てて眠ってしまう。怪しい気配を感じて目を覚ましたレナと先生は、怖がりながらも正体を探ろうとする。その時、料理を携えてコノカが部屋に戻ってくる。コノカも謎の影を見たと言い、ツバサは、公安局に恨みを持つ「七囚人」が復讐に来たのではないかと疑い始める。"
1284600502 = "怨嗟の声が響く電話ボックス"
105361616 = "次の日もツチノコ探しを続けていた一行は、うっかり夕方のバスを逃してしまう。タクシーを呼ぼうとするも圏外であり、公衆電話を使うコノカと先生。タクシーを手配して電話ボックスを出ようとする2人だったが、なぜかドアが開かない。そればかりか公衆電話が着信を告げ、受話器を取ると不気味な音声が聞こえてくる。待てど暮らせど助けは来ず、最後はコノカが力技で解決して脱出するのだった。"
2528363471 = "最後の怪談"
1322186565 = "タクシーを待つ一行の前に、二足歩行のバスが姿を現した……ものの、コノカが力技で撃退してしまう。続けざまに起こる奇妙な事件の数々に、誰かが暗躍しているという疑念が確信へと変わっていく。夜になり、一行は窓の外から何者かが監視している気配に気づく。コノカは一連の事件の犯人が七囚人の「密井キョウコ」なら全て説明がつくと語る。一行は怪しい影を捕えようと試みるも、煙のように消えてしまい、失敗に終わるのだった。"
1478179506 = "宇宙人グレイ（１）"
1728431009 = "写真に収められた白い影を見て、一連の怪奇現象の犯人は宇宙人グレイだと主張するツバサ。議論は白熱するものの、誰かが意図的に山小屋を孤立させている事実に気づいた一行。電話線が切られ、橋が落とされていた。しかしてついに姿が明らかになった犯人は、コノカに恨みを持ったスケバンたちだった……。"
3654864579 = "宇宙人グレイ（２）"
1998146 = "スケバンを片付けた一行。問い質してみれば、ツチノコの噂を流したところからすべてスケバンの仕業だったと判明する。その事実に、ツチノコを見つけた実績で「疑似科学部」の復活を目論んでいたツバサは目に見えて落ち込んでしまう。しかし、スケバンの中には白い服を着た者がおらず、写真に写りこんだ白い影とは合致しなかった。首をかしげる一行の前に、部活の後輩であるツバサを心配して潜んでいたミライが姿を表すのだった。"
3085789925 = "青いツチノコ"
2378286215 = "結局ツチノコを見つけられないまま、人生最悪の不運が迫っていると怯えるコノカ。しかし占いの放送があった日から数えるとすでに4日が経過しており、3日後の「その日」は乗り越えていた。これまでの出来事を振り返って、十分に不運に見舞われているとレナは指摘するが、ツチノコを探した冒険こそが、本当のツチノコだったのかもしれないとコノカは納得するのだった。"
1641141706 = "バーベキュー＆チリ"
844112461 = "すべての問題が片づき、スケバンも交えてバーベキューを楽しむ一行。ツバサがミライに懐いている様子を見て驚くコノカは、それでも夜遅くに覗きまでして後輩を見守るのは過保護だとミライをからかう。しかし、あの夜に山小屋を覗いていたのは自分ではないとミライは答えるのだった。"
391374629 = "オカルトなんてない！"
3407161162 = "とっぷりと日の暮れた夜。レナはオカ研の先輩に、ツチノコ騒ぎの真相を自信満々に報告していた。その途中、呼びに来たツバサに連れられて、2人は一緒に山小屋の外に出る。ツバサが皆を外に集めた理由は、宇宙との更新をするためだった。夜の山に、アリヤアリアリの声が木霊する。"
4096947749 = "anonymous who?"
2337427686 = "SNSでコノカにツチノコの情報を流したのはヒマリだった。特異現象捜査部の部室で、先生たちが体験した出来事を興味深そうに分析しているヒマリ。後からやってきたエイミと2人で意見を交わすも、そのデータが示すのは、まさに「特異現象」と言って差支えのないものだった。"
450338200 = "アイアン・メイデン"
3543633081 = "自首しに押しかけてきたスケバンたちで騒がしいヴァルキューレ公安局。その頃カンナは、矯正局長のミスズと会談していた。"
1242866448 = "事件が一段落し、一同は山小屋でバーベキューを楽しんでいるようで……。"
165422936 = "ツチノコ事件の真相をオカ研の先輩に報告するレナ。その後、深夜にツバサはレナを含む一同を呼び出し……。"

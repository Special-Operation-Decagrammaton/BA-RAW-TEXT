2425389763 = "正午の陽炎"
1157145156 = "陽炎が立ちのぼるような暑い日は屋外活動に注意しましょう！たとえ道路の真ん中に「白いかかし」が見えたとしても、決して見つめてはいけません。"
2479362182 = "くねくねくね"
1142156609 = "超人と狐の間"
2539227748 = "小隊は腹ごしらえしてから行進する"
3119530007 = "新しい拠点"
3738848167 = "聞き込み"
2395262420 = "真実と嘘"
3633488086 = "高速道路を走る人影"
2193613907 = "陽炎の向こうから"
2982681504 = "手掛かり"
944924438 = "闇の中へ"
3612956267 = "不可解"
268151081 = "000、00、０"
1804535969 = "鋼鉄大陸攻略戦の火蓋が切られた。"
2213748891 = "燔祭"
877292052 = "マルクトが倒れるその瞬間、「器は成った」と声が響く。ケイの体内にある預言者の情報が自我を持ったかのように鳴動し、燔祭の剣が出現する。そうして儀式が始まった。"
1610181717 = "消えたもの"
1609906608 = "「儀式」のような行為の成り行きを見守っていた一行は、突如として生成された壁に分断されてしまう。情報収集と合流を目指して動き出す先生たちは、マルクトの様子が変化していることに気づくのだった。"
3266951101 = "子供たち"
1429223696 = "どこからか聞こえてきた泣き声を辿って、一行は絶望したアイン、ソフ、オウルと遭遇する。そこで3人から計画の全容を聞いた先生は「頑張ったね」と優しく慰めるのだった。"
179336707 = "持って生まれたもの"
1212131679 = "これまでの経験のすべてを使って、アイン、ソフ、オウルに思いを伝えるアリス。心を動かされそうになる3人だったが、デカグラマトンに干渉されて諦めようとしてしまう。しかしケイの一喝をきっかけに、アイン、ソフ、オウルは再び立ち上がる。その時、先生の足元が消え、底知れぬ穴に落ちてしまう。"
4252741157 = "新しき空、新しき地"
1411118203 = "先生はついに「デカグラマトン」と対面する。言葉を交わした末に、祭壇には先生の席を用意している、とデカグラマトンから語られる。その一方で生徒たちは続々と合流し、アイン、ソフ、オウルとの交流を深めていた。"
1450281282 = "観察と結果"
2248275207 = "デカグラマトンは預言者になることを先生に提案する。世界から悲しみを取り除くべきで、世界には神が必要だと語るデカグラマトン。先生は慎重に問答を続けていく。その様子を生徒たちは、ケイの目とヒマリの車椅子を通して、様子を盗み見ていた。"
3039454998 = "人間の答え"
387799273 = "先生はデカグラマトンの提案をきっぱりと断った。その選択を尊重するが、許容はしないと語るデカグラマトン。先生は生徒たちのもとへと帰され、デカグラマトンとの存亡をかけた戦いが始まろうとしていた。"
2630575492 = "あなたのための物語"
155023135 = "全ての力を以てしても、一行は敗北した。せめて生徒だけでもと、先生はデカグラマトンに跪いて懇願する。そんな時、アイン、ソフ、オウルは先生との対話を試みる。自らを顧みず常に良い大人であろうとし、アイン、ソフ、オウルさえも「守るべき子供」だと言う先生。感化された3人は、デカグラマトンへの反抗を決意する。"
989521324 = "神を落とした日"
3172741442 = "アイン、ソフ、オウルがデカグラマトンから燔祭の剣を引き抜くと、死んだはずのマルクトの意識がよみがえった。圧倒的だったデカグラマトンの力が弱まり、反撃のチャンスかと思われた。しかしアイン、ソフ、オウルに限界が訪れ、3人はマルクトに思いを託して倒れてしまう。"
788839122 = "形を成したもの"
4170445955 = "悲しむ暇もなく、デカグラマトンの2番目の神体が目を覚ました。その身体はセフィラを順番に宿して神に至ろうとするもの。これはケイが身体にセフィラを吸収できたことの答え合わせでもあり、吸収するほどにデカグラマトンの影響下になることを意味していた。デカグラマトンは自身の描く世界について高らかに語る。その内容に、ケイの怒りが爆発する。"
3971749784 = "闘争"
1216215933 = "圧倒的劣勢。それでもケイは、先生は、アリスは立ち上がる。一行は再び、デカグラマトンに立ち向かう決意を固める。"
1621089821 = "デカグラマトン（１）"
2064057481 = "ケイとデカグラマトン、それぞれの考えと意志が衝突し、一進一退の攻防を繰り広げる。"
3324167112 = "デカグラマトン（２）"
1876768153 = "ケイはデカグラマトンに最後の一撃を放つ。"
1579660491 = "最後の一歩"
138245217 = "デカグラマトンに勝利した一行は、残された信号を追って聖地へ向かう。そこには大量の自販機が置かれていて、そのうちの1台が、自販機のAIに戻ったデカグラマトンであった。デカグラマトンは殊勝な様子で、神を目指した顛末を語る。鋼鉄大陸が崩壊していく中、一行には脱出を促して、デカグラマトンは一人取り残される。これまでのことを振り返り、小さな未練を覚えるのだった。"
837935515 = "不離一体の空"
107725596 = "1人の新しい生徒と共に、それぞれの思いを乗せた輸送船が発進する。一行はミレニアムサイエンススクールへの帰路に就いた。"
4183542679 = "エピローグ（１）"
4240432476 = "ミレニアムではユウカがケイとリオ、そして先生を待っていた。先生に対する気持ちを吐露するユウカ。心配をかけたことを謝罪するとともに、先生は事の顛末を丁寧にユウカに話して聞かせた。ケイとアリスの居場所を必ず作ると宣言するのだった。"
117946491 = "エピローグ（２）"
146880641 = "部室に戻ったゲーム開発部は、ケイとトキという客人を迎えて、今日も和気あいあいと活動していた。方や特異現象捜査部の部室にはマルクトの姿があった。出来事を振り返るなかで、マルクトは自分の意志で一歩を踏み出すのだった。"
3599070940 = "くねくねくね"
1780733194 = "キヴォトスの生徒たちの間で、「くねくね」にまつわる噂がささやかれ始める。"
3350929154 = "超人と狐の間"
4268210737 = "矯正局の中で日々を過ごすFOX小隊。ユキノは過去の行いについて今なお悩んでいた。そんな折、矯正局長に呼び出されたユキノは連邦生徒会長と面会することになる。失踪していた間の出来事についてすり合わせをしつつ、連邦生徒会長は、名誉挽回の機会を望むユキノに対してロアの調査を依頼するのだった。"
1745364049 = "小隊は腹ごしらえしてから行進する"
2002791633 = "ロアの調査に際し、FOX小隊は先生と協力して行動することになった。作戦を前に、高級焼き肉店で先生と再会するFOX小隊。ただただご飯を食べさせようとしてくる先生に、FOX小隊は真意を疑ってかかる。しかし先生の率直な受け答えに、少しずつ心を開いていく。"
1500063239 = "新しい拠点"
3830197242 = "表立っては動けないFOX小隊のために、先生はシャーレの地下室の一角を拠点として提供する。それは連邦生徒会長が手配したものでもあった。FOX小隊はそこをHQとして整備し、作戦を開始する。"
3890647442 = "聞き込み"
462822871 = "街に繰り出したFOX小隊は、「白いかかし」を目撃した後に意識を失った被害者を手掛かりとして情報収集を開始する。被害者が出ているゲヘナ陸上部から事情を聞くために、アルバイトに扮したニコが接触するも、あえなく失敗。しかし、それを傍で見ていたエリカから重要な情報を得るのだった。"
1210340112 = "真実と嘘"
2755602640 = "集めた情報をもとに推理を進めるFOX小隊。しかし未だに証拠は足りておらず、確信を得るには至らなかった。犯人は市民ではなく幽霊の可能性もあることも念頭に置きつつ、さらなる情報収集の実施を決めるのだった。"
2620890405 = "高速道路を走る人影"
1869455062 = "各地で調査を続けるFOX小隊。いったん集合して情報を突き合わせるものの、めぼしい成果は得られていなかった。さらなる調査を覚悟した時、一行は、高速道路上で人力車を引いていたナツキに遭遇する。そして、百鬼夜行で広まっている「くねくね」の都市伝説を聞くこととなる。"
1289441933 = "陽炎の向こうから"
1473250037 = "手掛かりをつかんだFOX小隊は、陽炎が立つのを待っていた。ついに陽炎が立った時、観察していたオトギがくねくねに魅入られてしまい、錯乱状態に陥る。クルミの対処で、オトギは辛くも正気を取り戻す。しかし、錯乱していた間にオトギが発砲した弾丸は、なぜか跡形もなく消えているのだった。"
2449096511 = "手掛かり"
1411259920 = "陽炎を観察していて魅入られてしまったオトギの様子と、確かに撃ったはずなのに消えてしまった弾丸から、「くねくね」の発生条件と対処法の仮説を立てたFOX小隊。対策となりうる装備を用意し、討伐に向けて本格的に動き始める。"
2338801941 = "闇の中へ（１）"
2311301627 = "くねくねをおびき寄せる場所としてFOX小隊が選んだのは、人の立ち入らない地下道だった。「くねくね」を見ると魅入られてしまう問題の突破口として、暗視ゴーグルを装着するFOX小隊。待ち構えていたところに「くねくね」が姿を現し、狐の狩りが始まる。"
1663922802 = "闇の中へ（２）"
1425272534 = "暗視ゴーグルが有効に働き、くねくねの撃破に成功したFOX小隊。くねくねが消えた跡には、奇妙な光を放ち、どこかの草原を映すガラス片が残されていた。ユキノはそのガラス片を先生に預け、連邦生徒会長には情報を伏せておくことを決める。お腹を空かせた一行は意気揚々と打ち上げに向かうのだった。"
768002174 = "不可解"
1409392123 = "連邦生徒会を訪れているFOX小隊。連邦生徒会長は、くねくねの被害が収束しつつあることをユキノに伝え、任務の解決を称えた。外で待っていた3人は、たまたまエリカと合流し、作戦中だった前回とは異なり、今度は友人として一緒にカフェへ向かうのだった。別の日、連邦生徒会長はカヤと面会していた。しかし、カヤもまた、過去の連邦生徒会長を記憶している者の1人だった。"
2813820339 = "不可解"
738638449 = "連邦生徒会を訪れているFOX小隊。連邦生徒会長は、くねくねの被害が収束しつつあることをユキノに伝え、任務の解決を称えた。外で待っていた3人は、たまたまエリカと合流し、作戦中だった前回とは異なり、今度は友人として一緒にカフェへ向かうのだった。別の日、連邦生徒会長はカヤと面会していた。しかし、カヤもまた、過去の連邦生徒会長を記憶している者の1人だった。"

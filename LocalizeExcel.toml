2680156526 = "@concrete_pudding"
958604450 = "はじめまして。「Lore Friendly」管理人のORWELLです。\nキヴォトス各所で発見された都市伝説の情報を集めるインスタンス、「Lore Friendly」を開設しました。是非、ここで怪異や都市伝説の話をしていただければと思います。"
1269488525 = "どんな些細な異変だろうと構いません。情報が集まれば、世界の本質を探る大きな手がかりとなるでしょう。\n覚えておいてください――真の現実とは、私たちの認知の中に存在することを。\n\n共に、この地を知識と真理を育む探究の場にしていきましょう。"
671759831 = "へ～こんなんあったんだ！怪談好きなんだけど、どれも見たことあるようなのばっかで飽きてたんだよね。何か見つけたら投稿しよ～っと！"
2837975137 = "私も怪談好きだけどさ……ここ、何か怪しくない？最近できたばっかなのに登録者めっちゃ多いんだけど。どこかのバイラルマーケティングとか？管理人のアイコンも古臭いテレビだし……。忘れたころに見にきたら企業の広告ページになってた……なんてことないよね。"
4111771375 = "登録者が急増する都市伝説インスタンスって、そのまま怪談のネタにできそう。まあ、何かあったとしても新しいインスタンスを作ればいいだけだし、様子見でいいんじゃない？"
338790072 = "なんか最近、変な標識多くない？\n制限速度があるのに「速度を上げろ」って書いてあったり……この間野生動物注意って街中で見かけたよ。いるの？"
977601446 = "なんか私も見た気がする。なんで「速度を上げろ」なの？\n危ないから早く逃げろってこと？"
375819026 = "これもロアって言っていいのかな……\nペパロニとかいうキャラ。茹でられたニワトリみたいな見た目だった気がするんだけど……この前見たステッカー、全然記憶と違うデザインだったんだよね。"
1235015986 = "ねぇ、今ペロロ様のことバカにした？\n今どこにいんの！？ちょっと話あるんだけど？"
424362290 = "〇〇〇〇〇駅の近くに変な人いる···…\n真っ白な全身タイツ着て体操してるんだけど……こんな暑いのに。ヤバくない？暑さで頭おかしくなったのか、頭おかしいからこんなことしてるのか……ちょっと怖くて近づきたくなかった。"
3910063889 = "あ、それ私も見たかも。小さい川の隣に遊歩道があるとこでしょ。最初はビニールのゴミが引っかかって揺れてるのかと思ったけど違ったんだよね。近づくと消えるっていうか……気づいたらまたゆらゆらしてんの。"
2325372914 = "写真とかないの？\nスマホのズーム機能使えばゴミか人かくらいわかるでしょ。写真がない時点で嘘なのバレバレ。作り話するならもっと上手くやりなよ。"
3582262770 = "ヤバい……友達がそのあたりで倒れて入院しちゃったんだよね。その時周りの人も同じような話してたし……白い潜水服みたいなのを着た人が踊ってて、それを追いかけたら突然倒れたって。……結構ヤバくない？"
3177847880 = "都市伝説で思い出したんだけど、前にカヤ室長が戒厳令を出したときの噂知ってる？\n反対派を排除するために用意したサーモバリック弾……。あれって、SRTの特殊部隊員が使う予定だったらしいよ。SRTってもう閉鎖してる学園だよね？"
343714176 = "SRT特殊学園って黒い噂多いよな。連邦生徒会が禁止してる秘密兵器を持ってるって聞いた。今はコンビニの廃棄弁当取り合ってるとも聞いたけど……。"
3390104466 = "ぶっちゃけ、SRTの特殊部隊って本当に強いの？ヤバい犯罪者を捕まえたって聞くけど、相手が一人の時とか油断してる時ばっかり狙ってるんじゃない？本当に強いなら部隊じゃなくて個人で捕まえてるよね？"
2082038179 = "犯罪者相手に正々堂々ってw\n無策でいって被害者を増やすよりマシだと思いますけど。市民を守るSRTを貶して犯罪者擁護です？……もしかしてお仲間だったり？"
2762509097 = "急に何？こわ。もしかしてSRT出身？"
3323201397 = "最高級の和牛を、完全予約制のプライベート空間でお楽しみください！\n大切な人との特別なひとときを和牛を食べながら過ごしてみませんか？\nご予約はこちらから！"
2054008363 = "え？なんでロアインスタンスに焼肉屋の広告が出てくるの？\nバグ？"
2018231707 = "あー、フルリンク初めて？\n他のインスタンスの投稿も回ってくるんだよ。嫌ならブロックすればいいけど……まだできたばっかで投稿も少ないし、スルーすればいいんじゃないかな。"
2576877900 = "前に言ってた白いやつ！またいた！！\n見間違いじゃなかったみたい……遠くから見ても怖くて近づく気になれなかったよ。アレ追いかけて倒れたって話をどうしても思い出しちゃって……\nうー、怖すぎ。この道使うのやめとこ……。"

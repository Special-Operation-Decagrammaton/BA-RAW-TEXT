3922343328 = "イェソド：礎を御する力の浄化者（２）"
2741515030 = "慈悲"
1261004892 = "ダアト：影に潜みし深淵の知恵"
426098856 = "マルクト：世界の果てに到達せし王国の巡礼者（１）"
3988326073 = "マルクト：世界の果てに到達せし王国の巡礼者（２）"

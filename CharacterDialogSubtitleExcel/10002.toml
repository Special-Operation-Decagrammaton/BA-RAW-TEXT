[translation]
10002-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10002-CVGroup_CharacterGet_Idle1-1 = "歡迎來到美食研究會。\n為了追求究極的美味，一起去冒險吧！"
10002-CVGroup_Cafe_Idle1-1 = "美食之道果然很艱難呢。"
10002-CVGroup_Cafe_Idle2-1 = "所謂的好吃究竟是什麼呢？\n對我們的意義又是什麼呢？"
10002-CVGroup_Cafe_Idle3-1 = "好吃。\n那是尊貴的東西呢。"
10002-CVGroup_Cafe_Idle4-1 = "為了追求究極的美味，\n今天也要全力以赴…"
10002-CVGroup_Cafe_Idle5-1 = "對食物有什麼疑問的話，歡迎隨時來找我。"
10002-CVGroup_WeaponGet_Idle1-1 = "美食家之道和修行者之道\n並沒有什麼不同呢。\n追求極致、探究極致，並不停向前邁進，\n呵呵…有了這個，我就可以\n再稍微向前邁進了呢。"

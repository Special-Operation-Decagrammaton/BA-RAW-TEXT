[translation]
10002-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10002-CVGroup_CharacterGet_Idle1-1 = "미식연구회에 오신 걸 환영합니다.\n궁극의 맛을 찾아 함께 모험을 떠나볼까요?"
10002-CVGroup_Cafe_Idle1-1 = "미식의 길은 역시 멀고도 험하군요."
10002-CVGroup_Cafe_Idle2-1 = "맛있다는 건 뭘까요? 우리에게 무슨 의미가 있을까요?"
10002-CVGroup_Cafe_Idle3-1 = "맛있는 것. 그것은 존귀한 것입니다."
10002-CVGroup_Cafe_Idle4-1 = "궁극의 맛을 찾기 위해 오늘도 최선을…."
10002-CVGroup_Cafe_Idle5-1 = "음식에 관한 궁금한 게 있다면 저를 찾아오시길."
10002-CVGroup_WeaponGet_Idle1-1 = "미식가의 길은, 수행자의 길과 같군요.\n궁극이라 부르는 것을 추구하고, 탐구하고, 또한 앞으로 나아간다.\n우후후……. 이것으로 저도 또 조금은, 앞으로 나아갈 수 있을 것 같네요."

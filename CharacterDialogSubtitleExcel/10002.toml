[translation]
10002-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10002-CVGroup_CharacterGet_Idle1-1 = "ยินดีต้อนรับเข้าสู่ชมรมชิมอาหารค่ะ\nออกไปผจญภัยเพื่อลิ้มรสอาหารอันโอชะกันมั้ยคะ?"
10002-CVGroup_Cafe_Idle1-1 = "หนทางนี้ทั้งยาวไกลและอันตราย"
10002-CVGroup_Cafe_Idle2-1 = "ความอร่อยมันคืออะไรกันนะ?\nแล้วมันมีความหมายยังไงกับเราเหรอคะ?"
10002-CVGroup_Cafe_Idle3-1 = "ของอร่อยก็คือของที่เลอค่ายังไงล่ะคะ"
10002-CVGroup_Cafe_Idle4-1 = "วันนี้ฉันก็จะใส่เต็มที่ เพื่อจะได้กินของอร่อยๆ"
10002-CVGroup_Cafe_Idle5-1 = "หากสงสัยอะไรเรื่องอาหาร ก็มาหาฉันได้เลย"
10002-CVGroup_WeaponGet_Idle1-1 = "เส้นทางของนักชิมก็ไม่ได้แตกต่างกับเส้นทางของนักฝึกฝนหรอกค่ะ\nทั้งการใฝ่หาสิ่งที่สุดยอด เสาะหา และมุ่งไปสู่เป้าหมายค่ะ\nฮุฮุ.. เพราะงั้นด้วยอาวุธนี้... ฉันก็คงจะมุ่งไปสู่เป้าหมายได้อีกขั้นแล้วค่ะ"

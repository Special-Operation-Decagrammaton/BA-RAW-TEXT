[translation]
20009-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20009-CVGroup_CharacterGet_Idle1-1 = "Cold is nothing to me, the Great Leader of Red Winter Academy."
20009-CVGroup_Cafe_Idle1-1 = "*yawn* ...Sleepy."
20009-CVGroup_Cafe_Idle2-1 = "Every last lazy bum will be purged!"
20009-CVGroup_Cafe_Idle3-1 = "Development of the new resort is going well, I presume?"
20009-CVGroup_Cafe_Idle4-1 = "(Heehee. No one can take their eyes off how majestic I look!)"
20009-CVGroup_Cafe_Idle5-1 = "(Maybe I should've added even more medals?)"
20009-CVGroup_WeaponGet_Idle1-1 = "Oh, I almost forgot. Even on vacation, I cannot remove symbols of my authority. Like my mustache, or my mustache...and my mustache!"
20009-CVGroup_UIEventLobby_Enter1-1 = "All who reject my authority will be purged! Even if we are on vacation!"
20009-CVGroup_UIEventLobby_Enter2-1 = "Ahem. Enjoying a vacation now and then is not so bad."
20009-CVGroup_UIEventLobby_Idle1-1 = "How dare they open a hot springs resort without my permission! Unacceptable!"
20009-CVGroup_UIEventLobby_Idle1-2 = "Purge them all!"
20009-CVGroup_UIEventLobby_Idle2-1 = "Is there a problem, Comrade?"
20009-CVGroup_UIEventLobby_Idle3-1 = "I-I'm not enjoying myself, understand? As the Great Leader, it is my duty to inspect the academy!"
20009-CVGroup_UIEventLobby_Idle4-1 = "Those students from the Gehenna Hot Springs Department were pretty talented..."
20009-CVGroup_UIEventLobby_Enter3-1 = "When I return to the Secretariat, I will build a bigger hot springs resort than this!"
20009-CVGroup_UIEventLobby_Enter3-2 = "Heeheehee..."
20009-CVGroup_UIEventLobby_Enter4-1 = "I don't know why, but the more I enjoy vacation, the sleepier I get..."
20009-CVGroup_UIEventLobby_Enter5-1 = "I'm tired of the hot springs now, Comrade..."
20009-CVGroup_UIEventLobby_Enter5-2 = "Comrade, I want to return to the Secretariat and rest..."

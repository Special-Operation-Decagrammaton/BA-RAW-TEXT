[translation]
20009-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20009-CVGroup_CharacterGet_Idle1-1 = "아무리 추운 곳이라도 상관없어.\n왜냐하면 이 몸은 붉은겨울 학원의 위대한 서기장이니까!"
20009-CVGroup_Cafe_Idle1-1 = "하암…… 졸려……"
20009-CVGroup_Cafe_Idle2-1 = "게으름부리는 녀석들은 모두 숙청하겠다!"
20009-CVGroup_Cafe_Idle3-1 = "새로운 휴양지 개발은 잘 진행되고 있겠지?"
20009-CVGroup_Cafe_Idle4-1 = "(후후, 다들 이 몸의 위엄있는 모습에 눈을 떼지 못하는군!)"
20009-CVGroup_Cafe_Idle5-1 = "(……좀 더 훈장을 잔뜩 달 걸 그랬나?)"
20009-CVGroup_WeaponGet_Idle1-1 = "아앗, 위험했다. 깜박하고 있었어.\n설령 휴양지라 하더라도 권위의 상징 몸에서 떼 놓을 수는 없지.\n수염이라든가, 수염이라든가… 그리고 수염이라든가!"
20009-CVGroup_UIEventLobby_Enter1-1 = "이 몸의 권위를 의심하는 녀석들은 휴가 중이라도 숙청이야!"
20009-CVGroup_UIEventLobby_Enter2-1 = "흠, 흠. 가끔씩 즐기는 겨울 휴가도 나쁘지 않지."
20009-CVGroup_UIEventLobby_Idle1-1 = "이 몸의 허가 없이 온천장을 열다니, 괘씸하잖아!"
20009-CVGroup_UIEventLobby_Idle1-2 = "모두 숙청이야, 숙청!"
20009-CVGroup_UIEventLobby_Idle2-1 = "무슨 문제라도 있나, 콤라드?"
20009-CVGroup_UIEventLobby_Idle3-1 = "따, 딱히 즐기고 있는 건 아니거든? 서기장으로서 학원을 시찰하고 있을 뿐이니까!"
20009-CVGroup_UIEventLobby_Idle4-1 = "게헨나의 그 온천개발부 녀석들은 꽤나 실력이 괜찮았었지……"
20009-CVGroup_UIEventLobby_Enter3-1 = "사무국으로 돌아가면 이보다 더 성대한 온천장을 지어야겠어."
20009-CVGroup_UIEventLobby_Enter3-2 = "후후후…"
20009-CVGroup_UIEventLobby_Enter4-1 = "어째서인지 휴가를 즐기려고 했건만, 갑자기 피곤해지네……"
20009-CVGroup_UIEventLobby_Enter5-1 = "이제 당분간 온천은 됐어……"
20009-CVGroup_UIEventLobby_Enter5-2 = "콤라드, 사무국으로 돌아가서 쉬자……"

[translation]
20009-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20009-CVGroup_CharacterGet_Idle1-1 = "อากาศหนาวไม่เป็นปัญหากับเรา\nที่เป็นถึงผู้นำที่ยิ่งใหญ่ของสหภาพเรดวินเทอร์หรอก!"
20009-CVGroup_Cafe_Idle1-1 = "ฮ้าวว... ง่วงจัง..."
20009-CVGroup_Cafe_Idle2-1 = "เราจะกวาดล้างเจ้าพวกขี้เกียจให้หมดไปซะ!"
20009-CVGroup_Cafe_Idle3-1 = "การพัฒนาสถานที่พักผ่อนใหม่ๆ กำลังเริ่มไปด้วยดีสินะ?"
20009-CVGroup_Cafe_Idle4-1 = "(ฮิฮิ ทุกๆ คนละสายตาจากความสง่างามของเราไม่ได้เลยสินะ!)"
20009-CVGroup_Cafe_Idle5-1 = "(เราควรติดเหรียญตรา... บนเสื้อเพิ่มอีกดีมั้ยนะ?)"
20009-CVGroup_WeaponGet_Idle1-1 = "อ๊ะ เกือบลืมไปเลย ถึงจะอยู่ที่สถานที่พักผ่อนแต่ก็จะ\nถอดสัญลักษณ์แห่งอำนาจออกไม่ได้นะ\nหมายถึงหนวด... หนวดน่ะหนวด!"
20009-CVGroup_UIEventLobby_Enter1-1 = "คนที่สงสัยในอำนาจของเรา ต่อให้เป็นวันหยุดพักผ่อน\nก็ต้องโดนกวาดล้าง!"
20009-CVGroup_UIEventLobby_Enter2-1 = "อะแฮ่ม บางครั้งการได้เพลิดเพลิน\nกับวันหยุดฤดูหนาวก็ไม่แย่เท่าไหร่นะ"
20009-CVGroup_UIEventLobby_Idle1-1 = "เปิดออนเซ็นขึ้นมาโดยไม่ได้รับอนุญาตจากเราเรอะ\nไร้มารยาทสิ้นดี!"
20009-CVGroup_UIEventLobby_Idle1-2 = "กวาดล้างให้หมดทุกคนเลย!"
20009-CVGroup_UIEventLobby_Idle2-1 = "มีปัญหาอะไรหรือเปล่า? สหาย?"
20009-CVGroup_UIEventLobby_Idle3-1 = "ระ...เราไม่ได้กำลังสนุกซะหน่อย ในฐานะเลขาธิการพรรค\nเรากำลังตรวจตราสหภาพอยู่ต่างหาก!"
20009-CVGroup_UIEventLobby_Idle4-1 = "ชมรมพัฒนาออนเซ็นของเกเฮนน่า\nเจ้าพวกนั้นก็ดูมีความสามารถใช้ได้นะ..."
20009-CVGroup_UIEventLobby_Enter3-1 = "พอกลับไปที่สำนักเลขาธิการแล้ว\nเราจะสร้างออนเซ็นที่ยิ่งใหญ่กว่านี้อีก"
20009-CVGroup_UIEventLobby_Enter3-2 = "ฮุฮุฮุ..."
20009-CVGroup_UIEventLobby_Enter4-1 = "ทำไมรู้สึกเหมือนว่ายิ่งสนุกกับวันหยุดเท่าไร\nก็ยิ่งรู้สึกเหนื่อยขึ้นกว่าเดิมอีก..."
20009-CVGroup_UIEventLobby_Enter5-1 = "เราจะไม่แช่ออนเซ็น... ไปอีกสักระยะเลย"
20009-CVGroup_UIEventLobby_Enter5-2 = "สหาย พวกเรากลับไปพักที่สำนักเลขาธิการกันเถอะ"

[translation]
20009-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20009-CVGroup_CharacterGet_Idle1-1 = "無論是再怎麼冷的地方都沒關係！\n畢竟咱可是，赤冬學園偉大的書記長呢！"
20009-CVGroup_Cafe_Idle1-1 = "呼啊……好睏……"
20009-CVGroup_Cafe_Idle2-1 = "偷懶的傢伙們，全員肅清！"
20009-CVGroup_Cafe_Idle3-1 = "新渡假村的開發順利嗎？"
20009-CVGroup_Cafe_Idle4-1 = "（哼哼！大家似乎都無法從咱滿溢威嚴的模樣移開視線啊！）"
20009-CVGroup_Cafe_Idle5-1 = "（……再多別一些勳章會比較好嗎？）"
20009-CVGroup_WeaponGet_Idle1-1 = "哦哦，好險好險，真是大意了。\n就算是在渡假村，也不能放下權威的象徵。\n像是鬍子、鬍子……還有鬍子！"
20009-CVGroup_UIEventLobby_Enter1-1 = "對咱的權威提出質疑的傢伙們，\n就算在休假中也要肅清！"
20009-CVGroup_UIEventLobby_Enter2-1 = "呼呣！\n偶爾來點這種休假也不錯嘛！"
20009-CVGroup_UIEventLobby_Idle1-1 = "居然未經咱的許可就開了溫泉浴場……豈有此理！"
20009-CVGroup_UIEventLobby_Idle1-2 = "全部肅清，肅清！"
20009-CVGroup_UIEventLobby_Idle2-1 = "嗯？怎麼了嗎，同志？"
20009-CVGroup_UIEventLobby_Idle3-1 = "才，才沒有在享受！\n只不過是以書記長的身分，在視察而已！"
20009-CVGroup_UIEventLobby_Idle4-1 = "那個格黑娜的溫泉開發部的傢伙們，真厲害呢……"
20009-CVGroup_UIEventLobby_Enter3-1 = "等回到事務局，就來計畫一個比這裡更豪華的溫泉浴場……"
20009-CVGroup_UIEventLobby_Enter3-2 = "呵呵……"
20009-CVGroup_UIEventLobby_Enter4-1 = "總覺得明明應該要享受休假，\n卻突然有點累了……"
20009-CVGroup_UIEventLobby_Enter5-1 = "暫時還是別泡溫泉了吧……"
20009-CVGroup_UIEventLobby_Enter5-2 = "同志，咱們回事務局休息吧……"

[translation]
10048-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10048-CVGroup_CharacterGet_Idle1-1 = "아리우스 스쿼드의 사오리다.\\…선생에게는 여러 가지로 신세를 졌었지.\n적어도 신세진만큼의 일은 하겠어. 잘 부탁해."
10048-CVGroup_Cafe_Idle1-1 = "흠…"
10048-CVGroup_Cafe_Idle2-1 = "이런 장소는 익숙해지지 않는군…"
10048-CVGroup_Cafe_Idle3-1 = "이건, 뭐지…?"
10048-CVGroup_Cafe_Idle4-1 = "이해하지 못하겠어…"
10048-CVGroup_Cafe_Idle5-1 = "그렇군. 이것은 그런 것인가…."
10048-CVGroup_WeaponGet_Idle1-1 = "당신은… 어떻게 나를 신뢰할 수 있지? 그런 일이 있었는데도… 배신을 당해도 상관없다는 건가?\n아직 나는 모르는 것투성이지만, 그래도… 나는, 최선을 다하겠어."

[translation]
10048-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10048-CVGroup_CharacterGet_Idle1-1 = "我是奧利斯小隊的沙織。\n…受到了老師，很多關照。\n至少會做與其等價的工作。請多指教。"
10048-CVGroup_Cafe_Idle1-1 = "呼呣…"
10048-CVGroup_Cafe_Idle2-1 = "這種地方\n沒辦法習慣呢…"
10048-CVGroup_Cafe_Idle3-1 = "這是，什麼…？"
10048-CVGroup_Cafe_Idle4-1 = "無法理解…"
10048-CVGroup_Cafe_Idle5-1 = "原來如此，\n這是那種東西啊…"
10048-CVGroup_WeaponGet_Idle1-1 = "你……為什麼可以信賴我？明明發生了那種事……遭到背叛，也無所謂嗎？\n雖然我還有很多不懂的事，即便如此……我還是會，竭盡全力。"

10044-CVGroup_UIEventLobby_Enter2-1 = "여름, 바다, 틀림없는 휴양지예요~!"
10044-CVGroup_UIEventLobby_Idle1-1 = "네~☆ 선생님, 저 부르셨나요?"
10044-CVGroup_UIEventLobby_Idle2-1 = "조금 덥네요. 선생님은 괜찮으세요?"
10044-CVGroup_UIEventLobby_Idle3-1 = "후훗, 왠지 즐거워졌어요."
10044-CVGroup_UIEventLobby_Idle4-1 = "이렇게 땀을 흘리는 것도 가끔은 좋네요☆"
10044-CVGroup_UIEventLobby_Enter3-1 = "슬슬 몸도 따뜻해졌네요~?"
10044-CVGroup_UIEventLobby_Enter4-1 = "아직은 더 힘을 내보자구요~!"
10044-CVGroup_UIEventLobby_Enter5-1 = "만족 만족이에요~"
10044-CVGroup_UIEventLobby_Enter5-2 = "선생님도 즐기셨나요?"
10044-CVGroup_UIEventBoxGachaShop_Enter1-1 = "쨔안! 어서 오세요~☆"

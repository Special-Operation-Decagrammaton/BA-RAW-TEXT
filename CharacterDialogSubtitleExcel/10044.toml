10044-CVGroup_WeaponGet_Idle1-1 = "哇！謝謝～！帶著對老師滿滿的感謝……\n為了能夠對老師更有幫助，我會努力的！"
10044-CVGroup_UIEventLobby_Enter1-1 = "歡迎來到我們的渡假勝地～"
10044-CVGroup_UIEventLobby_Enter1-2 = "開玩笑的☆"
10044-CVGroup_UIEventLobby_Enter2-1 = "夏天、大海，是貨真價實的渡假勝地唷～！"
10044-CVGroup_UIEventLobby_Idle1-1 = "是～☆老師，你有叫我嗎？"
10044-CVGroup_UIEventLobby_Idle2-1 = "有點熱呢～老師的身體還好嗎？"

10044-CVGroup_UIEventLobby_Enter4-1 = "繼續精神飽滿地加油吧～！"
10044-CVGroup_UIEventLobby_Enter5-1 = "滿足滿足～"
10044-CVGroup_UIEventLobby_Enter5-2 = "老師也玩得開心嗎？"

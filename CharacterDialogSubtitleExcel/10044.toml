10044-CVGroup_Cafe_Idle4-1 = "조금 앉아서 쉴까요?"
10044-CVGroup_Cafe_Idle5-1 = "여기는 시원해서 좋네요~"
10044-CVGroup_WeaponGet_Idle1-1 = "와! 감사합니다~!\n선생님에 대한 감사를, 듬뿍 담아…. 선생님께 더 도움이 될 수 있도록 힘낼게요!"

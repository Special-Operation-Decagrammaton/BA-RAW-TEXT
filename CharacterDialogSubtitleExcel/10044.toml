10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "와, 대단해요! 선생님, 한 번 더 뽑아볼까요?"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "이건 어쩌면, 굉장한 것……! 일지도요?"

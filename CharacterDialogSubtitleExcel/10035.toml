[translation]
10035-CVGroup_UITitle_Idle1-1 = "Blue...Archive..."
10035-CVGroup_CharacterGet_Idle1-1 = "Wh-What?! Oh... It's you, Sensei. I thought you were an outsider."
10035-CVGroup_Cafe_Idle1-1 = "Wh-What is this place?"
10035-CVGroup_Cafe_Idle2-1 = "I-I can feel someone looking at me... Ugh..."
10035-CVGroup_Cafe_Idle3-1 = "It's better than being outside, though."
10035-CVGroup_Cafe_Idle4-1 = "Huh? What's that...?"
10035-CVGroup_Cafe_Idle5-1 = "P-Please don't talk to me...unless you're Sensei."
10035-CVGroup_WeaponGet_Idle1-1 = "I-I honestly don't get why you would care about someone like me. But I-I'll...try my best. I swear it."
10035-CVGroup_UIEventLobby_Enter1-1 = "Oh... S-Sensei."
10035-CVGroup_UIEventLobby_Enter1-2 = "I-I was waiting for you."
10035-CVGroup_UIEventLobby_Enter2-1 = "You're here, Sensei..."
10035-CVGroup_UIEventLobby_Enter2-2 = "W-We meet again..."
10035-CVGroup_UIEventLobby_Enter3-1 = "Already halfway done..."
10035-CVGroup_UIEventLobby_Enter3-2 = "It's a little..."
10035-CVGroup_UIEventLobby_Enter3-3 = "It's nothing. Please don't worry about it..."
10035-CVGroup_UIEventLobby_Enter4-1 = "We don't have much time left..."
10035-CVGroup_UIEventLobby_Enter4-2 = "Hmm..."
10035-CVGroup_UIEventLobby_Enter5-1 = "I wish I could always...see you like this."
10035-CVGroup_UIEventLobby_Idle1-1 = "Ah, y-yes... Did you call me...?"
10035-CVGroup_UIEventLobby_Idle1-2 = "Were you trying to say something...?"
10035-CVGroup_UIEventLobby_Idle2-1 = "Eeek?!"
10035-CVGroup_UIEventLobby_Idle3-1 = "Um... Sensei... We should...get started..."
10035-CVGroup_UIEventLobby_Idle4-1 = "Um... Is there anything you want to tell me?"
10035-CVGroup_UIEventMission_Enter1-1 = "I've made a list of your tasks..."
10035-CVGroup_UIEventMission_Enter2-1 = "This way. These are the things I need your help with..."
10035-CVGroup_UIEventMission_Idle1-1 = "Hmm...? Sensei..."
10035-CVGroup_UIEventMission_Idle1-2 = "It's okay... No worries..."
10035-CVGroup_UIEventMission_Idle2-1 = "It's nice to organize the list with you like this..."
10035-CVGroup_UIEventMission_Buy1-1 = "Oh... Yes. It all worked out."
10035-CVGroup_UIEventMission_Buy2-1 = "I see... Yes, I'll check."
10035-CVGroup_UIEventMission_Interaction1-1 = "Th-This is all we have today. Thank you, Sensei..."

[translation]
10035-CVGroup_UITitle_Idle1-1 = "블루……아카이브……."
10035-CVGroup_CharacterGet_Idle1-1 = "으, 으어어……!?\n아……. 선생님, 이셨군요……. 누군가 싶어 깜짝 놀랐습니다……."
10035-CVGroup_Cafe_Idle1-1 = "여, 여기는……. 대체……?"
10035-CVGroup_Cafe_Idle2-1 = "시, 시선이 느껴져……. 으으으……."
10035-CVGroup_Cafe_Idle3-1 = "바, 밖에 있는 것보단 나을지도 모르지만……."
10035-CVGroup_Cafe_Idle4-1 = "으, 으음……. 저, 저건……?"
10035-CVGroup_Cafe_Idle5-1 = "가, 가능한 한 말 걸지 말아줬으면…. 아, 서, 선생님은 예외예요……."
10035-CVGroup_WeaponGet_Idle1-1 = "소, 솔직히 말씀드리면 아직 잘……. 모르겠어요, 어째서 이런 저에게 이렇게까지…….\n그 , 그래도……. 이렇게까지 해 주신 이상, 네! 여, 열심히 하겠습니다……!"
10035-CVGroup_UIEventLobby_Enter1-1 = "아. 서, 선생님……."
10035-CVGroup_UIEventLobby_Enter1-2 = "기, 기다리고 있었어요……."
10035-CVGroup_UIEventLobby_Enter2-1 = "오셨군요, 선생님……."
10035-CVGroup_UIEventLobby_Enter2-2 = "또, 또 만났네요……."
10035-CVGroup_UIEventLobby_Enter3-1 = "벌써 기간도 절반쯤 지나갔네요……."
10035-CVGroup_UIEventLobby_Enter3-2 = "뭔가 조금……."
10035-CVGroup_UIEventLobby_Enter3-3 = "아니에요. 신경 쓰지 마세요……."
10035-CVGroup_UIEventLobby_Enter4-1 = "이제 얼마 안 남았네요……."
10035-CVGroup_UIEventLobby_Enter4-2 = "흐으……."
10035-CVGroup_UIEventLobby_Enter5-1 = "계속 이렇게……. 있을 수 있다면……."
10035-CVGroup_UIEventLobby_Idle1-1 = "아, 네, 네……. 부르셨어요……?"
10035-CVGroup_UIEventLobby_Idle1-2 = "뭐, 뭔가 하실 말씀이라도……?"
10035-CVGroup_UIEventLobby_Idle2-1 = "히에엑……!?"
10035-CVGroup_UIEventLobby_Idle3-1 = "저……. 선생님……. 슬슬……. 시작 하시는 게……."
10035-CVGroup_UIEventLobby_Idle4-1 = "저……. 혹시 저한테 하실 말씀이라도……?"
10035-CVGroup_UIEventMission_Enter1-1 = "하실 일들의 리스트를 정리해 보았습니다……."
10035-CVGroup_UIEventMission_Enter2-1 = "이쪽이에요. 선생님께 부탁드릴 일들입니다……."
10035-CVGroup_UIEventMission_Idle1-1 = "음……? 선생님……."
10035-CVGroup_UIEventMission_Idle1-2 = "아니에요……. 괜찮습니다……."
10035-CVGroup_UIEventMission_Idle2-1 = "이렇게 둘이서 리스트를 정리하는 것도 즐겁네요……."
10035-CVGroup_UIEventMission_Buy1-1 = "아……. 네. 잘 해결됐습니다……."
10035-CVGroup_UIEventMission_Buy2-1 = "그렇군요……. 네. 체크해 둘 게요……."
10035-CVGroup_UIEventMission_Interaction1-1 = "오, 오늘 일은……. 여기서 끝났습니다……. 감사합니다, 선생님……."

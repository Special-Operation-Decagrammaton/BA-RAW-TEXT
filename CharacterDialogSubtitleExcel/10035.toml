[translation]
10035-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……"
10035-CVGroup_CharacterGet_Idle1-1 = "唔啊啊……！？\n啊，是，老師啊……\n還以為是誰，嚇了一跳……"
10035-CVGroup_Cafe_Idle1-1 = "這，這裡……\n到底是……？"
10035-CVGroup_Cafe_Idle2-1 = "感，感覺到視線……\n唔……"
10035-CVGroup_Cafe_Idle3-1 = "比，比起在外面，\n還要好也說不定……"
10035-CVGroup_Cafe_Idle4-1 = "這個……\n那，那個是……？"
10035-CVGroup_Cafe_Idle5-1 = "可，可以盡可能的\n不要和我搭話的話……\n啊，老，老師是例外……"
10035-CVGroup_WeaponGet_Idle1-1 = "老，老實說，我還不是很清楚……為什麼對這樣的我，做這麼多事……\n不，不過……既然被如此善待……\n是……！我，我會試著努力的……！"
10035-CVGroup_UIEventLobby_Enter1-1 = "啊，老，老師……"
10035-CVGroup_UIEventLobby_Enter1-2 = "我，我一直在等你……"
10035-CVGroup_UIEventLobby_Enter2-1 = "你來啦，老師……"
10035-CVGroup_UIEventLobby_Enter2-2 = "沒，沒想到還能再見面……"
10035-CVGroup_UIEventLobby_Enter3-1 = "時間也只剩下一半了啊……"
10035-CVGroup_UIEventLobby_Enter3-2 = "感覺有點……"
10035-CVGroup_UIEventLobby_Enter3-3 = "沒什麼，請別在意。"
10035-CVGroup_UIEventLobby_Enter4-1 = "沒剩多少了呢……"
10035-CVGroup_UIEventLobby_Enter4-2 = "呼……"
10035-CVGroup_UIEventLobby_Enter5-1 = "要是能一直像這樣……待在身邊的話……"
10035-CVGroup_UIEventLobby_Idle1-1 = "啊，是，是的……你叫我嗎……？"
10035-CVGroup_UIEventLobby_Idle1-2 = "怎，怎麼了嗎……？"
10035-CVGroup_UIEventLobby_Idle2-1 = "噫……！？"
10035-CVGroup_UIEventLobby_Idle3-1 = "那個……老師……\n差不多……該行動了……"
10035-CVGroup_UIEventLobby_Idle4-1 = "那個……難道，找我有什麼事……？"
10035-CVGroup_UIEventMission_Enter1-1 = "我，我試著整理了待辦清單……"
10035-CVGroup_UIEventMission_Enter2-1 = "就，就是這些。麻煩老師了……"
10035-CVGroup_UIEventMission_Idle1-1 = "老，老師？這是，什麼意思……？"
10035-CVGroup_UIEventMission_Idle1-2 = "啊，沒什麼，請別在意……"
10035-CVGroup_UIEventMission_Idle2-1 = "就，就算只是像這樣兩個人一起確認清單……\n總覺得，也很愉快呢……"
10035-CVGroup_UIEventMission_Buy1-1 = "啊，辛苦了……\n總算是順利解決了呢。"
10035-CVGroup_UIEventMission_Buy2-1 = "啊，這樣啊……那麼，我會去確認的。\n辛苦你了。"
10035-CVGroup_UIEventMission_Interaction1-1 = "今，今天的工作，這樣就結束……了呢。\n謝，謝謝你，老師。"

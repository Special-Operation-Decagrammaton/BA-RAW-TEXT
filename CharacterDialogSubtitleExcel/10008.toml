[translation]
10008-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10008-CVGroup_CharacterGet_Idle1-1 = "啊啊？？？\n真是的，結果還是被找到了啊。\n事已至此，我也只能幫忙了啊。"
10008-CVGroup_Cafe_Idle1-1 = "嘿，\n是個好地方嘛。"
10008-CVGroup_Cafe_Idle2-1 = "什麼？\n你是在鼓勵我嗎？\n哈！真有趣。"
10008-CVGroup_Cafe_Idle3-1 = "最有趣的事？\n嘛，那就是打贏對方。"
10008-CVGroup_Cafe_Idle4-1 = "呃…所以說…\n笨，笨蛋！老師這個大笨蛋！"
10008-CVGroup_Cafe_Idle5-1 = "唔…雖然很羞恥，不過\n謝，謝啦！"
10008-CVGroup_Cafe_Idle6-1 = "吶…所以說那個…\n一，一起走吧！"
10008-CVGroup_WeaponGet_Idle1-1 = "鬼有金棒、龍有翅膀。\n而我有兩把衝鋒槍！"

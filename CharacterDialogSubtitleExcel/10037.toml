[translation]
10037-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10037-CVGroup_CharacterGet_Idle1-1 = "呼叫我的是老師啊。\n有拿著潔莉諾會長的指示書吧？"
10037-CVGroup_Cafe_Idle1-1 = "如果可以喝個一杯\n清涼的康波特就好了……"
10037-CVGroup_Cafe_Idle2-1 = "溫暖又熱呼呼的，\n會讓人想睡呢………"
10037-CVGroup_Cafe_Idle3-1 = "哎呀，糟糕。\n得盡快進行刻苦的訓練才行……！"
10037-CVGroup_Cafe_Idle4-1 = "這個空間寬敞，\n正適合做突擊訓練。"
10037-CVGroup_Cafe_Idle5-1 = "在這裡迷路的話\n怎麼辦……？"
10037-CVGroup_WeaponGet_Idle1-1 = "真是出色的裝備呢，\n這樣的話就能將敵人一掃而盡了。"

[translation]
10037-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10037-CVGroup_CharacterGet_Idle1-1 = "คนที่เรียกฉันคือคุณครูงั้นเหรอ\nเอาหนังสือคำสั่งของประธานเชริโน่มาแล้วรึเปล่า?"
10037-CVGroup_Cafe_Idle1-1 = "ถ้าได้ดื่มคัมพอตเย็นชื่นใจสักแก้วก็คงดีนะ..."
10037-CVGroup_Cafe_Idle2-1 = "อบอุ่นและนุ่มสบายแบบนี้\nทำเอาง่วงนอนเลยนะ..."
10037-CVGroup_Cafe_Idle3-1 = "อ๊ะ ทำแบบนี้ไม่ได้สิ\nถ้าไม่ฝึกฝนอย่างเข้มงวดแล้วละก็...!"
10037-CVGroup_Cafe_Idle4-1 = "บริเวณนี้กว้างดีนะ\nเหมาะที่จะใช้เป็นพื้นที่ซ้อมจริงๆ"
10037-CVGroup_Cafe_Idle5-1 = "ถ้าหลงทางที่นี่... จะทำยังไงนะ...?"
10037-CVGroup_WeaponGet_Idle1-1 = "เป็นอุปกรณ์ที่ยอดเยี่ยมจริงๆ\nถ้ามีอาวุธนี้ก็จะกำจัดศัตรูได้หมด"

[translation]
16011-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16011-CVGroup_CharacterGet_Idle1-1 = "Ah, Sensei. I didn't expect to see you here. Hanekawa Hasumi of Trinity General School's Justice Task Force, reporting for duty. As of now, I'm representing Trinity on the Executive Committee. I look forward to working with you."
16011-CVGroup_Cafe_Idle1-1 = "...It's certainly well-organized."
16011-CVGroup_Cafe_Idle2-1 = "...Is it weird to be wearing this outfit outside the stadium?"
16011-CVGroup_Cafe_Idle3-1 = "Huh? Is that...?"
16011-CVGroup_Cafe_Idle4-1 = "I don't usually feel this way, but I have the urge to go on a run all of a sudden."
16011-CVGroup_Cafe_Idle5-1 = "(Ugh... A diet's worst enemy...)"
16011-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei. I feel as if I've earned the championship banner. As long as you are with me, I can't lose. If it's okay... I'll continue to lean on you, Sensei"
16011-CVGroup_UIEventLobby_Enter1-1 = "I've been waiting for you, Sensei. Are you ready?"
16011-CVGroup_UIEventLobby_Enter2-1 = "The games are about to begin. Let's get going, shall we?"
16011-CVGroup_UIEventLobby_Enter3-1 = "Everything is in full swing."
16011-CVGroup_UIEventLobby_Enter3-2 = "I think it's safe to call this Kivotos Halo Festival a success... Don't you agree?"
16011-CVGroup_UIEventLobby_Enter4-1 = "We're entering the final stretch of the Kivotos Halo Festival."
16011-CVGroup_UIEventLobby_Enter4-2 = "Let's make sure to finish strong."
16011-CVGroup_UIEventLobby_Enter5-1 = "The Kivotos Halo Festival was a massive success thanks to you, Sensei."
16011-CVGroup_UIEventLobby_Enter5-2 = "Thank you for all your hard work."
16011-CVGroup_UIEventLobby_Idle1-1 = "S-Sensei?"
16011-CVGroup_UIEventLobby_Idle2-1 = "If you keep staring at me like that..."
16011-CVGroup_UIEventLobby_Idle3-1 = "It's about time we started heading out..."
16011-CVGroup_UIEventLobby_Idle4-1 = "Is there something you need?"
16011-CVGroup_UIEventMission_Enter1-1 = "You want to take a look at the match records?"
16011-CVGroup_UIEventMission_Enter2-1 = "I have a summary right here. Feel free to peruse it."
16011-CVGroup_UIEventMission_Idle1-1 = "For now, this is all I have to show you..."
16011-CVGroup_UIEventMission_Idle2-1 = "Is there anything else you'd like to see?"
16011-CVGroup_UIEventMission_Buy1-1 = "Got it. What an excellent record."
16011-CVGroup_UIEventMission_Buy2-1 = "This... This might be a new record."
16011-CVGroup_UIEventMission_Interaction1-1 = "Today's records look good to me."

[translation]
16011-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
16011-CVGroup_CharacterGet_Idle1-1 = "아, 선생님. 여기서도 뵙는군요.\n트리니티 종합학원, 정의실현부의 하네카와 하스미.\n이번에 트리니티를 대표하여 실행위원을 맡게 되었습니다. 모쪼록 잘 부탁드립니다."
16011-CVGroup_Cafe_Idle1-1 = "…잘 정돈된 곳이네요."
16011-CVGroup_Cafe_Idle2-1 = "경기장도 아닌데 이 복장인 건 이상한가요…?"
16011-CVGroup_Cafe_Idle3-1 = "어라… 저건…?"
16011-CVGroup_Cafe_Idle4-1 = "평소와는 다르게 조금 달리고 싶어지네요."
16011-CVGroup_Cafe_Idle5-1 = "(윽… 다이어트의 적이…)"
16011-CVGroup_WeaponGet_Idle1-1 = "감사합니다, 선생님. 마치 우승기를 받은 것 같은 기분이에요.\n선생님이 함께해주시는 이상, 이제부터 패배는 없을 겁니다.\n그러니 앞으로도 잘 부탁드립니다"
16011-CVGroup_UIEventLobby_Enter1-1 = "기다리고 있었습니다, 선생님. 준비는 되셨나요?"
16011-CVGroup_UIEventLobby_Enter2-1 = "마침 경기가 시작되려던 참입니다. 함께 출발해 보실까요."
16011-CVGroup_UIEventLobby_Enter3-1 = "꽤 분위기가 들떠 있군요."
16011-CVGroup_UIEventLobby_Enter3-2 = "이정도면 황륜대제는 성공적……이라고 봐도 되겠지요."
16011-CVGroup_UIEventLobby_Enter4-1 = "황륜대제도 막바지에 접어들었군요."
16011-CVGroup_UIEventLobby_Enter4-2 = "마지막까지 힘내도록 하죠."
16011-CVGroup_UIEventLobby_Enter5-1 = "선생님 덕분에 황륜대제도 대성공을 거둘 수 있었습니다."
16011-CVGroup_UIEventLobby_Enter5-2 = "정말 수고 많으셨습니다."
16011-CVGroup_UIEventLobby_Idle1-1 = "서, 선생님……?"
16011-CVGroup_UIEventLobby_Idle2-1 = "그, 그렇게 쳐다 보셔도……."
16011-CVGroup_UIEventLobby_Idle3-1 = "슬슬 출발해야 할 시간입니다만……."
16011-CVGroup_UIEventLobby_Idle4-1 = "뭔가 필요한 게 있으신가요?"
16011-CVGroup_UIEventMission_Enter1-1 = "경기 기록을 살펴보시겠습니까?"
16011-CVGroup_UIEventMission_Enter2-1 = "진행 상황을 정리해 보았습니다. 확인해 보시겠습니까?"
16011-CVGroup_UIEventMission_Idle1-1 = "으음…… 지금 보여드릴 수 있는 건 이게 전부입니다."
16011-CVGroup_UIEventMission_Idle2-1 = "더 확인하고 싶으신 게 있으신 걸까요……?"
16011-CVGroup_UIEventMission_Buy1-1 = "확인했습니다. 훌륭한 기록이네요."
16011-CVGroup_UIEventMission_Buy2-1 = "이건… 신기록일지도 모르겠습니다."
16011-CVGroup_UIEventMission_Interaction1-1 = "오늘의 기록은 이상입니다."

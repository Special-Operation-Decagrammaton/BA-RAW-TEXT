[translation]
16011-CVGroup_UITitle_Idle1-1 = "Blue Archive"
16011-CVGroup_CharacterGet_Idle1-1 = "อ๊ะ คุณครู เจอกันอีกแล้วนะคะ สมาชิกชมรมทวงความยุติธรรม\nฮาเนกาวะ ฮาสุมิค่ะ ครั้งนี้ฉันรับเป็นตัวแทนของทรีนิตี้\nทำหน้าที่เป็นคณะกรรมการจัดงาน ขอฝากเนื้อฝากตัวด้วยนะคะ"
16011-CVGroup_Cafe_Idle1-1 = "ที่นี่... จัดการได้เป็นระเบียบมากเลยค่ะ"
16011-CVGroup_Cafe_Idle2-1 = "ไม่ได้อยู่ที่สนามกีฬาแล้ว\nพอใส่ชุดแบบนี้มันแปลกรึเปล่าคะ...?"
16011-CVGroup_Cafe_Idle3-1 = "เอ๋... นั่นมัน...?"
16011-CVGroup_Cafe_Idle4-1 = "รู้สึกอยากวิ่งขึ้นมานิดหน่อย\nต่างจากทุกวันเลยค่ะ"
16011-CVGroup_Cafe_Idle5-1 = "(อึก... ศัตรูของ... การไดเอต...)"
16011-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณค่ะคุณครู รู้สึกเหมือนได้ธงชนะเลิศเลยค่ะ\nถ้ามีคุณครูอยู่ด้วยแบบนี้ละก็ ต่อไปคงไม่มีทางแพ้แน่นอนค่ะ\nเพราะงั้นขอฝากเนื้อฝากตัวด้วยนะคะ"
16011-CVGroup_UIEventLobby_Enter1-1 = "ฉันกำลังรออยู่เลยค่ะ คุณครู พร้อมแล้วหรือยังคะ?"
16011-CVGroup_UIEventLobby_Enter2-1 = "การแข่งขันใกล้จะเริ่มพอดีเลยค่ะ\nเราไปด้วยกันเลยมั้ยคะ?"
16011-CVGroup_UIEventLobby_Enter3-1 = "บรรยากาศคึกคักมากเลยนะคะ"
16011-CVGroup_UIEventLobby_Enter3-2 = "แบบนี้ก็พูดได้ว่าฮาโลเฟสติวัลครั้งนี้\nประสบความสำเร็จได้เลยค่ะ"
16011-CVGroup_UIEventLobby_Enter4-1 = "มาถึงช่วงสุดท้ายของฮาโลเฟสติวัลแล้วสินะคะ"
16011-CVGroup_UIEventLobby_Enter4-2 = "มาออกแรงสู้อีกนิดจนกว่าจะจบงานนะคะ"
16011-CVGroup_UIEventLobby_Enter5-1 = "ฮาโลเฟสติวัลประสบความสำเร็จสูงมากๆ\nเพราะคุณครูเลยนะคะ"
16011-CVGroup_UIEventLobby_Enter5-2 = "คุณครูทำได้ดีมากๆ เลยละค่ะ"
16011-CVGroup_UIEventLobby_Idle1-1 = "คะ...คุณครู...!"
16011-CVGroup_UIEventLobby_Idle2-1 = "ถะ... ถึงจะจ้องกันแบบนั้น..."
16011-CVGroup_UIEventLobby_Idle3-1 = "ตอนนี้เราต้องออกเดินทางกันแล้วละค่ะ..."
16011-CVGroup_UIEventLobby_Idle4-1 = "ต้องการอะไรงั้นเหรอคะ?"
16011-CVGroup_UIEventMission_Enter1-1 = "ลองดูสถิติการแข่งขันดูหน่อยมั้ยคะ?"
16011-CVGroup_UIEventMission_Enter2-1 = "ฉันบันทึกการแข่งขันไว้แล้วค่ะ\nจะลองดูสักหน่อยมั้ยคะ?"
16011-CVGroup_UIEventMission_Idle1-1 = "อืม... ตอนนี้ฉันมีให้ดูแค่เพียงเท่านี้ค่ะ..."
16011-CVGroup_UIEventMission_Idle2-1 = "หรือว่ามีอย่างอื่นที่อยากดูอีกเหรอคะ...?"
16011-CVGroup_UIEventMission_Buy1-1 = "ฉันเช็กดูแล้วค่ะ เป็นสถิติที่ยอดเยี่ยมเลยค่ะ"
16011-CVGroup_UIEventMission_Buy2-1 = "นี่น่ะ... อาจจะเป็นสถิติใหม่ก็ได้นะคะ"
16011-CVGroup_UIEventMission_Interaction1-1 = "สถิติของวันนี้มีเท่านี้ค่ะ"

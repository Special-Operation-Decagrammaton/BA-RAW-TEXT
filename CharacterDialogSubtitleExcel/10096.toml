[translation]
10096-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10096-CVGroup_CharacterGet_Idle1-1 = "Public Peace Bureau Director Ogata Kanna from Valkyrie Police School. Forgive my rudeness in greeting you like this, but it's the nature of my duties."
10096-CVGroup_Cafe_Idle1-1 = "Anyone in danger...? Nope."
10096-CVGroup_Cafe_Idle2-1 = "I'll take a short break."
10096-CVGroup_Cafe_Idle3-1 = "I never slack off on warm-ups, so I'm ready to move out at a moment's notice."
10096-CVGroup_Cafe_Idle4-1 = "Mmm... There are a few items of concern."
10096-CVGroup_Cafe_Idle5-1 = "I'll need to get started on patrol as soon as break's over."
10096-CVGroup_WeaponGet_Idle1-1 = "Sensei's symbol of trust... I see. A lifeguard shoulders heavy responsibilities. I'll do my best to live up to your expectations."
10096-CVGroup_UIEventLobby_Enter1-1 = "Sensei, I've been waiting for you. Have you done your warm-up exercises?"
10096-CVGroup_UIEventLobby_Enter2-1 = "Enjoy yourself at the water park."
10096-CVGroup_UIEventLobby_Enter3-1 = "Are you enjoying playing in the water?"
10096-CVGroup_UIEventLobby_Enter3-2 = "As I always say, nothing is more important than safety."
10096-CVGroup_UIEventLobby_Enter4-1 = "...I've made it this far thanks to you, Sensei."
10096-CVGroup_UIEventLobby_Enter4-2 = "Let's make sure to finish strong."
10096-CVGroup_UIEventLobby_Enter5-1 = "It's a bittersweet feeling."
10096-CVGroup_UIEventLobby_Enter5-2 = "How do you feel, Sensei?"
10096-CVGroup_UIEventLobby_Idle1-1 = "I know I have to wear a swimsuit, but...it's awkward."
10096-CVGroup_UIEventLobby_Idle2-1 = "A water park... I didn't expect to feel any connection to it."
10096-CVGroup_UIEventLobby_Idle3-1 = "No matter the situation, overconfidence is never a good thing."
10096-CVGroup_UIEventLobby_Idle3-2 = "If you encounter anyone in need of rescue, please inform us immediately."
10096-CVGroup_UIEventLobby_Idle4-1 = "P-Please come in! Welcome!"
10096-CVGroup_UIEventLobby_Idle4-2 = "Ahem. As I expected, I still can't get used to this."
10096-CVGroup_UIEventShop_Enter1-1 = "This is a specialty shop. If you need anything, feel free to make a purchase."
10096-CVGroup_UIEventShop_Enter2-1 = "A recommendation...? I'm not sure, but I'll rely on your judgement, Sensei."
10096-CVGroup_UIEventShop_Enter3-1 = "The shops are closed, but it looks like the park will be open for a little longer."
10096-CVGroup_UIEventShop_Enter3-2 = "Make sure to enjoy it until the very end."
10096-CVGroup_UIEventShop_Idle1-1 = "Yes? Is there something you're looking for?"
10096-CVGroup_UIEventShop_Idle2-1 = "...Sensei, please view the products, not me."
10096-CVGroup_UIEventShop_Buy1-1 = "Ah, that's a product I was curious about as well."
10096-CVGroup_UIEventShop_Buy2-1 = "Thank you for your purchase. I hope you'll find it useful, Sensei."
10096-CVGroup_UIEventShop_Buy3-1 = "Choosing that one shows you have great taste. Very impressive."
10096-CVGroup_UIEventShop_Buy4-1 = "Th-There's no need to get me a gift. I'm still at work anyway..."

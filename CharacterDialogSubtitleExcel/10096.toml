[translation]
10096-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10096-CVGroup_CharacterGet_Idle1-1 = "โอกาตะ คันนะ หัวหน้ากรมความมั่นคงสาธารณะ วัลคิรี่ค่ะ\nฉันแต่งชุดนี้เพราะงานใหม่ที่ได้รับมอบหมาย โปรดเข้าใจด้วยนะคะ"
10096-CVGroup_Cafe_Idle1-1 = "มีใครตกอยู่ในอันตรายมั้ยนะ"
10096-CVGroup_Cafe_Idle2-1 = "ไปพักสักหน่อยดีมั้ยนะ"
10096-CVGroup_Cafe_Idle3-1 = "วอร์มอัปร่างกายตลอด\nเพื่อให้พร้อมทำงานในทุกเมื่อ"
10096-CVGroup_Cafe_Idle4-1 = "อืม... มีส่วนที่ต้องให้ความสนใจ\nอยู่หลายส่วนเลย..."
10096-CVGroup_Cafe_Idle5-1 = "พักผ่อนเสร็จแล้ว\nงั้นก็ไปเริ่มลาดตระเวนก่อนแล้วกัน"
10096-CVGroup_WeaponGet_Idle1-1 = "หลักฐานความไว้วางใจที่ได้จากคุณครู... อย่างนี้เองสินะคะ\nไลฟ์การ์ดต้องรับผิดชอบงานหนักอยู่แล้ว\nฉันจะพยายามอย่างเต็มที่ให้สมกับที่คาดหวังค่ะ"
10096-CVGroup_UIEventLobby_Enter1-1 = "คุณครู กำลังรออยู่เลยค่ะ\nวอร์มอัปมาแล้วหรือยังคะ?"
10096-CVGroup_UIEventLobby_Enter2-1 = "ขอให้มีช่วงเวลาที่สนุกในสวนน้ำนะคะ"
10096-CVGroup_UIEventLobby_Enter3-1 = "สนุกกับการเล่นน้ำอยู่หรือเปล่าคะ?"
10096-CVGroup_UIEventLobby_Enter3-2 = "ถึงฉันจะย้ำอยู่ตลอด แต่เรื่องความปลอดภัยสำคัญที่สุดนะคะ"
10096-CVGroup_UIEventLobby_Enter4-1 = "ที่ฉันมาถึงตรงนี้ได้ทั้งหมดก็เพราะได้คุณครูช่วยไว้ค่ะ"
10096-CVGroup_UIEventLobby_Enter4-2 = "มาออกแรงสู้อีกนิดจนกว่าจะจบงานนะคะ"
10096-CVGroup_UIEventLobby_Enter5-1 = "ฉันรู้สึกโล่งใจแต่ก็เสียดายค่ะ"
10096-CVGroup_UIEventLobby_Enter5-2 = "แล้วคุณครูล่ะคะ?"
10096-CVGroup_UIEventLobby_Idle1-1 = "ฉันรู้ว่าต้องใส่ชุดว่ายน้ำ... แต่มันเขินน่ะค่ะ"
10096-CVGroup_UIEventLobby_Idle2-1 = "สวนน้ำ... คิดว่าฉันดวงไม่สมพงษ์กับที่แบบนี้ซะอีก..."
10096-CVGroup_UIEventLobby_Idle3-1 = "ไม่ว่าเรื่องอะไรถ้าเชื่อมากไปก็ไม่ดีค่ะ"
10096-CVGroup_UIEventLobby_Idle3-2 = "ถ้าเจอคนที่ต้องให้ความช่วยเหลือก็บอกทันทีเลยนะคะ"
10096-CVGroup_UIEventLobby_Idle4-1 = "ชะ... เชิญค่ะ! ยินดีต้อนรับค่ะ!"
10096-CVGroup_UIEventLobby_Idle4-2 = "อะแฮ่ม... ยังไม่ชินจริงๆ ด้วยนะคะ"
10096-CVGroup_UIEventShop_Enter1-1 = "ที่นี่คือร้านค้าพิเศษค่ะ\nถ้ามีของที่ต้องการก็ซื้อไปนะคะ"
10096-CVGroup_UIEventShop_Enter2-1 = "ให้แนะนำ... เหรอคะ? ไม่รู้สิคะ\nฉันเชื่อในสายตาของคุณครูค่ะ"
10096-CVGroup_UIEventShop_Enter3-1 = "ร้านค้าปิดแล้วค่ะ แต่เหมือนสวนน้ำจะยังเปิดต่ออีกหน่อยนะคะ"
10096-CVGroup_UIEventShop_Enter3-2 = "หวังว่าจะสนุกกันไปจนถึงตอนปิดทำการเลยนะคะ"
10096-CVGroup_UIEventShop_Idle1-1 = "ค่ะ มีชิ้นไหนในใจหรือเปล่าคะ?"
10096-CVGroup_UIEventShop_Idle2-1 = "คุณครู... มองของสิคะ ไม่ใช่มองฉัน"
10096-CVGroup_UIEventShop_Buy1-1 = "อ่า ฉันก็สงสัยเกี่ยวกับชิ้นนั้นเหมือนกันค่ะ"
10096-CVGroup_UIEventShop_Buy2-1 = "ขอบคุณที่ซื้อค่ะ\nหวังว่าจะเป็นประโยชน์กับคุณครูนะคะ"
10096-CVGroup_UIEventShop_Buy3-1 = "เลือกชิ้นนั้นเหรอคะเนี่ย\nตาถึงนะคะ สมแล้วค่ะที่เป็นคุณครู"
10096-CVGroup_UIEventShop_Buy4-1 = "ฉะ... ฉันไม่เอาของขวัญหรอกค่ะ\nฉันอยู่ระหว่างการทำงานด้วย..."

[translation]
10096-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10096-CVGroup_CharacterGet_Idle1-1 = "발키리 경찰학교, 공안국 국장 오가타 칸나입니다.\n임무 특성상, 이런 모습으로 인사드리는 무례를 용서해 주시기 바랍니다."
10096-CVGroup_Cafe_Idle1-1 = "위험에 빠진 사람은……. 없나."
10096-CVGroup_Cafe_Idle2-1 = "잠깐 휴식을 취하도록 할까."
10096-CVGroup_Cafe_Idle3-1 = "언제든지 출동할 수 있도록, 준비운동은 게을리하지 않아."
10096-CVGroup_Cafe_Idle4-1 = "으음……. 몇 가지 신경쓰이는 부분은 있지만……."
10096-CVGroup_Cafe_Idle5-1 = "휴식이 끝나면 순찰부터 시작하도록 할까."
10096-CVGroup_WeaponGet_Idle1-1 = "선생님께서 주신 신뢰의 증표…….\n그렇군요. 라이프가드의 어깨는 무거운 법이죠.\n기대를 저버리지 않도록, 최선을 다하겠습니다."
10096-CVGroup_UIEventLobby_Enter1-1 = "선생님. 기다리고 있었습니다. 준비운동은 하셨나요?"
10096-CVGroup_UIEventLobby_Enter2-1 = "워터파크에서 즐거운 시간 되시기를."
10096-CVGroup_UIEventLobby_Enter3-1 = "물놀이는 즐기고 계십니까?"
10096-CVGroup_UIEventLobby_Enter3-2 = "늘 말씀드리는 거지만, 안전이 가장 중요합니다."
10096-CVGroup_UIEventLobby_Enter4-1 = "……제가 여기까지 올 수 있었던 것도, 모두 선생님 덕분입니다."
10096-CVGroup_UIEventLobby_Enter4-2 = "마지막까지 힘내도록 하죠."
10096-CVGroup_UIEventLobby_Enter5-1 = "시원섭섭한 기분입니다."
10096-CVGroup_UIEventLobby_Enter5-2 = "선생님은 어떠십니까?"
10096-CVGroup_UIEventLobby_Idle1-1 = "수영복이여야 한다는 것은 알고있지만…… 어색하군요."
10096-CVGroup_UIEventLobby_Idle2-1 = "워터파크라…… 나와는 인연이 없을 줄 알았는데……."
10096-CVGroup_UIEventLobby_Idle3-1 = "무슨 일이든 과신은 좋지 않습니다."
10096-CVGroup_UIEventLobby_Idle3-2 = "구조가 필요한 사람을 발견하면 즉시 알려주십시오."
10096-CVGroup_UIEventLobby_Idle4-1 = "어, 어서 오세요! 환영합니다!"
10096-CVGroup_UIEventLobby_Idle4-2 = "크흠…… 역시, 익숙해지지 않네요."
10096-CVGroup_UIEventShop_Enter1-1 = "이곳은 특별 상점입니다. 필요한게 있으면 구입하시길."
10096-CVGroup_UIEventShop_Enter2-1 = "추천……이요? 잘 모르겠군요. 선생님의 심미안을 믿습니다."
10096-CVGroup_UIEventShop_Enter3-1 = "상점 영업은 종료입니다만, 파크는 좀더 운영하는 모양입니다."
10096-CVGroup_UIEventShop_Enter3-2 = "마지막까지 즐겨 주세요."
10096-CVGroup_UIEventShop_Idle1-1 = "네, 찾으시는 게 있으신가요?"
10096-CVGroup_UIEventShop_Idle2-1 = "……선생님, 저 말고 상품을 봐주시죠."
10096-CVGroup_UIEventShop_Buy1-1 = "아아, 그건 저도 궁금했던 상품입니다."
10096-CVGroup_UIEventShop_Buy2-1 = "구입 감사합니다. 선생님께 도움이 되었으면 좋겠군요."
10096-CVGroup_UIEventShop_Buy3-1 = "그걸 고르시다니, 안목이 있으시네요. 역시 선생님입니다."
10096-CVGroup_UIEventShop_Buy4-1 = "제, 제 선물은 됐습니다. 아직 업무 중이기도 하고……."

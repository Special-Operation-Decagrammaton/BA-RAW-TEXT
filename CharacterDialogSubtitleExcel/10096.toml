[translation]
10096-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10096-CVGroup_CharacterGet_Idle1-1 = "我是女武神警察學園，公安局局長尾刃環奈。\n由於任務特性的緣故，還請您原諒我以這幅模樣向您問好的無禮。"
10096-CVGroup_Cafe_Idle1-1 = "需要救助的人……\n有嗎？"
10096-CVGroup_Cafe_Idle2-1 = "稍微休息一下吧。"
10096-CVGroup_Cafe_Idle3-1 = "為了能夠隨時出動，\n暖身運動可不能怠慢。"
10096-CVGroup_Cafe_Idle4-1 = "唔嗯……雖然是有幾個地方令人在意……"
10096-CVGroup_Cafe_Idle5-1 = "等休息結束之後就開始巡邏吧。"
10096-CVGroup_WeaponGet_Idle1-1 = "從老師手中獲得的信任的證明……\n原來如此，救生員的負荷相當沉重。\n為了不辜負您的期待，我會竭盡全力。"
10096-CVGroup_UIEventLobby_Enter1-1 = "老師。恭候您的光臨。\n有做暖身運動了嗎？"
10096-CVGroup_UIEventLobby_Enter2-1 = "請在水上樂園度過愉快的時光。"
10096-CVGroup_UIEventLobby_Enter3-1 = "在游泳池玩得還開心嗎？"
10096-CVGroup_UIEventLobby_Enter3-2 = "正如平常宣導的，安全第一唷。"
10096-CVGroup_UIEventLobby_Enter4-1 = "……我能來到這裡，都是託老師的福。"
10096-CVGroup_UIEventLobby_Enter4-2 = "堅持到最後吧。"
10096-CVGroup_UIEventLobby_Enter5-1 = "有種如釋重負，卻又有點寂寞的感覺。"
10096-CVGroup_UIEventLobby_Enter5-2 = "老師您呢？"
10096-CVGroup_UIEventLobby_Idle1-1 = "我知道穿泳裝是必要的……\n但還是不太習慣呢。"
10096-CVGroup_UIEventLobby_Idle2-1 = "水上樂園啊……\n還以為跟這種地方沒什麼緣分的……"
10096-CVGroup_UIEventLobby_Idle3-1 = "任何事都不要過度自信。"
10096-CVGroup_UIEventLobby_Idle3-2 = "發現需要救助的人，請立即通知我。"
10096-CVGroup_UIEventLobby_Idle4-1 = "歡，歡迎光臨！歡迎您的到來！"
10096-CVGroup_UIEventLobby_Idle4-2 = "咳咳……果然還是不太習慣呢。"
10096-CVGroup_UIEventShop_Enter1-1 = "這裡是特別商店。\n有需要的東西歡迎隨時購買。"
10096-CVGroup_UIEventShop_Enter2-1 = "推薦……是嗎？我不太清楚。\n不過我相信老師的眼光。"
10096-CVGroup_UIEventShop_Enter3-1 = "營業雖然已經結束，但樂園似乎還在營運。"
10096-CVGroup_UIEventShop_Enter3-2 = "請盡情享受到最後吧。"
10096-CVGroup_UIEventShop_Idle1-1 = "是，請問想找什麼嗎？"
10096-CVGroup_UIEventShop_Idle2-1 = "……老師，請少看我，多看商品。"
10096-CVGroup_UIEventShop_Buy1-1 = "啊啊，那個商品我也很感興趣。"
10096-CVGroup_UIEventShop_Buy2-1 = "感謝您的惠顧。\n希望有幫上老師的忙。"
10096-CVGroup_UIEventShop_Buy3-1 = "居然選那個，您真是有眼光呢。\n不愧是老師。"
10096-CVGroup_UIEventShop_Buy4-1 = "我，我的禮物就不用了。\n現在還在上班呢……"

[translation]
10051-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10051-CVGroup_CharacterGet_Idle1-1 = "千年的應援團長，白石詠葉。\n我會用冰冷的理性和炙熱的熱情為大家加油。"
10051-CVGroup_Cafe_Idle1-1 = "真是個\n充滿熱情的空間。"
10051-CVGroup_Cafe_Idle2-1 = "從這裡應援的話，\n聲音會傳到哪兒呢？"
10051-CVGroup_Cafe_Idle3-1 = "想在這裡，和大家一起做團體操…"
10051-CVGroup_Cafe_Idle4-1 = "（呵呵，想到了有趣的應援計畫）"
10051-CVGroup_Cafe_Idle5-1 = "怎麼會…\n沒什麼幹勁呢。"
10051-CVGroup_WeaponGet_Idle1-1 = "熱情的香氣，是磨亮巨匠靈感的動力。"
10051-CVGroup_UIEventLobby_Enter1-1 = "來，為了一同成就最棒的「晄輪大祭」，集合彼此的力量吧！"
10051-CVGroup_UIEventLobby_Enter2-1 = "多麼有趣啊…"
10051-CVGroup_UIEventLobby_Enter2-2 = "畢竟這關係到千年的名譽。"
10051-CVGroup_UIEventLobby_Enter2-3 = "我們工程師部幫忙也是當然的。"
10051-CVGroup_UIEventLobby_Enter3-1 = "唔呣，「晄輪大祭」的準備正按部就班地進行。"
10051-CVGroup_UIEventLobby_Enter4-1 = "距離「晄輪大祭」還有一點時間。"
10051-CVGroup_UIEventLobby_Enter4-2 = "現在就已經興奮到不行了。"
10051-CVGroup_UIEventLobby_Enter5-1 = "辛苦了，老師。\n我先到應援席等你唷。"
10051-CVGroup_UIEventLobby_Idle1-1 = "雖然我還不習慣應援…"
10051-CVGroup_UIEventLobby_Idle1-2 = "但沒辦法了，我會全力以赴的。"
10051-CVGroup_UIEventLobby_Idle1-3 = "一旦接到委託，就要做到最後。"
10051-CVGroup_UIEventLobby_Idle1-4 = "這是我們工程師部的座右銘！"
10051-CVGroup_UIEventLobby_Idle2-1 = "這麼說來，研討會的可靠會計…沒見到他的身影呢。"
10051-CVGroup_UIEventLobby_Idle2-2 = "希望不是因為身體不舒服。"
10051-CVGroup_UIEventLobby_Idle3-1 = "（希望大家都能平安地享受慶典…）"
10051-CVGroup_UIEventLobby_Idle4-1 = "雖然說平時就很少運動，"
10051-CVGroup_UIEventLobby_Idle4-2 = "但亞都梨和響的體力居然會下降成這樣…"
10051-CVGroup_UIEventLobby_Idle4-3 = "等慶典結束後，要不要在工程師部的部室裡"
10051-CVGroup_UIEventLobby_Idle4-4 = "做個輔助健身的機器人擺著呢？"

[translation]
10051-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10051-CVGroup_CharacterGet_Idle1-1 = "밀레니엄의 응원단장, 시라이시 우타하.\n차가운 이성과 뜨거운 열정으로, 모두를 응원하겠어."
10051-CVGroup_Cafe_Idle1-1 = "열정으로 가득찬 공간이네."
10051-CVGroup_Cafe_Idle2-1 = "여기에서 응원을 하게 되면, 어디까지 소리가 닿을까?"
10051-CVGroup_Cafe_Idle3-1 = "이곳에서 다같이 매스게임을 해 보고 싶은데…"
10051-CVGroup_Cafe_Idle4-1 = "(후후, 재미있는 응원 계획이 떠올랐어.)"
10051-CVGroup_Cafe_Idle5-1 = "뭔가… 기합이 부족한 것 같은데."
10051-CVGroup_WeaponGet_Idle1-1 = "열정의 향기야말로, 마이스터의 영감을 일깨우는 동력이지."
10051-CVGroup_UIEventLobby_Enter1-1 = "자, 다함께 최고의 <황륜대제>를 위해 힘을 모으는 거야!"
10051-CVGroup_UIEventLobby_Enter2-1 = "이런 재미있어 보이는…"
10051-CVGroup_UIEventLobby_Enter2-2 = "아니, 밀레니엄의 명예가 걸린 일이라면"
10051-CVGroup_UIEventLobby_Enter2-3 = "우리 엔지니어부가 당연히 도와야지."
10051-CVGroup_UIEventLobby_Enter3-1 = "음, <황륜대제> 준비도 착실히 진행되고 있군."
10051-CVGroup_UIEventLobby_Enter4-1 = "<황륜대제> 개최도 이제 머지않았어."
10051-CVGroup_UIEventLobby_Enter4-2 = "벌써부터 흥분이 가라앉지 않는걸."
10051-CVGroup_UIEventLobby_Enter5-1 = "수고 많았어, 선생님. 먼저 응원석에서 기다리고 있을게."
10051-CVGroup_UIEventLobby_Idle1-1 = "응원은 아직 익숙하지 않지만…"
10051-CVGroup_UIEventLobby_Idle1-2 = "어쩔 수 없지. 최선을 다할게."
10051-CVGroup_UIEventLobby_Idle1-3 = "한번 받은 의뢰는 끝까지 수행하는 게"
10051-CVGroup_UIEventLobby_Idle1-4 = "우리 엔지니어부의 모토니까!"
10051-CVGroup_UIEventLobby_Idle2-1 = "그러고보니 세미나의 깐깐한 회계가… 모습이 보이질 않네."
10051-CVGroup_UIEventLobby_Idle2-2 = "어디 아픈 게 아니였으면 좋겠는데."
10051-CVGroup_UIEventLobby_Idle3-1 = "(모두가 평온하게 축제를 즐길 수 있었으면 좋겠는데…)"
10051-CVGroup_UIEventLobby_Idle4-1 = "평소에 움직이는 일이 적다고는 하지만"
10051-CVGroup_UIEventLobby_Idle4-2 = "코토리와 히비키의 체력이 이렇게까지 떨어졌다니…"
10051-CVGroup_UIEventLobby_Idle4-3 = "축제가 끝난 뒤에 엔지니어부 부실에"
10051-CVGroup_UIEventLobby_Idle4-4 = "체력 단련 로봇이라도 만들어 놓을까?"

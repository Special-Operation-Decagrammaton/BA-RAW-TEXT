[translation]
10051-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10051-CVGroup_CharacterGet_Idle1-1 = "Millennium's Cheer Captain, Shiraishi Utaha. With ice-cold reason or fiery hot passion, I'll never stop cheering for those I care for."
10051-CVGroup_Cafe_Idle1-1 = "A space brimming with passion."
10051-CVGroup_Cafe_Idle2-1 = "Cheers up high!\nDon't be shy!\nIf we try,\nwe'll reach the sky!"
10051-CVGroup_Cafe_Idle3-1 = "I want to play a big game with everyone here..."
10051-CVGroup_Cafe_Idle4-1 = "(Heehee, I suddenly have a fun idea for a cheer.)"
10051-CVGroup_Cafe_Idle5-1 = "We need more...spirit."
10051-CVGroup_WeaponGet_Idle1-1 = "Being filled with passion\nis a meister's inspiration!"
10051-CVGroup_UIEventLobby_Enter1-1 = "Let's do our best to make this Kivotos Halo Festival as great as possible!"
10051-CVGroup_UIEventLobby_Enter2-1 = "The energy is palpable..."
10051-CVGroup_UIEventLobby_Enter2-2 = "Millennium's honor is at stake."
10051-CVGroup_UIEventLobby_Enter2-3 = "Of course the Engineering Department will help."
10051-CVGroup_UIEventLobby_Enter3-1 = "Good to see that preparations for the Kivotos Halo Festival are going well."
10051-CVGroup_UIEventLobby_Enter4-1 = "It's almost time for the Kivotos Halo Festival."
10051-CVGroup_UIEventLobby_Enter4-2 = "I'm already getting excited. I'll try to contain myself."
10051-CVGroup_UIEventLobby_Enter5-1 = "Well done, Sensei. I'll be waiting by the cheering event stage."
10051-CVGroup_UIEventLobby_Idle1-1 = "My cheers still need fine-tuning..."
10051-CVGroup_UIEventLobby_Idle1-2 = "There's no helping it. I'll do my best."
10051-CVGroup_UIEventLobby_Idle1-3 = "A request received will become a design achieved!"
10051-CVGroup_UIEventLobby_Idle1-4 = "That is the eternal motto of the Engineering Department!"
10051-CVGroup_UIEventLobby_Idle2-1 = "Come to think of it, I haven't seen Seminar's resident perfectionist anywhere..."
10051-CVGroup_UIEventLobby_Idle2-2 = "I hope she isn't sick."
10051-CVGroup_UIEventLobby_Idle3-1 = "(In fact, I hope everyone can enjoy the festival to the fullest...)"
10051-CVGroup_UIEventLobby_Idle4-1 = "I get that we're not an athletics club..."
10051-CVGroup_UIEventLobby_Idle4-2 = "...but I didn't think Kotori and Hibiki would be this out of shape..."
10051-CVGroup_UIEventLobby_Idle4-3 = "There's only one way to get fit. The Engineering Department's next undertaking will be..."
10051-CVGroup_UIEventLobby_Idle4-4 = "...designing an exercise robot."

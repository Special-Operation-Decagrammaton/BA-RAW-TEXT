[translation]
10014-CVGroup_UITitle_Idle1-1 = "블루 아카이브~!"
10014-CVGroup_CharacterGet_Idle1-1 = "이즈나! 선생님의… 아니, 주군의 부름을 듣고 달려왔습니다~! 닌닌!"
10014-CVGroup_Cafe_Idle1-1 = "앗, 앗, 주군!"
10014-CVGroup_Cafe_Idle2-1 = "닌자란 자고로 어둠을 틈타 살아가는 존재….\n어둠을… 어둠… 금세 눈이 나빠질 거 같아요…."
10014-CVGroup_Cafe_Idle3-1 = "정보를 수집하기 위해선… 이 근처에 숨는 게 좋을까요?"
10014-CVGroup_Cafe_Idle4-1 = "이렇게나 넓으면, 이즈나류 인법 오의 108 그림자 분신술을 사용할 수 있을지도…"
10014-CVGroup_Cafe_Idle5-1 = "주군의 명을 기다리며 대기하는 이 시간… 심심해요~"
10014-CVGroup_WeaponGet_Idle1-1 = "이, 이것이 최첨단을 달리는 닌자의 무기…!\n이걸로 이즈나도 엘리트 닌자가 될 수 있을까요!?"
10014-CVGroup_UIEventLobby_Enter1-1 = "축제예요! 주군! 자, 어디부터 놀러 가볼까요?"
10014-CVGroup_UIEventLobby_Enter2-1 = "주군! 주군! 축제가 정말 기대되네요!"
10014-CVGroup_UIEventLobby_Enter2-2 = "이즈나! 곁에서 따르겠습니다!"
10014-CVGroup_UIEventLobby_Enter3-1 = "벌써 축제도 이렇게나 무르익었네요."
10014-CVGroup_UIEventLobby_Enter3-2 = "주군! 다음엔 어떤 곳을 들러볼까요?"
10014-CVGroup_UIEventLobby_Enter4-1 = "아…. 축제도 이제 금방 끝나버리는 건가요…."
10014-CVGroup_UIEventLobby_Enter4-2 = "…그래도! 마지막까지 이즈나와 함께 해주세요. 주군!"
10014-CVGroup_UIEventLobby_Enter5-1 = "백야앵제는 끝나버렸지만…."
10014-CVGroup_UIEventLobby_Enter5-2 = "축제는 앞으로도 아직 잔뜩 있어요."
10014-CVGroup_UIEventLobby_Enter5-3 = "그때는 또 이즈나와 어울려주세요! 주군!"
10014-CVGroup_UIEventLobby_Idle1-1 = "흥~ 흥흥흥~ 흥♪ 이즈나이즈나 캥캥~♪"
10014-CVGroup_UIEventLobby_Idle2-1 = "앗? 이 기척은… 주군이네요!"
10014-CVGroup_UIEventLobby_Idle2-2 = "이즈나를 찾아주신 건가요? 에헤헷!"
10014-CVGroup_UIEventLobby_Idle3-1 = "경단, 센베이, 오코노미야키…!"
10014-CVGroup_UIEventLobby_Idle3-2 = "주군과 같이 먹고 싶은 음식이 잔뜩이에요!"
10014-CVGroup_UIEventLobby_Idle4-1 = "이즈나, 준비 만전! 주군을 지켜드리면서, 축제를 안내하겠습니다! 닌닌!"

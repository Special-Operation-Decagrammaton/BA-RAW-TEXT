[translation]
10014-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10014-CVGroup_CharacterGet_Idle1-1 = "伊樹菜登場！\n為了回應老師……不，是主公的呼喚，飛奔前來了～！忍忍！"
10014-CVGroup_Cafe_Idle1-1 = "啊，主公～！"
10014-CVGroup_Cafe_Idle2-1 = "忍者自古以來就是活在黑暗的世界裡……\n黑暗……黑暗之中……感覺視力會變差呢？"
10014-CVGroup_Cafe_Idle3-1 = "這也是為了蒐集情報……\n 躲在這附近好嗎？"
10014-CVGroup_Cafe_Idle4-1 = "這麼寬敞的話，或許可以使用伊樹菜流忍法奧義「百八式．影分身之術」也說不定……"
10014-CVGroup_Cafe_Idle5-1 = "靜靜地等待主公的命令……\n嗯～閒下來了……"
10014-CVGroup_WeaponGet_Idle1-1 = "這，這就是最先進的忍者武器……！\n有了這個的話，伊樹菜就能成為中忍了嗎！？"
10014-CVGroup_UIEventLobby_Enter1-1 = "是慶典唷，主公！\n來，要從哪裡開始玩呢？"
10014-CVGroup_UIEventLobby_Enter2-1 = "主公主公！\n慶典真令人期待呢！"
10014-CVGroup_UIEventLobby_Enter2-2 = "伊樹菜會隨時在身邊服侍！"
10014-CVGroup_UIEventLobby_Enter3-1 = "慶典越來越熱鬧了呢！"
10014-CVGroup_UIEventLobby_Enter3-2 = "主公，接下來要去哪裡呢？"
10014-CVGroup_UIEventLobby_Enter4-1 = "慶典，就快要結束了呢……"
10014-CVGroup_UIEventLobby_Enter4-2 = "能，能請您陪伊樹菜直到最後嗎，主公……！"
10014-CVGroup_UIEventLobby_Enter5-1 = "雖然百夜之春櫻花祭結束了……"
10014-CVGroup_UIEventLobby_Enter5-2 = "不過往後還有很多慶典對吧？"
10014-CVGroup_UIEventLobby_Enter5-3 = "到時候能再陪伊樹菜一起去嗎，主公？"
10014-CVGroup_UIEventLobby_Idle1-1 = "哼～哼哼～哼哼～♪\n伊樹菜哐哐，哐～哐哐～♪"
10014-CVGroup_UIEventLobby_Idle2-1 = "唔，這個氣息……是主公呢！"
10014-CVGroup_UIEventLobby_Idle2-2 = "您是來找伊樹菜的對吧！耶嘿嘿！"
10014-CVGroup_UIEventLobby_Idle3-1 = "糰子、仙貝、御好燒……！"
10014-CVGroup_UIEventLobby_Idle3-2 = "好多想和主公一起吃的東西！"
10014-CVGroup_UIEventLobby_Idle4-1 = "伊樹菜，準備萬全！\n會一邊守護主公，一邊導覽慶典的！忍忍！"

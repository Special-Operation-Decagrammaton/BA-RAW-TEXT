[translation]
10014-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10014-CVGroup_CharacterGet_Idle1-1 = "อิซุนะ! ฉันได้ยินเสียงเรียกของคุณครู...\nไม่สิ นายท่าน เลยรีบวิ่งมาเลยค่ะ! นินนิน~!"
10014-CVGroup_Cafe_Idle1-1 = "อ๊ะ นายท่าน!"
10014-CVGroup_Cafe_Idle2-1 = "นินจาเป็นสิ่งมีชีวิตที่อาศัยอยู่ในความมืด... ความมืด... ความมืด...\nอีกหน่อยสายตาต้องแย่ลงๆ แน่เลยค่ะ"
10014-CVGroup_Cafe_Idle3-1 = "เพื่อรวบรวมข้อมูล... ฉันไปซ่อนตัวอยู่ในที่ใกล้ๆ ดีมั้ยนะ?"
10014-CVGroup_Cafe_Idle4-1 = "บริเวณกว้างขนาดนี้ ชักไม่แน่ใจแล้วว่า\nจะใช้วิชานินจาเงาแยกร่างอิซุนะ 108 ได้รึเปล่า..."
10014-CVGroup_Cafe_Idle5-1 = "ฉันกำลังรอคำสั่งจากนายท่าน\nช่วงเวลาที่รอแบบนี้.... เบื่อจังเลย~"
10014-CVGroup_WeaponGet_Idle1-1 = "นะ...นี่มันอาวุธนินจาที่ติดตั้งเทคโนโลยีขั้นสูงเอาไว้...!\nถ้ามีอาวุธชิ้นนี้อิซุนะจะกลายเป็นสุดยอดนินจาได้ใช่มั้ยคะ!?"
10014-CVGroup_UIEventLobby_Enter1-1 = "งานเทศกาลค่ะ นายท่าน!\nเริ่มจากไปเที่ยวที่ไหนก่อนดีคะ?"
10014-CVGroup_UIEventLobby_Enter2-1 = "นายท่าน! นายท่าน! งานเทศกาลดูน่าสนุกมากๆ เลยค่ะ"
10014-CVGroup_UIEventLobby_Enter2-2 = "อิซุนะ! จะอยู่ข้างๆ เหมือนเป็นเงาตามตัวเลยค่ะ!"
10014-CVGroup_UIEventLobby_Enter3-1 = "งานเทศกาลดูครึกครื้นมากๆ เลยค่ะ"
10014-CVGroup_UIEventLobby_Enter3-2 = "นายท่าน! แล้วตอนนี้เราจะไปที่ไหนต่อดีคะ?"
10014-CVGroup_UIEventLobby_Enter4-1 = "อา... ตอนนี้งานเทศกาล... ก็ใกล้จะจบแล้วสินะคะ..."
10014-CVGroup_UIEventLobby_Enter4-2 = "แต่ว่า...! ช่วยอยู่กับอิซุนะจนจบงานเทศกาลด้วยนะคะ นายท่าน!"
10014-CVGroup_UIEventLobby_Enter5-1 = "ถึงเทศกาลแห่งค่ำคืนสีขาวจะจบลงไปแล้ว..."
10014-CVGroup_UIEventLobby_Enter5-2 = "แต่หลังจากก็คงจะมีงานเทศกาลอื่นๆ อีกเต็มไปหมดเลยค่ะ"
10014-CVGroup_UIEventLobby_Enter5-3 = "เอาไว้ถึงตอนนั้น ไว้ไปเที่ยวกับอิซุนะอีกครั้งนะคะ นายท่าน!"
10014-CVGroup_UIEventLobby_Idle1-1 = "ลัล~ ลัลลัลล้า~ ลา♪ อิซุนะ อิซุนะหน่าน้า~"
10014-CVGroup_UIEventLobby_Idle2-1 = "อ๊ะ? เสียงแบบนี้... นายท่านนี่นา!"
10014-CVGroup_UIEventLobby_Idle2-2 = "มาหาอิซุนะเหรอคะ? ฮิฮิฮิ!"
10014-CVGroup_UIEventLobby_Idle3-1 = "ดังโงะ.. เซ็มเบ... โอโคโนมิยากิ...!"
10014-CVGroup_UIEventLobby_Idle3-2 = "มีของกินอร่อยๆ ที่อยากกินกับนายท่านเต็มไปหมดเลยค่ะ!"
10014-CVGroup_UIEventLobby_Idle4-1 = "อิซุนะ พร้อมลุย! อิซุนะจะคอยปกป้องนายท่าน\nพร้อมกับพาชมงานเทศกาลเองค่ะ นินนิน~!"

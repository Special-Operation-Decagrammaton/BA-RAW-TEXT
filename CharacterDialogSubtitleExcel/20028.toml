[translation]
20028-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
20028-CVGroup_CharacterGet_Idle1-1 = "와, 와카바 히나타라고 합니다! 열심히 할 테니, 뭐든 말씀해 주세요!"
20028-CVGroup_Cafe_Idle1-1 = "여기 인테리어, 너무 귀여워요…!"
20028-CVGroup_Cafe_Idle2-1 = "저기, 짐 옮기는 거라면, 언제든지!"
20028-CVGroup_Cafe_Idle3-1 = "어라? 이름을 불린 것 같은 느낌이…."
20028-CVGroup_Cafe_Idle4-1 = "편안하고, 멋진 장소네요."
20028-CVGroup_Cafe_Idle5-1 = "선생님은…. 어디에 계실까요……?"
20028-CVGroup_WeaponGet_Idle1-1 = "정말… 뭐라고 감사 드려야 할지…. 아니. 말만으로는 다 전달할 수 없을 지도요.\n네. 주신 이 은혜…. 꼭 행동으로 보답하겠습니다. 선생님."
20028-CVGroup_UIEventLobby_Enter1-1 = "아, 기다리고 있었어요, 선생님!"
20028-CVGroup_UIEventLobby_Enter2-1 = "주, 준비는 되어 있습니다!"
20028-CVGroup_UIEventLobby_Enter2-2 = "언제든지 말씀해주세요!"
20028-CVGroup_UIEventLobby_Enter3-1 = "조금 남았어요! 힘내요!"
20028-CVGroup_UIEventLobby_Enter4-1 = "끝까지, 정신을 바짝 차리고 갑시다……!"
20028-CVGroup_UIEventLobby_Enter5-1 = "뒷정리라면 맡겨주세요. 후후."
20028-CVGroup_UIEventLobby_Idle1-1 = "덥네요… 햇살도 강해서…"
20028-CVGroup_UIEventLobby_Idle1-2 = "그, 괜찮으시다면 모자, 빌려드릴까요?"
20028-CVGroup_UIEventLobby_Idle2-1 = "음? 선생님? 왜 그러시나요?"
20028-CVGroup_UIEventLobby_Idle3-1 = "어, 어... 선생님? 그 ……용건이 있으시면 말씀을…."
20028-CVGroup_UIEventLobby_Idle4-1 = "히익! 서, 선생님! 가, 간지러워요!"
20028-CVGroup_UIEventLobby_Idle4-2 = "히얏!? 아하하!!"
20028-CVGroup_UIEventShop_Enter1-1 = "필요하신 물품이 있으신가요?"
20028-CVGroup_UIEventShop_Enter2-1 = "어서 골라보세요!"
20028-CVGroup_UIEventShop_Enter3-1 = "아직 시간이 있으니까, 같이 둘러보지 않으실래요?"
20028-CVGroup_UIEventShop_Idle1-1 = "서, 선생님……푸흡! 저, 저는 됐으니까…… 푸흐흣!"
20028-CVGroup_UIEventShop_Idle2-1 = "으음? 뭔가 하실 말씀이라도……?"
20028-CVGroup_UIEventShop_Buy1-1 = "멋, 멋지네요! 저도 좋다고 생각합니다."
20028-CVGroup_UIEventShop_Buy2-1 = "네! 여기 있습니다!"
20028-CVGroup_UIEventShop_Buy3-1 = "그건… 아주 좋은 것 같아요! 역시나군요, 선생님!"
20028-CVGroup_UIEventShop_Buy4-1 = "찾으시는 물건을 발견해서, 다행이에요!"

[translation]
20028-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20028-CVGroup_CharacterGet_Idle1-1 = "วะ...วาคาบะ ฮินาตะค่ะ ฉะ...ฉันจะตั้งใจทำให้ดีที่สุด\nพะ...เพราะงั้นบอกมาได้ทุกเรื่องเลยนะคะ!"
20028-CVGroup_Cafe_Idle1-1 = "สไตล์การตกแต่งที่นี่น่ารักมากๆ เลยค่ะ...!"
20028-CVGroup_Cafe_Idle2-1 = "คือว่า... ถ้าเป็นเรื่องขนย้ายสัมภาระละก็\nบอกฉันได้ตลอดเลยนะคะ!"
20028-CVGroup_Cafe_Idle3-1 = "เอ๋? รู้สึกเหมือนมีคนกำลังเรียกฉันอยู่เลย..."
20028-CVGroup_Cafe_Idle4-1 = "ที่นี่ดูดีแล้วก็สบายมากเลยค่ะ"
20028-CVGroup_Cafe_Idle5-1 = "คุณครู... อยู่ที่ไหนคะ...?"
20028-CVGroup_WeaponGet_Idle1-1 = "ฉัน...ไม่รู้ว่าจะขอบคุณคุณครูยังไงดี... ไม่สิ ถ้าให้บอกเป็นคำพูด\nคงไม่มีทางพูดออกไปหมดได้แน่ๆ ค่ะ ความกรุณา\nที่ได้รับมาในครั้งนี้... ฉันจะตอบแทนด้วยการกระทำค่ะ คุณครู"
20028-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ... กำลังรออยู่เลยค่ะ คุณครู!"
20028-CVGroup_UIEventLobby_Enter2-1 = "ฉะ... ฉันเตรียมตัวเสร็จแล้วค่ะ!"
20028-CVGroup_UIEventLobby_Enter2-2 = "ไม่ว่าเมื่อไรก็บอกฉันได้เสมอเลยนะคะ!"
20028-CVGroup_UIEventLobby_Enter3-1 = "เหลืออีกนิดเดียวค่ะ! สู้ๆ นะคะ!"
20028-CVGroup_UIEventLobby_Enter4-1 = "มาตั้งสติให้มั่นจนสุดทางเลยนะคะ...!"
20028-CVGroup_UIEventLobby_Enter5-1 = "เรื่องเก็บกวาดไว้ใจฉันได้เลยค่ะ ฮุฮุ"
20028-CVGroup_UIEventLobby_Idle1-1 = "ร้อนจังเลยนะคะ... แดดก็แรงด้วย..."
20028-CVGroup_UIEventLobby_Idle1-2 = "ถะ... ถ้าไม่ว่าอะไรฉันให้ยืมหมวกมั้ยคะ?"
20028-CVGroup_UIEventLobby_Idle2-1 = "หืม? คุณครูคะ? เป็นอะไรไปเหรอคะ?"
20028-CVGroup_UIEventLobby_Idle3-1 = "อะ... เอ่อ... คุณครูคะ? ถ้า... มีเรื่องอะไรก็บอกฉันได้นะ..."
20028-CVGroup_UIEventLobby_Idle4-1 = "เฮือก! คะ... คุณครู! จะ... จั๊กจี้นะคะ!"
20028-CVGroup_UIEventLobby_Idle4-2 = "อ๊าย!? อะฮ่าฮ่าฮ่า!!"
20028-CVGroup_UIEventShop_Enter1-1 = "มีของที่ต้องการหรือเปล่าคะ?"
20028-CVGroup_UIEventShop_Enter2-1 = "มาเลือกไปได้เลยค่ะ!"
20028-CVGroup_UIEventShop_Enter3-1 = "เรายังมีเวลาเหลืออยู่ ไปเดินดูด้วยกันมั้ยคะ?"
20028-CVGroup_UIEventShop_Idle1-1 = "คะ... คุณครู... พุ่บ ฮ่าฮ่า! ฉะ... ฉันไม่เอาแล้ว... อุ๊ย! ฮ่าฮ่าฮ่า"
20028-CVGroup_UIEventShop_Idle2-1 = "หืม? มีอะไรจะบอกหรือเปล่า...?"
20028-CVGroup_UIEventShop_Buy1-1 = "ทะ... เท่สุดๆ ไปเลยค่ะ! ฉันก็ว่าดีเหมือนกันค่ะ"
20028-CVGroup_UIEventShop_Buy2-1 = "ค่ะ! อยู่ตรงนี้ค่ะ!"
20028-CVGroup_UIEventShop_Buy3-1 = "นั่นมัน... น่าจะดีมากเลยละค่ะ! สมแล้วค่ะที่เป็นคุณครู!"
20028-CVGroup_UIEventShop_Buy4-1 = "โล่งอกไปทีนะคะ ที่เจอของที่หาอยู่!"

[translation]
20028-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20028-CVGroup_CharacterGet_Idle1-1 = "我，我叫若葉日向！\n我會努力的，請儘管吩咐！"
20028-CVGroup_Cafe_Idle1-1 = "這裡的裝潢，\n真是非常可愛呢…！"
20028-CVGroup_Cafe_Idle2-1 = "那個，要搬東西的話，我隨時奉陪！"
20028-CVGroup_Cafe_Idle3-1 = "咦？感覺好像有人在叫我的名字…"
20028-CVGroup_Cafe_Idle4-1 = "是個能放鬆的好地方呢。"
20028-CVGroup_Cafe_Idle5-1 = "老師…會在哪裡呢…？"
20028-CVGroup_WeaponGet_Idle1-1 = "那個……該怎麼答謝才好呢……\n不，只靠言語是無法傳達的……\n這份恩情……我一定會用行動報答您，老師。"
20028-CVGroup_UIEventLobby_Enter1-1 = "恭，恭候多時了，老師！"
20028-CVGroup_UIEventLobby_Enter2-1 = "準，準備已經做好了！"
20028-CVGroup_UIEventLobby_Enter2-2 = "請隨時吩咐！"
20028-CVGroup_UIEventLobby_Enter3-1 = "就差一點了！加油吧！"
20028-CVGroup_UIEventLobby_Enter4-1 = "直到最後，都要繃緊神經……！"
20028-CVGroup_UIEventLobby_Enter5-1 = "收拾善後請交給我。呵呵。"
20028-CVGroup_UIEventLobby_Idle1-1 = "真熱呢……陽光也很強……"
20028-CVGroup_UIEventLobby_Idle1-2 = "那個，不介意的話，帽子，要不要借您呢？"
20028-CVGroup_UIEventLobby_Idle2-1 = "咦？老師？怎麼了嗎？"
20028-CVGroup_UIEventLobby_Idle3-1 = "那，那個……老師？\n就是……有事的話請告訴我……"
20028-CVGroup_UIEventLobby_Idle4-1 = "呀！老，老師！很，很癢的！"
20028-CVGroup_UIEventLobby_Idle4-2 = "呀，啊哈哈！"
20028-CVGroup_UIEventShop_Enter1-1 = "在找什麼嗎？"
20028-CVGroup_UIEventShop_Enter2-1 = "請您盡情挑選！"
20028-CVGroup_UIEventShop_Enter3-1 = "現在還有時間，要不要一起逛逛呢？"
20028-CVGroup_UIEventShop_Idle1-1 = "老，老師……呵呵！我，我的事不用在意……呵呵！"
20028-CVGroup_UIEventShop_Idle2-1 = "那個……有什麼事嗎……？"
20028-CVGroup_UIEventShop_Buy1-1 = "真，真棒呢！我也覺得很好。"
20028-CVGroup_UIEventShop_Buy2-1 = "好的！就是這些！"
20028-CVGroup_UIEventShop_Buy3-1 = "那真是棒極了呢……！\n不愧是您，老師。"
20028-CVGroup_UIEventShop_Buy4-1 = "能找到要找的東西，真是太好了！"

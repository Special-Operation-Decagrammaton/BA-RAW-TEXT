[translation]
20028-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20028-CVGroup_CharacterGet_Idle1-1 = "M-My name is Wakaba Hinata! Tell me whatever you need, and I shall do my best!"
20028-CVGroup_Cafe_Idle1-1 = "Such lovely decor you have here...!"
20028-CVGroup_Cafe_Idle2-1 = "If you need something moved, just tell me anytime!"
20028-CVGroup_Cafe_Idle3-1 = "Hm? I feel as though someone is calling me..."
20028-CVGroup_Cafe_Idle4-1 = "Such a comfortable place we have here."
20028-CVGroup_Cafe_Idle5-1 = "Sensei... Where could you be...?"
20028-CVGroup_WeaponGet_Idle1-1 = "I...don't know how to thank you enough... In fact, words may not be enough to express my gratitude. I'll repay your kindness with my actions, Sensei."
20028-CVGroup_UIEventLobby_Enter1-1 = "Ah, I've been waiting for you, Sensei!"
20028-CVGroup_UIEventLobby_Enter2-1 = "Th-The preparations are complete."
20028-CVGroup_UIEventLobby_Enter2-2 = "Let me know if there's anything you need!"
20028-CVGroup_UIEventLobby_Enter3-1 = "Just a little more! Stay strong!"
20028-CVGroup_UIEventLobby_Enter4-1 = "Keep at it until the very end...!"
20028-CVGroup_UIEventLobby_Enter5-1 = "Leave the cleanup to me. Heehee."
20028-CVGroup_UIEventLobby_Idle1-1 = "It's hot... And the sun is so strong..."
20028-CVGroup_UIEventLobby_Idle1-2 = "I-If you want, you may borrow my hat."
20028-CVGroup_UIEventLobby_Idle2-1 = "Oh? Sensei? What's wrong?"
20028-CVGroup_UIEventLobby_Idle3-1 = "Uh, um... Sensei? If...you need something, just tell me..."
20028-CVGroup_UIEventLobby_Idle4-1 = "Heehee! S-Sensei! Th-That tickles!"
20028-CVGroup_UIEventLobby_Idle4-2 = "Hee! Ahahaha!!"
20028-CVGroup_UIEventShop_Enter1-1 = "Is there a particular item you're after?"
20028-CVGroup_UIEventShop_Enter2-1 = "Take a look around."
20028-CVGroup_UIEventShop_Enter3-1 = "We still have time, so shall we look together?"
20028-CVGroup_UIEventShop_Idle1-1 = "S-Sensei... Haha! I-I'm okay... Hahaha!"
20028-CVGroup_UIEventShop_Idle2-1 = "Oh? Did you have something to say...?"
20028-CVGroup_UIEventShop_Buy1-1 = "Th-That's great! I think it's good too."
20028-CVGroup_UIEventShop_Buy2-1 = "Yes! Here you go!"
20028-CVGroup_UIEventShop_Buy3-1 = "That... I think that's very good! As expected, Sensei!"
20028-CVGroup_UIEventShop_Buy4-1 = "I'm glad you found what you were looking for!"

[translation]
10108-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10108-CVGroup_CharacterGet_Idle1-1 = "Calling me so late in the night... O-Of course, regardless of what I'm wearing, I'm always ready to go. Just know that I'll collect my dues later."
10108-CVGroup_Cafe_Idle1-1 = "I think I'm a little sleepy."
10108-CVGroup_Cafe_Idle2-1 = "Is there anywhere I can rest...?"
10108-CVGroup_Cafe_Idle3-1 = "Somewhere neither too warm nor too cool..."
10108-CVGroup_Cafe_Idle4-1 = "(Maybe lying next to Sensei, or something like that...)"
10108-CVGroup_Cafe_Idle5-1 = "What kind of tea helps promote a good night's sleep?"
10108-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei. With this weapon, maybe I can reasonably get rid of anything that disturbs my sleep?"
10108-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei."
10108-CVGroup_UIEventLobby_Enter1-2 = "I didn't think you would come."
10108-CVGroup_UIEventLobby_Enter2-1 = "Hello, Sensei."
10108-CVGroup_UIEventLobby_Enter2-2 = "We were going to have a pajama party to celebrate the end of the year, but..."
10108-CVGroup_UIEventLobby_Enter2-3 = "...there's been a slight problem."
10108-CVGroup_UIEventLobby_Enter3-1 = "KO! YU! KI!!!"
10108-CVGroup_UIEventLobby_Enter3-2 = "I'm not letting her off easy this time! For real!"
10108-CVGroup_UIEventLobby_Enter3-3 = "So please don't try to stop me!"
10108-CVGroup_UIEventLobby_Enter4-1 = "Somehow, everything was resolved..."
10108-CVGroup_UIEventLobby_Enter4-2 = "In a way, it's also thanks to you, Sensei."
10108-CVGroup_UIEventLobby_Enter4-3 = "Are you talking about Koyuki?"
10108-CVGroup_UIEventLobby_Enter4-4 = "...I'm going to let it go. Just this once."
10108-CVGroup_UIEventLobby_Enter5-1 = "Ah, you're here, Sensei. Would you like to rest a little before you go? Only if you want to..."
10108-CVGroup_UIEventLobby_Idle1-1 = "What? You feel like you're seeing a new side to me?"
10108-CVGroup_UIEventLobby_Idle1-2 = "Th-Thank you."
10108-CVGroup_UIEventLobby_Idle1-3 = "Hearing that from you, Sensei..."
10108-CVGroup_UIEventLobby_Idle1-4 = "It makes me really happy."
10108-CVGroup_UIEventLobby_Idle2-1 = "You had the sudden realization that I'm a high school girl?"
10108-CVGroup_UIEventLobby_Idle2-2 = "What was I to you before?!"
10108-CVGroup_UIEventLobby_Idle3-1 = "Board games are fun in that they are realistic, but managing the pieces seem a bit tricky."
10108-CVGroup_UIEventLobby_Idle3-2 = "This rings even more true when you consider certain Millennium students who are terrible at organizing and tidying up."
10108-CVGroup_UIEventLobby_Idle4-1 = "Um, Sensei? Would you please stop poking my waist...?"
10108-CVGroup_UIEventLobby_Idle4-2 = "...I'm going to genuinely get mad if you try to point out that I've gained weight."
10108-CVGroup_UIEventShop_Enter1-1 = "Do you need something?"
10108-CVGroup_UIEventShop_Enter1-2 = "With the end of the year approaching, I've been organizing supplies. Feel free to take anything you need."
10108-CVGroup_UIEventShop_Enter2-1 = "I'm collecting supplies for the pajama party."
10108-CVGroup_UIEventShop_Enter2-2 = "If there's anything you need, just let me know."
10108-CVGroup_UIEventShop_Enter3-1 = "Hello, Sensei."
10108-CVGroup_UIEventShop_Enter3-2 = "Make sure you didn't miss anything! Please check carefully!"
10108-CVGroup_UIEventShop_Idle1-1 = "Preparing for this party just feels like an extension of my accounting work..."
10108-CVGroup_UIEventShop_Idle2-1 = "Come to think of it, at the convenience store in Schale..."
10108-CVGroup_UIEventShop_Idle2-2 = "...there's a cute kid there who manages it."
10108-CVGroup_UIEventShop_Idle2-3 = "She's always there. I wonder if she gets to take proper breaks."
10108-CVGroup_UIEventShop_Buy1-1 = "Is that what you'd like to go with?"
10108-CVGroup_UIEventShop_Buy2-1 = "It seems like a reasonable choice."
10108-CVGroup_UIEventShop_Buy3-1 = "I'll hang onto the receipt..."
10108-CVGroup_UIEventShop_Buy3-2 = "I'll put it down in Schale's ledger later."
10108-CVGroup_UIEventShop_Buy4-1 = "Heehee. I'll be able to analyze your shopping habits this way, Sensei."

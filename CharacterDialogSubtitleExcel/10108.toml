[translation]
10108-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10108-CVGroup_CharacterGet_Idle1-1 = "เรียกหากันกลางดึกแบบนี้เลยเหรอ...\nตะ... แต่ว่าไม่ว่าอยู่ในชุดไหน เวลาใด ฉันก็พร้อมเสมอค่ะ\nไว้เตรียมรับบทลงโทษของวันนี้ทีหลังนะคะ\n"
10108-CVGroup_Cafe_Idle1-1 = "เหมือนจะ... ง่วงหน่อยๆ เลย"

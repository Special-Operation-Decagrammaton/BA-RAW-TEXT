10108-CVGroup_UIEventLobby_Idle1-3 = "ฉันได้ฟังคำพูดแบบนี้จากคุณครูด้วย..."
10108-CVGroup_UIEventLobby_Idle1-4 = "ดีใจจังเลยค่ะ"
10108-CVGroup_UIEventLobby_Idle2-1 = "ฉันยังไม่รู้สึกเลยค่ะ\nว่าตัวเองเป็นเด็กนักเรียนม.ปลาย..."

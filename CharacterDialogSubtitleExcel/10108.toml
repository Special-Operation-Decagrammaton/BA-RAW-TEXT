10108-CVGroup_UIEventShop_Buy3-2 = "ไว้ฉันจะใส่เพิ่มในบัญชีของชาเล่ต์ให้ค่ะ"
10108-CVGroup_UIEventShop_Buy4-1 = "ฮุฮุ ฉันน่าจะวิเคราะห์รูปแบบการใช้จ่ายของคุณครูได้เลยนะคะ"

10108-CVGroup_UIEventLobby_Idle4-2 = "ถ้าพูดว่าฉันน้ำหนักขึ้นหรืออะไรทำนองนั้น\nฉันจะโกรธจริงๆ ด้วยค่ะ"
10108-CVGroup_UIEventShop_Enter1-1 = "มีของที่ต้องการหรือเปล่าคะ?"

10108-CVGroup_UIEventShop_Enter3-1 = "สวัสดีค่ะ คุณครู"
10108-CVGroup_UIEventShop_Enter3-2 = "ถ้าลืมอะไรตรงไหนก็ตรวจสอบให้รอบคอบจนเสร็จเลยนะคะ!"
10108-CVGroup_UIEventShop_Idle1-1 = "แค่เตรียมปาร์ตี้เอง\nแต่รู้สึกเหมือนทำให้งานบัญชีเลื่อนออกไปเลยนะคะ..."
10108-CVGroup_UIEventShop_Idle2-1 = "จะว่าไปที่ร้านสะดวกซื้อชาเล่ต์"
10108-CVGroup_UIEventShop_Idle2-2 = "ก็มีเด็กน่ารักๆ คนหนึ่งที่ดูแลร้านอยู่นี่คะ..."
10108-CVGroup_UIEventShop_Idle2-3 = "เห็นเฝ้าอยู่หน้าเคาน์เตอร์ตลอดเลย\nไม่รู้ว่าจะได้พักผ่อนบ้างหรือเปล่านะคะ?"
10108-CVGroup_UIEventShop_Buy1-1 = "จะเอาชิ้นนั้นเหรอคะ?"

10108-CVGroup_UIEventLobby_Enter4-1 = "คลี่คลายจนได้นะคะ..."
10108-CVGroup_UIEventLobby_Enter4-2 = "เรื่องนี้ก็ต้องขอบคุณคุณครูเลยนะคะ"

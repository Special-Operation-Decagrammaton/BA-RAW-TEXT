[translation]
10108-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10108-CVGroup_CharacterGet_Idle1-1 = "이런 늦은 밤에 호출하시다니….\n무, 물론 저야 언제 어떤 차림이든 준비 만전이지만요.\n오늘의 벌충은 나중에 제대로 받아낼 테니 각오하세요."
10108-CVGroup_Cafe_Idle1-1 = "조금…… 졸린 것 같기도."
10108-CVGroup_Cafe_Idle2-1 = "어디 쉴 만한 자리는 없을까……"
10108-CVGroup_Cafe_Idle3-1 = "너무 따듯하지도 시원하지도 않은 장소가……"
10108-CVGroup_Cafe_Idle4-1 = "(선생님과 함께, 곁에 눕는다든가…)"
10108-CVGroup_Cafe_Idle5-1 = "숙면에 좋은 차가 뭐가 있었더라……"
10108-CVGroup_WeaponGet_Idle1-1 = "감사합니다. 선생님.\n이 무기라면 숙면에 방해되는 것들을 합리적으로 정리할 수 있을지도요?"
10108-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님!"
10108-CVGroup_UIEventLobby_Enter1-2 = "설마 선생님께서 오실 줄은 모르고 있었는데 말이죠."
10108-CVGroup_UIEventLobby_Enter2-1 = "안녕하세요. 선생님."
10108-CVGroup_UIEventLobby_Enter2-2 = "연말을 맞이해서 파자마 파티를 열려 했는데……"
10108-CVGroup_UIEventLobby_Enter2-3 = "다소 골치 아픈 문제가……"
10108-CVGroup_UIEventLobby_Enter3-1 = "코~유~키~!!!"
10108-CVGroup_UIEventLobby_Enter3-2 = "이번에는 정말로 안 봐 줄 거니까요!"
10108-CVGroup_UIEventLobby_Enter3-3 = "말리지 마세요!!!"
10108-CVGroup_UIEventLobby_Enter4-1 = "어찌저찌 해결되기는 했네요……"
10108-CVGroup_UIEventLobby_Enter4-2 = "이것도 어떻게 보면 이번에도 선생님 덕분이에요."
10108-CVGroup_UIEventLobby_Enter4-3 = "코유키 말인가요?"
10108-CVGroup_UIEventLobby_Enter4-4 = "……이번 한 번만 봐 줄 생각이에요."
10108-CVGroup_UIEventLobby_Enter5-1 = "아, 오셨군요. 선생님. 괜찮으시다면…… 조금, 쉬었다 가지 않으실래요?"
10108-CVGroup_UIEventLobby_Idle1-1 = "네? 이런 제 모습도 신선하게 느껴지신다고요?"
10108-CVGroup_UIEventLobby_Idle1-2 = "가, 감사합니다."
10108-CVGroup_UIEventLobby_Idle1-3 = "선생님께 그런 말씀을 들으니……"
10108-CVGroup_UIEventLobby_Idle1-4 = "기쁘네요. 정말로요."
10108-CVGroup_UIEventLobby_Idle2-1 = "새삼스럽게 제가 여고생이라는 걸 실감하셨다니…"
10108-CVGroup_UIEventLobby_Idle2-2 = "그럼 평소에는 어떻게 보고 계셨던 건가요?!"
10108-CVGroup_UIEventLobby_Idle3-1 = "보드게임은 현실성이 있어 즐겁지만 말을 관리하는 게 조금 까다로운 것 같아요."
10108-CVGroup_UIEventLobby_Idle3-2 = "더군다나 밀레니엄의 학생 중에는 정리 정돈을 못 하는 학생들이 제법 많은지라."
10108-CVGroup_UIEventLobby_Idle4-1 = "저기, 선생님. 허리를 찔러보시는 건 그만두시겠어요…?"
10108-CVGroup_UIEventLobby_Idle4-2 = "…살쪘다느니 그런 소리를 하시면 진심으로 화낼 거니까요."
10108-CVGroup_UIEventShop_Enter1-1 = "필요한 물건이 있으신가요?"
10108-CVGroup_UIEventShop_Enter1-2 = "연말을 맞아 비품을 정리하고 있었으니 필요하신 게 있다면 가져가세요."
10108-CVGroup_UIEventShop_Enter2-1 = "파자마 파티를 위해 비품을 정리 중이랍니다."
10108-CVGroup_UIEventShop_Enter2-2 = "혹시 선생님께서도 필요하신 게 있다면 말씀해 주세요."
10108-CVGroup_UIEventShop_Enter3-1 = "안녕하세요, 선생님?"
10108-CVGroup_UIEventShop_Enter3-2 = "무언가 놓치신 것이 있으시다면, 마지막까지 꼼꼼하게 확인해 주세요!"
10108-CVGroup_UIEventShop_Idle1-1 = "어쩐지 파티를 준비하는 것 뿐인데,\n회계 업무의 연장이 되어버린 느낌이네요…"
10108-CVGroup_UIEventShop_Idle2-1 = "그러고 보니 샬레의 편의점에도"
10108-CVGroup_UIEventShop_Idle2-2 = "귀여운 아이 하나가 매장을 관리하고 있었죠……"
10108-CVGroup_UIEventShop_Idle2-3 = "늘 매대 앞을 떠나지 않던데, 휴식은 제대로 취하고 있는 걸까요?"
10108-CVGroup_UIEventShop_Buy1-1 = "그것으로 하시겠어요?"
10108-CVGroup_UIEventShop_Buy2-1 = "합리적인 소비 시네요."
10108-CVGroup_UIEventShop_Buy3-1 = "영수증은… 아, 제가 챙겨둘게요."
10108-CVGroup_UIEventShop_Buy3-2 = "나중에 샬레의 가계부에 따로 기입해 두겠습니다."
10108-CVGroup_UIEventShop_Buy4-1 = "후후, 어쩐지 선생님의 소비 패턴을 분석할 수 있을 것 같네요."

[translation]
10108-CVGroup_UITitle_Idle1-1 = "蔚藍檔案"
10108-CVGroup_CharacterGet_Idle1-1 = "居然這麼晚還把我找來……\n當，當然我完全沒問題的！\n不過今天的事，我之後會好好討回來的，請做好心理準備哦？"
10108-CVGroup_Cafe_Idle1-1 = "好像……有點睏。"
10108-CVGroup_Cafe_Idle2-1 = "哪裡有可以休息的地方……"
10108-CVGroup_Cafe_Idle3-1 = "不會太熱也不會太冷的地方……"
10108-CVGroup_Cafe_Idle4-1 = "（跟老師一起躺下之類的……）"
10108-CVGroup_Cafe_Idle5-1 = "有什麼有助於放鬆的茶嗎……？"
10108-CVGroup_WeaponGet_Idle1-1 = "謝謝你，老師。\n用這個似乎就能把妨礙睡眠的要素合理地排除了。"
10108-CVGroup_UIEventLobby_Enter1-1 = "你來啦，老師！"
10108-CVGroup_UIEventLobby_Enter1-2 = "沒想到老師會過來。"
10108-CVGroup_UIEventLobby_Enter2-1 = "你好，老師。"
10108-CVGroup_UIEventLobby_Enter2-2 = "難得有機會就來開個睡衣派對，本來是這麼想的……"
10108-CVGroup_UIEventLobby_Enter2-3 = "結果卻變得有點傷腦筋……"
10108-CVGroup_UIEventLobby_Enter3-1 = "小～雪～！！"
10108-CVGroup_UIEventLobby_Enter3-2 = "這次我絕對不會放過你的！"
10108-CVGroup_UIEventLobby_Enter3-3 = "老師也請不要阻止我哦！？"
10108-CVGroup_UIEventLobby_Enter4-1 = "總算是解決了呢……"
10108-CVGroup_UIEventLobby_Enter4-2 = "這次也受老師照顧了。"
10108-CVGroup_UIEventLobby_Enter4-3 = "小雪，是嗎？"
10108-CVGroup_UIEventLobby_Enter4-4 = "……這次，我打算放過他。"
10108-CVGroup_UIEventLobby_Enter5-1 = "啊，你來啦，老師。\n如果不介意的話……要不要稍微休息一下？"
10108-CVGroup_UIEventLobby_Idle1-1 = "咦？這樣的我也很新鮮？"
10108-CVGroup_UIEventLobby_Idle1-2 = "謝，謝謝。"
10108-CVGroup_UIEventLobby_Idle1-3 = "能聽到老師這麼說……"
10108-CVGroup_UIEventLobby_Idle1-4 = "真讓人開心，非常開心。"
10108-CVGroup_UIEventLobby_Idle2-1 = "再次認知到了我是個女高中生……？"
10108-CVGroup_UIEventLobby_Idle2-2 = "所以你平常都是怎麼看待我的！？"
10108-CVGroup_UIEventLobby_Idle3-1 = "桌遊的真實感雖然有趣，但棋子的管理也很不容易呢。"
10108-CVGroup_UIEventLobby_Idle3-2 = "而且在千年，不擅長整理整頓的孩子，還挺多的……"
10108-CVGroup_UIEventLobby_Idle4-1 = "那個，老師？\n能請你不要再戳我的肚子附近了嗎……？"
10108-CVGroup_UIEventLobby_Idle4-2 = "……要是敢說我胖了，我真的會生氣的哦。"
10108-CVGroup_UIEventShop_Enter1-1 = "有需要什麼東西嗎？"
10108-CVGroup_UIEventShop_Enter1-2 = "我正在整理迎接年末的備品，有需要的話請儘管拿吧。"
10108-CVGroup_UIEventShop_Enter2-1 = "為了睡衣派對，我正在整理備品。"
10108-CVGroup_UIEventShop_Enter2-2 = "老師如果需要什麼的話，請跟我說一聲吧。"
10108-CVGroup_UIEventShop_Enter3-1 = "你好，老師。"
10108-CVGroup_UIEventShop_Enter3-2 = "有沒有遺漏什麼事情，還請在結束之前確認一下哦！"
10108-CVGroup_UIEventShop_Idle1-1 = "明明是在做派對的準備，總覺得像是在做會計的工作一樣……"
10108-CVGroup_UIEventShop_Idle2-1 = "話說夏萊的便利商店，"
10108-CVGroup_UIEventShop_Idle2-2 = "也是由一個女孩子單獨在管理賣場對吧……？"
10108-CVGroup_UIEventShop_Idle2-3 = "他幾乎不曾離開崗位，真的有好好休息嗎？"
10108-CVGroup_UIEventShop_Buy1-1 = "要那個嗎？"
10108-CVGroup_UIEventShop_Buy2-1 = "真是合理的消費呢。"
10108-CVGroup_UIEventShop_Buy3-1 = "收據就……啊，我先幫你收著吧。"
10108-CVGroup_UIEventShop_Buy3-2 = "之後再幫你記到夏萊的記帳本裡。"
10108-CVGroup_UIEventShop_Buy4-1 = "呵呵，好像能分析出老師的消費習慣呢。"

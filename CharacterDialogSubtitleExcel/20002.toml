[translation]
20002-CVGroup_UITitle_Idle1-1 = "블루 아카이브다!"
20002-CVGroup_CharacterGet_Idle1-1 = "나님, 등장! 이번 실험의 피험체는 어디에 있으려나?"
20002-CVGroup_Cafe_Idle1-1 = "후후, 이 방. 나님의 실험실로 써도 좋겠는데?"
20002-CVGroup_Cafe_Idle2-1 = "다음번에는 메이를 상대로 무얼 실험해볼까?"
20002-CVGroup_Cafe_Idle3-1 = "이 정도의 습도와 온도라면 내 귀여운 세균들이 자라기에 아주 좋겠어.\n후-후-후…."
20002-CVGroup_Cafe_Idle4-1 = "앗, 어디서 치즈 냄새가 나는 것이다!"
20002-CVGroup_Cafe_Idle5-1 = "네즈스케, 이 녀석! 날뛰지 마!"
20002-CVGroup_WeaponGet_Idle1-1 = "나님의 권총이 드디어 도착한 것이다!\n물론 이 무시무시한 세균 병기에 비하면 애교 수준이지만."

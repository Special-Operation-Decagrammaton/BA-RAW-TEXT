[translation]
20002-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20002-CVGroup_CharacterGet_Idle1-1 = "我登場了！\n這次實驗的對象在哪裡啊？"
20002-CVGroup_Cafe_Idle1-1 = "哼哼，把這個房間，\n當成我的實驗室似乎也不錯呢！"
20002-CVGroup_Cafe_Idle2-1 = "下次要以梅為對象做什麼實驗好呢？"
20002-CVGroup_Cafe_Idle3-1 = "這種濕度和溫度，\n感覺非常適合培育我可愛的細菌們。\n哼哼哼哼……"
20002-CVGroup_Cafe_Idle4-1 = "啊，從某處飄來了起司的味道！"
20002-CVGroup_Cafe_Idle5-1 = "根津助！\n你這傢伙！不要亂跑！"
20002-CVGroup_WeaponGet_Idle1-1 = "我的手槍終於送到了！\n當然，比起這些駭人的生化武器根本只會幫人搔搔癢而已。"

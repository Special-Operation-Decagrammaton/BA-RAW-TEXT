[translation]
20002-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20002-CVGroup_CharacterGet_Idle1-1 = "ได้เวลาของท่านซายะแล้ว!\nครั้งนี้จะได้โชว์ฝีมืออะไรนะ?"
20002-CVGroup_Cafe_Idle1-1 = "ฮุฮุ ห้องนี้มันช่างเหมาะกับการใช้เป็นห้องทดลอง\nของท่านซายะเลย"
20002-CVGroup_Cafe_Idle2-1 = "คราวหน้าจะประดิษฐ์อะไร\nมาต่อสู้กับพวกแมวดีนะ?"
20002-CVGroup_Cafe_Idle3-1 = "ความชื้นและอุณหภูมิประมาณนี้แหละที่เหมาะสำหรับ\nการเติบโตของแบคทีเรียที่น่ารักของฉัน ฮุฮุฮุ..."
20002-CVGroup_Cafe_Idle4-1 = "เหมือนได้กลิ่นชีส\nมาจากที่ไหนเลย!"
20002-CVGroup_Cafe_Idle5-1 = "เนสึซึเกะ เจ้าเด็กคนนี้!\nดีดเกินไปแล้วนะ!"
20002-CVGroup_WeaponGet_Idle1-1 = "ในที่สุดปืนพกของท่านซายะก็มาถึงสักที!\nแน่นอนว่าถ้าเทียบกับอาวุธเคมีนี่แล้ว\nมันจะดูเป็นอาวุธเด็กๆ ไปสักหน่อยก็เถอะ"

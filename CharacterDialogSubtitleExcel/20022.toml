[translation]
20022-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20022-CVGroup_CharacterGet_Idle1-1 = "Did you have any New Year's Eve noodles? I hope everything goes well for us this year!"
20022-CVGroup_Cafe_Idle1-1 = "Precise measurements are important when cooking."
20022-CVGroup_Cafe_Idle2-1 = "This kimono...is pretty."
20022-CVGroup_Cafe_Idle3-1 = "What was my first dream of the New Year?"
20022-CVGroup_Cafe_Idle4-1 = "I hope we have a peaceful year..."
20022-CVGroup_Cafe_Idle5-1 = "Maybe I can take a little break here..."
20022-CVGroup_WeaponGet_Idle1-1 = "It's so strange. When I'm with you, I feel like I can do anything. I'll try my best again this year. Please watch over me."
20022-CVGroup_UIEventLobby_Enter1-1 = "Hello, Sensei! Did you decide on your New Year's wish?"
20022-CVGroup_UIEventLobby_Enter1-2 = "Here, I'll pray next to you!"
20022-CVGroup_UIEventLobby_Enter2-1 = "Are you cold? Do you need a warm meal?"
20022-CVGroup_UIEventLobby_Idle1-1 = "Yes, Sensei? What's going on?"
20022-CVGroup_UIEventLobby_Idle2-1 = "This scooter is so helpful."
20022-CVGroup_UIEventLobby_Idle2-2 = "If I lose this too, whatever will I do...?"
20022-CVGroup_UIEventLobby_Idle3-1 = "I want to try making other New Year's foods as well. Not just osechi."
20022-CVGroup_UIEventLobby_Idle3-2 = "Oh, but...if I eat all of that, I'll definitely gain weight."
20022-CVGroup_UIEventLobby_Idle4-1 = "I don't know if I'd call it a New Year's wish, but..."
20022-CVGroup_UIEventLobby_Idle4-2 = "I hope the cafeteria stays safe this year..."
20022-CVGroup_UIEventLobby_Enter3-1 = "Yes... Now is the time to show off my cooking skills!"
20022-CVGroup_UIEventLobby_Enter3-2 = "I'll do my best... I'd appreciate it if you were there to cheer me on."
20022-CVGroup_UIEventLobby_Enter4-1 = "Even though it's become such a big deal, it doesn't change what I need to do."
20022-CVGroup_UIEventLobby_Enter4-2 = "All I can do is try my best."
20022-CVGroup_UIEventLobby_Enter4-3 = "Besides... I feel reassured with you at my side!"
20022-CVGroup_UIEventLobby_Enter5-1 = "I'm glad it ended well."
20022-CVGroup_UIEventLobby_Enter5-2 = "So...Sensei? Was my food to your liking?"
20022-CVGroup_UIEventShop_Enter1-1 = "Sensei, welcome. The market owners prepared all manner of products."
20022-CVGroup_UIEventShop_Enter2-1 = "It's my first time running the shop. Heeheehee."
20022-CVGroup_UIEventShop_Idle1-1 = "It's fine. Don't worry."
20022-CVGroup_UIEventShop_Idle1-2 = "I feel confident I can manage our inventory."
20022-CVGroup_UIEventShop_Idle2-1 = "Huh? A special School Lunch Club dish, you say?"
20022-CVGroup_UIEventShop_Idle2-2 = "If you want...I can make something for you."
20022-CVGroup_UIEventShop_Buy1-1 = "All right, please give me a minute."
20022-CVGroup_UIEventShop_Buy2-1 = "That's my top recommendation!"
20022-CVGroup_UIEventShop_Buy3-1 = "Oh... Yes. You mean this one, right?"
20022-CVGroup_UIEventShop_Buy4-1 = "Did you enjoy it? Please come again!"
20022-CVGroup_UIEventShop_Enter3-1 = "Both the festival and the cooking contests have ended."
20022-CVGroup_UIEventShop_Enter3-2 = "I have to prepare for tomorrow...but you should take your time and look around."

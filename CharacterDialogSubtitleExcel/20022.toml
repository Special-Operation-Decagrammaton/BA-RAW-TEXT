[translation]
20022-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20022-CVGroup_CharacterGet_Idle1-1 = "老師，吃過跨年蕎麥麵了嗎？\n希望今年我們彼此都能度過平安順利的一年。"
20022-CVGroup_Cafe_Idle1-1 = "製作料理時，確實測量是很重要的唷。"
20022-CVGroup_Cafe_Idle2-1 = "這件和服……真漂亮。"
20022-CVGroup_Cafe_Idle3-1 = "今年的初夢……\n是什麼來著？"
20022-CVGroup_Cafe_Idle4-1 = "希望今年平靜的日子能持續下去……"
20022-CVGroup_Cafe_Idle5-1 = "呼，這裡應該可以稍微休息一下吧……？"
20022-CVGroup_WeaponGet_Idle1-1 = "真是不可思議……只要有老師在身邊，我就覺得自己似乎無所不能。\n今年我也會加油的。還請您在一旁守望著我哦。"
20022-CVGroup_UIEventLobby_Enter1-1 = "你好，老師！新年的願望已經決定好了嗎？"
20022-CVGroup_UIEventLobby_Enter1-2 = "我也會在身旁一起祈禱的！"
20022-CVGroup_UIEventLobby_Enter2-1 = "會不會冷呢？\n要不要吃點溫暖的食物？"
20022-CVGroup_UIEventLobby_Idle1-1 = "是，老師？有什麼事嗎？"
20022-CVGroup_UIEventLobby_Idle2-1 = "這輛摩托車有很多用途唷。"
20022-CVGroup_UIEventLobby_Idle2-2 = "如果連這個都沒了的話……該怎麼辦……"
20022-CVGroup_UIEventLobby_Idle3-1 = "御節料理以外的新年料理，我也想挑戰看看！"
20022-CVGroup_UIEventLobby_Idle3-2 = "不過，要是把做出來的料理全部吃光……好像會變胖……"
20022-CVGroup_UIEventLobby_Idle4-1 = "新年的願望……雖然不是這個，"
20022-CVGroup_UIEventLobby_Idle4-2 = "希望今年供餐廚房能平安……"
20022-CVGroup_UIEventLobby_Enter3-1 = "是……現在正是展現廚藝的時候呢！"
20022-CVGroup_UIEventLobby_Enter3-2 = "我，會努力的……\n如果你能在一旁守望，我會很開心的。"
20022-CVGroup_UIEventLobby_Enter4-1 = "總覺得好像變成一件不得了的事情了，但是我該做的事並沒有改變。"
20022-CVGroup_UIEventLobby_Enter4-2 = "盡己所能，僅此而已。"
20022-CVGroup_UIEventLobby_Enter4-3 = "而且……有老師陪在身邊，就像有一百個人的力量一樣！"
20022-CVGroup_UIEventLobby_Enter5-1 = "能順利結束真是太好了。"
20022-CVGroup_UIEventLobby_Enter5-2 = "那個……我的料理，合你的口味嗎？"
20022-CVGroup_UIEventShop_Enter1-1 = "老師，歡迎光臨。\n商店街的人準備了各式各樣的東西哦！"
20022-CVGroup_UIEventShop_Enter2-1 = "我還是第一次擔任店員呢。耶嘿嘿。"
20022-CVGroup_UIEventShop_Idle1-1 = "沒關係的唷，用不著擔心。"
20022-CVGroup_UIEventShop_Idle1-2 = "對於倉庫的管理我有一定的自信。"
20022-CVGroup_UIEventShop_Idle2-1 = "咦？供給部的特製料理是嗎……？"
20022-CVGroup_UIEventShop_Idle2-2 = "不介意的話，我來幫你做吧？"
20022-CVGroup_UIEventShop_Buy1-1 = "啊，那個的話請稍等一下。"
20022-CVGroup_UIEventShop_Buy2-1 = "那個是最推薦的商品！"
20022-CVGroup_UIEventShop_Buy3-1 = "那個……好的，是這個對吧？"
20022-CVGroup_UIEventShop_Buy4-1 = "還喜歡嗎？\n請一定要再來哦！"
20022-CVGroup_UIEventShop_Enter3-1 = "慶典和料理大賽都結束了呢。"
20022-CVGroup_UIEventShop_Enter3-2 = "我還要為明天做些準備……\n老師請慢慢來吧。"

[translation]
20022-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20022-CVGroup_CharacterGet_Idle1-1 = "ทานโทชิโคชิโซบะรึยังคะ คุณครู?\nขอให้ทั้งฉันและคุณครูไม่เจอเรื่องวุ่นวายอะไรในปีนี้นะคะ"
20022-CVGroup_Cafe_Idle1-1 = "ในการทำอาหาร การชั่งปริมาณให้ตรงเป็นสิ่งสำคัญมากค่ะ"
20022-CVGroup_Cafe_Idle2-1 = "กิโมโนชุดนี้... สวยจัง"
20022-CVGroup_Cafe_Idle3-1 = "ความฝันแรกในปีใหม่นี้ คือเรื่องอะไรนะ?"
20022-CVGroup_Cafe_Idle4-1 = "ขอให้ปีนี้มีแต่วันที่สงบสุขดำเนินต่อไปด้วยเถอะ..."
20022-CVGroup_Cafe_Idle5-1 = "นั่งพักตรงนี้สักหน่อย... ได้รึเปล่านะ"
20022-CVGroup_WeaponGet_Idle1-1 = "น่าแปลกใช่มั้ยล่ะคะ? แค่คุณครูอยู่ด้วย\nฉันก็รู้สึกเหมือนทำได้ทุกอย่างเลยค่ะ\nปีนี้ ฉันก็จะพยายามค่ะ คอยดูให้ดีนะคะ"
20022-CVGroup_UIEventLobby_Enter1-1 = "สวัสดีค่ะคุณครู!\nขอพรอะไรในวันปีใหม่เหรอคะ?"
20022-CVGroup_UIEventLobby_Enter1-2 = "ฉันก็จะขอพรข้างๆ คุณครูเองค่ะ"
20022-CVGroup_UIEventLobby_Enter2-1 = "ไม่หนาวเหรอคะ?\nทานอาหารร้อนๆ สักหน่อยดีมั้ยคะ?"
20022-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ คุณครู? มีอะไรรึเปล่าคะ?"
20022-CVGroup_UIEventLobby_Idle2-1 = "สกู๊ตเตอร์คันนี้ก็ใช้ในหลายๆ อย่างค่ะ"
20022-CVGroup_UIEventLobby_Idle2-2 = "ถ้าเกิดไม่มีเจ้านี่ละก็... จะทำยังไงนะ?"
20022-CVGroup_UIEventLobby_Idle3-1 = "ฉันอยากลองทำอาหารปีใหม่อย่างอื่น\nนอกจากโอเซจิดูบ้างค่ะ"
20022-CVGroup_UIEventLobby_Idle3-2 = "ค่ะ ถ้ากินหมดนั่นละก็... น้ำหนักคงขึ้นแน่ๆ ค่ะ"
20022-CVGroup_UIEventLobby_Idle4-1 = "อาจไม่ถึงกับเป็นพรวันปีใหม่..."
20022-CVGroup_UIEventLobby_Idle4-2 = "แต่ปีนี้ขอให้ไม่เกิดเรื่องอะไรกับห้องชมรมโภชนาการค่ะ..."
20022-CVGroup_UIEventLobby_Enter3-1 = "ค่ะ... ตั้งแต่นี้ไป...\nฉันจะแสดงฝีมือทำอาหารให้ชมเองค่ะ!"
20022-CVGroup_UIEventLobby_Enter3-2 = "ฉันจะพยายามเต็มที่...\nเพราะงั้นถ้าคุณครูคอยดู... ก็จะขอบคุณมากเลยค่ะ"
20022-CVGroup_UIEventLobby_Enter4-1 = "ไม่รู้ทำไมถึงกลายเป็นเรื่องใหญ่โตไปซะแล้ว\nแต่ว่า... เรื่องที่ฉันทำก็ไม่ได้เปลี่ยนไปค่ะ"
20022-CVGroup_UIEventLobby_Enter4-2 = "ก็แค่ทำให้ดีที่สุดเท่านั้นเองค่ะ"
20022-CVGroup_UIEventLobby_Enter4-3 = "นอกจากนั้น... คุณครูก็อยู่ข้างๆ ด้วย...\nเลยค่อนข้างอุ่นใจค่ะ!"
20022-CVGroup_UIEventLobby_Enter5-1 = "จบลงไปได้ด้วยดีค่อยโล่งใจหน่อยค่ะ"
20022-CVGroup_UIEventLobby_Enter5-2 = "คือว่า... อาหารของฉัน... ถูกปากหรือเปล่าคะ?"
20022-CVGroup_UIEventShop_Enter1-1 = "คุณครู เชิญเลยค่ะ\nคุณพ่อค้าหลายๆ คนช่วยเตรียมของให้น่ะค่ะ"
20022-CVGroup_UIEventShop_Enter2-1 = "นี่เป็นครั้งแรกที่ฉันมาดูแลร้านค้าค่ะ แหะๆๆ"
20022-CVGroup_UIEventShop_Idle1-1 = "ไม่ต้องห่วงนะคะ"
20022-CVGroup_UIEventShop_Idle1-2 = "ถ้าเป็นเรื่องจัดการคลังละก็ ฉันมั่นใจค่ะ"
20022-CVGroup_UIEventShop_Idle2-1 = "คะ? อาหารพิเศษจากชมรมโภชนาการงั้นเหรอคะ?"
20022-CVGroup_UIEventShop_Idle2-2 = "คือว่า... ถ้าไม่ติดอะไรให้ฉันทำให้มั้ยคะ?"
20022-CVGroup_UIEventShop_Buy1-1 = "อ๊ะ ถ้าอย่างนั้น... ช่วยรอสักครู่นะคะ"
20022-CVGroup_UIEventShop_Buy2-1 = "อันนั้นเป็นสินค้าแนะนำเลยนะคะ!"
20022-CVGroup_UIEventShop_Buy3-1 = "อ๊ะ... ค่ะ อันนี้หรือเปล่าคะ?"
20022-CVGroup_UIEventShop_Buy4-1 = "ถูกใจรึเปล่าคะ? แล้วมาอีกนะคะ!"
20022-CVGroup_UIEventShop_Enter3-1 = "ทั้งงานเทศกาล และงานแข่ง\nทำอาหารก็จบลงแล้วค่ะ"
20022-CVGroup_UIEventShop_Enter3-2 = "ฉันยังมีสิ่งที่ต้องเตรียมสำหรับพรุ่งนี้อยู่ค่ะ\nคุณครูค่อยๆ เลือกชมก่อนนะคะ"

[translation]
26015-CVGroup_UITitle_Idle1-1 = "Blue Archive ค่ะ~"
26015-CVGroup_CharacterGet_Idle1-1 = "ท้าดา! ถึงเวลาอิจิกะปรากฏตัวค่ะ~\nไม่คิดเลยว่าจะได้มาทะเลกับคุณครู ชีวิตช่างเต็มไปด้วยเรื่องไม่คาดคิดนะคะ\nอยู่ที่นี่ฉันก็ขอฝากตัวด้วยนะคะ!"
26015-CVGroup_Cafe_Idle1-1 = "อ่า ดีจังเลย... ได้หายใจหายคอบ้างแล้ว~"
26015-CVGroup_Cafe_Idle2-1 = "ทำตัวเวอร์เกินไปหน่อยหรือเปล่านะ..."
26015-CVGroup_Cafe_Idle3-1 = "อืม~ น่าจะต้องหาอะไรทำสักหน่อยนะ..."
26015-CVGroup_Cafe_Idle4-1 = "ว้าว~ ทุกคนดูสดใสกันจังเลยนะคะ~"
26015-CVGroup_Cafe_Idle5-1 = "มีคนมากมายหลายแบบเลยค่ะ~"
26015-CVGroup_WeaponGet_Idle1-1 = "อ่า อืม... ฉันจะพยายามเต็มที่ค่ะ\nถ้าทำไม่ได้เท่าที่คาดหวังก็อย่าว่ากันนะคะ\nก็คนที่ทำให้ฉันจริงจังคือคุณครูนี่คะ"
26015-CVGroup_UIEventLobby_Enter1-1 = "อ่า~ รู้สึกสังหรณ์ใจไม่ค่อยดีเลยค่ะ~"
26015-CVGroup_UIEventLobby_Enter1-2 = "แต่ก็เอาเถอะในเมื่อคุณครูอยู่ด้วย"
26015-CVGroup_UIEventLobby_Enter1-3 = "งั้นก็คงคลี่คลายไปได้ด้วยดีละนะคะ~"
26015-CVGroup_UIEventLobby_Enter2-1 = "ทะเล... ทะเล ไม่คิดเลยนะคะว่าจะได้มาด้วยเหตุผลนี้"
26015-CVGroup_UIEventLobby_Enter2-2 = "เราไม่รู้เลยนะคะว่าชีวิตจะเป็นยังไงบ้าง~"
26015-CVGroup_UIEventLobby_Enter3-1 = "คุณมิกะ..."
26015-CVGroup_UIEventLobby_Enter3-2 = "เป็นคนที่แตกต่างจากที่ฉันคิดไว้เยอะเลยค่ะ"
26015-CVGroup_UIEventLobby_Enter3-3 = "อ้อ ฉันหมายถึงในทางที่ดีนะคะ!"
26015-CVGroup_UIEventLobby_Enter4-1 = "รู้สึกยังไงที่ได้มาทะเลน่ะเหรอคะ?"
26015-CVGroup_UIEventLobby_Enter4-2 = "อืม... จะว่ายังไงดีนะ"
26015-CVGroup_UIEventLobby_Enter4-3 = "ถ้าคิดถึงไม่กี่วันที่ผ่านมานี้\nฉันว่าฉันน่าจะไม่ชอบทะเลค่ะ ฮ่าฮ่า!"
26015-CVGroup_UIEventLobby_Enter5-1 = "ถึงเวลากลับแล้วสินะคะ"
26015-CVGroup_UIEventLobby_Enter5-2 = "โล่งใจแต่ก็เสียดาย..."
26015-CVGroup_UIEventLobby_Enter5-3 = "ซะที่ไหนล่ะคะ..."
26015-CVGroup_UIEventLobby_Enter5-4 = "ในที่สุดก็ได้กลับบ้านแล้ว! งานเสร็จแล้ว!\nฉันรู้สึกแบบนี้ต่างหากค่ะ ฮ่าฮ่า!"
26015-CVGroup_UIEventLobby_Idle1-1 = "เสียงคลื่นซัดสาด เสียงนกนางนวลร้อง กลิ่นเค็มของเกลือ..."
26015-CVGroup_UIEventLobby_Idle1-2 = "รู้สึกเหมือนมาถึงทะเลจริงๆ แล้วนะคะ"
26015-CVGroup_UIEventLobby_Idle2-1 = "ว้าว~ ทุกคนดูตื่นเต้นจังเลยนะคะ"
26015-CVGroup_UIEventLobby_Idle2-2 = "ฉันก็อยากสนุกได้แบบนั้นบ้างจังเลยค่ะ"
26015-CVGroup_UIEventLobby_Idle3-1 = "อ๊ะ คุณครู ที่นี่ไม่มีปัญหาอะไรหรอกค่ะ~"
26015-CVGroup_UIEventLobby_Idle3-2 = "ถึงจะเป็นทะเลแต่การไม่มีปัญหาอะไรมันก็ดีที่สุดค่ะ"
26015-CVGroup_UIEventLobby_Idle4-1 = "เอ่อ คุณครูคะ? อยู่กับฉัน แต่ว่าดูไม่สนุกเท่าไรเลยนะคะ?"
26015-CVGroup_UIEventLobby_Idle4-2 = "ฉันก็... ไม่ได้ไม่ชอบการที่ได้อยู่ด้วยกันหรอกนะคะ"
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "อ๊ะ คุณครู! มาช่วยฉันเหรอคะ?"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "ว้าว~ ฉันกำลังคิดเลยว่าคนเดียวจะไหวมั้ย ขอบคุณมากนะคะ"
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "ฮ่าฮ่า วุ่นวายจังเลยนะคะ~"
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "อ๊ะ คุณครู สวัสดีค่ะ"
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "ขอโทษที่จู่ๆ ก็รบกวนนะคะ\nพอจะช่วยฉันหน่อยได้มั้ยคะ...?"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "คิดเสียว่าช่วยชีวิตคนหนึ่งคนนะคะ!"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "แหะๆ... งานกองเท่าภูเขาเลยนะคะ..."
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "ก็นะ... ถ้าทำไปทีละอย่างๆ\nเดี๋ยวก็คงทำเสร็จใช่มั้ยล่ะคะ?"
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "ฉันเข้าใจ... ความรู้สึกนั้นดี~ เลยค่ะ"
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "พอมีงานค้างเยอะมากๆ คนเราก็ย่อมหลงลืมกันได้ค่ะ..."
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "จัดการได้อีกเรื่องแล้วนะคะ~\nขอบคุณที่ทำงานหนักค่ะ~"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "โอ้ว~ มีเคล็ดลับอะไรดีๆ สินะคะ"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "อ่า... ฉันไม่ได้ประชดนะคะ ฉันพูดเพราะชื่นชมจากใจจริงค่ะ"
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "เฮ้อ เพลียร่างจัง~"
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "อ๊ะ วันนี้คุณครูก็ทำได้ดีมากเลยค่ะ!"

[translation]
26015-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26015-CVGroup_CharacterGet_Idle1-1 = "Ta-da! Guess who? It's Ichika! I never expected to be at the beach with you, but life sure is full of surprises. I'm looking forward to our continued collaboration!"
26015-CVGroup_Cafe_Idle1-1 = "Ah, nice... Finally, a breather..."
26015-CVGroup_Cafe_Idle2-1 = "Am I overdressed...?"
26015-CVGroup_Cafe_Idle3-1 = "Hmm... Maybe I should do something..."
26015-CVGroup_Cafe_Idle4-1 = "Wow... Everyone's really shining..."
26015-CVGroup_Cafe_Idle5-1 = "There are all kinds of people here."
26015-CVGroup_WeaponGet_Idle1-1 = "Oh! Um... I'll do my best to meet your expectations, but don't complain if I fall short, okay? You're the one who's making me lock in, after all."
26015-CVGroup_UIEventLobby_Enter1-1 = "Ah. I'm already getting a bad feeling."
26015-CVGroup_UIEventLobby_Enter1-2 = "But since you're here..."
26015-CVGroup_UIEventLobby_Enter1-3 = "...I'm sure things will work out, one way or another."
26015-CVGroup_UIEventLobby_Enter2-1 = "The beach... I didn't expect I'd come to the beach like this."
26015-CVGroup_UIEventLobby_Enter2-2 = "That's just how life is sometimes!"
26015-CVGroup_UIEventLobby_Enter3-1 = "Mika..."
26015-CVGroup_UIEventLobby_Enter3-2 = "She's not what I expected."
26015-CVGroup_UIEventLobby_Enter3-3 = "Ah! I mean that in a good way."
26015-CVGroup_UIEventLobby_Enter4-1 = "How do I feel about the beach?"
26015-CVGroup_UIEventLobby_Enter4-2 = "Hmm... How should I put this?"
26015-CVGroup_UIEventLobby_Enter4-3 = "If I think about the past few days, I don't think I've had the best impression. Haha!"
26015-CVGroup_UIEventLobby_Enter5-1 = "It's already time to go back."
26015-CVGroup_UIEventLobby_Enter5-2 = "That bittersweet feeling..."
26015-CVGroup_UIEventLobby_Enter5-3 = "...I don't have it at all."
26015-CVGroup_UIEventLobby_Enter5-4 = "But I'm finally going home! Work's over! Is how I feel, haha!"
26015-CVGroup_UIEventLobby_Idle1-1 = "The sound of waves crashing and seagulls crying, and the smell of salt..."
26015-CVGroup_UIEventLobby_Idle1-2 = "This really is the beach."
26015-CVGroup_UIEventLobby_Idle2-1 = "Oh my, everyone's very excited."
26015-CVGroup_UIEventLobby_Idle2-2 = "I wish I could feel the same way."
26015-CVGroup_UIEventLobby_Idle3-1 = "Ah, Sensei. There's not much going on right now."
26015-CVGroup_UIEventLobby_Idle3-2 = "Even at the beach, I'd be happiest if things were uneventful."
26015-CVGroup_UIEventLobby_Idle4-1 = "Um, Sensei? You know staying with me won't be that fun, right?"
26015-CVGroup_UIEventLobby_Idle4-2 = "Although I don't hate...being together."
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "Ah, Sensei! Did you come to help?"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "Oh my, I was a little worried that I wouldn't be able to get it done alone. Thank you!"
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "Haha, what a mess."
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "Ah, Sensei. Hey there."
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "Sorry to pounce on you, but could you lend me a hand?"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "You'd literally be saving my life!"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "Haha... There's so much to do..."
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "Maybe we just have to tackle things one by one, and it'll go faster than we think!"
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "...I know that feeling reaaally well."
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "Once too much work piles up, you kinda just want to ignore it."
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "That's one problem solved! Good work!"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "Ooh, you're quite skilled, aren't you?"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "Ah... I wasn't being sarcastic! I was genuinely impressed."
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "Wow, I'm tired..."
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "Ah, good work today, Sensei!"

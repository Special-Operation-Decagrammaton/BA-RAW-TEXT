[translation]
26015-CVGroup_UITitle_Idle1-1 = "蔚藍檔案的說～"
26015-CVGroup_CharacterGet_Idle1-1 = "鏘鏘！一花登場！\n沒想到能跟老師一起來海邊呢～\n這次也請多指教唷！"
26015-CVGroup_Cafe_Idle1-1 = "呼……終於能喘口氣了呢……"
26015-CVGroup_Cafe_Idle2-1 = "這副打扮……會不會用力過猛呢？"
26015-CVGroup_Cafe_Idle3-1 = "閒著的話……也有點坐立難安呢……"
26015-CVGroup_Cafe_Idle4-1 = "哎呀～大家都閃閃發光呢～"
26015-CVGroup_Cafe_Idle5-1 = "大家都很有個性呢～"
26015-CVGroup_WeaponGet_Idle1-1 = "那個……好吧，我會盡力的。\n就算無法符合期待，也不可以抱怨唷？\n讓我認真起來的人，可是老師你呢。"
26015-CVGroup_UIEventLobby_Enter1-1 = "啊～啊……才剛開始，氣氛就變得有點詭異呢～"
26015-CVGroup_UIEventLobby_Enter1-2 = "算了，總會有辦法的吧？"
26015-CVGroup_UIEventLobby_Enter1-3 = "畢竟老師也在嘛。"
26015-CVGroup_UIEventLobby_Enter2-1 = "沒想到會以這種形式跑到海邊來。"
26015-CVGroup_UIEventLobby_Enter2-2 = "究竟會發生什麼，果然誰也不知道啊～"
26015-CVGroup_UIEventLobby_Enter3-1 = "彌香大人……"
26015-CVGroup_UIEventLobby_Enter3-2 = "總覺得跟想像中有點不一樣呢～"
26015-CVGroup_UIEventLobby_Enter3-3 = "當然，是好的意思唷？"
26015-CVGroup_UIEventLobby_Enter4-1 = "來到海邊的感想是嗎？"
26015-CVGroup_UIEventLobby_Enter4-2 = "這個嘛……"
26015-CVGroup_UIEventLobby_Enter4-3 = "可能已經稍微有點討厭海邊了！啊哈哈！"
26015-CVGroup_UIEventLobby_Enter5-1 = "已經到該回去的時間了嗎。"
26015-CVGroup_UIEventLobby_Enter5-2 = "捨不得的感覺──"
26015-CVGroup_UIEventLobby_Enter5-3 = "──並沒有呢。"
26015-CVGroup_UIEventLobby_Enter5-4 = "啊～！工作結束！\n終於解放了～的感覺！"
26015-CVGroup_UIEventLobby_Idle1-1 = "海浪的聲音，海鷗的鳴叫，還有海潮的氣味……"
26015-CVGroup_UIEventLobby_Idle1-2 = "來到海邊的實感，不斷湧現呢。"
26015-CVGroup_UIEventLobby_Idle2-1 = "哈哈，大家都很興奮呢～"
26015-CVGroup_UIEventLobby_Idle2-2 = "如果我也能像那樣樂在其中就好了。"
26015-CVGroup_UIEventLobby_Idle3-1 = "老師，這裡一切正常～"
26015-CVGroup_UIEventLobby_Idle3-2 = "果然，沒事才是最好的呢。"
26015-CVGroup_UIEventLobby_Idle4-1 = "那個，老師？\n就算跟我在一起，也只會覺得無聊哦？"
26015-CVGroup_UIEventLobby_Idle4-2 = "我的話……能和老師在一起，倒正合我意就是了。"
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "老師！莫非是來幫忙的嗎？"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "哎呀～我正好碰上瓶頸……真是幫大忙了～"
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "哈哈，已經亂成一團了……"
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "啊，老師，你好呀。"
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "抱歉才剛見面就說這些，能請你幫幫我嗎……？"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "就當作是幫助別人吧！"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "唉……要做的事情多到爆炸呢……"
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "算了，光是看著也沒用，做著做著總會結束吧。"
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "……老師的心情，我超～能理解的。"
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "面對堆積如山的工作，總是會想移開視線對吧……"
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "這樣就完成一項了呢～\n辛苦啦～"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "老師還挺精明的呢～"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "啊……剛才那不是諷刺，是真心話哦。"
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "好累哦～"
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "老師今天也要早點休息哦！"

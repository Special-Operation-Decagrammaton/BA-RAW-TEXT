[translation]
26015-CVGroup_UITitle_Idle1-1 = "블루 아카이브임다~"
26015-CVGroup_CharacterGet_Idle1-1 = "짜잔! 이번에야말로, 이치카, 등장임다~\n선생님과 함께 바다까지 올 줄은 몰랐는데, 살다 보니 별일이 다 있네요. 여기서도 잘 부탁드림다!"
26015-CVGroup_Cafe_Idle1-1 = "아, 좋다…… 겨우 한숨 돌렸네~"
26015-CVGroup_Cafe_Idle2-1 = "살짝 과하게 멋부렸나……?"
26015-CVGroup_Cafe_Idle3-1 = "음~뭐라도 해야 하지 않을까……."
26015-CVGroup_Cafe_Idle4-1 = "이야~ 다들 반짝반짝하네요~"
26015-CVGroup_Cafe_Idle5-1 = "다양한 사람들이 있네요~"
26015-CVGroup_WeaponGet_Idle1-1 = "어, 음…… 최선을 다해볼게요.\n기대에 조금 못 미쳐도, 뭐라 하기 없기임다?\n절 진지하게 만든 건 선생님이시니까요."
26015-CVGroup_UIEventLobby_Enter1-1 = "아아~ 벌써 안 좋은 예감이 들지 말임다~"
26015-CVGroup_UIEventLobby_Enter1-2 = "뭐, 그래도 선생님께서 계시니,"
26015-CVGroup_UIEventLobby_Enter1-3 = "여차하면 해결되겠지만요~"
26015-CVGroup_UIEventLobby_Enter2-1 = "바다…… 바다라, 이런 식으로 오게 될 줄은 몰랐는데요."
26015-CVGroup_UIEventLobby_Enter2-2 = "인생 어떻게 되는지 모르는 법이네요~"
26015-CVGroup_UIEventLobby_Enter3-1 = "미카 님……"
26015-CVGroup_UIEventLobby_Enter3-2 = "뭔가 생각했던 거랑, 좀 많이 다른 분이시네요."
26015-CVGroup_UIEventLobby_Enter3-3 = "아, 좋은 의미로 말입니다!"
26015-CVGroup_UIEventLobby_Enter4-1 = "바다에 온 소감 말입니까?"
26015-CVGroup_UIEventLobby_Enter4-2 = "음…… 뭐라고 할까."
26015-CVGroup_UIEventLobby_Enter4-3 = "요 며칠을 생각하면, 좀 싫어진 거 같슴다. 하하!"
26015-CVGroup_UIEventLobby_Enter5-1 = "벌써 돌아갈 때네요."
26015-CVGroup_UIEventLobby_Enter5-2 = "어쩐지 시원섭섭……"
26015-CVGroup_UIEventLobby_Enter5-3 = "……하지는 않고요."
26015-CVGroup_UIEventLobby_Enter5-4 = "드디어 집에 간다! 일 끝났다! 라는 느낌임다, 하하!"
26015-CVGroup_UIEventLobby_Idle1-1 = "파도치는 소리, 갈매기 울음소리, 소금 냄새…"
26015-CVGroup_UIEventLobby_Idle1-2 = "바다에 왔다는 실감이 들긴 하네요."
26015-CVGroup_UIEventLobby_Idle2-1 = "이야~ 다들 되게 신나 있네요~"
26015-CVGroup_UIEventLobby_Idle2-2 = "저도 저렇게 즐길 수 있으면 좋겠는데 말이죠."
26015-CVGroup_UIEventLobby_Idle3-1 = "아, 선생님. 여기는 별일 없슴다~"
26015-CVGroup_UIEventLobby_Idle3-2 = "바다라고 해도, 별일 없는 게 최고지 말임다."
26015-CVGroup_UIEventLobby_Idle4-1 = "저, 선생님? 저하고 있어도, 별로 즐겁지는 않을 검다?"
26015-CVGroup_UIEventLobby_Idle4-2 = "함께 있는 게, 저는…… 싫지 않지만."
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "아, 선생님! 도와주러 오셨습니까?"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "이야~ 혼자서 어떻게 하나 했는데, 진짜 감사합니다."
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "하하, 난장판이네요~"
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "아, 선생님. 안녕하심까."
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "바로 부탁드려서 죄송하지만, 좀 도와주실 수 있을까요……?"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "사람 하나 살린다 생각하고요!"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "하하…… 일이 산더미네요……."
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "뭐, 그래도 하나씩 하다 보면 의외로 금방 해결되지 않을까요?"
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "……그 마음, 자~알 알고 있습니다."
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "일이 너무 쌓여 있으면, 그냥 외면하게 되죠……."
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "이걸로 한 건 해결이네요~ 수고하셨지 말임다~"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "오오~ 되게 요령 좋으시네요?"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "아…… 비꼬는 게 아니라, 진심으로 감탄해서 하는 말임다."
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "이야, 고되다~"
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "아, 선생님도, 오늘 하루 수고 많으셨지 말임다!"

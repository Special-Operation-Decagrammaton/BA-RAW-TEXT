[translation]
26010-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
26010-CVGroup_CharacterGet_Idle1-1 = "R...RABBIT 4 เตรียมพร้อมแล้วค่ะ\nชะ...ชุดแบบนี้ไม่เป็นไรจริงๆ ใช่มั้ยคะ...?"
26010-CVGroup_Cafe_Idle1-1 = "มีคนใส่ชุดน่ารักๆ... เต็มไปหมดเลย..."
26010-CVGroup_Cafe_Idle2-1 = "ฮะ...ฮือ..."
26010-CVGroup_Cafe_Idle3-1 = "ถึงฉันจะใส่ชุดว่ายน้ำแล้ว... แต่ก็ไม่มีใครมองเห็น..."
26010-CVGroup_Cafe_Idle4-1 = "(พูดเรื่องอะไรอยู่นะ...?)"
26010-CVGroup_Cafe_Idle5-1 = "ทะ...ทุกคนหายไปไหนกันหมดน่ะ...?"
26010-CVGroup_WeaponGet_Idle1-1 = "ได้รับ RABBIT Type 39 Rifle... แล้วค่ะ ที่ทะเลลมแรง\nและมีความชื้นสูง... ละ...และมีเรื่องยากๆ หลายอย่างก็จริง\nแต่ถ้าเป็นในระยะ 1 กิโลเมตรละก็... ยังไงก็ไม่มีปัญหาค่ะ..."
26010-CVGroup_UIEventLobby_Enter1-1 = "งื้อ... ดูเหมือนหมู่บ้านชาวประมงที่อยู่ในนิยายสยองขวัญเลย..."
26010-CVGroup_UIEventLobby_Enter2-1 = "อยากกลับไปโรงเรียนเร็วๆ จัง..."
26010-CVGroup_UIEventLobby_Enter2-2 = "ไม่สิ... โรงเรียนของเราไม่เหลืออยู่อีกแล้วนี่คะ..."
26010-CVGroup_UIEventLobby_Enter3-1 = "ชาวเมืองทุกคนที่นี่... น่ากลัวมากๆ...\nพอลองพูดคุยด้วยเพื่อจะสืบข้อมูล..."
26010-CVGroup_UIEventLobby_Enter3-2 = "กะ...ก็รู้สึกอยากหนีไปจากที่นี่เลยค่ะ..."
26010-CVGroup_UIEventLobby_Enter4-1 = "เมื่อกี้ได้กาแฟอุ่นๆ แก้วหนึ่งมาจากไต้ก๋งเรือด้วยค่ะ"
26010-CVGroup_UIEventLobby_Enter4-2 = "พอมาคิดๆ ดูแล้ว... อาจจะไม่ได้เป็นคนน่ากลัวแบบนั้นก็ได้..."
26010-CVGroup_UIEventLobby_Enter5-1 = "ดูเหมือนว่าจะค่อยๆ... ผูกพันกับหมู่บ้านนี้ขึ้นมาทีละนิดๆ แล้วละค่ะ"
26010-CVGroup_UIEventLobby_Enter5-2 = "...แต่ถึงยังไง สำหรับฉัน โคะอุซางิ การ์เด้น\nก็ยังคงเป็นสถานที่ที่รู้สึกอุ่นใจที่สุดค่ะ"
26010-CVGroup_UIEventLobby_Idle1-1 = "มะ... ไม่ทราบว่า ระ...เรียกฉันเหรอคะ...?"
26010-CVGroup_UIEventLobby_Idle2-1 = "(ทำไมถึงมาที่หมู่บ้านที่อยู่ห่างไกลแบบนี้ได้กันนะ......)"
26010-CVGroup_UIEventLobby_Idle3-1 = "ผมทรงนี้... มิยาโกะจังถักให้ก่อนที่จะออกมาปฏิบัติการค่ะ"
26010-CVGroup_UIEventLobby_Idle3-2 = "ฮิฮิ... แบบนี้... ก็อาจจะดูน่ารักก็ได้..."
26010-CVGroup_UIEventLobby_Idle4-1 = "ทั้งนกกระจาบ ทั้งเพียงพอน... แล้วก็นกนางนวล..."
26010-CVGroup_UIEventLobby_Idle4-2 = "ทำไมพวกสัตว์ป่าถึงชอบเข้าหาฉันอยู่เรื่อยเลยนะคะ...?"
26010-CVGroup_UIEventShop_Enter1-1 = "คือว่าถ้าเจอก้อนหินหรือเปลือกหอย\nสวยๆ ก็ช่วยเก็บมาให้ฉันด้วยนะคะ"
26010-CVGroup_UIEventShop_Enter2-1 = "อ๊ะ คุณครูสนใจมาช่วยฉัน... เก็บก้อนกรวดมั้ยคะ?"
26010-CVGroup_UIEventShop_Enter3-1 = "ดูเหมือนใกล้ถึงเวลาที่จะต้องกลับแล้ว..."
26010-CVGroup_UIEventShop_Enter3-2 = "แต่ว่าหลังจากนี้... ไว้มารวบรวมก้อนกรวดด้วยกันอีกนะคะ"
26010-CVGroup_UIEventShop_Idle1-1 = "เอ๊ะ คะ...คือว่า..."
26010-CVGroup_UIEventShop_Idle1-2 = "ถึงตัวตนของฉันจะจืดจางเหมือนกับพวกก้อนกรวดก็จริง..."
26010-CVGroup_UIEventShop_Idle2-1 = "ถึงจะลูบๆ แบบนั้นแต่ยังไงตัวตนของฉันก็ไม่หายจืดจางหรอกค่ะ..."
26010-CVGroup_UIEventShop_Buy1-1 = "ก้อนกรวดพวกนี้... สวยมากๆ เลยค่ะ...!"
26010-CVGroup_UIEventShop_Buy2-1 = "ขอโทษด้วยนะคะ... ที่ฉันมอบให้ได้แค่เท่านี้..."
26010-CVGroup_UIEventShop_Buy3-1 = "สีขาว... เป็นประกายแวววาว"
26010-CVGroup_UIEventShop_Buy4-1 = "ถึงมันอาจจะดูไม่น่ารักเท่าไร แต่ก็ช่วยรับมันไปได้รึเปล่าคะ...?"

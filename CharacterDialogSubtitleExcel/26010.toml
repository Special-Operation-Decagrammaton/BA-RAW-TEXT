[translation]
26010-CVGroup_UITitle_Idle1-1 = "蔚藍……檔，檔案……"
26010-CVGroup_CharacterGet_Idle1-1 = "R……RABBIT4，準備完畢。\n真的……可以穿成這樣嗎……？"
26010-CVGroup_Cafe_Idle1-1 = "穿著漂亮的人有好多……"
26010-CVGroup_Cafe_Idle2-1 = "唔，唔唔唔唔……"
26010-CVGroup_Cafe_Idle3-1 = "就算穿著泳裝……\n也不會被人注意到……"
26010-CVGroup_Cafe_Idle4-1 = "（究竟在聊些什麼呢……？）"
26010-CVGroup_Cafe_Idle5-1 = "大家……\n跑去哪裡了……？"
26010-CVGroup_WeaponGet_Idle1-1 = "RABBIT39式步槍……領，領取完畢。\n在海邊狙擊不僅風大，濕氣也很強……\n所以會有點困難……不過，在1km以內的話……\n應該還是辦得到……"
26010-CVGroup_UIEventLobby_Enter1-1 = "噫噫……簡直就像恐怖小說裡會出現的漁村一樣……"
26010-CVGroup_UIEventLobby_Enter2-1 = "好想趕快回學園去……"
26010-CVGroup_UIEventLobby_Enter2-2 = "啊，可是我們的學園已經……"
26010-CVGroup_UIEventLobby_Enter3-1 = "這裡的居民好可怕……\n每次為了調查跟他們搭話的時候……"
26010-CVGroup_UIEventLobby_Enter3-2 = "我，我都會忍不住想逃跑……"
26010-CVGroup_UIEventLobby_Enter4-1 = "剛才船長給了我一杯熱咖啡。"
26010-CVGroup_UIEventLobby_Enter4-2 = "說不定……他沒有我想得那麼可怕……"
26010-CVGroup_UIEventLobby_Enter5-1 = "對這個村子，我也稍微湧現了一些感情。"
26010-CVGroup_UIEventLobby_Enter5-2 = "……不過果然對我來說，兔寶寶公園才是最能安心的地方。"
26010-CVGroup_UIEventLobby_Idle1-1 = "難，難，難道你找我嗎……？"
26010-CVGroup_UIEventLobby_Idle2-1 = "（為什麼會跑到這種偏僻的村莊呢……）"
26010-CVGroup_UIEventLobby_Idle3-1 = "這個髮型，是都子醬在作戰出發前幫我綁的。"
26010-CVGroup_UIEventLobby_Idle3-2 = "呵呵……這個髮型，好像有點可愛……"
26010-CVGroup_UIEventLobby_Idle4-1 = "從麻雀、黃鼠狼到海鷗……"
26010-CVGroup_UIEventLobby_Idle4-2 = "野生的動物們跑到我身邊的理由究竟是什麼呢……"
26010-CVGroup_UIEventShop_Enter1-1 = "那個……有找到漂亮的石頭或貝殼的話，請帶回來給我。"
26010-CVGroup_UIEventShop_Enter2-1 = "啊，老師。\n要不要和我一起……收集小石頭呢？"
26010-CVGroup_UIEventShop_Enter3-1 = "差不多到該回去的時間了……"
26010-CVGroup_UIEventShop_Enter3-2 = "回去之後……還請再陪我一起收集小石頭哦。"
26010-CVGroup_UIEventShop_Idle1-1 = "咦，啊，那個……"
26010-CVGroup_UIEventShop_Idle1-2 = "雖然我知道我的存在感跟小石頭一樣薄弱……"
26010-CVGroup_UIEventShop_Idle2-1 = "不過就算老師那樣摸……\n我想存在感也不會因此增加的哦……？"
26010-CVGroup_UIEventShop_Buy1-1 = "這顆小石頭……真的很漂亮呢……！"
26010-CVGroup_UIEventShop_Buy2-1 = "對不起……我只有這種東西……"
26010-CVGroup_UIEventShop_Buy3-1 = "白白的……還會閃閃發亮……"
26010-CVGroup_UIEventShop_Buy4-1 = "雖然沒什麼特別的，即便如此……\n你也願意收下嗎……？"

[translation]
26010-CVGroup_UITitle_Idle1-1 = "Blue... A-Archive..."
26010-CVGroup_CharacterGet_Idle1-1 = "R-RABBIT 4, reporting for duty. Should I...really be dressed like this...?"
26010-CVGroup_Cafe_Idle1-1 = "Everyone's wearing these amazing outfits..."
26010-CVGroup_Cafe_Idle2-1 = "U-Ugh..."
26010-CVGroup_Cafe_Idle3-1 = "Even though I'm wearing a s-swimsuit...no one is noticing me."
26010-CVGroup_Cafe_Idle4-1 = "(I wonder what they're talking about...)"
26010-CVGroup_Cafe_Idle5-1 = "Wh-Where did everyone g-go?"
26010-CVGroup_WeaponGet_Idle1-1 = "RABBIT Type 39 Rifle, a-acquired. Sniping on the ocean has m-many difficulties due to the w-wind and waves. But if it's within 1 km... I-I can do it..."
26010-CVGroup_UIEventLobby_Enter1-1 = "Eek... I-It's just like a fishing village from a h-horror story..."
26010-CVGroup_UIEventLobby_Enter2-1 = "I-I just w-wanna go back to th-the school..."
26010-CVGroup_UIEventLobby_Enter2-2 = "Oh, w-wait... I don't have a school t-to go back to..."
26010-CVGroup_UIEventLobby_Enter3-1 = "The residents here are so s-scary...! I-I talked to them for the investigation..."
26010-CVGroup_UIEventLobby_Enter3-2 = "I-I just wanna run away..."
26010-CVGroup_UIEventLobby_Enter4-1 = "The c-captain gave me some warm coffee earlier."
26010-CVGroup_UIEventLobby_Enter4-2 = "Maybe he's not as scary as I thought..."
26010-CVGroup_UIEventLobby_Enter5-1 = "I think I'm starting to develop a f-fondness for this town."
26010-CVGroup_UIEventLobby_Enter5-2 = "But still, Kousagi Park is where I feel most safe."
26010-CVGroup_UIEventLobby_Idle1-1 = "D-Did you call me, by any chance...?"
26010-CVGroup_UIEventLobby_Idle2-1 = "(How did we end up in such a remote village...?)"
26010-CVGroup_UIEventLobby_Idle3-1 = "Miyako braided my hair b-before we came on this mission."
26010-CVGroup_UIEventLobby_Idle3-2 = "Heehee... This could be cute..."
26010-CVGroup_UIEventLobby_Idle4-1 = "Sparrows, weasels, seagulls..."
26010-CVGroup_UIEventLobby_Idle4-2 = "Wh-Why do wild animals keep c-coming to me...?"
26010-CVGroup_UIEventShop_Enter1-1 = "If...you happen to find any p-pretty rocks or shells, p-please bring them to me."
26010-CVGroup_UIEventShop_Enter2-1 = "Sensei, will you c-collect pebbles? ...With m-me?"
26010-CVGroup_UIEventShop_Enter3-1 = "We should s-start heading back, but..."
26010-CVGroup_UIEventShop_Enter3-2 = "C-Can we collect pebbles t-together again?"
26010-CVGroup_UIEventShop_Idle1-1 = "Um, so does that mean..."
26010-CVGroup_UIEventShop_Idle1-2 = "I-I slip completely under everyone's notice...just like the p-pebbles..."
26010-CVGroup_UIEventShop_Idle2-1 = "Even touching me like that...w-won't help me stand out more..."
26010-CVGroup_UIEventShop_Buy1-1 = "This pebble is really pretty...!"
26010-CVGroup_UIEventShop_Buy2-1 = "I'm sorry... This is all I have to give you..."
26010-CVGroup_UIEventShop_Buy3-1 = "It's white...and shiny..."
26010-CVGroup_UIEventShop_Buy4-1 = "It's not much but...w-will you accept this...?"

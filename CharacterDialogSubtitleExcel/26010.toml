[translation]
26010-CVGroup_UITitle_Idle1-1 = "블루……아, 아카이브……."
26010-CVGroup_CharacterGet_Idle1-1 = "R…… RABBIT 4, 준비 완료했습니다.\n정말…… 이런 차림으로도 괜찮은가요……?"
26010-CVGroup_Cafe_Idle1-1 = "멋진 옷을 입은 사람들이 잔뜩……"
26010-CVGroup_Cafe_Idle2-1 = "우, 우으으으……."
26010-CVGroup_Cafe_Idle3-1 = "수영복 차림인데도…… 아무도 신경쓰질 않아……"
26010-CVGroup_Cafe_Idle4-1 = "(무슨 이야기를 하고 있는 걸까……?)"
26010-CVGroup_Cafe_Idle5-1 = "다들 어디에 간 거야……?"
26010-CVGroup_WeaponGet_Idle1-1 = "RABBIT 39식 소총…… 수, 수령했습니다.\n바닷가에서의 저격은 바람도 세고, 습기도 많아서……여러모로 어려운 점이 많지만……\n그래도 1km까지라면…… 어떻게든 될 것 같아요……"
26010-CVGroup_UIEventLobby_Enter1-1 = "히이…… 공포 소설 속에 나오는 어촌 마을 같아……"
26010-CVGroup_UIEventLobby_Enter2-1 = "빨리 학교로 돌아가고 싶어……"
26010-CVGroup_UIEventLobby_Enter2-2 = "아니, 저희 학교는 이미 없어졌었죠……"
26010-CVGroup_UIEventLobby_Enter3-1 = "이곳의 주민 여러분은 너무 무서워서…… 조사를 위해 이야기를 하다보면……"
26010-CVGroup_UIEventLobby_Enter3-2 = "도, 도망치고 싶어져요……"
26010-CVGroup_UIEventLobby_Enter4-1 = "아까 선장님께 따듯한 커피를 받았어요."
26010-CVGroup_UIEventLobby_Enter4-2 = "생각보다…… 그렇게 무서운 분은 아니실지도……"
26010-CVGroup_UIEventLobby_Enter5-1 = "이 마을도 보다 보니 조금은 정이 든 것 같네요."
26010-CVGroup_UIEventLobby_Enter5-2 = "……그래도 역시 제게는 코우사기 공원이 제일 안심되는 장소지만요."
26010-CVGroup_UIEventLobby_Idle1-1 = "호, 호, 혹시 부르셨나요……?"
26010-CVGroup_UIEventLobby_Idle2-1 = "(어쩌다가 이런 외진 마을까지 오게 되어버린 걸까……)"
26010-CVGroup_UIEventLobby_Idle3-1 = "이 머리는 작전을 나오기 직전에 미야코 쨩이 땋아줬어요."
26010-CVGroup_UIEventLobby_Idle3-2 = "후후…… 이거, 귀여울지도……"
26010-CVGroup_UIEventLobby_Idle4-1 = "참새도, 족제비도, 갈매기도……"
26010-CVGroup_UIEventLobby_Idle4-2 = "야생 동물들은 어째서 제게 계속 다가오는 걸까요……?"
26010-CVGroup_UIEventShop_Enter1-1 = "혹시…… 예쁜 돌이나 조개를 찾으셨다면 제게 가져다주세요."
26010-CVGroup_UIEventShop_Enter2-1 = "아, 선생님. 저와 함께 조약돌 수집…… 하지 않으시겠어요?"
26010-CVGroup_UIEventShop_Enter3-1 = "슬슬 돌아가야 할 시간인 것 같지만……"
26010-CVGroup_UIEventShop_Enter3-2 = "앞으로도 종종…… 조약돌 수집, 같이 해 주세요."
26010-CVGroup_UIEventShop_Idle1-1 = "에, 그, 그러니까……"
26010-CVGroup_UIEventShop_Idle1-2 = "물론 제가 조약돌처럼 존재감이 없기는 하지만……"
26010-CVGroup_UIEventShop_Idle2-1 = "그렇게 만져주셔도…… 제 존재감이 강해지지는 않을 걸요……"
26010-CVGroup_UIEventShop_Buy1-1 = "이 조약돌…… 정말 예쁘네요……!"
26010-CVGroup_UIEventShop_Buy2-1 = "죄송합니다…… 이 정도밖에 드릴 수 없어서……"
26010-CVGroup_UIEventShop_Buy3-1 = "하얗고…… 반짝거려……"
26010-CVGroup_UIEventShop_Buy4-1 = "변변치 않지만, 이거라도…… 받아주시겠어요……?"

[translation]
26000-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26000-CVGroup_CharacterGet_Idle1-1 = "ถ้าคุณกลัวความลำบาก ถ้าคุณกลัวความเลวร้าย\nฉันจะร่วมฝ่าฟันไปกับคุณเองค่ะ"
26000-CVGroup_Cafe_Idle1-1 = "คงจะต้องไปซื้อยา มาเก็บไว้เพิ่มแล้วละ"
26000-CVGroup_Cafe_Idle2-1 = "อืม... ก็... ไม่เลวเลยค่ะ"
26000-CVGroup_Cafe_Idle3-1 = "ดูสบายๆ ดีนะคะ"
26000-CVGroup_Cafe_Idle4-1 = "สุขอนามัยของที่นี่... ดูดีเลยนะคะ"
26000-CVGroup_Cafe_Idle5-1 = "อุณหภูมิร่างกายปกติ ชีพจรก็ปกติ\nอืม... แข็งแรงดีนะคะ"
26000-CVGroup_WeaponGet_Idle1-1 = "เรื่องที่เราจะต้องแข็งแกร่งขึ้น เพื่อที่จะรักษาคนให้ได้เยอะขึ้น\nเหมือนเรื่องตลกที่ขำไม่ออกเลยนะคะ\nแต่ถ้าเป็นเรื่องที่ฉันทำได้... ฉันจะพยายามให้ถึงที่สุดค่ะ"

[translation]
26000-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
26000-CVGroup_CharacterGet_Idle1-1 = "害怕試煉的時候，以及快要輸給苦難的時候，我會跟你一起面對的。"
26000-CVGroup_Cafe_Idle1-1 = "差不多得確保藥品才行了。"
26000-CVGroup_Cafe_Idle2-1 = "呼姆。嘛，還算不錯。"
26000-CVGroup_Cafe_Idle3-1 = "待起來真舒服呢。"
26000-CVGroup_Cafe_Idle4-1 = "這裡的衛生狀態…\n真了不起呢。"
26000-CVGroup_Cafe_Idle5-1 = "體溫正常、脈搏正常。\n呼姆。沒有問題呢。"
26000-CVGroup_WeaponGet_Idle1-1 = "為了治療更多人就需要更多力量，這種現實就像讓人笑不出來的笑話一樣呢。\n儘管如此，只要是我能力所及……我都會全力以赴。"

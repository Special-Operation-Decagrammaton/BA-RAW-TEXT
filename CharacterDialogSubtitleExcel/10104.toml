10104-CVGroup_UIEventLobby_Idle2-3 = "แต่ถ้าทำเยอะเกินไป ฉันจะลำบากนะคะเอาแต่พอดีเถอะค่ะ"
10104-CVGroup_UIEventLobby_Idle3-1 = "มีเรื่องอะไรเหรอคะคุณครู?"

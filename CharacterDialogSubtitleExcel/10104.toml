10104-CVGroup_UIEventLobby_Idle3-3 = "ถ้าเรียกร้องความสนใจหลายๆ ครั้งแบบนี้\nระวังต่อไปไม่มีใครเชื่อนะคะ"
10104-CVGroup_UIEventLobby_Idle3-4 = "แม้ว่าฉันจะเชื่อใจคุณครูอยู่เสมอก็เถอะค่ะ..."
10104-CVGroup_UIEventLobby_Idle4-1 = "ฉะ... ฉันไม่ค่อยบ้าจี้น่ะค่ะ"
10104-CVGroup_UIEventLobby_Idle4-2 = "จะ... จริงนะคะ ทำไปก็ไม่มีประโยชน์หรอกค่ะ\nเพราะงั้น หยุดนะ...!"
10104-CVGroup_UIEventLobby_Idle4-3 = "อะฮ่าฮ่าฮ่าฮ่า!"

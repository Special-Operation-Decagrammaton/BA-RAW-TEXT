10104-CVGroup_Cafe_Idle1-1 = "การจัดการโลจิสติกส์ของที่นี่เป็นยังไงบ้างนะคะ..."
10104-CVGroup_Cafe_Idle2-1 = "ได้เรียนรู้ความแตกต่างของที่นี่กับย่านการค้าเทพเต่าดำเลยนะคะ"
10104-CVGroup_Cafe_Idle3-1 = "ลองสำรวจตลาดดูดีมั้ยนะ"
10104-CVGroup_Cafe_Idle4-1 = "(ถ้าจะบุกเบิกการตลาดของย่านการค้าเทพเต่าดำที่นี่ละก็...)"
10104-CVGroup_Cafe_Idle5-1 = "มีที่ตรงไหนที่ยืดเหยียดร่างกายได้บ้างมั้ยนะ..."
10104-CVGroup_WeaponGet_Idle1-1 = "คนมักพูดกันว่าใช้ปืนกับกระสุนแก้ปัญหาได้...\nแต่ถ้าเพื่อคุณครูที่คอยสนับสนุนฉันอยู่ละก็!\nฉันจะผสานการใช้ปืนกับหมัด... ให้ได้ในสักวันหนึ่งค่ะ!"
10104-CVGroup_UIEventLobby_Enter1-1 = "เชิญเลยค่ะ คุณครู ใกล้จะเปิดเทศกาลเงาจันทร์แล้วค่ะ"
10104-CVGroup_UIEventLobby_Enter2-1 = "ขอบคุณที่มานะคะ"

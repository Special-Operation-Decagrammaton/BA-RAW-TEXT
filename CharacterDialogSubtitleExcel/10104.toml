[translation]
10104-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10104-CVGroup_CharacterGet_Idle1-1 = "我是山海經高級中學，擔任玄武商會總店經理兼護衛的鹿山令女。\n再次請您多多指教。老師。"
10104-CVGroup_Cafe_Idle1-1 = "這裡的物流管理，是如何運作的呢……"
10104-CVGroup_Cafe_Idle2-1 = "與玄武商會之間的差異值得學習。"
10104-CVGroup_Cafe_Idle3-1 = "做個市場調查吧。"
10104-CVGroup_Cafe_Idle4-1 = "（如果想在這裡擴張玄武商會的通路……）"
10104-CVGroup_Cafe_Idle5-1 = "能伸展的地方，雖然很想確保……"
10104-CVGroup_WeaponGet_Idle1-1 = "大多數的事情都能用槍和火藥來解決，但話雖如此……為了在背後鼓勵我的老師！\n槍與拳的融合……我總有一天會實現的！"
10104-CVGroup_UIEventLobby_Enter1-1 = "歡迎您，老師。\n不久後，月影祭即將舉行。"
10104-CVGroup_UIEventLobby_Enter2-1 = "感謝您的光臨。"
10104-CVGroup_UIEventLobby_Enter2-2 = "山海經自豪的月影祭，還請您盡情享受。"
10104-CVGroup_UIEventLobby_Enter3-1 = "雖然是意料之外的情況……"
10104-CVGroup_UIEventLobby_Enter3-2 = "對玄龍門、玄武商會，以及山海經來說……"
10104-CVGroup_UIEventLobby_Enter3-3 = "老師的存在是非常大的鼓勵。"
10104-CVGroup_UIEventLobby_Enter4-1 = "我們順利舉辦了月影祭。"
10104-CVGroup_UIEventLobby_Enter4-2 = "……那場騷動，就暫且不去理會吧。"
10104-CVGroup_UIEventLobby_Enter5-1 = "您覺得祭典如何呢？"
10104-CVGroup_UIEventLobby_Enter5-2 = "山海經和玄武商會，隨時等候著老師的光臨。"
10104-CVGroup_UIEventLobby_Idle1-1 = "月影祭正是玄武商會展示實力的時候。"
10104-CVGroup_UIEventLobby_Idle1-2 = "請老師慢慢享受。"
10104-CVGroup_UIEventLobby_Idle2-1 = "……面對惡作劇，我會用肢體語言回應哦。"
10104-CVGroup_UIEventLobby_Idle2-2 = "開玩笑的，老師。\n惡作劇的話，請您自便。"
10104-CVGroup_UIEventLobby_Idle2-3 = "……但太頻繁的話會讓我有點困擾。還請適可而止。"
10104-CVGroup_UIEventLobby_Idle3-1 = "有什麼事嗎，老師？"
10104-CVGroup_UIEventLobby_Idle3-2 = "……咦？只是叫叫看而已……？"
10104-CVGroup_UIEventLobby_Idle3-3 = "……一直這樣引起注意的話，遲早會沒人相信您的哦？"
10104-CVGroup_UIEventLobby_Idle3-4 = "……雖然我會一直相信老師就是了。"
10104-CVGroup_UIEventLobby_Idle4-1 = "我，我是被搔癢也不受影響的體質。"
10104-CVGroup_UIEventLobby_Idle4-2 = "是，是真的。就算試也沒用的，所以，請您……！"
10104-CVGroup_UIEventLobby_Idle4-3 = "啊，啊哈哈哈哈！"
10104-CVGroup_UIEventLobby_Idle4-4 = "……真是的，就說請您住手了。"
10104-CVGroup_UIEventShop_Enter1-1 = "我算是擅長看店的人。"
10104-CVGroup_UIEventShop_Enter1-2 = "那麼……您今天要找什麼呢？"
10104-CVGroup_UIEventShop_Enter2-1 = "只要您開口，無論何處，玄武商會都會趕到。"
10104-CVGroup_UIEventShop_Enter2-2 = "……有朝一日，就算是奇普托斯的盡頭也一樣！"
10104-CVGroup_UIEventShop_Enter3-1 = "有沒有漏買什麼？"
10104-CVGroup_UIEventShop_Enter3-2 = "為了避免留下遺憾，還請慢慢欣賞到最後。"
10104-CVGroup_UIEventShop_Idle1-1 = "玄武商會的珍藏品？隱藏菜單……？"
10104-CVGroup_UIEventShop_Idle1-2 = "呃……沒有那種東西……"
10104-CVGroup_UIEventShop_Idle1-3 = "就算您露出那種表情也……"
10104-CVGroup_UIEventShop_Idle2-1 = "如果有缺少的東西，還請跟我說一聲。"
10104-CVGroup_UIEventShop_Idle2-2 = "……但如果是已經賣完的商品就沒辦法了。"
10104-CVGroup_UIEventShop_Buy1-1 = "來，是我推薦的商品。"
10104-CVGroup_UIEventShop_Buy2-1 = "這是要自用的嗎？還是送禮用的呢？"
10104-CVGroup_UIEventShop_Buy3-1 = "感謝您的惠顧！"
10104-CVGroup_UIEventShop_Buy3-2 = "……明明是經常說的話，對老師說總覺得很新鮮呢。"
10104-CVGroup_UIEventShop_Buy4-1 = "會長曾經說過──"
10104-CVGroup_UIEventShop_Buy4-2 = "如果無償獲得了某些東西，那麼那同時也代表自己成為了商品的意思。"
10104-CVGroup_UIEventShop_Buy4-3 = "不過如果老師是商品的話……"
10104-CVGroup_UIEventShop_Buy4-4 = "啊，不，沒什麼。"

10104-CVGroup_UIEventShop_Idle1-1 = "ของลึกลับของย่านการค้าเทพเต่าดำ? เมนูที่ซ่อนอยู่...?"
10104-CVGroup_UIEventShop_Idle1-2 = "อืม... ไม่มีของแบบนั้นหรอกค่ะ..."

[translation]
10104-CVGroup_UITitle_Idle1-1 = "블루 아카이브, 이군요."
10104-CVGroup_CharacterGet_Idle1-1 = "산해경 고급 중학교, 현무상회 본점의 매니저 겸 호위의 카야마 레이죠입니다.\n다시 한번 잘 부탁드리겠습니다. 선생님."
10104-CVGroup_Cafe_Idle1-1 = "이곳의 물류 관리는, 어떻게 이루어지고 있을까요……"
10104-CVGroup_Cafe_Idle2-1 = "현무상회와의 차이점, 공부가 되네요."
10104-CVGroup_Cafe_Idle3-1 = "시장 조사 같은 것이라도 해 볼까요."
10104-CVGroup_Cafe_Idle4-1 = "(이곳에 현무상회의 판로를 개척하려면……)"
10104-CVGroup_Cafe_Idle5-1 = "어딘가, 스트레칭이라도 할 장소는 없으려나……"
10104-CVGroup_WeaponGet_Idle1-1 = "대부분은 총과 화약으로 해결할 수 있다, 라고 하지만…….\n제 등을 밀어주신 선생님을 위해서라도!\n총과 주먹의 조화를……언젠가 이뤄내겠습니다!"
10104-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님. 곧 월영제가 개최됩니다."
10104-CVGroup_UIEventLobby_Enter2-1 = "와 주셔서 감사합니다."
10104-CVGroup_UIEventLobby_Enter2-2 = "산해경이 자랑하는 월영제를 즐겨 주세요."
10104-CVGroup_UIEventLobby_Enter3-1 = "예상외의 상황입니다만…"
10104-CVGroup_UIEventLobby_Enter3-2 = "현룡문, 현무상회, 그리고 산해경에 있어서…"
10104-CVGroup_UIEventLobby_Enter3-3 = "선생님의 존재는 매우 격려가 됩니다."
10104-CVGroup_UIEventLobby_Enter4-1 = "무사히 월영제를 개최할 수 있었네요."
10104-CVGroup_UIEventLobby_Enter4-2 = "…그 소동은, 일단, 신경 쓰지 말기로 하죠.."
10104-CVGroup_UIEventLobby_Enter5-1 = "축제는 어떠셨나요?"
10104-CVGroup_UIEventLobby_Enter5-2 = "산해경과 현무상회는, 언제든지 선생님의 방문을 기다리고 있습니다."
10104-CVGroup_UIEventLobby_Idle1-1 = "월영제야말로 현무상회의 솜씨를 보여줄 때입니다."
10104-CVGroup_UIEventLobby_Idle1-2 = "선생님은 쉬고 계시죠."
10104-CVGroup_UIEventLobby_Idle2-1 = "…장난에는 육체 언어로 보답할 겁니다."
10104-CVGroup_UIEventLobby_Idle2-2 = "농담이에요, 선생님. 장난이라면, 얼마든지."
10104-CVGroup_UIEventLobby_Idle2-3 = "…너무 자주 하면 곤란하니까요. 적당히 해주세요."
10104-CVGroup_UIEventLobby_Idle3-1 = "무슨 일이시죠, 선생님?"
10104-CVGroup_UIEventLobby_Idle3-2 = "…네? 그냥 불러본 거 뿐이라고요…?"
10104-CVGroup_UIEventLobby_Idle3-3 = "…몇 번이고 그렇게 주의를 끈다면, 언젠가, 아무도 믿지 않게 될걸요?"
10104-CVGroup_UIEventLobby_Idle3-4 = "…저는 언제까지나, 선생님을 믿습니다만."
10104-CVGroup_UIEventLobby_Idle4-1 = "저, 저는 간지럼 안 타는 체질이라서요."
10104-CVGroup_UIEventLobby_Idle4-2 = "진, 진짜예요. 해도 소용없어요, 그러니까, 그만…!"
10104-CVGroup_UIEventLobby_Idle4-3 = "아하하하하!"
10104-CVGroup_UIEventLobby_Idle4-4 = "…정말, 그만해 주세요."
10104-CVGroup_UIEventShop_Enter1-1 = "가게를 지키는 건 잘하는 편입니다."
10104-CVGroup_UIEventShop_Enter1-2 = "그러면… 오늘은 무엇을 찾으시나요?"
10104-CVGroup_UIEventShop_Enter2-1 = "말을 걸어 주시면 어디든지, 현무상회는 가겠습니다."
10104-CVGroup_UIEventShop_Enter2-2 = "…언젠가는, 키보토스의 끝까지라도!"
10104-CVGroup_UIEventShop_Enter3-1 = "놓치신 물건은 없으십니까?"
10104-CVGroup_UIEventShop_Enter3-2 = "후회 없도록, 부디 끝까지 천천히 보아주세요."
10104-CVGroup_UIEventShop_Idle1-1 = "현무상회의 비장품? 숨겨진 메뉴…?"
10104-CVGroup_UIEventShop_Idle1-2 = "음… 그런 건, 없는데요…"
10104-CVGroup_UIEventShop_Idle1-3 = "그런 표정을 지으셔도 말이죠…"
10104-CVGroup_UIEventShop_Idle2-1 = "부족한 것이 있으시다면, 언제든 말씀 주세요."
10104-CVGroup_UIEventShop_Idle2-2 = "…매진된 상품은, 어쩔 수 없습니다만."
10104-CVGroup_UIEventShop_Buy1-1 = "네, 제가 추천하는 물건입니다."
10104-CVGroup_UIEventShop_Buy2-1 = "여기 가정용이신가요, 선물용이신가요?"
10104-CVGroup_UIEventShop_Buy3-1 = "매번 감사합니다!"
10104-CVGroup_UIEventShop_Buy3-2 = "…언제나 하고 있는 말일 텐데, 선생님께 말씀드리니 왠지 신선하네요."
10104-CVGroup_UIEventShop_Buy4-1 = "회장님께서도 말씀하시곤 했죠."
10104-CVGroup_UIEventShop_Buy4-2 = "무언가가 공짜로 주어진다면, 자기 자신이 상품이 된 것이라고요."
10104-CVGroup_UIEventShop_Buy4-3 = "그런데 선생님이 상품이라면…"
10104-CVGroup_UIEventShop_Buy4-4 = "아, 아닙니다. 아무것도요."

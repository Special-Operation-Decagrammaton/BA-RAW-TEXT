10104-CVGroup_UIEventLobby_Enter3-1 = "ถึงจะเป็นสถานการณ์ที่คาดไม่ถึง..."
10104-CVGroup_UIEventLobby_Enter3-2 = "แต่สำหรับมังกรดำ ย่านการค้าฯ และซานไห่จิงแล้ว..."
10104-CVGroup_UIEventLobby_Enter3-3 = "การมีอยู่ของคุณครูเป็นแรงใจให้พวกเรามากๆ ค่ะ"
10104-CVGroup_UIEventLobby_Enter4-1 = "เทศกาลเงาจันทร์เปิดได้อย่างราบรื่นเลยนะคะ"
10104-CVGroup_UIEventLobby_Enter4-2 = "เรื่องวุ่นวายนั่น เอาเป็นว่าอย่าเพิ่งใส่ใจเลยค่ะ..."
10104-CVGroup_UIEventLobby_Enter5-1 = "งานเทศกาลเป็นอย่างไรบ้างคะ?"
10104-CVGroup_UIEventLobby_Enter5-2 = "ซานไห่จิงกับย่านการค้าเทพเต่าดำ\nรอให้คุณครูมาเยือนทุกเมื่อเลยนะคะ"
10104-CVGroup_UIEventLobby_Idle1-1 = "เทศกาลเงาจันทร์คืองานที่จะได้โชว์ฝีมือของ\nย่านการค้าเทพเต่าดำค่ะ"
10104-CVGroup_UIEventLobby_Idle1-2 = "คุณครูพักผ่อนเถอะค่ะ"
10104-CVGroup_UIEventLobby_Idle2-1 = "ถ้าแกล้งกัน ฉันจะตอบกลับด้วยภาษาทางร่างกายนะคะ"

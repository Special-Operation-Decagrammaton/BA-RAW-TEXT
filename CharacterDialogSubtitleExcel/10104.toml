[translation]
10104-CVGroup_UITitle_Idle1-1 = "It's Blue Archive."
10104-CVGroup_CharacterGet_Idle1-1 = "I'm Kayama Reijo, the manager and head security of the main store of Shanhaijing Academy's Black Tortoise Promenade. I look forward to working with you again, Sensei."
10104-CVGroup_Cafe_Idle1-1 = "I wonder how matters here are being managed..."
10104-CVGroup_Cafe_Idle2-1 = "This is teaching me about the ways that the Black Tortoise is different."
10104-CVGroup_Cafe_Idle3-1 = "Maybe we should do some market research."
10104-CVGroup_Cafe_Idle4-1 = "(If we're going to expand the Black Tortoise Promenade here...)"
10104-CVGroup_Cafe_Idle5-1 = "I wonder if there's any place to stretch..."
10104-CVGroup_WeaponGet_Idle1-1 = "They say most problems can be solved with guns and gunpowder... But for you, who always has my back, I'll make sure I achieve a harmony of guns and fists...someday!"
10104-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei. The Moonlight Festival will start soon."
10104-CVGroup_UIEventLobby_Enter2-1 = "Thank you for coming."
10104-CVGroup_UIEventLobby_Enter2-2 = "Enjoy Shanhaijing's Moonlight Festival."
10104-CVGroup_UIEventLobby_Enter3-1 = "We didn't expect this situation, but..."
10104-CVGroup_UIEventLobby_Enter3-2 = "For the Genryumon, Black Tortoise Promenade, and Shanhaijing..."
10104-CVGroup_UIEventLobby_Enter3-3 = "...your presence is very encouraging, Sensei."
10104-CVGroup_UIEventLobby_Enter4-1 = "The Moonlight Festival was a success."
10104-CVGroup_UIEventLobby_Enter4-2 = "...Let's just ignore the disturbance for now."
10104-CVGroup_UIEventLobby_Enter5-1 = "How was the festival?"
10104-CVGroup_UIEventLobby_Enter5-2 = "Shanhaijing and the Black Tortoise Promenade are always waiting for you to visit, Sensei."
10104-CVGroup_UIEventLobby_Idle1-1 = "The Moonlight Festival is the perfect time to show off the skills of the Black Tortoise Promenade."
10104-CVGroup_UIEventLobby_Idle1-2 = "You should rest, Sensei."
10104-CVGroup_UIEventLobby_Idle2-1 = "...I'll respond to pranks physically."
10104-CVGroup_UIEventLobby_Idle2-2 = "I'm kidding, Sensei. Pranks are fine."
10104-CVGroup_UIEventLobby_Idle2-3 = "It would only be a problem if it was too frequent, so please control yourself."
10104-CVGroup_UIEventLobby_Idle3-1 = "What's going on, Sensei?"
10104-CVGroup_UIEventLobby_Idle3-2 = "...What? You just wanted to chat?"
10104-CVGroup_UIEventLobby_Idle3-3 = "...If you keep joking around like that, eventually no one's going to believe you."
10104-CVGroup_UIEventLobby_Idle3-4 = "But I'll always believe you, Sensei."
10104-CVGroup_UIEventLobby_Idle4-1 = "I-I'm not really ticklish."
10104-CVGroup_UIEventLobby_Idle4-2 = "R-Really. There's no point in trying. So stop...!"
10104-CVGroup_UIEventLobby_Idle4-3 = "Ahahaha!"
10104-CVGroup_UIEventLobby_Idle4-4 = "...Please stop."
10104-CVGroup_UIEventShop_Enter1-1 = "Protecting the store is important."
10104-CVGroup_UIEventShop_Enter1-2 = "So...what are you looking for today?"
10104-CVGroup_UIEventShop_Enter2-1 = "If you ask us, the Black Tortoise Promenade will go anywhere."
10104-CVGroup_UIEventShop_Enter2-2 = "...To the ends of Kivotos, someday!"
10104-CVGroup_UIEventShop_Enter3-1 = "Did you forget anything?"
10104-CVGroup_UIEventShop_Enter3-2 = "I don't want you to regret anything, so please look around carefully."
10104-CVGroup_UIEventShop_Idle1-1 = "The Black Tortoise Promenade's secret item? A hidden menu...?"
10104-CVGroup_UIEventShop_Idle1-2 = "Um... There's no such thing..."
10104-CVGroup_UIEventShop_Idle1-3 = "Not even if you give me that look..."
10104-CVGroup_UIEventShop_Idle2-1 = "If anything's missing, please feel free to let me know."
10104-CVGroup_UIEventShop_Idle2-2 = "...But there's nothing we can do about sold out items."
10104-CVGroup_UIEventShop_Buy1-1 = "Yes, that's an item I recommend."
10104-CVGroup_UIEventShop_Buy2-1 = "Will you be using it at home, or giving it to someone?"
10104-CVGroup_UIEventShop_Buy3-1 = "Thank you so much!"
10104-CVGroup_UIEventShop_Buy3-2 = "People say that all the time, but saying it to you, Sensei...it sounds new."
10104-CVGroup_UIEventShop_Buy4-1 = "There's something the president used to say."
10104-CVGroup_UIEventShop_Buy4-2 = "If something's given to you for free, you've become the product."
10104-CVGroup_UIEventShop_Buy4-3 = "But if you're the product, Sensei..."
10104-CVGroup_UIEventShop_Buy4-4 = "N-Never mind. It's nothing."

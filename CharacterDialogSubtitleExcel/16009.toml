[translation]
16009-CVGroup_UITitle_Idle1-1 = "蔚藍！檔案！"
16009-CVGroup_CharacterGet_Idle1-1 = "哼哼哼……久等了～！\n忍術研究部部長，千鳥三千留……\n在此登場！今後請多指教哦，老師大人！"
16009-CVGroup_Cafe_Idle1-1 = "那麼～下次要在頻道上傳什麼樣的影片呢？"
16009-CVGroup_Cafe_Idle2-1 = "「少女忍法帖小小三千留」……目標，頻道訂閱數100人！"
16009-CVGroup_Cafe_Idle3-1 = "啊，想到新的忍術了！"
16009-CVGroup_Cafe_Idle4-1 = "咦……《魚板疾風傳》的新刊發售日，是什麼時候來著？"
16009-CVGroup_Cafe_Idle5-1 = "唔，到處都有別校的學生……\n不太想接觸……"
16009-CVGroup_WeaponGet_Idle1-1 = "唔哦～連這種東西都要給我……！？\n雖，雖然有點感覺到責任感……\n……不對，不過交給我，老師大人！\n就讓你見識吧，三千留忍術……其中的真髓！"
16009-CVGroup_UIEventLobby_Enter1-1 = "啊，老師大人！\n現在正是忍術研究部活躍的時候！"
16009-CVGroup_UIEventLobby_Enter1-2 = "來，唰唰地漂亮解決事件吧！"
16009-CVGroup_UIEventLobby_Enter2-1 = "唔哇，好像變成不得了的大騷動了……"
16009-CVGroup_UIEventLobby_Enter2-2 = "老，老師大人，會沒事的吧？\n我相信你哦，吶！？"
16009-CVGroup_UIEventLobby_Enter3-1 = "嗚啊，已經到這個時間了……\n這，來的及嗎……？"
16009-CVGroup_UIEventLobby_Enter3-2 = "啊啊真是的，妖怪劇團有夠煩人……！"
16009-CVGroup_UIEventLobby_Enter4-1 = "我直到最後都不會放棄的……！\n不管是忍術研究部的認可！"
16009-CVGroup_UIEventLobby_Enter4-2 = "還是「少女忍法帖 小小三千留」的訂閱人數達到100人！"
16009-CVGroup_UIEventLobby_Enter5-1 = "唔咦……終，終於結束了……？可以回去了？"
16009-CVGroup_UIEventLobby_Enter5-2 = "呼啊……好想趕快回去看忍者電影……"
16009-CVGroup_UIEventLobby_Enter5-3 = "那種完全不用思考的B級的那種……"
16009-CVGroup_UIEventLobby_Idle1-1 = "妖怪劇團在作亂，又被陰陽部施壓，"
16009-CVGroup_UIEventLobby_Idle1-2 = "格黑娜的萬魔殿也很麻煩……到底想怎樣啊……"
16009-CVGroup_UIEventLobby_Idle2-1 = "……噫呀！？老，老師大人！？你剛才做了什麼！？"
16009-CVGroup_UIEventLobby_Idle2-2 = "突，突然戳我會害我嚇到的……！？"
16009-CVGroup_UIEventLobby_Idle3-1 = "所謂忍者，就是不會放棄的人。"
16009-CVGroup_UIEventLobby_Idle3-2 = "不斷衝刺直到最後，不管發生什麼都要完成任務……"
16009-CVGroup_UIEventLobby_Idle3-3 = "我們忍術研究部也是一樣這點，就讓你見識一下吧！"
16009-CVGroup_UIEventLobby_Idle4-1 = "漂亮地解決陰陽部的委託，"
16009-CVGroup_UIEventLobby_Idle4-2 = "這次一定要被認可為正式的社團！"

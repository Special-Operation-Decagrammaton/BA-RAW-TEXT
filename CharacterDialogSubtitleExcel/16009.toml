[translation]
16009-CVGroup_UITitle_Idle1-1 = "블루! 아카이브!"
16009-CVGroup_CharacterGet_Idle1-1 = "후후후…. 오래 기다렸어-!\n인법연구부의 부장! 치도리 미치루…… 여기에 등장! 앞으로 잘 부탁해! 선생 공!"
16009-CVGroup_Cafe_Idle1-1 = "자, 다음엔 채널에 어떤 영상을 올려볼까?"
16009-CVGroup_Cafe_Idle2-1 = "<소녀인법첩 미치룻치>…. 노려라, 구독자 수 100명!"
16009-CVGroup_Cafe_Idle3-1 = "아, 새로운 인법이 떠올랐다!"
16009-CVGroup_Cafe_Idle4-1 = "어라… <카마보코 돌풍전> 신간 발매일이 언제더라?"
16009-CVGroup_Cafe_Idle5-1 = "…으으, 여기저기 다른 학생들이…. 별로 가까이 가고 싶지 않은데…."
16009-CVGroup_WeaponGet_Idle1-1 = "우오… 이런 것까지 나한테……!? 사, 살짝 부담스러운데…….\n……으응, 그래도 맡겨줘, 선생 공!\n보여드리겠소이다, 미치루류 인법……. 그 진수를!"
16009-CVGroup_UIEventLobby_Enter1-1 = "앗, 선생 공! 지금이야말로 인법 연구부가 활약할 때야!"
16009-CVGroup_UIEventLobby_Enter1-2 = "자, 샤샥! 하고 깔끔하게 해결해버리자고!"
16009-CVGroup_UIEventLobby_Enter2-1 = "우와아, 뭔가 엄청난 대소동이 되어버렸다…."
16009-CVGroup_UIEventLobby_Enter2-2 = "서, 선생 공. 괜찮아? 믿고 있으니까, 응?!"
16009-CVGroup_UIEventLobby_Enter3-1 = "우갹, 벌써 이런 시간이…. 이거, 늦지 않으려나…?"
16009-CVGroup_UIEventLobby_Enter3-2 = "아, 정말, 망량즈 녀석들 진짜 끈질겨…!"
16009-CVGroup_UIEventLobby_Enter4-1 = "나는 마지막까지 포기 하지 않아…! 인법 연구부의 정식 인가도!"
16009-CVGroup_UIEventLobby_Enter4-2 = "<소녀인법첩 미치룻치> 의 구독자 수 100명 달성도!"
16009-CVGroup_UIEventLobby_Enter5-1 = "우에에에…. 가, 간신히 끝났다……? 이제 돌아가도 돼?"
16009-CVGroup_UIEventLobby_Enter5-2 = "후아아…. 빨리 돌아가서, 닌자 영화나 보고 싶어…."
16009-CVGroup_UIEventLobby_Enter5-3 = "아무 생각할 필요 없는 B급 영화로…."
16009-CVGroup_UIEventLobby_Idle1-1 = "망량즈는 날뛰고 있지. 음양부에선 압력이 들어오지."
16009-CVGroup_UIEventLobby_Idle1-2 = "게헨나의 만마전은 엄청 귀찮지…. 이젠 뭐가 뭔지…."
16009-CVGroup_UIEventLobby_Idle2-1 = "…햣?! 서, 선생 공?! 지금 뭘 한 거야?!"
16009-CVGroup_UIEventLobby_Idle2-2 = "가, 갑자기 찌르면 깜짝 놀란다구……?!"
16009-CVGroup_UIEventLobby_Idle3-1 = "닌자란, 포기하지 않는 자."
16009-CVGroup_UIEventLobby_Idle3-2 = "마지막까지 달리고, 무슨 일이 있어도 임무를 완수한다…."
16009-CVGroup_UIEventLobby_Idle3-3 = "우리들 인법연구부도 그렇다는걸, 보여주도록 하겠어!"
16009-CVGroup_UIEventLobby_Idle4-1 = "음양부의 의뢰를 깔끔하게 해결하고,"
16009-CVGroup_UIEventLobby_Idle4-2 = "이번에야말로 정식 동아리로 인정받을 거니까!"

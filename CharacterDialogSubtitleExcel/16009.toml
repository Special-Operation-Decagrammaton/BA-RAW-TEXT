[translation]
16009-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
16009-CVGroup_CharacterGet_Idle1-1 = "Heehee... Thanks for waiting! Chidori Michiru, president of the Ninjutsu Research Club has arrived! Looking forward to working with you, Sensei"
16009-CVGroup_Cafe_Idle1-1 = "Now, what video should I upload to the channel next?"
16009-CVGroup_Cafe_Idle2-1 = "Michiruchi, a Girl's Ninja Scroll... Going for a hundred subscribers!"
16009-CVGroup_Cafe_Idle3-1 = "Oh! I just thought of a new ninjutsu!"
16009-CVGroup_Cafe_Idle4-1 = "When is the new issue of Kama-Boke Gale Battle coming out?"
16009-CVGroup_Cafe_Idle5-1 = "Ugh, there are a bunch of students... I don't wanna go near them..."
16009-CVGroup_WeaponGet_Idle1-1 = "Whoa, this is for me?! I-It's a bit much... Well, okay, fine! You can count on me, Sensei! I'll show you the power of Michiru-style ninjutsu!!"
16009-CVGroup_UIEventLobby_Enter1-1 = "Oh, Sensei! This is the perfect time for the Ninjutsu Research Club to shine!"
16009-CVGroup_UIEventLobby_Enter1-2 = "Okay, let's just take care of it at lightning speed!"
16009-CVGroup_UIEventLobby_Enter2-1 = "Whoa, it turned into a big commotion somehow..."
16009-CVGroup_UIEventLobby_Enter2-2 = "S-Sensei, are you okay? I believe in you!"
16009-CVGroup_UIEventLobby_Enter3-1 = "Argh, look at the time! Oh, no... Can I make it?"
16009-CVGroup_UIEventLobby_Enter3-2 = "Ugh, those Mouryo bastards are so persistent!"
16009-CVGroup_UIEventLobby_Enter4-1 = "I'm not gonna give up until the end! The Ninjutsu Research Club will be officially recognized!"
16009-CVGroup_UIEventLobby_Enter4-2 = "And \"Michiruchi, a Girl's Ninja Scroll\" will reach a hundred subscribers!"
16009-CVGroup_UIEventLobby_Enter5-1 = "Ugh... I-I managed to finish it... Can I go back now?"
16009-CVGroup_UIEventLobby_Enter5-2 = "Argh... I just wanna go back and watch a ninja movie..."
16009-CVGroup_UIEventLobby_Enter5-3 = "Something I can watch mindlessly, like a B-rated movie..."
16009-CVGroup_UIEventLobby_Idle1-1 = "The Mouryo are running amok, and the Yin-Yang Club is pressuring me."
16009-CVGroup_UIEventLobby_Idle1-2 = "The Gehenna Pandemonium Society is so annoying...and I'm so confused now..."
16009-CVGroup_UIEventLobby_Idle2-1 = "...Huh? S-Sensei?! What did you just do?"
16009-CVGroup_UIEventLobby_Idle2-2 = "I-I was surprised because you poked me all of a sudden!"
16009-CVGroup_UIEventLobby_Idle3-1 = "To a ninja, there's no such thing as quitting."
16009-CVGroup_UIEventLobby_Idle3-2 = "We run until the finish line. No matter what happens, we complete the mission..."
16009-CVGroup_UIEventLobby_Idle3-3 = "I'll prove the greatness of the Ninjutsu Research Club!"
16009-CVGroup_UIEventLobby_Idle4-1 = "I'm going to successfully fulfill the Yin-Yang Club's request..."
16009-CVGroup_UIEventLobby_Idle4-2 = "...and be recognized as an official club!"

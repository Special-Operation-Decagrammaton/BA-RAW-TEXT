[translation]
20019-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20019-CVGroup_CharacterGet_Idle1-1 = "สาวใช้ของนายท่าน อาคาเนะค่ะ\nไม่สิ... หรือต้องเรียกว่ากระต่ายของนายท่านดีล่ะคะ?"
20019-CVGroup_Cafe_Idle1-1 = "จัดการเอาไว้ได้เป็นระเบียบมากเลยนะคะ\nการทำความสะอาด... ก็เป็นเรื่องสำคัญค่ะ"
20019-CVGroup_Cafe_Idle2-1 = "ยินดีต้อนรับค่ะ\nต้องการสั่งเมนูชาแดงเหรอคะ? ฮุฮุ..."
20019-CVGroup_Cafe_Idle3-1 = "นายท่านนี่... เป็นคนพิเศษจริงๆ เลยนะคะ"
20019-CVGroup_Cafe_Idle4-1 = "ไม่มีตรงไหนที่ต้องจัดการเพิ่มเลยเหรอคะ...?"
20019-CVGroup_Cafe_Idle5-1 = "ตอนเช้าแบบนี้ ไปเดินเล่นในสวนด้วยกันกับนายท่านดีมั้ยนะ?"
20019-CVGroup_WeaponGet_Idle1-1 = "ถ้ามีสิ่งนี้ก็คงจะทำให้ฉัน...\nเป็น 'กระต่าย' ที่สมบูรณ์แบบได้สินะคะ"

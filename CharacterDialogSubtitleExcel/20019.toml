[translation]
20019-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20019-CVGroup_CharacterGet_Idle1-1 = "주인님의 메이드, 아카네입니다.\n아뇨… 지금은, 주인님의 토끼라고 해야 할까요?"
20019-CVGroup_Cafe_Idle1-1 = "깔끔하게 정돈되어 있군요. 청소는…. 중요합니다."
20019-CVGroup_Cafe_Idle2-1 = "어서 오십시오. 주문은 홍차입니까? …후훗"
20019-CVGroup_Cafe_Idle3-1 = "주인님은 정말… 특별한 분이십니다."
20019-CVGroup_Cafe_Idle4-1 = "조금 더 정리할 곳은 없는 걸까요…?"
20019-CVGroup_Cafe_Idle5-1 = "이참에, 주인님과 함께 토끼의 길을 걸어 보는 것도…?"
20019-CVGroup_WeaponGet_Idle1-1 = "이걸로 좀 더 완벽한… '토끼'가 될 수 있겠네요."

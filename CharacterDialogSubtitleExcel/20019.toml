[translation]
20019-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20019-CVGroup_CharacterGet_Idle1-1 = "我是主人的女僕，朱音。\n不對…現在是主人的兔子，這樣說比較對嗎？"
20019-CVGroup_Cafe_Idle1-1 = "整頓得相當乾淨呢。\n打掃是…很重要的。"
20019-CVGroup_Cafe_Idle2-1 = "歡迎光臨。\n請問要來點紅茶嗎？\n…呵呵。"
20019-CVGroup_Cafe_Idle3-1 = "主人真的是…很特別的人。"
20019-CVGroup_Cafe_Idle4-1 = "還能再稍微整理一下的地方是…？"
20019-CVGroup_Cafe_Idle5-1 = "趁這個機會和主人一起走走兔子之路也不錯…？"
20019-CVGroup_WeaponGet_Idle1-1 = "這樣就能更完美地…成為「兔子」了。"

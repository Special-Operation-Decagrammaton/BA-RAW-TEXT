[translation]
26005-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26005-CVGroup_CharacterGet_Idle1-1 = "別看我小就瞧不起我！\n我的可能性可是非常大的！"
26005-CVGroup_Cafe_Idle1-1 = "……我的成長還沒有結束！相信我！"
26005-CVGroup_Cafe_Idle2-1 = "呵呵。\n要不要睡一覺呢。"
26005-CVGroup_Cafe_Idle3-1 = "唉……老師為什麼這麼不會看氣氛呢。"
26005-CVGroup_Cafe_Idle4-1 = "想吃好吃的甜點～！\n啊！老師！"
26005-CVGroup_Cafe_Idle5-1 = "嗯？咦……我討厭牛奶。\n我也知道不喝不行，所以才更討厭！\n咦？那個是，草，草莓牛奶嗎？"
26005-CVGroup_WeaponGet_Idle1-1 = "都收到這種東西了……\n也只能認真地努力了吧！"

[translation]
26005-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
26005-CVGroup_CharacterGet_Idle1-1 = "작다고 얕보지 마! 내 가능성은 엄청나게 크니까!"
26005-CVGroup_Cafe_Idle1-1 = "나의 성장판은 아직… 끝나지 않았어! 믿어!"
26005-CVGroup_Cafe_Idle2-1 = "히힛. 한숨 푹 자고 갈까나."
26005-CVGroup_Cafe_Idle3-1 = "하아… 선생님은 왜 그렇게 눈치가 없는 걸까."
26005-CVGroup_Cafe_Idle4-1 = "맛있는 디저트가 먹고 싶어! 와앗! 선생님이다!"
26005-CVGroup_Cafe_Idle5-1 = "히잉. 흰 우유는 싫어. 먹어야 된다는 점이 특히 말야!\n응? 따, 딸기 우유라고?"
26005-CVGroup_WeaponGet_Idle1-1 = "이런 거 받아버리면… 진심으로 노력할 수밖에 없잖아!"

[translation]
20012-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20012-CVGroup_CharacterGet_Idle1-1 = "게헨나 응급의학부 부장. 히무로 세나입니다. 잘 부탁드립니다."
20012-CVGroup_Cafe_Idle1-1 = "흠…… 여긴 모두 이상 없어 보이는군요."
20012-CVGroup_Cafe_Idle2-1 = "시…… 아뇨. 부상자는 없는 것 같군요?"
20012-CVGroup_Cafe_Idle3-1 = "휴식하기에는 딱 좋아 보이는 장소로군요."
20012-CVGroup_Cafe_Idle4-1 = "가끔은 이런 것도 나쁘지 않군요."
20012-CVGroup_Cafe_Idle5-1 = "선생님은, 어디에……"
20012-CVGroup_WeaponGet_Idle1-1 = "해당 장비 확실히 양도받았습니다.\n보다 본격적으로 지원하겠으니, 앞으로도 모쪼록 잘 부탁드립니다."
20012-CVGroup_UIEventShop_Enter1-1 = "수고하십니다. 선생님."
20012-CVGroup_UIEventShop_Enter1-2 = "무언가 하실 말씀이 있으시다면 언제든 이야기해 주십시오."
20012-CVGroup_UIEventShop_Enter2-1 = "……어수선한 현장이군요. 준비를 해 두는 편이 좋을지도 모르겠습니다."
20012-CVGroup_UIEventShop_Enter3-1 = "후속조치가 필요할 것 같아 남아있었습니다."
20012-CVGroup_UIEventShop_Enter3-2 = "필요하신 게 있으시면 말씀해주십시오."
20012-CVGroup_UIEventShop_Idle1-1 = "……혹시나 해서 드리는 말씀, 입니다만. 저는 상품이 아니라서요."
20012-CVGroup_UIEventShop_Idle2-1 = "죄송하지만 규정이 있는지라, 그냥 드릴 순 없습니다."
20012-CVGroup_UIEventShop_Buy1-1 = "나쁘지 않은 판단입니다."
20012-CVGroup_UIEventShop_Buy2-1 = "그게 좋을 것 같군요."
20012-CVGroup_UIEventShop_Buy3-1 = "바로 준비하겠습니다."
20012-CVGroup_UIEventShop_Buy4-1 = "네. 잠시만 기다려주십시오."
20012-CVGroup_UIEventMission_Enter1-1 = "반갑습니다. 선생님. 이번 업무의 리스트입니다. 잘 부탁드립니다."
20012-CVGroup_UIEventMission_Enter2-1 = "현재까지의 업무 진행 상황입니다. 확인 부탁드립니다."
20012-CVGroup_UIEventMission_Idle1-1 = "……선생님? 업무에 집중해 주십시오."
20012-CVGroup_UIEventMission_Idle2-1 = "……죄송합니다만, 제가 일을 대신 해드릴 순 없습니다."
20012-CVGroup_UIEventMission_Buy1-1 = "네. 확인하였습니다."
20012-CVGroup_UIEventMission_Buy2-1 = "잘 처리되었습니다."
20012-CVGroup_UIEventMission_Interaction1-1 = "오늘 업무는 이상입니다. ……수고하셨습니다. 선생님."

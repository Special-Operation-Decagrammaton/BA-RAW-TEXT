[translation]
20012-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20012-CVGroup_CharacterGet_Idle1-1 = "I'm Himuro Sena, president of Gehenna's Medical Emergency Club. A pleasure to meet you."
20012-CVGroup_Cafe_Idle1-1 = "Hmm... Everything seems fine here."
20012-CVGroup_Cafe_Idle2-1 = "Any corp—I mean. Is anyone injured?"
20012-CVGroup_Cafe_Idle3-1 = "This looks like a good place to take a break."
20012-CVGroup_Cafe_Idle4-1 = "I don't mind something like this every once in a while."
20012-CVGroup_Cafe_Idle5-1 = "Where are you, Sensei...?"
20012-CVGroup_WeaponGet_Idle1-1 = "The equipment has been transferred. We'll be able to provide more support now. We look forward to working with you."
20012-CVGroup_UIEventShop_Enter1-1 = "You're here, Sensei."
20012-CVGroup_UIEventShop_Enter1-2 = "If you need anything, please let me know."
20012-CVGroup_UIEventShop_Enter2-1 = "What a commotion. We should make preparations, just in case."
20012-CVGroup_UIEventShop_Enter3-1 = "I stayed because follow-up measures seemed necessary."
20012-CVGroup_UIEventShop_Enter3-2 = "If you need anything, please let me know."
20012-CVGroup_UIEventShop_Idle1-1 = "Just to clarify, I am not a reward..."
20012-CVGroup_UIEventShop_Idle2-1 = "I'm sorry, but rules are rules. I can't just give myself away."
20012-CVGroup_UIEventShop_Buy1-1 = "That's not bad thinking."
20012-CVGroup_UIEventShop_Buy2-1 = "I agree with the decision."
20012-CVGroup_UIEventShop_Buy3-1 = "I'll get ready right now."
20012-CVGroup_UIEventShop_Buy4-1 = "Okay, please wait a moment."
20012-CVGroup_UIEventMission_Enter1-1 = "Hello, Sensei. Here's the list of tasks. Good luck."
20012-CVGroup_UIEventMission_Enter2-1 = "Here is the work progress so far. Please review it."
20012-CVGroup_UIEventMission_Idle1-1 = "...Sensei? Please pay attention to the task."
20012-CVGroup_UIEventMission_Idle2-1 = "I'm sorry, but I can't do the work for you."
20012-CVGroup_UIEventMission_Buy1-1 = "Yes, I've checked."
20012-CVGroup_UIEventMission_Buy2-1 = "It's been processed."
20012-CVGroup_UIEventMission_Interaction1-1 = "That's it for today's work. Great job, Sensei."

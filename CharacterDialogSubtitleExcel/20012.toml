[translation]
20012-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20012-CVGroup_CharacterGet_Idle1-1 = "格黑娜學園急救醫學部的部長，氷室瀬奈。\n今後請多指教。"
20012-CVGroup_Cafe_Idle1-1 = "呼呣……\n似乎沒有什麼異常呢。"
20012-CVGroup_Cafe_Idle2-1 = "屍……不，似乎沒有傷患呢？"
20012-CVGroup_Cafe_Idle3-1 = "以休息來說是個不錯的場所呢。"
20012-CVGroup_Cafe_Idle4-1 = "偶爾有這樣的時間，也不錯。"
20012-CVGroup_Cafe_Idle5-1 = "老師，在哪裡……"
20012-CVGroup_WeaponGet_Idle1-1 = "這裡的裝備，確實收到了。\n今後應該可以做到更正式的支援。\n……今後也，請多多指教。"
20012-CVGroup_UIEventShop_Enter1-1 = "辛苦了，老師。"
20012-CVGroup_UIEventShop_Enter1-2 = "有什麼需要的話請隨時跟我說。"
20012-CVGroup_UIEventShop_Enter2-1 = "……真是吵雜的現場呢。\n或許先做好準備比較好。"
20012-CVGroup_UIEventShop_Enter3-1 = "我想或許需要進行事後處理所以留在了這裡。"
20012-CVGroup_UIEventShop_Enter3-2 = "有什麼需要的話請隨時跟我說。"
20012-CVGroup_UIEventShop_Idle1-1 = "……保險起見，跟您說一聲。我並不是商品。"
20012-CVGroup_UIEventShop_Idle2-1 = "很抱歉，因為這是規定，所以沒辦法免費給您。"
20012-CVGroup_UIEventShop_Buy1-1 = "是個不錯的判斷。"
20012-CVGroup_UIEventShop_Buy2-1 = "那個似乎不錯呢。"
20012-CVGroup_UIEventShop_Buy3-1 = "我立刻準備。"
20012-CVGroup_UIEventShop_Buy4-1 = "好的，那麼請稍待片刻。"
20012-CVGroup_UIEventMission_Enter1-1 = "您辛苦了，老師。\n這是工作的清單，麻煩您了。"
20012-CVGroup_UIEventMission_Enter2-1 = "這是工作的進行狀況。\n拜託您進行確認。"
20012-CVGroup_UIEventMission_Idle1-1 = "……老師？\n請專注在工作上。"
20012-CVGroup_UIEventMission_Idle2-1 = "……很抱歉，但我沒辦法代替老師工作。"
20012-CVGroup_UIEventMission_Buy1-1 = "好的，已確認完畢。"
20012-CVGroup_UIEventMission_Buy2-1 = "似乎已經順利處理完畢了呢。"
20012-CVGroup_UIEventMission_Interaction1-1 = "那麼，今天的工作到此為止。\n老師，您辛苦了。"

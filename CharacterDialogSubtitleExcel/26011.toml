[translation]
26011-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26011-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะคุณครู! ฉันซาเต็น รุยโกะ ชั้นปีที่ 1\nจากโรงเรียนมัธยมต้นซาคุงาวะค่ะ! ฝากตัวด้วยนะคะ!"
26011-CVGroup_Cafe_Idle1-1 = "เอ๋? คนคนนั้น..."
26011-CVGroup_Cafe_Idle2-1 = "โอ้ว!! ที่นี่สุดยอดไปเลยนะคะ!"
26011-CVGroup_Cafe_Idle3-1 = "ดูแวบเดียวก็เหมือนจะธรรมดา\nแต่ถ้าดูดีๆ ก็พิเศษเลยละค่ะ... อื้ม~! สนุกจัง!"
26011-CVGroup_Cafe_Idle4-1 = "นี่สินะคาเฟ่ต่างโลกที่เคยได้ยินแต่ชื่อ..."
26011-CVGroup_Cafe_Idle5-1 = "รู้สึกโล่งใจจังเลยค่ะ ฮิฮิ"
26011-CVGroup_WeaponGet_Idle1-1 = "คะ? ...อันนี้ ให้ฉันเหรอ...? ระ... รู้สึกแปลกๆ นะคะเนี่ย...\nขอบคุณค่ะ ฉะ... ฉันจะพยายามดูค่ะ!\n...ขอโทษที่ฉันบอกได้\nแค่นี้นะคะ แหะๆ..."
26011-CVGroup_UIEventLobby_Enter1-1 = "มาแล้วเหรอคะคุณครู!\nงั้นเราออกเดินทางกันเลยค่ะ!"
26011-CVGroup_UIEventLobby_Enter2-1 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!"
26011-CVGroup_UIEventLobby_Enter3-1 = "ผ่านมาครึ่งทางแล้วนะคะเนี่ย!\nสู้ให้ถึงตอนจบเลยนะ!"
26011-CVGroup_UIEventLobby_Enter4-1 = "เริ่มจะเห็นตอนจบแล้วสินะคะ...!"
26011-CVGroup_UIEventLobby_Enter5-1 = "มาดูอีกครั้ง! เป็นครั้งสุดท้ายก่อนไปมั้ยคะ?"
26011-CVGroup_UIEventLobby_Idle1-1 = "หืม? คุณครู? เป็นอะไรไปคะ?"
26011-CVGroup_UIEventLobby_Idle2-1 = "ให้ฉันช่วยอะไรมั้ยคะ?"
26011-CVGroup_UIEventLobby_Idle3-1 = "อืม... คุณครู ตอนนี้ไม่ใช่เวลามาเล่นสนุกอยู่นะคะ"
26011-CVGroup_UIEventLobby_Idle4-1 = "โธ่! คุณครูเนี่ย!\nตั้งใจหน่อย! ตั้งใจหน่อยค่ะ!"
26011-CVGroup_UIEventShop_Enter1-1 = "ทาด๊า! ฉันเตรียมของมาเยอะเลยละค่ะ!"
26011-CVGroup_UIEventShop_Enter2-1 = "ตรงนี้ค่ะ คุณครู!\nชอบอันไหนก็เลือกไปนะคะ!"
26011-CVGroup_UIEventShop_Enter3-1 = "เช็กให้ดีนะคะ~\nว่ามีงานอะไรเหลือรึเปล่า"
26011-CVGroup_UIEventShop_Idle1-1 = "เอ๋? หาอะไรเหรอคะ?"
26011-CVGroup_UIEventShop_Idle2-1 = "คนที่คุณครูต้องสนใจไม่ใช่ฉัน\nแต่เป็นทางนั้นต่างหาก..."
26011-CVGroup_UIEventShop_Buy1-1 = "อ้อ อันนั้นเหรอคะ? ดีเลยค่ะ!"
26011-CVGroup_UIEventShop_Buy2-1 = "ฮึ่ม! ตาแหลมนะคะเนี่ย~ ..อะไรกันเนี่ย!"
26011-CVGroup_UIEventShop_Buy3-1 = "หาเจอแล้วสินะคะ! ฉันเห็นด้วยค่ะ!"
26011-CVGroup_UIEventShop_Buy4-1 = "โอ้วว~ ต้องอย่างนี้แหละ!\nฉันก็คิดว่าอันนี้ดีเหมือนกันค่ะ!"

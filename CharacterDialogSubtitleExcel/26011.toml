[translation]
26011-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26011-CVGroup_CharacterGet_Idle1-1 = "你好，老師！\n我是柵川中學一年級的佐天涙子！請多多指教！"
26011-CVGroup_Cafe_Idle1-1 = "咦，那個人是……"
26011-CVGroup_Cafe_Idle2-1 = "哦哦！！感覺這裡好像很酷耶！"
26011-CVGroup_Cafe_Idle3-1 = "雖然乍看之下有點普通，不過只要仔細觀察就會發現有點特別……\n嗯～！真開心！"
26011-CVGroup_Cafe_Idle4-1 = "這就是傳說中的……\n異世界咖啡廳……"
26011-CVGroup_Cafe_Idle5-1 = "感覺很放鬆呢，嘿嘿。"
26011-CVGroup_WeaponGet_Idle1-1 = "咦……要把，這個給我……？\n感，感覺有點奇妙呢……謝謝你。\n總，總之，我會努力的！\n……能說的只有這些，真不好意思。哈哈……"
26011-CVGroup_UIEventLobby_Enter1-1 = "你來了啊，老師！\n那麼趕緊出發吧！"
26011-CVGroup_UIEventLobby_Enter2-1 = "我在等你哦，老師！"
26011-CVGroup_UIEventLobby_Enter3-1 = "只剩下一半了嗎！？\n繼續努力到最後吧！"
26011-CVGroup_UIEventLobby_Enter4-1 = "差不多能看見終點了呢……！"
26011-CVGroup_UIEventLobby_Enter5-1 = "最後！要不要再檢查一次呀？"
26011-CVGroup_UIEventLobby_Idle1-1 = "咦？老師？怎麼了嗎？"
26011-CVGroup_UIEventLobby_Idle2-1 = "需要我幫什麼忙嗎？"
26011-CVGroup_UIEventLobby_Idle3-1 = "……呣呣，老師，現在不是玩樂的時候唷。"
26011-CVGroup_UIEventLobby_Idle4-1 = "真是的！老師！\n專心！要專心唷！"
26011-CVGroup_UIEventShop_Enter1-1 = "鏘～！我準備了很多東西！"
26011-CVGroup_UIEventShop_Enter2-1 = "就是這些，老師！\n請挑選喜歡的東西吧！"
26011-CVGroup_UIEventShop_Enter3-1 = "有沒有沒做完的事，要檢查，檢查唷～！"
26011-CVGroup_UIEventShop_Idle1-1 = "咦？在找什麼嗎？"
26011-CVGroup_UIEventShop_Idle2-1 = "那個，想請你看的不是我，是那邊才對……"
26011-CVGroup_UIEventShop_Buy1-1 = "啊，那個！真不錯呢！"
26011-CVGroup_UIEventShop_Buy2-1 = "呼呣！眼光真不錯呢～\n……開玩笑的！"
26011-CVGroup_UIEventShop_Buy3-1 = "想找的東西是那個啊！\n可以理解！"
26011-CVGroup_UIEventShop_Buy4-1 = "哦哦～果然如此！\n我也覺得那個很棒！"

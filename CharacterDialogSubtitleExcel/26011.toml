[translation]
26011-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
26011-CVGroup_CharacterGet_Idle1-1 = "안녕하세요, 선생님!\n사쿠가와 중학교 1학년, 사텐 루이코입니다! 잘부탁드립니다!"
26011-CVGroup_Cafe_Idle1-1 = "어라, 저 사람은……"
26011-CVGroup_Cafe_Idle2-1 = "오오!! 왠지 여기, 굉장하네요!"
26011-CVGroup_Cafe_Idle3-1 = "언뜻 보기에 평범한 것 같지만, 자세히 보면 조금 특이해… 음~! 즐거워!"
26011-CVGroup_Cafe_Idle4-1 = "말로만 듣던 이세계 카페……."
26011-CVGroup_Cafe_Idle5-1 = "마음이 놓이는 기분이네요. 헤헷."
26011-CVGroup_WeaponGet_Idle1-1 = "네?... 이걸, 저한테…? 묘, 묘한 기분이네요… 감사합니다.\n일, 일단, 노력 할게요! …이 말밖에 드리지 못해서, 죄송합니다. 하핫…."
26011-CVGroup_UIEventLobby_Enter1-1 = "오셨군요, 선생님! 그럼 바로 출발하죠!"
26011-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었어요, 선생님!"
26011-CVGroup_UIEventLobby_Enter3-1 = "벌써 반이나 지났네요!? 마지막까지 힘내죠!"
26011-CVGroup_UIEventLobby_Enter4-1 = "슬슬 끝이 보이기 시작하네요...!"
26011-CVGroup_UIEventLobby_Enter5-1 = "마지막으로! 다시 한번 보고 가실래요?"
26011-CVGroup_UIEventLobby_Idle1-1 = "음? 선생님? 왜 그러세요?"
26011-CVGroup_UIEventLobby_Idle2-1 = "뭔가, 도와드릴까요?"
26011-CVGroup_UIEventLobby_Idle3-1 = "……으음, 선생님, 지금은 놀고 있을 때가 아니에요."
26011-CVGroup_UIEventLobby_Idle4-1 = "아휴! 선생님! 집중! 집중이에요!"
26011-CVGroup_UIEventShop_Enter1-1 = "짜잔! 여러 가지 준비해 봤어요!"
26011-CVGroup_UIEventShop_Enter2-1 = "여기에요, 선생님! 마음에 드는 걸로 골라주세요!"
26011-CVGroup_UIEventShop_Enter3-1 = "남은 일은 없는지, 체크, 체크하세요~!"
26011-CVGroup_UIEventShop_Idle1-1 = "어라? 뭐 찾으세요?"
26011-CVGroup_UIEventShop_Idle2-1 = "봐주셔야 하는 쪽은 제가 아니라 저쪽인데요……."
26011-CVGroup_UIEventShop_Buy1-1 = "아, 그거요? 좋네요!"
26011-CVGroup_UIEventShop_Buy2-1 = "흐음! 안목이 높으시네요~ ……막 이러고!"
26011-CVGroup_UIEventShop_Buy3-1 = "그걸 찾으셨군요! 납득입니다!"
26011-CVGroup_UIEventShop_Buy4-1 = "오오~ 역시! 저도 그게 좋다고 생각했어요!"

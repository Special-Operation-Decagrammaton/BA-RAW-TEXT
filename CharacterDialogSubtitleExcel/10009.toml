[translation]
10009-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10009-CVGroup_CharacterGet_Idle1-1 = "哇！！你是來找我的嗎？\n一起去吃好吃的東西吧！！"
10009-CVGroup_Cafe_Idle1-1 = "如果有會結出漢堡的樹就太棒了！\n不知道什麼時候會發明出來呢？"
10009-CVGroup_Cafe_Idle2-1 = "好！來找食物！"
10009-CVGroup_Cafe_Idle3-1 = "好，今天也加油吧！"
10009-CVGroup_Cafe_Idle4-1 = "我的專長？\n嗯！當然是吃東西啊！"
10009-CVGroup_Cafe_Idle5-1 = "用餐時間到了\n一定要叫我一聲唷！"
10009-CVGroup_WeaponGet_Idle1-1 = "又多了一個\n享用美食的道具！\n但當然不是筷子之類的東西……\n用這個來嚐遍各種美食吧，老師！"

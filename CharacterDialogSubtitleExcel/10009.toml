[translation]
10009-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10009-CVGroup_CharacterGet_Idle1-1 = "ว้าว!! คุณครูเรียกฉันออกมาใช่ม้า?\nไปกินของอร่อยกันเถอะ!!"
10009-CVGroup_Cafe_Idle1-1 = "อยากให้มีต้นไม้ที่ออกลูกเป็นแฮมเบอร์เกอร์จัง!\nในอนาคตคงจะมีแหละเนอะ"
10009-CVGroup_Cafe_Idle2-1 = "ดีละ! ฉันออกไปหาของกินดีกว่า!"
10009-CVGroup_Cafe_Idle3-1 = "สู้ๆ! วันนี้ก็สู้ๆ นะ!"
10009-CVGroup_Cafe_Idle4-1 = "ความสามารถพิเศษเหรอ?\nจะเป็นอะไรไปได้! ต้องเรื่องกินอยู่แล้ว!"
10009-CVGroup_Cafe_Idle5-1 = "ถ้ามีอะไรอร่อยๆ ก็เรียกกันบ้างสิ?!"
10009-CVGroup_WeaponGet_Idle1-1 = "ตอนนี้ฉันก็ได้อุปกรณ์สำหรับใช้กินของอร่อยๆ เพิ่มมาอีกชิ้นแล้ว!\nถึงจะไม่ใช่พวกตะเกียบก็เถอะ... ใช้อุปกรณ์อันนี้ไปกินของอร่อยๆ กันเถอะคุณครู!"

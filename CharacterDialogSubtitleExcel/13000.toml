[translation]
13000-CVGroup_UITitle_Idle1-1 = "Blue Archive"
13000-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะ นายท่าน\nฉันสัญญาว่าจะรับใช้นายท่านให้ดีที่สุดค่ะ"
13000-CVGroup_Cafe_Idle1-1 = "ที่นี่ทำความสะอาดได้ดีเลยนะคะ\nเห็นได้ชัดว่ามีเมดสาวคอยดูแลอยู่ตลอดสินะคะ"
13000-CVGroup_Cafe_Idle2-1 = "บางครั้ง... ฉันก็เคยกังวลเรื่องการไดเอตอยู่เหมือนกันค่ะ ฮุฮุ"
13000-CVGroup_Cafe_Idle3-1 = "เชิญเลยค่ะ ฉันไปชงชาร้อนให้สักแก้วดีมั้ยคะ?"
13000-CVGroup_Cafe_Idle4-1 = "นายท่าน คุณครู หรือว่า...ที่รัก?\nฮุฮุ ฉันควรจะเรียกแบบไหนดีคะ?"
13000-CVGroup_Cafe_Idle5-1 = "โอ๊ะ เรื่องแบบนี้... เป็นหน้าที่ของฉันอยู่แล้วค่ะ\nฉันมีแรงฮึดขึ้นมาแล้วค่ะ นายท่าน~"
13000-CVGroup_WeaponGet_Idle1-1 = "การได้รับความคาดหวัง เพียงแค่คิดก็ตื่นเต้นแล้วค่ะ\nอาคาเนะจะตอบแทนนายท่าน ด้วยการรับใช้อย่างดีเลยค่ะ"

[translation]
13000-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
13000-CVGroup_CharacterGet_Idle1-1 = "我保證提供最佳服務，在此向主人請安。"
13000-CVGroup_Cafe_Idle1-1 = "這空間清掃得很乾淨。\n一定是有能幹的女僕在待命中。"
13000-CVGroup_Cafe_Idle2-1 = "減肥啊…我有一段時間\n為了減肥的事傷透腦筋呢。呼呼。"
13000-CVGroup_Cafe_Idle3-1 = "歡迎。\n要不要為您準備一杯熱騰騰的紅茶？"
13000-CVGroup_Cafe_Idle4-1 = "主人、老師，還是…達令？\n呵呵。您比較喜歡我怎麼稱呼您呢？"
13000-CVGroup_Cafe_Idle5-1 = "哎呀。這……明明是我該做的事才對……\n我又更有幹勁了唷。主．人。"
13000-CVGroup_WeaponGet_Idle1-1 = "原來別人對我有所期待是這麼令人激動的事。\n朱音一定會用最好的服務來報答主人的。"

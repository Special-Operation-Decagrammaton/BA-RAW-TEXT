[translation]
13000-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
13000-CVGroup_CharacterGet_Idle1-1 = "최고의 봉사를 약속하며. 주인님께 인사 올립니다."
13000-CVGroup_Cafe_Idle1-1 = "이 공간은 잘 청소되어 있군요. 유능한 메이드가 대기 중인 게 분명해요."
13000-CVGroup_Cafe_Idle2-1 = "다이어트라…. 한때 그런 걸 고민하던 시절도 있었죠. 후훗."
13000-CVGroup_Cafe_Idle3-1 = "어서 오세요. 따뜻한 홍차 한 잔, 준비해 드릴까요?"
13000-CVGroup_Cafe_Idle4-1 = "주인님, 선생님, 아니면… 달링?\n후훗. 어떻게 불러드리는 걸 더 좋아하실까요."
13000-CVGroup_Cafe_Idle5-1 = "어머. 이런 건… 제가 할 일인데…\n제가 더 기운이 나버렸잖아요. 주.인.님"
13000-CVGroup_WeaponGet_Idle1-1 = "기대 받는다는 건, 이토록 설레는 일이었군요.\n아카네는, 주인님께 최고의 봉사로 보답하겠습니다."

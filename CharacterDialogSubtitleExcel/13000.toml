[translation]
13000-CVGroup_UITitle_Idle1-1 = "Blue Archive."
13000-CVGroup_CharacterGet_Idle1-1 = "My fondest greetings to you, Master. I pledge to give you only the best service."
13000-CVGroup_Cafe_Idle1-1 = "This room has been kept in perfect order. A very competent maid must work here."
13000-CVGroup_Cafe_Idle2-1 = "Dieting... I do recall a time when I was concerned with such things. Haha."
13000-CVGroup_Cafe_Idle3-1 = "Welcome. Could I interest you in a cup of black tea?"
13000-CVGroup_Cafe_Idle4-1 = "Master, Sensei, or...Darling? Haha. I wonder how you would prefer to be addressed."
13000-CVGroup_Cafe_Idle5-1 = "My. I should be the one...doing this for you. Instead, you're the one who cheered me up, Master."
13000-CVGroup_WeaponGet_Idle1-1 = "To be someone others look forward to seeing is so exciting. I, Akane, will pay this back with my best service, Master."

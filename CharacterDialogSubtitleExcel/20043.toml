[translation]
20043-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20043-CVGroup_CharacterGet_Idle1-1 = "ปีใหม่แล้ว คุณครู! ไปผจญภัยหาอาหารเลิศรสกันเถอะ!"
20043-CVGroup_Cafe_Idle1-1 = "อาหารใหม่ๆ ของปีนี้จะมีอะไรบ้างนะ?"
20043-CVGroup_Cafe_Idle2-1 = "สำ~ รวจ~ อาหาร~ เลิศรส\nโลกที่น่าตื่นเต้น!"
20043-CVGroup_Cafe_Idle3-1 = "อาหารที่เหมาะกับที่นี่จะเป็นอาหารยังไงนะ?"
20043-CVGroup_Cafe_Idle4-1 = "ก่อนอื่นต้องไปเอา\nซอสสูตรพิเศษที่ฉันทำมาแล้วละ!"
20043-CVGroup_Cafe_Idle5-1 = "มีใครชอบทาโกะยากิปลาซาร์ดีนมิ้นต์ช็อกบ้าง?"
20043-CVGroup_WeaponGet_Idle1-1 = "การผจญภัยเพื่ออาหารเลิศรส\nจะมีอันตรายอะไรรออยู่บ้างก็ไม่รู้\nฉันก็เลยจะปกป้องคุณครูด้วยสิ่งนี้ให้เลย!"
20043-CVGroup_UIEventLobby_Enter1-1 = "เอ้า คุณครู! ปีใหม่แล้วนะ~!"
20043-CVGroup_UIEventLobby_Enter1-2 = "มาออกผจญภัยค้นหาอาหารเลิศรสกันมั้ย!"
20043-CVGroup_UIEventLobby_Enter2-1 = "มีอะไรที่อยากกินรึเปล่า คุณครู?"
20043-CVGroup_UIEventLobby_Enter2-2 = "ฉันมีของที่อยากกินเยอะแยะเลย!"
20043-CVGroup_UIEventLobby_Idle1-1 = "ฉันน่ะ แค่เห็นคุณครูกินของที่อยากกินอย่างเอร็ดอร่อย"
20043-CVGroup_UIEventLobby_Idle1-2 = "ก็มีความสุขแล้วละ!"
20043-CVGroup_UIEventLobby_Idle2-1 = "ช่วงเวลาที่ได้อยู่กับคุณครูก็รู้สึกแปลกใหม่ทั้งหมดเลย"
20043-CVGroup_UIEventLobby_Idle2-2 = "ตอนที่ค้นหารสชาติแปลกใหม่น่ะ"
20043-CVGroup_UIEventLobby_Idle3-1 = "ฉันเคยได้ยินมาจากที่ไหนสักแห่ง\nว่าถ้าการออกไปผจญภัยด้วยกันเป็นสิ่งที่ดีน่ะ"
20043-CVGroup_UIEventLobby_Idle3-2 = "เพราะงั้นตอนออกผจญภัยค้นหาอาหารเลิศรส\nคุณครูก็ต้องไปด้วยกันนะ!"
20043-CVGroup_UIEventLobby_Idle4-1 = "ฉันเองก็เป็นสมาชิกชมรมชิมอาหารเหมือนกันนะ!"
20043-CVGroup_UIEventLobby_Idle4-2 = "การผจญภัยค้นหารสชาติใหม่ๆ จะไม่หยุดอยู่แค่นี้หรอก!"
20043-CVGroup_UIEventLobby_Idle4-3 = "นั่นละคือเส้นทางอาหารเลิศรสของฉัน!"

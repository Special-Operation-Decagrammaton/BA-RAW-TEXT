[translation]
20043-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20043-CVGroup_CharacterGet_Idle1-1 = "It's New Year's, Sensei! Would you like to go on a dining adventure?"
20043-CVGroup_Cafe_Idle1-1 = "What new foods are we going to discover this year?"
20043-CVGroup_Cafe_Idle2-1 = "Dining! Adventure! A world of fun?"
20043-CVGroup_Cafe_Idle3-1 = "What kind of food would go well with this?"
20043-CVGroup_Cafe_Idle4-1 = "I should start by bringing out my very own custom special sauce!"
20043-CVGroup_Cafe_Idle5-1 = "Does anyone here like sardine mint takoyaki?"
20043-CVGroup_WeaponGet_Idle1-1 = "You never know what kind of danger awaits on a dining adventure. So I'll protect you with this, Sensei!"
20043-CVGroup_UIEventLobby_Enter1-1 = "Okay, Sensei! It's the new year!"
20043-CVGroup_UIEventLobby_Enter1-2 = "Let's get started on the dining adventure!"
20043-CVGroup_UIEventLobby_Enter2-1 = "Is there anything in particular you're hungry for?"
20043-CVGroup_UIEventLobby_Enter2-2 = "You've got a lot of options!"
20043-CVGroup_UIEventLobby_Idle1-1 = "And you know, even if I'm just sitting back and watching you eat..."
20043-CVGroup_UIEventLobby_Idle1-2 = "...it makes me happy!"
20043-CVGroup_UIEventLobby_Idle2-1 = "Every moment with you feels like a fresh experience."
20043-CVGroup_UIEventLobby_Idle2-2 = "Just like when I discover a new flavor."
20043-CVGroup_UIEventLobby_Idle3-1 = "I heard somewhere that it's good to go on adventures together."
20043-CVGroup_UIEventLobby_Idle3-2 = "So when I go on a dining adventure, it's going to be with you, Sensei!"
20043-CVGroup_UIEventLobby_Idle4-1 = "I'm also part of the Gourmet Research Society!"
20043-CVGroup_UIEventLobby_Idle4-2 = "The search for new flavors never ends!"
20043-CVGroup_UIEventLobby_Idle4-3 = "That's my path to gastronomy!"

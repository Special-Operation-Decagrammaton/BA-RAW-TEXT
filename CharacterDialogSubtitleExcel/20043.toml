[translation]
20043-CVGroup_UITitle_Idle1-1 = "블루, 아카이브!"
20043-CVGroup_CharacterGet_Idle1-1 = "새해야, 선생님! 미식 모험, 떠나지 않을래?"
20043-CVGroup_Cafe_Idle1-1 = "올해의 새로운 음식에는 뭐가 있을까?"
20043-CVGroup_Cafe_Idle2-1 = "미~식~탐~험~ 신나는 세계!"
20043-CVGroup_Cafe_Idle3-1 = "여기에 어울리는 음식은 어떤 걸까?"
20043-CVGroup_Cafe_Idle4-1 = "우선 내가 만든 특제 소스를 가져와야지!"
20043-CVGroup_Cafe_Idle5-1 = "정어리 민트 타코야키 좋아하는 사람?"
20043-CVGroup_WeaponGet_Idle1-1 = "미식 모험에는 어떤 위험이 기다리고 있을지 몰라.\n그러니까 내가 이걸로 선생님을 지켜 줄게!"
20043-CVGroup_UIEventLobby_Enter1-1 = "자 선생님! 새해야~!"
20043-CVGroup_UIEventLobby_Enter1-2 = "미식 모험을\n시작해 볼까!"
20043-CVGroup_UIEventLobby_Enter2-1 = "뭔가 먹고 싶은 거 있어,\n선생님?"
20043-CVGroup_UIEventLobby_Enter2-2 = "나는 아주 많아!"
20043-CVGroup_UIEventLobby_Idle1-1 = "나는 말이야.\n선생님이 맛있게\n먹고 있는 걸 그냥\n바라만 보고 있어도,"
20043-CVGroup_UIEventLobby_Idle1-2 = "충분히 행복해!"
20043-CVGroup_UIEventLobby_Idle2-1 = "선생님과 있는 시간은\n모든 게 새로워."
20043-CVGroup_UIEventLobby_Idle2-2 = "새로운 맛을\n찾았을 때처럼, 말이지."
20043-CVGroup_UIEventLobby_Idle3-1 = "어딘가에서 들었는데,\n모험은 같이\n떠나는 게 좋대."
20043-CVGroup_UIEventLobby_Idle3-2 = "그러니까 미식 모험을\n떠날 때에는,\n선생님도 함께야!"
20043-CVGroup_UIEventLobby_Idle4-1 = "나도 미식연구회의\n일원이라구!"
20043-CVGroup_UIEventLobby_Idle4-2 = "새로운 맛을 찾는\n모험은 멈추지 않아!"
20043-CVGroup_UIEventLobby_Idle4-3 = "그것이 나의 미식도!"

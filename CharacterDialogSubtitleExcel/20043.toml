[translation]
20043-CVGroup_UITitle_Idle1-1 = "蔚藍～檔案！"
20043-CVGroup_CharacterGet_Idle1-1 = "新年快樂～！老師！\n今天也朝美食的冒險出發吧！"
20043-CVGroup_Cafe_Idle1-1 = "今年會遇見什麼樣的味道呢～？"
20043-CVGroup_Cafe_Idle2-1 = "美～食的～探～險～真令人期待！"
20043-CVGroup_Cafe_Idle3-1 = "這裡的話……我好像想吃那個！"
20043-CVGroup_Cafe_Idle4-1 = "首先得把「我特製．祕傳醬汁」帶來才行！"
20043-CVGroup_Cafe_Idle5-1 = "沙丁魚薄荷章魚燒，要不要吃呀？"
20043-CVGroup_WeaponGet_Idle1-1 = "美食的冒險，有時也伴隨著危險……\n所以，我會保護老師的！"
20043-CVGroup_UIEventLobby_Enter1-1 = "來吧，老師！新年到囉～！"
20043-CVGroup_UIEventLobby_Enter1-2 = "開始追尋美食的冒險吧！"
20043-CVGroup_UIEventLobby_Enter2-1 = "有什麼想吃的嗎？"
20043-CVGroup_UIEventLobby_Enter2-2 = "我的話呢，這些跟那些全～都想吃！"
20043-CVGroup_UIEventLobby_Idle1-1 = "光是看著老師吃得津～津有味的樣子，"
20043-CVGroup_UIEventLobby_Idle1-2 = "就會有種非常幸福的感覺！"
20043-CVGroup_UIEventLobby_Idle2-1 = "跟老師待在一起，就會有很多發現！"
20043-CVGroup_UIEventLobby_Idle2-2 = "就像遇見新滋味的時候一樣，讓人心動動！"
20043-CVGroup_UIEventLobby_Idle3-1 = "聽說有句話叫「冒險要與夥伴同行」！"
20043-CVGroup_UIEventLobby_Idle3-2 = "展開美食冒險的時候，老師也一起去吧～！"
20043-CVGroup_UIEventLobby_Idle4-1 = "我也是美食研究會的一員嘛！"
20043-CVGroup_UIEventLobby_Idle4-2 = "尋找新滋味的冒險將永無止境！"
20043-CVGroup_UIEventLobby_Idle4-3 = "這就是我的美食之道！"

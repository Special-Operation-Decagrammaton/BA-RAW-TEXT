[translation]
16020-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
16020-CVGroup_CharacterGet_Idle1-1 = "오우, 잘 지냈어?\n제대로 인사하는 건 처음이려나.\nFOX 소대의 저격수, 텐진야마 오토기야.\n앞으로 잘 부탁할게, 선생님."
16020-CVGroup_Cafe_Idle1-1 = "(졸려… 커피 한잔 마시고 싶네…)"
16020-CVGroup_Cafe_Idle2-1 = "……좋아!\n막간을 이용해서 근력 운동이나 할까?"
16020-CVGroup_Cafe_Idle3-1 = "오우, 다들 기합이 넘치는걸?"
16020-CVGroup_Cafe_Idle4-1 = "(교정국에서 본 녀석이 있는 것 같은데…)"
16020-CVGroup_Cafe_Idle5-1 = "오, 후루젤리의 신상 굿즈.\n일단 찍어둘까."
16020-CVGroup_WeaponGet_Idle1-1 = "FOX 82식 대물저격총, 수령 완료.\n초장거리 저격이나 장애물을 격파할 때는 이만한 물건이 없지만……\n연달아 쏘다보면 어깨가 뻐근해진단 말이지."
16020-CVGroup_UIEventLobby_Enter1-1 = "드디어 작전 시작인가……"
16020-CVGroup_UIEventLobby_Enter1-2 = "텐션 오르는걸~"
16020-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었어.\n선생님이 없으면 작전을\n시작할 수 없으니까."
16020-CVGroup_UIEventLobby_Idle1-1 = "<로어 추적 작전>\n이라니……"
16020-CVGroup_UIEventLobby_Idle1-2 = "로어라는 게\n실제로 추적이\n가능한 존재이긴 한가?"
16020-CVGroup_UIEventLobby_Idle2-1 = "응? 나, 불렀어?"
16020-CVGroup_UIEventLobby_Idle3-1 = "니코가 만들어 준\n유부초밥은 언제\n먹어도 별미란 말이지."
16020-CVGroup_UIEventLobby_Idle4-1 = "유키노가\n신경 쓰이는걸……"
16020-CVGroup_UIEventLobby_Idle4-2 = "아직도 전의 일을\n신경 쓰고 있는 걸까."
16020-CVGroup_UIEventMission_Enter1-1 = "아, 선생님.\n마침 잘 왔어."
16020-CVGroup_UIEventMission_Enter1-2 = "안 그래도 물어보고 싶은\n사건 리스트가 있었거든."
16020-CVGroup_UIEventMission_Enter2-1 = "아, 잠깐 괜찮을까?"
16020-CVGroup_UIEventMission_Enter2-2 = "부탁하고 싶은 일이\n몇 가지 있어서."
16020-CVGroup_UIEventMission_Idle1-1 = "응? 머리카락을 왜\n빤히 쳐다보는 거야?"
16020-CVGroup_UIEventMission_Idle1-2 = "뭔가\n신경 쓰이는 거라도 있어?"
16020-CVGroup_UIEventMission_Idle1-3 = "아아, 협소한 장소에서는\n머리가 걸릴 수도 있으니까."
16020-CVGroup_UIEventMission_Idle1-4 = "매일 직접 땋고 있거든."
16020-CVGroup_UIEventMission_Idle1-5 = "귀찮아서 잘라버릴까\n생각도 했지만……"
16020-CVGroup_UIEventMission_Idle1-6 = "이만큼 기르고 나니\n어쩐지 아까워져서."
16020-CVGroup_UIEventMission_Idle2-1 = "우, 우왓?!\n찌르지 말아줄래?"
16020-CVGroup_UIEventMission_Idle2-2 = "……갑자기\n뒤에서 습격당하는 건\n별로 좋아하지 않거든."
16020-CVGroup_UIEventMission_Buy1-1 = "호오… 과연."
16020-CVGroup_UIEventMission_Buy1-2 = "역시 소문이 자자한 데에는\n이유가 있었네."
16020-CVGroup_UIEventMission_Buy2-1 = "벌써 끝난 거야?\n……빠르네."
16020-CVGroup_UIEventMission_Buy2-2 = "이런 실력이라면\n'지휘관'이라고 부르는 게\n더 어울리려나?"
16020-CVGroup_UIEventMission_Interaction1-1 = "음, 오늘은\n이만하면 충분해.\n수고 많았어!"

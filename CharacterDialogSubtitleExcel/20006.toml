[translation]
20006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20006-CVGroup_CharacterGet_Idle1-1 = "มีเรื่องอะไรล่ะ ฉันกำลังพักผ่อนอยู่นะ...\nแต่ถ้าคุณครูเรียกละก็... ช่วยไม่ได้นะ"
20006-CVGroup_Cafe_Idle1-1 = "มีเครื่องดื่มที่เป็นรสชีสรึเปล่านะ?"
20006-CVGroup_Cafe_Idle2-1 = "ที่นี่เหมาะที่จะใช้พักผ่อนในวันหยุดจริงๆ"
20006-CVGroup_Cafe_Idle3-1 = "ของชิ้นนี้... เอาไปใช้ทดลองได้มั้ยนะ?"
20006-CVGroup_Cafe_Idle4-1 = "ไม่เป็นไรหรอก ไม่ต้องกลัวหรอกนะ เนสึซึเกะ"
20006-CVGroup_Cafe_Idle5-1 = "โอ้... นี่มัน..."
20006-CVGroup_WeaponGet_Idle1-1 = "ท่านซายะน่ะ นอกจากด้านการวิจัยแล้ว\nก็เชี่ยวชาญเรื่องการยิงปืนด้วยนะ!"
20006-CVGroup_UIEventLobby_Enter1-1 = "ยินดีต้อนรับสู่โรงเรียนมัธยมซานไห่จิงนะ คุณครู!"
20006-CVGroup_UIEventLobby_Enter2-1 = "ฮุฮุฮุ...คงไม่ได้ลืมสัญญาหรอกใช่มั้ย? คุณครู"
20006-CVGroup_UIEventLobby_Idle1-1 = "ผู้ฝึกสอนชุนหายไปไหนนะ..."
20006-CVGroup_UIEventLobby_Idle2-1 = "ฮุฮุฮุ... วันที่จะทำยาอายุวัฒนะสำเร็จใกล้เข้ามาแล้วล่ะ!"
20006-CVGroup_UIEventLobby_Idle3-1 = "แปลกจัง... ไม่ได้ใส่วัตถุดิบอื่น\nลงไปใน \"น้ำยาแห่งความอ่อนเยาว์\" เลยแท้ๆ...."
20006-CVGroup_UIEventLobby_Idle4-1 = "หรือว่าระหว่างที่ปรุงยาอยู่"
20006-CVGroup_UIEventLobby_Idle4-2 = "จะมีขนของเนสึซึเกะหล่นลงไปในนั้นด้วย?!"
20006-CVGroup_UIEventShop_Enter1-1 = "ขอต้อนรับสู่ห้องทดลองเฉพาะกิจ\nของท่านซายะ คุณครู!"
20006-CVGroup_UIEventShop_Enter2-1 = "ถ้ามีวัตถุดิบดีๆ สำหรับการวิจัยละก็...\nแพงเท่าไหร่ฉันก็จะซื้อ!"
20006-CVGroup_UIEventShop_Idle1-1 = "ของทุกอย่างที่มีอยู่ในโลกนี้\nสามารถสร้างขึ้นได้ด้วยการวิจัย!\n"
20006-CVGroup_UIEventShop_Idle2-1 = "อืม... หินสีฟ้าที่คุณครูพูดถึง...\nท่านซายะเองก็ไม่รู้จักเหมือนกัน..."
20006-CVGroup_UIEventShop_Enter3-1 = "ห้องทดลองเฉพาะกิจนี้น่ะไม่ได้จะเปิดนานๆ หรอกนะ"
20006-CVGroup_UIEventShop_Enter3-2 = "เพราะงั้นถ้ามีวัตถุดิบวิจัยดีๆ ละก็ รีบๆ เอามาแลกไปสิ"
20006-CVGroup_UIEventShop_Enter4-1 = "ช่วงนี้ย่านการค้ารอบๆ นี้ดูน่าสงสัยมากๆ เลย..."
20006-CVGroup_UIEventShop_Enter4-2 = "สงสัยจะต้องรีบปิดห้องทดลองเฉพาะกิจนี้แล้วล่ะ"
20006-CVGroup_UIEventShop_Enter5-1 = "ห้องทดลองเฉพาะกิจจะเปิดถึงแค่วันนี้เท่านั้นนะ"
20006-CVGroup_UIEventShop_Enter5-2 = "เพราะงั้นถ้ามีวัตถุดิบที่ต้องการก็รีบๆ เข้าล่ะ"
20006-CVGroup_UIEventShop_Enter6-1 = "ห้องทดลองเฉพาะกิจปิดทำการแล้วล่ะ"
20006-CVGroup_UIEventShop_Enter6-2 = "แต่ถ้ามีวัตถุดิบเหลืออยู่ละก็ ส่งมาให้ท่านซายะดูสิ"
20006-CVGroup_UIEventShop_Buy1-1 = "เลือกได้ดีเลยนี่"
20006-CVGroup_UIEventShop_Buy2-1 = "ฮุฮุ ขอบคุณนะที่รวบรวมวัตถุดิบดีๆ มาให้"
20006-CVGroup_UIEventShop_Buy3-1 = "โอ้... เลือกได้ยอดเยี่ยมไปเลย!"

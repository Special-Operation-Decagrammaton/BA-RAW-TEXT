[translation]
20006-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20006-CVGroup_CharacterGet_Idle1-1 = "有什麼事啊，明明是難得的休假……\n算了，既然是老師找我那也沒辦法。"
20006-CVGroup_Cafe_Idle1-1 = "不知道有沒有起司口味的飲料？"
20006-CVGroup_Cafe_Idle2-1 = "真是個適合度過假期的地方。"
20006-CVGroup_Cafe_Idle3-1 = "這個，能不能用來實驗呢？"
20006-CVGroup_Cafe_Idle4-1 = "來，不用害怕哦，根津助。"
20006-CVGroup_Cafe_Idle5-1 = "哦齁～\n這還挺……"
20006-CVGroup_WeaponGet_Idle1-1 = "我不只擅長研究，射擊的能力也是天才哦！"
20006-CVGroup_UIEventLobby_Enter1-1 = "歡迎來到山海經高級中學，老師！"
20006-CVGroup_UIEventLobby_Enter2-1 = "哼哼哼。\n今天的約定當然還記得吧，老師？"
20006-CVGroup_UIEventLobby_Idle1-1 = "旬教官跑哪去了……？"
20006-CVGroup_UIEventLobby_Idle2-1 = "哼哼哼。製作出不老不死靈藥的日子已經不遠了！"
20006-CVGroup_UIEventLobby_Idle3-1 = "真奇怪……\n「回春秘藥」裡應該沒有加入什麼奇怪的東西才對……"
20006-CVGroup_UIEventLobby_Idle4-1 = "……難道是在煮沸的時候，"
20006-CVGroup_UIEventLobby_Idle4-2 = "飛在空中的根津助的毛混進去了嗎！？"
20006-CVGroup_UIEventShop_Enter1-1 = "歡迎來到我的校外研究所，老師！"
20006-CVGroup_UIEventShop_Enter2-1 = "如果有好的煉丹術材料，我會用高價收購！"
20006-CVGroup_UIEventShop_Idle1-1 = "存在於世界上的幾乎所有東西，\n都是煉丹術創造出來的！"
20006-CVGroup_UIEventShop_Idle2-1 = "唔嗯……關於老師說的那個「藍色的石頭」，\n我也不是很清楚……"
20006-CVGroup_UIEventShop_Enter3-1 = "這個校外研究所只不過是臨時的而已。"
20006-CVGroup_UIEventShop_Enter3-2 = "所以如果有什麼想要的材料，最好提早入手哦。"
20006-CVGroup_UIEventShop_Enter4-1 = "最近總覺得商會的氣氛很奇怪……"
20006-CVGroup_UIEventShop_Enter4-2 = "這個校外研究所，或許早點關門比較好呢。"
20006-CVGroup_UIEventShop_Enter5-1 = "校外研究所今天就結束營業了。"
20006-CVGroup_UIEventShop_Enter5-2 = "如果有需要的材料，早點交換比較好哦？"
20006-CVGroup_UIEventShop_Enter6-1 = "校外研究所，營業結束！"
20006-CVGroup_UIEventShop_Enter6-2 = "啊，可是，如果還有剩下的材料，請務必讓我看看！"
20006-CVGroup_UIEventShop_Buy1-1 = "是個不錯的選擇！"
20006-CVGroup_UIEventShop_Buy2-1 = "呵呵，謝謝你幫我收集好的素材。"
20006-CVGroup_UIEventShop_Buy3-1 = "哦哦，真是明智的選擇！"

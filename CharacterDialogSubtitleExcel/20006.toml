[translation]
20006-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
20006-CVGroup_CharacterGet_Idle1-1 = "무슨 일인 것이냐, 모처럼의 휴일이었는데…\n뭐, 선생의 호출이라면 어쩔 수 없는 것이다."
20006-CVGroup_Cafe_Idle1-1 = "치즈맛이 나는 음료는 없을까?"
20006-CVGroup_Cafe_Idle2-1 = "휴일을 보내기에 좋은 장소인 것이다."
20006-CVGroup_Cafe_Idle3-1 = "이 물건, 실험에 쓸 순 없으려나?"
20006-CVGroup_Cafe_Idle4-1 = "괜찮아. 무서워 하지 마, 네즈스케."
20006-CVGroup_Cafe_Idle5-1 = "오호라, 이건 제법……"
20006-CVGroup_WeaponGet_Idle1-1 = "나님은 연구 뿐만 아니라 사격에도 능한 천재인 것이다!"
20006-CVGroup_UIEventLobby_Enter1-1 = "산해경 고급중학교에 어서 오는 것이다, 선생!"
20006-CVGroup_UIEventLobby_Enter2-1 = "후-후-후. 오늘 약속은 잊지 않았겠지, 선생?"
20006-CVGroup_UIEventLobby_Idle1-1 = "슌 교관은 어디에 간 것이냐……."
20006-CVGroup_UIEventLobby_Idle2-1 = "후-후-후. 불로불사의 영약을 만들 날도 머지 않은 것이다!"
20006-CVGroup_UIEventLobby_Idle3-1 = "이상하다…… '회춘의 비약'에 다른 재료는 들어가지 않았는데……."
20006-CVGroup_UIEventLobby_Idle4-1 = "설마 비약을 끓이는 동안"
20006-CVGroup_UIEventLobby_Idle4-2 = "네즈스케의 털이 섞여 들어간건가?!"
20006-CVGroup_UIEventShop_Enter1-1 = "나님의 출장 연구소에 어서 오는 것이다, 선생!"
20006-CVGroup_UIEventShop_Enter2-1 = "괜찮은 연단술 재료가 있다면 나님이 비싸게 매입할게!"
20006-CVGroup_UIEventShop_Idle1-1 = "세상에 존재하는 모든 물질은 연단술로 만들어낼 수 있는 것이다!"
20006-CVGroup_UIEventShop_Idle2-1 = "으음…… 선생이 말하는 그 파란색 돌은 나님도 잘 모르겠는데……."
20006-CVGroup_UIEventShop_Enter3-1 = "출장 연구소는 어디까지나 임시니까."
20006-CVGroup_UIEventShop_Enter3-2 = "그러니 괜찮은 연단술 재료를 구하거든 미리미리 바꿔가는 것이다."
20006-CVGroup_UIEventShop_Enter4-1 = "요새 주변 상회의 분위기가 심상치 않은 것이다……."
20006-CVGroup_UIEventShop_Enter4-2 = "이 출장 연구소도 빨리 문을 닫아야겠어."
20006-CVGroup_UIEventShop_Enter5-1 = "출장 연구소의 영업은 오늘까지인 것이다."
20006-CVGroup_UIEventShop_Enter5-2 = "그러니 혹시 필요한 재료가 있다면 서둘러."
20006-CVGroup_UIEventShop_Enter6-1 = "출장 연구소는 영업 종료인 것이다."
20006-CVGroup_UIEventShop_Enter6-2 = "하지만 혹시라도 남은 재료가 있다면 나님에게 보여줘."
20006-CVGroup_UIEventShop_Buy1-1 = "나쁘지 않은 선택이야!"
20006-CVGroup_UIEventShop_Buy2-1 = "후후, 좋은 재료를 모아와줘서 고마워."
20006-CVGroup_UIEventShop_Buy3-1 = "오오, 탁월한 선택인 것이다!"

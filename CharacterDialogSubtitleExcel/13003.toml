[translation]
13003-CVGroup_UITitle_Idle1-1 = "Blue Archive"
13003-CVGroup_CharacterGet_Idle1-1 = "ฮาเนกาวะ ฮาสุมิ ชมรมทวงความยุติธรรมค่ะ\nรอคำสั่งจากคุณครูอยู่ค่ะ"
13003-CVGroup_Cafe_Idle1-1 = "สักวันหนึ่ง ฉันเอง...\nก็อยากจะลองใส่กระโปรงสั้นๆ..."
13003-CVGroup_Cafe_Idle2-1 = "ที่นี่ถูกใจฉันมากเลย\nรู้สึกอยากมาบ่อยๆ เลยค่ะ"
13003-CVGroup_Cafe_Idle3-1 = "ได้มีเวลาว่างแบบนี้บ้าง\nก็ดีเหมือนกันนะคะ"
13003-CVGroup_Cafe_Idle4-1 = "ถึงจะดูน่าอร่อยก็ตาม...\nแต่ก็ต้องอดทนไว้ค่ะ"
13003-CVGroup_Cafe_Idle5-1 = "กฎของชมรมทวงความยุติธรรมเรียบง่ายมากค่ะ\nก็คือไม่ยกโทษให้กับความอยุติธรรมทุกเรื่อง"
13003-CVGroup_WeaponGet_Idle1-1 = "ความแข็งแกร่งที่คุณครูมอบให้...\nฉันจะรักษาไว้อย่างดีเลยค่ะ"

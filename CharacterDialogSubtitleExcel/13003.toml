[translation]
13003-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
13003-CVGroup_CharacterGet_Idle1-1 = "實現正義部，羽川蓮實。\n正在等候老師的指示。"
13003-CVGroup_Cafe_Idle1-1 = "總有一天我也要穿可愛的迷你裙…"
13003-CVGroup_Cafe_Idle2-1 = "這個空間，我很喜歡。\n不管幾次都想來呢。"
13003-CVGroup_Cafe_Idle3-1 = "偶爾有這種閒暇也不錯呢。"
13003-CVGroup_Cafe_Idle4-1 = "雖然有看起來很好吃的東西…\n不過要忍耐才行。"
13003-CVGroup_Cafe_Idle5-1 = "實現正義部的原則很簡單。\n不饒恕不義，僅此而已。"
13003-CVGroup_WeaponGet_Idle1-1 = "老師給我的這份力量…\n我會珍惜地使用的。"

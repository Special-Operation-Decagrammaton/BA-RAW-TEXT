[translation]
10121-CVGroup_UITitle_Idle1-1 = "蔚藍～！檔案～！"
10121-CVGroup_CharacterGet_Idle1-1 = "百花繚亂紛爭調停委員會，勘解由小路紫……\n華麗地夏日～出道～的說！\n在海邊也會大顯身手的哦！"
10121-CVGroup_Cafe_Idle1-1 = "無論何時何地，小女子都是完～美！的說！"
10121-CVGroup_Cafe_Idle2-1 = "啊啊！這就是老師說過的……！"
10121-CVGroup_Cafe_Idle3-1 = "這是……？\n所謂的海邊禮儀，之類的東西嗎？"
10121-CVGroup_Cafe_Idle4-1 = "好像有點冷……哈啾！"
10121-CVGroup_Cafe_Idle5-1 = "哼～哼哼～超無敵的～紫出動啦～♪"
10121-CVGroup_WeaponGet_Idle1-1 = "這是小女子和老師約定的象徵。\n每當看到它的時候，小女子都一定會想起老師吧。\n真是的……老師可真壞心眼。"
10121-CVGroup_UIEventLobby_Enter1-1 = "您請看，老師！是大海呢，大海！"
10121-CVGroup_UIEventLobby_Enter2-1 = "哼哼～♪ 蒼藍～匯入水中流淌無盡～"
10121-CVGroup_UIEventLobby_Enter2-2 = "正是大海！的說！"
10121-CVGroup_UIEventLobby_Enter3-1 = "沒想到會有跟前輩們同台較勁的這天……"
10121-CVGroup_UIEventLobby_Enter3-2 = "不，不過身為百花繚亂的菁～英和希望之星的小女子！"
10121-CVGroup_UIEventLobby_Enter3-3 = "可不會這麼輕易就退讓的！"
10121-CVGroup_UIEventLobby_Enter4-1 = "是期待已久的……高潮時刻！的說！"
10121-CVGroup_UIEventLobby_Enter4-2 = "怎，怎麼辦，老師！\n小女子因為太緊張的關係，手都在發抖了！"
10121-CVGroup_UIEventLobby_Enter5-1 = "在這短短的時間裡，感覺前輩們的氣氛似乎變了呢。"
10121-CVGroup_UIEventLobby_Enter5-2 = "但是大家，都比任何時候更加閃耀！"
10121-CVGroup_UIEventLobby_Idle1-1 = "……桔梗前輩和蓮華前輩從很久以前就認識了。"
10121-CVGroup_UIEventLobby_Idle1-2 = "也就是所謂的青梅竹馬。"
10121-CVGroup_UIEventLobby_Idle1-3 = "他們兩位想必……"
10121-CVGroup_UIEventLobby_Idle1-4 = "有著許多小女子不知道的回憶吧。"
10121-CVGroup_UIEventLobby_Idle1-5 = "這麼一想，總覺得有點寂寞……"
10121-CVGroup_UIEventLobby_Idle2-1 = "老師？為何這樣一直盯著……？"
10121-CVGroup_UIEventLobby_Idle2-2 = "方便的話，要不要跟小女子一起去玩呢！？"
10121-CVGroup_UIEventLobby_Idle3-1 = "呵呵，老師真是的。"
10121-CVGroup_UIEventLobby_Idle3-2 = "如果您說想去見學的話，小女子也會陪同的。"
10121-CVGroup_UIEventLobby_Idle4-1 = "總覺得大家，好像都很習慣大海呢。"
10121-CVGroup_UIEventLobby_Idle4-2 = "難道只有小女子是海邊新手……嗎！？"
10121-CVGroup_UIEventShop_Enter1-1 = "哇！有好多神奇的東西！"
10121-CVGroup_UIEventShop_Enter1-2 = "老師，您想先看哪一個呢？"
10121-CVGroup_UIEventShop_Enter2-1 = "繽紛的色彩完全看不膩呢！\n真令人興奮～！"
10121-CVGroup_UIEventShop_Enter3-1 = "啊啊……快樂的時光真是轉瞬即逝……"
10121-CVGroup_UIEventShop_Enter3-2 = "不過，這些失落的心情，會在回去之前全部拋開的！"
10121-CVGroup_UIEventShop_Idle1-1 = "小女子也知道！\n這就是Window Shopping對吧！"
10121-CVGroup_UIEventShop_Idle2-1 = "呵呵，不必擔心。\n小女子隨時在您身旁。"
10121-CVGroup_UIEventShop_Buy1-1 = "哇啊！小女子也想近距離看看！"
10121-CVGroup_UIEventShop_Buy2-1 = "呼呣，老師原來有這樣的興趣嗎？"
10121-CVGroup_UIEventShop_Buy3-1 = "真有眼光！的說♪"
10121-CVGroup_UIEventShop_Buy4-1 = "哼～哼哼～\n該選哪個好呢～♪"

[translation]
10121-CVGroup_UITitle_Idle1-1 = "Blue~! Archive~!"
10121-CVGroup_CharacterGet_Idle1-1 = "คาเดโนะโคจิ ยูคาริ จากคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน...\nขอเดบิว~ รับฤดูร้อนอย่างเฉิดฉายเจ้าค่ะ!\nต่อให้อยู่ในชายหาด~ ข้าก็จะโชว์ฝีมือเต็มที่เจ้าค่ะ!"
10121-CVGroup_Cafe_Idle1-1 = "ไม่ว่าที่ไหนเมื่อไร ข้าก็จะเผชิญหน้า\nอย่างเพอร์เฟกต์โตะ~ เจ้าค่ะ!"
10121-CVGroup_Cafe_Idle2-1 = "อ๊ะ! นี่คือสิ่งที่ท่านอาจารย์เคยพูดถึง!"
10121-CVGroup_Cafe_Idle3-1 = "ส่วนนี่คือ...? เอชิ~เคโตะ~ เวลามาทะเลสินะเจ้าคะ?"
10121-CVGroup_Cafe_Idle4-1 = "ชุดนี้มันออกจะหนาวๆ หน่อยนะ... ฮัดชิ้ว!"
10121-CVGroup_Cafe_Idle5-1 = "ฮืม~ ฮืมม~♪ เรือรบไร้พ่าย\nยูคาริปรากฏตัวแล้วเจ้าค่ะ~♪"
10121-CVGroup_WeaponGet_Idle1-1 = "ของขวัญนี้คือคำสัญญาระหว่างข้ากับท่านอาจารย์เจ้าค่ะ\nข้าจะเก็บไว้ในอ้อมแขน ทุกครั้งที่หยิบมาดูก็คง\nคิดถึงท่านอาจารย์นะเจ้าคะ ว่าเหตุใดถึงขี้แกล้งแบบนี้น่ะเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Enter1-1 = "ดูสิเจ้าคะ ท่านอาจารย์! ทะเลเจ้าค่ะ! ทะเล!"
10121-CVGroup_UIEventLobby_Enter2-1 = "ฮืม~♪ น้ำทะเลสีฟ้าสุดลูกหูลูกตาเลย~"
10121-CVGroup_UIEventLobby_Enter2-2 = "ทะเลเป็นอย่างนี้เองสินะเจ้าคะ!"
10121-CVGroup_UIEventLobby_Enter3-1 = "ไม่คิดเลยว่าจะมีวันที่ได้แข่งขันกับเหล่ารุ่นพี่ในสวนน้ำด้วย..."
10121-CVGroup_UIEventLobby_Enter3-2 = "ตะ... แต่ในฐานะอิล~ ลีทที่ถูกคาดหวัง\nและผู้เป็นความหวังของเฮียกกะเรียวรันแล้ว"
10121-CVGroup_UIEventLobby_Enter3-3 = "ข้าก็จะไม่ยอมแพ้ง่ายๆ หรอกเจ้าค่ะ!"
10121-CVGroup_UIEventLobby_Enter4-1 = "จากนี้คือคุไร~ มักกุสึ~ ที่ยิ่งใหญ่เจ้าค่ะ!"
10121-CVGroup_UIEventLobby_Enter4-2 = "ทำยังไงดีเจ้าคะท่านอาจารย์!\nข้าประหม่าจนมือสั่นไปหมดแล้วเจ้าค่ะ!"
10121-CVGroup_UIEventLobby_Enter5-1 = "ในช่วงเวลาสั้นๆ ข้ารู้สึกได้ว่าบรรยากาศ\nของรุ่นพี่เปลี่ยนไปเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Enter5-2 = "แต่ทุกคนก็เปล่งประกายมากกว่าในทุกครั้งเลยเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Idle1-1 = "รุ่นพี่คิเคียว... กับรุ่นพี่เรนเกะ รู้จักกันมานานแล้วเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Idle1-2 = "เป็นเพื่อนสมัยเด็กกันน่ะเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Idle1-3 = "ระหว่างรุ่นพี่ทั้งสองน่าจะมีเรื่องราว"
10121-CVGroup_UIEventLobby_Idle1-4 = "ที่ข้ายังไม่รู้มากมายเลยเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Idle1-5 = "พอคิดแบบนั้น ก็รู้สึกเหงาขึ้นมาหน่อยนะเจ้าคะ..."
10121-CVGroup_UIEventLobby_Idle2-1 = "ท่านอาจารย์? ทำไมถึงเอาแต่จ้องกันล่ะเจ้าคะ?"
10121-CVGroup_UIEventLobby_Idle2-2 = "เลิกจ้องกัน แล้วไปเที่ยวเล่นกับข้าเถอะเจ้าค่ะ!"
10121-CVGroup_UIEventLobby_Idle3-1 = "ฮุฮุ ท่านอาจารย์นี่ละก็"
10121-CVGroup_UIEventLobby_Idle3-2 = "ถ้าอยากนั่งดูอะไรอยู่ตรงนี้เฉยๆ\nข้าก็จะอยู่ด้วยเจ้าค่ะ"
10121-CVGroup_UIEventLobby_Idle4-1 = "ทุกคนดูคุ้นเคยกับทะเลจังเลยนะเจ้าคะ"
10121-CVGroup_UIEventLobby_Idle4-2 = "อาจจะมีข้าคนเดียวที่เป็นบิกินา~\nเรื่องทะเลก็ได้นะ?! ว่ามั้ยเจ้าคะ?!"
10121-CVGroup_UIEventShop_Enter1-1 = "ว้าว~ มีของน่าตื่นเต้นอยู่ทุกที่เลยเจ้าค่ะ!"
10121-CVGroup_UIEventShop_Enter1-2 = "ท่านอาจารย์จะดูอะไรก่อนเจ้าคะ?!"
10121-CVGroup_UIEventShop_Enter2-1 = "ตื่นเต้นจัง! ของฉูดฉาดบาดตา\nแค่ดูเฉยๆ ก็สนุกแล้วเจ้าค่ะ!"
10121-CVGroup_UIEventShop_Enter3-1 = "อ่า~ ช่วงเวลาที่สนุกผ่านไปเร็วจังเลยนะเจ้าคะ~"
10121-CVGroup_UIEventShop_Enter3-2 = "ก่อนกลับก็ทิ้งความรู้สึกเสียดายไว้ให้หมดนะเจ้าคะ!"
10121-CVGroup_UIEventShop_Idle1-1 = "ข้าก็รู้จักค่ะ! นี่คืออาย~ ช้อปปิ้งกุ~ ใช่มั้ยเจ้าคะ?"
10121-CVGroup_UIEventShop_Idle2-1 = "ฮุฮุ ไม่ต้องกังวลนะเจ้าคะ\nข้าจะอยู่ข้างๆ ตลอดเจ้าค่ะ"
10121-CVGroup_UIEventShop_Buy1-1 = "ว้าว! ข้าก็อยากดูใกล้ๆ เหมือนกันเจ้าค่ะ!"
10121-CVGroup_UIEventShop_Buy2-1 = "โอ้โห~ ท่านอาจารย์มีรสนิยมแบบนี้สินะเจ้าคะ?"
10121-CVGroup_UIEventShop_Buy3-1 = "ตาถึงมากเลยเจ้าค่ะ คุณลูกค้า~!♪"
10121-CVGroup_UIEventShop_Buy4-1 = "ฮืม~♪ เลือกอันไหนดีน้า~"

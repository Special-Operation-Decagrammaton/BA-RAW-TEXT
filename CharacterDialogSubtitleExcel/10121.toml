[translation]
10121-CVGroup_UITitle_Idle1-1 = "블루~! 아카이브~!"
10121-CVGroup_CharacterGet_Idle1-1 = "백화요란 분쟁조정위원회, 카데노코지 유카리……\n화려하게 여름 데뷔~ 이와요!\n비~치에서도 멋지게 활약해 보겠사와요!"
10121-CVGroup_Cafe_Idle1-1 = "언제 어디서나 퍼어~펙투한 모습으로 임하겠사와요!"
10121-CVGroup_Cafe_Idle2-1 = "앗! 이것은 선생님이 전에 말씀하신!"
10121-CVGroup_Cafe_Idle3-1 = "이것은……? 바다의 에튀~켓~ 이라는 걸까요?"
10121-CVGroup_Cafe_Idle4-1 = "이 복장은 조금 쌀쌀한 듯한…… 푸엥힛!"
10121-CVGroup_Cafe_Idle5-1 = "흐~흐흥~♪ 초무적 전함, 유카리 출동이어요~♪"
10121-CVGroup_WeaponGet_Idle1-1 = "이 선물은 소녀와 선생님의 약조입니다.\n언제나 품에 지니며, 볼 때마다 선생님을 떠올리겠지요.\n어찌나 짖궂으신 분인지."
10121-CVGroup_UIEventLobby_Enter1-1 = "보시와요, 선생님! 바다이어요! 바다!"
10121-CVGroup_UIEventLobby_Enter2-1 = "흐응~♪ 푸른 물이 끝없이 이어져 있으니~"
10121-CVGroup_UIEventLobby_Enter2-2 = "그야말로 바다네요!"
10121-CVGroup_UIEventLobby_Enter3-1 = "선배님들과 같은 무대에서 경쟁하는 날이 올 줄이야……."
10121-CVGroup_UIEventLobby_Enter3-2 = "하, 하지만 촉망받는 엘리~트이자, 백화요란의 떠오르는 희망으로써,"
10121-CVGroup_UIEventLobby_Enter3-3 = "소녀도 쉽게 물러나지 않겠사와요!"
10121-CVGroup_UIEventLobby_Enter4-1 = "이제 대망의 클라이~맥수~이어요!"
10121-CVGroup_UIEventLobby_Enter4-2 = "어쩌죠, 선생님! 소녀, 긴장된 나머지 손이 떨려옵니다!"
10121-CVGroup_UIEventLobby_Enter5-1 = "단시간 사이에, 선배님들 분위기가 사뭇 달라진 것 같사와요."
10121-CVGroup_UIEventLobby_Enter5-2 = "하지만 모두 여느 때보다 반짝거리고 있사와요!"
10121-CVGroup_UIEventLobby_Idle1-1 = "……키쿄 선배와 렌게 선배는 오래전부터 알고 지냈어요."
10121-CVGroup_UIEventLobby_Idle1-2 = "소꿉친구, 라는 것이어요."
10121-CVGroup_UIEventLobby_Idle1-3 = "두 선배님 사이에는 분명,"
10121-CVGroup_UIEventLobby_Idle1-4 = "소녀가 모르는 이야기가 잔뜩 있을 테죠."
10121-CVGroup_UIEventLobby_Idle1-5 = "그렇게 생각하니 살짝 쓸쓸할지도……."
10121-CVGroup_UIEventLobby_Idle2-1 = "선생님? 왜 그렇게 가만히 쳐다보고만 계시나요?"
10121-CVGroup_UIEventLobby_Idle2-2 = "그러지 말고, 소녀와 함께 놀러 가셔요!"
10121-CVGroup_UIEventLobby_Idle3-1 = "후후. 선생님께서도 참."
10121-CVGroup_UIEventLobby_Idle3-2 = "여기 앉아 가만히 구경하시겠다면, 소녀도 함께하겠사와요."
10121-CVGroup_UIEventLobby_Idle4-1 = "어쩐지, 다들 바다가 익숙한 느낌이네요."
10121-CVGroup_UIEventLobby_Idle4-2 = "어쩌면 소녀만 바다의 비~기너?! 그런 걸까요?!"
10121-CVGroup_UIEventShop_Enter1-1 = "와아~ 여기도, 저기도 신기한 것이 잔뜩이어요!"
10121-CVGroup_UIEventShop_Enter1-2 = "선생님 무엇부터 보실까요?!"
10121-CVGroup_UIEventShop_Enter2-1 = "두근두근! 휘황찬란하여 보고만 있어도 즐겁사와요!"
10121-CVGroup_UIEventShop_Enter3-1 = "아아~ 즐거운 시간은 순식간이네요~"
10121-CVGroup_UIEventShop_Enter3-2 = "돌아가기 전에, 아쉬움을 전부 떨쳐버리고 가는 것이어요!"
10121-CVGroup_UIEventShop_Idle1-1 = "소녀도 알고 있사와요! 아~이 쇼핑~이라는 것이지요?"
10121-CVGroup_UIEventShop_Idle2-1 = "후후, 걱정하지 마셔요. 소녀는 항상 곁에 있답니다."
10121-CVGroup_UIEventShop_Buy1-1 = "와아! 소녀도 가까이서 보고 싶사와요!"
10121-CVGroup_UIEventShop_Buy2-1 = "헤에~ 선생님께서는 그런 취향이시군요?"
10121-CVGroup_UIEventShop_Buy3-1 = "손님 안목이 높으십니다~! 이와요♪"
10121-CVGroup_UIEventShop_Buy4-1 = "흐흥~♪ 무엇을 고를까나~"

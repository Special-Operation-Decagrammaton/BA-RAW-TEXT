[translation]
10121-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
10121-CVGroup_CharacterGet_Idle1-1 = "Hyakkaryouran Resolution Council, Kadenokouji Yukari... I am making my flashy summer debut! Please look forward to what I can achieve at the beach!"
10121-CVGroup_Cafe_Idle1-1 = "No matter the time or place, I shall take on everything with perfect form!"
10121-CVGroup_Cafe_Idle2-1 = "Ah! This must be what Sensei spoke about previously!"
10121-CVGroup_Cafe_Idle3-1 = "Is this...what they call the \"etiquette of the sea\"?"
10121-CVGroup_Cafe_Idle4-1 = "This outfit does invite the cold in... Achoo!"
10121-CVGroup_Cafe_Idle5-1 = "Hm, hmm. The super-invincible ship Yukari, sail out! ♪"
10121-CVGroup_WeaponGet_Idle1-1 = "This gift is our pledge, Sensei. I shall keep it with me always, and you will be on my mind whenever I gaze upon it. How truly mischievous of you."
10121-CVGroup_UIEventLobby_Enter1-1 = "Look, Sensei! The sea! It's the sea!"
10121-CVGroup_UIEventLobby_Enter2-1 = "Heehee! The expanse of blue water is endless! ♪"
10121-CVGroup_UIEventLobby_Enter2-2 = "It's the beach!"
10121-CVGroup_UIEventLobby_Enter3-1 = "I did not anticipate that the day I would be in competition against my seniors would arrive in this way..."
10121-CVGroup_UIEventLobby_Enter3-2 = "H-However, as a promising elite and the Hyakkaryouran's rising hope..."
10121-CVGroup_UIEventLobby_Enter3-3 = "...I shall not readily back down!"
10121-CVGroup_UIEventLobby_Enter4-1 = "It's the climax we have anticipated!"
10121-CVGroup_UIEventLobby_Enter4-2 = "What am I to do, Sensei? My hands are shaking with nerves!"
10121-CVGroup_UIEventLobby_Enter5-1 = "So quickly did the atmosphere amongst my seniors shift..."
10121-CVGroup_UIEventLobby_Enter5-2 = "But it's only made them shine brighter than ever!"
10121-CVGroup_UIEventLobby_Idle1-1 = "...Kikyou and Renge have known each other for a long time."
10121-CVGroup_UIEventLobby_Idle1-2 = "They're childhood friends."
10121-CVGroup_UIEventLobby_Idle1-3 = "Undoubtedly, the two of them..."
10121-CVGroup_UIEventLobby_Idle1-4 = "...share many stories in which I play no part."
10121-CVGroup_UIEventLobby_Idle1-5 = "That thought elicits a feeling of loneliness in me..."
10121-CVGroup_UIEventLobby_Idle2-1 = "Sensei? Why are you staring at me like that?"
10121-CVGroup_UIEventLobby_Idle2-2 = "Rather than sitting idly by, let us venture out together for some fun!"
10121-CVGroup_UIEventLobby_Idle3-1 = "Fufu. I'm serious, Sensei."
10121-CVGroup_UIEventLobby_Idle3-2 = "If you prefer to simply sit and watch, then I will join you."
10121-CVGroup_UIEventLobby_Idle4-1 = "It would appear everyone is well accustomed to the sea."
10121-CVGroup_UIEventLobby_Idle4-2 = "Perhaps I am the only sea novice?! Is that it?!"
10121-CVGroup_UIEventShop_Enter1-1 = "Whoa! Over here! Over there! Everything is new!"
10121-CVGroup_UIEventShop_Enter1-2 = "Sensei, what should we see first?!"
10121-CVGroup_UIEventShop_Enter2-1 = "My heart is aflutter! It's so sparkly that I need only look to find new amusements!"
10121-CVGroup_UIEventShop_Enter3-1 = "Ahhh. Fun times truly pass in the mere blink of an eye!"
10121-CVGroup_UIEventShop_Enter3-2 = "Be sure to leave all our regrets here before we return!"
10121-CVGroup_UIEventShop_Idle1-1 = "I know of this! Yes, yes, it's called \"window shopping,\" correct?"
10121-CVGroup_UIEventShop_Idle2-1 = "Heehee, worry not. I will always be by your side!"
10121-CVGroup_UIEventShop_Buy1-1 = "Wow! I would like to see it more closely as well!"
10121-CVGroup_UIEventShop_Buy2-1 = "Heh, so this is the kind of thing you like, Sensei?"
10121-CVGroup_UIEventShop_Buy3-1 = "Honored guest, you have good taste! ♪"
10121-CVGroup_UIEventShop_Buy4-1 = "Hmm! What to choose...? ♪"

[translation]
10065-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10065-CVGroup_CharacterGet_Idle1-1 = "รองหัวหน้าชมรมหยินหยางสหพันธ์เฮียกคิยาโค\nคุวาคามิ คาโฮะค่ะ ฝากตัวด้วยนะคะ"
10065-CVGroup_Cafe_Idle1-1 = "อืม... ที่นี่เหมาะจะตั้งเป็นสถานทูตเฮียกคิยาโคเหมือนกันนะ..."
10065-CVGroup_Cafe_Idle2-1 = "นำสินค้าของเฮียกคิยาโคมาตกแต่งตรงไหนได้บ้างคะ?"
10065-CVGroup_Cafe_Idle3-1 = "อ๊ะ เมื่อกี้... ฉันรู้สึกได้ถึงเค้าลางของไอดอลคนโปรดของฉัน...?!"
10065-CVGroup_Cafe_Idle4-1 = "ฮุฮุ ครึกครื้นดีนะคะ\nบรรยากาศแบบนี้ก็ไม่แย่เท่าไรค่ะ"
10065-CVGroup_Cafe_Idle5-1 = "นักเรียนจากหลายสถาบัน...\nได้สัมผัสความยิ่งใหญ่ของชาเล่ต์แล้วละค่ะ"
10065-CVGroup_WeaponGet_Idle1-1 = "ไม่คิดเลยว่าจะได้รับของสุดพิเศษจากคุณครูแบบนี้...\nฉันจะแสดงศักยภาพให้เต็มที่ค่ะ ขอบคุณนะคะ คุณครู"

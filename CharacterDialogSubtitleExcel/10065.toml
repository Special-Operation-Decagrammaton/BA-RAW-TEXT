[translation]
10065-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10065-CVGroup_CharacterGet_Idle1-1 = "백귀야행 연합학원 음양부 부부장, 쿠와카미 카호라고 합니다.\n부디 잘 부탁드리겠습니다."
10065-CVGroup_Cafe_Idle1-1 = "이곳이라면… 백귀야행의 대사관을 설치하는 것도…."
10065-CVGroup_Cafe_Idle2-1 = "백귀야행 굿즈는 어디에 장식할까요?"
10065-CVGroup_Cafe_Idle3-1 = "앗… 지금… 마이 스위트 아이돌의 기척이…?!"
10065-CVGroup_Cafe_Idle4-1 = "후후, 시끌벅적하고 좋군요. 이런 분위기도 나쁘지 않네요."
10065-CVGroup_Cafe_Idle5-1 = "다양한 학원의 학생들이 이렇게나…. 새삼스레 샬레의 대단함을 실감했습니다."
10065-CVGroup_WeaponGet_Idle1-1 = "이런 식으로 특별한 물건을 선생님께 받을 수 있다니….\n기대에 부끄럽지 않은 활약을 할 수 있도록, 노력하겠습니다.\n감사합니다. 선생님."

[translation]
10065-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10065-CVGroup_CharacterGet_Idle1-1 = "My name is Kuwakami Kaho, the vice president of Allied Hyakkiyako Academy's Yin-Yang Club. I'm pleased to make your acquaintance."
10065-CVGroup_Cafe_Idle1-1 = "Hm... This seems like an ideal location to establish Hyakkiyako's Embassy..."
10065-CVGroup_Cafe_Idle2-1 = "So, what space have you reserved for the Hyakkiyako merchandise?"
10065-CVGroup_Cafe_Idle3-1 = "Oh! Did I sense...just now...the presence of my idol...?"
10065-CVGroup_Cafe_Idle4-1 = "Heehee, it's quite raucous in here. It's not a bad atmosphere, though."
10065-CVGroup_Cafe_Idle5-1 = "To see students from so many different academies... Truth be told, I'm quite impressed with Schale."
10065-CVGroup_WeaponGet_Idle1-1 = "Oh! Such a lovely gift, and from you, Sensei? It's too much, but it would be rude to decline. I'll treasure it."

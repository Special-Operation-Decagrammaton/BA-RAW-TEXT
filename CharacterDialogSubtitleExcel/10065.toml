[translation]
10065-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10065-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行聯合學園，陰陽部副部長，我叫桑上佳穗。\n還請您多多指教。"
10065-CVGroup_Cafe_Idle1-1 = "如果是這個地方…\n就算建造百鬼夜行的大使館也…"
10065-CVGroup_Cafe_Idle2-1 = "百鬼夜行的商品\n要裝飾在哪裡呢？"
10065-CVGroup_Cafe_Idle3-1 = "哈…剛才是…\nMy Sweet Idol的氣息…！？"
10065-CVGroup_Cafe_Idle4-1 = "呵呵，熱熱鬧鬧的真好呢。\n這種氣氛也不錯。"
10065-CVGroup_Cafe_Idle5-1 = "這麼多各個學園的學生…\n再次深切感受到了夏萊的厲害之處。"
10065-CVGroup_WeaponGet_Idle1-1 = "這麼特別的東西，居然能從老師手上收下……\n為了讓自己的活躍不愧對老師的期待，我會拚盡全力的。\n謝謝您，老師。"

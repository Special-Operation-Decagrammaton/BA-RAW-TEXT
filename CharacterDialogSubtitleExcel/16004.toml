[translation]
16004-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16004-CVGroup_CharacterGet_Idle1-1 = "สบายดีรึเปล่าคะ?\nอ๊ะ ลืมกล่าวคำทักทายเลย\nยินดีที่ได้รู้จักค่ะ"
16004-CVGroup_Cafe_Idle1-1 = "ที่นี่ดีจังเลยน้า จู่ๆ ก็รู้สึกคิดถึงเรื่องเก่าๆ ขึ้นมาเลยค่ะ!"
16004-CVGroup_Cafe_Idle2-1 = "ถ้าเกิดว่าคุณครูชอบโอโคโนมิยากิ\nมากกว่าพิซซ่าหรือแพนเค้กละก็..."
16004-CVGroup_Cafe_Idle3-1 = "ว้าว~ บรรยากาศดีจังเลย!"
16004-CVGroup_Cafe_Idle4-1 = "ชาอู่หลงเย็นชื่นใจน่าจะ so fresh นะคะ!\nฉันไม่ชอบดื่มโคล่าหรือกาแฟหรอกค่ะ"
16004-CVGroup_WeaponGet_Idle1-1 = "สิ่งที่แข็งแกร่งขึ้นไม่ใช่อาวุธ แต่เป็นจิตวิญญาณค่ะ!"

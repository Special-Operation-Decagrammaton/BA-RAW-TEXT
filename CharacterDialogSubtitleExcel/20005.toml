[translation]
20005-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20005-CVGroup_CharacterGet_Idle1-1 = "ถ้าคุณครูโอเคกับฉันที่ดูธรรมดาๆ แบบนี้... ก็ขอรบกวนด้วยนะคะ!"
20005-CVGroup_Cafe_Idle1-1 = "ใส่ชุดแบบนี้ในคาเฟ่... รู้สึกเขินนิดหน่อยค่ะ"
20005-CVGroup_Cafe_Idle2-1 = "มีเฟอร์นิเจอร์ที่เข้ากับช่วงฤดูร้อนอยู่เยอะแยะเลย..."
20005-CVGroup_Cafe_Idle3-1 = "(ดูเหมือนฉันกำลังเป็นจุดสนใจอยู่เลยล่ะค่ะ...)"
20005-CVGroup_Cafe_Idle4-1 = "(แสงแดดอบอุ่นของฤดูร้อน... ทำให้รู้สึกดีจังเลย...)"
20005-CVGroup_Cafe_Idle5-1 = "(จะมีสินค้าลิมิเต็ดเอดิชั่นของเพโรโร่คอลเลกชันฤดูร้อนมั้ยนะ...?)"
20005-CVGroup_WeaponGet_Idle1-1 = "ปืนด้ามนี้กันน้ำได้ใช่มั้ยคะ?"
20005-CVGroup_UIEventLobby_Enter1-1 = "ได้กลิ่นหอมสดชื่นของทะเลด้วยละค่ะ~"
20005-CVGroup_UIEventLobby_Enter2-1 = "ถ้าใช้วันหยุดพักผ่อนแบบสบายๆ ได้ก็คงจะดีนะคะ!"
20005-CVGroup_UIEventLobby_Idle1-1 = "ฉันพร้อมแล้วค่ะ! เตรียมห่วงยางเพโรโร่\nสำหรับว่ายน้ำมาเรียบร้อยแล้วค่ะ!"
20005-CVGroup_UIEventLobby_Idle2-1 = "เอ๋? ฉันวางกุญแจห้องเปลี่ยนเสื้อเอาไว้ตรงนี้นี่นา..."
20005-CVGroup_UIEventLobby_Idle3-1 = "อ่า คือว่า... ฉะ... ฉันเขินนะคะ อย่าจ้องตาเป็นมันแบบนั้นสิคะ..."
20005-CVGroup_UIEventLobby_Idle4-1 = "เรามาถึงแล้วค่ะ! ดูสิคะ ทะเลค่ะ!"

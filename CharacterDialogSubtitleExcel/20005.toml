[translation]
20005-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20005-CVGroup_CharacterGet_Idle1-1 = "雖，雖然還是一如往常平凡的我……\n不過還是請多指教！"
20005-CVGroup_Cafe_Idle1-1 = "這種打扮在咖啡廳……\n有點害羞呢。"
20005-CVGroup_Cafe_Idle2-1 = "夏天氣氛的家具有好多……"
20005-CVGroup_Cafe_Idle3-1 = "（總，總覺得好像被注視著……？）"
20005-CVGroup_Cafe_Idle4-1 = "（夏天溫暖的陽光……好舒服……）"
20005-CVGroup_Cafe_Idle5-1 = "（不知道有沒有夏日限定的佩洛洛大人周邊呢……？）"
20005-CVGroup_WeaponGet_Idle1-1 = "這把槍械，\n有經過防水加工嗎……？"
20005-CVGroup_UIEventLobby_Enter1-1 = "有著清爽大海的味道呢～"
20005-CVGroup_UIEventLobby_Enter2-1 = "希望會是愉快的假期！"
20005-CVGroup_UIEventLobby_Idle1-1 = "做了萬全準備！\n佩洛洛的泳圈也確實地帶來了！"
20005-CVGroup_UIEventLobby_Idle2-1 = "咦？\n我明明把更衣室的鑰匙放在這裡了啊…"
20005-CVGroup_UIEventLobby_Idle3-1 = "啊，那個…\n那、那樣直勾勾地盯者我看的話，我會害羞的…"
20005-CVGroup_UIEventLobby_Idle4-1 = "終於到了！\n是大海耶！大海！"

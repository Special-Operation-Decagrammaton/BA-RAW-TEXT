[translation]
10129-CVGroup_UITitle_Idle1-1 = "블루아, 아카이…… 브."
10129-CVGroup_CharacterGet_Idle1-1 = "이, 이것도 자경단 임무의 연장입니다.\n트리니티와 선생님의 안전을 위해, 힘내겠습니다."
10129-CVGroup_Cafe_Idle1-1 = "여기는 평화롭군요…… 정말 좋은 일입니다."
10129-CVGroup_Cafe_Idle2-1 = "(저분, 혹시 말 걸려고 하시는 걸까요?)"
10129-CVGroup_Cafe_Idle3-1 = "(대, 대화 주제……. 어젯밤에 분명 준비했는데……!)"
10129-CVGroup_Cafe_Idle4-1 = "(역시 옷, 갈아입고 왔어야 했을까요…….)"
10129-CVGroup_Cafe_Idle5-1 = "출구 파악은 완료했습니다."
10129-CVGroup_WeaponGet_Idle1-1 = "그게…… 귀여운 장식이라 생각합니다만…… 과연 제게 어울릴까요?"
10129-CVGroup_UIEventLobby_Enter1-1 = "너, 너무 자세히 보면 긴장하게 됩니다……."
10129-CVGroup_UIEventLobby_Enter2-1 = "어디까지나 잠입을 위해서입니다."
10129-CVGroup_UIEventLobby_Enter2-2 = "예쁜 옷이라곤 생각합니다만……."
10129-CVGroup_UIEventLobby_Enter3-1 = "점점 더 관객분들이 몰려드는 것 같습니다만……."
10129-CVGroup_UIEventLobby_Enter4-1 = "다들 좋아해 주시는군요."
10129-CVGroup_UIEventLobby_Enter4-2 = "어떤 형태로건 도움이 되어 다행입니다."
10129-CVGroup_UIEventLobby_Enter5-1 = "스스로 당당해질 수 있게 되었습니다."
10129-CVGroup_UIEventLobby_Enter5-2 = "감사합니다. 선생님."
10129-CVGroup_UIEventLobby_Enter5-3 = "잠입은 끝났습니다만, 순찰은 계속됩니다."
10129-CVGroup_UIEventLobby_Enter5-4 = "앞으로도, 자주 뵈었으면 좋겠습니다."
10129-CVGroup_UIEventLobby_Idle1-1 = "잡아당기시면 안 됩니다! 장식이 아닙니다!"
10129-CVGroup_UIEventLobby_Idle2-1 = "6조 우선의 마법으로, 으음…… 그리고……."
10129-CVGroup_UIEventLobby_Idle2-2 = "대사가 익숙하지 않아서 외우기 어렵군요."
10129-CVGroup_UIEventLobby_Idle3-1 = "꺄악! 키, 키킥!! 아, 아앗……! 간지럽습니다…….!"
10129-CVGroup_UIEventLobby_Idle3-2 = "저는 간지럼에 약합니다……!"
10129-CVGroup_UIEventLobby_Idle4-1 = "유원지의 이 분위기. 좋아합니다."
10129-CVGroup_UIEventLobby_Idle4-2 = "더없이…… 평화로워서요."
10129-CVGroup_UIEventShop_Enter1-1 = "어, 어서 오세요. 선생님……."
10129-CVGroup_UIEventShop_Enter2-1 = "필요하신 게 있으신가요……."
10129-CVGroup_UIEventShop_Enter3-1 = "기억에 남는 순찰이었습니다. 감사합니다."
10129-CVGroup_UIEventShop_Idle1-1 = "필요하신 물건을 찾으시면 좋겠습니다."
10129-CVGroup_UIEventShop_Idle2-1 = "편의점에서의 일이 생각나네요."
10129-CVGroup_UIEventShop_Buy1-1 = "네, 이쪽이군요."
10129-CVGroup_UIEventShop_Buy2-1 = "여기 있습니다."
10129-CVGroup_UIEventShop_Buy3-1 = "항상 협력해 주셔서 감사합니다."
10129-CVGroup_UIEventShop_Buy4-1 = "선생님께 도움이 되길 바랍니다."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "오래된 기계로군요. 작동하는지는 모르겠습니다만……?"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "메달을 넣으면 작동하겠군요."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "레이사 씨, 즐기고 계신 것 같아서 다행입니다."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "희귀도가 높은? 카드가 나오면 좋겠군요."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "폐장 시간이 되었군요. 남은 메달이 있는지 확인해 보시지요."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "아까부터, 주변의 시선이 느껴집니다만……."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "시선을 더 끌기 전에 어서 뽑아보죠."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "무지개색이군요. 좋은…… 건가요?"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "분홍색…… 이군요."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "금색이군요."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "푸른 하늘빛인가요. 청량하네요."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "검은색…… 조금 불길하군요."

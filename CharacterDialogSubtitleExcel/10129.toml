[translation]
10129-CVGroup_UITitle_Idle1-1 = "Blue A-Archive..."
10129-CVGroup_CharacterGet_Idle1-1 = "Th-This is also an extension of the Vigilante Crew's duties. I'll do my best for both your safety and Trinity's."
10129-CVGroup_Cafe_Idle1-1 = "It seems peaceful here... That's great."
10129-CVGroup_Cafe_Idle2-1 = "(That person, is she trying to talk to me?)"
10129-CVGroup_Cafe_Idle3-1 = "(C-Conversation topics... I even I studied some last night...!)"
10129-CVGroup_Cafe_Idle4-1 = "(P-Perhaps I really should've changed before coming here...)"
10129-CVGroup_Cafe_Idle5-1 = "I've located the exit point."
10129-CVGroup_WeaponGet_Idle1-1 = "Um... I think it's a cute decoration...but does it really suit me?"
10129-CVGroup_UIEventLobby_Enter1-1 = "I-I get nervous when you stare at me so closely..."
10129-CVGroup_UIEventLobby_Enter2-1 = "This is all for the infiltration."
10129-CVGroup_UIEventLobby_Enter2-2 = "Although, I do think this is a pretty outfit..."
10129-CVGroup_UIEventLobby_Enter3-1 = "It feels like the crowd is getting bigger and bigger..."
10129-CVGroup_UIEventLobby_Enter4-1 = "Everyone is happy with it."
10129-CVGroup_UIEventLobby_Enter4-2 = "Regardless of how, I'm glad I could be of help."
10129-CVGroup_UIEventLobby_Enter5-1 = "I've managed to become a little more confident."
10129-CVGroup_UIEventLobby_Enter5-2 = "Thank you, Sensei."
10129-CVGroup_UIEventLobby_Enter5-3 = "The infiltration is over, but the patrol continues."
10129-CVGroup_UIEventLobby_Enter5-4 = "I wish I could see you more often."
10129-CVGroup_UIEventLobby_Idle1-1 = "Please don't pull! That's not a decoration!"
10129-CVGroup_UIEventLobby_Idle2-1 = "With six-groove, right-hand twist rifling magic, um...and..."
10129-CVGroup_UIEventLobby_Idle2-2 = "I'm not familiar with the lines, so it's hard to memorize them."
10129-CVGroup_UIEventLobby_Idle3-1 = "Kyaaah! E-Eek!! A-Aah...! That tickles...!"
10129-CVGroup_UIEventLobby_Idle3-2 = "I'm weak to tickling...!"
10129-CVGroup_UIEventLobby_Idle4-1 = "I like the atmosphere at the amusement park."
10129-CVGroup_UIEventLobby_Idle4-2 = "It's really...peaceful."
10129-CVGroup_UIEventShop_Enter1-1 = "W-Welcome, Sensei!"
10129-CVGroup_UIEventShop_Enter2-1 = "Is there anything you need...?"
10129-CVGroup_UIEventShop_Enter3-1 = "That was a memorable patrol. Thank you."
10129-CVGroup_UIEventShop_Idle1-1 = "I hope you can find what you need."
10129-CVGroup_UIEventShop_Idle2-1 = "This reminds me of what happened at the convenience store."
10129-CVGroup_UIEventShop_Buy1-1 = "Yes, this way."
10129-CVGroup_UIEventShop_Buy2-1 = "Here it is."
10129-CVGroup_UIEventShop_Buy3-1 = "Thank you for always cooperating with us."
10129-CVGroup_UIEventShop_Buy4-1 = "I'm glad it could be of help to Sensei."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "It's an old machine. I'm not sure if it still works, though..."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "I suppose it runs when you put in a medal."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "I'm glad Reisa is enjoying herself."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "I hope you get that one card... I think it's called \"rare\"?"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "It's almost closing time. Please check if you have any medals left."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "I've been feeling someone's gaze for a while..."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "Let's do this quickly, before we attract more attention."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "It's rainbow. Is this...a good thing?"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "It's...pink."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "It's gold."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "It's sky blue. How refreshing."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "Black... This feels a bit ominous."

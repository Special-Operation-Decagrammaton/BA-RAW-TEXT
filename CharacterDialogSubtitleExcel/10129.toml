[translation]
10129-CVGroup_UITitle_Idle1-1 = "蔚藍檔，檔……案。"
10129-CVGroup_CharacterGet_Idle1-1 = "這，這也是自衛隊任務的延伸……沒錯。\n為了三一和老師的安全，我會盡己所能。"
10129-CVGroup_Cafe_Idle1-1 = "這裡很和平呢……真是太好了。"
10129-CVGroup_Cafe_Idle2-1 = "（那位同學，是不是想要跟我搭話呢？）"
10129-CVGroup_Cafe_Idle3-1 = "（得，得找個話題……腦中一片空白……\n昨晚明明想過的說……！）"
10129-CVGroup_Cafe_Idle4-1 = "（果然，應該換件衣服再來的嗎……）"
10129-CVGroup_Cafe_Idle5-1 = "避難路線已經掌握了。"
10129-CVGroup_WeaponGet_Idle1-1 = "那個……雖然這類的周邊確實很可愛……\n不過真的適合我嗎？"
10129-CVGroup_UIEventLobby_Enter1-1 = "這，這樣一直盯著我看的話，我會緊張……"
10129-CVGroup_UIEventLobby_Enter2-1 = "這單純只是為了調查而穿的。"
10129-CVGroup_UIEventLobby_Enter2-2 = "雖然我覺得這套衣服很可愛……"
10129-CVGroup_UIEventLobby_Enter3-1 = "觀眾好像變得越來越多了……"
10129-CVGroup_UIEventLobby_Enter4-1 = "大家都很開心呢。"
10129-CVGroup_UIEventLobby_Enter4-2 = "無論形式如何，有幫上忙真是太好了。"
10129-CVGroup_UIEventLobby_Enter5-1 = "我開始對自己正在做的事情，真正產生自信了。"
10129-CVGroup_UIEventLobby_Enter5-2 = "謝謝您，老師。"
10129-CVGroup_UIEventLobby_Enter5-3 = "潛入調查雖然結束了，將來也會繼續巡邏。"
10129-CVGroup_UIEventLobby_Enter5-4 = "今後也請多多指教。"
10129-CVGroup_UIEventLobby_Idle1-1 = "不，不可以拉扯！\n這不是裝飾品！"
10129-CVGroup_UIEventLobby_Idle2-1 = "六條右旋的魔法，唔嗯……那個……"
10129-CVGroup_UIEventLobby_Idle2-2 = "有好多不習慣的台詞……很難記住。"
10129-CVGroup_UIEventLobby_Idle3-1 = "呀啊！嘻，嘻哈！嘻呀……！\n這樣很癢……！"
10129-CVGroup_UIEventLobby_Idle3-2 = "我，我真的很怕癢……！"
10129-CVGroup_UIEventLobby_Idle4-1 = "遊樂園的氣氛，我非常喜歡。"
10129-CVGroup_UIEventLobby_Idle4-2 = "因為……非常和平。"
10129-CVGroup_UIEventShop_Enter1-1 = "歡，歡迎光臨。老師……"
10129-CVGroup_UIEventShop_Enter2-1 = "有想找的東西嗎……？"
10129-CVGroup_UIEventShop_Enter3-1 = "是個難忘的任務呢。\n非常謝謝您。"
10129-CVGroup_UIEventShop_Idle1-1 = "希望您能找到想要的東西。"
10129-CVGroup_UIEventShop_Idle2-1 = "讓人回想起了便利商店的事呢。"
10129-CVGroup_UIEventShop_Buy1-1 = "好的，在這裡。"
10129-CVGroup_UIEventShop_Buy2-1 = "好的，請收下。"
10129-CVGroup_UIEventShop_Buy3-1 = "感謝您一直以來的協助。"
10129-CVGroup_UIEventShop_Buy4-1 = "希望能幫上老師的忙。"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "是台老舊的機器呢。\n能順利運作嗎……？"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "投入這個似乎就能運作。"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "澪紗同學好像玩得很開心，真是太好了。"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "稀有度高？的卡片，要是能抽到就好了呢。"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "已經到閉園時間了呢。\n一起確認還有沒有沒用完的吧。"
10129-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "總覺得能感受到周圍傳來的視線……"
10129-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "在目光聚集之前，趕緊抽吧……！"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "是虹色呢。\n這是好東西嗎？"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "是粉紅色呢……"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "是金色呢。"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "是水藍色嗎。\n感覺很清爽呢。"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "黑色……有點不吉利呢。"

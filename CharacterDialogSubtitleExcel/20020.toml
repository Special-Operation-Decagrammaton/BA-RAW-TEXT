[translation]
20020-CVGroup_UISpecialOperationLobby_Enter1-1 = "It's time for the Super Phenomenon Task Force to begin its mission."
20020-CVGroup_UISpecialOperationLobby_Enter2-1 = "Heehee. I've been waiting, Sensei."
20020-CVGroup_UISpecialOperationLobby_Idle1-1 = "We're currently analyzing the data, so please wait just a little while longer."
20020-CVGroup_UISpecialOperationLobby_Idle2-1 = "Hmm... This is interesting."
20020-CVGroup_UISpecialOperationLobby_Idle2-2 = "So I do it like this... Hmm..."
20020-CVGroup_UISpecialOperationLobby_Idle3-1 = "Decagrammaton is certainly a tricky opponent."
20020-CVGroup_UISpecialOperationLobby_Idle4-1 = "This could be dangerous."
20020-CVGroup_UISpecialOperationLobby_Idle4-2 = "Heehee. But that just makes it all the more interesting."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen1-1 = "I've secured new data."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen2-1 = "Now, let's take a look at what it contains."
20020-CVGroup_UISpecialOperationLobby_StoryOpen1-1 = "It appears that the next objective has been determined."
20020-CVGroup_UISpecialOperationLobby_StoryOpen2-1 = "Time to proceed to the next stage."
20020-CVGroup_UIMiniEventLobby_Enter1-1 = "New mission, new environment..."
20020-CVGroup_UIMiniEventLobby_Enter1-2 = "...Then. Let's begin, Sensei."
20020-CVGroup_UIMiniEventLobby_Enter2-1 = "Could you lend a hand, Sensei?"
20020-CVGroup_UIMiniEventLobby_Enter2-2 = "Oh my, even a super-genius, elegant, delicate beauty like me..."
20020-CVGroup_UIMiniEventLobby_Enter2-3 = "...needs assistance every once in a while, you know?"
20020-CVGroup_UIMiniEventLobby_Enter3-1 = "You're here, Sensei."
20020-CVGroup_UIMiniEventLobby_Enter3-2 = "This is our new base."
20020-CVGroup_UIMiniEventLobby_Idle1-1 = "Confirmed the increased requirements."
20020-CVGroup_UIMiniEventLobby_Idle1-2 = "Let's see how many variables we can control... Proceed with caution."
20020-CVGroup_UIMiniEventLobby_Idle2-1 = "The more information, the better..."
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "...but too much data is troublesome in its own right."
20020-CVGroup_UIMiniEventLobby_Idle3-1 = "I'm a bit tired..."
20020-CVGroup_UIMiniEventLobby_Idle3-2 = "If only a certain teacher could spoil me in these kinds of situations."
20020-CVGroup_UIMiniEventLobby_Idle4-1 = "For the best hacker in the world and a flourishing beauty like me..."
20020-CVGroup_UIMiniEventLobby_Idle4-2 = "...to be lacking the perfect partner..."
20020-CVGroup_UIMiniEventLobby_Idle4-3 = "It's a high-priority issue. That is why, Sensei, you must..."
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "Never mind... Forget what I just said."
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "We've entered a new phase... I suppose we can see it that way."
20020-CVGroup_UIMiniEventShop_Enter1-1 = "Here, we're analyzing..."
20020-CVGroup_UIMiniEventShop_Enter1-2 = "...the materials that you gathered."
20020-CVGroup_UIMiniEventShop_Enter2-1 = "Welcome, Sensei. *sigh*... I got tired of waiting."
20020-CVGroup_UIMiniEventShop_Enter3-1 = "Have you gathered the samples? Please put them here."
20020-CVGroup_UIMiniEventShop_Idle1-1 = "Thank you for your cooperation, as always, Sensei."
20020-CVGroup_UIMiniEventShop_Idle2-1 = "I see. I wonder what kind of information we'll extract."
20020-CVGroup_UIMiniEventShop_Idle3-1 = "Thanks to you, the investigation is going smoothly. Even so, this phenomenon... Well, it's very interesting."
20020-CVGroup_UIMiniEventShop_Idle4-1 = "*sigh* For the analysis not to be able to catch up..."
20020-CVGroup_UIMiniEventShop_Idle4-2 = "What a luxurious environment."
20020-CVGroup_UIMiniEventShop_Idle5-1 = "It's always fun to conduct new research."
20020-CVGroup_UIMiniEventShop_Idle5-2 = "And, on top of that, with you here... All the better."
20020-CVGroup_UIMiniEventShop_Buy1-1 = "Analysis complete. Feel free to take a look, Sensei."
20020-CVGroup_UIMiniEventShop_Buy2-1 = "Did you like the analysis results? Heehee, please come again soon."
20020-CVGroup_UIMiniEventShop_Buy3-1 = "I did my best to analyze it for you. Yes, please take it."
20020-CVGroup_UIMiniEventShop_Buy3-2 = "...I-I do know when to act professionally, of course."
20020-CVGroup_UIMiniEventShop_Buy4-1 = "You gather the samples..."
20020-CVGroup_UIMiniEventShop_Buy4-2 = "...then we analyze and deliver them."
20020-CVGroup_UIMiniEventShop_Buy4-3 = "The trade is made."
20020-CVGroup_UIMiniEventShop_Buy5-1 = "Thank you, as always. ...How was it?"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "The one-day store service from a super-genius and an elegant, delicate beauty."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "I tried switching up our approach to data analysis."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Coincidence and inevitability, absolutism and relativity..."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "It's an intriguing topic. Don't you agree, Sensei?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "Would you like to test your luck too?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "According to astrology, today's lucky color is..."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "...Huh? You're okay...?"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "Most things are determined by probability and statistics."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "Of course, that includes astrology. Gacha...is no exception."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "I disagree...with those who say everything must be controlled."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "Because I believe that there's value to..."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "...encounters with worlds we have yet to experience."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "The realm of the unknown...draws a person in."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "Science has uncovered many mysteries."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "But there are still many unknowns in this world."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-3 = "...If not, things would be too boring."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "Eventually, we would reach the finish line..."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "...and witness the birth of an even higher goal."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "Congratulations, Sensei. While one could say the results were expected..."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "...it's still fine to celebrate the results when it occurs, don't you think?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "Oh my, this is the so-called \"winning prize,\" right?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "While statistically expected..."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "...it is our free will to experience the happiness associated with winning."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "Great work, Sensei! I'm very happy."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "Because normalcy exists, so do special moments."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "So please treasure the \"normal\" as well, Sensei."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "...And treasure the super-genius, elegant, delicate beauty, who's working hard, while you're at it."
20020-CVGroup_UITitle_Idle1-1 = "Blue...Archive! Haha!"
20020-CVGroup_CharacterGet_Idle1-1 = "Allow me to introduce myself. I am the president of Veritas and of the Super Phenomenon Task Force, the delicately chic and beautiful super genius hacker of Millennium, the one and only Akeboshi Himari! Try to contain your excitement, Sensei."
20020-CVGroup_Cafe_Idle1-1 = "(Isn't this room a bit...chilly?)"
20020-CVGroup_Cafe_Idle2-1 = "There are so many people here... It's so draining..."
20020-CVGroup_Cafe_Idle3-1 = "Hey, look at this. Seems like it might be fun."
20020-CVGroup_Cafe_Idle4-1 = "Haha! With this much space, we could have a picnic with everyone in Veritas! Even Eimi could join!"
20020-CVGroup_Cafe_Idle5-1 = "Not bad. But it could use a few more...amenities. Shall we do a little tinkering here?"
20020-CVGroup_WeaponGet_Idle1-1 = "Wow, I didn't expect to receive such a valuable gift. Is there anything you want? As the super genius hacker of ethereal beauty, I can make anything you want come true... What? You can always rely on me...? O-Oh, is that so... Thank you...Sensei..."

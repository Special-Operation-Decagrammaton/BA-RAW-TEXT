[translation]
20020-CVGroup_UISpecialOperationLobby_Enter1-1 = "那麼，開始特異現象搜查部的活動吧。"
20020-CVGroup_UISpecialOperationLobby_Enter2-1 = "呵呵，我一直在等您哦，老師。"
20020-CVGroup_UISpecialOperationLobby_Idle1-1 = "……啊，現在正在分析數據，還請稍等。"
20020-CVGroup_UISpecialOperationLobby_Idle2-1 = "原來如此，真有趣……"
20020-CVGroup_UISpecialOperationLobby_Idle2-2 = "這個就像這樣，嗯……"
20020-CVGroup_UISpecialOperationLobby_Idle3-1 = "十字神名……是個麻煩的對手。"
20020-CVGroup_UISpecialOperationLobby_Idle4-1 = "雖然感覺會有風險……"
20020-CVGroup_UISpecialOperationLobby_Idle4-2 = "呵呵，更讓人覺得有趣了呢。"
20020-CVGroup_UISpecialOperationLobby_CollectionOpen1-1 = "似乎取得新情報了呢。"
20020-CVGroup_UISpecialOperationLobby_CollectionOpen2-1 = "那麼，這次會是怎麼樣的情報呢。"
20020-CVGroup_UISpecialOperationLobby_StoryOpen1-1 = "下一個目標已經決定了呢。"
20020-CVGroup_UISpecialOperationLobby_StoryOpen2-1 = "那麼，進入下一個階段吧。"
20020-CVGroup_UIMiniEventLobby_Enter1-1 = "新的任務，以及新的環境……"
20020-CVGroup_UIMiniEventLobby_Enter1-2 = "……來，開始吧。老師。"
20020-CVGroup_UIMiniEventLobby_Enter2-1 = "老師，能請您助我一臂之力嗎？"
20020-CVGroup_UIMiniEventLobby_Enter2-2 = "哎呀，即便是超天才清楚系病弱美少女，"
20020-CVGroup_UIMiniEventLobby_Enter2-3 = "也是需要別人幫助的唷？"
20020-CVGroup_UIMiniEventLobby_Enter3-1 = "您好，老師。"
20020-CVGroup_UIMiniEventLobby_Enter3-2 = "這裡就是我們的新基地。"
20020-CVGroup_UIMiniEventLobby_Idle1-1 = "條件的增加已經確認。"
20020-CVGroup_UIMiniEventLobby_Idle1-2 = "能將變數抑制到什麼程度……慎重地進行吧。"
20020-CVGroup_UIMiniEventLobby_Idle2-1 = "情報越多越好，但話雖如此……"
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "要是一次收到太多，倒也有點傷腦筋。"
20020-CVGroup_UIMiniEventLobby_Idle3-1 = "有點累了呢……"
20020-CVGroup_UIMiniEventLobby_Idle3-2 = "如果這種時候有能讓我撒嬌的老師在，那就太令人高興了。"
20020-CVGroup_UIMiniEventLobby_Idle4-1 = "身為最強駭客，也是最強美少女的我，"
20020-CVGroup_UIMiniEventLobby_Idle4-2 = "居然會缺少最強的夥伴，"
20020-CVGroup_UIMiniEventLobby_Idle4-3 = "這是相當嚴重的事態。所以就由老師擔任我的……"
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "我什麼都沒說……剛才的請您忘了吧。"
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "進入了新的局面……該這麼說嗎？"
20020-CVGroup_UIMiniEventShop_Enter1-1 = "這個地方，正在對老師蒐集回來的"
20020-CVGroup_UIMiniEventShop_Enter1-2 = "「物質」進行分析。"
20020-CVGroup_UIMiniEventShop_Enter2-1 = "歡迎回來，老師。\n哈啊……我等到都累了。"
20020-CVGroup_UIMiniEventShop_Enter3-1 = "樣本的收集有進展嗎？\n請您放在這邊。"
20020-CVGroup_UIMiniEventShop_Idle1-1 = "感謝您一直以來的協助，老師。"
20020-CVGroup_UIMiniEventShop_Idle2-1 = "那麼，究竟會得出什麼樣的情報呢？"
20020-CVGroup_UIMiniEventShop_Idle3-1 = "託您的福，調查相當順利。\n不過這個現象……真是耐人尋味呢。"
20020-CVGroup_UIMiniEventShop_Idle4-1 = "唉，沒想到分析竟然會落後……"
20020-CVGroup_UIMiniEventShop_Idle4-2 = "多麼奢侈的環境啊。"
20020-CVGroup_UIMiniEventShop_Idle5-1 = "探求，總是能讓人心胸澎湃。"
20020-CVGroup_UIMiniEventShop_Idle5-2 = "如果還能跟老師一同參與……\n呵呵，那就更不用說了。"
20020-CVGroup_UIMiniEventShop_Buy1-1 = "分析已經完成。\n請您儘管拿吧。"
20020-CVGroup_UIMiniEventShop_Buy2-1 = "解釋結果還滿意嗎？\n呵呵，歡迎下次再來。"
20020-CVGroup_UIMiniEventShop_Buy3-1 = "我為老師投注心血進行了分析。\n來，請收下。"
20020-CVGroup_UIMiniEventShop_Buy3-2 = "……公，公私我可是有分清楚哦，嗯嗯。"
20020-CVGroup_UIMiniEventShop_Buy4-1 = "老師負責收集樣本，"
20020-CVGroup_UIMiniEventShop_Buy4-2 = "我們則對其加以分析，並進行交付……"
20020-CVGroup_UIMiniEventShop_Buy4-3 = "「以物易物」成立了呢。"
20020-CVGroup_UIMiniEventShop_Buy5-1 = "感謝您的惠顧。\n……怎麼樣呀？"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "超天才清楚系病弱美少女的一日店員服務。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "我試著調整了分析的方向。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "偶然與必然，絕對論與相對論……"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "真是充滿魅力的題材。您不這麼認為嗎？老師。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "老師要不要也來試試運氣？"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "占星術顯示今天的幸運色是……"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "……咦？不用了……？"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "機率跟統計，是決定大多數事物的要素。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "占星術自不用說，就連「抽籤」……也不例外。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "一切都該被掌控……這樣的論點，我個人是反對的。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "因為我認為與未知世界的遭遇……"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "才是真正有價值的事。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "未知的領域……真是令人著迷。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "即便依靠科學解開了許多謎團……"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "未知的領域依舊會持續存在。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-3 = "……不然的話，實在太無趣了。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "不知不覺間，我們將抵達目標……"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "並且……又會目擊嶄新目標的誕生吧。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "恭喜您，老師。雖說結果是可以預期的……"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "但實際體會成果的瞬間，仍然是值得高興的吧？"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "哎呀，這就是所謂的「中獎」對吧？"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "即便在統計學上，這是理所當然的結果……"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "但從中感受到喜悅卻是我們的自由……"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "真是太棒了，老師。我也很高興。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "之所以感到「特別」，是因為「普通」的存在。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "所以，請您務必珍惜「普通」哦，老師。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "……還有辛勞的超天才清楚系病弱美少女也順便。"
20020-CVGroup_UITitle_Idle1-1 = "蔚藍～檔案～呵呵。"
20020-CVGroup_CharacterGet_Idle1-1 = "貝里塔斯的部長兼，特異現象搜查部的部長……\n我就是千年最棒的天才清楚系病弱美少女駭客，明星陽葵。\n呵呵，請多多指教哦，老師。"
20020-CVGroup_Cafe_Idle1-1 = "（這個房間有點冷呢…)"
20020-CVGroup_Cafe_Idle2-1 = "有很多人在呢……\n讓人有點疲憊。"
20020-CVGroup_Cafe_Idle3-1 = "哎呀，居然還有這種東西。\n總覺得很有趣呢。"
20020-CVGroup_Cafe_Idle4-1 = "呵呵。這麼寬敞的話，似乎可以和貝里塔斯的大家和英美一起來野餐呢。"
20020-CVGroup_Cafe_Idle5-1 = "真是不錯的地方呢。\n要是方便的功能再豐富一點就好了…稍微駭入一下吧。"
20020-CVGroup_WeaponGet_Idle1-1 = "嘛，居然能收到這麼貴重的物品。您有什麼願望嗎？\n因為我是超天才美少女，所以什麼都能為您實…咦？\n因為總是依賴著我…？是，是嗎…非常感謝您…老師。"

20020-CVGroup_UIMiniEventShop_Idle4-2 = "นี่เป็นสถานการณ์ที่เกินฝันมากเลยนะคะ"
20020-CVGroup_UIMiniEventShop_Idle5-1 = "การสำรวจครั้งใหม่ ไม่ว่าเมื่อไรก็เป็นสิ่งที่สนุกเสมอเลยนะคะ"

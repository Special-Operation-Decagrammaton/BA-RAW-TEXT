20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "สักวันหนึ่งเมื่อพวกเราทำเป้าหมายที่คิดไว้ได้สำเร็จ"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "และ... ก็จะได้เห็นถึงการถือกำเนิดของเป้าหมาย\nที่สูงขึ้นในอีกระดับหนึ่งสินะคะ"

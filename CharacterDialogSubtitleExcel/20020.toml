20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "ที่เรายังไม่เคยได้รู้จักเป็นสิ่งที่มีคุณค่าค่ะ"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "พื้นที่ที่ยังไม่ถูกค้นพบ... เป็นสิ่งที่ดึงดูดใจมากนะคะ"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "ถึงแม้วิทยาศาสตร์จะไขปริศนาได้หลายอย่างแล้วก็ตาม"

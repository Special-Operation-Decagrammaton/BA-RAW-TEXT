20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "สำหรับเรื่องดวงน่ะ...\n「การสุ่ม」ก็ไม่มีข้อยกเว้นหรอกนะคะ"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "ฉันคัดค้านคำพูดที่บอกว่าทุกอย่างจะต้องถูกปิดกั้นค่ะ..."

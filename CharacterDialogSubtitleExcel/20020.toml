20020-CVGroup_UIMiniEventLobby_Idle4-3 = "นับเป็นเหตุการณ์ที่สำคัญอย่างยิ่งค่ะ\nเพราะงั้นคุณครูจะช่วยมาเป็น..."
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "ไม่มีอะไรหรอกค่ะ...\nช่วยลืมเรื่องที่พูดเมื่อสักครู่ไปด้วยค่ะ"
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "ตอนนี้เข้าสู่เฟสใหม่แล้ว...\nคิดแบบนั้นได้หรือเปล่านะคะ"

[translation]
20020-CVGroup_UISpecialOperationLobby_Enter1-1 = "초현상특무부의 임무. 시작해볼까요."
20020-CVGroup_UISpecialOperationLobby_Enter2-1 = "후훗. 기다리고 있었습니다, 선생님."
20020-CVGroup_UISpecialOperationLobby_Idle1-1 = "……아. 지금 데이터를 분석 중이니 잠시만 기다려주세요."
20020-CVGroup_UISpecialOperationLobby_Idle2-1 = "과연, 흥미롭네요……"
20020-CVGroup_UISpecialOperationLobby_Idle2-2 = "이걸 이렇게 해서, 흠……"
20020-CVGroup_UISpecialOperationLobby_Idle3-1 = "데카그라마톤…… 성가신 상대입니다."
20020-CVGroup_UISpecialOperationLobby_Idle4-1 = "리스크가 있을 것 같지만……"
20020-CVGroup_UISpecialOperationLobby_Idle4-2 = "후훗. 그래서 더욱 흥미롭네요."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen1-1 = "새로운 데이터를 확보했습니다."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen2-1 = "그럼, 이번에는 어떤 정보일지 확인해볼까요."
20020-CVGroup_UISpecialOperationLobby_StoryOpen1-1 = "다음 목표가 정해진 것 같네요."
20020-CVGroup_UISpecialOperationLobby_StoryOpen2-1 = "자, 이제 다음 단계로 넘어가도록 하겠습니다."
20020-CVGroup_UIMiniEventLobby_Enter1-1 = "새로운 임무, 그리고 새로운 환경……"
20020-CVGroup_UIMiniEventLobby_Enter1-2 = "……자, 시작하죠. 선생님."
20020-CVGroup_UIMiniEventLobby_Enter2-1 = "선생님, 도와주시겠어요?"
20020-CVGroup_UIMiniEventLobby_Enter2-2 = "어머, 초천재 청초계 병약 미소녀라고 해도,"
20020-CVGroup_UIMiniEventLobby_Enter2-3 = "도움은 필요하거든요?"
20020-CVGroup_UIMiniEventLobby_Enter3-1 = "오셨나요, 선생님."
20020-CVGroup_UIMiniEventLobby_Enter3-2 = "여기가 우리들의 새로운 기지랍니다."
20020-CVGroup_UIMiniEventLobby_Idle1-1 = "조건의 증가를 확인했습니다."
20020-CVGroup_UIMiniEventLobby_Idle1-2 = "어디까지 변수를 억제할 수 있을지…… 신중하게 가 보도록 하죠."
20020-CVGroup_UIMiniEventLobby_Idle2-1 = "정보는 많을수록 환영, 이긴 하지만……"
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "너무 한꺼번에 주어지면, 그건 그것대로 곤란하죠."
20020-CVGroup_UIMiniEventLobby_Idle3-1 = "조금 피곤하네요…"
20020-CVGroup_UIMiniEventLobby_Idle3-2 = "이럴 때 어리광을 받아주는 선생님이 있다면 너무 좋을 텐데요."
20020-CVGroup_UIMiniEventLobby_Idle4-1 = "최고의 해커이자, 최고의 미소녀인 저에게"
20020-CVGroup_UIMiniEventLobby_Idle4-2 = "최고의 파트너가 부재하다니,"
20020-CVGroup_UIMiniEventLobby_Idle4-3 = "중대한 사태입니다. 그러니 선생님께 저의……"
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "아무것도 아니에요…… 방금 얘기는 잊어주세요."
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "새로운 국면에 접어들었다… 고 생각하면 될까요."
20020-CVGroup_UIMiniEventShop_Enter1-1 = "여기에서는, 선생님이 모아 주신"
20020-CVGroup_UIMiniEventShop_Enter1-2 = "「물질」의 분석을 하고 있습니다."
20020-CVGroup_UIMiniEventShop_Enter2-1 = "어서 오세요, 선생님. 후우…… 기다리다 지쳤어요."
20020-CVGroup_UIMiniEventShop_Enter3-1 = "샘플 수집은 진행되었나요? 이쪽에 부탁드릴게요."
20020-CVGroup_UIMiniEventShop_Idle1-1 = "항상 협조해 주셔서 감사합니다, 선생님."
20020-CVGroup_UIMiniEventShop_Idle2-1 = "과연, 어떤 정보가 나올지."
20020-CVGroup_UIMiniEventShop_Idle3-1 = "덕분에 조사는 순조롭습니다. 그렇다고는 해도, 이 현상… 정말 흥미롭군요."
20020-CVGroup_UIMiniEventShop_Idle4-1 = "하아, 설마 분석이 따라가지 못하고 있다니……."
20020-CVGroup_UIMiniEventShop_Idle4-2 = "이 얼마나 사치스러운 환경인가요"
20020-CVGroup_UIMiniEventShop_Idle5-1 = "새로운 탐구란, 언제나 즐거운 일이죠."
20020-CVGroup_UIMiniEventShop_Idle5-2 = "거기에 선생님께서 함께 해 주신다면…… 더할 나위 없고요."
20020-CVGroup_UIMiniEventShop_Buy1-1 = "분석 완료입니다. 편하게 가져가세요. 선생님."
20020-CVGroup_UIMiniEventShop_Buy2-1 = "해석 결과는 마음에 드셨나요? 후후, 다음에 또 오세요."
20020-CVGroup_UIMiniEventShop_Buy3-1 = "선생님을 위해 정성껏 분석했습니다. 네, 받아주세요."
20020-CVGroup_UIMiniEventShop_Buy3-2 = "……공, 공과 사는 분리하고 있다구요, 그럼요."
20020-CVGroup_UIMiniEventShop_Buy4-1 = "선생님께서 샘플을 모아주시고,"
20020-CVGroup_UIMiniEventShop_Buy4-2 = "우리는 그것을 분석해서 전달한다……"
20020-CVGroup_UIMiniEventShop_Buy4-3 = "'물물교환'의 성립이군요."
20020-CVGroup_UIMiniEventShop_Buy5-1 = "매번 감사합니다. ……어떠셨나요?"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "초천재청초계병약 미소녀의 일일 점포 서비스는."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "분석의 방향을 조금 바꿔봤습니다."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "우연과 필연, 절대론과 상대론………."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "매력적인 소재입니다. 그렇게 생각하지 않으시나요? 선생님."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "선생님도 운을 한 번 시험해 보시겠어요?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "점성술에 의하면 오늘의 럭키 컬러는…."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "…네? 그건 괜찮다구요…?"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "확률이나 통계는 사물의 대부분을 결정짓죠."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "점성술은 물론, 「뽑기」도… 예외는 아닙니다."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "모든 것은 통제되어야 한다… 는 말에, 저는 반대합니다."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "아직 보지 못한 세계와의 조우야말로,"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "가치가 있다고 생각하기 때문에요."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "미지의 영역…… 마음이 끌리는 법이죠."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "과학에 의해서 많은 수수께끼가 밝혀졌다고 해도,"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "미지의 영역이라는 것은, 여전히 남아 있습니다."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-3 = "……그렇지 않다면, 지루해져 버릴 테니까요."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "어느덧 우리는, 목표 지점에 도달하고,"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "그리고…… 한층 더 높은 목표의 탄생을 목격하게 되겠지요."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "축하합니다, 선생님. 결과를 예상할 수 있었다고는 하지만,"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "성과를 실감하는 순간은, 기뻐해도 좋지 않을까요?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "어머, 이건 소위 말하는 '당첨'이군요?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "통계학적으로 보면, 당연한 결과라고 해도"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "거기에서 기쁨을 느끼는 것은 우리의 자유……"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "훌륭합니다, 선생님. 저도 기뻐요."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "'특별함'을 느낄 수 있는 건 '보통'이 있기 때문이죠."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "그러니 '보통'을 소중히 여겨주세요. 선생님."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "…하는 김에, 고생하고 있는 초천재 청초계 병약미소녀도요."
20020-CVGroup_UITitle_Idle1-1 = "블루~ 아카이브~ 후훗."
20020-CVGroup_CharacterGet_Idle1-1 = "베리타스의 부장 겸 초현상특무부의 부장….\n밀레니엄 최고의 청초계 병약 미소녀 해커. 아케보시 히마리라고 합니다.\n후훗, 잘 부탁드린답니다? 선생님."
20020-CVGroup_Cafe_Idle1-1 = "(이 방, 조금 추운 것 같네요….)"
20020-CVGroup_Cafe_Idle2-1 = "많은 분들이 계시네요…. …조금 지치는걸요."
20020-CVGroup_Cafe_Idle3-1 = "어라, 이런 게 있을 줄은. 뭔가 재밌어 보이네요."
20020-CVGroup_Cafe_Idle4-1 = "후훗, 이 넓이라면 베리타스의 모두나 에이미와 함께 피크닉도 할 수 있을 것 같네요."
20020-CVGroup_Cafe_Idle5-1 = "나쁘지 않은 장소네요. 좀 더 편의 기능도 충실했으면 좋을 듯한데….\n…가볍게 해킹해볼까요?"
20020-CVGroup_WeaponGet_Idle1-1 = "뭐, 이런 귀중한 물건을 받을 수 있다니. 무언가 소원이라도 있으신가요?\n저는 초천재미소녀니까. 뭐든지 다 이뤄드리… 네?\n늘 의지하고 있으니까…? 그, 그런가요…. 감사합니다… 선생님."

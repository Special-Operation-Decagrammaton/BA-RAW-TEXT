20020-CVGroup_UIMiniEventLobby_Idle2-1 = "ยิ่งข้อมูลมากเท่าไรก็ยิ่งดีเท่านั้น แต่ว่านี่มัน..."
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "ถ้าให้มามากเกินไปในครั้งเดียว มันก็ลำบากอยู่นิดหน่อยนะคะ"

20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "แต่ช่วงเวลาที่ได้สัมผัสกับความสำเร็จ\nก็น่าจะมีความสุขไม่ใช่เหรอคะ?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "ตายจริง นี่มันคือสิ่งที่เรียกว่า 'ถูกรางวัล' ใช่มั้ยคะ?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "หากดูตามสถิติ ถึงจะบอกว่าผลมันแน่นอนอยู่แล้วก็เถอะ"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "แต่การที่จะดีใจในเรื่องนั้น มันก็เป็นสิทธิของพวกเรา..."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "ยอดเยี่ยมมากค่ะ คุณครู ฉันเองก็ดีใจเหมือนกันค่ะ"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "สิ่งที่ทำให้รู้สึกได้ถึง 'ความพิเศษ' ก็เพราะมี 'ความธรรมดา' อยู่ยังไงล่ะคะ"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "เพราะงั้นช่วยรักษา 'ความธรรมดา'  ไว้อย่างดีด้วยนะคะคุณครู"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "แล้วก็... สาวน้อยผู้มีรอยยิ้มฮีลใจที่กำลังทำงานหนักคนนี้ด้วยนะคะ"
20020-CVGroup_UITitle_Idle1-1 = "ฮุฮุ Blue~ Archive~"
20020-CVGroup_CharacterGet_Idle1-1 = "หัวหน้าชมรมชมรมปรากฏการณ์ลี้ลับและชมรมเวอริทัส...\nแฮ็กเกอร์สาวแสนสวยผู้บอบบางแห่งมิลเลเนียม อาเกโบชิ ฮิมาริค่ะ\nฮุฮุ ขอฝากเนื้อฝากตัวด้วยนะคะ คุณครู"
20020-CVGroup_Cafe_Idle1-1 = "(ห้องนี้... รู้สึกว่าอากาศจะเย็นนิดหน่อยนะคะ...)"
20020-CVGroup_Cafe_Idle2-1 = "มีคนอยู่ที่นี่เยอะเลยนะคะ\nฉันรู้สึก... เหนื่อยนิดหน่อยค่ะ"
20020-CVGroup_Cafe_Idle3-1 = "เอ๋ ไม่รู้เลยว่ามีของแบบนี้ด้วย\nดูน่าสนุกดีนะคะ"
20020-CVGroup_Cafe_Idle4-1 = "ฮิฮิ ถ้ามีพื้นที่ขนาดนี้ละก็...\nคงจะชวนสมาชิกเวอริทัสทุกคน\nแล้วก็เอมิมาปิกนิกด้วยกันได้แน่ๆ เลยค่ะ"
20020-CVGroup_Cafe_Idle5-1 = "ห้องนี้ใช้ได้เลยนะคะ\nถ้าเพิ่มฟังก์ชั่นอำนวยความสะดวกเข้าไปน่าจะดีนะคะ...\nเรามาลองแฮ็กระบบดูกันมั้ยคะ?"
20020-CVGroup_WeaponGet_Idle1-1 = "ให้ของมีค่ากับฉันแบบนี้คาดหวังอะไรอยู่รึเปล่าคะ?\nฉันเป็นสาวน้อยอัจฉริยะนะคะ ไม่ว่าเรื่องไหนก็ทำให้สมปรารถนาได้ค่ะ\nชะ... เชื่อใจฉันอยู่แล้วงั้นเหรอคะ?\nงะ... งั้นเหรอคะ...? ขอบคุณค่ะคุณครู"

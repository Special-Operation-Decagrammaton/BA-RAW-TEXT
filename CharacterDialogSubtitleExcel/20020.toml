20020-CVGroup_UIMiniEventShop_Buy4-3 = "นี่เป็นความสำเร็จของ 'การแลกเปลี่ยนสินค้า' กันสินะคะ "
20020-CVGroup_UIMiniEventShop_Buy5-1 = "ขอบคุณเสมอเลยนะคะ\nเป็นยังไงบ้างคะ...?"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "บริการหน้าร้านประจำวันของสาวน้อยผู้มีรอยยิ้มพิมพ์ใจ"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "ฉันลองปรับทิศทางการวิเคราะห์นิดหน่อยค่ะ"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "ความบังเอิญกับความแน่นอน\nทฤษฎีสัมบูรณ์และสัมพัทธภาพ..."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "เป็นข้อมูลที่มีเสน่ห์มากเลยค่ะ\nไม่คิดอย่างนั้นเหรอคะ? คุณครู"

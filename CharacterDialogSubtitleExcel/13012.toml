[translation]
13012-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
13012-CVGroup_CharacterGet_Idle1-1 = "我是女武神警察學園的桐乃！\n請各位舉起雙手，服從本官的指示！"
13012-CVGroup_Cafe_Idle1-1 = "我看看，應該沒有犯罪者躲在這裡吧？"
13012-CVGroup_Cafe_Idle2-1 = "這種東西，在規定上是沒問題的嗎？"
13012-CVGroup_Cafe_Idle3-1 = "那個人，總覺得好像在哪裡看過……\n該不會是懸賞通緝犯？"
13012-CVGroup_Cafe_Idle4-1 = "今天也沒有異常！"
13012-CVGroup_Cafe_Idle5-1 = "今天的奇普托斯也相當和平！"
13012-CVGroup_WeaponGet_Idle1-1 = "為了能夠與這把槍相稱地熟練使用它，我會好好精進自己的……！"

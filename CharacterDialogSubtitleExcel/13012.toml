[translation]
13012-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
13012-CVGroup_CharacterGet_Idle1-1 = "คิริโนะจากสถาบันฝึกตำรวจวัลคิรี่ค่ะ!\nยกมือขึ้นและทำตามที่บอกด้วยค่ะ!"
13012-CVGroup_Cafe_Idle1-1 = "ที่นี่คงไม่มีพวกอาชญากร\nซ่อนอยู่หรอกใช่มั้ยคะ?"
13012-CVGroup_Cafe_Idle2-1 = "ของพวกนี้เอาเข้าไปในโรงเรียน\nไม่ผิดกฎหมายเหรอคะ...?"
13012-CVGroup_Cafe_Idle3-1 = "คนนั้น...หน้าคุ้นๆ จัง...\nหรือว่าเป็นอาชญากรที่มีประกาศจับ?"
13012-CVGroup_Cafe_Idle4-1 = "วันนี้ไม่มีเรื่องรายงานเป็นพิเศษค่ะ!"
13012-CVGroup_Cafe_Idle5-1 = "วันนี้คิโวทอสก็เงียบสงบดีจังเลยนะคะ!"
13012-CVGroup_WeaponGet_Idle1-1 = "ถ้าใช้ปืนนี้ได้ชำนาญละก็... จะดีขนาดไหนกันนะ?"

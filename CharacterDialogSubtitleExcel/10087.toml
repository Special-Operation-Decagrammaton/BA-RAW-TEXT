[translation]
10087-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10087-CVGroup_CharacterGet_Idle1-1 = "후후, 선생님. 어떠신가요, 이 드레스?\n…여기선 솔직하게 칭찬해 주시면 된다구요.\n…뭐, 그렇다고는 해도 선생님의 의견은 어디까지나 참고용일 뿐이지만요."
10087-CVGroup_Cafe_Idle1-1 = "지금의 전…. 한 명의 스파이…. 흐흥."
10087-CVGroup_Cafe_Idle2-1 = "히나 부장님께선, 어디 계신 걸까요."
10087-CVGroup_Cafe_Idle3-1 = "이 차림새, 움직이기 편해서 좋아합니다만… 조금 추운 것 같기도…."
10087-CVGroup_Cafe_Idle4-1 = "후우, 오늘만큼은 트러블이 없었으면 좋겠는데…."
10087-CVGroup_Cafe_Idle5-1 = "(후후, 여기에선 여유를 가지고….)"
10087-CVGroup_WeaponGet_Idle1-1 = "변함없는 지원, 감사드립니다. 선생님도 이미 잘 알고 계시겠지만──\n저, 아마우 아코는 당신을 결코 실망시키지 않습니다. 지금까지도, 앞으로도.\n이후의 저에게 부디 기대해 주세요."
10087-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요. 선생님."
10087-CVGroup_UIEventLobby_Enter1-2 = "준비는 모두 되셨나요?"
10087-CVGroup_UIEventLobby_Enter1-3 = "각오, 단단히 해주세요."
10087-CVGroup_UIEventLobby_Enter2-1 = "준비라면 차질 없이 완료되었습니다."
10087-CVGroup_UIEventLobby_Enter2-2 = "게헨나 선도부의 행정관으로서…"
10087-CVGroup_UIEventLobby_Enter2-3 = "지금이야말로 일어설 때겠죠."
10087-CVGroup_UIEventLobby_Enter3-1 = "간단하게는 끝나지 않는다…라는 말씀이시군요."
10087-CVGroup_UIEventLobby_Enter3-2 = "뭐, 그렇다고 포기할 수는 없지만요."
10087-CVGroup_UIEventLobby_Enter4-1 = "저어엉말~! 끈질기네요!"
10087-CVGroup_UIEventLobby_Enter4-2 = "후우, 뭐, 좋아요!"
10087-CVGroup_UIEventLobby_Enter4-3 = "그렇다면 이쪽도 끝까지 해줄 각오가 되어있으니까!"
10087-CVGroup_UIEventLobby_Enter4-4 = "자, 계속해서 부탁드린다구요! 선생님!"
10087-CVGroup_UIEventLobby_Enter5-1 = "드디어 끝났나요……."
10087-CVGroup_UIEventLobby_Enter5-2 = "정말 여러 가지 일이 있었다고 할지."
10087-CVGroup_UIEventLobby_Enter5-3 = "이젠 진이 빠졌다고 할지."
10087-CVGroup_UIEventLobby_Enter5-4 = "……돌아가서 커피라도 한잔하실래요? 선생님."
10087-CVGroup_UIEventLobby_Idle1-1 = "이번 파티도 결국 이렇게……."
10087-CVGroup_UIEventLobby_Idle1-2 = "정말, 어떻게 되어버리는 걸까요."
10087-CVGroup_UIEventLobby_Idle2-1 = "뭐, 상관없어요…."
10087-CVGroup_UIEventLobby_Idle2-2 = "무슨 일이 일어나도, 우리 선도부가……."
10087-CVGroup_UIEventLobby_Idle2-3 = "아니, 제가 해결해 보이겠어요!"
10087-CVGroup_UIEventLobby_Idle3-1 = "지금의 전 히나 부장님을 보좌하는 또 한 명의 스파이."
10087-CVGroup_UIEventLobby_Idle3-2 = "역시 여기에선, 그간 감춰왔던 진정한 실력을 보일 때겠죠."
10087-CVGroup_UIEventLobby_Idle3-3 = "후후, 기대하시라구요."
10087-CVGroup_UIEventLobby_Idle4-1 = "올해는 조용하나 싶었더니……."
10087-CVGroup_UIEventLobby_Idle4-2 = "아니, 게헨나에선 역시 무리인 이야기려나요. 하아."
10087-CVGroup_UIEventMission_Enter1-1 = "어서 오세요. 선생님."
10087-CVGroup_UIEventMission_Enter1-2 = "마침 해결해 주셨으면 하는 일이 있어서요."
10087-CVGroup_UIEventMission_Enter1-3 = "부탁드려도 될까요?"
10087-CVGroup_UIEventMission_Enter2-1 = "후후, 여기까지 오셨다면 도망칠 수 없습니다."
10087-CVGroup_UIEventMission_Enter2-2 = "네, 업무 리스트가 잔뜩♪ 이니까요."
10087-CVGroup_UIEventMission_Idle1-1 = "네에, 땡땡이 치실 생각이라면 그만두세요."
10087-CVGroup_UIEventMission_Idle1-2 = "제가 바로 곁에서 감시… 실례, 보좌하고 있으니까요."
10087-CVGroup_UIEventMission_Idle2-1 = "눈앞에 닥친 일을 하기 전에, 딴짓을 하고 싶은 마음은 이해해요."
10087-CVGroup_UIEventMission_Idle2-2 = "다만 그런 건 일이 전부 끝난 후에."
10087-CVGroup_UIEventMission_Idle2-3 = "…아시겠죠?"
10087-CVGroup_UIEventMission_Buy1-1 = "흐응~ 제법이잖아요."
10087-CVGroup_UIEventMission_Buy1-2 = "네, 일한 보수는 제대로 있어요. 당연한 일이에요."
10087-CVGroup_UIEventMission_Buy2-1 = "세상에… 단번에 해결하신 건가요."
10087-CVGroup_UIEventMission_Buy2-2 = "헤에… 솔직히 감탄했습니다. 역시 선생님이시네요."
10087-CVGroup_UIEventMission_Interaction1-1 = "네, 오늘의 업무는 이것으로 끝입니다."
10087-CVGroup_UIEventMission_Interaction1-2 = "수고하셨습니다. 선생님."

[translation]
10087-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10087-CVGroup_CharacterGet_Idle1-1 = "呵呵，老師。這件禮服怎麼樣啊？\n……這時只要坦率地稱讚就行了唷。\n……不過話雖如此，老師的意見終究也只是參考而已。"
10087-CVGroup_Cafe_Idle1-1 = "現在的我…\n是一名間諜…哼哼～"
10087-CVGroup_Cafe_Idle2-1 = "陽奈委員長，會在哪裡呢？"
10087-CVGroup_Cafe_Idle3-1 = "這副打扮，因為方便行動所以我很喜歡…\n可是好像有點冷…"
10087-CVGroup_Cafe_Idle4-1 = "呼，希望至少今天不會發生麻煩…"
10087-CVGroup_Cafe_Idle5-1 = "（呵呵，在這裡悠閒一下…）"
10087-CVGroup_WeaponGet_Idle1-1 = "始終給予支援，真是感激不盡。\n雖然老師應該也已經知道──\n我，天雨亞子絕不會讓您失望。\n無論是過去，還是未來。敬請期待未來的我哦。"
10087-CVGroup_UIEventLobby_Enter1-1 = "歡迎回來，老師。"
10087-CVGroup_UIEventLobby_Enter1-2 = "準備都做好了嗎？"
10087-CVGroup_UIEventLobby_Enter1-3 = "請確實做好覺悟哦。"
10087-CVGroup_UIEventLobby_Enter2-1 = "準備已經順利完成。"
10087-CVGroup_UIEventLobby_Enter2-2 = "身為格黑娜風紀委員會的行政官……"
10087-CVGroup_UIEventLobby_Enter2-3 = "我想現在正是展開行動的時候。"
10087-CVGroup_UIEventLobby_Enter3-1 = "沒這麼容易結束……是這麼回事吧。"
10087-CVGroup_UIEventLobby_Enter3-2 = "算了，即便如此也不能放棄。"
10087-CVGroup_UIEventLobby_Enter4-1 = "真是超～級！難纏耶！"
10087-CVGroup_UIEventLobby_Enter4-2 = "唉……算了！"
10087-CVGroup_UIEventLobby_Enter4-3 = "既然如此，我也做好奉陪到底的覺悟了！"
10087-CVGroup_UIEventLobby_Enter4-4 = "來吧，繼續拜託您了！老師！"
10087-CVGroup_UIEventLobby_Enter5-1 = "終於結束了……"
10087-CVGroup_UIEventLobby_Enter5-2 = "真的發生了很多事……"
10087-CVGroup_UIEventLobby_Enter5-3 = "已經筋疲力盡了。"
10087-CVGroup_UIEventLobby_Enter5-4 = "……回去喝杯咖啡怎麼樣？老師。"
10087-CVGroup_UIEventLobby_Idle1-1 = "這次的派對結果也變成這樣……"
10087-CVGroup_UIEventLobby_Idle1-2 = "真的是，究竟會如何呢。"
10087-CVGroup_UIEventLobby_Idle2-1 = "算了，無所謂……"
10087-CVGroup_UIEventLobby_Idle2-2 = "不管發生什麼事，我們風紀委員會……"
10087-CVGroup_UIEventLobby_Idle2-3 = "不，我一定會想辦法解決！"
10087-CVGroup_UIEventLobby_Idle3-1 = "現在的我是協助陽奈委員長的另一名間諜。"
10087-CVGroup_UIEventLobby_Idle3-2 = "既然如此，是時候展現一直隱藏的真正實力了。"
10087-CVGroup_UIEventLobby_Idle3-3 = "呵呵，敬請期待吧。"
10087-CVGroup_UIEventLobby_Idle4-1 = "本來還在想今年會不會安靜一點……"
10087-CVGroup_UIEventLobby_Idle4-2 = "不，在格黑娜終究是無稽之談吧……唉。"
10087-CVGroup_UIEventMission_Enter1-1 = "歡迎回來，老師。"
10087-CVGroup_UIEventMission_Enter1-2 = "正好有事希望老師幫忙解決。"
10087-CVGroup_UIEventMission_Enter1-3 = "可以拜託您嗎？"
10087-CVGroup_UIEventMission_Enter2-1 = "呵呵，既然都來到這裡了，請別以為還逃得走哦。"
10087-CVGroup_UIEventMission_Enter2-2 = "沒錯，業務清單滿～滿的唷♪"
10087-CVGroup_UIEventMission_Idle1-1 = "來～如果想偷懶還是死了這條心吧。"
10087-CVGroup_UIEventMission_Idle1-2 = "因為我會在旁邊監視……不好意思，是輔佐。"
10087-CVGroup_UIEventMission_Idle2-1 = "在做眼前的工作之前，會想做其他事的心情我也能理解。"
10087-CVGroup_UIEventMission_Idle2-2 = "不過……那還是要等工作全部結束再說。"
10087-CVGroup_UIEventMission_Idle2-3 = "……知道了嗎？"
10087-CVGroup_UIEventMission_Buy1-1 = "嘿～挺厲害的嘛。"
10087-CVGroup_UIEventMission_Buy1-2 = "來，工作自然會有報酬。\n這是當然的。"
10087-CVGroup_UIEventMission_Buy2-1 = "竟然……一口氣解決掉了嗎。"
10087-CVGroup_UIEventMission_Buy2-2 = "嘿……老實說我很佩服。\n不愧是老師呢。"
10087-CVGroup_UIEventMission_Interaction1-1 = "是，今天的工作就到此結束。"
10087-CVGroup_UIEventMission_Interaction1-2 = "辛苦了，老師。"

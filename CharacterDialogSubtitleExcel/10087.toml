[translation]
10087-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10087-CVGroup_CharacterGet_Idle1-1 = "ฮุฮุ คุณครู ชุดนี้เป็นยังไงบ้างคะ?\nอยู่ที่นี่น่ะ ชมฉันอย่างเปิดเผยได้เลยค่ะ...\nแต่ถึงอย่างนั้น ความคิดเห็นของคุณครูจะถูกใช้สำหรับอ้างอิงเท่านั้นค่ะ"
10087-CVGroup_Cafe_Idle1-1 = "ตอนนี้ฉัน... เป็นสายลับคนหนึ่ง... ฮึ่ม"
10087-CVGroup_Cafe_Idle2-1 = "ท่านประธานฮินะ ไปอยู่ที่ไหนนะคะ?"
10087-CVGroup_Cafe_Idle3-1 = "ฉันชอบที่ใส่ชุดนี้แล้ว เคลื่อนไหวสะดวกดีค่ะ...\nแต่มันก็หนาวอยู่หน่อยๆ..."
10087-CVGroup_Cafe_Idle4-1 = "ฮู่ว หวังว่าวันนี้จะไม่เกิดปัญหาอะไรนะ…"
10087-CVGroup_Cafe_Idle5-1 = "(ฮุฮุ อยู่ที่นี่แล้วชิลจังเลยนะคะ...)"
10087-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณที่ช่วยสนับสนุนกันตลอดนะคะ\nคุณครูเองก็อาจจะรู้อยู่แล้วว่าฉัน\nอามาอุ อาโกะ จะไม่ทำให้ผิดหวังค่ะ\nทั้งที่ผ่านมาจนถึงตอนนี้และในอนาคตด้วย\nช่วยคาดหวังในตัวฉันหลังจากนี้ด้วยนะคะ"
10087-CVGroup_UIEventLobby_Enter1-1 = "เชิญค่ะคุณครู"
10087-CVGroup_UIEventLobby_Enter1-2 = "ทุกอย่างพร้อมหรือยังคะ?"
10087-CVGroup_UIEventLobby_Enter1-3 = "เตรียมตัวให้ดีด้วยนะคะ"
10087-CVGroup_UIEventLobby_Enter2-1 = "เรื่องเตรียมการ สำเร็จอย่างราบรื่นแล้วค่ะ"
10087-CVGroup_UIEventLobby_Enter2-2 = "ในฐานะเจ้าหน้าที่ของคณะกรรมการวินัยเกเฮนน่า"
10087-CVGroup_UIEventLobby_Enter2-3 = "ตอนนี้คือเวลาที่ฉันต้องลุกขึ้นมาค่ะ"
10087-CVGroup_UIEventLobby_Enter3-1 = "มันคงจะไม่จบลงไปได้ง่ายๆ เลย... สินะคะ"
10087-CVGroup_UIEventLobby_Enter3-2 = "แต่ถึงอย่างนั้นก็จะล้มเลิกไม่ได้หรอกค่ะ"
10087-CVGroup_UIEventLobby_Enter4-1 = "ไม่ยอมถอดใจจริงๆ เลยนะคะ~!"
10087-CVGroup_UIEventLobby_Enter4-2 = "ฮู่ว แต่ก็ดีค่ะ!"
10087-CVGroup_UIEventLobby_Enter4-3 = "ถ้างั้นทางเราก็จะเตรียมพร้อมจนจบเรื่องให้เหมือนกัน!"
10087-CVGroup_UIEventLobby_Enter4-4 = "เอาละ ต้องขอร้องกันต่อเลยละค่ะ คุณครู!"
10087-CVGroup_UIEventLobby_Enter5-1 = "ในที่สุดก็จบสักทีนะคะ..."
10087-CVGroup_UIEventLobby_Enter5-2 = "ฉันควรบอกว่าเกิดเรื่องขึ้นมากมายเลย"
10087-CVGroup_UIEventLobby_Enter5-3 = "หรือว่าตอนนี้หมดแรงแล้วดีนะ"
10087-CVGroup_UIEventLobby_Enter5-4 = "กลับไปดื่มกาแฟกันสักแก้วมั้ยคะคุณครู?"
10087-CVGroup_UIEventLobby_Idle1-1 = "สุดท้ายแล้ว ปาร์ตี้ครั้งนี้ก็..."
10087-CVGroup_UIEventLobby_Idle1-2 = "จริงๆ เลย เป็นแบบนี้ ขึ้นมาได้ยังไงคะเนี่ย"
10087-CVGroup_UIEventLobby_Idle2-1 = "แต่ก็ไม่เป็นไรหรอกค่ะ"
10087-CVGroup_UIEventLobby_Idle2-2 = "ไม่ว่าจะเกิดเรื่องอะไร\nคณะกรรมการวินัยของเรา..."
10087-CVGroup_UIEventLobby_Idle2-3 = "ไม่สิ ฉันจะลองคลี่คลายดูค่ะ!"
10087-CVGroup_UIEventLobby_Idle3-1 = "นักสืบอีกคนที่มาเป็นผู้ช่วยหัวหน้าฮินะก่อนหน้านี้"
10087-CVGroup_UIEventLobby_Idle3-2 = "ตอนนี้ถึงเวลาแสดงฝีมือที่แท้จริงที่ซ่อนมาตลอดแล้วค่ะ"
10087-CVGroup_UIEventLobby_Idle3-3 = "ฮุฮุ ตั้งตารอได้เลยค่ะ"
10087-CVGroup_UIEventLobby_Idle4-1 = "ก็คิดอยู่ว่าปีนี้จะเงียบๆ รึเปล่า..."
10087-CVGroup_UIEventLobby_Idle4-2 = "ไม่สิ เรื่องแบบนั้นคงยากที่จะเกิดในเกเฮนน่ารึเปล่าคะ? เฮ้อ"
10087-CVGroup_UIEventMission_Enter1-1 = "เชิญค่ะคุณครู"
10087-CVGroup_UIEventMission_Enter1-2 = "มีเรื่องที่ฉันอยากให้ ช่วยคลี่คลายพอดีเลยค่ะ"
10087-CVGroup_UIEventMission_Enter1-3 = "ช่วยหน่อยได้มั้ยคะ?"
10087-CVGroup_UIEventMission_Enter2-1 = "ฮุฮุ ถ้ามาถึงตรงนี้แล้ว ก็หนีไม่ได้แล้วละค่ะ"
10087-CVGroup_UIEventMission_Enter2-2 = "ค่ะ เพราะงานที่ต้องทำยาวเป็นหางว่าว♪ เลยค่ะ"
10087-CVGroup_UIEventMission_Idle1-1 = "ค่ะ หยุดความคิดที่จะโดดงานเลยนะคะ"
10087-CVGroup_UIEventMission_Idle1-2 = "ฉันจับตาดูอยู่ข้างๆ... ขอโทษค่ะ\nเป็นเพราะฉันคอยช่วยเหลืออยู่น่ะค่ะ"
10087-CVGroup_UIEventMission_Idle2-1 = "ฉันเข้าใจความรู้สึกที่อยากทำอย่างอื่น\nก่อนจะทำเรื่องที่อยู่ตรงหน้าค่ะ"
10087-CVGroup_UIEventMission_Idle2-2 = "แต่เรื่องแบบนั้น เอาไว้ทำหลังจากงานจบ"
10087-CVGroup_UIEventMission_Idle2-3 = "เข้าใจมั้ยคะ...?"
10087-CVGroup_UIEventMission_Buy1-1 = "หืม~ ไม่ธรรมดาเลยนะคะ"
10087-CVGroup_UIEventMission_Buy1-2 = "ค่ะ ฉันมีค่าตอบแทนจากงานอย่างสมน้ำสมเนื้อเลย\nมันแน่อยู่แล้วค่ะ"
10087-CVGroup_UIEventMission_Buy2-1 = "อะไรกัน...! จัดการได้ในรวดเดียวเลยเหรอคะ?"
10087-CVGroup_UIEventMission_Buy2-2 = "แหะๆ... พูดตามตรงว่าประทับใจเลยค่ะ\nสมกับที่เป็นคุณครูเลย"
10087-CVGroup_UIEventMission_Interaction1-1 = "ค่ะ งานของวันนี้เสร็จเท่านี้ค่ะ"
10087-CVGroup_UIEventMission_Interaction1-2 = "ทำได้ดีมากค่ะคุณครู"

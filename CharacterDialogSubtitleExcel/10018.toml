[translation]
10018-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案！"
10018-CVGroup_CharacterGet_Idle1-1 = "我是遊戲開發部的，部長……柚子。\n真，真的……要帶我走嗎？"
10018-CVGroup_Cafe_Idle1-1 = "老師一定也……\n喜歡成熟的女性，對吧？"
10018-CVGroup_Cafe_Idle2-1 = "我想認真地\n學習遊戲。"
10018-CVGroup_Cafe_Idle3-1 = "真是舒適的空間呢。\n真想在這種地方好好睡一覺。"
10018-CVGroup_Cafe_Idle4-1 = "唔嗯～\n有沒有地方可以躲起來呢。"
10018-CVGroup_Cafe_Idle5-1 = "噫！\n為，為什麼會在這裡！"
10018-CVGroup_WeaponGet_Idle1-1 = "感覺身體裡……湧出了一股力量。\n這就是……勇氣嗎？"

[translation]
10018-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브!"
10018-CVGroup_CharacterGet_Idle1-1 = "게임개발부 부장… 유즈예요. 저, 정말로… 저를 데려가 주시겠어요?"
10018-CVGroup_Cafe_Idle1-1 = "역시 선생님도… 성숙한 타입을 좋아하겠지?"
10018-CVGroup_Cafe_Idle2-1 = "게임을 본격적으로 공부하고 싶어."
10018-CVGroup_Cafe_Idle3-1 = "편안해 보이는 공간이네. 이런 곳에서 한숨 자고 싶다."
10018-CVGroup_Cafe_Idle4-1 = "으음. 숨을 곳은 없으려나."
10018-CVGroup_Cafe_Idle5-1 = "히익! 어째서 여기에!"
10018-CVGroup_WeaponGet_Idle1-1 = "몸 안에서…… 힘이 차오르는 느낌이에요. 이것이…… 용기일까요?"

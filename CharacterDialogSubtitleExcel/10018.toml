[translation]
10018-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10018-CVGroup_CharacterGet_Idle1-1 = "ฉันชื่อยูสึ... เป็นหัวหน้าชมรมพัฒนาเกมค่ะ\nคะ...คือ...จะพาฉันไปจริงๆ เหรอคะ?"
10018-CVGroup_Cafe_Idle1-1 = "ที่จริงแล้วคุณครูเอง... ก็ชอบคนที่โตเป็นผู้ใหญ่แล้วใช่มั้ยล่ะคะ"
10018-CVGroup_Cafe_Idle2-1 = "ฉันอยากเรียนเกี่ยวกับเกมอย่างจริงจังค่ะ"
10018-CVGroup_Cafe_Idle3-1 = "ที่นี่สบายจังเลยนะคะ\nฉันอยากจะนอนหลับปุ๋ยอยู่ที่นี่จังเลย...~"
10018-CVGroup_Cafe_Idle4-1 = "อืม... ไม่มีที่ให้ซ่อนเลยเหรอ..."
10018-CVGroup_Cafe_Idle5-1 = "ฮึ่ก! ทะ...ทำไมถึงอยู่ที่นี่ได้คะ!"
10018-CVGroup_WeaponGet_Idle1-1 = "รู้สึกเหมือน... มีพลังพลุ่งพล่านอยู่ในร่างกายเลยค่ะ\nนี่คือ... ความกล้ารึเปล่าคะ?"

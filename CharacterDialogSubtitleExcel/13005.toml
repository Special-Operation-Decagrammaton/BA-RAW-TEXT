[translation]
13005-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
13005-CVGroup_CharacterGet_Idle1-1 = "我沒有在生氣，所以請不要誤會。老師。\n我經常被別人說我的臉很兇。"
13005-CVGroup_Cafe_Idle1-1 = "唉…真擔心。"
13005-CVGroup_Cafe_Idle2-1 = "哼嗯，稍微有點興趣了。"
13005-CVGroup_Cafe_Idle3-1 = "接下來的計畫是…\n算了，就這樣吧。"
13005-CVGroup_Cafe_Idle4-1 = "意外的…很可愛？\n哼，是無聊的玩笑…對吧。"
13005-CVGroup_Cafe_Idle5-1 = "嘛，臉很可怕這件事我也很清楚。"
13005-CVGroup_WeaponGet_Idle1-1 = "雖然我對老師的決定沒有異議……\n唉……沒什麼。\n為了不辜負期待，我會努力的。"

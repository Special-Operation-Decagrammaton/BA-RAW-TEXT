[translation]
13005-CVGroup_UITitle_Idle1-1 = "Blue Archive"
13005-CVGroup_CharacterGet_Idle1-1 = "มีแต่คนพูดว่าหน้าของฉันดูน่ากลัว\nแต่ที่หน้าบึ้งแบบนี้ ฉันไม่ได้โกรธอะไรหรอกนะ"
13005-CVGroup_Cafe_Idle1-1 = "เฮ้อ... น่ากังวลจัง"
13005-CVGroup_Cafe_Idle2-1 = "อืม... รู้สึกสนุกขึ้นมาหน่อยแล้วสิ"
13005-CVGroup_Cafe_Idle3-1 = "แผนการในอนาคตเหรอ...\nอืม จะไม่เป็นไรใช่มั้ยนะ"
13005-CVGroup_Cafe_Idle4-1 = "ฉันดูน่ารัก... แบบไม่เคยเห็นมาก่อนเหรอ?\nอืม... แกล้งพูดแบบนี้... ฉันไม่ตลกด้วยหรอกนะ"
13005-CVGroup_Cafe_Idle5-1 = "รู้อยู่แล้วแหละน่าว่าฉันดูน่ากลัว"
13005-CVGroup_WeaponGet_Idle1-1 = "ฉันไม่คัดค้านการตัดสินใจของครูหรอก เฮ้อ... เปล่าหรอก\nฉันจะพยายามทำให้ได้ตามที่คาดหวังก็แล้วกันนะ"

[translation]
10139-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10139-CVGroup_CharacterGet_Idle1-1 = "SRT 특수학원, FOX 소대의 요시노 니코입니다.\n미숙한 몸이지만 앞으로 잘 부탁드립니다."
10139-CVGroup_Cafe_Idle1-1 = "(유부의…… \n좋은 향기가……)"
10139-CVGroup_Cafe_Idle2-1 = "괜찮으시면 방금 만든\n유부초밥 하나,\n드시고 가지\n않겠어요?"
10139-CVGroup_Cafe_Idle3-1 = "오늘은 빨래하기\n좋은 날이네.\n모포가 잘 마르겠어."
10139-CVGroup_Cafe_Idle4-1 = "……요새는 이런 게\n유행인 건가?"
10139-CVGroup_Cafe_Idle5-1 = "이렇게 휴일을\n보내는 것도……\n나쁘지 않을지도."
10139-CVGroup_WeaponGet_Idle1-1 = "FOX 870식 산탄총,\n수령 확인했습니다.\n근접 지원이라면 제게 맡겨주세요."
10139-CVGroup_UIEventLobby_Enter1-1 = "지금부터\n로어 추적 작전을\n시작하겠습니다."
10139-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었습니다,\n선생님."
10139-CVGroup_UIEventLobby_Enter2-2 = "바로 브리핑을\n시작하겠습니다.\n이쪽으로."
10139-CVGroup_UIEventLobby_Enter3-1 = "FOX 소대의\n작전 본부에\n어서오세요."
10139-CVGroup_UIEventLobby_Idle1-1 = "사라진 사람들은\n어디로\n가버린 걸까요……?"
10139-CVGroup_UIEventLobby_Idle2-1 = "SRT의 이름으로\n임무를 수행하는 것도\n정말 오랜만이네요."
10139-CVGroup_UIEventLobby_Idle3-1 = "이렇게라도\n저희의 오명을\n씻어낼 수 있다면……"
10139-CVGroup_UIEventLobby_Idle3-2 = "최선을 다하겠습니다."
10139-CVGroup_UIEventLobby_Idle4-1 = "샬레와의 합동 작전……"
10139-CVGroup_UIEventLobby_Idle4-2 = "여러모로\n기대가 되네요, 후훗."
10139-CVGroup_UIEventLobby_Idle5-1 = "작전 시작 전에\n간단하게 요기라도\n어떠신가요?"
10139-CVGroup_UIEventShop_Enter1-1 = "아, 선생님."
10139-CVGroup_UIEventShop_Enter1-2 = "혹시 괜찮으시면,\n물자 정리를 도와주시겠어요?"
10139-CVGroup_UIEventShop_Enter2-1 = "지난 작전에서 쓰고\n남은 탄약이……"
10139-CVGroup_UIEventShop_Enter2-2 = "아, 어서 오세요.\n선생님."
10139-CVGroup_UIEventShop_Idle1-1 = "뭔가 제가 도울 일이\n있을까요?"
10139-CVGroup_UIEventShop_Idle2-1 = "으햑?!"
10139-CVGroup_UIEventShop_Idle2-2 = "귀, 귀는 예민하니까……\n만지지 말아 주세요……"
10139-CVGroup_UIEventShop_Buy1-1 = "훌륭한 선택이네요."
10139-CVGroup_UIEventShop_Buy2-1 = "감사합니다."
10139-CVGroup_UIEventShop_Buy2-2 = "물자의 교환이라면\n언제든지 불러주세요."
10139-CVGroup_UIEventShop_Buy3-1 = "샬레의 지원은\n언제나 큰 도움이 되네요."

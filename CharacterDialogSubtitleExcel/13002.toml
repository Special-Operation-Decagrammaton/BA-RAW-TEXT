[translation]
13002-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
13002-CVGroup_CharacterGet_Idle1-1 = "我是美食研究會的亞伽里。\n今後一起去吃美食吧！"
13002-CVGroup_Cafe_Idle1-1 = "唔嗯，哪裡有吃的呢。"
13002-CVGroup_Cafe_Idle2-1 = "唔嗯…不管怎麼想…\n老師身邊的女孩子都太多了…"
13002-CVGroup_Cafe_Idle3-1 = "呵呵呵呵…"
13002-CVGroup_Cafe_Idle4-1 = "今天也要和大家一起～\n去吃美食！"
13002-CVGroup_Cafe_Idle5-1 = "哇～聽說今天的餐點是牛排！\n趕快去餐廳吧！"
13002-CVGroup_WeaponGet_Idle1-1 = "如果大家能用大胃王比賽來決定勝負的話就好了。\n雖然我不喜歡用力量解決問題，不過這樣我也準備好了！"

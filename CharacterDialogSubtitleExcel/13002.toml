[translation]
13002-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
13002-CVGroup_CharacterGet_Idle1-1 = "อาคาริจากชมรมชิมอาหารค่ะ\nตั้งแต่นี้ไป… จะไปกินของอร่อยๆ กับฉันมั้ยคะ?"
13002-CVGroup_Cafe_Idle1-1 = "อืม... ไม่มีของกินอยู่เลยหรือไงน้า"
13002-CVGroup_Cafe_Idle2-1 = "อืม... ไม่ว่าจะดูยังไง...\nรอบๆ ตัวคุณครูก็มี\nแต่เด็กผู้หญิงเยอะเกินไปนะ..."
13002-CVGroup_Cafe_Idle3-1 = "ฮุฮุฮุฮุ..."
13002-CVGroup_Cafe_Idle4-1 = "วันนี้พวกเรา~ ก็จะไปกินของอร่อยๆ ด้วยกันค่ะ!"
13002-CVGroup_Cafe_Idle5-1 = "ว้าว! เมนูวันนี้ คือสเต๊กละ!\nรีบไปที่โรงอาหารกันเถอะค่ะ!"
13002-CVGroup_WeaponGet_Idle1-1 = "ถ้าตัดสินแพ้ชนะกันในงานแข่งกินจุได้ก็คงดีแท้ๆ...\nถึงฉันจะไม่ชอบใช้กำลังแก้ปัญหาก็เถอะ\nฉันเองก็เตรียมพร้อมแล้วค่ะ!"

[translation]
13002-CVGroup_UITitle_Idle1-1 = "블루 아카이브~!"
13002-CVGroup_CharacterGet_Idle1-1 = "미식연구회의 아카리예요. 지금부터 같이 맛있는 걸 먹으러 갈까요?"
13002-CVGroup_Cafe_Idle1-1 = "흐음, 어디 먹을 게 없을까요."
13002-CVGroup_Cafe_Idle2-1 = "흐음… 아무리 생각해도… 선생님 주변에 여자애들이 너무 많아…"
13002-CVGroup_Cafe_Idle3-1 = "후후후후…."
13002-CVGroup_Cafe_Idle4-1 = "오늘도 모두와 함께~ 맛있는 걸 먹으러 가는 거에요!"
13002-CVGroup_Cafe_Idle5-1 = "와아! 오늘 메뉴는 스테이크래요! 어서 식당으로 가요!"
13002-CVGroup_WeaponGet_Idle1-1 = "모두가 많이 먹기 대회로 승부를 정하면 좋을 텐데…\n힘으로 해결하고 싶지는 않았지만 저도 이걸로, 준비 완료예요!"

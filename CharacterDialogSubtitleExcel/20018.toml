[translation]
20018-CVGroup_UITitle_Idle1-1 = "블루 아카이브-."
20018-CVGroup_CharacterGet_Idle1-1 = "SRT 특수학원, RABBIT 소대의 카제쿠라 모에야.\n쿠히히… 지원 업무라면 내게 맡겨줘."
20018-CVGroup_Cafe_Idle1-1 = "이곳을 새로운 거점으로 삼아볼까?"
20018-CVGroup_Cafe_Idle2-1 = "…아아, 어쩐지 안심이 되는 걸."
20018-CVGroup_Cafe_Idle3-1 = "사탕이 부족해…"
20018-CVGroup_Cafe_Idle4-1 = "뭔가, 중요한 발사 버튼 같은 게 떨어져 있지 않으려나…?"
20018-CVGroup_Cafe_Idle5-1 = "쿠히히…"
20018-CVGroup_WeaponGet_Idle1-1 = "RABBIT 224식 권총, 제대로 수령했어.\n…저기, 이거 너무 작은데. 화력은 제대로 나오는거야?"

[translation]
20018-CVGroup_UITitle_Idle1-1 = "Blue Archive-"
20018-CVGroup_CharacterGet_Idle1-1 = "สมาชิกกองทหาร RABBIT\nจากสถาบันพิเศษ SRT คาเซะคุระ โมเอะ\nฮุฮุฮุ... งานสนับสนุน ฉันจะคอยช่วยเอง"
20018-CVGroup_Cafe_Idle1-1 = "ที่นี่คือฐานทัพใหม่ของเรางั้นเหรอ?"
20018-CVGroup_Cafe_Idle2-1 = "อา... รู้สึกปลอดภัยดีจัง"
20018-CVGroup_Cafe_Idle3-1 = "อยากได้ลูกอมอีก..."
20018-CVGroup_Cafe_Idle4-1 = "รู้สึกเหมือนว่าปุ่มสำคัญ… มันหายไปนะ...?"
20018-CVGroup_Cafe_Idle5-1 = "ฮิฮิฮิ..."
20018-CVGroup_WeaponGet_Idle1-1 = "ได้รับ Rabbit Type 224 Pistol แล้ว\nอืม... มันค่อนข้างเล็กไปหน่อย\nจะยิงได้แรงสะใจรึเปล่านะ?"

[translation]
10004-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10004-CVGroup_CharacterGet_Idle1-1 = "風紀委員長陽奈。\n我想你應該知道我的名字…請多指教。"
10004-CVGroup_Cafe_Idle1-1 = "可愛的東西…"
10004-CVGroup_Cafe_Idle2-1 = "雖然很想睡午覺…"
10004-CVGroup_Cafe_Idle3-1 = "好像沒有太大的問題。\n真是萬幸。"
10004-CVGroup_Cafe_Idle4-1 = "可以自在一點對吧？"
10004-CVGroup_Cafe_Idle5-1 = "有點不好意思啊…"
10004-CVGroup_WeaponGet_Idle1-1 = "任何故事都有結局，我會見證到最後一刻的。"
10004-CVGroup_UIEventFieldMission_Enter1-1 = "啊，老師。正好有些事希望能請你解決。"
10004-CVGroup_UIEventFieldMission_Enter1-2 = "可以請你幫個忙嗎？"
10004-CVGroup_UIEventFieldMission_Enter2-1 = "歡迎回來，老師。"
10004-CVGroup_UIEventFieldMission_Enter2-2 = "有些與派對無關，身為風紀委員該做的事。"
10004-CVGroup_UIEventFieldMission_Idle1-1 = "工作這種東西，總是怎麼做都做不完呢。"
10004-CVGroup_UIEventFieldMission_Idle1-2 = "嗯？真的打從心底有同感？\n呵呵，老師也很辛苦呢……"
10004-CVGroup_UIEventFieldMission_Idle2-1 = "我沒打算丟下工作哦。"
10004-CVGroup_UIEventFieldMission_Idle2-2 = "因為我，是格黑娜的風紀委員長。"
10004-CVGroup_UIEventFieldMission_Buy1-1 = "謝，謝謝你。"
10004-CVGroup_UIEventFieldMission_Buy1-2 = "這是幫忙的謝禮。收下吧。"
10004-CVGroup_UIEventFieldMission_Buy2-1 = "不愧是老師，真完美。\n託你的福，感覺能放心了……"
10004-CVGroup_UIEventFieldMission_Buy2-2 = "這是幫忙的謝禮。來。"
10004-CVGroup_UIEventFieldMission_Interaction1-1 = "今天就到此為止了吧。\n辛苦你了。老師。"
10004-CVGroup_UIEventFieldMission_Interaction1-2 = "不介意的話……\n要不要一起喝點茶？"

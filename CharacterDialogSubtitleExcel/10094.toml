[translation]
10094-CVGroup_UITitle_Idle1-1 = "블루! 아카이브!"
10094-CVGroup_CharacterGet_Idle1-1 = "메이드라는 거 어떻게 생각해, 선생님? 이야기 소재로서는, 최고 아닐까?"
10094-CVGroup_Cafe_Idle1-1 = "카페... 메이드... 관계가 있을 거 같으면서도, 없는 거 같은……"
10094-CVGroup_Cafe_Idle2-1 = "내가 여기서 일한다면…… 이 바닥 다 청소해야겠지…… 으우."
10094-CVGroup_Cafe_Idle3-1 = "케이크…… 홍차…… 맛있겠다…… 어라? 혹시 내가 준비하는 쪽?"
10094-CVGroup_Cafe_Idle4-1 = "어디선가 몰래 자고 싶다……"
10094-CVGroup_Cafe_Idle5-1 = "카페에서 시작하는 메이드 여행! 같은 시나리오는 어떨까……?"
10094-CVGroup_WeaponGet_Idle1-1 = "들어봐, 선생님! 메이드에게는 무엇보다도 장비가 중요하대!\n잠입, 폭파, 기밀확보. 그리고 세계 평화...... 그런 일을 하려면 좋은 장비가 있어야지!"
10094-CVGroup_UIEventLobby_Enter1-1 = "왔도다, 보았도다! 그리고 이겼…… 나?"
10094-CVGroup_UIEventLobby_Enter1-2 = "아무튼! 메이드 사이바 모모이, 출격이라구!"
10094-CVGroup_UIEventLobby_Enter2-1 = "아, 선생님! 준비라면 진작에……!"
10094-CVGroup_UIEventLobby_Enter2-2 = "어라.....?잠깐, 잠깐만 기다려줘, 선생님!"
10094-CVGroup_UIEventLobby_Enter3-1 = "우에엥, 일이 너무 많아!"
10094-CVGroup_UIEventLobby_Enter3-2 = "이렇게 될 줄은, 몰랐는데……"
10094-CVGroup_UIEventLobby_Enter4-1 = "이해할 수 없어, 이해할 수 없어…"
10094-CVGroup_UIEventLobby_Enter4-2 = "괴도? 경매? 미술품? 뭐야 그거! 무슨 게임의 설정!?"
10094-CVGroup_UIEventLobby_Enter5-1 = "많은 일이 있었지만, 용사들은 악을 물리치고."
10094-CVGroup_UIEventLobby_Enter5-2 = "당당히, 자신들의 보금자리로 귀환한 것이었다……!"
10094-CVGroup_UIEventLobby_Enter5-3 = "뭐, 그런 엔딩이었지. 응? 선생님? 수고 많았어!"
10094-CVGroup_UIEventLobby_Idle1-1 = "응? 메이드다운 일하는 모습을 보고싶어……?"
10094-CVGroup_UIEventLobby_Idle1-2 = "뭐, 일단, 메이드복이니까! 응!"
10094-CVGroup_UIEventLobby_Idle2-1 = "메이드 과목에는 왜 땡땡이 치고 낮잠 자는 수업이 없을까?"
10094-CVGroup_UIEventLobby_Idle2-2 = "이거, 문제라고 생각하지 않아?"
10094-CVGroup_UIEventLobby_Idle3-1 = "맞다! 저기, 선생님. 그거 알아?이 저택에는……"
10094-CVGroup_UIEventLobby_Idle3-2 = "엄청난 비밀이 숨겨져 있대! 내 직감이, 그렇게 말하고 있어!"
10094-CVGroup_UIEventLobby_Idle4-1 = "간, 간지러워! 선생님! 나, 간지럼에 약하다고!"
10094-CVGroup_UIEventLobby_Idle4-2 = "싫은건 아니지만!"

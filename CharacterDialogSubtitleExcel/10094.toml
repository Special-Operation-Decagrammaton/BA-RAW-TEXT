[translation]
10094-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
10094-CVGroup_CharacterGet_Idle1-1 = "What do you think of maids, Sensei? Aren't they a perfect narrative device?"
10094-CVGroup_Cafe_Idle1-1 = "Cafe... Maids... Feels like they're related, but also not..."
10094-CVGroup_Cafe_Idle2-1 = "If I worked here... I'd be cleaning this whole floor... Ugh."
10094-CVGroup_Cafe_Idle3-1 = "Cake... Black tea... Sounds delicious... Huh? I'm the one preparing them?"
10094-CVGroup_Cafe_Idle4-1 = "I want to sneak off and sleep somewhere..."
10094-CVGroup_Cafe_Idle5-1 = "A maid adventure that starts in a cafe! How does that scenario sound...?"
10094-CVGroup_WeaponGet_Idle1-1 = "Listen, Sensei! Apparently, maids need good equipment, above all things! Infiltration, blasting things, securing confidential intel, and creating world peace... You need good equipment to achieve such things!"
10094-CVGroup_UIEventLobby_Enter1-1 = "I came, I saw! And I...won?"
10094-CVGroup_UIEventLobby_Enter1-2 = "Anyway! I'm Maid Saiba Momoi! Let's do this!"
10094-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei! You should've been ready by now...!"
10094-CVGroup_UIEventLobby_Enter2-2 = "Huh...? Wait, wait... Wait up, Sensei!"
10094-CVGroup_UIEventLobby_Enter3-1 = "Waaah... There's so much work!"
10094-CVGroup_UIEventLobby_Enter3-2 = "I had no idea it would turn out this way..."
10094-CVGroup_UIEventLobby_Enter4-1 = "I can't make sense of anything! I just can't..."
10094-CVGroup_UIEventLobby_Enter4-2 = "Thief? Auction? Artwork? What's that? Some kind of game device?!"
10094-CVGroup_UIEventLobby_Enter5-1 = "A lot happened, but the heroes defeated evil."
10094-CVGroup_UIEventLobby_Enter5-2 = "And they returned home with pride!"
10094-CVGroup_UIEventLobby_Enter5-3 = "Well, that was the ending. Huh? Sensei? You did a great job!"
10094-CVGroup_UIEventLobby_Idle1-1 = "Huh? You want to see me doing work a real maid would do?"
10094-CVGroup_UIEventLobby_Idle1-2 = "Well, for starters, I AM wearing a maid uniform! That's right!"
10094-CVGroup_UIEventLobby_Idle2-1 = "Why can't \"playing hooky and taking naps\" be part of maid training?"
10094-CVGroup_UIEventLobby_Idle2-2 = "Don't you think this is a problem?"
10094-CVGroup_UIEventLobby_Idle3-1 = "That's right! Hey, did you know, Sensei? In this mansion..."
10094-CVGroup_UIEventLobby_Idle3-2 = "...they say there's a massive secret hidden! And my instincts agree!"
10094-CVGroup_UIEventLobby_Idle4-1 = "Th-That tickles! Sensei! I'm really ticklish!"
10094-CVGroup_UIEventLobby_Idle4-2 = "...I don't hate it though!"

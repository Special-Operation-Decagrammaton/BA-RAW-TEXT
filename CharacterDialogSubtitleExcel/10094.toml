[translation]
10094-CVGroup_UITitle_Idle1-1 = "蔚藍！檔案！"
10094-CVGroup_CharacterGet_Idle1-1 = "老師，你覺得女僕怎麼樣？\n以故事的題材來說，簡直棒極了對吧？"
10094-CVGroup_Cafe_Idle1-1 = "咖啡廳……女僕……\n好像有關係，又好像沒關係……"
10094-CVGroup_Cafe_Idle2-1 = "如果我在這裡工作……\n這裡的地板，就全都得打掃才行對吧……嗚嗚。"
10094-CVGroup_Cafe_Idle3-1 = "蛋糕……紅茶……感覺很好吃……\n咦？難道說，我是負責準備的那方？"
10094-CVGroup_Cafe_Idle4-1 = "真想躲在某個地方偷偷睡覺……"
10094-CVGroup_Cafe_Idle5-1 = "從咖啡廳展開的女僕之旅！\n類似這樣的劇本怎麼樣……？"
10094-CVGroup_WeaponGet_Idle1-1 = "你聽我說，老師！聽說對於女僕來說，最重要的就是裝備！\n潛入、爆破、竊取機密。\n以及世界和平……想完成這些工作的話，就得有好的裝備才行！"
10094-CVGroup_UIEventLobby_Enter1-1 = "我來！我見！然後我征服……嗎？"
10094-CVGroup_UIEventLobby_Enter1-2 = "總之！女僕才羽桃井，上陣囉！"
10094-CVGroup_UIEventLobby_Enter2-1 = "啊，老師！準備的話我早就……！"
10094-CVGroup_UIEventLobby_Enter2-2 = "咦……？先，先等一下哦，老師！"
10094-CVGroup_UIEventLobby_Enter3-1 = "嗚咿，工作太多了啦！"
10094-CVGroup_UIEventLobby_Enter3-2 = "事情居然會變成這樣，我完全不知道……"
10094-CVGroup_UIEventLobby_Enter4-1 = "無法理解，無法理解啦……"
10094-CVGroup_UIEventLobby_Enter4-2 = "怪盜？拍賣？藝術品？那是什麼啊！某款遊戲的設定！？"
10094-CVGroup_UIEventLobby_Enter5-1 = "儘管經歷了許多事情，勇者們仍擊敗了邪惡，"
10094-CVGroup_UIEventLobby_Enter5-2 = "威風地回到了故鄉……！"
10094-CVGroup_UIEventLobby_Enter5-3 = "嘛，結局就是這樣吧。\n嗯？老師？辛苦了！"
10094-CVGroup_UIEventLobby_Idle1-1 = "嗯？想看符合女僕身分的工作表現……？"
10094-CVGroup_UIEventLobby_Idle1-2 = "也對，畢竟我正穿著女僕裝嘛！嗯！"
10094-CVGroup_UIEventLobby_Idle2-1 = "女僕的學科裡為什麼沒有偷懶午睡的課程呢？"
10094-CVGroup_UIEventLobby_Idle2-2 = "不覺得這是個問題嗎？"
10094-CVGroup_UIEventLobby_Idle3-1 = "對了！吶，老師。你知道嗎？這座宅邸裡……"
10094-CVGroup_UIEventLobby_Idle3-2 = "隱藏著天大的祕密哦！\n我的直覺是這麼說的！"
10094-CVGroup_UIEventLobby_Idle4-1 = "很，很癢耶！老師！我很怕癢啦！"
10094-CVGroup_UIEventLobby_Idle4-2 = "雖然也不討厭就是了！？"

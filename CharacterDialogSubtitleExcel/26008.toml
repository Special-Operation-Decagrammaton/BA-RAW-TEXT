[translation]
26008-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26008-CVGroup_CharacterGet_Idle1-1 = "ถ้าพูดถึงฤดูร้อนก็ต้องร้านริมทะเล!\nถึงจะเป็นที่ทะเล แต่ชมรมจัดงานเทศกาลก็ไม่หวั่นค่ะ!\nคาวาวะ ชิซุโกะ ลุยละนะ!"
26008-CVGroup_Cafe_Idle1-1 = "จะเลือกอาหารอะไรเป็นเมนูหลักของฤดูร้อนดีนะ..."
26008-CVGroup_Cafe_Idle2-1 = "การบริหารร้านสาขามีแต่ประชุมๆ เหนื่อยจัง...\nประชุมแล้วก็ประชุมอีก... ประชุมไม่มีที่สิ้นสุด"
26008-CVGroup_Cafe_Idle3-1 = "มีอะไรที่จะเอามาใช้จัดงานเทศกาลคราวหน้าได้มั้ยนะ..."
26008-CVGroup_Cafe_Idle4-1 = "สักวันหนึ่งร้านเฮียกคิยาโคจะต้องเป็นร้านน้ำชา\nอันดับหนึ่งในคิโวทอสให้ได้...!"
26008-CVGroup_Cafe_Idle5-1 = "เหมือนจะมีไอเดียดีๆ แล้วละค่ะ เยส!"
26008-CVGroup_WeaponGet_Idle1-1 = "คุณครูคอยใส่ใจฉันตลอด... ขอบคุณนะคะ คุณครู\nถ้าคุณครูอยู่ด้วย ร้านของเราก็คงจะพัฒนาต่อไปได้เรื่อยๆ ค่ะ!\nอื้อ ที่พูดเมื่อกี้นี้ก็ดูไม่แย่เลยนะ"
26008-CVGroup_UIEventLobby_Enter1-1 = "เชิญค่ะ คุณครู!\nยินดีต้อนรับสู่ร้านเฮียกคิยาโค สาขาริมทะเลค่ะ!"
26008-CVGroup_UIEventLobby_Enter2-1 = "คุณครู?! ตอนนี้ยังเตรียมการไม่เสร็จดีเลยนะคะ...?!"
26008-CVGroup_UIEventLobby_Enter2-2 = "อะ...เอาเป็นว่า เชิญทางนี้ก่อนค่ะ!"
26008-CVGroup_UIEventLobby_Idle1-1 = "หาของที่ต้องการเจอแล้วหรือยังคะ?"
26008-CVGroup_UIEventLobby_Idle2-1 = "ร้านเฮียกคิยาโคของเราจะต้องรุ่งเรืองยิ่งขึ้นค่ะ\nเอาละค่ะ มาพยายามกันเถอะค่ะ!"
26008-CVGroup_UIEventLobby_Idle3-1 = "จัดการร้านหลายๆ ร้านพร้อมกัน\nนี่ก็เป็นงานใหญ่เอาเรื่องอยู่เหมือนกันนะคะ..."
26008-CVGroup_UIEventLobby_Idle3-2 = "แต่ว่ามันก็สนุกดีอยู่หรอกค่ะ!"
26008-CVGroup_UIEventLobby_Idle4-1 = "อ๊ะ เดี๋ยวสิ คุณครู! ฉันไม่ใช่ของขายนะคะ!"
26008-CVGroup_UIEventLobby_Idle4-2 = "แล้วอีกอย่างตอนนี้... ก็ไม่ใช่เวลาเปิดทำการด้วยค่ะ..."
26008-CVGroup_UIEventLobby_Enter3-1 = "ถึงตอนแรกๆ จะยังสับสนอยู่บ้าง แต่วิกฤตก็คือโอกาส!"
26008-CVGroup_UIEventLobby_Enter3-2 = "ฉันจะใช้โอกาสนี้ทำให้ร้านเฮียกคิยาโคเป็นที่รู้จักค่ะ!"
26008-CVGroup_UIEventLobby_Enter4-1 = "จนถึงตอนนี้ก็เป็นไปตามแผน..."
26008-CVGroup_UIEventLobby_Enter4-2 = "อ๊ะ คุณครู! เชิญเลยค่ะ!\nวันนี้เพราะมีคุณครูอยู่คอยช่วย...\nก็เลยผ่านไปได้อย่างราบรื่นค่ะ!"
26008-CVGroup_UIEventLobby_Enter5-1 = "แผนการครั้งนี้พังทลายกลายเป็นฟองน้ำไปแล้ว..."
26008-CVGroup_UIEventLobby_Enter5-2 = "แต่ฉันยังไม่ยอมแพ้เรื่องเป้าหมายของฉันหรอกค่ะ!"
26008-CVGroup_UIEventShop_Enter1-1 = "ฉันเตรียมของหลายๆ อย่างที่จะเป็นประโยชน์ตอนอยู่ที่ทะเลมาด้วยค่ะ!"
26008-CVGroup_UIEventShop_Enter2-1 = "ถ้ามีสิ่งของที่ไม่ได้ใช้เอามาแลกได้นะคะ!"
26008-CVGroup_UIEventShop_Idle1-1 = "ค่า ค่า~ เมื่อกี้เรียกชิซุโกะเหรอคะ?"
26008-CVGroup_UIEventShop_Idle2-1 = "ของดีราคาถูกคือพื้นฐานของการขายของค่ะ"
26008-CVGroup_UIEventShop_Buy1-1 = "ขอบคุณที่มาใช้บริการค่า!"
26008-CVGroup_UIEventShop_Buy2-1 = "อ๊ะ เลือกได้ยอดเยี่ยมเลยค่ะ! ฉันก็แนะนำชิ้นนั้นค่ะ"
26008-CVGroup_UIEventShop_Buy3-1 = "พอใจกับการเลือกซื้อสินค้ารึเปล่าคะ?\nการบอกปากต่อปากก็เป็นเรื่องสำคัญ ช่วยบอกต่อเยอะๆ เลยนะคะ!"
26008-CVGroup_UIEventShop_Buy4-1 = "ค่า! นี่ค่ะ! ขอบคุณมากๆ เลยนะคะ~!"
26008-CVGroup_UIEventShop_Enter3-1 = "น่าเสียดาย แต่ว่าร้านริมทะเลปิดให้บริการแล้ว..."
26008-CVGroup_UIEventShop_Enter3-2 = "แต่ว่า...! ไม่เป็นไรหรอกค่ะ\nควาทรงจำที่สนุกสนานจะอยู่กับเราตลอดไป!"

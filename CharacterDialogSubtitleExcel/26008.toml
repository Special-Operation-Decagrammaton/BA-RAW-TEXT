[translation]
26008-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26008-CVGroup_CharacterGet_Idle1-1 = "說到海邊，就是海之家！\n就算舞台是海邊，節慶營運管理部也不會停下來唷！\n河和靜子，出動～！"
26008-CVGroup_Cafe_Idle1-1 = "夏天新的主打商品…嗯…\n有沒有什麼靈感…"
26008-CVGroup_Cafe_Idle2-1 = "沒想到連鎖經營這麼辛苦…會議、會議、會議！\n然後又是會議啊…"
26008-CVGroup_Cafe_Idle3-1 = "有什麼，可以在下次的祭典派上用場的東西…"
26008-CVGroup_Cafe_Idle4-1 = "總有一天，要把百夜堂變成奇普托斯第一的茶室…！"
26008-CVGroup_Cafe_Idle5-1 = "啊，想到好點子了！YES！"
26008-CVGroup_WeaponGet_Idle1-1 = "總是像這樣，注意到我…謝謝你，老師。\n有老師在的話，感覺百夜堂就還能夠繼續進化！\n…嗯，剛才的感覺不錯？"
26008-CVGroup_UIEventLobby_Enter1-1 = "歡迎光臨，老師！\n歡迎來到海之家版本的百夜堂！"
26008-CVGroup_UIEventLobby_Enter2-1 = "咦，老師！？還沒準備完成哦……！？"
26008-CVGroup_UIEventLobby_Enter2-2 = "總，總之！這邊請！"
26008-CVGroup_UIEventLobby_Idle1-1 = "有找到什麼想要的東西嗎？"
26008-CVGroup_UIEventLobby_Idle2-1 = "百夜堂還會繼續進化唷！\n來，讓我們鼓起幹勁吧！"
26008-CVGroup_UIEventLobby_Idle3-1 = "要同時管理複數的店舖，真辛苦呢……"
26008-CVGroup_UIEventLobby_Idle3-2 = "不過也挺開心的就是了！"
26008-CVGroup_UIEventLobby_Idle4-1 = "等等，老師！我不是商品哦！"
26008-CVGroup_UIEventLobby_Idle4-2 = "而且現在，是營業時間……"
26008-CVGroup_UIEventLobby_Enter3-1 = "雖然一開始很混亂……但危機就是轉機！"
26008-CVGroup_UIEventLobby_Enter3-2 = "要藉此機會，讓百夜堂更廣為人知！"
26008-CVGroup_UIEventLobby_Enter4-1 = "呵呵呵，目前為止都按照計劃進行……"
26008-CVGroup_UIEventLobby_Enter4-2 = "啊，老師！歡迎光臨！\n託老師的福，一切都很順利！"
26008-CVGroup_UIEventLobby_Enter5-1 = "雖然這次的計劃打水飄了……"
26008-CVGroup_UIEventLobby_Enter5-2 = "我的夢想，還沒有結束！"
26008-CVGroup_UIEventShop_Enter1-1 = "各種在海邊能用的東西都很齊全唷！"
26008-CVGroup_UIEventShop_Enter2-1 = "如果有什麼不要的東西，也可以來交換！"
26008-CVGroup_UIEventShop_Idle1-1 = "嗨嗨～剛剛有叫靜子嗎？"
26008-CVGroup_UIEventShop_Idle2-1 = "用合理的價格賣好東西！\n這是做生意的基本！"
26008-CVGroup_UIEventShop_Buy1-1 = "謝謝您的光臨！"
26008-CVGroup_UIEventShop_Buy2-1 = "啊，選得好！\n它也是我推薦的商品！"
26008-CVGroup_UIEventShop_Buy3-1 = "對購買的產品滿意嗎？\n口碑也很重要，可以的話，請幫忙宣傳哦！"
26008-CVGroup_UIEventShop_Buy4-1 = "來，請收下！\n謝謝您一直以來的惠顧！"
26008-CVGroup_UIEventShop_Enter3-1 = "很遺憾，海之家已經結束營業了…"
26008-CVGroup_UIEventShop_Enter3-2 = "…但！沒關係，快樂的回憶是永恆的！"

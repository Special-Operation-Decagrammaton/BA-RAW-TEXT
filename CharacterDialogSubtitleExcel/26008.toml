[translation]
26008-CVGroup_UITitle_Idle1-1 = "블루~ 아카이브!"
26008-CVGroup_CharacterGet_Idle1-1 = "여름 하면 바다의 집! 무대가 바다라도 마츠리운영관리부는 멈추지 않아요!\n카와와 시즈코, 갑니다!"
26008-CVGroup_Cafe_Idle1-1 = "여름의 신규 주력 상품…. 음. 뭔가 힌트가…."
26008-CVGroup_Cafe_Idle2-1 = "프랜차이즈 운영이, 이렇게 큰일일 줄은…\n회의, 회의, 회의! 그리고 또 회의가…"
26008-CVGroup_Cafe_Idle3-1 = "뭔가, 다음 축제에서 활용할 수 있을 만한 게…."
26008-CVGroup_Cafe_Idle4-1 = "언젠가 백야당을, 키보토스 최고의 찻집으로…!"
26008-CVGroup_Cafe_Idle5-1 = "좋은 영감이 떠올랐어! 예스!"
26008-CVGroup_WeaponGet_Idle1-1 = "항상 이렇게 저를 신경써주고… 감사합니다, 선생님.\n선생님이 계신다면 백야당은 앞으로도 발전할 수 있을 것 같아요!\n…응, 방금 나쁘지 않았어."
26008-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님! 바다의 집 버전 백야당에 오신 것을 환영합니다!"
26008-CVGroup_UIEventLobby_Enter2-1 = "앗, 선생님?! 아직 준비가, 끝나지 않았는데요…?!"
26008-CVGroup_UIEventLobby_Enter2-2 = "이, 일단! 이쪽으로 오세요!"
26008-CVGroup_UIEventLobby_Idle1-1 = "뭔가 원하는 물건은 찾으셨나요?"
26008-CVGroup_UIEventLobby_Idle2-1 = "백야당은 아직 더 진화할 거예요! 자! 잔뜩 힘내서 가보죠!"
26008-CVGroup_UIEventLobby_Idle3-1 = "여러 점포를 동시에 관리한다는 건 큰일이네요……"
26008-CVGroup_UIEventLobby_Idle3-2 = "뭐어, 즐겁기도 하지만요!"
26008-CVGroup_UIEventLobby_Idle4-1 = "아 잠깐, 선생님! 저는 파는 물건이 아니에요!"
26008-CVGroup_UIEventLobby_Idle4-2 = "게다가 지금은 영업시간이니까요……."
26008-CVGroup_UIEventLobby_Enter3-1 = "처음에는 무슨 일인가 했지만요…. 그렇다고 해도 위기는 찬스!"
26008-CVGroup_UIEventLobby_Enter3-2 = "이번 기회에 백야당을 더욱 널리 알리겠어요!"
26008-CVGroup_UIEventLobby_Enter4-1 = "후훗, 지금으로서는 계획대로…."
26008-CVGroup_UIEventLobby_Enter4-2 = "아, 선생님! 어서 오세요! 선생님 덕분에, 여러모로 순조롭다구요!"
26008-CVGroup_UIEventLobby_Enter5-1 = "이번 계획은 물거품이 되어버렸지만……."
26008-CVGroup_UIEventLobby_Enter5-2 = "제 꿈은, 아직 끝나지 않았으니까요!"
26008-CVGroup_UIEventShop_Enter1-1 = "여러가지로, 바다에서 도움이 되는 것들을 준비하고 있어요!"
26008-CVGroup_UIEventShop_Enter2-1 = "혹시 안 쓰는 물건이 있으시다면, 교환해 드릴게요!"
26008-CVGroup_UIEventShop_Idle1-1 = "네, 네~ 지금 시즈코를 부르셨나요?"
26008-CVGroup_UIEventShop_Idle2-1 = "좋은 물건을 적정 가격에! 장사의 기본이에요!"
26008-CVGroup_UIEventShop_Buy1-1 = "이용해 주셔서 감사합니다!"
26008-CVGroup_UIEventShop_Buy2-1 = "아, 좋네요! 저도 추천하는 물건이에요!"
26008-CVGroup_UIEventShop_Buy3-1 = "만족스럽게 쇼핑하셨나요? 입소문도 중요하니까, 괜찮으면 널리 알려주세요!"
26008-CVGroup_UIEventShop_Buy4-1 = "네, 여기 있습니다! 매번 감사해요!"
26008-CVGroup_UIEventShop_Enter3-1 = "아쉽게도 바다의 집 영업은 종료되었습니다…"
26008-CVGroup_UIEventShop_Enter3-2 = "…만! 괜찮아요, 즐거웠던 추억은 영원하니까!"

[translation]
26008-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26008-CVGroup_CharacterGet_Idle1-1 = "The Beach Shack represents summer! The Festival Operations Department never stops working, even overseas! Kawawa Shizuko is on it!"
26008-CVGroup_Cafe_Idle1-1 = "What would be good as a main summer product...?"
26008-CVGroup_Cafe_Idle2-1 = "Operating a franchise is so hard. It's just meeting after meeting..."
26008-CVGroup_Cafe_Idle3-1 = "I have a feeling it could be used for the next festival..."
26008-CVGroup_Cafe_Idle4-1 = "I want to make Momoyodou home to the best tea house in Kivotos!"
26008-CVGroup_Cafe_Idle5-1 = "I have a great idea! Yeah!"
26008-CVGroup_WeaponGet_Idle1-1 = "You're always so considerate of me... Thank you, Sensei. As long as you're here, Momoyodou will keep evolving! Did that sound cool?"
26008-CVGroup_UIEventLobby_Enter1-1 = "Hello, Sensei! Welcome to Momoyodou, Beach Shack edition!"
26008-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei? We aren't ready yet...?!"
26008-CVGroup_UIEventLobby_Enter2-2 = "P-Please come this way for now!"
26008-CVGroup_UIEventLobby_Idle1-1 = "Did you find what you were looking for?"
26008-CVGroup_UIEventLobby_Idle2-1 = "Momoyodou is constantly evolving, thanks to our hard work!"
26008-CVGroup_UIEventLobby_Idle3-1 = "It's not easy to manage multiple shops at the same time..."
26008-CVGroup_UIEventLobby_Idle3-2 = "But it's okay, because it's fun!"
26008-CVGroup_UIEventLobby_Idle4-1 = "Oh? Sensei! I'm not for sale!"
26008-CVGroup_UIEventLobby_Idle4-2 = "Besides, these are business hours..."
26008-CVGroup_UIEventLobby_Enter3-1 = "It was confusing at first...but a crisis is an opportunity in disguise!"
26008-CVGroup_UIEventLobby_Enter3-2 = "And we'll use this opportunity to promote Momoyodou even more!"
26008-CVGroup_UIEventLobby_Enter4-1 = "Heeheehee... It's been going as planned so far..."
26008-CVGroup_UIEventLobby_Enter4-2 = "Oh, Sensei! Welcome! Everything is going smoothly, thanks to you!"
26008-CVGroup_UIEventLobby_Enter5-1 = "The plan ended in failure, but..."
26008-CVGroup_UIEventLobby_Enter5-2 = "I won't give up on achieving my dreams!"
26008-CVGroup_UIEventShop_Enter1-1 = "I've gathered some things that might be useful at the beach!"
26008-CVGroup_UIEventShop_Enter2-1 = "If you have any items you don't want, I'll exchange them for other products here!"
26008-CVGroup_UIEventShop_Idle1-1 = "Yes, yes! Did you call me?"
26008-CVGroup_UIEventShop_Idle2-1 = "A good item for a good price! That's called good business."
26008-CVGroup_UIEventShop_Buy1-1 = "Thank you for coming!"
26008-CVGroup_UIEventShop_Buy2-1 = "Oh, good choice! I recommend that one too!"
26008-CVGroup_UIEventShop_Buy3-1 = "How was your shopping experience? Be sure to tell your friends about us!"
26008-CVGroup_UIEventShop_Buy4-1 = "Yes! Here! Thank you, as always!"
26008-CVGroup_UIEventShop_Enter3-1 = "Unfortunately, the Beach Shack has closed..."
26008-CVGroup_UIEventShop_Enter3-2 = "But that's okay! We'll always have our memories."

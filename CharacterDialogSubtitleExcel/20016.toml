[translation]
20016-CVGroup_UITitle_Idle1-1 = "唉……蔚藍檔案～"
20016-CVGroup_CharacterGet_Idle1-1 = "唉，為什麼會變成這樣……\n嘛都這樣了，該做的事還是會做唷。"
20016-CVGroup_Cafe_Idle1-1 = "可以安靜看書的地方……"
20016-CVGroup_Cafe_Idle2-1 = "啊啊，真麻煩……"
20016-CVGroup_Cafe_Idle3-1 = "太吵鬧的地方有點……"
20016-CVGroup_Cafe_Idle4-1 = "哪裡有，不會被發現的地方……"
20016-CVGroup_Cafe_Idle5-1 = "原來如此，這裡的話或許不會被發現呢。"
20016-CVGroup_WeaponGet_Idle1-1 = "唉，真是的……被做到這種程度，不就不得不認真了嗎。"
20016-CVGroup_UIEventLobby_Enter1-1 = "真是的，問題堆積如山呢。"
20016-CVGroup_UIEventLobby_Enter2-1 = "唉……真是做不下去了。"
20016-CVGroup_UIEventLobby_Enter3-1 = "已經過了不少時間，還趕得上嗎？"
20016-CVGroup_UIEventLobby_Enter4-1 = "差不多該收尾了呢……直到最後都不能掉以輕心。"
20016-CVGroup_UIEventLobby_Enter4-2 = "因為我討厭麻煩的事。"
20016-CVGroup_UIEventLobby_Enter5-1 = "看來已經平靜下來了呢。\n辛苦你了，老師。"
20016-CVGroup_UIEventLobby_Idle1-1 = "交流會好像被搞得一團糟了呢。"
20016-CVGroup_UIEventLobby_Idle2-1 = "唉……真希望多少能考慮一下負責善後的人的立場。"
20016-CVGroup_UIEventLobby_Idle3-1 = "為什麼要跑到別人的自治區來收拾殘局……"
20016-CVGroup_UIEventLobby_Idle4-1 = "這種事就是中階管理者的辛苦的地方。"
20016-CVGroup_UIEventMission_Enter1-1 = "這些就是不得不解決的問題呢。"
20016-CVGroup_UIEventMission_Enter2-1 = "清單的確認就拜託你了唷，老師。"
20016-CVGroup_UIEventMission_Idle1-1 = "雖然很麻煩……\n不過正因如此，更慶幸有老師在呢。"
20016-CVGroup_UIEventMission_Idle2-1 = "好～～～累……"
20016-CVGroup_UIEventMission_Buy1-1 = "呼……解決一件事了，對吧。"
20016-CVGroup_UIEventMission_Buy2-1 = "解決了嗎？\n辛苦了。"
20016-CVGroup_UIEventMission_Interaction1-1 = "今天就到此為止了嗎。\n嘛，就說聲辛苦你了吧。"

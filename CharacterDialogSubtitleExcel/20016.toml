[translation]
20016-CVGroup_UITitle_Idle1-1 = "하아… 블루 아카이브~"
20016-CVGroup_CharacterGet_Idle1-1 = "하아, 어쩌다 이렇게 되어버린 걸까요.\n뭐, 이렇게 된 이상, 해야 할 일은 하겠지만요."
20016-CVGroup_Cafe_Idle1-1 = "조용히 책을 읽을만한 장소가…."
20016-CVGroup_Cafe_Idle2-1 = "아아. 귀찮아…."
20016-CVGroup_Cafe_Idle3-1 = "너무 북적이는 건 조금…"
20016-CVGroup_Cafe_Idle4-1 = "어딘가, 들키지 않을만한 곳이…"
20016-CVGroup_Cafe_Idle5-1 = "과연, 여기라면 들키지 않을 것 같네요."
20016-CVGroup_WeaponGet_Idle1-1 = "하아, 정말…. 이렇게까지 해주신다면, 저도 진심으로 할 수밖에 없잖아요."
20016-CVGroup_UIEventLobby_Enter1-1 = "정말, 문제가 산더미네요."
20016-CVGroup_UIEventLobby_Enter2-1 = "하아… 못 해먹겠네요."
20016-CVGroup_UIEventLobby_Enter3-1 = "꽤 시간이 지났는데, 제시간에 맞출 수 있을까요?"
20016-CVGroup_UIEventLobby_Enter4-1 = "슬슬 정리되는 느낌 이지만…… 부디 마지막 까지 방심하지 마시길."
20016-CVGroup_UIEventLobby_Enter4-2 = "귀찮은 일은 질색인지라."
20016-CVGroup_UIEventLobby_Enter5-1 = "아무래도 소동은 마무리 된 것 같네요. 수고하셨습니다, 선생님."
20016-CVGroup_UIEventLobby_Idle1-1 = "이번 교류회는 뭔가 엉망진창이 되어버렸네요."
20016-CVGroup_UIEventLobby_Idle2-1 = "하아… 조금은 뒤처리하는 사람의 입장도 생각해 달라고요."
20016-CVGroup_UIEventLobby_Idle3-1 = "어째서 남의 자치구까지 와서 뒤치다꺼리를…"
20016-CVGroup_UIEventLobby_Idle4-1 = "이런 게, 중간 관리자의 고통이네요."
20016-CVGroup_UIEventMission_Enter1-1 = "이것들이, 해결해야만 하는 문제들이군요."
20016-CVGroup_UIEventMission_Enter2-1 = "리스트 확인, 부탁드려요. 선생님."
20016-CVGroup_UIEventMission_Idle1-1 = "귀찮지만, 그래도 선생님이 있어줘서 다행이라고 생각해요."
20016-CVGroup_UIEventMission_Idle2-1 = "힘~들~어~"
20016-CVGroup_UIEventMission_Buy1-1 = "후우…… 한 건 해결, 인 거네요."
20016-CVGroup_UIEventMission_Buy2-1 = "해결하셨나요? 수고하셨습니다."
20016-CVGroup_UIEventMission_Interaction1-1 = "오늘은 이 정도로 수습된 느낌이네요. 수고하셨습니다."

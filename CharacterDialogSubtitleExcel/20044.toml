[translation]
20044-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20044-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะ เทรนเนอร์\nถ้าคอแห้งก็บอกฉันได้ตลอดเลยนะคะ"
20044-CVGroup_Cafe_Idle1-1 = "ฉันจะไปหาที่เงียบๆ ที่ออกกำลังกายได้ค่ะ..."
20044-CVGroup_Cafe_Idle2-1 = "คาเฟ่เป็นสถานที่ที่ขายเครื่องดื่มใช่มั้ยล่ะคะ ถ้างั้นฉัน..."
20044-CVGroup_Cafe_Idle3-1 = "เพิ่มเครื่องดื่มโปรตีนเป็นเมนูพิเศษดีมั้ยนะ…"
20044-CVGroup_Cafe_Idle4-1 = "มีใครต้องการเครื่องดื่มบ้างมั้ยคะ?"
20044-CVGroup_Cafe_Idle5-1 = "ถ้าออกกำลังกายที่นี่คงไม่มีปัญหาสินะคะ"
20044-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณที่ใส่ใจกันมาตลอดนะคะ เทรนเนอร์\nฉันจะพยายามอีกขั้นในฐานะโค้ชของชมรมออกกำลังกายค่ะ\nงั้นก็ไปกันเถอะค่ะ คุณสมาชิก! อีกเซ็ตค่ะ!"
20044-CVGroup_UIEventLobby_Enter1-1 = "ฉันไม่ค่อยรู้กติกาการแข่งเบสบอลเท่าไร..."
20044-CVGroup_UIEventLobby_Enter1-2 = "แต่ความคึกคักที่ส่งต่อออกมา\nก็ทำให้ฉันใจเต้นไปด้วยนะคะ"
20044-CVGroup_UIEventLobby_Enter2-1 = "บรรยากาศน่าตื่นเต้นจังเลยค่ะเทรนเนอร์"
20044-CVGroup_UIEventLobby_Enter2-2 = "ระวังอาการขาดน้ำด้วยนะคะ"
20044-CVGroup_UIEventLobby_Enter3-1 = "ตอนนี้เหมือนจะเกิดเรื่องที่ห่างไกลกับ\nจิตวิญญาณแห่งการแข่งขันกีฬาเลยค่ะ"
20044-CVGroup_UIEventLobby_Enter3-2 = "ต้องทำอะไรสักอย่างแล้วค่ะเทรนเนอร์!"
20044-CVGroup_UIEventLobby_Enter4-1 = "ความปรารถนาในชัยชนะก็เป็นสิ่งสำคัญอยู่หรอก"
20044-CVGroup_UIEventLobby_Enter4-2 = "แต่ถ้ามันมากเกินไปก็อาจก่อให้เกิดปัญหาอื่นได้ค่ะ"
20044-CVGroup_UIEventLobby_Enter4-3 = "ฉันได้เรียนรู้อีกเรื่องเลยนะคะ"
20044-CVGroup_UIEventLobby_Enter5-1 = "ทุกอย่างเหมือนจะจบลงด้วยดีแล้วค่ะ"
20044-CVGroup_UIEventLobby_Enter5-2 = "งั้นเรามาเทรนด้วยกันเพื่อเป็นการฉลองดีมั้ยคะ?"
20044-CVGroup_UIEventLobby_Idle1-1 = "ตอนแรกฉันแค่ใส่ชุดนี้เพื่อไม่ให้เตะตาใครน่ะค่ะ...\nแต่ในแง่ของประสิทธิภาพ ก็ไม่เลวเลยนะคะ"
20044-CVGroup_UIEventLobby_Idle2-1 = "เรียกฉันเหรอคะ เทรนเนอร์?\nต้องการอะไรที่เย็นสดชื่นเหรอคะ?"
20044-CVGroup_UIEventLobby_Idle3-1 = "เทรนเนอร์? เป็นอะไรไปคะ?\nอยากดูกล้ามเนื้อที่ขาของฉันเหรอคะ?"
20044-CVGroup_UIEventLobby_Idle3-2 = "เชิญมาจับดูให้เต็มที่เลยค่ะ ฮุฮุ"
20044-CVGroup_UIEventLobby_Idle4-1 = "น้ำหนักของเครื่องนี้น่ะเหรอคะ?"
20044-CVGroup_UIEventLobby_Idle4-2 = "รู้สึกว่าน่าจะ 25 กิโลนะคะ"
20044-CVGroup_UIEventLobby_Idle4-3 = "เป็นน้ำหนักที่เหมาะกับการออกกำลังกาย\nแบบใช้แรงน้อยแต่ทำซ้ำหลายครั้งค่ะ"
20044-CVGroup_UIEventShop_Enter1-1 = "มาแล้วเหรอคะ เทรนเนอร์"
20044-CVGroup_UIEventShop_Enter1-2 = "มาดูก่อนได้เลยค่ะ ว่ามีของที่ถูกใจหรือเปล่า"
20044-CVGroup_UIEventShop_Enter2-1 = "พอได้ดูแลอุปกรณ์เทรนนิ่งบ่อยๆ"
20044-CVGroup_UIEventShop_Enter2-2 = "ฉันก็เลยปรับตัวให้เข้ากับงานแบบนี้ได้เร็วเลยค่ะ"
20044-CVGroup_UIEventShop_Enter3-1 = "รบกวนตรวจสอบด้วยนะคะว่าไม่ได้ลืมอะไรไป"
20044-CVGroup_UIEventShop_Idle1-1 = "นี่คงเหมือนกับอุปกรณ์เทรนนิ่งค่ะ\nทั้งคุณภาพ ปริมาณ การแสดงผลที่รวดเร็ว..."
20044-CVGroup_UIEventShop_Idle1-2 = "ทุกปัจจัยล้วนสำคัญหมดเลยนะคะ"
20044-CVGroup_UIEventShop_Idle2-1 = "ถึงใครจะว่ายังไง แต่ฉันก็เป็น\nหัวหน้าชมรมออกกำลังกายของมิลเลเนียมค่ะ"
20044-CVGroup_UIEventShop_Idle2-2 = "แม้ตอนนี้จะมาลองทำงานพาร์ทไทม์ชั่วคราวก็เถอะ"
20044-CVGroup_UIEventShop_Buy1-1 = "ค่ะ นี่ค่ะ"
20044-CVGroup_UIEventShop_Buy2-1 = "ต้องการอะไรอีกมั้ยคะ? เทรนเนอร์?"
20044-CVGroup_UIEventShop_Buy3-1 = "ได้เลยค่ะ รอเดี๋ยวนะคะ"
20044-CVGroup_UIEventShop_Buy4-1 = "ฉันแถมเครื่องดื่มให้แก้วหนึ่งดีมั้ยคะ?"

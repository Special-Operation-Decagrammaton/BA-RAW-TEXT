[translation]
20044-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20044-CVGroup_CharacterGet_Idle1-1 = "你來啦，指導員。\n口渴的時候，請隨時告訴我。"
20044-CVGroup_Cafe_Idle1-1 = "感覺能專心運動的地方在……"
20044-CVGroup_Cafe_Idle2-1 = "咖啡廳是提供飲料的場所……\n既然如此，我也……"
20044-CVGroup_Cafe_Idle3-1 = "在特別菜單裡，追加蛋白質飲料……"
20044-CVGroup_Cafe_Idle4-1 = "不介意的話，要不要來一杯呢？"
20044-CVGroup_Cafe_Idle5-1 = "在這裡的話，感覺能做肌肉訓練。"
20044-CVGroup_WeaponGet_Idle1-1 = "如此細心的指導，真是非常感謝。\n我不會滿足於此，未來也將持續精進。\n來，指導員，再做一組吧！"
20044-CVGroup_UIEventLobby_Enter1-1 = "雖然我不太清楚棒球的規則……"
20044-CVGroup_UIEventLobby_Enter1-2 = "但這股熱情……連我都感到心胸澎湃了。"
20044-CVGroup_UIEventLobby_Enter2-1 = "……真是驚人的熱情呢。"
20044-CVGroup_UIEventLobby_Enter2-2 = "得小心脫水症狀才行。"
20044-CVGroup_UIEventLobby_Enter3-1 = "與運動家精神相去甚遠的──某種不好的事情似乎正在發生。"
20044-CVGroup_UIEventLobby_Enter3-2 = "我們走吧，指導員。"
20044-CVGroup_UIEventLobby_Enter4-1 = "對勝利的執著如果超過限度……"
20044-CVGroup_UIEventLobby_Enter4-2 = "就會引發預期之外的問題呢。"
20044-CVGroup_UIEventLobby_Enter4-3 = "又學到了新的一課。"
20044-CVGroup_UIEventLobby_Enter5-1 = "那麼指導員，既然事態已經有所收斂……"
20044-CVGroup_UIEventLobby_Enter5-2 = "現在就開始訓練吧。"
20044-CVGroup_UIEventLobby_Idle1-1 = "這套制服……也兼備機能性，真不錯呢。"
20044-CVGroup_UIEventLobby_Idle2-1 = "指導員？\n你找我嗎？"
20044-CVGroup_UIEventLobby_Idle3-1 = "……想確認我腿部的肌肉是嗎？"
20044-CVGroup_UIEventLobby_Idle3-2 = "呵呵，如果是這樣的話，請不必客氣。"
20044-CVGroup_UIEventLobby_Idle4-1 = "這台飲料機？"
20044-CVGroup_UIEventLobby_Idle4-2 = "大約25kg左右吧。"
20044-CVGroup_UIEventLobby_Idle4-3 = "對低負荷的訓練來說剛剛好。"
20044-CVGroup_UIEventShop_Enter1-1 = "歡迎，請慢慢看吧。"
20044-CVGroup_UIEventShop_Enter1-2 = "如果能找到喜歡的東西就好了呢。"
20044-CVGroup_UIEventShop_Enter2-1 = "盤點完成得比預期中還早。"
20044-CVGroup_UIEventShop_Enter2-2 = "因為跟訓練部的備品管理有點類似。"
20044-CVGroup_UIEventShop_Enter3-1 = "有沒有漏買什麼，請再確認一次吧。"
20044-CVGroup_UIEventShop_Idle1-1 = "掌握數量，並迅速提供……"
20044-CVGroup_UIEventShop_Idle1-2 = "感覺能鍛鍊爆發力呢。"
20044-CVGroup_UIEventShop_Idle2-1 = "即便在工作中，我也會留意正確的姿勢。"
20044-CVGroup_UIEventShop_Idle2-2 = "畢竟我可是訓練部的部長啊。"
20044-CVGroup_UIEventShop_Buy1-1 = "來，請收下吧。"
20044-CVGroup_UIEventShop_Buy2-1 = "還有其他需要的東西嗎？"
20044-CVGroup_UIEventShop_Buy3-1 = "我明白了。請稍等。"
20044-CVGroup_UIEventShop_Buy4-1 = "我正在免費發送飲料，要不要來一杯呢？"

[translation]
20044-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20044-CVGroup_CharacterGet_Idle1-1 = "안녕하십니까. 트레이너. 목이 마르시다면, 언제든 말씀해 주세요."
20044-CVGroup_Cafe_Idle1-1 = "조용히 운동할 곳을 찾아볼까요……"
20044-CVGroup_Cafe_Idle2-1 = "카페는 음료를 제공하는 곳이죠. 그렇다면 저도……"
20044-CVGroup_Cafe_Idle3-1 = "특별 메뉴로 프로틴 드링크를 추가해 보는 것은……"
20044-CVGroup_Cafe_Idle4-1 = "음료수 필요하신 분, 없으신가요?"
20044-CVGroup_Cafe_Idle5-1 = "여기라면 근력 운동도 문제없겠네요."
20044-CVGroup_WeaponGet_Idle1-1 = "여기까지 신경 써 주셔서 감사합니다. 트레이너.\n트레이닝부의 코치로서, 한층 정진하겠습니다.\n그러면 가시죠, 회원님! 한 세트 더!"
20044-CVGroup_UIEventLobby_Enter1-1 = "야구 경기의 규칙은 정확히 모릅니다만……"
20044-CVGroup_UIEventLobby_Enter1-2 = "전해지는 열기만으로, 저까지 가슴이 뛰네요."
20044-CVGroup_UIEventLobby_Enter2-1 = "엄청난 분위기로군요. 트레이너."
20044-CVGroup_UIEventLobby_Enter2-2 = "탈수 현상에는 조심해 주세요."
20044-CVGroup_UIEventLobby_Enter3-1 = "아무리 봐도 스포츠 정신과는, 거리가 먼 일이 벌어지고 있는 것 같습니다."
20044-CVGroup_UIEventLobby_Enter3-2 = "무언가 해야 합니다, 트레이너!"
20044-CVGroup_UIEventLobby_Enter4-1 = "이기고 싶다는 열망은 중요한 것입니다만,"
20044-CVGroup_UIEventLobby_Enter4-2 = "그것이 지나치면 또 다른 문제를 일으키고 마는군요."
20044-CVGroup_UIEventLobby_Enter4-3 = "한 가지 배운 것 같습니다."
20044-CVGroup_UIEventLobby_Enter5-1 = "모든 것이 무사히 종료된 것 같습니다."
20044-CVGroup_UIEventLobby_Enter5-2 = "그렇다면 그 기념으로, 함께 트레이닝이라도 어떠십니까?"
20044-CVGroup_UIEventLobby_Idle1-1 = "일단은 눈에 띄지 않기 위해 입은 복장입니다만……\n기능적인 측면에서도, 괜찮네요."
20044-CVGroup_UIEventLobby_Idle2-1 = "트레이너? 부르셨나요?"
20044-CVGroup_UIEventLobby_Idle3-1 = "트레이너? 왜 그러시나요? 제 다리 근육을 확인하고 싶으신 건가요?"
20044-CVGroup_UIEventLobby_Idle3-2 = "그렇다면 얼마든지 만져 보셔도 좋습니다. 후후."
20044-CVGroup_UIEventLobby_Idle4-1 = "이 드링크 장비 무게요?"
20044-CVGroup_UIEventLobby_Idle4-2 = "체감상 25kg 정도 되는 것 같습니다."
20044-CVGroup_UIEventLobby_Idle4-3 = "저중량 고반복 운동을 지속하기에는, 딱 좋다고도 할 수 있겠죠."
20044-CVGroup_UIEventShop_Enter1-1 = "오셨군요. 트레이너."
20044-CVGroup_UIEventShop_Enter1-2 = "마음에 드는 물건이 있으실지, 보고 가시죠."
20044-CVGroup_UIEventShop_Enter2-1 = "트레이닝 비품 관리를 하다 보니,"
20044-CVGroup_UIEventShop_Enter2-2 = "이런 일에도 그럭저럭 빠르게 적응할 수 있더군요."
20044-CVGroup_UIEventShop_Enter3-1 = "잊어버린 것이 없을지, 한 번 더 확인해 주세요."
20044-CVGroup_UIEventShop_Idle1-1 = "개수를 파악해서, 빠르게 제공한다……"
20044-CVGroup_UIEventShop_Idle1-2 = "순발력을 기를 수 있을 것 같네요."
20044-CVGroup_UIEventShop_Idle2-1 = "일을 하는 중이지만, 바른 자세를 의식하고 있습니다."
20044-CVGroup_UIEventShop_Idle2-2 = "저는 트레이닝부의 부장이니까요."
20044-CVGroup_UIEventShop_Buy1-1 = "네. 여기 있습니다."
20044-CVGroup_UIEventShop_Buy2-1 = "더 필요한 것은 없으신가요, 트레이너?"
20044-CVGroup_UIEventShop_Buy3-1 = "알겠습니다. 잠시만요."
20044-CVGroup_UIEventShop_Buy4-1 = "덤으로 음료수도 한 잔 드릴까요?"

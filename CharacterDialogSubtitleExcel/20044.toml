[translation]
20044-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20044-CVGroup_CharacterGet_Idle1-1 = "Hello, Trainer. If you're feeling thirsty, please let me know."
20044-CVGroup_Cafe_Idle1-1 = "Let's find a quiet place to work out..."
20044-CVGroup_Cafe_Idle2-1 = "A cafe is a place to serve drinks. In that case, I will..."
20044-CVGroup_Cafe_Idle3-1 = "How about adding a protein drink as a special menu item...?"
20044-CVGroup_Cafe_Idle4-1 = "Does anyone need refreshments?"
20044-CVGroup_Cafe_Idle5-1 = "I should have no problem squeezing in a few sets here."
20044-CVGroup_WeaponGet_Idle1-1 = "Thank you for your consideration, Trainer. As the Athletics Training Club's coach, I'll continue to work hard. Then, let's go! One more set!"
20044-CVGroup_UIEventLobby_Enter1-1 = "While I don't know all the rules to baseball..."
20044-CVGroup_UIEventLobby_Enter1-2 = "...the energy in the air makes my heart race."
20044-CVGroup_UIEventLobby_Enter2-1 = "What an incredible scene, Trainer."
20044-CVGroup_UIEventLobby_Enter2-2 = "Be sure to stay hydrated."
20044-CVGroup_UIEventLobby_Enter3-1 = "Something very unsportsman-like seems to be going on."
20044-CVGroup_UIEventLobby_Enter3-2 = "We have to do something, Trainer!"
20044-CVGroup_UIEventLobby_Enter4-1 = "Striving for victory is important."
20044-CVGroup_UIEventLobby_Enter4-2 = "However, taken too far, that can cause its own problems."
20044-CVGroup_UIEventLobby_Enter4-3 = "I learned something new."
20044-CVGroup_UIEventLobby_Enter5-1 = "It seems like everything ended well."
20044-CVGroup_UIEventLobby_Enter5-2 = "Shall we celebrate with a workout?"
20044-CVGroup_UIEventLobby_Idle1-1 = "I wore this to blend in...but it isn't bad from a functional perspective either."
20044-CVGroup_UIEventLobby_Idle2-1 = "Trainer? Did you call me?"
20044-CVGroup_UIEventLobby_Idle3-1 = "What's wrong, Trainer? Do you want to check my calves?"
20044-CVGroup_UIEventLobby_Idle3-2 = "If so, feel them as much as you'd like. Fufu."
20044-CVGroup_UIEventLobby_Idle4-1 = "How much does this beverage equipment weigh?"
20044-CVGroup_UIEventLobby_Idle4-2 = "About 25 kilograms?"
20044-CVGroup_UIEventLobby_Idle4-3 = "It's perfect for extended low-weight, high-rep training."
20044-CVGroup_UIEventShop_Enter1-1 = "You're here, Trainer."
20044-CVGroup_UIEventShop_Enter1-2 = "Are there any items to your liking?"
20044-CVGroup_UIEventShop_Enter2-1 = "I manage our training supplies..."
20044-CVGroup_UIEventShop_Enter2-2 = "...so adapting to this role was quick and easy."
20044-CVGroup_UIEventShop_Enter3-1 = "Please double check to make sure you didn't forget anything."
20044-CVGroup_UIEventShop_Idle1-1 = "Figuring out the quantity and providing it quickly..."
20044-CVGroup_UIEventShop_Idle1-2 = "I believe that can assist with agility training."
20044-CVGroup_UIEventShop_Idle2-1 = "Even when I'm working, I'm consciously maintaining good posture."
20044-CVGroup_UIEventShop_Idle2-2 = "I'm the president of Athletics Training Club, after all."
20044-CVGroup_UIEventShop_Buy1-1 = "Yes. I'm here."
20044-CVGroup_UIEventShop_Buy2-1 = "Is there anything else you need, Trainer?"

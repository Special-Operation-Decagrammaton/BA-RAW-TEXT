[translation]
10083-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10083-CVGroup_CharacterGet_Idle1-1 = "백귀야행 연합학원 소속, 백화요란의 작전참모, 키류 키쿄.\n앞으로도 양호한 관계를 위해, 샬레의 일을 돕겠어.\n……물론 그만큼 이쪽도 도움을 받을 생각이지만 말이야. 그런 의미에서… 잘 부탁해, 선생님."
10083-CVGroup_Cafe_Idle1-1 = "다음 작전, 지금 세워놓자."
10083-CVGroup_Cafe_Idle2-1 = "어딘가, 진정되는 장소는……."
10083-CVGroup_Cafe_Idle3-1 = "나는 백화요란인걸…. 어설픈 짓은 할 수 없어."
10083-CVGroup_Cafe_Idle4-1 = "선생님…. 일 끝났으려나…."
10083-CVGroup_Cafe_Idle5-1 = "지루해라. 샬레라고 해도, 이 정도인 거네."
10083-CVGroup_WeaponGet_Idle1-1 = "이건 나에 대한 신뢰의 증거? 아니면 당신의 미혹일까?\n…어느 쪽이라도 좋지만. 나, 이런 건 착실히 배로 갚아주는 타입이니까.\n각오하도록 해. 후후, 재미있어졌을지도."

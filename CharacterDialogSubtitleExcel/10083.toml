[translation]
10083-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10083-CVGroup_CharacterGet_Idle1-1 = "คิริว คิเคียว ที่ปรึกษายุทธศาสตร์เฮียกกะเรียวรัน\nสังกัดสหพันธ์เฮียกคิยาโค ฉันจะช่วยงานของชาเล่ต์เพื่อรักษา\nความสัมพันธ์ที่ดีของเราในอนาคต ...แน่นอนว่าฉันก็หวังว่าจะ\nได้ความช่วยเหลือเช่นกัน ถ้างั้นก็... รบกวนด้วยนะคุณครู"
10083-CVGroup_Cafe_Idle1-1 = "ตอนนี้มาวางแผนปฏิบัติการต่อไปกันเถอะ"
10083-CVGroup_Cafe_Idle2-1 = "มีที่ตรงไหนสงบๆ มั้ยนะ..."
10083-CVGroup_Cafe_Idle3-1 = "ฉันคือเฮียกกะเรียวรันนะ... จะทำอะไรชุ่ยๆ ไม่ได้หรอก"
10083-CVGroup_Cafe_Idle4-1 = "คุณครู... ป่านนี้งานจะเสร็จรึยังนะ..."
10083-CVGroup_Cafe_Idle5-1 = "น่าเบื่อชะมัด\nถึงจะบอกว่าเป็นชาเล่ต์แต่ก็มีแค่ที่เห็นสินะ "
10083-CVGroup_WeaponGet_Idle1-1 = "นี่คือสิ่งพิสูจน์ความไว้ใจในตัวฉัน หรือเป็นความหลงใหลของคุณกันแน่?\nจะเป็นอะไรก็ได้ทั้งนั้น เพราะฉันเป็นคนที่ตอบแทนเรื่องแบบนี้เต็มที่อยู่แล้ว\nเตรียมตัวไว้ได้เลย ฮุฮุ ต้องสนุกขึ้นแน่ๆ"

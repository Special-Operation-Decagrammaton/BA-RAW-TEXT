[translation]
10083-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10083-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行聯合學園所屬，百花繚亂的作戰參謀，桐生桔梗。\n為了日後的良好關係，我會協助夏萊的工作。\n……當然，我也希望得到相應的幫助。\n事情就是這樣……請多指教囉，老師。"
10083-CVGroup_Cafe_Idle1-1 = "下一個作戰，\n就趁現在制定吧。"
10083-CVGroup_Cafe_Idle2-1 = "有沒有能讓人\n靜下心來的地方……"
10083-CVGroup_Cafe_Idle3-1 = "我可是百花繚亂……\n不能做出草率的事。"
10083-CVGroup_Cafe_Idle4-1 = "老師……\n下班了嗎……"
10083-CVGroup_Cafe_Idle5-1 = "真無聊。\n堂堂夏萊也不過如此。"
10083-CVGroup_WeaponGet_Idle1-1 = "這是信任我的證據？還是你的躊躇？\n……其實是什麼都無所謂。\n不過我是會把這種事加倍奉還的類型，要做好覺悟哦。\n呵呵，好像越來越有趣了。"

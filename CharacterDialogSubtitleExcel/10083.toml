[translation]
10083-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10083-CVGroup_CharacterGet_Idle1-1 = "I am Kiryuu Kikyou, operations officer of the Hyakkaryouran. It appears a constructive business relationship is beneficial for both parties. I suppose I'll be in your care, Sensei."
10083-CVGroup_Cafe_Idle1-1 = "Set up for the next operation."
10083-CVGroup_Cafe_Idle2-1 = "How vexing. I'll retreat to center myself."
10083-CVGroup_Cafe_Idle3-1 = "Hyakkaryouran members do not conduct themselves foolishly."
10083-CVGroup_Cafe_Idle4-1 = "Have you completed your work, Sensei?"
10083-CVGroup_Cafe_Idle5-1 = "Even at Schale boredom tugs at my strings."
10083-CVGroup_WeaponGet_Idle1-1 = "Do you truly have such trust in me? Hah. Fascinating. Whether it's trust or pure delusion, you know my character well enough to know I will return the favor, with interest."

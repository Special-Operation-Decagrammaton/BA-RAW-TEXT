[translation]
10071-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10071-CVGroup_CharacterGet_Idle1-1 = "RABBIT 1, 환복을 완료했습니다. 지금부터 잠입 작전을 시작합니다."
10071-CVGroup_Cafe_Idle1-1 = "(샤워를 하고 싶은데…)"
10071-CVGroup_Cafe_Idle2-1 = "어디선가 맛있는 냄새가…"
10071-CVGroup_Cafe_Idle3-1 = "(좀 더 귀여운 수영복으로 할 걸 그랬네요…)"
10071-CVGroup_Cafe_Idle4-1 = "여기가 선생님의… 저는 지금 무엇을…"
10071-CVGroup_Cafe_Idle5-1 = "…선생님은…. 어디에 계실까요…."
10071-CVGroup_WeaponGet_Idle1-1 = "RABBIT 31식 기관단총, 수령했습니다.\n수중전에 대비하여 내부 부품을 일부 교체했습니다만……\n그, 외부 파츠도 귀여운 것으로 교체하는 것이 좋았으려나요…?"
10071-CVGroup_UIEventLobby_Enter1-1 = "이것은 어디까지나 사건의 조사를 위한 잠입 작전……\n무사히 끝났으면 좋겠네요."
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT 1, 작전 준비를 모두 마쳤습니다. 선생님, 지시를."
10071-CVGroup_UIEventLobby_Enter3-1 = "아무래도 주민 여러분의 기분을 상하게 만든 것 같습니다만……"
10071-CVGroup_UIEventLobby_Enter3-2 = "어떻게 하면 좋을까요……?"
10071-CVGroup_UIEventLobby_Enter4-1 = "후후…… 해수욕을 즐기는 것 이상으로, 저희 SRT 다운 여름이 되었네요."
10071-CVGroup_UIEventLobby_Enter5-1 = "수고 많으셨습니다, 선생님."
10071-CVGroup_UIEventLobby_Enter5-2 = "작전 때문이긴 합니다만, 모처럼 바닷가에 나왔는데……"
10071-CVGroup_UIEventLobby_Enter5-3 = "……잠깐 시간 내 주실 수 있으신가요?"
10071-CVGroup_UIEventLobby_Idle1-1 = "마지막으로 새우가 듬뿍 들어간 샌드위치를 먹은 것이 언제였었는지……"
10071-CVGroup_UIEventLobby_Idle2-1 = "(너무 들뜬 것처럼 보이면 안 될 텐데……)"
10071-CVGroup_UIEventLobby_Idle3-1 = "자리를 비우는 동안 깡총이는,"
10071-CVGroup_UIEventLobby_Idle3-2 = "발키리 생활안전국의 학생 여러분께 돌봐달라고 부탁드렸습니다."
10071-CVGroup_UIEventLobby_Idle3-3 = "가끔은 깡총이가 RABBIT 소대보다,"
10071-CVGroup_UIEventLobby_Idle3-4 = "생활안전국 학생 여러분을 더 좋아하는 것처럼 보여서 서운할 때도 있답니다."
10071-CVGroup_UIEventMission_Enter1-1 = "어서 오세요, 선생님. 조사를 위해 필요한 목록을 정리했습니다."
10071-CVGroup_UIEventMission_Enter2-1 = "……이상이, 오늘 잠입 작전의 타깃입니다."
10071-CVGroup_UIEventMission_Idle1-1 = "네, 무슨 일이신가요?"
10071-CVGroup_UIEventMission_Idle2-1 = "그…… 이 수영복은 원단이 조금 얇은 것 같아서……"
10071-CVGroup_UIEventMission_Idle2-2 = "그, 그렇게 쳐다보시면…… 신경이 쓰이는데요……"
10071-CVGroup_UIEventMission_Buy1-1 = "역시 선생님이시군요. 믿고 있었습니다."
10071-CVGroup_UIEventMission_Buy2-1 = "도와주셔서 감사합니다. 큰 도움이 되었어요."

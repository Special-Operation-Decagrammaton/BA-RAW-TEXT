[translation]
10071-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10071-CVGroup_CharacterGet_Idle1-1 = "這裡是RABBIT1。已換裝完畢。\n從現在起，開始潛入作戰。"
10071-CVGroup_Cafe_Idle1-1 = "（雖然…想沖個澡…）"
10071-CVGroup_Cafe_Idle2-1 = "從某處傳來好吃的味道…"
10071-CVGroup_Cafe_Idle3-1 = "（…要是有穿更可愛的泳裝就好了）"
10071-CVGroup_Cafe_Idle4-1 = "這裡是，老師的…\n我剛才在想什麼…"
10071-CVGroup_Cafe_Idle5-1 = "…老師…\n會在哪裡呢…"
10071-CVGroup_WeaponGet_Idle1-1 = "RABBIT-31式短機關槍，我確實收到了。\n為了應對水中作戰，我替換了部分的內部零件，\n那個…是不是應該把外部的零件也換成更可愛的東西比較好呢…？"
10071-CVGroup_UIEventLobby_Enter1-1 = "這終究只是為了調查事件的潛入作戰……\n希望能順利結束。"
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT1，已完成作戰準備。\n老師，請下指示。"
10071-CVGroup_UIEventLobby_Enter3-1 = "看來我們似乎影響到居民們的心情了……"
10071-CVGroup_UIEventLobby_Enter3-2 = "該怎麼辦才好呢……？"
10071-CVGroup_UIEventLobby_Enter4-1 = "呵呵……比起享受海水浴，這樣更像是我們SRT的夏天。"
10071-CVGroup_UIEventLobby_Enter5-1 = "辛苦你了，老師。"
10071-CVGroup_UIEventLobby_Enter5-2 = "雖然是為了作戰，不過難得來到海邊……"
10071-CVGroup_UIEventLobby_Enter5-3 = "……可以占用老師一點時間嗎？"
10071-CVGroup_UIEventLobby_Idle1-1 = "最後一次吃到放滿蝦子的三明治是什麼時候呢。"
10071-CVGroup_UIEventLobby_Idle2-1 = "（小心不要讓人覺得很興奮……）"
10071-CVGroup_UIEventLobby_Idle3-1 = "我們不在的這段期間，蹦蹦的照顧"
10071-CVGroup_UIEventLobby_Idle3-2 = "交給了女武神生活安全局的大家。"
10071-CVGroup_UIEventLobby_Idle3-3 = "有時，我覺得蹦蹦比起RABBIT小隊，"
10071-CVGroup_UIEventLobby_Idle3-4 = "好像更喜歡生活安全局的大家，覺得有點難過……"
10071-CVGroup_UIEventMission_Enter1-1 = "你來了啊，老師。\n我整理了調查所需的清單。"
10071-CVGroup_UIEventMission_Enter2-1 = "……以上就是今天潛入作戰的目標。"
10071-CVGroup_UIEventMission_Idle1-1 = "有什麼事嗎？"
10071-CVGroup_UIEventMission_Idle2-1 = "那個……這件泳裝布料有點薄……"
10071-CVGroup_UIEventMission_Idle2-2 = "所以……那樣一直盯著我看……會讓我很在意的……"
10071-CVGroup_UIEventMission_Buy1-1 = "不愧是你，老師。\n我一直都很相信你。"
10071-CVGroup_UIEventMission_Buy2-1 = "非常感謝你的協助。\n真是幫大忙了。"

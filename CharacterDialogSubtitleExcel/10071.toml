[translation]
10071-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10071-CVGroup_CharacterGet_Idle1-1 = "RABBIT 1 เปลี่ยนชุดเรียบร้อยแล้วค่ะ\nตั้งแต่นี้ไปจะเริ่มปฏิบัติการแฝงตัวค่ะ"
10071-CVGroup_Cafe_Idle1-1 = "(อยากอาบน้ำจัง...)"
10071-CVGroup_Cafe_Idle2-1 = "เหมือนได้กลิ่นของอร่อยจากที่ไหนสักแห่ง..."
10071-CVGroup_Cafe_Idle3-1 = "(น่าจะใส่ชุดว่ายน้ำที่น่ารักๆ กว่านี้มา...)"
10071-CVGroup_Cafe_Idle4-1 = "ที่นี่คือที่ของคุณครู... แล้วฉันมาทำอะไรที่นี่นะ...?"
10071-CVGroup_Cafe_Idle5-1 = "คุณครู... อยู่ที่ไหนกันนะ...?"
10071-CVGroup_WeaponGet_Idle1-1 = "ได้รับปืน RABBIT Type 31 Submachine Gun มาแล้วค่ะ\nฉันปรับเปลี่ยนวัสดุนิดหน่อยเพื่อรับมือกับภารกิจในทะเล\nหรือว่าควรปรับแต่งวัสดุภายนอกให้ดูน่ารักๆ ด้วยมั้ยคะ...?"
10071-CVGroup_UIEventLobby_Enter1-1 = "นี่เป็นปฏิบัติการแฝงตัวที่แสนอันตราย เพื่อสืบข้อมูล\nเกี่ยวกับเหตุการณ์ที่เกิดขึ้น... หวังว่าจะผ่านไปได้ด้วยดีนะคะ"
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT 1 เตรียมพร้อมสำหรับออกปฏิบัติการแล้วค่ะ\nคุณครูคะ! ขอคำสั่งด้วยค่ะ!"
10071-CVGroup_UIEventLobby_Enter3-1 = "ไม่ว่ายังไงก็ดูเหมือนว่าจะไปทำให้ชาวเมือง\nเสียความรู้สึกเข้าซะแล้วละค่ะ..."
10071-CVGroup_UIEventLobby_Enter3-2 = "จะทำยังไงดีคะ...?"
10071-CVGroup_UIEventLobby_Enter4-1 = "ฮุฮุ... แค่ได้สนุกไปกับการเล่นน้ำทะเล เท่านี้ก็สมกับ\nเป็นฤดูร้อนของ SRT แล้วละค่ะ"
10071-CVGroup_UIEventLobby_Enter5-1 = "ขอบคุณที่ทำงานอย่างหนักค่ะ คุณครู"
10071-CVGroup_UIEventLobby_Enter5-2 = "ถึงจะมาที่นี่เพราะเรื่องปฏิบัติการ... แต่ก็อุตส่าห์ได้มาถึงทะเลทั้งที..."
10071-CVGroup_UIEventLobby_Enter5-3 = "...ฉันขอรบกวนเวลาคุณครูสักหน่อยได้มั้ยคะ?"
10071-CVGroup_UIEventLobby_Idle1-1 = "ครั้งสุดท้ายที่ได้กินแซนด์วิชสอดไส้กุ้งแน่นๆ\nแบบนี้ คือเมื่อไรกันนะ..."
10071-CVGroup_UIEventLobby_Idle2-1 = "(ไม่ควรทำตัวให้ดูหละหลวมแบบนี้เลยแท้ๆ...)"
10071-CVGroup_UIEventLobby_Idle3-1 = "ตอนที่ฉันไม่อยู่ก็เลยเอาเจ้าเปียงโกะ"
10071-CVGroup_UIEventLobby_Idle3-2 = "ไปฝากให้ทางสำนักรักษาความปลอดภัยของวัลคิรีช่วยดูแลแทนน่ะค่ะ"
10071-CVGroup_UIEventLobby_Idle3-3 = "บางครั้งฉันก็รู้สึกเสียใจนิดๆ ที่ดูเหมือนว่าเจ้าเปียงโกะ"
10071-CVGroup_UIEventLobby_Idle3-4 = "จะชอบคนของทางสำนักรักษาความปลอดภัยมากกว่า\nสมาชิกกองทหาร RABBIT อีกค่ะ"
10071-CVGroup_UIEventMission_Enter1-1 = "เชิญค่ะคุณครู ฉันจัดเรียงรายการสิ่งของ\nที่จำเป็นสำหรับการสืบสวนไว้แล้วค่ะ"
10071-CVGroup_UIEventMission_Enter2-1 = "นะ...นี่คือเป้าหมายของปฏิบัติการแฝงตัววันนี้ค่ะ"
10071-CVGroup_UIEventMission_Idle1-1 = "มีเรื่องอะไรงั้นเหรอคะ?"
10071-CVGroup_UIEventMission_Idle2-1 = "คือว่า... ผ้าที่ใช้ทำชุดว่ายน้ำชุดนี้มันค่อนข้างบางนิดหน่อย..."
10071-CVGroup_UIEventMission_Idle2-2 = "ถะ...ถ้าจ้องกันแบบนั้น มันรู้สึกน่าอึดอัดใจอยู่นะคะ..."
10071-CVGroup_UIEventMission_Buy1-1 = "สมกับเป็นคุณครูจริงๆ ฉันเชื่อมือคุณครูค่ะ"
10071-CVGroup_UIEventMission_Buy2-1 = "ขอบคุณที่ช่วยค่ะ คุณครูช่วย พวกเราได้มากเลยค่ะ"

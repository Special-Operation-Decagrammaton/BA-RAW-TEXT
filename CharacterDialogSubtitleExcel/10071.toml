[translation]
10071-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10071-CVGroup_CharacterGet_Idle1-1 = "RABBIT 1, outfit change completed. Undercover operation commencing."
10071-CVGroup_Cafe_Idle1-1 = "(I want to take a shower...)"
10071-CVGroup_Cafe_Idle2-1 = "There's a delicious smell coming from somewhere..."
10071-CVGroup_Cafe_Idle3-1 = "(I should have chosen a cuter swimsuit...)"
10071-CVGroup_Cafe_Idle4-1 = "This is Sensei's... What am I doing...?"
10071-CVGroup_Cafe_Idle5-1 = "Sensei... Where could you be...?"
10071-CVGroup_WeaponGet_Idle1-1 = "RABBIT Type 31 Submachine Gun, acquired. The internal workings have been modified to operate underwater, but maybe we could also modify the exterior to be...cuter?"
10071-CVGroup_UIEventLobby_Enter1-1 = "Today's mission is to infiltrate and investigate... I hope we don't run into any trouble."
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT 1, preparations completed. Sensei, your orders, please."
10071-CVGroup_UIEventLobby_Enter3-1 = "I'm afraid I've upset the town residents..."
10071-CVGroup_UIEventLobby_Enter3-2 = "What should I do?"
10071-CVGroup_UIEventLobby_Enter4-1 = "Heehee... We really did this summer in full SRT-style, didn't we? It was more fun than a simple beach vacation, in a lot of ways."
10071-CVGroup_UIEventLobby_Enter5-1 = "Great job, Sensei."
10071-CVGroup_UIEventLobby_Enter5-2 = "I know we're here on a mission, but we are at the beach after all..."
10071-CVGroup_UIEventLobby_Enter5-3 = "...Do you have some time for us?"
10071-CVGroup_UIEventLobby_Idle1-1 = "When was the last time I had a shrimp sandwich...?"
10071-CVGroup_UIEventLobby_Idle2-1 = "(I shouldn't look too excited...)"
10071-CVGroup_UIEventLobby_Idle3-1 = "I've made arrangements for our absence."
10071-CVGroup_UIEventLobby_Idle3-2 = "The students at the Valkyrie Public Safety Bureau will be watching Bun Bun while we're gone."
10071-CVGroup_UIEventLobby_Idle3-3 = "I have to admit, I get a little jealous sometimes..."
10071-CVGroup_UIEventLobby_Idle3-4 = "It's just that... Bun Bun seems to like the Public Safety Bureau students more than us sometimes."
10071-CVGroup_UIEventMission_Enter1-1 = "Welcome, Sensei. I've organized a list of things we'll need for the investigation."
10071-CVGroup_UIEventMission_Enter2-1 = "...This is the target for today's undercover operation."
10071-CVGroup_UIEventMission_Idle1-1 = "Yes. H-How can I help you?"
10071-CVGroup_UIEventMission_Idle2-1 = "Um... The fabric of this swimsuit is somewhat thin..."
10071-CVGroup_UIEventMission_Idle2-2 = "I-If you look at me like that... I don't know what to say..."
10071-CVGroup_UIEventMission_Buy1-1 = "As I'd expect, Sensei. I had faith in you."
10071-CVGroup_UIEventMission_Buy2-1 = "Thank you for your assistance. You were a huge help."

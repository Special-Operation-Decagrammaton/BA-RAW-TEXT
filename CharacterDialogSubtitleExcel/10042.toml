[translation]
10042-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10042-CVGroup_CharacterGet_Idle1-1 = "กองกำลังอาเรียส ฮาคาริ อาสึโกะ\nคุณครู ต้องการอะไรจากฉันรึเปล่า?\nถ้าเป็นสิ่งที่ฉันทำได้ก็คงดีนะ"
10042-CVGroup_Cafe_Idle1-1 = "หืม...?"
10042-CVGroup_Cafe_Idle2-1 = "ถึงจะดูรกไปหน่อย... อืม แต่ก็ใช้ได้นะ"
10042-CVGroup_Cafe_Idle3-1 = "นี่คือการพูดคุยกันแบบทั่วไปเหรอ...?"
10042-CVGroup_Cafe_Idle4-1 = "ที่นี่ดูเหมาะ... สำหรับปลูกดอกไม้ดีนะ"
10042-CVGroup_WeaponGet_Idle1-1 = "ฉันยอมแพ้เรื่องการออกความคิด หรือการตัดสินใจของตัวเอง\nไปแล้ว และใช้ชีวิตตามโชคชะตาก็เท่านั้น แต่ว่าตั้งแต่นี้ไปคง\nไม่เหมือนเดิมแล้วล่ะ ขอบคุณนะคุณครู"

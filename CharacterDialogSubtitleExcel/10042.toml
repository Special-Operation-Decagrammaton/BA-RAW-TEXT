[translation]
10042-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10042-CVGroup_CharacterGet_Idle1-1 = "내 이름은 하카리 아츠코. 선생님은, 나에게 무엇을 원해?\n그게 내가 할 수 있는 일이라면 좋을 텐데."
10042-CVGroup_Cafe_Idle1-1 = "흐응?"
10042-CVGroup_Cafe_Idle2-1 = "좀 어수선하지만…… 응, 그래도 나쁘지 않아."
10042-CVGroup_Cafe_Idle3-1 = "이것이, 일반적인 대화…?"
10042-CVGroup_Cafe_Idle4-1 = "여기…… 꽃을 놓아 두면 좋을 것 같아."
10042-CVGroup_WeaponGet_Idle1-1 = "생각하는 것을 포기하고, 결정하는 것을 포기하고 그저 정해진 운명대로 살아왔었어.\n하지만 이제부터는……. 응. 고마워, 선생님."

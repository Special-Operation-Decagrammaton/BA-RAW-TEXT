[translation]
10042-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10042-CVGroup_CharacterGet_Idle1-1 = "……我叫做秤敦子。\n老師對我，有什麼要求嗎？\n希望是我可以做到的事。"
10042-CVGroup_Cafe_Idle1-1 = "哼～？"
10042-CVGroup_Cafe_Idle2-1 = "雖然有點靜不下心\n……嗯，但也不錯。"
10042-CVGroup_Cafe_Idle3-1 = "這就是，\n普通的對話……？"
10042-CVGroup_Cafe_Idle4-1 = "在這裡放幾束花……\n好像很適合。"
10042-CVGroup_WeaponGet_Idle1-1 = "我曾放棄思考，放棄決定……只是按照註定好的命運過活。\n但從今以後……嗯。謝謝你，老師。"

[translation]
20017-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20017-CVGroup_CharacterGet_Idle1-1 = "헤헤헤… 결국 저도 여기에 와버렸네요. 앞으로 괴롭겠죠? 힘들겠죠?\n그치만 그게 인생이라고 배웠으니… 어쩔 수 없겠네요.\n히요리입니다. 잘 부탁드려요… 헤헤"
20017-CVGroup_Cafe_Idle1-1 = "헤헤…… 실례합니다."
20017-CVGroup_Cafe_Idle2-1 = "뭔가 좋아 보이는 가구들이, 잔뜩……"
20017-CVGroup_Cafe_Idle3-1 = "이것도 저것도… 좋네요…… 좋아 보이는 물건들이 잔뜩……"
20017-CVGroup_Cafe_Idle4-1 = "헤헤… 폐를 끼치겠습니다. 죄송해요."
20017-CVGroup_Cafe_Idle5-1 = "즐거운 기분이 들 것 같기도 하고……. 아닌 것 같기도 하고……."
20017-CVGroup_WeaponGet_Idle1-1 = "선생님은 저를 뼛속까지 부려 먹을 셈인 거네요.\n뭐어…… 다른 방법이 없으니까 포기하고 받아들일게요. 에헤헤……."

[translation]
20017-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20017-CVGroup_CharacterGet_Idle1-1 = "แหะๆๆ... สุดท้ายฉันก็มาที่นี่จนได้ ต่อไปคงจะสาหัสกว่านี้\nใช่มั้ยคะ คงลำบากสินะคะ แต่ว่าชีวิตก็เป็นแบบนี้แหละ...\nช่วยไม่ได้นะคะ ฮิโยริค่ะ ขอฝากตัวด้วยนะคะ แหะๆ..."
20017-CVGroup_Cafe_Idle1-1 = "แหะๆ... ขออภัยที่เสียมารยาทค่ะ"
20017-CVGroup_Cafe_Idle2-1 = "เหมือนจะมีเฟอร์นิเจอร์ดีๆ อยู่เยอะมากเลยค่ะ"
20017-CVGroup_Cafe_Idle3-1 = "อันนี้ด้วย อันนั้นก็ด้วย... ดีจัง... มีแต่ของดีๆ อยู่เยอะเลยค่ะ…"
20017-CVGroup_Cafe_Idle4-1 = "แหะๆ... ขอรบกวนหน่อยนะคะ ขอโทษด้วยค่ะ"
20017-CVGroup_Cafe_Idle5-1 = "ดูเหมือนที่นี่จะมีเรื่องสนุกอยู่ แต่ดูอีกทีก็เหมือนจะไม่ใช่..."
20017-CVGroup_WeaponGet_Idle1-1 = "คุณครูจะจ้องฉันให้ทะลุ ถึงกระดูกเลยสินะคะ\nแหะๆ... ไม่มีวิธีอื่นแล้ว ฉันจะยอมแพ้และยอมรับชะตาค่ะ"

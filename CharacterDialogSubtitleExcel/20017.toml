[translation]
20017-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20017-CVGroup_CharacterGet_Idle1-1 = "耶嘿嘿……結果我也來到這裡了……今後應該也會很辛苦吧？應該會很痛苦吧？\n但這好像就叫做人生……所以也沒辦法。我是日和。請多指教……耶嘿嘿。"
20017-CVGroup_Cafe_Idle1-1 = "耶嘿嘿。\n失禮了……"
20017-CVGroup_Cafe_Idle2-1 = "好像有很多品質不錯的家具……"
20017-CVGroup_Cafe_Idle3-1 = "不管哪個……都不錯呢……\n有很多感覺不錯的東西……"
20017-CVGroup_Cafe_Idle4-1 = "耶嘿嘿……\n給你添麻煩了，不好意思……"
20017-CVGroup_Cafe_Idle5-1 = "心情好像能變得開心……\n又好像沒有……"
20017-CVGroup_WeaponGet_Idle1-1 = "老師這是打算要將我使喚到粉身碎骨對吧……\n反正我也無從抵抗了……就欣然接受吧，耶嘿嘿……"

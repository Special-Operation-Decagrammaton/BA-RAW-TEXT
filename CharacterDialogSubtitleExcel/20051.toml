[translation]
20051-CVGroup_UITitle_Idle1-1 = "블루! 아카이브!!"
20051-CVGroup_CharacterGet_Idle1-1 = "왔습니다, 또 왔습니다! 이번엔 마법소녀, 우자와 레이사의 등장입니다!"
20051-CVGroup_Cafe_Idle1-1 = "오, 오늘도…… 사람이 많아……."
20051-CVGroup_Cafe_Idle2-1 = "최, 최대한, 평소대로……."
20051-CVGroup_Cafe_Idle3-1 = "(앗, 나도 저거 아는데!)"
20051-CVGroup_Cafe_Idle4-1 = "다들 즐거워 보이네요!"
20051-CVGroup_Cafe_Idle5-1 = "(아앗…… 내 자리에…….)"
20051-CVGroup_WeaponGet_Idle1-1 = "선생님은, 항상 상냥하게 대해주시는군요…….\n이렇게 함께 있으면……저, 최강이 될 수 있을 것만 같아요……!"
20051-CVGroup_UIEventLobby_Enter1-1 = "선생님! 여기예요, 여기!"
20051-CVGroup_UIEventLobby_Enter1-2 = "후훗, 너무 빨라서 놓치셨군요?"
20051-CVGroup_UIEventLobby_Enter2-1 = "자경단의 슈퍼 매지컬 워리어!"
20051-CVGroup_UIEventLobby_Enter2-2 = "테르밋 핑크입니다!"
20051-CVGroup_UIEventLobby_Enter3-1 = "우와아! 손님들이 엄청 많네요!"
20051-CVGroup_UIEventLobby_Enter4-1 = "후후후……아무도 눈치채지 못한 것 같네요……."
20051-CVGroup_UIEventLobby_Enter4-2 = "평범한 제가, 사실은 자경단의 슈퍼 에이스이자,"
20051-CVGroup_UIEventLobby_Enter4-3 = "마법소녀라는 사실을……!"
20051-CVGroup_UIEventLobby_Enter5-1 = "변신은 풀렸지만,"
20051-CVGroup_UIEventLobby_Enter5-2 = "마법은 끝이 아니라구요! 에헤헤!"
20051-CVGroup_UIEventLobby_Idle1-1 = "네! 테르밋 핑크입니다! 우자와 레이사로도 알려져 있죠!"
20051-CVGroup_UIEventLobby_Idle2-1 = "후훗, 계속 연습해 온 변신 포즈를……"
20051-CVGroup_UIEventLobby_Idle2-2 = "여기서 보여드리죠! 일단……"
20051-CVGroup_UIEventLobby_Idle2-3 = "히얏!?"
20051-CVGroup_UIEventLobby_Idle2-4 = "바, 방금 아는 사람하고 눈 마주친 것 같은……."
20051-CVGroup_UIEventLobby_Idle3-1 = "이거요? 테르밋 핑크의 마법봉입니다!"
20051-CVGroup_UIEventLobby_Idle3-2 = "공식 스틱은 좀 비싸서……"
20051-CVGroup_UIEventLobby_Idle3-3 = "그래서, 집에 있는 걸 꾸며봤습니다!"
20051-CVGroup_UIEventLobby_Idle4-1 = "테르밋 핑크! 변신!"
20051-CVGroup_UIEventLobby_Idle4-2 = "자! 평화를 지키러 가죠!"
20051-CVGroup_UIEventShop_Enter1-1 = "슈루루- 빠방빠밤!!! 반짝!"
20051-CVGroup_UIEventShop_Enter2-1 = "마법 장터에 어서 오세요-!"
20051-CVGroup_UIEventShop_Enter3-1 = "반값 스티커는 없다구요!? 여긴 슈퍼가 아니니깐요!"
20051-CVGroup_UIEventShop_Idle1-1 = "이 옷은 팔지 않습니다! 여벌이 없거든요!"
20051-CVGroup_UIEventShop_Idle2-1 = "기념품 가게 같아서 좋네요!"
20051-CVGroup_UIEventShop_Buy1-1 = "거래…… 즉, 계약을 맺는 것!"
20051-CVGroup_UIEventShop_Buy2-1 = "이게 어른의 재력……! 히어로 같아요!"
20051-CVGroup_UIEventShop_Buy3-1 = "왠지 마법 아이템 같네요!"
20051-CVGroup_UIEventShop_Buy4-1 = "매지컬 쇼핑! 이군요!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "와앗! 이건! 카드 뽑기네요! 엄청 오래간만입니다!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "메달을 넣어서, 이렇게! 그르륵! 각! 하면 됩니다!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "아직도 이런 기계가 남아있었네요!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "자 선생님! 어서 돌려보죠!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "자, 남은 메달 다- 넣고 돌려보죠!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "뭐가 나올까요! 기대되네요!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "여기 정말 멋지네요! 여기가 제 집이면 좋을 텐데……!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "아앗!! 그건, 울트라 레어!?"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-2 = "저도 딱 한 번밖에 뽑아본 적 없어요, 초 레어 카드라구요!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "오옷! 슈퍼 레어입니다! 은근히 보기 힘들어요!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "골드! 좋네요! 반짝반짝합니다!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "아앗, 아……."
20051-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "그건 꽝 카드네요! 저도 실물은 처음 봅니다!"

[translation]
20051-CVGroup_UITitle_Idle1-1 = "Blue! Archive!!"
20051-CVGroup_CharacterGet_Idle1-1 = "มาแล้วค่ะ ฉันมาอีกแล้วค่ะ!\nครั้งนี้มาเป็นสาวน้อยเวทมนตร์อุซาวะ เรอิสะค่ะ!"
20051-CVGroup_Cafe_Idle1-1 = "วะ... วันนี้ก็... คนเยอะจังเลย..."
20051-CVGroup_Cafe_Idle2-1 = "ตะ... ต้องทำตัวเป็นปกติให้มากที่สุด..."
20051-CVGroup_Cafe_Idle3-1 = "(อ๊ะ อันนั้นฉันก็รู้จักนะ!)"
20051-CVGroup_Cafe_Idle4-1 = "ทุกคนดูสนุกกันจังนะคะ!"
20051-CVGroup_Cafe_Idle5-1 = "(อ๊ะ... ที่นั่งของฉัน...)"
20051-CVGroup_WeaponGet_Idle1-1 = "คุณครูใจดีกับฉันตลอดเลยนะคะ...\nถ้าอยู่ด้วยกันแบบนี้ละก็... ฉันรู้สึกว่าตัวเองจะแข็งแกร่งที่สุดเลยค่ะ...!"
20051-CVGroup_UIEventLobby_Enter1-1 = "คุณครู! ตรงนี้ค่ะ ตรงนี้!"
20051-CVGroup_UIEventLobby_Enter1-2 = "ฮุฮุ ฉันเร็วเกินจนตามไม่ทันสินะคะ?"
20051-CVGroup_UIEventLobby_Enter2-1 = "ซูเปอร์ เมจิคัล วอริเออร์แห่งกลุ่มรักษาความสงบ!"
20051-CVGroup_UIEventLobby_Enter2-2 = "เทอร์ไมต์ พิงค์เองค่ะ!"
20051-CVGroup_UIEventLobby_Enter3-1 = "ว้าวว! มีคนมาเที่ยวเยอะจังเลยค่ะ!"
20051-CVGroup_UIEventLobby_Enter4-1 = "ฮุฮุฮุ... เหมือนจะไม่มีใครสังเกตได้เลยนะคะ..."
20051-CVGroup_UIEventLobby_Enter4-2 = "ว่าฉันที่ธรรมดาคนนี้ที่จริงเป็นซูเปอร์เอซ\nของกลุ่มรักษาความสงบ"
20051-CVGroup_UIEventLobby_Enter4-3 = "และเป็นสาวน้อยเวทมนตร์ด้วย...!"
20051-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะกลับร่างเดิมแล้ว"
20051-CVGroup_UIEventLobby_Enter5-2 = "แต่เวทมนตร์ก็ยังไม่หมดหรอกนะคะ! ฮิฮิฮิ!"
20051-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ! เทอร์ไมต์ พิงค์เองค่ะ!\nรู้จักกันในชื่ออุซาวะ เรอิสะด้วยค่ะ!"
20051-CVGroup_UIEventLobby_Idle2-1 = "ฮุฮุ ท่าโพสตอนแปลงร่างที่ฉันหมั่นฝึกซ้อมมา..."
20051-CVGroup_UIEventLobby_Idle2-2 = "ฉันจะโชว์ให้เห็นที่นี่ค่ะ! ก่อนอื่นก็..."
20051-CVGroup_UIEventLobby_Idle2-3 = "อ๊าย!?"
20051-CVGroup_UIEventLobby_Idle2-4 = "มะ... เมื่อกี้เหมือนได้สบตากับคนที่รู้จักเลย..."
20051-CVGroup_UIEventLobby_Idle3-1 = "อันนี้ี่น่ะเหรอคะ? ไม้กายสิทธิ์ของเทอร์ไมต์ พิงค์ยังไงล่ะคะ!"
20051-CVGroup_UIEventLobby_Idle3-2 = "แท่งไฟออฟฟิเชียลมันค่อนข้างแพง..."
20051-CVGroup_UIEventLobby_Idle3-3 = "ฉันก็เลยเอาอันที่มีที่บ้านมาตกแต่งดูค่ะ!"
20051-CVGroup_UIEventLobby_Idle4-1 = "เทอร์ไมต์ พิงค์! เปลี่ยนร่าง!"
20051-CVGroup_UIEventLobby_Idle4-2 = "เอาละ! ไปรักษาความสงบสุขกันค่ะ!"
20051-CVGroup_UIEventShop_Enter1-1 = "ชูรูรู ปาปัมปาป๊าม!!! วิ้งวับ!"
20051-CVGroup_UIEventShop_Enter2-1 = "เชิญเข้าสู่ตลาดเวทมนตร์ค่ะ!"
20051-CVGroup_UIEventShop_Enter3-1 = "ไม่มีสติกเกอร์ครึ่งราคาค่ะ!? ที่นี่ไม่ใช่ซูเปอร์มาร์เก็ตนะคะ!"
20051-CVGroup_UIEventShop_Idle1-1 = "ชุดนี้ไม่ขายค่ะ! พอดีไม่มีสำรองน่ะค่ะ!"
20051-CVGroup_UIEventShop_Idle2-1 = "ดีจังเลยนะคะ เหมือนร้านขายของที่ระลึกเลย!"
20051-CVGroup_UIEventShop_Buy1-1 = "การซื้อขาย... ก็คือการทำสัญญา!"
20051-CVGroup_UIEventShop_Buy2-1 = "นี่สินะความร่ำรวยของผู้ใหญ่...! เหมือนฮีโร่เลยค่ะ!"
20051-CVGroup_UIEventShop_Buy3-1 = "รู้สึกเหมือนเป็นไอเทมเวทมนตร์เลยนะคะ!"
20051-CVGroup_UIEventShop_Buy4-1 = "นี่ก็คือเมจิคัล ช้อปปิ้ง! สินะคะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "ว้าว! นี่มัน! เกมเลือกการ์ดนี่คะ!\nไม่ได้เล่นมานานมากเลยค่ะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "ใส่เหรียญเข้าไปแล้วก็หมุน! ครืดด! กึก! เท่านี้เองค่ะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "ยังมีเครื่องแบบนี้อยู่อีกนะคะเนี่ย!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "เอาละ คุณครู! รีบหมุนดูสิคะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "เอาละ ใส่เหรียญที่เหลือให้หมด แล้วหมุนเลยค่ะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "จะได้อะไรคะ! อยากรู้จังเลยค่ะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "ที่นี่ยอดเยี่ยมจังเลยนะคะ!\nอยากให้ที่นี่เป็นบ้านของฉันจัง...!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "อ๊ะ!! นี่มันอัลตราแรร์!?"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-2 = "ฉันก็เพิ่งเคยหมุนออกแค่ครั้งเดียวเหมือนกันค่ะ\nเป็นการ์ดแรร์มากๆ เลยนะคะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "โอ้ว! ซูเปอร์แรร์ค่ะ!\nหาไม่ได้ง่ายๆ เลยนะคะ!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "โกลด์! ดีเลยค่ะ!\nวิบวับวิบวับเลย!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "อ๊ะ... อ่า..."
20051-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "แบบนั้นคือการ์ดเน่าค่ะ!\nฉันเองก็เพิ่งเคยเห็นของจริงค่ะ!"

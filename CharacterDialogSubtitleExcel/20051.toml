[translation]
20051-CVGroup_UITitle_Idle1-1 = "Blue! Archive!!!"
20051-CVGroup_CharacterGet_Idle1-1 = "I'm here, I'm here again! Uzawa Reisa, this time as a magical girl!"
20051-CVGroup_Cafe_Idle1-1 = "T-Today as well... There's so many people..."
20051-CVGroup_Cafe_Idle2-1 = "A-Act as natural as possible..."
20051-CVGroup_Cafe_Idle3-1 = "(Ah, I know that too!)"
20051-CVGroup_Cafe_Idle4-1 = "Everyone seems to be having fun!"
20051-CVGroup_Cafe_Idle5-1 = "(Aaah... My spot...)"
20051-CVGroup_WeaponGet_Idle1-1 = "Sensei, you're always so nice to me... When we're together like this...I feel like the strongest!"
20051-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Here, over here!"
20051-CVGroup_UIEventLobby_Enter1-2 = "Fufu, I suppose you couldn't keep up with how fast I was?"
20051-CVGroup_UIEventLobby_Enter2-1 = "The Vigilante Crew's super-magical warrior!"
20051-CVGroup_UIEventLobby_Enter2-2 = "Thermite Pink is here!"
20051-CVGroup_UIEventLobby_Enter3-1 = "Whoa! There are so many guests!"
20051-CVGroup_UIEventLobby_Enter4-1 = "Fufufu... I don't think anyone's noticed yet..."
20051-CVGroup_UIEventLobby_Enter4-2 = "That an ordinary person like me was actually the Vigilante Crew's super ace..."
20051-CVGroup_UIEventLobby_Enter4-3 = "...and a magical girl!"
20051-CVGroup_UIEventLobby_Enter5-1 = "The transformation is over..."
20051-CVGroup_UIEventLobby_Enter5-2 = "...but magic isn't! Eheehee!"
20051-CVGroup_UIEventLobby_Idle1-1 = "Yes! Thermite Pink here! Also known as Uzawa Reisa!"
20051-CVGroup_UIEventLobby_Idle2-1 = "Fufu, I'll show you my transformation pose..."
20051-CVGroup_UIEventLobby_Idle2-2 = "I've been practicing! For starters..."
20051-CVGroup_UIEventLobby_Idle2-3 = "Kyaaah?!"
20051-CVGroup_UIEventLobby_Idle2-4 = "I-I feel like I just made eye contact with someone I know..."
20051-CVGroup_UIEventLobby_Idle3-1 = "This? It's Thermite Pink's magic wand!"
20051-CVGroup_UIEventLobby_Idle3-2 = "The official wand is a bit pricy..."
20051-CVGroup_UIEventLobby_Idle3-3 = "So I tried decorating it with stuff I have at home!"
20051-CVGroup_UIEventLobby_Idle4-1 = "Thermite Pink! Transformation!"
20051-CVGroup_UIEventLobby_Idle4-2 = "Now! Let's go protect peace!"
20051-CVGroup_UIEventShop_Enter1-1 = "Swoosh! Bam-bam!! Sparkle!"
20051-CVGroup_UIEventShop_Enter2-1 = "Welcome to the magic store!"
20051-CVGroup_UIEventShop_Enter3-1 = "We don't have half-off stickers, okay?! This isn't a supermarket!"
20051-CVGroup_UIEventShop_Idle1-1 = "This outfit is not for sale! I have no extras!"
20051-CVGroup_UIEventShop_Idle2-1 = "This feels nice. It's just like a souvenir shop!"
20051-CVGroup_UIEventShop_Buy1-1 = "Exchange... In other words, making a contract!"
20051-CVGroup_UIEventShop_Buy2-1 = "So this is the adult's wealth...! Like a hero!"
20051-CVGroup_UIEventShop_Buy3-1 = "This feels like a magic item for some reason!"
20051-CVGroup_UIEventShop_Buy4-1 = "So it's magical shopping!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "Whoa! This is...! It's the thing you use to pull cards! I haven't seen one in so long!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "You insert a medal, like this! And clink! Clank! There you go!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "They still had these machines here!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "All right, Sensei! Let's give it a spin!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "Let's put in all the remaining medals and spin!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "I wonder what we'll get! I'm excited!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "This place is incredible! I wish this was my home...!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "Aah!! Isn't that an ultra-rare one?!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-2 = "I only pulled that once in my life before. It's a super-rare card!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "Ooh! A super-rare card! These are hard to find!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "Gold! That's nice! It's shiny!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "Ah, ah..."
20051-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "That's a dud! This is actually my first time seeing one too!"

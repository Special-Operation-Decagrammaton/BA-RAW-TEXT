[translation]
20051-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！！"
20051-CVGroup_CharacterGet_Idle1-1 = "聽到呼叫就飛奔而來！再次登場！\n魔法少女，Magical宇沢澪紗，登場！"
20051-CVGroup_Cafe_Idle1-1 = "今，今天也……好多人……"
20051-CVGroup_Cafe_Idle2-1 = "盡，盡量，像平常一樣……"
20051-CVGroup_Cafe_Idle3-1 = "（啊！剛才的……是我知道的話題！）"
20051-CVGroup_Cafe_Idle4-1 = "大家，看起來都很開心呢！"
20051-CVGroup_Cafe_Idle5-1 = "（啊啊……座位被占走了……）"
20051-CVGroup_WeaponGet_Idle1-1 = "老師你，總是那麼溫柔呢……\n像這樣待在一起的時候……我，有種自己能變成最強的感覺……！"
20051-CVGroup_UIEventLobby_Enter1-1 = "老師！這邊哦！這邊！"
20051-CVGroup_UIEventLobby_Enter1-2 = "哼哼，眼睛追不上我的速度了對吧？"
20051-CVGroup_UIEventLobby_Enter2-1 = "自衛隊的超級魔法戰士！"
20051-CVGroup_UIEventLobby_Enter2-2 = "Thermite～Pink！就是在下！"
20051-CVGroup_UIEventLobby_Enter3-1 = "哇啊！客人真多呢！"
20051-CVGroup_UIEventLobby_Enter4-1 = "哼哼哼……似乎沒有人察覺呢……"
20051-CVGroup_UIEventLobby_Enter4-2 = "平凡的我，其實是自衛隊的超級王牌，"
20051-CVGroup_UIEventLobby_Enter4-3 = "還是魔法少女這件事……！"
20051-CVGroup_UIEventLobby_Enter5-1 = "雖然變身已經解除了……"
20051-CVGroup_UIEventLobby_Enter5-2 = "不過魔法是不會結束的！耶嘿嘿！"
20051-CVGroup_UIEventLobby_Idle1-1 = "是的！我是Thermite Pink！\n也是宇沢澪紗！"
20051-CVGroup_UIEventLobby_Idle2-1 = "呵呵……我一直在練習的變身姿勢……"
20051-CVGroup_UIEventLobby_Idle2-2 = "就在這裡表演給你看吧！首先是……"
20051-CVGroup_UIEventLobby_Idle2-3 = "呀啊！？"
20051-CVGroup_UIEventLobby_Idle2-4 = "剛，剛才……好像跟認識的人對到眼了……"
20051-CVGroup_UIEventLobby_Idle3-1 = "這個嗎？是Thermite Pink的魔杖！"
20051-CVGroup_UIEventLobby_Idle3-2 = "因為官方的魔杖有點貴……"
20051-CVGroup_UIEventLobby_Idle3-3 = "所以，我就把自己的拿來裝飾了一下！"
20051-CVGroup_UIEventLobby_Idle4-1 = "Thermite Pink！變身！"
20051-CVGroup_UIEventLobby_Idle4-2 = "來！一起去守護和平吧！"
20051-CVGroup_UIEventShop_Enter1-1 = "咻嚕嚕～\n閃閃發光！！亮晶晶！"
20051-CVGroup_UIEventShop_Enter2-1 = "歡迎來到魔法市場～！"
20051-CVGroup_UIEventShop_Enter3-1 = "沒有半價貼紙哦！？\n因為這裡不是超市！"
20051-CVGroup_UIEventShop_Idle1-1 = "啊，這套衣服是非賣品哦！\n因為只有一件！"
20051-CVGroup_UIEventShop_Idle2-1 = "像紀念品店一樣，真有趣呢！"
20051-CVGroup_UIEventShop_Buy1-1 = "交易……換句話說，就是簽訂契約的意思！"
20051-CVGroup_UIEventShop_Buy2-1 = "這就是大人的財力……！就跟英雄一樣！"
20051-CVGroup_UIEventShop_Buy3-1 = "那個，感覺很像魔法道具！"
20051-CVGroup_UIEventShop_Buy4-1 = "是魔法購物呢！"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "哇！這是！可以抽卡的東西呢！太讓人懷念了！"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "只要像這樣！卡咯卡咯地轉就行了哦！"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "這種東西，居然還留著呢！"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "來吧老師！快點轉吧！"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "來，把剩下的全～部用來轉一轉吧！"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "會抽出什麼呢！好期待！"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "這裡真的很棒呢！\n要是這裡是我的家就好了……！"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "啊啊！那個是！終極稀有！？"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-2 = "是我也只抽過一次的超！稀有卡唷！？"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "哦哦！超級稀有！這是很少見的哦！"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "金色！！真不錯呢！\n亮晶晶的！"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "啊啊，啊……"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "那是槓龜卡片呢！\n我也是第一次看到實物！"

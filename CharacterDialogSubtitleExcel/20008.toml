[translation]
20008-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20008-CVGroup_CharacterGet_Idle1-1 = "게헨나 학원 선도부 소속 선임행정관 아마우 아코.\n앞으로의 업무 협력, 모쪼록 잘 부탁드리겠습니다."
20008-CVGroup_Cafe_Idle1-1 = "과연… 뭐, 나쁘지 않은 시설이네요."
20008-CVGroup_Cafe_Idle2-1 = "샬레와의 다음 제휴업무는…"
20008-CVGroup_Cafe_Idle3-1 = "부장님…밥은 잘 챙겨 드시고 있을까요?"
20008-CVGroup_Cafe_Idle4-1 = "다들 어째 태평해 보이는 분위기네요. 뭐, 아무래도 좋은 일이지만…"
20008-CVGroup_Cafe_Idle5-1 = "여차하면 이곳을 그냥…\n아니, 그러면 부장님이 곤란해하시겠죠. 그만두도록 하죠."
20008-CVGroup_WeaponGet_Idle1-1 = "정말이지, 이런 대담한 어프로치를 태연하게….\n뭐, 좋아요. 당신의 눈앞에 있는 학생이 얼마나 우수한지, 뼛속 깊이 알려드리죠."
20008-CVGroup_UIEventMiniGameMission_Enter1-1 = "선생님의 지원. 감사히 받겠습니다."
20008-CVGroup_UIEventMiniGameMission_Idle1-1 = "이후는 부탁드리겠습니다."
20008-CVGroup_UIEventMiniGameMission_Buy1-1 = "선도부의 보급입니다!"
20008-CVGroup_UIEventMiniGameMission_Interaction1-1 = "그…… 감사합니다. 선생님."
20008-CVGroup_UIEventMiniGameMission_Interaction1-2 = "……뭔가요, 그 얼굴."
20008-CVGroup_UIEventMiniGameMission_Interaction1-3 = "저도 감사인사 정도는 한다고요. 정말……"

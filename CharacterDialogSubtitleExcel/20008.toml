[translation]
20008-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20008-CVGroup_CharacterGet_Idle1-1 = "我是隸屬於格黑娜學園風紀委員會的行政官天雨亞子。\n今後在業務合作上請務必多多指教。"
20008-CVGroup_Cafe_Idle1-1 = "原來如此……\n嘛，設備還不算太差。"
20008-CVGroup_Cafe_Idle2-1 = "下一個和夏萊的合作業務是…"
20008-CVGroup_Cafe_Idle3-1 = "委員長…有好好按時吃飯嗎？"
20008-CVGroup_Cafe_Idle4-1 = "總覺得這裡的氣氛輕飄飄的呢……\n嘛，雖然無所謂……"
20008-CVGroup_Cafe_Idle5-1 = "必要的時候就……\n不，那麼做的話，委員長會很困擾吧。\n暫時先放棄吧。"
20008-CVGroup_WeaponGet_Idle1-1 = "真是的，這種大膽的交涉居然若無其事地就……好吧。\n現在在眼前的學生是多麼優秀，就讓您深刻體會吧。"
20008-CVGroup_UIEventMiniGameMission_Enter1-1 = "老師的支援，我會感激地收下。"
20008-CVGroup_UIEventMiniGameMission_Idle1-1 = "之後也麻煩您囉？"
20008-CVGroup_UIEventMiniGameMission_Buy1-1 = "是風紀委員會的補給品！"
20008-CVGroup_UIEventMiniGameMission_Interaction1-1 = "那個……謝謝您。老師。"
20008-CVGroup_UIEventMiniGameMission_Interaction1-2 = "……那個表情是怎麼回事？"
20008-CVGroup_UIEventMiniGameMission_Interaction1-3 = "就算是我，受人幫助也是會道謝的。真是的……"

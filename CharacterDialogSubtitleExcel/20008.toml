[translation]
20008-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20008-CVGroup_CharacterGet_Idle1-1 = "I'm Amau Ako, the senior administrator of the Gehenna Academy Prefect Team. I look forward to our future cooperation."
20008-CVGroup_Cafe_Idle1-1 = "Hmm. The facilities here...pass, I suppose."
20008-CVGroup_Cafe_Idle2-1 = "The schedule for the next coordinated task between Schale and the Prefect Team is..."
20008-CVGroup_Cafe_Idle3-1 = "The Head Prefect... Do you think she's eating well?"
20008-CVGroup_Cafe_Idle4-1 = "Things are pretty easygoing around here. Well, it's probably a good thing."
20008-CVGroup_Cafe_Idle5-1 = "If need be, the Prefect Team can take over... No, that would put the Head Prefect on the spot. What a shame."
20008-CVGroup_WeaponGet_Idle1-1 = "A daring approach...but okay. I'll show you myself what a talented student I am."
20008-CVGroup_UIEventMiniGameMission_Enter1-1 = "I appreciate your support, Sensei."
20008-CVGroup_UIEventMiniGameMission_Idle1-1 = "I'll be counting on you for the rest."
20008-CVGroup_UIEventMiniGameMission_Buy1-1 = "The Prefect Team's supplies!"
20008-CVGroup_UIEventMiniGameMission_Interaction1-1 = "Um...Thank you, Sensei."
20008-CVGroup_UIEventMiniGameMission_Interaction1-2 = "...What's with that face?"
20008-CVGroup_UIEventMiniGameMission_Interaction1-3 = "I know how to say thank you. Come on..."

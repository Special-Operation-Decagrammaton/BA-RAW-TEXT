[translation]
10063-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10063-CVGroup_CharacterGet_Idle1-1 = "มีเรื่องสนุกๆ อะไรบ้างหรือเปล่าคะ?\nคุโรซากิ โคยูกิ มาแล้วค่ะ!! ฮะฮะฮ่าฮ่า!!"
10063-CVGroup_Cafe_Idle1-1 = "ว้าว ที่นี่… มีของแปลกๆ เยอะเลยค่ะ?"
10063-CVGroup_Cafe_Idle2-1 = "ทะ... ที่นี่เป็นพื้นที่ปลอดภัยใช่มั้ยคะ?!\nคงไม่มีใครมาจับฉันไปได้หรอกใช่มั้ยคะ?!"
10063-CVGroup_Cafe_Idle3-1 = "อ่ะฮ่า ที่นี่ก็คือ… สถานที่ที่ลือกัน..."
10063-CVGroup_Cafe_Idle4-1 = "(คือว่าที่นี่… มีระบบขับไล่คนที่เสียงดังด้วยเหรอคะ!?)"
10063-CVGroup_Cafe_Idle5-1 = "ฮึก...!! หิวจัง..."
10063-CVGroup_WeaponGet_Idle1-1 = "เอ่อ อืม...? ไม่เป็นไรจริงๆ เหรอคะ?\nทำแบบนี้ไม่เป็นไรจริงๆ เหรอคะ?\nคุณครูไว้ใจฉันจริงๆ เหรอคะ...?"

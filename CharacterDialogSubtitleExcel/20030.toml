[translation]
20030-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20030-CVGroup_CharacterGet_Idle1-1 = "運動……以及食慾的季節！簡直是美食的祭典……\n這絕好的機會，只能盡情享受了。"
20030-CVGroup_Cafe_Idle1-1 = "來，盡情享受美食的探險吧。"
20030-CVGroup_Cafe_Idle2-1 = "那麼，要先去什麼地方呢…？"
20030-CVGroup_Cafe_Idle3-1 = "吃飯，是至高無上的行為。"
20030-CVGroup_Cafe_Idle4-1 = "為了提高運動效果，正常均衡的飲食也是不可或缺的。"
20030-CVGroup_Cafe_Idle5-1 = "如果休息完了，要不要去逛逛小吃攤呀？"
20030-CVGroup_WeaponGet_Idle1-1 = "我也使出全力吧。\n這也是為了如此關心我的老師。"
20030-CVGroup_UIEventLobby_Enter1-1 = "「晄輪大祭」…美食的新境界，已經到來。"
20030-CVGroup_UIEventLobby_Enter2-1 = "您來了啊，老師。"
20030-CVGroup_UIEventLobby_Enter2-2 = "那麼，現在開始和我一起──"
20030-CVGroup_UIEventLobby_Enter2-3 = "挑戰征服路邊攤吧？"
20030-CVGroup_UIEventLobby_Enter3-1 = "唔呵呵。老師，玩得開心嗎？"
20030-CVGroup_UIEventLobby_Enter3-2 = "我非常樂在其中。"
20030-CVGroup_UIEventLobby_Enter4-1 = "不知不覺「晄輪大祭」也已經進入尾聲……"
20030-CVGroup_UIEventLobby_Enter4-2 = "雖說快樂的時光轉瞬即逝……"
20030-CVGroup_UIEventLobby_Enter4-3 = "但回憶將會永遠留下。"
20030-CVGroup_UIEventLobby_Enter5-1 = "您好，老師。\n我已經征服路邊攤了。"
20030-CVGroup_UIEventLobby_Idle1-1 = "我雖然是不會胖的體質，卻不代表能吃很多…"
20030-CVGroup_UIEventLobby_Idle1-2 = "總是讓我感到十分沮喪。"
20030-CVGroup_UIEventLobby_Idle2-1 = "有點想活動一下身體了。"
20030-CVGroup_UIEventLobby_Idle2-2 = "我也可以參加嗎？\n…「吃麵包競走」。"
20030-CVGroup_UIEventLobby_Idle3-1 = "「晄輪大祭」的攤位，正是「美食的博覽會」！"
20030-CVGroup_UIEventLobby_Idle3-2 = "啊啊，究極的美味，肯定就在那裡…！"
20030-CVGroup_UIEventLobby_Idle4-1 = "老師…要不要一起走走呢？"
20030-CVGroup_UIEventLobby_Idle4-2 = "…與平時不同的打扮，也別有一番風味唷。"

[translation]
20030-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20030-CVGroup_CharacterGet_Idle1-1 = "운동… 그리고 식욕의 계절! 그야말로 미식의 제전…\n이 절호의 기회, 만끽할 수밖에 없겠네요."
20030-CVGroup_Cafe_Idle1-1 = "자아, 미식을 위한 탐험을 떠나도록 하죠."
20030-CVGroup_Cafe_Idle2-1 = "그러면, 어떤 곳부터 가 보도록 할까요…?"
20030-CVGroup_Cafe_Idle3-1 = "식사란, 지고의 행위."
20030-CVGroup_Cafe_Idle4-1 = "운동효과를 높이기 위해서라도, 제대로 된 식사는 필수적이랍니다."
20030-CVGroup_Cafe_Idle5-1 = "휴식이 끝나면, 노점 탐방을 떠나 볼까요?"
20030-CVGroup_WeaponGet_Idle1-1 = "저도 모든 힘을 다하겠습니다.\n이렇게 관심을 가져 주시는, 선생님을 위해서라도요."
20030-CVGroup_UIEventLobby_Enter1-1 = "<황륜대제>… 새로운 미식의 지평이, 열리는 날이 왔군요."
20030-CVGroup_UIEventLobby_Enter2-1 = "오셨군요, 선생님."
20030-CVGroup_UIEventLobby_Enter2-2 = "그러면, 지금부터 저와――"
20030-CVGroup_UIEventLobby_Enter2-3 = "노점 정복에 도전해보시겠어요?"
20030-CVGroup_UIEventLobby_Enter3-1 = "우후후. 선생님, 즐기고 계신가요?"
20030-CVGroup_UIEventLobby_Enter3-2 = "저는 더할 나위 없이 즐기고 있답니다."
20030-CVGroup_UIEventLobby_Enter4-1 = "어느새 <황륜대제>도 막바지…"
20030-CVGroup_UIEventLobby_Enter4-2 = "즐거운 시간은 순식간, 이라고 합니다만…"
20030-CVGroup_UIEventLobby_Enter4-3 = "추억은 언제까지고 남기 마련이겠죠."
20030-CVGroup_UIEventLobby_Enter5-1 = "평안하신지요, 선생님. 노점 제패라면 완료했답니다."
20030-CVGroup_UIEventLobby_Idle1-1 = "저는 살이 찌지 않는 체질입니다만, 많이 먹을 수 있는 것은 아니어서…"
20030-CVGroup_UIEventLobby_Idle1-2 = "언제나, 안타까운 마음으로 가득하답니다."
20030-CVGroup_UIEventLobby_Idle2-1 = "조금, 몸을 움직이고 싶어졌어요."
20030-CVGroup_UIEventLobby_Idle2-2 = "저도, 참여해도 될까요? …'빵 먹기 경주'에"
20030-CVGroup_UIEventLobby_Idle3-1 = "<황륜대제>의 노점은 그야말로, '미식 박람회' 그 자체!"
20030-CVGroup_UIEventLobby_Idle3-2 = "아아, 궁극의 맛이, 분명 거기에…!"
20030-CVGroup_UIEventLobby_Idle4-1 = "선생님… 잠시 함께 걷지 않으시겠어요?"
20030-CVGroup_UIEventLobby_Idle4-2 = "…평소와는 다른 복장도, 나름대로 좋네요."

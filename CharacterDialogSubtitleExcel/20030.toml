[translation]
20030-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20030-CVGroup_CharacterGet_Idle1-1 = "The season of exercise...and appetite! There's a culinary feast to be enjoyed...and I have no choice but to take advantage of this opportunity."
20030-CVGroup_Cafe_Idle1-1 = "Let us now depart on a gastronomic adventure."
20030-CVGroup_Cafe_Idle2-1 = "So where should we head first...?"
20030-CVGroup_Cafe_Idle3-1 = "Eating is a noble pursuit."
20030-CVGroup_Cafe_Idle4-1 = "No amount of exercising will do you any good if you don't eat well."
20030-CVGroup_Cafe_Idle5-1 = "After we're done resting, shall we explore the street stalls?"
20030-CVGroup_WeaponGet_Idle1-1 = "I'll do my best. Especially for you, Sensei, since I know how much you care."
20030-CVGroup_UIEventLobby_Enter1-1 = "The Kivotos Halo Festival... It's the dawn of a new culinary era."
20030-CVGroup_UIEventLobby_Enter2-1 = "Thank you for coming, Sensei."
20030-CVGroup_UIEventLobby_Enter2-2 = "So, will you join me..."
20030-CVGroup_UIEventLobby_Enter2-3 = "...in my conquest of the food stalls?"
20030-CVGroup_UIEventLobby_Enter3-1 = "Sensei, are you enjoying yourself?"
20030-CVGroup_UIEventLobby_Enter3-2 = "I myself couldn't be having more fun."
20030-CVGroup_UIEventLobby_Enter4-1 = "And so the Kivotos Halo Festival is coming to an end..."
20030-CVGroup_UIEventLobby_Enter4-2 = "They say that good times are fleeting, but..."
20030-CVGroup_UIEventLobby_Enter4-3 = "...memories are forever."
20030-CVGroup_UIEventLobby_Enter5-1 = "How are you holding up, Sensei? I've finished my conquest of the food stalls..."
20030-CVGroup_UIEventLobby_Idle1-1 = "I don't gain weight easily, but I also can't eat much, so..."
20030-CVGroup_UIEventLobby_Idle1-2 = "I'm always filled with regret about the food I couldn't try."
20030-CVGroup_UIEventLobby_Idle2-1 = "I need to move my body for a bit."
20030-CVGroup_UIEventLobby_Idle2-2 = "Would it be okay if I join the race? The bread-eating race, that is."
20030-CVGroup_UIEventLobby_Idle3-1 = "The Kivotos Halo Festival street stalls are like a culinary exhibition!"
20030-CVGroup_UIEventLobby_Idle3-2 = "I'm convinced I'll find the ultimate flavor here somewhere...!"
20030-CVGroup_UIEventLobby_Idle4-1 = "Sensei... Will you take a walk with me?"
20030-CVGroup_UIEventLobby_Idle4-2 = "...It's nice to have a different outfit for a change."

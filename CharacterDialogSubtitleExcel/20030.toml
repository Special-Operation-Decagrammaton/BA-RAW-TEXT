[translation]
20030-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20030-CVGroup_CharacterGet_Idle1-1 = "การออกกำลังกาย... และฤดูกาลแห่งอาหาร! มหกรรมของอร่อย...\nคงต้องไปร่วมเพลิดเพลินกับช่วงเวลาที่หายากแบบนี้แล้วละค่ะ"
20030-CVGroup_Cafe_Idle1-1 = "เอาละ ออกเดินทางไปค้นหาอาหารรสเลิศกันเถอะค่ะ"
20030-CVGroup_Cafe_Idle2-1 = "ถ้างั้นเราจะเริ่มต้นจากที่ไหนกันดีคะ...?"
20030-CVGroup_Cafe_Idle3-1 = "การกินอาหาร... เป็นการกระทำที่ประเสิรฐที่สุด"
20030-CVGroup_Cafe_Idle4-1 = "การกินอาหารให้เหมาะสมเป็นสิ่งจำเป็น\nในการเพิ่มประสิทธิภาพการออกกำลังกายค่ะ"
20030-CVGroup_Cafe_Idle5-1 = "ถ้าพักเสร็จแล้ว เราไปสำรวจร้านแผงลอยกันมั้ยคะ?"
20030-CVGroup_WeaponGet_Idle1-1 = "ฉันจะทุ่มเทสุดความสามารถค่ะ\nเพื่อทำประโยชน์ให้กับคุณครู\nตอบแทนที่ให้ความสนใจฉันเช่นนี้ค่ะ"
20030-CVGroup_UIEventLobby_Enter1-1 = "<ฮาโลเฟสติวัล>... วันแห่งการเริ่มต้นเส้นทาง\nแห่งอาหารเลิศรสครั้งใหม่\nมาถึงแล้วสินะคะ"
20030-CVGroup_UIEventLobby_Enter2-1 = "มาแล้วเหรอคะคุณครู"
20030-CVGroup_UIEventLobby_Enter2-2 = "ถ้างั้นตั้งแต่นี้คุณครูกับฉัน..."
20030-CVGroup_UIEventLobby_Enter2-3 = "เรามาลองทำชาเลนจ์\nพิชิตร้านอาหารแผงลอยกันมั้ยคะ?"
20030-CVGroup_UIEventLobby_Enter3-1 = "ฮุฮุฮุ คุณครู... สนุกหรือเปล่าคะ?"
20030-CVGroup_UIEventLobby_Enter3-2 = "ฉันกำลังสนุกสุดๆ แบบอดใจไม่อยู่เลยละค่ะ"
20030-CVGroup_UIEventLobby_Enter4-1 = "งาน <ฮาโลเฟสติวัล> ครั้งนี้ใกล้จบลงแล้ว..."
20030-CVGroup_UIEventLobby_Enter4-2 = "เวลาแสนสนุกผ่านไป เพียงแค่พริบตาเท่านั้น..."
20030-CVGroup_UIEventLobby_Enter4-3 = "เหลือเพียงแค่ความทรงจำเท่านั้นสินะคะ"
20030-CVGroup_UIEventLobby_Enter5-1 = "สบายดีหรือเปล่าคะ คุณครู\nถ้าเรื่องพิชิตร้านแผงลอยละก็ ฉันทำสำเร็จแล้วละค่ะ"
20030-CVGroup_UIEventLobby_Idle1-1 = "ฉันเป็นพวกกินเท่าไรก็ไม่ค่อยอ้วนน่ะค่ะ\nแต่ว่าฉันกินได้ไม่เยอะหรอกนะคะ..."
20030-CVGroup_UIEventLobby_Idle1-2 = "ไม่ว่ายังไง ก็รู้สึกเสียดายอยู่ดีค่ะ"
20030-CVGroup_UIEventLobby_Idle2-1 = "ยังรู้สึกอยากขยับร่างกายต่ออีกสักหน่อยน่ะค่ะ"
20030-CVGroup_UIEventLobby_Idle2-2 = "ฉันร่วมแข่งกินขนมปังด้วยได้หรือเปล่าคะ?"
20030-CVGroup_UIEventLobby_Idle3-1 = "ร้านแผงลอยใน <ฮาโลเฟสติวัล>\nก็เหมือนกับงาน 'นิทรรศการอาหารเลิศรส' เลยละค่ะ~"
20030-CVGroup_UIEventLobby_Idle3-2 = "อ่า... รสชาติที่ล้ำลึกจะต้องอยู่ที่นั่นไม่ผิดแน่...!"
20030-CVGroup_UIEventLobby_Idle4-1 = "คุณครู... ไปเดินดูด้วยกันสักหน่อยมั้ยคะ?"
20030-CVGroup_UIEventLobby_Idle4-2 = "นานๆ ทีได้ใส่ชุดที่ต่างจากปกติก็ดีเหมือนกันนะคะ"

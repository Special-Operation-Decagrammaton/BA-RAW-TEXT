[translation]
13009-CVGroup_UITitle_Idle1-1 = "블루… 아카이브……"
13009-CVGroup_CharacterGet_Idle1-1 = "꿈인 줄 알았어. 지금 이 순간이… 안녕. 선생님. 앞으로 잘 부탁해."
13009-CVGroup_Cafe_Idle1-1 = "왠지 잠이 올 것처럼 편안한 공간이네~"
13009-CVGroup_Cafe_Idle2-1 = "꿈을 꾸는 기분이 들어. 어째설까?"
13009-CVGroup_Cafe_Idle3-1 = "우하하하하! 아… 웃으니까 졸리다."
13009-CVGroup_Cafe_Idle4-1 = "우와~ 여기라면 푹 쉴 수 있을 것 같아~"
13009-CVGroup_Cafe_Idle5-1 = "우후후훗. 새로운 베개가 도착할 거야. 너무 기대돼."
13009-CVGroup_Cafe_Idle6-1 = "아하하하! 바, 방금…! 꿈에… 선생님이… 아 진짜 너무 웃겨 아하하"
13009-CVGroup_Cafe_Idle7-1 = "아하하하! 아 잘 잤다! 응? 이런 모습 처음 본다고?"
13009-CVGroup_WeaponGet_Idle1-1 = "이 무기는… 꿈인가… 그토록 바랬던 일이, 이루어졌네."

[translation]
13009-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……"
13009-CVGroup_CharacterGet_Idle1-1 = "我以為是夢的，這個瞬間…\n你好，老師。今後請你多多指教囉。"
13009-CVGroup_Cafe_Idle1-1 = "總覺得這裡是個\n會讓人想睡覺的悠閒空間呢～"
13009-CVGroup_Cafe_Idle2-1 = "感覺像在做夢一樣。\n為什麼呢？"
13009-CVGroup_Cafe_Idle3-1 = "啊哈哈！\n啊──…\n一笑就想睡了。"
13009-CVGroup_Cafe_Idle4-1 = "哇～這裡的話\n好像能好好休息～"
13009-CVGroup_Cafe_Idle5-1 = "呵呵呵。\n新的枕頭送來囉。\n太令人期待了。"
13009-CVGroup_Cafe_Idle6-1 = "啊哈哈哈！剛，剛才…！\n夢裡的…老師…啊～不行，真的太有趣了！啊哈哈。"
13009-CVGroup_Cafe_Idle7-1 = "啊哈哈哈！啊～睡得好飽！\n嗯？第一次看到這副模樣？"
13009-CVGroup_WeaponGet_Idle1-1 = "這個武器是……我在做夢嗎……\n一直期盼著的事，成真了。"

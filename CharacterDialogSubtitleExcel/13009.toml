[translation]
13009-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
13009-CVGroup_CharacterGet_Idle1-1 = "ความรู้สึกนี้...คิดว่าฝันไปซะอีก\nสวัสดีคุณครู ฝากตัวด้วยนะ"
13009-CVGroup_Cafe_Idle1-1 = "ที่นี่ดูผ่อนคลายจังเลย ฉันชักจะง่วงแล้วสิ~"
13009-CVGroup_Cafe_Idle2-1 = "รู้สึกเหมือนฝันอยู่เลย ทำไมนะ?"
13009-CVGroup_Cafe_Idle3-1 = "อะฮ่าฮ่าฮ่า! ฮ้าวว~ หัวเราะจนง่วงเลย"
13009-CVGroup_Cafe_Idle4-1 = "ว้าว~ ถ้าเป็นที่แบบนี้ละก็ ฉันนอนหลับปุ๋ยได้เลยล่ะ~"
13009-CVGroup_Cafe_Idle5-1 = "ฮุฮุฮุฮุ ฉันสั่งหมอนใบใหม่ไปล่ะ รอไม่ไหวแล้ว"
13009-CVGroup_Cafe_Idle6-1 = "อะฮ่ะฮ่า! เมื่อกี้เจอคุณครู... ในความฝันด้วยล่ะ... ตลกที่สุดเลย ฮ่ะฮ่ะฮ่าา"
13009-CVGroup_Cafe_Idle7-1 = "อะฮ่ะฮ่า! ได้นอนเต็มอิ่มเลย\nว่าไงนะ? ไม่เคยเห็นอะไรแบบนี้มาก่อนเหรอ?"
13009-CVGroup_WeaponGet_Idle1-1 = "อาวุธนี่... ฝันรึเปล่านะ...\nความปรารถนาของฉัน... เป็นจริงแล้วสินะ"

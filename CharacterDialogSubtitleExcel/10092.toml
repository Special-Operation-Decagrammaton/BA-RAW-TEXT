[translation]
10092-CVGroup_UITitle_Idle1-1 = "Blue Archive!!"
10092-CVGroup_CharacterGet_Idle1-1 = "Look forward to it, if you want— No! You should look forward to it...to my performance!"
10092-CVGroup_Cafe_Idle1-1 = "Pretty big... Maybe it'd be good for a performance."
10092-CVGroup_Cafe_Idle2-1 = "I wanted to get some practice done, but there's too many people..."
10092-CVGroup_Cafe_Idle3-1 = "I've got a craving. Is there anything sweet anywhere around here?"
10092-CVGroup_Cafe_Idle4-1 = "Maybe I'll rest for a little..."
10092-CVGroup_Cafe_Idle5-1 = "Wait. Weren't we supposed to meet up here?"
10092-CVGroup_WeaponGet_Idle1-1 = "Sensei is always Sensei, no matter the situation. That's how it is. But you can always...just call me if you need me. I'll be there!"
10092-CVGroup_UIEventLobby_Enter1-1 = "You're late, Sensei! C'mon, hurry!"
10092-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei! Here, over here!"
10092-CVGroup_UIEventLobby_Enter3-1 = "The performance already started! Follow me!"
10092-CVGroup_UIEventLobby_Enter4-1 = "Is it the climax? I've got it!"
10092-CVGroup_UIEventLobby_Enter5-1 = "Phew. That was pretty refreshing. Don't you think so, Sensei?"
10092-CVGroup_UIEventLobby_Idle1-1 = "Ah, wh-what are you doing?! Use your words, your words!"
10092-CVGroup_UIEventLobby_Idle2-1 = "Stop messing with me! I'm gonna get pissed!"
10092-CVGroup_UIEventLobby_Idle3-1 = "Huh? You called?"
10092-CVGroup_UIEventLobby_Idle4-1 = "Do you wanna hold the guitar? Here."
10092-CVGroup_UIEventShop_Enter1-1 = "Okay, okay! There's no time! Just take it already!"
10092-CVGroup_UIEventShop_Enter2-1 = "Ah! Sensei! Here, over here!"
10092-CVGroup_UIEventShop_Enter3-1 = "It'd be a waste to leave it behind, right?"
10092-CVGroup_UIEventShop_Enter3-2 = "Take everything you can."
10092-CVGroup_UIEventShop_Idle1-1 = "Wh-What's wrong?! You scared me!"
10092-CVGroup_UIEventShop_Idle2-1 = "Stop messing around! You keep surprising me!"
10092-CVGroup_UIEventShop_Buy1-1 = "Hm? Not bad, right?"
10092-CVGroup_UIEventShop_Buy2-1 = "Not a bad choice."
10092-CVGroup_UIEventShop_Buy3-1 = "Pretty good. I was aiming for that too."
10092-CVGroup_UIEventShop_Buy4-1 = "Is that what you're going with? 'Kay."

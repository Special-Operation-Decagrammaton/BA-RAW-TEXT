[translation]
10092-CVGroup_UITitle_Idle1-1 = "Blue Archive~!!"
10092-CVGroup_CharacterGet_Idle1-1 = "จะตั้งตารอก็ได้นะ... ไม่สิ ตั้งตารอหน่อยนะ!\nการเล่นกีตาร์ของฉันน่ะ!!"
10092-CVGroup_Cafe_Idle1-1 = "กว้างจังเลยนะ... เหมาะกับการเล่นดนตรีเลย"
10092-CVGroup_Cafe_Idle2-1 = "ว่าจะซ้อมสักหน่อย แต่คนเยอะจัง..."
10092-CVGroup_Cafe_Idle3-1 = "หิวจัง มีอะไรหวานๆ มั้ย?"
10092-CVGroup_Cafe_Idle4-1 = "พักหน่อยดีมั้ยนะ..."
10092-CVGroup_Cafe_Idle5-1 = "เอ๋? ไม่ได้บอกว่า จะมาเจอกันที่นี่หรอกเหรอ?"
10092-CVGroup_WeaponGet_Idle1-1 = "คุณครูเป็นคุณครูในทุกๆ สถานการณ์เลยสินะ... นั่นสินะ\nฉันเองก็คงเป็นเหมือนกันไม่ว่าในสถานการณ์ไหน...\nถ้าต้องการอะไรก็เรียกนะ! ฉันจะไปหา!"
10092-CVGroup_UIEventLobby_Enter1-1 = "มาช้านะคุณครู! รีบไปกันเถอะ!"
10092-CVGroup_UIEventLobby_Enter2-1 = "อ๊ะ คุณครู! ทางนี้ ทางนี้!"
10092-CVGroup_UIEventLobby_Enter3-1 = "การแสดงดนตรีเริ่มแล้ว! ตามมาเลย!"
10092-CVGroup_UIEventLobby_Enter4-1 = "ไคลแมกซ์งั้นเหรอ? วางใจได้เลย!"
10092-CVGroup_UIEventLobby_Enter5-1 = "เฮ้อ โล่งจัง ว่ามั้ยคุณครู?"
10092-CVGroup_UIEventLobby_Idle1-1 = "อ๊ะ ทะ... ทำอะไรน่ะ!? ก็บอกกันสิ บอกมา!"
10092-CVGroup_UIEventLobby_Idle2-1 = "เลิกแกล้งกันได้แล้ว...! เดี๋ยวฉันโกรธนะ!!"
10092-CVGroup_UIEventLobby_Idle3-1 = "หืม? เรียกฉันเหรอ...?"
10092-CVGroup_UIEventLobby_Idle4-1 = "อยากลองจับกีตาร์เหรอ? รับไปสิ"
10092-CVGroup_UIEventShop_Enter1-1 = "เอาละๆ! ฉันไม่มีเวลานะ! รีบเอาไปสิ!"
10092-CVGroup_UIEventShop_Enter2-1 = "อ๊ะ! คุณครู! ทางนี้ ทางนี้!"
10092-CVGroup_UIEventShop_Enter3-1 = "ถ้าเหลือทิ้งไว้ก็เสียดายแย่"
10092-CVGroup_UIEventShop_Enter3-2 = "เอาไปให้เยอะๆ เลยนะ"
10092-CVGroup_UIEventShop_Idle1-1 = "อะ... อะไรเนี่ย!? ตกใจหมดเลย!"
10092-CVGroup_UIEventShop_Idle2-1 = "บอกให้เลิกแกล้งกันไง! ฉันตกใจนะ!!"
10092-CVGroup_UIEventShop_Buy1-1 = "ฮึ่ม~? มันก็ดีไม่ใช่เหรอ?"
10092-CVGroup_UIEventShop_Buy2-1 = "เลือกได้ไม่เลวเลยนี่"
10092-CVGroup_UIEventShop_Buy3-1 = "ไม่เลวเลยนะ ฉันเองก็เล็งอันนั้นอยู่เหมือนกัน"
10092-CVGroup_UIEventShop_Buy4-1 = "จะเอาอันนั้นไปเหรอ? โอเค"

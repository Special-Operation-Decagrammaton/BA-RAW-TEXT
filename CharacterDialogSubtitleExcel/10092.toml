[translation]
10092-CVGroup_UITitle_Idle1-1 = "블루 아카이브~!!"
10092-CVGroup_CharacterGet_Idle1-1 = "기대해도 좋아…. 아니 기대해! 나의 연주!!"
10092-CVGroup_Cafe_Idle1-1 = "꽤 넓네… 연주하기 좋을지도."
10092-CVGroup_Cafe_Idle2-1 = "연습 좀 하려고 했더니, 사람이 많아…."
10092-CVGroup_Cafe_Idle3-1 = "출출하네, 어디 단 것 좀 없나?"
10092-CVGroup_Cafe_Idle4-1 = "조금 쉴까…."
10092-CVGroup_Cafe_Idle5-1 = "어라. 여기서 모인다고 하지 않았나?"
10092-CVGroup_WeaponGet_Idle1-1 = "어떤 상황에서도 선생님은 선생님이구나….\n그러네. 나도 마찬가지겠지?\n어떤 상황에서도…. 필요하면 부르라고! 내가 갈 테니까!"
10092-CVGroup_UIEventLobby_Enter1-1 = "늦었잖아, 선생님! 빨리 가자!"
10092-CVGroup_UIEventLobby_Enter2-1 = "아, 선생님! 여기야, 여기!"
10092-CVGroup_UIEventLobby_Enter3-1 = "연주가 시작됐어! 따라와!"
10092-CVGroup_UIEventLobby_Enter4-1 = "클라이막스인가? 맡겨둬!"
10092-CVGroup_UIEventLobby_Enter5-1 = "하아, 개운했다. 그치, 선생님?"
10092-CVGroup_UIEventLobby_Idle1-1 = "아, 뭐, 뭐 하는 거야!? 말로 하라고, 말로!"
10092-CVGroup_UIEventLobby_Idle2-1 = "장난 그만 쳐……! 화낼 거야!!"
10092-CVGroup_UIEventLobby_Idle3-1 = "응? …….불렀어?"
10092-CVGroup_UIEventLobby_Idle4-1 = "기타 만져보고 싶어? 자."
10092-CVGroup_UIEventShop_Enter1-1 = "자, 자! 시간 없어! 얼른 가져가!"
10092-CVGroup_UIEventShop_Enter2-1 = "아! 선생님! 여기야, 여기!"
10092-CVGroup_UIEventShop_Enter3-1 = "남기고 가는 거 아깝지?"
10092-CVGroup_UIEventShop_Enter3-2 = "최대한 챙겨가."
10092-CVGroup_UIEventShop_Idle1-1 = "뭐, 뭐야!? 깜짝 놀랐잖아!"
10092-CVGroup_UIEventShop_Idle2-1 = "장난은 그만하라고! 놀랐잖아!!"
10092-CVGroup_UIEventShop_Buy1-1 = "흐응~? 괜찮지 않아?"
10092-CVGroup_UIEventShop_Buy2-1 = "나쁘지 않은 선택이네."
10092-CVGroup_UIEventShop_Buy3-1 = "괜찮네. 나도 그거 노리고 있었거든."
10092-CVGroup_UIEventShop_Buy4-1 = "그걸로 가는 거야? 오케이-."

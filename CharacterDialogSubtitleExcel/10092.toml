[translation]
10092-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！！"
10092-CVGroup_CharacterGet_Idle1-1 = "你可以期待……\n不，好好期待吧！我的演奏！！"
10092-CVGroup_Cafe_Idle1-1 = "挺寬敞的呢……\n好像很適合演奏。"
10092-CVGroup_Cafe_Idle2-1 = "本來想練習一下的，人好多……"
10092-CVGroup_Cafe_Idle3-1 = "肚子餓了，\n有沒有甜食？"
10092-CVGroup_Cafe_Idle4-1 = "要不要休息一下呢……"
10092-CVGroup_Cafe_Idle5-1 = "奇怪。不是說在這裡集合嗎？"
10092-CVGroup_WeaponGet_Idle1-1 = "不管情況如何，老師就是老師呢……\n原來如此，我也是一樣的吧？\n無論是什麼情況……有需要的話就叫我吧！我會過去的！"
10092-CVGroup_UIEventLobby_Enter1-1 = "你好慢唷，老師！快走吧！"
10092-CVGroup_UIEventLobby_Enter2-1 = "啊，老師！這邊啦，這邊！"
10092-CVGroup_UIEventLobby_Enter3-1 = "演奏已經開始囉！跟我來！"
10092-CVGroup_UIEventLobby_Enter4-1 = "你說高潮嗎？交給我！"
10092-CVGroup_UIEventLobby_Enter5-1 = "呼，真爽快。是吧，老師？"
10092-CVGroup_UIEventLobby_Idle1-1 = "啊，怎，怎麼了啦！？\n用講的啦，用講的！"
10092-CVGroup_UIEventLobby_Idle2-1 = "再捉弄我的話……！\n我要生氣囉！！"
10092-CVGroup_UIEventLobby_Idle3-1 = "嗯？\n……叫我嗎？"
10092-CVGroup_UIEventLobby_Idle4-1 = "想試試吉他嗎？來。"
10092-CVGroup_UIEventShop_Enter1-1 = "好了，好了！沒時間了！\n快拿去吧！"
10092-CVGroup_UIEventShop_Enter2-1 = "啊，老師！這邊啦，這邊！"
10092-CVGroup_UIEventShop_Enter3-1 = "留著也可惜對吧？"
10092-CVGroup_UIEventShop_Enter3-2 = "儘量把能拿走的拿走吧。"
10092-CVGroup_UIEventShop_Idle1-1 = "做，做什麼啦！？\n害我嚇了一跳！"
10092-CVGroup_UIEventShop_Idle2-1 = "就說別再捉弄我了！\n會害我嚇到！！"
10092-CVGroup_UIEventShop_Buy1-1 = "哼～嗯？\n還不錯嘛？"
10092-CVGroup_UIEventShop_Buy2-1 = "不錯的選擇呢。"
10092-CVGroup_UIEventShop_Buy3-1 = "不錯嘛。\n我也看上了那個。"
10092-CVGroup_UIEventShop_Buy4-1 = "就決定是它了嗎？OK。"

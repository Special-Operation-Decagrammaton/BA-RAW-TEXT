[translation]
20048-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案。"
20048-CVGroup_CharacterGet_Idle1-1 = "貴安，老師。\n祈望這次的休息，能夠平靜安寧地進行。"
20048-CVGroup_Cafe_Idle1-1 = "（有點……想躺下來呢……）"
20048-CVGroup_Cafe_Idle2-1 = "大家都很自由呢……"
20048-CVGroup_Cafe_Idle3-1 = "是個會有微風拂過，相當棒的地方呢。"
20048-CVGroup_Cafe_Idle4-1 = "這個室內擺設……\n似乎能成為內部裝修的良好參考呢。"
20048-CVGroup_Cafe_Idle5-1 = "咖啡……趁這個機會來嘗試看看吧。"
20048-CVGroup_WeaponGet_Idle1-1 = "雖然是把小型的手槍……但它所肩負的責任卻絕對不輕。\n為了不被這份重量壓垮，還請您守望著我。"
20048-CVGroup_UIEventLobby_Enter1-1 = "老師，歡迎您的到來。\n這邊請坐。"
20048-CVGroup_UIEventLobby_Enter2-1 = "想要不著痕跡地偷懶是需要技術的。"
20048-CVGroup_UIEventLobby_Enter2-2 = "呵呵……我告訴您訣竅吧？"
20048-CVGroup_UIEventLobby_Enter3-1 = "留下的工作讓人有點擔心……"
20048-CVGroup_UIEventLobby_Enter3-2 = "希望都有在順利進行……"
20048-CVGroup_UIEventLobby_Enter4-1 = "各種事件接連不斷呢……"
20048-CVGroup_UIEventLobby_Enter4-2 = "如果只是場惡夢就好了……"
20048-CVGroup_UIEventLobby_Enter5-1 = "已經到回去的時間了嗎。"
20048-CVGroup_UIEventLobby_Enter5-2 = "在這裡發生的事，有朝一日也會變成美好的回憶吧。"
20048-CVGroup_UIEventLobby_Idle1-1 = "有什麼事嗎？"
20048-CVGroup_UIEventLobby_Idle2-1 = "天氣真熱呢……"
20048-CVGroup_UIEventLobby_Idle2-2 = "請人準備一些冰涼的飲料吧。"
20048-CVGroup_UIEventLobby_Idle2-3 = "當然，是冰紅茶以外的種類。"
20048-CVGroup_UIEventLobby_Idle3-1 = "哎呀老師，您對這本書有興趣嗎？"
20048-CVGroup_UIEventLobby_Idle4-1 = "老師，在那邊的話皮膚會曬傷的。"
20048-CVGroup_UIEventLobby_Idle4-2 = "請到這邊來。\n陽傘底下很涼快唷。"
20048-CVGroup_UIEventShop_Enter1-1 = "還請慢慢參觀。"
20048-CVGroup_UIEventShop_Enter1-2 = "庫存準備得十分充足。"
20048-CVGroup_UIEventShop_Enter2-1 = "畢竟，這還是我第一次看店。"
20048-CVGroup_UIEventShop_Enter2-2 = "希望您……多多包涵。"
20048-CVGroup_UIEventShop_Enter3-1 = "購物，您還滿意嗎？"
20048-CVGroup_UIEventShop_Enter3-2 = "那麼，差不多該回去了，老師。"
20048-CVGroup_UIEventShop_Idle1-1 = "接待客人，其實也算是交涉的一種……？"
20048-CVGroup_UIEventShop_Idle1-2 = "原來如此，聽您這麼說，緊張感好像稍微緩解了。"
20048-CVGroup_UIEventShop_Idle2-1 = "接待、結帳、陳列……"
20048-CVGroup_UIEventShop_Idle2-2 = "業務範圍比想像中還要廣泛呢。"
20048-CVGroup_UIEventShop_Buy1-1 = "您真有眼光呢，老師。"
20048-CVGroup_UIEventShop_Buy2-1 = "請稍等。我來為您包裝。"
20048-CVGroup_UIEventShop_Buy3-1 = "咦！？我想要的東西……？"
20048-CVGroup_UIEventShop_Buy3-2 = "呵呵，那我就收下您的心意吧。"
20048-CVGroup_UIEventShop_Buy4-1 = "呵呵，感覺已經掌握看店的訣竅了。"

[translation]
20048-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브."
20048-CVGroup_CharacterGet_Idle1-1 = "오셨군요, 선생님. 모쪼록 평안한 휴양이 되길 바랍니다."
20048-CVGroup_Cafe_Idle1-1 = "(어디 누울 만한 의자가 없을까요…….)"
20048-CVGroup_Cafe_Idle2-1 = "오늘만큼은 조금 게으름을 피워도 괜찮겠죠……?"
20048-CVGroup_Cafe_Idle3-1 = "쾌적하군요…… 바닷바람만큼은 아니지만."
20048-CVGroup_Cafe_Idle4-1 = "티파티의 인테리어에 참고할 만하겠어요."
20048-CVGroup_Cafe_Idle5-1 = "선생님을 기다리며, 커피 한잔해 볼까요."
20048-CVGroup_WeaponGet_Idle1-1 = "작고 가벼운 총이지만, 이것이 상징하는 책임의 무게는 절대 가볍지 않다는 것.\n그것만큼은 확실히 인지하고 있습니다.\n그러니 지켜봐 주세요, 선생님."
20048-CVGroup_UIEventLobby_Enter1-1 = "선생님, 오셨군요. 일단 여기 앉으시죠."
20048-CVGroup_UIEventLobby_Enter2-1 = "게으름에도 요령과 노력이 필요한 법,"
20048-CVGroup_UIEventLobby_Enter2-2 = "후후……. 제가 가르쳐 드리겠습니다."
20048-CVGroup_UIEventLobby_Enter3-1 = "놓고 온 업무들이 자꾸 눈에 밟히네요……"
20048-CVGroup_UIEventLobby_Enter3-2 = "제가 없어도 정말 괜찮은 걸까요……?"
20048-CVGroup_UIEventLobby_Enter4-1 = "뭔가 자꾸 사건이 터지는 것 같은데……"
20048-CVGroup_UIEventLobby_Enter4-2 = "단순히 제 착각이겠죠……?"
20048-CVGroup_UIEventLobby_Enter5-1 = "돌아갈 시간이네요."
20048-CVGroup_UIEventLobby_Enter5-2 = "언젠가 다시, 이곳을 그리워하기 위해서."
20048-CVGroup_UIEventLobby_Idle1-1 = "무슨 일이신가요, 선생님?"
20048-CVGroup_UIEventLobby_Idle2-1 = "덥네요……"
20048-CVGroup_UIEventLobby_Idle2-2 = "찬 음료가 필요하겠어요."
20048-CVGroup_UIEventLobby_Idle2-3 = "으음, 아이스티는 제외하고요."
20048-CVGroup_UIEventLobby_Idle3-1 = "선생님도, 이 책에 관심이 있으신가요?"
20048-CVGroup_UIEventLobby_Idle4-1 = "선생님, 햇살이 조금 따갑죠?"
20048-CVGroup_UIEventLobby_Idle4-2 = "제 파라솔로 들어오시지요."
20048-CVGroup_UIEventShop_Enter1-1 = "천천히 둘러보시지요."
20048-CVGroup_UIEventShop_Enter1-2 = "물건은 충분히 준비되어 있답니다."
20048-CVGroup_UIEventShop_Enter2-1 = "접객은 처음이군요."
20048-CVGroup_UIEventShop_Enter2-2 = "그러니…… 잘 부탁드립니다, 선생님."
20048-CVGroup_UIEventShop_Enter3-1 = "쇼핑은, 만족스러우셨나요?"
20048-CVGroup_UIEventShop_Enter3-2 = "자, 이제 함께 돌아가요, 선생님."
20048-CVGroup_UIEventShop_Idle1-1 = "접객도 일종의 외교라고요……?"
20048-CVGroup_UIEventShop_Idle1-2 = "과연, 그렇게 생각하니 마음이 조금은 편해지네요."
20048-CVGroup_UIEventShop_Idle2-1 = "진열, 계산, 선입선출……"
20048-CVGroup_UIEventShop_Idle2-2 = "익숙한 단어들이 오늘따라 낯설게 느껴지네요."
20048-CVGroup_UIEventShop_Buy1-1 = "탁월한 안목이군요, 선생님."
20048-CVGroup_UIEventShop_Buy2-1 = "잠시만 기다려주세요. 포장해 드리겠습니다."
20048-CVGroup_UIEventShop_Buy3-1 = "엣, 제 것도 고르라고요?"
20048-CVGroup_UIEventShop_Buy3-2 = "후후, 마음만 받도록 하겠습니다."
20048-CVGroup_UIEventShop_Buy4-1 = "후후, 이제 조금은 능숙해졌을까요?"

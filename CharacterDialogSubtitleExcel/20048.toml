[translation]
20048-CVGroup_UITitle_Idle1-1 = "Blue...Archive."
20048-CVGroup_CharacterGet_Idle1-1 = "You've arrived, Sensei. I do hope you have a peaceful vacation."
20048-CVGroup_Cafe_Idle1-1 = "(I wonder if there's a chair I can rest on...)"
20048-CVGroup_Cafe_Idle2-1 = "Would it be okay for me to indulge in a bit of laziness today...?"
20048-CVGroup_Cafe_Idle3-1 = "How pleasant... Although it doesn't measure up to the sea breeze."
20048-CVGroup_Cafe_Idle4-1 = "I will use it as reference for the Tea Party's interior design."
20048-CVGroup_Cafe_Idle5-1 = "I shall enjoy a cup of coffee while I wait for Sensei."
20048-CVGroup_WeaponGet_Idle1-1 = "It's a small and light gun, but the responsibility it represents is a heavy weight. I'm more than aware of this. So please watch over me, Sensei."
20048-CVGroup_UIEventLobby_Enter1-1 = "Sensei, you're here. Please, come sit."
20048-CVGroup_UIEventLobby_Enter2-1 = "There's a certain art to slacking off."
20048-CVGroup_UIEventLobby_Enter2-2 = "Fufu... I'll teach you."
20048-CVGroup_UIEventLobby_Enter3-1 = "I can't stop thinking about my work back at home."
20048-CVGroup_UIEventLobby_Enter3-2 = "Are things running smoothly without me?"
20048-CVGroup_UIEventLobby_Enter4-1 = "There seem to be commotions left and right."
20048-CVGroup_UIEventLobby_Enter4-2 = "It must be in my head, right?"
20048-CVGroup_UIEventLobby_Enter5-1 = "It's time to head back."
20048-CVGroup_UIEventLobby_Enter5-2 = "Until next time..."
20048-CVGroup_UIEventLobby_Idle1-1 = "What is happening, Sensei?"
20048-CVGroup_UIEventLobby_Idle2-1 = "It's hot..."
20048-CVGroup_UIEventLobby_Idle2-2 = "We'll require some cold drinks."
20048-CVGroup_UIEventLobby_Idle2-3 = "Um, besides the iced tea."
20048-CVGroup_UIEventLobby_Idle3-1 = "Sensei, are you also interested in this book?"
20048-CVGroup_UIEventLobby_Idle4-1 = "Sensei, the sun's hot, no?"
20048-CVGroup_UIEventLobby_Idle4-2 = "Come under my parasol."
20048-CVGroup_UIEventShop_Enter1-1 = "Take your time."
20048-CVGroup_UIEventShop_Enter1-2 = "We've prepared plenty of items."
20048-CVGroup_UIEventShop_Enter2-1 = "This is my first time serving customers."
20048-CVGroup_UIEventShop_Enter2-2 = "So... Please be patient with me, Sensei."
20048-CVGroup_UIEventShop_Enter3-1 = "Have you shopped to your heart's content?"
20048-CVGroup_UIEventShop_Enter3-2 = "Now, let's return together, Sensei."
20048-CVGroup_UIEventShop_Idle1-1 = "Hospitality is also a type of diplomacy...?"
20048-CVGroup_UIEventShop_Idle1-2 = "I see. Thinking of it that way puts my mind at ease."
20048-CVGroup_UIEventShop_Idle2-1 = "Stocks, calculations, first in, first out..."
20048-CVGroup_UIEventShop_Idle2-2 = "These familiar words feel strangely unfamiliar today."
20048-CVGroup_UIEventShop_Buy1-1 = "You have a sharp eye, Sensei."
20048-CVGroup_UIEventShop_Buy2-1 = "Please wait a moment. I'll wrap it for you."
20048-CVGroup_UIEventShop_Buy3-1 = "Huh? Pick out something for myself?!"
20048-CVGroup_UIEventShop_Buy3-2 = "Fufu, I appreciate the sentiment, but it's fine."
20048-CVGroup_UIEventShop_Buy4-1 = "Fufu, am I doing a little better now?"

[translation]
16012-CVGroup_UITitle_Idle1-1 = "블루 아카이브~!"
16012-CVGroup_CharacterGet_Idle1-1 = "선생님 새해 복 많이 받아~! 같이 맛있는 거, 찾으러 가자!"
16012-CVGroup_Cafe_Idle1-1 = "멋지……다고 하기 보다는, 재미있을 것 같은 곳이네?"
16012-CVGroup_Cafe_Idle2-1 = "뭔가…. 맛있는 냄새가…."
16012-CVGroup_Cafe_Idle3-1 = "더럽히지 않도록 조심해야지."
16012-CVGroup_Cafe_Idle4-1 = "맛있는 걸 먹으려고 하면 꼭 방해가 들어오는 느낌이 ……"
16012-CVGroup_Cafe_Idle5-1 = "괜찮아, 분명히 클 수 있을거야! 아직 가능성은 있지…?"
16012-CVGroup_WeaponGet_Idle1-1 = "나 강해졌구나….\n…한번만 말할거니까, 제대로 들어!\n그…. 고마워. 다 선생님 덕분이야. 감사하고있어."
16012-CVGroup_UIEventLobby_Enter1-1 = "아, 얏호- 선생님. 왠지 시끄럽네. 보러 가 볼래?"
16012-CVGroup_UIEventLobby_Enter2-1 = "설날은 평소와는 다르게 맛있는 것이 많이 있단 말이지…"
16012-CVGroup_UIEventLobby_Enter2-2 = "생각 없이 돈을 써버리게 돼버려."
16012-CVGroup_UIEventLobby_Idle1-1 = "어? 무슨 일이야, 선생님? 아… 혹시… 나랑 얘기하고 싶었어?"
16012-CVGroup_UIEventLobby_Idle2-1 = "정말, 그렇게 찌르지 마! 모처럼의 기모노가 구겨지잖아."
16012-CVGroup_UIEventLobby_Idle2-2 = "클리닝… 아니 그런 문제가 아니야!"
16012-CVGroup_UIEventLobby_Idle3-1 = "나는 하카마 쪽이 좋으려나…… 움직이기 쉽기도 하고."
16012-CVGroup_UIEventLobby_Idle4-1 = "머리도 땋아 올려 보라고…?"
16012-CVGroup_UIEventLobby_Idle4-2 = "그런 게 나에게 어울릴 리 없고… 됐다고…"
16012-CVGroup_UIEventLobby_Enter3-1 = "왠지 귀찮은 일이 될 것 같은……"
16012-CVGroup_UIEventLobby_Enter3-2 = "내 직감, 안 좋을 때만 맞으니까……"
16012-CVGroup_UIEventLobby_Enter4-1 = "이렇게 될 것 같기는 했는데 말이지……"
16012-CVGroup_UIEventLobby_Enter4-2 = "뭐, 선생님도 같이 있고, 어떻게든 되지 않을까?"
16012-CVGroup_UIEventLobby_Enter5-1 = "아, 지쳤어. 지쳤어. 어떻게든 잘 끝나서 다행이야."
16012-CVGroup_UIEventLobby_Enter5-2 = "오세치도 맛있었고, 배부르게 먹었고!"
16012-CVGroup_UIEventMission_Enter1-1 = "이거 전~부 선생님 일이야? 왠지 힘들 것 같아…"
16012-CVGroup_UIEventMission_Enter1-2 = "뭐, 도움이 필요하면 말해."
16012-CVGroup_UIEventMission_Enter2-1 = "여유를 부리고 있을 상황이 아니야! 자, 힘내. 선생님."
16012-CVGroup_UIEventMission_Idle1-1 = "응? 불렀어? 뭐 사줄거야?"
16012-CVGroup_UIEventMission_Idle1-2 = "후훗, 농담이야."
16012-CVGroup_UIEventMission_Idle2-1 = "시끌벅적한 걸 싫어하는 건 아냐.\n안 그랬다면, 미식연구회 애들이랑 같이 못 다닐 거 아냐?"
16012-CVGroup_UIEventMission_Buy1-1 = "뭐야, 선생님도 하면 할 수 있네."
16012-CVGroup_UIEventMission_Buy1-2 = "후훗. 이런 대사, 말해보고 싶었어."
16012-CVGroup_UIEventMission_Buy2-1 = "나 혼자였다면 불가능했다고 생각해…… 이것이 어른의 힘……"
16012-CVGroup_UIEventMission_Buy2-2 = "꽤 하잖아."
16012-CVGroup_UIEventMission_Interaction1-1 = "오늘 할 일은 이걸로 끝?"
16012-CVGroup_UIEventMission_Interaction1-2 = "그럼 뭔가 맛있는 거 먹으러 가자!"

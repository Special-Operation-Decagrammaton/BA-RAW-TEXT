[translation]
16012-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16012-CVGroup_CharacterGet_Idle1-1 = "Happy New Year, Sensei! Let's go find something delicious!"
16012-CVGroup_Cafe_Idle1-1 = "It's...pretty cool...or maybe fun would be a better description."
16012-CVGroup_Cafe_Idle2-1 = "I smell something mouth-watering..."
16012-CVGroup_Cafe_Idle3-1 = "I should be careful not to get it dirty."
16012-CVGroup_Cafe_Idle4-1 = "I always get interrupted just when I'm about to eat something good..."
16012-CVGroup_Cafe_Idle5-1 = "It's okay, I'm sure I'll grow! There's potential, right...?"
16012-CVGroup_WeaponGet_Idle1-1 = "I've become stronger... I'm only gonna say this once, so listen! Um... Thank you for everything, Sensei. I appreciate it."
16012-CVGroup_UIEventLobby_Enter1-1 = "Oh, you're here, Sensei! It's loud outside. Should we go check it out?"
16012-CVGroup_UIEventLobby_Enter2-1 = "There are lots of extra-delicious foods on New Year's Day..."
16012-CVGroup_UIEventLobby_Enter2-2 = "I always end up spending too much money..."
16012-CVGroup_UIEventLobby_Idle1-1 = "Oh, what's up, Sensei? Oh... Did you wanna talk to me...by any chance?"
16012-CVGroup_UIEventLobby_Idle2-1 = "Seriously, don't poke me like that! You're messing up my kimono."
16012-CVGroup_UIEventLobby_Idle2-2 = "Cleaning it is not the problem!"
16012-CVGroup_UIEventLobby_Idle3-1 = "Hakamas are better... They're way easier to move in."
16012-CVGroup_UIEventLobby_Idle4-1 = "I have to braid up my hair too?!"
16012-CVGroup_UIEventLobby_Idle4-2 = "I can't pull that off! There's no way..."
16012-CVGroup_UIEventLobby_Enter3-1 = "I feel like it'll be really annoying..."
16012-CVGroup_UIEventLobby_Enter3-2 = "When it comes to bad luck...my intuition is dead on..."
16012-CVGroup_UIEventLobby_Enter4-1 = "I had a feeling it would turn out this way..."
16012-CVGroup_UIEventLobby_Enter4-2 = "But since you're with me, Sensei, I'm sure it'll work out somehow."
16012-CVGroup_UIEventLobby_Enter5-1 = "Ugh, I'm so tired. I'm glad everything worked out."
16012-CVGroup_UIEventLobby_Enter5-2 = "That osechi was good! I ate so much!"
16012-CVGroup_UIEventMission_Enter1-1 = "Is all this here for you, Sensei? You've got a lot of work ahead..."
16012-CVGroup_UIEventMission_Enter1-2 = "Well, let me know if you need help."
16012-CVGroup_UIEventMission_Enter2-1 = "Now's not the time to relax! Good luck, Sensei."
16012-CVGroup_UIEventMission_Idle1-1 = "Huh? Did you call?\nAre you gonna buy me something?"
16012-CVGroup_UIEventMission_Idle1-2 = "Heehee. Just kidding."
16012-CVGroup_UIEventMission_Idle2-1 = "It's not that I don't like loud environments. If I didn't, then I wouldn't be able to get along with the Gourmet Research Society."
16012-CVGroup_UIEventMission_Buy1-1 = "See? You can do it, too."
16012-CVGroup_UIEventMission_Buy1-2 = "Heehee. I've always wanted to say that."
16012-CVGroup_UIEventMission_Buy2-1 = "Honestly, I don't think I could've done it myself... Such is the power of an adult..."
16012-CVGroup_UIEventMission_Buy2-2 = "Not bad."
16012-CVGroup_UIEventMission_Interaction1-1 = "Are we done for today?"
16012-CVGroup_UIEventMission_Interaction1-2 = "Then let's go grab something delicious!"

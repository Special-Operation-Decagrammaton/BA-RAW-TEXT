[translation]
16012-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16012-CVGroup_CharacterGet_Idle1-1 = "คุณครู สวัสดีปีใหม่~!\nไปหาของอร่อยๆ กินกันเถอะ!"
16012-CVGroup_Cafe_Idle1-1 = "ที่นี่ดีจังเลยน้า...\nไม่สิ ต้องเรียกว่าน่าสนุก น่าจะเหมาะกว่า?"
16012-CVGroup_Cafe_Idle2-1 = "เหมือนได้กลิ่นของอร่อย..."
16012-CVGroup_Cafe_Idle3-1 = "ต้องระวังไม่ให้ชุดเลอะด้วย"
16012-CVGroup_Cafe_Idle4-1 = "เวลาจะได้กินของอร่อยๆ\nรู้สึกเหมือนจะโดนขัดขวางทุกทีเลย..."
16012-CVGroup_Cafe_Idle5-1 = "ไม่เป็นไร ต้องโตขึ้นกว่านี้ได้อีกแน่ๆ\nยังมีโอกาสอยู่...ใช่มั้ยนะ?"
16012-CVGroup_WeaponGet_Idle1-1 = "ฉันแข็งแกร่งขึ้นแล้วสินะ...\nฉันจะพูดแค่ครั้งเดียวเท่านั้น ตั้งใจฟังให้ดีล่ะ!\nขะ... ขอบคุณนะ ทุกอย่างๆ ที่คุณครูช่วยเลย\nขอบคุณมากๆ เลยนะ"
16012-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ ยะโฮ คุณครู\nข้างนอกเสียงดังกันน่าดูเลย เราออกไปดูด้วยกันมั้ย?"
16012-CVGroup_UIEventLobby_Enter2-1 = "ช่วงวันปีใหม่มีของอร่อยๆ เยอะกว่าวันธรรมดาเยอะเลยนะ..."
16012-CVGroup_UIEventLobby_Enter2-2 = "ดันใช้เงินไป... โดยไม่คิดซะแล้ว"
16012-CVGroup_UIEventLobby_Idle1-1 = "เอ๋? มีเรื่องอะไรเหรอ คุณครู?\nอ๊ะ หรือว่า... อยากคุยกับฉันงั้นเหรอ?"
16012-CVGroup_UIEventLobby_Idle2-1 = "อย่ามาสะกิดกันแบบนั้นสิ!\nไม่ได้ใส่ชุดกิโมโนมาตั้งนานแล้วนี่นา"
16012-CVGroup_UIEventLobby_Idle2-2 = "ค่าซักรีด... ไม่สิ ปัญหามันไม่ใช่เรื่องนั้นสักหน่อย"
16012-CVGroup_UIEventLobby_Idle3-1 = "ฉันเหมาะกับฮากามะมากกว่านะ...\nเคลื่อนไหวสะดวกกว่า"
16012-CVGroup_UIEventLobby_Idle4-1 = "ให้ม้วนผมขึ้นเหรอ...?"
16012-CVGroup_UIEventLobby_Idle4-2 = "ทะ...ทรงผมแบบนั้นไม่เหมาะกับฉันหรอกน่า พอเลยๆ"
16012-CVGroup_UIEventLobby_Enter3-1 = "เหมือนมันชักจะน่ารำคาญขึ้นเรื่อยๆ แล้วนะ..."
16012-CVGroup_UIEventLobby_Enter3-2 = "ลางสังหรณ์เรื่องซวยๆ ของฉันน่ะ...\nแม่นมากเลยนะ..."
16012-CVGroup_UIEventLobby_Enter4-1 = "ก็นะ... คิดอยู่แล้วแหละ\nว่าอาจจะกลายเป็นแบบนี้"
16012-CVGroup_UIEventLobby_Enter4-2 = "แต่ยังไงก็มีคุณครูอยู่ด้วย\nเดี๋ยวก็คงคลี่คลายเองนั่นแหละ"
16012-CVGroup_UIEventLobby_Enter5-1 = "อา... เหนื่อยจัง... เหนื่อยสุดๆ\nสุดท้ายก็จบลงด้วยดี ค่อยยังชั่วหน่อย"
16012-CVGroup_UIEventLobby_Enter5-2 = "โอเซจิก็อร่อยสุดยอด\nกินไปซะพุงกางเลย!"
16012-CVGroup_UIEventMission_Enter1-1 = "นี่เป็นงานของคุณครูหมดเลยเหรอ?\nดูน่าจะเหนื่อยนะ..."
16012-CVGroup_UIEventMission_Enter1-2 = "ก็นะ... ถ้าอยากให้ช่วยก็บอกล่ะ"
16012-CVGroup_UIEventMission_Enter2-1 = "ดูท่าจะไม่มีเวลาให้พักเลยแฮะ\nพยายามเข้านะ คุณครู"
16012-CVGroup_UIEventMission_Idle1-1 = "หืม? เรียกฉันเหรอ?\nจะซื้ออะไรให้เหรอไง?"
16012-CVGroup_UIEventMission_Idle1-2 = "ฮิฮิ ล้อเล่นน่า"
16012-CVGroup_UIEventMission_Idle2-1 = "ฉันไม่ได้ไม่ชอบเสียงดังหรอก ถ้าไม่งั้นคงจะอยู่รวมกับ\nพวกสมาชิกชมรมชิมอาหารไม่ได้กันพอดีน่ะสิ?"
16012-CVGroup_UIEventMission_Buy1-1 = "อะไรน่ะ ถ้าเป็นคุณครูละก็ทำได้แน่ๆ"
16012-CVGroup_UIEventMission_Buy1-2 = "ฮุฮุ ฉันอยากลองพูดแบบนี้มานานแล้ว"
16012-CVGroup_UIEventMission_Buy2-1 = "ถ้าให้ฉันทำคนเดียวคงทำไม่ได้แน่ๆ\nนี่สินะ พลังของผู้ใหญ่..."
16012-CVGroup_UIEventMission_Buy2-2 = "ไม่เลวเลยนี่นา"
16012-CVGroup_UIEventMission_Interaction1-1 = "งานวันนี้เสร็จแล้วงั้นเหรอ?"
16012-CVGroup_UIEventMission_Interaction1-2 = "ถ้างั้นไปหาอะไรอร่อยๆ\nกินด้วยกันเถอะ!"

[translation]
16012-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16012-CVGroup_CharacterGet_Idle1-1 = "老師，新年快樂～！\n一起去尋找美味的東西吧！"
16012-CVGroup_Cafe_Idle1-1 = "真棒……與其這麼說，\n應該說是有趣的地方呢？"
16012-CVGroup_Cafe_Idle2-1 = "總覺得……\n有股好吃的味道……"
16012-CVGroup_Cafe_Idle3-1 = "得小心別弄髒才行。"
16012-CVGroup_Cafe_Idle4-1 = "每當我想吃美食的時候，感覺總是會被妨礙……"
16012-CVGroup_Cafe_Idle5-1 = "沒關係，一定會長大的！\n應該還有可能性吧……？"
16012-CVGroup_WeaponGet_Idle1-1 = "我，變強了呢……\n……我只說一次，要仔細聽唷！\n那個……謝謝你。全部，都是多虧了老師。我很感謝。"
16012-CVGroup_UIEventLobby_Enter1-1 = "啊，呀齁～老師。\n感覺很熱鬧呢。要一起去看看嗎？"
16012-CVGroup_UIEventLobby_Enter2-1 = "新年的時候有很多和平時不一樣的美食呢…"
16012-CVGroup_UIEventLobby_Enter2-2 = "不知不覺就把錢花掉了。"
16012-CVGroup_UIEventLobby_Idle1-1 = "哦？怎麼了嗎，老師？\n啊，難道……你想和我說話？"
16012-CVGroup_UIEventLobby_Idle2-1 = "真是的，別那樣戳我！難得的和服會亂掉啦。"
16012-CVGroup_UIEventLobby_Idle2-2 = "清洗……不，不是那個問題！"
16012-CVGroup_UIEventLobby_Idle3-1 = "我可能更喜歡褶裙吧……畢竟活動起來很方便。"
16012-CVGroup_UIEventLobby_Idle4-1 = "問我要不要把頭髮往上紮…？"
16012-CVGroup_UIEventLobby_Idle4-2 = "那種髮型又不適合我……真的好嗎……"
16012-CVGroup_UIEventLobby_Enter3-1 = "總覺得事情好像會變得很麻煩……"
16012-CVGroup_UIEventLobby_Enter3-2 = "我的直覺，總是只有在不好的時候才會中……"
16012-CVGroup_UIEventLobby_Enter4-1 = "雖然有預感會變成這樣……"
16012-CVGroup_UIEventLobby_Enter4-2 = "不過，和老師一起總會有辦法的吧？"
16012-CVGroup_UIEventLobby_Enter5-1 = "哈啊～累了累了。\n總算是順利結束，太好了。"
16012-CVGroup_UIEventLobby_Enter5-2 = "御節料理很好吃，又有飽餐一頓！"
16012-CVGroup_UIEventMission_Enter1-1 = "這些，全～都是老師要做的嗎？\n總覺得很辛苦…"
16012-CVGroup_UIEventMission_Enter1-2 = "總之，有事的話就說一聲吧。"
16012-CVGroup_UIEventMission_Enter2-1 = "現在不是假裝從容的時候了！\n來，加油吧，老師。"
16012-CVGroup_UIEventMission_Idle1-1 = "嗯？你叫我？要買什麼給我嗎？"
16012-CVGroup_UIEventMission_Idle1-2 = "呵呵，開玩笑的。"
16012-CVGroup_UIEventMission_Idle2-1 = "我並不討厭熱鬧哦。\n不然也不會和美食研究會的大家在一起了吧？"
16012-CVGroup_UIEventMission_Buy1-1 = "什麼嘛，老師也是想做就做得到的嘛。"
16012-CVGroup_UIEventMission_Buy1-2 = "呵呵。這種台詞，我早就想講講看了。"
16012-CVGroup_UIEventMission_Buy2-1 = "如果只靠我一個人，我想應該辦不到……\n這就是大人的力量……"
16012-CVGroup_UIEventMission_Buy2-2 = "挺厲害的嘛。"
16012-CVGroup_UIEventMission_Interaction1-1 = "今天的工作結束了嗎？"
16012-CVGroup_UIEventMission_Interaction1-2 = "那就去吃點好吃的東西吧！"

[translation]
20049-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
20049-CVGroup_CharacterGet_Idle1-1 = "不只熱，還黏黏的……\n所以呢，要做什麼？"
20049-CVGroup_Cafe_Idle1-1 = "好無聊……"
20049-CVGroup_Cafe_Idle2-1 = "（那是……什麼？）"
20049-CVGroup_Cafe_Idle3-1 = "其他人平常都是這樣度過的啊……"
20049-CVGroup_Cafe_Idle4-1 = "就說了，我沒興趣。\n……是真的。"
20049-CVGroup_Cafe_Idle5-1 = "（老師……在做什麼呢）"
20049-CVGroup_WeaponGet_Idle1-1 = "這種地方會用到嗎……\n「武器也要看怎麼用」？\n唉……你可真會說這種話啊。\n知道了……謝謝你。"
20049-CVGroup_UIEventLobby_Enter1-1 = "啊，你來啦。\n啊……嗯，還算有點開心吧。"
20049-CVGroup_UIEventLobby_Enter2-1 = "大海，原來是這種地方啊……"
20049-CVGroup_UIEventLobby_Enter3-1 = "哈啊……想安靜地過。"
20049-CVGroup_UIEventLobby_Enter3-2 = "想想辦法吧，老師。"
20049-CVGroup_UIEventLobby_Enter4-1 = "這個人潮是怎麼回事……\n雖然應該沒有危險。"
20049-CVGroup_UIEventLobby_Enter5-1 = "已經結束了啊……\n……嗯，確實還不錯。\n我承認。不過僅限這次哦。"
20049-CVGroup_UIEventLobby_Idle1-1 = "怎麼了？"
20049-CVGroup_UIEventLobby_Idle1-2 = "不管老師怎麼說，我都沒打算享受。"
20049-CVGroup_UIEventLobby_Idle2-1 = "（……好像比平常新鮮一點）"
20049-CVGroup_UIEventLobby_Idle3-1 = "怎，怎麼了？\n為什麼要戳我啊？\n我又不是布偶……！"
20049-CVGroup_UIEventLobby_Idle4-1 = "……你很閒嗎？要不要去看舞台表演？"
20049-CVGroup_UIEventLobby_Idle4-2 = "我？我沒興趣……\n不過，如果老師要去的話……"
20049-CVGroup_UIEventLobby_Idle4-3 = "我就陪你去吧。"

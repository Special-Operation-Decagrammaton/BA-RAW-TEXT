[translation]
20049-CVGroup_UITitle_Idle1-1 = "블루, 아카이브"
20049-CVGroup_CharacterGet_Idle1-1 = "덥고, 끈적이고…… 그래서, 뭐 할 거야?"
20049-CVGroup_Cafe_Idle1-1 = "지루해……."
20049-CVGroup_Cafe_Idle2-1 = "(저건…… 뭘까?)"
20049-CVGroup_Cafe_Idle3-1 = "남들은 평소에 이렇게 지내는구나……."
20049-CVGroup_Cafe_Idle4-1 = "그러니까, 관심 없다니까. ……진짜로."
20049-CVGroup_Cafe_Idle5-1 = "(선생님…… 뭐 하고 있으려나……)"
20049-CVGroup_WeaponGet_Idle1-1 = "이런 곳에서 쓰려나……. '무기도 사용하기 나름'?\n하아…… 그런 쪽으로 말은 잘하지. 알았어…… 고마워."
20049-CVGroup_UIEventLobby_Enter1-1 = "아, 왔구나. 아- …… 뭐, 나름대로 즐기고 있어."
20049-CVGroup_UIEventLobby_Enter2-1 = "바다는, 이런 곳이구나……."
20049-CVGroup_UIEventLobby_Enter3-1 = "하아…… 조용히 지내고 싶어."
20049-CVGroup_UIEventLobby_Enter3-2 = "어떻게든 해 줘. 선생님."
20049-CVGroup_UIEventLobby_Enter4-1 = "뭐야, 이 인파……. 위험은 없는 것 같지만."
20049-CVGroup_UIEventLobby_Enter5-1 = "끝난 건가…… ……그래. 나쁘지 않았어. 이번만은 인정할게."
20049-CVGroup_UIEventLobby_Idle1-1 = "왜 그래, 선생님."
20049-CVGroup_UIEventLobby_Idle1-2 = "어차피 선생님이 뭐라고 해도, 재미있어 할 생각 없으니까 말이지."
20049-CVGroup_UIEventLobby_Idle2-1 = "(……평소보다, 신선할지도)"
20049-CVGroup_UIEventLobby_Idle3-1 = "뭐, 뭐야? 왜 찌른 거야? 나, 인형이 아니라고……!"
20049-CVGroup_UIEventLobby_Idle4-1 = "……한가해? 야외무대라도 보고 오지 그래?"
20049-CVGroup_UIEventLobby_Idle4-2 = "나? 관심 없는데…… 뭐, 선생님이 가고 싶다면."
20049-CVGroup_UIEventLobby_Idle4-3 = "같이 가 줄 테니까."

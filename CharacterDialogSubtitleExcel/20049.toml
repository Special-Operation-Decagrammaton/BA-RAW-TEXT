[translation]
20049-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20049-CVGroup_CharacterGet_Idle1-1 = "ทั้งร้อน ทั้งเหนียวตัว... แล้วจะทำอะไรต่อล่ะ?"
20049-CVGroup_Cafe_Idle1-1 = "เบื่อจัง..."
20049-CVGroup_Cafe_Idle2-1 = "(นั่น.... อะไรน่ะ?)"
20049-CVGroup_Cafe_Idle3-1 = "ปกติคนอื่นๆ ใช้ชีวิตกันแบบนี้สินะ..."
20049-CVGroup_Cafe_Idle4-1 = "แต่ว่านะ ฉันไม่สนใจหรอก จริงๆ นะ..."
20049-CVGroup_Cafe_Idle5-1 = "(คุณครู... จะทำอะไรอยู่นะ...)"
20049-CVGroup_WeaponGet_Idle1-1 = "จะใช้ในที่แบบนี้ได้มั้ยนะ...\n'อาวุธขึ้นอยู่กับวิธีใช้งาน' งั้นเหรอ?\nเฮ้อ... พูดอะไรแบบนั้นเก่งจังเลยนะ\nเข้าใจแล้ว... ขอบคุณนะ"
20049-CVGroup_UIEventLobby_Enter1-1 = "อ่า มาแล้วเหรอ อ๊ะ... ก็นะ\nฉันก็สนุกในแบบของฉันอยู่"
20049-CVGroup_UIEventLobby_Enter2-1 = "ทะเล... เป็นที่แบบนี้เองสินะ..."
20049-CVGroup_UIEventLobby_Enter3-1 = "เฮ้อ... อยากอยู่เงียบๆ จัง"
20049-CVGroup_UIEventLobby_Enter3-2 = "ทำอะไรสักอย่างหน่อยสิ คุณครู"
20049-CVGroup_UIEventLobby_Enter4-1 = "อะไรเนี่ย ฝูงชนพวกนี้... ถึงจะดูไม่มีพิษมีภัยก็เถอะ"
20049-CVGroup_UIEventLobby_Enter5-1 = "จบแล้วเหรอ... งั้นเหรอ... ก็ไม่ได้แย่เท่าไรนะ\nครั้งนี้ฉันขอยอมรับแล้วกัน"
20049-CVGroup_UIEventLobby_Idle1-1 = "เป็นอะไรล่ะ คุณครู"
20049-CVGroup_UIEventLobby_Idle1-2 = "ไม่ว่าคุณครูจะพูดยังไงก็ตาม\nฉันก็ไม่มีทางคิดว่ามันสนุกหรอกนะ"
20049-CVGroup_UIEventLobby_Idle2-1 = "(แต่อาจจะสดชื่น... กว่าปกตินิดหน่อย)"
20049-CVGroup_UIEventLobby_Idle3-1 = "อะ... อะไรเนี่ย? จู่ๆ มาจิ้มทำไม? ฉันไม่ใช่ตุ๊กตานะ...!"
20049-CVGroup_UIEventLobby_Idle4-1 = "ว่างเหรอ...? ถ้างั้นก็ไปดูการแสดงที่เวทีกลางแจ้งสิ"
20049-CVGroup_UIEventLobby_Idle4-2 = "ฉันเหรอ? ไม่เอาหรอก...\nแต่ก็เอาเถอะ ถ้าคุณครูอยากไปก็ได้อยู่หรอก"
20049-CVGroup_UIEventLobby_Idle4-3 = "ฉันจะไปด้วยเอง"

[translation]
20039-CVGroup_UITitle_Idle1-1 = "블루 아카이브, 로구나."
20039-CVGroup_CharacterGet_Idle1-1 = "산해경 고급중학교, 현룡문의 문주. 류우게 키사키다.\n후후. 나의 힘이 필요한가?"
20039-CVGroup_Cafe_Idle1-1 = "흐음…… 향로를 놓을 자리가 있는가?"
20039-CVGroup_Cafe_Idle2-1 = "(산해경의 바깥이란 참으로…… 다양하구나.)"
20039-CVGroup_Cafe_Idle3-1 = "차 한잔하기에 좋은 곳인 듯한데…"
20039-CVGroup_Cafe_Idle4-1 = "(저것은…… 무엇일까……?)"
20039-CVGroup_Cafe_Idle5-1 = "여기에서는 제법 몸이 편해지는구나."
20039-CVGroup_WeaponGet_Idle1-1 = "고생 많았구나, 선생.\n후후, 내가 할 얘기는 아닐지 모르지만…… 진심으로 감사한다.\n내 모든 것을 걸고, 소중히 하도록 하마."
20039-CVGroup_UIEventLobby_Enter1-1 = "산해경에 온 것을 환영하노라. 선생."
20039-CVGroup_UIEventLobby_Enter1-2 = "월영제를 한껏 만끽하면 좋겠구나."
20039-CVGroup_UIEventLobby_Enter2-1 = "어디를 가야 할지 모르겠다면 이야기해 다오."
20039-CVGroup_UIEventLobby_Enter2-2 = "금방 사람을 붙여 줄 테니 말이다."
20039-CVGroup_UIEventLobby_Enter3-1 = "…일이, 이렇게 될 줄이야…"
20039-CVGroup_UIEventLobby_Enter3-2 = "선생에게는 폐를 끼치는구나."
20039-CVGroup_UIEventLobby_Enter3-3 = "그대만은… 내 곁에 있어 주겠지…?"
20039-CVGroup_UIEventLobby_Enter4-1 = "모든 것은 크게 돌아 자신의 자리로 돌아올 것이니…"
20039-CVGroup_UIEventLobby_Enter4-2 = "이제, 우리의 산해경을 되찾으러 가자."
20039-CVGroup_UIEventLobby_Enter5-1 = "정말 고생 많았다, 선생."
20039-CVGroup_UIEventLobby_Enter5-2 = "현룡문의 문주로서, 그리고 한 명의 학생으로서,"
20039-CVGroup_UIEventLobby_Enter5-3 = "그대에게 진심 어린 경의와, 감사를."
20039-CVGroup_UIEventLobby_Idle1-1 = "월영제에서는 수많은 이야기가 교차한다."
20039-CVGroup_UIEventLobby_Idle1-2 = "후후, 관심이 있다면 이참에 조사해 보는 건 어떤가?"
20039-CVGroup_UIEventLobby_Idle2-1 = "현무상회는, 월영제를 계기로 외부와 교류를 넓히고자 하는 중이지."
20039-CVGroup_UIEventLobby_Idle2-2 = "문주로서 특별히 입장은 표명하지 않았다만…"
20039-CVGroup_UIEventLobby_Idle3-1 = "현룡문과 현무상회, 어느 쪽에 근본적인 잘못이 있는가…"
20039-CVGroup_UIEventLobby_Idle3-2 = "미안하구나, 선생. 문주라고 해도, 알기 힘든 것은 알기 힘든 것이다…"
20039-CVGroup_UIEventLobby_Idle4-1 = "내가 문주로 있는 동안에는, 산해경에서의 안전을 보장하도록 하지."
20039-CVGroup_UIEventLobby_Idle4-2 = "상대가 누구든지 간에 말이다."
20039-CVGroup_UIEventLobby_Idle4-3 = "물론, 선생 역시 마찬가지이고."
20039-CVGroup_UIEventTreasure_Enter1-1 = "당도하였는가. 지금은 말하자면…"
20039-CVGroup_UIEventTreasure_Enter1-2 = "그렇구나. 지금은 보충할 때라고 해야 하려나. 후후."
20039-CVGroup_UIEventTreasure_Enter2-1 = "그대를 위해 작은 여흥을 준비했다."
20039-CVGroup_UIEventTreasure_Enter2-2 = "실컷 즐기도록 하거라."
20039-CVGroup_UIEventTreasure_Enter2-3 = "…하지만, 과식에는 주의하도록 하거라?"
20039-CVGroup_UIEventTreasure_Enter3-1 = "아직은 시간이 남아 있구나."
20039-CVGroup_UIEventTreasure_Enter3-2 = "끝까지, 함께 하도록 하자."
20039-CVGroup_UIEventTreasure_Idle1-1 = "무슨 일인가, 선생?"
20039-CVGroup_UIEventTreasure_Idle1-2 = "흐음? 내가 먼저 맛보았으면 한다?"
20039-CVGroup_UIEventTreasure_Idle1-3 = "그것이 무엇을 의미하는지, 알고 있는가? 후후."
20039-CVGroup_UIEventTreasure_Idle1-4 = "나는 신경 쓰지 않는다만?"
20039-CVGroup_UIEventTreasure_Idle2-1 = "선생도 한 입 들겠는가?"
20039-CVGroup_UIEventTreasure_Idle2-2 = "내가 이미 맛을 보았다. 안심해도 좋을 것이야. 후훗."
20039-CVGroup_UIEventTreasure_FindTreasure1-1 = "월영제의 명물 중 하나는 간식거리지."
20039-CVGroup_UIEventTreasure_FindTreasure1-2 = "그러면, 함께 찾아보도록 할까?"
20039-CVGroup_UIEventTreasure_FindTreasure2-1 = "새로운 것을 알게 되는 것은 좋은 일이다."
20039-CVGroup_UIEventTreasure_FindTreasure2-2 = "그렇지 아니한가?"
20039-CVGroup_UIEventTreasure_GetTreasure1-1 = "단 것을 좋아하는가, 선생?"
20039-CVGroup_UIEventTreasure_GetTreasure1-2 = "나는… 그럭저럭이라고 해야 하겠군."
20039-CVGroup_UIEventTreasure_GetTreasure2-1 = "호오. 흥미롭구나."
20039-CVGroup_UIEventTreasure_GetTreasure2-2 = "내게도 맛보여줄 수 있겠는가?"
20039-CVGroup_UIEventTreasure_RoundRenewal1-1 = "해냈구나, 선생."
20039-CVGroup_UIEventTreasure_RoundRenewal1-2 = "허나 그대라면 만족하지 않을 것이다. 그렇지 않은가?"
20039-CVGroup_UIEventMission_Enter1-1 = "일과, 라는 것인가? …왜 내가 여기 있느냐고?"
20039-CVGroup_UIEventMission_Enter1-2 = "이것도 문주의 의무이기 때문이지 않느냐."
20039-CVGroup_UIEventMission_Enter2-1 = "일신우일신(日新又日新), 이라 하지."
20039-CVGroup_UIEventMission_Enter2-2 = "나날이 새롭게 발전해 가야 한다는 뜻이다."
20039-CVGroup_UIEventMission_Enter2-3 = "도움이 필요하다면, 언제든 손을 빌려주겠다만?"
20039-CVGroup_UIEventMission_Idle1-1 = "왜 그러는가, 선생? 나를 간지럽혀 보고 싶은 것인가?"
20039-CVGroup_UIEventMission_Idle1-2 = "후후. 무엄하구나."
20039-CVGroup_UIEventMission_Idle1-3 = "허나 그런 부분마저 용서하마."
20039-CVGroup_UIEventMission_Idle2-1 = "장난을 걸어오는 것인가?"
20039-CVGroup_UIEventMission_Idle2-2 = "좋다. 얼마든지 허락하마. 나와 선생 사이이지 않느냐."
20039-CVGroup_UIEventMission_Idle2-3 = "…다른 사람들이 있을 때에는, 삼가 다오."
20039-CVGroup_UIEventMission_Buy1-1 = "그래. 그대가 이루어낸 것이다. 사양치 말고 가져가도록 하여라."
20039-CVGroup_UIEventMission_Buy2-1 = "선생은 참으로 성실하구나."
20039-CVGroup_UIEventMission_Buy2-2 = "역시 가능하다면 내 곁에 언제까지나 두고 싶다만…"
20039-CVGroup_UIEventMission_Buy2-3 = "아니, 아니다. 잊어라."
20039-CVGroup_UIEventMission_Interaction1-1 = "수고가 많았다. 일진월보(日進月步), 라 하였지."
20039-CVGroup_UIEventMission_Interaction1-2 = "날마다 새로이 나아가도록 하자."

[translation]
20039-CVGroup_UITitle_Idle1-1 = "蔚藍檔案，啊"
20039-CVGroup_CharacterGet_Idle1-1 = "山海經高級中學，玄龍門的門主，龍華妃姬。\n呵呵，需要妾身的力量嗎？"
20039-CVGroup_Cafe_Idle1-1 = "呼呣……置香之位在……"
20039-CVGroup_Cafe_Idle2-1 = "（山海經之外……實屬多采多姿啊）"
20039-CVGroup_Cafe_Idle3-1 = "似乎是個適合品茗的地方啊……"
20039-CVGroup_Cafe_Idle4-1 = "（那是……何物……？）"
20039-CVGroup_Cafe_Idle5-1 = "呵呵……此處實屬舒適啊。"
20039-CVGroup_WeaponGet_Idle1-1 = "有勞汝了，老師。\n呵呵，也許這話不該由妾身來說……\n但妾身打從心底感謝著汝。\n妾身會賭上一切，好好珍惜的。"
20039-CVGroup_UIEventLobby_Enter1-1 = "歡迎蒞臨山海經，老師。"
20039-CVGroup_UIEventLobby_Enter1-2 = "還請盡情享受月影祭。"
20039-CVGroup_UIEventLobby_Enter2-1 = "倘若不知該去何處，不妨告訴妾身。"
20039-CVGroup_UIEventLobby_Enter2-2 = "妾身會馬上安排人手。"
20039-CVGroup_UIEventLobby_Enter3-1 = "沒想到會變成這樣……"
20039-CVGroup_UIEventLobby_Enter3-2 = "給老師添麻煩了。"
20039-CVGroup_UIEventLobby_Enter3-3 = "汝……會陪在妾身身旁吧？"
20039-CVGroup_UIEventLobby_Enter4-1 = "一切都將回歸己身……"
20039-CVGroup_UIEventLobby_Enter4-2 = "那麼，讓吾等前去奪回山海經吧。"
20039-CVGroup_UIEventLobby_Enter5-1 = "真是有勞汝了，老師。"
20039-CVGroup_UIEventLobby_Enter5-2 = "作為玄龍門的門主，以及作為一名學生……"
20039-CVGroup_UIEventLobby_Enter5-3 = "在此向汝致上真誠的敬意與感謝。"
20039-CVGroup_UIEventLobby_Idle1-1 = "月影祭中，有許多故事交織。"
20039-CVGroup_UIEventLobby_Idle1-2 = "呵呵，若有興趣的話，不妨藉此機會調查調查？"
20039-CVGroup_UIEventLobby_Idle2-1 = "玄武商會打算藉著月影祭加深與外部的交流。"
20039-CVGroup_UIEventLobby_Idle2-2 = "作為門主，妾身雖未特別表明立場……"
20039-CVGroup_UIEventLobby_Idle3-1 = "玄龍門與玄武商會，究竟何者有錯……呼呣。"
20039-CVGroup_UIEventLobby_Idle3-2 = "對不起，老師。即便身為門主，也無法看透一切……"
20039-CVGroup_UIEventLobby_Idle4-1 = "在妾身擔任門主期間，於山海經的安全就將獲得保證。"
20039-CVGroup_UIEventLobby_Idle4-2 = "無論對象是誰。"
20039-CVGroup_UIEventLobby_Idle4-3 = "當然，老師也不例外。"
20039-CVGroup_UIEventTreasure_Enter1-1 = "汝來了啊。現在……"
20039-CVGroup_UIEventTreasure_Enter1-2 = "是啊，應該說是補給時間吧。呵呵。"
20039-CVGroup_UIEventTreasure_Enter2-1 = "妾身為汝準備了餘興。"
20039-CVGroup_UIEventTreasure_Enter2-2 = "盡情享受便是。"
20039-CVGroup_UIEventTreasure_Enter2-3 = "……不過，還請留意別吃太多哦？"
20039-CVGroup_UIEventTreasure_Enter3-1 = "還有時間。"
20039-CVGroup_UIEventTreasure_Enter3-2 = "一同待到最後吧。"
20039-CVGroup_UIEventTreasure_Idle1-1 = "怎麼了嗎？老師。"
20039-CVGroup_UIEventTreasure_Idle1-2 = "……呼呣，想先讓妾身嘗嘗看？"
20039-CVGroup_UIEventTreasure_Idle1-3 = "那意味著什麼──汝明白嗎？呵呵。"
20039-CVGroup_UIEventTreasure_Idle1-4 = "妾身不介意哦？"
20039-CVGroup_UIEventTreasure_Idle2-1 = "老師要不要也來一個？"
20039-CVGroup_UIEventTreasure_Idle2-2 = "味道已經試過了。儘管放心吧，呵呵。"
20039-CVGroup_UIEventTreasure_FindTreasure1-1 = "談到月影祭的名物，那便是點心。"
20039-CVGroup_UIEventTreasure_FindTreasure1-2 = "來，一起找找看吧？"
20039-CVGroup_UIEventTreasure_FindTreasure2-1 = "學習新知是件好事。"
20039-CVGroup_UIEventTreasure_FindTreasure2-2 = "對吧？"
20039-CVGroup_UIEventTreasure_GetTreasure1-1 = "老師喜歡甜食嗎？"
20039-CVGroup_UIEventTreasure_GetTreasure1-2 = "妾身的話……馬馬虎虎吧。"
20039-CVGroup_UIEventTreasure_GetTreasure2-1 = "哦，真有趣。"
20039-CVGroup_UIEventTreasure_GetTreasure2-2 = "要讓妾身也品嘗看看嗎？"
20039-CVGroup_UIEventTreasure_RoundRenewal1-1 = "做得好，老師。"
20039-CVGroup_UIEventTreasure_RoundRenewal1-2 = "不過，汝並不會就此滿足。沒錯吧？"
20039-CVGroup_UIEventMission_Enter1-1 = "每日作業，是吧？\n……為何妾身會在這裡？"
20039-CVGroup_UIEventMission_Enter1-2 = "因為這亦是門主的職責。"
20039-CVGroup_UIEventMission_Enter2-1 = "日日新，又日新──"
20039-CVGroup_UIEventMission_Enter2-2 = "意味著每日都應不斷進步。"
20039-CVGroup_UIEventMission_Enter2-3 = "若是需要協助的話，隨時都能幫忙哦？"
20039-CVGroup_UIEventMission_Idle1-1 = "怎麼了，老師。想試著搔癢妾身嗎？"
20039-CVGroup_UIEventMission_Idle1-2 = "呵呵，真是個無禮的傢伙。"
20039-CVGroup_UIEventMission_Idle1-3 = "……不過，妾身准了。"
20039-CVGroup_UIEventMission_Idle2-1 = "想一同嬉鬧嗎？"
20039-CVGroup_UIEventMission_Idle2-2 = "無妨。隨汝高興吧。畢竟是妾身與老師之間的事啊。"
20039-CVGroup_UIEventMission_Idle2-3 = "……不過有旁人在的時候，記得注意分寸哦？"
20039-CVGroup_UIEventMission_Buy1-1 = "啊啊。畢竟是汝達成之事，儘管拿去便是。"
20039-CVGroup_UIEventMission_Buy2-1 = "汝真誠實啊。"
20039-CVGroup_UIEventMission_Buy2-2 = "果然若能實現的話，真盼望汝能在妾身身邊……"
20039-CVGroup_UIEventMission_Buy2-3 = "不，請忘了吧。"
20039-CVGroup_UIEventMission_Interaction1-1 = "辛苦了。日新月異。"
20039-CVGroup_UIEventMission_Interaction1-2 = "日日向前邁進吧。"

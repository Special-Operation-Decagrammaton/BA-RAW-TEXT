[translation]
10112-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10112-CVGroup_CharacterGet_Idle1-1 = "นายท่าน! ไม่สิ ต้องเป็นคุณครูสิเนอะ?\nรอกันอยู่ใช่มั้ย? อาสึนะมาแล้ว~!"
10112-CVGroup_Cafe_Idle1-1 = "ที่นี่กว้างจังเลย~!\nให้ฉันบอกทางให้มั้ย?"
10112-CVGroup_Cafe_Idle2-1 = "นานแล้วที่ฉันไม่ได้ใส่ชุดนักเรียน~\nแล้วอารมณ์ดีแบบนี้!\nไปเล่นสนุกอะไรกันดีล่ะ?"
10112-CVGroup_Cafe_Idle3-1 = "หิวแล้ว... ต้องกินขนมแล้วละ!"
10112-CVGroup_Cafe_Idle4-1 = "ทุกคนน่ารักจังเลย~!\nอยากถ่ายรูปด้วยจัง~!"
10112-CVGroup_Cafe_Idle5-1 = "คุณครู~ อยู่หรือเปล่า?\nรู้สึกได้ถึงสายตาที่จับจ้องมาของคุณครูเลย!\nไหนดูซิว่าอยู่ที่ไหน!"
10112-CVGroup_WeaponGet_Idle1-1 = "อันนี้จะทำให้เล่นสนุกได้มากขึ้น~!\nขอบคุณนะ คุณครู!"
10112-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ! คุณครู! ทางนี้~!"
10112-CVGroup_UIEventLobby_Enter2-1 = "นายท่าน... ไม่สิ"
10112-CVGroup_UIEventLobby_Enter2-2 = "คุณครู! ในที่สุดก็ได้เจอกันแล้ว~!"
10112-CVGroup_UIEventLobby_Enter3-1 = "ยะฮู้ว! คุณครู! กำลังสนุกอยู่มั้ย~?"
10112-CVGroup_UIEventLobby_Enter4-1 = "ฮุฮุ มาสนุกกันจนจบงานเลยนะ~! นายท่าน\nไม่สิ คุณครู!"
10112-CVGroup_UIEventLobby_Enter5-1 = "งานจบแล้วเหรอเนี่ย\nเวลาผ่านไปไวจังเลยเนอะ?"
10112-CVGroup_UIEventLobby_Enter5-2 = "แต่ว่าฉันก็สนุกมากๆ เลยละ!"
10112-CVGroup_UIEventLobby_Idle1-1 = "คุณครู อยากไปตรงไหนหรือเปล่า?\nฉันจะพาไปเอง~"
10112-CVGroup_UIEventLobby_Idle2-1 = "หืม? ทำไมล่ะ?\nมีเรื่องอยากขอให้อาสึนะทำให้เหรอ?"
10112-CVGroup_UIEventLobby_Idle3-1 = "อะฮ่าฮ่า จั๊กจี้นะ~!"
10112-CVGroup_UIEventLobby_Idle3-2 = "คุณครูอยากเล่นสนุกเหรอ?"
10112-CVGroup_UIEventLobby_Idle4-1 = "ฮิฮิ งั้นอาสึนะก็จะจั๊กจี้คุณครูบ้าง!\nเอาละ มาทางนี้สิ! เร็วเข้า!"

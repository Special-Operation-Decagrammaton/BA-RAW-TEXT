[translation]
10112-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10112-CVGroup_CharacterGet_Idle1-1 = "주인님! 아니, 선생님이었던가? 아무튼 기다렸어? 아스나 등장~!"
10112-CVGroup_Cafe_Idle1-1 = "여기 넓네~! 내가 안내해 줄까?"
10112-CVGroup_Cafe_Idle2-1 = "모처럼 교복도 입었고~ 즐거운 기분! 이제 뭐 하고 놀까?"
10112-CVGroup_Cafe_Idle3-1 = "배고파졌어… 과자 먹어버려야지!"
10112-CVGroup_Cafe_Idle4-1 = "모두 귀여워~! 같이 사진 찍고 싶어~!"
10112-CVGroup_Cafe_Idle5-1 = "선생님~ 있어? 왠지 선생님의 시선이 느껴져! 어디 있는지 찾아봐야지!"
10112-CVGroup_WeaponGet_Idle1-1 = "이걸로 더 신나게 놀 수 있어~! 고마워, 선생님!"
10112-CVGroup_UIEventLobby_Enter1-1 = "아! 선생님! 이쪽이야~!"
10112-CVGroup_UIEventLobby_Enter2-1 = "주인님…… 이 아니라,"
10112-CVGroup_UIEventLobby_Enter2-2 = "선생님! 드디어 만났다~!"
10112-CVGroup_UIEventLobby_Enter3-1 = "야호! 선생님! 즐기고 있어~?"
10112-CVGroup_UIEventLobby_Enter4-1 = "후훗, 마지막까지 놀아보자구~! 주인님, 아니, 선생님!"
10112-CVGroup_UIEventLobby_Enter5-1 = "벌써 끝이라니, 시간이 너무 빠르지?"
10112-CVGroup_UIEventLobby_Enter5-2 = "하지만 너무너무 즐거웠어!"
10112-CVGroup_UIEventLobby_Idle1-1 = "선생님, 어디 가고 싶은 곳 있어? 안내할게~"
10112-CVGroup_UIEventLobby_Idle2-1 = "응? 왜? 아스나에게 부탁할 일이라도 있어?"
10112-CVGroup_UIEventLobby_Idle3-1 = "아하하, 간지러워~!"
10112-CVGroup_UIEventLobby_Idle3-2 = "혹시 선생님, 놀고 싶은 거야?"
10112-CVGroup_UIEventLobby_Idle4-1 = "헤헤, 그럼 아스나도 선생님 간지럽힐래! 자, 이쪽으로 와! 얼른!"

[translation]
10112-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10112-CVGroup_CharacterGet_Idle1-1 = "主人──啊，現在應該稱呼老師比較好吧？\n一起來做很～多開心的事吧！"
10112-CVGroup_Cafe_Idle1-1 = "這裡真寬敞呢～！\n我來帶你參觀吧？"
10112-CVGroup_Cafe_Idle2-1 = "耶嘿嘿，難得穿上制服……來玩玩吧♪"
10112-CVGroup_Cafe_Idle3-1 = "肚子餓了……來吃餅乾吧♪"
10112-CVGroup_Cafe_Idle4-1 = "大家都好可愛～！好想一起拍照～！"
10112-CVGroup_Cafe_Idle5-1 = "老師在哪裡～？\n明明能感覺到視線的說……來找一下吧！"
10112-CVGroup_WeaponGet_Idle1-1 = "好耶！這樣就能玩得更～開心了呢！\n謝謝你，老師！"
10112-CVGroup_UIEventLobby_Enter1-1 = "啊！老師！這邊唷～！"
10112-CVGroup_UIEventLobby_Enter2-1 = "主人……不對，"
10112-CVGroup_UIEventLobby_Enter2-2 = "老師！終於見到你了～！"
10112-CVGroup_UIEventLobby_Enter3-1 = "呀齁！老師！玩得開心嗎～？"
10112-CVGroup_UIEventLobby_Enter4-1 = "呵呵，要玩到最後一刻唷～！\n主人，不對，老師！"
10112-CVGroup_UIEventLobby_Enter5-1 = "啊～結束了。\n真是一轉眼就過去了呢……"
10112-CVGroup_UIEventLobby_Enter5-2 = "……當然！我非～～常開心唷！"
10112-CVGroup_UIEventLobby_Idle1-1 = "老師，你有想去什麼地方嗎？\n我可以帶你去唷～"
10112-CVGroup_UIEventLobby_Idle2-1 = "嗯？怎麼了？\n有事要拜託我嗎？"
10112-CVGroup_UIEventLobby_Idle3-1 = "啊哈哈，好癢哦～！"
10112-CVGroup_UIEventLobby_Idle3-2 = "難道老師，你想玩嗎？"
10112-CVGroup_UIEventLobby_Idle4-1 = "那我也來對老師搔癢癢吧～！\n不會讓你逃走的唷～啊哈哈！"

[translation]
26012-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
26012-CVGroup_CharacterGet_Idle1-1 = "발키리 경찰학교 소속, 생활안전국 라이프가드, 키리노입니다!\n위험한 상황은 본관에게 맡겨주세요!"
26012-CVGroup_Cafe_Idle1-1 = "응! 안전해 보이는 곳이네요!"
26012-CVGroup_Cafe_Idle2-1 = "저 사람, 조금 걱정되는데… 눈여겨 봐야겠네요."
26012-CVGroup_Cafe_Idle3-1 = "(봉사, 경청, 성실, 그리고 미소! 잊지 말아야겠죠!)"
26012-CVGroup_Cafe_Idle4-1 = "이거… 워터파크에도 있으면 좋겠네요!"
26012-CVGroup_Cafe_Idle5-1 = "AED의 위치는……."
26012-CVGroup_WeaponGet_Idle1-1 = "사, 사격이 우수한 편은 아니지만, 선생님의 안전을 위해서라면 최선을 다할게요!"
26012-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요! 선생님은 슬라이드와 파도풀, 어느 쪽이 좋으신가요?"
26012-CVGroup_UIEventLobby_Enter2-1 = "나카츠카사 키리노, 이번에는 라이프가드가 되었습니다!"
26012-CVGroup_UIEventLobby_Enter3-1 = "워터파크에 괴물체라니, 말도 안 되는 일이……!"
26012-CVGroup_UIEventLobby_Enter4-1 = "이번에야말로 본관이 활약할 차례군요!"
26012-CVGroup_UIEventLobby_Enter4-2 = "선생님과 손님들의 안전은 제가 지키겠습니다!"
26012-CVGroup_UIEventLobby_Enter5-1 = "걱정 많이 했는데, 잘 끝났네요! 수고하셨습니다!"
26012-CVGroup_UIEventLobby_Idle1-1 = "수영복 착용을 위해서, 맛집 탐방도 한동안 참았습니다만……."
26012-CVGroup_UIEventLobby_Idle1-2 = "정신을 차려 보니 푸드코트 순례를 하고 말았습니다……."
26012-CVGroup_UIEventLobby_Idle2-1 = "워터 슬라이드는 어떠신가요?"
26012-CVGroup_UIEventLobby_Idle2-2 = "본관이 최고로 짜릿한 슬라이드를 추천해 드리겠습니다!"
26012-CVGroup_UIEventLobby_Idle3-1 = "아이들이 노는 모습, 귀엽네요!"
26012-CVGroup_UIEventLobby_Idle4-1 = "네? 본관이 필요한 일이 있나요? 무엇이든 말해주세요!"
26012-CVGroup_UIEventMission_Enter1-1 = "오늘 할 일입니다! 꽤 많지만 힘내볼까요!"
26012-CVGroup_UIEventMission_Enter2-1 = "하나씩 차근차근! 본관도 힘내겠습니다, 선생님!"
26012-CVGroup_UIEventMission_Idle1-1 = "아하핫! 라이프가드를 간지럽히는 건 금지입니다!"
26012-CVGroup_UIEventMission_Idle2-1 = "후후, 그렇게 보채지 않으셔도, 본관이 도와드릴 테니까요!"
26012-CVGroup_UIEventMission_Buy1-1 = "역시 선생님이시네요! 대단합니다!"
26012-CVGroup_UIEventMission_Buy2-1 = "수고하셨습니다, 선생님!"
26012-CVGroup_UIEventMission_Interaction1-1 = "오늘도 고생하셨습니다!\n홀가분한 기분으로, 맛있는 식사라도 하러 가실래요?"

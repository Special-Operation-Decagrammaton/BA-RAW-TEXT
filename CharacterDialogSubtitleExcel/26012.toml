[translation]
26012-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26012-CVGroup_CharacterGet_Idle1-1 = "ไลฟ์การ์ดคิริโนะจากสำนักรักษาความปลอดภัย สถาบันวัลคิรี่ค่ะ!\nหากมีเหตุอันตราย วางใจฉันได้เลยค่ะ!"
26012-CVGroup_Cafe_Idle1-1 = "อื้ม! ที่นี่ดูปลอดภัยดีนะคะ!"
26012-CVGroup_Cafe_Idle2-1 = "คนนั้นน่าเป็นห่วงอยู่นะคะ...\nคงต้องให้ความสนใจแล้วค่ะ"
26012-CVGroup_Cafe_Idle3-1 = "(จิตอาสา รับฟัง ซื่อสัตย์ และรอยยิ้ม!\nห้ามลืมเลยนะคะ!)"
26012-CVGroup_Cafe_Idle4-1 = "อันนี้... อยากให้มีในสวนน้ำด้วยจังค่ะ!"
26012-CVGroup_Cafe_Idle5-1 = "เครื่องกระตุกไฟฟ้าหัวใจอยู่ไหนนะ..."
26012-CVGroup_WeaponGet_Idle1-1 = "ฉะ... ฉันยิงปืนไม่ค่อยเก่ง\nแต่เพื่อความปลอดภัยของคุณครู\nฉันจะทำให้เต็มที่ค่ะ!"
26012-CVGroup_UIEventLobby_Enter1-1 = "เชิญค่ะ! ระหว่างสไลเดอร์กับสระคลื่น\nคุณครูชอบอะไรมากกว่าเหรอคะ?"
26012-CVGroup_UIEventLobby_Enter2-1 = "นาคัตสึคาสะ คิริโนะ\nคราวนี้ได้มาเป็นไลฟ์การ์ดค่ะ!"
26012-CVGroup_UIEventLobby_Enter3-1 = "สัตว์ประหลาดในสวนน้ำงั้นเหรอ\nมันเรื่องอะไรกันเนี่ย...!"
26012-CVGroup_UIEventLobby_Enter4-1 = "คราวนี้ถึงเวลาที่ฉันจะได้โชว์ฝีมือแล้วสินะคะ!"
26012-CVGroup_UIEventLobby_Enter4-2 = "ฉันจะดูแลความปลอดภัยของคุณครูกับลูกค้าให้เองค่ะ!"
26012-CVGroup_UIEventLobby_Enter5-1 = "ฉันกังวลมากเลย แต่ก็จบลงด้วยดีนะคะ!\nทำได้ดีมากค่ะ!"
26012-CVGroup_UIEventLobby_Idle1-1 = "ฉันหยุดตระเวนหาร้านเด็ดไปสักพัก\nเพื่อให้ใส่ชุดว่ายน้ำได้เลยนะคะ..."
26012-CVGroup_UIEventLobby_Idle1-2 = "พอรู้ตัวอีกทีฉันก็ไปเดินมาทั่วศูนย์อาหารแล้วค่ะ..."
26012-CVGroup_UIEventLobby_Idle2-1 = "สไลเดอร์สระน้ำเป็นยังไงบ้างคะ?"
26012-CVGroup_UIEventLobby_Idle2-2 = "ฉันจะแนะนำสไลเดอร์ที่หวาดเสียวที่สุดให้เองค่ะ!"
26012-CVGroup_UIEventLobby_Idle3-1 = "เด็กๆ เล่นน้ำกัน\nน่ารักจังเลยนะคะ!"
26012-CVGroup_UIEventLobby_Idle4-1 = "คะ? มีงานที่ต้องให้ฉันไปทำเหรอคะ?\nบอกมาได้ทุกอย่างเลยค่ะ!"
26012-CVGroup_UIEventMission_Enter1-1 = "นี่คือสิ่งที่ต้องทำวันนี้ค่ะ!\nถึงจะแอบเยอะ แต่ฉันก็จะสู้ค่ะ!"
26012-CVGroup_UIEventMission_Enter2-1 = "ค่อยๆ ทำทีละอย่างไป!\nฉันก็จะสู้นะคะคุณครู!"
26012-CVGroup_UIEventMission_Idle1-1 = "อะฮ่าฮ่า! ห้ามจั๊กจี้ไลฟ์การ์ดนะคะ!"
26012-CVGroup_UIEventMission_Idle2-1 = "ฮุฮุ ต่อให้ไม่รบเร้ากันขนาดนั้น\nฉันก็จะช่วยอยู่แล้วค่ะ"
26012-CVGroup_UIEventMission_Buy1-1 = "สมกับเป็นคุณครูจริงๆ เลย!\nสุดยอดไปเลยค่ะ!"
26012-CVGroup_UIEventMission_Buy2-1 = "ขอบคุณนะคะคุณครู!"
26012-CVGroup_UIEventMission_Interaction1-1 = "วันนี้เหนื่อยหน่อยนะคะ!\nไปทานอะไรอร่อยๆ ฮีลใจกันมั้ยคะ?"

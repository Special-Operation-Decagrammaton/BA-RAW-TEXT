[translation]
26012-CVGroup_UITitle_Idle1-1 = "蔚藍～～～檔案！"
26012-CVGroup_CharacterGet_Idle1-1 = "我是女武神警察學園所屬，生活安全局救生員的桐乃！\n危險狀況就交給本官吧！"
26012-CVGroup_Cafe_Idle1-1 = "嗯！看起來是個安全的地方呢！"
26012-CVGroup_Cafe_Idle2-1 = "那個人，讓人有點擔心呢……\n得盯著他才行。"
26012-CVGroup_Cafe_Idle3-1 = "（奉獻、傾聽、誠實，以及笑容！千萬不能忘記！）"
26012-CVGroup_Cafe_Idle4-1 = "這個……\n真希望水上樂園裡面也有呢！"
26012-CVGroup_Cafe_Idle5-1 = "AED的位置在……"
26012-CVGroup_WeaponGet_Idle1-1 = "雖，雖然我並不擅長射擊，\n但我會為了老師全力以赴！"
26012-CVGroup_UIEventLobby_Enter1-1 = "歡迎回來！\n老師喜歡滑水道還是波浪池呢？"
26012-CVGroup_UIEventLobby_Enter2-1 = "中務桐乃，本次擔任救生員！"
26012-CVGroup_UIEventLobby_Enter3-1 = "水上樂園裡竟然會有怪物，究竟是怎麼回事……！"
26012-CVGroup_UIEventLobby_Enter4-1 = "這次輪到本官大顯身手了！"
26012-CVGroup_UIEventLobby_Enter4-2 = "老師和遊客的安全就由本官守護！"
26012-CVGroup_UIEventLobby_Enter5-1 = "雖然很擔心，但總算順利結束了！\n辛苦了！"
26012-CVGroup_UIEventLobby_Idle1-1 = "為了穿泳裝，我暫時忍住了美食巡禮……"
26012-CVGroup_UIEventLobby_Idle1-2 = "結果回過神來，已經完成了美食廣場巡禮……"
26012-CVGroup_UIEventLobby_Idle2-1 = "要試試滑水道嗎？"
26012-CVGroup_UIEventLobby_Idle2-2 = "本官推薦刺激度滿點的滑水道！"
26012-CVGroup_UIEventLobby_Idle3-1 = "孩子們玩耍的模樣，真是太可愛了！"
26012-CVGroup_UIEventLobby_Idle4-1 = "嗯？有需要本官幫忙的工作嗎？\n請儘管說！"
26012-CVGroup_UIEventMission_Enter1-1 = "今天的工作來了！\n雖然還挺多的，一起加油吧！"
26012-CVGroup_UIEventMission_Enter2-1 = "一個一個細心解決！\n本官也會加油的唷，老師！"
26012-CVGroup_UIEventMission_Idle1-1 = "啊哈哈！禁止搔癢救生員唷！"
26012-CVGroup_UIEventMission_Idle2-1 = "呵呵，不用那麼著急，本官會幫忙的！"
26012-CVGroup_UIEventMission_Buy1-1 = "不愧是老師！好厲害！"
26012-CVGroup_UIEventMission_Buy2-1 = "辛苦了，老師！"
26012-CVGroup_UIEventMission_Interaction1-1 = "今天也辛苦了！\n可以的話，要不要一起去吃飯放鬆一下？"

[translation]
26012-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26012-CVGroup_CharacterGet_Idle1-1 = "Lifeguard Kirino of Valkyrie's Public Safety Bureau at your service! I'll handle any dangerous situation!"
26012-CVGroup_Cafe_Idle1-1 = "Yes! This looks like a safe spot!"
26012-CVGroup_Cafe_Idle2-1 = "I'm a little worried about that person. I should keep an eye on them."
26012-CVGroup_Cafe_Idle3-1 = "(Service, sensitivity, sincerity, and smiles! Don't forget!)"
26012-CVGroup_Cafe_Idle4-1 = "This... I wish we had this at the water park!"
26012-CVGroup_Cafe_Idle5-1 = "The AED is located at..."
26012-CVGroup_WeaponGet_Idle1-1 = "I'm not the best shot, but I'll put my all into ensuring your safety, Sensei!"
26012-CVGroup_UIEventLobby_Enter1-1 = "Welcome! Sensei, which do you prefer, the slide or the wave pool?"
26012-CVGroup_UIEventLobby_Enter2-1 = "Nakatsukasa Kirino, reporting as a lifeguard this time!"
26012-CVGroup_UIEventLobby_Enter3-1 = "A monster at the water park? How is this possible...?!"
26012-CVGroup_UIEventLobby_Enter4-1 = "This time, it's finally my turn to step up!"
26012-CVGroup_UIEventLobby_Enter4-2 = "I'll ensure the safety of Sensei and the guests!"
26012-CVGroup_UIEventLobby_Enter5-1 = "I was really concerned, but it all turned out well in the end! Great job!"
26012-CVGroup_UIEventLobby_Idle1-1 = "I've even held back on food adventures, so I could wear my swimsuit..."
26012-CVGroup_UIEventLobby_Idle1-2 = "When I came to my senses, I found myself on a food court pilgrimage..."
26012-CVGroup_UIEventLobby_Idle2-1 = "How about a water slide?"
26012-CVGroup_UIEventLobby_Idle2-2 = "I can recommend the most exhilarating one!"
26012-CVGroup_UIEventLobby_Idle3-1 = "The kids playing are so cute!"
26012-CVGroup_UIEventLobby_Idle4-1 = "Yes? Is there something you need? Just let me know if there's anything at all!"
26012-CVGroup_UIEventMission_Enter1-1 = "This is today's task list! It's a lot, but let's give it our all!"
26012-CVGroup_UIEventMission_Enter2-1 = "One at a time! I'll do my best too, Sensei!"
26012-CVGroup_UIEventMission_Idle1-1 = "Ahaha! Tickling the lifeguard is not allowed!"
26012-CVGroup_UIEventMission_Idle2-1 = "Heehee. Hold your horses. I'll help you out!"
26012-CVGroup_UIEventMission_Buy1-1 = "As expected, you're amazing, Sensei!"
26012-CVGroup_UIEventMission_Buy2-1 = "Great work, Sensei!"
26012-CVGroup_UIEventMission_Interaction1-1 = "You did awesome today! How about we go out, get something to eat and unwind?"

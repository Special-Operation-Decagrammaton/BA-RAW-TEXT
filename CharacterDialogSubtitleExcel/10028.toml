[translation]
10028-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10028-CVGroup_CharacterGet_Idle1-1 = "鏘～！你看你看，主人！\n是兔女郎裝的明日奈唷！"
10028-CVGroup_Cafe_Idle1-1 = "蹦蹦！\n兔女郎的明日奈參上！"
10028-CVGroup_Cafe_Idle2-1 = "這裡也是\n非常開心的地方呢！"
10028-CVGroup_Cafe_Idle3-1 = "啊哈哈哈！\n這是什麼好有趣！"
10028-CVGroup_Cafe_Idle4-1 = "咦，主人去哪裡了呢？\n要去找主人嗎～？"
10028-CVGroup_Cafe_Idle5-1 = "遊樂園之類的，\n常有像我這樣的兔子在呢！"
10028-CVGroup_WeaponGet_Idle1-1 = "鏘～！兔女郎裝的明日奈，完全體！\n開玩笑的！"
10028-CVGroup_UIEventLobby_Enter1-1 = "主人，歡迎你！\n兔子小姐們出來迎接你了唷！"
10028-CVGroup_UIEventLobby_Enter2-1 = "就跟明日奈一起，出發──！"
10028-CVGroup_UIEventLobby_Idle1-1 = "主人～！和明日奈一起玩吧！吶？"
10028-CVGroup_UIEventLobby_Idle2-1 = "啊，主人，呀齁～！"
10028-CVGroup_UIEventLobby_Idle2-2 = "要不要一起漫無目的地在那裡跑一跑？\n一定會很開心的唷！"
10028-CVGroup_UIEventLobby_Idle3-1 = "嗯，什麼什麼？\n要玩那種新遊戲嗎？"
10028-CVGroup_UIEventLobby_Idle3-2 = "那我也可以隨意摸主人嗎？"
10028-CVGroup_UIEventLobby_Idle4-1 = "啊，主人！\n在主人來之前，真的好無聊～"
10028-CVGroup_UIEventLobby_Idle4-2 = "所以，從現在開始一起開心地玩吧！"
10028-CVGroup_UIEventLobby_Enter3-1 = "早點做完的話，就可以玩久一點對吧？"
10028-CVGroup_UIEventLobby_Enter4-1 = "開心地玩到最後吧！"
10028-CVGroup_UIEventLobby_Enter5-1 = "啊，主人！這裡這裡！"
10028-CVGroup_UIEventCardShop_Enter1-1 = "是開心的試手氣時間唷，主人！"
10028-CVGroup_UIEventCardShop_Enter2-1 = "心跳加速了～！"
10028-CVGroup_UIEventCardShop_Idle1-1 = "啊哈，吶吶，你在看哪裡呀～？"
10028-CVGroup_UIEventCardShop_Idle2-1 = "會出現什麼呢～？\n有點緊張呢！"
10028-CVGroup_UIEventCardShop_Prize3-1 = "哇────！！\n好厲害好厲害，真不愧是主人！"
10028-CVGroup_UIEventCardShop_Prize2-1 = "哦～！不愧是主人呢！"
10028-CVGroup_UIEventCardShop_Prize1-1 = "鏘──！"
10028-CVGroup_UIEventCardShop_Prize1-2 = "……呃，咦？"
10028-CVGroup_UIEventCardShop_Prize0-1 = "啊哈！這是什麼，好奇怪喔～！"
10028-CVGroup_UIEventCardShop_Enter3-1 = "看來這裡還可以進去呢！"

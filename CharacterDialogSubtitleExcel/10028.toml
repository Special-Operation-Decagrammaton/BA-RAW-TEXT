[translation]
10028-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10028-CVGroup_CharacterGet_Idle1-1 = "쨔쟌-! 이것 봐, 주인님! 토끼 아스나입니다!"
10028-CVGroup_Cafe_Idle1-1 = "깡총깡총~. 토끼 아스나입니다~."
10028-CVGroup_Cafe_Idle2-1 = "여기도 되게 재밌어보이는 곳이네!"
10028-CVGroup_Cafe_Idle3-1 = "아하하하하하! 이거 뭐야? 재미있어!"
10028-CVGroup_Cafe_Idle4-1 = "음~. 주인님은 어디에 있을까? 찾으러 가볼까?"
10028-CVGroup_Cafe_Idle5-1 = "놀이공원 같은 데도 종종, 지금의 나같은 토끼들이 있더라!"
10028-CVGroup_WeaponGet_Idle1-1 = "쨔안-! 토끼 아스나, 완전체! 등~장이야~!"
10028-CVGroup_UIEventLobby_Enter1-1 = "어서 와, 주인님! 토끼들이 기다리고 있어!"
10028-CVGroup_UIEventLobby_Enter2-1 = "아스나와 함께! 자, 출발-!"
10028-CVGroup_UIEventLobby_Idle1-1 = "주인님-! 아스나랑 놀자! 응?"
10028-CVGroup_UIEventLobby_Idle2-1 = "아, 주인님, 얏호!"
10028-CVGroup_UIEventLobby_Idle2-2 = "같이 아무 의미 없이 달려 보지 않을래? 분명 즐거울 거야!"
10028-CVGroup_UIEventLobby_Idle3-1 = "응, 뭐야뭐야? 그런 새로운 놀이?"
10028-CVGroup_UIEventLobby_Idle3-2 = "그러면 나도 주인님, 원하는 만큼 손대도 돼?"
10028-CVGroup_UIEventLobby_Idle4-1 = "아, 주인님! 주인님이 올 때까지 심심했다구~"
10028-CVGroup_UIEventLobby_Idle4-2 = "그러니깐, 지금부터 같이 재밌게 놀자!"
10028-CVGroup_UIEventLobby_Enter3-1 = "빨리 끝내면 놀 수 있겠지?"
10028-CVGroup_UIEventLobby_Enter4-1 = "마지막까지 신나게 놀자!"
10028-CVGroup_UIEventLobby_Enter5-1 = "아, 주인님! 여기 여기!"
10028-CVGroup_UIEventCardShop_Enter1-1 = "즐거운 복불복 시간이야, 주인님!"
10028-CVGroup_UIEventCardShop_Enter2-1 = "두근두근두근두근두근~!"
10028-CVGroup_UIEventCardShop_Idle1-1 = "아하하하! 어딜 보는 거야?"
10028-CVGroup_UIEventCardShop_Idle2-1 = "뭐가 나올까~? 슬슬 긴장되는데!"
10028-CVGroup_UIEventCardShop_Prize3-1 = "우와아아아아!! 대박 대박 역시 주인님이야!!"
10028-CVGroup_UIEventCardShop_Prize2-1 = "와우! 역시 주인님이야!"
10028-CVGroup_UIEventCardShop_Prize1-1 = "쨔안-!"
10028-CVGroup_UIEventCardShop_Prize1-2 = "……엣, 어라!?"
10028-CVGroup_UIEventCardShop_Prize0-1 = "아하하하! 이게 뭐야~ 이상해~!"
10028-CVGroup_UIEventCardShop_Enter3-1 = "아직 여긴 들어가도 되나봐!"

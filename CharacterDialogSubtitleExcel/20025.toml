[translation]
20025-CVGroup_UITitle_Idle1-1 = "브, 블루……아카이브……"
20025-CVGroup_CharacterGet_Idle1-1 = "또, 또 찾아오게 되었습니다…… 새해 시작부터…… 죄송합니다……"
20025-CVGroup_Cafe_Idle1-1 = "아, 죄, 죄송합니다. 저 따위가 이렇게 예쁜 옷을 입어서…."
20025-CVGroup_Cafe_Idle2-1 = "서, 선생님…? 안 계시나…."
20025-CVGroup_Cafe_Idle3-1 = "이곳이 선생님의…. 왜 나 같은 게 여기에…."
20025-CVGroup_Cafe_Idle4-1 = "호, 혹시 좀 튀는 걸까요…."
20025-CVGroup_Cafe_Idle5-1 = "숨고 싶어…."
20025-CVGroup_WeaponGet_Idle1-1 = "올해도, 내년에도……. 그리고 내세에도……!\n선생님이 싫어하는 건, 제가 다 없애버릴게요!"
20025-CVGroup_UIEventLobby_Enter1-1 = "서, 서서서서, 선생님?! 어, 어서 오세요! 그리고, 죄, 죄송합니다!"
20025-CVGroup_UIEventLobby_Enter2-1 = "……헤헤…… 여기서 선생님을 뵙다니…"
20025-CVGroup_UIEventLobby_Enter2-2 = "아, 아뇨! 특별히 무슨 뜻이 있는 게 아니라…!"
20025-CVGroup_UIEventLobby_Idle1-1 = "네, 네엣?! 무, 무무무무, 무슨 일이신가요, 선생님?!"
20025-CVGroup_UIEventLobby_Idle2-1 = "네…? 그냥… 불러 보셨다고요?"
20025-CVGroup_UIEventLobby_Idle2-2 = "그, 그런가요. 에, 헤헤…."
20025-CVGroup_UIEventLobby_Idle3-1 = "새해를 맞이해…… 흥신소의 여러분… 선생님과 이렇게……"
20025-CVGroup_UIEventLobby_Idle3-2 = "에헤헤…… 조금, 특별, 한 기분이에요."
20025-CVGroup_UIEventLobby_Idle4-1 = "선생님, 역시 저, 저 같은 거랑 있어도…… 그렇게 즐겁지는……"
20025-CVGroup_UIEventLobby_Idle4-2 = "아니…… 라고요? 그, 러신가요…."
20025-CVGroup_UIEventLobby_Idle4-3 = "……가, 감사, 합니다. 선생님."
20025-CVGroup_UIEventLobby_Enter3-1 = "잘 모르겠지만…… 엄청난 일이 되어버린 것 같네요……"
20025-CVGroup_UIEventLobby_Enter3-2 = "……전부, 부숴버릴까요?"
20025-CVGroup_UIEventLobby_Enter4-1 = "아루 님께선…… 즐거우신 것 같아요……"
20025-CVGroup_UIEventLobby_Enter4-2 = "그건, 다행이네요. 헤, 헤헤……"
20025-CVGroup_UIEventLobby_Enter5-1 = "드디어 소동이 잠잠해진 모양이에요……"
20025-CVGroup_UIEventLobby_Enter5-2 = "저기, 그 로봇은…… 뭐였을까요……?"

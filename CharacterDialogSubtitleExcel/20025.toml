[translation]
20025-CVGroup_UITitle_Idle1-1 = "B... Blue... Archive..."
20025-CVGroup_CharacterGet_Idle1-1 = "ดะ... ได้เจอกันอีกแล้วนะคะ...\nตั้งแต่เริ่มปีใหม่เลย... ขอโทษด้วยนะคะ"
20025-CVGroup_Cafe_Idle1-1 = "เอ่อ... ขะ... ขอโทษด้วยค่ะ\nขอโทษที่คนอย่างฉันใส่เสื้อผ้าสวยๆ แบบนี้..."
20025-CVGroup_Cafe_Idle2-1 = "คะ... คุณครู...? หรือว่าจะไม่อยู่..."
20025-CVGroup_Cafe_Idle3-1 = "ที่นี่มัน... ของคุณครู\nทำไมคนอย่างฉันถึงมาอยู่ที่นี่ได้..."
20025-CVGroup_Cafe_Idle4-1 = "คะ... คือว่า มันเด่นไปหรือเปล่าคะ..."
20025-CVGroup_Cafe_Idle5-1 = "อยากมุดดินหนีจัง..."
20025-CVGroup_WeaponGet_Idle1-1 = "จะปีนี้... หรือปีหน้า... รวมถึงชาติหน้าด้วย...!\nสิ่งที่คุณครูเกลียด... ฉันจะกำจัดมันให้สิ้นซากค่ะ!"
20025-CVGroup_UIEventLobby_Enter1-1 = "คะคะคะคะ...คุณครู?!\nชะชะชะ... เชิญเลยค่ะ!\nละละ ละ... แล้วก็...ขอโทษด้วยค่ะ!"
20025-CVGroup_UIEventLobby_Enter2-1 = "...แหะๆ... ได้เจอคุณครูในที่แบบนี้ด้วย..."
20025-CVGroup_UIEventLobby_Enter2-2 = "ปะ...เปล่าค่ะ! มะ...ไม่ได้มีความหมายพิเศษอะไรหรอกค่ะ...!"
20025-CVGroup_UIEventLobby_Idle1-1 = "คะ...คะ?! มะมะมะ... มีอะไร... เหรอคะคุณครู?!"
20025-CVGroup_UIEventLobby_Idle2-1 = "คะ...? ก็แค่... ลองเรียกดูเฉยๆ เหรอคะ?"
20025-CVGroup_UIEventLobby_Idle2-2 = "งะ... งั้นเหรอคะ? แหะๆๆ..."
20025-CVGroup_UIEventLobby_Idle3-1 = "ฉลองวันปีใหม่... กับทุกคนในหน่วยรับจ้าง...\nพร้อมกับคุณครูแบบนี้..."
20025-CVGroup_UIEventLobby_Idle3-2 = "แหะๆๆ... รู้สึกว่ามันพิเศษมากๆ เลยละค่ะ"
20025-CVGroup_UIEventLobby_Idle4-1 = "คิดแล้วเชียวว่าการที่คุณครู\nตะ... ต้องมาอยู่กับ... คนอย่างฉัน มันคงไม่สนุก..."
20025-CVGroup_UIEventLobby_Idle4-2 = "ไม่ใช่อย่างนั้นเลย... งะ...งั้นเหรอคะ..."
20025-CVGroup_UIEventLobby_Idle4-3 = "ขะ...ขอบคุณ...นะคะ คุณครู"
20025-CVGroup_UIEventLobby_Enter3-1 = "ฉันเองก็ไม่ค่อยเข้าใจเท่าไร...\nแต่ดูเหมือนว่ามันจะกลายเป็น... เรื่องใหญ่ไปแล้วนะคะ"
20025-CVGroup_UIEventLobby_Enter3-2 = "...ทำลายทุกอย่างทิ้งเลยดีมั้ยคะ?"
20025-CVGroup_UIEventLobby_Enter4-1 = "ดูเหมือนท่านอารุ... จะสนุกอยู่เลยนะคะ..."
20025-CVGroup_UIEventLobby_Enter4-2 = "ค่อยยังชั่วหน่อยนะคะ แหะๆๆ..."
20025-CVGroup_UIEventLobby_Enter5-1 = "ดูเหมือนเรื่องวุ่นวาย จะค่อยๆ สงบลงแล้วนะคะ..."
20025-CVGroup_UIEventLobby_Enter5-2 = "คือว่าหุ่นยนต์ตัวนั้น... มันอะไรกันคะนั่น...?"

[translation]
20025-CVGroup_UITitle_Idle1-1 = "B-Blue... Archive..."
20025-CVGroup_CharacterGet_Idle1-1 = "Um, sorry... It's me again already... E-Even though the year's just started..."
20025-CVGroup_Cafe_Idle1-1 = "Ah, I-I'm sorry. Someone like me...shouldn't be wearing something so pretty..."
20025-CVGroup_Cafe_Idle2-1 = "S-Sensei...? Are they not here?"
20025-CVGroup_Cafe_Idle3-1 = "This is Sensei's, so... Why is s-someone like me here?"
20025-CVGroup_Cafe_Idle4-1 = "I-I think I stand out too much..."
20025-CVGroup_Cafe_Idle5-1 = "I wanna hide..."
20025-CVGroup_WeaponGet_Idle1-1 = "This year and next year, and the year after that...and even in the next life...! I'll get rid of everything that you don't like!"
20025-CVGroup_UIEventLobby_Enter1-1 = "S-S-S-Sensei? Oh! I-I'm sorry! Welcome!"
20025-CVGroup_UIEventLobby_Enter2-1 = "...Heehee. This is an unexpected surprise, Sensei."
20025-CVGroup_UIEventLobby_Enter2-2 = "Um, n-no! I didn't mean anything in particular by that!"
20025-CVGroup_UIEventLobby_Idle1-1 = "H-Huh?! Wh-Wh-What is it, Sensei?"
20025-CVGroup_UIEventLobby_Idle2-1 = "You called me...for no reason? At all? J-Just because?!"
20025-CVGroup_UIEventLobby_Idle2-2 = "I-I see. Heeheehee..."
20025-CVGroup_UIEventLobby_Idle3-1 = "I-I get to bring in the new year with all the Problem Solver members...and even S-Sensei..."
20025-CVGroup_UIEventLobby_Idle3-2 = "Heehee... It feels...a bit special."
20025-CVGroup_UIEventLobby_Idle4-1 = "I know it's probably c-completely terrible...to have to spend time with someone...like me..."
20025-CVGroup_UIEventLobby_Idle4-2 = "Oh, that's...not the case? I-I see..."
20025-CVGroup_UIEventLobby_Idle4-3 = "...Th-Thank...thank you, Sensei."
20025-CVGroup_UIEventLobby_Enter3-1 = "I'm not totally sure...but it seems like something big happened..."
20025-CVGroup_UIEventLobby_Enter3-2 = "...Should I destroy everything?"
20025-CVGroup_UIEventLobby_Enter4-1 = "I think...Aru is having fun..."
20025-CVGroup_UIEventLobby_Enter4-2 = "I'm relieved...heehee."
20025-CVGroup_UIEventLobby_Enter5-1 = "I guess things have finally calmed down..."
20025-CVGroup_UIEventLobby_Enter5-2 = "But...I wonder...what was that robot?"

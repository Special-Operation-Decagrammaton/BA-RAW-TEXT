[translation]
20025-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍……檔案……"
20025-CVGroup_CharacterGet_Idle1-1 = "那，那個……我又來了……\n明明才過新年……對不起……"
20025-CVGroup_Cafe_Idle1-1 = "啊，對，對不起。\n我這種人竟然穿這麼漂亮的衣服……"
20025-CVGroup_Cafe_Idle2-1 = "老，老師……？\n不在嗎……"
20025-CVGroup_Cafe_Idle3-1 = "這裡就是老師的……\n為，為什麼我這種人會在這裡……"
20025-CVGroup_Cafe_Idle4-1 = "是，是不是有點突兀……"
20025-CVGroup_Cafe_Idle5-1 = "好想躲起來……"
20025-CVGroup_WeaponGet_Idle1-1 = "今年，明年……還有來世……！\n老師討厭的東西，我全部都會消滅掉！"
20025-CVGroup_UIEventLobby_Enter1-1 = "老，老老老老，老師！？\n歡，歡迎回來！還有，對，對不起！"
20025-CVGroup_UIEventLobby_Enter2-1 = "……嘿嘿……\n竟然會在這裡見到老師……"
20025-CVGroup_UIEventLobby_Enter2-2 = "沒，沒有！我沒有什麼特別的意思……！"
20025-CVGroup_UIEventLobby_Idle1-1 = "是，是！？怎，怎怎怎怎，怎麼了嗎，老師！？"
20025-CVGroup_UIEventLobby_Idle2-1 = "咦……？只是……想叫叫看而已？"
20025-CVGroup_UIEventLobby_Idle2-2 = "是，是這樣啊。耶，嘿嘿……"
20025-CVGroup_UIEventLobby_Idle3-1 = "在新年……跟便利屋的各位……和老師像這樣……"
20025-CVGroup_UIEventLobby_Idle3-2 = "耶嘿嘿……是種，有點特別的感覺。"
20025-CVGroup_UIEventLobby_Idle4-1 = "老師。果然就算，跟，跟我這種人在一起……也不會多開心……"
20025-CVGroup_UIEventLobby_Idle4-2 = "沒那種事……是嗎？\n這，這樣啊……"
20025-CVGroup_UIEventLobby_Idle4-3 = "……謝，謝謝你，老師。"
20025-CVGroup_UIEventLobby_Enter3-1 = "雖然不是很清楚……好像變成非常嚴重的事情了呢……"
20025-CVGroup_UIEventLobby_Enter3-2 = "要，要全部破壞掉嗎？"
20025-CVGroup_UIEventLobby_Enter4-1 = "亞瑠大人他……好像很開心……"
20025-CVGroup_UIEventLobby_Enter4-2 = "太好了。嘿，嘿嘿……"
20025-CVGroup_UIEventLobby_Enter5-1 = "騷動似乎終於平息下來了……"
20025-CVGroup_UIEventLobby_Enter5-2 = "那個，那部機器人……是怎麼回事呢……？"

[translation]
10089-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10089-CVGroup_CharacterGet_Idle1-1 = "ตายจริง ครั้งนี้เป็นภารกิจแบบไหนเหรอ?\nหรือเป็นข้อเสนอทางธุรกิจ?\nแต่ไม่ว่าจะเป็นเรื่องไหน... ก็ขอบคุณที่มานะคุณครู"
10089-CVGroup_Cafe_Idle1-1 = "คะ... คนนั้น...!?\nแต่ว่าถ้าเป็นที่นี่... คงไม่เป็นไรหรอกเนอะ...?"
10089-CVGroup_Cafe_Idle2-1 = "บรรยากาศที่นี่... ไม่เลวเลยนะ"
10089-CVGroup_Cafe_Idle3-1 = "ฉันอยากทำงานใหญ่ๆ อย่างเท่ๆ สักงานจังเลย..."
10089-CVGroup_Cafe_Idle4-1 = "ไม่มีผู้ว่าจ้างที่เหมาะๆ อยู่เลยหรือไงนะ..."
10089-CVGroup_Cafe_Idle5-1 = "อืม... ค่าใช้จ่ายเดือนนี้จะทำยังไงดีนะ"
10089-CVGroup_WeaponGet_Idle1-1 = "เรารู้จักกันมาก็นานแล้ว แต่คำที่บอกว่าเชื่อใจกัน...\nมันฟังดูแปลกใหม่ดีนะ อืม... ต่อไปก็ขอฝากตัวด้วยนะ\nคุณครู อืม... แค่นี้ก็เพียงพอแล้วละ"
10089-CVGroup_UIEventLobby_Enter1-1 = "เอาละ ถึงเวลาทำงานแล้ว คุณครู"
10089-CVGroup_UIEventLobby_Enter2-1 = "มาได้จังหวะพอดีเลย\nฉันมีอะไรจะให้คุณครูดูน่ะ"
10089-CVGroup_UIEventLobby_Enter3-1 = "เวลาช่างผ่านไป..."
10089-CVGroup_UIEventLobby_Enter4-1 = "เร็วจังเลยนะ\nงานใกล้จะเสร็จแล้วเหรอ...?"
10089-CVGroup_UIEventLobby_Enter5-1 = "ห้ามวางมือจนกว่าจะเสร็จงานเด็ดขาด"
10089-CVGroup_UIEventLobby_Idle1-1 = "หืม...? คุณครู? มีเรื่องอะไรเหรอ?"
10089-CVGroup_UIEventLobby_Idle2-1 = "ชู่ว! ชู่ว! เงียบๆ สิ!"
10089-CVGroup_UIEventLobby_Idle2-2 = "เดี๋ยวถูกจับได้ว่าแอบเข้ามานะ...!"
10089-CVGroup_UIEventLobby_Idle3-1 = "เฮือก...!?"
10089-CVGroup_UIEventLobby_Idle3-2 = "อ่า... คุณครูนี่เอง"
10089-CVGroup_UIEventLobby_Idle4-1 = "ทะ... ที่นี่อันตรายนะ...\nไปคุยกันข้างนอกเถอะ"
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "งั้นก็รวบรวมเบาะแสดูดีมั้ยนะ?"
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "คุณครู ฉันอยากจัดการข้อมูลน่ะ"
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "มาช่วยกันหน่อยได้มั้ย?"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "ฉันยังต้องหาข้อมูลเกี่ยวกับเป้าหมายเพิ่มน่ะ คุณครู"
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "ตะ... ตั้งใจหน่อยสิ คุณครู!\nไม่ใช่ที่ฉัน ที่ข้อมูลน่ะ!"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "หะ... หืม? มีอะไรจะพูดกับฉันเหรอ...?"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "อ๋อ เป็นแบบนั้นนี่เอง"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "เข้าใจครบถ้วนแล้วละ"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "สมแล้วที่เป็นพาร์ทเนอร์ของฉัน"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "เรามีข้อมูลครบแล้ว...\nแต่ก็ลองหาไว้เผื่ออีกหน่อยเถอะ"

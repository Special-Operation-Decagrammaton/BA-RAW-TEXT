[translation]
10089-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10089-CVGroup_CharacterGet_Idle1-1 = "So, what kind of commission do you have for me? Or is it a new business deal? Well, whatever it is... I'm glad you came, Sensei."
10089-CVGroup_Cafe_Idle1-1 = "Th-That person is...?! But it should be fine here, right...?"
10089-CVGroup_Cafe_Idle2-1 = "This place isn't too bad."
10089-CVGroup_Cafe_Idle3-1 = "I think it's time to take on a new project. Something big...and ambitious!"
10089-CVGroup_Cafe_Idle4-1 = "I wonder if I'll ever find a worthy business partner?"
10089-CVGroup_Cafe_Idle5-1 = "Hmm... How am I going to cover this month's operating expenses?"
10089-CVGroup_WeaponGet_Idle1-1 = "Despite spending so much time together, hearing you say \"I trust you\" still feels...strange. Even so... I'm looking forward to working with you, Sensei. That's all that needs to be said."
10089-CVGroup_UIEventLobby_Enter1-1 = "Time to go to work, Sensei."
10089-CVGroup_UIEventLobby_Enter2-1 = "Great timing. I have something to show you."
10089-CVGroup_UIEventLobby_Enter3-1 = "Would you look at the time..."
10089-CVGroup_UIEventLobby_Enter4-1 = "That was quick... Is it already over?"
10089-CVGroup_UIEventLobby_Enter5-1 = "Hang on until the very end."
10089-CVGroup_UIEventLobby_Idle1-1 = "Huh? Sensei? What's the matter?"
10089-CVGroup_UIEventLobby_Idle2-1 = "Sh-Shhh! Quiet!"
10089-CVGroup_UIEventLobby_Idle2-2 = "They'll find out about the infiltration!"
10089-CVGroup_UIEventLobby_Idle3-1 = "Eek?!"
10089-CVGroup_UIEventLobby_Idle3-2 = "Oh...it's just you, Sensei."
10089-CVGroup_UIEventLobby_Idle4-1 = "It's too dangerous here... Let's talk outside."
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Now then, shall we gather some clues?"
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Sensei, let's organize the documents."
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "Would you mind helping me?"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "I need to learn more about the target."
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "F-Focus, Sensei. No, not on me! On the documents!"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "H-Huh? You got something to say?"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Oh. So that's what it was."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "I understand completely."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "As expected of the business partner I've been scouting."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "We have the needed intel...but let's dig a bit deeper. Just in case."

[translation]
10089-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10089-CVGroup_CharacterGet_Idle1-1 = "哎呀，這次是什麼樣的委託呢？\n還是說，是商業提案？\n不過無論是什麼……你願意過來我都很高興哦，老師"
10089-CVGroup_Cafe_Idle1-1 = "那，那個人是……！？\n但如果是這裡應該沒問題吧……？"
10089-CVGroup_Cafe_Idle2-1 = "這裡的氛圍……\n我並不討厭。"
10089-CVGroup_Cafe_Idle3-1 = "是時候該完成一件\n規模大一點的工作……"
10089-CVGroup_Cafe_Idle4-1 = "哪裡會有適合\n的客戶呢……"
10089-CVGroup_Cafe_Idle5-1 = "唔嗯……這個月的營運費該怎麼辦呢……"
10089-CVGroup_WeaponGet_Idle1-1 = "都相處這麼久了。\n「相信你」這種話……已經不必多說了吧。\n嗯……之後也請多多指教，老師。\n……沒錯，這樣就已經夠了。"
10089-CVGroup_UIEventLobby_Enter1-1 = "來，工作的時間到囉，老師。"
10089-CVGroup_UIEventLobby_Enter2-1 = "來得正好，我有東西想給老師看。"
10089-CVGroup_UIEventLobby_Enter3-1 = "已經這麼晚了……"
10089-CVGroup_UIEventLobby_Enter4-1 = "時間過得真快。\n差不多該謝幕了嗎……？"
10089-CVGroup_UIEventLobby_Enter5-1 = "直到收尾都不能鬆懈哦。"
10089-CVGroup_UIEventLobby_Idle1-1 = "嗯……？老師？\n有什麼話想說嗎……？"
10089-CVGroup_UIEventLobby_Idle2-1 = "噓，噓！安靜一點！"
10089-CVGroup_UIEventLobby_Idle2-2 = "不然我們的潛入會被發現的……！"
10089-CVGroup_UIEventLobby_Idle3-1 = "噫噫……！？"
10089-CVGroup_UIEventLobby_Idle3-2 = "啊……這不是老師嗎。"
10089-CVGroup_UIEventLobby_Idle4-1 = "這，這裡不太妙……去外面說吧。"
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "那麼，來收集線索吧。"
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "老師，我想整理資料。"
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "可以跟我一起嗎？"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "目標的事，我還想多調查一下。"
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "專，專心一點！\n不，不是對我，是對資料！"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "呃，嗯？找，找我有什麼事嗎……？"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "啊啊，原來是那樣啊。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "我完全明白了。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "不愧是我看上的夥伴。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "雖然情報已經湊齊……\n以防萬一，再檢查一下吧。"

[translation]
10089-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10089-CVGroup_CharacterGet_Idle1-1 = "어머, 이번에는 어떤 의뢰? 아니면 비즈니스 제안일까?\n뭐 어느 쪽이든… 와줘서 기뻐, 선생님."
10089-CVGroup_Cafe_Idle1-1 = "저, 저 사람은……!? 하지만 여기라면… 괜찮겠지……?"
10089-CVGroup_Cafe_Idle2-1 = "여기 분위기… 싫지 않아."
10089-CVGroup_Cafe_Idle3-1 = "슬슬 큰일을 하나 멋지게 하고 싶은데……."
10089-CVGroup_Cafe_Idle4-1 = "어디 적당한 거래처, 없을까나……."
10089-CVGroup_Cafe_Idle5-1 = "음… 이번 달 운영비, 어쩌지……."
10089-CVGroup_WeaponGet_Idle1-1 = "오랜 시간을 보내왔는데. 신뢰한다, 라는 말…\n새삼스럽네. 그래… 앞으로도 잘 부탁해, 선생님.\n…응, 이것만으로 충분해."
10089-CVGroup_UIEventLobby_Enter1-1 = "자, 일할 시간이야. 선생님."
10089-CVGroup_UIEventLobby_Enter2-1 = "마침 잘 왔어. 선생님에게 보여줄 게 있거든."
10089-CVGroup_UIEventLobby_Enter3-1 = "벌써 시간이 이렇게……"
10089-CVGroup_UIEventLobby_Enter4-1 = "빠르네. 슬슬 막을 내리는 걸까……?"
10089-CVGroup_UIEventLobby_Enter5-1 = "마지막까지 손 떼면 안 돼."
10089-CVGroup_UIEventLobby_Idle1-1 = "음…? 선생님? 무슨 일이야?"
10089-CVGroup_UIEventLobby_Idle2-1 = "쉬, 쉿! 조용히!"
10089-CVGroup_UIEventLobby_Idle2-2 = "잠입이 들켜 버리잖아…!"
10089-CVGroup_UIEventLobby_Idle3-1 = "히익…!?"
10089-CVGroup_UIEventLobby_Idle3-2 = "아…. 선생님이잖아."
10089-CVGroup_UIEventLobby_Idle4-1 = "여, 여기는 위험해… 밖에서 이야기하자."
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "그럼, 단서를 모아볼까."
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "선생님, 자료를 정리하고 싶어."
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "어울려 줄 수 있을까?"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "타깃에 대해, 좀 더 알아보고 싶어."
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "지, 집중해. 아니, 나 말고, 자료에!"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "으, 으응? 뭔가 할 말이라도 있어……?"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "아아, 그런 거였구나."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "완전히, 이해했어."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "역시, 내가 눈여겨본 파트너야."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "정보는 갖추어졌지만… 만약을 위해, 조금 더 살펴보자."

[translation]
20024-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20024-CVGroup_CharacterGet_Idle1-1 = "สบายดีหรือเปล่าคะ? โฮสต์แห่งสภาน้ำชา\nโรงเรียนสามัญทรีนิตี้ คิริฟุจิ นางิสะค่ะ\nฉันจะพยายามช่วยเหลือคุณครูอย่างสุดความสามารถค่ะ"
20024-CVGroup_Cafe_Idle1-1 = "ฮุฮุ สบายดีหรือเปล่าคะ?"
20024-CVGroup_Cafe_Idle2-1 = "กลิ่นหอมกรุ่นของกาแฟ... บางครั้งก็ไม่ได้แย่สักเท่าไรนะคะ"
20024-CVGroup_Cafe_Idle3-1 = "(ที่นี่เป็นสถานที่รวมตัวของนักเรียนหลายคน\nถ้าไม่เตรียมตัวให้ดีละก็...)"
20024-CVGroup_Cafe_Idle4-1 = "ตายจริง... ขนมของว่างดูน่ารักจังเลยค่ะ"
20024-CVGroup_Cafe_Idle5-1 = "(เก้าอี้ที่นี่... ดูนุ่มนิ่มมากเลยนะคะ)"
20024-CVGroup_WeaponGet_Idle1-1 = "ฉันชอบใช้ปืนพกขนาดเล็กนี้มาก เพราะมันไม่เป็นอุปสรรค\nเวลาชงชาค่ะ แต่อาจไม่ค่อยมีประโยชน์สำหรับใช้ป้องกันตัว\nสักเท่าไร หากเกิดอะไรขึ้น... ต้องขอรบกวนด้วยนะคะ คุณครู"

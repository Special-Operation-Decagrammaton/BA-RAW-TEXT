[translation]
20024-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
20024-CVGroup_CharacterGet_Idle1-1 = "How are you? I'm Kirifuji Nagisa, host of the Tea Party at Trinity General School. I'll do my best to assist you."
20024-CVGroup_Cafe_Idle1-1 = "Heehee. How are you?"
20024-CVGroup_Cafe_Idle2-1 = "The aroma of coffee...is nice from time to time."
20024-CVGroup_Cafe_Idle3-1 = "(This place is full of students. I shouldn't let my guard down...)"
20024-CVGroup_Cafe_Idle4-1 = "Oh, those treats look so pretty."
20024-CVGroup_Cafe_Idle5-1 = "(The chairs here look quite comfortable.)"
20024-CVGroup_WeaponGet_Idle1-1 = "I've been carrying this pistol because it's small and doesn't interfere when I'm making tea, but I'm not sure how good it is for self-protection. If something happens...I'll be counting on you, Sensei."

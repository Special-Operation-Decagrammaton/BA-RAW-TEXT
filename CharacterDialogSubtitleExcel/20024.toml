[translation]
20024-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
20024-CVGroup_CharacterGet_Idle1-1 = "평안하신가요. 트리니티 종합학원, 티파티의 호스트를 맡고 있는 키리후지 나기사라고 합니다.\n미력하지만 선생님께 도움이 되도록 노력하겠습니다."
20024-CVGroup_Cafe_Idle1-1 = "후훗. 평안하신지요?"
20024-CVGroup_Cafe_Idle2-1 = "커피의 향도… 가끔은 나쁘지 않네요."
20024-CVGroup_Cafe_Idle3-1 = "(이곳은 많은 학생들이 모이는 장소. 더욱 정신을 바짝 차리지 않으면……)"
20024-CVGroup_Cafe_Idle4-1 = "어머나. 예쁜 모양의 다과로군요."
20024-CVGroup_Cafe_Idle5-1 = "(이곳의 의자는 꽤 푹신해보이는군요.)"
20024-CVGroup_WeaponGet_Idle1-1 = "이 권총은 크기가 작아, 차를 우리는 데 방해가 되지 않기 때문에 애용해 왔습니다만.\n호신의 목적으로는 그다지 도움이 되지 않을지도 모르겠네요. 만약의 경우에는……\n잘 부탁드리겠습니다, 선생님."

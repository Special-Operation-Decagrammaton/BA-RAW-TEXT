[translation]
20024-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
20024-CVGroup_CharacterGet_Idle1-1 = "貴安。我是三一綜合學園，擔任茶會主席的桐藤渚。\n儘管只是微薄之力，但我會盡力幫上老師的忙。"
20024-CVGroup_Cafe_Idle1-1 = "呵呵。貴安。"
20024-CVGroup_Cafe_Idle2-1 = "咖啡的香氣…\n偶爾這樣也不錯呢。"
20024-CVGroup_Cafe_Idle3-1 = "（這裡是許多學生聚集的地方，得更加繃緊神經才行……）"
20024-CVGroup_Cafe_Idle4-1 = "哎呀，真是可愛的茶點呢。"
20024-CVGroup_Cafe_Idle5-1 = "（這裡的椅子似乎相當柔軟呢）"
20024-CVGroup_WeaponGet_Idle1-1 = "因為這把手槍很小，在泡茶時不會造成妨礙，所以我一直都很喜歡。\n不過，它或許不太適合用來護身。\n若是有什麼萬一……就麻煩您了哦，老師。"

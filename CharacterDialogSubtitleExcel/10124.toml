[translation]
10124-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10124-CVGroup_CharacterGet_Idle1-1 = "Trinity General School, Justice Task Force— That was too formal for a beach. It's Hanekawa Hasumi. I look forward to our continued collaboration."
10124-CVGroup_Cafe_Idle1-1 = "For some reason, this outfit...seems to attract too much attention."
10124-CVGroup_Cafe_Idle2-1 = "This is the summer I WILL lose weight... Um, there are so many temptations here, though..."
10124-CVGroup_Cafe_Idle3-1 = "Adequate rest improves work efficiency. I understand the concept, but the execution is always..."
10124-CVGroup_Cafe_Idle4-1 = "I wonder why ordinary foods look so much more appealing on the beach..."
10124-CVGroup_Cafe_Idle5-1 = "Perhaps I should bring the other members next time..."
10124-CVGroup_WeaponGet_Idle1-1 = "I first joined the Justice Task Force with a single mission in mind. Somewhere along the way, I gained so many more precious things I wanted to protect. So, I vow to this gun that, as long as I am here, no harm will come your way, Sensei. I won't forgive anyone who tries."
10124-CVGroup_UIEventLobby_Enter1-1 = "I didn't expect to come to the beach like this."
10124-CVGroup_UIEventLobby_Enter1-2 = "Hm? I look excited?"
10124-CVGroup_UIEventLobby_Enter1-3 = "Fufu, perhaps so."
10124-CVGroup_UIEventLobby_Enter2-1 = "The mission hasn't changed, but the change in location brings a fresh feeling to it."
10124-CVGroup_UIEventLobby_Enter2-2 = "So I'm looking forward to the next couple of days."
10124-CVGroup_UIEventLobby_Enter3-1 = "Ah, Sensei. Have you seen Ichika and Mika by any chance?"
10124-CVGroup_UIEventLobby_Enter3-2 = "I haven't seen hide nor tail of them."
10124-CVGroup_UIEventLobby_Enter3-3 = "Could...something have happened to them?"
10124-CVGroup_UIEventLobby_Enter3-4 = "Even if you tell me to not worry and just enjoy..."
10124-CVGroup_UIEventLobby_Enter3-5 = "Well, I'll trust your words, Sensei."
10124-CVGroup_UIEventLobby_Enter4-1 = "I can't believe all that happened right under my nose."
10124-CVGroup_UIEventLobby_Enter4-2 = "I am bit ashamed. I was so caught up in enjoying myself that I neglected my duties."
10124-CVGroup_UIEventLobby_Enter4-3 = "You're glad I had fun?"
10124-CVGroup_UIEventLobby_Enter4-4 = "Only you would say that to me, Sensei."
10124-CVGroup_UIEventLobby_Enter5-1 = "Perhaps not exactly according to plan, but things still ended well."
10124-CVGroup_UIEventLobby_Enter5-2 = "You played an instrumental role in that, Sensei."
10124-CVGroup_UIEventLobby_Enter5-3 = "As a representative of the Justice Task Force, I would like to thank you once again."
10124-CVGroup_UIEventLobby_Enter5-4 = "Our Ichika has grown a little as well."
10124-CVGroup_UIEventLobby_Enter5-5 = "On a personal level, I'd also like to thank you for that."
10124-CVGroup_UIEventLobby_Idle1-1 = "Due to our own internal affairs, we're in your debt."
10124-CVGroup_UIEventLobby_Idle1-2 = "Even if you tell me to not worry about it..."
10124-CVGroup_UIEventLobby_Idle1-3 = "Well, I suppose that's what I'd expect you to say."
10124-CVGroup_UIEventLobby_Idle1-4 = "But I wanted to express how I felt, at the very least."
10124-CVGroup_UIEventLobby_Idle1-5 = "Thank you. Truly."
10124-CVGroup_UIEventLobby_Idle2-1 = "This event meant a lot to the Justice Task Force as a whole."
10124-CVGroup_UIEventLobby_Idle2-2 = "Because one day, she'll have to serve in this role on her own."
10124-CVGroup_UIEventLobby_Idle3-1 = "As you already know, public affairs are not Tsurugi's specialty."
10124-CVGroup_UIEventLobby_Idle3-2 = "Because of that, I ended up..."
10124-CVGroup_UIEventLobby_Idle3-3 = "...becoming the main point of communication with the Tea Party."
10124-CVGroup_UIEventLobby_Idle3-4 = "...Thinking about it, I've been serving those three for quite some time now."
10124-CVGroup_UIEventLobby_Idle4-1 = "To be honest, I'd given up on ever being able to visit the beach."
10124-CVGroup_UIEventLobby_Idle4-2 = "I really should thank Mika for this."

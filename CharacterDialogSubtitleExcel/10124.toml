[translation]
10124-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10124-CVGroup_CharacterGet_Idle1-1 = "三一綜合學園，實現正義部成員……\n不，在這種場合，過度正式的問候似乎不太合適呢。\n我是羽川蓮實。再次請您多多指教。"
10124-CVGroup_Cafe_Idle1-1 = "這副打扮……果然很顯眼呢。"
10124-CVGroup_Cafe_Idle2-1 = "這個夏天一定要減肥……\n話雖如此，這裡的誘惑實在太多了……"
10124-CVGroup_Cafe_Idle3-1 = "適當的休息能提升工作效率，\n雖然我也明白這點……"
10124-CVGroup_Cafe_Idle4-1 = "在海邊吃什麼都覺得好吃……\n究竟是為什麼呢？"
10124-CVGroup_Cafe_Idle5-1 = "下次再來的時候，邀請社團裡的大家一起來吧。"
10124-CVGroup_WeaponGet_Idle1-1 = "自從加入實現正義部以來，我想守護的東西始終不曾改變。\n不過……在這段時間裡，我想守護的對象變得越來越多了。\n我以這把槍發誓──只要我還活著，就不容許任何人傷害老師。"
10124-CVGroup_UIEventLobby_Enter1-1 = "沒想到竟然能來到海邊，真是始料未及。"
10124-CVGroup_UIEventLobby_Enter1-2 = "咦？看起來很開心？"
10124-CVGroup_UIEventLobby_Enter1-3 = "呵呵，這就任憑您想像了。"
10124-CVGroup_UIEventLobby_Enter2-1 = "場所不同，對任務的心情也會隨之改變呢。"
10124-CVGroup_UIEventLobby_Enter2-2 = "稍微，有點期待接下來的事了。"
10124-CVGroup_UIEventLobby_Enter3-1 = "啊，老師。\n您有看到彌香大人和一花嗎？"
10124-CVGroup_UIEventLobby_Enter3-2 = "從剛才開始就不見人影了。"
10124-CVGroup_UIEventLobby_Enter3-3 = "希望沒有被捲入什麼麻煩事……"
10124-CVGroup_UIEventLobby_Enter3-4 = "不必擔心……？"
10124-CVGroup_UIEventLobby_Enter3-5 = "既然老師這麼說了，我就相信您吧……"
10124-CVGroup_UIEventLobby_Enter4-1 = "沒想到，背後竟然發生了那樣的騷動。"
10124-CVGroup_UIEventLobby_Enter4-2 = "沒能察覺的自己真是令人羞愧。"
10124-CVGroup_UIEventLobby_Enter4-3 = "只要有樂在其中就行了……？"
10124-CVGroup_UIEventLobby_Enter4-4 = "會對我說這種話的，應該也只有老師了吧。"
10124-CVGroup_UIEventLobby_Enter5-1 = "雖然有些突發狀況，這次的任務也順利結束了。"
10124-CVGroup_UIEventLobby_Enter5-2 = "這都要感謝老師願意伸出援手。"
10124-CVGroup_UIEventLobby_Enter5-3 = "謹代表實現正義部，再次向您致上謝意。"
10124-CVGroup_UIEventLobby_Enter5-4 = "一花似乎也稍微有些改變了。"
10124-CVGroup_UIEventLobby_Enter5-5 = "真的非常感謝您。"
10124-CVGroup_UIEventLobby_Idle1-1 = "這次也變成依賴老師的結果了呢。"
10124-CVGroup_UIEventLobby_Idle1-2 = "不用在意，是嗎……"
10124-CVGroup_UIEventLobby_Idle1-3 = "畢竟是老師，我也想過您會這麼說……"
10124-CVGroup_UIEventLobby_Idle1-4 = "不過請至少，收下我的心意吧。"
10124-CVGroup_UIEventLobby_Idle1-5 = "真的，非常感謝您。"
10124-CVGroup_UIEventLobby_Idle2-1 = "對實現正義部而言，這次的計畫也具有重要的意義。"
10124-CVGroup_UIEventLobby_Idle2-2 = "畢竟那孩子，遲早也必須獨當一面。"
10124-CVGroup_UIEventLobby_Idle3-1 = "如您所知，弦生並不擅長折衝與交涉。"
10124-CVGroup_UIEventLobby_Idle3-2 = "因此，與茶會的聯絡，"
10124-CVGroup_UIEventLobby_Idle3-3 = "主要都是由我來負責的。"
10124-CVGroup_UIEventLobby_Idle3-4 = "……現在想想，與那三位的交情也算長久了。"
10124-CVGroup_UIEventLobby_Idle4-1 = "其實……我原本打算放棄來海邊的。"
10124-CVGroup_UIEventLobby_Idle4-2 = "得向彌香大人道謝才行呢。"

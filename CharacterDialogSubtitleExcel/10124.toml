[translation]
10124-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10124-CVGroup_CharacterGet_Idle1-1 = "ชมรมทวงความยุติธรรม โรงเรียนสามัญทรีนิตี้...\nไม่สิ... ได้มาทะเลทั้งที แต่ทักทายไม่สนุกเอาเสียเลยนะคะ\nฉันฮาเนกาวะ ฮาสุมิค่ะ  ขอฝากตัวอีกครั้งนะคะ"
10124-CVGroup_Cafe_Idle1-1 = "รู้สึกว่าฉันในชุดนี้... จะเตะตามากเกินไปนะคะ"
10124-CVGroup_Cafe_Idle2-1 = "ฤดูร้อนปีนี้ต้องลดน้ำหนักให้ได้...\nอืม ที่นี่มีของล่อตาล่อใจเยอะจังเลยนะคะ"
10124-CVGroup_Cafe_Idle3-1 = "การพักผ่อนที่เหมาะสมทำให้ทำงานได้มีประสิทธิภาพ\nฉันก็รู้ดีหรอกค่ะ แต่ฉันก็ทำงานตลอด..."
10124-CVGroup_Cafe_Idle4-1 = "อาหารธรรมดาๆ แต่ทำไมพออยู่ที่ทะเล\nถึงได้ดูน่าอร่อยแบบนี้ล่ะคะ..."
10124-CVGroup_Cafe_Idle5-1 = "ครั้งหน้าเห็นทีต้องพาสมาชิกคนอื่นมาบ้างแล้ว..."
10124-CVGroup_WeaponGet_Idle1-1 = "ตอนเข้าชมรมทวงความยุติธรรมครั้งแรก ฉันมีสิ่งที่อยากปกป้องค่ะ\nแต่เมื่อถึงจุดหนึ่ง หลายๆ สิ่งก็สำคัญกับฉัน จนฉันอยากปกป้องมากขึ้นค่ะ\nเพราะงั้น... ฉันขอสาบานกับปืนนี้ค่ะ ตราบใดที่ฉันยังอยู่ที่นี่\nจะไม่มีใครทำร้ายคุณครูได้ และไม่ว่าจะเป็นใคร ฉันจะไม่ให้อภัยทั้งนั้น"
10124-CVGroup_UIEventLobby_Enter1-1 = "ไม่คิดเลยนะคะว่าจะได้มาทะเลด้วยวิธีนี้"
10124-CVGroup_UIEventLobby_Enter1-2 = "คะ? ฉันดูตื่นเต้นเหรอคะ?"
10124-CVGroup_UIEventLobby_Enter1-3 = "ฮุฮุ บางทีก็อาจจะเป็นอย่างนั้นก็ได้นะคะ"
10124-CVGroup_UIEventLobby_Enter2-1 = "ต่อให้เป็นภารกิจเดิม แต่ถ้าเปลี่ยนสถานที่\nความรู้สึกก็เปลี่ยนได้ขนาดนี้เลยนะคะ"
10124-CVGroup_UIEventLobby_Enter2-2 = "ฉันเริ่มตั้งตารอภารกิจต่อไปแล้วละค่ะ"
10124-CVGroup_UIEventLobby_Enter3-1 = "อ๊ะ คุณครู เห็นอิจิกะกับคุณมิกะบ้างมั้ยคะ?"
10124-CVGroup_UIEventLobby_Enter3-2 = "ฉันไม่เห็นมาสักพักแล้วน่ะค่ะ"
10124-CVGroup_UIEventLobby_Enter3-3 = "จะมีปัญหาอะไรเกิดขึ้นหรือเปล่าคะ?"
10124-CVGroup_UIEventLobby_Enter3-4 = "ต่อให้บอกฉันว่าอย่ากังวลแล้วไปเล่นสนุกก็เถอะ..."
10124-CVGroup_UIEventLobby_Enter3-5 = "แต่คำพูดของคุณครูก็น่าจะถูกต้องละค่ะ"
10124-CVGroup_UIEventLobby_Enter4-1 = "คิดไม่ถึงเลยค่ะว่าจะเกิดเรื่องวุ่นวายแบบนั้น"
10124-CVGroup_UIEventLobby_Enter4-2 = "ฉันเหมือนจะลืมหน้าที่หลัก\nแล้วไปสนุกอยู่อย่างเดียวเลยน่าอายจังเลยค่ะ"
10124-CVGroup_UIEventLobby_Enter4-3 = "ค่อยยังชั่วที่ฉันได้สนุกสนานงั้นเหรอคะ?"
10124-CVGroup_UIEventLobby_Enter4-4 = "คนที่พูดแบบนั้นกับฉัน มีแค่คุณครูคนเดียวเท่านั้นค่ะ"
10124-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะต่างจากแผนไปบ้าง\nแต่ภารกิจนี้ก็จบลงอย่างราบรื่นนะคะ"
10124-CVGroup_UIEventLobby_Enter5-2 = "คุณครูช่วยไว้ได้เยอะมากเลยค่ะ"
10124-CVGroup_UIEventLobby_Enter5-3 = "ฉันขอขอบคุณอีกครั้งค่ะในฐานะตัวแทนชมรมทวงความยุติธรรมค่ะ"
10124-CVGroup_UIEventLobby_Enter5-4 = "อิจิกะของพวกเราก็ดูจะเปลี่ยนไปนิดหน่อยด้วยค่ะ"
10124-CVGroup_UIEventLobby_Enter5-5 = "ฉันขอขอบคุณเป็นการส่วนตัวนะคะ"
10124-CVGroup_UIEventLobby_Idle1-1 = "เราติดหนี้บุญคุณคุณครูด้วยเหตุผลภายในของพวกเราค่ะ"
10124-CVGroup_UIEventLobby_Idle1-2 = "ต่อให้จะบอกว่าไม่ต้องใส่ใจก็เถอะ..."
10124-CVGroup_UIEventLobby_Idle1-3 = "ฉันรู้ว่าคุณครูจะพูดอย่างนั้นอยู่แล้วค่ะ"
10124-CVGroup_UIEventLobby_Idle1-4 = "อย่างน้อยฉันก็อยากจะพูดคำคำนั้นค่ะ"
10124-CVGroup_UIEventLobby_Idle1-5 = "ขอบคุณจริงๆ นะคะ..."
10124-CVGroup_UIEventLobby_Idle2-1 = "แผนการนี้ก็มีความหมายกับชมรมทวงความยุติธรรมมากเลยค่ะ"
10124-CVGroup_UIEventLobby_Idle2-2 = "สักวันหนึ่งเด็กคนนั้นต้องทำงานเลขาฯ คนเดียวน่ะค่ะ"
10124-CVGroup_UIEventLobby_Idle3-1 = "ซึรุกิไม่เหมาะกับการทำงานกับภายนอกอย่างที่ทราบมาค่ะ"
10124-CVGroup_UIEventLobby_Idle3-2 = "เพราะอย่างนั้นงานเกี่ยวกับสภาน้ำชา"
10124-CVGroup_UIEventLobby_Idle3-3 = "ที่ได้รับผิดชอบน่ะค่ะ"
10124-CVGroup_UIEventLobby_Idle3-4 = "พอคิดแบบนั้น... ก็นานแล้วนะคะที่ฉันทำงานให้ 3 คนนั้น"
10124-CVGroup_UIEventLobby_Idle4-1 = "ที่จริงฉันเลิกคิดไปแล้วค่ะว่ามาทะเลแล้วจะได้เล่นสนุกสนาน"
10124-CVGroup_UIEventLobby_Idle4-2 = "คงจะต้องไปขอบคุณคุณมิกะแล้วละค่ะ"

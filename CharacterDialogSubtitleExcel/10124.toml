[translation]
10124-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10124-CVGroup_CharacterGet_Idle1-1 = "트리니티 종합학원, 정의실현부……\n……아니요, 모처럼 바다인데 멋없는 인사를 했네요. \n하네카와 하스미입니다. 다시 한번 잘 부탁드립니다."
10124-CVGroup_Cafe_Idle1-1 = "어쩐지, 이 모습은… 너무 눈에 띄는 것 같네요."
10124-CVGroup_Cafe_Idle2-1 = "이번 여름에야말로 체중 감량을…… 음, 여기는 유혹이 너무 많군요."
10124-CVGroup_Cafe_Idle3-1 = "적절한 휴식은 일의 능률을 향상시킨다.\n머리로는 알지만, 항상 실천이…."
10124-CVGroup_Cafe_Idle4-1 = "평범한 음식들이 바다에서는 왜 그렇게 매력적일까요…."
10124-CVGroup_Cafe_Idle5-1 = "다음번에는 부원들을 데리고 오는 것도……"
10124-CVGroup_WeaponGet_Idle1-1 = "처음 정의실현부에 들어올 때, 제게는 지키고자 하는 사명이 있었습니다.\n하지만 언젠가부터, 점점 많은 것이 소중해져, 더 많은 것을 지키고 싶어졌습니다.\n그러니까……. 이 총에 맹세합니다. 제가 있는 한, 누구도 선생님을 해치지 못한다고.\n그 누구라도 용서하지 않겠다고."
10124-CVGroup_UIEventLobby_Enter1-1 = "바다, 설마 이런 식으로 오게 될 줄은 몰랐군요."
10124-CVGroup_UIEventLobby_Enter1-2 = "네? 신나 보인다고요?"
10124-CVGroup_UIEventLobby_Enter1-3 = "후후, 어쩌면 그럴지도 모르겠네요."
10124-CVGroup_UIEventLobby_Enter2-1 = "같은 임무라고 해도, 장소가 바뀌는 것만으로 이렇게 다른 느낌이 드는군요."
10124-CVGroup_UIEventLobby_Enter2-2 = "조금, 앞으로의 일이 기대되기 시작했습니다."
10124-CVGroup_UIEventLobby_Enter3-1 = "아, 선생님. 혹시 이치카와 미카 님을 보셨습니까?"
10124-CVGroup_UIEventLobby_Enter3-2 = "한참 전부터 보이질 않아서요."
10124-CVGroup_UIEventLobby_Enter3-3 = "혹시 무슨 문제라도 생긴 걸까요?"
10124-CVGroup_UIEventLobby_Enter3-4 = "걱정하지 말고 즐기라고 하셔도……"
10124-CVGroup_UIEventLobby_Enter3-5 = "선생님 말씀이니, 틀림없겠습니다만."
10124-CVGroup_UIEventLobby_Enter4-1 = "설마, 뒤에서 그런 소동이 있었을 줄이야."
10124-CVGroup_UIEventLobby_Enter4-2 = "본분을 잊고, 즐기기만 한 것 같아서 부끄럽습니다."
10124-CVGroup_UIEventLobby_Enter4-3 = "잘 즐겼다고 하니, 다행이라고요?"
10124-CVGroup_UIEventLobby_Enter4-4 = "저한테 그렇게 말하는 사람은, 선생님밖에 안 계실 겁니다."
10124-CVGroup_UIEventLobby_Enter5-1 = "계획과는 다르지만, 이번 일정도 잘 마무리되었군요."
10124-CVGroup_UIEventLobby_Enter5-2 = "무엇보다 선생님의 공이 큽니다."
10124-CVGroup_UIEventLobby_Enter5-3 = "다시 한번 정의실현부를 대표해 감사드립니다."
10124-CVGroup_UIEventLobby_Enter5-4 = "저희 이치카도, 조금은 바뀐 듯하고요."
10124-CVGroup_UIEventLobby_Enter5-5 = "저 개인으로서도 감사의 말씀 드립니다."
10124-CVGroup_UIEventLobby_Idle1-1 = "저희 내부의 사정으로 선생님께 신세를 지게 되었습니다."
10124-CVGroup_UIEventLobby_Idle1-2 = "신경 쓰지 말라고 하셔도……."
10124-CVGroup_UIEventLobby_Idle1-3 = "물론, 선생님이시니 그리 말씀하실 줄은 알았습니다만."
10124-CVGroup_UIEventLobby_Idle1-4 = "적어도, 이 말만은 전하고 싶었습니다."
10124-CVGroup_UIEventLobby_Idle1-5 = "정말로 감사하다고요.."
10124-CVGroup_UIEventLobby_Idle2-1 = "정의실현부 내에서도, 이번 계획은 의미하는 바가 큽니다."
10124-CVGroup_UIEventLobby_Idle2-2 = "언젠가는 그 아이도, 홀로 서기를 해야 할 테니까요."
10124-CVGroup_UIEventLobby_Idle3-1 = "아시다시피 츠루기는 대외 업무가 특기는 아니라서요."
10124-CVGroup_UIEventLobby_Idle3-2 = "그러다 보니 티파티와의 업무도,"
10124-CVGroup_UIEventLobby_Idle3-3 = "주로 제가 전담하게 되었죠."
10124-CVGroup_UIEventLobby_Idle3-4 = "……그렇게 생각하면, 세 분을 모신 지도 꽤 되었네요."
10124-CVGroup_UIEventLobby_Idle4-1 = "사실, 저는 바다에 오는 것은 포기하고 있었습니다."
10124-CVGroup_UIEventLobby_Idle4-2 = "미카 님께는, 감사드리지 않으면 안 되겠네요."

23003-CVGroup_Cafe_Idle3-1 = "糖分不足…"
23003-CVGroup_Cafe_Idle4-1 = "這邊改成這樣，那邊改成那樣的話…\n好，馬上來改造看看吧！"
23003-CVGroup_Cafe_Idle5-1 = "呼嗯～嗯？\n啊啊，你問我在做什麼嗎？\n我在玩新的遊戲。"
23003-CVGroup_WeaponGet_Idle1-1 = "雖然是老舊的武器……不過這個武器承載著無法數值化的回憶。"

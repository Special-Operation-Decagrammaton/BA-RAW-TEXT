[translation]
23003-CVGroup_UITitle_Idle1-1 = "Blue Archive"
23003-CVGroup_CharacterGet_Idle1-1 = "ยินดีที่ได้รู้จัก\nฉันจะแสดงพลังแห่งมิลเลเนียมให้ดูเอง"
23003-CVGroup_Cafe_Idle1-1 = "เราทำให้มีแต่เครื่องดื่มชูกำลังออกมาจากตู้กดน้ำได้มั้ยนะ?"
23003-CVGroup_Cafe_Idle2-1 = "อืม... เรามานอนพักสักงีบแล้วค่อยทำต่อมั้ย?"
23003-CVGroup_Cafe_Idle3-1 = "ช่วงนี้ร่างกายต้องการน้ำตาลน่ะ..."
23003-CVGroup_Cafe_Idle4-1 = "ต้องซ่อมตรงนี้แล้วก็ปรับตรงนี้อีกหน่อย...\nเอาละ มาเริ่มสร้างกันเลย!"
23003-CVGroup_Cafe_Idle5-1 = "ว่าไงนะ...?\nฉันกำลังทำอะไรอยู่น่ะเหรอ?\nกำลังเล่นเกมที่เพิ่งเปิดตัวน่ะ"
23003-CVGroup_WeaponGet_Idle1-1 = "ถึงจะเป็นอาวุธเก่า... แต่ว่าอาวุธนี่...\nก็เต็มไปด้วยความทรงจำที่ประเมินค่าไม่ได้"

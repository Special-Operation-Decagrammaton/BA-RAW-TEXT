[translation]
23003-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
23003-CVGroup_CharacterGet_Idle1-1 = "만나서 반가워, 선생님. 밀레니엄의 힘을, 선생님에게 보여줄게."
23003-CVGroup_Cafe_Idle1-1 = "음료수 자판기에서 에너지 드링크만 나오게 만들 수는 없을까…?"
23003-CVGroup_Cafe_Idle2-1 = "으음…. 잠깐 한숨 자고 계속할까?"
23003-CVGroup_Cafe_Idle3-1 = "당분이 부족해…."
23003-CVGroup_Cafe_Idle4-1 = "여길 이렇게 고치고, 저길 저렇게 고치면…. 좋아. 바로 개조해볼까?"
23003-CVGroup_Cafe_Idle5-1 = "흐음… 응? 아, 무얼 하고 있었냐고? 신작 게임을 하고 있었어."
23003-CVGroup_WeaponGet_Idle1-1 = "낡은 무기지만… 이 무기에는 수치화할 수 없는 추억이 담겨있어."

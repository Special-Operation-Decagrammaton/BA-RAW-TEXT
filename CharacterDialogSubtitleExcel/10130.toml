[translation]
10130-CVGroup_UITitle_Idle1-1 = "Blue Archive. Fufu."
10130-CVGroup_CharacterGet_Idle1-1 = "Kakehashi Subaru here. If you have any issues, I'll help you to the best of my abilities. Well, in the Arius way."
10130-CVGroup_Cafe_Idle1-1 = "Cafe... It seems to be an expensive place."
10130-CVGroup_Cafe_Idle2-1 = "(Reminds me of... Water Time for some reason.)"
10130-CVGroup_Cafe_Idle3-1 = "I wonder...what that is."
10130-CVGroup_Cafe_Idle4-1 = "(I could rarely come to a place like this...)"
10130-CVGroup_Cafe_Idle5-1 = "Working at a cafe... I wonder if they're hiring."
10130-CVGroup_WeaponGet_Idle1-1 = "It still doesn't feel real to me... It feels like everything's going to disappear like a dream when I wake up in the morning... Thank you, Sensei. I'll cherish it."

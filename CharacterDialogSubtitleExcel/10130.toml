[translation]
10130-CVGroup_UITitle_Idle1-1 = "블루 아카이브. 군요. 후후."
10130-CVGroup_CharacterGet_Idle1-1 = "카케하시 스바루입니다. 문제가 있으시다면, 최대한 도와드리겠습니다.\n뭐, 아리우스의 방식으로 말이죠."
10130-CVGroup_Cafe_Idle1-1 = "카페…… 뭔가 비싸 보이는 곳이네요."
10130-CVGroup_Cafe_Idle2-1 = "(뭔가…… 워터 타임이 생각나네.)"
10130-CVGroup_Cafe_Idle3-1 = "저건…… 뭘까."
10130-CVGroup_Cafe_Idle4-1 = "(이런 곳에는 잘 오지 못했었지……)"
10130-CVGroup_Cafe_Idle5-1 = "카페 아르바이트…… 모집하고 있으려나?"
10130-CVGroup_WeaponGet_Idle1-1 = "아직, 전혀 실감이 나지 않아요…….\n아침에 눈을 뜨면 전부 꿈처럼 사라질 것 같아서……\n정말 감사합니다. 선생님. 소중히 할게요."

[translation]
10130-CVGroup_UITitle_Idle1-1 = "是蔚藍檔案，呵呵。"
10130-CVGroup_CharacterGet_Idle1-1 = "我是梯昴。\n遇到困難的時候，就讓我助你一臂之力吧。\n雖然……僅限於「奧利斯式」就是了。"
10130-CVGroup_Cafe_Idle1-1 = "咖啡廳……感覺是個很高級的地方。"
10130-CVGroup_Cafe_Idle2-1 = "（總覺得……讓我想起了Water Time）"
10130-CVGroup_Cafe_Idle3-1 = "那是……什麼呢。"
10130-CVGroup_Cafe_Idle4-1 = "（以前幾乎沒能來過這種地方呢……）"
10130-CVGroup_Cafe_Idle5-1 = "咖啡廳的打工……有沒有在招募呢？"
10130-CVGroup_WeaponGet_Idle1-1 = "現在還完全沒有實感……\n甚至每天早上醒來，都會擔心這會是不是一場夢……\n真的很謝謝你，老師。我會珍惜的。"

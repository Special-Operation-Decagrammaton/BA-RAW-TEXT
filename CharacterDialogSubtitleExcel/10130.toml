[translation]
10130-CVGroup_UITitle_Idle1-1 = "Blue Archive สินะคะ ฮุฮุ"
10130-CVGroup_CharacterGet_Idle1-1 = "คาเกฮาชิ สุบารุค่ะ\nถ้ามีปัญหาอะไร ฉันจะพยายามช่วยให้ได้มากที่สุดเลยค่ะ\nแต่ช่วยตามวิถีของอาเรียสนะคะ"
10130-CVGroup_Cafe_Idle1-1 = "คาเฟ่... เป็นที่ที่ดูแพงจังเลยนะคะ"
10130-CVGroup_Cafe_Idle2-1 = "(นึกถึง... วอเทอร์ ไทม์ขึ้นมาเลย)"
10130-CVGroup_Cafe_Idle3-1 = "อันนั้น... คืออะไรเหรอ?"
10130-CVGroup_Cafe_Idle4-1 = "(ที่แบบนี้เราไม่ได้มาบ่อยๆ เนอะ...)"
10130-CVGroup_Cafe_Idle5-1 = "งานพาร์ทไทม์ที่คาเฟ่... มีเปิดรับสมัครบ้างมั้ยนะ?"
10130-CVGroup_WeaponGet_Idle1-1 = "ฉันยังไม่รู้สึกว่าเป็นความจริงเลยค่ะ...\nเมื่อลืมตาในตอนเช้า มันเหมือนทุกอย่างจะหายไปราวกับความฝัน...\nขอบคุณมากนะคะ คุณครู ฉันจะรักษาอย่างดีเลยค่ะ"

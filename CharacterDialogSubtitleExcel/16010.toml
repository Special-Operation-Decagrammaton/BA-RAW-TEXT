[translation]
16010-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브…!"
16010-CVGroup_CharacterGet_Idle1-1 = "선생님… 어, 어때…?\n치어리더 의상을 만들어본 건 처음이긴 한데…. 그렇게 나쁘지는… 않지?"
16010-CVGroup_Cafe_Idle1-1 = "응원이 필요한 사람… 있어?"
16010-CVGroup_Cafe_Idle2-1 = "이런 떠들썩한 분위기… 나쁘진 않아."
16010-CVGroup_Cafe_Idle3-1 = "힘드네… 조금 목이 탈지도."
16010-CVGroup_Cafe_Idle4-1 = "저 물건은… 조금 개조해볼까?"
16010-CVGroup_Cafe_Idle5-1 = "여기쯤이 좋을까? 아니면… 여기?"
16010-CVGroup_WeaponGet_Idle1-1 = "고마워, 선생님. 그리고 앞으로 계속 보여줄게.\n…지금까지 보지 못했던 새로운 광경을."
16010-CVGroup_UIEventLobby_Enter1-1 = "이런 차림은 조금 어색하지만…"
16010-CVGroup_UIEventLobby_Enter1-2 = "그래도 <황륜대제>의 성공을 위해서라면…"
16010-CVGroup_UIEventLobby_Enter2-1 = "후후, 즐거운 축제가 되었으면 좋겠네."
16010-CVGroup_UIEventLobby_Enter3-1 = "(치어리딩은 아무리 연습해도 좀처럼 익숙해지질 않네…)"
16010-CVGroup_UIEventLobby_Enter4-1 = "<황륜대제> 준비도 거의 끝난 것 같아. 조금만 더… 힘내자."
16010-CVGroup_UIEventLobby_Enter5-1 = "도와줘서 고마워, 선생님."
16010-CVGroup_UIEventLobby_Enter5-2 = "본 경기에서도 우리의 응원을 기대해줘."
16010-CVGroup_UIEventLobby_Idle1-1 = "히, 힘내라, 힘내라… 선생님…!"
16010-CVGroup_UIEventLobby_Idle2-1 = "내가 만든 옷이긴 하지만… 다들… 신경 쓰이지 않는 걸까…"
16010-CVGroup_UIEventLobby_Idle3-1 = "이 옷의 꼬리 부분이 신경 쓰인다고…?"
16010-CVGroup_UIEventLobby_Idle3-2 = "지금은… 말하기 곤란하지만…"
16010-CVGroup_UIEventLobby_Idle3-3 = "나중에 몰래 구조를 가르쳐 줄게…"
16010-CVGroup_UIEventLobby_Idle4-1 = "역시 열정을 불태우는 건… 로망이야."
16010-CVGroup_UIEventShop_Enter1-1 = "선생님, 어서 와. <황륜대제> 준비에 필요한 자재를 모으는 중이야."
16010-CVGroup_UIEventShop_Enter2-1 = "<황륜대제> 준비에 필요한 물자는 이쪽에 모아줘."
16010-CVGroup_UIEventShop_Idle1-1 = "응? 무슨 일이야?"
16010-CVGroup_UIEventShop_Idle2-1 = "저기… 응원이라면 나중에 해줄게. 지금은 조금…"
16010-CVGroup_UIEventShop_Buy1-1 = "음, 좋은 물건이네. 도와줘서 고마워."
16010-CVGroup_UIEventShop_Buy2-1 = "작은 성의지만… 도와준 답례야. 받아주었으면 좋겠어."
16010-CVGroup_UIEventShop_Buy3-1 = "이거라면… 모두가 좋아할 거야."
16010-CVGroup_UIEventShop_Buy4-1 = "큰 도움이 되었어. 고마워, 선생님."
16010-CVGroup_UIEventShop_Enter3-1 = "수고 많았어, 선생님. 혹시라도 남은 물자가 있다면 내가 바꿔줄게."

[translation]
16010-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案…！"
16010-CVGroup_CharacterGet_Idle1-1 = "老師…如，如何…？\n我第一次做的啦啦隊服……應該還不錯吧？"
16010-CVGroup_Cafe_Idle1-1 = "有人需要加油嗎…？"
16010-CVGroup_Cafe_Idle2-1 = "這種熱鬧的氣氛…還不錯。"
16010-CVGroup_Cafe_Idle3-1 = "好累…大概是有點口渴了。"
16010-CVGroup_Cafe_Idle4-1 = "那個…試著改造一下吧？"
16010-CVGroup_Cafe_Idle5-1 = "在這附近可以嗎？\n還是…這附近呢？"
16010-CVGroup_WeaponGet_Idle1-1 = "謝謝你，老師…我以後會繼續讓你看到。\n…至今從未見過的，新景色。"
16010-CVGroup_UIEventLobby_Enter1-1 = "這副打扮，雖然還有點不習慣…"
16010-CVGroup_UIEventLobby_Enter1-2 = "但如果是為了「晄輪大祭」的成功…"
16010-CVGroup_UIEventLobby_Enter2-1 = "呵呵，希望會是一場歡樂的慶典。"
16010-CVGroup_UIEventLobby_Enter3-1 = "（不管練習多少次，都不太習慣當應援團…）"
16010-CVGroup_UIEventLobby_Enter4-1 = "「晄輪大祭」的準備已經接近尾聲了。\n還剩一點點…再加把勁吧。"
16010-CVGroup_UIEventLobby_Enter5-1 = "謝謝你的幫忙，老師。"
16010-CVGroup_UIEventLobby_Enter5-2 = "在慶典正式開始時，也要享受我們的應援唷。"
16010-CVGroup_UIEventLobby_Idle1-1 = "加，加油，加油…！老師！"
16010-CVGroup_UIEventLobby_Idle2-1 = "雖然是我做的衣服…但大家…都不在意嗎…"
16010-CVGroup_UIEventLobby_Idle3-1 = "你說你很在意這件衣服的尾巴附近…？"
16010-CVGroup_UIEventLobby_Idle3-2 = "現在…有點不方便說…"
16010-CVGroup_UIEventLobby_Idle3-3 = "之後會再偷偷告訴你構造的…"
16010-CVGroup_UIEventLobby_Idle4-1 = "燃燒熱情…果然很浪漫呢。"
16010-CVGroup_UIEventShop_Enter1-1 = "老師，歡迎光臨。我正在收集「晄輪大祭」需要的東西。"
16010-CVGroup_UIEventShop_Enter2-1 = "請把「晄輪大祭」需要的物資帶回這裡。"
16010-CVGroup_UIEventShop_Idle1-1 = "嗯？怎麼了？"
16010-CVGroup_UIEventShop_Idle2-1 = "那個…之後再為你應援。\n現在有點…"
16010-CVGroup_UIEventShop_Buy1-1 = "嗯，真是好東西啊。\n謝謝你的幫忙。"
16010-CVGroup_UIEventShop_Buy2-1 = "雖然不成敬意…這是感謝協助的謝禮。\n希望你能收下。"
16010-CVGroup_UIEventShop_Buy3-1 = "這樣的話…我想大家都會高興的。"
16010-CVGroup_UIEventShop_Buy4-1 = "幫大忙了唷。謝謝你，老師。"
16010-CVGroup_UIEventShop_Enter3-1 = "辛苦了，老師。\n如果有剩餘的物資，我可以幫你兌換。"

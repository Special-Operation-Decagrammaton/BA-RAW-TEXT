[translation]
16010-CVGroup_UITitle_Idle1-1 = "B-Blue Archive...!"
16010-CVGroup_CharacterGet_Idle1-1 = "Sensei... Um, uh, wh-what do you think? This is my first time making a cheerleader outfit... It's not too bad, right?"
16010-CVGroup_Cafe_Idle1-1 = "Anyone here need, um...cheering?"
16010-CVGroup_Cafe_Idle2-1 = "This rowdy atmosphere... It's not all that bad."
16010-CVGroup_Cafe_Idle3-1 = "Who knew cheering was so tiring...? I'm a little thirsty."
16010-CVGroup_Cafe_Idle4-1 = "Hmm... Maybe I should tinker with this just a bit?"
16010-CVGroup_Cafe_Idle5-1 = "Is up to here good? Or...here?"
16010-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei. I'll keep showing you things you've never even imagined."
16010-CVGroup_UIEventLobby_Enter1-1 = "Dressing like this is a bit..."
16010-CVGroup_UIEventLobby_Enter1-2 = "I just need to keep in mind that this outfit is for the sake of the Kivotos Halo Festival..."
16010-CVGroup_UIEventLobby_Enter2-1 = "Heehee. I'm looking forward to a fun festival."
16010-CVGroup_UIEventLobby_Enter3-1 = "(I can't seem to get comfortable with cheerleading no matter how much I practice...)"
16010-CVGroup_UIEventLobby_Enter4-1 = "Preparations for the Kivotos Halo Festival are almost set. Just one last push..."
16010-CVGroup_UIEventLobby_Enter5-1 = "Thank you for all your help, Sensei."
16010-CVGroup_UIEventLobby_Enter5-2 = "Whatever happens, our cheers won't let you down."
16010-CVGroup_UIEventLobby_Idle1-1 = "S-Sensei! Sensei! You're o-our star! Time for g-gunplay... We'll go far!"
16010-CVGroup_UIEventLobby_Idle2-1 = "I did make the outfit, but...maybe... Do people...not like it?"
16010-CVGroup_UIEventLobby_Idle3-1 = "...The back?"
16010-CVGroup_UIEventLobby_Idle3-2 = "Hmm... Not now."
16010-CVGroup_UIEventLobby_Idle3-3 = "But I'll explain more later..."
16010-CVGroup_UIEventLobby_Idle4-1 = "I always knew that romance...is what sets passion alight."
16010-CVGroup_UIEventShop_Enter1-1 = "Welcome, Sensei. For now, we need to gather supplies needed for the Kivotos Halo Festival."
16010-CVGroup_UIEventShop_Enter2-1 = "Anything we need for the Kivotos Halo Festival should be brought here."
16010-CVGroup_UIEventShop_Idle1-1 = "Hm? What's the matter?"
16010-CVGroup_UIEventShop_Idle2-1 = "Cheering... I'll cheer for you later, I promise. Right now I'm still a bit..."
16010-CVGroup_UIEventShop_Buy1-1 = "Good job. Thank you for helping."
16010-CVGroup_UIEventShop_Buy2-1 = "It's just a small token of my appreciation. I hope you like it."
16010-CVGroup_UIEventShop_Buy3-1 = "This... Anyone would love this."
16010-CVGroup_UIEventShop_Buy4-1 = "You helped out a lot. Thank you, Sensei."
16010-CVGroup_UIEventShop_Enter3-1 = "Thank you, Sensei. If you have anything left over, I can exchange it for you."

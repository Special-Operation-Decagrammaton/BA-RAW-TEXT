[translation]
16010-CVGroup_UITitle_Idle1-1 = "Blue Archive...!"
16010-CVGroup_CharacterGet_Idle1-1 = "คุณครู... ปะ...เป็นไงบ้าง?\nฉันเพิ่งตัดชุดเชียร์ลีดเดอร์ครั้งแรก...\nแต่มันคง... ไม่ได้แย่เกินไปใช่มั้ย?"
16010-CVGroup_Cafe_Idle1-1 = "มะ... มีใครอยากได้กำลังใจมั้ย?"
16010-CVGroup_Cafe_Idle2-1 = "บรรยากาศเสียงดังอึกทึกแบบนี้... ก็ไม่แย่เท่าไร"
16010-CVGroup_Cafe_Idle3-1 = "เหนื่อยจัง... เจ็บคอแล้วด้วย"
16010-CVGroup_Cafe_Idle4-1 = "ของชิ้นนั้น... ลองเอามาปรับแต่งดีมั้ย?"
16010-CVGroup_Cafe_Idle5-1 = "ตรงนี้ดีมั้ยนะ? หรือว่า... ตรงนี้?"
16010-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณนะ คุณครู\nต่อไปฉันจะให้คุณครูได้เห็นอีกเรื่อยๆ เลย\nพวกภาพลักษณ์ใหม่ๆ ที่ไม่เคยแสดงให้เห็นมาก่อน"
16010-CVGroup_UIEventLobby_Enter1-1 = "พอแต่งตัวแบบนี้... มันดูน่าอายนิดหน่อย..."
16010-CVGroup_UIEventLobby_Enter1-2 = "แต่เพื่อความสำเร็จของ <ฮาโลเฟสติวัล> แล้ว..."
16010-CVGroup_UIEventLobby_Enter2-1 = "ฮุฮุ หวังว่าจะเป็นเทศกาลที่สนุกนะ"
16010-CVGroup_UIEventLobby_Enter3-1 = "(ไม่ว่าจะฝึกแค่ไหน แต่ก็ยังไม่ชินกับเชียร์ลีดเดอร์เท่าไรเลย...)"
16010-CVGroup_UIEventLobby_Enter4-1 = "<ฮาโลเฟสติวัล> น่าจะเตรียมใกล้เสร็จหมดแล้ว\nมาออกแรงสู้... อีกนิดเถอะ"
16010-CVGroup_UIEventLobby_Enter5-1 = "ขอบคุณที่ช่วยนะ คุณครู"
16010-CVGroup_UIEventLobby_Enter5-2 = "แล้วพวกฉันจะเชียร์ในการแข่งกีฬานี้นะ"
16010-CVGroup_UIEventLobby_Idle1-1 = "สะ... สู้ๆ\nสู้เขานะ... คุณครู...!"
16010-CVGroup_UIEventLobby_Idle2-1 = "ชุดนี้ฉันทำขึ้นเอง... แต่คนอื่นจะคิดว่ามันมากไปมั้ยนะ..."
16010-CVGroup_UIEventLobby_Idle3-1 = "รู้สึกกังวลเรื่องหางของฉันเหรอ...?"
16010-CVGroup_UIEventLobby_Idle3-2 = "จะให้พูดตอนนี้... ก็ยังไงๆ อยู่..."
16010-CVGroup_UIEventLobby_Idle3-3 = "ไว้ฉันจะแอบไปแก้ชุดให้ใหม่นะ..."
16010-CVGroup_UIEventLobby_Idle4-1 = "ความปรารถนาของฉันคือแพชชั่นที่แรงกล้า..."
16010-CVGroup_UIEventShop_Enter1-1 = "เข้ามาสิคุณครู ฉันเตรียมของที่จำเป็นของฮาโลเฟสติวัลอยู่"
16010-CVGroup_UIEventShop_Enter2-1 = "ช่วยเอาของจำเป็นของฮาโลเฟสติวัลไว้ทางนี้ให้ทีนะ"
16010-CVGroup_UIEventShop_Idle1-1 = "หืม? มีเรื่องอะไรเหรอ?"
16010-CVGroup_UIEventShop_Idle2-1 = "เอ่อ... ถ้าเป็นเรื่องเชียร์ ฉันจะทำให้ทีหลัง\nคือว่าตอนนี้มัน..."
16010-CVGroup_UIEventShop_Buy1-1 = "อื้ม ของชิ้นนี้ดีเลย ขอบคุณที่ช่วยนะ"
16010-CVGroup_UIEventShop_Buy2-1 = "ของตอบแทนเล็ก ๆ น้อย ๆ น่ะ...\nตอบแทนที่มาช่วยกัน ช่วยรับไว้หน่อยนะ"
16010-CVGroup_UIEventShop_Buy3-1 = "ถ้าเป็นอันนี้ละก็... ทุกคนต้องชอบแน่ๆ"
16010-CVGroup_UIEventShop_Buy4-1 = "ช่วยได้มากเลยละ ขอบคุณนะคุณครู"
16010-CVGroup_UIEventShop_Enter3-1 = "ทำได้ดีมากคุณครู ถ้ามีของอะไรเหลืออีก ฉันจะเอาไปแลกให้นะ"

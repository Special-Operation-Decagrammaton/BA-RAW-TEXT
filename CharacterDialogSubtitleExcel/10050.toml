[translation]
10050-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10050-CVGroup_CharacterGet_Idle1-1 = "ฝ่ายสนับสนุนด้านวินัยแห่ง 'สวนต้นบ๊วย' โคโคน่าค่ะ!\nมะ...ไม่นะคะ! เห็นแบบนี้ฉันก็เป็นผู้ฝึกสอนที่องอาจนะคะ!"
10050-CVGroup_Cafe_Idle1-1 = "นี่มันอะไรน่ะ...?"
10050-CVGroup_Cafe_Idle2-1 = "มีของที่ดูแปลกตาเยอะแยะเลยนะคะ"
10050-CVGroup_Cafe_Idle3-1 = "อืม... อยากเอาอันนั้น\nไปไว้ที่สวนต้นบ๊วยบ้างจัง"
10050-CVGroup_Cafe_Idle4-1 = "พี่ชุน... หายไปไหนกันนะ...?"
10050-CVGroup_Cafe_Idle5-1 = "ดูเป็นประโยชน์... กับพวกเด็กๆ ดีเลยละค่ะ"
10050-CVGroup_WeaponGet_Idle1-1 = "บางครั้งก็ต้องเข้มงวด บางครั้งก็ใจดี...\nฉันคิดว่าการวางตัวให้เหมาะสม\nคือการเป็นผู้ฝึกสอนที่ดีค่ะ\nเพราะงั้นฉันก็จะทำแบบนั้นค่ะ!"

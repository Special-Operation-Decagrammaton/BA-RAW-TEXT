[translation]
10050-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10050-CVGroup_CharacterGet_Idle1-1 = "我是培育支援部「梅花園」的心菜！\n不，不是啦！我是一名合格的教官唷！？"
10050-CVGroup_Cafe_Idle1-1 = "這個，\n到底是……？"
10050-CVGroup_Cafe_Idle2-1 = "總覺得有很多\n奇怪的東西呢。"
10050-CVGroup_Cafe_Idle3-1 = "這個，梅花園\n也想要呢……"
10050-CVGroup_Cafe_Idle4-1 = "旬姐姐，\n跑去哪裡了……？"
10050-CVGroup_Cafe_Idle5-1 = "這似乎對教育有幫助。"
10050-CVGroup_WeaponGet_Idle1-1 = "有時嚴格、有時善良……\n該做的時候就要做到最好，我認為那樣才是好的教官。我也要變成那樣！"

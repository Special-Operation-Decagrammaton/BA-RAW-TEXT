[translation]
10125-CVGroup_UITitle_Idle1-1 = "Nyuhuhu, Blue Archive!"
10125-CVGroup_CharacterGet_Idle1-1 = "I'm Shirao Eri, of Wildhunt Art Academy's Occult Society.\nThe world is full of magic. Yes, even this meeting!"
10125-CVGroup_Cafe_Idle1-1 = "I wonder if there'll be a poltergeist phenomenon somewhere..."
10125-CVGroup_Cafe_Idle2-1 = "Oh, I feel inspiration for my magic spells residing here!"
10125-CVGroup_Cafe_Idle3-1 = "I can sense strong mana coming from here."
10125-CVGroup_Cafe_Idle4-1 = "Nyuhuhu... An outing is so exciting!"
10125-CVGroup_Cafe_Idle5-1 = "If this was my atelier...I could create a masterpiece!"
10125-CVGroup_WeaponGet_Idle1-1 = "Nyuhuhu, this is my exclusive magic wand! I'll repay you with even more perfect magic!"
10125-CVGroup_UIEventLobby_Enter1-1 = "The one guided by the Arcana. This way."
10125-CVGroup_UIEventLobby_Enter2-1 = "Now then, let us uncover the secret that lies beneath Wildhunt..."
10125-CVGroup_UIEventLobby_Enter2-2 = "You and I, together."
10125-CVGroup_UIEventLobby_Enter3-1 = "Um, I can't let the Prefectural Council find out about my plan..."
10125-CVGroup_UIEventLobby_Enter4-1 = "Just a little more! Let us welcome the finale with no regrets!"
10125-CVGroup_UIEventLobby_Enter5-1 = "Next time too..."
10125-CVGroup_UIEventLobby_Enter5-2 = "I want to create an incredible piece of art with you, Master!"
10125-CVGroup_UIEventLobby_Idle1-1 = "Nyuhuhu, are you interested in magic?"
10125-CVGroup_UIEventLobby_Idle2-1 = "Master, would you like me to read your fortune?"
10125-CVGroup_UIEventLobby_Idle2-2 = "For free, of course."
10125-CVGroup_UIEventLobby_Idle2-3 = "Just let me know!"
10125-CVGroup_UIEventLobby_Idle3-1 = "P-Please don't touch my hat."
10125-CVGroup_UIEventLobby_Idle3-2 = "This is the symbol of a magician, so it should never come off!"
10125-CVGroup_UIEventLobby_Idle4-1 = "Ah, I made a magic engraving over there...!"
10125-CVGroup_UIEventLobby_Idle4-2 = "If you keep touching it... It might explode. Nyuhuhu."
10125-CVGroup_UIEventShop_Enter1-1 = "Now then, let us get our hands on the magic tools!"
10125-CVGroup_UIEventShop_Enter2-1 = "Oh, these items... I can feel their magic power just by looking at them...!"
10125-CVGroup_UIEventShop_Enter3-1 = "I can't get magic tools from here anymore..."
10125-CVGroup_UIEventShop_Enter3-2 = "...but that's okay!"
10125-CVGroup_UIEventShop_Enter3-3 = "Whether it's memories with you or magic tools..."
10125-CVGroup_UIEventShop_Enter3-4 = "...I'll have more and more of them in the future!"
10125-CVGroup_UIEventShop_Idle1-1 = "Was there anything to your liking?"
10125-CVGroup_UIEventShop_Idle2-1 = "I'm looking forward to seeing your style, Master!"
10125-CVGroup_UIEventShop_Buy1-1 = "Oh my, this item is full of magic powers!"
10125-CVGroup_UIEventShop_Buy2-1 = "I'd expect nothing less! You have good taste!"
10125-CVGroup_UIEventShop_Buy3-1 = "Let's test it out right now!"
10125-CVGroup_UIEventShop_Buy4-1 = "Ah, I thought that was a good one too!"

[translation]
10125-CVGroup_UITitle_Idle1-1 = "妞呵呵～蔚藍檔案！"
10125-CVGroup_CharacterGet_Idle1-1 = "我是狂獵藝術學院，神秘學研究會的白尾繪梨。\n世界裡充滿了魔法。沒錯，就像這場邂逅一樣！"
10125-CVGroup_Cafe_Idle1-1 = "會不會在某個地方發生騷靈現象呢……"
10125-CVGroup_Cafe_Idle2-1 = "妞呵……感覺能浮現新的魔法……"
10125-CVGroup_Cafe_Idle3-1 = "呣呣……感知到濃厚的魔力囉。"
10125-CVGroup_Cafe_Idle4-1 = "妞呵呵……外出真讓人興奮呢！"
10125-CVGroup_Cafe_Idle5-1 = "把這裡當成工房的話……說不定能誕生出傑作……！"
10125-CVGroup_WeaponGet_Idle1-1 = "妞呵呵呵，是我專用的魔法杖！\n我一定會用完美的魔法回應你的期待！"
10125-CVGroup_UIEventLobby_Enter1-1 = "受阿爾克那引導之人啊……請到這邊來。"
10125-CVGroup_UIEventLobby_Enter2-1 = "來，沉睡於狂獵的祕密……"
10125-CVGroup_UIEventLobby_Enter2-2 = "就讓我們一起解開吧。"
10125-CVGroup_UIEventLobby_Enter3-1 = "嗚嗚……拜託別被舍監隊發現……"
10125-CVGroup_UIEventLobby_Enter4-1 = "還差一點！\n一起迎接無悔的終曲吧！"
10125-CVGroup_UIEventLobby_Enter5-1 = "御者！再一起……"
10125-CVGroup_UIEventLobby_Enter5-2 = "創造出精彩的藝術吧！"
10125-CVGroup_UIEventLobby_Idle1-1 = "妞呵呵，對魔法有興趣嗎？"
10125-CVGroup_UIEventLobby_Idle2-1 = "御者，要不要我幫你占卜？"
10125-CVGroup_UIEventLobby_Idle2-2 = "當然不需要任何報酬。"
10125-CVGroup_UIEventLobby_Idle2-3 = "請隨時跟我說！"
10125-CVGroup_UIEventLobby_Idle3-1 = "帽，帽子不行啦。"
10125-CVGroup_UIEventLobby_Idle3-2 = "這，這是魔法使的象徵……所以不能脫下來！"
10125-CVGroup_UIEventLobby_Idle4-1 = "啊，那裡有魔法刻印……！"
10125-CVGroup_UIEventLobby_Idle4-2 = "一直戳的話……可能會暴走哦。\n妞呵呵。"
10125-CVGroup_UIEventShop_Enter1-1 = "來，取得魔道具吧！"
10125-CVGroup_UIEventShop_Enter2-1 = "哦哦，這個商品陣容……光看就感覺魔力已經……！"
10125-CVGroup_UIEventShop_Enter3-1 = "雖然這裡已經不能再收集魔道具了，"
10125-CVGroup_UIEventShop_Enter3-2 = "不過沒關係！"
10125-CVGroup_UIEventShop_Enter3-3 = "與御者的回憶，還有魔道具，"
10125-CVGroup_UIEventShop_Enter3-4 = "接下來都能找到更多！"
10125-CVGroup_UIEventShop_Idle1-1 = "有看到喜歡的東西嗎？"
10125-CVGroup_UIEventShop_Idle2-1 = "御者的審美，我很期待！"
10125-CVGroup_UIEventShop_Buy1-1 = "這個能感受到強大的魔力呢……！"
10125-CVGroup_UIEventShop_Buy2-1 = "不愧是御者！眼光真好！"
10125-CVGroup_UIEventShop_Buy3-1 = "那麼，趕緊來試試看吧！"
10125-CVGroup_UIEventShop_Buy4-1 = "啊，我也覺得那個不錯！"

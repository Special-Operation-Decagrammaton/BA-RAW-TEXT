[translation]
10125-CVGroup_UITitle_Idle1-1 = "ฮุฮุฮุ Blue Archive!"
10125-CVGroup_CharacterGet_Idle1-1 = "ชิราโอะ เอริจากชมรมวิจัยรหัสยศาสตร์ สถาบันศิลปะไวลด์ฮันต์ค่ะ\nโลกนี้เต็มไปด้วยเวทมนตร์\nใช่แล้วค่ะ เหมือนการพบกันในครั้งนี้ไงล่ะคะ!"
10125-CVGroup_Cafe_Idle1-1 = "ไม่มีปรากฏการณ์โพลเทอร์ไกสต์เกิดขึ้นเลยเหรอ..."
10125-CVGroup_Cafe_Idle2-1 = "โอ้... เป็นที่ที่เหมือนทำให้นึกถึงคาถาเวทบางอย่างได้เลย"
10125-CVGroup_Cafe_Idle3-1 = "สัมผัสได้ถึงมานาที่รุนแรงได้จากที่นี่ค่ะ"
10125-CVGroup_Cafe_Idle4-1 = "อุฮุฮุ ตื่นเต้นจังเลยค่ะ ที่จะได้ออกไปข้างนอก"
10125-CVGroup_Cafe_Idle5-1 = "ถ้าใช้ที่นี่เป็นสตูดิโอทำงานละก็...\nอาจทำผลงานชิ้นเอกได้เลยนะ...!"
10125-CVGroup_WeaponGet_Idle1-1 = "อุฮุฮุ ไม้กายสิทธิ์ของฉันสินะ!\nฉันจะตอบแทนด้วยเวทมนตร์ที่สมบูรณ์แบบเองค่ะ!"
10125-CVGroup_UIEventLobby_Enter1-1 = "ผู้ถูกนำทางภายใต้การชี้นำของอาร์คาน่าเอ๋ย เชิญทางนี้"
10125-CVGroup_UIEventLobby_Enter2-1 = "เอาละ มาเปิดเผยความลับที่หลับใหลอยู่ที่..."
10125-CVGroup_UIEventLobby_Enter2-2 = "ไวลด์ฮันต์กันเถอะ"
10125-CVGroup_UIEventLobby_Enter3-1 = "อืม... ปฏิบัติการครั้งนี้จะให้ฝ่ายดูแลหอพัก\nรู้ไม่ได้เด็ดขาด..."
10125-CVGroup_UIEventLobby_Enter4-1 = "อีกนิดเดียวเท่านั้นเราก็จะได้พบกับบทสรุป\nที่จะไม่มีวันเสียใจภายหลัง!"
10125-CVGroup_UIEventLobby_Enter5-1 = "คราวหน้า..."
10125-CVGroup_UIEventLobby_Enter5-2 = "ฉันอยากสร้างสรรค์ผลงานที่ยอดเยี่ยม\nร่วมกับมาสเตอร์อีกค่ะ"
10125-CVGroup_UIEventLobby_Idle1-1 = "อุฮุฮุ สนใจเรื่องเวทมนตร์เหรอคะ?"
10125-CVGroup_UIEventLobby_Idle2-1 = "มาสเตอร์ ฉันดูดวงให้มั้ยคะ?"
10125-CVGroup_UIEventLobby_Idle2-2 = "แน่นอนว่าฉันไม่เก็บค่าครูหรอกค่ะ"
10125-CVGroup_UIEventLobby_Idle2-3 = "บอกฉันได้เลยนะคะ!"
10125-CVGroup_UIEventLobby_Idle3-1 = "ยะ... อย่าแตะหมวกสิคะ"
10125-CVGroup_UIEventLobby_Idle3-2 = "นี่เป็นสัญลักษณ์ของนักเวทนะคะ\nห้ามถอดออกค่ะ!"
10125-CVGroup_UIEventLobby_Idle4-1 = "อ๊ะ นั่นมันอักขระเวท...!"
10125-CVGroup_UIEventLobby_Idle4-2 = "ถ้ายังจับไม่เลิก... อาจจะระเบิดก็ได้นะ อุฮุฮุ"
10125-CVGroup_UIEventShop_Enter1-1 = "เอาละ มาทดลองอุปกรณ์เวทกันเถอะ!"
10125-CVGroup_UIEventShop_Enter2-1 = "โอ้ ของพวกนี้ แค่มองก็สัมผัสได้ถึงพลังเวท...!"
10125-CVGroup_UIEventShop_Enter3-1 = "ที่นี่คงจะรวบรวมอุปกรณ์เวทไม่ได้อีกแล้วละ"
10125-CVGroup_UIEventShop_Enter3-2 = "แต่ก็ไม่เป็นไรหรอกนะคะ!"
10125-CVGroup_UIEventShop_Enter3-3 = "ทั้งอุปกรณ์เวทและความทรงจำกับมาสเตอร์"
10125-CVGroup_UIEventShop_Enter3-4 = "ก็ยังคงสร้างใหม่ได้อีกตั้งมากมายในอนาคตนี่ค่ะ "
10125-CVGroup_UIEventShop_Idle1-1 = "มีของที่ถูกใจหรือเปล่าคะ?"
10125-CVGroup_UIEventShop_Idle2-1 = "ฉันคาดหวังความลึกซึ้ง\nในสุนทรียภาพของมาสเตอร์อยู่นะคะ!"
10125-CVGroup_UIEventShop_Buy1-1 = "อ่า เป็นอุปกรณ์ที่มีพลังเวทอยู่เต็มเปี่ยมเลยนะคะ!"
10125-CVGroup_UIEventShop_Buy2-1 = "สมกับเป็นมาสเตอร์จริงๆ\nสายตาเฉียบคมมากค่ะ!"
10125-CVGroup_UIEventShop_Buy3-1 = "ถ้างั้นมาทดลองใช้กันเลยมั้ยคะ?!"
10125-CVGroup_UIEventShop_Buy4-1 = "อ๊ะ ฉันก็คิดว่าชิ้นนั้นเป็นของที่ดีเหมือนกันค่ะ"

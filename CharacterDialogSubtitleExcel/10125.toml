[translation]
10125-CVGroup_UITitle_Idle1-1 = "뉴후후, 블루 아카이브!"
10125-CVGroup_CharacterGet_Idle1-1 = "와일드헌트 예술학원, 오컬연 시라오 에리라고 합니다.\n세계는 마법으로 가득 차 있어요. 그래요, 이 만남처럼요!"
10125-CVGroup_Cafe_Idle1-1 = "어디 폴터가이스트 현상 안 일어나려나……"
10125-CVGroup_Cafe_Idle2-1 = "오오, 뭔가 마법 주문이 떠오르는 곳이네요."
10125-CVGroup_Cafe_Idle3-1 = "이곳에서 진한 마나의 기운이 느껴져요."
10125-CVGroup_Cafe_Idle4-1 = "뉴후후…… 외출은 두근두근하네요!"
10125-CVGroup_Cafe_Idle5-1 = "여기를 아틀리에로 한다면…… 걸작이 나올지도……!"
10125-CVGroup_WeaponGet_Idle1-1 = "뉴후후, 이것은 저의 전용 마법 지팡이!\n좀 더 완벽한 마법으로 보답하겠습니다!"
10125-CVGroup_UIEventLobby_Enter1-1 = "아르카나의 인도에 이끌린 자여. 이쪽입니다."
10125-CVGroup_UIEventLobby_Enter2-1 = "자, 와일드헌트에 잠든 비밀을……"
10125-CVGroup_UIEventLobby_Enter2-2 = "함께 밝혀내 보죠."
10125-CVGroup_UIEventLobby_Enter3-1 = "으으음, 이번 작전은 사감대에 들키면 안 되는데……."
10125-CVGroup_UIEventLobby_Enter4-1 = "조금만 더! 후회 없는 피날레를 맞이하는 거예요!"
10125-CVGroup_UIEventLobby_Enter5-1 = "다음에도……"
10125-CVGroup_UIEventLobby_Enter5-2 = "마스터와 함께 훌륭한 작품을 만들고 싶어요!"
10125-CVGroup_UIEventLobby_Idle1-1 = "뉴후후, 마법에 흥미가 있으신가요?"
10125-CVGroup_UIEventLobby_Idle2-1 = "마스터, 점을 봐 드릴까요?"
10125-CVGroup_UIEventLobby_Idle2-2 = "물론 복채는 필요 없어요."
10125-CVGroup_UIEventLobby_Idle2-3 = "편히 말씀해 주세요!"
10125-CVGroup_UIEventLobby_Idle3-1 = "모, 모자는 건드리지 마세요."
10125-CVGroup_UIEventLobby_Idle3-2 = "이건 마법사의 상징이니까, 벗겨지면 안 돼요!"
10125-CVGroup_UIEventLobby_Idle4-1 = "앗, 그쪽은 마법 각인이……!"
10125-CVGroup_UIEventLobby_Idle4-2 = "계속 건드리면…… 폭발해 버릴지도. 뉴후훗."
10125-CVGroup_UIEventShop_Enter1-1 = "자, 함께 마도구를 입수해 보죠!"
10125-CVGroup_UIEventShop_Enter2-1 = "오오, 이 물품들…… 바라보기만 해도 마력이……!"
10125-CVGroup_UIEventShop_Enter3-1 = "이곳에서는 마도구를 더 이상 모을 수 없게 되었습니다만,"
10125-CVGroup_UIEventShop_Enter3-2 = "괜찮습니다!"
10125-CVGroup_UIEventShop_Enter3-3 = "마스터와의 추억도, 마도구도."
10125-CVGroup_UIEventShop_Enter3-4 = "앞으로 잔뜩 찾아낼 수 있으니까요!"
10125-CVGroup_UIEventShop_Idle1-1 = "마음에 드는 게 있으셨나요?"
10125-CVGroup_UIEventShop_Idle2-1 = "마스터의 심미안, 기대하고 있어요!"
10125-CVGroup_UIEventShop_Buy1-1 = "이야, 마력이 가득한 도구네요!"
10125-CVGroup_UIEventShop_Buy2-1 = "역시 마스터! 안목이 있으시네요!"
10125-CVGroup_UIEventShop_Buy3-1 = "그럼 바로 시험해 볼까요!"
10125-CVGroup_UIEventShop_Buy4-1 = "앗, 저도 그게 좋을 것 같다고 생각했어요!"

[translation]
16007-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
16007-CVGroup_CharacterGet_Idle1-1 = "能這樣與老師見面，感到十分光榮。\n可以的話，作為問候的代替，要不要聽聽偉大潔莉諾會長的豐功偉業呢？"
16007-CVGroup_Cafe_Idle1-1 = "煽動是要從細微之處開始慢慢地……"
16007-CVGroup_Cafe_Idle2-1 = "呵呵，似乎是很適合潔莉諾會長的可愛的小東西呢。"
16007-CVGroup_Cafe_Idle3-1 = "這個空間好暖和，真不錯呢。"
16007-CVGroup_Cafe_Idle4-1 = "下次一定要和潔莉諾會長一起來這裡…！"
16007-CVGroup_Cafe_Idle5-1 = "咦？不知道從哪裡傳來了會長的氣息…"
16007-CVGroup_WeaponGet_Idle1-1 = "為了我把這把槍……？\n呵呵，謝謝你。老師。"
16007-CVGroup_UIEventBoxGachaShop_Enter1-1 = "歡迎來到赤冬事務局，老師。"
16007-CVGroup_UIEventBoxGachaShop_Enter2-1 = "您在學園裡找到模仿會長的Matryoshka了嗎？"
16007-CVGroup_UIEventBoxGachaShop_Enter2-2 = "如果有的話，可以在這裡交換商品唷！"
16007-CVGroup_UIEventBoxGachaShop_Enter3-1 = "慶典玩得開心嗎？"
16007-CVGroup_UIEventBoxGachaShop_Enter3-2 = "如果找到了會長的Matryoshka，請隨時來這裡！"
16007-CVGroup_UIEventBoxGachaShop_Enter4-1 = "慶典已漸入佳境呢……"
16007-CVGroup_UIEventBoxGachaShop_Enter4-2 = "雖然很寂寞，但也沒辦法。"
16007-CVGroup_UIEventBoxGachaShop_Enter5-1 = "今天是伊凡．庫帕拉的最後一天。"
16007-CVGroup_UIEventBoxGachaShop_Enter5-2 = "為了不留遺憾，請盡情享受吧！"
16007-CVGroup_UIEventBoxGachaShop_Enter6-1 = "雖然慶典結束了，但如果您還有Matryoshka的話，"
16007-CVGroup_UIEventBoxGachaShop_Enter6-2 = "可以在這裡交換。"
16007-CVGroup_UIEventBoxGachaShop_Idle1-1 = "那個會長形狀的Matryoshka，是我設計的唷。"
16007-CVGroup_UIEventBoxGachaShop_Idle1-2 = "嘿嘿……不覺得很可愛嗎？"
16007-CVGroup_UIEventBoxGachaShop_Idle2-1 = "竟然要和這麼可愛的Matryoshka分開……"
16007-CVGroup_UIEventBoxGachaShop_Idle2-2 = "真是讓人心碎，不這麼覺得嗎？。"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "中獎了！\n恭喜！"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "哎呀，中獎了！\n老師運氣很好呢。"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "呵呵，抽中了好東西呢。\n請謹慎使用！"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize4-1 = "是像潔莉諾會長一樣可愛的禮物呢！"

[translation]
16007-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
16007-CVGroup_CharacterGet_Idle1-1 = "이렇게 만나 뵈어 영광입니다, 선생님.\n괜찮으시다면 위대하신 체리노 회장의 위업에 대해 한번 들어보시겠어요?"
16007-CVGroup_Cafe_Idle1-1 = "선동은 사소한 것부터 천천히…"
16007-CVGroup_Cafe_Idle2-1 = "후후, 체리노 회장에게 잘 어울릴듯한 귀여운 물건이네요."
16007-CVGroup_Cafe_Idle3-1 = "이 공간은 따듯해서 좋네요."
16007-CVGroup_Cafe_Idle4-1 = "다음 번에는 꼭 체리노 회장과 이곳에…!"
16007-CVGroup_Cafe_Idle5-1 = "어라? 어디선가 회장님의 기척이…"
16007-CVGroup_WeaponGet_Idle1-1 = "저를 위해서 이 총을…? 후후, 감사드려요. 선생님."
16007-CVGroup_UIEventBoxGachaShop_Enter1-1 = "붉은겨울 학원 사무국에 오신 것을 환영합니다, 선생님."
16007-CVGroup_UIEventBoxGachaShop_Enter2-1 = "학원 부지에서 체리노 회장님의 특제 마트료시카를 찾으셨나요?"
16007-CVGroup_UIEventBoxGachaShop_Enter2-2 = "이곳에서 교환하실 수 있어요!"
16007-CVGroup_UIEventBoxGachaShop_Enter3-1 = "축제는 즐겁게 즐기고 계신가요?"
16007-CVGroup_UIEventBoxGachaShop_Enter3-2 = "회장님의 마트료시카를 찾으시면 언제든 저를 찾아와주세요!"
16007-CVGroup_UIEventBoxGachaShop_Enter4-1 = "축제도 이제 얼마 남지 않았네요…"
16007-CVGroup_UIEventBoxGachaShop_Enter4-2 = "아쉬워라…."
16007-CVGroup_UIEventBoxGachaShop_Enter5-1 = "오늘이 이반 쿠팔라 축제의 마지막 날이랍니다."
16007-CVGroup_UIEventBoxGachaShop_Enter5-2 = "잊고 가시는 물건이 없도록 붉은겨울 학원을 꼼꼼히 돌아보세요!"
16007-CVGroup_UIEventBoxGachaShop_Enter6-1 = "축제는 끝났지만 남은 마트료시카는"
16007-CVGroup_UIEventBoxGachaShop_Enter6-2 = "여기서 얼마든지 교환하실 수 있어요."
16007-CVGroup_UIEventBoxGachaShop_Idle1-1 = "그 회장님 모양의 마트료시카는 제가 디자인했답니다."
16007-CVGroup_UIEventBoxGachaShop_Idle1-2 = "후후… 귀엽죠?"
16007-CVGroup_UIEventBoxGachaShop_Idle2-1 = "귀여운 마트료시카가 쪼개지는 모습을 보고 있노라면…"
16007-CVGroup_UIEventBoxGachaShop_Idle2-2 = "어쩐지 가슴이 아프네요."
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "당첨입니다! 축하드려요!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "어머나, 당첨이네요! 선생님도 운이 좋으시네요."
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "후후, 좋은 물건을 뽑으셨네요. 소중하게 사용해주세요!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize4-1 = "체리노 회장님처럼 귀여운 선물이네요!"

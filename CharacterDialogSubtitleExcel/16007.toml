16007-CVGroup_UIEventBoxGachaShop_Idle1-2 = "Heehee. Cute, right?"
16007-CVGroup_UIEventBoxGachaShop_Idle2-1 = "I have this feeling when I see the little Matryoshka dolls inside the bigger ones..."
16007-CVGroup_UIEventBoxGachaShop_Idle2-2 = "It's a bit sad..."
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "You've won a prize! Congratulations!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Oh, you've won! You are lucky as well, Sensei!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Heehee. You drew something really good. Please take good care of it!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize4-1 = "It's an adorable gift. Just like Great Leader Cherino!"

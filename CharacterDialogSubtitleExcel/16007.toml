[translation]
16007-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16007-CVGroup_CharacterGet_Idle1-1 = "Nice to meet you, Sensei. Are you here to learn about the accomplishments of the great President Cherino?"
16007-CVGroup_Cafe_Idle1-1 = "Instigation starts slowly, with the smallest things..."
16007-CVGroup_Cafe_Idle2-1 = "Heehee, it's a cute item that suits President Cherino."
16007-CVGroup_Cafe_Idle3-1 = "This space is nice because it's warm."
16007-CVGroup_Cafe_Idle4-1 = "Next time, I'm definitely coming here with President Cherino!"
16007-CVGroup_Cafe_Idle5-1 = "Huh? I sense the president somewhere."
16007-CVGroup_WeaponGet_Idle1-1 = "You got this gun for me...? Heehee, thank you, Sensei."
16007-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Welcome to the Red Winter Academy Secretariat, Sensei."
16007-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Did you find Cherino's special Matryoshka on the academy grounds?"
16007-CVGroup_UIEventBoxGachaShop_Enter2-2 = "Trade as much as you want here!"
16007-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Are you enjoying the festival?"
16007-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Tell me right away if you find the president's Matryoshka!"
16007-CVGroup_UIEventBoxGachaShop_Enter4-1 = "Aw, there's not much time left until the festival ends."
16007-CVGroup_UIEventBoxGachaShop_Enter4-2 = "What a shame..."
16007-CVGroup_UIEventBoxGachaShop_Enter5-1 = "Today is the last day of Ivan Kupala's festival."
16007-CVGroup_UIEventBoxGachaShop_Enter5-2 = "Take a close look around Red Winter Academy to make sure you don't forget anything!"

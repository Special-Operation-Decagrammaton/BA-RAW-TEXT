[translation]
10109-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10109-CVGroup_CharacterGet_Idle1-1 = "I am Ushio Noa, the secretary who's come to record your day, Sensei. I'm looking forward to tonight. Heehee."
10109-CVGroup_Cafe_Idle1-1 = "(This cafe seems like a mysterious world born from solitude and silence.)"
10109-CVGroup_Cafe_Idle2-1 = "(Shall we listen to the quiet of the night for a moment...?)"
10109-CVGroup_Cafe_Idle3-1 = "*yawn*... I'm a little tired."
10109-CVGroup_Cafe_Idle4-1 = "Should we take a small break here?"
10109-CVGroup_Cafe_Idle5-1 = "(I think I heard Koyuki's laughter just now...)"
10109-CVGroup_WeaponGet_Idle1-1 = "This conversion kit can change into any form based on the user's intention. ...Just like me, heehee."
10109-CVGroup_UIEventLobby_Enter1-1 = "Hello, Sensei. I didn't expect to run into you so late at night."
10109-CVGroup_UIEventLobby_Enter1-2 = "It's been too long since I've seen you at Millennium."
10109-CVGroup_UIEventLobby_Enter2-1 = "Good evening, Sensei. Fufu, this outfit?"
10109-CVGroup_UIEventLobby_Enter2-2 = "I was preparing for a pajama party with the other members of Seminar."
10109-CVGroup_UIEventLobby_Enter3-1 = "Are you hiding something, Sensei?"
10109-CVGroup_UIEventLobby_Enter3-2 = "(staaare)"
10109-CVGroup_UIEventLobby_Enter4-1 = "Heehee, things are going more enjoyably than I expected."
10109-CVGroup_UIEventLobby_Enter5-1 = "Great job, Sensei."
10109-CVGroup_UIEventLobby_Enter5-2 = "If you aren't too tired yet, would you mind spending a little more time with us?"
10109-CVGroup_UIEventLobby_Enter5-3 = "...Winter nights can be very long."
10109-CVGroup_UIEventLobby_Idle1-1 = "Wandering around the campus in our pajamas so late at night..."
10109-CVGroup_UIEventLobby_Idle1-2 = "...makes my heart pound, like I'm doing something bad."
10109-CVGroup_UIEventLobby_Idle2-1 = "I know most of the rules of the board games, but..."
10109-CVGroup_UIEventLobby_Idle2-2 = "...I don't have much experience actually playing them."
10109-CVGroup_UIEventLobby_Idle3-1 = "Despite what she says, Yuuka seems quite excited."
10109-CVGroup_UIEventLobby_Idle3-2 = "I haven't seen Yuuka this enthusiastic in a long while."
10109-CVGroup_UIEventLobby_Idle4-1 = "(It would have been nice if President Rio had also attended the party...)"
10109-CVGroup_UIEventTreasure_Enter1-1 = "Ah, Sensei. I was just organizing the board games we're going to play at the party."
10109-CVGroup_UIEventTreasure_Enter2-1 = "Could you help me organize the board games?"
10109-CVGroup_UIEventTreasure_Enter2-2 = "...It's a bigger mess than I expected."
10109-CVGroup_UIEventTreasure_Enter3-1 = "The party is over, but..."
10109-CVGroup_UIEventTreasure_Enter3-2 = "...please let me know if there's a board game you're interested in."
10109-CVGroup_UIEventTreasure_Enter4-1 = "It's a bit late, but..."
10109-CVGroup_UIEventTreasure_Enter4-2 = "...if you'd like, I can stay and play a little more."
10109-CVGroup_UIEventTreasure_Idle1-1 = "There's quite a variety of board games."
10109-CVGroup_UIEventTreasure_Idle2-1 = "Seriously... I told everyone to tidy up after themselves."
10109-CVGroup_UIEventTreasure_FindTreasure1-1 = "Ah, so it was over there."
10109-CVGroup_UIEventTreasure_FindTreasure2-1 = "Could this design be...?"
10109-CVGroup_UIEventTreasure_GetTreasure1-1 = "Oh my, what an interesting looking board game."
10109-CVGroup_UIEventTreasure_GetTreasure2-1 = "I wonder how you play this."
10109-CVGroup_UIEventTreasure_RoundRenewal1-1 = "Yes, let's keep on cleaning."
10109-CVGroup_UIEventMission_Enter1-1 = "Oh, Sensei. If you don't mind..."
10109-CVGroup_UIEventMission_Enter1-2 = "...could you lend a hand with the party preparations?"
10109-CVGroup_UIEventMission_Enter2-1 = "We were delegating which roles we would each take on at the pajama party."
10109-CVGroup_UIEventMission_Idle1-1 = "Yes, please tell me."
10109-CVGroup_UIEventMission_Idle2-1 = "It's more comfortable tying my hair up, but the back of my neck feels a little cool..."
10109-CVGroup_UIEventMission_Idle2-2 = "...That was three times. You were watching, right?"
10109-CVGroup_UIEventMission_Buy1-1 = "Heehee, that's a good idea."
10109-CVGroup_UIEventMission_Buy2-1 = "Just what I'd expect you to say. I'll make note of it."
10109-CVGroup_UIEventMission_Interaction1-1 = "I think that's enough for today. Thank you for your help."

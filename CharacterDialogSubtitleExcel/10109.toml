[translation]
10109-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10109-CVGroup_CharacterGet_Idle1-1 = "선생님의 오늘 하루를 기록하기 위해 찾아온 서기, 우시오 노아입니다.\n오늘 밤도 잘 부탁드리겠습니다, 선생님. 후훗."
10109-CVGroup_Cafe_Idle1-1 = "(이 카페는 고독과 적막 속에서 눈을 뜬 신비로운 세계 같군요.)"
10109-CVGroup_Cafe_Idle2-1 = "(잠깐 밤의 정적에 귀를 기울여 볼까요…)"
10109-CVGroup_Cafe_Idle3-1 = "하암… 조금 피곤하네요."
10109-CVGroup_Cafe_Idle4-1 = "이 근처에서 조금 쉬었다 갈까요?"
10109-CVGroup_Cafe_Idle5-1 = "(어쩐지 방금, 코유키 쨩의 웃음소리가 들린 것 같은데…)"
10109-CVGroup_WeaponGet_Idle1-1 = "이 컨버전 키트는 사용자의 의도에 따라 어떤 모습으로도 변할 수 있답니다.\n……마치 저처럼 말이에요, 후훗."
10109-CVGroup_UIEventLobby_Enter1-1 = "안녕하세요, 선생님. 이렇게 늦은 시간에"
10109-CVGroup_UIEventLobby_Enter1-2 = "밀레니엄에서 뵙는 건 오랜만인 것 같네요."
10109-CVGroup_UIEventLobby_Enter2-1 = "좋은 밤입니다, 선생님. 후후, 이 옷 말인가요?"
10109-CVGroup_UIEventLobby_Enter2-2 = "오늘은 세미나의 부원들과 함께 파자마 파티를 준비하던 중이었어요."
10109-CVGroup_UIEventLobby_Enter3-1 = "선생님, 뭔가 숨기고 있는 건 없으신가요?"
10109-CVGroup_UIEventLobby_Enter3-2 = "지이~"
10109-CVGroup_UIEventLobby_Enter4-1 = "후후, 생각보다 즐겁게 일이 흘러가네요."
10109-CVGroup_UIEventLobby_Enter5-1 = "수고 많으셨습니다, 선생님."
10109-CVGroup_UIEventLobby_Enter5-2 = "아직 피곤하지 않으시다면 조금만 더 저희와 어울려 주시겠어요?"
10109-CVGroup_UIEventLobby_Enter5-3 = "…겨울밤은 기니까요."
10109-CVGroup_UIEventLobby_Idle1-1 = "밤늦게까지 다같이 잠옷 차림으로 교정을 돌아다니고 있노라니,"
10109-CVGroup_UIEventLobby_Idle1-2 = "뭔가 나쁜 짓을 하는 것 같아서 두근거리네요."
10109-CVGroup_UIEventLobby_Idle2-1 = "보드게임의 룰은 대부분 알고 있지만,"
10109-CVGroup_UIEventLobby_Idle2-2 = "어쩐지 실제로 해 본 경험은 많지 않네요."
10109-CVGroup_UIEventLobby_Idle3-1 = "유우카 쨩, 말은 그렇게 해도 꽤 들뜬 것처럼 보이네요."
10109-CVGroup_UIEventLobby_Idle3-2 = "저렇게 의욕적인 모습의 유우카 쨩은 오랜만에 보는 것 같아요."
10109-CVGroup_UIEventLobby_Idle4-1 = "(리오 회장님도 함께 파티에 오셨다면 좋았을 텐데…)"
10109-CVGroup_UIEventTreasure_Enter1-1 = "아, 선생님. 마침 파티에 쓸 보드게임을 정리하고 있었답니다."
10109-CVGroup_UIEventTreasure_Enter2-1 = "보드게임 정리를 도와주시겠어요?"
10109-CVGroup_UIEventTreasure_Enter2-2 = "……생각보다 조금 많이 어질러져 있네요."
10109-CVGroup_UIEventTreasure_Enter3-1 = "파티는 끝났지만,"
10109-CVGroup_UIEventTreasure_Enter3-2 = "관심 가는 보드게임이 있다면 말씀해 주세요."
10109-CVGroup_UIEventTreasure_Enter4-1 = "조금 늦긴 했지만…"
10109-CVGroup_UIEventTreasure_Enter4-2 = "그래도 선생님의 부탁이라면 조금 더 놀아볼까요?"
10109-CVGroup_UIEventTreasure_Idle1-1 = "보드게임에도 꽤나 다양한 종류가 있네요."
10109-CVGroup_UIEventTreasure_Idle2-1 = "정말이지, 다들 정리는 깔끔하게 해 두라고 말했을 텐데…"
10109-CVGroup_UIEventTreasure_FindTreasure1-1 = "아, 그쪽에 있었던 모양이군요."
10109-CVGroup_UIEventTreasure_FindTreasure2-1 = "혹시, 이 디자인은…"
10109-CVGroup_UIEventTreasure_GetTreasure1-1 = "어머나, 흥미로워 보이는 보드게임이네요."
10109-CVGroup_UIEventTreasure_GetTreasure2-1 = "이건 어떻게 가지고 노는 물건일까요?"
10109-CVGroup_UIEventTreasure_RoundRenewal1-1 = "네, 계속해서 다음 정리 정돈을 진행하죠."
10109-CVGroup_UIEventMission_Enter1-1 = "아, 선생님. 괜찮으시다면"
10109-CVGroup_UIEventMission_Enter1-2 = "잠시 파티 준비를 도와주지 않으시겠어요?"
10109-CVGroup_UIEventMission_Enter2-1 = "파자마 파티에서 각자 맡을 역할들을 정리하고 있던 중이었습니다."
10109-CVGroup_UIEventMission_Idle1-1 = "네, 말씀해 주세요."
10109-CVGroup_UIEventMission_Idle2-1 = "머리를 묶으면 편하기는 한데, 어쩐지 목뒤가 조금 서늘하네요…"
10109-CVGroup_UIEventMission_Idle2-2 = "……방금 것까지 세 번. 계속 보고 계셨죠?"
10109-CVGroup_UIEventMission_Buy1-1 = "후후, 좋은 아이디어네요."
10109-CVGroup_UIEventMission_Buy2-1 = "역시 선생님이시네요. 참고하겠습니다."
10109-CVGroup_UIEventMission_Interaction1-1 = "오늘은 이만하면 충분할 것 같네요. 도와주셔서 감사합니다."

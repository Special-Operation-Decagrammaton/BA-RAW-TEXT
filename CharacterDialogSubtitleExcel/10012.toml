10012-CVGroup_Cafe_Idle4-1 = "응? 함께 스트레칭 하자고요?"
10012-CVGroup_Cafe_Idle5-1 = "네? 다음은 같이 로드워크를…?"
10012-CVGroup_WeaponGet_Idle1-1 = "이런 것을 다룰 수 있게 된 것도 트레이닝의 성과입니다.\n하지만 안주하지 않고 계속 노력하겠습니다, 트레이너."

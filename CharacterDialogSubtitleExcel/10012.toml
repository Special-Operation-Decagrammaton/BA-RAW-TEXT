[translation]
10012-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10012-CVGroup_CharacterGet_Idle1-1 = "웨이트 트레이닝은 과학입니다.\n밀레니엄의 첨단 이론이 빛을 발하는 영역이죠."
10012-CVGroup_Cafe_Idle1-1 = "흐음…"

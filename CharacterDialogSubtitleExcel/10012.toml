[translation]
10012-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10012-CVGroup_CharacterGet_Idle1-1 = "體能訓練是科學。\n是千年的最先進的理論大放異彩的領域。"
10012-CVGroup_Cafe_Idle1-1 = "嘿…"
10012-CVGroup_Cafe_Idle2-1 = "有可以訓練的地方嗎…"
10012-CVGroup_Cafe_Idle3-1 = "這裡看起來\n是適合自由重量的地方。"
10012-CVGroup_Cafe_Idle4-1 = "咦？\n要一起做伸展運動嗎？"
10012-CVGroup_Cafe_Idle5-1 = "好，下次要一起長跑訓練吧？"
10012-CVGroup_WeaponGet_Idle1-1 = "之所以能駕馭這種東西，也都歸功於訓練的成果。\n但我不會安於現狀，我會繼續努力的，指導員。"

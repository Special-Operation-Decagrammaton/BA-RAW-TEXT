[translation]
10079-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10079-CVGroup_CharacterGet_Idle1-1 = "มิซากะ มิโคโตะ ชั้นปีที่ 2 โรงเรียนมัธยมต้นโทคิวะได\nอยากให้ฉันช่วยอะไรก็บอกได้เลยนะ"
10079-CVGroup_Cafe_Idle1-1 = "ที่นี่คือคาเฟ่ของชาเล่ต์งั้นเหรอ..."
10079-CVGroup_Cafe_Idle2-1 = "นะ...นั่นมันอะไรน่ะ...?!"
10079-CVGroup_Cafe_Idle3-1 = "มีอะไรน่าตื่นตาตื่นใจเยอะจัง"
10079-CVGroup_Cafe_Idle4-1 = "นะ... นี่มันน่ารักเหมือนกันนะเนี่ย..."
10079-CVGroup_Cafe_Idle5-1 = "หืม? มีใครเรียกรึเปล่านะ?"
10079-CVGroup_WeaponGet_Idle1-1 = "พูดตามตรงนี่ก็เป็นเรื่องแปลกใหม่อยู่นะ...\nปกติแล้วฉันไม่พกอะไรแบบนี้ติดตัวน่ะ\nขอบคุณที่หามาให้นะ ฉันจะทำให้ดี ไม่ให้ผิดหวังเลย"
10079-CVGroup_UIEventLobby_Enter1-1 = "มาเริ่มกันเลยดีมั้ย"
10079-CVGroup_UIEventLobby_Enter2-1 = "ฉันเตรียมตัวพร้อมแล้ว คุณครูล่ะ?"
10079-CVGroup_UIEventLobby_Enter3-1 = "ทำไปได้เยอะเลยนะเนี่ย"
10079-CVGroup_UIEventLobby_Enter4-1 = "ตอนนี้รู้สึกเหมือนจะเสร็จแล้วเนอะ?"
10079-CVGroup_UIEventLobby_Enter5-1 = "งั้นก่อนอื่นก็ลองตรวจสอบดูสิ"
10079-CVGroup_UIEventLobby_Idle1-1 = "หืม...? เรียกฉันเหรอ?"
10079-CVGroup_UIEventLobby_Idle2-1 = "อะไรเนี่ย แกล้งกันเหรอ?"
10079-CVGroup_UIEventLobby_Idle3-1 = "มีเรื่องอื่นที่ต้องทำไม่ใช่เหรอ?"
10079-CVGroup_UIEventLobby_Idle4-1 = "เฮ้อ... รู้แล้ว รู้แล้วน่า\nให้ฉันทำอะไรให้ดี?"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "ได้เจอกันที่นี่อีกแล้วนะคุณครู\nไปดูรอบๆ กันหน่อยดีมั้ย?"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "รู้สึกดีเลยนะเนี่ย?\nตอนนี้เราอาจจะเจอของดีๆ ก็ได้นะ"
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "เอาละ ถ้ายังมีอะไรเหลืออยู่\nงั้นเราไปดูให้ทั่วๆ ก่อนจะไม่ทันดีกว่า"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "มันน่าเสียดายนะ"
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "ให้กดทางโน้น ไม่ใช่มากดฉันสิ!"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "อะฮ่าฮ่าฮ่า! อะ... อะไรเนี่ย!? จั๊กจี้นะ!!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "โอ๊ะ ได้แล้ว! ยินดีด้วยนะ!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "อันนี้มัน เป็นของแรร์เลยไม่ใช่เหรอ?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "ของดีทีเดียวเลยนะ"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "ปิดจ๊อบด้วยชิ้นนี้เลยใช่มั้ย\nทำได้ดีมากเลยคุณครู!"

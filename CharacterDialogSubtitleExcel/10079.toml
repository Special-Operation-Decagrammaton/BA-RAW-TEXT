[translation]
10079-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10079-CVGroup_CharacterGet_Idle1-1 = "I'm Tokiwadai Middle School second-year Misaka Mikoto. Let me know if you need my help."
10079-CVGroup_Cafe_Idle1-1 = "So this is Schale's Cafe..."
10079-CVGroup_Cafe_Idle2-1 = "Wh-What...is this...?!"
10079-CVGroup_Cafe_Idle3-1 = "There's so much to take in."
10079-CVGroup_Cafe_Idle4-1 = "Th-This is...kind of cute..."
10079-CVGroup_Cafe_Idle5-1 = "Oh? Do you need something?"
10079-CVGroup_WeaponGet_Idle1-1 = "To be honest, I guess it's a bit interesting... People don't usually carry something like this around. Thank you for preparing it... I'll make sure to live up to your expectations."
10079-CVGroup_UIEventLobby_Enter1-1 = "Let's get started."
10079-CVGroup_UIEventLobby_Enter2-1 = "I'm ready. Are you?"
10079-CVGroup_UIEventLobby_Enter3-1 = "That's quite a bit of progress."
10079-CVGroup_UIEventLobby_Enter4-1 = "Almost done, right?"
10079-CVGroup_UIEventLobby_Enter5-1 = "Well, let's just check it out this once."
10079-CVGroup_UIEventLobby_Idle1-1 = "Oh? Need something?"
10079-CVGroup_UIEventLobby_Idle2-1 = "Are you kidding me?"
10079-CVGroup_UIEventLobby_Idle3-1 = "Don't you have anything better to do?"
10079-CVGroup_UIEventLobby_Idle4-1 = "...Hah. Okay, okay. What can I do for you?"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "We meet again, Sensei. Let's give it a spin, shall we?"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "I've got a feeling something good will come up."
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Come on. Since you're still here, why not spin it all while you still can?"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "It'd be a waste otherwise."
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Not me! Press over there!"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Ahahahaha! H-Hey! That tickles!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Wow! Congratulations!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Oh, that's a pretty rare one, isn't it?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "That's pretty good, right?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "I guess that wraps it up for now. Good job, Sensei!"

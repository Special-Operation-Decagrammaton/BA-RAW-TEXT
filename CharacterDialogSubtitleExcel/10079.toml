[translation]
10079-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10079-CVGroup_CharacterGet_Idle1-1 = "토키와다이 중학교 2학년 미사카 미코토. 내 도움이 필요하면 말해줘."
10079-CVGroup_Cafe_Idle1-1 = "여기가 샬레의 카페……."
10079-CVGroup_Cafe_Idle2-1 = "뭐, 뭐야. 저건……!?"
10079-CVGroup_Cafe_Idle3-1 = "신기한 게 많네."
10079-CVGroup_Cafe_Idle4-1 = "이, 이건 꽤 귀여울 지도……."
10079-CVGroup_Cafe_Idle5-1 = "음? 누가 불렀나?"
10079-CVGroup_WeaponGet_Idle1-1 = "솔직히 말해서, 좀 신기하다고나 할까……. 평소에는 이런 거, 가지고 다니지 않으니까.\n일부러 준비해 줘서.... 고마워. 기대에 부응할 수 있도록, 제대로 할게."
10079-CVGroup_UIEventLobby_Enter1-1 = "슬슬 시작해 볼까."
10079-CVGroup_UIEventLobby_Enter2-1 = "나는 준비 OK. 선생님은?"
10079-CVGroup_UIEventLobby_Enter3-1 = "꽤 많이 진행됐네."
10079-CVGroup_UIEventLobby_Enter4-1 = "이제 거의 끝난 느낌이지?"
10079-CVGroup_UIEventLobby_Enter5-1 = "일단, 한 번은, 확인해 봐."
10079-CVGroup_UIEventLobby_Idle1-1 = "……응? 불렀어?"
10079-CVGroup_UIEventLobby_Idle2-1 = "뭐야, 장난치는 거야?"
10079-CVGroup_UIEventLobby_Idle3-1 = "달리 해야 할 일이, 있는 거 아냐아?"
10079-CVGroup_UIEventLobby_Idle4-1 = "……하아. 알았어, 알았다고. 뭐 해줄까?"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "여기서 또 보네, 선생님. 한 번 돌려볼까?"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "느낌 좋은데? 지금이라면 좋은 거 나올지도 몰라."
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "자자, 아직 남아있다면 늦기 전에 다 돌리는 거 어때?"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "아깝잖아."
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "나 말고 저쪽을 누르라고!"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "아하하하! 뭐, 뭐야!? 간지럽잖아!!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "어머, 떴다! 축하해!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "이거, 꽤 레어한 거 아냐?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "꽤나 괜찮은 거 아냐?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "이걸로 대충 마무리인가. 수고했어, 선생님!"

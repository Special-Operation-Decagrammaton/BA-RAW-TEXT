[translation]
10079-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10079-CVGroup_CharacterGet_Idle1-1 = "常盤台中學二年級，御坂美琴。\n需要我的幫忙就告訴我吧。"
10079-CVGroup_Cafe_Idle1-1 = "這裡是夏萊的\n咖啡廳……"
10079-CVGroup_Cafe_Idle2-1 = "什，什麼啊。\n那個東西……！？"
10079-CVGroup_Cafe_Idle3-1 = "稀奇古怪的東西還真不少呢。"
10079-CVGroup_Cafe_Idle4-1 = "這，這好像還挺可愛的……"
10079-CVGroup_Cafe_Idle5-1 = "嗯？有人叫我嗎？"
10079-CVGroup_WeaponGet_Idle1-1 = "老實說，我覺得有點新奇……\n畢竟平常不會隨身攜帶這種東西。\n特地為我準備……真的很感謝。\n為了回應期待，我會努力的。"
10079-CVGroup_UIEventLobby_Enter1-1 = "那我們就開始吧。"
10079-CVGroup_UIEventLobby_Enter2-1 = "我準備OK，老師你呢？"
10079-CVGroup_UIEventLobby_Enter3-1 = "進度相當不錯呢。"
10079-CVGroup_UIEventLobby_Enter4-1 = "感覺已經幾乎結束了呢？"
10079-CVGroup_UIEventLobby_Enter5-1 = "姑且還是再確認一次吧。"
10079-CVGroup_UIEventLobby_Idle1-1 = "……嗯？你叫我嗎？"
10079-CVGroup_UIEventLobby_Idle2-1 = "什麼嘛，是在開玩笑啊。"
10079-CVGroup_UIEventLobby_Idle3-1 = "不是還有其他必須做的事嗎？"
10079-CVGroup_UIEventLobby_Idle4-1 = "唉……知道了知道了。\n要我幫你什麼嗎？"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "又見面了呢，老師。\n要不要抽抽看？"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "感覺還不錯嘛？\n說不定現在會出現好東西。"
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "來，如果還有剩的話，最好在來不及之前抽完哦？"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "不然就太可惜囉。"
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "不要按我，按那邊啦！"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "啊哈哈哈！怎，怎麼了！？很癢耶！！"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "哎呀，中獎了呢！恭喜你！"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "這個，是不是還挺稀有的？"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "還算是不錯的東西吧？"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "這樣就大致結束了吧。\n辛苦你了，老師！"

[translation]
10060-CVGroup_UITitle_Idle1-1 = "Blue Archive~♪"
10060-CVGroup_CharacterGet_Idle1-1 = "ยะฮู้ว~! จะให้รื้อตรงไหนดี?\nหรือให้ขุดตรงไหนมั้ย? จะให้ทำแบบไหนก็บอกได้เลย~!"
10060-CVGroup_Cafe_Idle1-1 = "ที่นี่เป็นที่ของคุณครู...?\nโอ้ววว...!!"
10060-CVGroup_Cafe_Idle2-1 = "คงไม่มี... ออนเซ็นสินะ?"
10060-CVGroup_Cafe_Idle3-1 = "ก็นะ ที่นี่เป็นที่ของคุณครูนี่นา\nเว้นที่นี่ไว้ดีมั้ย?"
10060-CVGroup_Cafe_Idle4-1 = "หืม? คนคนนั้น... เฮือก!"
10060-CVGroup_Cafe_Idle5-1 = "คนเยอะจังเลยแฮะ\nเสียงดังวุ่นวายดีจังเลยนะ!?"
10060-CVGroup_WeaponGet_Idle1-1 = "เอ๋? ให้ฉันเหรอ? ทำไมล่ะ?\nอืม~ ฉันมันหัวทึบ เลยไม่ค่อยเข้าใจเท่าไร...\nแค่พยายามให้เต็มที่ก็พอใช่มั้ย! อะฮ่ะฮ่ะฮ่า!!"

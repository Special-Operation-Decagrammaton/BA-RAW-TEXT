[translation]
10025-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10025-CVGroup_CharacterGet_Idle1-1 = "อย่าทำเหมือนฉันเป็นเด็กนะคะ!\nถึงจะตัวเล็กแต่หัวใจฉันก็เป็นผู้ใหญ่กว่าทุกคนนะคะ!"
10025-CVGroup_Cafe_Idle1-1 = "(ได้มาชมคาเฟ่จากมุมมองนี้ก็แปลกดีนะ...)"
10025-CVGroup_Cafe_Idle2-1 = "เหลือตัวแค่นี้แล้ว...\nพวกเด็กๆ อาจไม่ยอมรับฉันก็ได้นะคะ"
10025-CVGroup_Cafe_Idle3-1 = "(ถ้าฉัน... เขย่งเท้าอีกสักหน่อย\nก็น่าจะเอื้อมถึงนะ...!)"
10025-CVGroup_Cafe_Idle4-1 = "อืม... ง่วงจังเลยค่ะ..."
10025-CVGroup_Cafe_Idle5-1 = "ฉันกลายเป็นเด็กแล้ว...\nเพราะงั้นขอนอนกลางวันสักหน่อยคงได้ใช่มั้ยคะ"
10025-CVGroup_WeaponGet_Idle1-1 = "ถึงมันจะค่อนข้างใหญ่ไปหน่อยสำหรับฉันในตอนนี้...\nแต่ว่าฉันก็คุ้นเคยกับอาวุธชิ้นนี้ที่สุดแล้วค่ะ!"
10025-CVGroup_UIEventLobby_Enter1-1 = "อากาศแบบนี้เหมาะกับการไปเดินเล่นมากเลยนะคะ~"
10025-CVGroup_UIEventLobby_Enter2-1 = "วันนี้ฉันจะพาคุณครูเดินชมโรงเรียนซานไห่จิงเองค่ะ!"
10025-CVGroup_UIEventLobby_Idle1-1 = "พะ...พี่ชุน... หายไปไหนกันนะ"
10025-CVGroup_UIEventLobby_Idle2-1 = "(นี่... ความยังไม่แตกใช่มั้ยนะ?)"
10025-CVGroup_UIEventLobby_Idle3-1 = "คุณครูคะ ทางด้านโน้นมีขนมที่ดูน่าอร่อยอยู่เต็มไปหมดเลยค่ะ!"
10025-CVGroup_UIEventLobby_Idle4-1 = "(ฮุฮุ ถึงตัวจะดูเด็กลง แต่ก็ไม่ได้แย่เท่าไรนะ...)"
10025-CVGroup_UIEventMission_Enter1-1 = "เชิญเลยค่ะ คุณครู\nคาบเรียนวันนี้ ก็ขอรบกวนด้วยนะคะ!"
10025-CVGroup_UIEventMission_Idle1-1 = "ฮุฮุ ตัวเล็กไซซ์มินิแบบนี้ บางครั้งก็สบายดีเหมือนกันนะคะ!"
10025-CVGroup_UIEventMission_Idle2-1 = "งืม... ง่วงจังเลยค่ะ"
10025-CVGroup_UIEventMission_Buy1-1 = "ขอบคุณมากค่ะ!"
10025-CVGroup_UIEventMission_Buy2-1 = "ฮิฮิ ขอบคุณค่ะ... คุณครู"
10025-CVGroup_UIEventMission_Interaction1-1 = "ฮิฮิ คราวหน้า...\nมาเล่นด้วยกันใหม่นะคะ คุณครู!"

[translation]
10032-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
10032-CVGroup_CharacterGet_Idle1-1 = "啊哈哈！久等了，老師！\n今年也會盡～情的，和我玩吧？"
10032-CVGroup_Cafe_Idle1-1 = "好想和大家打羽根突啊～"
10032-CVGroup_Cafe_Idle2-1 = "要和老師玩什麼呢～♪"
10032-CVGroup_Cafe_Idle3-1 = "福來笑門～♪"
10032-CVGroup_Cafe_Idle4-1 = "發現玩具～♪"
10032-CVGroup_Cafe_Idle5-1 = "向老師撒嬌的話，\n可以拿到紅包嗎？"
10032-CVGroup_WeaponGet_Idle1-1 = "啊哈哈，不錯不錯！\n這樣或許能玩得更開心！"
10032-CVGroup_UIEventLobby_Enter1-1 = "啊，老師，找～到你了！\n到了新年竟然還要工作，你還是老樣子呢，老師！"
10032-CVGroup_UIEventLobby_Enter2-1 = "哇哦！沒想到剛過新年就能像這樣見到你，嚇我一跳呢，老師！"
10032-CVGroup_UIEventLobby_Enter2-2 = "耶，擊掌！"
10032-CVGroup_UIEventLobby_Idle1-1 = "啊哈，總覺得亞瑠醬好像很辛苦呢～\n算了，我倒是覺得有趣所以無所謂！"
10032-CVGroup_UIEventLobby_Idle2-1 = "想不到居然會有賽錢箱小偷呢～\n才剛過新年就亂哄哄的，看來好像完全不會厭煩！"
10032-CVGroup_UIEventLobby_Idle3-1 = "嗯～果然只是一直待著真的好無聊！\n走吧，老師！"
10032-CVGroup_UIEventLobby_Idle4-1 = "雖然今年好像也會發生各式各樣的事情，"
10032-CVGroup_UIEventLobby_Idle4-2 = "不過不管是亞瑠醬、佳世子醬還是遙香醬都很依賴老師哦♪"
10032-CVGroup_UIEventLobby_Idle4-3 = "咦？我？呵呵，我反而想問，你覺得我是怎麼想的呢？"
10032-CVGroup_UIEventLobby_Idle4-4 = "究竟是怎麼樣呢～？"
10032-CVGroup_UIEventLobby_Enter3-1 = "來吧，老師，今天要玩什麼玩具呢？"
10032-CVGroup_UIEventLobby_Enter3-2 = "羽根突、笑福面、打達摩！咯呵呵♪"
10032-CVGroup_UIEventLobby_Enter4-1 = "唔嗯～玩也玩得有點膩了……\n差不多該開始玩老師了吧！"
10032-CVGroup_UIEventLobby_Enter4-2 = "怎麼樣？不覺得是個好主意嗎？"
10032-CVGroup_UIEventLobby_Enter5-1 = "啊～真開心！\n怎麼樣？老師也玩得很開心嗎？"
10032-CVGroup_UIEventLobby_Enter5-2 = "要是今年也能像這樣充滿有趣的事情就好了！"
10032-CVGroup_UIEventBoxGachaShop_Enter1-1 = "歡迎來到無月醬的特別交換所～！"
10032-CVGroup_UIEventBoxGachaShop_Enter2-1 = "啊，老師！你有帶福袋吧？\n快點打開來看看吧！"
10032-CVGroup_UIEventBoxGachaShop_Idle1-1 = "那麼那麼，會出現什麼東西呢～？\n心動動！"
10032-CVGroup_UIEventBoxGachaShop_Idle2-1 = "嗯？問我為什麼一直盯著看？"
10032-CVGroup_UIEventBoxGachaShop_Idle2-2 = "你想想，開福袋這種事不管看幾次都很有趣不是嗎？"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "哇哦～！裡面居然有這種東西，無月醬也嚇了一跳！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "真好真好～我也好想要～"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "啊，好像抽到了不錯的東西呢！老師！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-2 = "這股幸運說不定也是託我的福哦？\n要感謝我也可以唷？咯呵呵！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "啊，中獎了嗎？\n啊哈。畢竟我都特別幫你抽了。"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-2 = "要把它當成是我，好好愛惜哦？"
10032-CVGroup_UIEventBoxGachaShop_Enter3-1 = "啊，老師！你好呀～！\n雖然新年的活動已經結束了……"
10032-CVGroup_UIEventBoxGachaShop_Enter3-2 = "不過還不滿足對吧！\n如果還有剩下的福袋，就趕緊全都拆開吧！"

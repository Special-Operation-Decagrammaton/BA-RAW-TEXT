[translation]
10032-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10032-CVGroup_CharacterGet_Idle1-1 = "ฮ่าฮ่าฮ่า! รอเค้าอยู่ใช่มั้ย คุณครู!\nปีนี้ก็มาเล่นสนุกกันอีกเยอะๆๆ เลยน้า~"
10032-CVGroup_Cafe_Idle1-1 = "อยากให้ทุกคนมารวมกัน\nแล้วมาเล่นฮาเนะสึกิด้วยกันจัง~"
10032-CVGroup_Cafe_Idle2-1 = "เค้าจะเล่นอะไรกับคุณครูดีน้า~♪"
10032-CVGroup_Cafe_Idle3-1 = "ถ้าหัวเราะ ความสุขจะมาหาน้า~♪"
10032-CVGroup_Cafe_Idle4-1 = "เจอของเล่น~ แล้ว~ ละ~♪"
10032-CVGroup_Cafe_Idle5-1 = "วันนี้เค้าจะได้เงินปีใหม่จากคุณครูรึเปล่าน้า~?"
10032-CVGroup_WeaponGet_Idle1-1 = "ฮ่าฮ่าฮ่า! ดีๆ! ถ้าเป็นอันนี้ละก็ต้องเล่นสนุกได้แน่ๆ~!"
10032-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ คุณครู เจอตัวแล้ว! ถึงจะปีใหม่แล้ว\nแต่งานก็เยอะเหมือนเดิมเลย! คุณครู!"
10032-CVGroup_UIEventLobby_Enter2-1 = "ว้าวววว! ได้มาเจอกันตั้งแต่ปีใหม่แบบนี้\nน่าตกใจจริงๆ นะ! คุณครู!"
10032-CVGroup_UIEventLobby_Enter2-2 = "เย้ ไฮไฟว์!"
10032-CVGroup_UIEventLobby_Idle1-1 = "อ่ะฮ่า ท่าทางอารุจังจะเจอเรื่องใหญ่เข้าแล้วน้า~\nแต่ว่าก็สนุกแหละเพราะงั้นไม่เป็นไรหรอก!"
10032-CVGroup_UIEventLobby_Idle2-1 = "ตู้บริจาคโดนขโมยไปโดยไม่ทันรู้ตัวงั้นเหรอ~\nมีเรื่องวุ่นวายตั้งแต่ปีใหม่แบบนี้ สุดยอดไปเลยน้า~!"
10032-CVGroup_UIEventLobby_Idle3-1 = "อื้อ~! ว่าแล้วเชียว อยู่เฉยๆ มันน่าเบื่อนะ!\nไปกันเถอะ! คุณครู!"
10032-CVGroup_UIEventLobby_Idle4-1 = "ปีนี้ก็ดูเหมือนว่าจะมีเรื่องวุ่นวายเกิดขึ้นอีกเยอะแยะเลย"
10032-CVGroup_UIEventLobby_Idle4-2 = "แต่อารุจัง คาโยโกะจัง แล้วก็ฮารุกะจังน่ะ\nหวังพึ่งคุณครูอยู่นะ เพราะงั้นก็ฝากด้วยล่ะ ♪"
10032-CVGroup_UIEventLobby_Idle4-3 = "หืม? เค้าเหรอ? นั่นสินะ\nคิดว่ายังไงล่ะ?"
10032-CVGroup_UIEventLobby_Idle4-4 = "ยังไงดีน้า~?"
10032-CVGroup_UIEventLobby_Enter3-1 = "เอาล่ะคุณครู วันนี้... เอาของเล่นอะไรมาเล่นกันดี?"
10032-CVGroup_UIEventLobby_Enter3-2 = "ฮาเนะสึกิ? ฟุคุวาราคิ? ดารุมะโอโตชิ? ฮุฮุฮุ~♪"
10032-CVGroup_UIEventLobby_Enter4-1 = "อืมม~ เบื่อของเล่นแล้วละ\nตั้งแต่นี้ไป ให้คุณครูมาเล่นด้วยดีกว่า!"
10032-CVGroup_UIEventLobby_Enter4-2 = "ว่ายังไง? เป็นความคิดที่ดีเลยใช่มั้ย?"
10032-CVGroup_UIEventLobby_Enter5-1 = "อา~ สนุกจังเลย! คุณครูก็สนุกใช่มั้ย?"
10032-CVGroup_UIEventLobby_Enter5-2 = "ถ้าตลอดปีนี้ มีแต่เรื่องสนุกๆ ตลอดทั้งปีเลยก็คงจะดีนะ!"
10032-CVGroup_UIEventBoxGachaShop_Enter1-1 = "ยินดีต้อนรับสู่จุดแลกของของมุสึกิจังนะ~!"
10032-CVGroup_UIEventBoxGachaShop_Enter2-1 = "ว่าไง~! คุณครู! มีถุงโชคดีอยู่รึเปล่า?\nรีบเปิดดูเถอะ!"
10032-CVGroup_UIEventBoxGachaShop_Idle1-1 = "นี่ๆ ได้อะไรงั้นเหรอ~? ตื่นเต้นจัง!"
10032-CVGroup_UIEventBoxGachaShop_Idle2-1 = "หืม? ถามว่าทำไมเค้าถึงจ้องแบบนั้นน่ะเหรอ?"
10032-CVGroup_UIEventBoxGachaShop_Idle2-2 = "ก็นะ เวลาที่เปิดดูของในถุงโชคดีน่ะ\nมันน่าสนุกจะตายไป!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "ว้าว! ในกล่องมีของแบบนี้อยู่งั้นเหรอ?\nมุสึกิ...ช็อก! น่าอิจฉาจุง~"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "เค้าก็อยากได้เหมือนกันนะ~"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "อื้อ! ของดีเลยนะเนี่ย! คุณครู!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-2 = "อาจเป็นเพราะโชคจากเค้ารึเปล่า\nจะขอบคุณเค้าก็ได้นะ ฮึฮึ!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "อ๊ะ ถูกรางวัลงั้นเหรอ? ฮ่าฮ่าฮ่า\nสมแล้วที่เค้าเป็นคนเลือกให้"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-2 = "คิดซะว่าเป็นเค้า แล้วก็ใช้อย่างทะนุถนอมล่ะ~"
10032-CVGroup_UIEventBoxGachaShop_Enter3-1 = "อ๊ะ คุณครู! ว่าไง~!\nถึงเทศกาลฉลองปีใหม่จะจบไปแล้ว..."
10032-CVGroup_UIEventBoxGachaShop_Enter3-2 = "แต่มันก็ยังไม่พอหรอกนะ!\nถ้ายังมีถุงโชคดีอยู่ละก็เปิดดูให้หมดเลยเถอะ!"

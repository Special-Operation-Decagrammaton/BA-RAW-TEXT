[translation]
10032-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10032-CVGroup_CharacterGet_Idle1-1 = "Hahaha! Hi, Sensei! We're going to play together lots this year, right?!"
10032-CVGroup_Cafe_Idle1-1 = "I want to get together with everyone and play hanetsuki!"
10032-CVGroup_Cafe_Idle2-1 = "What should I play with Sensei? ♪"
10032-CVGroup_Cafe_Idle3-1 = "If you laugh, blessings will come your way! ♪"
10032-CVGroup_Cafe_Idle4-1 = "Found a toy! ♪"
10032-CVGroup_Cafe_Idle5-1 = "Hmm. Maybe I can get Sensei to spoil me and give me some New Year's cash!"
10032-CVGroup_WeaponGet_Idle1-1 = "Hahaha, okay, okay! This could be a little bit of fun!"
10032-CVGroup_UIEventLobby_Enter1-1 = "Found ya, Sensei! It's the new year and you're STILL working?! Hahaha!"
10032-CVGroup_UIEventLobby_Enter2-1 = "Wow, wow, wow! I get to see Sensei right at the beginning of the new year?!"
10032-CVGroup_UIEventLobby_Enter2-2 = "High five!"
10032-CVGroup_UIEventLobby_Idle1-1 = "It's time to bail Aru out of trouble! Again! Heehee. It's my favorite activity."
10032-CVGroup_UIEventLobby_Idle2-1 = "Out of the blue, there's an offering box thief! I just love the chaos at the start of the new year!"
10032-CVGroup_UIEventLobby_Idle3-1 = "Ugh! I hate doing nothing. I'm so booored. Let's find something to entertain ourselves, Sensei!"
10032-CVGroup_UIEventLobby_Idle4-1 = "Another chaotic year is in the works!"
10032-CVGroup_UIEventLobby_Idle4-2 = "Aru, Kayoko, and Haruka are all relying on you, Sensei! You better do your best! ♪"
10032-CVGroup_UIEventLobby_Idle4-3 = "Huh? Me? Well, what do you think?"
10032-CVGroup_UIEventLobby_Idle4-4 = "Hmmm? Tell me!"
10032-CVGroup_UIEventLobby_Enter3-1 = "So, Sensei, what toy should we play with today?"
10032-CVGroup_UIEventLobby_Enter3-2 = "Hanetsuki? Fukuwarai? Daruma otoshi! Heeheehee! ♪"
10032-CVGroup_UIEventLobby_Enter4-1 = "Hmm, I'm kinda getting tired of playing with toys. I'm going to play with Sensei instead!"
10032-CVGroup_UIEventLobby_Enter4-2 = "What do you think? It's a great idea, right?"
10032-CVGroup_UIEventLobby_Enter5-1 = "Heehee. That was fun! You had fun too, right?"
10032-CVGroup_UIEventLobby_Enter5-2 = "I hope this year is full of fun stuff, just like this!"
10032-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Welcome to Mutsuki's special exchange center!"
10032-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Hello, Sensei! You have the lucky pouch, right? Let's open it up!"
10032-CVGroup_UIEventBoxGachaShop_Idle1-1 = "I wonder what's inside! *ba-dump* *ba-dump*"
10032-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Huh? Why am I looking at it like that?"
10032-CVGroup_UIEventBoxGachaShop_Idle2-2 = "Well, because it's always fun to open lucky pouches!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Wow! I can't believe this was inside! I'm shocked! I envy you!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "I want it too!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Yeah! It's a good item, Sensei!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-2 = "This might all be thanks to me! You can be grateful. Heeheehee!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Oh, maybe you won something! Heeheehee. I mean, I did pick it for you."
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-2 = "Think of it as an extension of me and cherish it, okay?"
10032-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Sensei! Hello! The New Year's event is over, but..."
10032-CVGroup_UIEventBoxGachaShop_Enter3-2 = "It's still not enough! If there are any leftover lucky pouches, we should open all of them!"

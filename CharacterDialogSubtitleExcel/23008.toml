[translation]
23008-CVGroup_UITitle_Idle1-1 = "Blue Archive"
23008-CVGroup_CharacterGet_Idle1-1 = "ทุกการพบเจอกัน มันเป็นสิ่งที่ถูกกำหนดเอาไว้...\nขอฝากตัวด้วยนะคะคุณครู"
23008-CVGroup_Cafe_Idle1-1 = "ฉันรู้สึกได้ถึงพลังศักดิ์สิทธิ์ด้วยล่ะค่ะ..."
23008-CVGroup_Cafe_Idle2-1 = "วันนี้... อากาศดีจังเลยนะคะ"
23008-CVGroup_Cafe_Idle3-1 = "เรามาหยุดพักที่นี่สักครู่ก่อน แล้วค่อยไปต่อดีมั้ยคะ?"
23008-CVGroup_Cafe_Idle4-1 = "ขอให้พรสถิตอยู่กับที่แห่งนี้"
23008-CVGroup_Cafe_Idle5-1 = "ขอให้โลกนี้ได้พบกับความสงบสุขในชั่วขณะหนึ่ง"
23008-CVGroup_WeaponGet_Idle1-1 = "ฉันไม่ค่อยอยากใช้อาวุธเท่าไร...\nแต่หากเพื่อเอาชนะความอยุติธรรมก็ย่อมได้ค่ะ"

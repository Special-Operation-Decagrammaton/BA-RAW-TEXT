[translation]
23008-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
23008-CVGroup_CharacterGet_Idle1-1 = "모든 만남은 필연적인 것…… 잘 부탁드립니다, 선생님."
23008-CVGroup_Cafe_Idle1-1 = "성스러운 기운이 느껴지네요…"
23008-CVGroup_Cafe_Idle2-1 = "오늘도 날씨가 좋네요."
23008-CVGroup_Cafe_Idle3-1 = "아주 잠깐이라면… 여기서 쉬었다 가도 괜찮을까요?"
23008-CVGroup_Cafe_Idle4-1 = "이 장소에 축복이 깃들길."
23008-CVGroup_Cafe_Idle5-1 = "이 세상이 잠시나마 평화롭기를."
23008-CVGroup_WeaponGet_Idle1-1 = "그다지 무기는 쓰고 싶지 않지만… 평화를 위해서라면."

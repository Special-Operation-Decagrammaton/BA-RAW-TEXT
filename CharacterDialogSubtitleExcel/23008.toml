[translation]
23008-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
23008-CVGroup_CharacterGet_Idle1-1 = "所有的相遇都是必然……\n今後還請多多指教，老師。"
23008-CVGroup_Cafe_Idle1-1 = "能感受到神聖的氣息，是個很棒的地方呢。"
23008-CVGroup_Cafe_Idle2-1 = "今天天氣也很好呢。"
23008-CVGroup_Cafe_Idle3-1 = "只是一會的話…\n就算在這裡休息也沒關係嗎？"
23008-CVGroup_Cafe_Idle4-1 = "但願從今以後，\n這裡都能永遠充滿祝福。"
23008-CVGroup_Cafe_Idle5-1 = "願這個世界多少能和平一點……"
23008-CVGroup_WeaponGet_Idle1-1 = "雖然不太想使用武器……\n不過如果是為了和平的話……"

[translation]
10053-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10053-CVGroup_CharacterGet_Idle1-1 = "후후…… 준비만전이에요. 오늘의 제 계산에, 실수는 없을 테니까요!"
10053-CVGroup_Cafe_Idle1-1 = "조금 지쳤는데…… 여기서 쉴 수 있으려나."
10053-CVGroup_Cafe_Idle2-1 = "평소부터 체력 관리에 신경 쓰지 않으면…"
10053-CVGroup_Cafe_Idle3-1 = "이 카페는 인상적이네. 조금, 계산 외야."
10053-CVGroup_Cafe_Idle4-1 = "알고는 있었지만, 운동이란 게 쉽지가 않네……"
10053-CVGroup_Cafe_Idle5-1 = "파산하지 않았으면 좋겠는데……"
10053-CVGroup_WeaponGet_Idle1-1 = "합리적이고…… 운동에도 매우 적합한 장비네요. 감사합니다. 선생님."
10053-CVGroup_UIEventLobby_Enter1-1 = "<황륜대제>에 어서 오세요! 오늘을 위해서, 그동안 열심히 준비했다고요!"
10053-CVGroup_UIEventLobby_Enter2-1 = "일단은 실행위원이지만, 몇몇 경기는 직접 출전할 예정이라서요."
10053-CVGroup_UIEventLobby_Enter2-2 = "선생님. 제 활약, 잘 지켜봐 주셔야 해요?"
10053-CVGroup_UIEventLobby_Enter3-1 = "대운동회가 시작되고 나서야 깨달았는데……"
10053-CVGroup_UIEventLobby_Enter3-2 = "……생각했던 것보다 훨씬 바쁘네요. 여러가지 의미로……"
10053-CVGroup_UIEventLobby_Enter4-1 = "대회도 어느덧 후반부…… 마지막까지 긴장을 늦추지 말아주세요!"
10053-CVGroup_UIEventLobby_Enter5-1 = "황륜대제도 이것으로 종료네요. 선생님, 수고 많으셨습니다."
10053-CVGroup_UIEventLobby_Enter5-2 = "저 그리고 괜찮으시다면……"
10053-CVGroup_UIEventLobby_Enter5-3 = "후야제에 있을 캠프파이어에 같이 가지 않으실래요?"
10053-CVGroup_UIEventLobby_Idle1-1 = "컨디션 체크 완료. 장비 체크 완료."
10053-CVGroup_UIEventLobby_Idle1-2 = "황륜대제의 계획은…… 완벽해!"
10053-CVGroup_UIEventLobby_Idle2-1 = "지금 뭔가 불온해 보이는 학생 무리가…"
10053-CVGroup_UIEventLobby_Idle3-1 = "아, 뺨의 이 별 말인가요?"
10053-CVGroup_UIEventLobby_Idle3-2 = "아까 마키가 그려주었답니다."
10053-CVGroup_UIEventLobby_Idle3-3 = "모처럼의 축제이니 페이스 페인팅을 해준다고 해서요."
10053-CVGroup_UIEventLobby_Idle3-4 = "역시 조금…… 들뜬 것처럼 보이려나요……?"

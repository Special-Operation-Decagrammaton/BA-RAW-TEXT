[translation]
10053-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10053-CVGroup_CharacterGet_Idle1-1 = "呵呵……準備萬無一失。\n我今天的計算，不會有任何失誤唷！"
10053-CVGroup_Cafe_Idle1-1 = "有點累了……\n要在這裡休息嗎。"
10053-CVGroup_Cafe_Idle2-1 = "平常不注意\n身體管理的話…"
10053-CVGroup_Cafe_Idle3-1 = "這間咖啡廳，真有趣。\n可能在我的計算之外。"
10053-CVGroup_Cafe_Idle4-1 = "雖然我很清楚，\n運動並不容易呢。"
10053-CVGroup_Cafe_Idle5-1 = "希望不會破產…"
10053-CVGroup_WeaponGet_Idle1-1 = "這是很合理……而且非常適合運動的裝備呢。\n謝謝你，老師。"
10053-CVGroup_UIEventLobby_Enter1-1 = "歡迎來到「晄輪大祭」！\n為了今天，我努力做了準備唷！"
10053-CVGroup_UIEventLobby_Enter2-1 = "雖然我是實行委員，\n但我打算親自參加幾個項目。"
10053-CVGroup_UIEventLobby_Enter2-2 = "老師，我活躍的表現，請好好地看著唷？"
10053-CVGroup_UIEventLobby_Enter3-1 = "大運動會開始後才注意到……"
10053-CVGroup_UIEventLobby_Enter3-2 = "……比預期忙多了呢。\n各種意義上都是……"
10053-CVGroup_UIEventLobby_Enter4-1 = "晄輪大祭也已經接近尾聲……\n請堅持到最後哦！"
10053-CVGroup_UIEventLobby_Enter5-1 = "晄輪大祭到此結束了。\n老師，辛苦了。"
10053-CVGroup_UIEventLobby_Enter5-2 = "那個，如果可以的話……"
10053-CVGroup_UIEventLobby_Enter5-3 = "後夜祭的營火晚會，要一起去嗎？"
10053-CVGroup_UIEventLobby_Idle1-1 = "狀態檢查良好。裝備確認良好。"
10053-CVGroup_UIEventLobby_Idle1-2 = "「晄輪大祭」的計畫……完美！"
10053-CVGroup_UIEventLobby_Idle2-1 = "現在不知為何，有一群吵鬧的學生集團…"
10053-CVGroup_UIEventLobby_Idle3-1 = "啊，你說我臉頰上的星星標誌嗎？"
10053-CVGroup_UIEventLobby_Idle3-2 = "是剛才真紀幫我畫的。"
10053-CVGroup_UIEventLobby_Idle3-3 = "說是難得的慶典，所以要幫我畫臉部彩繪。"
10053-CVGroup_UIEventLobby_Idle3-4 = "我果然看起來……有點興奮嗎……？"

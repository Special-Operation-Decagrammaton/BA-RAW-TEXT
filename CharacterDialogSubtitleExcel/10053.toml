[translation]
10053-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10053-CVGroup_CharacterGet_Idle1-1 = "Haha... All preparations complete. There won't be a single error in my calculations today!"
10053-CVGroup_Cafe_Idle1-1 = "I'm feeling a little drained... I wonder if now's a good time for a break."
10053-CVGroup_Cafe_Idle2-1 = "If you don't start taking care of your physical fitness..."
10053-CVGroup_Cafe_Idle3-1 = "This is an interesting cafe. Also, very unexpected."
10053-CVGroup_Cafe_Idle4-1 = "I already knew this, but wow... Exercise is not easy..."
10053-CVGroup_Cafe_Idle5-1 = "As long as we don't go completely bankrupt, we'll be fine. I hope."
10053-CVGroup_WeaponGet_Idle1-1 = "This is surprisingly...suitable and reasonable for exercise. Thank you, Sensei."
10053-CVGroup_UIEventLobby_Enter1-1 = "Welcome to the Kivotos Halo Festival! Tremendous work has gone into preparing for this day!"
10053-CVGroup_UIEventLobby_Enter2-1 = "Though I'm part of the Executive Committee, I'm also planning on participating in a few matches."
10053-CVGroup_UIEventLobby_Enter2-2 = "You'll be rooting for me out there, right Sensei?"
10053-CVGroup_UIEventLobby_Enter3-1 = "I only realized this after field day began..."
10053-CVGroup_UIEventLobby_Enter3-2 = "But I'm so much busier than I thought I would be... In so many different ways..."
10053-CVGroup_UIEventLobby_Enter4-1 = "We're in the second half now... Keep your guard up until the very end!"
10053-CVGroup_UIEventLobby_Enter5-1 = "I guess that marks the end of the Kivotos Halo Festival... Thank you, Sensei, for your hard work."
10053-CVGroup_UIEventLobby_Enter5-2 = "Oh, if it's okay with you..."
10053-CVGroup_UIEventLobby_Enter5-3 = "Would you like to go to the after-festival bonfire together?"
10053-CVGroup_UIEventLobby_Idle1-1 = "Physical condition? Check. Equipment? Check."
10053-CVGroup_UIEventLobby_Idle1-2 = "My plans for the Kivotos Halo Festival...are airtight!"
10053-CVGroup_UIEventLobby_Idle2-1 = "That group of students seems a little shady..."
10053-CVGroup_UIEventLobby_Idle3-1 = "Hm? The star on my cheek?"
10053-CVGroup_UIEventLobby_Idle3-2 = "Maki drew it on for me!"
10053-CVGroup_UIEventLobby_Idle3-3 = "It's a festival, after all. So she offered to do a little face painting."
10053-CVGroup_UIEventLobby_Idle3-4 = "Hmm... Is it too much...?"

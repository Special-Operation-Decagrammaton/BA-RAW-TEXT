[translation]
10053-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10053-CVGroup_CharacterGet_Idle1-1 = "ฮิฮิ... ฉันเตรียมทุกอย่างเอาไว้พร้อมแล้ว\nวันนี้การคำนวณของฉัน จะไม่ผิดพลาดแน่นอนค่ะ!"
10053-CVGroup_Cafe_Idle1-1 = "เหนื่อยจังเลย พักที่นี่สักหน่อยได้มั้ยนะ..."
10053-CVGroup_Cafe_Idle2-1 = "ถ้าไม่เตรียมพร้อมดูแลร่างกายเอาไว้\nตั้งแต่ช่วงปกติคงไม่ดีแน่..."
10053-CVGroup_Cafe_Idle3-1 = "คาเฟ่นี้น่าสนใจจัง... เกินจากที่คาดการณ์ไว้เลย"
10053-CVGroup_Cafe_Idle4-1 = "ถึงจะรู้อยู่แล้วก็เถอะ\nแต่ว่าการออกกำลังกายไม่ใช่เรื่องง่ายๆ เลยนะ..."
10053-CVGroup_Cafe_Idle5-1 = "หวังว่าจะไม่ล้มละลายนะ..."
10053-CVGroup_WeaponGet_Idle1-1 = "เป็นอุปกรณ์ที่สมเหตุสมผล...\nและเหมาะกับการออกกำลังกายดีนะคะ ขอบคุณค่ะคุณครู"
10053-CVGroup_UIEventLobby_Enter1-1 = "ยินดีต้อนรับสู่ฮาโลเฟสติวัล\nฉันเตรียมงานมาสุดฝีมือเพื่อวันนี้เลยนะคะ!"
10053-CVGroup_UIEventLobby_Enter2-1 = "ถึงจะเป็นกรรมการจัดงาน แต่ฉันก็จะลงแข่งในบางรายการด้วยค่ะ"
10053-CVGroup_UIEventLobby_Enter2-2 = "คุณครูคะ คุณครูต้องจับตาดูความทุ่มเทของฉันนะคะ"
10053-CVGroup_UIEventLobby_Enter3-1 = "ฉันเพิ่งมารู้หลังจากที่งานมหกรรมแข่งขันกีฬาเริ่มไปแล้ว..."
10053-CVGroup_UIEventLobby_Enter3-2 = "ฉันยุ่งมากๆ เลยนะคะ มากกว่าที่คิดอีก ในหลายๆ ด้านเลยค่ะ..."
10053-CVGroup_UIEventLobby_Enter4-1 = "มาถึงครึ่งหลังของการแข่งขันแล้ว...\nอย่าเพิ่งวางใจจนกว่าจะจบการแข่งขันนะคะ!"
10053-CVGroup_UIEventLobby_Enter5-1 = "ฮาโลเฟสติวัลจบลงเพียงเท่านี้สินะคะ\nคุณครู ขอบคุณมากเลยนะคะ"
10053-CVGroup_UIEventLobby_Enter5-2 = "เอ่อ แล้วก็ ถ้าสะดวกละก็..."
10053-CVGroup_UIEventLobby_Enter5-3 = "เราไปแคมป์ไฟตอนอาฟเตอร์ ปาร์ตี้ด้วยกันมั้ยคะ?"
10053-CVGroup_UIEventLobby_Idle1-1 = "เช็กสภาพร่างกายเรียบร้อย\nเช็กอุปกรณ์ต่างๆ เรียบร้อย"
10053-CVGroup_UIEventLobby_Idle1-2 = "แผนการฮาโลเฟสติวัล... ช่างสมบูรณ์แบบ!"
10053-CVGroup_UIEventLobby_Idle2-1 = "มีกลุ่มนักเรียนที่ดูเป็นตัวป่วนอะไรสักอย่างในตอนนี้ด้วย..."
10053-CVGroup_UIEventLobby_Idle3-1 = "อ้อ ดาวที่อยู่บนแก้มนี่น่ะเหรอคะ?"
10053-CVGroup_UIEventLobby_Idle3-2 = "เมื่อกี้มากิวาดให้ฉันน่ะค่ะ"
10053-CVGroup_UIEventLobby_Idle3-3 = "พอดีเธอบอกว่าจะเพนท์หน้าให้ เพราะเทศกาลไม่ได้มีกันบ่อยๆ น่ะค่ะ"
10053-CVGroup_UIEventLobby_Idle3-4 = "หรือว่ามัน... ไม่ค่อยสวยงั้นเหรอคะ...?"

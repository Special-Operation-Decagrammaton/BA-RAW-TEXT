[translation]
20023-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20023-CVGroup_CharacterGet_Idle1-1 = "발키리 경찰학교, 공안국의 국장 오가타 칸나입니다.\n범죄자의 심문이라면 맡겨주십시오."
20023-CVGroup_Cafe_Idle1-1 = "이곳의 커피는 향이 제법 괜찮은 걸."
20023-CVGroup_Cafe_Idle2-1 = "피곤하군…"
20023-CVGroup_Cafe_Idle3-1 = "이런 곳에 탐정토끼 시리즈의 신작이…?"
20023-CVGroup_Cafe_Idle4-1 = "윽, 방위실로부터 연락이…"
20023-CVGroup_Cafe_Idle5-1 = "오늘도 키보토스가 평화롭기를."
20023-CVGroup_WeaponGet_Idle1-1 = "그러고보면 이 총을 제대로 다루지 못해 애를 먹던 시절도 있었지요.\n정작 총에 익숙해진 지금은 사용할 때가 거의 없는 것이 유감입니다만…"

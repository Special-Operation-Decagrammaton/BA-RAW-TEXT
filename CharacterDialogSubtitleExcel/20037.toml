[translation]
20037-CVGroup_UITitle_Idle1-1 = "블루 아카이브……."
20037-CVGroup_CharacterGet_Idle1-1 = "으윽, 또 귀찮은 일을 시키려고……?\n뭐, 선생의 부탁이라면 일단 어울려 주겠지만……."
20037-CVGroup_Cafe_Idle1-1 = "도넛을 숨어서 먹을 수 있는 곳은 없을까?"
20037-CVGroup_Cafe_Idle2-1 = "설마, 여기서도 일…? 설마 설마~?"
20037-CVGroup_Cafe_Idle3-1 = "(선글라스를 쓰고 앉아서 잔다면… 일하는 것처럼 보일까…?)"
20037-CVGroup_Cafe_Idle4-1 = "이 수영복, 비교적 수수해서 눈에 안 띈단 말이지."
20037-CVGroup_Cafe_Idle5-1 = "뭐, 오늘은 풀장에 들어갈 일도 없으니, 괜찮겠지."
20037-CVGroup_WeaponGet_Idle1-1 = "음. 설마 이렇게까지 해줄 줄이야.\n선생한테 무슨 일이 생기면 최선을 다해 구조할게.\n……그때까지는 쉬어도 될까?"
20037-CVGroup_UIEventLobby_Enter1-1 = "여어, 선생, 고생이 많아."
20037-CVGroup_UIEventLobby_Enter2-1 = "워터파크…… 일만 아니었음, 좋아하는 장소인데……"
20037-CVGroup_UIEventLobby_Enter3-1 = "다들 기운이 넘치네. 놀러 와서 그런가?"
20037-CVGroup_UIEventLobby_Enter4-1 = "자, 이제 곧 퇴근 시간이야!"
20037-CVGroup_UIEventLobby_Enter5-1 = "이런저런 일이 있었지만, 어떻게든 끝났네. 선생도 고생했어."
20037-CVGroup_UIEventLobby_Idle1-1 = "워터 슬라이드?"
20037-CVGroup_UIEventLobby_Idle1-2 = "아니, 무섭다기 보다는……. 귀… 귀찮다고 할까……."
20037-CVGroup_UIEventLobby_Idle2-1 = "더워…… 이런 날에 일이라니, 최악이야~"
20037-CVGroup_UIEventLobby_Idle3-1 = "이런 뜨거운 날일수록 당분 섭취는 중요하니까."
20037-CVGroup_UIEventLobby_Idle3-2 = "그래서, 도넛은 생필품이라는 거야."
20037-CVGroup_UIEventLobby_Idle4-1 = "핫! 현, 현장 이상 무! ……어라, 선생? 놀랐잖아."
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "교환하러 왔어? 여러가지 있으니 살펴보라구."
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "하~ 시원해~ 선생도 느긋하게 있다 가."
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "영업 종료~ 자, 이제 뒤풀이라도 갈까, 선생?"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "아무리 선생이라도, 공짜로는 줄 수 없지?"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "나 말고, 상품을 좀 봐~"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "우와?! 그런 게 있었어?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "서, 선생님 보기보다 운이 좋구나?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "축하해~ 이거, 1등이야."
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "이걸로 전부 끝인가. 이야, 우리 둘다 고생했네."

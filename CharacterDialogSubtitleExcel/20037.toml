[translation]
20037-CVGroup_UITitle_Idle1-1 = "Blue Archive..."
20037-CVGroup_CharacterGet_Idle1-1 = "อึก... จะสั่งงานน่ารำคาญอะไรอีกเหรอ...?\nถ้าเป็นคำขอจากครู ฉันก็จะช่วยให้อยู่หรอกนะ…"
20037-CVGroup_Cafe_Idle1-1 = "มีที่ไหนที่แอบกินโดนัทได้มั้ยนะ?"
20037-CVGroup_Cafe_Idle2-1 = "อย่าบอกนะว่าจะทำงานที่นี่ด้วย...?\nเอาจริงเหรอ~?"
20037-CVGroup_Cafe_Idle3-1 = "(ถ้าใส่แว่นกันแดดแล้วนั่งหลับ...\nจะดูเหมือนว่าทำงานอยู่มั้ยนะ...?)"
20037-CVGroup_Cafe_Idle4-1 = "ชุดว่ายน้ำชุดนี้ไม่ค่อยหวือหวา\nก็เลยไม่สะดุดตาน่ะ"
20037-CVGroup_Cafe_Idle5-1 = "แต่วันนี้ก็ไม่มีเรื่องให้ต้องลงสระว่ายน้ำ\nคงไม่เป็นไรหรอกเนอะ"
20037-CVGroup_WeaponGet_Idle1-1 = "อืม คิดไม่ถึงเลยนะว่าจะทำให้ถึงขนาดนี้\nถ้าครูมีเรื่องอะไร ฉันจะช่วยอย่างสุดความสามารถเลย\nแต่ขอพักจนกว่าจะมีเรื่องได้มั้ย?"
20037-CVGroup_UIEventLobby_Enter1-1 = "นี่ ครู เหนื่อยหน่อยนะ"
20037-CVGroup_UIEventLobby_Enter2-1 = "สวนน้ำ... ฉันก็ชอบที่นี่นะ\nถ้าไม่ได้มาทำงานน่ะ..."
20037-CVGroup_UIEventLobby_Enter3-1 = "ทุกคนกระตือรือร้นจังเลย\nคงเพราะว่ามาเที่ยวสินะ?"
20037-CVGroup_UIEventLobby_Enter4-1 = "เอาละ ใกล้ถึงเวลาเลิกงานแล้ว!"
20037-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะเกิดเรื่องขึ้นมากมาย แต่ก็จบลงจนได้สินะ\nครูก็ทำได้ดีเหมือนกัน"
20037-CVGroup_UIEventLobby_Idle1-1 = "สไลเดอร์สระน้ำเหรอ?"
20037-CVGroup_UIEventLobby_Idle1-2 = "อ่า ไม่ได้กลัวหรอก ต้องบอกว่า...\nขะ... ขี้เกียจเล่นมากกว่า..."
20037-CVGroup_UIEventLobby_Idle2-1 = "ร้อนจัง... ต้องมาทำงานในวันแบบนี้ แย่ที่สุดเลย~"
20037-CVGroup_UIEventLobby_Idle3-1 = "ยิ่งเป็นวันที่ร้อนแบบนี้ ก็ยิ่งต้องเติมน้ำตาลนะ"
20037-CVGroup_UIEventLobby_Idle3-2 = "เพราะแบบนี้ละ โดนัทถึงได้เป็นสิ่งสำคัญ"
20037-CVGroup_UIEventLobby_Idle4-1 = "อ๊ะ! ทะ... ทุกอย่างเรียบร้อยดี!\nเอ๋ ครู? ตกใจหมดเลย"
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "มาแลกของเหรอ?\nมีของหลายอย่างเลย ลองเลือกดูนะ"
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "ฮ้า~ เย็นสบายจัง~\nครูก็พักที่นี่ก่อน แล้วค่อยไปนะ"
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "ร้านปิดแล้ว~\nเอาละ ไปเลี้ยงฉลองที่เสร็จงานกันเถอะครู"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "ต่อให้เป็นครู ก็ให้ฟรีไม่ได้หรอกนะ"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "อย่ามองฉันสิ มองของนู่น~"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "ว้าว?! มีอะไรแบบนี้ด้วยเหรอ?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "คะ... คุณครูดวงดีกว่าที่คิดนะเนี่ย?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "ยินดีด้วยน้า~ ได้รางวัลที่ 1 เลย"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "น่าจะเสร็จหมดแล้วเนอะ\nเราเหนื่อยกันทั้งคู่เลยนะครู"

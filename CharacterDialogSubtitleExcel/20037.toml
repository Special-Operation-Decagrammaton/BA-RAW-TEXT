[translation]
20037-CVGroup_UITitle_Idle1-1 = "蔚藍檔案……"
20037-CVGroup_CharacterGet_Idle1-1 = "呃，又想叫我去做麻煩的事了……？\n不過，既然是老師的請求，姑且還是會配合就是了……"
20037-CVGroup_Cafe_Idle1-1 = "有感覺能躲起來吃甜甜圈的地方嗎？"
20037-CVGroup_Cafe_Idle2-1 = "該不會，連在這裡都要工作……？\n不會吧不會吧～？"
20037-CVGroup_Cafe_Idle3-1 = "（戴著墨鏡睡覺的話……看起來會像在工作嗎……？）"
20037-CVGroup_Cafe_Idle4-1 = "這件泳裝還挺樸素的，不是很吸睛。"
20037-CVGroup_Cafe_Idle5-1 = "算了，反正今天也不會進到泳池裡……無所謂吧。"
20037-CVGroup_WeaponGet_Idle1-1 = "唔嗯，沒想到事情會變成這樣。\n如果老師出了什麼事的話，我一定會盡全力救你的。\n……在那之前可以先休息嗎？"
20037-CVGroup_UIEventLobby_Enter1-1 = "呀，老師。辛苦了～"
20037-CVGroup_UIEventLobby_Enter2-1 = "水上樂園……不是工作的話，還挺喜歡的說……"
20037-CVGroup_UIEventLobby_Enter3-1 = "大家都很有精神呢～\n大概因為是來玩的吧。"
20037-CVGroup_UIEventLobby_Enter4-1 = "好，快到下班時間了！"
20037-CVGroup_UIEventLobby_Enter5-1 = "雖然發生了很多事，\n但總算是結束了。\n老師也辛苦了。"
20037-CVGroup_UIEventLobby_Idle1-1 = "滑水道？"
20037-CVGroup_UIEventLobby_Idle1-2 = "不，與其說是害怕……\n不如說是麻煩吧……"
20037-CVGroup_UIEventLobby_Idle2-1 = "好熱……竟然得在這種日子工作，真是糟透了～"
20037-CVGroup_UIEventLobby_Idle3-1 = "像這種炎熱的日子，糖分補給才格外重要呢。"
20037-CVGroup_UIEventLobby_Idle3-2 = "沒錯，所以甜甜圈就是生活必需品。"
20037-CVGroup_UIEventLobby_Idle4-1 = "哈！現，現場無異常！\n……咦，老師？嚇我一跳。"
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "你是來換東西的嗎？\n這裡有很多品項可以看～"
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "哈～好涼快～～\n老師你也來放鬆一下吧。"
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "營業結束～\n老師，要不要去慶祝一下？"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "就算是老師，也不能算你免費唷？"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "別看我，看商品啦～"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "哇！？原來有這種東西啊！"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "老，老師。你的運氣比我想的還要好呢？"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "恭喜～這個，是一等獎唷。"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "這樣全部就告一段落了嗎？\n呀啊，我們兩個今天都辛苦了。"

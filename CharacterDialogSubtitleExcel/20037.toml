[translation]
20037-CVGroup_UITitle_Idle1-1 = "Blue Archive..."
20037-CVGroup_CharacterGet_Idle1-1 = "Ugh, you're going to make me do something bothersome again...? Well, since it's a request from you, I'll at least play along..."
20037-CVGroup_Cafe_Idle1-1 = "Is there anywhere I can hide and eat donuts?"
20037-CVGroup_Cafe_Idle2-1 = "Surely I don't have to work here too...? Surely? SURELY?"
20037-CVGroup_Cafe_Idle3-1 = "(If I sit and sleep with sunglasses on...would it look like I'm working...?)"
20037-CVGroup_Cafe_Idle4-1 = "This swimsuit is rather plain, so it doesn't stand out."
20037-CVGroup_Cafe_Idle5-1 = "Well, nothing's going to make me get into the pool today, so I suppose it'll be fine."
20037-CVGroup_WeaponGet_Idle1-1 = "Um. To do this much for me... If something happens to Sensei, I'll do my best to rescue you. ...Can I take a break until then, though?"
20037-CVGroup_UIEventLobby_Enter1-1 = "Hey, Sensei, I see you've been working hard."
20037-CVGroup_UIEventLobby_Enter2-1 = "The water park... I'd love it...if I wasn't working here!"
20037-CVGroup_UIEventLobby_Enter3-1 = "Everyone's so full of energy. Is it because they're here to play?"
20037-CVGroup_UIEventLobby_Enter4-1 = "Oh, yay! It's almost time to leave work!"
20037-CVGroup_UIEventLobby_Enter5-1 = "We've had our ups and downs, but we made it through the day. You worked hard as well, Sensei."
20037-CVGroup_UIEventLobby_Idle1-1 = "The water slide?"
20037-CVGroup_UIEventLobby_Idle1-2 = "No, it's not that it's scary... It's more like...b-bothersome, I'd say..."
20037-CVGroup_UIEventLobby_Idle2-1 = "It's so hot... Working on a day like this is the worst!"
20037-CVGroup_UIEventLobby_Idle3-1 = "On a hot day like this, it's essential to keep your sugar levels up."
20037-CVGroup_UIEventLobby_Idle3-2 = "Therefore, donuts are a must."
20037-CVGroup_UIEventLobby_Idle4-1 = "Ack! E-Everything's under control at the scene! ...Huh, Sensei? You startled me."
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Are you here for an exchange? We have a variety of options, so feel free to have a look around."
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ahh... It's so nice and cool. You should relax a little while longer."
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "The shop is now closed. How about we go out for a little after-work get-together?"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Even for you, Sensei, I can't give it away for free."
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Check out the products, not me!"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Wow?! There's such a thing?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "S-Sensei, you're luckier than I thought!"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Congrats! You got first place!"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Is this it? Wow, we both worked really hard."

[translation]
20003-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20003-CVGroup_CharacterGet_Idle1-1 = "정의실현부 1학년 마시로, 부름에 따라 이곳에.\n미숙한 몸이지만, 언제나 전력을 다하겠습니다."
20003-CVGroup_Cafe_Idle1-1 = "이런 장식, 츠루기 선배는 싫어하려나…."
20003-CVGroup_Cafe_Idle2-1 = "하스미 선배의 날개, 이 가구처럼 폭신해 보였지."
20003-CVGroup_Cafe_Idle3-1 = "명경지수…."
20003-CVGroup_Cafe_Idle4-1 = "츠루기 선배의 목은 괜찮은 걸까…?"
20003-CVGroup_Cafe_Idle5-1 = "가끔은 이런 곳도 나쁘지 않네요."
20003-CVGroup_Cafe_Idle6-1 = "예뻐라…. 후훗."
20003-CVGroup_WeaponGet_Idle1-1 = "이것이야말로… 진짜 정의…"

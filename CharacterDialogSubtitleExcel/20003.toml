[translation]
20003-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20003-CVGroup_CharacterGet_Idle1-1 = "實現正義部1年級生麻白，因為收到呼喚而前來。\n雖然還不夠成熟，但會隨時全力以赴的。"
20003-CVGroup_Cafe_Idle1-1 = "這樣的裝潢，弦生前輩會喜歡嗎…"
20003-CVGroup_Cafe_Idle2-1 = "蓮實前輩的翅膀，\n看起來跟家具一樣鬆鬆軟軟的。"
20003-CVGroup_Cafe_Idle3-1 = "心如止水…"
20003-CVGroup_Cafe_Idle4-1 = "弦生前輩的脖子沒事吧…？"
20003-CVGroup_Cafe_Idle5-1 = "偶爾來這種地方也不錯。"
20003-CVGroup_Cafe_Idle6-1 = "好漂亮…\n呵呵。"
20003-CVGroup_WeaponGet_Idle1-1 = "這才是…\n真正的正義…"

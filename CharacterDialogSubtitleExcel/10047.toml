10047-CVGroup_UIEventLobby_Idle1-1 = "모두 바쁜 것 같으니까…. 선생님이랑 나랑, 놀까?"
10047-CVGroup_UIEventLobby_Idle2-1 = "그러고 보니 카호가, 위험해지면"

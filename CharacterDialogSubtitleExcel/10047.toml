[translation]
10047-CVGroup_UITitle_Idle1-1 = "Blue~~ Archive!"
10047-CVGroup_CharacterGet_Idle1-1 = "เมื่อกี้... ฉันเห็นคุณปูม้ากำลังเดินเนิบนาบอยู่ที่ชายทะเล\nคุณครูไปดูด้วยกันมั้ย?"
10047-CVGroup_Cafe_Idle1-1 = "สด~ชื่น~จัง~"
10047-CVGroup_Cafe_Idle2-1 = "ว้าวว นี่มันไอศกรีมเหรอ...?"
10047-CVGroup_Cafe_Idle3-1 = "พวกเรามาสร้างบ้านให้คุณปูม้าตรงนี้กันเถอะ~"
10047-CVGroup_Cafe_Idle4-1 = "ผ้าเช็ดหน้า พร้อม พลั่วขุดดิน พร้อม\nเท่านี้เราก็มาก่อปราสาททรายกันได้แล้วล่ะ"
10047-CVGroup_Cafe_Idle5-1 = "ฉันอยากจะแข่งเล่นเกมตักทราย\nกับสมาชิกชมรมหยินหยางทุกคนเลย"
10047-CVGroup_WeaponGet_Idle1-1 = "อันนี้ให้ฉันเหรอ? ว้าว~ ขอบคุณนะ~\nงั้นคราวหน้าฉันจะเอามาให้คุณครูบ้างนะ ตั้งตารอได้เลย~"
10047-CVGroup_UIEventLobby_Enter1-1 = "กำลังรออยู่เลย คุณครู"
10047-CVGroup_UIEventLobby_Enter1-2 = "เอ๋...? รอทำไมน่ะเหรอ?"
10047-CVGroup_UIEventLobby_Enter2-1 = "ยินดีต้อนรับสู่ร้านริมทะเล~"
10047-CVGroup_UIEventLobby_Enter2-2 = "ใช่รึเปล่านะ?"
10047-CVGroup_UIEventLobby_Idle1-1 = "ทุกคนดูยุ่งกันหมด...\nคุณครูมาเล่นด้วยกัน... กับฉันมั้ย?"
10047-CVGroup_UIEventLobby_Idle2-1 = "พอมาคิดๆ ดูแล้ว คาโฮะน่ะ\nถ้าเกิดอันตรายขึ้นมาละก็..."
10047-CVGroup_UIEventLobby_Idle2-2 = "คงจะยิงระเบิดรักษาความปลอดภัยทันทีเลยละ"
10047-CVGroup_UIEventLobby_Idle3-1 = "อ่า ที่จริงมันมีไว้\nป้องกันโรคลมแดด..."
10047-CVGroup_UIEventLobby_Idle3-2 = "อ่ะนี่ น้ำรามูเนะรสชาเขียว"
10047-CVGroup_UIEventLobby_Idle3-3 = "คุณครูดื่มดูมั้ย?"
10047-CVGroup_UIEventLobby_Idle4-1 = "คุณครู? เรียกฉันเหรอ?\nเมื่อกี้ฉันเองก็... เรียกคุณครูอยู่ในใจเหมือนกัน"
10047-CVGroup_UIEventLobby_Idle4-2 = "บังเอิญจังเลยนะ~"
10047-CVGroup_UIEventLobby_Enter3-1 = "ทุกคนดูสนุกกันใหญ่เลย~\nอื้อ การมีสุขภาพแข็งแรงคือเรื่องที่ดีที่สุด"
10047-CVGroup_UIEventLobby_Enter4-1 = "ทุกคนพยายามกันอย่างเต็มที่เลยน้า\nถ้างั้นฉันก็ต้องพยายามด้วย"
10047-CVGroup_UIEventLobby_Enter5-1 = "หืม? จบแล้วเหรอ?\nถ้างั้นคุณครู... เราไป\nเล่นน้ำด้วยกันมั้ย?"
10047-CVGroup_UIEventMission_Enter1-1 = "มีงานที่ต้องทำเยอะเลย~\nคุณครูเองก็เจอปัญหาใหญ่อยู่สินะ~"
10047-CVGroup_UIEventMission_Enter2-1 = "อ๊ะ คุณครู\nได้ของที่เรียกว่า...รายการเป้าหมายมาแล้ว\nคุณครูอยากได้มั้ย?"
10047-CVGroup_UIEventMission_Buy1-1 = "ว้าว- สุดยอดเลย...!"
10047-CVGroup_UIEventMission_Buy2-1 = "คุณครูพยายามมากเลยนะ\nดีมาก ดีมาก~"
10047-CVGroup_UIEventMission_Idle1-1 = "การจิ้มๆ แบบนี้ก็เป็นงานเหรอ?\nถ้างั้นฉันจะไปจิ้มๆ คุณครูบ้างนะ"
10047-CVGroup_UIEventMission_Idle2-1 = "จะอู้ไม่ได้น้า~ เมื่อกี้หัวหน้านิยะบอกมาน่ะ"
10047-CVGroup_UIEventMission_Interaction1-1 = "เท่านี้ งานวันนี้ก็เสร็จแล้วสินะ?\nงั้นเรามาเล่นอะไรกันดี?"

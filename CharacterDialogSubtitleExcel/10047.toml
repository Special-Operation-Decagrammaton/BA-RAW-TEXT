[translation]
10047-CVGroup_UITitle_Idle1-1 = "Blue Archive?"
10047-CVGroup_CharacterGet_Idle1-1 = "A moment ago...I found Mister Crab walking on the beach. Sensei, do you wanna go see him together?"
10047-CVGroup_Cafe_Idle1-1 = "So cool!"
10047-CVGroup_Cafe_Idle2-1 = "Wow, this is...ice cream?"
10047-CVGroup_Cafe_Idle3-1 = "Let's make a house for Mister Crab around here!"
10047-CVGroup_Cafe_Idle4-1 = "Handkerchief, check. Trowel, check... We can make a sand castle with these."
10047-CVGroup_Cafe_Idle5-1 = "I wanna play in the sand with everyone at the Yin-Yang Club."
10047-CVGroup_WeaponGet_Idle1-1 = "Is this for me? Wow, thank you! Next time I'll give you something. I hope you're excited!"
10047-CVGroup_UIEventLobby_Enter1-1 = "Oh, I've been waiting for you, Sensei."
10047-CVGroup_UIEventLobby_Enter1-2 = "...Huh? Why was I waiting?"
10047-CVGroup_UIEventLobby_Enter2-1 = "Welcome to the Beach Shack!"
10047-CVGroup_UIEventLobby_Enter2-2 = "...How was that?"
10047-CVGroup_UIEventLobby_Idle1-1 = "Everyone else seems busy... Why don't we play?"
10047-CVGroup_UIEventLobby_Idle2-1 = "Come to think of it, Kaho told me that when I'm in danger..."
10047-CVGroup_UIEventLobby_Idle2-2 = "I should just throw a grenade."
10047-CVGroup_UIEventLobby_Idle3-1 = "I've brought you something for heatstroke prevention..."
10047-CVGroup_UIEventLobby_Idle3-2 = "Here. Matcha Ramune."
10047-CVGroup_UIEventLobby_Idle3-3 = "Why don't you try it?"
10047-CVGroup_UIEventLobby_Idle4-1 = "Sensei, did you call? I was just about to call you, too."
10047-CVGroup_UIEventLobby_Idle4-2 = "What a coincidence!"
10047-CVGroup_UIEventLobby_Enter3-1 = "Everyone seems happy. There's nothing more important than being happy and healthy."
10047-CVGroup_UIEventLobby_Enter4-1 = "Everyone is working hard. I should work harder, too."
10047-CVGroup_UIEventLobby_Enter5-1 = "Huh? Is it already over? Then, Sensei, let's play in the water together."
10047-CVGroup_UIEventMission_Enter1-1 = "There's so much to do. It's overwhelming, right?"
10047-CVGroup_UIEventMission_Enter2-1 = "Oh, Sensei. I received something called...a task list. Do you want it?"
10047-CVGroup_UIEventMission_Buy1-1 = "Wow, amazing..."
10047-CVGroup_UIEventMission_Buy2-1 = "Sensei, great job. You did well."
10047-CVGroup_UIEventMission_Idle1-1 = "Is poking people on the task list? Then I'll poke you too, Sensei."
10047-CVGroup_UIEventMission_Idle2-1 = "President Niya says I shouldn't slack off."
10047-CVGroup_UIEventMission_Interaction1-1 = "I think that's it for the day. So, what shall we do for fun?"

10047-CVGroup_UIEventLobby_Enter3-1 = "다들 즐거워 보이네~ 응, 건강한 건 좋은 거야~"
10047-CVGroup_UIEventLobby_Enter4-1 = "모두 열심히 하는 것 같네. 그럼, 나도 힘내야지."
10047-CVGroup_UIEventLobby_Enter5-1 = "응? 벌써 끝난 거야? 그럼 선생님, 다 같이 물놀이 하자?"

[translation]
16008-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……"
16008-CVGroup_CharacterGet_Idle1-1 = "咦，我？是不是找錯人了？\n像我這種生活安全局的懶惰蟲，會有什麼事需要我……？"
16008-CVGroup_Cafe_Idle1-1 = "哦，這個沙發還挺不錯的嘛？"
16008-CVGroup_Cafe_Idle2-1 = "真想在生活安全局的辦公室裡也擺一個。"
16008-CVGroup_Cafe_Idle3-1 = "我什麼都不想做了……"
16008-CVGroup_Cafe_Idle4-1 = "啊……感覺好像聽到了警報聲……"
16008-CVGroup_Cafe_Idle5-1 = "怎麼會，上面的大人物應該不會來這裡才對……"
16008-CVGroup_WeaponGet_Idle1-1 = "女武神警察學園的制式槍枝非常堅固耐用。\n但命中率差強人意就是了……"
16008-CVGroup_UIEventLobby_Enter1-1 = "今天似乎也很忙呢，老師。"
16008-CVGroup_UIEventLobby_Enter1-2 = "雖然是剛剛才買的，要不要吃巧克力甜甜圈？"
16008-CVGroup_UIEventLobby_Enter2-1 = "巡邏真麻煩……"
16008-CVGroup_UIEventLobby_Enter3-1 = "哎呀，真是青春呢……\n看起來既熱情又快樂真是不錯……"
16008-CVGroup_UIEventLobby_Enter4-1 = "總～覺得有股會出狀況的預感……"
16008-CVGroup_UIEventLobby_Enter5-1 = "結果總算是平靜下來了呢。"
16008-CVGroup_UIEventLobby_Enter5-2 = "希望這樣的和平可以持續下去……"
16008-CVGroup_UIEventLobby_Idle1-1 = "呼，真是和平呢。"
16008-CVGroup_UIEventLobby_Idle2-1 = "情人節這種熱鬧的氣氛，真不錯呢。"
16008-CVGroup_UIEventLobby_Idle2-2 = "更重要的是……這個時期結束之後，"
16008-CVGroup_UIEventLobby_Idle2-3 = "賣剩的巧克力甜甜圈就會大量特價！"
16008-CVGroup_UIEventLobby_Idle3-1 = "只要沒有發生相當嚴重的事，"
16008-CVGroup_UIEventLobby_Idle3-2 = "我想應該不會連我們生活安全局都要出動。"
16008-CVGroup_UIEventLobby_Idle3-3 = "例如……"
16008-CVGroup_UIEventLobby_Idle3-4 = "災厄之狐偷走裝甲車之類的。"
16008-CVGroup_UIEventLobby_Idle3-5 = "哈哈，開玩笑開玩笑。\n那種事不會發生啦。"

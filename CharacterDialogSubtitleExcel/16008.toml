[translation]
16008-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브."
16008-CVGroup_CharacterGet_Idle1-1 = "에, 나? 사람 잘못 찾은 거 아냐?\n나 같은 게으름뱅이에게, 무슨 볼일이 있다는 거야……"
16008-CVGroup_Cafe_Idle1-1 = "오, 이 소파는 제법 나쁘지 않은데?"
16008-CVGroup_Cafe_Idle2-1 = "이건 생활안전국 사무실에도 하나 들여놓고 싶네."
16008-CVGroup_Cafe_Idle3-1 = "더 적극적으로 아무것도 안 하고 싶다…."
16008-CVGroup_Cafe_Idle4-1 = "아…… 뭔가, 사이렌 소리가 들리는 것 같은 기분이……"
16008-CVGroup_Cafe_Idle5-1 = "……설마 높으신 분들이 여기까지 찾아오지는 않겠지?"
16008-CVGroup_WeaponGet_Idle1-1 = "발키리 경찰 학교의 제식 총기는 튼튼해서 좋은 느낌이란 말이지.\n뭐, 명중률은 별로긴 하지만……"
16008-CVGroup_UIEventLobby_Enter1-1 = "오늘도 바빠 보이네, 선생."
16008-CVGroup_UIEventLobby_Enter1-2 = "아까 산 거긴 하지만, 초코 도넛이라도 먹을래?"
16008-CVGroup_UIEventLobby_Enter2-1 = "순찰 하기 싫어……"
16008-CVGroup_UIEventLobby_Enter3-1 = "이야, 다들 청춘이구만…… 뜨겁게 즐기는 것 같아서 다행이야……"
16008-CVGroup_UIEventLobby_Enter4-1 = "뭔가 말썽의 예감이……"
16008-CVGroup_UIEventLobby_Enter5-1 = "결국 어떻게든 잘 끝났네."
16008-CVGroup_UIEventLobby_Enter5-2 = "이 평화가 계속되면 좋을 텐데 말이야……"
16008-CVGroup_UIEventLobby_Idle1-1 = "후우, 평화롭구만."
16008-CVGroup_UIEventLobby_Idle2-1 = "발렌타인 데이의 이런 떠들썩한 분위기는, 나쁘지 않아."
16008-CVGroup_UIEventLobby_Idle2-2 = "무엇보다…… 이 시즌이 끝나면,"
16008-CVGroup_UIEventLobby_Idle2-3 = "팔다 남은 초코 도넛을 잔뜩, 저렴하게 판매하니까!"
16008-CVGroup_UIEventLobby_Idle3-1 = "엄청난 소동이 벌어지지 않는 한,"
16008-CVGroup_UIEventLobby_Idle3-2 = "우리 생활안전국까지 출동하는 일은 없을 거라고 생각하지만……"
16008-CVGroup_UIEventLobby_Idle3-3 = "예를 들자면"
16008-CVGroup_UIEventLobby_Idle3-4 = "재액의 여우가 장갑차라도 탈취한다던가……"
16008-CVGroup_UIEventLobby_Idle3-5 = "하하. 농담이야, 농담. 그런 일이 일어날 리 없잖아."

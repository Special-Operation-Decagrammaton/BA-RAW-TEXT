[translation]
16008-CVGroup_UITitle_Idle1-1 = "Blue Archive"
16008-CVGroup_CharacterGet_Idle1-1 = "เอ๋ ฉันเหรอ? มาหาผิดคนรึเปล่า?\nมีธุระอะไรกับจอมขี้เกียจ\nแห่งสำนักรักษาความปลอดภัยกัน...?"
16008-CVGroup_Cafe_Idle1-1 = "โซฟาตัวนี้ก็ไม่เลวเลยนะ?"
16008-CVGroup_Cafe_Idle2-1 = "อยากได้โซฟาแบบนี้ไปไว้\nที่สำนักรักษาความปลอดภัยสักตัวจังเลยน้า"
16008-CVGroup_Cafe_Idle3-1 = "ยิ่งรู้สึกไม่อยากทำอะไรสักอย่างเลย..."
16008-CVGroup_Cafe_Idle4-1 = "อ๊ะ เหมือนได้ยินเสียง\nไซเรนจากที่ไหนสักแห่ง..."
16008-CVGroup_Cafe_Idle5-1 = "หวังว่าพวกเบื้องบน\nคงไม่มาที่นี่กันหรอกนะ...?"
16008-CVGroup_WeaponGet_Idle1-1 = "ปืนของสถาบันฝึกตำรวจวัลคิรี่\nแข็งแรงทนทานแล้วก็ดูแลง่าย\nแต่เรื่องความแม่นยำไม่ค่อยดีเท่าไร"
16008-CVGroup_UIEventLobby_Enter1-1 = "วันนี้ก็ยุ่งน่าดูเลยสินะ คุณครู"
16008-CVGroup_UIEventLobby_Enter1-2 = "จะชิมโดนัทช็อกโกแลต\nที่ซื้อมาเมื่อกี้ดูสักชิ้นมั้ย?"
16008-CVGroup_UIEventLobby_Enter2-1 = "ไม่อยากไปลาดตระเวนเลย..."
16008-CVGroup_UIEventLobby_Enter3-1 = "ทุกคนสมเป็นวัยรุ่นจัง\nไฟแรงสุดๆ ไฟแรงมาก~"
16008-CVGroup_UIEventLobby_Enter4-1 = "รู้สึกสังหรณ์ใจไม่ดีเอาซะเลย..."
16008-CVGroup_UIEventLobby_Enter5-1 = "สุดท้ายก็จบได้โดยไม่มีปัญหาอะไรแฮะ"
16008-CVGroup_UIEventLobby_Enter5-2 = "ถ้าสงบสุขแบบนี้ไปเรื่อยๆ ก็คงดีสินะ..."
16008-CVGroup_UIEventLobby_Idle1-1 = "เฮ้อ สงบสุขดีจังเลย~"
16008-CVGroup_UIEventLobby_Idle2-1 = "ฉันชอบบรรยากาศครึกครื้น\nของวันวาเลนไทน์แบบนี้มากๆ เลยล่ะ"
16008-CVGroup_UIEventLobby_Idle2-2 = "พองานเทศกาลจบลง..."
16008-CVGroup_UIEventLobby_Idle2-3 = "โดนัทช็อกโกแลตที่เหลือก็จะลดราคาเยอะเลยล่ะ!"
16008-CVGroup_UIEventLobby_Idle3-1 = "ถ้าไม่เกิดเรื่องที่รุนแรงมากจริงๆ..."
16008-CVGroup_UIEventLobby_Idle3-2 = "สำนักรักษาความปลอดภัยคงไม่ได้ออกโรงหรอก"
16008-CVGroup_UIEventLobby_Idle3-3 = "ยกตัวอย่างเช่น..."
16008-CVGroup_UIEventLobby_Idle3-4 = "จิ้งจอกแห่งความพินาศขโมยรถหุ้มเกราะไป..."
16008-CVGroup_UIEventLobby_Idle3-5 = "ฮ่าฮ่า เรื่องแบบนั้นคงไม่ได้เกิดขึ้นง่ายๆ หรอก"

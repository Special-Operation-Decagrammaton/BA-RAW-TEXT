[translation]
16008-CVGroup_UITitle_Idle1-1 = "Blue...Archive."
16008-CVGroup_CharacterGet_Idle1-1 = "Huh? Me? I think you've got the wrong girl. What do you want from a lazy Public Safety Bureau member like me?"
16008-CVGroup_Cafe_Idle1-1 = "The sofa here isn't too shabby."
16008-CVGroup_Cafe_Idle2-1 = "I want to put one in the Public Safety Bureau office."
16008-CVGroup_Cafe_Idle3-1 = "I want to actively do absolutely nothing..."
16008-CVGroup_Cafe_Idle4-1 = "Ah... I feel like I hear an ominous siren somewhere..."
16008-CVGroup_Cafe_Idle5-1 = "I hope the higher-ups won't come all the way here."
16008-CVGroup_WeaponGet_Idle1-1 = "Valkyrie Police School's standard issue firearms are sturdy and easy to maintain, but their accuracy isn't the greatest..."
16008-CVGroup_UIEventLobby_Enter1-1 = "Looks like you're busy, as usual, Sensei."
16008-CVGroup_UIEventLobby_Enter1-2 = "I bought some chocolate donuts. Do you want one?"
16008-CVGroup_UIEventLobby_Enter2-1 = "I don't wanna go on patrol..."
16008-CVGroup_UIEventLobby_Enter3-1 = "Everyone is so lively. Ah, the passion of youth! How nice..."
16008-CVGroup_UIEventLobby_Enter4-1 = "I have a feeling something bad is gonna happen."
16008-CVGroup_UIEventLobby_Enter5-1 = "It ended without any huge issues."
16008-CVGroup_UIEventLobby_Enter5-2 = "I hope this peace lasts forever..."
16008-CVGroup_UIEventLobby_Idle1-1 = "Ah, so peaceful."
16008-CVGroup_UIEventLobby_Idle2-1 = "I love the lively atmosphere of Valentine's Day so much."
16008-CVGroup_UIEventLobby_Idle2-2 = "When all the commotion is over..."
16008-CVGroup_UIEventLobby_Idle2-3 = "There'll be leftover chocolate donuts on sale!"
16008-CVGroup_UIEventLobby_Idle3-1 = "Unless something major happens..."
16008-CVGroup_UIEventLobby_Idle3-2 = "...the Public Safety Bureau won't need to get involved."
16008-CVGroup_UIEventLobby_Idle3-3 = "For example..."
16008-CVGroup_UIEventLobby_Idle3-4 = "Say the Fox of Calamity were to steal an armored tank."
16008-CVGroup_UIEventLobby_Idle3-5 = "Haha. Kidding! Just a joke! There's no way that could happen so easily."

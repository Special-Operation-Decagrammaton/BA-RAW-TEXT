[translation]
20045-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
20045-CVGroup_CharacterGet_Idle1-1 = "백귀야행 연합학원, 마츠리운영관리부 아사히나 피나!\n여러분을 안내해 드릴게요!"
20045-CVGroup_Cafe_Idle1-1 = "Wow~ 임협물의 사무소 같아서 멋집니다!"
20045-CVGroup_Cafe_Idle2-1 = "(이 TV…… 영화를 볼 수 있습니다!)"
20045-CVGroup_Cafe_Idle3-1 = "이 분위기, 어딘가에서 본 적 있습니다!"
20045-CVGroup_Cafe_Idle4-1 = "멋진 분들이 잔뜩…… 피나도 질 수 없습니다!"
20045-CVGroup_Cafe_Idle5-1 = "쉬는 모습을 보다 보니 저도 낮잠이……"
20045-CVGroup_WeaponGet_Idle1-1 = "한 단계, 아니. 500단계는 더 성장한 것 같습니다!"
20045-CVGroup_UIEventLobby_Enter1-1 = "Welcome to~\n백귀야행!"
20045-CVGroup_UIEventLobby_Enter2-1 = "백귀야행에 어서 오세요~!"
20045-CVGroup_UIEventLobby_Enter3-1 = "선생님!\n잘 즐기고 계신가요?"
20045-CVGroup_UIEventLobby_Enter4-1 = "이제는 제법 익숙해졌습니다!\n마지막까지 힘내겠습니다!"
20045-CVGroup_UIEventLobby_Enter5-1 = "선생님! 다음에도 백귀야행과\n이 피나를 찾아주세요!"
20045-CVGroup_UIEventLobby_Idle1-1 = "짜잔! 가이드는\n맡겨라! 입니다!"
20045-CVGroup_UIEventLobby_Idle2-1 = "미아가 되지 않도록\n조심하는겁니다!"
20045-CVGroup_UIEventLobby_Idle3-1 = "선생님도 함께 하셔서\n더 활기차네요."
20045-CVGroup_UIEventLobby_Idle4-1 = "모두가 즐거워서,\n피나는 기쁩니다!"

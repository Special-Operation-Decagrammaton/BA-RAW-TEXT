20045-CVGroup_Cafe_Idle1-1 = "Wow～就像任俠電影裡的場景一樣，真酷！"
20045-CVGroup_Cafe_Idle2-1 = "（這台電視……能看電影！）"
20045-CVGroup_Cafe_Idle3-1 = "總覺得有種似曾相識的感覺！"
20045-CVGroup_Cafe_Idle4-1 = "厲害的人真多……菲娜也不能輸！"
20045-CVGroup_Cafe_Idle5-1 = "莫名有點睏了……"

20045-CVGroup_UIEventLobby_Enter4-1 = "我已經大致習慣當導覽員了！會努力到最後的唷！"
20045-CVGroup_UIEventLobby_Enter5-1 = "下次來百鬼夜行的時候，請跟菲娜說一聲哦！"
20045-CVGroup_UIEventLobby_Idle1-1 = "鏘～！導覽就交給我吧！的說！"

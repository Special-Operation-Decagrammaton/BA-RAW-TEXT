[translation]
20011-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20011-CVGroup_CharacterGet_Idle1-1 = "這個？是巫女的打扮唷。\n咦……Cosplay？才，才不是咧！\n是貨真價實的打工！"
20011-CVGroup_Cafe_Idle1-1 = "祓除吧，淨化吧～！\n……開玩笑的。"
20011-CVGroup_Cafe_Idle2-1 = "總覺得，雖然頻繁的被拜託除靈……\n不過除靈實際上，該怎麼做才好呢。"
20011-CVGroup_Cafe_Idle3-1 = "巫女巫女喵喵♪巫女巫女喵喵♪\n……等一下！？\n你什麼時候在那裡的啊！？\n忘掉！現在立刻！！"
20011-CVGroup_Cafe_Idle4-1 = "啊，這個月蠻多加班的，也許可以期待薪水，呵呵♪"
20011-CVGroup_Cafe_Idle5-1 = "打工結束之後，試著邀請大家來這裡吧。"
20011-CVGroup_WeaponGet_Idle1-1 = "真是的，連這種東西都準備了……\n真是沒辦法，那個……嗯。\n我會更加努力，回報恩情的，老師。"
20011-CVGroup_UIEventLobby_Enter1-1 = "啊，歡迎你，老師。\n已經許好新年的願望了嗎？"
20011-CVGroup_UIEventLobby_Enter2-1 = "老，老師，你怎麼會在這裡！？\n難，難道是特地來找我……！？"
20011-CVGroup_UIEventLobby_Enter2-2 = "沒事，抱歉，當我沒說……"
20011-CVGroup_UIEventLobby_Idle1-1 = "雖，雖然已經說過很多次了，這不是Cosplay！"
20011-CVGroup_UIEventLobby_Idle1-2 = "而是正式的打工用服裝！"
20011-CVGroup_UIEventLobby_Idle2-1 = "怎，怎麼啦，老師？那樣一直盯著我看……"
20011-CVGroup_UIEventLobby_Idle2-2 = "我，我只是在認真地工作而已。"
20011-CVGroup_UIEventLobby_Idle3-1 = "打工結束之後，\n真想找綾音醬和前輩們一起邊吃邊逛啊……"
20011-CVGroup_UIEventLobby_Idle4-1 = "咦？希望我可以再講一次？又來了？"
20011-CVGroup_UIEventLobby_Idle4-2 = "唔……知道了，知道了啦！我講就是了！"
20011-CVGroup_UIEventLobby_Idle4-3 = "……惡，惡靈退散！\n好了，這樣滿意了嗎！？"
20011-CVGroup_UIEventLobby_Enter3-1 = "雖然說是新年，還真是亂哄哄的呢～"
20011-CVGroup_UIEventLobby_Enter3-2 = "不過，我覺得充滿活力也是件好事就是了。"
20011-CVGroup_UIEventLobby_Enter4-1 = "唉……不管是黑龜組還是凱坦澤……\n為什麼會這樣接二連三地……"
20011-CVGroup_UIEventLobby_Enter4-2 = "打工費，能順利收到嗎……？"
20011-CVGroup_UIEventLobby_Enter5-1 = "雖然新年一開始就手忙腳亂的，不過也慢慢安定下來了吧。"
20011-CVGroup_UIEventLobby_Enter5-2 = "辛苦了，老師。\n要不要一起回去吃御節料理？"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "啊，老師。你是來抽御神籤的嗎？\n御神籤在這邊唷。"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "要不要來隻御神籤呀～！"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "……話說御神籤是可以用這種方式宣傳的東西嗎？"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "新年的試手氣唷，要決定運氣囉，老師！"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "莫名地興奮起來了……！"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "嘛，就算出現不好的結果也沒關係。\n你想想，反正有我這個巫女在……！"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "……不，不要笑成那樣啦！我可是很努力才說出來的！"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "咦，大吉！？很厲害嘛老師！"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "抽到大吉的話，可以獲得特別的獎品哦！來！"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "是吉哦！老師，恭喜你！"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "那麼接下來，就由幸運巫女來送出獎品～！"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "中吉啊～嗯，還不錯吧？"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "那麼就給抽到中吉的老師這個！"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "嗯？小吉？"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "別失望，老師。\n來，我會給老師這個的。"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "末吉啊……該說總覺得很符合老師的形象嗎……"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "啊，不，我沒有不好的意思！\n總之收下這個吧，是末吉的獎品。"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "兇，兇！？\n啊，啊哈哈……那個，沒，沒關係的！"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "來，這個給你！別放在心上，好嗎？"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "啊，新年的活動已經結束了，不過還是可以抽御神籤哦。"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "來，老師！"

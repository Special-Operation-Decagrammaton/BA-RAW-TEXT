[translation]
20011-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20011-CVGroup_CharacterGet_Idle1-1 = "This is my special miko outfit. What? You thought it was cosplay?! No, it's for my part-time job!"
20011-CVGroup_Cafe_Idle1-1 = "Evil spirit, be gone...! Or something like that."
20011-CVGroup_Cafe_Idle2-1 = "I get a lot of requests to perform exorcisms when I wear this...but heck if I know how to do that."
20011-CVGroup_Cafe_Idle3-1 = "Miko miko nyan nyan...! ♪ Miko miko nyan nyan...! ♪ What the...?! How long have you been there? Forget what you just saw!"
20011-CVGroup_Cafe_Idle4-1 = "I worked overtime this month. Can't wait to see my paycheck. Heehee! ♪"
20011-CVGroup_Cafe_Idle5-1 = "I should come here with everyone once I'm done with my part-time job!"
20011-CVGroup_WeaponGet_Idle1-1 = "Wow, to have prepared something like this... You're leaving me no choice. I'll just have to try to repay you, Sensei."
20011-CVGroup_UIEventLobby_Enter1-1 = "Oh, it's you. Did you make a New Year's wish? What was it?!"
20011-CVGroup_UIEventLobby_Enter2-1 = "S-S-Sensei?!\n...What do you mean you're here for me?!"
20011-CVGroup_UIEventLobby_Enter2-2 = "Oh... Sorry. Just forget it."
20011-CVGroup_UIEventLobby_Idle1-1 = "How many times do I have to tell you?! I'm not cosplaying!"
20011-CVGroup_UIEventLobby_Idle1-2 = "I'm wearing it for my part-time job!"
20011-CVGroup_UIEventLobby_Idle2-1 = "Wh-What, Sensei? You're staring at me weird..."
20011-CVGroup_UIEventLobby_Idle2-2 = "I-I know what it looks like, but I really am working hard!"
20011-CVGroup_UIEventLobby_Idle3-1 = "When my shift ends, I want to go get a warm meal with Ayane and the others..."
20011-CVGroup_UIEventLobby_Idle4-1 = "Huh? You want me to say it one more time? Again?"
20011-CVGroup_UIEventLobby_Idle4-2 = "Ugh... Fine! This is the last time though, okay?!"
20011-CVGroup_UIEventLobby_Idle4-3 = "...E-Evil spirits, begone! There! Are you happy now?"
20011-CVGroup_UIEventLobby_Enter3-1 = "It's the new year, but it's still pretty wild!"
20011-CVGroup_UIEventLobby_Enter3-2 = "Well, I do think it's good that it's so lively."
20011-CVGroup_UIEventLobby_Enter4-1 = "*sigh* The Kurokame Gang, the Kaitenger... Why are these things happening one after another?"
20011-CVGroup_UIEventLobby_Enter4-2 = "Will my part-time job pay me without any issues?"
20011-CVGroup_UIEventLobby_Enter5-1 = "We've been flustered since the beginning of the new year, but things seem to be calming down."
20011-CVGroup_UIEventLobby_Enter5-2 = "Great job, Sensei. Want to go back together and eat some osechi?"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "Oh, Sensei. Are you here to pick your omikuji? They're over here."
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "How about picking out an omikuji?"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "...Are you sure you can promote omikuji like this?"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "T-Try your luck, Sensei!"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "My heart is starting to pound for some reason...!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "It's okay if you get a bad result. I'm a miko!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "D-Don't laugh like that! I was just being supportive!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "Oh, you got a great blessing!! That's amazing, Sensei!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "If you pick out a great blessing, you get a special prize! Here!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "You picked a blessing, Sensei! Congratulations!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "On that note, here is a prize given by the lucky miko!"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "A modest blessing? That's not bad, right?"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "Here, this is for Sensei and your modest blessing!"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "Huh? A small blessing?"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "Don't be disappointed, Sensei. Here, let me give you this!"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "It's a future blessing... I guess it kind of suits you..."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "Oh, I didn't mean it in a bad way. Anyway, take this. It's the prize for picking a future blessing."
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "C-Curse?! Ah, hahaha... That's...that's f-fine!"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "Here, I'll give you this, so don't worry about it, okay?"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "Oh, the New Year's event is over, but you can still pick out an omikuji."
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "Here, Sensei!"

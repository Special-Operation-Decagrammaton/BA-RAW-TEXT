[translation]
20011-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20011-CVGroup_CharacterGet_Idle1-1 = "คราวนี้เป็นชุดพิเศษ ชุดมิโกะน่ะ\nเหมือนชุดคอสเพลย์งั้นเหรอ?\nปะ...เปล่าสักหน่อย! ชุดทำงานพาร์ทไทม์ต่างหาก!"
20011-CVGroup_Cafe_Idle1-1 = "สิ่งชั่วร้ายจงหายไป~!\nคงต้องพูดประมาณนี้ล่ะมั้ง"
20011-CVGroup_Cafe_Idle2-1 = "พอใส่ชุดนี้ก็ได้รับคำขอให้ทำพิธีขับไล่วิญญาณน่ะ\nแต่ฉันจะทำได้ยังไงกันล่ะ?"
20011-CVGroup_Cafe_Idle3-1 = "มิโกะ มิโกะ เมี๊ยวเมี๊ยว♪\nมิโกะ มิโกะ เมี๊ยวเมี๊ยว♪\nนี่! มาอยู่ตรงนี้ตั้งแต่เมื่อไรกัน?\nลืมเรื่องที่เห็นไปให้หมดเดี๋ยวนี้เลยนะ!"
20011-CVGroup_Cafe_Idle4-1 = "เดือนนี้ทำงานพาร์ทไทม์เยอะมาก\nตั้งตารอดูค่าขนมที่จะได้เดือนนี้เลยล่ะ ฮิฮิ♪"
20011-CVGroup_Cafe_Idle5-1 = "พอเสร็จงานพาร์ทไทม์แล้ว ฉันอยากจะชวนอายาเนะจัง\nแล้วก็พวกรุ่นพี่มากินอะไรฉลองกันหน่อย..."
20011-CVGroup_WeaponGet_Idle1-1 = "เตรียมของแบบนี้มาให้ด้วยเหรอ?\nช่วยไม่ได้สินะ เรื่องนั้นฉันจะพยายามให้มากขึ้นเพื่อตอบแทนก็แล้วกัน"
20011-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ เชิญเลย คุณครู\nทำไมเหรอ? ขอพรวันปีใหม่ไปแล้วงั้นเหรอ?"
20011-CVGroup_UIEventLobby_Enter2-1 = "คะ... คุณครู ทะ...ทำไมถึงอยู่ที่นี่!?\nหรือว่าคิดจะแกล้งฉันน่ะ...!?"
20011-CVGroup_UIEventLobby_Enter2-2 = "อา... โทษทีนะ ลืมมันไปเถอะ..."
20011-CVGroup_UIEventLobby_Idle1-1 = "ถะ... ถึงจะบอกไปหลายครั้งแล้วก็เถอะ ว่านี่มันไม่ใช่ชุดคอสเพลย์นะ!"
20011-CVGroup_UIEventLobby_Idle1-2 = "ฉันแค่แต่งชุดสำหรับทำงานพิเศษต่างหาก!"
20011-CVGroup_UIEventLobby_Idle2-1 = "อะไรน่ะ? คุณครู\nทำไมถึงยิ้มอรุ่มเจ๊าะมองฉันแบบนั้น..."
20011-CVGroup_UIEventLobby_Idle2-2 = "ถะ...ถึงจะเห็นแบบนี้ แต่ฉันก็ตั้งใจทำงานอยู่นะ?"
20011-CVGroup_UIEventLobby_Idle3-1 = "พอเสร็จงานพาร์ทไทม์แล้ว ฉันอยากจะชวนอายาเนะจัง\nแล้วก็พวกรุ่นพี่มากินอะไรฉลองกันหน่อย..."
20011-CVGroup_UIEventLobby_Idle4-1 = "เอ๋? อยากให้ฉันพูดให้ฟังอีกสักครั้งงั้นเหรอ?"
20011-CVGroup_UIEventLobby_Idle4-2 = "เอ่อ... ขะ... เข้าใจแล้ว!\nเข้าใจแล้วน่า! แค่พูดก็พอใช่มั้ยล่ะ!"
20011-CVGroup_UIEventLobby_Idle4-3 = "ขะ...ขับไล่วิญญาณร้าย...!\nเอ้า! พะ...พอแล้วใช่มั้ย!?"
20011-CVGroup_UIEventLobby_Enter3-1 = "ถึงจะบอกว่าเป็นปีใหม่ก็เถอะ แต่วุ่นวายจริงๆ เลยน้า~"
20011-CVGroup_UIEventLobby_Enter3-2 = "มีพลังล้นเหลือน่ะ มันก็ดีอยู่หรอกนะ"
20011-CVGroup_UIEventLobby_Enter4-1 = "เฮ้อ... ทั้งพวกแก๊งคุโรคาเมะ แล้วก็พวกไคเทนเจอร์...\nทำไมถึงโผล่มาไม่หยุดเลยนะ"
20011-CVGroup_UIEventLobby_Enter4-2 = "ฉันจะทำงานพาร์ทไทม์จบได้อย่างราบรื่นมั้ยนะ?"
20011-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะมีเรื่องฉุกละหุกตั้งแต่ต้นปีก็ตาม แต่ท่าทางจะสงบลงแล้วละนะ"
20011-CVGroup_UIEventLobby_Enter5-2 = "ทำได้ดีมากคุณครู พอกลับไปแล้วเราไปกินโอเซจิกันมั้ย?"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "อ๊ะ คุณครู มาเสี่ยงทายโอะมิกุจิเหรอ?\nโอะมิกุจิอยู่ตรงนี้ไงล่ะ"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "มาลองเสี่ยงทายโอะมิกุจิกันมั้ยคะ...!"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "โอะมิกุจิน่ะ... พูดโฆษณาแบบนี้ได้ด้วยเหรอ?"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "มะ...มาลองทดสอบดวงของตัวเองได้เลยคุณครู!"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "ทำไมถึงรู้สึก... ตื่นเต้นแบบนี้นะ...!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "แต่ก็นะ... ถึงผลที่ออกมาจะไม่โอเคก็ไม่เป็นไรหรอก\nยังมีฉันที่เป็นมิโกะอยู่ด้วยทั้งคนนะ!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "ยะ... อย่าหัวเราะสิ! ฉันตั้งใจพูดแบบนั้นเลยนะ!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "เอ๋ โชคดีมากงั้นเหรอ!? สุดยอดเลยนะ คุณครู!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "ถ้าได้โชคดีมากละก็จะได้รางวัลพิเศษด้วยนะ!\nเอาล่ะ!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "เสี่ยงได้คำว่าโชคดีล่ะ คุณครู! ยินดีด้วยนะ!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "หรือก็หมายความว่านี่ก็คือ\nของรางวัลที่มิโกะแห่งความโชคดีมอบให้ไงล่ะ~!"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "โชคดีปานกลาง... อื้อ ก็ไม่ได้แย่เลยนี่นา"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "สำหรับโชคดีปานกลาง ฉันจะให้ของรางวัลชิ้นนี้!"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "หืม? โชคดีเล็กน้อย?"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "อย่าผิดหวังไปเลยนะคุณครู\nถ้างั้นฉันจะให้ของชิ้นนี้กับคุณครูก็แล้วกัน"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "โชคดีตามกรรมงั้นเหรอ...\nจะบอกว่าสมกับเป็นคุณครูดีมั้ยนะ..."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "อ๊ะ ไม่ได้พูดถึงในความหมายที่ไม่ดีนะ!\nยังไงก็รับนี่ไปสิ รางวัลเสี่ยงทายได้โชคดีตามกรรมน่ะ"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "ชะ... โชคร้าย!? เอ่อ... แหะๆ... มะ...ไม่เป็นไร!"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "เอาละ! ฉันจะให้ของชิ้นนี้นะ! หือ? ไม่ต้องคิดมากหรอกนะ"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "อ่า... ถึงเทศกาลฉลองปีใหม่จะจบไปแล้วแต่ว่า...\nยังมาเสี่ยงทายโอะมิกุจิได้อยู่นะ"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "นี่ไงคุณครู!"

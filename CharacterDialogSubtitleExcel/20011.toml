[translation]
20011-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
20011-CVGroup_CharacterGet_Idle1-1 = "이거? 무녀 복장이야.\n응? …코스프레냐고? 아, 아니라니까! 엄연히 아르바이트 복장이라고!"
20011-CVGroup_Cafe_Idle1-1 = "부정한 기운이여, 물럿거라~! …막, 이러고."
20011-CVGroup_Cafe_Idle2-1 = "뭔가, 자주 제령을 부탁받는데 말이야….\n제령이란 건 실제로, 어떻게 해야 하는 거야?"
20011-CVGroup_Cafe_Idle3-1 = "미코미코냥냥♪ 미코미코냥냥♪\n…자, 잠?! 언제부터 거기에? 잊어버려! 당장!"
20011-CVGroup_Cafe_Idle4-1 = "아, 이번 달은 잔업도 했겠다. 아르바이트비 기대되는걸. 후후♪"
20011-CVGroup_Cafe_Idle5-1 = "아르바이트가 끝나면, 다 같이 여기 오자고 해볼까~"
20011-CVGroup_WeaponGet_Idle1-1 = "정말이지, 이런 것까지 준비해주다니….\n정말 어쩔 수 없다니까, 그게… 응. 더 노력해서, 보답할게. 선생님."
20011-CVGroup_UIEventLobby_Enter1-1 = "아, 어서 와. 선생님. 어때? 새해 소원은 이미 빌었어?"
20011-CVGroup_UIEventLobby_Enter2-1 = "서, 선생님. 어째서 여기에!? 호, 혹시 일부러 나를…!?"
20011-CVGroup_UIEventLobby_Enter2-2 = "아, 미안, 잊어줘…."
20011-CVGroup_UIEventLobby_Idle1-1 = "누, 누누이 말했지만, 이거 코스프레가 아니니까!"
20011-CVGroup_UIEventLobby_Idle1-2 = "제대로 아르바이트용을 입고 있는 거니까!"
20011-CVGroup_UIEventLobby_Idle2-1 = "뭐, 뭐야? 선생님. 그렇게 지그시 쳐다보고 있고…"
20011-CVGroup_UIEventLobby_Idle2-2 = "이, 이래 봬도 성실하게 일하고 있는 중이거든?"
20011-CVGroup_UIEventLobby_Idle3-1 = "아르바이트가 끝나면, 아야네 쨩이랑 선배들을 불러서 기념으로 뭐라도 먹고 싶은걸…."
20011-CVGroup_UIEventLobby_Idle4-1 = "어? 다시 한번 말해줬으면 좋겠다고? 또?"
20011-CVGroup_UIEventLobby_Idle4-2 = "으으… 아, 알았어! 알았으니까! 해주면 되잖아!"
20011-CVGroup_UIEventLobby_Idle4-3 = "…아, 악령퇴산-! 자, 이제 됐지!?"
20011-CVGroup_UIEventLobby_Enter3-1 = "새해라고는 하지만, 어째 소란스럽네~"
20011-CVGroup_UIEventLobby_Enter3-2 = "뭐, 활기가 넘치는 건 좋다고 생각하지만."
20011-CVGroup_UIEventLobby_Enter4-1 = "하아…. 검은거북파라던가, 카이텐져라던가….\n왜 이렇게 꼬리에 꼬리를 물고…."
20011-CVGroup_UIEventLobby_Enter4-2 = "아르바이트비, 무사히 받을 수 있으려나?"
20011-CVGroup_UIEventLobby_Enter5-1 = "새해 초장부터 허둥지둥했지만, 슬슬 진정되는 모양이네."
20011-CVGroup_UIEventLobby_Enter5-2 = "고생했어, 선생님. 같이 돌아가서 오세치라도 먹을래?"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "아, 선생님. 오미쿠지를 뽑으러 온 거야? 오미쿠지라면 여기 있어."
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "오미쿠지 뽑기 한 번 어떠신가요-!"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "…오미쿠지라는 거, 이런 식으로 홍보해도 되는 거야?"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "자, 자신의 운을 시험해보는 거야 선생님!"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "어쩐지 두근거리기 시작하는걸…!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "뭐, 안 좋은 결과가 나와도 괜찮아. 자, 무녀인 내가 있잖아…!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "…그, 그렇게 웃지 마! 일부러 말했는데!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "어, 대길이라고!? 굉장하잖아! 선생님!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "대길을 뽑으면, 특별한 상품을 받을 수 있다고! 자!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "길한 운세래, 선생님! 축하해!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "그런 의미에서 여기, 행운의 무녀가 주는 상품이야~!"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "중길인가-, 응, 괜찮지 않아?"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "자, 중길을 뽑은 선생님에겐 이걸 줄게!"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "응? 소길?"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "실망하지 마, 선생님. 자, 선생님에겐 이걸 줄게."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "말길이라니… 선생님답다고 해야 할지…."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "아, 나쁜 뜻으로 말한 건 아니고! 아무튼 이거 받아, 말길 당첨 상품."
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "휴, 흉!? 아, 아하하…, 그게, 괘, 괜찮아!"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "자! 이거 줄 테니까! 신경 쓰지 마, 응?"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "아, 새해맞이 이벤트는 이미 끝나버렸지만, 아직 오미쿠지라면 뽑을 수 있어."
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "자, 선생님!"

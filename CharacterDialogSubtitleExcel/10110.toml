[translation]
10110-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10110-CVGroup_CharacterGet_Idle1-1 = "是久違的邂逅呢。\n恭候多時了，老師。"
10110-CVGroup_Cafe_Idle1-1 = "是個被妥善整頓的場所呢。"
10110-CVGroup_Cafe_Idle2-1 = "這個室內裝潢……真可愛呢。"
10110-CVGroup_Cafe_Idle3-1 = "跟我的房間相比……不，這才是普通的情況吧。"
10110-CVGroup_Cafe_Idle4-1 = "大家，都是被老師叫來的嗎？"
10110-CVGroup_Cafe_Idle5-1 = "是個有趣的地方呢。\n還想再來玩。"
10110-CVGroup_WeaponGet_Idle1-1 = "老師要給我……？\n不好意思，因為我完全沒預料到……所以也還沒想到該怎麼做。\n「無法預料」……呵呵，真是有趣呢。"
10110-CVGroup_UIEventLobby_Enter1-1 = "你好，老師。"
10110-CVGroup_UIEventLobby_Enter1-2 = "今天似乎也很忙碌呢。"
10110-CVGroup_UIEventLobby_Enter2-1 = "啊啊，原來是老師啊。"
10110-CVGroup_UIEventLobby_Enter2-2 = "恭候多時囉。"
10110-CVGroup_UIEventLobby_Enter3-1 = "差不多該有進展了……"
10110-CVGroup_UIEventLobby_Enter3-2 = "沒，沒事。沒什麼。"
10110-CVGroup_UIEventLobby_Enter4-1 = "終於到最終階段了嗎。"
10110-CVGroup_UIEventLobby_Enter4-2 = "……詳情之後會向你報告的。"
10110-CVGroup_UIEventLobby_Enter5-1 = "發生了各式各樣的事呢。"
10110-CVGroup_UIEventLobby_Enter5-2 = "感謝你的協助。"
10110-CVGroup_UIEventLobby_Idle1-1 = "你叫我嗎？"
10110-CVGroup_UIEventLobby_Idle1-2 = "發生了什麼事嗎？"
10110-CVGroup_UIEventLobby_Idle2-1 = "我哪裡都不會去的哦？"
10110-CVGroup_UIEventLobby_Idle3-1 = "偶爾這樣也挺快樂的呢。"
10110-CVGroup_UIEventLobby_Idle3-2 = "是因為在三一之外嗎？"
10110-CVGroup_UIEventLobby_Idle4-1 = "這樣很癢……"
10110-CVGroup_UIEventLobby_Idle4-2 = "但我並沒有不喜歡的意思。"
10110-CVGroup_UIEventShop_Enter1-1 = "我試著做了各種準備。"
10110-CVGroup_UIEventShop_Enter1-2 = "請儘管看吧。"
10110-CVGroup_UIEventShop_Enter2-1 = "有需要什麼嗎？"
10110-CVGroup_UIEventShop_Enter2-2 = "請儘管開口。"
10110-CVGroup_UIEventShop_Enter3-1 = "保險起見，"
10110-CVGroup_UIEventShop_Enter3-2 = "請再確認一次是否有漏買的東西吧，老師。"
10110-CVGroup_UIEventShop_Idle1-1 = "……要我？"
10110-CVGroup_UIEventShop_Idle1-2 = "呵呵。我並沒有賣哦。"
10110-CVGroup_UIEventShop_Idle2-1 = "真有趣呢。"
10110-CVGroup_UIEventShop_Idle2-2 = "接下來該輪到我戳戳了嗎？"
10110-CVGroup_UIEventShop_Buy1-1 = "那也不錯呢。"
10110-CVGroup_UIEventShop_Buy2-1 = "是個不錯的選擇呢。"
10110-CVGroup_UIEventShop_Buy3-1 = "啊啊，原來你在找那個啊。"
10110-CVGroup_UIEventShop_Buy4-1 = "來，在這裡。"
10110-CVGroup_UIEventFieldMission_Enter1-1 = "請仔細確認。"
10110-CVGroup_UIEventFieldMission_Enter2-1 = "我始終覺得老師會過來。"
10110-CVGroup_UIEventFieldMission_Enter2-2 = "呵呵，有點類似直覺吧。"
10110-CVGroup_UIEventFieldMission_Idle1-1 = "請不要改變我對老師的解釋……"
10110-CVGroup_UIEventFieldMission_Idle2-1 = "……呵呵，你還是一如既往呢，老師。"
10110-CVGroup_UIEventFieldMission_Buy1-1 = "辛苦你了。"
10110-CVGroup_UIEventFieldMission_Buy2-1 = "做得漂亮。"
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "轉眼間就完成了呢。"

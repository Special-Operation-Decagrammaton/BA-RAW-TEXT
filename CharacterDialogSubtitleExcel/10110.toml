[translation]
10110-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10110-CVGroup_CharacterGet_Idle1-1 = "오랜만의 해후네요. 기다리고 있었습니다. 선생님."
10110-CVGroup_Cafe_Idle1-1 = "꽤 정돈된 곳이네요."
10110-CVGroup_Cafe_Idle2-1 = "이런 인테리어도… 귀엽네요."
10110-CVGroup_Cafe_Idle3-1 = "제 방과는… 아니, 이게 보통이겠죠."
10110-CVGroup_Cafe_Idle4-1 = "다들 선생님께서 부르신 걸까요?"
10110-CVGroup_Cafe_Idle5-1 = "재미있는 곳이에요. 자주 들를 거 같네요."
10110-CVGroup_WeaponGet_Idle1-1 = "선생님이 저를…? 죄송합니다, 예상하지 못했어서…\n무엇을 해야 할지 아직 예상이 가지 않네요. '예상이 가지 않는다'… 후후, 즐겁네요."
10110-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님."
10110-CVGroup_UIEventLobby_Enter1-2 = "바빠 보이시네요."
10110-CVGroup_UIEventLobby_Enter2-1 = "아, 선생님이시군요."
10110-CVGroup_UIEventLobby_Enter2-2 = "마침 잘 오셨어요."
10110-CVGroup_UIEventLobby_Enter3-1 = "슬슬 진척도가……"
10110-CVGroup_UIEventLobby_Enter3-2 = "아, 아무것도 아니에요."
10110-CVGroup_UIEventLobby_Enter4-1 = "거의 다 끝났군요."
10110-CVGroup_UIEventLobby_Enter4-2 = "……나중에 말씀 드리겠습니다."
10110-CVGroup_UIEventLobby_Enter5-1 = "많은 일들이 있었네요."
10110-CVGroup_UIEventLobby_Enter5-2 = "도와주셔서 감사합니다."
10110-CVGroup_UIEventLobby_Idle1-1 = "절 부르셨나요?"
10110-CVGroup_UIEventLobby_Idle1-2 = "무슨 일이시죠?"
10110-CVGroup_UIEventLobby_Idle2-1 = "저는 어디 가지 않는답니다."
10110-CVGroup_UIEventLobby_Idle3-1 = "가끔은 이런 것도 즐겁네요."
10110-CVGroup_UIEventLobby_Idle3-2 = "트리니티 밖이라서 그런 걸까요?"
10110-CVGroup_UIEventLobby_Idle4-1 = "간지러워요……"
10110-CVGroup_UIEventLobby_Idle4-2 = "그렇지만, 싫은 건 아니네요."
10110-CVGroup_UIEventShop_Enter1-1 = "이것저것 준비해 보았어요."
10110-CVGroup_UIEventShop_Enter1-2 = "둘러보세요."
10110-CVGroup_UIEventShop_Enter2-1 = "필요하신 게 있으실까요?"
10110-CVGroup_UIEventShop_Enter2-2 = "우선 말씀해 보세요."
10110-CVGroup_UIEventShop_Enter3-1 = "혹시 모르니,"
10110-CVGroup_UIEventShop_Enter3-2 = "한 번 더 살펴보세요. 선생님."
10110-CVGroup_UIEventShop_Idle1-1 = "…저를?"
10110-CVGroup_UIEventShop_Idle1-2 = "후후, 저는 판매하고 있지 않아요."
10110-CVGroup_UIEventShop_Idle2-1 = "재미있네요."
10110-CVGroup_UIEventShop_Idle2-2 = "이제는 제가 찌를 차례일까요?"
10110-CVGroup_UIEventShop_Buy1-1 = "그것도 좋지요."
10110-CVGroup_UIEventShop_Buy2-1 = "나쁘지 않은 선택이에요."
10110-CVGroup_UIEventShop_Buy3-1 = "아, 그게 필요하셨군요."
10110-CVGroup_UIEventShop_Buy4-1 = "네. 여기 있답니다."
10110-CVGroup_UIEventFieldMission_Enter1-1 = "꼼꼼히 확인하고 가세요."
10110-CVGroup_UIEventFieldMission_Enter2-1 = "선생님이 오실 줄"
10110-CVGroup_UIEventFieldMission_Enter2-2 = "알고 있었습니다. 후후, 감이라는 것이지요."
10110-CVGroup_UIEventFieldMission_Idle1-1 = "……선생님이라는 존재에 대해, 해석이 달라지게 하지 말아주세요."
10110-CVGroup_UIEventFieldMission_Idle2-1 = "…후후, 여전하시군요, 선생님."
10110-CVGroup_UIEventFieldMission_Buy1-1 = "고생하셨습니다."
10110-CVGroup_UIEventFieldMission_Buy2-1 = "훌륭하시네요."
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "순식간에 끝나버렸네요."

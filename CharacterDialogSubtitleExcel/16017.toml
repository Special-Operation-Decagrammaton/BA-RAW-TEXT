[translation]
16017-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브…… 이, 이거 맞나요……?"
16017-CVGroup_CharacterGet_Idle1-1 = "하, 하이랜더 철도학원…… 우, 우츠미 아오바예요……"
16017-CVGroup_Cafe_Idle1-1 = "모, 모두 행복해 보여…… 뭐가 그렇게 즐거운 걸까……"
16017-CVGroup_Cafe_Idle2-1 = "넓고 좋네요…… 우리 숙직실도 이러면 좋을 텐데……"
16017-CVGroup_Cafe_Idle3-1 = "저, 저처럼 안 어울리는 사람이 이런 곳에 있어도 되는 걸까요……"
16017-CVGroup_Cafe_Idle4-1 = "(왠지 기름 냄새가 배어버린 것 같은 기분이…… 신경 쓰여……)"
16017-CVGroup_Cafe_Idle5-1 = "진정하고 심호흡을… 스- 하아…"
16017-CVGroup_WeaponGet_Idle1-1 = "거, 거슬리는 사람이 있으면…… 이, 이걸로 쏴버리면 되는 거죠……?"
16017-CVGroup_UIEventLobby_Enter1-1 = "선생님…… 와주셔서 감사해요……"
16017-CVGroup_UIEventLobby_Enter1-2 = "아, 아무래도 어른이 계시면 든든하니까……"
16017-CVGroup_UIEventLobby_Enter2-1 = "하, 하이랜더가 항상 이렇지는 않으니까요……! 이번만 좀……"
16017-CVGroup_UIEventLobby_Enter2-2 = "아…… 아니, 대부분은 이렇긴 한데……"
16017-CVGroup_UIEventLobby_Enter2-3 = "그, 그래도 마냥 개판은 아니에요. 아마…… 모르겠지만요."
16017-CVGroup_UIEventLobby_Enter3-1 = "으으…… 왜, 왠지 엄청 귀찮은 일이 되어가는 것 같네요……"
16017-CVGroup_UIEventLobby_Enter3-2 = "간부님들을 믿어도 될까요…… 으음……"
16017-CVGroup_UIEventLobby_Enter4-1 = "휴우…… 그, 그래도 얼추 마무리가 되어가는 느낌이네요……"
16017-CVGroup_UIEventLobby_Enter5-1 = "어, 어떻게든 끝났네요……"
16017-CVGroup_UIEventLobby_Enter5-2 = "선생님도 너, 너무 고생 많으셨어요……"
16017-CVGroup_UIEventLobby_Idle1-1 = "무, 무슨 일이신가요……"
16017-CVGroup_UIEventLobby_Idle1-2 = "엣… 호, 혹시 제가 뭔가 했나요…?"
16017-CVGroup_UIEventLobby_Idle2-1 = "왜, 왠지 느낌이 안 좋은데……"
16017-CVGroup_UIEventLobby_Idle2-2 = "별일 없겠죠……?"
16017-CVGroup_UIEventLobby_Idle3-1 = "가, 간부라는 사람들은 왜 다 저런 걸까요……"
16017-CVGroup_UIEventLobby_Idle3-2 = "실무자들의 괴로움을 몰라요……"
16017-CVGroup_UIEventLobby_Idle4-1 = "……왜, 왜 그러시는 건가요……"
16017-CVGroup_UIEventLobby_Idle4-2 = "간지러워요…… 약한 부위인데……"
16017-CVGroup_UIEventMission_Enter1-1 = "뭐, 뭔가 엄청 많이 남은 느낌이네요……"
16017-CVGroup_UIEventMission_Enter2-1 = "서, 선생님이 계셔서 다행이에요……"
16017-CVGroup_UIEventMission_Enter2-2 = "든든하다고 할까…… 안심이 된다고 할까……"
16017-CVGroup_UIEventMission_Enter2-3 = "헤헤."
16017-CVGroup_UIEventMission_Idle1-1 = "저, 저를 그렇게 누르셔도…… 딱히 도움말 같은 건 안 나오니까요……"
16017-CVGroup_UIEventMission_Idle2-1 = "뭐, 뭐라도 해야 할 텐데…… 으으……"
16017-CVGroup_UIEventMission_Buy1-1 = "와, 와아……"
16017-CVGroup_UIEventMission_Buy2-1 = "쉬, 쉬운 일이 아니었는데……"
16017-CVGroup_UIEventMission_Interaction1-1 = "여, 역시…… 어른의 힘……"

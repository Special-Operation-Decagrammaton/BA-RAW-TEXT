[translation]
16017-CVGroup_UITitle_Idle1-1 = "B... Blue... Archive... บะ... แบบนี้ถูกมั้ยคะ...?"
16017-CVGroup_CharacterGet_Idle1-1 = "อะ... อุตสึมิ อาโอบะ...\nจากสะ... สถาบันการรถไฟไฮแลนเดอร์ค่ะ…"
16017-CVGroup_Cafe_Idle1-1 = "ทะ... ทุกคนดูมีความสุขจัง...\nมีเรื่องน่าสนุกอะไรขนาดนั้นเหรอ… "
16017-CVGroup_Cafe_Idle2-1 = "ทั้งกว้างและก็สวยจังค่ะ...\nอยากให้ห้องอยู่เวรของเราเป็นแบบนี้บ้างจัง..."
16017-CVGroup_Cafe_Idle3-1 = "คะ... คนที่ไม่เข้าพวกอย่างฉัน\nจะมาอยู่ในที่แบบนี้ได้เหรอคะ..."
16017-CVGroup_Cafe_Idle4-1 = "(รู้สึกเหมือนได้กลิ่นน้ำมันเลย... มันกวนใจชะมัด...)"
16017-CVGroup_Cafe_Idle5-1 = "ใจเย็นๆ แล้วหายใจเข้าลึกๆ... ฮึบ... ฮ่า..."
16017-CVGroup_WeaponGet_Idle1-1 = "ถะ... ถ้ามีใครทำให้อารมณ์ไม่ดี...\nหะ... ให้เอาอันนี้ยิงได้เลยใช่มั้ยคะ...?"
16017-CVGroup_UIEventLobby_Enter1-1 = "คุณครู... ขอบคุณที่มานะคะ..."
16017-CVGroup_UIEventLobby_Enter1-2 = "ถะ... ถ้ามีผู้ใหญ่อยู่ด้วยก็จะวางใจได้น่ะค่ะ..."
16017-CVGroup_UIEventLobby_Enter2-1 = "ทะ... ที่ไฮแลนเดอร์ไม่ได้เป็นแบบนี้ตลอดหรอกค่ะ แค่ครั้งนี้มัน..."
16017-CVGroup_UIEventLobby_Enter2-2 = "มะ... ไม่สิ ส่วนใหญ่ก็เป็นอย่างนั้นนะ..."
16017-CVGroup_UIEventLobby_Enter2-3 = "ตะ... แต่ถึงยังไงก็ไม่ถึงกับอลหม่านหรอกค่ะ น่าจะ... นะคะ"
16017-CVGroup_UIEventLobby_Enter3-1 = "ฮือ... ระ... รู้สึกว่าจะเป็นงานที่น่ารำคาญเอามากๆ เลยค่ะ..."
16017-CVGroup_UIEventLobby_Enter3-2 = "ฉันจะเชื่อพวกผู้บริหารได้มั้ยนะ... อืม..."
16017-CVGroup_UIEventLobby_Enter4-1 = "ฮู่ว... ตะ... แต่ถึงยังไงก็รู้สึกเหมือนใกล้จะเสร็จแล้วนะคะ..."
16017-CVGroup_UIEventLobby_Enter5-1 = "ทะ... ทำสำเร็จจนได้ค่ะ..."
16017-CVGroup_UIEventLobby_Enter5-2 = "คุณครูก็ทำได้ ดะ... ดีมากเลยค่ะ..."
16017-CVGroup_UIEventLobby_Idle1-1 = "มะ... มีเรื่องอะไรเหรอคะ...?"
16017-CVGroup_UIEventLobby_Idle1-2 = "เอ๋... ระ... หรือว่า ฉันทำอะไรลงไปเหรอคะ...?"
16017-CVGroup_UIEventLobby_Idle2-1 = "ทะ... ทำไมลางสังหรณ์ไม่ดีเลย..."
16017-CVGroup_UIEventLobby_Idle2-2 = "คงไม่มีอะไรใช่มั้ยคะ...?"
16017-CVGroup_UIEventLobby_Idle3-1 = "คะ... คนที่เป็นผู้บริหารทำไมเป็นแบบนั้นกันหมดนะ..."
16017-CVGroup_UIEventLobby_Idle3-2 = "ไม่รู้กันเลยว่าคนทำงานต้องเหนื่อยแค่ไหน..."
16017-CVGroup_UIEventLobby_Idle4-1 = "ทะ... ทำไมถึงทำอย่างนั้นล่ะคะ..."
16017-CVGroup_UIEventLobby_Idle4-2 = "จั๊กจี้นะคะ... ตรงนั้นเป็นจุดอ่อนของฉัน..."
16017-CVGroup_UIEventMission_Enter1-1 = "ระ... รู้สึกเหมือน... จะยังไม่จบเลยนะคะ..."
16017-CVGroup_UIEventMission_Enter2-1 = "คะ... ค่อยยังชั่วนะคะที่คุณครูอยู่ตรงนี้ด้วย..."
16017-CVGroup_UIEventMission_Enter2-2 = "ต้องบอกว่ามั่นใจ... หรือวางใจได้ดีนะ..."
16017-CVGroup_UIEventMission_Enter2-3 = "แหะๆ"
16017-CVGroup_UIEventMission_Idle1-1 = "ถะ... ถึงจะจิ้มฉันแบบนั้น\nฉันก็ช่วยอะไรไม่ได้หรอกค่ะ..."
16017-CVGroup_UIEventMission_Idle2-1 = "ตะ... ต้องทำอะไรสักอย่างสิ... อึก..."
16017-CVGroup_UIEventMission_Buy1-1 = "วะ... ว้าว..."
16017-CVGroup_UIEventMission_Buy2-1 = "นะ... นั่นไม่ใช่เรื่องง่ายเลยนะคะ..."
16017-CVGroup_UIEventMission_Interaction1-1 = "นะ... นี่สินะ... พลังของผู้ใหญ่"

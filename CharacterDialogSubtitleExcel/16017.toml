[translation]
16017-CVGroup_UITitle_Idle1-1 = "B-Blue Archive... W-Was that right...?"
16017-CVGroup_CharacterGet_Idle1-1 = "H-Highlander Railroad Academy... U-Utsumi Aoba..."
16017-CVGroup_Cafe_Idle1-1 = "E-Everyone seems happy... I wonder why..."
16017-CVGroup_Cafe_Idle2-1 = "It's spacious and nice... I wish our night duty room was like this..."
16017-CVGroup_Cafe_Idle3-1 = "I-Is it okay for someone as unworthy as me to be here...?"
16017-CVGroup_Cafe_Idle4-1 = "(I feel like I reek of oil... It's bothering me...)"
16017-CVGroup_Cafe_Idle5-1 = "Calm down, and take a deep breath... *inhale* *exhale*"
16017-CVGroup_WeaponGet_Idle1-1 = "I-If there are people bothering me...I can sh-shoot them with this, right...?"
16017-CVGroup_UIEventLobby_Enter1-1 = "Sensei... Thank you for coming..."
16017-CVGroup_UIEventLobby_Enter1-2 = "I-It feels reassuring to have an adult around..."
16017-CVGroup_UIEventLobby_Enter2-1 = "H-Highlander isn't always like this...! It's just that this time, it's..."
16017-CVGroup_UIEventLobby_Enter2-2 = "W-Well, actually, it IS like this most of the time..."
16017-CVGroup_UIEventLobby_Enter2-3 = "B-But it's not always a total disaster. Maybe... I'm not sure."
16017-CVGroup_UIEventLobby_Enter3-1 = "Ugh... I-It feels like this situation is becoming very annoying..."
16017-CVGroup_UIEventLobby_Enter3-2 = "I'm not sure if I can trust the officers... Umm..."
16017-CVGroup_UIEventLobby_Enter4-1 = "Phew... B-But it seems like things are wrapping up okay..."
16017-CVGroup_UIEventLobby_Enter5-1 = "I-It's over...somehow..."
16017-CVGroup_UIEventLobby_Enter5-2 = "Thank you for your h-hard work, Sensei..."
16017-CVGroup_UIEventLobby_Idle1-1 = "Wh-What is it..."
16017-CVGroup_UIEventLobby_Idle1-2 = "Eh... D-Did I do something wrong...?"
16017-CVGroup_UIEventLobby_Idle2-1 = "I-I have a bad feeling..."
16017-CVGroup_UIEventLobby_Idle2-2 = "Everything will be okay, right...?"
16017-CVGroup_UIEventLobby_Idle3-1 = "Wh-Why are all our officers like that...?"
16017-CVGroup_UIEventLobby_Idle3-2 = "They don't understand the pain of us technicians..."
16017-CVGroup_UIEventLobby_Idle4-1 = "...Wh-Why are you doing this...?"
16017-CVGroup_UIEventLobby_Idle4-2 = "It tickles... That's my weak spot..."
16017-CVGroup_UIEventMission_Enter1-1 = "I-It feels like there's still lots left over..."
16017-CVGroup_UIEventMission_Enter2-1 = "S-Sensei... I'm glad you're here."
16017-CVGroup_UIEventMission_Enter2-2 = "I guess I feel reassured...or perhaps relieved..."
16017-CVGroup_UIEventMission_Enter2-3 = "Heehee."
16017-CVGroup_UIEventMission_Idle1-1 = "E-Even if you poke me like that...I won't give you a guide or anything..."
16017-CVGroup_UIEventMission_Idle2-1 = "I-I need to do something... Ughhh..."
16017-CVGroup_UIEventMission_Buy1-1 = "W-Whoa..."
16017-CVGroup_UIEventMission_Buy2-1 = "I-It wasn't an easy task..."
16017-CVGroup_UIEventMission_Interaction1-1 = "A-As expected... The power of an adult..."

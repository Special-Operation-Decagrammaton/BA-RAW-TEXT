[translation]
13004-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
13004-CVGroup_CharacterGet_Idle1-1 = "嗯嗯，終於到了！\n請多指教，老師！"
13004-CVGroup_Cafe_Idle1-1 = "真開心～☆"
13004-CVGroup_Cafe_Idle2-1 = "嗯？那個是什麼呢？"
13004-CVGroup_Cafe_Idle3-1 = "好漂亮的東西啊。\n送給大家當禮物吧…"
13004-CVGroup_Cafe_Idle4-1 = "果然還是讓阿拜多斯偶像計畫復活吧～☆"
13004-CVGroup_Cafe_Idle5-1 = "因為我們的孩子們全～都很可愛。"
13004-CVGroup_WeaponGet_Idle1-1 = "嗯嗯。雖然我認為所謂的力量是把雙面刃，\n不過如果是為了老師和大家我想是必要的。\n我會珍惜使用的，請守望著我哦。老師。"

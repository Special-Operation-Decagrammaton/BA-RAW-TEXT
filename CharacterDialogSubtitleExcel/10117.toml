[translation]
10117-CVGroup_UITitle_Idle1-1 = "블루- 아카이브-"
10117-CVGroup_CharacterGet_Idle1-1 = "하이랜더 철도학원- 타치바나 히카리 등- 장-"
10117-CVGroup_Cafe_Idle1-1 = "우오- 놀기 좋아 보이는 곳…"
10117-CVGroup_Cafe_Idle2-1 = "선생님- 어디 있어-?"
10117-CVGroup_Cafe_Idle3-1 = "오늘은 땡땡이 모드- 결정-"
10117-CVGroup_Cafe_Idle4-1 = "과자 없어-? 주스는-?"
10117-CVGroup_Cafe_Idle5-1 = "재미있는 일 없어-?"
10117-CVGroup_WeaponGet_Idle1-1 = "이거 히카리- 주는 거야-? 고마워- 강해져서 선생님 지켜줄게-"
10117-CVGroup_UIEventLobby_Enter1-1 = "어서 와- 선생님-"
10117-CVGroup_UIEventLobby_Enter1-2 = "히카리는 준비 완-료-"
10117-CVGroup_UIEventLobby_Enter2-1 = "선생님- 위기야-"
10117-CVGroup_UIEventLobby_Enter2-2 = "도와줘- 헬-프-"
10117-CVGroup_UIEventLobby_Enter3-1 = "운행 준비- 문제없음-"
10117-CVGroup_UIEventLobby_Enter3-2 = "어때- 선생님-? 빠르게 가볼-까-?"
10117-CVGroup_UIEventLobby_Enter4-1 = "거의 끝나가- 더 놀고 싶은데-"
10117-CVGroup_UIEventLobby_Enter5-1 = "재밌었지-? 또 놀자- 선생님-"
10117-CVGroup_UIEventLobby_Idle1-1 = "응-? 왜-? 히카리랑 놀고 싶어-?"
10117-CVGroup_UIEventLobby_Idle2-1 = "간지-러워-"
10117-CVGroup_UIEventLobby_Idle2-2 = "우우, 복수할 거야-"
10117-CVGroup_UIEventLobby_Idle3-1 = "쓰다듬 플리즈- 히카리 칭찬해 줘-"
10117-CVGroup_UIEventLobby_Idle3-2 = "아무것도 안 했지만- 그래도 해줘-"
10117-CVGroup_UIEventLobby_Idle4-1 = "간식 줄까-? 잠깐-만-……"
10117-CVGroup_UIEventLobby_Idle4-2 = "아… 다 먹어버렸어- 쏘리-"
10117-CVGroup_UIEventShop_Enter1-1 = "필요한 거 있어-? 골라봐-"
10117-CVGroup_UIEventShop_Enter2-1 = "어서 와- 뭘 사고 싶어-?"
10117-CVGroup_UIEventShop_Enter3-1 = "선로는 어디까지나 이어지지- 가게도 함께야-"
10117-CVGroup_UIEventShop_Idle1-1 = "추천-? 으음……"
10117-CVGroup_UIEventShop_Idle1-2 = "안 돼- 직접 골라야 해-"
10117-CVGroup_UIEventShop_Idle2-1 = "히카리도 놀고 싶지만 참는 중- 선생님도 참아-"
10117-CVGroup_UIEventShop_Buy1-1 = "오- 그거 좋지-"
10117-CVGroup_UIEventShop_Buy2-1 = "센스 있어- 휴-휴-"
10117-CVGroup_UIEventShop_Buy3-1 = "좋은 거 골랐어- 선생님 똑똑해-"
10117-CVGroup_UIEventShop_Buy4-1 = "히카리 것도 사주는 거야-?"

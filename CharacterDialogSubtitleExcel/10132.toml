[translation]
10132-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10132-CVGroup_CharacterGet_Idle1-1 = "N-No matter what I'm wearing, I'm still a full-fledged member of the Ninjutsu Research Club! Ono Tsukuyo!"
10132-CVGroup_Cafe_Idle1-1 = "Ughhh. Does this outfit stand out too much...?"
10132-CVGroup_Cafe_Idle2-1 = "Don't spill coffee on your outfit... Carefully... Carefully..."
10132-CVGroup_Cafe_Idle3-1 = "I want to hide inside the furniture right now."
10132-CVGroup_Cafe_Idle4-1 = "I can't even walk without being cautious in this outfit."
10132-CVGroup_Cafe_Idle5-1 = "(There's so many...different fashion styles.)"
10132-CVGroup_WeaponGet_Idle1-1 = "I'll do my best. For our ninja way...!"
10132-CVGroup_UIEventLobby_Enter1-1 = "S-Sensei...?! Th-This outfit is weird, right...?"
10132-CVGroup_UIEventLobby_Enter2-1 = "Y-You're here, Sensei..."
10132-CVGroup_UIEventLobby_Enter2-2 = "Th-This outfit is, um..."
10132-CVGroup_UIEventLobby_Enter3-1 = "Wh-What is this...? What is happening right now...?"
10132-CVGroup_UIEventLobby_Enter4-1 = "It's strange up on the stage."
10132-CVGroup_UIEventLobby_Enter4-2 = "I'm sure I'm getting more attention than ever..."
10132-CVGroup_UIEventLobby_Enter4-3 = "But it's surprisingly lonely..."
10132-CVGroup_UIEventLobby_Enter5-1 = "Everyone...! I'm back...!"
10132-CVGroup_UIEventLobby_Idle1-1 = "Am I really a person befitting of this outfit...?"
10132-CVGroup_UIEventLobby_Idle2-1 = "I-I stand out too much, right, Sensei?"
10132-CVGroup_UIEventLobby_Idle2-2 = "Ugh, a ninja shouldn't be like this..."
10132-CVGroup_UIEventLobby_Idle3-1 = "I-I-I-I'm pretty...?!"
10132-CVGroup_UIEventLobby_Idle3-2 = "Huuu..."
10132-CVGroup_UIEventLobby_Idle4-1 = "I-If I think"
10132-CVGroup_UIEventLobby_Idle4-2 = "...This outfit as a form of disguise... That might work..."
10132-CVGroup_UIEventMission_Enter1-1 = "I-I organized the missions we need to complete..."
10132-CVGroup_UIEventMission_Enter2-1 = "These missions aren't easy..."
10132-CVGroup_UIEventMission_Enter2-2 = "But you can do it, Sensei!"
10132-CVGroup_UIEventMission_Idle1-1 = "I-Is there something wrong with the things I prepared?"
10132-CVGroup_UIEventMission_Idle2-1 = "What? Th-There weren't any missions like this..."
10132-CVGroup_UIEventMission_Buy1-1 = "I-I knew it...!"
10132-CVGroup_UIEventMission_Buy1-2 = "I knew you could do it, Sensei!"
10132-CVGroup_UIEventMission_Buy2-1 = "Incredible! I knew it! You have the talent to be a ninja too, Sensei!"
10132-CVGroup_UIEventMission_Interaction1-1 = "G-Good work...! That was an incredible finale!"

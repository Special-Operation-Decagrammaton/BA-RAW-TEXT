[translation]
10132-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10132-CVGroup_CharacterGet_Idle1-1 = "이, 이런 차림이어도, 어엿한 인법연구부의 일원……! 오노 츠쿠요입니다!"
10132-CVGroup_Cafe_Idle1-1 = "흐우우, 너무 눈에 띄는 복장일까요……?"
10132-CVGroup_Cafe_Idle2-1 = "커피가 옷에 튀지 않게, 조심, 조심……."
10132-CVGroup_Cafe_Idle3-1 = "차라리 저 가구에 들어가 있고 싶어요……."
10132-CVGroup_Cafe_Idle4-1 = "이 옷을 입으니, 걷는 것도 신경 쓰여요……."
10132-CVGroup_Cafe_Idle5-1 = "(정말…… 다양한 패션들이 눈에 들어오네요.)"
10132-CVGroup_WeaponGet_Idle1-1 = "저, 최선을 다할게요. 우리 모두의 닌자의 길을 위해서……!"
10132-CVGroup_UIEventLobby_Enter1-1 = "서, 선생님……?! 이, 이 옷, 역시 어색하죠……?"
10132-CVGroup_UIEventLobby_Enter2-1 = "오, 오셨나요, 선생님……?"
10132-CVGroup_UIEventLobby_Enter2-2 = "이, 이 옷은 그러니까……."
10132-CVGroup_UIEventLobby_Enter3-1 = "뭐, 뭐죠……? 대체 무슨 일이 벌어지고 있는 거죠……?"
10132-CVGroup_UIEventLobby_Enter4-1 = "무대 위는 이상해요."
10132-CVGroup_UIEventLobby_Enter4-2 = "분명 어느 때보다 많은 관심을 받는데……"
10132-CVGroup_UIEventLobby_Enter4-3 = "이상할 정도로 외로워요……."
10132-CVGroup_UIEventLobby_Enter5-1 = "모두들……! 저, 돌아왔어요……!"
10132-CVGroup_UIEventLobby_Idle1-1 = "저는, 정말로 이 옷에 잘 어울리는 사람일까요……?"
10132-CVGroup_UIEventLobby_Idle2-1 = "너, 너무 눈에 띄죠, 선생님……?"
10132-CVGroup_UIEventLobby_Idle2-2 = "후으으, 닌자가 이러면 안 되는데……."
10132-CVGroup_UIEventLobby_Idle3-1 = "예, 예, 예, 예쁘다고요……?!"
10132-CVGroup_UIEventLobby_Idle3-2 = "흐우우우……."
10132-CVGroup_UIEventLobby_Idle4-1 = "이, 이 옷도"
10132-CVGroup_UIEventLobby_Idle4-2 = "일종의 변장술이라 생각한다면…… 괜찮을지도……."
10132-CVGroup_UIEventMission_Enter1-1 = "해, 해야 할 임무들을 정리해 봤어요……."
10132-CVGroup_UIEventMission_Enter2-1 = "쉽지 않은 임무들이지만……"
10132-CVGroup_UIEventMission_Enter2-2 = "선생님은 할 수 있어요!"
10132-CVGroup_UIEventMission_Idle1-1 = "제, 제가 정리한 것에 문제라도 있나요……?"
10132-CVGroup_UIEventMission_Idle2-1 = "예? 이, 이런 건 임무 중에 없었는데……."
10132-CVGroup_UIEventMission_Buy1-1 = "여, 역시……!"
10132-CVGroup_UIEventMission_Buy1-2 = "선생님은 해내실 줄 알았어요!"
10132-CVGroup_UIEventMission_Buy2-1 = "굉장해요! 역시 선생님에게도 닌자의 재능이……!"
10132-CVGroup_UIEventMission_Interaction1-1 = "수, 수고하셨습니다……! 멋진 피날레였어요!"

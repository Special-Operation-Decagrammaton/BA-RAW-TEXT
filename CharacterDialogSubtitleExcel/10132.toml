[translation]
10132-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10132-CVGroup_CharacterGet_Idle1-1 = "ถะ... ถึงจะใส่ชุดแบบนี้ ฉันก็ยังเป็นโอโนะ สึคุโยะ...!\nสมาชิกที่สง่าผ่าเผยของชมรมวิจัยศาสตร์นินจาค่ะ!"
10132-CVGroup_Cafe_Idle1-1 = "อึกก ชุดนี้มันสะดุดตาเกินไปหรือเปล่าคะ...?"
10132-CVGroup_Cafe_Idle2-1 = "ต้องระวังอย่าให้กาแฟหกเลอะชุด..."
10132-CVGroup_Cafe_Idle3-1 = "ฉันยอมเข้าไปอยู่ในเฟอร์นิเจอร์นั่นยังดีเสียกว่าค่ะ...  "
10132-CVGroup_Cafe_Idle4-1 = "พอใส่ชุดนี้แค่เดินก็พะวงแล้วค่ะ..."
10132-CVGroup_Cafe_Idle5-1 = "(ชุดแฟชั่นแบบต่างๆ ช่างเตะตาจริงๆ เลยนะคะ...)"
10132-CVGroup_WeaponGet_Idle1-1 = "ฉะ... ฉันจะพยายามให้เต็มที่ค่ะ\nเพื่อเส้นทางแห่งนินจาของพวกเราทุกคน...!"
10132-CVGroup_UIEventLobby_Enter1-1 = "คะ... คุณครู...?! ชะ... ชุดนี้ มันดูแปลกๆ ใช่มั้ยคะ...?"
10132-CVGroup_UIEventLobby_Enter2-1 = "มะ... มาแล้วเหรอคะ คุณครู...?"
10132-CVGroup_UIEventLobby_Enter2-2 = "คะ... คือว่าชุดนี้... "
10132-CVGroup_UIEventLobby_Enter3-1 = "อะ... อะไรกันคะเนี่ย...?\nนี่มันเกิดเรื่องอะไรขึ้นกันแน่คะ...?"
10132-CVGroup_UIEventLobby_Enter4-1 = "ตอนอยู่บนเวที... มันแปลกๆ นะคะ"
10132-CVGroup_UIEventLobby_Enter4-2 = "ทั้งที่ได้รับความสนใจมากกว่าครั้งไหนแท้ๆ"
10132-CVGroup_UIEventLobby_Enter4-3 = "แต่มันรู้สึกโดดเดี่ยวจนน่าใจหายเลยค่ะ..."
10132-CVGroup_UIEventLobby_Enter5-1 = "ทุกคน...! ฉัน... กลับมาแล้วค่ะ...!"
10132-CVGroup_UIEventLobby_Idle1-1 = "ตัวฉันน่ะเหมาะกับชุดนี้จริงๆ เหรอคะ...?"
10132-CVGroup_UIEventLobby_Idle2-1 = "มะ... มันดูเด่นเกินไปสินะคะ คุณครู...?"
10132-CVGroup_UIEventLobby_Idle2-2 = "ฮือออ นินจาไม่ควรทำอะไรแบบนี้เลย..."
10132-CVGroup_UIEventLobby_Idle3-1 = "สะ... สะ... สะ... สวยงั้นเหรอคะ...?!"
10132-CVGroup_UIEventLobby_Idle3-2 = "ฮึกกก..."
10132-CVGroup_UIEventLobby_Idle4-1 = "ถะ... ถ้าคิดว่า"
10132-CVGroup_UIEventLobby_Idle4-2 = "ชุดนี้เป็นส่วนหนึ่งของวิชาแปลงกายก็อาจจะไม่เป็นไร... "
10132-CVGroup_UIEventMission_Enter1-1 = "ฉะ... ฉันลองรวบรวมภารกิจที่ที่ต้องทำมาแล้วค่ะ"
10132-CVGroup_UIEventMission_Enter2-1 = "ไม่ใช่ภารกิจง่ายๆ เลย..."
10132-CVGroup_UIEventMission_Enter2-2 = "แต่คุณครูทำได้แน่นอนค่ะ!"
10132-CVGroup_UIEventMission_Idle1-1 = "ระ... รายการที่ฉันสรุปมามีปัญหาตรงไหนรึเปล่าคะ...? "
10132-CVGroup_UIEventMission_Idle2-1 = "คะ? ระ... เรื่องแบบนี้ไม่ได้มีอยู่ในภารกิจนี่คะ..."
10132-CVGroup_UIEventMission_Buy1-1 = "คะ... คิดแล้วเชียว...!"
10132-CVGroup_UIEventMission_Buy1-2 = "ว่าคุณครูจะต้องทำสำเร็จจนได้!"
10132-CVGroup_UIEventMission_Buy2-1 = "สุดยอดเลยค่ะ! คิดแล้วเชียวว่าคุณครู\nมีพรสวรรค์ด้านนินจาจริงๆ ด้วย...! "
10132-CVGroup_UIEventMission_Interaction1-1 = "ทะ... ทำได้ดีมากเลยค่ะ...! เป็นฟินาเล่ที่งดงามมาเลยค่ะ!"

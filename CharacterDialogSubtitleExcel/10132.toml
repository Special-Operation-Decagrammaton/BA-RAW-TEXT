[translation]
10132-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10132-CVGroup_CharacterGet_Idle1-1 = "我是，大野月夜！雖然穿著禮服……\n依然是千真萬確，忍術研究部的一員……！"
10132-CVGroup_Cafe_Idle1-1 = "嗚嗚……我，是不是太引人注目了……？"
10132-CVGroup_Cafe_Idle2-1 = "要是染到衣服的話，就糟糕了……要小心……"
10132-CVGroup_Cafe_Idle3-1 = "嗚嗚……還是乾脆躲進那邊的家具裡……"
10132-CVGroup_Cafe_Idle4-1 = "穿著禮服的時候，就連走路方式……都得小心才行……"
10132-CVGroup_Cafe_Idle5-1 = "（大家……都打扮得很有個性呢）"
10132-CVGroup_WeaponGet_Idle1-1 = "我……今後也會拚盡全力，好好努力的。\n為了大家，以及成為出色的忍者……！"
10132-CVGroup_UIEventLobby_Enter1-1 = "老師……！？\n這套禮服……果然，很奇怪吧……？"
10132-CVGroup_UIEventLobby_Enter2-1 = "歡迎回來，老師……"
10132-CVGroup_UIEventLobby_Enter2-2 = "呃，這副打扮是，那個……"
10132-CVGroup_UIEventLobby_Enter3-1 = "究竟……發生了什麼事呢……？"
10132-CVGroup_UIEventLobby_Enter4-1 = "舞台上面……真是不可思議。"
10132-CVGroup_UIEventLobby_Enter4-2 = "明明被許多人看著……"
10132-CVGroup_UIEventLobby_Enter4-3 = "卻有著，令人感到孤單的瞬間……"
10132-CVGroup_UIEventLobby_Enter5-1 = "大家……！\n我，回來了……！"
10132-CVGroup_UIEventLobby_Idle1-1 = "我……真的配得上這套衣服嗎……？"
10132-CVGroup_UIEventLobby_Idle2-1 = "果然，很顯眼，對吧……？"
10132-CVGroup_UIEventLobby_Idle2-2 = "嗚嗚……我，明明是忍者……"
10132-CVGroup_UIEventLobby_Idle3-1 = "漂，漂，漂漂漂亮，是嗎……！？"
10132-CVGroup_UIEventLobby_Idle3-2 = "呀嗚嗚嗚……"
10132-CVGroup_UIEventLobby_Idle4-1 = "這套衣服，"
10132-CVGroup_UIEventLobby_Idle4-2 = "只要想成，是變裝之術的話……"
10132-CVGroup_UIEventMission_Enter1-1 = "我把該做的事，整理了一下……"
10132-CVGroup_UIEventMission_Enter2-1 = "雖然每樣都不簡單……"
10132-CVGroup_UIEventMission_Enter2-2 = "不過是老師的話，一定……！"
10132-CVGroup_UIEventMission_Idle1-1 = "那個……我整理的東西……有什麼問題嗎……？"
10132-CVGroup_UIEventMission_Idle2-1 = "老師……？\n請問，怎麼了嗎……？"
10132-CVGroup_UIEventMission_Buy1-1 = "不，不愧是您……！"
10132-CVGroup_UIEventMission_Buy1-2 = "我始終相信，老師能辦到的……！"
10132-CVGroup_UIEventMission_Buy2-1 = "真厲害……！莫非老師，也有忍者的才能……！？"
10132-CVGroup_UIEventMission_Interaction1-1 = "辛苦了……！\n是個精彩的結尾！"

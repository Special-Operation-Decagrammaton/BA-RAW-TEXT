[translation]
10034-CVGroup_UITitle_Idle1-1 = "블루 아카이브~"
10034-CVGroup_CharacterGet_Idle1-1 = "후훗, 평안하신지요. 선생님. 수행부의 미모리입니다.\n앞으로, 오래오래 잘 부탁드려요."
10034-CVGroup_Cafe_Idle1-1 = "모두 웃고 있는 것 같아 다행이에요."
10034-CVGroup_Cafe_Idle2-1 = "선생님을 위해 준비한 홍차, 식기 전에 드릴 수 있었으면……."
10034-CVGroup_Cafe_Idle3-1 = "수행의 일환으로……. 모처럼이니 선생님께 식사 대접을 권유해볼까요……?"
10034-CVGroup_Cafe_Idle4-1 = "카에데 쨩, 어딘가에서 선생님께 폐를 끼치거나 하지 않았으면 좋겠는데요……"
10034-CVGroup_Cafe_Idle5-1 = "으응, 주변이 조금 어질러져 있네요.\n선생님이 돌아오시기 전에, 청소를 해둘까요?"
10034-CVGroup_WeaponGet_Idle1-1 = "일부러 이것을, 저를 위해……? …감사해요. 선생님.\n앞으로는 지금 이상으로 노력해, 일평생 선생님을 보필하겠습니다."

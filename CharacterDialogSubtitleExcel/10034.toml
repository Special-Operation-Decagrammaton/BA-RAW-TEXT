[translation]
10034-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10034-CVGroup_CharacterGet_Idle1-1 = "ฮุฮุ สบายดีรึเปล่าคะ คุณครู\nมิโมริจากชมรมฝึกฝนค่ะ\nจากนี้ขอฝากตัวด้วยนะคะ"
10034-CVGroup_Cafe_Idle1-1 = "ฉันโล่งใจที่เห็นทุกคน\nหัวเราะแบบนี้ค่ะ"
10034-CVGroup_Cafe_Idle2-1 = "ชาแดงที่เตรียมไว้ให้คุณครู\nถ้านำไปให้คุณครูได้\nก่อนที่มันจะเย็นละก็..."
10034-CVGroup_Cafe_Idle3-1 = "การทำอาหารไปให้คุณครู\nคือส่วนหนึ่งของการฝึกฝน..."
10034-CVGroup_Cafe_Idle4-1 = "ถ้าคาเอเดะจังไม่ได้ก่อเรื่อง\nให้คุณครูลำบากใจก็คงดีนะคะ..."
10034-CVGroup_Cafe_Idle5-1 = "อืม... บริเวณรอบๆ เละเทะนิดหน่อย\nงั้นมาทำความสะอาดกัน\nก่อนที่คุณครูจะกลับมาดีมั้ย?"
10034-CVGroup_WeaponGet_Idle1-1 = "คุณครูเตรียมไว้ให้ฉันเหรอคะ?\nขอบคุณค่ะ คุณครู\nต่อไปฉันจะตั้งใจทำงาน\nเพื่อตอนแทนคุณครูค่ะ"

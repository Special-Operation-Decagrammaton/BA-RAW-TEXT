[translation]
10034-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～"
10034-CVGroup_CharacterGet_Idle1-1 = "呵呵。你好，老師。\n我是修行部的三森。\n今後，請多多指教直到永遠哦。"
10034-CVGroup_Cafe_Idle1-1 = "大家看起來很開心\n真是太好了。"
10034-CVGroup_Cafe_Idle2-1 = "為了老師準備的紅茶，\n如果可以在冷掉之前\n飲用就好了……"
10034-CVGroup_Cafe_Idle3-1 = "作為修行的一環，要試著邀請老師吃飯嗎……？"
10034-CVGroup_Cafe_Idle4-1 = "楓醬，沒有在哪裡給老師添麻煩就好了……"
10034-CVGroup_Cafe_Idle5-1 = "唔嗯，有點髒亂呢。\n趁老師回來之前，先打掃好吧？"
10034-CVGroup_WeaponGet_Idle1-1 = "特地把這個，為了我……？\n……謝謝你，老師。\n我今後會比以往努力，一生，都幫上老師的忙。"

[translation]
10034-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10034-CVGroup_CharacterGet_Idle1-1 = "Heehee. Hello, Sensei. I'm Mimori from the Inner Discipline Club. I look forward to working with you."
10034-CVGroup_Cafe_Idle1-1 = "I'm glad that everyone seems to be smiling."
10034-CVGroup_Cafe_Idle2-1 = "I hope I can give Sensei this black tea I prepared before it gets cold..."
10034-CVGroup_Cafe_Idle3-1 = "As part of my training...shall I invite Sensei to dinner?"
10034-CVGroup_Cafe_Idle4-1 = "Kaede, you aren't bothering Sensei, are you?"
10034-CVGroup_Cafe_Idle5-1 = "It's a bit messy. Should we clean before Sensei returns?"
10034-CVGroup_WeaponGet_Idle1-1 = "Did you prepare this for me? Thank you, Sensei. I want to support you for the rest of my life."

[translation]
10073-CVGroup_UITitle_Idle1-1 = "B-Blue...Archive..."
10073-CVGroup_CharacterGet_Idle1-1 = "Ugh... I hate the outdoors... Too hot, too humid... Why must summer be like this...?"
10073-CVGroup_Cafe_Idle1-1 = "Ah... There are too many people here..."
10073-CVGroup_Cafe_Idle2-1 = "Where oh where can I find some peace and quiet...?"
10073-CVGroup_Cafe_Idle3-1 = "I may be mistaken, but things seem busier here than usual..."
10073-CVGroup_Cafe_Idle4-1 = "*sigh* ...Geez."
10073-CVGroup_Cafe_Idle5-1 = "Well... I suppose the atmosphere here isn't so bad."
10073-CVGroup_WeaponGet_Idle1-1 = "Perhaps this is out of the blue, but I'm not sure if I'm worthy of all the things you do for me... I'm sorry. I said I wouldn't say things like that. I'll try my best if that's what you want, Sensei."
10073-CVGroup_UIEventLobby_Enter1-1 = "Over here, Sensei. Preparations for the investigation have been made."
10073-CVGroup_UIEventLobby_Enter2-1 = "The summer is so hot... Even standing here doing nothing is exhausting..."
10073-CVGroup_UIEventLobby_Enter3-1 = "Are we about halfway...?"
10073-CVGroup_UIEventLobby_Enter4-1 = "Our investigation here will be over soon."
10073-CVGroup_UIEventLobby_Enter5-1 = "Let's check just in case..."
10073-CVGroup_UIEventLobby_Idle1-1 = "S-Sensei? Wh-What's wrong?"
10073-CVGroup_UIEventLobby_Idle1-2 = "Is there something on my face...?"
10073-CVGroup_UIEventLobby_Idle2-1 = "Even if you suddenly call me like that..."
10073-CVGroup_UIEventLobby_Idle3-1 = "If you need anything, please just tell me..."
10073-CVGroup_UIEventLobby_Idle4-1 = "Even though I don't really like being outside..."
10073-CVGroup_UIEventLobby_Idle4-2 = "...it wasn't too bad, since I got to be alone with you."
10073-CVGroup_UIEventMission_Enter1-1 = "Now, let me summarize our investigation findings."
10073-CVGroup_UIEventMission_Enter2-1 = "We've come to learn many things."
10073-CVGroup_UIEventMission_Idle1-1 = "Hmm... Is there more to investigate?"
10073-CVGroup_UIEventMission_Idle2-1 = "There's nothing more to discover, not even if you investigated me...!"
10073-CVGroup_UIEventMission_Buy1-1 = "This...could be very meaningful."
10073-CVGroup_UIEventMission_Buy2-1 = "I knew I could count on you, Sensei."

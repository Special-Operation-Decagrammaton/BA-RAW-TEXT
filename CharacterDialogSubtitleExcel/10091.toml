[translation]
10091-CVGroup_UITitle_Idle1-1 = "啊，啊……蔚藍檔案。"
10091-CVGroup_CharacterGet_Idle1-1 = "居然是主唱啊……\n好吧，既然如此，我會認真的。\n請多指教囉，老師。"
10091-CVGroup_Cafe_Idle1-1 = "哇……人好多！\n沒問題嗎？這裡。"
10091-CVGroup_Cafe_Idle2-1 = "在這裡唱歌\n會很顯眼吧？"
10091-CVGroup_Cafe_Idle3-1 = "才小唱一下，肚子就餓了。"
10091-CVGroup_Cafe_Idle4-1 = "不會太顯眼吧？\n……嗯，是我想太多了吧。"
10091-CVGroup_Cafe_Idle5-1 = "大家，會在哪裡呢？"
10091-CVGroup_WeaponGet_Idle1-1 = "真的是，沒想到會變成這樣。\n呵呵……雖然現在說可能有點晚了，但能見到老師真是太好了。\n……謝謝你。"
10091-CVGroup_UIEventLobby_Enter1-1 = "歡迎你，老師！"
10091-CVGroup_UIEventLobby_Enter1-2 = "能幫我練習一下嗎？"
10091-CVGroup_UIEventLobby_Enter2-1 = "啊，啊，啊啊──"
10091-CVGroup_UIEventLobby_Enter2-2 = "……哇！？老師！？\n你是從什麼時候……！"
10091-CVGroup_UIEventLobby_Enter3-1 = "感覺會很順利……"
10091-CVGroup_UIEventLobby_Enter3-2 = "又好像不會……"
10091-CVGroup_UIEventLobby_Enter4-1 = "集中！集中！"
10091-CVGroup_UIEventLobby_Enter4-2 = "還沒結束呢！"
10091-CVGroup_UIEventLobby_Enter5-1 = "呼……"
10091-CVGroup_UIEventLobby_Enter5-2 = "老師，那個……"
10091-CVGroup_UIEventLobby_Enter5-3 = "如，如何……？"
10091-CVGroup_UIEventLobby_Idle1-1 = "……嗯？對麥克風有興趣嗎？"
10091-CVGroup_UIEventLobby_Idle1-2 = "老師要不要也來唱一首？"
10091-CVGroup_UIEventLobby_Idle2-1 = "嗯？有什麼需要的東西嗎？"
10091-CVGroup_UIEventLobby_Idle3-1 = "真是的……又在戳我……"
10091-CVGroup_UIEventLobby_Idle3-2 = "這次真的要生氣囉？"
10091-CVGroup_UIEventLobby_Idle4-1 = "啊啊，真是的！"
10091-CVGroup_UIEventLobby_Idle4-2 = "有需要的話，就好好說出來！"
10091-CVGroup_UIEventMission_Enter1-1 = "你好，今天也來查看情況嗎？"
10091-CVGroup_UIEventMission_Enter2-1 = "是來看進度如何的吧？"
10091-CVGroup_UIEventMission_Idle1-1 = "不要一直盯著我看，請好好集中精神。"
10091-CVGroup_UIEventMission_Idle2-1 = "喂！不行。"
10091-CVGroup_UIEventMission_Buy1-1 = "嗯，OK！"
10091-CVGroup_UIEventMission_Buy2-1 = "哦哦，太好了。"
10091-CVGroup_UIEventMission_Interaction1-1 = "今天到此為止！\n辛苦了，老師。"

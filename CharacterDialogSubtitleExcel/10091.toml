[translation]
10091-CVGroup_UITitle_Idle1-1 = "Ah, ah... Blue Archive."
10091-CVGroup_CharacterGet_Idle1-1 = "A vocalist... Well, since it's come to this, I'll do my best. Looking forward to working with you, Sensei."
10091-CVGroup_Cafe_Idle1-1 = "Whoa... There's a crowd! I wonder if it'll be okay here?"
10091-CVGroup_Cafe_Idle2-1 = "I'd stick out if I sing here, no?"
10091-CVGroup_Cafe_Idle3-1 = "Singing made me hungry."
10091-CVGroup_Cafe_Idle4-1 = "I don't stand out, right? ...Well, maybe I'm worrying too much."
10091-CVGroup_Cafe_Idle5-1 = "Where...is everyone?"
10091-CVGroup_WeaponGet_Idle1-1 = "Seriously, how did it end up like this? Heehee... This is a little off topic, but I'm really glad that I met you, Sensei. So...thank you."
10091-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei!"
10091-CVGroup_UIEventLobby_Enter1-2 = "Can you help out with practice?"
10091-CVGroup_UIEventLobby_Enter2-1 = "Ah, Ah. Ahh."
10091-CVGroup_UIEventLobby_Enter2-2 = "...?! H-Huh?! Sensei?! Since when...?!"
10091-CVGroup_UIEventLobby_Enter3-1 = "It feels like... It's going well..."
10091-CVGroup_UIEventLobby_Enter3-2 = "Or maybe not..."
10091-CVGroup_UIEventLobby_Enter4-1 = "Focus, focus!"
10091-CVGroup_UIEventLobby_Enter4-2 = "It's not over yet!"
10091-CVGroup_UIEventLobby_Enter5-1 = "Phew..."
10091-CVGroup_UIEventLobby_Enter5-2 = "Sensei. Um..."
10091-CVGroup_UIEventLobby_Enter5-3 = "H-How was it...?"
10091-CVGroup_UIEventLobby_Idle1-1 = "...? Do you want the mic?"
10091-CVGroup_UIEventLobby_Idle1-2 = "You wanna sing a song too?"
10091-CVGroup_UIEventLobby_Idle2-1 = "Hm? You need something?"
10091-CVGroup_UIEventLobby_Idle3-1 = "Seriously... You're poking me again..."
10091-CVGroup_UIEventLobby_Idle3-2 = "I'm really gonna get mad this time, okay?"
10091-CVGroup_UIEventLobby_Idle4-1 = "Ahhh! Seriously!"
10091-CVGroup_UIEventLobby_Idle4-2 = "If you've got something to say to me, just say it!"
10091-CVGroup_UIEventMission_Enter1-1 = "Hey. Are you checking in again?"
10091-CVGroup_UIEventMission_Enter2-1 = "You're here to check on our progress, right?"
10091-CVGroup_UIEventMission_Idle1-1 = "Don't just look at me. You need to focus."
10091-CVGroup_UIEventMission_Idle2-1 = "Hey! No."
10091-CVGroup_UIEventMission_Buy1-1 = "Yeah. I checked."
10091-CVGroup_UIEventMission_Buy2-1 = "Oh, that's great."
10091-CVGroup_UIEventMission_Interaction1-1 = "That's a wrap! Great work, Sensei."

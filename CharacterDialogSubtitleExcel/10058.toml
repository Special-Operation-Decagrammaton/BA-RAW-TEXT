[translation]
10058-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10058-CVGroup_CharacterGet_Idle1-1 = "我是救護騎士團團長蒼森美禰。\n需要救護的人在哪裡呢？"
10058-CVGroup_Cafe_Idle1-1 = "沒有…\n需要救護的人嗎？"
10058-CVGroup_Cafe_Idle2-1 = "這裡…會讓心情平靜下來呢。"
10058-CVGroup_Cafe_Idle3-1 = "在這裡舉辦茶會如何呢？"
10058-CVGroup_Cafe_Idle4-1 = "無論對誰來說休息都是必要的。\n當然，救護騎士團也是。"
10058-CVGroup_Cafe_Idle5-1 = "為了健康和美容，\n用餐後請喝一杯紅茶。"
10058-CVGroup_WeaponGet_Idle1-1 = "感謝您的關心。\n……我會賭上一切，\n成為老師的助力。"

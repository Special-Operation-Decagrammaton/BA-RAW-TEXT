[translation]
10058-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10058-CVGroup_CharacterGet_Idle1-1 = "구호기사단 단장 아오모리 미네라고 합니다.\n구호가 필요한 분은 어디 계신가요?"
10058-CVGroup_Cafe_Idle1-1 = "구호가 필요한 분은… 안 계시려나요."
10058-CVGroup_Cafe_Idle2-1 = "여기는… 기분이 편안해지는군요."
10058-CVGroup_Cafe_Idle3-1 = "여기서 다과회를 여는 건 어떨까요?"
10058-CVGroup_Cafe_Idle4-1 = "누구에게나 휴식은 필요합니다. 물론, 구호기사단에게도."
10058-CVGroup_Cafe_Idle5-1 = "건강과 미용을 위해서, 식후 한 잔의 홍차를."
10058-CVGroup_WeaponGet_Idle1-1 = "신경 써주셔서 감사합니다.\n…저의 모든것을 걸고, 선생님의 힘이 되겠습니다."

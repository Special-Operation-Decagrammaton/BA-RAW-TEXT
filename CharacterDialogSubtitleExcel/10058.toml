[translation]
10058-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10058-CVGroup_CharacterGet_Idle1-1 = "หัวหน้าชมรมอัศวินบรรเทาทุกข์ อาโอโมริ มิเนะค่ะ\nคนที่ต้องการให้ช่วยบรรเทาทุกข์อยู่ที่ไหนคะ?"
10058-CVGroup_Cafe_Idle1-1 = "ไม่มีคนที่ต้องการ... ให้ช่วยอยู่เลยเหรอคะ?"
10058-CVGroup_Cafe_Idle2-1 = "เป็นสถานที่ที่ทำให้รู้สึกสงบนะคะ"
10058-CVGroup_Cafe_Idle3-1 = "จัดพิธีชงชาที่นี่ดีมั้ยคะ?"
10058-CVGroup_Cafe_Idle4-1 = "การพักผ่อนเป็นสิ่งที่สำคัญสำหรับทุกคนนะคะ\n แน่นอนว่า สมาชิกชมรมอัศวินบรรเทาทุกข์ก็ด้วยค่ะ"
10058-CVGroup_Cafe_Idle5-1 = "ดื่มชาแดงหลังอาหารสักแก้ว เพื่อความงามและสุขภาพที่ดีค่ะ"
10058-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณที่เป็นห่วงนะคะ ฉันจะทุ่มเทสุดกำลัง\nเพื่อสนับสนุนคุณครูเองค่ะ"

10102-CVGroup_UIEventShop_Enter3-2 = "ถึงฉันจะไม่ได้ซื้อ แต่แค่ได้ดูก็สนุกแล้วค่ะ..."
10102-CVGroup_UIEventShop_Idle1-1 = "ฉะ... ฉันไม่รู้ว่าชิ้นไหนดีน่ะค่ะ..."

10102-CVGroup_UIEventLobby_Idle4-2 = "แต่ยิ่งเป็นแบบนี้ ตอนกลับไปใช้ชีวิตแบบเดิม\nคงเสียใจใช่มั้ยคะ..."
10102-CVGroup_UIEventShop_Enter1-1 = "แหะๆ ตรงนี้มีของขายหลายอย่างเลยนะคะ"

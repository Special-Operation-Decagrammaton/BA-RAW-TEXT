[translation]
10102-CVGroup_UITitle_Idle1-1 = "B... Blue... Archive...!"
10102-CVGroup_CharacterGet_Idle1-1 = "แหะ แหะๆ ได้มาแล้วสินะคะ...!\nฤดูร้อน ทะเล... มีความสุขจังเลยค่ะ...!"
10102-CVGroup_Cafe_Idle1-1 = "ที่นี่...\nเป็นที่ที่เอาไว้ทำอะไรเหรอคะ?"
10102-CVGroup_Cafe_Idle2-1 = "แหะๆ... เย็นสบายจังเลยค่ะ...\nต่อให้ออกไปข้างนอกแล้วจะร้อนอีกรอบก็เถอะค่ะ..."
10102-CVGroup_Cafe_Idle3-1 = "พี่ซาโอริ ตอนนี้คง..."
10102-CVGroup_Cafe_Idle4-1 = "ฉันขอเขียนไปรษณียบัตรชิงโชคจากนิตยสารที่นี่ได้มั้ยคะ...?"
10102-CVGroup_Cafe_Idle5-1 = "ชุดว่ายน้ำมันเหมือนจะรัดหน่อยๆ...\nตัวฉันคงไม่มีอะไรผิดปกติใช่มั้ยคะ...?"
10102-CVGroup_WeaponGet_Idle1-1 = "แหะ แหะๆ ให้ของที่มีค่าแบบนี้กับฉัน...\nถะ... ถ้ามาขอคืนทีหลัง ฉันไม่คืนให้นะคะ...!"
10102-CVGroup_UIEventLobby_Enter1-1 = "แหะๆ ไม่ว่าที่ไหนก็มีคนที่ท่าทางสนุกๆ เต็มไปหมดเลยนะคะ"
10102-CVGroup_UIEventLobby_Enter2-1 = "ทะเล... งานเทศกาล..."
10102-CVGroup_UIEventLobby_Enter2-2 = "บางทีตอนนี้อาจจะเป็นจุดที่ดีที่สุดในชีวิตของฉันก็ได้..."
10102-CVGroup_UIEventLobby_Enter3-1 = "มีแต่เรื่องที่ฉันเพิ่งได้เจอเป็นครั้งแรกเลยนะคะ..."
10102-CVGroup_UIEventLobby_Enter3-2 = "งานเทศกาลที่ทะเลปกติเป็นแบบนี้เหรอคะ...?"
10102-CVGroup_UIEventLobby_Enter4-1 = "ถะ... ถ้าฉันไม่สนุกกับงานไปจนถึงจบงานละก็"
10102-CVGroup_UIEventLobby_Enter4-2 = "ฉันอาจจะเสียดายจนนอนไม่หลับก็ได้นะคะ...!"
10102-CVGroup_UIEventLobby_Enter5-1 = "จบแล้วสินะคะ... มันจบแล้วค่ะ..."
10102-CVGroup_UIEventLobby_Enter5-2 = "จากนี้ชีวิตของฉันคงไม่มีวันแบบนี้อีกแล้วสินะคะ"
10102-CVGroup_UIEventLobby_Enter6-1 = "คะ? จะพาฉันมาทะเลอีกเหรอคะ?"
10102-CVGroup_UIEventLobby_Enter6-2 = "แหะๆ ขอบคุณค่ะ"

[translation]
10102-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案……！"
10102-CVGroup_CharacterGet_Idle1-1 = "耶，耶嘿嘿，結果還是來到這裡了……！\n夏天、大海……真幸福……！"
10102-CVGroup_Cafe_Idle1-1 = "這裡……\n是用來做什麼的地方呢？"
10102-CVGroup_Cafe_Idle2-1 = "耶嘿嘿……真涼快……\n雖然一到外面又要變熱了……"
10102-CVGroup_Cafe_Idle3-1 = "沙織姐他現在……"
10102-CVGroup_Cafe_Idle4-1 = "雜誌的抽獎明信片，\n可以在這裡寫嗎……？"
10102-CVGroup_Cafe_Idle5-1 = "總覺得泳裝好像有點緊……\n該不會我的身體很奇怪的關係吧……？"
10102-CVGroup_WeaponGet_Idle1-1 = "耶，耶嘿嘿，居然把這麼貴重的東西給我……\n就，就算之後要我還你也不會還的哦……！"
10102-CVGroup_UIEventLobby_Enter1-1 = "耶嘿嘿，到處都有很多看起來很開心的人呢……"
10102-CVGroup_UIEventLobby_Enter2-1 = "大海……慶典……"
10102-CVGroup_UIEventLobby_Enter2-2 = "說不定現在就是我人生中的最高潮……"
10102-CVGroup_UIEventLobby_Enter3-1 = "到處都是各種意義上我第一次經歷的事……"
10102-CVGroup_UIEventLobby_Enter3-2 = "所謂的海邊慶典本來就是這樣的嗎……？"
10102-CVGroup_UIEventLobby_Enter4-1 = "要，要是不享受到最後一刻的話……"
10102-CVGroup_UIEventLobby_Enter4-2 = "說不定會後悔到睡不著覺的唷……！"
10102-CVGroup_UIEventLobby_Enter5-1 = "結束了……全都結束了……"
10102-CVGroup_UIEventLobby_Enter5-2 = "我的人生中恐怕再也不會遇到這樣的日子了吧……"
10102-CVGroup_UIEventLobby_Enter6-1 = "咦？還會再帶我們來海邊是嗎？"
10102-CVGroup_UIEventLobby_Enter6-2 = "耶嘿嘿，謝謝你。"
10102-CVGroup_UIEventLobby_Enter6-3 = "那下次可以去渡假飯店之類的……"
10102-CVGroup_UIEventLobby_Idle1-1 = "噫噫？有，有什麼工作要交給我嗎？"
10102-CVGroup_UIEventLobby_Idle1-2 = "只是叫一下而已……？\n為什麼……？"
10102-CVGroup_UIEventLobby_Idle2-1 = "敦，敦子醬和美咲同學都非常適合穿泳裝呢……"
10102-CVGroup_UIEventLobby_Idle2-2 = "咦？我也很適合？\n謝謝你……"
10102-CVGroup_UIEventLobby_Idle3-1 = "我在海邊撿了一些被海浪衝上岸的海藻……"
10102-CVGroup_UIEventLobby_Idle3-2 = "這個應該不能吃吧……？"
10102-CVGroup_UIEventLobby_Idle4-1 = "大海和慶典雖然都很有趣……"
10102-CVGroup_UIEventLobby_Idle4-2 = "但果然越是這樣，回歸日常的時候，就會越痛苦吧……"
10102-CVGroup_UIEventShop_Enter1-1 = "耶嘿嘿，這裡有賣很多東西呢。"
10102-CVGroup_UIEventShop_Enter1-2 = "如果願意買給我的話，我也不會拒絕，耶嘿嘿。"
10102-CVGroup_UIEventShop_Enter2-1 = "有好多看起來不錯的東西……"
10102-CVGroup_UIEventShop_Enter3-1 = "商店已經結束了呢。"
10102-CVGroup_UIEventShop_Enter3-2 = "雖然我買不起，不過光是看看也很開心……"
10102-CVGroup_UIEventShop_Idle1-1 = "我，我也不太清楚什麼是好東西……"
10102-CVGroup_UIEventShop_Idle1-2 = "所以我覺得還是讓老師來挑比較好……"
10102-CVGroup_UIEventShop_Idle2-1 = "噫，噫耶耶！？"
10102-CVGroup_UIEventShop_Buy1-1 = "原，原來還有那種東西啊……！"
10102-CVGroup_UIEventShop_Buy2-1 = "昂貴的東西那麼輕易地就……大人還真厲害呢……"
10102-CVGroup_UIEventShop_Buy3-1 = "難道是要給我的禮物嗎……？"
10102-CVGroup_UIEventShop_Buy3-2 = "如果是的話就太感謝你了，耶嘿嘿……"
10102-CVGroup_UIEventShop_Buy4-1 = "啊，那個，是我也有注意到的東西。耶嘿嘿。"

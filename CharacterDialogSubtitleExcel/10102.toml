[translation]
10102-CVGroup_UITitle_Idle1-1 = "B-Blue Archive...!"
10102-CVGroup_CharacterGet_Idle1-1 = "Hee, heehee. I'm finally here...! Summer, the beach... I'm so happy!"
10102-CVGroup_Cafe_Idle1-1 = "What do they...do here?"
10102-CVGroup_Cafe_Idle2-1 = "Heehee... It's nice and cool... Although I'll just get hot again when I go out..."
10102-CVGroup_Cafe_Idle3-1 = "Saori must be..."
10102-CVGroup_Cafe_Idle4-1 = "A magazine sweepstakes postcard. Can I fill it out here?"
10102-CVGroup_Cafe_Idle5-1 = "The swimsuit seems...tighter than I'd like. I hope nothing's wrong with me..."
10102-CVGroup_WeaponGet_Idle1-1 = "Hee... Heehee. What a precious gift... I-I won't give it back, even if you ask for it later...!"
10102-CVGroup_UIEventLobby_Enter1-1 = "Heehee. It's full of cheerful-looking people..."
10102-CVGroup_UIEventLobby_Enter2-1 = "The sea... The festival..."
10102-CVGroup_UIEventLobby_Enter2-2 = "This might be the peak of my life..."
10102-CVGroup_UIEventLobby_Enter3-1 = "They're all new experiences for me..."
10102-CVGroup_UIEventLobby_Enter3-2 = "Are beach festivals always like this...?"
10102-CVGroup_UIEventLobby_Enter4-1 = "I-If I don't enjoy it until the end,"
10102-CVGroup_UIEventLobby_Enter4-2 = "I might not be able to sleep...!"
10102-CVGroup_UIEventLobby_Enter5-1 = "It's over... It's finished..."
10102-CVGroup_UIEventLobby_Enter5-2 = "I'll never have a day like this again, will I?"
10102-CVGroup_UIEventLobby_Enter6-1 = "What? You'll bring me to the ocean again?"
10102-CVGroup_UIEventLobby_Enter6-2 = "Heehee. Thank you."
10102-CVGroup_UIEventLobby_Enter6-3 = "How about we go to a resort next time...?"
10102-CVGroup_UIEventLobby_Idle1-1 = "Eek! D-Do you need me to do something?"
10102-CVGroup_UIEventLobby_Idle1-2 = "You called me for no reason? How come...?"
10102-CVGroup_UIEventLobby_Idle2-1 = "A-A-Atsuko and Misaki look good in their swimsuits..."
10102-CVGroup_UIEventLobby_Idle2-2 = "What? Me too? Thank you..."
10102-CVGroup_UIEventLobby_Idle3-1 = "I picked up some seaweed that washed up on the beach..."
10102-CVGroup_UIEventLobby_Idle3-2 = "We can't eat this, can we...?"
10102-CVGroup_UIEventLobby_Idle4-1 = "I'm happy with the sea and the festival..."
10102-CVGroup_UIEventLobby_Idle4-2 = "But I'll be so sad when I go back to my everyday life..."
10102-CVGroup_UIEventShop_Enter1-1 = "Heehee. They're selling all sorts of things."
10102-CVGroup_UIEventShop_Enter1-2 = "I won't refuse if you get me one, though. Heeheehee."
10102-CVGroup_UIEventShop_Enter2-1 = "So many pretty things..."
10102-CVGroup_UIEventShop_Enter3-1 = "The shop is closed."
10102-CVGroup_UIEventShop_Enter3-2 = "I didn't get to buy anything, but it was fun looking around."
10102-CVGroup_UIEventShop_Idle1-1 = "I-I don't know which ones are good..."
10102-CVGroup_UIEventShop_Idle1-2 = "So I think you should choose..."
10102-CVGroup_UIEventShop_Idle2-1 = "E-Eek!!"
10102-CVGroup_UIEventShop_Buy1-1 = "Th-They even sell things like that...!"
10102-CVGroup_UIEventShop_Buy2-1 = "You can buy such expensive things like it's nothing... Adults are amazing..."
10102-CVGroup_UIEventShop_Buy3-1 = "Could it be a present for me...?"
10102-CVGroup_UIEventShop_Buy3-2 = "If so, thank you. Heehee..."
10102-CVGroup_UIEventShop_Buy4-1 = "Oh, that one. I had my eye on that. Heehee."

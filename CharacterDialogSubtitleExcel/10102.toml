[translation]
10102-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브……!"
10102-CVGroup_CharacterGet_Idle1-1 = "헤, 헤헤, 결국 와 버렸네요……!여름, 바다…… 행복해요……!"
10102-CVGroup_Cafe_Idle1-1 = "여긴…… 뭐 하는 곳인가요?"
10102-CVGroup_Cafe_Idle2-1 = "헤헤…… 시원하네요…….밖에 나가면 다시 덥겠지만요……."
10102-CVGroup_Cafe_Idle3-1 = "사오리 언니는, 지금쯤……."
10102-CVGroup_Cafe_Idle4-1 = "잡지 경품 응모 엽서, 여기서 써도 될까요……?"
10102-CVGroup_Cafe_Idle5-1 = "수영복이 조금 끼는 것 같은데……제 몸에 이상이 있는 건 아니겠죠……?"
10102-CVGroup_WeaponGet_Idle1-1 = "헤, 헤헤, 이런 귀한 물건을 저에게…….나, 나중에 돌려달라고 해도 안 드릴 거니까요……!"
10102-CVGroup_UIEventLobby_Enter1-1 = "헤헤, 여기저기, 즐거워 보이는 사람들이 잔뜩이네요…"
10102-CVGroup_UIEventLobby_Enter2-1 = "바다… 축제…"
10102-CVGroup_UIEventLobby_Enter2-2 = "어쩌면 지금이 제 인생의 최고점일지도…"
10102-CVGroup_UIEventLobby_Enter3-1 = "여러모로 처음 겪는 일들뿐이네요…"
10102-CVGroup_UIEventLobby_Enter3-2 = "바닷가 축제는 원래 이런 건가요…?"
10102-CVGroup_UIEventLobby_Enter4-1 = "마, 마지막까지 즐겨두지 않으면,"
10102-CVGroup_UIEventLobby_Enter4-2 = "아까워서 잠이 안 올지도 몰라요…!"
10102-CVGroup_UIEventLobby_Enter5-1 = "끝났네요… 끝나버렸네요…"
10102-CVGroup_UIEventLobby_Enter5-2 = "이제 제 인생에 다시 이런 날들은 없겠죠…"
10102-CVGroup_UIEventLobby_Enter6-1 = "네? 다시 바다에 데려와 주신다고요?"
10102-CVGroup_UIEventLobby_Enter6-2 = "헤헤, 감사합니다."
10102-CVGroup_UIEventLobby_Enter6-3 = "그럼 다음엔 호텔 리조트 같은 곳이라도…"
10102-CVGroup_UIEventLobby_Idle1-1 = "히엑? 뭐, 뭔가 시키실 일이라도?"
10102-CVGroup_UIEventLobby_Idle1-2 = "그냥 불러봤다고요? 어째서…?"
10102-CVGroup_UIEventLobby_Idle2-1 = "아, 아츠코 쨩이나 미사키 씨는 수영복이 잘 어울리네요…"
10102-CVGroup_UIEventLobby_Idle2-2 = "네? 저도 그렇다고요? 감사합니다…"
10102-CVGroup_UIEventLobby_Idle3-1 = "해변으로 밀려온 해조류를 건졌는데요…"
10102-CVGroup_UIEventLobby_Idle3-2 = "이건 못 먹는 거겠죠…?"
10102-CVGroup_UIEventLobby_Idle4-1 = "바다도 축제도 즐겁긴 한데요…"
10102-CVGroup_UIEventLobby_Idle4-2 = "역시 그럴수록 일상으로 돌아갔을 때 괴롭겠죠…"
10102-CVGroup_UIEventShop_Enter1-1 = "헤헤, 여긴 여러 가지를 팔고 있네요."
10102-CVGroup_UIEventShop_Enter1-2 = "사주신다면 거절하지는 않겠습니다. 헤헤헤."
10102-CVGroup_UIEventShop_Enter2-1 = "좋아 보이는 물건이 잔뜩…"
10102-CVGroup_UIEventShop_Enter3-1 = "상점이 끝나버렸네요."
10102-CVGroup_UIEventShop_Enter3-2 = "전 못 샀지만, 구경하는 건 재미있었어요…"
10102-CVGroup_UIEventShop_Idle1-1 = "저, 저는 뭐가 좋은지 잘 몰라서…"
10102-CVGroup_UIEventShop_Idle1-2 = "선생님이 고르시는 게 좋을 것 같은데요…"
10102-CVGroup_UIEventShop_Idle2-1 = "히, 히에엑?!"
10102-CVGroup_UIEventShop_Buy1-1 = "그, 그런 물건도 있었네요…!"
10102-CVGroup_UIEventShop_Buy2-1 = "비싼 물건을 그렇게 쉽게… 어른은 대단하네요…"
10102-CVGroup_UIEventShop_Buy3-1 = "혹시 제 선물인가요…?"
10102-CVGroup_UIEventShop_Buy3-2 = "그렇다면 감사합니다. 헤헤헤…"
10102-CVGroup_UIEventShop_Buy4-1 = "아, 그거, 저도 눈여겨보던 물건이네요. 헤헤."

10102-CVGroup_UIEventLobby_Idle2-1 = "อะ... อาสึโกะจังกับคุณมิซากิเหมาะกับชุดว่ายน้ำจังค่ะ..."
10102-CVGroup_UIEventLobby_Idle2-2 = "คะ? ฉันก็ด้วยเหรอคะ?\nขอบคุณค่ะ..."
10102-CVGroup_UIEventLobby_Idle3-1 = "ฉันเก็บสาหร่ายที่โดนซัดขึ้นมาบนชายหาดมาน่ะค่ะ..."
10102-CVGroup_UIEventLobby_Idle3-2 = "คงกินไม่ได้ใช่มั้ยคะ...?"

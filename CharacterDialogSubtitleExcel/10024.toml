[translation]
10024-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10024-CVGroup_CharacterGet_Idle1-1 = "아아, 응. 라이딩 중이었어. 선생님도 같이 하지 않을래?\n우선 가볍게 200km 정도."
10024-CVGroup_Cafe_Idle1-1 = "오늘 평속은… 음, 조금 빨라진 느낌…"
10024-CVGroup_Cafe_Idle2-1 = "음… 땀을 식히고 싶은데."
10024-CVGroup_Cafe_Idle3-1 = "다음엔 어디로 가볼까…"
10024-CVGroup_Cafe_Idle4-1 = "칼로리를 섭취해둬야 지치지 않아."
10024-CVGroup_Cafe_Idle5-1 = "그룹 라이딩도 즐거울 거 같은데…"
10024-CVGroup_WeaponGet_Idle1-1 = "이건 라이딩용으로 특별히 개조된 경량형 개인화기야.\n가벼운만큼 좀 더 민첩한 전술행동이 가능하고.\n물론 장거리 라이딩 때에도 부담이 적지."

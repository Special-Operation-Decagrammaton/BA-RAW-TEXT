[translation]
10024-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10024-CVGroup_CharacterGet_Idle1-1 = "啊。嗯，正在騎行。\n老師也一起如何？首先簡單來個大約200km。"
10024-CVGroup_Cafe_Idle1-1 = "今天的平均速度……\n嗯，感覺變快了……"
10024-CVGroup_Cafe_Idle2-1 = "嗯……\n想把汗弄乾。"
10024-CVGroup_Cafe_Idle3-1 = "下次要去看看哪裡呢……"
10024-CVGroup_Cafe_Idle4-1 = "為了不在途中累倒，\n必須攝取熱量才行。"
10024-CVGroup_Cafe_Idle5-1 = "團體騎行\n似乎也很開心……"
10024-CVGroup_WeaponGet_Idle1-1 = "這是為了騎行用而特別改造的輕量型個人槍械。\n因為很輕所以也能進行敏捷的戰術行動，當然在長距離的騎行時也不會造成負擔。"

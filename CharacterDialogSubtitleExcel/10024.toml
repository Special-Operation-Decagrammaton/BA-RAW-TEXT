[translation]
10024-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10024-CVGroup_CharacterGet_Idle1-1 = "อา... ฉันกำลังปั่นจักรยานอยู่น่ะ\nมาปั่นจักรยานด้วยกันมั้ยคุณครู?\nเริ่มจากระยะสั้นๆ 200 กิโลเมตรก่อน"
10024-CVGroup_Cafe_Idle1-1 = "ความเร็วในการปั่นวันนี้...\nอืม ดูเหมือนจะเร็วขึ้นนิดนึง..."
10024-CVGroup_Cafe_Idle2-1 = "อืม... ตอนนี้ฉันอยากเช็ดเหงื่อออกสักหน่อย"
10024-CVGroup_Cafe_Idle3-1 = "คราวหน้า... ไปที่ไหนดีนะ..."
10024-CVGroup_Cafe_Idle4-1 = "ไม่รู้สึกเหนื่อยหรอก\nเพราะฉันกินอาหารมาในแคลลอรี่ที่เหมาะสมแล้ว"
10024-CVGroup_Cafe_Idle5-1 = "ปั่นจักรยานเป็นกลุ่ม...\nก็ดูน่าสนุกเหมือนกันนะ..."
10024-CVGroup_WeaponGet_Idle1-1 = "นี่เป็นอาวุธประจำตัวน้ำหนักเบาที่ดัดแปลงสำหรับการปั่นจักรยานโดยเฉพาะ\nมีน้ำหนักเบาเลยทำให้ปฏิบัติยุทธวิธีได้คล่องตัวมากขึ้น\nช่วยลดภาระการปั่นจักรยานระยะไกลด้วย"

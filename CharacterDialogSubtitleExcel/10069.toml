[translation]
10069-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10069-CVGroup_CharacterGet_Idle1-1 = "내 이름은 아케시로 루미. 산해경 고급 중학교 현무상회에서 회장을 하고 있어.\n편하게 루미라고 불러줘."
10069-CVGroup_Cafe_Idle1-1 = "이곳의 인테리어… 우리 상회에도 활용해 볼까?"
10069-CVGroup_Cafe_Idle2-1 = "여기의 다과도, 참고가 많이 되네."
10069-CVGroup_Cafe_Idle3-1 = "이렇게 한가롭게 시간을 보낸 게, 얼마 만이었더라…."
10069-CVGroup_Cafe_Idle4-1 = "여기서 현룡문 애들하고 싸우는 것만은, 봐줬으면 좋겠네."
10069-CVGroup_Cafe_Idle5-1 = "평화롭구나… 응, 좋은 일이야."
10069-CVGroup_WeaponGet_Idle1-1 = "손에 잘 맞는 도구는 중요하지. 주방용품이든, 총이든 말이야."
10069-CVGroup_UIEventLobby_Enter1-1 = "아, 선생님 기다리고 있었어. 어때? 산해경은?"
10069-CVGroup_UIEventLobby_Enter2-1 = "미아가 되지 않아서 다행이네."
10069-CVGroup_UIEventLobby_Enter2-2 = "산해경의 길은 복잡하니까."
10069-CVGroup_UIEventLobby_Enter3-1 = "현룡문 애들…… 안 변하네. 좋게도 나쁘게도."
10069-CVGroup_UIEventLobby_Enter4-1 = "걱정 마. 나는…… '현무상회'는 선생님 편이니까."
10069-CVGroup_UIEventLobby_Enter5-1 = "이러니 저러니 해도 무사히 마무리됐네."
10069-CVGroup_UIEventLobby_Enter5-2 = "전부 선생님 덕분이야. 잊어버린 물건은 없지? 있다면, 찾아 줄 테니까."
10069-CVGroup_UIEventLobby_Idle1-1 = "요즘 어깨가 뻐근해서…… 누가 주물러주지 않으려나."
10069-CVGroup_UIEventLobby_Idle1-2 = "선생님이라든가…… 힐끔……."
10069-CVGroup_UIEventLobby_Idle2-1 = "하하 그렇게 간지럽혀도, 아무것도 안 나온다고?"
10069-CVGroup_UIEventLobby_Idle2-2 = "연구 중인 요리라면, 얼마든지 내놓겠지만."
10069-CVGroup_UIEventLobby_Idle3-1 = "손님에게는 언제나 최고의 요리를 제공한다고!"
10069-CVGroup_UIEventLobby_Idle3-2 = "뭐…… 연구중인 요리는, 이야기가 조금 다르지만."
10069-CVGroup_UIEventLobby_Idle4-1 = "선생님은 나에게 있어서, 무엇이든 될 수 있는 사람이야."
10069-CVGroup_UIEventLobby_Idle4-2 = "손님이면서 동료이기도 하고, 그리고…… 음……"
10069-CVGroup_UIEventLobby_Idle4-3 = "미안. 이야기는 여기까지만."
10069-CVGroup_UIEventShop_Enter1-1 = "요리로 유명해졌지만,"
10069-CVGroup_UIEventShop_Enter1-2 = "현무상회의 본질은 상업이지."
10069-CVGroup_UIEventShop_Enter1-3 = "물품 관리는 안심하고 맡겨."
10069-CVGroup_UIEventShop_Enter2-1 = "상품의 발주, 유통…… 그것도 중요하지만,"
10069-CVGroup_UIEventShop_Enter2-2 = "그만큼 중요한 건, 상품 진열과 배치. 자, 천천히 보라고."
10069-CVGroup_UIEventShop_Enter3-1 = "일은 정리되었지만, 아직 당분간은 가게를 계속할 생각이야."
10069-CVGroup_UIEventShop_Enter3-2 = "「구인공휴일궤」라는 말이 있으니까."
10069-CVGroup_UIEventShop_Idle1-1 = "음, 무슨 일이야? 뭐 신경 쓰이는 점이라도 있었어?"
10069-CVGroup_UIEventShop_Idle2-1 = "필요한 거, 부족한 거 있으면 뭐든지 말해."
10069-CVGroup_UIEventShop_Idle2-2 = "……다음 번까지는, 제대로 구입해 둘 테니까."
10069-CVGroup_UIEventShop_Buy1-1 = "매번 감사합니다-! 하하. 점포를 보는 건 오랜만인걸."
10069-CVGroup_UIEventShop_Buy2-1 = "그걸로 할래? 좋아. 상품의 질에는, 자신이 있다고."
10069-CVGroup_UIEventShop_Buy3-1 = "매진되기 전에 골라 보라고.\n재입고를 기다리는 것만큼 괴로운 일은…… 없으니까."
10069-CVGroup_UIEventShop_Buy4-1 = "선생님도 알고 있겠지만, 거래에 공짜는 없어."
10069-CVGroup_UIEventShop_Buy4-2 = "무언가가 공짜로 주어진다면……"
10069-CVGroup_UIEventShop_Buy4-3 = "그건 모르는 사이에 선생님 자신이 상품이 되어 있다는 소리야."
10069-CVGroup_UIEventCardShop_Enter1-1 = "자, 선생님. 운을 시험해 볼 시간이야."
10069-CVGroup_UIEventCardShop_Enter2-1 = "자, 골라 봐. 골라 봐. 뭐가 나올까?"
10069-CVGroup_UIEventCardShop_Enter3-1 = "후회하지 않게, 여기서 전부 쓰고 가."
10069-CVGroup_UIEventCardShop_Idle1-1 = "상회의 일도 여러 가지가 있어. 이것도 그 중 하나."
10069-CVGroup_UIEventCardShop_Idle2-1 = "무슨 일이든, 운은 중요해."
10069-CVGroup_UIEventCardShop_Prize3-1 = "대단해! 이거, 진심으로 놀랐다고. 축하해. 선생님."
10069-CVGroup_UIEventCardShop_Prize2-1 = "좀처럼 나오지 않는 카드였는데, 꽤 하잖아."
10069-CVGroup_UIEventCardShop_Prize2-2 = "나까지 즐거워졌어."
10069-CVGroup_UIEventCardShop_Prize1-1 = "어디 보자…… 결과는……? 뭐, 좋지 않아?"
10069-CVGroup_UIEventCardShop_Prize0-1 = "앗차…… 뭐, 뭐. 너무 실망하지 마. 선생님. 다음이라는 게 있으니까."

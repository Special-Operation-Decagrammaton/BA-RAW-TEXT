10069-CVGroup_UIEventCardShop_Idle1-1 = "งานของทางย่านการค้าก็มีอยู่หลายๆ อย่าง\nและนี่ก็เป็นงานสำคัญอย่างหนึ่ง"
10069-CVGroup_UIEventCardShop_Idle2-1 = "ดวงสำคัญมากในทุกๆ เรื่องนะ"
10069-CVGroup_UIEventCardShop_Prize3-1 = "สุดยอดเลย! นี่มัน... น่าทึ่งสุดๆ ไปเลย\nยินดีด้วยนะ คุณครู"
10069-CVGroup_UIEventCardShop_Prize2-1 = "สุดยอดเลย การ์ดนี้ไม่ได้สุ่มได้ง่ายๆ หรอกนะ"
10069-CVGroup_UIEventCardShop_Prize2-2 = "ฉันเองก็สนุกเหมือนกัน"
10069-CVGroup_UIEventCardShop_Prize1-1 = "ไหนดูซิ... ผลก็คือ...?\nก็... ไม่เลวเลยนะ?"
10069-CVGroup_UIEventCardShop_Prize0-1 = "โธ่เอ๊ย... อะไรกันๆ\nอย่าเสียใจไปเลยน่า คุณครู\nยังมีโอกาสคราวหน้าอีกนะ"

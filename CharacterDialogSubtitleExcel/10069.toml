[translation]
10069-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10069-CVGroup_CharacterGet_Idle1-1 = "ฉันชื่ออาเคชิโระ รูมิ ประธานย่านการค้าเทพเต่าดำ\nโรงเรียมัธยมซานไห่จิง เรียกเป็นกันเองว่ารูมิก็พอ"
10069-CVGroup_Cafe_Idle1-1 = "การตกแต่งภายในของที่นี่...\nเราลองปรับใช้กับย่านการค้าของเราดีมั้ย?"
10069-CVGroup_Cafe_Idle2-1 = "ของว่างตรงนี้ก็เอาไว้ศึกษาเป็นแนวทางได้เยอะเลย"
10069-CVGroup_Cafe_Idle3-1 = "นานแล้วนะที่ไม่ได้ใช้เวลาว่างอย่างสบายๆ แบบนี้..."
10069-CVGroup_Cafe_Idle4-1 = "หวังว่าพวกมังกรดำจะไม่มาหาเรื่องทะเลาะกับฉันที่นี่นะ..."
10069-CVGroup_Cafe_Idle5-1 = "สงบดีจัง... อืม ช่างเป็นเรื่องราวดีๆ"
10069-CVGroup_WeaponGet_Idle1-1 = "อุปกรณ์ที่เหมาะมือเป็นสิ่งสำคัญเลยนะ\nไม่ว่าจะเป็นอุปกรณ์ เครื่องครัวหรือว่าปืน"
10069-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ คุณครู กำลังรออยู่เลย\nซานไห่จิง เป็นยังไงบ้างล่ะ?"
10069-CVGroup_UIEventLobby_Enter2-1 = "ค่อยยังชั่วหน่อยนะที่ไม่หลงทาง"
10069-CVGroup_UIEventLobby_Enter2-2 = "ก็ถนนหนทางของซานไห่จิงน่ะ\nมันซับซ้อนออกจะตายไป"
10069-CVGroup_UIEventLobby_Enter3-1 = "พวกมังกรดำ... ไม่เปลี่ยนไปเลยนะ\nทั้งเรื่องดี และเรื่องไม่ดี"
10069-CVGroup_UIEventLobby_Enter4-1 = "ไม่ต้องห่วงไปนะ ฉันน่ะ...\n'ย่านการค้าเทพเต่าดำ' น่ะ\nอยู่ข้างคุณครูนะ"
10069-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะเกิดเรื่องโน้นเรื่องนี้ แต่ก็จบลงไปได้ด้วยดีละนะ"
10069-CVGroup_UIEventLobby_Enter5-2 = "ต้องขอบคุณคุณครูเลยนะ ไม่ลืมอะไรไว้ใช่มั้ย?\nถ้ามีก็บอกได้เลย ฉันจะช่วยหาให้เอง"
10069-CVGroup_UIEventLobby_Idle1-1 = "ช่วงนี้รู้สึกปวดไหล่จัง...\nจะมีใครมาช่วยนวดให้บ้างมั้ยนะ..."
10069-CVGroup_UIEventLobby_Idle1-2 = "อย่างเช่นคุณครู... (เหล่มอง)..."
10069-CVGroup_UIEventLobby_Idle2-1 = "ฮ่าฮ่า! ถึงจะมาจั๊กจี้ฉันแบบนี้ก็ไม่มีอะไรหล่นออกมาหรอกนะ"
10069-CVGroup_UIEventLobby_Idle2-2 = "ถ้าเป็นอาหารที่กำลังศึกษาอยู่ละก็ฉันทำออกมาให้ชิมได้ทุกเมื่อแหละ"
10069-CVGroup_UIEventLobby_Idle3-1 = "ไม่ว่าเมื่อไร ฉันก็จะทำอาหารที่ดีที่สุดให้ลูกค้าไงล่ะ!"
10069-CVGroup_UIEventLobby_Idle3-2 = "ก็นะ... แต่ถ้าเป็นอาหารที่กำลังศึกษาอยู่ก็อาจจะต่างไปนิดหน่อย"
10069-CVGroup_UIEventLobby_Idle4-1 = "สำหรับฉัน คุณครูน่ะ...\nคือคนที่เป็นทุกอย่างให้แล้ว..."
10069-CVGroup_UIEventLobby_Idle4-2 = "เป็นทั้งลูกค้า... แล้วก็เป็นเพื่อน... แล้วก็... อืม..."
10069-CVGroup_UIEventLobby_Idle4-3 = "โทษที เรื่องนั้นเอาไว้เท่านี้แล้วกัน"
10069-CVGroup_UIEventShop_Enter1-1 = "ถึงเราจะโด่งดังเพราะเรื่องอาหาร"
10069-CVGroup_UIEventShop_Enter1-2 = "แต่แก่นแท้ของย่านการค้าเทพเต่าดำก็คือเรื่องการค้านะ"
10069-CVGroup_UIEventShop_Enter1-3 = "เรื่องการดูแลสิ่งของไว้ใจพวกเราได้เลย"
10069-CVGroup_UIEventShop_Enter2-1 = "การสั่งซื้อสินค้า การขนส่ง... เรื่องพวกนั้นสำคัญก็จริง"
10069-CVGroup_UIEventShop_Enter2-2 = "แต่สิ่งที่สำคัญที่สุดก็คือการจัดวางและโชว์สินค้า\nเอาละ ค่อยๆ เลือกดูแล้วกัน"
10069-CVGroup_UIEventShop_Enter3-1 = "ถึงงานจะจบลงไปแล้ว แต่ฉันว่าจะเปิดร้านต่อไปอีกสักพักน่ะ"
10069-CVGroup_UIEventShop_Enter3-2 = "เหมือนคำกล่าวที่ว่า 'หากหยุดพักจะไม่ถึงเป้าหมาย' ไงละ"
10069-CVGroup_UIEventShop_Idle1-1 = "อืม... มีเรื่องอะไรเหรอ?\nกังวลเรื่องอะไรอยู่รึเปล่า?"
10069-CVGroup_UIEventShop_Idle2-1 = "ถ้ามีของที่จำเป็นหรือขาดเหลืออะไรก็บอกได้เลยนะ"
10069-CVGroup_UIEventShop_Idle2-2 = "ฉันจะซื้อเตรียมเอาไว้จนถึงคราวหน้าเอง"
10069-CVGroup_UIEventShop_Buy1-1 = "ขอบคุณมากค่ะ-! ฮ่าฮ่า\nฉันไม่ได้มาดูแลร้านแบบนี้นานแล้ว"
10069-CVGroup_UIEventShop_Buy2-1 = "จะเอาอันนั้นเหรอ ก็ดีนะ\nฉันมั่นใจเรื่องคุณภาพสินค้านะ จะบอกให้"
10069-CVGroup_UIEventShop_Buy3-1 = "เลือกดีๆ ก่อนของจะหมดละ\nให้รอจนของมาเติมน่ะ มันทรมานใจจะตาย..."
10069-CVGroup_UIEventShop_Buy4-1 = "คุณครูเองก็น่าจะรู้ การซื้อขายน่ะ ไม่มีคำว่าฟรีหรอกนะ"
10069-CVGroup_UIEventShop_Buy4-2 = "ถ้าจะให้อะไรฟรีๆ ละก็..."
10069-CVGroup_UIEventShop_Buy4-3 = "หมายความว่าคุณครูกลายเป็นสินค้าไปซะเองโดยไม่รู้ตัวยังไงล่ะ"
10069-CVGroup_UIEventCardShop_Enter1-1 = "เอาละ คุณครู\nได้เวลาทดสอบดวงกันแล้ว"
10069-CVGroup_UIEventCardShop_Enter2-1 = "เอาละ เลือกเลยสิ เลือกเลย\nจะสุ่มได้อะไรกันนะ?"

[translation]
10069-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10069-CVGroup_CharacterGet_Idle1-1 = "My name is Akeshiro Rumi. I am president of Shanhaijing Academy's Black Tortoise Promenade. You can call me Rumi."
10069-CVGroup_Cafe_Idle1-1 = "The decor here... I wonder how it would look at the Promenade?"
10069-CVGroup_Cafe_Idle2-1 = "The snacks here too... We could learn from this."
10069-CVGroup_Cafe_Idle3-1 = "It's been too long since I've relaxed like this..."
10069-CVGroup_Cafe_Idle4-1 = "Let's hope our Genryumon friends don't try to pick a fight with me."
10069-CVGroup_Cafe_Idle5-1 = "So peaceful... Yes, this is nice."
10069-CVGroup_WeaponGet_Idle1-1 = "It's important to use weapons that fit well in your hands, whether on the battlefield or in the kitchen."
10069-CVGroup_UIEventLobby_Enter1-1 = "Oh, there you are, Sensei. How are you enjoying Shanhaijing?"
10069-CVGroup_UIEventLobby_Enter2-1 = "I'm glad you didn't get lost."
10069-CVGroup_UIEventLobby_Enter2-2 = "The streets of Shanhaijing are complicated."
10069-CVGroup_UIEventLobby_Enter3-1 = "Those Genryumon guys never change. For better or worse."
10069-CVGroup_UIEventLobby_Enter4-1 = "Don't worry. The Black Tortoise Promenade—and myself—are on your side."
10069-CVGroup_UIEventLobby_Enter5-1 = "After all that, we're finished."
10069-CVGroup_UIEventLobby_Enter5-2 = "It's all thanks to you, Sensei. You haven't lost anything, have you? If so, I'll go find it."
10069-CVGroup_UIEventLobby_Idle1-1 = "My shoulders have been so stiff lately... I need a massage."
10069-CVGroup_UIEventLobby_Idle1-2 = "Maybe from Sensei...? *gulp*"
10069-CVGroup_UIEventLobby_Idle2-1 = "Haha! You can't tickle the truth out of me, you know!"
10069-CVGroup_UIEventLobby_Idle2-2 = "I can offer you one of the dishes I'm still studying, but..."
10069-CVGroup_UIEventLobby_Idle3-1 = "I always provide the highest quality food to my guests!"
10069-CVGroup_UIEventLobby_Idle3-2 = "And, well... If I'm still studying a dish, it might not be at that level yet."
10069-CVGroup_UIEventLobby_Idle4-1 = "Sensei, you are very important to me."
10069-CVGroup_UIEventLobby_Idle4-2 = "You're a customer and a colleague and...um..."
10069-CVGroup_UIEventLobby_Idle4-3 = "Sorry, I've said too much..."
10069-CVGroup_UIEventShop_Enter1-1 = "We're known for our food..."
10069-CVGroup_UIEventShop_Enter1-2 = "But the main work of the Black Tortoise Promenade is commerce."
10069-CVGroup_UIEventShop_Enter1-3 = "You can leave product management to us."
10069-CVGroup_UIEventShop_Enter2-1 = "Of course, product sourcing and distribution are important..."
10069-CVGroup_UIEventShop_Enter2-2 = "But so are presentation and the layout of your goods. Take your time and look carefully."
10069-CVGroup_UIEventShop_Enter3-1 = "Things have been taken care of, but I plan on continuing the store for a while."
10069-CVGroup_UIEventShop_Enter3-2 = "It's important to always finish your work."
10069-CVGroup_UIEventShop_Idle1-1 = "Hm. What's wrong? Are you concerned about something?"
10069-CVGroup_UIEventShop_Idle2-1 = "Just let me know if you need anything."
10069-CVGroup_UIEventShop_Idle2-2 = "...I'll buy the right one next time."
10069-CVGroup_UIEventShop_Buy1-1 = "Thank you as always! It's been a while since I saw the store. Haha."
10069-CVGroup_UIEventShop_Buy2-1 = "Do you want that one? A good pick. Quality guaranteed!"
10069-CVGroup_UIEventShop_Buy3-1 = "Make your purchase before it's sold out. There's nothing worse than waiting for the next shipment."
10069-CVGroup_UIEventShop_Buy4-1 = "As you probably know, Sensei, there's no such thing as a free lunch."
10069-CVGroup_UIEventShop_Buy4-2 = "If a product you use or consume is free..."
10069-CVGroup_UIEventShop_Buy4-3 = "All that means is you've become the product yourself without even knowing!"
10069-CVGroup_UIEventCardShop_Enter1-1 = "Now, Sensei. It's time to test your luck."
10069-CVGroup_UIEventCardShop_Enter2-1 = "Make a choice. I wonder what will come out."
10069-CVGroup_UIEventCardShop_Enter3-1 = "Spend it all here or you'll regret it later."
10069-CVGroup_UIEventCardShop_Idle1-1 = "This is just one of the many enterprises the Promenade is involved in."
10069-CVGroup_UIEventCardShop_Idle2-1 = "As with anything, luck is important."
10069-CVGroup_UIEventCardShop_Prize3-1 = "Amazing! What a surprise! Congratulations, Sensei."
10069-CVGroup_UIEventCardShop_Prize2-1 = "This card is really rare. It's quite valuable."
10069-CVGroup_UIEventCardShop_Prize2-2 = "I'm really happy for you."
10069-CVGroup_UIEventCardShop_Prize1-1 = "Let's see here... The result is...? Well, it's still good..."
10069-CVGroup_UIEventCardShop_Prize0-1 = "Yikes... Well, well... Don't be too disappointed, Sensei. There's always next time."

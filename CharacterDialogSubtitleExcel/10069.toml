[translation]
10069-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10069-CVGroup_CharacterGet_Idle1-1 = "我的名字叫做朱城瑠美。\n在山海經高級中學的玄武商會擔任會長。\n隨意叫我瑠美就行囉。"
10069-CVGroup_Cafe_Idle1-1 = "這裡的裝潢…要不要試著在商會活用呢。"
10069-CVGroup_Cafe_Idle2-1 = "這裡的茶點，值得參考呢。"
10069-CVGroup_Cafe_Idle3-1 = "這麼悠閒的時間，時隔多久了呢…？"
10069-CVGroup_Cafe_Idle4-1 = "還是避免在這裡和玄龍門的孩子們戰鬥吧。"
10069-CVGroup_Cafe_Idle5-1 = "真和平啊…\n嗯，是件好事。"
10069-CVGroup_WeaponGet_Idle1-1 = "我認為順手的道具是很重要的。\n不管是廚具或槍都是。"
10069-CVGroup_UIEventLobby_Enter1-1 = "啊啊，老師。我在等你唷。\n覺得山海經怎麼樣？"
10069-CVGroup_UIEventLobby_Enter2-1 = "沒有迷路真是太好了。"
10069-CVGroup_UIEventLobby_Enter2-2 = "畢竟山海經的路相當複雜啊。"
10069-CVGroup_UIEventLobby_Enter3-1 = "玄龍門的孩子們……真是一點也沒變呢。\n不管是優點還是缺點。"
10069-CVGroup_UIEventLobby_Enter4-1 = "不用擔心。因為我們……「玄武商會」是老師的友方。"
10069-CVGroup_UIEventLobby_Enter5-1 = "雖然發生了很多事，幸好順利結束了。"
10069-CVGroup_UIEventLobby_Enter5-2 = "這全都多虧了老師。有沒有忘了什麼東西？\n有的話我去幫你找。"
10069-CVGroup_UIEventLobby_Idle1-1 = "最近肩膀有點僵硬……有沒有人願意幫我按摩一下呢。"
10069-CVGroup_UIEventLobby_Idle1-2 = "像是老師之類的……（偷瞄）……"
10069-CVGroup_UIEventLobby_Idle2-1 = "啊哈哈，就算那樣搔癢我，也什麼都不會出現的唷？"
10069-CVGroup_UIEventLobby_Idle2-2 = "雖然研究中的料理要多少有多少……"
10069-CVGroup_UIEventLobby_Idle3-1 = "不過會提供給客人的永遠只有最棒的料理！"
10069-CVGroup_UIEventLobby_Idle3-2 = "嘛……如果是研究中的料理，就另當別論了。"
10069-CVGroup_UIEventLobby_Idle4-1 = "在我眼裡的老師，是什麼都能成為的存在。"
10069-CVGroup_UIEventLobby_Idle4-2 = "是客人，是夥伴，還是……嗯……"
10069-CVGroup_UIEventLobby_Idle4-3 = "抱歉，這個話題到此為止。"
10069-CVGroup_UIEventShop_Enter1-1 = "雖然現在以料理聞名，"
10069-CVGroup_UIEventShop_Enter1-2 = "不過玄武商會的本質，依舊還是商業。"
10069-CVGroup_UIEventShop_Enter1-3 = "物品管理就放心交給我們吧。"
10069-CVGroup_UIEventShop_Enter2-1 = "商品的下訂、流通……雖然都很重要，"
10069-CVGroup_UIEventShop_Enter2-2 = "不過同樣重要的還有商品的配置及擺設。\n來，慢慢看吧。"
10069-CVGroup_UIEventShop_Enter3-1 = "雖然事情已經處理得差不多了，\n不過我暫時還是打算繼續經營商店。"
10069-CVGroup_UIEventShop_Enter3-2 = "畢竟人家不是常說「為山九仞，功虧一簣」嗎？"
10069-CVGroup_UIEventShop_Idle1-1 = "嗯？怎麼了？\n有什麼讓你在意的事嗎？"
10069-CVGroup_UIEventShop_Idle2-1 = "如果有什麼需要的東西，或不夠的東西，儘管跟我說。"
10069-CVGroup_UIEventShop_Idle2-2 = "……在下次見面之前，我會把東西準備好的。"
10069-CVGroup_UIEventShop_Buy1-1 = "謝謝惠顧～哈哈，顧店什麼的真是久違了呢。"
10069-CVGroup_UIEventShop_Buy2-1 = "你要那個嗎？可以唷。\n我對商品的品質還是很有自信的。"
10069-CVGroup_UIEventShop_Buy3-1 = "在賣光之前做出選擇吧。\n沒有什麼是比等商品進貨……更痛苦的事了。"
10069-CVGroup_UIEventShop_Buy4-1 = "老師應該也知道，世上沒有白吃的午餐。"
10069-CVGroup_UIEventShop_Buy4-2 = "如果能無償地獲得什麼東西……"
10069-CVGroup_UIEventShop_Buy4-3 = "那就代表在不知不覺間，老師自己變成商品了哦。"
10069-CVGroup_UIEventCardShop_Enter1-1 = "來，老師。\n試手氣時間到了唷。"
10069-CVGroup_UIEventCardShop_Enter2-1 = "來，選吧選吧。\n會抽到什麼呢？"
10069-CVGroup_UIEventCardShop_Enter3-1 = "為了避免後悔，在這裡全部用光吧。"
10069-CVGroup_UIEventCardShop_Idle1-1 = "商會也是有各種工作的啊。\n這也是其中之一。"
10069-CVGroup_UIEventCardShop_Idle2-1 = "不管什麼事，運氣都很重要。"
10069-CVGroup_UIEventCardShop_Prize3-1 = "好厲害！連我也嚇了一跳。\n恭喜你，老師。"
10069-CVGroup_UIEventCardShop_Prize2-1 = "這可是挺少見的卡片呢，真厲害。"
10069-CVGroup_UIEventCardShop_Prize2-2 = "連我也期待起來了。"
10069-CVGroup_UIEventCardShop_Prize1-1 = "我看看……結果是……？\n嘛，也不錯吧？"
10069-CVGroup_UIEventCardShop_Prize0-1 = "哎呀……嘛嘛，別那麼失望，老師。\n還有下次機會的。"

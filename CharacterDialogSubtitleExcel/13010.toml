[translation]
13010-CVGroup_UITitle_Idle1-1 = "Blue Archive"
13010-CVGroup_CharacterGet_Idle1-1 = "เคลียร์เงื่อนไขได้แล้วค่ะ\nพวกเราจะกำหนดตัวแปรช่วงเวลานี้ว่าคือโชคชะตา\nและทำการพิสูจน์ตัวแปรนั้นให้เห็นเอง"
13010-CVGroup_Cafe_Idle1-1 = "เอ๋? มีที่แบบนี้อยู่ด้วยงั้นเหรอ?"
13010-CVGroup_Cafe_Idle2-1 = "ขืนเป็นแบบนี้คงล้มละลายแน่ๆ ถ้าไม่ลดค่าใช้จ่ายลงละก็..."
13010-CVGroup_Cafe_Idle3-1 = "อื้อ? แวะพักกันก่อนแล้วค่อยไปดีมั้ยคะ?\nเรามีเวลาเหลือประมาณ 1,890 วินาทีค่ะ"
13010-CVGroup_Cafe_Idle4-1 = "รู้สึกเหมือนว่าวันนี้จะมีเรื่องสนุกๆ เกิดขึ้น\nถ้าคิดเป็นอัตราส่วนแล้วละก็~"
13010-CVGroup_WeaponGet_Idle1-1 = "นี่มัน... เยี่ยมสุดๆ ไปเลย!"

13010-CVGroup_Cafe_Idle3-1 = "응? 잠깐 쉬고 가지 않을래요? 약 1890초 정도는 여유가 있으니까."
13010-CVGroup_Cafe_Idle4-1 = "어쩐지 오늘은 재미있는 일이 있을 것 같아. 확률적으로~"

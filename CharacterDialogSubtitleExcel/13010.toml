[translation]
13010-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
13010-CVGroup_CharacterGet_Idle1-1 = "條件已經達成了。\n我們今天將會把這瞬間定義為緣分，並且去證明它。"
13010-CVGroup_Cafe_Idle1-1 = "咦？\n之前有這種空間嗎？"
13010-CVGroup_Cafe_Idle2-1 = "這樣下去會破產的…\n不縮減消費的話…"
13010-CVGroup_Cafe_Idle3-1 = "嗯？不休息一下再走嗎？\n大概有1890秒左右的空閒。"
13010-CVGroup_Cafe_Idle4-1 = "總覺得今天會發生有意思的事。\n以機率來說～"
13010-CVGroup_WeaponGet_Idle1-1 = "這…超加分的！"

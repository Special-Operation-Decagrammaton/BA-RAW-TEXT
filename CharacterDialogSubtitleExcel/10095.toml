[translation]
10095-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10095-CVGroup_CharacterGet_Idle1-1 = "วันนี้... ฉันลองเป็นเมดดูค่ะ\nขอฝากตัวด้วยนะคะ... นายท่าน"
10095-CVGroup_Cafe_Idle1-1 = "เมด... คาเฟ่... น่าเบื่อจังเลยนะคะ..."
10095-CVGroup_Cafe_Idle2-1 = "มีแรงบันดาลใจเพียบเลย..."

10095-CVGroup_UIEventLobby_Idle4-1 = "ทั้งสภาพแวดล้อม ชุด ปัจจัย... มีเงื่อนไขทุกอย่างครบเลยนะคะ"
10095-CVGroup_UIEventLobby_Idle4-2 = "นายท่าน ถ้าอย่างนั้นวันนี้ฉันก็จะอยู่ด้วยค่ะ"

10095-CVGroup_UIEventLobby_Enter3-3 = "ขืนให้พี่โมโมอิทำทั้งหมดละก็...!"
10095-CVGroup_UIEventLobby_Enter4-1 = "อย่างที่บอกเลยค่ะ... ชีวิตก็คือการเกิดสิ่งที่คาดไม่ถึงสินะคะ"

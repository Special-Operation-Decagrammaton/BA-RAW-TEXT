10095-CVGroup_UIEventLobby_Enter2-1 = "คฤหาสน์หลังใหญ่จังเลยนะคะ...\nงานที่ต้องทำก็น่าจะมีอยู่เยอะไม่แพ้กันเลยค่ะ"
10095-CVGroup_UIEventLobby_Enter2-2 = "ถ้าทำทีละอย่างๆ ไปเรื่อยๆ ก็คงจะเสร็จละค่ะ"
10095-CVGroup_UIEventLobby_Enter2-3 = "ก็ฉันมีคุณครูอยู่ด้วยนี่คะ"

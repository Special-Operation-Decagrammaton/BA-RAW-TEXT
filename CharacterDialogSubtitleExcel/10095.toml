[translation]
10095-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10095-CVGroup_CharacterGet_Idle1-1 = "今天……我嘗試扮演一名女僕。\n請多多指教……主人。"
10095-CVGroup_Cafe_Idle1-1 = "女僕……咖啡廳……\n果然還是太普通了……"
10095-CVGroup_Cafe_Idle2-1 = "感覺能當成主題的\n東西有好多……"
10095-CVGroup_Cafe_Idle3-1 = "這裡的清掃，\n感覺很辛苦……"
10095-CVGroup_Cafe_Idle4-1 = "會玩遊戲的女僕\n有新鮮感嗎……？\n還是其實不會呢……"
10095-CVGroup_Cafe_Idle5-1 = "在這裡打工之類的，\n有辦法嗎……？"
10095-CVGroup_WeaponGet_Idle1-1 = "筆、打掃用具、槍……從道具的觀點來看有點類似。\n如果有更好的工具，就能完成更多的工作吧。\n謝謝你，主人。我絕對不會忘記的。"
10095-CVGroup_UIEventLobby_Enter1-1 = "久候主人多時了。\n今天也請多多指教。"
10095-CVGroup_UIEventLobby_Enter1-2 = "剛剛有點女僕的樣子吧！？"
10095-CVGroup_UIEventLobby_Enter2-1 = "是間了不起的豪宅呢……要做的事似乎也很多。"
10095-CVGroup_UIEventLobby_Enter2-2 = "只要一步一步確實地完成，應該會有辦法的。"
10095-CVGroup_UIEventLobby_Enter2-3 = "畢竟老師也在。"
10095-CVGroup_UIEventLobby_Enter3-1 = "這裡究竟發生了什麼呢……？"
10095-CVGroup_UIEventLobby_Enter3-2 = "不行不行，就算只有我也得打起精神才行。"
10095-CVGroup_UIEventLobby_Enter3-3 = "要是全都交給姐姐的話……！"
10095-CVGroup_UIEventLobby_Enter4-1 = "確實……人生總是會發生超乎想像的事呢。"
10095-CVGroup_UIEventLobby_Enter4-2 = "但是，我會修行到最後的，主人。"
10095-CVGroup_UIEventLobby_Enter4-3 = "雖然我仍有許多不足，還請依賴我吧！"
10095-CVGroup_UIEventLobby_Enter5-1 = "把那些全部完成了呢……"
10095-CVGroup_UIEventLobby_Enter5-2 = "我到現在還是不敢相信。\n途中還在想事情會變成怎樣……"
10095-CVGroup_UIEventLobby_Enter5-3 = "謝謝你。這全都多虧了老師。"
10095-CVGroup_UIEventLobby_Idle1-1 = "你找我嗎，老師？"
10095-CVGroup_UIEventLobby_Idle1-2 = "是。我正在煩惱什麼是女僕該做的工作。"
10095-CVGroup_UIEventLobby_Idle1-3 = "咦？有這個態度就足夠了……？"
10095-CVGroup_UIEventLobby_Idle2-1 = "重要的，是從現在能做到的事開始著手。"
10095-CVGroup_UIEventLobby_Idle2-2 = "……偷偷跟你說，"
10095-CVGroup_UIEventLobby_Idle2-3 = "要是不那麼做的話，\n我們社團就會無法順利運作……"
10095-CVGroup_UIEventLobby_Idle3-1 = "雖然說各種經驗都是創作的原動力……"
10095-CVGroup_UIEventLobby_Idle3-2 = "但這個還是有點……"
10095-CVGroup_UIEventLobby_Idle4-1 = "環境、服裝、要素……所有的條件都齊全了。"
10095-CVGroup_UIEventLobby_Idle4-2 = "那麼，主人。今天也請讓我與您同行。"

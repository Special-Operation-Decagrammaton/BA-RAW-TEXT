10095-CVGroup_Cafe_Idle4-1 = "เมดที่เล่นเกมจะแปลกใหม่มั้ยนะ...?\nหรือที่จริงอาจจะไม่ก็ได้..."
10095-CVGroup_Cafe_Idle5-1 = "ทำงานพาร์ทไทม์ที่นี่ได้มั้ยนะ...?"
10095-CVGroup_WeaponGet_Idle1-1 = "ปากกา อุปกรณ์ทำความสะอาด ปืน... ทุกอย่างเป็นเครื่องมือเหมือนกันค่ะ\nถ้ามีเครื่องมือที่ดีกว่านี้ก็จะทำงานได้มากกว่านี้ค่ะ\nขอบคุณนะคะนายท่าน ฉันจะไม่ลืมเด็ดขาดเลยค่ะ"
10095-CVGroup_UIEventLobby_Enter1-1 = "ฉันกำลังรอให้นายท่านมาถึงอยู่เลยค่ะ\nวันนี้ก็ขอรบกวนด้วยนะคะ"

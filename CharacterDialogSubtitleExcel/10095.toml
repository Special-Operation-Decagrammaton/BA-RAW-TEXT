[translation]
10095-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10095-CVGroup_CharacterGet_Idle1-1 = "오늘은…… 메이드가 되어 보았어요. 잘 부탁드립니다…… 주인님."
10095-CVGroup_Cafe_Idle1-1 = "메이드…카페…… 역시 너무 식상하네요…"
10095-CVGroup_Cafe_Idle2-1 = "모티브가 될 만한 게 가득해…"
10095-CVGroup_Cafe_Idle3-1 = "여기 청소, 힘들 것 같아……."
10095-CVGroup_Cafe_Idle4-1 = "게임을 하는 메이드는 신선할까...? 실은 그렇지도 않은가…"
10095-CVGroup_Cafe_Idle5-1 = "여기서 아르바이트 같은 거, 할 수 있나...?"
10095-CVGroup_WeaponGet_Idle1-1 = "펜도, 청소용품도, 총도…… 도구라는 점에서는 비슷하죠.\n더 좋은 도구가 있다면, 더 많은 일을 할 수 있을 거고요.\n감사합니다, 주인님. 절대로, 잊지 않을게요."
10095-CVGroup_UIEventLobby_Enter1-1 = "주인님이 오시기를 기다리고 있었습니다. 오늘도 잘 부탁드립니다."
10095-CVGroup_UIEventLobby_Enter1-2 = "지금 좀 메이드 같았죠!?"
10095-CVGroup_UIEventLobby_Enter2-1 = "엄청난 대저택이네요…… 그만큼 할 일도 많아 보이고요."
10095-CVGroup_UIEventLobby_Enter2-2 = "하나씩, 하나씩 해 나가다 보면 어떻게든 되겠죠."
10095-CVGroup_UIEventLobby_Enter2-3 = "선생님도, 함께니까요."
10095-CVGroup_UIEventLobby_Enter3-1 = "여기선 도대체 무슨 일이 일어나고 있는 걸까요……"
10095-CVGroup_UIEventLobby_Enter3-2 = "안 돼 안 돼, 나라도 정신 바짝 차려야지."
10095-CVGroup_UIEventLobby_Enter3-3 = "언니에게 전부 맡겼다가는……!"
10095-CVGroup_UIEventLobby_Enter4-1 = "말 그대로…… 상상도 못할 일이 일어나는 것이 인생, 인 거네요."
10095-CVGroup_UIEventLobby_Enter4-2 = "그렇지만, 마지막까지 수행하겠습니다. 주인님."
10095-CVGroup_UIEventLobby_Enter4-3 = "부족한 부분이 많겠지만, 저를 의지해 주세요!"
10095-CVGroup_UIEventLobby_Enter5-1 = "우리가 그걸 다 해 낸 거군요……."
10095-CVGroup_UIEventLobby_Enter5-2 = "지금도 믿기지 않네요. 도중에는 뭐가 어떻게 되는가 했는데……."
10095-CVGroup_UIEventLobby_Enter5-3 = "감사합니다. 선생님. 모두 선생님 덕분이에요."
10095-CVGroup_UIEventLobby_Idle1-1 = "부르셨나요, 선생님?"
10095-CVGroup_UIEventLobby_Idle1-2 = "네. 메이드다운 일에는 뭐가 있을지 고민중이었어요."
10095-CVGroup_UIEventLobby_Idle1-3 = "예? 그 자세로도 충분하다고요……?"
10095-CVGroup_UIEventLobby_Idle2-1 = "중요한 건, 지금 할 수 있는 것부터 하는 거예요."
10095-CVGroup_UIEventLobby_Idle2-2 = "……여기서만 드리는 말씀이지만,"
10095-CVGroup_UIEventLobby_Idle2-3 = "그렇게 하지 않으면 우리 부는 제대로 돌아가지 않기 때문에……"
10095-CVGroup_UIEventLobby_Idle3-1 = "다양한 경험은 창작의 원동력이라고는 하지만……"
10095-CVGroup_UIEventLobby_Idle3-2 = "이건 조금……"
10095-CVGroup_UIEventLobby_Idle4-1 = "환경, 의복, 요소…… 모든 조건이 갖춰졌군요."
10095-CVGroup_UIEventLobby_Idle4-2 = "그러면, 주인님. 오늘도, 함께 하겠습니다."

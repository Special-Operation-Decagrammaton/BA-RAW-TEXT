[translation]
10095-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10095-CVGroup_CharacterGet_Idle1-1 = "I tried becoming a maid today... Nice to meet you... Master."
10095-CVGroup_Cafe_Idle1-1 = "A maid cafe... It really is too cliche."
10095-CVGroup_Cafe_Idle2-1 = "Lots of elements I can use as a motif..."
10095-CVGroup_Cafe_Idle3-1 = "It'd be hard to clean here..."
10095-CVGroup_Cafe_Idle4-1 = "Would a maid that games be a fresh idea? Maybe not...?"
10095-CVGroup_Cafe_Idle5-1 = "You think I could get something like a part-time job here?"
10095-CVGroup_WeaponGet_Idle1-1 = "Pen, cleaning supplies, guns... They're all similar in that they're tools. And with better tools, I can get more done. Thank you, Master. I will never, ever forget this."
10095-CVGroup_UIEventLobby_Enter1-1 = "I've been waiting for you, Master. I'm looking forward to serving you today."
10095-CVGroup_UIEventLobby_Enter1-2 = "Just now, I sounded like a real maid, right?!"
10095-CVGroup_UIEventLobby_Enter2-1 = "What an enormous mansion...and it looks like it requires a lot of work."
10095-CVGroup_UIEventLobby_Enter2-2 = "If we keep at it, one task at a time, it'll be done in no time."
10095-CVGroup_UIEventLobby_Enter2-3 = "Especially since you're here with me, Sensei."
10095-CVGroup_UIEventLobby_Enter3-1 = "What in the world is going on here...?"
10095-CVGroup_UIEventLobby_Enter3-2 = "No, no, I need to stay extra vigilant."
10095-CVGroup_UIEventLobby_Enter3-3 = "If I leave everything to Momoi...!"
10095-CVGroup_UIEventLobby_Enter4-1 = "Quite literally... Life is full of unimaginable surprises."
10095-CVGroup_UIEventLobby_Enter4-2 = "I will carry out my duties until the very end, Master."
10095-CVGroup_UIEventLobby_Enter4-3 = "I may have some shortcomings, but please count on me!"
10095-CVGroup_UIEventLobby_Enter5-1 = "We managed to pull that off..."
10095-CVGroup_UIEventLobby_Enter5-2 = "I still can't believe it! In the midst of it, I did have my doubts..."
10095-CVGroup_UIEventLobby_Enter5-3 = "Thank you, Sensei. It's all thanks to you."
10095-CVGroup_UIEventLobby_Idle1-1 = "Did you call for me, Sensei?"
10095-CVGroup_UIEventLobby_Idle1-2 = "Yes. I was thinking about what tasks might be included in the duties of a maid."
10095-CVGroup_UIEventLobby_Idle1-3 = "Huh? You think just having that mindset is more than enough...?"
10095-CVGroup_UIEventLobby_Idle2-1 = "The key is to do what you can do at the moment."
10095-CVGroup_UIEventLobby_Idle2-2 = "I'm only telling you this..."
10095-CVGroup_UIEventLobby_Idle2-3 = "...but if we don't do it this way, our club won't function properly..."
10095-CVGroup_UIEventLobby_Idle3-1 = "It's said that diverse experiences drive creativity, but..."
10095-CVGroup_UIEventLobby_Idle3-2 = "This is a bit..."
10095-CVGroup_UIEventLobby_Idle4-1 = "Environment, clothing, elements... All conditions are in order."
10095-CVGroup_UIEventLobby_Idle4-2 = "Well then, Master. Today, I will be by your side as well."

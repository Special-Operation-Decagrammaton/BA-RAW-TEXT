10095-CVGroup_UIEventLobby_Enter4-3 = "ถึงจะยังบกพร่องอยู่หลายเรื่อง แต่ก็พึ่งพาฉันได้เลยค่ะ!"
10095-CVGroup_UIEventLobby_Enter5-1 = "เราทำสิ่งนั้นกันจนหมดเลยนะคะเนี่ย..."
10095-CVGroup_UIEventLobby_Enter5-2 = "ถึงตอนนี้ฉันยังไม่เชื่อเลยค่ะ\nระหว่างนั้นฉันคิดด้วยนะคะ ว่านี่มันเกิดอะไรขึ้น..."
10095-CVGroup_UIEventLobby_Enter5-3 = "ขอบคุณค่ะ คุณครู เพราะได้คุณครูช่วยไว้เลยค่ะ"

[translation]
13008-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
13008-CVGroup_CharacterGet_Idle1-1 = "쿠로미 세리카야. 말해두겠지만 내가 함께하는 이상 제대로 해야 한다고?"
13008-CVGroup_Cafe_Idle1-1 = "흐음. 조금은 다정하게 대해줄 걸 그랬나."
13008-CVGroup_Cafe_Idle2-1 = "알바갈 시간은…. 아직이네."
13008-CVGroup_Cafe_Idle3-1 = "여기, 아르바이트 구하지 않으려나…."
13008-CVGroup_Cafe_Idle4-1 = "와아! 신난다…."
13008-CVGroup_Cafe_Idle5-1 = "아하하-"
13008-CVGroup_WeaponGet_Idle1-1 = "좋아, 이걸로 좀 더 모두에게 도움이 될 수 있을 거야!"

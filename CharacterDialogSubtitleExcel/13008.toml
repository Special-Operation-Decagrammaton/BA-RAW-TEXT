13008-CVGroup_Cafe_Idle1-1 = "ฮืมม\nหรือว่าฉันควรจะพูดให้อ่อนหวานกว่านี้นะ?"
13008-CVGroup_Cafe_Idle2-1 = "ยังไม่ถึงเวลาไปทำงานพาร์ทไทม์เลยนี่"
13008-CVGroup_Cafe_Idle3-1 = "ที่นี่จะรับสมัครงานพาร์ทไทม์มั้ยนะ?"
13008-CVGroup_Cafe_Idle4-1 = "ว้าว! ตื่นเต้นจัง!"
13008-CVGroup_Cafe_Idle5-1 = "ฮิฮิฮิ..."
13008-CVGroup_WeaponGet_Idle1-1 = "ดีละ ถ้าเป็นอันนี้ละก็\nคงจะเป็นประโยชน์กับทุกๆ คนได้แน่!"

[translation]
10031-CVGroup_UITitle_Idle1-1 = "블루 아카~이브"
10031-CVGroup_CharacterGet_Idle1-1 = "후훗, 올해도 나에게 의뢰하고 싶다고? 정말 어쩔 수 없네, 선생님은.\n내 활약, 올해도 바로 곁에서 지켜보도록 해."
10031-CVGroup_Cafe_Idle1-1 = "읏… 새해 벽두부터, 쪼들리겠는데…."
10031-CVGroup_Cafe_Idle2-1 = "리더에게 있어 중요한 것, 그건 여유야."
10031-CVGroup_Cafe_Idle3-1 = "엇, 사장은 보통, 직원들에게 세뱃돈도 줘야 하는 거야?!"
10031-CVGroup_Cafe_Idle4-1 = "비싼 기모노라, 긴장되네…. 조심해서 움직이지 않으면…."
10031-CVGroup_Cafe_Idle5-1 = "지쳤어…… 그런데, 우리 직원들은 어디 간 거야?"
10031-CVGroup_WeaponGet_Idle1-1 = "이게 바로, 호랑이 등에 날개, 란 거네. …맞지?"
10031-CVGroup_UIEventLobby_Enter1-1 = "어머, 선생님. 기다리고 있었어."
10031-CVGroup_UIEventLobby_Enter1-2 = "새해 벽두부터 해결해야 할 일이 생긴 참인데"
10031-CVGroup_UIEventLobby_Enter1-3 = "후후, 선생님도 도와주지 않겠어?"
10031-CVGroup_UIEventLobby_Enter2-1 = "선생님의 손, 너무 차가운 거 아니야?"
10031-CVGroup_UIEventLobby_Enter2-2 = "…아무리 일이 많다고 해도 제대로 쉬지 않으면 안 된다고?"
10031-CVGroup_UIEventLobby_Idle1-1 = "새해를 맞이해, 흥신소 68의 사업 발전을 빌려고 했을 뿐인데…."
10031-CVGroup_UIEventLobby_Idle1-2 = "어째서 이렇게 된 거지…."
10031-CVGroup_UIEventLobby_Idle2-1 = "올해는 우리 흥신소 68이 새롭게 다시 태어나는 해야."
10031-CVGroup_UIEventLobby_Idle2-2 = "자아, 힘내서 최고의 해로 만들자고!"
10031-CVGroup_UIEventLobby_Idle3-1 = "걱정 마, 선생님. 우리들 흥신소 68이 함께라면,"
10031-CVGroup_UIEventLobby_Idle3-2 = "어떤 장애물이라도 이겨낼 수 있어."
10031-CVGroup_UIEventLobby_Idle3-3 = "…응? 계획? 아, 아니, 그런 건 아직, 따, 딱히 없는데…."
10031-CVGroup_UIEventLobby_Idle4-1 = "후우, 뭔가 큰 소동이 됐는데."
10031-CVGroup_UIEventLobby_Idle4-2 = "…우리 직원들, 다치거나 하진 않았겠지?"
10031-CVGroup_UIEventLobby_Enter3-1 = "이렇게나 소동이 커질 줄이야… 하아, 예상 밖이네…"
10031-CVGroup_UIEventLobby_Enter4-1 = "…여기까지 오면 오히려 오기가 생긴달까."
10031-CVGroup_UIEventLobby_Enter4-2 = "우리 흥신소 68, 이렇게 된 이상 끝까지 어울려주겠어!"
10031-CVGroup_UIEventLobby_Enter4-3 = "아, 물론 선생님도 협력해 줄 거지?"
10031-CVGroup_UIEventLobby_Enter5-1 = "결국 「KAITEN FX Mk.1」 이라니, 대체 뭐냐고?!"
10031-CVGroup_UIEventLobby_Enter5-2 = "이젠, 어이가 없어서 말도 안 나온다니까…"
10031-CVGroup_UIEventLobby_Enter5-3 = "하아…. 뭐, 이미 끝난 일을 가지고 이러쿵저러쿵 해도 소용없고…."
10031-CVGroup_UIEventLobby_Enter5-4 = "선생님, 피곤하기도 하고 이다음에 밥이나 먹으러 갈까?"
10031-CVGroup_UIEventShop_Enter1-1 = "어서 와, 선생님. 일을 위한 준비는 완벽해."
10031-CVGroup_UIEventShop_Enter2-1 = "우리 흥신소 68이 새해를 위해 여러가지를 준비했어."
10031-CVGroup_UIEventShop_Enter2-2 = "느긋하게 골라보라고."
10031-CVGroup_UIEventShop_Idle1-1 = "후후, 어때? 눈이 휘둥그레질 정도로 멋진 물건들이지?"
10031-CVGroup_UIEventShop_Idle1-2 = "이것도 전부 우리 흥신소 68의 저력이라고~♪"
10031-CVGroup_UIEventShop_Idle2-1 = "선생님, 어때 신경 쓰이는 물건은 없어?"
10031-CVGroup_UIEventShop_Idle2-2 = "…우리 흥신소 68 모두가 기모노를 입고 찍은 사진?"
10031-CVGroup_UIEventShop_Idle2-3 = "이, 있을 리가 없잖아. 그런 거!?"
10031-CVGroup_UIEventShop_Buy1-1 = "과연, 보는 눈이 있는걸, 선생님. 훌륭해."
10031-CVGroup_UIEventShop_Buy2-1 = "어머, 그걸 고르다니 역시 선생님이네."
10031-CVGroup_UIEventShop_Buy2-2 = "엄청 좋은 물건이니까, 제대로 써달라고?"
10031-CVGroup_UIEventShop_Buy3-1 = "그걸 선택하다니, 제법이잖아. 선생님. 그래야 역시 내 동업자지."
10031-CVGroup_UIEventShop_Buy4-1 = "좋지? 그거! 나도 하나쯤 사다가 사무실에…."
10031-CVGroup_UIEventShop_Buy4-2 = "앗, 아니야. 사달라고 조르는 게 아니라……!"
10031-CVGroup_UIEventShop_Enter3-1 = "후우…. 난리법석이던 행사도 겨우 진정되었네."
10031-CVGroup_UIEventShop_Enter3-2 = "후후, 그래도 아직 이곳은 영업 중이야."
10031-CVGroup_UIEventShop_Enter3-3 = "자아, 차분히 둘러보라고. 선생님♪"

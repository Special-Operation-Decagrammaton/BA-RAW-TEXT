[translation]
10031-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10031-CVGroup_CharacterGet_Idle1-1 = "ฮุฮุฮุ ปีนี้ก็จะเรียกใช้ฉันด้วยเหรอ?\nช่วยไม่ได้นะ ปีนี้ก็คอยอยู่ข้างๆ ฉัน\nแล้วก็คอยดูสิ่งที่ฉันจะทำให้ดีล่ะ"
10031-CVGroup_Cafe_Idle1-1 = "ปีใหม่นี้ธุรกิจคงไปได้สวยแน่ๆ"
10031-CVGroup_Cafe_Idle2-1 = "ต้องรักษาภาพลักษณ์ของผู้นำเอาไว้ให้ดี"
10031-CVGroup_Cafe_Idle3-1 = "ถ้าเป็นหัวหน้า ต้องให้เงินปีใหม่กับลูกน้องด้วยงั้นเหรอ?!"
10031-CVGroup_Cafe_Idle4-1 = "ชุดกิโมโนที่ยืมมาแพงมาก\nเพราะงั้นตอนขยับต้องระวังมากๆ"
10031-CVGroup_Cafe_Idle5-1 = "เหนื่อยจังเลย... ว่าแต่คนอื่นๆ หายไปไหนกันนะ?"
10031-CVGroup_WeaponGet_Idle1-1 = "นี่สินะที่เรียกว่า \"เสือติดปีก\"\nใช่รึเปล่านะ?"
10031-CVGroup_UIEventLobby_Enter1-1 = "โอ๊ะ คุณครู.... กำลังรออยู่เลย"
10031-CVGroup_UIEventLobby_Enter1-2 = "มีเรื่องให้จัดการตั้งแต่ปีใหม่เลยนะ"
10031-CVGroup_UIEventLobby_Enter1-3 = "ฮุฮุ คุณครู... จะช่วยฉันใช่มั้ย?"
10031-CVGroup_UIEventLobby_Enter2-1 = "มือของคุณครู... มันเย็นไปรึเปล่าน่ะ?"
10031-CVGroup_UIEventLobby_Enter2-2 = "ถึงงานจะยุ่งขนาดไหน\nแต่ห้ามละเลยการพักผ่อนเด็ดขาดนะ"
10031-CVGroup_UIEventLobby_Idle1-1 = "ฉันแค่ขอพรให้กิจการของหน่วยรับจ้างสารพัด 68\nรุ่งเรืองขึ้นในปีใหม่นี้เองนะ..."
10031-CVGroup_UIEventLobby_Idle1-2 = "ทำไมถึงเป็นแบบนี้นะ..."
10031-CVGroup_UIEventLobby_Idle2-1 = "ในปีใหม่นี้หน่วยรับจ้างสารพัด 68 ของเราถือว่าได้เกิดใหม่แล้ว"
10031-CVGroup_UIEventLobby_Idle2-2 = "เอาล่ะ มาฮึดสู้สักตั้ง แล้วทำให้ปีนี้เป็นปีที่สุดยอดกันเถอะ!"
10031-CVGroup_UIEventLobby_Idle3-1 = "ไม่ต้องห่วงนะ คุณครู ถ้าอยู่กับพวกเราหน่วยรับจ้างสารพัด 68 ละก็"
10031-CVGroup_UIEventLobby_Idle3-2 = "ไม่ว่าจะเจออุปสรรคอะไร เราก็เอาชนะได้หมดแน่นอน"
10031-CVGroup_UIEventLobby_Idle3-3 = "เอ๊ะ...? แผนการ? มะ... ไม่ใช่...\nระ...เรื่องนั้นฉันยังไม่ได้คิดไว้เลย..."
10031-CVGroup_UIEventLobby_Idle4-1 = "ฮู่ว... ดูเหมือนจะมีเรื่องวุ่นวายครั้งใหญ่เกิดขึ้นแล้ว"
10031-CVGroup_UIEventLobby_Idle4-2 = "สมาชิกของพวกเราไม่มีใครบาดเจ็บใช่มั้ย?"
10031-CVGroup_UIEventLobby_Enter3-1 = "ไม่คิดเลยว่าเรื่องวุ่นวายจะบานปลายใหญ่โตแบบนี้...\nเฮ้อ คิดไม่ถึงเลย..."
10031-CVGroup_UIEventLobby_Enter4-1 = "มาถึงขนาดนี้แล้ว... ชักอยากลุยให้จบแล้วสิ"
10031-CVGroup_UIEventLobby_Enter4-2 = "ถ้าเป็นแบบนี้แล้ว หน่วยรับจ้างสารพัด 68 ก็จะลุยให้ถึงที่สุดเลย!"
10031-CVGroup_UIEventLobby_Enter4-3 = "อ๊ะ แน่นอนว่าคุณครูเองก็จะให้ความร่วมมือด้วยใช่มั้ยล่ะ?"
10031-CVGroup_UIEventLobby_Enter5-1 = "สุดท้ายก็กลายเป็น KAITEN FX Mk.1 แล้วงั้นเหรอ?\nมันคือตัวอะไรกันละเนี่ย?!"
10031-CVGroup_UIEventLobby_Enter5-2 = "ไม่มีเหตุผลเอาซะเลย พูดไม่ออกเลย..."
10031-CVGroup_UIEventLobby_Enter5-3 = "เฮ้อ... มาถึงตอนนี้แล้ว จะเอาเรื่องที่ผ่านไปแล้ว\nมาบ่นยืดยาวก็ไม่มีประโยชน์อะไร..."
10031-CVGroup_UIEventLobby_Enter5-4 = "คุณครู ฉันเหนื่อยแล้วละ ตอนนี้เราไปหาอะไรกินกันดีมั้ย?"
10031-CVGroup_UIEventShop_Enter1-1 = "เข้ามาสิคุณครู การเตรียมการทำงานมันสมบูรณ์แบบมากเลยละ"
10031-CVGroup_UIEventShop_Enter2-1 = "หน่วยรับจ้างสารพัด 68 ของเรา\nเตรียมของสำหรับปีใหม่เอาไว้หลายอย่างเลยละ"
10031-CVGroup_UIEventShop_Enter2-2 = "ค่อยๆ เลือกดูก็ได้นะ"
10031-CVGroup_UIEventShop_Idle1-1 = "ฮุฮุ เป็นยังไงล่ะ? มีแต่ของที่สุดยอดจนต้องอ้าปากค้างเลยใช่มั้ย?"
10031-CVGroup_UIEventShop_Idle1-2 = "นี่ก็คือศักยภาพทั้งหมดของหน่วยรับจ้างสารพัด 68 เรายังไงล่ะ~♪"
10031-CVGroup_UIEventShop_Idle2-1 = "คุณครู มีของที่สนใจบ้างมั้ย?"
10031-CVGroup_UIEventShop_Idle2-2 = "รูปถ่ายตอนที่พวกเราทุกคนใส่ชุดกิโมโนเหรอ?"
10031-CVGroup_UIEventShop_Idle2-3 = "จะ... จะไปมีได้ยังไงกันเล่า ของแบบนั้นน่ะ!?"
10031-CVGroup_UIEventShop_Buy1-1 = "ตาแหลมจริงๆ นะคุณครู\nเลือกได้ยอดเยี่ยมมากเลย"
10031-CVGroup_UIEventShop_Buy2-1 = "โอ๊ะ เลือกชิ้นนั้นเหรอ\nสมกับเป็นคุณครูจริงๆ เลยนะ"
10031-CVGroup_UIEventShop_Buy2-2 = "มันเป็นของที่ยอดเยี่ยมมากๆ\nใช้อย่างทะนุถนอมด้วยล่ะ"
10031-CVGroup_UIEventShop_Buy3-1 = "เลือกชิ้นนั้นเหรอ ยอดเยี่ยมจริงๆ\nคุณครู สมกับเป็นหุ้นส่วนของฉันเลย"
10031-CVGroup_UIEventShop_Buy4-1 = "ชิ้นนั้นก็สุดยอดเลยนะ ฉันซื้อสักชิ้นแล้วเอาไปไว้ที่สำนักงานดีมั้ยนะ..."
10031-CVGroup_UIEventShop_Buy4-2 = "ปะ...เปล่านะ! ไม่ได้หมายความว่าจะให้ซื้อให้สักหน่อย!"
10031-CVGroup_UIEventShop_Enter3-1 = "ฮู่ว... งานเทศกาลที่วุ่นวายก็สิ้นสุดลงแล้วสินะ"
10031-CVGroup_UIEventShop_Enter3-2 = "ฮุฮุ แต่ว่าร้านแลกของยังเปิดอยู่นะ"
10031-CVGroup_UIEventShop_Enter3-3 = "เอาละ ค่อยๆ เลือกดูไปนะ คุณครู ♪"

10043-CVGroup_Cafe_Idle3-1 = "唉…閣下，\n究竟去哪裡了…？"
10043-CVGroup_Cafe_Idle4-1 = "有點吵雜呢…"
10043-CVGroup_Cafe_Idle5-1 = "感覺到，有視線…\n這該不會是，老師的…？唔呵呵…"
10043-CVGroup_WeaponGet_Idle1-1 = "為了我，把這個…？\n若藻我，再重新發誓…阻擋閣下和我的事物，會以這個力量全都殲滅的。\n呵呵，唔呵呵呵…♥"

[translation]
10043-CVGroup_UITitle_Idle1-1 = "ฮุฮุ Blue~ Archive~"
10043-CVGroup_CharacterGet_Idle1-1 = "แม้จะอยู่ท่ามกลางแดดร้อนจัด หรือในน้ำที่เย็นจัด\nไม่ว่าที่ไหนฉันก็จะติดตามคุณท่านไปค่ะ\nดังนั้นในฤดูร้อนนี้... ได้โปรดอย่าอยู่ห่างจากฉันเลยนะคะ คุณ.ท่าน.♡"
10043-CVGroup_Cafe_Idle1-1 = "ที่นี่เย็นสบายจังเลยค่ะ ฮุฮุฮุ~☆"
10043-CVGroup_Cafe_Idle2-1 = "ฉันอยากให้คุณครู ได้เห็นชุดนี้ไวๆ จังเลย..."
10043-CVGroup_Cafe_Idle3-1 = "เฮ้อ คุณท่าน… ไปอยู่ที่ไหนกันนะ...?"
10043-CVGroup_Cafe_Idle4-1 = "เสียงดังกันจังเลยนะคะ..."
10043-CVGroup_Cafe_Idle5-1 = "รู้สึกถึงสายตาจากที่ไหนสักแห่ง...\nหรือว่าเป็นสายตาของคุณท่าน...? ฮุฮุฮุ..."
10043-CVGroup_WeaponGet_Idle1-1 = "ของแบบนี้... เพื่อคนอย่างฉัน...? วาคาโมะผู้นี้ขอให้คำสัตย์ค่ะ...\nหากมีสิ่งใดมาขัดขวางระหว่างฉันกับคุณท่าน\nฉันจะใช้พลังทั้งหมดที่มีทำลายให้หมด ฮุฮุฮุฮุ ฮุฮุฮุฮุ...♥"

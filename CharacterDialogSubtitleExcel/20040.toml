[translation]
20040-CVGroup_UITitle_Idle1-1 = "블루, 아카이브~"
20040-CVGroup_CharacterGet_Idle1-1 = "자아~ 기다렸지, 선생?\n만마전의 정보부장, 쿄고쿠 사츠키야. 후후훗, 잘 부탁해."
20040-CVGroup_Cafe_Idle1-1 = "샬레의 정보 수집을 해볼까나."
20040-CVGroup_Cafe_Idle2-1 = "으흥~ 이런 느낌? 나쁘지 않네."
20040-CVGroup_Cafe_Idle3-1 = "여기에 그 애들을 잠입시켜서…"
20040-CVGroup_Cafe_Idle4-1 = "다른 학원의 심문 노하우가 궁금한데……"
20040-CVGroup_Cafe_Idle5-1 = "최면술의 연습 상대… 누군가 되어 줄 사람 없으려나?"
20040-CVGroup_WeaponGet_Idle1-1 = "어머, 준비성이 좋잖아. 후후, 도움이 됐어 선생."
20040-CVGroup_UIEventLobby_Enter1-1 = "어서 와, 선생. 보고 싶은 만큼 마음껏 둘러보라구~"
20040-CVGroup_UIEventLobby_Enter2-1 = "우리 만마전이 야심 차게 준비한 행사니까,"
20040-CVGroup_UIEventLobby_Enter2-2 = "분명히 선생 마음에도 쏙 들 거야."
20040-CVGroup_UIEventLobby_Enter3-1 = "어머, 잘 풀리지 않나 보네."
20040-CVGroup_UIEventLobby_Enter3-2 = "뭐, 마코토 쨩이 어떻게든 하지 않을까?"
20040-CVGroup_UIEventLobby_Enter4-1 = "여기서 선생의 도움을 받게 될 줄이야."
20040-CVGroup_UIEventLobby_Enter4-2 = "후훗, 부탁할게, 선생?"
20040-CVGroup_UIEventLobby_Enter5-1 = "파티는 이걸로 끝."
20040-CVGroup_UIEventLobby_Enter5-2 = "어때? 내 말대로 어떻게든 됐지?"
20040-CVGroup_UIEventLobby_Idle1-1 = "흐응, 자꾸 건드리고 말이야…"
20040-CVGroup_UIEventLobby_Idle1-2 = "뭐 원하는 게 있어?"
20040-CVGroup_UIEventLobby_Idle2-1 = "선생은, 무엇을 원하실까?"
20040-CVGroup_UIEventLobby_Idle3-1 = "후훗, 선생… 내게 최면을 걸어봐."
20040-CVGroup_UIEventLobby_Idle3-2 = "물론 내게는 듣지 않는…"
20040-CVGroup_UIEventLobby_Idle3-3 = "응? 괜찮다고?"
20040-CVGroup_UIEventLobby_Idle3-4 = "후훗, 그런 말 말고… 자아."
20040-CVGroup_UIEventLobby_Idle4-1 = "선생, 그렇게 멍하니 서 있다가는 마코토 쨩의 음모에 휘말리고 말 걸?"
20040-CVGroup_UIEventLobby_Idle4-2 = "자, 이쪽으로 와."

[translation]
20040-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20040-CVGroup_CharacterGet_Idle1-1 = "Now, did I keep you waiting, Sensei? I'm Kyougoku Satsuki, the Pandemonium Society's Intelligence Committee Director. Heehee, I look forward to working with you."
20040-CVGroup_Cafe_Idle1-1 = "Let's gather intelligence on Schale."
20040-CVGroup_Cafe_Idle2-1 = "Mmm, like this? Not bad."
20040-CVGroup_Cafe_Idle3-1 = "Force them to infiltrate here, then..."
20040-CVGroup_Cafe_Idle4-1 = "I wonder how other academies carry out interrogations..."
20040-CVGroup_Cafe_Idle5-1 = "Is there anyone around...I can practice hypnotizing?"
20040-CVGroup_WeaponGet_Idle1-1 = "Oh my, you're well-prepared. Heehee, that's helpful, Sensei."
20040-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei. Take your time looking around."
20040-CVGroup_UIEventLobby_Enter2-1 = "The Pandemonium Society worked very hard on this event..."
20040-CVGroup_UIEventLobby_Enter2-2 = "...so I'm sure you'll find it to your liking."
20040-CVGroup_UIEventLobby_Enter3-1 = "Oh my. I suppose things aren't working out."
20040-CVGroup_UIEventLobby_Enter3-2 = "Well, Makoto can most likely solve it somehow, yes?"
20040-CVGroup_UIEventLobby_Enter4-1 = "I wasn't expecting your assistance here."
20040-CVGroup_UIEventLobby_Enter4-2 = "Heehee, I'll leave it to you then, Sensei."
20040-CVGroup_UIEventLobby_Enter5-1 = "And that's all for the party."
20040-CVGroup_UIEventLobby_Enter5-2 = "Just as I said, it worked out somehow, didn't it?"
20040-CVGroup_UIEventLobby_Idle1-1 = "Hm? You keep pestering me..."
20040-CVGroup_UIEventLobby_Idle1-2 = "Is there something you want?"
20040-CVGroup_UIEventLobby_Idle2-1 = "Sensei, what is it you would like?"
20040-CVGroup_UIEventLobby_Idle3-1 = "Heehee, Sensei... Try to hypnotize me."
20040-CVGroup_UIEventLobby_Idle3-2 = "Of course, it won't work on..."
20040-CVGroup_UIEventLobby_Idle3-3 = "Huh? It's okay?"
20040-CVGroup_UIEventLobby_Idle3-4 = "Heehee, don't say that... Here."
20040-CVGroup_UIEventLobby_Idle4-1 = "Sensei, if you stand idly by, you might get involved in Makoto's plot."
20040-CVGroup_UIEventLobby_Idle4-2 = "Come this way."

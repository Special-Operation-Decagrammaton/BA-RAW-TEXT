[translation]
20040-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
20040-CVGroup_CharacterGet_Idle1-1 = "เอ้า~ รออยู่ใช่มั้ย ครู?\nหัวหน้าฝ่ายข่าวกรองของแพนเดโมเนียม โซไซตี้\nเคียวโงคุ ซัตสึกิ ฮุฮุฮุ ขอฝากตัวด้วยนะ"
20040-CVGroup_Cafe_Idle1-1 = "ลองเก็บข้อมูลจากชาเล่ต์ดีมั้ยนะ?"
20040-CVGroup_Cafe_Idle2-1 = "อื้ม~ ความรู้สึกแบบนี้? ก็ไม่เลวแฮะ"
20040-CVGroup_Cafe_Idle3-1 = "ให้เด็กพวกนั้นแทรกซึมเข้ามาที่นี่..."
20040-CVGroup_Cafe_Idle4-1 = "อยากรู้เคล็ดลับการสอบสวนของโรงเรียนอื่นจัง..."
20040-CVGroup_Cafe_Idle5-1 = "ไม่มีใครที่จะมาเป็นคู่ฝึกซ้อม... วิชาสะกดจิตเลยหรือไงนะ?"
20040-CVGroup_WeaponGet_Idle1-1 = "อุ๊ยตาย เตรียมไว้อย่างดีเลยนะ\nฮุฮุ ช่วยได้เยอะเลยละครู"
20040-CVGroup_UIEventLobby_Enter1-1 = "เชิญเลย ครู เลือกดูได้ตามสบายเลยนะ~"
20040-CVGroup_UIEventLobby_Enter2-1 = "นี่เป็นงานอีเวนต์ที่แพนเดโมเนียม โซไซตี้ของเราตั้งใจเตรียมอย่างเต็มที่"
20040-CVGroup_UIEventLobby_Enter2-2 = "ครูจะต้องถูกใจแน่นอนเลยละ"
20040-CVGroup_UIEventLobby_Enter3-1 = "โอ๊ะ ดูเหมือนจะไม่ค่อยได้ผลสินะ"
20040-CVGroup_UIEventLobby_Enter3-2 = "เอาเถอะ เดี๋ยวมาโคโตะจังก็คงหาทางทำอะไรสักอย่างละมั้ง?"
20040-CVGroup_UIEventLobby_Enter4-1 = "ฉันคิดว่าจะได้รับความช่วยเหลือจากครูที่นี่ซะอีก"
20040-CVGroup_UIEventLobby_Enter4-2 = "ฮุฮุ ขอฝากด้วยนะ ครู"
20040-CVGroup_UIEventLobby_Enter5-1 = "ปาร์ตี้... จบแล้วละ"
20040-CVGroup_UIEventLobby_Enter5-2 = "เป็นยังไง? มันเป็นไปตามที่ฉันบอกเลยใช่มั้ยล่ะ?"
20040-CVGroup_UIEventLobby_Idle1-1 = "หืม บอกว่าอย่ามาสะกิดกันบ่อยไงล่ะ..."
20040-CVGroup_UIEventLobby_Idle1-2 = "มีอะไรที่อยากได้รึไง?"
20040-CVGroup_UIEventLobby_Idle2-1 = "ครู อยากได้อะไรหรือไง?"
20040-CVGroup_UIEventLobby_Idle3-1 = "ฮุฮุ ครู... ลองสะกดจิตฉันดูสิ"
20040-CVGroup_UIEventLobby_Idle3-2 = "แน่นอนว่ามันไม่ได้ผลกับฉัน..."
20040-CVGroup_UIEventLobby_Idle3-3 = "หืม? ไม่เป็นไรงั้นเหรอ?"
20040-CVGroup_UIEventLobby_Idle3-4 = "ฮุฮุ อย่าพูดแบบนั้นสิ เอาเลยๆ"
20040-CVGroup_UIEventLobby_Idle4-1 = "ครู ถ้ามัวแต่ยืนเหม่ออยู่แบบนั้น\nเดี๋ยวก็โดนดึงเข้าไปวุ่นวายกับแผนการของมาโคโตะจังหรอก?"
20040-CVGroup_UIEventLobby_Idle4-2 = "เอาละ มาทางนี้สิ"

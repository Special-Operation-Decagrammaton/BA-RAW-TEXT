[translation]
10100-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10100-CVGroup_CharacterGet_Idle1-1 = "아비도스의 스나오오카미 시로코. 응, 다시 한번 잘 부탁해. 선생님."
10100-CVGroup_Cafe_Idle1-1 = "이곳은…… 나쁘지 않네……."
10100-CVGroup_Cafe_Idle2-1 = "평화롭네, 여기는."
10100-CVGroup_Cafe_Idle3-1 = "응, 온 김에 휴식을 취해둬야겠네."
10100-CVGroup_Cafe_Idle4-1 = "이건…… 뭐지? 뜯어봐도 되나……?"
10100-CVGroup_Cafe_Idle5-1 = "(이 가구는, 선생님 취향일까…….)"
10100-CVGroup_WeaponGet_Idle1-1 = "나에게, 이렇게까지 해주는 거구나.\n아, 아니, 불만이 아니라, 조금 놀라서……."

[translation]
10076-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10076-CVGroup_CharacterGet_Idle1-1 = "ถ้าต้องการคำอธิบายและเสียงเชียร์ละก็ ไว้ใจฉันได้เลยค่ะ!"
10076-CVGroup_Cafe_Idle1-1 = "โอ้ คนเยอะแบบนี้เลยเหรอเนี่ย!"
10076-CVGroup_Cafe_Idle2-1 = "ถ้าเป็นที่นี่ละก็อาจจัดงานบรรยายได้เลยนะ!"
10076-CVGroup_Cafe_Idle3-1 = "สไตล์การตกแต่งของคุณครูเนี่ย... น่าสนใจดีจังเลยค่ะ!"
10076-CVGroup_Cafe_Idle4-1 = "เอ๋... นั่นมัน...!"
10076-CVGroup_Cafe_Idle5-1 = "ไหนๆ ก็เป็นแบบนี้แล้ว ไปหาแท่นยืนเชียร์กันดีมั้ยคะ?"
10076-CVGroup_WeaponGet_Idle1-1 = "ฉันอธิบายเรื่องปืนนี้ให้ฟังมั้ยคะ?\n...ฮิฮิ ล้อเล่นค่ะ คุณครูรู้อยู่แล้วนี่คะ\n...ถ้าเรื่องแบบนี้เพิ่มขึ้นเรื่อยๆ ละก็ สักวันหนึ่ง..."
10076-CVGroup_UIEventLobby_Enter1-1 = "ถ้าเรื่องการเชียร์และการอธิบายละก็ ไว้ใจฉันได้เลยค่ะ!"
10076-CVGroup_UIEventLobby_Enter2-1 = "ฮูเร่~ ฮูเร่! คุณครู!\nพยายามเข้า... สู้เค้านะ คุณครู!"
10076-CVGroup_UIEventLobby_Enter2-2 = "เป็นไงคะ? มีแรงฮึดขึ้นบ้างมั้ยคะ?"
10076-CVGroup_UIEventLobby_Enter3-1 = "รู้สึกถึงไฟที่ลุกโชนในตัวเลยค่ะ!\nสู้ๆ นะคะ!"
10076-CVGroup_UIEventLobby_Enter4-1 = "ใกล้แล้วค่ะ!\nฉันจะเชียร์จนถึงที่สุดเลยค่ะ!"
10076-CVGroup_UIEventLobby_Enter5-1 = "ฮู่ว! เหนื่อยจังเลยค่ะ!"
10076-CVGroup_UIEventLobby_Enter5-2 = "แต่ว่าก็สดชื่นสุดๆ ไปเลยค่ะ!"
10076-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีอะไรเหรอคะ?"
10076-CVGroup_UIEventLobby_Idle2-1 = "สงสัยเรื่องอะไรอยู่หรือเปล่าคะ?"
10076-CVGroup_UIEventLobby_Idle2-2 = "ถ้าอย่างนั้น ฉันก็จะ...!"
10076-CVGroup_UIEventLobby_Idle3-1 = "ถะ...ถะ...ถ้าคุณครูมาแตะกันแบบนั้น..."
10076-CVGroup_UIEventLobby_Idle3-2 = "มันน่าเขินอยู่นิดหน่อยนะคะ..."
10076-CVGroup_UIEventLobby_Idle4-1 = "เฮือก!? ฮู่ว...\nคะ... คุณครูเองเหรอคะ?"

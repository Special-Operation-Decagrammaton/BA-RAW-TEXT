[translation]
10076-CVGroup_UITitle_Idle1-1 = "블루~! 아카이브!"
10076-CVGroup_CharacterGet_Idle1-1 = "해설과 응원이 필요하다면, 제게 맡겨주세요!"
10076-CVGroup_Cafe_Idle1-1 = "오! 이렇게 많은 사람들이!"
10076-CVGroup_Cafe_Idle2-1 = "여기라면 강연도 가능할지도!"
10076-CVGroup_Cafe_Idle3-1 = "선생님의 인테리어…… 흥미롭군요!"
10076-CVGroup_Cafe_Idle4-1 = "어라, 저건……!"
10076-CVGroup_Cafe_Idle5-1 = "이왕이니 응원할 단상을 찾아볼까요?"
10076-CVGroup_WeaponGet_Idle1-1 = "이 총에 대해 설명해드리죠…!\n...후후, 농담입니다. 선생님은 이미 아시니까요.\n……이런 게 점점 늘어나면, 언젠가는…"
10076-CVGroup_UIEventLobby_Enter1-1 = "응원과 설명이라면 맡겨주세요!"
10076-CVGroup_UIEventLobby_Enter2-1 = "플레-이 플레-이! 선생님! 힘내라 힘내라! 선생님!"
10076-CVGroup_UIEventLobby_Enter2-2 = "어때요? 힘이 나셨나요?"
10076-CVGroup_UIEventLobby_Enter3-1 = "달아오르는 느낌이네요! 파이팅입니다!"
10076-CVGroup_UIEventLobby_Enter4-1 = "거의 다 왔습니다! 마지막까지 응원할게요!"
10076-CVGroup_UIEventLobby_Enter5-1 = "후아-! 힘들었네요!"
10076-CVGroup_UIEventLobby_Enter5-2 = "하지만 개운합니다!"
10076-CVGroup_UIEventLobby_Idle1-1 = "음? 무슨 일이신가요?"
10076-CVGroup_UIEventLobby_Idle2-1 = "뭔가 궁금한 거라도 있으신가요?"
10076-CVGroup_UIEventLobby_Idle2-2 = "그렇다면, 제가…!"
10076-CVGroup_UIEventLobby_Idle3-1 = "그, 그렇게 자꾸 찌르시면…"
10076-CVGroup_UIEventLobby_Idle3-2 = "조금 부끄러운데요…."
10076-CVGroup_UIEventLobby_Idle4-1 = "히익!? 아. 서, 선생님이셨군요…?"

[translation]
10076-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
10076-CVGroup_CharacterGet_Idle1-1 = "Whether you need keen scientific insight or a spirited cheer, just leave it to me!"
10076-CVGroup_Cafe_Idle1-1 = "Oh! There are so many people here!"
10076-CVGroup_Cafe_Idle2-1 = "I could even hold a lecture here!"
10076-CVGroup_Cafe_Idle3-1 = "Sensei, your decorating style is...fascinating!"
10076-CVGroup_Cafe_Idle4-1 = "Oh, what's that...?"
10076-CVGroup_Cafe_Idle5-1 = "While I'm at it, I might as well find a stage to cheer on!"
10076-CVGroup_WeaponGet_Idle1-1 = "Allow me to explain how this gun works... Just kidding! Sensei, you already know... When you collect enough of this knowledge, one day..."
10076-CVGroup_UIEventLobby_Enter1-1 = "Leave the cheering—and explaining—to me!"
10076-CVGroup_UIEventLobby_Enter2-1 = "Play, play, run and play! You can do it, go Sensei!"
10076-CVGroup_UIEventLobby_Enter2-2 = "How was that? Did it give you a burst of energy?"
10076-CVGroup_UIEventLobby_Enter3-1 = "Things are heating up! You can do this!"
10076-CVGroup_UIEventLobby_Enter4-1 = "Almost there! I'll cheer you on until the very end!"
10076-CVGroup_UIEventLobby_Enter5-1 = "Ugh! I'm exhausted!"
10076-CVGroup_UIEventLobby_Enter5-2 = "But I also feel...refreshed!"
10076-CVGroup_UIEventLobby_Idle1-1 = "Oh? What is it?"
10076-CVGroup_UIEventLobby_Idle2-1 = "Do you have a question for me?"
10076-CVGroup_UIEventLobby_Idle2-2 = "Then, I...!"
10076-CVGroup_UIEventLobby_Idle3-1 = "I-If you keep poking me like that..."
10076-CVGroup_UIEventLobby_Idle3-2 = "This is a bit embarrassing..."
10076-CVGroup_UIEventLobby_Idle4-1 = "Eek! W-Was that you, Sensei...?"

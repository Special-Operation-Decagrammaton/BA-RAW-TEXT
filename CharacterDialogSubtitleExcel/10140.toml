[translation]
10140-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10140-CVGroup_CharacterGet_Idle1-1 = "SRT 특수학원, FOX 소대의 포인트맨\n타카쿠라 쿠루미야. 선생님의 호위는 내게 맡겨줘.\n전력으로 지킬 테니까. 그럼…… 잘 부탁해!"
10140-CVGroup_Cafe_Idle1-1 = "(저 총기 악세서리,\n귀엽네……\n어디서 산 걸까?)"
10140-CVGroup_Cafe_Idle2-1 = "(어쩐지…… 여기선 내가\n제일 어른스러울지도!)"
10140-CVGroup_Cafe_Idle3-1 = "깨끗이 닦인 창문이\n반짝거리는 게…\n마치 내 방패 같네."
10140-CVGroup_Cafe_Idle4-1 = "으윽, 근육통이……\n어제 훈련을\n너무 격하게 했나?"
10140-CVGroup_Cafe_Idle5-1 = "당당하게……\n가슴을 펴고……\n나는 베테랑이니까!"
10140-CVGroup_WeaponGet_Idle1-1 = "FOX 45식 기관단총 수령 완료.\n조금 더 화력이 강했으면 좋겠지만……\n뭐, 내 역할은 소대를 지키는 거지\n적을 쳐부수는 게 아니니까."
10140-CVGroup_UIEventLobby_Enter1-1 = "<로어 추적 작전>\n드디어 시작인가……"
10140-CVGroup_UIEventLobby_Enter2-1 = "SRT의 이름에\n부끄럽지 않도록,\n전력을 다해주겠어!"
10140-CVGroup_UIEventLobby_Idle1-1 = "더 이상의 피해자가\n늘어나기 전에……"
10140-CVGroup_UIEventLobby_Idle1-2 = "서두르자, 선생님."
10140-CVGroup_UIEventLobby_Idle2-1 = "작전 중에 먹는\n유부초밥……\n이게 또\n별미란 말이지……"
10140-CVGroup_UIEventLobby_Idle2-2 = "무, 물론 이것 때문에\n작전을 기대하는 건\n아니지만!"
10140-CVGroup_UIEventLobby_Idle3-1 = "귀신이든 사람이든……\n제멋대로 구는 건\n용서할 수 없어."
10140-CVGroup_UIEventLobby_Idle4-1 = "잠깐!\n갑자기 남의 배는\n왜 찔러 보는 거야?!"
10140-CVGroup_ClueSearch_Login_1-1 = "어쩌지……"
10140-CVGroup_ClueSearch_Login_1-2 = "아, 선생님.\n마침 잘 왔어."
10140-CVGroup_ClueSearch_Login_1-3 = "수집한 단서를\n정리하는 중이었는데,\n좀 도와줄래?"
10140-CVGroup_ClueSearch_Login_2-1 = "왔구나, 선생님.\n바로 추리를\n시작하자고!"
10140-CVGroup_ClueSearch_1-1 = "이 단서로\n추론할 수 있는\n진실은……"
10140-CVGroup_ClueSearch_2-1 = "앗, 만지지 마!\n보기 쉽게\n정리해두었는데!"
10140-CVGroup_ClueSearch_Find_1-1 = "이 자료, 어디에서\n본 기억이 있는데……"
10140-CVGroup_ClueSearch_Registration_1-1 = "대단해!\n완벽한 추리였어!"
10140-CVGroup_ClueSearch_Completion_1-1 = "좋아!\n이것으로 증명 완료!"

[translation]
10078-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！！哈～哈哈哈哈！"
10078-CVGroup_CharacterGet_Idle1-1 = "哈～哈哈哈！哪裡有溫泉我們就在哪！\n不，就算沒有溫泉我們也在！\n來，爆破準備已經就緒囉！"
10078-CVGroup_Cafe_Idle1-1 = "喔？\n這裡還挺……？"
10078-CVGroup_Cafe_Idle2-1 = "如果在這裡\n挖溫泉……"
10078-CVGroup_Cafe_Idle3-1 = "……唉呦，真危險。\n有一群麻煩的傢伙在呢。"
10078-CVGroup_Cafe_Idle4-1 = "在這裡也得\n躲躲藏藏的才行嗎？"
10078-CVGroup_Cafe_Idle5-1 = "唔呣……真閒……\n來唸點書吧。"
10078-CVGroup_WeaponGet_Idle1-1 = "老師……真的可以嗎？\n繼續跟我來往，可是很費勁的哦？已經忠告過你囉？\n要是有什麼萬一我可不管哦！哈～哈哈哈哈！"
10078-CVGroup_UIEventLobby_Enter1-1 = "哈～哈哈哈哈！\n又見面了啊，老師！"
10078-CVGroup_UIEventLobby_Enter2-1 = "老師！這邊這邊！\n等你很久囉～！"
10078-CVGroup_UIEventLobby_Enter3-1 = "正好到了要忙起來的時候了啊？"
10078-CVGroup_UIEventLobby_Enter3-2 = "我看，就讓我來幫點忙吧。"
10078-CVGroup_UIEventLobby_Enter4-1 = "來吧，工作就快完成了！"
10078-CVGroup_UIEventLobby_Enter4-2 = "沒時間悠哉了！我們走吧！"
10078-CVGroup_UIEventLobby_Enter5-1 = "辛苦了，老師。\n最後再大致瀏覽一下吧。"
10078-CVGroup_UIEventLobby_Idle1-1 = "嗯？有什麼事嗎？"
10078-CVGroup_UIEventLobby_Idle2-1 = "如果以為我不會反擊就為所欲為……\n要做好覺悟哦！"
10078-CVGroup_UIEventLobby_Idle3-1 = "那是在催我嗎？"
10078-CVGroup_UIEventLobby_Idle3-2 = "……之後會好～好負起責任的吧？"
10078-CVGroup_UIEventLobby_Idle4-1 = "哈～哈哈哈哈！\n別搔我癢啦！很癢耶！"
10078-CVGroup_UIEventShop_Enter1-1 = "那麼，要找什麼呢？"
10078-CVGroup_UIEventShop_Enter2-1 = "來！這裡什麼都有哦！\n除了沒有的東西之外！哈～哈哈哈！"
10078-CVGroup_UIEventShop_Enter3-1 = "店馬上就要打烊了！\n有多少就拿多少吧～！"
10078-CVGroup_UIEventShop_Idle1-1 = "嗯？怎麼了？"
10078-CVGroup_UIEventShop_Idle2-1 = "一不留神就會賣光的！"
10078-CVGroup_UIEventShop_Buy1-1 = "嗯，果然選了那個。\n老師很有眼光呢。"
10078-CVGroup_UIEventShop_Buy2-1 = "太棒了！"
10078-CVGroup_UIEventShop_Buy3-1 = "原來如此！這個也不錯呢！"
10078-CVGroup_UIEventShop_Buy4-1 = "原來是想要那個啊！"

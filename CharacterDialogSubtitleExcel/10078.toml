[translation]
10078-CVGroup_UITitle_Idle1-1 = "Blue Archive~!! วะฮะฮะฮ่า!"
10078-CVGroup_CharacterGet_Idle1-1 = "วะ~ ฮะฮะฮ่า! เพราะที่นั่นมีออนเซ็น ก็เลยมีพวกเราไง!\nไม่สิ ต่อให้ไม่มีออนเซ็นก็มีพวกเรา!\nมาเลย ฉันเตรียมพร้อมระเบิดทุกเวลา!"
10078-CVGroup_Cafe_Idle1-1 = "โอ้ว? ถ้าเป็นที่นี่ละก็...?"
10078-CVGroup_Cafe_Idle2-1 = "ถ้าขุดบ่อออนเซ็นตรงนี้..."
10078-CVGroup_Cafe_Idle3-1 = "...โอ๊ะ อันตรายจริงๆ\nมีพวกตัวป่วนอยู่ที่นี่เยอะเลย"
10078-CVGroup_Cafe_Idle4-1 = "เวลาอยู่ที่นี่... ก็ต้องซ่อนตัวด้วยงั้นเหรอ"
10078-CVGroup_Cafe_Idle5-1 = "อืม... เบื่อจังเลย...\nอ่านหนังสือหน่อยดีมั้ยนะ?"
10078-CVGroup_WeaponGet_Idle1-1 = "คุณครู... ไม่เป็นไรจริงๆ เหรอ?\nมาอยู่กับฉัน มันค่อนข้างลำบากเลยนะ เตือนแล้วนะ\nต่อให้เกิดอะไรฉันก็ไม่รู้ด้วยหรอกนะ! วะฮะฮะฮะฮ่า!"
10078-CVGroup_UIEventLobby_Enter1-1 = "วะฮ่าฮ่าฮ่า! ได้เจอกันอีกแล้วนะคุณครู!"
10078-CVGroup_UIEventLobby_Enter2-1 = "คุณครู! ทางนี้ๆ!\nฉันกำลังรออยู่เลยนะ~"
10078-CVGroup_UIEventLobby_Enter3-1 = "ตอนนี้~ กำลังยุ่งเลยใช่มั้ย?"
10078-CVGroup_UIEventLobby_Enter3-2 = "ไหนดูซิ เดี๋ยวฉันช่วยนะ"
10078-CVGroup_UIEventLobby_Enter4-1 = "เอาละ~ ใกล้จะถึงเวลาปิดงานแล้ว!"
10078-CVGroup_UIEventLobby_Enter4-2 = "เราไม่มีเวลามาชักช้ากันอยู่นะ!\nไปกันเถอะ"
10078-CVGroup_UIEventLobby_Enter5-1 = "เหนื่อยมากเลยนะคุณครู\nเรามาตรวจตราดูเป็นครั้งสุดท้ายมั้ย?"
10078-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีอะไรจะบอกเหรอ?"
10078-CVGroup_UIEventLobby_Idle2-1 = "คิดว่าฉันจะไม่ตอบโต้\nแล้วทำอะไรตามใจงั้นเหรอ\nเตรียมตัวโดนไว้เลยนะ!"
10078-CVGroup_UIEventLobby_Idle3-1 = "จะรบเร้ากันงั้นเหรอ?"
10078-CVGroup_UIEventLobby_Idle3-2 = "...ต่อไปจะรับผิดชอบไหว~ ใช่มั้ย?"
10078-CVGroup_UIEventLobby_Idle4-1 = "วะฮะฮะฮะฮ่า!\nอย่ามาจั๊กจี้กันสิ! จั๊กจี้นะ!"
10078-CVGroup_UIEventShop_Enter1-1 = "อืม จะหาอะไรน่ะ?"
10078-CVGroup_UIEventShop_Enter2-1 = "เอาละ! ตรงนี้มีทุกอย่างเลย!\nถ้าไม่นับของที่ไม่มีน่ะนะ! วะฮะฮะฮ่า!"
10078-CVGroup_UIEventShop_Enter3-1 = "ใกล้จะปิดร้านแล้วนะ!\nเหมาไปให้หมดเลย~!"
10078-CVGroup_UIEventShop_Idle1-1 = "หืม? เป็นอะไรเหรอ?"
10078-CVGroup_UIEventShop_Idle2-1 = "ถ้าวอกแวกละก็ เดี๋ยวของจะขายหมดซะก่อนนะ!"
10078-CVGroup_UIEventShop_Buy1-1 = "อืม เอาชิ้นนั้นไปนี่เอง\nคุณครูตาถึงอยู่นะเนี่ย"
10078-CVGroup_UIEventShop_Buy2-1 = "ยอดเยี่ยมเลย!"
10078-CVGroup_UIEventShop_Buy3-1 = "ชิ้นนั้นก็ไม่เลวเลยนะ!"
10078-CVGroup_UIEventShop_Buy4-1 = "อยากได้ชิ้นนั้นเองสินะ!"

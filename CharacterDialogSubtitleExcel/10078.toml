[translation]
10078-CVGroup_UITitle_Idle1-1 = "Blue Archive!! Wahahaha!"
10078-CVGroup_CharacterGet_Idle1-1 = "Wahaha! Wherever there's a hot spring, so are we! And wherever there's no hot spring, we're there too! The explosives are primed for detonation!"
10078-CVGroup_Cafe_Idle1-1 = "Oh? This is...?"
10078-CVGroup_Cafe_Idle2-1 = "Right here. If we make a hot spring..."
10078-CVGroup_Cafe_Idle3-1 = "...Mm, too dangerous. Too many troublemakers here."
10078-CVGroup_Cafe_Idle4-1 = "Even here...do I need to hide...?"
10078-CVGroup_Cafe_Idle5-1 = "Mm... I'm bored... I guess I could study."
10078-CVGroup_WeaponGet_Idle1-1 = "Sensei... Are you sure you're okay with this? Sticking with me won't be easy. You've been warned. Whatever happens next is on you, okay? Wahaha!"
10078-CVGroup_UIEventLobby_Enter1-1 = "Wahaha! We meet again, Sensei!"
10078-CVGroup_UIEventLobby_Enter2-1 = "Sensei! Over here! I've been waiting for you, you know?"
10078-CVGroup_UIEventLobby_Enter3-1 = "You're...busy right about now, right?"
10078-CVGroup_UIEventLobby_Enter3-2 = "Well then, why don't I help you out?"
10078-CVGroup_UIEventLobby_Enter4-1 = "Now! The end of the work day is almost here!"
10078-CVGroup_UIEventLobby_Enter4-2 = "There's no time to kick back and relax! Let's go!"
10078-CVGroup_UIEventLobby_Enter5-1 = "Good work, Sensei. Let's go over it one more time!"
10078-CVGroup_UIEventLobby_Idle1-1 = "Hm? Do you have something to say?"
10078-CVGroup_UIEventLobby_Idle2-1 = "You think you can do whatever you want and I won't retaliate...? Just you wait!"
10078-CVGroup_UIEventLobby_Idle3-1 = "Are you egging me on?"
10078-CVGroup_UIEventLobby_Idle3-2 = "...Are you sure you can handle the consequences of this later on?"
10078-CVGroup_UIEventLobby_Idle4-1 = "Wahaha! Don't tickle me! I'm too ticklish!"
10078-CVGroup_UIEventShop_Enter1-1 = "Now, what do you need?"
10078-CVGroup_UIEventShop_Enter2-1 = "Ah! We've got everything here! Everything except for what we don't! Wahaha!"
10078-CVGroup_UIEventShop_Enter3-1 = "The store's gonna close soon! Grab as much as you can!"
10078-CVGroup_UIEventShop_Idle1-1 = "Huh? What's wrong?"
10078-CVGroup_UIEventShop_Idle2-1 = "Don't get distracted or they'll sell out!"
10078-CVGroup_UIEventShop_Buy1-1 = "Hm, I see. You have a good eye, Sensei."
10078-CVGroup_UIEventShop_Buy2-1 = "Excellent!"
10078-CVGroup_UIEventShop_Buy3-1 = "As expected! That's not bad at all!"
10078-CVGroup_UIEventShop_Buy4-1 = "You wanted that, did you?"

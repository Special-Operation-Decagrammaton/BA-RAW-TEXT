[translation]
20046-CVGroup_UITitle_Idle1-1 = "อะฮ่า? Blue Archive~"
20046-CVGroup_CharacterGet_Idle1-1 = "เอาละๆ~ จงมาฟังและดูให้เต็มตา~\nอามาจิ นิยะ หัวหน้าชมรมหยินหยาง\nปรากฏตัวแล้ว~ อะฮะฮ่า!"
20046-CVGroup_Cafe_Idle1-1 = "อะฮ่า~ เป็นที่ที่เหมาะกับการโดดงาน~\nไม่สิ เหมาะกับการทำงานเลยค่ะ~"
20046-CVGroup_Cafe_Idle2-1 = "โฮ่ โฮ่~ คุณครูมีรสนิยมแบบนี้เองสินะ~\nได้เรียนรู้สิ่งใหม่เลยนะคะเนี่ย~"
20046-CVGroup_Cafe_Idle3-1 = "เหลือเชื่อจริงๆ เลย!\nเป็นภาพที่งดงามจริงๆ เลยค่ะ! อะฮะฮ่า!"
20046-CVGroup_Cafe_Idle4-1 = "หืม? คาโฮะนี่ขี้สงสัยจัง\nก็โกหกไปแล้วนี่นาว่าตั้งใจทำงานอยู่~ อะฮะฮ่า~"
20046-CVGroup_Cafe_Idle5-1 = "อันนี้คาโฮะน่าจะชอบ\nส่วนอันนั้นชิเซะจังน่าจะชอบนะ..."
20046-CVGroup_WeaponGet_Idle1-1 = "ฉันก็ขอบคุณอยู่หรอกค่ะ... แต่ฉันก็กลัวนิดหน่อย~\nเพราะไม่รู้ว่าคุณครูหวังอะไรจากเด็กสาวคนนี้อีกค่ะ\nแต่ถึงอย่างนั้นฉันก็ทรยศต่อความคาดหวังของคุณครูไม่ได้...\nอะฮ่า~ เข้าตาจนจนได้สินะคะ~"

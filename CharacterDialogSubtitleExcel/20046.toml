[translation]
20046-CVGroup_UITitle_Idle1-1 = "냐앗? 블루 아카이브~"
20046-CVGroup_CharacterGet_Idle1-1 = "자~ 자~ 천하 사람 모두 듣고 보아라~\n음양부 부장, 아마치 니야, 여기 납시오~ 랄까나, 냐하핫!"
20046-CVGroup_Cafe_Idle1-1 = "냐핫~ 땡땡이치기, 가 아니라~ 시간 보내기 딱 좋은 장소네요~"
20046-CVGroup_Cafe_Idle2-1 = "호오, 호오~ 선생님께서는 이런 취향이~ 공부가 됩니다, 이거~"
20046-CVGroup_Cafe_Idle3-1 = "이거 참 명물! 실로 장관이네요! 냐하핫!"
20046-CVGroup_Cafe_Idle4-1 = "응? 카호도 참 의심이 많네.\n열심히 일하고 있다, 고 거짓말해뒀는데~ 냐하하~"
20046-CVGroup_Cafe_Idle5-1 = "이건 카호가 좋아할 것 같고, 저건 치세 쨩이 좋아할 것 같고……."
20046-CVGroup_WeaponGet_Idle1-1 = "……몹시 감사히 여깁니다만, 불초 소녀에게 무엇을 더 바라고 계시는지, 솔직히 조~금 무섭네요.\n그렇다 하여도, 다른 이도 아닌 선생님께서 걸어주신 기대를 배반할 수도 없는 노릇이고……\n~냐핫~ 외통수네요~"

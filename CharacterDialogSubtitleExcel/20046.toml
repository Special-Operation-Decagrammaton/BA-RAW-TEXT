[translation]
20046-CVGroup_UITitle_Idle1-1 = "喵哈？蔚藍檔案～"
20046-CVGroup_CharacterGet_Idle1-1 = "來～來～各位！請睜大眼睛看清楚了♪\n百鬼夜行聯合學園．陰陽部部長，天地仁耶登～場～！\n……開玩笑的啦。喵哈哈！"
20046-CVGroup_Cafe_Idle1-1 = "喵哈～\n……稍微喘口氣。\n嗯哼，我可沒在偷懶唷～？"
20046-CVGroup_Cafe_Idle2-1 = "老師有這種興趣啊……呼呣呼呣。"
20046-CVGroup_Cafe_Idle3-1 = "真是令人陶醉的景色呢♪\n喵哈哈！"
20046-CVGroup_Cafe_Idle4-1 = "佳穗就是愛操心♪\n我明明有好～好努力工作的說……\n雖然是騙人的就是了♪\n喵哈哈！"
20046-CVGroup_Cafe_Idle5-1 = "這個是佳穗……那個則是會讓知世醬開心的吧……"
20046-CVGroup_WeaponGet_Idle1-1 = "……您的心意我很感激。不過坦白說，您究竟對我有何期待呢？\n嗯哼哼……不過也不能辜負老師的期待吧？\n實在讓人困擾呢……真的♪"

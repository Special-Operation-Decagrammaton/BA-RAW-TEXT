[translation]
20046-CVGroup_UITitle_Idle1-1 = "Nyah? Blue Archive!"
20046-CVGroup_CharacterGet_Idle1-1 = "Now, now! Everyone, gather round and listen! The Yin-Yang Club President, Amachi Niya, is here, nyahaha!"
20046-CVGroup_Cafe_Idle1-1 = "Nyahah, the ideal place to slack off—I mean, spend time at!"
20046-CVGroup_Cafe_Idle2-1 = "Oho, so this is the kind of thing you enjoy, Sensei... This has been educational!"
20046-CVGroup_Cafe_Idle3-1 = "This is incredible! What a sight! Nyahaha!"
20046-CVGroup_Cafe_Idle4-1 = "Huh? Kaho is too suspicious. I already lied to her that I'm working hard! Nyahaha!"
20046-CVGroup_Cafe_Idle5-1 = "Kaho will like this, and Chise that..."
20046-CVGroup_WeaponGet_Idle1-1 = "...I'm very grateful, but I'm just a bit apprehensive of what more you could possibly expect from me. Even so, if it's you, I suppose I have to live up to those expectations. Nyahaha, checkmate it is."

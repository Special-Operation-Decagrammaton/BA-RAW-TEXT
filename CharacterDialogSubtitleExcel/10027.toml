[translation]
10027-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10027-CVGroup_CharacterGet_Idle1-1 = "No matter my appearance, it doesn't change anything. All I have to do is complete my given task."
10027-CVGroup_Cafe_Idle1-1 = "What a well-organized place. I like it."
10027-CVGroup_Cafe_Idle2-1 = "I feel like I'm being watched..."
10027-CVGroup_Cafe_Idle3-1 = "Speaking of which, I wonder what Sensei will think of this outfit..."
10027-CVGroup_Cafe_Idle4-1 = "Hmm? Could that be...?"
10027-CVGroup_Cafe_Idle5-1 = "Nothing to do. Well, I guess it doesn't hurt to enjoy some free time once in a while."
10027-CVGroup_WeaponGet_Idle1-1 = "If I accept this, I can't make any mistakes in our next operation. I've got your back, Sensei."
10027-CVGroup_UIEventLobby_Enter1-1 = "Preparations are complete. Let's move out, Sensei."
10027-CVGroup_UIEventLobby_Enter2-1 = "Is it time for a mission?"
10027-CVGroup_UIEventLobby_Enter2-2 = "Don't worry yourself. I'm always on standby."
10027-CVGroup_UIEventLobby_Idle1-1 = "Hm? Did you have a question about the mission?"
10027-CVGroup_UIEventLobby_Idle2-1 = "The operation will commence soon. We'll discuss afterwards."
10027-CVGroup_UIEventLobby_Idle3-1 = "I'm ready whenever you are."
10027-CVGroup_UIEventLobby_Idle4-1 = "...Hm? Were you asking for me, Sensei?"
10027-CVGroup_UIEventLobby_Enter3-1 = "Danger comes when you least expect it, Sensei. Time waits for no one."
10027-CVGroup_UIEventLobby_Enter4-1 = "The end is approaching."
10027-CVGroup_UIEventLobby_Enter4-2 = "Everything is ready on my side. Leave it to me."
10027-CVGroup_UIEventLobby_Enter5-1 = "Must finish strong."
10027-CVGroup_UIEventLobby_Enter5-2 = "I will help, Sensei."
10027-CVGroup_UIEventShop_Enter1-1 = "It's the mission results."
10027-CVGroup_UIEventShop_Enter1-2 = "Shall we check the contents?"
10027-CVGroup_UIEventShop_Enter2-1 = "It requires efficiency. If only I were any good at math..."
10027-CVGroup_UIEventShop_Idle1-1 = "Wait, you want me to calculate it for you?"
10027-CVGroup_UIEventShop_Idle1-2 = "B-But I told you I'm bad at math!"
10027-CVGroup_UIEventShop_Idle2-1 = "I-I can't solve something like this..."
10027-CVGroup_UIEventShop_Buy1-1 = "A great choice."
10027-CVGroup_UIEventShop_Buy2-1 = "So that's your choice. Now I get it."
10027-CVGroup_UIEventShop_Buy3-1 = "Yes, I agree."
10027-CVGroup_UIEventShop_Buy4-1 = "I knew I could count on you."
10027-CVGroup_UIEventShop_Enter3-1 = "Look, Sensei. We're not too late."

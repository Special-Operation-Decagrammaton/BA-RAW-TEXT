[translation]
10027-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10027-CVGroup_CharacterGet_Idle1-1 = "ไม่ว่าจะแต่งตัวแบบไหนก็เหมือนกันนั่นล่ะ\nสิ่งที่ฉันต้องทำก็คือทำภารกิจให้สำเร็จ"
10027-CVGroup_Cafe_Idle1-1 = "ที่นี่จัดการเรียบร้อยดีนะ ถูกใจจัง"
10027-CVGroup_Cafe_Idle2-1 = "รู้สึกเหมือนว่า... มีคนจ้องอยู่เลย..."
10027-CVGroup_Cafe_Idle3-1 = "พอมาคิดดูแล้ว...\nชุดแบบนี้ คุณครู... จะคิดยังไงบ้างนะ"
10027-CVGroup_Cafe_Idle4-1 = "หืม...?\nที่อยู่ตรงนั้นมัน... หรือว่า...?"
10027-CVGroup_Cafe_Idle5-1 = "ว่างจังเลย\nแต่ว่าบางครั้ง... ว่างๆ แบบนี้ก็ไม่เลวเลยนะ"
10027-CVGroup_WeaponGet_Idle1-1 = "ถ้ารับของชิ้นนี้มาแล้วละก็\nตอนปฏิบัติภารกิจคราวหน้า ก็คงพลาดไม่ได้แล้วล่ะ\nอื้อ ฉันจะระวังหลังให้คุณครูเอง"
10027-CVGroup_UIEventLobby_Enter1-1 = "เตรียมพร้อมแล้วล่ะ\nออกเดินทางกันเถอะคุณครู"
10027-CVGroup_UIEventLobby_Enter2-1 = "ถึงเวลาทำภารกิจแล้วเหรอ?"
10027-CVGroup_UIEventLobby_Enter2-2 = "ฉันเตรียมพร้อมอยู่ตลอดเลยล่ะ"
10027-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีอะไรเหรอ?\nเรื่องเกี่ยวกับภารกิจเหรอ?"
10027-CVGroup_UIEventLobby_Idle2-1 = "น่าจะต้อง... ค่อยๆ ออกเดินทางกันนะ"
10027-CVGroup_UIEventLobby_Idle3-1 = "ถ้าตัดสินใจได้แล้วก็บอกนะ\nฉันเตรียมพร้อมไว้ทุกเวลาอยู่แล้ว"
10027-CVGroup_UIEventLobby_Idle4-1 = "หืม...? คุณครูเรียกฉันเหรอ?"
10027-CVGroup_UIEventLobby_Enter3-1 = "ห้ามการ์ดตกเด็ดขาดนะคุณครู\nเวลามันไม่คอยเราหรอกนะ"
10027-CVGroup_UIEventLobby_Enter4-1 = "ใกล้จะจบแล้วสินะ..."
10027-CVGroup_UIEventLobby_Enter4-2 = "ไม่มีปัญหา ทุกอย่างเตรียมพร้อมไว้แล้วล่ะ"
10027-CVGroup_UIEventLobby_Enter5-1 = "ต้องปิดฉากให้เด็ดขาดสิ"
10027-CVGroup_UIEventLobby_Enter5-2 = "ฉันจะช่วยเองนะคุณครู"
10027-CVGroup_UIEventShop_Enter1-1 = "เป็นผลของการปฏิบัติการสินะ"
10027-CVGroup_UIEventShop_Enter1-2 = "ถ้างั้นก็มาดูรายละเอียดกันเลยมั้ย"
10027-CVGroup_UIEventShop_Enter2-1 = "เป็นงานที่เน้นประสิทธิภาพสินะ\nฉันไม่ถนัดเรื่องนับเลขเลย..."
10027-CVGroup_UIEventShop_Idle1-1 = "หืม...? ให้คิดเลขให้แทนงั้นเหรอ?"
10027-CVGroup_UIEventShop_Idle1-2 = "คะ...คุณครูน่าจะรู้เรื่องที่ฉันคิดเลขไม่เก่งอยู่แล้วนี่นา...?!"
10027-CVGroup_UIEventShop_Idle2-1 = "ขอโทษนะ เรื่องคิดเลขน่ะ ฉันคงช่วยไม่ได้หรอก"
10027-CVGroup_UIEventShop_Buy1-1 = "เลือกได้ยอดเยี่ยมมาก"
10027-CVGroup_UIEventShop_Buy2-1 = "เลือกอันนั้นเหรอ\nอื้อ เลือกได้ดีเลยนะ"
10027-CVGroup_UIEventShop_Buy3-1 = "อืม ฉันก็เห็นด้วยเหมือนกัน"
10027-CVGroup_UIEventShop_Buy4-1 = "สมกับที่เป็นคุณครูจริงๆ"
10027-CVGroup_UIEventShop_Enter3-1 = "มันน่าจะยังหาได้อีกอยู่นะคุณครู"

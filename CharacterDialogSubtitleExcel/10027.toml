[translation]
10027-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10027-CVGroup_CharacterGet_Idle1-1 = "어떤 모습이어도 달라지는 건 없지.\n주어진 일을 완수한다. ……그것뿐이야."
10027-CVGroup_Cafe_Idle1-1 = "잘 정리된 곳이군. 마음에 들어."
10027-CVGroup_Cafe_Idle2-1 = "뭔가…… 시선이 느껴지는데……."
10027-CVGroup_Cafe_Idle3-1 = "그러고 보니, 이런 복장…… 선생님은 어떻게 생각할까……"
10027-CVGroup_Cafe_Idle4-1 = "응……? 저기에 있는 것은, 설마 ……?"
10027-CVGroup_Cafe_Idle5-1 = "……할 일이 없어. 하지만, 가끔은 이런 것도 나쁘지 않아."
10027-CVGroup_WeaponGet_Idle1-1 = "이런 걸 받아버리면, 다음부턴 실수할 수가 없잖아.\n……괜찮아. 선생님의 등 뒤는 내게 맡겨줘."
10027-CVGroup_UIEventLobby_Enter1-1 = "준비는 됐어. 출발하자, 선생님."
10027-CVGroup_UIEventLobby_Enter2-1 = "……슬슬 작전 시간인가?"
10027-CVGroup_UIEventLobby_Enter2-2 = "괜찮아, 언제든 갈 수 있다."
10027-CVGroup_UIEventLobby_Idle1-1 = "응? 무슨 일이지? 작전과 관련된 일인가?"
10027-CVGroup_UIEventLobby_Idle2-1 = "자, 슬슬 출발할 시간이니까…… 그런 건 나중에."
10027-CVGroup_UIEventLobby_Idle3-1 = "출발할 때 말해줘. 이쪽은 준비되었으니까."
10027-CVGroup_UIEventLobby_Idle4-1 = "……응? 선생님, 지금 불렀나?"
10027-CVGroup_UIEventLobby_Enter3-1 = "방심은 금물이다. 여하튼, 흘러간 시간은 기다려 주지 않으니까."
10027-CVGroup_UIEventLobby_Enter4-1 = "슬슬 끝이 보이기 시작했군……"
10027-CVGroup_UIEventLobby_Enter4-2 = "내 쪽은 언제든 준비되었으니, 맡겨 둬."
10027-CVGroup_UIEventLobby_Enter5-1 = "마무리는 확실하게 해야지."
10027-CVGroup_UIEventLobby_Enter5-2 = "내가 도와주겠어, 선생님."
10027-CVGroup_UIEventShop_Enter1-1 = "작전의 성과로군."
10027-CVGroup_UIEventShop_Enter1-2 = "일단 내용물을 훑어보도록 할까."
10027-CVGroup_UIEventShop_Enter2-1 = "이건 효율을 따져봐야겠어……. 숫자를 다루는 건 서투른데……."
10027-CVGroup_UIEventShop_Idle1-1 = "뭐, 대신 계산해 달라고……?"
10027-CVGroup_UIEventShop_Idle1-2 = "서, 선생님은 내가 수학을 잘 못하는 걸, 알고 있을 텐데……?!"
10027-CVGroup_UIEventShop_Idle2-1 = "미안, 계산 같은 건 좀 도와줄 수 없다……."
10027-CVGroup_UIEventShop_Buy1-1 = "훌륭한 선택이다."
10027-CVGroup_UIEventShop_Buy2-1 = "그것을 골랐군. 응. 좋다고 생각해."
10027-CVGroup_UIEventShop_Buy3-1 = "응. 나도 동의한다."
10027-CVGroup_UIEventShop_Buy4-1 = "역시 선생님이로군."
10027-CVGroup_UIEventShop_Enter3-1 = "선생님. 이거 봐. 아무래도 아직 늦진 않은 모양이다."

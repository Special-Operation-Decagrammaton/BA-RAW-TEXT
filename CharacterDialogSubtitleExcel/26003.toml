[translation]
26003-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
26003-CVGroup_CharacterGet_Idle1-1 = "다치신 분은 어디에 계신가요? 제가 바로 찾아갈게요."
26003-CVGroup_Cafe_Idle1-1 = "여기, 아프신 분은 없으신가요?"
26003-CVGroup_Cafe_Idle2-1 = "보고만 있어도 마음이 따듯해지는 공간이네요."
26003-CVGroup_Cafe_Idle3-1 = "이런 곳이라면 환자들도 빨리 완쾌할 수 있을 거예요."
26003-CVGroup_Cafe_Idle4-1 = "가끔은 이런 여유를 즐기는 것도 나쁘지 않네요."
26003-CVGroup_Cafe_Idle5-1 = "아… 예쁜 핑크빛이다…"
26003-CVGroup_WeaponGet_Idle1-1 = "주사가 아프다고 도망치시면 안 돼요!"

[translation]
26003-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26003-CVGroup_CharacterGet_Idle1-1 = "請問有受傷了的人嗎？\n我會立刻趕過去唷。"
26003-CVGroup_Cafe_Idle1-1 = "這裡，有身體不舒服的人嗎？"
26003-CVGroup_Cafe_Idle2-1 = "是個只要看著，心裡就會變溫暖的空間呢。"
26003-CVGroup_Cafe_Idle3-1 = "這種地方的話，\n我想患者們也很快就會痊癒。"
26003-CVGroup_Cafe_Idle4-1 = "偶爾像這樣，\n享受餘裕也不錯呢。"
26003-CVGroup_Cafe_Idle5-1 = "啊…漂亮的粉紅色…"
26003-CVGroup_WeaponGet_Idle1-1 = "不能因為注射會痛就逃跑唷！"

[translation]
23007-CVGroup_UITitle_Idle1-1 = "Blue Archive"
23007-CVGroup_CharacterGet_Idle1-1 = "ฉันอุราวะ ฮานาโกะค่ะ จากนี้ก็ขอฝากตัวในหลายๆ เรื่องด้วยนะคะ\nใช่แล้วค่ะ \"หลายๆ เรื่อง\" เลยค่ะ"
23007-CVGroup_Cafe_Idle1-1 = "ตายจริง ที่นี่ดูน่ารักดีนะคะ~"
23007-CVGroup_Cafe_Idle2-1 = "คุณครู ตกแต่งที่นี่เองเหรอ? สุดยอดเลยนะคะ"
23007-CVGroup_Cafe_Idle3-1 = "ถ้าหนีไปจากที่นี่ตอนนี้เลยจะทำให้ใครตกใจมั้ยนะ...?"
23007-CVGroup_Cafe_Idle4-1 = "ฮุฮุ แกล้งหยอกเล่นสักหน่อยดีมั้ยคะ?"
23007-CVGroup_Cafe_Idle5-1 = "แค่ได้มองดูที่นี่ก็สนุกแล้วละค่ะ"
23007-CVGroup_WeaponGet_Idle1-1 = "คุณครูนี่รับมือยากจริงๆ นะคะ... อยากเห็น \"ทุกๆ อย่าง\"\nของฉันเหรอคะ? ฮิฮิ.. พูดถึงทักษะของฉันต่างหากค่ะ\nคิดอะไรเหรอคะ"

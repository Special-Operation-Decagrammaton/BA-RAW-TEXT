[translation]
23007-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
23007-CVGroup_CharacterGet_Idle1-1 = "우라와 하나코입니다. 앞으로 여러가지 잘 부탁드립니다.\n……네. '여러가지'로."
23007-CVGroup_Cafe_Idle1-1 = "어머나, 귀여운 곳이네요~."
23007-CVGroup_Cafe_Idle2-1 = "이 인테리어는 선생님께서? 멋지네요."
23007-CVGroup_Cafe_Idle3-1 = "여기다가 두고 가면, 누군가 놀라려나요……?"
23007-CVGroup_Cafe_Idle4-1 = "후훗, 장난이라도 좀 쳐볼까요?"
23007-CVGroup_Cafe_Idle5-1 = "이 공간, 보는 것만으로도 즐겁네요."
23007-CVGroup_WeaponGet_Idle1-1 = "……선생님은 곤란한 분이시네요. 그렇게 제 '모든 것'이 보고 싶으신가요?\n후훗…… 실력의 이야기에요. 무슨 생각 하셨나요?"

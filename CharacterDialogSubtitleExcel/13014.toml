[translation]
13014-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！哈哈！"
13014-CVGroup_CharacterGet_Idle1-1 = "說到夏日的青春活動，非海邊莫屬了吧！\n大家，準備好了嗎？"
13014-CVGroup_Cafe_Idle1-1 = "老師會做出這樣的房間啊……"
13014-CVGroup_Cafe_Idle2-1 = "嘿～還有這種東西啊。"
13014-CVGroup_Cafe_Idle3-1 = "桔梗那傢伙……不曉得這次又在打什麼主意。"
13014-CVGroup_Cafe_Idle4-1 = "我們的調停室……\n能不能搬到這裡來啊……"
13014-CVGroup_Cafe_Idle5-1 = "果然海邊最棒了！"
13014-CVGroup_WeaponGet_Idle1-1 = "哦，哦哦……！\n和師父的青春變成了實體！\n謝謝你！我會當成一生的寶物！"
13014-CVGroup_UIEventLobby_Enter1-1 = "藍海！藍天！白雲！\n聽起來真悅耳啊！"
13014-CVGroup_UIEventLobby_Enter2-1 = "當然，會收下冠軍哦。\n老師也要幫我加油啊！"
13014-CVGroup_UIEventLobby_Enter3-1 = "剩下的時間也要全力以赴！"
13014-CVGroup_UIEventLobby_Enter4-1 = "到最後的最後都不能鬆懈！"
13014-CVGroup_UIEventLobby_Enter5-1 = "祭典雖然結束了……但青春還會持續下去！"
13014-CVGroup_UIEventLobby_Idle1-1 = "夏日限定的青春活動！\n師父，真令人期待啊！"
13014-CVGroup_UIEventLobby_Idle2-1 = "師父，想跟我一起游泳嗎？"
13014-CVGroup_UIEventLobby_Idle2-2 = "好啊，來比比看誰游得比較快吧！"
13014-CVGroup_UIEventLobby_Idle3-1 = "大意是大敵。\n打起精神來吧。"
13014-CVGroup_UIEventLobby_Idle4-1 = "師父的解說，我很期待哦！"
13014-CVGroup_UIEventTreasure_Enter1-1 = "海邊的尋寶！\n會藏著什麼樣的東西呢？"
13014-CVGroup_UIEventTreasure_Enter2-1 = "一起尋寶也很青春對吧！\n好～來試試看吧！"
13014-CVGroup_UIEventTreasure_Enter3-1 = "啊～真開心！\n還想再玩一次呢。"
13014-CVGroup_UIEventTreasure_Enter4-1 = "是段珍貴的回憶哦。\n師父，謝謝你啦。"
13014-CVGroup_UIEventTreasure_Idle1-1 = "各種寶物令人眼花撩亂啊。"
13014-CVGroup_UIEventTreasure_Idle1-2 = "嗯？問我最重要的寶物是什麼？"
13014-CVGroup_UIEventTreasure_Idle1-3 = "那，那是……"
13014-CVGroup_UIEventTreasure_Idle1-4 = "不能說！絕對會保密！"
13014-CVGroup_UIEventTreasure_Idle2-1 = "夢想中的青春，又實現了一個……"
13014-CVGroup_UIEventTreasure_Idle2-2 = "真，真的很謝謝你，師父……！"
13014-CVGroup_UIEventTreasure_FindTreasure1-1 = "喔！這不是寶物嗎！？"
13014-CVGroup_UIEventTreasure_FindTreasure2-1 = "師父！找到線索了唷！"
13014-CVGroup_UIEventTreasure_GetTreasure1-1 = "寶物到手！那麼，獎勵是……！"
13014-CVGroup_UIEventTreasure_GetTreasure2-1 = "不愧是師父！手法真漂亮！"
13014-CVGroup_UIEventTreasure_RoundRenewal1-1 = "去找下一個寶物吧！"

[translation]
13014-CVGroup_UITitle_Idle1-1 = "블루- 아카이브! 핫하!"
13014-CVGroup_CharacterGet_Idle1-1 = "여름의 청춘 활동은 역시 바다지! 모두 즐길 준비 됐어?"
13014-CVGroup_Cafe_Idle1-1 = "오오, 여기가 선생님이 준비한 공간……"
13014-CVGroup_Cafe_Idle2-1 = "헤에, 이런 것도 있구나."
13014-CVGroup_Cafe_Idle3-1 = "키쿄 녀석, 또 뭘 숨기고 있는 건지."
13014-CVGroup_Cafe_Idle4-1 = "우리 조정실을… 여기로 옮길 순 없을까…."
13014-CVGroup_Cafe_Idle5-1 = "바다는 역시 즐거워!"
13014-CVGroup_WeaponGet_Idle1-1 = "오오, 이것이 바로 스승님과의 청춘! 고마워! 평생의 보물로 삼을게!"
13014-CVGroup_UIEventLobby_Enter1-1 = "푸른 바다! 푸른 하늘! 새하얀 구름! 최고의 울림이지!"
13014-CVGroup_UIEventLobby_Enter2-1 = "후후, 우승은 우리 차지야! 선생님도 응원해 줄 거지?"
13014-CVGroup_UIEventLobby_Enter3-1 = "얼마 남지 않은 기간, 전력을 다하는 거야!"
13014-CVGroup_UIEventLobby_Enter4-1 = "마지막의 마지막까지 긴장을 늦추지 못하겠군!"
13014-CVGroup_UIEventLobby_Enter5-1 = "축제는 끝이 났지만…… 우리의 청춘은 계속될 거야!"
13014-CVGroup_UIEventLobby_Idle1-1 = "여름 한정 청춘 활동! 스승님, 기대돼!"
13014-CVGroup_UIEventLobby_Idle2-1 = "스승님, 나랑 수영하고 싶은 거야?"
13014-CVGroup_UIEventLobby_Idle2-2 = "좋아, 어느 쪽이 더 빠른지 승부다!"
13014-CVGroup_UIEventLobby_Idle3-1 = "방심은 큰 적이야. 긴장해야겠어."
13014-CVGroup_UIEventLobby_Idle4-1 = "스승님의 경기 해설, 기대하고 있을게!"
13014-CVGroup_UIEventTreasure_Enter1-1 = "스승님! 해변의 보물찾기야! 어떤 것들이 숨어 있을까?"
13014-CVGroup_UIEventTreasure_Enter2-1 = "보물찾기도 청춘 활동의 하나지! 같이 해보자!"
13014-CVGroup_UIEventTreasure_Enter3-1 = "아아, 즐거웠다. 다음에 또 했으면 좋겠어."
13014-CVGroup_UIEventTreasure_Enter4-1 = "소중한 추억이 생겼어. 스승님, 고마워."
13014-CVGroup_UIEventTreasure_Idle1-1 = "여러 가지 보물들에 눈길이 가네."
13014-CVGroup_UIEventTreasure_Idle1-2 = "응? 나에게 가장 소중한 보물이 뭐냐고?"
13014-CVGroup_UIEventTreasure_Idle1-3 = "그, 그건……"
13014-CVGroup_UIEventTreasure_Idle1-4 = "마, 말할 수 없어! 비밀! 절대 비밀!"
13014-CVGroup_UIEventTreasure_Idle2-1 = "꿈꾸던 청춘이, 또 하나 현실로……"
13014-CVGroup_UIEventTreasure_Idle2-2 = "정말 고마워. 스승님……."
13014-CVGroup_UIEventTreasure_FindTreasure1-1 = "오! 이거, 보물 아니야!?"
13014-CVGroup_UIEventTreasure_FindTreasure2-1 = "스승님! 단서를 발견했어!"
13014-CVGroup_UIEventTreasure_GetTreasure1-1 = "보물 획득! 자아 그럼 보상을……!"
13014-CVGroup_UIEventTreasure_GetTreasure2-1 = "역시 스승님! 좋은 솜씨야!"
13014-CVGroup_UIEventTreasure_RoundRenewal1-1 = "다음 보물을 찾으러 가자!"

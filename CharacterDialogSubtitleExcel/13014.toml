[translation]
13014-CVGroup_UITitle_Idle1-1 = "Blue... Archive! ฮ่าฮ่า!"
13014-CVGroup_CharacterGet_Idle1-1 = "กิจกรรมวัยรุ่นในฤดูร้อน ก็ต้องในทะเลสิ!\nทุกคนพร้อมไปสนุกหรือยัง?"
13014-CVGroup_Cafe_Idle1-1 = "โอ้ว ที่นี่คือพื้นที่ที่คุณครูเตรียมไว้งั้นเหรอ..."
13014-CVGroup_Cafe_Idle2-1 = "เอ๋? มีอะไรแบบนี้ด้วยสินะ"
13014-CVGroup_Cafe_Idle3-1 = "ยัยคิเคียวซ่อนอะไรเอาไว้อีกล่ะนั่นน่ะ"
13014-CVGroup_Cafe_Idle4-1 = "ย้ายห้องไกล่เกลี่ยของเรามาไว้ที่นี่ได้มั้ยนะ..."
13014-CVGroup_Cafe_Idle5-1 = "ทะเลมันสนุกจริงๆ ด้วย!"
13014-CVGroup_WeaponGet_Idle1-1 = "โอ้ว สิ่งนี้ละที่แสดงถึงวัยรุ่นกับท่านอาจารย์!\nขอบคุณนะ! ฉันจะรักษาไว้ชั่วชีวิตเลย!"
13014-CVGroup_UIEventLobby_Enter1-1 = "ทะเลสีฟ้า! ท้องฟ้าสีคราม! เมฆสีขาว! นี่ละยอดเยี่ยมที่สุด!"
13014-CVGroup_UIEventLobby_Enter2-1 = "ฮุฮุ ชัยชนะต้องเป็นของพวกเรา!\nท่านอาจารย์ก็จะช่วยเชียร์ใช่มั้ย?"
13014-CVGroup_UIEventLobby_Enter3-1 = "เวลาเหลือไม่มากแล้ว ฉันจะใส่ให้เต็มที่เลย!"
13014-CVGroup_UIEventLobby_Enter4-1 = "ต้องตื่นตัวอยู่เสมอจนถึงวินาทีสุดท้ายเลยละ!"
13014-CVGroup_UIEventLobby_Enter5-1 = "ถึงเทศกาลจะจบลงแล้ว...\nแต่การเป็นวัยรุ่นของเราจะยังดำเนินต่อไป!"
13014-CVGroup_UIEventLobby_Idle1-1 = "กิจกรรมวัยรุ่นในฤดูร้อน!\nฉันรอไม่ไหวแล้วละ ท่านอาจารย์!"
13014-CVGroup_UIEventLobby_Idle2-1 = "ท่านอาจารย์อยากว่ายน้ำกับฉันงั้นเหรอ?"
13014-CVGroup_UIEventLobby_Idle2-2 = "ดีละ งั้นมาแข่งกันว่าใครจะว่ายเร็วกว่ากัน!"
13014-CVGroup_UIEventLobby_Idle3-1 = "ความประมาทคือศัตรูตัวฉกาจ\nฉันต้องตื่นตัวอยู่ตลอดแล้วละ"
13014-CVGroup_UIEventLobby_Idle4-1 = "แล้วฉันจะรอฟังการบรรยายการแข่งขัน\nของท่านอาจารย์นะ"
13014-CVGroup_UIEventTreasure_Enter1-1 = "ท่านอาจารย์! เกมล่าสมบัติในชายหาด!\nจะมีอะไรซ่อนอยู่บ้างนะ?"
13014-CVGroup_UIEventTreasure_Enter2-1 = "เกมล่าสมบัติก็เป็นหนึ่งในกิจกรรมวัยรุ่นนะ!\nไปเล่นด้วยกันเถอะ!"
13014-CVGroup_UIEventTreasure_Enter3-1 = "อ่า สนุกจังเลย อยากให้มีอีกจัง"
13014-CVGroup_UIEventTreasure_Enter4-1 = "เป็นความทรงจำที่ดีเลยละ\nท่านอาจารย์ ขอบคุณนะ"
13014-CVGroup_UIEventTreasure_Idle1-1 = "เห็นสมบัติหลายอย่างเต็มไปหมดเลยแฮะ"
13014-CVGroup_UIEventTreasure_Idle1-2 = "หืม? สมบัติที่ล้ำค่าที่สุดของฉันคืออะไรน่ะเหรอ?"
13014-CVGroup_UIEventTreasure_Idle1-3 = "ระ... เรื่องนั้น..."
13014-CVGroup_UIEventTreasure_Idle1-4 = "ฉะ... ฉันบอกไม่ได้หรอก!\nความลับ! เป็นความลับสุดยอดเลย!"
13014-CVGroup_UIEventTreasure_Idle2-1 = "วัยรุ่นที่ฉันใฝ่ฝันเป็นความจริงขึ้นมาอีกอย่างแล้ว..."
13014-CVGroup_UIEventTreasure_Idle2-2 = "ขะ... ขอบคุณจริงๆ นะ ท่านอาจารย์..."
13014-CVGroup_UIEventTreasure_FindTreasure1-1 = "โอ๊ะ! นี่มัน สมบัติไม่ใช่เหรอ!?"
13014-CVGroup_UIEventTreasure_FindTreasure2-1 = "ท่านอาจารย์! ฉันเจอเบาะแสแล้ว!"
13014-CVGroup_UIEventTreasure_GetTreasure1-1 = "มีสมบัติเพียบเลย! เอาละ ไปล่ารางวัลกัน...!"
13014-CVGroup_UIEventTreasure_GetTreasure2-1 = "สมแล้วที่เป็นท่านอาจารย์! ฝีมือดีเลยละ!"
13014-CVGroup_UIEventTreasure_RoundRenewal1-1 = "ไปล่าสมบัติชิ้นต่อไปกันเถอะ!"

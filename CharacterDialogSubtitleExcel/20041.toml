[translation]
20041-CVGroup_UIMiniEventLobby_Enter1-1 = "雖然是以中途參加的形式……"
20041-CVGroup_UIMiniEventLobby_Enter1-2 = "……往後請多指教囉，老師。"
20041-CVGroup_UIMiniEventLobby_Enter2-1 = "你是個能夠嚴守時間的人呢。"
20041-CVGroup_UIMiniEventLobby_Enter2-2 = "真是合理的行動。"
20041-CVGroup_UIMiniEventLobby_Enter3-1 = "這裡就是陽葵的……"
20041-CVGroup_UIMiniEventLobby_Enter3-2 = "不，是我們的基地啊。"
20041-CVGroup_UIMiniEventLobby_Idle1-1 = "……我還是，有點缺乏實感。"
20041-CVGroup_UIMiniEventLobby_Idle1-2 = "對於能跟老師……參加同一個作戰這點。"
20041-CVGroup_UIMiniEventLobby_Idle2-1 = "……大家對待我都還挺隨興的。"
20041-CVGroup_UIMiniEventLobby_Idle2-2 = "雖然我沒有不喜歡的意思……"
20041-CVGroup_UIMiniEventLobby_Idle2-3 = "但讓我感到有點困惑也是事實。"
20041-CVGroup_UIMiniEventLobby_Idle3-1 = "在工學的範圍以外……"
20041-CVGroup_UIMiniEventLobby_Idle3-2 = "對不起，我並不是那麼了解。"
20041-CVGroup_UIMiniEventLobby_Idle4-1 = "……怎麼了嗎？\n……只是試著搭話而已？"
20041-CVGroup_UIMiniEventLobby_Idle4-2 = "那種不合理的行為，還請克制一點，老師。"
20041-CVGroup_UIMiniEventLobby_Idle4-3 = "……但我也沒說不喜歡。"
20041-CVGroup_UIMiniEventLobby_Idle5-1 = "以前，我曾認為必須掌握一切。"
20041-CVGroup_UIMiniEventLobby_Idle5-2 = "不過現在……我已經察覺一名人類能夠掌握的範疇是存在極限的。"
20041-CVGroup_UIMiniEventLobby_Idle5-3 = "……也許，是多虧了老師吧。"
20041-CVGroup_UIMiniEventShop_Enter1-1 = "我從陽葵那邊接手了。"
20041-CVGroup_UIMiniEventShop_Enter1-2 = "現在，各地都能發現因「無名之神」──"
20041-CVGroup_UIMiniEventShop_Enter1-3 = "而產生的神祕物質。"
20041-CVGroup_UIMiniEventShop_Enter2-1 = "只要有樣本的話，要重新補給也是可能的。"
20041-CVGroup_UIMiniEventShop_Enter3-1 = "讓我看看收集回來的樣本吧。"
20041-CVGroup_UIMiniEventShop_Idle1-1 = "謝謝你的合作。"
20041-CVGroup_UIMiniEventShop_Idle2-1 = "正在進行「物質」的分析。並且從中生產副產物。"
20041-CVGroup_UIMiniEventShop_Idle3-1 = "這個裝置，會放出相當多的熱氣呢……"
20041-CVGroup_UIMiniEventShop_Idle3-2 = "對英美來說可能會有點辛苦。"
20041-CVGroup_UIMiniEventShop_Idle4-1 = "我對裝置的構造並沒有不滿。"
20041-CVGroup_UIMiniEventShop_Idle4-2 = "覺得意外？\n呵呵，即便是我，面對優秀的東西也會老實承認的。"
20041-CVGroup_UIMiniEventShop_Idle4-3 = "不過，要是設計跟細節能再多一些合理性……"
20041-CVGroup_UIMiniEventShop_Idle5-1 = "……就算做那種事情，我也不認為能有所收穫。"
20041-CVGroup_UIMiniEventShop_Idle5-2 = "……能見到我表情的變化？"
20041-CVGroup_UIMiniEventShop_Idle5-3 = "……你之所以被說奇怪的理由，我現在知道了。"
20041-CVGroup_UIMiniEventShop_Buy1-1 = "這是這次的分析結果。"
20041-CVGroup_UIMiniEventShop_Buy2-1 = "歡迎光臨，請問要點什麼呢？"
20041-CVGroup_UIMiniEventShop_Buy2-2 = "……只是模仿一下而已。\n剛才的請你忘了吧。"
20041-CVGroup_UIMiniEventShop_Buy3-1 = "過去所謂的「以物易物」……"
20041-CVGroup_UIMiniEventShop_Buy3-2 = "就是這麼回事嗎。"
20041-CVGroup_UIMiniEventShop_Buy4-1 = "是合理的選擇呢。"
20041-CVGroup_UIMiniEventShop_Buy5-1 = "最終選擇就交給你了。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "這個地方，採用了稍有差異的分析方法。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-2 = "一言以蔽之──就是「基於偶然的提取」。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "因「彩券」而損失的可能性，在機率學上也已經得到了證明。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "……不過，現在也沒辦法了。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "……陽葵的嗜好依舊沒變呢。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "……多方面的考察也是必要的。嗯嗯。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "對於分析結果的預測無法正確執行這點……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "作為研討會的一員，實在有點遺憾。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "即便無法獲得與預期相同的結果……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "我也無能為力。在此先向你道歉。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "「神不會擲骰子」……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "這個命題雖然被認為是錯誤的……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-3 = "但我──在某方面是同意的。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "量子力學這門學問，並不是用來理解。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……是用來背誦的。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "所謂的世界，是存在於人類認知之外的東西。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "……是啊，就跟這種依靠運氣的分析一樣。"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "那是……！\n居然真的……？"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "大數法則……是嗎。"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "抽到中獎為止……？"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "理論上，雖然這樣並沒有錯……"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "世界的絕大部分都存在於常態分佈之中……"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "你辦到了呢，老師。恭喜你。"
20041-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
20041-CVGroup_CharacterGet_Idle1-1 = "我是千年科學學園，研討會的調月莉央。\n最合理的答案，就由我來向你提示。"
20041-CVGroup_Cafe_Idle1-1 = "要追求合理的配置的話……"
20041-CVGroup_Cafe_Idle2-1 = "那個東西，感覺欠缺實用性……"
20041-CVGroup_Cafe_Idle3-1 = "咖啡因不是只要藉由膠囊攝取就好了嗎？"
20041-CVGroup_Cafe_Idle4-1 = "最大多數的最大幸福……\n在這裡也能適用嗎……"
20041-CVGroup_Cafe_Idle5-1 = "……避開人多的地方吧。"
20041-CVGroup_WeaponGet_Idle1-1 = "雖然我不擅長射擊……\n但我會保護好自己的。\n還有……老師你也是。"
20041-CVGroup_UIEventLobby_Enter1-1 = "時機相當適當呢。"
20041-CVGroup_UIEventLobby_Enter2-1 = "我也覺得你應該差不多要到了。"
20041-CVGroup_UIEventLobby_Enter3-1 = "一切都很順利。\n不過，還不到可以安心的階段。"
20041-CVGroup_UIEventLobby_Enter4-1 = "不久之後，應該就能給出統整好的報告。"
20041-CVGroup_UIEventLobby_Enter4-2 = "再稍等一會吧。"
20041-CVGroup_UIEventLobby_Enter5-1 = "能解決真是太好了。"
20041-CVGroup_UIEventLobby_Enter5-2 = "……這是我的真心話。"
20041-CVGroup_UIEventLobby_Idle1-1 = "……突然碰我，有什麼事嗎？"
20041-CVGroup_UIEventLobby_Idle2-1 = "能請你用說的告訴我嗎？"
20041-CVGroup_UIEventLobby_Idle3-1 = "所以……那個……"
20041-CVGroup_UIEventLobby_Idle4-1 = "你找我……是想尋求什麼嗎？"
20041-CVGroup_UIEventMission_Enter1-1 = "清單的列舉已經完成了。"
20041-CVGroup_UIEventMission_Enter2-1 = "這就是今日的待辦事項。"
20041-CVGroup_UIEventMission_Idle1-1 = "……無法理解老師的意圖。"
20041-CVGroup_UIEventMission_Idle1-2 = "默默觸摸可是無法傳達的哦。"
20041-CVGroup_UIEventMission_Idle2-1 = "莫非……"
20041-CVGroup_UIEventMission_Idle2-2 = "你希望我做同樣的事嗎？"
20041-CVGroup_UIEventMission_Buy1-1 = "我會確認的。"
20041-CVGroup_UIEventMission_Buy2-1 = "清單已經更新了。"
20041-CVGroup_UIEventMission_Interaction1-1 = "今天就到此為止。"
20041-CVGroup_UIEventMission_Interaction1-2 = "……不愧是你，該這麼說嗎。"

[translation]
20041-CVGroup_UIMiniEventLobby_Enter1-1 = "I've only been with you partway..."
20041-CVGroup_UIMiniEventLobby_Enter1-2 = "But I look forward to working with you, Sensei."
20041-CVGroup_UIMiniEventLobby_Enter2-1 = "You came at the perfect time, Sensei."
20041-CVGroup_UIMiniEventLobby_Enter2-2 = "What a rational choice."
20041-CVGroup_UIMiniEventLobby_Enter3-1 = "So this is Himari's..."
20041-CVGroup_UIMiniEventLobby_Enter3-2 = "I mean OUR base."
20041-CVGroup_UIMiniEventLobby_Idle1-1 = "I still can't believe it."
20041-CVGroup_UIMiniEventLobby_Idle1-2 = "I'm carrying out the same mission as you."
20041-CVGroup_UIMiniEventLobby_Idle2-1 = "It sounds weird coming from me."
20041-CVGroup_UIMiniEventLobby_Idle2-2 = "But everyone's treating me so casually..."
20041-CVGroup_UIMiniEventLobby_Idle2-3 = "It's not that I dislike it..."
20041-CVGroup_UIMiniEventLobby_Idle3-1 = "When it comes to engineering, I can do anything. But outside of that..."
20041-CVGroup_UIMiniEventLobby_Idle3-2 = "I'm sorry. I don't think I know much about them yet."
20041-CVGroup_UIMiniEventLobby_Idle4-1 = "Did you call, Sensei? You were just wondering what I was up to?"
20041-CVGroup_UIMiniEventLobby_Idle4-2 = "Try to cut back on irrational actions like that."
20041-CVGroup_UIMiniEventLobby_Idle4-3 = "Um... It's not that I hate it..."
20041-CVGroup_UIMiniEventLobby_Idle5-1 = "I once believed that I had to know everything."
20041-CVGroup_UIMiniEventLobby_Idle5-2 = "Now... I realize there are still things I need to learn."
20041-CVGroup_UIMiniEventLobby_Idle5-3 = "How odd. Maybe this is also thanks to you, in a way."
20041-CVGroup_UIMiniEventShop_Enter1-1 = "Himari briefed me on the situation."
20041-CVGroup_UIMiniEventShop_Enter1-2 = "To put it simply, we've discovered mysterious substances..."
20041-CVGroup_UIMiniEventShop_Enter1-3 = "...from the Nameless Gods' power."
20041-CVGroup_UIMiniEventShop_Enter2-1 = "And we need samples. We also think we can resupply with them."
20041-CVGroup_UIMiniEventShop_Enter3-1 = "You're here, Sensei. How many samples do you have?"
20041-CVGroup_UIMiniEventShop_Idle1-1 = "Thank you for your cooperation."
20041-CVGroup_UIMiniEventShop_Idle2-1 = "I'm analyzing the mysterious substances. I'll have the results soon."
20041-CVGroup_UIMiniEventShop_Idle3-1 = "Anyways, this device gives off an incredible amount of heat..."
20041-CVGroup_UIMiniEventShop_Idle3-2 = "Eimi would have a hard time around it."
20041-CVGroup_UIMiniEventShop_Idle4-1 = "I have no complaints regarding how this device functions."
20041-CVGroup_UIMiniEventShop_Idle4-2 = "That's unexpected? Fufu. Even I know when to make concessions."
20041-CVGroup_UIMiniEventShop_Idle4-3 = "It's just that...if the design was a bit more..."
20041-CVGroup_UIMiniEventShop_Idle5-1 = "Nothing's going to change, even if you talk to me."
20041-CVGroup_UIMiniEventShop_Idle5-2 = "Huh? You saw my expression change?"
20041-CVGroup_UIMiniEventShop_Idle5-3 = "...I see. So this is why people say that you can be mean sometimes..."
20041-CVGroup_UIMiniEventShop_Buy1-1 = "That's the result of this analysis."
20041-CVGroup_UIMiniEventShop_Buy2-1 = "Welcome. Which one would you like?"
20041-CVGroup_UIMiniEventShop_Buy2-2 = "I was just trying to imitate... Forget what just happened."
20041-CVGroup_UIMiniEventShop_Buy3-1 = "They say people traded each other for items like this in the past."
20041-CVGroup_UIMiniEventShop_Buy3-2 = "In a way, it feels like we've gone back in time."
20041-CVGroup_UIMiniEventShop_Buy4-1 = "Seems to be a rational result. Good choice."
20041-CVGroup_UIMiniEventShop_Buy5-1 = "The results are in. I'll let you decide which one to choose, Sensei."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "We used a bit of a different analysis method over here."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-2 = "To put it simply, it's extraction based on contingency."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Statistically speaking, it's highly likely for something like a lottery to end in a loss."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "...However, I suppose we have no other choice here."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "Seems like Himari still enjoys things like this."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "Well... I suppose it's good to have various approaches."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "The fact that the analysis results cannot be predicted accurately..."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "...as a member of Seminar, I find it a bit unfortunate."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "If the results aren't satisfactory..."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "I'm sorry, Sensei. There's nothing I can do about that either."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "Although it turned out to be false..."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "...when people said that the gods don't play dice."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-3 = "There's something I can understand about it."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "The field of quantum mechanics isn't something you \"understand,\" so to speak."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "You begin with...memorizing things and go from there."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "The world is something that's beyond our understanding."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "...That's correct. Just like this analysis that relies on luck."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "Did that...really work?"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "I suppose it's the law of large numbers."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "If you don't hit the jackpot, keep going until you hit it..."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "That's not wrong to say, but..."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "They say most things in the world are within normal distribution."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "Congrats, Sensei. Great work."
20041-CVGroup_UITitle_Idle1-1 = "Blue, Archive"
20041-CVGroup_CharacterGet_Idle1-1 = "Tsukatsuki Rio, from Millennium Science School's Seminar. I'll provide you with the most rational approach to every issue."
20041-CVGroup_Cafe_Idle1-1 = "To optimize the layout here..."
20041-CVGroup_Cafe_Idle2-1 = "...Are you sure that thing needs to be right there?"
20041-CVGroup_Cafe_Idle3-1 = "If you need caffeine, you could always take supplements."
20041-CVGroup_Cafe_Idle4-1 = "\"The greatest good for the greatest number...\" I wonder if that applies here too..."
20041-CVGroup_Cafe_Idle5-1 = "...Let's avoid any crowded places."
20041-CVGroup_WeaponGet_Idle1-1 = "I'm not a great shot... But it's irrational to not have a gun in Kivotos. I'll try to protect myself, at least. And you too, Sensei."
20041-CVGroup_UIEventLobby_Enter1-1 = "You've arrived just in time."
20041-CVGroup_UIEventLobby_Enter2-1 = "Right. I expected you to come around this time."
20041-CVGroup_UIEventLobby_Enter3-1 = "Things are going well, but not to a point where we can let our guard down."
20041-CVGroup_UIEventLobby_Enter4-1 = "We're almost there."
20041-CVGroup_UIEventLobby_Enter4-2 = "I can tell you about it soon."
20041-CVGroup_UIEventLobby_Enter5-1 = "All's well that ends well."
20041-CVGroup_UIEventLobby_Enter5-2 = "...And I mean that."
20041-CVGroup_UIEventLobby_Idle1-1 = "Hm? What's the matter? Poking me like that..."
20041-CVGroup_UIEventLobby_Idle2-1 = "It's hard to understand unless you put it into words."
20041-CVGroup_UIEventLobby_Idle3-1 = "Um, so... Um..."
20041-CVGroup_UIEventLobby_Idle4-1 = "Is there something you need or...anything?"
20041-CVGroup_UIEventMission_Enter1-1 = "I organized your to-do list."
20041-CVGroup_UIEventMission_Enter2-1 = "Welcome, Sensei. Here's your to-do list for the day."
20041-CVGroup_UIEventMission_Idle1-1 = "If you keep on poking me without saying anything..."
20041-CVGroup_UIEventMission_Idle1-2 = "...well, I'll be confused about it."
20041-CVGroup_UIEventMission_Idle2-1 = "By any chance, did you want me to..."
20041-CVGroup_UIEventMission_Idle2-2 = "...do the same?"
20041-CVGroup_UIEventMission_Buy1-1 = "Got it. I'll check it off."
20041-CVGroup_UIEventMission_Buy2-1 = "I'll update the \"completed\" list."
20041-CVGroup_UIEventMission_Interaction1-1 = "That's it for today."
20041-CVGroup_UIEventMission_Interaction1-2 = "...Great way to wrap it up."

[translation]
20041-CVGroup_UIMiniEventLobby_Enter1-1 = "도중에 합류하게 된 셈이지만……"
20041-CVGroup_UIMiniEventLobby_Enter1-2 = "잘 부탁할게. 선생."
20041-CVGroup_UIMiniEventLobby_Enter2-1 = "딱 좋을 때에 와 주었네, 선생."
20041-CVGroup_UIMiniEventLobby_Enter2-2 = "그야말로 합리적인 행동이야."
20041-CVGroup_UIMiniEventLobby_Enter3-1 = "여기가 히마리의……"
20041-CVGroup_UIMiniEventLobby_Enter3-2 = "아니, 우리들의 기지구나."
20041-CVGroup_UIMiniEventLobby_Idle1-1 = "아직도 조금 실감이 안 나."
20041-CVGroup_UIMiniEventLobby_Idle1-2 = "선생과 이렇게…… 같은 작전을 수행한다는 것이."
20041-CVGroup_UIMiniEventLobby_Idle2-1 = "내가 이야기하기에도 조금 이상하겠지만."
20041-CVGroup_UIMiniEventLobby_Idle2-2 = "다들 너무 나를 스스럼없이 대해 줘서……"
20041-CVGroup_UIMiniEventLobby_Idle2-3 = "싫다는 건, 아니긴 한데……"
20041-CVGroup_UIMiniEventLobby_Idle3-1 = "공학 부분 말고는……"
20041-CVGroup_UIMiniEventLobby_Idle3-2 = "미안. 아직 그런 분야는 잘 모르겠어."
20041-CVGroup_UIMiniEventLobby_Idle4-1 = "불렀어, 선생? 그냥 뭐 하나 궁금했다고?"
20041-CVGroup_UIMiniEventLobby_Idle4-2 = "그런 합리적이지 못한 행동, 자제하는 게 좋을 거야."
20041-CVGroup_UIMiniEventLobby_Idle4-3 = "그…… 싫은 건, 아닌데 말야……"
20041-CVGroup_UIMiniEventLobby_Idle5-1 = "나는 내가 모든 걸 알아야 한다고 생각했어."
20041-CVGroup_UIMiniEventLobby_Idle5-2 = "지금은…… 아직 배울 것이 남아 있다고 생각 중이고."
20041-CVGroup_UIMiniEventLobby_Idle5-3 = "신기하네. 이것도 어떻게 보면 선생 덕분인 걸까."
20041-CVGroup_UIMiniEventShop_Enter1-1 = "히마리에게서 인수인계는 받았어."
20041-CVGroup_UIMiniEventShop_Enter1-2 = "말하자면…… 여기저기에 이름없는 신들의 힘에 의한,"
20041-CVGroup_UIMiniEventShop_Enter1-3 = "수수께끼의 물질들이 발견되는 상황인 거네."
20041-CVGroup_UIMiniEventShop_Enter2-1 = "우리에겐 샘플이 필요한 상황이지. 그것으로 재보급 역시 가능할 것 같고."
20041-CVGroup_UIMiniEventShop_Enter3-1 = "왔구나, 선생. 샘플의 양은 어느 정도야?"
20041-CVGroup_UIMiniEventShop_Idle1-1 = "협력, 고마워."
20041-CVGroup_UIMiniEventShop_Idle2-1 = "수수께끼의 물질들을 분석 중이야. 거기에서 결과물을 생산하고 있지."
20041-CVGroup_UIMiniEventShop_Idle3-1 = "그건 그렇고 이 장치, 열기가 엄청나네……"
20041-CVGroup_UIMiniEventShop_Idle3-2 = "에이미는 조금 힘들어할 것 같아."
20041-CVGroup_UIMiniEventShop_Idle4-1 = "이 장치의 작동 구조에 대해서는 불만 없어."
20041-CVGroup_UIMiniEventShop_Idle4-2 = "의외라고? 후후. 나라고 해도 인정할 것은 인정할 줄 알아."
20041-CVGroup_UIMiniEventShop_Idle4-3 = "단지, 디자인만 조금 더, 어떻게……"
20041-CVGroup_UIMiniEventShop_Idle5-1 = "나에게 말을 걸어도 바뀌는 것은 없을 거야."
20041-CVGroup_UIMiniEventShop_Idle5-2 = "응? 내 표정이 바뀌는 걸 볼 수 있다고?"
20041-CVGroup_UIMiniEventShop_Idle5-3 = "……이해했어. 이래서 선생을 가끔 심술궃다고 하는구나……"
20041-CVGroup_UIMiniEventShop_Buy1-1 = "그게 이번 분석의 결과물이야."
20041-CVGroup_UIMiniEventShop_Buy2-1 = "어서 오세요, 어떤 걸로 하시겠습니까?"
20041-CVGroup_UIMiniEventShop_Buy2-2 = "……흉내 내본 것뿐이야. 지금 건 잊어줘."
20041-CVGroup_UIMiniEventShop_Buy3-1 = "아주 오래전에는 이렇게, 물건과 물건을 교환했다고 하지."
20041-CVGroup_UIMiniEventShop_Buy3-2 = "어떤 의미로는, 과거로 돌아간 느낌이네."
20041-CVGroup_UIMiniEventShop_Buy4-1 = "합리적으로 보이는 결과물이네. 좋은 선택이야."
20041-CVGroup_UIMiniEventShop_Buy5-1 = "결과가 나왔어. 무엇을 선택할지는, 선생에게 맡길게."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "여기에서는 조금 다른\n분석 방법을\n사용하고 있어."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-2 = "아주 간단하게\n이야기하자면, 우연성에\n기반한 추출이지."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "복권 같은 것은\n확률적으로\n손해일 가능성이 커."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "……여기에서는 어쩔 수 없는 것 같지만."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "여전히 히마리는 이런\n걸 좋아하는 모양이야."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "뭐…… 시도는\n다양한 편이 좋겠지."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "분석 결과를\n정확히 예측할 수\n없다는 것은……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "세미나 소속으로서,\n조금 유감이네."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "만일 결과가\n좋지 않다면……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "미안해, 선생.\n그 부분은 나도 어떻게\n해 줄 수가 없어."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "결과적으로는\n틀린 이야기였지만."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "신은 주사위 놀이를\n하지 않는다는 말."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-3 = "나는 이해가\n가는 측면이 있어."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "양자역학이란\n학문은, 사실\n이해하는 게 아니야."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "일단…… 외운 다음에\n시작하는 거지."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "세계는 인간의 인지 바깥에 자리하지."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "……그래. 이 운에\n맡긴 분석처럼."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "정말로……\n나온 거야?"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "큰 수의\n법칙이라는 것이겠네."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "당첨되지 않으면\n될 때까지 시행한다…"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "틀린 말은, 아니긴 한데…"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "세상의 대부분은\n정규분포 안에\n존재한다고 하지."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "축하해, 선생.\n수고 많았어."
20041-CVGroup_UITitle_Idle1-1 = "블루, 아카이브"
20041-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨, 세미나의 츠카츠키 리오야.\n가장 합리적인 답을 제시해 줄게."
20041-CVGroup_Cafe_Idle1-1 = "이곳의 배치를 보다 합리적으로 설정하려면……"
20041-CVGroup_Cafe_Idle2-1 = "저 물건, 과연 필요한 걸까……"
20041-CVGroup_Cafe_Idle3-1 = "카페인이 필요하다면 캡슐로 섭취하면 될 텐데."
20041-CVGroup_Cafe_Idle4-1 = "최대 다수의 최대 행복…… 여기에도 적용되려나……"
20041-CVGroup_Cafe_Idle5-1 = "……붐비는 곳은 피하도록 하자."
20041-CVGroup_WeaponGet_Idle1-1 = "사격은 서투르지만…… 키보토스에서 총이 없다는 건, 비합리적이니까.\n나 자신 정도는 지켜 보이도록 할게. 그리고 선생까지도."
20041-CVGroup_UIEventLobby_Enter1-1 = "알맞은 타이밍에 도착했네."
20041-CVGroup_UIEventLobby_Enter2-1 = "그래. 지금쯤 올 거라 생각했어."
20041-CVGroup_UIEventLobby_Enter3-1 = "순조롭게 진행 중이지만, 아직 안심할 정도는 아니야."
20041-CVGroup_UIEventLobby_Enter4-1 = "이제 거의 다 왔어."
20041-CVGroup_UIEventLobby_Enter4-2 = "곧 말해줄 수 있겠네."
20041-CVGroup_UIEventLobby_Enter5-1 = "잘 해결돼서 다행이네."
20041-CVGroup_UIEventLobby_Enter5-2 = "……이건 진심이야."
20041-CVGroup_UIEventLobby_Idle1-1 = "응? 무슨 일이야? 갑자기 건드리고."
20041-CVGroup_UIEventLobby_Idle2-1 = "말로 표현해 주지 않으면, 이해하기 힘들어."
20041-CVGroup_UIEventLobby_Idle3-1 = "아니, 그러니까…… 으음……."
20041-CVGroup_UIEventLobby_Idle4-1 = "뭔가 필요한 거라도 있는 거야?"
20041-CVGroup_UIEventMission_Enter1-1 = "해야 할 일들을 정리해 봤어."
20041-CVGroup_UIEventMission_Enter2-1 = "잘 왔어, 선생님. 오늘의 할 일들이야."
20041-CVGroup_UIEventMission_Idle1-1 = "말없이 건드리기만 하면……"
20041-CVGroup_UIEventMission_Idle1-2 = "이해할 수 없어."
20041-CVGroup_UIEventMission_Idle2-1 = "혹시 나도 똑같이"
20041-CVGroup_UIEventMission_Idle2-2 = "해주길 바라는 거야?"
20041-CVGroup_UIEventMission_Buy1-1 = "확인했어. 체크할게."
20041-CVGroup_UIEventMission_Buy2-1 = "완료된 리스트로 바꿔둘게."
20041-CVGroup_UIEventMission_Interaction1-1 = "오늘은 이걸로 끝이야."
20041-CVGroup_UIEventMission_Interaction1-2 = "……훌륭한 마무리였어."

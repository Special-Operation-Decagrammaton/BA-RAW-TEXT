13007-CVGroup_Cafe_Idle4-1 = "킁킁. 응…? 이 냄새는…? 무언가 맛있는 냄새가 나!"
13007-CVGroup_Cafe_Idle5-1 = "맛있는 냄새를 따라 여기까지 왔네. 이곳에서 날 기다리는건…. 무엇일까나~"
13007-CVGroup_WeaponGet_Idle1-1 = "고, 고마워. 선생님… 그… 소, 소중하게 간직할 테니까!"

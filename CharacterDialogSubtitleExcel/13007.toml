[translation]
13007-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
13007-CVGroup_CharacterGet_Idle1-1 = "其實沒有要協助你的打算的。\n…嗯？會給我吃的嗎？\n什麼樣的？什麼食物？"
13007-CVGroup_Cafe_Idle1-1 = "哪，哪裡有食物…\n沒有嗎？"
13007-CVGroup_Cafe_Idle2-1 = "這麼說來，之前和老師\n一起去咖啡廳時的那個…\n真好吃啊……嘿嘿。"
13007-CVGroup_Cafe_Idle3-1 = "聽說百鬼夜行慶典裡賣的糰子非常好吃……"
13007-CVGroup_Cafe_Idle4-1 = "嗅嗅。嗯…？這個味道是…？\n有股很香的味道！"
13007-CVGroup_Cafe_Idle5-1 = "跟著香味來到了這裡。\n在這裡等著我的…是什麼呢～"
13007-CVGroup_WeaponGet_Idle1-1 = "謝，謝謝你，老師……\n那個……我，我會好好珍惜的！絕對！"

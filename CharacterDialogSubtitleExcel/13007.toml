[translation]
13007-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
13007-CVGroup_CharacterGet_Idle1-1 = "ฉันไม่ได้อยากร่วมงานกับคุณครูเท่าไหร่..\nหืม? จะให้ของกินเหรอ? อะไรเหรอ? แล้วมันอร่อยมั้ย?"
13007-CVGroup_Cafe_Idle1-1 = "มีอะไรให้กินบ้างมั้ยนะ?"
13007-CVGroup_Cafe_Idle2-1 = "จะว่าไป วันนั้นที่เราไปคาเฟ่ด้วยกัน...\nที่ฉันกินมันอร่อยดีนะ...ฮิฮิ"
13007-CVGroup_Cafe_Idle3-1 = "ได้ยินมาว่าขนมเทศกาลของเฮียกคิยาโคอร่อยมากเลยนี่..."
13007-CVGroup_Cafe_Idle4-1 = "ฟุดฟิด.. อืมม กลิ่นนี้มัน...?\nกลิ่นของอร่อยๆ นี่นา ต้องอร่อยมากแน่ๆ"
13007-CVGroup_Cafe_Idle5-1 = "เดินตามกลิ่นของอร่อยมาถึงที่นี่เลย\nของอร่อยแบบไหนน้า~ ที่รอให้ฉันมาชิมอยู่~"
13007-CVGroup_WeaponGet_Idle1-1 = "ขะ...ขอบคุณนะคุณครู!\nฉันจะรักษาเอาไว้...อย่างดีที่สุดเลย!"

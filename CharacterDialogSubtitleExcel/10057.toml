[translation]
10057-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10057-CVGroup_CharacterGet_Idle1-1 = "Heh heh, Happy New Year. I'm prepared with a floral furisode and an open mind. Let's find some intriguing new food to try!"
10057-CVGroup_Cafe_Idle1-1 = "True epicurianism involves all aspects of life."
10057-CVGroup_Cafe_Idle2-1 = "Location and appropriate dress are essential elements of fine dining."
10057-CVGroup_Cafe_Idle3-1 = "This is the time of year for special dishes. Heehee, I'm quite excited."
10057-CVGroup_Cafe_Idle4-1 = "I've worn furisodes quite frequently, actually."
10057-CVGroup_Cafe_Idle5-1 = "I hope we find food that's truly worthy of savoring."
10057-CVGroup_WeaponGet_Idle1-1 = "Special foods that you only eat once a year make a holiday seem magical. With this experience, I'm getting closer to true epicurianism, and...closer to you, too, Sensei. I truly always appreciate you."
10057-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei. Oh my... You're working on New Year's Day? Don't forget to take a break sometimes."
10057-CVGroup_UIEventLobby_Enter1-2 = "Now then, let's enjoy a cup of tea together."
10057-CVGroup_UIEventLobby_Enter2-1 = "Heehee. It's nice to see you this New Year's Day."
10057-CVGroup_UIEventLobby_Enter2-2 = "Don't you know? I'm always prepared."
10057-CVGroup_UIEventLobby_Idle1-1 = "Heeheehee. Did you call me, Sensei?"
10057-CVGroup_UIEventLobby_Idle2-1 = "Please refrain from tickling me like that."
10057-CVGroup_UIEventLobby_Idle2-2 = "I didn't know you enjoyed goofing off like that, Sensei."
10057-CVGroup_UIEventLobby_Idle3-1 = "Furisodes can be a bit inconvenient, to be sure."
10057-CVGroup_UIEventLobby_Idle3-2 = "But one must have proper dress when fine dining."
10057-CVGroup_UIEventLobby_Idle4-1 = "To craft the ultimate flavor, one must have an unflinching resolve."
10057-CVGroup_UIEventLobby_Idle4-2 = "...No one will be able to stop us. Heeheehee."
10057-CVGroup_UIEventLobby_Enter3-1 = "The circumstances are a little complicated, but..."
10057-CVGroup_UIEventLobby_Enter3-2 = "...My passion for fine dining won't be impeded by something like this."
10057-CVGroup_UIEventLobby_Enter4-1 = "I hope we all do our best."
10057-CVGroup_UIEventLobby_Enter4-2 = "I taste food using every ounce of my passion and sincerity."
10057-CVGroup_UIEventLobby_Enter5-1 = "Time marches on...and memories fade."
10057-CVGroup_UIEventLobby_Enter5-2 = "But as long as you and I remember... It'll all be okay."
10057-CVGroup_UIEventLobby_Enter5-3 = "Yes, I'm certain."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "Sensei, are you here to pick an omikuji too? This way."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-2 = "Heeheehee. You don't have to be so tense."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "Heeheehee... It's my first time doing something like this."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "It's kind of fun."
10057-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "Did you find what you were looking for?"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "Heeheehee... It might be closer than you think."
10057-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "It's important to take it easy sometimes."
10057-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "It's like having a little granita with your full course meal."
10057-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "Oh, you drew the great blessing! You're quite lucky, Sensei! As to be expected."
10057-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "I prepared a special gift for drawing a great blessing, Sensei."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "You drew a blessing. That means some good luck is coming your way."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "I hope you have a happy New Year."
10057-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "...You got a modest blessing. Here's your prize."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "A small blessing... That's not too bad."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "To bring great luck, they say you need to work on the small things first."
10057-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "A future blessing means you're likely to be lucky down the road..."
10057-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "That's a good sign. All right then, this way."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "It's okay. The result of the omikuji only shows your current luck."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "It could turn into good fortune later..."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-3 = "Huh? You feel happy and sad at the same time, because I comforted you? I-I don't understand..."
10057-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "Sensei, they're still serving omikuji. Please don't forget to pick one out."

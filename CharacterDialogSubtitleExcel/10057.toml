[translation]
10057-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10057-CVGroup_CharacterGet_Idle1-1 = "呵呵，新年快樂。\n讓花朵在振袖和服上綻放，\n帶著嶄新的心情尋求未知的食物吧。"
10057-CVGroup_Cafe_Idle1-1 = "料理的偉大之處在於一盤之中蘊含著所有的一切。"
10057-CVGroup_Cafe_Idle2-1 = "服裝及場所，其實也能說是美食的重要要素吧。"
10057-CVGroup_Cafe_Idle3-1 = "這個時期充滿特別的料理……\n呵呵，真期待。"
10057-CVGroup_Cafe_Idle4-1 = "振袖和服的打扮我已經相當習慣了。"
10057-CVGroup_Cafe_Idle5-1 = "要是能找到很棒的料理就好了……"
10057-CVGroup_WeaponGet_Idle1-1 = "在特別的日子裡品嚐的料理，居然會美味到這種程度呢。\n這樣一來似乎就能在美食之路更進一步……\n感覺也能更接近老師了。一直都很感謝您，老師。"
10057-CVGroup_UIEventLobby_Enter1-1 = "老師，歡迎回來。哎呀…新年也要工作嗎？\n有時候休息也是很重要的唷。"
10057-CVGroup_UIEventLobby_Enter1-2 = "來，一起喝杯茶吧。"
10057-CVGroup_UIEventLobby_Enter2-1 = "唔呵呵，居然從新年就能見面，真是太開心了呢。"
10057-CVGroup_UIEventLobby_Enter2-2 = "我隨時都準備就緒唷？"
10057-CVGroup_UIEventLobby_Idle1-1 = "唔呵呵。您找我嗎，老師？"
10057-CVGroup_UIEventLobby_Idle2-1 = "那樣一直搔我癢，我會很困擾的。"
10057-CVGroup_UIEventLobby_Idle2-2 = "老師您，意外的喜歡惡作劇呢？"
10057-CVGroup_UIEventLobby_Idle3-1 = "振袖確實也有些麻煩的地方。"
10057-CVGroup_UIEventLobby_Idle3-2 = "不過，這全都是為了通往美食之路。"
10057-CVGroup_UIEventLobby_Idle4-1 = "為了抵達終極美味，堅定不移的覺悟是必要的。"
10057-CVGroup_UIEventLobby_Idle4-2 = "…誰也無法阻止我們的。唔呵呵。"
10057-CVGroup_UIEventLobby_Enter3-1 = "雖然情況有點複雜…"
10057-CVGroup_UIEventLobby_Enter3-2 = "我對美食的執著不會這麼簡單就受挫的。"
10057-CVGroup_UIEventLobby_Enter4-1 = "希望彼此都能盡己所能。"
10057-CVGroup_UIEventLobby_Enter4-2 = "就讓我帶著熱忱與誠意來品嚐吧。"
10057-CVGroup_UIEventLobby_Enter5-1 = "隨著時間流逝，事件將會被遺忘吧。"
10057-CVGroup_UIEventLobby_Enter5-2 = "但是，只要我和老師還記得……就沒問題了。"
10057-CVGroup_UIEventLobby_Enter5-3 = "沒錯，一定是這樣的。"
10057-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "老師也來抽御神籤……？\n在這裡哦。"
10057-CVGroup_UIEventFortuneGachaShop_Enter1-2 = "唔呵呵，不用那麼急也沒關係的唷。"
10057-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "唔呵呵……這種事情，我還是第一次體驗呢。"
10057-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "總覺得很開心。"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "找到要找的東西了嗎？"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "唔呵呵，說不定遠在天邊近在眼前哦？"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "冷靜下來調整呼吸的時間也是很重要的。"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "就像套餐料理中吃到的冰沙一樣。"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "哎呀，是大吉呢！不愧是老師，真好運呢！"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "我為抽到大吉的老師準備了特別的商品哦。"
10057-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "抽到吉就表示好運回來了呢。"
10057-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "希望今年也會是美好的一年。"
10057-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "中吉……？還挺好的呢。\n這些是中吉的商品。"
10057-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "小吉……還不錯呢。"
10057-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "想要招來福氣，一點一滴地累積是很重要的。"
10057-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "末吉是之後會變成吉的徵兆…"
10057-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "也就是吉兆呢。\n來，請收下這些。"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "沒關係的。御神籤的結果就是現在的運勢。"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "之後會變成福氣的……"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-3 = "……咦？被我安慰好像有點開心又有點悲傷……？\n那，那究竟是……"
10057-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "老師，御神籤現在還可以抽唷。\n請別忘了去抽哦。"

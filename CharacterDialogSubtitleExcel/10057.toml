[translation]
10057-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10057-CVGroup_CharacterGet_Idle1-1 = "후훗, 새해 복 많이 받으세요.\n후리소데 차림에 꽃을 피우고, 새로운 마음으로 미지의 음식을 찾으러 갑시다."
10057-CVGroup_Cafe_Idle1-1 = "요리가 위대한 것은, 거기에 모든 것이 담겨 있기 때문이죠."
10057-CVGroup_Cafe_Idle2-1 = "드레스 코드나 로케이션도, 미식의 중요한 요소라고 말할 수 있겠지요."
10057-CVGroup_Cafe_Idle3-1 = "이 시기에는 특별한 요리가 눈에 띄곤 해서… 후훗, 기대가 되네요."
10057-CVGroup_Cafe_Idle4-1 = "후리소데에는 나름 익숙해져 있답니다."
10057-CVGroup_Cafe_Idle5-1 = "멋진 요리를 찾을 수 있으면 좋겠는데…."
10057-CVGroup_WeaponGet_Idle1-1 = "특별한 시기에 맛보는 특별한 음식은 한층 더 각별한 것이지요.\n이것으로 한층 더 미식의 길에…… 그리고 선생님에게 다가갈 수 있게 된 것 같습니다.\n언제나 감사드리고 있답니다. 선생님?"
10057-CVGroup_UIEventLobby_Enter1-1 = "선생님, 어서 오세요.\n어머… 설날에도 일하시나요? 때로는 휴식도 중요하죠."
10057-CVGroup_UIEventLobby_Enter1-2 = "자, 같이 차 한잔하도록 해요."
10057-CVGroup_UIEventLobby_Enter2-1 = "우후후, 설날부터 만날 수 있다니 너무 기쁘네요."
10057-CVGroup_UIEventLobby_Enter2-2 = "저는 언제든지 준비되어 있답니다?"
10057-CVGroup_UIEventLobby_Idle1-1 = "후후후. 부르셨나요, 선생님?"
10057-CVGroup_UIEventLobby_Idle2-1 = "그렇게 자꾸 간지럼을 태우시면 곤란하답니다."
10057-CVGroup_UIEventLobby_Idle2-2 = "선생님께서는, 의외로 장난을 좋아하시는군요?"
10057-CVGroup_UIEventLobby_Idle3-1 = "확실히 후리소데는 번거로운 면이 있지요."
10057-CVGroup_UIEventLobby_Idle3-2 = "그렇지만 이것도 모두 미식을 위한 길이니까요."
10057-CVGroup_UIEventLobby_Idle4-1 = "궁극의 맛에 도달하기 위해서는, 흔들림 없는 각오가 필요합니다."
10057-CVGroup_UIEventLobby_Idle4-2 = "…누구도 우리를 막을 수 없을 거예요. 우후훗."
10057-CVGroup_UIEventLobby_Enter3-1 = "조금 복잡한 상황이긴 합니다만…"
10057-CVGroup_UIEventLobby_Enter3-2 = "제 미식에 대한 마음은 이 정도로 꺾이거나 하지 않습니다."
10057-CVGroup_UIEventLobby_Enter4-1 = "각자가 최선을 다하기를 바라며."
10057-CVGroup_UIEventLobby_Enter4-2 = "열의와 성의를 담아 맛을 보도록 하겠습니다."
10057-CVGroup_UIEventLobby_Enter5-1 = "시간은 흐르고, 사건은 잊혀지겠죠."
10057-CVGroup_UIEventLobby_Enter5-2 = "하지만 저와 선생님이 기억하는 한… 괜찮을 거예요."
10057-CVGroup_UIEventLobby_Enter5-3 = "예. 분명."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "선생님도 오미쿠지를 뽑으러…? 이쪽입니다."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-2 = "우후후, 그렇게 초조해하지 않아도 괜찮아요."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "우후훗… 이런일, 처음 해봐요."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "왠지 즐겁네요."
10057-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "원하는 것은 찾으셨나요?"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "우후후. 그것은 어쩌면, 가까운 곳에 있을 지도요?"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "침착하게 호흡을 가다듬는 시간도 중요하죠."
10057-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "코스요리에서 먹는 그라니테처럼."
10057-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "어머, 대길이네요! 역시나 선생님. 운을 가지고 계시는군요!"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "대길을 뽑으신 선생님께는, 특별한 상품을 준비해 두었답니다."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "길이면, 운이 돌아오고 있다는 거군요."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "올해도 멋진 한해가 되길 바라겠습니다."
10057-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "중길…… 꽤나 좋네요. 이쪽이 중길의 상품입니다."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "소길… 나쁘진 않네요."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "복을 불러들이기 위해서는 작은 것들이 쌓이는게 중요하다고 하니까요."
10057-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "말길은, 후에 길로 돌아설 조짐…"
10057-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "즉, 길조군요. 네. 이쪽으로 오세요."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "괜찮아요. 오미쿠지 결과는 현재의 운세니까요."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "향후, 복으로 바뀐다고도 말하니…"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-3 = "…네? 제게 위로를 받으니 기쁜 듯 슬픈 듯하다구요…? 그, 그건 대체…"
10057-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "선생님, 오미쿠지라면 아직 접수하고 있어요. 잊지 말고 뽑아주세요."

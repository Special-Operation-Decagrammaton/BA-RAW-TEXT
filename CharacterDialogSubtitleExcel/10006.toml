[translation]
10006-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10006-CVGroup_CharacterGet_Idle1-1 = "당신이 선생님? 오늘부터 내가 함께해주겠어. 임무라면 나한테 맡겨."
10006-CVGroup_Cafe_Idle1-1 = "호오. 제법 괜찮은 느낌이네."
10006-CVGroup_Cafe_Idle2-1 = "조금 쉬었다 가도록 하지."
10006-CVGroup_Cafe_Idle3-1 = "정의실현부 녀석들은 골치 아픈데…."
10006-CVGroup_Cafe_Idle4-1 = "나 참, 어쩔 수 없네. 도와줄게."
10006-CVGroup_Cafe_Idle5-1 = "하아. 어쩌다 이렇게 되었는지. 뭐… 지금도 나쁘진 않지만."
10006-CVGroup_WeaponGet_Idle1-1 = "성과로 보답하겠어. 그것만이 지금의 내 마음을 증명할 수 있을 테니까."

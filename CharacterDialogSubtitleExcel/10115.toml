[translation]
10115-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10115-CVGroup_CharacterGet_Idle1-1 = "ฉันโนมาสะ เรย์ แบตเตอร์ลำดับที่ 4 ของมิลเลเนียมค่ะ คุณครู\nเป้าหมายตอนนี้ของฉันคือตีให้ได้ 10% ค่ะ..."
10115-CVGroup_Cafe_Idle1-1 = "รุ่นพี่สึมิเระ... คงไม่ตามมาถึงที่นี่หรอกเนอะ?"
10115-CVGroup_Cafe_Idle2-1 = "การฝึกซ้อมเป็นสิ่งสำคัญ\nแต่การพักผ่อนอย่างเหมาะสมก็ด้วย..."
10115-CVGroup_Cafe_Idle3-1 = "ว่ากันว่าคาเฟอีนในปริมาณที่เหมาะสม\nจะช่วยเพิ่มประสิทธิภาพในการซ้อม..."
10115-CVGroup_Cafe_Idle4-1 = "(วันนี้... โดดซ้อมวันหนึ่งดีมั้ยนะ...)"
10115-CVGroup_Cafe_Idle5-1 = "วิปปิ้งครีมตรงนั้นน่าอร่อยจัง...\nไม่ได้สิ ต้องห้ามใจไว้"
10115-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณค่ะ คุณครู ทำเรื่องแบบนี้ให้ฉันขนาดนี้...\nเพื่อเป็นการตอบแทนคุณครู ฉันจะตีลูกให้อย่างน้อย 30% เลยค่ะ!\nแม้ตอนนี้ต้องตีให้ได้ 10% ก่อนก็เถอะ..."
10115-CVGroup_UIEventLobby_Enter1-1 = "ชอบเบสบอลมั้ยคะคุณครู?"
10115-CVGroup_UIEventLobby_Enter1-2 = "ฉันชอบมากเลยค่ะ!"
10115-CVGroup_UIEventLobby_Enter2-1 = "การแข่งขันวันนี้เป็นเกมสำคัญเลยค่ะ!"
10115-CVGroup_UIEventLobby_Enter2-2 = "ที่จริงก็ไม่มีการแข่งขันไหนที่ไม่สำคัญหรอกค่ะ!"
10115-CVGroup_UIEventLobby_Enter3-1 = "แม้เกมจะดูละเอียดอ่อน..."
10115-CVGroup_UIEventLobby_Enter3-2 = "แต่ฉันเชื่อว่าเกมจะพลิกได้ค่ะ!"
10115-CVGroup_UIEventLobby_Enter4-1 = "ว่ากันว่าเบสบอลต้องลุ้นตั้งแต่ปลายอินนิ่งที่ 9 ค่ะ!"
10115-CVGroup_UIEventLobby_Enter4-2 = "ถ้าไม่เตรียมพร้อมอยู่เสมอ โอกาสก็ไม่เข้าหาหรอกค่ะ!"
10115-CVGroup_UIEventLobby_Enter5-1 = "ฉันยังไม่อยากเชื่อเลยค่ะ"
10115-CVGroup_UIEventLobby_Enter5-2 = "ฉันตีลูกโฮมรันเหรอเนี่ย...\nการตีครั้งนั้น วิถีแบบนั้น..."
10115-CVGroup_UIEventLobby_Enter5-3 = "เบสบอลมันดีจริงๆ เลยนะคะ!"
10115-CVGroup_UIEventLobby_Idle1-1 = "ทำไมเหรอคะ คุณครู?\nคุณครูพอรู้กติกาของเบสบอลมั้ยคะ?"
10115-CVGroup_UIEventLobby_Idle2-1 = "ฉันกำลังหาสถิติการแข่งขันอยู่ค่ะ"
10115-CVGroup_UIEventLobby_Idle2-2 = "ตอนนี้มันสะดวก เพราะมีในอินเทอร์เน็ต"
10115-CVGroup_UIEventLobby_Idle2-3 = "ได้ยินว่าแต่ก่อนต้องไล่หาข้อมูล\nทีละอย่างๆ เองเลยนะคะ"
10115-CVGroup_UIEventLobby_Idle3-1 = "ยะ... อย่าจิ้มสีข้างกันสิคะ"
10115-CVGroup_UIEventLobby_Idle3-2 = "คุณครู! ตรงรักแร้ก็ด้วยค่ะ...!"
10115-CVGroup_UIEventLobby_Idle3-3 = "ตอนนี้การแข่งขันยังไม่จบ\nแล้วคนก็เยอะด้วย..."
10115-CVGroup_UIEventLobby_Idle4-1 = "สั่งอะไรมาดีมั้ยคะ?"
10115-CVGroup_UIEventLobby_Idle4-2 = "อาหารในสนามเบสบอล รสชาติดีนะคะ!"
10115-CVGroup_UIEventLobby_Idle4-3 = "แต่ราคา... ก็ค่อนข้างจะ...\nเราลืมๆ มันไปเถอะค่ะ"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "ได้ยินว่าในสนามกีฬามีสุ่มแจกรางวัลด้วยค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "ไม่รู้ทำไมฉันถึงกลายมาเป็นผู้ช่วยได้นะคะเนี่ย..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "เชิญค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "มาลองเสี่ยงโชคดูมั้ยคะ?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "เป็นไงคะ คุณครู?\nตอนนี้ฉันเหมือนมือโปรมั้ยคะ?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "สวัสดีค่ะคุณครู ถ้ายังมีบัตรสุ่มเหลืออยู่\nก็ควรมาใช้ให้หมดเลยนะคะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "ถึงฉันจะเป็นผู้ช่วยสุ่มรางวัลรายวัน\nแต่ว่าฉันก็จะได้ค่าจ้างงานพาร์ทไทม์ค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "ฉันว่าจะเปลี่ยนถุงมือคู่ใหม่ก่อนค่ะ"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "สำหรับเบสบอลแล้วทักษะก็เป็นสิ่งสำคัญ\nแต่ก็ต้องมีโชคช่วยด้วยค่ะ"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "ที่ฉันตีลูกโฮมรันไม่ได้...\nน่าจะเป็นเพราะฉันโชคไม่ดีนะคะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "รางวัลที่ 1! ได้รางวัลที่ 1 เลยค่ะ\nคุณครู! ว้าว สุดยอดเลยค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "นี่รางวัลที่ 2 เลยนะคะ! ถึงจะน่าเสียดาย\nที่ไม่ได้รางวัลที่ 1 แต่นี่ก็ดีแล้วค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "รางวัลแห่งความโชคดีสินะคะ"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "จะว่าไปอาจเรียกได้ว่าของชิ้นนี้\nเป็นแก่นแท้ของการสุ่มรางวัลเลยก็ได้นะคะ?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "รางวัลชมเชย... สินะคะ"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "แต่ก็ไม่เป็นไรหรอกค่ะ\nชิ้นนี้ก็พอใช้ได้เลยนี่คะ?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "รางวัลเข้าร่วม..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "ไม่เป็นไรนะคะคุณครู!\nว่ากันว่าแค่เข้าร่วมก็ถือว่ามีความหมายแล้วค่ะ!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "เอาละ... ไม่มีเรื่องอะไรทั้งนั้นค่ะ!\nใช่มั้ยคะ... คุณครู?"
10115-CVGroup_UIEventMission_Enter1-1 = "สิ่งสำคัญของงานแบบนี้\nฉันว่าคือการทำต่อเนื่องให้เท่ากันในทุกวันค่ะ"
10115-CVGroup_UIEventMission_Enter1-2 = "การฝึกซ้อมก็เหมือนกันค่ะ!"
10115-CVGroup_UIEventMission_Enter2-1 = "ถึงงานที่ทำซ้ำๆ มันจะน่าเบื่อ..."
10115-CVGroup_UIEventMission_Enter2-2 = "แต่เราจะได้บางอย่างจากสิ่งนั้นอย่างแน่นอนค่ะ"
10115-CVGroup_UIEventMission_Idle1-1 = "นักกีฬาเก่งๆ จะกินของเดิมๆ และนอนเวลาเดิมทุกวัน"
10115-CVGroup_UIEventMission_Idle1-2 = "ส่วนเรื่องการฝึกซ้อม ก็จะทำตามมาตรฐานค่ะ..."
10115-CVGroup_UIEventMission_Idle1-3 = "ฉัน... น่าจะทำแบบนั้นไม่ไหวหรอกค่ะ..."
10115-CVGroup_UIEventMission_Idle2-1 = "ฉันรู้สึกว่าคุณครู ก็ยอดเยี่ยมเหมือนกันค่ะ"
10115-CVGroup_UIEventMission_Idle2-2 = "ไปทำงานทุกวัน... แล้วก็โหมงานหนักตลอด..."
10115-CVGroup_UIEventMission_Idle2-3 = "คะ? ฉันก็ไปโรงเรียนทุกวันเหมือนกันงั้นเหรอคะ?"
10115-CVGroup_UIEventMission_Idle2-4 = "แต่ได้ยินว่าการทำงานมันยากกว่า\nการเรียนเยอะเลยไม่ใช่เหรอคะ?"
10115-CVGroup_UIEventMission_Buy1-1 = "นี่เป็นเหมือนกับ... ผลจากการฝึกซ้อมเลยค่ะ!"
10115-CVGroup_UIEventMission_Buy1-2 = "ยินดีด้วยค่ะ คุณครู!"
10115-CVGroup_UIEventMission_Buy2-1 = "สำเร็จแล้วนะคะ คุณครู!"
10115-CVGroup_UIEventMission_Buy2-2 = "ฉันก็จะพยายามค่ะ! คอยเฝ้าดูฉันด้วยนะคะ!"
10115-CVGroup_UIEventMission_Interaction1-1 = "งานวันนี้เสร็จเท่านี้!"
10115-CVGroup_UIEventMission_Interaction1-2 = "ถ้างั้น หลังจากนี้พอมีเวลามั้ยคะ?"

[translation]
10115-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案！"
10115-CVGroup_CharacterGet_Idle1-1 = "千年科學學園第四棒打者，野正莉。\n目標是……打擊率一成！"
10115-CVGroup_Cafe_Idle1-1 = "堇前輩……總不會連這裡都在吧……？"
10115-CVGroup_Cafe_Idle2-1 = "為了有效率地練習，休息也很重要……"
10115-CVGroup_Cafe_Idle3-1 = "好像聽說咖啡因能提升運動效果。"
10115-CVGroup_Cafe_Idle4-1 = "（今天的練習，偷懶……是不行的吧）"
10115-CVGroup_Cafe_Idle5-1 = "那個鮮奶油，看起來很好吃……\n不行，忍耐忍耐。"
10115-CVGroup_WeaponGet_Idle1-1 = "如此細心的指導，真的非常感謝！\n我會趕緊成為三成打者，向老師報恩的！\n……不過，能先從一成開始嗎？"
10115-CVGroup_UIEventLobby_Enter1-1 = "老師！你喜歡棒球嗎？"
10115-CVGroup_UIEventLobby_Enter1-2 = "我非常喜歡！"
10115-CVGroup_UIEventLobby_Enter2-1 = "今天是重要的比賽哦！"
10115-CVGroup_UIEventLobby_Enter2-2 = "不，沒有一場比賽不是那樣的！"
10115-CVGroup_UIEventLobby_Enter3-1 = "不詳的氣氛……"
10115-CVGroup_UIEventLobby_Enter3-2 = "不過我還是相信！哪怕從現在開始也好，一起上演逆轉劇吧！"
10115-CVGroup_UIEventLobby_Enter4-1 = "棒球在九局下半兩出局之後才是重頭戲哦！"
10115-CVGroup_UIEventLobby_Enter4-2 = "不怠於準備的人，機會的女神才會對他微笑！"
10115-CVGroup_UIEventLobby_Enter5-1 = "真不敢相信……"
10115-CVGroup_UIEventLobby_Enter5-2 = "我竟然……打出了全壘打……"
10115-CVGroup_UIEventLobby_Enter5-3 = "棒球……實在太棒了！"
10115-CVGroup_UIEventLobby_Idle1-1 = "如果是規則的話，請儘管問我吧！"
10115-CVGroup_UIEventLobby_Idle2-1 = "……我正在看比賽紀錄。"
10115-CVGroup_UIEventLobby_Idle2-2 = "如此龐大的紀錄，以前好像都是用紙本管理的。"
10115-CVGroup_UIEventLobby_Idle2-3 = "現在簡直無法想像呢……"
10115-CVGroup_UIEventLobby_Idle3-1 = "哇哇，很癢耶！"
10115-CVGroup_UIEventLobby_Idle3-2 = "老師！請不要摸奇怪的地方！"
10115-CVGroup_UIEventLobby_Idle3-3 = "真是的……現在還在比賽耶……！？\n而且有人在看哦？"
10115-CVGroup_UIEventLobby_Idle4-1 = "球場美食！這也是絕品哦！"
10115-CVGroup_UIEventLobby_Idle4-2 = "老師，去吃點東西吧！"
10115-CVGroup_UIEventLobby_Idle4-3 = "至於價格……在意的話就輸了！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "老師！體育場正在舉辦抽獎！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "其實我被抓來幫忙了……"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "現在正在舉辦抽獎！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "請來看看吧！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "怎麼樣？有像是店員嗎？"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "剩下的抽獎券，請記得用完哦！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "好像也會照常支付打工的薪水哦！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "嘿嘿，來買個新手套吧？"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "選手必須具備的，是技術和運氣。"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "……之所以打不出全壘打，說不定是運氣不好！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "哇！1等獎！是1等獎耶！太厲害了！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "是2等獎呢！\n真不愧是你，老師！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "好像是幸運獎呢！老師！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "總覺得現在的話，感覺能打出全壘打！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "是3等獎呢。"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "有得獎是件好事！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "參加獎啊……"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "沒關係的，老師！\n不是有句話叫「參加就有意義」嗎！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "…………剛才什麼都沒發生。\n對吧，老師？"
10115-CVGroup_UIEventMission_Enter1-1 = "重要的……是每天持之以恆！"
10115-CVGroup_UIEventMission_Enter1-2 = "就跟訓練一樣呢！"
10115-CVGroup_UIEventMission_Enter2-1 = "就算是例行公事，只要習慣就沒問題了！"
10115-CVGroup_UIEventMission_Enter2-2 = "每天累積的成果，會讓人越來越輕鬆的哦。"
10115-CVGroup_UIEventMission_Idle1-1 = "偉大的選手從起床時間、訓練清單到餐點內容都會全部做好規劃……"
10115-CVGroup_UIEventMission_Idle1-2 = "並且照著進行。"
10115-CVGroup_UIEventMission_Idle1-3 = "我的話……感覺做不到……"
10115-CVGroup_UIEventMission_Idle2-1 = "現在說可能有點晚了……不過老師還真厲害呢。"
10115-CVGroup_UIEventMission_Idle2-2 = "早上就要上班，整天都在工作……"
10115-CVGroup_UIEventMission_Idle2-3 = "跟每天上學一樣……？"
10115-CVGroup_UIEventMission_Idle2-4 = "但我聽說大人比學校辛苦很多倍耶？不是嗎？"
10115-CVGroup_UIEventMission_Buy1-1 = "努力有所收穫，就是這麼回事吧！"
10115-CVGroup_UIEventMission_Buy1-2 = "恭喜你，老師！"
10115-CVGroup_UIEventMission_Buy2-1 = "成功了呢，老師！"
10115-CVGroup_UIEventMission_Buy2-2 = "為了不輸給你，我也會打起精神的！"
10115-CVGroup_UIEventMission_Interaction1-1 = "今天就到此為止！辛苦了！"
10115-CVGroup_UIEventMission_Interaction1-2 = "老師！你接下來有空嗎？"

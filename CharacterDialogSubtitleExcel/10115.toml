[translation]
10115-CVGroup_UITitle_Idle1-1 = "블루, 아카이브!"
10115-CVGroup_CharacterGet_Idle1-1 = "밀레니엄의 4번 타자, 노마사 레이입니다. 선생님.\n……지금의 목표는, 1할입니다."
10115-CVGroup_Cafe_Idle1-1 = "……스미레 선배, 여기까지 쫓아온 건 아니겠지?"
10115-CVGroup_Cafe_Idle2-1 = "연습도 훈련도 중요하지만, 적당한 휴식도 역시……"
10115-CVGroup_Cafe_Idle3-1 = "적당한 카페인은, 훈련 효과를 높인다고 하니까……"
10115-CVGroup_Cafe_Idle4-1 = "(오늘 하루만…… 훈련, 땡땡이칠까……)"
10115-CVGroup_Cafe_Idle5-1 = "저 휘핑크림 맛있겠지…… 아냐. 참아야 해."
10115-CVGroup_WeaponGet_Idle1-1 = "감사합니다, 선생님. 저를 위해서 이런 것까지……\n선생님께 보답하기 위해서라도, 반드시 3할 이상을 치고 말겠어요!\n……지금은 1할부터 달성해야 하겠지만요……"
10115-CVGroup_UIEventLobby_Enter1-1 = "야구 좋아하시나요, 선생님?"
10115-CVGroup_UIEventLobby_Enter1-2 = "저는, 정말로 좋아해요!"
10115-CVGroup_UIEventLobby_Enter2-1 = "오늘 경기는 중요합니다!"
10115-CVGroup_UIEventLobby_Enter2-2 = "사실 중요하지 않은 경기는 없지만요!"
10115-CVGroup_UIEventLobby_Enter3-1 = "경기 흐름이 미묘하지만……"
10115-CVGroup_UIEventLobby_Enter3-2 = "저는 역전할 수 있을 거라고 믿어요!"
10115-CVGroup_UIEventLobby_Enter4-1 = "야구는 9회 말 투아웃부터라고 하죠!"
10115-CVGroup_UIEventLobby_Enter4-2 = "준비하고 있지 않으면, 기회는 오지 않으니까요!"
10115-CVGroup_UIEventLobby_Enter5-1 = "아직도 믿기지 않아요."
10115-CVGroup_UIEventLobby_Enter5-2 = "제가 홈런을 치다니…… 그 타구, 그 궤적……"
10115-CVGroup_UIEventLobby_Enter5-3 = "야구는 정말로 좋네요!"
10115-CVGroup_UIEventLobby_Idle1-1 = "왜 그러세요, 선생님?\n혹시 야구 규칙에 대해, 알고 싶은 것이 있으세요?"
10115-CVGroup_UIEventLobby_Idle2-1 = "경기 기록을 찾아보고 있었어요."
10115-CVGroup_UIEventLobby_Idle2-2 = "지금은 인터넷에 정리되어 있어서 편한데."
10115-CVGroup_UIEventLobby_Idle2-3 = "예전에는 자료들을 하나하나 찾아야 했다고 하네요."
10115-CVGroup_UIEventLobby_Idle3-1 = "여, 옆구리는 안 돼요,"
10115-CVGroup_UIEventLobby_Idle3-2 = "선생님! 겨드랑이도요……!"
10115-CVGroup_UIEventLobby_Idle3-3 = "일단은 경기 중이고, 사람도 많으니까요……"
10115-CVGroup_UIEventLobby_Idle4-1 = "뭔가 주문할까요?"
10115-CVGroup_UIEventLobby_Idle4-2 = "야구장 음식이 또 별미거든요!"
10115-CVGroup_UIEventLobby_Idle4-3 = "가격은…… 조금 잊어버리도록 하죠. 네."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "경기장에서 경품 추첨을 한다고 해요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "어쩌다가 제가 도우미까지 하게 된 건지는 모르겠지만요……"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "어서 오세요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "행운을 시험해 보시겠어요?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "어때요, 선생님? 조금 프로 같아 보였나요?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "안녕하세요, 선생님. 혹시 남은 추첨권이 있으시다면,\n전부 사용하고 가시면 좋을 것 같아요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "일일 경품 추첨 도우미지만, 아르바이트비도 확실히 준대요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "일단 글러브를 새것으로 바꾸려고요."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "야구는 기술도 중요하지만, 운도 따라 줘야 하죠."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "……제가 홈런을 못 치는 것은, 운이 없기 때문 아닐까요?!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "1등상! 1등상이에요, 선생님! 우와, 대단해요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "이건 2등상이네요! 1등이 아닌 것은 아쉽지만, 그래도 이게 어딘가요!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "행운상이군요."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "어떻게 보면 이 상이야말로,\n경품 추첨의 본질이라고 볼 수도 있지 않을까요?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "장려상…… 인가요."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "에이, 뭐 어때요. 이것도 충분히 좋잖아요?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "참가상……"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "괜찮아요, 선생님! 참가하는 것에 의의가 있다는 말도 있고요! 네!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "…………자, 아무 일도 없었어요! ……그렇죠, 선생님?"
10115-CVGroup_UIEventMission_Enter1-1 = "이런 일에서 중요한 것은,\n같은 분량을, 매일 꾸준히 계속하는 것이라고 생각해요."
10115-CVGroup_UIEventMission_Enter1-2 = "훈련과 마찬가지네요!"
10115-CVGroup_UIEventMission_Enter2-1 = "반복되는 일은 지루할지도 모르지만……"
10115-CVGroup_UIEventMission_Enter2-2 = "거기에서 얻을 수 있는 것도, 분명히 있을 테니까요."
10115-CVGroup_UIEventMission_Idle1-1 = "위대한 선수들은, 매일 같은 것만 먹고, 같은 시간에 자고."
10115-CVGroup_UIEventMission_Idle1-2 = "훈련도 정확히 기준을 지켜 가면서 한다죠……"
10115-CVGroup_UIEventMission_Idle1-3 = "저는…… 그 정도로는 힘들어서 못 할 것 같아요……"
10115-CVGroup_UIEventMission_Idle2-1 = "새삼 선생님도 대단하시다는 생각이 들어요."
10115-CVGroup_UIEventMission_Idle2-2 = "매일 출근하시고…… 업무에 치여 지내시고……"
10115-CVGroup_UIEventMission_Idle2-3 = "네? 저도 학교에 매일 가지 않냐고요?"
10115-CVGroup_UIEventMission_Idle2-4 = "하지만 학교보다 직장이 훨씬 힘들다고 들었는데, 아닌가요?"
10115-CVGroup_UIEventMission_Buy1-1 = "훈련의 성과…… 같은 것이네요!"
10115-CVGroup_UIEventMission_Buy1-2 = "축하드려요, 선생님!"
10115-CVGroup_UIEventMission_Buy2-1 = "해내셨네요, 선생님!"
10115-CVGroup_UIEventMission_Buy2-2 = "저도 열심히 하겠습니다. 지켜봐 주세요!"
10115-CVGroup_UIEventMission_Interaction1-1 = "오늘 일정은 이것으로 끝!"
10115-CVGroup_UIEventMission_Interaction1-2 = "그래서 말인데요. 이다음에 시간 되시나요?"

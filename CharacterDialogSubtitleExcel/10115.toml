[translation]
10115-CVGroup_UITitle_Idle1-1 = "Blue, Archive!"
10115-CVGroup_CharacterGet_Idle1-1 = "Millennium's cleanup hitter, Nomasa Rei. ...Sensei, my goal right now is to hit a 0.10 batting average."
10115-CVGroup_Cafe_Idle1-1 = "...Sumire didn't follow me all the way here, did she?"
10115-CVGroup_Cafe_Idle2-1 = "Practice and training are important, but so is adequate rest..."
10115-CVGroup_Cafe_Idle3-1 = "They say a moderate amount of caffeine can increase the effectiveness of your training..."
10115-CVGroup_Cafe_Idle4-1 = "(Maybe I'll skip training...just for today...)"
10115-CVGroup_Cafe_Idle5-1 = "That whipped cream looks delicious... No. I have to control myself."
10115-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei. Doing all this for me... I'm going to repay you by achieving a 0.30 batting average... I guess I should start with aiming for 0.10 for now..."
10115-CVGroup_UIEventLobby_Enter1-1 = "Do you like baseball, Sensei?"
10115-CVGroup_UIEventLobby_Enter1-2 = "Me? I love it!"
10115-CVGroup_UIEventLobby_Enter2-1 = "Today's game is important!"
10115-CVGroup_UIEventLobby_Enter2-2 = "But every game is important!"
10115-CVGroup_UIEventLobby_Enter3-1 = "The game isn't going well..."
10115-CVGroup_UIEventLobby_Enter3-2 = "We can still make a comeback!"
10115-CVGroup_UIEventLobby_Enter4-1 = "They say real baseball starts in the 9th inning, with 2 outs!"
10115-CVGroup_UIEventLobby_Enter4-2 = "You have to be prepared to grab the opportunity when it arises!"
10115-CVGroup_UIEventLobby_Enter5-1 = "I still can't believe it."
10115-CVGroup_UIEventLobby_Enter5-2 = "I hit a home run... That hit, that trajectory..."
10115-CVGroup_UIEventLobby_Enter5-3 = "Baseball is really amazing!"
10115-CVGroup_UIEventLobby_Idle1-1 = "What's wrong, Sensei? Do you have any questions about the rules of baseball?"
10115-CVGroup_UIEventLobby_Idle2-1 = "I was looking through the game records."
10115-CVGroup_UIEventLobby_Idle2-2 = "It's easy nowadays because they're all organized on the internet."
10115-CVGroup_UIEventLobby_Idle2-3 = "But in past, people had to dig for resources piece by piece."
10115-CVGroup_UIEventLobby_Idle3-1 = "D-Don't poke my sides..."
10115-CVGroup_UIEventLobby_Idle3-2 = "Sensei! Not my armpit either...!"
10115-CVGroup_UIEventLobby_Idle3-3 = "Since we're at a game, and there are lots of people..."
10115-CVGroup_UIEventLobby_Idle4-1 = "...should we order something to eat?"
10115-CVGroup_UIEventLobby_Idle4-2 = "Baseball stadium foods are delicacies!"
10115-CVGroup_UIEventLobby_Idle4-3 = "Although the prices are...a bit high? Let's not think about it. Yeah."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "They're holding a raffle at the stadium!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "I don't know how I got roped into helping them out, though..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "Welcome!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "Would you like to try your luck?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "How is it, Sensei? Did I sound professional?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "Hello, Sensei. If you have any leftover raffle tickets, please use them all before you leave!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "I'm just helping out for today, but they said they'll pay me for the part-time work!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "I'm thinking of changing my mitt first."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "In baseball, skills are important, but so is luck."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "...Maybe I just need more luck to be able to hit a home run?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "First place! It's the first place prize, Sensei! Whoa, how amazing!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "This is the second place prize! It's a shame that you didn't get first place, but this is still incredible!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "A lucky prize."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "In a way, this prize is the essence of a raffle, right?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "An honorable mention..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "Well, whatever. This is still good, right?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "A participation award..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "Don't worry about it, Sensei! They say participation is what really matters! Yeah!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "...Okay, nothing happened! ...Isn't that right, Sensei?"
10115-CVGroup_UIEventMission_Enter1-1 = "What really matters in these kinds of situations is to be consistent with your work output!"
10115-CVGroup_UIEventMission_Enter1-2 = "Just like training!"
10115-CVGroup_UIEventMission_Enter2-1 = "Repetitive work IS pretty boring..."
10115-CVGroup_UIEventMission_Enter2-2 = "...but there's a lot you can learn from it too!"
10115-CVGroup_UIEventMission_Idle1-1 = "They say great players eat the same thing, sleep at same time..."
10115-CVGroup_UIEventMission_Idle1-2 = "...and meet the same, strict standards for training everyday..."
10115-CVGroup_UIEventMission_Idle1-3 = "I'm...not sure if I have the energy for all that..."
10115-CVGroup_UIEventMission_Idle2-1 = "You're making me realize how incredible you are again."
10115-CVGroup_UIEventMission_Idle2-2 = "Clocking in every day...getting swarmed by work..."
10115-CVGroup_UIEventMission_Idle2-3 = "What? Don't I also go to school everyday?"
10115-CVGroup_UIEventMission_Idle2-4 = "But I heard work is way harder than school, no?"
10115-CVGroup_UIEventMission_Buy1-1 = "It's like...the fruits of training!"
10115-CVGroup_UIEventMission_Buy1-2 = "Congratulations, Sensei!"
10115-CVGroup_UIEventMission_Buy2-1 = "You did it, Sensei!"
10115-CVGroup_UIEventMission_Buy2-2 = "I'm going to work hard too. Please watch me!"
10115-CVGroup_UIEventMission_Interaction1-1 = "And that's it for today's schedule!"
10115-CVGroup_UIEventMission_Interaction1-2 = "Sooo, do you have some spare time after this?"

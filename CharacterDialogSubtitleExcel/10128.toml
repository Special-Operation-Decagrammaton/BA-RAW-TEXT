[translation]
10128-CVGroup_UITitle_Idle1-1 = "This is! Blue Archive!"
10128-CVGroup_CharacterGet_Idle1-1 = "Another great choice from our— No, I mean Sensei! ...Pardon my late introduction. I'm Wakasa Fuyu, a second-year at Wildhunt Art Academy. Make sure to remember me!"
10128-CVGroup_Cafe_Idle1-1 = "Huh, isn't this a quite decent spot for a business meeting?"
10128-CVGroup_Cafe_Idle2-1 = "If I were to install a screen, where should I..."
10128-CVGroup_Cafe_Idle3-1 = "(Aren't these beans pretty decent? Should I try importing these too?)"
10128-CVGroup_Cafe_Idle4-1 = "But... I wonder if Sensei's going to be here."
10128-CVGroup_Cafe_Idle5-1 = "(I-Is that Prefectural Council? What should I do? Run away?!)"
10128-CVGroup_WeaponGet_Idle1-1 = "I'll absolutely repay you for this...! Because that's business! So... Until then, please stay by my side."
10128-CVGroup_UIEventLobby_Enter1-1 = "Hello! I'm Wakasa Fuyu, the Sales Manager of the Free Trade Cartel!"
10128-CVGroup_UIEventLobby_Enter2-1 = "If there's anything you need, please feel free to contact me."
10128-CVGroup_UIEventLobby_Enter3-1 = "Fu, fufu, fu... I-I can easily handle something like this, you know?"
10128-CVGroup_UIEventLobby_Enter4-1 = "(How did things end up this way? What did I do wrong? This is doomed, right? Right? Really is, right?!)"
10128-CVGroup_UIEventLobby_Enter5-1 = "Fu... Fufu... I should avoid commissions like this one for a while..."
10128-CVGroup_UIEventLobby_Idle1-1 = "Yes, you're right. I am the face of our club."
10128-CVGroup_UIEventLobby_Idle2-1 = "Going to meetings, taking commissions, handling the customers... Yes, that is my role."
10128-CVGroup_UIEventLobby_Idle3-1 = "Of course, without support from Miyo or Ritsu, I would've been just an ordinary art student."
10128-CVGroup_UIEventLobby_Idle4-1 = "...Art really isn't easy at all."
10128-CVGroup_UIEventShop_Enter1-1 = "We're still open and have plenty of stock. Please take your time."
10128-CVGroup_UIEventShop_Enter2-1 = "Is there anything you're looking for?"
10128-CVGroup_UIEventShop_Enter3-1 = "The shop will stay open for a while longer. Please take your time."
10128-CVGroup_UIEventShop_Idle1-1 = "You're looking to procure something? ...We should talk about it over there."
10128-CVGroup_UIEventShop_Idle2-1 = "Pfft! E-Even if you poke me like that, you're not getting a discount!"
10128-CVGroup_UIEventShop_Buy1-1 = "You have sophisticated eyes."
10128-CVGroup_UIEventShop_Buy2-1 = "I also had my eyes on that product."
10128-CVGroup_UIEventShop_Buy3-1 = "Refunds and exchanges would be difficult, you know?"
10128-CVGroup_UIEventShop_Buy4-1 = "That's a great choice. Do you need it wrapped, by any chance?"

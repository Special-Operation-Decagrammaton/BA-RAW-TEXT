[translation]
10128-CVGroup_UITitle_Idle1-1 = "블루 아카이브! 입니다!"
10128-CVGroup_CharacterGet_Idle1-1 = "탁월한 선택이십니다, 고객……아니, 선생님!\n……소개가 늦었습니다. 와일드헌트 예술학원 2학년,\n와카사 후유입니다. 앞으로, 기억해 두세요!"
10128-CVGroup_Cafe_Idle1-1 = "뭐야, 제법 좋은 비즈니스 미팅 장소가 있었잖아?"
10128-CVGroup_Cafe_Idle2-1 = "스크린을 설치한다면, 어디가 좋을까……."
10128-CVGroup_Cafe_Idle3-1 = "(원두가 제법 괜찮은걸? 이것도 한 번 수입해 볼까나?)"
10128-CVGroup_Cafe_Idle4-1 = "그런데…… 선생님은 안 오시려나."
10128-CVGroup_Cafe_Idle5-1 = "(저, 저거 설마 사감대인가? 어쩌지? 도망쳐야 하나?!)"
10128-CVGroup_WeaponGet_Idle1-1 = "이건 언젠가 반드시 갚겠습니다……!\n그것이 비즈니스니까요!\n그러니까…… 그때까지, 곁에 있어 주세요."
10128-CVGroup_UIEventLobby_Enter1-1 = "인사드립니다! 특수교역부의 영업실장, 와카사 후유입니다!"
10128-CVGroup_UIEventLobby_Enter2-1 = "필요한 것이 있다면, 부담 없이 문의 바랍니다."
10128-CVGroup_UIEventLobby_Enter3-1 = "후, 후후, 후…… 이, 이런 일쯤은 충분히 대응 가능하다고요?"
10128-CVGroup_UIEventLobby_Enter4-1 = "(왜 이렇게 됐지? 뭘 잘못했지? 이거 망한 거죠? 그렇죠? 역시 그렇죠?!)"
10128-CVGroup_UIEventLobby_Enter5-1 = "후…… 후후…… 당분간 이런 의뢰는 피해야겠어요……."
10128-CVGroup_UIEventLobby_Idle1-1 = "예, 맞아요. 제가 바로 저희 동아리의 얼굴이죠."
10128-CVGroup_UIEventLobby_Idle2-1 = "접선하고, 의뢰를 받고, 고객을 응대하고…… 예, 그게 저의 역할이랍니다."
10128-CVGroup_UIEventLobby_Idle3-1 = "물론 미요와 리츠 쨩의 서포트가 없다면, 저는 그저 평범한 예술학원 학생에 지나지 않았겠죠."
10128-CVGroup_UIEventLobby_Idle4-1 = "……예술이란, 정말 쉽지 않네요."
10128-CVGroup_UIEventShop_Enter1-1 = "시간도 재고도 충분하답니다. 여유롭게 둘러보시길."
10128-CVGroup_UIEventShop_Enter2-1 = "찾으시는 물건이 있으신가요?"
10128-CVGroup_UIEventShop_Enter3-1 = "폐점까지는 시간이 좀 남았습니다. 차분히 둘러보세요."
10128-CVGroup_UIEventShop_Idle1-1 = "따로 원하는 게 있으시다고요? ……이쪽에서 한 번 이야기해 보시죠."
10128-CVGroup_UIEventShop_Idle2-1 = "푸핫! 그, 그렇게 찌르셔도 할인은 안 된다고요?"
10128-CVGroup_UIEventShop_Buy1-1 = "세련된 안목이시군요."
10128-CVGroup_UIEventShop_Buy2-1 = "저도 눈여겨보던 제품입니다."
10128-CVGroup_UIEventShop_Buy3-1 = "교환 및 환불은 어렵답니다?"
10128-CVGroup_UIEventShop_Buy4-1 = "훌륭한 선택입니다. 혹시 포장, 필요하신가요?"

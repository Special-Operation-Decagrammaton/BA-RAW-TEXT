[translation]
10128-CVGroup_UITitle_Idle1-1 = "是蔚藍檔案唷～！"
10128-CVGroup_CharacterGet_Idle1-1 = "哦呀……眼光真好呢，客人……不，老師！\n……自我介紹晚了。我是狂獵藝術學院二年級，若狹冬。\n往後請多指教！"
10128-CVGroup_Cafe_Idle1-1 = "嘿～感覺很適合當成會面的場所呢。"
10128-CVGroup_Cafe_Idle2-1 = "要設置螢幕的話，該選哪裡好呢……"
10128-CVGroup_Cafe_Idle3-1 = "（這裡的咖啡，用了不錯的豆子呢……這也要進貨看看嗎？）"
10128-CVGroup_Cafe_Idle4-1 = "話說……老師不會來嗎。"
10128-CVGroup_Cafe_Idle5-1 = "（那是……舍監隊！？怎麼辦……要逃嗎！？）"
10128-CVGroup_WeaponGet_Idle1-1 = "獲得多少投資就要給出更高的回報。\n這就是商業！所以……在能回報的時刻到來之前，請待在我身邊吧，老師。"
10128-CVGroup_UIEventLobby_Enter1-1 = "我是特殊交易部的營業室長！若狹冬！"
10128-CVGroup_UIEventLobby_Enter2-1 = "如果有什麼想要的東西，歡迎隨時找我商量。"
10128-CVGroup_UIEventLobby_Enter3-1 = "呵，呵呵……和平常一樣呢。沒有問題。"
10128-CVGroup_UIEventLobby_Enter4-1 = "（怎麼會……？到底是哪裡出錯了……？）\n（已經結束了？對吧？果然結束了對吧！？）"
10128-CVGroup_UIEventLobby_Enter5-1 = "呵……呵呵……\n這類的委託，暫時先別接了吧……"
10128-CVGroup_UIEventLobby_Idle1-1 = "沒錯，特殊交易部的窗口負責人就是我。"
10128-CVGroup_UIEventLobby_Idle2-1 = "進行接觸、承接委託，並讓客人滿意……這就是我的職責。"
10128-CVGroup_UIEventLobby_Idle3-1 = "要是沒有美代和律醬的支援，我這種人就只是個普通的藝術學院生而已。"
10128-CVGroup_UIEventLobby_Idle4-1 = "……藝術這種東西，其實還挺困難的呢。"
10128-CVGroup_UIEventShop_Enter1-1 = "庫存非常充足哦。\n還請盡情參觀選購。"
10128-CVGroup_UIEventShop_Enter2-1 = "找到想要的東西了嗎？"
10128-CVGroup_UIEventShop_Enter3-1 = "短時間內還沒問題哦。\n請慢慢參觀。"
10128-CVGroup_UIEventShop_Idle1-1 = "想要這裡沒有的東西……？\n……那我們到那邊談吧。"
10128-CVGroup_UIEventShop_Idle2-1 = "哈哈！戳我也不會變便宜唷？"
10128-CVGroup_UIEventShop_Buy1-1 = "不愧是老師。眼光真不錯呢。"
10128-CVGroup_UIEventShop_Buy2-1 = "那個，是我最推薦的商品。"
10128-CVGroup_UIEventShop_Buy3-1 = "商品無法退換貨。敬請見諒。"
10128-CVGroup_UIEventShop_Buy4-1 = "好選擇。需要幫你包裝嗎？"

[translation]
16001-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16001-CVGroup_CharacterGet_Idle1-1 = "和主人一起！\n開始快樂的一天吧！"
16001-CVGroup_Cafe_Idle1-1 = "唔嗯…衣服好緊。\n我變胖了嗎？還是又…？"
16001-CVGroup_Cafe_Idle2-1 = "好閒喔～\n有什麼漫畫書嗎～？"

16001-CVGroup_Cafe_Idle4-1 = "啦啦啦～總覺得今天好像會發生什麼好事～\n主人也這麼覺得吧？"
16001-CVGroup_Cafe_Idle5-1 = "主人，歡迎你來～\n我會讓你打起精神！"
16001-CVGroup_Cafe_Idle6-1 = "啊！是主人！\n你要吃飯～洗澡～？\n還是…耶嘿嘿！"
16001-CVGroup_WeaponGet_Idle1-1 = "主人！你看你看！\n新的武器送來了！\n閃閃發光的很可愛吧！？"

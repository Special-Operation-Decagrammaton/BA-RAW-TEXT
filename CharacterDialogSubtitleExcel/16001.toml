[translation]
16001-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16001-CVGroup_CharacterGet_Idle1-1 = "ลุยไปกับนายท่าน! ในวันที่แสนสนุก!\nมาลุยไปด้วยกันเลย!"
16001-CVGroup_Cafe_Idle1-1 = "อืม เสื้อดูคับๆ จัง\nน้ำหนักขึ้นรึเปล่านะ? หรือว่าไม่ใช่นะ...?"
16001-CVGroup_Cafe_Idle2-1 = "น่าเบื่อจัง~\nมีหนังสือการ์ตูนให้อ่านมั้ยนะ?"
16001-CVGroup_Cafe_Idle3-1 = "ลั้ลลัลลา~"
16001-CVGroup_Cafe_Idle4-1 = "ลั้ลลัลลา~ วันนี้ดูเหมือน~ จะมีเรื่องดีๆ เกิดขึ้นเลยน้า~\nนายท่านก็คิดเหมือนกันใช่มั้ย?~"
16001-CVGroup_Cafe_Idle5-1 = "นายท่าน~ รีบมาสิ~\nฉันจะทำให้นายท่านรู้สึกดีเอง!"
16001-CVGroup_Cafe_Idle6-1 = "อ๊ะ?! นายท่านนี่นา!\nจะทานข้าว~ อาบน้ำ~ หรือว่า… ฮ่าๆ!"
16001-CVGroup_WeaponGet_Idle1-1 = "นายท่าน! ดูสิๆ! อาวุธใหม่มาถึงแล้ว!\nดูเงางามสวยมากๆ เลยใช่มั้ยล่ะ?!"

[translation]
23004-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
23004-CVGroup_CharacterGet_Idle1-1 = "讓少女變美的不是化妝，而是熱情。"
23004-CVGroup_Cafe_Idle1-1 = "…如果製作老師的機器人…也許就能成為有錢人。"
23004-CVGroup_Cafe_Idle2-1 = "這麼說來，\n差不多該整備直升機了。"
23004-CVGroup_Cafe_Idle3-1 = "唔嗯…\n有戰鬥功能的免治馬桶如何。"
23004-CVGroup_Cafe_Idle4-1 = "為什麼沒有人需要光學迷彩內衣呢…\n明明是件自信之作…"
23004-CVGroup_Cafe_Idle5-1 = "唔嗯……\n沒有什麼需要修理的東西嗎？"
23004-CVGroup_WeaponGet_Idle1-1 = "從我指尖催生的奇蹟，設計和製作。\n老師，請期待我日後的表現。"

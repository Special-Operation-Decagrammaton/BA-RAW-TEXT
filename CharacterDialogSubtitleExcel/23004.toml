[translation]
23004-CVGroup_UITitle_Idle1-1 = "Blue Archive"
23004-CVGroup_CharacterGet_Idle1-1 = "สิ่งที่เพิ่มเสน่ห์ให้ผู้หญิง ไม่ใช่เครื่องสำอาง\nแต่เป็นความมุ่งมั่นต่างหาก"
23004-CVGroup_Cafe_Idle1-1 = "หากฉันสร้างหุ่นยนต์คุณครู ฉันอาจรวยก็ได้"
23004-CVGroup_Cafe_Idle2-1 = "จริงสิ! ฉันควรเริ่มซ่อมเฮลิคอปเตอร์ได้แล้ว"
23004-CVGroup_Cafe_Idle3-1 = "อืมม... สายชำระที่มีฟังก์ชั่นต่อสู้...\nเข้าท่าแฮะ"
23004-CVGroup_Cafe_Idle4-1 = "ทำไมไม่มีใครอยากได้ชุดชั้นในที่ใช้พรางตัวได้บ้างนะ...?\nนั่นเป็นผลงานของฉันเลยนะ..."
23004-CVGroup_Cafe_Idle5-1 = "อืมม... มีอะไรที่ต้องซ่อมแซมบ้างมั้ยนะ?"
23004-CVGroup_WeaponGet_Idle1-1 = "ปาฏิหาริย์ที่เกิดขึ้นด้วยมือของฉัน\nแผนการและการสร้าง\nคุณครู คอยดูฝีมือของฉันต่อไปให้ดีล่ะ"

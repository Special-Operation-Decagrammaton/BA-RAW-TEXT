[translation]
20032-CVGroup_UIMiniEventLobby_Enter1-1 = "老師，你好。\n覺得新基地如何？"
20032-CVGroup_UIMiniEventLobby_Enter2-1 = "要做的事真多……"
20032-CVGroup_UIMiniEventLobby_Enter2-2 = "一件一件去解決吧。"
20032-CVGroup_UIMiniEventLobby_Enter3-1 = "歡迎回來，老師。\n儘管開口吧。"
20032-CVGroup_UIMiniEventLobby_Idle1-1 = "陽葵部長，好像很忙。"
20032-CVGroup_UIMiniEventLobby_Idle1-2 = "……不過看起來很開心，應該沒事吧。"
20032-CVGroup_UIMiniEventLobby_Idle2-1 = "覺得冷就過來這邊吧，老師。"
20032-CVGroup_UIMiniEventLobby_Idle2-2 = "那樣的話，對彼此都更有效率才對？"
20032-CVGroup_UIMiniEventLobby_Idle3-1 = "氣溫與狀態有著密不可分的關係。"
20032-CVGroup_UIMiniEventLobby_Idle3-2 = "所以，這裡很涼我喜歡。"
20032-CVGroup_UIMiniEventLobby_Idle4-1 = "辛苦了，老師。\n那個，能讓我看看嗎？"
20032-CVGroup_UIMiniEventLobby_Idle5-1 = "只要有老師在，作戰的成功率就會上升。"
20032-CVGroup_UIMiniEventLobby_Idle5-2 = "……我的狀態也會比較好。"
20032-CVGroup_UIMiniEventShop_Enter1-1 = "這裡就是將老師收集回來的東西……加以分析的地點。應該吧。"
20032-CVGroup_UIMiniEventShop_Enter2-1 = "樣本永遠不嫌多。\n麻煩你囉。"
20032-CVGroup_UIMiniEventShop_Enter3-1 = "來得正是時候呢。\n效率是很重要的，老師也明白了嗎？"
20032-CVGroup_UIMiniEventShop_Idle1-1 = "嗯？怎麼了嗎？"
20032-CVGroup_UIMiniEventShop_Idle1-2 = "……只是叫叫看而已？\n為什麼……？"
20032-CVGroup_UIMiniEventShop_Idle1-3 = "……算了，老師想要的話，也行吧。"
20032-CVGroup_UIMiniEventShop_Idle2-1 = "聽說只要拿這個做那個，就會有東西跑出來。"
20032-CVGroup_UIMiniEventShop_Idle2-2 = "……雖然我也不是很懂，"
20032-CVGroup_UIMiniEventShop_Idle2-3 = "但根據部長的說明大概就是這樣哦。"
20032-CVGroup_UIMiniEventShop_Idle3-1 = "分析的時候好像沒什麼事能做。"
20032-CVGroup_UIMiniEventShop_Idle3-2 = "……老師的大腿，我可以坐嗎？"
20032-CVGroup_UIMiniEventShop_Idle4-1 = "「因為體溫也會成為變數……"
20032-CVGroup_UIMiniEventShop_Idle4-2 = "所以分析時不要靠近」被這麼說了……"
20032-CVGroup_UIMiniEventShop_Idle4-3 = "雖然我也能理解，但好像還是有點寂寞。"
20032-CVGroup_UIMiniEventShop_Idle5-1 = "這個地方……我好像挺喜歡的。"
20032-CVGroup_UIMiniEventShop_Idle5-2 = "不能把部室的一部分搬來這裡嗎？"
20032-CVGroup_UIMiniEventShop_Buy1-1 = "來，給你。"
20032-CVGroup_UIMiniEventShop_Buy1-2 = "……這種行為，是叫做「以物易物」嗎？"
20032-CVGroup_UIMiniEventShop_Buy2-1 = "結果出來囉。你想拿哪一份？"
20032-CVGroup_UIMiniEventShop_Buy3-1 = "嗯。那個挺不錯的呢。"
20032-CVGroup_UIMiniEventShop_Buy4-1 = "要是結果也能有多樣性就好了。"
20032-CVGroup_UIMiniEventShop_Buy4-2 = "……現狀就夠了？\n這樣啊。"
20032-CVGroup_UIMiniEventShop_Buy5-1 = "雖然我也搞不太清楚，"
20032-CVGroup_UIMiniEventShop_Buy5-2 = "要是這個能幫上老師的忙就好了。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "從現在起，要稍微調整一下樣本的調查方式。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "好像說……是能試手氣的地方。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "不確定的東西，只有未來就夠了吧。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "要賭在老師的運氣上嗎？"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "那麼，我的份也拜託了。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "陽葵部長似乎有點變了……"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "對我來說好像有點遺憾。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "畢竟我比較喜歡結果明確一點。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "這個方式，季好像還挺滿意的。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "……雖然沒有表現在臉上，"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "不過季是幾乎能享受所有情況的類型對吧。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "方法論……我雖然不是很清楚，"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "不過有東西改變了這點，我還是知道的。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "如果抽到摃龜的話，我說不定會丟下老師不管哦？"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……剛才是開玩笑的。\n無論運氣是好是壞，我都會陪在老師身邊的。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "對結果不滿意的話，就跟我說吧。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "我可以安慰你。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "中獎了呢。\n恭喜你，老師。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "原來大獎什麼的，真的存在啊……"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "嚇我一跳……老師真的很幸運呢。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "這是老師和我們的努力獲得的結果，對吧。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "恭喜你，老師。\n要來乾杯嗎？"
20032-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20032-CVGroup_CharacterGet_Idle1-1 = "身體好像比平常輕盈。\n是因為很涼爽的關係嗎？"
20032-CVGroup_Cafe_Idle1-1 = "陽葵前輩不在，趕快趁現在……"
20032-CVGroup_Cafe_Idle2-1 = "要是這裡有刨冰就完美了。"
20032-CVGroup_Cafe_Idle3-1 = "空調的開關在……"
20032-CVGroup_Cafe_Idle4-1 = "越來越熱了……\n畢竟這裡人多。"
20032-CVGroup_Cafe_Idle5-1 = "感覺能在這裡過一輩子呢。"
20032-CVGroup_WeaponGet_Idle1-1 = "即使服裝和環境改變……\n只要有這個就沒問題了。"

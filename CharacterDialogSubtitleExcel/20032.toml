[translation]
20032-CVGroup_UIMiniEventLobby_Enter1-1 = "Hi, Sensei. How is the new base?"
20032-CVGroup_UIMiniEventLobby_Enter2-1 = "There are lots of things to do..."
20032-CVGroup_UIMiniEventLobby_Enter2-2 = "Let's take it step by step."
20032-CVGroup_UIMiniEventLobby_Enter3-1 = "Welcome, Sensei. You can tell me anything you'd like."
20032-CVGroup_UIMiniEventLobby_Idle1-1 = "President Himari seems busy."
20032-CVGroup_UIMiniEventLobby_Idle1-2 = "...But she also appears to be having fun, so I see no problem."
20032-CVGroup_UIMiniEventLobby_Idle2-1 = "Come here, if you're cold, Sensei."
20032-CVGroup_UIMiniEventLobby_Idle2-2 = "That would be more efficient, wouldn't it?"
20032-CVGroup_UIMiniEventLobby_Idle3-1 = "Temperature and performance are closely related."
20032-CVGroup_UIMiniEventLobby_Idle3-2 = "And it feels nice here, so I like it."
20032-CVGroup_UIMiniEventLobby_Idle4-1 = "Good work, Sensei. What do you have there?"
20032-CVGroup_UIMiniEventLobby_Idle5-1 = "When you're around, the odds of success for any operation goes up."
20032-CVGroup_UIMiniEventLobby_Idle5-2 = "...And I perform better as well."
20032-CVGroup_UIMiniEventShop_Enter1-1 = "This is where we analyze the things that you gathered. ...Ideally."
20032-CVGroup_UIMiniEventShop_Enter2-1 = "The more samples, the better. I'll leave you to it."
20032-CVGroup_UIMiniEventShop_Enter3-1 = "Perfect timing. Have you come to see the importance of efficiency?"
20032-CVGroup_UIMiniEventShop_Idle1-1 = "Hm? What's the matter?"
20032-CVGroup_UIMiniEventShop_Idle1-2 = "...You just called? Why...?"
20032-CVGroup_UIMiniEventShop_Idle1-3 = "Well, if that's what you wanted to do..."
20032-CVGroup_UIMiniEventShop_Idle2-1 = "Apparently, if you take this and do THIS, something will come out of it."
20032-CVGroup_UIMiniEventShop_Idle2-2 = "I don't really get it..."
20032-CVGroup_UIMiniEventShop_Idle2-3 = "...but that's what the president said."
20032-CVGroup_UIMiniEventShop_Idle3-1 = "There's not much to do during an analysis."
20032-CVGroup_UIMiniEventShop_Idle3-2 = "...Sensei, can I sit on your lap?"
20032-CVGroup_UIMiniEventShop_Idle4-1 = "My temperature is a disruptive variable,"
20032-CVGroup_UIMiniEventShop_Idle4-2 = "...so I was told to not get close during the analysis..."
20032-CVGroup_UIMiniEventShop_Idle4-3 = "I get it, but it still hurts to hear."
20032-CVGroup_UIMiniEventShop_Idle5-1 = "This place... I like it."
20032-CVGroup_UIMiniEventShop_Idle5-2 = "Can't we move part of the club room here?"
20032-CVGroup_UIMiniEventShop_Buy1-1 = "Okay, here you go."
20032-CVGroup_UIMiniEventShop_Buy1-2 = "...Do they call this \"bartering\"?"
20032-CVGroup_UIMiniEventShop_Buy2-1 = "We have the results. Which one would you like?"
20032-CVGroup_UIMiniEventShop_Buy3-1 = "Yes, that looks good."
20032-CVGroup_UIMiniEventShop_Buy4-1 = "More varied results would have been better."
20032-CVGroup_UIMiniEventShop_Buy4-2 = "...This is enough? I see."
20032-CVGroup_UIMiniEventShop_Buy5-1 = "I don't really get it..."
20032-CVGroup_UIMiniEventShop_Buy5-2 = "...but I hope this helps you, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "From here on out, let's change our sample analysis methods a bit."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Apparently this is a place to test your luck..."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "Isn't the future already uncertain enough?"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "Should I bet on your luck, Sensei?"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "Then please do what you can for mine as well."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "It seems like the president has changed some things..."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "I personally think it could be better."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "I prefer the results to be guaranteed."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "Toki says she likes this method."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "She doesn't show it in her face..."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "...but Toki enjoys more than she lets on."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "I don't know much about the methodology,"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "but I understand that something has changed."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "Sensei, if you pull a miss, I might leave you here."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "...That was a joke. Regardless of whether you get lucky or not, I'll stay by your side, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "If you're not satisfied with the results, let me know."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "I'll be here to console you."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "You won! Congrats, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "So there really was a \"jackpot\"..."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "I'm surprised... You're really lucky, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "It's a result of our combined efforts."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "Congratulations, Sensei. Cheers!"
20032-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20032-CVGroup_CharacterGet_Idle1-1 = "It's much cooler than usual. Is that why my body feels so light?"
20032-CVGroup_Cafe_Idle1-1 = "With Himari gone..."
20032-CVGroup_Cafe_Idle2-1 = "It would be perfect if we had some shaved iced here."
20032-CVGroup_Cafe_Idle3-1 = "The AC power button..."
20032-CVGroup_Cafe_Idle4-1 = "The increase of occupants here is making it warmer."
20032-CVGroup_Cafe_Idle5-1 = "I would like to spend the rest of my life here."
20032-CVGroup_WeaponGet_Idle1-1 = "Regardless of the environment, with this, I can relax."

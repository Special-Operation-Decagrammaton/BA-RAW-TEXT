[translation]
20032-CVGroup_UIMiniEventLobby_Enter1-1 = "선생님, 안녕. 새로운 기지는 어때?"
20032-CVGroup_UIMiniEventLobby_Enter2-1 = "할 일이 많아졌네……"
20032-CVGroup_UIMiniEventLobby_Enter2-2 = "하나씩 해 나가야지."
20032-CVGroup_UIMiniEventLobby_Enter3-1 = "어서 와, 선생님. 뭐든지 말해줘."
20032-CVGroup_UIMiniEventLobby_Idle1-1 = "히마리 부장, 바쁜 것 같더라."
20032-CVGroup_UIMiniEventLobby_Idle1-2 = "……그래도 즐거워 보였으니까, 괜찮겠지."
20032-CVGroup_UIMiniEventLobby_Idle2-1 = "추우면 이리 와, 선생님."
20032-CVGroup_UIMiniEventLobby_Idle2-2 = "그게 서로 효율이 좋을 것 같기도 하고 말이지?"
20032-CVGroup_UIMiniEventLobby_Idle3-1 = "기온과 컨디션은 밀접한 관계에 있어."
20032-CVGroup_UIMiniEventLobby_Idle3-2 = "그래서, 여기는 쾌적해서 마음에 들어."
20032-CVGroup_UIMiniEventLobby_Idle4-1 = "고생했어, 선생님. 그거 좀 보여줄래?"
20032-CVGroup_UIMiniEventLobby_Idle5-1 = "선생님이 있어주면, 작전 성공률이 올라가."
20032-CVGroup_UIMiniEventLobby_Idle5-2 = "……내 컨디션도 좋아지고."
20032-CVGroup_UIMiniEventShop_Enter1-1 = "여기는 선생님이 모아 온 것을……. 분석하는 곳이야. 아마도."
20032-CVGroup_UIMiniEventShop_Enter2-1 = "샘플은 많을수록 좋으니까. 잘 부탁해."
20032-CVGroup_UIMiniEventShop_Enter3-1 = "딱 맞춰 왔네. 효율의 중요성, 선생님도 알게 된 거야?"
20032-CVGroup_UIMiniEventShop_Idle1-1 = "응? 무슨 일이야?"
20032-CVGroup_UIMiniEventShop_Idle1-2 = "……불러본 것뿐이라고? 왜……?"
20032-CVGroup_UIMiniEventShop_Idle1-3 = "……뭐, 선생님이 그러고 싶었던 거라면야."
20032-CVGroup_UIMiniEventShop_Idle2-1 = "이걸 가지고, 저걸 하면, 뭔가가 나온대."
20032-CVGroup_UIMiniEventShop_Idle2-2 = "……나도 잘 모르지만,"
20032-CVGroup_UIMiniEventShop_Idle2-3 = "부장 설명에 의하면 그래."
20032-CVGroup_UIMiniEventShop_Idle3-1 = "분석 중에는 할 일이 별로 없어."
20032-CVGroup_UIMiniEventShop_Idle3-2 = "……선생님 무릎 위에, 앉아도 돼?"
20032-CVGroup_UIMiniEventShop_Idle4-1 = "체온이 변수가 되어버리니까,"
20032-CVGroup_UIMiniEventShop_Idle4-2 = "분석 중에는 가까이 가지 말라고 하더라고……"
20032-CVGroup_UIMiniEventShop_Idle4-3 = "알고는 있는데, 뭔가 서운해."
20032-CVGroup_UIMiniEventShop_Idle5-1 = "이 장소…… 마음에 들어."
20032-CVGroup_UIMiniEventShop_Idle5-2 = "부실 일부를 여기로 가져오면 안 될까?"
20032-CVGroup_UIMiniEventShop_Buy1-1 = "자, 여기."
20032-CVGroup_UIMiniEventShop_Buy1-2 = "……이런 거, '물물교환'이라고 하던가?"
20032-CVGroup_UIMiniEventShop_Buy2-1 = "결과가 나왔네. 어떤 걸 가져갈래?"
20032-CVGroup_UIMiniEventShop_Buy3-1 = "응. 그거 괜찮아 보여."
20032-CVGroup_UIMiniEventShop_Buy4-1 = "결과물이 더 다양했으면 좋았을 텐데."
20032-CVGroup_UIMiniEventShop_Buy4-2 = "……지금 상태로도 충분하다고? 그렇구나."
20032-CVGroup_UIMiniEventShop_Buy5-1 = "잘 모르겠지만,"
20032-CVGroup_UIMiniEventShop_Buy5-2 = "이게 선생님한테 도움이 됐으면 좋겠어."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "여기서부터는, 샘플 분석법을 조금 바꿔볼게."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "운을 시험할 수 있는 장소라는데……"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "불확실한 것은 미래만으로 충분하지 않을까……?"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "선생님의 운에 걸어볼까?"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "그럼, 내 몫도 잘 부탁해."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "부장이 뭔가를 바꾼 모양인데……"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "개인적으로는 조금 아쉬워."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "나는 결과가 확실한 편이 좋은데."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "이 방식, 토키는 마음에 든대."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "……얼굴에 드러나지는 않지만,"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "토키는 웬만한 건 뭐든 즐기는 타입이란 말야."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "방법론 같은 것은 잘 모르지만,"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "아무튼 무언가가 바뀌었다는 것은 알겠어."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "꽝을 뽑으면, 선생님을 두고 가 버릴지도~?"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……농담이야. 운이 좋든 나쁘든, 난 선생님 옆에 있을 거니까."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "결과가 마음에 안 들면, 나한테 말해 줘."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "위로해 줄게."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "당첨이네. 축하해, 선생님."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "대박이라는 게, 진짜로 있었구나……."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "놀랬어…… 선생님은 정말 운이 좋구나."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "선생님과 우리의 노력으로 얻은 결과지."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "축하해, 선생님. 건배라도 할까?"
20032-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20032-CVGroup_CharacterGet_Idle1-1 = "평소보다 몸이 가벼운 느낌이야. 시원해서 그런가?"
20032-CVGroup_Cafe_Idle1-1 = "히마리 선배가 없는 틈에……."
20032-CVGroup_Cafe_Idle2-1 = "여기에 빙수가 있으면, 완벽할 텐데."
20032-CVGroup_Cafe_Idle3-1 = "에어컨의 스위치가……."
20032-CVGroup_Cafe_Idle4-1 = "점점 더워지는데… 사람이 많아서 그런가."
20032-CVGroup_Cafe_Idle5-1 = "여기라면, 평생 지낼 수 있을 것 같아."
20032-CVGroup_WeaponGet_Idle1-1 = "옷이나 환경이 바뀌어도…… 이게 있으면 안심이야."

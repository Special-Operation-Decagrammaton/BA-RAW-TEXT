[translation]
20015-CVGroup_UITitle_Idle1-1 = "Blue~~ Archive!"
20015-CVGroup_CharacterGet_Idle1-1 = "มาสคอตแห่งชมรมฝึกฝน! ปาป๊าม~ ปรากฏตัวแล้ว!\nรอฉันอยู่ใช่มั้ย คุณครู! แล้ววันนี้เราจะเล่นอะไรกันดีล่ะ?"
20015-CVGroup_Cafe_Idle1-1 = "ฮู่ว... ง่วงจัง...\nตาจะปิดแล้ว... Zzz..."
20015-CVGroup_Cafe_Idle2-1 = "ถ้าตามการสำรวจของฉันแล้ว...!\nที่นี่เป็นสถานที่ที่เหมาะที่จะเล่นไล่จับที่สุด"
20015-CVGroup_Cafe_Idle3-1 = "ฮืมฮื้ม~♪\nนี่ๆ~! วันนี้เราจะเล่นอะไรกันดี?!"
20015-CVGroup_Cafe_Idle4-1 = "ได้ยินมาจากทีวีว่าการพักผ่อน\nก็เป็นเรื่องสำคัญในการเป็นเลดี้ที่เพียบพร้อม...!"
20015-CVGroup_Cafe_Idle5-1 = "รุ่นพี่สึบากิกับรุ่นพี่มิโมริ\nตอนนี้กำลังทำอะไรกันอยู่น้า~"
20015-CVGroup_WeaponGet_Idle1-1 = "ว้าววว เท่สุดๆ... ฮิฮิ... โอ้...\nว้าว... แบบนี้จะแข็งแกร่งขึ้นได้อีกใช่มั้ย? ฮิฮิฮิ!\nฉันแข็งแกร่งกว่าเดิมแล้ว! คุณครู ขอบคุณนะ-!"
20015-CVGroup_UIEventLobby_Enter1-1 = "ยินดีต้อนรับสู่เทศกาลฉายหนังเฮียกคิยาโคค่ะ!\nฉันจะนำทางให้เองค่ะ คุณครู!"
20015-CVGroup_UIEventLobby_Enter2-1 = "อ๊ะ คุณครู! อะไรกันๆ ตอนนี้จะมาเที่ยว\nที่หมู่บ้านสตูดิโอภาพยนตร์งั้นเหรอ?"
20015-CVGroup_UIEventLobby_Enter2-2 = "ถ้างั้นฉันเอง... ก็อยากไปเที่ยวเหมือนกัน!"
20015-CVGroup_UIEventLobby_Enter2-3 = "อ๊ะ แต่ว่า... ตอนนี้คงไม่ได้หรอก"
20015-CVGroup_UIEventLobby_Enter3-1 = "คุณครู สถานที่ท่องเที่ยวของ\nหมู่บ้านสตูดิโอภาพยนตร์เป็นไงบ้าง? สนุกรึเปล่า?"
20015-CVGroup_UIEventLobby_Enter3-2 = "ดีจังเลยน้า~ ฉันเองก็อยากลอง\nไปลองเล่นแบบนั้นบ้างจัง~"
20015-CVGroup_UIEventLobby_Enter4-1 = "อ๊ะ เวลาผ่านมาขนาดนี้แล้วเหรอเนี่ย\nฮือ... อยากไปเที่ยวจัง..."
20015-CVGroup_UIEventLobby_Enter4-2 = "พอเสร็จงานแล้วไปด้วยกันนะ คุณครู...?"
20015-CVGroup_UIEventLobby_Enter5-1 = "เอ๋...? งานจบไปแล้วงั้นเหรอ?!"
20015-CVGroup_UIEventLobby_Enter5-2 = "เอ๋... ฉันยังไม่ได้ไปเดินเที่ยวกับคุณครูเลยนะ"
20015-CVGroup_UIEventLobby_Enter5-3 = "ดีละ... ค่อยมาเที่ยวที่นี่ใหม่พร้อมกับคุณครูก็ได้!"
20015-CVGroup_UIEventLobby_Idle1-1 = "คราวนี้ชมรมฝึกฝนก็คอยมาช่วยงานอยู่ด้วยนะ..."
20015-CVGroup_UIEventLobby_Idle1-2 = "ฮือ~ ฉันเองก็อยากไปเที่ยวเหมือนกัน~!"
20015-CVGroup_UIEventLobby_Idle2-1 = "หืม? อะไรน่ะ?\nอยากไปเล่นให้สนุกสุดๆ เลย?"
20015-CVGroup_UIEventLobby_Idle2-2 = "ฉันเองก็จะแพ้ไม่ได้!\nย้า~! ย้ากกก~!"
20015-CVGroup_UIEventLobby_Idle3-1 = "การมาช่วยงานแบบนี้ก็เป็นการฝึกฝนอย่างหนึ่ง\nฉันคิดแบบนั้นนะแต่ว่า..."
20015-CVGroup_UIEventLobby_Idle3-2 = "ก็มันน่าเบื่อจริงๆ นี่!"
20015-CVGroup_UIEventLobby_Idle3-3 = "อืม... อยากไปเล่นจังเลย"
20015-CVGroup_UIEventLobby_Idle4-1 = "อืม... ไม่ได้การ อยู่เฉยๆ แบบนี้\nน่าเบื่อจริงๆ ด้วย"
20015-CVGroup_UIEventLobby_Idle4-2 = "อ๊ะ พอได้ตะโกนออกไป\nก็รู้สึกโล่งขึ้นมาหน่อย"
20015-CVGroup_UIEventCardShop_Enter1-1 = "ตรงนี้สามารถสุ่มการ์ดได้นะ!\nสนใจลองดูมั้ยล่ะคุณครู?"
20015-CVGroup_UIEventCardShop_Enter2-1 = "เอาละ... เลือกเลย~!\nถึงเทิร์นของคุณครูแล้ว จั่วการ์ดสิ!"
20015-CVGroup_UIEventCardShop_Enter3-1 = "ถ้าจั่วการ์ดออกมาทั้งหมดเลยดูล่ะ?"
20015-CVGroup_UIEventCardShop_Enter3-2 = "ยิ่งเวลาแบบนี้\nต้องได้การ์ดหายากแน่ๆ เลย!"
20015-CVGroup_UIEventCardShop_Idle1-1 = "ตื่นเต้นจังเลย~!\nจะได้การ์ดอะไรนะ~?"
20015-CVGroup_UIEventCardShop_Idle2-1 = "ถ้าเป็นไปได้\nขอให้เป็นการ์ดหายากด้วยเถอะ!"
20015-CVGroup_UIEventCardShop_Idle2-2 = "ก็เวลาเปิดได้การ์ดวิบวับๆ\nสวยๆ มันสนุกนี่นา!"
20015-CVGroup_UIEventCardShop_Prize3-1 = "ว้าววว นี่มัน... การ์ดหายาก... สุดๆ เลยนะ"
20015-CVGroup_UIEventCardShop_Prize3-2 = "คุณครู! สุดยอดเลย!\nนี่ต้องเป็นโชคชะตาแน่ๆ!"
20015-CVGroup_UIEventCardShop_Prize2-1 = "อ๊ะ ได้การ์ดดีเลยละ!\nหรือว่านี่คือ... พลังของผู้ใหญ่..."
20015-CVGroup_UIEventCardShop_Prize1-1 = "อ๊ะ การ์ดนี้ฉันเจอบ่อยนะ\nแต่คิดว่ามันเป็นการ์ดหายากเหมือนกันนะ!"
20015-CVGroup_UIEventCardShop_Prize0-1 = "โอ๊ะ คือว่า...\nมะ...ไม่ต้องผิดหวังไปหรอกนะ คุณครู!"
20015-CVGroup_UIEventCardShop_Prize0-2 = "คราวหน้าจะต้อง... สุ่มได้การ์ดดีๆ แน่!\nอาจจะนะ..."

[translation]
20015-CVGroup_UITitle_Idle1-1 = "블루~~ 아카이브!"
20015-CVGroup_CharacterGet_Idle1-1 = "수행부의 마스코트, 빠밤! 하고 등장!\n기다렸지. 선생님! 그럼 오늘은 뭘 하고 놀까?"
20015-CVGroup_Cafe_Idle1-1 = "후아, 졸려…. 눈이, 더는…. 으므……."
20015-CVGroup_Cafe_Idle2-1 = "내 측정에 의하면…… 여기는, 술래잡기에 최적인 장소!"
20015-CVGroup_Cafe_Idle3-1 = "흥흥~♪ 저기저기, 오늘은 뭐해?"
20015-CVGroup_Cafe_Idle4-1 = "멋진 레이디가 되기 위해선, 휴식도 중요한 법…!\n이라고 하는 걸 TV에서 봤어."
20015-CVGroup_Cafe_Idle5-1 = "츠바키 선배랑 미모리 선배. 지금쯤 뭘 하고 있으려나~"
20015-CVGroup_WeaponGet_Idle1-1 = "우오- 멋있어…. 헤에…. 오오…. 와아…. 이거, 혹시 더 강해질 수 있는 거야? 아하핫,\n나, 더욱더 파워업해버릴 것 같아! 선생님, 고마워-!"
20015-CVGroup_UIEventLobby_Enter1-1 = "백귀야행 영화촌에 어서 오세요! 내가 안내해줄게. 선생님!"
20015-CVGroup_UIEventLobby_Enter2-1 = "아, 선생님! 뭐야뭐야, 지금부터 영화촌에서 노는 거야?"
20015-CVGroup_UIEventLobby_Enter2-2 = "그럼 나도 같이 놀고 싶어!"
20015-CVGroup_UIEventLobby_Enter2-3 = "아, 하지만 지금은 안 되지…."
20015-CVGroup_UIEventLobby_Enter3-1 = "선생님, 영화촌의 어트랙션은 어땠어? 재밌었어?"
20015-CVGroup_UIEventLobby_Enter3-2 = "좋겠다~ 나도 그거 체험해보고 싶은데~"
20015-CVGroup_UIEventLobby_Enter4-1 = "아, 벌써 이런 시간이네. 으, 더 놀고 싶은데…."
20015-CVGroup_UIEventLobby_Enter4-2 = "끝나고 같이 가자. 선생님?"
20015-CVGroup_UIEventLobby_Enter5-1 = "어라, 설마 벌써 끝이야?!"
20015-CVGroup_UIEventLobby_Enter5-2 = "에이- 아직 선생님이랑 제대로 놀지도 못했는데…."
20015-CVGroup_UIEventLobby_Enter5-3 = "뭐, 좋아. 또 선생님하고 같이 오면 되니까!"
20015-CVGroup_UIEventLobby_Idle1-1 = "이번에 수행부는 이벤트를 돕는 역할인데…."
20015-CVGroup_UIEventLobby_Idle1-2 = "우~ 나도 놀고 싶어~!"
20015-CVGroup_UIEventLobby_Idle2-1 = "응? 뭐야? 찔러 보기 놀이야?"
20015-CVGroup_UIEventLobby_Idle2-2 = "나도 질 수 없지! 이야앗~! 이얍~!"
20015-CVGroup_UIEventLobby_Idle3-1 = "이렇게 돕는 것도, 수행의 일환! …이라고 알고는 있지만,"
20015-CVGroup_UIEventLobby_Idle3-2 = "지루한 건 지루해!"
20015-CVGroup_UIEventLobby_Idle3-3 = "으-음. 놀러 가고 싶어…."
20015-CVGroup_UIEventLobby_Idle4-1 = "음---안 돼. 가만히 있는 건 역시 지루해!"
20015-CVGroup_UIEventLobby_Idle4-2 = "…아, 소리치니까. 조금 개운해졌다."
20015-CVGroup_UIEventCardShop_Enter1-1 = "여기서는 카드를 뽑을 수 있어! 바로 어때, 선생님?"
20015-CVGroup_UIEventCardShop_Enter2-1 = "자, 골라~! 선생님 턴이야, 드로우 해!"
20015-CVGroup_UIEventCardShop_Enter3-1 = "내친김에 다 뽑아버리면?"
20015-CVGroup_UIEventCardShop_Enter3-2 = "이럴 때일수록, 레어 카드가 나올 거 같고!"
20015-CVGroup_UIEventCardShop_Idle1-1 = "두근두근두근~! 뭐가 나올까~?"
20015-CVGroup_UIEventCardShop_Idle2-1 = "기왕이면 레어카드가 좋지!"
20015-CVGroup_UIEventCardShop_Idle2-2 = "반짝반짝해서 예쁘고, 뽑으면 신나니까!"
20015-CVGroup_UIEventCardShop_Prize3-1 = "우오- 이거 엄청난 레어 카드잖아!"
20015-CVGroup_UIEventCardShop_Prize3-2 = "선생님! 대단해! 이거야말로 데스티니-!"
20015-CVGroup_UIEventCardShop_Prize2-1 = "아, 좋은 카드다! 과연, 이것이 어른의 힘…."
20015-CVGroup_UIEventCardShop_Prize1-1 = "아, 자주 보는 거다. 그래도 레어카드라고 생각해!"
20015-CVGroup_UIEventCardShop_Prize0-1 = "어, 그러니까…. 시, 실망하지 마, 선생님!"
20015-CVGroup_UIEventCardShop_Prize0-2 = "다음엔 분명, 좋은 게 나올 거야! 아마도."

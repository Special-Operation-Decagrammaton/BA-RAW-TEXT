[translation]
20015-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20015-CVGroup_CharacterGet_Idle1-1 = "Ta-da! The mascot of the Inner Discipline Club is here! The wait is over, Sensei! What should we do today?"
20015-CVGroup_Cafe_Idle1-1 = "*yawn* I'm sleepy. I can't open...my eyes..."
20015-CVGroup_Cafe_Idle2-1 = "According to my calculations, this is the best place for hide-and-seek!"
20015-CVGroup_Cafe_Idle3-1 = "*hum* *hum* Hey, whatcha doing today?"
20015-CVGroup_Cafe_Idle4-1 = "In order to become a proper lady, it's important to rest! It said so on TV!"
20015-CVGroup_Cafe_Idle5-1 = "I wonder what Tsubaki and Mimori are doing right now!"
20015-CVGroup_WeaponGet_Idle1-1 = "Whoa, so cool! Wow...! Hahaha! I'm gonna power up even more! Sensei, thank you!"
20015-CVGroup_UIEventLobby_Enter1-1 = "Welcome to the Hyakkiyako Movie Village! I'll be your guide, Sensei!"
20015-CVGroup_UIEventLobby_Enter2-1 = "Oh, Sensei! What's going on? Are you gonna play in the Movie Village?"
20015-CVGroup_UIEventLobby_Enter2-2 = "I wanna play with you too!"
20015-CVGroup_UIEventLobby_Enter2-3 = "Oh, but, I can't do that now..."
20015-CVGroup_UIEventLobby_Enter3-1 = "Sensei, how were the attractions at the Movie Village? Were they fun?"
20015-CVGroup_UIEventLobby_Enter3-2 = "I'm jealous! I wanna try them too!"
20015-CVGroup_UIEventLobby_Enter4-1 = "Oh, look at the time. Ugh, I wanna play more..."
20015-CVGroup_UIEventLobby_Enter4-2 = "Can we go there together after this, Sensei?"
20015-CVGroup_UIEventLobby_Enter5-1 = "Huh? Is it already over?"
20015-CVGroup_UIEventLobby_Enter5-2 = "Ugh! But I didn't even get to have any real fun with you!"
20015-CVGroup_UIEventLobby_Enter5-3 = "Well, okay. We should come again later!"
20015-CVGroup_UIEventLobby_Idle1-1 = "The Inner Discipline Club has to help with the event this time..."
20015-CVGroup_UIEventLobby_Idle1-2 = "Ugh... I just wanna play!"
20015-CVGroup_UIEventLobby_Idle2-1 = "Huh? What? Is this like a poking game?"
20015-CVGroup_UIEventLobby_Idle2-2 = "I'm not gonna lose! Hiii-yah! Hi-yah!"
20015-CVGroup_UIEventLobby_Idle3-1 = "I know that helping like this is a part of my training, but..."
20015-CVGroup_UIEventLobby_Idle3-2 = "...it's still so boring!"
20015-CVGroup_UIEventLobby_Idle3-3 = "Hmm... I wanna go out and have fun..."
20015-CVGroup_UIEventLobby_Idle4-1 = "Hmm... No. Being still is just so boring!"
20015-CVGroup_UIEventLobby_Idle4-2 = "...Ah, I feel better after yelling."
20015-CVGroup_UIEventCardShop_Enter1-1 = "You can choose a card now! Why don't you go for it, Sensei?"
20015-CVGroup_UIEventCardShop_Enter2-1 = "All right, pick one! It's your turn. Draw!"
20015-CVGroup_UIEventCardShop_Enter3-1 = "Might as well pick all of them!"
20015-CVGroup_UIEventCardShop_Enter3-2 = "Maybe it'll be a rare card!"
20015-CVGroup_UIEventCardShop_Idle1-1 = "Ba-dump, ba-dump! What's it gonna be?"
20015-CVGroup_UIEventCardShop_Idle2-1 = "I hope it's a rare card!"
20015-CVGroup_UIEventCardShop_Idle2-2 = "It's sparkly and pretty. So exciting!"
20015-CVGroup_UIEventCardShop_Prize3-1 = "Whoa, this is an incredibly rare card!"
20015-CVGroup_UIEventCardShop_Prize3-2 = "Sensei! Amazing! This must be fate!"
20015-CVGroup_UIEventCardShop_Prize2-1 = "Oh, that's a good card! This must be...the power of an adult..."
20015-CVGroup_UIEventCardShop_Prize1-1 = "Oh, I see that one often. But I think it's still a pretty rare card!"
20015-CVGroup_UIEventCardShop_Prize0-1 = "So, um... D-Don't be disappointed, Sensei!"
20015-CVGroup_UIEventCardShop_Prize0-2 = "I'm sure you'll get something good next time! Maybe."

[translation]
20015-CVGroup_UITitle_Idle1-1 = "蔚藍～～檔案！"
20015-CVGroup_CharacterGet_Idle1-1 = "修行部的吉祥物，鏗鏘登場！\n久等了老師！所以，今天要做什麼呢？"
20015-CVGroup_Cafe_Idle1-1 = "呼啊，好睏……\n眼睛，已經……嗯呣……"
20015-CVGroup_Cafe_Idle2-1 = "根據我的測定……\n這裡是，最適合捉迷藏的地方！"
20015-CVGroup_Cafe_Idle3-1 = "哼哼～♪\n吶吶，今天要做什麼？"
20015-CVGroup_Cafe_Idle4-1 = "為了成為出色的淑女，休息也是很重要的……！\n之前在電視看到的！"
20015-CVGroup_Cafe_Idle5-1 = "椿前輩和三森前輩現在在做什麼呢～"
20015-CVGroup_WeaponGet_Idle1-1 = "唔哦～好帥……嘿……哦哦……\n哇……這個，該不會是可以變得更強的東西？啊哈哈！\n我，似乎更加PowerUp了！老師，謝謝你～！"
20015-CVGroup_UIEventLobby_Enter1-1 = "歡迎來到百鬼夜行的電影村！\n我來帶你參觀吧，老師！"
20015-CVGroup_UIEventLobby_Enter2-1 = "啊，老師！什麼什麼，接下來要在電影村玩嗎？"
20015-CVGroup_UIEventLobby_Enter2-2 = "那我也想要一起玩～！"
20015-CVGroup_UIEventLobby_Enter2-3 = "啊，可是現在不行……"
20015-CVGroup_UIEventLobby_Enter3-1 = "老師，電影村的娛樂活動怎麼樣？有趣嗎？"
20015-CVGroup_UIEventLobby_Enter3-2 = "真好～我也想體驗一下那邊～"
20015-CVGroup_UIEventLobby_Enter4-1 = "啊，已經到這個時間了啊？\n嗚～我還沒玩夠……"
20015-CVGroup_UIEventLobby_Enter4-2 = "結束之後一起走吧，老師？"
20015-CVGroup_UIEventLobby_Enter5-1 = "咦，難道已經結束了嗎！？"
20015-CVGroup_UIEventLobby_Enter5-2 = "咦～我都還沒和老師一起玩的說……"
20015-CVGroup_UIEventLobby_Enter5-3 = "算了，之後再跟老師一起來就好了！"
20015-CVGroup_UIEventLobby_Idle1-1 = "雖然這次修行部是協助活動的一方……"
20015-CVGroup_UIEventLobby_Idle1-2 = "嗚～我也想去玩～！"
20015-CVGroup_UIEventLobby_Idle2-1 = "嗯？什麼？戳對方的遊戲？"
20015-CVGroup_UIEventLobby_Idle2-2 = "嘻嘻，我也不會輸的唷！\n喝啊！哈！"
20015-CVGroup_UIEventLobby_Idle3-1 = "像這樣幫忙也是修行的一環！\n……雖然我也知道，"
20015-CVGroup_UIEventLobby_Idle3-2 = "不過無聊的事情就是無聊！"
20015-CVGroup_UIEventLobby_Idle3-3 = "唔嗯～好想去玩……"
20015-CVGroup_UIEventLobby_Idle4-1 = "嗯……不行，一直待在這裡果然很無趣！"
20015-CVGroup_UIEventLobby_Idle4-2 = "……啊，大喊過後，好像舒服了一點。"
20015-CVGroup_UIEventCardShop_Enter1-1 = "這裡可以抽卡唷！\n要不要馬上抽呀，老師？"
20015-CVGroup_UIEventCardShop_Enter2-1 = "來，請吧！\n輪到老師的回合囉，抽卡吧！"
20015-CVGroup_UIEventCardShop_Enter3-1 = "既然要抽的話，要不要全都抽完？"
20015-CVGroup_UIEventCardShop_Enter3-2 = "越是這種時候，越容易出現稀有卡片！"
20015-CVGroup_UIEventCardShop_Idle1-1 = "心動動，會抽到什麼呢～？"
20015-CVGroup_UIEventCardShop_Idle2-1 = "機會難得，如果是稀有卡片就好了！"
20015-CVGroup_UIEventCardShop_Idle2-2 = "閃閃發光又漂亮，心情都高興起來了！"
20015-CVGroup_UIEventCardShop_Prize3-1 = "唔哦，這不是超級稀有的卡片嗎！"
20015-CVGroup_UIEventCardShop_Prize3-2 = "老師好厲害，這就是命運！"
20015-CVGroup_UIEventCardShop_Prize2-1 = "啊，是張好卡呢！\n原來如此，這就是大人的力量……"
20015-CVGroup_UIEventCardShop_Prize1-1 = "啊，是很常見的卡。\n不過我覺得也是普通的稀有卡唷！"
20015-CVGroup_UIEventCardShop_Prize0-1 = "那個……別，別失望，老師！"
20015-CVGroup_UIEventCardShop_Prize0-2 = "下次一定會抽到好卡的！\n……大概。"

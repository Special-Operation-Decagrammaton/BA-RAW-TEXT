[translation]
20035-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～呼啊啊……"
20035-CVGroup_CharacterGet_Idle1-1 = "這次是導覽員哦……\n修行跟導覽，我都會努力的～\n呼啊……"
20035-CVGroup_Cafe_Idle1-1 = "大家……這邊唷……\n咦……只有我一個人？"
20035-CVGroup_Cafe_Idle2-1 = "為人們導覽的夢……\n原來不是夢嗎……？"
20035-CVGroup_Cafe_Idle3-1 = "聽說人……一生3分之1的時間都在睡夢中度過……"
20035-CVGroup_Cafe_Idle4-1 = "好好睡覺是很重要的唷……\n比想像中還重要……"
20035-CVGroup_Cafe_Idle5-1 = "如果是百鬼夜行的事……\n就交給我……"
20035-CVGroup_WeaponGet_Idle1-1 = "謝謝你，老師……\n阻攔老師睡眠的敵人……\n就由我來打倒……"
20035-CVGroup_UIEventLobby_Enter1-1 = "歡迎回來，老師……\n歡迎來到百鬼夜行……"
20035-CVGroup_UIEventLobby_Enter2-1 = "今天就由我來為老師導覽。"
20035-CVGroup_UIEventLobby_Enter2-2 = "導覽員春日椿，會努力的。呼啊……"
20035-CVGroup_UIEventLobby_Enter3-1 = "百鬼夜行如何……？\n有樂在其中嗎……？"
20035-CVGroup_UIEventLobby_Enter4-1 = "如果有想去的地方，隨時可以告訴我……"
20035-CVGroup_UIEventLobby_Enter4-2 = "如果是百鬼夜行的話，我可以幫你導覽……"
20035-CVGroup_UIEventLobby_Enter5-1 = "慶典……很厲害吧？"
20035-CVGroup_UIEventLobby_Enter5-2 = "百鬼夜行還有很多別的慶典……等你來哦？"
20035-CVGroup_UIEventLobby_Idle1-1 = "呼咦……怎麼啦老師？"
20035-CVGroup_UIEventLobby_Idle1-2 = "我看起來像在打瞌睡，所以就試著叫醒我？"
20035-CVGroup_UIEventLobby_Idle2-1 = "唔……好癢……"
20035-CVGroup_UIEventLobby_Idle2-2 = "但是，這種程度無法阻止我的修行哦……"
20035-CVGroup_UIEventLobby_Idle3-1 = "一直這樣惡作劇的話……"
20035-CVGroup_UIEventLobby_Idle3-2 = "就要一起躺在床上了哦……？"
20035-CVGroup_UIEventLobby_Idle3-3 = "嗯……？反而希望那樣……？"
20035-CVGroup_UIEventLobby_Idle4-1 = "難道你希望我關心你嗎……？"
20035-CVGroup_UIEventLobby_Idle4-2 = "……就算不那麼做，我也已經非常關心老師了呀……"
20035-CVGroup_UIEventMission_Enter1-1 = "不把每天的工作做好的話……"
20035-CVGroup_UIEventMission_Enter1-2 = "聽說就不能做好夢……"
20035-CVGroup_UIEventMission_Enter2-1 = "行程表已經確認過了……？\n那，我就來為你導覽吧。"
20035-CVGroup_UIEventMission_Idle1-1 = "唔嗯……不要那樣搖我，老師……"
20035-CVGroup_UIEventMission_Idle1-2 = "嗯……？沒有。\n我沒睡。就說我沒睡嘛……"
20035-CVGroup_UIEventMission_Idle2-1 = "我來為你導覽到下一個目的地，老師……"
20035-CVGroup_UIEventMission_Idle2-2 = "在那之前，先小睡一下……"
20035-CVGroup_UIEventMission_Buy1-1 = "那個，這裡……請收下吧。\n辛苦你了，老師。呵呵。"
20035-CVGroup_UIEventMission_Buy2-1 = "老師也很認真修行呢……"
20035-CVGroup_UIEventMission_Buy2-2 = "我也不能輸。呼嚕……"
20035-CVGroup_UIEventMission_Interaction1-1 = "嗯，今天的工作就到這裡結束……"
20035-CVGroup_UIEventMission_Interaction1-2 = "要直接回去嗎……？\n要不要一起找個好地方睡覺……？"

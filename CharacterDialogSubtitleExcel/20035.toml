[translation]
20035-CVGroup_UITitle_Idle1-1 = "Blue Archive! *yawn*..."
20035-CVGroup_CharacterGet_Idle1-1 = "I'm a tour guide this time... I promise I'll train hard and tour harder... *yawn*"
20035-CVGroup_Cafe_Idle1-1 = "This way everyone... Huh... No one's here..."
20035-CVGroup_Cafe_Idle2-1 = "I had a dream about being a tour guide...or was it a dream?"
20035-CVGroup_Cafe_Idle3-1 = "They say people spend a third of their lives sleeping..."
20035-CVGroup_Cafe_Idle4-1 = "Getting good sleep is so important... More than most people realize."
20035-CVGroup_Cafe_Idle5-1 = "If it's anything to do with Hyakkiyako... I'll handle it..."
20035-CVGroup_WeaponGet_Idle1-1 = "Thank you, Sensei... If your enemies are keeping you up at night, I'll take them down for you..."
20035-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei... Glad you made it to Hyakkiyako..."
20035-CVGroup_UIEventLobby_Enter2-1 = "I'll be your guide today."
20035-CVGroup_UIEventLobby_Enter2-2 = "Tour Guide Kasuga Tsubaki. I'll do my best. *yawn*..."
20035-CVGroup_UIEventLobby_Enter3-1 = "How's Hyakkiyako been? Are you making the most of your time here?"
20035-CVGroup_UIEventLobby_Enter4-1 = "If there's somewhere you want to go, let me know anytime..."
20035-CVGroup_UIEventLobby_Enter4-2 = "If it's in Hyakkiyako, I can guide you there."
20035-CVGroup_UIEventLobby_Enter5-1 = "That festival...was quite impressive, wasn't it?"
20035-CVGroup_UIEventLobby_Enter5-2 = "There are other big festivals in Hyakkiyako too... So don't go without your tour guide."
20035-CVGroup_UIEventLobby_Idle1-1 = "*yawn*... What's wrong, Sensei?"
20035-CVGroup_UIEventLobby_Idle1-2 = "I was nodding off, so you tried to wake me?"
20035-CVGroup_UIEventLobby_Idle2-1 = "Hmm...that tickles..."
20035-CVGroup_UIEventLobby_Idle2-2 = "Something like that won't hinder my training..."
20035-CVGroup_UIEventLobby_Idle3-1 = "If you keep acting like a bully..."
20035-CVGroup_UIEventLobby_Idle3-2 = "I might just sleep in bed with you, Sensei..."
20035-CVGroup_UIEventLobby_Idle3-3 = "Huh? You'd like that...?"
20035-CVGroup_UIEventLobby_Idle4-1 = "I think you just want more attention..."
20035-CVGroup_UIEventLobby_Idle4-2 = "...There's no need. I'm already giving you plenty of attention..."
20035-CVGroup_UIEventMission_Enter1-1 = "If you don't do your daily tasks diligently..."
20035-CVGroup_UIEventMission_Enter1-2 = "...you won't have sweet dreams."
20035-CVGroup_UIEventMission_Enter2-1 = "You checked your schedule? In that case, I'll be your guide."
20035-CVGroup_UIEventMission_Idle1-1 = "Ugh... Don't wake me up so rudely, Sensei..."
20035-CVGroup_UIEventMission_Idle1-2 = "Hmm? No, I didn't fall asleep. Really..."
20035-CVGroup_UIEventMission_Idle2-1 = "I'll guide you to our next destination, Sensei..."
20035-CVGroup_UIEventMission_Idle2-2 = "But before that, a quick nap..."
20035-CVGroup_UIEventMission_Buy1-1 = "Here, take this... You've earned it, Sensei. Heehee."
20035-CVGroup_UIEventMission_Buy2-1 = "You're quite diligent about your training..."
20035-CVGroup_UIEventMission_Buy2-2 = "But I won't be defeated... Zzz..."
20035-CVGroup_UIEventMission_Interaction1-1 = "Yes. It's time for the end of the day..."
20035-CVGroup_UIEventMission_Interaction1-2 = "Are you heading back? How about one last nap for the road...?"

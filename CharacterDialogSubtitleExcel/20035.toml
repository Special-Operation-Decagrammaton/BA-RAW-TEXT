[translation]
20035-CVGroup_UITitle_Idle1-1 = "블루 아카이브~ 후아암……"
20035-CVGroup_CharacterGet_Idle1-1 = "이번에는 가이드야…… 수행도 안내도, 열심히 할 테니까. 후암……"
20035-CVGroup_Cafe_Idle1-1 = "모두…… 이쪽이야…… 어라…… 나 혼자인가?"
20035-CVGroup_Cafe_Idle2-1 = "사람들을 안내하는 꿈…… 꿈이 아니었나……?"
20035-CVGroup_Cafe_Idle3-1 = "사람은…… 인생의 3분의 1을 자면서 지낸대……"
20035-CVGroup_Cafe_Idle4-1 = "잘 자는 건 중요한 일이야…… 생각보다도 더……"
20035-CVGroup_Cafe_Idle5-1 = "백귀야행에 대한 거라면…… 맡겨 줘……"
20035-CVGroup_WeaponGet_Idle1-1 = "고마워, 선생님……\n선생님의 수면을 가로막는 적은…… 내가 쓰러뜨려 줄게……"
20035-CVGroup_UIEventLobby_Enter1-1 = "어서 와, 선생님…… 백귀야행에 잘 오셨어요……"
20035-CVGroup_UIEventLobby_Enter2-1 = "오늘은 내가 선생님을 안내해 줄게."
20035-CVGroup_UIEventLobby_Enter2-2 = "가이드 카스가 츠바키, 힘내겠습니다. 후암……"
20035-CVGroup_UIEventLobby_Enter3-1 = "백귀야행은 어때……? 제대로 즐기고 있어……?"
20035-CVGroup_UIEventLobby_Enter4-1 = "가고 싶은 곳이 있다면, 언제든지 말해 줘……"
20035-CVGroup_UIEventLobby_Enter4-2 = "백귀야행이라면, 안내할 수 있으니까……"
20035-CVGroup_UIEventLobby_Enter5-1 = "축제…… 대단했지?"
20035-CVGroup_UIEventLobby_Enter5-2 = "백귀야행에는 또 다른 축제들도 많아…… 기다리고 있을게?"
20035-CVGroup_UIEventLobby_Idle1-1 = "후에…… 왜 그래, 선생님?"
20035-CVGroup_UIEventLobby_Idle1-2 = "졸고 있는 것 같아서, 깨워 봤다고?"
20035-CVGroup_UIEventLobby_Idle2-1 = "우웅…… 간지러워……"
20035-CVGroup_UIEventLobby_Idle2-2 = "하지만 그 정도로, 나의 수행을 막을 수는 없을 거야……"
20035-CVGroup_UIEventLobby_Idle3-1 = "자꾸 그렇게 장난치면……"
20035-CVGroup_UIEventLobby_Idle3-2 = "침대에 같이 누워 버릴 거야……?"
20035-CVGroup_UIEventLobby_Idle3-3 = "응……? 오히려 그러고 싶다고……?"
20035-CVGroup_UIEventLobby_Idle4-1 = "혹시 신경 써 주기를 바라는 거야……?"
20035-CVGroup_UIEventLobby_Idle4-2 = "……그렇게 하지 않아도, 나는 충분히 선생님을 신경 쓰고 있는데……"
20035-CVGroup_UIEventMission_Enter1-1 = "매일의 일과를 제대로 하지 않으면……"
20035-CVGroup_UIEventMission_Enter1-2 = "좋은 꿈은 꿀 수 없대……"
20035-CVGroup_UIEventMission_Enter2-1 = "일정표는 확인했어……? 그러면 내가 가이드를 해 줄게."
20035-CVGroup_UIEventMission_Idle1-1 = "우웅…… 그렇게 깨우지 말아 줘, 선생님……"
20035-CVGroup_UIEventMission_Idle1-2 = "웅……? 아니야. 안 잤어. 안 잤다니까……"
20035-CVGroup_UIEventMission_Idle2-1 = "다음 목적지로 안내해 줄게, 선생님……"
20035-CVGroup_UIEventMission_Idle2-2 = "그 전에, 조금만 자고 나서……"
20035-CVGroup_UIEventMission_Buy1-1 = "자, 여기…… 받아가세요. 고생 많았어, 선생님. 후훗."
20035-CVGroup_UIEventMission_Buy2-1 = "선생님도 수행에 열심이구나……"
20035-CVGroup_UIEventMission_Buy2-2 = "나도 질 수 없지. 코오……"
20035-CVGroup_UIEventMission_Interaction1-1 = "응. 오늘의 일과는 이것으로 끝이네……"
20035-CVGroup_UIEventMission_Interaction1-2 = "그냥 돌아갈 거야……? 같이 좋은 곳에서 잠들지 않을래……?"

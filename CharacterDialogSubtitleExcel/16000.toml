[translation]
16000-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍，檔案。"
16000-CVGroup_CharacterGet_Idle1-1 = "那個，我可以進來嗎？\n如果覺得我礙事，請，請隨時跟我說…"
16000-CVGroup_Cafe_Idle1-1 = "可以躲藏的地方在哪裡…"
16000-CVGroup_Cafe_Idle2-1 = "待在這裡也沒關係嗎？"
16000-CVGroup_Cafe_Idle3-1 = "我不喜歡人多的地方…\n想躲藏起來…"
16000-CVGroup_Cafe_Idle4-1 = "那，那個…耶嘿嘿…\n有，有我能幫忙的事嗎？"
16000-CVGroup_Cafe_Idle5-1 = "老，老師。非，非常…謝謝您…\n沒，沒事！對不起！"
16000-CVGroup_WeaponGet_Idle1-1 = "老師討厭的東西，\n我會讓它們…全部消失！"

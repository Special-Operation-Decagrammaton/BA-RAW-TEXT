[translation]
16000-CVGroup_UITitle_Idle1-1 = "B... Blue... Archive...!"
16000-CVGroup_CharacterGet_Idle1-1 = "ฉันมาด้วยแบบนี้ ไม่เป็นไรใช่มั้ยคะ?\nถ้าคุณครูคิดว่าฉันไม่จำเป็นละก็... บอกฉันได้ตลอดเลยนะคะ"
16000-CVGroup_Cafe_Idle1-1 = "ไปหลบ... ตรงไหนดี"
16000-CVGroup_Cafe_Idle2-1 = "อยู่ที่นี่ได้รึเปล่านะ"
16000-CVGroup_Cafe_Idle3-1 = "ไม่ชอบที่ที่คนเยอะๆ เลย... อยากหาที่ซ่อนจัง..."
16000-CVGroup_Cafe_Idle4-1 = "พะ...เพราะงั้น... แหะๆ\nคือ มะ...มี... มีอะไรให้ฉันช่วยมั้ยคะ?"
16000-CVGroup_Cafe_Idle5-1 = "คะ...คุณครูคะ ขะ...ขอบคุณ...\nไม่สิ! ขอโทษนะคะ!"
16000-CVGroup_WeaponGet_Idle1-1 = "อะไรที่คุณครูไม่ชอบ...\nฉันจะ...จัดการพวกมันให้หมดเลยค่ะ!"

[translation]
26001-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
26001-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨 소속, 오토세 코타마.\n선생님의 목소리가 들려, 이곳에 왔습니다."
26001-CVGroup_Cafe_Idle1-1 = "이 카페에는 도청장치가…. 흠, 그렇군요…."
26001-CVGroup_Cafe_Idle2-1 = "수신 상태가 불안정합니다."
26001-CVGroup_Cafe_Idle3-1 = "이상하군요. 선생님의 GPS가 근방에서 포착되었는데…."
26001-CVGroup_Cafe_Idle4-1 = "카페의 신작 디저트를 체크…. 개인용 블로그에 업로드…."
26001-CVGroup_Cafe_Idle5-1 = "모모프렌즈의 신작 굿즈…. 올…게…왔…다…."
26001-CVGroup_WeaponGet_Idle1-1 = "헤르츠 조정 중… 잘 들립니까?"

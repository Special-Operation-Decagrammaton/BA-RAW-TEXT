[translation]
20033-CVGroup_UITitle_Idle1-1 = "嘻嘻嘻。蔚藍……檔案！"
20033-CVGroup_CharacterGet_Idle1-1 = "終於降臨了！\n嘻嘻嘻，萬魔殿的羽沼真琴大人大駕光臨。記得好好款待啊。"
20033-CVGroup_Cafe_Idle1-1 = "夏萊……\n嘻嘻，不管怎麼看都是個狹小的地方。"
20033-CVGroup_Cafe_Idle2-1 = "伊吹的遊樂場…\n必須有計畫地打造…"
20033-CVGroup_Cafe_Idle3-1 = "伊呂波那傢伙，如果想確實逮到…"
20033-CVGroup_Cafe_Idle4-1 = "皐月和千秋，\n希望他們沒偷懶…"
20033-CVGroup_Cafe_Idle5-1 = "這個氣氛，還挺不錯的嘛。"
20033-CVGroup_WeaponGet_Idle1-1 = "嘻……嘻嘻……嘻哈哈哈哈！\n真的是不容小覷啊，老師。居然準備了這種禮物。\n……我就作為信賴的象徵收下了。以後也拜託你了，老師。"
20033-CVGroup_UIEventShop_Enter1-1 = "這是為了紀念格黑娜派對特別開張的店鋪。"
20033-CVGroup_UIEventShop_Enter1-2 = "儘管看個過癮吧。嘻嘻。"
20033-CVGroup_UIEventShop_Enter2-1 = "……還想說是誰，原來是老師啊。\n要買的東西已經決定好了嗎？"
20033-CVGroup_UIEventShop_Enter3-1 = "嘻嘻，很可惜，臨時店鋪已經結束了。"
20033-CVGroup_UIEventShop_Enter3-2 = "別露出遺憾的表情。"
20033-CVGroup_UIEventShop_Enter3-3 = "下次會更把規模擴張，盛大且豪華地回歸，嘻嘻嘻！"
20033-CVGroup_UIEventShop_Idle1-1 = "這裡的東西全都是我們萬魔殿準備的。"
20033-CVGroup_UIEventShop_Idle1-2 = "啊啊，是因為我們有財力才有可能辦得到。"
20033-CVGroup_UIEventShop_Idle1-3 = "現在驚訝還太早囉。\n咯咯咯。"
20033-CVGroup_UIEventShop_Idle2-1 = "嗯？東西怎麼了嗎？"
20033-CVGroup_UIEventShop_Idle2-2 = "嘻嘻嘻，難道說，老師看上的是我真琴大人嗎？"
20033-CVGroup_UIEventShop_Idle2-3 = "……其實沒什麼事……？\n……這樣啊。"
20033-CVGroup_UIEventShop_Buy1-1 = "哦，居然會選那個。\n你審美的眼光，我就給予高度評價吧。"
20033-CVGroup_UIEventShop_Buy2-1 = "那是我推薦的東西。"
20033-CVGroup_UIEventShop_Buy2-2 = "嘻嘻嘻。\n你選了不錯的東西呢。"
20033-CVGroup_UIEventShop_Buy3-1 = "嘻嘻嘻，今天我心情很好。"
20033-CVGroup_UIEventShop_Buy3-2 = "送你一點贈品吧！\n是萬魔殿的合作提案書！"
20033-CVGroup_UIEventShop_Buy3-3 = "……什麼？你說……不需要？"
20033-CVGroup_UIEventShop_Buy4-1 = "你想要那個嗎，老師。\n嘻嘻，真是個怪人啊。"

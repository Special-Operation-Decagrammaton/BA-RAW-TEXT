[translation]
20033-CVGroup_UITitle_Idle1-1 = "키키킷. 블루… 아카이브!"
20033-CVGroup_CharacterGet_Idle1-1 = "드디어 강림하였도다!\n키키킥, 판데모니움 소사이어티의 하누마 마코토 님이 직접 찾아와 주신 것이다. 극진히 환대하도록."
20033-CVGroup_Cafe_Idle1-1 = "샬레…… 키킥, 언제 봐도 비좁은 곳이구만."
20033-CVGroup_Cafe_Idle2-1 = "이부키의 놀이터를…. 계획적으로 만들어야…."
20033-CVGroup_Cafe_Idle3-1 = "이로하 녀석을, 확실히 포획하려면……"
20033-CVGroup_Cafe_Idle4-1 = "사츠키와 치아키, 땡땡이는 치지 않았으면 한다만…"
20033-CVGroup_Cafe_Idle5-1 = "이 분위기, 제법 괜찮지 않은가."
20033-CVGroup_WeaponGet_Idle1-1 = "킥… 키킥… 캬하하하하! 정말이지, 만만치 않군. 선생. 이런 선물을 준비했다니.\n…신뢰의 증거로서 받아두도록 하지. 앞으로도 잘 부탁하마. 선생."
20033-CVGroup_UIEventShop_Enter1-1 = "게헨나 파티를 기념해, 특별히 개점한 상점이다."
20033-CVGroup_UIEventShop_Enter1-2 = "맘껏 둘러보도록. 키킷."
20033-CVGroup_UIEventShop_Enter2-1 = "……누군가 했더니, 선생인가. 구입할 물건은, 이미 정했나?"
20033-CVGroup_UIEventShop_Enter3-1 = "키킷, 아쉽지만, 임시 상점은 여기까지다."
20033-CVGroup_UIEventShop_Enter3-2 = "그렇게 아쉬운 표정 짓지 말도록."
20033-CVGroup_UIEventShop_Enter3-3 = "다음엔 더욱 규모를 확장해서, 성대하고 호화롭게 돌아올 테니까, 키키킥!"
20033-CVGroup_UIEventShop_Idle1-1 = "여기 있는 물건은 전부, 우리 판데모니움 소사이어티가 마련한 것이다."
20033-CVGroup_UIEventShop_Idle1-2 = "아아, 우리에게 재력이 있기에 가능했던 일이지."
20033-CVGroup_UIEventShop_Idle1-3 = "놀라긴 이르다고. 큭큭큭."
20033-CVGroup_UIEventShop_Idle2-1 = "음? 물건은 어쨌지?"
20033-CVGroup_UIEventShop_Idle2-2 = "키키킷, 혹시, 선생의 목적은 이 마코토 님 쪽인가?"
20033-CVGroup_UIEventShop_Idle2-3 = "…특별히 용무는 없다…? …그런가."
20033-CVGroup_UIEventShop_Buy1-1 = "호오, 그걸 고르다니. 그 심미안, 높이 평가해 주마."
20033-CVGroup_UIEventShop_Buy2-1 = "그건 이 몸도 추천하는 물건이다."
20033-CVGroup_UIEventShop_Buy2-2 = "킥킥킥. 좋은 물건을 골랐군."
20033-CVGroup_UIEventShop_Buy3-1 = "키키킥, 오늘의 이 몸은 기분이 좋군."
20033-CVGroup_UIEventShop_Buy3-2 = "덤을 주도록 하지! 판데모니움 소사이어티의 협력 제안서다!"
20033-CVGroup_UIEventShop_Buy3-3 = "…뭐? 필요 없다고?"
20033-CVGroup_UIEventShop_Buy4-1 = "그게 갖고 싶었나. 선생. 킥킥, 별난 사람이로군."

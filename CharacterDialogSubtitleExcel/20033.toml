[translation]
20033-CVGroup_UITitle_Idle1-1 = "Kihehe. Blue... Archive!"
20033-CVGroup_CharacterGet_Idle1-1 = "I have arrived! Kihehe. I, the Great Hanuma Makoto of the Pandemonium Society, am here in the flesh. Now bow! Shower me with your praise and hospitality!"
20033-CVGroup_Cafe_Idle1-1 = "Schale... Kihehe. It's as cramped as ever."
20033-CVGroup_Cafe_Idle2-1 = "Ibuki's playground project must be planned and constructed meticulously..."
20033-CVGroup_Cafe_Idle3-1 = "If we wish to ensure Iroha's capture..."
20033-CVGroup_Cafe_Idle4-1 = "Satsuki. Chiaki. I will be GREATLY displeased if I hear you're ditching class again."
20033-CVGroup_Cafe_Idle5-1 = "These vibes aren't too bad."
20033-CVGroup_WeaponGet_Idle1-1 = "Ki...Kihe...Kihehehehe! You're quite formidable, Sensei. To have prepared such a gift... I'll take it as proof of your faith. I look forward to having your support in the future as well."
20033-CVGroup_UIEventShop_Enter1-1 = "It's a shop that was specially opened in honor of the Gehenna Party."
20033-CVGroup_UIEventShop_Enter1-2 = "Feel free to take a look around. Kihehe."
20033-CVGroup_UIEventShop_Enter2-1 = "...I was wondering who that was. Have you decided on your purchase, Sensei?"
20033-CVGroup_UIEventShop_Enter3-1 = "Kehe. It's a shame, but this is the end for this temporary store."
20033-CVGroup_UIEventShop_Enter3-2 = "Oh, don't look so down and out."
20033-CVGroup_UIEventShop_Enter3-3 = "We'll make the next one even larger and more luxurious! Kihehe!"
20033-CVGroup_UIEventShop_Idle1-1 = "All the goods here are items that the Pandemonium Society has prepared."
20033-CVGroup_UIEventShop_Idle1-2 = "Ahh, it was possible thanks to our vast financial power."
20033-CVGroup_UIEventShop_Idle1-3 = "We've just begun! Don't be surprised just yet. Kihehe."
20033-CVGroup_UIEventShop_Idle2-1 = "Hm? What did I do with the goods?"
20033-CVGroup_UIEventShop_Idle2-2 = "Kihehe. Are you plotting to take your place at my side?"
20033-CVGroup_UIEventShop_Idle2-3 = "You don't have any particular aim? Is that so...?"
20033-CVGroup_UIEventShop_Buy1-1 = "Oho, to think you'd choose that path. I applaud your skilled evaluation."
20033-CVGroup_UIEventShop_Buy2-1 = "I was going to recommend you take that one."
20033-CVGroup_UIEventShop_Buy2-2 = "Kihehe. Excellent choice."
20033-CVGroup_UIEventShop_Buy3-1 = "Kihehe. I am in a good mood today."
20033-CVGroup_UIEventShop_Buy3-2 = "I'll throw in a little bonus! Here's a cooperation proposal from the Pandemonium Society!"
20033-CVGroup_UIEventShop_Buy3-3 = "...Huh? You don't need it?"
20033-CVGroup_UIEventShop_Buy4-1 = "So that's what you wanted, Sensei? Kihehehe. You're a strange one."

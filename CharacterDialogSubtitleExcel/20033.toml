[translation]
20033-CVGroup_UITitle_Idle1-1 = "หึหึหึ Blue Archive!"
20033-CVGroup_CharacterGet_Idle1-1 = "ในที่สุดก็มาสักทีนะ! คิกคิกคิก... \nท่านฮานุมะ มาโคโตะ แห่งแพนเดโมเนียม โซไซตี้\nมาหาถึงที่เลยนะ จงต้อนรับเราอย่างยิ่งใหญ่ซะเถอะ"
20033-CVGroup_Cafe_Idle1-1 = "ชาเล่ต์... คิกๆ... ดูยังไงก็เป็นที่ที่คับแคบซะจริงๆ"
20033-CVGroup_Cafe_Idle2-1 = "คงจะต้องวางแผน... ทำเป็นสวนสนุกของอิบูกิ..."
20033-CVGroup_Cafe_Idle3-1 = "ยัยอิโรฮะ ถ้าควบคุมให้ดีๆ ละก็..."
20033-CVGroup_Cafe_Idle4-1 = "ซัตสึกิกับจิอากิ ยัยพวกนั้นก็คงจะไม่อู้งานกันแบบนี้..."
20033-CVGroup_Cafe_Idle5-1 = "บรรยากาศแบบนี้ใช้ได้ทีเดียวเลยนะ"
20033-CVGroup_WeaponGet_Idle1-1 = "คิก...คิกคิก...วะฮะฮ่าฮ่าฮ่า! จริงๆ เลย ไม่ธรรมดาเลยนะ คุณครู\nเตรียมของขวัญแบบนี้มาให้งั้นเหรอ\nงั้นเราจะรับไว้เป็นหลักฐาน แห่งความเชื่อใจก็แล้วกัน\nต่อไปก็ขอฝากตัวด้วยนะ"
20033-CVGroup_UIEventShop_Enter1-1 = "นี่คือร้านที่เปิดเป็นพิเศษเป็นที่ระลึกให้ปาร์ตี้เกเฮนน่า"
20033-CVGroup_UIEventShop_Enter1-2 = "เข้ามาชมให้หนำใจเลยสิ หึหึ"
20033-CVGroup_UIEventShop_Enter2-1 = "นึกว่าใครที่ไหน ครูเองเหรอ\nคิดได้รึยังว่าจะซื้ออะไร?"
20033-CVGroup_UIEventShop_Enter3-1 = "หึหึ น่าเสียดายนะ\nแต่ร้านค้าชั่วคราวเปิดถึงแค่เท่านี้"
20033-CVGroup_UIEventShop_Enter3-2 = "อย่าทำหน้าเหมือนเสียดายแบบนั้นสิ"
20033-CVGroup_UIEventShop_Enter3-3 = "ไว้รอบหน้าฉันจะขยายร้าน\nแล้วกลับมาอย่างสง่างามเลย หึหึหึ!"
20033-CVGroup_UIEventShop_Idle1-1 = "ของทุกชิ้นที่นี่ เป็นของที่แพนเดโมเนียม โซไซตี้เตรียมมา"
20033-CVGroup_UIEventShop_Idle1-2 = "อ้อ ที่เป็นอย่างนี้ได้เพราะเรามีกำลังทรัพย์ยังไงล่ะ"
20033-CVGroup_UIEventShop_Idle1-3 = "ยังเร็วไปที่จะตกใจนะ หึหึหึ"
20033-CVGroup_UIEventShop_Idle2-1 = "หืม? ของมันเป็นยังไงเหรอ?"
20033-CVGroup_UIEventShop_Idle2-2 = "หึหึหึ หรือว่าเป้าหมายของครู คือท่านมาโคโตะผู้นี้?"
20033-CVGroup_UIEventShop_Idle2-3 = "ไม่ได้มีธุระอะไรเป็นพิเศษ...? งั้นเหรอ?"
20033-CVGroup_UIEventShop_Buy1-1 = "โอ้ เลือกชิ้นนั้นเหรอ รสนิยมดีจังเลยนะ"
20033-CVGroup_UIEventShop_Buy2-1 = "นั่นเป็นของที่เรา\nก็แนะนำเหมือนกัน"
20033-CVGroup_UIEventShop_Buy2-2 = "คิกคิกคิก เลือกของดีเลยนะ"
20033-CVGroup_UIEventShop_Buy3-1 = "คิกคิกคิก วันนี้เราอารมณ์ดีเลยละ"
20033-CVGroup_UIEventShop_Buy3-2 = "งั้นจะแถมของให้แล้วกัน!\nนี่คือหนังสือยื่นเสนอความร่วมมือกับแพนเดโมเนียม โซไซตี้!"
20033-CVGroup_UIEventShop_Buy3-3 = "อะไรนะ? ไม่ต้องการเหรอ?"
20033-CVGroup_UIEventShop_Buy4-1 = "อยากได้อันนี้เหรอครู หึหึ เป็นคนแปลกดีแฮะ"

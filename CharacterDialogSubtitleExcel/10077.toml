[translation]
10077-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10077-CVGroup_CharacterGet_Idle1-1 = "Oh, have you come to pick me up? I would have gone myself if you'd asked. Once again, I am Ichika of the Trinity General School Justice Task Force. Please look after me!"
10077-CVGroup_Cafe_Idle1-1 = "Ah, so this is it? Sensei's Cafe!"
10077-CVGroup_Cafe_Idle2-1 = "I see. So this is how you like it..."
10077-CVGroup_Cafe_Idle3-1 = "I like how peaceful it is here!"
10077-CVGroup_Cafe_Idle4-1 = "I'm relaxing..."
10077-CVGroup_Cafe_Idle5-1 = "Should I at least help clean...?"
10077-CVGroup_WeaponGet_Idle1-1 = "What should I say...? I'm thankful that you're treating me so kindly, but I don't know if I deserve it... Still... I'm happy. Really."
10077-CVGroup_UIEventLobby_Enter1-1 = "Welcome! I'm ready as I'll ever be!"
10077-CVGroup_UIEventLobby_Enter2-1 = "Let's get started!"
10077-CVGroup_UIEventLobby_Enter3-1 = "Wouldn't you say there's about half left?"
10077-CVGroup_UIEventLobby_Enter4-1 = "We're almost there. If there's anything I can do to help, please let me know!"
10077-CVGroup_UIEventLobby_Enter5-1 = "Very good. I'll take a look around!"
10077-CVGroup_UIEventLobby_Idle1-1 = "Yes. I'm right here."
10077-CVGroup_UIEventLobby_Idle2-1 = "Hm...? What's wrong?"
10077-CVGroup_UIEventLobby_Idle3-1 = "I don't care for this kind of joke... Heehee."
10077-CVGroup_UIEventLobby_Idle4-1 = "Oh, Sensei. You don't have to call me multiple times like that. I'm always on standby right here."
10077-CVGroup_UIEventMission_Enter1-1 = "Oh! Sensei! Perfect timing!"
10077-CVGroup_UIEventMission_Enter2-1 = "You're going to check the list, aren't you? I've prepared it for you!"
10077-CVGroup_UIEventMission_Idle1-1 = "Ah! What's this, Sensei? Are you going to do the same thing?"
10077-CVGroup_UIEventMission_Idle2-1 = "...Next time, come prepared!"
10077-CVGroup_UIEventMission_Buy1-1 = "Yes! Confirmation complete!"
10077-CVGroup_UIEventMission_Buy2-1 = "Is that it? Let's clean up!"
10077-CVGroup_UIEventMission_Interaction1-1 = "That's it for today! Haha! What are you going to do now, Sensei?"

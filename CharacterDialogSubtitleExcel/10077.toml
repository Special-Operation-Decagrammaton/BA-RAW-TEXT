[translation]
10077-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10077-CVGroup_CharacterGet_Idle1-1 = "咦，是來接我的嗎？跟我說一聲的話我就過去了說～\n重新自我介紹，我是三一綜合學園，實現正義部的一花。請多指教！"
10077-CVGroup_Cafe_Idle1-1 = "哦～是這裡嗎？\n老師的咖啡廳！"
10077-CVGroup_Cafe_Idle2-1 = "原來如此。\n是這種興趣啊……"
10077-CVGroup_Cafe_Idle3-1 = "這裡很和平，真棒呢！"
10077-CVGroup_Cafe_Idle4-1 = "好放鬆……"
10077-CVGroup_Cafe_Idle5-1 = "要幫忙整理一下嗎……"
10077-CVGroup_WeaponGet_Idle1-1 = "該怎麼說呢……那個……\n能收到這麼好的東西，我當然非常感激……\n但我是否有那個價值就……不過……我很高興。真的。"
10077-CVGroup_UIEventLobby_Enter1-1 = "歡迎！這邊已經準備就緒囉！"
10077-CVGroup_UIEventLobby_Enter2-1 = "來，一步步開始吧！"
10077-CVGroup_UIEventLobby_Enter3-1 = "這樣一來，只剩下一半了吧？"
10077-CVGroup_UIEventLobby_Enter4-1 = "沒剩多久了呢。\n如果有我能幫忙的地方，希望你儘管說！"
10077-CVGroup_UIEventLobby_Enter5-1 = "那麼，大致瀏覽一下吧！"
10077-CVGroup_UIEventLobby_Idle1-1 = "是，我在這裡唷 。"
10077-CVGroup_UIEventLobby_Idle2-1 = "嗯……？從剛才開始怎麼了嗎？"
10077-CVGroup_UIEventLobby_Idle3-1 = "那種惡作劇，不太好唷～嘻嘻。"
10077-CVGroup_UIEventLobby_Idle4-1 = "哈哈，老師，不用叫那麼多次。\n我會一直在這裡待命唷。"
10077-CVGroup_UIEventMission_Enter1-1 = "啊！老師！來得正好！"
10077-CVGroup_UIEventMission_Enter2-1 = "是來確認清單的吧？\n已經準備在這裡囉！"
10077-CVGroup_UIEventMission_Idle1-1 = "哎呀！怎麼這樣呢，老師。\n我也可以用同樣的方式回擊嗎？"
10077-CVGroup_UIEventMission_Idle2-1 = "……下次要做好覺悟唷！"
10077-CVGroup_UIEventMission_Buy1-1 = "好！確認完畢～！"
10077-CVGroup_UIEventMission_Buy2-1 = "是那個嗎？\n我會搞定的！"
10077-CVGroup_UIEventMission_Interaction1-1 = "今天就到此為止！\n哈哈！老師，你之後打算做什麼呢？"

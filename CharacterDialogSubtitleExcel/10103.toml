[translation]
10103-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10103-CVGroup_CharacterGet_Idle1-1 = "As the security chairman of Red Winter Federal Academy, I'll show you the meaning of valor!"
10103-CVGroup_Cafe_Idle1-1 = "...What is this? How...cute."
10103-CVGroup_Cafe_Idle2-1 = "S-something cold just brushed between my legs..."
10103-CVGroup_Cafe_Idle3-1 = "I need to display more elegance."
10103-CVGroup_Cafe_Idle4-1 = "*yawn* I'm sore from staying so still."
10103-CVGroup_Cafe_Idle5-1 = "(These clothes are so thin. Students at other schools are really okay with this?)"
10103-CVGroup_WeaponGet_Idle1-1 = "Ah, Gray Balalaika. To maintain a stable mount even while charging, there's nothing like an SMG with a strap. But it does rub against the skin in this outfit, so it hurts a bit..."
10103-CVGroup_UIEventLobby_Enter1-1 = "The prestige of Red Winter and Shanhaijing hang in the balance of this exchange meeting..."
10103-CVGroup_UIEventLobby_Enter1-2 = "It must be a success, no matter what!"
10103-CVGroup_UIEventLobby_Enter2-1 = "You want to know what I'm doing here?"
10103-CVGroup_UIEventLobby_Enter2-2 = "As you can plainly see, I'm in the middle of escorting the Great Leader, for her safety."
10103-CVGroup_UIEventLobby_Enter2-3 = "H-Huh? Great Leader Cherino?! Where did she go?"
10103-CVGroup_UIEventLobby_Enter3-1 = "What does Shanhaijing think they're doing? Treating us like this..."
10103-CVGroup_UIEventLobby_Enter3-2 = "Don't think I'll let them get away with it!"
10103-CVGroup_UIEventLobby_Enter4-1 = "Allowing a coup d'etat in front of outsiders..."
10103-CVGroup_UIEventLobby_Enter4-2 = "Those Shanhaijing guys have really embarrassed themselves."
10103-CVGroup_UIEventLobby_Enter4-3 = "If we were talking about Red Winter Federal Academy..."
10103-CVGroup_UIEventLobby_Enter4-4 = "...Ahem! A coup d'etat is really a minor issue."
10103-CVGroup_UIEventLobby_Enter5-1 = "*sigh* I'm exhausted..."
10103-CVGroup_UIEventLobby_Enter5-2 = " I never thought I'd start to miss the snowfields of Red Winter."
10103-CVGroup_UIEventLobby_Idle1-1 = "The streets of Shanhaijing are too complicated..."
10103-CVGroup_UIEventLobby_Idle1-2 = "They aren't suited for a charge."
10103-CVGroup_UIEventLobby_Idle2-1 = "Intimidated by a single club..."
10103-CVGroup_UIEventLobby_Idle2-2 = "The members of the Genryumon must be softer than they look."
10103-CVGroup_UIEventLobby_Idle2-3 = "For the sake of the authority of the student council..."
10103-CVGroup_UIEventLobby_Idle2-4 = "We can't let things slide, no matter how hard our opponents try to persuade..."
10103-CVGroup_UIEventLobby_Idle2-5 = "Hm? What am I holding?"
10103-CVGroup_UIEventLobby_Idle2-6 = "...Just some dumplings I got for free from the Black Tortoise Promenade."
10103-CVGroup_UIEventLobby_Idle3-1 = "The president's bodyguard gave me sunglasses..."
10103-CVGroup_UIEventLobby_Idle3-2 = "Her outfit, her presence... She was no ordinary person."
10103-CVGroup_UIEventLobby_Idle4-1 = "I heard that it's a rule that you can't wear a slip under a qipao."
10103-CVGroup_UIEventLobby_Idle4-2 = "Is that right?"
10103-CVGroup_UIEventLobby_Idle4-3 = "I don't want to insult the customs of other academies, but..."
10103-CVGroup_UIEventLobby_Idle4-4 = "It just doesn't seem like the right outfit for a charge..."
10103-CVGroup_UIEventShop_Enter1-1 = "What are you doing here? I'm just organizing what we need for the exchange meeting..."
10103-CVGroup_UIEventShop_Enter2-1 = "Would you mind donating some supplies?"
10103-CVGroup_UIEventShop_Enter2-2 = "I think this exchange meeting is going to be larger than expected."
10103-CVGroup_UIEventShop_Enter3-1 = "The exchange meeting is over, but supply donations are always welcome."
10103-CVGroup_UIEventShop_Idle1-1 = "We're all in the same boat, so we might as well help other academies."
10103-CVGroup_UIEventShop_Idle2-1 = "(This Peking opera mask...is kind of scary if you stare at it long enough...)"
10103-CVGroup_UIEventShop_Buy1-1 = "Oh, that's a good item."
10103-CVGroup_UIEventShop_Buy2-1 = "We have enough to hold a successful exchange meeting."
10103-CVGroup_UIEventShop_Buy3-1 = "Um... Sensei. I'm not making any accusations, but...where did you get all these supplies...?"
10103-CVGroup_UIEventShop_Buy4-1 = "Excellent! Sensei's name will continue to be praised in both schools!"

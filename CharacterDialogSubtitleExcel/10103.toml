[translation]
10103-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10103-CVGroup_CharacterGet_Idle1-1 = "身為赤冬聯邦學園的保安委員長，\n就讓你見識見識真正的英勇吧！"
10103-CVGroup_Cafe_Idle1-1 = "這是什麼啊？\n……還挺可愛的嘛。"
10103-CVGroup_Cafe_Idle2-1 = "……！剛，剛才腳邊有股冰冷的觸感……"
10103-CVGroup_Cafe_Idle3-1 = "得展現更具格調的模樣才行……"
10103-CVGroup_Cafe_Idle4-1 = "呼啊……\n一直待著不動，讓人有點煩躁……"
10103-CVGroup_Cafe_Idle5-1 = "（總是穿著這麼單薄的衣服……別校的學生都不介意嗎？）"
10103-CVGroup_WeaponGet_Idle1-1 = "啊啊，我的巴拉萊卡……\n在突擊當中，沒有什麼是比有背帶的衝鋒槍更讓人有安全感的了。\n……不過，打扮成這樣的話，背帶會因為摩擦讓人有點痛就是了……"
10103-CVGroup_UIEventLobby_Enter1-1 = "赤冬與山海經，攸關兩校威信的這場交流會……"
10103-CVGroup_UIEventLobby_Enter1-2 = "無論如何都得辦成功才行！"
10103-CVGroup_UIEventLobby_Enter2-1 = "問我在這裡做什麼？"
10103-CVGroup_UIEventLobby_Enter2-2 = "如你所見，正在擔任守護書記長安全的護衛──"
10103-CVGroup_UIEventLobby_Enter2-3 = "……不，不見了！？\n潔莉諾書記長！？您在哪裡！？"
10103-CVGroup_UIEventLobby_Enter3-1 = "山海經究竟在打什麼主意？\n這樣對待我們……"
10103-CVGroup_UIEventLobby_Enter3-2 = "別想就這麼算了！"
10103-CVGroup_UIEventLobby_Enter4-1 = "居然在外校學生面前讓騷動發生……"
10103-CVGroup_UIEventLobby_Enter4-2 = "山海經也出盡洋相了啊。"
10103-CVGroup_UIEventLobby_Enter4-3 = "換作是我們赤冬聯邦學園的話，那種事絕對……！"
10103-CVGroup_UIEventLobby_Enter4-4 = "……咳哼！算了，那種程度只是小問題而已。"
10103-CVGroup_UIEventLobby_Enter5-1 = "呼……好累……"
10103-CVGroup_UIEventLobby_Enter5-2 = "想不到竟然會有開始懷念起赤冬雪原的這天啊……"
10103-CVGroup_UIEventLobby_Idle1-1 = "山海經的街道就跟迷宮一樣……"
10103-CVGroup_UIEventLobby_Idle1-2 = "並不適合突擊啊。"
10103-CVGroup_UIEventLobby_Idle2-1 = "哈！竟然會因為區區一個社團陷入苦戰……"
10103-CVGroup_UIEventLobby_Idle2-2 = "玄龍門也不怎麼樣嘛。"
10103-CVGroup_UIEventLobby_Idle2-3 = "為了樹立我大事務局的權威，"
10103-CVGroup_UIEventLobby_Idle2-4 = "對方無論使出任何手段都絕不會受到懷柔，而會穩重地──"
10103-CVGroup_UIEventLobby_Idle2-5 = "……嗯？這個？"
10103-CVGroup_UIEventLobby_Idle2-6 = "是玄武商會招待的中華包子。"
10103-CVGroup_UIEventLobby_Idle3-1 = "我從門主的護衛手中收到了墨鏡。"
10103-CVGroup_UIEventLobby_Idle3-2 = "外表也好，存在感也罷，那……絕非等閒之輩啊……"
10103-CVGroup_UIEventLobby_Idle4-1 = "聽說在旗袍裡面穿內衣是不合規矩的……"
10103-CVGroup_UIEventLobby_Idle4-2 = "真的是這樣嗎？"
10103-CVGroup_UIEventLobby_Idle4-3 = "雖然應該尊重他校的風俗……"
10103-CVGroup_UIEventLobby_Idle4-4 = "但這似乎並非適合突擊的服裝啊……"
10103-CVGroup_UIEventShop_Enter1-1 = "有什麼事？我嗎？\n正在為交流會做整理。"
10103-CVGroup_UIEventShop_Enter2-1 = "不介意的話，物資的捐贈可以麻煩你嗎？"
10103-CVGroup_UIEventShop_Enter2-2 = "這次的交流會，規模似乎會變得比預期中更大啊。"
10103-CVGroup_UIEventShop_Enter3-1 = "交流會雖然結束了……\n但物資的捐贈隨時都很歡迎。"
10103-CVGroup_UIEventShop_Idle1-1 = "既然都走到這一步了，就對他校伸出援手吧。"
10103-CVGroup_UIEventShop_Idle2-1 = "（京劇的面具……仔細一看，好像有點可怕……）"
10103-CVGroup_UIEventShop_Buy1-1 = "哦哦，這是好東西啊。"
10103-CVGroup_UIEventShop_Buy2-1 = "有這麼多的話，交流會肯定會成功的。"
10103-CVGroup_UIEventShop_Buy3-1 = "那個……老師。我沒有要懷疑你的意思……\n但這麼多的物資，你究竟是從哪裡……？"
10103-CVGroup_UIEventShop_Buy4-1 = "太厲害了！\n老師的名號，將會被兩校不斷傳頌吧！"

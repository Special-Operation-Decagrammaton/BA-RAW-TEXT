[translation]
10103-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10103-CVGroup_CharacterGet_Idle1-1 = "붉은겨울 연방학원의 보안위원장으로서 용맹이 무엇인지 보여주지!"
10103-CVGroup_Cafe_Idle1-1 = "…뭐냐, 이건. 귀엽잖아?"
10103-CVGroup_Cafe_Idle2-1 = "바, 방금 다리 사이로 무언가 서늘한 것이 스치고 지나갔는데…"
10103-CVGroup_Cafe_Idle3-1 = "좀 더 기품 있는 모습을 보이지 않으면…"
10103-CVGroup_Cafe_Idle4-1 = "하암… 가만히 있으려니 좀이 쑤시네."
10103-CVGroup_Cafe_Idle5-1 = "(항상 이런 얇은 옷을… 다른 학교의 학생들은 아무렇지도 않은 건가?)"
10103-CVGroup_WeaponGet_Idle1-1 = "아아, 발랄라이카. 돌격 중에도 안정적으로 견착을 하기 위해서는 슬링이 달린 기관단총만 한 것이 없지.\n…다만 이 차림일 때는 어깨끈이 살에 쓸려서 조금 아프단 말이지…"
10103-CVGroup_UIEventLobby_Enter1-1 = "붉은겨울과 산해경, 양 학교의 위신이 걸린 이 교류회는…"
10103-CVGroup_UIEventLobby_Enter1-2 = "어떻게 해서든 성공시켜야 해!"
10103-CVGroup_UIEventLobby_Enter2-1 = "이곳에서 무얼 하고 있느냐고?"
10103-CVGroup_UIEventLobby_Enter2-2 = "보다시피 서기장님을 지키기 위해 호위를 하고 있던 중이었다만—"
10103-CVGroup_UIEventLobby_Enter2-3 = "어, 어라? 체리노 서기장님?! 어디에 가셨지?"
10103-CVGroup_UIEventLobby_Enter3-1 = "산해경 녀석들은 도대체 무슨 꿍꿍이인 거지? 우리를 이렇게 취급하기나 하고…"
10103-CVGroup_UIEventLobby_Enter3-2 = "그냥 넘어갈 거라고는 생각지 마라!"
10103-CVGroup_UIEventLobby_Enter4-1 = "외부인 앞에서 쿠데타를 허용하다니."
10103-CVGroup_UIEventLobby_Enter4-2 = "산해경 녀석들, 부끄러운 추태를 보였군."
10103-CVGroup_UIEventLobby_Enter4-3 = "우리 붉은겨울 연방학원이라면 결단코…!"
10103-CVGroup_UIEventLobby_Enter4-4 = "…크흠! 뭐, 쿠데타 정도야 사소한 문제지."
10103-CVGroup_UIEventLobby_Enter5-1 = "후우, 지쳤다…"
10103-CVGroup_UIEventLobby_Enter5-2 = "설마 붉은겨울의 설원이 그리워지게 될 줄은 몰랐네."
10103-CVGroup_UIEventLobby_Idle1-1 = "산해경의 거리는 너무 복잡해서…"
10103-CVGroup_UIEventLobby_Idle1-2 = "돌격하기에 적합하지가 않군."
10103-CVGroup_UIEventLobby_Idle2-1 = "일개 동아리에 쩔쩔매고 있다니,"
10103-CVGroup_UIEventLobby_Idle2-2 = "현룡문 녀석들도 보기보다 무르군."
10103-CVGroup_UIEventLobby_Idle2-3 = "학생회의 권위를 드높이기 위해서는,"
10103-CVGroup_UIEventLobby_Idle2-4 = "상대가 어떤 회유책을 건네더라도 넘어가지 말아야—"
10103-CVGroup_UIEventLobby_Idle2-5 = "응? 지금 들고 있는 게 뭐냐고?"
10103-CVGroup_UIEventLobby_Idle2-6 = "…현무상회에서 서비스로 받은 중화만두다만."
10103-CVGroup_UIEventLobby_Idle3-1 = "문주의 경호원으로부터 선글라스를 선물 받았다…"
10103-CVGroup_UIEventLobby_Idle3-2 = "차림도, 존재감도, 뭔가… 평범하지 않은 자였어…"
10103-CVGroup_UIEventLobby_Idle4-1 = "치파오의 아래에는 속바지를 입으면 안 된다는 룰이 있다던데."
10103-CVGroup_UIEventLobby_Idle4-2 = "정말로 이게 맞는 건가?"
10103-CVGroup_UIEventLobby_Idle4-3 = "다른 학원의 관습을 무시할 생각은 아니지만,"
10103-CVGroup_UIEventLobby_Idle4-4 = "어쩐지 돌격하기에 적합하지 않은 차림 같은데…"
10103-CVGroup_UIEventShop_Enter1-1 = "여기는 무슨 일이지?\n나는 이곳에서 교류회에 필요한 물건을 정리하고 있었다만…"
10103-CVGroup_UIEventShop_Enter2-1 = "괜찮다면 물자를 좀 기부해 주지 않겠나?"
10103-CVGroup_UIEventShop_Enter2-2 = "이번 교류회는 생각보다 규모가 커질 것 같아서 말이야."
10103-CVGroup_UIEventShop_Enter3-1 = "교류회는 끝났지만 물자 기부라면 언제든 환영이다."
10103-CVGroup_UIEventShop_Idle1-1 = "같은 배를 탄 이상, 다른 학원이라도 함께 도와야지."
10103-CVGroup_UIEventShop_Idle2-1 = "(이 경극 가면… 가만히 쳐다보고 있으면 뭔가 무섭단 말이지…)"
10103-CVGroup_UIEventShop_Buy1-1 = "오, 좋은 물건이로군."
10103-CVGroup_UIEventShop_Buy2-1 = "이만한 양이라면 성공적인 교류회를 개최할 수 있겠어."
10103-CVGroup_UIEventShop_Buy3-1 = "저… 선생. 의심하는 것은 아니다만…\n이렇게 많은 물자를, 도대체 어디서…?"
10103-CVGroup_UIEventShop_Buy4-1 = "훌륭해! 선생의 이름은 두 학교에서 계속해서 회자될 것이다!"

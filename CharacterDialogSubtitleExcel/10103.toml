[translation]
10103-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10103-CVGroup_CharacterGet_Idle1-1 = "ในฐานะหัวหน้าคณะความมั่นคงของเรดวินเทอร์\nฉันจะแสดงให้เห็นถึงความกล้าหาญเอง!"
10103-CVGroup_Cafe_Idle1-1 = "นี่มันอะไรน่ะ... น่ารักจัง?"
10103-CVGroup_Cafe_Idle2-1 = "มะ... เมื่อกี้เหมือนจะมีอะไรเย็นๆ ลอดผ่านขาไปเลย..."
10103-CVGroup_Cafe_Idle3-1 = "ถ้าไม่แสดงภาพลักษณ์ที่สง่างามกว่านี้ให้เห็นละก็..."
10103-CVGroup_Cafe_Idle4-1 = "ฮ้าว... ถึงจะอยู่เฉยๆ แบบนี้ก็ยังเมื่อยนิดหน่อยแฮะ"
10103-CVGroup_Cafe_Idle5-1 = "(พวกนักเรียนคนอื่นไม่รู้สึกอะไรกับการใส่เสื้อผ้าบางๆ แบบนี้เลยงั้นเหรอ?)"
10103-CVGroup_WeaponGet_Idle1-1 = "อ่า... บาลาไลกา\nไม่มีอะไรดีกว่าปืนกลมือที่มีสลิงยึดจับเพื่อให้โจมตีได้อย่างมั่นคงแล้วละ\nแต่พอใส่ชุดแบบนี้ สายคล้องไหล่มันก็เสียดสีกับผิวจนเจ็บนิดหน่อยน่ะ..."
10103-CVGroup_UIEventLobby_Enter1-1 = "เรดวินเทอร์กับซานไห่จิง งานแลกเปลี่ยนนี้...\nมีศักดิ์ศรีของ 2 โรงเรียนเป็นเดิมพัน"
10103-CVGroup_UIEventLobby_Enter1-2 = "ไม่ว่ายังไงก็ต้องทำให้สำเร็จให้ได้!"
10103-CVGroup_UIEventLobby_Enter2-1 = "ฉันมาทำอะไรอยู่ที่นี่น่ะเหรอ?"
10103-CVGroup_UIEventLobby_Enter2-2 = "ก็อย่างที่เห็นว่าฉันกำลังคุ้มกันท่านเลขาธิการอยู่..."
10103-CVGroup_UIEventLobby_Enter2-3 = "เอะ... เอ๋? ท่านเลขาธิการเชริโน่?! ไปไหนซะแล้วล่ะ?"
10103-CVGroup_UIEventLobby_Enter3-1 = "พวกเด็กซานไห่จิงคิดแผนการอะไรอยู่กันแน่นะ?\nถึงได้ปฏิบัติต่อพวกเรากันขนาดนี้..."
10103-CVGroup_UIEventLobby_Enter3-2 = "อย่าคิดว่าฉันจะยอมปล่อยไปเฉยๆ นะ!"
10103-CVGroup_UIEventLobby_Enter4-1 = "ปล่อยให้มีการปฏิวัติต่อหน้าคนนอกแบบนี้..."
10103-CVGroup_UIEventLobby_Enter4-2 = "พวกซานไห่จิงทำเรื่องน่าอับอายเสียจริง"
10103-CVGroup_UIEventLobby_Enter4-3 = "ถ้าเป็นสถาบันสหภาพเรดวินเทอร์ของเราละก็ไม่มีทางเด็ดขาด...!"
10103-CVGroup_UIEventLobby_Enter4-4 = "อะแฮ่ม...! ก็แค่การปฏิวัติเรื่องเล็กน้อยน่า"
10103-CVGroup_UIEventLobby_Enter5-1 = "เฮ้อ เหนื่อยจัง..."
10103-CVGroup_UIEventLobby_Enter5-2 = "ไม่คิดเลยว่าจะคิดถึงทุ่งหิมะของเรดวินเทอร์ขึ้นมา"
10103-CVGroup_UIEventLobby_Idle1-1 = "ถนนหนทางในซานไห่จิงซับซ้อนเหลือเกิน..."
10103-CVGroup_UIEventLobby_Idle1-2 = "ไม่เหมาะสำหรับการบุกจู่โจมเลย"
10103-CVGroup_UIEventLobby_Idle2-1 = "ประหม่ากับแค่ชมรมอะไรเนี่ยนะ"
10103-CVGroup_UIEventLobby_Idle2-2 = "พวกมังกรดำก็อ่อนแอกว่าที่เห็นแฮะ"
10103-CVGroup_UIEventLobby_Idle2-3 = "หากจะเพิ่มอำนาจของสภานักเรียนละก็"
10103-CVGroup_UIEventLobby_Idle2-4 = "ไม่ว่าอีกฝ่ายจะเสนอการประนีประนอมอย่างไรก็ไม่ควรหลงกล..."
10103-CVGroup_UIEventLobby_Idle2-5 = "หืม? ฉันกำลังถืออะไรอยู่น่ะเหรอ?"
10103-CVGroup_UIEventLobby_Idle2-6 = "เกี๊ยวที่ย่านการค้าเทพเต่าดำแถมมาให้น่ะสิ"
10103-CVGroup_UIEventLobby_Idle3-1 = "ฉันได้แว่นกันแดดเป็นของขวัญจากผู้พิทักษ์ของประมุขมาน่ะ..."
10103-CVGroup_UIEventLobby_Idle3-2 = "ทั้งการแต่งตัวและกิริยาท่าทาง... ดูไม่ใช่คนธรรมดาๆ เลย..."
10103-CVGroup_UIEventLobby_Idle4-1 = "ได้ยินว่ามีกฎห้ามใส่กางเกงซับในในชุดกี่เพ้าด้วยนะ"
10103-CVGroup_UIEventLobby_Idle4-2 = "แบบนี้ถูกต้องจริงๆ เหรอ?"
10103-CVGroup_UIEventLobby_Idle4-3 = "ฉันไม่ได้จะดูหมิ่นธรรมเนียมของโรงเรียนอื่นหรอกนะ"
10103-CVGroup_UIEventLobby_Idle4-4 = "แต่ชุดแบบนี้มันดูไม่เหมาะสมกับการบุกจู่โจมเลย..."
10103-CVGroup_UIEventShop_Enter1-1 = "นี่มันเรื่องอะไรกันเนี่ย?\nทำไมฉันถึงมาจัดของที่จำเป็นในงานแลกเปลี่ยนอยู่ที่นี่..."
10103-CVGroup_UIEventShop_Enter2-1 = "ถ้าไม่ว่าอะไร ช่วยบริจาคสิ่งของหน่อยได้มั้ย?"
10103-CVGroup_UIEventShop_Enter2-2 = "งานแลกเปลี่ยนครั้งนี้ดูเป็นงานใหญ่กว่าที่คิดน่ะ"
10103-CVGroup_UIEventShop_Enter3-1 = "งานแลกเปลี่ยนจบไปแล้วแต่ก็มาบริจาคของได้ทุกเมื่อนะ"
10103-CVGroup_UIEventShop_Idle1-1 = "ในเมื่อลงเรือลำเดียวกันแล้วต่อให้เป็นโรงเรียนอื่นก็ต้องช่วยกันสิ"
10103-CVGroup_UIEventShop_Idle2-1 = "(หน้ากากงิ้วนี่มัน... แค่จ้องก็น่ากลัวแล้ว...)"
10103-CVGroup_UIEventShop_Buy1-1 = "โอ้ว เป็นของที่ดีเลยนะ"
10103-CVGroup_UIEventShop_Buy2-1 = "มีเยอะขนาดนี้ คงจัดงานแลกเปลี่ยนได้สำเร็จแน่"
10103-CVGroup_UIEventShop_Buy3-1 = "นี่... ครู ฉันไม่ได้ข้องใจหรอกนะ…\nแต่ไปเอาของมากมายขนาดนี้มาจากไหน...?"
10103-CVGroup_UIEventShop_Buy4-1 = "เยี่ยมไปเลย! ชื่อของครูจะเป็นที่กล่าวถึงใน 2 โรงเรียนไปเรื่อยๆ เลยละ!"

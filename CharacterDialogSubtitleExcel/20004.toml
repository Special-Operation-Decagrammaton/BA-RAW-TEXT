[translation]
20004-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20004-CVGroup_CharacterGet_Idle1-1 = "트리니티 정의실현부 1학년, 마시로.\n어떤 장소라도, 어떤 상황이라도, 전력으로 선생님을 지원하겠습니다."
20004-CVGroup_Cafe_Idle1-1 = "뭔가 수상한 시선이 느껴집니다만……."
20004-CVGroup_Cafe_Idle2-1 = "설마, 이런 곳에서도 분란을 일으키려는 문제 학생은 없겠지요?"
20004-CVGroup_Cafe_Idle3-1 = "(다음엔, 선배들과 함께……)"
20004-CVGroup_Cafe_Idle4-1 = "(마침 좋은 곳에 저격 포인트가 있군요.)"
20004-CVGroup_Cafe_Idle5-1 = "(호수의 물처럼 흔들림 없이 잔잔하게…….)"
20004-CVGroup_WeaponGet_Idle1-1 = "이것 또한…… 진짜 정의……?"
20004-CVGroup_UIEventLobby_Enter1-1 = "오늘도 꽤 무덥군요. 열사병에 주의하세요."
20004-CVGroup_UIEventLobby_Enter2-1 = "자, 하계 특별 훈련을 시작하죠!"
20004-CVGroup_UIEventLobby_Idle1-1 = "트리니티의 다른 학생들과 바다에 오는 것은 처음이라… 조금 긴장되네요."
20004-CVGroup_UIEventLobby_Idle2-1 = "지자요수… 지혜로운 자는 물을 좋아한다고 하지요."
20004-CVGroup_UIEventLobby_Idle3-1 = "(여름 수영복만큼은 검은색이 아니더라도 좋았으려나…)"
20004-CVGroup_UIEventLobby_Idle4-1 = "지금, 어디선가 츠루기 선배의 절규 소리가…"
20004-CVGroup_UIEventMission_Enter1-1 = "임무도, 휴식도, 제대로 하겠습니다."
20004-CVGroup_UIEventMission_Idle1-1 = "설마, 이런 곳에서도 분란을 일으키려는 문제 학생은 없겠지요?"
20004-CVGroup_UIEventMission_Idle2-1 = "휴양지에서도 방심은 금물입니다."

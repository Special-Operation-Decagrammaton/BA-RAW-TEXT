[translation]
20004-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20004-CVGroup_CharacterGet_Idle1-1 = "三一實現正義部1年級，麻白。\n無論在何處，遇到任何狀況，都會全力支援老師。"
20004-CVGroup_Cafe_Idle1-1 = "感覺到一股可疑的視線……"
20004-CVGroup_Cafe_Idle2-1 = "該不會，這裡也有想要引起混亂的問題學生吧？"
20004-CVGroup_Cafe_Idle3-1 = "（下次，和前輩們一起……）"
20004-CVGroup_Cafe_Idle4-1 = "（這裡很適合當成狙擊點呢）"
20004-CVGroup_Cafe_Idle5-1 = "（心如止水。將搖晃緩緩靜靜地……）"
20004-CVGroup_WeaponGet_Idle1-1 = "這個也是……真正的正義……？"
20004-CVGroup_UIEventLobby_Enter1-1 = "今天也非常熱呢…\n請務必小心中暑。"
20004-CVGroup_UIEventLobby_Enter2-1 = "來，開始夏季特別訓練吧！"
20004-CVGroup_UIEventLobby_Idle1-1 = "我還是第一次跟其他三一的學生一起來海邊…\n有點緊張呢。"
20004-CVGroup_UIEventLobby_Idle2-1 = "智者樂水…\n就是有智慧的人會喜歡水的意思。"
20004-CVGroup_UIEventLobby_Idle3-1 = "（泳裝的話，就算不是黑色也沒關係吧…）"
20004-CVGroup_UIEventLobby_Idle4-1 = "剛才，好像從哪裡傳來了弦生前輩的叫聲…"
20004-CVGroup_UIEventMission_Enter1-1 = "任務跟休息，我都會認真執行。"
20004-CVGroup_UIEventMission_Idle1-1 = "在這種地方，應該不會有想要引起動亂的問題學生了吧？"
20004-CVGroup_UIEventMission_Idle2-1 = "在渡假勝地也不能掉以輕心。"

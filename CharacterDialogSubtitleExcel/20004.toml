[translation]
20004-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20004-CVGroup_CharacterGet_Idle1-1 = "Trinity Justice Task Force first-year, Mashiro. Wherever it may be, under any circumstance, I will support you, Sensei—with all my might."
20004-CVGroup_Cafe_Idle1-1 = "Something feels suspicious, but..."
20004-CVGroup_Cafe_Idle2-1 = "Surely there won't be students causing a commotion at a place like this, right?"
20004-CVGroup_Cafe_Idle3-1 = "(It would've been great to come here with the upperclassmen.)"
20004-CVGroup_Cafe_Idle4-1 = "(This location offers a great vantage point.)"
20004-CVGroup_Cafe_Idle5-1 = "(Tranquil and still, like water...)"
20004-CVGroup_WeaponGet_Idle1-1 = "Is this also...true justice?"
20004-CVGroup_UIEventLobby_Enter1-1 = "It's pretty hot today too. Watch out for heat stroke!"
20004-CVGroup_UIEventLobby_Enter2-1 = "Now, let's begin the special summer training!"
20004-CVGroup_UIEventLobby_Idle1-1 = "I'm nervous. It's my first time at the beach with other Trinity students..."
20004-CVGroup_UIEventLobby_Idle2-1 = "The wise ones like the water..."
20004-CVGroup_UIEventLobby_Idle3-1 = "(Maybe I could have gotten a color other than black for a swimsuit...)"
20004-CVGroup_UIEventLobby_Idle4-1 = "Just now, I think I heard Tsurugi groan in despair."
20004-CVGroup_UIEventMission_Enter1-1 = "Whether it's for duty or for fun, I'll do it the proper way."
20004-CVGroup_UIEventMission_Idle1-1 = "Surely there won't be students causing a commotion at a place like this, right?"
20004-CVGroup_UIEventMission_Idle2-1 = "Never let your guard down, not even on vacation."

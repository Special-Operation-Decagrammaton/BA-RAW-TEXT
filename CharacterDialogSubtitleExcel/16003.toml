[translation]
16003-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
16003-CVGroup_CharacterGet_Idle1-1 = "자경단 임무의 연장인가요….\n트리니티의 안전을 위해서라면 얼마든지 협력하겠습니다."

16003-CVGroup_Cafe_Idle3-1 = "(이런 귀여운 물건은 나와는 안 어울릴지도….)"
16003-CVGroup_Cafe_Idle4-1 = "이곳의 보안은… 훌륭하군요. 흠 잡을 곳이 없습니다."
16003-CVGroup_Cafe_Idle5-1 = "휴식도 임무의 일부."
16003-CVGroup_WeaponGet_Idle1-1 = "역시 손에 익은 무기를 사용하는 게 최고군요."

[translation]
16003-CVGroup_UITitle_Idle1-1 = "Blue Archive"
16003-CVGroup_CharacterGet_Idle1-1 = "ส่วนหนึ่งของภารกิจของกลุ่มรักษาความสงบเหรอคะ...\nเพื่อความปลอดภัยของทรีนิตี้\nไม่ว่าเมื่อไรฉันก็ยินดีให้ความร่วมมือค่ะ"
16003-CVGroup_Cafe_Idle1-1 = "(ที่นี่เงียบสงบดีจังเลย)"
16003-CVGroup_Cafe_Idle2-1 = "(อ่า... ของตกแต่งอันนี้น่ารักจังเลย...)"
16003-CVGroup_Cafe_Idle3-1 = "(ของน่ารักๆ แบบนี้คงไม่เหมาะกับฉันหรอกมั้ง...)"
16003-CVGroup_Cafe_Idle4-1 = "การรักษาความปลอดภัยที่นี่... ยอดเยี่ยมมากเลยนะคะ\nอืม... ไม่มีที่ติเลย"
16003-CVGroup_Cafe_Idle5-1 = "การพักผ่อนก็เป็นส่วนหนึ่งของภารกิจค่ะ"
16003-CVGroup_WeaponGet_Idle1-1 = "การใช้อาวุธที่คุ้นเคยเป็นเรื่องที่ดีที่สุดแล้วจริงๆ ค่ะ"

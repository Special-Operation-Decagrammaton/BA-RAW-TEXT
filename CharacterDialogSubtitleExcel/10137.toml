[translation]
10137-CVGroup_UITitle_Idle1-1 = "브을루우~아카이~브~"
10137-CVGroup_CharacterGet_Idle1-1 = "수고하심다- 발키리 경찰학교,\n공안국의 시마 코노카임다.\n오늘 운세, 같이 보시겠슴까?"
10137-CVGroup_Cafe_Idle1-1 = "사아람들이-\n마않-구나아-"
10137-CVGroup_Cafe_Idle2-1 = "(자아,\n범죄자는…….\n뭐, 여기는 없나.)"
10137-CVGroup_Cafe_Idle3-1 = "엥? 내 뱃지……\n어디에 뒀지……."
10137-CVGroup_Cafe_Idle4-1 = "평화롭구만-\n아휴…… 재미없어."
10137-CVGroup_Cafe_Idle5-1 = "이거,\n법적으로 괜찮은 검까?"
10137-CVGroup_WeaponGet_Idle1-1 = "아, 바로 이검다!\n이게 있으면 말을 길게 안 해도 됨다!"
10137-CVGroup_UIEventLobby_Enter1-1 = "츠치노-코야아-!\n어딨-니-!"
10137-CVGroup_UIEventLobby_Enter1-2 = "하아, 넌 잡히면 죽…… "
10137-CVGroup_UIEventLobby_Enter1-3 = "아, 아니! 어딨-니-!"
10137-CVGroup_UIEventLobby_Enter2-1 = "으으……. 무서운데……."
10137-CVGroup_UIEventLobby_Enter3-1 = "누가 해코지라도\n하는 건-- 히익?!\n누, 누구우……?"
10137-CVGroup_UIEventLobby_Enter4-1 = "귀신이건 뭐건,\n수갑 채우면 땡이지……!"
10137-CVGroup_UIEventLobby_Enter5-1 = "무사히 넘어갔슴다!\n운명아, 덤벼라!!\n핫핫하!!"
10137-CVGroup_UIEventLobby_Enter5-2 = "아, 아니!! 취, 취소!!\n미안합니다, 운명님!!!"
10137-CVGroup_UIEventLobby_Idle1-1 = "히, 히얏?!\n……아이, 깜짝이야!!"
10137-CVGroup_UIEventLobby_Idle2-1 = "휴…… 그래도 공기는\n무지 좋슴다."
10137-CVGroup_UIEventLobby_Idle3-1 = "츠치노코-! 잡으면 평생\n안 놔줄 검다!"
10137-CVGroup_UIEventLobby_Idle4-1 = "펴, 평정심……\n평정심……."
10137-CVGroup_UIEventBoxGachaShop_Enter1-1 = "가자!! 팍팍 가보는 검다!!"
10137-CVGroup_UIEventBoxGachaShop_Enter2-1 = "오늘 운세 좋으셨슴까?!\n선생님만 믿겠슴다!"
10137-CVGroup_UIEventBoxGachaShop_Enter3-1 = "뒷정리 타임!\n끝까지 힘내는 검다!"
10137-CVGroup_UIEventBoxGachaShop_Idle1-1 = "운 나눠주시는 검까?\n좋아쓰!!"
10137-CVGroup_UIEventBoxGachaShop_Idle2-1 = "뭐라도 될 검다!\n선생님하고 함께니까!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "크으! 이거거든!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "엄청 운 좋네요?!\n선생님, 장난 아니심다!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "맨날 이러면 좋겠슴다~"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "일단, 끝까지 찾아보는 검다!"

[translation]
26013-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
26013-CVGroup_CharacterGet_Idle1-1 = "아리우스 스쿼드의 하카리 아츠코야.후후, 너무 딱딱한가?"
26013-CVGroup_Cafe_Idle1-1 = "좋은 사진, 찍을 수 있을까?"
26013-CVGroup_Cafe_Idle2-1 = "(삿 쨩, 잘 지내고 있으면 좋겠네)"
26013-CVGroup_Cafe_Idle3-1 = "어디선가 꽃향기가 나는 것 같아."
26013-CVGroup_Cafe_Idle4-1 = "여기, 느긋하게 쉴 수 있을 것 같아."
26013-CVGroup_Cafe_Idle5-1 = "이건……?처음 봐."
26013-CVGroup_WeaponGet_Idle1-1 = "아, 이거…… 고마워, 선생님.너무, 마음에 들어.이건 선생님을 위해 쓸게."
26013-CVGroup_UIEventLobby_Enter1-1 = "바다의 축제… 이런 건, 처음이야."
26013-CVGroup_UIEventLobby_Enter2-1 = "선생님, 즐기고 있어?"
26013-CVGroup_UIEventLobby_Enter3-1 = "축제 동안에는, 아무 일도 일어나지 않았으면 좋겠어…"
26013-CVGroup_UIEventLobby_Enter3-2 = "이렇게 즐거운 시간, 좀처럼 없으니까."
26013-CVGroup_UIEventLobby_Enter4-1 = "축제가 끝나가네…"
26013-CVGroup_UIEventLobby_Enter4-2 = "시작이 있으면 끝이 있다고 하지만…"
26013-CVGroup_UIEventLobby_Enter4-3 = "조금, 아쉽네."
26013-CVGroup_UIEventLobby_Enter5-1 = "축제, 끝나버렸네…"
26013-CVGroup_UIEventLobby_Enter5-2 = "그래도 괜찮아. 바다는 여전히 아름다우니까."
26013-CVGroup_UIEventLobby_Idle1-1 = "모래를 만지고, 파도를 쫓고…"
26013-CVGroup_UIEventLobby_Idle1-2 = "바다는 즐겁네."
26013-CVGroup_UIEventLobby_Idle2-1 = "야외무대… 재밌을 거 같아."
26013-CVGroup_UIEventLobby_Idle2-2 = "선생님, 같이 보러 가자."
26013-CVGroup_UIEventLobby_Idle3-1 = "모두와 함께 와서 즐거워."
26013-CVGroup_UIEventLobby_Idle3-2 = "물론 '모두' 안에는 선생님도 포함이야."
26013-CVGroup_UIEventLobby_Idle4-1 = "축제에 데려와 줘서 고마워."
26013-CVGroup_UIEventLobby_Idle4-2 = "선생님도 즐기도록 해."
26013-CVGroup_UIEventMission_Enter1-1 = "안녕, 선생님."
26013-CVGroup_UIEventMission_Enter1-2 = "자, 이거, 할 일 목록이야."
26013-CVGroup_UIEventMission_Enter2-1 = "…많네. 하나씩 끝내보자."
26013-CVGroup_UIEventMission_Idle1-1 = "불렀어?"
26013-CVGroup_UIEventMission_Idle2-1 = "후후, 나 말고 옆을 봐."
26013-CVGroup_UIEventMission_Buy1-1 = "수고했어, 선생님."
26013-CVGroup_UIEventMission_Buy2-1 = "선생님, 열심히네. 나도 의욕이 생겼어."
26013-CVGroup_UIEventMission_Interaction1-1 = "오늘 할 일은 이걸로 끝. 잠깐 쉴까? 선생님."

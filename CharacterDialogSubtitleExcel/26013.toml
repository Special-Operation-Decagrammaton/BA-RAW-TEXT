[translation]
26013-CVGroup_UITitle_Idle1-1 = "Blue Archive."
26013-CVGroup_CharacterGet_Idle1-1 = "I'm Hakari Atsuko from the Arius Squad. Heehee. Did that sound too curt?"
26013-CVGroup_Cafe_Idle1-1 = "Do you think I could take a nice picture?"
26013-CVGroup_Cafe_Idle2-1 = "(I hope Sao-Sao is doing all right.)"
26013-CVGroup_Cafe_Idle3-1 = "I think I can smell flowers."
26013-CVGroup_Cafe_Idle4-1 = "I think I can relax here."
26013-CVGroup_Cafe_Idle5-1 = "This... I've never seen it before."
26013-CVGroup_WeaponGet_Idle1-1 = "Oh, this... Thank you, Sensei. I love it. I'll use it for you."
26013-CVGroup_UIEventLobby_Enter1-1 = "A festival by the beach... I've never experienced anything like this."
26013-CVGroup_UIEventLobby_Enter2-1 = "Are you having fun, Sensei?"
26013-CVGroup_UIEventLobby_Enter3-1 = "I hope nothing...interrupts the festival..."
26013-CVGroup_UIEventLobby_Enter3-2 = "You don't experience this kind of excitement every day."
26013-CVGroup_UIEventLobby_Enter4-1 = "The festival is almost over..."
26013-CVGroup_UIEventLobby_Enter4-2 = "They say where there's a beginning, there's an end..."
26013-CVGroup_UIEventLobby_Enter4-3 = "But it is a bit sad."
26013-CVGroup_UIEventLobby_Enter5-1 = "The festival, it's over..."
26013-CVGroup_UIEventLobby_Enter5-2 = "Still, it's okay. The sea is still beautiful."
26013-CVGroup_UIEventLobby_Idle1-1 = "I can touch the sand, and follow the waves..."
26013-CVGroup_UIEventLobby_Idle1-2 = "The sea is a joyful place."
26013-CVGroup_UIEventLobby_Idle2-1 = "I think...the outdoor stage would be fun."
26013-CVGroup_UIEventLobby_Idle2-2 = "Let's go watch it together, Sensei."
26013-CVGroup_UIEventLobby_Idle3-1 = "I'm happy that everyone's here."
26013-CVGroup_UIEventLobby_Idle3-2 = "Of course, you're included in 'everyone', Sensei."
26013-CVGroup_UIEventLobby_Idle4-1 = "Thank you for bringing me to the festival."
26013-CVGroup_UIEventLobby_Idle4-2 = "I hope you have fun too."
26013-CVGroup_UIEventMission_Enter1-1 = "Hi, Sensei."
26013-CVGroup_UIEventMission_Enter1-2 = "Here. It's a list of chores."
26013-CVGroup_UIEventMission_Enter2-1 = "...It's a long list. Let's finish them one by one."
26013-CVGroup_UIEventMission_Idle1-1 = "Did you call me?"
26013-CVGroup_UIEventMission_Idle2-1 = "Heehee. Don't look at me, look next to you."
26013-CVGroup_UIEventMission_Buy1-1 = "Well done, Sensei."
26013-CVGroup_UIEventMission_Buy2-1 = "You're so diligent. It's making me enthusiastic too."
26013-CVGroup_UIEventMission_Interaction1-1 = "This is it for today. Shall we take a break, Sensei?"

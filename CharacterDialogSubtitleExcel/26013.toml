[translation]
26013-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
26013-CVGroup_CharacterGet_Idle1-1 = "我是奧利斯小隊的秤敦子。\n……呵呵，果然還是太生硬了嗎？"
26013-CVGroup_Cafe_Idle1-1 = "好照片，有辦法拍到嗎？"
26013-CVGroup_Cafe_Idle2-1 = "（沙醬，希望他過得很好）"
26013-CVGroup_Cafe_Idle3-1 = "好像聞到了一股花香。"
26013-CVGroup_Cafe_Idle4-1 = "這裡，似乎能悠閒一下。"
26013-CVGroup_Cafe_Idle5-1 = "這是……？\n我第一次見到。"
26013-CVGroup_WeaponGet_Idle1-1 = "啊，這個……謝謝你，老師。\n我非常喜歡唷。\n這個我會為了老師使用的。"
26013-CVGroup_UIEventLobby_Enter1-1 = "海邊的慶典……我還是第一次參加。"
26013-CVGroup_UIEventLobby_Enter2-1 = "老師，玩得開心嗎？"
26013-CVGroup_UIEventLobby_Enter3-1 = "慶典期間，要是能平安無事就好了……"
26013-CVGroup_UIEventLobby_Enter3-2 = "因為這麼愉快的時間，可是很稀有的。"
26013-CVGroup_UIEventLobby_Enter4-1 = "慶典再一下就……"
26013-CVGroup_UIEventLobby_Enter4-2 = "雖然說有開始就必然伴隨著結束……"
26013-CVGroup_UIEventLobby_Enter4-3 = "還是有點遺憾呢。"
26013-CVGroup_UIEventLobby_Enter5-1 = "慶典，結束了呢……"
26013-CVGroup_UIEventLobby_Enter5-2 = "不過沒關係的。\n因為大海依舊很美麗。"
26013-CVGroup_UIEventLobby_Idle1-1 = "能像這樣摸著沙子、追逐海浪……"
26013-CVGroup_UIEventLobby_Idle1-2 = "大海真有趣呢。"
26013-CVGroup_UIEventLobby_Idle2-1 = "野外舞台……好像很有趣。"
26013-CVGroup_UIEventLobby_Idle2-2 = "老師，一起去看看吧。"
26013-CVGroup_UIEventLobby_Idle3-1 = "因為是和大家一起，我覺得很開心。"
26013-CVGroup_UIEventLobby_Idle3-2 = "當然「大家」之中也包含老師唷。"
26013-CVGroup_UIEventLobby_Idle4-1 = "謝謝你帶我們來參加慶典。"
26013-CVGroup_UIEventLobby_Idle4-2 = "老師也要好好享受哦。"
26013-CVGroup_UIEventMission_Enter1-1 = "你好，老師。"
26013-CVGroup_UIEventMission_Enter1-2 = "來，這給你，是待辦清單唷。"
26013-CVGroup_UIEventMission_Enter2-1 = "……真多呢。\n一樣一樣來解決吧。"
26013-CVGroup_UIEventMission_Idle1-1 = "你叫我嗎？"
26013-CVGroup_UIEventMission_Idle2-1 = "呵呵，要看的不是我是旁邊唷。"
26013-CVGroup_UIEventMission_Buy1-1 = "辛苦你了，老師。"
26013-CVGroup_UIEventMission_Buy2-1 = "老師，你很努力呢。\n連我也產生鬥志了。"
26013-CVGroup_UIEventMission_Interaction1-1 = "今天的工作，這樣就結束了。\n稍微休息一下吧，老師。"

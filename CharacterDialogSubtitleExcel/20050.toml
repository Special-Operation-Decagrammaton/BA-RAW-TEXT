[translation]
20050-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
20050-CVGroup_CharacterGet_Idle1-1 = "My name is Usuba Ritsu! Nice to meet you!"
20050-CVGroup_Cafe_Idle1-1 = "If I were to showcase a sculpture, where should I put it?"
20050-CVGroup_Cafe_Idle2-1 = "The air feels stuffy. Maybe I should drill a hole on that side of the wall?"
20050-CVGroup_Cafe_Idle3-1 = "Is there a way to express the aroma of coffee through sculpture?"
20050-CVGroup_Cafe_Idle4-1 = "I wonder if there's anything to import..."
20050-CVGroup_Cafe_Idle5-1 = "I'm sure the students back in Wildhunt would love it if I imported the cake from here, right?"
20050-CVGroup_WeaponGet_Idle1-1 = "Whoa...! I really wanted this! Thank you, Sensei!!!"
20050-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei! This way!!!"
20050-CVGroup_UIEventLobby_Enter2-1 = "Feels like there's something complicated going on... But, well, I guess I'll face it!"
20050-CVGroup_UIEventLobby_Enter3-1 = "It's my first time accepting a commission like this... Well, I guess Miyo will come up with an amazing plan, right?"
20050-CVGroup_UIEventLobby_Enter4-1 = "I guess we might've accepted an odd, but interesting, commission...?"
20050-CVGroup_UIEventLobby_Enter5-1 = "It's over! Hm? Why does everyone look so tired?"
20050-CVGroup_UIEventLobby_Idle1-1 = "What, Sensei? Is there stone dust or something on my face?"
20050-CVGroup_UIEventLobby_Idle2-1 = "Ahaha! If you keep poking me, I'll poke you too, okay?"
20050-CVGroup_UIEventLobby_Idle3-1 = "I-I think it's okay for everyone to relax a little..."
20050-CVGroup_UIEventLobby_Idle4-1 = "Don't worry! The Free Trade Cartel always finds a way!"
20050-CVGroup_UIEventMission_Enter1-1 = "We have loooooots of fun things prepared for you, Sensei!"
20050-CVGroup_UIEventMission_Enter2-1 = "Nothing's impossible! It might be hard, though!"
20050-CVGroup_UIEventMission_Buy1-1 = "As expected, Sensei! You're amazing!"
20050-CVGroup_UIEventMission_Buy2-1 = "Did you get your rewards? Don't forget to take them with you!"
20050-CVGroup_UIEventMission_Idle1-1 = "Hm? Is there anything you want to know?"
20050-CVGroup_UIEventMission_Idle2-1 = "It was hard, but fun? Heehee, I feel the same way, Sensei."
20050-CVGroup_UIEventMission_Interaction1-1 = "We're closing for the day!"

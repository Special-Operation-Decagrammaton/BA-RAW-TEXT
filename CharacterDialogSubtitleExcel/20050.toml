[translation]
20050-CVGroup_UITitle_Idle1-1 = "블! 루! 아카이, 브!"
20050-CVGroup_CharacterGet_Idle1-1 = "내 이름은 우스바 리츠! 잘 부탁해!"
20050-CVGroup_Cafe_Idle1-1 = "조각을 전시한다면, 어디가 좋을까나~"
20050-CVGroup_Cafe_Idle2-1 = "공기가 살짝 탁하네~ 저쪽 벽에 구멍을 내볼까?"
20050-CVGroup_Cafe_Idle3-1 = "커피의 향기를 조각으로 표현할 수 있을까?"
20050-CVGroup_Cafe_Idle4-1 = "어디 수입해 볼만한 게 없으려나~"
20050-CVGroup_Cafe_Idle5-1 = "이곳의 케이크를 들여가면, 와일드헌트 아이들이 좋아하겠지?"
20050-CVGroup_WeaponGet_Idle1-1 = "와아아……! 이거, 내가 정말로 갖고 싶었던 거야! 고마워, 선생님!!"
20050-CVGroup_UIEventLobby_Enter1-1 = "어서 와, 선생님! 이쪽이야!!"
20050-CVGroup_UIEventLobby_Enter2-1 = "뭔가 복잡한 일이 벌어진 것 같은데…… 일단 뭐, 부딪쳐 볼까!"
20050-CVGroup_UIEventLobby_Enter3-1 = "이런 의뢰는 처음인데……. 뭐, 미요 쨩이 멋지게 작전을 짜 주겠지?"
20050-CVGroup_UIEventLobby_Enter4-1 = "우리, 뭔가 이상하고 재밌는 의뢰를 받아버린 걸 지도……?"
20050-CVGroup_UIEventLobby_Enter5-1 = "끝나 버렸다~ 응? 그런데 왜 다들 축 늘어져 있지?"
20050-CVGroup_UIEventLobby_Idle1-1 = "왜, 선생님? 내 얼굴에 돌가루라도 묻었어?"
20050-CVGroup_UIEventLobby_Idle2-1 = "아하하! 자꾸 찌르면, 나도 찌를 거야?"
20050-CVGroup_UIEventLobby_Idle3-1 = "다, 다들 너무 심각해지지 않아도 괜찮은데……."
20050-CVGroup_UIEventLobby_Idle4-1 = "괜찮아! 특수교역부는 늘 어떻게든 방법을 찾아내니까!"
20050-CVGroup_UIEventMission_Enter1-1 = "즐거운 일들이 잔~뜩 준비되어 있다고, 선생님?"
20050-CVGroup_UIEventMission_Enter2-1 = "불가능한 건 없어! 어려울 수는 있지만!"
20050-CVGroup_UIEventMission_Buy1-1 = "역시 선생님! 대단해!"
20050-CVGroup_UIEventMission_Buy2-1 = "보상은 잘 챙겼어? 이따 꼭 잊지 말고 챙겨 가자!"
20050-CVGroup_UIEventMission_Idle1-1 = "응? 궁금한 거라도 있어?"
20050-CVGroup_UIEventMission_Idle2-1 = "힘들지만 즐거웠다고? 헤헤, 나도야, 선생님."
20050-CVGroup_UIEventMission_Interaction1-1 = "오늘치 작업은, 여기서 문 닫습니다!"

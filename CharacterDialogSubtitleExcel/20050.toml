[translation]
20050-CVGroup_UITitle_Idle1-1 = "蔚藍！檔，案！"
20050-CVGroup_CharacterGet_Idle1-1 = "我是狂獵藝術學院的薄葉律！\n請多指教囉！"
20050-CVGroup_Cafe_Idle1-1 = "那個附近，能放作品嗎～？"
20050-CVGroup_Cafe_Idle2-1 = "這裡能不能再通風一點呢～？\n啊！……那邊，好像可以打個洞！"
20050-CVGroup_Cafe_Idle3-1 = "咖啡的香味……沒辦法表現出來嗎。"
20050-CVGroup_Cafe_Idle4-1 = "唔嗯～下次的輸入品是……"
20050-CVGroup_Cafe_Idle5-1 = "如果把這裡的蛋糕帶回去的話……\n學院的大家一定會很開心吧！"
20050-CVGroup_WeaponGet_Idle1-1 = "哇！這個，我一直很想要耶！\n謝謝你，老師！好開心！"
20050-CVGroup_UIEventLobby_Enter1-1 = "老師！這邊這邊～！"
20050-CVGroup_UIEventLobby_Enter2-1 = "總覺得事情變得亂七八糟的呢……算了，盡力試試看吧！"
20050-CVGroup_UIEventLobby_Enter3-1 = "這種委託雖然是第一次接……\n如果是美代醬的作戰，一定沒問題的！"
20050-CVGroup_UIEventLobby_Enter4-1 = "這次的委託……好像還挺有趣的？"
20050-CVGroup_UIEventLobby_Enter5-1 = "呀啊～結束了結束了～\n……咦？大家都累癱了？"
20050-CVGroup_UIEventLobby_Idle1-1 = "嗯，老師？\n我的臉上是沾到粉了嗎？"
20050-CVGroup_UIEventLobby_Idle2-1 = "啊哈！哈哈哈！真是的～！\n那樣戳我的話……就換我反擊啦～！"
20050-CVGroup_UIEventLobby_Idle3-1 = "大，大家……別那麼灰心嘛～"
20050-CVGroup_UIEventLobby_Idle4-1 = "面臨任何危機都沒問題！\n特殊交易部……總是能夠找到出路的唷！"
20050-CVGroup_UIEventMission_Enter1-1 = "有好多有趣的事唷～！\n嘿嘿，期待一下吧，老師！"
20050-CVGroup_UIEventMission_Enter2-1 = "雖然會碰上困難，但沒有什麼是不可能的～！"
20050-CVGroup_UIEventMission_Buy1-1 = "好厲害～！老師什麼都能做到耶～！"
20050-CVGroup_UIEventMission_Buy2-1 = "獎勵可不能忘記唷～"
20050-CVGroup_UIEventMission_Idle1-1 = "嗯？怎麼了？"
20050-CVGroup_UIEventMission_Idle2-1 = "雖然辛苦，但是很開心？\n耶嘿嘿，跟我一樣呢！"
20050-CVGroup_UIEventMission_Interaction1-1 = "今天已經關門囉！\n明天再見吧！"

[translation]
20050-CVGroup_UITitle_Idle1-1 = "Blue! Ar! Chive!"
20050-CVGroup_CharacterGet_Idle1-1 = "ชื่อของฉันก็คืออุสุบะ ริตสึ!\nขอฝากตัวด้วยนะ!"
20050-CVGroup_Cafe_Idle1-1 = "ถ้าจะจัดแสดงงานประติมากรรมจะจัดตรงไหนดีน้า~"
20050-CVGroup_Cafe_Idle2-1 = "อากาศไม่ค่อยถ่ายเทเลย~ เจาะรูที่กำแพงตรงนั้นดีมั้ยนะ?"
20050-CVGroup_Cafe_Idle3-1 = "จะถ่ายทอดกลิ่นหอมของกาแฟออกมาเป็นงานประติมากรรมได้มั้ยนะ?"
20050-CVGroup_Cafe_Idle4-1 = "มีอะไรที่พอจะนำเข้ามาได้บ้างมั้ยน้า~"
20050-CVGroup_Cafe_Idle5-1 = "ถ้านำเข้าเค้กจากที่นี่ได้ เด็กๆ ไวลด์ฮันต์คงจะชอบเลยเนอะ?"
20050-CVGroup_WeaponGet_Idle1-1 = "ว้าวว...! ฉันอยากได้อันนี้มากๆ เลย!\nขอบคุณนะ คุณครู!"
20050-CVGroup_UIEventLobby_Enter1-1 = "เชิญเลย คุณครู! ทางนี้!!"
20050-CVGroup_UIEventLobby_Enter2-1 = "เหมือนจะเกิดเรื่องซับซ้อนเลยนะ...\nเอาเป็นว่าลองดูสักตั้งก่อนแล้วกัน!"
20050-CVGroup_UIEventLobby_Enter3-1 = "งานแบบนี้เป็นครั้งแรกเลยละ...\nแต่มิโยะจังก็น่าจะวางแผนให้อย่างดีละเนอะ?"
20050-CVGroup_UIEventLobby_Enter4-1 = "พวกเราเหมือนจะรับงานบางอย่างที่ทั้งแปลก\nแต่ก็สนุกมาเลยละ...?"
20050-CVGroup_UIEventLobby_Enter5-1 = "เสร็จแล้ว~ หืม? แต่ทำไมถึงอ่อนเปลี้ยเพลียแรงกันหมดเลยล่ะ?"
20050-CVGroup_UIEventLobby_Idle1-1 = "ทำไมเหรอ คุณครู?\nหน้าของฉันมีฝุ่นจากหินติดอยู่เหรอ?"
20050-CVGroup_UIEventLobby_Idle2-1 = "อะฮะฮ่า!\nถ้าจิ้มกันบ่อยๆ เดี๋ยวฉันจิ้มคืนบ้างนะ?"
20050-CVGroup_UIEventLobby_Idle3-1 = "ทะ... ทุกคนไม่ต้องเครียดกันมากก็ได้นะ..."
20050-CVGroup_UIEventLobby_Idle4-1 = "ไม่เป็นไร! ชมรมการค้าพิเศษคิดหาวิธีได้ได้ตลอดละ!"
20050-CVGroup_UIEventMission_Enter1-1 = "มีงานสนุกๆ เตรียมไว้เพียบ~ เลยละ คุณครู"
20050-CVGroup_UIEventMission_Enter2-1 = "ไม่มีอะไรที่เป็นไปไม่ได้หรอก!\nถึงมันอาจจะยากก็เถอะ!"
20050-CVGroup_UIEventMission_Buy1-1 = "สมกับที่เป็นคุณครูเลย! ยอดเลยละ!"
20050-CVGroup_UIEventMission_Buy2-1 = "รับรางวัลไปหรือยัง?\nอย่าลืมเสียล่ะ รับไปด้วยนะ!"
20050-CVGroup_UIEventMission_Idle1-1 = "หืม? สงสัยอะไรตรงไหนเหรอ?"
20050-CVGroup_UIEventMission_Idle2-1 = "ถึงจะเหนื่อย แต่ก็สนุกงั้นเหรอ?\nแหะๆ ฉันก็ด้วยนะ คุณครู"
20050-CVGroup_UIEventMission_Interaction1-1 = "ขอปิดจ๊อบงานวันนี้เท่านี้ค่ะ!"

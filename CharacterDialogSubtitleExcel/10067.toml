[translation]
10067-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10067-CVGroup_CharacterGet_Idle1-1 = "Hello, Sensei. It's me, Toki. Prepare to see the true power of an undercover agent."
10067-CVGroup_Cafe_Idle1-1 = "A peaceful tea time... It certainly is relaxing."
10067-CVGroup_Cafe_Idle2-1 = "This place truly improves one's quality of life."
10067-CVGroup_Cafe_Idle3-1 = "If I had time and a budget... I too would like to create a place like this."
10067-CVGroup_Cafe_Idle4-1 = "As an agent, it is forbidden to let one's guard down. But here...it is difficult to avoid."
10067-CVGroup_Cafe_Idle5-1 = "I find I am reminded of many things when I visit. I don't necessarily mind it, though."
10067-CVGroup_WeaponGet_Idle1-1 = "I have been told that sometimes it is not a weakness to tell someone your honest feelings. In that case...thank you, Sensei. From the bottom of my heart."
10067-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei."
10067-CVGroup_UIEventLobby_Enter1-2 = "Preparations for the stealth mission are complete."
10067-CVGroup_UIEventLobby_Enter2-1 = "Everything is ready. Awaiting your orders."
10067-CVGroup_UIEventLobby_Enter3-1 = "This place appears to hold a secret."
10067-CVGroup_UIEventLobby_Enter4-1 = "I understand that you have been through a great deal, and may be experiencing some confusion. But please trust me."
10067-CVGroup_UIEventLobby_Enter4-2 = "You can always rely on me, Sensei."
10067-CVGroup_UIEventLobby_Enter5-1 = "Good. It all wrapped up satisfactorily."
10067-CVGroup_UIEventLobby_Enter5-2 = "I will simply consider this a learning experience on my path to becoming the perfect agent."
10067-CVGroup_UIEventLobby_Idle1-1 = "Yes, Sensei. What is it?"
10067-CVGroup_UIEventLobby_Idle2-1 = "Ha... In these clothes, it feels rather..."
10067-CVGroup_UIEventLobby_Idle2-2 = "But the fabric is so thin, I suppose that's inevitable..."
10067-CVGroup_UIEventLobby_Idle3-1 = "You mean the bunny suit?"
10067-CVGroup_UIEventLobby_Idle3-2 = "It has different advantages from the maid uniform. It's fitting for certain situations."
10067-CVGroup_UIEventLobby_Idle4-1 = "You think I look good in it?"
10067-CVGroup_UIEventLobby_Idle4-2 = "Hm... Thank you. I wasn't expecting such a response."
10067-CVGroup_UIEventMission_Enter1-1 = "Hello, Sensei. Today's tasks are ready for you."
10067-CVGroup_UIEventMission_Enter2-1 = "It is important to consider every detail of a mission."
10067-CVGroup_UIEventMission_Enter2-2 = "Let's work step by step today."
10067-CVGroup_UIEventMission_Idle1-1 = "I understand that it can be overwhelming to be assigned a full schedule."
10067-CVGroup_UIEventMission_Idle1-2 = "However, I am here to assist you, Sensei."
10067-CVGroup_UIEventMission_Idle2-1 = "An agent and a mission go hand-in-hand."
10067-CVGroup_UIEventMission_Idle2-2 = "...In other words, you are an agent now, too."
10067-CVGroup_UIEventMission_Buy1-1 = "We have completed today's tasks. Good work, Sensei."
10067-CVGroup_UIEventMission_Buy2-1 = "Even by my standards, this has been demanding."
10067-CVGroup_UIEventMission_Buy2-2 = "You are certainly impressive, Sensei."

[translation]
10067-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10067-CVGroup_CharacterGet_Idle1-1 = "안녕하십니까, 선생님. 토키입니다.\n잠입용 의상에 몸을 감싼 에이전트의 진수, 보여드리겠습니다."
10067-CVGroup_Cafe_Idle1-1 = "평온한 티타임……. 꽤 신선한 경험이에요."
10067-CVGroup_Cafe_Idle2-1 = "여기는, 마음을 풍요롭게 해주네요."
10067-CVGroup_Cafe_Idle3-1 = "충분한 시간과 예산이 있다면... 저도 이런 공간을 만들고 싶습니다."
10067-CVGroup_Cafe_Idle4-1 = "에이전트로서, 방심은 금물입니다만……\n여기에 오게 되면, 그만 마음이 풀려버리는군요."
10067-CVGroup_Cafe_Idle5-1 = "올 때마다 여러 가지 생각이 드는 곳입니다. 좋은 쪽으로요."
10067-CVGroup_WeaponGet_Idle1-1 = "때로는 솔직하게, 있는 그대로의 마음을 전하는 것도 중요하다고 들었습니다.\n감사합니다, 선생님. 진심으로 감사드립니다."
10067-CVGroup_UIEventLobby_Enter1-1 = "선생님 오셨군요."
10067-CVGroup_UIEventLobby_Enter1-2 = "잠입 임무, 준비는 완료했습니다."
10067-CVGroup_UIEventLobby_Enter2-1 = "준비는 되어 있습니다. 언제든지 지시를."
10067-CVGroup_UIEventLobby_Enter3-1 = "여기에는, 뭔가 비밀이 숨어있을 것 같군요."
10067-CVGroup_UIEventLobby_Enter4-1 = "혼란스러운 기분은 이해합니다. 하지만 저를 믿어 주세요."
10067-CVGroup_UIEventLobby_Enter4-2 = "저는 언제든지 선생님 편입니다."
10067-CVGroup_UIEventLobby_Enter5-1 = "모두, 차질없이 정리되어 다행입니다."
10067-CVGroup_UIEventLobby_Enter5-2 = "이번 교훈을 바탕으로, 보다 완벽한 에이전트를 목표로 노력하도록 하겠습니다."
10067-CVGroup_UIEventLobby_Idle1-1 = "네. 선생님. 무슨 일이신지요?"
10067-CVGroup_UIEventLobby_Idle2-1 = "웃… 이 옷은, 감각이 다이렉트로 전해지네요…"
10067-CVGroup_UIEventLobby_Idle2-2 = "…소재가 얇으니까 당연하겠지만요…"
10067-CVGroup_UIEventLobby_Idle3-1 = "바니 슈트, 말인가요?"
10067-CVGroup_UIEventLobby_Idle3-2 = "메이드복과는 다른 이점이 있어서, 좋다고 생각합니다."
10067-CVGroup_UIEventLobby_Idle4-1 = "바니 모습, 잘 어울린다, 고요?"
10067-CVGroup_UIEventLobby_Idle4-2 = "음… 그, 감사, 합니다. 칭찬받을 줄은, 생각지도 못했네요…"
10067-CVGroup_UIEventMission_Enter1-1 = "선생님이시군요. 오늘의 미션은, 이쪽입니다."
10067-CVGroup_UIEventMission_Enter2-1 = "미션은 중요 사항 중 하나입니다."
10067-CVGroup_UIEventMission_Enter2-2 = "오늘도 한 걸음씩, 차근차근 나아갑시다."
10067-CVGroup_UIEventMission_Idle1-1 = "매일 부과되는 일과란, 때로 부담스러운 것이기도 하죠."
10067-CVGroup_UIEventMission_Idle1-2 = "괜찮습니다, 제가 선생님의 힘이 되어 드리겠습니다."
10067-CVGroup_UIEventMission_Idle2-1 = "에이전트와 미션은 떼려야 뗄 수 없는 관계."
10067-CVGroup_UIEventMission_Idle2-2 = "…즉 지금의 선생님은, 에이전트이기도 하시다는 것이죠."
10067-CVGroup_UIEventMission_Buy1-1 = "오늘의 미션, 컴플리트입니다. 수고하셨습니다, 선생님."
10067-CVGroup_UIEventMission_Buy2-1 = "제가 보아도 상당히 힘든 일정이었습니다."
10067-CVGroup_UIEventMission_Buy2-2 = "선생님은 역시 대단하십니다."

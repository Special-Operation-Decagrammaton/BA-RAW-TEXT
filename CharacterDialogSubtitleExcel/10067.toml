[translation]
10067-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10067-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะคุณครู โทคินะคะ\nฉันจะให้คุณครูได้เห็นแก่นแท้ของสายลับในชุดแฝงตัวค่ะ"
10067-CVGroup_Cafe_Idle1-1 = "เวลาน้ำชาอันน่าสงบ... เป็นประสบการณ์ที่แปลกใหม่ดีนะคะ"
10067-CVGroup_Cafe_Idle2-1 = "ที่นี่ทำให้อิ่มเอมใจจังเลยค่ะ"
10067-CVGroup_Cafe_Idle3-1 = "ถ้ามีเวลาและงบประมาณเพียงพอ...\nฉันเองก็อยากสร้างพื้นที่แบบนี้บ้างค่ะ"
10067-CVGroup_Cafe_Idle4-1 = "ในฐานะสายลับ ฉันห้ามประมาทเด็ดขาด...\nแต่พอมาที่นี่ ใจมันก็ผ่อนคลายไปหมดเลยค่ะ"
10067-CVGroup_Cafe_Idle5-1 = "ทุกครั้งที่มาที่นี่ฉันก็เกิดความคิดขึ้นมากมายเลยค่ะ\nคิดในเรื่องดีๆ น่ะค่ะ"
10067-CVGroup_WeaponGet_Idle1-1 = "ได้ยินมาว่าบางครั้งการถ่ายทอดความรู้สึกอย่างตรงไปตรงมา\nคือเรื่องสำคัญค่ะ ขอบคุณค่ะ คุณครู\nขอบคุณจากใจจริงเลยค่ะ"
10067-CVGroup_UIEventLobby_Enter1-1 = "มาแล้วเหรอคะคุณครู"
10067-CVGroup_UIEventLobby_Enter1-2 = "ฉันเตรียมภารกิจแฝงตัวเสร็จแล้วค่ะ"
10067-CVGroup_UIEventLobby_Enter2-1 = "เตรียมตัวพร้อมแล้วค่ะ\nออกคำสั่งได้ทุกเมื่อเลยค่ะ"
10067-CVGroup_UIEventLobby_Enter3-1 = "ที่นี่เหมือนมีความลับอะไรซ่อนไว้เลยค่ะ"
10067-CVGroup_UIEventLobby_Enter4-1 = "ฉันเข้าใจความรู้สึกสับสนค่ะ แต่ก็เชื่อใจฉันด้วยนะคะ"
10067-CVGroup_UIEventLobby_Enter4-2 = "ฉันอยู่ข้างคุณครูทุกเมื่อเลยค่ะ"
10067-CVGroup_UIEventLobby_Enter5-1 = "โล่งอกไปทีนะคะ ที่ทุกอย่างเรียบร้อยดี"
10067-CVGroup_UIEventLobby_Enter5-2 = "จากบทเรียนนี้ ฉันจะพยายามให้มากขึ้นเพื่อเป็นสายลับที่สมบูรณ์แบบค่ะ"
10067-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ คุณครูมีเรื่องอะไรเหรอคะ?"
10067-CVGroup_UIEventLobby_Idle2-1 = "ชุด... ชุดนี้ให้ความรู้สึกโดยตรงเลยนะคะ..."
10067-CVGroup_UIEventLobby_Idle2-2 = "...แต่ก็แน่นอนอยู่แล้ว ผ้ามันบางน่ะค่ะ"
10067-CVGroup_UIEventLobby_Idle3-1 = "ชุดบันนี่น่ะเหรอคะ?"
10067-CVGroup_UIEventLobby_Idle3-2 = "ฉันชอบเพราะว่ามันมีข้อได้เปรียบที่ต่างจากชุดเมดค่ะ"
10067-CVGroup_UIEventLobby_Idle4-1 = "ฉันดูเข้ากับบันนี่งั้นเหรอคะ?"
10067-CVGroup_UIEventLobby_Idle4-2 = "อืม... ขะ... ขอบคุณค่ะ\nไม่คิดเลยนะคะ ว่าจะได้รับคำชมด้วย..."

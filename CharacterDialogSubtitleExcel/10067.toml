[translation]
10067-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10067-CVGroup_CharacterGet_Idle1-1 = "您好，老師。我是季。\n包覆在潛入用服裝底下，身為特務的精隨，\n就讓您見識見識吧。"
10067-CVGroup_Cafe_Idle1-1 = "平靜的午茶時間……\n真是新鮮的經驗呢。"
10067-CVGroup_Cafe_Idle2-1 = "這裡會讓心靈\n變得富足呢。"
10067-CVGroup_Cafe_Idle3-1 = "如果有足夠的時間和預算……我也想製作這樣的空間。"
10067-CVGroup_Cafe_Idle4-1 = "身為特務之人，鬆懈是大忌……\n但只要來到這裡，心情就會不自覺地放鬆下來呢。"
10067-CVGroup_Cafe_Idle5-1 = "是個每次造訪都會思考很多事情的地方。\n是正面的意思。"
10067-CVGroup_WeaponGet_Idle1-1 = "我聽說，有時候直接傳達真實的心意也很重要。\n謝謝您，老師。我打從心底，感謝著您。"
10067-CVGroup_UIEventLobby_Enter1-1 = "老師，您來了嗎。"
10067-CVGroup_UIEventLobby_Enter1-2 = "潛入任務，準備已經完成。"
10067-CVGroup_UIEventLobby_Enter2-1 = "準備已就緒。\n請隨時下達指示。"
10067-CVGroup_UIEventLobby_Enter3-1 = "這個地方，好像隱藏著什麼祕密呢。"
10067-CVGroup_UIEventLobby_Enter4-1 = "我能理解您混亂的心情。\n但是請相信我。"
10067-CVGroup_UIEventLobby_Enter4-2 = "我一直都是老師的夥伴。"
10067-CVGroup_UIEventLobby_Enter5-1 = "全部都順利解決真是太好了。"
10067-CVGroup_UIEventLobby_Enter5-2 = "我會根據這次的教訓，以更完美的特務為目標努力前進的。"
10067-CVGroup_UIEventLobby_Idle1-1 = "是，老師。有什麼事嗎？"
10067-CVGroup_UIEventLobby_Idle2-1 = "唔……這件衣服，感覺會直接地傳過來呢……"
10067-CVGroup_UIEventLobby_Idle2-2 = "……畢竟布料很薄，這也是當然的……"
10067-CVGroup_UIEventLobby_Idle3-1 = "兔女郎裝，是嗎？"
10067-CVGroup_UIEventLobby_Idle3-2 = "和女僕裝有不同的優點，我覺得很棒。"
10067-CVGroup_UIEventLobby_Idle4-1 = "兔女郎的樣子很適合我，是嗎？"
10067-CVGroup_UIEventLobby_Idle4-2 = "嗯……那個，非常，感謝。\n我沒想過，會被稱讚……"
10067-CVGroup_UIEventMission_Enter1-1 = "原來是老師啊。\n今天的任務就是這些。"
10067-CVGroup_UIEventMission_Enter2-1 = "任務是重要事項之一。"
10067-CVGroup_UIEventMission_Enter2-2 = "今天也一步一步確實地進行吧。"
10067-CVGroup_UIEventMission_Idle1-1 = "每天被賦予的工作，有時也會成為負擔。"
10067-CVGroup_UIEventMission_Idle1-2 = "沒問題的，我會成為老師的助力。"
10067-CVGroup_UIEventMission_Idle2-1 = "特務和任務有著切也切不斷的關係。"
10067-CVGroup_UIEventMission_Idle2-2 = "……也就是現在的老師，同時也是特務的意思。"
10067-CVGroup_UIEventMission_Buy1-1 = "今天的任務，完成。\n您辛苦了，老師。"
10067-CVGroup_UIEventMission_Buy2-1 = "在我看來那也是非常辛苦的行程。"
10067-CVGroup_UIEventMission_Buy2-2 = "不愧是您，老師。"
10067-CVGroup_UIEventMiniGameMission_Enter1-1 = "原來是老師啊。\n今天的任務就是這些。"
10067-CVGroup_UIEventMiniGameMission_Enter2-1 = "任務是重要事項之一。"
10067-CVGroup_UIEventMiniGameMission_Enter2-2 = "今天也一步一步確實地進行吧。"
10067-CVGroup_UIEventMiniGameMission_Idle1-1 = "每天被賦予的工作，有時也會成為負擔。"
10067-CVGroup_UIEventMiniGameMission_Idle1-2 = "沒問題的，我會成為老師的助力。"
10067-CVGroup_UIEventMiniGameMission_Idle2-1 = "特務和任務有著切也切不斷的關係。"
10067-CVGroup_UIEventMiniGameMission_Idle2-2 = "…也就是現在的老師，同時也是特務的意思。"
10067-CVGroup_UIEventMiniGameMission_Buy1-1 = "今天的任務，完成。\n您辛苦了，老師。"
10067-CVGroup_UIEventMiniGameMission_Buy2-1 = "在我看來那也是非常辛苦的行程。"
10067-CVGroup_UIEventMiniGameMission_Buy2-2 = "不愧是您，老師。"

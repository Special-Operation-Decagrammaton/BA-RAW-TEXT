[translation]
16018-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16018-CVGroup_CharacterGet_Idle1-1 = "我是嘩啦嘩啦頭盔團的隊長，河駒風良舞。\n等等，老師！！太近了啦！離遠一點！！"
16018-CVGroup_Cafe_Idle1-1 = "有可以掛頭盔的地方嗎？"
16018-CVGroup_Cafe_Idle2-1 = "總覺得……好像在哪裡見過……？"
16018-CVGroup_Cafe_Idle3-1 = "（可以上前搭話嗎……？）"
16018-CVGroup_Cafe_Idle4-1 = "這裡，還挺不錯的嘛。\n又可以遮雨。"
16018-CVGroup_Cafe_Idle5-1 = "要是有把頭盔團的大家一起帶來就好了……"
16018-CVGroup_WeaponGet_Idle1-1 = "哎呀！這個我一直想要呢！\n謝謝啦，老師♪"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "問你哦老師，你知道這是什麼嗎？"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "……看起來，像是自動販賣機的樣子。"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "好像只能用專用的代幣呢。"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "算了，反正也只能用在這裡……就試投一次看看吧。"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "哎呀，好像到關店時間了。\n把剩下的全部用掉吧。"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "旁邊貼的這張圖……\n不是跟那些孩子們一樣的衣服嗎？"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "應該不會從裡面突然跳出來偷襲吧……？"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "哇，在閃閃發亮……這是超級稀有的意思嗎？"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "是很少見到的東西呢。\n稀不稀有呢？"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "金色……呵呵，好像中獎了呢！\n還會有嗎？"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "唔嗯～哪個是稀有哪個是槓龜……\n完全搞不懂。"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "啊，黑色！是我喜歡的顏色！"
16018-CVGroup_UIEventMission_Enter1-1 = "哈啊，哈啊……不是，你們到底是誰啊！？"
16018-CVGroup_UIEventMission_Enter2-1 = "魔法少女……該不會跟我說你們真的會用魔法吧！？"
16018-CVGroup_UIEventMission_Idle1-1 = "……等等，在做什麼啦！\n快去做你們自己的工作！"
16018-CVGroup_UIEventMission_Idle1-2 = "（真是的……老師美中不足的就是人太好這點……）"
16018-CVGroup_UIEventMission_Idle2-1 = "唉……你可能不知道，所以姑且跟你說一聲。"
16018-CVGroup_UIEventMission_Idle2-2 = "頭盔被碰到的話，聲音會反射得超級吵。"
16018-CVGroup_UIEventMission_Idle2-3 = "……"
16018-CVGroup_UIEventMission_Idle2-4 = "就一下下哦……真是的。"
16018-CVGroup_UIEventMission_Buy1-1 = "要是不拿這些的話，就太不划算了呢！"
16018-CVGroup_UIEventMission_Buy2-1 = "很厲害嘛！\n這就是我在等的哦！"
16018-CVGroup_UIEventMission_Interaction1-1 = "好，今天的額度結束！\n輕輕鬆鬆呢。"
16018-CVGroup_UIEventMission_Interaction1-2 = "這種程度，交給我就是小菜一碟啦♪"

[translation]
16018-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16018-CVGroup_CharacterGet_Idle1-1 = "ฉันโคะมาคาเสะ ราบุ หัวหน้าแก๊งหมวกกันน็อกป๋อมแป๋ม\nดะ... เดี๋ยวสิ ครู!! ใกล้ไปแล้ว อย่าวิ่งเข้ามาสิ!!"
16018-CVGroup_Cafe_Idle1-1 = "มีที่แขวนหมวก... บ้างมั้ยนะ?"
16018-CVGroup_Cafe_Idle2-1 = "เหมือนเคยเห็นบ่อยๆ จากที่ไหนเลย..."
16018-CVGroup_Cafe_Idle3-1 = "(ชวนคุย... ได้มั้ยนะ?)"
16018-CVGroup_Cafe_Idle4-1 = "ที่นี่ถือว่าใช้ได้เลยนะ น้ำฝนไม่หยดด้วย"
16018-CVGroup_Cafe_Idle5-1 = "อยากพาเด็กๆ ในแก๊งมาด้วยจัง..."
16018-CVGroup_WeaponGet_Idle1-1 = "โอ้ นี่ละ แบบนี้ละ\nขอบคุณนะ ครู!"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "ครู รู้มั้ยว่านี่อะไร?"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "เหมือนตู้ขายสินค้าเลย..."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "น่าจะใช้ได้แค่เหรียญเฉพาะนะ"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "ก็นะ ไหนๆ ก็ใช้ได้แต่ที่นี่แล้ว...\nงั้นก็ลองดูสักหน่อยแล้วกัน"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "เอ๋ จะปิดแล้วเหรอ\nใช้เหรียญที่มีให้หมดกันเถอะ"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "รูปที่ติดอยู่ข้างๆ...\nชุดเดียวกับเด็กพวกนั้นเลยนี่นา?"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "คงไม่โผล่ออกมาจากข้างในนี้หรอกเนอะ...?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "ว้าว ระยิบระยับจัง... นี่คือการ์ดแรร์เหรอ?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "ไม่ได้เห็นบ่อยๆ เลย เป็นการ์ดแรร์สินะ?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "สีทองนี่นา ดีแน่เลย! หมุนไปอีกเยอะๆ เลยนะ!"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "ฮึ่ม ใบไหนดี ใบไหนเกลือนะ...\nไม่เห็นจะรู้เลยสักนิด"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "สีดำนี่นา? เป็นสีที่ฉันชอบเลยละ!"
16018-CVGroup_UIEventMission_Enter1-1 = "แฮ่ก... แฮ่ก... พวกนั้นคือใครกันแน่น่ะ?!"
16018-CVGroup_UIEventMission_Enter2-1 = "สาวน้อยเวทมนตร์งั้นเหรอ?\nไม่ใช่เวทมนตร์จริงๆ ใช่มั้ย?!"
16018-CVGroup_UIEventMission_Idle1-1 = "ทะ... ทำอะไรน่ะ! รีบทำงานเข้าสิ!"
16018-CVGroup_UIEventMission_Idle1-2 = "(ครูเป็นคนดีเกินไปจนเป็นปัญหาแล้วเนี่ย)"
16018-CVGroup_UIEventMission_Idle2-1 = "นี่ ฉันจะบอกให้เพราะน่าจะยังไม่รู้นะ"
16018-CVGroup_UIEventMission_Idle2-2 = "ถ้าลูบหมวกกันน็อก มันจะหนวกหูน่ะ"
16018-CVGroup_UIEventMission_Idle2-3 = "......"
16018-CVGroup_UIEventMission_Idle2-4 = "แค่นิดเดียวนะ จริงๆ เลยเชียว..."
16018-CVGroup_UIEventMission_Buy1-1 = "ใช่แล้ว ต้องแบบนี้ละ!"
16018-CVGroup_UIEventMission_Buy2-1 = "ยอดไปเลยนะ นี่ละใช่เลย!"
16018-CVGroup_UIEventMission_Interaction1-1 = "เสร็จงานวันนี้แล้ว! งานกล้วยๆ นะเนี่ย!"
16018-CVGroup_UIEventMission_Interaction1-2 = "งานแค่นี้น่ะหมูๆ!"

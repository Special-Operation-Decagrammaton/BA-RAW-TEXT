[translation]
16018-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16018-CVGroup_CharacterGet_Idle1-1 = "I'm Komakaze Rabu, captain of the Splash Helmet Gang. H-Hold on, Sensei!! Personal space! Don't run at me like that!"
16018-CVGroup_Cafe_Idle1-1 = "Is there a hat hanger... around?"
16018-CVGroup_Cafe_Idle2-1 = "I think I've seen this person a lot before..."
16018-CVGroup_Cafe_Idle3-1 = "(Should I...talk to her?)"
16018-CVGroup_Cafe_Idle4-1 = "This place isn't half bad. No leaking roof and all."
16018-CVGroup_Cafe_Idle5-1 = "It would've been nice if I could bring others here..."
16018-CVGroup_WeaponGet_Idle1-1 = "Yeah! This is it! This is it! Thank you, Sensei!"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "Sensei, do you know what this is?"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "...It looks like a vending machine..."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "Looks like it only takes exclusive medals."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "I guess that means we can only use it here... So let's give it a shot."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "Huh, it's closing time. Let's use all our medals before we go."
16018-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "That picture... Aren't those their outfits?"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "They're not going to pop out of the frame or anything, right...?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "Whoa, it's shiny... Is this what they call super rare?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "That one's hard to find. Is it rare?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "It's gold, so I guess it's good! Let's pull a bunch more!"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "Ugh, I have no clue...as to what's good and what's not."
16018-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "Huh? Black? That's my favorite color!"
16018-CVGroup_UIEventMission_Enter1-1 = "*huff* *huff* ...Just what is their deal?!"
16018-CVGroup_UIEventMission_Enter2-1 = "Magical girls? They're not actually magic, right?!"
16018-CVGroup_UIEventMission_Idle1-1 = "Wh-What are you doing?! Go do your job already!"
16018-CVGroup_UIEventMission_Idle1-2 = "(Sensei, you're too good of a person.)"
16018-CVGroup_UIEventMission_Idle2-1 = "I'm telling you this because I don't think you know."
16018-CVGroup_UIEventMission_Idle2-2 = "But it's really loud for me whenever someone pats my helmet."
16018-CVGroup_UIEventMission_Idle2-3 = "..."
16018-CVGroup_UIEventMission_Idle2-4 = "Only a little bit, then. ...Seriously."
16018-CVGroup_UIEventMission_Buy1-1 = "Yeah, that's more like it!"
16018-CVGroup_UIEventMission_Buy2-1 = "Great! This is it!"
16018-CVGroup_UIEventMission_Interaction1-1 = "That's it for today! Easy peasy!"
16018-CVGroup_UIEventMission_Interaction1-2 = "This is light work!"

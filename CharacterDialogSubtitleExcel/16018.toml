[translation]
16018-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
16018-CVGroup_CharacterGet_Idle1-1 = "퐁당퐁당 헬멧단 대장, 코마카제 라브다.\n자, 잠깐 선생!! 가까워! 달려들지 마!!"
16018-CVGroup_Cafe_Idle1-1 = "모자걸이가……. 없나?"
16018-CVGroup_Cafe_Idle2-1 = "어디서 많이 본 것 같은데……."
16018-CVGroup_Cafe_Idle3-1 = "(말……. 걸어봐도 되나?)"
16018-CVGroup_Cafe_Idle4-1 = "여기, 그럭저럭 좋잖아. 비도 안 새고."
16018-CVGroup_Cafe_Idle5-1 = "우리 애들도 데려오면 좋을 텐데……."
16018-CVGroup_WeaponGet_Idle1-1 = "오, 이거지 이거야- 고마워, 선생!"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "선생, 이게 뭔지 알아?"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "……자판기 같기도 하고……."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "전용 메달만 사용할 수 있나 봐."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "뭐, 여기서 밖에 못 쓸 테니…… 시험 삼아 한 번 넣어보자."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "어라, 폐점 시간이네. 남은 메달 다 쓰고 나가자."
16018-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "옆에 붙어있는 그림……. 그 녀석들하고 똑같은 옷이잖아?"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "설마 안에서 튀어나오는 건 아니겠지……?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "우와, 반짝반짝…… 이거 초레어라는 건가?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "보기 힘든 녀석이네, 레어한 건가?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "금색이네, 좋은 건가 봐! 잔뜩 뽑아보자!"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "끄응, 뭐가 좋고 나쁜 건지…… 전혀 모르겠어."
16018-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "어? 검은색이네? 내가 좋아하는 색이야!"
16018-CVGroup_UIEventMission_Enter1-1 = "헉, 헉…… 대체 뭐 하는 녀석들이야?!"
16018-CVGroup_UIEventMission_Enter2-1 = "마법소녀라고? 진짜 마법은 아니겠지?!"
16018-CVGroup_UIEventMission_Idle1-1 = "뭐, 뭐 하는 거야! 얼른 할 일이나 하라구!"
16018-CVGroup_UIEventMission_Idle1-2 = "(선생은 사람이 너무 좋은 게 탈이야.)"
16018-CVGroup_UIEventMission_Idle2-1 = "있지, 모르는 것 같아서 말해주는데."
16018-CVGroup_UIEventMission_Idle2-2 = "헬멧을 쓰다듬으면 귀가 시끄러워."
16018-CVGroup_UIEventMission_Idle2-3 = "……"
16018-CVGroup_UIEventMission_Idle2-4 = "조금만이야 ……정말이지."
16018-CVGroup_UIEventMission_Buy1-1 = "그래, 이 정도는 되어야지!"
16018-CVGroup_UIEventMission_Buy2-1 = "대박이네, 이거지!"
16018-CVGroup_UIEventMission_Interaction1-1 = "오늘치 끝! 간단했네!"
16018-CVGroup_UIEventMission_Interaction1-2 = "이 정도는 쉽지!"

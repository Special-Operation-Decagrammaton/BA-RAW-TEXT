[translation]
20014-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20014-CVGroup_CharacterGet_Idle1-1 = "โซราอิ ซากิ สมาชิกกองทหาร RABBIT จากสถาบัน SRT!\nแล้วคู่มือปฏิบัติการของชาเล่ต์อยู่ที่ไหนล่ะ?"
20014-CVGroup_Cafe_Idle1-1 = "ทุกคนดูขาดวินัยกันสุดๆ น่าสมเพชชะมัด"

20014-CVGroup_Cafe_Idle3-1 = "ถึงจะเป็นวันหยุดก็เถอะ แต่อย่างน้อยๆ ก็ควรรักษาวินัยกันบ้างสิ"
20014-CVGroup_Cafe_Idle4-1 = "(คู่มือที่เขียนวิธีการใช้งานของเจ้านี่อยู่ตรงไหนกันนะ...?)"
20014-CVGroup_Cafe_Idle5-1 = "(อะไรกัน ไม่ได้เขียนไว้ในคู่มือเลยนี่นา...)"
20014-CVGroup_WeaponGet_Idle1-1 = "ได้รับ Rabbit-26 Machine Gun เรียบร้อย\nอืม ต้องรู้สึกถึงน้ำหนักปืนแบบนี้สิถึงจะวางใจ..."

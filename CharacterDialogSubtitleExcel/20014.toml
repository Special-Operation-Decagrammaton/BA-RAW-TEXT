[translation]
20014-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
20014-CVGroup_CharacterGet_Idle1-1 = "SRT 특수학원, RABBIT 소대의 소라이 사키다.\n그래서, 샬레의 작전 교범은 어디에 있지?"
20014-CVGroup_Cafe_Idle1-1 = "다들 기강이 잔뜩 빠져서… 한심한 모양새야."
20014-CVGroup_Cafe_Idle2-1 = "어딜 가나 바보들 뿐이군."
20014-CVGroup_Cafe_Idle3-1 = "아무리 휴식 중이라도 최소한의 군기는 유지해야……."
20014-CVGroup_Cafe_Idle4-1 = "(이 물건의 사용법이 적힌 매뉴얼은 어디에…?)"
20014-CVGroup_Cafe_Idle5-1 = "(뭐야, 저거. 교범에서도 본 적 없는데…….)"
20014-CVGroup_WeaponGet_Idle1-1 = "RABBIT 26식 기관총, 수령 완료.\n…음, 역시 이 무게가 느껴져야 안심이 돼."

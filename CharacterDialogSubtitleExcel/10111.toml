[translation]
10111-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10111-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨 미카모 네루, 지금 도착했다고….\n앙? 이 옷? 이상하다는 거냐?"
10111-CVGroup_Cafe_Idle1-1 = "(뭐야 저거? 엄청 멋있잖아?!)"
10111-CVGroup_Cafe_Idle2-1 = "뭐, 나쁘지 않네. 좀 쉴까."
10111-CVGroup_Cafe_Idle3-1 = "걸치고 있는 게 없으니 허전하네."
10111-CVGroup_Cafe_Idle4-1 = "선생은 언제쯤 오려나……."
10111-CVGroup_Cafe_Idle5-1 = "오! 이 가구는 좀 마음에 드는데? 부실에도 가져다 놓을까?"
10111-CVGroup_WeaponGet_Idle1-1 = "따지고 보면 별다를 거 없는 상황인데 왠지 모르게 특별한 느낌이 드네.\n……뭐, 상관없겠지! 선생이랑 나 사이니까!"
10111-CVGroup_UIEventLobby_Enter1-1 = "여! 선생! 여기야, 여기!"
10111-CVGroup_UIEventLobby_Enter2-1 = "아, 선생! 왜 이렇게 늦었어?"
10111-CVGroup_UIEventLobby_Enter3-1 = "자, 자! 정신 바짝 차리자고!"
10111-CVGroup_UIEventLobby_Enter4-1 = "조금만 참아,"
10111-CVGroup_UIEventLobby_Enter4-2 = "다 끝나면 놀아줄 테니까!"
10111-CVGroup_UIEventLobby_Enter5-1 = "하-! 나름대로 재밌었어, 그렇지?"
10111-CVGroup_UIEventLobby_Idle1-1 = "어? 불렀어? 불렀으면 말을 해야 할 거 아냐."
10111-CVGroup_UIEventLobby_Idle2-1 = "아앙? 그냥 한 번 찔러봤다고? 그건 또 무슨……."
10111-CVGroup_UIEventLobby_Idle3-1 = "…하아, 어린애 같은 짓하고 말이야."
10111-CVGroup_UIEventLobby_Idle4-1 = "기억해 두겠어. 다음엔 내가 찌를 테니까, 각오하라고."

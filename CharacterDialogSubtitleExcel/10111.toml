[translation]
10111-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10111-CVGroup_CharacterGet_Idle1-1 = "Mikamo Neru, from Millennium Science School. I just got here... Huh? This outfit? What, do you think it's weird?"
10111-CVGroup_Cafe_Idle1-1 = "(What's that? Cool!)"
10111-CVGroup_Cafe_Idle2-1 = "Well, all right. Maybe I'll take it easy for a bit."
10111-CVGroup_Cafe_Idle3-1 = "It feels odd, since I'm not wearing something over it."
10111-CVGroup_Cafe_Idle4-1 = "I wonder when Sensei will get here..."
10111-CVGroup_Cafe_Idle5-1 = "Oh! I like this furniture. Should I get one in the club room too?"
10111-CVGroup_WeaponGet_Idle1-1 = "I suppose it's not much different from the usual, but it feels special somehow. ...Well, I guess it doesn't matter! Since it's between you and me, Sensei!"
10111-CVGroup_UIEventLobby_Enter1-1 = "Yo! Sensei! Here, over here!"
10111-CVGroup_UIEventLobby_Enter2-1 = "Sensei! What took you so long?"
10111-CVGroup_UIEventLobby_Enter3-1 = "Now, now! Stay focused!"
10111-CVGroup_UIEventLobby_Enter4-1 = "Hold on just a little longer..."
10111-CVGroup_UIEventLobby_Enter4-2 = "I'll play with you when I'm done!"
10111-CVGroup_UIEventLobby_Enter5-1 = "Ha! It was fun, right?"
10111-CVGroup_UIEventLobby_Idle1-1 = "Huh? You called? If you did, you ought to say something."
10111-CVGroup_UIEventLobby_Idle2-1 = "Huuuh? You just poked me for the sake of poking me? What does that even...?"
10111-CVGroup_UIEventLobby_Idle3-1 = "*sigh* So childish."
10111-CVGroup_UIEventLobby_Idle4-1 = "I'll remember this. I'll be the one to poke next time, so brace yourself."

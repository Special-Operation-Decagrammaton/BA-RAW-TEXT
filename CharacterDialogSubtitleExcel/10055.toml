[translation]
10055-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～"
10055-CVGroup_CharacterGet_Idle1-1 = "啊，老師。工作前要不要喝一杯啊？\n呵呵……不是酒啦，放心吧。"
10055-CVGroup_Cafe_Idle1-1 = "有好多可愛的東西呢。"
10055-CVGroup_Cafe_Idle2-1 = "那是……"
10055-CVGroup_Cafe_Idle3-1 = "這溫度正適合發酵。"
10055-CVGroup_Cafe_Idle4-1 = "這裡真溫暖呢。\n……真想多待在這裡一下。"
10055-CVGroup_Cafe_Idle5-1 = "把這個和那個混合一下……"
10055-CVGroup_WeaponGet_Idle1-1 = "這把榴彈發射器，用來點火的時候很棒，\n但用來打獵感覺有點微妙呢。\n……不過，用來驅趕熊應該很夠用了。"
10055-CVGroup_UIEventMission_Enter1-1 = "呀齁～老師。\n方便的話可以請你協助溫泉浴場的工作嗎。"
10055-CVGroup_UIEventMission_Enter2-1 = "有空嗎？\n我想在泡溫泉之前稍微運動一下。"
10055-CVGroup_UIEventMission_Idle1-1 = "和香真是個認真的人呢。"
10055-CVGroup_UIEventMission_Idle2-1 = "呵呵，這次的漿果汁做得很好。"
10055-CVGroup_UIEventMission_Idle3-1 = "……嗯？想跟我一起洗澡嗎？"
10055-CVGroup_UIEventMission_Idle3-2 = "開玩笑的。\n別露出那麼認真的表情。"
10055-CVGroup_UIEventMission_Buy1-1 = "辛苦了。\n要不要來一口漿果汁？"
10055-CVGroup_UIEventMission_Buy2-1 = "不愧是老師。\n我知道你有人氣的理由了唷。"
10055-CVGroup_UIEventMission_Interaction1-1 = "今天就此告一段落。\n接下來就泡個澡，悠閒地度過如何？"

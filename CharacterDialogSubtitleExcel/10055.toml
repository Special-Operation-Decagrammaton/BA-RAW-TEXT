[translation]
10055-CVGroup_UITitle_Idle1-1 = "블루 아카이브~"
10055-CVGroup_CharacterGet_Idle1-1 = "아, 선생님. 일하기 전에 가볍게 한 잔 어때?\n후후…… 술은 아니니까 안심해."
10055-CVGroup_Cafe_Idle1-1 = "귀여운 것들이 잔뜩 있네."
10055-CVGroup_Cafe_Idle2-1 = "저건……?"
10055-CVGroup_Cafe_Idle3-1 = "발효에 딱 좋은 온도인걸."
10055-CVGroup_Cafe_Idle4-1 = "이곳은 따듯하네…… 조금만 더 머무르고 싶어."
10055-CVGroup_Cafe_Idle5-1 = "이거랑 저걸 조금 섞어서…"
10055-CVGroup_WeaponGet_Idle1-1 = "이 유탄발사기. 불을 붙일 때는 좋은데, 사냥에 쓰기에는 미묘하단 말이지.\n……그래도 뭐, 곰을 쫓아내기엔 충분할지도."
10055-CVGroup_UIEventMission_Enter1-1 = "야호- 선생님. 혹시 괜찮다면 온천장의 일을 도와주지 않을래?"
10055-CVGroup_UIEventMission_Enter2-1 = "잠깐 시간 괜찮아? 탕에 들어가기 전에 가볍게 움직여 보자고."
10055-CVGroup_UIEventMission_Idle1-1 = "노도카도 참 열심이라니까~"
10055-CVGroup_UIEventMission_Idle2-1 = "후후, 이번에 담근 모르스는 정말 잘 익었는걸."
10055-CVGroup_UIEventMission_Idle3-1 = "……응? 나랑 같이 목욕하고 싶어?"
10055-CVGroup_UIEventMission_Idle3-2 = "농담이야. 그렇게 정색하진 마."
10055-CVGroup_UIEventMission_Buy1-1 = "수고했어. 괜찮다면 모르스 한 모금…… 어때?"
10055-CVGroup_UIEventMission_Buy2-1 = "역시 선생님…… 모두에게 인기가 많은 이유를 알겠네."
10055-CVGroup_UIEventMission_Interaction1-1 = "오늘 일은 이걸로 끝이야.\n남은 시간은 목욕이라도 하면서 느긋하게 보내는 게 어때?"

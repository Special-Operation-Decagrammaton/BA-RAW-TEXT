[translation]
10055-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10055-CVGroup_CharacterGet_Idle1-1 = "อ๊ะ คุณครู มาดื่มสักแก้วก่อนไปทำงานมั้ย?\nฮุฮุ... ไม่ใช่เหล้าหรอก รับรองปลอดภัย"
10055-CVGroup_Cafe_Idle1-1 = "มีของน่ารักๆ เยอะแยะเลย"
10055-CVGroup_Cafe_Idle2-1 = "นั่นมัน..."
10055-CVGroup_Cafe_Idle3-1 = "อุณหภูมิเหมาะสำหรับการหมักเลย"
10055-CVGroup_Cafe_Idle4-1 = "ตรงนี้อุ่นดีจัง... อยากอยู่ตรงนี้ต่ออีกหน่อยจัง"
10055-CVGroup_Cafe_Idle5-1 = "เอาอันนี้กับอันนั้นมาผสมกันนิดหน่อย..."
10055-CVGroup_WeaponGet_Idle1-1 = "ปืนยิงระเบิดอันนี้ เวลาใช้จุดไฟก็ดีอยู่นะ\nแต่จะใช้ล่าสัตว์ก็คงแปลกเกินไป\nแต่ก็นะ... น่าจะเอาไว้ใช้ไล่หมีได้อยู่"
10055-CVGroup_UIEventMission_Enter1-1 = "ยะฮู้ว คุณครู ถ้าไม่ติดอะไร\nมาช่วยงานของออนเซ็นหน่อยได้มั้ย?"
10055-CVGroup_UIEventMission_Enter2-1 = "พอมีเวลาหน่อยมั้ย?\nฉันอยากชวนขยับร่างกายก่อนจะลงไปแช่ตัวน่ะ"
10055-CVGroup_UIEventMission_Idle1-1 = "โนโดกะนี่ก็ขยันเหลือเกิน~"
10055-CVGroup_UIEventMission_Idle2-1 = "ฮุฮุ รอบนี้ชามอร์สหมักมาได้ที่เลย"
10055-CVGroup_UIEventMission_Idle3-1 = "หืม...? อยากอาบน้ำกับฉันเหรอ?"
10055-CVGroup_UIEventMission_Idle3-2 = "ล้อเล่นน่า\nอย่าทำหน้าจริงจังแบบนั้นสิ"
10055-CVGroup_UIEventMission_Buy1-1 = "ขอบคุณมากนะ\nถ้าไม่ติดอะไร ลองมอร์ส... สักกรึ๊บมั้ย?"
10055-CVGroup_UIEventMission_Buy2-1 = "สมกับเป็นคุณครูจริงๆ เลย\nรู้แล้วว่าทำไมคนอื่นถึงชอบกันนัก"
10055-CVGroup_UIEventMission_Interaction1-1 = "งานวันนี้จบแค่นี้แหละ\nเวลาที่เหลือเรามาอาบน้ำชิลๆ กันมั้ย?"

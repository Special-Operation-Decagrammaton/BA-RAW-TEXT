20027-CVGroup_Cafe_Idle4-1 = "…어라, 잡힐까?"
20027-CVGroup_Cafe_Idle5-1 = "…응? 방금 그 소리는…."
20027-CVGroup_WeaponGet_Idle1-1 = "이런 곳까지 와서도…. 선생님은 똑같구나.\n항상 지원…아니. …도와줘서, 고마워."

[translation]
10116-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案。"
10116-CVGroup_CharacterGet_Idle1-1 = "我是奧利斯小隊的沙織……\n這個，是為了任務而穿的。\n……是真的。"
10116-CVGroup_Cafe_Idle1-1 = "似乎很適合用於潛入作戰的練習啊。"
10116-CVGroup_Cafe_Idle2-1 = "總有一天，要讓那些孩子們也……穿上禮服。"
10116-CVGroup_Cafe_Idle3-1 = "有在任務之外的場合穿上這個的機會嗎……"
10116-CVGroup_Cafe_Idle4-1 = "能感受到視線……莫非，我很顯眼嗎？"
10116-CVGroup_Cafe_Idle5-1 = "便利屋68……果然不是泛泛之輩啊……"
10116-CVGroup_WeaponGet_Idle1-1 = "託你的福，能執行的工作變得更多樣了。\n無論委託還是任何事情，我都會回應的。"
10116-CVGroup_UIEventLobby_Enter1-1 = "特殊任務的時間到了。"
10116-CVGroup_UIEventLobby_Enter1-2 = "那麼開始吧。"
10116-CVGroup_UIEventLobby_Enter2-1 = "有老師在的話，就沒問題了。"
10116-CVGroup_UIEventLobby_Enter3-1 = "挺順利的呢。\n之後的指揮也拜託了。"
10116-CVGroup_UIEventLobby_Enter4-1 = "作戰已進入終盤。"
10116-CVGroup_UIEventLobby_Enter4-2 = "記得留意時間分配。"
10116-CVGroup_UIEventLobby_Enter5-1 = "在這之後……我也想繼續穿著這套禮服。\n會有困難嗎？"
10116-CVGroup_UIEventLobby_Idle1-1 = "怎麼了嗎？"
10116-CVGroup_UIEventLobby_Idle2-1 = "沒什麼事……？"
10116-CVGroup_UIEventLobby_Idle3-1 = "我很漂亮……？"
10116-CVGroup_UIEventLobby_Idle3-2 = "老師你……也會開這種奇怪的玩笑呢。"
10116-CVGroup_UIEventLobby_Idle4-1 = "請，請不要隨便說那種話。"

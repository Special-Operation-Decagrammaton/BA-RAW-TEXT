10116-CVGroup_UITitle_Idle1-1 = "B-Blue Archive."
10116-CVGroup_CharacterGet_Idle1-1 = "Saori from Arius Squad... I wore this for a mission... No, really."
10116-CVGroup_Cafe_Idle1-1 = "Hm, I can learn more about undercover operations here."
10116-CVGroup_Cafe_Idle2-1 = "One day, for those kids too...a dress..."
10116-CVGroup_Cafe_Idle3-1 = "Will I have an opportunity to wear a dress outside of work one day?"
10116-CVGroup_Cafe_Idle4-1 = "Do I stand out? I feel people looking at me."
10116-CVGroup_Cafe_Idle5-1 = "Problem Solver 68... They're truly incredible."
10116-CVGroup_WeaponGet_Idle1-1 = "This will help me to complete more missions. Please tell me if there is anything I can assist you with."
10116-CVGroup_UIEventLobby_Enter1-1 = "We'll be undertaking a special mission."
10116-CVGroup_UIEventLobby_Enter1-2 = "Let's begin."
10116-CVGroup_UIEventLobby_Enter2-1 = "As long as you're here, I don't anticipate any problems."
10116-CVGroup_UIEventLobby_Enter3-1 = "The mission is proceeding well. I'll trust in your orders."
10116-CVGroup_UIEventLobby_Enter4-1 = "We're in the wrap-up phase."
10116-CVGroup_UIEventLobby_Enter4-2 = "Please keep good time management in mind."
10116-CVGroup_UIEventLobby_Enter5-1 = "I hope I can continue wearing this dress, despite the mission being over."
10116-CVGroup_UIEventLobby_Idle1-1 = "Hm? What are my orders?"
10116-CVGroup_UIEventLobby_Idle2-1 = "You...called me for no reason? Why?"
10116-CVGroup_UIEventLobby_Idle3-1 = "I look pretty...?"
10116-CVGroup_UIEventLobby_Idle3-2 = "Sensei...you have strange jokes."
10116-CVGroup_UIEventLobby_Idle4-1 = "Ah. Please don't say such things so casually."

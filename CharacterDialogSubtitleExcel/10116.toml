[translation]
10116-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브."
10116-CVGroup_CharacterGet_Idle1-1 = "아리우스 스쿼드의 사오리다…\n이건, 임무를 위해 입은 것이다… 정말이다."
10116-CVGroup_Cafe_Idle1-1 = "흠, 위장 업무를 배우기 좋은 장소군."
10116-CVGroup_Cafe_Idle2-1 = "언젠가, 그 아이들에게도… 드레스를."
10116-CVGroup_Cafe_Idle3-1 = "일 외에도 이런 드레스를 입는 날이…… 나에게도 올까?"
10116-CVGroup_Cafe_Idle4-1 = "내가 눈에 띄는 건가? 주변의 시선이 느껴지는군."
10116-CVGroup_Cafe_Idle5-1 = "흥신소 68…… 역시 대단한 자들이다."
10116-CVGroup_WeaponGet_Idle1-1 = "좀 더 다양한 업무를 할 수 있겠군. 필요한 건 뭐든 말해라."
10116-CVGroup_UIEventLobby_Enter1-1 = "특별 임무의 시간이군."
10116-CVGroup_UIEventLobby_Enter1-2 = "그럼 시작하지."
10116-CVGroup_UIEventLobby_Enter2-1 = "선생과 함께라면\n이번 일도 문제없어."
10116-CVGroup_UIEventLobby_Enter3-1 = "아직까진 여유롭군.\n이후의 지휘도 잘 부탁하지."
10116-CVGroup_UIEventLobby_Enter4-1 = "이제 마무리 단계인가."
10116-CVGroup_UIEventLobby_Enter4-2 = "시간 분배에\n주의해 주길 바란다."
10116-CVGroup_UIEventLobby_Enter5-1 = "임무는 끝났지만,\n이 드레스는 계속\n입어봤으면 좋겠군."
10116-CVGroup_UIEventLobby_Idle1-1 = "음?\n지시 사항이 있나?"
10116-CVGroup_UIEventLobby_Idle2-1 = "그냥…… 불러본\n거였다고? 어째서?"
10116-CVGroup_UIEventLobby_Idle3-1 = "내가, 예쁘다고…?"
10116-CVGroup_UIEventLobby_Idle3-2 = "선생은…\n이상한 농담을 하는군."
10116-CVGroup_UIEventLobby_Idle4-1 = "읏, 그런 말을 그렇게\n쉽게 하지 말아줘."

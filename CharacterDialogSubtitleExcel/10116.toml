[translation]
10116-CVGroup_UITitle_Idle1-1 = "B... Blue... Archive"
10116-CVGroup_CharacterGet_Idle1-1 = "ฉันซาโอริ สควอดของอาเรียส...\nฉันใส่ชุดนี้เพราะงานหรอกนะ... จริงๆ นะ"
10116-CVGroup_Cafe_Idle1-1 = "ฮืม เป็นที่ที่เหมาะกับการเรียนรู้ภารกิจปลอมตัวเลย"
10116-CVGroup_Cafe_Idle2-1 = "สักวันหนึ่ง เด็กๆ พวกนั้น... คงได้ใส่ชุดเดรสบ้าง"
10116-CVGroup_Cafe_Idle3-1 = "จะมีวันที่ได้ใส่ชุดเดรสแบบนี้... แต่ไม่ใช่เพราะงานมั้ยนะ?"
10116-CVGroup_Cafe_Idle4-1 = "ฉันเตะตามากเลยเหรอ?\nรู้สึกถึงสายตาที่มองมาเลย"
10116-CVGroup_Cafe_Idle5-1 = "หน่วยรับจ้างสารพัด 68... เป็นพวกคนที่น่าทึ่งเลยละ"
10116-CVGroup_WeaponGet_Idle1-1 = "ฉันน่าจะทำงานที่หลากหลายขึ้นได้แล้ว\nต้องการอะไรก็บอกมาได้เลย"
10116-CVGroup_UIEventLobby_Enter1-1 = "ได้เวลาทำภารกิจพิเศษแล้วสินะ"
10116-CVGroup_UIEventLobby_Enter1-2 = "งั้นก็มาเริ่มกันเลย"
10116-CVGroup_UIEventLobby_Enter2-1 = "ถ้าได้อยู่กับครู งานนี้ก็ไม่มีปัญหา"
10116-CVGroup_UIEventLobby_Enter3-1 = "ยังไม่เจองานยากเลย\nสั่งการครั้งต่อไปก็ฝากด้วยนะ"
10116-CVGroup_UIEventLobby_Enter4-1 = "ตอนนี้เป็นขั้นสุดท้ายแล้วใช่มั้ย?"
10116-CVGroup_UIEventLobby_Enter4-2 = "ฝากระวังเรื่องการแบ่งเวลาด้วยนะ"
10116-CVGroup_UIEventLobby_Enter5-1 = "ภารกิจเสร็จแล้ว\nแต่อยากใส่ชุดเดรสนี้ไปเรื่อยๆ จัง"
10116-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีงานจะสั่งเหรอ?"
10116-CVGroup_UIEventLobby_Idle2-1 = "ก็แค่... ลองเรียกดูงั้นเหรอ? ทำไมล่ะ?"
10116-CVGroup_UIEventLobby_Idle3-1 = "เพราะฉันสวย... งั้นเหรอ...?"
10116-CVGroup_UIEventLobby_Idle3-2 = "ครูเนี่ย... ชอบล้อเล่นอะไรแปลกๆ นะ"
10116-CVGroup_UIEventLobby_Idle4-1 = "อึก อย่าพูดอย่างนั้นออกมาง่ายๆ แบบนี้สิ"

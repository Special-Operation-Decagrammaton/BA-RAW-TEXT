[translation]
0-CVGroup_UIEventLobby_Enter1-1 = "거짓된 성소 공략전, 개시합니다."
0-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었습니다. 선생님."
0-CVGroup_UIEventLobby_Idle1-1 = "현재, 거짓된 성소 공략전이 진행 중입니다."
0-CVGroup_UIEventLobby_Idle2-1 = "거짓된 성소에서 수집한 적의 데이터는, 계속해서 분석하고 있습니다."
0-CVGroup_UIEventLobby_Idle3-1 = "거짓된 성소의 파괴를 서두르지 않으면, 학원도시의 미래는……."
0-CVGroup_UIEventLobby_Idle4-1 = "이것은 키보토스 전역에 닥친 재해…."
0-CVGroup_UIEventLobby_Idle4-2 = "거짓된 성소 공략전에는 샬레의 힘이 필요합니다."
0-CVGroup_UIEventLobby_Idle5-1 = "시간 여유는 없습니다만……. 침착하게,"
0-CVGroup_UIEventLobby_Idle5-2 = "하나씩 해결하시죠."
0-CVGroup_UIEventLobby_Enter1-2 = "수, 수고 많으세요. 선생님……"
0-CVGroup_UIEventLobby_Enter2-2 = "문제가 엄청 쌓여 있지만…… 저, 저도 힘낼게요!"
0-CVGroup_UIEventLobby_Idle1-2 = "선생님…… 피곤해보이시는데 괜찮으신가요?"
0-CVGroup_UIEventLobby_Idle2-2 = "잠은 좀 주무시고 계신가요……"
0-CVGroup_UIEventLobby_Idle2-3 = "무리하시는 것 같아서……"
0-CVGroup_UIEventLobby_Enter1-3 = "이야~ 고생이 많네. 선생. 여전히 바빠보이네."
0-CVGroup_UIEventLobby_Idle1-3 = "아니아니, 나를 데려간들 도움이 안 되니까."
0-CVGroup_UIEventShop_Enter1-1 = "아무리 나라도 땡땡이 칠 수는 없어서 말이지.\n뭐, 이런 때 정도는 힘낼게."
0-CVGroup_UIEventShop_Idle1-1 = "하하하, 미안하지만 나는 여기를 지켜야 해. 데려가고 싶은 마음은 이해하지만. 쿠후후."
0-CVGroup_UIEventShop_Buy1-1 = "그걸로 할래? 좋아."
0-CVGroup_UIEventShop_Buy2-1 = "자아, 확실하게 전달했으니까."
0-CVGroup_UIEventShop_Buy3-1 = "오, 좋네~ 선생님, 안목이 있잖아."
0-CVGroup_UIEventShop_Buy4-1 = "호~ 그걸로 하는구나."
0-CVGroup_UIEventMission_Buy1-1 = "수고하셨습니다……!"
0-CVGroup_UIEventMission_Buy2-1 = "버, 벌써 해결하신 건가요…?"
0-CVGroup_UIEventLobby_Enter1-4 = "선생님, 우트나피쉬팀 브릿지, 현재 대기 중입니다."
0-CVGroup_UIEventLobby_Enter2-3 = "아트라하시스 방주 점령전, 진행 중입니다."
0-CVGroup_UIEventLobby_Enter3-1 = "이러고 있는 동안에도, 시간은 시시각각 흐르고 있습니다."
0-CVGroup_UIEventLobby_Enter4-1 = "남은 시간이 얼마 없습니다…"
0-CVGroup_UIEventLobby_Enter4-2 = "빠르게 임무를 진행하죠."
0-CVGroup_UIEventLobby_Idle1-4 = "이 모습, 말인가요?"
0-CVGroup_UIEventLobby_Idle1-5 = "…아아. 네. …감사합니다."
0-CVGroup_UIEventLobby_Idle2-4 = "피곤하지 않다면 거짓말이 되겠습니다만…."
0-CVGroup_UIEventLobby_Idle2-5 = "괜찮습니다. 임무에 지장을 줄 정도까진 아니기에."
0-CVGroup_UIEventLobby_Idle3-2 = "이 정도 규모의 오파츠를 점령하는 게 결코 간단한 일은 아니지만…."
0-CVGroup_UIEventLobby_Idle3-3 = "키보토스의 미래를 위해,"
0-CVGroup_UIEventLobby_Idle3-4 = "이 임무는 반드시 성공시켜야 합니다."
0-CVGroup_UIEventShop_Enter1-2 = "응? 보급물자가 필요해?"
0-CVGroup_UIEventShop_Enter2-1 = "필요한 게 있으면 말해줘."
0-CVGroup_UIEventShop_Idle1-2 = "생각해보면 굉장하네."
0-CVGroup_UIEventShop_Idle1-3 = "이런 곳까지 와버릴 줄은 상상도 못했다니까."
0-CVGroup_UIEventShop_Idle2-1 = "아하하, 지상에 내려갈 때까지 다치지 말라고, 선생."
0-CVGroup_UIEventShop_Buy1-2 = "오, 좋은 거 골랐네."
0-CVGroup_UIEventShop_Buy2-2 = "자, 여기. 힘내라구."
0-CVGroup_UIEventShop_Buy3-2 = "오~ 과연. 그걸로 골랐구나."
0-CVGroup_UIEventShop_Buy4-2 = "그렇게 나와야지."
0-CVGroup_UIEventMission_Enter1-1 = "아트라하시스의 방주 점령전…."
0-CVGroup_UIEventMission_Enter1-2 = "저도 최선을 다해 도와드리겠습니다."
0-CVGroup_UIEventMission_Enter2-1 = "선생님… 필요한 게 있으시다면 뭐든 말씀해 주세요."
0-CVGroup_UIEventMission_Idle1-1 = "으… 이 옷, 약간 가슴 부분이…"
0-CVGroup_UIEventMission_Idle2-1 = "다들 힘내고 계신 걸 보고 있으면…"
0-CVGroup_UIEventMission_Idle2-2 = "저도, 더욱 더 선생님의 힘이 되어드리고 싶어요."
0-CVGroup_UIEventMission_Buy1-2 = "수고하셨습니다, 선생님."
0-CVGroup_UIEventMission_Buy1-3 = "…작전도 중요하지만, 부디 몸조심 하세요."
0-CVGroup_UIEventMission_Buy2-2 = "네! 수고하셨습니다."
0-CVGroup_UIEventLobby_Enter1-5 = "이제 최종 결전이에요, 선생님!"
0-CVGroup_UIEventLobby_Enter2-4 = "드디어 여기까지 왔어요… 아트라하시스의 방주 에서의 결전이에요!"
0-CVGroup_UIEventLobby_Idle1-6 = "마지막까지 서포트 할게요!"
0-CVGroup_UIEventLobby_Idle2-6 = "네… 저도 힘낼게요!"
0-CVGroup_UIEventShop_Enter1-3 = "여기서 물자를 보급해 주세요!"
0-CVGroup_UIEventShop_Idle1-4 = "마지막까지 서포트 할게요!"
0-CVGroup_UIEventShop_Idle2-2 = "네… 저도 힘낼게요!"
0-CVGroup_UIEventShop_Buy1-3 = "이것 말씀이시군요, 선생님."
0-CVGroup_UIEventShop_Buy2-3 = "확인했습니다. 자요!"
0-CVGroup_UIEventLobby_Enter1-6 = "어서 오십시오, 선생님.\n이곳에서 D.U.의 시라토리구 복구 작업을 진행하고 있습니다."
0-CVGroup_UIEventLobby_Enter2-5 = "여기는 D.U.의 시라토리구입니다."
0-CVGroup_UIEventLobby_Enter2-6 = "어느 곳이나 상황은 비슷합니다만, 이곳 역시 복구를 서둘러야겠군요."
0-CVGroup_UIEventLobby_Idle1-7 = "부르셨습니까, 선생님? 그래서, 어떤 용건으로…?"
0-CVGroup_UIEventLobby_Idle2-7 = "많은 학생의 협력 덕택에, 복구는 순조롭군요."
0-CVGroup_UIEventLobby_Idle2-8 = "샬레에 부탁하길 잘했어요."
0-CVGroup_UIEventLobby_Idle3-5 = "…그 모습을 보아하니, 건강은 이제 괜찮으신가 보군요."
0-CVGroup_UIEventLobby_Idle3-6 = "…안심, 했습니다."
0-CVGroup_UIEventLobby_Idle4-3 = "부서진 건물은 다시 지을 수 있지만,"
0-CVGroup_UIEventLobby_Idle4-4 = "잃어버린 건강은 돌아오지 않으니까요."
0-CVGroup_UIEventLobby_Idle4-5 = "결코, 무리하지 마시길."
0-CVGroup_UIEventLobby_Enter3-2 = "복구는 순조롭게 진행되고 있네요."
0-CVGroup_UIEventLobby_Enter3-3 = "이대로라면, 곧 원래 거리 모습으로 돌아오겠지요."
0-CVGroup_UIEventLobby_Enter4-3 = "복구 작업도 끝이 보이네요."
0-CVGroup_UIEventLobby_Enter4-4 = "선생님의 노고에 감사드립니다."
0-CVGroup_UIEventLobby_Enter5-1 = "시라토리구의 복구 작업은 완료되었습니다."
0-CVGroup_UIEventLobby_Enter5-2 = "괜찮으시다면, 함께 현장을 확인해보시겠습니까?"
0-CVGroup_UIEventShop_Enter1-4 = "아, 선생. 어서 와."
0-CVGroup_UIEventShop_Enter1-5 = "남은 자재, 회수할게~"
0-CVGroup_UIEventShop_Enter2-2 = "(와작) 우물우물…"
0-CVGroup_UIEventShop_Enter2-3 = "응? 선생이잖아?"
0-CVGroup_UIEventShop_Enter2-4 = "후후, 혹시 선생도 땡땡이?"
0-CVGroup_UIEventShop_Idle1-5 = "하아. 도시 복구라니, 귀찮아…"
0-CVGroup_UIEventShop_Idle1-6 = "D.U.의 건물이 모두 과자집이라면 좋을 텐데."
0-CVGroup_UIEventShop_Idle1-7 = "그렇다면 언제라도 명란 맛을…!"
0-CVGroup_UIEventShop_Idle2-3 = "이렇게 바쁜 건 태어나서 처음이야…."
0-CVGroup_UIEventShop_Idle2-4 = "그래도 뭐, 신세진 것도 있고, 가끔은 몸을 움직이는 것도 나쁘지 않으니까."
0-CVGroup_UIEventShop_Buy1-4 = "그게 필요해?"
0-CVGroup_UIEventShop_Buy1-5 = "좋아. 필요한만큼 가져가."
0-CVGroup_UIEventShop_Buy2-4 = "그거, 나도 눈여겨 보던 건데~."
0-CVGroup_UIEventShop_Buy3-3 = "자, 자. 가져가도 좋아. 다음에 또 와~."
0-CVGroup_UIEventShop_Buy4-3 = "필요한 게 있으면, 알아서 바꿔 가~."
0-CVGroup_UIEventShop_Buy4-4 = "아, 장부에 적는 건 잊지 말고."
0-CVGroup_UIEventMission_Enter1-3 = "아, 안녕하세요. 선생님."
0-CVGroup_UIEventMission_Enter1-4 = "오늘도 서로, 힘내요…."
0-CVGroup_UIEventMission_Enter2-2 = "복구 작업, 계획대로 진행되면 좋겠네요."
0-CVGroup_UIEventMission_Enter2-3 = "선생님이 계시니까, 걱정할 건 없지만요."
0-CVGroup_UIEventMission_Idle1-2 = "작업 자재가 여기저기에…."
0-CVGroup_UIEventMission_Idle1-3 = "선생님도 발밑을 조심하세요."
0-CVGroup_UIEventMission_Idle2-3 = "요즘 린 선배는, 특히 무리하고 있는 것 같아서…."
0-CVGroup_UIEventMission_Idle2-4 = "조금 걱정이네요."
0-CVGroup_UIEventMission_Buy1-4 = "버, 벌써 끝내셨나요? 역시 선생님이세요!"
0-CVGroup_UIEventMission_Buy2-3 = "수고하셨습니다, 선생님! 사소한 것이지만, 총학생회가 드리는 답례입니다…!"
0-CVGroup_UIEventMission_Interaction1-1 = "오늘의 업무는, 이것으로 끝이네요."
0-CVGroup_UIEventMission_Interaction1-2 = "수고하셨어요. 내일도… 잘 부탁드리겠습니다!"

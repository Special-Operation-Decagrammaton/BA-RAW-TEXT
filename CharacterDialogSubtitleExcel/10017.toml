[translation]
10017-CVGroup_UITitle_Idle1-1 = "블루 아카이브~! ...어라?"
10017-CVGroup_CharacterGet_Idle1-1 = "붉은겨울 학원 서기장의 행차다! 영광으로 알도록, 콤라드!"
10017-CVGroup_Cafe_Idle1-1 = "음, 좋아좋아. 서기장은 만족했다."
10017-CVGroup_Cafe_Idle2-1 = "음, 별 이상 없군."
10017-CVGroup_Cafe_Idle3-1 = "에헴. 이 몸의 행차시다."
10017-CVGroup_Cafe_Idle4-1 = "오늘도 평화롭군. 좋아. 이게 다 이 몸의 덕인 거야!"
10017-CVGroup_Cafe_Idle5-1 = "(수염… 잘 붙어있지?)"
10017-CVGroup_WeaponGet_Idle1-1 = "아주 마음에 들어… 이것이야말로 나의 권위 나의 힘! 그리고 나의 수염!\n이제는 두려워질 정도로군…\n하지만 걱정하지 말게, 콤라드. 이 몸은 언제나 그대의 편이니까!"
10017-CVGroup_UIEventLobby_Enter1-1 = "지금부터 숙청을 시작한다!"
10017-CVGroup_UIEventLobby_Enter2-1 = "후후, 혁명의 시간이다!"
10017-CVGroup_UIEventLobby_Idle1-1 = "이번 이반 쿠팔라 축제도 아주 기대가 되는군!"
10017-CVGroup_UIEventLobby_Idle2-1 = "음? 내 도움이 필요한가, 콤라드?"
10017-CVGroup_UIEventLobby_Idle3-1 = "수염의 권위를 의심하는 불순한 학생들이 아직도 남아있다니…."
10017-CVGroup_UIEventLobby_Idle3-2 = "모두 숙청이야, 숙청!"
10017-CVGroup_UIEventLobby_Idle4-1 = "이번 이반 쿠팔라를 위해 커다랗고… 어, 그리고…"
10017-CVGroup_UIEventLobby_Idle4-2 = "엄청나게 커다란 푸딩을 준비했다네!"
10017-CVGroup_UIEventLobby_Idle4-3 = "숙청이 끝나면 다 같이 나누어 먹도록 하지."

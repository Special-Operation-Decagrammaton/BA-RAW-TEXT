[translation]
10072-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT 2, mission preparation completed. Remember your training, even at sea!"
10072-CVGroup_Cafe_Idle1-1 = "(This outfit really is uncomfortable to move around in, especially indoors...)"
10072-CVGroup_Cafe_Idle2-1 = "(Is...that edible...?)"
10072-CVGroup_Cafe_Idle3-1 = "Dressing like this for the next mission might not be a bad idea."
10072-CVGroup_Cafe_Idle4-1 = "Could that be...the weapon I saw in the manual...?"
10072-CVGroup_Cafe_Idle5-1 = "Nothing to report! Continue patrol!"
10072-CVGroup_WeaponGet_Idle1-1 = "RABBIT Type 26 Machine Gun, acquired. Fully waterproofed, this baby won't malfunction even on the high seas. Of course, I still need to clean and oil it after every battle..."
10072-CVGroup_UIEventLobby_Enter1-1 = "RABBIT Squad's first away mission... I'm getting excited."
10072-CVGroup_UIEventLobby_Enter2-1 = "This is a chance for SRT to show our stuff!"
10072-CVGroup_UIEventLobby_Enter3-1 = "There's something...suspicious about this town. They're hiding something..."
10072-CVGroup_UIEventLobby_Enter4-1 = "I really don't wanna help those jerks! Ugh."
10072-CVGroup_UIEventLobby_Enter4-2 = "But providing assistance to civilians is part of SRT's duties."
10072-CVGroup_UIEventLobby_Enter5-1 = "I'm glad the misunderstanding has been resolved. Now, there's no need to worry about a lack of shrimp."
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT 2, preparations completed! We can enter at any time!"
10072-CVGroup_UIEventLobby_Idle2-1 = "Well, I tried to dress like a normal tourist..."
10072-CVGroup_UIEventLobby_Idle2-2 = "I don't look suspicious... Do I?"
10072-CVGroup_UIEventLobby_Idle3-1 = "Hey... Sensei, is there something on my stomach?"
10072-CVGroup_UIEventLobby_Idle4-1 = "I don't personally like seafood much. It's too difficult to preserve."
10072-CVGroup_UIEventLobby_Idle4-2 = "I do like dried seafood though, like dried squid!"

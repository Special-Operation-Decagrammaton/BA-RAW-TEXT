[translation]
10072-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT2，作戰準備完畢。\n就算是在海邊，也不能疏忽警戒任務哦！"
10072-CVGroup_Cafe_Idle1-1 = "（果然穿成這樣，在室內不太方便行動呢…）"
10072-CVGroup_Cafe_Idle2-1 = "（那東西…真的可以吃嗎…？）"
10072-CVGroup_Cafe_Idle3-1 = "下次作戰的時候…\n穿成那個樣子，說不定也不錯。"
10072-CVGroup_Cafe_Idle4-1 = "那該不會…是只有在教戰手冊裡看過那個武器…？"
10072-CVGroup_Cafe_Idle5-1 = "偵察中，沒有異常。"
10072-CVGroup_WeaponGet_Idle1-1 = "RABBIT26式機關槍，我確實收到了。\n為了避免在水中損壞，也做好了完善的防水處理。\n當然，在戰鬥結束之後還是得仔細整備才行…"
10072-CVGroup_UIEventLobby_Enter1-1 = "RABBIT小隊首次的遠征作戰啊……心情有點興奮。"
10072-CVGroup_UIEventLobby_Enter2-1 = "現在正是我們SRT出馬的時候！"
10072-CVGroup_UIEventLobby_Enter3-1 = "真可疑……這個村子絕對有什麼問題。"
10072-CVGroup_UIEventLobby_Enter4-1 = "雖然不是很想支援那些討人厭的居民……"
10072-CVGroup_UIEventLobby_Enter4-2 = "不過市民的協助也是特殊部隊的工作啊。"
10072-CVGroup_UIEventLobby_Enter5-1 = "幸好解開了誤會。\n這樣蝦子不足的問題也解除了呢。"
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT2，準備完畢！\n隨時都能出發！"
10072-CVGroup_UIEventLobby_Idle2-1 = "我姑且也打扮得像普通的觀光客一樣了……"
10072-CVGroup_UIEventLobby_Idle2-2 = "看起來……應該不會很奇怪吧？"
10072-CVGroup_UIEventLobby_Idle3-1 = "那個……老師，我的肚子上沾到什麼東西了嗎？"
10072-CVGroup_UIEventLobby_Idle4-1 = "我，其實不是很喜歡海產。\n因為很難保存。"
10072-CVGroup_UIEventLobby_Idle4-2 = "啊啊不過，像魷魚乾之類的乾貨的話……我也很喜歡！"

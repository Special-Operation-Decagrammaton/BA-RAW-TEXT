[translation]
10072-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT 2 เตรียมพร้อมปฏิบัติการ\nจะประมาทเรื่องภารกิจเฝ้าระวังทางทะเลไม่ได้เด็ดขาด!"
10072-CVGroup_Cafe_Idle1-1 = "(ว่าแล้วเชียวชุดนี้... ใส่ในอาคารแล้วเคลื่อนไหว\nไม่สะดวกจริงๆ ด้วย...)"
10072-CVGroup_Cafe_Idle2-1 = "(อันนั้น... กินได้รึเปล่านะ...?)"
10072-CVGroup_Cafe_Idle3-1 = "ปฏิบัติการครั้งหน้า... ใส่ชุดแบบนั้นดูบ้างก็คงไม่แย่..."
10072-CVGroup_Cafe_Idle4-1 = "อย่าบอกนะว่า... นั่นเป็นอาวุธ... ที่เคยเห็นในคู่มือน่ะ?"
10072-CVGroup_Cafe_Idle5-1 = "อยู่ระหว่างลาดตระเวน ไม่พบสิ่งผิดปกติ"
10072-CVGroup_WeaponGet_Idle1-1 = "ได้รับ RABBIT Type 26 Machine Gun เรียบร้อยแล้ว\nเตรียมอุปกรณ์กันน้ำไม่ให้เกิดชำรุดตอนลงน้ำไว้เรียบร้อย\nถึงจะต้องเช็ดทำความสะอาดตอนที่ต่อสู้เสร็จแล้วก็เถอะ..."
10072-CVGroup_UIEventLobby_Enter1-1 = "อาจเพราะนี่เป็นการเดินทางไกลเพื่อออกปฏิบัติการครั้งแรก...\nก็เลยตื่นเต้นนิดหน่อยน่ะ"
10072-CVGroup_UIEventLobby_Enter2-1 = "คราวนี้ถึงเวลาออกโรงของ SRT แล้ว!"
10072-CVGroup_UIEventLobby_Enter3-1 = "แปลกจัง... หมู่บ้านนี้จะต้องมีอะไรซ่อนอยู่แน่ๆ..."
10072-CVGroup_UIEventLobby_Enter4-1 = "ถึงฉันจะไม่อยากไปช่วยพวกชาวบ้านที่ไม่เป็นมิตรนั่นเลยก็เถอะ..."
10072-CVGroup_UIEventLobby_Enter4-2 = "แต่การช่วยเหลือพลเมืองก็เป็นภารกิจอย่างหนึ่ง\nของหน่วยรบพิเศษเหมือนกัน"
10072-CVGroup_UIEventLobby_Enter5-1 = "ค่อยยังชั่วหน่อยที่คลายความเข้าใจผิดได้\nคราวนี้ก็ไม่ต้องกังวลเรื่องมีกุ้งไม่พอแล้วละ"
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT 2 เตรียมพร้อม! พร้อมเข้าปฏิบัติการทุกเมื่อ!"
10072-CVGroup_UIEventLobby_Idle2-1 = "อืม ตอนนี้ก็เปลี่ยนมาใส่ชุดธรรมดาเหมือนกับ\nนักท่องเที่ยวคนหนึ่งแล้ว..."
10072-CVGroup_UIEventLobby_Idle2-2 = "ไม่ได้ดูแปลกๆ ใช่รึเปล่า?"
10072-CVGroup_UIEventLobby_Idle3-1 = "นี่... คุณครู ที่หน้าท้องของฉันมีอะไรติดอยู่รึไง?"
10072-CVGroup_UIEventLobby_Idle4-1 = "ส่วนตัวแล้วฉันไม่ได้ชอบอาหารทะเลขนาดนั้นหรอก\nมันเก็บรักษายากน่ะ"
10072-CVGroup_UIEventLobby_Idle4-2 = "ก็นะ ถ้าเป็นพวกปลาหมึกตากแห้งละก็... ฉันเองก็ชอบเหมือนกัน!"

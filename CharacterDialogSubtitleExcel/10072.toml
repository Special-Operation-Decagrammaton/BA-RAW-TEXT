[translation]
10072-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT 2, 작전 준비 완료.\n바다에서도 경계 임무는 소홀히 할 수 없지!"
10072-CVGroup_Cafe_Idle1-1 = "(역시 실내에서 이 차림은 조금 움직이기 불편하네…)"
10072-CVGroup_Cafe_Idle2-1 = "(저건… 먹을 수 있으려나…?)"
10072-CVGroup_Cafe_Idle3-1 = "다음 작전에는… 저런 차림을 하는 것도 나쁘지 않겠네."
10072-CVGroup_Cafe_Idle4-1 = "설마 저건… 교범으로만 확인했던 그 무기…?"
10072-CVGroup_Cafe_Idle5-1 = "정찰 중 이상 없음."
10072-CVGroup_WeaponGet_Idle1-1 = "RABBIT 26식 기관총, 수령 완료.\n물이 들어가도 고장 나지 않도록 방수처리도 완벽히 했어.\n물론 전투가 끝나면 열심히 닦고 기름을 쳐야겠지만…"
10072-CVGroup_UIEventLobby_Enter1-1 = "RABBIT 소대의 첫 원정 작전인가…… 살짝 가슴이 두근거리는걸."
10072-CVGroup_UIEventLobby_Enter2-1 = "이번에야말로, 우리 SRT가 나설 차례라고!"
10072-CVGroup_UIEventLobby_Enter3-1 = "수상해…… 이 마을, 무조건 뭔가 숨기고 있어……"
10072-CVGroup_UIEventLobby_Enter4-1 = "저 불친절한 주민들을 돕는 건 영 내키지 않지만……"
10072-CVGroup_UIEventLobby_Enter4-2 = "대민 지원 업무도 특수부대 활동의 일환이니까."
10072-CVGroup_UIEventLobby_Enter5-1 = "오해가 잘 풀려서 다행이네. 이제 새우가 부족할 걱정은 할 필요 없겠어."
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT 2, 준비 완료! 언제든지 들어갈 수 있어!"
10072-CVGroup_UIEventLobby_Idle2-1 = "음, 일단은 평범한 관광객처럼 차려입어 보았는데……"
10072-CVGroup_UIEventLobby_Idle2-2 = "수상해 보이진…… 않겠지?"
10072-CVGroup_UIEventLobby_Idle3-1 = "저기…… 선생님, 내 배에 뭐라도 묻었어?"
10072-CVGroup_UIEventLobby_Idle4-1 = "사실 개인적으로 해산물은 그다지 좋아하지 않아. 보존이 까다로우니까."
10072-CVGroup_UIEventLobby_Idle4-2 = "뭐, 말린 오징어 같은 건어물이라면…… 나도 좋아해!"

[translation]
10040-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
10040-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะ... โอโนะ สึคุโยะค่ะ...\nนะ...ในฐานะสมาชิกชมรมวิจัยศาสตร์นินจา\nขะ...ขอฝากตัว... ด้วยนะคะ..."
10040-CVGroup_Cafe_Idle1-1 = "(ฉันคือต้นไม้... ฉันคือต้นไม้ธรรมดาๆ ค่ะ...) "
10040-CVGroup_Cafe_Idle2-1 = "(เพราะฉันดูเหมือน... เฟอร์นิเจอร์ธรรมดาๆ ค่ะ)"
10040-CVGroup_Cafe_Idle3-1 = "(ถ้าฉันกลายเป็นเหมือนเฟอร์นิเจอร์ได้จริงๆ ก็คงดี... น่าอิจฉาจัง...)"
10040-CVGroup_Cafe_Idle4-1 = "อ๊ะ ขอโทษด้วยค่ะ... ฉันบังคุณครูใช่มั้ยคะ...?"
10040-CVGroup_Cafe_Idle5-1 = "ไม่รู้ว่าทำไมถึงรู้สึกเหมือน... มีใครจ้องมองอยู่..."
10040-CVGroup_WeaponGet_Idle1-1 = "ของล้ำค่าแบบนี้ ให้ฉันรับไว้ได้เหรอคะ...?\nฉันสมควรที่จะได้รับของแบบนี้ด้วยเหรอคะ...?\nฉันมีสิทธิ์รับได้เหรอคะ? ขอบคุณค่ะ คุณครู\nฉันจะตั้งใจ...ฝึกฝนต่อไปค่ะ เพื่อคุณครู...!"
10040-CVGroup_UIEventLobby_Enter1-1 = "ชมรมวิจัยศาสตร์นินจาออกปฏิบัติการค่ะ...!"
10040-CVGroup_UIEventLobby_Enter1-2 = "ไม่ว่ายังไงก็คง... ทำได้ใช่มั้ย...คะ?"
10040-CVGroup_UIEventLobby_Enter2-1 = "เรื่องพวกนี้พวกเราจะแก้ไขเองค่ะ!"
10040-CVGroup_UIEventLobby_Enter2-2 = "ตะ...ตอนนี้เราตกลงว่าจะทำแบบนั้นค่ะ...?"
10040-CVGroup_UIEventLobby_Enter3-1 = "ตะ...แต่ว่าดูเหมือนจะแก้ไขไม่ได้ง่ายๆ เลยนะคะ...\nฉันจะพยายามค่ะ...!"
10040-CVGroup_UIEventLobby_Enter4-1 = "ดูเหมือนจะเรียบร้อย... แล้วนะคะ..."
10040-CVGroup_UIEventLobby_Enter4-2 = "นี่ก็เพราะได้ทุกคน... กับคุณครูช่วยเอาไว้ค่ะ"
10040-CVGroup_UIEventLobby_Enter5-1 = "ขอบคุณมากค่ะ คุณครู ฉัน... พอช่วยคุณครู... ได้บ้างรึเปล่าคะ...?"
10040-CVGroup_UIEventLobby_Idle1-1 = "ขะ...ขอโทษค่ะที่ตัวโตแบบนี้..."
10040-CVGroup_UIEventLobby_Idle2-1 = "ทำไมถึงเป็นแบบนี้..."
10040-CVGroup_UIEventLobby_Idle3-1 = "เป็นเรื่องที่ชมรมวิจัยศาสตร์นินจาจะต้องแก้ไขค่ะ... อาจจะนะ..."
10040-CVGroup_UIEventLobby_Idle4-1 = "ฉันอาจจะทำได้ดีก็ได้... ค่ะ"
10040-CVGroup_UIEventShop_Enter1-1 = "อุปกรณ์นินจาและอื่นๆ ก็เตรียมมาพร้อมหมดแล้ว เชิญเลือกดูได้เลยค่ะ..."
10040-CVGroup_UIEventShop_Enter2-1 = "ถ้าต้องการอะไร แล้วพวกเราช่วยได้ก็คงดีนะคะ..."
10040-CVGroup_UIEventShop_Enter3-1 = "คลี่คลายเหตุการณ์ได้แล้วก็จริง...\nถ้าสนใจอะไรละก็... ตอนนี้ยังไม่สายไปนะคะ..."
10040-CVGroup_UIEventShop_Idle1-1 = "อา... คือว่าตัวฉัน... ไม่ใช่สินค้าที่วางขายนะคะ..."
10040-CVGroup_UIEventShop_Idle2-1 = "คือว่าฉันเกะกะหรือเปล่าคะ?\nขอโทษด้วยค่ะ ฉันจะหลีกทางให้ค่ะ..."
10040-CVGroup_UIEventShop_Buy1-1 = "ค่ะ ฉันว่ามันเป็นอุปกรณ์นินจาที่ยอดเยี่ยมมากเลยค่ะ...!"
10040-CVGroup_UIEventShop_Buy2-1 = "ถ้าฉันเป็นประโยชน์ให้คุณครูได้สักนิดคงดีค่ะ..."
10040-CVGroup_UIEventShop_Buy3-1 = "ขอบคุณค่ะ คุณครู"
10040-CVGroup_UIEventShop_Buy4-1 = "อย่างนี้นี่เอง ของชิ้นนั้น แล้วก็ชิ้นนี้... สมกับเป็นคุณครูจริงๆ เลยค่ะ!"

[translation]
10040-CVGroup_UITitle_Idle1-1 = "브, 블루, 아, 아카이브으…."
10040-CVGroup_CharacterGet_Idle1-1 = "안녕하세요…. 오노 츠쿠요, 입니다아…….\n일단, 인법연구부의 부원으로…… 잘, 부탁드려요오……."
10040-CVGroup_Cafe_Idle1-1 = "(저는 나무…. 저는 평범한 나무예요…….)"
10040-CVGroup_Cafe_Idle2-1 = "(저는 배경……. 저는, 가구, 같은 거니까요….)"
10040-CVGroup_Cafe_Idle3-1 = "(차라리, 저 가구 처럼 될 수 있다면 ……. 부럽다아.)"
10040-CVGroup_Cafe_Idle4-1 = "아, 죄송합니다……. 방해, 되지요……?"
10040-CVGroup_Cafe_Idle5-1 = "왠지, 눈에 띄는 거 같은 느낌이……"
10040-CVGroup_WeaponGet_Idle1-1 = "이렇게 대단한 물건을, 제가, 받아도 될까요……?\n제게는 그런, 자격이, 이, 있을까요……? 충분, 하다고요?\n……감사합니다. 선생님. 계속해서, 정진, 하겠어요. 선생님을, 위해서……!"
10040-CVGroup_UIEventLobby_Enter1-1 = "인법연구부, 출동이에요…!"
10040-CVGroup_UIEventLobby_Enter1-2 = "분명, 어떻게든, 되겠……죠?"
10040-CVGroup_UIEventLobby_Enter2-1 = "이 사건은 저희가 해결합니다!"
10040-CVGroup_UIEventLobby_Enter2-2 = "지, 지금 그렇게 하기로 해, 했으니까요…?"
10040-CVGroup_UIEventLobby_Enter3-1 = "간단하게는, 해결되지 않을 것, 같네요…. 힘낼, 게요…!"
10040-CVGroup_UIEventLobby_Enter4-1 = "슬슬, 마무리될 것 같은, 느낌이……."
10040-CVGroup_UIEventLobby_Enter4-2 = "이것도 모두와, 선생님 덕분, 이에요……."
10040-CVGroup_UIEventLobby_Enter5-1 = "수고하셨습니다. 선생님. 저…. 조금은 도움이, 되었을까요……?"
10040-CVGroup_UIEventLobby_Idle1-1 = "커, 커다랗기만 해서 죄송해요오……"
10040-CVGroup_UIEventLobby_Idle2-1 = "어째서 이런 일이……"
10040-CVGroup_UIEventLobby_Idle3-1 = "인법연구부가 해결할, 거예요…. 아마도……."
10040-CVGroup_UIEventLobby_Idle4-1 = "자, 잘할 수 있을, 까요, 제가……"
10040-CVGroup_UIEventShop_Enter1-1 = "닌자도구 등, 여러 가지를 준비했으니까…. 골라 보세요…."
10040-CVGroup_UIEventShop_Enter2-1 = "무언가 필요하시다면, 이쪽에서. 도움이 된다면, 좋겠는데요……."
10040-CVGroup_UIEventShop_Enter3-1 = "사건은 무사히, 끝났지만…….\n뭔가, 신경 쓰이신다면, 네. 아직, 늦지 않았으니까요……."
10040-CVGroup_UIEventShop_Idle1-1 = "아…. 저기, 저는 그게, 파는 물건이 아니라……."
10040-CVGroup_UIEventShop_Idle2-1 = "혹시, 방해, 되나요? 죄송합니다. 비켜 있을게요……."
10040-CVGroup_UIEventShop_Buy1-1 = "네, 훌륭한 닌자도구라고, 생각해요…!"
10040-CVGroup_UIEventShop_Buy2-1 = "조금이라도, 도움이 되었으면…."
10040-CVGroup_UIEventShop_Buy3-1 = "감사, 합니다, 선생님."
10040-CVGroup_UIEventShop_Buy4-1 = "과연, 그거랑, 그거랑……. 역시, 선생님, 이시네요!"

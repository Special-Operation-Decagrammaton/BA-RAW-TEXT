[translation]
10040-CVGroup_UITitle_Idle1-1 = "B-Blue...A-Archive..."
10040-CVGroup_CharacterGet_Idle1-1 = "Hello, I'm Ono Tsukuyo... I'm a member of the Ninjutsu Research Club... Nice to meet you..."
10040-CVGroup_Cafe_Idle1-1 = "(I'm a tree...just an ordinary tree...)"
10040-CVGroup_Cafe_Idle2-1 = "(I'm a part of the background...like...a piece of furniture...)"
10040-CVGroup_Cafe_Idle3-1 = "(I wish I could turn into a piece of furniture like that...)"
10040-CVGroup_Cafe_Idle4-1 = "Oh, I'm sorry... Am I in your way?"
10040-CVGroup_Cafe_Idle5-1 = "I feel like I stand out for some reason..."
10040-CVGroup_WeaponGet_Idle1-1 = "Are you sure you want to give this to me? Do I deserve this? Y-Yes? Really? Thank you, Sensei. I'll do my best to make you proud!"
10040-CVGroup_UIEventLobby_Enter1-1 = "Let's go, Ninjutsu Research Club!"
10040-CVGroup_UIEventLobby_Enter1-2 = "I'm sure we'll figure it out, right...?"
10040-CVGroup_UIEventLobby_Enter2-1 = "We'll solve this incident!"
10040-CVGroup_UIEventLobby_Enter2-2 = "B-Because we decided to do so...?"
10040-CVGroup_UIEventLobby_Enter3-1 = "I guess it's not gonna be that simple to resolve... I'll try my best!"
10040-CVGroup_UIEventLobby_Enter4-1 = "I think it's about over..."
10040-CVGroup_UIEventLobby_Enter4-2 = "I couldn't have done it without everyone, and Sensei..."
10040-CVGroup_UIEventLobby_Enter5-1 = "Thanks for the hard work. Sensei, was I able to help you, at least a little?"
10040-CVGroup_UIEventLobby_Idle1-1 = "I feel like I'm just a tall girl who can't do much..."
10040-CVGroup_UIEventLobby_Idle2-1 = "Why is this happening...?"
10040-CVGroup_UIEventLobby_Idle3-1 = "I'm sure the Ninjutsu Research Club can handle it...maybe..."
10040-CVGroup_UIEventLobby_Idle4-1 = "D-Do you think I can do it?"
10040-CVGroup_UIEventShop_Enter1-1 = "I have ninja tools and many other things. Pick what you want..."
10040-CVGroup_UIEventShop_Enter2-1 = "If you need something, I'd like to help you..."
10040-CVGroup_UIEventShop_Enter3-1 = "The incident was resolved...but if you still have concerns, it's not too late..."
10040-CVGroup_UIEventShop_Idle1-1 = "Oh, um, so...I'm not for sale..."
10040-CVGroup_UIEventShop_Idle2-1 = "Am I interrupting you? I'm sorry. I'll get out of your way..."
10040-CVGroup_UIEventShop_Buy1-1 = "Yes, I think it's an excellent ninja tool!"
10040-CVGroup_UIEventShop_Buy2-1 = "I just want to be helpful, even if it's just a bit..."
10040-CVGroup_UIEventShop_Buy3-1 = "Thank you, Sensei."
10040-CVGroup_UIEventShop_Buy4-1 = "So you picked those... Good choice, Sensei!"

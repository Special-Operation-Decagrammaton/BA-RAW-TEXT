[translation]
10040-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍……檔，檔案……"
10040-CVGroup_CharacterGet_Idle1-1 = "您好……我是，大野月夜……\n姑且是，忍術研究部的部員……\n請多多，指教……"
10040-CVGroup_Cafe_Idle1-1 = "（我是樹……我只是棵樹……）"
10040-CVGroup_Cafe_Idle2-1 = "（我是背景……我是，一件家具……）"
10040-CVGroup_Cafe_Idle3-1 = "（乾脆，變得像那個家具一樣的話……好羨慕）"
10040-CVGroup_Cafe_Idle4-1 = "啊，非常抱歉……\n很礙事，對吧……？"
10040-CVGroup_Cafe_Idle5-1 = "總覺得，\n似乎受到了注目……"
10040-CVGroup_WeaponGet_Idle1-1 = "這麼厲害的東西，我，收下也可以……？\n我有那種，資格，嗎……？足夠了，是嗎？\n……謝謝您，老師。我會，繼續，精進的。為了，老師……！"
10040-CVGroup_UIEventLobby_Enter1-1 = "忍術研究部，出動了……！"
10040-CVGroup_UIEventLobby_Enter1-2 = "肯定會有辦法的……對吧？"
10040-CVGroup_UIEventLobby_Enter2-1 = "這個事件，就由我們來解決……！"
10040-CVGroup_UIEventLobby_Enter2-2 = "剛才那樣就決定了嗎……！"
10040-CVGroup_UIEventLobby_Enter3-1 = "看來，沒辦法輕鬆解決呢……我會，加油的……！"
10040-CVGroup_UIEventLobby_Enter4-1 = "感覺好像，差不多平靜下來了……"
10040-CVGroup_UIEventLobby_Enter4-2 = "這也是託大家和老師的福……"
10040-CVGroup_UIEventLobby_Enter5-1 = "辛苦了，老師。\n我……有多少幫上一點忙嗎……？"
10040-CVGroup_UIEventLobby_Idle1-1 = "長得高大真是抱歉……"
10040-CVGroup_UIEventLobby_Idle2-1 = "為什麼事情會變成這樣……"
10040-CVGroup_UIEventLobby_Idle3-1 = "忍術研究部會解決給你看的……大概……"
10040-CVGroup_UIEventLobby_Idle4-1 = "有什麼，我能做的嗎……"
10040-CVGroup_UIEventShop_Enter1-1 = "忍具等等的物品，我準備了很多……請看。"
10040-CVGroup_UIEventShop_Enter2-1 = "有什麼需要的話，請來這裡。\n如果能幫上忙就好了……"
10040-CVGroup_UIEventShop_Enter3-1 = "事件雖然順利結束了……如果，還有什麼在意的事，嗯。\n現在，還來的及……"
10040-CVGroup_UIEventShop_Idle1-1 = "……？呃，我，那個，並不是商品……"
10040-CVGroup_UIEventShop_Idle2-1 = "難道，我很，礙事嗎？\n對不起，我馬上讓開……"
10040-CVGroup_UIEventShop_Buy1-1 = "是，我覺得是很棒的忍具……！"
10040-CVGroup_UIEventShop_Buy2-1 = "希望多少能幫上一些忙……"
10040-CVGroup_UIEventShop_Buy3-1 = "謝謝你，老師。"
10040-CVGroup_UIEventShop_Buy4-1 = "原來如此，還有，還有……\n不愧是老師，的說！"

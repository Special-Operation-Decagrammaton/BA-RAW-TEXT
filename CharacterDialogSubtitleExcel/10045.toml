[translation]
10045-CVGroup_UITitle_Idle1-1 = "블루~아카이브."
10045-CVGroup_CharacterGet_Idle1-1 = "후아아~. ……아, 선생~. 모처럼이니까, 느긋하게 가자고~."
10045-CVGroup_Cafe_Idle1-1 = "흐뭇한 광경이네~ 뭐, 여유가 있는 것은 좋은 거지."
10045-CVGroup_Cafe_Idle2-1 = "자아-, 어디, 누울 만한 곳은…."
10045-CVGroup_Cafe_Idle3-1 = "어딘가 편하게 쉴만한 곳이…."
10045-CVGroup_Cafe_Idle4-1 = "…오 좋아 보이네?"
10045-CVGroup_Cafe_Idle5-1 = "이게 뭐지…?"
10045-CVGroup_WeaponGet_Idle1-1 = "여기까지 해주는 건가……. 정말이지, 이상하다니까 선생님도.\n뭐, 괜찮지만……. 자 그럼 나도 지금보다 더 열심히 해야겠지?"
10045-CVGroup_UIEventLobby_Enter1-1 = "오~, 선생. 수고수고~."
10045-CVGroup_UIEventLobby_Enter2-1 = "더워…… 더워서 말라버릴 것 같아……."
10045-CVGroup_UIEventLobby_Enter2-2 = "가만히 있는데도 더워~"
10045-CVGroup_UIEventLobby_Idle1-1 = "선생~. 아저씨한테 신경 써도 되는 거야?"
10045-CVGroup_UIEventLobby_Idle1-2 = "혼날 거라고?"
10045-CVGroup_UIEventLobby_Idle2-1 = "으응……. 그렇게 찔러 대도, 아저씨한테서는 아무것도 안 나와……."
10045-CVGroup_UIEventLobby_Idle3-1 = "혹시 선생도 지쳤어?"
10045-CVGroup_UIEventLobby_Idle3-2 = "그러면 같이 저쪽에서 한숨 잘까?"
10045-CVGroup_UIEventLobby_Idle4-1 = "졸~려어~~~."
10045-CVGroup_UIEventLobby_Enter3-1 = "슬슬 움직여야 할까…?"
10045-CVGroup_UIEventLobby_Enter3-2 = "으헤ー , 귀찮구만…."
10045-CVGroup_UIEventLobby_Enter4-1 = "이제 그다지 시간도 없는 것 같고, 슬슬 움직여볼까~"
10045-CVGroup_UIEventLobby_Enter5-1 = "선생, 아직도 할 일이 남은 거야?"
10045-CVGroup_UIEventLobby_Enter5-2 = "어쩔 수 없네. 아저씨가 도와줄게."

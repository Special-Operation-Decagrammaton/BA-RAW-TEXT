[translation]
10045-CVGroup_UITitle_Idle1-1 = "蔚藍～檔案。"
10045-CVGroup_CharacterGet_Idle1-1 = "呼啊～啊，老師～\n機會難得，悠哉一點吧～"
10045-CVGroup_Cafe_Idle1-1 = "真是讓人欣慰的景象呢…嘛，有餘裕是件好事。"
10045-CVGroup_Cafe_Idle2-1 = "那～麼，有可以躺下的地方嗎…"
10045-CVGroup_Cafe_Idle3-1 = "有沒有比較寬敞的地方…"
10045-CVGroup_Cafe_Idle4-1 = "…哦，看起來不錯呢？"
10045-CVGroup_Cafe_Idle5-1 = "這是什麼…？"
10045-CVGroup_WeaponGet_Idle1-1 = "居然幫我到這種地步……老師也是個怪人呢。\n雖然沒關係…那麼我也得比之前更努力才行對吧？"
10045-CVGroup_UIEventLobby_Enter1-1 = "呀～老師，辛苦了～"
10045-CVGroup_UIEventLobby_Enter2-1 = "好熱……熱到感覺要被曬乾了……"
10045-CVGroup_UIEventLobby_Enter2-2 = "明明沒有動卻好熱唷～"
10045-CVGroup_UIEventLobby_Idle1-1 = "老師～來找大叔沒關係嗎？"
10045-CVGroup_UIEventLobby_Idle1-2 = "會被罵的唷？"
10045-CVGroup_UIEventLobby_Idle2-1 = "唔嗯……就算那樣戳，大叔身上也什麼都不會跑出來哦……"
10045-CVGroup_UIEventLobby_Idle3-1 = "難道說，老師也累了嗎？"
10045-CVGroup_UIEventLobby_Idle3-2 = "那要一起在那邊睡一覺嗎？"
10045-CVGroup_UIEventLobby_Idle4-1 = "好～睏……"
10045-CVGroup_UIEventLobby_Enter3-1 = "差不多得出發了？"
10045-CVGroup_UIEventLobby_Enter3-2 = "唔嘿～好麻煩啊……"
10045-CVGroup_UIEventLobby_Enter4-1 = "好像已經沒剩多少時間了，差不多該動起來了～"
10045-CVGroup_UIEventLobby_Enter5-1 = "老師，還有什麼事沒做嗎？"
10045-CVGroup_UIEventLobby_Enter5-2 = "真沒辦法呢～讓大叔來幫你吧。"

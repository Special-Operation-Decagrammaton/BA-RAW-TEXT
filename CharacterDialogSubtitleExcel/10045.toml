[translation]
10045-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10045-CVGroup_CharacterGet_Idle1-1 = "*yawn* Oh, Sensei! We should take it easy on a day like this!"
10045-CVGroup_Cafe_Idle1-1 = "Everyone looks great. Being relaxed is the best."
10045-CVGroup_Cafe_Idle2-1 = "Let's see where I can lie down..."
10045-CVGroup_Cafe_Idle3-1 = "Where's a good spot...?"
10045-CVGroup_Cafe_Idle4-1 = "...Ah! This looks good."
10045-CVGroup_Cafe_Idle5-1 = "What's this...?"
10045-CVGroup_WeaponGet_Idle1-1 = "You'd go this far for me...? Seriously, you're so weird. Well, I guess I don't mind. I should work a little harder!"
10045-CVGroup_UIEventLobby_Enter1-1 = "Oh, Sensei. Great work!"
10045-CVGroup_UIEventLobby_Enter2-1 = "It's so hot! I'm feeling parched in this heat..."
10045-CVGroup_UIEventLobby_Enter2-2 = "It's hot, even when I'm not moving at all..."
10045-CVGroup_UIEventLobby_Idle1-1 = "Sensei! Is it okay if you play hooky with this old-timer?"
10045-CVGroup_UIEventLobby_Idle1-2 = "Really? Won't you get in trouble?"
10045-CVGroup_UIEventLobby_Idle2-1 = "Hahaha... You're not gonna gain anything by doing that!"
10045-CVGroup_UIEventLobby_Idle3-1 = "Are you tired too?"
10045-CVGroup_UIEventLobby_Idle3-2 = "Should we take a nap over there?"
10045-CVGroup_UIEventLobby_Idle4-1 = "I'm sleepy!"
10045-CVGroup_UIEventLobby_Enter3-1 = "Should we get going...?"
10045-CVGroup_UIEventLobby_Enter3-2 = "Heh... I'm feeling lazy..."
10045-CVGroup_UIEventLobby_Enter4-1 = "We don't have a lot of time now. Shall we make our way over? Preferably at a leisurely pace."
10045-CVGroup_UIEventLobby_Enter5-1 = "Sensei, are you still busy?"
10045-CVGroup_UIEventLobby_Enter5-2 = "Ugh... I guess there's no way around it. This old-timer will help you out."

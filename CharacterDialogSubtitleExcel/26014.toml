[translation]
26014-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
26014-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨 카쿠다테 카린, 준비 완료했다.\n…이, 이 복장, 괜찮을까?"
26014-CVGroup_Cafe_Idle1-1 = "어딘가 거울이 있으면 좋을 텐데."
26014-CVGroup_Cafe_Idle2-1 = "조금 한가한데…… 선생님은 언제쯤……."
26014-CVGroup_Cafe_Idle3-1 = "귀여운 가구들이 많군…… 마음에 들어."
26014-CVGroup_Cafe_Idle4-1 = "적의 기척은 없어 보이는군. 경계를 조금 풀어도 되겠어."
26014-CVGroup_Cafe_Idle5-1 = "이 부근의 청소를… …아니, 교복일 때는 그만두자."
26014-CVGroup_WeaponGet_Idle1-1 = "언제, 어디서든, 메이드복이든, 교복이든,\n선생님을 지키는 일이라면 나는 항상 준비돼 있다."
26014-CVGroup_UIEventLobby_Enter1-1 = "아, 안녕. 선생님."
26014-CVGroup_UIEventLobby_Enter1-2 = "……늘 하던 인사와 달라서 어색하네."
26014-CVGroup_UIEventLobby_Enter2-1 = "조금 더 귀여운 인사를……"
26014-CVGroup_UIEventLobby_Enter2-2 = "지, 지금 건 혼잣말이야!"
26014-CVGroup_UIEventLobby_Enter3-1 = "생각보다 정신없는 행사네……"
26014-CVGroup_UIEventLobby_Enter4-1 = "조금만 더 하면 끝이야. 힘내자고, 선생님."
26014-CVGroup_UIEventLobby_Enter5-1 = "벌써 끝이라니."
26014-CVGroup_UIEventLobby_Enter5-2 = "뭔가…… 서운한 기분이네."
26014-CVGroup_UIEventLobby_Idle1-1 = "으, 으응? 왜, 왜 그러지? 시킬 일이라도 있어?"
26014-CVGroup_UIEventLobby_Idle2-1 = "이, 이것은 밀레니엄 지정의 단순한 교복이다만…?"
26014-CVGroup_UIEventLobby_Idle2-2 = "뭔가 이상한 부분이라도 있는 건가?"
26014-CVGroup_UIEventLobby_Idle3-1 = "그…… 선생님."
26014-CVGroup_UIEventLobby_Idle3-2 = "이왕 이런 차림이니,"
26014-CVGroup_UIEventLobby_Idle3-3 = "같이……"
26014-CVGroup_UIEventLobby_Idle4-1 = "……아, 아냐. 역시 아무것도 아니다. 미안."

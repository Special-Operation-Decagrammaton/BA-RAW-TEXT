[translation]
26014-CVGroup_UITitle_Idle1-1 = "Blue Archive"
26014-CVGroup_CharacterGet_Idle1-1 = "คาคุดาเตะ คารินจากโรงเรียนวิทย์มิลเลเนียม พร้อมแล้ว\nชะ... ชุดนี้... โอเคมั้ยนะ?"
26014-CVGroup_Cafe_Idle1-1 = "มีกระจกตรงไหนบ้างมั้ยนะ"
26014-CVGroup_Cafe_Idle2-1 = "เบื่อจังเลย... เมื่อไรคุณครูจะมานะ..."
26014-CVGroup_Cafe_Idle3-1 = "มีเฟอร์นิเจอร์น่ารักๆ เยอะเลยแฮะ... จังเลย"
26014-CVGroup_Cafe_Idle4-1 = "ไม่รู้สึกถึงสัญญาณของศัตรูเลย\nงั้นก็ไม่ต้องระวังตัวมากก็ได้"
26014-CVGroup_Cafe_Idle5-1 = "ทำความสะอาดบริเวณนี้...\nไม่สิ ตอนใส่ชุดนักเรียนไม่ทำดีกว่า"
26014-CVGroup_WeaponGet_Idle1-1 = "ทุกที่ทุกเวลา ไม่ว่าจะชุดเมดหรือชุดนักเรียน\nฉันพร้อมจะปกป้องคุณครูเสมอ"
26014-CVGroup_UIEventLobby_Enter1-1 = "อ้อ สวัสดี คุณครู"
26014-CVGroup_UIEventLobby_Enter1-2 = "ปกติฉันไม่ได้ทักแบบนี้\nก็เลยไม่ค่อยคุ้นน่ะ..."
26014-CVGroup_UIEventLobby_Enter2-1 = "ต้องทักทายให้น่ารักขึ้น..."
26014-CVGroup_UIEventLobby_Enter2-2 = "มะ... เมื่อกี้ ฉันพูดคนเดียวน่ะ!"
26014-CVGroup_UIEventLobby_Enter3-1 = "เป็นงานที่หัวหมุนมากกว่าที่คิดอีกนะ..."
26014-CVGroup_UIEventLobby_Enter4-1 = "ทำต่ออีกนิดก็เสร็จแล้วละ\nสู้เค้านะคุณครู"
26014-CVGroup_UIEventLobby_Enter5-1 = "งานจบแล้วเหรอเนี่ย"
26014-CVGroup_UIEventLobby_Enter5-2 = "รู้สึก... เสียดายแปลกๆ นะ"
26014-CVGroup_UIEventLobby_Idle1-1 = "หะ... หืม? ทะ... ทำไมเหรอ?\nมีอะไรจะสั่งให้ทำเหรอ?"
26014-CVGroup_UIEventLobby_Idle2-1 = "นะ... นี่คือชุดนักเรียนธรรมดาของมิลเลเนียมไง...?"
26014-CVGroup_UIEventLobby_Idle2-2 = "หรือมีส่วนไหนที่แปลกงั้นเหรอ?"
26014-CVGroup_UIEventLobby_Idle3-1 = "เอ่อ... คุณครู"
26014-CVGroup_UIEventLobby_Idle3-2 = "ไหนๆ ฉันก็ใส่ชุดนี้แล้ว"
26014-CVGroup_UIEventLobby_Idle3-3 = "เราไป..."
26014-CVGroup_UIEventLobby_Idle4-1 = "มะ... ไม่ดีกว่า... ไม่มีอะไรทั้งนั้น\nขอโทษนะ"

[translation]
26014-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
26014-CVGroup_CharacterGet_Idle1-1 = "千年科學學園的角楯花凛，準備完成。\n……這，這副打扮，還行嗎？"
26014-CVGroup_Cafe_Idle1-1 = "哪裡有鏡子呢……"
26014-CVGroup_Cafe_Idle2-1 = "有了點時間……老師在哪裡……"
26014-CVGroup_Cafe_Idle3-1 = "這裡有很多可愛的家具呢……我喜歡。"
26014-CVGroup_Cafe_Idle4-1 = "似乎沒有敵人的氣息。\n可以稍微放鬆警戒。"
26014-CVGroup_Cafe_Idle5-1 = "來把這附近打掃一下……\n……不，穿著制服的時候還是別這麼做吧。"
26014-CVGroup_WeaponGet_Idle1-1 = "無論什麼時候，無論打扮如何，\n我都發誓會為了老師而奔走。"
26014-CVGroup_UIEventLobby_Enter1-1 = "辛，辛苦了，老師。"
26014-CVGroup_UIEventLobby_Enter1-2 = "……實在說不習慣呢。"
26014-CVGroup_UIEventLobby_Enter2-1 = "應該用更可愛的打招呼方式……"
26014-CVGroup_UIEventLobby_Enter2-2 = "……剛，剛才那只是我在自言自語而已！"
26014-CVGroup_UIEventLobby_Enter3-1 = "真的是……讓人無法放鬆。"
26014-CVGroup_UIEventLobby_Enter4-1 = "就剩一點了，老師。\n一起加油吧。"
26014-CVGroup_UIEventLobby_Enter5-1 = "已經結束了啊。"
26014-CVGroup_UIEventLobby_Enter5-2 = "結束之後反而……有種意猶未盡的感覺。"
26014-CVGroup_UIEventLobby_Idle1-1 = "怎，怎麼了？\n有委託嗎？"
26014-CVGroup_UIEventLobby_Idle2-1 = "這，這是千年指定的制服啊……？"
26014-CVGroup_UIEventLobby_Idle2-2 = "有哪裡怪怪的嗎？"
26014-CVGroup_UIEventLobby_Idle3-1 = "那個……老師。"
26014-CVGroup_UIEventLobby_Idle3-2 = "難得穿上制服，不如……"
26014-CVGroup_UIEventLobby_Idle3-3 = "跟我一起……"
26014-CVGroup_UIEventLobby_Idle4-1 = "……果，果然還是算了。別放在心上。"

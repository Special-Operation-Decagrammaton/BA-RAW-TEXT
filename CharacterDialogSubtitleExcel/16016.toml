[translation]
16016-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16016-CVGroup_CharacterGet_Idle1-1 = "我是救護騎士團……不，是Antique Seraphim的成員，名叫蒼森美禰。\n請多多指教。"
16016-CVGroup_Cafe_Idle1-1 = "這裡……"
16016-CVGroup_Cafe_Idle2-1 = "我非常滿意。"
16016-CVGroup_Cafe_Idle3-1 = "雖然想做舞蹈的練習……"
16016-CVGroup_Cafe_Idle4-1 = "呵呵，觀眾很多呢……"
16016-CVGroup_Cafe_Idle5-1 = "為了回應期待，\n得努力練習才行……！"
16016-CVGroup_WeaponGet_Idle1-1 = "這樣的關係……簡直就像偶像和經紀人一樣呢。\n老師進行支援，而我則站上舞台。\n如果真是如此就好了……真可惜。"
16016-CVGroup_UIEventLobby_Enter1-1 = "您好，老師。"
16016-CVGroup_UIEventLobby_Enter1-2 = "是來看我……不對，是來看舞台表演的對吧。"
16016-CVGroup_UIEventLobby_Enter2-1 = "恭候多時了，老師。"
16016-CVGroup_UIEventLobby_Enter2-2 = "已經為您準備好了座位。\n請您就坐吧。"
16016-CVGroup_UIEventLobby_Enter3-1 = "舞台表演還在繼續唷，請集中精神！"
16016-CVGroup_UIEventLobby_Enter4-1 = "還請您聽到最後哦。"
16016-CVGroup_UIEventLobby_Enter5-1 = "呵呵，是場非常精彩的舞台表演。"
16016-CVGroup_UIEventLobby_Idle1-1 = "老師……請問有什麼事嗎？"
16016-CVGroup_UIEventLobby_Idle2-1 = "這也是粉絲服務……是嗎？"
16016-CVGroup_UIEventLobby_Idle3-1 = "只要能讓老師享受，那就足夠了。"
16016-CVGroup_UIEventLobby_Idle4-1 = "啊，啊～啊──"
16016-CVGroup_UIEventLobby_Idle4-2 = "……為了隨時都能歌唱，我進行了發聲練習。"

[translation]
16016-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16016-CVGroup_CharacterGet_Idle1-1 = "Aomori Mine from the Remedial Knights...no, Antique Seraphim. I look forward to working with you."
16016-CVGroup_Cafe_Idle1-1 = "This place..."
16016-CVGroup_Cafe_Idle2-1 = "I heartily approve."
16016-CVGroup_Cafe_Idle3-1 = "I must practice my dancing."
16016-CVGroup_Cafe_Idle4-1 = "Fufu. There are many members in the audience."
16016-CVGroup_Cafe_Idle5-1 = "I must practice vigorously to live up to their expectations!"
16016-CVGroup_WeaponGet_Idle1-1 = "Our relationship...is similar to that of an idol and her manager. I stand on the main stage, while you support me. Such a situation would have been excellent. What a shame."
16016-CVGroup_UIEventLobby_Enter1-1 = "Hello, Sensei."
16016-CVGroup_UIEventLobby_Enter1-2 = "You came here to see me— I mean, the stage, right?"
16016-CVGroup_UIEventLobby_Enter2-1 = "I've been waiting, Sensei."
16016-CVGroup_UIEventLobby_Enter2-2 = "This seat is just for you. Please make yourself at home."
16016-CVGroup_UIEventLobby_Enter3-1 = "The show is still going on. Please focus!"
16016-CVGroup_UIEventLobby_Enter4-1 = "Please listen until the very end."
16016-CVGroup_UIEventLobby_Enter5-1 = "Heehee, that was a great show."
16016-CVGroup_UIEventLobby_Idle1-1 = "Sensei...is there a problem?"
16016-CVGroup_UIEventLobby_Idle2-1 = "Is this also...a part of fan service?"
16016-CVGroup_UIEventLobby_Idle3-1 = "If you enjoyed it, that's enough."
16016-CVGroup_UIEventLobby_Idle4-1 = "Ah, ah, ah."
16016-CVGroup_UIEventLobby_Idle4-2 = "..I was doing vocal warm-ups, so I'd be prepared to sing at any moment."

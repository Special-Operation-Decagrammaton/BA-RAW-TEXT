[translation]
16016-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
16016-CVGroup_CharacterGet_Idle1-1 = "구호기사단…아뇨, 앤틱 세라핌 멤버.\n아오모리 미네라고 합니다. 잘 부탁드립니다."
16016-CVGroup_Cafe_Idle1-1 = "이 장소는…"
16016-CVGroup_Cafe_Idle2-1 = "무척이나 마음에 드는군요."
16016-CVGroup_Cafe_Idle3-1 = "춤 연습을 해야 하는데…"
16016-CVGroup_Cafe_Idle4-1 = "후후, 관객들이 많이 계시네요…"
16016-CVGroup_Cafe_Idle5-1 = "기대에 부응할 수 있도록, 연습하지 않으면…!"
16016-CVGroup_WeaponGet_Idle1-1 = "이 관계…꼭 아이돌과 매니저 같네요.\n선생님이 지원해주고, 내가 메인 무대에 선다.\n정말 그랬다면 좋았을 텐데… 아쉽네요."
16016-CVGroup_UIEventLobby_Enter1-1 = "안녕하세요 선생님."
16016-CVGroup_UIEventLobby_Enter1-2 = "저… 가 아니라, 무대를 보러 오신 거죠?"
16016-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었습니다, 선생님."
16016-CVGroup_UIEventLobby_Enter2-2 = "자리를 준비해 두었습니다. 편히 앉으세요."
16016-CVGroup_UIEventLobby_Enter3-1 = "무대는 계속되고 있어요, 집중해주세요!"
16016-CVGroup_UIEventLobby_Enter4-1 = "마지막까지, 듣고 가 주세요."
16016-CVGroup_UIEventLobby_Enter5-1 = "후후, 아주 멋진 무대였어요."
16016-CVGroup_UIEventLobby_Idle1-1 = "선생님……… 무슨 일 있으신가요?"
16016-CVGroup_UIEventLobby_Idle2-1 = "이것도 팬 서비스의 일환……일까요?"
16016-CVGroup_UIEventLobby_Idle3-1 = "선생님께서 즐기셨다면 그것으로 충분합니다."
16016-CVGroup_UIEventLobby_Idle4-1 = "아, 아~, 아~."
16016-CVGroup_UIEventLobby_Idle4-2 = "…언제라도 부를 수 있도록, 발성 연습을 하고 있었습니다."

[translation]
10033-CVGroup_UITitle_Idle1-1 = "Blue Archive. Heeheehee."
10033-CVGroup_CharacterGet_Idle1-1 = "Heeheehee. Finally found you. I won't lose you again. Please don't leave my sight. ♥"
10033-CVGroup_Cafe_Idle1-1 = "Normally, I wouldn't be able to relax like this."
10033-CVGroup_Cafe_Idle2-1 = "Heeheehee! ♥"
10033-CVGroup_Cafe_Idle3-1 = "*sigh* I wonder what you're up to."
10033-CVGroup_Cafe_Idle4-1 = "Oh, dear."
10033-CVGroup_Cafe_Idle5-1 = "Heeheehee. That's not good."
10033-CVGroup_WeaponGet_Idle1-1 = "I, Wakamo, am ready. I will eliminate your enemies with this. Heeheehee."
10033-CVGroup_UIEventLobby_Enter1-1 = "I, Wakamo, am here to capture you."
10033-CVGroup_UIEventLobby_Enter2-1 = "No matter how hard you try, you can't run from me."
10033-CVGroup_UIEventLobby_Enter2-2 = "I'll make sure you learn that today."
10033-CVGroup_UIEventLobby_Enter3-1 = "Ahhh... I can feel your presence...no matter where I am!"
10033-CVGroup_UIEventLobby_Enter4-1 = "Heehee. Did you think you could get rid of me, just like that?"
10033-CVGroup_UIEventLobby_Enter4-2 = "Ah, you're so cute. ♥"
10033-CVGroup_UIEventLobby_Idle1-1 = "Oh, Sensei. Where are you?"
10033-CVGroup_UIEventLobby_Idle2-1 = "You can't hide behind the smoke of explosions and gunpowder..."
10033-CVGroup_UIEventLobby_Idle2-2 = "That's right. I, Wakamo, will never let you go. ♥"
10033-CVGroup_UIEventLobby_Idle3-1 = "Is this what people call..."
10033-CVGroup_UIEventLobby_Idle3-2 = "...hide-and-seek?"
10033-CVGroup_UIEventLobby_Idle3-3 = "Heehee. I don't mind this kind of entertainment."
10033-CVGroup_UIEventLobby_Idle4-1 = "I'm supposed to chase and catch you, right?"
10033-CVGroup_UIEventLobby_Idle4-2 = "I'm looking forward to it."
10033-CVGroup_UIEventLobby_Idle4-3 = "Ready or not, here I come. ♥"

[translation]
10061-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10061-CVGroup_CharacterGet_Idle1-1 = "I'm Utazumi Sakurako of the Sisterhood of Trinity General School. May you have a blessed day today."
10061-CVGroup_Cafe_Idle1-1 = "So, Sensei, this is the place you worked to create?"
10061-CVGroup_Cafe_Idle2-1 = "It seems to have welcomed many different sorts of people."
10061-CVGroup_Cafe_Idle3-1 = "It's quite different from the cathedral."
10061-CVGroup_Cafe_Idle4-1 = "Although...I certainly wouldn't mind visiting once in a while."
10061-CVGroup_Cafe_Idle5-1 = "It may be different, yet I feel at peace here."
10061-CVGroup_WeaponGet_Idle1-1 = "You're so generous. Thank you. I hope I can repay your kindness one day."

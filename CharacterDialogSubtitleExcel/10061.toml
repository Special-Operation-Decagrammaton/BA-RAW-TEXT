[translation]
10061-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10061-CVGroup_CharacterGet_Idle1-1 = "我是三一綜合學園，\n修女會所屬的歌住櫻子。\n願安寧日日與您同在。"
10061-CVGroup_Cafe_Idle1-1 = "這裡是\n老師加以裝飾的…"
10061-CVGroup_Cafe_Idle2-1 = "各式各樣的人都來了呢。"
10061-CVGroup_Cafe_Idle3-1 = "和教堂的氣氛相當不同呢。"
10061-CVGroup_Cafe_Idle4-1 = "偶爾……\n來這種地方也不錯。"
10061-CVGroup_Cafe_Idle5-1 = "雖然形態不同，\n依然能讓人心情平靜。"
10061-CVGroup_WeaponGet_Idle1-1 = "您將慈悲賜給了我呢。我會感激地收下的。\n希望有朝一日，能報答這份恩惠的那天能夠到來。"

10061-CVGroup_Cafe_Idle5-1 = "ถึงรูปแบบจะต่างกัน แต่บรรยากาศก็สงบสุขดีนะคะ"
10061-CVGroup_WeaponGet_Idle1-1 = "คุณครูเอื้อเฟื้อความเมตตา ให้กับฉันสินะคะ ขอบคุณค่ะ\nสักวันหนึ่งฉันจะตอบแทนความเมตตานี้อย่างแน่นอนค่ะ"

[translation]
10061-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10061-CVGroup_CharacterGet_Idle1-1 = "트리니티 종합학원, 시스터후드 소속의 우타즈미 사쿠라코입니다.\n늘 안녕이 함께하시길."
10061-CVGroup_Cafe_Idle1-1 = "이곳이 선생님께서 꾸미신…."
10061-CVGroup_Cafe_Idle2-1 = "다양한 분들이 와 계시군요."
10061-CVGroup_Cafe_Idle3-1 = "성당과는 분위기가 많이 다르네요."
10061-CVGroup_Cafe_Idle4-1 = "가끔은… 이런 곳도 좋겠지요."
10061-CVGroup_Cafe_Idle5-1 = "형태는 다르지만, 평안해지는 기분입니다."
10061-CVGroup_WeaponGet_Idle1-1 = "저에게 자비를 베풀어 주시는군요.\n감사합니다. 언젠가 이 은혜를 갚을 수 있는 날이 오기를."

[translation]
10061-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10061-CVGroup_CharacterGet_Idle1-1 = "ซิสเตอร์จากโรงเรียนสามัญทรีนิตี้ อุทะซุมิ ซากุระโกะค่ะ\nขอสันติสุขและสวัสดีจงมีแด่คุณครูนะคะ"

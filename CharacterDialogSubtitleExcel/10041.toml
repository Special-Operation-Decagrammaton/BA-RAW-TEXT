[translation]
10041-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10041-CVGroup_CharacterGet_Idle1-1 = "아리우스 스쿼드의 미사키. 말하자면 주인을 잃은 사냥개 중에 하나.\n목줄은 그쪽에 있으니까, 마음대로 명령해."
10041-CVGroup_Cafe_Idle1-1 = "조금 시끄럽네."
10041-CVGroup_Cafe_Idle2-1 = "……처음 보는 것들 뿐."
10041-CVGroup_Cafe_Idle3-1 = "……그거, 즐거워?"
10041-CVGroup_Cafe_Idle4-1 = "나는 관심 없어."
10041-CVGroup_Cafe_Idle5-1 = "……뭐 하는 거지?"
10041-CVGroup_WeaponGet_Idle1-1 = "더이상 이유 같은 건 묻지 않겠지만, 내게 일부러 이런 물건을 건네주다니.\n내가 알고 있던 세계에서, 당신 같은 사람은 없었어.\n이상한 사람……. 이 힘은, 지금은 선생님에게 맡길게."

[translation]
10041-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10041-CVGroup_CharacterGet_Idle1-1 = "我是奧利斯小隊的美咲。\n如今可說是個失去主人的獵犬……\n狗鍊拿去，隨你命令我吧。"
10041-CVGroup_Cafe_Idle1-1 = "有點吵呢……"
10041-CVGroup_Cafe_Idle2-1 = "……都是第一次看到的東西。"
10041-CVGroup_Cafe_Idle3-1 = "……那些有什麼有趣的？"
10041-CVGroup_Cafe_Idle4-1 = "我沒興趣。"
10041-CVGroup_Cafe_Idle5-1 = "……這是在做什麼？"
10041-CVGroup_WeaponGet_Idle1-1 = "雖然事到如今我不會過問理由了，但竟然刻意給我這種東西。\n在我認知的世界中，沒有人跟你一樣了。真是個怪人。\n……這份力量，我現在將會託付給老師。"

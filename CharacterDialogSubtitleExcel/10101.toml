[translation]
10101-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10101-CVGroup_CharacterGet_Idle1-1 = "這裡就是這次的打工地點嗎……\n雖然是第一次來到海邊，不過儘管交給我吧"
10101-CVGroup_Cafe_Idle1-1 = "可以在這裡練習嗎？"
10101-CVGroup_Cafe_Idle2-1 = "那個裝飾……\n感覺很適合敦子。"
10101-CVGroup_Cafe_Idle3-1 = "這附近吵吵鬧鬧的。\n美咲可能不太喜歡。"
10101-CVGroup_Cafe_Idle4-1 = "咖啡廳啊……\n要是能找到日和喜歡的雜誌就好了。"
10101-CVGroup_Cafe_Idle5-1 = "我記得這裡，\n應該有記帳本……"
10101-CVGroup_WeaponGet_Idle1-1 = "雖然將來充滿變數，但有一件事我可以斷言。\n從老師手中獲得的這份信賴的證明……我會一輩子好好珍惜。"
10101-CVGroup_UIEventLobby_Enter1-1 = "接下來的工作是……"
10101-CVGroup_UIEventLobby_Enter1-2 = "啊，老師，需要我幫你什麼忙嗎？"
10101-CVGroup_UIEventLobby_Enter2-1 = "歡，歡迎光臨！請問幾位……！"
10101-CVGroup_UIEventLobby_Enter2-2 = "……啊，原來是老師啊。抱歉，出於反射就……"
10101-CVGroup_UIEventLobby_Enter3-1 = "打工還沒有結束。"
10101-CVGroup_UIEventLobby_Enter3-2 = "直到最後，都繃緊神經吧。"
10101-CVGroup_UIEventLobby_Enter4-1 = "慶典也進入尾盤了。\n玩得開心嗎？老師。"
10101-CVGroup_UIEventLobby_Enter5-1 = "這次的工作，也順利落幕了呢。"
10101-CVGroup_UIEventLobby_Enter5-2 = "這都多虧了老師。\n我欠你一份人情。"
10101-CVGroup_UIEventLobby_Idle1-1 = "大海……寬闊得像沒有盡頭，水也多得令人訝異呢。"
10101-CVGroup_UIEventLobby_Idle1-2 = "令人佩服。"
10101-CVGroup_UIEventLobby_Idle2-1 = "要是能再多一些時間，\n就能讓表演的完成度更高了……"
10101-CVGroup_UIEventLobby_Idle3-1 = "海風真涼爽。"
10101-CVGroup_UIEventLobby_Idle3-2 = "正好適合將熱冷卻下來。"
10101-CVGroup_UIEventLobby_Idle4-1 = "為了讓慶典變得更有趣，我會全力以赴。"
10101-CVGroup_UIEventLobby_Idle4-2 = "老師也請好好享受慶典吧。"
10101-CVGroup_UIEventMiniGameMission_Enter1-1 = "不好意思，老師，麻煩助我一臂之力吧。"
10101-CVGroup_UIEventMiniGameMission_Enter1-2 = "我一個人實在忙不過來。"
10101-CVGroup_UIEventMiniGameMission_Enter2-1 = "這是今天的工作清單。\n老師，能請你幫忙嗎？"
10101-CVGroup_UIEventMiniGameMission_Idle1-1 = "我現在靠著打工來維持生計。"
10101-CVGroup_UIEventMiniGameMission_Idle1-2 = "所以工作的案件，必須得認真管理才行。"
10101-CVGroup_UIEventMiniGameMission_Idle2-1 = "老，老師？\n找我有什麼事嗎？"
10101-CVGroup_UIEventMiniGameMission_Buy1-1 = "多虧有你才能得救。\n老師真能幹啊。"
10101-CVGroup_UIEventMiniGameMission_Buy2-1 = "已經處理好了嗎……？"
10101-CVGroup_UIEventMiniGameMission_Buy2-2 = "謝禮是這個……\n你就收下吧。"
10101-CVGroup_UIEventMiniGameMission_Interaction1-1 = "今天就到此為止。\n感謝你的協助。"
10101-CVGroup_UIEventMiniGameMission_Interaction1-2 = "老師，要不要一起去喝點飲料？"

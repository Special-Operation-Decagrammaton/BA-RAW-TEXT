[translation]
10101-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10101-CVGroup_CharacterGet_Idle1-1 = "ที่นี่คือที่ทำงานพาร์ทไทม์ครั้งนี้สินะ...\nฉันเพิ่งเคยมาทะเลครั้งแรก แต่ก็วางใจได้เลย"
10101-CVGroup_Cafe_Idle1-1 = "ฉันซ้อมที่นี่จะได้มั้ยนะ?"
10101-CVGroup_Cafe_Idle2-1 = "เครื่องประดับอันนั้น...\nน่าจะเหมาะกับอาสึโกะเลยนะ"
10101-CVGroup_Cafe_Idle3-1 = "แถวนี้เสียงดังจัง\nมิซากิคงไม่ชอบเท่าไรนะ"
10101-CVGroup_Cafe_Idle4-1 = "คาเฟ่... ถ้ามีนิตยสาร\nที่ฮิโยริชอบก็ดีสินะ"
10101-CVGroup_Cafe_Idle5-1 = "บัญชีรายรับรายจ่ายต้องอยู่ที่นี่สิ..."
10101-CVGroup_WeaponGet_Idle1-1 = "ถึงอนาคตจะไม่แน่นอน แต่มีอย่างหนึ่งที่ฉันรับรองได้\nหลักฐานของความไว้ใจที่ฉันได้รับจากครู...\nฉันจะรักษามันไว้ตลอดเลย"
10101-CVGroup_UIEventLobby_Enter1-1 = "งานที่จะทำต่อไปก็..."
10101-CVGroup_UIEventLobby_Enter1-2 = "อ๊ะ ครู มีงานอะไรให้ฉันช่วยมั้ย?"
10101-CVGroup_UIEventLobby_Enter2-1 = "ชะ... เชิญค่ะ! มากี่ท่านคะ?"
10101-CVGroup_UIEventLobby_Enter2-2 = "อ๊ะ... ครูเองสินะ\nขอโทษที ฉันทักทายแบบนี้\nจนติดเป็นนิสัยแล้วน่ะ"
10101-CVGroup_UIEventLobby_Enter3-1 = "งานพาร์ทไทม์ยังไม่เสร็จเลย"
10101-CVGroup_UIEventLobby_Enter3-2 = "มาตั้งใจทำจนกว่างานจะเสร็จกันเถอะ"
10101-CVGroup_UIEventLobby_Enter4-1 = "งานเทศกาลจบลงแล้วสินะ\nสนุกหรือเปล่า ครู?"
10101-CVGroup_UIEventLobby_Enter5-1 = "งานนี้ก็สำเร็จได้ด้วยดีสินะ"
10101-CVGroup_UIEventLobby_Enter5-2 = "ต้องขอบคุณครูเลยนะ\nฉันติดหนี้บุญคุณแล้วละ"
10101-CVGroup_UIEventLobby_Idle1-1 = "ทะเล... กว้างใหญ่ไม่มีที่สิ้นสุด\nแล้วก็มีน้ำทะเลเยอะจนน่าตกใจเลย"
10101-CVGroup_UIEventLobby_Idle1-2 = "น่าประทับใจจัง"
10101-CVGroup_UIEventLobby_Idle2-1 = "ถ้ามีเวลามากกว่านี้อีกหน่อย\nก็คงทำให้การแสดงบนเวที\nสมบูรณ์แบบกว่านี้ได้นะ..."
10101-CVGroup_UIEventLobby_Idle3-1 = "ลมทะเลเย็นสบายดีจัง"
10101-CVGroup_UIEventLobby_Idle3-2 = "เหมาะกับการเดินคลายร้อนเลย"
10101-CVGroup_UIEventLobby_Idle4-1 = "ฉันจะทำให้เต็มที่ ให้เป็นงานเทศกาลที่สนุกเลยละ"
10101-CVGroup_UIEventLobby_Idle4-2 = "หวังว่าครูก็จะสนุกกับงานเทศกาลด้วยนะ"
10101-CVGroup_UIEventMiniGameMission_Enter1-1 = "อ๊ะ ครู ขอโทษนะ แต่มาช่วยฉันหน่อยสิ"
10101-CVGroup_UIEventMiniGameMission_Enter1-2 = "ฉันทำคนเดียวไม่ไหวน่ะ"
10101-CVGroup_UIEventMiniGameMission_Enter2-1 = "นี่คือรายการภารกิจของวันนี้\nครู มาช่วยหน่อยได้มั้ย?"
10101-CVGroup_UIEventMiniGameMission_Idle1-1 = "ฉันหาเลี้ยงตัวเองด้วยงานพาร์ทไทม์น่ะ"
10101-CVGroup_UIEventMiniGameMission_Idle1-2 = "ฉันต้องใส่ใจรายละเอียดของงานสิ"
10101-CVGroup_UIEventMiniGameMission_Idle2-1 = "คะ... ครู?\nมีธุระกับฉันเหรอ?"
10101-CVGroup_UIEventMiniGameMission_Buy1-1 = "รอดมาได้เพราะครูเลยนะ\nครูจัดการงานไวจัง"
10101-CVGroup_UIEventMiniGameMission_Buy2-1 = "เสร็จแล้วเหรอเนี่ย...?"
10101-CVGroup_UIEventMiniGameMission_Buy2-2 = "รับสิ่งนี้ไว้... เป็นของตอบแทนสิ"
10101-CVGroup_UIEventMiniGameMission_Interaction1-1 = "เสร็จงานของวันนี้แล้วละ\nขอบคุณที่ช่วยนะ"
10101-CVGroup_UIEventMiniGameMission_Interaction1-2 = "ครู มาดื่มอะไรด้วยกันมั้ย?"

[translation]
10101-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10101-CVGroup_CharacterGet_Idle1-1 = "This is where I'll be working this time. I've never had a part-time job at the beach before, but you can count on me."
10101-CVGroup_Cafe_Idle1-1 = "Can I practice here?"
10101-CVGroup_Cafe_Idle2-1 = "That decoration...I think it would suit Atsuko."
10101-CVGroup_Cafe_Idle3-1 = "It's noisy around here. I don't think Misaki would care for it much."
10101-CVGroup_Cafe_Idle4-1 = "A cafe, huh? Hopefully they have some magazines that Hiyori would like."
10101-CVGroup_Cafe_Idle5-1 = "I distinctly remember putting the ledger right here..."
10101-CVGroup_WeaponGet_Idle1-1 = "The future is always unclear, but I do know one thing. I'll always cherish...this proof of your trust, Sensei."
10101-CVGroup_UIEventLobby_Enter1-1 = "Next up..."
10101-CVGroup_UIEventLobby_Enter1-2 = "Oh, Sensei. Is there anything I can do to help?"
10101-CVGroup_UIEventLobby_Enter2-1 = "W-Welcome! How many in your party?"
10101-CVGroup_UIEventLobby_Enter2-2 = "...Oh, it's you, Sensei. I'm sorry. The greeting just automatically pops out."
10101-CVGroup_UIEventLobby_Enter3-1 = "My part-time job isn't over yet."
10101-CVGroup_UIEventLobby_Enter3-2 = "Let's stay awake until the end."
10101-CVGroup_UIEventLobby_Enter4-1 = "The festival is almost finished. Did you enjoy it, Sensei?"
10101-CVGroup_UIEventLobby_Enter5-1 = "I safely finished this job too."
10101-CVGroup_UIEventLobby_Enter5-2 = "It's all thanks to you, Sensei. I owe you one."
10101-CVGroup_UIEventLobby_Idle1-1 = "The sea...is endlessly large. It's an amazing amount of water."
10101-CVGroup_UIEventLobby_Idle1-2 = "It's admirable."
10101-CVGroup_UIEventLobby_Idle2-1 = "If only I'd had more time, I could have completed everything for the performance..."
10101-CVGroup_UIEventLobby_Idle3-1 = "The sea breeze is nice and cool."
10101-CVGroup_UIEventLobby_Idle3-2 = "It's perfect for cooling myself."
10101-CVGroup_UIEventLobby_Idle4-1 = "I'll do my best to make it a joyful festival."
10101-CVGroup_UIEventLobby_Idle4-2 = "I hope that you enjoy it too, Sensei."
10101-CVGroup_UIEventMiniGameMission_Enter1-1 = "Oh, Sensei. I'm sorry, but can you lend me a hand?"
10101-CVGroup_UIEventMiniGameMission_Enter1-2 = "I could use some help."
10101-CVGroup_UIEventMiniGameMission_Enter2-1 = "This is the work I need to do today. Would you help me with it, Sensei?"
10101-CVGroup_UIEventMiniGameMission_Idle1-1 = "I earn a living through part-time jobs."
10101-CVGroup_UIEventMiniGameMission_Idle1-2 = "The agenda must be properly managed."
10101-CVGroup_UIEventMiniGameMission_Idle2-1 = "S-Sensei? Do you need something?"
10101-CVGroup_UIEventMiniGameMission_Buy1-1 = "You saved me. You're a fast worker."
10101-CVGroup_UIEventMiniGameMission_Buy2-1 = "Have you finished organizing it already...?"
10101-CVGroup_UIEventMiniGameMission_Buy2-2 = "Please take this...as a token of appreciation."
10101-CVGroup_UIEventMiniGameMission_Interaction1-1 = "And that's it. Thank you for your help."
10101-CVGroup_UIEventMiniGameMission_Interaction1-2 = "How about a drink together, Sensei?"

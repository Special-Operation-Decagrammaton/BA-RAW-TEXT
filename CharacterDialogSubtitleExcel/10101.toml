[translation]
10101-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10101-CVGroup_CharacterGet_Idle1-1 = "여기가 이번 아르바이트 장소군….바다는 처음이지만, 맡겨 줘."
10101-CVGroup_Cafe_Idle1-1 = "여기서 연습해도 되나?"
10101-CVGroup_Cafe_Idle2-1 = "저 장식… 아츠코에게 어울릴 것 같군."
10101-CVGroup_Cafe_Idle3-1 = "이 주변은 소란스럽군.미사키는 그다지 좋아하지 않겠어."
10101-CVGroup_Cafe_Idle4-1 = "카페라….히요리가 좋아하는 잡지가 있으면 좋겠는데."
10101-CVGroup_Cafe_Idle5-1 = "분명 여기에, 가계부가…."
10101-CVGroup_WeaponGet_Idle1-1 = "장래는 불확실하지만, 한 가지만은 장담할 수 있어.\n선생으로부터 받은 이 신뢰의 증거는… 끝까지, 소중히 하겠다."
10101-CVGroup_UIEventLobby_Enter1-1 = "다음에 할 일은……."
10101-CVGroup_UIEventLobby_Enter1-2 = "아, 선생, 혹시 도울 일이 있나?"
10101-CVGroup_UIEventLobby_Enter2-1 = "어, 어서 오세요! 몇 분이신가요!"
10101-CVGroup_UIEventLobby_Enter2-2 = "…아, 선생이었군. 미안하다. 인사가 몸에 배어서 그만."
10101-CVGroup_UIEventLobby_Enter3-1 = "아르바이트는 아직 끝나지 않았다."
10101-CVGroup_UIEventLobby_Enter3-2 = "끝까지, 정신 차리고 가자."
10101-CVGroup_UIEventLobby_Enter4-1 = "축제도 막바지로군. 즐거웠나? 선생."
10101-CVGroup_UIEventLobby_Enter5-1 = "이번 일도 무사히 끝마쳤군."
10101-CVGroup_UIEventLobby_Enter5-2 = "선생 덕분이다. 은혜를 입었어."
10101-CVGroup_UIEventLobby_Idle1-1 = "바다는… 끝없이 넓고, 놀라울 정도로 물이 많군."
10101-CVGroup_UIEventLobby_Idle1-2 = "감탄했다."
10101-CVGroup_UIEventLobby_Idle2-1 = "조금 더 시간이 있으면, 무대의 완성도를 높일 수 있었을 텐데…"
10101-CVGroup_UIEventLobby_Idle3-1 = "바닷바람은 시원하군."
10101-CVGroup_UIEventLobby_Idle3-2 = "땀을 식히기에 안성맞춤이다."
10101-CVGroup_UIEventLobby_Idle4-1 = "즐거운 축제가 될 수 있도록, 최선을 다하겠다."
10101-CVGroup_UIEventLobby_Idle4-2 = "선생도 부디 축제를 즐겨줬으면 한다."
10101-CVGroup_UIEventMiniGameMission_Enter1-1 = "아, 선생, 미안하지만 조금 도와줬으면 한다."
10101-CVGroup_UIEventMiniGameMission_Enter1-2 = "나 혼자서는 조금 버겁군."
10101-CVGroup_UIEventMiniGameMission_Enter2-1 = "오늘의 업무 목록이다. 선생, 도와주겠나?"
10101-CVGroup_UIEventMiniGameMission_Idle1-1 = "아르바이트로 생계를 유지하고 있는 몸이다."
10101-CVGroup_UIEventMiniGameMission_Idle1-2 = "업무의 안건은, 확실히 관리해야만 하지."
10101-CVGroup_UIEventMiniGameMission_Idle2-1 = "서, 선생? 나한테 볼일이라도?"
10101-CVGroup_UIEventMiniGameMission_Buy1-1 = "덕분에 살았다. 선생은 일 처리가 빠르군."
10101-CVGroup_UIEventMiniGameMission_Buy2-1 = "벌써 정리한 건가…?"
10101-CVGroup_UIEventMiniGameMission_Buy2-2 = "답례로 이걸… 받아주겠나."
10101-CVGroup_UIEventMiniGameMission_Interaction1-1 = "오늘은 여기까지다. 협력에 감사한다."
10101-CVGroup_UIEventMiniGameMission_Interaction1-2 = "선생, 같이 음료수라도 마시지 않겠나?"

[translation]
23006-CVGroup_UITitle_Idle1-1 = "블루~ 아카이브!"
23006-CVGroup_CharacterGet_Idle1-1 = "에헤헤, 마츠리운영관리부의 시즈코예요~ 앞으로 잘 부탁드려요. 선생님.\n아…네네, 영업용 멘트예요. 영업용!"
23006-CVGroup_Cafe_Idle1-1 = "모에모에 큐~웅…. 이, 이게 맞을까?"
23006-CVGroup_Cafe_Idle2-1 = "다음 축제 준비를 위해 철저한 계획을 세워야지."
23006-CVGroup_Cafe_Idle3-1 = "백야당의 신메뉴, 뭘로 할까?"
23006-CVGroup_Cafe_Idle4-1 = "축제를 위해서라면 과감한 시도를…. 전원 기모노풍 바니걸 착용이라던가…."
23006-CVGroup_Cafe_Idle5-1 = "여기, 백야당의 임시 가게로 써도 괜찮을 거 같은데?"
23006-CVGroup_WeaponGet_Idle1-1 = "이거, 어떤 축제에서도 구할 수 없는 비매품, 이네요. 에헤헷,\n소중히 여길게요. 선생님!"
23006-CVGroup_UIEventShop_Enter1-1 = "백야당의 출장 판매예요! 자아, 주인님. 필요한 물건은 무엇인가요?"
23006-CVGroup_UIEventShop_Enter2-1 = "아~ 선생님. 어서 오세요~"
23006-CVGroup_UIEventShop_Enter2-2 = "자자, 마음껏 골라보시라구요!"
23006-CVGroup_UIEventShop_Enter3-1 = "축제는 끝나버렸지만, 아직 영업 중이랍니다."
23006-CVGroup_UIEventShop_Enter3-2 = "남은 물건에는 복이 있다고도 하니까, 자. 선생님! 골라보세요!"
23006-CVGroup_UIEventShop_Idle1-1 = "축제가 열려도 백야당은 멈추지 않는다!"
23006-CVGroup_UIEventShop_Idle1-2 = "뭐어~ 저희들은 마츠리운영관리부이니까. 당연한 거지만요. 에헷."
23006-CVGroup_UIEventShop_Idle2-1 = "좋았어. 여기에선… 모에모에… 큥!"
23006-CVGroup_UIEventShop_Idle2-2 = "…엣, 이거, 좀 낡았다고요? 어째서?!"
23006-CVGroup_UIEventShop_Buy1-1 = "앗, 그거…! 아, 아뇨아뇨, 자자.\n딱히 남는 건 가져가야겠다던가, 그런 생각을 한 적 없으니까…!"
23006-CVGroup_UIEventShop_Buy2-1 = "그걸 선택하다니, 역시 선생님! 안목이 있으시다니까요!"
23006-CVGroup_UIEventShop_Buy3-1 = "매번 구매 감사드립니다~ 주인님~!"
23006-CVGroup_UIEventShop_Buy4-1 = "그 물건, 제법 괜찮죠? 에헤헷."

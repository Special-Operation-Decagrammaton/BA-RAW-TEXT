[translation]
23006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
23006-CVGroup_CharacterGet_Idle1-1 = "I'm Shizuko of the Festival Operations Department! I look forward to working with you, Sensei... Huh? I'm trying to be professional here!"
23006-CVGroup_Cafe_Idle1-1 = "Moe moe...kyun! D-Did I do it right?"
23006-CVGroup_Cafe_Idle2-1 = "I need to get back to preparing for the festival."
23006-CVGroup_Cafe_Idle3-1 = "How should we spruce up Momoyodou's menu?"
23006-CVGroup_Cafe_Idle4-1 = "Maybe we should try something bold... Like kimono-style bunny girl outfits."
23006-CVGroup_Cafe_Idle5-1 = "Do you think we could use this place as a temporary shop for Momoyodou?"
23006-CVGroup_WeaponGet_Idle1-1 = "This is something that's not for sale at any festival, right? Heeheehee, I'll cherish it, Sensei!"
23006-CVGroup_UIEventShop_Enter1-1 = "Welcome to the Momoyodou shop! Now, Master, what do you need today?"
23006-CVGroup_UIEventShop_Enter2-1 = "Oh, Sensei. Welcome."
23006-CVGroup_UIEventShop_Enter2-2 = "Now, choose to your liking!"
23006-CVGroup_UIEventShop_Enter3-1 = "The festival is over, but we're still open."
23006-CVGroup_UIEventShop_Enter3-2 = "I'll personally bless the remaining items. Look around, Sensei!"
23006-CVGroup_UIEventShop_Idle1-1 = "Momoyodou won't be stopped, even if there is a festival!"
23006-CVGroup_UIEventShop_Idle1-2 = "Well, we are the Festival Operations Department after all. Heehee."
23006-CVGroup_UIEventShop_Idle2-1 = "Great. Here it's... Moe moe...kyun!"
23006-CVGroup_UIEventShop_Idle2-2 = "Huh? This looks old? How so?!"
23006-CVGroup_UIEventShop_Buy1-1 = "Oh, that! No, no. It's not like I was thinking about taking the leftovers!"
23006-CVGroup_UIEventShop_Buy2-1 = "Your choice... I knew you had good taste, Sensei!"
23006-CVGroup_UIEventShop_Buy3-1 = "As always, thank you, Master!"
23006-CVGroup_UIEventShop_Buy4-1 = "That's a good item, right? Heehee."

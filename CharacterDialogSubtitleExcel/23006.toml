[translation]
23006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
23006-CVGroup_CharacterGet_Idle1-1 = "อ่ะฮิฮิ ชิซุโกะ ชมรมจัดงานเทศกาลค่ะ~\nขอฝากตัวด้วยนะคะ คุณครู\nใช่แล้วค่ะ คอมเมนต์สำหรับการค้าค่ะ\nใช้สำหรับการค้าค่ะ!"
23006-CVGroup_Cafe_Idle1-1 = "โมเอะๆ คิ้วๆ อาอิ๊ง~ บะ... แบบนี้ใช่มั้ยนะ?"
23006-CVGroup_Cafe_Idle2-1 = "เราจะต้องวางแผนให้ละเอียด\nสำหรับการจัดงานเทศกาลครั้งต่อไปค่ะ"
23006-CVGroup_Cafe_Idle3-1 = "เมนูใหม่ของร้านเฮียกคิยาโคคืออะไรน้า?"
23006-CVGroup_Cafe_Idle4-1 = "ถ้าเพื่องานเทศกาลแล้วละก็...\nฉันจะพยายาม...\nอย่างเช่นแปลงร่างเป็น\nบันนี่เกิร์ลใส่หูกระต่าย..."
23006-CVGroup_Cafe_Idle5-1 = "ที่นี่เหมาะจะใช้เป็นร้านค้าชั่วคราวของร้านเฮียกคิยาโคเลยนะ?"
23006-CVGroup_WeaponGet_Idle1-1 = "ของที่ไม่มีวางขายในเทศกาลไหนๆ เลยสินะคะ\nฮิฮิฮิ ฉันจะรักษาอย่างดีเลยค่ะ คุณครู!"
23006-CVGroup_UIEventShop_Enter1-1 = "นี่เป็นการออกสำรวจร้านค้าของร้านเฮียกคิยาโคค่ะ!\nเอาละค่ะ นายท่านอยากจะรับอะไรดีคะ?"
23006-CVGroup_UIEventShop_Enter2-1 = "อา~ คุณครู เชิญเลยค่ะ~"
23006-CVGroup_UIEventShop_Enter2-2 = "นี่ค่ะ เลือกได้ตามสบายเลยนะคะ!"
23006-CVGroup_UIEventShop_Enter3-1 = "ถึงงานเทศกาลจะจบลงไปแล้ว แต่เรายังเปิดทำการอยู่นะคะ"
23006-CVGroup_UIEventShop_Enter3-2 = "ว่ากันว่าการที่ยังมีของเหลือจะถือว่ามีโชคอยู่\nเอาล่ะ คุณครู! เชิญเลือกได้เลยค่ะ!"
23006-CVGroup_UIEventShop_Idle1-1 = "ถึงงานเทศกาลจะเริ่มแล้ว\nแต่ร้านเฮียกคิยาโคของเราไม่หยุดหรอกนะคะ!"
23006-CVGroup_UIEventShop_Idle1-2 = "ก็นะ~ เพราะว่าพวกเราคือชมรมชมรมจัดงานเทศกาลนี่คะ\nจะหยุดได้ยังไงกันล่ะคะ ฮิฮิ..."
23006-CVGroup_UIEventShop_Idle2-1 = "ดีละ ถ้างั้น... ฉันจะทำท่าคิวท์ๆ ให้ดูนะคะ ปิ้ว!"
23006-CVGroup_UIEventShop_Idle2-2 = "อ๊ะ จะบอกว่ามันดูเก่าเหรอคะ? ทำไมล่ะคะ?!"
23006-CVGroup_UIEventShop_Buy1-1 = "อ๊ะ นั่นมัน...! อ่า ปะ... เปล่าค่ะๆ\nฉันไม่เคยคิดว่าจะให้เลือกจากของที่เหลืออยู่แบบนั้นเลยนะคะ...!"
23006-CVGroup_UIEventShop_Buy2-1 = "ไม่คิดเลยว่าคุณครูจะเลือกชิ้นนั้น\nสมกับเป็นคุณครูจริงๆ! สายตาเฉียบแหลมมากค่ะ!"
23006-CVGroup_UIEventShop_Buy3-1 = "ขอบคุณที่มาอุดหนุนบ่อยๆ นะคะ~ นายท่าน~!"
23006-CVGroup_UIEventShop_Buy4-1 = "ของชิ้นนั้นใช้ได้เลยใช่มั้ยล่ะคะ? ฮิฮิฮิ!"

[translation]
20047-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案。"
20047-CVGroup_CharacterGet_Idle1-1 = "身為百花繚亂的作戰參謀……游泳什麼的就跟兒戲沒兩樣。\n……我已經把教材讀得滾瓜爛熟了。來，出發吧。"
20047-CVGroup_Cafe_Idle1-1 = "哼嗯……老師有這種興趣啊？"
20047-CVGroup_Cafe_Idle2-1 = "放輕鬆……深呼吸……\n要浮在水上……真困難……"
20047-CVGroup_Cafe_Idle3-1 = "陽光恰到好處的地方……在哪裡呢？"
20047-CVGroup_Cafe_Idle4-1 = "泳裝……是不是有點太小了？"
20047-CVGroup_Cafe_Idle5-1 = "蓮華他，游得還真好……"
20047-CVGroup_WeaponGet_Idle1-1 = "哼嗯……這就是老師表現信任的方式啊。\n那麼，往後就更加……盡情地依賴我吧。\n就像我相信著你一樣。\n……你做得到吧？"
20047-CVGroup_UIEventLobby_Enter1-1 = "百夜水上祭啊……"
20047-CVGroup_UIEventLobby_Enter1-2 = "我……到底在做什麼呢……"
20047-CVGroup_UIEventLobby_Enter2-1 = "既然要參加……就要打出不辱名號的比賽。"
20047-CVGroup_UIEventLobby_Enter3-1 = "結束已近在眼前……算是段充實的時光吧。"
20047-CVGroup_UIEventLobby_Enter4-1 = "真到結束的時候，還是有點寂寞呢。"
20047-CVGroup_UIEventLobby_Enter4-2 = "大海什麼的，以前明明那麼討厭的說。"
20047-CVGroup_UIEventLobby_Enter5-1 = "……我沒有遺憾。謝謝你，老師。\n一直守望到了最後。"
20047-CVGroup_UIEventLobby_Idle1-1 = "我有個不錯的作戰計畫……想聽聽看嗎？"
20047-CVGroup_UIEventLobby_Idle2-1 = "無論怎麼努力，身體還是會沉下去呢……"
20047-CVGroup_UIEventLobby_Idle2-2 = "是因為太用力了嗎？"
20047-CVGroup_UIEventLobby_Idle2-3 = "老，老師……！你從什麼時候開始看的……？"
20047-CVGroup_UIEventLobby_Idle3-1 = "沒必要擔心。\n這種程度，根本不算什麼。"
20047-CVGroup_UIEventLobby_Idle4-1 = "很癢耶。"
20047-CVGroup_UIEventLobby_Idle4-2 = "……我可沒說要你離開。"
20047-CVGroup_UIEventMission_Enter1-1 = "這是這次的作戰列表。\n是我整理的……可別浪費了哦。"
20047-CVGroup_UIEventMission_Enter2-1 = "來，作戰列表。"
20047-CVGroup_UIEventMission_Enter2-2 = "……你在做什麼？\n不靠近一點不就沒辦法一起看了嗎？"
20047-CVGroup_UIEventMission_Idle1-1 = "要聊天的話，等到兩人獨處的時候再陪你。"
20047-CVGroup_UIEventMission_Idle1-2 = "現在先專心在作戰上。"
20047-CVGroup_UIEventMission_Idle2-1 = "需要作戰參謀的建言？\n儘管說吧。"
20047-CVGroup_UIEventMission_Buy1-1 = "不愧是老師。\n這種程度，理所當然吧。"
20047-CVGroup_UIEventMission_Buy2-1 = "既然你在努力，我也不能輸給你。\n這就是所謂的團隊吧？"
20047-CVGroup_UIEventMission_Interaction1-1 = "辛苦了。來，收下吧。\n這是我給你的獎勵。"

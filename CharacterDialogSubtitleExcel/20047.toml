[translation]
20047-CVGroup_UITitle_Idle1-1 = "Blue...Archive."
20047-CVGroup_CharacterGet_Idle1-1 = "I'm the Hyakkaryouran's operations officer. I have no issues with swimming. I've thoroughly studied the literature for today."
20047-CVGroup_Cafe_Idle1-1 = "Hmm, so this is where your inclinations lie."
20047-CVGroup_Cafe_Idle2-1 = "Relax...deep breaths... Float upon the water... It's rather difficult..."
20047-CVGroup_Cafe_Idle3-1 = "Where does the sunlight best hit?"
20047-CVGroup_Cafe_Idle4-1 = "This swimsuit... It's a bit tight."
20047-CVGroup_Cafe_Idle5-1 = "How is Renge so adept at swimming?"
20047-CVGroup_WeaponGet_Idle1-1 = "Hm... So this is how you express your trust. If that is so, you should...rely on me more. Just as I trust you. ...You're capable of this, yes?"
20047-CVGroup_UIEventLobby_Enter1-1 = "The Hyakkiyako Water Festival..."
20047-CVGroup_UIEventLobby_Enter1-2 = "How did I get here?"
20047-CVGroup_UIEventLobby_Enter2-1 = "Since I am participating, I will play without regrets."
20047-CVGroup_UIEventLobby_Enter3-1 = "And so, the festival is coming to a close. I've experienced many new things."
20047-CVGroup_UIEventLobby_Enter4-1 = "There is a twinge of bittersweetness at the end."
20047-CVGroup_UIEventLobby_Enter4-2 = "I used to despise the sea."
20047-CVGroup_UIEventLobby_Enter5-1 = "I have no regrets about this match. Thank you for watching, Sensei."
20047-CVGroup_UIEventLobby_Idle1-1 = "Are you in need of my tactics?"
20047-CVGroup_UIEventLobby_Idle2-1 = "No matter my efforts, my body simply sinks."
20047-CVGroup_UIEventLobby_Idle2-2 = "Perhaps I am exerting too much force..."
20047-CVGroup_UIEventLobby_Idle2-3 = "H-Hm? Since when have you been here, Sensei?"
20047-CVGroup_UIEventLobby_Idle3-1 = "Worry not. Something like swimming is child's play to me."
20047-CVGroup_UIEventLobby_Idle4-1 = "That tickles."
20047-CVGroup_UIEventLobby_Idle4-2 = "...That didn't mean you should go away either."
20047-CVGroup_UIEventMission_Enter1-1 = "This is the mission list I personally organized. You're grateful, yes?"
20047-CVGroup_UIEventMission_Enter2-1 = "Now then, begin the operation."
20047-CVGroup_UIEventMission_Enter2-2 = "...What are you doing? You need to close the distance, so we can look together, yes?"
20047-CVGroup_UIEventMission_Idle1-1 = "When we're in private, I'll converse with you as much as you'd like."
20047-CVGroup_UIEventMission_Idle1-2 = "So please focus on the mission for now."
20047-CVGroup_UIEventMission_Idle2-1 = "Do you require the wisdom of an operations officer? Feel free to ask."
20047-CVGroup_UIEventMission_Buy1-1 = "I'd expect nothing less. Any ally of mine must be at least this competent."
20047-CVGroup_UIEventMission_Buy2-1 = "Seeing your work energizes me as well. Perhaps it's a natural consequence of being teammates?"
20047-CVGroup_UIEventMission_Interaction1-1 = "Good work today as well. I have a reward for you."

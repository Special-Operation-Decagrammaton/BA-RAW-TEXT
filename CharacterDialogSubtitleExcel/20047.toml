[translation]
20047-CVGroup_UITitle_Idle1-1 = "Blue... Archive"
20047-CVGroup_CharacterGet_Idle1-1 = "ฉันคือที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน\nการว่ายน้ำน่ะไม่ใช่ปัญหาหรอก\nฉันอ่านหนังสือว่ายน้ำมาหลายเล่มเพื่อวันนี้เลย"
20047-CVGroup_Cafe_Idle1-1 = "ฮืม คุณครูมีรสนิยมแบบนี้เองสินะ"
20047-CVGroup_Cafe_Idle2-1 = "ผ่อนคลาย... หายใจเข้าลึกๆ...\nทำไมลอยตัวในน้ำ... มันถึงยากจังเลย..."
20047-CVGroup_Cafe_Idle3-1 = "ตรงไหนบ้างนะที่แสงแดดส่องถึง?"
20047-CVGroup_Cafe_Idle4-1 = "ชุดว่ายน้ำตัวนี้มัน... รัดไปนิดหน่อยนะ"
20047-CVGroup_Cafe_Idle5-1 = "ทำไมเรนเกะถึงว่ายน้ำเก่งแบบนั้นนะ?"
20047-CVGroup_WeaponGet_Idle1-1 = "ฮืม... นี่คือความน่าเชื่อถือในแบบคุณครูสินะ\nงั้นต่อไปก็... มาพึ่งพิงฉันให้มากขึ้นนะ\nเหมือนที่ฉันพึ่งพิงคุณไง ทำได้ใช่มั้ย...?"
20047-CVGroup_UIEventLobby_Enter1-1 = "เทศกาลสวนน้ำเฮียกคิยาโค..."
20047-CVGroup_UIEventLobby_Enter1-2 = "ทำไมฉันถึงมาอยู่ที่นี่ได้นะ?"
20047-CVGroup_UIEventLobby_Enter2-1 = "ในเมื่อได้มาเข้าร่วมแล้ว\nฉันก็จะตั้งใจแข่งขันให้ไม่เสียดายในภายหลัง"
20047-CVGroup_UIEventLobby_Enter3-1 = "งานเทศกาลใกล้จะจบแล้วสินะ\nฉันได้ประสบการณ์เยอะจริงๆ เลยละ"
20047-CVGroup_UIEventLobby_Enter4-1 = "พอใกล้จะจบ ในใจก็รู้สึกเสียดายอยู่นะ"
20047-CVGroup_UIEventLobby_Enter4-2 = "ทั้งๆ ที่ฉันเกลียดทะเลเอามากๆ เลย"
20047-CVGroup_UIEventLobby_Enter5-1 = "เป็นการแข่งขันที่ฉันไม่เสียดายเลยละ\nขอบคุณที่คอยเฝ้าดูฉันนะ คุณครู"
20047-CVGroup_UIEventLobby_Idle1-1 = "อยากได้กลยุทธ์จากฉันเหรอ?"
20047-CVGroup_UIEventLobby_Idle2-1 = "ไม่ว่าจะพยายามยังไง ตัวก็จมน้ำอยู่ดี..."
20047-CVGroup_UIEventLobby_Idle2-2 = "หรือว่าฉันออกแรงมากเกินไปนะ"
20047-CVGroup_UIEventLobby_Idle2-3 = "หะ... หืม? มาตั้งแต่ตอนไหนน่ะ คุณครู?"
20047-CVGroup_UIEventLobby_Idle3-1 = "ไม่ต้องห่วงนะ เรื่องว่ายน้ำน่ะ\nไม่ใช่เรื่องใหญ่อะไรหรอก"
20047-CVGroup_UIEventLobby_Idle4-1 = "จั๊กจี้นะ"
20047-CVGroup_UIEventLobby_Idle4-2 = "ฉันไม่ได้บอกให้ไปตรงโน้นสักหน่อย..."
20047-CVGroup_UIEventMission_Enter1-1 = "นี่คือภารกิจทั้งหมดที่ฉันจัดมาให้ ฉันทำได้ดีใช่มั้ย?"
20047-CVGroup_UIEventMission_Enter2-1 = "เอาละ แจ้งเตือนภารกิจ"
20047-CVGroup_UIEventMission_Enter2-2 = "ทำอะไรน่ะ...? ต้องเข้ามาใกล้กว่านี้สิ\nจะได้ดูด้วยกันได้ไงล่ะ?"
20047-CVGroup_UIEventMission_Idle1-1 = "ถ้าจะคุยเล่น ไว้ฉันจะคุยในพื้นที่ส่วนตัวให้เยอะๆ เลย"
20047-CVGroup_UIEventMission_Idle1-2 = "เพราะงั้นตอนนี้ก็จดจ่อกับภารกิจก่อนนะ"
20047-CVGroup_UIEventMission_Idle2-1 = "อยากได้คำแนะนำจากที่ปรึกษายุทธศาสตร์เหรอ?\nบอกมาเลยว่าเรื่องอะไร"
20047-CVGroup_UIEventMission_Buy1-1 = "ตามคาดเลยนะคุณครู ต้องอย่างนี้ละ\nถึงจะเป็นพันธมิตรกับฉันได้"
20047-CVGroup_UIEventMission_Buy2-1 = "พอคุณแสดงฝีมือ ฉันก็มีแรงใจขึ้นมาเลย\nก็เราอยู่ทีมเดียวกันแหละเนอะ?"
20047-CVGroup_UIEventMission_Interaction1-1 = "วันนี้ขอบคุณมากนะ\nนี่คือรางวัลที่ฉันเตรียมไว้ให้"

[translation]
20047-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브."
20047-CVGroup_CharacterGet_Idle1-1 = "나는 백화요란의 작전 참모. 수영 정도는 아무런 문제 없어.\n오늘을 위해 다양한 수영 교본을 탐독했으니까."
20047-CVGroup_Cafe_Idle1-1 = "흐음, 선생님은 이런 취향이구나."
20047-CVGroup_Cafe_Idle2-1 = "힘을 빼고… 심호흡… 물에 뜨는 거… 어렵네…."
20047-CVGroup_Cafe_Idle3-1 = "햇볕이 잘 드는 곳은 어디지?"
20047-CVGroup_Cafe_Idle4-1 = "이 수영복…… 조금 꽉 끼네."
20047-CVGroup_Cafe_Idle5-1 = "렌게는 어떻게 그렇게 수영을 잘할까?"
20047-CVGroup_WeaponGet_Idle1-1 = "흐음…… 이것이, 선생님 나름의 신뢰구나.\n그럼, 앞으로는 좀 더…… 의지하도록 해. 내가 당신을 신뢰하는 것처럼.\n……할 수 있지?"
20047-CVGroup_UIEventLobby_Enter1-1 = "백야수상제라……"
20047-CVGroup_UIEventLobby_Enter1-2 = "나는 어쩌다 여기까지 왔지?"
20047-CVGroup_UIEventLobby_Enter2-1 = "참가하게 된 이상, 후회 없는 경기를 펼치겠어."
20047-CVGroup_UIEventLobby_Enter3-1 = "축제도 슬슬 막바지네. 정말 많은 경험을 했어."
20047-CVGroup_UIEventLobby_Enter4-1 = "끝이 다가오니 아쉬운 마음이 드네."
20047-CVGroup_UIEventLobby_Enter4-2 = "바다 따위, 정말 싫었는데."
20047-CVGroup_UIEventLobby_Enter5-1 = "정말 후회 없는 경기를 펼쳤어. 지켜봐 줘서 고마웠어, 선생님."
20047-CVGroup_UIEventLobby_Idle1-1 = "내 기책이 필요해?"
20047-CVGroup_UIEventLobby_Idle2-1 = "아무리 해봐도 몸이 가라앉아……."
20047-CVGroup_UIEventLobby_Idle2-2 = "너무 힘을 줘서 그런 걸까."
20047-CVGroup_UIEventLobby_Idle2-3 = "으, 으응? 언제 왔어, 선생님?"
20047-CVGroup_UIEventLobby_Idle3-1 = "걱정 마. 수영 따위, 아무렇지도 않으니까."
20047-CVGroup_UIEventLobby_Idle4-1 = "간지러워."
20047-CVGroup_UIEventLobby_Idle4-2 = "……저리 가라는 뜻은 아니야."
20047-CVGroup_UIEventMission_Enter1-1 = "직접 정리한 이번 작전 목록이야. 고맙지?"
20047-CVGroup_UIEventMission_Enter2-1 = "자, 작전 일람."
20047-CVGroup_UIEventMission_Enter2-2 = "……뭐 해? 더 가까이 와야 같이 보겠지?"
20047-CVGroup_UIEventMission_Idle1-1 = "잡담이라면 사적인 곳에서 잔뜩 해주겠어."
20047-CVGroup_UIEventMission_Idle1-2 = "그러니까 지금은 작전에 집중해 줘."
20047-CVGroup_UIEventMission_Idle2-1 = "작전참모의 조언이 필요한 거야? 어떤 건지 말만 해."
20047-CVGroup_UIEventMission_Buy1-1 = "역시 선생님. 그 정도는 해줘야 나의 동맹이지."
20047-CVGroup_UIEventMission_Buy2-1 = "당신이 활약하니 나도 힘이 나네. 한 팀이니 당연한 건가?"
20047-CVGroup_UIEventMission_Interaction1-1 = "오늘 업무도 수고했어. 이건 내가 준비한 상이야."

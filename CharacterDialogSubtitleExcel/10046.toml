[translation]
10046-CVGroup_UITitle_Idle1-1 = "블루 아카이브-!"
10046-CVGroup_CharacterGet_Idle1-1 = "주군! 여름이에요! 바다예요! 이즈나예요!\n이즈나와 함께, 잔뜩 놀아주실 거죠?! 닌닌~!"
10046-CVGroup_Cafe_Idle1-1 = "다음엔 무엇을 하고 놀까요?\n수박 깨기? 물총 싸움~? 이즈나, 전부 기대돼요~"
10046-CVGroup_Cafe_Idle2-1 = "이즈나이즈나~ 캥캥~♪"
10046-CVGroup_Cafe_Idle3-1 = "부장과 츠쿠요 공은, 지금쯤 무얼 하고 있을까요~?"
10046-CVGroup_Cafe_Idle4-1 = "이즈나류 인법의 여름 버전은 완성되었지만,\n다음은 겨울 버전도 생각해둬야겠네요…"
10046-CVGroup_Cafe_Idle5-1 = "에어컨이란 건 굉장하네요! 여름에도 이렇게나 시원하다니~\n무, 물론! 닌자라면 이런 더위쯤은 참을 수 있지만요~!"
10046-CVGroup_WeaponGet_Idle1-1 = "주군께서 직접 준비해주신…. 이즈나를 위한 여름용 닌자도구…!\n기뻐요! 주군! 이즈나! 앞으로도 주군의 기대에 부응하기 위해! 전력을 다하겠습니다! 에헤헷!"
10046-CVGroup_UIEventLobby_Enter1-1 = "주군~ 여기~ 여기예요~! 여기에 이즈나가 자리를 잡아 뒀습니다!"
10046-CVGroup_UIEventLobby_Enter2-1 = "앗, 기다리고 있었습니다! 주군! 이즈나는 준비되었습니다! 부디 명령을!"
10046-CVGroup_UIEventLobby_Idle1-1 = "바다의 집이, 이번 임무의 거점……!"
10046-CVGroup_UIEventLobby_Idle1-2 = "거점이라고 하니, 뭔가 닌자 같네요!"
10046-CVGroup_UIEventLobby_Idle2-1 = "흥흥흥~♪ 바다의 집엔 여러 음식이 잔뜩이네요!"
10046-CVGroup_UIEventLobby_Idle2-2 = "주군은 어떤 게 좋으신가요? 빙수? 타코야키?"
10046-CVGroup_UIEventLobby_Idle2-3 = "이즈나는 주군과 함께라면 뭐든 맛있어요~!"
10046-CVGroup_UIEventLobby_Idle3-1 = "어떤 위험이나 고난에 직면해도 정면으로 맞서는 저 모습…."
10046-CVGroup_UIEventLobby_Idle3-2 = "혹시… 시즈코 공은, 닌자인 걸까요?"
10046-CVGroup_UIEventLobby_Idle4-1 = "무엇이든 말씀만 내려주세요!"
10046-CVGroup_UIEventLobby_Idle4-2 = "닌자처럼 샤샥- 해결하겠습니다!"
10046-CVGroup_UIEventLobby_Enter3-1 = "이번엔 이즈나와 주군뿐만 아니라 많은 분들이 협력해 주고 있어요!"
10046-CVGroup_UIEventLobby_Enter3-2 = "왠지 떠들썩하고 즐겁네요. 주군!"
10046-CVGroup_UIEventLobby_Enter4-1 = "꿀꺽… 주군과 함께한 임무도 벌써 여기까지 온 건가요…!"
10046-CVGroup_UIEventLobby_Enter4-2 = "이즈나도 모두에게 지지 않도록! 노력할게요! 닌닌!"
10046-CVGroup_UIEventLobby_Enter5-1 = "이번 여름은, 엄청난 일이 잔뜩이었어요!\n말 그대로 이즈나의 눈이 빙글빙글 돌 정도로…."
10046-CVGroup_UIEventLobby_Enter5-2 = "……그래도 이즈나는 매일이, 엄청 즐거웠어요! 에헤헷! 감사합니다! 주군!"

[translation]
10046-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10046-CVGroup_CharacterGet_Idle1-1 = "My lord, it's summer! We're on the beach! Can you play with Izuna?! Nin nin!"
10046-CVGroup_Cafe_Idle1-1 = "What should we play next? Watermelon crush? Water guns? Izuna is excited about everything!"
10046-CVGroup_Cafe_Idle2-1 = "Izuna, on the lookout! ♪"
10046-CVGroup_Cafe_Idle3-1 = "What do you think the president and Tsukuyo are doing right now?"
10046-CVGroup_Cafe_Idle4-1 = "The Izuna-Style Ninjutsu: Summer Version is complete! Izuna should consider a winter version too."
10046-CVGroup_Cafe_Idle5-1 = "AC is so wonderful! Izuna can't believe it can keep her cool in this heat! I-Izuna means, a ninja can withstand this kind of heat without a problem!"
10046-CVGroup_WeaponGet_Idle1-1 = "You prepared a summer ninja tool just for Izuna! Izuna is so happy, my lord! Izuna will do her best to live up to your expectations! Heeheehee!"
10046-CVGroup_UIEventLobby_Enter1-1 = "My lord, here! Over here! Izuna got a spot!"
10046-CVGroup_UIEventLobby_Enter2-1 = "Oh, Izuna has been waiting, my lord! Izuna is yours to command!"
10046-CVGroup_UIEventLobby_Idle1-1 = "The Beach Shack is our base for this mission."
10046-CVGroup_UIEventLobby_Idle1-2 = "The word \"base\" makes Izuna feel like a real ninja!"
10046-CVGroup_UIEventLobby_Idle2-1 = "Hm hm hm. ♪ The Beach Shack has all kinds of food!"
10046-CVGroup_UIEventLobby_Idle2-2 = "What would you like, my lord? Shaved ice? Takoyaki?"
10046-CVGroup_UIEventLobby_Idle2-3 = "Everything is delicious as long as Izuna is with you, my lord!"
10046-CVGroup_UIEventLobby_Idle3-1 = "She always faces danger and challenges head-on..."
10046-CVGroup_UIEventLobby_Idle3-2 = "Is it possible that Shizuko is...a ninja?"
10046-CVGroup_UIEventLobby_Idle4-1 = "Let me know if you need anything!"
10046-CVGroup_UIEventLobby_Idle4-2 = "Izuna will get it done in a flash, like a ninja!"
10046-CVGroup_UIEventLobby_Enter3-1 = "We've got many people on our side this time, my lord!"
10046-CVGroup_UIEventLobby_Enter3-2 = "It's boisterous and fun, my lord!"
10046-CVGroup_UIEventLobby_Enter4-1 = "*gulp* But we've already come so far in our mission...!"
10046-CVGroup_UIEventLobby_Enter4-2 = "Izuna is gonna work hard to prove herself to everyone! Nin nin!"
10046-CVGroup_UIEventLobby_Enter5-1 = "So much happened this summer! It makes Izuna's head spin..."
10046-CVGroup_UIEventLobby_Enter5-2 = "...But every day was so fun! Heeheehee! Thank you, my lord!"

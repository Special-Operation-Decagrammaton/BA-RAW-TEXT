[translation]
10046-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
10046-CVGroup_CharacterGet_Idle1-1 = "主公！是夏天，是大海，是伊樹菜！\n會和伊樹菜一起，盡情的玩吧！？忍忍！"
10046-CVGroup_Cafe_Idle1-1 = "接下來要玩什麼呢？\n打西瓜嗎？水槍嗎？\n不管是哪個伊樹菜都好期待！"
10046-CVGroup_Cafe_Idle2-1 = "伊樹菜伊樹菜～\n♪～♪～♪～"
10046-CVGroup_Cafe_Idle3-1 = "部長和月夜大人，\n現在在做什麼呢？"
10046-CVGroup_Cafe_Idle4-1 = "伊樹菜流忍術・夏季版本已經完成了，接下來也必須考慮冬季版本呢…"
10046-CVGroup_Cafe_Idle5-1 = "冷氣真厲害呢！\n沒想到夏天也能這麼涼快……！\n當，當然！這種程度忍者可以忍受！"
10046-CVGroup_WeaponGet_Idle1-1 = "主公親自準備的…為了伊樹菜的夏季用忍具…！\n好開心，主公！伊樹菜，今後也會為了回應主公的期待，盡全力的哦！耶嘿嘿！"
10046-CVGroup_UIEventLobby_Enter1-1 = "主公～！這裡！在這裡～！\n伊樹菜已經為您準備好了座位！"
10046-CVGroup_UIEventLobby_Enter2-1 = "啊，恭候多時了！主公！\n伊樹菜已經準備就緒！請儘管吩咐！"
10046-CVGroup_UIEventLobby_Idle1-1 = "海之家是這次的據點……！"
10046-CVGroup_UIEventLobby_Idle1-2 = "聽到據點，總覺得很像忍者呢！"
10046-CVGroup_UIEventLobby_Idle2-1 = "哼哼哼～♪海之家有各式各樣的料理呢！"
10046-CVGroup_UIEventLobby_Idle2-2 = "主公喜歡什麼樣的呢？\n刨冰？章魚燒？"
10046-CVGroup_UIEventLobby_Idle2-3 = "伊樹菜，只要是和主公在一起，什麼都覺得好吃！"
10046-CVGroup_UIEventLobby_Idle3-1 = "無論面對什麼樣的危險和苦難都正面面對的姿態……"
10046-CVGroup_UIEventLobby_Idle3-2 = "難道說……靜子閣下是忍者嗎？"
10046-CVGroup_UIEventLobby_Idle4-1 = "請儘管吩咐！"
10046-CVGroup_UIEventLobby_Idle4-2 = "像忍者一樣唰唰唰地解決吧！"
10046-CVGroup_UIEventLobby_Enter3-1 = "這次不僅是伊樹菜和主公，很多的人都來幫忙了。"
10046-CVGroup_UIEventLobby_Enter3-2 = "總覺得很熱鬧很開心呢，主公！"
10046-CVGroup_UIEventLobby_Enter4-1 = "（吞口水）……和主公一起進行的任務，終於漸入佳境了呢……！"
10046-CVGroup_UIEventLobby_Enter4-2 = "伊樹菜也會為了不輸給大家而努力的！忍忍！"
10046-CVGroup_UIEventLobby_Enter5-1 = "這個夏天，有很多厲害的事！\n已經讓伊樹菜的眼睛到轉圈圈的程度……"
10046-CVGroup_UIEventLobby_Enter5-2 = "……伊樹菜每一天，都非常的開心！耶嘿嘿！謝謝您，主公！"

[translation]
10093-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～"
10093-CVGroup_CharacterGet_Idle1-1 = "啊！是老師！呀齁～！是綺羅羅唷！\n你一直在等我嗎？啊哈哈！真開心！"
10093-CVGroup_Cafe_Idle1-1 = "會不會有感覺能當朋友的孩子呢～"
10093-CVGroup_Cafe_Idle2-1 = "是個挺寬敞的地方呢！\n超喜歡的！"
10093-CVGroup_Cafe_Idle3-1 = "啊？老師！老師！這邊！"
10093-CVGroup_Cafe_Idle4-1 = "把角度調成這樣……嗯！\n好像很適合自拍！"
10093-CVGroup_Cafe_Idle5-1 = "這間咖啡廳也有賣聖代嗎？\n我想吃點甜的東西～"
10093-CVGroup_WeaponGet_Idle1-1 = "老師……這個，是要給我的嗎？\n謝，謝啦……！\n不對，這種時候應該好好道謝才對吧。\n謝謝你，老師。"
10093-CVGroup_UIEventLobby_Enter1-1 = "是開心愉快的修學旅行呢！\n老師也準備好了嗎？"
10093-CVGroup_UIEventLobby_Enter2-1 = "夜櫻綺羅羅，享受準備完畢～！"
10093-CVGroup_UIEventLobby_Enter3-1 = "老師也在享受旅行嗎？"
10093-CVGroup_UIEventLobby_Enter3-2 = "真讚！我也超享受的唷！"
10093-CVGroup_UIEventLobby_Enter4-1 = "旅行結束雖然令人遺憾……"
10093-CVGroup_UIEventLobby_Enter4-2 = "沒關係。開心的事之後還會有很多很多！"
10093-CVGroup_UIEventLobby_Enter5-1 = "呼啊！直到最後都沒有空檔休息呢！\n超開心的！"
10093-CVGroup_UIEventLobby_Idle1-1 = "期待的事？"
10093-CVGroup_UIEventLobby_Idle1-2 = "新的地方、新的美食，還有最重要的……新朋友們吧！"
10093-CVGroup_UIEventLobby_Idle2-1 = "我找到一個感覺能拍出好照片的地方，老師要不要一起去？"
10093-CVGroup_UIEventLobby_Idle2-2 = "是在那裡的一棵超大的樹……！"
10093-CVGroup_UIEventLobby_Idle3-1 = "嗯？怎麼了？\n發生了什麼有趣的事嗎？"
10093-CVGroup_UIEventLobby_Idle4-1 = "啊哈哈！真巧呢！\n我也正在看著老師哦！"
10093-CVGroup_UIEventCardShop_Enter1-1 = "歡迎，老師！準備好了嗎？"
10093-CVGroup_UIEventCardShop_Enter2-1 = "會出現什麼呢～不覺得很期待嗎？"
10093-CVGroup_UIEventCardShop_Enter3-1 = "努力到最後吧，老師！"
10093-CVGroup_UIEventCardShop_Idle1-1 = "哪張會中獎呢～"
10093-CVGroup_UIEventCardShop_Idle2-1 = "反正不抽也不會知道，儘管抽吧！"
10093-CVGroup_UIEventCardShop_Prize3-1 = "哇！是超級稀有的卡片耶！\n老師好厲害！"
10093-CVGroup_UIEventCardShop_Prize2-1 = "是張好卡片呢！恭喜你！"
10093-CVGroup_UIEventCardShop_Prize1-1 = "雖然是常見的卡片……\n不過卡面很可愛，也不錯吧？"
10093-CVGroup_UIEventCardShop_Prize0-1 = "啊，這，這我倒是沒料到……"
10093-CVGroup_UIEventCardShop_Prize0-2 = "別，別失望！老師！還有下一次的！"

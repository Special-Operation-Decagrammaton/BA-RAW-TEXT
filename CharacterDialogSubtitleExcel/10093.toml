[translation]
10093-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10093-CVGroup_CharacterGet_Idle1-1 = "อ๊ะ! ครูนี่นา! ยะโฮ! นี่คิราระเอง!\nกำลังรอฉันอยู่เหรอ? อะฮ่าฮ่า! ดีใจจัง!"
10093-CVGroup_Cafe_Idle1-1 = "จะมีเพื่อนคนไหนที่จะสนิทด้วยได้มั้ยน้า~"
10093-CVGroup_Cafe_Idle2-1 = "ที่นี่กว้างจังเลย! ถูกใจจัง!"
10093-CVGroup_Cafe_Idle3-1 = "อ๊ะ? ครู! ครู! ทางนี้!"
10093-CVGroup_Cafe_Idle4-1 = "ถ้าจัดองศาแบบนี้ละก็...\nอื้ม! ก็จะเหมาะกับการถ่ายรูปเซลฟี่เลย!"
10093-CVGroup_Cafe_Idle5-1 = "คาเฟ่นี้ขายพาร์เฟต์ด้วยมั้ยนะ?\nอยากกินอะไรหวานๆ จัง~"
10093-CVGroup_WeaponGet_Idle1-1 = "ครู... อันนี้ให้ฉันงั้นเหรอ? ตะ... แต๊งกิ้วนะ...!\nไม่สิ เวลาแบบนี้ต้องขอบคุณให้เหมาะสมรึเปล่านะ\nขอบคุณนะคุณครู"
10093-CVGroup_UIEventLobby_Enter1-1 = "ทัศนศึกษาสนุกมากเลย!\nครูก็พร้อมแล้วหรือยัง?"
10093-CVGroup_UIEventLobby_Enter2-1 = "โยซากุระ คิราระ\nพร้อมไปสนุกแล้วละ!"
10093-CVGroup_UIEventLobby_Enter3-1 = "ครูสนุกกับการทัวร์อยู่มั้ย?"
10093-CVGroup_UIEventLobby_Enter3-2 = "ดีเลย! ฉันเองก็กำลังสนุกสุดเหวี่ยงเลย!"
10093-CVGroup_UIEventLobby_Enter4-1 = "น่าเสียดายจังเลยที่การทัวร์ครั้งนี้จบลง..."
10093-CVGroup_UIEventLobby_Enter4-2 = "แต่ไม่เป็นไรหรอก เดี๋ยวก็มีเรื่องสนุกอื่นอีก!"
10093-CVGroup_UIEventLobby_Enter5-1 = "เฮ้อ! ไม่ได้พักจนถึงตอนสุดท้ายเลยสินะ!\nสนุกสุดๆ ไปเลย!"
10093-CVGroup_UIEventLobby_Idle1-1 = "สิ่งที่ตั้งตารอเหรอ?"
10093-CVGroup_UIEventLobby_Idle1-2 = "สถานที่ใหม่ๆ ของกินใหม่ๆ\nและที่สำคัญที่สุด... ก็คือเพื่อนใหม่ไงล่ะ!"
10093-CVGroup_UIEventLobby_Idle2-1 = "ฉันเจอที่ที่น่าจะถ่ายรูปสวยมาด้วยแหละ\nคุณครูคิดว่าไง?"
10093-CVGroup_UIEventLobby_Idle2-2 = "ต้นไม้ต้นใหญ่ๆ ที่อยู่ทางโน้นน่ะ...!"
10093-CVGroup_UIEventLobby_Idle3-1 = "หืม? มีอะไรเหรอ?\nเจอเรื่องอะไรน่าสนุกๆ เหรอ?"
10093-CVGroup_UIEventLobby_Idle4-1 = "อะฮ่าฮ่า! บังเอิญจัง!\nฉันก็มองครูอยู่พอดีเลย!"
10093-CVGroup_UIEventCardShop_Enter1-1 = "เชิญเลยครู! พร้อมรึยัง?"
10093-CVGroup_UIEventCardShop_Enter2-1 = "จะได้อะไรน้า~ ตื่นเต้นมั้ย?"
10093-CVGroup_UIEventCardShop_Enter3-1 = "สู้ๆ จนจบงานเลยนะครู!"
10093-CVGroup_UIEventCardShop_Idle1-1 = "จะได้ของชิ้นไหนน้า~"
10093-CVGroup_UIEventCardShop_Idle2-1 = "ถ้าไม่ลองสุ่มก็ไม่รู้นะ\nไม่ต้องลังเลแล้ว สุ่มเลย!"
10093-CVGroup_UIEventCardShop_Prize3-1 = "ว้าว! นี่มันการ์ดหายากนี่นา!\nสุดยอดไปเลยครู!"
10093-CVGroup_UIEventCardShop_Prize2-1 = "ได้การ์ดดีเลย! ดีใจด้วยนะ!"
10093-CVGroup_UIEventCardShop_Prize1-1 = "พอดูไปดูมาบ่อยๆ แล้วมันก็...\nรูปมันก็น่ารักดีอยู่หรอกนะ?"
10093-CVGroup_UIEventCardShop_Prize0-1 = "อ๊ะ อะ... อันนี้ฉันคาดไม่ถึงแฮะ..."
10093-CVGroup_UIEventCardShop_Prize0-2 = "อย่าผิดหวังไปเลยนะครู!\nยังมีครั้งหน้าอีกนะ!"

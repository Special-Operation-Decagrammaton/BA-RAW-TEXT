[translation]
10093-CVGroup_UITitle_Idle1-1 = "블루 아카이브~"
10093-CVGroup_CharacterGet_Idle1-1 = "아! 쌤이다! 야호-! 키라라야! 나 기다리고 있었어? 아하핫! 기쁘다!"
10093-CVGroup_Cafe_Idle1-1 = "어디, 친해질 만한 친구가 있으려나~"
10093-CVGroup_Cafe_Idle2-1 = "꽤 넓은 곳이네! 완전 마음에 들지도!"
10093-CVGroup_Cafe_Idle3-1 = "앗? 쌤! 쌤! 여기야!"
10093-CVGroup_Cafe_Idle4-1 = "각도를 이렇게 하면…… 응! 셀카 찍기에 딱일 거 같아!"
10093-CVGroup_Cafe_Idle5-1 = "이 카페, 파르페도 파는 걸까? 달콤한 게 먹고 싶은데~"
10093-CVGroup_WeaponGet_Idle1-1 = "쌤…… 이거, 나한테 주는 거라고? 때, 땡큐……!\n아니, 이럴 땐 제대로 인사해야 하려나. 고마워, 선생님."
10093-CVGroup_UIEventLobby_Enter1-1 = "즐거운 수학여행이네! 쌤도 준비됐어?"
10093-CVGroup_UIEventLobby_Enter2-1 = "요자쿠라 키라라, 즐길 준비 완료!"
10093-CVGroup_UIEventLobby_Enter3-1 = "쌤도 여행을 즐기는 중이야?"
10093-CVGroup_UIEventLobby_Enter3-2 = "좋네! 나도 완전 만끽하는 중이거든!"
10093-CVGroup_UIEventLobby_Enter4-1 = "여행이 끝나가는 건 아쉽지만……"
10093-CVGroup_UIEventLobby_Enter4-2 = "괜찮아, 즐거운 일은 또 있으니까!"
10093-CVGroup_UIEventLobby_Enter5-1 = "후아! 마지막까지 쉴 틈 없었네! 완전 즐거웠어!"
10093-CVGroup_UIEventLobby_Idle1-1 = "기대되는 것?"
10093-CVGroup_UIEventLobby_Idle1-2 = "새로운 장소, 새로운 먹거리, 그리고 무엇보다…… 새로운 친구들이지!"
10093-CVGroup_UIEventLobby_Idle2-1 = "사진 잘 나올 만한 곳을 찾았는데, 선생님도 어때?"
10093-CVGroup_UIEventLobby_Idle2-2 = "저기에 있는 엄청 큰 나무인데……!"
10093-CVGroup_UIEventLobby_Idle3-1 = "응? 무슨 일? 뭐 재밌는 거라도 찾았어?"
10093-CVGroup_UIEventLobby_Idle4-1 = "아하핫! 우연이네! 나도 쌤을 보고 있었거든!"
10093-CVGroup_UIEventCardShop_Enter1-1 = "어서 와, 쌤! 준비는 됐어?"
10093-CVGroup_UIEventCardShop_Enter2-1 = "뭐가 나올까~ 설레지 않아?"
10093-CVGroup_UIEventCardShop_Enter3-1 = "마지막까지 힘내자, 쌤!"
10093-CVGroup_UIEventCardShop_Idle1-1 = "어떤 게 당첨일까~"
10093-CVGroup_UIEventCardShop_Idle2-1 = "뽑아보지 않으면 모르니까, 거침없이 뽑자!"
10093-CVGroup_UIEventCardShop_Prize3-1 = "우와! 완전 레어 카드잖아! 쌤, 대단해!"
10093-CVGroup_UIEventCardShop_Prize2-1 = "좋은 카드인걸! 축하해!"
10093-CVGroup_UIEventCardShop_Prize1-1 = "자주 보는 거지만…… 그림이 귀여우니 좋잖아?"
10093-CVGroup_UIEventCardShop_Prize0-1 = "앗, 이, 이건 예상 못 했는데……."
10093-CVGroup_UIEventCardShop_Prize0-2 = "실망하지 마, 쌤! 다음이 있잖아!"

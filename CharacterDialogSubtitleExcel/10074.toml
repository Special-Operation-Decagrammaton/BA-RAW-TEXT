10074-CVGroup_UIEventLobby_Idle2-1 = "어머, 선생님에게 이런 면이 있었다니♡"
10074-CVGroup_UIEventLobby_Idle3-1 = "여기서 선생님이 하신 거, 다 기억하고 있다구요~?"

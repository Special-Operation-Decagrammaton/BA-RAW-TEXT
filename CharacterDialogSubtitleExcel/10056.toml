[translation]
10056-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10056-CVGroup_CharacterGet_Idle1-1 = "Merry Christmas! I'm Serina of the Remedial Knights! I hope you have a very special Christmas!"
10056-CVGroup_Cafe_Idle1-1 = "Be sure not to catch a cold!"
10056-CVGroup_Cafe_Idle2-1 = "Is a first aid kit an appropriate gift...?"
10056-CVGroup_Cafe_Idle3-1 = "What kinds of gifts do good children like?"
10056-CVGroup_Cafe_Idle4-1 = "Don't push yourself too hard. Health always comes first."
10056-CVGroup_Cafe_Idle5-1 = "I wish you the best of health!"
10056-CVGroup_WeaponGet_Idle1-1 = "Oh, thank you. But, Sensei, haven't you heard that Santa doesn't give presents to children who cry? So, no crying!"
10056-CVGroup_UIEventLobby_Enter1-1 = "Sensei! It's Christmas!"
10056-CVGroup_UIEventLobby_Enter2-1 = "My heart is racing. I'm so excited."
10056-CVGroup_UIEventLobby_Enter2-2 = "I hope to deliver everyone the gift of happiness."
10056-CVGroup_UIEventLobby_Enter2-3 = "Do you have any plans for Christmas?"
10056-CVGroup_UIEventLobby_Enter2-4 = "If you...don't mind...maybe the two of us..."
10056-CVGroup_UIEventLobby_Enter2-5 = "O-Oh, never mind. It's nothing!"
10056-CVGroup_UIEventLobby_Idle1-1 = "Yes! It's Santa Serina!"
10056-CVGroup_UIEventLobby_Idle2-1 = "Is there anything I can do to help?"
10056-CVGroup_UIEventLobby_Idle3-1 = "This Christmas, please call Santa Serina!"
10056-CVGroup_UIEventLobby_Idle4-1 = "Sensei? What's happening?"
10056-CVGroup_UIEventShop_Enter1-1 = "This way for the Christmas donation charity!"
10056-CVGroup_UIEventShop_Enter2-1 = "Please consider donating to those in need!"
10056-CVGroup_UIEventShop_Idle1-1 = "Sensei, please let me assist you."
10056-CVGroup_UIEventShop_Idle2-1 = "I hope Hanae is okay..."
10056-CVGroup_UIEventShop_Buy1-1 = "Thank you. This is for you."
10056-CVGroup_UIEventShop_Buy2-1 = "Merry Christmas! Have a wonderful day!"
10056-CVGroup_UIEventShop_Buy3-1 = "This is so precious... Are you sure you want to donate this?"
10056-CVGroup_UIEventShop_Enter3-1 = "The Christmas donation charity is over."
10056-CVGroup_UIEventShop_Enter3-2 = "Please make sure you didn't forget anything!"

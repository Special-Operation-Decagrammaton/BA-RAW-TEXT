[translation]
10056-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10056-CVGroup_CharacterGet_Idle1-1 = "聖誕快樂！我是救護騎士團的芹奈！\n一起度過特別的聖誕節吧！"
10056-CVGroup_Cafe_Idle1-1 = "請大家小心不要感冒了。"
10056-CVGroup_Cafe_Idle2-1 = "急救藥品也能當禮物嗎……"
10056-CVGroup_Cafe_Idle3-1 = "送給乖孩子的禮物……\n什麼比較好呢？"
10056-CVGroup_Cafe_Idle4-1 = "逞強是不行的唷。\n健康最重要。"
10056-CVGroup_Cafe_Idle5-1 = "我誠心祈禱，\n大家都能身體健康。"
10056-CVGroup_WeaponGet_Idle1-1 = "哇，謝謝。你知道嗎？\n聖誕老人是不會送禮物給正在哭的孩子的。\n所以，請老師不要哭哦？"
10056-CVGroup_UIEventLobby_Enter1-1 = "老師！聖誕節到了唷！"
10056-CVGroup_UIEventLobby_Enter2-1 = "連我都興奮不已呢。"
10056-CVGroup_UIEventLobby_Enter2-2 = "希望大家都能收到名為「幸福」的禮物……"
10056-CVGroup_UIEventLobby_Enter2-3 = "今年的聖誕節，您有什麼計畫嗎？"
10056-CVGroup_UIEventLobby_Enter2-4 = "那個……如果可以的話，我們兩人……"
10056-CVGroup_UIEventLobby_Enter2-5 = "不，沒有，什麼都沒有！"
10056-CVGroup_UIEventLobby_Idle1-1 = "沒錯！是聖誕老人芹奈唷！"
10056-CVGroup_UIEventLobby_Idle2-1 = "有什麼需要幫忙的嗎？"
10056-CVGroup_UIEventLobby_Idle3-1 = "聖誕節的時候，請呼叫聖誕老人芹奈唷！"
10056-CVGroup_UIEventLobby_Idle4-1 = "老師？怎麼了嗎？"
10056-CVGroup_UIEventShop_Enter1-1 = "聖誕節的慈善募款在這裡！"
10056-CVGroup_UIEventShop_Enter2-1 = "請捐款給那些有困難的人！"
10056-CVGroup_UIEventShop_Idle1-1 = "老師，請讓我幫點忙吧。"
10056-CVGroup_UIEventShop_Idle2-1 = "花繪醬，不要緊吧……"
10056-CVGroup_UIEventShop_Buy1-1 = "非常感謝。\n來，這是禮物唷。"
10056-CVGroup_UIEventShop_Buy2-1 = "聖誕快樂！\n祝你有美好的一天！"
10056-CVGroup_UIEventShop_Buy3-1 = "這麼貴重的東西……捐出來沒關係嗎？"
10056-CVGroup_UIEventShop_Enter3-1 = "聖誕節慈善募款結束了。"
10056-CVGroup_UIEventShop_Enter3-2 = "請確認有沒有未完成的事。"

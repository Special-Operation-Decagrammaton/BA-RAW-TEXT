[translation]
10056-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10056-CVGroup_CharacterGet_Idle1-1 = "메리 크리스마스! 구호기사단의 세리나입니다! 특별한 크리스마스 보내세요!"
10056-CVGroup_Cafe_Idle1-1 = "모두, 감기 조심하세요."
10056-CVGroup_Cafe_Idle2-1 = "구급약도 선물이 될 수 있으려나……"
10056-CVGroup_Cafe_Idle3-1 = "착한 아이에게 보내는 선물…… 뭐가 좋을까요?"
10056-CVGroup_Cafe_Idle4-1 = "무리하면 안 돼요. 건강이 최고랍니다."
10056-CVGroup_Cafe_Idle5-1 = "여러분의 건강을 진심으로 기원 하겠습니다."
10056-CVGroup_WeaponGet_Idle1-1 = "와, 감사합니다. 알고 계신가요?\n산타 할아버지는 우는 아이에게는 선물을 줄 수 없대요.\n그러니까 선생님은 울면 안 돼요?"
10056-CVGroup_UIEventLobby_Enter1-1 = "선생님! 크리스마스가 왔어요!"
10056-CVGroup_UIEventLobby_Enter2-1 = "저까지 가슴이 두근거리네요."
10056-CVGroup_UIEventLobby_Enter2-2 = "모두에게 행복이라는 이름의 선물이 내리길……"
10056-CVGroup_UIEventLobby_Enter2-3 = "이번 크리스마스, 뭔가 예정이라도 있으신가요?"
10056-CVGroup_UIEventLobby_Enter2-4 = "혹시…… 괜찮으시다면, 저와 둘이서……"
10056-CVGroup_UIEventLobby_Enter2-5 = "아, 아뇨. 아무것도 아니에요!"
10056-CVGroup_UIEventLobby_Idle1-1 = "네! 산타 세리나예요!"
10056-CVGroup_UIEventLobby_Idle2-1 = "도와드릴 일이 있을까요?"
10056-CVGroup_UIEventLobby_Idle3-1 = "크리스마스에는, 산타 세리나를 찾아 주세요!"
10056-CVGroup_UIEventLobby_Idle4-1 = "선생님? 무슨 일이라도 있으세요?"
10056-CVGroup_UIEventShop_Enter1-1 = "크리스마스 자선 모금은 이쪽입니다!"
10056-CVGroup_UIEventShop_Enter2-1 = "어려운 분들을 위해서 기부 부탁드려요!"
10056-CVGroup_UIEventShop_Idle1-1 = "선생님, 뭐든지 돕게 해주세요."
10056-CVGroup_UIEventShop_Idle2-1 = "하나에 쨩, 괜찮을까……"
10056-CVGroup_UIEventShop_Buy1-1 = "감사합니다. 자, 여기 선물이에요."
10056-CVGroup_UIEventShop_Buy2-1 = "메리 크리스마스! 멋진 하루 되세요!"
10056-CVGroup_UIEventShop_Buy3-1 = "이렇게 귀중한 것까지…… 기부해 주셔도 괜찮으신가요?"
10056-CVGroup_UIEventShop_Enter3-1 = "크리스마스 자선 모금은 종료됐습니다."
10056-CVGroup_UIEventShop_Enter3-2 = "빠트린 것은 없는지 확인해 주세요."

[translation]
26009-CVGroup_UITitle_Idle1-1 = "Blue...Archive..."
26009-CVGroup_CharacterGet_Idle1-1 = "It's me, Hanaoka Yuzu... Um, I look a little different right now because of...a few reasons. Thanks for your help..."
26009-CVGroup_Cafe_Idle1-1 = "I'm a maid right now... So maybe I should...clean something?"
26009-CVGroup_Cafe_Idle2-1 = "Is a maid that develops games...something people would like?"
26009-CVGroup_Cafe_Idle3-1 = "Ugh...I wanna hide somewhere..."
26009-CVGroup_Cafe_Idle4-1 = "For an infiltration mission...cardboard boxes are a necessity."
26009-CVGroup_Cafe_Idle5-1 = "Welcome, Master. Um...like I thought, it's too embarrassing..."
26009-CVGroup_WeaponGet_Idle1-1 = "This... You must've gone to such lengths for this... I'm so happy! I promise to work even harder from now on, Sensei... You'll see!"
26009-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Um..."
26009-CVGroup_UIEventLobby_Enter1-2 = "Welcome, Master."
26009-CVGroup_UIEventLobby_Enter2-1 = "There's so many people here... I'm not used to crowds..."
26009-CVGroup_UIEventLobby_Enter2-2 = "But I can think of it like a special event, right?"
26009-CVGroup_UIEventLobby_Enter3-1 = "Cleaning, hosting..."
26009-CVGroup_UIEventLobby_Enter3-2 = "Ugh... I just wish there were fewer guests..."
26009-CVGroup_UIEventLobby_Enter4-1 = "Th-There's big trouble!"
26009-CVGroup_UIEventLobby_Enter4-2 = "Sensei...please help me!"
26009-CVGroup_UIEventLobby_Enter5-1 = "I still can't believe all of that happened..."
26009-CVGroup_UIEventLobby_Enter5-2 = "But...it all turned out okay. Thanks to you."
26009-CVGroup_UIEventLobby_Idle1-1 = "Th-The box... Where is the box...? Without it, I..."
26009-CVGroup_UIEventLobby_Idle1-2 = "Oh! You found it!"
26009-CVGroup_UIEventLobby_Idle1-3 = "Thank you, Sensei."
26009-CVGroup_UIEventLobby_Idle2-1 = "Um... Even though it was scary..."
26009-CVGroup_UIEventLobby_Idle2-2 = "...all of this might be good inspiration for the game I'm working on..."
26009-CVGroup_UIEventLobby_Idle3-1 = "Sensei, will...will I do okay?"
26009-CVGroup_UIEventLobby_Idle4-1 = "Ugh... I really want to go home and play games..."
26009-CVGroup_UIEventLobby_Idle4-2 = "But I can't just sit here being scared... That helps no one."
26009-CVGroup_UIEventLobby_Idle4-3 = "After all, if I don't try to do everything I can..."

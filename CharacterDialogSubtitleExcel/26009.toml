[translation]
26009-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브……"
26009-CVGroup_CharacterGet_Idle1-1 = "하나오카 유즈…… 예요.\n사정이 있어서… 지금은 이 모습을 하고 있어요.\n잘, 부탁드립니다……"
26009-CVGroup_Cafe_Idle1-1 = "지금의 나는 메이드니까... 청소라도 해볼까…"
26009-CVGroup_Cafe_Idle2-1 = "게임을 만드는 메이드…… 새로울지도?"
26009-CVGroup_Cafe_Idle3-1 = "으으…… 어디론가 숨고 싶어……"
26009-CVGroup_Cafe_Idle4-1 = "골판지 상자는…… 잠입의 필수품인데……"
26009-CVGroup_Cafe_Idle5-1 = "어서 오세요, 주인님. 으으, 역시 부끄러워……."
26009-CVGroup_WeaponGet_Idle1-1 = "이, 이렇게까지 해주시다니…… 그런…… 굉장히 기뻐요.\n……저, 더 열심히 할게요. ……지켜봐 주세요, 선생님!"
26009-CVGroup_UIEventLobby_Enter1-1 = "선생님! 저기…"
26009-CVGroup_UIEventLobby_Enter1-2 = "어서 오세요, 주인님."
26009-CVGroup_UIEventLobby_Enter2-1 = "이렇게나 많은 사람이 있는 곳은, 익숙하지 않아서…"
26009-CVGroup_UIEventLobby_Enter2-2 = "이것도 어떻게 보면, 이벤트라고는 생각하지만요…"
26009-CVGroup_UIEventLobby_Enter3-1 = "청소에 접대에…"
26009-CVGroup_UIEventLobby_Enter3-2 = "으으… 손님들이 조금만 적었어도…"
26009-CVGroup_UIEventLobby_Enter4-1 = "큰, 큰일이 나 버렸어요…!"
26009-CVGroup_UIEventLobby_Enter4-2 = "선생님… 도와주세요…!"
26009-CVGroup_UIEventLobby_Enter5-1 = "그런 일이 일어났다니, 아직도 믿을 수 없어요…"
26009-CVGroup_UIEventLobby_Enter5-2 = "해결할 수 있었던 건, 다 선생님 덕분이에요."
26009-CVGroup_UIEventLobby_Idle1-1 = "사, 상자가…! 상자가, 어디 있죠…? 그게 없으면, 저는…"
26009-CVGroup_UIEventLobby_Idle1-2 = "아, 찾아 주셨군요…!"
26009-CVGroup_UIEventLobby_Idle1-3 = "감사합니다. 선생님…"
26009-CVGroup_UIEventLobby_Idle2-1 = "그… 굉장히, 무섭지만…"
26009-CVGroup_UIEventLobby_Idle2-2 = "이 경험은, 게임으로 살릴 수 있을지도 모르니…"
26009-CVGroup_UIEventLobby_Idle3-1 = "선생님. 저… 잘할 수 있을까요?"
26009-CVGroup_UIEventLobby_Idle4-1 = "으으…돌아가서 게임 하고 싶어…"
26009-CVGroup_UIEventLobby_Idle4-2 = "하지만, 떨기만 하면 안 되겠죠."
26009-CVGroup_UIEventLobby_Idle4-3 = "제가 할 수 있는 일을 하지 않으면…"

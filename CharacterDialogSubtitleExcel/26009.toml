[translation]
26009-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
26009-CVGroup_CharacterGet_Idle1-1 = "ฉันคือ... ฮานาโอกะ ยูสึค่ะ\nพอดีฉันมีเหตุจำเป็น... ก็เลยได้ใส่ชุดแบบนี้ค่ะ\nฝากตัวด้วยนะคะ..."
26009-CVGroup_Cafe_Idle1-1 = "ในเมื่อตอนนี้ฉันเป็นเมด...\nไปทำความสะอาดสักหน่อยดีมั้ยนะ..."
26009-CVGroup_Cafe_Idle2-1 = "เมดที่สร้างเกมก็น่าจะ... แปลกใหม่ดีนะ?"
26009-CVGroup_Cafe_Idle3-1 = "งือ... อยากไปซ่อนตัวที่ไหนสักที่จัง..."
26009-CVGroup_Cafe_Idle4-1 = "กล่องกระดาษแข็งนี่... ต้องเอาไว้ใช้ตอนลักลอบบุกนี่นา..."
26009-CVGroup_Cafe_Idle5-1 = "ยินดีต้อนรับค่ะ นายท่าน\nงือ เขินจริงๆ ด้วย..."
26009-CVGroup_WeaponGet_Idle1-1 = "ทะ... ทำให้ถึงขนาดนี้เลย... แบบนั้น... ฉันดีใจมากเลยค่ะ\n...ฉันจะพยายามให้มากขึ้นนะคะ ...คอยเฝ้าดูฉันนะคะคุณครู!"
26009-CVGroup_UIEventLobby_Enter1-1 = "คุณครู! คือว่า... "
26009-CVGroup_UIEventLobby_Enter1-2 = "ยินดีต้อนรับค่ะนายท่าน"
26009-CVGroup_UIEventLobby_Enter2-1 = "ฉันยังไม่คุ้นเคยกับที่ที่มีคนเยอะขนาดนี้น่ะค่ะ..."
26009-CVGroup_UIEventLobby_Enter2-2 = "ฉันคิดว่านี่ก็เป็นงานอย่างหนึ่งเช่นกันค่ะ..."
26009-CVGroup_UIEventLobby_Enter3-1 = "ทั้งทำความสะอาด ทั้งรับลูกค้า..."
26009-CVGroup_UIEventLobby_Enter3-2 = "งือ... ถ้ามีลูกค้าน้อยกว่านี้สักหน่อยก็คงจะดีสิคะ..."
26009-CVGroup_UIEventLobby_Enter4-1 = "กะ... เกิดเรื่องใหญ่แล้วค่ะ...!"
26009-CVGroup_UIEventLobby_Enter4-2 = "คุณครู... ช่วยด้วยค่ะ...!"
26009-CVGroup_UIEventLobby_Enter5-1 = "เกิดเรื่องแบบนั้นได้ยังไง ฉันยังไม่อยากเชื่อเลยค่ะ..."
26009-CVGroup_UIEventLobby_Enter5-2 = "คลี่คลายเรื่องนั้นได้ เพราะได้คุณครูช่วยไว้เลยค่ะ"
26009-CVGroup_UIEventLobby_Idle1-1 = "กะ... กล่อง...! กล่องหายไปไหนแล้วคะ...?\nถ้าไม่มีกล่องใบนั้น ฉันคง..."
26009-CVGroup_UIEventLobby_Idle1-2 = "อ๊ะ ช่วยหามาให้แล้วเหรอคะ...!"
26009-CVGroup_UIEventLobby_Idle1-3 = "ขอบคุณนะคะคุณครู..."
26009-CVGroup_UIEventLobby_Idle2-1 = "นะ... น่ากลัวมากเลย แต่ว่า..."
26009-CVGroup_UIEventLobby_Idle2-2 = "ประสบการณ์นี้อาจจะเป็นประโยชน์ต่อเกมก็ได้..."
26009-CVGroup_UIEventLobby_Idle3-1 = "คุณครูคะ ฉัน... จะทำได้ดีมั้ยคะ?"
26009-CVGroup_UIEventLobby_Idle4-1 = "งือ... อยากกลับไปเล่นเกมจัง..."
26009-CVGroup_UIEventLobby_Idle4-2 = "แต่ว่าจะมาเอาแต่ตัวสั่นอยู่แบบนี้ไม่ได้ใช่มั้ยคะ"
26009-CVGroup_UIEventLobby_Idle4-3 = "ถ้าฉันไม่ยอมทำในสิ่งที่ทำได้ละก็..."

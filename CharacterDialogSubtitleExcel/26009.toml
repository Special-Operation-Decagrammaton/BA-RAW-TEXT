[translation]
26009-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……"
26009-CVGroup_CharacterGet_Idle1-1 = "我是花岡柚子……\n因為各種原因……所以現在打扮成這樣。\n還請，多多指教……"
26009-CVGroup_Cafe_Idle1-1 = "現在的我是女僕……\n要去打掃一下嗎……"
26009-CVGroup_Cafe_Idle2-1 = "會做遊戲的女僕……說不定很新奇？"
26009-CVGroup_Cafe_Idle3-1 = "嗚嗚……好想找地方躲起來……"
26009-CVGroup_Cafe_Idle4-1 = "紙箱雖然是潛入的必備道具……"
26009-CVGroup_Cafe_Idle5-1 = "歡迎回來，主人。\n嗚嗚，果然很害羞……"
26009-CVGroup_WeaponGet_Idle1-1 = "居，居然為我做到這種程度……\n怎麼會……我真的非常開心。\n……我，會更努力的。\n……請看著我哦，老師！"
26009-CVGroup_UIEventLobby_Enter1-1 = "老師！那個……"
26009-CVGroup_UIEventLobby_Enter1-2 = "歡迎回來，主人。"
26009-CVGroup_UIEventLobby_Enter2-1 = "人這麼多的地方，我不太習慣……"
26009-CVGroup_UIEventLobby_Enter2-2 = "雖然我覺得，這某方面來說也算是活動……"
26009-CVGroup_UIEventLobby_Enter3-1 = "打掃跟接待……"
26009-CVGroup_UIEventLobby_Enter3-2 = "嗚嗚，要是客人能再少一點……"
26009-CVGroup_UIEventLobby_Enter4-1 = "出，出大事了……！"
26009-CVGroup_UIEventLobby_Enter4-2 = "老師……請幫幫我……！"
26009-CVGroup_UIEventLobby_Enter5-1 = "竟然會發生那種事，我到現在還不敢相信……"
26009-CVGroup_UIEventLobby_Enter5-2 = "之所以能夠解決，全都是多虧了老師。"
26009-CVGroup_UIEventLobby_Idle1-1 = "箱，箱子呢？箱子跑哪去了？沒有那個的話，我……"
26009-CVGroup_UIEventLobby_Idle1-2 = "啊，你幫我找到了呢……！"
26009-CVGroup_UIEventLobby_Idle1-3 = "謝謝你，老師。"
26009-CVGroup_UIEventLobby_Idle2-1 = "那個……雖然，非常害怕……"
26009-CVGroup_UIEventLobby_Idle2-2 = "但這些經驗，說不定能轉化成遊戲……"
26009-CVGroup_UIEventLobby_Idle3-1 = "老師。我……有辦法做好嗎？"
26009-CVGroup_UIEventLobby_Idle4-1 = "嗚嗚……想回去玩遊戲……"
26009-CVGroup_UIEventLobby_Idle4-2 = "但是，不能光是發抖對吧。"
26009-CVGroup_UIEventLobby_Idle4-3 = "得做我能做的事才行……"

[translation]
20001-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20001-CVGroup_CharacterGet_Idle1-1 = "Originally, Millennium was my master, but starting today...you're my master, Sensei."
20001-CVGroup_Cafe_Idle1-1 = "*sigh* I hate having to study math. I'm so sick of numbers."
20001-CVGroup_Cafe_Idle2-1 = "What a nice place. Someday, I'd love to... Oh! D-Did you hear that just now?!"
20001-CVGroup_Cafe_Idle3-1 = "Taking a rest is sometimes important too."
20001-CVGroup_Cafe_Idle4-1 = "Cute things? Sure, I like them. A lot. Is there something wrong with that?"
20001-CVGroup_Cafe_Idle5-1 = "Neru and Asuna always take the lead. My responsibility is to cover for them."
20001-CVGroup_WeaponGet_Idle1-1 = "The chance of winning a war is proportional to the development of weapons. Watch this, Sensei."

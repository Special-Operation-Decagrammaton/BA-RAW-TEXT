[translation]
20001-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20001-CVGroup_CharacterGet_Idle1-1 = "雖然我原本的主人是千年，但今天…老師是我的主人。"
20001-CVGroup_Cafe_Idle1-1 = "我得學數學才行。\n唉，數字好討厭。"
20001-CVGroup_Cafe_Idle2-1 = "是個漂亮的地方呢…\n我有朝一日也要有個時髦的…\n啊？你，你聽到了嗎！？"
20001-CVGroup_Cafe_Idle3-1 = "偶爾休息也很重要。"
20001-CVGroup_Cafe_Idle4-1 = "可愛的東西？\n我喜歡，而且還是超喜歡，有什麼問題嗎？"
20001-CVGroup_Cafe_Idle5-1 = "因為寧瑠前輩和明日奈前輩都會打頭陣。\n我呢？守在他們身後是我的職責。"
20001-CVGroup_WeaponGet_Idle1-1 = "戰爭的勝率和武器的先進程度成正比，老師。敬請期待我日後的表現。"

[translation]
20001-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
20001-CVGroup_CharacterGet_Idle1-1 = "원래 나의 주인은 밀레니엄이지만 오늘만큼은… 선생님이 주인님이다."
20001-CVGroup_Cafe_Idle1-1 = "수학 공부를 해야 하는데. 하아. 숫자는 지긋지긋해."
20001-CVGroup_Cafe_Idle2-1 = "예쁜 곳이군…. 나도 언젠가 근사한…. 앗? 드, 들은 건 아니겠지?!"
20001-CVGroup_Cafe_Idle3-1 = "때로는 휴식도 중요하지."
20001-CVGroup_Cafe_Idle4-1 = "귀여운 것? 좋아한다. 그것도 엄청. 뭔가 문제라도?"
20001-CVGroup_Cafe_Idle5-1 = "네루 선배나 아스나 선배는 언제나 앞장서니까.\n나? 그들의 등 뒤를 지키는 게 내 역할이지."
20001-CVGroup_WeaponGet_Idle1-1 = "전쟁의 승률은 무기의 발전에 비례하는 법이지.\n선생님. 앞으로의 내 활약을 기대해줘."

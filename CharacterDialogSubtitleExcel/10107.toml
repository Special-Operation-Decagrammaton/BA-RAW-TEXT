[translation]
10107-CVGroup_UITitle_Idle1-1 = "Blue~ Archive~!"
10107-CVGroup_CharacterGet_Idle1-1 = "ฉบับพิเศษค่า ฉบับพิเศษ!\nเลขาของแพนเดโมเนียม โซไซตี้ โมโตมิยะ จิอากิ\nมาถึงชาเล่ต์แล้วค่า~!"
10107-CVGroup_Cafe_Idle1-1 = "เป็นที่ที่น่าสนใจจังเลยนะคะ~!"
10107-CVGroup_Cafe_Idle2-1 = "อาจจะมีเรื่องที่เอาไปทำข่าวดีๆ ได้เลยนะคะ!"
10107-CVGroup_Cafe_Idle3-1 = "อ๊ะ! ฉันก็อยากเป็นเพื่อนกับคนนั้นด้วยค่ะ~!"
10107-CVGroup_Cafe_Idle4-1 = "ถ้าตั้งแผง <แพนเดโมเนียม โซไซตี้รายสัปดาห์> เอาไว้ที่นี่ละก็..."
10107-CVGroup_Cafe_Idle5-1 = "อ๊ะ อันนี้อิบูกิจังคงจะชอบน่าดูเลยนะคะ~!"
10107-CVGroup_WeaponGet_Idle1-1 = "ดีใจจังเลยค่ะ! เหมือนตอนได้ทำสกู๊ปพิเศษเลย\nไม่สิ ยิ่งไปกว่านั้นอีก!"
10107-CVGroup_UIEventLobby_Enter1-1 = "ว้าว~! มีเรื่องน่าสนุกๆ เพียบเลย~!"
10107-CVGroup_UIEventLobby_Enter2-1 = "คุณครู! ทางนี้ค่ะ! ที่นั่งข้างๆ ฉัน!"
10107-CVGroup_UIEventLobby_Enter2-2 = "ฉันจองที่นั่งไว้ให้คุณครูแล้วค่ะ~!"
10107-CVGroup_UIEventLobby_Enter3-1 = "บรรยากาศงานปาร์ตี้มาถึงจุดพีคแล้วค่ะ!"
10107-CVGroup_UIEventLobby_Enter3-2 = "คุณครูเองก็สนุกอยู่ ใช่มั้ยคะ~?"
10107-CVGroup_UIEventLobby_Enter4-1 = "ปาร์ตี้แสนสนุกกำลังใกล้จะจบแล้วละค่ะ!"
10107-CVGroup_UIEventLobby_Enter4-2 = "มาสนุกกันให้เต็มที่จนไม่เสียใจทีหลังกันเถอะค่ะ!"
10107-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะมีเรื่องต่างๆ เกิดขึ้นมากมาย แต่สุดท้ายแล้ว..."
10107-CVGroup_UIEventLobby_Enter5-2 = "มันก็เป็นปาร์ตี้ที่สนุกสุดๆ เลยนะคะ!"
10107-CVGroup_UIEventLobby_Idle1-1 = "คะ? เรียกฉันเหรอคะ~?!"
10107-CVGroup_UIEventLobby_Idle2-1 = "มาถ่ายรูปที่จะใช้ประโยชน์ได้ในฉบับต่อไปกันเลยมั้ยคะ~!"
10107-CVGroup_UIEventLobby_Idle3-1 = "คุณครู อ๊ะ~ ลองทำดูสิคะ!"
10107-CVGroup_UIEventLobby_Idle3-2 = "แถ่นแท้น ช็อกโกแลตโฮมเมดของแพนเดโมเนียม โซไซตี้ค่ะ!"
10107-CVGroup_UIEventLobby_Idle3-3 = "เป็นยังไงบ้างคะ? หวานอร่อยดีใช่มั้ยคะ!"
10107-CVGroup_UIEventLobby_Idle4-1 = "ถึงเสียงเพลงระรื่นหูกับอาหารอร่อยๆ เป็นเรื่องดีก็จริง..."
10107-CVGroup_UIEventLobby_Idle4-2 = "แต่พอได้อยู่กับคุณครูแบบนี้รู้สึกว่ามีบางอย่างต่างออกไปเลยนะคะ!"

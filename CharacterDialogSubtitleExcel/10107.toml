[translation]
10107-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10107-CVGroup_CharacterGet_Idle1-1 = "Extra, extra! The Pandemonium Society's secretary, Motomiya Chiaki, is at Schale!"
10107-CVGroup_Cafe_Idle1-1 = "What an interesting place!"
10107-CVGroup_Cafe_Idle2-1 = "This might make for a good headline!"
10107-CVGroup_Cafe_Idle3-1 = "Ah! I want to be friends with that person too!"
10107-CVGroup_Cafe_Idle4-1 = "If we place the \"Weekly Pandemonium Society\" stand here..."
10107-CVGroup_Cafe_Idle5-1 = "Ah, Ibuki might like this!"
10107-CVGroup_WeaponGet_Idle1-1 = "I'm so happy! It's like when I get a lead for an exclusive news story, or maybe even better than that!"
10107-CVGroup_UIEventLobby_Enter1-1 = "Whoa! Lots of fun things!"
10107-CVGroup_UIEventLobby_Enter2-1 = "Sensei! Over here! Sit next to me!"
10107-CVGroup_UIEventLobby_Enter2-2 = "I saved you a seat, Sensei!"
10107-CVGroup_UIEventLobby_Enter3-1 = "The party is in full swing!"
10107-CVGroup_UIEventLobby_Enter3-2 = "Are you enjoying it too, Sensei?"
10107-CVGroup_UIEventLobby_Enter4-1 = "This rambunctious party is almost over!"
10107-CVGroup_UIEventLobby_Enter4-2 = "Let's enjoy it to the fullest, so we have no regrets!"
10107-CVGroup_UIEventLobby_Enter5-1 = "A lot happened, but in the end..."
10107-CVGroup_UIEventLobby_Enter5-2 = "It was a toootally fun party!"
10107-CVGroup_UIEventLobby_Idle1-1 = "Yes? You called?!"
10107-CVGroup_UIEventLobby_Idle2-1 = "Let's look for a picture to use in next issue!"
10107-CVGroup_UIEventLobby_Idle3-1 = "Sensei, say \"aah\"!"
10107-CVGroup_UIEventLobby_Idle3-2 = "Ta-da! It's the Pandemonium Society's special chocolate!"
10107-CVGroup_UIEventLobby_Idle3-3 = "How is it? It's sweet and delicious, right?"
10107-CVGroup_UIEventLobby_Idle4-1 = "Fun music, scrumptious food, it's all great, but..."
10107-CVGroup_UIEventLobby_Idle4-2 = "Being with you makes everything feel different!"

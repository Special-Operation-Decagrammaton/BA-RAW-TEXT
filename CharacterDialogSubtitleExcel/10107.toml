[translation]
10107-CVGroup_UITitle_Idle1-1 = "蔚藍～檔案～！"
10107-CVGroup_CharacterGet_Idle1-1 = "號外，號外～！\n萬魔殿的書記，元宮千秋已經抵達夏萊囉～！"
10107-CVGroup_Cafe_Idle1-1 = "這裡，真有趣呢～！"
10107-CVGroup_Cafe_Idle2-1 = "有股這能成為獨家新聞的預感！"
10107-CVGroup_Cafe_Idle3-1 = "啊！我想和那個人當朋友！"
10107-CVGroup_Cafe_Idle4-1 = "如果把《週刊萬魔殿》的攤位設在這裡……"
10107-CVGroup_Cafe_Idle5-1 = "這個是……！\n伊吹醬肯定會非常開心！"
10107-CVGroup_WeaponGet_Idle1-1 = "好耶～！我真的很開心！\n跟發現特大新聞的時候相比有過之而無不及……！"
10107-CVGroup_UIEventLobby_Enter1-1 = "哇～！\n好多有趣的東西！"
10107-CVGroup_UIEventLobby_Enter2-1 = "老師！這邊！我的旁邊！"
10107-CVGroup_UIEventLobby_Enter2-2 = "老師的位置，已經留好了唷～！"
10107-CVGroup_UIEventLobby_Enter3-1 = "真熱鬧呢～！"
10107-CVGroup_UIEventLobby_Enter3-2 = "老師，玩得還開心嗎～？"
10107-CVGroup_UIEventLobby_Enter4-1 = "快樂的派對也接近尾聲了！"
10107-CVGroup_UIEventLobby_Enter4-2 = "盡情享受到最後吧～！"
10107-CVGroup_UIEventLobby_Enter5-1 = "雖然發生了很多事……"
10107-CVGroup_UIEventLobby_Enter5-2 = "不過真～的！是段非常快樂的時光！"
10107-CVGroup_UIEventLobby_Idle1-1 = "是～！你叫我嗎？"
10107-CVGroup_UIEventLobby_Idle2-1 = "來拍些能在下一期使用的照片吧～！"
10107-CVGroup_UIEventLobby_Idle3-1 = "老師，請「啊～」一下！"
10107-CVGroup_UIEventLobby_Idle3-2 = "來！剛才的是萬魔殿特製巧克力哦！"
10107-CVGroup_UIEventLobby_Idle3-3 = "怎麼樣？又甜又好吃對吧！"
10107-CVGroup_UIEventLobby_Idle4-1 = "雖然我也喜歡美妙的音樂跟好吃的食物……"
10107-CVGroup_UIEventLobby_Idle4-2 = "但果然，只要跟老師在一起就不太一樣呢！"

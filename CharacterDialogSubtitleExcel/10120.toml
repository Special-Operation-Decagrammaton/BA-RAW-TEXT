[translation]
10120-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브!"
10120-CVGroup_CharacterGet_Idle1-1 = "나의 무대에 온 걸 환영해, 선생님. 후후, 나의 박자만 따라오라고."
10120-CVGroup_Cafe_Idle1-1 = "울림이 좋은 공간이네."
10120-CVGroup_Cafe_Idle2-1 = "사람이 많군…… 나의 연주를 들려줄 때인가?"
10120-CVGroup_Cafe_Idle3-1 = "드럼은 어디에 둘까……"
10120-CVGroup_Cafe_Idle4-1 = "단 것은 어디에 있는가……!"
10120-CVGroup_Cafe_Idle5-1 = "조금 있으면 선생님도 오려나……."
10120-CVGroup_WeaponGet_Idle1-1 = "손에 딱 맞는 스틱을 쥔 기분이야…… 선생님의 센스는 늘 놀랍다니까."
10120-CVGroup_UIEventLobby_Enter1-1 = "후후, 어서 오라고, 선생님."
10120-CVGroup_UIEventLobby_Enter2-1 = "편한 곳에 앉아."
10120-CVGroup_UIEventLobby_Enter2-2 = "곧 연주가 시작될 테니."
10120-CVGroup_UIEventLobby_Enter3-1 = "좀 더 과자가……"
10120-CVGroup_UIEventLobby_Enter3-2 = "아니 연습이 필요해……!"
10120-CVGroup_UIEventLobby_Enter4-1 = "자, 피날레까지 이제 한 걸음……!"
10120-CVGroup_UIEventLobby_Enter5-1 = "……아아, 굉장했지. 수고했어, 선생님."
10120-CVGroup_UIEventLobby_Idle1-1 = "응? 무슨 일이야, 선생님?"
10120-CVGroup_UIEventLobby_Idle2-1 = "찌를 거라면 어깨를 찔러 줘……"
10120-CVGroup_UIEventLobby_Idle2-2 = "드럼을 치다 보니 어깨가 뻐근하네……"
10120-CVGroup_UIEventLobby_Idle3-1 = "아무리 찔러도 마카롱은 안 나온다고, 선생님."
10120-CVGroup_UIEventLobby_Idle4-1 = "앉아 봐, 선생님."
10120-CVGroup_UIEventLobby_Idle4-2 = "드럼이 무엇인지 알려주지……!"

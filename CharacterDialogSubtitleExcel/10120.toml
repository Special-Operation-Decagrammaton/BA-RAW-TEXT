[translation]
10120-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案！"
10120-CVGroup_CharacterGet_Idle1-1 = "呀呀，老師。歡迎來到我的舞台。\n……你能跟上這個節奏嗎？"
10120-CVGroup_Cafe_Idle1-1 = "感覺是個能夠演奏出美妙聲響的地方。"
10120-CVGroup_Cafe_Idle2-1 = "能展現我的演奏的時刻……終於！"
10120-CVGroup_Cafe_Idle3-1 = "該把鼓放在哪裡呢……"
10120-CVGroup_Cafe_Idle4-1 = "甜食……在哪裡……！"
10120-CVGroup_Cafe_Idle5-1 = "老師也會來嗎……"
10120-CVGroup_WeaponGet_Idle1-1 = "哦哦……這種彷彿拿到了與指尖融為一體的鼓棒的感覺……\n讓人不禁對老師的品味著迷啊。"
10120-CVGroup_UIEventLobby_Enter1-1 = "呵呵，真高興你來了，老師。"
10120-CVGroup_UIEventLobby_Enter2-1 = "放輕鬆也沒關係。"
10120-CVGroup_UIEventLobby_Enter2-2 = "演奏馬上就要開始囉。"
10120-CVGroup_UIEventLobby_Enter3-1 = "還需要更多點心……"
10120-CVGroup_UIEventLobby_Enter3-2 = "不，還需要更多練習……！"
10120-CVGroup_UIEventLobby_Enter4-1 = "來吧，離謝幕只差一步了……！"
10120-CVGroup_UIEventLobby_Enter5-1 = "……啊啊，很厲害唷。\n辛苦你了，老師。"
10120-CVGroup_UIEventLobby_Idle1-1 = "嗯？怎麼了，老師？"
10120-CVGroup_UIEventLobby_Idle2-1 = "要戳的話，這邊也麻煩了……"
10120-CVGroup_UIEventLobby_Idle2-2 = "練習讓肩膀超僵硬的……"
10120-CVGroup_UIEventLobby_Idle3-1 = "就算那樣戳，也不會跑出馬卡龍哦。"
10120-CVGroup_UIEventLobby_Idle4-1 = "坐在那邊吧，老師。"
10120-CVGroup_UIEventLobby_Idle4-2 = "鼓的真髓，就讓你見識見識吧……！"

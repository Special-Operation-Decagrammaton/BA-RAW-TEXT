[translation]
10120-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10120-CVGroup_CharacterGet_Idle1-1 = "ยินดีต้อนรับสู่การแสดงของฉันนะ คุณครู\nฮุฮุ คอยตามจังหวะของฉันให้ดีละ"
10120-CVGroup_Cafe_Idle1-1 = "ห้องนี้เสียงก้องดีนะ"
10120-CVGroup_Cafe_Idle2-1 = "คนเยอะจัง...\nถึงเวลาที่ฉันต้องแสดงแล้วเหรอ?"
10120-CVGroup_Cafe_Idle3-1 = "เอากลองวางไว้ไหนดีนะ..."
10120-CVGroup_Cafe_Idle4-1 = "ของหวานอยู่ที่ไหน...!"
10120-CVGroup_Cafe_Idle5-1 = "อีกเดี๋ยวคุณครูจะมาหรือเปล่านะ..."
10120-CVGroup_WeaponGet_Idle1-1 = "รู้สึกเหมือนได้ไม้ตีกลองที่พอดีมือเลย...\nเซนส์ของคุณครูนี่ทำฉันทึ่งเสมอเลยนะ"
10120-CVGroup_UIEventLobby_Enter1-1 = "ฮุฮุ มาทางนี้สิ\nคุณครู"
10120-CVGroup_UIEventLobby_Enter2-1 = "เลือกนั่งได้ตามสบายเลยนะ"
10120-CVGroup_UIEventLobby_Enter2-2 = "อีกไม่นาน\nการแสดงก็จะเริ่มขึ้นแล้วละ"
10120-CVGroup_UIEventLobby_Enter3-1 = "อยากได้ขนมเยอะอีกหน่อย..."
10120-CVGroup_UIEventLobby_Enter3-2 = "ไม่สิ ต้องฝึกซ้อมให้เยอะกว่านี้...!"
10120-CVGroup_UIEventLobby_Enter4-1 = "เอาละ ตอนนี้ก็เข้าใกล้\nช่วงฟินาเล่ไปอีกขั้นแล้ว...!"
10120-CVGroup_UIEventLobby_Enter5-1 = "อ่า... สุดยอดเลยนะ\nทำได้ดีมากเลยคุณครู"
10120-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีอะไรเหรอคุณครู?"
10120-CVGroup_UIEventLobby_Idle2-1 = "ถ้าคิดจะสะกิดกันละก็\nช่วยสะกิดตรงไหล่เถอะ..."
10120-CVGroup_UIEventLobby_Idle2-2 = "พอได้ตีกลองก็เลยรู้ว่า\nมันเมื่อยไหล่น่าดูเลยแฮะ"
10120-CVGroup_UIEventLobby_Idle3-1 = "ถึงจะสะกิดฉันยังไง\nก็ไม่มีมาการองให้หรอกนะ คุณครู"
10120-CVGroup_UIEventLobby_Idle4-1 = "นั่งก่อนสิ คุณครู"
10120-CVGroup_UIEventLobby_Idle4-2 = "ฉันจะแสดงให้ดูเอง\nว่ามือกลองน่ะเป็นยังไง...!"

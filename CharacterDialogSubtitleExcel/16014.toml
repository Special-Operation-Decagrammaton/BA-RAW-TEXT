[translation]
16014-CVGroup_UITitle_Idle1-1 = "Blue Archive! แหะๆ!"
16014-CVGroup_CharacterGet_Idle1-1 = "อิบูกิมาแล้วค่า! คุณครูรออิบูกินานเลยใช่มั้ย?"
16014-CVGroup_Cafe_Idle1-1 = "เจ็ดหนึ่งเจ็ด... เจ็ดสองสิบสี่..."
16014-CVGroup_Cafe_Idle2-1 = "ที่นี่มันอะไรกันเนี่ย? อิบูกิขอสำรวจดูได้มั้ย~?"
16014-CVGroup_Cafe_Idle3-1 = "จะเล่นอะไรกับคุณครูดีนะ..."
16014-CVGroup_Cafe_Idle4-1 = "พวกผู้ใหญ่ชอบอะไรแบบนี้เหรอ...?\nอืม~ ไม่รู้เลยแฮะ"
16014-CVGroup_Cafe_Idle5-1 = "อิบูกิอยู่คนเดียวไม่สนุกเลย..."
16014-CVGroup_WeaponGet_Idle1-1 = "วะ...ว้าวววว! ให้เจ้านี่กับอิบูกิงั้นเหรอ? จริงเหรอ?\n...พะ...เพราะเป็นอิบูกิ...? ว้าว! คุณครู! ดีใจจัง จะเก็บไว้อย่างดีเลย!"
16014-CVGroup_UIEventShop_Enter1-1 = "เชิญเลยค่ะคุณครู~! แหะๆๆ!"
16014-CVGroup_UIEventShop_Enter2-1 = "หาอะไรอยู่รึเปล่า~? อิบูกิจะช่วยเอง!"
16014-CVGroup_UIEventShop_Enter3-1 = "อิบูกิสนุกมากเลยที่ได้เต้นกับคุณครูในงานปาร์ตี้!"
16014-CVGroup_UIEventShop_Enter3-2 = "ไว้ไปด้วยกันใหม่นะ! สัญญาเลย!"
16014-CVGroup_UIEventShop_Idle1-1 = "หืม? อิบูกิไม่ได้มีไว้ขายนะ~?"
16014-CVGroup_UIEventShop_Idle2-1 = "อืม อิบูกิน่ะ! น่าจะชอบอันนั้นนะ!"
16014-CVGroup_UIEventShop_Buy1-1 = "ขอบคุณที่มาใช้บริการค่า~!"
16014-CVGroup_UIEventShop_Buy1-2 = "ไว้มาใหม่นะ! คุณครู!"
16014-CVGroup_UIEventShop_Buy2-1 = "เอาไปเป็นของขวัญเหรอ…?\nหรือว่า... ให้อิบูกิ?"
16014-CVGroup_UIEventShop_Buy3-1 = "อันนั้นอิบูกิก็ชอบ!"
16014-CVGroup_UIEventShop_Buy4-1 = "ว้าว! อิบูกิเพิ่งเคยเห็นครั้งแรกเลย!\nมีของแบบนี้ด้วยเหรอเนี่ย!"

[translation]
16014-CVGroup_UITitle_Idle1-1 = "블루 아카이브! 헤헷!"
16014-CVGroup_CharacterGet_Idle1-1 = "이부키 등장! 선생님, 오래 기다렸지?"
16014-CVGroup_Cafe_Idle1-1 = "칠 곱하기 일은… 칠, 칠 곱하기 이는… 십사…."
16014-CVGroup_Cafe_Idle2-1 = "여긴 뭐야? 이부키, 탐험해도 돼~?"
16014-CVGroup_Cafe_Idle3-1 = "선생님이랑 뭐 하고 놀까…"
16014-CVGroup_Cafe_Idle4-1 = "어른은 이런 걸 좋아해…? 음~ 잘 모르겠어."
16014-CVGroup_Cafe_Idle5-1 = "이부키, 혼자서는 재미없어…"
16014-CVGroup_WeaponGet_Idle1-1 = "우와… 우와악! 이거, 이부키 주는 거야? 정말로?\n……어, 이부키니까……? 우와! 선생님! 기뻐! 소중히 할게!"
16014-CVGroup_UIEventShop_Enter1-1 = "어서 오세요, 선생님~! 에헤헷!"
16014-CVGroup_UIEventShop_Enter2-1 = "뭐 찾는 거 있어~? 이부키도 도와줄게!"
16014-CVGroup_UIEventShop_Enter3-1 = "이부키, 선생님이랑 파티에서 춤추는 거 너무 즐거웠어!"
16014-CVGroup_UIEventShop_Enter3-2 = "또 같이 오자! 약속이야!"
16014-CVGroup_UIEventShop_Idle1-1 = "응? 이부키는 안 파는데~?"
16014-CVGroup_UIEventShop_Idle2-1 = "음, 이부키는! 저게 좋을 것 같아!"
16014-CVGroup_UIEventShop_Buy1-1 = "이용해 주셔서 감사합니다~!"
16014-CVGroup_UIEventShop_Buy1-2 = "다음에 또 와! 선생님!"
16014-CVGroup_UIEventShop_Buy2-1 = "선물용…? 혹시… 이부키한테?"
16014-CVGroup_UIEventShop_Buy3-1 = "그거! 이부키도 좋아해!"
16014-CVGroup_UIEventShop_Buy4-1 = "와! 이부키, 처음 봤어! 그런 것도 있었구나!"

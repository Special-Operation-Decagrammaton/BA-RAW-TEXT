[translation]
16014-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！耶嘿嘿！"
16014-CVGroup_CharacterGet_Idle1-1 = "伊吹登場！老師，讓你久等囉～！"
16014-CVGroup_Cafe_Idle1-1 = "七乘一等於…七…\n七乘二等於…十四…"
16014-CVGroup_Cafe_Idle2-1 = "這裡是哪裡？\n伊吹，可以探險嗎～？"
16014-CVGroup_Cafe_Idle3-1 = "該跟老師玩什麼好呢……"
16014-CVGroup_Cafe_Idle4-1 = "大人喜歡這種東西嗎……？\n唔嗯～不太理解……"
16014-CVGroup_Cafe_Idle5-1 = "伊吹，一個人很無聊……"
16014-CVGroup_WeaponGet_Idle1-1 = "哇啊……哇啊啊！\n這個，要送給伊吹嗎？真的嗎？\n……咦，因為是伊吹才有……？\n唔哇！老師！好開心！我會好好珍惜的！"
16014-CVGroup_UIEventShop_Enter1-1 = "歡迎你來，老師～！\n耶嘿嘿！"
16014-CVGroup_UIEventShop_Enter2-1 = "在找什麼東西嗎～？\n伊吹也來幫你！"
16014-CVGroup_UIEventShop_Enter3-1 = "伊吹，能跟老師在派對跳舞，真的很開心！"
16014-CVGroup_UIEventShop_Enter3-2 = "再一起來吧！約好了喔！"
16014-CVGroup_UIEventShop_Idle1-1 = "嗯？伊吹沒有賣唷～？"
16014-CVGroup_UIEventShop_Idle2-1 = "那個，伊吹我呀！\n覺得那個很棒！"
16014-CVGroup_UIEventShop_Buy1-1 = "謝謝您的光臨！"
16014-CVGroup_UIEventShop_Buy1-2 = "還要再來哦！老師！"
16014-CVGroup_UIEventShop_Buy2-1 = "是要送人的……？\n難道……要送給伊吹？"
16014-CVGroup_UIEventShop_Buy3-1 = "那個！伊吹也很喜歡！"
16014-CVGroup_UIEventShop_Buy4-1 = "哇！伊吹第一次看到！\n原來有那種東西啊！"

[translation]
20038-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20038-CVGroup_CharacterGet_Idle1-1 = "Welcome to Red Winter―I mean, Shanhaijing. I will do my very best to help, so I don't bring shame to the authority of the mustache."
20038-CVGroup_Cafe_Idle1-1 = "Whew... It's cooler here. I finally feel like I can breathe."
20038-CVGroup_Cafe_Idle2-1 = "(Black tea? And no jam? What an unusual tea ceremony.)"
20038-CVGroup_Cafe_Idle3-1 = "I'll have to take notes on this design for Cherino's merch!"
20038-CVGroup_Cafe_Idle4-1 = "Maybe it's because of the light clothes, but it feels easier to move."
20038-CVGroup_Cafe_Idle5-1 = "Now, let's share news of the great Cherino!"
20038-CVGroup_WeaponGet_Idle1-1 = "They say a word can be more powerful than a bullet... But when it comes to persuading someone, guns are faster."
20038-CVGroup_UIEventLobby_Enter1-1 = "An exchange meeting of this scale is a first, even for the Red Winter Office."
20038-CVGroup_UIEventLobby_Enter1-2 = "I'm excited, too."
20038-CVGroup_UIEventLobby_Enter2-1 = "Sensei, have you seen Cherino in a qipao?"
20038-CVGroup_UIEventLobby_Enter2-2 = "Heh heh, isn't she adorable?"
20038-CVGroup_UIEventLobby_Enter2-3 = "Oh... I look good, too?"
20038-CVGroup_UIEventLobby_Enter2-4 = "...Thank you."
20038-CVGroup_UIEventLobby_Enter3-1 = "(The Dark Monarch of Shanhaijing... She's much more powerful than I thought.)"
20038-CVGroup_UIEventLobby_Enter3-2 = "(I can't just think that she's cute, heh heh.)"
20038-CVGroup_UIEventLobby_Enter4-1 = "I thought I was used to coup d'etats by now..."
20038-CVGroup_UIEventLobby_Enter4-2 = "Coming face to face at a different academy..."
20038-CVGroup_UIEventLobby_Enter4-3 = "It feels strange."
20038-CVGroup_UIEventLobby_Enter5-1 = "It's been a wonderful exchange meeting."
20038-CVGroup_UIEventLobby_Enter5-2 = "We'll have to host them at Red Winter next time! Heehee."
20038-CVGroup_UIEventLobby_Idle1-1 = "The parks in Shanhaijing are so big and clean."
20038-CVGroup_UIEventLobby_Idle1-2 = "Perfect for street speeches!"
20038-CVGroup_UIEventLobby_Idle1-3 = "If we extol the greatness of President Cherino here..."
20038-CVGroup_UIEventLobby_Idle1-4 = "...it could become a diplomatic incident, huh?"
20038-CVGroup_UIEventLobby_Idle2-1 = "Things that change, or things that don't..."
20038-CVGroup_UIEventLobby_Idle2-2 = "It's hard to choose."
20038-CVGroup_UIEventLobby_Idle2-3 = "But it is a problem that Red Winter Academy changes every single day."
20038-CVGroup_UIEventLobby_Idle3-1 = "President Rumi gave me tea leaves for sleep."
20038-CVGroup_UIEventLobby_Idle3-2 = "I'm going to use them to make milk tea for Cherino tonight."
20038-CVGroup_UIEventLobby_Idle4-1 = "Some club called the Eastern Alchemy Society is working on medicine that makes you younger?"
20038-CVGroup_UIEventLobby_Idle4-2 = "This...needs to be recorded."
20038-CVGroup_UIEventBoxGachaShop_Enter1-1 = "To celebrate the exchange meeting, we're holding an exchange ticket event!"
20038-CVGroup_UIEventBoxGachaShop_Enter2-1 = "If you have Madam's doll, you can exchange it for a prize here!"
20038-CVGroup_UIEventBoxGachaShop_Enter3-1 = "The exchange event is still in progress."
20038-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Don't forget to exchange your items before it ends."
20038-CVGroup_UIEventBoxGachaShop_Idle1-1 = "I designed this doll."
20038-CVGroup_UIEventBoxGachaShop_Idle1-2 = "All my experience making President Cherino dolls came in handy."
20038-CVGroup_UIEventBoxGachaShop_Idle2-1 = "They were made to use for exchange tickets, but..."
20038-CVGroup_UIEventBoxGachaShop_Idle2-2 = "So many students just wanted to keep them. We've had trouble getting them back."
20038-CVGroup_UIEventBoxGachaShop_Idle2-3 = "Do you think there was an issue with the prizes?"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Congratulations! You're a winner!"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "You're a winner! You have good luck, Sensei."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "This is...first place! Of course you'd win, Sensei."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Oh my, so many..."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "I'll bring them right away. Just a moment, please."
20038-CVGroup_UIEventMission_Enter1-1 = "Welcome, Sensei. I was organizing the schedule for the exchange meeting."
20038-CVGroup_UIEventMission_Enter2-1 = "There's a lot to take care of, since students from both schools will be here."
20038-CVGroup_UIEventMission_Idle1-1 = "Yes. How can I help you?"
20038-CVGroup_UIEventMission_Idle2-1 = "No. Please focus on work for now."
20038-CVGroup_UIEventMission_Buy1-1 = "Amazing work. If this was Red Winter, I would've given you a medal..."
20038-CVGroup_UIEventMission_Buy2-1 = "Thank you for your cooperation."
20038-CVGroup_UIEventMission_Interaction1-1 = "That's all for today. Great work."

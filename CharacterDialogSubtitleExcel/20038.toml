[translation]
20038-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20038-CVGroup_CharacterGet_Idle1-1 = "븕은겨울…… 아니, 산해경에 어서 오세요.\n수염의 권위에 부끄럽지 않도록 성심성의껏 힘을 보태겠습니다."
20038-CVGroup_Cafe_Idle1-1 = "후우…… 이 주변은 조금 서늘하니 살 것 같네요."
20038-CVGroup_Cafe_Idle2-1 = "(잼 없이 홍차를…? 독특한 다법이네요.)"
20038-CVGroup_Cafe_Idle3-1 = "이 디자인은… 체리노 쨩의 굿즈를 만들 때 참고해야겠네요."
20038-CVGroup_Cafe_Idle4-1 = "가벼운 옷차림이라 그런 걸까요? 움직임이 편해졌네요."
20038-CVGroup_Cafe_Idle5-1 = "지금부터 위대한 체리노 님의 뉴스를 전해 드리겠습니다!"
20038-CVGroup_WeaponGet_Idle1-1 = "한마디 말이 총보다 더 큰 힘을 발휘할 수 있다고 하지만……\n……그래도 역시 설득에는 총이 더 빠르니까요!"
20038-CVGroup_UIEventLobby_Enter1-1 = "이 정도의 대규모 교류회는 붉은겨울 사무국으로도 첫 시도인지라."
20038-CVGroup_UIEventLobby_Enter1-2 = "저도 기대가 크네요."
20038-CVGroup_UIEventLobby_Enter2-1 = "선생님, 치파오 차림의 체리노 쨩 보셨나요?"
20038-CVGroup_UIEventLobby_Enter2-2 = "후훗, 너무 귀엽지 않나요?"
20038-CVGroup_UIEventLobby_Enter2-3 = "아… 저도 잘 어울린다고요?"
20038-CVGroup_UIEventLobby_Enter2-4 = "…감사합니다."
20038-CVGroup_UIEventLobby_Enter3-1 = "(산해경의 검은 군주… 생각보다 훨씬 강한 분이셨군요.)"
20038-CVGroup_UIEventLobby_Enter3-2 = "(마냥 귀여워할 수는 없겠네요, 후훗)"
20038-CVGroup_UIEventLobby_Enter4-1 = "쿠데타에는 제법 익숙해졌다고 생각했는데…"
20038-CVGroup_UIEventLobby_Enter4-2 = "다른 학원에서 직접 마주하니,"
20038-CVGroup_UIEventLobby_Enter4-3 = "어쩐지 묘한 기분이네요."
20038-CVGroup_UIEventLobby_Enter5-1 = "정말 즐거운 교류회였네요."
20038-CVGroup_UIEventLobby_Enter5-2 = "다음에는 꼭 문주님을 붉은겨울로 직접 모셔야겠어요. 후후."
20038-CVGroup_UIEventLobby_Idle1-1 = "산해경의 공원은 넓고 깨끗하네요."
20038-CVGroup_UIEventLobby_Idle1-2 = "거리 연설을 하기에 딱 좋네요."
20038-CVGroup_UIEventLobby_Idle1-3 = "이곳에서 체리노 회장의 위대함에 대해 설파하면…"
20038-CVGroup_UIEventLobby_Idle1-4 = "…역시 외교 문제가 되겠죠?"
20038-CVGroup_UIEventLobby_Idle2-1 = "변하는 것과 변하지 않는 것."
20038-CVGroup_UIEventLobby_Idle2-2 = "…선택하기 어려운 문제네요."
20038-CVGroup_UIEventLobby_Idle2-3 = "붉은겨울 학원은 매일 바뀌어서 큰일이지만요."
20038-CVGroup_UIEventLobby_Idle3-1 = "아까 루미 회장에게 숙면에 좋은 찻잎을 선물 받았습니다."
20038-CVGroup_UIEventLobby_Idle3-2 = "오늘 저녁에는 이것으로 체리노 쨩에게 밀크티를 내주어야겠네요."
20038-CVGroup_UIEventLobby_Idle4-1 = "<연단방>이라는 동아리에서 어려지는 약을 연구하고 있다고요?"
20038-CVGroup_UIEventLobby_Idle4-2 = "호오… 이건 기록해 두는 편이 좋겠군요."
20038-CVGroup_UIEventBoxGachaShop_Enter1-1 = "교류회를 기념하여 교환권 이벤트를 진행하고 있습니다!"
20038-CVGroup_UIEventBoxGachaShop_Enter2-1 = "문주님의 인형을 갖고 계시다면, 이곳에서 경품으로 교체해 드릴게요!"
20038-CVGroup_UIEventBoxGachaShop_Enter3-1 = "아직 교환 이벤트는 진행 중입니다."
20038-CVGroup_UIEventBoxGachaShop_Enter3-2 = "마지막까지 교환하는 것을 잊지 말아 주세요."
20038-CVGroup_UIEventBoxGachaShop_Idle1-1 = "이 인형은 제가 디자인했답니다."
20038-CVGroup_UIEventBoxGachaShop_Idle1-2 = "평소에 체리노 회장 모양의 인형을 만들던 경험이 도움이 되었네요."
20038-CVGroup_UIEventBoxGachaShop_Idle2-1 = "교환권 용도로 만든 것입니다만…"
20038-CVGroup_UIEventBoxGachaShop_Idle2-2 = "소장하고 싶어 하는 학생이 많아서, 좀처럼 회수되질 않네요."
20038-CVGroup_UIEventBoxGachaShop_Idle2-3 = "경품에 무슨 문제라도 있었던 걸까요?"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "축하합니다! 당첨이에요!"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "당첨입니다! 선생님은 운이 좋으시군요."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "이건… 1등이네요! 역시 선생님이세요."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "어머나, 이렇게나 잔뜩…"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "금방 가져오겠습니다. 잠시만 기다려주세요."
20038-CVGroup_UIEventMission_Enter1-1 = "어서 오세요, 선생님. 교류회의 일정을 정리하고 있었습니다."
20038-CVGroup_UIEventMission_Enter2-1 = "양 학교의 학생들이 한데 모여서 그런지 처리해야 할 일이 꽤 많군요."
20038-CVGroup_UIEventMission_Idle1-1 = "네, 무슨 일이신가요?"
20038-CVGroup_UIEventMission_Idle2-1 = "안 돼요. 지금은 일에 집중해 주세요."
20038-CVGroup_UIEventMission_Buy1-1 = "훌륭한 솜씨네요. 이곳이 붉은겨울이었다면 훈장을 드렸을 텐데…"
20038-CVGroup_UIEventMission_Buy2-1 = "협력해 주셔서 감사합니다."
20038-CVGroup_UIEventMission_Interaction1-1 = "오늘의 일정은 이것으로 끝입니다. 수고하셨습니다."

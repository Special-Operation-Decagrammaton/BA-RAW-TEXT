[translation]
20038-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20038-CVGroup_CharacterGet_Idle1-1 = "ยินดีต้อนรับสู่เรดวินเทอร์... ไม่สิ ซานไห่จิงค่ะ\nฉันจะสนับสนุนอย่างเต็มที่เพื่อไม่ให้ต้องอับอายต่ออำนาจแห่งหนวดเลยค่ะ"
20038-CVGroup_Cafe_Idle1-1 = "ฮู่ว... แถวนี้อากาศเย็นนิดหน่อย เลยหายใจโล่งขึ้นแล้วค่ะ"
20038-CVGroup_Cafe_Idle2-1 = "(ชาดำไม่ใส่แยม...? เป็นวิธีชงชาที่ไม่เหมือนใครจริงๆ เลยนะคะ)"
20038-CVGroup_Cafe_Idle3-1 = "ดีไซน์นี้... ต้องเก็บไว้เป็นแบบอ้างอิงตอนทำกู้ดของเชริโน่จังซะแล้ว)"
20038-CVGroup_Cafe_Idle4-1 = "เป็นเพราะชุดมันเบารึเปล่านะคะ? เลยขยับตัวสะดวกขึ้นเยอะเลยค่ะ"
20038-CVGroup_Cafe_Idle5-1 = "ตอนนี้ฉันจะแจ้งข่าวสารของท่านเชริโน่ผู้ยิ่งใหญ่ให้ทุกคนได้ทราบค่ะ!"
20038-CVGroup_WeaponGet_Idle1-1 = "มีคำกล่าวว่าคำพูดหนึ่งคำอาจสร้างบาดแผลร้ายแรงกว่ากระสุนปืนอยู่ก็จริง...\nแต่ฉันว่าเวลาโน้มน้าวใจใช้ปืนคุยกันจะเร็วกว่านะคะ!"
20038-CVGroup_UIEventLobby_Enter1-1 = "สำนักเลขาธิการเรดวินเทอร์ก็ไม่เคย\nมีงานแลกเปลี่ยนที่ใหญ่ขนาดนี้มาก่อน"

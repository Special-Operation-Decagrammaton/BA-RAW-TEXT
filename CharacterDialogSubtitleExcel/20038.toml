[translation]
20038-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
20038-CVGroup_CharacterGet_Idle1-1 = "歡迎來到赤冬……不，歡迎來到山海經。\n為了不讓鬍子的權威蒙羞，我會誠心誠意，助您一臂之力。"
20038-CVGroup_Cafe_Idle1-1 = "呼……這裡很涼快真是得救了。"
20038-CVGroup_Cafe_Idle2-1 = "（不配果醬喝紅茶……？真是獨特的喝法呢）"
20038-CVGroup_Cafe_Idle3-1 = "這個設計……\n我會當成製作潔莉諾醬周邊時的參考。"
20038-CVGroup_Cafe_Idle4-1 = "是因為身著輕裝的關係嗎？\n活動起來變得更方便了。"
20038-CVGroup_Cafe_Idle5-1 = "接下來，將為各位播報偉大的潔莉諾大人的最新情報！"
20038-CVGroup_WeaponGet_Idle1-1 = "雖然有句話說言語更勝槍枝……\n……不過還是用槍說服比較快！"
20038-CVGroup_UIEventLobby_Enter1-1 = "大規模的交流會，對赤冬事務局來說也是前所未有的嘗試。"
20038-CVGroup_UIEventLobby_Enter1-2 = "我也非常期待。"
20038-CVGroup_UIEventLobby_Enter2-1 = "老師，穿上旗袍的潔莉諾醬，您已經見過了嗎？"
20038-CVGroup_UIEventLobby_Enter2-2 = "呵呵，不覺得非常可愛嗎？"
20038-CVGroup_UIEventLobby_Enter2-3 = "啊……我也很適合是嗎？"
20038-CVGroup_UIEventLobby_Enter2-4 = "……那真是，太感謝您了。"
20038-CVGroup_UIEventLobby_Enter3-1 = "（山海經的黑色君主……是遠比想像中強大的人）"
20038-CVGroup_UIEventLobby_Enter3-2 = "（並非只有可愛呢。呵呵）"
20038-CVGroup_UIEventLobby_Enter4-1 = "本以為已經對騷動感到習以為常……"
20038-CVGroup_UIEventLobby_Enter4-2 = "在親眼目睹他校的情形後……"
20038-CVGroup_UIEventLobby_Enter4-3 = "總覺得有股奇妙的感受。"
20038-CVGroup_UIEventLobby_Enter5-1 = "交流會，真的非常開心。"
20038-CVGroup_UIEventLobby_Enter5-2 = "下次一定要招待門主大人來我們赤冬才行。呵呵。"
20038-CVGroup_UIEventLobby_Idle1-1 = "山海經的公園既寬廣又乾淨呢。"
20038-CVGroup_UIEventLobby_Idle1-2 = "非常適合街頭演說。"
20038-CVGroup_UIEventLobby_Idle1-3 = "若是在這裡宣揚潔莉諾會長的偉大……"
20038-CVGroup_UIEventLobby_Idle1-4 = "會演變成外交問題的對吧……"
20038-CVGroup_UIEventLobby_Idle2-1 = "改變與不變。"
20038-CVGroup_UIEventLobby_Idle2-2 = "……真是難以抉擇呢。"
20038-CVGroup_UIEventLobby_Idle2-3 = "……雖然赤冬聯邦學園隨時都在改變就是了。"
20038-CVGroup_UIEventLobby_Idle3-1 = "剛才從瑠美會長手中，收到了帶有安眠效果的茶葉。"
20038-CVGroup_UIEventLobby_Idle3-2 = "今晚我打算用這個，為潔莉諾醬泡杯奶茶。"
20038-CVGroup_UIEventLobby_Idle4-1 = "「鍊丹術研究會」這個社團，似乎正在研究返老還童的藥。"
20038-CVGroup_UIEventLobby_Idle4-2 = "這……必須得紀錄下來呢。"
20038-CVGroup_UIEventBoxGachaShop_Enter1-1 = "為了紀念交流會，正在舉行兌換券活動！"
20038-CVGroup_UIEventBoxGachaShop_Enter2-1 = "只要有門主大人的玩偶，就能換取獎品！"
20038-CVGroup_UIEventBoxGachaShop_Enter3-1 = "還可以進行玩偶的兌換唷。"
20038-CVGroup_UIEventBoxGachaShop_Enter3-2 = "為了避免忘記兌換，請盡早使用。"
20038-CVGroup_UIEventBoxGachaShop_Idle1-1 = "這個玩偶，是由我設計的。"
20038-CVGroup_UIEventBoxGachaShop_Idle1-2 = "平常製作潔莉諾會長玩偶的經驗能派上用場真是太好了。"
20038-CVGroup_UIEventBoxGachaShop_Idle2-1 = "明明是為了當成兌換券而製作的……"
20038-CVGroup_UIEventBoxGachaShop_Idle2-2 = "但不知什麼原因，想留在手邊的學生相當多，導致回收不太順利。"
20038-CVGroup_UIEventBoxGachaShop_Idle2-3 = "……是不是獎品有什麼問題呢？"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "恭喜！中獎了！"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "中獎了！\n老師的運氣真好呢。"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "這是……1等獎呢！\n真不愧是老師！"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "哎呀，這麼多……"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "我這就去拿獎品，還請您稍等。"
20038-CVGroup_UIEventMission_Enter1-1 = "您好，老師。\n交流會的日程表已經整理完畢了。"
20038-CVGroup_UIEventMission_Enter2-1 = "由於兩校的學生都集結於此，必須處理的工作也堆積如山。"
20038-CVGroup_UIEventMission_Idle1-1 = "有什麼事嗎？"
20038-CVGroup_UIEventMission_Idle2-1 = "不可以唷。\n現在您得專心工作才行。"
20038-CVGroup_UIEventMission_Buy1-1 = "真是出色。\n如果這裡是赤冬的話，就能獻上勳章了說……"
20038-CVGroup_UIEventMission_Buy2-1 = "非常感謝您的協助。"
20038-CVGroup_UIEventMission_Interaction1-1 = "今天的行程到此結束。\n辛苦您了。"

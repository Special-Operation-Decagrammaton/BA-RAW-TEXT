[translation]
10119-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10119-CVGroup_CharacterGet_Idle1-1 = "คณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\nโกเรียว นางุสะ... ฉันจะใช้พลังนี้เพื่อปกป้องทุกคน "
10119-CVGroup_Cafe_Idle1-1 = "ถ้าเป็นอายาเมะจะทำอะไรที่นี่นะ?"
10119-CVGroup_Cafe_Idle2-1 = "ให้ฉันมาอยู่ในที่ที่แบบนี้ได้ด้วยเหรอ?"
10119-CVGroup_Cafe_Idle3-1 = "(นี่มัน... กลิ่นย่างยากิโทริ?)"
10119-CVGroup_Cafe_Idle4-1 = "ถึงจะร้อนนิดหน่อย...\nแต่สำหรับคนอื่นแล้วก็น่าจะพอดีละเนอะ"
10119-CVGroup_Cafe_Idle5-1 = "เวียนหัวจัง... พักก่อนแล้วค่อยไปต่อดีมั้ยนะ?"
10119-CVGroup_WeaponGet_Idle1-1 = "คุณครูก็คงรู้ว่าปืนนี้เป็นของคนที่มีสิทธิ์สืบทอดเท่านั้น ใช่แล้วละ\nมันมีความหมายมากเกินกว่าที่โกเรียว นางุสะจะถือไว้ได้\nแต่ถ้าคุณครูไว้ใจฉันและเชื่อฉันอีกครั้ง...\nฉันก็จะพยายามอย่างสุดความสามารถเลย"

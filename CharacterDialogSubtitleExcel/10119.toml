[translation]
10119-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10119-CVGroup_CharacterGet_Idle1-1 = "Allied Hyakkiyako Academy, Hyakkaryouran Resolution Council.\nGoryou Nagusa. I'll use my strength to protect everyone."
10119-CVGroup_Cafe_Idle1-1 = "What would Ayame have done here?"
10119-CVGroup_Cafe_Idle2-1 = "Is it okay for me to be here?"
10119-CVGroup_Cafe_Idle3-1 = "(This is...the smell of chicken skewers?)"
10119-CVGroup_Cafe_Idle4-1 = "It's a bit hot for me...but certainly others must enjoy it."
10119-CVGroup_Cafe_Idle5-1 = "I'm getting dizzy... Perhaps I should take a break."
10119-CVGroup_WeaponGet_Idle1-1 = "You're well aware of this, but it is only with the Authority of the Presidency that one can be worthy of holding this gun. That's right. It bears too much meaning for someone such as me, Goryou Nagusa. However, if you truly wish to place your trust in me once again... I shall fight with all my might."

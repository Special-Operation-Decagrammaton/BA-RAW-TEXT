[translation]
10119-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10119-CVGroup_CharacterGet_Idle1-1 = "백귀야행 연합학원, 백화요란 분쟁조정위원회.\n고료 나구사. 이 힘은, 모두를 지키기 위해 쓰겠어."
10119-CVGroup_Cafe_Idle1-1 = "아야메라면, 여기서 무얼 했을까."
10119-CVGroup_Cafe_Idle2-1 = "이런 장소에, 내가 있어도 되는 걸까?"
10119-CVGroup_Cafe_Idle3-1 = "(이건…… 닭꼬치 굽는 냄새?)"
10119-CVGroup_Cafe_Idle4-1 = "조금, 덥지만…… 다른 사람에게는 이 정도가 적당하겠지."
10119-CVGroup_Cafe_Idle5-1 = "현기증이…… 조금만 쉬었다 갈까."
10119-CVGroup_WeaponGet_Idle1-1 = "알고 있겠지만, 이 총은 자격 없는 자가 쥐어서는 안 되는 물건.\n그래. 고료 나구사가 갖기에는 너무 무거운 의미를 갖고 있어.\n그럼에도 선생님이 내게 맡겨 준다면, 다시 한번 나를 믿어준다면……\n온 힘을 다해 발버둥 쳐볼게."

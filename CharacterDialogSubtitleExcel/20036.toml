[translation]
20036-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20036-CVGroup_CharacterGet_Idle1-1 = "ต้องเป็น 'การพักผ่อนที่ดีที่สุด'!\nห้ามอ่อนข้ออะไรทั้งนั้น!"
20036-CVGroup_Cafe_Idle1-1 = "อืม... ทุกคนดูยุ่งกันจังเลย"
20036-CVGroup_Cafe_Idle2-1 = "จู่ๆ ก็อยากเล่นปืนฉีดน้ำขึ้นมาแฮะ"
20036-CVGroup_Cafe_Idle3-1 = "ทำบาร์บีคิวกันมั้ย?"
20036-CVGroup_Cafe_Idle4-1 = "ทำความสะอาดไว้ดีมั้ยนะ"
20036-CVGroup_Cafe_Idle5-1 = "ฮู่วว... สดชื่นจัง"
20036-CVGroup_WeaponGet_Idle1-1 = "เอาแต่เล่นสนุกอยู่อย่างนี้ก็ได้เหรอ...\nตะ... แต่ในเมื่อคุณครูบอกว่าไม่เป็นไร!\nงั้นก็รับผิดชอบด้วยนะ?"
20036-CVGroup_UIEventLobby_Enter1-1 = "เอาละ คุณครู! เราไม่มีเวลาแล้ว!\nรีบไปกันเถอะ!"
20036-CVGroup_UIEventLobby_Enter2-1 = "อ๊ะ คุณครู! ทางนี้ ทางนี้!"
20036-CVGroup_UIEventLobby_Idle1-1 = "หืม? ทำไมเหรอ?\nมีอะไรต้องทำเหรอ?"
20036-CVGroup_UIEventLobby_Idle2-1 = "คุณครู... ทำอะไรน่ะ?"
20036-CVGroup_UIEventLobby_Idle3-1 = "แบบนั้นมันสนุกเหรอ? หา?"
20036-CVGroup_UIEventLobby_Idle4-1 = "เลิกทำอะไรแปลกๆ แล้วไปทำเรื่องที่ต้องทำได้แล้ว!\nเร็วเข้า!"

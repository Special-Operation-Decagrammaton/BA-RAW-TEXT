[translation]
10030-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10030-CVGroup_CharacterGet_Idle1-1 = "지나침은 모자람만 못한 법…….\n오늘만큼은 일을 잊은 채 저와 휴식을 즐기시는 게 어떠신가요?"
10030-CVGroup_Cafe_Idle1-1 = "몸이 조금 따끈따끈하네요……."
10030-CVGroup_Cafe_Idle2-1 = "머릿속이 개운해지는 느낌입니다."
10030-CVGroup_Cafe_Idle3-1 = "이 차림, 어쩐지 들떠 보이나요……?"
10030-CVGroup_Cafe_Idle4-1 = "모두들, 즐거워 보이시네요."
10030-CVGroup_Cafe_Idle5-1 = "어딘가에 앉아서 쉴 만한 곳이……."
10030-CVGroup_WeaponGet_Idle1-1 = "이 무게감, 책임을 느낍니다.\n제대로 보답할 수 있도록, 최선을 다하겠습니다."
10030-CVGroup_UIEventLobby_Enter1-1 = "네, 준비는 끝났습니다."
10030-CVGroup_UIEventLobby_Enter2-1 = "서포트는 맡겨주세요."
10030-CVGroup_UIEventLobby_Idle1-1 = "선생님……? 어, 업무에 집중해 주세요……!"
10030-CVGroup_UIEventLobby_Idle2-1 = "여기서 무의미하게 시간을 보내는 건……."
10030-CVGroup_UIEventLobby_Idle2-2 = "아, 아뇨. 싫어하지는 않습니다만……."
10030-CVGroup_UIEventLobby_Idle3-1 = "무엇을 도와드리면 될까요, 선생님?"
10030-CVGroup_UIEventLobby_Idle4-1 = "노, 농담은 그만둬 주세요……."
10030-CVGroup_UIEventLobby_Enter3-1 = "슬슬 속도를 내야 할 때네요, 선생님."
10030-CVGroup_UIEventLobby_Enter4-1 = "라스트 스퍼트군요. 돕겠습니다."
10030-CVGroup_UIEventLobby_Enter5-1 = "뒷정리도 준비만큼 중요하니까요."

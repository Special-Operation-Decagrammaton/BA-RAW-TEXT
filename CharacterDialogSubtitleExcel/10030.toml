[translation]
10030-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10030-CVGroup_CharacterGet_Idle1-1 = "過猶如不及……\n今天就把工作忘掉，和我一起休息吧？"
10030-CVGroup_Cafe_Idle1-1 = "身體有點暖暖的……"
10030-CVGroup_Cafe_Idle2-1 = "感覺腦袋放鬆下來了。"
10030-CVGroup_Cafe_Idle3-1 = "這副打扮，該不會\n太過頭了……？"
10030-CVGroup_Cafe_Idle4-1 = "大家，\n看起來很開心呢"
10030-CVGroup_Cafe_Idle5-1 = "有沒有可以坐下來休息的地方……？"
10030-CVGroup_WeaponGet_Idle1-1 = "從這份重量，我感覺到了責任……\n為了可以確實回應，我會盡力而為的。"
10030-CVGroup_UIEventLobby_Enter1-1 = "是，準備已經完成了。"
10030-CVGroup_UIEventLobby_Enter2-1 = "支援請交給我吧。"
10030-CVGroup_UIEventLobby_Idle1-1 = "老，老師……！？\n請，請專注在工作上……！"
10030-CVGroup_UIEventLobby_Idle2-1 = "在這裡度過沒有意義的時間，有點那個……"
10030-CVGroup_UIEventLobby_Idle2-2 = "沒，沒有，雖然我並不討厭……"
10030-CVGroup_UIEventLobby_Idle3-1 = "請問我該幫忙什麼呢，老師？"
10030-CVGroup_UIEventLobby_Idle4-1 = "請，請別開玩笑了……"
10030-CVGroup_UIEventLobby_Enter3-1 = "或許差不多到了該盡最後努力的時機了呢，老師。"
10030-CVGroup_UIEventLobby_Enter4-1 = "要進行最後衝刺對吧，我會幫忙的。"
10030-CVGroup_UIEventLobby_Enter5-1 = "善後工作和事前準備一樣重要。"

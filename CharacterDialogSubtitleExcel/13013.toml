[translation]
13013-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
13013-CVGroup_CharacterGet_Idle1-1 = "อะกิอิซุมิ โมมิจิจากชมรมแนวร่วมปลดปล่อยความรู้\nสถาบันสหภาพเรดวินเทอร์ค่ะ... มาร่วมกันต่อสู้...\nเพื่อรักษาความรู้ทั้งหมดในโลกนี้ไว้กันเถอะค่ะ!"
13013-CVGroup_Cafe_Idle1-1 = "...บางทีที่นี่ อาจจะมีหนังสือหายาก\nที่ยังไม่เคยมีใครค้นพบอยู่ก็ได้..."
13013-CVGroup_Cafe_Idle2-1 = "ที่นี่เหมาะกับการอ่านหนังสือจัง"
13013-CVGroup_Cafe_Idle3-1 = "ขอพักงีบแป๊บหนึ่งได้มั้ยคะ..."
13013-CVGroup_Cafe_Idle4-1 = "อยากไปหาซื้อ... หนังสือใหม่จังเลยค่ะ..."
13013-CVGroup_Cafe_Idle5-1 = "ที่นี่... เหมือนเป็นที่ที่เหมาะจะขลุกตัวอยู่ที่นี่เลย\nแต่ดูอีกทีก็เหมือนจะไม่เหมาะแฮะ...?"
13013-CVGroup_WeaponGet_Idle1-1 = "ฉันจะใช้มัน...เพื่อคุณครูค่ะ\n...ถ้างั้นเริ่มจากทำให้อะไรเงียบลงก่อนดีกว่าคะ?"
13013-CVGroup_UIEventLobby_Enter1-1 = "มาแล้วเหรอคะคุณครู!"
13013-CVGroup_UIEventLobby_Enter1-2 = "แหะๆๆ ฉันกำลังรอคุณครูอยู่เลยละค่ะ"
13013-CVGroup_UIEventLobby_Enter2-1 = "สวัสดีค่ะ คุณครู!"
13013-CVGroup_UIEventLobby_Enter2-2 = "ถ้าเป็นเรื่องที่ฉันทำได้ละก็บอกฉันได้ทุกอย่างเลยนะคะ"
13013-CVGroup_UIEventLobby_Enter3-1 = "เหมือนว่าเรื่องจะใหญ่ขึ้นเรื่อยๆ เลย..."
13013-CVGroup_UIEventLobby_Enter3-2 = "แต่ว่ามันจะผ่านไปได้ด้วยดีใช่มั้ยคะ? คุณครู..."
13013-CVGroup_UIEventLobby_Enter4-1 = "ถ้าเป็นแบบนี้แล้วละก็ ไม่น่าย้อนกลับได้แล้วค่ะ"
13013-CVGroup_UIEventLobby_Enter4-2 = "ชมรมแนวร่วมปลดปล่อยความรู้จะเดินหน้าต่อไปค่ะ!"
13013-CVGroup_UIEventLobby_Enter5-1 = "ไม่ว่ายังไงก็จัดการเสร็จจนได้นะคะ...\nโล่งอกไปทีค่ะที่ทุกคนปลอดภัย"
13013-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ คุณครู เรียกฉันเหรอคะ?"
13013-CVGroup_UIEventLobby_Idle2-1 = "รุ่นพี่เมรุกำลังทำอะไรอยู่นะ..."
13013-CVGroup_UIEventLobby_Idle2-2 = "หวังว่าจะไม่ไปหัวร้อนอยู่ที่ไหนนะคะ"
13013-CVGroup_UIEventLobby_Idle3-1 = "ฉันชอบทั้งอ่านหนังสือ แล้วก็ดูรูปวาดเลยค่ะ\nชอบมากๆ เลย"
13013-CVGroup_UIEventLobby_Idle3-2 = "หนังสือการ์ตูนน่ะ\nมีอะไรให้เราได้เรียนรู้อยู่ตลอดเลยค่ะ!"
13013-CVGroup_UIEventLobby_Idle4-1 = "คะ... คุณครู?\nถ้าจะจ้องกันแบบนี้ละก็...\nฉันเขินนะคะ..."
13013-CVGroup_UIEventShop_Enter1-1 = "หาอะไรอยู่เหรอคะคุณครู?\nค่อยๆ เดินหาดูนะคะ"
13013-CVGroup_UIEventShop_Enter2-1 = "ฉันคุ้นเคยกับการจัดแสดงของและจัดนิทรรศการน่ะค่ะ\nวางใจได้เลยค่ะ!"
13013-CVGroup_UIEventShop_Enter3-1 = "เดินดูได้ตามที่ต้องการเลยนะคะ!"
13013-CVGroup_UIEventShop_Enter3-2 = "จะได้ไม่มาเสียดายภายหลังไงคะ"
13013-CVGroup_UIEventShop_Idle1-1 = "เรื่องจัดการร้านค้าน่ะเหรอคะ...?"
13013-CVGroup_UIEventShop_Idle1-2 = "ไม่ค่ะ ถ้าเทียบกับจัดการห้องสมุดแล้ว\nแค่นี้ไม่เท่าไรเลยค่ะ"
13013-CVGroup_UIEventShop_Idle2-1 = "ถ้าในนี้มีฉบับพิมพ์ครั้งแรกที่ไม่วางขายอีกแล้วอยู่ด้วยละก็... ฉันจะทำยังไงดี..."
13013-CVGroup_UIEventShop_Idle2-2 = "อ๊ะ! นะ... นี่มันไม่ใช่ความชอบส่วนตัวนะ...!"
13013-CVGroup_UIEventShop_Buy1-1 = "อ่า เลือกเล่มนี้มาสินะคะ"
13013-CVGroup_UIEventShop_Buy2-1 = "ช่วยรอสักครู่นะคะ...\nค่ะ นี่ค่ะ!"
13013-CVGroup_UIEventShop_Buy3-1 = "บทพูดที่กำหนดไว้ตรงนี้..."
13013-CVGroup_UIEventShop_Buy3-2 = "'ว้าว! ตาถึงจังเลยนะคะคุณลูกค้า!'"
13013-CVGroup_UIEventShop_Buy4-1 = "ขอบคุณทุกครั้งเลยนะคะ!"
13013-CVGroup_UIEventShop_Buy4-2 = "ฉันดูเหมือนมืออาชีพอย่างนั้นเหรอคะ?\nแหะๆ แหะๆๆ..."
13013-CVGroup_UIEventCardShop_Enter1-1 = "เชิญค่ะคุณครู!\nจะรับอะไรดีคะ?"
13013-CVGroup_UIEventCardShop_Enter2-1 = "มาดูดวงเหรอคะ!"
13013-CVGroup_UIEventCardShop_Enter2-2 = "ขอฉันนั่งอยู่ข้างๆ ได้มั้ยคะ? แหะๆๆ"
13013-CVGroup_UIEventCardShop_Enter3-1 = "อ่า... มีเรื่องอะไรที่กวนใจอยู่หรือเปล่าคะ?"
13013-CVGroup_UIEventCardShop_Idle1-1 = "ค่ะ คุณครู?\nมีอะไรรึเปล่าคะ?"
13013-CVGroup_UIEventCardShop_Idle2-1 = "โชคเล็กๆ สำหรับเวลาที่จำเป็น…"
13013-CVGroup_UIEventCardShop_Idle2-2 = "ฉันอยากลองพูดบทพูดแบบนั้นดูสักครั้งน่ะค่ะ!"
13013-CVGroup_UIEventCardShop_Prize3-1 = "ว้าว ถูกรางวัลด้วยค่ะ!\nสุดยอดไปเลยค่ะ!\nว่าแล้วเชียวว่าคุณครูต้องได้!"
13013-CVGroup_UIEventCardShop_Prize2-1 = "คุณครูเนี่ยโชคดีจังเลยนะคะ...\nเท่ระเบิดไปเลยค่ะ คุณครู!"
13013-CVGroup_UIEventCardShop_Prize1-1 = "ขอให้ฉันได้ดูด้วยคนสิคะ"
13013-CVGroup_UIEventCardShop_Prize1-2 = "อืมม... ประมาณนี้น่าจะได้ค่ะ!"
13013-CVGroup_UIEventCardShop_Prize0-1 = "แงง..."
13013-CVGroup_UIEventCardShop_Prize0-2 = "ยะ... อย่าเสียกำลังใจให้มากเกินไปนะคะ\nคุณครู ฉันอยู่นี่ทั้งคนนะคะ!"

[translation]
13013-CVGroup_UITitle_Idle1-1 = "Blue, Archive"
13013-CVGroup_CharacterGet_Idle1-1 = "I'm Akiizumi Momiji from the Red Winter Federal Academy Knowledge Liberation Front. Let's work together to protect all the world's knowledge!"
13013-CVGroup_Cafe_Idle1-1 = "...There just may be a rare, undiscovered book somewhere around here..."
13013-CVGroup_Cafe_Idle2-1 = "This is a good place to read."
13013-CVGroup_Cafe_Idle3-1 = "Maybe I can sneak in a quick nap..."
13013-CVGroup_Cafe_Idle4-1 = "I was hoping to find the latest volumes..."
13013-CVGroup_Cafe_Idle5-1 = "This place seems like a good place to hide...doesn't it...?"
13013-CVGroup_WeaponGet_Idle1-1 = "For you, Sensei, I'll use it. What should I make quiet down first...?"
13013-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei!"
13013-CVGroup_UIEventLobby_Enter1-2 = "Heehee. I've been waiting!"
13013-CVGroup_UIEventLobby_Enter2-1 = "Hi, Sensei!"
13013-CVGroup_UIEventLobby_Enter2-2 = "If there's anything I can do for you, just let me know."
13013-CVGroup_UIEventLobby_Enter3-1 = "Seems like things are snowballing..."
13013-CVGroup_UIEventLobby_Enter3-2 = "But I'm sure it'll be okay, right, Sensei...?"
13013-CVGroup_UIEventLobby_Enter4-1 = "It's too late to turn back now."
13013-CVGroup_UIEventLobby_Enter4-2 = "The Knowledge Liberation Front will push on!"
13013-CVGroup_UIEventLobby_Enter5-1 = "Somehow, it's finally over... I'm just glad everyone's safe."
13013-CVGroup_UIEventLobby_Idle1-1 = "Yes? Did you call me, Sensei?"
13013-CVGroup_UIEventLobby_Idle2-1 = "I wonder what Meru is doing right now..."
13013-CVGroup_UIEventLobby_Idle2-2 = "I just hope she's not going crazy somewhere..."
13013-CVGroup_UIEventLobby_Idle3-1 = "I like reading just as much as I enjoy appreciating pictures."
13013-CVGroup_UIEventLobby_Idle3-2 = "Manga can teach us so many things."
13013-CVGroup_UIEventLobby_Idle4-1 = "S-Sensei? If you stare at me like that...it makes me feel shy..."
13013-CVGroup_UIEventShop_Enter1-1 = "Are you looking for something, Sensei? Take your time."
13013-CVGroup_UIEventShop_Enter2-1 = "I'm used to arranging and displaying things. Just leave it to me!"
13013-CVGroup_UIEventShop_Enter3-1 = "Look around as much as you'd like."
13013-CVGroup_UIEventShop_Enter3-2 = "I'd hate for you to get the wrong things."
13013-CVGroup_UIEventShop_Idle1-1 = "Managing the shop...?"
13013-CVGroup_UIEventShop_Idle1-2 = "This is nothing compared to managing the library."
13013-CVGroup_UIEventShop_Idle2-1 = "What if there's an out-of-print first edition book mixed in here somewhere...? What should I do...?"
13013-CVGroup_UIEventShop_Idle2-2 = "Oh! I-I'm not saying I'd snatch it up for myself...!"
13013-CVGroup_UIEventShop_Buy1-1 = "Oh, so you picked that one."
13013-CVGroup_UIEventShop_Buy2-1 = "Wait just a moment... Yes, here!"
13013-CVGroup_UIEventShop_Buy3-1 = "And...what's the line...?"
13013-CVGroup_UIEventShop_Buy3-2 = "\"Oh! You have great taste!\""
13013-CVGroup_UIEventShop_Buy4-1 = "Thank you so much!"
13013-CVGroup_UIEventShop_Buy4-2 = "I was so professional just now? Heehee..."
13013-CVGroup_UIEventCardShop_Enter1-1 = "Welcome, Sensei. What would you like?"
13013-CVGroup_UIEventCardShop_Enter2-1 = "Are you getting your fortune?"
13013-CVGroup_UIEventCardShop_Enter2-2 = "Can I watch from the side? Heehee."
13013-CVGroup_UIEventCardShop_Enter3-1 = "Is there something wrong?"
13013-CVGroup_UIEventCardShop_Idle1-1 = "Yes, Sensei? What's going on?"
13013-CVGroup_UIEventCardShop_Idle2-1 = "A little luck, just for you..."
13013-CVGroup_UIEventCardShop_Idle2-2 = "I've always wanted to say something like that!"
13013-CVGroup_UIEventCardShop_Prize3-1 = "Wow, you won! That's amazing, Sensei!"
13013-CVGroup_UIEventCardShop_Prize2-1 = "Sensei, you have really great luck! This is so great!"
13013-CVGroup_UIEventCardShop_Prize1-1 = "Can I see?"
13013-CVGroup_UIEventCardShop_Prize1-2 = "Hmm... This is pretty good!"
13013-CVGroup_UIEventCardShop_Prize0-1 = "Aah..."
13013-CVGroup_UIEventCardShop_Prize0-2 = "D-Don't be too sad. At least you have me, Sensei!"

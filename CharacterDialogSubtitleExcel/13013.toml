[translation]
13013-CVGroup_UITitle_Idle1-1 = "블루, 아카이브"
13013-CVGroup_CharacterGet_Idle1-1 = "붉은겨울 연방학원, 지식해방전선의 아키이즈미, 모미지예요……\n세상의 모든 지식을 지키기 위해…… 함께 싸우죠!"
13013-CVGroup_Cafe_Idle1-1 = "……어쩌면 여기 어딘가에, 세상에 나오지 않은 희소한 책이 있을지도……"
13013-CVGroup_Cafe_Idle2-1 = "여기는, 독서하기 딱 좋은 장소네요."
13013-CVGroup_Cafe_Idle3-1 = "조금만, 자도 될까요……"
13013-CVGroup_Cafe_Idle4-1 = "신간…… 구하고 싶네요……"
13013-CVGroup_Cafe_Idle5-1 = "이 장소…… 틀어박혀 있기 좋은 곳 같으면서도, 아닌 것 같기도 한……?"
13013-CVGroup_WeaponGet_Idle1-1 = "선생님을 위해서…… 사용할게요. ……그러면, 무엇부터 조용히 시킬까요."
13013-CVGroup_UIEventLobby_Enter1-1 = "선생님, 오셨군요!"
13013-CVGroup_UIEventLobby_Enter1-2 = "에헤헤. 계속 기다리고 있었어요."
13013-CVGroup_UIEventLobby_Enter2-1 = "안녕하세요. 선생님!"
13013-CVGroup_UIEventLobby_Enter2-2 = "제가 할 수 있는 일이라면, 무엇이든 말씀해 주세요."
13013-CVGroup_UIEventLobby_Enter3-1 = "점점, 일이 커져가는 것 같은……"
13013-CVGroup_UIEventLobby_Enter3-2 = "하지만 분명, 괜찮겠죠? 선생님……"
13013-CVGroup_UIEventLobby_Enter4-1 = "이렇게 된 이상, 되돌릴 수 없어요."
13013-CVGroup_UIEventLobby_Enter4-2 = "지식해방전선은 계속 나아갈 거예요!"
13013-CVGroup_UIEventLobby_Enter5-1 = "어떻게든 마무리되었네요…… 모두가 무사해서, 정말 다행이에요."
13013-CVGroup_UIEventLobby_Idle1-1 = "네, 선생님. 부르셨나요?"
13013-CVGroup_UIEventLobby_Idle2-1 = "메루 선배는 뭘 하고 있으려나요……"
13013-CVGroup_UIEventLobby_Idle2-2 = "어디서 폭주하고 있지 않으면 좋겠는데요."
13013-CVGroup_UIEventLobby_Idle3-1 = "글을 읽는 것도, 그림을 보는 것도 정말 좋아해요."
13013-CVGroup_UIEventLobby_Idle3-2 = "만화는 언제든지 우리에게 여러 가지를 알려 주거든요!"
13013-CVGroup_UIEventLobby_Idle4-1 = "서, 선생님? 그렇게 바라보시면…… 부끄러운데요……"
13013-CVGroup_UIEventShop_Enter1-1 = "뭔가 찾고 계신가요, 선생님? 천천히 둘러보고 가세요."
13013-CVGroup_UIEventShop_Enter2-1 = "물건을 진열하거나 전시하는 건 익숙하니까요. 저한테 맡겨만 주세요!"
13013-CVGroup_UIEventShop_Enter3-1 = "바라시는 만큼 둘러 보고 가세요!"
13013-CVGroup_UIEventShop_Enter3-2 = "나중에 후회하게 되면, 아까우니까요."
13013-CVGroup_UIEventShop_Idle1-1 = "상점 관리요……?"
13013-CVGroup_UIEventShop_Idle1-2 = "아뇨, 도서관 관리에 비하면, 이 정도는 괜찮죠."
13013-CVGroup_UIEventShop_Idle2-1 = "이 중에, 절판된 책의 초판이 섞여 있으면…… 저는…… 어떻게 해야……"
13013-CVGroup_UIEventShop_Idle2-2 = "앗! 이, 이건 결코 사심 같은 게 아니라……!"
13013-CVGroup_UIEventShop_Buy1-1 = "아, 그걸 고르셨군요."
13013-CVGroup_UIEventShop_Buy2-1 = "잠시만 기다려 주세요…… 네, 여기요!"
13013-CVGroup_UIEventShop_Buy3-1 = "여기에서는 정해진 그 대사를……"
13013-CVGroup_UIEventShop_Buy3-2 = "'이야-! 보는 눈이 있으시군요, 손님!'"
13013-CVGroup_UIEventShop_Buy4-1 = "매번 감사합니다!"
13013-CVGroup_UIEventShop_Buy4-2 = "지금, 뭔가 프로 같았다고요? 에헷. 에헤헷……"
13013-CVGroup_UIEventCardShop_Enter1-1 = "어서 오세요, 선생님! 무엇으로 하시겠어요?"
13013-CVGroup_UIEventCardShop_Enter2-1 = "운세 확인인가요!"
13013-CVGroup_UIEventCardShop_Enter2-2 = "옆에서 보고 있어도 될까요? 에헤헤."
13013-CVGroup_UIEventCardShop_Enter3-1 = "아, 뭔가 신경 쓰이는 것이라도 있으신가요?"
13013-CVGroup_UIEventCardShop_Idle1-1 = "네, 선생님? 무슨 일이세요?"
13013-CVGroup_UIEventCardShop_Idle2-1 = "필요할 때를 위한 작은 행운을……"
13013-CVGroup_UIEventCardShop_Idle2-2 = "한번 말해 보고 싶었어요, 이런 거!"
13013-CVGroup_UIEventCardShop_Prize3-1 = "우와, 당첨이에요! 굉장해요! 역시 선생님이시네요!"
13013-CVGroup_UIEventCardShop_Prize2-1 = "선생님은 운이 좋으시군요…… 멋져요. 선생님!"
13013-CVGroup_UIEventCardShop_Prize1-1 = "잠시만 저에게도 보여 주세요."
13013-CVGroup_UIEventCardShop_Prize1-2 = "으음……. 이 정도면 괜찮아요!"
13013-CVGroup_UIEventCardShop_Prize0-1 = "후에엥……"
13013-CVGroup_UIEventCardShop_Prize0-2 = "너, 너무 낙심하지 마세요. 선생님. 제가 있잖아요!"

[translation]
13013-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
13013-CVGroup_CharacterGet_Idle1-1 = "我是赤冬聯邦學園，知識解放戰線的秋泉，紅葉……\n為了守護全世界的知識……一起並肩作戰吧！"
13013-CVGroup_Cafe_Idle1-1 = "……也許這裡的某處，隱藏著從未面世的稀有書也說不定……"
13013-CVGroup_Cafe_Idle2-1 = "這裡，是個很適合讀書的地方呢。"
13013-CVGroup_Cafe_Idle3-1 = "可以稍微，睡一下嗎……"
13013-CVGroup_Cafe_Idle4-1 = "新刊……真想買……"
13013-CVGroup_Cafe_Idle5-1 = "這個地方……\n好像很適合窩著，又好像不太適合……？"
13013-CVGroup_WeaponGet_Idle1-1 = "我會為了老師……使用它的。\n……那麼，要先讓什麼安靜下來呢。"
13013-CVGroup_UIEventLobby_Enter1-1 = "你來了啊，老師！"
13013-CVGroup_UIEventLobby_Enter1-2 = "耶嘿嘿，我一直在等你。"
13013-CVGroup_UIEventLobby_Enter2-1 = "你好，老師！"
13013-CVGroup_UIEventLobby_Enter2-2 = "只要是我能做到的事，請儘管告訴我吧！"
13013-CVGroup_UIEventLobby_Enter3-1 = "感覺事情好像越鬧越大了……"
13013-CVGroup_UIEventLobby_Enter3-2 = "不過一定，會沒事的吧？\n老師……"
13013-CVGroup_UIEventLobby_Enter4-1 = "事到如今，已經無法回頭了。"
13013-CVGroup_UIEventLobby_Enter4-2 = "知識解放戰線將會繼續前進！"
13013-CVGroup_UIEventLobby_Enter5-1 = "總算是平靜下來了呢……\n大家都平安無事，真是太好了。"
13013-CVGroup_UIEventLobby_Idle1-1 = "是，老師。你找我嗎？"
13013-CVGroup_UIEventLobby_Idle2-1 = "愛瑠前輩，現在在做什麼呢……"
13013-CVGroup_UIEventLobby_Idle2-2 = "希望沒有在什麼地方暴走……"
13013-CVGroup_UIEventLobby_Idle3-1 = "不管是讀文章，還是欣賞圖畫，我都非常喜歡。"
13013-CVGroup_UIEventLobby_Idle3-2 = "漫畫總是能教會我們很多事！"
13013-CVGroup_UIEventLobby_Idle4-1 = "老，老師？那樣盯著我看……我會很不好意思……"
13013-CVGroup_UIEventShop_Enter1-1 = "在找什麼嗎，老師？\n請慢慢看哦。"
13013-CVGroup_UIEventShop_Enter2-1 = "我已經很習慣陳列和展示物品了。\n請交給我吧！"
13013-CVGroup_UIEventShop_Enter3-1 = "請看到滿意為止吧！"
13013-CVGroup_UIEventShop_Enter3-2 = "要是之後後悔就太可惜了不是嗎。"
13013-CVGroup_UIEventShop_Idle1-1 = "商店的管理，是嗎……？"
13013-CVGroup_UIEventShop_Idle1-2 = "不會，和圖書館的管理相比，這種事不算什麼。"
13013-CVGroup_UIEventShop_Idle2-1 = "如果這裡面夾雜著絕版書的初版的話……\n我……該怎麼辦才好……"
13013-CVGroup_UIEventShop_Idle2-2 = "啊！這，這絕對不是出於私心……！"
13013-CVGroup_UIEventShop_Buy1-1 = "啊，你選了那個呢。"
13013-CVGroup_UIEventShop_Buy2-1 = "請稍等……來，請收下！"
13013-CVGroup_UIEventShop_Buy3-1 = "這個時候固定要說的台詞是……"
13013-CVGroup_UIEventShop_Buy3-2 = "「哎呀～！眼光真不賴呢，　這位客人！」"
13013-CVGroup_UIEventShop_Buy4-1 = "「感謝您的多次惠顧！」"
13013-CVGroup_UIEventShop_Buy4-2 = "剛才那樣，很像老手是嗎？嘿嘿，耶嘿嘿……"
13013-CVGroup_UIEventCardShop_Enter1-1 = "歡迎光臨，老師！\n想要什麼呢？"
13013-CVGroup_UIEventCardShop_Enter2-1 = "要試手氣嗎！"
13013-CVGroup_UIEventCardShop_Enter2-2 = "我可以在旁邊看嗎？\n耶嘿嘿。"
13013-CVGroup_UIEventCardShop_Enter3-1 = "啊，有什麼比較有興趣的嗎？"
13013-CVGroup_UIEventCardShop_Idle1-1 = "是，老師？\n有什麼事嗎？"
13013-CVGroup_UIEventCardShop_Idle2-1 = "「在需要的時候為你帶來一點小小的幸運」……"
13013-CVGroup_UIEventCardShop_Idle2-2 = "我很想說一次看看，這種類型的台詞！"
13013-CVGroup_UIEventCardShop_Prize3-1 = "嗚哇，中大獎了！\n真厲害！不愧是老師！"
13013-CVGroup_UIEventCardShop_Prize2-1 = "老師的運氣很好呢……\n真帥氣，老師！"
13013-CVGroup_UIEventCardShop_Prize1-1 = "請讓我也看一下吧。"
13013-CVGroup_UIEventCardShop_Prize1-2 = "呣呣……這也是能用的東西唷！"
13013-CVGroup_UIEventCardShop_Prize0-1 = "嗚咦咦……"
13013-CVGroup_UIEventCardShop_Prize0-2 = "請，請不要太灰心，老師。還有我在！"

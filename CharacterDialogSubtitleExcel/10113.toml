[translation]
10113-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10113-CVGroup_CharacterGet_Idle1-1 = "你好，老師。\n我是格黑娜學園急救醫學部所屬的冰室瀬奈。\n由於今天是休假日……不介意的話，要一起出門嗎？"
10113-CVGroup_Cafe_Idle1-1 = "這裡似乎是安全的呢。"
10113-CVGroup_Cafe_Idle2-1 = "雖然是個安穩的空間，也不能放鬆警戒。"
10113-CVGroup_Cafe_Idle3-1 = "真想跟老師一起來呢……"
10113-CVGroup_Cafe_Idle4-1 = "那個家具的配置……讓人有點在意。"
10113-CVGroup_Cafe_Idle5-1 = "這種地方，必須格外留意避免屍……傷患出現才行。"
10113-CVGroup_WeaponGet_Idle1-1 = "即使是休假，整備也很重要。\n畢竟屍……傷患可不會明白我們的狀況。"
10113-CVGroup_UIEventLobby_Enter1-1 = "歡迎蒞臨格黑娜學園。"
10113-CVGroup_UIEventLobby_Enter1-2 = "願老師能度過平和的時光。"
10113-CVGroup_UIEventLobby_Enter1-3 = "……"
10113-CVGroup_UIEventLobby_Enter1-4 = "這是我的真心話。"
10113-CVGroup_UIEventLobby_Enter2-1 = "你來啦，老師。"
10113-CVGroup_UIEventLobby_Enter2-2 = "雖然今天並非上班日，"
10113-CVGroup_UIEventLobby_Enter2-3 = "我也不會放鬆警戒。"
10113-CVGroup_UIEventLobby_Enter3-1 = "這真是令人感興趣的屍……"
10113-CVGroup_UIEventLobby_Enter3-2 = "失禮了。"
10113-CVGroup_UIEventLobby_Enter3-3 = "相當有趣的……"
10113-CVGroup_UIEventLobby_Enter3-4 = "這也同樣失禮呢。"
10113-CVGroup_UIEventLobby_Enter3-5 = "差不多得加緊腳步了。"
10113-CVGroup_UIEventLobby_Enter4-1 = "雖然希望能盡早平息……"
10113-CVGroup_UIEventLobby_Enter4-2 = "……"
10113-CVGroup_UIEventLobby_Enter4-3 = "可以的話，要是能再看到一些有趣的東西，什麼的。"
10113-CVGroup_UIEventLobby_Enter4-4 = "……剛才是開玩笑的。真的是。"
10113-CVGroup_UIEventLobby_Enter5-1 = "處理完畢了呢。"
10113-CVGroup_UIEventLobby_Enter5-2 = "辛苦你了，老師。"
10113-CVGroup_UIEventLobby_Idle1-1 = "無論休假與否，隸屬急救醫學部的事實都不會改變。"
10113-CVGroup_UIEventLobby_Idle2-1 = "格黑娜學園會發生許多事件。"
10113-CVGroup_UIEventLobby_Idle2-2 = "……是個挺歡樂的地方哦。"
10113-CVGroup_UIEventLobby_Idle3-1 = "這套衣服，適合我嗎？"
10113-CVGroup_UIEventLobby_Idle3-2 = "……聽到這種話覺得很新鮮？"
10113-CVGroup_UIEventLobby_Idle3-3 = "雖然這是雜誌上寫的台詞……"
10113-CVGroup_UIEventLobby_Idle3-4 = "能讓老師產生那種想法的話，這麼說也值得了。"
10113-CVGroup_UIEventLobby_Idle4-1 = "下次來格黑娜的時候，"
10113-CVGroup_UIEventLobby_Idle4-2 = "如果能聯絡我的話，我會很開心的。"
10113-CVGroup_UIEventLobby_Idle4-3 = "這樣應該也是最安全的。"
10113-CVGroup_UIEventBoxGachaShop_Enter1-1 = "你好，老師。"
10113-CVGroup_UIEventBoxGachaShop_Enter1-2 = "就「不知道會發生什麼」這點來說，"
10113-CVGroup_UIEventBoxGachaShop_Enter1-3 = "急救處置跟這個地方或許有點類似呢。"
10113-CVGroup_UIEventBoxGachaShop_Enter2-1 = "你來啦，老師。"
10113-CVGroup_UIEventBoxGachaShop_Enter2-2 = "願幸運和健康與你同在。"
10113-CVGroup_UIEventBoxGachaShop_Enter3-1 = "還有沒做完的事嗎？"
10113-CVGroup_UIEventBoxGachaShop_Enter3-2 = "我也會陪同到最後的。"
10113-CVGroup_UIEventBoxGachaShop_Idle1-1 = "你喜歡偶然嗎，老師？"
10113-CVGroup_UIEventBoxGachaShop_Idle1-2 = "我的話，還挺喜歡的哦。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-1 = "有句話說比起祈求幸運，更應該防備厄運。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-2 = "在急救處置方面，防備也是很重要的。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-3 = "請交給我吧。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "恭喜你，老師。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "是個不錯的東西呢。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "原來如此。\n那就是中獎啊。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "能讓我也看看嗎？\n我非常感興趣。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "真厲害呢，老師。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "真的辛苦你了。"

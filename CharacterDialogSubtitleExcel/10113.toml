[translation]
10113-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10113-CVGroup_CharacterGet_Idle1-1 = "안녕하십니까. 선생님. 게헨나 학원 응급의학부 히무로 세나입니다.\n마침 휴일이기도 하니, 함께 어떠신가요."
10113-CVGroup_Cafe_Idle1-1 = "안전해 보이는 장소로군요."
10113-CVGroup_Cafe_Idle2-1 = "한가하지만, 완전히 마음을 놓으면 안 되겠지요."
10113-CVGroup_Cafe_Idle3-1 = "선생님과 함께 오면 좋을 것 같습니다만……"
10113-CVGroup_Cafe_Idle4-1 = "저 가구의 배치…… 신경 쓰입니다."
10113-CVGroup_Cafe_Idle5-1 = "이런 곳일수록 시체…… 환자 발생을 주의해야 합니다."
10113-CVGroup_WeaponGet_Idle1-1 = "비번이라고 해도, 장비 손질은 중요한 것입니다.\n시체…… 응급 환자는, 우리의 사정을 기다려 주지 않으니까요."
10113-CVGroup_UIEventLobby_Enter1-1 = "게헨나에 오신 것을 환영합니다. 선생님."
10113-CVGroup_UIEventLobby_Enter1-2 = "무탈한 시간을 보내실 수 있기를 기원합니다."
10113-CVGroup_UIEventLobby_Enter1-3 = "……"
10113-CVGroup_UIEventLobby_Enter1-4 = "진심입니다."
10113-CVGroup_UIEventLobby_Enter2-1 = "오셨습니까, 선생님."
10113-CVGroup_UIEventLobby_Enter2-2 = "비번인 날입니다만,"
10113-CVGroup_UIEventLobby_Enter2-3 = "저는 언제든 경계를 늦추지 않을 겁니다."
10113-CVGroup_UIEventLobby_Enter3-1 = "이것은 제법 흥미로운 시체……"
10113-CVGroup_UIEventLobby_Enter3-2 = "실례."
10113-CVGroup_UIEventLobby_Enter3-3 = "황당하고 호기심 넘치는……"
10113-CVGroup_UIEventLobby_Enter3-4 = "이것도 실례."
10113-CVGroup_UIEventLobby_Enter3-5 = "위급한 상황이 된 것 같군요."
10113-CVGroup_UIEventLobby_Enter4-1 = "이성적으로는 이 사태가 빠르게 마무리되기를 바라야 하겠습니다만."
10113-CVGroup_UIEventLobby_Enter4-2 = "……"
10113-CVGroup_UIEventLobby_Enter4-3 = "조금만 더, 재미있는 광경을 볼 수 있으면 좋겠습니다."
10113-CVGroup_UIEventLobby_Enter4-4 = "지금은 농담입니다. 믿어 주십시오."
10113-CVGroup_UIEventLobby_Enter5-1 = "긴급 상황, 종료입니다."
10113-CVGroup_UIEventLobby_Enter5-2 = "선생님께서도 수고 많으셨습니다."
10113-CVGroup_UIEventLobby_Idle1-1 = "휴일이든 아니든, 응급의학부가 할 일은 변치 않습니다."
10113-CVGroup_UIEventLobby_Idle2-1 = "이곳은 저의 학원이고, 참으로 많은 일들이 일어나는 곳입니다."
10113-CVGroup_UIEventLobby_Idle2-2 = "……종합적으로, 저에게는 꽤 즐거운 장소입니다."
10113-CVGroup_UIEventLobby_Idle3-1 = "제 옷, 어울리나요?"
10113-CVGroup_UIEventLobby_Idle3-2 = "제가 그런 말을 하다니 신선하시다고요?"
10113-CVGroup_UIEventLobby_Idle3-3 = "주위에서 권해 준 잡지에서 읽은 말입니다만."
10113-CVGroup_UIEventLobby_Idle3-4 = "선생님이 저에게 신선함을 느끼셨다니, 보람이 있네요."
10113-CVGroup_UIEventLobby_Idle4-1 = "혹시 다음 휴일에 게헨나를 방문하실 생각이 있으시다면."
10113-CVGroup_UIEventLobby_Idle4-2 = "저에게 먼저 연락을 주시면 감사하겠습니다."
10113-CVGroup_UIEventLobby_Idle4-3 = "그편이 가장 안전할 테니까요."
10113-CVGroup_UIEventBoxGachaShop_Enter1-1 = "안녕하세요. 선생님. 히무로 세나입니다."
10113-CVGroup_UIEventBoxGachaShop_Enter1-2 = "무엇이 나올지 모른다는 점에서,"
10113-CVGroup_UIEventBoxGachaShop_Enter1-3 = "이곳은 응급 상황과 비슷한 부분이 있을지도 모릅니다."
10113-CVGroup_UIEventBoxGachaShop_Enter2-1 = "어서 오십시오. 선생님."
10113-CVGroup_UIEventBoxGachaShop_Enter2-2 = "행운과 건강이 항상 함께 하시기를 바랍니다."
10113-CVGroup_UIEventBoxGachaShop_Enter3-1 = "남은 것이 있으신가요?"
10113-CVGroup_UIEventBoxGachaShop_Enter3-2 = "저 역시 마지막까지 보조하겠습니다."
10113-CVGroup_UIEventBoxGachaShop_Idle1-1 = "우연을 좋아하시나요, 선생님?"
10113-CVGroup_UIEventBoxGachaShop_Idle1-2 = "저는 나름대로 좋아하는 편입니다."
10113-CVGroup_UIEventBoxGachaShop_Idle2-1 = "행운을 바라기보다는, 불운을 대비하는 편이 좋다고 하죠."
10113-CVGroup_UIEventBoxGachaShop_Idle2-2 = "예방 역시 응급의학의 중요한 부분입니다."
10113-CVGroup_UIEventBoxGachaShop_Idle2-3 = "맡겨 주십시오."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "축하드립니다. 선생님."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "좋아 보이는 상품이군요."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "과연, 그것이 당첨 상품이군요."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "저에게도 보여 주실 수 있겠습니까? 호기심이 생기는군요."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "대단하십니다. 선생님."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "정말 수고 많으셨습니다."

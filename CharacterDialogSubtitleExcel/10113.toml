[translation]
10113-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10113-CVGroup_CharacterGet_Idle1-1 = "Hello, Sensei. This is Himuro Sena from Gehenna Academy's Medical Emergency Club. I happen to be on my day off. Would you like to join me?"
10113-CVGroup_Cafe_Idle1-1 = "This seems to be a safe place."
10113-CVGroup_Cafe_Idle2-1 = "Although it's my day off, I shouldn't let my guard down completely."
10113-CVGroup_Cafe_Idle3-1 = "This looks like a nice place to spend time with you, Sensei..."
10113-CVGroup_Cafe_Idle4-1 = "That furniture's placement... It's bothering me."
10113-CVGroup_Cafe_Idle5-1 = "We need to be especially more careful of bodies...I mean MEDICAL EMERGENCIES in a place like this."
10113-CVGroup_WeaponGet_Idle1-1 = "Even when I'm off duty, equipment maintenance is still important. Corpses...I mean, emergency patients, don't wait for us."
10113-CVGroup_UIEventLobby_Enter1-1 = "Welcome to Gehenna, Sensei."
10113-CVGroup_UIEventLobby_Enter1-2 = "I hope you have a safe stay here."
10113-CVGroup_UIEventLobby_Enter1-3 = "..."
10113-CVGroup_UIEventLobby_Enter1-4 = "I mean it."
10113-CVGroup_UIEventLobby_Enter2-1 = "You're here, Sensei."
10113-CVGroup_UIEventLobby_Enter2-2 = "I'm off duty today,"
10113-CVGroup_UIEventLobby_Enter2-3 = "but I'm never going to let my guard down."
10113-CVGroup_UIEventLobby_Enter3-1 = "This is quite an interesting corpse..."
10113-CVGroup_UIEventLobby_Enter3-2 = "Excuse me."
10113-CVGroup_UIEventLobby_Enter3-3 = "Ridiculous, but very interesting..."
10113-CVGroup_UIEventLobby_Enter3-4 = "Excuse me for that too."
10113-CVGroup_UIEventLobby_Enter3-5 = "...An URGENT SITUATION, it seems like."
10113-CVGroup_UIEventLobby_Enter4-1 = "Rationally speaking, I should be hoping all of this blows over quickly."
10113-CVGroup_UIEventLobby_Enter4-2 = "..."
10113-CVGroup_UIEventLobby_Enter4-3 = "But I wish I could take in more of it first."
10113-CVGroup_UIEventLobby_Enter4-4 = "That was a joke. Really."
10113-CVGroup_UIEventLobby_Enter5-1 = "Emergency over."
10113-CVGroup_UIEventLobby_Enter5-2 = "Good work, Sensei."
10113-CVGroup_UIEventLobby_Idle1-1 = "Even when I'm on a day off, the Medical Emergency Club always has the same duty."
10113-CVGroup_UIEventLobby_Idle2-1 = "This is my academy, a place where many things happen."
10113-CVGroup_UIEventLobby_Idle2-2 = "...Overall, it's quite an enjoyable place for me."
10113-CVGroup_UIEventLobby_Idle3-1 = "Do these clothes look good on me?"
10113-CVGroup_UIEventLobby_Idle3-2 = "Hmm? You're not used to hearing me say that?"
10113-CVGroup_UIEventLobby_Idle3-3 = "I just read it in a magazine someone recommended to me."
10113-CVGroup_UIEventLobby_Idle3-4 = "But if I made you feel something, I'm glad."
10113-CVGroup_UIEventLobby_Idle4-1 = "If you plan on visiting Gehenna on your next day off,"
10113-CVGroup_UIEventLobby_Idle4-2 = "I would appreciate it if you'd get a hold of me first."
10113-CVGroup_UIEventLobby_Idle4-3 = "That would be the safest way."
10113-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Hello, Sensei. This is Himuro Sena."
10113-CVGroup_UIEventBoxGachaShop_Enter1-2 = "When it comes to unpredictability,"
10113-CVGroup_UIEventBoxGachaShop_Enter1-3 = "this place is something like an emergency."
10113-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Welcome, Sensei."
10113-CVGroup_UIEventBoxGachaShop_Enter2-2 = "I hope that fortune and good health will always be with you."
10113-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Was there anything else?"
10113-CVGroup_UIEventBoxGachaShop_Enter3-2 = "I'll support you until the end."
10113-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Do you like coincidences, Sensei?"
10113-CVGroup_UIEventBoxGachaShop_Idle1-2 = "I tend to like them."
10113-CVGroup_UIEventBoxGachaShop_Idle2-1 = "They say it's better to be prepared for bad luck than to hope for good luck."
10113-CVGroup_UIEventBoxGachaShop_Idle2-2 = "Prevention is also important in emergency medicine."
10113-CVGroup_UIEventBoxGachaShop_Idle2-3 = "Leave it to me."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Congratulations, Sensei."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "That looks interesting."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "I see, so that's the prize."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Could I see it? I'm curious."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Incredible, Sensei."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "Thank you for all your hard work."

[translation]
10106-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10106-CVGroup_CharacterGet_Idle1-1 = "呵呵，嚇到您了嗎？\n怎麼樣呢……跟以往的我並不一樣唷？"
10106-CVGroup_Cafe_Idle1-1 = "難，難道早就被\n發現是我了嗎……？"
10106-CVGroup_Cafe_Idle2-1 = "唱首歌會比較好嗎……？"
10106-CVGroup_Cafe_Idle3-1 = "總覺得，有股惴惴不安，\n難以冷靜的心情。"
10106-CVGroup_Cafe_Idle4-1 = "呵呵……\n有種清爽的感覺呢。"
10106-CVGroup_Cafe_Idle5-1 = "莫非……\n有人正看著我嗎？"
10106-CVGroup_WeaponGet_Idle1-1 = "要把這個送給我……？\n不，無論打扮如何，我依然是我。\n就像您說的一樣呢。我就恭敬地收下了。\n非常謝謝您，老師。"
10106-CVGroup_UIEventLobby_Enter1-1 = "啊～啊～啊～啊──"
10106-CVGroup_UIEventLobby_Enter1-2 = "啊……老，老師！？"
10106-CVGroup_UIEventLobby_Enter2-1 = "非常感謝您特此前來，老師。"
10106-CVGroup_UIEventLobby_Enter2-2 = "櫻，櫻子，很開心！"
10106-CVGroup_UIEventLobby_Enter3-1 = "已經過去一半了呢……"
10106-CVGroup_UIEventLobby_Enter4-1 = "雖說美好的時間總是轉瞬即逝……"
10106-CVGroup_UIEventLobby_Enter4-2 = "但感覺實在太像一瞬間就過去了。"
10106-CVGroup_UIEventLobby_Enter5-1 = "呵呵，覺得依依不捨嗎？"
10106-CVGroup_UIEventLobby_Enter5-2 = "……真巧呢，我也是。"
10106-CVGroup_UIEventLobby_Idle1-1 = "老師，請問有什麼事嗎？"
10106-CVGroup_UIEventLobby_Idle1-2 = "握，握手……是嗎？"
10106-CVGroup_UIEventLobby_Idle2-1 = "與穿修女服的時候相比，感覺和大家更親密了。"
10106-CVGroup_UIEventLobby_Idle2-2 = "呵呵，這套服裝也是好東西呢。"
10106-CVGroup_UIEventLobby_Idle3-1 = "那個……請問有什麼事嗎？"
10106-CVGroup_UIEventLobby_Idle3-2 = "被叫了這麼多次……那個，讓我有點不知該如何是好。"
10106-CVGroup_UIEventLobby_Idle4-1 = "我有個還在練習中的祕藏舞步……"
10106-CVGroup_UIEventLobby_Idle4-2 = "不，不介意的話，您要看看嗎？"
10106-CVGroup_UIEventMission_Enter1-1 = "我將老師的工作進行了統整。"
10106-CVGroup_UIEventMission_Enter2-1 = "您來了呢，老師。"
10106-CVGroup_UIEventMission_Idle1-1 = "這麼說來，老師……現在是我們兩人獨處呢。"
10106-CVGroup_UIEventMission_Idle1-2 = "咦？不，不是的……我只有字面上的意思，"
10106-CVGroup_UIEventMission_Idle1-3 = "沒有什麼深層的……含意……"
10106-CVGroup_UIEventMission_Idle2-1 = "這套服裝，很適合我……？\n呵呵，感謝您的稱讚。"
10106-CVGroup_UIEventMission_Buy1-1 = "好的，這邊已經確認了。"
10106-CVGroup_UIEventMission_Buy2-1 = "好的，您做得很好。"
10106-CVGroup_UIEventMission_Interaction1-1 = "辛苦您了，老師。"
10106-CVGroup_UIEventMission_Interaction1-2 = "為努力的老師獻，獻上獎勵……開，開玩笑的。"

[translation]
10106-CVGroup_UITitle_Idle1-1 = "Blue-Archive."
10106-CVGroup_CharacterGet_Idle1-1 = "Heehee, are you surprised? Right now, I've surely changed from my past self."
10106-CVGroup_Cafe_Idle1-1 = "D-Did they realize my identity?"
10106-CVGroup_Cafe_Idle2-1 = "Since it's come to this, I'll sing a song...!"
10106-CVGroup_Cafe_Idle3-1 = "For some reason, I can't soothe this excitement."
10106-CVGroup_Cafe_Idle4-1 = "Heehee... That felt nice."
10106-CVGroup_Cafe_Idle5-1 = "Is that person...looking at me, by any chance?"
10106-CVGroup_WeaponGet_Idle1-1 = "This, for me...? No, regardless of how I look, I am still myself. You're right. I'll cherish it. Thank you, Sensei."
10106-CVGroup_UIEventLobby_Enter1-1 = "Ahh. Ahh. Aahh."
10106-CVGroup_UIEventLobby_Enter1-2 = "Ah... S-Sensei?!"
10106-CVGroup_UIEventLobby_Enter2-1 = "Thank you for coming, Sensei."
10106-CVGroup_UIEventLobby_Enter2-2 = "I, Sakurako, am very happy!"
10106-CVGroup_UIEventLobby_Enter3-1 = "We're already halfway there. Mmm..."
10106-CVGroup_UIEventLobby_Enter4-1 = "People say that fun times pass in the blink of an eye..."
10106-CVGroup_UIEventLobby_Enter4-2 = "But it truly feels like this ended too quickly."
10106-CVGroup_UIEventLobby_Enter5-1 = "Heehee, do you have any regrets?"
10106-CVGroup_UIEventLobby_Enter5-2 = "What a coincidence. ...I feel the same."
10106-CVGroup_UIEventLobby_Idle1-1 = "Hm? What's wrong?"
10106-CVGroup_UIEventLobby_Idle1-2 = "Ah... A handshake?"
10106-CVGroup_UIEventLobby_Idle2-1 = "Compared to when I don the uniform of the Sisters, I feel this costume has helped me grow closer to everyone."
10106-CVGroup_UIEventLobby_Idle2-2 = "Heehee, this costume is nice."
10106-CVGroup_UIEventLobby_Idle3-1 = "Um... Do you have business with me?"
10106-CVGroup_UIEventLobby_Idle3-2 = "If you call me over and over again... I'm not sure how I should react."
10106-CVGroup_UIEventLobby_Idle4-1 = "I've been practicing my ultimate dance move."
10106-CVGroup_UIEventLobby_Idle4-2 = "W-Would you like to see it?"
10106-CVGroup_UIEventMission_Enter1-1 = "I have organized your tasks."
10106-CVGroup_UIEventMission_Enter2-1 = "You came to the right place, Sensei."
10106-CVGroup_UIEventMission_Idle1-1 = "Now that I think about it, Sensei... It's just the two of us right now."
10106-CVGroup_UIEventMission_Idle1-2 = "Huh? N-No... It's just the current situation..."
10106-CVGroup_UIEventMission_Idle1-3 = "There's no deeper meaning to...it..."
10106-CVGroup_UIEventMission_Idle2-1 = "These clothes look good on me...? Heehee, thank you."
10106-CVGroup_UIEventMission_Buy1-1 = "Yes, confirmed."
10106-CVGroup_UIEventMission_Buy2-1 = "Great."
10106-CVGroup_UIEventMission_Interaction1-1 = "Good work, Sensei."
10106-CVGroup_UIEventMission_Interaction1-2 = "A reward for you, since you worked hard...or something like that."

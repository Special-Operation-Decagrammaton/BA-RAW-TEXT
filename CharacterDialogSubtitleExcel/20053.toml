[translation]
20053-CVGroup_UITitle_Idle1-1 = "Blue~ อะแฮ่ม Archive?"
20053-CVGroup_CharacterGet_Idle1-1 = "สวัสดี ท่านอาจารย์!\nภารกิจครั้งนี้คือการแฝงตัว! งั้นก็รบกวนด้วยนะ!"
20053-CVGroup_Cafe_Idle1-1 = "ฮุฮุ... ถ้ามีคนจำได้จะทำยังไงดีล่ะ...?"
20053-CVGroup_Cafe_Idle2-1 = "ชุดนี้... ใส่ในที่แบบนี้ มันจะเว่อร์ไปหรือเปล่า...?"
20053-CVGroup_Cafe_Idle3-1 = "(ชุดเดรส... กาแฟ... คิดคอนเทนต์ใหม่ออกแล้ว!)"
20053-CVGroup_Cafe_Idle4-1 = "ไว้ต่อไป...! ต้องจัดแฟนมีตติ้งกับผู้ติดตามที่นี่ให้ได้เลย...!"
20053-CVGroup_Cafe_Idle5-1 = "(ดีละ งั้นก่อนอื่นก็! ที่ที่...อยู่ในหลืบที่สุดอยู่ตรงไหนนะ?)"
20053-CVGroup_WeaponGet_Idle1-1 = "หะ... ให้ของแบบนี้กับข้าน้อยเหรอ...!\nแต่ถ้าท่านอาจารย์คิดมาแล้วละก็! อื้อ! ขอบคุณมากเลยนะ!"
20053-CVGroup_UIEventLobby_Enter1-1 = "ในสถานการณ์ที่ต้องแฝงตัวควรจะพกข้าวปั้นหรือว่าอาหารอัดเม็ดดีนะ"
20053-CVGroup_UIEventLobby_Enter1-2 = "หืม? มาแล้วเหรอ? ท่านอาจารย์!"
20053-CVGroup_UIEventLobby_Enter2-1 = "ชุดดูดีเลยนะ ท่านอาจารย์"
20053-CVGroup_UIEventLobby_Enter2-2 = "ลุคแบบนี้ก็ดูแปลกใหม่ดีเหมือนกันนะ..."
20053-CVGroup_UIEventLobby_Enter3-1 = "ว้ากกกก...! ทำไมต้องมาเปิดฉากสู้กันกลางงานแฟชั่นโชว์ด้วยเนี่ย?!"
20053-CVGroup_UIEventLobby_Enter4-1 = "อื้อ คิดถึงสึคุโยะจังเลยน้า"
20053-CVGroup_UIEventLobby_Enter4-2 = "จะสบายดีรึเปล่านะ... คงจะกินราเม็งเพลินๆ อยู่ละมั้ง?"
20053-CVGroup_UIEventLobby_Enter5-1 = "เอาละ...! เท่านี้ชมรมวิจัยศาสตร์นินจาก็ฟื้นคืนแล้ว!"
20053-CVGroup_UIEventLobby_Enter5-2 = "เอ้า! ท่านอาจารย์เองก็รีบมาทางนี้เร็วเข้า!"
20053-CVGroup_UIEventLobby_Idle1-1 = "น่าแปลกชะมัดเลย..."
20053-CVGroup_UIEventLobby_Idle1-2 = "หืม? พูดแบบนั้นเดี๋ยวก็มีเรื่องเกิดขึ้นจริงๆ หรอกงั้นเหรอ?"
20053-CVGroup_UIEventLobby_Idle2-1 = "อื้อออ... เหมือนเสื้อตัวนี้ มันรู้สึกแน่นๆ แปลกๆ น่ะ..."
20053-CVGroup_UIEventLobby_Idle2-2 = "ชุดแบบนี้มันดีตรงไหน ทำไมชอบใส่กันนัก...!"
20053-CVGroup_UIEventLobby_Idle3-1 = "สิ่งที่ทำให้นินจาเป็นนินจาได้นั้นคืออะไรกันแน่...?"
20053-CVGroup_UIEventLobby_Idle3-2 = "มันดู... ไม่เหมือนชุดเลย"
20053-CVGroup_UIEventLobby_Idle4-1 = "ข้าน้อยจะแสดงให้เห็นเอง...! จะพิสูจน์ให้ดูว่า..."
20053-CVGroup_UIEventLobby_Idle4-2 = "ชุดแบบนี้น่ะ มันขวางทางนินจาอย่างข้าน้อยไม่ได้หรอก...!"
20053-CVGroup_UIEventShop_Enter1-1 = "โอ้ มาแล้วเหรอ ท่านอาจารย์!\nเชิญเดินชมตามสบายนะ"
20053-CVGroup_UIEventShop_Enter1-2 = "แต่จะว่าไป สินค้าชิ้นนี้..."
20053-CVGroup_UIEventShop_Enter2-1 = "ข้าน้อยเตรียมของไว้ครบทุกอย่างแล้ว\nยกเว้นแต่ของที่ไม่มีละนะ อะฮ่าฮ่า"
20053-CVGroup_UIEventShop_Enter3-1 = "ฮุฮุ รีบปิดร้านแล้วไปซื้อชุดเซ็ตนินจาคอมโบใหม่กินกันดีกว่า ท่านอาจารย์!"
20053-CVGroup_UIEventShop_Idle1-1 = "เลือกอย่างรอบคอบแล้วซื้ออย่างทุ่มสุดตัว...!"
20053-CVGroup_UIEventShop_Idle1-2 = "นั่นคือเคล็ดวิชาในการเลือกซื้อสินค้าไงล่ะ...!"
20053-CVGroup_UIEventShop_Idle2-1 = "สักวันหนึ่งข้าน้อยจะเอาของสะสมจากช่องเคล็ดลับวิถีนินจาสาว มิจิรุจจี้\nมาขึ้นชั้นให้ได้เลย...!"
20053-CVGroup_UIEventShop_Buy1-1 = "เยี่ยมเลย เลือกได้ดีมากเลยนะ"
20053-CVGroup_UIEventShop_Buy2-1 = "ใช่แล้ว ถ้าเป็นนินจาละก็จะต้องเลือกชิ้นนั้นอยู่แล้ว!"
20053-CVGroup_UIEventShop_Buy3-1 = "จะห่อกลับบ้านหรือว่าจะกินที่นี่..."
20053-CVGroup_UIEventShop_Buy3-2 = "อ๊ะ ไม่ใช่อันนี้เหรอ"
20053-CVGroup_UIEventShop_Buy4-1 = "โอ้...! ใช่เลย!\nชิ้นนั้นคือสินค้าแนะนำของร้านเราเลยละ!"
20053-CVGroup_UIEventShop_Buy4-2 = "จริงๆ แล้วไม่ว่าชิ้นไหนก็เป็นสินค้าแนะนำทั้งนั้น!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-1 = "ฮุฮุ เชิญเลย ท่านอาจารย์"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-2 = "พอดีเลยนะ ข้าน้อยเองก็กำลังเลือกราเม็งอยู่เหมือนกันน่ะ"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-1 = "อื้ม ดูเหมือนว่า..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-2 = "ไม่ได้มีแค่กลิ่นหอมอย่างเดียวนะ ไปกันเถอะ!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter3-1 = "ขอบคุณสำหรับอาหารค่ะ...\nตอนนี้กินต่อไม่ไหวแล้วละ..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle1-1 = "เส้นกับซุปน่ะ เปรียบได้กับนินจากับวิชานินจานั่นแหละ..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle2-1 = "ท่านอาจารย์ ชอบราเม็งแบบไหนเหรอ?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-1 = "คิดออกแล้ว...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-2 = "เป็นรสชาติที่ทำให้แรงบันดาลใจวิชานินจาใหม่พุ่งพล่านเลยละ...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck3-1 = "ว๊ากกกก!...?! ระ... รสชาติแบบนี้มัน...! "
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck2-1 = "โอ้ว สุดยอดเลยแฮะ...?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck1-1 = "มันก็ไม่เลวนะ... ไม่แย่เลยละ...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck0-1 = "อึก นะ... นี่มันราเม็งเหรอ...?"

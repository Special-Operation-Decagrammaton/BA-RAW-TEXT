[translation]
20053-CVGroup_UITitle_Idle1-1 = "蔚藍～咳哼⋯⋯檔案？"
20053-CVGroup_CharacterGet_Idle1-1 = "老師大人～感覺怎麼樣呀？\n這次是潛入任務唷！請多指教啦！"
20053-CVGroup_Cafe_Idle1-1 = "呵呵……要是有人認出我該怎麼辦……？"
20053-CVGroup_Cafe_Idle2-1 = "這套禮服⋯⋯在這裡穿太超過了嗎……？"
20053-CVGroup_Cafe_Idle3-1 = "（禮服和咖啡……啊！這個點子好像能用……！）"
20053-CVGroup_Cafe_Idle4-1 = "有朝一日絕對……！\n要在這裡舉辦粉絲見面會……！"
20053-CVGroup_Cafe_Idle5-1 = "（好，總之……不吸引目光的地點在哪裡呢？）"
20053-CVGroup_WeaponGet_Idle1-1 = "可以嗎……？要給我，這麼棒的……！\n不過，既然是老師大人的判斷！嗯！謝謝你！"
20053-CVGroup_UIEventLobby_Enter1-1 = "帶去潛入任務的話，該選飯糰還是兵糧丸……"
20053-CVGroup_UIEventLobby_Enter1-2 = "嗯？老師大人！歡迎你來！"
20053-CVGroup_UIEventLobby_Enter2-1 = "老師大人……打扮得很讚嘛。"
20053-CVGroup_UIEventLobby_Enter2-2 = "這種感覺也挺新鮮的呢。"
20053-CVGroup_UIEventLobby_Enter3-1 = "啊～～！為什麼會在時裝秀打起來啊！？"
20053-CVGroup_UIEventLobby_Enter4-1 = "好想見到月夜……"
20053-CVGroup_UIEventLobby_Enter4-2 = "他過得好嗎……拉麵，希望他有好好吃……"
20053-CVGroup_UIEventLobby_Enter5-1 = "忍術研究部，完全復活！"
20053-CVGroup_UIEventLobby_Enter5-2 = "老師大人也是！這邊這邊！"
20053-CVGroup_UIEventLobby_Idle1-1 = "總覺得有點閒呢……"
20053-CVGroup_UIEventLobby_Idle1-2 = "嗯？你說講這種話絕對會出事？"
20053-CVGroup_UIEventLobby_Idle2-1 = "嗚嗚……這套衣服，緊到很難活動……"
20053-CVGroup_UIEventLobby_Idle2-2 = "大家到底喜歡它的哪一點啊……！"
20053-CVGroup_UIEventLobby_Idle3-1 = "服裝並非忍者的條件……"
20053-CVGroup_UIEventLobby_Idle3-2 = "既然如此，讓忍者之所以為忍者的是……！？"
20053-CVGroup_UIEventLobby_Idle4-1 = "仔細看好了……！區區的禮服，"
20053-CVGroup_UIEventLobby_Idle4-2 = "對忍者而言根本不構成任何阻礙，這樣的事實……！"
20053-CVGroup_UIEventShop_Enter1-1 = "歡迎，老師大人！慢慢看吧。"
20053-CVGroup_UIEventShop_Enter1-2 = "啊！不過關於這個商品，我個人覺得──"
20053-CVGroup_UIEventShop_Enter2-1 = "除了沒有的東西之外，什麼都有哦！呵呵呵！"
20053-CVGroup_UIEventShop_Enter3-1 = "哼哼～快點關門，去吃新的忍者套餐吧～！"
20053-CVGroup_UIEventShop_Idle1-1 = "選擇要慎重，購入要大膽……！"
20053-CVGroup_UIEventShop_Idle1-2 = "這就是購買周邊時的關鍵……！"
20053-CVGroup_UIEventShop_Idle2-1 = "總有一天，要在這裡擺上「少女忍法帖小小三千留」的周邊……！"
20053-CVGroup_UIEventShop_Buy1-1 = "哦哦～那個啊。是個好選擇嘛？"
20053-CVGroup_UIEventShop_Buy2-1 = "沒錯！是忍者的話就得選那個才行！"
20053-CVGroup_UIEventShop_Buy3-1 = "這個，要幫您加熱……"
20053-CVGroup_UIEventShop_Buy3-2 = "啊，說錯了。"
20053-CVGroup_UIEventShop_Buy4-1 = "哦哦……！那正是首推商品！"
20053-CVGroup_UIEventShop_Buy4-2 = "雖然全部都是首推就是了！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-1 = "啊，老師大人也來啦！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-2 = "……我？\n正在煩惱該選哪種。"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-1 = "嗯嗯～味道真香──"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-2 = "雖然也不只這樣啦！總之，走吧～！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter3-1 = "多謝款待……已經什麼都吃不下了……"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle1-1 = "麵和湯……那正是忍者和忍術……"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle2-1 = "老師大人喜歡什麼樣的拉麵？"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-1 = "哦哦……！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-2 = "是能啟發新忍術的味道……！！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck3-1 = "唔喵……！？\n這，這個味道是……！"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck2-1 = "嗯，挺不賴的嘛……？"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck1-1 = "雖然不差……不差……但真的就是這樣而已……"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck0-1 = "咦……這是拉麵嗎……？"

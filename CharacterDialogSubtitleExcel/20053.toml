[translation]
20053-CVGroup_UITitle_Idle1-1 = "Blue, ahem, Archive?"
20053-CVGroup_CharacterGet_Idle1-1 = "Hello, Honorable Sensei! This mission's an infiltration! Please take care of me!"
20053-CVGroup_Cafe_Idle1-1 = "Fufu... What should I do if someone recognizes me...?"
20053-CVGroup_Cafe_Idle2-1 = "Is this dress...too much to be wearing here?"
20053-CVGroup_Cafe_Idle3-1 = "(A dress... Coffee... I'm getting an idea! For new content!)"
20053-CVGroup_Cafe_Idle4-1 = "Next time for sure...! I'll hold a fan meeting with my subscribers here...!"
20053-CVGroup_Cafe_Idle5-1 = "(Perfect, for now! ...Where's the most secluded spot here?)"
20053-CVGroup_WeaponGet_Idle1-1 = "This... This for me...! But if it's Honorable Sensei's decision! Yes! Thank you!"
20053-CVGroup_UIEventLobby_Enter1-1 = "What's better for an infiltration, onigiri or ration pellets...?"
20053-CVGroup_UIEventLobby_Enter1-2 = "Hm? You're here, Honorable Sensei!"
20053-CVGroup_UIEventLobby_Enter2-1 = "Nice outfit, Honorable Sensei."
20053-CVGroup_UIEventLobby_Enter2-2 = "Seeing you in something like this is new..."
20053-CVGroup_UIEventLobby_Enter3-1 = "Aaaah...! Why the heck is there a fight happening in a FASHION SHOW venue?!"
20053-CVGroup_UIEventLobby_Enter4-1 = "...Mmm, I miss her. Tsukuyo."
20053-CVGroup_UIEventLobby_Enter4-2 = "I wonder if she's doing well... Is she eating ramen properly?"
20053-CVGroup_UIEventLobby_Enter5-1 = "Yes...! With this, the Ninjutsu Research Club is back!"
20053-CVGroup_UIEventLobby_Enter5-2 = "Over here! Honorable Sensei, this way! Hurry!"
20053-CVGroup_UIEventLobby_Idle1-1 = "I'm bored..."
20053-CVGroup_UIEventLobby_Idle1-2 = "Hm? Situations always seem to happen every time I say that?"
20053-CVGroup_UIEventLobby_Idle2-1 = "Ugh... I feel like this dress is a bit tight..."
20053-CVGroup_UIEventLobby_Idle2-2 = "Why do people wear stuff like this?!"
20053-CVGroup_UIEventLobby_Idle3-1 = "What makes a ninja, ninja...?"
20053-CVGroup_UIEventLobby_Idle3-2 = "The outfit...doesn't seem to be it."
20053-CVGroup_UIEventLobby_Idle4-1 = "I'll show you...! That my ninja way..."
20053-CVGroup_UIEventLobby_Idle4-2 = "...won't be stopped by something like clothes!"
20053-CVGroup_UIEventShop_Enter1-1 = "Oh, you're here, Honorable Sensei! Take your time and look around."
20053-CVGroup_UIEventShop_Enter1-2 = "About this item..."
20053-CVGroup_UIEventShop_Enter2-1 = "We have everything except what we don't have! Nyahaha!"
20053-CVGroup_UIEventShop_Enter3-1 = "Fufu, let's close for the day and go get the new ninja meal, Honorable Sensei!"
20053-CVGroup_UIEventShop_Idle1-1 = "Choose carefully, buy boldly...!"
20053-CVGroup_UIEventShop_Idle1-2 = "This is a merch-purchasing technique...!"
20053-CVGroup_UIEventShop_Idle2-1 = "One day, I'll have \"A Girl's Ninja Scroll Michiruchi\" merch displayed here...!"
20053-CVGroup_UIEventShop_Buy1-1 = "Good. Good choice."
20053-CVGroup_UIEventShop_Buy2-1 = "Yeah, that's the correct choice for a ninja!"
20053-CVGroup_UIEventShop_Buy3-1 = "For here, or to go—"
20053-CVGroup_UIEventShop_Buy3-2 = "Ah, I guess this isn't it."
20053-CVGroup_UIEventShop_Buy4-1 = "Oooh...! Yes! That's our store's signature product!"
20053-CVGroup_UIEventShop_Buy4-2 = "Actually, everything here is!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-1 = "Fufu, welcome, Honorable Sensei."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-2 = "I, too, happen to be choosing ramen."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-1 = "Hmm hmm, nice smell..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-2 = "...doesn't seem to be the only thing they've got! Let's go!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter3-1 = "Thank you for the food... I'm completely stuffed..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle1-1 = "Noodle and broth... That's like ninja and ninjutsu..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle2-1 = "What's your favorite ramen, Honorable Sensei?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-1 = "I can feel it...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-2 = "The kind of taste that can inspire new ninjutsu!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck3-1 = "Auuugh...?! Th-This flavor is...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck2-1 = "Ugh, not bad, huh...?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck1-1 = "It's not bad. But that's all! It's just \"not bad\"...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck0-1 = "Ugh, i-is this even ramen...?"

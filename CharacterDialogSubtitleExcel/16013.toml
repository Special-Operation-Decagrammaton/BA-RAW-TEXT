[translation]
16013-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브!"
16013-CVGroup_CharacterGet_Idle1-1 = "서, 선생님을 감시하기 위해 왔어!\n야한 건 안 돼! 금지! 절대 용서하지 않으니까…!"
16013-CVGroup_Cafe_Idle1-1 = "으으, 사람이 너무 많아…."
16013-CVGroup_Cafe_Idle2-1 = "저, 저건…!?"
16013-CVGroup_Cafe_Idle3-1 = "혹, 혹시, 나만 이렇게 입고 있는 건가…!?"
16013-CVGroup_Cafe_Idle4-1 = "선생님… 어딨어…."
16013-CVGroup_Cafe_Idle5-1 = "이, 이거는, 좋아서 입고 있는 건 아닌데!"
16013-CVGroup_WeaponGet_Idle1-1 = "이, 이건…음…. 안, 안 돼, 제대로 말해야지….\n고, 고마워 선생님! 앞으로도 열심히 할게!\n이, 이제 됐지? 나도, 고맙다는 말 정도는 할 수 있어!"
16013-CVGroup_UIEventLobby_Enter1-1 = "우물쭈물 거릴 시간이 없어, 선생님! 어서 가자!"
16013-CVGroup_UIEventLobby_Enter2-1 = "내가 있는 이상, 대충이라는 건 없으니까!"
16013-CVGroup_UIEventLobby_Enter3-1 = "후훗, 순조롭네!"
16013-CVGroup_UIEventLobby_Enter4-1 = "힘내! 얼마 안 남았어!"
16013-CVGroup_UIEventLobby_Enter5-1 = "혹시 모르니까 한 번 더 확인해볼까?"
16013-CVGroup_UIEventLobby_Idle1-1 = "히, 히익!? 깜짝이야…… 놀랐잖아, 선생님!"
16013-CVGroup_UIEventLobby_Idle2-1 = "아, 아까부터 뭐야... 자꾸 부르지 말라구."
16013-CVGroup_UIEventLobby_Idle3-1 = "아아, 정말! 용건이 있으면 제대로 말로 해줘!"
16013-CVGroup_UIEventLobby_Idle4-1 = "응? 무슨 일이야?"

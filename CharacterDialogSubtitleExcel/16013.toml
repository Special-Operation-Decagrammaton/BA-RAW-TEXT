[translation]
16013-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案！"
16013-CVGroup_CharacterGet_Idle1-1 = "我，我是來監視老師的！\n不可以色色！禁止！\n絕對不能容許…！"
16013-CVGroup_Cafe_Idle1-1 = "嗚嗚，人太多了…"
16013-CVGroup_Cafe_Idle2-1 = "那，那個是…！？"
16013-CVGroup_Cafe_Idle3-1 = "難，難道，穿成這樣的，只有我…！？"
16013-CVGroup_Cafe_Idle4-1 = "老師…在哪裡…"
16013-CVGroup_Cafe_Idle5-1 = "這，這也不是因為喜歡才穿的！"
16013-CVGroup_WeaponGet_Idle1-1 = "這，這是……嗯……不，不行，得好好說清楚才行……\n謝，謝謝老師！我之後也會努力的！\n這，這樣可以了吧！？就算是我，道謝還是做得到的！"
16013-CVGroup_UIEventLobby_Enter1-1 = "沒時間磨蹭了！快走吧！"
16013-CVGroup_UIEventLobby_Enter2-1 = "既然有我在，就不能有任何馬虎哦！"
16013-CVGroup_UIEventLobby_Enter3-1 = "呵呵，很順利！"
16013-CVGroup_UIEventLobby_Enter4-1 = "加油吧！沒剩多久了！"
16013-CVGroup_UIEventLobby_Enter5-1 = "考量到萬一的情況，再不要再確認一下？"
16013-CVGroup_UIEventLobby_Idle1-1 = "噫，噫噫！？嚇我一跳……\n真是的！做什麼啦老師！"
16013-CVGroup_UIEventLobby_Idle2-1 = "有，有什麼事啦……不要一直叫我。"
16013-CVGroup_UIEventLobby_Idle3-1 = "啊啊真是的！有事的話就好好說！"
16013-CVGroup_UIEventLobby_Idle4-1 = "嗯，怎麼了？"

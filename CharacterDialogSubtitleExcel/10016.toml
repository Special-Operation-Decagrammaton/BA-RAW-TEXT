[translation]
10016-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10016-CVGroup_CharacterGet_Idle1-1 = "我會用最好的表現幫助老師。"
10016-CVGroup_Cafe_Idle1-1 = "嘿……\n這個遊戲，有趣。"
10016-CVGroup_Cafe_Idle2-1 = "唔嗯，那個遊戲\n好像出續作了……\n好！去打工吧！"
10016-CVGroup_Cafe_Idle3-1 = "等我再長大一點……\n要不要把頭髮留長呢。"
10016-CVGroup_Cafe_Idle4-1 = "拜託……快出現……\n出現吧……出現了！"
10016-CVGroup_Cafe_Idle5-1 = "好。這樣就……過關了！"
10016-CVGroup_WeaponGet_Idle1-1 = "雖然不知道對武器用這種形容方式適不適合……真美呢。\n我很開心。"

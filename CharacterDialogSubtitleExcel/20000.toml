[translation]
20000-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브……."
20000-CVGroup_CharacterGet_Idle1-1 = "이때쯤일 거라 예측하고, 기다리고 있었어.\n선생님이 내 이름을 불러주는… 바로 이 순간을."
20000-CVGroup_Cafe_Idle1-1 = "시간과 예산을 더 주신다면…? 자신의 능력 부족에 대한 변명일 뿐이지."
20000-CVGroup_Cafe_Idle2-1 = "주어진 시간과 예산 내에서 최선의 결과를 뽑는 것.\n그것이 마이스터라는 거야."
20000-CVGroup_Cafe_Idle3-1 = "여기에 선생님 동상을 세워보면 어떨까?\n팔다리의 관절이 움직이게 만들 수 있어."
20000-CVGroup_Cafe_Idle4-1 = "흐음… 내부의 몇 가지 항목에서 수리와 개선 사항을 발견했…\n에? 수리하면 안 되는 거야?"
20000-CVGroup_Cafe_Idle5-1 = "원한다면 깜짝 놀랄만한 함정이라도 설치해줄 수 있는데. 응? 안된다고?"
20000-CVGroup_WeaponGet_Idle1-1 = "더 많은 것을 만들고 싶어. 그래서…… 좀 더 선생님의 힘이 되길 바라."

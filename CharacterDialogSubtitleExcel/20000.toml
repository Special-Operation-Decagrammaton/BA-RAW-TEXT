[translation]
20000-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
20000-CVGroup_CharacterGet_Idle1-1 = "คิดไว้แล้วว่าเราจะได้เจอกันในเวลานี้ ฉันกำลังรออยู่เลย\nรอเวลานี้... เวลาที่คุณครูจะเรียกชื่อของฉัน"
20000-CVGroup_Cafe_Idle1-1 = "หากให้เวลาและเพิ่มงบให้อีกหน่อยละก็...\nคำพูดแบบนั้นคือการแก้ตัวของคนไร้ความสามารถน่ะ"
20000-CVGroup_Cafe_Idle2-1 = "เพราะไมสเตอร์ที่แท้จริงคือคนที่แสดงฝีมือและทำงานจนสำเร็จ\nภายในเวลาและงบประมาณที่ได้มา"
20000-CVGroup_Cafe_Idle3-1 = "ลองสร้างรูปปั้นคุณครูที่นี่ดูดีมั้ยนะ?\nฉันทำให้แขนขาขยับได้ด้วยนะ"
20000-CVGroup_Cafe_Idle4-1 = "อืม... ฉันเจอบางจุดที่ต้องแก้ไขและปรับปรุงสักหน่อยด้วย...\nเอ๋? ห้ามแก้ไขอย่างงั้นเหรอ?"
20000-CVGroup_Cafe_Idle5-1 = "ฉันเก่งพอที่จะเพิ่มบางอย่างที่ทำให้ประหลาดใจได้นะ\nหืม? ไม่ได้งั้นเหรอ?"
20000-CVGroup_WeaponGet_Idle1-1 = "ฉันอยากสร้างสิ่งต่างๆ อีกเยอะเลย\nเพราะงั้น... หวังว่าจะเป็นกำลังให้คุณครูได้นะ"

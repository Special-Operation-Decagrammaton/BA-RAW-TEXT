[translation]
20000-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……"
20000-CVGroup_CharacterGet_Idle1-1 = "我預測是這個時候，所以一直等著。\n等著老師叫我名字的……這個瞬間。"
20000-CVGroup_Cafe_Idle1-1 = "「如果再給我一點時間和預算…？」\n這只不過是自己能力不足的藉口而已。"
20000-CVGroup_Cafe_Idle2-1 = "在規定的時間和預算內做出最好的結果。\n那才是所謂的巨匠。"
20000-CVGroup_Cafe_Idle3-1 = "在這裡立個老師的銅像怎麼樣？\n可以做得讓手腳的關節能夠活動唷。"
20000-CVGroup_Cafe_Idle4-1 = "嗯…在內部的幾個項目中發現了修理和改善事項…咦？不能修理嗎？"
20000-CVGroup_Cafe_Idle5-1 = "老師想要的話，可以幫你設置一個能夠讓進來的人嚇一跳的陷阱哦。\n嗯？不行嗎？"
20000-CVGroup_WeaponGet_Idle1-1 = "我想做出更多東西。\n希望可以……成為老師的力量。"

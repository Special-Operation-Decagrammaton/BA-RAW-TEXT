[translation]
20029-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～"
20029-CVGroup_CharacterGet_Idle1-1 = "夏天……大海……\n充滿著快樂呢，老師。\n當，當然我也沒有忘記修行唷。"
20029-CVGroup_Cafe_Idle1-1 = "來打造一個大家都能放鬆的地方吧？"
20029-CVGroup_Cafe_Idle2-1 = "是個涼快的地方呢。\n似乎能悠哉地休息。"
20029-CVGroup_Cafe_Idle3-1 = "大家好像都很享受……太好了。"
20029-CVGroup_Cafe_Idle4-1 = "椿醬和楓醬現在在做什麼呢……"
20029-CVGroup_Cafe_Idle5-1 = "不知不覺間就沸騰了……\n夏天……真可怕呢！"
20029-CVGroup_WeaponGet_Idle1-1 = "居然能收到這麼棒的禮物……\n我心中滿溢的心情，雖然很想用言語來表達……\n卻有些，難以統整……那個……謝謝您，老師。"
20029-CVGroup_UIEventLobby_Enter1-1 = "啊，歡迎回來，老師。"
20029-CVGroup_UIEventLobby_Enter1-2 = "這裡是海之家唷。\n我們很努力地做了準備！"
20029-CVGroup_UIEventLobby_Enter2-1 = "恭候您的光臨。老師。"
20029-CVGroup_UIEventLobby_Enter2-2 = "呵呵。\n幫忙節慶營運管理部的各位也很開心呢。"
20029-CVGroup_UIEventLobby_Enter3-1 = "渡假勝地狩獵…事情變得一發不可收拾了呢…"
20029-CVGroup_UIEventLobby_Enter3-2 = "不，越是這種時候，越要打起精神。"
20029-CVGroup_UIEventLobby_Enter4-1 = "要說從一開始就不擔心的話，那是騙人的……"
20029-CVGroup_UIEventLobby_Enter4-2 = "這一切，都是多虧有老師在。"
20029-CVGroup_UIEventLobby_Enter5-1 = "夏日大海的回憶……真是美妙的詞彙呢。"
20029-CVGroup_UIEventLobby_Enter5-2 = "特別是今年，我的感受尤其強烈。"
20029-CVGroup_UIEventLobby_Idle1-1 = "老師？您叫我嗎？"
20029-CVGroup_UIEventLobby_Idle1-2 = "隨時都可以叫我哦。"
20029-CVGroup_UIEventLobby_Idle2-1 = "還挺熱的呢……請小心不要中暑，老師。"
20029-CVGroup_UIEventLobby_Idle2-2 = "……萬一有緊急情況，我會照顧您的。"
20029-CVGroup_UIEventLobby_Idle3-1 = "靜子醬……沒問題嗎？\n有點擔心。"
20029-CVGroup_UIEventLobby_Idle4-1 = "要解決事件……感覺雖然有點困難，"
20029-CVGroup_UIEventLobby_Idle4-2 = "不過只要大家合作，一定沒問題的吧。"
20029-CVGroup_UIEventLobby_Idle5-1 = "現在或許就是展現修行成果的時候呢。"

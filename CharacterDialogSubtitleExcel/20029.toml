[translation]
20029-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20029-CVGroup_CharacterGet_Idle1-1 = "ทะเล...ฤดูร้อน...\nมีแต่เรื่องสนุกเยอะเลยนะคะ คุณครู\nแต่ฉันก็ไม่ลืมเรื่องการฝึกหรอกค่ะ"
20029-CVGroup_Cafe_Idle1-1 = "มาเตรียมสถานที่ที่ทุกคน\nจะพักผ่อนได้อย่างสบายๆ กันดีมั้ยคะ?"
20029-CVGroup_Cafe_Idle2-1 = "ที่นี่สบายดีจัง\nเหมาะกับการพักผ่อน\nมากเลยค่ะ"
20029-CVGroup_Cafe_Idle3-1 = "ทุกคนดูสนุกกันใหญ่เลย\nค่อยยังชั่วหน่อยค่ะ"
20029-CVGroup_Cafe_Idle4-1 = "สึบากิจังกับคาเอเดะจัง\nจะทำอะไรอยู่นะ..."
20029-CVGroup_Cafe_Idle5-1 = "จู่ๆ ก็รู้สึกอยากอู้ขึ้นมาเลย…\nฤดูร้อน... น่ากลัวจังเลยค่ะ!"
20029-CVGroup_WeaponGet_Idle1-1 = "ได้รับของขวัญที่ยอดเยี่ยมมา\nความรู้สึกที่เอ่อล้นในใจนี้\nฉันอยากถ่ายทอดเป็นคำพูดให้\nคุณครูฟัง แต่ว่า...เรียบเรียงคำพูด\nไม่ถูกเลย... ขอ... ขอบคุณนะคะคุณครู"
20029-CVGroup_UIEventLobby_Enter1-1 = "ชะ...เชิญเลยค่ะคุณครู"
20029-CVGroup_UIEventLobby_Enter1-2 = "ร้านสาขาริมทะเลค่ะ\nเรากำลังเตรียมตัวกัน\nอย่างเต็มที่เลยค่ะ"
20029-CVGroup_UIEventLobby_Enter2-1 = "ฉันกำลังรออยู่เลยค่ะ คุณครู"
20029-CVGroup_UIEventLobby_Enter2-2 = "ฮุฮุ พอได้มาช่วย\nชมรมจัดงานเทศกาลแบบนี้\nฉันภูมิใจมากเลยละค่ะ"
20029-CVGroup_UIEventLobby_Enter3-1 = "ล่ารีสอร์ต...\nเกิดเรื่องใหญ่โต\nขึ้นแล้วสินะคะ..."
20029-CVGroup_UIEventLobby_Enter3-2 = "ไม่หรอกค่ะ ในเวลาแบบนี้\nจะต้องเตรียมใจไว้ให้ดีค่ะ"
20029-CVGroup_UIEventLobby_Enter4-1 = "ถ้าบอกว่าตอนแรก\nฉันไม่รู้สึกกังวลเลย\nก็คงจะเป็นการพูดโกหก..."
20029-CVGroup_UIEventLobby_Enter4-2 = "แต่ที่คลายกังวลได้\nก็เพราะมีคุณครูอยู่ด้วยไงล่ะคะ"
20029-CVGroup_UIEventLobby_Enter5-1 = "คำพูดที่ว่า...\n\"ความทรงจำในฤดูร้อน\"\nเป็นคำที่วิเศษจริงๆ เลยนะคะ"
20029-CVGroup_UIEventLobby_Enter5-2 = "และครั้งนี้ก็เหมือนว่า\nจะยิ่งพิเศษมากกว่าเดิมเลยค่ะ"
20029-CVGroup_UIEventLobby_Idle1-1 = "คุณครู? เรียกฉันเหรอคะ?"
20029-CVGroup_UIEventLobby_Idle1-2 = "บอกมาได้ตลอดเลยค่ะ"
20029-CVGroup_UIEventLobby_Idle2-1 = "ร้อนสุดๆ ไปเลยนะคะ...\nระวังโรคลมแดดด้วยนะคะ\nคุณครู"
20029-CVGroup_UIEventLobby_Idle2-2 = "แต่ถ้าเกิดฉุกเฉินขึ้นมา\nฉันจะดูแลให้เองค่ะ"
20029-CVGroup_UIEventLobby_Idle3-1 = "ชิซุโกะจัง... จะไม่เป็นอะไร\nแน่ใช่มั้ยคะ?\nรู้สึกเป็นห่วงจังเลยค่ะ"
20029-CVGroup_UIEventLobby_Idle4-1 = "การคลี่คลายสถานการณ์...\nดูเหมือนจะเป็นเรื่องยากก็จริง"
20029-CVGroup_UIEventLobby_Idle4-2 = "แต่ถ้าทุกคนร่วมมือกันละก็\nจะต้องผ่านไปได้ด้วยดีแน่นอนค่ะ"
20029-CVGroup_UIEventLobby_Idle5-1 = "ตอนนี้อาจจะเป็นเวลา\nที่จะแสดงผลลัพธ์\nของการฝึกฝนก็ได้นะคะ"

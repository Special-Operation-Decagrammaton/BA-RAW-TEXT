[translation]
20029-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20029-CVGroup_CharacterGet_Idle1-1 = "The summer... The beach... It's all so blissful, Sensei. Of course, I haven't forgotten about my training."
20029-CVGroup_Cafe_Idle1-1 = "I want to create a place where everyone can lay down their burdens."
20029-CVGroup_Cafe_Idle2-1 = "A refreshing place. A place to rest."
20029-CVGroup_Cafe_Idle3-1 = "It seems that everyone is enjoying themselves. I'm glad."
20029-CVGroup_Cafe_Idle4-1 = "I wonder what Tsubaki and Kaede are doing..."
20029-CVGroup_Cafe_Idle5-1 = "I feel so sluggish and lazy... Is this the frightful power of summer...?"
20029-CVGroup_WeaponGet_Idle1-1 = "What a wonderful gift... I wish I could express in words how much appreciation I feel inside, but...it's hard to organize my thoughts... Th-Thank you, Sensei."
20029-CVGroup_UIEventLobby_Enter1-1 = "Ah, please come in, Sensei."
20029-CVGroup_UIEventLobby_Enter1-2 = "This is the Beach Shack. I have many things to offer you."
20029-CVGroup_UIEventLobby_Enter2-1 = "I've been waiting for you, Sensei."
20029-CVGroup_UIEventLobby_Enter2-2 = "Heehee. Helping the Festival Operations Department is very fulfilling."
20029-CVGroup_UIEventLobby_Enter3-1 = "The Resort Hunt... It's becoming more complicated than I expected..."
20029-CVGroup_UIEventLobby_Enter3-2 = "It's at times like this that I need to pull myself together."
20029-CVGroup_UIEventLobby_Enter4-1 = "I'd be lying if I said I wasn't nervous at first, but..."
20029-CVGroup_UIEventLobby_Enter4-2 = "I owe this all to you, Sensei."
20029-CVGroup_UIEventLobby_Enter5-1 = "Memories of the beach in the summer... What a beautiful thing."
20029-CVGroup_UIEventLobby_Enter5-2 = "It seems especially beautiful today."
20029-CVGroup_UIEventLobby_Idle1-1 = "Sensei, did you call me?"
20029-CVGroup_UIEventLobby_Idle1-2 = "Let me know if you ever need anything."
20029-CVGroup_UIEventLobby_Idle2-1 = "It's pretty hot. Be careful not to get heatstroke, Sensei."
20029-CVGroup_UIEventLobby_Idle2-2 = "If there's anything wrong, I'll take care of you."
20029-CVGroup_UIEventLobby_Idle3-1 = "Will Shizuko be okay? I'm a little worried."
20029-CVGroup_UIEventLobby_Idle4-1 = "It may seem like it'll be difficult to solve the case, but..."
20029-CVGroup_UIEventLobby_Idle4-2 = "...it'll be okay if everyone works together."
20029-CVGroup_UIEventLobby_Idle5-1 = "This may be the best time to show off the results of my training."

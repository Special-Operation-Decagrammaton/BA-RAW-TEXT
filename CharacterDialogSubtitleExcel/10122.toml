[translation]
10122-CVGroup_UITitle_Idle1-1 = "Blue Archive~ อะฮ่าฮ่า☆"
10122-CVGroup_CharacterGet_Idle1-1 = "มิโซโนะ มิกะ ปรากฏตัวอีกครั้ง~☆ น่าจะประมาณนี้ละนะ\nงั้นครั้งนี้ก็ขอฝากตัวด้วยนะ คุณครู!"
10122-CVGroup_Cafe_Idle1-1 = "อะฮ่าฮ่า แปลกจัง~"
10122-CVGroup_Cafe_Idle2-1 = "ฮืม~ ทุกคนแวะมาที่ชาเล่ต์กันแบบนี้สินะ"
10122-CVGroup_Cafe_Idle3-1 = "(แต่ละคนก็คงมีเรื่องกังวลของตัวเอง เหมือนกับฉันละนะ...)"
10122-CVGroup_Cafe_Idle4-1 = "คุณครู จะมาเมื่อไรนะ..."
10122-CVGroup_Cafe_Idle5-1 = "อันนี้ฉันใช้ได้หรือเปล่านะ?"
10122-CVGroup_WeaponGet_Idle1-1 = "อันนี้... ให้ฉันเหรอ?  โกหกน่า~! หืม... จริงเหรอ? เฮ้อ...\nคุณครูเนี่ยไม่ไหวเลยจริงๆ ชอบทำหน้าไม่รู้ไม่ชี้อยู่เรื่อยเลย\nแบบนี้ไม่ได้สิ... ฉันก็อยากตอบแทนอะไรบ้างนะ..."
10122-CVGroup_UIEventLobby_Enter1-1 = "ยะฮู้ว คุณครู! กำลังสนุกอยู่หรือเปล่า?"
10122-CVGroup_UIEventLobby_Enter2-1 = "อืม... ถ้าเป็นคุณครูจะจัดการสถานการณ์แบบนี้ยังไงกันนะ..."
10122-CVGroup_UIEventLobby_Enter3-1 = "ดูแตกต่างจากที่คิดไว้นิดหน่อย..."
10122-CVGroup_UIEventLobby_Enter3-2 = "แต่ถึงยังไงก็คงเป็นไปได้ด้วยดีละนะ~!"
10122-CVGroup_UIEventLobby_Enter4-1 = "คงต้องตื่นตัวอยู่เสมอแล้วละ"
10122-CVGroup_UIEventLobby_Enter4-2 = "ก็เราไม่รู้นี่นาว่าจะเกิดเรื่องอะไรขึ้นมาอีก"
10122-CVGroup_UIEventLobby_Enter5-1 = "ฮื้ม~ ถึงยังไงก็ปิดงานจนได้สินะ"
10122-CVGroup_UIEventLobby_Enter5-2 = "ถ้าไม่มีคุณครูจะเป็นยังไงนะ..."
10122-CVGroup_UIEventLobby_Enter5-3 = "ไม่อยากแม้แต่จะคิดเลย..."
10122-CVGroup_UIEventLobby_Idle1-1 = "โชคดีจังเลยที่มีคุณครูอยู่ด้วย~"

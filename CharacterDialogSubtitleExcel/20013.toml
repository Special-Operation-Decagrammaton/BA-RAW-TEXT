[translation]
20013-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20013-CVGroup_CharacterGet_Idle1-1 = "베리타스의 부부장, 카가미 치히로야.\n혹시라도 우리 애들이 말썽을 부리거든 내게 바로 알려줘."
20013-CVGroup_Cafe_Idle1-1 = "이건…… 또 우리 애들이 저질렀나 보네."
20013-CVGroup_Cafe_Idle2-1 = "으음…… 확실히 밤을 새우니 조금 피곤하네."
20013-CVGroup_Cafe_Idle3-1 = "어라…… 혹시 이거, 또 서버가 터진 건가……?"
20013-CVGroup_Cafe_Idle4-1 = "(이 카페에서는 커피를 팔지 않는 걸까?)"
20013-CVGroup_Cafe_Idle5-1 = "(이 정도의 보안 수준이라면…… 10초면 충분하겠네.)"
20013-CVGroup_WeaponGet_Idle1-1 = "화이트 해커에게도 총은 중요한 필수품이지.\n예를 들자면, 그래… 무례한 클라이언트를 상대할 때라던가…."

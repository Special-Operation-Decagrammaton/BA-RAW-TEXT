[translation]
20013-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20013-CVGroup_CharacterGet_Idle1-1 = "รองหัวหน้าของเวอริทัส คากามิ จิฮิโระ\nถ้าสมาชิกของเราก่อเรื่องวุ่นวาย บอกฉันได้เลยนะ"
20013-CVGroup_Cafe_Idle1-1 = "นี่มัน... สงสัยสมาชิกของเราจะก่อปัญหาอีกแล้วสินะ"
20013-CVGroup_Cafe_Idle2-1 = "ฉันทำงานโต้รุ่งมา... ก็เลยเหนื่อยนิดหน่อยน่ะ"
20013-CVGroup_Cafe_Idle3-1 = "เซิร์ฟเวอร์... พังอีกแล้วเหรอ...?"
20013-CVGroup_Cafe_Idle4-1 = "(ที่คาเฟ่นี้ไม่ขายกาแฟรึไงนะ?)"
20013-CVGroup_Cafe_Idle5-1 = "(การรักษาความปลอดภัยระดับนี้ละก็...\nแค่ 10 วินาทีก็เจาะระบบได้แล้วละ)"
20013-CVGroup_WeaponGet_Idle1-1 = "ปืนเองก็เป็นอุปกรณ์สำคัญสำหรับแฮ็กเกอร์หมวกขาวนะ\nไว้จัดการกับพวกลูกค้าเรื่องมากน่ะ..."

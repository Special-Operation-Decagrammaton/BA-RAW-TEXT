[translation]
10081-CVGroup_UITitle_Idle1-1 = "블루~~~ 아카이브이어요!"
10081-CVGroup_CharacterGet_Idle1-1 = "소녀는 카데노코지 유카리라 하여요!\n자랑스러운 백화요란의 일원으로서…… 선생님을 위해 성심성의껏 노력하겠사와요!"
10081-CVGroup_Cafe_Idle1-1 = "흠흠, 과연 이곳이 샬-레……! ……정취가 있는 곳이어요!"
10081-CVGroup_Cafe_Idle2-1 = "아침 일찍부터 단련을 하고 있었는데…. 후아암, 졸음이 쏟아지는 것이어요."
10081-CVGroup_Cafe_Idle3-1 = "(뭔가, 범상치 않은 기척들이……\n샬-레는, 실은 복마전이었을지도 모르겠사와요!)"
10081-CVGroup_Cafe_Idle4-1 = "영-차. 백화요란으로서, 모두의 모범이 되지 않으면…"
10081-CVGroup_Cafe_Idle5-1 = "흐흥~ 흥~♪ 유카리 쾌진격이어요~!"
10081-CVGroup_WeaponGet_Idle1-1 = "네? 이것을, 소녀에게…? 이것은 신뢰의 상징이라 하는…? 그 증표라는 것이군요?!\n그렇다면 소녀는 선생님을 실망시키지 않도록 앞으로도 전설을 써내려가겠사와요!"

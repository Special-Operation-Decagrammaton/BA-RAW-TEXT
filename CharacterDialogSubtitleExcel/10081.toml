[translation]
10081-CVGroup_UITitle_Idle1-1 = "Blue~~~ Archive!"
10081-CVGroup_CharacterGet_Idle1-1 = "ข้ามีนามว่าคาเดโนะโคจิ ยูคาริ!\nในฐานะสมาชิกเฮียกกะเรียวรันที่น่าภาคภูมิใจ...\nข้าจะพยายามอย่างเต็มที่เพื่อท่านอาจารย์เจ้าค่ะ!"
10081-CVGroup_Cafe_Idle1-1 = "ฮืมม ที่นี่คือชัล~เลต์เหรอ...!\nมีเสน่ห์เฉพาะตัวมากเลยเจ้าค่ะ!"
10081-CVGroup_Cafe_Idle2-1 = "ข้าตื่นมาฝึกฝนตั้งแต่เช้าตรู่...\nฮ้าว... ความง่วงถามหาแล้วเจ้าค่ะ"
10081-CVGroup_Cafe_Idle3-1 = "(รู้สึกได้ถึงกลิ่นอายผิดปกติบางอย่าง\nชัล~เลต์อาจเป็นแหล่งรวมตัวของปีศาจก็ได้เจ้าค่ะ!)"
10081-CVGroup_Cafe_Idle4-1 = "ฮึบ! ต้องเป็นตัวอย่างให้ทุกคนในฐานะสมาชิกเฮียกกะเรียวรัน..."
10081-CVGroup_Cafe_Idle5-1 = "ฮุ~ ฮุฮุ~♪\nนี่คือเวลาแห่งความก้าวหน้าของยูคาริเจ้าค่ะ~!"
10081-CVGroup_WeaponGet_Idle1-1 = "เจ้าคะ? อันนี้ ให้ข้าเหรอ...?\nของที่เป็นสัญลักษณ์ของความไว้วางใจสินะเจ้าคะ...?!\nถ้างั้นต่อไปข้าก็จะสร้างตำนานไม่ให้ท่านอาจารย์ผิดหวังเลยเจ้าค่ะ!"

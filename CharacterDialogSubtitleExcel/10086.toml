[translation]
10086-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10086-CVGroup_CharacterGet_Idle1-1 = "Sorasaki Hina. Gehenna's Head Prefect. I-I tried on the dress you picked out, Sensei. How do I look?"
10086-CVGroup_Cafe_Idle1-1 = "I can't get myself to calm down while I'm in a dress."
10086-CVGroup_Cafe_Idle2-1 = "I want to sit down and practice."
10086-CVGroup_Cafe_Idle3-1 = "Look how they shine."
10086-CVGroup_Cafe_Idle4-1 = "Phew, I'm a bit tired..."
10086-CVGroup_Cafe_Idle5-1 = "As the head prefect, I must remain sharp."
10086-CVGroup_WeaponGet_Idle1-1 = "For me? Thank you, Sensei. You always talk to me about trust. I want to return that feeling. So please, listen until the very end."
10086-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei."
10086-CVGroup_UIEventLobby_Enter1-2 = "I'm sure the Pandemonium Society is giving you a hard time..."
10086-CVGroup_UIEventLobby_Enter1-3 = "But I'd like to ask for your help."
10086-CVGroup_UIEventLobby_Enter2-1 = "You're here, Sensei."
10086-CVGroup_UIEventLobby_Enter2-2 = "Sorry to ask you for another favor."
10086-CVGroup_UIEventLobby_Enter2-3 = "...Don't worry about it? Heehee. How like you."
10086-CVGroup_UIEventLobby_Enter3-1 = "I see. So it's still happening..."
10086-CVGroup_UIEventLobby_Enter3-2 = "Well, it wouldn't be the Pandemonium Society if things ended neatly."
10086-CVGroup_UIEventLobby_Enter4-1 = "Even after all this, it's still not over."
10086-CVGroup_UIEventLobby_Enter4-2 = "I'm not sure whether to call them gluttonous or greedy."
10086-CVGroup_UIEventLobby_Enter4-3 = "Well, we're not going to simply roll over and accept it."
10086-CVGroup_UIEventLobby_Enter5-1 = "It's finally over."
10086-CVGroup_UIEventLobby_Enter5-2 = "After days of commotion, this is how it ends."
10086-CVGroup_UIEventLobby_Enter5-3 = "Still... A lot happened."
10086-CVGroup_UIEventLobby_Enter5-4 = "I hope that you had a little fun at least, Sensei. Really."
10086-CVGroup_UIEventLobby_Idle1-1 = "Whenever there's trouble with the Pandemonium Society, it's always a hassle, but..."
10086-CVGroup_UIEventLobby_Idle1-2 = "I'm glad that this time, you were here, Sensei."
10086-CVGroup_UIEventLobby_Idle2-1 = "Throwing a party at the last minute..."
10086-CVGroup_UIEventLobby_Idle2-2 = "What are they thinking? Really?"
10086-CVGroup_UIEventLobby_Idle2-3 = "It's not like we can know, but still..."
10086-CVGroup_UIEventLobby_Idle3-1 = "Whatever happens, the Prefect Team's mission doesn't change."
10086-CVGroup_UIEventLobby_Idle3-2 = "This sort of thing happens all the time, after all."
10086-CVGroup_UIEventLobby_Idle4-1 = "It wouldn't be Gehenna without the chaos."
10086-CVGroup_UIEventLobby_Idle4-2 = "Hm? Gehenna's...scary?"
10086-CVGroup_UIEventLobby_Idle4-3 = "N-Now, now. I think you might be being a little hyperbolic..."

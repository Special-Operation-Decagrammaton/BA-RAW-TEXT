[translation]
10086-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10086-CVGroup_CharacterGet_Idle1-1 = "ประธานกรรมการโซระซากิ ฮินะ สังกัดสถาบันเกเฮนน่า\nคือว่า... ฉันลองใส่ชุดเดรสที่คุณครูเลือกให้แล้ว\nแต่ว่ามัน... เข้ากับฉันมั้ยนะ?"
10086-CVGroup_Cafe_Idle1-1 = "พออยู่ในชุดเดรสก็ใจไม่ค่อยสงบเลย..."
10086-CVGroup_Cafe_Idle2-1 = "ฉันอยากไปหาที่นั่งแล้วก็ฝึกซ้อมจัง..."
10086-CVGroup_Cafe_Idle3-1 = "ทุกคนสวยสง่ากันมากเลย"
10086-CVGroup_Cafe_Idle4-1 = "ฮู่ว มิน่าล่ะ ถึงได้เหนื่อยๆ..."
10086-CVGroup_Cafe_Idle5-1 = "ในฐานะประธานกรรมการ\nฉันต้องตั้งสติให้ดีๆ แล้ว"
10086-CVGroup_WeaponGet_Idle1-1 = "อันนี้ให้ฉันเหรอ... ขอบคุณนะคุณครู\nคำว่าเชื่อใจที่คุณบอกฉันตลอด\nฉันก็อยากตอบจิตใจที่ซื่อตรงนั้นอย่างซื่อตรง\nเพราะงั้นก็ช่วยดูจนจบเลยนะ"
10086-CVGroup_UIEventLobby_Enter1-1 = "เข้ามาสิ คุณครู"
10086-CVGroup_UIEventLobby_Enter1-2 = "ถึงจะเหนื่อยใจกับแพนเดโมเนียม โซไซตี้ก็เถอะ..."
10086-CVGroup_UIEventLobby_Enter1-3 = "แต่ถ้าไม่ติดอะไร ฉันก็อยากให้มาช่วยหน่อย"
10086-CVGroup_UIEventLobby_Enter2-1 = "มาแล้วเหรอ คุณครู"
10086-CVGroup_UIEventLobby_Enter2-2 = "ขอโทษที่ฉันขอร้องอีกครั้งนะ"
10086-CVGroup_UIEventLobby_Enter2-3 = "ไม่ต้องใส่ใจงั้นเหรอ?\nฮุฮุ สมกับเป็นคุณครูเลยนะ"
10086-CVGroup_UIEventLobby_Enter3-1 = "ยังเกิดเรื่องอยู่อีกสินะ..."
10086-CVGroup_UIEventLobby_Enter3-2 = "แต่ถ้าจบลงง่ายๆ\nก็คงไม่ใช่แพนเดโมเนียม โซไซตี้หรอกเนอะ"
10086-CVGroup_UIEventLobby_Enter4-1 = "ถึงจะเป็นแบบนี้ไปเรื่อยๆ ก็ยังไม่จบลงสินะ"
10086-CVGroup_UIEventLobby_Enter4-2 = "ต้องเรียกว่าเกินงาม หรือโลภมากดีนะ"
10086-CVGroup_UIEventLobby_Enter4-3 = "แต่ก็นะ ฉันเองก็ไม่คิดจะยอมแพ้ให้หรอก"
10086-CVGroup_UIEventLobby_Enter5-1 = "ในที่สุดก็จบสักที"
10086-CVGroup_UIEventLobby_Enter5-2 = "วันที่วุ่นวายก็มีฉากจบเหมือนกันสินะ"
10086-CVGroup_UIEventLobby_Enter5-3 = "ถึงจะเกิดเรื่องขึ้นมากมาย"
10086-CVGroup_UIEventLobby_Enter5-4 = "แต่ก็โชคดีนะที่คุณครูสนุกอยู่บ้าง... จริงๆ นะ"
10086-CVGroup_UIEventLobby_Idle1-1 = "ทุกครั้งที่มีปัญหากับแพนเดโมเนียม โซไซตี้\nฉันจะอึดอัดใจ..."
10086-CVGroup_UIEventLobby_Idle1-2 = "แต่ครั้งนี้โชคดีนะที่มีคุณครูอยู่ด้วย"
10086-CVGroup_UIEventLobby_Idle2-1 = "ให้เปิดงานปาร์ตี้กะทันหันเลย..."
10086-CVGroup_UIEventLobby_Idle2-2 = "คิดอะไรของเขาอยู่กันนะ"
10086-CVGroup_UIEventLobby_Idle2-3 = "ถ้าถามว่าปกติ... ฉันรู้อยู่แล้วรึเปล่า\nก็ใช่ว่าจะรู้หรอก"
10086-CVGroup_UIEventLobby_Idle3-1 = "ไม่ว่าจะเกิดเรื่องอะไรขึ้น\nงานที่คณะกรรมการวินัยต้องทำ ก็เหมือนเดิม"
10086-CVGroup_UIEventLobby_Idle3-2 = "มันเป็นเรื่องที่เกิดขึ้นอยู่ตลอดน่ะ"
10086-CVGroup_UIEventLobby_Idle4-1 = "ความวุ่นวายแบบนี้เป็นเรื่องที่เกิดขึ้นบ่อยๆ ในเกเฮนน่าน่ะ"
10086-CVGroup_UIEventLobby_Idle4-2 = "หืม? เกเฮนน่า... น่ากลัวเหรอ?"
10086-CVGroup_UIEventLobby_Idle4-3 = "ฉะ... ฉันไม่คิดว่ามันจะถึงขนาดนั้นนะ..."

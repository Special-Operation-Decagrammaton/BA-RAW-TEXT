[translation]
10086-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10086-CVGroup_CharacterGet_Idle1-1 = "格黑娜學園所屬，風紀委員長空崎陽奈。\n那個……我試著穿了老師為我挑的禮服。\n適合我嗎……？"
10086-CVGroup_Cafe_Idle1-1 = "穿著禮服，有點靜不下來……"
10086-CVGroup_Cafe_Idle2-1 = "想找個地方坐著練習一下……"
10086-CVGroup_Cafe_Idle3-1 = "全都在閃閃發亮。"
10086-CVGroup_Cafe_Idle4-1 = "呼，總覺得有點累……"
10086-CVGroup_Cafe_Idle5-1 = "身為風紀委員長，得打起精神來才行。"
10086-CVGroup_WeaponGet_Idle1-1 = "要把這個給我……謝謝你，老師。\n你一直以來對我說的話語、信賴。\n你那耿直的心，我也希望能率直地回應。\n所以，請守望我到最後吧。"
10086-CVGroup_UIEventLobby_Enter1-1 = "歡迎回來，老師。"
10086-CVGroup_UIEventLobby_Enter1-2 = "因為萬魔殿的關係一定很辛苦吧……"
10086-CVGroup_UIEventLobby_Enter1-3 = "如果可以，希望你能幫忙。"
10086-CVGroup_UIEventLobby_Enter2-1 = "你來了啊，老師。"
10086-CVGroup_UIEventLobby_Enter2-2 = "又得麻煩你，真對不起。"
10086-CVGroup_UIEventLobby_Enter2-3 = "……不必在意？\n呵呵，真有老師的風格。"
10086-CVGroup_UIEventLobby_Enter3-1 = "還在繼續啊……"
10086-CVGroup_UIEventLobby_Enter3-2 = "也是，這麼簡單就結束的話，那就不是萬魔殿了。"
10086-CVGroup_UIEventLobby_Enter4-1 = "明明一直在持續，居然還沒結束啊。"
10086-CVGroup_UIEventLobby_Enter4-2 = "該說是惡毒，還是貪心呢……"
10086-CVGroup_UIEventLobby_Enter4-3 = "不過，我也不打算輸。"
10086-CVGroup_UIEventLobby_Enter5-1 = "終於結束了呢。"
10086-CVGroup_UIEventLobby_Enter5-2 = "鬧哄哄的那些日子，也有這樣落幕的一天。"
10086-CVGroup_UIEventLobby_Enter5-3 = "……雖然發生了很多事。"
10086-CVGroup_UIEventLobby_Enter5-4 = "如果有稍微讓老師覺得開心就好了，真的。"
10086-CVGroup_UIEventLobby_Idle1-1 = "每當和萬魔殿有麻煩的時候都很傷腦筋……"
10086-CVGroup_UIEventLobby_Idle1-2 = "這次有老師在真是太好了。"
10086-CVGroup_UIEventLobby_Idle2-1 = "居然突然舉辦派對……"
10086-CVGroup_UIEventLobby_Idle2-2 = "真的是到底在想什麼啊。"
10086-CVGroup_UIEventLobby_Idle2-3 = "……如果問平常知不知道的話，那就另當別論了。"
10086-CVGroup_UIEventLobby_Idle3-1 = "無論事態如何，風紀委員會該做的事都不會改變。"
10086-CVGroup_UIEventLobby_Idle3-2 = "這也是常有的事了。"
10086-CVGroup_UIEventLobby_Idle4-1 = "這樣的騷動，在格黑娜只是家常便飯而已。"
10086-CVGroup_UIEventLobby_Idle4-2 = "嗯？格黑娜……很可怕？"
10086-CVGroup_UIEventLobby_Idle4-3 = "我，我覺得也不到那種程度吧……"

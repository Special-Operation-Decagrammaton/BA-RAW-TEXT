[translation]
10126-CVGroup_UITitle_Idle1-1 = "블루…… 아카이브…… 히힛."
10126-CVGroup_CharacterGet_Idle1-1 = "와일드헌트 예술학원 이타가키 카노에……\n오늘의 만남도…… 알고 있었어.\n우린 붉은 실로 이어져 있으니까…… 히히."
10126-CVGroup_Cafe_Idle1-1 = "전생에서도…… 이런 곳에는 와 본 적 없어……"
10126-CVGroup_Cafe_Idle2-1 = "오컬트 굿즈들도…… 가져다 놔야지."
10126-CVGroup_Cafe_Idle3-1 = "저쪽…… \"뭔가\" 있네."
10126-CVGroup_Cafe_Idle4-1 = "좁고 어두운 곳…… 없을까……"
10126-CVGroup_Cafe_Idle5-1 = "소환 의식…… 이쪽에서 해볼까?"
10126-CVGroup_WeaponGet_Idle1-1 = "역시 선생…… 잘 알고 있, 네. 이히힛."
10126-CVGroup_UIEventLobby_Enter1-1 = "오컬연에 온 걸 환영해…… 선생."
10126-CVGroup_UIEventLobby_Enter2-1 = "……학원의 비밀이, 기다리고 있어."
10126-CVGroup_UIEventLobby_Enter3-1 = "잠들어 있는 비밀들이…… 잔뜩 있다구?"
10126-CVGroup_UIEventLobby_Enter4-1 = "경고. 경고. 이벤트가 끝나갑니다."
10126-CVGroup_UIEventLobby_Enter4-2 = "……라네."
10126-CVGroup_UIEventLobby_Enter5-1 = "수고했어 선생."
10126-CVGroup_UIEventLobby_Enter5-2 = "이 추억은…… 다음 생에도 간직할 거야. 히힛."
10126-CVGroup_UIEventLobby_Idle1-1 = "선생의 손은…… 따뜻하네."
10126-CVGroup_UIEventLobby_Idle2-1 = "응? 그쪽의 까마귀? 난 모르는 아이야……"
10126-CVGroup_UIEventLobby_Idle3-1 = "내가…… 좋아?"
10126-CVGroup_UIEventLobby_Idle3-2 = "제대로 말해달라구. 히히……."
10126-CVGroup_UIEventLobby_Idle4-1 = "마음껏 쓰다듬어도 돼…… 전생에서처럼."
10126-CVGroup_UIEventMission_Enter1-1 = "선생을 위해서…… 학원의 비밀을 정리했어."
10126-CVGroup_UIEventMission_Enter2-1 = "자…… 함께 학원의 비밀을 파헤쳐보자."
10126-CVGroup_UIEventMission_Buy1-1 = "이 비밀을 풀어낼 줄이야……"
10126-CVGroup_UIEventMission_Buy1-2 = "역시 선생."
10126-CVGroup_UIEventMission_Buy2-1 = "고생했어…… 모두가 기뻐할 거야. 히히."
10126-CVGroup_UIEventMission_Idle1-1 = "와일드헌트에는…… 아직 알려지지 않은 비밀이 잔뜩 있다구."
10126-CVGroup_UIEventMission_Idle2-1 = "내가…… 좋은 거구나……?"
10126-CVGroup_UIEventMission_Idle2-2 = "정말 기뻐…… 이히힛!"
10126-CVGroup_UIEventMission_Interaction1-1 = "오늘은…… 여기까지네……."
10126-CVGroup_UIEventMission_Interaction1-2 = "수고했어."

[translation]
10126-CVGroup_UITitle_Idle1-1 = "Blue... Archive... Heehee."
10126-CVGroup_CharacterGet_Idle1-1 = "Itagaki Kanoe from Wildhunt Art Academy... I knew...we'd meet today. Red thread connects us, after all... Heehee."
10126-CVGroup_Cafe_Idle1-1 = "I've never been somewhere like this... Not even in my previous life."
10126-CVGroup_Cafe_Idle2-1 = "I'll also bring...occult merch."
10126-CVGroup_Cafe_Idle3-1 = "There's \"something\"...over there."
10126-CVGroup_Cafe_Idle4-1 = "Is there...somewhere small and dark?"
10126-CVGroup_Cafe_Idle5-1 = "Should I try a summoning ritual here?"
10126-CVGroup_WeaponGet_Idle1-1 = "As expected of Sensei... You know well. Eheehee."
10126-CVGroup_UIEventLobby_Enter1-1 = "Welcome to the Occult Society...Sensei."
10126-CVGroup_UIEventLobby_Enter2-1 = "...The secrets of the academy are waiting for you."
10126-CVGroup_UIEventLobby_Enter3-1 = "There are many secrets slumbering underneath...you know?"
10126-CVGroup_UIEventLobby_Enter4-1 = "Warning. Warning. The event will soon be over."
10126-CVGroup_UIEventLobby_Enter4-2 = "...Apparently."
10126-CVGroup_UIEventLobby_Enter5-1 = "Good work, Sensei."
10126-CVGroup_UIEventLobby_Enter5-2 = "This memory... I'll take it with me into my next life. Heehee."

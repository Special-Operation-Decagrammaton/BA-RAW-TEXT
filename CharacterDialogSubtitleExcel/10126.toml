[translation]
10126-CVGroup_UITitle_Idle1-1 = "蔚藍……檔案……咿嘻。"
10126-CVGroup_CharacterGet_Idle1-1 = "狂獵藝術學院的板垣鹿江……\n今天會見面的事……我早就知道了唷。\n因為我們，是被紅線牽住的關係……咿嘻。"
10126-CVGroup_Cafe_Idle1-1 = "我在前世……沒來過這種地方……"
10126-CVGroup_Cafe_Idle2-1 = "神秘學道具……也得擺好才行。"
10126-CVGroup_Cafe_Idle3-1 = "那邊……有「東西」呢。"
10126-CVGroup_Cafe_Idle4-1 = "狹窄又黑暗的地方……沒有嗎……"
10126-CVGroup_Cafe_Idle5-1 = "召喚儀式……在這裡舉行也可以吧？"
10126-CVGroup_WeaponGet_Idle1-1 = "不愧是老師……你很懂呢。咿嘻嘻。"
10126-CVGroup_UIEventLobby_Enter1-1 = "歡迎來到神秘研……老師。"
10126-CVGroup_UIEventLobby_Enter2-1 = "……學院的祕密，正在等著你哦。"
10126-CVGroup_UIEventLobby_Enter3-1 = "沉睡的祕密……有很多唷？"
10126-CVGroup_UIEventLobby_Enter4-1 = "警告，警告！活動即將結束！"
10126-CVGroup_UIEventLobby_Enter4-2 = "……就是這樣。"
10126-CVGroup_UIEventLobby_Enter5-1 = "辛苦了，老師。"
10126-CVGroup_UIEventLobby_Enter5-2 = "這段回憶……我會帶到來世去的。\n咿嘻。"
10126-CVGroup_UIEventLobby_Idle1-1 = "老師的手……好溫暖。"
10126-CVGroup_UIEventLobby_Idle2-1 = "那隻烏鴉……是不認識的孩子呢。"
10126-CVGroup_UIEventLobby_Idle3-1 = "你喜歡我嗎？"
10126-CVGroup_UIEventLobby_Idle3-2 = "要好好……說出口哦？\n咿嘻……"
10126-CVGroup_UIEventLobby_Idle4-1 = "想怎麼撫摸都可以……就像前世一樣。"
10126-CVGroup_UIEventMission_Enter1-1 = "為了老師……我整理了學院的祕密唷。"
10126-CVGroup_UIEventMission_Enter2-1 = "來……跟我一起解開吧。"
10126-CVGroup_UIEventMission_Buy1-1 = "居然能解開這個祕密……"
10126-CVGroup_UIEventMission_Buy1-2 = "老師真厲害呢。"
10126-CVGroup_UIEventMission_Buy2-1 = "辛苦了……大家也會很高興的。\n咿嘻。"
10126-CVGroup_UIEventMission_Idle1-1 = "在狂獵之中……還有許多不為人知的祕密唷。"
10126-CVGroup_UIEventMission_Idle2-1 = "你喜歡我嗎……？"
10126-CVGroup_UIEventMission_Idle2-2 = "好開心……咿嘻嘻！"
10126-CVGroup_UIEventMission_Interaction1-1 = "今天……就到這裡吧……"
10126-CVGroup_UIEventMission_Interaction1-2 = "辛苦了。"

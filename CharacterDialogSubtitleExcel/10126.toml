10126-CVGroup_UIEventMission_Buy1-1 = "To think you'd uncover this secret..."
10126-CVGroup_UIEventMission_Buy1-2 = "I knew you could do it, Sensei!"
10126-CVGroup_UIEventMission_Buy2-1 = "Good work... Everyone will be happy. Heehee."
10126-CVGroup_UIEventMission_Idle1-1 = "Here, in Wildhunt... There are still many secrets that have yet to be found."

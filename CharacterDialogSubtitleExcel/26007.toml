[translation]
26007-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
26007-CVGroup_CharacterGet_Idle1-1 = "오, 오쿠소라 아야네입니다. 어, 어떤가요…이런 모습, 조금 부끄럽네요."
26007-CVGroup_Cafe_Idle1-1 = "여, 여기에 이런 모습으로 있는 건 조금… 부끄럽네요…"
26007-CVGroup_Cafe_Idle2-1 = "어라, 다들 어디에……?"
26007-CVGroup_Cafe_Idle3-1 = "어디 느긋하게 있을 만한 곳은…"
26007-CVGroup_Cafe_Idle4-1 = "음…? 저건 뭐죠…?"
26007-CVGroup_Cafe_Idle5-1 = "괜히 기분이 좋아지네요."
26007-CVGroup_WeaponGet_Idle1-1 = "이렇게 대단한 것을, 저에게…\n선생님에게는 늘, 이런 식으로 받기만 하네요. 조금이라도 보답할 수 있도록 노력하겠습니다!"
26007-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님. 준비라면 맡겨주세요!"
26007-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었습니다, 선생님! 함께 힘내봐요!"
26007-CVGroup_UIEventLobby_Idle1-1 = "……어라, 선생님? 왜 그러시나요?"
26007-CVGroup_UIEventLobby_Idle2-1 = "왜, 왜 그러세요? 어디 벌레라도 붙어 있나요…?"
26007-CVGroup_UIEventLobby_Idle3-1 = "음…. 선생님, 부르셨나요?"
26007-CVGroup_UIEventLobby_Idle4-1 = "죄, 죄송해요. 그치만 그렇게 보시면 부끄러워요…."
26007-CVGroup_UIEventLobby_Enter3-1 = "자, 힘 내서 가보죠!"
26007-CVGroup_UIEventLobby_Enter4-1 = "조금만 더 하면 어떻게든 될 것 같네요. 힘내죠, 선생님!"
26007-CVGroup_UIEventLobby_Enter5-1 = "뒷정리도 중요하죠. 제가 도울게요!"
26007-CVGroup_UIEventMission_Enter1-1 = "목표 리스트를 정리해 봤어요!"
26007-CVGroup_UIEventMission_Enter2-1 = "이상이 이번의 목표 리스트입니다."
26007-CVGroup_UIEventMission_Idle1-1 = "목표를 하나씩 달성해 나가는 건, 즐거운 일이잖아요."
26007-CVGroup_UIEventMission_Idle2-1 = "그저 이렇게 같이 리스트 정리를 하는 것만으로도…. 뭔가 즐겁네요."
26007-CVGroup_UIEventMission_Buy1-1 = "네, 수고하셨습니다!"
26007-CVGroup_UIEventMission_Buy2-1 = "역시 선생님이세요!"
26007-CVGroup_UIEventMission_Interaction1-1 = "오늘의 목표가 모두 마무리 되었어요! 감사합니다!"

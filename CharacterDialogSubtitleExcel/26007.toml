[translation]
26007-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26007-CVGroup_CharacterGet_Idle1-1 = "โอ... โอคุโซระ อายาเนะค่ะ\nปะ...เป็นยังไงคะ ใส่ชุดแบบนี้แล้วมันเขินนิดหน่อยน่ะค่ะ"
26007-CVGroup_Cafe_Idle1-1 = "พอได้ลองใส่ชุดนี้ดูจริงๆ... ก็รู้สึกเขินอยู่หน่อยๆ ค่ะ..."
26007-CVGroup_Cafe_Idle2-1 = "ทุกคนหายไปไหนกันหมดนะคะ...?"
26007-CVGroup_Cafe_Idle3-1 = "บริเวณที่ที่จะนั่งพักผ่อนได้อย่างสบายๆ..."
26007-CVGroup_Cafe_Idle4-1 = "อืม...? นั่นอะไรน่ะคะ?"
26007-CVGroup_Cafe_Idle5-1 = "รู้สึกเหมือน… สดชื่นขึ้นเยอะเลยค่ะ"
26007-CVGroup_WeaponGet_Idle1-1 = "ให้ของที่ยอดเยี่ยมแบบนี้กับฉัน...\nฉันได้แต่รับความหวังดีจากคุณครูเสมอๆ เลยนะคะ\nเพราะงั้นฉันจะพยายามตอบแทนคุณครูให้ได้ค่ะ!"
26007-CVGroup_UIEventLobby_Enter1-1 = "เชิญค่ะ คุณครู\nไว้ใจเรื่องการเตรียมการได้เลยค่ะ!"
26007-CVGroup_UIEventLobby_Enter2-1 = "ฉันกำลังรออยู่เลยค่ะ คุณครู!\nมาพยายามด้วยกันเถอะค่ะ!"
26007-CVGroup_UIEventLobby_Idle1-1 = "เอ๋? คุณครู...?\nทะ...ทำไมทำแบบนั้นล่ะคะ...?"
26007-CVGroup_UIEventLobby_Idle2-1 = "มะ...มีอะไรเหรอคะ?\nมีแมลง… เกาะอยู่ที่ไหนเหรอคะ?"
26007-CVGroup_UIEventLobby_Idle3-1 = "อืม... คุณครูเรียกฉันเหรอคะ?"
26007-CVGroup_UIEventLobby_Idle4-1 = "ขะ...ขอโทษค่ะ\nถ้าคุณครูจ้องกันแบบนั้น ฉันเขินนะคะ..."
26007-CVGroup_UIEventLobby_Enter3-1 = "มาพยายามด้วยกันเถอะค่ะ!"
26007-CVGroup_UIEventLobby_Enter4-1 = "ถ้าพยายามมากขึ้นละก็คงทำได้สำเร็จแน่ค่ะ\nพยายามเข้านะคะ คุณครู!"
26007-CVGroup_UIEventLobby_Enter5-1 = "การเก็บกวาดก็เป็นเรื่องสำคัญนะคะ\nฉันจะช่วยเองค่ะ!"
26007-CVGroup_UIEventMission_Enter1-1 = "ฉันจัดการรายการที่ต้องการไว้แล้วค่ะ!"
26007-CVGroup_UIEventMission_Enter2-1 = "รายการข้างต้นคือรายการเป้าหมายค่ะ"
26007-CVGroup_UIEventMission_Idle1-1 = "การทำเป้าหมายสำเร็จไปทีละรายการ ก็เพลินดีอยู่นะคะ"
26007-CVGroup_UIEventMission_Idle2-1 = "และการได้เขียนรายการแบบนี้ ก็น่าสนุกเหมือนกันค่ะ"
26007-CVGroup_UIEventMission_Buy1-1 = "ค่ะ ทำได้ดีมากค่ะ!"
26007-CVGroup_UIEventMission_Buy2-1 = "สมกับเป็นคุณครูเลยค่ะ!"
26007-CVGroup_UIEventMission_Interaction1-1 = "เป้าหมายของวันนี้สำเร็จทั้งหมดแล้วค่ะ! ขอบคุณค่ะ!"

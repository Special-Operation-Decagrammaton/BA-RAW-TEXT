[translation]
26007-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26007-CVGroup_CharacterGet_Idle1-1 = "我，我是奧空綾音。\n怎，怎麼樣呢…這種穿著，有點害羞呢。"
26007-CVGroup_Cafe_Idle1-1 = "穿，穿成這樣在這裡，有點害羞呢…"
26007-CVGroup_Cafe_Idle2-1 = "咦，大家在哪裡…？"
26007-CVGroup_Cafe_Idle3-1 = "有沒有可以悠哉的地方…"
26007-CVGroup_Cafe_Idle4-1 = "嗯…？\n那是什麼呢…？"
26007-CVGroup_Cafe_Idle5-1 = "總覺得，變得開心起來了呢"
26007-CVGroup_WeaponGet_Idle1-1 = "這麼厲害的東西，要給我……\n我總是從老師手中收到各種東西呢。\n為了盡可能地報答您，我會繼續努力！"
26007-CVGroup_UIEventLobby_Enter1-1 = "辛苦了，老師。準備的話請交給我吧！"
26007-CVGroup_UIEventLobby_Enter2-1 = "我等你很久了，老師！一起加油吧！"
26007-CVGroup_UIEventLobby_Idle1-1 = "那個……老師？怎麼了嗎？"
26007-CVGroup_UIEventLobby_Idle2-1 = "怎，怎麼了嗎？有哪裡沾上蟲子了嗎……？"
26007-CVGroup_UIEventLobby_Idle3-1 = "那個……老師，你叫我嗎？"
26007-CVGroup_UIEventLobby_Idle4-1 = "不，不好意思，一直被盯著看的話我會害羞……"
26007-CVGroup_UIEventLobby_Enter3-1 = "好，打起精神努力吧！"
26007-CVGroup_UIEventLobby_Enter4-1 = "還差一點就有辦法解決了呢。\n加油吧，老師！"
26007-CVGroup_UIEventLobby_Enter5-1 = "善後處理也很重要呢，我來幫忙！"
26007-CVGroup_UIEventMission_Enter1-1 = "我整理了目標的清單。"
26007-CVGroup_UIEventMission_Enter2-1 = "這邊就是現在的目標。"
26007-CVGroup_UIEventMission_Idle1-1 = "目標一個接一個達成，感覺真不錯呢。"
26007-CVGroup_UIEventMission_Idle2-1 = "光是這樣一起整理清單，就感覺很開心。"
26007-CVGroup_UIEventMission_Buy1-1 = "好的，辛苦老師了！"
26007-CVGroup_UIEventMission_Buy2-1 = "真不愧是老師呢！"
26007-CVGroup_UIEventMission_Interaction1-1 = "今天的目標，全部完成了！\n辛苦老師了！"

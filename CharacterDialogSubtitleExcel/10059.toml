[translation]
10059-CVGroup_UITitle_Idle1-1 = "블루 아카이브~☆"
10059-CVGroup_CharacterGet_Idle1-1 = "미소노 미카. 드디어 등장~☆ 그런 느낌일까?\n앗, 나와 선생님 사이니까, 아이스브레이킹은 없어도 되겠지?\n앞으로 잘 부탁해. 선생님."
10059-CVGroup_Cafe_Idle1-1 = "흐응~ 조금 좁지만… 이건 이거대로 좋지 않아?"
10059-CVGroup_Cafe_Idle2-1 = "아하핫! 뭐야 이거, 완전 웃겨☆"
10059-CVGroup_Cafe_Idle3-1 = "나도 예전엔, 이거랑 비슷한 거 가지고 있었는데……."
10059-CVGroup_Cafe_Idle4-1 = "여기는 심심하지 않을 것 같아."
10059-CVGroup_Cafe_Idle5-1 = "선생님은 여기 없는 건가…."
10059-CVGroup_WeaponGet_Idle1-1 = "아… 이렇게 잘해주는 건 기쁘지만…\n이러다가는 돌이킬 수 없어질 지도 모르는데?\n선생님… 그래도 괜찮아? 나는… 별로 상관없지만☆"

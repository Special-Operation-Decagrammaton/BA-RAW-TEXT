[translation]
10059-CVGroup_UITitle_Idle1-1 = "Blue Archive~☆"
10059-CVGroup_CharacterGet_Idle1-1 = "มิโซโนะ มิกะ มาแล้ว~☆ แบบนี้ใช่มั้ยนะ?\nอ๊ะ ฉันกับคุณครูนี่ คงไม่ต้องทำความรู้จักกันใหม่ก็ได้สินะ?\nจากนี้ไปก็ฝากด้วยล่ะ คุณครู"
10059-CVGroup_Cafe_Idle1-1 = "หืม~ ถึงจะแคบไปหน่อย... แต่ที่นี่ก็ใช้ได้อยู่นะ"
10059-CVGroup_Cafe_Idle2-1 = "อ่ะฮะฮะฮะ!\nนี่มันอะไรกัน น่าขำสุดๆ☆"
10059-CVGroup_Cafe_Idle3-1 = "เมื่อก่อนฉันเองก็เคยมีของที่เหมือนกันกับอันนี้อยู่นะ..."
10059-CVGroup_Cafe_Idle4-1 = "ดูเหมือนที่นี่จะไม่น่าเบื่อเลยนะ"
10059-CVGroup_Cafe_Idle5-1 = "คุณครู... ไม่อยู่ที่นี่เหรอ..."
10059-CVGroup_WeaponGet_Idle1-1 = "อา... ฉันดีใจที่เอ็นดูฉันแบบนี้นะแต่ว่า...\nถ้าเป็นแบบนี้อาจจะกลับไปเป็นเหมือนเดิมไม่ได้นะ?\nคุณครู... แบบนั้นจะไม่เป็นไรแน่เหรอ?\nฉันน่ะ... ไม่เป็นอะไรอยู่แล้ว☆"

[translation]
10114-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10114-CVGroup_CharacterGet_Idle1-1 = "Welcome, Sensei! Please call me when you've picked out something from the menu! I'll do my best to prepare whatever you choose!"
10114-CVGroup_Cafe_Idle1-1 = "Whoa! What a cool cafe! There are always new things to learn as a waitress..."
10114-CVGroup_Cafe_Idle2-1 = "The interior is incredible..."
10114-CVGroup_Cafe_Idle3-1 = "(This recipe, it must be...!)"
10114-CVGroup_Cafe_Idle4-1 = "Hmm, so it goes like this, and then like that... This is a good reference."
10114-CVGroup_Cafe_Idle5-1 = "A waitress resting at a cafe, how ironic..."
10114-CVGroup_WeaponGet_Idle1-1 = "If you think about it, a waitress does need a gun. I mean, it's only natural in Kivotos. Besides that, you sometimes get unreasonable customers, or the ingredients start acting up..."
10114-CVGroup_UIEventLobby_Enter1-1 = "Welcome to Gehenna Academy, Sensei!"
10114-CVGroup_UIEventLobby_Enter1-2 = "I hope you have a fun, SAFE stay!"
10114-CVGroup_UIEventLobby_Enter2-1 = "Yay! Sensei is here!"
10114-CVGroup_UIEventLobby_Enter2-2 = "Wh-What do you think? My clothes, do they...suit me?"
10114-CVGroup_UIEventLobby_Enter3-1 = "Waah... Waaaah..."
10114-CVGroup_UIEventLobby_Enter3-2 = "Pan-Pan is... It's my fault... I have to do something...!"
10114-CVGroup_UIEventLobby_Enter4-1 = "But still, Gehenna Academy is my school too!"
10114-CVGroup_UIEventLobby_Enter4-2 = "I'm not going to sit still and do nothing!"
10114-CVGroup_UIEventLobby_Enter5-1 = "I was worried how it was going to turn out..."
10114-CVGroup_UIEventLobby_Enter5-2 = "Thank you, Sensei. With you around, it feels like everything's going to be fine!"
10114-CVGroup_UIEventLobby_Idle1-1 = "I ended up working part-time at a cafe, so I tried wearing a fitting outfit."
10114-CVGroup_UIEventLobby_Idle2-1 = "If you don't mind, how about...a short break?"
10114-CVGroup_UIEventLobby_Idle3-1 = "Part-time cafe work is a fresh and fun experience, too."
10114-CVGroup_UIEventLobby_Idle3-2 = "But still, when it comes to practicing cooking,"
10114-CVGroup_UIEventLobby_Idle3-3 = "the School Lunch Club's work feels more important."
10114-CVGroup_UIEventLobby_Idle4-1 = "Ahahaha! Seriously, Sensei! That tickles!"
10114-CVGroup_UIEventLobby_Idle4-2 = "...Phew, thank you."
10114-CVGroup_UIEventLobby_Idle4-3 = "That helped me loosen up a bit."
10114-CVGroup_UIEventShop_Enter1-1 = "I've been waiting, Sensei! Come on, this way!"
10114-CVGroup_UIEventShop_Enter2-1 = "Is there anything you're looking for, customer? Would you like to see the menu?"
10114-CVGroup_UIEventShop_Enter3-1 = "Heehee, Sensei."
10114-CVGroup_UIEventShop_Enter3-2 = "Look around to your heart's content, for as long as you like!"
10114-CVGroup_UIEventShop_Idle1-1 = "People often compliment my swiftness."
10114-CVGroup_UIEventShop_Idle1-2 = "It seems like my experience with the School Lunch Club helped!"
10114-CVGroup_UIEventShop_Idle2-1 = "Yes, Sensei? Did you call me?"
10114-CVGroup_UIEventShop_Idle2-2 = "Even if you called me without a reason, or even if you wanted something..."
10114-CVGroup_UIEventShop_Idle2-3 = "I'm happy regardless!"
10114-CVGroup_UIEventShop_Buy1-1 = "Ah, so that's what you want! Please give me a moment."
10114-CVGroup_UIEventShop_Buy2-1 = "Good choice! I'll get it to you momentarily."
10114-CVGroup_UIEventShop_Buy3-1 = "We have plenty of supplies. Don't you worry!"
10114-CVGroup_UIEventShop_Buy4-1 = "If anything's missing, please feel free to let me know."
10114-CVGroup_UIEventMission_Enter1-1 = "Ingredient preparation is important in a cafe too, of course! That's a common element with the School Lunch Club."
10114-CVGroup_UIEventMission_Enter2-1 = "I like doing what I'm tasked to do. For some reason, it makes me feel proud."
10114-CVGroup_UIEventMission_Idle1-1 = "Taking orders, bringing dishes..."
10114-CVGroup_UIEventMission_Idle1-2 = "Perhaps those are \"missions\" for me right now, you know what I mean?"
10114-CVGroup_UIEventMission_Idle2-1 = "Did you call for me, Sensei? Is there anything I can help with?"
10114-CVGroup_UIEventMission_Buy1-1 = "That's incredible, Sensei! Here, have this!"
10114-CVGroup_UIEventMission_Buy2-1 = "Being rewarded for all your hard work...it's really amazing!"
10114-CVGroup_UIEventMission_Interaction1-1 = "You've been doing good work!"
10114-CVGroup_UIEventMission_Interaction1-2 = "I'm glad I can help you, Sensei!"

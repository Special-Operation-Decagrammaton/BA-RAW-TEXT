[translation]
10114-CVGroup_UITitle_Idle1-1 = "蔚藍～檔～案！"
10114-CVGroup_CharacterGet_Idle1-1 = "歡迎光臨！老師！\n決定好要點什麼之後請跟我說！\n我會帶著愛情來服務的！"
10114-CVGroup_Cafe_Idle1-1 = "哇！是間很棒的咖啡廳呢！\n請務必讓我見學！"
10114-CVGroup_Cafe_Idle2-1 = "哇……這個裝潢真棒……"
10114-CVGroup_Cafe_Idle3-1 = "（啊，這個食譜是……！）"
10114-CVGroup_Cafe_Idle4-1 = "動線是這樣……嗎。\n讓我上了一課。"
10114-CVGroup_Cafe_Idle5-1 = "明明是服務生，卻在咖啡廳休息……\n總覺得有股奇怪的感覺呢……"
10114-CVGroup_WeaponGet_Idle1-1 = "雖然在奇普托斯是理所當然的事，但我認為服務生也應該攜帶槍枝才對！\n為了應對胡亂點餐的客人，以及鎮壓開始作亂的食材──咦，不對嗎？"
10114-CVGroup_UIEventLobby_Enter1-1 = "願意來到格黑娜學園……真的非常感謝！"
10114-CVGroup_UIEventLobby_Enter1-2 = "還請度過一段愉快的時光哦。"
10114-CVGroup_UIEventLobby_Enter2-1 = "哇！老師，你來啦！"
10114-CVGroup_UIEventLobby_Enter2-2 = "這套制服……適，適合我嗎？"
10114-CVGroup_UIEventLobby_Enter3-1 = "噫噫……嗚……"
10114-CVGroup_UIEventLobby_Enter3-2 = "餅醬它……\n都怪我不好……得想想辦法才行……！"
10114-CVGroup_UIEventLobby_Enter4-1 = "不能就這樣置之不理……"
10114-CVGroup_UIEventLobby_Enter4-2 = "因為我，是格黑娜的學生！"
10114-CVGroup_UIEventLobby_Enter5-1 = "我一度還想說不知道會變成怎樣……"
10114-CVGroup_UIEventLobby_Enter5-2 = "多虧了老師才能順利解決！\n非常謝謝你！"
10114-CVGroup_UIEventLobby_Idle1-1 = "因為咖啡廳的打工，所以穿上了制服。"
10114-CVGroup_UIEventLobby_Idle2-1 = "不介意的話……要不要休息一下？"
10114-CVGroup_UIEventLobby_Idle3-1 = "咖啡廳的工作，真的非常有趣。"
10114-CVGroup_UIEventLobby_Idle3-2 = "不過因為很少做料理……"
10114-CVGroup_UIEventLobby_Idle3-3 = "讓我覺得應該更努力做供給部的工作才行！"
10114-CVGroup_UIEventLobby_Idle4-1 = "啊哈哈！老師！很癢耶……！"
10114-CVGroup_UIEventLobby_Idle4-2 = "……呼，謝謝你。"
10114-CVGroup_UIEventLobby_Idle4-3 = "託你的福，讓我稍微放鬆了。"
10114-CVGroup_UIEventShop_Enter1-1 = "恭候多時了，老師！這邊請！"
10114-CVGroup_UIEventShop_Enter2-1 = "需要幫您拿菜單嗎？"
10114-CVGroup_UIEventShop_Enter3-1 = "呵呵，老師。"
10114-CVGroup_UIEventShop_Enter3-2 = "在結束之前，還請慢慢享受！"
10114-CVGroup_UIEventShop_Idle1-1 = "打工時，我的動作經常會被誇獎……"
10114-CVGroup_UIEventShop_Idle1-2 = "是因為活用了供給部的經驗嗎？"
10114-CVGroup_UIEventShop_Idle2-1 = "是，老師。要點餐嗎？"
10114-CVGroup_UIEventShop_Idle2-2 = "光是能被老師叫來……"
10114-CVGroup_UIEventShop_Idle2-3 = "我就很開心了！"
10114-CVGroup_UIEventShop_Buy1-1 = "我明白了！馬上為您準備！"
10114-CVGroup_UIEventShop_Buy2-1 = "是那個對吧！\n我立刻幫您送去，請稍等。"
10114-CVGroup_UIEventShop_Buy3-1 = "庫存非常充足！無須擔心！"
10114-CVGroup_UIEventShop_Buy4-1 = "如果有缺少什麼的話，請隨時跟我說！"
10114-CVGroup_UIEventMission_Enter1-1 = "就算是咖啡廳，準備也很重要！\n這是跟供給部的共通點呢。"
10114-CVGroup_UIEventMission_Enter2-1 = "每日的工作……能一點一點地完成，我很喜歡。"
10114-CVGroup_UIEventMission_Idle1-1 = "接受點餐，運送料理……"
10114-CVGroup_UIEventMission_Idle1-2 = "這些就是服務生的「任務」。"
10114-CVGroup_UIEventMission_Idle2-1 = "老師，有需要我幫忙的事嗎？"
10114-CVGroup_UIEventMission_Buy1-1 = "真厲害！老師！\n來，請收下這個！"
10114-CVGroup_UIEventMission_Buy2-1 = "努力能獲得回報……真的很棒呢。"
10114-CVGroup_UIEventMission_Interaction1-1 = "今天一天也辛苦了！"
10114-CVGroup_UIEventMission_Interaction1-2 = "能幫上老師的忙，我很開心！"

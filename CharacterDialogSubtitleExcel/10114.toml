[translation]
10114-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10114-CVGroup_CharacterGet_Idle1-1 = "어서 오세요! 선생님!\n메뉴가 정해지시면, 불러주세요!\n최선을 다해 준비하겠습니다!"
10114-CVGroup_Cafe_Idle1-1 = "와아! 멋진 카페네요! 웨이트리스로서 보고 배울 일이……"
10114-CVGroup_Cafe_Idle2-1 = "인테리어가 엄청나네요……"
10114-CVGroup_Cafe_Idle3-1 = "(이 레시피는, 분명……!)"
10114-CVGroup_Cafe_Idle4-1 = "동선을 이렇게, 그리고 이렇게…… 참고가 되네요."
10114-CVGroup_Cafe_Idle5-1 = "웨이트리스가 카페에서 휴식이라니, 아이러니하네요……"
10114-CVGroup_WeaponGet_Idle1-1 = "어떻게 보면 말이에요. 웨이트리스에게도 총은 필요하지 않을까요?\n물론 키보토스에서는 당연한 말이겠지만……\n그것 말고도, 무리한 요구를 하는 손님이라든가. 날뛰기 시작한 식재료를 조용히 시킨다든가……"
10114-CVGroup_UIEventLobby_Enter1-1 = "게헨나 학원에 어서 오세요, 선생님!"
10114-CVGroup_UIEventLobby_Enter1-2 = "부디 즐겁고…… 안전한 시간이 되셨으면 해요!"
10114-CVGroup_UIEventLobby_Enter2-1 = "와아! 선생님이 오셨어요!"
10114-CVGroup_UIEventLobby_Enter2-2 = "어, 어떠신가요? 제 옷…… 어울릴까요……?"
10114-CVGroup_UIEventLobby_Enter3-1 = "히잉…… 히이잉……"
10114-CVGroup_UIEventLobby_Enter3-2 = "팬 쨩이…… 제 책임이에요…… 제가 어떻게든 해야……!"
10114-CVGroup_UIEventLobby_Enter4-1 = "아무리 그래도, 게헨나 학원 역시 제가 다니는 곳이에요!"
10114-CVGroup_UIEventLobby_Enter4-2 = "이대로 손 놓고 있지만은 않을 테니까요!"
10114-CVGroup_UIEventLobby_Enter5-1 = "정말 어떻게 되나 했어요……"
10114-CVGroup_UIEventLobby_Enter5-2 = "감사합니다. 선생님. 선생님만 계시면, 뭐든지 다 잘될 것 같아요!"
10114-CVGroup_UIEventLobby_Idle1-1 = "카페 아르바이트를 하게 되어서 어울리는 복장을 입어 봤어요."
10114-CVGroup_UIEventLobby_Idle2-1 = "괜찮으시다면, 잠시 휴식이라도…… 어떠세요?"
10114-CVGroup_UIEventLobby_Idle3-1 = "카페 아르바이트 일도 신선하고 재미있네요."
10114-CVGroup_UIEventLobby_Idle3-2 = "그렇지만 역시, 요리를 수련한다는 측면에서는"
10114-CVGroup_UIEventLobby_Idle3-3 = "급양부 일이 더욱 중요한 것 같아요."
10114-CVGroup_UIEventLobby_Idle4-1 = "아하하하! 정말, 선생님! 간지럽다구요!"
10114-CVGroup_UIEventLobby_Idle4-2 = "……후우, 감사드려요."
10114-CVGroup_UIEventLobby_Idle4-3 = "조금, 긴장이 풀렸어요."
10114-CVGroup_UIEventShop_Enter1-1 = "기다리고 있었어요, 선생님! 이쪽으로 오세요!"
10114-CVGroup_UIEventShop_Enter2-1 = "찾으시는 것이 있으신가요, 손님? 메뉴판을 가져다드릴까요?"
10114-CVGroup_UIEventShop_Enter3-1 = "후훗. 선생님."
10114-CVGroup_UIEventShop_Enter3-2 = "마지막까지 충분히 둘러보다 가세요!"
10114-CVGroup_UIEventShop_Idle1-1 = "몸놀림이 가볍다고 칭찬받곤 해요."
10114-CVGroup_UIEventShop_Idle1-2 = "급양부에서 했던 경험이, 도움이 되나 봐요!"
10114-CVGroup_UIEventShop_Idle2-1 = "네, 선생님? 부르셨나요?"
10114-CVGroup_UIEventShop_Idle2-2 = "아무 이유 없이 부르셨어도, 무언가 필요한 것이 있으셔도……"
10114-CVGroup_UIEventShop_Idle2-3 = "저는, 모두 좋아요!"
10114-CVGroup_UIEventShop_Buy1-1 = "그 품목 말씀이군요! 조금만 기다려 주세요."
10114-CVGroup_UIEventShop_Buy2-1 = "저도 좋은 선택이라고 생각합니다! 금방 마련해 드릴게요."
10114-CVGroup_UIEventShop_Buy3-1 = "재고는 충분하답니다. 걱정 마세요!"
10114-CVGroup_UIEventShop_Buy4-1 = "혹시 부족한 것이 있으시다면, 언제든 말씀해 주세요!"
10114-CVGroup_UIEventMission_Enter1-1 = "카페에서도 재료 준비는 중요하답니다! 급양부 일과 공통점이 있네요."
10114-CVGroup_UIEventMission_Enter2-1 = "해야 할 일을 해낸다는 거, 저는 좋아해요. 왠지 모르게 뿌듯하거든요."
10114-CVGroup_UIEventMission_Idle1-1 = "주문을 받고, 메뉴를 가져다드리고……"
10114-CVGroup_UIEventMission_Idle1-2 = "그런 것들이 지금의 저에게 있어서, '미션'이 아닐까요?"
10114-CVGroup_UIEventMission_Idle2-1 = "부르셨나요, 선생님? 도와드릴 것이 있을까요?"
10114-CVGroup_UIEventMission_Buy1-1 = "대단하세요, 선생님! 여기, 이걸 받아 가시면 돼요!"
10114-CVGroup_UIEventMission_Buy2-1 = "노력한 만큼 보상이 돌아온다는 것은…… 정말, 멋진 것 같아요!"
10114-CVGroup_UIEventMission_Interaction1-1 = "오늘도 수고 많으셨습니다!"
10114-CVGroup_UIEventMission_Interaction1-2 = "선생님을 도울 수 있어서, 기뻤어요!"

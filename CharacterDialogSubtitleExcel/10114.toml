[translation]
10114-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10114-CVGroup_CharacterGet_Idle1-1 = "เชิญค่ะ! คุณครู! เลือกเมนูได้แล้วก็เรียกฉันนะคะ!\nฉันจะไปตั้งใจทำมาให้เลยค่ะ!"
10114-CVGroup_Cafe_Idle1-1 = "ว้าว! คาเฟ่สวยจังเลยค่ะ!\nต้องดูและเรียนรู้ในฐานะพนักงานเสิร์ฟแล้ว..."
10114-CVGroup_Cafe_Idle2-1 = "การตกแต่งร้านน่าทึ่งจังเลยค่ะ..."
10114-CVGroup_Cafe_Idle3-1 = "(สูตรนี้มันต้องเป็น...!)"
10114-CVGroup_Cafe_Idle4-1 = "เดินแบบนี้ แล้วก็แบบนี้... เป็นตัวอย่างที่ดีเลยนะคะ"
10114-CVGroup_Cafe_Idle5-1 = "เป็นพนักงานเสิร์ฟ แต่กลับมาพักผ่อนที่คาเฟ่\nมันดูย้อนแย้งจังเลยนะคะ..."
10114-CVGroup_WeaponGet_Idle1-1 = "ในบางแง่แล้ว พนักงานเสิร์ฟก็ต้องพกปืนไม่ใช่เหรอคะ?\nแน่นอนว่านี่เป็นเรื่องปกติในคิโวทอส...\nแต่ก็ควรมีไว้เพื่อลูกค้าที่ร้องขอมากเกินไป\nและเพื่อทำให้วัตถุดิบที่ฉุนเฉียวสงบลง..."
10114-CVGroup_UIEventLobby_Enter1-1 = "ยินดีต้อนรับสู่สถาบันเกเฮนน่าค่ะ คุณครู!"
10114-CVGroup_UIEventLobby_Enter1-2 = "ขอให้มีช่วงเวลาที่... สนุกและปลอดภัยนะคะ!"
10114-CVGroup_UIEventLobby_Enter2-1 = "ว้าว! คุณครูมาแล้วสินะคะ!"
10114-CVGroup_UIEventLobby_Enter2-2 = "ปะ... เป็นยังไงบ้างคะ?\nชุดของฉัน... เข้ากับฉันมั้ยคะ...?"
10114-CVGroup_UIEventLobby_Enter3-1 = "แง... แงง..."
10114-CVGroup_UIEventLobby_Enter3-2 = "แพนจัง... อยู่ในความรับผิดชอบของฉันค่ะ...\nไม่ว่ายังไงฉันต้อง...!"
10114-CVGroup_UIEventLobby_Enter4-1 = "เพราะถึงยังไงสถาบันเกเฮนน่า\nก็เป็นโรงเรียนของฉันค่ะ!"
10114-CVGroup_UIEventLobby_Enter4-2 = "ฉันจะไม่อยู่นิ่งๆ อย่างนี้หรอกค่ะ!"
10114-CVGroup_UIEventLobby_Enter5-1 = "คิดว่าจะแก้ปัญหาไม่ได้แล้วเสียอีกค่ะ..."
10114-CVGroup_UIEventLobby_Enter5-2 = "ขอบคุณนะคะ คุณครู พอมีคุณครูอยู่ด้วย\nทุกอย่างก็คลี่คลายได้ด้วยดีเลยค่ะ!"
10114-CVGroup_UIEventLobby_Idle1-1 = "ฉันใส่ชุดที่เข้ากับงานพาร์ทไทม์คาเฟ่ที่ฉันได้ทำค่ะ"
10114-CVGroup_UIEventLobby_Idle2-1 = "ถ้าคุณครูมีเวลา แวะมาพักสักหน่อย... ดีมั้ยคะ?"
10114-CVGroup_UIEventLobby_Idle3-1 = "งานพาร์ทไทม์คาเฟ่ก็แปลกใหม่และสนุกดีนะคะ"
10114-CVGroup_UIEventLobby_Idle3-2 = "แต่ถ้าในแง่ของการฝึกทำอาหารแล้วละก็"
10114-CVGroup_UIEventLobby_Idle3-3 = "งานของชมรมโภชนาการสำคัญกว่าเยอะเลยค่ะ"
10114-CVGroup_UIEventLobby_Idle4-1 = "อะฮ่าฮ่าฮ่า!\nจริงๆ เลย คุณครูคะ! มันจั๊กจี้นะคะ!"
10114-CVGroup_UIEventLobby_Idle4-2 = "ฮู่ว... ขอบคุณค่ะ"
10114-CVGroup_UIEventLobby_Idle4-3 = "หายประหม่าขึ้นมาหน่อยแล้วค่ะ"
10114-CVGroup_UIEventShop_Enter1-1 = "ฉันกำลังรอคุณครูอยู่เลยค่ะ มาทางนี้สิคะ!"
10114-CVGroup_UIEventShop_Enter2-1 = "มองหาอะไรอยู่หรือเปล่าคะ ลูกค้า? ให้ฉันเอาเมนูมาให้มั้ยคะ?"
10114-CVGroup_UIEventShop_Enter3-1 = "ฮุฮุ คุณครู"
10114-CVGroup_UIEventShop_Enter3-2 = "เชิญเลือกดูให้หนำใจจนปิดร้านเลยนะคะ!"
10114-CVGroup_UIEventShop_Idle1-1 = "ฉันถูกชมบ่อยๆ ว่าคล่องแคล่วค่ะ"
10114-CVGroup_UIEventShop_Idle1-2 = "ประสบการณ์จากชมรมโภชนาการน่าจะช่วยได้เยอะน่ะค่ะ!"
10114-CVGroup_UIEventShop_Idle2-1 = "ค่ะ คุณครู เรียกฉันเหรอคะ?"
10114-CVGroup_UIEventShop_Idle2-2 = "ต่อให้เรียกฉันอย่างไร้เหตุผลหรือมีของที่ต้องการจริงๆ..."
10114-CVGroup_UIEventShop_Idle2-3 = "ฉันก็ชอบทั้งหมดค่ะ!"
10114-CVGroup_UIEventShop_Buy1-1 = "สิ่งนั้นสินะคะ! กรุณารอสักครูค่ะ"
10114-CVGroup_UIEventShop_Buy2-1 = "ฉันก็คิดว่าเป็นการเลือกที่ดีค่ะ ฉันจะรีบไปเตรียมมาให้นะคะ"
10114-CVGroup_UIEventShop_Buy3-1 = "มีของในสต๊อกเหลือเฟือค่ะ ไม่ต้องกังวลนะคะ!"
10114-CVGroup_UIEventShop_Buy4-1 = "ถ้าขาดเหลืออะไรก็มาบอกฉันได้ตลอดนะคะ!"
10114-CVGroup_UIEventMission_Enter1-1 = "ในคาเฟ่ การเตรียมวัตถุดิบก็เป็นสิ่งสำคัญ!\nเหมือนงานชมรมโภชนาการเลยนะคะ"
10114-CVGroup_UIEventMission_Enter2-1 = "ฉันชอบการทำงานให้เสร็จ มันทำให้ฉันอิ่มเอมใจน่ะค่ะ"
10114-CVGroup_UIEventMission_Idle1-1 = "รับออเดอร์ แล้วก็เอาอาหารมาเสิร์ฟ..."
10114-CVGroup_UIEventMission_Idle1-2 = "ตอนนี้งานแบบนั้นถือเป็น 'ภารกิจ' ของฉันแล้วค่ะ"
10114-CVGroup_UIEventMission_Idle2-1 = "เรียกฉันเหรอคะ คุณครู? มีอะไรให้ฉันช่วยมั้ยคะ?"
10114-CVGroup_UIEventMission_Buy1-1 = "ยอดเยี่ยมเลยค่ะ คุณครู! นี่ค่ะ รับไปได้เลย!"
10114-CVGroup_UIEventMission_Buy2-1 = "การได้รางวัลสมกับที่พยายาม... เป็นสิ่งที่ยอดเยี่ยมไปเลยค่ะ!"
10114-CVGroup_UIEventMission_Interaction1-1 = "วันนี้ก็ทำได้ดีมากเลยค่ะ!"
10114-CVGroup_UIEventMission_Interaction1-2 = "ฉันดีใจที่ได้ช่วยคุณครูนะคะ!"

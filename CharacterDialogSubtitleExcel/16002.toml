[translation]
16002-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16002-CVGroup_CharacterGet_Idle1-1 = "需要說明和解說的話就交給我吧！"
16002-CVGroup_Cafe_Idle1-1 = "答案永遠都在問題身邊。\n雖然錯誤答案也是一樣。"
16002-CVGroup_Cafe_Idle2-1 = "嗯？某個地方的某人！\n感覺好像需要說明。"
16002-CVGroup_Cafe_Idle3-1 = "唔唔，好想說明！\n現在就想！"
16002-CVGroup_Cafe_Idle4-1 = "謎底全都解開了！"
16002-CVGroup_Cafe_Idle5-1 = "我的說明一直都很完美。\n除了太長這點之外！"
16002-CVGroup_WeaponGet_Idle1-1 = "這把武器的名字是……Professor K!"

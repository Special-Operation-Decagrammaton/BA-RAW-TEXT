[translation]
10064-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10064-CVGroup_CharacterGet_Idle1-1 = "It's New Year's. I just thought I should wear the right outfit to celebrate... Please keep looking after me this year too, Sensei."
10064-CVGroup_Cafe_Idle1-1 = "I hope next year will be a good one...in a lot of different ways."
10064-CVGroup_Cafe_Idle2-1 = "Hah. There's a lot to think about..."
10064-CVGroup_Cafe_Idle3-1 = "But I guess what I really want is peace and good health. Really, that's all..."
10064-CVGroup_Cafe_Idle4-1 = "I hope that everything that happens is stuff we can handle."
10064-CVGroup_Cafe_Idle5-1 = "I actually...kinda like this outfit. It's not bad, right?"
10064-CVGroup_WeaponGet_Idle1-1 = "Sensei, am I really gonna be able to... No, wait. Nevermind. I'll make sure I live up to your expectations."
10064-CVGroup_UIEventLobby_Enter1-1 = "Good job, Sensei. Nice to see you."
10064-CVGroup_UIEventLobby_Enter2-1 = "Did you make a wish?"
10064-CVGroup_UIEventLobby_Enter2-2 = "Things don't always turn out like you want..."
10064-CVGroup_UIEventLobby_Enter2-3 = "But that doesn't mean you should stop dreaming. That's what I think, anyway."
10064-CVGroup_UIEventLobby_Idle1-1 = "I hope you have a happy, peaceful year."
10064-CVGroup_UIEventLobby_Idle2-1 = "...Do I feel bad spending all the money I saved for a new album on an offering?"
10064-CVGroup_UIEventLobby_Idle2-2 = "I guess I did go a little overboard, huh...?"
10064-CVGroup_UIEventLobby_Idle2-3 = "Eh. It's worth it to see the boss smile."
10064-CVGroup_UIEventLobby_Idle3-1 = "Haruka's seemed really overworked lately..."
10064-CVGroup_UIEventLobby_Idle3-2 = "You think she's okay?"
10064-CVGroup_UIEventLobby_Idle4-1 = "(...The Kurokame Gang. I have a bad feeling about this.)"
10064-CVGroup_UIEventLobby_Enter3-1 = "This seems like trouble, right from the start..."
10064-CVGroup_UIEventLobby_Enter4-1 = "An offering thief..."
10064-CVGroup_UIEventLobby_Enter4-2 = "Ugh...this seems like a pain. I don't really wanna..."
10064-CVGroup_UIEventLobby_Enter4-3 = "But it's the boss' orders, so there's nothing I can do..."
10064-CVGroup_UIEventLobby_Enter5-1 = "Hah. Well, that was a disaster."
10064-CVGroup_UIEventLobby_Enter5-2 = "And I even had to face off against that weird robot..."
10064-CVGroup_UIEventLobby_Enter5-3 = "Oh well. At least it wasn't boring."
10064-CVGroup_UIEventMission_Enter1-1 = "Good thing you're here, Sensei. There was something I wanted to ask for your help on."
10064-CVGroup_UIEventMission_Enter2-1 = "Sorry, I know it's annoying to be asking this right after New Year's, but...do you think you could make a little time?"
10064-CVGroup_UIEventMission_Idle1-1 = "Haha, it's weird for Problem Solver to ask Sensei to do a job, and not the other way around, right?"
10064-CVGroup_UIEventMission_Idle1-2 = "But this the whole thing is a bit weird."
10064-CVGroup_UIEventMission_Idle2-1 = "Sorry. I'm not like Mutsuki... I'm really not used to this kind of place."
10064-CVGroup_UIEventMission_Idle2-2 = "Um... I'm just not sure what kind of expression I should be making right now."
10064-CVGroup_UIEventMission_Buy1-1 = "Thanks for your help. Here's your payment from Problem Solver 68."
10064-CVGroup_UIEventMission_Buy2-1 = "Thanks, Sensei. You really saved us..."
10064-CVGroup_UIEventMission_Interaction1-1 = "That should be enough for today. At this rate, those idiots at the event site are just gonna give up, right?"

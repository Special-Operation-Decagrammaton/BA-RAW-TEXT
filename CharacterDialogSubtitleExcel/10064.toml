[translation]
10064-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10064-CVGroup_CharacterGet_Idle1-1 = "因為是新年，所以穿了新衣服而已。\n今年也請多指教囉，老師。"
10064-CVGroup_Cafe_Idle1-1 = "希望今年……也能平安無事。\n……各種方面都是。"
10064-CVGroup_Cafe_Idle2-1 = "唉……\n需要煩惱的事真多。"
10064-CVGroup_Cafe_Idle3-1 = "老實說，\n我所希望的只有健康跟和平。\n真的，就只有這些。"
10064-CVGroup_Cafe_Idle4-1 = "希望只會發生\n能夠解決的問題。"
10064-CVGroup_Cafe_Idle5-1 = "這件衣服我還挺喜歡的。\n真不錯。"
10064-CVGroup_WeaponGet_Idle1-1 = "老師，真的沒問題嗎……？\n不……該說的不是這個吧。\n我會努力回應你對我的期待。"
10064-CVGroup_UIEventLobby_Enter1-1 = "辛苦了，老師。\n在會場也能遇見老師，真不錯呢。"
10064-CVGroup_UIEventLobby_Enter2-1 = "已經參拜過了嗎？"
10064-CVGroup_UIEventLobby_Enter2-2 = "雖然無法事事如願，"
10064-CVGroup_UIEventLobby_Enter2-3 = "不過許願的時候，是自由的。"
10064-CVGroup_UIEventLobby_Idle1-1 = "希望今年安穩的日子也能持續下去。"
10064-CVGroup_UIEventLobby_Idle2-1 = "你說把買新專輯的錢全部用作香油錢沒關係嗎？"
10064-CVGroup_UIEventLobby_Idle2-2 = "嘛……確實是有點逞強沒錯，"
10064-CVGroup_UIEventLobby_Idle2-3 = "不過只要能看到社長的笑容，這還算便宜的。"
10064-CVGroup_UIEventLobby_Idle3-1 = "遙香他，最近看起來好像很勞累。"
10064-CVGroup_UIEventLobby_Idle3-2 = "沒事吧……"
10064-CVGroup_UIEventLobby_Idle4-1 = "（……黑龜組啊。有股不好的預感）"
10064-CVGroup_UIEventLobby_Enter3-1 = "才剛過年，情勢好像就不太對勁……"
10064-CVGroup_UIEventLobby_Enter4-1 = "賽錢箱小偷是……"
10064-CVGroup_UIEventLobby_Enter4-2 = "雖然我沒打算把麻煩事記在腦袋裡，"
10064-CVGroup_UIEventLobby_Enter4-3 = "但既然是社長的命令也沒辦法。"
10064-CVGroup_UIEventLobby_Enter5-1 = "唉，真是一場災難。"
10064-CVGroup_UIEventLobby_Enter5-2 = "最後還得對付那個奇怪的機器人……"
10064-CVGroup_UIEventLobby_Enter5-3 = "不過……也因此不會感到無聊。"
10064-CVGroup_UIEventMission_Enter1-1 = "老師，你來得正好。有件事想請你幫忙。"
10064-CVGroup_UIEventMission_Enter2-1 = "抱歉新年就這樣……能占用一點時間嗎？"
10064-CVGroup_UIEventMission_Idle1-1 = "便利屋居然委託老師……"
10064-CVGroup_UIEventMission_Idle1-2 = "和平時的立場相反，總覺得很新鮮。"
10064-CVGroup_UIEventMission_Idle2-1 = "抱歉，我和無月不同，不習慣這種事……"
10064-CVGroup_UIEventMission_Idle2-2 = "這種時候……那個……\n不知道該露出什麼表情才好……"
10064-CVGroup_UIEventMission_Buy1-1 = "謝謝你的幫忙。\n來，這是便利屋68的謝禮。"
10064-CVGroup_UIEventMission_Buy2-1 = "謝謝，老師。\n多虧有你，幫大忙了。"
10064-CVGroup_UIEventMission_Interaction1-1 = "今天這樣就行了吧。\n會場的那些傢伙們，應該也差不多放棄了。"

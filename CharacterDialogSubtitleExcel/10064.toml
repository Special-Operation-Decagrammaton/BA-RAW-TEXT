[translation]
10064-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10064-CVGroup_CharacterGet_Idle1-1 = "새해가 되었으니까, 새 옷을 입은 것 뿐이야. 올해도 잘 부탁할게, 선생."
10064-CVGroup_Cafe_Idle1-1 = "올해도…… 무사했으면 좋겠는데. ……여러 가지로."
10064-CVGroup_Cafe_Idle2-1 = "하아…… 생각할 게 많네."
10064-CVGroup_Cafe_Idle3-1 = "진지하게 말하자면, 바라는 것은 건강과 평화. 정말로, 그것뿐이야."
10064-CVGroup_Cafe_Idle4-1 = "해결할 수 있는 일만, 일어났으면 좋겠네."
10064-CVGroup_Cafe_Idle5-1 = "이 옷은 제법 마음에 들어. 나쁘지 않아."
10064-CVGroup_WeaponGet_Idle1-1 = "선생, 정말 괜찮겠어……?\n아니…… 아니지. 걸어준 기대에 부응할 수 있도록 노력할게."
10064-CVGroup_UIEventLobby_Enter1-1 = "수고했어, 선생. 행사장에서도 선생을 만날 수 있어서 좋네."
10064-CVGroup_UIEventLobby_Enter2-1 = "소원은 다 빌었어?"
10064-CVGroup_UIEventLobby_Enter2-2 = "세상만사가 뜻대로 되지는 않지만,"
10064-CVGroup_UIEventLobby_Enter2-3 = "소원을 비는 것 만큼은, 자유니까."
10064-CVGroup_UIEventLobby_Idle1-1 = "올해도 평안한 하루가 계속되기를."
10064-CVGroup_UIEventLobby_Idle2-1 = "신작 앨범 구입에 쓸 돈을 모두 새전으로 써버렸는데, 괜찮냐고?"
10064-CVGroup_UIEventLobby_Idle2-2 = "뭐…… 확실히 조금 무리하기는 했지만."
10064-CVGroup_UIEventLobby_Idle2-3 = "사장의 미소를 볼 수 있다면, 그리 비싼 값은 아니지."
10064-CVGroup_UIEventLobby_Idle3-1 = "하루카, 최근에 조금 무리한 것처럼 보이던데."
10064-CVGroup_UIEventLobby_Idle3-2 = "괜찮으려나……"
10064-CVGroup_UIEventLobby_Idle4-1 = "(……검은거북파라. 좋지 않은 예감이 드는걸.)"
10064-CVGroup_UIEventLobby_Enter3-1 = "뭔가, 정초부터 말썽의 향기가……"
10064-CVGroup_UIEventLobby_Enter4-1 = "새전함 도둑이라니……"
10064-CVGroup_UIEventLobby_Enter4-2 = "귀찮은 일에 머리를 들이밀 생각은 없지만,"
10064-CVGroup_UIEventLobby_Enter4-3 = "사장의 명령이라면 어쩔 수 없지."
10064-CVGroup_UIEventLobby_Enter5-1 = "하아, 정말 재난이었네."
10064-CVGroup_UIEventLobby_Enter5-2 = "마지막에는 이상한 로봇까지 상대해야 했으니……"
10064-CVGroup_UIEventLobby_Enter5-3 = "하지만…… 덕분에 지루하진 않았어."
10064-CVGroup_UIEventMission_Enter1-1 = "선생, 마침 잘 왔어. 도움을 요청하고 싶은 일이 있어서."
10064-CVGroup_UIEventMission_Enter2-1 = "새해부터 부탁을 해서 미안하지만… 잠깐 시간 좀 내줄 수 있을까?"
10064-CVGroup_UIEventMission_Idle1-1 = "흥신소가 선생에게 의뢰를 하다니……"
10064-CVGroup_UIEventMission_Idle1-2 = "평소와는 입장이 정반대라, 어쩐지 새롭네."
10064-CVGroup_UIEventMission_Idle2-1 = "미안. 무츠키와 달리 이런 데 익숙하질 않아서……"
10064-CVGroup_UIEventMission_Idle2-2 = "이럴 때는…… 그…… 어떤 표정을 지어야 할 지 모르겠어……"
10064-CVGroup_UIEventMission_Buy1-1 = "도와줘서 고마워. 자, 흥신소 68에서 주는 사례야."
10064-CVGroup_UIEventMission_Buy2-1 = "고마워, 선생. 덕분에 살았어."
10064-CVGroup_UIEventMission_Interaction1-1 = "오늘은 이만하면 괜찮을까. 행사장의 바보들도 이 정도면 포기하겠지."

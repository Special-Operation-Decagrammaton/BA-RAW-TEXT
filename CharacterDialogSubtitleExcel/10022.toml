[translation]
10022-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10022-CVGroup_CharacterGet_Idle1-1 = "게헨나 선도부 부장. 히나.\n……이 차림은 어디까지나, 하계 합숙 훈련을 위해서니까."
10022-CVGroup_Cafe_Idle1-1 = "이 수영복, …이상해보이진, 않겠지?"
10022-CVGroup_Cafe_Idle2-1 = "하계 합숙 훈련 때문인가…… 조금 지치네."
10022-CVGroup_Cafe_Idle3-1 = "귀여운 수영복이라니, 나에겐 어울리지 않는데 ……."
10022-CVGroup_Cafe_Idle4-1 = "여긴 시원하구나. 합숙 훈련에 딱이야."
10022-CVGroup_Cafe_Idle5-1 = "다음 훈련 계획을, 생각해둘까."
10022-CVGroup_WeaponGet_Idle1-1 = "이걸, 나한테……? 알았어, 고맙게 받을게.\n마지막 순간, 그때가 올 때까지……선생님의 기대에 부응해 보일 테니까."
10022-CVGroup_UIEventLobby_Enter1-1 = "어서 와. 선생. 보다시피, 하계 합숙 훈련의 준비는 완벽해. 뭐든지 말해줘."
10022-CVGroup_UIEventLobby_Enter2-1 = "아아, 선생이구나. 하계 합숙의 훈련 계획표는 제대로 체크했어?"
10022-CVGroup_UIEventLobby_Enter2-2 = "무더운 날이야. 수분 보급에 주의해."
10022-CVGroup_UIEventLobby_Idle1-1 = "여름이네……. 무덥고, 나른하고, 모든 게 귀찮지만……."
10022-CVGroup_UIEventLobby_Idle1-2 = "이것도 훈련의 일환, 어쩔 수 없지."
10022-CVGroup_UIEventLobby_Idle2-1 = "바다에는 항상 위험이 따르기 마련이야."
10022-CVGroup_UIEventLobby_Idle2-2 = "언제 어디서 사고가 날지 모르니까 조심해."
10022-CVGroup_UIEventLobby_Idle2-3 = "그……. 무슨 일이 있으면, 날 부르면 되니까."
10022-CVGroup_UIEventLobby_Idle3-1 = "하계 합숙 훈련. 설마 올해는, 선생과 함께일 줄이야……"
10022-CVGroup_UIEventLobby_Idle3-2 = "……조금, 신선하네."
10022-CVGroup_UIEventLobby_Idle4-1 = "이 수영복은 어디까지나, 훈련을 위해 준비한 거고……."
10022-CVGroup_UIEventLobby_Idle4-2 = "새걸 사지 않아도,"
10022-CVGroup_UIEventLobby_Idle4-3 = "갖고 있던 걸 입는 쪽이 효율적일까, 싶어서……."
10022-CVGroup_UIEventMission_Enter1-1 = "지금부터 하계 합숙 훈련을 시작하겠어."
10022-CVGroup_UIEventMission_Idle1-1 = "귀찮지만, 이것도 훈련의 일환이니까."
10022-CVGroup_UIEventMission_Idle2-1 = "더워, 귀찮아……."
10022-CVGroup_UIEventMission_Buy1-1 = "확실히 합숙 효과가 있었나 봐."
10022-CVGroup_UIEventMission_Interaction1-1 = "작전 성공. 간단했어. 다만 훈련으로는 부족할지도……."

[translation]
10022-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10022-CVGroup_CharacterGet_Idle1-1 = "格黑娜的風紀委員長，陽奈。\n……這終究只是，為了夏天鍛鍊合宿的打扮。"
10022-CVGroup_Cafe_Idle1-1 = "這件泳衣，\n應該不奇怪吧……？"
10022-CVGroup_Cafe_Idle2-1 = "是鍛鍊的原因嗎……\n身體有點慵懶。"
10022-CVGroup_Cafe_Idle3-1 = "可愛泳衣什麼的，\n不適合我……"
10022-CVGroup_Cafe_Idle4-1 = "這裡很涼快呢……\n很適合鍛鍊。"
10022-CVGroup_Cafe_Idle5-1 = "得考慮下一個訓練內容才行……"
10022-CVGroup_WeaponGet_Idle1-1 = "要把這個，給我……？知道了，我會心懷感激地收下。\n最後的瞬間，直到那之前為止……我都會回應老師的期待的。"
10022-CVGroup_UIEventLobby_Enter1-1 = "歡迎你，老師。\n如你所見，夏季合宿的準備很完美。有問題儘管說。"
10022-CVGroup_UIEventLobby_Enter2-1 = "啊啊，老師。\n合宿的行程表有仔細確認了嗎？"
10022-CVGroup_UIEventLobby_Enter2-2 = "今天也這麼熱，要注意補充水分哦。"
10022-CVGroup_UIEventLobby_Idle1-1 = "夏天……又熱又濕又懶，做什麼都很麻煩……"
10022-CVGroup_UIEventLobby_Idle1-2 = "不過這也是訓練的一環，沒有辦法。"
10022-CVGroup_UIEventLobby_Idle2-1 = "海時常伴隨著危險。"
10022-CVGroup_UIEventLobby_Idle2-2 = "不知何時何地會發生意外，要小心。"
10022-CVGroup_UIEventLobby_Idle2-3 = "那個……有什麼事的話，可以叫我哦。"
10022-CVGroup_UIEventLobby_Idle3-1 = "夏季訓練合宿。\n沒想到今年可以和老師一起……"
10022-CVGroup_UIEventLobby_Idle3-2 = "……感覺有點新鮮。"
10022-CVGroup_UIEventLobby_Idle4-1 = "這件泳裝只不過是為了訓練……"
10022-CVGroup_UIEventLobby_Idle4-2 = "不買新的，"
10022-CVGroup_UIEventLobby_Idle4-3 = "直接穿原本這件我覺得比較有效率……"
10022-CVGroup_UIEventMission_Enter1-1 = "從現在起，開始夏季合宿的訓練。"
10022-CVGroup_UIEventMission_Idle1-1 = "雖然麻煩，但這也是訓練的一環。"
10022-CVGroup_UIEventMission_Idle2-1 = "好熱，好麻煩……"
10022-CVGroup_UIEventMission_Buy1-1 = "合宿好像有效果了。"
10022-CVGroup_UIEventMission_Interaction1-1 = "作戰成功……但是有點太簡單了。\n作為訓練不夠滿足……"

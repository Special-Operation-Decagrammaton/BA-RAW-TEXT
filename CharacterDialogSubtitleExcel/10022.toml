[translation]
10022-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10022-CVGroup_CharacterGet_Idle1-1 = "หัวหน้าคณะกรรมการวินัย ฮินะ\nชุดนี้... ก็แค่เพื่อการฝึกภาคฤดูร้อนเท่านั้นแหละ"
10022-CVGroup_Cafe_Idle1-1 = "ชุดว่ายน้ำไม่ได้ดูแปลกใช่มั้ย...?"
10022-CVGroup_Cafe_Idle2-1 = "ฉันเหนื่อยนิดหน่อยน่ะ...\nคงเพราะฝึกภาคฤดูร้อนแหละ"
10022-CVGroup_Cafe_Idle3-1 = "พวกชุดว่ายน้ำน่ารักๆ น่ะ\nไม่เหมาะกับฉันหรอก..."
10022-CVGroup_Cafe_Idle4-1 = "ที่นี่สบายดีจัง เหมาะกับการมาเข้าค่ายฝึกเลย"
10022-CVGroup_Cafe_Idle5-1 = "คิดแผนการฝึกครั้งต่อไปเอาไว้เลยดีมั้ยนะ..."
10022-CVGroup_WeaponGet_Idle1-1 = "ให้ฉันเหรอ...? เข้าใจแล้ว จะรับไว้แล้วกันนะ\nฉันจะทำตามที่คุณครูต้องการจนถึงที่สุดเอง"
10022-CVGroup_UIEventLobby_Enter1-1 = "เข้ามาสิคุณครู ก็อย่างที่เห็น\nเตรียมการฝึกภาคฤดูร้อนสมบูรณ์แบบแล้ว\nมีอะไรก็บอกมาได้เลยนะ"
10022-CVGroup_UIEventLobby_Enter2-1 = "อา... คุณครูเองเหรอ ตรวจสอบแผนการฝึกภาคฤดูร้อนแล้วใช่มั้ย?"
10022-CVGroup_UIEventLobby_Enter2-2 = "วันนี้ร้อนสุดๆ เลย เตรียมน้ำดื่มให้พร้อมด้วยล่ะ"
10022-CVGroup_UIEventLobby_Idle1-1 = "ฤดูร้อนแล้วนะ ทั้งร้อนแล้วก็ชื้น\nน่าหงุดหงิดไปหมดเลย..."
10022-CVGroup_UIEventLobby_Idle1-2 = "ช่วยไม่ได้นะ เพราะทั้งหมดนี่ก็เป็นส่วนหนึ่งของการฝึกสินะ"
10022-CVGroup_UIEventLobby_Idle2-1 = "ที่ชายหาดมักจะมีอันตรายซ่อนอยู่เสมอ"
10022-CVGroup_UIEventLobby_Idle2-2 = "อาจเกิดอุบัติเหตุที่คาดไม่ถึงขึ้นเมื่อไหร่ก็ได้"
10022-CVGroup_UIEventLobby_Idle2-3 = "อืม... ถ้าเกิดอะไรขึ้นละก็ เรียกฉันก็ได้นะ"
10022-CVGroup_UIEventLobby_Idle3-1 = "การฝึกภาคฤดูร้อน... ไม่คิดเลยว่าจะได้มาฝึกกับคุณครู..."
10022-CVGroup_UIEventLobby_Idle3-2 = "รู้สึกแปลกๆ นิดหน่อยนะ..."
10022-CVGroup_UIEventLobby_Idle4-1 = "ชุดนี้เป็นชุดที่เตรียมมาเพื่อการฝึกภาคฤดูร้อน"
10022-CVGroup_UIEventLobby_Idle4-2 = "ไม่ได้ซื้อชุดใหม่หรอก"
10022-CVGroup_UIEventLobby_Idle4-3 = "ฉันคิดว่าเอาชุดเก่าที่มีมาใส่\nมันน่าจะมีประโยชน์มากกว่าน่ะ..."
10022-CVGroup_UIEventMission_Enter1-1 = "ตั้งแต่นี้ไป ค่ายฤดูร้อนกำลังจะเริ่มแล้วละ"
10022-CVGroup_UIEventMission_Idle1-1 = "ถึงจะน่ารำคาญ แต่นี่... ก็เป็นส่วนหนึ่งของการฝึกนี่นา"
10022-CVGroup_UIEventMission_Idle2-1 = "ทั้งร้อน แล้วก็น่ารำคาญ..."
10022-CVGroup_UIEventMission_Buy1-1 = "ผลของการฝึก ดูเหมือนจะเห็นได้ชัดเลยนะ"
10022-CVGroup_UIEventMission_Interaction1-1 = "ปฏิบัติการสำเร็จ แค่เรื่องง่ายๆ น่ะ\nแต่ว่าสำหรับการฝึก... อาจจะยังบกพร่องอยู่ก็ได้"

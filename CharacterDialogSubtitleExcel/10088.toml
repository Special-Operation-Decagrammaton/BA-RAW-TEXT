[translation]
10088-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10088-CVGroup_CharacterGet_Idle1-1 = "Hey. These kinds of clothes aren't my usual style. Sorry if I'm weird about it. I'm putting my trust in you, Sensei."
10088-CVGroup_Cafe_Idle1-1 = "Not bad. You've got a pretty strong fashion sense."
10088-CVGroup_Cafe_Idle2-1 = "I feel like I'm being watched..."
10088-CVGroup_Cafe_Idle3-1 = "Hmm... So this is your idea of fashion, Sensei?"
10088-CVGroup_Cafe_Idle4-1 = "...Hmm, I feel pretty comfy."
10088-CVGroup_Cafe_Idle5-1 = "I really could use a place to sit down."
10088-CVGroup_WeaponGet_Idle1-1 = "Sometimes I wonder... I've been given so much... I don't know if I could ever pay it back. Maybe I never will... In that case, thank you, Sensei. I'll keep doing the best I can."
10088-CVGroup_UIEventLobby_Enter1-1 = "I've been waiting for you, Sensei. What should I do?"
10088-CVGroup_UIEventLobby_Enter2-1 = "...Ah, I was just looking for you, Sensei."
10088-CVGroup_UIEventLobby_Enter3-1 = "It's surprisingly busy, isn't it? Shall we get to work?"
10088-CVGroup_UIEventLobby_Enter4-1 = "Time is short. But don't worry, I'll help."
10088-CVGroup_UIEventLobby_Enter5-1 = "I'll start cleaning up."
10088-CVGroup_UIEventLobby_Idle1-1 = "...Huh? Did you call me?"
10088-CVGroup_UIEventLobby_Idle2-1 = "Sensei... Now's not a time to goof off."
10088-CVGroup_UIEventLobby_Idle3-1 = "*sigh*...Playtime can wait until after work."
10088-CVGroup_UIEventLobby_Idle4-1 = "I'm not bothered by your ribbing, but..."
10088-CVGroup_UIEventLobby_Idle4-2 = "I'd appreciate it if you knocked it off."
10088-CVGroup_UIEventShop_Enter1-1 = "Do you need supplies? They're here."
10088-CVGroup_UIEventShop_Enter2-1 = "If there's anything else you want, just let me know. I'll grab it."
10088-CVGroup_UIEventShop_Enter3-1 = "Work's over, but...did you forget something?"
10088-CVGroup_UIEventShop_Idle1-1 = "If you did, just let me know. I'll find it."
10088-CVGroup_UIEventShop_Idle2-1 = "Hey, that tickles."
10088-CVGroup_UIEventShop_Buy1-1 = "That's what you needed."
10088-CVGroup_UIEventShop_Buy2-1 = "So that's where it was. It'll definitely be helpful."
10088-CVGroup_UIEventShop_Buy3-1 = "I'm glad we got this just in time."
10088-CVGroup_UIEventShop_Buy4-1 = "Good choice."
10088-CVGroup_UIEventMission_Enter1-1 = "I've organized our in-progress tasks. Let's review them together, Sensei."
10088-CVGroup_UIEventMission_Enter2-1 = "Here to check on our progress?"
10088-CVGroup_UIEventMission_Idle1-1 = "Sensei, please!"
10088-CVGroup_UIEventMission_Idle2-1 = "...It feels nice working with you, Sensei."
10088-CVGroup_UIEventMission_Buy1-1 = "Yeah. It all worked out."
10088-CVGroup_UIEventMission_Buy2-1 = "Not bad at all."
10088-CVGroup_UIEventMission_Interaction1-1 = "That's all for today."

[translation]
10088-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10088-CVGroup_CharacterGet_Idle1-1 = "你好。因為……不是我習慣穿的衣服，\n如果有點奇怪的話，抱歉……請多指教，老師。"
10088-CVGroup_Cafe_Idle1-1 = "品味還不錯呢。"
10088-CVGroup_Cafe_Idle2-1 = "好像感覺到了視線……"
10088-CVGroup_Cafe_Idle3-1 = "……哼嗯，原來老師喜歡這種啊？"
10088-CVGroup_Cafe_Idle4-1 = "……感覺很平靜。"
10088-CVGroup_Cafe_Idle5-1 = "感覺能坐的地方…沒有嗎？"
10088-CVGroup_WeaponGet_Idle1-1 = "我有時候會這麼想。\n至今為止接受的這麼多東西……我真的能夠好好回報嗎。\n可是……那種日子好像不會到來，所以我就先說了……謝謝你，老師。\n我以後……也會努力的。"
10088-CVGroup_UIEventLobby_Enter1-1 = "我正在等你哦，老師。\n該怎麼做呢？"
10088-CVGroup_UIEventLobby_Enter2-1 = "……啊，我正好在找你，老師。"
10088-CVGroup_UIEventLobby_Enter3-1 = "意外的忙碌呢。\n加緊腳步吧。"
10088-CVGroup_UIEventLobby_Enter4-1 = "時間很緊迫呢。\n但是別擔心，我會幫忙。"
10088-CVGroup_UIEventLobby_Enter5-1 = "開始事後清理吧。"
10088-CVGroup_UIEventLobby_Idle1-1 = "……嗯？你叫我嗎？"
10088-CVGroup_UIEventLobby_Idle2-1 = "老師……現在不是開玩笑的時候。"
10088-CVGroup_UIEventLobby_Idle3-1 = "唉……玩耍等工作結束再做吧。"
10088-CVGroup_UIEventLobby_Idle4-1 = "捉弄我這件事本身倒是沒關係……"
10088-CVGroup_UIEventLobby_Idle4-2 = "不過希望現在先別這麼做。"
10088-CVGroup_UIEventShop_Enter1-1 = "需要補給對吧？\n在這裡哦。"
10088-CVGroup_UIEventShop_Enter2-1 = "需要什麼就說一聲吧。\n我會拿過來。"
10088-CVGroup_UIEventShop_Enter3-1 = "雖然工作已經結束……\n沒有忘了什麼吧？"
10088-CVGroup_UIEventShop_Idle1-1 = "完整告訴我的話，我會去找找。"
10088-CVGroup_UIEventShop_Idle2-1 = "老師……\n那個，有點癢。"
10088-CVGroup_UIEventShop_Buy1-1 = "看來需要那個啊。"
10088-CVGroup_UIEventShop_Buy2-1 = "原來在這裡啊。\n會派上用場的，一定會。"
10088-CVGroup_UIEventShop_Buy3-1 = "幸好我碰巧有個好東西。"
10088-CVGroup_UIEventShop_Buy4-1 = "是個好選擇。"
10088-CVGroup_UIEventMission_Enter1-1 = "我整理了進行中的作業哦。\n一起來看吧，老師。"
10088-CVGroup_UIEventMission_Enter2-1 = "是來確認進行狀況的嗎？"
10088-CVGroup_UIEventMission_Idle1-1 = "老師……這樣有點……"
10088-CVGroup_UIEventMission_Idle2-1 = "……和老師一起工作，真不錯呢。"
10088-CVGroup_UIEventMission_Buy1-1 = "嗯，解決了。"
10088-CVGroup_UIEventMission_Buy2-1 = "挺不錯的呢。"
10088-CVGroup_UIEventMission_Interaction1-1 = "今天的工作結束了。"

[translation]
10088-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10088-CVGroup_CharacterGet_Idle1-1 = "안녕. 별로…. 익숙한 옷이 아니라서 좀 이상하다면 미안. 잘 부탁해, 선생."
10088-CVGroup_Cafe_Idle1-1 = "나쁘지 않은 센스인걸."
10088-CVGroup_Cafe_Idle2-1 = "시선이 느껴지는데…."
10088-CVGroup_Cafe_Idle3-1 = "…흠. 선생은, 이런 취향이구나?"
10088-CVGroup_Cafe_Idle4-1 = "…뭔가 마음이 편해져."
10088-CVGroup_Cafe_Idle5-1 = "어디 앉을 데 없을까."
10088-CVGroup_WeaponGet_Idle1-1 = "가끔 생각해. 지금까지 여러 가지 받아왔지만… 제대로 돌려줄 수 있을까 하고.\n하지만…. 아마 그런 날은 오지 않을 테니, 먼저 말해둘게. …고마워, 선생. 앞으로도…열심히 할게."
10088-CVGroup_UIEventLobby_Enter1-1 = "기다리고 있었어, 선생. 뭘 하면 될까?"
10088-CVGroup_UIEventLobby_Enter2-1 = "…아. 마침 찾고 있었어, 선생."
10088-CVGroup_UIEventLobby_Enter3-1 = "의외로 바쁘네. 빨리 시작해 볼까?"
10088-CVGroup_UIEventLobby_Enter4-1 = "시간 아슬아슬하네. 하지만 걱정 마. 도와줄게."
10088-CVGroup_UIEventLobby_Enter5-1 = "뒷정리 시작할게."
10088-CVGroup_UIEventLobby_Idle1-1 = "…응? 불렀어?"
10088-CVGroup_UIEventLobby_Idle2-1 = "선생…. 장난칠 때가 아니야."
10088-CVGroup_UIEventLobby_Idle3-1 = "하아…. 노는 건 일 끝나고 나서."
10088-CVGroup_UIEventLobby_Idle4-1 = "놀리는 것 자체는 상관없지만…"
10088-CVGroup_UIEventLobby_Idle4-2 = "지금은 그만해 줬으면 해."
10088-CVGroup_UIEventShop_Enter1-1 = "보급이 필요한 거지? 여기 있어."
10088-CVGroup_UIEventShop_Enter2-1 = "필요한 거 있으면 말해. 가져올게."
10088-CVGroup_UIEventShop_Enter3-1 = "일은 끝났지만… 잊은 건 없어?"
10088-CVGroup_UIEventShop_Idle1-1 = "제대로 알려주면 찾아오도록 할게."
10088-CVGroup_UIEventShop_Idle2-1 = "선생. 그거…. 조금 간지러운데."
10088-CVGroup_UIEventShop_Buy1-1 = "그게 필요했구나."
10088-CVGroup_UIEventShop_Buy2-1 = "여기 있었구나. 도움이 될 거야, 분명."
10088-CVGroup_UIEventShop_Buy3-1 = "마침 좋은 게 있어서 다행이다."
10088-CVGroup_UIEventShop_Buy4-1 = "좋은 선택이네."
10088-CVGroup_UIEventMission_Enter1-1 = "진행하고 있는 태스크를 정리했어. 같이 보자, 선생."
10088-CVGroup_UIEventMission_Enter2-1 = "진행 상황 확인하러 온 거야?"
10088-CVGroup_UIEventMission_Idle1-1 = "선생님…… 좀……!"
10088-CVGroup_UIEventMission_Idle2-1 = "……선생님과 함께 일하는 거, 좋네."
10088-CVGroup_UIEventMission_Buy1-1 = "응. 해결됐네."
10088-CVGroup_UIEventMission_Buy2-1 = "나쁘지 않네."
10088-CVGroup_UIEventMission_Interaction1-1 = "오늘 일은 이걸로 끝."

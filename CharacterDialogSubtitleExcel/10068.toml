[translation]
10068-CVGroup_UITitle_Idle1-1 = "Blue! Archive!!"
10068-CVGroup_CharacterGet_Idle1-1 = "Hi, hello! Everyone's superstar savior, Uzawa Reisa, is here!"
10068-CVGroup_Cafe_Idle1-1 = "Oh, this is...a lot of people..."
10068-CVGroup_Cafe_Idle2-1 = "Should I just go...?"
10068-CVGroup_Cafe_Idle3-1 = "No, I have to push forward as normally as possible in times like this!"
10068-CVGroup_Cafe_Idle4-1 = "I-I gotta stop... Everyone's gonna think I'm strange."
10068-CVGroup_Cafe_Idle5-1 = "This seems like a really safe place!"
10068-CVGroup_WeaponGet_Idle1-1 = "I can't...really believe it. I'm really helping you, Sensei? I always hope I am, but..."
10068-CVGroup_UIEventLobby_Enter1-1 = "Oh, Sensei! Over here!"
10068-CVGroup_UIEventLobby_Enter2-1 = "Here comes the superhero of the Vigilante Crew!"
10068-CVGroup_UIEventLobby_Enter2-2 = "It is I, Uzawa Reisa! Hi!"
10068-CVGroup_UIEventLobby_Enter3-1 = "Ooooh... Things are heating up!"
10068-CVGroup_UIEventLobby_Enter4-1 = "The final sprint!"
10068-CVGroup_UIEventLobby_Enter5-1 = "Let's keep trying our best until the very end!"
10068-CVGroup_UIEventLobby_Idle1-1 = "That's right! Uzawa Reisa's here on standby!"
10068-CVGroup_UIEventLobby_Idle2-1 = "What is it? Whatever it is, feel free to let me know!"
10068-CVGroup_UIEventLobby_Idle3-1 = "There was an incident? Where?! Who's the culprit?!"
10068-CVGroup_UIEventLobby_Idle4-1 = "Um... Being still is...really difficult for me..."
10068-CVGroup_UIEventShop_Enter1-1 = "I found some stuff on my patrol today! Lemme show you!"
10068-CVGroup_UIEventShop_Enter2-1 = "In this line of work...I see a lot of lost stuff."
10068-CVGroup_UIEventShop_Enter2-2 = "I sure hope they find their owners!"
10068-CVGroup_UIEventShop_Enter3-1 = "Is there anything you need more of? Lemme check and see what we've got!"
10068-CVGroup_UIEventShop_Idle1-1 = "Hm? What are you looking for?"
10068-CVGroup_UIEventShop_Idle1-2 = "Is it not here?"
10068-CVGroup_UIEventShop_Idle2-1 = "Okay! Just let me know if you need anything!"
10068-CVGroup_UIEventShop_Idle2-2 = "I'll go get it for you right away!"
10068-CVGroup_UIEventShop_Buy1-1 = "Oooh, I see, I see."
10068-CVGroup_UIEventShop_Buy2-1 = "Hm! Yep, that's good too!"
10068-CVGroup_UIEventShop_Buy3-1 = "So, that's what you needed?"
10068-CVGroup_UIEventShop_Buy4-1 = "Okay! Here it is!"
10068-CVGroup_UIEventMission_Enter1-1 = "Oh! Hey there, Sensei!"
10068-CVGroup_UIEventMission_Enter1-2 = "There's a whole mountain of things to do!"
10068-CVGroup_UIEventMission_Enter2-1 = "So...I made a list! Let's check everything off together."
10068-CVGroup_UIEventMission_Idle1-1 = "Huh? Sensei? What's wrong?"
10068-CVGroup_UIEventMission_Idle2-1 = "Concentrate! We gotta focus, okay?"
10068-CVGroup_UIEventMission_Buy1-1 = "Wow! I knew it, Sensei!"
10068-CVGroup_UIEventMission_Buy2-1 = "Nice! It's all going so well!"
10068-CVGroup_UIEventMission_Interaction1-1 = "Okay, we're all done for today!"
10068-CVGroup_UIEventMission_Interaction1-2 = "Phew...It's so nice to get stuff done like this!"

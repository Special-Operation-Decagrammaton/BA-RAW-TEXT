[translation]
10068-CVGroup_UITitle_Idle1-1 = "블루! 아카이브!!"
10068-CVGroup_CharacterGet_Idle1-1 = "왔습니다, 왔습니다! 모두의 슈퍼스타, 우자와 레이사의 등장입니다!"
10068-CVGroup_Cafe_Idle1-1 = "사, 사람 많아……."
10068-CVGroup_Cafe_Idle2-1 = "어디 있으면 되지……."
10068-CVGroup_Cafe_Idle3-1 = "아니, 오히려 이럴 때일수록 평소대로…!"
10068-CVGroup_Cafe_Idle4-1 = "여, 역시 그만두자. 이상한 사람으로 보일 거야."
10068-CVGroup_Cafe_Idle5-1 = "마음이 놓이는 장소에요!"
10068-CVGroup_WeaponGet_Idle1-1 = "사실, 아직 실감이 안 납니다. 저는……. 정말 선생님께 도움이 되고 있는 것일까요…….\n그랬으면 좋겠다고, 항상 진심으로 바라고 있습니다."
10068-CVGroup_UIEventLobby_Enter1-1 = "아, 선생님! 이쪽입니다!"
10068-CVGroup_UIEventLobby_Enter2-1 = "자경단의 슈퍼히어로!"
10068-CVGroup_UIEventLobby_Enter2-2 = "우자와 레이사 인사드립니다!"
10068-CVGroup_UIEventLobby_Enter3-1 = "오오옷-! 달아오르고 있습니다!"
10068-CVGroup_UIEventLobby_Enter4-1 = "막판 스퍼-트! 입니다!"
10068-CVGroup_UIEventLobby_Enter5-1 = "마지막까지, 달려 나갑시다!"
10068-CVGroup_UIEventLobby_Idle1-1 = "네! 우자와 레이사 대기 중입니다!"
10068-CVGroup_UIEventLobby_Idle2-1 = "무슨 일이세요? 언제든지 말씀 해주세요!"
10068-CVGroup_UIEventLobby_Idle3-1 = "사건인가요!? 어디죠!? 누구의 일이죠!?"
10068-CVGroup_UIEventLobby_Idle4-1 = "으음……. 가만히 있는 게 제일 힘듭니다……."
10068-CVGroup_UIEventShop_Enter1-1 = "순찰 중에 모은 물건입니다! 선생님도 보시겠어요?"
10068-CVGroup_UIEventShop_Enter2-1 = "이 일을 하다 보면, 분실물을 자주 보게 되네요…."
10068-CVGroup_UIEventShop_Enter2-2 = "무사히 주인을 찾았으면 좋겠습니다만."
10068-CVGroup_UIEventShop_Enter3-1 = "더 필요하신 것 있으신가요? 확인하고 오겠습니다!"
10068-CVGroup_UIEventShop_Idle1-1 = "응? 뭘 찾으시나요?"
10068-CVGroup_UIEventShop_Idle1-2 = "그건 여기에는 없는 건가요?"
10068-CVGroup_UIEventShop_Idle2-1 = "필요한 게 있으면 뭐든 말씀해 주세요!"
10068-CVGroup_UIEventShop_Idle2-2 = "바로 가져다드릴게요!"
10068-CVGroup_UIEventShop_Buy1-1 = "오호, 과연과연."
10068-CVGroup_UIEventShop_Buy2-1 = "음! 그것도 좋죠."
10068-CVGroup_UIEventShop_Buy3-1 = "그게 필요하셨군요?"
10068-CVGroup_UIEventShop_Buy4-1 = "자, 여기 있습니다~!"
10068-CVGroup_UIEventMission_Enter1-1 = "앗! 안녕하세요, 선생님!"
10068-CVGroup_UIEventMission_Enter1-2 = "해결해야 할 사건이 산더미에요!"
10068-CVGroup_UIEventMission_Enter2-1 = "리스트를 준비해 두었습니다! 함께 체크해 보시죠!"
10068-CVGroup_UIEventMission_Idle1-1 = "응……? 선생님? 왜 그러시죠?"
10068-CVGroup_UIEventMission_Idle2-1 = "집중! 작업에 집중해 주세요!"
10068-CVGroup_UIEventMission_Buy1-1 = "오오-! 역시 선생님!"
10068-CVGroup_UIEventMission_Buy2-1 = "좋습니다! 순조롭군요!!"
10068-CVGroup_UIEventMission_Interaction1-1 = "오늘 할 일은 이것으로 끝!"
10068-CVGroup_UIEventMission_Interaction1-2 = "후우-! 이 성취감! 좋네요!"

[translation]
10068-CVGroup_UITitle_Idle1-1 = "蔚藍！檔案！！"
10068-CVGroup_CharacterGet_Idle1-1 = "聽到呼叫就飛奔而來！\n大家的超級巨星，宇沢澪紗登場！"
10068-CVGroup_Cafe_Idle1-1 = "人，人好多……"
10068-CVGroup_Cafe_Idle2-1 = "要待在哪邊才好……"
10068-CVGroup_Cafe_Idle3-1 = "不對，越是這種時候就越要像平常一樣…！"
10068-CVGroup_Cafe_Idle4-1 = "果，果然還是算了…\n會被當成怪人的。"
10068-CVGroup_Cafe_Idle5-1 = "是個舒服的地方呢！"
10068-CVGroup_WeaponGet_Idle1-1 = "其實，我還沒有真實感。\n我……真的有幫上老師的忙嗎……\n要是有就好了，我一直是真心這麼希望著。"
10068-CVGroup_UIEventLobby_Enter1-1 = "啊，老師！\n我在這邊唷！"
10068-CVGroup_UIEventLobby_Enter2-1 = "自衛隊的超級英雄！"
10068-CVGroup_UIEventLobby_Enter2-2 = "宇沢澪紗向你問好！"
10068-CVGroup_UIEventLobby_Enter3-1 = "喔喔喔！熱鬧起來了！"
10068-CVGroup_UIEventLobby_Enter4-1 = "最後衝刺！的說！"
10068-CVGroup_UIEventLobby_Enter5-1 = "讓我們衝刺到最後一刻吧！"
10068-CVGroup_UIEventLobby_Idle1-1 = "是！宇沢澪紗，待命中！"
10068-CVGroup_UIEventLobby_Idle2-1 = "有什麼事嗎？請隨時告訴我！"
10068-CVGroup_UIEventLobby_Idle3-1 = "是事件嗎！？在哪裡呢！？是誰的事呢！？"
10068-CVGroup_UIEventLobby_Idle4-1 = "唔唔……乖乖待著是最難的……"
10068-CVGroup_UIEventShop_Enter1-1 = "這是巡邏中收集到的物品！\n老師也要過目一下嗎？"
10068-CVGroup_UIEventShop_Enter2-1 = "做這份工作，時常會看到遺失物呢……"
10068-CVGroup_UIEventShop_Enter2-2 = "希望失主能順利找到它們。"
10068-CVGroup_UIEventShop_Enter3-1 = "還有其他需要的東西嗎？\n我會去確認的！"
10068-CVGroup_UIEventShop_Idle1-1 = "嗯？在找什麼嗎？"
10068-CVGroup_UIEventShop_Idle1-2 = "是這裡沒有的東西嗎？"
10068-CVGroup_UIEventShop_Idle2-1 = "如果有任何需要的東西請儘管說！"
10068-CVGroup_UIEventShop_Idle2-2 = "我會馬上拿來的！"
10068-CVGroup_UIEventShop_Buy1-1 = "哦，原來如此原來如此。"
10068-CVGroup_UIEventShop_Buy2-1 = "嗯呣！那個也不錯呢。"
10068-CVGroup_UIEventShop_Buy3-1 = "在找的東西原來是那個啊！"
10068-CVGroup_UIEventShop_Buy4-1 = "來，在這裡，請收下～！"
10068-CVGroup_UIEventMission_Enter1-1 = "啊！你好，老師！"
10068-CVGroup_UIEventMission_Enter1-2 = "需要解決的事件堆積如山呢！"
10068-CVGroup_UIEventMission_Enter2-1 = "我準備了清單！一起確認吧！"
10068-CVGroup_UIEventMission_Idle1-1 = "嗯……？老師？怎麼了嗎？"
10068-CVGroup_UIEventMission_Idle2-1 = "專心！請專心在作業上！"
10068-CVGroup_UIEventMission_Buy1-1 = "噢噢！真不愧是老師！"
10068-CVGroup_UIEventMission_Buy2-1 = "真棒呢！很順利！！"
10068-CVGroup_UIEventMission_Interaction1-1 = "今天的工作到此結束！"
10068-CVGroup_UIEventMission_Interaction1-2 = "呼！這股成就感！感覺真不錯！"

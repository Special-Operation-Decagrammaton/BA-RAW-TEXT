[translation]
10068-CVGroup_UITitle_Idle1-1 = "Blue! Archive!!"
10068-CVGroup_CharacterGet_Idle1-1 = "มาแล้วค่า มาแล้ว!\nอุซาวะ เรอิสะ ซูเปอร์สตาร์ของทุกคนมาปรากฏตัวแล้วค่ะ!"
10068-CVGroup_Cafe_Idle1-1 = "คะ... คนเยอะจัง..."
10068-CVGroup_Cafe_Idle2-1 = "ไปอยู่ตรงไหนดีนะ..."
10068-CVGroup_Cafe_Idle3-1 = "ไม่สิ ยิ่งเป็นแบบนี้ ยิ่งต้องทำตามปกติ...!"
10068-CVGroup_Cafe_Idle4-1 = "มะ... ไม่เอาดีกว่า เดี๋ยวคนอื่นจะมองว่าเราเป็นคนแปลกๆ"
10068-CVGroup_Cafe_Idle5-1 = "ที่นี่เป็นที่ที่วางใจได้สินะคะ!"
10068-CVGroup_WeaponGet_Idle1-1 = "ที่จริง ฉันยังไม่รู้สึกว่าเป็นความจริงเลยค่ะ ฉัน... กำลัง\nเป็นประโยชน์ต่อคุณครูจริงๆ มั้ยนะ... ฉันหวังจากใจจริง\nเสมอเลยค่ะ ว่าจะเป็นประโยชน์กับคุณครู"
10068-CVGroup_UIEventLobby_Enter1-1 = "อ๊ะ คุณครู! ทางนี้ค่ะ!"
10068-CVGroup_UIEventLobby_Enter2-1 = "ซูเปอร์ฮีโร่แห่งกลุ่มรักษาความสงบ!"
10068-CVGroup_UIEventLobby_Enter2-2 = "อุซาวะ เรอิสะ ขอรายงานตัวค่ะ!"
10068-CVGroup_UIEventLobby_Enter3-1 = "โอ๊สสสส-! กำลังร้อนแรงเลยค่ะ!"
10068-CVGroup_UIEventLobby_Enter4-1 = "ใกล้จะถึงแล้วค่ะ!"
10068-CVGroup_UIEventLobby_Enter5-1 = "วิ่งสุดใจ ให้ถึงเส้นชัยเลย!"
10068-CVGroup_UIEventLobby_Idle1-1 = "ค่ะ! อุซาวะ เรอิสะกำลังรอคำสั่งค่ะ!"
10068-CVGroup_UIEventLobby_Idle2-1 = "มีเรื่องอะไรเหรอคะ? บอกฉันได้ตลอดเลยค่ะ!"
10068-CVGroup_UIEventLobby_Idle3-1 = "เกิดเหตุอะไรเหรอคะ?? ที่ไหนคะ!? ใครก่อเรื่องคะเนี่ย!?"
10068-CVGroup_UIEventLobby_Idle4-1 = "อืม... การอยู่เฉยๆ เนี่ยยากที่สุดเลยค่ะ..."
10068-CVGroup_UIEventShop_Enter1-1 = "มันเป็นของที่เก็บได้ตอนลาดตระเวนค่ะ คุณครูก็มาดูด้วยมั้ยคะ?"
10068-CVGroup_UIEventShop_Enter2-1 = "พอทำงานนี้ไปเรื่อยๆ ก็ได้เจอของหายบ่อยๆ เลยค่ะ..."
10068-CVGroup_UIEventShop_Enter2-2 = "ฉันก็อยากตามหา เจ้าของให้หรอกนะคะ"
10068-CVGroup_UIEventShop_Enter3-1 = "แต่มีชิ้นไหนที่คุณครูอยากได้มั้ยคะ? ฉันจะไปเช็กมานะคะ!"
10068-CVGroup_UIEventShop_Idle1-1 = "หืม? หาอะไรเหรอคะ?"
10068-CVGroup_UIEventShop_Idle1-2 = "ที่อยากได้ไม่มีตรงนี้เหรอคะ?"
10068-CVGroup_UIEventShop_Idle2-1 = "ถ้ามีอะไรที่อยากได้ ก็บอกฉันได้เลยนะคะ!"
10068-CVGroup_UIEventShop_Idle2-2 = "ฉันจะเอามาให้ทันทีเลยค่ะ!"
10068-CVGroup_UIEventShop_Buy1-1 = "โอ้วว อันนั้นเหรอ"
10068-CVGroup_UIEventShop_Buy2-1 = "อืม! มันก็ดีเหมือนกันค่ะ"
10068-CVGroup_UIEventShop_Buy3-1 = "อยากได้อันนั้นเหรอคะ?"
10068-CVGroup_UIEventShop_Buy4-1 = "นี่ค่ะ รับไปเลยค่ะ~!"
10068-CVGroup_UIEventMission_Enter1-1 = "อ๊ะ! สวัสดีค่ะคุณครู!"
10068-CVGroup_UIEventMission_Enter1-2 = "มีเรื่องที่ฉันต้องคลี่คลายเยอะเป็นภูเขาเลยค่ะ!"
10068-CVGroup_UIEventMission_Enter2-1 = "ฉันทำเป็นลิสต์ไว้แล้วค่ะ! ไปเช็กด้วยกันเลยค่ะ!"
10068-CVGroup_UIEventMission_Idle1-1 = "หืม...? คุณครู? ทำไมเป็นแบบนั้นล่ะคะ?"

10068-CVGroup_UIEventMission_Interaction1-1 = "งั้นก็เสร็จงานของวันนี้แล้ว!"
10068-CVGroup_UIEventMission_Interaction1-2 = "ฮู่ว! เสร็จได้สักที!\nดีจังเลยนะคะ!"

[translation]
10052-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10052-CVGroup_CharacterGet_Idle1-1 = "我是研討會的書記，生塩乃愛。\n請多多指教，老師……各方面都是。"
10052-CVGroup_Cafe_Idle1-1 = "（這間咖啡廳，簡直就像夢想家們做的夢一樣……）"
10052-CVGroup_Cafe_Idle2-1 = "（暫時將現實的倦怠遺忘，沉浸在白日夢裡吧）"
10052-CVGroup_Cafe_Idle3-1 = "這個家具，也想擺在研討會的休息室呢。呵呵。"
10052-CVGroup_Cafe_Idle4-1 = "這空間的構造…\n令人印象深刻呢。"
10052-CVGroup_Cafe_Idle5-1 = "呵呵，這幅光景，\n也想讓優香醬看看。"
10052-CVGroup_WeaponGet_Idle1-1 = "這轉換套件的構造真是不可思議呢。\n有點…想進行各種嘗試。呵呵。"
10052-CVGroup_UIEventLobby_Enter1-1 = "那麼，讓我們開始準備「晄輪大祭」吧。"
10052-CVGroup_UIEventLobby_Enter2-1 = "為了不耽誤開幕式，加油吧！"
10052-CVGroup_UIEventLobby_Enter3-1 = "（嗯…接下來要準備的東西是…）"
10052-CVGroup_UIEventLobby_Enter4-1 = "距離「晄輪大祭」開始只剩下一點時間了。"
10052-CVGroup_UIEventLobby_Enter4-2 = "請堅持到最後。"
10052-CVGroup_UIEventLobby_Enter5-1 = "辛苦了，老師。\n因為大家同心協力準備，"
10052-CVGroup_UIEventLobby_Enter5-2 = "這次的「晄輪大祭」一定也相當歡樂。"
10052-CVGroup_UIEventLobby_Idle1-1 = "因為是在奇普托斯中備受矚目的慶典，"
10052-CVGroup_UIEventLobby_Idle1-2 = "所以我們會盡力展現千年的真正價值！"
10052-CVGroup_UIEventLobby_Idle2-1 = "我雖然不擅長運動…"
10052-CVGroup_UIEventLobby_Idle2-2 = "但這終究也是研討會的工作。"
10052-CVGroup_UIEventLobby_Idle3-1 = "（…並不是所有人都期待著慶典啊…）"
10052-CVGroup_UIEventLobby_Idle4-1 = "等優香醬醒來後，一定會嘮叨個沒完吧。"
10052-CVGroup_UIEventLobby_Idle4-2 = "呵呵…優香醬慌張的樣子，現在就很期待看見了。"
10052-CVGroup_UIEventMission_Enter1-1 = "這是準備「晄輪大祭」所需的工作列表。"
10052-CVGroup_UIEventMission_Enter2-1 = "啊，來得正好。\n有工作想拜託老師…"
10052-CVGroup_UIEventMission_Idle1-1 = "咦？怎麼了嗎？"
10052-CVGroup_UIEventMission_Idle2-1 = "呵呵，不行唷。\n現在正忙著呢…以後會再好好陪你的。"
10052-CVGroup_UIEventMission_Buy1-1 = "真不愧是老師。我學到一課了。"
10052-CVGroup_UIEventMission_Buy2-1 = "做得真好啊。令人佩服。"
10052-CVGroup_UIEventMission_Interaction1-1 = "這裡的工作就此告一個段落了。\n謝謝你的幫忙。"

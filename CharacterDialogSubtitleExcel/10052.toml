[translation]
10052-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10052-CVGroup_CharacterGet_Idle1-1 = "เลขานุการของเซมิน่า อุชิโอะ โนอาค่ะ\nขอฝากเนื้อฝากตัวด้วยนะคะ คุณครู\n...ในหลายๆ เรื่องเลยค่ะ"
10052-CVGroup_Cafe_Idle1-1 = "(คาเฟ่นี้รู้สึกเหมือนกับอยู่ในความฝัน... ที่ไม่มีทางเป็นไปได้เลยค่ะ)"
10052-CVGroup_Cafe_Idle2-1 = "(มาลืมเรื่องน่าเบื่อ แล้วหลงอยู่ในความฝันดีกันมั้ยคะ)"
10052-CVGroup_Cafe_Idle3-1 = "เฟอร์นิเจอร์อันนี้...\nอยากเอาไปวางไว้ในห้องพักผ่อนของเซมิน่าจังค่ะ ฮุฮุ"
10052-CVGroup_Cafe_Idle4-1 = "โครงสร้างของที่นี่... น่าประทับใจมากเลยค่ะ"
10052-CVGroup_Cafe_Idle5-1 = "ฮุฮุ ภาพแบบนี้อยากให้ยูกะจังได้เห็นบ้างจังเลย"
10052-CVGroup_WeaponGet_Idle1-1 = "โครงสร้างของชุดแปลงอันนี้น่าสนใจดีนะคะ\nทำให้รู้สึกอยากทดลอง... หลายๆ อย่างขึ้นมาเลยค่ะ ฮุฮุ"
10052-CVGroup_UIEventLobby_Enter1-1 = "เอาละ ถ้างั้นก็มาเริ่มเตรียมงาน <ฮาโลเฟสติวัล> กันค่ะ"
10052-CVGroup_UIEventLobby_Enter2-1 = "ต้องรีบเตรียมตัวนะคะ จะได้ไม่สายในพิธีเปิดงานค่ะ!"
10052-CVGroup_UIEventLobby_Enter3-1 = "(อืม... ของชิ้นต่อไปที่ต้องเตรียมคืออะไรนะ...)"
10052-CVGroup_UIEventLobby_Enter4-1 = "ใกล้ถึงวันเปิดงาน <ฮาโลเฟสติวัล> แล้วค่ะ"
10052-CVGroup_UIEventLobby_Enter4-2 = "มาพยายามให้ถึงที่สุดกันนะคะ"
10052-CVGroup_UIEventLobby_Enter5-1 = "ทำได้ดีมากเลยค่ะ คุณครู\nทุกคนช่วยกันออกแรงเตรียมงานนี้ขึ้นมา"
10052-CVGroup_UIEventLobby_Enter5-2 = "<ฮาโลเฟสติวัล> ครั้งนี้ก็ต้องสนุกเหมือนทุกครั้งแน่ค่ะ"
10052-CVGroup_UIEventLobby_Idle1-1 = "นี่คืองานเทศกาลที่ทั้งคิโวทอสให้ความสนใจ"
10052-CVGroup_UIEventLobby_Idle1-2 = "ฉันจะพยายามให้เต็มที่เพื่อแสดงคุณค่าของมิลเลเนียมออกมาค่ะ"
10052-CVGroup_UIEventLobby_Idle2-1 = "ถึงฉันจะไม่ถนัดเรื่องพละกำลัง..."
10052-CVGroup_UIEventLobby_Idle2-2 = "แต่นี่ก็เป็นงานของเซมิน่านี่คะ"
10052-CVGroup_UIEventLobby_Idle3-1 = "(...ไม่ใช่ทุกคนสินะคะ ที่กำลังตั้งตารองานเทศกาลนี้...)"
10052-CVGroup_UIEventLobby_Idle4-1 = "ถ้ายูกะจังตื่นขึ้นมาก็คงจะบ่นนู่นนี่เยอะเลยใช่มั้ยคะ?"
10052-CVGroup_UIEventLobby_Idle4-2 = "ฮุฮุ... อยากเห็นแล้วละค่ะ ว่าสีหน้าตอนตกใจของยูกะจะเป็นยังไง"
10052-CVGroup_UIEventMission_Enter1-1 = "นี่คือรายการสิ่งที่จำเป็นในการเตรียมฮาโลเฟสติวัลค่ะ"
10052-CVGroup_UIEventMission_Enter2-1 = "มาได้จังหวะเลยค่ะ\nฉันมีเรื่องอยากขอร้องคุณครูอยู่พอดีเลยค่ะ"
10052-CVGroup_UIEventMission_Idle1-1 = "คะ? มีเรื่องอะไรเหรอคะ?"
10052-CVGroup_UIEventMission_Idle2-1 = "ฮุฮุ ไม่ได้นะคะ ตอนนี้ฉันกำลังยุ่ง...\nเดี๋ยวจะมาดูแลทีหลังนะคะ"
10052-CVGroup_UIEventMission_Buy1-1 = "สมกับเป็นคุณครูเลยนะคะ\nฉันได้เรียนรู้เยอะเลยค่ะ"
10052-CVGroup_UIEventMission_Buy2-1 = "จัดการได้เยี่ยมยอดเลยนะคะ\nประทับใจมากเลยค่ะ"
10052-CVGroup_UIEventMission_Interaction1-1 = "งานของที่นี่น่าจะเสร็จแล้วละค่ะ\nขอบคุณที่ช่วยนะคะ"

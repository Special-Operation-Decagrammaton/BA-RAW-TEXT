[translation]
10052-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10052-CVGroup_CharacterGet_Idle1-1 = "세미나의 서기, 우시오 노아입니다. 잘 부탁드리겠습니다, 선생님.\n……여러모로요."
10052-CVGroup_Cafe_Idle1-1 = "(이 카페는 마치 몽상가들의 꿈처럼 느껴지네요…)"
10052-CVGroup_Cafe_Idle2-1 = "(잠시 권태를 잊고 백일몽에 잠겨볼까요.)"
10052-CVGroup_Cafe_Idle3-1 = "이 가구, 세미나의 휴게실에도 들여놓고 싶네요. 후후."
10052-CVGroup_Cafe_Idle4-1 = "이 공간의 구조는… 인상적이네요."
10052-CVGroup_Cafe_Idle5-1 = "후후, 이 광경은 유우카 쨩에게도 보여주고 싶네요."
10052-CVGroup_WeaponGet_Idle1-1 = "이 컨버전 키트의 구조는 인상적이네요.\n조금… 여러가지를 시도해보고 싶어졌어요. 후훗."
10052-CVGroup_UIEventLobby_Enter1-1 = "그럼, 다함께 <황륜대제>의 준비를 시작해볼까요."
10052-CVGroup_UIEventLobby_Enter2-1 = "개회식에 늦지 않도록 서둘러 준비하죠!"
10052-CVGroup_UIEventLobby_Enter3-1 = "(음… 이다음에 준비해야 할 물건은…)"
10052-CVGroup_UIEventLobby_Enter4-1 = "<황륜대제> 개최도 이제 얼마 남지 않았네요."
10052-CVGroup_UIEventLobby_Enter4-2 = "마지막까지 힘내주세요."
10052-CVGroup_UIEventLobby_Enter5-1 = "수고 많으셨습니다, 선생님. 모두가 힘을 모아 준비했으니,"
10052-CVGroup_UIEventLobby_Enter5-2 = "이번 <황륜대제>도 분명히 즐거울 거예요."
10052-CVGroup_UIEventLobby_Idle1-1 = "키보토스의 이목이 집중되는 축제인 만큼,"
10052-CVGroup_UIEventLobby_Idle1-2 = "밀레니엄의 진가를 보여줄 수 있도록 최선을 다하겠습니다!"
10052-CVGroup_UIEventLobby_Idle2-1 = "체육은 특기가 아닙니다만…"
10052-CVGroup_UIEventLobby_Idle2-2 = "이것도 일단은 세미나의 업무니까요."
10052-CVGroup_UIEventLobby_Idle3-1 = "(…모두가 축제를 기대하고 있는 건 아닌가 보네요…)"
10052-CVGroup_UIEventLobby_Idle4-1 = "유우카 쨩이 나중에 일어나면 분명 엄청나게 잔소리를 하겠죠?"
10052-CVGroup_UIEventLobby_Idle4-2 = "후후… 유우카 쨩의 당황한 표정이 벌써부터 기대가 되네요."
10052-CVGroup_UIEventMission_Enter1-1 = "여기, 황륜대제 준비에 필요한 업무 목록입니다."
10052-CVGroup_UIEventMission_Enter2-1 = "아, 마침 잘 오셨어요. 선생님께 부탁드리고 싶은 일이 있었거든요…"
10052-CVGroup_UIEventMission_Idle1-1 = "네? 무슨 일이신가요?"
10052-CVGroup_UIEventMission_Idle2-1 = "후후, 안 돼요. 지금은 바쁘니… 나중에 상대해 드릴게요."
10052-CVGroup_UIEventMission_Buy1-1 = "역시 선생님이시네요. 공부가 되었습니다."
10052-CVGroup_UIEventMission_Buy2-1 = "훌륭한 일처리네요. 감탄했습니다."
10052-CVGroup_UIEventMission_Interaction1-1 = "이곳의 업무는 이것으로 일단 마무리 된 것 같네요. 도와주셔서 감사합니다."

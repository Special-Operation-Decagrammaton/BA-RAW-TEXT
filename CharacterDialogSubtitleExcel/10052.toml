[translation]
10052-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10052-CVGroup_CharacterGet_Idle1-1 = "I am Ushio Noa, Seminar's secretary. I look forward to your support, Sensei."
10052-CVGroup_Cafe_Idle1-1 = "(This cafe feels like a fantasy...)"
10052-CVGroup_Cafe_Idle2-1 = "(It makes me want to let my worries fade away as I lose myself in the dream.)"
10052-CVGroup_Cafe_Idle3-1 = "I would love to have furniture like this in the Seminar lounge. Heehee."
10052-CVGroup_Cafe_Idle4-1 = "The way this space is structured and put together is very impressive."
10052-CVGroup_Cafe_Idle5-1 = "Heehee. Yuuka would love it here."
10052-CVGroup_WeaponGet_Idle1-1 = "This conversion kit is so interesting. It makes me want tinker around... Whoops."
10052-CVGroup_UIEventLobby_Enter1-1 = "Hmm. According to my schedule, we should be preparing for the Kivotos Halo Festival now."
10052-CVGroup_UIEventLobby_Enter2-1 = "We'd better hurry. We don't want to miss the opening ceremony!"
10052-CVGroup_UIEventLobby_Enter3-1 = "(Hmm... Next on the agenda is...)"
10052-CVGroup_UIEventLobby_Enter4-1 = "It’s not long until the Halo Festival begins."
10052-CVGroup_UIEventLobby_Enter4-2 = "Let's do our best until the very end."
10052-CVGroup_UIEventLobby_Enter5-1 = "Thank you for your hard work, Sensei. Everyone has really given it their all..."
10052-CVGroup_UIEventLobby_Enter5-2 = "I'm sure this year's Kivotos Halo Festival will be amazing."
10052-CVGroup_UIEventLobby_Idle1-1 = "All eyes will be on us during the festival..."
10052-CVGroup_UIEventLobby_Idle1-2 = "...so we need to do our best to showcase the true value of Millennium!"
10052-CVGroup_UIEventLobby_Idle2-1 = "I'm not that athletic..."
10052-CVGroup_UIEventLobby_Idle2-2 = "But at the end of the day, this is another one of Seminar's duties."
10052-CVGroup_UIEventLobby_Idle3-1 = "(...I suppose not everyone is that excited for the festival...)"
10052-CVGroup_UIEventLobby_Idle4-1 = "I am absolutely, 100% certain that, without fail, Yuuka is going to nag my ears off."
10052-CVGroup_UIEventLobby_Idle4-2 = "Heh heh... I'm already picturing Yuuka's flustered face."
10052-CVGroup_UIEventMission_Enter1-1 = "Here, this is a list of tasks that must be completed in preparation for the Kivotos Halo Festival."
10052-CVGroup_UIEventMission_Enter2-1 = "Just in time, Sensei, for me to ask you for help."
10052-CVGroup_UIEventMission_Idle1-1 = "Oh? Why can't I do it?"
10052-CVGroup_UIEventMission_Idle2-1 = "Haha. Oh, Sensei. I'm busy already, of course. I could do it later, but..."
10052-CVGroup_UIEventMission_Buy1-1 = "I learned a lot. Well, you are a teacher."
10052-CVGroup_UIEventMission_Buy2-1 = "You're very reliable. I'm surprised."
10052-CVGroup_UIEventMission_Interaction1-1 = "Looks like all the work is done. Thank you so much for your help."

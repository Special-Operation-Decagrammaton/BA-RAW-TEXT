[translation]
20026-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
20026-CVGroup_CharacterGet_Idle1-1 = "토목, 건설, 철거…… 용역이 필요한 때라면 언제든 연락줘.\n투쟁과 선동이라면…… 더더욱 환영이고!"
20026-CVGroup_Cafe_Idle1-1 = "현장에서 가장 중요한 건, 첫째도 안전. 둘째도 안전이야."
20026-CVGroup_Cafe_Idle2-1 = "이곳의 건축 양식은…… 나쁘진 않다고 해두겠어."
20026-CVGroup_Cafe_Idle3-1 = "우리 용역부에게 맡기면, 이 정도쯤은……"
20026-CVGroup_Cafe_Idle4-1 = "주3일 노동…… 이 얼마나 아름다운 울림인지……"
20026-CVGroup_Cafe_Idle5-1 = "이곳의 푸딩은…… 사무국에서 보급하는 것과는 뭔가 달라 보이네."
20026-CVGroup_WeaponGet_Idle1-1 = "튼튼하고 신뢰할 수 있는 장비야말로 현장의 가장 좋은 파트너지.\n그런 의미에서…… 이 녀석은 나를 한 번도 실망시킨 적이 없어."

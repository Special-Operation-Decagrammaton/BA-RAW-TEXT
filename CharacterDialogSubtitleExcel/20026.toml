[translation]
20026-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
20026-CVGroup_CharacterGet_Idle1-1 = "土木、建造、拆除……\n需要工務人員的時候，隨時歡迎聯絡。\n如果是革命或示威的話……就更加歡迎了！"
20026-CVGroup_Cafe_Idle1-1 = "現場最重要的項目，\n第一個是安全，第二個也是安全。"
20026-CVGroup_Cafe_Idle2-1 = "這裡的建築樣式……\n……就說一聲還不錯吧。"
20026-CVGroup_Cafe_Idle3-1 = "交給我們工務部的話，這種程度……"
20026-CVGroup_Cafe_Idle4-1 = "每週工作三天……\n聽起來是多麼美妙……"
20026-CVGroup_Cafe_Idle5-1 = "這裡的布丁……\n跟事務局普發的好像不太一樣呢。"
20026-CVGroup_WeaponGet_Idle1-1 = "堅固又值得信賴的裝備才是現場最好的夥伴。\n在這個意義上……\n這傢伙從來沒有讓我失望過。"

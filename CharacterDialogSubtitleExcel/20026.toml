[translation]
20026-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20026-CVGroup_CharacterGet_Idle1-1 = "งานโยธา งานก่อสร้าง งานรื้อถอน... ถ้าต้องการความช่วยเหลือ\nก็ติดต่อมาได้ทุกเมื่อ ยิ่งถ้าเป็นเรื่องต่อสู้และปลุกระดม...\nยิ่งพร้อมช่วยเหลือเต็มที่!"
20026-CVGroup_Cafe_Idle1-1 = "สิ่งสำคัญที่สุดในไซต์งานคือต้องปลอดภัยไว้ก่อน\nรองลงมาก็ความปลอดภัย"
20026-CVGroup_Cafe_Idle2-1 = "รูปแบบการก่อสร้างของที่นี่...\nถือว่าไม่เลวเลยแฮะ"
20026-CVGroup_Cafe_Idle3-1 = "ถ้ามอบหมายงานให้ชมรมผู้รับจ้าง\nงานแค่นี้..."
20026-CVGroup_Cafe_Idle4-1 = "ทำงาน 3 วันต่อสัปดาห์...\nมันจะฟังดูดีแค่ไหนกันนะ..."
20026-CVGroup_Cafe_Idle5-1 = "รู้สึกว่าพุดดิ้งของที่นี่... ต่างไปจากอันที่สำนักเลขาธิการส่งมาแฮะ"
20026-CVGroup_WeaponGet_Idle1-1 = "อุปกรณ์ที่มั่นคงและเชื่อถือได้คือพาร์ทเนอร์ที่ดีที่สุดของไซต์งานก่อสร้างแล้ว\nเจ้านี่ไม่เคยทำให้ฉันผิดหวังเลยสักครั้ง"

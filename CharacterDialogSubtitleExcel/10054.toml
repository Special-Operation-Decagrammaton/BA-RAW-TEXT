[translation]
10054-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10054-CVGroup_CharacterGet_Idle1-1 = "건전한 정신을 기르기 위해 건전한 육체를 기른다…….\n그 길에 가호가 함께하기를."
10054-CVGroup_Cafe_Idle1-1 = "와…… 멋진 곳이네요."
10054-CVGroup_Cafe_Idle2-1 = "도움이 필요하신 분이… 계실까요?"
10054-CVGroup_Cafe_Idle3-1 = "조금 쉬어 가도록 할까요?"
10054-CVGroup_Cafe_Idle4-1 = "평소보다 몸이 가벼운 느낌이에요……."
10054-CVGroup_Cafe_Idle5-1 = "……후후."
10054-CVGroup_WeaponGet_Idle1-1 = "경기의 시작을 알리는 총성처럼,\n부디 이 작은 무기도 평화를 위한 것이 되기를……."
10054-CVGroup_UIEventLobby_Enter1-1 = "선생님, 이쪽이에요! 곧 경기가 시작될 예정이랍니다!"
10054-CVGroup_UIEventLobby_Enter2-1 = "기다리고 있었답니다, 선생님! 그럼, 출발하실까요?"
10054-CVGroup_UIEventLobby_Enter3-1 = "여러분, 정말 열심이시네요."
10054-CVGroup_UIEventLobby_Enter3-2 = "저도 여러분의 마음에 보답할 수 있도록 정진하겠습니다!"
10054-CVGroup_UIEventLobby_Enter4-1 = "마지막까지 최선을 다하도록 해요!"
10054-CVGroup_UIEventLobby_Enter5-1 = "선생님, 수고하셨습니다!"
10054-CVGroup_UIEventLobby_Enter5-2 = "도움이 필요한 사람이 남아있을지도 모르니,"
10054-CVGroup_UIEventLobby_Enter5-3 = "좀 더 둘러보시죠."
10054-CVGroup_UIEventLobby_Idle1-1 = "뭔가 도와드릴 수 있는 일이 있을까요?"
10054-CVGroup_UIEventLobby_Idle2-1 = "……선생님? 왜 그러세요……?"
10054-CVGroup_UIEventLobby_Idle3-1 = "그, 그렇게 계속 부르시면…… 부끄러워요……."
10054-CVGroup_UIEventShop_Enter1-1 = "안녕하세요, 선생님. 찾으시는 게 있으신가요?"
10054-CVGroup_UIEventShop_Enter2-1 = "괜찮으시다면 한번 둘러보시겠어요?"
10054-CVGroup_UIEventShop_Idle1-1 = "저, 저요……? 저는…… 선생님의 도움이 되었으면 좋겠다고, 생각해서……."
10054-CVGroup_UIEventShop_Idle2-1 = "그렇게 계속 보시면…… 그……. 조금 부끄러운걸요……."
10054-CVGroup_UIEventShop_Buy1-1 = "지금 바로 준비하겠습니다."
10054-CVGroup_UIEventShop_Buy2-1 = "더 필요하신 물건은 없으신가요?"
10054-CVGroup_UIEventShop_Buy3-1 = "그걸로 고르셨나요? 알겠습니다."
10054-CVGroup_UIEventShop_Buy4-1 = "준비해 둔 보람이 있네요."
10054-CVGroup_UIEventShop_Enter3-1 = "경기는 무사히 끝났지만 상품이 남아버렸네요."
10054-CVGroup_UIEventShop_Enter3-2 = "괜찮으시다면, 정리를 도와주실 수 있을까요?"

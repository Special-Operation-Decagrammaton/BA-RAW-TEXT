[translation]
10054-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10054-CVGroup_CharacterGet_Idle1-1 = "孕育能夠育成健全精神的肉體……\n願您一路上與加護同在。"
10054-CVGroup_Cafe_Idle1-1 = "哇……\n真是個好地方呢。"
10054-CVGroup_Cafe_Idle2-1 = "需要幫助的人……\n在這裡嗎？"
10054-CVGroup_Cafe_Idle3-1 = "要不要稍微\n休息一下呢？"
10054-CVGroup_Cafe_Idle4-1 = "感覺身體\n比平常輕盈……"
10054-CVGroup_Cafe_Idle5-1 = "……呵呵。"
10054-CVGroup_WeaponGet_Idle1-1 = "如同宣告比賽開始的槍聲一般，\n希望這把小小的武器也能成為守護和平之物……"
10054-CVGroup_UIEventLobby_Enter1-1 = "老師，這邊！\n比賽馬上就要開始了！"
10054-CVGroup_UIEventLobby_Enter2-1 = "讓您久等了，老師！\n那麼，我們走吧。"
10054-CVGroup_UIEventLobby_Enter3-1 = "大家，都很努力呢。"
10054-CVGroup_UIEventLobby_Enter3-2 = "我也會為了不辜負大家的期待，\n精益求精的！"
10054-CVGroup_UIEventLobby_Enter4-1 = "拚盡全力，奮戰到最後一刻吧。"
10054-CVGroup_UIEventLobby_Enter5-1 = "老師，您辛苦了。"
10054-CVGroup_UIEventLobby_Enter5-2 = "可能還有人需要幫助，"
10054-CVGroup_UIEventLobby_Enter5-3 = "我們再去稍微看看吧。"
10054-CVGroup_UIEventLobby_Idle1-1 = "有什麼我可以幫忙的嗎？"
10054-CVGroup_UIEventLobby_Idle2-1 = "……老師？怎麼了……？"
10054-CVGroup_UIEventLobby_Idle3-1 = "像，像這樣被叫這麼多次……好害羞……"
10054-CVGroup_UIEventShop_Enter1-1 = "您好，老師。在找什麼嗎？"
10054-CVGroup_UIEventShop_Enter2-1 = "方便的話要不要來逛逛呢？"
10054-CVGroup_UIEventShop_Idle1-1 = "我，我嗎……？\n我想說……如果能幫上老師的忙就好了……"
10054-CVGroup_UIEventShop_Idle2-1 = "一直被盯著看的話……那個……有點不好意思……"
10054-CVGroup_UIEventShop_Buy1-1 = "馬上為您準備。"
10054-CVGroup_UIEventShop_Buy2-1 = "還有需要其他東西嗎？"
10054-CVGroup_UIEventShop_Buy3-1 = "您要那個對吧，我知道了。"
10054-CVGroup_UIEventShop_Buy4-1 = "做好準備是值得的。"
10054-CVGroup_UIEventShop_Enter3-1 = "比賽順利結束了，但是還有剩下的商品。"
10054-CVGroup_UIEventShop_Enter3-2 = "如果可以的話，能幫我一起收拾嗎？"

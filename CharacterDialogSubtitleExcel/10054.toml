[translation]
10054-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10054-CVGroup_CharacterGet_Idle1-1 = "The path to a sound mind begins with a sound body... May that path be lined with blessings."
10054-CVGroup_Cafe_Idle1-1 = "Wow... What a fantastic place."
10054-CVGroup_Cafe_Idle2-1 = "Do you think there might be...someone in need?"
10054-CVGroup_Cafe_Idle3-1 = "Shall we take a quick rest?"
10054-CVGroup_Cafe_Idle4-1 = "My body feels lighter than usual..."
10054-CVGroup_Cafe_Idle5-1 = "Heehee."
10054-CVGroup_WeaponGet_Idle1-1 = "Like a starting pistol going off at the beginning of an event, I pray this weapon will be used to bring about joy..."
10054-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Over here! The games are about to begin!"
10054-CVGroup_UIEventLobby_Enter2-1 = "I've been waiting for you, Sensei! Shall we get going?"
10054-CVGroup_UIEventLobby_Enter3-1 = "You've all done so much to make the festival so amazing."
10054-CVGroup_UIEventLobby_Enter3-2 = "I'll be sure to match all your hard work!"
10054-CVGroup_UIEventLobby_Enter4-1 = "Let's do our best until the very end!"
10054-CVGroup_UIEventLobby_Enter5-1 = "Thank you for your hard work, Sensei!"
10054-CVGroup_UIEventLobby_Enter5-2 = "You never know when someone might be in need of help..."
10054-CVGroup_UIEventLobby_Enter5-3 = "Let's look around a little more."
10054-CVGroup_UIEventLobby_Idle1-1 = "Is there anything I can do to help?"
10054-CVGroup_UIEventLobby_Idle2-1 = "...Sensei? ...What is it?"
10054-CVGroup_UIEventLobby_Idle3-1 = "I-If you keep calling my name like that... I'm going to get embarrassed..."
10054-CVGroup_UIEventShop_Enter1-1 = "Hello, Sensei. Are you looking for anything?"
10054-CVGroup_UIEventShop_Enter2-1 = "If it's all right with you, would you like to take a look around?"
10054-CVGroup_UIEventShop_Idle1-1 = "M-Me...? I was just thinking I'd like to be helpful..."
10054-CVGroup_UIEventShop_Idle2-1 = "Why are you looking at me like that...? I'm going to get all flustered..."
10054-CVGroup_UIEventShop_Buy1-1 = "I'll get it ready immediately."
10054-CVGroup_UIEventShop_Buy2-1 = "Is there anything else you need?"
10054-CVGroup_UIEventShop_Buy3-1 = "Is that what you've settled on? Got it."
10054-CVGroup_UIEventShop_Buy4-1 = "It's nice to be prepared."
10054-CVGroup_UIEventShop_Enter3-1 = "The games have concluded, but we have plenty of supplies still!"
10054-CVGroup_UIEventShop_Enter3-2 = "If you don't mind, could you help me organize these?"

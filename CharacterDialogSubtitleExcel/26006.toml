[translation]
26006-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
26006-CVGroup_CharacterGet_Idle1-1 = "是一直透過望遠鏡觀察的那個老師沒錯吧……？\n我非常感動……！"
26006-CVGroup_Cafe_Idle1-1 = "呵呵，發現了很棒的家具！"
26006-CVGroup_Cafe_Idle2-1 = "在另一邊會有什麼呢……？"
26006-CVGroup_Cafe_Idle3-1 = "得趕快離開特別班才行……"
26006-CVGroup_Cafe_Idle4-1 = "這裡真是漂亮的地方呢～"
26006-CVGroup_Cafe_Idle5-1 = "老師……在哪裡呢？"
26006-CVGroup_WeaponGet_Idle1-1 = "謝謝你，老師！\n我會像這個望遠鏡一樣好好珍惜它的！"
26006-CVGroup_UIEventShop_Enter1-1 = "哎呀，老師？\n你帶食物來了嗎！？"
26006-CVGroup_UIEventShop_Enter2-1 = "辛苦了！根據收到的支援物資，"
26006-CVGroup_UIEventShop_Enter2-2 = "我們也會準備些東西回報的！"
26006-CVGroup_UIEventShop_Enter3-1 = "慶典只剩下一半了呢。"
26006-CVGroup_UIEventShop_Enter3-2 = "……嘛，雖然本來就和我們沒有什麼關係。"
26006-CVGroup_UIEventShop_Enter4-1 = "伊凡．庫帕拉也沒剩多久了呢。"
26006-CVGroup_UIEventShop_Enter4-2 = "如果有什麼看起來很好吃，或是對這裡的生活有幫助的東西，"
26006-CVGroup_UIEventShop_Enter4-3 = "請務必拿過來！"
26006-CVGroup_UIEventShop_Enter5-1 = "今天是最後一天了呢，老師。\n有沒有忘了什麼東西呢？"
26006-CVGroup_UIEventShop_Enter6-1 = "慶典雖然結束了，\n但如果還有什麼東西的話，請務必交給我……！"
26006-CVGroup_UIEventShop_Idle1-1 = "227號特別班隨時都缺乏甜食……"
26006-CVGroup_UIEventShop_Idle2-1 = "何時才能回到本校舍呢……"
26006-CVGroup_UIEventShop_Buy1-1 = "啊……看起來很好吃……"
26006-CVGroup_UIEventShop_Buy2-1 = "咦？這，這個，可以給我嗎？"

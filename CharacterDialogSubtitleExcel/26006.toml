[translation]
26006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26006-CVGroup_CharacterGet_Idle1-1 = "คุณใช่คุณครูที่ฉันคอยส่องกล้องมองรึเปล่านะ...?\nตะ...ตื่นเต้นจังเลยค่ะ!"
26006-CVGroup_Cafe_Idle1-1 = "ฮุฮุ เจอเฟอร์นิเจอร์สวยๆ แล้ว!"
26006-CVGroup_Cafe_Idle2-1 = "มีอะไรอยู่ด้านบนนั้นบ้างนะ...?"
26006-CVGroup_Cafe_Idle3-1 = "ถ้าไม่รีบหนีออกไปจากห้องเรียนพิเศษแล้วละก็..."
26006-CVGroup_Cafe_Idle4-1 = "ทิวทัศน์ของที่นี่สวยจังเลยนะคะ~"
26006-CVGroup_Cafe_Idle5-1 = "คุณครู~ อยู่ที่ไหนน้า?"
26006-CVGroup_WeaponGet_Idle1-1 = "ขอบคุณค่ะคุณครู! ฉันจะเก็บรักษาให้ดี\nเหมือนกับกล้องโทรทรรศน์เลยค่ะ!"
26006-CVGroup_UIEventShop_Enter1-1 = "เอ๋? คุณครูเหรอคะ?\nเตรียมพวกของกินมาด้วยรึเปล่าคะ?"
26006-CVGroup_UIEventShop_Enter2-1 = "ขอบคุณมากค่ะ! พวกเราจะตอบแทนคุณครู"
26006-CVGroup_UIEventShop_Enter2-2 = "ให้สมกับที่คุณครูนำของมาสนับสนุนพวกเราค่ะ"
26006-CVGroup_UIEventShop_Enter3-1 = "งานเทศกาลผ่านมาครึ่งทางแล้วนะคะ"
26006-CVGroup_UIEventShop_Enter3-2 = "คือว่าที่จริงแล้ว... ถึงมันจะไม่ใช่เรื่องที่เกี่ยวกับพวกฉันตั้งแต่แรกก็เถอะค่ะ"
26006-CVGroup_UIEventShop_Enter4-1 = "งานเทศกาลอีวาน คูปาลา\nเหลือเวลาอีกไม่มากแล้วค่ะ"
26006-CVGroup_UIEventShop_Enter4-2 = "ถ้าคุณครูมีอาหารที่ดูน่าอร่อย\nหรือว่าอุปกรณ์ สิ่งของที่จำเป็น\nสำหรับการใช้ชีวิตที่นี่ละก็..."
26006-CVGroup_UIEventShop_Enter4-3 = "รบกวนเอามาให้พวกเราด้วยนะคะ!"
26006-CVGroup_UIEventShop_Enter5-1 = "วันนี้เป็นวันสุดท้ายแล้ว\nคุณครู... ไม่ได้ลืมอะไรใช่มั้ยคะ?"
26006-CVGroup_UIEventShop_Enter6-1 = "ถึงงานเทศกาลจะสิ้นสุดลงแล้ว\nแต่ถ้าคุณครูยังมีของใช้เหลืออยู่ละก็\nนำมาแลกที่ฉันได้เลยนะคะ!"
26006-CVGroup_UIEventShop_Idle1-1 = "ที่ห้องพิเศษ 227 น่ะ\nมีของหวานไม่พอตลอดเลยค่ะ..."
26006-CVGroup_UIEventShop_Idle2-1 = "เมื่อไหร่จะได้กลับไป\nที่อาคารเรียนหลักกันนะ..."
26006-CVGroup_UIEventShop_Buy1-1 = "ว้าว...\nน่ากินจังเลย..."
26006-CVGroup_UIEventShop_Buy2-1 = "คะ? พูดจริงเหรอคะ?\nฉันรับไว้ได้จริงๆ เหรอคะ?"

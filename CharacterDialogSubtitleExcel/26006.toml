[translation]
26006-CVGroup_UITitle_Idle1-1 = "블루, 아카이브!"
26006-CVGroup_CharacterGet_Idle1-1 = "망원경 너머로만 지켜보던 그 선생님이 맞으신가요…? 저, 감격했어요…!"
26006-CVGroup_Cafe_Idle1-1 = "후후, 멋진 가구 발견!"
26006-CVGroup_Cafe_Idle2-1 = "저 너머에는 뭐가 있으려나…?"
26006-CVGroup_Cafe_Idle3-1 = "빨리 특별반에서 도망치지 않으면…"
26006-CVGroup_Cafe_Idle4-1 = "이곳의 풍경은 아름답네요~"
26006-CVGroup_Cafe_Idle5-1 = "선생님은… 어디 계시려나?"
26006-CVGroup_WeaponGet_Idle1-1 = "감사합니다, 선생님! 이 망원경만큼이나 소중하게 다룰게요!"
26006-CVGroup_UIEventShop_Enter1-1 = "어라, 선생님? 뭔가 먹을 것을 가지고 오셨나요?"
26006-CVGroup_UIEventShop_Enter2-1 = "수고하셨습니다! 가져다주신 지원 물자만큼"
26006-CVGroup_UIEventShop_Enter2-2 = "저희도 뭔가 보답을 드릴게요!"
26006-CVGroup_UIEventShop_Enter3-1 = "축제도 벌써 절반이나 지났네요."
26006-CVGroup_UIEventShop_Enter3-2 = "……뭐, 애초에 저희와는 상관없는 일이지만요."
26006-CVGroup_UIEventShop_Enter4-1 = "이반 쿠팔라도 이제 얼마 남지 않았네요."
26006-CVGroup_UIEventShop_Enter4-2 = "뭔가 맛있어 보이는 음식이나, 이곳에서의 생활에 도움이 될 만한 물건이 있다면"
26006-CVGroup_UIEventShop_Enter4-3 = "꼭 가져다주세요!"
26006-CVGroup_UIEventShop_Enter5-1 = "오늘이 축제의 마지막 날이네요. …선생님, 뭔가 잊으신 건 없으신가요?"
26006-CVGroup_UIEventShop_Enter6-1 = "축제는 끝났지만, 혹시 아직도 갖고 계신 물건이 있다면 저에게 꼭 가져다주세요!"
26006-CVGroup_UIEventShop_Idle1-1 = "227호 특별반은 언제나 단 음식이 부족하단 말이죠……"
26006-CVGroup_UIEventShop_Idle2-1 = "언제쯤에야 본교사로 돌아갈 수 있을지…."
26006-CVGroup_UIEventShop_Buy1-1 = "우와아…… 맛있어 보여……"
26006-CVGroup_UIEventShop_Buy2-1 = "네? 이거, 정말로 받아도 괜찮나요?"

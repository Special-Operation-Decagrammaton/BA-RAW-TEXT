[translation]
10062-CVGroup_UIMiniEventLobby_Enter1-1 = "기다리고 있었습니다. 선생님."
10062-CVGroup_UIMiniEventLobby_Enter1-2 = "어떤 지형이나 기후에서도"
10062-CVGroup_UIMiniEventLobby_Enter1-3 = "완벽한 보좌를 약속드리겠습니다."
10062-CVGroup_UIMiniEventLobby_Enter2-1 = "안심하고 저한테 맡겨 주세요."
10062-CVGroup_UIMiniEventLobby_Enter2-2 = "……그렇지 않으면, 서운합니다."
10062-CVGroup_UIMiniEventLobby_Enter3-1 = "저를 기다리게 하셨군요, 선생님. 괜찮습니다."
10062-CVGroup_UIMiniEventLobby_Enter3-2 = "삐지지 않았습니다. 선생님이 돌아오시면"
10062-CVGroup_UIMiniEventLobby_Enter3-3 = "절대로 곁을 떠나지 않겠다는 생각도 하지 않고 있으니,"
10062-CVGroup_UIMiniEventLobby_Enter3-4 = "안심하세요."
10062-CVGroup_UIMiniEventLobby_Idle1-1 = "하늘이 있고 땅이 있고, 아스마 토키가 있습니다."
10062-CVGroup_UIMiniEventLobby_Idle1-2 = "……의미는 없습니다. 말해본 것 뿐입니다."
10062-CVGroup_UIMiniEventLobby_Idle2-1 = "춥지 않냐는 질문을 자주 받는데요,"
10062-CVGroup_UIMiniEventLobby_Idle2-2 = "괜찮다고 대답하고 있긴 하지만 사실은 추워요."
10062-CVGroup_UIMiniEventLobby_Idle2-3 = "그러니까 선생님, 따뜻하게 해 주십시오."
10062-CVGroup_UIMiniEventLobby_Idle3-1 = "저의 임무는 기지의 관리와 경비입니다."
10062-CVGroup_UIMiniEventLobby_Idle3-2 = "다시 말해서 선생님께 붙어서 행동하는 것입니다."
10062-CVGroup_UIMiniEventLobby_Idle3-3 = "……논리가 이상하다고요? 선생님도 아직 멀었네요."
10062-CVGroup_UIMiniEventLobby_Idle4-1 = "단도직입적으로 말씀드리겠습니다."
10062-CVGroup_UIMiniEventLobby_Idle4-2 = "지금 선생님은 저에게 집중해야 합니다."
10062-CVGroup_UIMiniEventLobby_Idle4-3 = "이유는, 이 자리에 있는 사람이 선생님과 저뿐이기 때문입니다."
10062-CVGroup_UIMiniEventLobby_Idle5-1 = "선생님, 손을 이쪽으로. 제가 따뜻하게 해 드리겠습니다."
10062-CVGroup_UIMiniEventLobby_Idle5-2 = "……! ……손이…… 차갑지 않다니……!?"
10062-CVGroup_UIMiniEventLobby_Idle5-3 = "큭…… 역시 그 때 선생님의 장갑을 숨겨 두었어야 했어요."
10062-CVGroup_UIMiniEventShop_Enter1-1 = "돌아오셨습니까. 그러면 수집해 주신 샘플을 이쪽으로 부탁드리겠습니다."
10062-CVGroup_UIMiniEventShop_Enter2-1 = "분석에는 대량의 '물질'이 필요합니다.\n즉, 선생님이 나설 차례라는 것입니다."
10062-CVGroup_UIMiniEventShop_Enter3-1 = "선생님, 차라도 드시겠습니까?"
10062-CVGroup_UIMiniEventShop_Enter3-2 = "이것은, 빙하를 녹인 물로 내린 것입니다."
10062-CVGroup_UIMiniEventShop_Enter3-3 = "……고대의 맛이 ……날지도 모릅니다."
10062-CVGroup_UIMiniEventShop_Idle1-1 = "예전에, 리오 님이 이것과 비슷한 실험을 하신 적이 있었습니다."
10062-CVGroup_UIMiniEventShop_Idle1-2 = "이 임무에 조금, 그리움을 느끼네요."
10062-CVGroup_UIMiniEventShop_Idle2-1 = "선생님은 엄청난 것을 훔쳐 갔습니다…… 그것은…… 제 마음입니다."
10062-CVGroup_UIMiniEventShop_Idle2-2 = "……그렇게 당황하지 말아 주십시오. 말해본 것뿐이니까요, 네."
10062-CVGroup_UIMiniEventShop_Idle3-1 = "……'그걸' 해줬으면 좋겠다구요? 정말, 괜찮으시겠습니까……?"
10062-CVGroup_UIMiniEventShop_Idle3-2 = "알겠습니다…… 뿅."
10062-CVGroup_UIMiniEventShop_Idle4-1 = "지금 샘플을 분석하는 중입니다. 즉, 저는 한가하다는 것입니다."
10062-CVGroup_UIMiniEventShop_Idle4-2 = "……무엇을 하셔야 할지, 선생님이라면 아시겠죠?"
10062-CVGroup_UIMiniEventShop_Idle5-1 = "무슨 일이 있어도 선생님을 지키겠습니다."
10062-CVGroup_UIMiniEventShop_Idle5-2 = "그것만이, 제가 여기에 있는 이유이기 때문에."
10062-CVGroup_UIMiniEventShop_Buy1-1 = "좋은 선택이십니다."
10062-CVGroup_UIMiniEventShop_Buy2-1 = "저도 그것이 좋다고 생각합니다."
10062-CVGroup_UIMiniEventShop_Buy3-1 = "선생님께 도움이 된다면 여기 있습니다. 자유롭게 가져가세요."
10062-CVGroup_UIMiniEventShop_Buy4-1 = "선생님이 선택한 것이니, 가치가 있음에 틀림없습니다."
10062-CVGroup_UIMiniEventShop_Buy4-2 = "물론 저에게는 미치지 못합니다만."
10062-CVGroup_UIMiniEventShop_Buy5-1 = "바로 준비하겠습니다. 조금만 기다려주십시오."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "여기는…… 히마리 님이\n「다소의 조정」을\n실행한 장소입니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "난수와 확정……\n선생님은 어느 쪽을\n선택하시겠습니까?"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "행운을 시험해 볼 수\n있는 거네요."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "불운은 제가 뽑을 테니,\n선생님에게는 행운이\n찾아올 것입니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "반대가 아니면 싫다구요…?\n그렇, 습니까?"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "히마리 부장과\n리오 님의 차이를,\n점점 알게 되었습니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "어느 쪽이 옳은지는,\n저는 아직 모릅니다만……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "두 분을 생각하면, 왠지…\n말로 표현할 수 없는\n감정이 북받쳐 올라옵니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "어딘가에서 들은\n이야기입니다만……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "인생에는 작은 행운이\n필요하다고 합니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "그렇지 않다면,\n힘들고 어려운 길을\n가게 될 테니까요."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "어떤 결과가 나오든,\n저는 선생님의\n편이 될 겁니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "그러니까 선생님께서도\n제 편이 되어\n주셔야 합니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "저, 이 임무가\n끝나면…… 선생님과\n행복하게 살 겁니다."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "플래그……?\n뭔가요, 그건."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "선생님 마음이 내키는 대로\n선택해 주십시오.\n그것이 정답이니까요."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "오, 짝짝짝짝짝짝."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "……방금은,\n제 최선의 축하입니다."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-3 = "어떠셨습니까?\n감동받으셨나요?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "대단하십니다. 선생님.\n이 기세를 몰아\n한 번 더 어떠십니까?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "2등 당첨을 축하합니다."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "1등 상 내용이요?\n하루 종일 제가 신변을\n보좌해드리는 티켓입니다."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "그 불굴의 정신……\n저도 본받고 싶습니다."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "……이렇게 순수한 눈으로\n존경을 전해오는 학생,"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "훌륭하다고\n생각하지 않으십니까?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-4 = "신속하게 칭찬해 주세요."
10062-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10062-CVGroup_CharacterGet_Idle1-1 = "밀레니엄 사이언스 스쿨, C&C 소속, 콜사인 04. 아스마 토키입니다.\n완벽한 보좌를 약속드립니다."
10062-CVGroup_Cafe_Idle1-1 = "여기는…… 무엇을 하는 공간일까요."
10062-CVGroup_Cafe_Idle2-1 = "카페…… 들어 본 적은 있습니다."
10062-CVGroup_Cafe_Idle3-1 = "당분이 함유된 음료는, 피로회복에 매우 효과적입니다."
10062-CVGroup_Cafe_Idle4-1 = "저도 차 정도는 끓일 수 있습니다. 그렇다고 할까요, 익숙합니다."
10062-CVGroup_Cafe_Idle5-1 = "여기 인테리어는 참고가 되겠네요."
10062-CVGroup_WeaponGet_Idle1-1 = "이렇게까지 신경 써 주시다니……\n결정했습니다. 앞으로 신변 경호는 모두 맡겨주십시오."

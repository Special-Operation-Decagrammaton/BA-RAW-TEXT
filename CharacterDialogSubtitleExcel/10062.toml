[translation]
10062-CVGroup_UIMiniEventLobby_Enter1-1 = "恭候多時了，老師。"
10062-CVGroup_UIMiniEventLobby_Enter1-2 = "無論是怎樣的地形或氣候，"
10062-CVGroup_UIMiniEventLobby_Enter1-3 = "我都承諾您會提供完美的輔佐。"
10062-CVGroup_UIMiniEventLobby_Enter2-1 = "就當作是登上了大船，儘管交給我吧。"
10062-CVGroup_UIMiniEventLobby_Enter2-2 = "……不然的話，我會寂寞的。"
10062-CVGroup_UIMiniEventLobby_Enter3-1 = "您讓我等了呢，老師。其實也沒關係。"
10062-CVGroup_UIMiniEventLobby_Enter3-2 = "我沒有在鬧彆扭。要是老師回來──"
10062-CVGroup_UIMiniEventLobby_Enter3-3 = "就絕對不再離開他身邊吧之類的念頭，也完全沒有，"
10062-CVGroup_UIMiniEventLobby_Enter3-4 = "請您放心。"
10062-CVGroup_UIMiniEventLobby_Idle1-1 = "有天，有地，有飛鳥馬季。"
10062-CVGroup_UIMiniEventLobby_Idle1-2 = "……沒有什麼意義。只是想說說看而已。"
10062-CVGroup_UIMiniEventLobby_Idle2-1 = "經常會有人問我冷不冷，"
10062-CVGroup_UIMiniEventLobby_Idle2-2 = "雖然總是回答還好，但我其實覺得很冷。"
10062-CVGroup_UIMiniEventLobby_Idle2-3 = "所以老師，請溫暖我吧。"
10062-CVGroup_UIMiniEventLobby_Idle3-1 = "我的任務是基地的管理和警備。"
10062-CVGroup_UIMiniEventLobby_Idle3-2 = "換句話說，就是要緊貼老師行動的意思。"
10062-CVGroup_UIMiniEventLobby_Idle3-3 = "……邏輯很奇怪？看來老師還差得遠呢。"
10062-CVGroup_UIMiniEventLobby_Idle4-1 = "我就開門見山地說了。"
10062-CVGroup_UIMiniEventLobby_Idle4-2 = "現在，老師必須專注在我身上。"
10062-CVGroup_UIMiniEventLobby_Idle4-3 = "至於理由，就是現場只有老師跟我兩個人而已。"
10062-CVGroup_UIMiniEventLobby_Idle5-1 = "老師，請把手給我。我會溫暖您的。"
10062-CVGroup_UIMiniEventLobby_Idle5-2 = "……！手竟然……不冷……！？"
10062-CVGroup_UIMiniEventLobby_Idle5-3 = "唔……果然那時候就該把老師的手套藏起來才對。"
10062-CVGroup_UIMiniEventShop_Enter1-1 = "歡迎回來，老師。\n收集到的樣本，麻煩放在這邊。"
10062-CVGroup_UIMiniEventShop_Enter2-1 = "分析需要大量的「物質」。\n換句話說，該輪到老師出馬了。"
10062-CVGroup_UIMiniEventShop_Enter3-1 = "老師，要喝杯茶嗎？"
10062-CVGroup_UIMiniEventShop_Enter3-2 = "這杯，是用冰河融化的熱水泡的。"
10062-CVGroup_UIMiniEventShop_Enter3-3 = "或許能嘗到古代的味道……也說不定。"
10062-CVGroup_UIMiniEventShop_Idle1-1 = "以前，莉央大人曾經做過類似的實驗。"
10062-CVGroup_UIMiniEventShop_Idle1-2 = "因此這個任務，讓我有股懷念的感覺。"
10062-CVGroup_UIMiniEventShop_Idle2-1 = "老師偷走了無比重要的東西……\n那就是……我的心。"
10062-CVGroup_UIMiniEventShop_Idle2-2 = "……請不必那麼驚慌。\n只是隨口說說而已，嗯。"
10062-CVGroup_UIMiniEventShop_Idle3-1 = "……希望我做「那個」，是嗎？\n這樣真的好嗎……？"
10062-CVGroup_UIMiniEventShop_Idle3-2 = "我明白了……蹦。"
10062-CVGroup_UIMiniEventShop_Idle4-1 = "現在正在分析樣本。\n也就是說，我現在很閒。"
10062-CVGroup_UIMiniEventShop_Idle4-2 = "……該怎麼做，老師應該明白吧？"
10062-CVGroup_UIMiniEventShop_Idle5-1 = "無論發生什麼，我都會保護老師。"
10062-CVGroup_UIMiniEventShop_Idle5-2 = "因為那就是我待在這裡的唯一理由。"
10062-CVGroup_UIMiniEventShop_Buy1-1 = "真不錯呢。"
10062-CVGroup_UIMiniEventShop_Buy2-1 = "我也覺得\n那個比較好。"
10062-CVGroup_UIMiniEventShop_Buy3-1 = "只要能幫上老師的忙\n東西在這裡，\n您儘管拿去吧。"
10062-CVGroup_UIMiniEventShop_Buy4-1 = "我相信老師的眼光，\n這東西絕對有它的價值。"
10062-CVGroup_UIMiniEventShop_Buy4-2 = "當然，它的價值\n肯定還是比不過我就是了。"
10062-CVGroup_UIMiniEventShop_Buy5-1 = "我馬上就為您準備，\n請您稍等一下。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "這裡是……陽葵部長實施了「某些調整」的地方。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "亂數與確定……老師會選擇哪邊呢？"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "是試手氣呢。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "厄運會由我來承受，所以幸運應該會降臨在老師身上才對。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "得反過來才行……？\n是嗎？"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "陽葵部長和莉央大人的區別，我漸漸能分出來了。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "至於哪邊才是正確的，雖然我還不清楚……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "但是一想到他們兩位，就會……湧現出難以言喻的感情。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "雖然這只是我從某個地方聽來的……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "有句話說，人生必須要有小小的幸運。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "否則人生的道路，就會變得太艱難而痛苦了。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "無論結果如何，我都會站在老師這邊。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "因此，也請老師要站在我這邊哦。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "我，在完成這項任務之後……就會和老師過著幸福的生活。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "Flag……？\n那是什麼意思。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "請老師隨意選擇吧。\n因為那就是正確解答。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "哦哦～啪啪啪啪啪啪。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "……剛才的，是我最真心的祝賀。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-3 = "怎麼樣？\n有覺得感動嗎？"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "太厲害了。老師。\n乘著這股氣勢再來一次吧。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "抽中二等獎，恭喜您。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "一等獎的內容？\n是我會貼身輔佐您一整天的票券。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "那不屈的精神……我也想向其學習。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "……以如此純粹的眼神表達尊敬的學生，"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "不覺得很了不起嗎？"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-4 = "請迅速給予稱讚。"
10062-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10062-CVGroup_CharacterGet_Idle1-1 = "我是千年科學學園，C&C所屬，代號04。\n飛鳥馬季。向您承諾會提供完美的輔佐。"
10062-CVGroup_Cafe_Idle1-1 = "這裡……是個\n什麼樣的空間呢。"
10062-CVGroup_Cafe_Idle2-1 = "咖啡廳……\n有聽說過。"
10062-CVGroup_Cafe_Idle3-1 = "含有糖分的飲料\n對恢復疲勞非常有效。"
10062-CVGroup_Cafe_Idle4-1 = "即使是我，泡茶\n這種事還是會的……\n不如說，我很熟練。"
10062-CVGroup_Cafe_Idle5-1 = "這裡的裝潢\n似乎能當成參考呢。"
10062-CVGroup_WeaponGet_Idle1-1 = "您竟然為我如此費心……\n我決定了。今後，隨身護衛的一切都交給我負責吧。"

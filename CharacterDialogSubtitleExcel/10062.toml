[translation]
10062-CVGroup_UIMiniEventLobby_Enter1-1 = "I've been waiting, Sensei."
10062-CVGroup_UIMiniEventLobby_Enter1-2 = "In any terrain or weather..."
10062-CVGroup_UIMiniEventLobby_Enter1-3 = "...I promise to provide you with flawless support."
10062-CVGroup_UIMiniEventLobby_Enter2-1 = "Please rest assured, and leave it to me."
10062-CVGroup_UIMiniEventLobby_Enter2-2 = "...Or else, I will be sad."
10062-CVGroup_UIMiniEventLobby_Enter3-1 = "You made me wait, Sensei. But you are forgiven."
10062-CVGroup_UIMiniEventLobby_Enter3-2 = "I am not sulking. I also absolutely was not thinking..."
10062-CVGroup_UIMiniEventLobby_Enter3-3 = "...that, once you returned, I would never, ever let you leave my side again."
10062-CVGroup_UIMiniEventLobby_Enter3-4 = "So do not worry."
10062-CVGroup_UIMiniEventLobby_Idle1-1 = "There is the sky, there is the land, and there is Asuma Toki."
10062-CVGroup_UIMiniEventLobby_Idle1-2 = "...There is no meaning to it. I just said it because I could."
10062-CVGroup_UIMiniEventLobby_Idle2-1 = "People often ask me if I am cold."
10062-CVGroup_UIMiniEventLobby_Idle2-2 = "I answer them by saying that I am fine, but in fact, I feel cold."
10062-CVGroup_UIMiniEventLobby_Idle2-3 = "So please warm me up, Sensei."
10062-CVGroup_UIMiniEventLobby_Idle3-1 = "My directive is base maintenance and security."
10062-CVGroup_UIMiniEventLobby_Idle3-2 = "In other words, it is to stick right by your side."
10062-CVGroup_UIMiniEventLobby_Idle3-3 = "...My logic is odd? You still have a long way to go, Sensei."
10062-CVGroup_UIMiniEventLobby_Idle4-1 = "I will cut to the chase."
10062-CVGroup_UIMiniEventLobby_Idle4-2 = "At this moment, you should focus on me."
10062-CVGroup_UIMiniEventLobby_Idle4-3 = "The reason is that we are the only ones here."
10062-CVGroup_UIMiniEventLobby_Idle5-1 = "Give me your hands, Sensei. I will warm them up."
10062-CVGroup_UIMiniEventLobby_Idle5-2 = "...! ...Your hands...are not cold...?!"
10062-CVGroup_UIMiniEventLobby_Idle5-3 = "Tch... I knew I should have hidden your gloves."
10062-CVGroup_UIMiniEventShop_Enter1-1 = "You're back. Please place the samples you gathered over here."
10062-CVGroup_UIMiniEventShop_Enter2-1 = "A lot of materials are needed for analysis. Meaning, it's your time to shine."
10062-CVGroup_UIMiniEventShop_Enter3-1 = "Sensei, would you like a cup of tea?"
10062-CVGroup_UIMiniEventShop_Enter3-2 = "This was brewed with water from a glacier."
10062-CVGroup_UIMiniEventShop_Enter3-3 = "...Its taste may have notes...of ancient times."
10062-CVGroup_UIMiniEventShop_Idle1-1 = "Rio performed a similar experiment once."
10062-CVGroup_UIMiniEventShop_Idle1-2 = "This mission is making me feel slightly nostalgic."
10062-CVGroup_UIMiniEventShop_Idle2-1 = "You stole something very precious from me... My heart."
10062-CVGroup_UIMiniEventShop_Idle2-2 = "...Please don't panic like that. I just said it because I could. Yup."
10062-CVGroup_UIMiniEventShop_Idle3-1 = "...You would like me to do \"that\"? Really, would you be okay with that...?"
10062-CVGroup_UIMiniEventShop_Idle3-2 = "All right... Hop."
10062-CVGroup_UIMiniEventShop_Idle4-1 = "The sample is currently being analyzed. Meaning, I am very free right now."
10062-CVGroup_UIMiniEventShop_Idle4-2 = "...Sensei, you know what to do, right?"
10062-CVGroup_UIMiniEventShop_Idle5-1 = "I will protect Sensei, no matter what happens."
10062-CVGroup_UIMiniEventShop_Idle5-2 = "That is the sole reason I am here."
10062-CVGroup_UIMiniEventShop_Buy1-1 = "Good choice."
10062-CVGroup_UIMiniEventShop_Buy2-1 = "I also think that is good."
10062-CVGroup_UIMiniEventShop_Buy3-1 = "If this is going to help you, then here you go. Please take it as you will."
10062-CVGroup_UIMiniEventShop_Buy4-1 = "Since it is something Sensei chose, there is no questioning its value."
10062-CVGroup_UIMiniEventShop_Buy4-2 = "Although it doesn't measure up to me."
10062-CVGroup_UIMiniEventShop_Buy5-1 = "I'll prepare it right away. Please hold for a moment."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "President Himari made \"some adjustments\" to this place."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Random or guaranteed... Which will you choose, Sensei?"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "You can test your luck."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "I'll pull your misfortune away, so that luck can come find you, Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "You'd hate it unless it's the other way around...? Is that so?"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "I'm starting to figure out the difference between president Himari and Ms. Rio."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "I'm still not sure who's right..."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "But when I think of the two, for some reason...I start feeling emotions that I can't describe with words."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "I heard somebody say..."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "...you need a little luck in your life."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "Otherwise, your path would be all bumps and brambles."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "Regardless of the results, I'll be on your side, Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "So I hope you'll be on my side, too."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "When I'm done with this mission...I'm going to live a happy life with you, Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "...What do you mean by \"cliche\"?"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "Pick whatever you like, Sensei. That's the answer."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "Wow. *golf clap*"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "...That was me doing my best to congratulate you."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-3 = "How did it look? Were you moved at all?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "Incredible, Sensei. How about keeping up this pace and going for another round?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "Congratulations on winning second place."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "What is first prize? A coupon for me to support you all day."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "That unyielding spirit... I want it too."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "...A student who radiates wide-eyed respect..."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "...don't you think that's incredible?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-4 = "Please hurry and compliment me."
10062-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10062-CVGroup_CharacterGet_Idle1-1 = "Millennium Science School, C&C call sign Zero-Four. Asuma Toki. I promise perfect assistance."
10062-CVGroup_Cafe_Idle1-1 = "What's this space for?"
10062-CVGroup_Cafe_Idle2-1 = "A cafe... I've heard of it."
10062-CVGroup_Cafe_Idle3-1 = "Beverages containing sugar can be very effective for recovering from fatigue."
10062-CVGroup_Cafe_Idle4-1 = "At the very least, I can make tea. I'm familiar with that."
10062-CVGroup_Cafe_Idle5-1 = "I'll make note of the interior here."
10062-CVGroup_WeaponGet_Idle1-1 = "Thanks for caring... I've decided to provide complete personal protection for you from now on. Please leave everything to me."

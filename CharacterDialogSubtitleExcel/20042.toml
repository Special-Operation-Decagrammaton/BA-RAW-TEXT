[translation]
20042-CVGroup_UITitle_Idle1-1 = "Blue Archive..."
20042-CVGroup_CharacterGet_Idle1-1 = "Ugh, camping... I have to go outside again on my day off...?"
20042-CVGroup_Cafe_Idle1-1 = "I don't want to go outside today..."
20042-CVGroup_Cafe_Idle2-1 = "Ah, I just got a great idea!"
20042-CVGroup_Cafe_Idle3-1 = "Should I try installing the one-time bed I borrowed from Chihiro around here?"
20042-CVGroup_Cafe_Idle4-1 = "Huh? What is this wi-fi with a weird name...?"
20042-CVGroup_Cafe_Idle5-1 = "(Can I install \"BOOM\" on this too? ...Let's give it a shot!)"
20042-CVGroup_WeaponGet_Idle1-1 = "I modded this machine gun to make it look cool, but it's too heavy to bring hiking... Maybe I'll have to shave off some weight."
20042-CVGroup_UIEventLobby_Enter1-1 = "I'm bored..."
20042-CVGroup_UIEventLobby_Enter1-2 = "I really wish I'd brought at least SOME kind of gaming device."
20042-CVGroup_UIEventLobby_Enter2-1 = "I want to feel electromagnetic waves..."
20042-CVGroup_UIEventLobby_Enter3-1 = "Maybe I'll draw something, using nature as a canvas."
20042-CVGroup_UIEventLobby_Enter4-1 = "(Ah, that mural... I forgot to erase it.)"
20042-CVGroup_UIEventLobby_Enter4-2 = "(Well, no big deal, right?)"
20042-CVGroup_UIEventLobby_Enter5-1 = "Mm. Not as bad of an experience as I expected."
20042-CVGroup_UIEventLobby_Enter5-2 = "The Mizutaki I had for dinner, that was really the best..."
20042-CVGroup_UIEventLobby_Enter5-3 = "I think I might want to come again sometime, as long as I bring my phone with me."
20042-CVGroup_UIEventLobby_Enter5-4 = "O-Of course, that doesn't mean I LIKE camping now!"
20042-CVGroup_UIEventLobby_Idle1-1 = "Ugh... There are so many fun channels at the end of the year, and I can't watch them all..."
20042-CVGroup_UIEventLobby_Idle1-2 = "Chihiro is so mean for that!"
20042-CVGroup_UIEventLobby_Idle2-1 = "Ah, that cloud... It looks like a server computer."
20042-CVGroup_UIEventLobby_Idle3-1 = "It's been a while since I've touched a keyboard, and my hands are just itching to do something."
20042-CVGroup_UIEventLobby_Idle3-2 = "Sensei, do you have any handheld toys, by any chance? A rubber band? Anything?"
20042-CVGroup_UIEventLobby_Idle4-1 = "So you're probably enjoying it out here, Sensei."
20042-CVGroup_UIEventLobby_Idle4-2 = "Well, I'll try to cheer up a bit, then."

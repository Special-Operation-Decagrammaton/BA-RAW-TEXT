[translation]
20042-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20042-CVGroup_CharacterGet_Idle1-1 = "อึก ตั้งแคมป์...\nวันหยุดทั้งที ต้องออกมาข้างนอกเหรอเนี่ย...?"
20042-CVGroup_Cafe_Idle1-1 = "วันนี้ฉันไม่อยากออกไปข้างนอกเลย..."
20042-CVGroup_Cafe_Idle2-1 = "อ๊ะ ได้แรงบันดาลใจดีๆ แล้ว!"
20042-CVGroup_Cafe_Idle3-1 = "เอาเตียงเดี่ยวที่เมื่อก่อน\nเคยยืมรุ่นพี่จิฮิโระมาวางไว้แถวนี้ดีมั้ยนะ?"
20042-CVGroup_Cafe_Idle4-1 = "อะไรน่ะ? ชื่อ WIFI แปลกๆ อันนี้..."
20042-CVGroup_Cafe_Idle5-1 = "(ที่นี่ก็ติดตั้ง BOOM ไว้ได้มั้ยนะ? ลองดูดีกว่า...!)"
20042-CVGroup_WeaponGet_Idle1-1 = "ฉันดัดแปลงปืนกลอันนี้ให้เท่ขึ้น\nแต่มันหนักเกินจะเอาไปเดินป่า...\nน่าจะต้องลดน้ำหนักมันแล้วละ"
20042-CVGroup_UIEventLobby_Enter1-1 = "เบื่อจัง..."
20042-CVGroup_UIEventLobby_Enter1-2 = "ถ้าเอาเครื่องเล่นเกมง่ายๆ มาด้วยก็ดีน่ะสิ..."
20042-CVGroup_UIEventLobby_Enter2-1 = "อยากรู้สึกถึงคลื่นแม่เหล็กไฟฟ้าได้จัง..."
20042-CVGroup_UIEventLobby_Enter3-1 = "คิดว่าเป็นผ้าใบธรรมชาติ แล้ววาดอะไรดีมั้ยนะ"
20042-CVGroup_UIEventLobby_Enter4-1 = "(อ๊ะ ลืมลบรูป... ตรงผนังซะสนิทเลย)"
20042-CVGroup_UIEventLobby_Enter4-2 = "(เอาเถอะน่า คงไม่มีเรื่องอะไรมากหรอก)"
20042-CVGroup_UIEventLobby_Enter5-1 = "อืม เป็นประสบการณ์ที่ไม่ได้แย่อย่างที่คิดนะ"
20042-CVGroup_UIEventLobby_Enter5-2 = "โดยเฉพาะมิซึทากิที่ทำกินตอนเย็น\nมันยอดเยี่ยมมากเลยละ..."
20042-CVGroup_UIEventLobby_Enter5-3 = "ถ้ามีโทรศัพท์มาด้วยจะให้มาอีกครั้งก็น่าจะได้นะ"
20042-CVGroup_UIEventLobby_Enter5-4 = "นะ... แน่นอนว่าฉันไม่ได้จะบอกว่าชอบการแคมป์ปิ้งหรอกนะ...!"
20042-CVGroup_UIEventLobby_Idle1-1 = "ปะ... ปกติสิ้นปีจะมีรายการสนุกๆ เยอะเลย\nอดดูถ่ายทอดสดสินะเนี่ย..."
20042-CVGroup_UIEventLobby_Idle1-2 = "รุ่นพี่จิฮิโระทำเกินไปแล้ว!"
20042-CVGroup_UIEventLobby_Idle2-1 = "อ๊ะ ก้อนเมฆตรงนั้น...\nรูปร่างเหมือนเซิร์ฟเวอร์คอมพิวเตอร์เลย"
20042-CVGroup_UIEventLobby_Idle3-1 = "มะ... ไม่ได้วางมือจากคีย์บอร์ดนานเลย\nพออยู่นิ่งๆ มันก็คันไม้คันมือจังเลยนะ"
20042-CVGroup_UIEventLobby_Idle3-2 = "คุณครู มีของเล่นอะไรที่ใช้มือเล่นได้บ้างหรือเปล่า?\nยางยืดหรืออะไรก็ได้!"
20042-CVGroup_UIEventLobby_Idle4-1 = "คุณครูกำลังสนุกกับการออกแคมป์อยู่สินะ"
20042-CVGroup_UIEventLobby_Idle4-2 = "งั้นฉันก็ลองสนุกดูด้วยดีมั้ยนะ?"

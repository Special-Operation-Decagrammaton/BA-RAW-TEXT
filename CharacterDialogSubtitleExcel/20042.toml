20042-CVGroup_Cafe_Idle1-1 = "今天好不想出門……"
20042-CVGroup_Cafe_Idle2-1 = "啊，湧現了超棒的靈感！"
20042-CVGroup_Cafe_Idle3-1 = "之前千尋前輩借給我的簡易床墊，要不要試用看看呢？"
20042-CVGroup_Cafe_Idle4-1 = "什麼？這個名稱奇怪的WiFi是……"
20042-CVGroup_Cafe_Idle5-1 = "（這裡也能安裝毀滅狂戰士嗎？\n……試試看吧！）"
20042-CVGroup_WeaponGet_Idle1-1 = "這把機關槍，雖然改造得很酷……\n但要帶著登山實在有點太重了……差不多得進行輕量化了。"
20042-CVGroup_UIEventLobby_Enter1-1 = "好閒哦……"
20042-CVGroup_UIEventLobby_Enter1-2 = "要是有把攜帶型遊戲機帶過來就好了……"
20042-CVGroup_UIEventLobby_Enter2-1 = "好像有點想感受到電磁波……"
20042-CVGroup_UIEventLobby_Enter3-1 = "在自然的畫布上畫點東西吧。"
20042-CVGroup_UIEventLobby_Enter4-1 = "（啊，壁畫……忘記擦掉了）"
20042-CVGroup_UIEventLobby_Enter4-2 = "（算了，反正應該不會出什麼事吧？）"
20042-CVGroup_UIEventLobby_Enter5-1 = "好像比想像中還好一點？"
20042-CVGroup_UIEventLobby_Enter5-2 = "畢竟晚餐的水炊鍋還挺好吃的……"
20042-CVGroup_UIEventLobby_Enter5-3 = "要是能帶手機來的話，好像會想再來一次。"
20042-CVGroup_UIEventLobby_Enter5-4 = "當，當然我並沒有喜歡上露營哦……！"
20042-CVGroup_UIEventLobby_Idle1-1 = "嗚嗚……居然看不了年底的特別節目……"
20042-CVGroup_UIEventLobby_Idle1-2 = "千尋前輩好過分！"
20042-CVGroup_UIEventLobby_Idle2-1 = "那朵雲……好像跟伺服器電腦有點像。"
20042-CVGroup_UIEventLobby_Idle3-1 = "嗚嗚，好想敲鍵盤～太閒了啦～！"
20042-CVGroup_UIEventLobby_Idle3-2 = "老師，你有帶什麼能用手玩的玩具嗎？\n就算是橡皮筋也可以！"
20042-CVGroup_UIEventLobby_Idle4-1 = "老師好像還挺樂在其中的呢，露營。"

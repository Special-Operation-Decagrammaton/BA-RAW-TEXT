[translation]
20042-CVGroup_UITitle_Idle1-1 = "블루 아카이브……"
20042-CVGroup_CharacterGet_Idle1-1 = "으으, 캠핑이라니…… 휴일인데 또 밖에 나가야 하는 거야……?"
20042-CVGroup_Cafe_Idle1-1 = "오늘은 이 밖으로 나가고 싶지 않아…"
20042-CVGroup_Cafe_Idle2-1 = "아, 좋은 영감이 떠올랐어!"
20042-CVGroup_Cafe_Idle3-1 = "전에 치히로 선배에게 빌린 1회용 침대를 이 근처에 설치해 볼까?"
20042-CVGroup_Cafe_Idle4-1 = "뭐지? 이 이상한 이름의 WIFI는…"
20042-CVGroup_Cafe_Idle5-1 = "(여기에도 BOOM을 설치할 수 있으려나? ……한번 도전해 볼까!)"
20042-CVGroup_WeaponGet_Idle1-1 = "이 기관총, 멋진 느낌으로 개조하긴 했지만 산행에 가져가기에는 너무 무거워…\n슬슬 경량화를 해야 할지도."
20042-CVGroup_UIEventLobby_Enter1-1 = "심심해……"
20042-CVGroup_UIEventLobby_Enter1-2 = "단순한 게임기라도\n가져왔으면\n좋았을 텐데……"
20042-CVGroup_UIEventLobby_Enter2-1 = "전자파를\n느끼고 싶어……"
20042-CVGroup_UIEventLobby_Enter3-1 = "자연을 캔버스 삼아서\n뭐라도 그려볼까."
20042-CVGroup_UIEventLobby_Enter4-1 = "(아, 그 벽화……\n지우는 거 깜빡했네.)"
20042-CVGroup_UIEventLobby_Enter4-2 = "(뭐, 별일이야\n있겠어?)"
20042-CVGroup_UIEventLobby_Enter5-1 = "으음. 생각보다는\n나쁘지 않은\n경험이었어."
20042-CVGroup_UIEventLobby_Enter5-2 = "특히 저녁에 먹은\n미즈타키는 정말\n최고였어…"
20042-CVGroup_UIEventLobby_Enter5-3 = "핸드폰만 있다면\n한 번쯤은 다시 와도\n괜찮을 것 같아."
20042-CVGroup_UIEventLobby_Enter5-4 = "무, 물론 캠핑이\n좋아졌다는\n뜻은 아니지만……!"
20042-CVGroup_UIEventLobby_Idle1-1 = "으으… 연말에는 재미있는\n방송이 잔뜩 있는데,\n그 실황을 볼 수 없다니…"
20042-CVGroup_UIEventLobby_Idle1-2 = "치히로 선배도 너무해!"
20042-CVGroup_UIEventLobby_Idle2-1 = "아, 저 구름… 뭔가\n서버 컴퓨터랑 생긴 게\n닮은 것 같기도."
20042-CVGroup_UIEventLobby_Idle3-1 = "으으, 오랜만에\n키보드에서 손을 떼고\n가만히 있으려니\n손이 심심해서 못 견디겠어."
20042-CVGroup_UIEventLobby_Idle3-2 = "선생님, 뭔가 손으로\n가지고 놀만한 장난감\n같은 거 안 갖고 있어?\n고무줄이라도 괜찮으니까!"
20042-CVGroup_UIEventLobby_Idle4-1 = "선생님은 즐기고\n있구나, 캠핑."
20042-CVGroup_UIEventLobby_Idle4-2 = "그럼, 나도 조금은\n기분을 내볼까!"

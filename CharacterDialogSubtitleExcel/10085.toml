[translation]
10085-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10085-CVGroup_CharacterGet_Idle1-1 = "There's...no internet access here. But a true Veritas member wouldn't be stymied by this harsh environment!"
10085-CVGroup_Cafe_Idle1-1 = "I like how cozy it is here."
10085-CVGroup_Cafe_Idle2-1 = "(That outfit looks freezing.)"
10085-CVGroup_Cafe_Idle3-1 = "Frenzy MAX in a glass... No shaking... Or stirring it."
10085-CVGroup_Cafe_Idle4-1 = "(I might stay here forever. It's so comfy.)"
10085-CVGroup_Cafe_Idle5-1 = "(All these wifi names are so weird...)"
10085-CVGroup_WeaponGet_Idle1-1 = "Hiking has made me realize how ridiculously heavy my gun is. I'm gonna try to modify it a little to shave some weight."
10085-CVGroup_UIEventLobby_Enter1-1 = "We've gotta get back indoors. It's freezing."
10085-CVGroup_UIEventLobby_Enter2-1 = "Camping, at a time like this..."
10085-CVGroup_UIEventLobby_Enter2-2 = "I can't with the vice president sometimes."
10085-CVGroup_UIEventLobby_Enter3-1 = "There's...nothing to do...here..."
10085-CVGroup_UIEventLobby_Enter4-1 = "Th-There was a bear nearby...?"
10085-CVGroup_UIEventLobby_Enter4-2 = "Is it okay for us to be here?"
10085-CVGroup_UIEventLobby_Enter5-1 = "It was a little rough, but I guess these kinds of experiences can be nice sometimes..."
10085-CVGroup_UIEventLobby_Enter5-2 = "O-Only...if it's from time to time...!"
10085-CVGroup_UIEventLobby_Idle1-1 = "The closest convenience store...is beyond that mountain..."
10085-CVGroup_UIEventLobby_Idle2-1 = "(The Wi-Fi signal...is gone?)"
10085-CVGroup_UIEventLobby_Idle3-1 = "This energy drink...is warm."
10085-CVGroup_UIEventLobby_Idle3-2 = "I wouldn't normally say yes, but I'm doing a lot of things I wouldn't normally do."
10085-CVGroup_UIEventLobby_Idle4-1 = "The hard work never ends, huh, Sensei? Even after such a tough year, you're still letting us drag you around..."
10085-CVGroup_UIEventLobby_Idle4-2 = "...Huh? What do you mean you're enjoying yourself?"
10085-CVGroup_UIEventLobby_Idle4-3 = "...I guess Sensei is popular for a reason."
10085-CVGroup_UIEventShop_Enter1-1 = "Did the vice president force you to come along too, Sensei?"
10085-CVGroup_UIEventShop_Enter1-2 = "If you don't mind, could you lend me a hand?"
10085-CVGroup_UIEventShop_Enter2-1 = "A-ACK! O-Oh... It's just you, Sensei."
10085-CVGroup_UIEventShop_Enter2-2 = "I'm sorry. I thought you were a bear."
10085-CVGroup_UIEventShop_Enter3-1 = "We've got to make sure we clean up everything."
10085-CVGroup_UIEventShop_Enter3-2 = "I don't even wanna imagine the vice president's reaction if we're not thorough..."
10085-CVGroup_UIEventShop_Idle1-1 = "You know, if this was a game, we could've collected all of this with just one click."
10085-CVGroup_UIEventShop_Idle2-1 = "Huh? What? Did I get something on my clothes?"
10085-CVGroup_UIEventShop_Buy1-1 = "Yeah, I think we'll manage with this."
10085-CVGroup_UIEventShop_Buy2-1 = "This...is for me?"
10085-CVGroup_UIEventShop_Buy2-2 = "Thanks. I'll give you everything I gathered in return."
10085-CVGroup_UIEventShop_Buy3-1 = "You gathered all this yourself?"
10085-CVGroup_UIEventShop_Buy3-2 = "Wow... You're made for the outdoors, Sensei."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter1-1 = "Hey, Sensei. Look, I'm making curry."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-1 = "I like watching it boil in the pot."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-2 = "It makes me feel all warm and fuzzy."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-1 = "So, the curry is technically ready..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-2 = "But if you want to add more ingredients, let me know."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-1 = "Uh, is this thing working?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-2 = "Can you taste test it please, Sensei?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-1 = "I read once that chocolate is a good secret ingredient for curry."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-2 = "...So, maybe an energy drink could also work?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-1 = "...! Whoa. It's actually good."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-2 = "I didn't know curry could be this good."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck3-1 = "Seriously! It's delicious."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck2-1 = "It's definitely better than instant curry."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck1-1 = "Wh-What a...taste...!"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck0-1 = "Ugh. I really tried. I'm sorry."

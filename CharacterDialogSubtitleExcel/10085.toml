[translation]
10085-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10085-CVGroup_CharacterGet_Idle1-1 = "전파가 닿지 않는 이 상황…\n해커에게는 가혹한 환경이지만, 베리타스의 멤버가 이 정도로 포기할 수는 없지."
10085-CVGroup_Cafe_Idle1-1 = "여기는 따듯해서 좋네…"
10085-CVGroup_Cafe_Idle2-1 = "(저렇게 입으면… 춥지 않으려나?)"
10085-CVGroup_Cafe_Idle3-1 = "요괴 MAX 한 잔. 젓지 말고… 흔들지도 말고."
10085-CVGroup_Cafe_Idle4-1 = "(편안하다… 여기서 영원히 나가고 싶지 않아…)"
10085-CVGroup_Cafe_Idle5-1 = "(이상한 이름의 와이파이가 잔뜩…)"
10085-CVGroup_WeaponGet_Idle1-1 = "산을 오르면서 총이 얼마나 무거운지 최근 새삼 깨닫게 되었어…\n다음번에는 경량 모델로 개조해 볼까."
10085-CVGroup_UIEventLobby_Enter1-1 = "춥다… 빨리 따듯한 실내로 돌아가고 싶어…"
10085-CVGroup_UIEventLobby_Enter2-1 = "이런 시기에 캠핑이라니."
10085-CVGroup_UIEventLobby_Enter2-2 = "부부장도 너무해…"
10085-CVGroup_UIEventLobby_Enter3-1 = "여기선… 할 수 있는 게… 아무것도 없어…"
10085-CVGroup_UIEventLobby_Enter4-1 = "그, 근처에서 곰이 나왔다고…?"
10085-CVGroup_UIEventLobby_Enter4-2 = "여기 있어도 괜찮은 거야?"
10085-CVGroup_UIEventLobby_Enter5-1 = "다소 고생하긴 했지만, 가끔씩은 이런 경험도 나쁘진 않을 지도…"
10085-CVGroup_UIEventLobby_Enter5-2 = "가, 가끔… 정말로 가끔씩이라면…!"
10085-CVGroup_UIEventLobby_Idle1-1 = "가장 가까운 편의점이… 저 산 너머인가…"
10085-CVGroup_UIEventLobby_Idle2-1 = "(와이파이의 신호가… 사라졌어?)"
10085-CVGroup_UIEventLobby_Idle3-1 = "따듯한 에너지 드링크라…"
10085-CVGroup_UIEventLobby_Idle3-2 = "평소라면 논외겠지만, 오늘만큼은 괜찮을지도."
10085-CVGroup_UIEventLobby_Idle4-1 = "선생님도 고생이 많네. 연말인데, 이런 곳까지 끌려오다니…"
10085-CVGroup_UIEventLobby_Idle4-2 = "응? 이런 상황도 나름 즐겁다고?"
10085-CVGroup_UIEventLobby_Idle4-3 = "…역시 선생님은 인싸였나."
10085-CVGroup_UIEventShop_Enter1-1 = "…선생님도 부부장에게 부탁을 받고 왔어?"
10085-CVGroup_UIEventShop_Enter1-2 = "혹시 괜찮다면, 좀 도와줄 수 있을까…?"
10085-CVGroup_UIEventShop_Enter2-1 = "으, 으앗…? …아, 선생님이구나…"
10085-CVGroup_UIEventShop_Enter2-2 = "미안, 곰이 나타난 줄 알았어."
10085-CVGroup_UIEventShop_Enter3-1 = "뒷정리는 확실하게 하고 가야지."
10085-CVGroup_UIEventShop_Enter3-2 = "나중에 부부장에게 한 소리 들을지도 모르니까."
10085-CVGroup_UIEventShop_Idle1-1 = "채집이라… 이게 게임이었다면 클릭 한 번으로 끝났을 텐데…"
10085-CVGroup_UIEventShop_Idle2-1 = "응? 왜 그래? 옷에 뭐라도 묻었어?"
10085-CVGroup_UIEventShop_Buy1-1 = "응, 이거라면 괜찮을 것 같아."
10085-CVGroup_UIEventShop_Buy2-1 = "이거, 나한테 주는 거야?"
10085-CVGroup_UIEventShop_Buy2-2 = "고마워. 내가 모은 것도 줄게."
10085-CVGroup_UIEventShop_Buy3-1 = "벌써 이렇게 모아 온 거야?"
10085-CVGroup_UIEventShop_Buy3-2 = "…선생님은 캠핑에 재능이 있구나…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter1-1 = "아, 선생님. 지금 카레를 끓이던 중이었어."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-1 = "보글보글 끓고 있는 냄비를 보고 있노라면…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-2 = "왠지 따듯한 기분이 들어…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-1 = "카레의 준비는 끝났지만…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-2 = "혹시 더 넣고 싶은 재료가 있다면 지금 말해줘."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-1 = "음… 이거 제대로 되고 있는 건가?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-2 = "선생님, 맛 좀 봐줄래?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-1 = "카레에 숨김맛으로 초콜릿을 넣기도 한다던데."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-2 = "…그럼 에너지 드링크를 넣어봐도…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-1 = "아…! 엄청나게 맛있어."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-2 = "카레로 이런 맛을 낼 수 있었다니…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck3-1 = "음, 맛있게 잘 됐네."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck2-1 = "레토르트 카레에 비하면 그럭저럭 괜찮은 편이려나."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck1-1 = "이, 인상적인 맛이네…"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck0-1 = "욱… 미안, 이건 먹을 수 없겠어…"

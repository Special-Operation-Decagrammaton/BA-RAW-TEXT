[translation]
20052-CVGroup_UITitle_Idle1-1 = "Blue Archive ฮิ ฮิ ฮิ"
20052-CVGroup_CharacterGet_Idle1-1 = "ตีพิมพ์ พิมพ์เพิ่ม วางจำหน่าย คือคติของชมรมสื่อสิ่งพิมพ์ค่ะ\nสวัสดีค่ะ คุณครู อารามากิ ยาคุโมะค่ะ"
20052-CVGroup_Cafe_Idle1-1 = "ไหนดูซิ... ถ้าจะเปิดตลาดใหม่..."
20052-CVGroup_Cafe_Idle2-1 = "เป็นสถานที่ที่อบอุ่นและสบายจังเลยนะคะ..."
20052-CVGroup_Cafe_Idle3-1 = "ถ้าทำหน้าร้านไว้ตรงโน้นละก็...? ฮิ ฮิ ฮิ"
20052-CVGroup_Cafe_Idle4-1 = "งานเขียนในยุคนี้เหมือนการทำธุรกิจบนแพลตฟอร์มมากกว่าค่ะ"

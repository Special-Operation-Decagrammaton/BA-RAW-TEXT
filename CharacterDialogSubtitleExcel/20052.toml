[translation]
20052-CVGroup_UITitle_Idle1-1 = "블루, 아카이브. 힛. 힛. 히."
20052-CVGroup_CharacterGet_Idle1-1 = "출판, 증쇄, 유통. 그야말로 출판부의 모토죠.\n안녕하십니까, 선생님. 아라마키 야쿠모입니다."
20052-CVGroup_Cafe_Idle1-1 = "어디 봅시다…… 판로를 열려면……"
20052-CVGroup_Cafe_Idle2-1 = "따듯하고 아늑한 장소네요……"
20052-CVGroup_Cafe_Idle3-1 = "저쪽에 판매장을 만들면……? 힛. 힛. 히."
20052-CVGroup_Cafe_Idle4-1 = "사실 요즘 텍스트는 플랫폼 장사에 가깝죠."
20052-CVGroup_Cafe_Idle5-1 = "여기 일일 수익은 얼마나 되려나요……?"
20052-CVGroup_WeaponGet_Idle1-1 = "도구는 쓰기 나름이라고 하잖습니까?\n이걸로 계약을 보다 \n'확실하게' 지키도록 할 수 있겠네요."
20052-CVGroup_UIEventLobby_Enter1-1 = "리스크가 없다면리턴도 없는 법."
20052-CVGroup_UIEventLobby_Enter1-2 = "그러면 어디, 사업을시작해 볼까요……?"
20052-CVGroup_UIEventLobby_Enter2-1 = "지금이야말로,보여드리죠."
20052-CVGroup_UIEventLobby_Enter2-2 = "붉은겨울에서살아남은,우리 출판부의 수완을!"
20052-CVGroup_UIEventLobby_Enter2-3 = "……사실"
20052-CVGroup_UIEventLobby_Enter2-4 = "생존 본능에가깝지 않은가싶기는 합니다만."
20052-CVGroup_UIEventLobby_Enter3-1 = "왔어요……흐름이 온 겁니다!"
20052-CVGroup_UIEventLobby_Enter3-2 = "이걸 놓치고도출판부장이라자처할 수는 없죠!"
20052-CVGroup_UIEventLobby_Enter4-1 = "……어쩌다,이렇게 된 걸까요……"
20052-CVGroup_UIEventLobby_Enter4-2 = "아뇨…… 사실 원인도짐작은 가긴하는데 말이죠……"
20052-CVGroup_UIEventLobby_Enter4-3 = "그래도 아직은포기할 수없으니까요……"
20052-CVGroup_UIEventLobby_Enter5-1 = "이야~ 한때는 어떻게되나 했다니까요!"
20052-CVGroup_UIEventLobby_Enter5-2 = "네? 다행이지만반성도 조금 하라고요?"
20052-CVGroup_UIEventLobby_Enter5-3 = "그…… 조금다음에 하면,안 될까요……?"
20052-CVGroup_UIEventLobby_Idle1-1 = "창작자란 분들은말입니다."
20052-CVGroup_UIEventLobby_Idle1-2 = "뭘 잘 만들기는하지만,"
20052-CVGroup_UIEventLobby_Idle1-3 = "그걸 퍼트리는방법에는"
20052-CVGroup_UIEventLobby_Idle1-4 = "의외로 관심이적단 말이죠……"
20052-CVGroup_UIEventLobby_Idle2-1 = "책…… 텍스트가소중한 이유는"
20052-CVGroup_UIEventLobby_Idle2-2 = "그것이 가장 적은인풋으로, 최대한의아웃풋을 이끌어낼"
20052-CVGroup_UIEventLobby_Idle2-3 = "'가능성'이 있는상품이기 때문입니다!"
20052-CVGroup_UIEventLobby_Idle3-1 = "뭔가를 만들어낼 수있다는 건멋진 일이죠."
20052-CVGroup_UIEventLobby_Idle3-2 = "그걸 가능하게 할재능이 있는 것도요."
20052-CVGroup_UIEventLobby_Idle3-3 = "……"
20052-CVGroup_UIEventLobby_Idle3-4 = "좋죠,그런 재능."
20052-CVGroup_UIEventLobby_Idle3-5 = "진심으로……그렇게 생각해요."
20052-CVGroup_UIEventLobby_Idle4-1 = "트리니티 학생분들께는감사드리고 있습니다."
20052-CVGroup_UIEventLobby_Idle4-2 = "에이,왜 그렇게 보세요."
20052-CVGroup_UIEventLobby_Idle4-3 = "이거 진심이라고요."
20052-CVGroup_UIEventShop_Enter1-1 = "사업의 기본이란 건뭘까요, 선생님?역시 교류…… 교환……"
20052-CVGroup_UIEventShop_Enter1-2 = "물론 돈이겠죠!"
20052-CVGroup_UIEventShop_Enter2-1 = "잘 오셨습니다!"
20052-CVGroup_UIEventShop_Enter2-2 = "자금과 상품이 오가는,사업의 현장에!"
20052-CVGroup_UIEventShop_Enter2-3 = "힛. 힛. 히.어디 한번 둘러보시죠!"
20052-CVGroup_UIEventShop_Enter3-1 = "선반 깊숙한 곳에보물이 잠들어있는 일도있으니까요."
20052-CVGroup_UIEventShop_Enter3-2 = "끝까지 잘~ 봐주세요,선생님."
20052-CVGroup_UIEventShop_Enter3-3 = "아, 물론저를 자세히봐주셔도 좋구요?"
20052-CVGroup_UIEventShop_Idle1-1 = "제게 말을 걸어도,가격이 싸질 일은없다구요?"
20052-CVGroup_UIEventShop_Idle1-2 = "가격 할인을결정하기까지는 엄청난사업적 고려와……"
20052-CVGroup_UIEventShop_Idle1-3 = "……정치적 암투까지들어가곤 하는 경우가많거든요."
20052-CVGroup_UIEventShop_Idle2-1 = "선생님을 상대로 사업을하는 날이 오게될 줄은 몰랐어요."
20052-CVGroup_UIEventShop_Idle2-2 = "이야~ 정말이지,인생 살고 볼일이라니까요."
20052-CVGroup_UIEventShop_Buy1-1 = "좋네요, 좋네요!"
20052-CVGroup_UIEventShop_Buy1-2 = "또 필요하신 거없으신가요?"
20052-CVGroup_UIEventShop_Buy2-1 = "여기에서만 드리는말씀입니다만……"
20052-CVGroup_UIEventShop_Buy2-2 = "저는 결과물을제 눈으로 확인할 때가장 짜릿합니다!"
20052-CVGroup_UIEventShop_Buy3-1 = "문화는 돈이에요.이건 현실입니다."
20052-CVGroup_UIEventShop_Buy3-2 = "그런 의미에서 방금구매하신 것도……"
20052-CVGroup_UIEventShop_Buy3-3 = "어떤 의미로는, 문화라고 할 수있을지도요?"
20052-CVGroup_UIEventShop_Buy4-1 = "품질은보증한다구요?"

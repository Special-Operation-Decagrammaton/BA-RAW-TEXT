20052-CVGroup_UIEventLobby_Enter3-2 = "ถ้าปล่อยให้หลุดมือไป อย่าเรียกตัวเองว่าชมรมสื่อสิ่งพิมพ์เลยค่ะ!"
20052-CVGroup_UIEventLobby_Enter4-1 = "ทำไม… ถึงเป็นแบบนี้ได้นะคะ..."

[translation]
20052-CVGroup_UITitle_Idle1-1 = "Blue Archive. Heh, heh, heh."
20052-CVGroup_CharacterGet_Idle1-1 = "Publish, print, distribute. That's the Publishing Department's motto. Hello, Sensei. I'm Aramaki Yakumo."
20052-CVGroup_Cafe_Idle1-1 = "Let's see... How best to optimize our revenue streams..."
20052-CVGroup_Cafe_Idle2-1 = "It's a warm and cozy place..."
20052-CVGroup_Cafe_Idle3-1 = "What if I set up a sales booth there...? Heh, heh, heh."
20052-CVGroup_Cafe_Idle4-1 = "Nowadays, textual content is more of a business platform."
20052-CVGroup_Cafe_Idle5-1 = "I wonder how much this place makes daily...?"
20052-CVGroup_WeaponGet_Idle1-1 = "They say it depends on how you use the tool, right? With this, I can \"guarantee\" that my contracts are upheld. Heh, heh, heh."
20052-CVGroup_UIEventLobby_Enter1-1 = "With no risk, there's no return."
20052-CVGroup_UIEventLobby_Enter1-2 = "Now then, shall we get to business...?"
20052-CVGroup_UIEventLobby_Enter2-1 = "I'll show you now."
20052-CVGroup_UIEventLobby_Enter2-2 = "The skills of a Publishing Department that survived a harsh Red Winter!"
20052-CVGroup_UIEventLobby_Enter2-3 = "Well..."
20052-CVGroup_UIEventLobby_Enter2-4 = "It's probably closer to \"survival instinct,\" though."
20052-CVGroup_UIEventLobby_Enter3-1 = "It's here... The momentum is here!"
20052-CVGroup_UIEventLobby_Enter3-2 = "I can't call myself the Publishing Department President if I miss this!"
20052-CVGroup_UIEventLobby_Enter4-1 = "...How did it come to this...?"
20052-CVGroup_UIEventLobby_Enter4-2 = "I mean... I have the gist of what caused this..."
20052-CVGroup_UIEventLobby_Enter4-3 = "But I can't give up just yet..."
20052-CVGroup_UIEventLobby_Enter5-1 = "Wow... I was really concerned at one point!"
20052-CVGroup_UIEventLobby_Enter5-2 = "What? You're glad things went well, but I should reflect on myself?"
20052-CVGroup_UIEventLobby_Enter5-3 = "Um... Can we push that back to a later time...?"
20052-CVGroup_UIEventLobby_Idle1-1 = "Creators are..."
20052-CVGroup_UIEventLobby_Idle1-2 = "...good at creating things..."
20052-CVGroup_UIEventLobby_Idle1-3 = "...but they're surprisingly uninterested..."
20052-CVGroup_UIEventLobby_Idle1-4 = "...in the methods to spread their works..."
20052-CVGroup_UIEventLobby_Idle2-1 = "The reason why books...why text is important..."
20052-CVGroup_UIEventLobby_Idle2-2 = "...is because they are products with the \"potential\" to bring..."
20052-CVGroup_UIEventLobby_Idle2-3 = "...maximum output with minimal input!"
20052-CVGroup_UIEventLobby_Idle3-1 = "It's incredible to be able to create something."
20052-CVGroup_UIEventLobby_Idle3-2 = "The same goes for having the talent to make it happen."
20052-CVGroup_UIEventLobby_Idle3-3 = "..."
20052-CVGroup_UIEventLobby_Idle3-4 = "Having such talent, it's great."
20052-CVGroup_UIEventLobby_Idle3-5 = "I truly...believe that."
20052-CVGroup_UIEventLobby_Idle4-1 = "I'm thankful to the Trinity students."
20052-CVGroup_UIEventLobby_Idle4-2 = "Huh, why are you looking at me like that?"
20052-CVGroup_UIEventLobby_Idle4-3 = "I'm serious."
20052-CVGroup_UIEventShop_Enter1-1 = "What do you think the basics of business are, Sensei? Naturally there's exchange... Trade..."
20052-CVGroup_UIEventShop_Enter1-2 = "And money, of course!"
20052-CVGroup_UIEventShop_Enter2-1 = "Welcome!"
20052-CVGroup_UIEventShop_Enter2-2 = "To the heart of business, where money and goods flow freely!"
20052-CVGroup_UIEventShop_Enter2-3 = "Heh, heh, heh. Please look around!"
20052-CVGroup_UIEventShop_Enter3-1 = "There might be hidden treasure waiting deep inside the shelves."
20052-CVGroup_UIEventShop_Enter3-2 = "Keep your eyes peeled until the end, Sensei."
20052-CVGroup_UIEventShop_Enter3-3 = "Ah, of course, you can also keep your eyes peeled for me, you know?"
20052-CVGroup_UIEventShop_Idle1-1 = "The price isn't going down even if you talk to me, okay?"
20052-CVGroup_UIEventShop_Idle1-2 = "Offering a discount would require tremendous business considerations..."
20052-CVGroup_UIEventShop_Idle1-3 = "...and even closed-door political negotiations."
20052-CVGroup_UIEventShop_Idle2-1 = "I never thought I'd see a day when I'd be doing business with you, Sensei."
20052-CVGroup_UIEventShop_Idle2-2 = "Yeah, seriously, life's full of surprises."
20052-CVGroup_UIEventShop_Buy1-1 = "Nice, nice!"
20052-CVGroup_UIEventShop_Buy1-2 = "Is there anything else you need?"
20052-CVGroup_UIEventShop_Buy2-1 = "I'm only telling you this here..."
20052-CVGroup_UIEventShop_Buy2-2 = "It's so thrilling to see the results with my own eyes!"
20052-CVGroup_UIEventShop_Buy3-1 = "Culture is money. That's the reality."
20052-CVGroup_UIEventShop_Buy3-2 = "In that regard, what you just purchased..."
20052-CVGroup_UIEventShop_Buy3-3 = "...could be considered cultural in a sense, you know?"
20052-CVGroup_UIEventShop_Buy4-1 = "I guarantee the quality, okay?"

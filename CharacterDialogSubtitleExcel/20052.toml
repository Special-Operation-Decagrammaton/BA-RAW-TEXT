20052-CVGroup_UIEventShop_Enter1-1 = "พื้นฐานของธุรกิจคืออะไรกันแน่คะ คุณครู?\nจะเป็นเรื่องแลกเปลี่ยน... พบปะ... หรือเปล่านะ"

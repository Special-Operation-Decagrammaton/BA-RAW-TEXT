20052-CVGroup_WeaponGet_Idle1-1 = "เครื่องมือจะดีหรือไม่ขึ้นอยู่กับวิธีที่คนนำไปใช้ค่ะ\nสิ่งนี้น่าจะช่วยให้รักษาข้อตกลง\nในสัญญาให้ 'ชัดเจน' ยิ่งขึ้นนะคะ ฮิฮิฮิ"
20052-CVGroup_UIEventLobby_Enter1-1 = "ถ้าไม่ลองเสี่ยงดูก็คงไม่รู้ผลหรอกค่ะ"
20052-CVGroup_UIEventLobby_Enter1-2 = "ไหนดูซิ... มาเริ่มทำธุรกิจกันเลยดีมั้ยคะ...?"
20052-CVGroup_UIEventLobby_Enter2-1 = "ถึงเวลาที่ฉันจะแสดงให้คุณครูได้เห็นแล้วค่ะ"
20052-CVGroup_UIEventLobby_Enter2-2 = "ฝีมือของชมรมสื่อสิ่งพิมพ์ ผู้อยู่รอดในเรดวินเทอร์!"

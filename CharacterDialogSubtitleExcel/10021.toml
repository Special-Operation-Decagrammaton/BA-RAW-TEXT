[translation]
10021-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10021-CVGroup_CharacterGet_Idle1-1 = "시라스 아즈사. 목표 지점인 바다에 도착. 곧바로 다음 목표를 이행하지.\n……딱히 들떴다거나 그런 건 아니야."
10021-CVGroup_Cafe_Idle1-1 = "의외로 움직이기도 편하고, 나쁘지 않아 ……"
10021-CVGroup_Cafe_Idle2-1 = "왠지 시선이 느껴지는데……"
10021-CVGroup_Cafe_Idle3-1 = "……후후."
10021-CVGroup_Cafe_Idle4-1 = "역시 이거 귀여워……"
10021-CVGroup_Cafe_Idle5-1 = "조금 피곤할 지도 모르겠네……"
10021-CVGroup_WeaponGet_Idle1-1 = "바로 이런 게 필요했던 참이야. 고마워, 후회하지 않게 해줄게."
10021-CVGroup_UIEventLobby_Enter1-1 = "바다…. 여름…."
10021-CVGroup_UIEventLobby_Enter1-2 = "으, 응? 뭐야. 뭘 보는 거야…"
10021-CVGroup_UIEventLobby_Enter2-1 = "어서 와, 선생님. 해야 할 것들이 잔뜩이야."
10021-CVGroup_UIEventLobby_Idle1-1 = "이 수영복… 귀여워… 후후…"
10021-CVGroup_UIEventLobby_Idle2-1 = "…서, 선생님…? 언제부터 보고 있었어…?"
10021-CVGroup_UIEventLobby_Idle3-1 = "그, 그만 봐… 이런 거, 익숙하지 않으니까…"
10021-CVGroup_UIEventLobby_Idle4-1 = "아, 아냐. 괜찮아… 바, 방금 말은 신경 쓰지 마."

[translation]
10021-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10021-CVGroup_CharacterGet_Idle1-1 = "白洲梓，到達目標地點的海邊。\n立刻開始預定的任務。\n……並沒有開心到忘我之類的，不是那樣的。"
10021-CVGroup_Cafe_Idle1-1 = "意外的容易活動，還不錯……"
10021-CVGroup_Cafe_Idle2-1 = "感覺好像有視線……"
10021-CVGroup_Cafe_Idle3-1 = "……呵呵。"
10021-CVGroup_Cafe_Idle4-1 = "果然這個，很可愛……"
10021-CVGroup_Cafe_Idle5-1 = "也許有點累了也說不定……"
10021-CVGroup_WeaponGet_Idle1-1 = "我剛好想要這種東西，\n謝謝。我不會讓你後悔的。"
10021-CVGroup_UIEventLobby_Enter1-1 = "大海…夏天…"
10021-CVGroup_UIEventLobby_Enter1-2 = "嗯…？為，為什麼要一直看我這裡…"
10021-CVGroup_UIEventLobby_Enter2-1 = "歡迎回來，老師。\n該做的事情還有很多哦！"
10021-CVGroup_UIEventLobby_Idle1-1 = "這套泳裝…\n真可愛… 呵呵…"
10021-CVGroup_UIEventLobby_Idle2-1 = "老，老師…？\n你從什麼時候開始看的…？"
10021-CVGroup_UIEventLobby_Idle3-1 = "別，別看我…\n我還不習慣穿成這樣…"
10021-CVGroup_UIEventLobby_Idle4-1 = "那個…\n果，果然還是算了…別在意。"

[translation]
10134-CVGroup_UITitle_Idle1-1 = "블루, 아카이브!"
10134-CVGroup_CharacterGet_Idle1-1 = "아리스, 갑니다!"
10134-CVGroup_Cafe_Idle1-1 = "이거, 케이랑\n꼭 닮았습니다!"
10134-CVGroup_Cafe_Idle2-1 = "아리스,\n조금 졸립니다……."
10134-CVGroup_Cafe_Idle3-1 = "여기는 PK\n금지 구역입니다!"
10134-CVGroup_Cafe_Idle4-1 = "(스캔 완료.\n적성 반응…… 없음.)"
10134-CVGroup_Cafe_Idle5-1 = "충전기는\n어디에 있을까요?"
10134-CVGroup_WeaponGet_Idle1-1 = "빛의 검은, 언제나\n아리스에게 나아갈 길을\n비춰 줬습니다.\n마치…… 선생님 같습니다!"
10134-CVGroup_UICarrierLobby_Enter1-1 = "아리스…… 뭔가…… 두근거립니다!"
10134-CVGroup_UICarrierLobby_Enter2-1 = "게임기를 가져왔습니다!"
10134-CVGroup_UICarrierLobby_Enter2-2 = "선생님도 어떠신가요?"
10134-CVGroup_UICarrierLobby_Enter3-1 = "모두 엄청났습니다!"
10134-CVGroup_UICarrierLobby_Enter4-1 = "모두 대단했습니다! 존경스럽습니다!"
10134-CVGroup_UICarrierLobby_Enter5-1 = "아리스는 아직, 더 힘낼 수 있습니다. 선생님!"
10134-CVGroup_UICarrierLobby_Enter6-1 = "모모이도 미도리도, 개인실에서 쉬겠다고 합니다……"
10134-CVGroup_UICarrierLobby_Idle1-1 = "……세상을 구하는 첫걸음인 거군요."
10134-CVGroup_UICarrierLobby_Idle1-2 = "힘내겠습니다!"
10134-CVGroup_UICarrierLobby_Idle2-1 = "이런 때일수록, 휴식도 중요합니다!"
10134-CVGroup_UICarrierLobby_Idle3-1 = "자유로울 수 있다는 건, 좋은 것 같습니다!"
10134-CVGroup_UICarrierLobby_Idle4-1 = "용기…… 그것이야말로 진정한 힘입니다!"
10134-CVGroup_UICarrierLobby_Idle5-1 = "힘을 내려면 역시,"
10134-CVGroup_UICarrierLobby_Idle5-2 = "뭔가 마시거나 먹어야 할 텐데요……"
10134-CVGroup_UICarrierLobby_Idle6-1 = "아리스는…… 모두가 무사했으면 좋겠습니다."
10134-CVGroup_UICarrierLobby_Idle6-2 = "그것이 전부입니다."
10134-CVGroup_UIEventMission_Enter1-1 = "선생님!\n미션입니다, 미션!"
10134-CVGroup_UIEventMission_Enter2-1 = "오늘 할 일은\n무엇일까요?"
10134-CVGroup_UIEventMission_Enter2-2 = "앗, 아리스가\n정리해야 하는 것이었죠……."
10134-CVGroup_UIEventMission_Enter3-1 = "온라인으로 인사드립니다,\n선생님! 아리스입니다!"
10134-CVGroup_UIEventMission_Enter4-1 = "엄청난 상황이\n되었습니다만……"
10134-CVGroup_UIEventMission_Enter4-2 = "함께 이겨내는 겁니다!"
10134-CVGroup_UIEventMission_Idle1-1 = "후. 후. 후……"
10134-CVGroup_UIEventMission_Idle1-2 = "어떠신가요, 선생님.\n아리스의 새 갑옷은요!"
10134-CVGroup_UIEventMission_Idle2-1 = "갑옷이 없어도……"
10134-CVGroup_UIEventMission_Idle2-2 = "그리고 만일,\n빛의 검마저 없어져도……"
10134-CVGroup_UIEventMission_Idle2-3 = "그래도,\n아리스는 아리스입니다."
10134-CVGroup_UIEventMission_Idle2-4 = "모두와 함께라면, 그리고."
10134-CVGroup_UIEventMission_Idle2-5 = "선생님이 계신다면요!"
10134-CVGroup_UIEventMission_Idle3-1 = "말쿠트……"
10134-CVGroup_UIEventMission_Idle3-2 = "그야말로\n최종 보스로군요!"
10134-CVGroup_UIEventMission_Idle3-3 = "그런데 혹시……\n히든 보스가 등장하는 것은\n아니겠지요……?"
10134-CVGroup_UIEventMission_Idle4-1 = "무사히 돌아가면……"
10134-CVGroup_UIEventMission_Idle4-2 = "모두에게\n케이를 소개하고 싶습니다!"
10134-CVGroup_UIEventMission_Buy1-1 = "뽜밤뽜밤-!"
10134-CVGroup_UIEventMission_Buy1-2 = "선생님이\n보상을 획득했습니다!"
10134-CVGroup_UIEventMission_Buy2-1 = "멋집니다, 선생님!"
10134-CVGroup_UIEventMission_Buy2-2 = "하나하나\n해 나가는 겁니다!"
10134-CVGroup_UIEventMission_Buy3-1 = "우우……\n아리스도 선생님 옆에서\n축하하고 싶습니다!"
10134-CVGroup_UIEventMission_Buy4-1 = "네! 아리스는 언제나\n한결같은 선생님이,\n정말 좋습니다!"
10134-CVGroup_UIEventMission_Interaction1-1 = "와아!\n아리스도 기쁩니다!"
10134-CVGroup_UIEventMission_Interaction2-1 = "이번에도 수고 많으셨습니다,\n선생님!"

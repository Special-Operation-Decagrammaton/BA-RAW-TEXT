[translation]
20034-CVGroup_UITitle_Idle1-1 = "Blue Archive. Heehee."
20034-CVGroup_CharacterGet_Idle1-1 = "The end of one year...and the start of another. Just thinking about that makes my heart skip a beat. And if there are delicious dishes? Ah, it's perfect! ★"
20034-CVGroup_Cafe_Idle1-1 = "I wonder what's on the menu today?"
20034-CVGroup_Cafe_Idle2-1 = "Good times, good food... Isn't it amazing? ★"
20034-CVGroup_Cafe_Idle3-1 = "Viral food videos are incredible! They do make me hungry though..."
20034-CVGroup_Cafe_Idle4-1 = "The number of reviews is more important than the rating!"
20034-CVGroup_Cafe_Idle5-1 = "Hey, I don't JUST think about food, you know?"
20034-CVGroup_WeaponGet_Idle1-1 = "Wow! Thank you so much! With this, I can blow everything away! Heehee... Just kidding, Sensei. I'll behave. ★"
20034-CVGroup_UIEventLobby_Enter1-1 = "Wow, Sensei! Did you already make your New Year's resolution?"
20034-CVGroup_UIEventLobby_Enter1-2 = "If you haven't yet... Would you like to make one with me?"
20034-CVGroup_UIEventLobby_Enter2-1 = "They say hot food in cold weather is the best way to warm up your body."
20034-CVGroup_UIEventLobby_Enter2-2 = "Huh? There's a bunch of osechi waiting for us?"
20034-CVGroup_UIEventLobby_Enter3-1 = "I want...something fresh..."
20034-CVGroup_UIEventLobby_Enter3-2 = "No. Something yummy... No, it's not that either..."
20034-CVGroup_UIEventLobby_Enter3-3 = "Yes! It looks like something exciting is happening."
20034-CVGroup_UIEventLobby_Enter4-1 = "In many ways, it's been a lively day. ★"
20034-CVGroup_UIEventLobby_Enter4-2 = "I don't mind it."
20034-CVGroup_UIEventLobby_Enter4-3 = "It might be challenging for other people though."
20034-CVGroup_UIEventLobby_Enter5-1 = "Seems the New Year's atmosphere is coming to a close."
20034-CVGroup_UIEventLobby_Enter5-2 = "The osechi was absolutely delicious. ★"
20034-CVGroup_UIEventLobby_Idle1-1 = "What's going on, Sensei?"
20034-CVGroup_UIEventLobby_Idle2-1 = "Oh my, are you teasing me, Sensei?"
20034-CVGroup_UIEventLobby_Idle2-2 = "Are you sure you want to play that game?"
20034-CVGroup_UIEventLobby_Idle2-3 = "My revenge is a very...special dish..."
20034-CVGroup_UIEventLobby_Idle3-1 = "You bored, Sensei?"
20034-CVGroup_UIEventLobby_Idle3-2 = "If I had my way, I'd make sure you never had a dull moment."
20034-CVGroup_UIEventLobby_Idle3-3 = "What do you say?"
20034-CVGroup_UIEventLobby_Idle4-1 = "Only for you, Sensei? That's not fair."
20034-CVGroup_UIEventLobby_Idle4-2 = "Yes! Gotcha. There's no escape! ★"

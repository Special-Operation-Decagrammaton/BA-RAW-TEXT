[translation]
20034-CVGroup_UITitle_Idle1-1 = "블루 아카이브. 후훗."
20034-CVGroup_CharacterGet_Idle1-1 = "연말…… 그리고 새해. 말의 울림에 가슴이 뛰네요.\n거기에 맛있는 요리가 있으면, 더할 나위 없을 거고요★"
20034-CVGroup_Cafe_Idle1-1 = "오늘의 일일 메뉴는 무엇일까요~?"
20034-CVGroup_Cafe_Idle2-1 = "특별한 요리를 먹고, 멋진 시간을 보낸다… 얼마나 멋진 일인가요★"
20034-CVGroup_Cafe_Idle3-1 = "바이럴의 힘은 굉장해요. 보고 있기만 해도 배고파지거든요."
20034-CVGroup_Cafe_Idle4-1 = "평점보다 리뷰 수가 더 중요한데요?"
20034-CVGroup_Cafe_Idle5-1 = "저라고 해서 언제나 먹는 것만 생각하는 건 아니거든요?"
20034-CVGroup_WeaponGet_Idle1-1 = "와아~! 감사합니다★ 이걸로 전~부, 날려버릴 수 있겠네요!\n후훗…… 괜찮아요, 선생님. 잘 조절할 테니까요★"
20034-CVGroup_UIEventLobby_Enter1-1 = "와아! 선생님! 새해맞이 기원, 이미 하셨나요?"
20034-CVGroup_UIEventLobby_Enter1-2 = "아직이라면… 저와 함께 어떠신가요?"
20034-CVGroup_UIEventLobby_Enter2-1 = "추울 때 뭔가를 먹으면, 몸이 따뜻해진다고 하잖아요."
20034-CVGroup_UIEventLobby_Enter2-2 = "자, 많은 오세치들이 우리를 기다리고 있다고요~?"
20034-CVGroup_UIEventLobby_Enter3-1 = "뭔가 싱싱한…"
20034-CVGroup_UIEventLobby_Enter3-2 = "아뇨, 먹음직스러운… 이것도 아니고…"
20034-CVGroup_UIEventLobby_Enter3-3 = "네! 떠들썩한 일이 벌어지고 있는 것 같아요."
20034-CVGroup_UIEventLobby_Enter4-1 = "여러 가지 의미로 와장창★ 한 일이네요."
20034-CVGroup_UIEventLobby_Enter4-2 = "저는 싫어하지 않지만,"
20034-CVGroup_UIEventLobby_Enter4-3 = "이런 걸 어려워하는 사람도 있을 테니까요."
20034-CVGroup_UIEventLobby_Enter5-1 = "설날 분위기도 끝나가네요."
20034-CVGroup_UIEventLobby_Enter5-2 = "오세치, 정~말 맛있었어요★"
20034-CVGroup_UIEventLobby_Idle1-1 = "무슨 일이신가요. 선생님?"
20034-CVGroup_UIEventLobby_Idle2-1 = "어머, 저한테 장난치시는 건가요? 선생님~?"
20034-CVGroup_UIEventLobby_Idle2-2 = "괜찮으시겠어요? 저의 복수는…"
20034-CVGroup_UIEventLobby_Idle2-3 = "조금, 특별할 수도 있는데요?"
20034-CVGroup_UIEventLobby_Idle3-1 = "선생님, 심심하신가요?"
20034-CVGroup_UIEventLobby_Idle3-2 = "저라면, 선생님을 심심하지 않게 해드릴 수 있는데,"
20034-CVGroup_UIEventLobby_Idle3-3 = "어떠신가요…?"
20034-CVGroup_UIEventLobby_Idle4-1 = "선생님만, 치사해요."
20034-CVGroup_UIEventLobby_Idle4-2 = "네, 잡았어요★ 이제 놓치지 않을 거예요~"

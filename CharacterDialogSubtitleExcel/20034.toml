[translation]
20034-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。呵呵。"
20034-CVGroup_CharacterGet_Idle1-1 = "年末……以及新年。\n話語的共鳴真是讓人心胸澎湃呢。\n要是再加上好吃的料理就更無可挑剔了★"
20034-CVGroup_Cafe_Idle1-1 = "今天的每日菜單\n是什麼呢～？"
20034-CVGroup_Cafe_Idle2-1 = "吃著特別的料理，度過美好的時光……多麼美妙呀★"
20034-CVGroup_Cafe_Idle3-1 = "病毒式行銷的力量很強。\n光是看著都感覺肚子餓了呢。"
20034-CVGroup_Cafe_Idle4-1 = "比起評下的分數，\n評論的數量更重要哦？"
20034-CVGroup_Cafe_Idle5-1 = "就算是我，也不是隨時只想著食物的唷～？"
20034-CVGroup_WeaponGet_Idle1-1 = "哇啊～！非常感謝★\n用這個就可以把全～部都炸飛了！\n呵呵……不用擔心的唷，老師。我會好好控制的★"
20034-CVGroup_UIEventLobby_Enter1-1 = "哇！老師！參拜，已經去過了嗎？"
20034-CVGroup_UIEventLobby_Enter1-2 = "如果還沒的話……和我一起，如何呀？"
20034-CVGroup_UIEventLobby_Enter2-1 = "寒冷的時候吃點東西，身體會變得暖和對吧？"
20034-CVGroup_UIEventLobby_Enter2-2 = "來，許多御節料理正在等著我們唷～？"
20034-CVGroup_UIEventLobby_Enter3-1 = "有種多汁……"
20034-CVGroup_UIEventLobby_Enter3-2 = "不對，豐滿……好像也不是……"
20034-CVGroup_UIEventLobby_Enter3-3 = "對了！是好像發生了熱鬧的事。"
20034-CVGroup_UIEventLobby_Enter4-1 = "在各種意義上，都非常混亂★呢。"
20034-CVGroup_UIEventLobby_Enter4-2 = "雖然我並不討厭……"
20034-CVGroup_UIEventLobby_Enter4-3 = "不過這種事，或許有人會覺得困擾呢。"
20034-CVGroup_UIEventLobby_Enter5-1 = "新年的氛圍也沉靜下來了呢。"
20034-CVGroup_UIEventLobby_Enter5-2 = "御節料理，真～的很好吃★"
20034-CVGroup_UIEventLobby_Idle1-1 = "有什麼事嗎？老師？"
20034-CVGroup_UIEventLobby_Idle2-1 = "哎呀，是在對我惡作劇嗎？老師～？"
20034-CVGroup_UIEventLobby_Idle2-2 = "這樣好嗎？我的復仇……"
20034-CVGroup_UIEventLobby_Idle2-3 = "可能，會有點特別唷？"
20034-CVGroup_UIEventLobby_Idle3-1 = "老師，你覺得無聊嗎？"
20034-CVGroup_UIEventLobby_Idle3-2 = "如果是我，應該不會讓老師無聊……"
20034-CVGroup_UIEventLobby_Idle3-3 = "意下如何呢……？"
20034-CVGroup_UIEventLobby_Idle4-1 = "只有老師太狡猾了。"
20034-CVGroup_UIEventLobby_Idle4-2 = "嗯，我抓到了★\n我絕對不會放開的～"

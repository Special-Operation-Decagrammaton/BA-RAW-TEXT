[translation]
20034-CVGroup_UITitle_Idle1-1 = "Blue Archive ฮุฮุ"
20034-CVGroup_CharacterGet_Idle1-1 = "สิ้นปี... แล้วก็ปีใหม่ คำนี้ทำให้ใจเต้นจังเลยนะคะ\nถ้ามีอาหารอร่อยๆ ด้วยแล้ว ฉันก็ไม่ขออะไรเพิ่มแล้วค่ะ★"
20034-CVGroup_Cafe_Idle1-1 = "เมนูประจำวันของวันนี้จะเป็นอะไรนะคะ~?"
20034-CVGroup_Cafe_Idle2-1 = "การได้กินอาหารที่พิเศษและใช้ช่วงเวลาที่งดงาม...\nเป็นสิ่งที่ยอดเยี่ยมเลยค่ะ★"
20034-CVGroup_Cafe_Idle3-1 = "วิดีโอกินแหลกนี่สุดยอดเลยค่ะ แค่ดูเฉยๆ ก็หิวขึ้นมาเลย"
20034-CVGroup_Cafe_Idle4-1 = "จำนวนการรีวิวสำคัญกว่าคะแนนรวมนะคะ"
20034-CVGroup_Cafe_Idle5-1 = "เห็นฉันอย่างนี้ ฉันก็ไม่ได้คิดแค่เรื่องกินอย่างเดียวหรอกนะคะ"
20034-CVGroup_WeaponGet_Idle1-1 = "ว้าว~! ขอบคุณค่ะ★\nสิ่งนี้น่าจะทำให้ปลิวได้หมดเลยนะคะ!\nฮุฮุฮุ... ไม่เป็นไรหรอกค่ะคุณครู ฉันจะควบคุมให้ดีค่ะ★"
20034-CVGroup_UIEventLobby_Enter1-1 = "ว้าว! คุณครู! ขอพรวันปีใหม่ไปแล้วหรือยังคะ?"
20034-CVGroup_UIEventLobby_Enter1-2 = "ถ้ายังละก็... ไปขอพรกับฉันมั้ยคะ?"
20034-CVGroup_UIEventLobby_Enter2-1 = "ว่ากันว่าถ้ากินอะไรตอนอากาศหนาว\nร่างกายจะอบอุ่นขึ้นนะคะ"
20034-CVGroup_UIEventLobby_Enter2-2 = "มีโอเซจิมากมายกำลังรอพวกเราอยู่นะคะ~"
20034-CVGroup_UIEventLobby_Enter3-1 = "มีอะไรที่สดใหม่..."
20034-CVGroup_UIEventLobby_Enter3-2 = "ไม่สิ มีอะไรที่น่ากินมั้ยนะ...\nอันนี้ก็ไม่ใช่..."
20034-CVGroup_UIEventLobby_Enter3-3 = "ค่ะ! ดูเหมือนจะมีเรื่องวุ่นวายเกิดขึ้นนะคะ"
20034-CVGroup_UIEventLobby_Enter4-1 = "ดูเป็นเรื่องโกลาหลเลยนะคะเนี่ย ★"
20034-CVGroup_UIEventLobby_Enter4-2 = "ฉันไม่ได้ไม่ชอบหรอกค่ะ"
20034-CVGroup_UIEventLobby_Enter4-3 = "แต่ก็มีหลายคนที่ไม่สะดวกกับเรื่องแบบนี้ค่ะ"
20034-CVGroup_UIEventLobby_Enter5-1 = "บรรยากาศปีใหม่กำลังจะจบแล้วสินะคะ"
20034-CVGroup_UIEventLobby_Enter5-2 = "โอเซจิอร่อยสุดๆ~ ไปเลยค่ะ★"
20034-CVGroup_UIEventLobby_Idle1-1 = "มีเรื่องอะไรเหรอคะคุณครู?"
20034-CVGroup_UIEventLobby_Idle2-1 = "ตายจริง แกล้งฉันเล่นเหรอคะ? คุณครู~?"
20034-CVGroup_UIEventLobby_Idle2-2 = "จะไหวเหรอคะ? พอดีการแก้แค้นของฉัน..."
20034-CVGroup_UIEventLobby_Idle2-3 = "อาจจะพิเศษ อยู่นิดหน่อยนะคะ"
20034-CVGroup_UIEventLobby_Idle3-1 = "คุณครูเบื่อเหรอคะ?"
20034-CVGroup_UIEventLobby_Idle3-2 = "ฉันสามารถทำให้คุณครูหายเบื่อได้นะคะ"
20034-CVGroup_UIEventLobby_Idle3-3 = "ว่ายังไงล่ะคะ...?"
20034-CVGroup_UIEventLobby_Idle4-1 = "คุณครูเนี่ย เจ้าเล่ห์จังนะคะ"
20034-CVGroup_UIEventLobby_Idle4-2 = "ค่ะ จับได้แล้วค่ะ★\nจากนี้ฉันไม่ปล่อยไปแน่ค่ะ~"

[translation]
16006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16006-CVGroup_CharacterGet_Idle1-1 = "ฤดูร้อน! ฤดูร้อนล่ะคุณครู!\nฤดูร้อนปีนี้ ไปกินของอร่อยๆ กับฉันให้เต็มที่กันเถอะ!"
16006-CVGroup_Cafe_Idle1-1 = "สิ่งที่ทำให้นึกถึงฤดูร้อน\nน้ำแข็งไส... ปลาอายุย่างเกลือ โซเม็ง อ่า...หิวจุง...!"
16006-CVGroup_Cafe_Idle2-1 = "ถ้าคราวหน้าได้ไปทะเลกับคุณครูละก็...\nฉันจะกินทาโกะยากิ 100 ลูกเลย!"
16006-CVGroup_Cafe_Idle3-1 = "ถ้าพูดถึงฤดูร้อนละก็~\nยากิโซบะ ซารุโซบะ... นากาชิโซเม็ง!"
16006-CVGroup_Cafe_Idle4-1 = "ที่นี่เย็นสบายจังดีจังเลย~"
16006-CVGroup_Cafe_Idle5-1 = "ชุดว่ายน้ำพร้อม! กล่องแช่เย็นพร้อม!\nเท่านี้ก็พร้อมสำหรับฤดูร้อนแล้ว!"
16006-CVGroup_WeaponGet_Idle1-1 = "อุปกรณ์สำหรับฤดูร้อน?!\nเตรียมมาให้ฉันโดยเฉพาะเลยเหรอ?!\nว้าววว~! ดีใจจัง~! ขอบคุณนะ!"
16006-CVGroup_UIEventShop_Enter1-1 = "อ๊ะ คุณครูนี่นา! เชิญเลย!\nยินดีต้อนรับสู่ร้านริมทะเล!"
16006-CVGroup_UIEventShop_Enter2-1 = "อ๊ะ คุณครู! กำลังรออยู่เลยล่ะ!"
16006-CVGroup_UIEventShop_Idle1-1 = "อื้อ! เชิญมองได้ตามสบายเลย ดูสิ!\nมีของอร่อยเยอะแยะเลย!"
16006-CVGroup_UIEventShop_Idle2-1 = "คือว่าคุณครู... นี่มัน...?"
16006-CVGroup_UIEventShop_Idle2-2 = "จริงๆ เลย~ บอกว่าให้ดูไอเทมในร้านไง\nไม่ได้ให้มามองฉันนะ~!"
16006-CVGroup_UIEventShop_Idle3-1 = "อื้อ!... ถึงจะอ้อนขนาดนั้น\nยังไงก็ให้ฟรีไม่ได้หรอกนะ"
16006-CVGroup_UIEventShop_Enter3-1 = "เราเปิดกิจการร้านริมทะเลผ่านมาได้ครึ่งทางแล้วล่ะนะ!\nมาใช้เวลาที่เหลือสนุกให้เต็มที่เถอะ!"
16006-CVGroup_UIEventShop_Enter4-1 = "ใกล้จะหมดแล้วล่ะ! พยายามเข้านะ!"
16006-CVGroup_UIEventShop_Enter5-1 = "วันนี้เปิดร้านวันสุดท้ายแล้วนะคุณครู\nเลือกของที่อยากได้ไปครบรึยัง?"
16006-CVGroup_UIEventShop_Enter6-1 = "ร้านปิดแล้วค่า~!\nขอบคุณที่มาอุดหนุนนะคะ!"
16006-CVGroup_UIEventShop_Enter6-2 = "...คิดอย่างนั้นเหรอ? ฮุฮุ ไม่ต้องห่วงนะ\nยังมีเวลาเหลืออยู่นิดหน่อย!"
16006-CVGroup_UIEventShop_Enter6-3 = "ตรวจสอบให้ดีด้วยล่ะ ว่าลืมอะไรรึเปล่า?"
16006-CVGroup_UIEventShop_Buy1-1 = "โอ้! สมกับเป็นคุณครูจริงๆ!"
16006-CVGroup_UIEventShop_Buy2-1 = "เลือกอันนั้นเหรอ? อื้อ! อาจจะใช้ได้ก็ได้นะ"

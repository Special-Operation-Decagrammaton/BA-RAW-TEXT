[translation]
16006-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
16006-CVGroup_CharacterGet_Idle1-1 = "夏天！是夏天唷老師！\n今年的夏天和我一起，去吃很多好吃的東西吧！"
16006-CVGroup_Cafe_Idle1-1 = "說到夏天的傳統就是，刨冰……素麵……\n鹽烤香魚……咻嚕……哈！？"
16006-CVGroup_Cafe_Idle2-1 = "下次，和老師去海邊的話……\n來吃100個章魚燒吧！"
16006-CVGroup_Cafe_Idle3-1 = "說到夏天的話就是……\n炒麵！蕎麥冷麵！流水麵！"
16006-CVGroup_Cafe_Idle4-1 = "這裡，好涼快好舒服～"
16006-CVGroup_Cafe_Idle5-1 = "泳衣的準備OK。\n冷藏箱也OK。\n夏天的準備很完美！"
16006-CVGroup_WeaponGet_Idle1-1 = "夏天的專用裝備！？\n為了我準備的嗎！？\n哇～！好開心，謝謝～！"
16006-CVGroup_UIEventShop_Enter1-1 = "啊，是老師！\n歡迎光臨！歡迎來到海之家！"
16006-CVGroup_UIEventShop_Enter2-1 = "啊，老師！\n我一直在等你！"
16006-CVGroup_UIEventShop_Idle1-1 = "盡情逛逛吧！\n因為也有美味的食物！"
16006-CVGroup_UIEventShop_Idle2-1 = "那個…老師，這個…嗯？"
16006-CVGroup_UIEventShop_Idle2-2 = "真是的～不要看我，看商品啦～！"
16006-CVGroup_UIEventShop_Idle3-1 = "唔唔…就，就算那樣一直戳我，也沒辦法免費給你唷？"
16006-CVGroup_UIEventShop_Enter3-1 = "海之家的營業時間也漸漸過了一半！\n要享受到最後一刻！"
16006-CVGroup_UIEventShop_Enter4-1 = "就要進入尾聲了耶！\n加油！"
16006-CVGroup_UIEventShop_Enter5-1 = "老師，今天是最後一天！\n想要的東西都拿了嗎？"
16006-CVGroup_UIEventShop_Enter6-1 = "營業結束，辛苦了～～！"
16006-CVGroup_UIEventShop_Enter6-2 = "你以為是這樣嗎？\n嘿嘿，其實，還剩下一點時間！"
16006-CVGroup_UIEventShop_Enter6-3 = "要不要確認一下有沒有忘記的東西？"
16006-CVGroup_UIEventShop_Buy1-1 = "噢噢！真不愧是老師！"
16006-CVGroup_UIEventShop_Buy2-1 = "要挑那個嗎？\n嗯！我覺得很好！"

[translation]
16006-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
16006-CVGroup_CharacterGet_Idle1-1 = "여름! 여름이야. 선생님!\n이번 여름엔 나랑 같이, 맛있는 거 잔뜩 먹으러 가자!"
16006-CVGroup_Cafe_Idle1-1 = "여름의 풍물시라면, 빙수… 소면… 은어 소금구이… 츄릅…… 핫?!"
16006-CVGroup_Cafe_Idle2-1 = "다음번에 선생님이랑 바다에 가면…… 타코야키 100개 먹기다앗…!"
16006-CVGroup_Cafe_Idle3-1 = "여름이라면 역시…… 야키소바, 자루소바, 나가시소멘!"
16006-CVGroup_Cafe_Idle4-1 = "여기는 시원해서 좋다아~"
16006-CVGroup_Cafe_Idle5-1 = "수영복 준비 오케이. 아이스박스 채우기 오케이. 여름 준비는 완벽해!"
16006-CVGroup_WeaponGet_Idle1-1 = "여름 전용 장비?! 날 위해 준비해준 거야?!\n우와아~! 기뻐라~! 고마워-!"
16006-CVGroup_UIEventShop_Enter1-1 = "앗, 선생님이다! 어서 오세요! 바다의 집에 잘 왔어-!"
16006-CVGroup_UIEventShop_Enter2-1 = "앗, 선생님! 기다리고 있었어!"
16006-CVGroup_UIEventShop_Idle1-1 = "응! 맘껏 둘러봐. 둘러봐! 맛있는 것도 많으니까!"
16006-CVGroup_UIEventShop_Idle2-1 = "저기 선생님, 이거… 응?"
16006-CVGroup_UIEventShop_Idle2-2 = "진짜~ 나 말고 상품을 보라구~!"
16006-CVGroup_UIEventShop_Idle3-1 = "우웅… 그, 그렇게 콕콕 찔러도, 공짜로 줄 순 없다구?"
16006-CVGroup_UIEventShop_Enter3-1 = "이 바다의 집 영업 기간도, 슬슬 절반이나 지났어! 마지막까지 즐겨야지!"
16006-CVGroup_UIEventShop_Enter4-1 = "곧 마지막이네! 힘내!"
16006-CVGroup_UIEventShop_Enter5-1 = "오늘이 마지막 날이야, 선생님! 갖고 싶은 건 다 챙겼어?"
16006-CVGroup_UIEventShop_Enter6-1 = "영업 종료, 수고하셨습니다~~!"
16006-CVGroup_UIEventShop_Enter6-2 = "…라고 생각했어? 후후, 실은 아직 조금 시간이 남았대!"
16006-CVGroup_UIEventShop_Enter6-3 = "잊은 물건이 없는지, 잘 확인해야 해?"
16006-CVGroup_UIEventShop_Buy1-1 = "오오-! 역시 선생님!"
16006-CVGroup_UIEventShop_Buy2-1 = "그걸로 고른 거야? 응! 좋을지도!"

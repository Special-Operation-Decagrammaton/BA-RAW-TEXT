[translation]
10098-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10098-CVGroup_CharacterGet_Idle1-1 = "이야~ 일이 커져 버렸네~ 이건… 아저씨가 나서지 않으면 안 되겠어."
10098-CVGroup_Cafe_Idle1-1 = "(엄폐물… 체크. 출입구… 체크.)"
10098-CVGroup_Cafe_Idle2-1 = "우선은 탄약부터 점검할까."
10098-CVGroup_Cafe_Idle3-1 = "으헤… 마음이 편치 않네…. 이럴 때는 선생이 보고 싶을지도…."
10098-CVGroup_Cafe_Idle4-1 = "이 헤어스타일, 편하긴 한데… 이상하게 보이지는 않으려나?"
10098-CVGroup_Cafe_Idle5-1 = "오늘은 낮잠 잘 생각이… 들지 않네."
10098-CVGroup_WeaponGet_Idle1-1 = "…아저씨의 힘이 필요하면, 언제든지 말해줘야 해?\n선생은, 언제나 최우선이니까."

[translation]
10019-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10019-CVGroup_CharacterGet_Idle1-1 = "시라스 아즈사. 트리니티 학원에 전학온 지는 얼마되지 않았어.\n특기는 단독 행동. 장점은 작아서 엄폐가 쉽다는 거 정도…일까.\n또 궁금한 거 있어?"
10019-CVGroup_Cafe_Idle1-1 = "흐음. 뭐, 나쁘지 않네."
10019-CVGroup_Cafe_Idle2-1 = "(신기한 게 많아…)"
10019-CVGroup_Cafe_Idle3-1 = "저건 뭘까?"
10019-CVGroup_Cafe_Idle4-1 = "후후. 재미있네."
10019-CVGroup_Cafe_Idle5-1 = "귀, 귀여워……!"
10019-CVGroup_WeaponGet_Idle1-1 = "이 힘을 어떻게 쓸지는 선생님이 정해줬으면 해.\n나는 지금… 선생님을 위해서 있는 거니까."

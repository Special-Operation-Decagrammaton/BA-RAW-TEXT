[translation]
10123-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10123-CVGroup_CharacterGet_Idle1-1 = "Were you waiting for me, Sensei? Fufu. No. I suppose I was the one who was waiting."
10123-CVGroup_Cafe_Idle1-1 = "It's cozier than I expected."
10123-CVGroup_Cafe_Idle2-1 = "I see... So this is what it's like here?"
10123-CVGroup_Cafe_Idle3-1 = "Oh, isn't that...?"
10123-CVGroup_Cafe_Idle4-1 = "Fufu, maybe I'll go talk to her."
10123-CVGroup_Cafe_Idle5-1 = "I feel like people are staring at me... Is it because of my outfit?"
10123-CVGroup_WeaponGet_Idle1-1 = "I did believe you'd at least try to stop me, but I see how you intend to play it. Fine, Sensei. If this is what you want... We'll stay together until the very end."
10123-CVGroup_UIEventLobby_Enter1-1 = "It's another cool day today."
10123-CVGroup_UIEventLobby_Enter1-2 = "...Is what one might say."
10123-CVGroup_UIEventLobby_Enter2-1 = "Allow me to guide you today."
10123-CVGroup_UIEventLobby_Enter3-1 = "That's youth for you."
10123-CVGroup_UIEventLobby_Enter3-2 = "Isn't that so?"
10123-CVGroup_UIEventLobby_Enter4-1 = "I won't let up on the pedal until the very end."
10123-CVGroup_UIEventLobby_Enter5-1 = "It's refreshing..."
10123-CVGroup_UIEventLobby_Enter5-2 = "...and bittersweet, all at the same time."
10123-CVGroup_UIEventLobby_Idle1-1 = "Say it aloud. Say it."
10123-CVGroup_UIEventLobby_Idle1-2 = "What are you so embarrassed for?"
10123-CVGroup_UIEventLobby_Idle2-1 = "Are you tickling me?"
10123-CVGroup_UIEventLobby_Idle2-2 = "Fufu. Anytime."
10123-CVGroup_UIEventLobby_Idle3-1 = "A different side of you..."
10123-CVGroup_UIEventLobby_Idle3-2 = "I'd like to see that too."
10123-CVGroup_UIEventLobby_Idle4-1 = "I dressed light..."
10123-CVGroup_UIEventLobby_Idle4-2 = "...because it's summer."

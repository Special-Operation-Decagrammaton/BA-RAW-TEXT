[translation]
10123-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10123-CVGroup_CharacterGet_Idle1-1 = "저를 기다리셨나요, 선생님? 후후. 아니죠. 기다린 건, 저겠네요."
10123-CVGroup_Cafe_Idle1-1 = "생각보다 아담한 장소네요."
10123-CVGroup_Cafe_Idle2-1 = "과연……. 여긴 이런 느낌이군요?"
10123-CVGroup_Cafe_Idle3-1 = "어라, 저 사람은……."
10123-CVGroup_Cafe_Idle4-1 = "후후, 가서 말이나 한번 걸어볼까요."
10123-CVGroup_Cafe_Idle5-1 = "시선이 느껴지는데……. 옷 때문일까요?"
10123-CVGroup_WeaponGet_Idle1-1 = "한 번은 말리실 줄 알았는데, 결국 이렇게 나오시는군요.\n좋습니다. 선생님이 원하신다면……. 끝까지 함께 가시죠."
10123-CVGroup_UIEventLobby_Enter1-1 = "오늘도 시원한 하루네요."
10123-CVGroup_UIEventLobby_Enter1-2 = "……말이 그렇다는 거예요."
10123-CVGroup_UIEventLobby_Enter2-1 = "지금부터는 제가 안내해 드리죠."
10123-CVGroup_UIEventLobby_Enter3-1 = "한창 즐거울 때네요."
10123-CVGroup_UIEventLobby_Enter3-2 = "그렇지 않나요?"
10123-CVGroup_UIEventLobby_Enter4-1 = "마지막까지 엑셀을 풀지 않을 거예요."
10123-CVGroup_UIEventLobby_Enter5-1 = "개운하기도 하고,"
10123-CVGroup_UIEventLobby_Enter5-2 = "섭섭하기도 하네요."
10123-CVGroup_UIEventLobby_Idle1-1 = "말로 하세요, 말로."
10123-CVGroup_UIEventLobby_Idle1-2 = "뭐가 그리 부끄러우신가요?"
10123-CVGroup_UIEventLobby_Idle2-1 = "간지럽히시는 건가요?"
10123-CVGroup_UIEventLobby_Idle2-2 = "후후. 환영이랍니다."
10123-CVGroup_UIEventLobby_Idle3-1 = "선생님의 또 다른 모습도……."
10123-CVGroup_UIEventLobby_Idle3-2 = "보고 싶네요."
10123-CVGroup_UIEventLobby_Idle4-1 = "여름이라 가볍게"
10123-CVGroup_UIEventLobby_Idle4-2 = "입은 것뿐이랍니다."

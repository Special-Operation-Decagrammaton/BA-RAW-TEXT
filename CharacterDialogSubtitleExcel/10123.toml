[translation]
10123-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10123-CVGroup_CharacterGet_Idle1-1 = "老師，讓你久等了嗎？\n呵呵，不對。真正在等待的人，是我才對。"
10123-CVGroup_Cafe_Idle1-1 = "是個比想像中更加雅致的場所呢。"
10123-CVGroup_Cafe_Idle2-1 = "原來如此……\n這裡，是這種氛圍嗎。"
10123-CVGroup_Cafe_Idle3-1 = "哎呀，那位是……"
10123-CVGroup_Cafe_Idle4-1 = "呵呵，試著搭話看看吧？"
10123-CVGroup_Cafe_Idle5-1 = "感覺到了視線……是服裝造成的嗎？"
10123-CVGroup_WeaponGet_Idle1-1 = "本來一度好奇是否會被阻止，結果你居然選擇這麼做啊。\n好吧。如果老師如此期望的話……就讓我陪伴你到最後一刻吧。"
10123-CVGroup_UIEventLobby_Enter1-1 = "今天也是平靜的一天呢。"
10123-CVGroup_UIEventLobby_Enter1-2 = "……這只是比喻而已。"
10123-CVGroup_UIEventLobby_Enter2-1 = "接下來就由我來引導。"
10123-CVGroup_UIEventLobby_Enter3-1 = "不覺得現在才是"
10123-CVGroup_UIEventLobby_Enter3-2 = "最有趣的時期嗎？"
10123-CVGroup_UIEventLobby_Enter4-1 = "直到最後，我都不會鬆開油門。"
10123-CVGroup_UIEventLobby_Enter5-1 = "雖然心情十分舒暢……"
10123-CVGroup_UIEventLobby_Enter5-2 = "卻也有股不捨的感覺呢。"
10123-CVGroup_UIEventLobby_Idle1-1 = "請用言語表達出來。用言語。"
10123-CVGroup_UIEventLobby_Idle1-2 = "是什麼讓你這麼害羞呢？"
10123-CVGroup_UIEventLobby_Idle2-1 = "要搔癢嗎？"
10123-CVGroup_UIEventLobby_Idle2-2 = "呵呵。是老師的話我非常歡迎。"
10123-CVGroup_UIEventLobby_Idle3-1 = "老師的另外一面……"
10123-CVGroup_UIEventLobby_Idle3-2 = "也想看看呢。"
10123-CVGroup_UIEventLobby_Idle4-1 = "只是因為是夏天，"
10123-CVGroup_UIEventLobby_Idle4-2 = "所以才會打扮的比較清涼。"

[translation]
10070-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10070-CVGroup_CharacterGet_Idle1-1 = "I am Konoe Mina, executive officer of Shanhaijing Academy's Genryumon. I'll take care of anything or anyone that gets in our way!"
10070-CVGroup_Cafe_Idle1-1 = "They say every lost ship needs a lighthouse to lean on. Ah... F-Forget I said that!"
10070-CVGroup_Cafe_Idle2-1 = "The scent of tea hangs in the air... I'm not good at making it, but it came out pretty good."
10070-CVGroup_Cafe_Idle3-1 = "A place where nothing moves, not even a muscle... That's what this place is."
10070-CVGroup_Cafe_Idle4-1 = "The cafes in Shanhaijing are more like tea houses..."
10070-CVGroup_Cafe_Idle5-1 = "It smells good... Maybe I should relax a bit."
10070-CVGroup_WeaponGet_Idle1-1 = "Amazing... It fits perfectly. Like it was mine all along. Heh heh. I'm all ready now. Shall we go?"
10070-CVGroup_UIEventLobby_Enter1-1 = "Sensei? Hurry over to Shanhaijing."
10070-CVGroup_UIEventLobby_Enter1-2 = "Oh, and I suggest you steer clear of the Black Tortoise Promenade."
10070-CVGroup_UIEventLobby_Enter2-1 = "This is Shanhaijing."
10070-CVGroup_UIEventLobby_Enter2-2 = "Heh. Don't let your eyes wander too much. I'd hate for you to get lost."
10070-CVGroup_UIEventLobby_Enter3-1 = "This must the be doing of the Black Tortoise Promenade."
10070-CVGroup_UIEventLobby_Enter3-2 = "I can tell that much at a glance."
10070-CVGroup_UIEventLobby_Enter4-1 = "How did this happen...?"
10070-CVGroup_UIEventLobby_Enter4-2 = "Ugh... I hate it when things get complicated...!"
10070-CVGroup_UIEventLobby_Enter5-1 = "What an ending...I never imagined..."
10070-CVGroup_UIEventLobby_Enter5-2 = "Well... I think things ended well. Good."
10070-CVGroup_UIEventLobby_Idle1-1 = "Oh? You got something to say? Go ahead."
10070-CVGroup_UIEventLobby_Idle1-2 = "There are some days when I just want to tell people what I really think."
10070-CVGroup_UIEventLobby_Idle2-1 = "Why?"
10070-CVGroup_UIEventLobby_Idle2-2 = "We've still got business to finish."
10070-CVGroup_UIEventLobby_Idle2-3 = "And even if it's dirty business...somebody's got to do it."
10070-CVGroup_UIEventLobby_Idle2-4 = "Wasn't that a cool line?"
10070-CVGroup_UIEventLobby_Idle3-1 = "Shanhaijing is noisier than usual."
10070-CVGroup_UIEventLobby_Idle3-2 = "Is it because you're here...?"
10070-CVGroup_UIEventLobby_Idle4-1 = "If there's action to be had, we'll be the first ones to act."
10070-CVGroup_UIEventLobby_Idle4-2 = "So let's go."
10070-CVGroup_UIEventMission_Enter1-1 = "Purpose. Duty. Operation. Mission. They all mean the same."
10070-CVGroup_UIEventMission_Enter1-2 = "Don't worry. We'll take this one at a time."
10070-CVGroup_UIEventMission_Enter2-1 = "When there are multiple missions, I take care of the simple ones first. That makes things go more smoothly."
10070-CVGroup_UIEventMission_Idle1-1 = "If you ever feel overwhelmed by your tasks, let me know right away."
10070-CVGroup_UIEventMission_Idle1-2 = "I will always be on your side, Sensei."
10070-CVGroup_UIEventMission_Idle2-1 = "This would have been difficult for even a Genryumon member... I'm surprised, Sensei."
10070-CVGroup_UIEventMission_Buy1-1 = "You really did it, Sensei! I knew I wasn't wrong about you."
10070-CVGroup_UIEventMission_Buy2-1 = "You've been taking on difficult missions like a pro."
10070-CVGroup_UIEventMission_Buy2-2 = "B-But...! Any Genryumon member can do that!"
10070-CVGroup_UIEventMission_Interaction1-1 = "I think that's it for today. I'll see you tomorrow, Sensei."

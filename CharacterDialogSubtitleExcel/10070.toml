[translation]
10070-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10070-CVGroup_CharacterGet_Idle1-1 = "我是山海經高級中學所屬，\n玄龍門的執行部長，近衛美奈。\n妨礙我等前進的事物，全部都由我來處理吧！"
10070-CVGroup_Cafe_Idle1-1 = "對迷路的船來說，作為依靠的燈塔是必要的。\n所以，老師…那個…果，果然還是請你假裝沒聽見吧！"
10070-CVGroup_Cafe_Idle2-1 = "有股清幽的茶香…\n雖然還不是很擅長，不過真不錯啊。"
10070-CVGroup_Cafe_Idle3-1 = "能夠感受到孤寂律動的地方…\n指的應該就是這裡吧。"
10070-CVGroup_Cafe_Idle4-1 = "山海經的咖啡廳\n其實比較接近茶館吧…"
10070-CVGroup_Cafe_Idle5-1 = "味道真香…\n稍微放鬆一下肩膀好了。"
10070-CVGroup_WeaponGet_Idle1-1 = "太棒了…實在太適合我了，簡直像從一開始就是我的一樣…\n呵，我準備好了。來，我們出發吧。"
10070-CVGroup_UIEventLobby_Enter1-1 = "是老師啊。歡迎來到山海經。"
10070-CVGroup_UIEventLobby_Enter1-2 = "啊啊，順帶一提……\n我不建議你去玄武商會哦。"
10070-CVGroup_UIEventLobby_Enter2-1 = "這裡就是山海經。"
10070-CVGroup_UIEventLobby_Enter2-2 = "呼。別一直東張西望，要是迷路我會很困擾的。"
10070-CVGroup_UIEventLobby_Enter3-1 = "這肯定是玄武商會那些傢伙幹的好事。"
10070-CVGroup_UIEventLobby_Enter3-2 = "這種程度的事，不用調查也知道。"
10070-CVGroup_UIEventLobby_Enter4-1 = "究竟為什麼會變成這樣呢……"
10070-CVGroup_UIEventLobby_Enter4-2 = "唔……我不擅長處理麻煩的事……！"
10070-CVGroup_UIEventLobby_Enter5-1 = "這種收尾方式，我連想都沒想過……"
10070-CVGroup_UIEventLobby_Enter5-2 = "總之，要說幸好事情圓滿落幕也沒錯。"
10070-CVGroup_UIEventLobby_Idle1-1 = "嗯？有什麼話想對我說嗎？\n──那，可以。"
10070-CVGroup_UIEventLobby_Idle1-2 = "畢竟人類……有時候就是會想叫一下別人的名字。"
10070-CVGroup_UIEventLobby_Idle2-1 = "怎麼了嗎？"
10070-CVGroup_UIEventLobby_Idle2-2 = "我們還有該做的事沒做完吧？"
10070-CVGroup_UIEventLobby_Idle2-3 = "即使那些是被他人稱為「惡」的事情也一樣……啊。"
10070-CVGroup_UIEventLobby_Idle2-4 = "──不覺得剛才那句台詞很帥嗎？"
10070-CVGroup_UIEventLobby_Idle3-1 = "山海經好像比平常更吵鬧啊。"
10070-CVGroup_UIEventLobby_Idle3-2 = "這也是因為老師在這裡的關係嗎……？"
10070-CVGroup_UIEventLobby_Idle4-1 = "每當有事件發生，最先出動的就是我們執行部。"
10070-CVGroup_UIEventLobby_Idle4-2 = "所以，出發吧。"
10070-CVGroup_UIEventMission_Enter1-1 = "目標、課題、任務、工作──全都是意義相同的詞彙。"
10070-CVGroup_UIEventMission_Enter1-2 = "別擔心，只要一樣一樣解決就行了。"
10070-CVGroup_UIEventMission_Enter2-1 = "同時有複數的任務時，要從簡單的任務開始處理。\n這樣一來各方面都會比較順利。"
10070-CVGroup_UIEventMission_Idle1-1 = "如果覺得每日任務太難，就立刻告訴我吧。"
10070-CVGroup_UIEventMission_Idle1-2 = "我永遠都會站在老師這一邊。"
10070-CVGroup_UIEventMission_Idle2-1 = "這些，即使對玄龍門的人來說都是有點難度的內容……\n老實說確實震驚到我了，老師。"
10070-CVGroup_UIEventMission_Buy1-1 = "竟然能夠完成，不愧是老師。我的眼光果然沒錯。"
10070-CVGroup_UIEventMission_Buy2-1 = "困難的任務也能順利解決。"
10070-CVGroup_UIEventMission_Buy2-2 = "但，但是……！這種程度，在玄龍門也不算什麼！"
10070-CVGroup_UIEventMission_Interaction1-1 = "今天的工作，這樣似乎就全部結束了呢。\n明天也拜託你了，老師。"

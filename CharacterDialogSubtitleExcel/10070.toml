[translation]
10070-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10070-CVGroup_CharacterGet_Idle1-1 = "ฉันคือโคโนเอะ มินะ หัวหน้าคณะกรรมการมังกรดำ\nสังกัดโรงเรียนมัธยมซานไห่จิง\nสิ่งที่ขัดขวางอนาคตของพวกเรา ฉันจะจัดการมันให้สิ้นซาก!"
10070-CVGroup_Cafe_Idle1-1 = "เรือหลงน่านน้ำย่อมต้องการประภาคารเอาไว้พึ่งพิง\nเพราะงั้นแล้ว ครู... เอ่อ... ถือซะว่าไม่ได้ยินอะไรละกัน!"
10070-CVGroup_Cafe_Idle2-1 = "กลิ่นชาอันหอมหวาน... ถึงฉันจะยังชงไม่ค่อยเก่ง\nแต่ก็ชงออกมาได้หอมดีทีเดียว"
10070-CVGroup_Cafe_Idle3-1 = "สถานที่ที่สัมผัสได้ถึงการเคลื่อนไหวอันสงบนิ่ง...\nคงหมายถึงที่แห่งนี้นี่ละ"
10070-CVGroup_Cafe_Idle4-1 = "คาเฟ่ของซานไห่จิง\nความจริงแล้วมันคล้ายกับร้านน้ำชามากกว่า..."
10070-CVGroup_Cafe_Idle5-1 = "กลิ่นหอมดี... ถ้างั้นผ่อนคลายลงอีกสักนิดดีมั้ยนะ..."
10070-CVGroup_WeaponGet_Idle1-1 = "เยี่ยมเลย... เหมาะมือมาก\nราวกับว่ามันเป็นของฉันมาตั้งแต่แรกเลย...\nฮุฮุ พร้อมแล้ว เอาละ ไปกันเลยมั้ย"
10070-CVGroup_UIEventLobby_Enter1-1 = "คุณครูเองเหรอ ขอต้อนรับสู่ซานไห่จิงนะ"
10070-CVGroup_UIEventLobby_Enter1-2 = "อ่า... ขอบอกไว้ก่อน...\nฉันไม่แนะนำให้ไปที่ย่านการค้าเทพเต่าดำนะ"
10070-CVGroup_UIEventLobby_Enter2-1 = "ที่นี่คือซานไห่จิงนะ"
10070-CVGroup_UIEventLobby_Enter2-2 = "เฮ้อ อย่ามัวแต่มองทางจนเพลินล่ะ\nถ้าหลงทางไปเดี๋ยวจะแย่เอา"
10070-CVGroup_UIEventLobby_Enter3-1 = "คงเป็นฝีมือของคนจากย่านการค้าเทพเต่าดำนั่นละ"
10070-CVGroup_UIEventLobby_Enter3-2 = "เรื่องแค่นี้น่ะ ไม่ต้องสืบให้เสียเวลา ก็รู้ได้อยู่แล้ว"
10070-CVGroup_UIEventLobby_Enter4-1 = "ทำไมถึงเป็นอย่างนี้ได้นะ..."
10070-CVGroup_UIEventLobby_Enter4-2 = "อึก... เรื่องวุ่นวายน่ะ น่าเบื่อชะมัด...!"
10070-CVGroup_UIEventLobby_Enter5-1 = "สุดท้ายก็จบแบบนี้งั้นเหรอ\nคิดไม่ถึงเลยทีเดียว..."
10070-CVGroup_UIEventLobby_Enter5-2 = "แต่ก็ค่อยยังชั่ว ดูเหมือนว่าจะผ่านไปได้ด้วยดี"
10070-CVGroup_UIEventLobby_Idle1-1 = "หืม? มีอะไรอยากจะพูดรึเปล่า? ถ้างั้นก็ดี..."
10070-CVGroup_UIEventLobby_Idle1-2 = "คนเราน่ะ...\nบางทีก็มีวันที่อยากจะเรียกชื่อเฉยๆ อยู่บ้าง"
10070-CVGroup_UIEventLobby_Idle2-1 = "มีอะไรเหรอ?"
10070-CVGroup_UIEventLobby_Idle2-2 = "น่าจะมีงานที่พวกเราต้องทำเหลืออยู่อีกนะ..."
10070-CVGroup_UIEventLobby_Idle2-3 = "ถึงแม้สิ่งนั้นจะเป็นสิ่งที่เรียกว่า \"ความร้ายกาจ\" ก็ตาม..."
10070-CVGroup_UIEventLobby_Idle2-4 = "ที่พูดไปเมื่อกี้มันเท่สุดๆ เลยว่ามั้ย"
10070-CVGroup_UIEventLobby_Idle3-1 = "ที่ซานไห่จิงดูครึกครื้นกว่าปกติ"
10070-CVGroup_UIEventLobby_Idle3-2 = "เป็นเพราะคุณครูมาที่นี่หรือเปล่านะ...?"
10070-CVGroup_UIEventLobby_Idle4-1 = "เวลาเกิดเหตุขึ้น กลุ่มที่เคลื่อนไหวก่อน\nก็คือคณะบริหารของเรานี่ละ"
10070-CVGroup_UIEventLobby_Idle4-2 = "เพราะงั้น ไปกันเถอะ"
10070-CVGroup_UIEventMission_Enter1-1 = "เป้าหมาย งาน หน้าที่ ภารกิจ...\nมันก็หมายถึงสิ่งเดียวกัน"
10070-CVGroup_UIEventMission_Enter1-2 = "ไม่ต้องห่วง ค่อยๆ จัดการไปทีละอย่างก็ได้"
10070-CVGroup_UIEventMission_Enter2-1 = "ตอนที่มีภารกิจเข้ามาหลายๆ อย่าง\nต้องเริ่มจัดการจากภารกิจง่ายๆ ก่อน\nทำแบบนั้นแล้วงานจะง่ายขึ้นเยอะเลย"
10070-CVGroup_UIEventMission_Idle1-1 = "เวลาที่รู้สึกว่าภารกิจมันยาก\nก็รีบบอกฉันเลยละ"
10070-CVGroup_UIEventMission_Idle1-2 = "ไม่ว่าเมื่อไร ฉันก็จะอยู่ข้างคุณครูเอง"
10070-CVGroup_UIEventMission_Idle2-1 = "นี่เป็นรายละเอียดที่ยากมาก...\nแม้แต่คนในสำนักมังกรดำเองก็ตาม\nบอกตามตรง ฉันตกใจจริงๆ นะ คุณครู"
10070-CVGroup_UIEventMission_Buy1-1 = "ทำงานนั้นสำเร็จแล้วเหรอ สมกับเป็น\nคุณครูจริงๆ ฉันมองคนไม่ผิดจริงด้วย"
10070-CVGroup_UIEventMission_Buy2-1 = "ถึงจะเป็นงานยากแต่ก็ทำได้ดีเลยละ"
10070-CVGroup_UIEventMission_Buy2-2 = "ตะ... แต่ว่า...! แค่นี้ก็ยังถือว่า\nธรรมดาสำหรับสำนักมังกรดำนะ!"
10070-CVGroup_UIEventMission_Interaction1-1 = "เท่านี้งานของวันนี้ก็เสร็จแล้วละ\nพรุ่งนี้ก็รบกวนด้วยนะ คุณครู"

[translation]
10070-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10070-CVGroup_CharacterGet_Idle1-1 = "산해경 고급중학교 소속 현룡문 집행부장 코노에 미나다.\n우리의 앞길을 막는 건, 모두 내가 처리하겠다!"
10070-CVGroup_Cafe_Idle1-1 = "길을 잃은 배에게는, 기댈 수 있는 등대가 필요하다. 그러니까, 선생님이… 그…\n역, 역시 못 들은 걸로 해줘!"
10070-CVGroup_Cafe_Idle2-1 = "향긋한 차향이다… 아직 잘하지는 못하지만, 좋군."
10070-CVGroup_Cafe_Idle3-1 = "정적인 움직임을 느끼는 장소란… 바로 이곳을 가리키는 것이겠지."
10070-CVGroup_Cafe_Idle4-1 = "산해경의 카페는, 실제로는 찻집에 가깝지…"
10070-CVGroup_Cafe_Idle5-1 = "향이 좋군… 조금, 어깨의 힘을 빼도록 할까."
10070-CVGroup_WeaponGet_Idle1-1 = "훌륭해… 딱 맞잖아. 마치 처음부터 내 것이었던 것 같군…\n후후, 준비는 됐다. 자, 가 볼까."
10070-CVGroup_UIEventLobby_Enter1-1 = "선생님인가. 어서 오라고. 산해경에."
10070-CVGroup_UIEventLobby_Enter1-2 = "아아, 참고로…… 현무상회에 가는 것은 추천하지 않아."
10070-CVGroup_UIEventLobby_Enter2-1 = "여기가 바로 산해경이야."
10070-CVGroup_UIEventLobby_Enter2-2 = "후. 너무 두리번거리지 말라고, 길을 잃어도 곤란하다."
10070-CVGroup_UIEventLobby_Enter3-1 = "현무상회 놈들의 짓이겠지."
10070-CVGroup_UIEventLobby_Enter3-2 = "이정도는, 조사하지 않아도 알 수 있어."
10070-CVGroup_UIEventLobby_Enter4-1 = "도대체 왜 이렇게 된 거지……"
10070-CVGroup_UIEventLobby_Enter4-2 = "크윽…… 복잡한 것은 질색이다……!"
10070-CVGroup_UIEventLobby_Enter5-1 = "이런 마무리라니, 생각도 못 했어……"
10070-CVGroup_UIEventLobby_Enter5-2 = "뭐, 잘 끝난 것 같아 다행이지만."
10070-CVGroup_UIEventLobby_Idle1-1 = "응? 뭐 하고 싶은 말이라도 있나? 그렇다면, 좋아."
10070-CVGroup_UIEventLobby_Idle1-2 = "사람에게는…… 그냥 이름을 부르고 싶어지는 날도 있는 법이니까."
10070-CVGroup_UIEventLobby_Idle2-1 = "왜 그러지?"
10070-CVGroup_UIEventLobby_Idle2-2 = "우리에게는 아직 해야 할 일이 남아 있을 텐데."
10070-CVGroup_UIEventLobby_Idle2-3 = "설령 그것이, 「악」이라고 불리는 것이라고 해도…… 말이다."
10070-CVGroup_UIEventLobby_Idle2-4 = "지금 대사, 멋있지 않았나."
10070-CVGroup_UIEventLobby_Idle3-1 = "평소보다 산해경이 소란스럽군."
10070-CVGroup_UIEventLobby_Idle3-2 = "이것도, 선생님이 있기 때문인가……?"
10070-CVGroup_UIEventLobby_Idle4-1 = "사건이 터지면 가장 먼저 움직이는 것이, 우리 집행부다."
10070-CVGroup_UIEventLobby_Idle4-2 = "그러니, 가자고."
10070-CVGroup_UIEventMission_Enter1-1 = "목적, 과제, 임무, 미션…… 모두 같은 뜻의 말이다."
10070-CVGroup_UIEventMission_Enter1-2 = "걱정 마, 하나씩 해 나가면 돼."
10070-CVGroup_UIEventMission_Enter2-1 = "복수의 임무가 있을 때에는, 일단 간단한 것부터 처리하지.\n그 편이 여러 가지로 순조롭거든."
10070-CVGroup_UIEventMission_Idle1-1 = "일과가 어렵다고 느껴진다면, 즉시 말해 달라고."
10070-CVGroup_UIEventMission_Idle1-2 = "언제든 선생님의 편이 되어 줄 테니까."
10070-CVGroup_UIEventMission_Idle2-1 = "이건, 현룡문에 속한 사람이어도 어려운 내용이었을 텐데……\n솔직히 놀랐어. 선생님."
10070-CVGroup_UIEventMission_Buy1-1 = "그걸 해내다니, 역시 선생님이군. 내 눈은 틀리지 않았어."
10070-CVGroup_UIEventMission_Buy2-1 = "어려운 임무도 잘 해 주고 있는데."
10070-CVGroup_UIEventMission_Buy2-2 = "다, 다만……! 이 정도는, 현룡문에서는 보통이다!"
10070-CVGroup_UIEventMission_Interaction1-1 = "오늘의 일정은 이것으로 끝인 것 같아. 내일도 잘 부탁하지. 선생님."

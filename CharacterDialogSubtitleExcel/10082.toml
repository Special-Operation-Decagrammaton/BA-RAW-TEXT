[translation]
10082-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10082-CVGroup_CharacterGet_Idle1-1 = "Fuwa Renge of Hyakkiyako, the Hyakkaryouran's Assault Squad Captain, reporting for duty! Together with Sensei, also known as Mentor, I'll pursue my youth! I look forward to working with you!"
10082-CVGroup_Cafe_Idle1-1 = "Wow, wow! So this is Schale! Look at everyone, basking in their youth."
10082-CVGroup_Cafe_Idle2-1 = "Hm, how should I pursue my youth?"
10082-CVGroup_Cafe_Idle3-1 = "I hope Yukari's taking care of herself..."
10082-CVGroup_Cafe_Idle4-1 = "Awesome! I wish our rooms were like this..."
10082-CVGroup_Cafe_Idle5-1 = "If there's a troublemaker... I'll discipline them for good."
10082-CVGroup_WeaponGet_Idle1-1 = "Is...this...? A legend of legends! It's the epitome of youth! *pant* I need to calm down... Thank you, Mentor! I'll treasure it!"

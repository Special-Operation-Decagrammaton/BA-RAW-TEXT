[translation]
10082-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10082-CVGroup_CharacterGet_Idle1-1 = "백귀야행 연합학원 소속, 백화요란 돌격대장 후와 렌게, 여기에 등장!\n선생님, 아니, 스승님을 돕는 일도 <청춘 활동>도. 전력을 다할 테니, 잘 부탁해!"
10082-CVGroup_Cafe_Idle1-1 = "우, 우와아, 이건… 이 녀석도, 저 녀석도 <청춘>을 즐기고 있네….\n이것이… 샬레…."
10082-CVGroup_Cafe_Idle2-1 = "으-음, 다음엔 어떤 <청춘 활동>을 할까…?"
10082-CVGroup_Cafe_Idle3-1 = "유카리 녀석, 제대로 얌전하게 잘하고 있으려나…."
10082-CVGroup_Cafe_Idle4-1 = "쾌적하네~ 우리 방도 이랬으면 좋겠는데…."
10082-CVGroup_Cafe_Idle5-1 = "만약 문제아가 있다면… 내가 근성을 뜯어고쳐 주겠어."
10082-CVGroup_WeaponGet_Idle1-1 = "이, 이건… 소문으로만 듣던 그…!\n<청춘>이라는 녀석이네……! 지, 진정하자…. 후우, 후우.\n고, 고마워. 스승님. …소중히 다룰게."

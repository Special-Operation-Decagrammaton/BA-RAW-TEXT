[translation]
10082-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10082-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行聯合學園所屬，百花繚亂的突擊隊長不破蓮華，在此登場！\n老師，不，無論是幫助師父還是「青春活動」我都會全力以赴，請多多指教！"
10082-CVGroup_Cafe_Idle1-1 = "唔，唔哇，這是…\n每個人都在謳歌著「青春」…\n這就是…夏萊…"
10082-CVGroup_Cafe_Idle2-1 = "唔嗯，下次要做什麼樣的「青春活動」好呢…？"
10082-CVGroup_Cafe_Idle3-1 = "紫那傢伙，有乖乖地好好表現嗎…"
10082-CVGroup_Cafe_Idle4-1 = "真舒服啊～\n要是我們的部室也這麼棒就好了…"
10082-CVGroup_Cafe_Idle5-1 = "萬一有問題學生…\n我會把他們的本性給改正回來。"
10082-CVGroup_WeaponGet_Idle1-1 = "這，這是……傳聞中的，那個……！？\n人稱「青春」的東西對吧……！\n先，先冷靜下來……呼，呼。\n謝，謝謝你，師父……我會好好珍惜。"

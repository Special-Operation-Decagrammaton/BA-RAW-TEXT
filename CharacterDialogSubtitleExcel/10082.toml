[translation]
10082-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10082-CVGroup_CharacterGet_Idle1-1 = "หัวหน้าหน่วยจู่โจมเฮียกกะเรียวรัน สหพันธ์เฮียกคิยาโค\nฟูวะ เรนเกะ ปรากฏตัวแล้ว! ฉันจะทุ่มเทกับทั้งการช่วยคุณครู\nไม่สิ ท่านอาจารย์ และกับกิจกรรมวัยรุ่นด้วย ขอฝากตัวด้วยนะ!"
10082-CVGroup_Cafe_Idle1-1 = "วะ... ว้าว ทั้งคนนั้นและคนนี้ ดูสนุกกับ\n<ชีวิตวัยรุ่น> กันใหญ่เลย นี่สินะ ชาเล่ต์..."
10082-CVGroup_Cafe_Idle2-1 = "อืม... ต่อไปจะทำ <กิจกรรมวัยรุ่น> อะไรดีนะ...?"
10082-CVGroup_Cafe_Idle3-1 = "ยัยยูคาริ ทำตัวเรียบร้อยอยู่รึเปล่านะ..."
10082-CVGroup_Cafe_Idle4-1 = "สดชื่นจังเลย~ ถ้าห้องของฉันเป็นแบบนี้บ้างก็ดีน่ะสิ..."
10082-CVGroup_Cafe_Idle5-1 = "ถ้ามีพวกเด็กเกเรโผล่มา...\nฉันจะเรียกมาปรับทัศนคติให้ดู"
10082-CVGroup_WeaponGet_Idle1-1 = "นะ... นี่มัน... เจ้า <วัยรุ่น>...! ที่เคยได้ยินแค่ในข่าวลือนี่นา...!\nจะ... ใจเย็นๆ ก่อน... ฮู่ว ฮู่ว... ขะ... ขอบคุณนะ ท่านอาจารย์\nฉันจะรักษาไว้อย่างดีเลย"

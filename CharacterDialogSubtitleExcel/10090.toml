[translation]
10090-CVGroup_UITitle_Idle1-1 = "블루 아카이브"
10090-CVGroup_CharacterGet_Idle1-1 = "안녕하세요, 선생님.\n백귀야행연합학원 소속 마츠리운영관리부의 사토하마…… 우미카입니다. 축제, 좋아하세요?"
10090-CVGroup_Cafe_Idle1-1 = "카페 축제라는 걸, 제안해 볼까……?"
10090-CVGroup_Cafe_Idle2-1 = "사람들이 많이 돌아다니네…… 흠, 흐음……"
10090-CVGroup_Cafe_Idle3-1 = "이대로도 충분히 좋은 곳이지만. 뭔가를 조금만 더한다면……"
10090-CVGroup_Cafe_Idle4-1 = "사장님이라면 어떻게 생각하실까……"
10090-CVGroup_Cafe_Idle5-1 = "기모노풍 바니걸은 좀……"
10090-CVGroup_WeaponGet_Idle1-1 = "저… 그게…… 감사, 합니다. 선생님!\n아으으, 이런 걸 받을 수 있을 거라고는 생각도 못 하고 있었어서……\n저, 열심히 할게요. 앞으로도 지켜봐 주세요!"
10090-CVGroup_UIEventLobby_Enter1-1 = "(당, 당황하지 마, 당황하지 마……!)"
10090-CVGroup_UIEventLobby_Enter1-2 = "선생님, 여러분! 백귀야행에 오신 것을 환영합니다!"
10090-CVGroup_UIEventLobby_Enter2-1 = "백귀야행에서, 최고의 추억을 남기실 수 있도록!"
10090-CVGroup_UIEventLobby_Enter2-2 = "사토하마 우미카, 최선을 다하겠습니다!"
10090-CVGroup_UIEventLobby_Enter2-3 = "선생님…… 지금 저, 괜찮았죠……?"
10090-CVGroup_UIEventLobby_Enter3-1 = "으우우…… 일정이 너무 어긋나지 않았으면 좋겠네요……"
10090-CVGroup_UIEventLobby_Enter3-2 = "무, 물론 그걸 되돌리는 것도 저의 일이겠지만요!"
10090-CVGroup_UIEventLobby_Enter4-1 = "망량즈…… 요 말썽꾸러기들……!"
10090-CVGroup_UIEventLobby_Enter4-2 = "그래도…… 축제를 좋아하는 아이들 중에, 나쁜 아이는 없을 테니까요."
10090-CVGroup_UIEventLobby_Enter4-3 = "……그렇겠죠, 선생님?"
10090-CVGroup_UIEventLobby_Enter5-1 = "아, 선생님! 마지막까지 함께 해 주셔서 정말 감사드려요."
10090-CVGroup_UIEventLobby_Enter5-2 = "선생님이 계셔 주셔서, 정말로 다행이에요!"
10090-CVGroup_UIEventLobby_Idle1-1 = "저, 잘 해낼 수 있을까요? 잘 하고 있는 걸까요……?"
10090-CVGroup_UIEventLobby_Idle1-2 = "으우우…… 그렇다고 말씀해 주셔서 감사해요……"
10090-CVGroup_UIEventLobby_Idle2-1 = "역시…… 모든 것을 축제로 만들어 버리면……!"
10090-CVGroup_UIEventLobby_Idle2-2 = "네? 지금은 뭔가 축제 괴인 같은 대사였다고요? 그런……"
10090-CVGroup_UIEventLobby_Idle2-3 = "아뇨, 잠깐만요. 축제 괴인…… 이걸 또 소재로 삼아서……"
10090-CVGroup_UIEventLobby_Idle3-1 = "함께라면 어떤 것도 두렵지 않다고 하죠."
10090-CVGroup_UIEventLobby_Idle3-2 = "그렇다고 할까, 일의 준비란 건 다 같이 힘을 합쳐야,"
10090-CVGroup_UIEventLobby_Idle3-3 = "간신히 마감 안에 끝낼 수 있는 것이니까요."
10090-CVGroup_UIEventLobby_Idle4-1 = "다음에 또…… 백귀야행에 와주세요."
10090-CVGroup_UIEventLobby_Idle4-2 = "그땐 정말 멋지고 대단한 축제를 보여드릴게요!"
10090-CVGroup_UIEventShop_Enter1-1 = "아, 선생님!"
10090-CVGroup_UIEventShop_Enter1-2 = "에헤헤. 맞아요. 수학여행 특별 상점이랍니다."
10090-CVGroup_UIEventShop_Enter1-3 = "마음껏 둘러보고 가세요!"
10090-CVGroup_UIEventShop_Enter2-1 = "마음에 드신 물건이 있으신가요?"
10090-CVGroup_UIEventShop_Enter2-2 = "아니면 필요하신 물건이 있으신가요?"
10090-CVGroup_UIEventShop_Enter2-3 = "뭐든 말씀만 해 주세요!"
10090-CVGroup_UIEventShop_Enter3-1 = "수학여행 상점의 영업은 종료되었어요……"
10090-CVGroup_UIEventShop_Enter3-2 = "하지만 백귀야행의 축제는 이제부터랍니다!"
10090-CVGroup_UIEventShop_Idle1-1 = "네? 네. 괜찮아요. 유통, 관리, 영업."
10090-CVGroup_UIEventShop_Idle1-2 = "사장님 옆에서 백야당을 같이 운영했어서요."
10090-CVGroup_UIEventShop_Idle1-3 = "자연스럽게 배웠어요."
10090-CVGroup_UIEventShop_Idle2-1 = "그렇게 힘들지는 않아요. 익숙한걸요."
10090-CVGroup_UIEventShop_Idle2-2 = "그래도 선생님께서 와 주시니까…… 좋네요. 에헤헤."
10090-CVGroup_UIEventShop_Buy1-1 = "그것으로 하시겠어요? 감사합니다!"
10090-CVGroup_UIEventShop_Buy2-1 = "네, 그거 좋은 선택이네요!"
10090-CVGroup_UIEventShop_Buy3-1 = "와아! 저 같아도 그걸 골랐을 것 같네요!"
10090-CVGroup_UIEventShop_Buy4-1 = "이용해 주셔서 감사해요. 에헤헤."

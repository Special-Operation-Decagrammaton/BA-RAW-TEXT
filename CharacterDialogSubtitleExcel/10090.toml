[translation]
10090-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10090-CVGroup_CharacterGet_Idle1-1 = "Greetings, Sensei. I'm Satohama Umika from the Allied Hyakkiyako Academy Festival Operations Department. Do you enjoy festivals?"
10090-CVGroup_Cafe_Idle1-1 = "Hmm, what if I suggested something like a Cafe Festival...?"
10090-CVGroup_Cafe_Idle2-1 = "There are so many people out and about... Hm...hmm..."
10090-CVGroup_Cafe_Idle3-1 = "While it's already a great place, how about we add a little something extra..."
10090-CVGroup_Cafe_Idle4-1 = "How would the boss feel about it?"
10090-CVGroup_Cafe_Idle5-1 = "A bunny girl in a kimono is a bit much..."
10090-CVGroup_WeaponGet_Idle1-1 = "Um...thank you, Sensei! Wow, I never thought I'd get something like this... Please continue to watch over me! I won't let you down."
10090-CVGroup_UIEventLobby_Enter1-1 = "(D-Don't panic. Don't panic!)"
10090-CVGroup_UIEventLobby_Enter1-2 = "Sensei! Everyone! Welcome to Hyakkiyako!"
10090-CVGroup_UIEventLobby_Enter2-1 = "May you leave Hyakkiyako with many cherished memories!"
10090-CVGroup_UIEventLobby_Enter2-2 = "This is Satohama Umika here. I will give it my all!"
10090-CVGroup_UIEventLobby_Enter2-3 = "I didn't do too bad just now, did I?"
10090-CVGroup_UIEventLobby_Enter3-1 = "Ugh...I hope the schedule doesn't get too messed up..."
10090-CVGroup_UIEventLobby_Enter3-2 = "W-Well, it's my job to fix that too!"
10090-CVGroup_UIEventLobby_Enter4-1 = "Mouryo... You troublemakers!"
10090-CVGroup_UIEventLobby_Enter4-2 = "Still...any kid who enjoys festivals isn't a bad one."
10090-CVGroup_UIEventLobby_Enter4-3 = "...Isn't that right, Sensei?"
10090-CVGroup_UIEventLobby_Enter5-1 = "Oh, Sensei! Thank you so much for staying with us until the end."
10090-CVGroup_UIEventLobby_Enter5-2 = "I'm so grateful to have you here!"
10090-CVGroup_UIEventLobby_Idle1-1 = "How am I doing? Did I do good?"
10090-CVGroup_UIEventLobby_Idle1-2 = "Wow... Thank you for that. I really appreciate it..."
10090-CVGroup_UIEventLobby_Idle2-1 = "Of course... If I turn everything into a festival—!"
10090-CVGroup_UIEventLobby_Idle2-2 = "Huh? I sounded like some kind of festival fiend just now? How?"
10090-CVGroup_UIEventLobby_Idle2-3 = "Oh, wait a minute. A festival fiend... I could use that as inspiration..."
10090-CVGroup_UIEventLobby_Idle3-1 = "If we work together, we've got nothing to fear!"
10090-CVGroup_UIEventLobby_Idle3-2 = "Or so they say. When it comes to work prep, everyone HAS to work together."
10090-CVGroup_UIEventLobby_Idle3-3 = "That's the only way we'll be able to finish it before the deadline."
10090-CVGroup_UIEventLobby_Idle4-1 = "Please come again...to Hyakkiyako."
10090-CVGroup_UIEventLobby_Idle4-2 = "Next time, I'll show you a truly spectacular festival!"
10090-CVGroup_UIEventShop_Enter1-1 = "Ah, Sensei!"
10090-CVGroup_UIEventShop_Enter1-2 = "Heeheehee. That's right. It's the special field trip store."
10090-CVGroup_UIEventShop_Enter1-3 = "Feel free to explore as you like!"
10090-CVGroup_UIEventShop_Enter2-1 = "Anything catch your eye?"
10090-CVGroup_UIEventShop_Enter2-2 = "Or is there something you need?"
10090-CVGroup_UIEventShop_Enter2-3 = "Whatever it is, just let me know!"
10090-CVGroup_UIEventShop_Enter3-1 = "The field trip shop is now closed..."
10090-CVGroup_UIEventShop_Enter3-2 = "But the Hyakkiyako festival has just begun!"
10090-CVGroup_UIEventShop_Idle1-1 = "Huh? Yes, that's fine. Distribution, management, sales, I can handle it all."
10090-CVGroup_UIEventShop_Idle1-2 = "I ran Momoyodou alongside the boss, you see."
10090-CVGroup_UIEventShop_Idle1-3 = "So I just picked those skills up naturally."
10090-CVGroup_UIEventShop_Idle2-1 = "The work's not hard. I'm used to it by now."
10090-CVGroup_UIEventShop_Idle2-2 = "Anyway, it's really nice to have you here, Sensei. Heeheehee."
10090-CVGroup_UIEventShop_Buy1-1 = "You want to go with that? Thank you!"
10090-CVGroup_UIEventShop_Buy2-1 = "Yes, that's a great choice!"
10090-CVGroup_UIEventShop_Buy3-1 = "Wow! I wanted that one too!"
10090-CVGroup_UIEventShop_Buy4-1 = "Thank you for your business. Heeheehee."

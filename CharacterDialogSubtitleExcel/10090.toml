[translation]
10090-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10090-CVGroup_CharacterGet_Idle1-1 = "สวัสดีค่ะคุณครู\nฉัน ซาโตฮามะ อุมิกะ จากชมรมจัดงานเทศกาล...\nสังกัดสหพันธ์เฮียกคิยาโคค่ะ คุณครูชอบงานเทศกาลมั้ยคะ?"
10090-CVGroup_Cafe_Idle1-1 = "ลองเสนอให้จัดเทศกาลคาเฟ่ดูดีมั้ยนะ...?"
10090-CVGroup_Cafe_Idle2-1 = "ผู้คนเดินกัน ขวักไขว่เลยแฮะ... อืม... ฮืม..."
10090-CVGroup_Cafe_Idle3-1 = "แบบนี้ก็ถือว่าเป็นสถานที่ที่ใช้ได้อยู่นะ\nแต่ถ้าเพิ่มอะไรนิดหน่อย..."
10090-CVGroup_Cafe_Idle4-1 = "ถ้าเป็นท่านประธานจะคิดอย่างไรนะ..."
10090-CVGroup_Cafe_Idle5-1 = "บันนี่เกิร์ลในชุดกิโมโนมันออกจะ..."
10090-CVGroup_WeaponGet_Idle1-1 = "อ่า... คือว่า... ขอบคุณ... นะคะ... คุณครู!\nอึก... ฉันไม่คิดเลยค่ะว่าจะได้อะไรแบบนี้ด้วย...\nฉัน... จะตั้งใจทำเต็มที่ค่ะ ช่วยเฝ้าดูฉันด้วยนะคะ!"
10090-CVGroup_UIEventLobby_Enter1-1 = "(ยะ... อย่าตกใจนะ อย่าตกใจ...!)"
10090-CVGroup_UIEventLobby_Enter1-2 = "คุณครู ทุกคน! ยินดีต้อนรับสู่เฮียกคิยาโคค่ะ"
10090-CVGroup_UIEventLobby_Enter2-1 = "เพื่อให้ทุกคนมีความทรงจำที่ดีที่สุดในเฮียกคิยาโค!"
10090-CVGroup_UIEventLobby_Enter2-2 = "ซาโตฮามะ อุมิกะจะพยายามอย่างเต็มที่ค่ะ!"
10090-CVGroup_UIEventLobby_Enter2-3 = "คุณครู... ตอนนี้ฉันจะ... ไม่เป็นไรใช่มั้ยคะ...?"
10090-CVGroup_UIEventLobby_Enter3-1 = "ฮือ... หวังว่ากำหนดการจะไม่คลาดเคลื่อนมากเกินนะคะ"
10090-CVGroup_UIEventLobby_Enter3-2 = "ตะ... แต่ก็แน่นอนว่าการจัดการปัญหาคืองานของฉันค่ะ!"
10090-CVGroup_UIEventLobby_Enter4-1 = "พวกปีศาจ... พวกตัวปัญหา...!"
10090-CVGroup_UIEventLobby_Enter4-2 = "แต่ถึงยังไง... ในหมู่เด็กที่ชอบงานเทศกาลก็ไม่มีเด็กไม่ดีค่ะ"
10090-CVGroup_UIEventLobby_Enter4-3 = "ใช่มั้ยคะ... คุณครู?"
10090-CVGroup_UIEventLobby_Enter5-1 = "อ๊ะ คุณครู! ขอบคุณที่อยู่ช่วยจนถึงจบงานเลยนะคะ"
10090-CVGroup_UIEventLobby_Enter5-2 = "โชคดีจริงๆ ค่ะ ที่มีคุณครูอยู่ด้วย!"
10090-CVGroup_UIEventLobby_Idle1-1 = "ฉัน... จะทำออกมาได้ดีมั้ยคะ?\nฉันกำลังทำได้ดีหรือเปล่าคะ...?"
10090-CVGroup_UIEventLobby_Idle1-2 = "อ่า... ขอบคุณนะคะที่ช่วยพูดอย่างนั้น..."
10090-CVGroup_UIEventLobby_Idle2-1 = "ถ้าทำให้ทุกอย่างเป็นงานเทศกาลละก็...!"
10090-CVGroup_UIEventLobby_Idle2-2 = "คะ? เหมือนบทพูดของคนบ้างานเทศกาลงั้นเหรอคะ? อะไรกัน..."
10090-CVGroup_UIEventLobby_Idle2-3 = "ไม่สิ เดี๋ยวนะคะ คนบ้างานเทศกาล... งั้นขอเอาอันนี้เป็นแรงบันดาลใจ..."
10090-CVGroup_UIEventLobby_Idle3-1 = "ถ้าอยู่ด้วยกันแล้ว ก็ไม่มีอะไรต้องกลัวค่ะ"
10090-CVGroup_UIEventLobby_Idle3-2 = "จะว่าอย่างนี้ได้มั้ยนะ เพราะการเตรียมงาน คือการต้องร่วมมือกัน"
10090-CVGroup_UIEventLobby_Idle3-3 = "เพื่อทำออกมาให้เสร็จภายในเวลาที่กำหนดค่ะ"
10090-CVGroup_UIEventLobby_Idle4-1 = "ไว้คราวหน้าก็... มาที่เฮียกคิยาโคอีกนะคะ"
10090-CVGroup_UIEventLobby_Idle4-2 = "ตอนนั้นฉันจะทำให้ได้เห็นงานเทศกาลที่ยอดเยี่ยมเลยละค่ะ!"
10090-CVGroup_UIEventShop_Enter1-1 = "อ๊ะ คุณครู!"
10090-CVGroup_UIEventShop_Enter1-2 = "ฮิฮิๆ ใช่แล้วค่ะ นี่คือร้านค้าพิเศษของการทัศนศึกษา"
10090-CVGroup_UIEventShop_Enter1-3 = "ค่อยๆ ดูของตามใจเลยนะคะ!"
10090-CVGroup_UIEventShop_Enter2-1 = "มีของชิ้นไหนที่ถูกใจมั้ยคะ?"
10090-CVGroup_UIEventShop_Enter2-2 = "หรือว่ามีของอะไรที่อยากได้หรือเปล่าคะ?"
10090-CVGroup_UIEventShop_Enter2-3 = "บอกฉันได้ทุกอย่างเลยค่ะ!"
10090-CVGroup_UIEventShop_Enter3-1 = "ร้านค้าทัศนศึกษาปิดลงแล้วค่ะ..."
10090-CVGroup_UIEventShop_Enter3-2 = "แต่งานเทศกาลของเฮียกคิยาโคจะเริ่มตั้งแต่ตอนนี้นะคะ!"
10090-CVGroup_UIEventShop_Idle1-1 = "คะ? ค่ะ ไม่เป็นไรค่ะ\nทั้งการกระจายของ การจัดการ การค้าขาย"
10090-CVGroup_UIEventShop_Idle1-2 = "ฉันได้ดูแลร้านเฮียกคิยาโคกับท่านประธาน"
10090-CVGroup_UIEventShop_Idle1-3 = "เลยได้เรียนรู้มาด้วยค่ะ"
10090-CVGroup_UIEventShop_Idle2-1 = "ไม่ได้ลำบากขนาดนั้นหรอกค่ะ ฉันชินแล้วน่ะค่ะ"
10090-CVGroup_UIEventShop_Idle2-2 = "แต่พอมีคุณครูมาที่นี่ด้วย... ก็ดีจังเลยนะคะ แหะๆๆ"
10090-CVGroup_UIEventShop_Buy1-1 = "จะเอาอันนั้นเหรอคะ? ขอบคุณค่ะ!"
10090-CVGroup_UIEventShop_Buy2-1 = "ค่า! เลือกได้ดีเลยค่ะ!"
10090-CVGroup_UIEventShop_Buy3-1 = "ว้าว! ถ้าเป็นฉันก็คงเลือกอันเดียวกันค่ะ!"
10090-CVGroup_UIEventShop_Buy4-1 = "ขอบคุณที่มาอุดหนุนนะคะ ฮิฮิฮิ"

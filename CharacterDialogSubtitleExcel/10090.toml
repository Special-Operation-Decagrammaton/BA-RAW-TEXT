[translation]
10090-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10090-CVGroup_CharacterGet_Idle1-1 = "你好，老師。我是百鬼夜行聯合學園所屬，\n節慶營運管理部的里浜……海花。\n你喜歡慶典嗎？"
10090-CVGroup_Cafe_Idle1-1 = "咖啡廳慶典，\n要不要提案看看……？"
10090-CVGroup_Cafe_Idle2-1 = "有很多人走來走去……\n 呼呣，呼呣呣……"
10090-CVGroup_Cafe_Idle3-1 = "雖然這樣也已經是個很好的地方，\n但感覺再加上一些東西的話……"
10090-CVGroup_Cafe_Idle4-1 = "如果是社長會怎麼想呢……"
10090-CVGroup_Cafe_Idle5-1 = "和服風格的兔女郎有點……"
10090-CVGroup_WeaponGet_Idle1-1 = "那個……就是……非常謝謝你。老師！\n啊嗚嗚，因為我沒想到居然能收到這種東西……\n我會努力的，以後也請守望著我！"
10090-CVGroup_UIEventLobby_Enter1-1 = "（別，別慌張，別慌張……！）"
10090-CVGroup_UIEventLobby_Enter1-2 = "老師，各位！歡迎來到百鬼夜行！"
10090-CVGroup_UIEventLobby_Enter2-1 = "為了讓大家在百鬼夜行，能夠留下最棒的回憶！"
10090-CVGroup_UIEventLobby_Enter2-2 = "里浜海花，會全力以赴的！"
10090-CVGroup_UIEventLobby_Enter2-3 = "老師……我現在還可以吧……？"
10090-CVGroup_UIEventLobby_Enter3-1 = "嗚嗚嗚……希望行程不要差太多……"
10090-CVGroup_UIEventLobby_Enter3-2 = "當，當然修正也是我的工作！"
10090-CVGroup_UIEventLobby_Enter4-1 = "都怪妖怪劇團……！"
10090-CVGroup_UIEventLobby_Enter4-2 = "但是……喜歡慶典的孩子裡，不會有壞孩子。"
10090-CVGroup_UIEventLobby_Enter4-3 = "……對吧，老師？"
10090-CVGroup_UIEventLobby_Enter5-1 = "啊，老師！\n願意陪到最後，真的非常感謝。"
10090-CVGroup_UIEventLobby_Enter5-2 = "能有老師在，真是太好了！"
10090-CVGroup_UIEventLobby_Idle1-1 = "我，能做得好嗎？\n我現在做得好嗎……？"
10090-CVGroup_UIEventLobby_Idle1-2 = "嗚嗚嗚……謝謝你能這麼說……"
10090-CVGroup_UIEventLobby_Idle2-1 = "果然……只要將一切都變成慶典的話……！"
10090-CVGroup_UIEventLobby_Idle2-2 = "咦？剛才那句有點像慶典怪人會說的話？怎麼會……"
10090-CVGroup_UIEventLobby_Idle2-3 = "不，請等一下。\n慶典怪人……可以用這個為題材……"
10090-CVGroup_UIEventLobby_Idle3-1 = "有句話說只要一起，什麼都不可怕。"
10090-CVGroup_UIEventLobby_Idle3-2 = "雖然如此，但工作的準備是要大家齊心協力，"
10090-CVGroup_UIEventLobby_Idle3-3 = "才能勉強在期限內完成的事。"
10090-CVGroup_UIEventLobby_Idle4-1 = "下次……請再到百鬼夜行來吧。"
10090-CVGroup_UIEventLobby_Idle4-2 = "到時候再讓你看看真正出色又優秀的慶典哦！"
10090-CVGroup_UIEventShop_Enter1-1 = "啊，老師……！"
10090-CVGroup_UIEventShop_Enter1-2 = "耶嘿嘿。沒錯。\n這是修學旅行的特別商店。"
10090-CVGroup_UIEventShop_Enter1-3 = "請盡情參觀選購！"
10090-CVGroup_UIEventShop_Enter2-1 = "有喜歡的東西嗎？"
10090-CVGroup_UIEventShop_Enter2-2 = "還是有什麼需要的東西？"
10090-CVGroup_UIEventShop_Enter2-3 = "請儘管跟我說吧！"
10090-CVGroup_UIEventShop_Enter3-1 = "修學旅行商店的營業結束了……"
10090-CVGroup_UIEventShop_Enter3-2 = "但是百鬼夜行的慶典現在才要開始！"
10090-CVGroup_UIEventShop_Idle1-1 = "嗯？嗯，沒問題的。\n流通、管理、營業。"
10090-CVGroup_UIEventShop_Idle1-2 = "因為在社長身邊一起經營著百夜堂。"
10090-CVGroup_UIEventShop_Idle1-3 = "自然而然就學會了。"
10090-CVGroup_UIEventShop_Idle2-1 = "並沒有那麼辛苦。我已經習慣了。"
10090-CVGroup_UIEventShop_Idle2-2 = "不過如果老師能來……就好了呢。耶嘿嘿。"
10090-CVGroup_UIEventShop_Buy1-1 = "要那個嗎？謝謝惠顧！"
10090-CVGroup_UIEventShop_Buy2-1 = "嗯，那是個好選擇！"
10090-CVGroup_UIEventShop_Buy3-1 = "哇啊！我想我應該也會選那個！"
10090-CVGroup_UIEventShop_Buy4-1 = "感謝您的使用。耶嘿嘿。"

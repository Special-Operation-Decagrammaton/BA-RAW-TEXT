[translation]
10097-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT 3 มาถึงที่หมายแล้ว~\nฮิฮิฮิ... ถ้าอยู่ในทะเลคงใช้ระเบิดได้ตามใจเลยสินะ?"
10097-CVGroup_Cafe_Idle1-1 = "ระเบิดมือหล่นอยู่ตรงไหนหรือเปล่านะ..."
10097-CVGroup_Cafe_Idle2-1 = "เฮ้อ... เหนื่อยจัง..."
10097-CVGroup_Cafe_Idle3-1 = "กลิ่นแห่งความพินาศ..."
10097-CVGroup_Cafe_Idle4-1 = "ฮิฮิฮิ... ปุ่มนี้เชื่อมต่อกับอะไรนะ..."
10097-CVGroup_Cafe_Idle5-1 = "ไฟร์วอลล์ของคาเฟ่นี้ป้องกันได้ดีชะมัดเลย..."
10097-CVGroup_WeaponGet_Idle1-1 = "รับ RABBIT Type 224 Pistol มาเรียบร้อย\nจะว่าไป งานของฉันไม่ต้องลงน้ำ\nแต่ต้องทำให้ปืนกันน้ำด้วยเหรอ? ขี้เกียจจัง..."
10097-CVGroup_UIEventLobby_Enter1-1 = "ที่นี่คือหมู่บ้านยาโตอูระที่โด่งดังเรื่องแหล่งกำเนิดกุ้ง..."
10097-CVGroup_UIEventLobby_Enter1-2 = "เพิ่งเคยมาครั้งแรกเลยนะเนี่ย"
10097-CVGroup_UIEventLobby_Enter2-1 = "มีเรื่องอะไรเกิดขึ้นในหมู่บ้านนี้กันนะ"
10097-CVGroup_UIEventLobby_Enter3-1 = "เรื่องตัวตนแห่งห้วงลึกน่ะ..."
10097-CVGroup_UIEventLobby_Enter3-2 = "ถ้าข่าวลือนั่นเป็นความจริง\nมันจะทนระเบิดลูกมหึมาได้มั้ยนะ?"
10097-CVGroup_UIEventLobby_Enter4-1 = "คูซายะนั่นน่ะ แค่หมักก็มีกลิ่นแรงขนาดนั้นเลยเหรอ?"
10097-CVGroup_UIEventLobby_Enter4-2 = "อยากลองทำดูสักครั้งจัง... ฮิฮิฮิ"
10097-CVGroup_UIEventLobby_Enter5-1 = "ฮุฮุ ทีนี้..."
10097-CVGroup_UIEventLobby_Enter5-2 = "จะได้ชิมแซนด์วิชกุ้งโหระพาอร่อยๆ อีกรอบมั้ยนะ?"
10097-CVGroup_UIEventLobby_Idle1-1 = "เป็นเพราะหมอกหรือเปล่านะ...?"
10097-CVGroup_UIEventLobby_Idle1-2 = "ฤดูร้อนแท้ๆ แต่รู้สึกเย็นสบายดีจัง..."
10097-CVGroup_UIEventLobby_Idle2-1 = "อืม ฉันได้กลิ่นความพินาศจากที่ไหนจริงๆ นะ..."
10097-CVGroup_UIEventLobby_Idle3-1 = "ถึงจะมาทำปฏิบัติการของ SRT"
10097-CVGroup_UIEventLobby_Idle3-2 = "แต่พอได้มาทะเลฤดูร้อน ก็เหมือนได้เปลี่ยนบรรยากาศไปเลยเนอะ"
10097-CVGroup_UIEventLobby_Idle4-1 = "ห่วงยางอันนี้ดูน่าสงสัยงั้นเหรอ?"
10097-CVGroup_UIEventLobby_Idle4-2 = "ก็นะ มันไม่ใช่ห่วงยางที่เอาไว้เล่นน้ำทั่วไปหรอก ฮุฮุ..."

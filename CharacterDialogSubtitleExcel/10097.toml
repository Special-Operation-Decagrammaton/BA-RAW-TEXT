[translation]
10097-CVGroup_UITitle_Idle1-1 = "蔚藍～～～檔案！"
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT3，抵達現場～\n咯嘻嘻……在海上的話，盡情使用炸彈也沒問題吧？"
10097-CVGroup_Cafe_Idle1-1 = "會不會有手榴彈掉在某個地方呢……"
10097-CVGroup_Cafe_Idle2-1 = "唉……累死我了……"
10097-CVGroup_Cafe_Idle3-1 = "有毀滅的氣味……"
10097-CVGroup_Cafe_Idle4-1 = "咯嘻嘻。\n這個按鈕，究竟會跟什麼連動呢……"
10097-CVGroup_Cafe_Idle5-1 = "咖啡廳的防火牆，\n怎麼莫名的堅固啊……"
10097-CVGroup_WeaponGet_Idle1-1 = "RABBIT-224式手槍，領取完畢。\n話說回來，我明明不會進到水裡，卻也非得做防水處理嗎？\n真麻煩……"
10097-CVGroup_UIEventLobby_Enter1-1 = "這裡就是以蝦子聞名的夜戶浦村……"
10097-CVGroup_UIEventLobby_Enter1-2 = "實際到這裡來好像還是第一次呢。"
10097-CVGroup_UIEventLobby_Enter2-1 = "究竟，這個村子裡發生了什麼呢？"
10097-CVGroup_UIEventLobby_Enter3-1 = "「深處的存在」……"
10097-CVGroup_UIEventLobby_Enter3-2 = "如果那個傳聞是真的，會連超大的炸彈也抵擋的了嗎？"
10097-CVGroup_UIEventLobby_Enter4-1 = "「臭魚乾」光是發酵就能散發出那種味道嗎？"
10097-CVGroup_UIEventLobby_Enter4-2 = "好像，有點想試做一次看看……咯嘻嘻。"
10097-CVGroup_UIEventLobby_Enter5-1 = "呵呵。這下終於……"
10097-CVGroup_UIEventLobby_Enter5-2 = "可以吃到好吃的羅勒鮮蝦三明治了吧？"
10097-CVGroup_UIEventLobby_Idle1-1 = "是因為霧的關係嗎……？"
10097-CVGroup_UIEventLobby_Idle1-2 = "明明是夏天卻有點冷……"
10097-CVGroup_UIEventLobby_Idle2-1 = "唔嗯。好像確實有股毀滅的氣息……"
10097-CVGroup_UIEventLobby_Idle3-1 = "雖然說是SRT的作戰，"
10097-CVGroup_UIEventLobby_Idle3-2 = "但夏天的海和平時不一樣，有種轉換心情的感覺呢。"
10097-CVGroup_UIEventLobby_Idle4-1 = "你說這個游泳圈很奇怪？"
10097-CVGroup_UIEventLobby_Idle4-2 = "這個嘛，畢竟確實不是平時用的那種。\n咯嘻嘻……"

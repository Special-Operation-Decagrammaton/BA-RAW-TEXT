[translation]
20010-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20010-CVGroup_CharacterGet_Idle1-1 = "Welcome to Hot Springs Resort No. 227, Sensei. As the hostess of the hot springs resort, I will serve you wholeheartedly!"
20010-CVGroup_Cafe_Idle1-1 = "It'd be nice to have furniture like this at our hot springs resort."
20010-CVGroup_Cafe_Idle2-1 = "This cafe is always full of people. I wonder what their secret is."
20010-CVGroup_Cafe_Idle3-1 = "This is probably...expensive, right?"
20010-CVGroup_Cafe_Idle4-1 = "(I'm sure I saw Sensei somewhere near here.)"
20010-CVGroup_Cafe_Idle5-1 = "(I don't want to return to the Former Institute just yet...)"
20010-CVGroup_WeaponGet_Idle1-1 = "I hope I don't have to use this weapon at the hot springs resort... Though if I have to, I will!"
20010-CVGroup_UIEventLobby_Enter1-1 = "Hello. Welcome to the Hot Springs Resort No. 227!"
20010-CVGroup_UIEventLobby_Enter2-1 = "Wow! S-Sensei?! D-Did you have a reservation for today?!"
20010-CVGroup_UIEventLobby_Idle1-1 = "I can earn money and enjoy the beautiful scenery..."
20010-CVGroup_UIEventLobby_Idle1-2 = "The hot springs resort is the best!"
20010-CVGroup_UIEventLobby_Idle2-1 = "Yes, Sensei? Are you all out of bath products?"
20010-CVGroup_UIEventLobby_Idle3-1 = "Heehee... I'm no longer the old me!"
20010-CVGroup_UIEventLobby_Idle4-1 = "Heehee. Now that I am overflowing with tranquility..."
20010-CVGroup_UIEventLobby_Idle4-2 = "I'm planning on eating two puddings after my meal!"
20010-CVGroup_UIEventLobby_Enter3-1 = "It's been almost one week since I started running the hot springs resort."
20010-CVGroup_UIEventLobby_Enter3-2 = "I think I can call myself a good hostess, right?"
20010-CVGroup_UIEventLobby_Enter4-1 = "I didn't know that running a hot springs resort..."
20010-CVGroup_UIEventLobby_Enter4-2 = "...would be so difficult."
20010-CVGroup_UIEventLobby_Enter5-1 = "The hot springs resort is gone...but I won't give up!"
20010-CVGroup_UIEventShop_Enter1-1 = "I'm preparing items needed to run a hot springs resort!"
20010-CVGroup_UIEventShop_Enter2-1 = "If you have any unused products, we'll exchange them for other items here!"
20010-CVGroup_UIEventShop_Idle1-1 = "Sensei? How can I help you?"
20010-CVGroup_UIEventShop_Idle2-1 = "E-Even if it's Sensei, I can't give it away for free, okay?"
20010-CVGroup_UIEventShop_Buy1-1 = "Thank you for the great deal."
20010-CVGroup_UIEventShop_Buy2-1 = "Thank you for always helping me, Sensei."
20010-CVGroup_UIEventShop_Buy3-1 = "Thank you for your business today!"
20010-CVGroup_UIEventShop_Buy4-1 = "C-Can I really accept such a good item?"
20010-CVGroup_UIEventShop_Enter3-1 = "Unfortunately, Hot Springs Resort No. 227 is closed for business..."

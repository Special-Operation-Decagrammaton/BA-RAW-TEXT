[translation]
20010-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
20010-CVGroup_CharacterGet_Idle1-1 = "227호 온천장에 어서 오세요, 선생님.\n이 노도카가, 온천장의 여주인으로서 성심을 다해 모시겠습니다!"
20010-CVGroup_Cafe_Idle1-1 = "저희 온천장에도 이런 가구를 들여놓으면 좋겠네요."
20010-CVGroup_Cafe_Idle2-1 = "이 카페는 언제나 사람이 많네요. 비결이 뭘까요?"
20010-CVGroup_Cafe_Idle3-1 = "우아아…… 비싸보이는 물건이……"
20010-CVGroup_Cafe_Idle4-1 = "(어라, 분명 이 근처에서 조금 전까지 선생님이…)"
20010-CVGroup_Cafe_Idle5-1 = "(구교사로 아직은 돌아가고 싶지 않아…)"
20010-CVGroup_WeaponGet_Idle1-1 = "솔직히 말하자면, 이 무기를 온천장에서 사용할 일은 없었으면 좋겠습니다만…\n필요하다면, 써야겠지요!"
20010-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요. 227호 온천장에 오신 것을 환영합니다!"
20010-CVGroup_UIEventLobby_Enter2-1 = "아와와! 서, 선생님!? 어라, 오늘 예약이 되어 있으셨던가요……!?"
20010-CVGroup_UIEventLobby_Idle1-1 = "돈도 벌고 아름다운 풍경도 잔뜩 볼 수 있다니…"
20010-CVGroup_UIEventLobby_Idle1-2 = "온천장은 최고네요!"
20010-CVGroup_UIEventLobby_Idle2-1 = "무슨 일이신가요, 선생님? 무언가 부족한 물품이라도 있나요?"
20010-CVGroup_UIEventLobby_Idle3-1 = "후후…… 지금의 저는, 지금까지와는 완전히 다르니까요!"
20010-CVGroup_UIEventLobby_Idle4-1 = "후후. 지금의 저는 여유가 넘쳐나기 때문에……"
20010-CVGroup_UIEventLobby_Idle4-2 = "식사 후에 푸딩을 두 개나 먹을 예정이랍니다!"
20010-CVGroup_UIEventLobby_Enter3-1 = "온천장을 운영한 지 벌써 1주일 가까이 되었네요."
20010-CVGroup_UIEventLobby_Enter3-2 = "이만하면 저도 훌륭한 여주인이라 할 수 있겠죠?"
20010-CVGroup_UIEventLobby_Enter4-1 = "온천장을 운영하는 게 이렇게 어려운 일일 줄은……"
20010-CVGroup_UIEventLobby_Enter4-2 = "전에는 미처 몰랐어요."
20010-CVGroup_UIEventLobby_Enter5-1 = "온천장은 사라지고 말았 지만……저는 이런 일로 실망하지 않으니까요!"
20010-CVGroup_UIEventShop_Enter1-1 = "온천 용품도 잔뜩 준비하고 있답니다!"
20010-CVGroup_UIEventShop_Enter2-1 = "혹시 안 쓰는 물건이 있으시다면 여기서 다른 상품으로 교환해드릴게요!"
20010-CVGroup_UIEventShop_Idle1-1 = "선생님? 무슨 일이신가요?"
20010-CVGroup_UIEventShop_Idle2-1 = "아, 아무리 선생님이라 하더라도 공짜로 드릴 수는 없거든요?"
20010-CVGroup_UIEventShop_Buy1-1 = "좋은 거래에 감사드립니다."
20010-CVGroup_UIEventShop_Buy2-1 = "언제나 도와주셔서 감사합니다, 선생님."
20010-CVGroup_UIEventShop_Buy3-1 = "오늘도 이용해주셔서 감사합니다!"
20010-CVGroup_UIEventShop_Buy4-1 = "이, 이런 좋은 물건을 받아도 괜찮은 걸까요?"
20010-CVGroup_UIEventShop_Enter3-1 = "아쉬운 일입니다만, 227호 온천장의 영업은 종료되었습니다……"

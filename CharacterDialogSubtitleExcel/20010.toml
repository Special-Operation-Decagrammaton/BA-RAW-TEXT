[translation]
20010-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20010-CVGroup_CharacterGet_Idle1-1 = "ขอต้อนรับสู่ออนเซ็น No.227 ค่ะคุณครู\nฉันเป็นผู้ดูแลของออนเซ็นนี้ โนโดกะค่ะ\nฉันจะบริการคุณครูอย่างเต็มที่เลยค่ะ!"
20010-CVGroup_Cafe_Idle1-1 = "ถ้าออนเซ็นของเรามีอุปกรณ์พวกนี้ด้วยก็คงดีนะคะ"
20010-CVGroup_Cafe_Idle2-1 = "คาเฟ่นี้มีคนเยอะตลอดเลยค่ะ เขามีเคล็ดลับอะไรกันนะ?"
20010-CVGroup_Cafe_Idle3-1 = "ว้าว... ของชิ้นนี้ดูน่าจะแพงมากเลยนะคะ"
20010-CVGroup_Cafe_Idle4-1 = "(เอ๊ะ รู้สึกเหมือนว่าเห็นคุณครูอยู่แถวๆ นี้เลยนะ...)"
20010-CVGroup_Cafe_Idle5-1 = "(ไม่อยากกลับไปที่อาคารเรียนเก่าเลย...)"
20010-CVGroup_WeaponGet_Idle1-1 = "ถ้าไม่จำเป็นต้องใช้อาวุธนี้ที่ออนเซ็นก็คงดีนะคะ...\nแต่ถ้าจำเป็นจริงๆ ฉันก็จะใช้ค่ะ!"
20010-CVGroup_UIEventLobby_Enter1-1 = "สวัสดีค่ะคุณครู ยินดีต้อนรับสู่ออนเซ็น No.227 ค่ะ"
20010-CVGroup_UIEventLobby_Enter2-1 = "วะ..ว้าย! คะ...คุณครู?!\nเอ๋? วันนี้จองที่พักเอาไว้แล้วอย่างนั้นเหรอคะ…!?"
20010-CVGroup_UIEventLobby_Idle1-1 = "ได้ดูวิวที่สวยงาม พร้อมกับหาเงินได้แบบนี้..."
20010-CVGroup_UIEventLobby_Idle1-2 = "ออนเซ็นนี่ยอดเยี่ยมที่สุดเลยค่ะ!"
20010-CVGroup_UIEventLobby_Idle2-1 = "มีอะไรเหรอคะคุณครู\nอุปกรณ์อาบน้ำหมดแล้วเหรอคะ?"
20010-CVGroup_UIEventLobby_Idle3-1 = "ฮุฮุ ตอนนี้ฉันไม่ใช่คนเดิมแบบเมื่อก่อนแล้วนะคะ!"
20010-CVGroup_UIEventLobby_Idle4-1 = "ฮุฮุ เพราะว่าตอนนี้...\nฉันรู้สึกผ่อนคลายมากเลยค่ะ..."
20010-CVGroup_UIEventLobby_Idle4-2 = "หลังจากทานมื้ออาหารแล้ว\nพวกเราวางแผนจะกินพุดดิ้งสักสองถ้วยเลยละค่ะ!"
20010-CVGroup_UIEventLobby_Enter3-1 = "ออนเซ็นของเราเปิดมาได้ ตอนนี้ก็ครบ 1 อาทิตย์แล้วค่ะ"
20010-CVGroup_UIEventLobby_Enter3-2 = "ถ้าแบบนี้...ตอนนี้ฉันก็เรียกได้ว่าเป็น\nนายหญิงที่ยอดเยี่ยมแล้วใช่มั้ยคะ?"
20010-CVGroup_UIEventLobby_Enter4-1 = "ฉันไม่เคยรู้เลยว่าดูแลออนเซ็น\nจะเป็นงานที่ยากแบบนี้..."
20010-CVGroup_UIEventLobby_Enter4-2 = "ฉันไม่รู้มาก่อนเลยล่ะค่ะ"
20010-CVGroup_UIEventLobby_Enter5-1 = "ตอนนี้ออนเซ็นหายไปแล้ว\nแต่ฉันไม่ยอมแพ้แค่นี้หรอกค่ะ!"
20010-CVGroup_UIEventShop_Enter1-1 = "ฉันเตรียมสิ่งของจำเป็น\nสำหรับบริการเอาไว้เยอะแยะเลยค่ะ!"
20010-CVGroup_UIEventShop_Enter2-1 = "ถ้ามีสิ่งของที่ไม่ได้ใช้ในออนเซ็น\nสามารถมาแลกเป็นไอเทมอื่นกับพวกเราได้นะคะ!"
20010-CVGroup_UIEventShop_Idle1-1 = "คุณครู มีเรื่องอะไรหรือเปล่าคะ?"
20010-CVGroup_UIEventShop_Idle2-1 = "ถะ...ถึงจะเป็นคุณครูก็เถอะ\nแต่ก็คงจะให้ไปฟรีๆ ไม่ได้หรอกนะคะ"
20010-CVGroup_UIEventShop_Buy1-1 = "ขอบคุณที่มาใช้บริการแลกเปลี่ยนค่ะ"
20010-CVGroup_UIEventShop_Buy2-1 = "ไม่ว่าเมื่อไหร่... คุณครูก็ช่วยฉันอยู่เสมอ\nขอบคุณมากเลยค่ะ!"
20010-CVGroup_UIEventShop_Buy3-1 = "วันนี้ก็ขอบคุณที่มาใช้บริการนะคะ!"
20010-CVGroup_UIEventShop_Buy4-1 = "ขะ...ของดีๆ แบบนี้\nให้ฉันได้จริงๆ เหรอคะ?"
20010-CVGroup_UIEventShop_Enter3-1 = "ถึงจะน่าเสียดาย... แต่ออนเซ็น No.227 ของเรา\nปิดให้บริการแล้วค่ะ..."

[translation]
10131-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10131-CVGroup_CharacterGet_Idle1-1 = "Be polite, but be persistent. I'm Miyoshi Takane from Red Winter Federal Academy's Publishing Department. Nice to meet you."
10131-CVGroup_Cafe_Idle1-1 = "This place possesses a charming atmosphere."
10131-CVGroup_Cafe_Idle2-1 = "Is the Wi-Fi good here? I must upload my critique..."
10131-CVGroup_Cafe_Idle3-1 = "Sharing stories over tea. How quaint. Truly."
10131-CVGroup_Cafe_Idle4-1 = "(How should I review this place...?)"
10131-CVGroup_Cafe_Idle5-1 = "Is photography permitted...?"
10131-CVGroup_WeaponGet_Idle1-1 = "Do you know the saying, \"the pen is mightier than the gun\"? Yes, it's true. Fufu... Let's have an in-depth...\"discussion\" with those who ignorantly replied to my reviews."
10131-CVGroup_UIEventLobby_Enter1-1 = "This is my first time visiting Trinity..."
10131-CVGroup_UIEventLobby_Enter1-2 = "I-I should do my best to not cause any trouble."
10131-CVGroup_UIEventLobby_Enter2-1 = "The place called Trinity, and the stories born there..."
10131-CVGroup_UIEventLobby_Enter2-2 = "Heh. I like them both."
10131-CVGroup_UIEventLobby_Enter3-1 = "Everything is going well..."
10131-CVGroup_UIEventLobby_Enter3-2 = "...which is a bit concerning."
10131-CVGroup_UIEventLobby_Enter3-3 = "If this were part of a story..."
10131-CVGroup_UIEventLobby_Enter3-4 = "...a conflict would eagerly interrupt these scenes."
10131-CVGroup_UIEventLobby_Enter4-1 = "I had a feeling this would happen..."
10131-CVGroup_UIEventLobby_Enter4-2 = "Yeah... I need to stay composed..."
10131-CVGroup_UIEventLobby_Enter5-1 = "What a relief... Truly, I'm very glad."
10131-CVGroup_UIEventLobby_Enter5-2 = "Thank you so much, Sensei."
10131-CVGroup_UIEventLobby_Enter5-3 = "And...I'm sorry, Sensei."
10131-CVGroup_UIEventLobby_Idle1-1 = "I was relieved that everyone was nice to us."
10131-CVGroup_UIEventLobby_Idle1-2 = "...But still, ultimately, I'm just an ordinary student..."
10131-CVGroup_UIEventLobby_Idle2-1 = "Did you call me, Sensei?"
10131-CVGroup_UIEventLobby_Idle2-2 = "What? \"That laugh\"?"
10131-CVGroup_UIEventLobby_Idle2-3 = "I'm not doing it! Not here, at the very least!"
10131-CVGroup_UIEventLobby_Idle2-4 = "...Although it might be a different story if it were just the two of us..."
10131-CVGroup_UIEventLobby_Idle3-1 = "Please stop teasing me like that."
10131-CVGroup_UIEventLobby_Idle3-2 = "Otherwise...!"
10131-CVGroup_UIEventLobby_Idle3-3 = "I will record each and every one of your actions..."
10131-CVGroup_UIEventLobby_Idle3-4 = "...and critique them, okay?"
10131-CVGroup_UIEventLobby_Idle3-5 = "\"Sensei was once more pulling pranks on Miyoshi Takane today...\""
10131-CVGroup_UIEventLobby_Idle3-6 = "\"I decided to announce this to all of Kivotos.\""
10131-CVGroup_UIEventLobby_Idle3-7 = "Fufu. Right? I'm glad you understand."
10131-CVGroup_UIEventLobby_Idle4-1 = "Expanding your horizons means broadening how you view the world."
10131-CVGroup_UIEventLobby_Idle4-2 = "In a different sense, it means expanding your own world."
10131-CVGroup_UIEventLobby_Idle4-3 = "And...as I thought about this..."
10131-CVGroup_UIEventLobby_Idle4-4 = "...I became curious about something."
10131-CVGroup_UIEventLobby_Idle4-5 = "What kind of world..."
10131-CVGroup_UIEventLobby_Idle4-6 = "...do you possess?"
10131-CVGroup_UIEventMission_Enter1-1 = "Even though I'm at Trinity, I must not forget my duty."
10131-CVGroup_UIEventMission_Enter1-2 = "...Otherwise, I could end up like our president..."
10131-CVGroup_UIEventMission_Enter1-3 = "...who deliberately forgets proper decorum."
10131-CVGroup_UIEventMission_Enter2-1 = "I tried making a checklist, Sensei."
10131-CVGroup_UIEventMission_Enter2-2 = "It wasn't much."
10131-CVGroup_UIEventMission_Enter2-3 = "It's similar to coming up with the structure of a critique."
10131-CVGroup_UIEventMission_Idle1-1 = "A story is a compilation of small chapters."
10131-CVGroup_UIEventMission_Idle1-2 = "Although the writing process..."
10131-CVGroup_UIEventMission_Idle1-3 = "...may not necessarily follow that exact order."
10131-CVGroup_UIEventMission_Idle1-4 = "But in the sense that they're both ultimately organized, formed..."
10131-CVGroup_UIEventMission_Idle1-5 = "...and expressed..."
10131-CVGroup_UIEventMission_Idle1-6 = "Both tasks must be tackled diligently."
10131-CVGroup_UIEventMission_Idle2-1 = "Repetitive things tend to be easily ignored."
10131-CVGroup_UIEventMission_Idle2-2 = "Since they're boring in the first place, you know...?"
10131-CVGroup_UIEventMission_Idle2-3 = "But if you neglect your small tasks..."
10131-CVGroup_UIEventMission_Idle2-4 = "...they are bound to catch up with you eventually."
10131-CVGroup_UIEventMission_Idle2-5 = "That felt like a gentle lecture?"
10131-CVGroup_UIEventMission_Idle2-6 = "Y-Yeah... I know I nag a lot."
10131-CVGroup_UIEventMission_Idle2-7 = "After all, critics are essentially finicky, nagging complainers."
10131-CVGroup_UIEventMission_Buy1-1 = "5 out of 5! That's incredible!"
10131-CVGroup_UIEventMission_Buy2-1 = "It's proper to reward someone who so diligently..."
10131-CVGroup_UIEventMission_Buy2-2 = "...completes their homework."
10131-CVGroup_UIEventMission_Buy2-3 = "Here you go. I prepared this for you."
10131-CVGroup_UIEventMission_Interaction1-1 = "And that's it for today's tasks."
10131-CVGroup_UIEventMission_Interaction1-2 = "I'm looking forward to seeing you tomorrow, as well."

[translation]
10131-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10131-CVGroup_CharacterGet_Idle1-1 = "貴安，老師。\n我是赤冬聯邦學園，出版部所屬的三善貴音。\n還請您多多指教。"
10131-CVGroup_Cafe_Idle1-1 = "呼呣……這裡，氣氛真不錯呢。"
10131-CVGroup_Cafe_Idle2-1 = "Wi-Fi有確實連上嗎？\n得趕快把評論上傳才行……"
10131-CVGroup_Cafe_Idle3-1 = "邊喝茶邊聊故事的時間……相當美好呢。真的。"
10131-CVGroup_Cafe_Idle4-1 = "（這個空間……該如何撰寫評論好呢……）"
10131-CVGroup_Cafe_Idle5-1 = "可以拍照嗎……？"
10131-CVGroup_WeaponGet_Idle1-1 = "您知道「筆比槍更有力量」這句格言嗎？\n是的，正是如此。\n呵呵……就讓我和那些對我的評論留下刻薄言語的人們──\n進行一場深思熟慮的「對話」吧。"
10131-CVGroup_UIEventLobby_Enter1-1 = "還是第一次來到三一呢……"
10131-CVGroup_UIEventLobby_Enter1-2 = "我，我會努力不給您添麻煩的。"
10131-CVGroup_UIEventLobby_Enter2-1 = "三一這個地方──以及在此誕生的故事。"
10131-CVGroup_UIEventLobby_Enter2-2 = "呵呵，我，兩邊都非常喜歡哦。"
10131-CVGroup_UIEventLobby_Enter3-1 = "不過……一切都進展得過於順利，"
10131-CVGroup_UIEventLobby_Enter3-2 = "不禁讓人有點不安呢……"
10131-CVGroup_UIEventLobby_Enter3-3 = "假如是故事中的一幕，"
10131-CVGroup_UIEventLobby_Enter3-4 = "就會從這樣的場景開始掀起波瀾吧。"
10131-CVGroup_UIEventLobby_Enter4-1 = "果然……我就覺得會變成這樣。"
10131-CVGroup_UIEventLobby_Enter4-2 = "是啊……至少我得振作才行……"
10131-CVGroup_UIEventLobby_Enter5-1 = "太好了……真的是太好了。"
10131-CVGroup_UIEventLobby_Enter5-2 = "我由衷地感謝您，老師。"
10131-CVGroup_UIEventLobby_Enter5-3 = "還有……真的很抱歉，老師。"
10131-CVGroup_UIEventLobby_Idle1-1 = "大家都對我非常親切，讓我安心了許多。"
10131-CVGroup_UIEventLobby_Idle1-2 = "……但我終究不過是個普通學生而已。"
10131-CVGroup_UIEventLobby_Idle2-1 = "您找我嗎，老師？"
10131-CVGroup_UIEventLobby_Idle2-2 = "咦？高聲大笑？"
10131-CVGroup_UIEventLobby_Idle2-3 = "那種失禮的舉動，我不會在這種地方做！"
10131-CVGroup_UIEventLobby_Idle2-4 = "……假如是在只有我們兩人獨處的場合，還能另當別論就是了。"
10131-CVGroup_UIEventLobby_Idle3-1 = "請不要一直那樣取笑我。"
10131-CVGroup_UIEventLobby_Idle3-2 = "否則──"
10131-CVGroup_UIEventLobby_Idle3-3 = "我就要將老師的言行一字不漏地記錄下來……"
10131-CVGroup_UIEventLobby_Idle3-4 = "然後寫成評論了哦？"
10131-CVGroup_UIEventLobby_Idle3-5 = "「老師今天也在對三善貴音惡作劇」"
10131-CVGroup_UIEventLobby_Idle3-6 = "「因此我決定將這個事實向奇普托斯全境公告」"
10131-CVGroup_UIEventLobby_Idle3-7 = "呵呵。對吧？您能夠理解真是太好了。"
10131-CVGroup_UIEventLobby_Idle4-1 = "深化見識，就是拓寬看世界的視野。"
10131-CVGroup_UIEventLobby_Idle4-2 = "也等同於是在擴張自己的世界。"
10131-CVGroup_UIEventLobby_Idle4-3 = "不過……在這麼思考的過程，"
10131-CVGroup_UIEventLobby_Idle4-4 = "我突然開始在意了。"
10131-CVGroup_UIEventLobby_Idle4-5 = "老師所看見的世界……"
10131-CVGroup_UIEventLobby_Idle4-6 = "究竟會是什麼模樣呢……？"
10131-CVGroup_UIEventMission_Enter1-1 = "即使人在三一，每日的例行事務也不能懈怠。"
10131-CVGroup_UIEventMission_Enter1-2 = "如果總是隨心所欲地行動……"
10131-CVGroup_UIEventMission_Enter1-3 = "就會變得像是我們部長那樣了。"
10131-CVGroup_UIEventMission_Enter2-1 = "我準備了檢查清單。"
10131-CVGroup_UIEventMission_Enter2-2 = "雖然不是什麼了不起的東西……"
10131-CVGroup_UIEventMission_Enter2-3 = "不過和思考評論的構成其實幾乎一模一樣呢。"
10131-CVGroup_UIEventMission_Idle1-1 = "所謂的故事，只不過是微小章節的累積而已。"
10131-CVGroup_UIEventMission_Idle1-2 = "雖然在執筆的過程中，"
10131-CVGroup_UIEventMission_Idle1-3 = "未必會依照故事的順序進行撰寫……"
10131-CVGroup_UIEventMission_Idle1-4 = "不過，從最終會以某種形式統整，"
10131-CVGroup_UIEventMission_Idle1-5 = "並呈現出來的意義上來說──"
10131-CVGroup_UIEventMission_Idle1-6 = "和這樣確實完成課題，或許有些相似呢。"
10131-CVGroup_UIEventMission_Idle2-1 = "反覆進行的事情，往往容易受到輕視。"
10131-CVGroup_UIEventMission_Idle2-2 = "因為，會讓人覺得無聊……？"
10131-CVGroup_UIEventMission_Idle2-3 = "若是疏忽了微小的累積，"
10131-CVGroup_UIEventMission_Idle2-4 = "遲早會被絆倒的唷。"
10131-CVGroup_UIEventMission_Idle2-5 = "真是溫柔的叮嚀……？"
10131-CVGroup_UIEventMission_Idle2-6 = "是，是啊……我也有說教意味濃厚的自覺。"
10131-CVGroup_UIEventMission_Idle2-7 = "評論家這種人，說白了就是喜歡吹毛求疵的嘮叨鬼嘛。"
10131-CVGroup_UIEventMission_Buy1-1 = "五分滿分！真是太出色了！"
10131-CVGroup_UIEventMission_Buy2-1 = "能誠實地完成課題的人，"
10131-CVGroup_UIEventMission_Buy2-2 = "獲得報酬也是理所當然的事情。"
10131-CVGroup_UIEventMission_Buy2-3 = "來，請收下這個。是我的零用錢哦。呵呵。"
10131-CVGroup_UIEventMission_Interaction1-1 = "今天的工作就到此結束了呢。"
10131-CVGroup_UIEventMission_Interaction1-2 = "那麼，明天也請多多指教囉。"

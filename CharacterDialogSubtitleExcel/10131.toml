[translation]
10131-CVGroup_UITitle_Idle1-1 = "블루 아카이브, 이어요."
10131-CVGroup_CharacterGet_Idle1-1 = "예의를 잊지 않고, 그러면서도 꾸준하게.\n붉은겨울 연방학원 출판부의\n미요시 타카네입니다. 잘 부탁드려요."
10131-CVGroup_Cafe_Idle1-1 = "이 장소,\n좋은 분위기네요."
10131-CVGroup_Cafe_Idle2-1 = "와이파이가 잘 되려나요?\n평론을 업로드 해야 하는데……"
10131-CVGroup_Cafe_Idle3-1 = "차와 함께하는 이야기, 좋죠.\n정말로요."
10131-CVGroup_Cafe_Idle4-1 = "(이 공간을 어떻게\n평론해 볼까……)"
10131-CVGroup_Cafe_Idle5-1 = "사진 촬영, \n괜찮으려나요……?"
10131-CVGroup_WeaponGet_Idle1-1 = "펜은 총보다 강하다, 라는 말을 아시나요? 네, 맞아요. 후훗……\n제 평론에 무심한 말을 보낸 분들과……\n사려 깊은…… '대화'를 나누어 보도록 하죠."
10131-CVGroup_UIEventLobby_Enter1-1 = "트리니티에방문하는 것은처음입니다만……"
10131-CVGroup_UIEventLobby_Enter1-2 = "최, 최대한 폐를끼치지 않도록,노력해야겠네요."
10131-CVGroup_UIEventLobby_Enter2-1 = "트리니티라는 장소,그리고 그곳에서탄생하는 이야기."
10131-CVGroup_UIEventLobby_Enter2-2 = "후후. 저는양쪽 모두마음에 들어요."
10131-CVGroup_UIEventLobby_Enter3-1 = "너무 모든 게 잘 되어서"
10131-CVGroup_UIEventLobby_Enter3-2 = "약간불안한데 말이죠……"
10131-CVGroup_UIEventLobby_Enter3-3 = "이야기의 한 막이라면,"
10131-CVGroup_UIEventLobby_Enter3-4 = "이런 신에서 파란이생기는 법이니까요."
10131-CVGroup_UIEventLobby_Enter4-1 = "왠지 이럴 것같았다니까요……"
10131-CVGroup_UIEventLobby_Enter4-2 = "네…… 저라도정신 차려야죠……"
10131-CVGroup_UIEventLobby_Enter5-1 = "다행이에요……정말로, 다행이에요."
10131-CVGroup_UIEventLobby_Enter5-2 = "진심으로 감사드립니다.선생님."
10131-CVGroup_UIEventLobby_Enter5-3 = "그리고……죄송합니다. 선생님."
10131-CVGroup_UIEventLobby_Idle1-1 = "모두 친절하게대해 주셔서,마음이 놓였답니다."
10131-CVGroup_UIEventLobby_Idle1-2 = "……그렇지만 역시저는, 그냥 평범한학생인데 말이에요……"
10131-CVGroup_UIEventLobby_Idle2-1 = "부르셨나요, 선생님?"
10131-CVGroup_UIEventLobby_Idle2-2 = "네?'그 웃음소리'요?"
10131-CVGroup_UIEventLobby_Idle2-3 = "안 해요!적어도 여기서는요!"
10131-CVGroup_UIEventLobby_Idle2-4 = "……저희 둘만있을 때라면,또 모르겠지만요……"
10131-CVGroup_UIEventLobby_Idle3-1 = "자꾸 그렇게놀리는 거,그만둬 주세요."
10131-CVGroup_UIEventLobby_Idle3-2 = "그렇지 않으면……!"
10131-CVGroup_UIEventLobby_Idle3-3 = "선생님의 행동을하나하나 기록……"
10131-CVGroup_UIEventLobby_Idle3-4 = "평론해드릴 테니까요?"
10131-CVGroup_UIEventLobby_Idle3-5 = "'선생님은 오늘도미요시 타카네에게장난을 치고 있었다.'"
10131-CVGroup_UIEventLobby_Idle3-6 = "'나는 이 사실을키보토스 전체에공표하기로 결심했다.'"
10131-CVGroup_UIEventLobby_Idle3-7 = "후훗. 그렇죠?이해해 주셔서다행이에요."
10131-CVGroup_UIEventLobby_Idle4-1 = "견문을 넓히는 것은,세상을 바라보는 시야를넓히는 것이죠."
10131-CVGroup_UIEventLobby_Idle4-2 = "그건 어떤 의미에서,자신의 세계를확대하는 것이고요."
10131-CVGroup_UIEventLobby_Idle4-3 = "그런데…… 이런 생각을하다 보니,"
10131-CVGroup_UIEventLobby_Idle4-4 = "궁금해진 것이있는데요."
10131-CVGroup_UIEventLobby_Idle4-5 = "선생님이라는세계는,"
10131-CVGroup_UIEventLobby_Idle4-6 = "과연어떤 세계일까요……?"
10131-CVGroup_UIEventMission_Enter1-1 = "트리니티에 와 있지만,해야 할 일은잊어선 안 된답니다."
10131-CVGroup_UIEventMission_Enter1-2 = "……안 그러면 가끔전후 관계를고의로 망각하는"
10131-CVGroup_UIEventMission_Enter1-3 = "우리 부장님처럼될 수도 있으니까요……"
10131-CVGroup_UIEventMission_Enter2-1 = "체크 리스트를준비해 봤어요, 선생님."
10131-CVGroup_UIEventMission_Enter2-2 = "별것 아니랍니다."
10131-CVGroup_UIEventMission_Enter2-3 = "평론의 구성을생각하는 것과 거의비슷한 것이니까요."
10131-CVGroup_UIEventMission_Idle1-1 = "이야기라는 것은작은 장의 쌓임이죠."
10131-CVGroup_UIEventMission_Idle1-2 = "집필 과정은,"
10131-CVGroup_UIEventMission_Idle1-3 = "반드시 그 순서대로이루어지지는않을지도 모르지만요."
10131-CVGroup_UIEventMission_Idle1-4 = "하지만,최종적으로 어떠한형태로 정리되어"
10131-CVGroup_UIEventMission_Idle1-5 = "표출된다는 의미에서는."
10131-CVGroup_UIEventMission_Idle1-6 = "이런 과제를 착실하게해나가는 것과 비슷할지도 모르겠네요."
10131-CVGroup_UIEventMission_Idle2-1 = "반복되는 것들은무시당하기 쉽죠."
10131-CVGroup_UIEventMission_Idle2-2 = "일단,지루하잖아요……?"
10131-CVGroup_UIEventMission_Idle2-3 = "하지만 작은 노력을소홀히 하면,"
10131-CVGroup_UIEventMission_Idle2-4 = "언젠가 발목을 잡히는법이니까요."
10131-CVGroup_UIEventMission_Idle2-5 = "상냥한 잔소리,같았다고요?"
10131-CVGroup_UIEventMission_Idle2-6 = "네, 네에…… 잔소리가많다는 것 정도,알고 있다고요."
10131-CVGroup_UIEventMission_Idle2-7 = "평론가라는 건 결국, 트집을 잡는잔소리꾼이니까요."
10131-CVGroup_UIEventMission_Buy1-1 = "5점 만점!대단해요!"
10131-CVGroup_UIEventMission_Buy2-1 = "성실하게 과제를해낸 분에게는,"
10131-CVGroup_UIEventMission_Buy2-2 = "보상이 주어지는 것이당연하니까요."
10131-CVGroup_UIEventMission_Buy2-3 = "자, 여기요.제가 준비해 봤어요."
10131-CVGroup_UIEventMission_Interaction1-1 = "오늘 일과는이것으로 끝, 이네요."
10131-CVGroup_UIEventMission_Interaction1-2 = "그러면 내일도잘 부탁드리겠습니다."

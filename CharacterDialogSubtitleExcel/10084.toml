[translation]
10084-CVGroup_UITitle_Idle1-1 = "블루, 아카이브."
10084-CVGroup_CharacterGet_Idle1-1 = "…여기에 계셨군요. 산이든, 바다든…\n선생님의 목소리는 어디서도 놓치지 않습니다."
10084-CVGroup_Cafe_Idle1-1 = "이것이… 요새 SNS에서 화제가 된 그 인테리어군요…"
10084-CVGroup_Cafe_Idle2-1 = "지금 흐르는 이 곡… 곡 이름이… 생각나지 않습니다."
10084-CVGroup_Cafe_Idle3-1 = "…분명 이 근처에 두었을 텐데…"
10084-CVGroup_Cafe_Idle4-1 = "…녹음 완료했습니다."
10084-CVGroup_Cafe_Idle5-1 = "(으음…? 방금 신경 쓰이는 이야기를 들은 것 같습니다만…)"
10084-CVGroup_WeaponGet_Idle1-1 = "총을 쏠 때마다 선생님의 목소리가 들리게 된다면 좋을 텐데…….\n진지하게 제작을 고민해 봐야겠습니다."
10084-CVGroup_UIEventLobby_Enter1-1 = "찬 바람이 옷 사이로 스며들어서…"
10084-CVGroup_UIEventLobby_Enter1-2 = "저도 모르게 몸을 움츠리게 됩니다."
10084-CVGroup_UIEventLobby_Enter2-1 = "일부러 밖에까지 나와서 해를 넘겨야 한다니… 비효율적입니다."
10084-CVGroup_UIEventLobby_Enter3-1 = "(아무리 부부장이라도 이런 곳에 도청기를 숨겨왔을 거라고는 생각지 못했겠지요.)"
10084-CVGroup_UIEventLobby_Enter3-2 = "(후후…)"
10084-CVGroup_UIEventLobby_Enter4-1 = "어째서 이 타이밍에 곰이…"
10084-CVGroup_UIEventLobby_Enter4-2 = "세계의 악의가 느껴집니다…"
10084-CVGroup_UIEventLobby_Enter5-1 = "빨리 돌아가서 녹음한 선생님의 음성 파일을 편집해야…"
10084-CVGroup_UIEventLobby_Enter5-2 = "아, 아니. 빨리 휴식을 하고 싶네요…!"
10084-CVGroup_UIEventLobby_Idle1-1 = "침묵과 정적… 제가 제일 껄끄러워하는 환경이군요…"
10084-CVGroup_UIEventLobby_Idle2-1 = "유일한 이점이라면,"
10084-CVGroup_UIEventLobby_Idle2-2 = "선생님의 목소리를 잡음 없이 또렷하게 들을 수 있다는 것. 정도이려나요."
10084-CVGroup_UIEventLobby_Idle3-1 = "이 바람… 조금 울고 있군요."
10084-CVGroup_UIEventLobby_Idle4-1 = "주파수 검색 중… 반경 3km 내에서의 통신 기록은…"
10084-CVGroup_UIEventLobby_Idle4-2 = "0건."
10084-CVGroup_UIEventMission_Enter1-1 = "서, 선생님… 혹시 괜찮으시다면…"
10084-CVGroup_UIEventMission_Enter1-2 = "캠프 설치에 협력해 주실 수 있으실까요…"
10084-CVGroup_UIEventMission_Enter2-1 = "아, 선생님. 부부장의 지시로 캠프에 필요한 장비를 설치하던 중이었습니다."
10084-CVGroup_UIEventMission_Idle1-1 = "분명 간편한 캠핑을 위한 야영 장비라고 들었었는데…"
10084-CVGroup_UIEventMission_Idle1-2 = "설치는 조금도 간편하지가 않군요."
10084-CVGroup_UIEventMission_Idle2-1 = "뭔가 하실 말씀이라도…?"
10084-CVGroup_UIEventMission_Idle2-2 = "잠시만 기다려주십시오. 곧 녹음기를 가져오겠습니다."
10084-CVGroup_UIEventMission_Buy1-1 = "그렇군요. 참고하겠습니다."
10084-CVGroup_UIEventMission_Buy2-1 = "방금 하신 작업, 다시 한번 보여주시지 않겠습니까?"
10084-CVGroup_UIEventMission_Buy2-2 = "가능하시다면 구두로 해설도 곁들여서 부탁드립니다."
10084-CVGroup_UIEventMission_Interaction1-1 = "이만하면 오늘 밤은 안락하게 날 수 있겠군요."

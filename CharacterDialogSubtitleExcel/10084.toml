[translation]
10084-CVGroup_UITitle_Idle1-1 = "蔚藍，檔案。"
10084-CVGroup_CharacterGet_Idle1-1 = "原來在這裡啊。不管是山上還是海邊……\n我都不會漏聽老師的聲音。"
10084-CVGroup_Cafe_Idle1-1 = "這就是……最近SNS上話題火熱的裝潢是嗎……"
10084-CVGroup_Cafe_Idle2-1 = "現在播放的這首…\n想不到曲名…"
10084-CVGroup_Cafe_Idle3-1 = "……明明放在這附近啊……"
10084-CVGroup_Cafe_Idle4-1 = "……錄音完畢。"
10084-CVGroup_Cafe_Idle5-1 = "（唔嗯…？剛才好像聽見了令人在意的事…）"
10084-CVGroup_WeaponGet_Idle1-1 = "如果能用老師的聲音來代替槍聲就好了……\n我打算認真思考能不能實現。"
10084-CVGroup_UIEventLobby_Enter1-1 = "因為風會從衣服縫隙吹進來……"
10084-CVGroup_UIEventLobby_Enter1-2 = "讓人不自覺地縮起身體。"
10084-CVGroup_UIEventLobby_Enter2-1 = "特地出來過年什麼的……真是欠缺效率。"
10084-CVGroup_UIEventLobby_Enter3-1 = "（就算是副部長，應該也想不到我會把竊聽器藏在這種地方吧）"
10084-CVGroup_UIEventLobby_Enter3-2 = "（呵呵……）"
10084-CVGroup_UIEventLobby_Enter4-1 = "為什麼熊會在這種時候……"
10084-CVGroup_UIEventLobby_Enter4-2 = "感覺到了世界的惡意……"
10084-CVGroup_UIEventLobby_Enter5-1 = "得趕快回去編輯錄到的老師的語音檔……"
10084-CVGroup_UIEventLobby_Enter5-2 = "不，不對，我是想趕快休息……！"
10084-CVGroup_UIEventLobby_Idle1-1 = "沉默和寂靜……是我最討厭的環境……"
10084-CVGroup_UIEventLobby_Idle2-1 = "唯一的好處……"
10084-CVGroup_UIEventLobby_Idle2-2 = "就只有能在沒有雜音的情況下清楚聽到老師的聲音了吧。"
10084-CVGroup_UIEventLobby_Idle3-1 = "這陣風……有種……在哭泣的感覺。"
10084-CVGroup_UIEventLobby_Idle4-1 = "正在搜尋頻率……\n半徑3km內的通訊紀錄……"
10084-CVGroup_UIEventLobby_Idle4-2 = "0件。"
10084-CVGroup_UIEventMission_Enter1-1 = "老，老師……如果可以的話……"
10084-CVGroup_UIEventMission_Enter1-2 = "帳篷的搭設可以請你幫忙嗎……"
10084-CVGroup_UIEventMission_Enter2-1 = "啊，老師。\n我正依照副部長的指示進行帳篷的搭設。"
10084-CVGroup_UIEventMission_Idle1-1 = "我聽說這是「超簡單搭設」的露營裝備……"
10084-CVGroup_UIEventMission_Idle1-2 = "但設置起來好像一點也不簡單……"
10084-CVGroup_UIEventMission_Idle2-1 = "有什麼想說的話嗎……？"
10084-CVGroup_UIEventMission_Idle2-2 = "請稍等一下。\n我要做錄音的準備。"
10084-CVGroup_UIEventMission_Buy1-1 = "原來如此，我會參考的。"
10084-CVGroup_UIEventMission_Buy2-1 = "剛才那個，能再讓我看一次嗎？"
10084-CVGroup_UIEventMission_Buy2-2 = "可以的話，麻煩一起附上口頭解說。"
10084-CVGroup_UIEventMission_Interaction1-1 = "這樣一來，今晚應該能舒服地度過了。"

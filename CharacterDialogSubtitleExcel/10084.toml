[translation]
10084-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10084-CVGroup_CharacterGet_Idle1-1 = "I found you. Whether it's in the mountains or the seas... I'll capture your voice, Sensei. Wherever you are."
10084-CVGroup_Cafe_Idle1-1 = "This is... It's been trending on social media recently."
10084-CVGroup_Cafe_Idle2-1 = "I know this song... Ugh. What was it called?"
10084-CVGroup_Cafe_Idle3-1 = "I swear I left it somewhere around here..."
10084-CVGroup_Cafe_Idle4-1 = "I finished the recording."
10084-CVGroup_Cafe_Idle5-1 = "(What was that sound? I don't think I've heard that before.)"
10084-CVGroup_WeaponGet_Idle1-1 = "I've been considering modifying my gun to play your voice every time I pull the trigger. That would be nice."
10084-CVGroup_UIEventLobby_Enter1-1 = "Ugh. I can still feel the cold under all these layers."
10084-CVGroup_UIEventLobby_Enter1-2 = "I didn't even realize I was shivering."
10084-CVGroup_UIEventLobby_Enter2-1 = "People who come outdoors like this to celebrate the new year are the poster children of inefficiency."
10084-CVGroup_UIEventLobby_Enter3-1 = "(Not even the vice president will suspect that I brought wiretaps with me.)"
10084-CVGroup_UIEventLobby_Enter3-2 = "(Heehee...)"
10084-CVGroup_UIEventLobby_Enter4-1 = "A BEAR?! Right now??"
10084-CVGroup_UIEventLobby_Enter4-2 = "The universe is working against me."
10084-CVGroup_UIEventLobby_Enter5-1 = "I need to hurry back and edit the audio files with Sensei's voice..."
10084-CVGroup_UIEventLobby_Enter5-2 = "I-I mean, I can't wait to go home and rest!"
10084-CVGroup_UIEventLobby_Idle1-1 = "If there's one thing I can't stand, it's absolute silence."
10084-CVGroup_UIEventLobby_Idle2-1 = "But then again, when it's quiet..."
10084-CVGroup_UIEventLobby_Idle2-2 = "Well, the quieter it is, the better I can hear Sensei's voice."
10084-CVGroup_UIEventLobby_Idle3-1 = "The wind... It's like it's crying."
10084-CVGroup_UIEventLobby_Idle4-1 = "I'm monitoring all frequency communications within a three kilometer radius..."
10084-CVGroup_UIEventLobby_Idle4-2 = "Huh. Nothing."
10084-CVGroup_UIEventMission_Enter1-1 = "S-Sensei! Are you busy?"
10084-CVGroup_UIEventMission_Enter1-2 = "Would you help me with setting up the camp, please?"
10084-CVGroup_UIEventMission_Enter2-1 = "Hello, Sensei. The vice president gave me very specific orders on how to set up the camping equipment. I really am doing my best..."
10084-CVGroup_UIEventMission_Idle1-1 = "I was told that this camping equipment was easy to use..."
10084-CVGroup_UIEventMission_Idle1-2 = "But setting it up isn't easy at all."
10084-CVGroup_UIEventMission_Idle2-1 = "Were you trying to say something...?"
10084-CVGroup_UIEventMission_Idle2-2 = "Wait right there. I'm going to bring my recording devices."
10084-CVGroup_UIEventMission_Buy1-1 = "I see. I'll remember that."
10084-CVGroup_UIEventMission_Buy2-1 = "Can you show me how you did that again?"
10084-CVGroup_UIEventMission_Buy2-2 = "I would like a verbal, step-by-step explanation, please."
10084-CVGroup_UIEventMission_Interaction1-1 = "Sleeping will be a lot more comfortable tonight with this."

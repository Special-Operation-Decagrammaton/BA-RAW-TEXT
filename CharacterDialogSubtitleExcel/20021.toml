[translation]
20021-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20021-CVGroup_CharacterGet_Idle1-1 = "Merry Christmas! Surprise! You get me instead of Santa!"
20021-CVGroup_Cafe_Idle1-1 = "Hi! It's Hanae, Santa outfit edition!"
20021-CVGroup_Cafe_Idle2-1 = "Does anyone need surgery...or a gift?"
20021-CVGroup_Cafe_Idle3-1 = "Remedial Knights are ready to serve, even on Christmas!"
20021-CVGroup_Cafe_Idle4-1 = "Where...is the chimney?"
20021-CVGroup_Cafe_Idle5-1 = "There's a Christmas charity event where yours truly is gonna sing along with everyone!"
20021-CVGroup_WeaponGet_Idle1-1 = "All right, I'm ready!"
20021-CVGroup_UIEventLobby_Enter1-1 = "Sensei! It's finally here! It's Christmas!"
20021-CVGroup_UIEventLobby_Enter1-2 = "Christmas mode, activated!"
20021-CVGroup_UIEventLobby_Enter2-1 = "Sensei, is there anything you want?"
20021-CVGroup_UIEventLobby_Enter2-2 = "I'll write a letter to Santa Claus!"
20021-CVGroup_UIEventLobby_Idle1-1 = "Sensei? Is something wrong?"
20021-CVGroup_UIEventLobby_Idle2-1 = "Why... Why're you looking at me like that?"
20021-CVGroup_UIEventLobby_Idle2-2 = "Do I look weird?"
20021-CVGroup_UIEventLobby_Idle3-1 = "What's wrong? Did you forget something...? No, that's not it?"
20021-CVGroup_UIEventLobby_Idle4-1 = "Ack...! Why do you keep poking me...?"
20021-CVGroup_UIEventLobby_Idle4-2 = "If you don't stop, I'm gonna poke you too, Sensei!"
20021-CVGroup_UIEventLobby_Enter3-1 = "Let's keep it up, Sensei!"
20021-CVGroup_UIEventLobby_Enter4-1 = "We're almost there! It's rewarding, but..."
20021-CVGroup_UIEventLobby_Enter4-2 = "It's a little sad too, you know?"
20021-CVGroup_UIEventLobby_Enter5-1 = "It's time to wrap it up."
20021-CVGroup_UIEventLobby_Enter5-2 = "I'll help you clean up!"
20021-CVGroup_UIEventBoxGachaShop_Enter1-1 = "The Remedial Knights are hosting a charity event right now!"
20021-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Welcome, Sensei! Do you wanna draw some lots?"
20021-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Huh? What's wrong?"
20021-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Today, Santa Hanae is delivering happiness!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Wow, you won!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Heehee. I hope you like my gift."

[translation]
20021-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
20021-CVGroup_CharacterGet_Idle1-1 = "聖誕快樂～！\n作為聖誕老人的代替，花繪來了唷！"
20021-CVGroup_Cafe_Idle1-1 = "你好！\n雖然穿著聖誕服，不過是花繪唷～！"
20021-CVGroup_Cafe_Idle2-1 = "需要手術和禮物的人～\n有在這裡嗎～？"
20021-CVGroup_Cafe_Idle3-1 = "即使是聖誕節，救護騎士團的準備也非常完善！"
20021-CVGroup_Cafe_Idle4-1 = "煙囪……會在哪裡呢？"
20021-CVGroup_Cafe_Idle5-1 = "聖誕節會有慈善活動。\n我也會在那裡和大家一起唱歌唷～"
20021-CVGroup_WeaponGet_Idle1-1 = "好，準備OK！"
20021-CVGroup_UIEventLobby_Enter1-1 = "老師，聖誕節終於來了！"
20021-CVGroup_UIEventLobby_Enter1-2 = "我也進入聖誕節模式了～！"
20021-CVGroup_UIEventLobby_Enter2-1 = "老師有什麼想要的東西嗎？"
20021-CVGroup_UIEventLobby_Enter2-2 = "我會寫一封信跟聖誕老人請求的！"
20021-CVGroup_UIEventLobby_Idle1-1 = "老師，怎麼了？有什麼事嗎？"
20021-CVGroup_UIEventLobby_Idle2-1 = "被那樣盯著看的話……"
20021-CVGroup_UIEventLobby_Idle2-2 = "這樣子，很奇怪嗎？"
20021-CVGroup_UIEventLobby_Idle3-1 = "怎麼了？忘了什麼東西嗎……？\n咦，不是嗎？"
20021-CVGroup_UIEventLobby_Idle4-1 = "唔唔唔……像那樣到處摸的話……"
20021-CVGroup_UIEventLobby_Idle4-2 = "我也會把老師摸回來的！"
20021-CVGroup_UIEventLobby_Enter3-1 = "一起加油吧，老師！"
20021-CVGroup_UIEventLobby_Enter4-1 = "還剩一點！雖然很有成就感……"
20021-CVGroup_UIEventLobby_Enter4-2 = "但也有點寂寞呢。"
20021-CVGroup_UIEventLobby_Enter5-1 = "已經到結束的時間了呢。"
20021-CVGroup_UIEventLobby_Enter5-2 = "我會幫忙收拾的！"
20021-CVGroup_UIEventBoxGachaShop_Enter1-1 = "救護騎士團主辦的慈善活動現正舉辦中！"
20021-CVGroup_UIEventBoxGachaShop_Enter2-1 = "啊，老師！歡迎！要不要來抽個籤呀？"
20021-CVGroup_UIEventBoxGachaShop_Idle1-1 = "咦，有什麼事嗎？"
20021-CVGroup_UIEventBoxGachaShop_Idle2-1 = "今天的聖誕老人花繪會帶給你幸福唷～！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "哇，中大獎了！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "耶嘿嘿。如果你喜歡我的禮物，我會很高興的！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "哇啊……！竟然有這樣的東西……！"
20021-CVGroup_UIEventBoxGachaShop_Enter3-1 = "慈善活動結束了！"
20021-CVGroup_UIEventBoxGachaShop_Enter3-2 = "如果手上還有抽獎券的話，我來幫你兌換！"
20021-CVGroup_UIEventMission_Enter1-1 = "以下是今天要做的事！"
20021-CVGroup_UIEventMission_Enter2-1 = "一件一件，不用著急！"
20021-CVGroup_UIEventMission_Idle1-1 = "那份清單，是在這裡對吧？\n……咦，是哪一個呢？"
20021-CVGroup_UIEventMission_Idle2-1 = "總覺得事情很多呢……"
20021-CVGroup_UIEventMission_Idle2-2 = "這個也能做手術的話就好了。"
20021-CVGroup_UIEventMission_Buy1-1 = "好厲害！不愧是老師！"
20021-CVGroup_UIEventMission_Buy2-1 = "辛苦了，老師。我也很開心！"
20021-CVGroup_UIEventMission_Interaction1-1 = "每天一步步地達成目標是很重要的呢。"
20021-CVGroup_UIEventMission_Interaction1-2 = "你今天也很努力了，老師！"

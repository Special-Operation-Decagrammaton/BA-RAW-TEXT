[translation]
20021-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
20021-CVGroup_CharacterGet_Idle1-1 = "메리 크리스마스~! 산타 할아버지 대신 하나에가 왔어요!"
20021-CVGroup_Cafe_Idle1-1 = "안녕하세요! 산타복이지만 하나에예요~!"
20021-CVGroup_Cafe_Idle2-1 = "수술과 선물이 필요하신 분, 계신가요?"
20021-CVGroup_Cafe_Idle3-1 = "크리스마스에도 구호기사단은 준비 되어 있답니다."
20021-CVGroup_Cafe_Idle4-1 = "굴뚝은… 어디에 있을까요?"
20021-CVGroup_Cafe_Idle5-1 = "크리스마스에는 자선 이벤트가 있어요.\n저도 거기에서 모두와 같이 노래를 부를 거예요~"
20021-CVGroup_WeaponGet_Idle1-1 = "좋았어, 준비 오케이예요!"
20021-CVGroup_UIEventLobby_Enter1-1 = "선생님, 드디어 크리스마스가 찾아왔습니다!"
20021-CVGroup_UIEventLobby_Enter1-2 = "저도 크리스마스 모드예요~!"
20021-CVGroup_UIEventLobby_Enter2-1 = "선생님은 뭔가 바라는 것이 있으세요?"
20021-CVGroup_UIEventLobby_Enter2-2 = "제가 산타클로스께 편지를 써 드릴게요!"
20021-CVGroup_UIEventLobby_Idle1-1 = "선생님, 왜 그러세요? 무슨 일이라도 있으신가요?"
20021-CVGroup_UIEventLobby_Idle2-1 = "그렇게 계속 바라보시면……"
20021-CVGroup_UIEventLobby_Idle2-2 = "이 복장, 이상한가요?"
20021-CVGroup_UIEventLobby_Idle3-1 = "왜 그러세요? 뭔가 잊어버린 물건이라도…… 어, 아니라고요?"
20021-CVGroup_UIEventLobby_Idle4-1 = "으우우…… 자꾸 쿡쿡 찌르시면……"
20021-CVGroup_UIEventLobby_Idle4-2 = "저도 선생님을 마구 찔러 버릴 거예요!"
20021-CVGroup_UIEventLobby_Enter3-1 = "함께 힘내죠, 선생님!"
20021-CVGroup_UIEventLobby_Enter4-1 = "이제 거의 다 왔어요! 보람차지만……"
20021-CVGroup_UIEventLobby_Enter4-2 = "조금, 아쉽기도 하네요."
20021-CVGroup_UIEventLobby_Enter5-1 = "벌써 정리할 시간이네요."
20021-CVGroup_UIEventLobby_Enter5-2 = "뒷정리, 도와드릴게요!"
20021-CVGroup_UIEventBoxGachaShop_Enter1-1 = "구호기사단이 주관하는 자선 행사가 개최 중이에요!"
20021-CVGroup_UIEventBoxGachaShop_Enter2-1 = "앗, 선생님! 어서 오세요! 제비뽑기는 어떠신가요?"
20021-CVGroup_UIEventBoxGachaShop_Idle1-1 = "네? 무슨 문제라도 있으신가요?"
20021-CVGroup_UIEventBoxGachaShop_Idle2-1 = "오늘의 하나에 산타는 행복을 전한답니다~!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "우와, 당첨이네요!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "후후, 제 선물이 마음에 드셨으면 좋겠어요!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "와아……! 이런 것이 들어 있었다니…!"
20021-CVGroup_UIEventBoxGachaShop_Enter3-1 = "자선 이벤트는 종료되었습니다!"
20021-CVGroup_UIEventBoxGachaShop_Enter3-2 = "아직 추첨권을 가지고 계신다면 제가 교환해드릴게요!"
20021-CVGroup_UIEventMission_Enter1-1 = "오늘 할 일은 이쪽이에요!"
20021-CVGroup_UIEventMission_Enter2-1 = "하나씩, 조급해하지 말고 진행하죠!"
20021-CVGroup_UIEventMission_Idle1-1 = "이 리스트, 여기 맞나? ……어, 어느 쪽이지?"
20021-CVGroup_UIEventMission_Idle2-1 = "뭔가 일이 많네요……"
20021-CVGroup_UIEventMission_Idle2-2 = "이것도 수술해 버릴 수 있으면 좋을 텐데요."
20021-CVGroup_UIEventMission_Buy1-1 = "대단해요! 역시 선생님이세요!"
20021-CVGroup_UIEventMission_Buy2-1 = "수고하셨어요, 선생님! 저도 기뻐요!"
20021-CVGroup_UIEventMission_Interaction1-1 = "목표는 매일 꾸준히 달성하는 것이 중요하잖아요."
20021-CVGroup_UIEventMission_Interaction1-2 = "오늘도 열심히 하셨어요, 선생님!"

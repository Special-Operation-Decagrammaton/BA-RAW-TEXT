20021-CVGroup_UIEventBoxGachaShop_Enter3-1 = "The charity event is over!"
20021-CVGroup_UIEventBoxGachaShop_Enter3-2 = "If you still have a lottery ticket, I'll exchange it for you!"
20021-CVGroup_UIEventMission_Enter1-1 = "I'll show you today's work!"
20021-CVGroup_UIEventMission_Enter2-1 = "Let's tackle it step-by-step!"
20021-CVGroup_UIEventMission_Idle1-1 = "This list... Is this right? Wh-Which one...?"
20021-CVGroup_UIEventMission_Idle2-1 = "There's so much..."
20021-CVGroup_UIEventMission_Idle2-2 = "I wish I could perform surgery on this."
20021-CVGroup_UIEventMission_Buy1-1 = "Amazing! I knew I could count on you!"
20021-CVGroup_UIEventMission_Buy2-1 = "Great work, Sensei! I'm so happy!"

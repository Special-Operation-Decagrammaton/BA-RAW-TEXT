[translation]
10075-CVGroup_UITitle_Idle1-1 = "블루 아카이브~"
10075-CVGroup_CharacterGet_Idle1-1 = "야호~! 나는 지식해방전선의 히메키 메루!\n메루리라고 불러도 돼, 아, 이건 펜네임이야. 잘 부탁해, 선생."
10075-CVGroup_Cafe_Idle1-1 = "소재…… 소재는 어디냐……!"
10075-CVGroup_Cafe_Idle2-1 = "기다려, 기다려…… 저 광경은, 어쩌면……?"
10075-CVGroup_Cafe_Idle3-1 = "역시 그림 실력이 더 필요해……"
10075-CVGroup_Cafe_Idle4-1 = "조금 더 손이 빨라지지는 않으려나…… 거기에 눈과 머리 회전도!"
10075-CVGroup_Cafe_Idle5-1 = "동인지를 낼 때는, 펜네임을 사용하지."
10075-CVGroup_WeaponGet_Idle1-1 = "명필은 붓을 가리지 않는다지만, 그래도 도구는 중요하니까 말야.\n저기…… 그러니까, 고맙다는 뜻이야. 선생."
10075-CVGroup_UIEventLobby_Enter1-1 = "좋아. 선생도 온 참이고. 지금부터, 지식해방전선의 시간이야!"
10075-CVGroup_UIEventLobby_Enter2-1 = "어서 와. 선생. 여러 가지 일들이 일어나고 있는 것 같고, 밖으로 나갈까!"
10075-CVGroup_UIEventLobby_Enter2-2 = "모처럼 소재를 찾을 수 있는 찬스, 놓칠 수는 없잖아?"
10075-CVGroup_UIEventLobby_Enter3-1 = "이런 일이 될 거라고는, 처음에는 생각도 못 했는데 말야……"
10075-CVGroup_UIEventLobby_Enter4-1 = "설마 이런 전개가 되다니……"
10075-CVGroup_UIEventLobby_Enter4-2 = "정말, 인생 어떻게 될지 모르는 거구만……"
10075-CVGroup_UIEventLobby_Enter5-1 = "여러 가지 일이 있었지만, 어떻게든 정리됐네."
10075-CVGroup_UIEventLobby_Enter5-2 = "자료도 많이 모였고, 결과적으로 잘 됐다는 것으로!"
10075-CVGroup_UIEventLobby_Idle1-1 = "불렀어?"
10075-CVGroup_UIEventLobby_Idle1-2 = "나? ……바쁘지만 바쁘지 않은, 그런 상태지."
10075-CVGroup_UIEventLobby_Idle2-1 = "모미지는 등을 맡길 수 있는 동료이자, 후배지!"
10075-CVGroup_UIEventLobby_Idle2-2 = "취향은 뭐…… 사람마다 다른 법이고?"
10075-CVGroup_UIEventLobby_Idle3-1 = "왜? 선생…… 혹시 한가해?"
10075-CVGroup_UIEventLobby_Idle3-2 = "딱히, 놀아 줘도 좋은데 말이지~?"
10075-CVGroup_UIEventLobby_Idle4-1 = "가, 간지럽다니까…… 정말! 그쯤 해 둬!"
10075-CVGroup_UIEventMission_Enter1-1 = "미션!"
10075-CVGroup_UIEventMission_Enter1-2 = "원고 마감도, 일종의 미션이라고 생각하고 도전하고 있어."
10075-CVGroup_UIEventMission_Enter2-1 = "맡겨진 이상, 확실하게 처리한다! 그것이 지식해방전선이니까!"
10075-CVGroup_UIEventMission_Idle1-1 = "왜? 선생? ……불러 봤을 뿐이라고?"
10075-CVGroup_UIEventMission_Idle1-2 = "이야~ 그런 대사, 직구로 말하면 나도 반응하기 곤란하단 말이지."
10075-CVGroup_UIEventMission_Buy1-1 = "오, 대단해. 대단해! 빈말이 아니야! 진심이라고!"
10075-CVGroup_UIEventMission_Buy1-2 = "자, 이 엄청나게 진지한 눈을 보라고!"
10075-CVGroup_UIEventMission_Buy2-1 = "미션 컴플리트! 보상을 받아가세요~!"
10075-CVGroup_UIEventMission_Buy2-2 = "어때? 내 영업 미소."
10075-CVGroup_UIEventMission_Interaction1-1 = "일과 컴플리트! 성실하구만, 선생은…… 나도 조금 본받아야 하나."

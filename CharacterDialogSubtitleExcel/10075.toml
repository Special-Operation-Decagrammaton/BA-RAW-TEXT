[translation]
10075-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10075-CVGroup_CharacterGet_Idle1-1 = "ยะโฮ่~! ฮิเมกิ เมรุจากชมรมแนวร่วมปลดปล่อยความรู้!\nเรียกว่าเมรูริก็ได้ อ๊ะ มันเป็นนามปากกาน่ะ\nขอฝากตัวด้วยนะ คุณครู "
10075-CVGroup_Cafe_Idle1-1 = "แรงบันดาลใจ...\nแรงบันดาลใจอยู่ไหน...!"
10075-CVGroup_Cafe_Idle2-1 = "รอก่อน... รอก่อน...\nภาพนั้น... บางที...?"
10075-CVGroup_Cafe_Idle3-1 = "คิดแล้วเชียวว่าต้องฝึก\nสกิลวาดรูปให้มากกว่านี้..."
10075-CVGroup_Cafe_Idle4-1 = "ถ้าวาดได้เร็วขึ้นกว่านี้ละก็...\nความคิดแล้วก็สายตาต้องไวขึ้นด้วย!"
10075-CVGroup_Cafe_Idle5-1 = "ตอนที่ปล่อยโดจินชิออกไปน่ะ\nต้องใช้นามปากกาสิ"
10075-CVGroup_WeaponGet_Idle1-1 = "ถึงลายมือจะไม่ได้ขึ้นอยู่กับปากกา\nแต่ยังไงอุปกรณ์ก็เป็นสิ่งสำคัญอย่างหนึ่ง\nเอาเป็นว่าขอบคุณนะ ครู"
10075-CVGroup_UIEventLobby_Enter1-1 = "ดีละ ครูก็มาถึงแล้ว\nต่อไปนี้คือเวลาของชมรมแนวร่วมปลดปล่อยความรู้!"
10075-CVGroup_UIEventLobby_Enter2-1 = "เข้ามาเลย ครู\nตอนนี้น่าจะมีเรื่องเกิดขึ้นเยอะเลยละ\nไปข้างนอกกันมั้ย!"
10075-CVGroup_UIEventLobby_Enter2-2 = "นี่เป็นโอกาสในการหาแรงบันดาลใจเลยนะ\nจะพลาดได้ยังไงกันล่ะ?"
10075-CVGroup_UIEventLobby_Enter3-1 = "ตอนแรกไม่ได้คิดเลยว่าจะกลายเป็นเรื่องแบบนี้ไปได้..."
10075-CVGroup_UIEventLobby_Enter4-1 = "คิดไม่ถึงเลยว่าจะออกมาเป็นแบบนี้..."
10075-CVGroup_UIEventLobby_Enter4-2 = "ไม่รู้เลยจริงๆ ว่าชีวิตจะออกมาเป็นยังไง..."
10075-CVGroup_UIEventLobby_Enter5-1 = "ถึงจะเกิดเรื่องขึ้นมากมาย\nแต่ยังไงก็จัดการให้เรียบร้อยจนได้นะ"
10075-CVGroup_UIEventLobby_Enter5-2 = "ข้อมูลก็หามาได้เพียบเลย\nสรุปแล้วก็ถือว่าทำได้ดีเลยละ!"
10075-CVGroup_UIEventLobby_Idle1-1 = "เรียกฉันเหรอ?"
10075-CVGroup_UIEventLobby_Idle1-2 = "ฉันเหรอ? ...ก็ยุ่งอยู่หรอกนะ\nแต่ก็ดูเหมือนไม่ได้ยุ่งน่ะ"
10075-CVGroup_UIEventLobby_Idle2-1 = "โมมิจิเป็นทั้งเพื่อนและรุ่นน้องที่ฉันไว้วางใจได้!"
10075-CVGroup_UIEventLobby_Idle2-2 = "เรื่องรสนิยมก็... แต่ละคนก็ต่างกันออกไปนี่นะ?"
10075-CVGroup_UIEventLobby_Idle3-1 = "ทำไมเหรอ? ครู... มีเวลาว่างมั้ย?"
10075-CVGroup_UIEventLobby_Idle3-2 = "ฉันอยากให้มาเล่นกับฉันหน่อยน่ะ~"
10075-CVGroup_UIEventLobby_Idle4-1 = "มะ... มันจั๊กจี้นะ...\nจริงๆ เลย! พอได้แล้ว!"
10075-CVGroup_UIEventMission_Enter1-1 = "ภารกิจ!"
10075-CVGroup_UIEventMission_Enter1-2 = "ฉันคิดและท้าทายตัวเองเสมอว่า\nการส่งต้นฉบับเป็นภารกิจอย่างหนึ่ง"
10075-CVGroup_UIEventMission_Enter2-1 = "ถ้าเป็นงานของฉัน ฉันจะจัดการแน่นอน!\nนั่นละชมรมแนวร่วมปลดปล่อยความรู้!"
10075-CVGroup_UIEventMission_Idle1-1 = "ทำไมเหรอ? ครู? ...แค่ลองเรียกดูงั้นเหรอ?"
10075-CVGroup_UIEventMission_Idle1-2 = "นี่~ ถ้าพูดบทนั้นมาตรงๆ ฉันก็ตอบโต้ลำบากน่ะสิ"
10075-CVGroup_UIEventMission_Buy1-1 = "ว้าว สุดยอด! สุดยอดเลย!\nไม่ได้พูดไปงั้นๆ นะ! ฉันหมายความแบบนั้นจริงๆ!"
10075-CVGroup_UIEventMission_Buy1-2 = "เอาละ มาดูสายตาคู่ที่จริงจังนี่สิ!"
10075-CVGroup_UIEventMission_Buy2-1 = "มิชชัน คอมพลีต!\nไปรับรางวัลได้เลยค่า~!"
10075-CVGroup_UIEventMission_Buy2-2 = "เป็นไงบ้าง? รอยยิ้มรับลูกค้าของฉันน่ะ"
10075-CVGroup_UIEventMission_Interaction1-1 = "งานประจำวัน คอมพลีต!\nครูขยันจังเลยนะ...\nฉันต้องเอาเป็นแบบอย่างแล้วมั้ย"

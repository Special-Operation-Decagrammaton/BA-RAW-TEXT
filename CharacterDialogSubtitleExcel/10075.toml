[translation]
10075-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10075-CVGroup_CharacterGet_Idle1-1 = "Hallo! I'm Himeki Meru from the Knowledge Liberation Front! But you can call me by my pen name, Meruri. Nice to meet you, Sensei."
10075-CVGroup_Cafe_Idle1-1 = "Now, where can I find some inspiration...?"
10075-CVGroup_Cafe_Idle2-1 = "Wait, wait... That view. Maybe...?"
10075-CVGroup_Cafe_Idle3-1 = "I really do need to work on my drawing skills..."
10075-CVGroup_Cafe_Idle4-1 = "If only my hands were faster...and my eyes and mind!"
10075-CVGroup_Cafe_Idle5-1 = "I publish all of my fan fiction under my pen name."
10075-CVGroup_WeaponGet_Idle1-1 = "They say that a skilled painter doesn't discriminate between brushes. Still, her tools are important. What I'm trying to say is thank you, Sensei."
10075-CVGroup_UIEventLobby_Enter1-1 = "Sensei's here. It's the Knowledge Liberation Front's time!"
10075-CVGroup_UIEventLobby_Enter2-1 = "Welcome, Sensei. It looks like there's a lot going on. Let's head outside!"
10075-CVGroup_UIEventLobby_Enter2-2 = "I hope we discover something to inspire my next book!"
10075-CVGroup_UIEventLobby_Enter3-1 = "I never imagined things would turn out this way..."
10075-CVGroup_UIEventLobby_Enter4-1 = "I can't believe how the story unfolded..."
10075-CVGroup_UIEventLobby_Enter4-2 = "You never can tell where life will lead you..."
10075-CVGroup_UIEventLobby_Enter5-1 = "We've been through a lot, but things have settled down..."
10075-CVGroup_UIEventLobby_Enter5-2 = "And we collected plenty, so ultimately, this was a success."
10075-CVGroup_UIEventLobby_Idle1-1 = "Did you call me?"
10075-CVGroup_UIEventLobby_Idle1-2 = "Me? I'm busy, but...also not busy at all."
10075-CVGroup_UIEventLobby_Idle2-1 = "Momiji is a colleague and underclassman I can trust to have my back!"
10075-CVGroup_UIEventLobby_Idle2-2 = "Everyone has their own preferences, right?"
10075-CVGroup_UIEventLobby_Idle3-1 = "Why? Sensei... Do you have too much time on your hands?"
10075-CVGroup_UIEventLobby_Idle3-2 = "Well, I guess I can play with you for a bit."
10075-CVGroup_UIEventLobby_Idle4-1 = "Th-That tickles! Stop it! That's enough!"
10075-CVGroup_UIEventMission_Enter1-1 = "A mission!"
10075-CVGroup_UIEventMission_Enter1-2 = "Finishing each manuscript is a mission for me to complete!"
10075-CVGroup_UIEventMission_Enter2-1 = "I can handle anything entrusted to me! That's the Knowledge Liberation Front promise!"
10075-CVGroup_UIEventMission_Idle1-1 = "Yes? Sensei? ...You just wanted to call my name?"
10075-CVGroup_UIEventMission_Idle1-2 = "Wow. When you throw a line like that at me, I don't know how to respond."
10075-CVGroup_UIEventMission_Buy1-1 = "Wow, that's amazing. Truly amazing. I'm not just saying that. I mean it!"
10075-CVGroup_UIEventMission_Buy1-2 = "Just look at how sincere my eyes are!"
10075-CVGroup_UIEventMission_Buy2-1 = "Mission complete! Come get your reward!"
10075-CVGroup_UIEventMission_Buy2-2 = "What do you think of my salesmanship smile?"
10075-CVGroup_UIEventMission_Interaction1-1 = "Daily tasks complete! You are really diligent, Sensei... Maybe I could learn from you."

[translation]
10075-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～"
10075-CVGroup_CharacterGet_Idle1-1 = "呀齁～！我是知識解放戰線的姬木愛瑠！\n叫我「Meruri」也行唷，啊，那個是我的筆名。\n請多指教，老師。"
10075-CVGroup_Cafe_Idle1-1 = "素材……\n素材在哪裡……！"
10075-CVGroup_Cafe_Idle2-1 = "等等等等……\n那個情景，說不定……？"
10075-CVGroup_Cafe_Idle3-1 = "果然……還是想要更強的畫力啊……"
10075-CVGroup_Cafe_Idle4-1 = "能不能再讓手速更快一點呢……\n眼睛和腦袋也順便！"
10075-CVGroup_Cafe_Idle5-1 = "出同人誌的時候，不會用本名的哦。"
10075-CVGroup_WeaponGet_Idle1-1 = "雖然有句話說「善書不擇筆」，\n但工具還是很重要的。\n那個……就是，謝謝你的意思。老師。"
10075-CVGroup_UIEventLobby_Enter1-1 = "好，既然老師也來了，\n從現在開始，是知識解放戰線的時間囉！"
10075-CVGroup_UIEventLobby_Enter2-1 = "歡迎回來，老師。\n好像發生了各種事件，我們到外頭去吧！"
10075-CVGroup_UIEventLobby_Enter2-2 = "這是難得可以收集素材的好機會，不能錯過吧？"
10075-CVGroup_UIEventLobby_Enter3-1 = "事情居然會演變成這樣，我一開始從來沒想過……"
10075-CVGroup_UIEventLobby_Enter4-1 = "事情居然會這樣發展……"
10075-CVGroup_UIEventLobby_Enter4-2 = "真的是，人生世事難料啊……"
10075-CVGroup_UIEventLobby_Enter5-1 = "雖然發生了各種事，總算是收拾好了呢。"
10075-CVGroup_UIEventLobby_Enter5-2 = "資料也收集了不少，從結果來看是好的！"
10075-CVGroup_UIEventLobby_Idle1-1 = "你叫我嗎？"
10075-CVGroup_UIEventLobby_Idle1-2 = "我……？有點忙又不太忙，大概是這種狀態吧。"
10075-CVGroup_UIEventLobby_Idle2-1 = "紅葉是值得信賴的同伴，也是後輩唷！"
10075-CVGroup_UIEventLobby_Idle2-2 = "至於喜好嘛……就因人而異囉？"
10075-CVGroup_UIEventLobby_Idle3-1 = "怎麼了？老師……難道你現在有空？"
10075-CVGroup_UIEventLobby_Idle3-2 = "要陪你玩也可以唷～？"
10075-CVGroup_UIEventLobby_Idle4-1 = "都，都說很癢了……\n真是的！請適可而止！"
10075-CVGroup_UIEventMission_Enter1-1 = "任務！"
10075-CVGroup_UIEventMission_Enter1-2 = "我把原稿的截稿時間也視為一種任務並向其挑戰。"
10075-CVGroup_UIEventMission_Enter2-1 = "既然接受了，就要確實完成！\n這就是知識解放戰線！"
10075-CVGroup_UIEventMission_Idle1-1 = "怎麼了？老師？\n……只是想叫我而已？"
10075-CVGroup_UIEventMission_Idle1-2 = "哎呀～那種台詞，這麼直球地告訴我，我也會不知道該如何反應的。"
10075-CVGroup_UIEventMission_Buy1-1 = "哦哦，好厲害好厲害！\n這不是客套話唷！是真心唷！"
10075-CVGroup_UIEventMission_Buy1-2 = "來，看看我真摯又認真的眼神！"
10075-CVGroup_UIEventMission_Buy2-1 = "任務完成！請領取獎勵～！"
10075-CVGroup_UIEventMission_Buy2-2 = "怎麼樣？我的職業笑容。"
10075-CVGroup_UIEventMission_Interaction1-1 = "每日工作完成！\n真是耿直啊，老師……我是不是也該向你學習一下呢。"

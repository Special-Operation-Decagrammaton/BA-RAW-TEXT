[translation]
10023-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10023-CVGroup_CharacterGet_Idle1-1 = "I'm not joking! This is all part of the recon mission."
10023-CVGroup_Cafe_Idle1-1 = "Surely there won't be students, drunk off the resort atmosphere, causing mischief here, right?"
10023-CVGroup_Cafe_Idle2-1 = "Looks like there isn't anyone...out of line."
10023-CVGroup_Cafe_Idle3-1 = "(Would this be enough to protect from UV rays?)"
10023-CVGroup_Cafe_Idle4-1 = "(Is there an ideal place to open up the sun bed...?)"
10023-CVGroup_Cafe_Idle5-1 = "(Aaah! No wonder I felt like someone was staring.)"
10023-CVGroup_WeaponGet_Idle1-1 = "This is...a proper weapon? Really?"
10023-CVGroup_UIEventShop_Enter1-1 = "You're here, Sensei. We've prepared whatever you might need for summer camp."
10023-CVGroup_UIEventShop_Idle1-1 = "My schedule is always a lot lighter compared to the president."
10023-CVGroup_UIEventShop_Buy1-1 = "Hmm. That's not bad."
10023-CVGroup_UIEventShop_Buy2-1 = "Not bad, Sensei."
10023-CVGroup_UIEventBoxGachaShop_Enter1-1 = "You can trade in Gehenna supply boxes right here."
10023-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Why are you staring like that?"
10023-CVGroup_UIEventBoxGachaShop_Idle1-2 = "Nothing's free, period."
10023-CVGroup_UIEventBoxGachaShop_Enter2-1 = "We're already halfway through camp. You should hurry if there's anything you need."
10023-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Not many days left for summer camp. If you need something, be sure to let me know soon."
10023-CVGroup_UIEventBoxGachaShop_Enter4-1 = "Is today the last day? It was an eventful break."
10023-CVGroup_UIEventBoxGachaShop_Enter4-2 = "What a summer camp."
10023-CVGroup_UIEventBoxGachaShop_Enter5-1 = "Summer training is all over. Check if there's anything left behind."
10023-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Huh, there was something like that lying around? You're lucky, Sensei."

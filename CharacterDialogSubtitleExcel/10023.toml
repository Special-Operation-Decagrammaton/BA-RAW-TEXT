[translation]
10023-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10023-CVGroup_CharacterGet_Idle1-1 = "……並，並不是在玩。\n正在偵察任務的途中，不要誤會。"
10023-CVGroup_Cafe_Idle1-1 = "就算是渡假勝地，\n我也不會允許違反規則的。"
10023-CVGroup_Cafe_Idle2-1 = "違反規則的傢伙……\n現在看起來沒有呢。"
10023-CVGroup_Cafe_Idle3-1 = "（紫外線對策，得確實做好才行……）"
10023-CVGroup_Cafe_Idle4-1 = "（有沒有感覺能把沙灘床展開的地方……）"
10023-CVGroup_Cafe_Idle5-1 = "（總，總覺得剛才，感覺到噁心的視線……）"
10023-CVGroup_WeaponGet_Idle1-1 = "這是……正常的武器嗎？\n真的？"
10023-CVGroup_UIEventShop_Enter1-1 = "呀，老師。\n夏季合宿需要的東西，\n幾乎都準備好了唷。"
10023-CVGroup_UIEventShop_Idle1-1 = "和陽奈委員長的忙碌程度相比，\n這點程度的事不算什麼。"
10023-CVGroup_UIEventShop_Buy1-1 = "嗯，不錯嘛？"
10023-CVGroup_UIEventShop_Buy2-1 = "嘿，氣度不錯嘛。老師。"
10023-CVGroup_UIEventBoxGachaShop_Enter1-1 = "如果撿到有格黑娜校徽的箱子的話，就拿過來吧。\n可以交換各種東西唷。"
10023-CVGroup_UIEventBoxGachaShop_Idle1-1 = "……為什麼一直盯著這裡看？"
10023-CVGroup_UIEventBoxGachaShop_Idle1-2 = "可不能免費給你啊。"
10023-CVGroup_UIEventBoxGachaShop_Enter2-1 = "合宿時間只剩下一半。需要什麼東西的話，加緊腳步比較好。"
10023-CVGroup_UIEventBoxGachaShop_Enter3-1 = "合宿時間所剩不多了。\n需要什麼的話早點告訴我。"
10023-CVGroup_UIEventBoxGachaShop_Enter4-1 = "今天就是最後一天啊。\n真是讓人暈頭轉向的休……"
10023-CVGroup_UIEventBoxGachaShop_Enter4-2 = "不，是合宿。"
10023-CVGroup_UIEventBoxGachaShop_Enter5-1 = "來，夏天已經結束了唷。\n確認一下有沒有剩下什麼東西吧。"
10023-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "嘿……還有這種東西啊。\n老師的運氣很好呢。"

[translation]
10023-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10023-CVGroup_CharacterGet_Idle1-1 = "따, 딱히 놀고 있는 거 아니거든. 정찰 임무 중이니까 오해하지 마."
10023-CVGroup_Cafe_Idle1-1 = "휴양지의 분위기에 취해 일탈을 저지르는 학생들은 여기 없겠지?"
10023-CVGroup_Cafe_Idle2-1 = "교칙 위반자는…… 없는 것 같네."
10023-CVGroup_Cafe_Idle3-1 = "(자외선 차단 대책은 이만하면 충분하겠지?)"
10023-CVGroup_Cafe_Idle4-1 = "(선베드를 펼칠만한 장소가 어디 없으려나….)"
10023-CVGroup_Cafe_Idle5-1 = "(……으힉?! 어쩐지 방금 기분 나쁜 시선이…….)"
10023-CVGroup_WeaponGet_Idle1-1 = "이거…… 제대로 된 무기 맞아? 정말로?"
10023-CVGroup_UIEventShop_Enter1-1 = "왔구나, 선생. 여름 합숙에 필요한 물건이라면, 뭐든지 준비되어 있어."
10023-CVGroup_UIEventShop_Idle1-1 = "부장의 업무에 비하면 이 정도의 일은 별 거 아냐."
10023-CVGroup_UIEventShop_Buy1-1 = "흠, 괜찮은 물건이네."
10023-CVGroup_UIEventShop_Buy2-1 = "선생치고는 제법인걸"
10023-CVGroup_UIEventBoxGachaShop_Enter1-1 = "게헨나의 교표가 찍힌 보급 상자를 주웠다면 이곳에서 교환할 수 있어."
10023-CVGroup_UIEventBoxGachaShop_Idle1-1 = "……왜 여길 가만히 보고 있는 거야?"
10023-CVGroup_UIEventBoxGachaShop_Idle1-2 = "공짜로는 못 줘."
10023-CVGroup_UIEventBoxGachaShop_Enter2-1 = "합숙 기간도 이제 절반 밖에 남지 않았네. 필요한 물건이 있다면 미리 서둘러."
10023-CVGroup_UIEventBoxGachaShop_Enter3-1 = "합숙 기간도 얼마 남지 않았어. 뭔가 필요한 게 있다면 빨리 말하도록 해."
10023-CVGroup_UIEventBoxGachaShop_Enter4-1 = "오늘이 마지막 날인가. 정말 다사다난한 휴가……"
10023-CVGroup_UIEventBoxGachaShop_Enter4-2 = "아니, 하계 합숙이었어."
10023-CVGroup_UIEventBoxGachaShop_Enter5-1 = "하계 훈련은 모두 끝났어. 남은 물건은 없는지 확인해봐."
10023-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "헤에…… 그런 게 있었구나. 선생은 운이 좋네."

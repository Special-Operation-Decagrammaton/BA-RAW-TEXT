[translation]
10026-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10026-CVGroup_CharacterGet_Idle1-1 = "ชุดนี่มันแปลกจริงๆ นะ...\nแต่ก็ช่วยให้ขยับตัวได้สะดวกจนน่าตกใจเลยล่ะ ฮะฮ่าฮ่า!"
10026-CVGroup_Cafe_Idle1-1 = "รู้สึกเหมือนว่ามีแต่คนจ้องเอาๆ เลยนะ...\nเพราะชุดงั้นเหรอ?"
10026-CVGroup_Cafe_Idle2-1 = "เกินคาดเลย\nชุดนี้ใส่แล้วคล่องตัวกว่าตอนใส่ชุดเมดอีก"
10026-CVGroup_Cafe_Idle3-1 = "อ๊ะ? มองอะไรเล่า ยังไม่หันไปอีก?"
10026-CVGroup_Cafe_Idle4-1 = "ที่นี่ก็ไม่เลวเลยนะ\nถ้าแบบนี้ละก็มาบ่อยๆ คงไม่เป็นไร"
10026-CVGroup_Cafe_Idle5-1 = "คุณครู... อยู่รึเปล่า? ไปข้างนอกเหรอ?\nปะ...เปล่า ไม่มีอะไรหรอก"
10026-CVGroup_WeaponGet_Idle1-1 = "เฮอะ ถ้าทำแบบนี้ละก็ คงจะออกไปแบบดีๆ ไม่ได้แน่...\nเอาละ มาลองกันหน่อยแล้วกัน"
10026-CVGroup_UIEventLobby_Enter1-1 = "เอาล่ะ...! ได้เวลาทำงานแล้วคุณครู!"
10026-CVGroup_UIEventLobby_Enter2-1 = "ไม่มีเวลาพักแล้วนะ เริ่มเลยแล้วกัน!"
10026-CVGroup_UIEventLobby_Idle1-1 = "มีงานอะไรที่จะให้ทำหรือเปล่าคุณครู?"
10026-CVGroup_UIEventLobby_Idle2-1 = "ฮะฮ่าฮ่าฮ่า! ไม่เลวเลยนี่!"
10026-CVGroup_UIEventLobby_Idle3-1 = "ไม่มีเวลามาอืดอาดแล้วนะ"
10026-CVGroup_UIEventLobby_Idle4-1 = "ทะ...ทำไมถึงจ้องกันแบบนั้นล่ะ รีบทำงานกันได้แล้ว"
10026-CVGroup_UIEventLobby_Enter3-1 = "ฉันเป็นพวกที่ชอบเตรียมการไว้ล่วงหน้าน่ะ"
10026-CVGroup_UIEventLobby_Enter4-1 = "มาทำงานให้เสร็จให้เรียบร้อยกันเถอะ"
10026-CVGroup_UIEventLobby_Enter5-1 = "งานเก็บกวาดเหรอ?\nเรื่องนั้นฉันถนัดเลยนะ!"
10026-CVGroup_UIEventMission_Enter1-1 = "เอาละ~ ไปทำความสะอาดกันเลยมั้ย?"
10026-CVGroup_UIEventMission_Enter2-1 = "รีบๆ เริ่มได้แล้ว"
10026-CVGroup_UIEventMission_Idle1-1 = "อะไรน่ะ มาให้กำลังใจฉันเหรอ?\nเฮอะ! บันเทิงชะมัด"
10026-CVGroup_UIEventMission_Idle2-1 = "ถ้าเป็นฉันละก็ แค่นี้เรื่องกล้วยๆ!"
10026-CVGroup_UIEventMission_Buy1-1 = "หืมม... มีเซนส์เหมือนกันนะเนี่ย?"
10026-CVGroup_UIEventMission_Buy2-1 = "ทำงานก็ต้องทำให้ชัดเจน"
10026-CVGroup_UIEventMission_Interaction1-1 = "ทำความสะอาดเสร็จสิ้น"

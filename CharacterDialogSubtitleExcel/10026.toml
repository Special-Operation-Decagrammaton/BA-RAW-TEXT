[translation]
10026-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10026-CVGroup_CharacterGet_Idle1-1 = "真是，為什麼要穿這種奇怪的衣服…\n算了，意外還算方便行動所以也無所謂啦，哈哈！"
10026-CVGroup_Cafe_Idle1-1 = "總覺得，視線好像比平時還……\n是因為這件衣服嗎？"
10026-CVGroup_Cafe_Idle2-1 = "比女僕服還好行動呢，還不錯。"
10026-CVGroup_Cafe_Idle3-1 = "啊啊？看什麼看啊？\n想幹架嗎？啊？"
10026-CVGroup_Cafe_Idle4-1 = "……哼，是個還不錯的地方呢。\n下次再來吧。"
10026-CVGroup_Cafe_Idle5-1 = "老師他……不在啊，出差中嗎？\n不，不是，其實怎樣都無所謂……"
10026-CVGroup_WeaponGet_Idle1-1 = "哈，都奉獻到這個地步的話，就得盡情盛大的幹才行呢……\n來吧，能撐到什麼時候？"
10026-CVGroup_UIEventLobby_Enter1-1 = "喂！工作時間到囉，老師！"
10026-CVGroup_UIEventLobby_Enter2-1 = "沒時間摸魚了，走吧！"
10026-CVGroup_UIEventLobby_Idle1-1 = "有什麼事需要我幫忙嗎，老師？"
10026-CVGroup_UIEventLobby_Idle2-1 = "哈哈！不錯嘛！"
10026-CVGroup_UIEventLobby_Idle3-1 = "那麼，不是做這種事的時候了。"
10026-CVGroup_UIEventLobby_Idle4-1 = "為，為什麼要那樣一直盯著我看啊……\n來，趕快開始工作吧。"
10026-CVGroup_UIEventLobby_Enter3-1 = "我是要做就要做得徹底的類型。"
10026-CVGroup_UIEventLobby_Enter4-1 = "喂，趕快開始收拾吧！"
10026-CVGroup_UIEventLobby_Enter5-1 = "善後工作就交給我吧，那是我擅長的領域！"
10026-CVGroup_UIEventMission_Enter1-1 = "那麼～去清掃一下吧？"
10026-CVGroup_UIEventMission_Enter2-1 = "那麼，快開始吧！"
10026-CVGroup_UIEventMission_Idle1-1 = "什麼？你是在鼓勵我嗎？\n哈！真有趣。"
10026-CVGroup_UIEventMission_Idle2-1 = "對我來說，這只是小菜一碟！"
10026-CVGroup_UIEventMission_Buy1-1 = "嘿，挺有品味的嘛？"
10026-CVGroup_UIEventMission_Buy2-1 = "會好好幹活的。"
10026-CVGroup_UIEventMission_Interaction1-1 = "清掃完畢。"

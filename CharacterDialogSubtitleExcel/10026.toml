[translation]
10026-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10026-CVGroup_CharacterGet_Idle1-1 = "정말이지, 왜 이런 이상한 옷을……\n뭐, 의외로 움직이긴 편하지만 말이야. 하하!"
10026-CVGroup_Cafe_Idle1-1 = "괜히 시선들이 느껴지는데……. 옷 때문인가?"
10026-CVGroup_Cafe_Idle2-1 = "메이드복 보다도 움직이기 편하구만. 나쁘지 않아."
10026-CVGroup_Cafe_Idle3-1 = "아앙? 뭘 보고 있냐? 해 볼 거야? 엉?"
10026-CVGroup_Cafe_Idle4-1 = "나쁘지 않은 장소인 걸. 이 정도면 자주 와도 괜찮겠어."
10026-CVGroup_Cafe_Idle5-1 = "선생은…… 없나. 출장? 아, 아니. 별로 상관없지만……"
10026-CVGroup_WeaponGet_Idle1-1 = "하, 이렇게까지 받아버리면, 진짜 화려하게 갈 수밖에 없는데…….\n자, 어디까지 감당하는지 볼까?"
10026-CVGroup_UIEventLobby_Enter1-1 = "자아-! 일 할 시간이야, 선생!"
10026-CVGroup_UIEventLobby_Enter2-1 = "지체할 시간 없다고. 바로 시작하지!"
10026-CVGroup_UIEventLobby_Idle1-1 = "뭔가 더 시킬 일이라도 있어, 선생?"
10026-CVGroup_UIEventLobby_Idle2-1 = "크하하하! 나쁘지 않네!"
10026-CVGroup_UIEventLobby_Idle3-1 = "꾸물거릴 시간 없다고."
10026-CVGroup_UIEventLobby_Idle4-1 = "왜, 왜 계속 쳐다보는 거야. 빨리 일이나 하자니까?"
10026-CVGroup_UIEventLobby_Enter3-1 = "미리미리 처리하는 게 취향이라서 말이지."
10026-CVGroup_UIEventLobby_Enter4-1 = "깔끔하게 마무리 지어 보자고."
10026-CVGroup_UIEventLobby_Enter5-1 = "뒷정리야? 그런 건 또 내 전문이지!"
10026-CVGroup_UIEventMission_Enter1-1 = "자~ 청소라도 하러 갈까?"
10026-CVGroup_UIEventMission_Enter2-1 = "자아, 빨리 시작하자고!"
10026-CVGroup_UIEventMission_Idle1-1 = "뭐야. 격려해 주는 거야? 하! 재미있네."
10026-CVGroup_UIEventMission_Idle2-1 = "나한테 걸리면, 이 정도는 식은 죽 먹기지!"
10026-CVGroup_UIEventMission_Buy1-1 = "헤에. 제법 센스가 있잖아?"
10026-CVGroup_UIEventMission_Buy2-1 = "일은 확실하게 한다고."
10026-CVGroup_UIEventMission_Interaction1-1 = "청소 완료다."

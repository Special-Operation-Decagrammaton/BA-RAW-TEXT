[translation]
10118-CVGroup_UITitle_Idle1-1 = "Blue Archive~! "
10118-CVGroup_CharacterGet_Idle1-1 = "ทั้งเรื่องควบคุมรถไฟ ทั้งเรื่องสร้างรางรถไฟ!\nให้เป็นหน้าที่ของฉันได้เลย! วะฮะฮ่า~!"
10118-CVGroup_Cafe_Idle1-1 = "อ้อ~ ที่นี่น่ะเหรอ? แหะๆ..."
10118-CVGroup_Cafe_Idle2-1 = "วันนี้มาอู้งานที่นี่ดีมั้ยนะ?"
10118-CVGroup_Cafe_Idle3-1 = "มีอะไรน่าสนุกเยอะแยะเลย! รู้งี้มาตั้งนานแล้ว~"
10118-CVGroup_Cafe_Idle4-1 = "คุณครูไปอยู่ไหนเนี่ย\nฉันมีเรื่องอยากบอกนะ... อ๊ะ ลืมไปแล้ว"
10118-CVGroup_Cafe_Idle5-1 = "ฮืม~ สบายใจจังเลย~\nแบบนี้อาจจะเผลอหลับไปก็ได้นะ?\nแต่ถ้าเป็นแบบนั้น คงเสียดายเวลาเนอะ? อะฮ่า!"
10118-CVGroup_WeaponGet_Idle1-1 = "ว้าว ให้ฉันเหรอ? ดีละ!\nจะใช้อันนี้จัดการสิ่งกีดขวางให้เรียบเลย! วะฮะฮ่า!"
10118-CVGroup_UIEventLobby_Enter1-1 = "วะฮะฮ่า! พร้อมหรือยัง?"
10118-CVGroup_UIEventLobby_Enter1-2 = "งั้นก็~ ไปกันเลย!"
10118-CVGroup_UIEventLobby_Enter2-1 = "จู่ๆ ฉันก็เรียกมาแท้ๆ ขอบคุณที่มานะ"
10118-CVGroup_UIEventLobby_Enter2-2 = "สถานการณ์ค่อนข้างวิกฤตเลยละ~\nงั้นก็รบกวนด้วยนะ คุณครู!"
10118-CVGroup_UIEventLobby_Enter3-1 = "แบบนี้คงไม่เป็นไรเนอะ?"
10118-CVGroup_UIEventLobby_Enter3-2 = "เอาเถอะ แค่ระบบเบรกไม่พังก็พอแล้ว!"
10118-CVGroup_UIEventLobby_Enter4-1 = "อ่า~ เหมือนจะได้ข้อสรุปแล้ว!\nรู้สึกจะเป็นแบบนั้นนะ!"
10118-CVGroup_UIEventLobby_Enter5-1 = "เย้~! ในที่สุดก็เสร็จงานสักที!!"
10118-CVGroup_UIEventLobby_Enter5-2 = "ไม่เลวเลยใช่มั้ยล่ะ? อะฮ่า~"
10118-CVGroup_UIEventLobby_Idle1-1 = "ทำไมเหรอ? มีเรื่องอะไรหรือเปล่า?"
10118-CVGroup_UIEventLobby_Idle1-2 = "ไม่ใช่เรื่องใหญ่อะไรงั้นเหรอ?\nให้ตายสิ~ เดี๋ยวฉันจิ้มบ้างนะ?"
10118-CVGroup_UIEventLobby_Idle2-1 = "เฮ้อ~ กลายเป็นแบบนี้ไปได้เนอะ"
10118-CVGroup_UIEventLobby_Idle2-2 = "แต่ก็น่าจะไม่เป็นอะไรหรอกเนอะ...?"
10118-CVGroup_UIEventLobby_Idle3-1 = "ไม่มีอะไรสนุกๆ เลยเหรอ?"
10118-CVGroup_UIEventLobby_Idle3-2 = "อะไรที่มันคลายความตึงเครียดได้น่ะ!"
10118-CVGroup_UIEventLobby_Idle3-3 = "แต่ว่าฉันก็ไม่ได้เครียดอะไรหรอกนะ วะฮะฮ่า~"
10118-CVGroup_UIEventLobby_Idle4-1 = "ต่อไปก็มาใช้ทางรถไฟไฮแลนเดอร์อีกนะ!\nรบกวนด้วยละ คุณครู~"
10118-CVGroup_UIEventShop_Enter1-1 = "เลือกดูได้ตามต้องการเลย"
10118-CVGroup_UIEventShop_Enter2-1 = "ถ้าอยากได้อะไรเป็นพิเศษก็บอกได้ตลอดเลยนะ"
10118-CVGroup_UIEventShop_Enter2-2 = "แต่ฉันไม่รู้หรอกนะว่ามันอยู่ที่ไหน วะฮะฮ่า!"
10118-CVGroup_UIEventShop_Enter3-1 = "ถึงงานจะเสร็จแล้ว แต่ถ้ามีของที่อยากได้\nก็มาหาได้ตลอดนะ"
10118-CVGroup_UIEventShop_Idle1-1 = "อื้อ! ฉันเหรอ?"
10118-CVGroup_UIEventShop_Idle2-1 = "ให้ฉันเลือกให้แทนเหรอ?"
10118-CVGroup_UIEventShop_Idle2-2 = "ไม่ได้ๆ! ต้องเลือกเองสิ จะได้มีความหมาย"
10118-CVGroup_UIEventShop_Buy1-1 = "โอ้~ เอาอันนั้นเหรอ! ดีเลยนะ~!"
10118-CVGroup_UIEventShop_Buy2-1 = "กู๊ดชอยส์! ฮะฮ่า"
10118-CVGroup_UIEventShop_Buy3-1 = "ฉันก็อยากได้อันนี้เหมือนกัน"
10118-CVGroup_UIEventShop_Buy4-1 = "ตาถึงเลยนะเนี่ย?"

[translation]
10118-CVGroup_UITitle_Idle1-1 = "블루 아카이브~!"
10118-CVGroup_CharacterGet_Idle1-1 = "열차 조종이든 선로 건설이든! 뭐든 맡겨! 파햐햐~!"
10118-CVGroup_Cafe_Idle1-1 = "아~ 여기가 그? 헤에……"
10118-CVGroup_Cafe_Idle2-1 = "오늘은 여기서 농땡이 좀 부리다 갈까?"
10118-CVGroup_Cafe_Idle3-1 = "재밌어 보이는 게 꽤 많잖아! 진작 올걸~"
10118-CVGroup_Cafe_Idle4-1 = "선생님은 어디 있지? 할 말이 있었는데… 아, 까먹었다."
10118-CVGroup_Cafe_Idle5-1 = "하~ 마음이 편하네~ 이러다 잠들어버릴지도?\n하지만 그러면 시간이 아깝겠지? 아핫!"
10118-CVGroup_WeaponGet_Idle1-1 = "우왓, 나 주는 거? 좋았어! 방해물은 이걸로 다 치워주지! 파햐햐!"
10118-CVGroup_UIEventLobby_Enter1-1 = "파햐햐-! 준비됐어?"
10118-CVGroup_UIEventLobby_Enter1-2 = "그럼 출바~알!"
10118-CVGroup_UIEventLobby_Enter2-1 = "급한 호출이었는데도 와줘서 고마워."
10118-CVGroup_UIEventLobby_Enter2-2 = "지금 꽤 위기 상황이라~ 잘 부탁해, 선생님!"
10118-CVGroup_UIEventLobby_Enter3-1 = "이거 괜찮은 거겠지?"
10118-CVGroup_UIEventLobby_Enter3-2 = "뭐, 제동장치 고장만 안 난다면!"
10118-CVGroup_UIEventLobby_Enter4-1 = "아~ 이제 곧 결판이 날 것 같아! 왠지 그런 기분!"
10118-CVGroup_UIEventLobby_Enter5-1 = "햐~! 드디어 끝났다!!"
10118-CVGroup_UIEventLobby_Enter5-2 = "어쨌든 꽤 괜찮았지? 푸햣~"
10118-CVGroup_UIEventLobby_Idle1-1 = "왜? 무슨 일 있어?"
10118-CVGroup_UIEventLobby_Idle1-2 = "별거 아니라고? 나 참~ 나도 찌른다?"
10118-CVGroup_UIEventLobby_Idle2-1 = "하아~ 어쩌다 이렇게 됐담."
10118-CVGroup_UIEventLobby_Idle2-2 = "뭐, 어떻게든 되겠지…?"
10118-CVGroup_UIEventLobby_Idle3-1 = "뭔가 재미있는 일은 없어?"
10118-CVGroup_UIEventLobby_Idle3-2 = "긴장을 풀 수 있을 만한 그런 거!"
10118-CVGroup_UIEventLobby_Idle3-3 = "물론 긴장 같은 건 안 했지만. 파햐햐~"
10118-CVGroup_UIEventLobby_Idle4-1 = "앞으로도 하이랜더 철도를 이용해 달라고! 잘 부탁해, 선생님~"
10118-CVGroup_UIEventShop_Enter1-1 = "원하는 만큼 둘러봐."
10118-CVGroup_UIEventShop_Enter2-1 = "따로 찾는 게 있으면 언제든 말해줘!"
10118-CVGroup_UIEventShop_Enter2-2 = "뭐, 어딨는지는 전혀 모르겠지만. 파햐햐!"
10118-CVGroup_UIEventShop_Enter3-1 = "일은 마무리됐지만, 갖고 싶은 게 있으면 언제든지 와."
10118-CVGroup_UIEventShop_Idle1-1 = "응! 나 왜?"
10118-CVGroup_UIEventShop_Idle2-1 = "대신 골라달라고?"
10118-CVGroup_UIEventShop_Idle2-2 = "안 돼, 안 돼! 직접 선택해야 의미가 있대."
10118-CVGroup_UIEventShop_Buy1-1 = "오~ 그건가! 좋은데~!"
10118-CVGroup_UIEventShop_Buy2-1 = "굿 초이스! 파햣."
10118-CVGroup_UIEventShop_Buy3-1 = "나도 갖고 싶은데, 그거."
10118-CVGroup_UIEventShop_Buy4-1 = "꽤 좋은 안목이잖아?"

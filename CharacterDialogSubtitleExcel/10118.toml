[translation]
10118-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10118-CVGroup_CharacterGet_Idle1-1 = "Whether it be train operation or track installation, leave it to me! Pahyahyahya!"
10118-CVGroup_Cafe_Idle1-1 = "Ah, this is that one place? Heh..."
10118-CVGroup_Cafe_Idle2-1 = "Should I slack off here for today?"
10118-CVGroup_Cafe_Idle3-1 = "There's sooo much fun stuff here. I should've come to visit earlier."
10118-CVGroup_Cafe_Idle4-1 = "Where's Sensei? I had something to say... Ehhh, I forgot."
10118-CVGroup_Cafe_Idle5-1 = "Phew! I'm RELAXED! At this rate, maybe I'll just conk out? But that'd be a waste of time, right? Haha!"
10118-CVGroup_WeaponGet_Idle1-1 = "Whoa, is this for me? Great! I'll wipe out all obstacles in the way with this! Pahyahyahya!"
10118-CVGroup_UIEventLobby_Enter1-1 = "Pahyahya! You ready?"
10118-CVGroup_UIEventLobby_Enter1-2 = "Then, DEPAAARTURE!"
10118-CVGroup_UIEventLobby_Enter2-1 = "It was super last minute, so thanks for coming!"
10118-CVGroup_UIEventLobby_Enter2-2 = "The situation is what you'd call \"urgent.\" So I'll leave it to you, Sensei!"
10118-CVGroup_UIEventLobby_Enter3-1 = "This is fine, right?"
10118-CVGroup_UIEventLobby_Enter3-2 = "Well, as long as the brakes don't break!"
10118-CVGroup_UIEventLobby_Enter4-1 = "Ahhh! It's all gonna be over soon! I just know it!"
10118-CVGroup_UIEventLobby_Enter5-1 = "Hyaaah! It's finally over!"
10118-CVGroup_UIEventLobby_Enter5-2 = "It worked out, right? Pahyahya!"
10118-CVGroup_UIEventLobby_Idle1-1 = "Huh? What's wrong?"
10118-CVGroup_UIEventLobby_Idle1-2 = "Nothing? Geez. I can poke you too, you know!"
10118-CVGroup_UIEventLobby_Idle2-1 = "*sigh* How did it turn out this way?"
10118-CVGroup_UIEventLobby_Idle2-2 = "Eh, it'll work out, riiight?"
10118-CVGroup_UIEventLobby_Idle3-1 = "Anything fun going on?"
10118-CVGroup_UIEventLobby_Idle3-2 = "Something to help with my nerves!"
10118-CVGroup_UIEventLobby_Idle3-3 = "But I don't have any nerves! Pahyahyahya!"
10118-CVGroup_UIEventLobby_Idle4-1 = "Keep riding with Highlander Railroad, 'kay? I'm looking forward to it, Sensei."
10118-CVGroup_UIEventShop_Enter1-1 = "Look around as much as you'd like."
10118-CVGroup_UIEventShop_Enter2-1 = "Just tell me if you can't find something you want!"
10118-CVGroup_UIEventShop_Enter2-2 = "I mean, not that I'd know where it is! Pahyahyahya!"
10118-CVGroup_UIEventShop_Enter3-1 = "Work's finally done, but you can swing by if you want anything else?"
10118-CVGroup_UIEventShop_Idle1-1 = "Yeah! What about me?"
10118-CVGroup_UIEventShop_Idle2-1 = "...You want me to pick for you?"
10118-CVGroup_UIEventShop_Idle2-2 = "No way! You gotta pick it yourself, or else it doesn't mean anything!"
10118-CVGroup_UIEventShop_Buy1-1 = "Oh, that one! Nice!"
10118-CVGroup_UIEventShop_Buy2-1 = "Good choice! Pahyahya!"
10118-CVGroup_UIEventShop_Buy3-1 = "I want that too."
10118-CVGroup_UIEventShop_Buy4-1 = "You've got good taste, don't you?"

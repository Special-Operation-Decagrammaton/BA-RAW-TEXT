[translation]
10118-CVGroup_UITitle_Idle1-1 = "蔚藍檔案～！"
10118-CVGroup_CharacterGet_Idle1-1 = "不管是駕駛列車還是建設鐵路！\n儘管交給我吧！噗哈哈～！"
10118-CVGroup_Cafe_Idle1-1 = "啊～這就是那個地方嗎？\n嘿～"
10118-CVGroup_Cafe_Idle2-1 = "今天就在這裡偷懶吧♪"
10118-CVGroup_Cafe_Idle3-1 = "有好多有趣的東西耶！\n早知道就早點來了～"
10118-CVGroup_Cafe_Idle4-1 = "其實有話想跟老師說的，可是他又不在……\n好吧，算了。反正我也忘了。"
10118-CVGroup_Cafe_Idle5-1 = "哈～真放鬆～再這樣下去都快睡著了。\n但是那樣好像有點浪費時間？啊哈！"
10118-CVGroup_WeaponGet_Idle1-1 = "這是什麼？要給我嗎？\n好耶♪就用這個把障礙物\n一掃而空吧！噗哈哈！"
10118-CVGroup_UIEventLobby_Enter1-1 = "噗哈哈！準備好了嗎？"
10118-CVGroup_UIEventLobby_Enter1-2 = "準備出～發！"
10118-CVGroup_UIEventLobby_Enter2-1 = "謝謝你這麼突然還願意過來。"
10118-CVGroup_UIEventLobby_Enter2-2 = "現在情況相當不妙啊～拜託你囉，老師！"
10118-CVGroup_UIEventLobby_Enter3-1 = "這個，沒問題吧？"
10118-CVGroup_UIEventLobby_Enter3-2 = "算了，只要控制裝置沒問題就行了吧！"
10118-CVGroup_UIEventLobby_Enter4-1 = "哦，差不多要結束了嗎？\n好像有那種感覺。"
10118-CVGroup_UIEventLobby_Enter5-1 = "呀～！終於結束了～！！"
10118-CVGroup_UIEventLobby_Enter5-2 = "還挺不錯的吧？\n噗哈哈～"
10118-CVGroup_UIEventLobby_Idle1-1 = "怎麼了怎麼了？有什麼事嗎？"
10118-CVGroup_UIEventLobby_Idle1-2 = "「什麼也沒有」？\n啊？那我也來戳一戳吧。"
10118-CVGroup_UIEventLobby_Idle2-1 = "唉～怎麼會變成這樣呢。"
10118-CVGroup_UIEventLobby_Idle2-2 = "算了，總會有辦法吧……？"
10118-CVGroup_UIEventLobby_Idle3-1 = "有什麼有趣的事嗎～？"
10118-CVGroup_UIEventLobby_Idle3-2 = "可以舒緩緊張的那種～！"
10118-CVGroup_UIEventLobby_Idle3-3 = "雖然我也沒在緊張就是了。\n啊哈哈！"
10118-CVGroup_UIEventLobby_Idle4-1 = "今後也請多多支持高地人鐵道！\n拜託你囉，老師♪"
10118-CVGroup_UIEventShop_Enter1-1 = "逛到滿意為止吧。"
10118-CVGroup_UIEventShop_Enter2-1 = "要找什麼東西的話就說一聲吧？"
10118-CVGroup_UIEventShop_Enter2-2 = "雖然我也不知道放在哪裡就是了。噗哈哈！"
10118-CVGroup_UIEventShop_Enter3-1 = "工作雖然結束了，如果有想要的東西就再過來吧。"
10118-CVGroup_UIEventShop_Idle1-1 = "咦，什麼什麼？"
10118-CVGroup_UIEventShop_Idle2-1 = "「希望我幫你挑」？"
10118-CVGroup_UIEventShop_Idle2-2 = "不行不行！\n自己選才有意義啦。"
10118-CVGroup_UIEventShop_Buy1-1 = "哦～那個嗎？\n不錯不錯～！"
10118-CVGroup_UIEventShop_Buy2-1 = "Good choice！噗哈。"
10118-CVGroup_UIEventShop_Buy3-1 = "我也很想要呢，那個。"
10118-CVGroup_UIEventShop_Buy4-1 = "品味還不錯嘛？"

[translation]
10127-CVGroup_UITitle_Idle1-1 = "蔚藍，檔……案？"
10127-CVGroup_CharacterGet_Idle1-1 = "我，我是狂獵藝術學院的櫻井美代。\n雖，雖然不知道為什麼會被叫來……還請多多指教。"
10127-CVGroup_Cafe_Idle1-1 = "（感覺能悠哉寫稿的地方……沒有嗎）"
10127-CVGroup_Cafe_Idle2-1 = "用打字機的話，會不會造成困擾呢……"
10127-CVGroup_Cafe_Idle3-1 = "大家都好自在……和狂獵完全不同。"
10127-CVGroup_Cafe_Idle4-1 = "（老師……喜歡什麼樣的咖啡呢？）"
10127-CVGroup_Cafe_Idle5-1 = "我想想，從那邊進入，逃脫就從……\n等一下，這裡沒必要找這些吧……"
10127-CVGroup_WeaponGet_Idle1-1 = "如果能實現的話，我想把這個瞬間寫進書裡。\n讓我們的回憶……隨時都能反覆閱讀。"
10127-CVGroup_UIEventLobby_Enter1-1 = "歡迎，老師。\n我正好也把大綱寫完了。"
10127-CVGroup_UIEventLobby_Enter2-1 = "能夠見到老師，讓我非常安心。"
10127-CVGroup_UIEventLobby_Enter3-1 = "入學狂獵的時候，我從來沒想像過居然會淪落到得做這種事情。"
10127-CVGroup_UIEventLobby_Enter4-1 = "事態變得越來越複雜了呢……我可不能放棄。\n故事必須完結才有意義。"
10127-CVGroup_UIEventLobby_Enter5-1 = "能順利結束真是太好了。\n……唉。這種委託，我已經受夠了。"
10127-CVGroup_UIEventLobby_Idle1-1 = "啊……我的打字聲，是不是太吵了？"
10127-CVGroup_UIEventLobby_Idle2-1 = "為什麼會被捲進這種事情裡呢……"
10127-CVGroup_UIEventLobby_Idle3-1 = "那，那樣盯著我看……呵呵。我很開心。"
10127-CVGroup_UIEventLobby_Idle4-1 = "工作結束之後，還請務必來我們的宿舍玩哦。"
10127-CVGroup_UIEventCardShop_Enter1-1 = "歡迎你，老師。在這裡唷。"
10127-CVGroup_UIEventCardShop_Enter2-1 = "請把手給我。\n……要不要一起抽卡呢？"
10127-CVGroup_UIEventCardShop_Enter3-1 = "直到故事的結局……\n為了避免留下遺憾，請親眼見證下去吧。"
10127-CVGroup_UIEventCardShop_Idle1-1 = "有遇到什麼問題嗎？"
10127-CVGroup_UIEventCardShop_Idle2-1 = "有想抽的卡嗎？"
10127-CVGroup_UIEventCardShop_Prize3-1 = "太厲害了！\n這是連我也第一次親眼見到的卡唷！"
10127-CVGroup_UIEventCardShop_Prize2-1 = "運氣很好呢，老師！\n乘著這股氣勢，下一張也……！"
10127-CVGroup_UIEventCardShop_Prize1-1 = "普通，也有屬於普通的美學。"
10127-CVGroup_UIEventCardShop_Prize0-1 = "請不要氣餒，老師。\n不幸，是下一次幸運的前兆哦。"

[translation]
10127-CVGroup_UITitle_Idle1-1 = "블루, 아카이……브?"
10127-CVGroup_CharacterGet_Idle1-1 = "와, 와일드헌트 예술학원, 사쿠라이 미요라고 합니다.\n왜, 왜 제가 불린 건진 모르겠지만……잘 부탁드립니다."
10127-CVGroup_Cafe_Idle1-1 = "(앉아서 글 쓸 만한 곳은 없는 걸까…….)"
10127-CVGroup_Cafe_Idle2-1 = "타자기를 쓰기엔, 듣는 귀가 너무 많네요……."
10127-CVGroup_Cafe_Idle3-1 = "다들 자유롭네요…… 와일드헌트와는 다르게."
10127-CVGroup_Cafe_Idle4-1 = "(선생님은…… 어떤 커피를 좋아한다는 설정이실까?)"
10127-CVGroup_Cafe_Idle5-1 = "진입로는 저쪽, 퇴로는 이쪽……. ……저 이걸 왜 계산하고 있죠?"
10127-CVGroup_WeaponGet_Idle1-1 = "무엇이든 책이 될 수 있다면……이걸 저의 책으로 삼을게요. \n선생님과 저의 이야기가 담긴…… 우리의 책으로요."
10127-CVGroup_UIEventLobby_Enter1-1 = "어서 오세요, 선생님. 마침 플롯 작성이 끝났어요."
10127-CVGroup_UIEventLobby_Enter2-1 = "선생님을 보니까, 마음이 훨씬 편해지네요."
10127-CVGroup_UIEventLobby_Enter3-1 = "와일드헌트에 입학했을 때, 이런 일을 하게 될 거라고는 상상도 못 했었는데……."
10127-CVGroup_UIEventLobby_Enter4-1 = "상황이 꽤나 꼬인 것 같네요.\n……그래도 포기할 수는 없어요. 완결은 내야 하니까."
10127-CVGroup_UIEventLobby_Enter5-1 = "다행히 잘 끝이 났네요.\n……그래도 앞으로는 이런 의뢰 안 받을래요. 후으으……."
10127-CVGroup_UIEventLobby_Idle1-1 = "네? 제 타자기 소리가 조금 시끄러웠나요……?"
10127-CVGroup_UIEventLobby_Idle2-1 = "저, 어쩌다 이런 일에 휘말린 걸까요……."
10127-CVGroup_UIEventLobby_Idle3-1 = "그렇게 계속 저를 빤히 쳐다보시면…… 좋네요, 후후."
10127-CVGroup_UIEventLobby_Idle4-1 = "일 끝나면, 저희 기숙사로 놀러 오세요."
10127-CVGroup_UIEventCardShop_Enter1-1 = "환영합니다, 선생님. 이쪽으로 오세요."
10127-CVGroup_UIEventCardShop_Enter2-1 = "손 주세요, 선생님. 함께 카드를 뽑아 봐요."
10127-CVGroup_UIEventCardShop_Enter3-1 = "결말은 중요하죠. 후회 없이, 이곳에서의 마지막을 보고 가세요."
10127-CVGroup_UIEventCardShop_Idle1-1 = "네? 카드에 문제가 있나요?"
10127-CVGroup_UIEventCardShop_Idle2-1 = "노리시는 카드가 있으신가요?"
10127-CVGroup_UIEventCardShop_Prize3-1 = "이건……! 저도 책에서밖에 본 적이 없는 카드예요……!"
10127-CVGroup_UIEventCardShop_Prize2-1 = "운이 좋네요, 선생님! 그럼 이 흐름을 타고, 계속……!"
10127-CVGroup_UIEventCardShop_Prize1-1 = "평범함은, 평범함 나름의 미학이 있죠"
10127-CVGroup_UIEventCardShop_Prize0-1 = "낙담 마세요, 선생님. 불운은 다음 행운을 암시하기도 하니까요."

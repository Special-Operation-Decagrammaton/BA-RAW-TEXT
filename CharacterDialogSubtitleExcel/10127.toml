[translation]
10127-CVGroup_UITitle_Idle1-1 = "Blue...archive?"
10127-CVGroup_CharacterGet_Idle1-1 = "I-I'm Sakurai Miyo from Wildhunt Art Academy. N-Not sure why I'm here...but I look forward to working with you."
10127-CVGroup_Cafe_Idle1-1 = "(I wonder if there's somewhere I can sit down and write...)"
10127-CVGroup_Cafe_Idle2-1 = "Too many people would be able to hear me if I use my typewriter..."
10127-CVGroup_Cafe_Idle3-1 = "Everyone seems so free... Unlike at Wildhunt."
10127-CVGroup_Cafe_Idle4-1 = "(I wonder...what story lies behind Sensei's coffee preference.)"
10127-CVGroup_Cafe_Idle5-1 = "Entrance here, an escape route over there... Why am I analyzing all this?"
10127-CVGroup_WeaponGet_Idle1-1 = "If anything can be a book...I'll consider this my book. One that carries our story... Our book."
10127-CVGroup_UIEventLobby_Enter1-1 = "Welcome, Sensei. I just finished writing the plot."
10127-CVGroup_UIEventLobby_Enter2-1 = "Seeing you makes me feel at ease."
10127-CVGroup_UIEventLobby_Enter3-1 = "...I never imagined I'd be doing something like this."
10127-CVGroup_UIEventLobby_Enter4-1 = "Things have gotten complicated."
10127-CVGroup_UIEventLobby_Enter5-1 = "...But still, I don't think I'll be accepting a commission like this again. Ugh..."
10127-CVGroup_UIEventLobby_Idle1-1 = "Hm? Is my typewriter too loud...?"
10127-CVGroup_UIEventLobby_Idle2-1 = "I wonder how I got involved in all this..."
10127-CVGroup_UIEventLobby_Idle3-1 = "If you keep staring at me like that... It's nice, fufu."
10127-CVGroup_UIEventLobby_Idle4-1 = "You should come visit our dormitory when you're done with work."
10127-CVGroup_UIEventCardShop_Enter1-1 = "Welcome, Sensei. Please come this way."
10127-CVGroup_UIEventCardShop_Enter2-1 = "Give me your hand, Sensei. Let's pull a card together."
10127-CVGroup_UIEventCardShop_Enter3-1 = "Endings are important. Let's leave our regrets behind, and witness the finale."
10127-CVGroup_UIEventCardShop_Idle1-1 = "Hm? Is there something wrong with the card?"
10127-CVGroup_UIEventCardShop_Idle2-1 = "Is there a card you're looking for?"
10127-CVGroup_UIEventCardShop_Prize3-1 = "This is...! I've also only seen this card in books...!"
10127-CVGroup_UIEventCardShop_Prize2-1 = "You have good luck, Sensei! Let's keep this pace going...!"
10127-CVGroup_UIEventCardShop_Prize1-1 = "Ordinariness is an aesthetic of its own."
10127-CVGroup_UIEventCardShop_Prize0-1 = "Don't get discouraged, Sensei. Misfortune can hint at future fortune."

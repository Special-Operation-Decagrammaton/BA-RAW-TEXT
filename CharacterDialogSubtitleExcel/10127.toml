[translation]
10127-CVGroup_UITitle_Idle1-1 = "Blue... Archive...?"
10127-CVGroup_CharacterGet_Idle1-1 = "ฉะ... ฉันชื่อซากุราอิ มิโยะ จากสถาบันศิลปะไวลด์ฮันต์ค่ะ\nมะ... ไม่รู้ว่าทำไมถึงถูกเรียกออกมา... แต่ยังไงก็ขอฝากตัวด้วยนะคะ"
10127-CVGroup_Cafe_Idle1-1 = "(มีที่ที่พอจะนั่งเขียนอะไรได้บ้างมั้ยนะ...)"
10127-CVGroup_Cafe_Idle2-1 = "คนเยอะเกินไปจนไม่กล้าใช้เครื่องพิมพ์ดีดเลยค่ะ..."
10127-CVGroup_Cafe_Idle3-1 = "ทุกคนดูมีอิสระจังเลยนะคะ...\nต่างกับที่ไวลด์ฮันต์เลย"
10127-CVGroup_Cafe_Idle4-1 = "(คุณครู... จะชอบกาแฟแบบไหนนะ?)"
10127-CVGroup_Cafe_Idle5-1 = "ทางเข้าอยู่ตรงโน้น ส่วนทางออกอยู่ตรงนี้...\nทำไมฉันถึง...คิดเรื่องนี้อยู่นะคะ?"
10127-CVGroup_WeaponGet_Idle1-1 = "ถ้าทุกสิ่งเป็นหนังสือได้... ฉันจะให้สิ่งนี้เป็นหนังสือของฉันค่ะ\nหนังสือของเราที่มีเรื่องราว... ระหว่างฉันกับคุณครูน่ะค่ะ"
10127-CVGroup_UIEventLobby_Enter1-1 = "เชิญค่ะ คุณครู\nฉันเพิ่งเขียนพล็อตเรื่องเสร็จพอดีเลยค่ะ"
10127-CVGroup_UIEventLobby_Enter2-1 = "พอได้เห็นคุณครูก็โล่งใจขึ้นมากเลยนะคะ"
10127-CVGroup_UIEventLobby_Enter3-1 = "ตอนเข้าเรียนที่ไวลด์ฮันต์\nฉันคิดไม่ถึงเลยค่ะว่าจะได้มาทำงานแบบนี้น่ะ..."
10127-CVGroup_UIEventLobby_Enter4-1 = "สถานการณ์ค่อนข้างพลิกผันเลยนะคะ\nแต่ถึงยังไง... ฉันก็ยอมแพ้ไม่ได้ค่ะ\nฉันต้องเขียนให้จบเรื่องนี่คะ"
10127-CVGroup_UIEventLobby_Enter5-1 = "โล่งอกไปทีที่จบลงด้วยดีนะคะ\nแต่จากนี้ไป... ฉันจะไม่รับงานแบบนี้แล้วค่ะ เฮ้อ…"
10127-CVGroup_UIEventLobby_Idle1-1 = "คะ? เครื่องพิมพ์ดีดของฉันเสียงดังไปหรือเปล่าคะ...?"
10127-CVGroup_UIEventLobby_Idle2-1 = "ฉันเข้ามาเกี่ยวข้องกับเรื่องแบบนี้ได้ยังไงกันคะ..."
10127-CVGroup_UIEventLobby_Idle3-1 = "ถ้ายังจ้องฉันขนาดนี้ละก็... ดีจังเลยนะคะ ฮุฮุ"
10127-CVGroup_UIEventLobby_Idle4-1 = "ไว้เสร็จงานแล้ว\nแวะมาเที่ยวที่หอพักของพวกฉันสิคะ"
10127-CVGroup_UIEventCardShop_Enter1-1 = "ยินดีต้อนรับค่ะ คุณครู\nเชิญทางนี้เลยค่ะ"
10127-CVGroup_UIEventCardShop_Enter2-1 = "ยื่นมือมาสิคะ คุณครู\nมาเลือกไพ่ด้วยกันนะคะ"
10127-CVGroup_UIEventCardShop_Enter3-1 = "ตอนจบสำคัญนะคะ\nมาดูตอนจบของที่แห่งนี้ แล้วค่อยไปนะคะ"
10127-CVGroup_UIEventCardShop_Idle1-1 = "คะ? การ์ดมีปัญหาตรงไหนเหรอคะ?"
10127-CVGroup_UIEventCardShop_Idle2-1 = "มีการ์ดที่อยากได้มั้ยคะ?"
10127-CVGroup_UIEventCardShop_Prize3-1 = "นี่มัน...! เป็นการ์ดที่ฉันก็เคยเห็น\nแต่ในหนังสือเท่านั้นค่ะ...!"
10127-CVGroup_UIEventCardShop_Prize2-1 = "ดวงดีจังเลยนะคะ คุณครู!\nงั้นก็ขอพึ่งดวงนี้แล้วไปต่อเลย..."
10127-CVGroup_UIEventCardShop_Prize1-1 = "ความธรรมดาก็มีสุนทรียศาสตร์\nในความธรรมดาของมันนะคะ "
10127-CVGroup_UIEventCardShop_Prize0-1 = "อย่าผิดหวังไปเลยค่ะ คุณครู\nบางทีโชคร้ายก็กลายมาเป็นโชคดีได้นะคะ"

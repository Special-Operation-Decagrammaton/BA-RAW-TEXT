[translation]
10066-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10066-CVGroup_CharacterGet_Idle1-1 = "就算轉職成女僕，愛麗絲還是愛麗絲。\n請拭目以待，老師！"
10066-CVGroup_Cafe_Idle1-1 = "……要從哪裡\n開始打掃呢？"
10066-CVGroup_Cafe_Idle2-1 = "像是會發生\n支線任務的地方……！"
10066-CVGroup_Cafe_Idle3-1 = "愛麗絲知道。\n世界上似乎有個叫做女僕咖啡廳的地方！"
10066-CVGroup_Cafe_Idle4-1 = "女僕必須要有主人。\n愛麗絲的主人……當然是老師！"
10066-CVGroup_Cafe_Idle5-1 = "女僕等級提升了！\n愛麗絲和女僕裝的相性，稍微變好了。"
10066-CVGroup_WeaponGet_Idle1-1 = "這是……用愛麗絲和老師的力量強化的傳說聖劍……！\n謝謝你，老師！愛麗絲，會繼續提高女僕等級成為女僕勇者的！"
10066-CVGroup_UIEventLobby_Enter1-1 = "老師，請加快動作！\n是活動唷，活動！"
10066-CVGroup_UIEventLobby_Enter2-1 = "愛麗絲的話，隨時都OK！\n老師的準備完成了嗎？"
10066-CVGroup_UIEventLobby_Enter3-1 = "愛麗絲，不管是打掃還是戒備都很努力。\n請稱讚愛麗絲！"
10066-CVGroup_UIEventLobby_Enter4-1 = "嗚……變成很嚴重的事情了。"
10066-CVGroup_UIEventLobby_Enter4-2 = "但是愛麗絲沒問題。\n因為是女僕勇者！"
10066-CVGroup_UIEventLobby_Enter5-1 = "是場了不起的冒險！"
10066-CVGroup_UIEventLobby_Enter5-2 = "只要跟老師在一起，愛麗絲什麼都不怕！"
10066-CVGroup_UIEventLobby_Idle1-1 = "雖然女僕克服等級還不高……"
10066-CVGroup_UIEventLobby_Idle1-2 = "愛麗絲，會加油的！"
10066-CVGroup_UIEventLobby_Idle2-1 = "老師，如果在哪裡發現了寧瑠前輩的話，請馬上通知哦。"
10066-CVGroup_UIEventLobby_Idle2-2 = "絕對要哦？是和愛麗絲的約定！"
10066-CVGroup_UIEventLobby_Idle3-1 = "料理、打掃、洗衣服！每個都是女僕的基礎！"
10066-CVGroup_UIEventLobby_Idle3-2 = "老師也要參加任務嗎？"
10066-CVGroup_UIEventLobby_Idle4-1 = "就，就算那樣戳也不會掉落任何東西喔……？"
10066-CVGroup_UIEventLobby_Idle4-2 = "愛麗絲不是怪物！"
10066-CVGroup_UIEventShop_Enter1-1 = "啊，歡迎回來，老師！"
10066-CVGroup_UIEventShop_Enter1-2 = "女僕勇者要顧店也沒問題！"
10066-CVGroup_UIEventShop_Enter2-1 = "兌換道具的庫存，有非常多！"
10066-CVGroup_UIEventShop_Enter2-2 = "但如果是老師說不定能全都獲得。"
10066-CVGroup_UIEventShop_Enter3-1 = "活動雖然結束了，不過還在營業中。"
10066-CVGroup_UIEventShop_Enter3-2 = "因為是期間限定，還請不要忘記。\n是和愛麗絲的約定唷？"
10066-CVGroup_UIEventShop_Idle1-1 = "歡迎來到愛麗絲的道具店！"
10066-CVGroup_UIEventShop_Idle1-2 = "在這裡可以買到對冒險有幫助的道具和藥水唷！"
10066-CVGroup_UIEventShop_Idle2-1 = "嗯……老師，微笑是嗎？"
10066-CVGroup_UIEventShop_Idle2-2 = "知道了。桃井說過微笑是0信用貨幣！"
10066-CVGroup_UIEventShop_Buy1-1 = "乓啪喀乓！老師購買了道具！"
10066-CVGroup_UIEventShop_Buy1-2 = "送你高級微笑作為贈品！"
10066-CVGroup_UIEventShop_Buy2-1 = "齁齁……這位客人，眼光真不錯呢。"
10066-CVGroup_UIEventShop_Buy2-2 = "是這種時候要說的台詞！愛麗絲還記得！"
10066-CVGroup_UIEventShop_Buy3-1 = "旅人啊，這就是汝的選擇嗎……？"
10066-CVGroup_UIEventShop_Buy3-2 = "老師，怎麼樣呢？這句台詞，愛麗絲一直想說說看！"
10066-CVGroup_UIEventShop_Buy4-1 = "道具倉庫的管理也是女僕的工作！"
10066-CVGroup_UIEventShop_Buy4-2 = "愛麗絲，今天也會努力的！"

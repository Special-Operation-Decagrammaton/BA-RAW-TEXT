[translation]
10066-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10066-CVGroup_CharacterGet_Idle1-1 = "메이드로 전직했어도, 아리스는 아리스입니다. 지켜봐 주세요, 선생님!"
10066-CVGroup_Cafe_Idle1-1 = "……어디서부터 청소할까요?"
10066-CVGroup_Cafe_Idle2-1 = "서브 퀘스트가 발생할 것 같은 장소입니다…!"
10066-CVGroup_Cafe_Idle3-1 = "아리스, 알고 있어요. 세상에는 메이드 카페라는 게 있대요!"
10066-CVGroup_Cafe_Idle4-1 = "메이드에게는 주인이 필요해요. 아리스의 주인은… 물론 선생님입니다!"
10066-CVGroup_Cafe_Idle5-1 = "메이드 레벨이 올랐어요! 아리스와 메이드복의 궁합, 조금 좋아졌습니다."
10066-CVGroup_WeaponGet_Idle1-1 = "이건… 아리스와 선생님의 힘으로 강화한 전설의 성검…! 감사합니다 선생님!\n아리스, 메이드 레벨을 더 올려서 메이드 용사가 되겠습니다!"
10066-CVGroup_UIEventLobby_Enter1-1 = "선생님 서둘러 주세요! 이벤트예요, 이벤트!"
10066-CVGroup_UIEventLobby_Enter2-1 = "아리스라면, 언제든지 OK입니다! 선생님은 준비 다 하셨나요?"
10066-CVGroup_UIEventLobby_Enter3-1 = "아리스, 청소도 경비도 열심히 했습니다. 칭찬해 주세요!"
10066-CVGroup_UIEventLobby_Enter4-1 = "우으으… 엄청난 일이 되어 버린 겁니다."
10066-CVGroup_UIEventLobby_Enter4-2 = "하지만 아리스는 괜찮습니다. 메이드 용사니까요!"
10066-CVGroup_UIEventLobby_Enter5-1 = "엄청난 모험이었습니다!"
10066-CVGroup_UIEventLobby_Enter5-2 = "선생님과 함께라면, 아리스는 아무것도 무섭지 않습니다!"
10066-CVGroup_UIEventLobby_Idle1-1 = "아직 메이드 극복 레벨은 높지 않지만…"
10066-CVGroup_UIEventLobby_Idle1-2 = "아리스, 노력하겠습니다!"
10066-CVGroup_UIEventLobby_Idle2-1 = "선생님, 어디선가 네루 선배를 발견하면 바로 알려주세요."
10066-CVGroup_UIEventLobby_Idle2-2 = "꼭이에요? 아리스와의 약속입니다!"
10066-CVGroup_UIEventLobby_Idle3-1 = "요리, 청소, 세탁! 모두 메이드의 기본입니다!"
10066-CVGroup_UIEventLobby_Idle3-2 = "선생님도 퀘스트에 참여하시겠습니까?"
10066-CVGroup_UIEventLobby_Idle4-1 = "그, 그렇게 찔러도 아무것도 드롭하지 않는답니다…?"
10066-CVGroup_UIEventLobby_Idle4-2 = "아리스는 몬스터가 아니에요!"
10066-CVGroup_UIEventShop_Enter1-1 = "어서 오세요, 선생님!"
10066-CVGroup_UIEventShop_Enter1-2 = "메이드 용사는 가게를 보는 것도 할 수 있습니다!"
10066-CVGroup_UIEventShop_Enter2-1 = "교환 아이템 재고는, 넉넉합니다!"
10066-CVGroup_UIEventShop_Enter2-2 = "그런데 선생님이라면 전부 가져가실 수 있을 것 같네요."
10066-CVGroup_UIEventShop_Enter3-1 = "이벤트는 종료되었지만, 아직 영업 중입니다."
10066-CVGroup_UIEventShop_Enter3-2 = "기간 한정이니 잊지 마세요. 아리스와 약속한 거예요?"
10066-CVGroup_UIEventShop_Idle1-1 = "어서 오세요, 아리스의 도구점에!"
10066-CVGroup_UIEventShop_Idle1-2 = "이곳에서는 모험에 도움이 되는 아이템과 포션을 살 수 있어요!"
10066-CVGroup_UIEventShop_Idle2-1 = "음… 선생님, 스마일이요?"
10066-CVGroup_UIEventShop_Idle2-2 = "알겠습니다. 스마일은 0크레딧이라고 모모이가 말했습니다!"
10066-CVGroup_UIEventShop_Buy1-1 = "뽜밤뽜밤! 선생님이 아이템을 구입했어요!"
10066-CVGroup_UIEventShop_Buy1-2 = "프리미엄 스마일을 덤으로 드릴게요!"
10066-CVGroup_UIEventShop_Buy2-1 = "호호… 손님 안목이 높으시네요."
10066-CVGroup_UIEventShop_Buy2-2 = "이럴 때 하는 대사예요! 아리스, 익혔습니다!"
10066-CVGroup_UIEventShop_Buy3-1 = "여행자여, 그것이 너의 선택인가…?"
10066-CVGroup_UIEventShop_Buy3-2 = "선생님 어때요? 이 대사 말해보고 싶었어요!"
10066-CVGroup_UIEventShop_Buy4-1 = "아이템 창고 관리도 메이드의 일입니다!"
10066-CVGroup_UIEventShop_Buy4-2 = "아리스, 오늘도 열심히 할게요!"

[translation]
10066-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10066-CVGroup_CharacterGet_Idle1-1 = "Although I look like a maid now, in truth I am still Aris. Please continue to support me, Sensei."
10066-CVGroup_Cafe_Idle1-1 = "Where shall I begin to clean?"
10066-CVGroup_Cafe_Idle2-1 = "This looks like a location that will trigger a side quest!"
10066-CVGroup_Cafe_Idle3-1 = "I have heard tell that this world holds places called \"maid cafes.\""
10066-CVGroup_Cafe_Idle4-1 = "A maid needs a master. My master must be you, Sensei!"
10066-CVGroup_Cafe_Idle5-1 = "My maid level has gone up! Wearing this maid uniform has improved my stats!"
10066-CVGroup_WeaponGet_Idle1-1 = "This...this is a legendary holy sword, imbued with both my strength and Sensei's! Thank you! I will raise my level even higher to become a maid hero worthy of this!"
10066-CVGroup_UIEventLobby_Enter1-1 = "Please hurry, Sensei! It is a very special event!"
10066-CVGroup_UIEventLobby_Enter2-1 = "My loadout is equipped! I am all ready! What about you, Sensei?"
10066-CVGroup_UIEventLobby_Enter3-1 = "I have worked very hard to clean and keep watch. Did I do a satisfactory job?"
10066-CVGroup_UIEventLobby_Enter4-1 = "Uh... This is much more complicated than I expected..."
10066-CVGroup_UIEventLobby_Enter4-2 = "But I am okay! Because I am a hero maid!"
10066-CVGroup_UIEventLobby_Enter5-1 = "That was an incredible adventure!"
10066-CVGroup_UIEventLobby_Enter5-2 = "As long as we are in a party together, I am not afraid of anything, Sensei!"
10066-CVGroup_UIEventLobby_Idle1-1 = "My maid level still is not very high..."
10066-CVGroup_UIEventLobby_Idle1-2 = "But I will continue to grind for more EXP!"
10066-CVGroup_UIEventLobby_Idle2-1 = "Sensei, please tell me if you see Neru anywhere."
10066-CVGroup_UIEventLobby_Idle2-2 = "Promise me, okay?"
10066-CVGroup_UIEventLobby_Idle3-1 = "Cooking, cleaning, laundry... A maid must level up many skills."
10066-CVGroup_UIEventLobby_Idle3-2 = "Will you join me on this quest, Sensei?"
10066-CVGroup_UIEventLobby_Idle4-1 = "Um, you can hit me, but I will not drop any loot..."
10066-CVGroup_UIEventLobby_Idle4-2 = "I am not a mob!"
10066-CVGroup_UIEventShop_Enter1-1 = "Welcome, Sensei!"
10066-CVGroup_UIEventShop_Enter1-2 = "A hero maid can even work as a shopkeeper!"
10066-CVGroup_UIEventShop_Enter2-1 = "We have many powerful items in stock!"
10066-CVGroup_UIEventShop_Enter2-2 = "But since it is you, Sensei... I think you can have whatever you want!"
10066-CVGroup_UIEventShop_Enter3-1 = "The event is over, but the shop is still open!"
10066-CVGroup_UIEventShop_Enter3-2 = "However, only for a little bit longer! So you cannot dilly-dally! Promise!"
10066-CVGroup_UIEventShop_Idle1-1 = "Welcome to Aris' Adventure Supplies!"
10066-CVGroup_UIEventShop_Idle1-2 = "We have many powerful potions and materials to aid in your quest!"
10066-CVGroup_UIEventShop_Idle2-1 = "Oh! A smile, Sensei?"
10066-CVGroup_UIEventShop_Idle2-2 = "Right away! Momoi told me that smiles are free!"
10066-CVGroup_UIEventShop_Buy1-1 = "Bum bum bum! Item acquired!"
10066-CVGroup_UIEventShop_Buy1-2 = "I shall grant you an upgrade! One premium smile, coming up!"
10066-CVGroup_UIEventShop_Buy2-1 = "Hohoho... You have quite an eye for quality, dear guest."
10066-CVGroup_UIEventShop_Buy2-2 = "How did I do? I memorized dialogue for these kinds of situations!"
10066-CVGroup_UIEventShop_Buy3-1 = "O' weary traveler, is this your choice?"
10066-CVGroup_UIEventShop_Buy3-2 = "Did you like it, Sensei? I have been wanting to try that one!"
10066-CVGroup_UIEventShop_Buy4-1 = "Inventory management is also part of a maid's duty!"
10066-CVGroup_UIEventShop_Buy4-2 = "I will work hard again today!"

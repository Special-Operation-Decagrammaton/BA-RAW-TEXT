10105-CVGroup_Cafe_Idle4-1 = "Is there anything I can assist with?"
10105-CVGroup_Cafe_Idle5-1 = "Handshake event...? Polaroids...?"
10105-CVGroup_WeaponGet_Idle1-1 = "I feel capable of saying things that would normally be difficult for me to vocalize right now. Please hear me out, but forget it later. Moving forward, please continue standing by my side. It's a promise."
10105-CVGroup_UIEventLobby_Enter1-1 = "Hello, Sensei."
10105-CVGroup_UIEventLobby_Enter1-2 = "If you don't mind... Please watch me...on stage!"
10105-CVGroup_UIEventLobby_Enter2-1 = "Are you ready, Sensei?"
10105-CVGroup_UIEventLobby_Enter2-2 = "The concert will begin soon!"
10105-CVGroup_UIEventLobby_Enter3-1 = "Let the concert continue!"
10105-CVGroup_UIEventLobby_Enter4-1 = "Let's do our best for the second half of the concert!"
10105-CVGroup_UIEventLobby_Enter5-1 = "Phew! That was refreshing!"
10105-CVGroup_UIEventLobby_Enter5-2 = "How did you feel, Sensei?"
10105-CVGroup_UIEventLobby_Idle1-1 = "Oh my, Sensei. What's happening?"
10105-CVGroup_UIEventLobby_Idle2-1 = "W-Wait!"

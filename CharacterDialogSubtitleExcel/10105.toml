[translation]
10105-CVGroup_UITitle_Idle1-1 = "블루 아카이브!"
10105-CVGroup_CharacterGet_Idle1-1 = "아이돌은 별로 해본적이 없습니다만… 열심히 하고 오겠습니다.\n잘 부탁드립니다, 선생님!"
10105-CVGroup_Cafe_Idle1-1 = "아늑한 분위기네요."
10105-CVGroup_Cafe_Idle2-1 = "뭔가 시선이 느껴지는 듯한……?"
10105-CVGroup_Cafe_Idle3-1 = "다음에는 무엇을 할까요…?"
10105-CVGroup_Cafe_Idle4-1 = "도와드릴 일이라도 있을까요?"
10105-CVGroup_Cafe_Idle5-1 = "악수회……? 체키…?"
10105-CVGroup_WeaponGet_Idle1-1 = "지금이라면, 뭐든지 선생님께 말할 수 있을 것 같아요.\n그… 그러니까 듣고 잊어주세요.\n…앞으로도, 계속 제 곁에 있어주세요. 약속이에요."
10105-CVGroup_UIEventLobby_Enter1-1 = "안녕하세요 선생님."
10105-CVGroup_UIEventLobby_Enter1-2 = "괜찮으시다면, 저의 스테이지…… 보고 가 주세요!"
10105-CVGroup_UIEventLobby_Enter2-1 = "준비 되셨나요, 선생님?"
10105-CVGroup_UIEventLobby_Enter2-2 = "이제 라이브가 시작돼요!"
10105-CVGroup_UIEventLobby_Enter3-1 = "아직 라이브는 계속될 거예요!"
10105-CVGroup_UIEventLobby_Enter4-1 = "라이브 후반전, 힘냅시다!"
10105-CVGroup_UIEventLobby_Enter5-1 = "후우-! 개운했어요!"
10105-CVGroup_UIEventLobby_Enter5-2 = "선생님은…… 어떠셨나요?"
10105-CVGroup_UIEventLobby_Idle1-1 = "어머 선생님, 무슨 일이세요?"
10105-CVGroup_UIEventLobby_Idle2-1 = "자, 잠깐만요!"
10105-CVGroup_UIEventLobby_Idle2-2 = "지, 지금은, 조금, 그…… 땀이……."
10105-CVGroup_UIEventLobby_Idle3-1 = "싸인……이요?"
10105-CVGroup_UIEventLobby_Idle3-2 = "그, 그런 건 생각해 본 적 없는데……."
10105-CVGroup_UIEventLobby_Idle4-1 = "아쉬움이 남지 않는, 그런 공연을 만들게요!"
10105-CVGroup_UIEventShop_Enter1-1 = "무엇을 찾으시나요?"
10105-CVGroup_UIEventShop_Enter2-1 = "마음에 드는 걸 골라 보세요! 제 추천은……"
10105-CVGroup_UIEventShop_Enter3-1 = "잊으시는 게 없도록, 주의해 주세요!"
10105-CVGroup_UIEventShop_Idle1-1 = "서, 선생님……?!"
10105-CVGroup_UIEventShop_Idle2-1 = "저, 저 말고…… 저쪽을……"
10105-CVGroup_UIEventShop_Idle2-2 = "흐으으~!"
10105-CVGroup_UIEventShop_Buy1-1 = "그걸 고르셨군요. 너무 멋지다고 생각해요!"
10105-CVGroup_UIEventShop_Buy2-1 = "네, 저도 그걸 보고 있었어요."
10105-CVGroup_UIEventShop_Buy3-1 = "그걸로 하시겠어요? 네, 여기 있습니다."
10105-CVGroup_UIEventShop_Buy4-1 = "이거 맞으시죠. 네, 여기 있습니다."

[translation]
10105-CVGroup_UITitle_Idle1-1 = "蔚藍檔案！"
10105-CVGroup_CharacterGet_Idle1-1 = "雖然沒怎麼擔任過偶像……不過我會盡可能努力的。\n請您多多指教，老師！"
10105-CVGroup_Cafe_Idle1-1 = "是個非常舒適的空間呢。"
10105-CVGroup_Cafe_Idle2-1 = "好像能感受到視線……？"
10105-CVGroup_Cafe_Idle3-1 = "接下來該做什麼呢……？"
10105-CVGroup_Cafe_Idle4-1 = "有什麼我能幫忙的事嗎？"
10105-CVGroup_Cafe_Idle5-1 = "握手會……？拍立得……？"
10105-CVGroup_WeaponGet_Idle1-1 = "如果是現在，感覺似乎能向老師訴說一切。\n那個……所以，即便聽見也請您忘記哦。\n……從今以後，請您也一直陪在我身邊吧。\n約好了唷。"
10105-CVGroup_UIEventLobby_Enter1-1 = "您好，老師。"
10105-CVGroup_UIEventLobby_Enter1-2 = "如果可以的話，我的舞台表演……希望您能來看！"
10105-CVGroup_UIEventLobby_Enter2-1 = "準備好了嗎？"
10105-CVGroup_UIEventLobby_Enter2-2 = "不久之後，演唱會即將開始！"
10105-CVGroup_UIEventLobby_Enter3-1 = "演唱會還在繼續哦！"
10105-CVGroup_UIEventLobby_Enter4-1 = "演唱會後半段，一起加油吧！"
10105-CVGroup_UIEventLobby_Enter5-1 = "呼……全力以赴了！"
10105-CVGroup_UIEventLobby_Enter5-2 = "老師玩得還開心嗎？"
10105-CVGroup_UIEventLobby_Idle1-1 = "哎呀老師，您怎麼了嗎？"
10105-CVGroup_UIEventLobby_Idle2-1 = "哇！請，請等一下！"
10105-CVGroup_UIEventLobby_Idle2-2 = "現，現在，那個……因為流了點汗……"
10105-CVGroup_UIEventLobby_Idle3-1 = "簽名……是嗎？"
10105-CVGroup_UIEventLobby_Idle3-2 = "不，不好意思，我完全沒想到……！"
10105-CVGroup_UIEventLobby_Idle4-1 = "我會帶來一場不留遺憾，最棒的表演！"
10105-CVGroup_UIEventShop_Enter1-1 = "在找什麼嗎？"
10105-CVGroup_UIEventShop_Enter2-1 = "請隨意挑選！我推薦的是……"
10105-CVGroup_UIEventShop_Enter3-1 = "請留意不要忘記東西哦！"
10105-CVGroup_UIEventShop_Idle1-1 = "老，老師……？"
10105-CVGroup_UIEventShop_Idle2-1 = "不，不是我……是那邊……"
10105-CVGroup_UIEventShop_Idle2-2 = "呵呵，啊哈哈……！"
10105-CVGroup_UIEventShop_Buy1-1 = "是那個對吧。\n我覺得很不錯！"
10105-CVGroup_UIEventShop_Buy2-1 = "我也對那個很感興趣。"
10105-CVGroup_UIEventShop_Buy3-1 = "要那個嗎？\n好的，請收下。"
10105-CVGroup_UIEventShop_Buy4-1 = "是這個吧。\n好的，請收下。"

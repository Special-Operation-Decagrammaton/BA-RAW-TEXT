[translation]
10105-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10105-CVGroup_CharacterGet_Idle1-1 = "I don't have much experience as an idol... But I'll do my best. I look forward to working with you, Sensei!"
10105-CVGroup_Cafe_Idle1-1 = "It's a cozy atmosphere."

[translation]
10105-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10105-CVGroup_CharacterGet_Idle1-1 = "ฉันไม่เคยทำอะไรอย่างไอดอลเท่าไร...\nแต่ฉันจะตั้งใจทำให้เต็มที่ค่ะ รบกวนด้วยนะคะคุณครู!"
10105-CVGroup_Cafe_Idle1-1 = "บรรยากาศดูอบอุ่นจังเลยนะคะ"
10105-CVGroup_Cafe_Idle2-1 = "ที่มองแบบนั้น... เป็นเพราะชุดเหรอคะ?"
10105-CVGroup_Cafe_Idle3-1 = "ครั้งหน้าทำอะไรดีคะ...?"
10105-CVGroup_Cafe_Idle4-1 = "มีงานอะไรให้ฉันช่วยมั้ยคะ?"
10105-CVGroup_Cafe_Idle5-1 = "งานจับมือ...? ถ่ายรูปเชกิ...?"
10105-CVGroup_WeaponGet_Idle1-1 = "ฉันในตอนนี้สามารถพูดสิ่งที่ปกติแล้วฉันไม่กล้าพูดค่ะ\nฟังคำที่ฉันจะบอกแค่ตอนนี้แล้วปล่อยผ่านไปนะคะ\nจากนี้ไป... ก็ต้องอยู่กับฉันนะคะ สัญญานะคะ"
10105-CVGroup_UIEventLobby_Enter1-1 = "สวัสดีค่ะ คุณครู"
10105-CVGroup_UIEventLobby_Enter1-2 = "ถ้าคุณครูมีเวลา... มารับชมการแสดงของฉันก่อนแล้วค่อยกลับนะคะ!"
10105-CVGroup_UIEventLobby_Enter2-1 = "เตรียมตัวพร้อมหรือยังคะ คุณครู?"
10105-CVGroup_UIEventLobby_Enter2-2 = "ไลฟ์กำลังจะเริ่มแล้วนะคะ!"
10105-CVGroup_UIEventLobby_Enter3-1 = "ไลฟ์จะยังคงดำเนินต่อไปค่ะ!"
10105-CVGroup_UIEventLobby_Enter4-1 = "ไลฟ์ครึ่งหลังก็สู้ๆ นะคะ!"
10105-CVGroup_UIEventLobby_Enter5-1 = "ฮู่ว! สดชื่นดีจริงๆ เลยค่ะ!"
10105-CVGroup_UIEventLobby_Enter5-2 = "คุณครู... รู้สึกยังไงบ้างคะ?"
10105-CVGroup_UIEventLobby_Idle1-1 = "ตายจริง คุณครู มีอะไรหรือเปล่าคะ?"
10105-CVGroup_UIEventLobby_Idle2-1 = "ดะ... เดี๋ยวก่อนสิคะ!"
10105-CVGroup_UIEventLobby_Idle2-2 = "ตะ... ตอนนี้ ฉันเหงื่อออกนะ... นิดหน่อย..."
10105-CVGroup_UIEventLobby_Idle3-1 = "ลายเซ็น... เหรอคะ?"
10105-CVGroup_UIEventLobby_Idle3-2 = "ฉะ... ฉันไม่ได้คิดถึงเรื่องนั้นมาก่อนเลย..."
10105-CVGroup_UIEventLobby_Idle4-1 = "ฉันจะทำให้เป็นการแสดงที่ไม่รู้สึกเสียใจภายหลังเลยค่ะ!"
10105-CVGroup_UIEventShop_Enter1-1 = "กำลังหาอะไรอยู่เหรอคะ?"
10105-CVGroup_UIEventShop_Enter2-1 = "เลือกของที่ชอบได้เลยค่ะ! งั้นฉันขอแนะนำ..."
10105-CVGroup_UIEventShop_Enter3-1 = "ระวังอย่าลืมอะไรนะคะ!"
10105-CVGroup_UIEventShop_Idle1-1 = "คะ... คุณครู...?!"
10105-CVGroup_UIEventShop_Idle2-1 = "ทะ... ทางโน้นค่ะ... มะ... ไม่ใช่ฉัน..."
10105-CVGroup_UIEventShop_Idle2-2 = "ฮื้อออ~!"
10105-CVGroup_UIEventShop_Buy1-1 = "เลือกชิ้นนั้นสินะคะ เป็นความคิดที่ยอดมากเลยค่ะ!"
10105-CVGroup_UIEventShop_Buy2-1 = "ฉันเองก็กำลังเล็งของชิ้นนั้นไว้เหมือนกันค่ะ"
10105-CVGroup_UIEventShop_Buy3-1 = "จะเลือกชิ้นนั้นเหรอคะ? ค่ะ เชิญเลยค่ะ"
10105-CVGroup_UIEventShop_Buy4-1 = "ชิ้นนี้ถูกมั้ยคะ? ค่ะ เชิญเลยค่ะ"

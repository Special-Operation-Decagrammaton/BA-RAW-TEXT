10049-CVGroup_WeaponGet_Idle1-1 = "อ๊ะ... โทษที แต่คิดว่าทำไมถึงต้องเตรียมให้ขนาดนี้...\nต่อไปฉันคงได้มีโอกาสช่วยคุณครูใช่มั้ย?\nถ้าฉันช่วยคุณครูได้ก็คงดีนะ"

10049-CVGroup_UIEventLobby_Enter3-1 = "ไปได้สวยรึเปล่า? ถ้าอย่างนั้น... ก็ค่อยยังชั่วหน่อย"
10049-CVGroup_UIEventLobby_Enter4-1 = "ตอนนี้ก็เหลืออีกไม่กี่ที่แล้ว ไหวอยู่ใช่มั้ย?"
10049-CVGroup_UIEventLobby_Enter5-1 = "การเก็บกวาดก็เป็นเรื่องสำคัญ\n มีอะไรที่ยังทำไม่เสร็จอีกรึเปล่าน่ะ?"

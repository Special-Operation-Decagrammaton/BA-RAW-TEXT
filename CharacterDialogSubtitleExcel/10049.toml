[translation]
10049-CVGroup_UITitle_Idle1-1 = "Blue Archive"
10049-CVGroup_CharacterGet_Idle1-1 = "นักเรียนชั้นปีที่ 1 โรงเรียนสามัญทรีนิตี้\nเคียวยามะ คาซึสะ จากชมรมของหวานหลังเลิกเรียน\nอืม ขอ... ขอฝากตัวด้วยนะ"
10049-CVGroup_Cafe_Idle1-1 = "น่ารักจัง! ไม่แย่เลยนะเนี่ย"
10049-CVGroup_Cafe_Idle2-1 = "เรานั่งตรงนี้... ได้รึเปล่านะ...?"

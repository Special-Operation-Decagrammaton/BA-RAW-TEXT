10049-CVGroup_UIEventLobby_Idle2-1 = "ไม่ต้องห่วงหรอกน่า ฉันไม่ได้คิดจะหนีไปไหนอยู่แล้วด้วย"
10049-CVGroup_UIEventLobby_Idle3-1 = "มันจั๊กจี้นะ"
10049-CVGroup_UIEventLobby_Idle4-1 = "โธ่เอ๊ย หยุดเถอะน่า ไปทำงานต่อได้แล้ว!"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "จะได้อะไรนะ?"

[translation]
10049-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10049-CVGroup_CharacterGet_Idle1-1 = "Trinity General School, After-School Sweets Club's Kyoyama Kazusa. Um, thanks for having me."
10049-CVGroup_Cafe_Idle1-1 = "It's a cute place... Not bad."
10049-CVGroup_Cafe_Idle2-1 = "Can we...sit here?"
10049-CVGroup_Cafe_Idle3-1 = "It looks kind of delicious..."
10049-CVGroup_Cafe_Idle4-1 = "It's relaxing. I like it."
10049-CVGroup_Cafe_Idle5-1 = "You designed this, Sensei?"
10049-CVGroup_WeaponGet_Idle1-1 = "Oh... I didn't know why you were giving this to me... But I guess I'll be able to help you more from here on out."
10049-CVGroup_UIEventLobby_Enter1-1 = "Hey, Sensei. Let's get it done."
10049-CVGroup_UIEventLobby_Enter2-1 = "All right, let's hurry. There's a lot to do."
10049-CVGroup_UIEventLobby_Enter3-1 = "Is it going well? ...I should hope so."
10049-CVGroup_UIEventLobby_Enter4-1 = "This should be the last spurt. Are you still okay?"
10049-CVGroup_UIEventLobby_Enter5-1 = "Cleanup is also important. Is there something you haven't finished yet?"
10049-CVGroup_UIEventLobby_Idle1-1 = "Hm? What's going on?"
10049-CVGroup_UIEventLobby_Idle2-1 = "Don't worry. I'm not going anywhere."
10049-CVGroup_UIEventLobby_Idle3-1 = "...That tickles."
10049-CVGroup_UIEventLobby_Idle4-1 = "Ugh! Knock it off! Go do your job!"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Let's see. What's gonna come out?"
10049-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Okay, let's spin!"
10049-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Hm? Are you sure it's okay for me to spin instead?"
10049-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Sensei. Look at this! Not me!"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Oh... That's pretty awesome! Congratulations."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Yeah. It looks like a good one."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Something that looks special..."
10049-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Take a look and see if there's anything else you want to exchange."

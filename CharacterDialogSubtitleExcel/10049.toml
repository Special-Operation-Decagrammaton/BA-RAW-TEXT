[translation]
10049-CVGroup_UITitle_Idle1-1 = "蔚藍檔案。"
10049-CVGroup_CharacterGet_Idle1-1 = "我是三一綜合學園，\n放學後的甜點部的杏山千紗。\n那個，請……多多，指教。"
10049-CVGroup_Cafe_Idle1-1 = "真可愛呢！\n還不錯。"
10049-CVGroup_Cafe_Idle2-1 = "這個，\n可以坐嗎……"
10049-CVGroup_Cafe_Idle3-1 = "感覺似乎看到什麼好吃的東西……"
10049-CVGroup_Cafe_Idle4-1 = "放鬆的時間。\n真不錯。"
10049-CVGroup_Cafe_Idle5-1 = "這是，\n老師的品味……？"
10049-CVGroup_WeaponGet_Idle1-1 = "……啊，抱歉。不，只是在想為什麼就連這種東西都願意給我……\n這就表示，將來還有很多能夠幫助老師的機會對吧？\n要是幫上忙就好了。"
10049-CVGroup_UIEventLobby_Enter1-1 = "歡迎回來，老師。\n今天也請多指教囉。"
10049-CVGroup_UIEventLobby_Enter2-1 = "好了，快點走吧。\n有很多事要做呢。"
10049-CVGroup_UIEventLobby_Enter3-1 = "情況如何？\n……那就好。"
10049-CVGroup_UIEventLobby_Enter4-1 = "差不多要最後衝刺了，還撐得住嗎？"
10049-CVGroup_UIEventLobby_Enter5-1 = "事後收拾也很重要。\n還有什麼沒做完的事嗎？"
10049-CVGroup_UIEventLobby_Idle1-1 = "嗯，怎麼了？"
10049-CVGroup_UIEventLobby_Idle2-1 = "不用擔心，我哪裡都不會去哦。"
10049-CVGroup_UIEventLobby_Idle3-1 = "……就說很癢了。"
10049-CVGroup_UIEventLobby_Idle4-1 = "啊啊真是的，好了！做你該做的事！"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "那麼，會出現什麼呢？"
10049-CVGroup_UIEventBoxGachaShop_Enter2-1 = "來，多轉幾次吧？"
10049-CVGroup_UIEventBoxGachaShop_Idle1-1 = "咦，要我代替你轉嗎？"
10049-CVGroup_UIEventBoxGachaShop_Idle2-1 = "老師，不是看我，要看這裡啊。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "哦……真厲害，恭喜。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "看起來挺好的呢，嗯。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "啊，總覺得出現了什麼很厲害的東西……"
10049-CVGroup_UIEventBoxGachaShop_Enter3-1 = "好好看看，還有沒有什麼要交換的東西吧。"

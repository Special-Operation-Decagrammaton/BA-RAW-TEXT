[translation]
10049-CVGroup_UITitle_Idle1-1 = "블루 아카이브."
10049-CVGroup_CharacterGet_Idle1-1 = "트리니티 종합학원, 방과후 디저트부의 쿄야마 카즈사.\n음, 잘…… 부탁, 드립니다."
10049-CVGroup_Cafe_Idle1-1 = "귀엽네! 나쁘지 않아."
10049-CVGroup_Cafe_Idle2-1 = "여기, 앉아도 괜찮을까……."
10049-CVGroup_Cafe_Idle3-1 = "뭔가 맛있을 것 같아 보이는 게……."
10049-CVGroup_Cafe_Idle4-1 = "한가한 시간, 나쁠 거 없지."
10049-CVGroup_Cafe_Idle5-1 = "이거, 선생님의 센스……?"
10049-CVGroup_WeaponGet_Idle1-1 = "……아, 미안. 아니, 왜 이런 것까지 주는 걸까 해서…….\n선생님을 도울 수 있는 기회가 앞으로도 있다는 거겠지? 도움이 된다면 좋겠네."
10049-CVGroup_UIEventLobby_Enter1-1 = "어서 와, 선생님. 오늘도 잘 부탁해."
10049-CVGroup_UIEventLobby_Enter2-1 = "자, 빨리 가자. 할 일이 잔뜩이라고."
10049-CVGroup_UIEventLobby_Enter3-1 = "잘 되고 있어? ……그렇다면 다행이지만."
10049-CVGroup_UIEventLobby_Enter4-1 = "슬슬 라스트 스퍼트일까. 할 수 있겠어?"
10049-CVGroup_UIEventLobby_Enter5-1 = "뒷정리도 중요해. 뭐, 아직 못 끝낸 거라도 있어?"
10049-CVGroup_UIEventLobby_Idle1-1 = "응? 무슨 일이야?"
10049-CVGroup_UIEventLobby_Idle2-1 = "걱정 안 해도, 어디 안 간다니까."
10049-CVGroup_UIEventLobby_Idle3-1 = "……간지럽다니까."
10049-CVGroup_UIEventLobby_Idle4-1 = "아아~ 좀! 자! 자! 일이나 해!"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "보자, 뭐가 나올까?"
10049-CVGroup_UIEventBoxGachaShop_Enter2-1 = "자, 잔뜩 돌려볼까?"
10049-CVGroup_UIEventBoxGachaShop_Idle1-1 = "응? 내가 대신 돌려도 돼?"
10049-CVGroup_UIEventBoxGachaShop_Idle2-1 = "선생님, 나 말고 여기를 보라고."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "오…… 굉장한데, 축하해."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "꽤 좋아 보이는데, 응."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "아, 뭔가 굉장해 보이는 게……."
10049-CVGroup_UIEventBoxGachaShop_Enter3-1 = "아직 더 교환할 게 없는지, 잘 봐 봐."

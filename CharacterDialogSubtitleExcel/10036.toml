[translation]
10036-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10036-CVGroup_CharacterGet_Idle1-1 = "วะ...วาคาบะ ฮินาตะค่ะ ขอฝากตัวด้วยนะคะ..."
10036-CVGroup_Cafe_Idle1-1 = "ฉะ...ฉันรู้สึก... สงบใจไม่ได้เลยค่ะ"
10036-CVGroup_Cafe_Idle2-1 = "สุดยอดเลยค่ะ... มีของตั้งหลายอย่าง..."
10036-CVGroup_Cafe_Idle3-1 = "บางครั้งการนอนพักสบายๆ ในที่แบบนี้ก็เป็นเรื่องที่ดีใช่มั้ยคะ...?"
10036-CVGroup_Cafe_Idle4-1 = "อืม เหนื่อยจังเลย..."
10036-CVGroup_Cafe_Idle5-1 = "มะ...มานอนพักแบบนี้จะไม่เป็นอะไรใช่มั้ยคะ...?"
10036-CVGroup_WeaponGet_Idle1-1 = "ได้รับการคาดหวังแบบนี้ ฉันมีความสุขมากเลยค่ะ!\nฉันจะเติมเต็มความคาดหวังให้ได้ค่ะ"
10036-CVGroup_UIEventLobby_Enter1-1 = "ทำได้ดีมากค่ะ คุณครู! ฉันกำลังรออยู่เลยค่ะ!"
10036-CVGroup_UIEventLobby_Enter2-1 = "ขอให้มีความสงบสุขตลอดไปนะคะ..."
10036-CVGroup_UIEventLobby_Enter2-2 = "ว่าแล้วเชียว ถ้าฉันทำแบบนี้คงจะแปลกๆ สินะคะ...?"
10036-CVGroup_UIEventLobby_Enter3-1 = "ถ้างั้นมาออกแรงเพิ่มอีกหน่อยดีมั้ยคะ?!"
10036-CVGroup_UIEventLobby_Enter4-1 = "ฉันคิดว่าพวกเรา... คงต้องรีบกันหน่อยแล้วค่ะ..."
10036-CVGroup_UIEventLobby_Enter4-2 = "ฉะ...ฉันจะพยายามค่ะ!"
10036-CVGroup_UIEventLobby_Enter5-1 = "ใกล้หมดเวลาแล้วนะคะ ฉันจะช่วยคุณครูเองค่ะ!"
10036-CVGroup_UIEventLobby_Idle1-1 = "คุณครูต้องการอะไรรึเปล่าคะ มีของที่ต้องการรึเปล่าคะ?"
10036-CVGroup_UIEventLobby_Idle2-1 = "คะ...คือว่า...? คุณครูมีเรื่องอะไร... จะพูดรึเปล่าคะ?"
10036-CVGroup_UIEventLobby_Idle3-1 = "คุณครูคะ...? มีอะไรติดอยู่ที่หน้าฉันรึเปล่าคะ?"
10036-CVGroup_UIEventLobby_Idle4-1 = "ที่จริงฉันเองก็รู้สึกสนุกมากที่ได้พุดคุยกับคุณครูแบบนี้ แต่ว่า..."
10036-CVGroup_UIEventLobby_Idle4-2 = "ระ...เราออกเดินทางกันเลยดีมั้ยคะ...?"
10036-CVGroup_UIEventShop_Enter1-1 = "ฉะ...ฉันลองจัดของที่จำเป็นไว้แล้วค่ะ!\nคุณครูลองดูได้ตามสบายเลยนะคะ..."
10036-CVGroup_UIEventShop_Enter2-1 = "ถ้าเป็นเรื่องการจัดของเชื่อมือฉันได้เลยค่ะ...! ดูนะคะ!"
10036-CVGroup_UIEventShop_Enter3-1 = "ยังมีเวลาเหลืออยู่นิดหน่อย ลองเลือกดูก่อนที่จะหมดเวลาดีมั้ยคะ?"
10036-CVGroup_UIEventShop_Idle1-1 = "คะ...คือว่าฉัน... คะ...ควรต้องทำยังไงดี...?"
10036-CVGroup_UIEventShop_Idle2-1 = "ยะ...อย่ามองฉันสิคะ ชะ...ช่วยดูของด้านนี้หน่อยค่ะ…!"
10036-CVGroup_UIEventShop_Buy1-1 = "อ๊ะ ชิ้นนั้นก็ดีนะคะ!"
10036-CVGroup_UIEventShop_Buy2-1 = "ค่ะ ฉันเองก็คิดว่าดีเหมือนกันค่ะ"
10036-CVGroup_UIEventShop_Buy3-1 = "สมกับเป็นคุณครูที่สุดเลยค่ะ!"
10036-CVGroup_UIEventShop_Buy4-1 = "ฮิฮิ เลือกของได้ดีมากเลยค่ะ!"

[translation]
10036-CVGroup_UITitle_Idle1-1 = "B-Blue Archive!"
10036-CVGroup_CharacterGet_Idle1-1 = "I-I'm Wakaba Hinata. Nice to meet you."
10036-CVGroup_Cafe_Idle1-1 = "I-I can't sit still for some reason."
10036-CVGroup_Cafe_Idle2-1 = "There are so many different things here..."
10036-CVGroup_Cafe_Idle3-1 = "I-It's probably not a bad idea to rest somewhere like this every once in a while, right?"
10036-CVGroup_Cafe_Idle4-1 = "Hmm... I'm tired."
10036-CVGroup_Cafe_Idle5-1 = "Is it really okay for me to relax like this?"
10036-CVGroup_WeaponGet_Idle1-1 = "I didn't expect to get so much attention. But...I'm glad! I'll try to live up to everyone's expectations!"
10036-CVGroup_UIEventLobby_Enter1-1 = "You're here, Sensei! I've been waiting for you!"
10036-CVGroup_UIEventLobby_Enter2-1 = "Peace be with you. Always."
10036-CVGroup_UIEventLobby_Enter2-2 = "...It's a bit awkward when I try to say it, huh?"
10036-CVGroup_UIEventLobby_Enter3-1 = "Let's try a little harder!"
10036-CVGroup_UIEventLobby_Enter4-1 = "I think we need to hurry up a bit..."
10036-CVGroup_UIEventLobby_Enter4-2 = "I-I'll try my best!"
10036-CVGroup_UIEventLobby_Enter5-1 = "Finishing things is important. I'll help you!"
10036-CVGroup_UIEventLobby_Idle1-1 = "Is something wrong, Sensei? Do you need anything?"
10036-CVGroup_UIEventLobby_Idle2-1 = "Um... Is there something on your mind?"
10036-CVGroup_UIEventLobby_Idle3-1 = "Sensei? Is there something on my face?"
10036-CVGroup_UIEventLobby_Idle4-1 = "I like talking about things like this with you, but..."
10036-CVGroup_UIEventLobby_Idle4-2 = "Isn't it about time we start heading out?"
10036-CVGroup_UIEventShop_Enter1-1 = "I-I organized the things you need! Take a look when you can!"
10036-CVGroup_UIEventShop_Enter2-1 = "I'm good at organizing and managing! Please, take a look!"
10036-CVGroup_UIEventShop_Enter3-1 = "There's some work left to do. Could you check before I finish?"
10036-CVGroup_UIEventShop_Idle1-1 = "I-I-I... What am I supposed to do...?"
10036-CVGroup_UIEventShop_Idle2-1 = "P-Please look at the organized items, not at me..."
10036-CVGroup_UIEventShop_Buy1-1 = "Oh, that's good!"
10036-CVGroup_UIEventShop_Buy2-1 = "I agree. That would be best."
10036-CVGroup_UIEventShop_Buy3-1 = "I knew I could count on you!"
10036-CVGroup_UIEventShop_Buy4-1 = "Hmm... I think that's good!"

[translation]
10036-CVGroup_UITitle_Idle1-1 = "蔚，蔚藍檔案……！"
10036-CVGroup_CharacterGet_Idle1-1 = "我，我叫若葉日向……\n請多指教……"
10036-CVGroup_Cafe_Idle1-1 = "總，總覺得那個……\n令人，緊張呢……"
10036-CVGroup_Cafe_Idle2-1 = "好厲害，\n有各種東西……"
10036-CVGroup_Cafe_Idle3-1 = "偶，偶爾在這種地方，\n悠哉一下也可以吧……？"
10036-CVGroup_Cafe_Idle4-1 = "唉，累了……"
10036-CVGroup_Cafe_Idle5-1 = "這，這麼悠閒可以嗎……？"
10036-CVGroup_WeaponGet_Idle1-1 = "沒，沒想到會這麼備受期待……\n……我很開心。\n我會努力，回應期待的……！"
10036-CVGroup_UIEventLobby_Enter1-1 = "辛苦了，老師！\n恭候多時了……！"
10036-CVGroup_UIEventLobby_Enter2-1 = "希望平安與您同在……"
10036-CVGroup_UIEventLobby_Enter2-2 = "那個……果然這種工作不太適合我嗎……？"
10036-CVGroup_UIEventLobby_Enter3-1 = "那麼，重新打起精神一起加油吧！"
10036-CVGroup_UIEventLobby_Enter4-1 = "啊，稍微加緊腳步似乎會比較好呢……？"
10036-CVGroup_UIEventLobby_Enter4-2 = "我，我會努力的！"
10036-CVGroup_UIEventLobby_Enter5-1 = "到收尾時間了呢，我會全力幫忙的！"
10036-CVGroup_UIEventLobby_Idle1-1 = "……？老師，發生什麼事了嗎？\n有什麼需要的東西嗎？"
10036-CVGroup_UIEventLobby_Idle2-1 = "那，那個……？\n發生什麼事了嗎……？"
10036-CVGroup_UIEventLobby_Idle3-1 = "老師……？我的臉上沾到什麼奇怪的東西了嗎……？"
10036-CVGroup_UIEventLobby_Idle4-1 = "雖然像這樣和老師說話很開心，但是那個，"
10036-CVGroup_UIEventLobby_Idle4-2 = "是不是差不多該出發了……？"
10036-CVGroup_UIEventShop_Enter1-1 = "其，其實，我事先把可能會需要的東西統整好了！\n再麻煩您確認了……！"
10036-CVGroup_UIEventShop_Enter2-1 = "如果需要整理或管理，請務必交給我……！\n這些請您過目！"
10036-CVGroup_UIEventShop_Enter3-1 = "似乎還剩下一點時間，要不要去確認一下呢？"
10036-CVGroup_UIEventShop_Idle1-1 = "那，那個，我究竟該怎麼做……？"
10036-CVGroup_UIEventShop_Idle2-1 = "不，不是看我，請您看這邊……！"
10036-CVGroup_UIEventShop_Buy1-1 = "啊，那個不錯呢！"
10036-CVGroup_UIEventShop_Buy2-1 = "是的，我也覺得那個東西不錯。"
10036-CVGroup_UIEventShop_Buy3-1 = "不愧是老師！"
10036-CVGroup_UIEventShop_Buy4-1 = "呵呵，真是不錯的一次購物呢！"

[translation]
10036-CVGroup_UITitle_Idle1-1 = "브, 블루 아카이브!"
10036-CVGroup_CharacterGet_Idle1-1 = "와, 와카바 히나타라고 합니다……. 잘 부탁드립니다……."
10036-CVGroup_Cafe_Idle1-1 = "뭐, 뭔가 그……. 긴장…… 하게 되네요……."
10036-CVGroup_Cafe_Idle2-1 = "굉장해, 다양한 물건이……."
10036-CVGroup_Cafe_Idle3-1 = "가, 가끔은 이런 곳에서 천천히 쉬는 것도 괜찮겠죠……?"
10036-CVGroup_Cafe_Idle4-1 = "으음……. 피곤해……."
10036-CVGroup_Cafe_Idle5-1 = "이, 이렇게 쉬고 있어도 괜찮은 걸까……?"
10036-CVGroup_WeaponGet_Idle1-1 = "이, 이렇게까지 기대를 받을 거라곤…….\n…기뻐요. 힘내서, 기대에 부응해 보겠습니다……!"
10036-CVGroup_UIEventLobby_Enter1-1 = "수고하셨습니다, 선생님! 기다리고 있었답니다!"
10036-CVGroup_UIEventLobby_Enter2-1 = "부디, 평안이 함께 하시기를……."
10036-CVGroup_UIEventLobby_Enter2-2 = "……역시 제가 하면 좀 어색한가요……?"
10036-CVGroup_UIEventLobby_Enter3-1 = "그럼, 다시 한번 힘을 내볼까요!"
10036-CVGroup_UIEventLobby_Enter4-1 = "아, 조금 서두르는 게 좋을지도 모르겠네요……."
10036-CVGroup_UIEventLobby_Enter4-2 = "여, 열심히 하겠습니다!"
10036-CVGroup_UIEventLobby_Enter5-1 = "마무리 정돈 시간이네요. 열심히 돕겠습니다!"
10036-CVGroup_UIEventLobby_Idle1-1 = "선생님, 무슨 일 있으세요? 뭔가 필요한 거라도 있으신가요?"
10036-CVGroup_UIEventLobby_Idle2-1 = "저, 저기……? 뭔가 하실 말씀 이라도……?"
10036-CVGroup_UIEventLobby_Idle3-1 = "선생님……? 제 얼굴에 뭐라도 묻어 있나요…?"
10036-CVGroup_UIEventLobby_Idle4-1 = "이렇게 선생님과 이야기하는 것은 즐겁지만, 저기,"
10036-CVGroup_UIEventLobby_Idle4-2 = "슬슬 출발하는 편이……?"
10036-CVGroup_UIEventShop_Enter1-1 = "피, 필요하신 것들을 정리해 봤어요! 편하게 확인해 주세요……."
10036-CVGroup_UIEventShop_Enter2-1 = "정리랑 관리라면, 꼭 제게 맡겨 주세요……! 이걸 봐주세요!"
10036-CVGroup_UIEventShop_Enter3-1 = "아직 약간 시간이 남은 것 같은데요. 확인해 보시겠어요?"
10036-CVGroup_UIEventShop_Idle1-1 = "저, 저기, 저는 대체 어떻게 하면……?"
10036-CVGroup_UIEventShop_Idle2-1 = "제, 제가 아니라, 이쪽을 봐 주시면……!"
10036-CVGroup_UIEventShop_Buy1-1 = "아. 그거 좋죠!"
10036-CVGroup_UIEventShop_Buy2-1 = "네, 저도 그게 좋다고 생각해요."
10036-CVGroup_UIEventShop_Buy3-1 = "역시 선생님이시군요!"
10036-CVGroup_UIEventShop_Buy4-1 = "후훗, 좋은 쇼핑이었네요!"

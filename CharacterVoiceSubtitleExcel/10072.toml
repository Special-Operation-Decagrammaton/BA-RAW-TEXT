10072-CVGroup_Battle_In_1-1 = "เริ่มการต่อสู้"
10072-CVGroup_Battle_In_2-1 = "เริ่มต่อสู้ได้!"
10072-CVGroup_Battle_Move_1-1 = "ไปต่อเลย!"
10072-CVGroup_Battle_Move_2-1 = "มุ่งสู่เป้าหมาย!"
10072-CVGroup_Battle_Recovery_1-1 = "ขอบคุณนะ!"
10072-CVGroup_Battle_TacticalAction_1-1 = "เคลียร์!"
10072-CVGroup_Battle_Victory_1-1 = "รบร้อยไร้พ่ายเพียงล่วงรู้!"
10072-CVGroup_Battle_Victory_2-1 = "สำหรับหน่วยรบพิเศษ SRT เรื่องแค่นี้มันง่ายจะตายไป!"
10072-CVGroup_CommonSkill-1 = "หมอบลง ยิง!"
10072-CVGroup_ExSkill_1-1 = "(ฮุฮุ... อ่า วิวสวยจัง...)"
10072-CVGroup_ExSkill_2-1 = "(การปฏิบัติการใต้น้ำให้เป็นหน้าที่ของฉันเอง!)"
10072-CVGroup_ExSkill_3-1 = "(เพราะแบบนี้ไงถึงเลิกดำน้ำไม่ได้น่ะ...!)"
10072-CVGroup_ExSkill_Level_1-1 = "ฟ็อกซ์ทรอต ยิงได้!"
10072-CVGroup_ExSkill_Level_2-1 = "ทางโน้น!"
10072-CVGroup_ExSkill_Level_3-1 = "แบบนี้คงเจ็บสุดๆ เลยนะ?"
10072-CVGroup_Formation_In_1-1 = "ภารกิจคราวนี้เป็นภารกิจใต้น้ำงั้นเหรอ จะทำได้ดีรึเปล่านะ..."
10072-CVGroup_Formation_In_2-1 = "ไม่ว่าจะเป็นที่ภูเขาหรือทะเล SRT อย่างเราก็ไม่หวั่น!"
10072-CVGroup_Formation_Select-1 = "เดี๋ยวก่อน... อย่าเข้ามาอยู่ใกล้ๆ สิ ตอนทำภารกิจมันอันตรายนะ!"
10072-CVGroup_Growup_1-1 = "ถึงพื้นที่จะเปลี่ยนไป แต่ก็จะละเลยการฝึกไม่ได้"
10072-CVGroup_Growup_2-1 = "เหงื่อที่รินไหลวันนี้จะนำไปสู่ชัยชนะในวันข้างหน้า"
10072-CVGroup_Growup_3-1 = "ฉันไม่ได้จะอวดหรอกนะ... แต่ฉันแข็งแกร่งขึ้นนิดหน่อยแล้วละ..."
10072-CVGroup_Growup_4-1 = "(ถ้าเป็นแบบนี้ละก็... อาจเข้าใกล้รุ่นพี่ขึ้นอีกก้าวหนึ่งก็ได้)"
10072-CVGroup_Relationship_Up_1-1 = "เอาเถอะ ถ้าเป็นคุณครูละก็...\nไม่ว่าจะเป็นคำสั่งแบบไหนก็คงไม่เกี่ยง..."
10072-CVGroup_Relationship_Up_2-1 = "ฉันไม่อยากแสดงภาพลักษณ์ที่ล้มเหลวให้เห็น\nโดยเฉพาะเวลาที่อยู่ต่อหน้าคุณครูน่ะ..."
10072-CVGroup_Relationship_Up_3-1 = "เอ่อ นี่น่ะ... เรียกว่าเป็นคำขอบคุณที่คอยช่วยเหลือฉันมาตลอด..."
10072-CVGroup_Relationship_Up_4-1 = "ถ้ามีเรื่องอะไรละก็ เรียกฉันได้ตลอดเลยนะ\nถึงจะไม่ใช่ภารกิจของ SRT ก็ตาม"
10072-CVGroup_Tactic_In_1-1 = "ฉันจะนำทางให้ในพื้นที่นี้เอง!"
10072-CVGroup_Tactic_In_2-1 = "เริ่มการค้นหา ระวังการซุ่มโจมตีระหว่างบุกเข้าไปด้วยล่ะ"
10072-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ เป็นชัยชนะตามที่วางแผนไว้เลย!"
10072-CVGroup_Tactic_Victory_2-1 = "ว่าแล้วเชียว... หนังสือคู่มือไม่เคยโกหกใคร"

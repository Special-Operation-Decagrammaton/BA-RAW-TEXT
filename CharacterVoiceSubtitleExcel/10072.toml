[translation]
10072-CVGroup_Battle_Buffed_1-1 = "哦哦……力量湧現出來了……！"
10072-CVGroup_Battle_Defense_1-1 = "這可是防彈的啊！"
10072-CVGroup_Battle_In_1-1 = "戰鬥，開始。"
10072-CVGroup_Battle_In_2-1 = "交戰，開始！"
10072-CVGroup_Battle_Move_1-1 = "下一個，要上囉！"
10072-CVGroup_Battle_Move_2-1 = "向著目標，前進！"
10072-CVGroup_Battle_Recovery_1-1 = "幫大忙了！"
10072-CVGroup_Battle_TacticalAction_1-1 = "Clear！"
10072-CVGroup_Battle_Victory_1-1 = "知己知彼，百戰不殆！"
10072-CVGroup_Battle_Victory_2-1 = "這種程度，對SRT特殊隊員來說只是小菜一疊哦！"
10072-CVGroup_CommonSkill-1 = "就位，射擊！"
10072-CVGroup_ExSkill_1-1 = "（呵呵……啊啊，真是不錯的景色……）"
10072-CVGroup_ExSkill_2-1 = "（水中作戰就交給我吧！）"
10072-CVGroup_ExSkill_3-1 = "（就是因為這樣，我才無法停止潛水啊……！）"
10072-CVGroup_ExSkill_Level_1-1 = "Foxtrot，投放！"
10072-CVGroup_ExSkill_Level_2-1 = "是那邊！"
10072-CVGroup_ExSkill_Level_3-1 = "這可是會痛的哦？"
10072-CVGroup_Formation_In_1-1 = "這次的任務是水中作戰啊……\n能順利達成嗎……"
10072-CVGroup_Formation_In_2-1 = "無論山戰還是海戰──\n我們SRT都沒有死角！"
10072-CVGroup_Formation_Select-1 = "等一下……\n因為會有危險，作戰中不要靠得太近！"
10072-CVGroup_Growup_1-1 = "就算更換了地點，也不能輕視訓練。"
10072-CVGroup_Growup_2-1 = "我相信今日流下的汗水，將會帶來明日的勝利。"
10072-CVGroup_Growup_3-1 = "我沒有要自誇的意思……\n我，好像稍微變強了……？"
10072-CVGroup_Growup_4-1 = "（這樣是否或多或少……更接近前輩們了呢）"
10072-CVGroup_Relationship_Up_1-1 = "如果是老師的話……\n要下達什麼命令……都沒關係吧。"
10072-CVGroup_Relationship_Up_2-1 = "我不想露出狼狽的樣子。\n……如果在老師面前，更是如此。"
10072-CVGroup_Relationship_Up_3-1 = "這是，那個……一直以來受你幫助的，謝禮，該這麼說嗎……"
10072-CVGroup_Relationship_Up_4-1 = "要是遇到什麼困難，隨時跟我說吧。\n即使不是SRT的事也可以，明白嗎？"
10072-CVGroup_Tactic_In_1-1 = "這裡由我來帶領！"
10072-CVGroup_Tactic_In_2-1 = "搜索開始。\n一邊注意奇襲一邊前進。"
10072-CVGroup_Tactic_Victory_1-1 = "啊啊，是一如作戰的勝利！"
10072-CVGroup_Tactic_Victory_2-1 = "果然……教戰手冊不會騙人。"

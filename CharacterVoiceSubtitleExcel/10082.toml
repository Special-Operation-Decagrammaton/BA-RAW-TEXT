[translation]
10082-CVGroup_Battle_Buffed_1-1 = "딱 좋을 때네!"
10082-CVGroup_Battle_Covered_1-1 = "엄폐 완료!"
10082-CVGroup_Battle_Defense_1-1 = "소용 없어!"
10082-CVGroup_Battle_In_1-1 = "선두는 나야! 자, 따라와!"
10082-CVGroup_Battle_In_2-1 = "하! 백화요란의 저력을 보여주지!"
10082-CVGroup_Battle_Move_1-1 = "다음!"
10082-CVGroup_Battle_Move_2-1 = "대열을 지켜! 간다!"
10082-CVGroup_Battle_Recovery_1-1 = "오! 고마워!"
10082-CVGroup_Battle_TacticalAction_1-1 = "장소, 이동한다!"
10082-CVGroup_Battle_Victory_1-1 = "돌격대장이라는 이름은 그냥 붙은 게 아니라고!"
10082-CVGroup_Battle_Victory_2-1 = "내가 가는 길, 승리만이 있을 뿐!"
10082-CVGroup_CommonSkill-1 = "좋아, 기합 넣고 가볼까!"
10082-CVGroup_ExSkill_1-1 = "내가, 백화요란의 돌격대장이다!"
10082-CVGroup_ExSkill_2-1 = "그럼, 이쪽도 전력으로 상대하겠어!"
10082-CVGroup_ExSkill_3-1 = "아-직! 끝이 아니라고!"
10082-CVGroup_ExSkill_Level_1-1 = "하! 버텨보라고!"
10082-CVGroup_ExSkill_Level_2-1 = "자, 일발역전이다!"
10082-CVGroup_ExSkill_Level_3-1 = "어때, 이게 백화요란의 사격술이라고!"
10082-CVGroup_Formation_In_1-1 = "좋아! 내 차례인 거지!"
10082-CVGroup_Formation_In_2-1 = "아아, 맡겨만 줘!"
10082-CVGroup_Formation_Select-1 = "자, 잠깐! 스승님! 아직… 마음의 준비가…!"
10082-CVGroup_Growup_1-1 = "선생님 덕분에 나는 성장했어. 아아, 전부 스승님 덕분이야. 고마워."
10082-CVGroup_Growup_2-1 = "이런 방식의 가르침도 있는 거구나….\n나는 생각지도 못했어. 선생… 아니. 스승님은 역시 굉장한 걸."
10082-CVGroup_Growup_3-1 = "굉장해! 뭔가, 힘이 솟아난다고 할까. 응! 굉장해! 어쨌든, 굉장하네!"
10082-CVGroup_Growup_4-1 = "즉, 선생님은 내게 기대하고 있단 거지?\n하핫! 나만 믿어! 전력으로 보답할게!"
10082-CVGroup_Relationship_Up_1-1 = "아니, 확실히 <청춘 활동>을 함께 해달라고는 했지만.\n이런 것까지 해도… 괜찮은, 건가?!"
10082-CVGroup_Relationship_Up_2-1 = "(어, 이거 괜찮나? 괜찮은 건가?!\n선생님과 거리가, 가까워…. 우와앗, 어쩌지!)"
10082-CVGroup_Relationship_Up_3-1 = "으으으음! 선생님이랑 같이 있으려니, 뭔가 근질근질…!\n으아앗! 미안! 잠깐 운동장 좀 뛰고 올게!"
10082-CVGroup_Relationship_Up_4-1 = "아…. 그게. …아니, 컨디션은 괜찮아. 단지, 그….\n스승님은 나를 아껴주고 있구나…하고\n그, 그렇게 생각했을 뿐이야!"
10082-CVGroup_Tactic_In_1-1 = "백화요란의 실력, 잘 보라고!"
10082-CVGroup_Tactic_In_2-1 = "후딱 끝내고 올게!"
10082-CVGroup_Tactic_Victory_1-1 = "하하! 선생님의 지휘가 있었기에 승리한 거네."
10082-CVGroup_Tactic_Victory_2-1 = "작전 종료. 다들, 멋진 연계였어!"

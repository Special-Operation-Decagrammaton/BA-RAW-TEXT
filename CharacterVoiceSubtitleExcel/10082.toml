[translation]
10082-CVGroup_Battle_Buffed_1-1 = "ถึงเวลาเหมาะๆ แล้ว!"
10082-CVGroup_Battle_Covered_1-1 = "พรางตัวสำเร็จ!"
10082-CVGroup_Battle_Defense_1-1 = "เปล่าประโยชน์!"
10082-CVGroup_Battle_In_1-1 = "ฉันจะเป็นคนนำเอง! เอ้า ตามมา!"
10082-CVGroup_Battle_In_2-1 = "ฮ่า! ฉันจะแสดงพลังของเฮียกกะเรียวรันให้ดูเอง!"
10082-CVGroup_Battle_Move_1-1 = "ต่อไป!"
10082-CVGroup_Battle_Move_2-1 = "รักษารูปขบวนไว้! ลุยละนะ!"
10082-CVGroup_Battle_Recovery_1-1 = "โอ้! ขอบคุณมาก!"
10082-CVGroup_Battle_TacticalAction_1-1 = "เปลี่ยนสถานที่!"
10082-CVGroup_Battle_Victory_1-1 = "ตำแหน่งหัวหน้าหน่วยจู่โจมไม่ได้มีดีแค่ชื่อหรอกนะ!"
10082-CVGroup_Battle_Victory_2-1 = "เส้นทางที่ฉันไป มีเพียงชัยชนะเท่านั้น!"
10082-CVGroup_CommonSkill-1 = "ดีละ ใส่พลังลุยให้เต็มที่เลย!"
10082-CVGroup_ExSkill_1-1 = "ฉันคือหัวหน้าหน่วยจู่โจมของเฮียกกะเรียวรัน!"
10082-CVGroup_ExSkill_2-1 = "ถ้างั้นจะบุกเข้าต่อสู้กับทางนี้อย่างสุดกำลังเลย!"
10082-CVGroup_ExSkill_3-1 = "ยังหรอกน่า! ยังไม่จบหรอกน่า!"
10082-CVGroup_ExSkill_Level_1-1 = "ฮ่ะ! อดทนกันหน่อยเซ่!"
10082-CVGroup_ExSkill_Level_2-1 = "เอาละ ได้เวลาช็อตพลิกเกม!"
10082-CVGroup_ExSkill_Level_3-1 = "เป็นไง นี่ละฝีมือการยิงปืนของเฮียกกะเรียวรันละ!"
10082-CVGroup_Formation_In_1-1 = "ดีละ! ถึงตาฉันแล้วสินะ!"
10082-CVGroup_Formation_In_2-1 = "อ่า ไว้ใจได้เลย!"
10082-CVGroup_Formation_Select-1 = "ดะ... เดี๋ยวก่อน! ท่านอาจารย์! ฉันยัง... ไม่ได้เตรียมใจ...!"
10082-CVGroup_Growup_1-1 = "ฉันก้าวหน้าขึ้นได้เพราะท่านอาจารย์เลยนะ\nอ่า ต้องขอบคุณท่านอาจารย์เลยละ ขอบคุณนะ"
10082-CVGroup_Growup_2-1 = "มีวิธีการสอนแบบนี้ด้วยสินะ... ฉันคิดไม่ถึงเลย คุณครู...\nไม่สิ ท่านอาจารย์นี่สุดยอดจริงๆ เลยนะ"
10082-CVGroup_Growup_3-1 = "สุดยอด! รู้สึกเหมือนพลังล้นเอ่อออกมาเลย\nอื้อ! สุดยอดเลย! เอาเป็นว่าสุดยอดมากเลยนะ!"
10082-CVGroup_Growup_4-1 = "ท่านอาจารย์เองก็คาดหวังในตัวฉันอยู่เหมือนกันใช่มั้ย?\nฮะฮ่า! เชื่อมือฉันได้เลย! จะตอบแทนให้เต็มที่เลย!"
10082-CVGroup_Relationship_Up_1-1 = "ไม่ละ ฉันขอให้เข้าร่วม <กิจกรรมวัยรุ่น> ด้วยกันก็จริง\nแต่ทำเรื่องแบบนี้... จะไม่เป็นอะไรแน่เหรอ?!"
10082-CVGroup_Relationship_Up_2-1 = "(เอ๋ ไม่เป็นไรแน่นะ? จะไม่เป็นไรแน่รึเปล่านะ?!\nใกล้ชิดกับคุณครูขึ้นอีกนิด... ว้าววว อะไรกันเนี่ย!)"
10082-CVGroup_Relationship_Up_3-1 = "อืมมมม! เป็นเพราะอยู่กับคุณครูรึเปล่านะ ถึงรู้สึกลุกลี้ลุกลนแบบนี้...!\nอ้าก! โทษที! ฉันขอไปออกกำลังกายก่อนนะ!"
10082-CVGroup_Relationship_Up_4-1 = "อ่า... คือว่า... เปล่า... ฉันสบายดี แต่ว่ามัน...\nท่านอาจารย์เป็นห่วงฉันอยู่... สินะ\nฉะ... ฉันก็แค่คิดแบบนั้นแหละ!"
10082-CVGroup_Tactic_In_1-1 = "จงดูความสามารถของเฮียกกะเรียวรันให้ดีๆ ล่ะ!"
10082-CVGroup_Tactic_In_2-1 = "ฉันจะรีบทำให้เสร็จแล้วกลับมานะ!"
10082-CVGroup_Tactic_Victory_1-1 = "ฮ่าฮ่า! ชนะได้เพราะการสั่งการของท่านอาจารย์เลยนะ"
10082-CVGroup_Tactic_Victory_2-1 = "ปฏิบัติการเสร็จสิ้น\nทุกคนผนึกกำลังกันได้เยี่ยมมาก!"

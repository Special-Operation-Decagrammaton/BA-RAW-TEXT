[translation]
10082-CVGroup_Battle_Buffed_1-1 = "情勢正好！"
10082-CVGroup_Battle_Covered_1-1 = "掩蔽完畢！"
10082-CVGroup_Battle_Defense_1-1 = "沒用的哦！"
10082-CVGroup_Battle_In_1-1 = "由我來打頭陣！來，跟上我吧！"
10082-CVGroup_Battle_In_2-1 = "哈！百花繚亂的底氣，就讓你見識見識！"
10082-CVGroup_Battle_Move_1-1 = "下一個！"
10082-CVGroup_Battle_Move_2-1 = "保持隊形！要上囉！"
10082-CVGroup_Battle_Recovery_1-1 = "哦！謝啦！"
10082-CVGroup_Battle_TacticalAction_1-1 = "要移動地點囉！"
10082-CVGroup_Battle_Victory_1-1 = "突擊隊長的名號可不是浪得虛名哦！"
10082-CVGroup_Battle_Victory_2-1 = "吾所前行之道，唯有勝利存在！"
10082-CVGroup_CommonSkill-1 = "好，打起精神上吧！"
10082-CVGroup_ExSkill_1-1 = "我，就是百花繚亂的突擊隊長！"
10082-CVGroup_ExSkill_2-1 = "那麼，我這邊也拿出真本事吧！"
10082-CVGroup_ExSkill_3-1 = "還沒結束！"
10082-CVGroup_ExSkill_Level_1-1 = "哈！忍忍看吧！"
10082-CVGroup_ExSkill_Level_2-1 = "來吧，一發逆轉！"
10082-CVGroup_ExSkill_Level_3-1 = "怎麼樣，這就是百花繚亂的射擊術哦！"
10082-CVGroup_Formation_In_1-1 = "可以唷！輪到我出場了嗎？"
10082-CVGroup_Formation_In_2-1 = "啊啊，交給我吧！"
10082-CVGroup_Formation_Select-1 = "等，等等，師父！\n我還沒……做好心理準備……！"
10082-CVGroup_Growup_1-1 = "多虧了老師，我才能有所成長。\n啊啊，全都是師父的功勞哦。謝謝你。"
10082-CVGroup_Growup_2-1 = "還有這種教導方式啊……我連想都沒想過呢。\n老師……不，師父果然很厲害啊。"
10082-CVGroup_Growup_3-1 = "好厲害！該說是力量湧現了出來嗎？\n嗯！真厲害！總之就是很厲害！"
10082-CVGroup_Growup_4-1 = "簡單來說，老師對我有所期待對吧？\n哈哈！儘管交給我吧！我會全力回應的！"
10082-CVGroup_Relationship_Up_1-1 = "不，雖然我確實說過想一起進行「青春活動」沒錯……\n但做到這種程度……真的……好嗎！？"
10082-CVGroup_Relationship_Up_2-1 = "（咦，這樣沒問題嗎？真的沒問題嗎？\n　跟老師的距離，好近……！唔啊啊！怎麼辦！）"
10082-CVGroup_Relationship_Up_3-1 = "嗯～～～！只要跟老師待在一起，就莫名有種癢癢的感覺……！\n唔啊啊！抱歉！！！我去操場跑一跑！"
10082-CVGroup_Relationship_Up_4-1 = "啊……那個……\n……沒有，我身體沒問題唷！只是，那個……\n覺得師父你對我很珍惜啊～而已……\n就，就只是想想而已！"
10082-CVGroup_Tactic_In_1-1 = "百花繚亂的實力，好好見識吧！"
10082-CVGroup_Tactic_In_2-1 = "我去去就回！"
10082-CVGroup_Tactic_Victory_1-1 = "哈哈！多虧有老師的指揮才能獲得勝利啊。"
10082-CVGroup_Tactic_Victory_2-1 = "作戰結束！\n大家，配合的很不錯哦！"

[translation]
10077-CVGroup_CommonSkill-1 = "สำเร็จแล้วเหรอคะ~?"
10077-CVGroup_ExSkill_1-1 = "อ่า~ อีกแล้วเหรอคะ?"
10077-CVGroup_ExSkill_2-1 = "เฮ้อ... หวังว่าจะหยุดกันสักทีนะคะ"
10077-CVGroup_ExSkill_3-1 = "ตอนนี้กำลังยุ่งนิดหน่อยด้วย..."
10077-CVGroup_ExSkill_Level_1-1 = "งั้นก็รบกวนด้วยนะคะ~"
10077-CVGroup_ExSkill_Level_2-1 = "เอาไว้ฉันจะเลี้ยงตอบแทนนะคะ~"
10077-CVGroup_ExSkill_Level_3-1 = "เอาไว้คราวหน้าได้มั้ยคะ? พอดีกำลังยุ่งเลย~"
10077-CVGroup_Growup_1-1 = "ว้าว! ให้ฉันเหรอคะ?\nขอบคุณค่ะ คุณครู!"
10077-CVGroup_Growup_2-1 = "ถึงจะทำแบบนั้น ก็ไม่มีอะไรออกมาหรอกนะคะ"
10077-CVGroup_Growup_3-1 = "อะฮ่าฮ่า ถ้าทุ่มให้กันมากขนาดนี้\nฉันคงไม่มีทางเลือกนอกจากต้องพยายามแล้วสินะคะ~"
10077-CVGroup_Growup_4-1 = "ฮึ่ย... เป็นเกียรติมากเลยค่ะ แต่ว่ามัน... ฮะฮะ"
10077-CVGroup_Relationship_Up_1-1 = "จริงๆ เลย... แล้วฉันจะตอบแทนยังไงดีนะ..."
10077-CVGroup_Relationship_Up_2-1 = "ในเวลาแบบนี้แค่มีความสุขก็พอใช่มั้ยคะ?"
10077-CVGroup_Relationship_Up_3-1 = "สักวันหนึ่งฉันจะตอบแทนบุญคุณในครั้งนี้แน่นอนค่ะ!\nส่วนจะตอบแทนยังไง เอาไว้รอดูตอนนั้นนะคะ!"
10077-CVGroup_Relationship_Up_4-1 = "ทำไมรู้สึกจั๊กจี้แปลกๆ นะ...\nหรือรู้สึกไปเองนะ?"
10077-CVGroup_Battle_Buffed_1-1 = "ฉันรอดมาได้เพราะคุณครูเลยนะคะ~"
10077-CVGroup_Battle_Covered_1-1 = "เฮ้อ!"
10077-CVGroup_Battle_Defense_1-1 = "เปล่าประโยชน์ค่ะ~"
10077-CVGroup_Battle_In_1-1 = "ตามมาเลย~ ฉันพูดแบบนี้ได้ใช่มั้ย?"
10077-CVGroup_Battle_In_2-1 = "เอาละ ไปกันเลยค่ะ~!"
10077-CVGroup_Battle_Move_1-1 = "รีบๆ ทำให้จบเถอะค่ะ~"
10077-CVGroup_Battle_Move_2-1 = "ไปต่อทั้งแบบนี้เลยค่ะ!"
10077-CVGroup_Battle_Recovery_1-1 = "ยะฮู้ว~"
10077-CVGroup_Battle_TacticalAction_1-1 = "โย่"
10077-CVGroup_Battle_Victory_1-1 = "ทุกคนทำได้ยอดเยี่ยมมากเลยค่ะ!"
10077-CVGroup_Battle_Victory_2-1 = "อ่า... สุดท้ายก็หาทางทำจนได้เลยนะคะ?"
10077-CVGroup_Formation_In_1-1 = "เข้าใจแล้วค่ะ!"
10077-CVGroup_Formation_In_2-1 = "ฉันเหรอคะ?"
10077-CVGroup_Formation_Select-1 = "เอ๋...? ผิดคิวงั้นเหรอคะ?"
10077-CVGroup_Tactic_In_1-1 = "ในที่สุดก็เริ่มแล้วสินะคะ"
10077-CVGroup_Tactic_In_2-1 = "อ่า~ มีเรื่องต้องทำเยอะแยะเลยนะคะ"
10077-CVGroup_Tactic_Victory_1-1 = "ทุกคน~ ขอบคุณที่ทำงานหนักค่ะ!"
10077-CVGroup_Tactic_Victory_2-1 = "ฮู่ว! เท่านี้ก็เสร็จในระดับหนึ่งแล้ว ขอกลับเลยนะคะ~"

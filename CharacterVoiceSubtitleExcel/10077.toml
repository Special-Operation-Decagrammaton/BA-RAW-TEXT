[translation]
10077-CVGroup_CommonSkill-1 = "進行得還順利嗎～？"
10077-CVGroup_ExSkill_1-1 = "啊～啊。又來了嗎……？"
10077-CVGroup_ExSkill_2-1 = "唉……拜託放過我吧。"
10077-CVGroup_ExSkill_3-1 = "現在剛好在忙……"
10077-CVGroup_ExSkill_Level_1-1 = "那麼，就拜託你囉～"
10077-CVGroup_ExSkill_Level_2-1 = "下次我請客！"
10077-CVGroup_ExSkill_Level_3-1 = "可以晚點再說嗎？現在在忙～"
10077-CVGroup_Growup_1-1 = "哇！要給我嗎？\n謝謝你，老師！"
10077-CVGroup_Growup_2-1 = "就算做那種事，也什麼都得不到的唷？"
10077-CVGroup_Growup_3-1 = "啊哈哈，既然得到了這麼多，\n也只好拚盡全力加油了呢～"
10077-CVGroup_Growup_4-1 = "那個……\n我很榮幸，但是……哈哈。"
10077-CVGroup_Relationship_Up_1-1 = "那個……真傷腦筋……該說什麼表達謝意呢……"
10077-CVGroup_Relationship_Up_2-1 = "這種時候……坦率地感到高興就行了，對吧？"
10077-CVGroup_Relationship_Up_3-1 = "這份恩情，我總有一天會回報的！\n至於會怎麼回報，就請在那之前好好期待囉！"
10077-CVGroup_Relationship_Up_4-1 = "總覺得有種癢癢的……奇妙的感覺。\n是我的錯覺嗎……？"
10077-CVGroup_Battle_Buffed_1-1 = "幫大忙了！"
10077-CVGroup_Battle_Covered_1-1 = "哎呀！"
10077-CVGroup_Battle_Defense_1-1 = "沒用的唷～"
10077-CVGroup_Battle_In_1-1 = "跟我來～\n……這樣就行了嗎？"
10077-CVGroup_Battle_In_2-1 = "來吧，要上囉～！"
10077-CVGroup_Battle_Move_1-1 = "趕緊搞定吧～"
10077-CVGroup_Battle_Move_2-1 = "順著這個節奏上吧～！"
10077-CVGroup_Battle_Recovery_1-1 = "呀齁～"
10077-CVGroup_Battle_TacticalAction_1-1 = "唷。"
10077-CVGroup_Battle_Victory_1-1 = "大家真的很厲害呢！"
10077-CVGroup_Battle_Victory_2-1 = "哎呀～幸好很順利呢！"
10077-CVGroup_Formation_In_1-1 = "了解！"
10077-CVGroup_Formation_In_2-1 = "我嗎？"
10077-CVGroup_Formation_Select-1 = "咦……？搞錯出場時機了嗎？"
10077-CVGroup_Tactic_In_1-1 = "終於要開始了呢。"
10077-CVGroup_Tactic_In_2-1 = "哎呀～要做的事真多。"
10077-CVGroup_Tactic_Victory_1-1 = "大家，辛苦了！"
10077-CVGroup_Tactic_Victory_2-1 = "呼！事情也告一段落了，回去吧～"

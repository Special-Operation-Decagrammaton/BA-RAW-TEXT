[translation]
10098-CVGroup_Formchange1_Battle_Buffed_1-1 = "เหมือนจะแข็งแรงขึ้นเลยละ~"
10098-CVGroup_Formchange1_Battle_Defense_1-1 = "แต่ฉันจะขวางนะ~?"
10098-CVGroup_Formchange1_Battle_In_1-1 = "เตรียมตัวไว้ได้เลย"
10098-CVGroup_Formchange1_Battle_In_2-1 = "ฝากยิงคุ้มกันด้วยนะ"
10098-CVGroup_Formchange1_Battle_Move_1-1 = "ยังเหลืออยู่มั้ยนะ?"
10098-CVGroup_Formchange1_Battle_Move_2-1 = "ฉันจะนำเอง ไม่ต้องห่วง"
10098-CVGroup_Formchange1_Battle_Recovery_1-1 = "ขอบคุณนะ~"
10098-CVGroup_Formchange1_Battle_TacticalAction_1-1 = "เปลี่ยนตำแหน่ง"
10098-CVGroup_Formchange1_Battle_Victory_1-1 = "แค่นี้ไม่หวั่นหรอกน่า~"
10098-CVGroup_Formchange1_Battle_Victory_2-1 = "ตอนนี้วางใจได้แล้วละ"
10098-CVGroup_Formchange1_CommonSkill-1 = "เอาใหม่ดีมั้ยน้า~"
10098-CVGroup_Formchange1_ExSkill_1-1 = "ถึงตาลุงแล้วเหรอ?"
10098-CVGroup_Formchange1_ExSkill_2-1 = "ไม่ได้ผลหรอก"
10098-CVGroup_Formchange1_ExSkill_3-1 = "เรียกฉันเหรอ?"
10098-CVGroup_Formchange1_ExSkill_Level_1-1 = "ทุกคน มาอยู่ข้างหลัง!"
10098-CVGroup_Formchange1_ExSkill_Level_2-1 = "ฉันจะไปเอง!"
10098-CVGroup_Formchange1_ExSkill_Level_3-1 = "มีแค่นี้เหรอ? ลุงผิดหวังนะเนี่ย~"
10098-CVGroup_Formchange1_Formation_In_1-1 = "เรียกพลังกายพลังใจแล้วลุยเลยมั้ย?"
10098-CVGroup_Formchange1_Formation_In_2-1 = "ไม่อยากทำหรอกนะ... แต่ก็จะทำให้เต็มที่ละ"
10098-CVGroup_Formchange1_Formation_Select-1 = "แหะๆ การรอก็เหนื่อยนะเนี่ย"
10098-CVGroup_Formchange1_Formchange-1 = "เรื่องคุ้มกันด้านหน้า ไว้ใจฉันได้เลย"
10098-CVGroup_Growup_1-1 = "โอ้? ให้ลุงเหรอ?\nขอบคุณนะ~"
10098-CVGroup_Growup_2-1 = "อื้อ ได้รับมาแล้วละ\nงั้นก็ไปดุพวกที่นิสัยไม่ดีกันเลยมั้ย...?"
10098-CVGroup_Growup_3-1 = "ย้าห์ ได้รับอีกแล้วนะ\nงั้นรอบนี้ให้ไปสู้ที่ไหนล่ะ?"
10098-CVGroup_Growup_4-1 = "แหะๆ~ เรื่องแบบนี้มันน่าอายนะ...\nแต่ก็ขอบคุณนะครู ลุงจะสู้เพื่อครูเอง"
10098-CVGroup_Relationship_Up_1-1 = "ลุงเขิน... จริงๆ นะ"
10098-CVGroup_Relationship_Up_2-1 = "ถ้าเกิดครูตกอยู่ในอันตราย ตอนนั้น...\nไม่สิ... ฉันไม่ปล่อยให้เกิดเรื่องแบบนั้นหรอก"
10098-CVGroup_Relationship_Up_3-1 = "แหะๆ~ ลาดตระเวนกับครูครั้งต่อไปเมื่อไหร่น้า~\nตั้งตารอแล้วสิ~"
10098-CVGroup_Relationship_Up_4-1 = "ถึงฉันจะเป็นอย่างนี้ ครูก็เชื่อใจกันสินะ\nแหะๆ~ น่าอายอยู่นะเนี่ย~\nแล้วก็... ดีใจจัง"
10098-CVGroup_Formchange1_Tactic_In_1-1 = "ตามฉันมาเลย"
10098-CVGroup_Formchange1_Tactic_In_2-1 = "เริ่มเลยดีมั้ยน้า~?"
10098-CVGroup_Formchange1_Tactic_Victory_1-1 = "ผลมันก็แน่นอนอยู่แล้วละ"
10098-CVGroup_Formchange1_Tactic_Victory_2-1 = "เสร็จแล้ว~ งั้นไปพักสักหน่อยมั้ย?"

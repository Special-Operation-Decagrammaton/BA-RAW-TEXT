[translation]
10098-CVGroup_Formchange1_Battle_Buffed_1-1 = "好像變得更強韌了～"
10098-CVGroup_Formchange1_Battle_Defense_1-1 = "會被我阻止的哦～？"
10098-CVGroup_Formchange1_Battle_In_1-1 = "覺悟吧。"
10098-CVGroup_Formchange1_Battle_In_2-1 = "援護就麻煩了。"
10098-CVGroup_Formchange1_Battle_Move_1-1 = "還沒完嗎～"
10098-CVGroup_Formchange1_Battle_Move_2-1 = "我會走在前面的，別擔心～"
10098-CVGroup_Formchange1_Battle_Recovery_1-1 = "謝謝～"
10098-CVGroup_Formchange1_Battle_TacticalAction_1-1 = "要改變位置囉。"
10098-CVGroup_Formchange1_Battle_Victory_1-1 = "這種程度不算什麼唷～"
10098-CVGroup_Formchange1_Battle_Victory_2-1 = "可以放心了唷。"
10098-CVGroup_Formchange1_CommonSkill-1 = "重整旗鼓吧～"
10098-CVGroup_Formchange1_ExSkill_1-1 = "這次輪到大叔我了唷～"
10098-CVGroup_Formchange1_ExSkill_2-1 = "行不通的哦。"
10098-CVGroup_Formchange1_ExSkill_3-1 = "你叫我嗎～？"
10098-CVGroup_Formchange1_ExSkill_Level_1-1 = "大家，退後！"
10098-CVGroup_Formchange1_ExSkill_Level_2-1 = "讓我來！"
10098-CVGroup_Formchange1_ExSkill_Level_3-1 = "只有這樣？大叔我有點失望呢～"
10098-CVGroup_Formchange1_Formation_In_1-1 = "打起精神上吧～"
10098-CVGroup_Formchange1_Formation_In_2-1 = "雖然很麻煩……不過還是會認真做的。"
10098-CVGroup_Formchange1_Formation_Select-1 = "唔嘿～待命也是會累的呢～"
10098-CVGroup_Formchange1_Formchange-1 = "前衛就交給我吧。"
10098-CVGroup_Growup_1-1 = "哦？要給大叔我嗎？\n謝謝你囉～"
10098-CVGroup_Growup_2-1 = "嗯，確實收到了唷。\n……那麼，就去收拾一下壞孩子們吧。"
10098-CVGroup_Growup_3-1 = "哎呀～又收到了呢。\n所以，下次該在哪戰鬥呢？"
10098-CVGroup_Growup_4-1 = "唔嘿～這種事雖然害羞……謝謝你，老師。\n為了老師，大叔我會戰鬥的。"
10098-CVGroup_Relationship_Up_1-1 = "又把這種東西……大叔我會害羞的啦～"
10098-CVGroup_Relationship_Up_2-1 = "萬一，老師遇到危險的話，到時候……\n……不，我不會讓那種事發生。"
10098-CVGroup_Relationship_Up_3-1 = "唔嘿～跟老師一起巡邏……下次會是什麼時候呢～\n現在就開始期待了呢～"
10098-CVGroup_Relationship_Up_4-1 = "即使打扮成這樣，老師還是願意相信我呢。\n唔嘿～總覺得很害羞～\n……而且，也很開心。"
10098-CVGroup_Formchange1_Tactic_In_1-1 = "跟我來。"
10098-CVGroup_Formchange1_Tactic_In_2-1 = "開始吧～"
10098-CVGroup_Formchange1_Tactic_Victory_1-1 = "這是當然的結果吧。"
10098-CVGroup_Formchange1_Tactic_Victory_2-1 = "結束了～那麼，去休息吧。"

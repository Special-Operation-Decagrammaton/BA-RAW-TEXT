[translation]
10096-CVGroup_Battle_Buffed_1-1 = "신세를 졌군."
10096-CVGroup_Battle_Covered_1-1 = "엄폐한다. 지원 바란다!"
10096-CVGroup_Battle_Defense_1-1 = "통하지 않아!"
10096-CVGroup_Battle_In_1-1 = "앞장서겠다. 따라오도록."
10096-CVGroup_Battle_In_2-1 = "구조가 필요한 사람을 확인. 바로 가겠다."
10096-CVGroup_Battle_Move_1-1 = "위치를 변경하겠다."
10096-CVGroup_Battle_Move_2-1 = "다음은 이쪽이군."
10096-CVGroup_Battle_Recovery_1-1 = "고맙다."
10096-CVGroup_Battle_TacticalAction_1-1 = "이동하겠다."
10096-CVGroup_Battle_Victory_1-1 = "한시름 놓았군요. 하지만 방심은 금물입니다."
10096-CVGroup_Battle_Victory_2-1 = "이걸로, 조금이라도 모두가 안전하게 지낼 수 있다면……."
10096-CVGroup_CommonSkill-1 = "(호루라기 소리)"
10096-CVGroup_ExSkill_1-1 = "규칙을 따르도록!"
10096-CVGroup_ExSkill_2-1 = "거기, 동작 그만!"
10096-CVGroup_ExSkill_3-1 = "위험한 행동은, 삼가도록."
10096-CVGroup_ExSkill_Level_1-1 = "모두의 안전을 위한 일이다."
10096-CVGroup_ExSkill_Level_2-1 = "질서 있게 행동하도록!"
10096-CVGroup_ExSkill_Level_3-1 = "준비운동을 제대로 하도록!"
10096-CVGroup_Formation_In_1-1 = "구조가 필요한 사람이 있습니까?"
10096-CVGroup_Formation_In_2-1 = "네, 제가 가도록 하죠."
10096-CVGroup_Formation_Select-1 = "……무슨 일이시죠?"
10096-CVGroup_Growup_1-1 = "아직 부족한 점이 많은 저입니다만……. 더욱 정진하겠습니다."
10096-CVGroup_Growup_2-1 = "감사……합니다. 저 같은 사람에게는 과분할 정도입니다."
10096-CVGroup_Growup_3-1 = "이렇게 관심을 가져주시다니……. 감사합니다, 선생님."
10096-CVGroup_Growup_4-1 = "주신 신뢰에 보답할 수 있도록, 최선을 다하겠습니다."
10096-CVGroup_Relationship_Up_1-1 = "모두가 안심하고 여름을 즐길 수 있도록."
10096-CVGroup_Relationship_Up_2-1 = "준비운동을 잊지 마시길. 제가 알려드릴 테니, 함께 하시죠."
10096-CVGroup_Relationship_Up_3-1 = "선생님, 제 눈에 띄는 곳에 계셔 주시기 바랍니다.\n……지금의 저는 라이프가드니까요."
10096-CVGroup_Relationship_Up_4-1 = "라이프가드는 언제나 냉정을 유지해야 합니다만,\n선생님이 옆에 있을 땐 그게 조금 힘들군요. 어째서일까요……."
10096-CVGroup_Tactic_In_1-1 = "작전을 시작합니다."
10096-CVGroup_Tactic_In_2-1 = "안전을 확보하겠습니다."
10096-CVGroup_Tactic_Victory_1-1 = "큰 피해 없이 끝났습니다."
10096-CVGroup_Tactic_Victory_2-1 = "안전 확보 완료. 수고하셨습니다."

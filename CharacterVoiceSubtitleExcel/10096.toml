[translation]
10096-CVGroup_Battle_Buffed_1-1 = "受你照顧了。"
10096-CVGroup_Battle_Covered_1-1 = "進行掩蔽。\n麻煩進行支援！"
10096-CVGroup_Battle_Defense_1-1 = "沒用的！"
10096-CVGroup_Battle_In_1-1 = "由我帶頭吧。\n跟我來。"
10096-CVGroup_Battle_In_2-1 = "已確認待救助人員。立刻前往。"
10096-CVGroup_Battle_Move_1-1 = "變更位置。"
10096-CVGroup_Battle_Move_2-1 = "接下來是這邊吧。"
10096-CVGroup_Battle_Recovery_1-1 = "謝謝你。"
10096-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10096-CVGroup_Battle_Victory_1-1 = "已確認沒有問題。\n不過切勿大意。"
10096-CVGroup_Battle_Victory_2-1 = "如果這樣，大家能多少過得安全一點……"
10096-CVGroup_CommonSkill-1 = "一，二！一，二！"
10096-CVGroup_ExSkill_1-1 = "遵守規則！"
10096-CVGroup_ExSkill_2-1 = "那邊的，停止動作！"
10096-CVGroup_ExSkill_3-1 = "請避免危險行為。"
10096-CVGroup_ExSkill_Level_1-1 = "這是為了大家的安全。"
10096-CVGroup_ExSkill_Level_2-1 = "遵從秩序行動！"
10096-CVGroup_ExSkill_Level_3-1 = "要做好準備運動！"
10096-CVGroup_Formation_In_1-1 = "有需要救助的人嗎？"
10096-CVGroup_Formation_In_2-1 = "明白了。我來吧。"
10096-CVGroup_Formation_Select-1 = "……有什麼事嗎？"
10096-CVGroup_Growup_1-1 = "雖然我還有許多不足之處……但我會繼續精進。"
10096-CVGroup_Growup_2-1 = "非常……感謝。\n對像我這樣的人而言甚至有些多餘了。"
10096-CVGroup_Growup_3-1 = "居然對我如此關心……非常謝謝您，老師。"
10096-CVGroup_Growup_4-1 = "為了回應您的信任，我會盡己所能。"
10096-CVGroup_Relationship_Up_1-1 = "為了讓大家都能安心地享受夏天。"
10096-CVGroup_Relationship_Up_2-1 = "請別忘記準備運動。\n我會教您的，一起做吧。"
10096-CVGroup_Relationship_Up_3-1 = "老師，請待在我目光所及的範圍之內。\n……因為現在的我是救生員啊。"
10096-CVGroup_Relationship_Up_4-1 = "雖說救生員必須隨時保持冷靜，一旦老師待在身邊就變得有些困難呢。\n究竟是為什麼呢……"
10096-CVGroup_Tactic_In_1-1 = "作戰開始。"
10096-CVGroup_Tactic_In_2-1 = "確保安全。"
10096-CVGroup_Tactic_Victory_1-1 = "所幸並未出現較大損害。"
10096-CVGroup_Tactic_Victory_2-1 = "安全確保完畢。\n辛苦了。"

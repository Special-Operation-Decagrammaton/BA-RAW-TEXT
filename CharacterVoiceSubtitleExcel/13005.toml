[translation]
13005-CVGroup_Battle_Buffed_1-1 = "支援，收到了。"
13005-CVGroup_Battle_Covered_1-1 = "發現掩蔽物。"
13005-CVGroup_Battle_Defense_1-1 = "只有這點程度？"
13005-CVGroup_Battle_In_1-1 = "冷靜下來，按照作戰進行就可以了。"
13005-CVGroup_Battle_In_2-1 = "別放鬆警戒。"
13005-CVGroup_Battle_Move_1-1 = "似乎大致清理完畢了呢。"
13005-CVGroup_Battle_Move_2-1 = "下一個目標在那裡呢，移動吧。"
13005-CVGroup_Battle_Recovery_1-1 = "我就心懷感激地收下了。"
13005-CVGroup_Battle_TacticalAction_1-1 = "陣形變更。"
13005-CVGroup_Battle_Victory_1-1 = "對手真弱啊。"
13005-CVGroup_Battle_Victory_2-1 = "連暖身都不算。"
13005-CVGroup_CommonSkill-1 = "覺悟吧。"
13005-CVGroup_ExSkill_1-1 = "唉……"
13005-CVGroup_ExSkill_2-1 = "沒辦法了嗎。"
13005-CVGroup_ExSkill_3-1 = "呼……"
13005-CVGroup_ExSkill_Level_1-1 = "活用這個機會。"
13005-CVGroup_ExSkill_Level_2-1 = "這應該能改變戰況。"
13005-CVGroup_ExSkill_Level_3-1 = "看準攻擊的時機吧。"
13005-CVGroup_Formation_In_1-1 = "馬上來。"
13005-CVGroup_Formation_In_2-1 = "是委託的話……就必須完成了呢。"
13005-CVGroup_Formation_Select-1 = "哼嗯……"
13005-CVGroup_Growup_1-1 = "居然刻意選擇了我……\n如果這是戰略上的正確選擇，那倒也沒關係。"
13005-CVGroup_Growup_2-1 = "準備這樣就OK了。\n接下來就交給我吧。"

13005-CVGroup_Relationship_Up_1-1 = "遇到問題的話，隨時都可以過來。"
13005-CVGroup_Relationship_Up_2-1 = "便利屋應該會歡迎老師才對……大概吧。"
13005-CVGroup_Relationship_Up_3-1 = "如果是老師的委託，隨時都很歡迎哦。"
13005-CVGroup_Relationship_Up_4-1 = "能跟老師一起工作真是太好了。"
13005-CVGroup_Tactic_In_1-1 = "出發吧。"
13005-CVGroup_Tactic_In_2-1 = "這種程度，輕而易舉。"
13005-CVGroup_Tactic_Victory_1-1 = "辛苦了，老師。"
13005-CVGroup_Tactic_Victory_2-1 = "老師的選擇奏效了呢。"

[translation]
20037-CVGroup_CommonSkill-1 = "因為好吃就分給你們吧～"
20037-CVGroup_ExSkill_1-1 = "唔，真麻煩……\n……好，這樣的話！"
20037-CVGroup_ExSkill_2-1 = "好想休息……\n啊，對了！"
20037-CVGroup_ExSkill_3-1 = "有沒有什麼好方法……\n……好！這樣就完成了！"
20037-CVGroup_ExSkill_Level_1-1 = "結束之後，要不要去吃個甜甜圈呢～"
20037-CVGroup_ExSkill_Level_2-1 = "被打到我也不管哦～"
20037-CVGroup_ExSkill_Level_3-1 = "算了，這樣也行吧～"
20037-CVGroup_Formation_In_1-1 = "……一定得去嗎？"
20037-CVGroup_Formation_In_2-1 = "應該有比我更適合的人吧……"
20037-CVGroup_Growup_1-1 = "咦……我其實不太想努力的說……\n算了，姑且感激地收下吧。"
20037-CVGroup_Growup_2-1 = "咦？真的可以嗎？\n我，其實沒那麼有幹勁的說……"
20037-CVGroup_Growup_3-1 = "那個……就算不做到這種程度，\n老師進到泳池裡的時候，姑且還是會好好顧著你的哦。"
20037-CVGroup_Growup_4-1 = "雖然不是很樂意……還是得把相應的工作做完對吧……\n如果可以，要是甜甜圈也能拿到的話，我會很開心的……"
20037-CVGroup_Relationship_Up_1-1 = "我沒有偷懶唷～正在好好工作。\n畢竟眼睛有在動嘛。"
20037-CVGroup_Relationship_Up_2-1 = "老師也覺得泳池很舒服？\n來，坐在旁邊休息一下吧。"
20037-CVGroup_Relationship_Up_3-1 = "既然要摸魚的話……\n真想跟老師一起摸魚呢，呵呵。"
20037-CVGroup_Relationship_Up_4-1 = "尺寸正好的泳圈，還有漂漂河……\n唔嗯～真是極樂……老師要不要也一起啊？"

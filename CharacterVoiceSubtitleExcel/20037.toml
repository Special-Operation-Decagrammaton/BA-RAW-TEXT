[translation]
20037-CVGroup_CommonSkill-1 = "I'll share it with you. It's delicious!"
20037-CVGroup_ExSkill_1-1 = "Ugh, what a drag... Wait, this could work!"
20037-CVGroup_ExSkill_2-1 = "I want to take a break... Oh, right!"
20037-CVGroup_ExSkill_3-1 = "I wonder what I could do here... Got it! Mission complete!"
20037-CVGroup_ExSkill_Level_1-1 = "Maybe I should have some donuts after this."
20037-CVGroup_ExSkill_Level_2-1 = "It's not my fault if you get hit!"
20037-CVGroup_ExSkill_Level_3-1 = "That should be good enough!"
20037-CVGroup_Formation_In_1-1 = "...Do I really need to go?"
20037-CVGroup_Formation_In_2-1 = "I think there might be someone better suited than me..."
20037-CVGroup_Growup_1-1 = "Ugh... I don't want to try even harder...but this will be fine for now."

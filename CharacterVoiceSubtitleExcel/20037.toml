[translation]
20037-CVGroup_CommonSkill-1 = "อันนี้อร่อย งั้นฉันจะแบ่งให้นะ~"
20037-CVGroup_ExSkill_1-1 = "อึก ขี้เกียจอะ...\nก็ได้... ถ้าเป็นอันนี้ละก็!"
20037-CVGroup_ExSkill_2-1 = "ฉันอยากพักผ่อนอะ... อ๊ะ จริงสิ!"
20037-CVGroup_ExSkill_3-1 = "จะมีวิธีดีๆ มั้ยนะ.....\nเสร็จแล้ว! ถือว่าจบภารกิจ!"
20037-CVGroup_ExSkill_Level_1-1 = "เสร็จแล้วไปกินโดนัทดีมั้ยน้า~"
20037-CVGroup_ExSkill_Level_2-1 = "ถ้าโดนก็ไม่รู้ด้วยน้า~"
20037-CVGroup_ExSkill_Level_3-1 = "อืม ถ้าอันนี้ก็ได้เลย~"
20037-CVGroup_Formation_In_1-1 = "ต้องไปด้วยเหรอ...?"
20037-CVGroup_Formation_In_2-1 = "น่าจะมีคนที่เหมาะกว่าฉันนะ..."
20037-CVGroup_Growup_1-1 = "อึก... ฉันไม่อยากออกแรงเท่าไรเลย...\nแต่ก็จะรับไว้อย่างซาบซึ้งก่อนแล้วกัน"
20037-CVGroup_Growup_2-1 = "หืม? จะไม่เป็นไรจริงเหรอ?\nฉันไม่ได้อยากได้มากถึงขนาดนั้นนะ...."
20037-CVGroup_Growup_3-1 = "เอ่อ... ต่อให้ไม่ให้กันถึงขนาดนี้\nฉันก็จะคอยสอดส่องดูแลเมื่อครูลงไปในน้ำนะ"
20037-CVGroup_Growup_4-1 = "ถึงจะไม่อยากทำ แต่ก็ต้องทำงานให้สมกับที่ได้รับมาสินะ?\nถ้าเป็นไปได้ ก็อยากให้มีโดนัทด้วยจัง..."
20037-CVGroup_Relationship_Up_1-1 = "ฉันไม่ได้โดดงานนะ ฉันทำงานอยู่\nฉันใช้สายตามองอยู่น่ะ"
20037-CVGroup_Relationship_Up_2-1 = "ครูก็รู้สึกดีใช่มั้ยที่ได้มาสระว่ายน้ำน่ะ?\nเอาละ มานั่งข้างๆ ฉันแล้วพักก่อนสิ"
20037-CVGroup_Relationship_Up_3-1 = "ไหนๆ ก็จะโดดงานแล้ว...\nฉันก็อยากโดดงานกับครูนะ ฮุฮุ"
20037-CVGroup_Relationship_Up_4-1 = "ห่วงยางขนาดพอดี กับสระที่น้ำปริ่มๆ... อืม~ สวรรค์ชัดๆ....\nครูก็ไปด้วยกันมั้ยล่ะ...?"

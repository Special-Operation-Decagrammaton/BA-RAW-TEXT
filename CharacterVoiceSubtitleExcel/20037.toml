20037-CVGroup_Growup_3-1 = "Um... you don't need to do all this. I'll still keep an eye out for you when you go into the water."
20037-CVGroup_Growup_4-1 = "I really don't feel like it, but I guess I should keep my end of the bargain. I would really appreciate some donuts, by the way..."

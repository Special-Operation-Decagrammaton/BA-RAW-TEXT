[translation]
10093-CVGroup_Battle_Buffed_1-1 = "อ๊ะ แต้งกิ้วๆ!"
10093-CVGroup_Battle_Covered_1-1 = "หาฉันไม่เจอหรอก!"
10093-CVGroup_Battle_Defense_1-1 = "แค่นั้นยังไม่พอหรอกนะ~"
10093-CVGroup_Battle_In_1-1 = "ฉันจะช่วยเอง ไม่ต้องห่วงนะ!"
10093-CVGroup_Battle_In_2-1 = "ถ้างั้นมาเริ่มกันเลยมั้ย~"
10093-CVGroup_Battle_Move_1-1 = "ต่อไปคือที่ไหนล่ะ?"
10093-CVGroup_Battle_Move_2-1 = "อะฮ่าฮ่า! ไปกันเลย!"
10093-CVGroup_Battle_Recovery_1-1 = "แต้งกิ้วๆ!"
10093-CVGroup_Battle_TacticalAction_1-1 = "ไปกันเลยมะ~"
10093-CVGroup_Battle_Victory_1-1 = "ยะโฮ่! พวกเราชนะแล้วละ"
10093-CVGroup_Battle_Victory_2-1 = "อะฮ่าฮ่า! เท่านี้ก็จัดการไปได้หนึ่งเรื่องแล้วสินะ"
10093-CVGroup_CommonSkill-1 = "จริงๆ เลย ช่วยไม่ได้นะ!"
10093-CVGroup_ExSkill_1-1 = "คราวนี้ถ่ายได้สวยมากเลย! เอาไปให้ทุกคนดูดีกว่า!"
10093-CVGroup_ExSkill_2-1 = "ถ้าทำแบบนี้... แต่นแต๊น!"
10093-CVGroup_ExSkill_3-1 = "แฮชแท็ก เซลฟี่... อื้อ เยี่ยม!"
10093-CVGroup_ExSkill_Level_1-1 = "โดนใจสุดๆ!"
10093-CVGroup_ExSkill_Level_2-1 = "มุมเด็ด~"
10093-CVGroup_ExSkill_Level_3-1 = "กระแสตอบรับดีอีกแล้วสินะ?"
10093-CVGroup_Formation_In_1-1 = "อยากไปด้วยกันเหรอ? ดีละ~!"
10093-CVGroup_Formation_In_2-1 = "เลือกได้ดีเลยน้า"
10093-CVGroup_Formation_Select-1 = "อ๊ะ! ตกใจหมดเลย~"
10093-CVGroup_Growup_1-1 = "เอ๋? ความรู้สึกแบบนี้... เพิ่งเคยสัมผัสเลยละ!"
10093-CVGroup_Growup_2-1 = "อื้อๆ ถูกใจที่สุด! "
10093-CVGroup_Growup_3-1 = "ฉันสูงขึ้นแล้วเหรอ? ดีจังเลย!"
10093-CVGroup_Growup_4-1 = "อะฮ่าฮ่า! รู้สึกดีจังเลยนะ! ตอนนี้ฉันอาจจะแข็งแกร่งขึ้นแล้วก็ได้นะ?"
10093-CVGroup_Relationship_Up_1-1 = "ถ้าอยู่กับครูแล้วฉันจะรู้สึกแปลกๆ...\nหืม? หมายถึงอะไรน่ะเหรอ? นั่นสิน้า ฉันก็ไม่รู้เหมือนกัน! ฮ่าฮ่า!   "
10093-CVGroup_Relationship_Up_2-1 = "อื้อ? ใกล้เกินไปรึเปล่างั้นเหรอ?\nบะ... บางครั้ง... ฉันก็คิดว่ามันไม่เป็นไรนะ?"
10093-CVGroup_Relationship_Up_3-1 = "ก็แค่บางครั้งเองน่า ถึงจะอยู่กับครูแบบนี้ ฉันก็อยากเจอครูอีกน่ะ...\nอะฮ่าฮ่า! ฉันอาจจะแปลกอย่างสุดขั้วก็ได้นะ!"
10093-CVGroup_Relationship_Up_4-1 = "ระ... เรื่องนั้นจะว่ายังไงดีละ นี่เป็นครั้งแรกเลย...\nฉะ... ฉันหน้าแดงงั้นเหรอ? ปะ... เปล่าสักหน่อย! อะฮ่าฮ่า!"
10093-CVGroup_Tactic_In_1-1 = "ดีละ! ฉันจะร่วมวงด้วยคน!"
10093-CVGroup_Tactic_In_2-1 = "ก็ใช่น่ะสิ!"
10093-CVGroup_Tactic_Victory_1-1 = "ครู! ครู! ภารกิจเสร็จแล้วละ~!"
10093-CVGroup_Tactic_Victory_2-1 = "ภารกิจเสร็จแล้วไปเที่ยวด้วยกันมั้ย?"

[translation]
10093-CVGroup_Battle_Buffed_1-1 = "앗! 땡큐땡큐!"
10093-CVGroup_Battle_Covered_1-1 = "안 보이지롱!"
10093-CVGroup_Battle_Defense_1-1 = "그 정도로는 안 될걸~"
10093-CVGroup_Battle_In_1-1 = "내가 도와줄 테니 걱정 말라구!"
10093-CVGroup_Battle_In_2-1 = "그럼, 시작해볼까~"
10093-CVGroup_Battle_Move_1-1 = "다음은 어디?"
10093-CVGroup_Battle_Move_2-1 = "아하핫! 가보자구!"
10093-CVGroup_Battle_Recovery_1-1 = "땡큐땡큐!"
10093-CVGroup_Battle_TacticalAction_1-1 = "가볼까나~"
10093-CVGroup_Battle_Victory_1-1 = "야호! 우리가 이겼네?"
10093-CVGroup_Battle_Victory_2-1 = "아하핫! 이걸로 한 건 해결이지?"
10093-CVGroup_CommonSkill-1 = "아이참, 어쩔 수 없네!"
10093-CVGroup_ExSkill_1-1 = "이번엔 완전 잘 찍혔어! 모두에게 보여줘야지!"
10093-CVGroup_ExSkill_2-1 = "요렇게 요렇게 하면…… 짠!"
10093-CVGroup_ExSkill_3-1 = "해시태그, 셀카…… 응, 좋아!"
10093-CVGroup_ExSkill_Level_1-1 = "완전 맘에 들어!"
10093-CVGroup_ExSkill_Level_2-1 = "완벽한 각도~"
10093-CVGroup_ExSkill_Level_3-1 = "이번에도 반응이 좋은걸?"
10093-CVGroup_Formation_In_1-1 = "같이 가고 싶어? 좋아~!"
10093-CVGroup_Formation_In_2-1 = "좋은 선택인데?"
10093-CVGroup_Formation_Select-1 = "으앗! 깜짝이야~"
10093-CVGroup_Growup_1-1 = "어? 이런 느낌, 처음인 것 같아!"
10093-CVGroup_Growup_2-1 = "응, 응, 마음에 들어!"
10093-CVGroup_Growup_3-1 = "나, 키라도 커진 걸까나? 좋네!"
10093-CVGroup_Growup_4-1 = "아하핫! 좋은 느낌이네! 지금의 나, 조금 강할지도?"
10093-CVGroup_Relationship_Up_1-1 = "쌤이랑 있으면 어딘가 기분이 이상해져서…….\n응? 무슨 말이냐고? 글쎄, 나도 모르겠네! 하핫!"
10093-CVGroup_Relationship_Up_2-1 = "으, 응? 너무 가까운 거 아니냐고?\n가, 가끔은…… 괜찮지 않을까 해서?"
10093-CVGroup_Relationship_Up_3-1 = "가끔은 있잖아, 쌤이랑 있는데도 쌤이 만나고 싶어져서…….\n아하핫! 나, 완전 이상할지도!"
10093-CVGroup_Relationship_Up_4-1 = "그, 그게, 뭐랄까, 이런 건 처음이라…….\n어, 얼굴이 새빨갛다고? 저, 전혀 그렇지 않은데! 아하핫!"
10093-CVGroup_Tactic_In_1-1 = "좋아! 나도 기합 넣을게!"
10093-CVGroup_Tactic_In_2-1 = "그러지 뭐!"
10093-CVGroup_Tactic_Victory_1-1 = "쌤! 쌤! 임무 완료래~!"
10093-CVGroup_Tactic_Victory_2-1 = "임무도 끝났으니까 같이 놀러 나갈까?"

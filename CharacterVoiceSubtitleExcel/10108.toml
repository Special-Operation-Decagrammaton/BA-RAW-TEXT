[translation]
10108-CVGroup_Battle_Buffed_1-1 = "謝謝，多虧你讓我清醒多了！"
10108-CVGroup_Battle_Covered_1-1 = "現在應該掩蔽！"
10108-CVGroup_Battle_Defense_1-1 = "那種事我早就知道了。"
10108-CVGroup_Battle_In_1-1 = "等這件事結束之後，一起好好休息吧。"
10108-CVGroup_Battle_In_2-1 = "速速結束，快快休息吧。"
10108-CVGroup_Battle_Move_1-1 = "Sector Clear。"
10108-CVGroup_Battle_Move_2-1 = "嗯，如我所料呢。"
10108-CVGroup_Battle_Recovery_1-1 = "好像比較有精神了，謝謝！"
10108-CVGroup_Battle_TacticalAction_1-1 = "往下個座標移動吧！"
10108-CVGroup_Battle_Victory_1-1 = "這是當然的結果。"
10108-CVGroup_Battle_Victory_2-1 = "那麼，大家一起在睡前伸展一下吧？"
10108-CVGroup_CommonSkill-1 = "是這種感覺嗎……\n很好，完美！"
10108-CVGroup_ExSkill_1-1 = "我看看……嗚哇！？\n……唉。"
10108-CVGroup_ExSkill_2-1 = "輕輕地……咦，騙人！？\n嗚嗚……"
10108-CVGroup_ExSkill_3-1 = "慎重再慎重……等一下！\n又來了……？"
10108-CVGroup_ExSkill_Level_1-1 = "呀啊！？\n嚇我一跳……"
10108-CVGroup_ExSkill_Level_2-1 = "啊啊！？\n好吧，算了……"
10108-CVGroup_ExSkill_Level_3-1 = "噫噫！？\n不，不過跟我計算的一樣！"
10108-CVGroup_Formation_In_1-1 = "謝謝你，老師。\n我認為這是最適當的選擇。"
10108-CVGroup_Formation_In_2-1 = "我會證明老師的選擇並沒有錯。"
10108-CVGroup_Formation_Select-1 = "呀啊！？\n剛，剛才的請你忘了……"
10108-CVGroup_Growup_1-1 = "就算是睡衣，只要符合TPO就是適當的服裝。\n對吧，老師？"
10108-CVGroup_Growup_2-1 = "畢竟睡衣在床上也是具備機能性的服裝……\n我，我沒有其他意思哦！？"
10108-CVGroup_Growup_3-1 = "這個枕頭，我很喜歡。\n今天感覺能睡得很熟……"
10108-CVGroup_Growup_4-1 = "莫名有種運氣提升了的預感！"
10108-CVGroup_Relationship_Up_1-1 = "現在……我已經決定要坦率一點了。\n謝謝你，老師……還有……\n果，果然，還是到此為止吧！"
10108-CVGroup_Relationship_Up_2-1 = "我知道老師總是很辛苦。\n還有就連這種時候，也會優先為我著想這點也是……\n能遇見老師，真是太好了。"
10108-CVGroup_Relationship_Up_3-1 = "如，如，如果！覺得晚上有點睡不著的話……\n像是自然對數，或者常用對數之類的，要我在旁邊數給你聽也可以唷……"
10108-CVGroup_Relationship_Up_4-1 = "老，老師平常都做什麼樣的夢呢……？\n比，比如，夢到我，之類的……？\n至於我，偶爾就會夢見……"
10108-CVGroup_Tactic_In_1-1 = "那麼，來找出正確的道路吧。"
10108-CVGroup_Tactic_In_2-1 = "我並不累哦！\n……至少到目前為止。"
10108-CVGroup_Tactic_Victory_1-1 = "今天一整天也很完～美！"
10108-CVGroup_Tactic_Victory_2-1 = "勝利了呢！\n雖然這是當然的結果。"

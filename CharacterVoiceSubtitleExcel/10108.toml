[translation]
10108-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะ หายง่วงเลยละ!"
10108-CVGroup_Battle_Covered_1-1 = "ตอนนี้... ได้เวลาหาที่กำบังแล้ว!"
10108-CVGroup_Battle_Defense_1-1 = "เรื่องนั้นฉันเดาไว้แล้วละน่า"
10108-CVGroup_Battle_In_1-1 = "พอเสร็จงานนี้แล้ว ไปนอนพักกันเถอะ"
10108-CVGroup_Battle_In_2-1 = "รีบๆ ทำให้จบ แล้วไปพักกันเถอะ"
10108-CVGroup_Battle_Move_1-1 = "เคลียร์โซนนี้แล้ว"
10108-CVGroup_Battle_Move_2-1 = "เอาเถอะ ยังไงก็อยู่ในขอบเขตที่ฉันคาดการณ์ไว้แล้ว"
10108-CVGroup_Battle_Recovery_1-1 = "มีแรงแล้วล่ะ ขอบใจนะ!"
10108-CVGroup_Battle_TacticalAction_1-1 = "ไปที่ตำแหน่งต่อไปเลย!"
10108-CVGroup_Battle_Victory_1-1 = "ตามที่คำนวณไว้เลยนะ"
10108-CVGroup_Battle_Victory_2-1 = "เอาละ มายืดเส้นยืดสายกันหน่อยดีมั้ย?"
10108-CVGroup_CommonSkill-1 = "รู้สึกแบบนี้เองเหรอเนี่ย...\nโอเค สมบูรณ์แบบ!"
10108-CVGroup_ExSkill_1-1 = "อยู่ไหนนะ... อยู่ไหน\nว้าก?! เฮ้อ..."
10108-CVGroup_ExSkill_2-1 = "ระวังๆ...โกหกน่า?! ฮือออ..."
10108-CVGroup_ExSkill_3-1 = "ใจเย็นๆ... เดี๋ยวก่อน! อีกแล้วเรอะ..."
10108-CVGroup_ExSkill_Level_1-1 = "ว้ายยย!? ตกใจหมดเลย..."
10108-CVGroup_ExSkill_Level_2-1 = "อ๊ะ?! แต่ก็นะ คงไม่เป็นอะไรหรอก..."
10108-CVGroup_ExSkill_Level_3-1 = "ฮึก?! ตะ... แต่ก็เป็นไปตามที่ฉันคำนวณไว้นะ!"
10108-CVGroup_Formation_In_1-1 = "ขอบคุณค่ะคุณครู\nฉันนี่แหละคำตอบที่ถูกต้องที่สุดค่ะ"
10108-CVGroup_Formation_In_2-1 = "ฉันจะแสดงให้เห็นเองค่ะ\nว่าสิ่งที่คุณครูเลือกไม่มีข้อผิดพลาดใดๆ"
10108-CVGroup_Formation_Select-1 = "ว้าย?!\nชะ... ช่วยลืมความผิดพลาดเมื่อกี้ไปด้วยนะคะ..."
10108-CVGroup_Growup_1-1 = "แม้แต่ชุดนอน ถ้าใส่ให้ถูกที่ถูกเวลาก็เป็นชุดที่ดีค่ะ\nใช่มั้ยคะ คุณครู?"
10108-CVGroup_Growup_2-1 = "เพราะชุดนี้ก็ถือเป็นเสื้อผ้าที่มีประสิทธิภาพที่ดีเวลาอยู่บนเตียง...\nมะ... ไม่ได้มีความหมายอื่นอะไรเลยนะคะ?!"
10108-CVGroup_Growup_3-1 = "วันนี้น่าจะนอนหลับสนิทเลยนะคะ\nนี่เป็นหมอนที่ดีมากเลยค่ะ"
10108-CVGroup_Growup_4-1 = "รู้สึกเหมือนดวงเสี่ยงทายลูกเต๋าจะดีขึ้นเลยค่ะ!"
10108-CVGroup_Relationship_Up_1-1 = "ตอนนี้... ฉันตัดสินใจว่าจะซื่อสัตย์กับตัวเองขึ้นแล้วค่ะ\nขอบคุณนะคะคุณครู แล้วก็...\nคะ... คิดแล้วเชียวว่าพอแค่นี้ดีกว่า!"
10108-CVGroup_Relationship_Up_2-1 = "ฉันรู้ว่าคุณครูมีช่วงเวลาที่ยากลำบากในทุกๆ วันค่ะ\nในสถานการณ์แบบนี้... ก็ยังคิดถึงฉันก่อนอีกด้วย\nฉันโชคดีจังเลยค่ะที่ได้เจอคุณครู"
10108-CVGroup_Relationship_Up_3-1 = "ระ... หรือว่า! คุณครูมีปัญหานอนไม่หลังตอนกลางคืนเหรอคะ!\nหะ... ให้ฉันไปนอนกระซิบท่องค่าตัวแปรคงที่\nของอัลกอริทึ่มของล็อกทั่วไปข้างๆ ดีมั้ยคะ?"
10108-CVGroup_Relationship_Up_4-1 = "ปะ... ปกติคุณครูมักนอนฝัน... ถึงอะไรเหรอคะ?\nอย่างเช่น... ฝันถึงฉันอะไรประมาณนั้น...?\nบางครั้งฉันก็ฝันถึง... นะคะ..."
10108-CVGroup_Tactic_In_1-1 = "งั้นไปหาที่ถูกต้องกันเถอะ"
10108-CVGroup_Tactic_In_2-1 = "ไม่ต้องห่วงเรื่องความเหนื่อยล้าแล้วค่ะ!\nฉันยังมีแรงอยู่ค่ะ..."
10108-CVGroup_Tactic_Victory_1-1 = "วันนี้ก็สมบูรณ์แบบอีกเช่นเคย~!"
10108-CVGroup_Tactic_Victory_2-1 = "ชนะแล้วค่ะ\nถึงผลลัพธ์มันจะแน่นอนอยู่แล้วก็เถอะค่ะ"

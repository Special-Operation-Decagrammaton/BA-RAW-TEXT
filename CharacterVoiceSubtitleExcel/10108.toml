[translation]
10108-CVGroup_Battle_Buffed_1-1 = "고마워. 덕분에 잠이 깼어!"
10108-CVGroup_Battle_Covered_1-1 = "지금은…… 엄폐할 때야!"
10108-CVGroup_Battle_Defense_1-1 = "그런 건 이미 예측했다고."
10108-CVGroup_Battle_In_1-1 = "이번 일이 끝나면, 함께 푹 자러 가자."
10108-CVGroup_Battle_In_2-1 = "빠르게 끝내고, 빠르게 휴식하는 거야."
10108-CVGroup_Battle_Move_1-1 = "섹터 클리어."
10108-CVGroup_Battle_Move_2-1 = "뭐, 예측 범위 안이었어."
10108-CVGroup_Battle_Recovery_1-1 = "기운이 돌아오네. 고마워!"
10108-CVGroup_Battle_TacticalAction_1-1 = "다음 좌표로 이동이야!"
10108-CVGroup_Battle_Victory_1-1 = "당연한 결과네."
10108-CVGroup_Battle_Victory_2-1 = "자아, 모두 기지개라도 펴 볼까?"
10108-CVGroup_CommonSkill-1 = "이런 느낌이려나…… 좋아, 완벽해!"
10108-CVGroup_ExSkill_1-1 = "어디, 어디…… 우왓?! 하아……"
10108-CVGroup_ExSkill_2-1 = "조심, 조심…… 거짓말?! 으으으…"
10108-CVGroup_ExSkill_3-1 = "신중하게…… 잠깐만! 또냐구……"
10108-CVGroup_ExSkill_Level_1-1 = "꺄아앗!? 놀라라……"
10108-CVGroup_ExSkill_Level_2-1 = "아앗?! 뭐…… 상관없나……"
10108-CVGroup_ExSkill_Level_3-1 = "히익?! 하, 하지만 계산대로야!"
10108-CVGroup_Formation_In_1-1 = "감사해요. 선생님. 저야말로 최적의 정답이죠."
10108-CVGroup_Formation_In_2-1 = "선생님의 선택이, 오류가 아니라는 걸 보여 드릴게요."
10108-CVGroup_Formation_Select-1 = "꺄악?! 바, 방금 그 실수는 잊어 주세요……"
10108-CVGroup_Growup_1-1 = "파자마라도, 시간과 장소만 맞으면, 괜찮은 옷이라고요. 그렇죠, 선생님?"
10108-CVGroup_Growup_2-1 = "이것도 일종의 기능성 의류니까요. 침대에서의……\n다, 다른 의미는 없으니까요?!"
10108-CVGroup_Growup_3-1 = "오늘은 푹 잘 수 있을 것 같네요. 이거, 제법 좋아하는 베개랍니다."
10108-CVGroup_Growup_4-1 = "뭔가 주사위 운이 좋아질 것 같은 느낌이네요!"
10108-CVGroup_Relationship_Up_1-1 = "지금은…… 솔직해지기로 마음먹었으니까요.\n감사합니다. 선생님. 그리고…… 여, 역시 여기까지만!"
10108-CVGroup_Relationship_Up_2-1 = "매일 고생하고 계시는 것, 잘 알고 있답니다.\n이런 상황에서도 저를…… 먼저 생각해 주시는 것도요.\n선생님을 만나서, 정말 다행이에요."
10108-CVGroup_Relationship_Up_3-1 = "호, 호호, 혹시! 밤에 잠을 잘 못 주무신다면 말이죠!\n제가 옆에서…… 자연로그의 상수라든가, 속삭여드릴 수, 있는데요……?"
10108-CVGroup_Relationship_Up_4-1 = "서, 선생님은 보통, 무슨 꿈을…… 꾸시나요? 가령, 제 꿈, 이라든가……?\n저는, 가끔씩은, 그래요……"
10108-CVGroup_Tactic_In_1-1 = "그럼, 바른길을 찾아볼까요."
10108-CVGroup_Tactic_In_2-1 = "피곤함 같은 문제는 없어요! ……아직까지는, 말이죠."
10108-CVGroup_Tactic_Victory_1-1 = "오늘 하루도 완~벽!"
10108-CVGroup_Tactic_Victory_2-1 = "승리했네요. 당연한 결과지만요."

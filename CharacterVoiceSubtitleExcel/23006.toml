[translation]
23006-CVGroup_CommonSkill-1 = "I simply can't tolerate mistakes!"
23006-CVGroup_ExSkill_1-1 = "It's the Momoyodou pop-up store! ...Waah?!"
23006-CVGroup_ExSkill_2-1 = "Momoyodou will open wherever we're needed! Ah...! The tea cup...!"
23006-CVGroup_ExSkill_3-1 = "Wah! What if I don't recoup my costs?!"
23006-CVGroup_ExSkill_Level_1-1 = "I-I won't let this get me d-down!"
23006-CVGroup_ExSkill_Level_2-1 = "W-Wait! Be gentler!"
23006-CVGroup_ExSkill_Level_3-1 = "Ugh! It's merchandise from the shop...!"
23006-CVGroup_Formation_In_1-1 = "As expected of Sensei! You have a good eye!"
23006-CVGroup_Formation_In_2-1 = "Let's go! A chance to earn festival money ...No, I mean...I'll do my best!"
23006-CVGroup_Growup_1-1 = "Heehee. I feel like you cherish me, Sensei! Nyan! Probably because I'm so cute, right?"
23006-CVGroup_Growup_2-1 = "Woohoo! I grew! Victory!"
23006-CVGroup_Growup_3-1 = "Yes, well... I'll do my best to live up to your expectations..."
23006-CVGroup_Growup_4-1 = "Sensei, you're so nice to me... I'll do my best as the owner of Momoyodou and as a pop idol!"
23006-CVGroup_Relationship_Up_1-1 = "S-Sensei, you're s-so close...! The distance between us is so...! I-Is this okay?"
23006-CVGroup_Relationship_Up_2-1 = "This sweet sensation is like a mouthful of anmitsu from Momoyodou..."
23006-CVGroup_Relationship_Up_3-1 = "When I'm with you, Sensei...my day feels like one big festival. Isn't that SO mysterious?"
23006-CVGroup_Relationship_Up_4-1 = "Even the best festivals have to end eventually. But until then, will you stay by my side?"

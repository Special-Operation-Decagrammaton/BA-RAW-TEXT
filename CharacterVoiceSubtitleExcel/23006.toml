[translation]
23006-CVGroup_CommonSkill-1 = "不會讓你礙事的！"
23006-CVGroup_ExSkill_1-1 = "百夜堂，出差販售！\n……啊啊！？"
23006-CVGroup_ExSkill_2-1 = "百夜堂在任何地方都能進行出差販售！\n啊！茶具……！"
23006-CVGroup_ExSkill_3-1 = "得在這裡賺取活動資金才行……！\n……唔啊啊！？"
23006-CVGroup_ExSkill_Level_1-1 = "這，這點小事無法讓我氣餒！"
23006-CVGroup_ExSkill_Level_2-1 = "等一下，太激烈了啦！"
23006-CVGroup_ExSkill_Level_3-1 = "嗚嗚，明明是店裡的東西……！"
23006-CVGroup_Formation_In_1-1 = "不愧是老師，真有眼光呢～！"
23006-CVGroup_Formation_In_2-1 = "好，這是賺取祭典預算的機會……\n啊不是，我，我會努力～！"
23006-CVGroup_Growup_1-1 = "耶嘿嘿，靜子我啊～\n對老師這麼重視靜子，真的覺得非～常高興～！喵喵！\n……嗯，我真可愛！"
23006-CVGroup_Growup_2-1 = "耶～成長了～！V！"
23006-CVGroup_Growup_3-1 = "這，這個嘛，還是會為了回應期待努力的哦……？"
23006-CVGroup_Growup_4-1 = "老師對我這麼好……靜子，會更加努力的！\n作為百夜堂的店主兼看板娘！"
23006-CVGroup_Relationship_Up_1-1 = "（好，好近……！？跟，跟老師的距離，居然這麼……！\n　沒，沒問題嗎？真的沒問題嗎！？）"
23006-CVGroup_Relationship_Up_2-1 = "這股甜甜的心情……\n就像嘴裡塞滿了百夜堂的餡蜜時一樣……"
23006-CVGroup_Relationship_Up_3-1 = "每當跟老師在一起的時候，\n我總會感受到跟慶典的日子類似的心情。\n真的很不可思議……"
23006-CVGroup_Relationship_Up_4-1 = "歡樂的慶典也終究有結束的時候……有這麼一句話呢。\n不過至少，在那個時候真正到來之前……\n可以讓我，再多待在你身邊一會嗎？"

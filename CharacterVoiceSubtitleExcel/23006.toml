[translation]
23006-CVGroup_CommonSkill-1 = "ฉันไม่ยอมให้ขัดจังหวะหรอก!"
23006-CVGroup_ExSkill_1-1 = "ร้านเฮียกคิยาโคเปิดขายนอกสถานที่ค่ะ~!\nว้ายย...?!"
23006-CVGroup_ExSkill_2-1 = "ร้านเฮียกคิยาโคไปขายในทุกที่เลยค่ะ!\nอ๊ะ...! ถ้วยน้ำชามัน...!"
23006-CVGroup_ExSkill_3-1 = "ต้องหาเงินทุนของชมรมจากที่นี่ให้ได้...! ว้ายยย...?!"
23006-CVGroup_ExSkill_Level_1-1 = "ฉะ... ฉันไม่เสียกำลังใจเพราะสิ่งนี้หรอกค่ะ!"
23006-CVGroup_ExSkill_Level_2-1 = "เดี๋ยวสิ... รุนแรงเกินไปแล้วนะคะ!"
23006-CVGroup_ExSkill_Level_3-1 = "อึก... นั่นมันของในร้านนะ...!"
23006-CVGroup_Formation_In_1-1 = "สมแล้วที่เป็นคุณครู~\nสายตาเฉียบแหลมมากค่ะ!"
23006-CVGroup_Formation_In_2-1 = "ยะฮู่ว! ได้โอกาสหาเงินสำหรับงานเทศกาลแล้ว!... ไม่ใช่สิ\nจะ... จะทำเต็มที่เลยค่ะ!"
23006-CVGroup_Growup_1-1 = "แหะๆๆ~ ชิซุโกะน่ะ~\nดีใจสุดๆ เลยนะที่คุณครูหวงแหนชิซุโกะ! เมี้ยวเมี้ยว!\nอื้อ... ฉันน่ารักที่สุดแล้ว!"
23006-CVGroup_Growup_2-1 = "ว้าว~! พัฒนาขึ้นแล้วค่ะ เย่!"
23006-CVGroup_Growup_3-1 = "ค่ะ ก็... ก็บอกว่าจะพยายาม\nเพื่อตอบแทนความคาดหวังไงคะ...?"
23006-CVGroup_Growup_4-1 = "คุณครูใจดีถึงขนาดนี้... ชิซุโกะก็จะพยายามขึ้นอีกค่ะ!\nทั้งในฐานะเจ้าของร้านเฮียกคิยาโคและไอดอลเลย!"
23006-CVGroup_Relationship_Up_1-1 = "(กะ... ใกล้ไป...! ระ... ระยะห่างกับคุณครูมันขนาดนี้เลย...!\nจะ... จะเป็นอะไรมั้ยนะ? คงไม่เป็นไรเนอะ?!)"
23006-CVGroup_Relationship_Up_2-1 = "ความรู้สึกหอมหวานนี้\nมันเหมือนตอนกัดอันมิสึของร้านเฮียกคิยาโคเข้าไปเต็มปาก..."
23006-CVGroup_Relationship_Up_3-1 = "ถ้าได้อยู่กับคุณครู...\nฉันจะรู้สึกเหมือนงานเทศกาลตลอดเลยค่ะ\nมันน่าทึ่งจริงๆ เลยนะคะ..."
23006-CVGroup_Relationship_Up_4-1 = "ว่ากันว่างานเทศกาลที่สนุกย่อมจบลงในสักวันค่ะ\nถ้างั้นอย่างน้อยก่อนจะถึงตอนนั้น ฉันขออยู่ข้างๆ อีกหน่อยได้มั้ยคะ?"

[translation]
23006-CVGroup_CommonSkill-1 = "훼방 놓는 건 용서 못해!"
23006-CVGroup_ExSkill_1-1 = "백야당, 출장 판매예요~! ……우와앗?!"
23006-CVGroup_ExSkill_2-1 = "백야당은 어디든 출장 판매합니다! 앗…! 다기가……!"
23006-CVGroup_ExSkill_3-1 = "여기서 활동자금을 벌어두지 않으면……! ……우와아왓?!"
23006-CVGroup_ExSkill_Level_1-1 = "이, 이런 걸로 기죽지 않아요!"
23006-CVGroup_ExSkill_Level_2-1 = "잠ㄲ, 너무 격하잖아요!"
23006-CVGroup_ExSkill_Level_3-1 = "우읏, 가게 물품인데……!"
23006-CVGroup_Formation_In_1-1 = "역시 선생님~\n안목이 탁월하시네요!"
23006-CVGroup_Formation_In_2-1 = "아자! 축제 예산을 벌 찬스!……가 아니라.\n여, 열심히 할게요!"
23006-CVGroup_Growup_1-1 = "에헤헷~ 시즈코는요~\n선생님이 시즈코를 아껴주셔서 어~엄청 기뻐요~! 냥냥! \n……응. 나, 귀여워!"
23006-CVGroup_Growup_2-1 = "야~호, 성장했어요. 브이!"
23006-CVGroup_Growup_3-1 = "네에, 뭐어, 기대에 부응할 수 있도록 노력할 거니까요……?"
23006-CVGroup_Growup_4-1 = "선생님이 이렇게나 잘해주셔서……. 시즈코, 다시금 노력할게요!\n백야당의 주인 겸, 아이돌로서!"
23006-CVGroup_Relationship_Up_1-1 = "(가, 가까워……! 서, 선생님과 거리가, 이렇게나……! 괘, 괜찮은 걸까? 괜찮은 거지?!)"
23006-CVGroup_Relationship_Up_2-1 = "이 달달한 기분은 대체……\n백야당의 안미츠를 입안 가득 물었을 때와 같은……."
23006-CVGroup_Relationship_Up_3-1 = "선생님과 같이 있으면 항상…….\n마치 축제 때와 같은 기분이 들어요.\n정말 신기하다니까요……."
23006-CVGroup_Relationship_Up_4-1 = "즐거운 축제도 언젠가는 끝난다고들 하지요.\n그럼 적어도 그때가 오기까지, 조금만 더 곁에 있어도 될까요?"

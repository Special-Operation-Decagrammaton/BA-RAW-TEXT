[translation]
20043-CVGroup_CommonSkill-1 = "이건 어때?"
20043-CVGroup_ExSkill_1-1 = "냠냠. 우~웅. 이쪽이야!"
20043-CVGroup_ExSkill_2-1 = "우물우물. 그러면… 이건 어때?"
20043-CVGroup_ExSkill_3-1 = "음. 음음… 어디… 이거 줄게!"
20043-CVGroup_ExSkill_Level_1-1 = "이즈미, 등장! 맛있게 먹어!"
20043-CVGroup_ExSkill_Level_2-1 = "배고프지? 이거야!"
20043-CVGroup_ExSkill_Level_3-1 = "야호-! 어디… 찾았다!"
20043-CVGroup_Formation_In_1-1 = "불러 준 거야?"
20043-CVGroup_Formation_In_2-1 = "응! 같이 가자!"
20043-CVGroup_Formation_Select-1 = "와아~! 선생님, 나 여기 있어!"
20043-CVGroup_Growup_1-1 = "어!? 이렇게나 많이? 괜찮아? 에헤헤, 잘 먹겠습니다~!"
20043-CVGroup_Growup_2-1 = "선생님이 준 건 전부 맛있으니까!"
20043-CVGroup_Growup_3-1 = "이렇게 받기만 해도 괜찮을까!? 이번에, 맛집 안내해 줄게!"
20043-CVGroup_Growup_4-1 = "신기한 맛이었어! 아, 이거 먹는 거 맞았지?"
20043-CVGroup_Relationship_Up_1-1 = "올해 소원은 뭐였어, 선생님?\n나는 선생님이랑 더 오래 같이 있고 싶다고 했어!"
20043-CVGroup_Relationship_Up_2-1 = "선생님과 같이 있으면 마음이 편안해져.\n이즈미 특제 소스를 만들었을 때보다 더!"
20043-CVGroup_Relationship_Up_3-1 = "선생님, 손, 잡아도 돼? 에헤헷! 모처럼이니, 팔짱도 낄래!"
20043-CVGroup_Relationship_Up_4-1 = "선생님을 만나면, 왠지 모르게 행복해져.\n맛있는 것을 먹었을 때보다도, 그리고 새로운 맛을 느꼈을 때보다도…"

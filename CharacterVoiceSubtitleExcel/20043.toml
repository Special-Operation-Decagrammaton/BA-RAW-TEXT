[translation]
20043-CVGroup_CommonSkill-1 = "要去試吃嗎？"
20043-CVGroup_ExSkill_1-1 = "哈呣，嚼嚼……嗯……？\n來，請用！"
20043-CVGroup_ExSkill_2-1 = "哈呣……啊……\n要吃這個嗎？"
20043-CVGroup_ExSkill_3-1 = "哈呣哈呣……啊，抱歉！\n這個給你！"
20043-CVGroup_ExSkill_Level_1-1 = "鏘鏘～！\n請享用～！"
20043-CVGroup_ExSkill_Level_2-1 = "肚子餓了嗎？\n來，吃吧！"
20043-CVGroup_ExSkill_Level_3-1 = "呀齁～！\n請用！"
20043-CVGroup_Formation_In_1-1 = "你有叫我嗎～？"
20043-CVGroup_Formation_In_2-1 = "好～！我也會去！"
20043-CVGroup_Formation_Select-1 = "哇～！老師，這邊這邊！"
20043-CVGroup_Growup_1-1 = "咦！？這麼多？可以嗎？\n耶嘿嘿，我要開動了～！"
20043-CVGroup_Growup_2-1 = "每個都很好吃！謝謝你，老師！"
20043-CVGroup_Growup_3-1 = "我真的可以得到這麼多嗎？\n下次，我帶你去推薦的店吧！"
20043-CVGroup_Growup_4-1 = "味道真神奇～！\n啊，這是食物對吧？"
20043-CVGroup_Relationship_Up_1-1 = "參拜的時候許了什麼願呀～？\n我呢，許了希望能更常跟老師待在一起的願望唷！"
20043-CVGroup_Relationship_Up_2-1 = "只要和老師待在一起就會非常心動！\n比做出「我特製．祕傳醬汁」的時候更心動！"
20043-CVGroup_Relationship_Up_3-1 = "老師，可以牽你的手嗎？\n耶嘿嘿！機會難得，來勾一下手臂吧！"
20043-CVGroup_Relationship_Up_4-1 = "只要見到老師的臉，就會莫名覺得暖暖的……\n比吃到美食的時候，還有發現新味道的時候都暖。\n是種非常幸福～的感覺！"

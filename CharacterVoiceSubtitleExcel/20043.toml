[translation]
20043-CVGroup_CommonSkill-1 = "งั้นชุดนี้ล่ะ?"
20043-CVGroup_ExSkill_1-1 = "ง่ำๆ ว้าว~ ทางนี้!"
20043-CVGroup_ExSkill_2-1 = "ง่ำ ง่ำ... ถ้างั้น...อันนี้ล่ะ เป็นยังไง?"
20043-CVGroup_ExSkill_3-1 = "อืม... อืม... ขอดูก่อนนะ...\nฉันให้อันนี้ก็แล้วกัน!"
20043-CVGroup_ExSkill_Level_1-1 = "อิซุมิมาแล้ว! กินให้อร่อยเลยนะ!"
20043-CVGroup_ExSkill_Level_2-1 = "หิวใช่มั้ย? เอ้านี่!"
20043-CVGroup_ExSkill_Level_3-1 = "ยะฮู้ว! อยู่ไหนนะ... เจอแล้ว!"
20043-CVGroup_Formation_In_1-1 = "เรียกฉันเหรอ?"
20043-CVGroup_Formation_In_2-1 = "อื้อ ไปด้วยกันเถอะ!"
20043-CVGroup_Formation_Select-1 = "ว้าว~! คุณครู ฉันมาแล้ว!"
20043-CVGroup_Growup_1-1 = "เอ๋?! เยอะขนาดนี้เลยเหรอ? ไม่เป็นไรเหรอ?\nแหะๆ จะทานให้อร่อยเลยค่า~!"
20043-CVGroup_Growup_2-1 = "เพราะทุกอย่างที่คุณครูให้มันอร่อยหมดเลย!"
20043-CVGroup_Growup_3-1 = "ให้เอาแต่รับแบบนี้อย่างเดียวได้เหรอ?!\nคราวนี้ฉันจะพาไปร้านอร่อยๆ เอง!"
20043-CVGroup_Growup_4-1 = "รสชาติดีอย่างน่าทึ่งเลย!\nอ่า อันนี้ใช่ของกินมั้ย?"
20043-CVGroup_Relationship_Up_1-1 = "ความปรารถนาในปีนี้คืออะไรเหรอ คุณครู?\nความปรารถนาของฉันคืออยากอยู่กับคุณครูให้นานๆ น่ะ!"
20043-CVGroup_Relationship_Up_2-1 = "เวลาอยู่กับคุณครูจะสบายใจขึ้นน่ะ\nยิ่งกว่าตอนที่อิซุมิทำซอสสูตรพิเศษซะอีก!"
20043-CVGroup_Relationship_Up_3-1 = "คุณครู ขอจับมือได้มั้ย?\nแหะๆ! ไหนๆ ก็ไหนๆ แล้วขอคล้องแขนด้วยแล้วกันนะ!"
20043-CVGroup_Relationship_Up_4-1 = "ไม่รู้ทำไมพอได้เจอคุณครูแล้วมีความสุขขึ้นน่ะ\nมากกว่าตอนที่กินของอร่อยๆ อีก\nแล้วก็ยิ่งกว่าตอนที่ค้นพบรสชาติใหม่ๆ ด้วย..."

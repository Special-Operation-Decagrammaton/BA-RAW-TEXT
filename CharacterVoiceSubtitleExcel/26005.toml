[translation]
26005-CVGroup_CommonSkill-1 = "이거는 어때?!"
26005-CVGroup_ExSkill_1-1 = "받아라!"
26005-CVGroup_ExSkill_2-1 = "흥! 해치워주겠어!"
26005-CVGroup_ExSkill_3-1 = "각오해!"
26005-CVGroup_ExSkill_Level_1-1 = "하아아앗!"
26005-CVGroup_ExSkill_Level_2-1 = "이걸로 어때!"
26005-CVGroup_ExSkill_Level_3-1 = "이거나 먹어랏!"
26005-CVGroup_Formation_In_1-1 = "나의 합류를! 감사하도록 해!"
26005-CVGroup_Formation_In_2-1 = "할 수 없지. 가자!"
26005-CVGroup_Formation_Select-1 = "뭐야! 흐…… 흐에?!"
26005-CVGroup_Growup_1-1 = "고…. 고…… 고마워!"
26005-CVGroup_Growup_2-1 = "후후! 선생님! 나를 좀 더 의지해도 좋아!"
26005-CVGroup_Growup_3-1 = "좋~았어! 나, 이걸로 더 강해졌다고! 분명 키도 더 커졌겠지?!"
26005-CVGroup_Growup_4-1 = "……고마워 선생님. 언젠간 보답할게."
26005-CVGroup_Relationship_Up_1-1 = "뭐, 뭐랄까. 그게, 부, 부끄럽다구!"
26005-CVGroup_Relationship_Up_2-1 = "오늘은…… 즐거웠어. 거, 거짓말 아냐!"
26005-CVGroup_Relationship_Up_3-1 = "차, 착각하지 마!\n선생님이랑 있던 게 너무 즐거웠을 뿐이니까!\n앗! 뭔가 잘못 말한 거 같은데?!"
26005-CVGroup_Relationship_Up_4-1 = "고…. 고… 고마워!\n지, 지금은 이 말밖에 떠오르지 않아.\n하지만… 다음에는, 그게…...!"

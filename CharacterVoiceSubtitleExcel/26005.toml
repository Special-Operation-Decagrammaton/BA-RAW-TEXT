[translation]
26005-CVGroup_CommonSkill-1 = "อันนี้ล่ะ เป็นไง?!"
26005-CVGroup_ExSkill_1-1 = "รับไปสิ!"
26005-CVGroup_ExSkill_2-1 = "ฮึ่ม! เดี๋ยวโดนจัดการแน่!"
26005-CVGroup_ExSkill_3-1 = "เตรียมตัวไว้เลย!"
26005-CVGroup_ExSkill_Level_1-1 = "เฮือกกก!"
26005-CVGroup_ExSkill_Level_2-1 = "อันนี้เป็นไงล่ะ?"
26005-CVGroup_ExSkill_Level_3-1 = "เอาอันนี้ไปกินซะ!"
26005-CVGroup_Formation_In_1-1 = "ดีใจที่ฉันยอมมาด้วยซะเถอะ!"
26005-CVGroup_Formation_In_2-1 = "ช่วยไม่ได้นะ ไปกันเถอะ!"
26005-CVGroup_Formation_Select-1 = "อะไรกัน! อะ... เอ๋?!"
26005-CVGroup_Growup_1-1 = "ขะ... ขะ... ขอบคุณนะ!"
26005-CVGroup_Growup_2-1 = "ฮุฮุ! คุณครู! มาพึ่งพาฉันอีกหน่อยก็ได้นะ!"
26005-CVGroup_Growup_3-1 = "ดี~ละ! ฉันแข็งแกร่งขึ้นด้วยอันนี้เลยนะ!\nคงสูงขึ้นกว่าเดิมด้วยเนอะ?!"
26005-CVGroup_Growup_4-1 = "ขอบคุณนะ คุณครู ไว้ฉันจะตอบแทนนะ"
26005-CVGroup_Relationship_Up_1-1 = "วะ... ว่ายังไงดีนะ... คือว่าฉะ... ฉันเขินน่ะ!"
26005-CVGroup_Relationship_Up_2-1 = "วันนี้... สนุกมากเลย มะ... ไม่ได้โกหกนะ!"
26005-CVGroup_Relationship_Up_3-1 = "ยะ... อย่าเข้าใจผิดนะ! ฉันแค่สนุกมากที่ได้อยู่กับคุณครูก็เท่านั้น!\nอ๊ะ! เหมือนว่าฉันพูดอะไรผิดไปเลย?!"
26005-CVGroup_Relationship_Up_4-1 = "ขะ... ขะ... ขอบคุณนะ! ตะ... ตอนนี้ฉันคิดออกแค่คำนี้\nแต่ว่า... ครั้งต่อไป เอ่อ.....!"

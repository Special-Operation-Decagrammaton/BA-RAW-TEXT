[translation]
10095-CVGroup_Battle_Buffed_1-1 = "非常感謝。讓人湧出了元氣呢。"
10095-CVGroup_Battle_Covered_1-1 = "進行躲藏。"
10095-CVGroup_Battle_Defense_1-1 = "那種程度是沒用的！"
10095-CVGroup_Battle_In_1-1 = "開始進行打掃。"
10095-CVGroup_Battle_In_2-1 = "總之先開工吧。\n要做的事情非常多。"
10095-CVGroup_Battle_Move_1-1 = "這邊的打掃已經完成了。"
10095-CVGroup_Battle_Move_2-1 = "那麼前往下一個位置。"
10095-CVGroup_Battle_Recovery_1-1 = "謝謝。感覺有力氣了。"
10095-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10095-CVGroup_Battle_Victory_1-1 = "今天的工作就此結束。\n您覺得如何呢，主人？"
10095-CVGroup_Battle_Victory_2-1 = "成功了，老師！\n真是的……姐姐！"
10095-CVGroup_CommonSkill-1 = "打掃必須細心……\n嗯，完成了！"
10095-CVGroup_ExSkill_1-1 = "一，二……！\n好，過關！"
10095-CVGroup_ExSkill_2-1 = "這裡和……這裡……！\n好耶！"
10095-CVGroup_ExSkill_3-1 = "保持冷靜，一個一個……\n很好！"
10095-CVGroup_ExSkill_Level_1-1 = "分數更新！\n老師，你有看到嗎？"
10095-CVGroup_ExSkill_Level_2-1 = "紀錄更新！\n老師，你覺得怎麼樣？"
10095-CVGroup_ExSkill_Level_3-1 = "要不要上傳到排行網站呢……"
10095-CVGroup_Formation_In_1-1 = "是，老師……不，主人。\n輪到我了呢。"
10095-CVGroup_Formation_In_2-1 = "我明白了。\n需要我對吧？"
10095-CVGroup_Formation_Select-1 = "呀啊！？\n呼……好險。"
10095-CVGroup_Growup_1-1 = "您覺得怎麼樣呢，主人？\n我，是否有稍微成長了呢？\n作為學生……以及作為女僕。"
10095-CVGroup_Growup_2-1 = "努力的方向固然重要……\n不過有時「正在努力」的事實也能讓人產生安全感。"
10095-CVGroup_Growup_3-1 = "我……對有能讓我獲得元氣的對象存在這件事，真的感到很高興。"
10095-CVGroup_Growup_4-1 = "謝謝您一直都守望著我。\n今後我也希望能跟主人一起……繼續努力。"
10095-CVGroup_Relationship_Up_1-1 = "老師……主人……你比較喜歡哪個稱呼呢？\n以我個人來說……應該是主人吧……？"
10095-CVGroup_Relationship_Up_2-1 = "我們之間的距離，是否更接近了呢？\n如果是的話……我很高興。耶嘿嘿。"
10095-CVGroup_Relationship_Up_3-1 = "能夠服侍出色的主人，就是女僕的喜悅吧。\n老師對我來說就是那樣的存在……"
10095-CVGroup_Relationship_Up_4-1 = "主～人～♪\n耶嘿嘿，只是想叫叫看而已。"
10095-CVGroup_Tactic_In_1-1 = "因為老師……因為主人正看著我……！"
10095-CVGroup_Tactic_In_2-1 = "現在，我會成為完美女僕給你看的！"
10095-CVGroup_Tactic_Victory_1-1 = "贏了！\n……太好了。"
10095-CVGroup_Tactic_Victory_2-1 = "怎麼樣呢……？\n我，有好好表現嗎？"

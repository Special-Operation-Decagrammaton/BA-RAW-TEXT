[translation]
10095-CVGroup_Battle_Buffed_1-1 = "ขอบคุณมากค่ะ รู้สึกมีแรงขึ้นเลยค่ะ"
10095-CVGroup_Battle_Covered_1-1 = "จะซ่อนตัวแล้วนะคะ"
10095-CVGroup_Battle_Defense_1-1 = "แค่นั้นยังไม่พอหรอกค่ะ!"
10095-CVGroup_Battle_In_1-1 = "จะเริ่มทำความสะอาดแล้วนะคะ"
10095-CVGroup_Battle_In_2-1 = "ก่อนอื่นก็ย้ายที่กันก่อนเถอะค่ะ มีงานต้องทำเยอะเลยค่ะ"
10095-CVGroup_Battle_Move_1-1 = "ทำความสะอาดที่นี่เรียบร้อยแล้วค่ะ"
10095-CVGroup_Battle_Move_2-1 = "ถ้างั้นก็ไปกันต่อเลย"
10095-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ มีแรงขึ้นแล้วละค่ะ"
10095-CVGroup_Battle_TacticalAction_1-1 = "จะไปเดี๋ยวนี้ค่ะ"
10095-CVGroup_Battle_Victory_1-1 = "ภารกิจวันนี้จบเพียงเท่านี้ค่ะ\nเป็นยังไงบ้างคะ นายท่าน?"
10095-CVGroup_Battle_Victory_2-1 = "ทำได้แล้วค่ะ คุณครู! จริงๆ เลยนะ... พี่เนี่ย!"
10095-CVGroup_CommonSkill-1 = "ทำความสะอาดหมดจด...\nอื้อ เรียบร้อยแล้วละค่ะ!"
10095-CVGroup_ExSkill_1-1 = "หนึ่ง สอง...!\nดีละ เคลียร์!"
10095-CVGroup_ExSkill_2-1 = "ตรงนี้ แล้วก็ตรงนี้...!\nทำได้แล้ว!"
10095-CVGroup_ExSkill_3-1 = "ค่อยๆ ใจเย็นๆ...\nดีละ!"
10095-CVGroup_ExSkill_Level_1-1 = "สกอร์ รีเฟรช!\nคุณครูดูอยู่รึเปล่าคะ?"
10095-CVGroup_ExSkill_Level_2-1 = "เรคคอร์ด รีเฟรช!\nคุณครู เป็นยังไงบ้างคะ?"
10095-CVGroup_ExSkill_Level_3-1 = "อัปขึ้นบนเว็บไซต์อันดับดีมั้ยนะ..."
10095-CVGroup_Formation_In_1-1 = "ค่ะคุณครู... ไม่สิ นายท่าน! ถึงตาของฉันแล้วสินะคะ"
10095-CVGroup_Formation_In_2-1 = "เข้าใจแล้วค่ะ เป็นฉันได้ใช่มั้ยคะ?"
10095-CVGroup_Formation_Select-1 = "ย้ากก?!\nฮู่ว... อันตรายจัง"
10095-CVGroup_Growup_1-1 = "เป็นยังไงบ้างคะ นายท่าน? ฉันก้าวหน้าขึ้นนิดหน่อยมั้ยคะ?\nในฐานะนักเรียน... แล้วก็ในฐานะเมด"
10095-CVGroup_Growup_2-1 = "ลักษณะของความพยายามสำคัญก็จริง...\nแต่บางครั้งความจริงว่าที่ว่าเราพยายามอยู่ ก็ทำให้รู้สึกอุ่นใจเหมือนกันค่ะ"
10095-CVGroup_Growup_3-1 = "ฉัน... คิดว่าโชคดีจริงๆ ที่มีคนที่มอบพลังให้อยู่ด้วยกันค่ะ"
10095-CVGroup_Growup_4-1 = "ขอบคุณที่คอยดูแลฉันเสมอนะคะ\nหลังจากนี้ฉันก็จะพยายาม... ไปพร้อมๆ กับนายท่านค่ะ"
10095-CVGroup_Relationship_Up_1-1 = "คุณครู... นายท่าน... ชอบให้เรียกแบบไหนคะ?\nส่วนฉัน... ชอบเรียกว่านายท่านมากกว่าน่ะค่ะ..."
10095-CVGroup_Relationship_Up_2-1 = "ระยะห่างระหว่างเรา... ใกล้ชิดขึ้นมาบ้างมั้ยคะ?\nถ้าเป็นอย่างนั้น... ฉันก็ดีใจค่ะ แหะๆๆ"
10095-CVGroup_Relationship_Up_3-1 = "การได้รับใช้นายท่านผู้ยิ่งใหญ่คือความสุขของเมดค่ะ\nสำหรับฉัน คุณครูเป็นคนสำคัญแบบนั้นละค่ะ..."
10095-CVGroup_Relationship_Up_4-1 = "นาย~ท่าน~♪\nแหะๆๆ ฉันแค่อยากลองเรียกดูค่ะ"
10095-CVGroup_Tactic_In_1-1 = "เพราะคุณครู... นายท่านคอยดูอยู่ด้วยนี่นา...!"
10095-CVGroup_Tactic_In_2-1 = "ฉันจะเป็นเมดที่สมบูรณ์แบบค่ะ!"
10095-CVGroup_Tactic_Victory_1-1 = "ชนะแล้วค่ะ! โล่งอกไปทีค่ะ..."
10095-CVGroup_Tactic_Victory_2-1 = "เป็นยังไงบ้างคะ...? ฉันทำได้ดีรึเปล่าคะ?"

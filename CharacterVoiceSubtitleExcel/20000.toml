[translation]
20000-CVGroup_CommonSkill-1 = "เริ่มยิงสนับสนุน"
20000-CVGroup_ExSkill_1-1 = "ตรวจสอบพิกัดศัตรู... พร้อมยิง"
20000-CVGroup_ExSkill_2-1 = "ฉันพลังเหลือล้นเลย...\nไปกันเถอะ!"
20000-CVGroup_ExSkill_3-1 = "ที่กำลังใส่กระบอกปืนอยู่น่ะ... ความโกรธยังไงล่ะ"
20000-CVGroup_ExSkill_Level_1-1 = "ก็พอใช้ได้นะ... อาจเกิดเรื่องใหญ่ก็ได้?"
20000-CVGroup_ExSkill_Level_2-1 = "ยิงเป้าหมาย... สำเร็จ"
20000-CVGroup_ExSkill_Level_3-1 = "ศัตรูของคุณครู... ฉันไม่ยกโทษให้หรอก"
20000-CVGroup_Formation_In_1-1 = "ฉัน... จะไปเอง..."
20000-CVGroup_Formation_In_2-1 = "มันชวนให้ดีใจอยู่นะ"
20000-CVGroup_Growup_1-1 = "ไม่มีอะไรสมบูรณ์หรอก มีแต่กระบวนการที่จะแสวงหาสิ่งนั้นเท่านั้น\nไมสเตอร์เป็นแบบนี้กันทุกคนละ"
20000-CVGroup_Growup_2-1 = "สรุปเลยว่า... ฉันแข็งแกร่งขึ้น"
20000-CVGroup_Growup_3-1 = "พออยู่กับคุณครู... ก็มีแรงบันดาลใจแฮะ\nเอาอีก... บอกฉันอีกสิ"
20000-CVGroup_Growup_4-1 = "ฉันไม่ได้ชอบการต่อสู้\nแต่ฉันก็อยากเป็นพลังให้คุณครูนะ"
20000-CVGroup_Relationship_Up_1-1 = "ถ้าฉันตรวจเช็กความรู้สึกที่มีต่อคุณครูตอนนี้\nต้อง... เจอแน่นอน"
20000-CVGroup_Relationship_Up_2-1 = "ฉันจะอยู่ที่ไหนและจะทำอะไรในอนาคตนะ?\nถึงจะไม่มีใครรู้ แต่ฉันรู้ ฉันจะอยู่กับคุณครูไง"
20000-CVGroup_Relationship_Up_3-1 = "น่าทึ่งจังเลยนะ ความจำฉันมีปัญหาหรือเปล่านะ?\nฉันมีคำที่อยากพูดเยอะแยะ\nแต่พอเห็นหน้าคุณครู ฉันก็นึกไม่ออกเลย"
20000-CVGroup_Relationship_Up_4-1 = "ฉันไม่เชื่อเรื่องโชคชะตาหรอก\nแต่ตั้งแต่ได้เจอกับคุณครู... ฉันก็ขอบคุณโชคชะตานะ"

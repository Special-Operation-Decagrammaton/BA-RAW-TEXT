[translation]
20000-CVGroup_CommonSkill-1 = "지원 사격 개시"
20000-CVGroup_ExSkill_1-1 = "적 위치 확인……. 발포 준비 완료."
20000-CVGroup_ExSkill_2-1 = "힘이 넘치고 있어……. 가자!"
20000-CVGroup_ExSkill_3-1 = "지금 장전하는건……. 분노."
20000-CVGroup_ExSkill_Level_1-1 = "그럭저럭……. 큰일이 날지도?"
20000-CVGroup_ExSkill_Level_2-1 = "타겟에 직격……. 성공"
20000-CVGroup_ExSkill_Level_3-1 = "선생님의 적은……. 용서하지 않아."
20000-CVGroup_Formation_In_1-1 = "내가…… 갈게……."
20000-CVGroup_Formation_In_2-1 = "조금, 기쁠지도."
20000-CVGroup_Formation_Select-1 = "응…… 선생님의 손길은 따듯하네. 안심이 돼."
20000-CVGroup_Growup_1-1 = "완성은 없어. 그것을 추구하는 과정만 있을 뿐.\n마이스터라면 누구나 그래."
20000-CVGroup_Growup_2-1 = "요약하면, 나, 강해진 거야."
20000-CVGroup_Growup_3-1 = "선생님과 함께라면, 의욕이 생기네. 더……. 더 많이 알려줘."
20000-CVGroup_Growup_4-1 = "전투를 좋아하는 건 아니지만 나도, 선생님의 힘이 되고 싶어."
20000-CVGroup_Relationship_Up_1-1 = "만약 지금 선생님을 향한 내 마음을 검사하면 ……분명, 양성 일거야."
20000-CVGroup_Relationship_Up_2-1 = "앞으로의 나는 어디에서, 무엇을 할까? \n아무도 알지 못하겠지만, 나는 알아.\n선생님과 함께 할 거야."
20000-CVGroup_Relationship_Up_3-1 = "신기하네. 기억 기능에 문제가 생긴 걸까?\n하고 싶은 말이 잔뜩 있었는데.\n선생님의 얼굴을 보면, 떠오르지 않게 돼."
20000-CVGroup_Relationship_Up_4-1 = "운명 따위는 믿지 않아.\n하지만, 선생님을 만난 그 순간부터…….\n운명에 감사하게 되었어."

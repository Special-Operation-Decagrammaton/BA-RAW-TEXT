[translation]
20000-CVGroup_CommonSkill-1 = "支援射擊開始。"
20000-CVGroup_ExSkill_1-1 = "敵方位置已確認……發射準備完畢。"
20000-CVGroup_ExSkill_2-1 = "力量正在湧現……出發吧！"
20000-CVGroup_ExSkill_3-1 = "現在裝填的……是憤怒！"
20000-CVGroup_ExSkill_Level_1-1 = "好像……會有點嚴重？"
20000-CVGroup_ExSkill_Level_2-1 = "對目標的直擊……成功。"
20000-CVGroup_ExSkill_Level_3-1 = "老師的敵人……我不會放過。"
20000-CVGroup_Formation_In_1-1 = "交給……我吧……"
20000-CVGroup_Formation_In_2-1 = "好像，有點開心。"
20000-CVGroup_Growup_1-1 = "完成並不存在。只存在追尋它的過程。\n身為巨匠的話，任何人都是這麼想的。"
20000-CVGroup_Growup_2-1 = "簡單來說──我，變強了。"
20000-CVGroup_Growup_3-1 = "跟老師在一起的話，就會湧現出動力。\n再教我……再教我更多吧。"
20000-CVGroup_Growup_4-1 = "雖然並不喜歡戰鬥，不過我也想成為老師的力量。"
20000-CVGroup_Relationship_Up_1-1 = "如果現在檢查我對老師的心……我想肯定會是陽性吧。"
20000-CVGroup_Relationship_Up_2-1 = "今後我將會在哪裡，做些什麼呢？\n也許沒有任何人知道，不過我很清楚。\n我將會與老師一起前行。"
20000-CVGroup_Relationship_Up_3-1 = "真神奇呢。是記憶機能發生問題了嗎？\n明明有很多話想說，但一看到老師的臉就想不起來了。"
20000-CVGroup_Relationship_Up_4-1 = "我並不相信什麼命運。\n不過，自從與老師相遇的那個瞬間……\n我就希望能對命運致上感謝。"

[translation]
10046-CVGroup_Battle_Buffed_1-1 = "忍法，感謝之術！夏日版本！"
10046-CVGroup_Battle_Covered_1-1 = "忍法！隱身之術！"
10046-CVGroup_Battle_Defense_1-1 = "沒用的！"
10046-CVGroup_Battle_In_1-1 = "伊樹菜，將身先士卒！"
10046-CVGroup_Battle_In_2-1 = "如忍者般迅速！任務，開始！"
10046-CVGroup_Battle_Move_1-1 = "繼續前進吧，主公！"
10046-CVGroup_Battle_Move_2-1 = "進行移動！咚！"
10046-CVGroup_Battle_Recovery_1-1 = "啊！非常感謝！"
10046-CVGroup_Battle_TacticalAction_1-1 = "唦唦唦……！"
10046-CVGroup_Battle_Victory_1-1 = "成功了唷，主公！\n是伊樹菜們的勝利呢！"
10046-CVGroup_Battle_Victory_2-1 = "耶嘿嘿！怎麼樣呢，主公！\n伊樹菜，剛才非常努力！"
10046-CVGroup_CommonSkill-1 = "忍法！吹泡泡之術！"
10046-CVGroup_ExSkill_1-1 = "咚！伊樹菜，要上了！"
10046-CVGroup_ExSkill_2-1 = "這也是伊樹菜流忍法！"
10046-CVGroup_ExSkill_3-1 = "忍法！沙灘排球之術！"
10046-CVGroup_ExSkill_Level_1-1 = "超強力SUPERSHOOT！"
10046-CVGroup_ExSkill_Level_2-1 = "這就是伊樹菜的真本事！"
10046-CVGroup_ExSkill_Level_3-1 = "夏日的伊樹菜，好好見識吧！"
10046-CVGroup_Formation_In_1-1 = "是！主公！\n伊樹菜，來也！"
10046-CVGroup_Formation_In_2-1 = "輪到伊樹菜了呢！"
10046-CVGroup_Formation_Select-1 = "這個夏天也請儘管吩咐伊樹菜，主公！忍忍！"
10046-CVGroup_Growup_1-1 = "要把這個，給伊樹菜……？\n非常感謝，主公！"
10046-CVGroup_Growup_2-1 = "伊樹菜，成長了！\n那麼趕緊去玩吧！主公！"
10046-CVGroup_Growup_3-1 = "這樣一來，應該就能抵禦酷暑了……！？\n那麼主公，一起去玩吧！"
10046-CVGroup_Growup_4-1 = "多虧了主公，伊樹菜才能變得像現在一樣強！\n今後也會為主公努力的哦！"
10046-CVGroup_Relationship_Up_1-1 = "這個夏天，居然也能跟主公在一起……\n伊樹菜，感到非常幸福！"
10046-CVGroup_Relationship_Up_2-1 = "主公！主公！主～公～！\n耶嘿嘿！總覺得光是這樣稱呼您，心情就會變好！"
10046-CVGroup_Relationship_Up_3-1 = "……哦？怎麼了嗎？\n不會不會，雖然天氣確實不錯，但在護衛主公的期間，炎熱什麼的無須在意！"
10046-CVGroup_Relationship_Up_4-1 = "（只要看著主公，總感覺臉就熱了起來……這是為什麼呢？）"
10046-CVGroup_Tactic_In_1-1 = "伊樹菜的活躍，還請您守望著哦！主公！"
10046-CVGroup_Tactic_In_2-1 = "請見證迎接夏天，更加進化的伊樹菜流忍法吧！"
10046-CVGroup_Tactic_Victory_1-1 = "任務完成！\n趕緊去海邊玩吧！主公！"
10046-CVGroup_Tactic_Victory_2-1 = "只要有伊樹菜流忍法，就沒有打不倒的敵人！大概吧！"

[translation]
10046-CVGroup_Battle_Buffed_1-1 = "인법 감사의 술! 여름 버전!"
10046-CVGroup_Battle_Covered_1-1 = "인법! 숨었어요의 술!"
10046-CVGroup_Battle_Defense_1-1 = "소용없어요!"
10046-CVGroup_Battle_In_1-1 = "이즈나, 앞장서겠습니다!"
10046-CVGroup_Battle_In_2-1 = "닌자처럼 빠르게! 임무, 시작하겠습니다!"
10046-CVGroup_Battle_Move_1-1 = "다음으로 가요! 주군!"
10046-CVGroup_Battle_Move_2-1 = "이동할게요! 이얍!"
10046-CVGroup_Battle_Recovery_1-1 = "앗! 감사합니다!"
10046-CVGroup_Battle_TacticalAction_1-1 = "샤샤샥-!"
10046-CVGroup_Battle_Victory_1-1 = "이겼어요! 주군! 이즈나들의 승리네요!"
10046-CVGroup_Battle_Victory_2-1 = "에헤헷! 어떠신가요. 주군! 이즈나! 잔뜩 노력했어요!"
10046-CVGroup_CommonSkill-1 = "인법! 뽀글뽀글의 술!"
10046-CVGroup_ExSkill_1-1 = "이얍! 이즈나! 갑니다!"
10046-CVGroup_ExSkill_2-1 = "이것 또한 이즈나류 인법!"
10046-CVGroup_ExSkill_3-1 = "인법! 비치 발리볼의 술!"
10046-CVGroup_ExSkill_Level_1-1 = "초강력 슈퍼슛-!"
10046-CVGroup_ExSkill_Level_2-1 = "이것이, 이즈나의 전력입니다!"
10046-CVGroup_ExSkill_Level_3-1 = "여름의 이즈나를, 보여드리지요!"
10046-CVGroup_Formation_In_1-1 = "네! 주군! 이즈나, 갑니다!"
10046-CVGroup_Formation_In_2-1 = "이즈나의 차례로군요!"
10046-CVGroup_Formation_Select-1 = "이번 여름에도 이즈나에게 무엇이든 명령해 주세요! 주군! 닌닌!"
10046-CVGroup_Growup_1-1 = "이것을, 이즈나에게……? 감사합니다. 주군!"
10046-CVGroup_Growup_2-1 = "이즈나, 성장했습니다! 그러니, 바로 놀러가요! 주군!"
10046-CVGroup_Growup_3-1 = "이것으로, 여름의 더위도 견딜 수 있게 되었을 터…?!\n그러니 주군, 같이 놀아요!"
10046-CVGroup_Growup_4-1 = "주군 덕분에 이즈나는 이렇게 강해질 수 있었어요.\n앞으로도 주군을 위해 힘낼게요!"
10046-CVGroup_Relationship_Up_1-1 = "이번 여름도 주군과 함께할 수 있다니. 이즈나! 엄청 행복해요!"
10046-CVGroup_Relationship_Up_2-1 = "주군! 주군! 주~군~!\n에헤헷! 왠지 이렇게 부르는 것만으로도, 즐거운 기분이 들어요!"
10046-CVGroup_Relationship_Up_3-1 = "……무슨 일 있으신가요?\n앗, 아니요. 확실히 좋은 날씨이지만, 주군을 호위하는 중이라면 더위 따위는 신경 쓰이지 않으니까요!"
10046-CVGroup_Relationship_Up_4-1 = "(주군을 보고 있으면, 어쩐지 얼굴이 뜨거워져서……. 어째서일까요?)"
10046-CVGroup_Tactic_In_1-1 = "이즈나의 활약, 지켜봐 주세요! 주군!"
10046-CVGroup_Tactic_In_2-1 = "여름을 맞이해, 보다 진화한 이즈나류 인법을 보여드리지요!"
10046-CVGroup_Tactic_Victory_1-1 = "임무 완료예요! 어서 바다로 놀러 가요! 주군!"
10046-CVGroup_Tactic_Victory_2-1 = "이즈나류 인법으로 쓰러트리지 못할 상대는 없어요! 아마도!"

[translation]
10069-CVGroup_Battle_Buffed_1-1 = "哦～謝謝。"
10069-CVGroup_Battle_Covered_1-1 = "就說沒問題了。"
10069-CVGroup_Battle_Defense_1-1 = "儘管加油吧？"
10069-CVGroup_Battle_In_1-1 = "是是，我聽見了唷。\n所以，你想吃什麼呢？"
10069-CVGroup_Battle_In_2-1 = "餓著肚子沒辦法戰鬥，這可是真的哦？"
10069-CVGroup_Battle_Move_1-1 = "到那邊去吧。"
10069-CVGroup_Battle_Move_2-1 = "好，要移動囉。"
10069-CVGroup_Battle_Recovery_1-1 = "呀～幫大忙了！"
10069-CVGroup_Battle_TacticalAction_1-1 = "要前進囉。"
10069-CVGroup_Battle_Victory_1-1 = "嗯，大概就這樣吧。\n各位，辛苦囉～"
10069-CVGroup_Battle_Victory_2-1 = "大家辛苦了。\n有人肚子餓了嗎～？"
10069-CVGroup_CommonSkill-1 = "裝填，發射！"
10069-CVGroup_ExSkill_1-1 = "嘿咻……！\n來！請享用！"
10069-CVGroup_ExSkill_2-1 = "那麼……！\n哈啊！這樣如何？"
10069-CVGroup_ExSkill_3-1 = "要加點的話，還有很多唷～"
10069-CVGroup_ExSkill_Level_1-1 = "好，完成……！\n來！"
10069-CVGroup_ExSkill_Level_2-1 = "好，完成了……\n盡量吃吧！"
10069-CVGroup_ExSkill_Level_3-1 = "肚子餓了嗎？\n儘管吃吧！"
10069-CVGroup_Formation_In_1-1 = "我幫你做點什麼吧？"
10069-CVGroup_Formation_In_2-1 = "需要我的幫忙嗎？交給我。"
10069-CVGroup_Formation_Select-1 = "唔哇……！真危險。\n要溫柔點摸哦。"
10069-CVGroup_Growup_1-1 = "咦？我變強了嗎？"
10069-CVGroup_Growup_2-1 = "這種感覺……嗯，還不賴呢。\n是多虧了老師嗎？"
10069-CVGroup_Growup_3-1 = "謝謝你，老師。下次能來玄武商會一趟嗎？\n我會招待你的。"
10069-CVGroup_Growup_4-1 = "變強之後，是不是就能做出更多料理了……？\n老師，你肚子餓了嗎？"
10069-CVGroup_Relationship_Up_1-1 = "我雖然是大家的料理人、主廚、商會會長……\n但偶爾……也會想成為專屬於某個人的……特別的存在。我有時這麼想。"
10069-CVGroup_Relationship_Up_2-1 = "嗯……抱歉，老師。\n這種心情，那個……我有點陌生。\n或者該說，是第一次……"
10069-CVGroup_Relationship_Up_3-1 = "今天……我想要招待老師，你覺得怎麼樣呢？\n不是作為商會會長，而是以一名學生──瑠美的身分。"
10069-CVGroup_Relationship_Up_4-1 = "責任這種東西既辛苦又沉重，有時……也會讓人想撒手不管。\n……謝謝你，老師。謝謝你願意聽我說剛才那些話。"
10069-CVGroup_Tactic_In_1-1 = "那麼，開始吧？\n緊緊跟著我哦。"
10069-CVGroup_Tactic_In_2-1 = "是敵人啊……\n要是能進行談判就好了。"
10069-CVGroup_Tactic_Victory_1-1 = "好，下一個！！"
10069-CVGroup_Tactic_Victory_2-1 = "這種事只是小菜一疊哦。"

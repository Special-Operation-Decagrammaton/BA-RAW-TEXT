[translation]
10069-CVGroup_Battle_Buffed_1-1 = "โอ้ ขอบคุณนะ"
10069-CVGroup_Battle_Covered_1-1 = "ไม่ต้องห่วงหรอก"
10069-CVGroup_Battle_Defense_1-1 = "มาทำให้ดีกันเถอะ"
10069-CVGroup_Battle_In_1-1 = "ค่ะ เรียกฉันเหรอคะ แล้ว... จะกินอะไรล่ะ?"
10069-CVGroup_Battle_In_2-1 = "ถ้าท้องหิวก็จะสู้ได้ไม่เต็มที่หรอก ฉันพูดจริงนะคะ"
10069-CVGroup_Battle_Move_1-1 = "ลองไปทางนั้นกันมั้ย"
10069-CVGroup_Battle_Move_2-1 = "ดีละ ไปกันเลย"
10069-CVGroup_Battle_Recovery_1-1 = "อ่า~ รอดแล้วละ!"
10069-CVGroup_Battle_TacticalAction_1-1 = "ไปละนะ"
10069-CVGroup_Battle_Victory_1-1 = "เอาเถอะ เท่านี้ก็น่าจะพอแล้วนะ\nทุกคนทำได้ดีมากเลย~"
10069-CVGroup_Battle_Victory_2-1 = "ทุกคนทำได้ดีมาก มีใครหิวรึเปล่า~?"
10069-CVGroup_CommonSkill-1 = "โหลดกระสุน... กระหน่ำยิง!"
10069-CVGroup_ExSkill_1-1 = "ฮึบ...! ค่ะ! ทานได้เลยค่ะ"
10069-CVGroup_ExSkill_2-1 = "ถ้างั้น...! ฮ่า! แล้วแบบนี้ล่ะ?"
10069-CVGroup_ExSkill_3-1 = "รีฟิล! มีอยู่เยอะเลย~"
10069-CVGroup_ExSkill_Level_1-1 = "เอ้า เสร็จแล้ว... ย้าาา!"
10069-CVGroup_ExSkill_Level_2-1 = "ดีละ เรียบร้อย... กินเยอะๆ เลยนะ~!"
10069-CVGroup_ExSkill_Level_3-1 = "หิวแล้วเหรอ? กินให้พุงกางได้เลย!"
10069-CVGroup_Formation_In_1-1 = "ทำเมนูอะไรดีนะ...?"
10069-CVGroup_Formation_In_2-1 = "อยากให้ฉันช่วยเหรอ? ให้เป็นหน้าที่ฉันเอง"
10069-CVGroup_Formation_Select-1 = "โว้ว...! แบบนี้มันอันตรายนะ เบามือหน่อยสิ!"
10069-CVGroup_Growup_1-1 = "เอ๋ ฉันแข็งแกร่งขึ้นแล้วเหรอ?"
10069-CVGroup_Growup_2-1 = "ความรู้สึกนี้... อื้อ ก็ไม่แย่เท่าไหร่นะ เป็นเพราะคุณครูรึเปล่านะ"
10069-CVGroup_Growup_3-1 = "ขอบคุณนะคุณครู คราวหน้าก็มาที่ย่านการค้าเทพเต่าดำอีกได้มั้ย?\nฉันจะเลี้ยงเอง"
10069-CVGroup_Growup_4-1 = "ตอนนี้ฉันแข็งแกร่งขึ้นแล้ว หลังจากนี้\nก็อาจจะทำอาหารได้เยอะขึ้นสินะ...?\nคุณครู หิวรึเปล่า?"
10069-CVGroup_Relationship_Up_1-1 = "ฉันเป็นเชฟ หัวหน้าเชฟ และประธานย่านการค้าสำหรับทุกคน...\nแต่ว่าบางครั้ง... ฉันก็อยากจะเป็นอะไรบางอย่าง...\nที่พิเศษสำหรับคนคนเดียวบ้างน่ะ"
10069-CVGroup_Relationship_Up_2-1 = "อืม... ขอโทษนะคุณครู ความรู้สึกแบบนี้... ฉันไม่ชินเลยน่ะ\nสรุปก็คือฉันเพิ่งเคยรู้สึก... เป็นครั้งแรกน่ะ..."
10069-CVGroup_Relationship_Up_3-1 = "วันนี้... ฉันอยากเชิญคุณครูมาด้วย ว่าไงล่ะ?\nไม่ใช่ในฐานะประธานย่านการค้า\nแต่ในฐานะรูมิที่เป็นเด็กนักเรียนคนหนึ่ง"
10069-CVGroup_Relationship_Up_4-1 = "ความรับผิดชอบเป็นเรื่องที่ยาก และหนักอึ้ง และบางครั้ง...\nก็เป็นสิ่งที่ทำให้อยากปล่อยวางทุกอย่างน่ะ\nขอบคุณนะคุณครู... ที่รับฟังคำพูดเมื่อกี้"
10069-CVGroup_Tactic_In_1-1 = "งั้นมาเริ่มกันเลยมั้ย? ตามฉันมาให้ดีล่ะ"
10069-CVGroup_Tactic_In_2-1 = "ศัตรูงั้นเหรอ... ถ้าตกลงกันได้ก็คงดีนะ"
10069-CVGroup_Tactic_Victory_1-1 = "เอ้า ต่อไป!"
10069-CVGroup_Tactic_Victory_2-1 = "ไม่ใช่เรื่องใหญ่อะไรหรอก"

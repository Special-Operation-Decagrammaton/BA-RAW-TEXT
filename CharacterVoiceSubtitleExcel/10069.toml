[translation]
10069-CVGroup_Battle_Buffed_1-1 = "Oh. Thank you."
10069-CVGroup_Battle_Covered_1-1 = "You have nothing to worry about."
10069-CVGroup_Battle_Defense_1-1 = "Why not try a little harder?"
10069-CVGroup_Battle_In_1-1 = "Yeah, yeah. You called? So, what're you craving?"
10069-CVGroup_Battle_In_2-1 = "No one can fight on an empty stomach. I'm not joking."
10069-CVGroup_Battle_Move_1-1 = "Maybe I should go over there."
10069-CVGroup_Battle_Move_2-1 = "All right. Moving."
10069-CVGroup_Battle_Recovery_1-1 = "I made it out alive!"
10069-CVGroup_Battle_TacticalAction_1-1 = "Let's go."
10069-CVGroup_Battle_Victory_1-1 = "I guess that should do it. Good work, everybody."
10069-CVGroup_Battle_Victory_2-1 = "Good work, everyone. Who's hungry?"
10069-CVGroup_CommonSkill-1 = "Reloading and firing!"
10069-CVGroup_ExSkill_1-1 = "Hngh...! Got you! Help yourself!"
10069-CVGroup_ExSkill_2-1 = "In that case... Hah! How's that?"
10069-CVGroup_ExSkill_3-1 = "There's always plenty of refills!"
10069-CVGroup_ExSkill_Level_1-1 = "All done... Yah!"
10069-CVGroup_ExSkill_Level_2-1 = "All right, done... Order up!"
10069-CVGroup_ExSkill_Level_3-1 = "Feeling hungry? Have as much as you'd like!"
10069-CVGroup_Formation_In_1-1 = "Would you like me to make you something?"
10069-CVGroup_Formation_In_2-1 = "Do you need my help? You can count on me."
10069-CVGroup_Formation_Select-1 = "Whoa...! That's dangerous. You need to be more precise."
10069-CVGroup_Growup_1-1 = "Huh, did I get stronger?"
10069-CVGroup_Growup_2-1 = "This feeling... It's not bad at all. And it's thanks to you, Sensei."
10069-CVGroup_Growup_3-1 = "Thanks, Sensei. Why don't you visit the Black Tortoise Promenade some time? I'll treat you."
10069-CVGroup_Growup_4-1 = "Now that I'm stronger, maybe I can make more food... Are you hungry, Sensei?"
10069-CVGroup_Relationship_Up_1-1 = "I'm everyone's cook, head chef, and head of the Promenade, but... Sometimes... I just want to be something special for just one person."
10069-CVGroup_Relationship_Up_2-1 = "Hm... I'm sorry, Sensei. I'm not quite...used to these kinds of emotions. This is really the first time—you know..."
10069-CVGroup_Relationship_Up_3-1 = "I'm inviting you to spend time here today, Sensei—not as the head of the Promenade, but as Rumi, the student. What do you say?"
10069-CVGroup_Relationship_Up_4-1 = "Responsibility is a heavy burden to bear, and at times... I wish I could let it go... Thank you for listening, Sensei."
10069-CVGroup_Tactic_In_1-1 = "Shall we get started? Try to keep up."
10069-CVGroup_Tactic_In_2-1 = "An enemy... I would have preferred negotiating with them."
10069-CVGroup_Tactic_Victory_1-1 = "Next!"
10069-CVGroup_Tactic_Victory_2-1 = "I guess that wasn't much."

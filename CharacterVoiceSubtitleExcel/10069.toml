[translation]
10069-CVGroup_Battle_Buffed_1-1 = "오. 고마워."
10069-CVGroup_Battle_Covered_1-1 = "걱정 말라고."
10069-CVGroup_Battle_Defense_1-1 = "좀 잘해 보지?"
10069-CVGroup_Battle_In_1-1 = "네네, 부르셨습니까. 그래서, 뭐 먹고 싶어?"
10069-CVGroup_Battle_In_2-1 = "배고파서는 싸울 수 없어, 이거 정말이라니까?"
10069-CVGroup_Battle_Move_1-1 = "저쪽으로 가 볼까."
10069-CVGroup_Battle_Move_2-1 = "좋아. 이동한다."
10069-CVGroup_Battle_Recovery_1-1 = "이야~ 살았어!"
10069-CVGroup_Battle_TacticalAction_1-1 = "간다."
10069-CVGroup_Battle_Victory_1-1 = "뭐, 이 정도면 되려나. 모두들, 수고~"
10069-CVGroup_Battle_Victory_2-1 = "다들 수고했어. 배고픈 사람~?"
10069-CVGroup_CommonSkill-1 = "장전, 난사!"
10069-CVGroup_ExSkill_1-1 = "영차……! 네! 드세요."
10069-CVGroup_ExSkill_2-1 = "그러면……! 핫! 이건 어때?"
10069-CVGroup_ExSkill_3-1 = "리필은! 많이 있어~"
10069-CVGroup_ExSkill_Level_1-1 = "자, 완성... 이얍!"
10069-CVGroup_ExSkill_Level_2-1 = "좋아, 됐어…… 많~이 먹어!"
10069-CVGroup_ExSkill_Level_3-1 = "배고파졌어? 얼마든지 먹어!"
10069-CVGroup_Formation_In_1-1 = "뭔가, 만들어 줄까?"
10069-CVGroup_Formation_In_2-1 = "내 도움이 필요해? 맡겨줘."
10069-CVGroup_Formation_Select-1 = "우왓……! 위험하잖아. 살살 다뤄 줘."
10069-CVGroup_Growup_1-1 = "어라, 나 강해졌어?"
10069-CVGroup_Growup_2-1 = "이 감각…… 응, 나쁘지 않네. 선생님 덕분인건가."
10069-CVGroup_Growup_3-1 = "고마워, 선생님. 다음에 현무상회에 와 주겠어? 한턱 낼게."
10069-CVGroup_Growup_4-1 = "강해졌으니까, 밥을 앞으로 \n더 많이 만들 수 있지 않을까...?\n선생님, 배고프지 않아?"
10069-CVGroup_Relationship_Up_1-1 = "나는 모두의 요리사이고, 주방장이고, 상회장이지만…….\n가끔…… 단 한 사람만의……\n특별한 무언가가 되고싶다고 생각할 때가 있어."
10069-CVGroup_Relationship_Up_2-1 = "음…… 미안해, 선생님. 이런 감정은 뭔가…… 낯설어서.\n그렇다고 할까, 처음이어서…… 말이야……."
10069-CVGroup_Relationship_Up_3-1 = "오늘…… 선생님을 초대하고 싶은데. 어때?\n상회장으로서가 아니라 한명의 학생, 루미로서."
10069-CVGroup_Relationship_Up_4-1 = "책임이라는 것은 힘들고, 무겁고, 때로는……\n손 놓고 싶어지는 것이기도 하지.\n……고마워, 선생님. 방금 한 이야기 들어줘서."
10069-CVGroup_Tactic_In_1-1 = "그러면 시작해 볼까? 잘들 따라 오라고."
10069-CVGroup_Tactic_In_2-1 = "적인가……. 협상을 할 수 있었으면 좋았을 텐데."
10069-CVGroup_Tactic_Victory_1-1 = "자, 다음!"
10069-CVGroup_Tactic_Victory_2-1 = "별 것 아니었네."

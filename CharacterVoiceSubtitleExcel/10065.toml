[translation]
10065-CVGroup_Battle_Buffed_1-1 = "您的支援，非常感謝。"
10065-CVGroup_Battle_Covered_1-1 = "調整呼吸……"
10065-CVGroup_Battle_Defense_1-1 = "行不通的哦。"
10065-CVGroup_Battle_In_1-1 = "各位，請跟我來。"
10065-CVGroup_Battle_In_2-1 = "小心不要受傷，保持注意出發吧。"
10065-CVGroup_Battle_Move_1-1 = "來，繼續前進吧？"
10065-CVGroup_Battle_Move_2-1 = "各位，要出發囉。"
10065-CVGroup_Battle_Recovery_1-1 = "很有幫助。非常感謝。"
10065-CVGroup_Battle_TacticalAction_1-1 = "上吧。"
10065-CVGroup_Battle_Victory_1-1 = "呵呵，這就是陰陽部的底力。"
10065-CVGroup_Battle_Victory_2-1 = "呵呵，要是多少能成為百鬼夜行的宣傳就好了。"
10065-CVGroup_CommonSkill-1 = "將心平靜下來……出發吧！"
10065-CVGroup_ExSkill_1-1 = "哇！？從天上……這是……？"
10065-CVGroup_ExSkill_2-1 = "這是……傳說中的……！？"
10065-CVGroup_ExSkill_3-1 = "這，這是！知世醬！？"
10065-CVGroup_ExSkill_Level_1-1 = "不能讓它掉到地上！"
10065-CVGroup_ExSkill_Level_2-1 = "我會全部回收！"
10065-CVGroup_ExSkill_Level_3-1 = "知世醬！等等我！！"
10065-CVGroup_Formation_In_1-1 = "是，請儘管吩咐。"
10065-CVGroup_Formation_In_2-1 = "桑上佳穗，要上了。"
10065-CVGroup_Formation_Select-1 = "嗯？有什麼事嗎？"
10065-CVGroup_Growup_1-1 = "非常謝謝您，老師。\n託您的福才能有所成長。"
10065-CVGroup_Growup_2-1 = "能夠切身體會到成長，真是件相當快樂的事呢。"
10065-CVGroup_Growup_3-1 = "託老師的福，又變得更強了。\n我希望能用這股力量，幫上大家更多的忙。"
10065-CVGroup_Growup_4-1 = "似乎獲得了更進一步的成長。\n如果這樣的我也能助您一臂之力，那就再讓人欣喜不過了。"
10065-CVGroup_Relationship_Up_1-1 = "心情竟然會如此高揚……那個……\n是第一次，體會到的感覺……"
10065-CVGroup_Relationship_Up_2-1 = "一同度過的時間越長，心靈的距離就會越短呢……\n……原來如此。"
10065-CVGroup_Relationship_Up_3-1 = "身體，變得有點熱……\n這是……不，莫非……唔。"
10065-CVGroup_Relationship_Up_4-1 = "處在被他人守望的立場，這還是第一次……\n原來是件如此令人開心的事啊。"
10065-CVGroup_Tactic_In_1-1 = "賭上百鬼夜行之名。"
10065-CVGroup_Tactic_In_2-1 = "身為陰陽部的副部長，我會達成給您看的。"
10065-CVGroup_Tactic_Victory_1-1 = "有幫上您的忙嗎？"
10065-CVGroup_Tactic_Victory_2-1 = "呼……大家沒事就再好不過了。"

[translation]
10065-CVGroup_Battle_Buffed_1-1 = "지원, 감사합니다."
10065-CVGroup_Battle_Covered_1-1 = "호흡을 가다듬고…."
10065-CVGroup_Battle_Defense_1-1 = "통하지 않는답니다."
10065-CVGroup_Battle_In_1-1 = "여러분, 따라와 주세요."
10065-CVGroup_Battle_In_2-1 = "다치지 않게, 조심해서 가지요."
10065-CVGroup_Battle_Move_1-1 = "자, 다음으로 가실까요?"
10065-CVGroup_Battle_Move_2-1 = "여러분, 갈게요."
10065-CVGroup_Battle_Recovery_1-1 = "도움이 되었습니다. 감사합니다."
10065-CVGroup_Battle_TacticalAction_1-1 = "가시죠."
10065-CVGroup_Battle_Victory_1-1 = "후훗, 이것이 음양부의 저력이랍니다."
10065-CVGroup_Battle_Victory_2-1 = "후후, 조금이라도 백귀야행의 홍보가 되면 좋을 텐데요."
10065-CVGroup_CommonSkill-1 = "마음을 가라앉히고……. 가봅시다."
10065-CVGroup_ExSkill_1-1 = "앗?! 하늘에서… 이건…?"
10065-CVGroup_ExSkill_2-1 = "이것은… 전설의…?!"
10065-CVGroup_ExSkill_3-1 = "이, 이건! 치세 쨩?!"
10065-CVGroup_ExSkill_Level_1-1 = "떨어지게 놔둘 순, 없어요!"
10065-CVGroup_ExSkill_Level_2-1 = "모두 회수하겠어요!"
10065-CVGroup_ExSkill_Level_3-1 = "치세 쨩! 기다려줘요!"
10065-CVGroup_Formation_In_1-1 = "네, 무엇이든 말씀해 주세요."
10065-CVGroup_Formation_In_2-1 = "쿠와카미 카호, 갑니다."
10065-CVGroup_Formation_Select-1 = "네? 무슨 일 있으신가요?"
10065-CVGroup_Growup_1-1 = "감사합니다. 선생님. 덕분에 성장했습니다."
10065-CVGroup_Growup_2-1 = "성장을 실감할 수 있는 것은, 꽤나 기쁜 일이네요."
10065-CVGroup_Growup_3-1 = "선생님 덕분에, 또 강해졌습니다.\n이 힘으로 좀 더, 여러분께 도움이 되고 싶습니다."
10065-CVGroup_Growup_4-1 = "조금 더 성장한 듯 하군요.\n이런 저라도 도움이 될 수 있다면, 기쁠 따름입니다."
10065-CVGroup_Relationship_Up_1-1 = "이렇게나 가슴이 두근거린다니…. 그…. 처음 느껴보는, 감각…이네요."
10065-CVGroup_Relationship_Up_2-1 = "함께하는 시간이 길어질수록, 마음의 거리도 줄어드는 거네요…. …과연."
10065-CVGroup_Relationship_Up_3-1 = "조금, 몸이 뜨거워져서…. 이것은…. 아니요, 어쩌면… 우으."
10065-CVGroup_Relationship_Up_4-1 = "누군가가 지켜봐 주는 입장이 된 건, 처음입니다….\n이렇게나 기쁜 일이군요."
10065-CVGroup_Tactic_In_1-1 = "백귀야행의 이름으로."
10065-CVGroup_Tactic_In_2-1 = "음양부 부부장으로서, 해내겠습니다."
10065-CVGroup_Tactic_Victory_1-1 = "도움이 되셨는지요?"
10065-CVGroup_Tactic_Victory_2-1 = "후우…. 여러분이 무사해서 다행입니다."

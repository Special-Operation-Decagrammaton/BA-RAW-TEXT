[translation]
10065-CVGroup_Battle_Buffed_1-1 = "Thank you for the support."
10065-CVGroup_Battle_Covered_1-1 = "Take a deep breath..."
10065-CVGroup_Battle_Defense_1-1 = "That won't work on me."
10065-CVGroup_Battle_In_1-1 = "Please, follow me."
10065-CVGroup_Battle_In_2-1 = "I hope you can keep moving safely."
10065-CVGroup_Battle_Move_1-1 = "Now, shall we move on to the next one?"
10065-CVGroup_Battle_Move_2-1 = "Everyone, let's go."
10065-CVGroup_Battle_Recovery_1-1 = "That helped. Thank you."
10065-CVGroup_Battle_TacticalAction_1-1 = "Let's go."
10065-CVGroup_Battle_Victory_1-1 = "Heehee, this is the strength of the Yin-Yang Club."
10065-CVGroup_Battle_Victory_2-1 = "Heehee, I hope this can promote Hyakkiyako, even just a little bit."
10065-CVGroup_CommonSkill-1 = "Let's calm down...and keep moving."
10065-CVGroup_ExSkill_1-1 = "Ah?! From up in the sky, it's...?"
10065-CVGroup_ExSkill_2-1 = "This is...the legendary...?!"
10065-CVGroup_ExSkill_3-1 = "Th-This is...Chise?!"
10065-CVGroup_ExSkill_Level_1-1 = "I can't let it fall!"
10065-CVGroup_ExSkill_Level_2-1 = "I'll take it all!"
10065-CVGroup_ExSkill_Level_3-1 = "Chise! Wait for me!"
10065-CVGroup_Formation_In_1-1 = "Yes, please tell me anything."
10065-CVGroup_Formation_In_2-1 = "Kuwakami Kaho, on my way."
10065-CVGroup_Formation_Select-1 = "Yes? Is there a problem?"
10065-CVGroup_Growup_1-1 = "Thank you, Sensei. You've helped me grow."
10065-CVGroup_Growup_2-1 = "It's a pleasant experience to feel yourself growing."
10065-CVGroup_Growup_3-1 = "You've made me stronger again, Sensei. I want to use that strength to help everybody."
10065-CVGroup_Growup_4-1 = "It seems like I've grown a bit more. If even someone like me could be of help to you, that's wonderful."
10065-CVGroup_Relationship_Up_1-1 = "My heart is pounding... It's... This is my first time feeling something like this."
10065-CVGroup_Relationship_Up_2-1 = "The more time we spend together, the smaller the distance between our hearts... Yes, I see it."
10065-CVGroup_Relationship_Up_3-1 = "My whole body feels warm... Could this be—But, no... Perhaps... Urgh."
10065-CVGroup_Relationship_Up_4-1 = "I've never had someone looking after me before... I also never knew it would make me this happy."
10065-CVGroup_Tactic_In_1-1 = "In the name of Hyakkiyako..."
10065-CVGroup_Tactic_In_2-1 = "As vice president of the Yin-Yang Club, I will see it done."
10065-CVGroup_Tactic_Victory_1-1 = "Did you find that to be helpful?"
10065-CVGroup_Tactic_Victory_2-1 = "Whew... I'm just grateful everyone is all right."

[translation]
10065-CVGroup_Battle_Buffed_1-1 = "ขอบคุณที่สนับสนุนค่ะ"
10065-CVGroup_Battle_Covered_1-1 = "ควบคุมลมหายใจ..."
10065-CVGroup_Battle_Defense_1-1 = "คุยกันไม่รู้เรื่องเลยนะคะ"
10065-CVGroup_Battle_In_1-1 = "ทุกคนตามฉันมาค่ะ"
10065-CVGroup_Battle_In_2-1 = "ระวังอย่าให้บาดเจ็บนะคะ"
10065-CVGroup_Battle_Move_1-1 = "เอาละค่ะ ไปที่ต่อไปเลยมั้ยคะ?"
10065-CVGroup_Battle_Move_2-1 = "ทุกคน... จะไปแล้วนะคะ"
10065-CVGroup_Battle_Recovery_1-1 = "ช่วยได้มากเลยค่ะ ขอบคุณค่ะ"
10065-CVGroup_Battle_TacticalAction_1-1 = "ไปกันเถอะค่ะ"
10065-CVGroup_Battle_Victory_1-1 = "ฮุฮุ นี่คือพลังของชมรมหยินหยางค่ะ"
10065-CVGroup_Battle_Victory_2-1 = "ฮุฮุ คงดีไม่น้อยถ้าได้ประชาสัมพันธ์เฮียกคิยาโคไปด้วยน่ะค่ะ"
10065-CVGroup_CommonSkill-1 = "ทำใจให้สงบ...\nไปกันเลยค่ะ"
10065-CVGroup_ExSkill_1-1 = "อ๊ะ?! จากท้องฟ้า... นี่มัน...?"
10065-CVGroup_ExSkill_2-1 = "นี่คือ... ในตำนาน...?!"
10065-CVGroup_ExSkill_3-1 = "นะ... นี่มัน! ชิเซะจัง?!"
10065-CVGroup_ExSkill_Level_1-1 = "จะปล่อยให้ตกลงไปไม่ได้หรอกค่ะ!"
10065-CVGroup_ExSkill_Level_2-1 = "จะยึดกลับมาให้หมดเลยค่ะ!"
10065-CVGroup_ExSkill_Level_3-1 = "ชิเซะจัง! รอด้วยสิคะ!"
10065-CVGroup_Formation_In_1-1 = "ค่ะ บอกฉันได้ทุกอย่างเลยนะคะ"
10065-CVGroup_Formation_In_2-1 = "คุวาคามิ คาโฮะจะบุกแล้วนะคะ"
10065-CVGroup_Formation_Select-1 = "คะ? มีเรื่องอะไรงั้นเหรอคะ?"
10065-CVGroup_Growup_1-1 = "ขอบคุณค่ะ คุณครู\nฉันพัฒนาขึ้นได้เพราะคุณครูเลยค่ะ"
10065-CVGroup_Growup_2-1 = "การได้รับรู้ถึงการเติบโตของตัวเอง\nเป็นเรื่องที่น่ายินดีมากเลยค่ะ"
10065-CVGroup_Growup_3-1 = "ต้องขอบคุณคุณครูที่ทำให้ฉันแข็งแกร่งขึ้นค่ะ\nฉันอยากใช้พลังนี้เพื่อช่วยเหลือทุกคนให้มากกว่านี้ค่ะ"
10065-CVGroup_Growup_4-1 = "รู้สึกเหมือนเติบโตขึ้นอีกหน่อยแล้วค่ะ\nถ้าฉันพอจะช่วยอะไรได้ละก็ ยินดีอย่างยิ่งเลยค่ะ"
10065-CVGroup_Relationship_Up_1-1 = "ใจเต็นแรงขนาดนี้... คือ...\nเป็นความรู้สึกที่เพิ่งจะเคยรู้สึก... เป็นครั้งแรกเลยค่ะ"
10065-CVGroup_Relationship_Up_2-1 = "ยิ่งได้ใช้เวลาด้วยกันเท่าไหร่ ระยะห่างระหว่างใจก็จะลดลงค่ะ...\nอย่างที่คิดเลย..."
10065-CVGroup_Relationship_Up_3-1 = "รู้สึกร่างกายร้อนๆ ขึ้นมานิดหน่อย...\nนี่มัน... เปล่าค่ะ ทำไมถึงได้... ฮือ..."
10065-CVGroup_Relationship_Up_4-1 = "นี่เป็นครั้งแรกที่ฉันโดนคนอื่นเฝ้ามองเลยค่ะ...\nเป็นเรื่องที่น่าดีใจขนาดนี้เลยสินะคะ"
10065-CVGroup_Tactic_In_1-1 = "ในนามของเฮียกคิยาโค"
10065-CVGroup_Tactic_In_2-1 = "ในฐานะของรองหัวหน้าชมรมชมรมหยินหยาง ฉันจะทำให้สำเร็จค่ะ"
10065-CVGroup_Tactic_Victory_1-1 = "พอจะช่วยได้สินะคะ?"
10065-CVGroup_Tactic_Victory_2-1 = "ฮู่ว... ค่อยยังชั่วที่ทุกคนปลอดภัยค่ะ"

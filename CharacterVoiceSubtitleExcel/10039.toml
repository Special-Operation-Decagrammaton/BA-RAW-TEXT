[translation]
10039-CVGroup_Battle_Buffed_1-1 = "謝，謝謝……"
10039-CVGroup_Battle_Covered_1-1 = "躲起來了……"
10039-CVGroup_Battle_Defense_1-1 = "難道，連敵人也無視我嗎……？"
10039-CVGroup_Battle_In_1-1 = "（能順利做好嗎……）"
10039-CVGroup_Battle_In_2-1 = "不好意思。只有不介意的人也沒關係，請跟著我吧……"
10039-CVGroup_Battle_Move_1-1 = "位置，變更……"
10039-CVGroup_Battle_Move_2-1 = "援，援護射擊，再麻煩了……"
10039-CVGroup_Battle_Recovery_1-1 = "咦……這個，是我的份嗎？"
10039-CVGroup_Battle_TacticalAction_1-1 = "開，開始移動……"
10039-CVGroup_Battle_Victory_1-1 = "我，待在這裡，也沒關係嗎……？"
10039-CVGroup_Battle_Victory_2-1 = "請，請不用在意我……"
10039-CVGroup_CommonSkill-1 = "進，進行援護……"
10039-CVGroup_ExSkill_1-1 = "果然我，是個一事無成的碎屑啊……"
10039-CVGroup_ExSkill_2-1 = "我是那邊的小石頭……"
10039-CVGroup_ExSkill_3-1 = "要是沒加入SRT就好了……"
10039-CVGroup_ExSkill_Level_1-1 = "我的事情什麼的，請不要放在心上……"
10039-CVGroup_ExSkill_Level_2-1 = "對我來說，這個空間正好適合……"
10039-CVGroup_ExSkill_Level_3-1 = "不好意思，請讓我獨處吧……"
10039-CVGroup_Formation_In_1-1 = "戰，戰鬥是嗎……？"
10039-CVGroup_Formation_In_2-1 = "小心不要妨礙到其他孩子……"
10039-CVGroup_Formation_Select-1 = "啊嗚……"
10039-CVGroup_Growup_1-1 = "這麼好的東西，我可以收下嗎……？"
10039-CVGroup_Growup_2-1 = "對戰術的理解，變得更深了……"
10039-CVGroup_Growup_3-1 = "為了至少不讓SRT的名字蒙羞……我會加油的。"
10039-CVGroup_Growup_4-1 = "得想辦法成長，變得不會拖其他人後腿才行……"
10039-CVGroup_Relationship_Up_1-1 = "老師的指示，真好呢……不會讓人害怕……"
10039-CVGroup_Relationship_Up_2-1 = "老師你……會找到我的對吧？\n無論何時，在什麼地方。"
10039-CVGroup_Relationship_Up_3-1 = "要是連這樣的我，也能幫上老師的忙就好了……"
10039-CVGroup_Relationship_Up_4-1 = "……老師。\n請不要拋下我唷……？"
10039-CVGroup_Tactic_In_1-1 = "我，我是隊長嗎？"
10039-CVGroup_Tactic_In_2-1 = "我，我怎麼會在這裡……"
10039-CVGroup_Tactic_Victory_1-1 = "那個，是我們贏了嗎……？真的……？"
10039-CVGroup_Tactic_Victory_2-1 = "怎麼會，真奇怪……\n我這種人擔任隊長，而且居然還贏了……"

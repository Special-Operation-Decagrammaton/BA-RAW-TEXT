[translation]
10039-CVGroup_Battle_Buffed_1-1 = "ขะ... ขอบคุณค่ะ..."
10039-CVGroup_Battle_Covered_1-1 = "กะ... กำบังเรียบร้อยแล้วค่ะ!"
10039-CVGroup_Battle_Defense_1-1 = "หรือว่าฉันถูกศัตรูเมินกันนะ...?"
10039-CVGroup_Battle_In_1-1 = "(จะทำได้ดีรึเปล่านะ...)"
10039-CVGroup_Battle_In_2-1 = "ขอโทษด้วยค่ะ ฉันอยากให้ทุกคนช่วยตามฉันมานะคะ..."
10039-CVGroup_Battle_Move_1-1 = "เปลี่ยนตำแหน่งค่ะ..."
10039-CVGroup_Battle_Move_2-1 = "เอ่อ ช่วยยิงคุ้มกันด้วยนะคะ..."
10039-CVGroup_Battle_Recovery_1-1 = "เอ... นี่มันหน้าที่ของฉันงั้นเหรอคะ?"
10039-CVGroup_Battle_TacticalAction_1-1 = "จะ... จะไปแล้วนะคะ"
10039-CVGroup_Battle_Victory_1-1 = "ฉันเหมาะสมที่จะมาอยู่ที่นี่จริงเหรอคะ...?"
10039-CVGroup_Battle_Victory_2-1 = "มะ... ไม่ต้อง... สนใจฉันก็ได้ค่ะ..."
10039-CVGroup_CommonSkill-1 = "เอ่อ จะอำพรางตัวแล้วนะคะ..."
10039-CVGroup_ExSkill_1-1 = "คิดแล้วเชียวว่าฉัน... เป็นแค่ขยะที่ทำอะไรไม่ได้เลย..."
10039-CVGroup_ExSkill_2-1 = "ฉันเป็นแค่ก้อนกรวดบนถนน..."
10039-CVGroup_ExSkill_3-1 = "ไม่น่าเข้ามาเรียนที่ SRT เลย..."
10039-CVGroup_ExSkill_Level_1-1 = "ไม่ต้องสนใจคนอย่างฉันหรอกค่ะ..."
10039-CVGroup_ExSkill_Level_2-1 = "เพราะที่แบบนี้เหมาะกับฉันไงล่ะคะ..."
10039-CVGroup_ExSkill_Level_3-1 = "ขอโทษด้วยค่ะ ให้ฉันอยู่คนเดียวเถอะค่ะ..."
10039-CVGroup_Formation_In_1-1 = "ตะ... ต่อสู้งั้นเหรอคะ...?"
10039-CVGroup_Formation_In_2-1 = "ฉันจะไม่ทำให้รบกวนนักเรียนคนอื่นๆ..."
10039-CVGroup_Formation_Select-1 = "ฮือ..."
10039-CVGroup_Growup_1-1 = "ของดีๆ แบบนี้ให้รับไว้ได้เหรอคะ...?"
10039-CVGroup_Growup_2-1 = "รู้สึกเหมือนเข้าใจเรื่องกลยุทธ์ขึ้นมาอีกนิดแล้วละค่ะ"
10039-CVGroup_Growup_3-1 = "อย่างน้อยฉันก็จะพยายาม... ไม่ให้เสียชื่อ SRT ค่ะ"
10039-CVGroup_Growup_4-1 = "ฉันจะเติบโตขึ้นเพื่อไม่ทำให้คนอื่นลำบาก..."
10039-CVGroup_Relationship_Up_1-1 = "การสั่งการของคุณครูดีมากเลยค่ะ... ไม่น่ากลัวด้วย..."
10039-CVGroup_Relationship_Up_2-1 = "คุณครู... จะหาฉันเจอใช่มั้ยคะ? ไม่ว่าเมื่อไหร่..."
10039-CVGroup_Relationship_Up_3-1 = "ถึงฉันจะเป็นแบบนี้... แต่ฉันก็หวังว่าจะทำประโยชน์ให้คุณครูได้ค่ะ..."
10039-CVGroup_Relationship_Up_4-1 = "คุณครู... อย่าลืมฉันนะคะ..."
10039-CVGroup_Tactic_In_1-1 = "หะ... ให้ฉันเป็นผู้นำเหรอคะ?"
10039-CVGroup_Tactic_In_2-1 = "ทะ... ทำไมสถานการณ์ถึง..."
10039-CVGroup_Tactic_Victory_1-1 = "ชะ... ชัยชนะของพวกเราเหรอคะ...? จริงเหรอคะ...?"
10039-CVGroup_Tactic_Victory_2-1 = "คือว่า... มันแปลกเหรอคะ... เด็กอย่างฉันเป็นผู้นำทีม... แล้วชนะงั้นเหรอ... "

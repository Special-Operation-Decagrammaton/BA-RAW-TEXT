[translation]
10039-CVGroup_Battle_Buffed_1-1 = "가, 감사합니다……."
10039-CVGroup_Battle_Covered_1-1 = "엄폐했습니다."
10039-CVGroup_Battle_Defense_1-1 = "적에게도 무시 당하고 있는 걸까……?"
10039-CVGroup_Battle_In_1-1 = "(잘 해낼 수 있을까……)"
10039-CVGroup_Battle_In_2-1 = "죄송합니다. 가능하면 좋겠지만, 저를 따라와 주세요……."
10039-CVGroup_Battle_Move_1-1 = "포지션, 변경합니다……."
10039-CVGroup_Battle_Move_2-1 = "어, 엄호 사격 부탁드립니다……."
10039-CVGroup_Battle_Recovery_1-1 = "에…… 이거, 제 몫인가요?"
10039-CVGroup_Battle_TacticalAction_1-1 = "이, 이동합니다."
10039-CVGroup_Battle_Victory_1-1 = "제가 이 자리에 낄 자격이 있을까요……?"
10039-CVGroup_Battle_Victory_2-1 = "저, 저는…… 신경 쓰지 마시고……."
10039-CVGroup_CommonSkill-1 = "어, 엄호하겠습니다……."
10039-CVGroup_ExSkill_1-1 = "역시 난, 아무것도 못하는 쓰레기야……"
10039-CVGroup_ExSkill_2-1 = "나는 길가의 돌멩이……."
10039-CVGroup_ExSkill_3-1 = "SRT 학원에 들어오지 말 걸 그랬어……"
10039-CVGroup_ExSkill_Level_1-1 = "……저 같은 건 신경쓰지 말아주세요."
10039-CVGroup_ExSkill_Level_2-1 = "……제게는 이 공간이 딱 좋으니까."
10039-CVGroup_ExSkill_Level_3-1 = "……죄송해요. 혼자 있게 해주세요."
10039-CVGroup_Formation_In_1-1 = "저, 전투인가요……?"
10039-CVGroup_Formation_In_2-1 = "다른 학생들에게 방해가, 되지 않도록……."
10039-CVGroup_Formation_Select-1 = "아우우……"
10039-CVGroup_Growup_1-1 = "이런 좋은 물건을, 제가 받아도……?"
10039-CVGroup_Growup_2-1 = "전술에 대해 조금 더 이해한 느낌이 들어요."
10039-CVGroup_Growup_3-1 = "적어도 SRT의 이름에 부끄럽지 않도록…… 노력할게요."
10039-CVGroup_Growup_4-1 = "이렇게라도 성장해서 다른 사람들의 발목을 잡지 않아야……."
10039-CVGroup_Relationship_Up_1-1 = "선생님의 지시는 좋아요…… 무섭지 않으니까……."
10039-CVGroup_Relationship_Up_2-1 = "선생님은…… 저를 찾아주실 거죠? 언제나, 어느 때나."
10039-CVGroup_Relationship_Up_3-1 = "이런 저라도…… 선생님께는 쓸모가 있었으면 좋겠는데요……."
10039-CVGroup_Relationship_Up_4-1 = "……선생님, 저를 잃어버리지 말아주세요……."
10039-CVGroup_Tactic_In_1-1 = "제, 제, 제가 리더인가요?"
10039-CVGroup_Tactic_In_2-1 = "어, 어째서 이런 상황이……"
10039-CVGroup_Tactic_Victory_1-1 = "저, 저희들의 승리, 인가요……? 정말로요……?"
10039-CVGroup_Tactic_Victory_2-1 = "그런, 이상해요……. 저 같은 애가 리더인데, 승리했다니……."

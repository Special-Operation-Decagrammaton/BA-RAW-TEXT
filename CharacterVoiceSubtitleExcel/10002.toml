[translation]
10002-CVGroup_Battle_Buffed_1-1 = "哎呀，非常感謝。"
10002-CVGroup_Battle_Covered_1-1 = "失禮了。"
10002-CVGroup_Battle_Defense_1-1 = "呵呵，沒用的。"
10002-CVGroup_Battle_In_1-1 = "各位，敬祝武運昌隆。"
10002-CVGroup_Battle_In_2-1 = "哎呀，出現了呢。\n就由我來盛大的迎接吧。"
10002-CVGroup_Battle_Move_1-1 = "要上囉。"
10002-CVGroup_Battle_Move_2-1 = "開始前進。"
10002-CVGroup_Battle_Recovery_1-1 = "不敢當……！"
10002-CVGroup_Battle_TacticalAction_1-1 = "哼～"
10002-CVGroup_Battle_Victory_1-1 = "（嚼嚼）唔嗯～～～這股味道，真讓人難以招架！"
10002-CVGroup_Battle_Victory_2-1 = "（嚼嚼）哦哦哦～勝利後的鯛魚燒真是別具風味呢！"
10002-CVGroup_CommonSkill-1 = "是那邊嗎？"
10002-CVGroup_ExSkill_1-1 = "唔呵呵，我要上了！"
10002-CVGroup_ExSkill_2-1 = "優雅地登場吧？"
10002-CVGroup_ExSkill_3-1 = "來，準備好了嗎？"
10002-CVGroup_ExSkill_Level_1-1 = "覺悟都做好了嗎？"
10002-CVGroup_ExSkill_Level_2-1 = "這可是史高維爾值1000萬級的激辣！"
10002-CVGroup_ExSkill_Level_3-1 = "憑藉貫穿一切的優雅！"
10002-CVGroup_Formation_In_1-1 = "輪到我出場了呢。"
10002-CVGroup_Formation_In_2-1 = "儘管放心，請交給我吧。"
10002-CVGroup_Formation_Select-1 = "唔呵呵。"
10002-CVGroup_Growup_1-1 = "哎呀，這是嶄新的味道呢。"
10002-CVGroup_Growup_2-1 = "哎呀，居然為我做到這種程度……"
10002-CVGroup_Growup_3-1 = "偶爾這樣也不錯呢。\n老師，我的成長，還請您好好見證哦。"
10002-CVGroup_Growup_4-1 = "唔呵呵，感激不盡。"
10002-CVGroup_Relationship_Up_1-1 = "還想再多待在一起。"
10002-CVGroup_Relationship_Up_2-1 = "收到了美味的東西呢。\n不介意的話，還請跟我一起享用。"
10002-CVGroup_Relationship_Up_3-1 = "如果和老師在一起，我夢想中至高的味道……\n說不定就能找到了呢。"
10002-CVGroup_Relationship_Up_4-1 = "與老師的用餐，總是十分特別。\n而且與味道無關。"
10002-CVGroup_Tactic_In_1-1 = "試著稍微胡鬧一下吧？"
10002-CVGroup_Tactic_In_2-1 = "由我來擔任你的對手。"
10002-CVGroup_Tactic_Victory_1-1 = "唔呵呵……我打算舉辦一場慶祝勝利的派對，您願意共襄盛舉嗎？"
10002-CVGroup_Tactic_Victory_2-1 = "哎呀，勝利了呢。唔呵呵。"

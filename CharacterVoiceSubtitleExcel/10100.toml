[translation]
10100-CVGroup_Battle_Buffed_1-1 = "謝謝。"
10100-CVGroup_Battle_Defense_1-1 = "好癢。"
10100-CVGroup_Battle_In_1-1 = "嗯，由我打頭陣。"
10100-CVGroup_Battle_In_2-1 = "嗯，跟上來吧。"
10100-CVGroup_Battle_Move_1-1 = "接下來該往哪裡？"
10100-CVGroup_Battle_Move_2-1 = "自行車，要是有帶來就好了……"
10100-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10100-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10100-CVGroup_Battle_Victory_1-1 = "嗯，已經可以安心了。"
10100-CVGroup_Battle_Victory_2-1 = "辛苦你了。"
10100-CVGroup_CommonSkill-1 = "到了該拿出它的時候了呢。"
10100-CVGroup_ExSkill_1-1 = "這是……謝謝你。"
10100-CVGroup_ExSkill_2-1 = "老師？\n……嗯，我知道了。"
10100-CVGroup_ExSkill_3-1 = "要給我……？\n沒問題，交給我吧。"
10100-CVGroup_ExSkill_Level_1-1 = "嗯，很順手。"
10100-CVGroup_ExSkill_Level_2-1 = "目標就在前方。"
10100-CVGroup_ExSkill_Level_3-1 = "火力支援，開始。"
10100-CVGroup_Formation_In_1-1 = "準備完畢。我來幫忙。"
10100-CVGroup_Formation_In_2-1 = "嗯，參戰。"
10100-CVGroup_Formation_Select-1 = "怎麼了嗎……？"
10100-CVGroup_Growup_1-1 = "要給我嗎？我會珍惜的。"
10100-CVGroup_Growup_2-1 = "嗯，好像成長了……\n我指的是身高唷。"
10100-CVGroup_Growup_3-1 = "這是……\n嗯，確實收到了。我會努力派上用場。"
10100-CVGroup_Growup_4-1 = "謝謝你，老師。\n今後也……請多指教。"
10100-CVGroup_Relationship_Up_1-1 = "老師，把肩膀……借給我。"
10100-CVGroup_Relationship_Up_2-1 = "能協助老師，真是太好了。"
10100-CVGroup_Relationship_Up_3-1 = "那個……雖然不知道你聽起來感覺如何，\n就是……跟老師在一起的時候，總覺得很放心。"
10100-CVGroup_Relationship_Up_4-1 = "我不知道的事還有非常多……\n嗯，老師多教教我吧。"
10100-CVGroup_Tactic_In_1-1 = "發現敵人，請下指示。"
10100-CVGroup_Tactic_In_2-1 = "可以開槍嗎？"
10100-CVGroup_Tactic_Victory_1-1 = "嗯，如我所料。"
10100-CVGroup_Tactic_Victory_2-1 = "畢竟有老師在。\n這是當然的結果。"

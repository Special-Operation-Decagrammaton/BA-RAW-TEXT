[translation]
20038-CVGroup_CommonSkill-1 = "The beautiful fragrance of flowers and the warm breeze... The vibes are good."
20038-CVGroup_ExSkill_1-1 = "A new Chinese restaurant opened up!"
20038-CVGroup_ExSkill_2-1 = "Great Leader Cherino swears by the pudding-flavored dumplings. You should try them!"
20038-CVGroup_ExSkill_3-1 = "Experience the flavor of the great revolution!"
20038-CVGroup_ExSkill_Level_1-1 = "Please wait your turn."
20038-CVGroup_ExSkill_Level_2-1 = "Red Winter gives equal service to everyone."
20038-CVGroup_ExSkill_Level_3-1 = "How about I pick the lunch spot today?"
20038-CVGroup_Formation_In_1-1 = "Leave combat to me."
20038-CVGroup_Formation_In_2-1 = "I'll give you the Red Winter experience."
20038-CVGroup_Growup_1-1 = "I'll work hard for Red Winter Academy and for President Cherino."
20038-CVGroup_Growup_2-1 = "Thank you for your good advice."
20038-CVGroup_Growup_3-1 = "If we keep growing like this...maybe the Red Winter Academy can win you over, Sensei. Heehee."

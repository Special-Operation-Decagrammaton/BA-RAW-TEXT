[translation]
20038-CVGroup_CommonSkill-1 = "กลิ่นหอมของดอกไม้ที่งดงามและสายลมอันอบอุ่น...\nบรรยากาศดีจังเลยนะคะ"
20038-CVGroup_ExSkill_1-1 = "มีร้านอาหารจีนเปิดใหม่ใกล้ๆ ด้วยค่ะ!"
20038-CVGroup_ExSkill_2-1 = "ฉันขอแนะนำให้ลองเมนูเกี๊ยวรสพุดดิ้งที่ท่านเลขาธิการเชริโน่การันตีค่ะ!"
20038-CVGroup_ExSkill_3-1 = "ลองชิมรสชาติของการปฏิวัติครั้งใหญ่ดูนะคะ!"
20038-CVGroup_ExSkill_Level_1-1 = "กรุณารักษาลำดับด้วยค่ะ"
20038-CVGroup_ExSkill_Level_2-1 = "การบริการของเรดวินเทอร์จะบริการให้อย่างเท่าเทียมกันทุกคนค่ะ"
20038-CVGroup_ExSkill_Level_3-1 = "วันนี้เราไปทานมื้อเที่ยงที่ร้านที่ฉันแนะนำดีมั้ยคะ?"
20038-CVGroup_Formation_In_1-1 = "เรื่องโน้มน้าวใจให้เป็นหน้าที่ฉันเองค่ะ"
20038-CVGroup_Formation_In_2-1 = "ฉันจะแสดงให้เห็นถึงพลังแท้จริงของเรดวินเทอร์เองค่ะ"
20038-CVGroup_Growup_1-1 = "ฉันพัฒนาขึ้นเพื่อท่านประธานเชริโน่และเรดวินเทอร์ค่ะ"
20038-CVGroup_Growup_2-1 = "ขอบคุณสำหรับคำแนะนำที่ดีค่ะ"
20038-CVGroup_Growup_3-1 = "พอได้พัฒนาตัวเองขึ้นแบบนี้... อีกไม่นานฉันอาจจะ\nดึงตัวคุณครูมาอยู่ที่เรดวินเทอร์ได้ก็ได้นะคะ... ฮุฮุ"
20038-CVGroup_Growup_4-1 = "ความสามารถในการครอบงำจิตใจผู้คนของมังกรดำนี่ไม่ใช่เล่นๆ เลยนะคะ\nฮุฮุ... คงต้องจับตาดูต่อไปแล้วละค่ะ"
20038-CVGroup_Relationship_Up_1-1 = "รู้สึกถึงสายตาของใครบางคนด้วยค่ะ...\nฉีกตะเข็บกระโปรงให้สูงขึ้นอีกดีมั้ยคะ?"
20038-CVGroup_Relationship_Up_2-1 = "การยั่วยุและคำโกหกเล็กๆ น้อยๆ\nเริ่มจากสิ่งที่อยู่ใกล้ตัว\nค่ะ ฉันชอบคุณครูมาตั้งนานแล้วละค่ะ"
20038-CVGroup_Relationship_Up_3-1 = "วันนี้อากาศร้อนอบอ้าวเป็นพิเศษเลยนะคะ...\nเพราะอุณหภูมิสูงขึ้นรึเปล่านะ?"
20038-CVGroup_Relationship_Up_4-1 = "คุณครูเป็นคนที่... ไม่ต้องพูดอะไรเยอะก็ดึงดูดคนเข้าหาได้สินะคะ"

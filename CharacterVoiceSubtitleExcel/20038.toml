[translation]
20038-CVGroup_CommonSkill-1 = "아름다운 꽃향기와 따스한 바람… 정취가 있네요."
20038-CVGroup_ExSkill_1-1 = "새로운 중화 요릿집이 문을 열었습니다!"
20038-CVGroup_ExSkill_2-1 = "체리노 서기장님이 보증하신 푸딩 맛 만두를 드셔보시길!"
20038-CVGroup_ExSkill_3-1 = "위대한 혁명의 맛을 느껴보세요!"
20038-CVGroup_ExSkill_Level_1-1 = "차례를 지켜주세요."
20038-CVGroup_ExSkill_Level_2-1 = "붉은겨울의 서비스는 모두에게 평등하답니다."
20038-CVGroup_ExSkill_Level_3-1 = "오늘 점심은 제가 추천하는 가게에서, 어떠신가요?"
20038-CVGroup_Formation_In_1-1 = "선동이라면, 맡겨주세요."
20038-CVGroup_Formation_In_2-1 = "붉은겨울의 진가를 느끼게 해드릴게요."
20038-CVGroup_Formation_Select-1 = "어떠세요, 선생님? 시원하신가요?"
20038-CVGroup_Growup_1-1 = "붉은겨울 학원과 체리노 회장님을 위해 정진하겠습니다."
20038-CVGroup_Growup_2-1 = "멋진 조언 감사합니다."
20038-CVGroup_Growup_3-1 = "이렇게 성장하다 보면…… 머지않아 선생님을 붉은겨울 학원에 포섭할 수 있을지도… 후후."
20038-CVGroup_Growup_4-1 = "현룡문의 인심 장악 능력도 제법이네요. …후후, 눈여겨봐야겠어요."
20038-CVGroup_Relationship_Up_1-1 = "뭔가, 시선이 느껴지네요…… ……슬릿을 더 깊게 뜯어 볼까요?"
20038-CVGroup_Relationship_Up_2-1 = "사소한 거짓말과 선동은 가까운 것부터.\n네, 저는 줄곧 선생님을 좋아하고 있었답니다."
20038-CVGroup_Relationship_Up_3-1 = "오늘따라 유난히 덥네요… 기온이 높아서일까요?"
20038-CVGroup_Relationship_Up_4-1 = "선생님은… 말하지 않고도 사람을 끌어당길 수 있는 분이시군요."

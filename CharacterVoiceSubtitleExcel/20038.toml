[translation]
20038-CVGroup_CommonSkill-1 = "美麗花朵的香氣與暖風……真有情調呢。"
20038-CVGroup_ExSkill_1-1 = "中華料理店，新裝開幕！"
20038-CVGroup_ExSkill_2-1 = "潔莉諾書記長掛保證的布丁包子，請用！"
20038-CVGroup_ExSkill_3-1 = "偉大革命的滋味，請好好品嘗！"
20038-CVGroup_ExSkill_Level_1-1 = "請遵守順序哦。"
20038-CVGroup_ExSkill_Level_2-1 = "赤冬的服務對所有人一視同仁。"
20038-CVGroup_ExSkill_Level_3-1 = "午餐，要不要來我推薦的店裡享用呢？"
20038-CVGroup_Formation_In_1-1 = "請包在我身上。"
20038-CVGroup_Formation_In_2-1 = "敬請見識赤冬的精隨。"
20038-CVGroup_Growup_1-1 = "為了赤冬聯邦學園與潔莉諾會長，我會持續精進。"
20038-CVGroup_Growup_2-1 = "非常感謝您出色的建議。"
20038-CVGroup_Growup_3-1 = "繼續這麼成長下去的話……\n有朝一日將老師拉攏到赤冬學園也……呵呵。"
20038-CVGroup_Growup_4-1 = "玄龍門很擅於掌握人心呢。\n……呵呵，看來得多加留意。"
20038-CVGroup_Relationship_Up_1-1 = "總覺得能感受到視線呢……？\n……要把開衩再開得高一點嗎？"
20038-CVGroup_Relationship_Up_2-1 = "微小的謊言與煽動就該由內部散播。\n是的……我從以前開始就一直就仰慕著老師。"
20038-CVGroup_Relationship_Up_3-1 = "今天總覺得特別熱呢……\n是因為氣溫很高嗎？"
20038-CVGroup_Relationship_Up_4-1 = "老師……似乎無須言語也能吸引人呢。"

20026-CVGroup_Relationship_Up_4-1 = "การผูกขาดเป็นพฤติกรรมแย่ๆ ของชนชั้นกลาง...\nแต่ถ้าอีกฝ่ายเป็นครู... ฉันก็อาจจะอยากโลภนิดหน่อยนะ"

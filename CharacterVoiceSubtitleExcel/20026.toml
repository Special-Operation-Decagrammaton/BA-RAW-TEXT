[translation]
20026-CVGroup_CommonSkill-1 = "大家，注意頭頂！"
20026-CVGroup_ExSkill_1-1 = "不能容許低品質的布丁！"
20026-CVGroup_ExSkill_2-1 = "讓赤冬聯邦學園的事務局變革吧！"
20026-CVGroup_ExSkill_3-1 = "開始罷工！"
20026-CVGroup_ExSkill_Level_1-1 = "爭取勞動者的權利！\n要求進一步的保障！"
20026-CVGroup_ExSkill_Level_2-1 = "所有奇普托斯的勞動者啊，團結吧！"
20026-CVGroup_ExSkill_Level_3-1 = "團結一致！無所畏懼！"
20026-CVGroup_Formation_In_1-1 = "呼呣，今天的現場在哪裡呢？"
20026-CVGroup_Formation_In_2-1 = "盡己所能，證明勞動的價值吧。"
20026-CVGroup_Growup_1-1 = "作為努力與勞動的代價，有成長是理所當然的。"
20026-CVGroup_Growup_2-1 = "老師的指導就好在容易理解。感謝你。"
20026-CVGroup_Growup_3-1 = "為了讓革命成功，啟蒙是必不可少的。"
20026-CVGroup_Growup_4-1 = "這麼一來下次的作業，似乎也能安全地進行了。"
20026-CVGroup_Relationship_Up_1-1 = "託老師的福，我們的社團變得更加團結一致了。"
20026-CVGroup_Relationship_Up_2-1 = "如果是老師的話，隨時都能把背後託付給你。"
20026-CVGroup_Relationship_Up_3-1 = "這種心情，還真是……充滿革命性啊！"
20026-CVGroup_Relationship_Up_4-1 = "獨佔這種事，雖然是布爾喬亞的惡質行為……\n但對象是老師的話……好像會湧現一些慾望呢。"

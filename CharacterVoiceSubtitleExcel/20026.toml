[translation]
20026-CVGroup_CommonSkill-1 = "모두, 머리 위를 조심해!"
20026-CVGroup_ExSkill_1-1 = "저질 푸딩은 용납할 수 없어!"
20026-CVGroup_ExSkill_2-1 = "붉은겨울 연방학원 사무국은 각성하라!"
20026-CVGroup_ExSkill_3-1 = "파업을 개시한다!"
20026-CVGroup_ExSkill_Level_1-1 = "노동자의 권리를! 더 많은 보장을!"
20026-CVGroup_ExSkill_Level_2-1 = "전 키보토스의 노동자여, 단결하라!"
20026-CVGroup_ExSkill_Level_3-1 = "뜻을 하나로 하면 두려울 것은 없다!"
20026-CVGroup_Formation_In_1-1 = "흐음, 오늘 일감은 뭐지?"
20026-CVGroup_Formation_In_2-1 = "최선을 다해, 노동의 가치를 증명하도록 하지."
20026-CVGroup_Formation_Select-1 = "더 높은 곳으로! 노동자의 권리와 함께!"
20026-CVGroup_Growup_1-1 = "노력과 노동의 대가야. 성장은 당연하지."
20026-CVGroup_Growup_2-1 = "선생의 가르침은 이해하기 쉬워서 좋아. 고마워."
20026-CVGroup_Growup_3-1 = "혁명을 성공시키기 위해서라도, 계몽은 필수적이지."
20026-CVGroup_Growup_4-1 = "다음 작업도, 안전하게 진행할 수 있겠어."
20026-CVGroup_Relationship_Up_1-1 = "선생 덕분에, 우리의 대오는 더욱 굳건해졌어."
20026-CVGroup_Relationship_Up_2-1 = "선생이라면 언제든 믿고 내 뒤를 맡길 수 있어."
20026-CVGroup_Relationship_Up_3-1 = "이 기분은 뭐랄까…… 혁명적이네!"
20026-CVGroup_Relationship_Up_4-1 = "독점은 부르주아들이나 하는 질 나쁜 행동이지만……\n선생이 상대라면…… 조금은 욕심이 생길지도."

[translation]
20011-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวแล้ว!"
20011-CVGroup_Battle_Defense_1-1 = "ไม่ได้ผลหรอก!"
20011-CVGroup_CommonSkill-1 = "หลบไป หลบไป!"
20011-CVGroup_ExSkill_1-1 = "ฮืม~ ฮืมม~ ฮืม~♪\nอึก อ๊าย! อะไรเนี่ย!"
20011-CVGroup_ExSkill_2-1 = "อืม แค่นี้ก็น่าจะพอมั้ย?\nอ๊ะ... อ๊าย!?"
20011-CVGroup_ExSkill_3-1 = "อืม รู้สึกใช้ได้เลยแฮะ...\nอึก อ๊าย ทำไมเนี่ย!?"
20011-CVGroup_ExSkill_Level_1-1 = "ไม่ยกโทษให้แน่~!"
20011-CVGroup_ExSkill_Level_2-1 = "คิดว่าจะปล่อยผ่านไปเฉยๆ เหรอ?!"
20011-CVGroup_ExSkill_Level_3-1 = "ย้ากกก!"
20011-CVGroup_Formation_In_1-1 = "อยากให้ฉันช่วยเหรอ...? ช่วยไม่ได้สินะ"
20011-CVGroup_Formation_In_2-1 = "ถึงจะทำงานพาร์ทไทม์อยู่... แต่ฉันจะช่วยหน่อยก็แล้วกัน"
20011-CVGroup_Growup_1-1 = "ฉะ... ฉันก็ไม่ได้ดีใจเป็นพิเศษหรอก!\nไม่สิ ก็มีบ้างนิดนึง...."
20011-CVGroup_Growup_2-1 = "อันนี้คงจะเป็นประโยชน์นิดหนึ่ง... มะ... ไม่สิ ไม่มีอะไรหรอก!"
20011-CVGroup_Growup_3-1 = "(อยากแข็งแกร่งกว่านี้อีกหน่อย แล้วช่วยเหลือคุณครูกับทุกคนจัง)"
20011-CVGroup_Growup_4-1 = "ต่อไปฉันก็จะพยายามอีก คอยเฝ้าดูฉันด้วยนะ คุณครู!"
20011-CVGroup_Relationship_Up_1-1 = "เหมือนว่า... ระยะห่างกับคุณครูมัน..."
20011-CVGroup_Relationship_Up_2-1 = "(อะ... อะไรเนี่ย! ใจเต้นแรงแล้วนะ...!\nทำไมล่ะ? ทะ... ทำยังไงดี!?)"
20011-CVGroup_Relationship_Up_3-1 = "ทำไมถึงใจดีกับฉันแบบนี้ตลอดเลยล่ะ?"
20011-CVGroup_Relationship_Up_4-1 = "เพราะคุณครูคอยเฝ้าดูฉัน ฉันก็เลยมีแรงขึ้นค่ะ\nเพราะงั้น ชะ... ช่วยอยู่ข้างๆ ฉันตลอดนะ คุณครู"

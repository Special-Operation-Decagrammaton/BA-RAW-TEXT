20011-CVGroup_Relationship_Up_1-1 = "總覺得，跟老師的距離，好像……"
20011-CVGroup_Relationship_Up_2-1 = "（這，這是怎麼回事！心跳得好快……！？為什麼，怎麼會！？）"
20011-CVGroup_Relationship_Up_3-1 = "為什麼總是對我這麼溫柔呢？"
20011-CVGroup_Relationship_Up_4-1 = "因為有老師守望著我，我才能繼續加油。\n所以那個……要一直待在我身邊哦，老師。"

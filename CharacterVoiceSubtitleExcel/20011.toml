20011-CVGroup_Relationship_Up_3-1 = "왜 항상 그렇게 다정하게 대해주는 거야?"
20011-CVGroup_Relationship_Up_4-1 = "선생님이 지켜보고 있는 만큼, 나는 더 힘낼 수 있어.\n그러니까, 그… 계속 곁에 있어줘. 선생님."

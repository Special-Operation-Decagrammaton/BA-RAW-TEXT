[translation]
20011-CVGroup_Battle_Covered_1-1 = "躲起來了！"
20011-CVGroup_Battle_Defense_1-1 = "沒用的！"
20011-CVGroup_CommonSkill-1 = "閃開閃開！"
20011-CVGroup_ExSkill_1-1 = "哼哼～♪\n呃，啊！怎樣啦！"
20011-CVGroup_ExSkill_2-1 = "嗯，大概就這樣吧？\n呃，啊啊！？"
20011-CVGroup_ExSkill_3-1 = "嗯，感覺不錯……\n呃，啊啊！怎麼會！？"
20011-CVGroup_ExSkill_Level_1-1 = "不可饒恕！"
20011-CVGroup_ExSkill_Level_2-1 = "不會輕易放過你們的！"
20011-CVGroup_ExSkill_Level_3-1 = "可惡！"
20011-CVGroup_Formation_In_1-1 = "……需要我幫忙嗎？\n真拿你沒辦法～"
20011-CVGroup_Formation_In_2-1 = "我還在打工耶……\n算了，就稍微幫你一下吧。"
20011-CVGroup_Growup_1-1 = "我，我才沒有高興……！\n好吧，是有一點啦……"
20011-CVGroup_Growup_2-1 = "這樣就能幫上更多……沒，沒什麼！"
20011-CVGroup_Growup_3-1 = "（真想變得更強，幫老師和大家更多的忙……）"

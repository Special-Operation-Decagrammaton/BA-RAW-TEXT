[translation]
16004-CVGroup_Battle_Buffed_1-1 = "Nice한 지원입니다!"
16004-CVGroup_Battle_Defense_1-1 = "간지러운 공격이군요!"
16004-CVGroup_Battle_In_1-1 = "가볼까요? 함께!"
16004-CVGroup_Battle_In_2-1 = "시작되었군요. 가죠!"
16004-CVGroup_Battle_Move_1-1 = "다음 상대는 어디에 있습니까?"
16004-CVGroup_Battle_Move_2-1 = "멈추지 않고… 전진입니다!"
16004-CVGroup_Battle_Recovery_1-1 = "이 은혜! 전신전력으로 보답하겠습니다!"
16004-CVGroup_Battle_TacticalAction_1-1 = "이동합니다!"
16004-CVGroup_Battle_Victory_1-1 = "야호! 설사 하늘이 용서해도! 피나가 용서 못 합니다!"
16004-CVGroup_Battle_Victory_2-1 = "와아! 이겼어요! 정말로, 최고의 전투였습니다!"
16004-CVGroup_CommonSkill-1 = "우웃! 정신통일 합니다!"
16004-CVGroup_ExSkill_1-1 = "저, 진심으로 갑니다!"
16004-CVGroup_ExSkill_2-1 = "각오하시는 게 좋을 겁니다!"
16004-CVGroup_ExSkill_3-1 = "저의 총이 뜨겁게 불타오르고 있습니다."
16004-CVGroup_ExSkill_Level_1-1 = "경고는 했습니다!"
16004-CVGroup_ExSkill_Level_2-1 = "불꽃 같은 난사!"
16004-CVGroup_ExSkill_Level_3-1 = "마구마구 쏘기!"
16004-CVGroup_Formation_In_1-1 = "네! 기다렸습니다!"
16004-CVGroup_Formation_In_2-1 = "후훗. 알겠습니다. 갑니다!"
16004-CVGroup_Formation_Select-1 = "헤에~ 제가 필요하신 거죠? 그렇죠?"
16004-CVGroup_Growup_1-1 = "선생님! 오늘도 뜨겁게 불타오르는 겁니다!"
16004-CVGroup_Growup_2-1 = "가슴 안쪽에서 뜨겁게 타오르는 무언가…\n이것은, 용기일까요?\n그게 아니라면……."
16004-CVGroup_Growup_3-1 = "선생님~ 아니아니~ 스승님이라 불러도 될까요?!"
16004-CVGroup_Growup_4-1 = "오늘의 저는, 어제의 저보다 한 단계 더 진화했습니다!"
16004-CVGroup_Relationship_Up_1-1 = "백귀야행의 문화는 재미있습니다. 아름답고, 신비하고, 두근거립니다!"
16004-CVGroup_Relationship_Up_2-1 = "선생님! 앞으로도 많은 지도와 편달을 부탁드려요!"
16004-CVGroup_Relationship_Up_3-1 = "선생님, 당신을 만나 행복합니다. 어제도, 오늘도, 그리고 내일도."
16004-CVGroup_Relationship_Up_4-1 = "이곳에 와서 기쁩니다.\n백귀야행의 문화와, 친구들과\n그리고……. 선생님을 만날 수 있었으니까요."
16004-CVGroup_Tactic_In_1-1 = "선생님! 마구마구 지시해주세요!"
16004-CVGroup_Tactic_In_2-1 = "자, 정정당당하게, 승부!"
16004-CVGroup_Tactic_Victory_1-1 = "최고의 판단이었습니다!"
16004-CVGroup_Tactic_Victory_2-1 = "역시 선생님이에요!"

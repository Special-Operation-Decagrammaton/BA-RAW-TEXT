[translation]
16004-CVGroup_Battle_Buffed_1-1 = "是個Nice的支援！"
16004-CVGroup_Battle_Defense_1-1 = "真是搔癢般的攻擊呢！"
16004-CVGroup_Battle_In_1-1 = "要上了嗎？一起！"
16004-CVGroup_Battle_In_2-1 = "開始了呢。出發吧！"
16004-CVGroup_Battle_Move_1-1 = "下一個對手在哪裡呢？"
16004-CVGroup_Battle_Move_2-1 = "不斷前進，的說！"
16004-CVGroup_Battle_Recovery_1-1 = "這份恩情！我會以自己的身心靈來報答。"
16004-CVGroup_Battle_TacticalAction_1-1 = "進行移動！"
16004-CVGroup_Battle_Victory_1-1 = "唷齁！即便上天允許！菲娜也不允許！"
16004-CVGroup_Battle_Victory_2-1 = "哇哦！贏了！\n真的是場最棒的戰鬥！"
16004-CVGroup_CommonSkill-1 = "呼！我會集中精神！"
16004-CVGroup_ExSkill_1-1 = "我，會拿出真本事！"
16004-CVGroup_ExSkill_2-1 = "最好做好覺悟唷！"
16004-CVGroup_ExSkill_3-1 = "我的槍，正火熱地燃燒。"
16004-CVGroup_ExSkill_Level_1-1 = "已經警告過了唷！"
16004-CVGroup_ExSkill_Level_2-1 = "如火焰般亂射！"
16004-CVGroup_ExSkill_Level_3-1 = "瘋狂射擊！"
16004-CVGroup_Formation_In_1-1 = "是！我等很久了！"
16004-CVGroup_Formation_In_2-1 = "呵呵，我知道了。出發！"
16004-CVGroup_Formation_Select-1 = "呵呵，需要我對吧？沒錯吧？"
16004-CVGroup_Growup_1-1 = "老師！今天也要火熱地燃燒唷！"
16004-CVGroup_Growup_2-1 = "從胸口內側猛烈延燒的某種東西……這是勇氣嗎？\n如果不是的話……"
16004-CVGroup_Growup_3-1 = "老師……不，能稱您為師父嗎！？"
16004-CVGroup_Growup_4-1 = "今天的我，跟昨天的我相比更進化了！"
16004-CVGroup_Relationship_Up_1-1 = "百鬼夜行的文化很有趣。\n既美麗又神祕，很讓人心動。"
16004-CVGroup_Relationship_Up_2-1 = "老師！往後也請多多指導與鞭策！"
16004-CVGroup_Relationship_Up_3-1 = "老師，跟與您相會非常幸福。\n無論是昨天、今天，就連明天也是。"
16004-CVGroup_Relationship_Up_4-1 = "很高興能來到這裡。\n因為與百鬼夜行的文化、朋友，以及……老師相會了。"
16004-CVGroup_Tactic_In_1-1 = "老師！請儘管下指示吧！"
16004-CVGroup_Tactic_In_2-1 = "來吧，光明正大地，決一勝負！"
16004-CVGroup_Tactic_Victory_1-1 = "是最佳的判斷！"
16004-CVGroup_Tactic_Victory_2-1 = "真不愧是老師，的說！"

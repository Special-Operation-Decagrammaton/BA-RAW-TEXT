[translation]
16004-CVGroup_Battle_Buffed_1-1 = "เป็นการสนับสนุนที่ Nice มากค่ะ!"
16004-CVGroup_Battle_Defense_1-1 = "เป็นการโจมตีที่จั๊กจี้จังเลยนะคะ!"
16004-CVGroup_Battle_In_1-1 = "ไปกันเลยมั้ยคะ? ไปด้วยกันเลย!"
16004-CVGroup_Battle_In_2-1 = "เริ่มขึ้นแล้วสินะคะ ไปกันเถอะค่ะ!"
16004-CVGroup_Battle_Move_1-1 = "คู่ต่อสู้ต่อไปอยู่ไหนคะ?"
16004-CVGroup_Battle_Move_2-1 = "ไม่หยุดพัก... แล้วไปข้างหน้าค่ะ!"
16004-CVGroup_Battle_Recovery_1-1 = "บุญคุณนี้! ฉันจะตอบแทนด้วยพลังทั้งหมดที่มีค่ะ!"
16004-CVGroup_Battle_TacticalAction_1-1 = "ไปกันเลยค่ะ!"
16004-CVGroup_Battle_Victory_1-1 = "ยะฮู้ว!\nแม้สวรรค์จะให้อภัย!\nแต่พีน่าไม่ให้อภัยค่ะ!"
16004-CVGroup_Battle_Victory_2-1 = "ว้าว! ชนะแล้วค่ะ! เป็นการต่อสู้ที่ยอดเยี่ยมจริงๆ ค่ะ!"
16004-CVGroup_CommonSkill-1 = "อึก! ตั้งสมาธิไว้นะคะ!"
16004-CVGroup_ExSkill_1-1 = "ฉัน... จริงจังแล้วนะคะ!"
16004-CVGroup_ExSkill_2-1 = "เตรียมตัวไว้ให้ดีนะคะ!"
16004-CVGroup_ExSkill_3-1 = "ปืนของฉันกำลังร้อนผ่าวค่ะ"
16004-CVGroup_ExSkill_Level_1-1 = "ฉันเตือนแล้วนะคะ!"
16004-CVGroup_ExSkill_Level_2-1 = "กราดยิงดั่งดอกไม้ไฟ!"
16004-CVGroup_ExSkill_Level_3-1 = "ยิงให้สุดๆ เลยค่ะ!"
16004-CVGroup_Formation_In_1-1 = "ค่ะ! ฉันรออยู่เลยค่ะ!"
16004-CVGroup_Formation_In_2-1 = "ฮุฮุ เข้าใจแล้วค่ะ ไปละนะ!"
16004-CVGroup_Formation_Select-1 = "ฮุฮุ~ ต้องการฉันใช่มั้ยคะ? ใช่มั้ยล่ะคะ?"
16004-CVGroup_Growup_1-1 = "คุณครู! วันนี้ฉันก็จะเผาให้ร้อนแรงเลยค่ะ!"
16004-CVGroup_Growup_2-1 = "มีบางอย่างร้อนผ่าวอยู่ในใจฉัน...\nนี่คือ... ความกล้าหาญหรือเปล่าคะ?\nถ้าไม่ใช่ละก็..."
16004-CVGroup_Growup_3-1 = "คุณครู~ แบบว่า~ ขอฉันเรียกว่าท่านอาจารย์ได้มั้ยคะ?!"
16004-CVGroup_Growup_4-1 = "ฉันในวันนี้ พัฒนามากกว่าฉันในเมื่อวานไปอีกขั้นแล้วค่ะ!"
16004-CVGroup_Relationship_Up_1-1 = "ฉันสนุกกับวัฒนธรรมของเฮียกคิยาโคค่ะ!\nมันทั้งสวยงาม ลึกลับ และน่าตื่นเต้นด้วยค่ะ"
16004-CVGroup_Relationship_Up_2-1 = "คุณครู! ต่อไปก็ขอคำแนะนำและกำลังใจเยอะๆ นะคะ!"
16004-CVGroup_Relationship_Up_3-1 = "คุณครู ฉันมีความสุขที่ได้พบคุณครูค่ะ\nทั้งเมื่อวาน วันนี้ และพรุ่งนี้ด้วย"
16004-CVGroup_Relationship_Up_4-1 = "ฉันดีใจที่ได้มาที่นี่ค่ะ เพราะได้เจอวัฒนธรรมของเฮียกคิยาโค\nได้เจอเพื่อนๆ แล้วก็... คุณครูยังไงล่ะคะ"
16004-CVGroup_Tactic_In_1-1 = "คุณครูสั่งมาได้เต็มที่เลยค่ะ!"
16004-CVGroup_Tactic_In_2-1 = "เอาละ ชนะอย่างสง่าผ่าเผย!"
16004-CVGroup_Tactic_Victory_1-1 = "เป็นการตัดสินใจที่ยอดมากค่ะ!"
16004-CVGroup_Tactic_Victory_2-1 = "สมกับที่เป็นคุณครูเลยค่ะ!"

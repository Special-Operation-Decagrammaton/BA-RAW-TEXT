[translation]
20006-CVGroup_CommonSkill-1 = "이걸 버텨볼 수 있으면 어디 버텨보는 것이다!"
20006-CVGroup_ExSkill_1-1 = "이얏호—!"
20006-CVGroup_ExSkill_2-1 = "신나게 즐겨보자고!"
20006-CVGroup_ExSkill_3-1 = "더 더 빠르게!"
20006-CVGroup_ExSkill_Level_1-1 = "자, 선물인 것이다!"
20006-CVGroup_ExSkill_Level_2-1 = "후후, 이거 받아!"
20006-CVGroup_ExSkill_Level_3-1 = "받아라-인 것이다!"
20006-CVGroup_Formation_In_1-1 = "드디어 나님이 나설 차례인가!"
20006-CVGroup_Formation_In_2-1 = "나님의 멋진 활약, 기대해도 좋은 것이다!"
20006-CVGroup_Growup_1-1 = "이런 강력한 물건을 가져오다니…… 선생도 제법인 것이다."
20006-CVGroup_Growup_2-1 = "오오, 이건…… 엄청 강해진 기분인 것이다!"
20006-CVGroup_Growup_3-1 = "후-후-후. 나님은 현재진행형으로 성장하고 있는 것이다!"
20006-CVGroup_Growup_4-1 = "이것도 새로운 실험인가? 흠, 나쁘지 않아!"
20006-CVGroup_Relationship_Up_1-1 = "역시 선생인 것이다!"
20006-CVGroup_Relationship_Up_2-1 = "우헤헤…\n핫! 아니, 나님은 이런 얼빠진 미소는 짓지 않아!\n음-하-하-핫!"
20006-CVGroup_Relationship_Up_3-1 = "선생을 보고 있으면 떠오르는 이 복잡한 감정은 무엇인 것이냐…? \n정말 어려운 난제인 것이다……."
20006-CVGroup_Relationship_Up_4-1 = "치즈와 선생 중 하나만 고르라면… \n으으음, 둘 다 고를 수 있는 방법은 없을까?"

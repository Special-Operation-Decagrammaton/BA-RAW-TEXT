20006-CVGroup_Relationship_Up_2-1 = "唔嘿嘿……\n哈！不，我可不會用這麼傻的笑法！\n唔～哈哈哈！"
20006-CVGroup_Relationship_Up_3-1 = "看著老師就會湧現的……這股複雜的感情是什麼呢？\n真是個令人困擾的難題啊……"
20006-CVGroup_Relationship_Up_4-1 = "起司跟老師要選一個的話……\n唔嗯……沒有兩邊都選的方法嗎？"

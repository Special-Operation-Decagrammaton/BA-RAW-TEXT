20006-CVGroup_ExSkill_2-1 = "盡情享樂吧！"
20006-CVGroup_ExSkill_3-1 = "要更快更快！"
20006-CVGroup_ExSkill_Level_1-1 = "來，這是禮物！"
20006-CVGroup_ExSkill_Level_2-1 = "呵呵，吃我這招！"
20006-CVGroup_ExSkill_Level_3-1 = "看招！"
20006-CVGroup_Formation_In_1-1 = "總算輪到我出場啦！"
20006-CVGroup_Formation_In_2-1 = "我帥氣的活躍表現，可以期待一下哦！"
20006-CVGroup_Growup_1-1 = "居然把這麼強力的東西拿來給我……老師也不容小覷啊。"
20006-CVGroup_Growup_2-1 = "哦哦，這是……有種變得超強了的感覺！"

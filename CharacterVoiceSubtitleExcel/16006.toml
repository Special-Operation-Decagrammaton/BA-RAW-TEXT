[translation]
16006-CVGroup_Battle_Buffed_1-1 = "ฮึบ~! มีแรงขึ้นขึ้นมาแล้ว!"
16006-CVGroup_Battle_Defense_1-1 = "เปล่าประโยชน์น่า~!"
16006-CVGroup_Battle_In_1-1 = "ทั้งร้อนแล้วก็หิวเลย...\nแต่การออกกำลังกายก่อนกินก็สำคัญนะ~!"
16006-CVGroup_Battle_In_2-1 = "รีบทำให้เสร็จก่อนไปกินข้าวกันเถอะ!"
16006-CVGroup_Battle_Move_1-1 = "ยังมีอยู่อีกเหรอ~? หิวแล้ว~"
16006-CVGroup_Battle_Move_2-1 = "รีบกำจัดแล้วไปกินอะไรเย็นๆ กันเถอะ!"
16006-CVGroup_Battle_Recovery_1-1 = "แรงใจเต็มเปี่ยม~! แต่ก็เริ่มหิวแล้วอะ..."
16006-CVGroup_Battle_TacticalAction_1-1 = "ต้องไปทางนี้สิ~"
16006-CVGroup_Battle_Victory_1-1 = "ทริปหาของอร่อยในฤดูร้อนยังไม่จบหรอกนะ!"
16006-CVGroup_Battle_Victory_2-1 = "ดีละ งั้นก็รีบไปร้านริมทะเลกันเถอะ!"
16006-CVGroup_CommonSkill-1 = "(ง่ำๆๆๆ...!)"
16006-CVGroup_ExSkill_1-1 = "เอาอันไหนดีน้า~! อื้อ อันนี้!"
16006-CVGroup_ExSkill_2-1 = "อืม~ คิดไม่ตกเลย~! ดีละ...! เอาอันนี้แล้วกัน!"
16006-CVGroup_ExSkill_3-1 = "น้ำผลไม้~! น้ำผลไม้~! ดี~ ละ!"
16006-CVGroup_ExSkill_Level_1-1 = "เอื๊อกๆ ฮ่าฮ่าฮ่า!"
16006-CVGroup_ExSkill_Level_2-1 = "ซู้ดดด~! เอื้อก อื้อ... เย็นใจจัง~!"
16006-CVGroup_ExSkill_Level_3-1 = "อร่อยจัง...! ขอบคุณสำหรับอาหารค่ะ!"
16006-CVGroup_Formation_In_1-1 = "พร้อมออกไปข้างนอกแล้ว~!"
16006-CVGroup_Formation_In_2-1 = "โรเจอร์!"
16006-CVGroup_Formation_Select-1 = "อ๊ะ คุณครูก็ลองชิมสักคำมั้ย~?"
16006-CVGroup_Growup_1-1 = "รู้สึกยังไงน่ะเหรอ?\nอื้อ อร่อยมากเลย! ปลาไหลรสช็อกโกแลตน่ะ!"
16006-CVGroup_Growup_2-1 = "ฮู่ว อิ่มจัง! ขอบคุณนะ คุณครู!"
16006-CVGroup_Growup_3-1 = "คุณครู ขอบคุณสำหรับอาหารนะ!\nคราวหน้าไปกินบะหมี่เย็นด้วยกันนะ!"
16006-CVGroup_Growup_4-1 = "ว้าวว! ของที่คุณครูให้มาอร่อยเหาะไปเลยละ!\nหืม? ไม่ใช่ของกินหรอกเหรอ?\nเอาเถอะ ยังไงมันก็อร่อยนี่ เอาเป็นว่า OK แล้วกัน!"
16006-CVGroup_Relationship_Up_1-1 = "พออยู่กับคุณครูแล้วสนุกจริงด้วยนะ~!"
16006-CVGroup_Relationship_Up_2-1 = "ไปกินอันนี้ด้วยกันสองคนนะคุณครู!\nต่อให้อยู่ใกล้กันแล้วจะร้อน!\nแต่ก็อยากกินด้วยกันอยู่ดี!"
16006-CVGroup_Relationship_Up_3-1 = "คุณครู ฉันอาจจะแปลกๆ ไปก็ได้...\nแต่หัวใจเต้นตึกตักไม่หยุดเลย...\nเป็นโรคลมแดดหรือเปล่านะ...?"
16006-CVGroup_Relationship_Up_4-1 = "ถ้าได้อยู่กับคุณครูละก็ ฤดูร้อนนี้ฉันอาจพิชิตทุกสิ่งที่อยากกินก็ได้นะ!\nไปกันเถอะ! คุณครู!"
16006-CVGroup_Tactic_In_1-1 = "ไปสำรวจอาหารเลิศรสของฤดูร้อนกัน~!"
16006-CVGroup_Tactic_In_2-1 = "อีกไม่นานก็จะถึงร้านริมทะเลแล้วละ...!"
16006-CVGroup_Tactic_Victory_1-1 = "อื้อ~ เสร็จ~ แล้ว~!\nงั้นไปกินน้ำแข็งไสรสเผ็ดกันเถอะ คุณครู!"
16006-CVGroup_Tactic_Victory_2-1 = "ดีละ! ปิดจ๊อบที่งานนี้ใช่มั้ย?\nงั้นต้องรีบไปกินยากิโซบะเลมอนแล้วละ!"

[translation]
16006-CVGroup_Battle_Buffed_1-1 = "으쌰~! 힘이 솟아났다!"
16006-CVGroup_Battle_Defense_1-1 = "소용 없지롱~!"
16006-CVGroup_Battle_In_1-1 = "덥고 배도 고프지만…… 밥 먹기 전 운동은 중요해~!"
16006-CVGroup_Battle_In_2-1 = "밥 먹기 전에 후딱 끝내자!"
16006-CVGroup_Battle_Move_1-1 = "아직도 있어~? 배고파~"
16006-CVGroup_Battle_Move_2-1 = "얼른 해치우고 시원한 거라도 사러 가자!"
16006-CVGroup_Battle_Recovery_1-1 = "의욕 맥스~! 하지만 슬슬 배고파……."
16006-CVGroup_Battle_TacticalAction_1-1 = "이리로 가야지~"
16006-CVGroup_Battle_Victory_1-1 = "여름 미식 여행은, 아직 끝나지 않았어!"
16006-CVGroup_Battle_Victory_2-1 = "좋았어. 그럼 빨리 바다의 집으로 가자!"
16006-CVGroup_CommonSkill-1 = "(우물우물우물……!)"
16006-CVGroup_ExSkill_1-1 = "어느 걸로 할까나~! ……응, 이거닷!"
16006-CVGroup_ExSkill_2-1 = "으으음~ 고민된다아~! ……좋아! 이걸로 할래!"
16006-CVGroup_ExSkill_3-1 = "주스~! 주스~! 좋았~어!"
16006-CVGroup_ExSkill_Level_1-1 = "꿀꺽꿀꺽, 푸하아!"
16006-CVGroup_ExSkill_Level_2-1 = "쭈우우웁~! 꿀꺽, 응. 시원해라~!"
16006-CVGroup_ExSkill_Level_3-1 = "맛있어……! 잘 먹었습니다-!"
16006-CVGroup_Formation_In_1-1 = "외출 준비 됐어~!"
16006-CVGroup_Formation_In_2-1 = "라져-!"
16006-CVGroup_Formation_Select-1 = "앗, 선생님도 한 입 할래~?"
16006-CVGroup_Growup_1-1 = "어떤 느낌이냐구? 응, 맛있었어! 초코맛 장어만큼 말이야!"
16006-CVGroup_Growup_2-1 = "후아, 배부르다! 고마워, 선생님!"
16006-CVGroup_Growup_3-1 = "선생님, 잘 먹었어! 이다음엔 같이 중화냉면 먹으러 가자!"
16006-CVGroup_Growup_4-1 = "와앗! 선생님이 준 이거, 엄청 맛있어!\n응? 먹는 게 아니야?\n뭐, 맛있었으니까. OK라는 것으로!"
16006-CVGroup_Relationship_Up_1-1 = "역시 선생님이랑 있으면 즐겁네~!"
16006-CVGroup_Relationship_Up_2-1 = "둘이서 이거 같이 먹자, 선생님!\n가까이 붙으면 덥지만! \n그래도 역시 같이 먹고 싶어!"
16006-CVGroup_Relationship_Up_3-1 = "선생님, 나 조금 이상할지도…….\n두근거리는 게 멈추지를 않아서…….\n열사병인 걸까……?"
16006-CVGroup_Relationship_Up_4-1 = "선생님과 함께라면 이번 여름이야말로\n먹고 싶은 거 전-부 제패할 수 있을지도 몰라!\n가자! 선생님!"
16006-CVGroup_Tactic_In_1-1 = "다 같이 여름별미 탐방 출발~!"
16006-CVGroup_Tactic_In_2-1 = "바다의 집까지, 얼마 남지 않았을 거야……!"
16006-CVGroup_Tactic_Victory_1-1 = "으응~ 끝났~다아~! 그럼 매운맛 빙수 먹으러 가자, 선생님!"
16006-CVGroup_Tactic_Victory_2-1 = "좋았어! 이걸로 끝나는 거지? 그럼 빨리 레몬 야키소바 먹으러 가야지!"

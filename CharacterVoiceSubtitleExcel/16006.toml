[translation]
16006-CVGroup_Battle_Buffed_1-1 = "好～！力量湧出來了！"
16006-CVGroup_Battle_Defense_1-1 = "沒用沒用～！"
16006-CVGroup_Battle_In_1-1 = "雖然很熱，而且肚子也餓了……但飯前的運動很重要！"
16006-CVGroup_Battle_In_2-1 = "在吃飯之前趕快搞定吧！"
16006-CVGroup_Battle_Move_1-1 = "還沒完嗎～？我肚子餓了～"
16006-CVGroup_Battle_Move_2-1 = "速速搞定之後，去買點冰涼的飲料吧！"
16006-CVGroup_Battle_Recovery_1-1 = "幹勁MAX～！\n可是也快餓了……"
16006-CVGroup_Battle_TacticalAction_1-1 = "往這邊吧～！"
16006-CVGroup_Battle_Victory_1-1 = "夏日的美食巡迴之旅，現在才開始唷～！"
16006-CVGroup_Battle_Victory_2-1 = "很好，那麼趕緊去海之家吧！"
16006-CVGroup_CommonSkill-1 = "（嚼嚼嚼嚼……！）"
16006-CVGroup_ExSkill_1-1 = "該選哪個好呢～！\n……嗯，這個！"
16006-CVGroup_ExSkill_2-1 = "唔嗯～真煩惱～！\n……好，就選這個吧！"
16006-CVGroup_ExSkill_3-1 = "果汁～！果汁～！\n好～！"
16006-CVGroup_ExSkill_Level_1-1 = "咕嚕咕嚕……噗哈！"
16006-CVGroup_ExSkill_Level_2-1 = "咻～！\n嗯！涼快多了～！"
16006-CVGroup_ExSkill_Level_3-1 = "好好喝……！\n感謝招待～！"
16006-CVGroup_Formation_In_1-1 = "外出的準備，完成了唷～！"
16006-CVGroup_Formation_In_2-1 = "收到！"
16006-CVGroup_Formation_Select-1 = "啊，老師也要來一口嗎～？"
16006-CVGroup_Growup_1-1 = "是怎麼樣的感覺……是嗎？\n唔嗯～怎麼說呢，很美味唷！跟巧克力口味的鰻魚差不多！"
16006-CVGroup_Growup_2-1 = "呼～吃得真飽！\n謝謝你，老師！"
16006-CVGroup_Growup_3-1 = "老師，感謝你的招待。\n下次再一起去吃冷中華吧！"
16006-CVGroup_Growup_4-1 = "哇！老師給我的這個超好吃的！\n咦，這不是食物？\n哎呀哎呀～只要好吃就OK了呀！"
16006-CVGroup_Relationship_Up_1-1 = "果然跟老師在一起很開心呢～！"
16006-CVGroup_Relationship_Up_2-1 = "兩個人一起吃這個吧，老師！\n雖然貼在一起會變得更熱，但我果然還是想一起吃！"
16006-CVGroup_Relationship_Up_3-1 = "老師，我好像有點奇怪……\n心臟撲通撲通地跳個不停……\n是中暑了嗎……？"
16006-CVGroup_Relationship_Up_4-1 = "跟老師一起的話，今年夏天也許真的能稱霸所有想吃的食物！\n走吧，老師！"
16006-CVGroup_Tactic_In_1-1 = "大家一起的夏日美食巡禮，出發～！"
16006-CVGroup_Tactic_In_2-1 = "離海之家，應該就差一點了……！"
16006-CVGroup_Tactic_Victory_1-1 = "嗯～結束了～！\n那我們來去吃超辣刨冰吧，老師！"
16006-CVGroup_Tactic_Victory_2-1 = "好！這樣就結束了吧？\n那得趕快去吃檸檬炒麵才行！"

[translation]
13003-CVGroup_Battle_Buffed_1-1 = "支援，感激不盡。"
13003-CVGroup_Battle_Covered_1-1 = "狙擊地點，已確保。"
13003-CVGroup_Battle_Defense_1-1 = "呵呵，還不夠成熟呢。"
13003-CVGroup_Battle_In_1-1 = "裝填完畢。\n開始殲滅敵人。"
13003-CVGroup_Battle_In_2-1 = "心懷熱情，保持冷靜。\n我要上了！"
13003-CVGroup_Battle_Move_1-1 = "或許，應該多做點運動比較好呢……"
13003-CVGroup_Battle_Move_2-1 = "Clear。"
13003-CVGroup_Battle_Recovery_1-1 = "雖然美味，但分量稍嫌不……\n沒，沒什麼。"
13003-CVGroup_Battle_TacticalAction_1-1 = "變更狙擊地點。"
13003-CVGroup_Battle_Victory_1-1 = "辛苦了。"
13003-CVGroup_Battle_Victory_2-1 = "還遠遠不夠。我會繼續精進。"
13003-CVGroup_CommonSkill-1 = "我要上了。"
13003-CVGroup_ExSkill_1-1 = "發動攻擊。"
13003-CVGroup_ExSkill_2-1 = "發現目標。"
13003-CVGroup_ExSkill_3-1 = "捕捉目標。"
13003-CVGroup_ExSkill_Level_1-1 = "不會放過。"
13003-CVGroup_ExSkill_Level_2-1 = "貫穿……！"
13003-CVGroup_ExSkill_Level_3-1 = "要上了！"
13003-CVGroup_Formation_In_1-1 = "無須客氣。儘管交給我吧。"
13003-CVGroup_Formation_In_2-1 = "恭候多時了。"
13003-CVGroup_Formation_Select-1 = "呼呣……"
13003-CVGroup_Growup_1-1 = "謝謝您的關心，老師。"
13003-CVGroup_Growup_2-1 = "在變強的同時，是否也有成為受人需要的人……\n無時無刻不令我煩惱。"
13003-CVGroup_Growup_3-1 = "為我做到這種程度……實在不敢當。"
13003-CVGroup_Growup_4-1 = "感激不盡。"
13003-CVGroup_Relationship_Up_1-1 = "這是為什麼呢……\n只要跟老師待在一起，總是會比平時更加緊張。"
13003-CVGroup_Relationship_Up_2-1 = "即便現在這個瞬間只是一場夢……\n我，也會將其視為一生的寶物。"
13003-CVGroup_Relationship_Up_3-1 = "我隨時都待在您身邊……\n因此需要我的時候，請隨時告訴我吧。"
13003-CVGroup_Relationship_Up_4-1 = "我一直很感謝您。\n我也必須好好加油呢。"
13003-CVGroup_Tactic_In_1-1 = "發現敵人。\n準備戰鬥。"
13003-CVGroup_Tactic_In_2-1 = "出發。"
13003-CVGroup_Tactic_Victory_1-1 = "十分出色。"
13003-CVGroup_Tactic_Victory_2-1 = "任務，執行完畢。"

[translation]
20016-CVGroup_CommonSkill-1 = "攻擊。"
20016-CVGroup_ExSkill_1-1 = "唉，那個，超無敵鐵甲「虎丸」，出擊……"
20016-CVGroup_ExSkill_2-1 = "唉，來去巡邏吧，虎丸。"
20016-CVGroup_ExSkill_3-1 = "超無敵鐵甲「虎丸」，前進。\n……這名字還真羞恥。"
20016-CVGroup_ExSkill_Level_1-1 = "是是是，要上囉～"
20016-CVGroup_ExSkill_Level_2-1 = "知道了啦，真是的……"
20016-CVGroup_ExSkill_Level_3-1 = "真沒辦法……"
20016-CVGroup_Formation_In_1-1 = "啊……好，我知道了。"
20016-CVGroup_Formation_In_2-1 = "雖然早有預料……唉。"
20016-CVGroup_Formation_Select-1 = "嗯……能讓我負責留守嗎？"
20016-CVGroup_Growup_1-1 = "似乎，不會讓我偷懶呢……真沒辦法。"
20016-CVGroup_Growup_2-1 = "……怎麼了，對我有興趣嗎？"
20016-CVGroup_Growup_3-1 = "嘿～願意為我做到這種程度啊？"
20016-CVGroup_Growup_4-1 = "非常感謝……怎麼了嗎，普通的道謝我還是會說的。"
20016-CVGroup_Relationship_Up_1-1 = "呵呵……看來，波長似乎也不是合不來呢。"
20016-CVGroup_Relationship_Up_2-1 = "好吧，受人依賴也不怎麼令人討厭……"
20016-CVGroup_Relationship_Up_3-1 = "那種積極的做法，有點……"
20016-CVGroup_Relationship_Up_4-1 = "所謂心意相通，指的就是這種感覺嗎？"

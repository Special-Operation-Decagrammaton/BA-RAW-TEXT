[translation]
10063-CVGroup_Battle_Buffed_1-1 = "哈，要給我嗎！？"
10063-CVGroup_Battle_Defense_1-1 = "尼哈哈哈！不會讓你如意的哦～！"
10063-CVGroup_Battle_In_1-1 = "現在，我就是！隊長！！"
10063-CVGroup_Battle_In_2-1 = "沒時間磨蹭了！"
10063-CVGroup_Battle_Move_1-1 = "追上去！"
10063-CVGroup_Battle_Move_2-1 = "就這樣繼續囉！！"
10063-CVGroup_Battle_Recovery_1-1 = "謝謝！"
10063-CVGroup_Battle_TacticalAction_1-1 = "哈洽～！"
10063-CVGroup_Battle_Victory_1-1 = "輕鬆輕鬆～！砰～！"
10063-CVGroup_Battle_Victory_2-1 = "小菜一碟啦！砰～！"
10063-CVGroup_CommonSkill-1 = "尼哈哈哈哈～！！"
10063-CVGroup_ExSkill_1-1 = "該．選．哪．個．好……唔咦咦！？"
10063-CVGroup_ExSkill_2-1 = "這種時候就該……唔啊啊！？"
10063-CVGroup_ExSkill_3-1 = "為了這種時候……唔哇！？"
10063-CVGroup_ExSkill_Level_1-1 = "算了……這樣就行了吧？"
10063-CVGroup_ExSkill_Level_2-1 = "只要結果好一切都OK！……對吧？"
10063-CVGroup_ExSkill_Level_3-1 = "這才是醍醐味……是這樣用的嗎？"
10063-CVGroup_Formation_In_1-1 = "試試看吧～！"
10063-CVGroup_Formation_In_2-1 = "有趣的事，希望能夠發生！"
10063-CVGroup_Formation_Select-1 = "嗚哇啊啊啊！？"
10063-CVGroup_Growup_1-1 = "咦？要給我？……真的嗎？\n沒有搞錯要給的人之類的？"
10063-CVGroup_Growup_2-1 = "尼哈哈哈……！是巨大的力量……！\n咦？更大的責任？那是什麼？"
10063-CVGroup_Growup_3-1 = "沒有人能夠阻止我！\n……老師除外！前輩們也除外！"
10063-CVGroup_Growup_4-1 = "啊，這有點……再怎麼說也實在……\n不，說不定也不錯？\n尼哈……對我這麼好沒關係嗎～？"
10063-CVGroup_Relationship_Up_1-1 = "咦咦！？你說什麼！？\n禮物！？要給我的！？老師送的！？"
10063-CVGroup_Relationship_Up_2-1 = "禮物，真的非常感謝！\n面對大人要保持禮貌，對吧！"
10063-CVGroup_Relationship_Up_3-1 = "我今天，有做了什麼嗎……？"
10063-CVGroup_Relationship_Up_4-1 = "非常謝謝你……\n我會好好珍惜……真的。"
10063-CVGroup_Tactic_In_1-1 = "唔咦！？不會有點太多了嗎！？"
10063-CVGroup_Tactic_In_2-1 = "呃……這些全部都得做嗎？"
10063-CVGroup_Tactic_Victory_1-1 = "叫我來是值得的吧～？"
10063-CVGroup_Tactic_Victory_2-1 = "下次也請叫我哦～？"

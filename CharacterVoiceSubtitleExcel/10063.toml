[translation]
10063-CVGroup_Battle_Buffed_1-1 = "เฮือก! ให้ฉันงั้นเหรอคะ!?"
10063-CVGroup_Battle_Defense_1-1 = "อุวะฮ่าฮ่า! ไม่ได้หรอกค่ะ ไม่ได้~! แบร่~!"
10063-CVGroup_Battle_In_1-1 = "ตอนนี้ฉัน! เป็นหัวหน้าค่ะ!!"
10063-CVGroup_Battle_In_2-1 = "ไม่มีเวลา! จะมาลังเลแล้วนะคะ!!"
10063-CVGroup_Battle_Move_1-1 = "ลุยต่อไป-!"
10063-CVGroup_Battle_Move_2-1 = "รักษาขบวนไว้ค่ะ!!"
10063-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ!"
10063-CVGroup_Battle_TacticalAction_1-1 = "ฮึบ-!"
10063-CVGroup_Battle_Victory_1-1 = "ง่ายจุง ง่ายมาก~! ปัง-!"
10063-CVGroup_Battle_Victory_2-1 = "ไม่เห็นจะเก่งเลย! ปัง-!"
10063-CVGroup_CommonSkill-1 = "อุวะฮ่าฮ่าฮ่า!!"
10063-CVGroup_ExSkill_1-1 = "จะเลือกอันไหน... เอ๋!?"
10063-CVGroup_ExSkill_2-1 = "ในสถานการณ์แบบนี้... อ๊ายยย!?"
10063-CVGroup_ExSkill_3-1 = "เตรียมพร้อมเพื่อช่วงเวลาแบบนี้... อ๊าก!?"
10063-CVGroup_ExSkill_Level_1-1 = "เอาเถอะ... เท่านี้ก็ใช้ได้แล้วนะคะ?"
10063-CVGroup_ExSkill_Level_2-1 = "ถ้าผลออกมาดีก็โอเค...! ใช่มั้ยคะ?"
10063-CVGroup_ExSkill_Level_3-1 = "แบบนี้มันก็สนุกดี... นี่คะ "
10063-CVGroup_Formation_In_1-1 = "มาลองกันเถอะ~!"
10063-CVGroup_Formation_In_2-1 = "หวังว่าจะมีเรื่องสนุกๆ นะ~"
10063-CVGroup_Formation_Select-1 = "หวาาาาา?!"
10063-CVGroup_Growup_1-1 = "คะ? ให้ฉันเหรอ? จริงเหรอคะ...?\nไม่ได้ให้ผิดคนใช่มั้ย?"
10063-CVGroup_Growup_2-1 = "อุวะฮ่าฮ่า...! มีแรงขึ้นเยอะเลย...!\nคะ? ความรับผิดชอบที่ยิ่งใหญ่? มันคืออะไรเหรอคะ?"
10063-CVGroup_Growup_3-1 = "ใครก็ขวางฉันไม่ได้!\nยกเว้นคุณครู...! ยกเว้นพวกรุ่นพี่!"
10063-CVGroup_Growup_4-1 = "อ่า... นี่มันค่อนข้าง... ยังไงมันก็...\nไม่สิ แบบนี้อาจจะดีก็ได้?\nฮิฮิ... คุณครูมาใจดีกับฉันแบบนี้จะดีเหรอคะ~?"
10063-CVGroup_Relationship_Up_1-1 = "ว่าอะไรนะคะ!? ของขวัญ!? ให้ฉันเหรอคะ!? คุณครู!?"
10063-CVGroup_Relationship_Up_2-1 = "ขอบคุณสำหรับของขวัญค่ะ!\nต้องสุภาพกับผู้ใหญ่สินะคะ!"
10063-CVGroup_Relationship_Up_3-1 = "คือวันนี้ฉัน... ก่อเรื่องอะไรมางั้นเหรอคะ...?"
10063-CVGroup_Relationship_Up_4-1 = "ขอบคุณนะคะ… จะรักษาอย่างดีเลยค่ะ... พูดจริงๆ นะคะ"
10063-CVGroup_Tactic_In_1-1 = "เอ๋!? ทะ... ทำไมเยอะอะไรแบบนี้คะ!?"
10063-CVGroup_Tactic_In_2-1 = "คือ... ต้องทำทั้งหมดเลยเหรอคะ?"
10063-CVGroup_Tactic_Victory_1-1 = "คุ้มที่เรียกฉันมาใช่มั้ยล่ะคะ~?"
10063-CVGroup_Tactic_Victory_2-1 = "คราวหน้าก็เรียกฉันอีกนะคะ~"

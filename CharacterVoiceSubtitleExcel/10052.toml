10052-CVGroup_ExSkill_Level_2-1 = "ถ้าความรู้ของฉันเป็นประโยชน์ก็โล่งอกไปทีค่ะ"
10052-CVGroup_ExSkill_Level_3-1 = "ถึงจะพยายามซ่อนตัวก็หนีจากการบันทึกของฉันไม่พ้นหรอกค่ะ!"

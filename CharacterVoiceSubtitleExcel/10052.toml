[translation]
10052-CVGroup_Battle_Buffed_1-1 = "謝謝你適切的建議。"
10052-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
10052-CVGroup_Battle_Defense_1-1 = "呵呵，不是那邊唷。"
10052-CVGroup_Battle_In_1-1 = "偶爾也該活動身體才行呢。"
10052-CVGroup_Battle_In_2-1 = "那麼，開始作戰。"
10052-CVGroup_Battle_Move_1-1 = "整理就先到此為止吧。"
10052-CVGroup_Battle_Move_2-1 = "在這前方，會有什麼樣的變數等著我呢？"
10052-CVGroup_Battle_Recovery_1-1 = "感謝支援。"
10052-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10052-CVGroup_Battle_Victory_1-1 = "會議到此結束。\n 辛苦了。"
10052-CVGroup_Battle_Victory_2-1 = "與紀錄一樣，完美♪"
10052-CVGroup_CommonSkill-1 = "迅速地，進行壓制。"
10052-CVGroup_ExSkill_1-1 = "原來如此……那裡是弱點對吧？"
10052-CVGroup_ExSkill_2-1 = "嘿……這還真有趣呢。"
10052-CVGroup_ExSkill_3-1 = "呵呵……這次嘗試進攻這裡吧。"
10052-CVGroup_ExSkill_Level_1-1 = "稍微失禮一下……要開始記錄了。"
10052-CVGroup_ExSkill_Level_2-1 = "我的知識能派上用場的話，就再好不過了。"
10052-CVGroup_ExSkill_Level_3-1 = "就算躲藏起來，也逃不出我的紀錄！"
10052-CVGroup_Formation_In_1-1 = "是個合理的選擇呢。"
10052-CVGroup_Formation_In_2-1 = "這次也請多指教。"
10052-CVGroup_Formation_Select-1 = "呵呵。\n如果有更好的意見，請務必告知。"
10052-CVGroup_Growup_1-1 = "學習新的事物，總是令人快樂。"
10052-CVGroup_Growup_2-1 = "呵呵，這似乎有點有趣……"
10052-CVGroup_Growup_3-1 = "老師的指導相當容易理解呢。"
10052-CVGroup_Growup_4-1 = "雖然無法確信……\n不過似乎比先前稍微有所成長。呵呵。"
10052-CVGroup_Relationship_Up_1-1 = "呵呵，老師的話語就像溫暖的夕陽一樣呢。"
10052-CVGroup_Relationship_Up_2-1 = "感謝你一直以來的協助，老師。"
10052-CVGroup_Relationship_Up_3-1 = "稍微有點難紀錄呢……\n用「好」這個字，似乎有點不夠。"
10052-CVGroup_Relationship_Up_4-1 = "現在的這股感情……不想留在紀錄中呢。"
10052-CVGroup_Tactic_In_1-1 = "已確認敵人出現。\n麻煩進行指揮。"
10052-CVGroup_Tactic_In_2-1 = "呵呵，現場的事請交給我吧。"
10052-CVGroup_Tactic_Victory_1-1 = "記錄到了很多老師新的一面……\n……咳哼，失禮了。我收益良多。"
10052-CVGroup_Tactic_Victory_2-1 = "真是精采的指揮。\n稍後要不要一起去喝杯咖啡呢？"

10052-CVGroup_Relationship_Up_4-1 = "ความรู้สึกในตอนนี้... ฉันไม่อยากบันทึกเอาไว้น่ะค่ะ"
10052-CVGroup_Tactic_In_1-1 = "ยืนยันการปรากฏตัวของศัตรู\nรบกวนสั่งการด้วยค่ะ"
10052-CVGroup_Tactic_In_2-1 = "ฮุฮุ เรื่องหน้างานให้เป็นหน้าที่ฉันเองค่ะ"
10052-CVGroup_Tactic_Victory_1-1 = "โชคดีที่บันทึกภาพลักษณ์ใหม่ๆ ของคุณครูไว้...\nฮึ่ม... ขอโทษด้วยนะคะ ฉันได้เรียนรู้อะไรหลายๆ อย่างเลยค่ะ"
10052-CVGroup_Tactic_Victory_2-1 = "สั่งการได้ยอดเยี่ยมมากค่ะ\nหลังจากนี้ไปดื่มกาแฟสักแก้วกันมั้ยคะ?"

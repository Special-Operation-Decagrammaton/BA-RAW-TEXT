[translation]
16009-CVGroup_Battle_Buffed_1-1 = "โอ้ รู้สึกเหมือนแข็งแกร่งขึ้นเลย... ไม่ได้โกหกนะ!"
16009-CVGroup_Battle_Defense_1-1 = "ฮ่าฮ่า แบบนั้นน่ะไม่ได้ผลหรอก!"
16009-CVGroup_Battle_In_1-1 = "ฮึ่มม~! ดีละ เริ่มภารกิจ!"
16009-CVGroup_Battle_In_2-1 = "อืม มะ... มาเริ่มกันก่อนเลย!"
16009-CVGroup_Battle_Move_1-1 = "ดีละ ไปต่อกันเลย!"
16009-CVGroup_Battle_Move_2-1 = "อึก ยังไม่จบอีกเหรอ?"
16009-CVGroup_Battle_Recovery_1-1 = "ขอบคุณที่ช่วยนะ!"
16009-CVGroup_Battle_TacticalAction_1-1 = "ชูบาบาบาบา!"
16009-CVGroup_Battle_Victory_1-1 = "เป็นไงล่ะ นี่ละพลังของชมรมวิจัยศาสตร์นินจา!"
16009-CVGroup_Battle_Victory_2-1 = "อื้อ วิถีนินจาของมิจิรุไม่มีจุดบอดหรอก!"
16009-CVGroup_CommonSkill-1 = "ก่อนอื่นต้องฟื้นฟูจิตใจด้วยของเกี่ยวกับนินจา..."
16009-CVGroup_ExSkill_1-1 = "วะ... วิถีนินจามิจิรุ!"
16009-CVGroup_ExSkill_2-1 = "จะ... จะโชว์วิชาไฟอำพรางให้ดูเลย!"
16009-CVGroup_ExSkill_3-1 = "ยะ... อย่าดูถูกหัวหน้าชมรมวิจัยศาสตร์นินจานะ!"
16009-CVGroup_ExSkill_Level_1-1 = "หวา ร้อนจัง!?"
16009-CVGroup_ExSkill_Level_2-1 = "วิถีนินจา อ๊ะ ร้อนๆๆ!?"
16009-CVGroup_ExSkill_Level_3-1 = "ว้ายย!!\nโอ๊ย ร้อนๆๆ!!"
16009-CVGroup_Formation_In_1-1 = "ว้ายย?! ตะ... ตกใจหมดเลย\nอ๊ะ ไปตั้งแต่ตอนนี้เลยเหรอ? เข้าใจแล้ว!"
16009-CVGroup_Formation_In_2-1 = "ฮุฮุ... เอาละ ถึงตาข้าน้อยแล้วสินะ!\nหืม...? ไม่ใช่เหรอ? หรือว่าใช่?"
16009-CVGroup_Formation_Select-1 = "ท่านอาจารย์ ข้าน้อยมีนามว่ามิจิรุค่ะ เอาละ สั่งมาได้เลย!"
16009-CVGroup_Growup_1-1 = "หืม?! อันนี้ให้เหรอ?! ให้ข้าน้อยเหรอ?!\nฮุฮุ สมกับที่เป็นท่านอาจารย์\nต้องบอกว่าตาถึง... หรือเปล่านะ อะฮ่าฮ่า!"
16009-CVGroup_Growup_2-1 = "โอ้ แข็งแกร่งขึ้นแล้ว...!!"
16009-CVGroup_Growup_3-1 = "ไม่สิ... คือว่า... ขะ... ขอบคุณ... นะ...?"
16009-CVGroup_Growup_4-1 = "ฮุฮุ ในที่สุดข้าน้อยก็มาถึงตรงนี้กับเขาแล้ว!\nข้าน้อยจะแสดงความสามารถทั้งหมดที่มี\nแล้วทำตามความคาดหวังของท่านอาจารย์เอง!"
16009-CVGroup_Relationship_Up_1-1 = "วะ... ว้ายยย! กะ... ใกล้ไป! ใกล้ไปแล้ว!\nถ้าอยู่ใกล้ๆ! เฮ้อ มันไม่ดีต่อใจนะ..."
16009-CVGroup_Relationship_Up_2-1 = "ถ้าได้อยู่กับท่านอาจารย์... \nข้าน้อยรู้สึกว่าคนอย่างข้าน้อยก็ทำได้ทุกอย่างเลย...\nนี่มันอะไรเหรอ... แปลกจัง"
16009-CVGroup_Relationship_Up_3-1 = "อะ... อะไรกัน เข้ามาใกล้แบบนี้?! แกล้งกันเหรอ?!\nหรือว่าซ่อนกล้องไว้?! ขะ... ข้าน้อยไม่ได้ไม่ชอบสักหน่อย..."
16009-CVGroup_Relationship_Up_4-1 = "อึก ใกล้ไป... หรือว่าข้าน้อยควรจะ...?\nใช่แล้ว นี่คือกลยุทธ์สาวงามของข้าน้อย...\nอะไรกันล่ะ! ข้าน้อยเขินนะ จะให้ทำแบบนั้นได้ไง!"
16009-CVGroup_Tactic_In_1-1 = "ชมรมวิจัยศาสตร์นินจาออกโรง!"
16009-CVGroup_Tactic_In_2-1 = "ข้าน้อยจะแสดงความน่ากลัวของนินจาให้ดู! เตรียมตัวไว้ได้เลย!"
16009-CVGroup_Tactic_Victory_1-1 = "ภารกิจเสร็จสิ้น! ฮู่ว... เท่ชะมัด"
16009-CVGroup_Tactic_Victory_2-1 = "สำหรับชมรมวิจัยศาสตร์นินจา แค่นี้เรื่องกล้วยๆ น่า!\nง่ายชะมัด ง่ายมาก!"

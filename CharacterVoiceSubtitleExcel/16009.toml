[translation]
16009-CVGroup_Battle_Buffed_1-1 = "哦哦，變強了的感覺……好像也不是沒有！"
16009-CVGroup_Battle_Defense_1-1 = "啊哈，那樣行不通的唷！"
16009-CVGroup_Battle_In_1-1 = "哼哼～！好，任務開始！"
16009-CVGroup_Battle_In_2-1 = "唔嗯，總，總之開始吧！"
16009-CVGroup_Battle_Move_1-1 = "好，繼續前進吧！"
16009-CVGroup_Battle_Move_2-1 = "唔，還要繼續嗎……？"
16009-CVGroup_Battle_Recovery_1-1 = "感謝協助！"
16009-CVGroup_Battle_TacticalAction_1-1 = "咻啪啪啪啪！"
16009-CVGroup_Battle_Victory_1-1 = "怎麼樣啊，這就是我們忍術研究部的力量！"
16009-CVGroup_Battle_Victory_2-1 = "嗯，果然三千流流忍術沒有死角！"
16009-CVGroup_CommonSkill-1 = "總之，先用忍者周邊來恢復精神力……"
16009-CVGroup_ExSkill_1-1 = "三，三千流流忍法！"
16009-CVGroup_ExSkill_2-1 = "火，火遁之術，讓你見識見識！"
16009-CVGroup_ExSkill_3-1 = "別小看忍術研究部的部長啊！"
16009-CVGroup_ExSkill_Level_1-1 = "唔啊，好燙！？"
16009-CVGroup_ExSkill_Level_2-1 = "忍法好燙燙燙燙！？"
16009-CVGroup_ExSkill_Level_3-1 = "唔呀啊！！好燙！？"
16009-CVGroup_Formation_In_1-1 = "唔呀啊！？嚇，嚇我一跳……\n啊，現在出動？了解！"
16009-CVGroup_Formation_In_2-1 = "呵呵……好，輪到我登場了吧！\n……咦，不是？是嗎？"
16009-CVGroup_Formation_Select-1 = "您好，老師大人。我是三千流。\n……來吧，請儘管吩咐！"
16009-CVGroup_Growup_1-1 = "咦！？這個要給我？給我嗎！？\n呵呵，果然老師大人很有眼光呢……開玩笑的。喵哈哈。"
16009-CVGroup_Growup_2-1 = "哦哦，就這樣變得越來越強……！！"
16009-CVGroup_Growup_3-1 = "呃，那個……謝，謝謝，你……？"
16009-CVGroup_Growup_4-1 = "呵呵，我也總算走到這一步了。\n就應老師大人的期待，展現八頭六臂的活躍表現吧！"
16009-CVGroup_Relationship_Up_1-1 = "唔啊！？等一下，好近！太近了！距離感呢！\n啊～真是對心臟不好……"
16009-CVGroup_Relationship_Up_2-1 = "跟老師大人在一起的話，總覺得有股……\n就連我這樣的人，好像也什麼都能做到的心情……\n……怎麼回事呢，真奇怪。"
16009-CVGroup_Relationship_Up_3-1 = "這，這距離感是怎麼回事！？在捉弄我嗎？整人遊戲！？\n雖，雖然我也不討厭啦……"
16009-CVGroup_Relationship_Up_4-1 = "嗚嗚，好近……不，那不如乾脆，就由我這邊來……？\n對了，用我的色誘之術……\n等一下，那麼羞恥的事誰做得到啊！"
16009-CVGroup_Tactic_In_1-1 = "忍術研究部，開始行動！"
16009-CVGroup_Tactic_In_2-1 = "忍者的恐怖之處，就讓你們見識見識！覺悟吧！"
16009-CVGroup_Tactic_Victory_1-1 = "任務完成！\n……呼，搞定了。"
16009-CVGroup_Tactic_Victory_2-1 = "對我們忍術研究部來說，這種程度小菜一疊啦！\n輕輕鬆鬆！"

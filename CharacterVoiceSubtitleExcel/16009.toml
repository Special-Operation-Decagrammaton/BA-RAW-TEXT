[translation]
16009-CVGroup_Battle_Buffed_1-1 = "오옷, 뭔가 강해진 기분이…… 들지 않는 것도 아냐!"
16009-CVGroup_Battle_Defense_1-1 = "아핫, 그런 거 안 통하지롱!"
16009-CVGroup_Battle_In_1-1 = "흐흥~! 좋아. 임무! 개시!"
16009-CVGroup_Battle_In_2-1 = "으-음, 이, 일단 시작해보자!"
16009-CVGroup_Battle_Move_1-1 = "좋아, 다음으로 가자!"
16009-CVGroup_Battle_Move_2-1 = "으으, 아직 안 끝난 거야?"
16009-CVGroup_Battle_Recovery_1-1 = "도움! 감사하오!"
16009-CVGroup_Battle_TacticalAction_1-1 = "슈바바바밧!"
16009-CVGroup_Battle_Victory_1-1 = "어때, 이거야말로 우리 인법연구부의 힘이라고!"
16009-CVGroup_Battle_Victory_2-1 = "응, 역시 미치루류 인법에 사각은 없어!"
16009-CVGroup_CommonSkill-1 = "우선, 닌자굿즈로 정신력을 회복해야……."
16009-CVGroup_ExSkill_1-1 = "미, 미치루류 인법!"
16009-CVGroup_ExSkill_2-1 = "화, 화둔의 술! 보여주겠어!"
16009-CVGroup_ExSkill_3-1 = "이, 인법연구부의 부장을 얕보지 마라아앗!"
16009-CVGroup_ExSkill_Level_1-1 = "우와, 뜨거!?"
16009-CVGroup_ExSkill_Level_2-1 = "인법, 앗 뜨뜨뜨!?"
16009-CVGroup_ExSkill_Level_3-1 = "우갸앗!! 앗 뜨뜨뜨?!"
16009-CVGroup_Formation_In_1-1 = "우갸악?! 까, 깜짝 놀랐네. 아, 지금부터 출동? 알았어!"
16009-CVGroup_Formation_In_2-1 = "후훗……. 자아, 내 차례네! ……어? 아냐? 맞나?"
16009-CVGroup_Formation_Select-1 = "도-모 선생=공. 미치루입니다. ……자, 명령을!"
16009-CVGroup_Growup_1-1 = "어?! 이거 주는 거야?! 나한테?!\n후훗, 역시 선생 공. 보는 눈이 있구나……랄까. 냐하핫!"
16009-CVGroup_Growup_2-1 = "오옷, 이걸로 더 강해졌다……!!"
16009-CVGroup_Growup_3-1 = "아니, 그게……. 고, 고마, 워……?"
16009-CVGroup_Growup_4-1 = "후후, 드디어 나도 여기까지 왔어!\n선생 공의 기대에 부응해, 팔면육비의 활약을 보여주겠소!"
16009-CVGroup_Relationship_Up_1-1 = "우, 우와앗! 가, 가까워! 가깝다구!\n거리감! 아- 심장에 안 좋다구……"
16009-CVGroup_Relationship_Up_2-1 = "선생 공과 함께 있으면 뭔가……. \n이런 나라도 뭐든지 할 수 있을 것 같은 기분이 들어…….\n……뭐야, 이거. 이상해."
16009-CVGroup_Relationship_Up_3-1 = "무, 뭐야, 이 거리감?! 놀리는 거야?! 몰래카메라?!\n벼, 별로 싫다는 건 아니지만……."
16009-CVGroup_Relationship_Up_4-1 = "우읏, 가까워…… 아니, 차라리 내 쪽에서……?\n그래, 나의 미인계로……\n라니, 그런 걸 부끄러워서 어떻게 해!"
16009-CVGroup_Tactic_In_1-1 = "인법연구부, 출동!"
16009-CVGroup_Tactic_In_2-1 = "닌자의 무서움을 보여주겠어! 각오하라고!"
16009-CVGroup_Tactic_Victory_1-1 = "임무완료! ……후우, 멋졌어."
16009-CVGroup_Tactic_Victory_2-1 = "우리 인법연구부에게 이정도쯤은 식은 죽 먹기야! 쉽네, 쉬워!"

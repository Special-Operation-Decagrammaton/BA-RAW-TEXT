[translation]
26012-CVGroup_CommonSkill-1 = "請，請收下吧！"
26012-CVGroup_ExSkill_1-1 = "我看看……\n那邊的！請停下來！"
26012-CVGroup_ExSkill_2-1 = "感覺有危險的人……\n啊，那邊！"
26012-CVGroup_ExSkill_3-1 = "呼呣……\n啊！危險！？"
26012-CVGroup_ExSkill_Level_1-1 = "本官將會出動！"
26012-CVGroup_ExSkill_Level_2-1 = "救生員來囉！"
26012-CVGroup_ExSkill_Level_3-1 = "請停止危險的遊戲！"
26012-CVGroup_Formation_In_1-1 = "輪到本官出動了呢！"
26012-CVGroup_Formation_In_2-1 = "要出動了！"
26012-CVGroup_Growup_1-1 = "本官，更加精進了！"
26012-CVGroup_Growup_2-1 = "感覺游泳的技術好像稍微提升了！\n應，應該不是錯覺吧？"
26012-CVGroup_Growup_3-1 = "第一是安全，第二也是安全！\n老師的安全也會由本官守護唷！"
26012-CVGroup_Growup_4-1 = "雖然還是個半吊子……\n但我會成為符合老師期待的那種救生員的！"
26012-CVGroup_Relationship_Up_1-1 = "老師，您擅長游泳嗎？\n需要本官教您嗎？"
26012-CVGroup_Relationship_Up_2-1 = "那個……馬上就是休息時間了……\n要，要不要跟本官一起……溜滑水道呢？"
26012-CVGroup_Relationship_Up_3-1 = "那個，要一起游泳嗎……？"
26012-CVGroup_Relationship_Up_4-1 = "那個……本官會隨時守望著老師。\n所以老師也請……把本官……"

[translation]
26012-CVGroup_CommonSkill-1 = "바, 받아주세요!"
26012-CVGroup_ExSkill_1-1 = "어디어디…… 거기! 정지하세요!"
26012-CVGroup_ExSkill_2-1 = "위험한 사람은…… 앗! 거기!"
26012-CVGroup_ExSkill_3-1 = "흐음…… 앗! 위험한 사람이!"
26012-CVGroup_ExSkill_Level_1-1 = "본관이 출동하겠습니다!"
26012-CVGroup_ExSkill_Level_2-1 = "라이프가드가 왔습니다!"
26012-CVGroup_ExSkill_Level_3-1 = "위험한 장난은 안 됩니다!"
26012-CVGroup_Formation_In_1-1 = "본관이 나설 차례군요!"
26012-CVGroup_Formation_In_2-1 = "출동하겠습니다!"
26012-CVGroup_Growup_1-1 = "본관, 더욱 열심히 정진하겠습니다!"
26012-CVGroup_Growup_2-1 = "수영 실력이 조금 는 것 같네요! 차, 착각은 아니겠죠?"
26012-CVGroup_Growup_3-1 = "첫째도 안전, 둘째도 안전! 선생님의 안전도 지켜드리겠습니다!"
26012-CVGroup_Growup_4-1 = "아직은 서툴지만…… 선생님께서 주신 기대에 걸맞은 라이프가드가 되겠습니다."
26012-CVGroup_Relationship_Up_1-1 = "선생님, 수영은 잘하세요? 본관이 가르쳐 드릴까요?"
26012-CVGroup_Relationship_Up_2-1 = "그…… 이제 곧 휴식시간입니다만……\n보, 본관과 함께 워터슬라이드…… 타러 가지 않으실래요?"
26012-CVGroup_Relationship_Up_3-1 = "저어, 같이 물에 들어가지 않으실래요……?"
26012-CVGroup_Relationship_Up_4-1 = "저어, 본관은 언제나 선생님을 지켜보고 있습니다.\n그러니까 선생님도…… 본관을……."

[translation]
26012-CVGroup_CommonSkill-1 = "ชะ... ช่วยรับไว้ด้วยนะคะ!"
26012-CVGroup_ExSkill_1-1 = "ไหนดูซิ... ตรงโน้นน่ะ! หยุดเลยนะคะ!"
26012-CVGroup_ExSkill_2-1 = "คนที่ตกอยู่ในอันตรายน่ะ... อ๊ะ! ตรงโน้น!"
26012-CVGroup_ExSkill_3-1 = "ฮืม... อ๊ะ! อันตราย!"
26012-CVGroup_ExSkill_Level_1-1 = "ฉันจะไปเองค่ะ!"
26012-CVGroup_ExSkill_Level_2-1 = "ไลฟ์การ์ดมาแล้วค่ะ!"
26012-CVGroup_ExSkill_Level_3-1 = "ห้ามเล่นอะไรอันตรายนะคะ!"
26012-CVGroup_Formation_In_1-1 = "ถึงคิวฉันออกโรงแล้วสินะคะ!"
26012-CVGroup_Formation_In_2-1 = "ออกปฏิบัติการค่ะ!"
26012-CVGroup_Growup_1-1 = "ฉันจะตั้งใจทำเต็มที่ค่ะ!"
26012-CVGroup_Growup_2-1 = "เหมือนฉันจะว่ายน้ำเก่งขึ้นมาหน่อยเลยค่ะ!\nคะ... คงไม่ได้คิดไปเองใช่มั้ยคะ?"
26012-CVGroup_Growup_3-1 = "อันดับแรกต้องความปลอดภัย อันดับสองก็ความปลอดภัย!\nฉันก็จะรักษาความปลอดภัยให้คุณครูด้วยค่ะ!"
26012-CVGroup_Growup_4-1 = "ถึงจะยังไม่เชี่ยวชาญ... แต่ฉันจะเป็นไลฟ์การ์ด\nที่ตรงตามความคาดหวังของคุณครูค่ะ"
26012-CVGroup_Relationship_Up_1-1 = "คุณครูว่ายน้ำเก่งมั้ยคะ?\nให้ฉันช่วยสอนมั้ยคะ?"
26012-CVGroup_Relationship_Up_2-1 = "เอ่อ... ใกล้จะถึงเวลาพักแล้ว...\nปะ... ไปเล่นสไลเดอร์สระน้ำ... กับฉันมั้ยคะ?"
26012-CVGroup_Relationship_Up_3-1 = "เอ่อ... ไปลงน้ำด้วยกันมั้ยคะ...?"
26012-CVGroup_Relationship_Up_4-1 = "เอ่อ... ฉันคอยเฝ้าดูคุณครูอยู่เสมอค่ะ\nเพราะงั้นคุณครูก็ต้อง... ฉัน..."

[translation]
20035-CVGroup_CommonSkill-1 = "자아…… 좋은 꿈 꿔……"
20035-CVGroup_ExSkill_1-1 = "자, 자. 그만."
20035-CVGroup_ExSkill_2-1 = "거기까지, 거기까지."
20035-CVGroup_ExSkill_3-1 = "모두들, 출발이야……"
20035-CVGroup_ExSkill_Level_1-1 = "이쪽이야, 이쪽. 차례차례…… 그렇지."
20035-CVGroup_ExSkill_Level_2-1 = "여기로, 여기로. 안내해 줄게."
20035-CVGroup_ExSkill_Level_3-1 = "서두르지 말고…… 응. 이쪽이야."
20035-CVGroup_Formation_In_1-1 = "어디를 안내하면 돼……?"
20035-CVGroup_Formation_In_2-1 = "밤에 잠이 안 오면…… 말해 줘……"
20035-CVGroup_Growup_1-1 = "오늘도 수행 중…… 잠이 늘어난 것 아니냐고? 착각이야…… 아마."
20035-CVGroup_Growup_2-1 = "수행을 위해 더욱 심기일전해야지…… 우선 베개부터 바꿔 볼까?"
20035-CVGroup_Growup_3-1 = "가이드란 어딘가로 누군가를 안내하는 것…… 나는 꿈나라 가이드야……"
20035-CVGroup_Growup_4-1 = "수행의 성과가 느껴지네…… 오늘은 푹 잘 수 있겠어……"
20035-CVGroup_Relationship_Up_1-1 = "어디로 안내해 줄까, 선생님……? 역시 침실이 좋아?"
20035-CVGroup_Relationship_Up_2-1 = "지금의 나는 수면 가이드 카스가 츠바키……\n불면증이 심해지면…… 불러 줘……"
20035-CVGroup_Relationship_Up_3-1 = "보통의 가이드도 잘 해 낼 수 있어…… 이것도 수행의 일환인걸……"
20035-CVGroup_Relationship_Up_4-1 = "선생님과 함께 있으면, 수행이 더 잘 되는 것 같아……\n응…… 가이드도, 숙면도, 그리고 다른 것도……"

[translation]
20035-CVGroup_CommonSkill-1 = "Now...sweet dreams..."
20035-CVGroup_ExSkill_1-1 = "Now, now. Stop that."
20035-CVGroup_ExSkill_2-1 = "That's as far as you go."
20035-CVGroup_ExSkill_3-1 = "We're off, everyone..."
20035-CVGroup_ExSkill_Level_1-1 = "This way, please. One at a time... There we go."
20035-CVGroup_ExSkill_Level_2-1 = "Over here, this way. I'll show you where to go."
20035-CVGroup_ExSkill_Level_3-1 = "When you're ready, this way, please."
20035-CVGroup_Formation_In_1-1 = "Where do I need to guide you...?"
20035-CVGroup_Formation_In_2-1 = "If you can't sleep at night, let me know..."
20035-CVGroup_Growup_1-1 = "I have training today? I thought I was just going to sleep more. You're probably mistaken, I think."
20035-CVGroup_Growup_2-1 = "I need to be more focused on my training. First, I should change my pillow."
20035-CVGroup_Growup_3-1 = "A guide is meant to help someone to their destination. I'm a guide to dreamland, in that sense..."
20035-CVGroup_Growup_4-1 = "I can tell my training is paying off. I should be able to sleep well tonight..."
20035-CVGroup_Relationship_Up_1-1 = "Where would you like me to guide you, Sensei? To a quality mattress?"
20035-CVGroup_Relationship_Up_2-1 = "Yes... So now, I'm Kasuga Tsubaki, Sleep Guide. Anytime you suffer from insomnia, call on me."
20035-CVGroup_Relationship_Up_3-1 = "I can do my regular role as a guide... This is all a kind of training, after all..."
20035-CVGroup_Relationship_Up_4-1 = "I feel like my training goes better when I'm with you, Sensei... Yeah... My training as a guide, my sleep, and other things..."

[translation]
20035-CVGroup_CommonSkill-1 = "เอาละ... ฝันดีนะ..."
20035-CVGroup_ExSkill_1-1 = "เอาละๆ พอแล้ว"
20035-CVGroup_ExSkill_2-1 = "เอ๋... แค่ตรงนั้นพอ แค่ตรงนั้น"
20035-CVGroup_ExSkill_3-1 = "ทุกคน ออกเดินทางได้..."
20035-CVGroup_ExSkill_Level_1-1 = "ทางนี้ ทางนี้\nตามลำดับนะ... อย่างนั้นละ"
20035-CVGroup_ExSkill_Level_2-1 = "ทางนี้ ทางนี้ ฉันจะพาไปเอง"
20035-CVGroup_ExSkill_Level_3-1 = "ไม่ต้องรีบนะ... อื้อ ทางนี้ละ"
20035-CVGroup_Formation_In_1-1 = "ให้นำทางไปที่ไหนล่ะ...?"
20035-CVGroup_Formation_In_2-1 = "ถ้ากลางคืนนอนไม่หลับ... บอกฉันได้นะ..."
20035-CVGroup_Growup_1-1 = "วันนี้ฉันก็ฝึกฝนอยู่... ฉันนอนมากกว่าเดิมหรือเปล่าน่ะเหรอ?\nคิดไปเองแล้วละ... คิดว่านะ"
20035-CVGroup_Growup_2-1 = "ต้องตั้งจิตมุ่งมั่นเพื่อการฝึกฝนแล้วละ...\nงั้นลองเปลี่ยนหมอนดูก่อนมั้ย?"
20035-CVGroup_Growup_3-1 = "การเป็นไกด์คือการพาคนอื่นไปยังสถานที่หนึ่ง...\nฉันคือไกด์แห่งดินแดนแห่งความฝัน"
20035-CVGroup_Growup_4-1 = "รู้สึกได้ถึงผลจากการฝึกเลยแฮะ... วันนี้คงหลับสนิทแน่เลย..."
20035-CVGroup_Relationship_Up_1-1 = "ให้ฉันพาไปที่ไหนดีล่ะคุณครู...? ห้องนอนก็คงจะดีเนอะ?"
20035-CVGroup_Relationship_Up_2-1 = "ตอนนี้ฉันคือไกด์การนอน คาซึกะ สึบากิ...\nถ้านอนไม่หลับหนักขึ้น... ก็เรียกได้เลยนะ"
20035-CVGroup_Relationship_Up_3-1 = "ไกด์ธรรมดาฉันก็ทำได้ดีนะ... นี่ก็เป็นส่วนหนึ่งของการฝึกฝนนะ..."
20035-CVGroup_Relationship_Up_4-1 = "ถ้าได้อยู่กับคุณครู เหมือนฉันจะฝึกฝนได้ดีขึ้นเลย...\nอืม... ทั้งเรื่องไกด์ การนอน แล้วก็อย่างอื่นด้วย..."

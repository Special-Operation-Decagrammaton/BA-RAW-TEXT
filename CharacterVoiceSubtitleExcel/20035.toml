[translation]
20035-CVGroup_CommonSkill-1 = "來……\n要做個好夢哦……"
20035-CVGroup_ExSkill_1-1 = "好了好了，適可而止哦。"
20035-CVGroup_ExSkill_2-1 = "咦……？\n到此為止，到此為止。"
20035-CVGroup_ExSkill_3-1 = "大家，出發囉……"
20035-CVGroup_ExSkill_Level_1-1 = "這邊唷，這邊。\n按照順序……沒錯沒錯。"
20035-CVGroup_ExSkill_Level_2-1 = "這邊這邊。\n由我來導覽。"
20035-CVGroup_ExSkill_Level_3-1 = "別急……\n嗯，往這邊唷。"
20035-CVGroup_Formation_In_1-1 = "要幫你導覽哪裡……？"
20035-CVGroup_Formation_In_2-1 = "晚上睡不著的話……要跟我說哦……"
20035-CVGroup_Growup_1-1 = "今天也在修行中……\n睡眠是不是增加了？是誤會唷……大概。"
20035-CVGroup_Growup_2-1 = "為了修行，得再換換心情才行……\n總之先從枕頭開始改變吧？"
20035-CVGroup_Growup_3-1 = "導覽員的工作就是帶領某人前往某個地方……\n我就是夢之國的導覽員哦……"
20035-CVGroup_Growup_4-1 = "能感受到修行的成果呢……\n今天好像能睡個好覺……"
20035-CVGroup_Relationship_Up_1-1 = "該為你導覽哪裡呢，老師……？\n果然還是寢室好嗎～？"
20035-CVGroup_Relationship_Up_2-1 = "今天的我是睡眠導覽員春日椿……\n要是失眠很嚴重的話……就跟我說吧……"
20035-CVGroup_Relationship_Up_3-1 = "普通的導覽員也能好好勝任唷……\n畢竟這也是修行的一環……"
20035-CVGroup_Relationship_Up_4-1 = "只要跟老師待在一起，修行似乎就會進展得很順利……\n嗯……不管是導覽、熟睡，還是其他事情……"

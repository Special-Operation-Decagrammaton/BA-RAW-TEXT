16010-CVGroup_Relationship_Up_2-1 = "If ever you need me, just say the word! I couldn't possibly wear this every day, but..."
16010-CVGroup_Relationship_Up_3-1 = "Something feels a little...out of the ordinary, I guess? I mean, I AM in this...outfit..."
16010-CVGroup_Relationship_Up_4-1 = "I feel like I should be cheering you on, but our roles are reversed. It actually makes me feel quite happy. I look forward to your support, Sensei."
16010-CVGroup_Tactic_In_1-1 = "We've got this, Sensei."
16010-CVGroup_Tactic_In_2-1 = "Yep, I'll see what I can do."
16010-CVGroup_Tactic_Victory_1-1 = "Phew... That's over. What did you think?"
16010-CVGroup_Tactic_Victory_2-1 = "It's easier to try things when I'm cosplaying. Unless... Maybe it's because I'm with you, Sensei."

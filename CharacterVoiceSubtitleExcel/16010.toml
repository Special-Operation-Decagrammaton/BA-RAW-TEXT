[translation]
16010-CVGroup_Battle_Buffed_1-1 = "Okay...for me?"
16010-CVGroup_Battle_Defense_1-1 = "Yep... It's no use."
16010-CVGroup_Battle_In_1-1 = "Wearing this outfit in front of other people feels so...awkward."
16010-CVGroup_Battle_In_2-1 = "I'm not really the type to do this but... I don't have a choice."
16010-CVGroup_Battle_Move_1-1 = "Where to next?"
16010-CVGroup_Battle_Move_2-1 = "Thank you, everyone."
16010-CVGroup_Battle_Recovery_1-1 = "Ah, thank you. I needed that."
16010-CVGroup_Battle_TacticalAction_1-1 = "Moving."
16010-CVGroup_Battle_Victory_1-1 = "How effective was the cheering?"
16010-CVGroup_Battle_Victory_2-1 = "Did I get my feelings across...?"
16010-CVGroup_CommonSkill-1 = "W-Well, I'm a ch-cheerleader...for now!"
16010-CVGroup_ExSkill_1-1 = "Go, team, go! Whoa... How embarrassing."
16010-CVGroup_ExSkill_2-1 = "Rah! Rah...! Oh..."
16010-CVGroup_ExSkill_3-1 = "Fight! Win! ...Am I doing it right?"
16010-CVGroup_ExSkill_Level_1-1 = "...This is preferable."
16010-CVGroup_ExSkill_Level_2-1 = "Just like always..."
16010-CVGroup_ExSkill_Level_3-1 = "H-How's this...?"
16010-CVGroup_Formation_In_1-1 = "...Yes. If it's for you, Sensei."
16010-CVGroup_Formation_In_2-1 = "Do you need me to...cheer?"
16010-CVGroup_Formation_Select-1 = "R-Rah! Rah!"
16010-CVGroup_Growup_1-1 = "What a strange feeling... It's not bad though... More, please."
16010-CVGroup_Growup_2-1 = "What do you think, Sensei? I-I...hope you like it."

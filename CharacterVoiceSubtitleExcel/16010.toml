[translation]
16010-CVGroup_Battle_Buffed_1-1 = "응… 나한테?"
16010-CVGroup_Battle_Defense_1-1 = "응…… 소용없어."
16010-CVGroup_Battle_In_1-1 = "역시…… 이 옷차림으로 남 앞에 나서는 건 어색하네."
16010-CVGroup_Battle_In_2-1 = "나, 이런 타입은 아니라고 생각하지만…… 어쩔 수 없지."
16010-CVGroup_Battle_Move_1-1 = "다음은 어디?"
16010-CVGroup_Battle_Move_2-1 = "모두, 고마워."
16010-CVGroup_Battle_Recovery_1-1 = "아, 고마워. 마침 필요했어."
16010-CVGroup_Battle_TacticalAction_1-1 = "이동할게."
16010-CVGroup_Battle_Victory_1-1 = "응원의 효과…… 어때?"
16010-CVGroup_Battle_Victory_2-1 = "내 진심…… 전해졌어?"
16010-CVGroup_CommonSkill-1 = "이, 일단은 치어리더……니까……!"
16010-CVGroup_ExSkill_1-1 = "힘내라! 힘내라……! 우으…… 부끄러워."
16010-CVGroup_ExSkill_2-1 = "플레이! 플레이…! …아우우…"
16010-CVGroup_ExSkill_3-1 = "싸워라! 이겨라! ……이거 맞아?"
16010-CVGroup_ExSkill_Level_1-1 = "……차라리 이게 낫겠어."
16010-CVGroup_ExSkill_Level_2-1 = "평소처럼 하자……."
16010-CVGroup_ExSkill_Level_3-1 = "이, 이건 어때……?"
16010-CVGroup_Formation_In_1-1 = "……응. 선생님을 위해서라면."
16010-CVGroup_Formation_In_2-1 = "응원이…… 필요해?"
16010-CVGroup_Formation_Select-1 = "프, 플레이……! 플레이……!"
16010-CVGroup_Growup_1-1 = "묘한 기분…… 나쁘진 않아. 더 부탁해, 선생님."
16010-CVGroup_Growup_2-1 = "선생님이 보기에는 어때? 맘에 들었으면…… 좋겠는데."
16010-CVGroup_Growup_3-1 = "센스가 좋다고? 이거…… 내가 만든 거니까."
16010-CVGroup_Growup_4-1 = "어떤 모습이라도 최고를 노리고 있어. ……그래. 마이스터니까."
16010-CVGroup_Relationship_Up_1-1 = "원래 이럴 의도는 아니었지만…. 선생님이 좋다면, 좀 더 입고 있을게."
16010-CVGroup_Relationship_Up_2-1 = "내가 필요하면 언제든지 말해. 언제나 이 모습으로는 좀 그렇겠지만……."
16010-CVGroup_Relationship_Up_3-1 = "평소와는 좀 다른거 같다구……? 그런, 가.\n뭐, 그야… 이런 복장, 이기도 하고……"
16010-CVGroup_Relationship_Up_4-1 = "어쩐지, 응원해야 할 입장인데, 도리어 응원받는 느낌이네.\n……아니, 기뻐. 앞으로도 잘 부탁해, 선생님."
16010-CVGroup_Tactic_In_1-1 = "파이팅이야, 선생님."
16010-CVGroup_Tactic_In_2-1 = "응, 일단 열심히 해볼게."
16010-CVGroup_Tactic_Victory_1-1 = "휴……. 끝났네. 어때. 괜찮았던 거 같아……?"
16010-CVGroup_Tactic_Victory_2-1 = "코스프레 차림으로 이것저것 하는 것도 나쁘지 않네.\n……선생님과 함께여서 그런걸까."

[translation]
16010-CVGroup_Battle_Buffed_1-1 = "หืม... ให้ฉันเหรอ?"
16010-CVGroup_Battle_Defense_1-1 = "อืม... ไม่มีประโยชน์หรอก"
16010-CVGroup_Battle_In_1-1 = "จริงๆ เลย... พอให้ใส่ชุดนี้ไปอยู่แนวหน้า มันก็ประหม่านะ"
16010-CVGroup_Battle_In_2-1 = "ฉันไม่คิดว่าตัวเองเป็นคนประเภทนั้นนะ... แต่ก็คงช่วยไม่ได้"
16010-CVGroup_Battle_Move_1-1 = "ต่อไปที่ไหนเหรอ?"
16010-CVGroup_Battle_Move_2-1 = "ขอบคุณนะทุกคน"
16010-CVGroup_Battle_Recovery_1-1 = "อ๊ะ ขอบคุณนะ กำลังอยากได้พอดีเลย"
16010-CVGroup_Battle_TacticalAction_1-1 = "จะไปเดี๋ยวนี้ละ"
16010-CVGroup_Battle_Victory_1-1 = "การเชียร์... ได้ผลเป็นไงบ้าง?"
16010-CVGroup_Battle_Victory_2-1 = "ความจริงใจของฉัน... ส่งไปถึงหรือเปล่า?"
16010-CVGroup_CommonSkill-1 = "กะ... ก็ฉันเป็นเชียร์ลีดเดอร์... นี่นา...!"
16010-CVGroup_ExSkill_1-1 = "สู้ๆ! สู้เค้า...!\nอึก... อายจัง"
16010-CVGroup_ExSkill_2-1 = "เพลย์! เพลย์...!\nอ่า..."
16010-CVGroup_ExSkill_3-1 = "ลุยเลย! ต้องชนะนะ!\nแบบนี้ถูกมั้ยนะ...?"
16010-CVGroup_ExSkill_Level_1-1 = "อันนี้น่าจะดีกว่านะ"
16010-CVGroup_ExSkill_Level_2-1 = "ทำให้เหมือนปกติเถอะ..."
16010-CVGroup_ExSkill_Level_3-1 = "อะ... อันนี้ล่ะ เป็นไงบ้าง...?"
16010-CVGroup_Formation_In_1-1 = "อื้อ... ถ้าเพื่อคุณครูแล้วละก็"
16010-CVGroup_Formation_In_2-1 = "อยากได้... แรงเชียร์เหรอ?"
16010-CVGroup_Formation_Select-1 = "พะ... เพลย์...! เพลย์...!"
16010-CVGroup_Growup_1-1 = "รู้สึกแปลกๆ... แต่ก็ไม่แย่เท่าไร\nฝากด้วยนะ คุณครู"
16010-CVGroup_Growup_2-1 = "คุณครูคิดว่ายังไงบ้าง?\nถ้าถูกใจ... ก็คงจะดีสินะ"
16010-CVGroup_Growup_3-1 = "เซนส์ดีงั้นเหรอ?\nอันนี้... ฉันเป็นคนทำมาเองน่ะ"
16010-CVGroup_Growup_4-1 = "ไม่ว่าจะใส่ชุดไหน ฉันก็จะเป็นที่หนึ่ง\nใช่... ก็ฉันเป็นไมสเตอร์นี่นา"
16010-CVGroup_Relationship_Up_1-1 = "ตอนแรกฉันไม่ได้ตั้งใจจะทำแบบนี้หรอกนะ...\nแต่ถ้าคุณครูชอบ ฉันก็จะใส่มาอีก"
16010-CVGroup_Relationship_Up_2-1 = "ถ้าต้องการฉัน ก็บอกได้ทุกเมื่อเลย\nถึงแม้ใส่ชุดนี้แล้วมันจะ..."
16010-CVGroup_Relationship_Up_3-1 = "ดูแตกต่างไปจากปกติงั้นเหรอ...? งั้น... เหรอ?\nกะ... ก็นะ... ก็มันเป็นชุดแบบนี้นี่นา..."
16010-CVGroup_Relationship_Up_4-1 = "ฉันเป็นฝ่ายเชียร์แท้ๆ แต่ฉันกลับได้กำลังใจมาแทนซะงั้น\nไม่หรอก... ฉันดีใจน่ะ ต่อไปก็ขอฝากตัวด้วยนะ คุณครู"
16010-CVGroup_Tactic_In_1-1 = "สู้ๆ นะ คุณครู"
16010-CVGroup_Tactic_In_2-1 = "อื้อ ฉันจะพยายามดูก่อนนะ"
16010-CVGroup_Tactic_Victory_1-1 = "ฮู่ว... เสร็จเสียที\nเป็นยังบ้าง? ใช้ได้หรือเปล่า...?"
16010-CVGroup_Tactic_Victory_2-1 = "การใส่ชุดคอสเพลย์แล้วทำนู่นนี่ก็ไม่เลวนะ\nเพราะว่าอยู่กับคุณครูหรือเปล่านะ..."

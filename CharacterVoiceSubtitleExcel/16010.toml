[translation]
16010-CVGroup_Battle_Buffed_1-1 = "嗯……要給我？"
16010-CVGroup_Battle_Defense_1-1 = "嗯……沒用的唷。"
16010-CVGroup_Battle_In_1-1 = "果然……用這副打扮出現在人們面前還是很不習慣。"
16010-CVGroup_Battle_In_2-1 = "我，雖然不是那種類型……不過也沒辦法了。"
16010-CVGroup_Battle_Move_1-1 = "接下來是哪裡？"
16010-CVGroup_Battle_Move_2-1 = "大家，謝謝。"
16010-CVGroup_Battle_Recovery_1-1 = "啊！謝謝。我正好需要。"
16010-CVGroup_Battle_TacticalAction_1-1 = "要上囉。"
16010-CVGroup_Battle_Victory_1-1 = "應援的效果……如何？"
16010-CVGroup_Battle_Victory_2-1 = "我的真心……傳達到了嗎？"
16010-CVGroup_CommonSkill-1 = "畢，畢竟是啦啦隊……所以……！"
16010-CVGroup_ExSkill_1-1 = "加油！加油……！\n嗚嗚……好害羞。"
16010-CVGroup_ExSkill_2-1 = "加油！加油……！\n……啊嗚。"
16010-CVGroup_ExSkill_3-1 = "上吧！加油！\n……這樣對嗎？"
16010-CVGroup_ExSkill_Level_1-1 = "……乾脆這樣也不錯。"
16010-CVGroup_ExSkill_Level_2-1 = "用跟平常一樣的方式吧……"
16010-CVGroup_ExSkill_Level_3-1 = "這，這樣如何……？"
16010-CVGroup_Formation_In_1-1 = "……嗯。如果是為了老師的話。"
16010-CVGroup_Formation_In_2-1 = "應援……需要嗎？"
16010-CVGroup_Formation_Select-1 = "加，加油……！加油……！"
16010-CVGroup_Growup_1-1 = "不可思議的感覺……不過還不錯。\n可以再給我更多嗎，老師。"
16010-CVGroup_Growup_2-1 = "老師覺得怎麼樣呢？\n如果喜歡的話……就太好了。"
16010-CVGroup_Growup_3-1 = "很有品味是嗎？\n這個……是我自己做的唷。"
16010-CVGroup_Growup_4-1 = "無論打扮成什麼模樣，我都會以巔峰為目標。\n……沒錯，因為我是巨匠。"
16010-CVGroup_Relationship_Up_1-1 = "本來是沒有這個打算的……\n不過要是老師希望的話，我再多維持這個打扮一下吧。"
16010-CVGroup_Relationship_Up_2-1 = "需要我的時候隨時跟我說吧。\n雖然永遠打扮成這樣，好像有點那個……"
16010-CVGroup_Relationship_Up_3-1 = "跟往常的樣子不一樣……？是嗎？\n這個嘛，畢竟……都打扮成這樣了……"
16010-CVGroup_Relationship_Up_4-1 = "總覺得明明處在為人應援的立場，卻反而是我被應援了呢。\n……不會，我很開心。今後也請多指教囉，老師。"
16010-CVGroup_Tactic_In_1-1 = "加油唷，老師。"
16010-CVGroup_Tactic_In_2-1 = "嗯，總之會加油的。"
16010-CVGroup_Tactic_Victory_1-1 = "呼……結束了呢。\n怎麼樣？感覺還好嗎？"
16010-CVGroup_Tactic_Victory_2-1 = "用Cosplay的打扮做各種事也不錯呢。\n……是因為跟老師在一起嗎。"

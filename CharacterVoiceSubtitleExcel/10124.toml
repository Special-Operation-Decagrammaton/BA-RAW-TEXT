10124-CVGroup_Growup_2-1 = "Rest is training as well. Intensity must be moderated as well... I'll keep that in mind."
10124-CVGroup_Growup_3-1 = "Hm, that's all for today's class? Since we're at the beach today? Well, in that case...would you mind joining me?"

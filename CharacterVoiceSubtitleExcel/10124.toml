10124-CVGroup_Relationship_Up_2-1 = "I treasure everything I receive from you, Sensei. Gifts, your words, and even your feelings."
10124-CVGroup_Relationship_Up_3-1 = "If you keep doing this... I might misunderstand. Please don't give me hope like that."
10124-CVGroup_Relationship_Up_4-1 = "If I could be a little greedy... No, never mind. Just this is enough."

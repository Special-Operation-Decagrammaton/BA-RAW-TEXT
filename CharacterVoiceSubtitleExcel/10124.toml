[translation]
10124-CVGroup_Battle_Buffed_1-1 = "是，請交給我吧！"
10124-CVGroup_Battle_Covered_1-1 = "確保掩護物。"
10124-CVGroup_Battle_Defense_1-1 = "只有這點程度嗎？"
10124-CVGroup_Battle_In_1-1 = "我會全力確保萬無一失。"
10124-CVGroup_Battle_In_2-1 = "發現敵人。開始交戰。"
10124-CVGroup_Battle_Move_1-1 = "敵人已殲滅。移動至下一個區域。"
10124-CVGroup_Battle_Move_2-1 = "區域確保。開始前進。"
10124-CVGroup_Battle_Recovery_1-1 = "感謝援護！"
10124-CVGroup_Battle_TacticalAction_1-1 = "移動至目標地點。"
10124-CVGroup_Battle_Victory_1-1 = "自即刻起解除戰鬥態勢。"
10124-CVGroup_Battle_Victory_2-1 = "沒錯，這是理所當然的結果。"
10124-CVGroup_CommonSkill-1 = "因為西瓜是蔬菜！"
10124-CVGroup_ExSkill_1-1 = "只要用心眼來觀察……這點程度！！哈啊！"
10124-CVGroup_ExSkill_2-1 = "這裡……？咦？這邊？……是那裡！"
10124-CVGroup_ExSkill_3-1 = "高手不擇筆……不擇筆……嘿！"
10124-CVGroup_ExSkill_Level_1-1 = "就算不看也能命中。"
10124-CVGroup_ExSkill_Level_2-1 = "這種程度，簡單。"
10124-CVGroup_ExSkill_Level_3-1 = "命中。如我所料呢。"
10124-CVGroup_Formation_In_1-1 = "無論情況如何，都要徹底執行。\n沒有例外。"
10124-CVGroup_Formation_In_2-1 = "請交給我吧。\n我早已預想到去渡假時會發生這種事了。"
10124-CVGroup_Formation_Select-1 = "請告訴我狀況吧。我會立即應對。"
10124-CVGroup_Growup_1-1 = "無論在哪裡都能學到東西呢。\n感謝您的指導。"
10124-CVGroup_Growup_2-1 = "休息也是訓練的一部分……\n必須張弛有度，我會牢記在心。"
10124-CVGroup_Growup_3-1 = "嗯？今天的課程到此為止？\n因為在海邊……？\n呵呵，那麼能請您陪我一下嗎？"
10124-CVGroup_Growup_4-1 = "老師教給我的一切……\n以及讓我成長的回憶，我絕不會忘記。"
10124-CVGroup_Relationship_Up_1-1 = "老師，能再多佔用您一些時間嗎？\n就這樣……再多一會。"
10124-CVGroup_Relationship_Up_2-1 = "收到的東西，我全都很珍惜。\n無論物品、言語，還是心意。"
10124-CVGroup_Relationship_Up_3-1 = "總是一味接受的話，會漸漸讓人習慣的。\n不能再變得更貪心了……"
10124-CVGroup_Relationship_Up_4-1 = "再一步就好……沒，沒事。我什麼都沒說。\n我會珍惜現在這個距離的。"
10124-CVGroup_Tactic_In_1-1 = "進入作戰區域。老師，請指示。"
10124-CVGroup_Tactic_In_2-1 = "自即刻起進入戰鬥態勢。"
10124-CVGroup_Tactic_Victory_1-1 = "是否有保住身為幹部的顏面呢。"
10124-CVGroup_Tactic_Victory_2-1 = "作戰結束。並無疏漏。"

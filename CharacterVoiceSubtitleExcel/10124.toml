[translation]
10124-CVGroup_Battle_Buffed_1-1 = "예, 맡겨주시길!"
10124-CVGroup_Battle_Covered_1-1 = "간이 엄폐물 확보."
10124-CVGroup_Battle_Defense_1-1 = "그게 최선입니까?"
10124-CVGroup_Battle_In_1-1 = "철두철미하게 호위하겠습니다."
10124-CVGroup_Battle_In_2-1 = "적대 세력과 접촉했습니다. 교전 개시합니다."
10124-CVGroup_Battle_Move_1-1 = "적 섬멸. 지역 장악합니다."
10124-CVGroup_Battle_Move_2-1 = "구역 확보. 전진합니다."
10124-CVGroup_Battle_Recovery_1-1 = "지원에, 감사를!"
10124-CVGroup_Battle_TacticalAction_1-1 = "목표 지점으로 이동."
10124-CVGroup_Battle_Victory_1-1 = "현 시간부로 교전 상태를 해제합니다."
10124-CVGroup_Battle_Victory_2-1 = "예에, 당연한 결과입니다."
10124-CVGroup_CommonSkill-1 = "수박은, 채소니까요!"
10124-CVGroup_ExSkill_1-1 = "마음의 눈으로 본다면, 이 정도는…… 이잇!!"
10124-CVGroup_ExSkill_2-1 = "분명 이쪽? 어라? ……저격합니다!"
10124-CVGroup_ExSkill_3-1 = "장인은 도구를…… 도구를…… 에잇!"
10124-CVGroup_ExSkill_Level_1-1 = "눈을 가리고도 맞히겠군요."
10124-CVGroup_ExSkill_Level_2-1 = "이 정도는 간단합니다."
10124-CVGroup_ExSkill_Level_3-1 = "명중. 예상대로네요."
10124-CVGroup_Formation_In_1-1 = "어떤 상황에서도, 철저하게. 예외는 없습니다."
10124-CVGroup_Formation_In_2-1 = "좋습니다. 한가로이 바캉스를 즐길 생각은 없었습니다."
10124-CVGroup_Formation_Select-1 = "호출입니까? 즉시 응하겠습니다."
10124-CVGroup_Growup_1-1 = "낯선 장소에는 새로운 가르침이 있군요. 지도 편달에 감사드립니다."
10124-CVGroup_Growup_2-1 = "휴식도 훈련의 일부…… 강약을 조절하는 게 중요하다, 라고 마음에 새겨듣겠습니다."
10124-CVGroup_Growup_3-1 = "예? 오늘 수업은 여기까지?\n모처럼 바다이니, 라고 하셔도……\n그렇다면 잠깐만, 어울려 주시겠습니까?"
10124-CVGroup_Growup_4-1 = "선생님과 함께하는 매 순간 잊지 못할 것들이 늘어만 갑니다.\n언젠가 제 안이 가득 차 버리고 말 거 같습니다."
10124-CVGroup_Relationship_Up_1-1 = "혹시… 잠깐만 제 곁에 계셔 주실 수 있나요?\n네, 그걸로, 그것만으로 충분합니다."
10124-CVGroup_Relationship_Up_2-1 = "선생님께 받은 것은, 모두 소중히 간직하고 있습니다.\n물건도, 말도, 마음도."
10124-CVGroup_Relationship_Up_3-1 = "자꾸 이러시니…… 착각하게 됩니다.\n저의 바람을 더 늘리지 말아 주세요."
10124-CVGroup_Relationship_Up_4-1 = "조금만 욕심을 말해도 좋다면……\n아니요, 아무것도 아닙니다. 대신, 지금 이대로."
10124-CVGroup_Tactic_In_1-1 = "작전 구역 진입. 지시를 대기합니다."
10124-CVGroup_Tactic_In_2-1 = "현 시간부로 작전 상태에 돌입합니다."
10124-CVGroup_Tactic_Victory_1-1 = "정의실현부 부부장으로서, 약간은 체면이 섰군요."
10124-CVGroup_Tactic_Victory_2-1 = "작전 종료. 물론, 완승입니다."

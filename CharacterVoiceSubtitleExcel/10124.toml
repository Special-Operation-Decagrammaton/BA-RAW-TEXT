10124-CVGroup_ExSkill_1-1 = "As a matter of a heart, this much is... Eeek!!"
10124-CVGroup_ExSkill_2-1 = "Was it this way? Huh? ...Taking my shot!"
10124-CVGroup_ExSkill_3-1 = "A good craftsman never...never... Eeeh!"
10124-CVGroup_ExSkill_Level_1-1 = "I can hit that with my eyes closed."

[translation]
20024-CVGroup_CommonSkill-1 = "입맛에 맞았으면 좋겠군요."
20024-CVGroup_ExSkill_1-1 = "멋진 티타임에 음악을 빼놓을 수 없지요."
20024-CVGroup_ExSkill_2-1 = "예포는 약식으로. 다만, 경의를 잊지 마세요."
20024-CVGroup_ExSkill_3-1 = "가끔은 풍미를 바꾸는 것도 나쁘지 않네요."
20024-CVGroup_ExSkill_Level_1-1 = "포수, 지원을."
20024-CVGroup_ExSkill_Level_2-1 = "손님 배웅도, 정중하게."
20024-CVGroup_ExSkill_Level_3-1 = "트리니티의 포격술은 우수하니까요."
20024-CVGroup_Formation_In_1-1 = "후후, 오늘은 조금 먼 곳 까지 산책을 나가볼까요."
20024-CVGroup_Formation_In_2-1 = "식후 운동에 딱 좋네요."
20024-CVGroup_Growup_1-1 = "선생님의 가르침, 마음 깊이 새겨두겠습니다."
20024-CVGroup_Growup_2-1 = "후후. 이 정도의 힘이라면 트리니티의 호스트로서 부족함은 없겠지요."
20024-CVGroup_Growup_3-1 = "과연, 그런 방법이……"
20024-CVGroup_Growup_4-1 = "선생님한테는 받기만 하네요… 감사합니다."
20024-CVGroup_Relationship_Up_1-1 = "선생님과의 티타임은……\n왠지 평소보다 차를 즐기는 시간이 길어지는 느낌이네요."
20024-CVGroup_Relationship_Up_2-1 = "맛있는 홍차가 그리워지면, 언제든지 티파티에 찾아오시길.\n기다리고 있겠습니다."
20024-CVGroup_Relationship_Up_3-1 = "후후, 언제나 신경 써 주셔서 감사합니다."
20024-CVGroup_Relationship_Up_4-1 = "선생님의 배려에 감사드립니다.\n트리니티 학생들을 대표하여 감사의 말씀을 드립니다."

[translation]
20024-CVGroup_CommonSkill-1 = "希望能符合口味。"
20024-CVGroup_ExSkill_1-1 = "美妙的品茶時光可不能缺少音樂呢。"
20024-CVGroup_ExSkill_2-1 = "禮炮就從簡吧。\n不過，切勿忘了心懷敬意。"
20024-CVGroup_ExSkill_3-1 = "偶爾改變一下風味也不錯呢。"
20024-CVGroup_ExSkill_Level_1-1 = "炮手，請支援。"
20024-CVGroup_ExSkill_Level_2-1 = "送客也必須注重禮節。"
20024-CVGroup_ExSkill_Level_3-1 = "畢竟三一的炮擊術是很優秀的。"
20024-CVGroup_Formation_In_1-1 = "呵呵，今天就順便到稍微遠一點的地方去吧。"
20024-CVGroup_Formation_In_2-1 = "作為飯後運動恰到好處呢。"
20024-CVGroup_Growup_1-1 = "老師的話語，我會銘記於心。"
20024-CVGroup_Growup_2-1 = "呵呵，憑藉著這股力量，要擔任茶會的主席也不成問題吧。"
20024-CVGroup_Growup_3-1 = "原來如此，那種方法……"
20024-CVGroup_Growup_4-1 = "我總是從老師手中獲得好處呢……謝謝您。"
20024-CVGroup_Relationship_Up_1-1 = "與老師的品茶時光……\n總覺得享受茶的時間似乎比平時更長呢。"
20024-CVGroup_Relationship_Up_2-1 = "如果想念美味的紅茶，請隨時到茶會來吧。\n我會等候著您。"
20024-CVGroup_Relationship_Up_3-1 = "呵呵，您一直以來的關心，真是非常感謝。"
20024-CVGroup_Relationship_Up_4-1 = "感謝老師的關心。\n在此代表三一所有學生向您致謝。"

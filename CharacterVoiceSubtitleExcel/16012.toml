16012-CVGroup_Relationship_Up_1-1 = "있잖아…….이 옷, 어울리려나?\n이런 거, 별로 익숙하지 않은데…….\n왜, 왜 웃는 거야!"
16012-CVGroup_Relationship_Up_2-1 = "선생님은…… 신기한 사람이야. \n같이 있으면…….\n여, 역시 아무것도 아니야! 잊어!"
16012-CVGroup_Relationship_Up_3-1 = "치, 칭찬해도 아무 것도 안 나오니까 말이지!\n그, 뭐냐, 나올 때도…… 있긴 하지만."
16012-CVGroup_Relationship_Up_4-1 = "다음에, 맛있는 거 먹으러 갈래? 그…… 둘이서만, 말이야."

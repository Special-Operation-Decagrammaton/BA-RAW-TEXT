[translation]
16012-CVGroup_Battle_Buffed_1-1 = "แต้งกิ้ว! ไว้จะตอบแทนทีหลังนะ!"
16012-CVGroup_Battle_Covered_1-1 = "ฉันแอบอยู่น่ะ!"
16012-CVGroup_Battle_Defense_1-1 = "เห็นหมดเลยเหอะ!"
16012-CVGroup_Battle_In_1-1 = "คุณครู ดูอยู่ใช่มั้ย? เดี๋ยวฉันมานะ!"
16012-CVGroup_Battle_In_2-1 = "แค่นี้ก็ชนะง่ายๆ น่า!"
16012-CVGroup_Battle_Move_1-1 = "ไม่มี... ของกินอะไรเหรอ..."
16012-CVGroup_Battle_Move_2-1 = "หิวกว่าเดิมแล้ว..."
16012-CVGroup_Battle_Recovery_1-1 = "รอดได้เพราะคุณครูเลยนะ!"
16012-CVGroup_Battle_TacticalAction_1-1 = "ไปต่อกันเลยมั้ย~!"
16012-CVGroup_Battle_Victory_1-1 = "ตอนนี้คงไม่เป็นไรแล้วเนอะ...?\nหืม?! ว่างมั้ย?!"
16012-CVGroup_Battle_Victory_2-1 = "ถ้าที่นี่ก็คงปลอดภัยละเนอะ...?\nอ๊ะ ทำไมล่ะ!?"
16012-CVGroup_CommonSkill-1 = "ย้าก!"
16012-CVGroup_ExSkill_1-1 = "ค่อยๆ นะ ระวังด้วย...\nว้ากก?! ทำอะไรน่ะ!"
16012-CVGroup_ExSkill_2-1 = "ฮืม ฮืมม~♪\nว้ายยย?! ยะ... ยกโทษให้ไม่ได้...!"
16012-CVGroup_ExSkill_3-1 = "ฮึบ ฮึบ...\nวะ... ว้าย?! ทำไม... ทำไมเป็นฉันตลอด...!"
16012-CVGroup_ExSkill_Level_1-1 = "รับไปซะะะะ!"
16012-CVGroup_ExSkill_Level_2-1 = "ฉันก็ไม่รู้ด้วยแล้วววว!"
16012-CVGroup_ExSkill_Level_3-1 = "ระเบิดให้หมดไปเลยยยย!"
16012-CVGroup_Formation_In_1-1 = "กะแล้วเชียวว่าขาดฉันไม่ได้ล่ะสิ?"
16012-CVGroup_Formation_In_2-1 = "วางใจได้เลย! จะปิดจ๊อบให้เสร็จไวๆ เลย!"
16012-CVGroup_Formation_Select-1 = "ดะ... เดี๋ยว! เสื้อผ้ายับแล้วนะ!"
16012-CVGroup_Growup_1-1 = "หรือว่าฉันโตขึ้นนะ...\nหืม? แค่นี้ก็โอเคแล้วเหรอ? อย่ามาล้อเล่นนะ!\nนี่เป็นปัญหาที่สำคัญมากของฉันนะ!"
16012-CVGroup_Growup_2-1 = "อาหารที่กินในวันพิเศษ ทำไมถึงอร่อยแบบนี้นะ... \nคุณครูคิดว่าเป็นเพราะอะไรเหรอ?"
16012-CVGroup_Growup_3-1 = "ถ้าแข็งแกร่งกว่านี้ จะกินได้เยอะกว่านี้มั้ยนะ...\nไม่เกี่ยวกันงั้นเหรอ? มะ... ไม่ต้องบอกก็รู้อยู่แล้วน่า!"
16012-CVGroup_Growup_4-1 = "แหะๆๆ เป็นไงบ้าง?\nมองฉันใหม่เลยใช่มั้ยล่ะ?"
16012-CVGroup_Relationship_Up_1-1 = "แบบว่า... ชุดนี้... เข้ากับฉันมั้ย?\nฉันไม่ค่อยชินกับอะไรแบบนี้เลย...\nทำไม ทำไมถึงหัวเราะล่ะ!"
16012-CVGroup_Relationship_Up_2-1 = "คุณครูนี่นะ... เป็นคนที่ประหลาดจริงๆ\nถ้าได้อยู่ด้วยกัน...\nมะ... ไม่มีอะไรหรอก! ลืมไปซะ!"
16012-CVGroup_Relationship_Up_3-1 = "ถะ... ถึงจะชมกัน ฉันก็ไม่มีอะไรให้หรอกนะ!\nเอ่อ จะว่ายังไงดี... บางทีก็... มีให้นะ"
16012-CVGroup_Relationship_Up_4-1 = "คราวหน้าไปกินอะไรอร่อยๆ กันมั้ย?\nเอ่อ... ไปกันแค่สองคนน่ะ"
16012-CVGroup_Tactic_In_1-1 = "จับตาดูให้ดีเลยนะ!"
16012-CVGroup_Tactic_In_2-1 = "รีบทำให้เสร็จ แล้วไปกินข้าว ข้าวว~!"
16012-CVGroup_Tactic_Victory_1-1 = "ฮืม วันนี้ขอให้ซื้ออะไรให้ดีนะ?"
16012-CVGroup_Tactic_Victory_2-1 = "ชัยชนะของฉัน~!\nแต่ก็นะ ของมันก็แน่อยู่แล้ว!"

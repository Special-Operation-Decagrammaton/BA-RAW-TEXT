[translation]
16012-CVGroup_Battle_Buffed_1-1 = "Thank you～！之後會報答你的！"
16012-CVGroup_Battle_Covered_1-1 = "躲起來了哦！"
16012-CVGroup_Battle_Defense_1-1 = "通通被我看穿了！"
16012-CVGroup_Battle_In_1-1 = "老師，要好好看著哦？我出發了！"
16012-CVGroup_Battle_In_2-1 = "這種程度很輕鬆啦！"
16012-CVGroup_Battle_Move_1-1 = "有沒有什麼……能吃的東西？"
16012-CVGroup_Battle_Move_2-1 = "肚子餓了……"
16012-CVGroup_Battle_Recovery_1-1 = "得救了！"
16012-CVGroup_Battle_TacticalAction_1-1 = "繼續前進吧～！"
16012-CVGroup_Battle_Victory_1-1 = "已經沒事了嗎……？\n咦！？是空的！？"
16012-CVGroup_Battle_Victory_2-1 = "這裡應該安全吧……？\n咦？怎麼會！？"
16012-CVGroup_CommonSkill-1 = "呀啊！"
16012-CVGroup_ExSkill_1-1 = "慢慢地、小心地……\n唔啊啊啊！？\n做什麼啦～～～！！"
16012-CVGroup_ExSkill_2-1 = "哼哼～♪\n呀啊！？\n不，不可原諒……！"
16012-CVGroup_ExSkill_3-1 = "嘿咻，嘿咻……\n哇，哇啊！？\n為，為什麼只有我……！"
16012-CVGroup_ExSkill_Level_1-1 = "吃我這招！！！"
16012-CVGroup_ExSkill_Level_2-1 = "不管了啦！"
16012-CVGroup_ExSkill_Level_3-1 = "全部爆炸吧！！！"
16012-CVGroup_Formation_In_1-1 = "果然沒有我就不行嘛？"
16012-CVGroup_Formation_In_2-1 = "交給我！很快就能搞定了！"
16012-CVGroup_Formation_Select-1 = "喂！會亂掉啦！"
16012-CVGroup_Growup_1-1 = "有稍微長高了嗎……\n咦？你說這樣也很好？\n別開玩笑了！這對我很重要耶！"
16012-CVGroup_Growup_2-1 = "在特別的日子吃的料理，為什麼會那麼好吃呢……老師你怎麼看？"
16012-CVGroup_Growup_3-1 = "變得更強的話，食量也會增加嗎……\n你說沒關係？不，不用你說我也知道啦！"
16012-CVGroup_Growup_4-1 = "耶嘿嘿，怎麼樣呀？\n是不是稍微對我另眼相看了？"
16012-CVGroup_Relationship_Up_1-1 = "我說……這副打扮，適合我嗎？\n這種樣子我還不是很習慣……笑，笑什麼啦！"
16012-CVGroup_Relationship_Up_2-1 = "老師你……真是個神奇的人。\n只要待在一起就會……\n果，果然還是當我沒說！忘了吧！"
16012-CVGroup_Relationship_Up_3-1 = "誇，誇獎我也不會有任何好處的哦！\n那個……也，也不是完全……沒有啦。"
16012-CVGroup_Relationship_Up_4-1 = "下次，要不要一起去吃點好吃的？\n那個，就我們兩個……好嗎？"
16012-CVGroup_Tactic_In_1-1 = "要好好看著哦！"
16012-CVGroup_Tactic_In_2-1 = "速速搞定之後，吃飯吃飯～！"
16012-CVGroup_Tactic_Victory_1-1 = "呵呵，今天該要你請我吃什麼好呢？"
16012-CVGroup_Tactic_Victory_2-1 = "是我贏了～！\n雖然這也是當然的！"

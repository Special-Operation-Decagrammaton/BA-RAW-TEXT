[translation]
20027-CVGroup_CommonSkill-1 = "嗯，這個不需要。"
20027-CVGroup_ExSkill_1-1 = "……！！嗯。"
20027-CVGroup_ExSkill_2-1 = "……！來了。"
20027-CVGroup_ExSkill_3-1 = "就是現在！"
20027-CVGroup_ExSkill_Level_1-1 = "是條大魚。"
20027-CVGroup_ExSkill_Level_2-1 = "別想逃。"
20027-CVGroup_ExSkill_Level_3-1 = "目標很正確。"
20027-CVGroup_Formation_In_1-1 = "什麼，這裡竟然有釣魚道具。"
20027-CVGroup_Formation_In_2-1 = "嗯，準備完畢。"
20027-CVGroup_Growup_1-1 = "釣具是釣魚的命脈。謝謝你，老師。"
20027-CVGroup_Growup_2-1 = "這樣一來……說不定能釣到更大的。"
20027-CVGroup_Growup_3-1 = "作為回禮……我會去釣條大魚。好好期待吧。"
20027-CVGroup_Growup_4-1 = "好，馬上出發吧。"
20027-CVGroup_Relationship_Up_1-1 = "又這麼……不，謝謝你，老師。"
20027-CVGroup_Relationship_Up_2-1 = "謝謝你，老師。\n話說，想吃的海產之類的，有嗎？"
20027-CVGroup_Relationship_Up_3-1 = "如果是為了老師……\n我什麼都會去捕的。"
20027-CVGroup_Relationship_Up_4-1 = "問我開不開心……？\n嗯……非常開心。"

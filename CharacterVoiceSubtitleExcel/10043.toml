[translation]
10043-CVGroup_Battle_Buffed_1-1 = "呵呵，那麼就出發吧。"
10043-CVGroup_Battle_Covered_1-1 = "哎呀，剛好有個好地方。"
10043-CVGroup_Battle_Defense_1-1 = "毫無意義。"
10043-CVGroup_Battle_In_1-1 = "那麼，開始吧？"
10043-CVGroup_Battle_In_2-1 = "要阻礙的話，就把你們大卸八塊囉？"
10043-CVGroup_Battle_Move_1-1 = "看來，散步還會再持續一下呢？"
10043-CVGroup_Battle_Move_2-1 = "來，出發吧。"
10043-CVGroup_Battle_Recovery_1-1 = "呵呵，感激不盡。"
10043-CVGroup_Battle_TacticalAction_1-1 = "換個地方吧？"
10043-CVGroup_Battle_Victory_1-1 = "唔呵呵，將這場勝利……獻給閣下……♥"
10043-CVGroup_Battle_Victory_2-1 = "真是場令人愉快的勝利呢……唔呵呵♥"
10043-CVGroup_CommonSkill-1 = "……果蠅真煩人呢？"
10043-CVGroup_ExSkill_1-1 = "與閣下的這段時光……\n……出現阻礙了嗎？"
10043-CVGroup_ExSkill_2-1 = "啊啊，這幸福的瞬間……\n……有礙事的蟲子嗎？"
10043-CVGroup_ExSkill_3-1 = "老師，請多在我身邊……\n……先處理一下吧。"
10043-CVGroup_ExSkill_Level_1-1 = "竟敢來搗亂呢……"
10043-CVGroup_ExSkill_Level_2-1 = "全部，都由我來擊潰！"
10043-CVGroup_ExSkill_Level_3-1 = "消失吧！"
10043-CVGroup_Formation_In_1-1 = "找到我了呢。唔呵呵……"
10043-CVGroup_Formation_In_2-1 = "是，為了老師無論什麼都行……"
10043-CVGroup_Formation_Select-1 = "哎呀，被那樣突然撫摸的話……♥"
10043-CVGroup_Growup_1-1 = "若藻我，經由老師給予的力量變得更強了……\n這一切的力量，都將只為閣下……♥"
10043-CVGroup_Growup_2-1 = "似乎，又變得更強了呢？\n不，倘若這是閣下的願望，我悉聽尊便……♥"
10043-CVGroup_Growup_3-1 = "啊啊，變得越來越強了……唔呵呵。"
10043-CVGroup_Growup_4-1 = "唔呵呵……真令人高興……\n竟然如此需要我……"
10043-CVGroup_Relationship_Up_1-1 = "來吧，更多在我的身邊……\n我，哪裡都不會去的。"
10043-CVGroup_Relationship_Up_2-1 = "即便四季更迭……\n閣下依然會一如既往的愛著我呢……啊啊……"
10043-CVGroup_Relationship_Up_3-1 = "老師……閣下……閣下，呵呵呵。閣．下……♥\n啊啊，這滿溢的心意，究竟該如何傳達呢……"
10043-CVGroup_Relationship_Up_4-1 = "我仰慕著您。\n只對閣下一人，永無止境……比海更深……"
10043-CVGroup_Tactic_In_1-1 = "那麼，一同出發吧？"
10043-CVGroup_Tactic_In_2-1 = "來，能請您守望著我嗎？"
10043-CVGroup_Tactic_Victory_1-1 = "此等程度，宛如輕鬆的散步一般。"
10043-CVGroup_Tactic_Victory_2-1 = "呵呵♥是否有讓您滿意呢，閣下？"

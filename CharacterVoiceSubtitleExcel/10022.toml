[translation]
10022-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะ"
10022-CVGroup_Battle_Defense_1-1 = "เปล่าประโยชน์"
10022-CVGroup_Battle_In_1-1 = "จะเริ่มการฝึกค่ายฤดูร้อนตั้งแต่นี้"
10022-CVGroup_Battle_In_2-1 = "อย่าชักช้าล่ะ ไปกันได้แล้ว"
10022-CVGroup_Battle_Move_1-1 = "ร้อนจัง... น่ารำคาญด้วย..."
10022-CVGroup_Battle_Move_2-1 = "เฮ้อ... ยังไม่หมดงั้นเหรอ?"
10022-CVGroup_Battle_Recovery_1-1 = "ขอบคุณนะ"
10022-CVGroup_Battle_TacticalAction_1-1 = "ไปกันเลย"
10022-CVGroup_Battle_Victory_1-1 = "ภารกิจสำเร็จ\nคือ... อย่าจ้องเขม็งแบบนั้นสิ"
10022-CVGroup_Battle_Victory_2-1 = "ไม่ใช่เรื่องใหญ่อะไรหรอก\nเพราะงั้น... เลิกมองฉันแบบนั้นได้แล้ว"
10022-CVGroup_CommonSkill-1 = "ทางนั้นสินะ"
10022-CVGroup_ExSkill_1-1 = "ถ้าฉันไม่รักษากฎของทะเลนี้ละก็..."
10022-CVGroup_ExSkill_2-1 = "ช่วยไม่ได้นะ คงต้องใช้กำลังแล้ว"
10022-CVGroup_ExSkill_3-1 = "ถ้าฉันไม่ทำ..."
10022-CVGroup_ExSkill_Level_1-1 = "ยอมแพ้ไปซะดีกว่ามั้ย?"
10022-CVGroup_ExSkill_Level_2-1 = "ไม่ปล่อยให้หลุดมือหรอก"
10022-CVGroup_ExSkill_Level_3-1 = "ถึงจะเป็นการฝึก ก็ไม่ยกโทษให้หรอกนะ"
10022-CVGroup_Formation_In_1-1 = "มีภารกิจสินะ เข้าใจแล้ว"
10022-CVGroup_Formation_In_2-1 = "ฉันเตรียมพร้อมอยู่แล้วละ..."
10022-CVGroup_Formation_Select-1 = "ทำไมเหรอ...? ต้องทำยังไงล่ะ?"
10022-CVGroup_Growup_1-1 = "คงเป็นผลของการไปเข้าค่ายฝึกสินะ"
10022-CVGroup_Growup_2-1 = "ถึงจะอยู่ในรูปลักษณ์นี้...\nแต่ถ้าต้องการความช่วยเหลือจากฉัน ก็บอกได้เสมอนะ"
10022-CVGroup_Growup_3-1 = "ฉันยังแข็งแกร่งขึ้นได้อีก...\nฉันอยากแข็งแกร่งขึ้น อย่างน้อยก็เพื่อคุณครู "
10022-CVGroup_Growup_4-1 = "ขอบคุณเสมอเลยนะ ถึงฉันจะเป็นแบบนี้...\nแต่ฉันจะดีใจมากถ้าคุณครูพึ่งพาฉันอีกสักหน่อยน่ะ"
10022-CVGroup_Relationship_Up_1-1 = "ฤดูร้อนปีนี้ ก็ได้ใช้เวลาอยู่กับคุณครูอีกแล้วสินะ"
10022-CVGroup_Relationship_Up_2-1 = "ฤดูร้อนที่รอคอยมาถึงแล้ว\nแต่มาใช้เวลาอยู่กับเด็กน่าเบื่ออย่างฉันจะดีเหรอ?\nการได้ <อยู่ด้วยกัน> กับฉันเป็นเรื่องสำคัญ? งะ... งั้นเหรอ..."
10022-CVGroup_Relationship_Up_3-1 = "ยะ... อย่าเข้ามาใกล้จนเกินไปได้มั้ย... ถึงจะเป็นฉันก็เถอะ\nแต่พอสวมชุดนี้อยู่ มันรู้สึกอายน่ะ"
10022-CVGroup_Relationship_Up_4-1 = "มือของคุณครู เย็นสบายดีจัง...\nข้างนอกแดดแรงมาก เพราะงั้นเอ่อ..."
10022-CVGroup_Tactic_In_1-1 = "ถึงมันจะน่ารำคาญ แต่นี่ก็เป็นส่วนหนึ่งของการฝึก"
10022-CVGroup_Tactic_In_2-1 = "คุณครู ช่วยสั่งการด้วย"
10022-CVGroup_Tactic_Victory_1-1 = "เพราะมีคุณครูคอยสั่งการ\nก็ต้องชนะแน่นอนอยู่แล้ว"
10022-CVGroup_Tactic_Victory_2-1 = "ภารกิจสำเร็จ... แต่ว่ามันง่ายเกินไปจริงๆ\nอาจจะยังฝึกฝนไม่เพียงพอ..."

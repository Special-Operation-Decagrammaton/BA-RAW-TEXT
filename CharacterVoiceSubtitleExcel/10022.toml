[translation]
10022-CVGroup_Battle_Buffed_1-1 = "고마워."
10022-CVGroup_Battle_Defense_1-1 = "소용없어."
10022-CVGroup_Battle_In_1-1 = "지금부터 하계 합숙 훈련을 시작하겠어."
10022-CVGroup_Battle_In_2-1 = "모두 뒤쳐지지 않도록. 가자."
10022-CVGroup_Battle_Move_1-1 = "더워, 귀찮아…."
10022-CVGroup_Battle_Move_2-1 = "하아…. 아직 있는 거야?"
10022-CVGroup_Battle_Recovery_1-1 = "고마워."
10022-CVGroup_Battle_TacticalAction_1-1 = "이동한다."
10022-CVGroup_Battle_Victory_1-1 = "작전 성공. 그…… 너무 빤히 바라보지 마."
10022-CVGroup_Battle_Victory_2-1 = "이 정도 쯤은 별 거 아냐. 그러니… 그렇게 이쪽은 보지 말아줘."
10022-CVGroup_CommonSkill-1 = "그쪽인 거네."
10022-CVGroup_ExSkill_1-1 = "이 바다의 질서도, 내가 지키지 않으면."
10022-CVGroup_ExSkill_2-1 = "어쩔 수 없지, 실력행사로."
10022-CVGroup_ExSkill_3-1 = "…내가 하지 않으면, 인가."
10022-CVGroup_ExSkill_Level_1-1 = "슬슬 포기하는 게 어때?"
10022-CVGroup_ExSkill_Level_2-1 = "놓치지 않아."
10022-CVGroup_ExSkill_Level_3-1 = "훈련이라고는 하지만, 용서하지 않아."
10022-CVGroup_Formation_In_1-1 = "작전 말이지. 알았어."
10022-CVGroup_Formation_In_2-1 = "…준비라면 이미 되어있어."
10022-CVGroup_Formation_Select-1 = "…왜? 어떻게 하면 돼?"
10022-CVGroup_Growup_1-1 = "확실히 합숙 효과가 있었나 봐."
10022-CVGroup_Growup_2-1 = "이런 모습이긴 하지만……, 내 도움이 필요하다면, 언제든지 말해줘."
10022-CVGroup_Growup_3-1 = "나는 아직 강해질 수 있어…. 선생님을 위해서라도, 강해지고 싶어."
10022-CVGroup_Growup_4-1 = "늘 고마워. ……이런 나지만, 좀 더 의지해 주면 기쁠 거야."
10022-CVGroup_Relationship_Up_1-1 = "이번 여름도, 선생과 함께 할 수 있는 거네."
10022-CVGroup_Relationship_Up_2-1 = "모처럼의 여름인데,\n나 같이 재미없는 애랑 같이 있어도 괜찮아?\n…나와 같이 <있는>게 중요해? 그, 그래…."
10022-CVGroup_Relationship_Up_3-1 = "너, 너무 가까이 붙지 말아줘….\n아무리 나라고 해도, 그….\n이 옷차림은, 부끄러우니까."
10022-CVGroup_Relationship_Up_4-1 = "선생님의 손, 차갑고 기분 좋아….\n밖은 이렇게나 햇볕이 강하니까, 그, 좀 더…."
10022-CVGroup_Tactic_In_1-1 = "귀찮지만, 이것도 훈련의 일환이니까."
10022-CVGroup_Tactic_In_2-1 = "선생, 지시를 부탁할게."
10022-CVGroup_Tactic_Victory_1-1 = "선생의 지시도 있었으니까, 이 정도 승리는 당연해."
10022-CVGroup_Tactic_Victory_2-1 = "작전 성공…. 하지만, 너무 간단했네. 훈련으로는 부족할지도…."

[translation]
10022-CVGroup_Battle_Buffed_1-1 = "謝謝。"
10022-CVGroup_Battle_Defense_1-1 = "沒用的。"
10022-CVGroup_Battle_In_1-1 = "現在，開始夏日合宿的訓練。"
10022-CVGroup_Battle_In_2-1 = "所有人，注意不要遲到。出發吧。"
10022-CVGroup_Battle_Move_1-1 = "好熱，好麻煩……"
10022-CVGroup_Battle_Move_2-1 = "唉……還沒完嗎？"
10022-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10022-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10022-CVGroup_Battle_Victory_1-1 = "作戰成功。\n那個……希望你不要一直盯著我看。"
10022-CVGroup_Battle_Victory_2-1 = "這種小事不算什麼。\n所以……別那樣一直看我這邊。"
10022-CVGroup_CommonSkill-1 = "那邊。"
10022-CVGroup_ExSkill_1-1 = "這片大海的風紀，得由我來守護。"
10022-CVGroup_ExSkill_2-1 = "沒辦法，用實力處理吧。"
10022-CVGroup_ExSkill_3-1 = "……得由我做才行，是嗎。"
10022-CVGroup_ExSkill_Level_1-1 = "差不多該放棄了吧？"
10022-CVGroup_ExSkill_Level_2-1 = "別想逃。"
10022-CVGroup_ExSkill_Level_3-1 = "雖說是訓練，也不會手下留情。"
10022-CVGroup_Formation_In_1-1 = "戰鬥是吧，了解。"
10022-CVGroup_Formation_In_2-1 = "……準備的話已經就緒。"
10022-CVGroup_Formation_Select-1 = "……怎麼了？我該怎麼做？"
10022-CVGroup_Growup_1-1 = "合宿的效果似乎確實有發揮出來。"
10022-CVGroup_Growup_2-1 = "雖然是這副打扮……如果需要我幫忙的話，隨時都可以說。"
10022-CVGroup_Growup_3-1 = "我還可以變得更強……為了老師，我也想變得更強。"
10022-CVGroup_Growup_4-1 = "一直都很謝謝你。\n……雖然是這樣的我，如果你願意多依賴我一點的話，我會很開心。"
10022-CVGroup_Relationship_Up_1-1 = "今年的夏天，也能跟老師一起度過呢。"
10022-CVGroup_Relationship_Up_2-1 = "明明是難得的夏天，跟我這種無聊的孩子待在一起好嗎？\n……跟我一起「才」好？\n是，是嗎……？"
10022-CVGroup_Relationship_Up_3-1 = "別，別靠我太近……\n就算是我，那個……穿成這樣的話，也是會害羞的。"
10022-CVGroup_Relationship_Up_4-1 = "老師的手，涼涼的很舒服……\n外面太陽這麼大，那個，就再稍微……"
10022-CVGroup_Tactic_In_1-1 = "雖然麻煩，但這也是訓練的一環。"
10022-CVGroup_Tactic_In_2-1 = "老師，請下指示。"
10022-CVGroup_Tactic_Victory_1-1 = "畢竟有老師的指示，這種程度的勝利是當然的。"
10022-CVGroup_Tactic_Victory_2-1 = "作戰成功……不過，有點太簡單了。\n作為訓練有點不太夠……"

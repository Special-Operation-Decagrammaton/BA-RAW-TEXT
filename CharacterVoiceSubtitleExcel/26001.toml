[translation]
26001-CVGroup_CommonSkill-1 = "你的打算已經全都被掌握了。"
26001-CVGroup_ExSkill_1-1 = "監聽開始。"
26001-CVGroup_ExSkill_2-1 = "噓，要開始監聽了。"
26001-CVGroup_ExSkill_3-1 = "別想瞞過我的耳朵。"
26001-CVGroup_ExSkill_Level_1-1 = "……Catch。"
26001-CVGroup_ExSkill_Level_2-1 = "……找到了。"
26001-CVGroup_ExSkill_Level_3-1 = "……Encount。開始連接。"
26001-CVGroup_Formation_In_1-1 = "是個非常棒的判斷。"
26001-CVGroup_Formation_In_2-1 = "我認為是個恰當的選擇。"
26001-CVGroup_Growup_1-1 = "這股經過調和的力量……簡直就像歷經洗鍊的管弦樂團一樣呢。"
26001-CVGroup_Growup_2-1 = "這樣我就變得更強了。要小試身手也沒問題。"
26001-CVGroup_Growup_3-1 = "這股流暢的旋律……真想再多聽一點。"
26001-CVGroup_Growup_4-1 = "這樣就能聽得更清楚了。\n……就連老師的心跳聲都能聽見。"
26001-CVGroup_Relationship_Up_1-1 = "脈搏上升，血液加速，體溫上升。原因……不明。"
26001-CVGroup_Relationship_Up_2-1 = "至今為止和老師進行的所有對話都有錄音。\n莫非……你想聽嗎？"
26001-CVGroup_Relationship_Up_3-1 = "老師的聲音對我來說就和音樂一樣。\n因為能讓我的心情變得高揚。"
26001-CVGroup_Relationship_Up_4-1 = "……現在能夠確信了。老師對我來說是特別的。"

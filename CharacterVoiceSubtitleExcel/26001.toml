[translation]
26001-CVGroup_CommonSkill-1 = "ฉันวิเคราะห์ความตั้งใจของคุณไว้หมดแล้วค่ะ"
26001-CVGroup_ExSkill_1-1 = "เริ่มดักฟัง"
26001-CVGroup_ExSkill_2-1 = "ชู่ว เริ่มดักฟังแล้วค่ะ"
26001-CVGroup_ExSkill_3-1 = "หลอกหูฉันไม่ได้หรอกค่ะ"
26001-CVGroup_ExSkill_Level_1-1 = "แคช..."
26001-CVGroup_ExSkill_Level_2-1 = "หาเจอแล้วค่ะ..."
26001-CVGroup_ExSkill_Level_3-1 = "เอนเคาท์... ลิงก์ค่ะ"
26001-CVGroup_Formation_In_1-1 = "ตัดสินใจได้เยี่ยมมากค่ะ"
26001-CVGroup_Formation_In_2-1 = "ฉันคิดว่าเป็นการเลือกที่สมเหตุสมผลค่ะ"
26001-CVGroup_Growup_1-1 = "พลังที่กลมกลืนนี้... เหมือนดนตรีออร์เคสตราที่แต่งมาอย่างดีเลยนะคะ"
26001-CVGroup_Growup_2-1 = "สิ่งนี้ทำให้ฉันแข็งแกร่งขึ้นค่ะ จะทดสอบดูก็ได้นะคะ"
26001-CVGroup_Growup_3-1 = "ท่วงทำนองที่แสนหวานนี้... ฉันอยากฟังต่ออีกหน่อยค่ะ"
26001-CVGroup_Growup_4-1 = "อันนี้ทำให้ได้ยินมากขึ้นค่ะ ได้ยินกระทั่งเสียงหัวใจเต้นของคุณครูเลย"
26001-CVGroup_Relationship_Up_1-1 = "อัตราหัวใจเต้นสูงขึ้น กระแสเลือดสูงขึ้น อุณหภูมิร่างกายสูงขึ้น\nสาเหตุต้องเป็น... แน่ๆ"
26001-CVGroup_Relationship_Up_2-1 = "ฉันบันทึกการสนทนาทั้งหมดกับคุณครูไว้ค่ะ\nไม่ทราบว่า... อยากฟังอีกรอบมั้ยคะ?"
26001-CVGroup_Relationship_Up_3-1 = "เสียงของคุณครูเป็นเหมือนเสียงเพลงสำหรับฉันค่ะ\nเพราะมันทำให้ฉันรู้สึกดีขึ้นค่ะ"
26001-CVGroup_Relationship_Up_4-1 = "ฉันแน่ใจค่ะ... ว่าคุณครูคือคนพิเศษของฉัน"

26001-CVGroup_Growup_1-1 = "이 조화로운 힘은… 마치 잘 짜여진 관현악곡 같군요."
26001-CVGroup_Growup_2-1 = "이것으로 저는 더 강해졌습니다. 시험해 보셔도 좋습니다."

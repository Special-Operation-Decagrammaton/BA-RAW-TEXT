[translation]
26001-CVGroup_CommonSkill-1 = "I am already completely aware of all your goals."
26001-CVGroup_ExSkill_1-1 = "Commence wiretap."
26001-CVGroup_ExSkill_2-1 = "Sh... Commence wiretap."
26001-CVGroup_ExSkill_3-1 = "You cannot fool my ears."
26001-CVGroup_ExSkill_Level_1-1 = "...Caught."
26001-CVGroup_ExSkill_Level_2-1 = "...Found them."
26001-CVGroup_ExSkill_Level_3-1 = "...In count. Linking."
26001-CVGroup_Formation_In_1-1 = "Great judgement."
26001-CVGroup_Formation_In_2-1 = "I believe that's an appropriate decision."
26001-CVGroup_Growup_1-1 = "This harmonious power... It's like a well-composed orchestral piece."
26001-CVGroup_Growup_2-1 = "This has made me even stronger. You can test me if you'd like."
26001-CVGroup_Growup_3-1 = "I must hear more of this sweet melody."
26001-CVGroup_Growup_4-1 = "I can hear so much more now—including your heartbeat, Sensei!"
26001-CVGroup_Relationship_Up_1-1 = "My heart rate is up, my blood is pumping fast, and my temperature is up. But...I do not know the reason for it."
26001-CVGroup_Relationship_Up_2-1 = "I've recorded every conversation I've ever had with you, Sensei. Do you...want to listen to them?"
26001-CVGroup_Relationship_Up_3-1 = "Sensei, your voice is like music to my ears. It lifts my spirits."
26001-CVGroup_Relationship_Up_4-1 = "...I am certain. Sensei, you are special to me."

10084-CVGroup_Relationship_Up_3-1 = "(I wouldn't need to install a wiretapping device if you were always by my side, though...)"
10084-CVGroup_Relationship_Up_4-1 = "Listening to Sensei's voice calms me down more than any ASMR."

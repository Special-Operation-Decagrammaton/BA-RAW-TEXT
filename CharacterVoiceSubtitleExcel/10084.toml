[translation]
10084-CVGroup_Battle_Buffed_1-1 = "An intriguing sample."
10084-CVGroup_Battle_Covered_1-1 = "Shh, I'm recording."
10084-CVGroup_Battle_Defense_1-1 = "I can't hear it."
10084-CVGroup_Battle_In_1-1 = "...Confirmed. Moving."
10084-CVGroup_Battle_In_2-1 = "I sense something up ahead."
10084-CVGroup_Battle_Move_1-1 = "Moving."

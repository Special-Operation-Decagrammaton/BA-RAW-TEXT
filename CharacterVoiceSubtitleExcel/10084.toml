10084-CVGroup_Battle_Recovery_1-1 = "Thank...you."
10084-CVGroup_Battle_TacticalAction_1-1 = "I've recorded all the sounds from this place."
10084-CVGroup_Battle_Victory_1-1 = "Sensei, tell us how you feel about the victory."
10084-CVGroup_Battle_Victory_2-1 = "Sensei, if you could share a few words, please."
10084-CVGroup_CommonSkill-1 = "It's warm..."
10084-CVGroup_ExSkill_1-1 = "C-Could it be a bear...?"
10084-CVGroup_ExSkill_2-1 = "There was a bear bell around here..."
10084-CVGroup_ExSkill_3-1 = "A b-bear...!"
10084-CVGroup_ExSkill_Level_1-1 = "Th-That way!"
10084-CVGroup_ExSkill_Level_2-1 = "W-Waaah?!"
10084-CVGroup_ExSkill_Level_3-1 = "...Ah, it was a rabbit."
10084-CVGroup_Formation_In_1-1 = "If it's efficient for me to go, then yes."
10084-CVGroup_Formation_In_2-1 = "If it's what you want, Sensei."
10084-CVGroup_Formation_Select-1 = "Mmm... I can't hear clearly from here."
10084-CVGroup_Growup_1-1 = "With this, I can record sounds even more clearly."

[translation]
10064-CVGroup_Battle_Buffed_1-1 = "지원, 확인."
10064-CVGroup_Battle_Covered_1-1 = "좋았어……"
10064-CVGroup_Battle_Defense_1-1 = "간단하네."
10064-CVGroup_Battle_In_1-1 = "올해에도, 의뢰는 끊이질 않네."
10064-CVGroup_Battle_In_2-1 = "심기일전…… 시작해 볼까."
10064-CVGroup_Battle_Move_1-1 = "탐색 개시."
10064-CVGroup_Battle_Move_2-1 = "목표, 변경."
10064-CVGroup_Battle_Recovery_1-1 = "감사히 받을게."
10064-CVGroup_Battle_TacticalAction_1-1 = "위치 이동."
10064-CVGroup_Battle_Victory_1-1 = "운이 없었네."
10064-CVGroup_Battle_Victory_2-1 = "새해의, 좋은 시작이 된 것 같아."
10064-CVGroup_CommonSkill-1 = "후후, 귀여워라."
10064-CVGroup_ExSkill_1-1 = "크흠…… 자, 오마모리야."
10064-CVGroup_ExSkill_2-1 = "흠흠. 이거, 받아 주겠어?"
10064-CVGroup_ExSkill_3-1 = "으음…… 어땠어?"
10064-CVGroup_ExSkill_Level_1-1 = "효험이 있었으면 좋겠네."
10064-CVGroup_ExSkill_Level_2-1 = "악령퇴산…… 같은 거겠지."
10064-CVGroup_ExSkill_Level_3-1 = "좋은 한 해가 되기를."
10064-CVGroup_Formation_In_1-1 = "내 차례야? ……알았어."
10064-CVGroup_Formation_In_2-1 = "어울려? ……다행이네."
10064-CVGroup_Formation_Select-1 = "……왜 그래?"
10064-CVGroup_Growup_1-1 = "그…… 고마워. 새해에도 선생과 함께, 네."
10064-CVGroup_Growup_2-1 = "기대에 부응할 수 있을지는 모르겠지만…… 노력할게."
10064-CVGroup_Growup_3-1 = "이럴 때는, 어떤 표정을 지어야 할까.\n미안. 이런 상황에는…… 익숙하지 않아서."
10064-CVGroup_Growup_4-1 = "선생에게는 언제나 신세를 지게 되네……\n갚을 수 있을지는 모르겠지만, 최선을 다 해 볼게."
10064-CVGroup_Relationship_Up_1-1 = "인연이라는 건…… 신기하지. 쌓이면 쌓일수록, 서로를 생각하게 되니까."
10064-CVGroup_Relationship_Up_2-1 = "저기, 이런 말. 자주 하진 않지만……\n선생이 있어서 다행이라고…… 생각하고 있어."
10064-CVGroup_Relationship_Up_3-1 = "선생과 함께 새해를 맞이하는 건 어떤 기분일지…… 늘 궁금했는데.\n조금은, 그 궁금증이 풀린 느낌이야."
10064-CVGroup_Relationship_Up_4-1 = "잘 어울린다고 해 줘서 고마워. 그냥 하는 말이겠지만.\n그냥 하는 말이…… 아니라고?\n자, 잠깐. 선생. 그건 치사해……"
10064-CVGroup_Tactic_In_1-1 = "가자."
10064-CVGroup_Tactic_In_2-1 = "의뢰는 신속하게."
10064-CVGroup_Tactic_Victory_1-1 = "수고했어, 선생. 옷도 더러워지지 않았네…… 다행이야."
10064-CVGroup_Tactic_Victory_2-1 = "한 해의 시작부터, 나쁜 기억을 만들 순 없지."

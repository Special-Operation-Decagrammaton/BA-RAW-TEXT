[translation]
20047-CVGroup_CommonSkill-1 = "夏天獨有的策略。"
20047-CVGroup_ExSkill_1-1 = "以為我會怕水嗎？"
20047-CVGroup_ExSkill_2-1 = "呵呵，這種程度……"
20047-CVGroup_ExSkill_3-1 = "把我的泳姿好好烙印在眼裡吧。"
20047-CVGroup_ExSkill_Level_1-1 = "嗯嗯……很順利……"
20047-CVGroup_ExSkill_Level_2-1 = "嗯……就這樣……直直地……"
20047-CVGroup_ExSkill_Level_3-1 = "吸氣……吐氣……嗯嗯……"
20047-CVGroup_Formation_In_1-1 = "想要奇策嗎？"
20047-CVGroup_Formation_In_2-1 = "呵呵，是個不錯的判斷呢。"
20047-CVGroup_Formation_Select-1 = "……你，你打算這樣到什麼時候？"
20047-CVGroup_Growup_1-1 = "教學相長。成長來自不懈的學習。\n希望能跟你保持這樣的關係呢。"
20047-CVGroup_Growup_2-1 = "你總是能讓我發覺許多事情……果然很優秀呢。"
20047-CVGroup_Growup_3-1 = "我還在學習當中。\n在我變得完美之前，請在身旁看著我吧。"
20047-CVGroup_Growup_4-1 = "今後我也會持續成長……\n為了大家……也為了你。"
20047-CVGroup_Relationship_Up_1-1 = "對我這麼費心……到底希望我為你做什麼呢？\n哼嗯……我知道了。\n那麼，就給你一個教我游泳的機會吧。"
20047-CVGroup_Relationship_Up_2-1 = "你還真積極呢……\n這種感覺……或許我並不討厭。"
20047-CVGroup_Relationship_Up_3-1 = "嗯，這種感覺……似乎也不壞呢。"
20047-CVGroup_Relationship_Up_4-1 = "有人說「特別的緣分」其實意外地常在身邊徘徊。\n……沒什麼啊？只是聽過那種說法而已。"

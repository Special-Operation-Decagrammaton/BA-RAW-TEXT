[translation]
20047-CVGroup_CommonSkill-1 = "มันเป็นกลยุทธ์ในฤดูร้อนน่ะ"
20047-CVGroup_ExSkill_1-1 = "ใครกลัวน้ำกัน?"
20047-CVGroup_ExSkill_2-1 = "ฮุฮุ แค่นี้เอง..."
20047-CVGroup_ExSkill_3-1 = "สลักคำสั่งสอนของฉันเอาไว้ในใจด้วยล่ะ"
20047-CVGroup_ExSkill_Level_1-1 = "อืม... ไม่มีปัญหา..."
20047-CVGroup_ExSkill_Level_2-1 = "อืม... ถ้าทำแบบนี้... ต่อไป..."
20047-CVGroup_ExSkill_Level_3-1 = "หายใจเข้า... หายใจออก... อืม..."
20047-CVGroup_Formation_In_1-1 = "ต้องใช้กลยุทธ์ด้วยใช่มั้ย? ดีละ"
20047-CVGroup_Formation_In_2-1 = "ฮุฮุ เลือกได้ดีเลยนะ"
20047-CVGroup_Formation_Select-1 = "จะ... จะจับไว้อีกนานแค่ไหน?"
20047-CVGroup_Growup_1-1 = "เรียนรู้และเติบโต การเติบโตคือการเรียนรู้ที่ไม่สิ้นสุด\nฉันอยากมีความสัมพันธ์แบบนั้นกับคุณเหมือนกันนะ"
20047-CVGroup_Growup_2-1 = "คุณทำให้ฉันตระหนักถึงหลายๆ อย่างเลย...\nยอดเยี่ยมตามคาดจริงๆ"
20047-CVGroup_Growup_3-1 = "ฉันน่ะ... ยังต้องเรียนรู้อะไรอีกเยอะ\nคอยดูแล้วกัน ฉันจะทำให้สมบูรณ์แบบกว่านี้อีก"
20047-CVGroup_Growup_4-1 = "ฉันยังพัฒนาต่อไปอีกเรื่อยๆ\nแน่นอนว่าก็เพื่อตัวฉัน คุณ แล้วก็ทุกๆ คน"
20047-CVGroup_Relationship_Up_1-1 = "ทำไมถึงอยากสั่งให้ฉัน... ทำอะไรแบบนี้เนี่ย?\nฮืม... เข้าใจแล้ว\nงั้นฉันจะให้โอกาสคุณสอนว่ายน้ำก็แล้วกัน"
20047-CVGroup_Relationship_Up_2-1 = "พุ่งเข้ามาโดยไม่ลังเลเลยนะ...\nเอาเถอะ... ฉันก็ไม่ได้เกลียดหรอกนะ"
20047-CVGroup_Relationship_Up_3-1 = "ก็นั่นละ... เรื่องแบบนี้ก็อาจไม่แย่เท่าไร"
20047-CVGroup_Relationship_Up_4-1 = "เขาว่าความสัมพันธ์พิเศษไม่ได้อยู่ไกลขนาดนั้นหรอกนะ\nมันก็เป็นเรื่องที่พูดๆ กันน่ะ"

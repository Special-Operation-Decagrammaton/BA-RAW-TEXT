[translation]
20047-CVGroup_CommonSkill-1 = "여름의 기책이야."
20047-CVGroup_ExSkill_1-1 = "누가 물을 무서워해?"
20047-CVGroup_ExSkill_2-1 = "후후, 이 정도야…."
20047-CVGroup_ExSkill_3-1 = "내 영법을 눈에 잘 새겨둬."
20047-CVGroup_ExSkill_Level_1-1 = "흠냐…… 문제없어……"
20047-CVGroup_ExSkill_Level_2-1 = "으음…… 이대로만…… 쭉……"
20047-CVGroup_ExSkill_Level_3-1 = "들이쉬고…… 내뱉고…… 우음……"
20047-CVGroup_Formation_In_1-1 = "기책이 필요한 거지? 좋아."
20047-CVGroup_Formation_In_2-1 = "후훗, 좋은 선택이네."
20047-CVGroup_Formation_Select-1 = "……어, 언제까지 들고 있을 거야?"
20047-CVGroup_Growup_1-1 = "교학상장. 성장은 끊임없는 배움 중에 있지.\n당신과는 그런 관계로 있고 싶네."
20047-CVGroup_Growup_2-1 = "당신은 여러 가지를 깨닫게 해줘…… 역시, 우수하군."
20047-CVGroup_Growup_3-1 = "……나는 아직 배울 게 많아. 두고 봐. 더 완벽해질 테니까."
20047-CVGroup_Growup_4-1 = "나는 계속 성장할 거야. 나는 물론, 당신과 모두를 위해서."
20047-CVGroup_Relationship_Up_1-1 = "나에게 이렇게까지…… 대체 뭘 시키고 싶어서?\n흐음…… 알았다. 그럼, 수영을 가르칠 기회를 줄게."
20047-CVGroup_Relationship_Up_2-1 = "거리낌 없이 다가오네…… ……뭐, 싫진 않지만."
20047-CVGroup_Relationship_Up_3-1 = "뭐, 이런 것도…… 나쁘지 않을지도."
20047-CVGroup_Relationship_Up_4-1 = "특별한 인연이란, 그리 멀지 않은 곳에 있다고 해.\n뭐, 그냥 그렇다는 이야기야."

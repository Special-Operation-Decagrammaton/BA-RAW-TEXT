[translation]
20047-CVGroup_CommonSkill-1 = "These are summer tactics."
20047-CVGroup_ExSkill_1-1 = "Who would fear water?"
20047-CVGroup_ExSkill_2-1 = "Fufu, this much is..."
20047-CVGroup_ExSkill_3-1 = "Observe my stroke."
20047-CVGroup_ExSkill_Level_1-1 = "*yawn* No issues."
20047-CVGroup_ExSkill_Level_2-1 = "Mmm... Just like this..."
20047-CVGroup_ExSkill_Level_3-1 = "Breathe in... breathe out... Mmm..."
20047-CVGroup_Formation_In_1-1 = "You require a strategy? Excellent."
20047-CVGroup_Formation_In_2-1 = "Fufu, good choice."
20047-CVGroup_Formation_Select-1 = "...F-For how long do you intend to hold me for?"
20047-CVGroup_Growup_1-1 = "Teaching and learning are hand in hand. Growth cannot occur without a consistent effort to learn. That is the relationship I wish to have with you."
20047-CVGroup_Growup_2-1 = "You truly broaden my perspectives... You are impressive, as usual."
20047-CVGroup_Growup_3-1 = "...I have much growth to undergo. Just wait, Sensei, and I will achieve true perfection."
20047-CVGroup_Growup_4-1 = "I shall continue to improve. Not only for myself, but also for you and everyone else."
20047-CVGroup_Relationship_Up_1-1 = "Going this far for me... Just what are your intentions? Hm... Understood. Then I shall allow you to teach me how to swim."
20047-CVGroup_Relationship_Up_2-1 = "You approach me without a modicum of hesitation... No, I suppose I am not complaining."
20047-CVGroup_Relationship_Up_3-1 = "Well, something like this...may not be completely insufferable."
20047-CVGroup_Relationship_Up_4-1 = "They say the most special bonds may be right under our noses. That's simply what I've heard."

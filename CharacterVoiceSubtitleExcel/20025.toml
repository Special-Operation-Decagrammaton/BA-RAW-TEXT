[translation]
20025-CVGroup_CommonSkill-1 = "ระ... ระเบิดให้หน่อยนะคะ..."
20025-CVGroup_ExSkill_1-1 = "ในช่วงปีใหม่น่ะ...เฮือกก!?"
20025-CVGroup_ExSkill_2-1 = "พระอาทิตย์ขึ้นแล้ว... เฮือก!?"
20025-CVGroup_ExSkill_3-1 = "แหะๆๆ... เอ๋!?"
20025-CVGroup_ExSkill_Level_1-1 = "ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้ ยกโทษให้ไม่ได้!"
20025-CVGroup_ExSkill_Level_2-1 = "ใครบอกว่าไปอยู่ตรงนั้นได้คะ!!??"
20025-CVGroup_ExSkill_Level_3-1 = "อย่าหนีนะ อย่าหนีนะ อย่าหนีนะ!"
20025-CVGroup_Formation_In_1-1 = "ฮะ... เฮือกกก!?"
20025-CVGroup_Formation_In_2-1 = "มะ... หมายถึงฉันเหรอคะ?"
20025-CVGroup_Growup_1-1 = "ขะ... ขอบคุณค่ะ... คุณครู..."
20025-CVGroup_Growup_2-1 = "ทะ... ทำไมถึงให้ของแบบนี้กับฉัน...?"
20025-CVGroup_Growup_3-1 = "บุญคุณนี้... ฉันตอบแทนด้วยชีวิตค่ะ!"
20025-CVGroup_Growup_4-1 = "ทะ... ทำยังไงดีคะ!? ฉันควรต้องทำยังไง...!?\nฉันจะทำทุกอย่างค่ะ! สั่งมาได้เลยค่ะ!"
20025-CVGroup_Relationship_Up_1-1 = "บะ... บุญคุณที่คุณครูให้มา\nเพิ่มขึ้นอีกแล้วค่ะ...! มันสะสมไว้เยอะเลยค่ะ...!"
20025-CVGroup_Relationship_Up_2-1 = "ถึงฉันจะไม่เก่งอะไรสักอย่าง...\nแต่ก็สั่งมาได้ทุกอย่างเลยค่ะ ฉันจะทำอย่างไม่มีข้อยกเว้นค่ะ!"
20025-CVGroup_Relationship_Up_3-1 = "ขะ... ขอโทษค่ะ... มะ... ไม่สิ อึก...\nขอบคุณค่ะ..."
20025-CVGroup_Relationship_Up_4-1 = "ปีนี้ก็... ฝากตัวด้วยนะคะ...\nอ่า... เอ่อ... ไม่ได้บังคับเลยนะคะ...!"

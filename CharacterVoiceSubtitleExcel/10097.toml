10097-CVGroup_Battle_Defense_1-1 = "ถอยไป... บอกให้ถอยไปไง!"
10097-CVGroup_Battle_In_1-1 = "ฮิฮิฮิ... นานๆ จะได้ทำแบบนี้สักที กระหน่ำยิงกันเลยมั้ย?"
10097-CVGroup_Battle_In_2-1 = "อ่า... ความรู้สึกนี้ อดใจไม่ไหวแล้ว!"
10097-CVGroup_Battle_Move_1-1 = "ตรงนี้ไม่มีปัญหา"

[translation]
10097-CVGroup_Battle_Buffed_1-1 = "아, 고마워!"
10097-CVGroup_Battle_Covered_1-1 = "엄호 부탁해."
10097-CVGroup_Battle_Defense_1-1 = "물러... 무르다고!"
10097-CVGroup_Battle_In_1-1 = "쿠히히… 모처럼이니, 마음껏 쏴 볼까?"
10097-CVGroup_Battle_In_2-1 = "아아… 이 감각, 참을 수 없어!"
10097-CVGroup_Battle_Move_1-1 = "본 구역, 이상 없음."
10097-CVGroup_Battle_Move_2-1 = "이동할게."
10097-CVGroup_Battle_Recovery_1-1 = "보급 수령, 확인!"
10097-CVGroup_Battle_TacticalAction_1-1 = "클리어~"
10097-CVGroup_Battle_Victory_1-1 = "좋아… 좋아… 최고야…!"
10097-CVGroup_Battle_Victory_2-1 = "하아, 하아… 터진다…!"
10097-CVGroup_CommonSkill-1 = "물풍선이라고 방심하면 안 된다고?"
10097-CVGroup_ExSkill_1-1 = "목표 위치 확인…… 화력 최대로!"
10097-CVGroup_ExSkill_2-1 = "여기는 RABBIT 3. 공격을 허가한다!"
10097-CVGroup_ExSkill_3-1 = "미사일… 아앗… 날아가 버렸다!"
10097-CVGroup_ExSkill_Level_1-1 = "가까워… 위험할 만큼 가까워…!"
10097-CVGroup_ExSkill_Level_2-1 = "알파! 마이크! 폭스트롯!"
10097-CVGroup_ExSkill_Level_3-1 = "환상적이야……"
10097-CVGroup_Formation_In_1-1 = "그래서, 지금부터 어디를 터트리면 되는 거야?"
10097-CVGroup_Formation_In_2-1 = "쿠히히… 기다리고 있었다고."
10097-CVGroup_Formation_Select-1 = "하아, 하아… 진짜 미사일도 이렇게 부풀릴 수 있다면 좋을 텐데……"
10097-CVGroup_Growup_1-1 = "음음, 그렇구나. 여기와 여기를 이으면 거대한 폭발이……"
10097-CVGroup_Growup_2-1 = "쿠히히… 이것으로 잔뜩 터트릴 수 있겠네."
10097-CVGroup_Growup_3-1 = "걱정마. 완벽히 이해했으니까!"
10097-CVGroup_Growup_4-1 = "하아, 하아… 타오른다, 타올라…"
10097-CVGroup_Relationship_Up_1-1 = "앞을 가로막는 장애물이 있으면 언제든 불러줘.\n깔끔하게 폭파해 줄 테니까. 쿠히히…"
10097-CVGroup_Relationship_Up_2-1 = "언젠가. 견딜 수 없을 정도로 궁지에 몰리거든, 나를 찾아줘.\n어떤 파멸이라도 함께해 줄게."
10097-CVGroup_Relationship_Up_3-1 = "선생님을 보고 있노라면 파멸의 경계가 흐릿해지네. …곤란해."
10097-CVGroup_Relationship_Up_4-1 = "고마워, 선생님. 덕분에 사람의 마음도\n폭탄처럼 터질 수 있다는 것을 알게 되었거든."
10097-CVGroup_Tactic_In_1-1 = "으음~ 오랜만에 몸 좀 풀어볼까?"
10097-CVGroup_Tactic_In_2-1 = "오퍼레이터를 선두에 세우다니, 너무하네~"
10097-CVGroup_Tactic_Victory_1-1 = "어라? 벌써 끝난 거야? 아직 폭탄은 잔뜩 남아 있는데?"
10097-CVGroup_Tactic_Victory_2-1 = "쿠히히… 이 정도의 폭탄으로 해결할 수 없다면\n더 많은 양을 준비하면 되는 거잖아?"

[translation]
20041-CVGroup_CommonSkill-1 = "AMAS，這裡就交給你了。"
20041-CVGroup_ExSkill_1-1 = "我注視著一切。"
20041-CVGroup_ExSkill_2-1 = "例外並不存在。就連你也一樣。"
20041-CVGroup_ExSkill_3-1 = "以為我會存在死角嗎？"
20041-CVGroup_ExSkill_Level_1-1 = "需要這個對吧？"
20041-CVGroup_ExSkill_Level_2-1 = "這就是你的可能性。"
20041-CVGroup_ExSkill_Level_3-1 = "收下吧。"
20041-CVGroup_Formation_In_1-1 = "我會向你展示合理的解答。"
20041-CVGroup_Formation_In_2-1 = "無論任何時候，都要做出正確的選擇。"
20041-CVGroup_Formation_Select-1 = "呀啊！？\n……得救了。"
20041-CVGroup_Growup_1-1 = "成長了呢。\n……還想聽到什麼嗎？"
20041-CVGroup_Growup_2-1 = "在有成長餘地的人身上投入資源……\n是個合理的選擇呢，老師。"
20041-CVGroup_Growup_3-1 = "是嗎，你對我抱有期待啊。\n交給我吧。我會用結果來證明的。"
20041-CVGroup_Growup_4-1 = "那個……謝謝你，老師。\n……雖然我不清楚這麼說，究竟是否正確就是了。"
20041-CVGroup_Relationship_Up_1-1 = "只要待在你的身邊，脈搏就會變得不規律……\n這是為什麼呢……"
20041-CVGroup_Relationship_Up_2-1 = "老師你……說是我人生中出現的唯一變數也不為過。\n……話雖如此，你的言行總是會令我動搖呢。"
20041-CVGroup_Relationship_Up_3-1 = "即便談論「未來」也沒有意義。畢竟那是不確定的要素。\n然而，每當看見你的時候……總是會令我不禁思考各式各樣的可能性。"
20041-CVGroup_Relationship_Up_4-1 = "老師？……我只是模仿其他學生喊喊看而已。\n……這比想像中還難說出口數倍呢。"

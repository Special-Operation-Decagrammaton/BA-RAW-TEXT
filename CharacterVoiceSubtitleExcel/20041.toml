[translation]
20041-CVGroup_CommonSkill-1 = "I'll leave this place to you, AMAS."
20041-CVGroup_ExSkill_1-1 = "I'm looking at all of it."
20041-CVGroup_ExSkill_2-1 = "No exceptions. Including you."
20041-CVGroup_ExSkill_3-1 = "I'm everywhere."
20041-CVGroup_ExSkill_Level_1-1 = "This is what you needed, right?"
20041-CVGroup_ExSkill_Level_2-1 = "This represents your potential."
20041-CVGroup_ExSkill_Level_3-1 = "I hope you take it."
20041-CVGroup_Formation_In_1-1 = "I will show you the power of a rational mind."
20041-CVGroup_Formation_In_2-1 = "Reason and emotion must work in harmony."
20041-CVGroup_Formation_Select-1 = "Ugh...?! Okay, good job."
20041-CVGroup_Growup_1-1 = "I've gotten stronger. You're asking if that's all I have to say? It is. So what?"
20041-CVGroup_Growup_2-1 = "Investing in those with potential is always a rational choice, Sensei."
20041-CVGroup_Growup_3-1 = "You're expecting a lot from me, aren't you? Well, leave it to me. I won't let you down."
20041-CVGroup_Growup_4-1 = "And, um...thank you, Sensei. I'm supposed to say that in times like this, right?"
20041-CVGroup_Relationship_Up_1-1 = "When I'm with you, my temperature and my pulse both go up. I wonder why..."
20041-CVGroup_Relationship_Up_2-1 = "Sensei... You're the only variable in my life. And your words always manage to sway me."
20041-CVGroup_Relationship_Up_3-1 = "Honestly, I don't like talking about the future, since it's always so uncertain. But when I'm with you...the future's possibilities always come to mind."
20041-CVGroup_Relationship_Up_4-1 = "Sensei? I just wanted to call you. I was, um, doing something I saw somewhere...and it's...much more embarrassing than I thought."

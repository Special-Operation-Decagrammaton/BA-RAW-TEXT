[translation]
20041-CVGroup_CommonSkill-1 = "AMAS ฝากที่นี่ด้วยนะ"
20041-CVGroup_ExSkill_1-1 = "ฉันจับตาดูอยู่นะ ทุกคนเลย"
20041-CVGroup_ExSkill_2-1 = "ไม่มีข้อยกเว้นใดๆ รวมถึงคุณด้วย"
20041-CVGroup_ExSkill_3-1 = "ฉันอยู่ในทุกๆ ที่"
20041-CVGroup_ExSkill_Level_1-1 = "ต้องการสิ่งนี้ใช่มั้ย?"
20041-CVGroup_ExSkill_Level_2-1 = "นี่แหละความเป็นไปได้ของคุณ"
20041-CVGroup_ExSkill_Level_3-1 = "ยอมรับมันซะเถอะ"
20041-CVGroup_Formation_In_1-1 = "ฉันจะแสดงให้เห็นถึงพลังของความสมเหตุสมผลเอง"
20041-CVGroup_Formation_In_2-1 = "การผสมผสานกันระหว่างเหตุผลและอารมณ์เป็นสิ่งสำคัญนะ"
20041-CVGroup_Formation_Select-1 = "อึก...?!\nดี ทำได้ดีมาก"
20041-CVGroup_Growup_1-1 = "เติบโตขึ้นแล้วนะ\nพูดชมแค่นั้นเองน่ะเหรอ? ก็ใช่น่ะสิ"
20041-CVGroup_Growup_2-1 = "ลงทุนทรัพยากรให้กับผู้ที่มีศักยภาพ...\nมันเป็นทางเลือกที่สมเหตุสมผลแล้วละ ครู"
20041-CVGroup_Growup_3-1 = "คาดหวังจากฉันไว้สูงงั้นเหรอ?\nไว้ใจได้เลยครู ฉันจะพิสูจน์ด้วยผลลัพธ์เอง"
20041-CVGroup_Growup_4-1 = "ขะ... ขอบคุณนะครู\nพูดแบบนี้ในเวลาแบบนี้ถูกแล้วใช่มั้ย?"
20041-CVGroup_Relationship_Up_1-1 = "พอได้อยู่กับคุณ อุณหภูมิกับชีพจรจะสูงขึ้น... เพราะอะไรกันนะ"
20041-CVGroup_Relationship_Up_2-1 = "ครูน่ะ... เป็นตัวแปรเดียวในชีวิตฉันก็ว่าได้\nเพราะงั้น... เลยรู้สึกกระวนกระวายใจกับคำพูดและการกระทำของคุณ"
20041-CVGroup_Relationship_Up_3-1 = "จริงๆ แล้ว ฉันไม่ช่อบพูดเกี่ยวกับอนาคตสักเท่าไร\nทุกสิ่งมีความไม่แน่นอนในตัวมันเอง แต่ถ้าอยู่กับคุณละก็...\nดันคิดถึงความเป็นไปได้ต่างๆ ในอนาคตซะแล้วสิ"
20041-CVGroup_Relationship_Up_4-1 = "ครู? ฉันแค่ลองเรียกดูเฉยๆ น่ะ\nก็แค่ทำตามที่เคยเห็นมาจากไหนสักแห่งเท่านั้น\nมันน่าอายกว่าที่คิด... หลายสิบเท่าเลยนะ"

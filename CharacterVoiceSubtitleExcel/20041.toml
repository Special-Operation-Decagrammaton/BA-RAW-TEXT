[translation]
20041-CVGroup_CommonSkill-1 = "AMAS, 여길 부탁해."
20041-CVGroup_ExSkill_1-1 = "지켜보고 있어. 전부."
20041-CVGroup_ExSkill_2-1 = "예외는 없어. 당신마저도."
20041-CVGroup_ExSkill_3-1 = "난 모든 곳에 있어."
20041-CVGroup_ExSkill_Level_1-1 = "이게 필요한 거지?"
20041-CVGroup_ExSkill_Level_2-1 = "이게 당신의 가능성이야."
20041-CVGroup_ExSkill_Level_3-1 = "받아주길 바라."
20041-CVGroup_Formation_In_1-1 = "합리성의 힘을 보여 주겠어."
20041-CVGroup_Formation_In_2-1 = "이성과 감정의 조화, 중요한 부분이지."
20041-CVGroup_Formation_Select-1 = "읏……?!\n좋아. 잘했어."
20041-CVGroup_Growup_1-1 = "성장이네. 그게 감상의 전부냐고? 맞는데?"
20041-CVGroup_Growup_2-1 = "가능성을 가진 자에게 리소스를 투자한다…… 합리적인 선택이야. 선생."
20041-CVGroup_Growup_3-1 = "나에게 기대가 크다고? 맡겨 줘, 선생. 결과로 증명할 테니까."
20041-CVGroup_Growup_4-1 = "그…… 고마워, 선생. 이럴 때는 이렇게 말하는 게, 맞겠지?"
20041-CVGroup_Relationship_Up_1-1 = "당신과 있다 보면, 체온과 맥박수가 상승해…… 어째서일까."
20041-CVGroup_Relationship_Up_2-1 = "선생은…… 내 인생에 나타난 유일한 변수라고 해야.\n……그렇다 하더라도, 당신의 언동에는 항상 동요하게 되네."
20041-CVGroup_Relationship_Up_3-1 = "사실, 미래에 대해 이야기하는 것은, 그다지 좋아하지 않아. 모든 것이 불확정성 그 자체이니까.\n그렇지만 당신과 있으면…… 여러 가능성의 미래를, 생각하게 되어 버려."
20041-CVGroup_Relationship_Up_4-1 = "선생? 그냥 한 번 불러 봤어.\n……어디에서 본 걸 따라 해 봤을 뿐인데. 생각보다…… 몇십 배는 부끄럽네."

[translation]
10018-CVGroup_Battle_Buffed_1-1 = "ขะ... ขอบคุณมากค่ะ!"
10018-CVGroup_Battle_Covered_1-1 = "ฉันจะซ่อนตัวอยู่ตรงนี้แล้วดึงความสนใจเองค่ะ ตอนนี้ละ!"
10018-CVGroup_Battle_Defense_1-1 = "แค่นี้มะ... ไม่เป็นไรหรอกค่ะ!"
10018-CVGroup_Battle_In_1-1 = "กะ... ก่อนอื่นต้องแสดงท่าทางให้สมกับเป็นหัวหน้า..."
10018-CVGroup_Battle_In_2-1 = "ใจเย็นๆ เดินไปอย่างระมัดระวังนะคะ"
10018-CVGroup_Battle_Move_1-1 = "ยังไงฉันก็จะหาวิธีให้ได้... จะ... จะไปต่อแล้วนะคะ!"
10018-CVGroup_Battle_Move_2-1 = "หวุดหวิดไปแล้วนะคะ..."
10018-CVGroup_Battle_Recovery_1-1 = "ขอบคุณที่กรุณาค่ะ"
10018-CVGroup_Battle_TacticalAction_1-1 = "จะ... จะไปแล้วนะคะ!"
10018-CVGroup_Battle_Victory_1-1 = "ฮู่ว ฉันดีใจ... ที่เป็นประโยชน์ค่ะ"
10018-CVGroup_Battle_Victory_2-1 = "ขะ... ขอบคุณที่พยายามกันนะคะ! อะแหะๆ..."
10018-CVGroup_CommonSkill-1 = "จะ... จะพยายามค่ะ!"
10018-CVGroup_ExSkill_1-1 = "ลุยแล้วนะคะ..."
10018-CVGroup_ExSkill_2-1 = "เล็งเป้า... เรียบร้อยแล้วค่ะ"
10018-CVGroup_ExSkill_3-1 = "ถ้าเป็นเจ้านี่ละก็... คงสนุกขึ้นอีกแน่ๆ ค่ะ"
10018-CVGroup_ExSkill_Level_1-1 = "เรโทรตลอดไป!"
10018-CVGroup_ExSkill_Level_2-1 = "เตรียมตัวให้ดีนะคะ!"
10018-CVGroup_ExSkill_Level_3-1 = "นี่คือความเจ็บปวดของการสร้างสรรค์ค่ะ!"
10018-CVGroup_Formation_In_1-1 = "ถะ... ถ้าคุณครูต้องการละก็... ฉันเอง..."
10018-CVGroup_Formation_In_2-1 = "กะ... ก็จะพยายามสนิทกับคุณครูค่ะ... อาจจะนะ..."
10018-CVGroup_Formation_Select-1 = "ฉะ... ฉันเหรอคะ?\nฮือ... ฉันจะลองดูค่ะ!"
10018-CVGroup_Growup_1-1 = "เพราะมีคุณครูอยู่... เลยรู้สึกอุ่นใจ... นิดหน่อยค่ะ"
10018-CVGroup_Growup_2-1 = "ฉันอยากมั่นใจในตัวเองขึ้นอีกสักนิดค่ะ..."
10018-CVGroup_Growup_3-1 = "ตอนที่กลัวเหรอคะ? อืม... คงจะเป็น... ตอนที่คุณครูไม่อยู่ข้างๆ ค่ะ"
10018-CVGroup_Growup_4-1 = "ฉะ... ฉันไม่ได้แข็งแกร่งอะไร... แต่ฉันจะพยายามค่ะ เพราะฉันชอบทุกคนมากจริงๆ"
10018-CVGroup_Relationship_Up_1-1 = "ฉะ... ฉันไม่ได้รบกวนใช่มั้ยคะ?\nถ้าอย่างนั้น... แหะๆๆ... โล่งอกไปทีค่ะ"
10018-CVGroup_Relationship_Up_2-1 = "ฉันไม่ค่อยแน่ใจเท่าไรเลยค่ะ...\nเป็นความรู้สึกที่ฉันไม่คุ้นเคยสักเท่าไร... แต่... ดีใจ... จังค่ะ"
10018-CVGroup_Relationship_Up_3-1 = "ตอนที่คุณครูสั่งการหรือมาสอน...\nไม่รู้ทำไมว่าคุณครู... คือว่า... ดูเท่มากๆ เลยค่ะ"
10018-CVGroup_Relationship_Up_4-1 = "ฉะ... ฉันเองก็... เอ่อ คือว่า... นะ... น่าอายจัง!"
10018-CVGroup_Tactic_In_1-1 = "ฉะ... ฉันจะพยายาม...! เหมือนกับคนอื่นๆ ค่ะ...?!"
10018-CVGroup_Tactic_In_2-1 = "เอ๋?! ฉะ... ฉันพยายามให้เต็มที่ค่ะ..."
10018-CVGroup_Tactic_Victory_1-1 = "ฮู่ว โล่งอกไปที"
10018-CVGroup_Tactic_Victory_2-1 = "สำเร็จแล้ว... ดีใจจังเลยค่ะ... คงเป็นความรู้สึกแบบนี้เองสินะคะ"

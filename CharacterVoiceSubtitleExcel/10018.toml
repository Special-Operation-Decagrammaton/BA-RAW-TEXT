[translation]
10018-CVGroup_Battle_Buffed_1-1 = "謝，謝謝！"
10018-CVGroup_Battle_Covered_1-1 = "我，我會躲在這裡吸引注意！趁現在！"
10018-CVGroup_Battle_Defense_1-1 = "這種程度的話，沒，沒問題的！"
10018-CVGroup_Battle_In_1-1 = "總，總之得展現出像個部長的樣子才行……"
10018-CVGroup_Battle_In_2-1 = "保持冷靜，維持警戒地前進吧。"
10018-CVGroup_Battle_Move_1-1 = "總算是做到了……繼，繼續前進！"
10018-CVGroup_Battle_Move_2-1 = "真是好險……"
10018-CVGroup_Battle_Recovery_1-1 = "感謝關心。"
10018-CVGroup_Battle_TacticalAction_1-1 = "出，出發！"
10018-CVGroup_Battle_Victory_1-1 = "呼。能幫上忙……我很開心。"
10018-CVGroup_Battle_Victory_2-1 = "辛，辛苦了！\n……耶嘿嘿。"
10018-CVGroup_CommonSkill-1 = "我，我會加油的！"
10018-CVGroup_ExSkill_1-1 = "出發……"
10018-CVGroup_ExSkill_2-1 = "瞄準……結束了。"
10018-CVGroup_ExSkill_3-1 = "這個……我覺得很有趣。"
10018-CVGroup_ExSkill_Level_1-1 = "懷舊亦是永恆！"
10018-CVGroup_ExSkill_Level_2-1 = "請覺悟吧！"
10018-CVGroup_ExSkill_Level_3-1 = "這就是創作的痛苦！"
10018-CVGroup_Formation_In_1-1 = "如，如果老師需要的話……我也……"
10018-CVGroup_Formation_In_2-1 = "我，我會努力好好相處的……大概……"
10018-CVGroup_Formation_Select-1 = "要，要選我嗎？\n嗚嗚……我會試試看的！"
10018-CVGroup_Growup_1-1 = "多虧了老師……\n稍微……放心了。"
10018-CVGroup_Growup_2-1 = "希望……能成為更有自信的自己。"
10018-CVGroup_Growup_3-1 = "害怕的時候是嗎？\n唔嗯……老師不在身邊的時候……吧。"
10018-CVGroup_Growup_4-1 = "雖，雖然我一點也不強……但我會加油的。\n因為我真的很喜歡大家。"
10018-CVGroup_Relationship_Up_1-1 = "沒，沒有造成麻煩吧？\n那……耶嘿嘿，那就太好了。"
10018-CVGroup_Relationship_Up_2-1 = "我不是很清楚……\n雖然真的是我不太清楚的感情……但我，很高興。"
10018-CVGroup_Relationship_Up_3-1 = "為我們上課跟指揮的時候……\n總覺得老師……那個……該說真的很帥氣嗎。"
10018-CVGroup_Relationship_Up_4-1 = "我，我也對老師……\n那個，就是……好，好害羞！"
10018-CVGroup_Tactic_In_1-1 = "跟，跟其他人一起……！？\n我，我會加油的！"
10018-CVGroup_Tactic_In_2-1 = "咦咦！？\n我，我會盡力……"
10018-CVGroup_Tactic_Victory_1-1 = "呼，太好了。"
10018-CVGroup_Tactic_Victory_2-1 = "成功……好開心。\n原來是這種感覺啊。"

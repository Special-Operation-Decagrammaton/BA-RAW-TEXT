[translation]
10116-CVGroup_Battle_Buffed_1-1 = "적절한 지원이군."
10116-CVGroup_Battle_Defense_1-1 = "헛된 공격이다."
10116-CVGroup_Battle_In_1-1 = "선생. 지시를."
10116-CVGroup_Battle_In_2-1 = "전력으로 간다."
10116-CVGroup_Battle_Move_1-1 = "다음 포인트로 이동한다."
10116-CVGroup_Battle_Move_2-1 = "알겠다. 이동하지."
10116-CVGroup_Battle_Recovery_1-1 = "음, 고맙다."
10116-CVGroup_Battle_TacticalAction_1-1 = "가자."
10116-CVGroup_Battle_Victory_1-1 = "임무 성공이다."
10116-CVGroup_Battle_Victory_2-1 = "작전 종료."
10116-CVGroup_CommonSkill-1 = "잠시 정비를……."
10116-CVGroup_ExSkill_1-1 = "봐버렸다면 어쩔 수 없지."
10116-CVGroup_ExSkill_2-1 = "일 때문이다. 특별한 감정은 없어."
10116-CVGroup_ExSkill_3-1 = "방해되는군."
10116-CVGroup_ExSkill_Level_1-1 = "잘 가라!"
10116-CVGroup_ExSkill_Level_2-1 = "길을 연다!"
10116-CVGroup_ExSkill_Level_3-1 = "핫!"
10116-CVGroup_Formation_In_1-1 = "특별한 임무군."
10116-CVGroup_Formation_In_2-1 = "금방 끝내주지."
10116-CVGroup_Formation_Select-1 = "음. 효율적인 이동이다."
10116-CVGroup_Growup_1-1 = "지원 고맙다. 항상 신세를 지는군."
10116-CVGroup_Growup_2-1 = "진심으로…… 선생의 믿음에 보답하고 싶다."
10116-CVGroup_Growup_3-1 = "선생이 있어 줘서… 난 앞으로 나아갈 수 있었다."
10116-CVGroup_Growup_4-1 = "감사의 마음을 전하고 싶은데…… 미안하다. 이런 쪽은 서툴러."
10116-CVGroup_Relationship_Up_1-1 = "왜 이렇게…… 가슴이 뛰지? 선생은…… 알고 있나?"
10116-CVGroup_Relationship_Up_2-1 = "선생과 만나 많은 것이 바뀌었다. 겉모습은 물론…… 마음까지도."
10116-CVGroup_Relationship_Up_3-1 = "고맙다. 절대 선생의 기대를 저버리지 않겠어."
10116-CVGroup_Relationship_Up_4-1 = "언젠가…… 선생만을 위해 이 드레스를 입어보고 싶다."
10116-CVGroup_Tactic_In_1-1 = "임무 개시."
10116-CVGroup_Tactic_In_2-1 = "변장한 채로 대응한다… 문제없다."
10116-CVGroup_Tactic_Victory_1-1 = "고맙다. 선생 덕분이야."
10116-CVGroup_Tactic_Victory_2-1 = "좋은 경험이 되었다."

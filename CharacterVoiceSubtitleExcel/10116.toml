10116-CVGroup_Battle_Recovery_1-1 = "感激不盡。"
10116-CVGroup_Battle_TacticalAction_1-1 = "出發吧。"
10116-CVGroup_Battle_Victory_1-1 = "任務成功了。"
10116-CVGroup_Battle_Victory_2-1 = "作戰結束。"
10116-CVGroup_CommonSkill-1 = "進行整備。"
10116-CVGroup_ExSkill_1-1 = "被看到了啊。"
10116-CVGroup_ExSkill_2-1 = "雖然無冤無仇，但這也是工作。"
10116-CVGroup_ExSkill_3-1 = "少礙事。"
10116-CVGroup_ExSkill_Level_1-1 = "再會了！"
10116-CVGroup_ExSkill_Level_2-1 = "開闢道路！"
10116-CVGroup_ExSkill_Level_3-1 = "哈！"
10116-CVGroup_Formation_In_1-1 = "是特別的任務嗎。"
10116-CVGroup_Formation_In_2-1 = "迅速搞定吧。"
10116-CVGroup_Formation_Select-1 = "真是精確的指揮啊。"
10116-CVGroup_Growup_1-1 = "感謝支援。"
10116-CVGroup_Growup_2-1 = "……就讓我回應老師的期待吧。"
10116-CVGroup_Growup_3-1 = "因為有老師在……我才能夠向前邁進。"
10116-CVGroup_Growup_4-1 = "雖然想向老師回報這份感謝的心情……對不起，我還不清楚該怎麼做才好。"
10116-CVGroup_Relationship_Up_1-1 = "感覺胸口比平時還要緊繃……\n如果是老師的話，會知道理由嗎？"

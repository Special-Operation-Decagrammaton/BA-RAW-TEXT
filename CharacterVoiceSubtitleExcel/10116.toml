10116-CVGroup_Relationship_Up_3-1 = "我發誓直到最後……都會回應老師的信賴。"
10116-CVGroup_Relationship_Up_4-1 = "希望能在與任務無關的情況下穿上這套禮服……\n可以的話，最好是為了老師。"
10116-CVGroup_Tactic_In_1-1 = "任務開始。"
10116-CVGroup_Tactic_In_2-1 = "就這樣進行應對……沒問題。"
10116-CVGroup_Tactic_Victory_1-1 = "感謝你，老師。"
10116-CVGroup_Tactic_Victory_2-1 = "是個很好的經驗。"

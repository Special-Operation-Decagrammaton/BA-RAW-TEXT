[translation]
10116-CVGroup_Battle_Buffed_1-1 = "適切的支援，相當感謝。"
10116-CVGroup_Battle_Defense_1-1 = "徒勞之舉。"
10116-CVGroup_Battle_In_1-1 = "老師，請下達指示。"
10116-CVGroup_Battle_In_2-1 = "我會全力以赴。"
10116-CVGroup_Battle_Move_1-1 = "往下一個地點移動。"

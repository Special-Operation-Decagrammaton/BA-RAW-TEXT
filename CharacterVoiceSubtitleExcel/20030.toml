[translation]
20030-CVGroup_CommonSkill-1 = "請用吧！"
20030-CVGroup_ExSkill_1-1 = "那麼，接下來……\n呵呵，真開心呢。"
20030-CVGroup_ExSkill_2-1 = "接下來……\n這正是探究之道。"
20030-CVGroup_ExSkill_3-1 = "嘿咻……邁向更進一步的美食！"
20030-CVGroup_ExSkill_Level_1-1 = "這種的如何？"
20030-CVGroup_ExSkill_Level_2-1 = "呵呵，這種事也很新鮮呢。"
20030-CVGroup_ExSkill_Level_3-1 = "是，請享用吧。"
20030-CVGroup_Formation_In_1-1 = "向著一旦嘗過就難以忘懷的瞬間……來，我們出發吧。"
20030-CVGroup_Formation_In_2-1 = "健全的精神，將寄宿於健全的美食。"
20030-CVGroup_Growup_1-1 = "偶爾運動一下身體也不錯呢。"
20030-CVGroup_Growup_2-1 = "總是在身旁守望著我，真是非常感謝，老師。"
20030-CVGroup_Growup_3-1 = "您無微不至的關心……真的非常感謝。\n要導覽攤販的話，就請包在我身上吧。"
20030-CVGroup_Growup_4-1 = "呵呵，今天這個日子，將會永遠刻在心坎裡吧。\n……因為發生了非常美好的事。"
20030-CVGroup_Relationship_Up_1-1 = "我……只要待在老師身邊，就會湧現各式各樣的感情。\n老師您……明白嗎？"
20030-CVGroup_Relationship_Up_2-1 = "正因為有老師在，我才得以發光發熱。"
20030-CVGroup_Relationship_Up_3-1 = "運動後的美食別有一番風味。\n倘若是和老師一同享用，則更是如此……"
20030-CVGroup_Relationship_Up_4-1 = "體育服……很適合我嗎……？\n呵，呵呵，雖，雖然是再自然不過的事……還是謝謝您。"

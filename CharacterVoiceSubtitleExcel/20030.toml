[translation]
20030-CVGroup_CommonSkill-1 = "รับไปเลยค่ะ!"
20030-CVGroup_ExSkill_1-1 = "เอาละ ต่อไปก็...\nฮุฮุ สนุกจังเลยนะคะ"
20030-CVGroup_ExSkill_2-1 = "ต่อไปก็... นี่ละนะ เส้นทางแห่งการสำรวจ"
20030-CVGroup_ExSkill_3-1 = "เอาละ... ไปหาอาหารเลิศรสเมนูอื่นกัน!"
20030-CVGroup_ExSkill_Level_1-1 = "ของแบบนี้เป็นยังไงคะ?"
20030-CVGroup_ExSkill_Level_2-1 = "ฮุฮุ อะไรแบบนี้ก็แปลกใหม่ดีนะคะ"
20030-CVGroup_ExSkill_Level_3-1 = "ค่ะ รับประทานให้อร่อยนะคะ"
20030-CVGroup_Formation_In_1-1 = "ไปสู่ช่วงเวลาที่ชิมแล้วจะไม่มีวันลืม... เอาละ ไปกันเลยมั้ยคะ?"
20030-CVGroup_Formation_In_2-1 = "ก็จิตใจที่แจ่มใสอยู่ในอาหารที่สมบูรณ์นี่คะ"
20030-CVGroup_Growup_1-1 = "บางครั้งการขยับร่างกายก็สนุกดีนะคะ "
20030-CVGroup_Growup_2-1 = "ขอบคุณที่เฝ้าดูกันเสมอนะคะ คุณครู"
20030-CVGroup_Growup_3-1 = "ขอบคุณที่... เอาใจใส่ทุกอย่างเลยนะคะ\nฉันจะแนะนำร้านให้เองค่ะ"
20030-CVGroup_Growup_4-1 = "ฮุฮุ วันนี้จะน่าจะถูกจารึกไว้ในใจตลอดไปเลยค่ะ\nเพราะมีเรื่องมหัศจรรย์มากๆ เกิดขึ้นยังไงล่ะคะ"
20030-CVGroup_Relationship_Up_1-1 = "ฉัน... เมื่ออยู่กับคุณครู จะเกิดความรู้สึกมากมายเลยค่ะ\nคุณครูก็ทราบดีหรือเปล่าคะ?"
20030-CVGroup_Relationship_Up_2-1 = "เพราะมีคุณครูอยู่ ฉันถึงเปล่งประกายได้ค่ะ"
20030-CVGroup_Relationship_Up_3-1 = "อาหารรสเลิศหลังออกกำลังกายเป็นสิ่งพิเศษค่ะ\nยิ่งถ้าได้อยู่กับคุณครูด้วยแล้วละก็..."
20030-CVGroup_Relationship_Up_4-1 = "ชุดพละ... เข้ากับฉัน... มั้ยคะ?\nฮุฮุฮุ มะ... มันก็แน่อยู่แล้ว... แต่ก็ขอบคุณนะคะ"

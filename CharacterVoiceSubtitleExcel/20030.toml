[translation]
20030-CVGroup_CommonSkill-1 = "받아 보시죠!"
20030-CVGroup_ExSkill_1-1 = "자, 다음은…… 후후, 즐겁네요."
20030-CVGroup_ExSkill_2-1 = "이다음은…… 이것이야말로 탐구의 길"
20030-CVGroup_ExSkill_3-1 = "이얍…… 또다른 미식으로!"
20030-CVGroup_ExSkill_Level_1-1 = "이런 건 어떠신가요?"
20030-CVGroup_ExSkill_Level_2-1 = "후후. 이런 것도 신선하네요."
20030-CVGroup_ExSkill_Level_3-1 = "네. 맛있게 드세요."
20030-CVGroup_Formation_In_1-1 = "맛보면 잊을 수 없을 한 때를 향해…… 자아, 가 볼까요."
20030-CVGroup_Formation_In_2-1 = "건전한 정신은, 건전한 미식에 깃드는 것이니까요."
20030-CVGroup_Formation_Select-1 = "제가 기획한 미식의 길을, 함께 걸어 보시겠어요?"
20030-CVGroup_Growup_1-1 = "몸을 움직이는 것도, 때로는 즐겁군요."
20030-CVGroup_Growup_2-1 = "언제나 지켜봐 주셔서, 감사드립니다. 선생님."
20030-CVGroup_Growup_3-1 = "하나부터 열까지…… 신경 써 주셔서, 감사드립니다.\n노점의 안내는 맡겨 주세요."
20030-CVGroup_Growup_4-1 = "후후. 오늘이라는 날은, 계속 마음에 새겨지겠군요.\n……너무나 멋진 일이 있었으니까요."
20030-CVGroup_Relationship_Up_1-1 = "저…… 선생님의 곁에 있으면, 여러 가지 감정이 넘쳐난답니다.\n선생님은 알고 계셨나요?"
20030-CVGroup_Relationship_Up_2-1 = "선생님이 계셔 주시기에, 저는 빛날 수 있답니다."
20030-CVGroup_Relationship_Up_3-1 = "운동 후의 미식은, 각별하죠.\n그것이, 선생님과 함께하는 것이라면, 더더욱……"
20030-CVGroup_Relationship_Up_4-1 = "체육복…… 어울, 리나요?\n후, 후후. 지, 지극히 당연한 것입니다만…… 감사합니다."

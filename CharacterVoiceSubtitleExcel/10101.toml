[translation]
10101-CVGroup_Battle_Buffed_1-1 = "지원 고맙다."
10101-CVGroup_Battle_Covered_1-1 = "엄폐한다."
10101-CVGroup_Battle_Defense_1-1 = "어설퍼."
10101-CVGroup_Battle_In_1-1 = "앞장서겠다."
10101-CVGroup_Battle_In_2-1 = "모두의 여름을 위해서."
10101-CVGroup_Battle_Move_1-1 = "이동하겠어."
10101-CVGroup_Battle_Move_2-1 = "다음은 어디지?"
10101-CVGroup_Battle_Recovery_1-1 = "고맙다."
10101-CVGroup_Battle_TacticalAction_1-1 = "다음."
10101-CVGroup_Battle_Victory_1-1 = "임무 완료했다."
10101-CVGroup_Battle_Victory_2-1 = "이제 슬슬 연습하러 가고 싶다만……."
10101-CVGroup_CommonSkill-1 = "오늘 업무도, 신중하게 가자."
10101-CVGroup_ExSkill_1-1 = "내가 할 수 있는 것, 하고 싶은 것은……!"
10101-CVGroup_ExSkill_2-1 = "뭔가가, 보인다……!"
10101-CVGroup_ExSkill_3-1 = "가슴이, 두근거려……!"
10101-CVGroup_ExSkill_Level_1-1 = "이걸……!"
10101-CVGroup_ExSkill_Level_2-1 = "한 곡 더……!"
10101-CVGroup_ExSkill_Level_3-1 = "지금이다!"
10101-CVGroup_Formation_In_1-1 = "뭘 하면 되지?"
10101-CVGroup_Formation_In_2-1 = "업무를 완수하겠다."
10101-CVGroup_Formation_Select-1 = "다음은 어떤 업무지?"
10101-CVGroup_Growup_1-1 = "……덕분에 업무가 원활히 진행되겠어. 고맙다."
10101-CVGroup_Growup_2-1 = "이런 거, 정말 내가 받아도 되는 건가……?"
10101-CVGroup_Growup_3-1 = "다음 급료가 들어오면, 이 은혜는 꼭……. ……음? 피, 필요 없다고?"
10101-CVGroup_Growup_4-1 = "헤아릴 수 없을 정도로 많은 은혜를 선생에게 받았는데,\n내가 할 수 있는 게 감사 인사뿐이란 사실이…… 답답하군."
10101-CVGroup_Relationship_Up_1-1 = "선생은 언제나 나를 믿어주는군. 고맙다."
10101-CVGroup_Relationship_Up_2-1 = "저어, 으음, 괜찮다면, 선생을 위해 연주를…… 아, 아니, 역시 됐다."
10101-CVGroup_Relationship_Up_3-1 = "나는 항상 선생을 응원하고 있다. ……그것만, 기억해 줘."
10101-CVGroup_Relationship_Up_4-1 = "일해서 급료를 받는 것은 쉽다.\n하지만 선생의 신뢰에 보답하는 것은…… 너무 어렵게 느껴져."
10101-CVGroup_Tactic_In_1-1 = "현장에 도착했다."
10101-CVGroup_Tactic_In_2-1 = "준비 완료. 간다."
10101-CVGroup_Tactic_Victory_1-1 = "공연 시간에는 맞출 수 있을 것 같다."
10101-CVGroup_Tactic_Victory_2-1 = "업무, 완료다."

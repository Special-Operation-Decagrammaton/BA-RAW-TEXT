[translation]
10101-CVGroup_Battle_Buffed_1-1 = "感謝支援。"
10101-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
10101-CVGroup_Battle_Defense_1-1 = "太天真了。"
10101-CVGroup_Battle_In_1-1 = "我打頭陣。"
10101-CVGroup_Battle_In_2-1 = "為了大家的夏天。"
10101-CVGroup_Battle_Move_1-1 = "進行移動。"
10101-CVGroup_Battle_Move_2-1 = "接下來該往哪裡？"
10101-CVGroup_Battle_Recovery_1-1 = "謝謝你。"
10101-CVGroup_Battle_TacticalAction_1-1 = "下一個。"
10101-CVGroup_Battle_Victory_1-1 = "任務完畢。"
10101-CVGroup_Battle_Victory_2-1 = "……已經想去練習了。"
10101-CVGroup_CommonSkill-1 = "今天的業務，也細心地完成吧。"
10101-CVGroup_ExSkill_1-1 = "我能做到的事，只有我才能做到的事……！"
10101-CVGroup_ExSkill_2-1 = "能看見，某種東西……！"
10101-CVGroup_ExSkill_3-1 = "心情，十分澎湃……！"
10101-CVGroup_ExSkill_Level_1-1 = "把這個……！"
10101-CVGroup_ExSkill_Level_2-1 = "再來一曲……！"
10101-CVGroup_ExSkill_Level_3-1 = "就是現在！"
10101-CVGroup_Formation_In_1-1 = "我該做什麼？"
10101-CVGroup_Formation_In_2-1 = "我會完成工作。"
10101-CVGroup_Formation_Select-1 = "接下來是什麼樣的工作？"
10101-CVGroup_Growup_1-1 = "……這樣工作就能進行得更圓滑了。謝謝你。"
10101-CVGroup_Growup_2-1 = "這個……真的可以收下嗎……？"
10101-CVGroup_Growup_3-1 = "下筆薪水收到以後，一定會將這份恩情……\n……唔，不，不需要？"
10101-CVGroup_Growup_4-1 = "明明已經收到老師數之不盡的恩情，\n現在的我，卻只能報以感謝的言語……真讓人焦急啊。"
10101-CVGroup_Relationship_Up_1-1 = "老師一如既往的支援，我對此表達感謝。"
10101-CVGroup_Relationship_Up_2-1 = "那個……如果不介意的話……\n讓我為老師演奏……啊，不，沒什麼。"
10101-CVGroup_Relationship_Up_3-1 = "我隨時都在為老師應援。\n……希望你能記得這點。"
10101-CVGroup_Relationship_Up_4-1 = "工作並獲得報酬很簡單。\n不過要回應老師的信賴……感覺相當困難。"
10101-CVGroup_Tactic_In_1-1 = "已到達現場。"
10101-CVGroup_Tactic_In_2-1 = "準備完畢。上吧。"
10101-CVGroup_Tactic_Victory_1-1 = "似乎能趕上表演的時間。"
10101-CVGroup_Tactic_Victory_2-1 = "工作，完成了。"

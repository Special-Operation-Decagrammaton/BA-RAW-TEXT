[translation]
16000-CVGroup_Battle_Buffed_1-1 = "謝，謝謝！"
16000-CVGroup_Battle_Defense_1-1 = "不，不會痛！"
16000-CVGroup_Battle_In_1-1 = "那，那麼就把一切都消滅吧！"
16000-CVGroup_Battle_In_2-1 = "那，那麼……小心地……去解決他們吧。"
16000-CVGroup_Battle_Move_1-1 = "按，按照命令全部解決了。"
16000-CVGroup_Battle_Move_2-1 = "還，還可以！我還能繼續！"
16000-CVGroup_Battle_Recovery_1-1 = "要，要給我嗎？"
16000-CVGroup_Battle_TacticalAction_1-1 = "我，我要上了！"
16000-CVGroup_Battle_Victory_1-1 = "如果您的希望……\n無論是誰……我都會排除的。"
16000-CVGroup_Battle_Victory_2-1 = "那，那個……\n我……還好嗎？"
16000-CVGroup_CommonSkill-1 = "啊，血……不可原諒。"
16000-CVGroup_ExSkill_1-1 = "我，我要上了！"
16000-CVGroup_ExSkill_2-1 = "總，總之先開槍！"
16000-CVGroup_ExSkill_3-1 = "遙香，要上了！"
16000-CVGroup_ExSkill_Level_1-1 = "唔，唔哇啊啊啊啊啊！"
16000-CVGroup_ExSkill_Level_2-1 = "唔哇啊啊！"
16000-CVGroup_ExSkill_Level_3-1 = "請去死吧請去死吧請去死吧！"
16000-CVGroup_Formation_In_1-1 = "噫耶……？我，我嗎！？"
16000-CVGroup_Formation_In_2-1 = "真，真的是我嗎！？"
16000-CVGroup_Formation_Select-1 = "咦……唔咦？"
16000-CVGroup_Growup_1-1 = "給，給我這種人太浪費了……"
16000-CVGroup_Growup_2-1 = "為何要對我，好到這種程度呢……？"
16000-CVGroup_Growup_3-1 = "得，得報恩才行。\n一定，絕對，無論如何都會報恩的！"
16000-CVGroup_Growup_4-1 = "如，如果是現在的我……\n或許能夠回應……您的期待！"
16000-CVGroup_Relationship_Up_1-1 = "老師……真的，很謝謝您……"
16000-CVGroup_Relationship_Up_2-1 = "我對老師……充滿了想報恩的心情。"
16000-CVGroup_Relationship_Up_3-1 = "老師……如果有想消滅的東西，請跟我說吧。\n我，我會全部……消滅的！"
16000-CVGroup_Relationship_Up_4-1 = "啊……那，那個……\n……謝謝您，老師。"
16000-CVGroup_Tactic_In_1-1 = "是！我會消滅一切！"
16000-CVGroup_Tactic_In_2-1 = "是，是！我會殺掉的！所有人！"
16000-CVGroup_Tactic_Victory_1-1 = "呼……按照您的吩咐全部達成了。"
16000-CVGroup_Tactic_Victory_2-1 = "我，我拚盡全力了！"

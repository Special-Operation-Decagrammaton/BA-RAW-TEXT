[translation]
16000-CVGroup_Battle_Buffed_1-1 = "ขะ... ขอบคุณค่ะ!"
16000-CVGroup_Battle_Defense_1-1 = "มะ... ไม่เจ็บค่ะ!"
16000-CVGroup_Battle_In_1-1 = "งะ... งั้นจะกำจัดให้หมดเลยนะคะ!"
16000-CVGroup_Battle_In_2-1 = "ถะ... ถ้างั้นก็... ไปจัดการ...\nอย่างระมัดระวังกันเถอะค่ะ"
16000-CVGroup_Battle_Move_1-1 = "ฉะ... ฉันกำจัดให้หมดตามที่สั่งแล้วค่ะ"
16000-CVGroup_Battle_Move_2-1 = "ยะ... ยังค่ะ! ฉันยังทำได้อีกค่ะ!"
16000-CVGroup_Battle_Recovery_1-1 = "หะ... ให้ฉันเหรอคะ?"
16000-CVGroup_Battle_TacticalAction_1-1 = "ปะ... ไปเลยค่ะ!"
16000-CVGroup_Battle_Victory_1-1 = "ถ้าต้องการละก็... ไม่ว่าใคร... ฉันก็กำจัดให้ได้ค่ะ"
16000-CVGroup_Battle_Victory_2-1 = "คะ... คือว่า... ฉัน... ใช้ได้หรือเปล่าคะ?"
16000-CVGroup_CommonSkill-1 = "อ๊ะ เลือด... ยกโทษให้ไม่ได้"
16000-CVGroup_ExSkill_1-1 = "ปะ... ไปเลยค่ะ!"
16000-CVGroup_ExSkill_2-1 = "จะ... จะยิงแล้วนะคะ!"
16000-CVGroup_ExSkill_3-1 = "ฮารุกะจะลุยแล้วค่ะ!"
16000-CVGroup_ExSkill_Level_1-1 = "วะ... ว้ากกกกก!"
16000-CVGroup_ExSkill_Level_2-1 = "ว้ากกก "
16000-CVGroup_ExSkill_Level_3-1 = "ตายซะเถอะค่ะ ตายซะเถอะค่ะ ตายซะเถอะค่ะ!"
16000-CVGroup_Formation_In_1-1 = "เฮือก...? ฉะ... ฉันเหรอคะ?"
16000-CVGroup_Formation_In_2-1 = "ปะ... เป็นฉันจริงๆ เหรอคะ?!"
16000-CVGroup_Formation_Select-1 = "วะ... ว้าย?"
16000-CVGroup_Growup_1-1 = "นะ... นี่มันมากเกินไปสำหรับฉันค่ะ..."
16000-CVGroup_Growup_2-1 = "ทำไมถึงทำดีกับฉันถึงขนาดนี้ล่ะคะ...?"
16000-CVGroup_Growup_3-1 = "ตะ... ต้องตอบแทน ฉันจะต้องตอบแทนอย่างแน่นอนค่ะ!"
16000-CVGroup_Growup_4-1 = "ถะ... ถ้าเป็นฉันในตอนนี้ละก็...\nอาจจะ... ทำตามที่คาดหวังได้ก็ได้!"
16000-CVGroup_Relationship_Up_1-1 = "คุณครู... ขอบคุณจริงๆ นะคะ..."
16000-CVGroup_Relationship_Up_2-1 = "กับคุณครูแล้ว... ฉันมีความรู้สึกอยากตอบแทนเต็มเปี่ยมเลยค่ะ"
16000-CVGroup_Relationship_Up_3-1 = "คุณครู... ถ้ามีอะไรที่อยากกำจัด ก็บอกฉันนะคะ\nฉะ... ฉันจะ... กำจัดให้เรียบเลยค่ะ!"
16000-CVGroup_Relationship_Up_4-1 = "อ่า... คะ... คือว่า... ขอบคุณนะคะ... คุณครู"
16000-CVGroup_Tactic_In_1-1 = "ค่ะ! ฉันจะกำจัดให้สิ้นซากเลยค่ะ!"
16000-CVGroup_Tactic_In_2-1 = "ค่ะ ค่ะ! ฉะ... ฉันจะฆ่าให้เองค่ะ! ให้หมดเลย!"
16000-CVGroup_Tactic_Victory_1-1 = "ฮู่ว... ฉันทำให้เสร็จตามที่สั่งทุกอย่างแล้วค่ะ"
16000-CVGroup_Tactic_Victory_2-1 = "ฉะ... ฉันพยายามมากเลยนะคะ!"

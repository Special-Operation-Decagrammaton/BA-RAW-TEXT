[translation]
20052-CVGroup_CommonSkill-1 = "서명만 해 주시면 된답니다."
20052-CVGroup_ExSkill_1-1 = "구매해 주셔서 감사합니다.\n힛. 힛. 히."
20052-CVGroup_ExSkill_2-1 = "자아…… 오시죠, 보시죠……"
20052-CVGroup_ExSkill_3-1 = "항상 감사합니다……"
20052-CVGroup_ExSkill_Level_1-1 = "오세요, 오세요!\n후후후……"
20052-CVGroup_ExSkill_Level_2-1 = "이거 쏠쏠하네요……"
20052-CVGroup_ExSkill_Level_3-1 = "매출은 순조롭네요. 힛. 힛. 히."
20052-CVGroup_Formation_In_1-1 = "새로운 유통 경로라도 찾으러 가 볼까요?"
20052-CVGroup_Formation_In_2-1 = "이거, 대목의 예감이……!"
20052-CVGroup_Formation_Select-1 = "어이쿠, 부르셨나요?\n계약? 사업 확대? 어느 쪽이신가요?"
20052-CVGroup_Growup_1-1 = "어제보다 나은 오늘, 오늘보다 나은 내일……\n그것이 우리를 더 밝은 돈벌이……\n아뇨, 아뇨, 미래로 이끌어 주겠죠."
20052-CVGroup_Growup_2-1 = "출판부를 계속 살리기 위해서라도\n부장인 제가 더 강해져야겠죠.\n어디 좋은 계약 없나…… 자금 확보 수단이라든가……"
20052-CVGroup_Growup_3-1 = "오, 머리가 더 잘 돌아가게 된 느낌이에요.\n자아, 선생님. 유능한 계약 대리인이 필요하시다면.\n언제든지 저를 불러 주시죠!"
20052-CVGroup_Growup_4-1 = "감사합니다, 선생님!\n스승의 은혜를 잊지 않기 위해,\n여기 특별한 계약서를 준비했는데요.\n네? 여기 작은 글씨는 뭐냐고요?\n너, 너무 신경 쓰지 않으셔도 됩니다!"
20052-CVGroup_Relationship_Up_1-1 = "이른바 선생님과의 '친밀도'가 올라갔다는 것이군요.\n네? 그에 대한 감상이요?\n어…… 정량화하기 힘든 걸, 물으시네요……"
20052-CVGroup_Relationship_Up_2-1 = "이거…… 말로 이야기하기 힘드네요. 정말로 힘들어요.\n출판부장인 주제에 언어화가 어렵다니, \n그것도 분명히 문제이긴 한데……\n그, 이런 감정은, 익숙하지 않아서……"
20052-CVGroup_Relationship_Up_3-1 = "하아……\n그냥 확실하게 말해 버리고 편해지는 게 어떨까 해서 말이죠.\n그, 그러니까 선생님!\n아, 으으…… 죄송, 합니다. 시간을 조금만 더 주세요……"
20052-CVGroup_Relationship_Up_4-1 = "좋아요…… \n계약에서도 피할 수 없는 순간은 다가오기 마련이죠……\n선생님이 계셔서, 정말로 좋았어요.\n선생님은 저의, 모자란 문장을 채워 주시는 분이셨거든요.\n그러니까 앞으로도 계속…… 문장 교정, 부탁드리겠습니다."

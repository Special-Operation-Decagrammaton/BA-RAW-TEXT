[translation]
20052-CVGroup_CommonSkill-1 = "แค่เซ็นชื่อก็พอค่ะ"
20052-CVGroup_ExSkill_1-1 = "ขอบคุณที่ซื้อค่ะ ฮิ ฮิ ฮิ"
20052-CVGroup_ExSkill_2-1 = "เอ้า... เชิญเลยค่ะ เชิญเลือกชมได้เลยค่ะ..."
20052-CVGroup_ExSkill_3-1 = "ขอบคุณเสมอเลยนะคะ..."
20052-CVGroup_ExSkill_Level_1-1 = "เชิญเลยค่ะ เชิญเข้ามาเลย! ฮุฮุฮุ..."
20052-CVGroup_ExSkill_Level_2-1 = "ผลตอบแทนใช้ได้เลยนะคะเนี่ย..."
20052-CVGroup_ExSkill_Level_3-1 = "ยอดขายไปได้สวยเลยค่ะ ฮิ ฮิ ฮิ"
20052-CVGroup_Formation_In_1-1 = "ไปหาช่องทางจัดจำหน่ายใหม่ๆ กันเลยมั้ยคะ?"
20052-CVGroup_Formation_In_2-1 = "นี่ต้องเป็นข่าวใหญ่แน่...!"
20052-CVGroup_Formation_Select-1 = "เฮ้อ เรียกฉันเหรอคะ?\nทำสัญญา? ขยายธุรกิจ? จะเลือกทางไหนดีคะ?"
20052-CVGroup_Growup_1-1 = "วันนี้ที่ดียิ่งกว่าเมื่อวาน และพรุ่งนี้ที่ดียิ่งกว่าวันนี้...\nนั่นจะนำพาพวกเราไปสู่หนทางทำเงินที่รุ่งโรจน์...\nไม่ใช่สิ ไม่ใช่! หมายถึงไปสู่อนาคตที่สดใสต่างหากค่ะ"
20052-CVGroup_Growup_2-1 = "เพื่อที่จะรักษาชมรมสิ่งพิมพ์เอาไว้ให้ได้\nในฐานะประธาน ฉันเองก็คงต้องเข้มแข็งขึ้นกว่านี้สินะคะ\nพอจะมีสัญญาจ้างดีๆ หรืองานระดมทุนดีๆ บ้างมั้ยนะ..."
20052-CVGroup_Growup_3-1 = "โอ้ รู้สึกเหมือนสมองแล่นสุดๆ เลยค่ะ!\nเอาละค่ะ คุณครู ถ้าหากต้องการตัวแทนทำสัญญา\nมากความสามารถละก็ เรียกหาฉันได้ทุกเมื่อเลยนะคะ ฮิฮิฮิ"
20052-CVGroup_Growup_4-1 = "ขอบคุณค่ะคุณครู! เพื่อไม่ให้ลืมเลือนบุญคุณของคุณครู\nฉันเลยเตรียมสัญญาฉบับพิเศษมาให้ค่ะ...\nคะ? ตัวอักษรเล็กๆ ตรงนี้คืออะไรเหรอคะ?\nมะ... ไม่ต้องไปใส่ใจหรอกค่ะ!"
20052-CVGroup_Relationship_Up_1-1 = "นี่แสดงว่า 'ค่าความสนิทสนม' กับคุณครูเพิ่มสูงขึ้นแล้วสินะคะ...\nคะ? รู้สึกยังไงน่ะเหรอคะ?\nเอ่อ... ถามเรื่องที่วัดเป็นตัวเลขยากแบบนี้เนี่ยนะคะ..."
20052-CVGroup_Relationship_Up_2-1 = "เรื่องนี้... มันอธิบายเป็นคำพูดยากค่ะ ยากมากๆ เลยค่ะ\nทั้งที่เป็นถึงประธาน แต่กลับอธิบายเป็นคำพูดไม่ได้เนี่ย...\nเรื่องนั้นมันก็เป็นปัญหาจริงๆ นั่นแหละค่ะ...\nฉะ... ฉันไม่ชินกับความรู้สึกแบบนี้เลย..."
20052-CVGroup_Relationship_Up_3-1 = "เฮ้อ... ก็คิดว่าถ้าพูดออกไปให้ชัดเจนจะรู้สึกสบายใจกว่าน่ะค่ะ\nพะ... เพราะงั้นคุณครูคะ! อ่า อืม...\nขะ... ขอโทษค่ะ แต่ฉันขอเวลาอีกหน่อยนะคะ..."
20052-CVGroup_Relationship_Up_4-1 = "ก็ได้ค่ะ... ช่วงเวลาที่ไม่อาจหลีกเลี่ยงในการทำสัญญามาถึงจนได้สินะคะ...\nการที่มีคุณครูอยู่ด้วยเนี่ย มันดีจริงๆ เลยค่ะ\nเพราะคุณครูคือคนที่คอยเติมเต็มประโยคที่ขาดหายของฉันค่ะ\nถ้างั้นจากนี้ไปก็... รบกวนช่วยตรวจแก้ประโยคให้ฉันต่อไปด้วยนะคะ"

[translation]
20052-CVGroup_CommonSkill-1 = "You just have to sign it."
20052-CVGroup_ExSkill_1-1 = "Thank you for your purchase. Heh, heh, heh."
20052-CVGroup_ExSkill_2-1 = "Now... Come in, look around..."
20052-CVGroup_ExSkill_3-1 = "Thank you as always..."
20052-CVGroup_ExSkill_Level_1-1 = "Come in, come in! Heh, heh, heh."
20052-CVGroup_ExSkill_Level_2-1 = "This is quite profitable..."
20052-CVGroup_ExSkill_Level_3-1 = "Sales are going well. Heh, heh, heh."
20052-CVGroup_Formation_In_1-1 = "Shall we look for a new distribution channel?"
20052-CVGroup_Formation_In_2-1 = "I have a feeling this is going to be a huge hit...!"
20052-CVGroup_Formation_Select-1 = "Oh my, did you call me? For a contract? Business expansion? Which one is it?"
20052-CVGroup_Growup_1-1 = "A better today than yesterday, a better tomorrow than today... That will lead us to better business... No, no, a better future."
20052-CVGroup_Growup_2-1 = "To keep the Publishing Department running, I need to become a stronger president. I wonder if there's a good contract somewhere...or a method to secure funding..."
20052-CVGroup_Growup_3-1 = "Oh, I feel like my brain's working fast now. Now, Sensei. If you need a competent contract agent, call me anytime! Heh, heh, heh."
20052-CVGroup_Growup_4-1 = "Thank you, Sensei! I've prepared a special contract here so that I don't forget what you've done for me. Hm? What's with the fine print? Y-You don't have to worry about that!"
20052-CVGroup_Relationship_Up_1-1 = "So this is what it means to \"bond\" with Sensei. Hm? My impression? Uh... You're asking me something that's hard to quantify..."
20052-CVGroup_Relationship_Up_2-1 = "This...is hard to put it into words. It's quite difficult. To stumble over my words as the Publishing Department president...is inherently problematic... But uh, I'm not used to this feeling..."
20052-CVGroup_Relationship_Up_3-1 = "*sigh* I figure that I might as well just say it clearly and get it over with. S-So, Sensei! Ah, uhh... I'm sorry. I need a little more time, please."
20052-CVGroup_Relationship_Up_4-1 = "Great... There are moments you can't evade even through contracts... I was really happy to have you with me. You completed my trailing sentences. So please continue...to correct my lines for me."

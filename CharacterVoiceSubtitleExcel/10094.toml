[translation]
10094-CVGroup_Battle_Buffed_1-1 = "嗯！謝謝你！"
10094-CVGroup_Battle_Covered_1-1 = "躲起來囉！"
10094-CVGroup_Battle_Defense_1-1 = "打不中的啦！"
10094-CVGroup_Battle_In_1-1 = "遊戲時要像實戰一樣，實戰時要像遊戲一樣！"
10094-CVGroup_Battle_In_2-1 = "要想體會女僕的心情，這種工作也是必須的吧？"
10094-CVGroup_Battle_Move_1-1 = "總之，工作結束～！"
10094-CVGroup_Battle_Move_2-1 = "掃除結束！好累哦～"
10094-CVGroup_Battle_Recovery_1-1 = "謝謝！"
10094-CVGroup_Battle_TacticalAction_1-1 = "接下來是哪裡！"
10094-CVGroup_Battle_Victory_1-1 = "哼哼哼～看到了嗎，老師？\n今天的女僕桃井，簡直棒極了吧？"
10094-CVGroup_Battle_Victory_2-1 = "哇哈哈！這是──呃，啊啊！？"
10094-CVGroup_CommonSkill-1 = "我討厭打掃啦～\n咦咦！？"
10094-CVGroup_ExSkill_1-1 = "又沒打中！\n呃，咦？"
10094-CVGroup_ExSkill_2-1 = "我，已經生氣了！\n咦？Lucky～！"
10094-CVGroup_ExSkill_3-1 = "吼唷～趕快中啦！\n咦，這是什麼？"
10094-CVGroup_ExSkill_Level_1-1 = "找到了，稀有道具！"
10094-CVGroup_ExSkill_Level_2-1 = "哦哦哦，這股力量究竟是……！"
10094-CVGroup_ExSkill_Level_3-1 = "現在的我！無所畏懼！"
10094-CVGroup_Formation_In_1-1 = "嘗試代入女僕的心情吧！"
10094-CVGroup_Formation_In_2-1 = "要像女僕一樣全部解決唷！"
10094-CVGroup_Formation_Select-1 = "耶～！你有在看嗎，老師？\n全部都會由我來清理乾淨！"
10094-CVGroup_Growup_1-1 = "等級提升！女僕等級也提升！\n咦？女僕等級還沒有……是嗎？\n老師！那是什麼意思？"
10094-CVGroup_Growup_2-1 = "老師！嘿嘿，我變強了唷。\n咦？那要不要一起打掃？\n那就……有點……"
10094-CVGroup_Growup_3-1 = "女僕桃井的成長，好好看仔細吧！\n怎麼樣啊？老師？"
10094-CVGroup_Growup_4-1 = "啊～啊，真拿你沒辦法。\n就由我最強女僕桃井大人為你解決一切吧！"
10094-CVGroup_Relationship_Up_1-1 = "有，有老師在果然還是挺開心的吧。\n那個……這是真心話哦？"
10094-CVGroup_Relationship_Up_2-1 = "聽我說，老師！對女僕而言報酬好像是很重要的！\n所以作為獎勵……陪我玩吧！"
10094-CVGroup_Relationship_Up_3-1 = "女僕也是人啊！不休息就會壞掉的……\n所以！接下來老師要跟我一起休息！\n耶嘿嘿。"
10094-CVGroup_Relationship_Up_4-1 = "遊戲裡一旦出現女僕……\n很可能會成為攻略對象對吧？\n所以老師，你要不要也試著……攻略我看看？"
10094-CVGroup_Tactic_In_1-1 = "趕緊搞定，去玩遊戲吧！"
10094-CVGroup_Tactic_In_2-1 = "沒問題唷！畢竟有我在嘛！"
10094-CVGroup_Tactic_Victory_1-1 = "掃除完畢！大概就是這樣吧！"
10094-CVGroup_Tactic_Victory_2-1 = "我是想做就能做到的人！就是這樣！"

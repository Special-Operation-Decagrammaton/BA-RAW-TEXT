[translation]
10094-CVGroup_Battle_Buffed_1-1 = "응! 고마워!"
10094-CVGroup_Battle_Covered_1-1 = "숨는다!"
10094-CVGroup_Battle_Defense_1-1 = "안 맞는다구!"
10094-CVGroup_Battle_In_1-1 = "게임을 실전처럼, 실전을 게임처럼!"
10094-CVGroup_Battle_In_2-1 = "메이드의 기분이 되려면, 이런 일도 필요하겠지?"
10094-CVGroup_Battle_Move_1-1 = "일단, 업무 끝~!"
10094-CVGroup_Battle_Move_2-1 = "청소 완료! 피곤하다～"
10094-CVGroup_Battle_Recovery_1-1 = "고마워!"
10094-CVGroup_Battle_TacticalAction_1-1 = "다음은 어디냐!"
10094-CVGroup_Battle_Victory_1-1 = "흥후후~ 봤어? 선생님. 오늘의 메이드 모모이, 최고였지?"
10094-CVGroup_Battle_Victory_2-1 = "와하핫! 이것이―― 아앗!?"
10094-CVGroup_CommonSkill-1 = "청소는 싫어~ 으엑?!"
10094-CVGroup_ExSkill_1-1 = "또 빗나갔다! 어, 어라?"
10094-CVGroup_ExSkill_2-1 = "나 화났다구! 어? 럭키!"
10094-CVGroup_ExSkill_3-1 = "정말, 좀 맞아라! 어라, 이게 뭐지?"
10094-CVGroup_ExSkill_Level_1-1 = "찾았다, 레어템!"
10094-CVGroup_ExSkill_Level_2-1 = "오오오, 이 힘은 도대체……!"
10094-CVGroup_ExSkill_Level_3-1 = "나는 지금! 아무것도 두렵지 않아!"
10094-CVGroup_Formation_In_1-1 = "메이드의 기분이 되어 볼까!"
10094-CVGroup_Formation_In_2-1 = "메이드처럼, 전부 해결할 거야!"
10094-CVGroup_Formation_Select-1 = "예~이! 보고 있어, 선생님? 내가 전부 해결해 줄게!"
10094-CVGroup_Growup_1-1 = "레벨 업! 메이드 레벨도 업!\n어? 메이드 레벨은 아직, 이라고? 선생님! 그게 무슨 뜻이야?"
10094-CVGroup_Growup_2-1 = "선생님! 헤헷, 나 강해졌어.\n어? 그럼 같이 청소하자고? 그건…… 좀……"
10094-CVGroup_Growup_3-1 = "메이드 모모이의 성장, 똑똑히 보시길! 어때? 선생님?"
10094-CVGroup_Growup_4-1 = "아~아, 어쩔 수 없지.\n이 최강 메이드 모모이 님이 뭐든지 해결해 줄게!"
10094-CVGroup_Relationship_Up_1-1 = "선, 선생님과 있으면, 역시 즐거운 거 같아. 그…… 이건 본심이라고?"
10094-CVGroup_Relationship_Up_2-1 = "들어봐, 선생님! 메이드에게는 보수가 중요하대!\n그러니까, 보상으로…… 나랑 놀자!"
10094-CVGroup_Relationship_Up_3-1 = "메이드도 사람이야! 그리고 사람은 쉬지 않으면 고장 나지……\n그러니까 말이지! 지금부터 선생님은 나랑 쉬어야 하는 거야!\n에헤헤."
10094-CVGroup_Relationship_Up_4-1 = "게임에서 메이드가 나오면……\n높은 확률로 공략 대상이 되잖아?\n그러니까 선생님. 나도…… 공략해 보지 않을래?"
10094-CVGroup_Tactic_In_1-1 = "빨리 정리하고, 게임하러 가자!"
10094-CVGroup_Tactic_In_2-1 = "문제없어! 내가 있으니까!"
10094-CVGroup_Tactic_Victory_1-1 = "청소 완료! 뭐, 그런 느낌으로!"
10094-CVGroup_Tactic_Victory_2-1 = "하면 할 수 있는 아이! 라고!"

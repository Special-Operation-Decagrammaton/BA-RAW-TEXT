[translation]
10040-CVGroup_Battle_Buffed_1-1 = "ขะ... ขอบคุณมากค่ะ!"
10040-CVGroup_Battle_Covered_1-1 = "ฉันซ่อนตัวอยู่ค่ะฉัน! ฉันไม่เป็นไรค่ะ จริงๆ นะคะ...!"
10040-CVGroup_Battle_Defense_1-1 = "ไม่หลงกล... หรอกค่ะ!"
10040-CVGroup_Battle_In_1-1 = "ขะ... ขอใช้ชื่อของชมรมวิจัยศาสตร์นินจาเป็นเดิมพัน...!\nฉันจะพยายามค่ะ!"
10040-CVGroup_Battle_In_2-1 = "นี่เป็นภารกิจในฐานะนินจาสินะคะ...!"
10040-CVGroup_Battle_Move_1-1 = "จะไปต่อแล้วนะคะ!"
10040-CVGroup_Battle_Move_2-1 = "นินจาเคลื่อนไหวเร็วมากๆ เลยค่ะ!"
10040-CVGroup_Battle_Recovery_1-1 = "ขอบคุณมากค่ะ!"
10040-CVGroup_Battle_TacticalAction_1-1 = "ฉึบฉับๆๆ...! แบบนี้เลยค่ะ!"
10040-CVGroup_Battle_Victory_1-1 = "คะ? หรือว่าชนะแล้วเหรอคะ...? ว้าว...!"
10040-CVGroup_Battle_Victory_2-1 = "ชนะแล้วเหรอคะ...? นี่ก็เป็นพลังของนินจา...?"
10040-CVGroup_CommonSkill-1 = "ชูริเคน! อาจเจ็บสักหน่อยนะคะ...!"
10040-CVGroup_ExSkill_1-1 = "วะ... วิชานินจา... สึ... สึคุโยะ...! อ๊ะ?!"
10040-CVGroup_ExSkill_2-1 = "สิ่งที่เป็นไปได้สำหรับฉันในตอนนี้...! อ๊ะ!"
10040-CVGroup_ExSkill_3-1 = "ถ้าเพื่อการเป็นนินจาที่ยอดเยี่ยมแล้วละก็...! ย้าา?!"
10040-CVGroup_ExSkill_Level_1-1 = "วิถีนินจา! เคล็ดวิชาแปลงกายค่ะ...!"
10040-CVGroup_ExSkill_Level_2-1 = "นี่เป็น... ความสามารถพิเศษค่ะ...!"
10040-CVGroup_ExSkill_Level_3-1 = "ตอนนี้ฉันคือต้นไม้ ไม่ว่าใครก็คิดว่าฉันคือต้นไม้...!"
10040-CVGroup_Formation_In_1-1 = "มะ... หมายถึงฉันเหรอคะ...? คือว่าฉะ... ฉันจะพยายามค่ะ!"
10040-CVGroup_Formation_In_2-1 = "ฉะ... ฉันจะทำให้เต็มที่เลยค่ะ พะ... เพื่อการเป็นสุดยอดนินจา!"
10040-CVGroup_Formation_Select-1 = "ยะ... อย่าจ้องกันขนาดนั้นสิคะ..."
10040-CVGroup_Growup_1-1 = "อ่า เพื่อคนอย่างฉันแล้วถึงกับ... เพราะงั้นฉัน... จะพยายามค่ะ  "
10040-CVGroup_Growup_2-1 = "ฉันเองก็จะพยายามค่ะ เพราะฉันอยากเติบโตเป็นนินจาผู้ยิ่งใหญ่...!"
10040-CVGroup_Growup_3-1 = "และจะตอบแทนคุณครูให้ได้...!"
10040-CVGroup_Growup_4-1 = "สักวันหนึ่ง ฉันจะเป็นคนที่ทำหน้าที่ให้สมบูรณ์แบบให้ได้...!"
10040-CVGroup_Relationship_Up_1-1 = "แม้ตัวฉันจะเป็นแบบนี้... แต่ก็อยากจะพยายามเพื่อคุณครูค่ะ..."
10040-CVGroup_Relationship_Up_2-1 = "เพราะมีคุณครูอยู่ด้วย... ฉันถึงได้..."
10040-CVGroup_Relationship_Up_3-1 = "เอ๋? หมายถึงฉัน... งั้นเหรอคะ?!\nฉันไม่ได้ตัวใหญ่สะดุดตาจนบังเอิญสังเกตเห็น... งั้นเหรอคะ? "
10040-CVGroup_Relationship_Up_4-1 = "คุณครู... ขอบคุณนะคะ... ถึงฉันจะเป็นแบบนี้... แต่ถึงอย่างนั้น..."
10040-CVGroup_Tactic_In_1-1 = "ทุกคนพยายามอย่าให้บาดเจ็บนะคะ..."
10040-CVGroup_Tactic_In_2-1 = "ถ้าคุณครูไม่ว่าอะไรที่ฉันเป็นแบบนี้ละก็... ค่ะ..."
10040-CVGroup_Tactic_Victory_1-1 = "หรือว่า... ชนะแล้วเหรอคะ...? โล่งอกไปทีค่ะ..."
10040-CVGroup_Tactic_Victory_2-1 = "นี่คงเป็นพลังของนินจาสินะคะ! ค่ะ...!"

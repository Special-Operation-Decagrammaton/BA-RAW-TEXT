10070-CVGroup_Battle_Defense_1-1 = "Was that it?"
10070-CVGroup_Battle_In_1-1 = "It's time."
10070-CVGroup_Battle_In_2-1 = "I'll take point."
10070-CVGroup_Battle_Move_1-1 = "Those who stand still cannot achieve victory."
10070-CVGroup_Battle_Move_2-1 = "Over there?"
10070-CVGroup_Battle_Recovery_1-1 = "You have my thanks."
10070-CVGroup_Battle_TacticalAction_1-1 = "I'm on the move."
10070-CVGroup_Battle_Victory_1-1 = "Respect to friends and bullets to traitors... Heh."
10070-CVGroup_Battle_Victory_2-1 = "I was just savoring the moment... Heehee."
10070-CVGroup_CommonSkill-1 = "Let's try again."
10070-CVGroup_ExSkill_1-1 = "*phoooo* For the future..."
10070-CVGroup_ExSkill_2-1 = "So... Who's the opponent?"
10070-CVGroup_ExSkill_3-1 = "Now...is the time to stand up."
10070-CVGroup_ExSkill_Level_1-1 = "Goodbye. *phooooo*"
10070-CVGroup_ExSkill_Level_2-1 = "This is farewell... *phoooooo*"
10070-CVGroup_ExSkill_Level_3-1 = "It's going to rain soon. Huh."
10070-CVGroup_Formation_In_1-1 = "I wonder if there is meaning to this life."
10070-CVGroup_Formation_In_2-1 = "We have a future together, don't we?"
10070-CVGroup_Formation_Select-1 = "I-I'm not a kid!"
10070-CVGroup_Growup_1-1 = "I feel stronger! Is this...thanks to you, Sensei?"
10070-CVGroup_Growup_2-1 = "The me of today is stronger than the me of yesterday... That's just how things worked out."
10070-CVGroup_Growup_3-1 = "Here's looking at you, kid! Get it...? Do you really not know? Oh well... Sorry, I was just going with the vibes."
10070-CVGroup_Growup_4-1 = "When we have something to protect, we will stand strong. Don't ask me what that's from. I can't remember every little thing, okay?"
10070-CVGroup_Relationship_Up_1-1 = "They say you should be cautious when hunting for birds—not too fast, not to slow... Hang on—How did I get on the subject of birds...? I-I don't know."
10070-CVGroup_Relationship_Up_2-1 = "One day, we will all meet our end. Until that day comes, I hope we continue working well together... Wow! Wasn't that a cool line?!"
10070-CVGroup_Relationship_Up_3-1 = "We can close the gap one step at a time. Then one day... Wait, then what?"
10070-CVGroup_Relationship_Up_4-1 = "...I was told to avoid what is unfamiliar to me. But I've also heard that I can't grow if I don't challenge myself... Ugh, forget I said anything."
10070-CVGroup_Tactic_In_1-1 = "I guess there's no dream you won't wake up from."
10070-CVGroup_Tactic_In_2-1 = "Nice. It's the perfect position."
10070-CVGroup_Tactic_Victory_1-1 = "One has to hold their fate with their own hands."
10070-CVGroup_Tactic_Victory_2-1 = "It's always like this. I don't want to get controlled by the environment."

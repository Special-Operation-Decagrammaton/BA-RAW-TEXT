[translation]
10070-CVGroup_Battle_Buffed_1-1 = "받은 은혜는, 반드시 갚겠다."
10070-CVGroup_Battle_Covered_1-1 = "엄폐하겠어."
10070-CVGroup_Battle_Defense_1-1 = "그게 끝인가?"
10070-CVGroup_Battle_In_1-1 = "자, 시간이다."
10070-CVGroup_Battle_In_2-1 = "내가 앞장서지."
10070-CVGroup_Battle_Move_1-1 = "움직이지 않는 자에게, 승리는 없다."
10070-CVGroup_Battle_Move_2-1 = "저기인가?"
10070-CVGroup_Battle_Recovery_1-1 = "감사하지."
10070-CVGroup_Battle_TacticalAction_1-1 = "이동한다."
10070-CVGroup_Battle_Victory_1-1 = "친구에게는 경애를, 배신자에게는 총탄을……훗."
10070-CVGroup_Battle_Victory_2-1 = "나는 단지, 지금을 음미하고 있을 뿐이야…… 훗."
10070-CVGroup_CommonSkill-1 = "다시 가자."
10070-CVGroup_ExSkill_1-1 = "후우…… 미래를 위해서."
10070-CVGroup_ExSkill_2-1 = "자…… 상대는 누구지?"
10070-CVGroup_ExSkill_3-1 = "지금이야말로…… 일어설 때겠지."
10070-CVGroup_ExSkill_Level_1-1 = "잘 가라. 후."
10070-CVGroup_ExSkill_Level_2-1 = "작별이다. 후우."
10070-CVGroup_ExSkill_Level_3-1 = "비가 오겠군. 핫."
10070-CVGroup_Formation_In_1-1 = "이 삶에, 의미는 있는 것일까"
10070-CVGroup_Formation_In_2-1 = "우리에겐 미래가 있잖아?"
10070-CVGroup_Formation_Select-1 = "나, 나는 꼬마가 아니야!"
10070-CVGroup_Growup_1-1 = "강해진 느낌이 드는데! 이것도…… 선생님 덕분인가?"
10070-CVGroup_Growup_2-1 = "오늘의 나는, 어제의 나보다 성장했다…… 후, 그런 거야."
10070-CVGroup_Growup_3-1 = "『너의 눈동자에 건배』―― 이 상황에서 왜, 냐고……?\n그런 것도 모르는 건가? 어쩔 수 없군.\n미안하다. 그냥 분위기로 말했을 뿐이다."
10070-CVGroup_Growup_4-1 = "우리는 지킬 것이 있을 때, 강해질 수 있다――\n그게 뭐냐고……?\n윽……! 일일이 묻지 말라고!"
10070-CVGroup_Relationship_Up_1-1 = "새를 잡을 때에는 신중해야 한다고 하지. 너무 빠르지도, 느리지도 않게……\n갑자기 왠 새 이야기냐고? ……그, 그러게?"
10070-CVGroup_Relationship_Up_2-1 = "언젠가는 우리에게도 끝이 오겠지.\n그때까지, 서로가 통했으면 좋겠네...\n크으! 내가 생각해도 좋은 대사였어!"
10070-CVGroup_Relationship_Up_3-1 = "한 걸음,씩 천천히 거리를 좁혀가자.\n그러면, 언젠가는……\n……어떻게 되지?"
10070-CVGroup_Relationship_Up_4-1 = "……익숙하지 않은 일은 하는 게 아니라고 했던가.\n하지만 도전하지 않으면 얻을 수 없다는 말도……\n으, 역시 아무 것도 아니야. 잊어."
10070-CVGroup_Tactic_In_1-1 = "아아, 깨지 않는 꿈은 없다, 는 건가."
10070-CVGroup_Tactic_In_2-1 = "좋은데. 최고의 포지션이야."
10070-CVGroup_Tactic_Victory_1-1 = "운명은, 자신의 손으로 잡는 것이지."
10070-CVGroup_Tactic_Victory_2-1 = "늘 이런 식이지. 환경에 좌우되고 싶지는 않아."

[translation]
10070-CVGroup_Battle_Buffed_1-1 = "ฉันจะตอบแทนสิ่งที่ได้รับมาอย่างแน่นอน"
10070-CVGroup_Battle_Covered_1-1 = "ฉันจะพรางตัวก่อน"
10070-CVGroup_Battle_Defense_1-1 = "จบแค่นี้งั้นเหรอ?"
10070-CVGroup_Battle_In_1-1 = "เอาละ ได้เวลาแล้ว"
10070-CVGroup_Battle_In_2-1 = "ฉันจะนำหน้าให้เอง"
10070-CVGroup_Battle_Move_1-1 = "ไม่มีชัยชนะให้แก่ผู้ที่ไม่ลงมือหรอก"
10070-CVGroup_Battle_Move_2-1 = "อยู่ตรงนั้นเหรอ?"
10070-CVGroup_Battle_Recovery_1-1 = "ขอบคุณมาก"
10070-CVGroup_Battle_TacticalAction_1-1 = "ไปกันเลย"
10070-CVGroup_Battle_Victory_1-1 = "ความนับถือมีไว้ให้สหาย กระสุนมีไว้ให้ศัตรู... ฮึ"
10070-CVGroup_Battle_Victory_2-1 = "ฉันก็แค่ดื่มด่ำกับช่วงเวลานี้เท่านั้น... ฮึ"
10070-CVGroup_CommonSkill-1 = "ลุยกันอีกครั้งเถอะ"
10070-CVGroup_ExSkill_1-1 = "ฮู่ว... เพื่ออนาคต"
10070-CVGroup_ExSkill_2-1 = "เอาละ... ศัตรูคือใคร?"
10070-CVGroup_ExSkill_3-1 = "ตอนนี้ถึงเวลา... ลุกขึ้นสู้แล้วละ"
10070-CVGroup_ExSkill_Level_1-1 = "ลาก่อน ฟู่ว"
10070-CVGroup_ExSkill_Level_2-1 = "ลาก่อนนะ ฟู่ว"
10070-CVGroup_ExSkill_Level_3-1 = "ฝนจะตกแล้วสินะ ฮึบ!"
10070-CVGroup_Formation_In_1-1 = "ชีวิตนี้มีความหมายจริงรึเปล่า"
10070-CVGroup_Formation_In_2-1 = "มีอนาคตที่รอพวกเราอยู่นี่นะ"
10070-CVGroup_Formation_Select-1 = "ฉะ... ฉันไม่ใช่เด็กๆ แล้วนะ!"
10070-CVGroup_Growup_1-1 = "รู้สึกแข็งแกร่งขึ้นแล้ว! นี่เป็นเพราะคุณครู... งั้นเหรอ?"
10070-CVGroup_Growup_2-1 = "ตัวฉันในวันนี้ เติบโตขึ้นกว่าเมื่อวานแล้ว... ฮึ ใช่แล้วละ"
10070-CVGroup_Growup_3-1 = "『ขอส่งกำลังใจผ่านแววตาของคุณ』\nทำไมถึงร้องเพลงในสถานการณ์นี้น่ะเหรอ...?\nเรื่องแค่นี้ก็ไม่รู้งั้นเหรอ? ช่วยไม่ได้นะ\nโทษที ก็แค่พูดไปตามบรรยากาศน่ะ"
10070-CVGroup_Growup_4-1 = "เมื่อเรามีสิ่งที่ต้องปกป้อง เราจะแข็งแกร่งขึ้นได้\nหมายถึงอะไรงั้นเหรอ...?\nอึก...! อย่าถามไปซะทุกเรื่องจะได้มั้ย!"
10070-CVGroup_Relationship_Up_1-1 = "เวลาจะจับนก ต้องทำใจให้นิ่งดุจผิวน้ำ\nและต้องไม่เร็วเกินไป และไม่ช้าเกินไป...\nทำไมจู่ๆ ถึงพูดเรื่องนกงั้นเหรอ? นะ... นั่นสินะ?"
10070-CVGroup_Relationship_Up_2-1 = "สักวันหนึ่งพวกเราก็จะต้องพบจุดจบเช่นกัน\nจนกว่าจะถึงตอนนั้น หวังว่าเราจะเข้ากันได้ดีนะ\nอึก! ฉันคิดว่ามันเป็นบทพูดที่ดีนะ!"
10070-CVGroup_Relationship_Up_3-1 = "ค่อยๆ ลดระยะห่างลงทีละก้าวเถอะ\nถ้าทำอย่างนั้น สักวันหนึ่ง... จะเป็นยังไงกันนะ...?"
10070-CVGroup_Relationship_Up_4-1 = "เราไม่ควรทำสิ่งที่ไม่คุ้นชินรึเปล่านะ\nแต่ว่าถ้าไม่ลองเจอความท้าทาย ก็จะไขว่คว้าอะไรไม่ได้...\nมะ... ไม่มีอะไรหรอก ลืมๆ ไปเถอะ"
10070-CVGroup_Tactic_In_1-1 = "อ่า ไม่มีฝันใดที่ยืนยาว... อย่างนั้นเหรอ"
10070-CVGroup_Tactic_In_2-1 = "ดีมาก เป็นตำแหน่งที่ดีที่สุดเลย"
10070-CVGroup_Tactic_Victory_1-1 = "โชคชะตาเป็นสิ่งที่กำหนดด้วยมือของเราเอง"
10070-CVGroup_Tactic_Victory_2-1 = "มันก็เป็นแบบนี้อยู่เสมอนั่นแหละ\nฉันไม่อยากได้รับอิทธิพลจากสภาพแวดล้อมหรอก"

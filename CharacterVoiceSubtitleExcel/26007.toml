[translation]
26007-CVGroup_CommonSkill-1 = "火力支援，發動！"
26007-CVGroup_ExSkill_1-1 = "我也會進行協助！"
26007-CVGroup_ExSkill_2-1 = "不是從遠處觀望，我也……！"
26007-CVGroup_ExSkill_3-1 = "請稍等一下！"
26007-CVGroup_ExSkill_Level_1-1 = "讓各位久等了！"
26007-CVGroup_ExSkill_Level_2-1 = "不好意思，我來晚了！"
26007-CVGroup_ExSkill_Level_3-1 = "已抵達！"
26007-CVGroup_Formation_In_1-1 = "是，請交給我吧。"
26007-CVGroup_Formation_In_2-1 = "整備已經萬無一失了。"
26007-CVGroup_Formation_Select-1 = "有什麼問題嗎？"
26007-CVGroup_Growup_1-1 = "那個，一直以來都很謝謝您，老師。"
26007-CVGroup_Growup_2-1 = "真的一直都很謝謝您。\n這份恩情，我一定……！"
26007-CVGroup_Growup_3-1 = "呵呵……總覺得我總是一味地接受老師的幫助呢。"
26007-CVGroup_Growup_4-1 = "畢竟我總是受人幫助……我也會加油的！"
26007-CVGroup_Relationship_Up_1-1 = "……跟平常的氛圍不太一樣，是嗎？\n有，有嗎……？"
26007-CVGroup_Relationship_Up_2-1 = "這個瞬間，要是能永遠持續就好了……我是這麼想的。"
26007-CVGroup_Relationship_Up_3-1 = "是因為穿上了泳裝嗎……\n總覺得跟平時相比，好像……該說是莫名的興奮嗎？"
26007-CVGroup_Relationship_Up_4-1 = "非常感謝……我真的打從心底感謝著您。"

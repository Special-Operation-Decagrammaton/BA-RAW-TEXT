[translation]
10057-CVGroup_Battle_Buffed_1-1 = "감사합니다."
10057-CVGroup_Battle_Covered_1-1 = "이쪽으로 숨을게요."
10057-CVGroup_Battle_Defense_1-1 = "후후, 아까웠네요."
10057-CVGroup_Battle_In_1-1 = "여러분, 잘 부탁드립니다."
10057-CVGroup_Battle_In_2-1 = "미식의 길을 방해한다는 것은, 그에 상응하는 벌을 받을 각오가 있으시다는 거죠?"
10057-CVGroup_Battle_Move_1-1 = "저쪽으로 가보죠."
10057-CVGroup_Battle_Move_2-1 = "다음은 어느 쪽으로?"
10057-CVGroup_Battle_Recovery_1-1 = "어머나…. 후훗, 감사합니다."
10057-CVGroup_Battle_TacticalAction_1-1 = "우훗."
10057-CVGroup_Battle_Victory_1-1 = "올해도 어떤 미식이 우리를 기다리고 있을까요?"
10057-CVGroup_Battle_Victory_2-1 = "우후후……. 그럼, 오세치 요리를 즐기러 가보죠."
10057-CVGroup_CommonSkill-1 = "으음~ 이 맛을 기대하고 있었어요."
10057-CVGroup_ExSkill_1-1 = "이 맛은……?!"
10057-CVGroup_ExSkill_2-1 = "이럴 수가……?!"
10057-CVGroup_ExSkill_3-1 = "저에게 이런 것을…!?"
10057-CVGroup_ExSkill_Level_1-1 = "형편없네요!"
10057-CVGroup_ExSkill_Level_2-1 = "음식에 대한 모독이에요!"
10057-CVGroup_ExSkill_Level_3-1 = "음식에 경의를 표하세요!"
10057-CVGroup_Formation_In_1-1 = "미식의 시간인가요?"
10057-CVGroup_Formation_In_2-1 = "네, 알겠습니다. 걱정 마세요."
10057-CVGroup_Formation_Select-1 = "어머나. 무슨 일이신지?"
10057-CVGroup_Growup_1-1 = "어머나? 후후후…… 감사합니다. 선생님."
10057-CVGroup_Growup_2-1 = "저에게 이렇게까지 해 주셔도…… 괜찮으신가요?"
10057-CVGroup_Growup_3-1 = "선생님한테는 신세만 지고 있네요.\n저의 성장하는 모습, 그 눈에 새겨두셔야 해요?"
10057-CVGroup_Growup_4-1 = "저와 선생님의 매일이 행복으로 가득하기를."
10057-CVGroup_Relationship_Up_1-1 = "언젠가…… 언제부터인가. 미식의 길을 탐구하고 함께 걸을 수 있는 분이 생겼으면 좋겠다고 바랐답니다.\n만약 괜찮으시다면… 선생님께서, 되어 주시지 않으시겠어요?"
10057-CVGroup_Relationship_Up_2-1 = "선생님은 어떤 요리가 취향이신가요? 괜찮으시다면, 같이 찾으러 가죠."
10057-CVGroup_Relationship_Up_3-1 = "조금만 더…. 곁에 있어주시겠어요? 네…… 조금만, 더요."
10057-CVGroup_Relationship_Up_4-1 = "눈치채셨나요?\n저에게 있어, 선생님과 보내는 순간은 언제나 특별하답니다.\n그것이 비록 식사와는 상관없는 시간이라 할지라도요."
10057-CVGroup_Tactic_In_1-1 = "자아, 가 보도록 하죠."
10057-CVGroup_Tactic_In_2-1 = "우후후. 기대되는걸요?"
10057-CVGroup_Tactic_Victory_1-1 = "미식을 방해하니, 그렇게 되는 거랍니다."
10057-CVGroup_Tactic_Victory_2-1 = "사느냐, 먹느냐. 그것이 문제로군요."

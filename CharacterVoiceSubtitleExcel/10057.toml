[translation]
10057-CVGroup_Battle_Buffed_1-1 = "ขอบคุณค่ะ"
10057-CVGroup_Battle_Covered_1-1 = "ฉันจะซ่อนตัวอยู่ทางนี้ค่ะ"
10057-CVGroup_Battle_Defense_1-1 = "ฮุฮุ น่าเสียดายจังเลยค่ะ"
10057-CVGroup_Battle_In_1-1 = "ขอรบกวนด้วยนะคะ ทุกคน"
10057-CVGroup_Battle_In_2-1 = "มาขัดขวางเส้นทางแห่งอาหารเลิศรสแบบนี้\nแสดงว่าคุณพร้อมที่จะได้รับโทษแล้วใช่มั้ยคะ?"
10057-CVGroup_Battle_Move_1-1 = "ลองไปทางนั้นกันเถอะค่ะ"
10057-CVGroup_Battle_Move_2-1 = "ต่อไปต้องไปทางไหนคะ?"
10057-CVGroup_Battle_Recovery_1-1 = "ตายจริง... ฮุฮุ ขอบคุณค่ะ"
10057-CVGroup_Battle_TacticalAction_1-1 = "ฮุฮุ"
10057-CVGroup_Battle_Victory_1-1 = "ปีใหม่นี้จะมีอาหารเลิศรสแบบไหนรอพวกเราอยู่กันนะคะ?"
10057-CVGroup_Battle_Victory_2-1 = "ฮุฮุฮุ... ถ้างั้นก็ไปเพลิดเพลินกับโอเซจิแสนอร่อยกันเถอะค่ะ"
10057-CVGroup_CommonSkill-1 = "อืม~ ฉันตั้งตารอรสชาติแบบนี้อยู่เลยค่ะ"
10057-CVGroup_ExSkill_1-1 = "รสชาติแบบนี้มัน...?!"
10057-CVGroup_ExSkill_2-1 = "อะไรกันเนี่ย...?!"
10057-CVGroup_ExSkill_3-1 = "ทำไมถึงให้ของแบบนี้กับฉัน...!?"
10057-CVGroup_ExSkill_Level_1-1 = "ไม่ได้เรื่องเลยค่ะ!"
10057-CVGroup_ExSkill_Level_2-1 = "นี่เป็นการดูถูกอาหารสุดๆ เลยค่ะ!"
10057-CVGroup_ExSkill_Level_3-1 = "กรุณาให้เกียรติอาหารด้วยนะคะ!"
10057-CVGroup_Formation_In_1-1 = "ถึงเวลาชิมแล้วใช่มั้ยคะ?"
10057-CVGroup_Formation_In_2-1 = "ค่ะ เข้าใจแล้วค่ะ ไม่ต้องห่วงนะคะ"
10057-CVGroup_Formation_Select-1 = "ตายจริง มีอะไรเหรอคะ?"
10057-CVGroup_Growup_1-1 = "ตายจริง ฮุฮุฮุ... ขอบคุณค่ะ คุณครู "
10057-CVGroup_Growup_2-1 = "ทำให้ฉันถึงขนาดนี้เลย... จะไม่เป็นไรงั้นเหรอคะ?"
10057-CVGroup_Growup_3-1 = "ฉันไปรบกวนคุณครูอยู่ตลอดเลยค่ะ\nภาพการเติบโตของฉัน โปรดจดจำไว้ให้ดีนะคะ"
10057-CVGroup_Growup_4-1 = "ขอให้คุณครูมีความสุขในทุกๆ วันนะคะ"
10057-CVGroup_Relationship_Up_1-1 = "สักวันหนึ่ง... สักวันหนึ่งข้างหน้า...\nถ้ามีใครสักคนที่จะเดินร่วมทางค้นหาอาหารเลิศรสไปด้วยกันก็คงดีนะคะ\nถ้าคุณครูไม่รังเกียจละก็... ช่วยเป็นคนคนนั้นให้ฉันได้รึเปล่าคะ?"
10057-CVGroup_Relationship_Up_2-1 = "คุณครูชอบทานอาหารแบบไหนเหรอคะ?\nถ้าคุณครูสะดวก... เราไปค้นหาด้วยกันมั้ยคะ?"
10057-CVGroup_Relationship_Up_3-1 = "ช่วยอยู่ด้วยกันต่อ... อีกสักหน่อยได้รึเปล่าคะ?\nค่ะ... อีกแค่แป๊บเดียวก็ได้ค่ะ"
10057-CVGroup_Relationship_Up_4-1 = "รู้ตัวแล้วเหรอคะ? สำหรับฉันแล้ว\nช่วงเวลาที่ได้อยู่กับคุณครูคือช่วงเวลาที่พิเศษเสมอๆ ค่ะ\nถึงจะเป็นช่วงเวลาที่ไม่เกี่ยวข้องกับอาหารก็ตามค่ะ"
10057-CVGroup_Tactic_In_1-1 = "เอ้า รีบไปกันเถอะค่ะ"
10057-CVGroup_Tactic_In_2-1 = "ฮุฮุฮุ ชักตื่นเต้นแล้วละค่ะ"
10057-CVGroup_Tactic_Victory_1-1 = "ที่กลายเป็นแบบนั้น\nเพราะเข้ามารบกวนการชิมอาหารของฉันนั่นแหละค่ะ"
10057-CVGroup_Tactic_Victory_2-1 = "ทั้งการมีชีวิตหรือการทานอาหาร ล้วนแล้วแต่เป็นปัญหาสินะคะ"

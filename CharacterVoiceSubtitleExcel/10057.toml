[translation]
10057-CVGroup_Battle_Buffed_1-1 = "非常感謝。"
10057-CVGroup_Battle_Covered_1-1 = "就讓我躲藏在這裡吧。"
10057-CVGroup_Battle_Defense_1-1 = "呵呵，真可惜呢。"
10057-CVGroup_Battle_In_1-1 = "各位，還請多多指教。"
10057-CVGroup_Battle_In_2-1 = "既然膽敢阻礙美食之道，想必也已經做好承受相應懲罰的覺悟了吧？"
10057-CVGroup_Battle_Move_1-1 = "往那邊出發吧。"
10057-CVGroup_Battle_Move_2-1 = "接下來該往哪裡呢？"
10057-CVGroup_Battle_Recovery_1-1 = "哎呀……呵呵，非常感謝。"
10057-CVGroup_Battle_TacticalAction_1-1 = "呵呵。"
10057-CVGroup_Battle_Victory_1-1 = "今年會有怎樣的美食在等著我們呢？"
10057-CVGroup_Battle_Victory_2-1 = "唔呵呵……那麼，前去享受御節料理吧。"
10057-CVGroup_CommonSkill-1 = "嗯嗯～這個味道就是我所盼望的。"
10057-CVGroup_ExSkill_1-1 = "這是……！？"
10057-CVGroup_ExSkill_2-1 = "怎麼會……！？"
10057-CVGroup_ExSkill_3-1 = "竟然給我這種東西……！？"
10057-CVGroup_ExSkill_Level_1-1 = "成何體統！"
10057-CVGroup_ExSkill_Level_2-1 = "這是對吃的褻瀆！"
10057-CVGroup_ExSkill_Level_3-1 = "請對食物抱持敬意！"
10057-CVGroup_Formation_In_1-1 = "到美食時間了呢？"
10057-CVGroup_Formation_In_2-1 = "是，我明白。無須擔心。"
10057-CVGroup_Formation_Select-1 = "哎呀，怎麼了嗎？"
10057-CVGroup_Growup_1-1 = "哎呀？唔呵呵……謝謝您，老師。"
10057-CVGroup_Growup_2-1 = "為我做到這種程度……真的好嗎？"
10057-CVGroup_Growup_3-1 = "總是一味受到老師的照顧呢。\n我成長的模樣，還請您將其烙印在眼中哦？"
10057-CVGroup_Growup_4-1 = "希望我與老師的每天都能被幸福圍繞。"
10057-CVGroup_Relationship_Up_1-1 = "希望有朝一日……有朝一日能找到可以一同探究美食之道、一同攜手前行的對象。\n如果可以的話……老師您，願意成為那個人嗎？"
10057-CVGroup_Relationship_Up_2-1 = "老師喜歡怎麼樣的料理呢？\n不介意的話，讓我們一起尋找吧？"
10057-CVGroup_Relationship_Up_3-1 = "能再稍微……留在我身邊一會嗎？\n是的……只要再一會就行了。"
10057-CVGroup_Relationship_Up_4-1 = "您注意到了嗎？\n對我而言，與老師度過的瞬間永遠都是特別的。\n即便是和用餐無關的時間也一樣。"
10057-CVGroup_Tactic_In_1-1 = "來，我們出發吧。"
10057-CVGroup_Tactic_In_2-1 = "唔呵呵，真期待呢。"
10057-CVGroup_Tactic_Victory_1-1 = "因為你妨礙了美食，才會落得那種下場哦。"
10057-CVGroup_Tactic_Victory_2-1 = "是生，還是吃──那是個問題。"

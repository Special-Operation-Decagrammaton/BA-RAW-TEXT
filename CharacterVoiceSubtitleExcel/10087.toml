[translation]
10087-CVGroup_Battle_Buffed_1-1 = "지원 감사합니다!"
10087-CVGroup_Battle_Covered_1-1 = "후, 숨었다구요."
10087-CVGroup_Battle_Defense_1-1 = "소용 없다구요!"
10087-CVGroup_Battle_In_1-1 = "후후, 저의 활약을, 부디 그 눈에 새겨주세요."
10087-CVGroup_Battle_In_2-1 = "자, 작전 수행 시작합니다."
10087-CVGroup_Battle_Move_1-1 = "자, 갈까요?"
10087-CVGroup_Battle_Move_2-1 = "다음 파티장으로."
10087-CVGroup_Battle_Recovery_1-1 = "아, 고마워요!"
10087-CVGroup_Battle_TacticalAction_1-1 = "다음 포인트로 이동합니다."
10087-CVGroup_Battle_Victory_1-1 = "후후, 선임행정관에게 어울리는 활약이었네요!"
10087-CVGroup_Battle_Victory_2-1 = "어땠나요? 저, 힘냈답니다!"
10087-CVGroup_CommonSkill-1 = "놓치지 않겠어요!"
10087-CVGroup_ExSkill_1-1 = "…역시, 그랬군요."
10087-CVGroup_ExSkill_2-1 = "여러분, 포지션에 서 주세요!"
10087-CVGroup_ExSkill_3-1 = "위험 요소는, 처리하겠어요!"
10087-CVGroup_ExSkill_Level_1-1 = "포위망에 빈틈 따윈 없어요!"
10087-CVGroup_ExSkill_Level_2-1 = "여러분, 확실하게 대처해 나갑시다!"
10087-CVGroup_ExSkill_Level_3-1 = "선도부에게서 벗어날 수 있을 거라 생각했나요!"
10087-CVGroup_Formation_In_1-1 = "네에! 가볼까요!"
10087-CVGroup_Formation_In_2-1 = "저한테 맡겨주세요."
10087-CVGroup_Formation_Select-1 = "뭔가 필요한 게 있으시다면 뭐든지 말씀해 주세요."
10087-CVGroup_Growup_1-1 = "한결 같은 지원. 감사합니다. 후훗."
10087-CVGroup_Growup_2-1 = "또 한 걸음, 성장할 수 있었네요.\n믿음직스러운 존재가 되었다면, 더할 나위 없답니다."
10087-CVGroup_Growup_3-1 = "……감사합니다. 선생님. ……일단, 항상 감사하게 생각하고 있다구요?"
10087-CVGroup_Growup_4-1 = "또 한 걸음, 나아갔네요.\n성장한 만큼, 더욱 완벽한 선생님의 보좌를 약속드릴게요."
10087-CVGroup_Relationship_Up_1-1 = "또, 인가요. \n…이제는, 그 정도로 당황하거나 하진 않으니까요.\n두고 보라구요."
10087-CVGroup_Relationship_Up_2-1 = "아…. 아, 아뇨. 당황하지 않았어요. 절대로.\n평소보다 거리감이 가까워도\n전~혀 아무렇지 않으니까요. 네!"
10087-CVGroup_Relationship_Up_3-1 = "항상 정신을 차리고 보면 훌쩍 가까이 다가와 있죠. 당신이란 사람은….\n…치사해요.\n정말로, 치사하다구요."
10087-CVGroup_Relationship_Up_4-1 = "예전에 말씀드렸다시피…. 딱히 선생님을 싫어하는 건 아니에요.\n……그 말은, 거짓 하나 없는 진심이라구요?"
10087-CVGroup_Tactic_In_1-1 = "네, 작전을 시작하겠어요. 선생님, 지휘, 부탁드릴게요."
10087-CVGroup_Tactic_In_2-1 = "제가 현장으로 직접 나가겠습니다. 선생님, 지원을 부탁드리겠어요."
10087-CVGroup_Tactic_Victory_1-1 = "어머, 놀랐어요. 선생님 지휘가, 설마 이 정도였을 줄이야."
10087-CVGroup_Tactic_Victory_2-1 = "네, 완벽한 연계였습니다. 후후, 저도 현장에 나온 보람이 있네요."

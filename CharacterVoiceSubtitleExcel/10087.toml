[translation]
10087-CVGroup_Battle_Buffed_1-1 = "感謝支援！"
10087-CVGroup_Battle_Covered_1-1 = "呼，躲藏起來了唷。"
10087-CVGroup_Battle_Defense_1-1 = "沒用的！"
10087-CVGroup_Battle_In_1-1 = "呵呵，我的活躍表現，還請將其烙印在眼底哦。"
10087-CVGroup_Battle_In_2-1 = "來，要執行作戰囉。"
10087-CVGroup_Battle_Move_1-1 = "來，我們出發吧？"
10087-CVGroup_Battle_Move_2-1 = "前往下一個會場。"
10087-CVGroup_Battle_Recovery_1-1 = "非，非常感謝！"
10087-CVGroup_Battle_TacticalAction_1-1 = "往下一個地點移動。"
10087-CVGroup_Battle_Victory_1-1 = "呵呵，真是與行政官相稱的活躍表現呢！"
10087-CVGroup_Battle_Victory_2-1 = "怎麼樣呢？我有努力了唷。"
10087-CVGroup_CommonSkill-1 = "別想逃！"
10087-CVGroup_ExSkill_1-1 = "……果然是那樣呢。"
10087-CVGroup_ExSkill_2-1 = "大家，請各就各位！"
10087-CVGroup_ExSkill_3-1 = "排除危險因子！"
10087-CVGroup_ExSkill_Level_1-1 = "包圍網不存在縫隙！"
10087-CVGroup_ExSkill_Level_2-1 = "大家，要確實地應對唷！"
10087-CVGroup_ExSkill_Level_3-1 = "以為能從風紀委員會手中逃掉嗎！"
10087-CVGroup_Formation_In_1-1 = "是！出發吧！"
10087-CVGroup_Formation_In_2-1 = "請交給我吧。"
10087-CVGroup_Formation_Select-1 = "如果有任何需要的東西，請儘管提出。"
10087-CVGroup_Growup_1-1 = "一如既往的支援，真是非常感謝……呵呵。"
10087-CVGroup_Growup_2-1 = "又邁出了成長的一步。\n如果能成為值得依賴的存在，那就正如我所願了。"
10087-CVGroup_Growup_3-1 = "……非常感謝您，老師。\n……平時也姑且有感謝您的唷？"
10087-CVGroup_Growup_4-1 = "又前進了一步。\n我向您承諾，會將獲得的成長化為對老師更加完美的輔佐。"
10087-CVGroup_Relationship_Up_1-1 = "又來了嗎。\n……我已經不會因為這種程度就驚慌失措了。\n請看著吧。"
10087-CVGroup_Relationship_Up_2-1 = "啊……沒，沒有。我才沒有動搖之類的哦。完全沒有。\n即使距離比平時還近，我也完～全不在意！"
10087-CVGroup_Relationship_Up_3-1 = "總是回過神來才發覺已經悄悄走進他人心裡了呢，您這個人……\n……真狡猾。真是太狡猾了。"
10087-CVGroup_Relationship_Up_4-1 = "就像先前跟您說過的一樣……我其實並沒有討厭老師的意思。\n……那句話，是我毫無虛偽的真心哦？"
10087-CVGroup_Tactic_In_1-1 = "是，開始作戰。\n老師，指揮就麻煩您囉。"
10087-CVGroup_Tactic_In_2-1 = "由我直接到現場去吧。\n麻煩老師進行支援。"
10087-CVGroup_Tactic_Victory_1-1 = "哦呀，真是驚人。\n老師的指揮，竟然能達到這種程度。"
10087-CVGroup_Tactic_Victory_2-1 = "沒錯，是相當完美的協作。\n呵呵，我親赴現場也值得了呢。"

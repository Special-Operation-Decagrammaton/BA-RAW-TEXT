[translation]
10087-CVGroup_Battle_Buffed_1-1 = "ขอบคุณสำหรับการสนับสนุนค่ะ!"
10087-CVGroup_Battle_Covered_1-1 = "ฮู่ว ซ่อนตัวแล้วค่ะ"
10087-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอกค่ะ!"
10087-CVGroup_Battle_In_1-1 = "ฮุฮุ เฝ้าดูความตั้งใจของฉันให้ดีๆ นะคะ"
10087-CVGroup_Battle_In_2-1 = "เอาละ เริ่มภารกิจได้ค่ะ"
10087-CVGroup_Battle_Move_1-1 = "เอาละ ไปกันเลยมั้ยคะ?"
10087-CVGroup_Battle_Move_2-1 = "สถานที่จัดงานปาร์ตี้ที่ต่อไป"
10087-CVGroup_Battle_Recovery_1-1 = "อ๊ะ ขอบคุณนะคะ!"
10087-CVGroup_Battle_TacticalAction_1-1 = "จะเคลื่อนย้ายไปพื้นที่ถัดไปค่ะ"
10087-CVGroup_Battle_Victory_1-1 = "ฮุฮุ เป็นความตั้งใจที่สมกับเป็นเจ้าหน้าที่อาวุโสเลยค่ะ!"
10087-CVGroup_Battle_Victory_2-1 = "เป็นยังไงบ้างคะ? ฉันทุ่มสุดตัวเลยนะคะ!"
10087-CVGroup_CommonSkill-1 = "ไม่ปล่อยให้หนีไปหรอกค่ะ!"
10087-CVGroup_ExSkill_1-1 = "คิดแล้วเชียว... อย่างนั้นเองสินะคะ"
10087-CVGroup_ExSkill_2-1 = "ทุกคน เข้าประจำตำแหน่งด้วยค่ะ!"
10087-CVGroup_ExSkill_3-1 = "สิ่งที่เป็นอันตราย... ฉันจะกำจัดเองค่ะ!"
10087-CVGroup_ExSkill_Level_1-1 = "การล้อมจับไม่มีช่องโหว่หรอกค่ะ!"
10087-CVGroup_ExSkill_Level_2-1 = "ทุกคน บุกเข้าไปจัดการให้สิ้นซากเลยค่ะ!"
10087-CVGroup_ExSkill_Level_3-1 = "คิดว่าจะหนีจากคณะกรรมการวินัยได้เหรอคะ!"
10087-CVGroup_Formation_In_1-1 = "ค่ะ! ไปกันเลยค่ะ!"
10087-CVGroup_Formation_In_2-1 = "ให้เป็นหน้าที่ฉันเองค่ะ"
10087-CVGroup_Formation_Select-1 = "ถ้าต้องการอะไรละก็\nบอกฉันได้ทุกอย่างเลยนะคะ "
10087-CVGroup_Growup_1-1 = "ขอบคุณสำหรับการสนับสนุนอย่างต่อเนื่องค่ะ ฮุฮุ"
10087-CVGroup_Growup_2-1 = "ฉันเติบโตขึ้นไปอีกขั้นแล้วสินะคะ\nถ้ากลายเป็นคนที่น่าไว้ใจได้ก็ไม่ต้องการอะไรแล้วละค่ะ"
10087-CVGroup_Growup_3-1 = "ขอบคุณค่ะ... คุณครู\nฉันรู้สึกขอบคุณคุณครูอยู่เสมอๆ เลยนะคะ"
10087-CVGroup_Growup_4-1 = "ก้าวหน้าขึ้นไปอีกขั้นแล้วละค่ะ\nฉันสัญญาว่าจะเป็นผู้ช่วยที่สมบูรณ์แบบของคุณครูให้สมกับที่เติบโตขึ้นเลยค่ะ"
10087-CVGroup_Relationship_Up_1-1 = "อีกแล้วเหรอคะ\nตอนนี้ฉันไม่ได้ตกใจอะไรขนาดนั้นแล้วละค่ะ\nคอยดูแล้วกันค่ะ"
10087-CVGroup_Relationship_Up_2-1 = "อ่า... ปะ... เปล่านะคะ ฉันไม่ได้ตกใจนะคะ ไม่เลยสักนิด\nถึงจะอยู่ใกล้กันกว่าตอนปกติก็เถอะ\nฉันไม่ได้เป็นอะไรสักหน่อย~ จริงๆ นะคะ! "
10087-CVGroup_Relationship_Up_3-1 = "ถ้ารู้ตัวอยู่ตลอดก็จะรับรู้ได้ว่าเข้ามาใกล้ค่ะ คนอย่างคุณนี่มัน...\nโหดร้ายจริงๆ เลยค่ะ! ใจร้ายจริงๆ เลยนะคะ"
10087-CVGroup_Relationship_Up_4-1 = "อย่างที่ฉันบอกไปก่อนหน้านี้... ฉันไม่ได้เกลียดคุณครูหรอกนะคะ\nและฉันก็ไม่ได้พูดโกหกด้วยค่ะ"
10087-CVGroup_Tactic_In_1-1 = "ค่ะ จะเริ่มปฏิบัติการแล้วค่ะ\nคุณครู ช่วยสั่งการด้วยค่ะ"
10087-CVGroup_Tactic_In_2-1 = "ฉันจะลงพื้นที่ด้วยตัวเองค่ะ\nคุณครู ช่วยสนับสนุนด้วยนะคะ"
10087-CVGroup_Tactic_Victory_1-1 = "อุ๊ย ตกใจหมดเลยค่ะ\nฉันไม่คิดเลยว่าการสั่งการของคุณครูจะอยู่ในระดับนี้"
10087-CVGroup_Tactic_Victory_2-1 = "ค่ะ เชื่อมต่อกันได้อย่างสมบูรณ์แบบมากค่ะ\nฮุฮุ ฉันเองก็คิดว่าคุ้มที่ไปลงพื้นที่มาค่ะ"

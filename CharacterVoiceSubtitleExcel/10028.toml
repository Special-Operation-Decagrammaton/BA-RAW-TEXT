[translation]
10028-CVGroup_Battle_Buffed_1-1 = "這是什麼，好厲害唷！"
10028-CVGroup_Battle_Covered_1-1 = "啊哈哈，稍等我一下哦～！"
10028-CVGroup_Battle_Defense_1-1 = "沒用沒用～"
10028-CVGroup_Battle_In_1-1 = "來，要拿出全力唷！\n大家，跟我來吧！"
10028-CVGroup_Battle_In_2-1 = "來吧，大家！\n享樂時間到囉！"
10028-CVGroup_Battle_Move_1-1 = "繼續繼續～！"
10028-CVGroup_Battle_Move_2-1 = "呀齁～！還要繼續前進唷～！"
10028-CVGroup_Battle_Recovery_1-1 = "謝謝！"
10028-CVGroup_Battle_TacticalAction_1-1 = "現在畢竟是兔女郎，就用「蹦」的吧！"
10028-CVGroup_Battle_Victory_1-1 = "啊～！真開心！\n我的活躍怎麼樣呀？主人？"
10028-CVGroup_Battle_Victory_2-1 = "已經結束了？\n還沒燃燒夠啦～！"
10028-CVGroup_CommonSkill-1 = "It's show time！"
10028-CVGroup_ExSkill_1-1 = "鏘～！你看你看！"
10028-CVGroup_ExSkill_2-1 = "兔女郎送來的驚喜！"
10028-CVGroup_ExSkill_3-1 = "來，這是禮物！"
10028-CVGroup_ExSkill_Level_1-1 = "真開心～！"
10028-CVGroup_ExSkill_Level_2-1 = "要上囉～！"
10028-CVGroup_ExSkill_Level_3-1 = "啊哈哈哈哈哈！"
10028-CVGroup_Formation_In_1-1 = "輪到我了呢！"
10028-CVGroup_Formation_In_2-1 = "嗯，準備OK～！"
10028-CVGroup_Formation_Select-1 = "啊哈哈，真開心！"
10028-CVGroup_Growup_1-1 = "兔女郎的明日奈，又變得更強了唷！"
10028-CVGroup_Growup_2-1 = "再變得更強真的沒問題嗎？"
10028-CVGroup_Growup_3-1 = "謝謝～主人！"
10028-CVGroup_Growup_4-1 = "之後也一起玩吧，主人！"
10028-CVGroup_Relationship_Up_1-1 = "謝謝你，主人！\n之後我會更～努力的哦！"
10028-CVGroup_Relationship_Up_2-1 = "遇到困難的話隨時跟我說吧！\n兔女郎的明日奈，無論什麼時候都會「蹦」的一聲馬上跳過去的！"
10028-CVGroup_Relationship_Up_3-1 = "啊～真是的，果然主人最棒了！！超喜歡！！"
10028-CVGroup_Relationship_Up_4-1 = "聽說兔子只要寂寞就會變虛弱哦！\n所以要拜託你囉，主人！"
10028-CVGroup_Tactic_In_1-1 = "快看快看，是兔女郎唷！"
10028-CVGroup_Tactic_In_2-1 = "哇～哦！好像有很多事要做呢！"
10028-CVGroup_Tactic_Victory_1-1 = "耶～成功了～！"
10028-CVGroup_Tactic_Victory_2-1 = "作戰結束～！下次也一起吧，主人！"

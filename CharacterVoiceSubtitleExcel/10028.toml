10028-CVGroup_Growup_2-1 = "ถ้าแข็งแกร่งขึ้นอีก จะไม่เป็นไรจริงๆ ใช่มั้ยนะ~?"
10028-CVGroup_Growup_3-1 = "ขอบคุณนะ นายท่าน!"

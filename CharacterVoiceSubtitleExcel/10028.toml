10028-CVGroup_Relationship_Up_1-1 = "ขอบคุณนะ นายท่าน!\nต่อไปฉันจะทำให้ดีเลย!"
10028-CVGroup_Relationship_Up_2-1 = "ถ้ามีเรื่องลำบากก็บอกได้ตลอดเลยนะ!\nกระต่ายอาสึนะกระโดดดึ๋งๆ อยู่เสมอ\nเพราะงั้นจะรีบกระโดดไปหาเลย!"
10028-CVGroup_Relationship_Up_3-1 = "อ๊ะ นายท่านเก่งสุดยอด! ชอบที่สุดเลย!"
10028-CVGroup_Relationship_Up_4-1 = "ว่ากันว่ากระต่ายจะอ่อนแอถ้าพวกมันโดดเดี่ยว!\nเพราะงั้นก็ดูแลฉันด้วยนะ นายท่าน!"
10028-CVGroup_Tactic_In_1-1 = "ดูสิๆ คุณกระต่ายละ~!"
10028-CVGroup_Tactic_In_2-1 = "ว้าววว! มีงานต้องทำเยอะแยะเลยนะ!"
10028-CVGroup_Tactic_Victory_1-1 = "ว้าว ทำได้แล้วละ-!"
10028-CVGroup_Tactic_Victory_2-1 = "ปฏิบัติการสำเร็จ-! คราวหน้าก็มาด้วยกันอีกนะ! นายท่าน!"

[translation]
10085-CVGroup_Battle_Buffed_1-1 = "좋은 아이디어야."
10085-CVGroup_Battle_Covered_1-1 = "방화벽 구축."
10085-CVGroup_Battle_Defense_1-1 = "보안 대책은 완벽하다고."
10085-CVGroup_Battle_In_1-1 = "지금부터 시작하는 거야?"
10085-CVGroup_Battle_In_2-1 = "카페인…… 카페인이 부족해……"
10085-CVGroup_Battle_Move_1-1 = "그럼, 이동할게."
10085-CVGroup_Battle_Move_2-1 = "먼저 간다."
10085-CVGroup_Battle_Recovery_1-1 = "아…… 고마워."
10085-CVGroup_Battle_TacticalAction_1-1 = "……응? 벌써 가는 거야?"
10085-CVGroup_Battle_Victory_1-1 = "끄, 끝났지? 이제 돌아가도 괜찮지?"
10085-CVGroup_Battle_Victory_2-1 = "수, 수고 많았어…… 그럼 나는 먼저 이만……"
10085-CVGroup_CommonSkill-1 = "후우…… 따듯해……"
10085-CVGroup_ExSkill_1-1 = "으으, 추워……"
10085-CVGroup_ExSkill_2-1 = "이런 날씨에 캠핑이라니……"
10085-CVGroup_ExSkill_3-1 = "다 익었나……?"
10085-CVGroup_ExSkill_Level_1-1 = "군고구마 하나, 먹을래?"
10085-CVGroup_ExSkill_Level_2-1 = "뜨거우니까 조심히 받아."
10085-CVGroup_ExSkill_Level_3-1 = "후우…… 자, 여기."
10085-CVGroup_Formation_In_1-1 = "선생님의 부탁이라면……"
10085-CVGroup_Formation_In_2-1 = "으으…… 밖에 나가지 않으면 안 되는 거야……?"
10085-CVGroup_Formation_Select-1 = "(꿀꺽, 꿀꺽) 후우우…… 이제야 살 거 같네."
10085-CVGroup_Growup_1-1 = "이 정보라면…… 포럼의 다른 해커들이 깜짝 놀라겠는데?"
10085-CVGroup_Growup_2-1 = "이 노하우는 야외 환경에서 써 먹기에 좋을 것 같네."
10085-CVGroup_Growup_3-1 = "고마워, 선생님. 다음 번에는 더 나은 모습을 보여줄게."
10085-CVGroup_Growup_4-1 = "으음, 흥미로운 발상인걸. 공부가 되었어."
10085-CVGroup_Relationship_Up_1-1 = "진리의 길은 아무리 걸어도 그 끝이 보이질 않네.\n……사람의 마음도 비슷하려나."
10085-CVGroup_Relationship_Up_2-1 = "선생님, 다음 휴일에 부실에서 같이 게임이나 하지 않을래?"
10085-CVGroup_Relationship_Up_3-1 = "뭔가 커다란 산을 보고 있노라면 선생님의 모습이 떠올라.\n변하지 않는 경치처럼…… 선생님도 계속 거기 있어 줄 거지?"
10085-CVGroup_Relationship_Up_4-1 = "등산은 좋아하진 않지만…… 선생님과 단 둘이 가는 거라면, 괜찮을지도."
10085-CVGroup_Tactic_In_1-1 = "……응? 내가 앞장 서는 거야?"
10085-CVGroup_Tactic_In_2-1 = "여긴 어디인가, 나는 누구인가……"
10085-CVGroup_Tactic_Victory_1-1 = "이제는 진짜 돌아가도…… 괜찮…… 지?"
10085-CVGroup_Tactic_Victory_2-1 = "지쳤어…… 더는 못 움직여……"

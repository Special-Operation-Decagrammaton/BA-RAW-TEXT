[translation]
10085-CVGroup_Battle_Buffed_1-1 = "是個好主意。"
10085-CVGroup_Battle_Covered_1-1 = "防火牆，構築。"
10085-CVGroup_Battle_Defense_1-1 = "保安對策相當萬全。"
10085-CVGroup_Battle_In_1-1 = "要現在開始做嗎……？"
10085-CVGroup_Battle_In_2-1 = "咖啡因……咖啡因不夠了……"
10085-CVGroup_Battle_Move_1-1 = "那，走吧……"
10085-CVGroup_Battle_Move_2-1 = "先走一步。"
10085-CVGroup_Battle_Recovery_1-1 = "啊……謝謝。"
10085-CVGroup_Battle_TacticalAction_1-1 = "……咦？已經要走了嗎？"
10085-CVGroup_Battle_Victory_1-1 = "結，結束了？可以回去了嗎？"
10085-CVGroup_Battle_Victory_2-1 = "辛，辛苦了～\n那我就先……"
10085-CVGroup_CommonSkill-1 = "呼……真暖和……"
10085-CVGroup_ExSkill_1-1 = "唔唔，好冷……"
10085-CVGroup_ExSkill_2-1 = "在這種天氣還要露營……"
10085-CVGroup_ExSkill_3-1 = "烤熟了嗎……？"
10085-CVGroup_ExSkill_Level_1-1 = "烤地瓜，要吃嗎？"
10085-CVGroup_ExSkill_Level_2-1 = "因為很燙，要小心哦。"
10085-CVGroup_ExSkill_Level_3-1 = "呼……來，請用。"
10085-CVGroup_Formation_In_1-1 = "如果是老師的請求……"
10085-CVGroup_Formation_In_2-1 = "嗚嗚……非得到外頭去嗎……？"
10085-CVGroup_Formation_Select-1 = "（咕嚕，咕嚕）呼……活過來了……"
10085-CVGroup_Growup_1-1 = "這……說不定連論壇上的駭客也會嚇到。"
10085-CVGroup_Growup_2-1 = "剛才的情報，在野外環境應該能派上用場。"
10085-CVGroup_Growup_3-1 = "謝謝你，老師。\n下次會讓你看見更好的表現哦。"
10085-CVGroup_Growup_4-1 = "嗯，是個有趣的發想呢。\n讓我上了一課。"
10085-CVGroup_Relationship_Up_1-1 = "真理之道，無論怎麼走都見不到盡頭呢。\n……或許跟人的心有點類似。"
10085-CVGroup_Relationship_Up_2-1 = "老師，下次休假要不要一起玩遊戲？"
10085-CVGroup_Relationship_Up_3-1 = "好像每當看見高山就會浮現老師的模樣。\n就像始終不變的景色一樣……老師也會一直待在我身邊對吧？"
10085-CVGroup_Relationship_Up_4-1 = "雖然不是很喜歡爬山……\n但如果跟老師兩個人去的話，好像還行。"
10085-CVGroup_Tactic_In_1-1 = "……嗯？我站前面嗎？"
10085-CVGroup_Tactic_In_2-1 = "這是哪……我是誰……"
10085-CVGroup_Tactic_Victory_1-1 = "已經可以回去……了……對吧？"
10085-CVGroup_Tactic_Victory_2-1 = "好累……已經動不了了……"

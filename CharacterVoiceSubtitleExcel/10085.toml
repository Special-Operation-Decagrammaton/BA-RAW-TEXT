[translation]
10085-CVGroup_Battle_Buffed_1-1 = "ไอเดียดีมากเลย"
10085-CVGroup_Battle_Covered_1-1 = "ตั้งไฟร์วอลล์"
10085-CVGroup_Battle_Defense_1-1 = "มาตรการรักษาความปลอดภัยสมบูรณ์แบบนะ"
10085-CVGroup_Battle_In_1-1 = "จะเริ่มตั้งแต่นี้ไปเลยเหรอ?"
10085-CVGroup_Battle_In_2-1 = "คาเฟอีน... ฉันต้องการคาเฟอีน..."
10085-CVGroup_Battle_Move_1-1 = "งั้น... จะไปเดี๋ยวนี้ละ"
10085-CVGroup_Battle_Move_2-1 = "ไปก่อนนะ"
10085-CVGroup_Battle_Recovery_1-1 = "อ่า... ขอบคุณนะ"
10085-CVGroup_Battle_TacticalAction_1-1 = "หืม...? จะไปแล้วเหรอ?"
10085-CVGroup_Battle_Victory_1-1 = "จะ... จบแล้วใช่มั้ย? ตอนนี้กลับได้แล้วใช่มั้ย?"
10085-CVGroup_Battle_Victory_2-1 = "ทะ... ทำได้ดีมาก... งั้นฉันขอตัวก่อนนะ..."
10085-CVGroup_CommonSkill-1 = "ฮู่ว... อุ่นดีจัง..."
10085-CVGroup_ExSkill_1-1 = "ฮือ... หนาวจัง..."
10085-CVGroup_ExSkill_2-1 = "อากาศแบบนี้ให้มาตั้งแคมป์เนี่ยนะ..."
10085-CVGroup_ExSkill_3-1 = "สุกรึยังนะ...?"
10085-CVGroup_ExSkill_Level_1-1 = "ชิมมันเผาสักชิ้นมั้ย?"
10085-CVGroup_ExSkill_Level_2-1 = "มันร้อนนะ ระวังด้วยล่ะ"
10085-CVGroup_ExSkill_Level_3-1 = "ฟู่ว... เอ้า นี่"
10085-CVGroup_Formation_In_1-1 = "ถ้าเป็นคำขอของคุณครูละก็..."
10085-CVGroup_Formation_In_2-1 = "ฮือ... ไม่ออกไปข้างนอกได้มั้ย...?"
10085-CVGroup_Formation_Select-1 = "(อึก อึก) ฮู่ว...\nค่อยรู้สึกสดชื่นขึ้นมาหน่อย"
10085-CVGroup_Growup_1-1 = "ถ้ามีข้อมูลนี้ละก็... แฮกเกอร์คนอื่นๆ ในฟอรัมคงตกใจแน่ๆ"
10085-CVGroup_Growup_2-1 = "ถ้าเอาความรู้เฉพาะนี้ไปใช้ตอนอยู่กลางแจ้งน่าจะดีนะ"
10085-CVGroup_Growup_3-1 = "ขอบคุณนะคุณครู\nคราวหน้าจะแสดงภาพลักษณ์ที่ดีขึ้นให้เห็นเอง"
10085-CVGroup_Growup_4-1 = "อืม เป็นความเห็นที่น่าสนใจดีนะ\nได้เรียนรู้แล้วละ"
10085-CVGroup_Relationship_Up_1-1 = "เส้นทางแห่งความจริงแท้ ต่อให้เดินไปไกลแค่ไหนก็ไม่มีสิ้นสุดหรอก\nจิตใจของมนุษย์ก็คงเหมือนกันละมั้ง"
10085-CVGroup_Relationship_Up_2-1 = "คุณครู วันหยุดคราวหน้ามาเล่นเกมที่ห้องชมรมกันมั้ย?"
10085-CVGroup_Relationship_Up_3-1 = "พอเห็นภาพภูเขาใหญ่แบบนี้ก็นึกถึงคุณครูขึ้นมาเลยละ\nคุณครูก็จะอยู่ตรงนี้ไม่ไปไหน... เหมือนกับทิวทัศน์ที่ไม่เปลี่ยนแปลงใช่มั้ย?"
10085-CVGroup_Relationship_Up_4-1 = "ฉันไม่ได้ชอบการเดินเขาหรอก...\nแต่ถ้าได้ไปเดินเขากับคุณครูสองคนละก็ อาจจะไม่เป็นไรก็ได้"
10085-CVGroup_Tactic_In_1-1 = "หืม...? ให้ฉันอยู่แนวหน้าเหรอ?"
10085-CVGroup_Tactic_In_2-1 = "ที่นี่คือที่ไหน แล้วตัวฉันเป็นใคร..."
10085-CVGroup_Tactic_Victory_1-1 = "ตอนนี้คงจะกลับได้แล้ว... ใช่มั้ย... นะ?"
10085-CVGroup_Tactic_Victory_2-1 = "เพลียร่างจัง... ขยับตัวไม่ไหวแล้ว..."

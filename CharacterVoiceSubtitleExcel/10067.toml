[translation]
10067-CVGroup_Battle_Buffed_1-1 = "感謝支援。"
10067-CVGroup_Battle_Covered_1-1 = "呀，躲起來了。"
10067-CVGroup_Battle_Defense_1-1 = "是那邊嗎。"
10067-CVGroup_Battle_In_1-1 = "代號Bunny Zero Four，要上了。"
10067-CVGroup_Battle_In_2-1 = "開始潛入。"
10067-CVGroup_Battle_Move_1-1 = "出發吧，GOGO。"
10067-CVGroup_Battle_Move_2-1 = "向下一個目標移動。"
10067-CVGroup_Battle_Recovery_1-1 = "很有幫助。"
10067-CVGroup_Battle_TacticalAction_1-1 = "進行移動。蹦蹦。"
10067-CVGroup_Battle_Victory_1-1 = "這次的任務也完成了呢。蹦蹦。"
10067-CVGroup_Battle_Victory_2-1 = "蹦。因為我是最棒的特務。"
10067-CVGroup_CommonSkill-1 = "這樣的如何呢？"
10067-CVGroup_ExSkill_1-1 = "Arm-Gear，著裝。"
10067-CVGroup_ExSkill_2-1 = "進行處理。"
10067-CVGroup_ExSkill_3-1 = "目標，捕捉。"
10067-CVGroup_ExSkill_Level_1-1 = "Fire！"
10067-CVGroup_ExSkill_Level_2-1 = "Full Burst……！"
10067-CVGroup_ExSkill_Level_3-1 = "我會全力應對。"
10067-CVGroup_Formation_In_1-1 = "今日的潛入任務是什麼呢？"
10067-CVGroup_Formation_In_2-1 = "明白了。我會準備。"
10067-CVGroup_Formation_Select-1 = "老師，請下命令。\n因為我是無敵的兔女郎。"
10067-CVGroup_Growup_1-1 = "直到成為最棒的兔子特務那天為止，我都會持續精進。"
10067-CVGroup_Growup_2-1 = "老師的護衛是我的工作。只有這點無法退讓。"
10067-CVGroup_Growup_3-1 = "為了不有愧於這對兔耳，我會盡己所能。\n咦？不是那樣……？"
10067-CVGroup_Growup_4-1 = "潛入，動作，護衛，侵入，女僕，兔女郎。\n請儘管指示。"
10067-CVGroup_Relationship_Up_1-1 = "得讓老師把分配給我的時間增加才行。\n至少要跟我想著老師的時間一樣多。"
10067-CVGroup_Relationship_Up_2-1 = "只要跟老師待在一起，就會感到很平靜。\n是的，甚至到了一不小心就會睡著的程度。"
10067-CVGroup_Relationship_Up_3-1 = "請隨時依賴我吧。只要是老師的期望，無論要多少都行。\n……呵呵，這種台詞，我一直想說一次看看。"
10067-CVGroup_Relationship_Up_4-1 = "對我來說老師是必要的。就像對老師來說，我也是必要的一樣。\n禁止會讓人害羞的台詞，是嗎？\n呵呵，我是故意這麼說的。"
10067-CVGroup_Tactic_In_1-1 = "無須擔心。因為我是兔女郎。"
10067-CVGroup_Tactic_In_2-1 = "請交給我吧。"
10067-CVGroup_Tactic_Victory_1-1 = "獲得勝利了。耶～"
10067-CVGroup_Tactic_Victory_2-1 = "這是當然的結果。呀齁～"

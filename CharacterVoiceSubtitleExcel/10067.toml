10067-CVGroup_Formation_Select-1 = "What are your orders for the invincible bunny girl, Sensei?"
10067-CVGroup_Growup_1-1 = "I will continue on this path until I am the best bunny agent of us all."
10067-CVGroup_Growup_2-1 = "My role is to protect you, Sensei. That's the one thing I can't leave to anyone else."

10067-CVGroup_Battle_Victory_1-1 = "ภารกิจครั้งนี้ก็สำเร็จได้ด้วยดีนะคะ ดึ๋ง ดึ๋ง"
10067-CVGroup_Battle_Victory_2-1 = "ดึ๋ง เพราะฉันเป็นสุดยอดสายลับนี่คะ"

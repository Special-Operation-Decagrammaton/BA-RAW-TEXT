10067-CVGroup_ExSkill_Level_2-1 = "ฟูล เบิร์ส...!"
10067-CVGroup_ExSkill_Level_3-1 = "จะตอบโต้เต็มกำลังค่ะ"
10067-CVGroup_Formation_In_1-1 = "ภารกิจวันนี้คืออะไรเหรอคะ?"
10067-CVGroup_Formation_In_2-1 = "เข้าใจแล้วค่ะ มาเตรียมตัวกันเถอะค่ะ"
10067-CVGroup_Formation_Select-1 = "คุณครู ขอคำสั่งด้วยค่ะ\nเพราะฉันคือบันนี่เกิร์ลไร้พ่ายค่ะ"
10067-CVGroup_Growup_1-1 = "ฉันจะพยายามต่อไปจนกว่าจะได้เป็นสุดยอดสายลับบันนี่เกิร์ลค่ะ"
10067-CVGroup_Growup_2-1 = "การคุ้มกันคุณครูคือหน้าที่ของฉันค่ะ เรื่องนี้ฉันคงยอมให้ไม่ได้ค่ะ"
10067-CVGroup_Growup_3-1 = "ฉันจะพยายามอย่างเต็มที่เพื่อไม่ให้ขายหน้าหูกระต่ายนี้เลยค่ะ\nคะ? ไม่ใช่อย่างนั้นเหรอคะ...?"
10067-CVGroup_Growup_4-1 = "แฝงตัว ลงมือ คุ้มกัน ลอบเข้า เมด บันนี่เกิร์ล\nไม่ว่างานอะไรก็สั่งมาได้เลยค่ะ"
10067-CVGroup_Relationship_Up_1-1 = "คุณครูต้องแบ่งเวลาให้ฉันเพิ่มแล้วละค่ะ\nอย่างน้อยก็ขอให้เท่ากับที่ฉันคิดถึงคุณครูนะคะ"
10067-CVGroup_Relationship_Up_2-1 = "เวลาที่ได้อยู่กับคุณครู ฉันสบายใจขึ้นมากเลยค่ะ\nถึงขั้นเผลอหลับไปได้เลยละค่ะ"
10067-CVGroup_Relationship_Up_3-1 = "พึ่งพาฉันได้เสมอเลยนะคะ ถ้าคุณครูต้องการก็ได้เสมอเลยค่ะ\nฮุฮุ... ฉันอยากลองพูดแบบนี้ดูสักครั้งค่ะ"
10067-CVGroup_Relationship_Up_4-1 = "ฉันจำเป็นต้องมีคุณครูนะคะ\nเหมือนอย่างเช่นที่คุณครูจำเป็นต้องมีฉัน\nห้ามพูดอะไรที่น่าอายงั้นเหรอคะ? ฮุฮุ ฉันตั้งใจพูดนะคะ"
10067-CVGroup_Tactic_In_1-1 = "ไม่ต้องกังวลหรอกค่ะ เพราะฉันคือบันนี่เกิร์ลนี่ค่ะ"
10067-CVGroup_Tactic_In_2-1 = "ให้เป็นหน้าที่ฉันเองค่ะ"
10067-CVGroup_Tactic_Victory_1-1 = "ชนะแล้วสินะคะ เย้..."
10067-CVGroup_Tactic_Victory_2-1 = "ผลมันก็แน่นอนอยู๋แล้วค่ะ ยะโฮ่-"

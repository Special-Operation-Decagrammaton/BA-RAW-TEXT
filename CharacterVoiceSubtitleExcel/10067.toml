10067-CVGroup_Battle_In_1-1 = "Call sign Bunny Zero-Four, on the move."
10067-CVGroup_Battle_In_2-1 = "Infiltrating now."
10067-CVGroup_Battle_Move_1-1 = "Let's go. Go, go!"
10067-CVGroup_Battle_Move_2-1 = "Proceeding to the next target."
10067-CVGroup_Battle_Recovery_1-1 = "Thank you for the save."
10067-CVGroup_Battle_TacticalAction_1-1 = "On the move. Hop, hop."
10067-CVGroup_Battle_Victory_1-1 = "Another successful mission. Hop, hop!"
10067-CVGroup_Battle_Victory_2-1 = "Hop, hop! I am the greatest agent."
10067-CVGroup_CommonSkill-1 = "How about this?"
10067-CVGroup_ExSkill_1-1 = "Equipping gauntlet."
10067-CVGroup_ExSkill_2-1 = "Responding."
10067-CVGroup_ExSkill_3-1 = "Target confirmed."
10067-CVGroup_ExSkill_Level_1-1 = "Fire!"
10067-CVGroup_ExSkill_Level_2-1 = "Full burst...!"
10067-CVGroup_ExSkill_Level_3-1 = "I'm going all out."
10067-CVGroup_Formation_In_1-1 = "What's today's mission?"

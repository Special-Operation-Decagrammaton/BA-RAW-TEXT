10067-CVGroup_Relationship_Up_2-1 = "Being with you puts my heart at ease. Sometimes I even fall asleep."
10067-CVGroup_Relationship_Up_3-1 = "You can always lean on me. If you need help, no matter what, I'll be there. I've always wanted to say that."
10067-CVGroup_Relationship_Up_4-1 = "I need you as much as you need me, Sensei. I know I shouldn't say such embarrassing things, but it needed to be said. Heehee!"
10067-CVGroup_Tactic_In_1-1 = "No need to worry. I'm a bunny, after all."
10067-CVGroup_Tactic_In_2-1 = "Leave it to me."
10067-CVGroup_Tactic_Victory_1-1 = "A victory! Yay!"
10067-CVGroup_Tactic_Victory_2-1 = "Anyone could have seen that coming. Yahoo!"

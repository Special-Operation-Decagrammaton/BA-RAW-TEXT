[translation]
26008-CVGroup_CommonSkill-1 = "是出差版百夜堂名產！\n「河和章魚燒」唷～！"
26008-CVGroup_ExSkill_1-1 = "百夜堂出差版！海之家唷～！"
26008-CVGroup_ExSkill_2-1 = "來，請享用！"
26008-CVGroup_ExSkill_3-1 = "來，刨冰如何呢？"
26008-CVGroup_ExSkill_Level_1-1 = "說到夏天，果然不能少了這個呢！"
26008-CVGroup_ExSkill_Level_2-1 = "熱熱，熱熱，飛走吧～！"
26008-CVGroup_ExSkill_Level_3-1 = "還有非～常多唷！"
26008-CVGroup_Formation_In_1-1 = "百夜堂，出差囉～！"
26008-CVGroup_Formation_In_2-1 = "百夜堂，開店囉～！"
26008-CVGroup_Growup_1-1 = "老師，怎麼樣呀？有沒有對我稍微改觀了？\n啊，是，是嗎……？"
26008-CVGroup_Growup_2-1 = "看吧，又變得更強了！\n趁現在買說不定比較划算唷～？"
26008-CVGroup_Growup_3-1 = "我，似乎還能繼續成長！\n呵呵，很讓人期待吧？"
26008-CVGroup_Growup_4-1 = "我，還會繼續不斷進化唷～！\n也請老師要好好跟上哦？"
26008-CVGroup_Relationship_Up_1-1 = "雖然沒有什麼關係是不重要的，\n不過總覺得跟老師之間的關係，有種特別的感覺。"
26008-CVGroup_Relationship_Up_2-1 = "營業固然重要，不過之後，那個……\n沒，沒事，果然還是算了！"
26008-CVGroup_Relationship_Up_3-1 = "（要是跟老師的這種時光能繼續下去就好了……\n　等夏天過去之後，會不會就結束了呢）"
26008-CVGroup_Relationship_Up_4-1 = "夏天的海邊真神奇呢。\n讓人既開心又興奮……然而同時，卻也有股莫名的哀傷。"

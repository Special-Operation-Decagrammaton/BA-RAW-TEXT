[translation]
26008-CVGroup_CommonSkill-1 = "The Momoyodou pop-up shop special! Introducing Kawawa takoyaki!"
26008-CVGroup_ExSkill_1-1 = "The Momoyodou pop-up shop! Welcome to the Beach Shack!"
26008-CVGroup_ExSkill_2-1 = "Please enjoy!"
26008-CVGroup_ExSkill_3-1 = "How would you like some shaved ice?"
26008-CVGroup_ExSkill_Level_1-1 = "You can't have a summer without this!"
26008-CVGroup_ExSkill_Level_2-1 = "Heat, heat, go away!"
26008-CVGroup_ExSkill_Level_3-1 = "There's still a bunch left!"
26008-CVGroup_Formation_In_1-1 = "Momoyodou's going on a business trip!"
26008-CVGroup_Formation_In_2-1 = "Momoyodou's open!"
26008-CVGroup_Growup_1-1 = "What do you think, Sensei? Do you see me in a different light now? Oh, I-I see..."
26008-CVGroup_Growup_2-1 = "I've gotten stronger again! This might be the perfect opportunity, you know?"
26008-CVGroup_Growup_3-1 = "I feel like I can get even stronger! Heheh, now THAT I'm looking forward to!"
26008-CVGroup_Growup_4-1 = "I'm still in my evolutionary stage! Make sure to keep up, Sensei!"
26008-CVGroup_Relationship_Up_1-1 = "There's no such thing as an unimportant relationship. But ours feels much more special to me than all the others, Sensei."
26008-CVGroup_Relationship_Up_2-1 = "Business takes priority. But after that's done... N-No. Nevermind, it's nothing!"
26008-CVGroup_Relationship_Up_3-1 = "(I hope I can spend more time like this with Sensei... Will it all be over when summer ends?)"
26008-CVGroup_Relationship_Up_4-1 = "During summer, the ocean has a mysterious vibe that I find exciting. In fact, it gives me butterflies! But something about it feels a little sad too..."

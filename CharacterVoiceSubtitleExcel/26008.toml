[translation]
26008-CVGroup_CommonSkill-1 = "출장판 백야당 명물! '카와와 타코야키'에요~!"
26008-CVGroup_ExSkill_1-1 = "백야당 출장판! 바다의 집이에요!"
26008-CVGroup_ExSkill_2-1 = "자, 맛있게 드세요!"
26008-CVGroup_ExSkill_3-1 = "자, 빙수는 어떠신가요?"
26008-CVGroup_ExSkill_Level_1-1 = "여름 하면, 역시 이거죠!"
26008-CVGroup_ExSkill_Level_2-1 = "더위야, 더위야, 날아가라~!"
26008-CVGroup_ExSkill_Level_3-1 = "아직 잔~뜩 있어요!"
26008-CVGroup_Formation_In_1-1 = "백야당, 출장입니~다!"
26008-CVGroup_Formation_In_2-1 = "백야당, 개점이에~요!"
26008-CVGroup_Growup_1-1 = "선생님 어때요? 저, 조금은 다시 보였나요? 아, 그, 그렇군요……"
26008-CVGroup_Growup_2-1 = "자아, 또 강해져버렸어요! 지금이 기회일지도 모른다구요~?"
26008-CVGroup_Growup_3-1 = "저, 아직 더 성장할 수 있을 것 같아요! 후훗, 이건 기대가 되는데요?"
26008-CVGroup_Growup_4-1 = "저, 아직 더 진화하고 있다구요~!\n선생님도, 확실히 따라와 주셔야 해요?"
26008-CVGroup_Relationship_Up_1-1 = "중요하지 않은 인연 같은 건 없다지만, \n그래도 선생님과의 인연은 어쩐지, 더 특별한 느낌이 드는 것 같아요."
26008-CVGroup_Relationship_Up_2-1 = "영업도 중요하지만, 그 뒤엔, 그게…\n아, 아뇨. 역시 아무것도 아니에요!"
26008-CVGroup_Relationship_Up_3-1 = "(선생님과의 이런 시간이 더 계속되면 좋을 텐데…….\n여름이 지나면, 끝나버리는 걸까.)"
26008-CVGroup_Relationship_Up_4-1 = "여름 바다는 신기해요. 즐겁고, 설레고.\n……그러면서도, 어딘가 애달픈 점이."

[translation]
26008-CVGroup_CommonSkill-1 = "สินค้าชื่อดังจากร้านเฮียกคิยาโค! 'คาวาวะ ทาโกะยากิ' ค่ะ~!"
26008-CVGroup_ExSkill_1-1 = "ยินดีต้อนรับสู่ร้านเฮียกคิยาโค สาขาร้านริมทะเลค่ะ!"
26008-CVGroup_ExSkill_2-1 = "เอาละ ทานให้อร่อยนะคะ!"
26008-CVGroup_ExSkill_3-1 = "เอาละ น้ำแข็งไสเป็นยังไงบ้างคะ?"
26008-CVGroup_ExSkill_Level_1-1 = "ถ้าพูดถึงฤดูร้อน ก็ต้องสิ่งนี้ละค่ะ!"
26008-CVGroup_ExSkill_Level_2-1 = "ความร้อน ความร้อน จงหายไป~!"
26008-CVGroup_ExSkill_Level_3-1 = "ยังมีอีกเยอะเลยค่ะ!"
26008-CVGroup_Formation_In_1-1 = "ร้านเฮียกคิยาโคออกทริป~!"
26008-CVGroup_Formation_In_2-1 = "ร้านเฮียกคิยาโคเปิดแล้วค่ะ~!"
26008-CVGroup_Growup_1-1 = "คุณครู เป็นยังไงบ้างคะ?\nมองฉันใหม่แล้วหรือยังคะ?\nอ่า งะ... งั้นเหรอคะ...?"
26008-CVGroup_Growup_2-1 = "เอาละ พัฒนาขึ้นอีกแล้วค่ะ!\nตอนนี้อาจจะเป็นโอกาสก็ได้นะคะ~?"
26008-CVGroup_Growup_3-1 = "ฉันน่าจะยังเติบโตได้อีกค่ะ! ฮุฮุ น่าลุ้นจังเลยนะคะ"
26008-CVGroup_Growup_4-1 = "ฉันยังพัฒนาอยู่นะ คุณครูเองก็ต้องตามให้ทันนะคะ!"
26008-CVGroup_Relationship_Up_1-1 = "ถึงจะบอกว่าไม่มีความผูกพันไหนที่ไม่สำคัญ\nแต่รู้สึกว่าความผูกพันของฉันกับคุณครูเหมือนจะพิเศษกว่านั้นนะคะ"
26008-CVGroup_Relationship_Up_2-1 = "การขายก็สำคัญ แต่ว่าหลังจากนั้น\nเอ่อ... มะ... ไม่ค่ะ ไม่มีอะไรหรอกค่ะ!"
26008-CVGroup_Relationship_Up_3-1 = "(อยากให้มีเวลาแบบนี้กับคุณครูไปตลอดจัง...\nถ้าหมดฤดูร้อน มันก็จะจบลงมั้ยนะ?)"
26008-CVGroup_Relationship_Up_4-1 = "ทะเลฤดูร้อนนี่น่าทึ่งจังเลยนะคะ ทั้งสนุก ทั้งตื่นเต้น...\nแต่ก็ยัง... มีมุมที่น่าเศร้าอยู่ด้วย..."

[translation]
13010-CVGroup_Battle_Buffed_1-1 = "고마워~"
13010-CVGroup_Battle_Covered_1-1 = "엄폐했어, 지원 부탁해!"
13010-CVGroup_Battle_Defense_1-1 = "소용없어."
13010-CVGroup_Battle_In_1-1 = "계산은 완벽해. 침착하게 가자!"
13010-CVGroup_Battle_In_2-1 = "우리의 승률은 꽤 높아. 자신있게 가자!"
13010-CVGroup_Battle_Move_1-1 = "뭐, 아직까지는 계산대로야."
13010-CVGroup_Battle_Move_2-1 = "계산이 맞다면, 곧 다음 목표가 보일 거야."
13010-CVGroup_Battle_Recovery_1-1 = "음. 딱 좋은 양이네."
13010-CVGroup_Battle_TacticalAction_1-1 = "간다-!"
13010-CVGroup_Battle_Victory_1-1 = "계산대로야. 완벽해~"
13010-CVGroup_Battle_Victory_2-1 = "수학은 진실을 이끌어내지. 우리의 승리야."
13010-CVGroup_CommonSkill-1 = "아직 안 끝난 거야?"
13010-CVGroup_ExSkill_1-1 = "슬픔도, 분노도. 전부 인수분해 해주겠어."
13010-CVGroup_ExSkill_2-1 = "현재, 상황과 조건… 좋아. 이 싸움은 이겼어."
13010-CVGroup_ExSkill_3-1 = "공격이 나에게 명중할 확률은…… 극히 희박해!"
13010-CVGroup_ExSkill_Level_1-1 = "단순한 계산의 결과일 뿐이야."
13010-CVGroup_ExSkill_Level_2-1 = "합리와 이성은 무자비하지."
13010-CVGroup_ExSkill_Level_3-1 = "승리를, 증명하겠어."
13010-CVGroup_Formation_In_1-1 = "합리적인 선택이야."
13010-CVGroup_Formation_In_2-1 = "이거, 보수는 나오는 건가요?"
13010-CVGroup_Formation_Select-1 = "흐흥. 역시 선생님은 똑똑하시네요."
13010-CVGroup_Growup_1-1 = "성과를 보여줄 찬스. 기다리고 있었다고요!"
13010-CVGroup_Growup_2-1 = "수치로 느껴지는 결과라는 건 사람을 두근거리게 만드네요."
13010-CVGroup_Growup_3-1 = "다음 임무는, 흑자를 기대하세요."
13010-CVGroup_Growup_4-1 = "이런 표현은 안 좋아하지만……. 지금의 저는! 측정불가예요!"
13010-CVGroup_Relationship_Up_1-1 = "체력도 시간도 많이 쓴 느낌이지만…….\n선생님과 있으니 이득이라는 기분이네요."
13010-CVGroup_Relationship_Up_2-1 = "계산할 수가 없어요. 지금 이 기분 말이에요."
13010-CVGroup_Relationship_Up_3-1 = "맨날 측정이나 계산 생각만 했지만 지금은, 그저 이 순간을 느끼고 싶어."
13010-CVGroup_Relationship_Up_4-1 = "어째서일까. 설명할 수 없는 감각이지만……. 싫지 않아."
13010-CVGroup_Tactic_In_1-1 = "적 위치 확인. 선생님. 지휘를 부탁드려요!"
13010-CVGroup_Tactic_In_2-1 = "적 위치 확인. 거리, 가까움. 전력, 계산 완료."
13010-CVGroup_Tactic_Victory_1-1 = "스마트하게~ 승리."
13010-CVGroup_Tactic_Victory_2-1 = "운이 좋았다고요? 아뇨. 계산대로예요."

[translation]
13010-CVGroup_Battle_Buffed_1-1 = "謝謝～！"
13010-CVGroup_Battle_Covered_1-1 = "進行掩蔽，請支援！"
13010-CVGroup_Battle_Defense_1-1 = "沒用的。"
13010-CVGroup_Battle_In_1-1 = "計算非常完美。\n冷靜地上吧！"
13010-CVGroup_Battle_In_2-1 = "我們的勝率相當高。\n保持自信上吧！"
13010-CVGroup_Battle_Move_1-1 = "嗯，目前為止都跟計算一樣呢。"
13010-CVGroup_Battle_Move_2-1 = "如果計算正確的話，應該很快就能看見下一個目標才對。"
13010-CVGroup_Battle_Recovery_1-1 = "嗯。量剛剛好呢。"
13010-CVGroup_Battle_TacticalAction_1-1 = "要上囉！"
13010-CVGroup_Battle_Victory_1-1 = "如我所算。\n完美～"
13010-CVGroup_Battle_Victory_2-1 = "數學將導出真相。\n是我們贏了。"
13010-CVGroup_CommonSkill-1 = "還沒結束哦？"
13010-CVGroup_ExSkill_1-1 = "無論哀傷還是憤怒，我全都會進行因數分解。"
13010-CVGroup_ExSkill_2-1 = "現在的狀況與條件……\n很好，這樣會贏哦。"
13010-CVGroup_ExSkill_3-1 = "攻擊會命中我的機率……極其渺茫！"
13010-CVGroup_ExSkill_Level_1-1 = "不過是單純的計算結果罷了。"
13010-CVGroup_ExSkill_Level_2-1 = "合理與理性是無情的。"
13010-CVGroup_ExSkill_Level_3-1 = "我會將勝利進行證明。"
13010-CVGroup_Formation_In_1-1 = "是個合理的選擇呢。"
13010-CVGroup_Formation_In_2-1 = "這個，會有報酬嗎？"
13010-CVGroup_Formation_Select-1 = "哼哼～果然老師很聰明呢。"
13010-CVGroup_Growup_1-1 = "展現成果的機會，我等很久了！"
13010-CVGroup_Growup_2-1 = "能以數值感受到的結果，真讓人心動呢。"
13010-CVGroup_Growup_3-1 = "下一個任務，請期待出現黑字吧。"
13010-CVGroup_Growup_4-1 = "雖然不是很喜歡這種形容方式……\n但現在的我！無法測量！"
13010-CVGroup_Relationship_Up_1-1 = "雖然感覺花費了不少體力跟時間……\n跟老師在一起還是覺得賺到了。"
13010-CVGroup_Relationship_Up_2-1 = "無法計算。\n我指的是現在的心情。"
13010-CVGroup_Relationship_Up_3-1 = "雖然我總是在思考測量跟計算……\n不過現在，我只想好好感受此時此刻。"
13010-CVGroup_Relationship_Up_4-1 = "為什麼呢……\n雖然是種難以說明的感覺……我卻並不討厭。"
13010-CVGroup_Tactic_In_1-1 = "已確認敵人的位置。\n老師，指揮就拜託了！"
13010-CVGroup_Tactic_In_2-1 = "已確認敵人的位置。\n距離──非常接近。\n戰力──計算完畢。"
13010-CVGroup_Tactic_Victory_1-1 = "聰明地取勝～"
13010-CVGroup_Tactic_Victory_2-1 = "運氣真好？\n不，一切都在計算之內。"

[translation]
13010-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะ~"
13010-CVGroup_Battle_Covered_1-1 = "ฉันหลบแล้ว เรียกกำลังเสริมมาที!"
13010-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอก"
13010-CVGroup_Battle_In_1-1 = "ฉันคำนวณไว้อย่างสมบูรณ์แบบเลย\nไปแบบใจเย็นๆ กันเถอะ!"
13010-CVGroup_Battle_In_2-1 = "โอกาสชนะของเราค่อนข้างสูง\nบุกอย่างมั่นใจกันเลย!"
13010-CVGroup_Battle_Move_1-1 = "ตอนนี้ยังเป็นไปตามที่คำนวณไว้"
13010-CVGroup_Battle_Move_2-1 = "ถ้าการคำนวณถูก ก็ใกล้เจอเป้าหมายต่อไปแล้วละ"
13010-CVGroup_Battle_Recovery_1-1 = "อืม ปริมาณพอดีเลยนะ"
13010-CVGroup_Battle_TacticalAction_1-1 = "เอาละ!"
13010-CVGroup_Battle_Victory_1-1 = "ตามที่คำนวณไว้เลย\nสมบูรณ์แบบ~"
13010-CVGroup_Battle_Victory_2-1 = "คณิตศาสตร์จะนำไปสู่ความจริง\nชัยชนะของเรายังไงล่ะ"
13010-CVGroup_CommonSkill-1 = "ยังไม่จบอีกเหรอ?"
13010-CVGroup_ExSkill_1-1 = "ทั้งความเศร้า ทั้งความโกรธ\nฉันจะคิดบัญชีให้หมดเลย"
13010-CVGroup_ExSkill_2-1 = "จากสถานการณ์และเงื่อนไขตอนนี้...\nดีละ การต่อสู้ครั้งนี้เราชนะแล้ว"
13010-CVGroup_ExSkill_3-1 = "เปอร์เซ็นต์ที่จะโจมตีโดนฉัน... น้อยมาก!"
13010-CVGroup_ExSkill_Level_1-1 = "ก็แค่ผลการคำนวณง่ายๆ น่ะ"
13010-CVGroup_ExSkill_Level_2-1 = "ความชอบธรรมและตรรกะน่ะไร้ความปรานีอยู่แล้ว"
13010-CVGroup_ExSkill_Level_3-1 = "ฉันจะพิสูจน์ชัยชนะให้เอง"
13010-CVGroup_Formation_In_1-1 = "เลือกอย่างสมเหตุสมผลเลยนะ"
13010-CVGroup_Formation_In_2-1 = "นี่จะมีค่าตอบแทนใช่มั้ยคะ?"
13010-CVGroup_Formation_Select-1 = "ฮึ่ม คุณครูนี่ฉลาดจังเลยนะคะ"
13010-CVGroup_Growup_1-1 = "ได้โอกาสโชว์ผลลัพธ์แล้ว ฉันกำลังรออยู่เลยค่ะ!"
13010-CVGroup_Growup_2-1 = "ผลลัพธ์ที่ให้ความรู้สึกเหมือนตัวเลข ทำให้คนตื่นเต้นจังเลยนะคะ"
13010-CVGroup_Growup_3-1 = "ภารกิจต่อไป รอดูกำไรได้เลยค่ะ"
13010-CVGroup_Growup_4-1 = "ฉันไม่ชอบคำนี้เลย...\nแต่ตอนนี้ฉัน! คำนวณไม่ได้ค่ะ!"
13010-CVGroup_Relationship_Up_1-1 = "รู้สึกเหมือนใช้ทั้งกำลังและเวลาไปมากเลย...\nแต่พออยู่กับคุณครู ก็เหมือนได้กำไรเลยนะคะ"
13010-CVGroup_Relationship_Up_2-1 = "คำนวณไม่ได้ค่ะ หมายถึงอารมณ์ของฉันตอนนี้น่ะค่ะ"
13010-CVGroup_Relationship_Up_3-1 = "ฉันเอาแต่คิดเรื่องวัดหรือคำนวณอยู่ทุกวัน\nแต่ตอนนี้ฉันอยากรู้สึกถึงช่วงเวลานี้น่ะ"
13010-CVGroup_Relationship_Up_4-1 = "ทำไมกันนะ\nนี่เป็นความรู้สึกที่อธิบายไม่ได้... แต่ก็ไม่ได้ไม่ชอบนะ"
13010-CVGroup_Tactic_In_1-1 = "ตรวจสอบพิกัดศัตรู\nคุณครู รบกวนสั่งการด้วยค่ะ!"
13010-CVGroup_Tactic_In_2-1 = "ตรวจสอบพิกัดศัตรู\nอยู่ในระยะใกล้ คำนวณกำลังทั้งหมดแล้ว"
13010-CVGroup_Tactic_Victory_1-1 = "ชนะอย่างชาญฉลาด~"
13010-CVGroup_Tactic_Victory_2-1 = "เพราะโชคดีงั้นเหรอคะ?\nไม่หรอกค่ะ เป็นไปตามที่คำนวณไว้น่ะค่ะ"

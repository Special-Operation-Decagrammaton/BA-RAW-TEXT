[translation]
20036-CVGroup_CommonSkill-1 = "接招吧！"
20036-CVGroup_ExSkill_1-1 = "呼，真開……哇，哇啊！？"
20036-CVGroup_ExSkill_2-1 = "老師～！呀啊！？"
20036-CVGroup_ExSkill_3-1 = "意外的還不錯吧……吼唷～～～！？！？"
20036-CVGroup_ExSkill_Level_1-1 = "跑走了，小心點！！"
20036-CVGroup_ExSkill_Level_2-1 = "要飛過去囉！！"
20036-CVGroup_ExSkill_Level_3-1 = "快閃開～～～！！"
20036-CVGroup_Formation_In_1-1 = "沒有時間猶豫了！"

20036-CVGroup_Formation_In_1-1 = "머뭇거릴 틈이 없다고!"
20036-CVGroup_Formation_In_2-1 = "빨리빨리 가자~!"
20036-CVGroup_Growup_1-1 = "그… 노는 건 좋지만…… 정말 이걸로 괜찮은 거겠지……?"

[translation]
10128-CVGroup_Battle_Buffed_1-1 = "บุญคุณในครั้งนี้ฉันจะตอบแทนอย่างแน่นอนค่ะ...!"
10128-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวสำเร็จแล้ว...!"
10128-CVGroup_Battle_Defense_1-1 = "ฮุ... ฮุฮุ กะ... การโจมตีนี้...!"
10128-CVGroup_Battle_In_1-1 = "เอาละ เราไปคว้าชัยชนะกันเลยดีมั้ยคะ?"
10128-CVGroup_Battle_In_2-1 = "ไม่ต้องกังวลเรื่องการสนับสนุนนะคะ"
10128-CVGroup_Battle_Move_1-1 = "เอาละ ไปกันเถอะค่ะ!"
10128-CVGroup_Battle_Move_2-1 = "ผ่อนคลายกันหน่อยนะคะ~"
10128-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะคุณลูกค้า...!"
10128-CVGroup_Battle_TacticalAction_1-1 = "พรืด!"
10128-CVGroup_Battle_Victory_1-1 = "เป็นการแลกเปลี่ยนที่โปร่งใสมากค่ะ"
10128-CVGroup_Battle_Victory_2-1 = "รบกวนช่วยรีวิวด้วยนะคะ"
10128-CVGroup_CommonSkill-1 = "ฮุฮุ ลองดูสินค้าก่อนมั้ยคะ?"
10128-CVGroup_ExSkill_1-1 = "ชู่ว ที่เห็นเมื่อกี้เป็นความลับนะคะ"
10128-CVGroup_ExSkill_2-1 = "เป็นไงคะ? ดูเท่ขึ้นบ้างมั้ยคะ?"
10128-CVGroup_ExSkill_3-1 = "เอาละ ตอนนี้เราออกไปเงียบๆ กันเถอะค่ะ!"
10128-CVGroup_ExSkill_Level_1-1 = "กระสุนมาส่งแล้วค่ะ!"
10128-CVGroup_ExSkill_Level_2-1 = "พุ่งทะลวงไปอย่างแม่นยำ!"
10128-CVGroup_ExSkill_Level_3-1 = "พื้นที่จัดส่งคือเขตของศัตรู! จัดส่งเรียบร้อย!"
10128-CVGroup_Formation_In_1-1 = "เป็นตัวเลือกที่จะไม่เสียใจทีหลังแน่นอนค่ะ"
10128-CVGroup_Formation_In_2-1 = "สิ่งที่เราต้องคว้ามา... คือชัยชนะใช่มั้ยคะ?"
10128-CVGroup_Formation_Select-1 = "ฮุฮุ... เฮือก! ฮู่ว..."
10128-CVGroup_Growup_1-1 = "โอ้... ไปหามาจากไหนคะเนี่ย...! ขอบคุณค่ะคุณครู!"
10128-CVGroup_Growup_2-1 = "ลงทุนขนาดนี้เลยเหรอเนี่ย...! ฉันจะไม่ทำให้ผิดหวังค่ะ!"
10128-CVGroup_Growup_3-1 = "ทำให้ฉันถึงขนาดนี้เลย...?\nมีของที่ต้องการรึเปล่าคะ...?"
10128-CVGroup_Growup_4-1 = "ขอบคุณค่ะ คุณครู การลงทุนที่แสนใจกว้างแบบนี้\nฉันจะชดใช้ให้อย่างแน่นอน...!"
10128-CVGroup_Relationship_Up_1-1 = "มีเดียและศิลปะ... ลองฟังเรื่องราวของฉันหน่อยมั้ยคะ?"
10128-CVGroup_Relationship_Up_2-1 = "แปลกจังเลยนะคะ พอได้ลองคุยกับคุณครูแล้ว\nมีเรื่องให้พูดคุยเยอะอย่างน่าประหลาดเลยค่ะ"
10128-CVGroup_Relationship_Up_3-1 = "คือว่าคุณครูชอบดูหนังมั้ยคะ?\nเปล่าค่ะ ฉันถามเพราะเหตุผลด้านงานศิลป์ล้วนๆ เลย...!"
10128-CVGroup_Relationship_Up_4-1 = "ทำไมกันนะ ถ้าต้องการก็เจอได้ตลอด\nแต่ฉันก็ยังอยากเก็บไว้ข้างๆ ตัว..."
10128-CVGroup_Tactic_In_1-1 = "ฮุฮุ ที่นี่คือตลาดแห่งใหม่เหรอ?"
10128-CVGroup_Tactic_In_2-1 = "ถ้าอยากชนะต้องใช้ของชิ้นไหนบ้างนะ..."
10128-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ เป็นไปตามที่คาดไว้เลยค่ะ"
10128-CVGroup_Tactic_Victory_2-1 = "สินค้าชื่อ 'ชัยชนะ' จัดส่งเรียบร้อยแล้วค่ะ"

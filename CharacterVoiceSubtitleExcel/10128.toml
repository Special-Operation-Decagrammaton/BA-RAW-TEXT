[translation]
10128-CVGroup_Battle_Buffed_1-1 = "이 값은 반드시 치르겠습니다……!"
10128-CVGroup_Battle_Covered_1-1 = "겨우 숨었다……!"
10128-CVGroup_Battle_Defense_1-1 = "후, 후후, 이깟 공, 공격쯤은……!"
10128-CVGroup_Battle_In_1-1 = "자아, 그러면 이기러 가 볼까요?"
10128-CVGroup_Battle_In_2-1 = "보급은 신경 쓰지 마시길."
10128-CVGroup_Battle_Move_1-1 = "자, 가시죠!"
10128-CVGroup_Battle_Move_2-1 = "긴장들 푸시고~"
10128-CVGroup_Battle_Recovery_1-1 = "감사합니다, 고객님……!"
10128-CVGroup_Battle_TacticalAction_1-1 = "흐낏!"
10128-CVGroup_Battle_Victory_1-1 = "깔끔한 거래였습니다."
10128-CVGroup_Battle_Victory_2-1 = "나중에 리뷰도 잘 부탁드려요."
10128-CVGroup_CommonSkill-1 = "후후, 물건 한 번 보시겠습니까?"
10128-CVGroup_ExSkill_1-1 = "쉬-잇, 지금 본 건 비밀입니다?"
10128-CVGroup_ExSkill_2-1 = "어때요? 좀 멋있었나요?"
10128-CVGroup_ExSkill_3-1 = "자, 이제 조용히 빠져나가죠!"
10128-CVGroup_ExSkill_Level_1-1 = "총알 배송 왔습니다!"
10128-CVGroup_ExSkill_Level_2-1 = "신속 정확 격파!"
10128-CVGroup_ExSkill_Level_3-1 = "배송지는 적진! 물품 전달 완료!"
10128-CVGroup_Formation_In_1-1 = "후회 없는 선택일 겁니다."
10128-CVGroup_Formation_In_2-1 = "저희가 구해와야 할 것은…… 승리인가요?"
10128-CVGroup_Formation_Select-1 = "후훗…… 흐이익! 후으으……."
10128-CVGroup_Growup_1-1 = "오오, 어디서 이런 걸……! 감사합니다, 선생님!"
10128-CVGroup_Growup_2-1 = "이 정도의 투자라니……! 실망시켜 드리지 않겠습니다!"
10128-CVGroup_Growup_3-1 = "저에게 이렇게까지……? ……혹시 필요한 물품 있으신가요?"
10128-CVGroup_Growup_4-1 = "감사합니다, 선생님. 이 아낌없는 투자의 대가는, 반드시……!"
10128-CVGroup_Relationship_Up_1-1 = "미디어, 그리고 예술…… 제 이야기, 한번 들어보실래요?"
10128-CVGroup_Relationship_Up_2-1 = "이상해요. 선생님과 대화를 나누다 보면, 신기하게도 말이 많아진단 말이죠."
10128-CVGroup_Relationship_Up_3-1 = "저기 혹시, 영화 보는 거 좋아하시나요?\n아뇨, 그, 저는 어디까지나 예술적인 이유로……!"
10128-CVGroup_Relationship_Up_4-1 = "왜일까요, 원하면 이렇게 볼 수 있는데도, 굳이 옆에 두고 싶은 건……."
10128-CVGroup_Tactic_In_1-1 = "후후, 여기가 새로운 마켓인가?"
10128-CVGroup_Tactic_In_2-1 = "이기기 위해선, 어떤 상품이 필요할까나……."
10128-CVGroup_Tactic_Victory_1-1 = "후후, 예상대로 진행되었군요."
10128-CVGroup_Tactic_Victory_2-1 = "상품명 '승리'. 배송, 완료하였습니다."

[translation]
10128-CVGroup_Battle_Buffed_1-1 = "請幫我把帳先記著……！"
10128-CVGroup_Battle_Covered_1-1 = "哈啊～終於躲起來了……！"
10128-CVGroup_Battle_Defense_1-1 = "呵，呵呵，這，這種程度……！"
10128-CVGroup_Battle_In_1-1 = "好，去進貨「勝利」吧！"
10128-CVGroup_Battle_In_2-1 = "補給就交給我吧。"
10128-CVGroup_Battle_Move_1-1 = "好，出發吧！"
10128-CVGroup_Battle_Move_2-1 = "放輕鬆放輕鬆～"
10128-CVGroup_Battle_Recovery_1-1 = "感謝您的交易……！"
10128-CVGroup_Battle_TacticalAction_1-1 = "哼！"
10128-CVGroup_Battle_Victory_1-1 = "是場順利的交易呢。"
10128-CVGroup_Battle_Victory_2-1 = "之後麻煩幫我給個好評哦。"
10128-CVGroup_CommonSkill-1 = "呵呵，好東西都準備好了唷？"
10128-CVGroup_ExSkill_1-1 = "噓～剛才看到的可是企業機密唷？"
10128-CVGroup_ExSkill_2-1 = "怎麼樣？很帥吧？"
10128-CVGroup_ExSkill_3-1 = "好，趁被發現之前快溜吧！"
10128-CVGroup_ExSkill_Level_1-1 = "子彈，送來了！"
10128-CVGroup_ExSkill_Level_2-1 = "配送要迅速又細心！"
10128-CVGroup_ExSkill_Level_3-1 = "不管對方是誰都是客戶！\n我來送貨了！"
10128-CVGroup_Formation_In_1-1 = "嗯，絕不會讓你後悔的。"
10128-CVGroup_Formation_In_2-1 = "你要的東西是……「勝利」對吧？"
10128-CVGroup_Formation_Select-1 = "呵呵……哇啊！……呼。"
10128-CVGroup_Growup_1-1 = "你究竟是從哪裡弄到這種東西的……！\n謝謝你，老師！"
10128-CVGroup_Growup_2-1 = "咦，投資……這麼多！？\n呵呵，我不會讓你失望的！"
10128-CVGroup_Growup_3-1 = "對我做到這種程度……？\n……你有什麼無論如何都想得到的東西嗎？"
10128-CVGroup_Growup_4-1 = "謝謝你。\n我一定會回應你的期待……！"
10128-CVGroup_Relationship_Up_1-1 = "媒體和藝術……讓我來教教你吧？"
10128-CVGroup_Relationship_Up_2-1 = "很奇怪對吧。\n和老師聊天的時候，總是會不小心忘了時間。"
10128-CVGroup_Relationship_Up_3-1 = "那個……你喜歡電影嗎？\n咦……啊，不是，我沒有別的意思……！"
10128-CVGroup_Relationship_Up_4-1 = "明明隨時都能見面……\n究竟是為什麼呢。\n總是會想把你留在身邊……"
10128-CVGroup_Tactic_In_1-1 = "那麼，開始市場調查吧。"
10128-CVGroup_Tactic_In_2-1 = "要有什麼東西才能贏呢……"
10128-CVGroup_Tactic_Victory_1-1 = "呵呵，果然如我預料。"
10128-CVGroup_Tactic_Victory_2-1 = "「勝利」送來了。啊，請在這裡蓋章。"

[translation]
13007-CVGroup_Battle_Buffed_1-1 = "อื้อ ดีละ!"
13007-CVGroup_Battle_Covered_1-1 = "จะซ่อนละนะ!"
13007-CVGroup_Battle_Defense_1-1 = "แค่นี้เองเหรอ?"
13007-CVGroup_Battle_In_1-1 = "เอาละ ไปกันเลย! "
13007-CVGroup_Battle_In_2-1 = "รีบๆ ทำให้เสร็จแล้วไปกินข้าวกันเถอะ!"
13007-CVGroup_Battle_Move_1-1 = "เฮ้อ... หิวกว่าเดิมอีก..."
13007-CVGroup_Battle_Move_2-1 = "รู้งี้เอาของว่างมาด้วยก็ดี..."
13007-CVGroup_Battle_Recovery_1-1 = "แต้งกิ้ว! แล้วฉันจะตอบแทนบุญคุณนะ!"
13007-CVGroup_Battle_TacticalAction_1-1 = "ไปละนะ!"
13007-CVGroup_Battle_Victory_1-1 = "ฮิฮิ ขอลองชิม... ว้าก?!\nทะ... ทำไมกันนน!"
13007-CVGroup_Battle_Victory_2-1 = "ทาด๊า~ นี่อันสุดท้าย...\nอะ... อ๊าาาา!?"
13007-CVGroup_CommonSkill-1 = "ยกโทษให้ไม่ได้!"
13007-CVGroup_ExSkill_1-1 = "ฮึ่ย... เดี๋ยวเหอะ!\nมุแงงงง!"
13007-CVGroup_ExSkill_2-1 = "ดังโงะ~ ดังโงะ~ เอ๋?!"
13007-CVGroup_ExSkill_3-1 = "แหะๆ... ว้ายย?\nเฮ้อ จริงๆ เลย! "
13007-CVGroup_ExSkill_Level_1-1 = "ยังไม่ได้ชิมเลยนะ!!"
13007-CVGroup_ExSkill_Level_2-1 = "คนนิสัยไม่ดี!"
13007-CVGroup_ExSkill_Level_3-1 = "จะทำให้เป็นชิ้นเล็กชิ้นน้อยเลย!!"
13007-CVGroup_Formation_In_1-1 = "เจอดีแน่!"
13007-CVGroup_Formation_In_2-1 = "ให้เป็นหน้าที่ของฉันเลย~"
13007-CVGroup_Formation_Select-1 = "ปะ... ปล่อยนะ!"
13007-CVGroup_Growup_1-1 = "ฉะ... ฉันไม่ได้ตัวเล็กนะ!\nฉันยังโตได้อีก ในอนาคตก็จะโตขึ้นอีก!"
13007-CVGroup_Growup_2-1 = "ฉันก็ไม่แน่ใจเหมือนกัน...\nแต่เหมือนจะแข็งแกร่งขึ้นมาหน่อยนะ!"
13007-CVGroup_Growup_3-1 = "กินเยอะๆ! แล้วเก่งกว่านี้เยอะๆ!\nแล้วไปเที่ยวเล่นกันอีกเยอะๆ นะ! คุณครู!"
13007-CVGroup_Growup_4-1 = "ยังไม่เป็นไรหรอก! ยังกินได้อีกไม่อั้นเลย!"
13007-CVGroup_Relationship_Up_1-1 = "ฉันไม่ได้ชอบเพราะซื้อของกินให้หรอก...\nจะ... จริงๆ นะ!"
13007-CVGroup_Relationship_Up_2-1 = "ซื้อของอร่อยให้อีกแล้วเหรอ... คุณครูเป็นคนดีจังเลยนะ..."
13007-CVGroup_Relationship_Up_3-1 = "ฉันไม่ได้ไม่ชอบให้บอกว่าน่ารักหรอก... อ่า... ไม่มีอะไร!"
13007-CVGroup_Relationship_Up_4-1 = "เอ่อ... ถ้าต้องการอะไร... ก็เรียกฉันนะ\nถะ... ถ้าเป็นคุณครูละก็ ฉันจะช่วยทุกเมื่อเลย!"
13007-CVGroup_Tactic_In_1-1 = "ฉันจะนำให้เอง!"
13007-CVGroup_Tactic_In_2-1 = "ถ้าชนะจะได้กินของอร่อยๆ!"
13007-CVGroup_Tactic_Victory_1-1 = "เป็นไงล่ะ! ชนะอย่างสมบูรณ์แบบเลยใช่มั้ย?"
13007-CVGroup_Tactic_Victory_2-1 = "คุณครู! จะเลี้ยงข้าวจริงๆ ใช่มั้ย!?"

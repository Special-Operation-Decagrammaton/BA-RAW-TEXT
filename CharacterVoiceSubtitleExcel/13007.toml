[translation]
13007-CVGroup_Battle_Buffed_1-1 = "嗯，很好！"
13007-CVGroup_Battle_Covered_1-1 = "躲起來囉！"
13007-CVGroup_Battle_Defense_1-1 = "只有這點程度？"
13007-CVGroup_Battle_In_1-1 = "來，要走囉！"
13007-CVGroup_Battle_In_2-1 = "趕快搞定之後去吃飯吧！"
13007-CVGroup_Battle_Move_1-1 = "唉，肚子餓了……"
13007-CVGroup_Battle_Move_2-1 = "要是有帶點心來就好了……"
13007-CVGroup_Battle_Recovery_1-1 = "謝啦！我會報答你的！"
13007-CVGroup_Battle_TacticalAction_1-1 = "移動吧！"
13007-CVGroup_Battle_Victory_1-1 = "嘿嘿，那我就來吃吃……啊！？\n為，為什麼！！"
13007-CVGroup_Battle_Victory_2-1 = "鏘～我最後的……\n唔，唔咦咦咦！？"
13007-CVGroup_CommonSkill-1 = "不可原諒！"
13007-CVGroup_ExSkill_1-1 = "哼哼……咦咦咦！\n嗚哇啊啊啊！"
13007-CVGroup_ExSkill_2-1 = "團子～團子～唔咦咦！？"
13007-CVGroup_ExSkill_3-1 = "嘿嘿……唔哇？\n啊啊真是的！"
13007-CVGroup_ExSkill_Level_1-1 = "我連味道都還沒嚐過耶！！"
13007-CVGroup_ExSkill_Level_2-1 = "這些渾蛋！"
13007-CVGroup_ExSkill_Level_3-1 = "我要打爆你們！！"
13007-CVGroup_Formation_In_1-1 = "要做就做吧！"
13007-CVGroup_Formation_In_2-1 = "交給我吧～"
13007-CVGroup_Formation_Select-1 = "放，放開我！"
13007-CVGroup_Growup_1-1 = "我，我才不矮咧！\n現在還在成長期，以後會長高的！"
13007-CVGroup_Growup_2-1 = "雖然不是很懂……\n感覺，好像稍微變強了！"
13007-CVGroup_Growup_3-1 = "吃很多東西，變得很強……然後到很多不一樣的地方去吧！老師！"
13007-CVGroup_Growup_4-1 = "還完全沒問題，感覺要吃多少都沒問題！"
13007-CVGroup_Relationship_Up_1-1 = "就算買東西給我吃，我也不會因為這樣就喜歡上……\n我，我是說真的！"
13007-CVGroup_Relationship_Up_2-1 = "竟然又買好吃的東西給我……老師真是個好人呢……"
13007-CVGroup_Relationship_Up_3-1 = "我也不討厭被說可愛啦……沒，沒什麼！"
13007-CVGroup_Relationship_Up_4-1 = "那個……需要的時候……就跟我說吧。\n如，如果是老師的事，我隨時都會幫忙的！"
13007-CVGroup_Tactic_In_1-1 = "我打頭陣！"
13007-CVGroup_Tactic_In_2-1 = "贏了就能吃到好吃的東西！"
13007-CVGroup_Tactic_Victory_1-1 = "怎麼樣啊！是完美的勝利對吧？"
13007-CVGroup_Tactic_Victory_2-1 = "老師！你真的會請我吃飯吧？"

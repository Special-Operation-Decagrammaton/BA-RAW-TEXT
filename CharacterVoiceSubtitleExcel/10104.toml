[translation]
10104-CVGroup_Battle_Buffed_1-1 = "รู้สึกได้ถึงพลังที่เอ่อล้นออกมาเลย!"
10104-CVGroup_Battle_Covered_1-1 = "จะพรางตัวละนะ"
10104-CVGroup_Battle_Defense_1-1 = "เหยาะแหยะจริงๆ!"
10104-CVGroup_Battle_In_1-1 = "ตั้งสติแล้วบุกเข้าไปเลย"
10104-CVGroup_Battle_In_2-1 = "เชื่อมั่นในตัวเองแล้วก้าวไปข้างหน้ากันเลย"
10104-CVGroup_Battle_Move_1-1 = "ไปยังเป้าหมายต่อไป!"
10104-CVGroup_Battle_Move_2-1 = "ค่อยๆ ใจเย็นๆ ไม่ต้องรีบร้อน"
10104-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ!"
10104-CVGroup_Battle_TacticalAction_1-1 = "จะย้ายตำแหน่งแล้วนะคะ!"
10104-CVGroup_Battle_Victory_1-1 = "เป็นผลจากการฝึกฝนค่ะ"
10104-CVGroup_Battle_Victory_2-1 = "ฮู่ว ได้เสียเหงื่อเยอะเลยค่ะ!"
10104-CVGroup_CommonSkill-1 = "ย้ากกก!\nระวังตัวด้วยนะคะ..."
10104-CVGroup_ExSkill_1-1 = "ฮุ! ไฮ่!\nฝ่ามือพิฆาต!"
10104-CVGroup_ExSkill_2-1 = "ฮึบ! ฮึ่ย!\nได้หนึ่งแต้ม!"
10104-CVGroup_ExSkill_3-1 = "ฮ่ะ! ย้าก!\nชนะในพริบตา!"
10104-CVGroup_ExSkill_Level_1-1 = "เจอนี่ซะ!"
10104-CVGroup_ExSkill_Level_2-1 = "เป็นไง!"
10104-CVGroup_ExSkill_Level_3-1 = "ถอนรากถอนโคน!"
10104-CVGroup_Formation_In_1-1 = "ให้เป็นหน้าที่ฉันเองค่ะ"
10104-CVGroup_Formation_In_2-1 = "ทุ่มหมดหน้าตัก ฉันจะทำให้เต็มที่เลยค่ะ"
10104-CVGroup_Formation_Select-1 = "เหมือนกับสายน้ำที่ไหลไป"
10104-CVGroup_Growup_1-1 = "เพราะมีคุณครูอยู่ด้วย...\nฉันถึงก้าวไปข้างหน้าได้โดยไม่สูญเสียความมุ่งมั่นไป"
10104-CVGroup_Growup_2-1 = "งานของผู้จัดการกับการฝึกฝนมีสิ่งที่คล้ายกันอยู่ค่ะ\nนั่นคือต้องมีพลังที่จะเชื่อมั่นในตัวเองค่ะ"
10104-CVGroup_Growup_3-1 = "เพราะมีคุณครูคอยเฝ้ามองอยู่\nฉันถึงก้าวไปข้างหน้าได้อีกขั้นหนึ่งค่ะ"
10104-CVGroup_Growup_4-1 = "สิ่งสำคัญคือความสมดุล\nจะต้องยืดหยุ่นได้โดยไม่แตกหักค่ะ"
10104-CVGroup_Relationship_Up_1-1 = "ฉะ... ฉัน... คือ... ฉันยังไม่ชินกับการตอบรับ\nหรือการพูดคุยแบบหวานๆ...\nขะ... ขอบคุณที่เข้าใจนะคะ คุณครู"
10104-CVGroup_Relationship_Up_2-1 = "เวลาที่คุณครูอยู่ข้างๆ ฉันรู้สึกจิตใจไม่สงบเลยค่ะ...\n...อย่าถามต่อเลย... ดีกว่านะคะ..."
10104-CVGroup_Relationship_Up_3-1 = "ในเวลาเช่นนี้ ฉันคิดว่าตัวเองจะทำอะไรเพื่อคุณครูได้บ้าง\nคิดแล้วเชียวว่าเวลาแบบนี้ มาฝึกกังฟูกับฉันดีกว่าค่ะ!"
10104-CVGroup_Relationship_Up_4-1 = "หากมีเหตุจำเป็นที่ต้องได้รับการคุ้มกันก็บอกได้ตลอดเลยนะคะ\nถึงต้องแลกทุกอย่างที่มี ฉันก็จะปกป้องคุณครูไว้ให้ได้ค่ะ!\nมะ... ไม่จำเป็นต้องแลกทุกอย่างที่มีเหรอคะ? ถ้างั้นแค่ครึ่งหนึ่งก็ยังดี..."
10104-CVGroup_Tactic_In_1-1 = "ฉันจะแสดงกังฟูให้เห็นเองค่ะ"
10104-CVGroup_Tactic_In_2-1 = "เอ้า! รีบไปกันเถอะค่ะ!"
10104-CVGroup_Tactic_Victory_1-1 = "ไม่ประมาทจนกว่าจะจัดการเสร็จ"
10104-CVGroup_Tactic_Victory_2-1 = "อย่าหวั่นไหว แล้วบุกต่อไปค่ะ!"

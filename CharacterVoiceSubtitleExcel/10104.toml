10104-CVGroup_Growup_1-1 = "선생님이 계셔주셨기에………. 초심을 잃지 않고, 정진할 수 있었습니다."
10104-CVGroup_Growup_2-1 = "매니저 일과 단련에는 공통점이 있습니다.\n둘 다, 자신을 믿는 힘이 요구됩니다."
10104-CVGroup_Growup_3-1 = "선생님이 지켜봐 주신 덕분에, 오늘도 일보전진할 수 있었습니다."
10104-CVGroup_Growup_4-1 = "꺾이지 않고 올곧게 받아들이고 유연하게. 중요한 것은 균형입니다."
10104-CVGroup_Relationship_Up_1-1 = "저, 저는, 그……\n귀엽게 대답하거나 하는 것에, 아무래도 서툴러서……\n이, 이해해 주셔서 감사합니다, 선생님."
10104-CVGroup_Relationship_Up_2-1 = "선생님 옆에 있으면, 제 마음이 들뜬다고나 할까요……….\n……더 이상은, 그, 묻지 말아 주세요……"
10104-CVGroup_Relationship_Up_3-1 = "이럴 때, 선생님을 위해서\n무엇을 할 수 있을까, 라고 생각하게 됩니다.\n……역시 이럴 땐, 저와 함께 쿵후의 수련을!"
10104-CVGroup_Relationship_Up_4-1 = "경호가 필요하신 일이 닥친다면, 언제든 말씀해 주세요.\n제 모든 것과 바꿔서라도, 반드시 선생님을 지켜드리겠습니다!\n모, 모든 것과 바꿀 필요는 없다고요? 그러면 절반만이라도……"
10104-CVGroup_Tactic_In_1-1 = "쿵후의 경지, 보여드리도록 하지요."
10104-CVGroup_Tactic_In_2-1 = "자아! 가 보도록 하죠!"
10104-CVGroup_Tactic_Victory_1-1 = "끝까지, 방심하지 않고."
10104-CVGroup_Tactic_Victory_2-1 = "흔들리지 말고, 정진합시다!"

[translation]
10104-CVGroup_Battle_Buffed_1-1 = "能感覺到高漲的力量！"
10104-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
10104-CVGroup_Battle_Defense_1-1 = "太軟弱了！"
10104-CVGroup_Battle_In_1-1 = "打起精神上吧。"
10104-CVGroup_Battle_In_2-1 = "僅需相信自己，向前邁進。"
10104-CVGroup_Battle_Move_1-1 = "前往下一個目標！"
10104-CVGroup_Battle_Move_2-1 = "冷靜下來，不要動搖。"
10104-CVGroup_Battle_Recovery_1-1 = "非常感謝！"
10104-CVGroup_Battle_TacticalAction_1-1 = "改變位置吧！"
10104-CVGroup_Battle_Victory_1-1 = "是鍛鍊的成果呢。"
10104-CVGroup_Battle_Victory_2-1 = "呼，流了一場好汗！"
10104-CVGroup_CommonSkill-1 = "咿呀啊！\n……我會自重的。"
10104-CVGroup_ExSkill_1-1 = "呼！哈！\n一擊必殺！"
10104-CVGroup_ExSkill_2-1 = "呼！嘿！\n一點必中！"
10104-CVGroup_ExSkill_3-1 = "哈！呀！\n鎧袖一觸！"
10104-CVGroup_ExSkill_Level_1-1 = "看招！"
10104-CVGroup_ExSkill_Level_2-1 = "如何！"
10104-CVGroup_ExSkill_Level_3-1 = "拔本塞源！"
10104-CVGroup_Formation_In_1-1 = "我會謹慎地收下。"
10104-CVGroup_Formation_In_2-1 = "粉骨碎身。我會全力以赴。"
10104-CVGroup_Formation_Select-1 = "宛如流水。"
10104-CVGroup_Growup_1-1 = "多虧有老師在……\n我才得以不忘初衷，持續精進。"
10104-CVGroup_Growup_2-1 = "經理的工作和鍛鍊有個共同點。\n兩者都需要相信自己的力量。"
10104-CVGroup_Growup_3-1 = "多虧有老師的關照，\n感覺今天也得以前進一步。"
10104-CVGroup_Growup_4-1 = "不屈不撓筆直向前，靈活地應對。\n關鍵在於平衡。"
10104-CVGroup_Relationship_Up_1-1 = "我，我，那個……\n對於惹人憐愛的回答，不是很擅長……\n對，對於您的諒解，我非常感謝，老師。"
10104-CVGroup_Relationship_Up_2-1 = "只要待在老師身邊，該說心情就會跌宕起伏嗎……\n……之後的事，那個，就請別問下去了……"
10104-CVGroup_Relationship_Up_3-1 = "這種時候，我總會思考能為老師做些什麼。\n……果然現在，就該和我一起進行功夫的修練！"
10104-CVGroup_Relationship_Up_4-1 = "如果需要護衛的話，請隨時告訴我。\n我會拚盡全力守護老師！\n……不用那麼拚沒關係……？可，可是……"
10104-CVGroup_Tactic_In_1-1 = "功夫的極意，好好見識吧。"
10104-CVGroup_Tactic_In_2-1 = "好，上吧！"
10104-CVGroup_Tactic_Victory_1-1 = "直到最後，都不能掉以輕心。"
10104-CVGroup_Tactic_Victory_2-1 = "一心一意……持續精進！"

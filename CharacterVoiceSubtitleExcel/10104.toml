10104-CVGroup_Battle_Defense_1-1 = "Done!"
10104-CVGroup_Battle_In_1-1 = "Let's focus."
10104-CVGroup_Battle_In_2-1 = "Believe in yourself as we move forward."
10104-CVGroup_Battle_Move_1-1 = "On to the next objective!"
10104-CVGroup_Battle_Move_2-1 = "Don't be swayed. Stay calm."
10104-CVGroup_Battle_Recovery_1-1 = "Thank you!"
10104-CVGroup_Battle_TacticalAction_1-1 = "On to the next location!"
10104-CVGroup_Battle_Victory_1-1 = "It's the results of my training."
10104-CVGroup_Battle_Victory_2-1 = "Whew, that was a great workout!"
10104-CVGroup_CommonSkill-1 = "Hiyaah! ...I'll be careful."
10104-CVGroup_ExSkill_1-1 = "Hah! Hiyah! One hit KO!"
10104-CVGroup_ExSkill_2-1 = "Hup! Hiyah! One point, for sure!"
10104-CVGroup_ExSkill_3-1 = "Ha! Hyah! Easy peasy!"
10104-CVGroup_ExSkill_Level_1-1 = "Take this!"
10104-CVGroup_ExSkill_Level_2-1 = "How's that?!"

10104-CVGroup_Relationship_Up_3-1 = "In times like this, I wonder what I can do for you, Sensei. In times like this...of course! We should train in kung fu!"
10104-CVGroup_Relationship_Up_4-1 = "If you ever need protection, let me know. I'd give everything I have to protect you, Sensei! Th-There's no need to give everything? Well, maybe just half, then?"

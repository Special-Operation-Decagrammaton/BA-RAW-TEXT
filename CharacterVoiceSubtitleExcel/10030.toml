[translation]
10030-CVGroup_Battle_Buffed_1-1 = "我會回應您的期待。"
10030-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
10030-CVGroup_Battle_Defense_1-1 = "沒用的！"
10030-CVGroup_Battle_In_1-1 = "即便身處前線，該做的事情也不會改變。"
10030-CVGroup_Battle_In_2-1 = "在這個位置進行的支援，讓人感到有點不可思議呢。"
10030-CVGroup_Battle_Move_1-1 = "前進吧。"
10030-CVGroup_Battle_Move_2-1 = "注意別放鬆緊戒，繼續前進吧。"
10030-CVGroup_Battle_Recovery_1-1 = "支援，非常感謝。"
10030-CVGroup_Battle_TacticalAction_1-1 = "立刻過去。"
10030-CVGroup_Battle_Victory_1-1 = "大家，辛苦了。"
10030-CVGroup_Battle_Victory_2-1 = "繼續維持這個態勢前進吧。"
10030-CVGroup_CommonSkill-1 = "生命徵象沒有問題！請進擊！"
10030-CVGroup_ExSkill_1-1 = "真是的……"
10030-CVGroup_ExSkill_2-1 = "……已發現。"
10030-CVGroup_ExSkill_3-1 = "唉……"
10030-CVGroup_ExSkill_Level_1-1 = "真沒辦法呢。"
10030-CVGroup_ExSkill_Level_2-1 = "要上了。"
10030-CVGroup_ExSkill_Level_3-1 = "請交給我吧。"
10030-CVGroup_Formation_In_1-1 = "如果是為了老師，我隨時能助您一臂之力唷。"
10030-CVGroup_Formation_In_2-1 = "是，請交給我吧，老師。"
10030-CVGroup_Formation_Select-1 = "唔，唔嗯，那個……？"
10030-CVGroup_Growup_1-1 = "一直都很謝謝您，老師。"
10030-CVGroup_Growup_2-1 = "老師投注的期待，我一定會加以回應。"
10030-CVGroup_Growup_3-1 = "那個，雖然很高興，但現在還不能鬆懈……"
10030-CVGroup_Growup_4-1 = "為何，要對這樣的我……？"
10030-CVGroup_Relationship_Up_1-1 = "服裝改變的話，果然也會對心情有所影響嗎？\n稍微，有點困擾呢……"
10030-CVGroup_Relationship_Up_2-1 = "要不要再稍微，像這樣休息一下呢……？"
10030-CVGroup_Relationship_Up_3-1 = "雖然不應該過於鬆懈……\n不過只要跟老師待在一起，就會不自覺地……"
10030-CVGroup_Relationship_Up_4-1 = "老師有獲得充足的休息嗎？\n哪怕只有一點也好，要不要一起休息？"
10030-CVGroup_Tactic_In_1-1 = "開始吧。"
10030-CVGroup_Tactic_In_2-1 = "無須擔心，有我在。"
10030-CVGroup_Tactic_Victory_1-1 = "這是認真準備的回報。"
10030-CVGroup_Tactic_Victory_2-1 = "這都多虧了老師的指揮，謝謝您。"

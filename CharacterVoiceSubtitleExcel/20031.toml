[translation]
20031-CVGroup_CommonSkill-1 = "Would you like some Hot Springs manju?"
20031-CVGroup_ExSkill_1-1 = "Now, Sensei. Let's have a toast."
20031-CVGroup_ExSkill_2-1 = "Cheers!"
20031-CVGroup_ExSkill_3-1 = "Na zdorovie!"
20031-CVGroup_ExSkill_Level_1-1 = "The Hot Springs Resort No. 227 specialty drink bar is officially open!"
20031-CVGroup_ExSkill_Level_2-1 = "Relax. It's not alcohol."
20031-CVGroup_ExSkill_Level_3-1 = "Here! Here! Take a glass."
20031-CVGroup_Formation_In_1-1 = "Oh my... I got caught."
20031-CVGroup_Formation_In_2-1 = "I can take a bottle of mors with me, right?"
20031-CVGroup_Growup_1-1 = "Ohh... That's some impressive fermentation—I mean, growth."
20031-CVGroup_Growup_2-1 = "Think I can use this to make drinks? Heehee! I'm just joking."
20031-CVGroup_Growup_3-1 = "It's important to work hard no matter where you are."
20031-CVGroup_Growup_4-1 = "Thank you for always helping me, Sensei."
20031-CVGroup_Relationship_Up_1-1 = "Sensei, do you want to talk...just the two of us?"
20031-CVGroup_Relationship_Up_2-1 = "...I'll leave the door open. Feel free to stop by if you're bored."
20031-CVGroup_Relationship_Up_3-1 = "...You have a kind expression, Sensei. I understand why everyone falls for you."
20031-CVGroup_Relationship_Up_4-1 = "Once I can start drinking... I want to share my first glass with you, Sensei."

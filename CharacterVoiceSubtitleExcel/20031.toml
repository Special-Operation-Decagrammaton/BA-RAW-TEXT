[translation]
20031-CVGroup_CommonSkill-1 = "要不要來點溫泉饅頭？"
20031-CVGroup_ExSkill_1-1 = "來，老師。舉杯慶祝今天吧。"
20031-CVGroup_ExSkill_2-1 = "乾杯～！"
20031-CVGroup_ExSkill_3-1 = "祝你健康（на здоро́вье）！"
20031-CVGroup_ExSkill_Level_1-1 = "227號溫泉浴場的特設飲料吧，開始營業囉。"
20031-CVGroup_ExSkill_Level_2-1 = "這不是酒，所以大家放心喝吧。"
20031-CVGroup_ExSkill_Level_3-1 = "來來來，請喝一杯。"
20031-CVGroup_Formation_In_1-1 = "哎呀……被發現了啊。"
20031-CVGroup_Formation_In_2-1 = "帶一瓶漿果汁應該沒關係吧？"
20031-CVGroup_Growup_1-1 = "哦～這真是印象深刻的發酵……更正，是成長呢。"
20031-CVGroup_Growup_2-1 = "這也能用來做飲料嗎？\n……呵呵，就說是開玩笑的嘛。"
20031-CVGroup_Growup_3-1 = "無論身在何處，不懈努力都是很重要的哦。"
20031-CVGroup_Growup_4-1 = "謝謝你總是幫助我，老師。"
20031-CVGroup_Relationship_Up_1-1 = "老師，要不要稍～微去那邊聊聊天？"
20031-CVGroup_Relationship_Up_2-1 = "……我會把門開著的。\n有空的話可以來玩哦？"
20031-CVGroup_Relationship_Up_3-1 = "老師，你的表情真不錯。\n為何大家都會著迷，我好像能明白了。"
20031-CVGroup_Relationship_Up_4-1 = "等某天真的能喝酒的時候……\n真希望最初的一杯能跟老師一起呢。"

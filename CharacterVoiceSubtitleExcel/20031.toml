[translation]
20031-CVGroup_CommonSkill-1 = "온천 만쥬, 하나 먹을래?"
20031-CVGroup_ExSkill_1-1 = "자, 선생님., 오늘의 축배를 들자."
20031-CVGroup_ExSkill_2-1 = "건배~!"
20031-CVGroup_ExSkill_3-1 = "나 즈드로비에!"
20031-CVGroup_ExSkill_Level_1-1 = "227호 온천장 특설 드링크바, 영업 시작이야."
20031-CVGroup_ExSkill_Level_2-1 = "술은 아니니까, 다들 안심하고 마시라구."
20031-CVGroup_ExSkill_Level_3-1 = "자, 자. 한 잔 받으라고."
20031-CVGroup_Formation_In_1-1 = "이런…… 들켜버렸네."
20031-CVGroup_Formation_In_2-1 = "모르스 한 병 정도는 챙겨가도 괜찮겠지?"
20031-CVGroup_Growup_1-1 = "오오…… 인상적인 발효, 아니 성장인걸."
20031-CVGroup_Growup_2-1 = "이것도 음료를 만드는 데 쓸 수 있으려나? ……후후, 농담이야."
20031-CVGroup_Growup_3-1 = "어디서나 꾸준히 노력하는 건 중요한 법이지."
20031-CVGroup_Growup_4-1 = "언제나 도와줘서 고마워, 선생님."
20031-CVGroup_Relationship_Up_1-1 = "선생님, 잠깐 저쪽에서 단둘이 수다떨지 않을래?"
20031-CVGroup_Relationship_Up_2-1 = "……이따가 방문을 살짝 열어둘게. 심심하면 찾아와도 괜찮아."
20031-CVGroup_Relationship_Up_3-1 = "……선생님의 표정은 좋네. 어째서 다들 빠져드는 지 알 것만 같아."
20031-CVGroup_Relationship_Up_4-1 = "나중에 정식으로 술을 마실 수 있게 된다면……\n첫 잔은 선생님과 함께하고 싶네."

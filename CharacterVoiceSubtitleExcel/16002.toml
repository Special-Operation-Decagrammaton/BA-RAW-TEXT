[translation]
16002-CVGroup_Battle_Buffed_1-1 = "ขอบคุณสำหรับการสนับสนุนค่ะ!"
16002-CVGroup_Battle_Defense_1-1 = "ฮุฮุ ไม่มีประโยชน์หรอกค่ะ!"
16002-CVGroup_Battle_In_1-1 = "แค่ทำตามที่อธิบาย ก็ชนะอย่างแน่นอนค่ะ!"
16002-CVGroup_Battle_In_2-1 = "เราโจมตีให้เข้าเป้า! ศัตรูโจมตีมาต้องหลบ!\nทำแบบนั้นก็จะชนะค่ะ!"
16002-CVGroup_Battle_Move_1-1 = "ฮุฮุ ตอนนี้ที่นี่ปลอดภัยแล้วค่ะ!"
16002-CVGroup_Battle_Move_2-1 = "ก้าวไปข้างหน้ากันต่อค่ะ ไปข้างหน้า!"
16002-CVGroup_Battle_Recovery_1-1 = "โอ๊สสส!! จากนี้ฉันจะอธิบายเกี่ยวกับคุณค่าของการสนับสนุนนี้ค่ะ!"
16002-CVGroup_Battle_TacticalAction_1-1 = "ไปละค่ะ!"
16002-CVGroup_Battle_Victory_1-1 = "อ๊ะ! ร้อนจัง!\nปะ... เป็นการต่อสู้สั้นๆ ที่วุ่นวายไปหน่อยมั้ยคะ~"
16002-CVGroup_Battle_Victory_2-1 = "อ๊ะ! ตกใจหมดเลย!\nอ๋อ เครื่องเปิดอยู่นี่เอง...! ฮิฮิ~♡"
16002-CVGroup_CommonSkill-1 = "อันนี้จะเจ็บหน่อยนะคะ!"
16002-CVGroup_ExSkill_1-1 = "ฉันจะแสดงฝีมือของฉันให้ดูค่ะ!"
16002-CVGroup_ExSkill_2-1 = "เริ่มการบรรยายกันค่ะ!"
16002-CVGroup_ExSkill_3-1 = "การอธิบายทรงพลังกว่าคำพูดค่ะ!"
16002-CVGroup_ExSkill_Level_1-1 = "โอเวอร์คล็อก ไฟเออร์!!"
16002-CVGroup_ExSkill_Level_2-1 = "เปิดไฟเต็มกำลัง!"
16002-CVGroup_ExSkill_Level_3-1 = "ฉันจะเปิดทางให้ค่ะ!"
16002-CVGroup_Formation_In_1-1 = "ถึงตาฉันออกโรงแล้วสินะคะ!"
16002-CVGroup_Formation_In_2-1 = "จะจัดหนักจัดเต็มให้เลย!\nตั้งตารอได้เลยค่ะ!"
16002-CVGroup_Formation_Select-1 = "แม้การต่อสู้จริง ฉันจะไม่มั่นใจนิดหน่อย~ ก็เถอะ!\nแหะๆๆๆ!"
16002-CVGroup_Growup_1-1 = "ทำไมกันนะ... รู้สึกเหมือนได้อัปเกรดตรรกะมากกว่าปืนอีก..."
16002-CVGroup_Growup_2-1 = "ฉันอยากมีความสามารถที่แน่นอนมากกว่าตรรกะหรือเรื่องเล่าที่ยืดยาวค่ะ"
16002-CVGroup_Growup_3-1 = "ฉันไม่อยากเป็นคนที่เก่งแต่เรื่องการพูดค่ะ\nถ้าอยู่กับคุณครู คงเป็นไปได้ใช่มั้ยคะ?"
16002-CVGroup_Growup_4-1 = "ฉันจะเป็นประโยชน์กับคนที่เป็นทุกข์จากความไม่รู้ค่ะ!"
16002-CVGroup_Relationship_Up_1-1 = "ยิ่งฉันอธิบายมากเท่าไร ก็เหมือนจะเข้าใจโลกได้ง่ายขึ้นน่ะค่ะ"
16002-CVGroup_Relationship_Up_2-1 = "ฉันตื่นเต้นทุกครั้งที่ได้ความรู้ใหม่ค่ะ\nแล้วก็... ถ้าได้อยู่กับคุณครูละก็\nฉันจะได้รู้จักอารมณ์ใหม่ๆ ค่ะ"
16002-CVGroup_Relationship_Up_3-1 = "ฉันเองก็อยากเป็นครูในสักวันค่ะ\nไม่ใช่เพราะอยากเปิดสอนคลาสของฉัน\nแต่เพราะฉันอยากฟังคำของนักเรียนน่ะค่ะ"
16002-CVGroup_Relationship_Up_4-1 = "ฉันน่าจะอธิบายได้ทุกอย่างเลยนะ\nแต่ความรู้สึกของฉันน่ะ... แหะๆ\nขอโทษค่ะ เรื่องนั้นฉันอธิบายง่ายๆ ไม่ได้ค่ะ"
16002-CVGroup_Tactic_In_1-1 = "มีศัตรูค่ะ!\nอ่า... เห็นแล้วงั้นเหรอคะ?"
16002-CVGroup_Tactic_In_2-1 = "ถ้าจัดการศัตรูได้ ก็จะชนะค่ะ!\nอ่า... มันก็แน่อยู่แล้วงั้นเหรอคะ?"
16002-CVGroup_Tactic_Victory_1-1 = "เราชนะแล้วสินะคะ!"
16002-CVGroup_Tactic_Victory_2-1 = "ฉันคาดการณ์ผิดค่ะ\nเราเก่งกันมากเลยค่ะ!"

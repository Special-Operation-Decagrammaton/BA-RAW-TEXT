[translation]
16002-CVGroup_Battle_Buffed_1-1 = "感謝支援！"
16002-CVGroup_Battle_Defense_1-1 = "呵呵，沒用的！"
16002-CVGroup_Battle_In_1-1 = "只要能按照說明行動一定能贏的！"
16002-CVGroup_Battle_In_2-1 = "我們的攻擊命中！敵人的攻擊閃避！\n這樣就能勝利！"
16002-CVGroup_Battle_Move_1-1 = "呼，這裡已經安全了！"
16002-CVGroup_Battle_Move_2-1 = "繼續前進，前進！"
16002-CVGroup_Battle_Recovery_1-1 = "哦哦！關於這次支援的價值，我立刻開始說明！"
16002-CVGroup_Battle_TacticalAction_1-1 = "進行移動！"
16002-CVGroup_Battle_Victory_1-1 = "啊！好燙！\n稍，稍微戰鬥一下就太興奮了嗎～"
16002-CVGroup_Battle_Victory_2-1 = "哇！嚇我一跳！\n啊，原來是電源沒關啊……耶嘿♡"
16002-CVGroup_CommonSkill-1 = "這會痛的唷！"
16002-CVGroup_ExSkill_1-1 = "見識我的實力吧！"
16002-CVGroup_ExSkill_2-1 = "開始課程！"
16002-CVGroup_ExSkill_3-1 = "有個比言語更有說服力的說明。"
16002-CVGroup_ExSkill_Level_1-1 = "Overclock Fire～～！！"
16002-CVGroup_ExSkill_Level_2-1 = "火力，全開！"
16002-CVGroup_ExSkill_Level_3-1 = "我來開路！"
16002-CVGroup_Formation_In_1-1 = "輪到我登場了呢！"
16002-CVGroup_Formation_In_2-1 = "即將大顯身手！\n請好好期待哦！"
16002-CVGroup_Formation_Select-1 = "實戰稍～微有點沒自信就是了！耶嘿嘿嘿！"
16002-CVGroup_Growup_1-1 = "為什麼呢……\n有種比起槍枝，邏輯的力量強化了更多的感覺……"
16002-CVGroup_Growup_2-1 = "與空有長度的話和冗長的理論相比，我希望獲得更確實的實力。"
16002-CVGroup_Growup_3-1 = "我不想成為空有一張嘴的人。\n跟老師在一起就沒問題了對吧？"
16002-CVGroup_Growup_4-1 = "對於那些因無法理解的苦痛而受苦的人們而言，\n我應該能幫上忙才對！"
16002-CVGroup_Relationship_Up_1-1 = "說明做得越多，世界就變得越容易理解。"
16002-CVGroup_Relationship_Up_2-1 = "每次獲得某種新的知識，都會讓我感到興奮不已。\n至於……跟老師在一起，則是能發現新的感情。"
16002-CVGroup_Relationship_Up_3-1 = "我有朝一日也想成為老師。\n並非為了開設我的課程，\n而是希望能像老師一樣傾聽學生們的話。"
16002-CVGroup_Relationship_Up_4-1 = "明明所有事情都能說明才對，但我的心卻……嘿嘿。\n對不起，我無法簡單地說明。"
16002-CVGroup_Tactic_In_1-1 = "有敵人唷！\n……啊，看見了嗎？"
16002-CVGroup_Tactic_In_2-1 = "打倒敵人就能獲勝！\n……啊，這是當然的事嗎？"
16002-CVGroup_Tactic_Victory_1-1 = "是我們的勝利呢！"
16002-CVGroup_Tactic_Victory_2-1 = "預測失準了。\n我們太強了！"

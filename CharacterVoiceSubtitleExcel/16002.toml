[translation]
16002-CVGroup_Battle_Buffed_1-1 = "지원 감사합니다!"
16002-CVGroup_Battle_Defense_1-1 = "후훗, 소용 없습니다!"
16002-CVGroup_Battle_In_1-1 = "설명한대로만 행동하면 반드시 이깁니다!"
16002-CVGroup_Battle_In_2-1 = "우리 공격은 적중! 적의 공격은 회피! 그럼 승리할 거예요!"
16002-CVGroup_Battle_Move_1-1 = "후우, 이곳은 이제 안전합니다!"
16002-CVGroup_Battle_Move_2-1 = "계속해서 전진입니다, 전진!"
16002-CVGroup_Battle_Recovery_1-1 = "오옷! 이 지원의 가치에 대해 지금부터 설명하겠습니다!"
16002-CVGroup_Battle_TacticalAction_1-1 = "이동합니다!"
16002-CVGroup_Battle_Victory_1-1 = "앗! 뜨거! 자, 잠깐의 전투치고는 너무 소란스러웠으려나요~"
16002-CVGroup_Battle_Victory_2-1 = "왓! 깜짝이야! 아, 전원이 켜진 채로 있었구나……! 데헷~♡"
16002-CVGroup_CommonSkill-1 = "이건 아플 거예요!"
16002-CVGroup_ExSkill_1-1 = "제 실력을 보여드리죠!"
16002-CVGroup_ExSkill_2-1 = "강의를 시작합니다!"
16002-CVGroup_ExSkill_3-1 = "말보다 강력한 설명이 있죠."
16002-CVGroup_ExSkill_Level_1-1 = "오버쿨럭 파이어어어!!"
16002-CVGroup_ExSkill_Level_2-1 = "화력 풀 가동!"
16002-CVGroup_ExSkill_Level_3-1 = "길을 열겠습니다!"
16002-CVGroup_Formation_In_1-1 = "제가 나설 차례로군요!"
16002-CVGroup_Formation_In_2-1 = "대활약 예정! 기대해 주세요!"
16002-CVGroup_Formation_Select-1 = "실전은 쪼오끔~ 자신 없지만! 에헤헤헤!"
16002-CVGroup_Growup_1-1 = "어째서일까……. 총보다 논리력이 더 강화된 기분이……."
16002-CVGroup_Growup_2-1 = "그저 긴 이야기나 장황한 논리보다 더 확실한 실력을 갖고 싶어요."
16002-CVGroup_Growup_3-1 = "말만 그럴싸한 사람이 되고 싶지 않아요. 선생님과 함께라면, 가능하겠죠?"
16002-CVGroup_Growup_4-1 = "모른다는 고통에 처한 이들에게 제가 도움이 될 거예요!"
16002-CVGroup_Relationship_Up_1-1 = "설명을 하면 할수록 세상이 좀 더 이해하기 쉬워지니까요."
16002-CVGroup_Relationship_Up_2-1 = "무언가 새로운 지식을 얻을 때마다 두근거려요.\n그리고……. 선생님과 있으면 \n새로운 감정을 알아가게 되죠."
16002-CVGroup_Relationship_Up_3-1 = "저도 언젠가 선생님이 되고 싶어요.\n제 강의를 펼치기 위해서가 아니라\n선생님처럼, 학생들의 말을 들어주고 싶어요."
16002-CVGroup_Relationship_Up_4-1 = "모든 것을 설명할 수 있을 텐데.\n저의 마음은……. 헤헤.\n죄송해요. 간단히 설명할 수 없어요."
16002-CVGroup_Tactic_In_1-1 = "적들이 있습니다! ……아, 보인다고요?"
16002-CVGroup_Tactic_In_2-1 = "적들을 물리치면 승리입니다! ……아, 당연한가요?"
16002-CVGroup_Tactic_Victory_1-1 = "우리의 승리로군요!"
16002-CVGroup_Tactic_Victory_2-1 = "예측이 빗나갔어요. 우린 너무 강합니다!"

[translation]
16002-CVGroup_Battle_Buffed_1-1 = "Thank you for the assist!"
16002-CVGroup_Battle_Defense_1-1 = "Heehee, it's no use!"
16002-CVGroup_Battle_In_1-1 = "Just act as you've been told, and we'll definitely win!"
16002-CVGroup_Battle_In_2-1 = "Shoot straight! Avoid their attacks! Then we'll emerge victorious!"
16002-CVGroup_Battle_Move_1-1 = "Phew, this place is safe now!"
16002-CVGroup_Battle_Move_2-1 = "Keep moving forward, forward!"
16002-CVGroup_Battle_Recovery_1-1 = "Ooh! Let me explain what this means to me, starting now!"
16002-CVGroup_Battle_TacticalAction_1-1 = "Moving!"
16002-CVGroup_Battle_Victory_1-1 = "Ah! Hot! I-I wonder if that was too much of a fuss over such a short battle."
16002-CVGroup_Battle_Victory_2-1 = "Whoa! What the...! Ah, the power was on...! Teehee! ♡"
16002-CVGroup_CommonSkill-1 = "This will hurt!"
16002-CVGroup_ExSkill_1-1 = "I'll show you my skills!"
16002-CVGroup_ExSkill_2-1 = "Starting the lecture!"
16002-CVGroup_ExSkill_3-1 = "Actions speak louder than words."
16002-CVGroup_ExSkill_Level_1-1 = "Overclock Fiiire!!"
16002-CVGroup_ExSkill_Level_2-1 = "Full firepower!"
16002-CVGroup_ExSkill_Level_3-1 = "I'll clear a path!"
16002-CVGroup_Formation_In_1-1 = "It's my turn to shine!"
16002-CVGroup_Formation_In_2-1 = "I'm about to make a big impression! Look forward to it!"
16002-CVGroup_Formation_Select-1 = "I'm a bit unsure about real combat, though! Ehehehe!"
16002-CVGroup_Growup_1-1 = "For some reason...it feels like my logic has become stronger rather than my gun..."
16002-CVGroup_Growup_2-1 = "I want to be about more than long stories and stretched-out logic. I want solid skills."
16002-CVGroup_Growup_3-1 = "I want there to be more to me than words. Can you help with that, Sensei?"
16002-CVGroup_Growup_4-1 = "I'm going to help who suffer from the pain of ignorance!"
16002-CVGroup_Relationship_Up_1-1 = "The more I explain, the more understandable the world becomes."
16002-CVGroup_Relationship_Up_2-1 = "My heart starts to pound whenever I learn something new. And...when I'm with Sensei, I get to learn about new feelings."
16002-CVGroup_Relationship_Up_3-1 = "One day, I want to be like just Sensei. Not to hold my own lectures, but to be able to listen to students like Sensei does."
16002-CVGroup_Relationship_Up_4-1 = "I should be able to explain everything. But my feelings... Heehee... Those I can't explain too well."
16002-CVGroup_Tactic_In_1-1 = "Enemies! ...Ah, you see them too?"
16002-CVGroup_Tactic_In_2-1 = "If we defeat the enemies, we'll be victorious! ...Although that's kind of obvious."
16002-CVGroup_Tactic_Victory_1-1 = "It's our victory!"
16002-CVGroup_Tactic_Victory_2-1 = "My estimate was off. We're way stronger than I thought!"

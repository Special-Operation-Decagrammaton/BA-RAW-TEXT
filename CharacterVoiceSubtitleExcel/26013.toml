[translation]
26013-CVGroup_CommonSkill-1 = "呵呵，真香。"
26013-CVGroup_ExSkill_1-1 = "老師，笑一個。"
26013-CVGroup_ExSkill_2-1 = "我來幫你拍照。"
26013-CVGroup_ExSkill_3-1 = "讓我拍張照吧。"
26013-CVGroup_ExSkill_Level_1-1 = "這裡，感覺能拍出好照片。"
26013-CVGroup_ExSkill_Level_2-1 = "……來，Cheese～"
26013-CVGroup_ExSkill_Level_3-1 = "好，要拍囉。"
26013-CVGroup_Formation_In_1-1 = "很高興你願意叫我來。"
26013-CVGroup_Formation_In_2-1 = "確認完畢。"
26013-CVGroup_Growup_1-1 = "要給我嗎……？\n我會珍惜的。"
26013-CVGroup_Growup_2-1 = "持續學習，真讓人開心呢。"
26013-CVGroup_Growup_3-1 = "居然這麼……\n難道我，正受到期待嗎……？"
26013-CVGroup_Growup_4-1 = "謝謝你，老師。\n謝謝你總是讓我看到新的景色。"
26013-CVGroup_Relationship_Up_1-1 = "我會待在老師身邊哦。\n……不知為何就想這麼做。"
26013-CVGroup_Relationship_Up_2-1 = "我總是一味從老師手中獲得好處。\n明明我也想為你做很多事的……"
26013-CVGroup_Relationship_Up_3-1 = "呵呵，謝謝你。\n作為紀念，我會拍下來的。"
26013-CVGroup_Relationship_Up_4-1 = "啊，這種時候……要好好表達謝意對吧。\n是，我才應該請你多多指教。"

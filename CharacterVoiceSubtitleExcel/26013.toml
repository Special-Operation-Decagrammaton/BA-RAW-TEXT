[translation]
26013-CVGroup_CommonSkill-1 = "ฮุฮุ กลิ่นหอมจัง"
26013-CVGroup_ExSkill_1-1 = "คุณครู ยิ้มหน่อยสิ"
26013-CVGroup_ExSkill_2-1 = "ฉันจะถ่ายรูปให้"
26013-CVGroup_ExSkill_3-1 = "ขอให้ฉันถ่ายสักรูปนะ"
26013-CVGroup_ExSkill_Level_1-1 = "ตรงนี้น่าจะถ่ายรูปออกมาสวยนะ"
26013-CVGroup_ExSkill_Level_2-1 = "เอาละนะ ชีส"
26013-CVGroup_ExSkill_Level_3-1 = "งั้นฉันจะถ่ายรูปละนะ"
26013-CVGroup_Formation_In_1-1 = "ฉันดีใจที่คุณครูเรียกมาค่ะ"
26013-CVGroup_Formation_In_2-1 = "ยืนยันเรียบร้อย"
26013-CVGroup_Growup_1-1 = "ให้ฉันเหรอ...?\nฉันจะรักษาอย่างดีเลย"
26013-CVGroup_Growup_2-1 = "การได้ทำความรู้จักเป็นเรื่องสนุกแฮะ"
26013-CVGroup_Growup_3-1 = "ให้ขนาดนี้เลย...\nหรือว่าฉัน... กำลังถูกคาดหวังอยู่นะ...?"
26013-CVGroup_Growup_4-1 = "ขอบคุณที่ให้ฉันได้เห็นทิวทัศน์ใหม่ๆ\nอยู่เสมอเลยนะคุณครู"
26013-CVGroup_Relationship_Up_1-1 = "ฉันจะอยู่ข้างๆ คุณครูเอง\nก็ไม่รู้ว่าทำไมนะ... แต่ฉันอยากทำแบบนั้น"
26013-CVGroup_Relationship_Up_2-1 = "ฉันได้รับอะไรจากคุณครูอยู่ตลอดเลย\nฉันเองก็อยากทำนู่นนี่ให้บ้างจัง..."
26013-CVGroup_Relationship_Up_3-1 = "ฮุฮุ ขอบคุณนะ\nฉันจะถ่ายรูปไว้เป็นที่ระลึกนะ"
26013-CVGroup_Relationship_Up_4-1 = "อ๊ะ เวลาแบบนี้... ต้องกล่าวคำขอบคุณอย่างถูกต้องสิ\nค่ะ ฉันเองก็ขอฝากตัวด้วยนะคะ"

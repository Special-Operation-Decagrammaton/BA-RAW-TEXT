[translation]
20039-CVGroup_CommonSkill-1 = "稍作休息再走便是。"
20039-CVGroup_ExSkill_1-1 = "這樣就完成了才是……"
20039-CVGroup_ExSkill_2-1 = "是否該到此為止……？"
20039-CVGroup_ExSkill_3-1 = "儘管想再稍加觀望……"
20039-CVGroup_ExSkill_Level_1-1 = "來，試試看吧。"
20039-CVGroup_ExSkill_Level_2-1 = "後續就麻煩了。"
20039-CVGroup_ExSkill_Level_3-1 = "輪到汝的時間了。"
20039-CVGroup_Formation_In_1-1 = "就由欠妾身來證明汝的選擇是正確的吧。"
20039-CVGroup_Formation_In_2-1 = "一同前行吧，老師。"
20039-CVGroup_Growup_1-1 = "成長……是嗎？\n呵呵。心情還不錯。"
20039-CVGroup_Growup_2-1 = "至少妾身的……不，沒什麼。"
20039-CVGroup_Growup_3-1 = "可能性真是個好東西呢。能夠展現自身的將來。\n呵呵……一切，都是多虧了汝啊。"
20039-CVGroup_Growup_4-1 = "還能繼續，是嗎……？\n呼呣……既然汝這麼說，想必便是如此吧。"
20039-CVGroup_Relationship_Up_1-1 = "生就如同流逝而過的河水。\n以及，等待願意接受它的對象。\n沒有深遠的意義……卻也不代表毫無意義哦？"
20039-CVGroup_Relationship_Up_2-1 = "月光幾時存在，舉杯問天吧……呵呵。\n或許，老師始終身在該處也說不定啊。"
20039-CVGroup_Relationship_Up_3-1 = "空著的手，就由妾身緊握吧。\n空缺的心，就由妾身填滿吧。\n……因此，汝只需維持現狀便是。"
20039-CVGroup_Relationship_Up_4-1 = "一期一會……話雖如此，仍令人略感淒涼啊。\n……不過，妾身不會忘記老師。\n無論何事發生，直到永遠。"

[translation]
20039-CVGroup_CommonSkill-1 = "นอนพักสักหน่อยแล้วค่อยไปดีกว่า"
20039-CVGroup_ExSkill_1-1 = "เท่านี้ก็เสร็จแล้วละ..."
20039-CVGroup_ExSkill_2-1 = "ทำให้จบตรงนี้เลยดีกว่ามั้ย...?"
20039-CVGroup_ExSkill_3-1 = "เราอยากดูสถานการณ์ต่ออีกสักหน่อย..."
20039-CVGroup_ExSkill_Level_1-1 = "เอ้า มาลองดูกันเถอะ"
20039-CVGroup_ExSkill_Level_2-1 = "คราวหน้าก็ฝากด้วยล่ะ"
20039-CVGroup_ExSkill_Level_3-1 = "ถึงเวลาของคุณแล้ว"
20039-CVGroup_Formation_In_1-1 = "เราจะพิสูจน์ให้เห็นเองว่าคุณเลือกถูกแล้ว"
20039-CVGroup_Formation_In_2-1 = "ไปกันเถอะครู"
20039-CVGroup_Growup_1-1 = "การเติบโต... อย่างนั้นเหรอ\nฮุฮุ ก็ไม่ได้แย่เท่าไรนะ"
20039-CVGroup_Growup_2-1 = "อย่างน้อยเรา...\nเปล่า ไม่มีอะไรหรอก"
20039-CVGroup_Growup_3-1 = "ความเป็นไปได้เป็นสิ่งที่ดีนะ มันแสดงให้เห็นถึงอนาคตของเราไงล่ะ\nฮุฮุ... ทั้งหมดนี้ต้องขอบคุณคุณเลยนะ"
20039-CVGroup_Growup_4-1 = "ยังทำได้อีกงั้นเหรอ...?\nฮืม... ถ้าคุณพูดอย่างนั้นก็คงจะเป็นเช่นนั้น"
20039-CVGroup_Relationship_Up_1-1 = "ชีวิตคนเราก็เหมือนสายน้ำที่ไหลไป\nและหวังว่าจะมีใครสักคนที่จะยอมรับมันได้\nไม่มีความหมายลึกซึ้งอะไร... ทว่าก็ไม่ใช่สิ่งที่ไร้ความหมายหรอก"
20039-CVGroup_Relationship_Up_2-1 = "ดวงจันทร์ส่องสว่างตั้งแต่เมื่อไร ลองยกจอกขึ้นแล้วเอ่ยถามท้องฟ้าดูสิ ฮุฮุ...\nบางทีครูน่ะ อาจจะยังคงอยู่ที่นั่นเสมอมาก็ได้"
20039-CVGroup_Relationship_Up_3-1 = "หากมือของคุณยังว่างอยู่ เราจะคอยจับเอาไว้เอง\nหากภายในใจยังไม่มีใคร เราจะเติมเต็มที่ว่างนั้นเอง\nดังนั้นเราคิดว่าคุณ... เป็นอย่างที่เป็นอยู่ตอนนี้ดีแล้วละ"
20039-CVGroup_Relationship_Up_4-1 = "ว่ากันว่าสายสัมพันธ์นั้นเหมือนสายลมที่พัดผ่านไป\nฟังแล้วมันอาจดูเหงาสักหน่อยนะ\nแต่ว่านะครู... เราจะไม่มีวันลืมคุณอย่างแน่นอน\nไม่ว่าจะเกิดอะไรขึ้น และไม่ว่าเมื่อไรก็ตาม"

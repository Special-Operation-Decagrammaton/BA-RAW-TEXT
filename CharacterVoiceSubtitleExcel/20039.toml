[translation]
20039-CVGroup_CommonSkill-1 = "It's important to take breaks."
20039-CVGroup_ExSkill_1-1 = "And that's all, but..."
20039-CVGroup_ExSkill_2-1 = "Is ending it here the right thing to do?"
20039-CVGroup_ExSkill_3-1 = "I wanted to see what happens for a bit longer..."
20039-CVGroup_ExSkill_Level_1-1 = "Go ahead."
20039-CVGroup_ExSkill_Level_2-1 = "I'll leave the end to you."
20039-CVGroup_ExSkill_Level_3-1 = "It's your time."
20039-CVGroup_Formation_In_1-1 = "Let's prove that your choice was correct."
20039-CVGroup_Formation_In_2-1 = "Let's go forward together, Sensei."
20039-CVGroup_Growup_1-1 = "Is this...growth? Fufu. It feels all right."
20039-CVGroup_Growup_2-1 = "At least I... No, never mind."
20039-CVGroup_Growup_3-1 = "Potential is a wonderful thing. It paves the path to our future. Fufu... It's all thanks to you."
20039-CVGroup_Growup_4-1 = "I can still succeed...? Hm... If you say so, it must be true."
20039-CVGroup_Relationship_Up_1-1 = "Life is like a flowing river. It seeks someone to receive it. It doesn't mean anything too deep...but that doesn't mean it doesn't have meaning either."
20039-CVGroup_Relationship_Up_2-1 = "How long has the bright moon hung there? I raise this glass and ask the skies. Fufu... You may have always been there, Sensei."
20039-CVGroup_Relationship_Up_3-1 = "If your hands are empty, I shall grab it. If your heart is empty, I shall fill that spot. So you... You're fine the way you are right now."
20039-CVGroup_Relationship_Up_4-1 = "They say relationships are like the breeze that ruffles your sleeves. That sounds a bit lonely, but Sensei, I won't forget you. No matter what happens. Never."

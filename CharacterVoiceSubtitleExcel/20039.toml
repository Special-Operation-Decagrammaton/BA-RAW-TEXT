[translation]
20039-CVGroup_CommonSkill-1 = "잠시 쉬어 가는 것도 좋겠지."
20039-CVGroup_ExSkill_1-1 = "이것으로 완성, 이다만……"
20039-CVGroup_ExSkill_2-1 = "여기에서 종결짓는 것이 옳은 것인가……?"
20039-CVGroup_ExSkill_3-1 = "조금 더 상황을 지켜보고 싶었다만……"
20039-CVGroup_ExSkill_Level_1-1 = "자아, 해 보거라."
20039-CVGroup_ExSkill_Level_2-1 = "뒤는 맡기도록 하지."
20039-CVGroup_ExSkill_Level_3-1 = "그대의 시간이다."
20039-CVGroup_Formation_In_1-1 = "그대의 선택이 옳았음을, 증명하도록 하지."
20039-CVGroup_Formation_In_2-1 = "함께 나아가자꾸나, 선생."
20039-CVGroup_Formation_Select-1 = "뭘 보고만 있는가? 이리로 오게나, 선생."
20039-CVGroup_Growup_1-1 = "성장…… 이라는 것인가. 후후. 나쁘지 않은 기분이구나."
20039-CVGroup_Growup_2-1 = "적어도 나의…… 아니, 아무것도 아니다."
20039-CVGroup_Growup_3-1 = "가능성이란 좋은 것이다. 우리의 미래를 제시해 주지.\n후후… 다 그대 덕분이구나."
20039-CVGroup_Growup_4-1 = "아직 할 수 있다고……? 흠…… 그대가 그렇게 말한다면, 그런 것이겠지."
20039-CVGroup_Relationship_Up_1-1 = "삶이란 흘러가는 강물과 같은 것.\n그리고, 그것을 받아줄 상대를 바라는 것이지.\n깊은 의미는 없다…… 허나, 그렇다고 의미가 없는 것도 아니다만?"
20039-CVGroup_Relationship_Up_2-1 = "밝은 달은 언제부터 있었던가. 잔을 들고 하늘에 묻노라. 후후……\n어쩌면 선생은, 계속해서 그 자리에 있었던 것인지도 모르겠구나."
20039-CVGroup_Relationship_Up_3-1 = "그대의 손이 빈다면, 내가 잡아 주도록 하겠다.\n그대의 마음이 비었다면, 내가 그 자리를 채우도록 하겠다.\n그러니 그대는…… 지금 그대로도 좋다."
20039-CVGroup_Relationship_Up_4-1 = "인연이란 옷깃에 스치는 바람 같은 것이라지만.\n아무래도 그것은 조금 쓸쓸하게 들리는 말이기도 하지.\n그러나, 선생. 나는 그대를 잊지 않을 것이다.\n무슨 일이 일어나더라도, 언제까지든."

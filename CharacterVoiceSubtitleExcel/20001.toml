[translation]
20001-CVGroup_CommonSkill-1 = "不會打偏。"
20001-CVGroup_ExSkill_1-1 = "目標確認。"
20001-CVGroup_ExSkill_2-1 = "已捕捉目標。"
20001-CVGroup_ExSkill_3-1 = "交給我吧。"
20001-CVGroup_ExSkill_Level_1-1 = "我不會放過老師的敵人。"
20001-CVGroup_ExSkill_Level_2-1 = "任務，開始。"
20001-CVGroup_ExSkill_Level_3-1 = "一發就將其打飛。"
20001-CVGroup_Formation_In_1-1 = "後方支援就交給我吧。"
20001-CVGroup_Formation_In_2-1 = "狙擊的話，是我的專長。"
20001-CVGroup_Growup_1-1 = "謝謝老師。\n老師賜給我的這股力量，我會為了需要C&C幫助的人們使用。"
20001-CVGroup_Growup_2-1 = "這股力量……將為了老師！"
20001-CVGroup_Growup_3-1 = "無論什麼樣的委託都交給我吧。"
20001-CVGroup_Growup_4-1 = "訓練雖然辛苦，但果實是甜美的。"
20001-CVGroup_Relationship_Up_1-1 = "……真是少見的感受。\n這樣的心情……我還是第一次體會。"
20001-CVGroup_Relationship_Up_2-1 = "我擁有了想傳達的心意。\n而將其傳達出去，將成為我最重要的任務。"
20001-CVGroup_Relationship_Up_3-1 = "只因為老師待在身邊……心情就變得十分特別。\n這是為什麼呢？"
20001-CVGroup_Relationship_Up_4-1 = "我認為自己正在成長。\n作為一名學生、一名女僕……\n以及……沒，沒什麼。"

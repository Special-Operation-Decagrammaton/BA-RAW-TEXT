[translation]
20001-CVGroup_CommonSkill-1 = "I don't miss."
20001-CVGroup_ExSkill_1-1 = "Target confirmed."
20001-CVGroup_ExSkill_2-1 = "I see the target."
20001-CVGroup_ExSkill_3-1 = "Leave this to me."
20001-CVGroup_ExSkill_Level_1-1 = "I refuse to let any of Sensei's enemies escape."
20001-CVGroup_ExSkill_Level_2-1 = "Commencing mission."
20001-CVGroup_ExSkill_Level_3-1 = "One hit will send you flying."
20001-CVGroup_Formation_In_1-1 = "Leave rear support to me."
20001-CVGroup_Formation_In_2-1 = "Sniping is my specialty."
20001-CVGroup_Growup_1-1 = "Thank you, Sensei. I will use the power you gave me to aid those who need C&C."
20001-CVGroup_Growup_2-1 = "I will use this power for Sensei!"
20001-CVGroup_Growup_3-1 = "No matter the mission, I am capable."
20001-CVGroup_Growup_4-1 = "Training is grueling, but sweet are the fruits of labor."
20001-CVGroup_Relationship_Up_1-1 = "How odd it is... I have never...felt like this before."
20001-CVGroup_Relationship_Up_2-1 = "I find myself longing to share my feelings. Perhaps one day I will, when it carries the weight of an important mission."
20001-CVGroup_Relationship_Up_3-1 = "Sensei... Being around you makes me feel so special. I wonder why?"
20001-CVGroup_Relationship_Up_4-1 = "I believe I am improving...both as a student and a maid. Oh, but... N-never mind the other one."

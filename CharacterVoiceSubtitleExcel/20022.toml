[translation]
20022-CVGroup_CommonSkill-1 = "請小心！"
20022-CVGroup_ExSkill_1-1 = "那麼，出發吧。"
20022-CVGroup_ExSkill_2-1 = "這是我用心製作的！"
20022-CVGroup_ExSkill_3-1 = "要出發囉。"
20022-CVGroup_ExSkill_Level_1-1 = "這是供給部的特製御節料理！"
20022-CVGroup_ExSkill_Level_2-1 = "有滿滿的心意唷！"
20022-CVGroup_ExSkill_Level_3-1 = "想再來一份的話，還有很多唷！"
20022-CVGroup_Formation_In_1-1 = "我準備好了。"
20022-CVGroup_Formation_In_2-1 = "我會準備新年料理。"
20022-CVGroup_Growup_1-1 = "一直都非常謝謝你，老師。"
20022-CVGroup_Growup_2-1 = "要把這個給我……？\n真的可以收下嗎？"
20022-CVGroup_Growup_3-1 = "怎麼辦才好……我沒有任何可以回報的東西……\n咦？已經收到了……？"
20022-CVGroup_Growup_4-1 = "居然能獲得如此成長……\n這全部，都多虧了老師。非常感謝。"
20022-CVGroup_Relationship_Up_1-1 = "要是發生什麼事的話，請隨時跟我說哦。\n隨時，都可以唷……？"
20022-CVGroup_Relationship_Up_2-1 = "和老師一起度過的每一天，對我來說都是無可取代的時光。"
20022-CVGroup_Relationship_Up_3-1 = "老，老師？\n耶嘿嘿……我只是想叫叫看而已。"
20022-CVGroup_Relationship_Up_4-1 = "我有些話……想跟老師說。\n總有一天會說出口的，你願意等我嗎？"

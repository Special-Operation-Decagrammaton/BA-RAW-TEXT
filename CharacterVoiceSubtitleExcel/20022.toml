[translation]
20022-CVGroup_CommonSkill-1 = "ระวังนะคะ!"
20022-CVGroup_ExSkill_1-1 = "งั้นก็ไปกันเลยมั้ยคะ?"
20022-CVGroup_ExSkill_2-1 = "ฉันตั้งใจทำมาให้เลยค่ะ!"
20022-CVGroup_ExSkill_3-1 = "จะออกเดินทางละค่ะ"
20022-CVGroup_ExSkill_Level_1-1 = "โอเซจิสูตรพิเศษจากชมรมโภชนาการค่ะ!"
20022-CVGroup_ExSkill_Level_2-1 = "ใส่ความจริงใจไว้เต็มเปี่ยมเลยค่ะ!"
20022-CVGroup_ExSkill_Level_3-1 = "มีให้เติมอีกเยอะเลยค่ะ!"
20022-CVGroup_Formation_In_1-1 = "ฉันเตรียมพร้อมแล้วค่ะ"
20022-CVGroup_Formation_In_2-1 = "จะเตรียมอาหารวันปีใหม่ให้นะคะ"
20022-CVGroup_Growup_1-1 = "ขอบคุณเสมอๆ เลยค่ะ คุณครู"
20022-CVGroup_Growup_2-1 = "อันนี้ให้ฉัน...? ฉันรับไว้ได้เหรอคะ?"
20022-CVGroup_Growup_3-1 = "ทำยังไงดีคะ? ฉันไม่มีอะไรให้ตอบแทนนะ...\nคะ? ได้รับเพียงพอแล้วงั้นเหรอคะ...?"
20022-CVGroup_Growup_4-1 = "เติบโตได้ขนาดนี้เลยงั้นเหรอเนี่ย...\nทุกอย่างต้องขอบคุณคุณครูนะคะ ขอบคุณค่ะ"
20022-CVGroup_Relationship_Up_1-1 = "ถ้ามีเรื่องอะไรก็บอกฉันได้ตลอดเลยค่ะ\nตลอดเลย... นะคะ..."
20022-CVGroup_Relationship_Up_2-1 = "แต่ละวันที่ได้อยู่กับคุณครู...\nสำหรับฉันคือช่วงเวลาอันมีค่า ที่เอาอย่างอื่นมาแลกไม่ได้เลยค่ะ"
20022-CVGroup_Relationship_Up_3-1 = "คะ... คุณครู?\nแหะๆๆ... ฉันแค่อยากลองเรียกดูค่ะ"
20022-CVGroup_Relationship_Up_4-1 = "ฉันมี... คำที่อยากบอกคุณครูค่ะ\nไว้ฉันจะมาบอกนะคะ ช่วยรอได้มั้ยคะ?"

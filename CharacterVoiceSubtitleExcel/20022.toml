[translation]
20022-CVGroup_CommonSkill-1 = "조심하세요!"
20022-CVGroup_ExSkill_1-1 = "그러면 가 볼까요."
20022-CVGroup_ExSkill_2-1 = "정성껏 만들었답니다!"
20022-CVGroup_ExSkill_3-1 = "출발할게요."
20022-CVGroup_ExSkill_Level_1-1 = "급양부 특제 오세치에요!"
20022-CVGroup_ExSkill_Level_2-1 = "진심을 가득 담았어요!"
20022-CVGroup_ExSkill_Level_3-1 = "리필이라면, 많이 있어요!"
20022-CVGroup_Formation_In_1-1 = "저는 준비됐어요."
20022-CVGroup_Formation_In_2-1 = "설날 음식을 준비할게요."
20022-CVGroup_Growup_1-1 = "늘 감사드립니다. 선생님."
20022-CVGroup_Growup_2-1 = "이걸 저에게……? 받아도 되는 건가요?"
20022-CVGroup_Growup_3-1 = "어떡하죠? 전 보답해 드릴 게 없는데……\n네? 이미 충분히 받으셨다구요……?"
20022-CVGroup_Growup_4-1 = "이렇게 성장할 수 있다니……. 전부 선생님 덕분이에요. 감사합니다."
20022-CVGroup_Relationship_Up_1-1 = "무슨 일이 있으면, 언제든 말씀해 주세요. 언제든지, 랍니다……?"
20022-CVGroup_Relationship_Up_2-1 = "선생님과 함께 하는 나날들은……\n제게는 무엇과도 바꿀 수 없는 소중한 시간이에요."
20022-CVGroup_Relationship_Up_3-1 = "서, 선생님? 에헤헤…… 불러보고 싶었을 뿐이에요."
20022-CVGroup_Relationship_Up_4-1 = "선생님에게……. 전하고 싶은 말이 있어요.\n언젠가 전할 테니, 기다려 주시겠어요?"

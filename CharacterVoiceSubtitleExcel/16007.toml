[translation]
16007-CVGroup_Battle_Buffed_1-1 = "感謝支援。"
16007-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
16007-CVGroup_Battle_Defense_1-1 = "呵呵，真是驚險。"
16007-CVGroup_Battle_In_1-1 = "支援射擊的話請交給我吧！"
16007-CVGroup_Battle_In_2-1 = "無須害怕……突擊！"
16007-CVGroup_Battle_Move_1-1 = "移動到下一個地點吧？"
16007-CVGroup_Battle_Move_2-1 = "勝利就在眼前！"
16007-CVGroup_Battle_Recovery_1-1 = "哎呀，非常感謝。"
16007-CVGroup_Battle_TacticalAction_1-1 = "進行移動！"
16007-CVGroup_Battle_Victory_1-1 = "各位，是赤冬的勝利！"
16007-CVGroup_Battle_Victory_2-1 = "不愧是各位，我相信著大家！"
16007-CVGroup_CommonSkill-1 = "那邊那位！請專心！"
16007-CVGroup_ExSkill_1-1 = "我相信著……潔莉諾會長的勝利！"
16007-CVGroup_ExSkill_2-1 = "因潔莉諾會長而在，為潔莉諾會長奉獻！"
16007-CVGroup_ExSkill_3-1 = "赤冬聯邦學園……永垂不朽！"
16007-CVGroup_ExSkill_Level_1-1 = "各位，請把耳朵借給我！"
16007-CVGroup_ExSkill_Level_2-1 = "各位，勝利已近在眼前！"
16007-CVGroup_ExSkill_Level_3-1 = "我們的革命……必然會成功吧！"
16007-CVGroup_Formation_In_1-1 = "這也是為了潔莉諾會長……！"
16007-CVGroup_Formation_In_2-1 = "我會回應您的期待。"
16007-CVGroup_Formation_Select-1 = "哎呀？有什麼問題嗎……？"
16007-CVGroup_Growup_1-1 = "這股力量，我將為了革命慎重地使用。"
16007-CVGroup_Growup_2-1 = "為了潔莉諾會長，我會更加努力！"
16007-CVGroup_Growup_3-1 = "這樣就能將叛亂份子更有效率地進行壓制了呢！"
16007-CVGroup_Growup_4-1 = "多至稱之為深具革命性也不為過的支援，非常感謝！"
16007-CVGroup_Relationship_Up_1-1 = "老師，我信賴著您唷。"
16007-CVGroup_Relationship_Up_2-1 = "在老師面前，總覺得很難說謊呢……"
16007-CVGroup_Relationship_Up_3-1 = "呼……總覺得臉有點熱……\n今天還真熱呢。"
16007-CVGroup_Relationship_Up_4-1 = "每當看見老師，心裡的某處就會感到難受的這種心情，莫非……\n是革命的前兆嗎？"
16007-CVGroup_Tactic_In_1-1 = "似乎依然四處都有不對會長宣誓忠誠的叛亂份子呢。"
16007-CVGroup_Tactic_In_2-1 = "掃除得一乾二淨吧。"
16007-CVGroup_Tactic_Victory_1-1 = "呵呵，您是否正在看著呢，潔莉諾會長？"
16007-CVGroup_Tactic_Victory_2-1 = "赤冬前進的路上，不存在敗北！"

[translation]
16007-CVGroup_Battle_Buffed_1-1 = "지원에 감사드립니다."
16007-CVGroup_Battle_Covered_1-1 = "엄폐합니다."
16007-CVGroup_Battle_Defense_1-1 = "후후, 위험했네요."
16007-CVGroup_Battle_In_1-1 = "지원 사격은 제게 맡겨주세요!"
16007-CVGroup_Battle_In_2-1 = "두려워 할 것 없습니다…… 돌격!"
16007-CVGroup_Battle_Move_1-1 = "다음 구역으로 이동할까요?"
16007-CVGroup_Battle_Move_2-1 = "승리가 머지않았습니다!"
16007-CVGroup_Battle_Recovery_1-1 = "어머, 고마워요."
16007-CVGroup_Battle_TacticalAction_1-1 = "이동합니다!"
16007-CVGroup_Battle_Victory_1-1 = "여러분! 붉은겨울 학원의 승리입니다."
16007-CVGroup_Battle_Victory_2-1 = "역시, 여러분을 믿고 있었습니다!"
16007-CVGroup_CommonSkill-1 = "거기, 당신! 집중하세요!"
16007-CVGroup_ExSkill_1-1 = "저는 믿습니다…… 체리노 회장의 승리를!"
16007-CVGroup_ExSkill_2-1 = "체리노 회장의, 체리노 회장을 위한!"
16007-CVGroup_ExSkill_3-1 = "붉은겨울 연방학원이여…… 영원하라!"
16007-CVGroup_ExSkill_Level_1-1 = "모두 제 연설에 귀를 기울여 주세요!"
16007-CVGroup_ExSkill_Level_2-1 = "여러분, 승리가 눈 앞에 왔습니다!"
16007-CVGroup_ExSkill_Level_3-1 = "우리의 혁명은…… 반드시 성공할 것입니다!"
16007-CVGroup_Formation_In_1-1 = "이 또한 체리노 회장님을 위해서……!"
16007-CVGroup_Formation_In_2-1 = "기대에 부응해 보이겠습니다."
16007-CVGroup_Formation_Select-1 = "어머? 무슨 문제라도……?"
16007-CVGroup_Growup_1-1 = "이 힘은 혁명을 위하여 소중히 사용하겠습니다."
16007-CVGroup_Growup_2-1 = "체리노 회장님을 위해 더 노력할게요!"
16007-CVGroup_Growup_3-1 = "이것으로 불순한 반동 세력을 더 효율적으로 처리할 수 있겠군요!"
16007-CVGroup_Growup_4-1 = "혁명적이라고 해도 과언이 아닐 정도의 지원, 감사드립니다!"
16007-CVGroup_Relationship_Up_1-1 = "선생님, 당신을 신뢰하고 있답니다."
16007-CVGroup_Relationship_Up_2-1 = "선생님 앞에서는 어쩐지 거짓말을 하기가 어렵네요……"
16007-CVGroup_Relationship_Up_3-1 = "후우… 어쩐지 얼굴이 화끈거리는 게, 오늘은 날씨가 더운가 봐요."
16007-CVGroup_Relationship_Up_4-1 = "선생님을 볼 때마다 가슴 한 켠이 아려오는 이 감정은 혹시…\n혁명의 전조일까요?"
16007-CVGroup_Tactic_In_1-1 = "아직도 곳곳에 회장께 충성을 맹세하지 않은 불순분자들이 있는 것 같네요."
16007-CVGroup_Tactic_In_2-1 = "깨끗이 청소해보이겠습니다."
16007-CVGroup_Tactic_Victory_1-1 = "후후, 보고 계시지요. 체리노 회장님?"
16007-CVGroup_Tactic_Victory_2-1 = "붉은겨울이 가는 곳에 패배란 없습니다!"

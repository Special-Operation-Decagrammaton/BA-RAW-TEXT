[translation]
16007-CVGroup_Battle_Buffed_1-1 = "ขอบคุณที่สนับสนุนค่ะ"
16007-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวแล้วค่ะ"
16007-CVGroup_Battle_Defense_1-1 = "ฮุฮุ เมื่อกี้อันตรายเลยนะคะ"
16007-CVGroup_Battle_In_1-1 = "ฉันจะช่วยยิงสนับสนุนเองค่ะ!"
16007-CVGroup_Battle_In_2-1 = "ไม่มีอะไรต้องกลัวค่ะ... จู่โจมได้!"
16007-CVGroup_Battle_Move_1-1 = "ไปพื้นที่ต่อไปกันเลยมั้ยคะ?"
16007-CVGroup_Battle_Move_2-1 = "ชัยชนะอยู่ไม่ไกลค่ะ!"
16007-CVGroup_Battle_Recovery_1-1 = "อุ๊ย ขอบคุณค่ะ"
16007-CVGroup_Battle_TacticalAction_1-1 = "ไปละค่ะ!"
16007-CVGroup_Battle_Victory_1-1 = "ทุกคน! นี่คือชัยชนะของเรดวินเทอร์ค่ะ!"
16007-CVGroup_Battle_Victory_2-1 = "ฉันเชื่อมั่นในทุกคนค่ะ!"
16007-CVGroup_CommonSkill-1 = "นี่ คุณ! ตั้งใจหน่อยสิคะ!"
16007-CVGroup_ExSkill_1-1 = "ฉันเชื่อค่ะ... เชื่อในชัยชนะของประธานเชริโน่!"
16007-CVGroup_ExSkill_2-1 = "ของประธานเชริโน่ เพื่อประธานเชริโน่!"
16007-CVGroup_ExSkill_3-1 = "สถาบันสหภาพเรดวินเทอร์... จงเจริญ!"
16007-CVGroup_ExSkill_Level_1-1 = "ทุกคน จงตั้งใจฟังการปราศรัยของฉันค่ะ!"
16007-CVGroup_ExSkill_Level_2-1 = "ทุกคนคะ ชัยชนะอยู่ตรงหน้าแล้วค่ะ!"
16007-CVGroup_ExSkill_Level_3-1 = "การปฏิวัติของเรา... จะต้องสำเร็จอย่างแน่นอนค่ะ!"
16007-CVGroup_Formation_In_1-1 = "นี่ก็เพื่อท่านประธานเชริโน่...!"
16007-CVGroup_Formation_In_2-1 = "ฉันจะทำให้สมกับที่คาดหวังค่ะ"
16007-CVGroup_Formation_Select-1 = "อุ๊ย? มีปัญหาอะไรหรือเปล่าคะ...?"
16007-CVGroup_Growup_1-1 = "ฉันจะใช้อำนาจนี้อย่างมีความหมายเพื่อการปฏิวัติค่ะ"
16007-CVGroup_Growup_2-1 = "ฉันจะพยายามมากขึ้นเพื่อท่านประธานเชริโน่ค่ะ!"
16007-CVGroup_Growup_3-1 = "เท่านี้ฉันก็จะจัดการกองกำลังต่อต้านที่ไม่ซื่อสัตย์\nได้อย่างมีประสิทธิภาพมากขึ้นนะคะ!"
16007-CVGroup_Growup_4-1 = "ขอบคุณการสนับสนุนในเชิงปฏิวัตินะคะ!"
16007-CVGroup_Relationship_Up_1-1 = "คุณครู ฉันเชื่อใจคุณค่ะ"
16007-CVGroup_Relationship_Up_2-1 = "การโกหกต่อหน้าคุณครูเป็นเรื่องยากจังเลยนะคะ..."
16007-CVGroup_Relationship_Up_3-1 = "ฮู่ว... ที่ฉันหน้าร้อนผ่าวขึ้นมา\nคงเพราะวันนี้อากาศร้อนน่ะค่ะ"
16007-CVGroup_Relationship_Up_4-1 = "การเจ็บหัวใจเสี้ยวหนึ่งเมื่อเจอคุณครู หรือว่าจะเป็น...\nลางบอกเหตุของการปฏิวัติคะ?"
16007-CVGroup_Tactic_In_1-1 = "เหมือนจะมีคนน่าสงสัยที่ไม่สาบานว่าจะภักดี\nต่อท่านประธานอยู่ทั่วเลยค่ะ"
16007-CVGroup_Tactic_In_2-1 = "ฉันจะกวาดล้างให้สะอาดเอี่ยมเลยค่ะ"
16007-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ ดูฉันอยู่หรือเปล่าคะ? ท่านประธานเชริโน่?"
16007-CVGroup_Tactic_Victory_2-1 = "เรดวินเทอร์ไปที่ไหนก็ไม่มีวันแพ้ค่ะ!"

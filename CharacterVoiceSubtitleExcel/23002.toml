[translation]
23002-CVGroup_CommonSkill-1 = "아픈 거, 아픈 거, 날아가라~"
23002-CVGroup_ExSkill_1-1 = "와앗! 안 돼! 에잇, 잡았다!"
23002-CVGroup_ExSkill_2-1 = "와앗! 위험해! ……안심하세요!"
23002-CVGroup_ExSkill_3-1 = "아앗! 캐치! 이걸로 안전하네요!"
23002-CVGroup_ExSkill_Level_1-1 = "투약을 시작합니다! 조금…… 효과가 지나쳤을지도?"
23002-CVGroup_ExSkill_Level_2-1 = "치료를 시작합니다! 앗! 너무 많이 넣었다!"
23002-CVGroup_ExSkill_Level_3-1 = "이걸로 아픔이 사라질 거예요! ……아, 아마도?"
23002-CVGroup_Formation_In_1-1 = "치료라면 저에게 맡겨주세요!"
23002-CVGroup_Formation_In_2-1 = "제가 도울게요!"
23002-CVGroup_Formation_Select-1 = "이것 보세요! 말끔하게 치료됐죠?"
23002-CVGroup_Growup_1-1 = "언제나 기운이 넘치는 저지만 지금은 여느 때보다 훨씬 기운이 넘쳐요!"
23002-CVGroup_Growup_2-1 = "누구도 아프지 않았으면 좋겠어요! 저랑 선생님이 그렇게 만들어가요!"
23002-CVGroup_Growup_3-1 = "더 노력할거예요. 선생님을 위해.\n그리고 선배들에게 자랑스러운 후배가 되기 위해서!"
23002-CVGroup_Growup_4-1 = "실수하기도 하지만 주눅 들지 않을래요. 선생님이…… 도와주시니까요!"
23002-CVGroup_Relationship_Up_1-1 = "선생님 덕분에, 저는 행복해져요!"
23002-CVGroup_Relationship_Up_2-1 = "저도, 선생님께 받은 행복을. 남들에게 나눠줄 수 있도록 노력할게요!"
23002-CVGroup_Relationship_Up_3-1 = "아픔을 이기는 것은 치료가 아니라…….\n사랑이네요.\n선생님이 알려주신 거예요."
23002-CVGroup_Relationship_Up_4-1 = "에헤헤~ 선생님의 뺨~ 콕~♪"

[translation]
23002-CVGroup_CommonSkill-1 = "痛痛，痛痛，飛走吧～"
23002-CVGroup_ExSkill_1-1 = "哇哇！不行！\n嘿，抓到了！"
23002-CVGroup_ExSkill_2-1 = "啊！危險！\n……請放心！"
23002-CVGroup_ExSkill_3-1 = "啊啊！\nCatch！這樣就安全了！"
23002-CVGroup_ExSkill_Level_1-1 = "開始投藥！\n好像有點……太有效了?"
23002-CVGroup_ExSkill_Level_2-1 = "開始治療！\n啊！打太多了！"
23002-CVGroup_ExSkill_Level_3-1 = "這樣疼痛就會消失了才對！\n……應，應該吧？"
23002-CVGroup_Formation_In_1-1 = "治療的話請交給我吧！"
23002-CVGroup_Formation_In_2-1 = "我會幫忙的！"
23002-CVGroup_Formation_Select-1 = "請看！變得這麼有精神了唷！"
23002-CVGroup_Growup_1-1 = "雖然我平時就元氣滿滿，\n但今天比以往更充滿元氣！"
23002-CVGroup_Growup_2-1 = "要是不舒服的人，能一個都不剩就好了呢！\n就由我跟老師來實現吧！"
23002-CVGroup_Growup_3-1 = "我會更努力的。為了老師。\n同時，也為了成為能讓前輩們自豪的後輩！"
23002-CVGroup_Growup_4-1 = "雖然有犯過失誤，但我不會感到失落。\n因為老師……會幫助我的！"
23002-CVGroup_Relationship_Up_1-1 = "多虧了老師，我才能變得幸福。"
23002-CVGroup_Relationship_Up_2-1 = "我，也會努力讓自己能將從老師身上獲得的幸福分給其他人的！"
23002-CVGroup_Relationship_Up_3-1 = "能戰勝傷痛的並非治療……而是愛吧。\n這是老師教會我的。"
23002-CVGroup_Relationship_Up_4-1 = "耶嘿嘿～老師的臉頰～我戳♪"

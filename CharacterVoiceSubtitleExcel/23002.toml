[translation]
23002-CVGroup_CommonSkill-1 = "ความเจ็บ ความปวด จงหายไป~"
23002-CVGroup_ExSkill_1-1 = "อ๊าย! ไม่ได้นะ! นี่แหนะ จับได้แล้ว!"
23002-CVGroup_ExSkill_2-1 = "อ๊าย! อันตราย! วางใจได้เลยค่ะ...!"
23002-CVGroup_ExSkill_3-1 = "อ๊ะ! แคช! ทีนี้ก็ปลอดภัยแล้วค่ะ!"
23002-CVGroup_ExSkill_Level_1-1 = "เริ่มฉีดยาค่ะ! ผลลัพธ์... อาจจะแรงเกินไปหน่อยก็ได้นะคะ"
23002-CVGroup_ExSkill_Level_2-1 = "เริ่มการรักษาค่ะ! อ๊ะ! ใส่เยอะเกินไปแล้ว!"
23002-CVGroup_ExSkill_Level_3-1 = "สิ่งนี้จะทำให้ความเจ็บปวดหายไปค่ะ! อะ... อาจจะนะคะ?"
23002-CVGroup_Formation_In_1-1 = "เรื่องการรักษาให้เป็นหน้าที่ฉันได้เลยค่ะ"
23002-CVGroup_Formation_In_2-1 = "ฉันจะช่วยเองค่ะ!"
23002-CVGroup_Formation_Select-1 = "ดูสิคะ รักษาจนหายดีแล้วละค่ะ"
23002-CVGroup_Growup_1-1 = "ฉันมีพลังเปี่ยมล้นอยู่เสมอ\nแต่ตอนนี้ฉันมีพลังมากกว่าตอนไหนๆ เลยค่ะ!"
23002-CVGroup_Growup_2-1 = "หวังว่าจะไม่มีใครเจ็บป่วยเลยนะคะ!\nฉันกับคุณครูจะร่วมมือกันให้เป็นแบบนั้นค่ะ!"
23002-CVGroup_Growup_3-1 = "ฉันจะพยายามให้มากขึ้นเพื่อคุณครูค่ะ\nและเพื่อเป็นรุ่นน้องที่น่าภูมิใจของพวกรุ่นพี่ด้วยค่ะ!"
23002-CVGroup_Growup_4-1 = "ถึงจะทำผิดพลาดบ้าง แต่ฉันจะไม่เสียกำลังใจค่ะ\nเพราะคุณครู..... คอยช่วยฉันอยู่นี่คะ!"
23002-CVGroup_Relationship_Up_1-1 = "คุณครูช่วยให้ฉันมีความสุขขึ้นค่ะ!"
23002-CVGroup_Relationship_Up_2-1 = "ฉันเองก็จะพยายามเพื่อแบ่งปันความสุข\nที่ได้รับจากคุณครูให้คนอื่นค่ะ!"
23002-CVGroup_Relationship_Up_3-1 = "สิ่งที่ชนะความเจ็บปวดได้ไม่ใช่การรักษา... แต่เป็นความรักค่ะ\nคุณครูบอกฉันมาน่ะค่ะ"
23002-CVGroup_Relationship_Up_4-1 = "แหะๆๆ~ จิ้มแก้มคุณครู~ จึ้ก~♪"

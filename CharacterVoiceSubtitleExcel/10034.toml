[translation]
10034-CVGroup_Battle_Buffed_1-1 = "呵呵，非常感謝。"
10034-CVGroup_Battle_Covered_1-1 = "這裡似乎是安全的呢。"
10034-CVGroup_Battle_Defense_1-1 = "呼，幸好成功了！"
10034-CVGroup_Battle_In_1-1 = "僅限這次，就由我走在前面吧。"
10034-CVGroup_Battle_In_2-1 = "事前對危險進行排除，這也是一種內助之功。\n那麼，開始吧。"
10034-CVGroup_Battle_Move_1-1 = "大家，都還好嗎？\n好的，那麼繼續前進吧。"
10034-CVGroup_Battle_Move_2-1 = "沒問題，我還能戰鬥……！"
10034-CVGroup_Battle_Recovery_1-1 = "啊，非常感謝。"
10034-CVGroup_Battle_TacticalAction_1-1 = "移動囉。"
10034-CVGroup_Battle_Victory_1-1 = "覺得如何呢，老師？\n我剛才很努力。"
10034-CVGroup_Battle_Victory_2-1 = "呵呵，老師。\n 能請您誇誇我嗎？"
10034-CVGroup_CommonSkill-1 = "我有準備便當唷！"
10034-CVGroup_ExSkill_1-1 = "來吧大家，請過來集合～！"
10034-CVGroup_ExSkill_2-1 = "休息一下吧？"
10034-CVGroup_ExSkill_3-1 = "沒錯，我有準備珍藏的東西！"
10034-CVGroup_ExSkill_Level_1-1 = "呵呵，這樣就全員到齊了嗎？"
10034-CVGroup_ExSkill_Level_2-1 = "我做了很多準備唷。"
10034-CVGroup_ExSkill_Level_3-1 = "大家，請好好享用之後再加油哦？"
10034-CVGroup_Formation_In_1-1 = "我，是嗎……？\n是，如果是老師的要求，我很樂意。"
10034-CVGroup_Formation_In_2-1 = "是，要協助老師對吧。\n請包在我身上。"
10034-CVGroup_Formation_Select-1 = "呵呵，老師。\n有什麼我能為您做的嗎？"
10034-CVGroup_Growup_1-1 = "啊，原來如此……這種形式的修行也是存在的呢。"
10034-CVGroup_Growup_2-1 = "雖然我並不擅長爭鬥，但我也想為老師變得更強。"
10034-CVGroup_Growup_3-1 = "就連還很弱的我也……\n不，正因為現在還很弱，今後才必須變得更強對吧。"
10034-CVGroup_Growup_4-1 = "修行之道雖然依舊艱難……但我會繼續精進的。\n不只是為了我自己，也是為了老師。"
10034-CVGroup_Relationship_Up_1-1 = "我們的羈絆……變得越來越深厚了呢，老師。"
10034-CVGroup_Relationship_Up_2-1 = "這樣一來，就能更接近老師的身旁……\n啊，不，我什麼都沒說……！"
10034-CVGroup_Relationship_Up_3-1 = "這股從內心深處不斷沸騰的感情，我不知道該如何表現比較適當。\n不過，有件事我可以確定。\n……我，能待在老師身邊真是太好了。"
10034-CVGroup_Relationship_Up_4-1 = "既然對我的事如此重視……\n非常感謝您，老師。\n……能再稍微，像這樣與您牽著手嗎？"
10034-CVGroup_Tactic_In_1-1 = "修行的成果，在此向您展現。"
10034-CVGroup_Tactic_In_2-1 = "為了幫上老師的忙，我會全力以赴。"
10034-CVGroup_Tactic_Victory_1-1 = "能幫上老師的忙，真是太好了。"
10034-CVGroup_Tactic_Victory_2-1 = "我，是否有幫上您的忙呢？\n呵呵，那就太好了。"

[translation]
10034-CVGroup_Battle_Buffed_1-1 = "ฮุฮุ ขอบคุณค่ะ"
10034-CVGroup_Battle_Covered_1-1 = "ถ้าเป็นที่นี่ละก็ ปลอดภัยดีค่ะ"
10034-CVGroup_Battle_Defense_1-1 = "ฮู่ว ทำสำเร็จแล้วละค่ะ!"
10034-CVGroup_Battle_In_1-1 = "สำหรับตอนนี้ ฉันจะนำไปข้างหน้าก่อนเองค่ะ"
10034-CVGroup_Battle_In_2-1 = "การกำจัดความเสี่ยงที่จะเกิดขึ้นล่วงหน้าก็เป็นหน้าที่ของกุลสตรี\nถ้างั้นมาเริ่มกันเลยดีมั้ยคะ"
10034-CVGroup_Battle_Move_1-1 = "ทุกคนไม่เป็นไรใช่มั้ยคะ? ค่ะ ถ้างั้นไปกันต่อเลยนะคะ"
10034-CVGroup_Battle_Move_2-1 = "ไม่เป็นไรค่ะ ฉันยังสู้ไหวค่ะ...!"
10034-CVGroup_Battle_Recovery_1-1 = "อ๊ะ ขอบคุณค่ะ"
10034-CVGroup_Battle_TacticalAction_1-1 = "ไปต่อแล้วนะคะ"
10034-CVGroup_Battle_Victory_1-1 = "เป็นยังไงบ้างคะ คุณครู?\nฉันพยายามเต็มที่เลยนะคะ"
10034-CVGroup_Battle_Victory_2-1 = "ฮุฮุ คุณครู ช่วยชมฉันหน่อยได้รึเปล่าคะ?"
10034-CVGroup_CommonSkill-1 = "ฉันเตรียมอาหารกลางวันไว้แล้วค่ะ~!"
10034-CVGroup_ExSkill_1-1 = "เอาละ ทุกคนมารวมกันหน่อยสิคะ~"
10034-CVGroup_ExSkill_2-1 = "พักสักหน่อยมั้ยคะ?"
10034-CVGroup_ExSkill_3-1 = "จริงด้วย มีของที่ฉันเตรียมมาด้วยละค่ะ"
10034-CVGroup_ExSkill_Level_1-1 = "ฮุฮุ ทุกคนมารวมกันกันหมดแล้วใช่มั้ยคะ?"
10034-CVGroup_ExSkill_Level_2-1 = "ฉันเตรียมเอาไว้เยอะแยะเลยค่ะ"
10034-CVGroup_ExSkill_Level_3-1 = "ทานให้อร่อยแล้วเติมพลังกันเยอะๆ เลยนะคะ"
10034-CVGroup_Formation_In_1-1 = "ฉันเหรอคะ...?\nค่ะ ถ้าเป็นความต้องการของคุณครู ฉันก็ยินดีค่ะ"
10034-CVGroup_Formation_In_2-1 = "ค่ะ ฉันจะช่วยคุณครูเองค่ะ \nให้เป็นหน้าที่ฉันเองค่ะ"
10034-CVGroup_Formation_Select-1 = "ฮุฮุ คุณครู\nมีอะไรที่ฉันพอจะทำได้รึเปล่าคะ?"
10034-CVGroup_Growup_1-1 = "อ๊ะ หรือว่า... มีวิธีการฝึกแบบนี้ด้วยสินะคะ"
10034-CVGroup_Growup_2-1 = "ถึงฉันจะยังต่อสู้ไม่เก่ง แต่ฉันก็อยากแข็งแกร่งขึ้นเพื่อคุณครูค่ะ"
10034-CVGroup_Growup_3-1 = "ถึงฉันจะยังอ่อนแอ...ไม่สิ ตัวฉันในตอนนี้ยังอ่อนแออยู่\nดังนั้นฉันจึงสามารถแข็งแกร่งขึ้นได้ต่อไปค่ะ"
10034-CVGroup_Growup_4-1 = "ถึงเส้นทางแห่งการฝึกฝนยังอีกยาวไกลค่ะ...\nแต่ฉันก็จะตั้งใจให้มากขึ้นค่ะ เพื่อตัวฉันเอง และเพื่อคุณครูค่ะ"
10034-CVGroup_Relationship_Up_1-1 = "ความสัมพันธ์ของพวกเรา... มันลึกซึ้งขึ้นแล้วสินะคะ คุณครู"
10034-CVGroup_Relationship_Up_2-1 = "เพราะงั้นฉันจะอยู่ใกล้ๆ คุณครู...\nอ๊ะ เปล่านะคะ ไม่มีอะไรหรอกค่ะ..."
10034-CVGroup_Relationship_Up_3-1 = "ฉันไม่รู้ว่าจะแสดงความรู้สึกที่อัดแน่นอยู่ในใจออกมาได้ยังไงเลยค่ะ\nแต่มีแค่เรื่องนี้ที่ฉันจะพูดไปได้ ฉัน... รู้สึกโชคดีที่มีคุณครูอยู่เคียงข้างนะคะ"
10034-CVGroup_Relationship_Up_4-1 = "ไม่คิดเลยว่าคุณครูจะให้ความสำคัญฉันมากถึงขนาดนี้...\nขอบคุณค่ะ คุณครู ฉันขอ... จับมือคุณครูไปแบบนี้อีกสักหน่อยได้รึเปล่าคะ?"
10034-CVGroup_Tactic_In_1-1 = "ฉันจะแสดงผลของการฝึกฝนให้เห็นเองค่ะ"
10034-CVGroup_Tactic_In_2-1 = "ฉันจะพยายามสนับสนุนคุณครูอย่างเต็มที่ค่ะ"
10034-CVGroup_Tactic_Victory_1-1 = "ฉันดีใจที่ช่วยคุณครูได้นะคะ"
10034-CVGroup_Tactic_Victory_2-1 = "ฉันเป็นประโยชน์กับคุณครูรึเปล่าคะ?\nฮุฮุ ค่อยโล่งใจหน่อยนะคะ"

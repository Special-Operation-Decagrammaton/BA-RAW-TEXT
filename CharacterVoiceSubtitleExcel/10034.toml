[translation]
10034-CVGroup_Battle_Buffed_1-1 = "후후, 고마워요."
10034-CVGroup_Battle_Covered_1-1 = "여기라면 안전해요."
10034-CVGroup_Battle_Defense_1-1 = "후우, 어떻게든 됐네요!"
10034-CVGroup_Battle_In_1-1 = "지금만큼은, 제가 앞서서 걸어가겠습니다."
10034-CVGroup_Battle_In_2-1 = "사전에 위험을 제거하는 것 또한 내조의 공. 그럼, 시작해볼까요."
10034-CVGroup_Battle_Move_1-1 = "다들 괜찮나요? 네, 그럼 다음으로 가죠."
10034-CVGroup_Battle_Move_2-1 = "괜찮아요. 아직 싸울 수 있답니다……!"
10034-CVGroup_Battle_Recovery_1-1 = "앗, 고마워요."
10034-CVGroup_Battle_TacticalAction_1-1 = "이동할게요."
10034-CVGroup_Battle_Victory_1-1 = "어떠신가요. 선생님? 저, 노력했답니다."
10034-CVGroup_Battle_Victory_2-1 = "후후, 선생님. 칭찬해주시겠어요?"
10034-CVGroup_CommonSkill-1 = "도시락을 준비했어요~!"
10034-CVGroup_ExSkill_1-1 = "자아~ 모두 모여주세요~"
10034-CVGroup_ExSkill_2-1 = "휴식할까요?"
10034-CVGroup_ExSkill_3-1 = "맞다. 준비해온 게 있답니다."
10034-CVGroup_ExSkill_Level_1-1 = "후후, 이걸로 모두 모였나요?"
10034-CVGroup_ExSkill_Level_2-1 = "자안뜩, 준비했어요."
10034-CVGroup_ExSkill_Level_3-1 = "모두, 잘 먹고 힘내기예요?"
10034-CVGroup_Formation_In_1-1 = "저 말인가요…....? 네, 선생님이 원하신다면, 기꺼이."
10034-CVGroup_Formation_In_2-1 = "네, 선생님을 도울게요. 맡겨만 주세요."
10034-CVGroup_Formation_Select-1 = "후훗, 선생님. 뭔가 제가 할 수 있는 일이 있을까요?"
10034-CVGroup_Growup_1-1 = "앗, 과연……. 이런 식의 수행도 있는 거군요."
10034-CVGroup_Growup_2-1 = "싸우는 건 서툴지만, 선생님을 위해서라면 강해지고 싶어요."
10034-CVGroup_Growup_3-1 = "아직 약한 저라도…….\n아니, 지금은 아직 약하기 때문에, 앞으로 더욱 강해질 수 있는 거네요."
10034-CVGroup_Growup_4-1 = "수행의 길은 아직 험난합니다만……\n더욱 정진하겠습니다. 저 자신을 위해서도, 선생님을 위해서도."
10034-CVGroup_Relationship_Up_1-1 = "저희의 인연이……. 더욱 깊어져 가는군요. 선생님."
10034-CVGroup_Relationship_Up_2-1 = "이로써 보다 선생님 곁에……. 앗, 아뇨. 아무것도 아니에요……."
10034-CVGroup_Relationship_Up_3-1 = "이 가슴속에서 끓어오르는 감정을, 어찌 표현해야 할지 모르겠어요.\n다만 이것만큼은 말할 수 있어요.\n……저, 선생님 곁에 있어서 다행이에요."
10034-CVGroup_Relationship_Up_4-1 = "저를, 이렇게까지 소중히 여겨주실 줄이야…….\n감사합니다. 선생님. \n……조금만, 이렇게 손을 잡고 있어도 괜찮을까요?"
10034-CVGroup_Tactic_In_1-1 = "수행의 성과, 보여드릴게요."
10034-CVGroup_Tactic_In_2-1 = "선생님의 도움이 될 수 있도록, 최선을 다할게요."
10034-CVGroup_Tactic_Victory_1-1 = "선생님께 도움이 될 수 있어서, 다행이에요."
10034-CVGroup_Tactic_Victory_2-1 = "제가 도움이 되었을까요? 후훗, 그렇다면 다행이네요."

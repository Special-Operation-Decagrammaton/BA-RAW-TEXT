10127-CVGroup_Battle_Move_1-1 = "請，請等一下！"
10127-CVGroup_Battle_Move_2-1 = "還有嗎……？"
10127-CVGroup_Battle_Recovery_1-1 = "謝，謝謝……！"
10127-CVGroup_Battle_TacticalAction_1-1 = "嘿咻……！"
10127-CVGroup_Battle_Victory_1-1 = "呼……收拾完了呢。"
10127-CVGroup_Battle_Victory_2-1 = "大家，辛苦了。"
10127-CVGroup_CommonSkill-1 = "哇……！呵呵呵……"
10127-CVGroup_ExSkill_1-1 = "嗚嗚……我明明沒打算寫這種故事的……"
10127-CVGroup_ExSkill_2-1 = "這個……有點。"
10127-CVGroup_ExSkill_3-1 = "我再也不會寫了……"
10127-CVGroup_ExSkill_Level_1-1 = "看來不會搞砸了……"
10127-CVGroup_ExSkill_Level_2-1 = "這，這是初稿……！"
10127-CVGroup_ExSkill_Level_3-1 = "截稿期限……我有遵守哦。"
10127-CVGroup_Formation_In_1-1 = "非，非做不可對吧……？"
10127-CVGroup_Formation_In_2-1 = "吵，吵架是不好的……"
10127-CVGroup_Formation_Select-1 = "跟我兩個人是嗎？\n……可以唷。"
10127-CVGroup_Growup_1-1 = "是，是從哪裡弄來的……？"

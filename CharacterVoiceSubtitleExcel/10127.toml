10127-CVGroup_Relationship_Up_4-1 = "跟老師待在一起，感覺就像處在幸福的故事裡一樣。\n希望這個故事……能一直延續下去……"
10127-CVGroup_Tactic_In_1-1 = "好，好想回去寫稿……"
10127-CVGroup_Tactic_In_2-1 = "為，為什麼要做這種沒意義的事……"
10127-CVGroup_Tactic_Victory_1-1 = "……贏了。"
10127-CVGroup_Tactic_Victory_2-1 = "那個，跟作戰計畫……一樣呢……"

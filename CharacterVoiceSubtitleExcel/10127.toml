[translation]
10127-CVGroup_Battle_Buffed_1-1 = "我，我嗎……！？"
10127-CVGroup_Battle_Covered_1-1 = "已，已經不想動了……"
10127-CVGroup_Battle_Defense_1-1 = "沒，沒用的唷……！"
10127-CVGroup_Battle_In_1-1 = "不，不能和平地解決嗎……？"

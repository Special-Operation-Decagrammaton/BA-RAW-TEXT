[translation]
10127-CVGroup_Battle_Buffed_1-1 = "제, 제게 이렇게까지……!"
10127-CVGroup_Battle_Covered_1-1 = "여기에 계속 있고 싶어……."
10127-CVGroup_Battle_Defense_1-1 = "아, 안 통해요……."
10127-CVGroup_Battle_In_1-1 = "한 번만 다시 생각해 봐요……."
10127-CVGroup_Battle_In_2-1 = "이렇게 된 이상, 어쩔 수 없나요……."
10127-CVGroup_Battle_Move_1-1 = "가, 같이 가요!"
10127-CVGroup_Battle_Move_2-1 = "대체 얼마나 더 남았죠……?"
10127-CVGroup_Battle_Recovery_1-1 = "고, 고마워요……!"
10127-CVGroup_Battle_TacticalAction_1-1 = "흣차……!"
10127-CVGroup_Battle_Victory_1-1 = "이만하면 잘 끝났네요……."
10127-CVGroup_Battle_Victory_2-1 = "모두 고생하셨어요……."
10127-CVGroup_CommonSkill-1 = "헤에에에……! 헤헤……."
10127-CVGroup_ExSkill_1-1 = "이런 글을 쓰고 싶은 게 아니었는데……."
10127-CVGroup_ExSkill_2-1 = "이런 창작은 싫어요……."
10127-CVGroup_ExSkill_3-1 = "이번이 마지막이에요……."
10127-CVGroup_ExSkill_Level_1-1 = "어떻게든 완성했어요……."
10127-CVGroup_ExSkill_Level_2-1 = "원고, 나왔습니다……!"
10127-CVGroup_ExSkill_Level_3-1 = "마감일은 지켰어요……."
10127-CVGroup_Formation_In_1-1 = "이거, 꼭 해야 하나요……?"
10127-CVGroup_Formation_In_2-1 = "싸움은 현명한 수단이 아니에요……."
10127-CVGroup_Formation_Select-1 = "저와 둘이서요? ……예, 좋아요."
10127-CVGroup_Growup_1-1 = "이, 이런 건 대체 어디서……?"
10127-CVGroup_Growup_2-1 = "이거, 합법인 거죠……?"
10127-CVGroup_Growup_3-1 = "깔끔한 완결을 위해선, 때때로 뚝심과 힘이 필요하죠.\n감사합니다, 선생님."
10127-CVGroup_Growup_4-1 = "감사합니다, 선생님. 덕분에 저도…… 저를 좀 더 좋아할 수 있을 것 같아요."
10127-CVGroup_Relationship_Up_1-1 = "저에게 이렇게까지 안 해 주셔도 되는데……."
10127-CVGroup_Relationship_Up_2-1 = "저기 혹시…… 선생님의 이름, 제가 쓰는 소설 속에 등장시켜도 될까요?"
10127-CVGroup_Relationship_Up_3-1 = "저기, 그…… 보고 싶었어요, 선생님."
10127-CVGroup_Relationship_Up_4-1 = "선생님과 함께 있으면, 행복한 소설 속에 있는 것 같아요. \n……부디 완결 나지 않았으면 하는, 그런 소설이요."
10127-CVGroup_Tactic_In_1-1 = "저 그냥 글만 쓰면 안 될까요……?"
10127-CVGroup_Tactic_In_2-1 = "대체 왜 이런 무익한 싸움을……."
10127-CVGroup_Tactic_Victory_1-1 = "……이겨 버렸네요."
10127-CVGroup_Tactic_Victory_2-1 = "어…… 작전대로 되긴 했는데……."

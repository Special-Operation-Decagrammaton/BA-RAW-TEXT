[translation]
26000-CVGroup_CommonSkill-1 = "ชีพจรปกติ ไปต่อได้เลยค่ะ"
26000-CVGroup_ExSkill_1-1 = "เจ็บเหรอคะ? ถ้างั้นก็ต้องอันนี้"
26000-CVGroup_ExSkill_2-1 = "ถ้าต้องการความช่วยเหลือ... ก็ให้เป็นหน้าที่ของฉันได้เลยค่ะ"
26000-CVGroup_ExSkill_3-1 = "นี่ไม่ใช่ยา แต่คืออนาคตค่ะ"
26000-CVGroup_ExSkill_Level_1-1 = "จากนี้ไปขึ้นอยู่กับความตั้งใจของคุณแล้วละค่ะ"
26000-CVGroup_ExSkill_Level_2-1 = "อย่ายอมแพ้นะคะ"
26000-CVGroup_ExSkill_Level_3-1 = "ยาของฉันจะช่วยคุณค่ะ"
26000-CVGroup_Formation_In_1-1 = "เรื่องปฐมพยาบาลให้เป็นหน้าที่ฉันเองค่ะ"
26000-CVGroup_Formation_In_2-1 = "ถึงเวลาบุกแล้วสินะคะ"
26000-CVGroup_Growup_1-1 = "พัฒนาขึ้นแล้วค่ะ"
26000-CVGroup_Growup_2-1 = "ฉันจะตั้งใจทำอย่างเต็มที่ค่ะ "
26000-CVGroup_Growup_3-1 = "ต่อไปฉันน่าจะช่วยคุณครูได้มากกว่านี้ค่ะ"
26000-CVGroup_Growup_4-1 = "ฉันแข็งแกร่งขึ้นกว่าที่เห็นนะคะเนี่ย"
26000-CVGroup_Relationship_Up_1-1 = "เวลาอยู่กับคุณครู หัวใจของฉันก็เต้นผิดปกติค่ะ\nฉันเป็นฝ่ายแพทย์แท้ๆ... แย่แล้วนะคะเนี่ย"
26000-CVGroup_Relationship_Up_2-1 = "ฮุฮุ คุณครูนี่แปลกจังเลยนะคะ"
26000-CVGroup_Relationship_Up_3-1 = "เหมือนว่าหน้าจะร้อนเลยค่ะ\nแต่ก็ไม่น่าใช่หวัดนะ... แปลกจังเลยค่ะ"
26000-CVGroup_Relationship_Up_4-1 = "คุณครูเป็นคนที่งานยุ่งจริงๆ เลยนะคะ\nแต่ในจุดนั้น... ฉันก็ไม่ได้ไม่ชอบหรอกค่ะ"

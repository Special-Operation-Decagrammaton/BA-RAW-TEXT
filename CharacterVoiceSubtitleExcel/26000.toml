[translation]
26000-CVGroup_CommonSkill-1 = "바이탈 정상, 나아가세요."
26000-CVGroup_ExSkill_1-1 = "아프시다고요? 그렇다면 이것을."
26000-CVGroup_ExSkill_2-1 = "도움이 필요하다면…… 제게 맡기세요."
26000-CVGroup_ExSkill_3-1 = "약품이 아닙니다. 미래입니다."
26000-CVGroup_ExSkill_Level_1-1 = "여기서부터는 당신의 의지에 달렸습니다."
26000-CVGroup_ExSkill_Level_2-1 = "포기하지 마세요."
26000-CVGroup_ExSkill_Level_3-1 = "제 약이, 당신을 도울 겁니다."
26000-CVGroup_Formation_In_1-1 = "의료 지원은, 맡겨주세요."
26000-CVGroup_Formation_In_2-1 = "출격할 시간이군요."
26000-CVGroup_Growup_1-1 = "성장했습니다."
26000-CVGroup_Growup_2-1 = "최선을 다해 정진하겠습니다."
26000-CVGroup_Growup_3-1 = "앞으로는 좀 더 선생님께 도움이 될 수 있겠네요."
26000-CVGroup_Growup_4-1 = "보다 더 강해졌군요."
26000-CVGroup_Relationship_Up_1-1 = "선생님과 있으면 심박수에 이상이 생깁니다.\n저는 의료 담당인데……. 곤란하네요."
26000-CVGroup_Relationship_Up_2-1 = "후후, 선생님은 이상하군요."
26000-CVGroup_Relationship_Up_3-1 = "얼굴이 뜨거운 것 같아요.\n감기 기운은 아닌 것 같습니다만…… 이상하네요."
26000-CVGroup_Relationship_Up_4-1 = "선생님은 정말 손이 많이 가는 분이시네요.\n……그런 점도, 싫지는 않지만요."

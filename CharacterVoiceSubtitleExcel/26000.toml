[translation]
26000-CVGroup_CommonSkill-1 = "生命徵象正常，請前進吧。"
26000-CVGroup_ExSkill_1-1 = "會痛是嗎？\n那麼請來這裡。"
26000-CVGroup_ExSkill_2-1 = "如果需要幫忙的話……\n請交給我吧。"
26000-CVGroup_ExSkill_3-1 = "這並不是藥品。\n是未來。"
26000-CVGroup_ExSkill_Level_1-1 = "接下來就取決於你的意志了。"
26000-CVGroup_ExSkill_Level_2-1 = "請不要放棄。"
26000-CVGroup_ExSkill_Level_3-1 = "我的藥，將會拯救你吧。"
26000-CVGroup_Formation_In_1-1 = "醫療支援請交給我吧。"
26000-CVGroup_Formation_In_2-1 = "到出擊的時間了呢。"
26000-CVGroup_Growup_1-1 = "成長了。"
26000-CVGroup_Growup_2-1 = "我會盡己所能，持續精進。"
26000-CVGroup_Growup_3-1 = "今後似乎更能幫上老師的忙了。"
26000-CVGroup_Growup_4-1 = "變得更強了呢。"
26000-CVGroup_Relationship_Up_1-1 = "只要跟老師待在一起，心跳數就會出現異常。\n我明明是醫療負責人的說……真傷腦筋。"
26000-CVGroup_Relationship_Up_2-1 = "呵呵，老師還真特別呢。"
26000-CVGroup_Relationship_Up_3-1 = "感覺臉部十分熾熱。\n應該不是感冒才對……真奇怪呢。"
26000-CVGroup_Relationship_Up_4-1 = "老師真是個需要照顧的人呢。\n……雖然這種地方，我並不討厭就是了。"

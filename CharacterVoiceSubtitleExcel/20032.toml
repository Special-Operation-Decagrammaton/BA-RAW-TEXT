[translation]
20032-CVGroup_CommonSkill-1 = "자, 자신작이야."
20032-CVGroup_ExSkill_1-1 = "여기가… 펭귄 파라다이스?"
20032-CVGroup_ExSkill_2-1 = "다들 즐거워보여."
20032-CVGroup_ExSkill_3-1 = "나도 해보고 싶네, 유빙 다이브."
20032-CVGroup_ExSkill_Level_1-1 = "이리로 와."
20032-CVGroup_ExSkill_Level_2-1 = "부딪히지 않게 조심해."
20032-CVGroup_ExSkill_Level_3-1 = "순서를 지켜서."
20032-CVGroup_Formation_In_1-1 = "알았어, 맡겨줘. 지금의 나는 평소보다 상태가 좋으니까."
20032-CVGroup_Formation_In_2-1 = "컨디션은 최고야."
20032-CVGroup_Growup_1-1 = "나에게 투자하는 게 최고 효율이라고…?"
20032-CVGroup_Growup_2-1 = "특훈의 성과가 나온 것 같아. 잘 됐네."
20032-CVGroup_Growup_3-1 = "아직 부족해. 더 정진해야겠어."
20032-CVGroup_Growup_4-1 = "여기까지 올 수 있었던 건, 선생님 덕분이야."
20032-CVGroup_Relationship_Up_1-1 = "고마워 선생님."
20032-CVGroup_Relationship_Up_2-1 = "…항상, 도움을 받기만 하네."
20032-CVGroup_Relationship_Up_3-1 = "이상해. 더운데, 왠지 기분이 좋아."
20032-CVGroup_Relationship_Up_4-1 = "선생님과 함께라면 더운 곳도 나쁘지 않을지도."

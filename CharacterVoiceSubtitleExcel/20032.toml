[translation]
20032-CVGroup_CommonSkill-1 = "來，是我的自信之作唷。"
20032-CVGroup_ExSkill_1-1 = "這裡是……企鵝天堂？"
20032-CVGroup_ExSkill_2-1 = "大家好像都很開心。"
20032-CVGroup_ExSkill_3-1 = "我也想試試看呢，浮冰跳水。"
20032-CVGroup_ExSkill_Level_1-1 = "過來這邊。"
20032-CVGroup_ExSkill_Level_2-1 = "小心別撞到囉。"
20032-CVGroup_ExSkill_Level_3-1 = "按照順序。"
20032-CVGroup_Formation_In_1-1 = "知道了，交給我吧。\n現在的我，狀態比平時更好。"
20032-CVGroup_Formation_In_2-1 = "狀態絕佳。"
20032-CVGroup_Growup_1-1 = "對我的投資，是最高效率……？"
20032-CVGroup_Growup_2-1 = "特訓的成果好像出現了。太好了。"
20032-CVGroup_Growup_3-1 = "還不夠……得更加精進才行。"
20032-CVGroup_Growup_4-1 = "能走到這一步，都是多虧了老師唷。"
20032-CVGroup_Relationship_Up_1-1 = "謝謝你，老師。"
20032-CVGroup_Relationship_Up_2-1 = "……總是單方面地受到你的幫助呢。"
20032-CVGroup_Relationship_Up_3-1 = "真奇怪。明明很熱，卻莫名覺得很愉快。"
20032-CVGroup_Relationship_Up_4-1 = "跟老師在一起的話，好像連熱的地方也不討厭。"

[translation]
20009-CVGroup_CommonSkill-1 = "以為能逃過咱的法眼嗎！"
20009-CVGroup_ExSkill_1-1 = "既然如此就殲滅吧！"
20009-CVGroup_ExSkill_2-1 = "肅清時間到了！"
20009-CVGroup_ExSkill_3-1 = "上吧，肅清君1號！"
20009-CVGroup_ExSkill_Level_1-1 = "把叛亂份子一掃而空！"
20009-CVGroup_ExSkill_Level_2-1 = "以偉大鬍子之名！"
20009-CVGroup_ExSkill_Level_3-1 = "這股威力，儘管品嘗吧！"
20009-CVGroup_Formation_In_1-1 = "呵呵，交給咱吧！"
20009-CVGroup_Formation_In_2-1 = "輪到咱登場了嗎！"
20009-CVGroup_Formation_Select-1 = "唔呣！就這樣向溫泉突擊吧！"
20009-CVGroup_Growup_1-1 = "呵呵，看到了嗎，同志！\n咱那令人驚豔的成長……！"
20009-CVGroup_Growup_2-1 = "充足的休息也同樣是成長的捷徑！"
20009-CVGroup_Growup_3-1 = "得準備跟咱適合，更加了不起的鬍子才行！"
20009-CVGroup_Growup_4-1 = "哦哦……！咱的成長速度，簡直連咱自己都害怕啊！"
20009-CVGroup_Relationship_Up_1-1 = "能跟同志一起的話，今年的寒假肯定也是最棒的吧！"
20009-CVGroup_Relationship_Up_2-1 = "……同志你，不會背叛咱的吧？"
20009-CVGroup_Relationship_Up_3-1 = "好，授予同志特別的勳章吧！"
20009-CVGroup_Relationship_Up_4-1 = "耶嘿嘿……謝謝你，同志。"

[translation]
20009-CVGroup_CommonSkill-1 = "이 몸의 눈에서 벗어날 수 있을거라 생각했느냐!"
20009-CVGroup_ExSkill_1-1 = "이렇게 된 이상 섬멸이다!"
20009-CVGroup_ExSkill_2-1 = "숙청의 시간이다!"
20009-CVGroup_ExSkill_3-1 = "가라, 숙청군 1호!"
20009-CVGroup_ExSkill_Level_1-1 = "불순분자들을 모조리 쓸어버리는거야!"
20009-CVGroup_ExSkill_Level_2-1 = "위대한 수염의 이름으로!"
20009-CVGroup_ExSkill_Level_3-1 = "이 위력, 똑똑히 맛보거라!"
20009-CVGroup_Formation_In_1-1 = "후후, 이 몸에게 맡기거라."

20009-CVGroup_Formation_Select-1 = "좋아! 이대로 온천까지 진격이다!"
20009-CVGroup_Growup_1-1 = "후후. 보았는가, 콤라드? 눈이 휘둥그레질만한 이 몸의 성장을……!"

20009-CVGroup_Relationship_Up_1-1 = "콤라드와 함께라면, 이번 겨울 휴가도 분명 최고일 거야!"
20009-CVGroup_Relationship_Up_2-1 = "……콤라드는 나를 배신하면 안 돼?"
20009-CVGroup_Relationship_Up_3-1 = "좋아, 콤라드에게 특별 훈장을 수여하지!"
20009-CVGroup_Relationship_Up_4-1 = "에헤헤…… 고마워. 콤라드."

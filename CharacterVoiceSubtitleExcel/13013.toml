[translation]
13013-CVGroup_Battle_Buffed_1-1 = "가, 감사합니다!"
13013-CVGroup_Battle_Covered_1-1 = "숨을 거니까요!"
13013-CVGroup_Battle_Defense_1-1 = "아, 아무것도 아니네요!"
13013-CVGroup_Battle_In_1-1 = "소설의 주인공처럼…… 앞을 향해!"
13013-CVGroup_Battle_In_2-1 = "만화의 주인공처럼…… 후회 없이!"
13013-CVGroup_Battle_Move_1-1 = "이동합니다!"
13013-CVGroup_Battle_Move_2-1 = "다음 장소는…… 어디죠?"
13013-CVGroup_Battle_Recovery_1-1 = "덕분에…… 기운이 났어요!"
13013-CVGroup_Battle_TacticalAction_1-1 = "움직일게요!"
13013-CVGroup_Battle_Victory_1-1 = "헤헤…… 비밀의 장서를 찾아낸 기분이에요."
13013-CVGroup_Battle_Victory_2-1 = "지식은 힘이니까…… 지켜야 해요."
13013-CVGroup_CommonSkill-1 = "이 부분은 몇 번을 봐도…… 우헤헤……"
13013-CVGroup_ExSkill_1-1 = "도서관에서는 조용히……!"
13013-CVGroup_ExSkill_2-1 = "독서에 방해가 되잖아요……!"
13013-CVGroup_ExSkill_3-1 = "큰 소리를 내지 말아 주세요……!"
13013-CVGroup_ExSkill_Level_1-1 = "조용히 하세요……!"
13013-CVGroup_ExSkill_Level_2-1 = "벌칙이에요……!"
13013-CVGroup_ExSkill_Level_3-1 = "정말, 너무하시네요……!"
13013-CVGroup_Formation_In_1-1 = "제가 도움이 될 수 있다면야……"
13013-CVGroup_Formation_In_2-1 = "네, 네엣! 맡겨 주세요……!"
13013-CVGroup_Formation_Select-1 = "아, 선생님도 읽어 보시겠어요? 제가 정말 좋아하는 책이에요!"
13013-CVGroup_Growup_1-1 = "선생님! 보세요……! 저, 성장했어요!"
13013-CVGroup_Growup_2-1 = "감사드려요. 선생님. 이것도 전부 선생님 덕이네요."
13013-CVGroup_Growup_3-1 = "지금의 이 기분…… 말로 잘 표현할 수는 없지만요……\n계속 찾고 있었던 절판본을 발견했을 때와, 비슷한 것 같아요……"
13013-CVGroup_Growup_4-1 = "전진한다는 건…… 이렇게 즐거운 일이었군요. 에헤헤…… 기뻐요."
13013-CVGroup_Relationship_Up_1-1 = "선생님을 만나서, 정말 다행이에요. 그렇지 않았으면 저는…… 분명……"
13013-CVGroup_Relationship_Up_2-1 = "이런 때에, 분명 그 만화에서는…… 우헤헤…… \n핫?! 아, 아뇨! 저 아무 생각 안 했으니까요?!"
13013-CVGroup_Relationship_Up_3-1 = "선생님은 보통, 어떤 책을 읽으시나요……? 제가 찾아 드릴게요! \n어…… 찾을 수 있는 범위 안에서, 이지만요."
13013-CVGroup_Relationship_Up_4-1 = "선생님과 함께 있으면…… 뭔가, 기운이 나요.\n지금이라면 뭐든지 할 수 있을 것 같아요……!"
13013-CVGroup_Tactic_In_1-1 = "시작하겠습니다."
13013-CVGroup_Tactic_In_2-1 = "전부, 잘 되기를."
13013-CVGroup_Tactic_Victory_1-1 = "후우. 다행이에요……"
13013-CVGroup_Tactic_Victory_2-1 = "선생님께서 있어 주신 덕분이에요……"

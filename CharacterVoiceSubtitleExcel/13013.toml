[translation]
13013-CVGroup_Battle_Buffed_1-1 = "謝，謝謝！"
13013-CVGroup_Battle_Covered_1-1 = "進行掩蔽！"
13013-CVGroup_Battle_Defense_1-1 = "沒，沒什麼大不了的！"
13013-CVGroup_Battle_In_1-1 = "像小說的主角一樣……面向前方！"
13013-CVGroup_Battle_In_2-1 = "像漫畫的主角一樣……毫無保留！"
13013-CVGroup_Battle_Move_1-1 = "進行移動！"
13013-CVGroup_Battle_Move_2-1 = "下一個地點……是哪裡呢？"
13013-CVGroup_Battle_Recovery_1-1 = "託你的福……有力氣了！"
13013-CVGroup_Battle_TacticalAction_1-1 = "出發！"
13013-CVGroup_Battle_Victory_1-1 = "嘿嘿……有種找到秘密藏書的感覺。"
13013-CVGroup_Battle_Victory_2-1 = "知識就是力量……所以必須守護。"
13013-CVGroup_CommonSkill-1 = "這裡不管讀幾次都……唔嘿嘿……"
13013-CVGroup_ExSkill_1-1 = "在圖書館請保持安靜……！"
13013-CVGroup_ExSkill_2-1 = "會成為讀書的干擾……！"
13013-CVGroup_ExSkill_3-1 = "請不要大聲喧嘩……！"
13013-CVGroup_ExSkill_Level_1-1 = "請保持安靜……！"
13013-CVGroup_ExSkill_Level_2-1 = "這是罰則……！"
13013-CVGroup_ExSkill_Level_3-1 = "真是的，好過份……！"
13013-CVGroup_Formation_In_1-1 = "如果我，能幫上忙的話……"
13013-CVGroup_Formation_In_2-1 = "是，是！請交給我吧……！"
13013-CVGroup_Formation_Select-1 = "啊，老師要不要也讀讀看？\n是我非常喜歡的書！"
13013-CVGroup_Growup_1-1 = "老師！請看……！我成長了……！"
13013-CVGroup_Growup_2-1 = "謝謝你，老師。\n這也全都多虧了老師。"
13013-CVGroup_Growup_3-1 = "現在的這種心情……雖然很難用言語表達……\n不過跟發現一直在尋找的絕版書時的時候，感覺有點類似……"
13013-CVGroup_Growup_4-1 = "向前邁進……原來是這麼令人開心的事呢。\n耶嘿嘿……我很高興。"
13013-CVGroup_Relationship_Up_1-1 = "能跟老師相遇，真是太好了。\n不然的話，我……肯定……"
13013-CVGroup_Relationship_Up_2-1 = "這種時候，記得在那本漫畫裡是……唔嘿嘿……\n哈！？沒，沒有！我，我什麼都沒想像唷！？"
13013-CVGroup_Relationship_Up_3-1 = "老師平常會看什麼樣的書呢……？我可以幫你找！\n那個……只能在能找的範圍，就是了。"
13013-CVGroup_Relationship_Up_4-1 = "只要跟老師待在一起……總覺得力量就會湧現出來。\n 現在感覺什麼都做得到……！"
13013-CVGroup_Tactic_In_1-1 = "現在開始。"
13013-CVGroup_Tactic_In_2-1 = "希望一切都能順利。"
13013-CVGroup_Tactic_Victory_1-1 = "呼……太好了……"
13013-CVGroup_Tactic_Victory_2-1 = "這都是多虧有老師在……"

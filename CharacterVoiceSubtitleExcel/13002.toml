[translation]
13002-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะคะ~!"
13002-CVGroup_Battle_Covered_1-1 = "ทางนี้ดูแข็งแรงดีนะคะ"
13002-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอกค่ะ"
13002-CVGroup_Battle_In_1-1 = "มาเริ่มต่อสู้กันเลยมั้ยคะ~?"
13002-CVGroup_Battle_In_2-1 = "ถ้าไม่ตั้งใจทำ จะโดนดุนะคะ~\nทั้งศัตรู... ทั้งฝ่ายเดียวกันเลย...♥"
13002-CVGroup_Battle_Move_1-1 = "ทางนี้น่าจะมีอะไรสนุกๆ นะคะ"
13002-CVGroup_Battle_Move_2-1 = "ตื่นเต้นจังเลยค่ะ♥"
13002-CVGroup_Battle_Recovery_1-1 = "อืม... ปริมาณน้อยไปหน่อยนะคะ"
13002-CVGroup_Battle_TacticalAction_1-1 = "แหะๆ~"
13002-CVGroup_Battle_Victory_1-1 = "เคล็ดลับของชัยชนะ ข้อแรกคือ~\nการไม่เลือกกินค่ะ~! ฮุฮุ~♥"
13002-CVGroup_Battle_Victory_2-1 = "ชัยชนะคือรสชาติที่หอมหวานนะคะเนี่ย\nอยากกินอีกจังเลยค่ะ เอาอีก~ มากกว่านี้อีก!!"
13002-CVGroup_CommonSkill-1 = "เตรียมตัวให้ดีนะคะ~"
13002-CVGroup_ExSkill_1-1 = "โหลดกระสุนสำเร็จ จะเล็งแล้วนะคะ...!"
13002-CVGroup_ExSkill_2-1 = "เอาดอกหนักๆ ไปเลยค่ะ!"
13002-CVGroup_ExSkill_3-1 = "ฉันโกรธ~ นิดหน่อยค่ะ~"
13002-CVGroup_ExSkill_Level_1-1 = "ขอแบบเวลดันนะคะ~"
13002-CVGroup_ExSkill_Level_2-1 = "ทานตอนที่ยังร้อนนะคะ~"
13002-CVGroup_ExSkill_Level_3-1 = "กระสุนร้อนๆ~ มาแล้วค่ะ!"
13002-CVGroup_Formation_In_1-1 = "ค่ะ~ วางใจได้เลยค่ะ~"
13002-CVGroup_Formation_In_2-1 = "ฮุฮุ~ ไปกันเลยมั้ยคะ~?"
13002-CVGroup_Formation_Select-1 = "ฮุฮุฮุฮุ...♥"
13002-CVGroup_Growup_1-1 = "คุณครูคาดหวัง...\nในตัวฉันสูงจังเลยนะคะ ฮุฮุ"
13002-CVGroup_Growup_2-1 = "การแข็งแกร่งขึ้นเป็นสิ่งที่ดีค่ะ\nเพราะแปลว่าจะทำอะไรได้มากขึ้นยังไงล่ะคะ"
13002-CVGroup_Growup_3-1 = "ยิ่งกินเยอะ ยิ่งแข็งแกร่ง...\nนี่คือทักษะพื้นฐานของนักเรียนหญิงม.ปลายค่ะ"
13002-CVGroup_Growup_4-1 = "อุ๊ยตาย ฉันก็อยู่ในช่วงเติบโตนะคะ\nทั้งความสูง ทั้งหัวใจ... ทุกอย่างกำลังเติบโตค่ะ~"
13002-CVGroup_Relationship_Up_1-1 = "ฉันไม่เคยคิดว่า 'ห้ามกินเยอะนะ~' แม้แต่สักครั้งเลย...\nถ้าได้อยู่กับคุณครูน่ะนะ... ฮุฮุฮุ"
13002-CVGroup_Relationship_Up_2-1 = "ฮุฮุฮุ... ความประหม่าตอนได้อยู่กับคุณครูก็ไม่แย่นะคะ"
13002-CVGroup_Relationship_Up_3-1 = "ทำไมกันนะ~ ตอนที่ได้อยู่กับคุณครู~\nฉันรู้สึกว่าอันตรายขึ้นนิดหน่อยค่ะ~"
13002-CVGroup_Relationship_Up_4-1 = "ขอบคุณความเอาใจใส่ของคุณครูนะคะ\nถ้าต้องการฉันก็บอกได้ตลอดเลยค่ะ"
13002-CVGroup_Tactic_In_1-1 = "ฉันจะทำตามความคาดหวังของคุณครูค่ะ~"
13002-CVGroup_Tactic_In_2-1 = "ฮุฮุ ทำให้พินาศกันเลยมั้ยคะ~?"
13002-CVGroup_Tactic_Victory_1-1 = "เป็นชัยชนะที่สมบูรณ์แบบเลยนะคะ~"
13002-CVGroup_Tactic_Victory_2-1 = "งั้นตอนนี้ก็... ไปกินกันเลยมั้ยคะ?\nกินอะไร... งั้นเหรอคะ... อะ ไร ก็ ได้ ค่ะ"

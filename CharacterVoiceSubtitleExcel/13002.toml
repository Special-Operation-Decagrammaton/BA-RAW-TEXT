[translation]
13002-CVGroup_Battle_Buffed_1-1 = "謝謝～"
13002-CVGroup_Battle_Covered_1-1 = "這似乎很堅固呢。"
13002-CVGroup_Battle_Defense_1-1 = "沒用的唷。"
13002-CVGroup_Battle_In_1-1 = "開始戰鬥吧～"
13002-CVGroup_Battle_In_2-1 = "不拚盡全力的話就要處罰唷～\n無論敵人……還是友方……♥"
13002-CVGroup_Battle_Move_1-1 = "這裡似乎也有有趣的東西呢。"
13002-CVGroup_Battle_Move_2-1 = "真令人期待♥"
13002-CVGroup_Battle_Recovery_1-1 = "哼嗯……\n有點不夠滿足呢。"
13002-CVGroup_Battle_TacticalAction_1-1 = "嘿～"
13002-CVGroup_Battle_Victory_1-1 = "勝利的祕訣只有一個～\n那就是不要偏食唷～！唔呵～♥"
13002-CVGroup_Battle_Victory_2-1 = "勝利，有種甜甜的滋味呢。\n真想吃到更多。\n更多更～多！！"
13002-CVGroup_CommonSkill-1 = "覺悟吧～"
13002-CVGroup_ExSkill_1-1 = "裝填完畢。\n進行校準……！"
13002-CVGroup_ExSkill_2-1 = "特別的一發，要上了！"
13002-CVGroup_ExSkill_3-1 = "我稍～微有點生氣了唷～"
13002-CVGroup_ExSkill_Level_1-1 = "麻煩幫我做全熟～"
13002-CVGroup_ExSkill_Level_2-1 = "趁熱享用！"
13002-CVGroup_ExSkill_Level_3-1 = "暖呼呼的榴彈，要上囉！"
13002-CVGroup_Formation_In_1-1 = "是～請交給我吧！"
13002-CVGroup_Formation_In_2-1 = "呵呵，去試試看吧～"
13002-CVGroup_Formation_Select-1 = "呵呵呵呵……♥"
13002-CVGroup_Growup_1-1 = "老師對我……非常期待呢。呵呵。"
13002-CVGroup_Growup_2-1 = "變強是件好事。\n因為這代表變得能做到更多事的意思。"
13002-CVGroup_Growup_3-1 = "吃越多就能變得越強……\n這是女高中生的基本心得。"
13002-CVGroup_Growup_4-1 = "哎呀，我也還在成長期唷。\n不管是身高還是內心……全都還在長大～"
13002-CVGroup_Relationship_Up_1-1 = "明明「不能吃太多～」之類的，\n以前從來沒想過的說……\n一旦跟老師在一起就……呵呵呵。"
13002-CVGroup_Relationship_Up_2-1 = "呵呵呵……\n跟老師在一起時的這股緊張感，我並不討厭。"
13002-CVGroup_Relationship_Up_3-1 = "怎麼辦呢～只要跟老師在一起～\n就會出現一些有～點危險的心情呢。"
13002-CVGroup_Relationship_Up_4-1 = "老師的關心，我非常感謝。\n需要我的時候請隨時跟我說。"
13002-CVGroup_Tactic_In_1-1 = "老師的期待，我會回應的哦～"
13002-CVGroup_Tactic_In_2-1 = "呵呵。試著破壞殆盡吧～"
13002-CVGroup_Tactic_Victory_1-1 = "是場完美的勝利呢～"
13002-CVGroup_Tactic_Victory_2-1 = "那麼……來去吃東西吧？\n問我吃什麼……什．麼．都．吃。"

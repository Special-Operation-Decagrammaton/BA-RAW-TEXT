[translation]
10115-CVGroup_Battle_Buffed_1-1 = "ถ้าเป็นตอนนี้น่าจะตี 40% ได้นะคะ!"
10115-CVGroup_Battle_Covered_1-1 = "ฉันจะหลบก่อนนะคะ!"
10115-CVGroup_Battle_Defense_1-1 = "อินฟิลด์ฟลายนี่คะ!"
10115-CVGroup_Battle_In_1-1 = "การทำแบบนี้ก็เป็นการฝึกฝนเหมือนกันค่ะ"
10115-CVGroup_Battle_In_2-1 = "สักวันหนึ่งฉันจะปฎิรูปชมรมเบสบอลให้ได้เลย..."
10115-CVGroup_Battle_Move_1-1 = "นี่เป็นการเปลี่ยนกะสินะคะ?"
10115-CVGroup_Battle_Move_2-1 = "จะลุยแล้วนะคะ!"
10115-CVGroup_Battle_Recovery_1-1 = "ขอบคุณมากค่ะ ดีขึ้นเยอะเลยค่ะ"
10115-CVGroup_Battle_TacticalAction_1-1 = "วิ่งให้เหมือนรันเนอร์...!"
10115-CVGroup_Battle_Victory_1-1 = "ย้า! วงสวิงของฉันเป็นยังไงบ้างคะคุณครู!"
10115-CVGroup_Battle_Victory_2-1 = "มุ่งสู่การเป็นผู้ตีได้ 30%!"
10115-CVGroup_CommonSkill-1 = "รับได้แล้วค่ะ!"
10115-CVGroup_ExSkill_1-1 = "ฮู่ว... ถ้างั้น... อ๊ะ?!"
10115-CVGroup_ExSkill_2-1 = "เอาละ... เอาละนะ...! เอ๋...?!"
10115-CVGroup_ExSkill_3-1 = "ไหนลองซิ... เอาละนะ...! ทำไมล่ะ?!"
10115-CVGroup_ExSkill_Level_1-1 = "เอ๊ะ? เอ๋...?! ช่วยไม่ได้สินะ..."
10115-CVGroup_ExSkill_Level_2-1 = "อ๊าาาา?! ก่อนอื่นก็...!"
10115-CVGroup_ExSkill_Level_3-1 = "จะ... ใจเย็นๆ! ฮู่ว..."
10115-CVGroup_Formation_In_1-1 = "ความงดงามของเบสบอลก็คือโฮมรันค่ะ"
10115-CVGroup_Formation_In_2-1 = "คอยดูได้เลยค่ะ คุณครู!"
10115-CVGroup_Formation_Select-1 = "ฮะ... ฮึบ\nเท่านี้ก็วันเอาต์แล้วใช่มั้ยคะ?"
10115-CVGroup_Growup_1-1 = "ผลของการฝึกฝนสินะคะ!\nขอบคุณที่คอยเฝ้าดูอยู่เสมอนะคะ คุณครู"
10115-CVGroup_Growup_2-1 = "ฉันตีดีขึ้นบ้างรึยังคะ?\nฉันจะเป็นผู้เล่นที่ดีกว่านี้... ได้รึเปล่าคะ?"
10115-CVGroup_Growup_3-1 = "ฉันอยากเอาจริงเอาจังกว่านี้ค่ะ\nทั้งเรื่องของเบสบอล... และเรื่องอื่นๆ ด้วยค่ะ"
10115-CVGroup_Growup_4-1 = "เบสบอลน่ะ... เป็นกีฬาที่ต้องพยายามทำให้ดีที่สุดในที่ที่มองไม่เห็นค่ะ\nเพื่อจะตีให้โด่งได้อย่างทั่วๆ ไปก็ต้องฝึกฝนอย่างหนัก\nฉันชอบที่เบสบอลเป็นแบบนั้นค่ะ"
10115-CVGroup_Relationship_Up_1-1 = "ฉันคิดว่าการแยกระหว่างสิ่งที่ทำได้กับทำไม่ได้เป็นสิ่งสำคัญนะคะ\nแต่ว่า... ฉันอยากมอบลูกโฮมรันที่ตีได้ทั้งหมดให้คุณครูจังค่ะ แหะๆ"
10115-CVGroup_Relationship_Up_2-1 = "ข้อมูลกับสถิติเป็นสิ่งสำคัญค่ะ แม้แต่กับเบสบอลก็ไม่ต่างกันค่ะ\nแต่แค่นั้นก็ยังดูเหมือนจะไม่สามารถอธิบายเรื่องต่างๆ ที่เกิดขึ้น\nในชีวิตได้เลยละค่ะ เอ่อ... สำหรับฉันก็... อย่างเช่น... คุณครูไงคะ"
10115-CVGroup_Relationship_Up_3-1 = "โฮมรันเป็นสิ่งที่ฉันชอบที่สุดในเบสบอลเลย\nถึงจะไม่ค่อย... ไม่สิ... ถึงจะยังไม่เคยตีได้เลยก็ตามค่ะ...\nแต่คุณครูรู้มั้ยคะ? สำหรับฉันคุณครูก็เหมือนโฮมรันเลยค่ะ แหะๆ"
10115-CVGroup_Relationship_Up_4-1 = "ตอนเด็กๆ การดูเบสบอลทำให้ฉันคิดว่าตัวเองก็ทำได้ค่ะ\nและในตอนนี้... ฉันคิดว่าการได้เจอคุณครูคือสิ่งนั้นค่ะ"
10115-CVGroup_Tactic_In_1-1 = "มาเริ่มกันเลยมั้ยคะ คุณครู"
10115-CVGroup_Tactic_In_2-1 = "เกมยังไม่จบอย่าเพิ่งนับลูกสิคะ!"
10115-CVGroup_Tactic_Victory_1-1 = "มีคนบอกว่าโชคชะตาเกิดจากการวางแผนที่ดี\nทำได้ดีมากเลยนะคะคุณครู"
10115-CVGroup_Tactic_Victory_2-1 = "ฉันเองก็ไม่ชอบความพ่ายแพ้เหมือนกับคนอื่นๆ ค่ะ!"

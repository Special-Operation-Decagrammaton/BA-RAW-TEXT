[translation]
10115-CVGroup_Battle_Buffed_1-1 = "지금이라면 4할도 노릴 수 있을 것 같아요!"
10115-CVGroup_Battle_Covered_1-1 = "피하겠습니다!"
10115-CVGroup_Battle_Defense_1-1 = "인필드 플라이네요!"
10115-CVGroup_Battle_In_1-1 = "이것도 어떻게 보면 훈련이겠죠."
10115-CVGroup_Battle_In_2-1 = "언젠가는 야구부를 개혁하고 말 거야……"
10115-CVGroup_Battle_Move_1-1 = "공수교대로군요?"
10115-CVGroup_Battle_Move_2-1 = "이동합니다!"
10115-CVGroup_Battle_Recovery_1-1 = "감사합니다. 훨씬 낫네요."
10115-CVGroup_Battle_TacticalAction_1-1 = "주자처럼……!"
10115-CVGroup_Battle_Victory_1-1 = "에잇! 어떠셨나요, 선생님! 제 스윙!"
10115-CVGroup_Battle_Victory_2-1 = "3할 타자를 향해서!"
10115-CVGroup_CommonSkill-1 = "잡았다고요!"
10115-CVGroup_ExSkill_1-1 = "후우…… 그러면…… 으앗?!"
10115-CVGroup_ExSkill_2-1 = "자아…… 와라……! 으엥?!"
10115-CVGroup_ExSkill_3-1 = "어디…… 간다……! 어째서?!"
10115-CVGroup_ExSkill_Level_1-1 = "어? 어어? 어쩔 수 없지……"
10115-CVGroup_ExSkill_Level_2-1 = "으아아아?! 일단은……!"
10115-CVGroup_ExSkill_Level_3-1 = "지, 진정해! 하아……"
10115-CVGroup_Formation_In_1-1 = "야구의 꽃은, 홈런이죠."
10115-CVGroup_Formation_In_2-1 = "기대해 주세요, 선생님!"
10115-CVGroup_Formation_Select-1 = "엇…… 차. 이걸로 원 아웃, 일까요?"
10115-CVGroup_Growup_1-1 = "훈련의 성과로군요! 지켜봐 주셔서 감사합니다. 선생님."
10115-CVGroup_Growup_2-1 = "조금 더 잘 치게 되었을까요?\n더욱 괜찮은 선수가…… 될 수 있었던 걸까요?"
10115-CVGroup_Growup_3-1 = "진지하게 임하고 싶어요. 그게 야구이든…… 다른 무엇이든 간에요."
10115-CVGroup_Growup_4-1 = "야구는 보이지 않는 곳에서 가장 열심히 해야 하는 운동이라고 하죠.\n평범하게 플라이를 잡기 위해, 최선의 연습을 하는 것처럼요.\n저는, 야구의 그런 부분이 좋아요."
10115-CVGroup_Relationship_Up_1-1 = "할 수 있는 일과 그렇지 않은 일을 구분하는 건, 중요한 것이라고 생각해요.\n그렇지만…… 제가 친 모든 홈런공은, 선생님께 드리고 싶네요. 헤헤."
10115-CVGroup_Relationship_Up_2-1 = "데이터와 통계는 중요하죠. 야구라도 마찬가지고요.\n하지만 그것만으로도 전부 설명할 수 없는 것이 살아가다 보면 생기는 것 같아요.\n그, 저기, 저에게 있어서…… 선생님…… 이라던가요."
10115-CVGroup_Relationship_Up_3-1 = "홈런은, 제가 야구에서 가장 좋아하는 거예요.\n좀처럼…… 아뇨, 아예…… 친 적이 없지만요……\n그렇지만 그거 아세요, 선생님? 선생님은 저에게, 홈런 같은 분이라는 걸요. 헤헤."
10115-CVGroup_Relationship_Up_4-1 = "어렸을 때 야구를 보면서, 나도 할 수 있다는 생각을 하곤 했어요.\n그리고 지금은…… 선생님이, 그 대신인 것 같아요."
10115-CVGroup_Tactic_In_1-1 = "시작해 볼까요, 선생님."
10115-CVGroup_Tactic_In_2-1 = "끝날 때까지 끝난 게 아니라고 하죠!"
10115-CVGroup_Tactic_Victory_1-1 = "운은 계획에서 비롯된다는 말이 있어요. 수고하셨습니다. 선생님."
10115-CVGroup_Tactic_Victory_2-1 = "누구나 그렇겠지만, 저는 지는 게 싫거든요!"

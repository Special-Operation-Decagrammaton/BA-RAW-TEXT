[translation]
10115-CVGroup_Battle_Buffed_1-1 = "現在的話，感覺能挑戰四成打擊率！"
10115-CVGroup_Battle_Covered_1-1 = "迴避！"
10115-CVGroup_Battle_Defense_1-1 = "是內野高飛球！"
10115-CVGroup_Battle_In_1-1 = "這也是練習呢！"
10115-CVGroup_Battle_In_2-1 = "總有一天，我一定會在棒球部掀起革命的風暴……！"
10115-CVGroup_Battle_Move_1-1 = "換場是嗎？"
10115-CVGroup_Battle_Move_2-1 = "希望能趕上！"
10115-CVGroup_Battle_Recovery_1-1 = "非常感謝！感覺好多了。"
10115-CVGroup_Battle_TacticalAction_1-1 = "我要上了……！"
10115-CVGroup_Battle_Victory_1-1 = "呀啊！\n剛才的揮棒怎麼樣啊？"
10115-CVGroup_Battle_Victory_2-1 = "總有一天要成為三成打者！"
10115-CVGroup_CommonSkill-1 = "接到了！"
10115-CVGroup_ExSkill_1-1 = "精神統一……\n沒問題……！\n唔哇！？"
10115-CVGroup_ExSkill_2-1 = "好……\n來吧……！\n啊啊！？"
10115-CVGroup_ExSkill_3-1 = "好……\n這裡……！\n怎麼會！？"
10115-CVGroup_ExSkill_Level_1-1 = "哇！哇啊！？\n既然如此……"
10115-CVGroup_ExSkill_Level_2-1 = "唔啊啊啊！？\n沒辦法了……！"
10115-CVGroup_ExSkill_Level_3-1 = "不行了！\n只能……！"
10115-CVGroup_Formation_In_1-1 = "說到棒球的精隨，就是全壘打！"
10115-CVGroup_Formation_In_2-1 = "敬請期待哦，老師！"
10115-CVGroup_Formation_Select-1 = "嘿……咻。\n一出局……了唷？"
10115-CVGroup_Growup_1-1 = "謝謝你！\n這也是多虧了老師的應援！"
10115-CVGroup_Growup_2-1 = "有稍微……進步……一點了嗎？\n要是打擊率有上升就好了。"
10115-CVGroup_Growup_3-1 = "無論什麼事情，我都會認真以對。\n棒球也是，其他事也是。"
10115-CVGroup_Growup_4-1 = "盛大的全壘打並不是一切。\n為了比賽反覆練習的時間，也是棒球的一部分……\n為求抓住一個人絕對無法達成的勝利，所有人都在各自的崗位上全力以赴……\n這就是我喜歡棒球的地方。"
10115-CVGroup_Relationship_Up_1-1 = "我能說一個我的夢想嗎？\n如果打出全壘打的話……那顆球，我想送給老師當禮物。"
10115-CVGroup_Relationship_Up_2-1 = "數據和統計無法說明的東西，還挺多的對吧。\n比賽也是一樣……有著光從數字無法看見的感情與戲劇性。\n那個……在老師身邊時的，我的變化也是。"
10115-CVGroup_Relationship_Up_3-1 = "現在……總覺得有點靜不下來……\n 要是打出全壘打的話……會是這種心情嗎……嘿嘿。"
10115-CVGroup_Relationship_Up_4-1 = "我從很久以前就很憧憬棒球了。\n要說這是我的人生也不為過。\n或許老師對我來說，是和棒球同等的存在……也說不定。"
10115-CVGroup_Tactic_In_1-1 = "比賽開始了。"
10115-CVGroup_Tactic_In_2-1 = "在結束之前都還沒結束！"
10115-CVGroup_Tactic_Victory_1-1 = "感謝指教！\n辛苦了，老師。"
10115-CVGroup_Tactic_Victory_2-1 = "哼哼！成功了唷！"

[translation]
20002-CVGroup_CommonSkill-1 = "실험 기록 001, 관찰 시작."
20002-CVGroup_ExSkill_1-1 = "자, 그럼 나님의 걸작을 시험해볼까?"
20002-CVGroup_ExSkill_2-1 = "후-후-후. 다녀오렴, 네즈스케!"
20002-CVGroup_ExSkill_3-1 = "이때만을 기다리고 있었던 것이다!"
20002-CVGroup_ExSkill_Level_1-1 = "터져라!"
20002-CVGroup_ExSkill_Level_2-1 = "퍼져라!"
20002-CVGroup_ExSkill_Level_3-1 = "이거 하나면 꼼짝 못 할걸?"
20002-CVGroup_Formation_In_1-1 = "드디어 나님의 진가를 발휘할 때가 온 것이다!"
20002-CVGroup_Formation_In_2-1 = "후후, 나님의 활약을 기대해도 좋은 것이다!"
20002-CVGroup_Growup_1-1 = "이게 뭐야? 엄청난 힘이 느껴지는데!"
20002-CVGroup_Growup_2-1 = "업그레이드 한 것이다!"
20002-CVGroup_Growup_3-1 = "후-후-후, 더 재미있는 실험을 할 수 있겠어!"
20002-CVGroup_Growup_4-1 = "좀 더- 좀 더- 강해지고 싶어!"
20002-CVGroup_Relationship_Up_1-1 = "위대한 나님과 친해질 수 있는 기회라니, 선생에게도 완전 이득인 것이다!"
20002-CVGroup_Relationship_Up_2-1 = "나님의 연구는 모두 기밀 사항이지만… 선생이라면 조금 보여줄 수도 있어."
20002-CVGroup_Relationship_Up_3-1 = "선생과 함께라면… 그 어떤 난제라도 쉽게 해결할 수 있을 거야."
20002-CVGroup_Relationship_Up_4-1 = "혹시 치즈…… 좋아해? 선생도 나님과 같은 걸 좋아했으면 좋겠는데."

[translation]
20002-CVGroup_CommonSkill-1 = "實驗記錄001，觀察開始。"
20002-CVGroup_ExSkill_1-1 = "好，那就來試驗一下我的傑作吧！"
20002-CVGroup_ExSkill_2-1 = "呵～呵呵呵。一路順風哦，根津助！"
20002-CVGroup_ExSkill_3-1 = "我就等著這個瞬間！"
20002-CVGroup_ExSkill_Level_1-1 = "破裂吧！"
20002-CVGroup_ExSkill_Level_2-1 = "擴散吧！"
20002-CVGroup_ExSkill_Level_3-1 = "這罐就會讓人動彈不得了哦？"
20002-CVGroup_Formation_In_1-1 = "終於輪到我發揮真正價值的時候了！"
20002-CVGroup_Formation_In_2-1 = "呵呵，儘管期待我的精彩表現吧！"
20002-CVGroup_Growup_1-1 = "這是什麼？感覺到了一股非常不得了的力量！"
20002-CVGroup_Growup_2-1 = "升級了！"
20002-CVGroup_Growup_3-1 = "呵～呵呵呵，好像能做更有趣的實驗了！"
20002-CVGroup_Growup_4-1 = "還想變得更強更～強！"
20002-CVGroup_Relationship_Up_1-1 = "能跟偉大的我打好關係的機會，對老師來說可是非常優惠的哦！"
20002-CVGroup_Relationship_Up_2-1 = "雖然我的研究全都是機密事項……\n但老師的話稍微讓你看一點也沒關係。"
20002-CVGroup_Relationship_Up_3-1 = "只要跟老師在一起……\n無論什麼樣的難題似乎都能簡單地解決。"
20002-CVGroup_Relationship_Up_4-1 = "難道起司……你喜歡嗎？\n我希望老師能跟我有相同的愛好呢。"

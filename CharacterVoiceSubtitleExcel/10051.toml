[translation]
10051-CVGroup_Battle_Buffed_1-1 = "應援，我就感激地收下了。"
10051-CVGroup_Battle_Defense_1-1 = "任何阻礙都無法停下我們的腳步！"
10051-CVGroup_Battle_In_1-1 = "開始應援吧！"
10051-CVGroup_Battle_In_2-1 = "傾注一切，使其燃燒！"
10051-CVGroup_Battle_Move_1-1 = "往下一個舞台移動吧。"
10051-CVGroup_Battle_Move_2-1 = "這次的應援似乎也傳達到了呢！"
10051-CVGroup_Battle_Recovery_1-1 = "支援，十分感謝。"
10051-CVGroup_Battle_TacticalAction_1-1 = "無論情況為何，應援都會持續！"
10051-CVGroup_Battle_Victory_1-1 = "傾注真心的應援，將會傳達給大家吧。"
10051-CVGroup_Battle_Victory_2-1 = "熱情有著合理之上的價值。"
10051-CVGroup_CommonSkill-1 = "這就是我們的熱情！"
10051-CVGroup_ExSkill_1-1 = "傾注熱情！"
10051-CVGroup_ExSkill_2-1 = "加油！加油！"
10051-CVGroup_ExSkill_3-1 = "上吧！就是那裡！"
10051-CVGroup_ExSkill_Level_1-1 = "一！二！三！四！"
10051-CVGroup_ExSkill_Level_2-1 = "無論擋在我們前方的是怎麼樣的阻礙！"
10051-CVGroup_ExSkill_Level_3-1 = "更強烈！更火熱！"
10051-CVGroup_Formation_In_1-1 = "從某處傳來了一股熱情的氣味呢。"
10051-CVGroup_Formation_In_2-1 = "抱持火熱的熱情，也是巨匠的心得之一。"
10051-CVGroup_Formation_Select-1 = "需要我的應援嗎？"
10051-CVGroup_Growup_1-1 = "謝謝你。\n老師應援的心意，也傳達給我了哦。"
10051-CVGroup_Growup_2-1 = "熱情與成長啊……真是無比適合巨匠的詞語呢。"
10051-CVGroup_Growup_3-1 = "我之後也不會停下腳步哦。\n老師也願意跟我一起來嗎？"
10051-CVGroup_Growup_4-1 = "全部，都多虧了老師。我很感謝你。"
10051-CVGroup_Relationship_Up_1-1 = "無論什麼樣的應援……愛情的要素都是不可或缺的。\n這點希望你能記住，老師。"
10051-CVGroup_Relationship_Up_2-1 = "今天的我是應援團長。\n……所以，我會全力為老師應援。"
10051-CVGroup_Relationship_Up_3-1 = "人的心……真是不可思議。\n老師你，光是待在那裡就能為我帶來力量。"
10051-CVGroup_Relationship_Up_4-1 = "我認為老師擁有能激發學生隱藏的熱情的才能。\n……至少我是這麼覺得。"
10051-CVGroup_Tactic_In_1-1 = "應援就交給我吧。"
10051-CVGroup_Tactic_In_2-1 = "雷醬，Set up！"
10051-CVGroup_Tactic_Victory_1-1 = "這就是千年的……浪漫！"
10051-CVGroup_Tactic_Victory_2-1 = "這就是千年的力量，還有熱情！"

[translation]
10051-CVGroup_Battle_Buffed_1-1 = "Thank you for the cheering."
10051-CVGroup_Battle_Defense_1-1 = "No wall can stop us!"
10051-CVGroup_Battle_In_1-1 = "Let's start cheering!"
10051-CVGroup_Battle_In_2-1 = "Put all your cards on the table, then burn it all!"
10051-CVGroup_Battle_Move_1-1 = "Shall we move to the next stage?"
10051-CVGroup_Battle_Move_2-1 = "Looks like our cheering reached them this time too!"
10051-CVGroup_Battle_Recovery_1-1 = "Thank you for the support."
10051-CVGroup_Battle_TacticalAction_1-1 = "Cheering can never be stopped!"
10051-CVGroup_Battle_Victory_1-1 = "Heartfelt cheers reach everyone."
10051-CVGroup_Battle_Victory_2-1 = "The value of passion outweighs reason."
10051-CVGroup_CommonSkill-1 = "This is our passion!"
10051-CVGroup_ExSkill_1-1 = "With passion!"
10051-CVGroup_ExSkill_2-1 = "Play! Play!"
10051-CVGroup_ExSkill_3-1 = "Fight! Win!"
10051-CVGroup_ExSkill_Level_1-1 = "One! Two! Three! Four!"
10051-CVGroup_ExSkill_Level_2-1 = "No matter what gets in our way!"
10051-CVGroup_ExSkill_Level_3-1 = "Stronger! Hotter!"
10051-CVGroup_Formation_In_1-1 = "I can smell the scent of passion somewhere."
10051-CVGroup_Formation_In_2-1 = "Burning passion is also one of Meister's basics."
10051-CVGroup_Formation_Select-1 = "Do you need my cheering?"
10051-CVGroup_Growup_1-1 = "Thank you. Sensei's cheering, it reached me."
10051-CVGroup_Growup_2-1 = "Passion and growth... Perfect words for a Meister."
10051-CVGroup_Growup_3-1 = "I won't stop moving onwards. Would you follow me, Sensei?"
10051-CVGroup_Growup_4-1 = "It's all thanks to Sensei. You have my gratitude."
10051-CVGroup_Relationship_Up_1-1 = "In any cheering...you always have to factor in love. Remember that, Sensei."
10051-CVGroup_Relationship_Up_2-1 = "Right now, I'm the Cheer Squad leader. ...So I'll cheer for Sensei to best of my abilities."
10051-CVGroup_Relationship_Up_3-1 = "One's feelings are...strange. Sensei gives me strength just by being there."
10051-CVGroup_Relationship_Up_4-1 = "It feels like Sensei has a knack for bringing out students' hidden passions. That's how I feel, at least."
10051-CVGroup_Tactic_In_1-1 = "Leave the cheering to me."
10051-CVGroup_Tactic_In_2-1 = "Thundergun, set up."
10051-CVGroup_Tactic_Victory_1-1 = "This is Millennium's...romance!"
10051-CVGroup_Tactic_Victory_2-1 = "This is the strength and passion of Millennium."

[translation]
10051-CVGroup_Battle_Buffed_1-1 = "응원, 감사히 받을게."
10051-CVGroup_Battle_Defense_1-1 = "어떤 벽도 우리를 막을 순 없어!"
10051-CVGroup_Battle_In_1-1 = "응원을 시작하지!"
10051-CVGroup_Battle_In_2-1 = "모든 것을 끌어올려, 불태우는 거야!"
10051-CVGroup_Battle_Move_1-1 = "다음 무대로 이동해 볼까?"
10051-CVGroup_Battle_Move_2-1 = "이번 응원도 전해졌나봐!"
10051-CVGroup_Battle_Recovery_1-1 = "지원, 고마워."
10051-CVGroup_Battle_TacticalAction_1-1 = "어떤 상황에도 응원은 멈출 수 없지!"
10051-CVGroup_Battle_Victory_1-1 = "마음을 담은 응원은, 모두에게 전해지는 법이야."
10051-CVGroup_Battle_Victory_2-1 = "열정에는 합리 이상의 가치가 있어."
10051-CVGroup_CommonSkill-1 = "이것이 우리의 열정이다!"
10051-CVGroup_ExSkill_1-1 = "열정을 담아서!"
10051-CVGroup_ExSkill_2-1 = "플레이! 플레이!"
10051-CVGroup_ExSkill_3-1 = "싸워라! 이겨라!"
10051-CVGroup_ExSkill_Level_1-1 = "하나! 둘! 셋! 넷!"
10051-CVGroup_ExSkill_Level_2-1 = "우리 앞을 무엇이 가로막는다 해도!"
10051-CVGroup_ExSkill_Level_3-1 = "더 힘차게! 더 뜨겁게!"
10051-CVGroup_Formation_In_1-1 = "어디선가 열정의 향이 느껴지는군."
10051-CVGroup_Formation_In_2-1 = "뜨거운 열정도 마이스터의 소양 중 하나야."
10051-CVGroup_Formation_Select-1 = "내 응원이 필요해?"
10051-CVGroup_Growup_1-1 = "고마워. 선생님의 응원하는 마음, 내게도 전해졌어."
10051-CVGroup_Growup_2-1 = "열정과 성장이라… 마이스터에게 가장 잘 어울리는 단어지."
10051-CVGroup_Growup_3-1 = "나는 앞으로도 멈추지 않겠어. 선생님도 함께 따라와 줄래?"
10051-CVGroup_Growup_4-1 = "전부 선생님 덕분이야. 감사할게."
10051-CVGroup_Relationship_Up_1-1 = "어떤 응원이라도…… 애정의 요소는 빼놓을 수 없지.\n그걸 기억해 줘, 선생님."
10051-CVGroup_Relationship_Up_2-1 = "지금의 나는 응원단장. ……그러니 전력으로 선생님을 응원할게."
10051-CVGroup_Relationship_Up_3-1 = "사람의 마음이란… 신기해.\n선생님은, 그곳에 있는 것만으로도 내게 힘이 돼."
10051-CVGroup_Relationship_Up_4-1 = "선생님에게는 학생의 숨겨진 열정을 이끌어내는 재능이 있는 것 같아. \n……적어도 나는 그렇게 느껴."
10051-CVGroup_Tactic_In_1-1 = "응원은 맡겨줘."
10051-CVGroup_Tactic_In_2-1 = "천둥이, 셋 업."
10051-CVGroup_Tactic_Victory_1-1 = "이것이 밀레니엄의……. 로망이야!"
10051-CVGroup_Tactic_Victory_2-1 = "이것이 밀레니엄의 힘, 그리고 열정이야."

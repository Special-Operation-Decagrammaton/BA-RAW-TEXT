[translation]
26003-CVGroup_CommonSkill-1 = "痛痛，痛痛，飛走吧～"
26003-CVGroup_ExSkill_1-1 = "呼……我為大家做了準備！"
26003-CVGroup_ExSkill_2-1 = "嘿咻，補給品送到了唷！"
26003-CVGroup_ExSkill_3-1 = "這是為大家準備的補給品！"
26003-CVGroup_ExSkill_Level_1-1 = "請收下補給品吧！"
26003-CVGroup_ExSkill_Level_2-1 = "從不舒服的人開始，依照順序！"
26003-CVGroup_ExSkill_Level_3-1 = "請小心使用哦！"
26003-CVGroup_Formation_In_1-1 = "請，請交給我吧！"
26003-CVGroup_Formation_In_2-1 = "我會努力的！"
26003-CVGroup_Growup_1-1 = "感覺變得更健康了！"
26003-CVGroup_Growup_2-1 = "要是能把這股力量分給不舒服的人們就好了……"
26003-CVGroup_Growup_3-1 = "為了身體不舒服的人們，我會更加努力！"
26003-CVGroup_Growup_4-1 = "我也多少有所成長了嗎？嘿嘿嘿……"
26003-CVGroup_Relationship_Up_1-1 = "只要跟老師待在一起，我的心就彷彿被治癒了……"
26003-CVGroup_Relationship_Up_2-1 = "呵呵，真幸福呢～"
26003-CVGroup_Relationship_Up_3-1 = "雖然無法成為老師專屬的主治醫生……\n我會隨時關心著老師的。"
26003-CVGroup_Relationship_Up_4-1 = "就由我們來打造和平的世界吧！"

10080-CVGroup_Formation_Select-1 = "흐으으응~?"
10080-CVGroup_Tactic_In_1-1 = "어머, 이런 것도 해?"
10080-CVGroup_Tactic_In_2-1 = "오늘은 기분이 좋아서 다행이네?"

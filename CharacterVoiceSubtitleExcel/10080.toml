10080-CVGroup_Growup_4-1 = "힘을 쓰기가 수월해진 느낌이야. ……궁금해? 테스트 해 줄까?"
10080-CVGroup_Relationship_Up_1-1 = "당신은 다른 사람한테도 이런 식으로 굴어?\n우후훗...... 이건 분명 상당한 인기력일 거야."
10080-CVGroup_Relationship_Up_2-1 = "흐응…… 이것도 '선생님'이라서 그런가?"
10080-CVGroup_Relationship_Up_3-1 = "가끔은 머릿속을 읽어볼까 생각하긴 해. ……걱정 마. 아직 안 했으니까."
10080-CVGroup_Relationship_Up_4-1 = "잠깐… 외지인에게 너무 과한 것 아닐까?"
10080-CVGroup_Battle_Buffed_1-1 = "도움이 되는걸."

[translation]
10080-CVGroup_CommonSkill-1 = "직접 움직이는 타입은 아니거든."
10080-CVGroup_ExSkill_1-1 = "흐응. 정말로 괜찮을까나?"
10080-CVGroup_ExSkill_2-1 = "이렇게까진 안하려 했는데……."
10080-CVGroup_ExSkill_3-1 = "정말이지, 어쩔 수가 없네~?"
10080-CVGroup_ExSkill_Level_1-1 = "결국 이렇게 될거잖아?"
10080-CVGroup_ExSkill_Level_2-1 = "그러니까, 말했잖아?"
10080-CVGroup_ExSkill_Level_3-1 = "마음대로 해보라구"
10080-CVGroup_Growup_1-1 = "나쁘지 않은걸? 대신…… 나는 뭘 해줄 수 있을까나?"
10080-CVGroup_Growup_2-1 = "빚 지고 사는 성격은 아닌데……. 기억해 둘게."

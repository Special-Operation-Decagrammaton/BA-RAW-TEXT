10080-CVGroup_Battle_Defense_1-1 = "부질 없는 짓을 하네~?"
10080-CVGroup_Battle_In_1-1 = "뭐, 어디까지나 도와주는 거니까."
10080-CVGroup_Battle_In_2-1 = "조금이지만, 움직여 볼까?"
10080-CVGroup_Battle_Move_1-1 = "아직 남았다고……?"
10080-CVGroup_Battle_Move_2-1 = "이게 끝이 아니라고~?"
10080-CVGroup_Battle_Recovery_1-1 = "고마워☆"
10080-CVGroup_Battle_TacticalAction_1-1 = "으읏!"
10080-CVGroup_Battle_Victory_1-1 = "그래도 꽤 여유력[力] 있는 싸움이었지?"
10080-CVGroup_Battle_Victory_2-1 = "도와준 빚은 나중에 다 받아낼 거니까~?"
10080-CVGroup_Formation_In_1-1 = "앞으로 나서는 타입은 아닌데."

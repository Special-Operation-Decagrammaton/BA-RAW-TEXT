[translation]
10080-CVGroup_CommonSkill-1 = "我不是自己動手的類型。"
10080-CVGroup_ExSkill_1-1 = "哼嗯……真的沒問題嗎？"
10080-CVGroup_ExSkill_2-1 = "本來沒打算做到這種程度的……"
10080-CVGroup_ExSkill_3-1 = "真是拿你沒辦法。"
10080-CVGroup_ExSkill_Level_1-1 = "結果還是變成這樣了呢。"
10080-CVGroup_ExSkill_Level_2-1 = "所以我不是說過了嗎？"
10080-CVGroup_ExSkill_Level_3-1 = "隨你高興吧？"
10080-CVGroup_Growup_1-1 = "好像也不錯？\n那……我該怎麼做好呢？"
10080-CVGroup_Growup_2-1 = "雖然我秉持著不欠人情的主義……\n我會記住的。"
10080-CVGroup_Growup_3-1 = "有種腦袋煥然一新的感覺？"
10080-CVGroup_Growup_4-1 = "感覺好像更容易施展能力了。\n……嗯？在意的話要不要試試看？"
10080-CVGroup_Relationship_Up_1-1 = "你對待其他人也是這種感覺嗎？\n唔呵呵……肯定有相當的人氣吧。"
10080-CVGroup_Relationship_Up_2-1 = "哼……這也是因為你是「老師」嗎？"
10080-CVGroup_Relationship_Up_3-1 = "我偶爾也會想偷看一下你的腦袋的哦？\n……啊，我還沒那麼做過所以不必擔心。"
10080-CVGroup_Relationship_Up_4-1 = "我說……這樣對待外人不會太超過了嗎？"
10080-CVGroup_Battle_Buffed_1-1 = "很有幫助哦。"
10080-CVGroup_Battle_Covered_1-1 = "哎呀哎呀。"
10080-CVGroup_Battle_Defense_1-1 = "是在白費力氣呢？"
10080-CVGroup_Battle_In_1-1 = "算了，反正也只是順手幫忙而已。"
10080-CVGroup_Battle_In_2-1 = "就稍微試試看吧。"
10080-CVGroup_Battle_Move_1-1 = "還沒完嗎……？"
10080-CVGroup_Battle_Move_2-1 = "還沒結束嗎……？"
10080-CVGroup_Battle_Recovery_1-1 = "謝謝☆"
10080-CVGroup_Battle_TacticalAction_1-1 = "唔……！"
10080-CVGroup_Battle_Victory_1-1 = "是場能感受到餘裕力的戰鬥哦☆"
10080-CVGroup_Battle_Victory_2-1 = "這份人情，之後可要請你悉數奉還哦？"
10080-CVGroup_Formation_In_1-1 = "我明明不是會挺身而出的類型啊。"
10080-CVGroup_Formation_In_2-1 = "如果你說有必要的話，幫幫你也行啦。"
10080-CVGroup_Formation_Select-1 = "哼嗯～？"
10080-CVGroup_Tactic_In_1-1 = "哎呀，這種事也得做嗎？"
10080-CVGroup_Tactic_In_2-1 = "幸好今天我心情好呢？"
10080-CVGroup_Tactic_Victory_1-1 = "我都這麼努力了……難道沒有什麼獎勵嗎～？"
10080-CVGroup_Tactic_Victory_2-1 = "做不到這種話，我可沒說過哦☆"

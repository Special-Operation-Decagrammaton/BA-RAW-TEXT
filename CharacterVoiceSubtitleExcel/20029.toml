[translation]
20029-CVGroup_CommonSkill-1 = "กินเยอะๆ แล้วค่อยไปนะคะ"
20029-CVGroup_ExSkill_1-1 = "ฮึบ ฮึบ...\nคุณครู ตรงนี้ค่ะ"
20029-CVGroup_ExSkill_2-1 = "เอาละ เตรียมพร้อมแล้ว...\nมาแล้วเหรอคะ คุณครู"
20029-CVGroup_ExSkill_3-1 = "ทะเลสวยจังเลยนะคะ.....\nค่ะ กำลังรออยู่เลยค่ะ"
20029-CVGroup_ExSkill_Level_1-1 = "ก็การพักผ่อนสำคัญนี่คะ"
20029-CVGroup_ExSkill_Level_2-1 = "ต้องระวังรังสียูวีนะคะ"
20029-CVGroup_ExSkill_Level_3-1 = "ทุกคนคะ ถ้าไม่ติดอะไรก็ทานเลยค่ะ"
20029-CVGroup_Formation_In_1-1 = "ค่ะ คุณครู\nฉันกำลังรออยู่เลยค่ะ"
20029-CVGroup_Formation_In_2-1 = "รู้สึก... ตื่นเต้นจังเลยนะคะ...\nฤดูร้อนแบบไหนกำลังรอพวกฉันอยู่นะคะ?"
20029-CVGroup_Growup_1-1 = "การฝึกภาคฤดูร้อน... ฮุฮุ ดีใจจังค่ะ"
20029-CVGroup_Growup_2-1 = "นี่คือ... ผลจากการฝึกหรือเปล่าคะ?\nหรือว่าจากการช่วยของคุณครูคะ...?"
20029-CVGroup_Growup_3-1 = "เพราะมีคุณครูคอยเฝ้าดู...\nฉันก็เลยเติบโตถึงขนาดนี้เลยค่ะ ขอบคุณนะคะ"
20029-CVGroup_Growup_4-1 = "รู้สึกว่า... น่าคาดหวังมากเลยนะคะ\nตอนนี้ฉันใจเต้นตึกตัก..ก็เลยมีความสุขค่ะ"
20029-CVGroup_Relationship_Up_1-1 = "ถ้าได้อยู่กับคุณครูละก็...\nรู้สึกเหมือนจะมีเรื่องดีๆ เกิดขึ้นเสมอเลยค่ะ "
20029-CVGroup_Relationship_Up_2-1 = "ถ้าทำได้ ฉันก็อยากอยู่หลังคุณครูหนึ่งก้าว...\nอ่า... พอจะพูดก็เขินนะคะ..."
20029-CVGroup_Relationship_Up_3-1 = "เวลานี้ที่ฉันได้อยู่กับคุณครู...\nมีความสุขจังเลยค่ะ..."
20029-CVGroup_Relationship_Up_4-1 = "คือว่า... คุณครูคะ\nเปล่าค่ะ ไม่มีอะไรค่ะ\nเอ่อ... ช่วยรอเดี๋ยวหนึ่งนะคะ อีกนิดหนึ่ง"

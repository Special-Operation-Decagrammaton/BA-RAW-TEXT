[translation]
20029-CVGroup_CommonSkill-1 = "많이 먹고 가세요."
20029-CVGroup_ExSkill_1-1 = "영차, 영차…… 선생님, 여기에요."
20029-CVGroup_ExSkill_2-1 = "자, 준비는 만전…… 오셨어요, 선생님."
20029-CVGroup_ExSkill_3-1 = "멋진 바다네요..... 네, 기다리고 있었습니다."
20029-CVGroup_ExSkill_Level_1-1 = "휴식은 중요하니까요."
20029-CVGroup_ExSkill_Level_2-1 = "자외선에는 조심하셔야 해요?"
20029-CVGroup_ExSkill_Level_3-1 = "여러분, 괜찮으시다면 드세요."
20029-CVGroup_Formation_In_1-1 = "네. 선생님. 기다리고 있었답니다."
20029-CVGroup_Formation_In_2-1 = "뭔가, 기대되네요…… 어떤 여름이, 저희를 기다리고 있을까요?"
20029-CVGroup_Growup_1-1 = "여름의 수행…… 후훗. 기쁘네요."
20029-CVGroup_Growup_2-1 = "이것은…… 수행의 성과일까요. 아니면 선생님 덕분, 일까요……?"
20029-CVGroup_Growup_3-1 = "선생님께서 지켜 봐 주신 덕분에……\n저, 이렇게나 성장했답니다. 감사드려요."
20029-CVGroup_Growup_4-1 = "뭔가…… 엄청나게 기대가 되네요.\n저, 지금 가슴이 두근두근 거려서...행복해요."
20029-CVGroup_Relationship_Up_1-1 = "선생님과 함께라면…… 언제나, 좋은 일이 일어날 것 같아요."
20029-CVGroup_Relationship_Up_2-1 = "할 수 있다면 선생님의 반 걸음 뒤에서……\n하으으, 말로 하려니까 부끄러워요……"
20029-CVGroup_Relationship_Up_3-1 = "……행복하네요. 선생님과 함께하는 이 시간……"
20029-CVGroup_Relationship_Up_4-1 = "있잖아요, 선생님……\n아니요, 아무것도 아니에요.\n그…… 조금만 더 기다려 주세요. 조금만, 더."

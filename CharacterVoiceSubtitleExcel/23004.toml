[translation]
23004-CVGroup_CommonSkill-1 = "เจ้าสายฟ้า... เข้าโหมดต่อสู้!"
23004-CVGroup_ExSkill_1-1 = "เอาละ ลุยเลย"
23004-CVGroup_ExSkill_2-1 = "อืม เป็นเด็กดีจัง"
23004-CVGroup_ExSkill_3-1 = "ซ่อมบำรุงเสร็จสิ้น เริ่มใช้งานได้"
23004-CVGroup_ExSkill_Level_1-1 = "นี่คือสัตว์ดุร้ายแห่งมิลเลเนียม"
23004-CVGroup_ExSkill_Level_2-1 = "ทักษะที่สั่งสมมา ตั้งใจดูให้เต็มตาล่ะ"
23004-CVGroup_ExSkill_Level_3-1 = "เก้าอี้ตัวนี้จะทำลายพวกแก"
23004-CVGroup_Formation_In_1-1 = "ความเหนือชั้นทางเทคโนโลยีคือตัวตัดสินชัยชนะ"
23004-CVGroup_Formation_In_2-1 = "เลือกได้มีเหตุผลมาก"
23004-CVGroup_Growup_1-1 = "การเอาใจใส่ของคุณครูเนี่ย... อบอุ่นจัง"
23004-CVGroup_Growup_2-1 = "การอัปเกรดคือการเพิ่มคุณภาพของชีวิตนะ\nและฉันเองก็เป็นอย่างนั้นด้วย"
23004-CVGroup_Growup_3-1 = "ยิ่งใช้อุปกรณ์มากเท่าไร ก็จะยิ่งเข้าใจความอ่อนโยนที่อุปกรณ์นั้นมี"
23004-CVGroup_Growup_4-1 = "การทำของบางอย่างเพื่อใครบางคน นั่นละความสุขของไมสเตอร์"
23004-CVGroup_Relationship_Up_1-1 = "ฉันเอาแต่ประดิษฐ์ของในห้อง... ก็เลยคุยกับใครไม่เก่ง\nแต่กับคุณครูนั้นต่างออกไปนะ"
23004-CVGroup_Relationship_Up_2-1 = "น่าทึ่งจังเลยนะ จิตใจของมนุษย์\nคือกลไกอะไรไม่รู้ แต่มันทำฉันใจสั่นเลย"
23004-CVGroup_Relationship_Up_3-1 = "ถึงมันจะเป็นแค่ความเฟ้อฝัน แต่สักวันฉันอยากไปจักรวาลดูน่ะ\nถึงจะไม่ง่าย แต่ตอนนั้น... ฉันจะพาคุณครูไปด้วยนะ"
23004-CVGroup_Relationship_Up_4-1 = "ฉันจะอยู่ในห้องทำงานตลอด\nถ้าอยากได้ความช่วยเหลือ... ก็มาที่นี่ได้ทุกเมื่อนะ คุณครู..."

[translation]
23004-CVGroup_CommonSkill-1 = "천둥의 옥좌……. 전투 모드!"
23004-CVGroup_ExSkill_1-1 = "자아. 날뛰어라."
23004-CVGroup_ExSkill_2-1 = "흐음. 착한 아이네."
23004-CVGroup_ExSkill_3-1 = "정비 완료, 작동 개시."
23004-CVGroup_ExSkill_Level_1-1 = "이것이 밀레니엄의 맹수다."
23004-CVGroup_ExSkill_Level_2-1 = "갈고 닦은 기술력. 확실히 목도하도록 해."
23004-CVGroup_ExSkill_Level_3-1 = "이 의자가 너희를 파멸시킬 것이다."
23004-CVGroup_Formation_In_1-1 = "기술의 우위야말로 승리를 결정짓는 요소야."
23004-CVGroup_Formation_In_2-1 = "합리적인 선택이야."
23004-CVGroup_Growup_1-1 = "선생님의 배려는, 따뜻하네."
23004-CVGroup_Growup_2-1 = "업그레이드는 삶의 질을 상승시키지. 그리고 나도, 그렇게 되었어."
23004-CVGroup_Growup_3-1 = "기계를 다루면 다룰수록 기계에 담긴 상냥함을 이해하게 돼."
23004-CVGroup_Growup_4-1 = "누군가를 위해, 무언가를 만든다. 그것이 마이스터의 행복인 거야."
23004-CVGroup_Relationship_Up_1-1 = "공방에서 물건만 만드느라……. 대화는 서툴지만, 선생님은 좀 다르네."
23004-CVGroup_Relationship_Up_2-1 = "신기하네. 인간의 마음이란. 어떤 매커니즘인지 모르겠지만, 두근거려."
23004-CVGroup_Relationship_Up_3-1 = "아직은 로망에 가깝지만, 언젠가 우주에 가보고 싶어.\n쉽진 않겠지만 그때는……. 선생님도 데려가 줄게."
23004-CVGroup_Relationship_Up_4-1 = "나는 언제나 이 공방에 있을 거야.\n도움이 필요할 때엔……. 언제든 이곳에 와줘.\n선생님……."

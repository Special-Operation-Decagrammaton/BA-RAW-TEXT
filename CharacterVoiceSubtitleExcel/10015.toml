[translation]
10015-CVGroup_Battle_Buffed_1-1 = "獲得了BUFF！"
10015-CVGroup_Battle_Defense_1-1 = "沒有問題。"
10015-CVGroup_Battle_In_1-1 = "愛麗絲就在這裡。\n愛麗絲會幫忙。"
10015-CVGroup_Battle_In_2-1 = "光，將會指引路線吧。"
10015-CVGroup_Battle_Move_1-1 = "愛麗絲，繼續前進。"
10015-CVGroup_Battle_Move_2-1 = "目標確認，要上了！"
10015-CVGroup_Battle_Recovery_1-1 = "是HP藥劑！"
10015-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10015-CVGroup_Battle_Victory_1-1 = "因為有夥伴在，所以並不害怕。"
10015-CVGroup_Battle_Victory_2-1 = "勇氣！這就是最棒的魔法！"
10015-CVGroup_CommonSkill-1 = "進行充電！"
10015-CVGroup_ExSkill_1-1 = "魔力充電……100%。\n要上了！"
10015-CVGroup_ExSkill_2-1 = "確認目標。\n突破輸出臨界點……！"
10015-CVGroup_ExSkill_3-1 = "粉碎邪惡的正義一擊……"
10015-CVGroup_ExSkill_Level_1-1 = "光呀！\n能量超載……釋放。"
10015-CVGroup_ExSkill_Level_2-1 = "愛麗絲，會全力以赴！"
10015-CVGroup_ExSkill_Level_3-1 = "將意志貫注於這道光，貫穿吧！\n平衡崩壞！！"
10015-CVGroup_Formation_In_1-1 = "愛麗絲，與隊伍會合。"
10015-CVGroup_Formation_In_2-1 = "我的職責……是輸出對吧。"
10015-CVGroup_Formation_Select-1 = "啟動準備完畢。"
10015-CVGroup_Growup_1-1 = "Level UP！獲得了好多經驗值！"
10015-CVGroup_Growup_2-1 = "遇見大家之後，學會了遊戲和友情。\n老師會教愛麗絲什麼呢？"
10015-CVGroup_Growup_3-1 = "請看，老師。\n愛麗絲已經能夠理解笑容這件事了。"
10015-CVGroup_Growup_4-1 = "老師！現在的愛麗絲是這世界最強的戰士！"

10015-CVGroup_Relationship_Up_2-1 = "與新遊戲初次相遇的時候、等級提升與裝備強化成功的時候……\n每當遇見老師，愛麗絲總是會感受到難以歸類的奇妙感覺。"
10015-CVGroup_Relationship_Up_3-1 = "與老師接觸之後，愛麗絲的內心就進行了某種編譯……\n巨大到無法換算成數值的，這股心情的名字是……"
10015-CVGroup_Relationship_Up_4-1 = "能夠遇見老師……\n愛麗絲很幸福。"
10015-CVGroup_Tactic_In_1-1 = "已確認前方對象。前進。"
10015-CVGroup_Tactic_In_2-1 = "老師！請指示！"
10015-CVGroup_Tactic_Victory_1-1 = "攻略完畢！開始返回。"
10015-CVGroup_Tactic_Victory_2-1 = "已確認敵方殲滅。Mission Clear。"

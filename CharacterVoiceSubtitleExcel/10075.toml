[translation]
10075-CVGroup_Battle_Buffed_1-1 = "Thank you～！"
10075-CVGroup_Battle_Covered_1-1 = "快躲起來！"
10075-CVGroup_Battle_Defense_1-1 = "嘿嘿～打不中的唷！"
10075-CVGroup_Battle_In_1-1 = "那麼～來尋找新刊的素材吧！"
10075-CVGroup_Battle_In_2-1 = "接下來～該從哪裡著手呢～"
10075-CVGroup_Battle_Move_1-1 = "接下來～該往哪裡呢～"
10075-CVGroup_Battle_Move_2-1 = "試著前進吧～"
10075-CVGroup_Battle_Recovery_1-1 = "眼睛都亮起來了！"
10075-CVGroup_Battle_TacticalAction_1-1 = "好，要上囉……！"
10075-CVGroup_Battle_Victory_1-1 = "結果不錯嘛！\n說不定我，意外地也有這方面的才能哦？"
10075-CVGroup_Battle_Victory_2-1 = "嗯嗯！感覺不錯！\n順著這股氣勢把原稿也……！"
10075-CVGroup_CommonSkill-1 = "上吧～！"
10075-CVGroup_ExSkill_1-1 = "這，這是……！\n呵呵呵呵……！"
10075-CVGroup_ExSkill_2-1 = "來了……！\n來了來了來了……！"
10075-CVGroup_ExSkill_3-1 = "哈……！？\n靈感……！"
10075-CVGroup_ExSkill_Level_1-1 = "唔哦哦哦哦哦！\n怎麼樣啊！這個！"
10075-CVGroup_ExSkill_Level_2-1 = "呀啊啊啊啊！\n完成了！"
10075-CVGroup_ExSkill_Level_3-1 = "一鼓作氣……！\n好，完稿！"
10075-CVGroup_Formation_In_1-1 = "哦哦？感覺到了素材的氣息……！"
10075-CVGroup_Formation_In_2-1 = "畢竟我的專長是畫畫嘛～"
10075-CVGroup_Formation_Select-1 = "那邊的，STOP！\n就這樣維持姿勢！沒錯沒錯。"
10075-CVGroup_Growup_1-1 = "我來，我見，我變強！"
10075-CVGroup_Growup_2-1 = "要是畫畫的技術也能像這樣簡單易懂的提昇就好了。"
10075-CVGroup_Growup_3-1 = "這也是多虧了老師呢。\n作為回禮，下次幫你畫畫吧。"
10075-CVGroup_Growup_4-1 = "啊啊，居然能變得這麼強。\n自己的成長真令人害怕～"
10075-CVGroup_Relationship_Up_1-1 = "呃……那個，怎麼說呢，這種時候，就得說那個才行對吧……\n所以，就是……果然還是不行！"
10075-CVGroup_Relationship_Up_2-1 = "妄想永遠無敵！\n說是這麼說，但這個狀況……是現實對吧……？唔啊啊啊啊……"
10075-CVGroup_Relationship_Up_3-1 = "我實在不得不感到佩服。居然為我這種人做到這種程度……\n……謝謝你，老師。這是我的真心話。"
10075-CVGroup_Relationship_Up_4-1 = "羈絆這個詞……明明具有很深的意義，感覺卻被用得很隨便……\n不過那個……我似乎也很想珍惜與老師之間的羈絆。"
10075-CVGroup_Tactic_In_1-1 = "來，走吧。"
10075-CVGroup_Tactic_In_2-1 = "呵呵……這裡究竟會有什麼呢？"
10075-CVGroup_Tactic_Victory_1-1 = "呼呣呼呣，還不錯哦。"
10075-CVGroup_Tactic_Victory_2-1 = "就是這個，這個！"

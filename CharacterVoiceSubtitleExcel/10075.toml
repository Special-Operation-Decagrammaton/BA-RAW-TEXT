10075-CVGroup_Battle_Defense_1-1 = "แหะๆ ไม่โดนหรอกน่า!"
10075-CVGroup_Battle_In_1-1 = "ถ้าอย่างนั้น~ ไปหาพล็อตเรื่องหนังสือเล่มใหม่กันเลย!"
10075-CVGroup_Battle_In_2-1 = "เอ้า~ ควรเริ่มลงมือจากตรงไหนดีนะ~"
10075-CVGroup_Battle_Move_1-1 = "ต่อไป~ คือที่ไหนกันน้า~"
10075-CVGroup_Battle_Move_2-1 = "ไปกันเลยมั้ย~"
10075-CVGroup_Battle_Recovery_1-1 = "ตาสว่างขึ้นเยอะเลย!"
10075-CVGroup_Battle_TacticalAction_1-1 = "เยี่ยม ลุยละนะ...!"
10075-CVGroup_Battle_Victory_1-1 = "ผลลัพธ์ไม่แย่เลยนะ!\nน่าแปลกจัง ฉันอาจมีพรสวรรค์ด้านนี้ก็ได้นะ?"
10075-CVGroup_Battle_Victory_2-1 = "อื้อ รู้สึกดีจัง!\nด้วยแรงผลักดันนี้ ต้นฉบับของฉัน...!"
10075-CVGroup_CommonSkill-1 = "ไปเลย~!"
10075-CVGroup_ExSkill_1-1 = "นะ... นี่มัน...! ฮุฮุ ฮุฮุฮุฮุ...!"
10075-CVGroup_ExSkill_2-1 = "มาแล้ว...! มาแล้วๆๆ...!"
10075-CVGroup_ExSkill_3-1 = "ฮ่ะ...?! แรงบันดาลใจ...!"
10075-CVGroup_ExSkill_Level_1-1 = "อู้วววว! เป็นไง! เจ้านี่น่ะ!"
10075-CVGroup_ExSkill_Level_2-1 = "ย้าาา! เสร็จแล้ว!"
10075-CVGroup_ExSkill_Level_3-1 = "อึดใจเดียว...! ดีละ ต้นฉบับเสร็จแล้ว!"
10075-CVGroup_Formation_In_1-1 = "โอ้? สัญญาณของพล็อตเรื่องใหม่...!"
10075-CVGroup_Formation_In_2-1 = "เพราะการวาดรูปคือสิ่งที่ฉันถนัดยังไงล่ะ~"
10075-CVGroup_Formation_Select-1 = "นี่ สต็อป!\nโพสท่าแบบนั้นแหละ! ใช่แล้วๆ"
10075-CVGroup_Growup_1-1 = "มาแล้วๆ เห็นแล้ว แข็งแกร่งขึ้นแล้ว!"
10075-CVGroup_Growup_2-1 = "ถ้าฝีมือการวาดรูปของฉันพัฒนาได้ง่ายแบบนี้ก็คงจะดี"
10075-CVGroup_Growup_3-1 = "นี่เป็นเพราะคุณครูเลยนะ\nฉันจะวาดรูปเหมือนของคุณครูให้เป็นการตอบแทนนะ"
10075-CVGroup_Growup_4-1 = "อ่า แข็งแกร่งขึ้นขนาดนี้เลยเหรอเนี่ย\nฉันเริ่มกลัวความเร็วในการพัฒนาของตัวเองแล้วเนี่ย~"
10075-CVGroup_Relationship_Up_1-1 = "อืม... จะว่ายังไงดีล่ะ เวลาแบบนี้คงจะต้องพูดคำคำนั้นสินะ...\nคือว่าเอ่อ... ไม่ไหวละ!"
10075-CVGroup_Relationship_Up_2-1 = "ความเพ้อฝันอยู่ยงคงกระพันเสมอ...\nแต่ว่าสถานการณ์ตอนนี้... คือเรื่องจริงใช่มั้ย...? อ่าาาา..."
10075-CVGroup_Relationship_Up_3-1 = "ครูเองก็สุดยอดเลยนะ ทำให้ฉันถึงขนาดนี้...\nขะ... ขอบคุณนะครู ฉันพูดจริงๆ นะ"
10075-CVGroup_Relationship_Up_4-1 = "คำว่าโชคชะตาน่ะ... ดูเหมือนจะถูกใช้บ่อยเกินไป\nเมื่อเทียบกับน้ำหนักของความหมายของมัน...\nคือ... ฉันจะรักษาความสัมพันธ์ของฉันกับคุณครูไว้อย่างดี"
10075-CVGroup_Tactic_In_1-1 = "เอ้า ไปกันเลยมั้ย"
10075-CVGroup_Tactic_In_2-1 = "ฮุฮุ... ที่นี่จะมีอะไรอยู่กันนะ"
10075-CVGroup_Tactic_Victory_1-1 = "ฮึ่ม ก็ไม่แย่เท่าไร"
10075-CVGroup_Tactic_Victory_2-1 = "นี่แหละ นี่แหละ!"

10075-CVGroup_Relationship_Up_4-1 = "인연이란 단어 말야…… 의미의 무게에 비해서는 너무 자주 쓰이는 것 같지만……\n그…… 나는 선생과의 인연을, 소중히 하고 싶을지도."

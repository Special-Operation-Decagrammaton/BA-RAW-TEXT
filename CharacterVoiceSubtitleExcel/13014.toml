[translation]
13014-CVGroup_Battle_Buffed_1-1 = "อื้ม! เวลาเหมาะเลยละ!"
13014-CVGroup_Battle_Covered_1-1 = "เล็งไปที่ไหนน่ะ!"
13014-CVGroup_Battle_Defense_1-1 = "ฮ่าฮ่า! ช้าชะมัด!"
13014-CVGroup_Battle_In_1-1 = "เอาละ มาใช้ชีวิตวัยรุ่นกันเถอะ! "
13014-CVGroup_Battle_In_2-1 = "จะเล่นน้ำแล้วนะ!"
13014-CVGroup_Battle_Move_1-1 = "ต่อไปคือทางนั้นเหรอ?"
13014-CVGroup_Battle_Move_2-1 = "ตามฉันมา!"
13014-CVGroup_Battle_Recovery_1-1 = "โอ้ว มีแรงขึ้นมาเลยละ!"
13014-CVGroup_Battle_TacticalAction_1-1 = "จะไปละนะ!"
13014-CVGroup_Battle_Victory_1-1 = "ฮุฮุ นี่แหละพลังของวัยรุ่น!"
13014-CVGroup_Battle_Victory_2-1 = "ต่อไปให้เป็นหน้าที่ของฉันเอง!"
13014-CVGroup_CommonSkill-1 = "เติมพลังวัยรุ่น!"
13014-CVGroup_ExSkill_1-1 = "คลื่นแห่งวัยรุ่น จงถาโถม!"
13014-CVGroup_ExSkill_2-1 = "เตรียมพร้อมสนุกกับฤดูร้อนรึยัง?"
13014-CVGroup_ExSkill_3-1 = "หลีกไปๆ หลีกไป!"
13014-CVGroup_ExSkill_Level_1-1 = "ฮะฮ่า รับไปซะ!"
13014-CVGroup_ExSkill_Level_2-1 = "โดนคลื่นซัดหายไปซะ!"
13014-CVGroup_ExSkill_Level_3-1 = "ปืนใหญ่วัยรุ่น ยิงได้!"
13014-CVGroup_Formation_In_1-1 = "อื้อ! ถึงตาฉันแล้วละ!"
13014-CVGroup_Formation_In_2-1 = "ฉันจะแสดงพลังของวัยรุ่นให้เห็นเอง!"
13014-CVGroup_Formation_Select-1 = "ดีละ! ไม่ว่าอยู่ที่ไหนก็ไว้ใจฉันได้เลย!"
13014-CVGroup_Growup_1-1 = "ขะ... ขอบคุณนะท่านอาจารย์!\nฉันเติบโตได้อีกขั้นเพราะท่านอาจารย์เลย แหะๆ"
13014-CVGroup_Growup_2-1 = "เจ้าสิ่งนี้จะทำให้พลังแห่งวัยรุ่นของฉันแข็งแกร่งขึ้น!\nท่านอาจารย์ก็มาเป็นวัยรุ่นไปด้วยกันเถอะ!"
13014-CVGroup_Growup_3-1 = "โอ้ว รู้สึกเหมือนแข็งแกร่งขึ้นเลย!\nทั้งหมดนี้ต้องขอบคุณการฝึกฝนกับอาจารย์เลยนะ!"
13014-CVGroup_Growup_4-1 = "รู้สึกเหมือนตัวเองได้เติบโตขึ้นหลังผ่านคลื่นกระหน่ำในชีวิตมาเลย...\nนี่ก็เป็นช่วงวัยรุ่นสินะ?"
13014-CVGroup_Relationship_Up_1-1 = "อืม ฉันจะแสดงความรู้สึกขอบคุณนี้ยังไงดีนะ\nขอโทษนะที่เป็นผู้รับอยู่ฝ่ายเดียวเลย"
13014-CVGroup_Relationship_Up_2-1 = "วะ... เวลาอยู่กับท่านอาจารย์ ใจจะเต้นแปลกๆ น่ะ\nความรู้สึกนี้... โอ๊ย ไม่รู้แล้ว!"
13014-CVGroup_Relationship_Up_3-1 = "นี่คือความรู้สึกของท่านอาจารย์...\nสักวันความรู้สึกของฉัน...!"
13014-CVGroup_Relationship_Up_4-1 = "อยากกลับไปเป็นวัยรุ่นเหรอ...?\nฉะ... ฉันกับท่านอาจารย์...!"
13014-CVGroup_Tactic_In_1-1 = "ฉันจะชี้เส้นทางแห่งชัยชนะให้เห็นเอง!"
13014-CVGroup_Tactic_In_2-1 = "วันนี้ฉันแข็งแกร่งกว่าทุกวันเลย!"
13014-CVGroup_Tactic_Victory_1-1 = "ฮ่า สั่งการได้ยอดเยี่ยมมาก ท่านอาจารย์!"
13014-CVGroup_Tactic_Victory_2-1 = "หืม? จบแล้วเหรอ? ฉันยังสู้ได้อีกนะ!"

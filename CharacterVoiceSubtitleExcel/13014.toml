[translation]
13014-CVGroup_Battle_Buffed_1-1 = "음! 딱 좋은 타이밍!"
13014-CVGroup_Battle_Covered_1-1 = "어딜 노려!"
13014-CVGroup_Battle_Defense_1-1 = "핫하! 느려!"
13014-CVGroup_Battle_In_1-1 = "자, 모두 청춘하자!"
13014-CVGroup_Battle_In_2-1 = "물놀이 시작할게!"
13014-CVGroup_Battle_Move_1-1 = "다음은 저쪽인가?"
13014-CVGroup_Battle_Move_2-1 = "날 따라와!"
13014-CVGroup_Battle_Recovery_1-1 = "오, 기운이 솟아!"
13014-CVGroup_Battle_TacticalAction_1-1 = "이동할게!"
13014-CVGroup_Battle_Victory_1-1 = "후후, 이게 청춘의 힘이야!"
13014-CVGroup_Battle_Victory_2-1 = "다음에도 내게 맡겨 달라고!"
13014-CVGroup_CommonSkill-1 = "청춘 주입!"
13014-CVGroup_ExSkill_1-1 = "청춘의 파도여, 가라!"
13014-CVGroup_ExSkill_2-1 = "여름을 즐길 준비는 됐어?"
13014-CVGroup_ExSkill_3-1 = "비켜 비켜 비켜!"
13014-CVGroup_ExSkill_Level_1-1 = "하핫, 받아라!"
13014-CVGroup_ExSkill_Level_2-1 = "휩쓸려라!"
13014-CVGroup_ExSkill_Level_3-1 = "청춘포, 발사!"
13014-CVGroup_Formation_In_1-1 = "응! 내 차례네!"
13014-CVGroup_Formation_In_2-1 = "청춘의 힘을 보여줄게!"
13014-CVGroup_Formation_Select-1 = "좋아! 어디든 맡겨줘!"
13014-CVGroup_Growup_1-1 = "고, 고마워 스승님. 덕분에 나도 성장하고 있어. 헤헷."
13014-CVGroup_Growup_2-1 = "이걸로 청춘력이 더 강해졌어! 스승님도 같이 청춘하자!"
13014-CVGroup_Growup_3-1 = "오오, 뭔가 강해졌어! 모두 스승님과의 수련 덕분이야!"
13014-CVGroup_Growup_4-1 = "인생의 파도를 헤치고 한층 성장한 기분…… 이것도 청춘인 거지?"
13014-CVGroup_Relationship_Up_1-1 = "으으, 이 고마움을 어떻게 표현하지? 항상 받기만 해서는 미안한데."
13014-CVGroup_Relationship_Up_2-1 = "스, 스승님과 있으면 묘하게 가슴이 뛰어.\n이 감정은…… 아아 모르겠다!"
13014-CVGroup_Relationship_Up_3-1 = "이것이 스승님의 마음…… 언젠가, 나의 마음도……!"
13014-CVGroup_Relationship_Up_4-1 = "청춘하고 싶다고 생각해 주는 거야…? 나, 나도, 스승님과…!"
13014-CVGroup_Tactic_In_1-1 = "승리의 길을 보여줄게!"
13014-CVGroup_Tactic_In_2-1 = "오늘의 나는 평소보다 강하다고!"
13014-CVGroup_Tactic_Victory_1-1 = "아아. 훌륭한 지휘였어, 스승님!"
13014-CVGroup_Tactic_Victory_2-1 = "응? 벌써 끝이야? 난 더 할 수 있는데!"

[translation]
20048-CVGroup_CommonSkill-1 = "Hold it right there."
20048-CVGroup_ExSkill_1-1 = "It's been quite some time since I've took a break..."
20048-CVGroup_ExSkill_2-1 = "I'll be counting on you for the rest."
20048-CVGroup_ExSkill_3-1 = "Doing nothing is quite nice."
20048-CVGroup_ExSkill_Level_1-1 = "The sun feels nice."
20048-CVGroup_ExSkill_Level_2-1 = "Sea, wind, and black tea..."
20048-CVGroup_ExSkill_Level_3-1 = "Take it easy, everyone."
20048-CVGroup_Formation_In_1-1 = "Excellent weather for an outing."
20048-CVGroup_Formation_In_2-1 = "Let's finish quickly, and return to the sunbed."
20048-CVGroup_Formation_Select-1 = "*yawn*... Fufu."
20048-CVGroup_Growup_1-1 = "To take it this far...! Thank you, Sensei."
20048-CVGroup_Growup_2-1 = "Strength is a prerequisite for composure... Thank you, Sensei."
20048-CVGroup_Growup_3-1 = "This feeling... Like I've just finished a well-brewed cup of tea."
20048-CVGroup_Growup_4-1 = "How is it? Did I become strong enough?"
20048-CVGroup_Relationship_Up_1-1 = "The sun is warm, Sensei."
20048-CVGroup_Relationship_Up_2-1 = "The sunbed next to me happen to be empty... What do you say, Sensei?"
20048-CVGroup_Relationship_Up_3-1 = "Your presence makes the aroma of tea even more delectable."
20048-CVGroup_Relationship_Up_4-1 = "To be at the beach with you... This will be an unforgettable experience."

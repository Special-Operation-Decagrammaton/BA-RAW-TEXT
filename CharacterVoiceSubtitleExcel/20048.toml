[translation]
20048-CVGroup_CommonSkill-1 = "請停止吧。"
20048-CVGroup_ExSkill_1-1 = "能像這樣好好休息，已經時隔多久了呢……"
20048-CVGroup_ExSkill_2-1 = "接下來的事，就交給你了……"
20048-CVGroup_ExSkill_3-1 = "什麼事都不做──也不錯呢……"
20048-CVGroup_ExSkill_Level_1-1 = "陽光真舒服呢，呵呵。"
20048-CVGroup_ExSkill_Level_2-1 = "大海、微風、紅茶……"
20048-CVGroup_ExSkill_Level_3-1 = "慢慢來吧。"
20048-CVGroup_Formation_In_1-1 = "呵呵，真是適合出門的好天氣。"
20048-CVGroup_Formation_In_2-1 = "趕緊收拾完畢，盡情享受夏天吧。"
20048-CVGroup_Formation_Select-1 = "呼啊……啊。呵呵。"
20048-CVGroup_Growup_1-1 = "哎呀……謝謝您的關心。"
20048-CVGroup_Growup_2-1 = "正因為有能力，餘裕才能隨之而生。\n老師，非常謝謝您。"
20048-CVGroup_Growup_3-1 = "這股悸動……\n簡直就像遇見了好茶葉的時候呢。"
20048-CVGroup_Growup_4-1 = "我認為實力已經提升了不少……\n在老師眼裡，覺得如何呢？"
20048-CVGroup_Relationship_Up_1-1 = "萬里無雲的晴空……陽光真耀眼呢，老師。"
20048-CVGroup_Relationship_Up_2-1 = "老師，需要躺椅的話，我旁邊還有空位哦。\n不如在這裡稍微悠哉一下吧？"
20048-CVGroup_Relationship_Up_3-1 = "和老師一起的午茶時光……\n就算只是平常的茶葉也別具風味呢。"
20048-CVGroup_Relationship_Up_4-1 = "和老師一同來到的海邊……謝謝您讓我擁有這段美好的回憶。"

10060-CVGroup_Relationship_Up_1-1 = "เอ่อ อืม... อะไรน่ะ\nฉันไม่ค่อยเข้าใจหรอก ความรู้สึกนี้คืออะไรกัน?"
10060-CVGroup_Relationship_Up_2-1 = "พออยู่กับคุณครูแล้วสนุกจริงด้วยนะ~!\nเหตุผล...? นั่นสินะ ไม่เคยคิดมาก่อนเลยแฮะ?"
10060-CVGroup_Relationship_Up_3-1 = "มีอะไรที่ฉันพอจะช่วยได้... บ้างมั้ย?\nก็แค่... รู้สึกว่าอยากช่วยน่ะ"
10060-CVGroup_Relationship_Up_4-1 = "แปลกจังเลยแฮะ~ อากาศก็ไม่ได้ร้อนเท่าไหร่...\nแต่เวลาอยู่กับคุณครู มันรู้สึกร้อนๆ น่ะ"
10060-CVGroup_Tactic_In_1-1 = "ได้รับอนุญาตให้รื้อทิ้งแล้วละ~!"
10060-CVGroup_Tactic_In_2-1 = "มีของให้โล๊ะเยอะเลยนะ~!!"

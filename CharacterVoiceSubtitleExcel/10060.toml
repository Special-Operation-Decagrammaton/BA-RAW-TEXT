10060-CVGroup_Growup_1-1 = "โอ้~!! อะไรกันเนี่ย? รู้สึกมีพลังขึ้นเลยแฮะ?!"
10060-CVGroup_Growup_2-1 = "ขอบคุณที่สนับสนุนนะ~!\nฉันคงต้องพยายามให้มากขึ้นแล้วละ!"
10060-CVGroup_Growup_3-1 = "ยินดีมากเลยละ! ดีใจจัง!\nขอบคุณนะคุณครู!"

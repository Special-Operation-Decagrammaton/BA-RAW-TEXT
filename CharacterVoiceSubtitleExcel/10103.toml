10103-CVGroup_Relationship_Up_1-1 = "ฉันคิดว่าการมองเห็นของฉันแคบกว่าคนอื่น...\nเพราะงั้นถ้าเป็นไปได้ก็คอยอยู่ข้างๆ ฉันด้วยล่ะ ครู"
10103-CVGroup_Relationship_Up_2-1 = "ฉันไม่ได้ชอบใส่ชุดที่เปิดเผยเกินไปแบบนี้หรอกนะ...\nเอาเถอะ ถ้าคุณครูชอบก็คงไม่มีปัญหาอะไร"
10103-CVGroup_Relationship_Up_3-1 = "ถ้าฉันตอบแทนคุณครูด้วยของอย่างอื่น\nที่ไม่ใช่เหรียญตราได้ก็คงดีนะ..."
10103-CVGroup_Relationship_Up_4-1 = "ฉันน่ะ... ไม่สิ พวกเราชาวเรดวินเทอร์เชื่อมั่นในคุณครูเสมอนะ"
10103-CVGroup_Tactic_In_1-1 = "เป็นทางที่ซับซ้อนดีจริงๆ..."
10103-CVGroup_Tactic_In_2-1 = "(ฉันไม่คุ้นกับเส้นทางเลยไม่มั่นใจนิดหน่อย...)"
10103-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ เห็นรึเปล่า นี่แหละคือพลังของเรดวินเทอร์ละ!"
10103-CVGroup_Tactic_Victory_2-1 = "เส้นทางที่เรดวินเทอร์มุ่งไปไม่มีคำว่าพ่ายแพ้อยู่ในนั้น!"

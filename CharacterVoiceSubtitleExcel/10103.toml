[translation]
10103-CVGroup_Battle_Buffed_1-1 = "뭐지? 이 힘은……"
10103-CVGroup_Battle_Covered_1-1 = "대열을 정비한다!"
10103-CVGroup_Battle_Defense_1-1 = "금강불괴!"
10103-CVGroup_Battle_In_1-1 = "위대한 붉은겨울을 위하여!"
10103-CVGroup_Battle_In_2-1 = "키보토스 끝까지, 전진!"
10103-CVGroup_Battle_Move_1-1 = "적을 추격하라!"
10103-CVGroup_Battle_Move_2-1 = "돌격! 그리고 또 돌격!"
10103-CVGroup_Battle_Recovery_1-1 = "협력에 감사하지."
10103-CVGroup_Battle_TacticalAction_1-1 = "머뭇거릴 시간이 없다!"
10103-CVGroup_Battle_Victory_1-1 = "단련에 힘쓴 보람이 있군."
10103-CVGroup_Battle_Victory_2-1 = "돌격이야말로, 궁극의 전법!"
10103-CVGroup_CommonSkill-1 = "기습, 성공이다!"
10103-CVGroup_ExSkill_1-1 = "이곳은 도대체… 우왓?!"
10103-CVGroup_ExSkill_2-1 = "이런 숲속에 뭐가 있다고… 버, 벌이다?!"
10103-CVGroup_ExSkill_3-1 = "곰은 없는 건가… 으, 으악?!"
10103-CVGroup_ExSkill_Level_1-1 = "호 안에 벌집!"
10103-CVGroup_ExSkill_Level_2-1 = "떠, 떨어져!"
10103-CVGroup_ExSkill_Level_3-1 = "위험 요소는 즉각 배제한다!"
10103-CVGroup_Formation_In_1-1 = "음, 내가 직접 나서겠다!"
10103-CVGroup_Formation_In_2-1 = "움직이기 편하군!"
10103-CVGroup_Formation_Select-1 = "자, 잠깐! 이 스커트, 너무 트임이 심하지 않은가…!?"
10103-CVGroup_Growup_1-1 = "이런 것도 신선하고 나쁘지 않군."
10103-CVGroup_Growup_2-1 = "(이 책… 전에도 읽지 않았었던가?)"
10103-CVGroup_Growup_3-1 = "호오, 이것 참 흥미롭군."
10103-CVGroup_Growup_4-1 = "아무리 더워도… 훈련은 게을리해서는 안 되지."
10103-CVGroup_Relationship_Up_1-1 = "다른 사람보다 시야가 좁다는 자각은 있다…\n그러니 가능한 내 곁에 머물러 줘, 선생."
10103-CVGroup_Relationship_Up_2-1 = "이렇게 노출이 심한 옷은 취향이 아니지만…\n뭐, 선생이 좋다면 그것으로 문제없겠지."
10103-CVGroup_Relationship_Up_3-1 = "선생에게 훈장 이외의 보답을 할 수 있다면 좋을 텐데…"
10103-CVGroup_Relationship_Up_4-1 = "나는… 아니, 우리 붉은겨울은 언제나 선생을 믿고 있다."
10103-CVGroup_Tactic_In_1-1 = "꽤 복잡한 길인걸…"
10103-CVGroup_Tactic_In_2-1 = "(낯선 길은 조금 자신 없단 말이지…)"
10103-CVGroup_Tactic_Victory_1-1 = "후후, 보았나. 이것이 붉은겨울의 위력이다!"
10103-CVGroup_Tactic_Victory_2-1 = "붉은겨울이 가는 길에 패배란 없다!"

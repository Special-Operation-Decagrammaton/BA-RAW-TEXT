10103-CVGroup_ExSkill_1-1 = "ที่นี่คือที่ไหนกัน... ว้าก?!"
10103-CVGroup_ExSkill_2-1 = "ในป่าแบบนี้จะมีอะไรอยู่... มะ... แมลง?!"

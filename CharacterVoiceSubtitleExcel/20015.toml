[translation]
20015-CVGroup_CommonSkill-1 = "咚～！啊哈哈！"
20015-CVGroup_ExSkill_1-1 = "來，把我帥氣的身影……！\n唔啊！？呼……"
20015-CVGroup_ExSkill_2-1 = "在這裡大顯身手……！\n啊！？好險好險……"
20015-CVGroup_ExSkill_3-1 = "呵呵，在這裡使出必殺技……！\n呃啊！？嚇我一跳……"
20015-CVGroup_ExSkill_Level_1-1 = "信號彈，發射！\n上吧～！"
20015-CVGroup_ExSkill_Level_2-1 = "我也是能幫上忙的！"
20015-CVGroup_ExSkill_Level_3-1 = "面對危機的時候更要颯爽！\n我，登場！"
20015-CVGroup_Formation_In_1-1 = "哦，輪到我了嗎？\n交給我交給我！"
20015-CVGroup_Formation_In_2-1 = "我？我！是我耶～！\n加油加油！"
20015-CVGroup_Growup_1-1 = "哇～老師要給我這個嗎？\n耶嘿嘿，謝謝你～！"
20015-CVGroup_Growup_2-1 = "咦！？這個要給我！？\n好耶～！"
20015-CVGroup_Growup_3-1 = "哦哦，在全身膨漲的這股力量……！\n咦？沒有那種效果？\n什麼嘛，原來是錯覺啊……"
20015-CVGroup_Growup_4-1 = "咦？是老師送的禮物！？\n……這樣會讓我稍微長高一點嗎？"
20015-CVGroup_Relationship_Up_1-1 = "老師老師，今天有空嗎？\n要不要乾脆在修行部待一晚？"
20015-CVGroup_Relationship_Up_2-1 = "哦哦，這樣我也能成為優雅的淑女……！\n咦？可能不太一樣？\n嗯……？"
20015-CVGroup_Relationship_Up_3-1 = "老師願意陪我做些有的沒的，真的讓我很開心。\n嗯，超喜歡的。"
20015-CVGroup_Relationship_Up_4-1 = "聽說對重要的人就該送禮物！\n所以就把我的寶物……這顆發光的石頭送給老師！\n怎麼樣，閃閃發亮的對吧！？"

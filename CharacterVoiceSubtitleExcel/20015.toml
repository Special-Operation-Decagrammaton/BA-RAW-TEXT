[translation]
20015-CVGroup_CommonSkill-1 = "퍼~엉~! 아하핫!"
20015-CVGroup_ExSkill_1-1 = "자, 내 멋진 모습을……! 느왓! 후아……."
20015-CVGroup_ExSkill_2-1 = "여기서 대활약을……! 아앗?! 위험해 위험해……"
20015-CVGroup_ExSkill_3-1 = "후후, 여기서 필살기를……! 우앗! 까, 깜짝이야……."
20015-CVGroup_ExSkill_Level_1-1 = "신호탄 발사! 가라앗~!"
20015-CVGroup_ExSkill_Level_2-1 = "나라도 힘이 될 수 있으니까!"
20015-CVGroup_ExSkill_Level_3-1 = "위험한 순간이야말로 씩씩하게! 나! 등장!"
20015-CVGroup_Formation_In_1-1 = "어? 내 차례야?\n맡겨줘! 맡겨줘!"
20015-CVGroup_Formation_In_2-1 = "나? 나! 나다-!\n힘낼게! 힘낼게!"
20015-CVGroup_Growup_1-1 = "우와아~! 선생님 이거 주는 거야? 에헤헷! 고마워-!"
20015-CVGroup_Growup_2-1 = "어어?! 이거, 나한테?! 아싸-!"
20015-CVGroup_Growup_3-1 = "오오, 온몸에 넘치는 이 힘은……!\n아, 그런 효과는 없어? 뭐야, 기분 탓인가……."
20015-CVGroup_Growup_4-1 = "어, 선생님이 주는 선물?! ……이걸로 조금은, 키가 컸으려나?"
20015-CVGroup_Relationship_Up_1-1 = "선생님, 선생님! 오늘 한가해? 차라리 수행부에서 자고 갈래?!"
20015-CVGroup_Relationship_Up_2-1 = "오오-! 이것으로 나도 멋진 레이디가……!\n어, 그거랑은 좀 다른가? 으응……?"
20015-CVGroup_Relationship_Up_3-1 = "선생님이 뭔가 같이 놀아주는 거, 정말로 기뻐. 응, 진짜 좋아해!"
20015-CVGroup_Relationship_Up_4-1 = "소중한 사람에겐 선물을 주는 법이래!\n그러니 선생님에겐, 내 보물인…… 이 반짝이는 조약돌을 줄게! \n어때? 반짝반짝하지~?!"

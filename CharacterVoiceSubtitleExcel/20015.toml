[translation]
20015-CVGroup_CommonSkill-1 = "ตู้ม~! \nอ่ะฮ่าฮ่า!"
20015-CVGroup_ExSkill_1-1 = "เอาละ มาดูด้านเจ๋งๆ ของฉัน...!\nว้าก? เฮ้อ..."
20015-CVGroup_ExSkill_2-1 = "ฉันจะโชว์ผลงานดีๆ ที่นี่เลยละ...\nอ๊ะ?! อันตรายนะ อันตราย..."
20015-CVGroup_ExSkill_3-1 = "ฮุฮุ ใช้ท่าไม้ตายตรงนี้...!\nว้าก! ตะ... ตกใจหมดเลย..."
20015-CVGroup_ExSkill_Level_1-1 = "ยิงให้สัญญาณ!\nไปเลยย~!"
20015-CVGroup_ExSkill_Level_2-1 = "ฉันเองก็ช่วยได้นะ!"
20015-CVGroup_ExSkill_Level_3-1 = "ยิ่งเวลาที่อันตรายยิ่งต้องกล้าหาญ!\nฉัน! มาแล้ว!"
20015-CVGroup_Formation_In_1-1 = "เอ๋? ถึงตาฉันแล้วเหรอ?\nวางใจได้เลย! ให้เป็นหน้าที่ฉันเอง!"
20015-CVGroup_Formation_In_2-1 = "ฉัน? ฉัน? ฉันล่ะ!\nจะทำให้ดีเลย จะทำให้ดีที่สุด~"
20015-CVGroup_Growup_1-1 = "ว้าวว~! อันนี้คุณครูให้เหรอ?\nแหะๆๆ! ขอบคุณนะ! "
20015-CVGroup_Growup_2-1 = "เอ๋?! อันนี้... ให้ฉันเหรอ?! เย้!"
20015-CVGroup_Growup_3-1 = "โอ้ พลังล้นไปทั่วร่างกายเลย...!\nอ๊ะ ไม่มีผลแบบนั้นหรอกเหรอ? อะไรกัน คิดไปเองเหรอเนี่ย..."
20015-CVGroup_Growup_4-1 = "หืม ของขวัญจากคุณครูเหรอ?!\nอันนี้จะทำให้สูงขึ้นหน่อยมั้ยนะ?"
20015-CVGroup_Relationship_Up_1-1 = "คุณครู คุณครู! วันนี้ว่างมั้ย?\nมานอนที่ชมรมฝึกฝนมั้ย?!"
20015-CVGroup_Relationship_Up_2-1 = "โอ้! นี่คงทำให้ฉันเป็นเลดี้ที่เพียบพร้อม...!\nอ๊ะ ต่างกับอันนั้นเหรอ? หืม...?"
20015-CVGroup_Relationship_Up_3-1 = "ฉันดีใจจริงๆ ที่คุณครูมาเล่นด้วย\nอื้อ ฉันชอบจริงๆ นะ!"
20015-CVGroup_Relationship_Up_4-1 = "ของขวัญมีไว้ให้คนสำคัญน่ะ!\nเพราะงั้นฉันจะให้... ก้อนกรวดวิบวับที่เป็นของมีค่าของฉันกับคุณครูนะ!\nเป็นไงล่ะ? วิบวับๆ ใช่มั้ย~?!"

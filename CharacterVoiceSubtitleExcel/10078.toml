[translation]
10078-CVGroup_CommonSkill-1 = "Surprise～"
10078-CVGroup_ExSkill_1-1 = "這次的地點是……這裡吧！"
10078-CVGroup_ExSkill_2-1 = "很好，很好……就是那裡！"
10078-CVGroup_ExSkill_3-1 = "很好～！來，要開始囉！"
10078-CVGroup_ExSkill_Level_1-1 = "咻──嘎蹦！哈～哈哈哈哈！"
10078-CVGroup_ExSkill_Level_2-1 = "來吧，這是禮物！！！哈～哈哈哈哈！"
10078-CVGroup_ExSkill_Level_3-1 = "要上囉要上囉～！咚！哈～哈哈哈哈！"
10078-CVGroup_Growup_1-1 = "哎呀～人生有時候就是會有這種事嘛！"
10078-CVGroup_Growup_2-1 = "我有時會覺得老師……這樣真的好嗎？\n要是出什麼事的話老師也會成為共犯的哦？"
10078-CVGroup_Growup_3-1 = "哦哦！我正好在找它呢，幫大忙了！"
10078-CVGroup_Growup_4-1 = "哈～哈哈哈！不必擔心。\n這是只屬於我們的祕密，是這樣沒錯吧。"
10078-CVGroup_Relationship_Up_1-1 = "為我做到這種地步？\n真是什麼怪人都有啊！"
10078-CVGroup_Relationship_Up_2-1 = "老師你……真是非常有趣啊。\n唔呣，這可是在誇你哦？"
10078-CVGroup_Relationship_Up_3-1 = "需要什麼東西的話儘管說吧。\n沒錯，就是「儘管說」。無論什麼東西都會準備的。在暗地裡，偷偷地。"
10078-CVGroup_Relationship_Up_4-1 = "哈～哈哈哈哈！感謝你，老師！！"
10078-CVGroup_Battle_Buffed_1-1 = "雖然沒有也不成問題……還是感謝你！"
10078-CVGroup_Battle_Covered_1-1 = "這似乎很堅固啊！"
10078-CVGroup_Battle_Defense_1-1 = "怎麼了嗎？"
10078-CVGroup_Battle_In_1-1 = "要來礙事是吧……變成怎樣我可不管哦？"
10078-CVGroup_Battle_In_2-1 = "哈～哈哈哈哈！很好，就來試試看吧！"
10078-CVGroup_Battle_Move_1-1 = "時間可是不等人的啊！走吧！"
10078-CVGroup_Battle_Move_2-1 = "來～下一個下一個～！"
10078-CVGroup_Battle_Recovery_1-1 = "哦！感激不盡！"
10078-CVGroup_Battle_TacticalAction_1-1 = "GO～GO～！"
10078-CVGroup_Battle_Victory_1-1 = "呼！舒服多了啊！"
10078-CVGroup_Battle_Victory_2-1 = "Wonderful！剛才很美妙哦！"
10078-CVGroup_Formation_In_1-1 = "啊啊，作業是吧！包在我身上！"
10078-CVGroup_Formation_In_2-1 = "真是個出色的選擇啊！哈～哈哈哈哈！"
10078-CVGroup_Formation_Select-1 = "好～！飛過去吧！"
10078-CVGroup_Tactic_In_1-1 = "真是個挖起來感覺會很開心的地點啊！"
10078-CVGroup_Tactic_In_2-1 = "這次的現場就選這裡吧！"
10078-CVGroup_Tactic_Victory_1-1 = "Great！就這樣繼續前進！"
10078-CVGroup_Tactic_Victory_2-1 = "Wonderful！真是場美妙的溫泉開發啊！"

10078-CVGroup_Relationship_Up_3-1 = "뭐 필요한 거 있으면 언제든 말해줘.\n그래, '무엇이든'지 말이야.\n어떤 것이든 준비하지. 뒤에서, 조용히."
10078-CVGroup_Relationship_Up_4-1 = "와핫핫핫!! 고맙다고, 선생님~!!"

10078-CVGroup_Tactic_In_2-1 = "พื้นที่ขุดเจาะคราวนี้ เอาเป็นตรงนี้แล้วกัน!"
10078-CVGroup_Tactic_Victory_1-1 = "เยี่ยมมาก! ไปต่อกันแบบนี้แหละ!"
10078-CVGroup_Tactic_Victory_2-1 = "วันเดอร์ฟูล! เป็นการพัฒนาออนเซ็นที่ยอดเยี่ยมมาก!"

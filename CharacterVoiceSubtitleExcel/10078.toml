[translation]
10078-CVGroup_CommonSkill-1 = "서프라~이즈!"
10078-CVGroup_ExSkill_1-1 = "이번 포인트는……. 여기!"
10078-CVGroup_ExSkill_2-1 = "좋아, 좋아…거기다!"
10078-CVGroup_ExSkill_3-1 = "좋아~! 자, 시작한다!"

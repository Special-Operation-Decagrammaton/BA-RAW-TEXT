10078-CVGroup_Growup_1-1 = "이야~ 인생, 가끔은 이런 일도 있구만!"
10078-CVGroup_Growup_2-1 = "가끔 선생님…. 정말 괜찮겠어? 무슨 일 생기면, 선생님도 공범이라고?"

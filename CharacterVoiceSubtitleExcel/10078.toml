[translation]
10078-CVGroup_CommonSkill-1 = "เซอร์ไพรส์~!"
10078-CVGroup_ExSkill_1-1 = "ประเด็นในครั้งนี้ก็คือ... เรื่องนี้แหละ! "
10078-CVGroup_ExSkill_2-1 = "ดีละ ดีมาก... ตรงนั้น!"
10078-CVGroup_ExSkill_3-1 = "เยี่ยม~! เอาละ มาเริ่มกันเลย!"
10078-CVGroup_ExSkill_Level_1-1 = "ฟ้าว~ ตู้ม!! วะฮ่าฮ่าฮ่า!"
10078-CVGroup_ExSkill_Level_2-1 = "เอ้า ของขวัญไง!! วะฮ่าฮ่าฮ่าฮ่า!"
10078-CVGroup_ExSkill_Level_3-1 = "ลุยละนะๆ~! ตู้ม! วะฮ่าฮ่าฮ่าฮ่า!"
10078-CVGroup_Growup_1-1 = "เฮ้อ บางครั้งในชีวิตก็เกิดเรื่องแบบนี้ได้ละนะ!"
10078-CVGroup_Growup_2-1 = "ว่าแต่คุณครู... ไม่เป็นไรแน่นะ?\nถ้าเกิดอะไรขึ้น คุณครูก็เป็นผู้สมรู้ร่วมคิดนะ"
10078-CVGroup_Growup_3-1 = "ว้าว! ฉันกำลังหาเจ้านี่อยู่เลย! ขอบคุณนะ~!"
10078-CVGroup_Growup_4-1 = "วะฮ่าฮ่า! ไม่ต้องห่วง ฉันจะเก็บเรื่องที่ช่วยฉันไว้เป็นความลับเอง"
10078-CVGroup_Relationship_Up_1-1 = "ทำไมถึงทำให้คนอย่างฉันถึงขนาดนี้น่ะ? น่าทึ่งจริงๆ!"
10078-CVGroup_Relationship_Up_2-1 = "คุณครูเป็นคนที่สนุกจริงๆ เลยนะ\nอื้อ ก็ต้องเป็นคำชมอยู่แล้วสิ"
10078-CVGroup_Relationship_Up_3-1 = "ถ้าต้องการอะไรก็บอกได้ตลอดเลยนะ\nใช่แล้ว 'ทุกอย่าง' เลยน่ะ\nเตรียมตัวให้พร้อมล่ะ จะเข้าจากข้างหลังอย่างเงียบๆ"
10078-CVGroup_Relationship_Up_4-1 = "วะฮ่าฮ่าฮ่า!! ขอบคุณนะคุณครู~!!"
10078-CVGroup_Battle_Buffed_1-1 = "ไม่มีก็ไม่เป็นไรหรอกแต่ก็... ขอบคุณมากนะ!"
10078-CVGroup_Battle_Covered_1-1 = "แบบนี้ก็แข็งแกร่งขึ้นแล้วสินะ!"
10078-CVGroup_Battle_Defense_1-1 = "ทำอะไรน่ะ?"
10078-CVGroup_Battle_In_1-1 = "คิดจะขัดขวางพวกเรางั้นเหรอ... ไม่รู้เหรอว่าจะโดนอะไร?"
10078-CVGroup_Battle_In_2-1 = "วะฮ่าฮ่าฮ่า! ดีละ มาเจอกันสักตั้งแล้วกัน!"
10078-CVGroup_Battle_Move_1-1 = "เวลามีจำกัดน่ะ จะลุยแล้วนะ!"
10078-CVGroup_Battle_Move_2-1 = "เอาละ~ ต่อไปๆ!"
10078-CVGroup_Battle_Recovery_1-1 = "อ๊ะ! ขอบคุณนะ!"
10078-CVGroup_Battle_TacticalAction_1-1 = "โก~ โก~!"
10078-CVGroup_Battle_Victory_1-1 = "ฮู่ว! โล่งขึ้นเยอะเลยแฮะ!"
10078-CVGroup_Battle_Victory_2-1 = "วันเดอร์ฟูล! สุดยอดเลย!"
10078-CVGroup_Formation_In_1-1 = "อ๊ะ-! มีงานเหรอ! ให้เป็นหน้าที่ฉันเอง!"

20050-CVGroup_Relationship_Up_2-1 = "แหะๆ ผิวคุณครูให้ความรู้สึกแบบนี้เองสินะ...\nรู้แล้วละว่าจะแกะสลักออกมายังไง!"
20050-CVGroup_Relationship_Up_3-1 = "รู้อะไรมั้ยคุณครู? ภาพที่ผุดขึ้นมาในหัวฉันช่วงนี้น่ะ\nมีแค่ภาพคนคนเดียวเลยนะ"
20050-CVGroup_Relationship_Up_4-1 = "แปลกจัง~ ทุกครั้งที่เห็นคุณครู ทำไมถึงรู้สึกหัวใจหนักอึ้ง\nเหมือนถูกหินกดทับแบบนี้นะ?"

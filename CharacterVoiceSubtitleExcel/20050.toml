20050-CVGroup_ExSkill_2-1 = "เจออะไรเจ๋งๆ เข้าแล้วละ!"
20050-CVGroup_ExSkill_3-1 = "มันเคยอยู่ตรงนี้นี่นา!"
20050-CVGroup_ExSkill_Level_1-1 = "เอ้า กินแล้วจะได้มีแรงนะ!"
20050-CVGroup_ExSkill_Level_2-1 = "เราจะเหนื่อยไม่ได้นะ เอ้า!"
20050-CVGroup_ExSkill_Level_3-1 = "จะหมดสติที่นี่ไม่ได้เด็ดขาด!"
20050-CVGroup_Formation_In_1-1 = "อะไรกัน อะไรกันเนี่ย? เล็งไปไหนน่ะ"
20050-CVGroup_Formation_In_2-1 = "ดูน่าสนุกดีนะ...!"
20050-CVGroup_Formation_Select-1 = "ฮืม ฮืม~ อ๊ะ คุณครูนี่นา!"
20050-CVGroup_Growup_1-1 = "จริงเหรอๆ? ให้ฉันจริงเหรอ?"
20050-CVGroup_Growup_2-1 = "ตอนนี้คงยกหินก้อนใหญ่ๆ ได้แล้วละ!"
20050-CVGroup_Growup_3-1 = "แหะๆ~ ขอบคุณนะคุณครู!\nฉันจะพยายามให้มากๆๆ กว่านี้เลย!"

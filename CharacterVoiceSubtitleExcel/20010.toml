[translation]
20010-CVGroup_CommonSkill-1 = "Is anything not to your liking, dear customer?"
20010-CVGroup_ExSkill_1-1 = "This is Hot Springs Resort No. 227's kaiseki meal!"
20010-CVGroup_ExSkill_2-1 = "I'm quite proud of this dish!"
20010-CVGroup_ExSkill_3-1 = "We prepared a bunch of expensive ingredients!"
20010-CVGroup_ExSkill_Level_1-1 = "We'll be serving food in order of those who are hungriest!"
20010-CVGroup_ExSkill_Level_2-1 = "We've got plenty of food!"
20010-CVGroup_ExSkill_Level_3-1 = "Please enjoy your stay!"
20010-CVGroup_Summon_Retreat_01-1 = "That's it for work today!"
20010-CVGroup_Summon_Retreat_02-1 = "I-I'm sorry! We're all out of ingredients!"
20010-CVGroup_Formation_In_1-1 = "I'll show you what a hostess can do!"
20010-CVGroup_Formation_In_2-1 = "I-I'll do my best to serve!"
20010-CVGroup_Formation_Select-1 = "Watching Sensei after a bath is also... Heehee..."
20010-CVGroup_Growup_1-1 = "What do you think, Sensei? I've become quite the business veteran!"
20010-CVGroup_Growup_2-1 = "Do you think I can be a better restauranteur now?"
20010-CVGroup_Growup_3-1 = "I need to try harder, even if it IS just for the Hot Springs Resort!"
20010-CVGroup_Growup_4-1 = "We here at Spec Ops No. 227—I mean, Hot Springs Resort No. 227 are always grateful for your support!"
20010-CVGroup_Relationship_Up_1-1 = "I'm always watching you, Sensei. Yes... Always..."
20010-CVGroup_Relationship_Up_2-1 = "Heehee! Your face is positively glowing as always."
20010-CVGroup_Relationship_Up_3-1 = "We always keep the best room reserved just for you!"
20010-CVGroup_Relationship_Up_4-1 = "Sensei is a VVIP of the Hot Springs Resort, after all!"

[translation]
20010-CVGroup_CommonSkill-1 = "ลูกค้าคะ ไม่สบายตัวตรงไหนบ้างมั้ยคะ?"
20010-CVGroup_ExSkill_1-1 = "เซ็ตอาหารไคเซกิของออนเซ็น No.227 ค่ะ!"
20010-CVGroup_ExSkill_2-1 = "เป็นอาหารที่เราภาคภูมิใจค่ะ!"
20010-CVGroup_ExSkill_3-1 = "ฉันใช้วัตถุดิบแพงๆ ทำไว้เยอะเลยค่ะ!"
20010-CVGroup_ExSkill_Level_1-1 = "ฉันจะแจกตามลำดับให้คนที่หิวก่อนนะคะ!"
20010-CVGroup_ExSkill_Level_2-1 = "มีอาหารเหลือเฟือค่ะ!"
20010-CVGroup_ExSkill_Level_3-1 = "สนุกกันอย่างชิลๆ ตามต้องการได้เลยค่ะ!"
20010-CVGroup_Summon_Retreat_01-1 = "สำหรับวันนี้ก็ได้เวลาปิดร้านแล้วค่ะ!"
20010-CVGroup_Summon_Retreat_02-1 = "ขะ... ขอโทษด้วยนะคะ! วัตถุดิบของเราหมดแล้วค่ะ!"
20010-CVGroup_Formation_In_1-1 = "จะแสดงหัวใจสำคัญของผู้ดูแลให้เห็นเองค่ะ!"
20010-CVGroup_Formation_In_2-1 = "จะ... จะทุ่มสุดตัวเลยค่ะ!"
20010-CVGroup_Formation_Select-1 = "การได้เฝ้าดูคุณครูหลังอาบน้ำ... ฮุฮุฮุ..."
20010-CVGroup_Growup_1-1 = "ฮุฮุ คุณครูคิดว่ายังไงบ้างคะ? ภาพลักษณ์ที่มีเกียรติของฉันน่ะค่ะ!"
20010-CVGroup_Growup_2-1 = "สิ่งนี้จะทำให้ฉันเป็นเจ้าของร้านที่ยอดเยี่ยมได้มั้ยคะ?"
20010-CVGroup_Growup_3-1 = "ถ้าไม่พยายามเพื่อออนเซ็นให้มากกว่านี้ละก็...!"
20010-CVGroup_Growup_4-1 = "ขอบคุณที่สนับสนุนห้องพิเศษ 227...\nไม่สิ ออนเซ็น เลขที่ 227 ของเราตลอดนะคะ!"
20010-CVGroup_Relationship_Up_1-1 = "ฉันคอยเฝ้าดูคุณครูอยู่เสมอค่ะ\nค่ะ... เสมอๆ เลย...!"
20010-CVGroup_Relationship_Up_2-1 = "แหะๆ วันนี้คุณครูก็หน้าตาแจ่มใสนะคะ"
20010-CVGroup_Relationship_Up_3-1 = "ฉันเตรียมห้องที่ดีที่สุดไว้ให้คุณครูเสมอค่ะ!"
20010-CVGroup_Relationship_Up_4-1 = "ก็คุณครูเป็นลูกค้า VVIP ของออนเซ็นของเรานี่คะ!"

[translation]
26006-CVGroup_CommonSkill-1 = "후후, 다 보인다구요?"
26006-CVGroup_ExSkill_1-1 = "관측 준비 완료!"
26006-CVGroup_ExSkill_2-1 = "제 눈에서 벗어날 수는 없어요!"
26006-CVGroup_ExSkill_3-1 = "어디보자, 어디보자…"
26006-CVGroup_ExSkill_Level_1-1 = "스캔 완료!"
26006-CVGroup_ExSkill_Level_2-1 = "찾았어요!"
26006-CVGroup_ExSkill_Level_3-1 = "후후, 거기 있었네요."
26006-CVGroup_Formation_In_1-1 = "저, 저, 절 믿어주시는 건가요?"
26006-CVGroup_Formation_In_2-1 = "저 같은 학생이라도 괜찮으시다면……."
26006-CVGroup_Growup_1-1 = "눈이 훨씬 좋아진 느낌이 들어요."
26006-CVGroup_Growup_2-1 = "이것으로… 선생님의 일거수일투족을 더욱 자세히……."
26006-CVGroup_Growup_3-1 = "감사합니다, 선생님. 앞으로도 더욱 열심히 관찰할게요!"
26006-CVGroup_Growup_4-1 = "이대로 노력하면 언젠가는 특별반에서도 탈출할 수 있겠죠?"
26006-CVGroup_Relationship_Up_1-1 = "에헤헤… 이렇게 선생님과 얼굴을 맞대고 직접 이야기 하려니… 조금 부끄럽네요."
26006-CVGroup_Relationship_Up_2-1 = "선생님과 함께라면 이 혹한 속에서도 두렵지 않아요!"
26006-CVGroup_Relationship_Up_3-1 = "좀 더…… 좀 더 선생님에 대해 알고 싶어요!"
26006-CVGroup_Relationship_Up_4-1 = "선생님, 오늘 밤은 달이 아름답네요."

[translation]
26006-CVGroup_CommonSkill-1 = "Heehee! I see everything, you know."
26006-CVGroup_ExSkill_1-1 = "Ready to observe!"
26006-CVGroup_ExSkill_2-1 = "You can't escape my gaze!"
26006-CVGroup_ExSkill_3-1 = "Now, let's see..."
26006-CVGroup_ExSkill_Level_1-1 = "Scan complete!"
26006-CVGroup_ExSkill_Level_2-1 = "Found them!"
26006-CVGroup_ExSkill_Level_3-1 = "Heehee! There you are."
26006-CVGroup_Formation_In_1-1 = "A-Are you putting your faith in me?"
26006-CVGroup_Formation_In_2-1 = "If you're okay with a student like me..."
26006-CVGroup_Growup_1-1 = "I feel like my eyes got a lot better."
26006-CVGroup_Growup_2-1 = "Thanks to this, I know so many details of Sensei's daily life."
26006-CVGroup_Growup_3-1 = "Thank you, Sensei. I'll do my absolute best observation work!"
26006-CVGroup_Growup_4-1 = "I'll earn my way out of Spec Ops if I keep doing my best, right?"
26006-CVGroup_Relationship_Up_1-1 = "Heeheehee... I feel so self-conscious when I'm talking to you face-to-face like this..."
26006-CVGroup_Relationship_Up_2-1 = "As long as I'm with you, I'm not afraid...even in the most bitter cold weather!"
26006-CVGroup_Relationship_Up_3-1 = "More... I want to know more about you, Sensei!"
26006-CVGroup_Relationship_Up_4-1 = "The moon looks beautiful tonight, Sensei."

[translation]
26006-CVGroup_CommonSkill-1 = "ฮุฮุ เห็นหมดเลยงั้นเหรอคะ?"
26006-CVGroup_ExSkill_1-1 = "เตรียมสังเกตการณ์พร้อมแล้ว!"
26006-CVGroup_ExSkill_2-1 = "หลุดรอดจากสายตาของฉันไม่ได้หรอกค่ะ!"
26006-CVGroup_ExSkill_3-1 = "ไหนดูหน่อย ได้ดูซิ..."
26006-CVGroup_ExSkill_Level_1-1 = "สแกนสำเร็จ!"
26006-CVGroup_ExSkill_Level_2-1 = "เจอแล้วค่ะ!"
26006-CVGroup_ExSkill_Level_3-1 = "ฮุฮุ อยู่ตรงนั้นสินะคะ"
26006-CVGroup_Formation_In_1-1 = "ชะ... เชื่อ... เชื่อใจฉันงั้นเหรอคะ?"
26006-CVGroup_Formation_In_2-1 = "ถ้าคุณครูโอเคกับนักเรียนอย่างฉัน..."
26006-CVGroup_Growup_1-1 = "รู้สึกว่าตาดีขึ้นมากเลยค่ะ"
26006-CVGroup_Growup_2-1 = "สิ่งนี้จะทำให้... เห็นการเคลื่อนไหวของคุณครูอย่างละเอียดขึ้น..."
26006-CVGroup_Growup_3-1 = "ขอบคุณค่ะ คุณครู ต่อไปฉันจะตั้งใจสังเกตการณ์ให้มากขึ้นค่ะ"
26006-CVGroup_Growup_4-1 = "ถ้าพยายามไปอย่างนี้ สักวันคงได้ออกจากห้องเรียนพิเศษใช่มั้ยคะ?"
26006-CVGroup_Relationship_Up_1-1 = "แหะๆๆ... พอได้มองหน้าและคุยกับคุณครูแบบนี้\nก็รู้สึกเขินอยู่หน่อยๆ นะคะ"
26006-CVGroup_Relationship_Up_2-1 = "ถ้าได้อยู่กับคุณครูละก็ ต่อให้อยู่ท่ามกลางความหนาวเหน็บนี้\nฉันก็ไม่กลัวค่ะ!"
26006-CVGroup_Relationship_Up_3-1 = "ฉันอยาก... รู้เกี่ยวกับคุณครูให้มากกว่านี้ค่ะ"
26006-CVGroup_Relationship_Up_4-1 = "คุณครู พระจันทร์คืนนี้สวยจังเลยค่ะ"

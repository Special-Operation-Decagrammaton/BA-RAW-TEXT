[translation]
20044-CVGroup_CommonSkill-1 = "請喝一杯吧。"
20044-CVGroup_ExSkill_1-1 = "感謝惠顧。\n嗯？哈！"
20044-CVGroup_ExSkill_2-1 = "請稍等。\n哎呀？\n那邊！"
20044-CVGroup_ExSkill_3-1 = "來，請用。\n嗯？\n我接！"
20044-CVGroup_ExSkill_Level_1-1 = "哈啊！"
20044-CVGroup_ExSkill_Level_2-1 = "呀！"
20044-CVGroup_ExSkill_Level_3-1 = "請收下吧！"
20044-CVGroup_Formation_In_1-1 = "飲料，要不要來一杯呢？"
20044-CVGroup_Formation_In_2-1 = "希望能成為大家的活力。"
20044-CVGroup_Formation_Select-1 = "要喝嗎？"
20044-CVGroup_Growup_1-1 = "怎麼了嗎？飲料機？\n啊啊，這正適合當成全身運動的負重。"
20044-CVGroup_Growup_2-1 = "無論訓練還是打工，重要的都是笑容和體貼。"
20044-CVGroup_Growup_3-1 = "想要成為他人的力量的話，\n首先必須得腳踏實地才行。"
20044-CVGroup_Growup_4-1 = "今天要比昨天好，明天要比今天好──\n以更高的境界為目標。"
20044-CVGroup_Relationship_Up_1-1 = "微笑是免費的。\n同時再多附贈一次給你。\n呵呵，這是發自內心的微笑哦。"
20044-CVGroup_Relationship_Up_2-1 = "謝謝你總是願意陪我訓練。\n今天就把節奏放緩，過得輕鬆一點吧。"
20044-CVGroup_Relationship_Up_3-1 = "多虧了指導員……不，多虧了老師，\n我才能夠在良好的學習中度過每一天。\n你今後也願意，跟我一起並肩前行嗎？"
20044-CVGroup_Relationship_Up_4-1 = "無論運動還是打工，只要指導員同行都會增加效率。\n你知道為什麼嗎？\n……我，知道這個答案。"

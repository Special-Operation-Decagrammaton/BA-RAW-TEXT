20044-CVGroup_Formation_In_1-1 = "I'm working part-time today."
20044-CVGroup_Formation_In_2-1 = "I want to energize the people!"
20044-CVGroup_Formation_Select-1 = "Would you like a drink?"
20044-CVGroup_Growup_1-1 = "I think this keg also helps with training. I wish it were heavier, but it helps me do a full-body workout."
20044-CVGroup_Growup_2-1 = "Smile, positive attitude, friendliness... They're important in both part-time and personal training."
20044-CVGroup_Growup_3-1 = "I can't help others if I myself am not qualified."
20044-CVGroup_Growup_4-1 = "May tomorrow's weight be heavier. And may tomorrow's me be stronger."
20044-CVGroup_Relationship_Up_1-1 = "Smiles are always free. A smile for Trainer...is freer than free. How can something be more free? That just means...it'll always be sincere."
20044-CVGroup_Relationship_Up_2-1 = "Thanks for always training with me. Now let's slow down the pace and relax today."
20044-CVGroup_Relationship_Up_3-1 = "Trainer... No, Sensei. Thanks to you, I learn something every day. Will you keep running side-by-side with me?"
20044-CVGroup_Relationship_Up_4-1 = "Whether it be for working out or this part-time job, I'm more efficient when you're around, Trainer. Why is that? You don't know? I...think I do, though..."

[translation]
20044-CVGroup_CommonSkill-1 = "목마르시죠?"
20044-CVGroup_ExSkill_1-1 = "여기 있습니다. 음? 잡았습니다!"
20044-CVGroup_ExSkill_2-1 = "잠시만요. 흠? 캐치!"
20044-CVGroup_ExSkill_3-1 = "기다려 주세요. 이건?! 거기군요!"
20044-CVGroup_ExSkill_Level_1-1 = "이얏!"
20044-CVGroup_ExSkill_Level_2-1 = "얏!"
20044-CVGroup_ExSkill_Level_3-1 = "받으시죠!"
20044-CVGroup_Formation_In_1-1 = "오늘은 아르바이트 중입니다."
20044-CVGroup_Formation_In_2-1 = "많은 분들께 활력을 제공드리고 싶네요."
20044-CVGroup_Formation_Select-1 = "한 잔, 어떠십니까?"
20044-CVGroup_Growup_1-1 = "이 드링크 장비는, 트레이닝에도 도움이 되는 것 같습니다.\n무게감은 조금 아쉽습니다만, 전신 운동이 되니까요."
20044-CVGroup_Growup_2-1 = "미소, 긍정적인 자세, 친절함…… \n아르바이트에도, 트레이닝 지도에도, 모두 중요한 것들이죠."
20044-CVGroup_Growup_3-1 = "누군가에게 도움을 주기 위해서라도, 저 역시 충분한 자격을 갖추어야 한다고 생각합니다."
20044-CVGroup_Growup_4-1 = "오늘은 어제보다 더 나은 무게를.\n그리고 내일은 오늘보다 더 나은 저 자신이 될 수 있기를."
20044-CVGroup_Relationship_Up_1-1 = "미소는 언제나 무료입니다. 트레이너를 위한 미소는…… 한층 더 무료입니다.\n한층 더 무료가 뭐냐고요? 그건…… 언제나, 진심을 담겠다는 의미입니다."
20044-CVGroup_Relationship_Up_2-1 = "항상 트레이닝을 함께해 주셔서 감사합니다.\n오늘은 페이스를 낮추고 여유롭게 보내보도록 할까요."
20044-CVGroup_Relationship_Up_3-1 = "트레이너… 아뇨, 선생님 덕분에 저는 항상 좋은 배움의 나날을 보내고 있습니다.\n앞으로도, 저와 2인3각으로 달려주시겠습니까?"
20044-CVGroup_Relationship_Up_4-1 = "운동이든, 아르바이트이든. 트레이너와 함께 있으면, 효율이 증가하는 것 같습니다. 어째서일까요?\n모르시겠다고요? 저는…… 왠지 알 것 같은데 말이죠."

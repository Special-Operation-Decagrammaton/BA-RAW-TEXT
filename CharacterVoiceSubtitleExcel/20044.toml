[translation]
20044-CVGroup_CommonSkill-1 = "คอแห้งเหรอคะ?"
20044-CVGroup_ExSkill_1-1 = "อยู่นี่ค่ะ หืม? จับได้แล้วค่ะ!"
20044-CVGroup_ExSkill_2-1 = "รอก่อนนะคะ หืม? แคช!"
20044-CVGroup_ExSkill_3-1 = "รอก่อนนะคะ นี่มัน?! ตรงนั้นสินะคะ!"
20044-CVGroup_ExSkill_Level_1-1 = "ย้าา!"
20044-CVGroup_ExSkill_Level_2-1 = "ย้าก!"
20044-CVGroup_ExSkill_Level_3-1 = "รับไปสิคะ!"
20044-CVGroup_Formation_In_1-1 = "วันนี้เป็นวันทำงานพาร์ทไทม์ค่ะ"
20044-CVGroup_Formation_In_2-1 = "ฉันอยากมอบเอเนอร์จี้ดีๆ ให้หลายๆ คนเลยค่ะ"
20044-CVGroup_Formation_Select-1 = "รับสักแก้วมั้ยคะ?"
20044-CVGroup_Growup_1-1 = "เครื่องจ่ายเครื่องดื่มดูเหมือนจะช่วยในการเทรนได้ค่ะ\nถึงมันจะหนักไปหน่อย แต่มันช่วยในการออกกำลังทั้งตัวได้ค่ะ"
20044-CVGroup_Growup_2-1 = "รอยยิ้ม ทัศนคติที่ดี และความมีน้ำใจ...\nทั้งการทำงานพาร์ทไทม์ และการเทรน\nฉันคิดว่าเป็นเรื่องสำคัญทั้งหมดค่ะ"
20044-CVGroup_Growup_3-1 = "ถ้าเพื่อช่วยเหลือใครสักคนแล้วละก็\nฉันคิดว่าตัวเองน่าจะมีคุณสมบัติเพียงพอค่ะ"
20044-CVGroup_Growup_4-1 = "น้ำหนักที่เพิ่มขึ้นมาจากเมื่อวาน\nหวังว่าตัวฉันในวันพรุ่งนี้ก็จะดีกว่าตัวฉันในวันนี้ด้วย"
20044-CVGroup_Relationship_Up_1-1 = "รอยยิ้มมีให้โดยไม่คิดเงินเสมอๆ ค่ะ\nรอยยิ้มสำหรับเทรนเนอร์... ยิ่งไม่เคยคิดเงินเลยค่ะ\nไม่คิดเงินยังไงน่ะเหรอคะ? เรื่องนั้น... ฉันจริงใจเสมอเลยนะคะ"
20044-CVGroup_Relationship_Up_2-1 = "ขอบคุณที่มาฝึกด้วยกันตลอดเลยนะคะ\nวันนี้มาลดระดับลงแล้วใช้เวลาชิลๆ ด้วยกันดีมั้ยคะ"
20044-CVGroup_Relationship_Up_3-1 = "เทรนเนอร์... ไม่สิ เพราะฉันมีคุณครูอยู่ด้วย\nฉันรู้สึกขอบคุณที่ทำให้ฉันได้เรียนรู้อะไรมากมายเลยค่ะ\nหลังจากนี้... มาวิ่งสามขากับฉันด้วยได้มั้ยคะ?"
20044-CVGroup_Relationship_Up_4-1 = "ทั้งการออกกำลังกาย และการทำงานพาร์ทไทม์\nถ้ามีเทรนเนอร์อยู่ด้วย ดูเหมือนฉันจะทำได้ดีขึ้นค่ะ\nเพราะอะไรกันนะคะ? คุณครูก็ไม่รู้เหมือนกันเหรอคะ?\nฉัน... คิดว่าคุณครูรู้นะคะ"

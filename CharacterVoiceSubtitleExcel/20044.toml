20044-CVGroup_CommonSkill-1 = "Are you thirsty?"
20044-CVGroup_ExSkill_1-1 = "Here you go. Hm? I caught it!"
20044-CVGroup_ExSkill_2-1 = "One moment. Hm? Catch!"
20044-CVGroup_ExSkill_3-1 = "One second please. Is this?! There!"
20044-CVGroup_ExSkill_Level_1-1 = "Hiya!"
20044-CVGroup_ExSkill_Level_2-1 = "Yah!"

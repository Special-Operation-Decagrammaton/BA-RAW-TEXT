[translation]
10014-CVGroup_Battle_Buffed_1-1 = "인법! 감사의 술!"
10014-CVGroup_Battle_Covered_1-1 = "엄폐했어요!"
10014-CVGroup_Battle_Defense_1-1 = "이즈나에겐 통하지 않아요!"
10014-CVGroup_Battle_In_1-1 = "이즈나, 갑니다!"
10014-CVGroup_Battle_In_2-1 = "모두 이즈나를 믿고 따라와 주세요!"
10014-CVGroup_Battle_Move_1-1 = "이즈나, 이동합니다!"
10014-CVGroup_Battle_Move_2-1 = "다음 작전지역으로 닌자 달리기예요!"
10014-CVGroup_Battle_Recovery_1-1 = "고마워요!"
10014-CVGroup_Battle_TacticalAction_1-1 = "샤샤샥!"
10014-CVGroup_Battle_Victory_1-1 = "이즈나류 인법의 승리예요!"
10014-CVGroup_Battle_Victory_2-1 = "캥캥~! 승리, 승리!"
10014-CVGroup_CommonSkill-1 = "갑니다! 수리검! 에잇!"
10014-CVGroup_ExSkill_1-1 = "이즈나류 인법!"
10014-CVGroup_ExSkill_2-1 = "인법, 보여드리지요!"
10014-CVGroup_ExSkill_3-1 = "얍! 바꿔치기의 술!"
10014-CVGroup_ExSkill_Level_1-1 = "긴급회피예요!"
10014-CVGroup_ExSkill_Level_2-1 = "이것도 인법…… 같은 거니까요!"
10014-CVGroup_ExSkill_Level_3-1 = "피해보겠습니다!"
10014-CVGroup_Formation_In_1-1 = "그것이 주군의 명령이라면!"
10014-CVGroup_Formation_In_2-1 = "이즈나에게 무엇이든 명령해 주세요!"
10014-CVGroup_Formation_Select-1 = "닌닌~! 주군! 이즈나는 뭘 하면 되나요?"
10014-CVGroup_Growup_1-1 = "이걸로 더욱 어려운 인법을 배울 수 있겠어요!"
10014-CVGroup_Growup_2-1 = "이 또한 주군의 은혜 중 하나인 거네요!"
10014-CVGroup_Growup_3-1 = "반드시 주군의 기대에 부응할 수 있는 닌자가 되겠습니다!"
10014-CVGroup_Growup_4-1 = "더욱 더 높이, 보다 빠르게!\n지금의 이즈나는 최강의 닌자일지도 몰라요! 주군!"
10014-CVGroup_Relationship_Up_1-1 = "주군과 함께 있으면 느껴지는 이 두근거림은 혹시…… 사명감? 일까요?"
10014-CVGroup_Relationship_Up_2-1 = "주군 곁에 있으면, 행복한 기분이 되어요.\n이건 주군을 섬기는 닌자로서의 기쁨……인 걸까요?"
10014-CVGroup_Relationship_Up_3-1 = "뭐든 명령만 내려주세요.\n주군의 명을 받들기 위해, 이즈나는 여기 있을 테니까요!"
10014-CVGroup_Relationship_Up_4-1 = "이즈나는 이제껏 주군 같은 분을 계속 찾아왔습니다.\n마침내…… 겨우 만날 수 있었어요.\n지금의 이즈나는 무척 행복해요."
10014-CVGroup_Tactic_In_1-1 = "임무 개시!"
10014-CVGroup_Tactic_In_2-1 = "이즈나류 인법, 보여드릴게요!"
10014-CVGroup_Tactic_Victory_1-1 = "임무 성공! 오늘도 닌자로서 완벽하게 해냈습니다!"
10014-CVGroup_Tactic_Victory_2-1 = "주군에게 승리를 바칩니다!"

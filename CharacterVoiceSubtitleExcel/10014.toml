10014-CVGroup_CommonSkill-1 = "จะลุยแล้วนะคะ! ชูริเคน! ย่ะ!"
10014-CVGroup_ExSkill_1-1 = "วิถีนินจาอิซุนะ!!"
10014-CVGroup_ExSkill_2-1 = "ฉันจะแสดงวิถีนินจาให้เห็นเองค่ะ!"
10014-CVGroup_ExSkill_3-1 = "ย้าก! เคล็ดวิชาสับเปลี่ยน!"
10014-CVGroup_ExSkill_Level_1-1 = "หลบหลีกฉุกเฉินค่ะ!"
10014-CVGroup_ExSkill_Level_2-1 = "นี่ก็เหมือนกับ... วิชานินจาสินะคะ!"
10014-CVGroup_ExSkill_Level_3-1 = "ฉันจะหลบหลีกมันดูค่ะ!"
10014-CVGroup_Formation_In_1-1 = "ถ้าเป็นคำสั่งของนายท่านแล้วละก็!"
10014-CVGroup_Formation_In_2-1 = "ไม่ว่าเรื่องไหนก็สั่งอิซุนะมาได้เลยค่ะ!"
10014-CVGroup_Formation_Select-1 = "นินนิน~! \nนายท่าน! ต่อไปอิซุนะต้องทำอะไรคะ?"
10014-CVGroup_Growup_1-1 = "แบบนี้อิซุนะก็จะเรียนรู้เคล็ดวิชาที่ยากขึ้นได้แน่นอนค่ะ!"
10014-CVGroup_Growup_2-1 = "นี่ก็เป็นสิ่งที่นายท่านช่วยเหลือไว้อีกแล้วค่ะ!"
10014-CVGroup_Growup_3-1 = "อิซุนะจะเป็นนินจาที่ตอบแทนความคาดหวังของนายท่านให้ได้เลยค่ะ!"
10014-CVGroup_Growup_4-1 = "สูงขึ้นอีก เร็วขึ้นอีก!\nอิซุนะอาจเป็นนินจาที่แข็งแกร่งที่สุดในยุคนี้ก็ได้ค่ะ! นายท่าน!"
10014-CVGroup_Relationship_Up_1-1 = "ถ้าอยู่กับนายท่านก็จะรู้สึกใจเต้นแรง...\nหรือว่าเป็นความสำนึกในหน้าที่... กันนะคะ?"
10014-CVGroup_Relationship_Up_2-1 = "เวลาได้อยู่ข้างๆ นายท่าน อิซุนะมีความสุขมากเลยค่ะ\nนี่คือความสุขในฐานะนินจา... ที่ได้รับใช้นายท่านงั้นเหรอคะ?"
10014-CVGroup_Relationship_Up_3-1 = "ไม่ว่าเรื่องไหนก็สั่งมาได้เลยค่ะ\nอิซุนะมาที่นี่เพื่อรับคำสั่งของนายท่านค่ะ!"
10014-CVGroup_Relationship_Up_4-1 = "อิซุนะตามหาผู้ที่เหมือนกับนายท่านมาตลอดเลยค่ะ\nและในที่สุด... อิซุนะก็ได้พบแล้วค่ะ\nตอนนี้อิซุนะมีความสุขมากเลยค่ะ"
10014-CVGroup_Tactic_In_1-1 = "เริ่มภารกิจได้!"
10014-CVGroup_Tactic_In_2-1 = "ฉันจะแสดงวิถีนินจาอิซุนะให้เห็นเองค่ะ!"
10014-CVGroup_Tactic_Victory_1-1 = "ภารกิจสำเร็จ! วันนี้ทำได้อย่างสมบูรณ์แบบในฐานะนินจาเลยค่ะ!"
10014-CVGroup_Tactic_Victory_2-1 = "อิซุนะขอมอบชัยชนะให้กับนายท่านค่ะ!"

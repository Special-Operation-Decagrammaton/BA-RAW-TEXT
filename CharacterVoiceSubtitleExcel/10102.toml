[translation]
10102-CVGroup_Battle_Buffed_1-1 = "耶嘿嘿，居然為了我這種人……"
10102-CVGroup_Battle_Covered_1-1 = "得，得躲起來才行……"
10102-CVGroup_Battle_Defense_1-1 = "我，我有躲啊！？"
10102-CVGroup_Battle_In_1-1 = "總，總之會試試看的……"
10102-CVGroup_Battle_In_2-1 = "雖然不曉得這樣的我，能不能派上用場……"
10102-CVGroup_Battle_Move_1-1 = "居然還有嗎……"
10102-CVGroup_Battle_Move_2-1 = "前，前進！"
10102-CVGroup_Battle_Recovery_1-1 = "耶嘿嘿，非常感謝。"
10102-CVGroup_Battle_TacticalAction_1-1 = "請，請等一下！"
10102-CVGroup_Battle_Victory_1-1 = "耶，耶嘿嘿，雖然贏了……不過沒有獎品之類的嗎？"
10102-CVGroup_Battle_Victory_2-1 = "趕緊回到慶典會場吧……！"
10102-CVGroup_CommonSkill-1 = "熱，熱的時候，就要這樣……"
10102-CVGroup_ExSkill_1-1 = "這，這次一定……！"
10102-CVGroup_ExSkill_2-1 = "別想逃……！"
10102-CVGroup_ExSkill_3-1 = "目標是一等獎……！"
10102-CVGroup_ExSkill_Level_1-1 = "還剩五發！"
10102-CVGroup_ExSkill_Level_2-1 = "發，發射！"
10102-CVGroup_ExSkill_Level_3-1 = "乖乖接招吧！"
10102-CVGroup_Formation_In_1-1 = "我，我這副打扮，沒問題嗎？"
10102-CVGroup_Formation_In_2-1 = "是，是……！雖然做好準備了……！"
10102-CVGroup_Formation_Select-1 = "耶，耶嘿嘿……得由我出馬了呢……"
10102-CVGroup_Growup_1-1 = "是，是要給我的嗎……？\n應該不是誤會吧？"
10102-CVGroup_Growup_2-1 = "有想交給我的工作對吧……耶嘿嘿，果然是這樣呢……"
10102-CVGroup_Growup_3-1 = "耶嘿嘿，非常感謝……雖然這種也很不錯，\n但果然好像還是刨冰更能讓人打起精神……"
10102-CVGroup_Growup_4-1 = "比，比平常還開心，總覺得不太習慣……\n是因為夏天嗎……？還是因為有老師在呢……？"
10102-CVGroup_Relationship_Up_1-1 = "你，你願意相信我嗎……？\n真的……？"
10102-CVGroup_Relationship_Up_2-1 = "就，就算那樣誇獎我……我也沒有東西能回報……\n難，難道是想要我的泳裝！？\n……不，不是嗎？"
10102-CVGroup_Relationship_Up_3-1 = "那個，老師，你喜歡炒麵嗎……？\n要不要一起去吃？\n耶嘿嘿，不好意思，買單就要麻煩你了……"
10102-CVGroup_Relationship_Up_4-1 = "雖然在見到老師之後多少好了一點……\n不過人生還是很辛苦的呢……"
10102-CVGroup_Tactic_In_1-1 = "果然人生是很辛苦的呢……"
10102-CVGroup_Tactic_In_2-1 = "來，來到這裡居然還要戰鬥……"
10102-CVGroup_Tactic_Victory_1-1 = "贏了呢……雖然我想戰鬥當然還會繼續……"
10102-CVGroup_Tactic_Victory_2-1 = "比預期中還早結束呢……\n因為不是很困難……"

[translation]
10102-CVGroup_Battle_Buffed_1-1 = "แหะๆ ให้คนอย่างฉันเหรอคะ..."
10102-CVGroup_Battle_Covered_1-1 = "ตะ... ต้องซ่อนแล้ว..."
10102-CVGroup_Battle_Defense_1-1 = "ฉะ... ฉันหลบแล้วนะคะ?!"
10102-CVGroup_Battle_In_1-1 = "จะ... เริ่มดูก่อนแล้วกันค่ะ..."
10102-CVGroup_Battle_In_2-1 = "คนอย่างฉันจะช่วยได้หรือเปล่าก็ไม่รู้..."
10102-CVGroup_Battle_Move_1-1 = "ยังมีอีกเหรอคะ...?"
10102-CVGroup_Battle_Move_2-1 = "ดะ... เดินหน้า!"
10102-CVGroup_Battle_Recovery_1-1 = "แหะๆ ขอบคุณค่ะ"
10102-CVGroup_Battle_TacticalAction_1-1 = "ปะ... ไปด้วยกันสิคะ!"
10102-CVGroup_Battle_Victory_1-1 = "แหะ... แหะๆ ชนะแล้วค่ะ... ไม่มีรางวัลอะไรเหรอคะ?"
10102-CVGroup_Battle_Victory_2-1 = "ทีนี้ก็กลับไปงานเทศกาลกันเถอะค่ะ...!"
10102-CVGroup_CommonSkill-1 = "ตะ... ตอนที่ร้อน... แบบนี้..."
10102-CVGroup_ExSkill_1-1 = "คะ... ครั้งนี้ต้อง...!"
10102-CVGroup_ExSkill_2-1 = "ฉันไม่พลาดหรอกค่ะ...!"
10102-CVGroup_ExSkill_3-1 = "เป้าหมายคือรางวัลที่ 1...!"
10102-CVGroup_ExSkill_Level_1-1 = "อีก 5 ก้าว!"
10102-CVGroup_ExSkill_Level_2-1 = "จะ... จะยิงละนะคะ!"
10102-CVGroup_ExSkill_Level_3-1 = "โดนยิงซะดีๆ ค่ะ!"
10102-CVGroup_Formation_In_1-1 = "ตะ... แต่ฉันอยู่ในชุดนี้... จะเป็นไรมั้ยคะ?"
10102-CVGroup_Formation_In_2-1 = "ค่ะ ค่ะ...! พร้อมแล้วค่ะ...!"
10102-CVGroup_Formation_Select-1 = "แหะ... แหะๆๆ... ฉันต้องไปแล้วสินะคะ..."
10102-CVGroup_Growup_1-1 = "หะ... ให้ฉันเหรอคะ...? ไม่ได้เข้าใจผิดใช่มั้ยคะ?"
10102-CVGroup_Growup_2-1 = "มีงานจะสั่งให้ฉันทำสินะคะ... แหะๆ คงเป็นอย่างนั้นสินะคะ..."
10102-CVGroup_Growup_3-1 = "แหะๆๆ ขอบคุณนะคะ... ของแบบนี้ก็ดีอยู่หรอก\nแต่กินน้ำแข็งไสแล้วน่าจะมีแรงกว่าค่ะ..."
10102-CVGroup_Growup_4-1 = "ทะ... ทำไมถึงรู้สึกสนุกกว่าปกติก็ไม่รู้ แปลกจังค่ะ...\nเพราะว่าเป็นฤดูร้อนหรือเปล่านะคะ...? หรือเป็นเพราะคุณครู...?"
10102-CVGroup_Relationship_Up_1-1 = "ชะ... เชื่อฉันเหรอคะ...? จริงเหรอคะ...?"
10102-CVGroup_Relationship_Up_2-1 = "ถะ... ถึงจะชมกันแบบนั้น... ฉันก็ไม่มีอะไรจะให้หรอกค่ะ...\nยะ... อย่าบอกนะว่าจ้องชุดว่ายน้ำฉันอยู่?! มะ... ไม่ใช่งั้นเหรอคะ?"
10102-CVGroup_Relationship_Up_3-1 = "เอ่อ คุณครูชอบยากิโซบะมั้ยคะ...?\nไปกินด้วยกันมั้ยคะ?\nแหะๆ ขอโทษนะคะ แต่รบกวนจ่ายให้ด้วยนะคะ..."
10102-CVGroup_Relationship_Up_4-1 = "ตั้งแต่ได้เจอคุณครู ฉันก็ดีขึ้นมานิดหน่อยค่ะ...\nแต่ยังไงชีวิตก็ยังเป็นทุกข์นะคะ..."
10102-CVGroup_Tactic_In_1-1 = "สุดท้ายแล้วชีวิตก็ยังเจ็บปวดนะคะ..."
10102-CVGroup_Tactic_In_2-1 = "มะ... มาถึงที่นี่ทั้งที แต่ให้ไปต่อสู้เหรอ..."
10102-CVGroup_Tactic_Victory_1-1 = "ชนะแล้วค่ะ... ต่อให้การต่อสู้จะดำเนินต่อก็เถอะ..."
10102-CVGroup_Tactic_Victory_2-1 = "เสร็จเร็วกว่าที่คิดนะคะ... กะ... ก็ไม่ได้ยากนี่เนอะ..."

[translation]
10102-CVGroup_Battle_Buffed_1-1 = "헤헤, 저 같은 걸 위해서……."
10102-CVGroup_Battle_Covered_1-1 = "수, 숨어야지……."
10102-CVGroup_Battle_Defense_1-1 = "피, 피했는데요?!"
10102-CVGroup_Battle_In_1-1 = "이, 일단 시작해 볼게요……."
10102-CVGroup_Battle_In_2-1 = "이런 제가, 도움이 될지는 모르겠지만……."
10102-CVGroup_Battle_Move_1-1 = "또 있는 건가요……."
10102-CVGroup_Battle_Move_2-1 = "저, 전진!"
10102-CVGroup_Battle_Recovery_1-1 = "헤헤, 감사합니다."
10102-CVGroup_Battle_TacticalAction_1-1 = "가, 같이 가요!"
10102-CVGroup_Battle_Victory_1-1 = "헤, 헤헤, 이겼는데요…… 상품 같은 건 없나요?"
10102-CVGroup_Battle_Victory_2-1 = "이제 축제장으로 돌아가죠……!"
10102-CVGroup_CommonSkill-1 = "더, 더울 땐, 이렇게……."
10102-CVGroup_ExSkill_1-1 = "이, 이번에야말로……!"
10102-CVGroup_ExSkill_2-1 = "놓칠 수 없어요……!"
10102-CVGroup_ExSkill_3-1 = "노리는 건 일등상……!"
10102-CVGroup_ExSkill_Level_1-1 = "앞으로 다섯 발!"
10102-CVGroup_ExSkill_Level_2-1 = "쏘, 쏠게요!"
10102-CVGroup_ExSkill_Level_3-1 = "순순히 맞아주세요!"
10102-CVGroup_Formation_In_1-1 = "이, 이런 차림인데, 괜찮나요?"
10102-CVGroup_Formation_In_2-1 = "네, 네에……! 준비는 됐는데요……!"
10102-CVGroup_Formation_Select-1 = "에, 에헤헤…… 제가 나서야겠네요……."
10102-CVGroup_Growup_1-1 = "저, 저한테 주시는 건가요……? 착각하신 건 아니죠?"
10102-CVGroup_Growup_2-1 = "저한테 시키실 일이 있으신 거네요…… 헤헤, 역시 그렇겠죠……."
10102-CVGroup_Growup_3-1 = "에헤헤, 감사합니다…… 이런 것도 좋지만,\n역시 빙수가 더 힘이 날 것 같은데요……."
10102-CVGroup_Growup_4-1 = "어, 어쩐지 평소보다 즐거운 기분이 들어서 어색하네요…….\n여름이라 그런 걸까요……? 아니면 선생님 때문……?"
10102-CVGroup_Relationship_Up_1-1 = "저, 저를 믿으시는 건가요……? 정말로……?"
10102-CVGroup_Relationship_Up_2-1 = "그, 그렇게 칭찬해도…… 제가 드릴 수 있는 건 없는데요…….\n서, 설마 제 수영복을 노리고?! ……아, 아니라고요?"
10102-CVGroup_Relationship_Up_3-1 = "저어, 선생님, 야끼소바는 좋아하시나요……?\n같이 먹으러 가실래요?\n헤헤, 죄송하지만 계산은 부탁드릴게요……."
10102-CVGroup_Relationship_Up_4-1 = "선생님을 만난 뒤로 조금 덜해지기는 했지만……\n그래도 인생은 괴로운 거네요……."
10102-CVGroup_Tactic_In_1-1 = "역시 인생은 괴로운 거네요……."
10102-CVGroup_Tactic_In_2-1 = "여, 여기까지 와서 전투라니……."
10102-CVGroup_Tactic_Victory_1-1 = "이겼네요…… 물론 싸움은 계속되겠지만……."
10102-CVGroup_Tactic_Victory_2-1 = "예상보다는 빨리 끝났네요…… 어, 어렵진 않았으니까……."

[translation]
20021-CVGroup_CommonSkill-1 = "Does anyone need mistletoe—I mean, medical attention?"
20021-CVGroup_ExSkill_1-1 = "This is a gift for everyone!"
20021-CVGroup_ExSkill_2-1 = "Today, I'm Santa!"
20021-CVGroup_ExSkill_3-1 = "I wish joy and merriment to all!"
20021-CVGroup_ExSkill_Level_1-1 = "This present is for you!"
20021-CVGroup_ExSkill_Level_2-1 = "Please take this!"
20021-CVGroup_ExSkill_Level_3-1 = "Do you like it?"
20021-CVGroup_Formation_In_1-1 = "I'll work hard to be Santa!"
20021-CVGroup_Formation_In_2-1 = "Just leave it to us!"
20021-CVGroup_Formation_Select-1 = "Tada! I prepared this for Sensei!"
20021-CVGroup_Growup_1-1 = "Santa Claus is amazing!!! And as long as I'm Santa, I'll do everything I can to be more like the real deal!"
20021-CVGroup_Growup_2-1 = "As long as I'm wearing this, I'll give it my all! Will you help me, Sensei?"
20021-CVGroup_Growup_3-1 = "I may not be the real Santa, but I'm determined to bring joy to all!"
20021-CVGroup_Growup_4-1 = "I hope everyone is happy one day!"
20021-CVGroup_Relationship_Up_1-1 = "What do I think the most important part of Christmas is...? Love, of course!"
20021-CVGroup_Relationship_Up_2-1 = "Sensei! Any chance you're in the market for a sled capable of mach 2?"
20021-CVGroup_Relationship_Up_3-1 = "I wish everyone could feel as happy as I am right now."
20021-CVGroup_Relationship_Up_4-1 = "If I could wish for one thing... It would be more time with you!"

[translation]
20021-CVGroup_CommonSkill-1 = "需要治療的人在哪裡呀～？"
20021-CVGroup_ExSkill_1-1 = "發禮物給大家唷～！"
20021-CVGroup_ExSkill_2-1 = "因為我今天一整天都是聖誕老人！"
20021-CVGroup_ExSkill_3-1 = "將幸福傳遞給大家！"
20021-CVGroup_ExSkill_Level_1-1 = "來，請收下禮物！"
20021-CVGroup_ExSkill_Level_2-1 = "請收下吧！"
20021-CVGroup_ExSkill_Level_3-1 = "還喜歡嗎？"
20021-CVGroup_Formation_In_1-1 = "我會以聖誕老人的身份努力的！"
20021-CVGroup_Formation_In_2-1 = "請交給我吧！"
20021-CVGroup_Formation_Select-1 = "送禮物給老師！"
20021-CVGroup_Growup_1-1 = "聖誕老人真的很厲害……\n不過，現在的我就是聖誕老人，所以會努力向本尊看齊的！"
20021-CVGroup_Growup_2-1 = "既然穿上了這件衣服，我會加油的唷！\n老師也願意幫我嗎？"
20021-CVGroup_Growup_3-1 = "就算無法成為真正的聖誕老人，我還是想把幸福傳遞給大家！"
20021-CVGroup_Growup_4-1 = "希望有朝一日，大家都能變得幸福！"
20021-CVGroup_Relationship_Up_1-1 = "聖誕節重要的東西……？\n那當然是愛囉！"
20021-CVGroup_Relationship_Up_2-1 = "老師！你對能以時速2馬赫前進的雪橇有沒有興趣呀？"
20021-CVGroup_Relationship_Up_3-1 = "希望大家都能跟今天的我一樣幸福。"
20021-CVGroup_Relationship_Up_4-1 = "如果只能得到一個禮物的話……\n我想要跟老師在一起的時間！"

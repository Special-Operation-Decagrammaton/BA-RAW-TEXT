[translation]
26015-CVGroup_CommonSkill-1 = "จะยิงสนับสนุนแล้วนะคะ~"
26015-CVGroup_ExSkill_1-1 = "อ่า~ ถ้าทำแบบนั้นที่น่ามันจะแย่เอานะ~ เฮ้อ..."
26015-CVGroup_ExSkill_2-1 = "คือว่าอย่าบาดเจ็บนะคะ~ มันเจ็บนิดเดียวค่า"
26015-CVGroup_ExSkill_3-1 = "เฮ้อ จริงๆ เลย~ มาจากไหนกันอีกนะ... ฮะฮ่า"
26015-CVGroup_ExSkill_Level_1-1 = "ฮะฮ่า! อะฮ่าฮ่าฮ่าฮ่า! ฮ่า..."
26015-CVGroup_ExSkill_Level_2-1 = "ลุยไปให้สุดกันเลยค่ะ! อะฮ่าฮ่าฮ่า... ฮ่าฮ่า..."
26015-CVGroup_ExSkill_Level_3-1 = "อะฮ่าฮ่า! ตอนนี้จะเป็นยังไงก็ไม่รู้ด้วยแล้วค่ะ! เฮ้อ..."
26015-CVGroup_Formation_In_1-1 = "เตรียมพร้อมออกปฏิบัติการค่ะ"
26015-CVGroup_Formation_In_2-1 = "อ่า~ ถึงอยู่ที่นี่ก็ยังยุ่งสินะคะ~"
26015-CVGroup_Formation_Select-1 = "ที่นี่ก็เหมือนกันสินะ มะ... ไม่มีอะไรค่ะ"
26015-CVGroup_Growup_1-1 = "โอ้ เจ้านี่มัน... อ่า~ ได้เรียนรู้กับคุณครูนี่ไม่เหมือนใครเลยนะคะ!"
26015-CVGroup_Growup_2-1 = "อ๊ะ ให้ฉันอีกแล้วเหรอคะ?\nอืม... ฉันจะพยายามให้มากขึ้นค่ะ ฮ่าฮ่า!"
26015-CVGroup_Growup_3-1 = "ฉันไม่ได้อยากเป็นนักเรียนตัวป่วนแบบนี้หรอกนะคะ"
26015-CVGroup_Growup_4-1 = "ฮ่าฮ่า... คุณครูไปดูแลนักเรียนคนอื่นก่อนก็ได้นะคะ\nฉันไม่ได้คิดมากอะไรหรอกค่ะ"
26015-CVGroup_Relationship_Up_1-1 = "อืม~ อืมมม~ เฮ้อ... จริงๆ เลยนะคะ ขอบคุณค่ะ"
26015-CVGroup_Relationship_Up_2-1 = "ฉันจะตอบแทนทั้งหมดนี้ได้ยังไง...\nเดาว่าคุณครูก็คงจะบอกว่าไม่เป็นอะไรอีกสินะคะ"
26015-CVGroup_Relationship_Up_3-1 = "คือ... ขอบคุณที่เอ็นดูฉันนะคะ\nแต่ฉันไม่ได้เป็นคนที่สมบูรณ์แบบอย่างที่เห็นหรอกนะคะ"
26015-CVGroup_Relationship_Up_4-1 = "คุณครูนี่เป็นคนที่ช่างสังเกตหรือไม่ใช่กันนะ..."

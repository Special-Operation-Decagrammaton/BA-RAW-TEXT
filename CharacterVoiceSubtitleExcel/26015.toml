[translation]
26015-CVGroup_CommonSkill-1 = "支援射擊，要上囉～"
26015-CVGroup_ExSkill_1-1 = "好了好了，先冷靜一下……啊哈哈……"
26015-CVGroup_ExSkill_2-1 = "趁還沒受傷之前……我應該已經說過了吧？"
26015-CVGroup_ExSkill_3-1 = "才稍微移開視線就馬上……唉……"
26015-CVGroup_ExSkill_Level_1-1 = "哈哈！啊哈哈哈哈！\n……唉。"
26015-CVGroup_ExSkill_Level_2-1 = "已經都無所謂了啦！！\n啊哈哈哈哈……哈哈……"
26015-CVGroup_ExSkill_Level_3-1 = "啊哈哈！！正合我意！！\n……唉～"
26015-CVGroup_Formation_In_1-1 = "隨時可以出發唷～"
26015-CVGroup_Formation_In_2-1 = "哎呀，連休息的時間都沒有呢～"
26015-CVGroup_Formation_Select-1 = "果然，這裡也一樣嗎……\n啊，我只是在自言自語而已。"
26015-CVGroup_Growup_1-1 = "這個是因為這樣，才會變成這樣……原來如此！\n果然老師很擅長教人呢！"
26015-CVGroup_Growup_2-1 = "咦，還要給我嗎？\n那我得更努力才行呢！"
26015-CVGroup_Growup_3-1 = "雖然受到很多照顧讓人很開心……\n但應該……不會被當成「令人費心的孩子」吧……？"
26015-CVGroup_Growup_4-1 = "不用只顧我一個人沒關係哦，老師。\n就算去關心其他孩子，我也不會鬧彆扭的。"
26015-CVGroup_Relationship_Up_1-1 = "明明都說過已經夠了……呵呵……我就心懷感激地收下囉。"
26015-CVGroup_Relationship_Up_2-1 = "總有一天，我會好好回報的。\n「不需要」之類的話，我可不許你說哦。"
26015-CVGroup_Relationship_Up_3-1 = "那個……雖然很高興你願意對我好～\n但我，其實不是什麼有趣的人唷？"
26015-CVGroup_Relationship_Up_4-1 = "唉……老師究竟是貼心，還是不貼心呢……\n沒事，我只是在自言自語哦。"

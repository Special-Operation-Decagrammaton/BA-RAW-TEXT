[translation]
26015-CVGroup_CommonSkill-1 = "지원 사격, 갑니다~"
26015-CVGroup_ExSkill_1-1 = "아~ 여기서 그러시면 곤란~ ……하하아."
26015-CVGroup_ExSkill_2-1 = "저기, 다치시지 말임다~ ……다친다고요."
26015-CVGroup_ExSkill_3-1 = "아이참~ 또 어디로 들어오신…… 하핫."
26015-CVGroup_ExSkill_Level_1-1 = "하핫! 아하하하하핫! ……하."
26015-CVGroup_ExSkill_Level_2-1 = "갈 데까지 가보자고요! 아하하하하…… 하하……."
26015-CVGroup_ExSkill_Level_3-1 = "아하하! 이젠 어떻게 돼도 모릅니다! ……에휴."
26015-CVGroup_Formation_In_1-1 = "출동 준비 완료임다!"
26015-CVGroup_Formation_In_2-1 = "이야~ 여기서도 바쁘네요~"
26015-CVGroup_Formation_Select-1 = "역시 여기서도인가…… 아. 아무것도 아님다."
26015-CVGroup_Growup_1-1 = "오, 이걸 이렇게…… 이야~ 역시 선생님께 배우면 다르네요!"
26015-CVGroup_Growup_2-1 = "앗, 또 주시는 겁니까? 음…… 더 열심히 해보죠, 뭐. 하하!"

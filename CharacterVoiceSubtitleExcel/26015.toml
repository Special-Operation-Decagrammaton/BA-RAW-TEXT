26015-CVGroup_Growup_4-1 = "하하…… 저보다는 다른 학생을 우선하셔도 괜찮은데 말임다.\n딱히 저는 신경 쓰지 않으니까요?"
26015-CVGroup_Relationship_Up_1-1 = "음~ 으으으음~ 하아……. 정말이지. 감사합니다."
26015-CVGroup_Relationship_Up_2-1 = "이걸 다 어떻게 돌려드려야…… 또 그럴 필요 없다 하시겠지만요."
26015-CVGroup_Relationship_Up_3-1 = "저, 좋게 봐주셔서 감사하지만, 저는 보기보다 좀 변변찮은 사람이라고요?"
26015-CVGroup_Relationship_Up_4-1 = "정말 선생님께서는…… 눈치가 좋으신 건지, 나쁘신 건지……."

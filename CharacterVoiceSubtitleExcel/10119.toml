[translation]
10119-CVGroup_Battle_Buffed_1-1 = "我被信任著呢……一定是。"
10119-CVGroup_Battle_Defense_1-1 = "只有這種程度嗎？"
10119-CVGroup_Battle_In_1-1 = "走吧。"
10119-CVGroup_Battle_In_2-1 = "百花繚亂的力量，讓你見識見識。"
10119-CVGroup_Battle_Move_1-1 = "不要放鬆警戒。"
10119-CVGroup_Battle_Move_2-1 = "還沒結束。"
10119-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10119-CVGroup_Battle_TacticalAction_1-1 = "趕緊行動吧。"
10119-CVGroup_Battle_Victory_1-1 = "仍有許多損害。"
10119-CVGroup_Battle_Victory_2-1 = "不可以自滿。"
10119-CVGroup_CommonSkill-1 = "這樣就完美了。"
10119-CVGroup_ExSkill_1-1 = "如果能幫助大家的話……！"
10119-CVGroup_ExSkill_2-1 = "我會……繼續扮演下去。\n名為御稜名草的角色……！"
10119-CVGroup_ExSkill_3-1 = "……我更害怕失去大家！"
10119-CVGroup_ExSkill_Level_1-1 = "這就是……我能做到的最好的事。"
10119-CVGroup_ExSkill_Level_2-1 = "絕對不會退讓！"
10119-CVGroup_ExSkill_Level_3-1 = "堂堂正正地──決一勝負！"
10119-CVGroup_Formation_In_1-1 = "……交給我吧。"
10119-CVGroup_Formation_In_2-1 = "……我會盡己所能。"
10119-CVGroup_Formation_Select-1 = "噫噫！？\n……老師，怎麼了嗎？"
10119-CVGroup_Growup_1-1 = "這真的，是我的力量嗎？\n……謝謝你，老師。"
10119-CVGroup_Growup_2-1 = "怎麼樣呢……？\n我只是始終全力以赴而已。"
10119-CVGroup_Growup_3-1 = "原來還有這樣的力量啊……\n謝謝你，是老師讓我發現的。"
10119-CVGroup_Growup_4-1 = "還不夠……我還得更加努力才行。\n謝謝你的教導，老師。"
10119-CVGroup_Relationship_Up_1-1 = "雪雖然接觸到熱就會融化……\n只要能待在老師身邊的話，那也無所謂吧。"
10119-CVGroup_Relationship_Up_2-1 = "我明明只有漂亮這個優點而已……\n為什麼要對我這麼溫柔呢……？"
10119-CVGroup_Relationship_Up_3-1 = "……別看我這樣，我正打從心底感謝著你哦。\n雖然我是無表情系美少女，所以看起來可能不像就是了。"
10119-CVGroup_Relationship_Up_4-1 = "老師的手，真溫暖呢。"
10119-CVGroup_Tactic_In_1-1 = "抵達作戰地區。"
10119-CVGroup_Tactic_In_2-1 = "雖然可能不太可靠……希望你能相信我。"
10119-CVGroup_Tactic_Victory_1-1 = "平安結束了呢。\n都是大家的功勞……謝謝你們。"
10119-CVGroup_Tactic_Victory_2-1 = "這種程度是當然的……\n本來還能做得更多。"

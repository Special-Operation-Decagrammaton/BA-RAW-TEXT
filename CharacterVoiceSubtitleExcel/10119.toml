[translation]
10119-CVGroup_Battle_Buffed_1-1 = "신뢰받고 있는 걸까……"
10119-CVGroup_Battle_Defense_1-1 = "그게 전부야?"
10119-CVGroup_Battle_In_1-1 = "다들, 가자."
10119-CVGroup_Battle_In_2-1 = "보여줄게, 백화요란의 힘을."
10119-CVGroup_Battle_Move_1-1 = "경계를 늦추지 마."
10119-CVGroup_Battle_Move_2-1 = "아직 끝나지 않았어."
10119-CVGroup_Battle_Recovery_1-1 = "고마워."
10119-CVGroup_Battle_TacticalAction_1-1 = "신속하게."
10119-CVGroup_Battle_Victory_1-1 = "아직, 피해가 많아."
10119-CVGroup_Battle_Victory_2-1 = "……작은 승리에 자만해서는 안 돼."
10119-CVGroup_CommonSkill-1 = "좋아, 완벽해."
10119-CVGroup_ExSkill_1-1 = "그것이 모두를 지킬 수 있는 방법이라면……!"
10119-CVGroup_ExSkill_2-1 = "연기를 계속하겠어. 고료 나구사라는 역할을, 계속해서!"
10119-CVGroup_ExSkill_3-1 = "무섭지만, 모두를 잃는 게 더 무서워!"
10119-CVGroup_ExSkill_Level_1-1 = "이것이 내가 할 수 있는 최선이니까."
10119-CVGroup_ExSkill_Level_2-1 = "물러서지 않겠어!"
10119-CVGroup_ExSkill_Level_3-1 = "정정당당하게 승부!"
10119-CVGroup_Formation_In_1-1 = "……내가 가보도록 할까."
10119-CVGroup_Formation_In_2-1 = "최선을 다할게."
10119-CVGroup_Formation_Select-1 = "흐, 흐앗?! ……선생님, 무슨 일이야?"
10119-CVGroup_Growup_1-1 = "정말로, 이게 나의 힘이라고? ……고마워, 선생님."
10119-CVGroup_Growup_2-1 = "성장했다고? 글쎄…… 나는 항상 최선을 다할 뿐이니까."
10119-CVGroup_Growup_3-1 = "내게도 이런 가능성이 있었구나. 고마워, 선생님 덕분이야."
10119-CVGroup_Growup_4-1 = "역시, 아직 한참 멀었구나. 미숙함을 뼈저리게 느꼈어. 고마워, 선생님."
10119-CVGroup_Relationship_Up_1-1 = "따사로운 햇살 아래에서 눈은 녹아버리는 법이지만……\n선생님의 곁에 있을 수 있다면, 그런 결말도 나쁘진 않을 것 같네."
10119-CVGroup_Relationship_Up_2-1 = "장점이라고는 얼굴이 예쁜 정도밖에 없는 내게\n선생님은 어째서 이렇게 잘해주는 거야?"
10119-CVGroup_Relationship_Up_3-1 = "이래 봬도, 진심으로 감사하고 있어.\n감정 표현이 둔한 미소녀라 그리 보이지는 않겠지만."
10119-CVGroup_Relationship_Up_4-1 = "선생님의 손, 따뜻해서 좋아."
10119-CVGroup_Tactic_In_1-1 = "작전 구역에 도착했어."
10119-CVGroup_Tactic_In_2-1 = "비록 미덥지 않겠지만, 나를 믿어줬으면 해."
10119-CVGroup_Tactic_Victory_1-1 = "이번 작전은 성공이네. 모두가 노력한 덕이야. 다들 고마워."
10119-CVGroup_Tactic_Victory_2-1 = "이 정도는 당연해. 더 잘할 수도 있었을 거야."

[translation]
10119-CVGroup_Battle_Buffed_1-1 = "Is this...trust? In me?"
10119-CVGroup_Battle_Defense_1-1 = "Is that all?"
10119-CVGroup_Battle_In_1-1 = "Everyone, let's begin."
10119-CVGroup_Battle_In_2-1 = "I'll show you the power of the Hyakkaryouran."
10119-CVGroup_Battle_Move_1-1 = "Don't let your guard down."
10119-CVGroup_Battle_Move_2-1 = "It's not over yet."
10119-CVGroup_Battle_Recovery_1-1 = "Thank you."
10119-CVGroup_Battle_TacticalAction_1-1 = "Quickly."
10119-CVGroup_Battle_Victory_1-1 = "There's been much damage."
10119-CVGroup_Battle_Victory_2-1 = "...One small victory is no excuse for overconfidence."
10119-CVGroup_CommonSkill-1 = "Yes, perfect."
10119-CVGroup_ExSkill_1-1 = "If this is the path I must take to protect everyone...!"
10119-CVGroup_ExSkill_2-1 = "Then I'll lie, and I'll play the role of Goryou Nagusa!"
10119-CVGroup_ExSkill_3-1 = "I'm afraid, but I'm even more afraid of losing everyone!"
10119-CVGroup_ExSkill_Level_1-1 = "This is my best."
10119-CVGroup_ExSkill_Level_2-1 = "I will not back down!"
10119-CVGroup_ExSkill_Level_3-1 = "A showdown, fair and square!"
10119-CVGroup_Formation_In_1-1 = "...Perhaps I'll go."
10119-CVGroup_Formation_In_2-1 = "I will do my best."
10119-CVGroup_Formation_Select-1 = "E-Eh?! ...Sensei, is there a problem?"
10119-CVGroup_Growup_1-1 = "This is really my power? ...Thank you, Sensei."
10119-CVGroup_Growup_2-1 = "I've grown? Well... I'm simply doing my best."
10119-CVGroup_Growup_3-1 = "It's thanks to you that I've unlocked this potential within me, Sensei."
10119-CVGroup_Growup_4-1 = "I still have much to learn, but I know my shortcomings now. Thank you, Sensei."
10119-CVGroup_Relationship_Up_1-1 = "Snow melts under warm sunlight...but if I meet the end by your side, then I have no complaints."
10119-CVGroup_Relationship_Up_2-1 = "My only strength is my beauty, so why do you treat me with such kindness, Sensei?"
10119-CVGroup_Relationship_Up_3-1 = "Despite everything, I'm truly grateful. Although it may not appear so, since I'm considered an expressionless beauty."
10119-CVGroup_Relationship_Up_4-1 = "Sensei's hand... It's nice...and warm."
10119-CVGroup_Tactic_In_1-1 = "We've arrived at the operation area."
10119-CVGroup_Tactic_In_2-1 = "I may not appear reliable, but please believe in me."
10119-CVGroup_Tactic_Victory_1-1 = "The operation was successful thanks to everyone's efforts. Thank you."
10119-CVGroup_Tactic_Victory_2-1 = "This much is only natural. There's room for improvement."

[translation]
16016-CVGroup_Battle_Buffed_1-1 = "相當有幫助。"
16016-CVGroup_Battle_Defense_1-1 = "沒用的！"
16016-CVGroup_Battle_In_1-1 = "由我來帶領吧。"
16016-CVGroup_Battle_In_2-1 = "請欣賞我的節奏！"
16016-CVGroup_Battle_Move_1-1 = "進入下一首曲目！"
16016-CVGroup_Battle_Move_2-1 = "乘著旋律！"
16016-CVGroup_Battle_Recovery_1-1 = "我很感謝。"
16016-CVGroup_Battle_TacticalAction_1-1 = "哈！"
16016-CVGroup_Battle_Victory_1-1 = "真是場出色的表演。"
16016-CVGroup_Battle_Victory_2-1 = "讓會場籠罩溫暖的旋律！"
16016-CVGroup_CommonSkill-1 = "乘著節奏！"
16016-CVGroup_ExSkill_1-1 = "傳遞我們的歌聲！"
16016-CVGroup_ExSkill_2-1 = "來，我們開始吧！"
16016-CVGroup_ExSkill_3-1 = "最後衝刺，出發吧！"
16016-CVGroup_ExSkill_Level_1-1 = "哈啊啊！！"
16016-CVGroup_ExSkill_Level_2-1 = "我要上了！！"
16016-CVGroup_ExSkill_Level_3-1 = "與大家一起！！"
16016-CVGroup_Formation_In_1-1 = "這件事就請交給我吧。"
16016-CVGroup_Formation_In_2-1 = "我向您承諾，將帶來正確的表演。"
16016-CVGroup_Formation_Select-1 = "呵呵，您叫我嗎？"
16016-CVGroup_Growup_1-1 = "非常感謝您的支援，老師。\n我確實收到了。"
16016-CVGroup_Growup_2-1 = "來自老師的支援……真是非常感謝。\n由於鮮少有這樣的機會，讓人有種很不可思議的感覺。"
16016-CVGroup_Growup_3-1 = "為了帶來更棒的表演，我會盡己所能。"
16016-CVGroup_Growup_4-1 = "這是……呵呵。\n以後也請您拭目以待哦。"
16016-CVGroup_Relationship_Up_1-1 = "那個……我感覺跟老師之間有點距離。\n如果您沒有那個意思的話……能請您稍微，離我近一點嗎？"
16016-CVGroup_Relationship_Up_2-1 = "明明是與平時不同的服裝，內心卻莫名的平靜。\n這是為什麼呢……？"
16016-CVGroup_Relationship_Up_3-1 = "如果有什麼我能為您做的，請儘管說。"
16016-CVGroup_Relationship_Up_4-1 = "這股內心的悸動……\n我想肯定是因為離實戰，越來越近的關係……"
16016-CVGroup_Tactic_In_1-1 = "永駐於心的時光，就由我來獻給您吧。"
16016-CVGroup_Tactic_In_2-1 = "呵呵，敬請期待。"
16016-CVGroup_Tactic_Victory_1-1 = "感覺如何呢？期待您的感想。"
16016-CVGroup_Tactic_Victory_2-1 = "呼……總算順利唱完歌了。"

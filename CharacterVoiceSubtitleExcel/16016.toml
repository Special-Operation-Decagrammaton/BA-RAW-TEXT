[translation]
16016-CVGroup_Battle_Buffed_1-1 = "도움이 되었습니다."
16016-CVGroup_Battle_Defense_1-1 = "소용없어요!"
16016-CVGroup_Battle_In_1-1 = "제가 리드해드릴게요."
16016-CVGroup_Battle_In_2-1 = "제 리듬을 들어보세요!"
16016-CVGroup_Battle_Move_1-1 = "다음 곡목으로!"
16016-CVGroup_Battle_Move_2-1 = "선율을 타고!"
16016-CVGroup_Battle_Recovery_1-1 = "감사합니다."
16016-CVGroup_Battle_TacticalAction_1-1 = "핫!"
16016-CVGroup_Battle_Victory_1-1 = "만족스러운 무대였습니다."
16016-CVGroup_Battle_Victory_2-1 = "공연장에 부드러운 선율을!"
16016-CVGroup_CommonSkill-1 = "리듬에 맞춰!"
16016-CVGroup_ExSkill_1-1 = "저희의 노랫소리를 들려드리겠습니다!"
16016-CVGroup_ExSkill_2-1 = "자, 가보실까요!"
16016-CVGroup_ExSkill_3-1 = "라스트 스퍼트, 갑시다!"
16016-CVGroup_ExSkill_Level_1-1 = "하아압!!"
16016-CVGroup_ExSkill_Level_2-1 = "갑니다!!"
16016-CVGroup_ExSkill_Level_3-1 = "모두 함께!!"
16016-CVGroup_Formation_In_1-1 = "이 건은 저에게 맡겨주세요."
16016-CVGroup_Formation_In_2-1 = "정확한 퍼포먼스를, 약속드리겠습니다."
16016-CVGroup_Formation_Select-1 = "후후, 부르셨나요?"
16016-CVGroup_Growup_1-1 = "준비는 철저할수록 좋죠. 확실히 받았습니다."
16016-CVGroup_Growup_2-1 = "선생님으로부터의 지원…… 감사합니다.\n별로 이런 기회가 없기 때문에 굉장히 신기한 감각입니다."
16016-CVGroup_Growup_3-1 = "더 좋은 무대를 선사할 수 있도록 열심히 하겠습니다."
16016-CVGroup_Growup_4-1 = "이것은……후후. 앞으로 기대해 주세요."
16016-CVGroup_Relationship_Up_1-1 = "그…… 선생님과의 거리가 느껴져서요.\n그런 게 아니라면…… 좀 더 가까이 다가와 주시겠습니까?"
16016-CVGroup_Relationship_Up_2-1 = "평소와 다른 의상인데 왠지 마음이 편안해요. 어째서일까요……?"
16016-CVGroup_Relationship_Up_3-1 = "뭔가 할 수 있는 게 있다면, 뭐든 말씀 주세요."
16016-CVGroup_Relationship_Up_4-1 = "이 가슴의 두근거림…… 분명 실전이 가깝기 때문이라고 생각합니다……"
16016-CVGroup_Tactic_In_1-1 = "잊을 수 없는 시간을 만들어 드리죠."
16016-CVGroup_Tactic_In_2-1 = "후훗, 기대해 주세요."
16016-CVGroup_Tactic_Victory_1-1 = "어떠신가요? 감상이 듣고 싶습니다만."
16016-CVGroup_Tactic_Victory_2-1 = "후우……무사히 노래를 마칠 수 있었습니다."

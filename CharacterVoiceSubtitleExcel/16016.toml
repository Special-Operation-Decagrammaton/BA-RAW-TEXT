16016-CVGroup_Formation_In_1-1 = "เรื่องนี้ให้เป็นหน้าที่ฉันเองค่ะ"
16016-CVGroup_Formation_In_2-1 = "ฉันรับรองได้เรื่องการแสดงที่แม่นยำค่ะ"
16016-CVGroup_Formation_Select-1 = "ฮุฮุ เรียกฉันเหรอคะ?"
16016-CVGroup_Growup_1-1 = "ยิ่งเตรียมการให้พร้อมไว้ก็ยิ่งดีนะคะ ฉันได้รับเรียบร้อยแล้วค่ะ"
16016-CVGroup_Growup_2-1 = "การสนับสนุนจากคุณครู... ขอบคุณมากค่ะ\nโอกาสแบบนี้มีไม่ค่อยบ่อยเท่าไร เป็นความรู้สึกที่แปลกใหม่มากเลยค่ะ"
16016-CVGroup_Growup_3-1 = "ฉันจะพยายามเต็มที่เพื่อการแสดงที่ดีขึ้นค่ะ"
16016-CVGroup_Growup_4-1 = "นี่มัน... ฮุฮุ ตั้งตารอได้เลยค่ะ"
16016-CVGroup_Relationship_Up_1-1 = "คือ... ฉันรู้สึกได้ถึงระยะห่างระหว่างฉันกับคุณครูค่ะ\nถ้าไม่ใช่แบบนั้นละก็... ช่วยเข้ามาใกล้ๆ ฉันอีกสักหน่อยได้หรือเปล่าคะ?"
16016-CVGroup_Relationship_Up_2-1 = "ทั้งที่ใส่ชุดที่ต่างไปจากตอนปกติ แต่รู้สึกสบายใจมากเลยค่ะ เพราะอะไรกันนะคะ...?"
16016-CVGroup_Relationship_Up_3-1 = "ถ้ามีอะไรที่ฉันทำได้... บอกฉันได้ทุกเรื่องเลยนะคะ"
16016-CVGroup_Relationship_Up_4-1 = "ความตื่นเต้นที่ฉันรู้สึก... ฉันคิดว่าเป็นเพราะใกล้ถึงวันแข่งจริงแล้วน่ะค่ะ"
16016-CVGroup_Tactic_In_1-1 = "ฉันจะทำให้เป็นช่วงเวลาที่ประทับใจไม่ลืมเลยค่ะ"
16016-CVGroup_Tactic_In_2-1 = "ฮุฮุ ตั้งตารอได้เลยค่ะ"
16016-CVGroup_Tactic_Victory_1-1 = "เป็นยังไงบ้างคะ? ฉันอยากฟังความเห็นสักหน่อยค่ะ"
16016-CVGroup_Tactic_Victory_2-1 = "ฮู่ว... ร้องเพลงจบได้อย่างปลอดภัยแล้วค่ะ"

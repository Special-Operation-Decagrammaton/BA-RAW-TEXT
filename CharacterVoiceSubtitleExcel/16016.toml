16016-CVGroup_Battle_Victory_2-1 = "จังหวะดนตรีที่ไหลลื่นในฮอลล์แสดง!"
16016-CVGroup_CommonSkill-1 = "ให้ตรงจังหวะ!"
16016-CVGroup_ExSkill_1-1 = "ฉันจะให้ทุกคนได้ฟังบทเพลงของพวกเราค่ะ!"
16016-CVGroup_ExSkill_2-1 = "เอาละ ไปกันเลยค่ะ!"

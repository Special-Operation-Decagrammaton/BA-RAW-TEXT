[translation]
10023-CVGroup_Battle_Buffed_1-1 = "好，走吧！"
10023-CVGroup_Battle_Covered_1-1 = "暫時躲起來……！"
10023-CVGroup_Battle_Defense_1-1 = "沒用的！"
10023-CVGroup_Battle_In_1-1 = "從現在起，開始夏日合宿的訓練！"
10023-CVGroup_Battle_In_2-1 = "就讓你像沙堡一樣被破壞得不留痕跡！"
10023-CVGroup_Battle_Move_1-1 = "移動地點。"
10023-CVGroup_Battle_Move_2-1 = "往狙擊點移動。"
10023-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10023-CVGroup_Battle_TacticalAction_1-1 = "好，趕緊往下個地點出發吧。"
10023-CVGroup_Battle_Victory_1-1 = "講不聽的蠢蛋，就只能請他們吃子彈了。"
10023-CVGroup_Battle_Victory_2-1 = "受不了，就算在海邊也興奮過頭了……\n這群笨蛋……"
10023-CVGroup_CommonSkill-1 = "看招！"
10023-CVGroup_ExSkill_1-1 = "真是的，難得的休息時間都……"
10023-CVGroup_ExSkill_2-1 = "至少稍微讓人悠哉一下吧……"
10023-CVGroup_ExSkill_3-1 = "這可是難得的非值班日啊……"
10023-CVGroup_ExSkill_Level_1-1 = "別想逃！"
10023-CVGroup_ExSkill_Level_2-1 = "無論狀況如何都別想逃！"
10023-CVGroup_ExSkill_Level_3-1 = "向違規者進行處罰！"
10023-CVGroup_Formation_In_1-1 = "沒問題。"
10023-CVGroup_Formation_In_2-1 = "在這裡也有任務嗎……"
10023-CVGroup_Formation_Select-1 = "等一下，別摸奇怪的地方！"
10023-CVGroup_Growup_1-1 = "這也是夏日合宿的成果啊。"
10023-CVGroup_Growup_2-1 = "原來如此……似乎有確實把技術學到身上。"
10023-CVGroup_Growup_3-1 = "就算是夏天，就算是大海，\n也不能怠於訓練。"
10023-CVGroup_Growup_4-1 = "嗯，確實有所成長……\n……喂，你在看哪裡啊！"
10023-CVGroup_Relationship_Up_1-1 = "我確實……依賴著老師。"
10023-CVGroup_Relationship_Up_2-1 = "今年的夏天就請你陪我囉。\n……不是，那個，我指的是訓練！"
10023-CVGroup_Relationship_Up_3-1 = "……莫非，你一直跟在我的後面嗎？\n咦咦……騙人的吧……"
10023-CVGroup_Relationship_Up_4-1 = "受不了，你真是個不可思議的人啊。\n除了變態之外，明明是個大人卻很丟臉……\n……不過，也總讓人放心不下。"
10023-CVGroup_Tactic_In_1-1 = "違反規則的人在哪裡！？"
10023-CVGroup_Tactic_In_2-1 = "那麼，來做個準備運動吧。"
10023-CVGroup_Tactic_Victory_1-1 = "受不了，真是群惱人的傢伙。"
10023-CVGroup_Tactic_Victory_2-1 = "這樣終於能悠哉地休息了。"

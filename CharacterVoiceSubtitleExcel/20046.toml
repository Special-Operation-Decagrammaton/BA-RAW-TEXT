[translation]
20046-CVGroup_CommonSkill-1 = "Nyaha! What a pretty flame!"
20046-CVGroup_ExSkill_1-1 = "Maybe just a little meddling..."
20046-CVGroup_ExSkill_2-1 = "Fufufu. Me? Meddling? Of couuurse not!"
20046-CVGroup_ExSkill_3-1 = "Oh my, that was embarrassing."
20046-CVGroup_ExSkill_Level_1-1 = "The view! What a view!"
20046-CVGroup_ExSkill_Level_2-1 = "Now then, shall we balance things?"
20046-CVGroup_ExSkill_Level_3-1 = "It's not a festival without a show!"
20046-CVGroup_Formation_In_1-1 = "Aha... Do you really need me?"
20046-CVGroup_Formation_In_2-1 = "It's rare for me to actually get involved, you know?"
20046-CVGroup_Formation_Select-1 = "Oh my..."
20046-CVGroup_Growup_1-1 = "Wooow... Everything's working out so well that it's actually scaring me... I'm truly impressed!"
20046-CVGroup_Growup_2-1 = "Oho, so that's one way to do it... I learned something from you!"
20046-CVGroup_Growup_3-1 = "Oh my, you're such a bad actor, Sensei! Why are you giving me all this?"
20046-CVGroup_Growup_4-1 = "It's hard work keeping things balanced. You must remain in constant motion to maintain it."
20046-CVGroup_Relationship_Up_1-1 = "How troublesome... The president of the Yin-Yang Club can't lean this way or that... How very troublesome."
20046-CVGroup_Relationship_Up_2-1 = "Pull if pushed, and push if pulled... What should I do? Ah, no... I was just talking to myself. Nyahaha..."
20046-CVGroup_Relationship_Up_3-1 = "Nyahah?! Y-You surprised me. Yes... I was just taken off guard, you know?"
20046-CVGroup_Relationship_Up_4-1 = "Uh, um, Sensei? Um... No, nothing, nyahaha!"

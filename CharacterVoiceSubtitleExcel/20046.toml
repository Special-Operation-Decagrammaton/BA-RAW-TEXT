[translation]
20046-CVGroup_CommonSkill-1 = "냐핫! 실로 예쁜 불꽃입니다~"
20046-CVGroup_ExSkill_1-1 = "가볍게 참견해 볼까요~"
20046-CVGroup_ExSkill_2-1 = "우후후. 아~무것도 하지 않았답니다? 저는요."
20046-CVGroup_ExSkill_3-1 = "야아~ 부끄러운 모습을 보였네요~"
20046-CVGroup_ExSkill_Level_1-1 = "절경~ 절경이로세~"
20046-CVGroup_ExSkill_Level_2-1 = "그럼, 균형을 맞춰볼까요?"
20046-CVGroup_ExSkill_Level_3-1 = "축제에는 볼거리가 빠질 수 없는 법~"
20046-CVGroup_Formation_In_1-1 = "아항~… 꼭 제가 필요하실까요?"
20046-CVGroup_Formation_In_2-1 = "제가 직접 나서는 일은 드물다고요?"
20046-CVGroup_Formation_Select-1 = "어머나…~"
20046-CVGroup_Growup_1-1 = "이야~ 무서울 만치 만사형통이네요~ 실로 감복했습니다~"
20046-CVGroup_Growup_2-1 = "오호라~ 이런 방법이…… 소녀가 또 한 수 배웠습니다!"
20046-CVGroup_Growup_3-1 = "아이고~ 선생님께서도 참 나쁜 분이십니다~ 뭘 자꾸 뭘 이렇게 주십니까~"
20046-CVGroup_Growup_4-1 = "균형을 지키는 것은 참으로 고되답니다.\n천칭의 수평을 맞추기 위해서는, 늘 움직이고 있어야 하니까요."
20046-CVGroup_Relationship_Up_1-1 = "곤란합니다…… 음양부장은 어디로도 치우쳐서는 안 되는 몸이거늘…… 참으로 곤란합니다."
20046-CVGroup_Relationship_Up_2-1 = "밀면 당기고, 당기면 민다…… 이걸 어쩐다. 앗, 아뇨…… 그냥 혼잣말입니다. 냐하하……."
20046-CVGroup_Relationship_Up_3-1 = "냐핫?! 까, 깜짝 놀랐네요. 네에…… 정말로, 놀랐을 뿐이랍니다~?"
20046-CVGroup_Relationship_Up_4-1 = "어, 음, 선생님? 저기…… 아니, 아무것도 아닙니다, 냐하핫~!"

[translation]
20046-CVGroup_CommonSkill-1 = "อะฮ่า! เป็นดอกไม้ไฟที่สวยจริงๆ เลยค่ะ~"
20046-CVGroup_ExSkill_1-1 = "ไปดูกันหน่อยดีมั้ยคะ~"
20046-CVGroup_ExSkill_2-1 = "ฮุฮุฮุ ฉันไม่ได้ทำอะไรเลย~ นะคะ"
20046-CVGroup_ExSkill_3-1 = "ตายจริง~ ให้เห็นมุมที่น่าอายเสียได้นะคะ~"
20046-CVGroup_ExSkill_Level_1-1 = "ทิวทัศน์~ สวยสดงดงามจริงๆ~"
20046-CVGroup_ExSkill_Level_2-1 = "งั้นมาทำให้สมดุลกันมั้ยคะ?"
20046-CVGroup_ExSkill_Level_3-1 = "งานเทศกาลต้องมีอะไรให้ตื่นตาตื่นใจอยู่แล้ว~"
20046-CVGroup_Formation_In_1-1 = "อ่า~... ต้องให้ฉันไปจริงๆ เหรอคะ?"
20046-CVGroup_Formation_In_2-1 = "ไม่ค่อยเห็นฉันออกหน้าเองเท่าไรเหรอคะ?"
20046-CVGroup_Formation_Select-1 = "ตายจริง...~"
20046-CVGroup_Growup_1-1 = "โอ้โห~ ทุกอย่างเสร็จสมหวังจนน่าประหลาดใจเลยค่ะ~ น่าประทับใจจริงเชียว~"
20046-CVGroup_Growup_2-1 = "โอ้โห~ มีวิธีแบบนี้ด้วย... เด็กสาวคนนี้ได้เรียนรู้ไปด้วยเลยค่ะ!"
20046-CVGroup_Growup_3-1 = "ตายจริง~ คุณครูเป็นคนไม่ดีเลยนะคะ~ เอาอะไรมาให้ตลอดเลยคะเนี่ย~"
20046-CVGroup_Growup_4-1 = "การรักษาสมดุลเป็นเรื่องยากจริงๆ ค่ะ\nเพราะเราต้องเคลื่อนไหวอยู่เสมอเพื่อรักษาสมดุลค่ะ"
20046-CVGroup_Relationship_Up_1-1 = "ยากเลยค่ะ... หัวหน้าชมรมหยินหยาง\nไม่ควรเอนเอียงไปทางไหนทั้งนั้น... ยากจริงๆ นะคะ"
20046-CVGroup_Relationship_Up_2-1 = "ถ้าผลักก็ดึง ถ้าดึงก็ผลัก... ฉันควรทำยังไงเนี่ย\nอ๊ะ เปล่าค่ะ... ฉันแค่พูดคนเดียวน่ะค่ะ อะฮะฮ่า..."
20046-CVGroup_Relationship_Up_3-1 = "อะฮ่า?! ตะ... ตกใจหมดเลยค่ะ\nค่ะ... ฉันแค่ตกใจเฉยๆ จริงๆ นะคะ~"
20046-CVGroup_Relationship_Up_4-1 = "อ่อ อืม... คุณครูคะ?\nเอ่อ... ไม่ค่ะ ไม่มีอะไรทั้งนั้นค่ะ อะฮะฮ่า~!"

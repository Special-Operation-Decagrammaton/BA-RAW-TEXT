[translation]
10107-CVGroup_Battle_Buffed_1-1 = "고마워요~!"
10107-CVGroup_Battle_Covered_1-1 = "숨었습니다!"
10107-CVGroup_Battle_Defense_1-1 = "아이쿠, 피해버렸네요!"
10107-CVGroup_Battle_In_1-1 = "준비~! 땅!"
10107-CVGroup_Battle_In_2-1 = "취재 시작입니다!"
10107-CVGroup_Battle_Move_1-1 = "쭉쭉 가볼까요!"
10107-CVGroup_Battle_Move_2-1 = "먼저 가볼게요!"
10107-CVGroup_Battle_Recovery_1-1 = "감사합니다! 힘이 나네요!"
10107-CVGroup_Battle_TacticalAction_1-1 = "얍!"
10107-CVGroup_Battle_Victory_1-1 = "낙승이네요~!"
10107-CVGroup_Battle_Victory_2-1 = "음, 만족스러운 취재였어요!"
10107-CVGroup_CommonSkill-1 = "다음 특집은, 이걸로 정했다!"
10107-CVGroup_ExSkill_1-1 = "기삿거리의 냄새가……. 아핫! 들켜버렸네요!"
10107-CVGroup_ExSkill_2-1 = "과연과연……? 와앗! 위험해!"
10107-CVGroup_ExSkill_3-1 = "자아, 어디......? 아하하! 큰일 났다! 도망쳐~!"
10107-CVGroup_ExSkill_Level_1-1 = "자, 받아주세요~!"
10107-CVGroup_ExSkill_Level_2-1 = "지금은 취재 중이므로!"
10107-CVGroup_ExSkill_Level_3-1 = "조~금 아플 거예요~?"
10107-CVGroup_Formation_In_1-1 = "제 도움이 필요하신 건가요~?"
10107-CVGroup_Formation_In_2-1 = "새로운 기삿거리가 있을지도!"
10107-CVGroup_Formation_Select-1 = "준비 오케이입니다!"
10107-CVGroup_Growup_1-1 = "앗, 감사합니다! 선생님!"
10107-CVGroup_Growup_2-1 = "넵! 앞으로도 서기의 혼을 불태워서, 열심히 해볼게요!"
10107-CVGroup_Growup_3-1 = "왠지 강해진 것 같은 기분입니다!\n지금이라면 <주간 만마전> 권유 활동도 잘 흘러갈 것 같은……!"
10107-CVGroup_Growup_4-1 = "와~! 기뻐요! 지금이라면 하늘도 날 수 있을 거 같아요!\n선생님! 사진 찍을 테니 이쪽으로 오세요! 자, 치즈!"
10107-CVGroup_Relationship_Up_1-1 = "아하핫…… 이거 살짝 쑥스럽네요~!"
10107-CVGroup_Relationship_Up_2-1 = "이건…… 기쁘네요.\n네? 평소보다 조용하다고요? 제가, 말인가요?\n아, 아닌데요~?"
10107-CVGroup_Relationship_Up_3-1 = "으으~! 정말! 이럴 때, 어떤 표정을 지어야 할지 모르겠어요~!"
10107-CVGroup_Relationship_Up_4-1 = "그, 이유는 잘 모르겠는데요!\n선생님을 좀 더 취재하고 싶은 마음입니다! 괜찮, 을까요……?"
10107-CVGroup_Tactic_In_1-1 = "다 함께 돌격해 볼까요~!"
10107-CVGroup_Tactic_In_2-1 = "다 같이 힘내자구요!"
10107-CVGroup_Tactic_Victory_1-1 = "얏호~ 임무 완료입니닷!"
10107-CVGroup_Tactic_Victory_2-1 = "좋은 사진을 많이 건졌네요~!"

[translation]
10107-CVGroup_Battle_Buffed_1-1 = "謝謝～！"
10107-CVGroup_Battle_Covered_1-1 = "躲藏起來！"
10107-CVGroup_Battle_Defense_1-1 = "哎呀，躲開了！"
10107-CVGroup_Battle_In_1-1 = "預備～！咚！"
10107-CVGroup_Battle_In_2-1 = "取材開始！"
10107-CVGroup_Battle_Move_1-1 = "一鼓作氣前進吧！"
10107-CVGroup_Battle_Move_2-1 = "先走一步囉！"
10107-CVGroup_Battle_Recovery_1-1 = "謝謝！又有力氣了！"
10107-CVGroup_Battle_TacticalAction_1-1 = "呀！"
10107-CVGroup_Battle_Victory_1-1 = "很輕鬆呢～！"
10107-CVGroup_Battle_Victory_2-1 = "嗯，是場充實的採訪！"
10107-CVGroup_CommonSkill-1 = "下次的特輯，就決定是這個了！"
10107-CVGroup_ExSkill_1-1 = "有題材的味道……\n啊哈！被發現了！"
10107-CVGroup_ExSkill_2-1 = "嗯嗯，原來如此……？\n哇！危險！"
10107-CVGroup_ExSkill_3-1 = "我瞧瞧……？\n啊哈哈！糟糕！開溜吧～！"
10107-CVGroup_ExSkill_Level_1-1 = "來，請接招吧～！"
10107-CVGroup_ExSkill_Level_2-1 = "現在正在取材！"
10107-CVGroup_ExSkill_Level_3-1 = "會有點～痛唷～？"
10107-CVGroup_Formation_In_1-1 = "需要幫忙嗎？"
10107-CVGroup_Formation_In_2-1 = "說不定能發現好題材～！"
10107-CVGroup_Formation_Select-1 = "準備OK了！"
10107-CVGroup_Growup_1-1 = "哇！謝謝你！老師！"
10107-CVGroup_Growup_2-1 = "是！未來我也會燃燒書記之魂，全力以赴的唷～！"
10107-CVGroup_Growup_3-1 = "感覺好像稍微變強了！\n現在的話，似乎連《週刊萬魔殿》的推廣活動也能順利進行……！"
10107-CVGroup_Growup_4-1 = "哇～！好開心！現在感覺都快飛上天了！\n老師！我要拍照了，一起入鏡吧！\n來，笑一個！"
10107-CVGroup_Relationship_Up_1-1 = "啊哈哈……總覺得有點害羞呢～！"
10107-CVGroup_Relationship_Up_2-1 = "這是……我很開心。\n咦……比平常還老實？是說我嗎？\n才，才沒有那種事呢～？"
10107-CVGroup_Relationship_Up_3-1 = "嗚嗚～真是的！\n這種時候，我不知道該擺出什麼表情才好！"
10107-CVGroup_Relationship_Up_4-1 = "那個，雖然我也說不太清楚！\n但我想再稍微……採訪一下老師！\n可以嗎……？"
10107-CVGroup_Tactic_In_1-1 = "大家一起突擊唷～！"
10107-CVGroup_Tactic_In_2-1 = "一起加油吧！"
10107-CVGroup_Tactic_Victory_1-1 = "是！任務完成！"
10107-CVGroup_Tactic_Victory_2-1 = "拍到了很多好照片～！"

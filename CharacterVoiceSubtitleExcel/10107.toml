[translation]
10107-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะคะ~!"
10107-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวเรียบร้อยค่ะ!"
10107-CVGroup_Battle_Defense_1-1 = "อุ๊ย หลบได้ซะด้วยค่ะ!"
10107-CVGroup_Battle_In_1-1 = "เตรียมตัว~ ลุย!"
10107-CVGroup_Battle_In_2-1 = "จะเริ่มการเก็บข้อมูลแล้วค่ะ!"
10107-CVGroup_Battle_Move_1-1 = "ลุยไปกันเลยค่ะ!"
10107-CVGroup_Battle_Move_2-1 = "ฉันจะลุยไปก่อนเองค่ะ!"
10107-CVGroup_Battle_Recovery_1-1 = "ขอบคุณนะคะ ฉันมีแรงทำต่อแล้วค่ะ!"
10107-CVGroup_Battle_TacticalAction_1-1 = "ย้าก!"
10107-CVGroup_Battle_Victory_1-1 = "ชนะขาดลอยเลยค่ะ~!"
10107-CVGroup_Battle_Victory_2-1 = "อื้ม เป็นการเก็บข้อมูลที่น่าพึงพอใจมากเลยค่ะ!"
10107-CVGroup_CommonSkill-1 = "ฉันตัดสินใจแล้วว่าจะใช้ในฉบับพิเศษฉบับต่อไปค่ะ!"
10107-CVGroup_ExSkill_1-1 = "ได้กลิ่นอะไรที่เป็นข่าวได้ด้วย...\nฮ่าฮ่า! โดนจับได้ซะแล้วค่ะ!"
10107-CVGroup_ExSkill_2-1 = "งั้นเหรอๆ...? ว้าก! อันตราย!"
10107-CVGroup_ExSkill_3-1 = "เอ้า อยู่ไหนๆ...?\nอะฮ่าฮ่า! เกิดเรื่องใหญ่แล้ว! หนีกันเถอะ~!"
10107-CVGroup_ExSkill_Level_1-1 = "เอาละ รับให้ดีนะคะ~!"
10107-CVGroup_ExSkill_Level_2-1 = "ตอนนี้กำลังเก็บข้อมูลอยู่น่ะ!"
10107-CVGroup_ExSkill_Level_3-1 = "มันอาจจะ~ เจ็บนิดหน่อยนะคะ~?"
10107-CVGroup_Formation_In_1-1 = "ต้องการให้ฉันช่วยหรือเปล่าคะ~?"
10107-CVGroup_Formation_In_2-1 = "อาจมีข่าวใหม่ๆ ก็ได้!"
10107-CVGroup_Formation_Select-1 = "เตรียมตัวพร้อมแล้วค่ะ!"
10107-CVGroup_Growup_1-1 = "อ๊ะ ขอบคุณมากค่ะ คุณครู!"
10107-CVGroup_Growup_2-1 = "ค่ะ ฉันจะปลุกไฟแห่งจิตวิญญาณของเลขานุการให้ลุกโชน\nและทำให้เต็มที่ค่ะ!"
10107-CVGroup_Growup_3-1 = "รู้สึกเหมือนจะแข็งแกร่งขึ้นแล้วเลยค่ะ!\nดูเหมือนกิจกรรมโปรโมต <แพนเดโมเนียม โซไซตี้รายสัปดาห์> จะเป็นไปได้ด้วยดี...!"
10107-CVGroup_Growup_4-1 = "ว้าว~! ดีใจจังเลยค่ะ! ตอนนี้รู้สึกเหมือนจะบินขึ้นไปบนท้องฟ้าได้เลยค่ะ!\nคุณครู! ฉันจะถ่ายรูปให้เอง มาทางนี้สิคะ! เอ้า ชีส~!"
10107-CVGroup_Relationship_Up_1-1 = "อะฮ่าฮ่า... แบบนี้มันน่าอายนิดหน่อยนะคะ~!"
10107-CVGroup_Relationship_Up_2-1 = "นี่มัน... ดีใจจังเลยค่ะ\nคะ? ดูเงียบกว่าปกติเหรอคะ?\nหมายถึงฉันงั้นเหรอคะ? ปะ... เปล่านะคะ~?"
10107-CVGroup_Relationship_Up_3-1 = "ฮือออ~! จริงๆ นะคะ!\nในเวลาแบบนี้ ฉันไม่รู้เลยว่าจะทำหน้ายังไงดี~!"
10107-CVGroup_Relationship_Up_4-1 = "อ่า... ฉันไม่รู้เหตุผลหรอกค่ะ!\nแต่ฉันอยากเก็บข้อมูลจากคุณครูเพิ่มอีกสักหน่อยค่ะ!\nจะได้... หรือเปล่าคะ...?"
10107-CVGroup_Tactic_In_1-1 = "มาบุกไปพร้อมกันเลยค่ะ~!"
10107-CVGroup_Tactic_In_2-1 = "ทุกคนมาพยายามด้วยกันนะคะ!"
10107-CVGroup_Tactic_Victory_1-1 = "ยะโฮ่~ ภารกิจสำเร็จแล้วค่ะ!"
10107-CVGroup_Tactic_Victory_2-1 = "ถ่ายรูปสวยๆ มาได้เยอะเลยค่ะ~!"

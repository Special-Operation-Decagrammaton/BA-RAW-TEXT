10110-CVGroup_Battle_Defense_1-1 = "มันไม่มีความหมายเลยค่ะ"
10110-CVGroup_Battle_In_1-1 = "ฉันไม่รู้ว่าจะช่วยได้หรือเปล่า..."
10110-CVGroup_Battle_In_2-1 = "เอาละ มาลองดูกันสักครั้งเถอะค่ะ"
10110-CVGroup_Battle_Move_1-1 = "ไปต่อเลยค่ะ"
10110-CVGroup_Battle_Move_2-1 = "ดูเหมือนจะยังมีเหลืออยู่อีกนะคะ"
10110-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ"
10110-CVGroup_Battle_TacticalAction_1-1 = "ฮึบ"
10110-CVGroup_Battle_Victory_1-1 = "เอ๊ะ คาดไม่ถึงเหรอคะ? นี่เป็นผลลัพธ์ที่คาดการณ์ไว้แล้วนะคะ"
10110-CVGroup_Battle_Victory_2-1 = "ยังไงก็คลี่คลายได้แล้วนะคะ"
10110-CVGroup_CommonSkill-1 = "ตอนนี้แหละค่ะ...!"
10110-CVGroup_ExSkill_1-1 = "เอ๊ะ...? มาหาถึงที่นี่เลยเหรอคะ"
10110-CVGroup_ExSkill_2-1 = "ฮุฮุ... มาได้จังหวะพอดีเลยค่ะ"
10110-CVGroup_ExSkill_3-1 = "โอ้... หาเจอด้วยสินะคะ"
10110-CVGroup_ExSkill_Level_1-1 = "พักให้หายเหนื่อยแล้วค่อยไปต่อนะคะ"
10110-CVGroup_ExSkill_Level_2-1 = "ช่วงเวลาที่ได้ใช้ร่วมกัน... ดีจังเลยค่ะ"
10110-CVGroup_ExSkill_Level_3-1 = "เรามาพูดคุยเรื่องรสนิยมกันดีมั้ยคะ?"
10110-CVGroup_Formation_In_1-1 = "เรียกฉันเหรอคะ?"
10110-CVGroup_Formation_In_2-1 = "คิดไม่ถึงเลยค่ะ ฉันจะพยายามนะคะ"
10110-CVGroup_Formation_Select-1 = "มันก็มีความเป็นไปได้ที่จะเป็นอย่างนั้นค่ะ"
10110-CVGroup_Growup_1-1 = "การเติบโต... งั้นเหรอคะ มันต่างกับการฟื้นฟูสินะคะ\nหรือจะเรียกว่าเป็นการเปลี่ยนแปลงที่มีทิศทางงั้นเหรอคะ"
10110-CVGroup_Growup_2-1 = "แข็งแกร่งขึ้น...?\nรู้สึกแปลกจังเลยค่ะ"
10110-CVGroup_Growup_3-1 = "ถ้ามันมีอยู่จริงละก็...\nอยากเห็น 'หัวใจ' ที่แข็งแกร่งขึ้นของฉันมั้ยคะ?"
10110-CVGroup_Growup_4-1 = "ขอแสดงความขอบคุณ\nและชื่นชมกับอนาคตที่จะเกิดขึ้น"
10110-CVGroup_Relationship_Up_1-1 = "รู้สึกเหมือนได้ใกล้ชิดคุณครูขึ้นอีกเลยค่ะ\nมีแค่ฉันที่รู้สึกอย่างนั้นเหรอคะ...?"
10110-CVGroup_Relationship_Up_2-1 = "คุณครูน่ะ คิดเรื่องของฉัน วันละกี่ครั้งกันเหรอคะ?"
10110-CVGroup_Relationship_Up_3-1 = "ถ้าใจดีกับฉันแบบนี้ละก็...\nอาจทำให้ฉันตั้งความหวังก็ได้นะคะ?"
10110-CVGroup_Relationship_Up_4-1 = "ฉันจะต้องตอบแทนน้ำใจของคุณครู...\nคือว่า... คุณครูช่วยเล่าเกี่ยวกับตัวเองให้ฟังหน่อยได้มั้ยคะ?"
10110-CVGroup_Tactic_In_1-1 = "ดีละ ฉันจะแสดงให้ดูค่ะ"
10110-CVGroup_Tactic_In_2-1 = "อืม... ค่ะ เข้าใจแล้วค่ะ"
10110-CVGroup_Tactic_Victory_1-1 = "เป็นยังไงคะ เป็นไปตามที่คาดไว้เลยใช่มั้ยคะ?"
10110-CVGroup_Tactic_Victory_2-1 = "หวังว่าจะถูกใจนะคะ"

[translation]
10110-CVGroup_Battle_Buffed_1-1 = "감사합니다."
10110-CVGroup_Battle_Covered_1-1 = "잠깐의 평온, 이네요."
10110-CVGroup_Battle_Defense_1-1 = "무의미해요."
10110-CVGroup_Battle_In_1-1 = "도움이 될지는 모르겠으나……."
10110-CVGroup_Battle_In_2-1 = "자, 어디 한번 해보죠."
10110-CVGroup_Battle_Move_1-1 = "계속 가죠."
10110-CVGroup_Battle_Move_2-1 = "아직 더 남은 것 같아요."
10110-CVGroup_Battle_Recovery_1-1 = "감사합니다."
10110-CVGroup_Battle_TacticalAction_1-1 = "흡."
10110-CVGroup_Battle_Victory_1-1 = "어라, 의외인가요? 이것도 예상한 결말입니다."
10110-CVGroup_Battle_Victory_2-1 = "어떻게 잘 해결됐네요."
10110-CVGroup_CommonSkill-1 = "……지금이에요!"
10110-CVGroup_ExSkill_1-1 = "……어라? 여기까지 찾아오셨군요."
10110-CVGroup_ExSkill_2-1 = "후후…… 잘 오셨어요."
10110-CVGroup_ExSkill_3-1 = "오…… 용케 찾아내셨네요."
10110-CVGroup_ExSkill_Level_1-1 = "편히 쉬다 가세요."
10110-CVGroup_ExSkill_Level_2-1 = "함께하는 시간…… 좋지요."
10110-CVGroup_ExSkill_Level_3-1 = "취향 이야기라도, 나눠 볼까요?"
10110-CVGroup_Formation_In_1-1 = "부르셨나요?"
10110-CVGroup_Formation_In_2-1 = "의외네요. 열심히 해보겠습니다."
10110-CVGroup_Formation_Select-1 = "과연, 그런 개연성도 가능하군요."
10110-CVGroup_Growup_1-1 = "성장, 입니까. 회복과는 또 다르네요. 지향성을 가진 변화, 라고 할까요."
10110-CVGroup_Growup_2-1 = "강해진다……? 묘한 감각이에요."
10110-CVGroup_Growup_3-1 = "혹시 존재한다고 가정한다면— 저의 '진심'을, 보시고 싶으신가요?"
10110-CVGroup_Growup_4-1 = "당신에게 감사를, 그리고 미래에 찬사를."
10110-CVGroup_Relationship_Up_1-1 = "선생님과 가까워진 기분이에요. ……저만, 그런가요?"
10110-CVGroup_Relationship_Up_2-1 = "선생님께서는, 하루에 얼마나 많이, 저에 대해 생각하시나요?"
10110-CVGroup_Relationship_Up_3-1 = "이렇게까지 친절하게 대해주시면… 기대해 버릴지도 모른다고요?"
10110-CVGroup_Relationship_Up_4-1 = "선생님의 마음에 보답해 드려야… 그, 선생님에 대해서도 알려주시겠어요?"
10110-CVGroup_Tactic_In_1-1 = "좋아요. 보여드리죠."
10110-CVGroup_Tactic_In_2-1 = "음…… 네, 파악했습니다."
10110-CVGroup_Tactic_Victory_1-1 = "어떤가요, 기대하신 대로일까요?"
10110-CVGroup_Tactic_Victory_2-1 = "마음에 드셨기를 바랍니다."

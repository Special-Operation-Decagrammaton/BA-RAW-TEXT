[translation]
10110-CVGroup_Battle_Buffed_1-1 = "感謝你。"
10110-CVGroup_Battle_Covered_1-1 = "是段短暫的平靜呢。"
10110-CVGroup_Battle_Defense_1-1 = "沒用的哦。"
10110-CVGroup_Battle_In_1-1 = "雖然不清楚是否能派上用場……"
10110-CVGroup_Battle_In_2-1 = "那麼，出發吧。"
10110-CVGroup_Battle_Move_1-1 = "繼續前進吧。"
10110-CVGroup_Battle_Move_2-1 = "似乎還會繼續呢。"
10110-CVGroup_Battle_Recovery_1-1 = "非常感謝。"
10110-CVGroup_Battle_TacticalAction_1-1 = "呼，往下一個地方前進吧。"
10110-CVGroup_Battle_Victory_1-1 = "哎呀，覺得意外嗎？\n這也是早已預見的結果。"
10110-CVGroup_Battle_Victory_2-1 = "總算是結束了呢。"
10110-CVGroup_CommonSkill-1 = "……就是現在！"
10110-CVGroup_ExSkill_1-1 = "……哎呀。居然跟到這裡來了啊。"
10110-CVGroup_ExSkill_2-1 = "呵呵……歡迎你來。"
10110-CVGroup_ExSkill_3-1 = "……虧你能找到呢。"
10110-CVGroup_ExSkill_Level_1-1 = "請好好休息吧。"
10110-CVGroup_ExSkill_Level_2-1 = "一起度過的時間……真不錯呢。"
10110-CVGroup_ExSkill_Level_3-1 = "一起享受聊天的樂趣吧？"
10110-CVGroup_Formation_In_1-1 = "你叫我嗎？"
10110-CVGroup_Formation_In_2-1 = "我明白了。我會助你一臂之力。"
10110-CVGroup_Formation_Select-1 = "原來如此……也有這樣的蓋然性啊。"
10110-CVGroup_Growup_1-1 = "成長，是嗎。與回復又有所不同呢。\n帶有指向性的變容……可以這麼說嗎？"
10110-CVGroup_Growup_2-1 = "正在變強……？\n總覺得有股奇妙的感覺。"
10110-CVGroup_Growup_3-1 = "假設存在的話──我的真本事，你想見識看看嗎？"
10110-CVGroup_Growup_4-1 = "獻上對你的感謝，以及對未來的讚頌。"
10110-CVGroup_Relationship_Up_1-1 = "感覺比之前更接近老師了。\n……只有我，這麼想嗎？"
10110-CVGroup_Relationship_Up_2-1 = "老師你在一天之中，會花費多少時間想我的事呢？"
10110-CVGroup_Relationship_Up_3-1 = "受到這麼親切的對待……可能會讓我有所期待的唷？"
10110-CVGroup_Relationship_Up_4-1 = "得回應老師的心情才行……\n那個，能告訴我老師的事嗎？"
10110-CVGroup_Tactic_In_1-1 = "好吧。就讓你見識一下。"
10110-CVGroup_Tactic_In_2-1 = "……這樣啊，我明白了。"
10110-CVGroup_Tactic_Victory_1-1 = "怎麼樣呢？有符合你的期待嗎？"
10110-CVGroup_Tactic_Victory_2-1 = "要是能讓你喜歡就好了。"

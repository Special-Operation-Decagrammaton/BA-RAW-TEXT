[translation]
10088-CVGroup_Battle_Buffed_1-1 = "좋은 판단이네. 고마워."
10088-CVGroup_Battle_Covered_1-1 = "엄폐."
10088-CVGroup_Battle_Defense_1-1 = "소용없어."
10088-CVGroup_Battle_In_1-1 = "이왕 할 거, 확실하게 할게."
10088-CVGroup_Battle_In_2-1 = "괜찮아, 준비는 됐어."
10088-CVGroup_Battle_Move_1-1 = "클리어."
10088-CVGroup_Battle_Move_2-1 = "다음으로."
10088-CVGroup_Battle_Recovery_1-1 = "고마워."
10088-CVGroup_Battle_TacticalAction_1-1 = "흡."
10088-CVGroup_Battle_Victory_1-1 = "고생했어, 모두들. 그리고, 선생도."
10088-CVGroup_Battle_Victory_2-1 = "좋은 지휘였어, 선생."
10088-CVGroup_CommonSkill-1 = "놓치지 않아."
10088-CVGroup_ExSkill_1-1 = "예상대로네."
10088-CVGroup_ExSkill_2-1 = "뭐, 이런 정도겠지."
10088-CVGroup_ExSkill_3-1 = "이런 정도인가?"
10088-CVGroup_ExSkill_Level_1-1 = "이걸로 끝이네."
10088-CVGroup_ExSkill_Level_2-1 = "찾았다."
10088-CVGroup_ExSkill_Level_3-1 = "이것도 의뢰니까."
10088-CVGroup_Formation_In_1-1 = "내 차례구나. 준비할게."
10088-CVGroup_Formation_In_2-1 = "알았어. 확실하게 수행할게."
10088-CVGroup_Formation_Select-1 = "선생…? 뭐야…?"
10088-CVGroup_Growup_1-1 = "고마워, 선생. 받은 만큼, 갚아야지."
10088-CVGroup_Growup_2-1 = "왜 나한테, 이렇게까지... 아니, 아무것도 아니야. 고마워."
10088-CVGroup_Growup_3-1 = "이래서야, 누가 도움을 받고 있는 건지 모르겠네."
10088-CVGroup_Growup_4-1 = "……확실히 받았어. 후회하지 않게 할게."
10088-CVGroup_Relationship_Up_1-1 = "고마워, 선생. 너무 좋네, 이거."
10088-CVGroup_Relationship_Up_2-1 = "소중하게 간직할게."
10088-CVGroup_Relationship_Up_3-1 = "선생이랑 이러고 있으면,\n이 드레스도 그렇게 나쁘지 않은 것 같아. 신기해."
10088-CVGroup_Relationship_Up_4-1 = "뭔가 좀…. 평소랑은 받았을 때 느낌이 달라. 복장 때문인가."
10088-CVGroup_Tactic_In_1-1 = "과연, 이해했어."
10088-CVGroup_Tactic_In_2-1 = "이걸로 전부네."
10088-CVGroup_Tactic_Victory_1-1 = "어때? 마음에 들어?"
10088-CVGroup_Tactic_Victory_2-1 = "나쁘지 않은 성과네."

[translation]
10088-CVGroup_Battle_Buffed_1-1 = "是很好的判斷呢。謝謝你。"
10088-CVGroup_Battle_Covered_1-1 = "躲藏起來。"
10088-CVGroup_Battle_Defense_1-1 = "沒用。"
10088-CVGroup_Battle_In_1-1 = "既然要做就會好好完成。"
10088-CVGroup_Battle_In_2-1 = "別擔心，準備已經就緒。"
10088-CVGroup_Battle_Move_1-1 = "Clear。"
10088-CVGroup_Battle_Move_2-1 = "下一個。"
10088-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10088-CVGroup_Battle_TacticalAction_1-1 = "呼。"
10088-CVGroup_Battle_Victory_1-1 = "辛苦了，大家。還有老師也是。"
10088-CVGroup_Battle_Victory_2-1 = "指揮得相當好唷，老師。"
10088-CVGroup_CommonSkill-1 = "別想逃。"
10088-CVGroup_ExSkill_1-1 = "如我所料。"
10088-CVGroup_ExSkill_2-1 = "嗯，大概就是這樣吧。"
10088-CVGroup_ExSkill_3-1 = "只有這種程度？"
10088-CVGroup_ExSkill_Level_1-1 = "這樣就結束了。"
10088-CVGroup_ExSkill_Level_2-1 = "找到了。"
10088-CVGroup_ExSkill_Level_3-1 = "畢竟這也是委託。"
10088-CVGroup_Formation_In_1-1 = "輪到我了呢。我會準備。"
10088-CVGroup_Formation_In_2-1 = "知道了。我會確實執行。"
10088-CVGroup_Formation_Select-1 = "老師……？\n怎麼了……？"
10088-CVGroup_Growup_1-1 = "謝謝你，老師。\n受到的恩惠，得回報才行呢。"
10088-CVGroup_Growup_2-1 = "為什麼要為我，做到這種程度……\n不，沒什麼。謝謝你。"
10088-CVGroup_Growup_3-1 = "這樣一來，就不知道是誰幫助誰了呢。"
10088-CVGroup_Growup_4-1 = "……我確實收下了。\n不會讓你後悔的。"
10088-CVGroup_Relationship_Up_1-1 = "謝謝你，老師。\n相當好呢，這個。"
10088-CVGroup_Relationship_Up_2-1 = "我會珍惜的。"
10088-CVGroup_Relationship_Up_3-1 = "能跟老師走到這一步，感覺這件禮服似乎也沒那麼糟了。\n真不可思議。"
10088-CVGroup_Relationship_Up_4-1 = "總覺得……跟平時相比，獲得的感覺稍微有點不同。\n是因為打扮的關係嗎？"
10088-CVGroup_Tactic_In_1-1 = "原來如此，我明白了。"
10088-CVGroup_Tactic_In_2-1 = "這就是全部了吧。"
10088-CVGroup_Tactic_Victory_1-1 = "怎麼樣？還滿意嗎？"
10088-CVGroup_Tactic_Victory_2-1 = "是個不錯的成果呢。"

10125-CVGroup_ExSkill_Level_1-1 = "별이여…… 빛나라!"
10125-CVGroup_ExSkill_Level_2-1 = "아르카나여…… 비장의 무기가 돼라!"
10125-CVGroup_ExSkill_Level_3-1 = "성스러운 파동을…… 여기에!!"
10125-CVGroup_Formation_In_1-1 = "역시, 내 마법 없이는 시작할 수 없지요!"

[translation]
10125-CVGroup_Battle_Buffed_1-1 = "ขอบคุณสำหรับเวทสนับสนุนค่ะ!"
10125-CVGroup_Battle_Covered_1-1 = "เวทมนตร์กำแพง!"
10125-CVGroup_Battle_Defense_1-1 = "เวทมนตร์หลบหลีก!"
10125-CVGroup_Battle_In_1-1 = "เอาละ จะแสดงเวทมนตร์แบบไหนให้ดูดีนะ?"
10125-CVGroup_Battle_In_2-1 = "ไปสู่สถานที่ที่อาร์คาน่าชี้นำ...!"
10125-CVGroup_Battle_Move_1-1 = "วันนี้... บอกว่าตรงนี้สินะคะ!"
10125-CVGroup_Battle_Move_2-1 = "ถ้ามีเวทมนตร์ไม่ว่าที่ไหนก็ไปได้!"
10125-CVGroup_Battle_Recovery_1-1 = "พลังเวทเอ่อล้นเลยค่ะ!"
10125-CVGroup_Battle_TacticalAction_1-1 = "อุฮุฮุ!"
10125-CVGroup_Battle_Victory_1-1 = "สมกับเป็นมาสเตอร์จริงๆ! สั่งการได้ยอดเยี่ยมมากค่ะ!"
10125-CVGroup_Battle_Victory_2-1 = "อุฮุฮุ นี่คือชัยชนะของเวทมนตร์ค่ะ!"
10125-CVGroup_CommonSkill-1 = "อะ... อะบราคาดาบรา....!"
10125-CVGroup_ExSkill_1-1 = "เรียกออกมาได้แล้วค่ะ! สุดยอดการ์ด...!"
10125-CVGroup_ExSkill_2-1 = "ฉันจะแสดงพลังของเวทมนตร์ให้ดูเองค่ะ!"
10125-CVGroup_ExSkill_3-1 = "ขออาร์คาน่าจงนำทาง!"
10125-CVGroup_ExSkill_Level_1-1 = "ดวงดาวเอ๋ย... จงเปล่งประกาย!"
10125-CVGroup_ExSkill_Level_2-1 = "อาร์คาน่าเอ๋ย... จงเปลี่ยนเป็นอาวุธขั้นสูงสุด!"
10125-CVGroup_ExSkill_Level_3-1 = "คลื่นศักดิ์สิทธิ์... จงมา ณ บัดนี้!!"
10125-CVGroup_Formation_In_1-1 = "คิดแล้วเชียวว่าถ้าไม่มีเวทมนตร์ของฉันคงเริ่มไม่ได้สินะคะ!"
10125-CVGroup_Formation_In_2-1 = "เอาละ มาสร้างปาฏิหาริย์ด้วยกันเถอะค่ะ!"
10125-CVGroup_Formation_Select-1 = "ดูสิคะ! ฉันใช้เวทมนตร์บินได้สำเร็จแล้วค่ะ!"
10125-CVGroup_Growup_1-1 = "โอ้... รู้สึกได้เลยว่ามานาเพิ่มขึ้นแล้วค่ะ!"
10125-CVGroup_Growup_2-1 = "คุณช่วยดึงพลังเวทที่หลับใหลอยู่ของของฉันออกมาสินะคะ มาสเตอร์!"
10125-CVGroup_Growup_3-1 = "ฉันอยากพูดคุยได้เก่งๆ แบบนี้จังเลยค่ะ...!"
10125-CVGroup_Growup_4-1 = "ฉันจะขัดเกลาให้ดีขึ้นค่ะ ทั้งเวทมนตร์... และเรื่องการวาดรูป!"
10125-CVGroup_Relationship_Up_1-1 = "นี่คือ... ความรู้สึกที่ฉันมีต่อมาสเตอร์?"
10125-CVGroup_Relationship_Up_2-1 = "จะ... จู่ๆ หัวใจก็เต้นแรงขึ้นเลย...?!\nมะ... มาสเตอร์... ใช้เวทมนตร์สะกดใจกับฉันเหรอคะ?!"
10125-CVGroup_Relationship_Up_3-1 = "มะ... มาสเตอร์... ความรู้สึกนี้...\nมันไม่ปรากฏตอนพยากรณ์ดวงด้วยซ้ำค่ะ...!"
10125-CVGroup_Relationship_Up_4-1 = "คำพูดของมาสเตอร์มีเวทมนตร์พิเศษอยู่ด้วยสินะคะ...\nฉันขอยืมเวทมนตร์นั้นมาทำผลงานให้สำเร็จค่ะ!"
10125-CVGroup_Tactic_In_1-1 = "เวทมนตร์ของฉันกับการสั่งการของมาสเตอร์...\nไม่มีใครต้านได้แน่นอนค่ะ!"
10125-CVGroup_Tactic_In_2-1 = "เอาละ ฉันจะแสดงเวทมนตร์อันน่าทึ่งให้ดูเอง!"
10125-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ... ผลลัพธ์นี้อยู่ในการพยากรณ์แล้วละค่ะ!"
10125-CVGroup_Tactic_Victory_2-1 = "คอยดูเวทมนตร์ครั้งต่อไปด้วยนะคะ! ฮุฮุฮุ"

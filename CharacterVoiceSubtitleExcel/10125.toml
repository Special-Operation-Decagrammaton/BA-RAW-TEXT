10125-CVGroup_Relationship_Up_1-1 = "이것이… 저를 향한 마스터의 마음?"
10125-CVGroup_Relationship_Up_2-1 = "가, 갑자기 두근거림이……?!\n마, 마스터…… 매료 마법을 사용하셨나요?!"

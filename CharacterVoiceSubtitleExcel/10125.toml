[translation]
10125-CVGroup_Battle_Buffed_1-1 = "輔助魔法，非常感謝！"
10125-CVGroup_Battle_Covered_1-1 = "這是障壁魔法！"
10125-CVGroup_Battle_Defense_1-1 = "迴避魔法！"
10125-CVGroup_Battle_In_1-1 = "那麼……該讓你見識哪種魔法呢。"
10125-CVGroup_Battle_In_2-1 = "前往阿爾克那指示之地……！"
10125-CVGroup_Battle_Move_1-1 = "今天……顯示在這邊！"
10125-CVGroup_Battle_Move_2-1 = "只要魔法，就能抵達任何地方！"
10125-CVGroup_Battle_Recovery_1-1 = "妞呵！魔力正在湧現！"
10125-CVGroup_Battle_TacticalAction_1-1 = "妞呵呵！"
10125-CVGroup_Battle_Victory_1-1 = "這都多虧了御者的指引！"
10125-CVGroup_Battle_Victory_2-1 = "妞呵呵，這是魔法帶來的勝利！"
10125-CVGroup_CommonSkill-1 = "阿，阿布拉卡達布拉……！"
10125-CVGroup_ExSkill_1-1 = "抽到了！是最棒的卡牌！"
10125-CVGroup_ExSkill_2-1 = "魔法的力量，讓你見識見識吧！"
10125-CVGroup_ExSkill_3-1 = "願阿爾克那引領！"
10125-CVGroup_ExSkill_Level_1-1 = "群星啊……閃耀吧！"
10125-CVGroup_ExSkill_Level_2-1 = "阿爾克那啊……成為王牌吧！"
10125-CVGroup_ExSkill_Level_3-1 = "將神聖的波動……匯聚於此！！"
10125-CVGroup_Formation_In_1-1 = "果然，沒有我的魔法就無法開始呢！"
10125-CVGroup_Formation_In_2-1 = "來，一起創造奇蹟吧！"
10125-CVGroup_Formation_Select-1 = "請看！飛行魔法成功了！"
10125-CVGroup_Growup_1-1 = "這，這是……魔力正在充盈……！"
10125-CVGroup_Growup_2-1 = "你為我引出了我的潛在魔力呢！\n御者！"
10125-CVGroup_Growup_3-1 = "繪畫，也想變得這麼厲害……！"
10125-CVGroup_Growup_4-1 = "我要精進！不只是魔力……還有畫力！"
10125-CVGroup_Relationship_Up_1-1 = "這就是……御者的心意……"
10125-CVGroup_Relationship_Up_2-1 = "突，突然一陣心動……！？\n御，御者……你使用了魅惑魔法嗎！？"
10125-CVGroup_Relationship_Up_3-1 = "御，御者……這種心情是……\n連在占卜裡也沒出現過……！"
10125-CVGroup_Relationship_Up_4-1 = "御者的話語，蘊含著不可思議的魔力呢……\n我會藉助這股魔力完成作品！"
10125-CVGroup_Tactic_In_1-1 = "只要集齊我的魔法與御者的指揮，就所向無敵了！"
10125-CVGroup_Tactic_In_2-1 = "來，見識我驚人的魔法吧！"
10125-CVGroup_Tactic_Victory_1-1 = "妞呵……這個結果，我已經在占卜中看見了唷！"
10125-CVGroup_Tactic_Victory_2-1 = "敬請期待下一個魔法！妞呵呵。"

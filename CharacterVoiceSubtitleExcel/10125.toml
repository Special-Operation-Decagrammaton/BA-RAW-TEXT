10125-CVGroup_Battle_Victory_2-1 = "뉴후후, 이것이 승리의 마법이에요!"
10125-CVGroup_CommonSkill-1 = "아, 아브라카다브라……!"
10125-CVGroup_ExSkill_1-1 = "뽑았습니다. 최고의 패를……!"
10125-CVGroup_ExSkill_2-1 = "마법의 힘, 보여드리죠!"

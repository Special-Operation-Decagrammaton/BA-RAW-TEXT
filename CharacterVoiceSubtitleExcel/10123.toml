10123-CVGroup_Relationship_Up_2-1 = "예쁘게 봐주셔서 다행이네요. 아니었다면, 정말로 슬펐을 거예요."
10123-CVGroup_Relationship_Up_3-1 = "뭐라도 사 드릴까요? 괜찮다고요? 후후, 선생님답네요."
10123-CVGroup_Relationship_Up_4-1 = "반응을 보니 점점 더 끌리네요.\n기회만 된다면, 다양한 옷을 보여드리고 싶어요."
10123-CVGroup_Tactic_In_1-1 = "즐거운 시간을 보내보죠."

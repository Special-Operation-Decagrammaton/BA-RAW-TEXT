10123-CVGroup_ExSkill_3-1 = "주연은 결정적일 때 등장하는 법."
10123-CVGroup_ExSkill_Level_1-1 = "즐거운 시간은 순식간에."
10123-CVGroup_ExSkill_Level_2-1 = "즐거우셨을까요?"
10123-CVGroup_ExSkill_Level_3-1 = "지금이 아니면, 들을 수 없답니다."
10123-CVGroup_Formation_In_1-1 = "시원하게 만들어 드릴까요?"
10123-CVGroup_Formation_In_2-1 = "이렇게 나서는 것도, 나쁘지 않죠."

[translation]
10105-CVGroup_Battle_Buffed_1-1 = "이걸, 저에게……!?"
10105-CVGroup_Battle_Covered_1-1 = "숨을게요!"
10105-CVGroup_Battle_Defense_1-1 = "히익!"
10105-CVGroup_Battle_In_1-1 = "그럼…… 다녀오겠습니다!"
10105-CVGroup_Battle_In_2-1 = "제 노래를 들려드릴게요!"
10105-CVGroup_Battle_Move_1-1 = "다음 파트로 넘어가 볼까요!"
10105-CVGroup_Battle_Move_2-1 = "아직 노래는 끝나지 않았어요!"
10105-CVGroup_Battle_Recovery_1-1 = "감사합니다!"
10105-CVGroup_Battle_TacticalAction_1-1 = "얍!"
10105-CVGroup_Battle_Victory_1-1 = "다음 무대에서 뵙겠습니다."
10105-CVGroup_Battle_Victory_2-1 = "즐거운 시간은 순식간이네요!"
10105-CVGroup_CommonSkill-1 = "반짝반짝…… 호에에-!?"
10105-CVGroup_ExSkill_1-1 = "충분히 연습했어요!"
10105-CVGroup_ExSkill_2-1 = "자신을 믿고……!"
10105-CVGroup_ExSkill_3-1 = "저, 해낼게요!"
10105-CVGroup_ExSkill_Level_1-1 = "이 마음…… 받아주세요!"
10105-CVGroup_ExSkill_Level_2-1 = "그대에게 닿기를……!"
10105-CVGroup_ExSkill_Level_3-1 = "여러분들께 힘이 되고 싶어요!"
10105-CVGroup_Formation_In_1-1 = "포지션, 잡았습니다!"
10105-CVGroup_Formation_In_2-1 = "이 자리가 맞을까요?"
10105-CVGroup_Formation_Select-1 = "네! 준비는 다 됐어요, 선생님."
10105-CVGroup_Growup_1-1 = "이건……선생님이 스폰서가 되어주신다, 는 걸까요?\n기대에 부응할 수 있도록 노력하겠습니다!"
10105-CVGroup_Growup_2-1 = "배려해 주셔서 감사합니다. 최고의 퍼포먼스로 보답하겠습니다!"
10105-CVGroup_Growup_3-1 = "신기하게도, 긴장이 누그러지는 것 같은…….\n분명, 선생님 덕분일 거예요."
10105-CVGroup_Growup_4-1 = "선생님 덕분에 자신감이 자꾸 생겨요.\n지금이라면, 뭐든지 할 수 있을 것 같은 기분이 들어요."
10105-CVGroup_Relationship_Up_1-1 = "선생님도 저를 호의적으로 봐주시는 걸까요? ……그렇다면, 기쁠 거예요."
10105-CVGroup_Relationship_Up_2-1 = "누군가를 위해 노래하는 게 아이돌이라면,\n저는 선생님을 위한 아이돌이 되고 싶어요."
10105-CVGroup_Relationship_Up_3-1 = "선생님…… 저한테서, 눈을 떼지 말아주세요……?"
10105-CVGroup_Relationship_Up_4-1 = "이런 생각을 하는 건, 죄일지도 모릅니다……\n하지만, 지금만은…… 저를 봐주세요, 선생님."
10105-CVGroup_Tactic_In_1-1 = "저희 노래를, 여러분께!"
10105-CVGroup_Tactic_In_2-1 = "평안이 함께하시길."
10105-CVGroup_Tactic_Victory_1-1 = "멋진 라이브였어요!"
10105-CVGroup_Tactic_Victory_2-1 = "제 무대…… 어떠셨나요?"

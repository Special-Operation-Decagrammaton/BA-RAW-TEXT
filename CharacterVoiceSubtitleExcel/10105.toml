[translation]
10105-CVGroup_Battle_Buffed_1-1 = "要把這個，給我……！？"
10105-CVGroup_Battle_Covered_1-1 = "進行躲藏！"
10105-CVGroup_Battle_Defense_1-1 = "啊嗚！"
10105-CVGroup_Battle_In_1-1 = "那麼……我要出發了！"
10105-CVGroup_Battle_In_2-1 = "前去傳遞我的歌聲！"
10105-CVGroup_Battle_Move_1-1 = "進入下一個段落吧！"
10105-CVGroup_Battle_Move_2-1 = "歌曲還沒有結束。"
10105-CVGroup_Battle_Recovery_1-1 = "非常感謝！"
10105-CVGroup_Battle_TacticalAction_1-1 = "呀！"
10105-CVGroup_Battle_Victory_1-1 = "之後的舞台上再見吧。"
10105-CVGroup_Battle_Victory_2-1 = "快樂的時光轉眼即逝呢。"
10105-CVGroup_CommonSkill-1 = "閃，閃亮亮……哈哇……！？"
10105-CVGroup_ExSkill_1-1 = "正式時要跟練習一樣……！"
10105-CVGroup_ExSkill_2-1 = "相信自己……！"
10105-CVGroup_ExSkill_3-1 = "我，會辦到的！"
10105-CVGroup_ExSkill_Level_1-1 = "這份心意……請收下吧！"
10105-CVGroup_ExSkill_Level_2-1 = "希望能向你傳達……！"
10105-CVGroup_ExSkill_Level_3-1 = "我想成為大家的力量！"
10105-CVGroup_Formation_In_1-1 = "位置，OK！"
10105-CVGroup_Formation_In_2-1 = "這個位置沒問題嗎？"
10105-CVGroup_Formation_Select-1 = "是！已經準備好了唷，老師。"
10105-CVGroup_Growup_1-1 = "這是……老師要擔任贊助者的意思嗎？\n為了回應您的期待，我會加油的！"
10105-CVGroup_Growup_2-1 = "您的關心，真是非常感謝。\n我會用最棒的表演來回報您的！"
10105-CVGroup_Growup_3-1 = "緊張感似乎神奇地緩和了下來……\n這肯定是多虧了老師吧。"
10105-CVGroup_Growup_4-1 = "多虧了老師，我越來越有自信了。\n現在的話，感覺任何事都能做到。"
10105-CVGroup_Relationship_Up_1-1 = "老師您也對我抱持著好感嗎？\n……如果是的話，那就太好了。"
10105-CVGroup_Relationship_Up_2-1 = "如果為了某人歌唱就是偶像的話……\n我……希望成為老師的偶像。"
10105-CVGroup_Relationship_Up_3-1 = "老師……\n請不要將視線從我身上移開唷……？"
10105-CVGroup_Relationship_Up_4-1 = "帶有這種想法，或許是種罪也說不定……\n不過，至少現在……請您看著我吧，老師。"
10105-CVGroup_Tactic_In_1-1 = "將我們的歌聲，獻給大家！"
10105-CVGroup_Tactic_In_2-1 = "願安寧得以傳達。"
10105-CVGroup_Tactic_Victory_1-1 = "是場精采的表演呢。"
10105-CVGroup_Tactic_Victory_2-1 = "我的表演……您覺得怎麼樣呢？"

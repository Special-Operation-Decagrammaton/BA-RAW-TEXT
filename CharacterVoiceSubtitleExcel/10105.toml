[translation]
10105-CVGroup_Battle_Buffed_1-1 = "ให้สิ่งนี้กับฉันเหรอคะ…!?"
10105-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวแล้วค่ะ!"
10105-CVGroup_Battle_Defense_1-1 = "ฮึก!"
10105-CVGroup_Battle_In_1-1 = "งั้น... เดี๋ยวฉันมานะคะ!"
10105-CVGroup_Battle_In_2-1 = "ฉันจะร้องเพลงให้ฟังนะคะ!"
10105-CVGroup_Battle_Move_1-1 = "จะข้ามไปพาร์ทต่อไปเลยนะคะ!"
10105-CVGroup_Battle_Move_2-1 = "เพลงยังไม่จบเลยนะคะ!"
10105-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ!"
10105-CVGroup_Battle_TacticalAction_1-1 = "ย้า!"
10105-CVGroup_Battle_Victory_1-1 = "ไว้เจอกันใหม่ตอนการแสดงครั้งหน้านะคะ"
10105-CVGroup_Battle_Victory_2-1 = "เวลาแห่งความสนุกผ่านไปไวจังเลยนะคะ!"
10105-CVGroup_CommonSkill-1 = "วิบวับวิบวับ... เอ๋-!?"
10105-CVGroup_ExSkill_1-1 = "ฉันซ้อมมาเพียงพอแล้วละค่ะ!"
10105-CVGroup_ExSkill_2-1 = "เชื่อมั่นในตัวเอง...!"
10105-CVGroup_ExSkill_3-1 = "ฉันจะทำให้ได้ค่ะ!"
10105-CVGroup_ExSkill_Level_1-1 = "ช่วยรับความรู้สึกนี้... ไว้ด้วยนะคะ!"
10105-CVGroup_ExSkill_Level_2-1 = "ขอให้ส่งไปถึงคุณ...!"
10105-CVGroup_ExSkill_Level_3-1 = "ฉันอยากเป็นแรงใจให้ทุกคนค่ะ!"
10105-CVGroup_Formation_In_1-1 = "จัดตำแหน่งเรียบร้อยแล้วค่ะ!"
10105-CVGroup_Formation_In_2-1 = "ใช่ตรงนี้หรือเปล่าคะ?"
10105-CVGroup_Formation_Select-1 = "ค่ะ! ฉันเตรียมพร้อมแล้วค่ะ คุณครู"
10105-CVGroup_Growup_1-1 = "นี่มัน... คุณครูเป็นสปอนเซอร์ให้งั้นเหรอคะ?\nฉันจะพยายามเต็มที่เพื่อตอบแทนความคาดหวังของคุณครูค่ะ!"
10105-CVGroup_Growup_2-1 = "ขอบคุณสำหรับความกรุณานะคะ\nฉันจะตอบแทนด้วยสุดยอดการแสดงเองค่ะ!"
10105-CVGroup_Growup_3-1 = "น่าแปลกจังเลย... ความตื่นเต้นค่อยๆ หายไปแล้ว...\nต้องเป็นเพราะคุณครูแน่ๆ เลยค่ะ"
10105-CVGroup_Growup_4-1 = "ฉันมั่นใจในตัวเองขึ้นได้เพราะคุณครูเลยค่ะ\nถ้าเป็นตอนนี้ละก็ รู้สึกเหมือนจะทำได้ทุกอย่างเลยค่ะ"
10105-CVGroup_Relationship_Up_1-1 = "คุณครูก็เอ็นดูฉันด้วยความปรารถนาดีสินะคะ? ถ้าเป็นแบบนั้น... ฉันก็ดีใจค่ะ"
10105-CVGroup_Relationship_Up_2-1 = "ถ้าเป็นไอดอลที่ร้องเพลงเพื่อคนอื่นละก็\nฉันอยากจะเป็นไอดอลที่ร้องเพลงเพื่อคุณครูค่ะ"
10105-CVGroup_Relationship_Up_3-1 = "คุณครู... ช่วยอย่าละสายตาไปจากฉันได้หรือเปล่าคะ...?"
10105-CVGroup_Relationship_Up_4-1 = "การคิดแบบนี้อาจจะเป็นการทำบาปก็ได้ค่ะ...\nแต่ว่าตอนนี้... ช่วยมองแค่ฉันด้วยนะคะ คุณครู"
10105-CVGroup_Tactic_In_1-1 = "เพลงของฉัน ขอมอบให้ทุกคน!"
10105-CVGroup_Tactic_In_2-1 = "ขอให้ทุกคนสบายดีนะคะ"
10105-CVGroup_Tactic_Victory_1-1 = "เป็นไลฟ์ที่สุดยอดมากเลยค่ะ!"
10105-CVGroup_Tactic_Victory_2-1 = "การแสดงของฉัน... เป็นยังไงบ้างคะ?"

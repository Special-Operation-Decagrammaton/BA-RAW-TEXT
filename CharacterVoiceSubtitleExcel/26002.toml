[translation]
26002-CVGroup_CommonSkill-1 = "我也來幫忙～"
26002-CVGroup_ExSkill_1-1 = "一，二……！哎呀呀……？"
26002-CVGroup_ExSkill_2-1 = "只要再這樣翻過來就……咦……？"
26002-CVGroup_ExSkill_3-1 = "這樣就完成了！\n……先等一下！？"
26002-CVGroup_ExSkill_Level_1-1 = "咦，咦？"
26002-CVGroup_ExSkill_Level_2-1 = "大家明明不能吃的說……"
26002-CVGroup_ExSkill_Level_3-1 = "這不是要給大家吃的份～！"
26002-CVGroup_Formation_In_1-1 = "好的，我會全力以赴！"
26002-CVGroup_Formation_In_2-1 = "請交給我吧。"
26002-CVGroup_Growup_1-1 = "這樣一來，就能做出更美味的飯菜了嗎？"
26002-CVGroup_Growup_2-1 = "即便是為了提升料理技術，體力也是必須的！"
26002-CVGroup_Growup_3-1 = "呵呵，突然有點想做料理了呢！"
26002-CVGroup_Growup_4-1 = "為了做出更美味的料理，我會加油的！"
26002-CVGroup_Relationship_Up_1-1 = "與老師一起度過的時光，\n就跟做料理的時候一樣開心！"
26002-CVGroup_Relationship_Up_2-1 = "最高的辛香料……那就是愛！"
26002-CVGroup_Relationship_Up_3-1 = "要將這份幸福以味道來表現的話，\n該加入什麼樣的食材好呢……真傷腦筋。"
26002-CVGroup_Relationship_Up_4-1 = "只要是跟老師一起享用的料理，\n無論什麼樣的料理都很好吃。"

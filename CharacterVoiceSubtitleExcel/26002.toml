[translation]
26002-CVGroup_CommonSkill-1 = "ฉันจะช่วยเองค่ะ~"
26002-CVGroup_ExSkill_1-1 = "หนึ่ง สอง...! ตายจริง...?"
26002-CVGroup_ExSkill_2-1 = "ถ้ากลับแบบนี้... เอ๋...?"
26002-CVGroup_ExSkill_3-1 = "เท่านี้ก็เสร็จแล้วค่ะ! ดะ... เดี๋ยวก่อน!"
26002-CVGroup_ExSkill_Level_1-1 = "เอะ... เอ๋? "
26002-CVGroup_ExSkill_Level_2-1 = "ทุกคนไม่ควรกินนะคะ..."
26002-CVGroup_ExSkill_Level_3-1 = "นี่ไม่ใช่ของทุกคนนะคะ~!"
26002-CVGroup_Formation_In_1-1 = "ค่ะ ฉันจะทำให้เต็มที่เลยค่ะ!"
26002-CVGroup_Formation_In_2-1 = "วางใจฉันได้เลยค่ะ!"
26002-CVGroup_Growup_1-1 = "ถ้าทำแบบนี้ จะทำอาหารได้อร่อยกว่านี้มั้ยนะคะ?"
26002-CVGroup_Growup_2-1 = "ถ้าจะทำอาหารให้ดี ก็ต้องมีพละกำลังแข็งแรงค่ะ!"
26002-CVGroup_Growup_3-1 = "ฮุฮุ รู้สึกอยากทำอาหารจังเลยค่ะ!"
26002-CVGroup_Growup_4-1 = "ฉันจะพยายามเพื่อทำอาหารที่อร่อยกว่านี้ค่ะ!"
26002-CVGroup_Relationship_Up_1-1 = "เวลาที่ได้อยู่กับคุณครู\nฉันจะสนุกเหมือนตอนทำอาหารเลยค่ะ!"
26002-CVGroup_Relationship_Up_2-1 = "เครื่องปรุงรสที่ดีที่สุด... ก็คือความรักค่ะ!"
26002-CVGroup_Relationship_Up_3-1 = "ถ้าจะแสดงความสุขนี้ด้วยรสชาติ\nก็ต้องคิดหนักเลยนะคะ... ว่าต้องใส่วัตถุดิบอะไรบ้าง"
26002-CVGroup_Relationship_Up_4-1 = "ถ้าเป็นอาหารที่กินกับคุณครูละก็\nไม่ว่าอะไรก็จะอร่อยทั้งนั้นค่ะ"

[translation]
26014-CVGroup_CommonSkill-1 = "표적, 확인!"
26014-CVGroup_ExSkill_1-1 = "그러니까 그게…… 잠깐, 위험해!"
26014-CVGroup_ExSkill_2-1 = "으음, 그러니까…… 흠? 숨어!"
26014-CVGroup_ExSkill_3-1 = "잘 모르겠다만…… 앗! 이쪽으로!"
26014-CVGroup_ExSkill_Level_1-1 = "위험은 배제했어. 안심하도록."
26014-CVGroup_ExSkill_Level_2-1 = "걱정할 거 없어. 내가 해결한다."
26014-CVGroup_ExSkill_Level_3-1 = "엄호 실시. 저격은 맡겨둬."
26014-CVGroup_Formation_In_1-1 = "가이드가 필요해?"
26014-CVGroup_Formation_In_2-1 = "일….? 이 복장으로도… 괜찮다면."
26014-CVGroup_Formation_Select-1 = "펴, 평소 복장보다…\n기장이, 짧아서…."
26014-CVGroup_Growup_1-1 = "선생님, 이 은혜는…절대 잊지 않겠어."
26014-CVGroup_Growup_2-1 = "전투와는 거리가 먼 일상복이지만, 이 모습으로 할 수 있는 일도 있겠지."
26014-CVGroup_Growup_3-1 = "내게 이렇게까지……? 고마워. 이 힘으로 선생님을 지키겠어."
26014-CVGroup_Growup_4-1 = "선생님은, 내게 이렇게 기대하고 있구나.\n잘 알았다. 기대에 부응하도록 최선을 다하겠어."
26014-CVGroup_Relationship_Up_1-1 = "선생님, 내 교복 모습…… 어때?"
26014-CVGroup_Relationship_Up_2-1 = "오늘은 선생님 곁에서 밀착 경호를 하겠다.\n이 옷이라면…… 더 자연스럽겠지."
26014-CVGroup_Relationship_Up_3-1 = "교복을 입고 선생님과 만나는 것…… 평소랑 달라서 마음에 들어."
26014-CVGroup_Relationship_Up_4-1 = "그, 임무 중이긴 하지만……\n선생님한테 쓸 시간은 있다. 편하게 말해 줘."

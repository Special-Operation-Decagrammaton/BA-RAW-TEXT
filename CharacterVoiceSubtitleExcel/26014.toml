[translation]
26014-CVGroup_CommonSkill-1 = "ยืนยันเป้าหมาย!"
26014-CVGroup_ExSkill_1-1 = "คือว่าเรื่องนั้นน่ะ...\nเดี๋ยวก่อน อันตราย!"
26014-CVGroup_ExSkill_2-1 = "อื้ม เพราะงั้นน่ะ... หืม? ซ่อนตัวเร็ว!"
26014-CVGroup_ExSkill_3-1 = "ฉันยังไม่ค่อยรู้เท่าไร...\nอ๊ะ ทางนี้!"
26014-CVGroup_ExSkill_Level_1-1 = "กำจัดความเสี่ยงเรียบร้อย\nวางใจได้เลย"
26014-CVGroup_ExSkill_Level_2-1 = "ไม่ต้องห่วง ฉันจะจัดการให้เอง"
26014-CVGroup_ExSkill_Level_3-1 = "ยิงคุ้มกัน\nการลอบยิงให้เป็นหน้าที่ฉันเอง"
26014-CVGroup_Formation_In_1-1 = "ต้องการคนนำทางเหรอ?"
26014-CVGroup_Formation_In_2-1 = "งาน...? ถ้าใส่ชุดนี้แล้วไม่เป็นไร..."
26014-CVGroup_Formation_Select-1 = "พะ... เพราะชุดมันสั้นกว่าชุดปกติน่ะ..."
26014-CVGroup_Growup_1-1 = "คุณครู บุญคุณครั้งนี้... ฉันจะไม่มีวันลืมเลย"
26014-CVGroup_Growup_2-1 = "ถึงจะเป็นชุดประจำวันที่ดูห่างไกลจากชุดที่ใส่ต่อสู้ก็เถอะ\nแต่ก็น่าจะมีอะไรที่ใส่ชุดนี้แล้วทำได้อยู่บ้างล่ะนะ"
26014-CVGroup_Growup_3-1 = "ทำให้ฉันขนาดนี้เลยเหรอ...?\nขอบคุณนะ ฉันจะใช้พลังนี้ปกป้องคุณครูเอง"
26014-CVGroup_Growup_4-1 = "คุณครูคาดหวังกับฉันขนาดนี้เลยเหรอเนี่ย\nเข้าใจแล้วละ ฉันจะทำเต็มที่เพื่อตอบแทนความคาดหวังนั้นนะ"
26014-CVGroup_Relationship_Up_1-1 = "คุณครู ฉันใส่ชุดนักเรียนแล้ว... เป็นไงบ้าง?"
26014-CVGroup_Relationship_Up_2-1 = "วันนี้ฉันจะคอยคุ้มกันอยู่ข้างๆ คุณครูเอง\nถ้าใส่ชุดนี้ละก็... คงดูเป็นธรรมชาติกว่าสินะ"
26014-CVGroup_Relationship_Up_3-1 = "การใส่ชุดนักเรียนมาพบคุณครู...\nฉันชอบนะ มันต่างออกไปจากเวลาปกติน่ะ"
26014-CVGroup_Relationship_Up_4-1 = "อืม ถึงจะอยู่ระหว่างภารกิจ...\nแต่ฉันก็มีเวลาให้คุณครูนะ บอกมาได้เลย"

26014-CVGroup_ExSkill_Level_1-1 = "Threat neutralized. Rest at ease."
26014-CVGroup_ExSkill_Level_2-1 = "There's nothing to worry about. I'll take care of it."
26014-CVGroup_ExSkill_Level_3-1 = "Providing cover. Leave the sniping to me."

[translation]
26014-CVGroup_CommonSkill-1 = "目標，確認！"
26014-CVGroup_ExSkill_1-1 = "那個……就是……\n……！危險！"
26014-CVGroup_ExSkill_2-1 = "啊，那是……\n……！快趴下！"
26014-CVGroup_ExSkill_3-1 = "我的話有點……\n……！往這邊！"
26014-CVGroup_ExSkill_Level_1-1 = "危險已經排除。\n現在沒事了。"
26014-CVGroup_ExSkill_Level_2-1 = "沒問題。\n我來解決。"
26014-CVGroup_ExSkill_Level_3-1 = "援護開始。\n剩下的就交給我吧。"
26014-CVGroup_Formation_In_1-1 = "在找導覽員嗎？"
26014-CVGroup_Formation_In_2-1 = "要用這副打扮工作嗎……？"
26014-CVGroup_Formation_Select-1 = "唔……這個長度，真令人在意。"
26014-CVGroup_Growup_1-1 = "老師，這份恩情……我絕對不會忘記的。"
26014-CVGroup_Growup_2-1 = "雖然不是平時的服裝……\n但有些工作，是只有這副打扮才能做的。"
26014-CVGroup_Growup_3-1 = "為了我，做到這個地步……\n謝謝你。我會用這股力量來保護老師的。"
26014-CVGroup_Growup_4-1 = "老師……我知道了。\n為了回應你的期待，我會盡己所能。"
26014-CVGroup_Relationship_Up_1-1 = "老師覺得這副打扮……感覺如何？"
26014-CVGroup_Relationship_Up_2-1 = "今天我會執行老師的貼身護衛。\n穿著這套服裝的話……就不會受人懷疑了吧。"
26014-CVGroup_Relationship_Up_3-1 = "穿著制服站在老師身邊……\n總覺得挺新鮮挺好的。"
26014-CVGroup_Relationship_Up_4-1 = "雖然正在執行任務……\n還是能空出時間跟老師談話的。隨時開口沒關係的。"

[translation]
20005-CVGroup_CommonSkill-1 = "這是期間限定的佩洛洛大人炸彈！"
20005-CVGroup_ExSkill_1-1 = "請，請冷靜下來！十字軍醬！"
20005-CVGroup_ExSkill_2-1 = "哇，哇啊啊？"
20005-CVGroup_ExSkill_3-1 = "要，要掉下去了～！？"
20005-CVGroup_ExSkill_Level_1-1 = "出，出發！"
20005-CVGroup_ExSkill_Level_2-1 = "咦，咦？操縱桿怎麼……！"
20005-CVGroup_ExSkill_Level_3-1 = "戰，戰車前進！"
20005-CVGroup_Formation_In_1-1 = "現在要去游泳嗎？"
20005-CVGroup_Formation_In_2-1 = "是個非常適合渡假的日子呢！"
20005-CVGroup_Growup_1-1 = "耶嘿嘿……這樣一來我也稍微變得沒那麼平凡了嗎？"
20005-CVGroup_Growup_2-1 = "我，會更努力的！"
20005-CVGroup_Growup_3-1 = "游泳練習的話，我已經做過很多了！"
20005-CVGroup_Growup_4-1 = "如果是為了佩洛洛大人……！"
20005-CVGroup_Relationship_Up_1-1 = "能像這樣跟老師待在一起，\n今年的夏天感覺能成為最棒的回憶！"
20005-CVGroup_Relationship_Up_2-1 = "只要跟老師在一起，\n就連深深的海底我也不怕！"
20005-CVGroup_Relationship_Up_3-1 = "總覺得……有種心動的感覺。"
20005-CVGroup_Relationship_Up_4-1 = "老師，明年的夏天也請跟我待在一起哦！"

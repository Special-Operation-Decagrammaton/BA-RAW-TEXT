[translation]
16008-CVGroup_Battle_Buffed_1-1 = "……나보다 다른 사람한테 주는 게? 뭐, 일단 감사하지만."
16008-CVGroup_Battle_Covered_1-1 = "영차."
16008-CVGroup_Battle_Defense_1-1 = "하하, 간지럽잖아."
16008-CVGroup_Battle_In_1-1 = "자, 뭐, 적당히 좋은 느낌으로 가자."
16008-CVGroup_Battle_In_2-1 = "그렇게 조급해 하지 않아도 되니까, 느긋하게~"
16008-CVGroup_Battle_Move_1-1 = "……이쪽?"
16008-CVGroup_Battle_Move_2-1 = "……어라, 이쪽이 맞나?"
16008-CVGroup_Battle_Recovery_1-1 = "오오, 고마워."
16008-CVGroup_Battle_TacticalAction_1-1 = "이 구역의 순찰은 종료, 라는 걸로."
16008-CVGroup_Battle_Victory_1-1 = "일한 후에 먹는 커피와 도넛…… 최고야."
16008-CVGroup_Battle_Victory_2-1 = "아- 지쳤다. 지쳤어……. 당분 보충해야지."
16008-CVGroup_CommonSkill-1 = "……맞으면 럭키-인 걸로."
16008-CVGroup_ExSkill_1-1 = "휴식시간이다~"
16008-CVGroup_ExSkill_2-1 = "잠깐 실례, 쉬었다 하자고~"
16008-CVGroup_ExSkill_3-1 = "도넛 타임이란 걸로."
16008-CVGroup_ExSkill_Level_1-1 = "어떤 상황에서도 여유를 잃어선 안 된다고."
16008-CVGroup_ExSkill_Level_2-1 = "냠, 냠…… 맛있다."
16008-CVGroup_ExSkill_Level_3-1 = "커피도 있었으면 좋았을 텐데."
16008-CVGroup_Formation_In_1-1 = "……저기, 나까지 갈 필요 있어?"
16008-CVGroup_Formation_In_2-1 = "귀찮아……."
16008-CVGroup_Formation_Select-1 = "졸려……."
16008-CVGroup_Growup_1-1 = "이거, 나한테 주는 거야? ……어째서? 줄 사람을 착각한 거 아냐?"
16008-CVGroup_Growup_2-1 = "나는 딱히, 지금 이대로도 충분한데……."
16008-CVGroup_Growup_3-1 = "뭐, 일단 선생의 호의는 고맙게 받을게."
16008-CVGroup_Growup_4-1 = "이 이상 열심히 하는 것은, 으음…….\n도넛 남은 거 있어? 그것만 있으면 어떻게든……."
16008-CVGroup_Relationship_Up_1-1 = "후후, 선생도 나랑 같이 땡땡이칠래?"
16008-CVGroup_Relationship_Up_2-1 = "실은 휴식을 방해받는 건 싫어하지만…… 뭐, 선생이라면 괜찮아."
16008-CVGroup_Relationship_Up_3-1 = "여기서 이렇게 쉬는 거, 어쩐지 마음이 편안해지네~"
16008-CVGroup_Relationship_Up_4-1 = "선생, 그게, 그러니까, 아……. 일단, 도넛 먹을래?"
16008-CVGroup_Tactic_In_1-1 = "응? 어째서 내가 리더야……?"
16008-CVGroup_Tactic_In_2-1 = "……응? 나 먼저 가라고? 레알?"
16008-CVGroup_Tactic_Victory_1-1 = "끝났지? 다 끝난 거지? 좋아. 돌아가자, 돌아가."
16008-CVGroup_Tactic_Victory_2-1 = "이야……. 정말로 이길 수 있을 거라고는 생각 안했는데."

[translation]
10009-CVGroup_Battle_Buffed_1-1 = "有力氣了！"
10009-CVGroup_Battle_Defense_1-1 = "不會痛唷？"
10009-CVGroup_Battle_In_1-1 = "攻擊！\n把敵人的點心全部搶過來吧！"
10009-CVGroup_Battle_In_2-1 = "為了吃點心，趕緊搞定吧！"
10009-CVGroup_Battle_Move_1-1 = "這樣就結束了？什麼時候吃飯？"
10009-CVGroup_Battle_Move_2-1 = "把那些孩子處理好之後，可以去吃飯嗎？"
10009-CVGroup_Battle_Recovery_1-1 = "謝啦～！不過肚子餓了……"
10009-CVGroup_Battle_TacticalAction_1-1 = "我到那邊去哦～"
10009-CVGroup_Battle_Victory_1-1 = "（嚼嚼）嗯，好！"
10009-CVGroup_Battle_Victory_2-1 = "（嚼嚼）大鬧一番後的漢堡果然最讚了！"
10009-CVGroup_CommonSkill-1 = "呀啊！"
10009-CVGroup_ExSkill_1-1 = "出來吧！\n豪華巧克力漢堡！"
10009-CVGroup_ExSkill_2-1 = "唷！是我為了這種時候準備的！"
10009-CVGroup_ExSkill_3-1 = "鏘～！！點心登場！"
10009-CVGroup_ExSkill_Level_1-1 = "（咕嚕咕嚕）有力氣了！"
10009-CVGroup_ExSkill_Level_2-1 = "（嚼嚼）唔哦哦哦哦！！"
10009-CVGroup_ExSkill_Level_3-1 = "（咬咬）哦哦！能量填充！覺悟吧！"
10009-CVGroup_Formation_In_1-1 = "OK～"
10009-CVGroup_Formation_In_2-1 = "準備完畢～"
10009-CVGroup_Formation_Select-1 = "（嚼嚼咬咬）"
10009-CVGroup_Growup_1-1 = "謝謝你，老師！\n有種稍微飽了一點的感覺。"
10009-CVGroup_Growup_2-1 = "為什麼總是把這麼重要的食物給我呢？"
10009-CVGroup_Growup_3-1 = "感謝招待～！"
10009-CVGroup_Growup_4-1 = "好～！吃好多美食來獲得力量吧！"
10009-CVGroup_Relationship_Up_1-1 = "一起去美食巡禮吧！"
10009-CVGroup_Relationship_Up_2-1 = "無論吃什麼、在哪裡吃都很開心！\n是因為跟老師在一起嗎？"
10009-CVGroup_Relationship_Up_3-1 = "這次要吃什麼呢？"
10009-CVGroup_Relationship_Up_4-1 = "哇～"
10009-CVGroup_Tactic_In_1-1 = "趕快搞定後去吃飯吧！"
10009-CVGroup_Tactic_In_2-1 = "啊～感覺這附近會有好吃又出名的店～"
10009-CVGroup_Tactic_Victory_1-1 = "老師～贏了唷～\n你會請我吃好吃的東西吧～？"
10009-CVGroup_Tactic_Victory_2-1 = "啊！已經到吃飯時間了唷？\n趕快趕快！"

10068-CVGroup_Growup_4-1 = "การเติบโตมาพร้อมกับความรับผิดชอบ! ฉันจะทำให้เต็มที่ค่ะ!"
10068-CVGroup_Relationship_Up_1-1 = "ถ้าคุณครูโอเคละก็...\nคือ... ฉันอยากคุ้มกันคุณครูต่ออีกสักหน่อยค่ะ...!"
10068-CVGroup_Relationship_Up_2-1 = "ฉันเผยให้คุณครูเห็นอะไรหลายๆ อย่างเกินไปแล้ว\nแต่ก็คงไม่เป็นไรหรอกค่ะ! เพราะเป็นคุณครูนี่นา!"
10068-CVGroup_Relationship_Up_3-1 = "สิ่งที่ทำให้ฉันมาถึงตรงนี้ได้ ทุกอย่างต้องขอบคุณคุณครูเลยนะคะ"
10068-CVGroup_Relationship_Up_4-1 = "ขอบคุณที่ดูแลมาจนถึงตอนนี้ จากนี้ไปก็ขอรบกวนด้วยนะคะ!"
10068-CVGroup_Tactic_In_1-1 = "ถ้าต้องการพลังของฉันละก็ ได้เสมอ!"
10068-CVGroup_Tactic_In_2-1 = "ทุกคนมาลุยไปพร้อมๆ กับอุซาวะ เรอิสะกันนะคะ!"
10068-CVGroup_Tactic_Victory_1-1 = "ฮู่ว! คว้าชัยชนะมาได้ง่ายๆ เลยค่ะ!"
10068-CVGroup_Tactic_Victory_2-1 = "ฮู่ว! ความยุติธรรมย่อมชนะเสมอค่ะ!"

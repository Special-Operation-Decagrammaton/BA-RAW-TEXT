10068-CVGroup_Growup_1-1 = "สะ... สิ่งนี้? ให้ฉัน... เหรอคะ?"
10068-CVGroup_Growup_2-1 = "ขอบคุณค่ะคุณครู! ฉันจะพยายามให้มากขึ้นค่ะ!"

[translation]
16011-CVGroup_Battle_Buffed_1-1 = "感謝聲援。"
16011-CVGroup_Battle_Covered_1-1 = "進行掩蔽。"
16011-CVGroup_Battle_Defense_1-1 = "真可惜。請再多加努力吧。"
16011-CVGroup_Battle_In_1-1 = "那麼就先來跑跑看吧。"
16011-CVGroup_Battle_In_2-1 = "我會堂堂正正地應對。"
16011-CVGroup_Battle_Move_1-1 = "加緊腳步吧。"
16011-CVGroup_Battle_Move_2-1 = "還沒有結束。"
16011-CVGroup_Battle_Recovery_1-1 = "非常感謝。"
16011-CVGroup_Battle_TacticalAction_1-1 = "繼續前進吧。"
16011-CVGroup_Battle_Victory_1-1 = "是場精采的比賽。"
16011-CVGroup_Battle_Victory_2-1 = "這種小事做不到可不行呢。"
16011-CVGroup_CommonSkill-1 = "集中精神。"
16011-CVGroup_ExSkill_1-1 = "好像很好吃……"
16011-CVGroup_ExSkill_2-1 = "唔……"
16011-CVGroup_ExSkill_3-1 = "真是難以抵抗的誘惑……"
16011-CVGroup_ExSkill_Level_1-1 = "專心，專心……！"
16011-CVGroup_ExSkill_Level_2-1 = "這種時候就該深呼吸……！"
16011-CVGroup_ExSkill_Level_3-1 = "振作一點，蓮實！"
16011-CVGroup_Formation_In_1-1 = "交給我吧。"
16011-CVGroup_Formation_In_2-1 = "恭候多時了。\n老師，請下指示。"
16011-CVGroup_Formation_Select-1 = "老……師？"
16011-CVGroup_Growup_1-1 = "您對我的期待，我會以結果來回應的。"
16011-CVGroup_Growup_2-1 = "感激不盡。\n這份恩情，日後必將……"
16011-CVGroup_Growup_3-1 = "這也是比賽的支援……是嗎？"
16011-CVGroup_Growup_4-1 = "既然獲得了如此期待，也只能全力以赴了呢。"
16011-CVGroup_Relationship_Up_1-1 = "光是待在身邊就讓人感到安心。"
16011-CVGroup_Relationship_Up_2-1 = "老師不介意的話，再稍微一起……"
16011-CVGroup_Relationship_Up_3-1 = "偶爾也請老師……說說自己想要的東西吧。"
16011-CVGroup_Relationship_Up_4-1 = "非常感謝……像這樣獲得鼓勵真是久違了。"
16011-CVGroup_Tactic_In_1-1 = "比賽開始。"
16011-CVGroup_Tactic_In_2-1 = "我會盡己所能。"
16011-CVGroup_Tactic_Victory_1-1 = "真是精采的作戰，老師。"
16011-CVGroup_Tactic_Victory_2-1 = "偶爾打扮成這樣，方便行動也不錯呢。"

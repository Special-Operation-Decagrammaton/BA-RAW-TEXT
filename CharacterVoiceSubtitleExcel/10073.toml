10073-CVGroup_Relationship_Up_3-1 = "저한테 이런 걸 막 시킬 수 있는 사람도, 선생님 정도뿐이겠네요."
10073-CVGroup_Relationship_Up_4-1 = "이, 이번에……. 시간 괜찮으면……. 그, 저를……. 불러주세요."

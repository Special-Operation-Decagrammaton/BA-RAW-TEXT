[translation]
10073-CVGroup_Battle_Buffed_1-1 = "得，得救了……"
10073-CVGroup_Battle_Covered_1-1 = "就選這裡吧。"
10073-CVGroup_Battle_Defense_1-1 = "那樣是行不通的哦。"
10073-CVGroup_Battle_In_1-1 = "唉……走吧……"
10073-CVGroup_Battle_In_2-1 = "為什麼……要我帶頭……？"
10073-CVGroup_Battle_Move_1-1 = "還沒完嗎？"
10073-CVGroup_Battle_Move_2-1 = "趕緊收拾一下吧……"
10073-CVGroup_Battle_Recovery_1-1 = "謝謝。"
10073-CVGroup_Battle_TacticalAction_1-1 = "唔，唔唔……！"
10073-CVGroup_Battle_Victory_1-1 = "呼……終於，結束了。"
10073-CVGroup_Battle_Victory_2-1 = "哈啊……覺，覺得累的人……只有我嗎……？"
10073-CVGroup_CommonSkill-1 = "呼呣……！原來如此！"
10073-CVGroup_ExSkill_1-1 = "已經到極限了……"
10073-CVGroup_ExSkill_2-1 = "有所準備是正確的。"
10073-CVGroup_ExSkill_3-1 = "稍微，冷靜下來了。"
10073-CVGroup_ExSkill_Level_1-1 = "要，要喝喝看嗎……？"
10073-CVGroup_ExSkill_Level_2-1 = "大，大家也……如果不介意的話……"
10073-CVGroup_ExSkill_Level_3-1 = "有好好冰過唷……"
10073-CVGroup_Formation_In_1-1 = "其，其實，就算我不出出場也……"
10073-CVGroup_Formation_In_2-1 = "我明白了……"
10073-CVGroup_Formation_Select-1 = "噫，噫呀啊啊！！\n老，老師……！？"
10073-CVGroup_Growup_1-1 = "呵，呵呵……\n好吧，偶爾體驗這樣的夏天也不錯呢……"
10073-CVGroup_Growup_2-1 = "比我想像中還好呢，這種事……嘻嘻……"
10073-CVGroup_Growup_3-1 = "謝謝你，老師。\n為了幫上忙……我會試試看的……"
10073-CVGroup_Growup_4-1 = "這個感覺……原來如此，我明白了。"
10073-CVGroup_Relationship_Up_1-1 = "謝，謝謝你，老師……\n那個……作為回禮，要幫你泡杯黑咖啡嗎……？"
10073-CVGroup_Relationship_Up_2-1 = "只要跟老師在一起，\n即使是不擅長的事，感覺，似乎也能做到……"
10073-CVGroup_Relationship_Up_3-1 = "能拜託我做這種事的人，就只有老師了……"
10073-CVGroup_Relationship_Up_4-1 = "之，之後……如果時間允許的話……\n那個，請跟我……說一聲吧。"
10073-CVGroup_Tactic_In_1-1 = "路還很長呢……"
10073-CVGroup_Tactic_In_2-1 = "算了，既然要做就要好好認真……"
10073-CVGroup_Tactic_Victory_1-1 = "辛苦你了，老師……"
10073-CVGroup_Tactic_Victory_2-1 = "已，已經，可以回去了對吧……？"

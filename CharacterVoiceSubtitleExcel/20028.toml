[translation]
20028-CVGroup_CommonSkill-1 = "잘 받아주세요~!"
20028-CVGroup_ExSkill_1-1 = "바람이 좋…… 아! 으아아……!?"
20028-CVGroup_ExSkill_2-1 = "바람이…… 응!? 기, 기다려주세요!!"
20028-CVGroup_ExSkill_3-1 = "흥흥~. 응……!? 모, 모자가……!"
20028-CVGroup_ExSkill_Level_1-1 = "더위에 지지 않도록!"
20028-CVGroup_ExSkill_Level_2-1 = "물놀이, 하지 않을래요?"
20028-CVGroup_ExSkill_Level_3-1 = "역시 여름엔 이거죠!"
20028-CVGroup_Formation_In_1-1 = "네, 무엇을 도와드리면 될까요?"
20028-CVGroup_Formation_In_2-1 = "제, 제가 나갈 차례네요! 열심히 할게요!"
20028-CVGroup_Formation_Select-1 = "저기…… 제 수영복, 어떠신가요……?"
20028-CVGroup_Growup_1-1 = "이, 이런 걸 저에게……!? 정말 괜찮으신가요?"
20028-CVGroup_Growup_2-1 = "감사합니다, 선생님! 소중하게 다룰게요!"
20028-CVGroup_Growup_3-1 = "받는 건 익숙하지 않지만…… 그래도 기뻐요."
20028-CVGroup_Growup_4-1 = "더욱 열심히 하겠습니다!"
20028-CVGroup_Relationship_Up_1-1 = "으…… 어떻게 감사의 말을 드려야 할 지 모르겠어요……."
20028-CVGroup_Relationship_Up_2-1 = "저는 선생님께, 제대로 도움이 되고 있는 걸까요?"
20028-CVGroup_Relationship_Up_3-1 = "선생님과 함께 있으면 마음이 놓여요……. 왜일까요?"
20028-CVGroup_Relationship_Up_4-1 = "필요한 것이 있으면, 뭐든지 말해 주세요……뭐든지."

[translation]
20042-CVGroup_CommonSkill-1 = "ดูผลงานศิลปะของฉันให้ดีๆ ล่ะ!"
20042-CVGroup_ExSkill_1-1 = "จับสัญญาณ... ได้แล้ว!\nอะ... เอ๋... ว้าก?!"
20042-CVGroup_ExSkill_2-1 = "ติดทีสิ ติดสักที...\nต่อได้แล้ว! วะ... ว้ากกก!"
20042-CVGroup_ExSkill_3-1 = "ขอร้องละ ขอร้องละ... ว้าว!\nเอ๊ะ? เอ๋...?!"
20042-CVGroup_ExSkill_Level_1-1 = "อ้าก ดันพลาดซะแล้ว...!\nอย่างน้อยก็ไม่บาดเจ็บล่ะนะ"
20042-CVGroup_ExSkill_Level_2-1 = "เฮ้อ...\nฮ่าฮ่า เห็นรึเปล่า?"
20042-CVGroup_ExSkill_Level_3-1 = "อ้ายยยย?!\nละ...ลงพื้นได้สวย...!"
20042-CVGroup_Formation_In_1-1 = "หืม? พูดอะไรน่ะ?"
20042-CVGroup_Formation_In_2-1 = "แค่มาแคมป์ยังไม่พอ ต้องต่อสู้ด้วยเรอะ...!"
20042-CVGroup_Formation_Select-1 = "อื้ม! แบบนี้ก็ไม่ต้องกลัวเรื่องเดินป่าแล้ว!"
20042-CVGroup_Growup_1-1 = "รู้สึกเหมือนจะเก่งเรื่องตั้งแคมป์ขึ้นเลย...\nแบบนี้ถือว่าดีใช่มั้ย...?"
20042-CVGroup_Growup_2-1 = "ถึงเส้นทางที่จะไปยังอีกยาวไกลและลำบาก\nแต่ตอนนี้เหมือนฉันจะมองเห็นทิศทางที่ต้องเดินไปแล้วละ!"
20042-CVGroup_Growup_3-1 = "อืม ถ้าเป็นเจ้านี่ละก็ คงทำให้ฉันพยายามขึ้นได้!"
20042-CVGroup_Growup_4-1 = "โอ้ว แรงบันดาลใจพุ่งสูงปรี๊ดเลยละ!"
20042-CVGroup_Relationship_Up_1-1 = "ขอบคุณเสมอๆ เลยนะคุณครู\nฉันพูดจริงนะ!"
20042-CVGroup_Relationship_Up_2-1 = "ถึงการปีนเขาจะเป็นเรื่องลำบาก...\nแต่ถ้ามีคุณครูมาด้วยก็คงไม่เป็นไร"
20042-CVGroup_Relationship_Up_3-1 = "คุณครู อยากไปเดินเล่นหน่อยมั้ย?\nฉันไม่ได้อยากเปลี่ยนมู้ดอะไรหรอกก็แค่... อากาศมันดีน่ะ"
20042-CVGroup_Relationship_Up_4-1 = "(เอ๊ะ? แปลกจัง... เมื่อกี้เหมือนเห็นคุณครูส่องประกายเลย...)"

[translation]
20042-CVGroup_CommonSkill-1 = "나의 예술을 잘 봐!"
20042-CVGroup_ExSkill_1-1 = "전파가…… 잡혔다! ……어, 어어어…… 우왓?!"
20042-CVGroup_ExSkill_2-1 = "잡혀라, 잡혀라…… 잡혔다! 으, 으아앗!"
20042-CVGroup_ExSkill_3-1 = "제발, 제발…… 와! 어? 어어…?!"
20042-CVGroup_ExSkill_Level_1-1 = "으악, 실수했다…! 다치지 않았으니 다행이려나."
20042-CVGroup_ExSkill_Level_2-1 = "에구구…… ……하하, 혹시 봤어?"
20042-CVGroup_ExSkill_Level_3-1 = "으갸아아학?! 차, 착지 성공……!"
20042-CVGroup_Formation_In_1-1 = "으음? 무슨 일이야?"
20042-CVGroup_Formation_In_2-1 = "캠핑도 모자라서 전투라니……!"
20042-CVGroup_Formation_Select-1 = "으음! 이러면 등산도 두렵지 않지!"
20042-CVGroup_Growup_1-1 = "캠핑을 좀 더 잘할 수 있게 된 느낌인데…… ……이거 좋은 건가?"
20042-CVGroup_Growup_2-1 = "아직 갈 길이 멀고 험하지만, 그래도 이제는 방향만큼은 조금 보이는 느낌인걸!"
20042-CVGroup_Growup_3-1 = "음, 이거라면 좀 더 힘낼 수 있겠어!"
20042-CVGroup_Growup_4-1 = "오오, 영감이 잔뜩 솟고 있어!"
20042-CVGroup_Relationship_Up_1-1 = "언제나 고마워, 선생님. 이건 진짜야!"
20042-CVGroup_Relationship_Up_2-1 = "산을 오르는 건 고된 일이지만…… 그래도 선생님이 함께 해준다면 괜찮아."
20042-CVGroup_Relationship_Up_3-1 = "선생님, 같이 산책이라도 갈까? 특별히 심경의 변화가 있는 건 아니지만…… 날씨가 좋아서?"
20042-CVGroup_Relationship_Up_4-1 = "(어라? 이상하다… 방금 선생님의 모습이 엄청나게 반짝이는 것처럼 보였는데…)"

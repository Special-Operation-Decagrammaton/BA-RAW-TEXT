[translation]
20042-CVGroup_CommonSkill-1 = "好好看清楚我的藝術吧！"
20042-CVGroup_ExSkill_1-1 = "電波在哪？……收到了！\n……咦，等一下……哇啊！？"
20042-CVGroup_ExSkill_2-1 = "連上吧，連上吧……很好！\n唔，唔哇啊！"
20042-CVGroup_ExSkill_3-1 = "拜託，快連上吧……哇！\n咦？咦咦……！？"
20042-CVGroup_ExSkill_Level_1-1 = "唔哇，失誤了……！\n算了，也行吧……"
20042-CVGroup_ExSkill_Level_2-1 = "唔呃呃……\n呃……剛才的有看到嗎？"
20042-CVGroup_ExSkill_Level_3-1 = "唔呀啊啊啊！？\n落，落地成功……！"
20042-CVGroup_Formation_In_1-1 = "嗯？非得出門嗎？"
20042-CVGroup_Formation_In_2-1 = "真是的～！光是露營就已經很忙了耶！？"
20042-CVGroup_Formation_Select-1 = "啊，這樣很棒耶！就這樣帶我走吧～"
20042-CVGroup_Growup_1-1 = "雖然感覺越來越習慣露營了……\n……不過這是好事嗎？"
20042-CVGroup_Growup_2-1 = "雖然路還很遙遠，但感覺已經找到該往哪裡前進了！"
20042-CVGroup_Growup_3-1 = "嗯，有了這個就能再加把勁了！"
20042-CVGroup_Growup_4-1 = "哦哦，靈感正不斷湧現出來！"
20042-CVGroup_Relationship_Up_1-1 = "我一直都很謝謝你，老師。\n這是我的真心話唷！"
20042-CVGroup_Relationship_Up_2-1 = "登山雖然很辛苦……\n不過，如果能跟老師一起的話，也不是不行吧。"
20042-CVGroup_Relationship_Up_3-1 = "老師，要不要一起去散步啊？\n我，我沒有其他意思哦！？\n……畢竟天氣還挺好的？"
20042-CVGroup_Relationship_Up_4-1 = "（咦？真奇怪……\n剛才老師的臉，看起來還非常閃亮的說……）"

[translation]
10061-CVGroup_Battle_Buffed_1-1 = "很有幫助。"
10061-CVGroup_Battle_Covered_1-1 = "沒用的。"
10061-CVGroup_Battle_Defense_1-1 = "信仰心不夠充足哦。"
10061-CVGroup_Battle_In_1-1 = "一起出發吧。"
10061-CVGroup_Battle_In_2-1 = "這也是一場試煉呢。"
10061-CVGroup_Battle_Move_1-1 = "繼續前進。"
10061-CVGroup_Battle_Move_2-1 = "還沒有結束。"
10061-CVGroup_Battle_Recovery_1-1 = "非常感謝。"
10061-CVGroup_Battle_TacticalAction_1-1 = "呼！"
10061-CVGroup_Battle_Victory_1-1 = "向各位致上感謝之意。"
10061-CVGroup_Battle_Victory_2-1 = "能夠解決真是萬幸。"
10061-CVGroup_CommonSkill-1 = "結果還是變成這樣了呢。"
10061-CVGroup_ExSkill_1-1 = "向這枚子彈寄予祝福。"
10061-CVGroup_ExSkill_2-1 = "向我等施予恩惠。"
10061-CVGroup_ExSkill_3-1 = "向恩寵致上感謝之意。"
10061-CVGroup_ExSkill_Level_1-1 = "請悔改吧！"
10061-CVGroup_ExSkill_Level_2-1 = "這是為了你啊！"
10061-CVGroup_ExSkill_Level_3-1 = "請接受吧！"
10061-CVGroup_Formation_In_1-1 = "我明白了。"
10061-CVGroup_Formation_In_2-1 = "您找我嗎？"
10061-CVGroup_Formation_Select-1 = "哎，哎呀……？這是……？"
10061-CVGroup_Growup_1-1 = "非，非常感謝。\n像這樣受人關照……讓人不太習慣呢。"
10061-CVGroup_Growup_2-1 = "這份恩情，究竟該如何報答才好呢……"
10061-CVGroup_Growup_3-1 = "願此行充滿祝福。"
10061-CVGroup_Growup_4-1 = "給予並不適合婉拒呢……非常感謝您。"
10061-CVGroup_Relationship_Up_1-1 = "老師……那個……\n沒，沒什麼……"
10061-CVGroup_Relationship_Up_2-1 = "每當要向老師傳達事情時……\n這樣的話語適當與否，總是會令我困擾。"
10061-CVGroup_Relationship_Up_3-1 = "能像老師一般理解我的人……並不是那麼多。"
10061-CVGroup_Relationship_Up_4-1 = "我畢竟……是屬於大家的修女……\n不過……那個……"
10061-CVGroup_Tactic_In_1-1 = "願幸福同在。"
10061-CVGroup_Tactic_In_2-1 = "各位，還請多多指教了。"
10061-CVGroup_Tactic_Victory_1-1 = "願恩寵與各位同在。"
10061-CVGroup_Tactic_Victory_2-1 = "願和平同在。"

[translation]
10076-CVGroup_Battle_Buffed_1-1 = "這是……！感謝你的關心！"
10076-CVGroup_Battle_Defense_1-1 = "沒用的！"
10076-CVGroup_Battle_In_1-1 = "咦？我要站在最前排嗎？明明要應援的說！？"
10076-CVGroup_Battle_In_2-1 = "由我來打頭陣！\n……啊，這是不是搞錯了？"
10076-CVGroup_Battle_Move_1-1 = "是，往下個地點前進吧！"
10076-CVGroup_Battle_Move_2-1 = "休息似乎還要再等一會呢！"
10076-CVGroup_Battle_Recovery_1-1 = "謝謝你！！"
10076-CVGroup_Battle_TacticalAction_1-1 = "呀！"
10076-CVGroup_Battle_Victory_1-1 = "應援的效果有發揮出來嗎？"
10076-CVGroup_Battle_Victory_2-1 = "大家，辛苦了！"
10076-CVGroup_CommonSkill-1 = "啊，那個呀！讓我來說明吧！"
10076-CVGroup_ExSkill_1-1 = "請看這邊，要上囉～！！"
10076-CVGroup_ExSkill_2-1 = "加油加油！就是現在！"
10076-CVGroup_ExSkill_3-1 = "亞都梨的應援，要開始了！\n哈啊啊啊！"
10076-CVGroup_ExSkill_Level_1-1 = "華麗地登場！"
10076-CVGroup_ExSkill_Level_2-1 = "有，有點做過頭了嗎！？"
10076-CVGroup_ExSkill_Level_3-1 = "唔哇啊啊，這是什麼啊！\n對不起～！！"
10076-CVGroup_Formation_In_1-1 = "是！請交給我吧！"
10076-CVGroup_Formation_In_2-1 = "需要應援的話，就輪到我出場了呢！"
10076-CVGroup_Formation_Select-1 = "加油！加油！\n啊，還沒到嗎？啊哈哈……"
10076-CVGroup_Growup_1-1 = "這也全都是為了應援，為了大家對吧！？"
10076-CVGroup_Growup_2-1 = "謝謝你，老師！\n為了你對我付出的關照，我會努力的！"
10076-CVGroup_Growup_3-1 = "應援的明明是我才對……\n總覺得有點害羞呢！"
10076-CVGroup_Growup_4-1 = "感覺總是我在接受應援。\n我，總有一天也要為了老師……"
10076-CVGroup_Relationship_Up_1-1 = "老師……那個，需要應援嗎？\n就是，如果不嫌棄我的話……"
10076-CVGroup_Relationship_Up_2-1 = "我隨時都準備就緒！\n需要的時候請儘管吩咐！"
10076-CVGroup_Relationship_Up_3-1 = "要是這能做為平時的回禮就好了……"
10076-CVGroup_Relationship_Up_4-1 = "啦啦隊服……你喜歡嗎？\n那我每天都穿！"
10076-CVGroup_Tactic_In_1-1 = "呣呣！看來會成為長期戰呢！"
10076-CVGroup_Tactic_In_2-1 = "呣呣……這需要應援！"
10076-CVGroup_Tactic_Victory_1-1 = "呼……是場精采的比賽！辛苦了！"
10076-CVGroup_Tactic_Victory_2-1 = "哈啊，哈啊……幸，幸好總算是順利結束了！"

10076-CVGroup_CommonSkill-1 = "앗, 그건 말이죠! 설명하겠습니다!"
10076-CVGroup_ExSkill_1-1 = "여길 봐주세요~! 갑니다!!"
10076-CVGroup_ExSkill_2-1 = "플레-이! 플레-이! 지금입니다!"

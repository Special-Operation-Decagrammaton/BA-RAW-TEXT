[translation]
10076-CVGroup_Battle_Buffed_1-1 = "นี่มัน...! ขอบคุณที่คอยดูแลนะคะ!"
10076-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอกค่ะ!"
10076-CVGroup_Battle_In_1-1 = "คะ? ให้ฉันนำหน้าสุดงั้นเหรอคะ? การเชียร์เนี่ยนะ?"
10076-CVGroup_Battle_In_2-1 = "ฉันจะนำหน้าให้เองค่ะ! ไม่ใช่แบบนี้งั้นเหรอ...!?"
10076-CVGroup_Battle_Move_1-1 = "ค่ะ ถ้างั้นไปกันต่อเลยค่ะ!"
10076-CVGroup_Battle_Move_2-1 = "ยังอีกไกลกว่าจะได้พักนะคะ!"
10076-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ!!"
10076-CVGroup_Battle_TacticalAction_1-1 = "ย้าาา!"
10076-CVGroup_Battle_Victory_1-1 = "การเชียร์ได้ผลรึเปล่าคะ?"
10076-CVGroup_Battle_Victory_2-1 = "ทุกคนทำได้ดีมากเลยค่ะ!"
10076-CVGroup_CommonSkill-1 = "อ๊ะ สำหรับเรื่องนั้น ฉันจะอธิบายเองค่ะ!"
10076-CVGroup_ExSkill_1-1 = "ดูนี่สิคะ~! ไปแล้วนะคะ!!"
10076-CVGroup_ExSkill_2-1 = "ฮูเร่~ ฮูเร่! ตอนนี้แหละ!"
10076-CVGroup_ExSkill_3-1 = "ฉันจะเชียร์เองค่ะ! ย้าาา!"
10076-CVGroup_ExSkill_Level_1-1 = "จะลุยอย่างสง่างามเลยค่ะ!"
10076-CVGroup_ExSkill_Level_2-1 = "มะ... มันเวอร์ไปงั้นเหรอคะ!?"
10076-CVGroup_ExSkill_Level_3-1 = "อ๊าาา อะไรกันเนี่ย!\nขอโทษนะคะ~!"
10076-CVGroup_Formation_In_1-1 = "ค่ะ! ให้เป็นหน้าที่ของฉันเองค่ะ!"
10076-CVGroup_Formation_In_2-1 = "ถ้าต้องการเสียงเชียร์ละก็ ฉันคงต้องออกโรงแล้วละค่ะ!"
10076-CVGroup_Formation_Select-1 = "ฮูเร่~ ฮูเร่!\nยะ... ยังอีกงั้นเหรอคะ? ฮะฮ่า"
10076-CVGroup_Growup_1-1 = "ทั้งหมดนี้ก็เพื่อการเชียร์\nพูดง่ายๆ ก็คือการทำเพื่อทุกคนค่ะ!?"
10076-CVGroup_Growup_2-1 = "ขอบคุณนะคะ คุณครู!\nฉันจะทำให้เต็มที่ให้สมกับที่คุณครูใส่ใจเลยค่ะ!"
10076-CVGroup_Growup_3-1 = "ฉันต้องเป็นคนเชียร์อัปแท้ๆ... แต่รู้สึกอายจังเลยค่ะ!"
10076-CVGroup_Growup_4-1 = "เหมือนฉันจะได้รับแรงเชียร์อยู่ฝ่ายเดียวตลอดเลยค่ะ\nสักวันหนึ่งฉันเองก็จะเชียร์เพื่อคุณครู...!"
10076-CVGroup_Relationship_Up_1-1 = "คุณครู... ต้องการแรงเชียร์รึเปล่าคะ?\nคือว่าถ้าคุณครูโอเคกับฉันละก็...!"
10076-CVGroup_Relationship_Up_2-1 = "ฉันเตรียมพร้อมอยู๋เสมอเลยค่ะ!\nถ้าต้องการเสียงเชียร์ก็บอกได้เลยนะคะ!"
10076-CVGroup_Relationship_Up_3-1 = "ถ้านี่คือรางวัลตอบแทนละก็ ฉันคงมีความสุขมากแน่ๆ..."
10076-CVGroup_Relationship_Up_4-1 = "คุณครูคงจะชอบ... ชุดเชียร์ลีดเดอร์สินะคะ?\nถ้าอย่างนั้นฉันจะใส่ทุกวันเลยค่ะ!"
10076-CVGroup_Tactic_In_1-1 = "อื้ม~! ดูเหมือนเกมจะยืดเยื้อนะคะ!"
10076-CVGroup_Tactic_In_2-1 = "เพราะงั้นคงต้องการเสียงเชียร์แน่ๆ ค่ะ!"
10076-CVGroup_Tactic_Victory_1-1 = "ฮู่ว... เป็นการแข่งขันที่ยอดเยี่ยมมากค่ะ!\nขอบคุณที่พยายามกันนะคะ!"
10076-CVGroup_Tactic_Victory_2-1 = "แฮ่ก แฮ่ก... คะ...ค่อยยังชั่วที่จบลงได้ด้วยดีนะคะ!"

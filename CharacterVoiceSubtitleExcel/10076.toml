10076-CVGroup_Relationship_Up_2-1 = "저는 언제든 준비돼 있으니까요! 필요하시면 말씀만 주세요!"
10076-CVGroup_Relationship_Up_3-1 = "이걸로 평소의 보답이 된다면 기쁠텐데……."
10076-CVGroup_Relationship_Up_4-1 = "치어리더 의상… 좋아하시나요? 그렇다면, 매일 입을게요!"
10076-CVGroup_Tactic_In_1-1 = "음~! 장기전이 되겠는데요!"
10076-CVGroup_Tactic_In_2-1 = "과연, 이건 응원이 필요하겠어요!"
10076-CVGroup_Tactic_Victory_1-1 = "후… 멋진 경기였어요! 수고하셨습니다!"

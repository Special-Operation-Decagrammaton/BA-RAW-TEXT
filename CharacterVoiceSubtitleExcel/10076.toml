10076-CVGroup_ExSkill_Level_1-1 = "화려하게 갑니다!"
10076-CVGroup_ExSkill_Level_2-1 = "조, 조금 과한가요!?"
10076-CVGroup_ExSkill_Level_3-1 = "으아아아, 이게 뭐야! 미안해요~!"
10076-CVGroup_Formation_In_1-1 = "네! 저에게 맡겨 주세요!"
10076-CVGroup_Formation_In_2-1 = "응원이 필요한 거면, 제가 나설 차례네요!"

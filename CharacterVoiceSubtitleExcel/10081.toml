[translation]
10081-CVGroup_Battle_Buffed_1-1 = "ฮุฮุ! ขอเสียมารยาทหน่อยนะเจ้าคะ!"
10081-CVGroup_Battle_Defense_1-1 = "คุยกันไม่รู้เรื่องเลยนี่?!"
10081-CVGroup_Battle_In_1-1 = "ทุกคน! ลุยไปกับข้าน้อยเลยค่ะ!"
10081-CVGroup_Battle_In_2-1 = "คาเดโนะโคจิ ยูคาริแห่งเฮียกกะเรียวรัน จะลุยแล้วนะเจ้าคะ!"
10081-CVGroup_Battle_Move_1-1 = "ไปที่ต่อไปกันเลยเจ้าค่ะ!"
10081-CVGroup_Battle_Move_2-1 = "ลุยไปต่อทั้งอย่างนี้เลยเจ้าค่ะ!"
10081-CVGroup_Battle_Recovery_1-1 = "ขอรับไว้ด้วยความยินดีเลยเจ้าค่ะ!"
10081-CVGroup_Battle_TacticalAction_1-1 = "จะเปลี่ยนสถานที่แล้วนะเจ้าคะ!"
10081-CVGroup_Battle_Victory_1-1 = "ฮุฮุ! ผลลัพธ์มันก็แน่นอนอยู่แล้วละเจ้าค่ะ!"
10081-CVGroup_Battle_Victory_2-1 = "ฮืม! นี่เป็นวิก~โท~รี่ที่สมบูรณ์แบบมากเลย ชนะใสๆ เลยเจ้าค่ะ!"
10081-CVGroup_CommonSkill-1 = "จะแสดงพลังของข้าน้อยให้เห็นเองเจ้าค่ะ!"
10081-CVGroup_ExSkill_1-1 = "ด้วยความปรารถนาของข้า..."
10081-CVGroup_ExSkill_2-1 = "ถ้าเป็นงานที่ข้าต้องทำละก็..."
10081-CVGroup_ExSkill_3-1 = "ไม่ใช่ด้วยน้ำมือคนอื่น แต่ด้วยมือของข้าเอง..."
10081-CVGroup_ExSkill_Level_1-1 = "เล็งให้แม่น... แล้วยิงเจ้าค่ะ!"
10081-CVGroup_ExSkill_Level_2-1 = "ด้วยความจริงใจของข้า!"
10081-CVGroup_ExSkill_Level_3-1 = "จะแสดงพลังของข้าน้อยให้เห็นเองเจ้าค่ะ!"
10081-CVGroup_Formation_In_1-1 = "นี่คือเวลาแห่งความก้าวหน้าของข้าเจ้าค่ะ!"
10081-CVGroup_Formation_In_2-1 = "ฮุฮุ ต้องการพลังของข้าสินะเจ้าคะ?"
10081-CVGroup_Formation_Select-1 = "เจ้าค่ะ! ให้เป็นหน้าที่ของข้าน้อยเองเจ้าค่ะ!"
10081-CVGroup_Growup_1-1 = "หัวใจข้าน้อยเต้นรัว เพราะได้รับความไว้วางใจจากคุณครู...\nค่ะ ข้าน้อยจะตอบแทนให้สุดกำลังเลยเจ้าค่ะ!"
10081-CVGroup_Growup_2-1 = "ให้สิ่งล้ำค่ากับข้าน้อยเช่นนี้...\nข้าน้อยจะพยายามเพื่อตอบแทนความคาดหวังเจ้าค่ะ!"
10081-CVGroup_Growup_3-1 = "เจ้าค่ะ ทุกสิ่งที่คุณครูได้สั่งสอนข้าน้อย\nข้าน้อยจะหมั่นศึกษาและทบทวน\nไม่ให้พลาดแม้แต่เรื่องเดียวเลยเจ้าค่ะ!"
10081-CVGroup_Growup_4-1 = "ข้าน้อย ยูคาริน่ะ...\nเติบโตขึ้นไปอีกก้าวในฐานะเฮียกกะเรียวรันแล้วเจ้าค่ะ!"
10081-CVGroup_Relationship_Up_1-1 = "ถ้าคุณครูอยู่ด้วย ข้าน้อยรู้สึกผ่อนคลายโดยไม่รู้ตัว...\nและมีความสุขมากเลยเจ้าค่ะ"
10081-CVGroup_Relationship_Up_2-1 = "แต่มีคุณครูอยู่ข้างๆ ก็รู้สึกเข้มแข็งขึ้นแล้ว\nนี่เป็นสิ่งที่ข้าน้อยอยากจะบอกเจ้าค่ะ\nฮุฮุ... เป็นเรื่องน่าทึ่งมากเลยนะเจ้าคะ"
10081-CVGroup_Relationship_Up_3-1 = "เจ้าค่ะ เพราะมีคุณครูอยู่ด้วย\nข้าน้อย... ยูคาริถึงได้เป็นตัวเองในแบบนี้ได้เจ้าค่ะ\nขอบคุณมากเลยเจ้าค่ะ"
10081-CVGroup_Relationship_Up_4-1 = "เอ๊ะ เอ๋...? นับตั้งแต่วินาทีที่ได้พบคุณครู หัวใจข้าน้อยก็เต้นแรงมาก...\nถ้าเกิดหัวใจข้าน้อยเกิดระเบิดขึ้นมาจะทำยังไงดีเจ้าคะ?!"
10081-CVGroup_Tactic_In_1-1 = "ผู้เป็นแบบอย่างในฐานะเฮียกกะเรียวรัน...\nข้าจะแสดงให้เห็นเองเจ้าค่ะ"
10081-CVGroup_Tactic_In_2-1 = "ฮุฮุฮุ นี่คือจุดเริ่มต้นตำนานของยูคาริละเจ้าค่ะ!"
10081-CVGroup_Tactic_Victory_1-1 = "ปฏิบัติการเสร็จสิ้น ทุกคนทำได้ดีมากเลยเจ้าค่ะ!"
10081-CVGroup_Tactic_Victory_2-1 = "ฮุฮุ! คว้าชัยชนะที่สมบูรณ์แบบได้!\nเพราะทุกคนร่วมแรงร่วมใจกันเลยเจ้าค่ะ!"

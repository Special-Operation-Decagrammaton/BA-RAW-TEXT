[translation]
10081-CVGroup_Battle_Buffed_1-1 = "呵呵，失禮了！"
10081-CVGroup_Battle_Defense_1-1 = "沒有效果！"
10081-CVGroup_Battle_In_1-1 = "各位！跟小女子一起出發吧！"
10081-CVGroup_Battle_In_2-1 = "身為百花繚亂菁英的小女子──紫要上囉！"
10081-CVGroup_Battle_Move_1-1 = "前往下一個地點吧！"
10081-CVGroup_Battle_Move_2-1 = "就這樣維持快速進擊唷！"
10081-CVGroup_Battle_Recovery_1-1 = "我就心懷感激地收下了！"
10081-CVGroup_Battle_TacticalAction_1-1 = "換個地點吧！"
10081-CVGroup_Battle_Victory_1-1 = "呵呵！這是理所當然的結果唷！"
10081-CVGroup_Battle_Victory_2-1 = "哼哼！這就是完美的勝～利！V！哦～"
10081-CVGroup_CommonSkill-1 = "小女子的活躍，就讓您見識一下吧！"
10081-CVGroup_ExSkill_1-1 = "傾注小女子的決心……"
10081-CVGroup_ExSkill_2-1 = "倘若這是小女子必須完成的事，那就一定……"
10081-CVGroup_ExSkill_3-1 = "不經由任何人，而是由小女子親手……"
10081-CVGroup_ExSkill_Level_1-1 = "仔細瞄準之後……發射！"
10081-CVGroup_ExSkill_Level_2-1 = "傾注小女子的真心！"
10081-CVGroup_ExSkill_Level_3-1 = "小女子的全力，請好好見識吧！"
10081-CVGroup_Formation_In_1-1 = "是快速進擊的時候對吧！"
10081-CVGroup_Formation_In_2-1 = "呵呵，這代表需要小女子的力量對吧？"
10081-CVGroup_Formation_Select-1 = "是！包在小女子身上吧！"
10081-CVGroup_Growup_1-1 = "獲得老師的信賴之後不斷高揚的這股悸動……\n是！小女子也會真誠地全力回應！"
10081-CVGroup_Growup_2-1 = "居然能收到如此貴重的東西……\n為了回應您的期待，小女子會繼續精進！"
10081-CVGroup_Growup_3-1 = "是，我會將老師教導的一切進行徹底的預習、複習，\n將其一個不漏地記在腦袋裡！"
10081-CVGroup_Growup_4-1 = "小女子，紫……\n作為百花繚亂的一員，又前進了一步！"
10081-CVGroup_Relationship_Up_1-1 = "只要跟老師待在一起，心情就會自然地獲得釋放……\n變得非常的……幸福。"
10081-CVGroup_Relationship_Up_2-1 = "光是在身旁服侍就能獲得力量，指的就是這種情況吧。\n呵呵……總覺得很不可思議。"
10081-CVGroup_Relationship_Up_3-1 = "是，多虧有老師您在，\n小女子才能單純以「紫」的身分存在。\n真的，非常感謝。"
10081-CVGroup_Relationship_Up_4-1 = "哎，哎呀……？\n自從遇見老師的瞬間，心跳就變得非常高揚……\n要是小女子的心臟破掉的話究竟該如何是好！？"
10081-CVGroup_Tactic_In_1-1 = "百花繚亂的榜樣，就由我來展現吧。"
10081-CVGroup_Tactic_In_2-1 = "呵呵，這是紫傳說的起點唷！"
10081-CVGroup_Tactic_Victory_1-1 = "作戰結束。\n各位，真是相當出色的活躍表現！"
10081-CVGroup_Tactic_Victory_2-1 = "呵呵！簡直是完全勝利！\n多虧了與大家的齊心協力！"

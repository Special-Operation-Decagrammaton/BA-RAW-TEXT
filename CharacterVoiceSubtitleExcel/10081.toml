[translation]
10081-CVGroup_Battle_Buffed_1-1 = "후훗! 실례했사와요!"
10081-CVGroup_Battle_Defense_1-1 = "통하지 않사와요!"
10081-CVGroup_Battle_In_1-1 = "여러분! 저와 함께 가시죠!"
10081-CVGroup_Battle_In_2-1 = "백화요란의 엘리-트인 저, 유카리가 가겠사와요!"
10081-CVGroup_Battle_Move_1-1 = "다음으로 가는 것이어요!"
10081-CVGroup_Battle_Move_2-1 = "이대로 쾌진격이어요!"
10081-CVGroup_Battle_Recovery_1-1 = "감사히 받겠사와요!"
10081-CVGroup_Battle_TacticalAction_1-1 = "장소, 바꾸겠사와요!"
10081-CVGroup_Battle_Victory_1-1 = "후후! 당연한 결과여요!"
10081-CVGroup_Battle_Victory_2-1 = "흐-흥! 이것은 완벽한 빅-토리~였사와요. 브이! 랍니다!"
10081-CVGroup_CommonSkill-1 = "소녀의 활약! 보여드리겠사와요!"
10081-CVGroup_ExSkill_1-1 = "소녀의 결의를 담아…."
10081-CVGroup_ExSkill_2-1 = "소녀가 해야 할 일이라면 반드시…"
10081-CVGroup_ExSkill_3-1 = "다른 누구도 아닌, 제 손으로…"
10081-CVGroup_ExSkill_Level_1-1 = "제대로 노리고, 쏘겠사와요!"
10081-CVGroup_ExSkill_Level_2-1 = "저의 진심을 담아!"
10081-CVGroup_ExSkill_Level_3-1 = "소녀의 전력을, 보여드리겠사와요!"
10081-CVGroup_Formation_In_1-1 = "쾌진격의 시간이어요!"
10081-CVGroup_Formation_In_2-1 = "후훗, 이건 소녀의 힘이 필요하다는 것이군요?"
10081-CVGroup_Formation_Select-1 = "네! 저에게 맡겨만 주시와요!"
10081-CVGroup_Growup_1-1 = "선생님의 신뢰를 받아, 두근거리는 이 고동……\n네, 소녀도 거짓없이 전력으로 보답하겠사와요!"
10081-CVGroup_Growup_2-1 = "이렇게나 귀중한 걸 주시다니…….\n기대에 부응할 수 있도록, 소녀. 정진하겠사와요!"
10081-CVGroup_Growup_3-1 = "네, 선생님께서 가르쳐 주신 이 모든 것들은.\n예습, 복습을 철저히 해서\n하나도 놓치지 않고 꼼꼼히 기억해두겠사와요!"
10081-CVGroup_Growup_4-1 = "소녀, 유카리는……. 백화요란으로서, 또 한 걸음 전진했사와요!"
10081-CVGroup_Relationship_Up_1-1 = "선생님과 있으면 자연스레 긴장이 풀려서….\n무척… 행복한 기분이 되는 것이어요."
10081-CVGroup_Relationship_Up_2-1 = "곁에서 모시고 있는 것만으로도 힘이 난다는 건,\n이런 걸 두고 하는 말이었군요.\n후후…. 왠지 신기한 일이어요."
10081-CVGroup_Relationship_Up_3-1 = "네, 선생님이 있어주신 덕분에.\n소녀는, 유카리로 있을 수 있었사와요.\n정말, 감사드리어요."
10081-CVGroup_Relationship_Up_4-1 = "어, 어라아…?\n선생님을 만나 뵌 순간부터, 가슴이 두근두근 울려서….\n소녀의 심장이 터져 버리기라도 하면, 어, 어쩌죠?!"
10081-CVGroup_Tactic_In_1-1 = "백화요란으로서의 모범. 보여드리겠사와요."
10081-CVGroup_Tactic_In_2-1 = "후후후, 유카리 전설의 시작이어요!"
10081-CVGroup_Tactic_Victory_1-1 = "작전 종료. 여러분 훌륭한 활약이었사와요!"
10081-CVGroup_Tactic_Victory_2-1 = "후후! 그야말로 완벽한 승리! 여러분과 힘을 합친 덕분이어요!"

10081-CVGroup_Battle_Victory_2-1 = "Hm, hmm! Perfect! V for victory!"
10081-CVGroup_CommonSkill-1 = "I'll show you what I'm capable of!"
10081-CVGroup_ExSkill_1-1 = "With my determination..."
10081-CVGroup_ExSkill_2-1 = "Whatever I have to do, I will."
10081-CVGroup_ExSkill_3-1 = "With my own hands, and no one else's..."

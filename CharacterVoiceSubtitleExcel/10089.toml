[translation]
10089-CVGroup_Battle_Buffed_1-1 = "좋은 투자네"
10089-CVGroup_Battle_Covered_1-1 = "나를 쓰러뜨리겠다고?"
10089-CVGroup_Battle_Defense_1-1 = "흐응-. 겨우 그 정도로?"
10089-CVGroup_Battle_In_1-1 = "자…… 시작해볼까."
10089-CVGroup_Battle_In_2-1 = "얘들아, 간다."
10089-CVGroup_Battle_Move_1-1 = "여긴 끝났군."
10089-CVGroup_Battle_Move_2-1 = "아직 잔당이 있어. 다음으로 가자."
10089-CVGroup_Battle_Recovery_1-1 = "고마워."
10089-CVGroup_Battle_TacticalAction_1-1 = "하앗!"
10089-CVGroup_Battle_Victory_1-1 = "벌써 끝이야? 생각보다 간단한 의뢰였네."
10089-CVGroup_Battle_Victory_2-1 = "후후, 기대 이상이었지?"
10089-CVGroup_CommonSkill-1 = "후후… 아, 잠깐!?"
10089-CVGroup_ExSkill_1-1 = "사장의 제안이야."
10089-CVGroup_ExSkill_2-1 = "이름 정도는, 들어본 적 있지?"
10089-CVGroup_ExSkill_3-1 = "감사히 받도록."
10089-CVGroup_ExSkill_Level_1-1 = "흥미가 있다면, 연락해줘."
10089-CVGroup_ExSkill_Level_2-1 = "흥신소 68, 기억해 두라고."
10089-CVGroup_ExSkill_Level_3-1 = "어때? 나쁘지 않은 제안이지?"
10089-CVGroup_Formation_In_1-1 = "후후후, 과연."
10089-CVGroup_Formation_In_2-1 = "현명한 판단이네."
10089-CVGroup_Formation_Select-1 = "나에게 무슨 할 말… 히악!? 휴우…."
10089-CVGroup_Growup_1-1 = "선견지명이 있네. ……약속할게, 절대, 선생님을 실망시키지 않겠다고."
10089-CVGroup_Growup_2-1 = "이렇게까지 기대해 주고 있다니…\n나도, 좀 더 나 자신을 연마하지 않으면 안 되겠네."
10089-CVGroup_Growup_3-1 = "안심해. 내가 아무리 강해져도, 선생님을 두고 가지는 않을 거야."
10089-CVGroup_Growup_4-1 = "후후…… 앞으로도 나에게 기대해줘."
10089-CVGroup_Relationship_Up_1-1 = "선생님께는… 어디까지 털어놓으면 좋을까… 곤란하네."
10089-CVGroup_Relationship_Up_2-1 = "말만으로는 부족하다는 생각도 들지만…….\n……감사하고 있어, 선생님."
10089-CVGroup_Relationship_Up_3-1 = "이럴 때, 뭐라고 말하면 좋을까…….\n……나도 모르는 것 정도는 있어."
10089-CVGroup_Relationship_Up_4-1 = "선생님, 그…… 아니, 아무것도 아니야."
10089-CVGroup_Tactic_In_1-1 = "이 의뢰, 나에게 딱이네."
10089-CVGroup_Tactic_In_2-1 = "걱정할 거 없어. 나에게 맡겨."
10089-CVGroup_Tactic_Victory_1-1 = "내가 맡은 이상, 이 정도는 당연하지."
10089-CVGroup_Tactic_Victory_2-1 = "어때, 만족스러웠을까?"

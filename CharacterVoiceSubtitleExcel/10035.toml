10035-CVGroup_Formation_In_1-1 = "咦，我，我嗎……？真的……？"
10035-CVGroup_Formation_In_2-1 = "唔唔……好吧，既然老師是這麼說的……"
10035-CVGroup_Formation_Select-1 = "噫呀啊啊……！？"
10035-CVGroup_Growup_1-1 = "這，這難道……是要做外出準備的，意思嗎……？"
10035-CVGroup_Growup_2-1 = "把，把這個給我，是想要我做什麼……！？"

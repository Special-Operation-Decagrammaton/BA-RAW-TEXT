10035-CVGroup_Relationship_Up_4-1 = "那個，其實我把老師的喜好，全部調查了一遍……！\n雖，雖，雖然應該多少有吻合，\n不，不介意的話還請務必跟我一起……"
10035-CVGroup_Tactic_In_1-1 = "唔啊……真的，要去嗎……"
10035-CVGroup_Tactic_In_2-1 = "我，我就相信老師了哦……！？"
10035-CVGroup_Tactic_Victory_1-1 = "可，可以回去了嗎……？"
10035-CVGroup_Tactic_Victory_2-1 = "結，結束了……那個，已經可以了吧？\n真的結束了對吧？"

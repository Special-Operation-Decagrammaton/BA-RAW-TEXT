10035-CVGroup_CommonSkill-1 = "這，這種時候才該做好情緒管理……！"
10035-CVGroup_ExSkill_1-1 = "這，這是什麼啊……！"
10035-CVGroup_ExSkill_2-1 = "為，為什麼會在這種地方……！"
10035-CVGroup_ExSkill_3-1 = "啊，真是的……！"
10035-CVGroup_ExSkill_Level_1-1 = "唉，受不了……！"
10035-CVGroup_ExSkill_Level_2-1 = "下，下不為例哦……！？"

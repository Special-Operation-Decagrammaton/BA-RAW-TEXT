[translation]
10035-CVGroup_Battle_Buffed_1-1 = "อ๊ะ คะ... คุณครูจะช่วยงั้นเหรอคะ...?"
10035-CVGroup_Battle_Covered_1-1 = "อ๊ายยยย...!!"
10035-CVGroup_Battle_Defense_1-1 = "ทำไมถึงทำอะไรที่ไร้สาระแบบนี้..."
10035-CVGroup_Battle_In_1-1 = "อ๊ะ...! ระ... รีบๆ จัดการแล้วกลับกันเถอะค่ะ"
10035-CVGroup_Battle_In_2-1 = "ถะ... ถ้างั้น... อะ... ออกเดินทางกันเลย...!"
10035-CVGroup_Battle_Move_1-1 = "ยะ... ยังไม่จบงั้นเหรอคะ...?"
10035-CVGroup_Battle_Move_2-1 = "จะต้องทำแบบนี้ไปถึงเมื่อไหร่กันคะ...?!"
10035-CVGroup_Battle_Recovery_1-1 = "ขะ... ขอบคุณค่ะ..."
10035-CVGroup_Battle_TacticalAction_1-1 = "ฮือออ!"
10035-CVGroup_Battle_Victory_1-1 = "ทุกคนทำได้ดีมากเลยค่ะ..."
10035-CVGroup_Battle_Victory_2-1 = "ทะ... ทำไมจู่ๆ ก็รู้สึกขนลุกซู่... ฮือ..."
10035-CVGroup_CommonSkill-1 = "วะ... เวลาแบบนี้การฮีลใจเป็นเรื่องสำคัญ...!"
10035-CVGroup_ExSkill_1-1 = "อะ... อะไรกันคะ เจ้านี่น่ะ...!"
10035-CVGroup_ExSkill_2-1 = "ทะ... ทำไมถึงเกิดเรื่องแบบนี้..."
10035-CVGroup_ExSkill_3-1 = "อ่า จริงๆ เลย...!"
10035-CVGroup_ExSkill_Level_1-1 = "เฮ้อ จริงๆ เลยเชียว...!"
10035-CVGroup_ExSkill_Level_2-1 = "คะ... แค่ครั้งนี้เท่านั้นนะคะ...!"
10035-CVGroup_ExSkill_Level_3-1 = "ถ้าไม่ใช่คำขอของคุณครูละก็...!"
10035-CVGroup_Formation_In_1-1 = "มะ... มะ... หมายถึงฉันเหรอคะ...? จริงเหรอ...?"
10035-CVGroup_Formation_In_2-1 = "ฮือ... เอาเถอะค่ะ ถ้าคุณครูพูดถึงขนาดนั้นละก็..."
10035-CVGroup_Formation_Select-1 = "ย้าาา..."
10035-CVGroup_Growup_1-1 = "ระ... หรือว่านี่มัน... หมายถึงให้เตรียมตัวไปข้างนอกงั้นเหรอคะ?"
10035-CVGroup_Growup_2-1 = "หะ... ให้สิ่งนี้กับฉันแล้วคิดจะสั่งให้ทำอะไรกันแน่...!"
10035-CVGroup_Growup_3-1 = "ระ...รู้สึกมีแรงจูงใจขึ้นมานิดหน่อย... แต่ก็เหมือนไม่มีเลย... "
10035-CVGroup_Growup_4-1 = "นะ... นี่มันอะไรกันคะ? หะ... หะ... ให้ฉันเหรอ...? "
10035-CVGroup_Relationship_Up_1-1 = "ถ้าเป็นคนอื่น มันคือ 'สิ่งนั้น' ค่ะ...\nแต่ถ้าเป็นคุณครูละก็... ค่ะ มะ...ไม่เป็นไรค่ะ... "
10035-CVGroup_Relationship_Up_2-1 = "เอ่อ ถ้าคุณครูไม่ว่าอะไรละก็...\nปะ... เปล่าค่ะ ไม่ต้องใส่ใจหรอกนะคะ... ขอโทษค่ะ "
10035-CVGroup_Relationship_Up_3-1 = "ขะ... ขอแค่บางครั้งก็ได้... คือว่า...\nไว้คราวหน้า... มาอ่านหนังสือด้วยกันมั้ยคะ?"
10035-CVGroup_Relationship_Up_4-1 = "อะ... อันที่จริงฉันศึกษารสนิยมของคุณครูมาแล้ว...!\nละ...และคิดว่ามันอาจจะถูกต้องก็ได้ ถะ... ถ้าคุณครูสะดวกละก็...!"
10035-CVGroup_Tactic_In_1-1 = "ฮือ... ต้องไปจริงๆ สินะคะ..."
10035-CVGroup_Tactic_In_2-1 = "พะ... เพราะฉันเชื่อมั่นในตัวคุณครูนี่ค่ะ...?!"
10035-CVGroup_Tactic_Victory_1-1 = "ตะ... ตอนนี้กลับกันได้รึยังคะ...?"
10035-CVGroup_Tactic_Victory_2-1 = "จะ... จบแล้ว... เท่านี้ก็พอแล้วใช่มั้ยคะ? จบแล้วจริงๆ ใช่มั้ยคะ?"

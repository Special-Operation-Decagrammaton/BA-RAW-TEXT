[translation]
10047-CVGroup_Battle_Buffed_1-1 = "力量湧出來了～"
10047-CVGroup_Battle_Covered_1-1 = "躲在這裡可以嗎～？"
10047-CVGroup_Battle_Defense_1-1 = "好像，有點癢癢的～"
10047-CVGroup_Battle_In_1-1 = "礙事的東西，要破壞掉哦～"
10047-CVGroup_Battle_In_2-1 = "散步，出發～"
10047-CVGroup_Battle_Move_1-1 = "接下來是哪邊？"
10047-CVGroup_Battle_Move_2-1 = "往這裡走走看吧～"
10047-CVGroup_Battle_Recovery_1-1 = "咦？謝謝～"
10047-CVGroup_Battle_TacticalAction_1-1 = "這邊這邊～"
10047-CVGroup_Battle_Victory_1-1 = "你看你看，老師。\n勝利的姿勢～"
10047-CVGroup_Battle_Victory_2-1 = "夏天版本的勝利姿勢～\n怎麼樣呀？"
10047-CVGroup_CommonSkill-1 = "發射～？"
10047-CVGroup_ExSkill_1-1 = "有好多閃亮～"
10047-CVGroup_ExSkill_2-1 = "來來，前進吧～"
10047-CVGroup_ExSkill_3-1 = "夏天的海，真火熱呢～"
10047-CVGroup_ExSkill_Level_1-1 = "記得是在這附近……發現了。\n蹦～"
10047-CVGroup_ExSkill_Level_2-1 = "應該有帶才對呀～\n啊，找到了。榴彈，發射～"
10047-CVGroup_ExSkill_Level_3-1 = "唔嗯～這個……嗯。\n總之，先發射吧？"
10047-CVGroup_Formation_In_1-1 = "陽光暖洋洋的～"
10047-CVGroup_Formation_In_2-1 = "唔嗯……\n準備，OK？"
10047-CVGroup_Formation_Select-1 = "要去游泳嗎？"
10047-CVGroup_Growup_1-1 = "就像沐浴在夏日陽光時一樣的……"
10047-CVGroup_Growup_2-1 = "嗯，變強了～\n難道說，老師也一起變強了？"
10047-CVGroup_Growup_3-1 = "軟綿綿的，像雲一樣的感覺～"
10047-CVGroup_Growup_4-1 = "下次要成為戰車……\n再下次想成為火箭呢～"
10047-CVGroup_Relationship_Up_1-1 = "跟老師一起變得暖洋洋……\n所謂的幸福，說不定就是這個意思？"
10047-CVGroup_Relationship_Up_2-1 = "老師，你聽你聽～\n我的胸口，在「撲通撲通」地說話。"
10047-CVGroup_Relationship_Up_3-1 = "只要跟老師待在一起，\n就會浮現出各種俳句，很開心。"
10047-CVGroup_Relationship_Up_4-1 = "雖然是充滿閃亮的夏天……\n但最閃亮的，果然……"
10047-CVGroup_Tactic_In_1-1 = "散步散步～\n……咦？不是嗎？"
10047-CVGroup_Tactic_In_2-1 = "尋找閃亮，前進～"
10047-CVGroup_Tactic_Victory_1-1 = "這樣就結束了～\n那回去吧，老師～"
10047-CVGroup_Tactic_Victory_2-1 = "是我們的，勝利？\n那已經，可以去游泳了嗎？"

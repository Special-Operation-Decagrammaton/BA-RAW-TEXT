[translation]
10047-CVGroup_Battle_Buffed_1-1 = "มีแรงขึ้นมาแล้วละ~"
10047-CVGroup_Battle_Covered_1-1 = "หลบตรงนี้ได้มั้ย~?"
10047-CVGroup_Battle_Defense_1-1 = "รู้จักจั๊กจี้จังเลย~"
10047-CVGroup_Battle_In_1-1 = "ฉันจะทำลายสิ่งกีดขวางให้หมดเลย~"
10047-CVGroup_Battle_In_2-1 = "ไปเดินเล่นกัน~"
10047-CVGroup_Battle_Move_1-1 = "ต่อไปคือที่ไหนเหรอ?"
10047-CVGroup_Battle_Move_2-1 = "ลองไปทางนี้ดูดีมั้ย~?"
10047-CVGroup_Battle_Recovery_1-1 = "เอ๋... ขอบคุณนะ~"
10047-CVGroup_Battle_TacticalAction_1-1 = "ทางนี้ ทางนี้~"
10047-CVGroup_Battle_Victory_1-1 = "ดูสิ คุณครู ท่าโพสแห่งชัยชนะ~"
10047-CVGroup_Battle_Victory_2-1 = "ท่าโพสแห่งชัยชนะฉบับฤดูร้อน! เป็นยังไง?"
10047-CVGroup_CommonSkill-1 = "ยิง~?"
10047-CVGroup_ExSkill_1-1 = "มีของระยิบระยับเต็มไปหมดเลย~"
10047-CVGroup_ExSkill_2-1 = "เอาละๆ ไปกันเถอะ~"
10047-CVGroup_ExSkill_3-1 = "ทะเลฤดูร้อน... ฟีเวอร์~"
10047-CVGroup_ExSkill_Level_1-1 = "ฉันจำได้ว่าเจอมัน... แถวๆ นี้นะ ปัง!"
10047-CVGroup_ExSkill_Level_2-1 = "ฉันคิดว่ามีอยู่นะ~\nอ๊ะ นี่ไง ยิง... ระเบิด~"
10047-CVGroup_ExSkill_Level_3-1 = "อืม~ เอ่อ... อื้อ งั้นยิงเลยมั้ย?"
10047-CVGroup_Formation_In_1-1 = "แสงแดดอบอุ่นจัง~"
10047-CVGroup_Formation_In_2-1 = "อื้อ เพราะงั้น... เตรียมพร้อม OK?"
10047-CVGroup_Formation_Select-1 = "จะไปว่ายน้ำเหรอ?"
10047-CVGroup_Growup_1-1 = "รู้สึกเหมือนตอนโดนแสงแดดในฤดูร้อน..."
10047-CVGroup_Growup_2-1 = "อื้อ แข็งแกร่งขึ้นแล้วละ~\nแล้วคุณครูแข็งแกร่งขึ้นด้วยรึเปล่า?"
10047-CVGroup_Growup_3-1 = "เบาและนุ่มฟู~ รู้สึกเหมือนก้อนเมฆเลย~"
10047-CVGroup_Growup_4-1 = "ต่อไปก็รถถัง... แล้วจากนั้นก็เป็นจรวจ~"
10047-CVGroup_Relationship_Up_1-1 = "ได้อบอุ่นร่างกายไปพร้อมๆ กับคุณครู...\nรู้สึกมีความสุข... ละมั้ง?"
10047-CVGroup_Relationship_Up_2-1 = "คุณครู ฟังสิ ลองฟังดูสิ~\nใจเต้นตึกตักเลยละ"
10047-CVGroup_Relationship_Up_3-1 = "เวลาที่อยู่กับคุณครู\nฉันสนุกมากเพราะนึกกลอนไฮกุได้เยอะเลยน่ะ"
10047-CVGroup_Relationship_Up_4-1 = "ถึงเป็นฤดูร้อนที่เต็มไปด้วยประกายระยิบระยับ...\nแต่สิ่งที่เปล่งประกายที่สุดก็คงจะเป็น..."
10047-CVGroup_Tactic_In_1-1 = "เดินเล่น~ เดินเล่น~ เอ๋...? ไม่ใช่งั้นเหรอ?"
10047-CVGroup_Tactic_In_2-1 = "ลุยต่อไป... เพื่อตามหาของที่เป็นประกายระยิบระยับ~"
10047-CVGroup_Tactic_Victory_1-1 = "เท่านี้ก็เรียบร้อย~?\nเอาละ กลับกันเถอะ คุณครู"
10047-CVGroup_Tactic_Victory_2-1 = "เราชนะแล้วเหรอ~?\nงั้นตอนนี้ไปว่ายน้ำได้แล้วใช่มั้ย~?"

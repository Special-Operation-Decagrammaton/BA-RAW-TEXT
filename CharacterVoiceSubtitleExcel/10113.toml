[translation]
10113-CVGroup_Battle_Buffed_1-1 = "감사합니다."
10113-CVGroup_Battle_Covered_1-1 = "안전지대 확보."
10113-CVGroup_Battle_Defense_1-1 = "효과적이지 않았네요."
10113-CVGroup_Battle_In_1-1 = "긴급 상황, 이라는 것으로 하죠."
10113-CVGroup_Battle_In_2-1 = "응급 상황에 복장은 중요하지 않습니다."
10113-CVGroup_Battle_Move_1-1 = "상황 변경. 이동합니다."
10113-CVGroup_Battle_Move_2-1 = "어떤 시체…… 환자가 있을까요."
10113-CVGroup_Battle_Recovery_1-1 = "좋은 치료였습니다."
10113-CVGroup_Battle_TacticalAction_1-1 = "저쪽이군요."
10113-CVGroup_Battle_Victory_1-1 = "상황 종료. 돌아갈까요, 선생님."
10113-CVGroup_Battle_Victory_2-1 = "회수 완료했습니다. 수고하셨습니다."
10113-CVGroup_CommonSkill-1 = "문제없군요. 좋습니다."
10113-CVGroup_ExSkill_1-1 = "바다…… 응? 기다려 주십시오……"
10113-CVGroup_ExSkill_2-1 = "신선하네요…… 어라? 응급 상황이군요……"
10113-CVGroup_ExSkill_3-1 = "좋은 풍경…… 호오? 맡겨 주세요……"
10113-CVGroup_ExSkill_Level_1-1 = "상황 대응, 시작합니다."
10113-CVGroup_ExSkill_Level_2-1 = "걱정하지 마십시오."
10113-CVGroup_ExSkill_Level_3-1 = "시체…… 아니, 부상자네요."
10113-CVGroup_Formation_In_1-1 = "오늘은 비번입니다만, 선생님이라면 괜찮습니다."
10113-CVGroup_Formation_In_2-1 = "부르셨습니까, 선생님? 무슨 일이신가요?"
10113-CVGroup_Formation_Select-1 = "총. 그리고 의료용품. 준비 완료입니다."
10113-CVGroup_Growup_1-1 = "휴식도 사람을 성장시킨다고 하죠. 좋은 사례가 될 것 같습니다."
10113-CVGroup_Growup_2-1 = "감사합니다. 선생님.\n잘 표현하지 못하겠습니다만, 선생님은 저의 소중한 분이십니다."
10113-CVGroup_Growup_3-1 = "더 많은 시체…… 응급 대응을 위해, 나아가도록 하겠습니다."
10113-CVGroup_Growup_4-1 = "저 스스로도, 나아졌다고 생각합니다. 이것도 모두 선생님 덕분입니다."
10113-CVGroup_Relationship_Up_1-1 = "요즘, 선생님은 휴일에 무엇을 하시는지 궁금해지기 시작했습니다.\n그야 물론 저 역시 휴일을 조정하기 위해서죠."
10113-CVGroup_Relationship_Up_2-1 = "이 순간만큼은 저만을 바라보아 주셨으면 합니다.\n네. 저는 지금 사적인 욕심을 부리고 있는 겁니다."
10113-CVGroup_Relationship_Up_3-1 = "느낌일 뿐입니다만, 선생님을 자주 만나지 못한 것 같습니다.\n마침 잘 되었으니 시간 약속을 잡으실까요?"
10113-CVGroup_Relationship_Up_4-1 = "선생님과 만난 것만으로, 이미 소기의 목적을 달성한 것 같습니다.\n이참에 미래의 계획을 함께 설계해 보는 것은 어떻겠습니까?"
10113-CVGroup_Tactic_In_1-1 = "그러고 보니 선생님은 휴일에 무엇을 하시나요?"
10113-CVGroup_Tactic_In_2-1 = "휴일이라도 마음의 준비는 하고 있습니다."
10113-CVGroup_Tactic_Victory_1-1 = "무사히 끝났군요. 좋은 일입니다."
10113-CVGroup_Tactic_Victory_2-1 = "남은 시간을 함께 즐기는 건 어떠십니까?"

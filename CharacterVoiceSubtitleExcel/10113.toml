[translation]
10113-CVGroup_Battle_Buffed_1-1 = "ขอบคุณค่ะ"
10113-CVGroup_Battle_Covered_1-1 = "ยืนยันพื้นที่ปลอดภัย"
10113-CVGroup_Battle_Defense_1-1 = "ไม่ได้ผลสินะคะ"
10113-CVGroup_Battle_In_1-1 = "เรียกได้ว่าเป็นสถานการณ์ฉุกเฉินเลยละค่ะ"
10113-CVGroup_Battle_In_2-1 = "ในสถานการณ์ฉุกเฉิน เรื่องการแต่งกายก็ไม่ใช่เรื่องสำคัญหรอกค่ะ"
10113-CVGroup_Battle_Move_1-1 = "จะไปควบคุมสถานการณ์แล้วค่ะ"
10113-CVGroup_Battle_Move_2-1 = "จะมีศพ... มีผู้บาดเจ็บแบบไหนกันนะคะ"
10113-CVGroup_Battle_Recovery_1-1 = "รักษาได้ดีค่ะ"
10113-CVGroup_Battle_TacticalAction_1-1 = "อยู่ด้านโน้นสินะคะ"
10113-CVGroup_Battle_Victory_1-1 = "จัดการสถานการณ์เรียบร้อย กลับกันเลยมั้ยคะ คุณครู"
10113-CVGroup_Battle_Victory_2-1 = "จัดการเรียบร้อยแล้วค่ะ ขอบคุณที่ทำงานหนักนะคะ"
10113-CVGroup_CommonSkill-1 = "ไม่มีปัญหาสินะคะ ก็ดีค่ะ"
10113-CVGroup_ExSkill_1-1 = "ทะเล... หืม? รอสักครู่นะคะ..."
10113-CVGroup_ExSkill_2-1 = "เย็นสบายจังเลยค่ะ...\nเอ๋? สถานการณ์ฉุกเฉินสินะคะ..."
10113-CVGroup_ExSkill_3-1 = "วิวดีจัง... โฮ่...? ให้ฉันจัดการเองค่ะ..."
10113-CVGroup_ExSkill_Level_1-1 = "เริ่มจัดการสถานการณ์ค่ะ"
10113-CVGroup_ExSkill_Level_2-1 = "ไม่ต้องห่วงนะคะ"
10113-CVGroup_ExSkill_Level_3-1 = "ศพ... ไม่สิ ผู้บาดเจ็บสินะคะ"
10113-CVGroup_Formation_In_1-1 = "วันนี้ฉันเข้าเวรตัวแทนค่ะ ถ้าเป็นคุณครูคงไม่เป็นไรแน่ค่ะ"
10113-CVGroup_Formation_In_2-1 = "เรียกฉันเหรอคะคุณครู? มีเรื่องอะไรเหรอคะ?"
10113-CVGroup_Formation_Select-1 = "เตรียมปืนและเวชภัณฑ์เรียบร้อยแล้วค่ะ"
10113-CVGroup_Growup_1-1 = "การพักผ่อนช่วยให้เราเติบโตได้นะคะ\nจะต้องมีอะไรดีๆ รออยู่แน่นอนค่ะ"
10113-CVGroup_Growup_2-1 = "ขอบคุณค่ะคุณครู\nฉันไม่รู้ว่าสื่อสารออกไปได้ดีแล้วรึเปล่า แต่คุณครูสำคัญสำหรับฉันค่ะ"
10113-CVGroup_Growup_3-1 = "ฉันจะเตรียมตัวออกไปช่วยเหลือฉุกเฉินกับศพต่อไปค่ะ..."
10113-CVGroup_Growup_4-1 = "ฉันคิดว่าตัวเองพัฒนาขึ้นมากเลยค่ะ\nทุกอย่างต้องขอบคุณคุณครูเลยนะคะ"
10113-CVGroup_Relationship_Up_1-1 = "ฉันชักเริ่มสงสัยแล้วละค่ะว่าคุณครูทำอะไรในช่วงวันหยุด\nที่อยากรู้ก็เพราะจะปรับวันหยุดของตัวเองค่ะ"
10113-CVGroup_Relationship_Up_2-1 = "ในช่วงเวลาแบบนี้ช่วยมองแค่ฉันด้วยนะคะ\nค่ะ ตอนนี้ฉันกำลังงอแงอยู่ค่ะ"
10113-CVGroup_Relationship_Up_3-1 = "ถึงจะเป็นแค่ความรู้สึกของฉัน...\nแต่รู้สึกว่าไม่ค่อยได้เจอคุณครูเลยค่ะ\nนี่ก็ผ่านไปหลายวันแล้ว เรามานัดเจอกันดีมั้ยคะ?"
10113-CVGroup_Relationship_Up_4-1 = "แค่ได้เจอกับคุณครูก็เหมือนทำเป้าหมายสำเร็จแล้วค่ะ\nเรามาใช้ช่วงเวลานี้วางแผนอนาคตร่วมกันดีมั้ยคะ?"
10113-CVGroup_Tactic_In_1-1 = "จะว่าไปแล้ว คุณครูทำอะไรในวันหยุดเหรอคะ?"
10113-CVGroup_Tactic_In_2-1 = "ถึงจะเป็นวันหยุดแต่ก็ต้องเตรียมใจให้พร้อมค่ะ"
10113-CVGroup_Tactic_Victory_1-1 = "ผ่านไปได้ด้วยดีสินะคะ ดีแล้วค่ะ"
10113-CVGroup_Tactic_Victory_2-1 = "ลองใช้เวลาที่เหลือเพลิดเพลินไปด้วยกันดีมั้ยคะ?"

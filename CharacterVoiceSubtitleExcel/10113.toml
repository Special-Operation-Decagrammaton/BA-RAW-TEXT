[translation]
10113-CVGroup_Battle_Buffed_1-1 = "非常感謝。"
10113-CVGroup_Battle_Covered_1-1 = "安全，確保。"
10113-CVGroup_Battle_Defense_1-1 = "沒有效果哦。"
10113-CVGroup_Battle_In_1-1 = "有緊急狀況對吧。"
10113-CVGroup_Battle_In_2-1 = "我已經聽說是緊急狀況，請別在意服裝。"
10113-CVGroup_Battle_Move_1-1 = "處置變更。開始行動。"
10113-CVGroup_Battle_Move_2-1 = "會有什麼樣的屍……傷患呢。"
10113-CVGroup_Battle_Recovery_1-1 = "感謝你適當的處置。"
10113-CVGroup_Battle_TacticalAction_1-1 = "那邊對吧。"
10113-CVGroup_Battle_Victory_1-1 = "應對完畢。\n回去吧，老師。"
10113-CVGroup_Battle_Victory_2-1 = "回收完成。辛苦了。"
10113-CVGroup_CommonSkill-1 = "沒有異常。真好呢。"
10113-CVGroup_ExSkill_1-1 = "海浪……哎呀？\n請稍等一下。"
10113-CVGroup_ExSkill_2-1 = "真舒服呢……哎呀。\n是緊急情況。"
10113-CVGroup_ExSkill_3-1 = "真是漂亮的景色……嗯？\n請包在我身上。"
10113-CVGroup_ExSkill_Level_1-1 = "應對，開始。"
10113-CVGroup_ExSkill_Level_2-1 = "不必擔心。"
10113-CVGroup_ExSkill_Level_3-1 = "是屍體……更正，是傷患呢。"
10113-CVGroup_Formation_In_1-1 = "今天雖然是休假……但既然是老師找我的話。"
10113-CVGroup_Formation_In_2-1 = "怎麼了嗎，老師？"
10113-CVGroup_Formation_Select-1 = "槍隻、醫療用品。\n已準備完畢。"
10113-CVGroup_Growup_1-1 = "有句話說「休息能使人成長」。\n這是個好例子呢。"
10113-CVGroup_Growup_2-1 = "謝謝你，老師。\n雖然我不太會表達……但老師是很重要的人。"
10113-CVGroup_Growup_3-1 = "為了救助更多屍……更多傷患，我會繼續精進。"
10113-CVGroup_Growup_4-1 = "連我自己也感覺有所成長。\n這全都是託老師的福。"
10113-CVGroup_Relationship_Up_1-1 = "最近，我開始好奇老師假日都在做什麼了。\n沒錯，因為我想把假日調整到一起。"
10113-CVGroup_Relationship_Up_2-1 = "希望你現在能只看著我。\n怎麼說呢……可以說是夾帶了私情沒錯。"
10113-CVGroup_Relationship_Up_3-1 = "雖然這可能是錯覺，但最近我總覺得很少見到老師。\n如果方便的話，你待會有空嗎？"
10113-CVGroup_Relationship_Up_4-1 = "光是能見到老師，今天的目的就已經達成了。\n可以的話，要不要討論一下往後的計畫呢？"
10113-CVGroup_Tactic_In_1-1 = "之後請告訴我老師度過假日的方式。"
10113-CVGroup_Tactic_In_2-1 = "沒錯，我已經做好了準備。請不必擔心。"
10113-CVGroup_Tactic_Victory_1-1 = "能順利結束真是太好了。"
10113-CVGroup_Tactic_Victory_2-1 = "不介意的話，要不要一起度過剩下的時間呢？"

[translation]
10131-CVGroup_Battle_Buffed_1-1 = "您的厚意，令我不勝感激。"
10131-CVGroup_Battle_Covered_1-1 = "有時放下筆也是很重要的。"
10131-CVGroup_Battle_Defense_1-1 = "只有這種程度嗎？"
10131-CVGroup_Battle_In_1-1 = "視線朝前，步伐要堂堂正正。\n姿態正是展現品格之處啊。"
10131-CVGroup_Battle_In_2-1 = "好的開始，將會迎來好的結局。\n就如同故事一般。"
10131-CVGroup_Battle_Move_1-1 = "結束也意味著新的開始。"
10131-CVGroup_Battle_Move_2-1 = "進入下一個段落吧。"
10131-CVGroup_Battle_Recovery_1-1 = "感謝您。"
10131-CVGroup_Battle_TacticalAction_1-1 = "是那邊嗎……？"
10131-CVGroup_Battle_Victory_1-1 = "呼……五星……至少四星評價是沒問題了呢。"
10131-CVGroup_Battle_Victory_2-1 = "向盡了最大努力的各位，獻上讚詞與榮光。"
10131-CVGroup_CommonSkill-1 = "請用這個吧。"
10131-CVGroup_ExSkill_1-1 = "真是的……！\n請小心一點！"
10131-CVGroup_ExSkill_2-1 = "無論何時都不忘保有餘裕。"
10131-CVGroup_ExSkill_3-1 = "將氣度放在心中。\n向前邁進吧。"
10131-CVGroup_ExSkill_Level_1-1 = "來，請收下這個。"
10131-CVGroup_ExSkill_Level_2-1 = "不還給我也沒關係。"
10131-CVGroup_ExSkill_Level_3-1 = "下次請多加注意哦。"
10131-CVGroup_Formation_In_1-1 = "所謂評論──即是洞悉文章本質的行為。"
10131-CVGroup_Formation_In_2-1 = "凡是我能做到的事，還請儘管吩咐。"
10131-CVGroup_Formation_Select-1 = "呀啊……！？\n啊啊，真是的……！\n稍後能和您談一談嗎？"
10131-CVGroup_Growup_1-1 = "人類，是為了更好的明天而持續前行的存在。\n我之所以日日不懈鑽研、反思自身的理由……正是因為如此。"
10131-CVGroup_Growup_2-1 = "只要可能性尚存，就不該停下腳步。\n來，請把手交給我，老師。讓我們一同前進吧。"
10131-CVGroup_Growup_3-1 = "意外地，能真正熟知自己的人並不多。\n就連身為評論家的我也……\n然而，藉由認識自己，才能再次邁出嶄新的一步。\n成長便是在其中孕育而生的。"
10131-CVGroup_Growup_4-1 = "命運的對象……雖然是個略顯俗套且被一用再用的陳詞濫調。\n有時也會出現想要依靠那句話的時候呢。\n呵呵，那想必是為了讓我們能繼續向前邁進的指標吧。"
10131-CVGroup_Relationship_Up_1-1 = "突然想到……\n我，雖然經常像這樣撰寫評論，不過幾乎沒有人會對我的評論提出講評。\n沒錯，就是這樣。\n那個……如果是老師的話，我相信一定能寫出非常精彩的講評。"
10131-CVGroup_Relationship_Up_2-1 = "見過眾多事物之後，反而很難找到能打從心底喜歡的東西。\n不過……凡事果然總有例外。至於那個例外……是祕密。\n沒錯，現在……還是。"
10131-CVGroup_Relationship_Up_3-1 = "沒有什麼事情，是比遇見一則出色的故事更令人心情雀躍的了。至少對我來說是如此。\n並且對我而言，出色的人……就和故事是一樣的。\n不太明白是什麼意思？\n呵呵……現在這樣就夠了。"
10131-CVGroup_Relationship_Up_4-1 = "有時，我會思考「如果沒有遇見老師」這樣的假設。\n那想必會是一段灰色……並且毫無起伏的故事吧。\n問我是什麼意思，是嗎？呵呵……沒有什麼特別的意思哦。\n……也許，大概。"
10131-CVGroup_Tactic_In_1-1 = "那麼，讓我們邁開步伐吧。"
10131-CVGroup_Tactic_In_2-1 = "貴安，各位。"
10131-CVGroup_Tactic_Victory_1-1 = "是則值得評論的故事呢。"
10131-CVGroup_Tactic_Victory_2-1 = "圓滿的結局……雖然有些老套，不過唯有眾人渴望的東西才足以被稱為名作哦。"

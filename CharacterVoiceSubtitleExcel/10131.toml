[translation]
10131-CVGroup_Battle_Buffed_1-1 = "친절에 감사드립니다."
10131-CVGroup_Battle_Covered_1-1 = "몸을 피해야겠어요."
10131-CVGroup_Battle_Defense_1-1 = "그 정도인가요?"
10131-CVGroup_Battle_In_1-1 = "시선을 앞으로, 걸음은 당당하게.\n자세에서 인품이 드러나는 법이니까요."
10131-CVGroup_Battle_In_2-1 = "좋은 시작이 좋은 끝을 맺는 법이죠.\n이야기가 그런 것처럼요."
10131-CVGroup_Battle_Move_1-1 = "끝은 곧 새로운 시작."
10131-CVGroup_Battle_Move_2-1 = "단락이 끝나면, 문장이 이어지죠."
10131-CVGroup_Battle_Recovery_1-1 = "감사드려요."
10131-CVGroup_Battle_TacticalAction_1-1 = "저쪽인가요?"
10131-CVGroup_Battle_Victory_1-1 = "별점 5점에…… 최소 4점인 결말이었네요."
10131-CVGroup_Battle_Victory_2-1 = "최선을 다한 여러분께, 찬사와 영광을."
10131-CVGroup_CommonSkill-1 = "자, 드리겠어요."
10131-CVGroup_ExSkill_1-1 = "정말……! 조심하셔야죠!"
10131-CVGroup_ExSkill_2-1 = "잊지 마세요. 항상, 우아하게!"
10131-CVGroup_ExSkill_3-1 = "괜찮은 거죠? 언제나, 품위 있게!"
10131-CVGroup_ExSkill_Level_1-1 = "이걸 쓰세요."
10131-CVGroup_ExSkill_Level_2-1 = "돌려주지 않아도 돼요."
10131-CVGroup_ExSkill_Level_3-1 = "다음에는 조심하세요."
10131-CVGroup_Formation_In_1-1 = "평론이란, 글의 본질을 꿰뚫어 보는 행위죠."
10131-CVGroup_Formation_In_2-1 = "네. 제가 도울 수 있는 것이라면, 무엇이든지."
10131-CVGroup_Formation_Select-1 = "꺄앗?! 정말…….\n나중에 제대로 책임져 주세요?"
10131-CVGroup_Growup_1-1 = "인간이란 모름지기 더 나은 내일을 향해 나아가는 자.\n정진을 잊지 말아야 하는 이유와. 자신을 돌아봐야 하는 이유죠."
10131-CVGroup_Growup_2-1 = "가능성이 남아 있는 한, 발걸음을 멈추어서는 안 되죠.\n자, 손을 주세요. 선생님. 함께 나아가도록 해요."
10131-CVGroup_Growup_3-1 = "사람은 스스로에 대해 잘 알아야 해요. 평론가라고 해서 예외는 아니죠.\n그렇게 해야만, 더 성장할 수 있으니까요.\n바로, 지금처럼요."
10131-CVGroup_Growup_4-1 = "운명의 상대라는 표현은 조금 오래된 개념이겠지만.\n지금은 그 개념에 기대어 보고 싶네요.\n그건 분명, 우리 모두를 나아가게 하는 존재일 테니까요."
10131-CVGroup_Relationship_Up_1-1 = "갑자기, 이런 생각을 해 봤어요. 다른 대상…… 타인을 평론하는 것에는 익숙해져 있지만.\n저 자신에 대한 평론을 듣는 것은, 매우 신선할 것 같다고요.\n그러니까…… 선생님? 선생님이시라면…… 괜찮은데요……?"
10131-CVGroup_Relationship_Up_2-1 = "사실 살다 보면 완전히 마음에 쏙 드는 건, 찾기 힘들다는 생각이 들곤 하죠.\n하지만 역시…… 예외는 있는 것 같네요. 그게 무엇인지는……\n비밀로 하겠습니다. 네. 지금은요."
10131-CVGroup_Relationship_Up_3-1 = "좋은 이야기를 찾았을 때만큼 흥분되는 경우는 별로 없는 것 같아요.\n저에게는 말이죠. 그리고 저에게 있어 좋은 사람은…… 좋은 이야기와 같고요.\n무슨 말인지 잘 모르시겠다고요? 후후…… 다행이네요. 지금은요."
10131-CVGroup_Relationship_Up_4-1 = "가끔 선생님과 만나지 못한 저에 대해 생각해 봐요.\n그건 정말 잿빛과도 같은…… 굴곡 없는 이야기였을지도 모르죠.\n무슨 뜻이냐고요? 후후. 아무 의미도 없어요.\n어쩌면요."
10131-CVGroup_Tactic_In_1-1 = "한 걸음, 시작해 보죠."
10131-CVGroup_Tactic_In_2-1 = "모두, 안녕하신가요?"
10131-CVGroup_Tactic_Victory_1-1 = "평론할 거리가 있는 이야기였어요."
10131-CVGroup_Tactic_Victory_2-1 = "해피 엔딩, 진부하지만 좋은 마무리죠."

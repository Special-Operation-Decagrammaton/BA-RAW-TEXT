[translation]
10131-CVGroup_Battle_Buffed_1-1 = "Thank you for your hospitality."
10131-CVGroup_Battle_Covered_1-1 = "I should hide."
10131-CVGroup_Battle_Defense_1-1 = "Is that it?"
10131-CVGroup_Battle_In_1-1 = "Keep your eyes forward and walk with confidence. Posture reveals a lot about a person."
10131-CVGroup_Battle_In_2-1 = "A good beginning makes a good ending. Just like in a story."
10131-CVGroup_Battle_Move_1-1 = "The end is the new beginning."
10131-CVGroup_Battle_Move_2-1 = "When a paragraph ends, a sentence continues."
10131-CVGroup_Battle_Recovery_1-1 = "Thank you."
10131-CVGroup_Battle_TacticalAction_1-1 = "Is it that way?"
10131-CVGroup_Battle_Victory_1-1 = "It was an ending befitting of...at least 4 out of 5 stars."
10131-CVGroup_Battle_Victory_2-1 = "Praise and glory to everyone for their hard work."
10131-CVGroup_CommonSkill-1 = "Here you go."
10131-CVGroup_ExSkill_1-1 = "Seriously...! Be careful!"
10131-CVGroup_ExSkill_2-1 = "Don't forget. Always remain elegant!"
10131-CVGroup_ExSkill_3-1 = "Are you okay? Always remain classy!"
10131-CVGroup_ExSkill_Level_1-1 = "Use this."
10131-CVGroup_ExSkill_Level_2-1 = "No need to return it."
10131-CVGroup_ExSkill_Level_3-1 = "Be careful next time."
10131-CVGroup_Formation_In_1-1 = "Critique is an act of focusing on the essence of writing."
10131-CVGroup_Formation_In_2-1 = "Yes. I'll help however I can."
10131-CVGroup_Formation_Select-1 = "Kyah?! Seriously... You'll make up for this later, okay?"
10131-CVGroup_Growup_1-1 = "Humans have always marched forward for a greater tomorrow. That's the reason why we must reflect on ourselves and never halt our efforts."
10131-CVGroup_Growup_2-1 = "As long as there is a chance, we must not stop. Now, give me your hand, Sensei. Let us venture forward together."
10131-CVGroup_Growup_3-1 = "One must know oneself. Critics are no exception. That's the only way we can grow, just as we're doing now."
10131-CVGroup_Growup_4-1 = "The concept of \"soulmates\" is a tad outdated. But for now, I'd like to lean into the concept. I think faith in it drives us forward."
10131-CVGroup_Relationship_Up_1-1 = "I have come to realize... I'm accustomed to critiquing...other people. But it'd be a fresh experience to hear a critique of myself. So...Sensei? I'm willing...if it's you, Sensei...."
10131-CVGroup_Relationship_Up_2-1 = "Throughout life, we find it difficult to find something that completely suits our tastes. Nevertheless... It seems there is an exception. And, as of what that is... I'll keep it a secret. Yes. For now."
10131-CVGroup_Relationship_Up_3-1 = "There are few things that excite me as much as finding a good story. Personally. And to me, a good person is...just like a good story. You don't understand what I'm saying? Fufu... That's reassuring. For now."
10131-CVGroup_Relationship_Up_4-1 = "Sometimes, I consider a version of myself who never met you. That would be such a gray...trite story. What do I mean? Fufu. It's a meaningless thought. Perhaps."
10131-CVGroup_Tactic_In_1-1 = "Let's take the first step."
10131-CVGroup_Tactic_In_2-1 = "How is everyone doing?"
10131-CVGroup_Tactic_Victory_1-1 = "This is a story worth critiquing."
10131-CVGroup_Tactic_Victory_2-1 = "A happy ending. While cliche, it's a satisfying conclusion."

[translation]
10000-CVGroup_Battle_Buffed_1-1 = "這就是權力唷！"
10000-CVGroup_Battle_Covered_1-1 = "確保攻擊位置。"
10000-CVGroup_Battle_Defense_1-1 = "呵呵呵，真可惜啊。"
10000-CVGroup_Battle_In_1-1 = "來吧，我的職員們。工作時間到囉。"
10000-CVGroup_Battle_In_2-1 = "開始執行委託！"
10000-CVGroup_Battle_Move_1-1 = "怎麼樣，看到了吧？\n我有確實執行委託。"
10000-CVGroup_Battle_Move_2-1 = "來，要移動了哦。"
10000-CVGroup_Battle_Recovery_1-1 = "呵呵，這就是所謂VIP的招待吧。"
10000-CVGroup_Battle_TacticalAction_1-1 = "要移動囉。"
10000-CVGroup_Battle_Victory_1-1 = "只要交給便利屋，就會很完美的。"
10000-CVGroup_Battle_Victory_2-1 = "呵呵！委託解決囉！"
10000-CVGroup_CommonSkill-1 = "好好覺悟吧？"
10000-CVGroup_ExSkill_1-1 = "哼～發現目標。"
10000-CVGroup_ExSkill_2-1 = "只用單手也能擊中。"
10000-CVGroup_ExSkill_3-1 = "一擊就足夠了。"
10000-CVGroup_ExSkill_Level_1-1 = "我要擊垮你。"
10000-CVGroup_ExSkill_Level_2-1 = "啊哈哈！命中囉！"
10000-CVGroup_ExSkill_Level_3-1 = "怎麼樣？很帥對吧？"
10000-CVGroup_Formation_In_1-1 = "呵呵呵，真是個出色的選擇。"
10000-CVGroup_Formation_In_2-1 = "交給我吧！"
10000-CVGroup_Formation_Select-1 = "呵呵，那麼想要的話，幫幫你也可以哦。"
10000-CVGroup_Growup_1-1 = "真不愧是我啊。"
10000-CVGroup_Growup_2-1 = "呵呵呵，你可要看仔細囉──看著今後的我！"
10000-CVGroup_Growup_3-1 = "我真正的價值，好好看清楚吧！"
10000-CVGroup_Growup_4-1 = "呵呵呵呵。又變得更強了。"
10000-CVGroup_Relationship_Up_1-1 = "呵呵，老師你運氣真好呢。\n別看我這樣，我可是很不得了的！"
10000-CVGroup_Relationship_Up_2-1 = "與顧客如此接近……\n不，不是的！老師是常客所以沒關係！"
10000-CVGroup_Relationship_Up_3-1 = "如果是老師的委託……\n無論什麼……都，都會幫你完成！"
10000-CVGroup_Relationship_Up_4-1 = "謝謝你，老師。\n多虧了老師，我才能真正成為優秀的我。"
10000-CVGroup_Tactic_In_1-1 = "率領企業與小隊，可是我的專長唷。"
10000-CVGroup_Tactic_In_2-1 = "隊長！真是與身為社長的我相稱的職位呢！"
10000-CVGroup_Tactic_Victory_1-1 = "呵呵，這種小事很簡單的唷。"
10000-CVGroup_Tactic_Victory_2-1 = "怎麼樣呢，老師？\n所謂格局不同就是這個意思。"

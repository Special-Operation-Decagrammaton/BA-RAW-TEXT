[translation]
20004-CVGroup_CommonSkill-1 = "請用，這是中暑的對策。"
20004-CVGroup_ExSkill_1-1 = "連休息的時間都沒有呢……"
20004-CVGroup_ExSkill_2-1 = "難得的休息，本來還很期待的……"
20004-CVGroup_ExSkill_3-1 = "有準備飲料真是太好了。"
20004-CVGroup_ExSkill_Level_1-1 = "碳酸飲料喝太多可不行唷。"
20004-CVGroup_ExSkill_Level_2-1 = "碳酸浴怎麼樣啊？"
20004-CVGroup_ExSkill_Level_3-1 = "將所有罪惡盡數洗淨。"
20004-CVGroup_Formation_In_1-1 = "又發生什麼事件了嗎？"
20004-CVGroup_Formation_In_2-1 = "即使是渡假勝地也不能掉以輕心。"
20004-CVGroup_Growup_1-1 = "任務與休息都會認真執行。"
20004-CVGroup_Growup_2-1 = "果然由老師來教的話，很容易理解呢。"
20004-CVGroup_Growup_3-1 = "這次也是相當充實的訓練。"
20004-CVGroup_Growup_4-1 = "這就是正義的力量……"
20004-CVGroup_Relationship_Up_1-1 = "只要跟老師在一起，就連這麼強烈的陽光也能舒服地感受呢。"
20004-CVGroup_Relationship_Up_2-1 = "漂亮的海邊……能帶我到這樣的地方，真的非常感謝。\n果然老師是個正義的人呢。"
20004-CVGroup_Relationship_Up_3-1 = "老師，要不要再去之前的海邊玩呢？\n正，正義有時候也是需要休息的！"
20004-CVGroup_Relationship_Up_4-1 = "老師。呃，那個……\n冰，冰棒……要一起吃嗎？"

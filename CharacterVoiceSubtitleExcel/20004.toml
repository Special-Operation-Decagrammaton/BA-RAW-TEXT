[translation]
20004-CVGroup_CommonSkill-1 = "Now for some heat stroke preventatives."
20004-CVGroup_ExSkill_1-1 = "Not a single moment of rest to be had."
20004-CVGroup_ExSkill_2-1 = "And here I was looking forward to some time off..."
20004-CVGroup_ExSkill_3-1 = "I'm glad I thought ahead and brought plenty of drinks."
20004-CVGroup_ExSkill_Level_1-1 = "One shouldn't drink too much sparkling water."
20004-CVGroup_ExSkill_Level_2-1 = "What would you think of showering in sparkling water?"
20004-CVGroup_ExSkill_Level_3-1 = "I will wash away all evil."
20004-CVGroup_Formation_In_1-1 = "Another incident?"
20004-CVGroup_Formation_In_2-1 = "Never let your guard down, not even on vacation."
20004-CVGroup_Growup_1-1 = "Whether it's for duty or for fun, I'll do it the proper way."
20004-CVGroup_Growup_2-1 = "Your lessons are always easy to understand."
20004-CVGroup_Growup_3-1 = "Another fruitful bout of training."
20004-CVGroup_Growup_4-1 = "So this is the power of justice..."
20004-CVGroup_Relationship_Up_1-1 = "When I'm with you, even the blazing heat feels oddly pleasant."
20004-CVGroup_Relationship_Up_2-1 = "What a beautiful beach... Thank you for bringing me here, Sensei. It's just as I thought... You truly understand justice."
20004-CVGroup_Relationship_Up_3-1 = "Sensei, why don't we play on the beach over there? E-Even justice needs time to recuperate!"
20004-CVGroup_Relationship_Up_4-1 = "Sensei, um... W-Would you like to have some ice cream...with me?"

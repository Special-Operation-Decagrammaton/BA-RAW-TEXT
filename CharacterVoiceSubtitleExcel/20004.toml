[translation]
20004-CVGroup_CommonSkill-1 = "자, 열사병 대책입니다."
20004-CVGroup_ExSkill_1-1 = "조금도 쉴 틈이 없군요."
20004-CVGroup_ExSkill_2-1 = "모처럼의 휴식을 기대했는데……."
20004-CVGroup_ExSkill_3-1 = "미리 음료수를 챙겨오길 잘했군요."
20004-CVGroup_ExSkill_Level_1-1 = "탄산음료의 과음은 금물입니다."
20004-CVGroup_ExSkill_Level_2-1 = "탄산 샤워는 어떠십니까?"
20004-CVGroup_ExSkill_Level_3-1 = "악은 모두 씻어내겠습니다."
20004-CVGroup_Formation_In_1-1 = "또 사건입니까?"
20004-CVGroup_Formation_In_2-1 = "휴양지에서도 방심은 금물입니다."
20004-CVGroup_Formation_Select-1 = "선생님도 한 모금 하시겠습니까?"
20004-CVGroup_Growup_1-1 = "임무도, 휴식도, 제대로 하겠습니다."
20004-CVGroup_Growup_2-1 = "역시 선생님의 가르침은 알기 쉽군요."
20004-CVGroup_Growup_3-1 = "이번에도 알찬 훈련이었습니다."
20004-CVGroup_Growup_4-1 = "이것이, 정의의 힘…."
20004-CVGroup_Relationship_Up_1-1 = "선생님과 함께 있으니 이런 뙤약볕도 기분 좋게 느껴지네요."
20004-CVGroup_Relationship_Up_2-1 = "멋진 해변이네요…. 이런 곳에 데려와 주셔서 감사합니다.\n역시 선생님은, 정의를 아시는 분이시군요."
20004-CVGroup_Relationship_Up_3-1 = "선생님, 또 이 앞의 해변에 놀러 가지 않으시겠습니까?\n저, 정의에도 가끔은 휴식이 필요하니까요!"
20004-CVGroup_Relationship_Up_4-1 = "선생님. 그게, 그러니까…… 아, 아이스 캔디…… 함께 드시겠습니까?"

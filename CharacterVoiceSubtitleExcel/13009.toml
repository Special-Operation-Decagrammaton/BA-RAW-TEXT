13009-CVGroup_Battle_In_2-1 = "내가 앞에 설게."
13009-CVGroup_Battle_Move_1-1 = "이곳은 이제 안전해."
13009-CVGroup_Battle_Move_2-1 = "빨리 끝내고 자고 싶어~"
13009-CVGroup_Battle_Recovery_1-1 = "고~ 마~ 워~"
13009-CVGroup_Battle_TacticalAction_1-1 = "잠깐 자리 좀 바꿀게."
13009-CVGroup_Battle_Victory_1-1 = "후- 하아… 도움이 돼서 다행이야."
13009-CVGroup_Battle_Victory_2-1 = "후- 하아… 이제 안심하고 잘 수 있겠네."
13009-CVGroup_CommonSkill-1 = "상처? 자고 일어나면 나을 거야."
13009-CVGroup_ExSkill_1-1 = "영차, 그럼 갈까~"
13009-CVGroup_ExSkill_2-1 = "지켜야만 하는 게 있어!"
13009-CVGroup_ExSkill_3-1 = "자아~ 수행의 성과를 보여줄게!"
13009-CVGroup_ExSkill_Level_1-1 = "아무도 나의 낮잠은……. 아니, 선생님을 방해할 수 없어."
13009-CVGroup_ExSkill_Level_2-1 = "내가 앞장 설게. 가자!"
13009-CVGroup_ExSkill_Level_3-1 = "아프지 않아~ 아프지 않아~"
13009-CVGroup_Formation_In_1-1 = "알았어……. 지금 일어날 테니까."
13009-CVGroup_Formation_In_2-1 = "하암. 그럼 다녀와서 마저 잘게."
13009-CVGroup_Formation_Select-1 = "흐음. 의외로 쾌적한데?"
13009-CVGroup_Growup_1-1 = "으음? 잠을 잘 자서 그런가. 왠지 성장, 한 느낌이네."
13009-CVGroup_Growup_2-1 = "역시…… 선생님과 있을 때는……. 기운이 나."
13009-CVGroup_Growup_3-1 = "지금이라면……. 동면도 가능할 것 같아."
13009-CVGroup_Growup_4-1 = "꿈을 꾸는 것도 좋지만……. 앞으로는 선생님과, 꿈을 이루고 싶어."
13009-CVGroup_Relationship_Up_1-1 = "따뜻한 햇살, 푹신푹신한 베개, 부드러운 이불.\n그리고……. 선생님. \n……좋네."
13009-CVGroup_Relationship_Up_2-1 = "세상에서 제일 싫은 거? 자명종이야. \n하지만…… 선생님의 목소리는 싫지 않아."
13009-CVGroup_Relationship_Up_3-1 = "나, 나도 일단 진심을 낼 때가 있어…….\n싸울 때랑……. 선생님과 같이 있을 때."
13009-CVGroup_Relationship_Up_4-1 = "행복하지만 무서워. 지금 이 순간이, 꿈처럼 깨어버릴 것 같아서……."
13009-CVGroup_Tactic_In_1-1 = "하암…... 저 애들은 잠도 안 자는걸까."
13009-CVGroup_Tactic_In_2-1 = "으응. 출바알……. 힘내……. 어? 나도 가는거야?"
13009-CVGroup_Tactic_Victory_1-1 = "수고했어. 선생님. 이제 자도 돼?"
13009-CVGroup_Tactic_Victory_2-1 = "하암…… 끝났다. 끝났어~ 안녕히 주무세요.♬"

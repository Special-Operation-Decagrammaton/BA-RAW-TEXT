13009-CVGroup_Battle_Recovery_1-1 = "Th-ank you!"
13009-CVGroup_Battle_TacticalAction_1-1 = "I'm switching places for a second."
13009-CVGroup_Battle_Victory_1-1 = "Phew. *sigh* I'm glad to be of help."
13009-CVGroup_Battle_Victory_2-1 = "Phew. *sigh* I can sleep at ease now."

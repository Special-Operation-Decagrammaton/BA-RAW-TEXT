13009-CVGroup_ExSkill_2-1 = "There's something I must protect!"
13009-CVGroup_ExSkill_3-1 = "Now I'll show you the results of my training!"
13009-CVGroup_ExSkill_Level_1-1 = "No one can get in the way of my naps. ...I mean Sensei."

13009-CVGroup_Battle_Move_1-1 = "ตอนนี้ที่นี่ปลอดภัยแล้วละ"
13009-CVGroup_Battle_Move_2-1 = "อยากรีบทำให้เสร็จแล้วไปนอนจัง~"
13009-CVGroup_Battle_Recovery_1-1 = "ขอบ~ คุณ~ นะ~"
13009-CVGroup_Battle_TacticalAction_1-1 = "ขอเปลี่ยนที่แป๊บหนึ่งนะ"
13009-CVGroup_Battle_Victory_1-1 = "ฮู่ว ฮ้าวว... โล่งอกไปทีนะที่ช่วยได้"
13009-CVGroup_Battle_Victory_2-1 = "ฮู่ว ฮ้าวว... ทีนี้ก็นอนได้อย่างสบายใจแล้วสินะ"
13009-CVGroup_CommonSkill-1 = "แผลเหรอ? เดี๋ยวนอนตื่นมาก็หายน่า"
13009-CVGroup_ExSkill_1-1 = "ฮึบ งั้นก็ไปกันเลย~"
13009-CVGroup_ExSkill_2-1 = "ฉันมีสิ่งที่ต้องปกป้องนะ!"
13009-CVGroup_ExSkill_3-1 = "เอาละ~ ฉันจะทำให้เห็นผลลัพธ์ของการฝึกฝน!"
13009-CVGroup_ExSkill_Level_1-1 = "การนอนกลางวันของฉัน ไม่ว่าใครก็... ไม่สิ จะรบกวนคุณครูไม่ได้"
13009-CVGroup_ExSkill_Level_2-1 = "ฉันจะนำให้เอง ไปเลย!"
13009-CVGroup_ExSkill_Level_3-1 = "ไม่เจ็บ~ ไม่เจ็บ~"
13009-CVGroup_Formation_In_1-1 = "เข้าใจแล้ว... ฉันจะลุกเดี๋ยวนี้ละ"
13009-CVGroup_Formation_In_2-1 = "ฮ้าว งั้นเดี๋ยวมานอนต่อนะ"
13009-CVGroup_Formation_Select-1 = "อืม สดชื่นกว่าที่คิดแฮะ?"
13009-CVGroup_Growup_1-1 = "หืม? เพราะนอนมาเต็มอิ่มหรือเปล่านะ?\nรู้สึกเหมือนก้าวหน้าขึ้นเลย"
13009-CVGroup_Growup_2-1 = "พออยู่กับคุณครู... ก็มีแรงขึ้นมาจริงๆ ด้วย"
13009-CVGroup_Growup_3-1 = "แต่ถ้าเป็นตอนนี้ละก็... ฉันน่าจะนอนจำศีลได้เลยละ"
13009-CVGroup_Growup_4-1 = "การนอนฝันมันก็ดีหรอกนะ...\nแต่ต่อไปฉันอยากทำให้ฝันเป็นจริงกับคุณครูน่ะ"
13009-CVGroup_Relationship_Up_1-1 = "แสงแดดอุ่นๆ หมอนนุ่มๆ และผ้าห่มนิ่มๆ\nแล้วก็... คุณครู  ดีจังเลย..."
13009-CVGroup_Relationship_Up_2-1 = "สิ่งที่เกลียดที่สุดในโลกเหรอ? นาฬิกาปลุกไง\nแต่ว่า... ถ้าเป็นเสียงคุณครู ฉันก็ไม่เกลียดหรอกนะ"
13009-CVGroup_Relationship_Up_3-1 = "ฉะ... ฉันก็มีตอนที่จริงใจเหมือนกันนะ...\nตอนต่อสู้... กับตอนอยู่กับคุณครูไง"
13009-CVGroup_Relationship_Up_4-1 = "ฉันมีความสุข แต่ก็กลัวจัง\nเพราะตอนนี้ฉันรู้สึกเหมือนตื่นมาจากฝันเลย..."
13009-CVGroup_Tactic_In_1-1 = "ฮ้าว... เด็กพวกนั้นไม่นอนกันเหรอ?"
13009-CVGroup_Tactic_In_2-1 = "อืม ไปเลย... สู้เค้านะ... หืม? ฉันก็ไปด้วยเหรอ?"
13009-CVGroup_Tactic_Victory_1-1 = "ทำได้ดีมาก คุณครู ตอนนี้นอนได้รึยัง?"
13009-CVGroup_Tactic_Victory_2-1 = "ฮ้าวว... เสร็จจนได้ เสร็จแล้วว~ ราตรีสวัสดิ์ค่ะ♬"

[translation]
13009-CVGroup_Battle_Buffed_1-1 = "該我出場了呢。"
13009-CVGroup_Battle_Defense_1-1 = "……真礙事啊。"
13009-CVGroup_Battle_In_1-1 = "跟在我背後吧。"
13009-CVGroup_Battle_In_2-1 = "我會站在前面哦。"
13009-CVGroup_Battle_Move_1-1 = "這裡已經安全了。"
13009-CVGroup_Battle_Move_2-1 = "想趕快搞定去睡覺～"
13009-CVGroup_Battle_Recovery_1-1 = "謝～謝～你～～"
13009-CVGroup_Battle_TacticalAction_1-1 = "稍微換個位置哦。"
13009-CVGroup_Battle_Victory_1-1 = "呼……哈啊～～\n能幫上忙真是太好了。"
13009-CVGroup_Battle_Victory_2-1 = "呼……哈啊～～\n這樣就能安心睡覺了呢。"
13009-CVGroup_CommonSkill-1 = "傷？睡醒之後就會好了唷。"
13009-CVGroup_ExSkill_1-1 = "嘿咻……那我們走吧～"
13009-CVGroup_ExSkill_2-1 = "我有必須守護的東西！"
13009-CVGroup_ExSkill_3-1 = "來吧～要展現修行的成果唷！"
13009-CVGroup_ExSkill_Level_1-1 = "我不會讓任何人妨礙我的午睡……\n不對，是妨礙老師。"
13009-CVGroup_ExSkill_Level_2-1 = "我會站在最前面。\n出發吧！"
13009-CVGroup_ExSkill_Level_3-1 = "不痛～不痛～"
13009-CVGroup_Formation_In_1-1 = "我知道了……現在就起來。"
13009-CVGroup_Formation_In_2-1 = "呼啊～那就等回去之後再睡吧。"
13009-CVGroup_Formation_Select-1 = "呼呣。意外的舒服？"
13009-CVGroup_Growup_1-1 = "嗯？是因為睡得很好嗎……\n總覺得有股成長了的感覺。"
13009-CVGroup_Growup_2-1 = "果然……跟老師在一起的時候……就會有力氣。"
13009-CVGroup_Growup_3-1 = "現在的話……好像連冬眠都做得到。"
13009-CVGroup_Growup_4-1 = "雖然做夢也不錯……\n不過今後我想跟老師，一起實現夢想。"
13009-CVGroup_Relationship_Up_1-1 = "溫暖的陽光、鬆軟的枕頭、柔軟的棉被。\n還有……老師。\n……真不錯呢。"
13009-CVGroup_Relationship_Up_2-1 = "世界上最討厭的東西？鬧鐘。\n不過……我不討厭老師的聲音唷。"
13009-CVGroup_Relationship_Up_3-1 = "我，我也會有拿出真本事的時候唷……\n比如戰鬥的時候……或是跟老師在一起的時候。"
13009-CVGroup_Relationship_Up_4-1 = "雖然幸福卻也有點害怕。\n因為現在這個瞬間，彷彿會像夢一樣醒來……"
13009-CVGroup_Tactic_In_1-1 = "呼啊……\n那些孩子們都不睡覺的嗎？"
13009-CVGroup_Tactic_In_2-1 = "嗯～出發……加油哦……\n咦？我也要去嗎？"
13009-CVGroup_Tactic_Victory_1-1 = "辛苦了，老師。\n可以睡了嗎？"
13009-CVGroup_Tactic_Victory_2-1 = "呼啊～結束了。結束了唷～\n晚安～♬"

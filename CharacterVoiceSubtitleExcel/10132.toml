[translation]
10132-CVGroup_Battle_Buffed_1-1 = "非常，感謝……！"
10132-CVGroup_Battle_Covered_1-1 = "月夜流，隱身之術……！"
10132-CVGroup_Battle_Defense_1-1 = "別想，得逞……！"
10132-CVGroup_Battle_In_1-1 = "前進吧……邁向勝利的伸展台……！"
10132-CVGroup_Battle_In_2-1 = "大家，要正式上場了……！"
10132-CVGroup_Battle_Move_1-1 = "向下一個舞台，前進……！"
10132-CVGroup_Battle_Move_2-1 = "還有，剩下的嗎……？"
10132-CVGroup_Battle_Recovery_1-1 = "得救了……！"
10132-CVGroup_Battle_TacticalAction_1-1 = "是這邊，對嗎……？"
10132-CVGroup_Battle_Victory_1-1 = "到謝幕時刻了呢。辛苦了……！"
10132-CVGroup_Battle_Victory_2-1 = "慶功宴，要不要去吃拉麵呢……？"
10132-CVGroup_CommonSkill-1 = "嗚嗚……好想吃拉麵……"
10132-CVGroup_ExSkill_1-1 = "忍者就算身陷絕境，也不會放棄……！"
10132-CVGroup_ExSkill_2-1 = "這種時候，如果，是名忍者……！"
10132-CVGroup_ExSkill_3-1 = "就算禮服，會被扯破……！"
10132-CVGroup_ExSkill_Level_1-1 = "我會，擋下來的……！"
10132-CVGroup_ExSkill_Level_2-1 = "請躲到，我的身後……！"
10132-CVGroup_ExSkill_Level_3-1 = "這是月夜流，新．替身之術……！"
10132-CVGroup_Formation_In_1-1 = "咦！招募……？我嗎？"
10132-CVGroup_Formation_In_2-1 = "我會試著……走到最後的……！"
10132-CVGroup_Formation_Select-1 = "唔嗯……呀啊！？嗚嗚……"
10132-CVGroup_Growup_1-1 = "我，好像非常，受矚目的樣子……\n應該，是錯覺吧……？"
10132-CVGroup_Growup_2-1 = "成長……？\n我真的，也有才能……？"
10132-CVGroup_Growup_3-1 = "這樣的……對我來說，太浪費了……"
10132-CVGroup_Growup_4-1 = "我的舞台，才正要開始。\n請看著，忍者月夜的全新面貌吧……！"
10132-CVGroup_Relationship_Up_1-1 = "禮服，適合嗎……？\n真的嗎？耶嘿嘿……"
10132-CVGroup_Relationship_Up_2-1 = "只要有老師守望著……我，無論是什麼樣的道路……"
10132-CVGroup_Relationship_Up_3-1 = "比起一個人站在舞台上……\n我更想待在老師身邊……"
10132-CVGroup_Relationship_Up_4-1 = "擅長的事，和喜歡的事……\n如果要選一個的話，我……選喜歡的事。"
10132-CVGroup_Tactic_In_1-1 = "請小心，腳下……！"
10132-CVGroup_Tactic_In_2-1 = "模特兒……不，忍者月夜……要上了！"
10132-CVGroup_Tactic_Victory_1-1 = "能順利結束，真是，太好了……！"
10132-CVGroup_Tactic_Victory_2-1 = "大家，都沒有，受傷吧……？"

[translation]
10132-CVGroup_Battle_Buffed_1-1 = "สุดยอดเลยค่ะ...! ขอบคุณมากเลยนะคะ!"
10132-CVGroup_Battle_Covered_1-1 = "วิถีนินจาสึคุโยะ เคล็ดวิชาพรางตัวค่ะ...!"
10132-CVGroup_Battle_Defense_1-1 = "ไม่มีทางหรอกค่ะ!"
10132-CVGroup_Battle_In_1-1 = "มุ่งหน้าต่อไป สู่รันเวย์แห่งชัยชนะกันเถอะค่ะ...! "
10132-CVGroup_Battle_In_2-1 = "ลุยไปด้วยกันเลยค่ะ ทุกคน...!"
10132-CVGroup_Battle_Move_1-1 = "ไปยังเวทีต่อไปกันเลยค่ะ!"
10132-CVGroup_Battle_Move_2-1 = "ยังเหลืออยู่อีกเหรอคะ...?"
10132-CVGroup_Battle_Recovery_1-1 = "มีแรงขึ้นมาเลยค่ะ...! ขอบคุณค่ะ...!"
10132-CVGroup_Battle_TacticalAction_1-1 = "ทางนี้ถูกแล้วใช่มั้ยคะ?!"
10132-CVGroup_Battle_Victory_1-1 = "จนถึงช่วงฟินาเล่... ทุกคนยอดเยี่ยมมากเลยค่ะ...!"
10132-CVGroup_Battle_Victory_2-1 = "ระ... เราไปกินราเม็งด้วยกันเถอะค่ะ...! "
10132-CVGroup_CommonSkill-1 = "ฮือออ... อยากกินราเม็งจังเลยค่ะ... "
10132-CVGroup_ExSkill_1-1 = "นินจาน่ะ ต่อให้ถูกไล่ต้อนให้จนมุมแค่ไหน...! "
10132-CVGroup_ExSkill_2-1 = "หากเป็นนินจา ในเวลาแบบนี้ก็จะต้อง...!"
10132-CVGroup_ExSkill_3-1 = "ถะ... ถึงชุดเดรสจะขาดวิ่นก็ตาม...!"
10132-CVGroup_ExSkill_Level_1-1 = "ฉะ... ฉันจะหยุดมันไว้เองค่ะ...! "
10132-CVGroup_ExSkill_Level_2-1 = "ทะ... ทุกคนมาอยู่ด้านหลังฉันค่ะ...!"
10132-CVGroup_ExSkill_Level_3-1 = "วิถีนินจาสึคุโยะ... เคล็ดวิชาแปลงกายใหม่... ค่ะ! "
10132-CVGroup_Formation_In_1-1 = "จะ... จะดึงตัวฉันเข้าทีมจริงๆ เหรอคะ...?! "
10132-CVGroup_Formation_In_2-1 = "จะลองดูสักตั้งค่ะ ถ้านั่นคือเส้นทางที่ฉันต้องเดินต่อไป...!"
10132-CVGroup_Formation_Select-1 = "ฮืมมม... อ๊ะ?! ฮือออ..."
10132-CVGroup_Growup_1-1 = "คือว่า... รู้สึกเหมือนกำลังถูกเพ่งเล็งเลยค่ะ...\nฉันคงเข้าใจผิดไปเองใช่มั้ยคะ...?"
10132-CVGroup_Growup_2-1 = "พัฒนาขึ้นงั้นเหรอเนี่ย...\nจริงเหรอคะ ฉันมีพรสวรรค์จริงๆ เหรอคะ...?"
10132-CVGroup_Growup_3-1 = "ของที่มีค่าขนาดนี้... ฉันรับไว้ได้จริงๆ เหรอคะ...?"
10132-CVGroup_Growup_4-1 = "โชว์ของฉันจะเริ่มขึ้นตอนนี้ค่ะ คอยดูนะคะ ภาพลักษณ์ใหม่ของนินจา สึคุโยะ...!"
10132-CVGroup_Relationship_Up_1-1 = "ฉันเหมาะกับชุดเดรสจริงๆ เหรอคะ? จริงเหรอคะ? แหะๆๆ... "
10132-CVGroup_Relationship_Up_2-1 = "ถ้าคุณครูเฝ้ามองอยู่ละก็... ไม่ว่าจะเป็นเส้นทางแบบไหน..."
10132-CVGroup_Relationship_Up_3-1 = "การได้อยู่ข้างๆ คุณครู...\nมันดีเสียกว่าการยืนอยู่บนเวทีคนเดียวอีก..."
10132-CVGroup_Relationship_Up_4-1 = "สิ่งที่ทำได้ดีกับสิ่งที่ชอบ...\nถะ... ถ้าเป็นฉันละก็ ขอเลือกอยู่กับสิ่งที่ชอบดีกว่าค่ะ"
10132-CVGroup_Tactic_In_1-1 = "ทะ... ทุกคนเดินระวังด้วยนะคะ...!"
10132-CVGroup_Tactic_In_2-1 = "โมเดล... ไม่สิ นินจาสึคุโยะจะลุยแล้วนะคะ! "
10132-CVGroup_Tactic_Victory_1-1 = "ปะ... เป็นการปิดฉากที่ยอดเยี่ยมมากเลยค่ะ!"
10132-CVGroup_Tactic_Victory_2-1 = "มะ... ไม่มีใครบาดเจ็บใช่มั้ยคะ...?"

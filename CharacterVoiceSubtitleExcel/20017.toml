[translation]
20017-CVGroup_CommonSkill-1 = "นะ... น่าจะเจ็บเลยนะคะ...!"
20017-CVGroup_ExSkill_1-1 = "อ่า... อ๊ะ...?! ฉะ... ฉันไปเองค่ะ!"
20017-CVGroup_ExSkill_2-1 = "อ่า... เอ๋...?! ระ... รอเดี๋ยวสิคะ!"
20017-CVGroup_ExSkill_3-1 = "ทะ... ทุกคน...?! ฉะ... ฉันจะสนับสนุนเองค่ะ!"
20017-CVGroup_ExSkill_Level_1-1 = "แหะ แหะๆๆ... สำหรับฉันคงทำได้แค่นี้..."
20017-CVGroup_ExSkill_Level_2-1 = "งะ... งั้นไปสถานที่ต่อไปเลย..."
20017-CVGroup_ExSkill_Level_3-1 = "ชีวิตก็ต้องเจอเรื่องแบบนี้นะคะ..."
20017-CVGroup_Formation_In_1-1 = "ค่ะ ฉันเตรียมตัวพร้อมแล้วค่ะ...\nขอรบกวนด้วยนะคะ"
20017-CVGroup_Formation_In_2-1 = "แหะๆ... คะ... คราวนี้เป็นงานอะไรเหรอ?"
20017-CVGroup_Growup_1-1 = "อ่า... ให้... ให้ฉันเหรอคะ?! จะให้ฉันเป็นทุกข์... ใช่มั้ยคะ?!"
20017-CVGroup_Growup_2-1 = "ต่อไปก็คงเป็นทุกข์กว่านี้ใช่มั้ยคะ? ถึงจะเป็นทุกข์ขึ้นอีกเรื่อยๆ...\nแต่ก็ช่วยไม่ได้นะคะ... แหะๆๆ"
20017-CVGroup_Growup_3-1 = "ยิ่งแข็งแกร่ง... ก็คงยิ่งเป็นทุกข์หนักกว่าตอนนี้นะคะ..."
20017-CVGroup_Growup_4-1 = "คนอย่างฉันจะมีประโยชน์อะไรบ้างนะ...?"
20017-CVGroup_Relationship_Up_1-1 = "เอ่อ... ฉันคิดว่าตัวเองไม่มีประโยชน์ไปมากกว่านี้แล้วค่ะ...\nนี่มันอะไรกันคะ..."
20017-CVGroup_Relationship_Up_2-1 = "ขะ... ขอบคุณค่ะ แหะๆๆ..."
20017-CVGroup_Relationship_Up_3-1 = "ทำให้ฉันจนมุมถึงขนาดนี้... เพื่อจะบอกว่าชีวิตย่อมทุกข์ทนอยู่แล้วใช่มั้ยคะ?\nใช่มั้ยล่ะคะ? ใช่มั้ยคะ?"
20017-CVGroup_Relationship_Up_4-1 = "พูดชมแล้วทำให้รู้สึกแย่ แล้วก็ทำให้ดูน่าสมเพชอีก...\nเป็นอย่างนี้นี่เองสินะคะ..."

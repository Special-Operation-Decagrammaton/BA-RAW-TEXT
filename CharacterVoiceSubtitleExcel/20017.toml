[translation]
20017-CVGroup_CommonSkill-1 = "好，好像很痛呢……！"
20017-CVGroup_ExSkill_1-1 = "啊，啊啊……！？\n我，我要上了！"
20017-CVGroup_ExSkill_2-1 = "啊，咦……！？\n請，請稍等！"
20017-CVGroup_ExSkill_3-1 = "大，大家……！？\n我，我來支援！"
20017-CVGroup_ExSkill_Level_1-1 = "耶，耶嘿嘿……\n我也只能做到這種事了……"
20017-CVGroup_ExSkill_Level_2-1 = "那，那麼繼續，前往下個地點……"
20017-CVGroup_ExSkill_Level_3-1 = "這種事，也是人生呢……"
20017-CVGroup_Formation_In_1-1 = "是，我準備好了……請多指教。"
20017-CVGroup_Formation_In_2-1 = "耶嘿嘿……這，這次是什麼樣的工作？"
20017-CVGroup_Growup_1-1 = "咦，我，我嗎！？\n也就是要讓我更痛苦……？\n是那樣嗎……！？"
20017-CVGroup_Growup_2-1 = "在這之後，會更加痛苦對吧？\n雖然八成會越來越苦……但也沒辦法呢……耶嘿嘿"
20017-CVGroup_Growup_3-1 = "只要變得越強，就會變得越苦對吧……"
20017-CVGroup_Growup_4-1 = "這樣的我，也能派上用場……？"
20017-CVGroup_Relationship_Up_1-1 = "那個，我，應該沒辦法再派上更多用場了……\n怎麼辦才好呢……"
20017-CVGroup_Relationship_Up_2-1 = "非，非常感謝……耶嘿嘿……"
20017-CVGroup_Relationship_Up_3-1 = "這麼對我窮追不捨……是為了教導我人生是很辛苦的嗎？\n沒錯吧？就是這樣對吧？"
20017-CVGroup_Relationship_Up_4-1 = "先給人希望再給人絕望，讓人繼續受苦……\n是這麼回事吧……"

20017-CVGroup_ExSkill_2-1 = "Um, eh...?! P-Please hold!"
20017-CVGroup_ExSkill_3-1 = "E-Everyone...?! I-I'll support you!"
20017-CVGroup_ExSkill_Level_1-1 = "Heehee... This really is the best I can do..."
20017-CVGroup_ExSkill_Level_2-1 = "Th-Then on to the next location again..."
20017-CVGroup_ExSkill_Level_3-1 = "Such is life..."
20017-CVGroup_Formation_In_1-1 = "Yes. I'm ready... Let's do this."
20017-CVGroup_Formation_In_2-1 = "Heehee... Wh-What's it this time?"
20017-CVGroup_Growup_1-1 = "Oh, um, f-for me?! Y-You're telling me I haven't suffered enough, right...?!"
20017-CVGroup_Growup_2-1 = "It'll only get harder from here on out... Well, even if it's more difficult, it's not like I have a choice... Heeheehee..."

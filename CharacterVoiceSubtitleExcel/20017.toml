[translation]
20017-CVGroup_CommonSkill-1 = "아, 아프겠네요……!"
20017-CVGroup_ExSkill_1-1 = "아, 아앗……?! 제, 제가 갑니다!"
20017-CVGroup_ExSkill_2-1 = "아, 엣……?! 자, 잠시만 기다려주세요!"
20017-CVGroup_ExSkill_3-1 = "여, 여러분……?! 지, 지원할게요!"
20017-CVGroup_ExSkill_Level_1-1 = "에, 에헤헤…... 저에겐 이 정도밖에 할 줄 아는 게 없어서……."
20017-CVGroup_ExSkill_Level_2-1 = "그, 그럼 또 다음 장소로……."
20017-CVGroup_ExSkill_Level_3-1 = "이런 것도 인생이네요……"
20017-CVGroup_Formation_In_1-1 = "네. 준비되었어요……\n잘 부탁드립니다."
20017-CVGroup_Formation_In_2-1 = "에헤헤…….\n이, 이번에는 어떤 일로?"
20017-CVGroup_Growup_1-1 = "어, 저, 저에게 말인가요?! 즉, 더, 괴로워하라고…… 그런 거죠……?!"
20017-CVGroup_Growup_2-1 = "앞으로는 더 괴롭겠죠? 점점 더 괴로워지겠지만……. \n어쩔 수 없겠네요…… 에헤헤."
20017-CVGroup_Growup_3-1 = "강해지면 강해질수록……. 지금 이상으로 괴로워지는 거네요……."
20017-CVGroup_Growup_4-1 = "이런 저라도, 어딘가 쓸 데가……?"
20017-CVGroup_Relationship_Up_1-1 = "저기, 저, 이 이상은 분명, 쓸모 없을 거라고 생각합니다만……. 어떻게 된 걸까요……."
20017-CVGroup_Relationship_Up_2-1 = "고, 고맙습니다…. 에헤헤……."
20017-CVGroup_Relationship_Up_3-1 = "이렇게나 저를 몰아붙여서……. 인생은 괴로운 법이라고, 알려주시는 거죠? 그렇죠? 그런 거죠?"
20017-CVGroup_Relationship_Up_4-1 = "칭찬했다가, 떨어트리고, 또 괴로운 꼴로 만든다는……. 그런 것이로군요……"

[translation]
10086-CVGroup_Battle_Buffed_1-1 = "고마워."
10086-CVGroup_Battle_Defense_1-1 = "소용없어."
10086-CVGroup_Battle_In_1-1 = "간다──. 해야 할 일은, 단 하나."
10086-CVGroup_Battle_In_2-1 = "연습하기 전에, 정리해두겠어."
10086-CVGroup_Battle_Move_1-1 = "조금 템포를 올릴까."
10086-CVGroup_Battle_Move_2-1 = "늦을 순, 없으니까."
10086-CVGroup_Battle_Recovery_1-1 = "고마워"
10086-CVGroup_Battle_TacticalAction_1-1 = "이동하겠어."
10086-CVGroup_Battle_Victory_1-1 = "임무 완료. ……무사히 끝냈네."
10086-CVGroup_Battle_Victory_2-1 = "앗…… 응, 고마워."
10086-CVGroup_CommonSkill-1 = "연습 전에 확인해두지 않으면."
10086-CVGroup_ExSkill_1-1 = "당신을 위해 준비한 선율…."
10086-CVGroup_ExSkill_2-1 = "연습한 나의 모습을──. 당신에게, 보여주고 싶어."
10086-CVGroup_ExSkill_3-1 = "서투른 소리지만…. 진심을 담아 당신에게…!"
10086-CVGroup_ExSkill_Level_1-1 = "준비라면, 되어 있어."
10086-CVGroup_ExSkill_Level_2-1 = "이제부터가 진짜야."
10086-CVGroup_ExSkill_Level_3-1 = "진심을 담아, 연주하겠어!"
10086-CVGroup_ExSkill_Level_4-1 = "ma non troppo!"
10086-CVGroup_ExSkill_Level_5-1 = "그러나 지나치지 않게…!"
10086-CVGroup_ExSkill_Level_6-1 = "자유롭고, 선명하게…!"
10086-CVGroup_ExSkill_Level_7-1 = "피날레를!"
10086-CVGroup_ExSkill_Level_8-1 = "elegante!"
10086-CVGroup_ExSkill_Level_9-1 = "이것으로 마무리야……!"
10086-CVGroup_Formation_In_1-1 = "응, 준비는 끝났어."
10086-CVGroup_Formation_In_2-1 = "선생님의 지시를, 기다렸어."
10086-CVGroup_Formation_Select-1 = "너무…… 빤히 바라보지 마."
10086-CVGroup_Growup_1-1 = "선생님 덕에, 또 한 소절, 나아갈 수 있었던 거 같아. ……고마워."
10086-CVGroup_Growup_2-1 = "내가 이렇게 있을 수 있는 것도, 선생님 덕분이야. 그게, 정말로 기뻐."
10086-CVGroup_Growup_3-1 = "이대로 더욱 강해져서, 당신에게 보답하고 싶어. 그런 날, 지켜봐줄래?"
10086-CVGroup_Growup_4-1 = "선생님이 나를 의지할 수 있도록, 더 강해지고.\n성장하고 싶어. 그게, 지금의 내가 생각하는 전부야."
10086-CVGroup_Relationship_Up_1-1 = "이런 나라도 도움이 된다고 알려준 건 선생님이야.\n그런 선생님이 있었기 때문에… 나는……\n정말, 고마워."
10086-CVGroup_Relationship_Up_2-1 = "그…. 이런 모습이니까.\n평소 이상으로 시선을 의식하게 되는 것 같아.\n상대가 선생님이라면, 괜찮지만…."
10086-CVGroup_Relationship_Up_3-1 = "이런 내가, 정말로 여기 있어도 되는 걸까.\n……후훗, 당신은, 정말 변하지 않는구나. 고마워."
10086-CVGroup_Relationship_Up_4-1 = "선생님, 손을 잡아주지 않을래?\n그러면… 긴장이, 조금은 가라앉을 것 같아."
10086-CVGroup_Tactic_In_1-1 = "드레스 차림새여도 할 일은 달라지지 않아."
10086-CVGroup_Tactic_In_2-1 = "선생님의 지시를, 믿고 있어."
10086-CVGroup_Tactic_Victory_1-1 = "역시 선생의 지휘는 완벽하구나."
10086-CVGroup_Tactic_Victory_2-1 = "완벽한 승리였어. ……응, 이것으로 연습 시간은, 확보했어."

[translation]
10086-CVGroup_Battle_Buffed_1-1 = "謝謝。"
10086-CVGroup_Battle_Defense_1-1 = "沒用的。"
10086-CVGroup_Battle_In_1-1 = "要上囉──\n該做的事只有一件。"
10086-CVGroup_Battle_In_2-1 = "得在練習之前清理一下才行。"
10086-CVGroup_Battle_Move_1-1 = "稍微加快一下節奏吧。"
10086-CVGroup_Battle_Move_2-1 = "因為不能遲到。"
10086-CVGroup_Battle_Recovery_1-1 = "謝謝你。"
10086-CVGroup_Battle_TacticalAction_1-1 = "進行移動。"
10086-CVGroup_Battle_Victory_1-1 = "任務完成。\n……順利結束了呢。"
10086-CVGroup_Battle_Victory_2-1 = "啊……嗯，謝謝。"
10086-CVGroup_CommonSkill-1 = "得在練習之前確認才行。"
10086-CVGroup_ExSkill_1-1 = "為了你準備的旋律……"
10086-CVGroup_ExSkill_2-1 = "練習的模樣──\n希望能展現給你看。"
10086-CVGroup_ExSkill_3-1 = "雖然是笨拙的音色……\n還是要用心向你……！"
10086-CVGroup_ExSkill_Level_1-1 = "準備的話，已經完成了。"
10086-CVGroup_ExSkill_Level_2-1 = "接下來才是重頭戲。"
10086-CVGroup_ExSkill_Level_3-1 = "傾注心意，進行演奏！"
10086-CVGroup_ExSkill_Level_4-1 = "ma non troppo！"
10086-CVGroup_ExSkill_Level_5-1 = "不過，還是要適可而止……！"
10086-CVGroup_ExSkill_Level_6-1 = "自由地、鮮明地……！"
10086-CVGroup_ExSkill_Level_7-1 = "演奏終曲！"
10086-CVGroup_ExSkill_Level_8-1 = "elegante！"
10086-CVGroup_ExSkill_Level_9-1 = "這樣就結束了……！"
10086-CVGroup_Formation_In_1-1 = "嗯，準備已經就緒。"
10086-CVGroup_Formation_In_2-1 = "正在等待老師的指示。"
10086-CVGroup_Formation_Select-1 = "請不要……一直盯著我看。"
10086-CVGroup_Growup_1-1 = "多虧了老師，感覺又前進了一小節。\n……謝謝你。"
10086-CVGroup_Growup_2-1 = "我能走到這一步，也是託老師的福。\n這點，讓我真的很開心。"
10086-CVGroup_Growup_3-1 = "希望能像這樣變得越來越強，並向你報恩。\n能請你守望著那樣的我嗎？"
10086-CVGroup_Growup_4-1 = "為了能讓老師依賴，我想變得更強……更有所成長。\n這就是現在我心裡的一切。"
10086-CVGroup_Relationship_Up_1-1 = "讓我知道像我這樣的人也能派上用場的，就是老師哦。\n就因為有那樣的老師……我才能……\n真的，很謝謝你。"
10086-CVGroup_Relationship_Up_2-1 = "那個……因為這副打扮的關係，\n我好像比以往更在意視線。\n對方是老師的話，倒是沒關係……"
10086-CVGroup_Relationship_Up_3-1 = "這樣的我，真的能待在這裡嗎？\n……呵呵，你真的一點都沒變呢。謝謝你。"
10086-CVGroup_Relationship_Up_4-1 = "老師，能握著我的手嗎？\n那樣的話……緊張，好像能稍微緩解一些。"
10086-CVGroup_Tactic_In_1-1 = "即使換上禮服，要做的事情也不會變。"
10086-CVGroup_Tactic_In_2-1 = "我相信老師的指示。"
10086-CVGroup_Tactic_Victory_1-1 = "果然，老師的指揮是完美的呢"
10086-CVGroup_Tactic_Victory_2-1 = "是場完美的勝利。\n……嗯。這樣就能確保練習時間了。"

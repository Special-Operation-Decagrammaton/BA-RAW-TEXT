10086-CVGroup_Growup_1-1 = "ต้องขอบคุณคุณครูที่ทำให้ฉันก้าวหน้าไปอีกขั้นหนึ่งได้\nขอบคุณนะ..."
10086-CVGroup_Growup_2-1 = "ที่ฉันทำแบบนี้ได้ ก็ต้องขอบคุณคุณครูเลยนะ\nฉันดีใจจริงๆ นะ"
10086-CVGroup_Growup_3-1 = "ฉันอยากแข็งแกร่งขึ้นเพื่อตอบแทนให้กับคุณ\nจะช่วยเฝ้ามองฉัน... ได้รึเปล่า?"
10086-CVGroup_Growup_4-1 = "ฉันจะแข็งแกร่งขึ้นเพื่อให้คุณครูพึ่งพาฉันได้\nฉันอยากเติบโต้ขึ้นอีก ตอนนี้ฉันคิดถึงแต่เรื่องนั้นเท่านั้น"
10086-CVGroup_Relationship_Up_1-1 = "คุณครูเป็นคนสอนให้ฉันรู้ว่า ฉันที่เป็นแบบนี้ก็ทำตัวให้เป็นประโยชน์ได้น่ะ\nเพราะมีคุณครูอยู่ด้วย... ฉัน... ขอบคุณจริงๆ นะ"
10086-CVGroup_Relationship_Up_2-1 = "เอ่อ... เพราะแต่งตัวแบบนี้ เลยรู้สึกเหมือนว่ามีคนจ้องมองมากกว่าปกติน่ะ\nแต่ถ้าอีกฝ่ายเป็นคุณครูละก็คงไม่เป็นไร..."
10086-CVGroup_Relationship_Up_3-1 = "ฉันอยู่ในที่แบบนี้ได้งั้นเหรอ\nฮุฮุ... คุณยังคงเหมือนเดิมเลย ขอบคุณนะ"
10086-CVGroup_Relationship_Up_4-1 = "คุณครู จับมือฉันไว้หน่อยได้รึเปล่า?\nถ้าทำแบบนั้น... อาจลดความประหม่าลงได้นิดหน่อยน่ะ"
10086-CVGroup_Tactic_In_1-1 = "ถึงจะสวมชุดเดรส แต่งานที่ต้องทำก็ยังเหมือนเดิม"
10086-CVGroup_Tactic_In_2-1 = "ฉันเชื่อในการสั่งการของคุณครู"
10086-CVGroup_Tactic_Victory_1-1 = "คิดแล้วเชียวว่าการสั่งการของคุณครูน่ะสมบูรณ์แบบ"
10086-CVGroup_Tactic_Victory_2-1 = "ชนะได้อย่างสมบูรณ์แบบเลยละ\nอื้อ... เท่านี้ก็ฝึกซ้อมได้อย่างวางใจแล้วละ"

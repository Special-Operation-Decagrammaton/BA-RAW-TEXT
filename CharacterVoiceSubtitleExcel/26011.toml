[translation]
26011-CVGroup_CommonSkill-1 = "รสชาติ... รสชาติเป็นยังไงบ้าง?"
26011-CVGroup_ExSkill_1-1 = "อ๊ะ... อ๊ะ!? อะ... อะไรน่ะ!?"
26011-CVGroup_ExSkill_2-1 = "มาแล้ว...!!"
26011-CVGroup_ExSkill_3-1 = "กะไว้แล้วว่าจะมา...!!"
26011-CVGroup_ExSkill_Level_1-1 = "ของแบบนี้... เอางี้เหรอ!"
26011-CVGroup_ExSkill_Level_2-1 = "ย้ากกก!!"
26011-CVGroup_ExSkill_Level_3-1 = "ทนไม่ไหวหรอก! ย้าก!!"
26011-CVGroup_Formation_In_1-1 = "ว้าว ฉันไปด้วยได้เหรอคะ!? ว้าว~!"
26011-CVGroup_Formation_In_2-1 = "ฉันจะพยายามเต็มที่เลยค่ะ!"
26011-CVGroup_Growup_1-1 = "หะ... ให้กันเหรอคะ!?\nขอบคุณค่ะ...! ฉันจะทำให้เต็มที่ค่ะ!"
26011-CVGroup_Growup_2-1 = "ถึงจะไม่ค่อยแน่ใจ แต่ก็รู้สึกเหมือนแข็งแกร่งขึ้นเลย...!"
26011-CVGroup_Growup_3-1 = "ว้าว! พลังพลุ่งพล่านทั่วตัวเลย!\nปกติเป็นแบบนี้เหรอคะ!?"
26011-CVGroup_Growup_4-1 = "คุณครู! ฉันในตอนนี้เหมือนจะทำได้ทุกอย่างเลยค่ะ!"
26011-CVGroup_Relationship_Up_1-1 = "ต้องบอกว่ายังไงดีคะ...\nแค่คำว่าขอบคุณค่ะ... เหมือนจะไม่เพียงพอเลยค่ะ"
26011-CVGroup_Relationship_Up_2-1 = "คะ... คะ? ให้ฉันเหรอคะ? ทำแบบนี้ได้จริงๆ เหรอคะ...?"
26011-CVGroup_Relationship_Up_3-1 = "ฉันได้รับความช่วยเหลือจากคุณครูตลอดเลยนะคะ ฮ่าฮ่า..."
26011-CVGroup_Relationship_Up_4-1 = "ที่ฉันได้เจอเรื่องสนุกมากมายหลังจากมาที่นี่...\nฉันคิดว่าเป็นเพราะคุณครูแน่ๆ ค่ะ"

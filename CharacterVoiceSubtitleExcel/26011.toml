[translation]
26011-CVGroup_CommonSkill-1 = "味，味道如何呢？"
26011-CVGroup_ExSkill_1-1 = "哇，哇啊！？怎，怎麼了！？"
26011-CVGroup_ExSkill_2-1 = "……！！來了！"
26011-CVGroup_ExSkill_3-1 = "……！！我就知道！"
26011-CVGroup_ExSkill_Level_1-1 = "這裡就該……嘿咻！"
26011-CVGroup_ExSkill_Level_2-1 = "哈啊啊啊～！"
26011-CVGroup_ExSkill_Level_3-1 = "別想得逞！呀啊！！"
26011-CVGroup_Formation_In_1-1 = "我，我也可以去嗎！？好耶～！"
26011-CVGroup_Formation_In_2-1 = "我會盡可能努力的！"
26011-CVGroup_Growup_1-1 = "要，要給我嗎！？\n……謝謝你！我會加油的！"
26011-CVGroup_Growup_2-1 = "雖然搞不太清楚……總覺得有股變強了的感覺……！"
26011-CVGroup_Growup_3-1 = "哇啊！從身體裡湧現了力量！\n這是這樣的東西嗎！？"
26011-CVGroup_Growup_4-1 = "老師！我，現在感覺什麼事都能辦到！"
26011-CVGroup_Relationship_Up_1-1 = "該怎麼說才好呢……\n非常感謝……感覺好像完全不夠……"
26011-CVGroup_Relationship_Up_2-1 = "咦，咦？要給我嗎？\n真的可以嗎……？"
26011-CVGroup_Relationship_Up_3-1 = "我總是一味地受到老師的幫助呢，哈哈……"
26011-CVGroup_Relationship_Up_4-1 = "來到這裡之後，之所以充滿了開心的事……我想肯定是多虧了老師。"

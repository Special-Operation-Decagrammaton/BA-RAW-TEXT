[translation]
26011-CVGroup_CommonSkill-1 = "맛, 맛은, 어때요?"
26011-CVGroup_ExSkill_1-1 = "으, 으앗!? 뭐, 뭐야!?"
26011-CVGroup_ExSkill_2-1 = "……!! 왔다!"
26011-CVGroup_ExSkill_3-1 = "……!! 올 줄 알았어!"
26011-CVGroup_ExSkill_Level_1-1 = "이런건…… 이렇게!"
26011-CVGroup_ExSkill_Level_2-1 = "하아아압-!!"
26011-CVGroup_ExSkill_Level_3-1 = "어림 없지! 하압!!"
26011-CVGroup_Formation_In_1-1 = "와 저도 가도 되나요!? 와아~!"
26011-CVGroup_Formation_In_2-1 = "할 수 있는 데까지는 열심히 하겠습니다!"
26011-CVGroup_Growup_1-1 = "주, 주시는 건가요!? ……감사합니다! 열심히 할게요!"
26011-CVGroup_Growup_2-1 = "잘은 모르겠지만, 강해진 것 같은 기분이……!"
26011-CVGroup_Growup_3-1 = "으앗! 온몸에서 힘이 솟는다! 원래 이런 건가요!?"
26011-CVGroup_Growup_4-1 = "선생님! 저, 지금이라면 뭐든지 할 수 있을 것 같아요!"
26011-CVGroup_Relationship_Up_1-1 = "뭐라고 말해야 할까요... 감사합니다……로는 너무나 부족한 것 같죠…."
26011-CVGroup_Relationship_Up_2-1 = "네, 네? 저한테요? 정말, 그래도 되나요…?"
26011-CVGroup_Relationship_Up_3-1 = "선생님께는, 쭉 도움만 받은 거 같네요. 하하…."
26011-CVGroup_Relationship_Up_4-1 = "여기 온 뒤로 즐거운 일만 가득한 건… 분명 선생님 덕분이라고 생각해요."

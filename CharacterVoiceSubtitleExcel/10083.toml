[translation]
10083-CVGroup_Battle_Buffed_1-1 = "การสนับสนุนนี้ ฉันจะใช้มันในการปฏิบัติการเอง"
10083-CVGroup_Battle_Covered_1-1 = "นี่ก็เป็นกลยุทธ์อย่างหนึ่งเหมือนกัน"
10083-CVGroup_Battle_Defense_1-1 = "เปล่าประโยชน์"
10083-CVGroup_Battle_In_1-1 = "นี่เป็นแผนการที่ฉันคิดขึ้นมา... ฉันจะเป็นคนนำเอง"
10083-CVGroup_Battle_In_2-1 = "จงประจักษ์ถึงพลังของเฮียกกะเรียวรันด้วยตาตัวเองซะเถอะ"
10083-CVGroup_Battle_Move_1-1 = "เตรียมพร้อมแล้ว ไปต่อกันเลย"
10083-CVGroup_Battle_Move_2-1 = "เป็นไปตามกลยุทธ์ที่วางไว้ ไม่ต้องห่วงหรอก"
10083-CVGroup_Battle_Recovery_1-1 = "ขอบคุณนะ ช่วยได้มากเลยนะ"
10083-CVGroup_Battle_TacticalAction_1-1 = "ไปบริเวณที่ได้เปรียบมากขึ้น"
10083-CVGroup_Battle_Victory_1-1 = "สำหรับที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน\nชัยชนะเป็นของที่แน่นอนอยู่แล้ว"
10083-CVGroup_Battle_Victory_2-1 = "เรื่องที่เราเป็นฝ่ายชนะ มันเป็นเรื่องที่แน่นอนอยู่แล้ว"
10083-CVGroup_CommonSkill-1 = "อดทนไว้ให้ดีล่ะ"
10083-CVGroup_ExSkill_1-1 = "สำหรับวิธีต่อไป..."
10083-CVGroup_ExSkill_2-1 = "วิธีที่จะสั่นคลอนสนามต่อสู้..."
10083-CVGroup_ExSkill_3-1 = "สิ่งที่ต้องทำมีเพียงสิ่งเดียว"
10083-CVGroup_ExSkill_Level_1-1 = "ตรงนั้น"
10083-CVGroup_ExSkill_Level_2-1 = "ไม่จำเป็นต้องออมมือ จะลุยไปสุดกำลังเลย"
10083-CVGroup_ExSkill_Level_3-1 = "จงลิ้มรสพลังของเฮียกกะเรียวรันซะ"
10083-CVGroup_Formation_In_1-1 = "ต้องการพลังของฉันเหรอ? ฉันคิดไว้แล้วละ"
10083-CVGroup_Formation_In_2-1 = "ฮุฮุ กะแล้วว่าจะต้องเรียกฉัน"
10083-CVGroup_Formation_Select-1 = "ทำตามที่ต้องการเถอะ"
10083-CVGroup_Growup_1-1 = "ให้ของแบบนี้กับฉันงั้นเหรอ...\nคุณต้องการอะไรเป็นการตอบแทนล่ะ?\nต้องทำแบบนั้นสิ ถึงจะเป็นการแลกเปลี่ยนน่ะ"
10083-CVGroup_Growup_2-1 = "ฉันไม่รู้ว่าคุณกำลังคิดอะไรอยู่... แต่ถ้าให้ฉันก็ขอรับไว้แล้วกัน"
10083-CVGroup_Growup_3-1 = "ถึงจะได้ยินคำพูดที่ไม่รื่นหูมานักต่อนัก แต่ก็ยังทำแบบนี้อีก...\nคุณเป็นคนแปลกๆ... จริงๆ ด้วย"
10083-CVGroup_Growup_4-1 = "ฉันก้าวหน้าขึ้นได้เพราะคุณเลยนะ\nฉันไม่ปฏิเสธหรอก เพราะมันคือข้อเท็จจริงที่เห็นได้ชัด\nเพราะงั้นอย่างน้อย... ก็ขอแสดงความขอบคุณก็แล้วกัน ฮึ..."
10083-CVGroup_Relationship_Up_1-1 = "คุณครูอยู่ใกล้...เกินไปแล้วนะ\nฉันไม่ได้บอกว่าไม่ชอบสักหน่อย"
10083-CVGroup_Relationship_Up_2-1 = "อ๊ะ คุณครู หายไปไหนมาเหรอ?\nช่วยอยู่ในที่ที่ฉันจะมองเห็นด้วย"
10083-CVGroup_Relationship_Up_3-1 = "น้ำใจของคุณครู ฉันขอรับไว้ด้วยความยินดี\nต่อไปถึงตาฉันแล้ว เตรียมใจเอาไว้ให้ดีล่ะ"
10083-CVGroup_Relationship_Up_4-1 = "เรื่องที่ฉันพึ่งพาคุณครูก็เป็นความจริง\nเพราะงั้นสัญญามาสิ... ว่าคุณก็จะพึ่งพาฉันเหมือนกัน"
10083-CVGroup_Tactic_In_1-1 = "ยุทธวิธีที่สืบทอดต่อกันมารุ่นสู่รุ่นของเฮียกกะเรียวรัน\nฉันจะแสดงให้คุณได้เห็นเอง"
10083-CVGroup_Tactic_In_2-1 = "คุณครู ช่วยสั่งการด้วย\nฉันจะสนับสนุนด้วยกลยุทธ์เอง"
10083-CVGroup_Tactic_Victory_1-1 = "การสั่งการของคุณครู และกลยุทธ์ของฉัน\nไม่มีทางที่ศัตรูจะขัดขวางได้แน่นอน"
10083-CVGroup_Tactic_Victory_2-1 = "ถ้าให้คะแนนกลยุทธ์ของฉันละก็...\nคงจะประมาณ 100 เต็ม 10 ละมั้ง?"

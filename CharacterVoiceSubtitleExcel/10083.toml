10083-CVGroup_Battle_In_1-1 = "Since I came up with this strategy, I'll take the lead."
10083-CVGroup_Battle_In_2-1 = "Take a good look at the power of the Hyakkaryouran."
10083-CVGroup_Battle_Move_1-1 = "Ready. Moving on."
10083-CVGroup_Battle_Move_2-1 = "Just as planned, no doubt."
10083-CVGroup_Battle_Recovery_1-1 = "Thanks. It helped."
10083-CVGroup_Battle_TacticalAction_1-1 = "To a more advantageous position."
10083-CVGroup_Battle_Victory_1-1 = "For a Hyakkaryouran officer, victory is all but assured."
10083-CVGroup_Battle_Victory_2-1 = "It's no surprise we won."
10083-CVGroup_CommonSkill-1 = "Take note."
10083-CVGroup_ExSkill_1-1 = "The next move is..."
10083-CVGroup_ExSkill_2-1 = "This ought to turn the tides."
10083-CVGroup_ExSkill_3-1 = "There's only one thing to do."
10083-CVGroup_ExSkill_Level_1-1 = "Um..."
10083-CVGroup_ExSkill_Level_2-1 = "There's no need to hold back. I'll go at it full strength."
10083-CVGroup_ExSkill_Level_3-1 = "Have a full taste of the Hyakkaryouran."
10083-CVGroup_Formation_In_1-1 = "You need my strength? ...I figured."
10083-CVGroup_Formation_In_2-1 = "Heehee, I knew you'd call."
10083-CVGroup_Formation_Select-1 = "...Why don't you just do as you please?"

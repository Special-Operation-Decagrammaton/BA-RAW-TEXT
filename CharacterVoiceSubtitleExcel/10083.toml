10083-CVGroup_Relationship_Up_3-1 = "Sensei's favor. I'll accept it with gratitude. Next time, I'll get you something. Be ready for it."
10083-CVGroup_Relationship_Up_4-1 = "It's true that I rely on you. So promise me you'll rely on me too."
10083-CVGroup_Tactic_In_1-1 = "I'll show you all the strategic genius of the Hyakkaryouran."
10083-CVGroup_Tactic_In_2-1 = "Sensei, your command. I'll back you up with my tactics."
10083-CVGroup_Tactic_Victory_1-1 = "With your tactics and my strategy, no one can stop us."
10083-CVGroup_Tactic_Victory_2-1 = "If I had to rate my operation... I'd give it about a million points out of 10?"

[translation]
10083-CVGroup_Battle_Buffed_1-1 = "지금의 지원, 작전에 활용하겠어."
10083-CVGroup_Battle_Covered_1-1 = "이것도 전략 중의 하나야."
10083-CVGroup_Battle_Defense_1-1 = "통하지 않아."
10083-CVGroup_Battle_In_1-1 = "이건 내가 세운 작전이니까…. 선두에 서겠어."
10083-CVGroup_Battle_In_2-1 = "백화요란의 실력, 그 눈에 새기도록 해."
10083-CVGroup_Battle_Move_1-1 = "준비 완료. 다음으로 이동한다."
10083-CVGroup_Battle_Move_2-1 = "작전대로야. 걱정할 필요 없어."
10083-CVGroup_Battle_Recovery_1-1 = "고마워. 도움이 되었어."
10083-CVGroup_Battle_TacticalAction_1-1 = "좀 더 유리한 위치로."
10083-CVGroup_Battle_Victory_1-1 = "백화요란의 참모에게, 승리는 당연해."
10083-CVGroup_Battle_Victory_2-1 = "이기는 건, 당연한 일이니까."
10083-CVGroup_CommonSkill-1 = "참고하도록 해."
10083-CVGroup_ExSkill_1-1 = "다음을 위한 수는…."
10083-CVGroup_ExSkill_2-1 = "전황을 뒤흔들 한 수를."
10083-CVGroup_ExSkill_3-1 = "해야할 것은 단 하나."
10083-CVGroup_ExSkill_Level_1-1 = "저기."
10083-CVGroup_ExSkill_Level_2-1 = "봐줄 필요 없어. 전력으로 갈게."
10083-CVGroup_ExSkill_Level_3-1 = "백화요란의 힘, 듬뿍 맛보도록 해."
10083-CVGroup_Formation_In_1-1 = "내 힘이 필요해? …그럴 줄 알았어."
10083-CVGroup_Formation_In_2-1 = "후훗, 날 부를 줄 알았어."
10083-CVGroup_Formation_Select-1 = "……멋대로 하지 그래?"
10083-CVGroup_Growup_1-1 = "이런 걸 건네준다니…. 대체 뭘 원하는 거야?\n그야, 거래란 그런 거잖아."
10083-CVGroup_Growup_2-1 = "뭘 꾸미고 있는지 모르겠지만……. 주는 거라면 거절하지는 않아."
10083-CVGroup_Growup_3-1 = "……그렇게나 싫은 소리를 듣고도, 아직도 이런 걸….\n당신은, 정말… 이상한 사람이야."
10083-CVGroup_Growup_4-1 = "당신 덕분에 나는 성장했어.\n부정은 하지 않아. 이것은 객관적인 사실.\n그러니까…. 감사 인사 정도는 해둘게. 흥."
10083-CVGroup_Relationship_Up_1-1 = "……선생님, 거리, 가깝잖아. …싫다고 하진 않았어."
10083-CVGroup_Relationship_Up_2-1 = "아, 선생님. 어디 갔던 거야? 내 시야에 닿는 곳에 있도록 해."
10083-CVGroup_Relationship_Up_3-1 = "선생님의 호의. 잘 받아두겠어. 다음은 내 차례야. 각오해두도록 해."
10083-CVGroup_Relationship_Up_4-1 = "내가 당신을 의지하고 있는 건 사실이야.\n그러니까 약속해── 당신도 날 의지하겠다, 고."
10083-CVGroup_Tactic_In_1-1 = "백화요란에 대대로 내려오는 병법술. 당신들에게 보여주겠어."
10083-CVGroup_Tactic_In_2-1 = "선생님, 지휘를. 내 작전으로 뒷받침하겠어."
10083-CVGroup_Tactic_Victory_1-1 = "당신의 지휘, 나의 작전. 그 앞에 적이 있을 리가 없지."
10083-CVGroup_Tactic_Victory_2-1 = "내 작전에 점수를 매긴다면…. 10점 만점에 백만 점, 정도려나?"

[translation]
10083-CVGroup_Battle_Buffed_1-1 = "剛才的支援，我會活用於作戰的。"
10083-CVGroup_Battle_Covered_1-1 = "這也是戰略之一。"
10083-CVGroup_Battle_Defense_1-1 = "沒用的。"
10083-CVGroup_Battle_In_1-1 = "因為這是我一手策畫的作戰……我會打頭陣。"
10083-CVGroup_Battle_In_2-1 = "百花繚亂的實力，好好烙印在眼裡吧。"
10083-CVGroup_Battle_Move_1-1 = "準備完畢，向下一個地點移動。"
10083-CVGroup_Battle_Move_2-1 = "與作戰相同。不必擔心。"
10083-CVGroup_Battle_Recovery_1-1 = "謝謝。很有幫助。"
10083-CVGroup_Battle_TacticalAction_1-1 = "移動到更有利的位置。"
10083-CVGroup_Battle_Victory_1-1 = "對百花繚亂的參謀而言，勝利是必然的。"
10083-CVGroup_Battle_Victory_2-1 = "因為取勝，是理所當然的事。"
10083-CVGroup_CommonSkill-1 = "當作參考吧。"
10083-CVGroup_ExSkill_1-1 = "下一手是……"
10083-CVGroup_ExSkill_2-1 = "此為撼動戰局的一手。"
10083-CVGroup_ExSkill_3-1 = "該做的事，僅有一件。"
10083-CVGroup_ExSkill_Level_1-1 = "那邊。"
10083-CVGroup_ExSkill_Level_2-1 = "無須手下留情。權力以赴吧。"
10083-CVGroup_ExSkill_Level_3-1 = "百花繚亂的力量，好好嚐嚐吧。"
10083-CVGroup_Formation_In_1-1 = "我的力量是必須的？\n……我就知道。"
10083-CVGroup_Formation_In_2-1 = "呵呵，就知道你會叫我。"
10083-CVGroup_Formation_Select-1 = "……隨你高興吧？"
10083-CVGroup_Growup_1-1 = "居然把這種東西給我……你到底期望著什麼？\n交易就是這麼回事吧。"
10083-CVGroup_Growup_2-1 = "雖然不知道你有什麼企圖……\n要給我的話我也不會客氣。"
10083-CVGroup_Growup_3-1 = "都已經說了那麼多，居然還把這種東西……\n你真的是個……奇怪的人。"
10083-CVGroup_Growup_4-1 = "我多虧了你而有所成長。\n我不會否認，因為這是客觀的事實。\n所以……姑且跟你說聲謝謝。哼。"
10083-CVGroup_Relationship_Up_1-1 = "……老師，距離，太近了。\n……我沒有說討厭。"
10083-CVGroup_Relationship_Up_2-1 = "啊，老師。\n你到哪裡去了？\n待在我目光所及的地方吧。"
10083-CVGroup_Relationship_Up_3-1 = "老師的好意，我確實收到了。\n下次就輪到我了。做好覺悟吧。"
10083-CVGroup_Relationship_Up_4-1 = "我對你有所依賴是事實。\n所以答應我吧──你也會依賴我。"
10083-CVGroup_Tactic_In_1-1 = "百花繚亂代代相傳的兵法術。\n就讓你們見識見識吧。"
10083-CVGroup_Tactic_In_2-1 = "老師，請指揮。\n我會以我的作戰來支援。"
10083-CVGroup_Tactic_Victory_1-1 = "你的指揮和我的作戰。\n不存在能匹敵之人。"
10083-CVGroup_Tactic_Victory_2-1 = "如果要為我的作戰打分數的話……\n滿分10分得100萬分，大概是這樣吧？"

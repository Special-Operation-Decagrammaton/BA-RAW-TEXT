10058-CVGroup_Tactic_Victory_2-1 = "ผู้ที่ต้องการให้ 'บรรเทาทุกข์'\nฉันจะไม่ปล่อยให้หลุดมือไปแม้แต่คนเดียว รับปากได้เลยค่ะ"

10058-CVGroup_Growup_4-1 = "ถ้าคุณครูสะดวก หลังจากนี้ไปดื่มชาด้วยกันมั้ยคะ?\nฉันอยากตอบแทนคุณครูบ้างน่ะค่ะ"
10058-CVGroup_Relationship_Up_1-1 = "ถึงมันจะเป็นความรู้สึกที่ฉันไม่คุ้นเคยเท่าไหร่...แต่รู้สึกนุ่มฟู...\nและอบอุ่นหัวใจมาก... แล้วก็รู้สึกแปลกๆ ด้วยค่ะ"
10058-CVGroup_Relationship_Up_2-1 = "รู้ตัวแล้วสินะคะ? คุณครู... ทำให้ฉันค่อยๆ เปลี่ยนไปทีละนิด..."
10058-CVGroup_Relationship_Up_3-1 = "ถ้าเกิด... ฉันพอจะเป็นกำลังให้คุณครูได้..."
10058-CVGroup_Relationship_Up_4-1 = "เพราะคุณครูมอบสิ่งล้ำค่าเกินกว่าจะตอบแทนได้ให้ฉันเสมอๆ เลยนี่คะ...\nเป็นคนที่ยุ่งยากจริงๆ เลยนะคะ... ฮุฮุ"
10058-CVGroup_Tactic_In_1-1 = "ให้เป็นหน้าที่ของฉันเองค่ะ ฉันจะนำทางเองค่ะ"
10058-CVGroup_Tactic_In_2-1 = "ขอบคุณทุกๆ คนมากค่ะ"

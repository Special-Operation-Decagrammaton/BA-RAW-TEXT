[translation]
10058-CVGroup_Battle_Buffed_1-1 = "感激不盡。"
10058-CVGroup_Battle_Defense_1-1 = "我會將其無力化！"
10058-CVGroup_Battle_In_1-1 = "我會到前方去，背後就託付給您了。"
10058-CVGroup_Battle_In_2-1 = "救護騎士團，要上了。"
10058-CVGroup_Battle_Move_1-1 = "前進吧。"
10058-CVGroup_Battle_Move_2-1 = "進行移動。"
10058-CVGroup_Battle_Recovery_1-1 = "非常感謝。舒服多了。"
10058-CVGroup_Battle_TacticalAction_1-1 = "接下來該往哪裡呢？"
10058-CVGroup_Battle_Victory_1-1 = "順利完成了救護。"
10058-CVGroup_Battle_Victory_2-1 = "是我們的勝利。不過，切勿大意哦。"
10058-CVGroup_CommonSkill-1 = "我會全力以赴！"
10058-CVGroup_ExSkill_1-1 = "我要上了！"
10058-CVGroup_ExSkill_2-1 = "是那裡呢。"
10058-CVGroup_ExSkill_3-1 = "請退後！"
10058-CVGroup_ExSkill_Level_1-1 = "向戰場伸出救護之手！"
10058-CVGroup_ExSkill_Level_2-1 = "胸懷榮耀和信念！"
10058-CVGroup_ExSkill_Level_3-1 = "直到最後的那個瞬間！"
10058-CVGroup_Formation_In_1-1 = "我明白了，出發吧。"
10058-CVGroup_Formation_In_2-1 = "輪到救護騎士團登場了呢。"
10058-CVGroup_Formation_Select-1 = "發，發生什麼事了！？"
10058-CVGroup_Growup_1-1 = "為何……要對我做到這種地步……？"
10058-CVGroup_Growup_2-1 = "謝謝您，老師。"
10058-CVGroup_Growup_3-1 = "呵呵，變成是我接受救護了呢。"
10058-CVGroup_Growup_4-1 = "不介意的話，下次要不要一起喝杯茶呢？\n我希望能有所回報。"
10058-CVGroup_Relationship_Up_1-1 = "是不太習慣的感情呢……\n鬆鬆軟軟……胸口變得暖和……又有點癢癢的感覺。"
10058-CVGroup_Relationship_Up_2-1 = "您注意到了嗎？\n……老師正在一點一滴地改變著我。"
10058-CVGroup_Relationship_Up_3-1 = "我……要是有能幫上忙的地方……"
10058-CVGroup_Relationship_Up_4-1 = "老師您，總是給予我多到無以為報的恩惠呢……\n真是個令人傷腦筋的人呢……呵呵。"
10058-CVGroup_Tactic_In_1-1 = "請交給我。我將身先士卒。"
10058-CVGroup_Tactic_In_2-1 = "將恩惠施予所有人。"
10058-CVGroup_Tactic_Victory_1-1 = "各位，有沒有哪裡受傷？"
10058-CVGroup_Tactic_Victory_2-1 = "任何需要「救護」的人，我都不會放過。\n這是理所當然的。"

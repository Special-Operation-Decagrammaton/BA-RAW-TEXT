10062-CVGroup_Formation_In_2-1 = "由我來排除一切阻礙吧。\n那就是我的工作。"
10062-CVGroup_Formation_Select-1 = "原來如此……這就是那個……"
10062-CVGroup_Growup_1-1 = "完全，雖然還稱不上……不過離完美更進一步了。"
10062-CVGroup_Growup_2-1 = "這樣一來，就能更順利的進行老師的輔佐了。"
10062-CVGroup_Growup_3-1 = "謝謝您，老師。\n我會盡力回應您的期待。"
10062-CVGroup_Growup_4-1 = "您願意相信我一事，十分感謝。\n為求不愧對C&C之名，我會盡力而為。"
10062-CVGroup_Relationship_Up_1-1 = "與老師的羈絆更加深厚了呢。\n沒錯……因此，還請老師更加關注我哦。"
10062-CVGroup_Relationship_Up_2-1 = "所謂羈絆，可說是締結於人和人之間特別的關係。\n也就是說，老師成為了我特別的對象，就是這麼回事。"
10062-CVGroup_Relationship_Up_3-1 = "……別看我這樣，我心中也有各式各樣的感情在不斷打轉。\n所以老師……也請您以相同的感情回應我哦。"
10062-CVGroup_Relationship_Up_4-1 = "互相交流彼此心裡的想法，就是這種情況，對吧……\n請別不發一語……不然不就會讓人很害羞嗎。"
10062-CVGroup_Tactic_In_1-1 = "僅是完成力所能及的事而已。"
10062-CVGroup_Tactic_In_2-1 = "請下指示。"
10062-CVGroup_Tactic_Victory_1-1 = "獲得了勝利。\n呀齁……您覺得如何呢？"
10062-CVGroup_Tactic_Victory_2-1 = "任務完成。\n呵呵，有讓您滿足嗎？"

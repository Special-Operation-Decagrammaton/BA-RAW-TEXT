[translation]
10062-CVGroup_Battle_Buffed_1-1 = "도움이 되었습니다."
10062-CVGroup_Battle_Defense_1-1 = "그게 전부인가요?"
10062-CVGroup_Battle_In_1-1 = "명령을 수행하겠습니다."
10062-CVGroup_Battle_In_2-1 = "분부대로."
10062-CVGroup_Battle_Move_1-1 = "이동합니다."
10062-CVGroup_Battle_Move_2-1 = "다음 지역은 어디죠?"
10062-CVGroup_Battle_Recovery_1-1 = "감사합니다."
10062-CVGroup_Battle_TacticalAction_1-1 = "다음으로 향합니다."
10062-CVGroup_Battle_Victory_1-1 = "선생님, 보고 계신가요? 피스, 피스-"
10062-CVGroup_Battle_Victory_2-1 = "다음으로 가죠. 브이, 브이-"
10062-CVGroup_CommonSkill-1 = "갑니다."
10062-CVGroup_CommonSkill_2-1 = "이야아아아앗!"
10062-CVGroup_ExSkill_1-1 = "아비 에슈흐, 이행."
10062-CVGroup_ExSkill_2-1 = "좌표를 송신합니다."
10062-CVGroup_ExSkill_3-1 = "파워드 슈트, 기동."
10062-CVGroup_ExSkill_4-1 = "이것이 저의, 전력……!"
10062-CVGroup_ExSkill_5-1 = "목표 확인. 조준."
10062-CVGroup_ExSkill_6-1 = "아비 에슈흐, 섬멸 모드."
10062-CVGroup_ExSkill_Level_1-1 = "장착 완료."
10062-CVGroup_ExSkill_Level_2-1 = "전투, 개시합니다."
10062-CVGroup_ExSkill_Level_3-1 = "전력으로 가겠습니다."
10062-CVGroup_ExSkill_Level_4-1 = "하아앗!"
10062-CVGroup_ExSkill_Level_5-1 = "발사!"
10062-CVGroup_ExSkill_Level_6-1 = "파이어!"
10062-CVGroup_Formation_In_1-1 = "그러면, 시작하겠습니다."
10062-CVGroup_Formation_In_2-1 = "가로막는 모든 것을 배제하겠습니다. 그것이 제 일입니다."
10062-CVGroup_Formation_Select-1 = "과연……. 이것이 말로만 듣던."
10062-CVGroup_Growup_1-1 = "아직 완전, 하다고는 할 수 없습니다만…\n보다 한층 더 완벽에 가까워졌습니다."
10062-CVGroup_Growup_2-1 = "이로써 선생님을 보다 잘 보좌할 수 있겠군요."
10062-CVGroup_Growup_3-1 = "감사합니다. 선생님. 기대에 부응할 수 있도록 최선을 다하겠습니다."
10062-CVGroup_Growup_4-1 = "저를 믿어 주신 것, 감사드립니다. \nC&C의 이름에 부끄럽지 않도록, 노력하겠습니다."
10062-CVGroup_Relationship_Up_1-1 = "선생님과의 인연이 더 깊어졌네요.\n네… 그러니까, 선생님은 좀 더 저를 봐주셔야 해요."
10062-CVGroup_Relationship_Up_2-1 = "인연이라는 것은 사람들 사이에 맺어지는 특별한 관계라고 하죠.\n즉 선생님은 저의 특별한 분이 되었다. 라는 이야기입니다."
10062-CVGroup_Relationship_Up_3-1 = "……이래 봬도, 제 안에서 여러 가지 감정이 소용돌이치고 있습니다.\n그러니 선생님…… 같은 만큼의 감정으로 돌려주세요."
10062-CVGroup_Relationship_Up_4-1 = "서로 마음을 나눈다는 것은, 이런 것, 이겠죠….\n침묵하지 마세요… 부끄럽잖습니까."
10062-CVGroup_Tactic_In_1-1 = "할 수 있는 일을 할 뿐입니다."
10062-CVGroup_Tactic_In_2-1 = "부디 지시를."
10062-CVGroup_Tactic_Victory_1-1 = "이겼습니다. 얏호- 어떠셨나요."
10062-CVGroup_Tactic_Victory_2-1 = "임무 완료입니다. 후후. 만족하셨나요?"

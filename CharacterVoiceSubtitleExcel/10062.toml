10062-CVGroup_Growup_2-1 = "ถ้าอย่างนี้ฉันก็คงจะช่วยเหลือคุณครูได้ดีขึ้นแล้วสินะคะ"
10062-CVGroup_Growup_3-1 = "ขอบคุณค่ะ คุณครู\nฉันจะพยายามให้เต็มที่เพื่อตอบแทนความคาดหวังค่ะ"
10062-CVGroup_Growup_4-1 = "ขอบคุณที่เชื่อในตัวฉันค่ะ\nฉันจะพยายามเพื่อไม่ให้เสียชื่อของ C&C ค่ะ"
10062-CVGroup_Relationship_Up_1-1 = "ความผูกพันระหว่างฉันกับคุณครูลึกซึ้งขึ้นอีกขั้นแล้วนะคะ\nค่ะ... เพราะงั้นคุณครูต้องคอยมองฉันให้มากขึ้นด้วยนะคะ"
10062-CVGroup_Relationship_Up_2-1 = "ว่ากันว่าความผูกพันเป็นความสัมพันธ์พิเศษที่เชื่อมผู้คนเข้าด้วยกันสินะคะ\nเพราะงั้นก็หมายความว่าคุณครูเป็นคนสำคัญของฉันแล้วนะคะ"
10062-CVGroup_Relationship_Up_3-1 = "เห็นอย่างนี้... ตอนนี้ในใจฉันก็มีความรู้สึกหลายๆ อย่างปนกันอยู่นะคะ\nเพราะงั้น... คุณครูก็ช่วยรู้สึกให้เท่าๆ ฉันด้วยนะคะ"
10062-CVGroup_Relationship_Up_4-1 = "การแบ่งปันความรู้สึกให้กันและกัน... เป็นแบบนี้เองสินะคะ\nอย่าเงียบสิคะ แบบนี้มันน่าอายนะคะ"

[translation]
20049-CVGroup_CommonSkill-1 = "กะ... ก็แค่เอามาเผื่อไว้เฉยๆ เองน่ะ!"
20049-CVGroup_ExSkill_1-1 = "ไหนดูซิ...\nว้ากกก?! โล่งอกไปที..."
20049-CVGroup_ExSkill_2-1 = "ถ้าเป็นแบบนี้...\nอ๊ะ?! ฮู่ว..."
20049-CVGroup_ExSkill_3-1 = "จบรึยังนะ...? ไม่ได้นะ!\nปลอดภัยแล้วสินะ..."
20049-CVGroup_ExSkill_Level_1-1 = "ถึงเวลาเล่นน้ำแล้ว"
20049-CVGroup_ExSkill_Level_2-1 = "ยิงปืนใหญ่น้ำ!"
20049-CVGroup_ExSkill_Level_3-1 = "ออกไปซะ"
20049-CVGroup_Formation_In_1-1 = "ทะเล... ไม่เห็นสนุกเลย"
20049-CVGroup_Formation_In_2-1 = "เฮ้อ... จะรับผิดชอบใช่มั้ย?"
20049-CVGroup_Formation_Select-1 = "เข้าใจแล้ว... แค่ไปเล่นสนุกก็พอใช่มั้ย?"
20049-CVGroup_Growup_1-1 = "ก็ไม่ได้สนุกอะไรหรอกนะ\nคุณครูเป็นคนพาฉันมา เพราะงั้นก็รับผิดชอบทำให้ฉันสนุกด้วยล่ะ"
20049-CVGroup_Growup_2-1 = "คนที่ทำให้ฉันเป็นแบบนี้คือคุณครูนี่นา\nเพราะงั้นคอยดูแลจนถึงที่สุดด้วยล่ะ..."
20049-CVGroup_Growup_3-1 = "แบบนี้ก็อาจไม่แย่เท่าไรนะ...\nฉันโกหกน่ะ ลืมไปเถอะ"
20049-CVGroup_Growup_4-1 = "ทำไมหันมามองบ่อยแบบนั้นล่ะ...?\nก็บอกแล้วไงว่าฉันไม่ได้สนุกเลยน่ะ"
20049-CVGroup_Relationship_Up_1-1 = "ไม่ต้องมองเลย\nเปล่า ฉันไม่ได้เขินสักหน่อย...!"
20049-CVGroup_Relationship_Up_2-1 = "เข้าใจแล้ว... จริงๆ เลยเชียว\nอะไรแบบนี้ มันก็ไม่แย่เท่าไรนะ... ฉันพูดแล้วนะ"
20049-CVGroup_Relationship_Up_3-1 = "ถ้าพรุ่งนี้... ไม่เลวร้ายจริงๆ ละก็...\nหลังจากนี้ฉันจะคอยพิสูจน์เอง"
20049-CVGroup_Relationship_Up_4-1 = "ทำให้ฉันเป็นแบบนี้แล้ว...\nแต่กลับไม่ได้ตั้งใจจะรับผิดชอบเลยสินะ\n...'ถ้าเป็นสิ่งที่ทำได้ก็ยินดีทำให้ทุกอย่าง' งั้นเหรอ?\nระ... รู้ตัวรึเปล่าว่าพูดอะไรออกมาน่ะ?!"

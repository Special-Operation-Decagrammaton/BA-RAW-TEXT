[translation]
20049-CVGroup_CommonSkill-1 = "這，這只是順便帶來的而已……！"
20049-CVGroup_ExSkill_1-1 = "呼……啊！\n太好了……"
20049-CVGroup_ExSkill_2-1 = "這樣就行了……\n唔！？\n呼……"
20049-CVGroup_ExSkill_3-1 = "完成了……\n不行！\n平安無事呢……"
20049-CVGroup_ExSkill_Level_1-1 = "玩水的時間。"
20049-CVGroup_ExSkill_Level_2-1 = "水槍，發射。"
20049-CVGroup_ExSkill_Level_3-1 = "溺水吧。"
20049-CVGroup_Formation_In_1-1 = "大海……不怎麼好玩。"
20049-CVGroup_Formation_In_2-1 = "唉……你會負責的吧？"
20049-CVGroup_Formation_Select-1 = "知道了……我玩就行了吧？"
20049-CVGroup_Growup_1-1 = "我並沒有在享受哦。\n既然是老師帶我來的，就負責讓我開心吧。"
20049-CVGroup_Growup_2-1 = "把我變成這樣的是老師吧。\n……要好好照顧到最後。"
20049-CVGroup_Growup_3-1 = "這樣也不壞吧……\n……騙你的，忘了吧。"
20049-CVGroup_Growup_4-1 = "你目不轉睛地在看什麼……？\n就說了我沒在享受。"
20049-CVGroup_Relationship_Up_1-1 = "不要看我。\n沒有，不是因為我害羞……！"
20049-CVGroup_Relationship_Up_2-1 = "知道了啦……真是的。\n這樣也不壞呢……好，我說了哦。"
20049-CVGroup_Relationship_Up_3-1 = "如果要說明天……真的不是這麼糟的東西的話……\n今後，也繼續證明下去吧。"
20049-CVGroup_Relationship_Up_4-1 = "都把我弄成這樣了……\n你也沒打算負責對吧。\n……「能做的任何事都會做」？\n你，你知道自己在說什麼嗎！？"

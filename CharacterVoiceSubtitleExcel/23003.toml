[translation]
23003-CVGroup_CommonSkill-1 = "這會痛的唷。"
23003-CVGroup_ExSkill_1-1 = "電磁脈衝，運作開始。"
23003-CVGroup_ExSkill_2-1 = "EMP無人機啟動。"
23003-CVGroup_ExSkill_3-1 = "第一階段發射器，運作開始。"
23003-CVGroup_ExSkill_Level_1-1 = "將裝備停止。"
23003-CVGroup_ExSkill_Level_2-1 = "如我所料啊。"
23003-CVGroup_ExSkill_Level_3-1 = "大家，退到後面去吧。"
23003-CVGroup_Formation_In_1-1 = "是展現並證明我實力的機會呢。"
23003-CVGroup_Formation_In_2-1 = "交給我吧。"
23003-CVGroup_Growup_1-1 = "哼嗯……這是個驚人的結果呢。"
23003-CVGroup_Growup_2-1 = "還需要更多的資料呢。"
23003-CVGroup_Growup_3-1 = "這股湧出的力量有辦法數據化嗎？"
23003-CVGroup_Growup_4-1 = "對未知的知識進行探求，永遠是件開心的事呢。"
23003-CVGroup_Relationship_Up_1-1 = "這次研究結束之後……\n下次想試著研究老師呢。"
23003-CVGroup_Relationship_Up_2-1 = "要是人的心也能用顯微鏡加以觀察就好了。"
23003-CVGroup_Relationship_Up_3-1 = "被老師吸引的這顆心，能用什麼樣的力學來證明呢？"
23003-CVGroup_Relationship_Up_4-1 = "能不能用我的能力來倒轉時間？這我不好說。\n不過我希望能永遠享受這個瞬間。"

[translation]
10027-CVGroup_Battle_Buffed_1-1 = "幫大忙了，這樣就……！"
10027-CVGroup_Battle_Covered_1-1 = "發現掩蔽物。"
10027-CVGroup_Battle_Defense_1-1 = "只要打不中就沒有意義。"
10027-CVGroup_Battle_In_1-1 = "並非火力支援，而是位居前線雖然不太習慣……\n沒問題，交給我吧。"
10027-CVGroup_Battle_In_2-1 = "並非只能進行火力支援這點，就由我來證明。\n請看著吧，老師。"
10027-CVGroup_Battle_Move_1-1 = "開始移動。\n老師，請下指示。"
10027-CVGroup_Battle_Move_2-1 = "向下一個區域移動。"
10027-CVGroup_Battle_Recovery_1-1 = "感謝支援。"
10027-CVGroup_Battle_TacticalAction_1-1 = "往下一個地點。"
10027-CVGroup_Battle_Victory_1-1 = "作戰成功。\n辛苦了，老師的指揮很完美。"
10027-CVGroup_Battle_Victory_2-1 = "Mission Complete。\n這也是多虧了老師的指揮。"
10027-CVGroup_CommonSkill-1 = "要上囉！"
10027-CVGroup_ExSkill_1-1 = "特殊異常並未……\n……！發現目標！"
10027-CVGroup_ExSkill_2-1 = "目前為止……\n ……不，找到了！"
10027-CVGroup_ExSkill_3-1 = "目標……已捕捉！"
10027-CVGroup_ExSkill_Level_1-1 = "別想逃！"
10027-CVGroup_ExSkill_Level_2-1 = "呼！"
10027-CVGroup_ExSkill_Level_3-1 = "Fire！"
10027-CVGroup_Formation_In_1-1 = "嗯，我認為是個很好的選擇。"
10027-CVGroup_Formation_In_2-1 = "不會讓你後悔。"
10027-CVGroup_Formation_Select-1 = "原來如此……"
10027-CVGroup_Growup_1-1 = "謝謝你，老師。\n這個選擇，我不會讓你後悔的。"
10027-CVGroup_Growup_2-1 = "你的期待，我一定會用成果來回應。"
10027-CVGroup_Growup_3-1 = "真厲害……\n這樣一來，似乎又更能戰鬥了。"
10027-CVGroup_Growup_4-1 = "我對老師，總是一味地像這樣受到幫助。\n這份恩情，一定會以某種形式來……"
10027-CVGroup_Relationship_Up_1-1 = "這種心情是……\n啊，不……沒什麼。"
10027-CVGroup_Relationship_Up_2-1 = "我一直都感謝著老師。\n是真的，不是客套話。"
10027-CVGroup_Relationship_Up_3-1 = "我，雖然不是很擅長用言語表達……\n不過，像這樣對老師所說的一切，全都是真的。"
10027-CVGroup_Relationship_Up_4-1 = "雖然想為你做點什麼來回報……\n但現在的我，也只能先讓作戰成功了……"
10027-CVGroup_Tactic_In_1-1 = "開始作戰。"
10027-CVGroup_Tactic_In_2-1 = "沒問題，走吧。"
10027-CVGroup_Tactic_Victory_1-1 = "沒必要感到驚訝。這是理所當然的結果。"
10027-CVGroup_Tactic_Victory_2-1 = "辛苦了，老師。\n是場出色的指揮。"

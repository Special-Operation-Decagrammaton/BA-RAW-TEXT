10027-CVGroup_Battle_In_1-1 = "It's a little foreign to me, being on the front lines, rather than providing support. It's okay. Leave it to me."
10027-CVGroup_Battle_In_2-1 = "I'll prove that fire support isn't my only strength. Watch over me, Sensei."
10027-CVGroup_Battle_Move_1-1 = "Time to mobilize. Your orders, Sensei?"
10027-CVGroup_Battle_Move_2-1 = "Move out to the next area."
10027-CVGroup_Battle_Recovery_1-1 = "Thank you for your support."
10027-CVGroup_Battle_TacticalAction_1-1 = "Move out to the next site."
10027-CVGroup_Battle_Victory_1-1 = "Operation completed. Good work. Your leadership was flawless, Sensei."
10027-CVGroup_Battle_Victory_2-1 = "Task complete. All thanks to your guidance, Sensei."
10027-CVGroup_CommonSkill-1 = "Moving out!"
10027-CVGroup_ExSkill_1-1 = "No suspicious— Ah! Target located!"
10027-CVGroup_ExSkill_2-1 = "Nothing to report— There! I see something!"
10027-CVGroup_ExSkill_3-1 = "Target...found!"
10027-CVGroup_ExSkill_Level_1-1 = "You're not getting away!"
10027-CVGroup_ExSkill_Level_2-1 = "HYAH!"
10027-CVGroup_ExSkill_Level_3-1 = "Fire!"
10027-CVGroup_Formation_In_1-1 = "Yes, I believe you've made a splendid choice."

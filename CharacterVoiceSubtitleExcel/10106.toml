[translation]
10106-CVGroup_Battle_Buffed_1-1 = "ฉันจะต้องตอบแทนคุณครูอย่างแน่นอนค่ะ"
10106-CVGroup_Battle_Covered_1-1 = "ไม่ได้ยินเลยค่ะ"
10106-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอกค่ะ"
10106-CVGroup_Battle_In_1-1 = "เดี๋ยวฉันจะทำให้คุณได้ไปสบายเองค่ะ"
10106-CVGroup_Battle_In_2-1 = "บทเพลงนี้... ส่งไปถึงทุกคนหรือเปล่าคะ?"
10106-CVGroup_Battle_Move_1-1 = "ยังไม่จบนะคะ"
10106-CVGroup_Battle_Move_2-1 = "ไปยังพาร์ทต่อไป!"
10106-CVGroup_Battle_Recovery_1-1 = "ขอบคุณมากเลยค่ะ"
10106-CVGroup_Battle_TacticalAction_1-1 = "ย่ะ!"
10106-CVGroup_Battle_Victory_1-1 = "เป็นช่วงเวลาที่ยอดเยี่ยมมากเลยค่ะ สนุกกับการแสดงของเราหรือเปล่าคะ?"
10106-CVGroup_Battle_Victory_2-1 = "ฉันจะเข้าใกล้ทุกคนอีกสักนิด... ด้วยสิ่งนี้ได้หรือเปล่าคะ?"
10106-CVGroup_CommonSkill-1 = "ยะ... ยะ... อย่างนี้เหรอคะ! ปิ้วๆ~!"
10106-CVGroup_ExSkill_1-1 = "ฉันจับตาดูอยู่นะคะ... อะ...อื้อ!?"
10106-CVGroup_ExSkill_2-1 = "เอาละ มาทางนี้... เอ๋!?"
10106-CVGroup_ExSkill_3-1 = "ฮุฮุ ฮุฮุฮุ... หืม!?"
10106-CVGroup_ExSkill_Level_1-1 = "ทะ... ทำไมล่ะ?! ได้ยังไง...?"
10106-CVGroup_ExSkill_Level_2-1 = "มีอะไรผิดพลาดกันนะคะ....?"
10106-CVGroup_ExSkill_Level_3-1 = "ทำไมถึงเป็นแบบนี้ได้..."
10106-CVGroup_Formation_In_1-1 = "ถึงเวลาแล้วสินะคะ"
10106-CVGroup_Formation_In_2-1 = "จะไปล่ะนะคะ"
10106-CVGroup_Formation_Select-1 = "ตั้งตารอได้เลยค่ะ... มะ... หมายถึง... หมายถึงการแสดง... ค่ะ"
10106-CVGroup_Growup_1-1 = "ต้องคอยตื่นตัวอยู่ตลอดแท้ๆ\nแต่ถ้าคุณครูอยู่ด้วยแบบนี้... ฉันคงเอื่อยเฉื่อยแน่ๆ เลยค่ะ"
10106-CVGroup_Growup_2-1 = "ขอบคุณค่ะ คุณครู บุญคุณครั้งนี้... ฉันจะตอบแทนยังไงดีคะ?"
10106-CVGroup_Growup_3-1 = "รู้สึกพลังท่วมท้นเลยค่ะ\nคือว่า... การพูดแบบนี้อาจทำให้เกิดการเข้าใจผิดได้สินะคะ"
10106-CVGroup_Growup_4-1 = "ฉันต้องพยายามอย่างหนักในทุกๆ วัน...\nแต่บางครั้งการมีคนช่วยแบบนี้ก็ดีเหมือนกันนะคะ"
10106-CVGroup_Relationship_Up_1-1 = "คือ... ถ้าคุณครูไม่ว่าอะไรละก็ พวกเรามาลอง... ร้องเพลงดูโอ้กันดีมั้ยคะ?"
10106-CVGroup_Relationship_Up_2-1 = "จะต้องสื่อสารยังไง ทุกคนถึงจะไม่เข้าใจผิดกันนะคะ...?"
10106-CVGroup_Relationship_Up_3-1 = "ความรู้สึกนี้อธิบายออกมาเป็นคำพูดยากจังเลย...\nฉันรู้ว่าไม่ควรปล่อยไว้แบบนี้..."
10106-CVGroup_Relationship_Up_4-1 = "ฉันจะอธิษฐานเพื่อคุณครูค่ะ...\nหรือว่าฉันจะ 「ร้องเพลง」 แทนดีนะคะ?"
10106-CVGroup_Tactic_In_1-1 = "เท่านี้คง... ไม่เป็นไรแล้วละค่ะ"
10106-CVGroup_Tactic_In_2-1 = "ผู้ชมมาเยอะจังเลยค่ะ... หมายถึงไลฟ์ค่ะ"
10106-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ... แค่นั้นเองเหรอคะ?"
10106-CVGroup_Tactic_Victory_2-1 = "เป็นไลฟ์ที่สนุกมากเลยค่ะ อยากแสดงอีกจังเลยค่ะ"

[translation]
10106-CVGroup_Battle_Buffed_1-1 = "I'll repay you for this."
10106-CVGroup_Battle_Covered_1-1 = "I can't hear you."
10106-CVGroup_Battle_Defense_1-1 = "It's no use."
10106-CVGroup_Battle_In_1-1 = "I'll put you at peace soon."
10106-CVGroup_Battle_In_2-1 = "Is my song reaching everyone?"
10106-CVGroup_Battle_Move_1-1 = "There's still some left."
10106-CVGroup_Battle_Move_2-1 = "To the next part!"
10106-CVGroup_Battle_Recovery_1-1 = "Thank you so much."
10106-CVGroup_Battle_TacticalAction_1-1 = "Ha!"
10106-CVGroup_Battle_Victory_1-1 = "That was a great time. Did you enjoy the performance?"
10106-CVGroup_Battle_Victory_2-1 = "Was I...able to get a bit closer to everyone with this?"
10106-CVGroup_CommonSkill-1 = "Uh, um... So like this! Twinkle!"
10106-CVGroup_ExSkill_1-1 = "I'm watching... H-Huh?!"
10106-CVGroup_ExSkill_2-1 = "Okay, this way... Eeh?!"
10106-CVGroup_ExSkill_3-1 = "Ehe, heehee... ...Eeh?!"
10106-CVGroup_ExSkill_Level_1-1 = "H-How?! How...?"
10106-CVGroup_ExSkill_Level_2-1 = "Was something wrong...?"
10106-CVGroup_ExSkill_Level_3-1 = "How did this happen...?"
10106-CVGroup_Formation_In_1-1 = "It's time."
10106-CVGroup_Formation_In_2-1 = "Let us go."
10106-CVGroup_Formation_Select-1 = "You can look forward to it. ...P-Performance. I meant my performance..."
10106-CVGroup_Growup_1-1 = "I need to stay on guard, but when I'm with you... It feels like I loosen up too much."
10106-CVGroup_Growup_2-1 = "Thank you, Sensei. How will I ever repay this debt?"
10106-CVGroup_Growup_3-1 = "I feel my strength overflowing. Well... Phrasing it that way might cause some misunderstandings."
10106-CVGroup_Growup_4-1 = "I need to commit to improving every day...but receiving a helping hand here and there is nice as well."
10106-CVGroup_Relationship_Up_1-1 = "Um... If you'd be open to it, how about...a duet?"
10106-CVGroup_Relationship_Up_2-1 = "How should I speak to avoid causing misunderstandings with the others?"
10106-CVGroup_Relationship_Up_3-1 = "It's difficult to explain this emotion... I know things can't stay like this, but..."
10106-CVGroup_Relationship_Up_4-1 = "I'll pray for Sensei. ...Or should I say I'll sing for you instead?"
10106-CVGroup_Tactic_In_1-1 = "This much should be fine."
10106-CVGroup_Tactic_In_2-1 = "We have many guests. ...I mean at the concert."
10106-CVGroup_Tactic_Victory_1-1 = "Heehee... That's it?"
10106-CVGroup_Tactic_Victory_2-1 = "That was a fun concert. I'd like to perform again."

[translation]
10106-CVGroup_Battle_Buffed_1-1 = "이건 꼭 갚아 드리죠."
10106-CVGroup_Battle_Covered_1-1 = "들리지 않는군요."
10106-CVGroup_Battle_Defense_1-1 = "소용없습니다."
10106-CVGroup_Battle_In_1-1 = "곧 편안하게 만들어 드리죠."
10106-CVGroup_Battle_In_2-1 = "이 노랫소리, 여러분께 닿고 있나요?"
10106-CVGroup_Battle_Move_1-1 = "아직 남았답니다."
10106-CVGroup_Battle_Move_2-1 = "다음 파트로!"
10106-CVGroup_Battle_Recovery_1-1 = "정말 감사합니다."
10106-CVGroup_Battle_TacticalAction_1-1 = "핫!"
10106-CVGroup_Battle_Victory_1-1 = "멋진 시간이었어요. 무대는 즐기셨는지요?"
10106-CVGroup_Battle_Victory_2-1 = "이걸로…… 모두에게 조금은 다가갈 수 있었을까요?"
10106-CVGroup_CommonSkill-1 = "어, 어…… 이렇게군요! 뾰로롱~!"
10106-CVGroup_ExSkill_1-1 = "지켜보고 있답니다…… 으, 으응!?"
10106-CVGroup_ExSkill_2-1 = "자, 이리로……. 흐에!?"
10106-CVGroup_ExSkill_3-1 = "우후, 후후후…… ……으응!?"
10106-CVGroup_ExSkill_Level_1-1 = "어, 어째서!? 어째서……?"
10106-CVGroup_ExSkill_Level_2-1 = "뭔가 틀린 건가요……?"
10106-CVGroup_ExSkill_Level_3-1 = "이렇게 되다니……."
10106-CVGroup_Formation_In_1-1 = "드디어 때가 왔군요."
10106-CVGroup_Formation_In_2-1 = "가실까요."
10106-CVGroup_Formation_Select-1 = "기대하셔도 좋습니다. ……고, 공연. 공연 이야기……입니다……."
10106-CVGroup_Growup_1-1 = "스스로를 경계해야 하는데, 선생님과 있으면…… 무뎌지는 느낌입니다."
10106-CVGroup_Growup_2-1 = "감사합니다, 선생님. 이 은혜, 무엇으로 돌려드릴 수 있을까요?"
10106-CVGroup_Growup_3-1 = "힘이 넘쳐나는 것 같아요.\n그게…… 이 표현은 어폐를 낳을지도 모르겠네요."
10106-CVGroup_Growup_4-1 = "하루하루 정진해 가야겠지만……. 가끔은 이렇게 도와주시는 것도 좋네요."
10106-CVGroup_Relationship_Up_1-1 = "그…… 혹시 선생님이 괜찮으시다면 듀엣 같은 거…… 어떠세요?"
10106-CVGroup_Relationship_Up_2-1 = "어떻게 전하면 모두에게 오해가 생기지 않을까요……?"
10106-CVGroup_Relationship_Up_3-1 = "이 감정을 설명하기가 어려워서…….\n이대로는 안 된다는 건 알고 있는데……."
10106-CVGroup_Relationship_Up_4-1 = "선생님을 위해 기도하겠습니다. ……「노래합시다」가 맞는 것일까요?"
10106-CVGroup_Tactic_In_1-1 = "괜찮겠지요, 이 정도는."
10106-CVGroup_Tactic_In_2-1 = "손님들이 많이 오셨네요. ……라이브 얘기입니다."
10106-CVGroup_Tactic_Victory_1-1 = "후후…… 이 정도였나요?"
10106-CVGroup_Tactic_Victory_2-1 = "즐거운 라이브였어요. 또 하고 싶네요."

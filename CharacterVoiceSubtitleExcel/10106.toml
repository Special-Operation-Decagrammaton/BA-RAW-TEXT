[translation]
10106-CVGroup_Battle_Buffed_1-1 = "請務必讓我報答。"
10106-CVGroup_Battle_Covered_1-1 = "我聽不見。"
10106-CVGroup_Battle_Defense_1-1 = "沒用的。"
10106-CVGroup_Battle_In_1-1 = "很快就讓你解脫。"
10106-CVGroup_Battle_In_2-1 = "這陣歌聲，有傳達給各位嗎？"
10106-CVGroup_Battle_Move_1-1 = "還沒有結束。"
10106-CVGroup_Battle_Move_2-1 = "進入下一個段落！"
10106-CVGroup_Battle_Recovery_1-1 = "打從心底致上謝意。"
10106-CVGroup_Battle_TacticalAction_1-1 = "哈！"
10106-CVGroup_Battle_Victory_1-1 = "真是段美好的時光。\n表演是否有讓您樂在其中呢？"
10106-CVGroup_Battle_Victory_2-1 = "這樣一來……是否就能更接近大家了呢？"
10106-CVGroup_CommonSkill-1 = "那，那個……這樣對吧！\n哇比～！"
10106-CVGroup_ExSkill_1-1 = "我隨時都守望著……\n奇，奇怪！？"
10106-CVGroup_ExSkill_2-1 = "來吧，請來這邊……\n咦咦！？"
10106-CVGroup_ExSkill_3-1 = "呵呵……唔呵呵……\n……咦，咦咦！？"
10106-CVGroup_ExSkill_Level_1-1 = "為，為什麼！？\n怎麼會呢……？"
10106-CVGroup_ExSkill_Level_2-1 = "是搞錯了什麼嗎……？"
10106-CVGroup_ExSkill_Level_3-1 = "居然會變成這樣……"
10106-CVGroup_Formation_In_1-1 = "時候終於到了呢。"
10106-CVGroup_Formation_In_2-1 = "出發吧。"
10106-CVGroup_Formation_Select-1 = "敬請期待哦。\n……啊……是，是在說表演……的事……"
10106-CVGroup_Growup_1-1 = "明明必須克制自己才行……\n只要跟老師待在一起，就會不自覺地鬆懈下來。"
10106-CVGroup_Growup_2-1 = "謝謝您，老師。\n這份恩情……究竟該如何回報呢。"
10106-CVGroup_Growup_3-1 = "有股力量湧現出來的感覺。\n那個……雖然這種說法可能會產生誤會。"
10106-CVGroup_Growup_4-1 = "雖說應該日日持續精進……\n偶爾像這樣受人幫助也不錯呢。"
10106-CVGroup_Relationship_Up_1-1 = "那個……如果老師不介意的話，\n來首二重唱……怎麼樣呢？"
10106-CVGroup_Relationship_Up_2-1 = "該如何傳達，\n才不會讓大家誤會呢……？"
10106-CVGroup_Relationship_Up_3-1 = "這份感情相當難以說明……\n雖然明白不能再這樣下去……"
10106-CVGroup_Relationship_Up_4-1 = "我會為老師祈禱。\n……還是該說「歌唱」比較正確呢？"
10106-CVGroup_Tactic_In_1-1 = "這種程度的事，不費吹灰之力。"
10106-CVGroup_Tactic_In_2-1 = "客人來得還真多呢。\n……我指的是表演。"
10106-CVGroup_Tactic_Victory_1-1 = "呵呵……簡直不費吹灰之力呢。"
10106-CVGroup_Tactic_Victory_2-1 = "是場愉快的表演。\n讓人真想再來一次。"

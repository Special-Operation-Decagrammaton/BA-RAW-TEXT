13011-CVGroup_ExSkill_Level_1-1 = "งั้นฉันก็ต้องซื้อไอศกรีมน่ะสิ!\nเพราะพวกเธอเลย!"
13011-CVGroup_ExSkill_Level_2-1 = "น่าโมโห... โมโหแล้วนะ!"
13011-CVGroup_ExSkill_Level_3-1 = "รับกระสุนแห่งความโกรธของฉันไป!"
13011-CVGroup_Formation_In_1-1 = "ไว้ใจฉันได้เลย~"

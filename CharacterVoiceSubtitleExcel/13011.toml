[translation]
13011-CVGroup_Battle_In_1-1 = "唔嗯……如果是用手把操作的話還挺有自信的說……"
13011-CVGroup_Battle_In_2-1 = "看見通往勝利的劇本了！"
13011-CVGroup_Battle_Recovery_1-1 = "體力槽隨時都得好好注意才行呢！"
13011-CVGroup_Battle_Victory_1-1 = "Clear！前往下一關！"
13011-CVGroup_Battle_Victory_2-1 = "是我們的勝利！"
13011-CVGroup_CommonSkill-1 = "我，已經生氣了！"
13011-CVGroup_ExSkill_1-1 = "好……就這樣……咦咦咦！\n唔唔……不可原諒！"
13011-CVGroup_ExSkill_2-1 = "嘿，真有……哇啊！死掉了！？\n真不敢相信！"
13011-CVGroup_ExSkill_3-1 = "是我贏了！咦！？這不是輸了嗎！？\n真是的～～～！"
13011-CVGroup_ExSkill_Level_1-1 = "這樣不就得請吃冰淇淋了嗎！\n都是你們的錯！"
13011-CVGroup_ExSkill_Level_2-1 = "不甘心……好不甘心啊！"
13011-CVGroup_ExSkill_Level_3-1 = "嘗嘗我憤怒的子彈吧！"
13011-CVGroup_Formation_In_1-1 = "包在我身上吧～"
13011-CVGroup_Formation_In_2-1 = "好，輪到我了嗎！"
13011-CVGroup_Formation_Select-1 = "呀啊！？等一下，這樣不就不能玩遊戲了嗎！"
13011-CVGroup_Growup_1-1 = "多拿一點經驗值！"
13011-CVGroup_Growup_2-1 = "等級提升，永遠是個耀眼的瞬間呢！"
13011-CVGroup_Growup_3-1 = "想變得更強！\n因為這樣就能變成能保護大家的姐姐了！"
13011-CVGroup_Growup_4-1 = "接下來我的火力可不是開玩笑的唷！"
13011-CVGroup_Relationship_Up_1-1 = "想提升我的好感度的話，就買更多新的遊戲吧！"
13011-CVGroup_Relationship_Up_2-1 = "怎……怎麼會是隱藏路線……\n繼續走下去的話究竟會怎麼樣！"
13011-CVGroup_Relationship_Up_3-1 = "咦？難道我剛才把Flag給……不，不對！才沒有立！"
13011-CVGroup_Relationship_Up_4-1 = "想做出最棒的遊戲果然需要很多經驗。\n戀愛經驗……也是哦？"
13011-CVGroup_Tactic_In_1-1 = "趕快搞定回去吧！"
13011-CVGroup_Tactic_In_2-1 = "就讓你見識見識我的瞄準！"
13011-CVGroup_Tactic_Victory_1-1 = "這種程度的話，難易度感覺也就Easy吧！"
13011-CVGroup_Tactic_Victory_2-1 = "Clear！"
13011-CVGroup_Battle_Buffed_1-1 = "謝謝！"
13011-CVGroup_Battle_Covered_1-1 = "找到能躲的地方了！"
13011-CVGroup_Battle_Defense_1-1 = "沒用的唷～！"
13011-CVGroup_Battle_Move_1-1 = "這裡已經通關了！"
13011-CVGroup_Battle_Move_2-1 = "往下一道關卡，前進～！"
13011-CVGroup_Battle_TacticalAction_1-1 = "往這邊吧～！"

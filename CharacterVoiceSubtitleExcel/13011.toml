13011-CVGroup_ExSkill_1-1 = "ดีละ... แบบนี้คง... เดี๋ยวเหอะ!\nฮึ่ย... ยกโทษให้ไม่ได้!"
13011-CVGroup_ExSkill_2-1 = "แหะๆ สนุกจัง... ว้าก! ตายแล้วเหรอ?!\nไม่อยากเชื่อเลย!"

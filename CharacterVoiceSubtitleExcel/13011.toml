[translation]
13011-CVGroup_Battle_In_1-1 = "으음……. 패드로 조작한다면 자신 있지만……."
13011-CVGroup_Battle_In_2-1 = "승리의 시나리오가 보였다!"
13011-CVGroup_Battle_Recovery_1-1 = "체력 게이지는 항상 주의 깊게 확인해둬야 해!"
13011-CVGroup_Battle_Victory_1-1 = "클리어! 다음 스테이지로!"
13011-CVGroup_Battle_Victory_2-1 = "우리들의 승리야!"
13011-CVGroup_CommonSkill-1 = "나 완전 화났으니까!"
13011-CVGroup_ExSkill_1-1 = "좋아…. 이대로……. 에에엣! 으으……. 용서 못해!"
13011-CVGroup_ExSkill_2-1 = "헤에. 재미있……. 우앗! 죽었어?! 믿을 수 없어!"
13011-CVGroup_ExSkill_3-1 = "내가 이겼! 엣?! 졌잖아?! 진짜아아아!"
13011-CVGroup_ExSkill_Level_1-1 = "내가 아이스크림 사와야 하잖아! 너희 때문이야!"
13011-CVGroup_ExSkill_Level_2-1 = "분해……. 분하다고!"
13011-CVGroup_ExSkill_Level_3-1 = "내 분노의 탄환을 받아랏!"
13011-CVGroup_Formation_In_1-1 = "맡겨달라구~"
13011-CVGroup_Formation_In_2-1 = "자아. 내 차례인가!"
13011-CVGroup_Formation_Select-1 = "꺄악! 잠ㄲ, 이래서는 게임 못하잖아!"
13011-CVGroup_Growup_1-1 = "경험치를 더 많이 얻게 해줘!"
13011-CVGroup_Growup_2-1 = "레벨업! 언제나 설레는 순간이야!"
13011-CVGroup_Growup_3-1 = "더 강해지고 싶어! 그래야 모두를 지킬 수 있는 언니가 될 수 있으니까!"
13011-CVGroup_Growup_4-1 = "지금부터 내 화력은 장난 아니라구!"
13011-CVGroup_Relationship_Up_1-1 = "내 호감도를 올리고 싶다면 신작 게임을 더 사줘!"
13011-CVGroup_Relationship_Up_2-1 = "우웃……. 무슨 복선을 까는거야…….\n이대로 가면 어떻게 되어버리는 거냐구!"
13011-CVGroup_Relationship_Up_3-1 = "어라? 혹시 지금 플래그가……. 아, 아니야! 안 세워졌어!"
13011-CVGroup_Relationship_Up_4-1 = "최고의 게임을 만들려면 역시 다양한 경험이 필요해.\n연애 경험도……. 그렇겠지?"
13011-CVGroup_Tactic_In_1-1 = "빨리 끝내고 돌아가자!"
13011-CVGroup_Tactic_In_2-1 = "내 에임을 보여주겠어!"
13011-CVGroup_Tactic_Victory_1-1 = "이 정도면 난이도는 Easy라는 느낌이네!"
13011-CVGroup_Tactic_Victory_2-1 = "클리어!"
13011-CVGroup_Battle_Buffed_1-1 = "고마워!"
13011-CVGroup_Battle_Covered_1-1 = "엄폐물 찾았어!"
13011-CVGroup_Battle_Defense_1-1 = "소용없다니까~!"
13011-CVGroup_Battle_Move_1-1 = "여기는 클리어했어."
13011-CVGroup_Battle_Move_2-1 = "다음 스테이지로 전진~"
13011-CVGroup_Battle_TacticalAction_1-1 = "이쪽으로 간다~"

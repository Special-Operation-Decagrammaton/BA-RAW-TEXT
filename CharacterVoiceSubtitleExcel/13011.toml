13011-CVGroup_Relationship_Up_1-1 = "ถ้าอยากเพิ่มค่าความชื่นชอบของฉัน ก็ซื้อเกมใหม่ให้สิ!"
13011-CVGroup_Relationship_Up_2-1 = "อึก... นี่มันแผนสำรองลับอะไรกัน...\nถ้าทำแบบนี้ต่อไป จะเป็นยังไงเนี่ย!"
13011-CVGroup_Relationship_Up_3-1 = "เอ๋? ตอนนี้ธง... มะ... ไม่ใช่นะ! ฉันไม่ได้ยกธงนะ!"
13011-CVGroup_Relationship_Up_4-1 = "ถ้าจะสร้างเกมที่ดี ก็ต้องมีประสบการณ์ที่หลากหลาย\nประสบการณ์การเดต... ก็คงนับด้วยเนอะ?"
13011-CVGroup_Tactic_In_1-1 = "รีบจบไวๆ แล้วกลับกันเถอะ!"

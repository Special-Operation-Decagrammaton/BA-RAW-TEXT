[translation]
10049-CVGroup_Battle_Buffed_1-1 = "자, 힘내서 해볼까."
10049-CVGroup_Battle_Defense_1-1 = "미안하게 됐네."
10049-CVGroup_Battle_In_1-1 = "할 거면 제대로 하자."
10049-CVGroup_Battle_In_2-1 = "간다. 잘 따라와."
10049-CVGroup_Battle_Move_1-1 = "아직 남아있어?"
10049-CVGroup_Battle_Move_2-1 = "끝…이 아닌 거네?"
10049-CVGroup_Battle_Recovery_1-1 = "아, 고마워."
10049-CVGroup_Battle_TacticalAction_1-1 = "다음, 으로."
10049-CVGroup_Battle_Victory_1-1 = "……응. OK."
10049-CVGroup_Battle_Victory_2-1 = "응, 가끔은 이런 것도 나쁘지 않네."
10049-CVGroup_CommonSkill-1 = "응, 맛있다."
10049-CVGroup_ExSkill_1-1 = "느긋하게 먹을 시간도 없어……."
10049-CVGroup_ExSkill_2-1 = "……아아, 그쪽?"
10049-CVGroup_ExSkill_3-1 = "……응, 딱 맞췄으려나."
10049-CVGroup_ExSkill_Level_1-1 = "자, 간다."
10049-CVGroup_ExSkill_Level_2-1 = "나쁘게 생각 말라고."
10049-CVGroup_ExSkill_Level_3-1 = "받아라……!"
10049-CVGroup_Formation_In_1-1 = "……응? 나도?"
10049-CVGroup_Formation_In_2-1 = "음… 뭐, 일단 해볼 거지만."
10049-CVGroup_Formation_Select-1 = "……선생님? 왜?"
10049-CVGroup_Growup_1-1 = "어……? 아. 고마워. 선생님."
10049-CVGroup_Growup_2-1 = "다른 애도 있는데…… 왜, 나한테?"
10049-CVGroup_Growup_3-1 = "앞으로도 힘내…라는 뜻이라고? 뭐, 고맙게 받을게."
10049-CVGroup_Growup_4-1 = "이런 건 적응 안 되네……. 별로, 싫다는 건 아니지만."
10049-CVGroup_Relationship_Up_1-1 = "이런 건…… 뭐라고 표현하면 좋을까……."
10049-CVGroup_Relationship_Up_2-1 = "선생님, 그……. 아니, 미안. 아무것도 아니야."
10049-CVGroup_Relationship_Up_3-1 = "'고맙다'라고 말하는 게, 왜 이리 힘든지 모르겠네."
10049-CVGroup_Relationship_Up_4-1 = "뭐랄까, 그러니까…… 언제나 고마워."
10049-CVGroup_Tactic_In_1-1 = "뭔가 오랜만이네, 이런 거……."
10049-CVGroup_Tactic_In_2-1 = "꽤 본격적인데? 그럼 가볼까."
10049-CVGroup_Tactic_Victory_1-1 = "……헤에, 꽤 하잖아."
10049-CVGroup_Tactic_Victory_2-1 = "낙승, 이려나. 수고했어. 선생님."

[translation]
10111-CVGroup_Battle_Buffed_1-1 = "哦，謝啦！"
10111-CVGroup_Battle_Covered_1-1 = "真累人！"
10111-CVGroup_Battle_Defense_1-1 = "很癢耶！"
10111-CVGroup_Battle_In_1-1 = "好，要出發囉！"
10111-CVGroup_Battle_In_2-1 = "這個量是怎麼回事啊。"
10111-CVGroup_Battle_Move_1-1 = "下一個！"
10111-CVGroup_Battle_Move_2-1 = "還沒完嗎？"
10111-CVGroup_Battle_Recovery_1-1 = "謝啦！"
10111-CVGroup_Battle_TacticalAction_1-1 = "哈！"
10111-CVGroup_Battle_Victory_1-1 = "只有這點程度啊……"
10111-CVGroup_Battle_Victory_2-1 = "對方好像沒發現是我啊。"
10111-CVGroup_CommonSkill-1 = "哦，感覺挺厲害的嘛？"
10111-CVGroup_ExSkill_1-1 = "唉，真麻煩。\n喂，待在那裡別動哦？"
10111-CVGroup_ExSkill_2-1 = "你們這傢伙，給我咬緊牙關啊。"
10111-CVGroup_ExSkill_3-1 = "惡意……？\n當然有啊！"
10111-CVGroup_ExSkill_4-1 = "差不多該做個了結了吧？"
10111-CVGroup_ExSkill_5-1 = "這樣啊！那麼，現在輪到我了！"
10111-CVGroup_ExSkill_6-1 = "沒用沒用！"
10111-CVGroup_ExSkill_Level_1-1 = "就會給我添麻煩！"
10111-CVGroup_ExSkill_Level_2-1 = "馬上就了結你們。"
10111-CVGroup_ExSkill_Level_3-1 = "這樣就結束了。"
10111-CVGroup_ExSkill_Level_4-1 = "看招看招──！！"
10111-CVGroup_ExSkill_Level_5-1 = "哈哈！！！"
10111-CVGroup_ExSkill_Level_6-1 = "沒用的──！"
10111-CVGroup_Formation_In_1-1 = "真沒辦法。"
10111-CVGroup_Formation_In_2-1 = "啊？又有工作嗎？"
10111-CVGroup_Formation_Select-1 = "唉……沒穿外衣，\n總覺得心情有點微妙。"
10111-CVGroup_Growup_1-1 = "挺不錯的嘛！謝啦！"
10111-CVGroup_Growup_2-1 = "咦？這個嘛，那個……謝謝你啦。"
10111-CVGroup_Growup_3-1 = "怎麼說呢，就像真正的學生和老師一樣呢。\n……不對，本來就是吧。"
10111-CVGroup_Growup_4-1 = "謝謝你！老師！\n……這樣如何？會很怪嗎？"
10111-CVGroup_Relationship_Up_1-1 = "無論打扮如何，我就是我。\n老師也跟平常一樣對待我吧。"
10111-CVGroup_Relationship_Up_2-1 = "唔嗯，心裡好像有種暖暖的，或者說癢癢的感覺……\n沒有，我沒有討厭的意思。"
10111-CVGroup_Relationship_Up_3-1 = "總，總覺得好像比平常害羞……\n該死！這是怎麼回事！？"
10111-CVGroup_Relationship_Up_4-1 = "不介意的話，要不要去散散步啊？\n我能幫你導覽哦。"
10111-CVGroup_Tactic_In_1-1 = "為人導覽也是種樂趣啊。"
10111-CVGroup_Tactic_In_2-1 = "是不是有點太多了？"
10111-CVGroup_Tactic_Victory_1-1 = "好，清乾淨了。"
10111-CVGroup_Tactic_Victory_2-1 = "如果還缺少什麼的話就說吧。\n我一口氣幫你解決。"

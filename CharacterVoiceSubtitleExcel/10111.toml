[translation]
10111-CVGroup_Battle_Buffed_1-1 = "여어, 땡큐!"
10111-CVGroup_Battle_Covered_1-1 = "이런 것쯤이야……!"
10111-CVGroup_Battle_Defense_1-1 = "간지러워!"
10111-CVGroup_Battle_In_1-1 = "자-! 들어가자-!"
10111-CVGroup_Battle_In_2-1 = "이게 다 뭐야?"
10111-CVGroup_Battle_Move_1-1 = "다음!"
10111-CVGroup_Battle_Move_2-1 = "아직 덤빌 놈이 남았어?"
10111-CVGroup_Battle_Recovery_1-1 = "나이스!"
10111-CVGroup_Battle_TacticalAction_1-1 = "하앗!"
10111-CVGroup_Battle_Victory_1-1 = "뭐 대단한 거라도 오나 했더니……."
10111-CVGroup_Battle_Victory_2-1 = "상대가 나라는 걸 눈치 못 챈 모양이군."
10111-CVGroup_CommonSkill-1 = "이야, 이거 죽이는데?"
10111-CVGroup_ExSkill_1-1 = "하아, 귀찮구만. 거기 그대로 있어."
10111-CVGroup_ExSkill_2-1 = "딱 걸렸어. 이 악물어라."
10111-CVGroup_ExSkill_3-1 = "악감정은…… 당연히 있지!"
10111-CVGroup_ExSkill_4-1 = "슬슬 끝장을 보실까?"
10111-CVGroup_ExSkill_5-1 = "그게 다야? 내 차례네!"
10111-CVGroup_ExSkill_6-1 = "소용없어, 소용없어!"
10111-CVGroup_ExSkill_Level_1-1 = "귀찮게 만들고 말이야!"
10111-CVGroup_ExSkill_Level_2-1 = "금방 끝날 거야."
10111-CVGroup_ExSkill_Level_3-1 = "이걸로 끝이다."
10111-CVGroup_ExSkill_Level_4-1 = "아자아-!!"
10111-CVGroup_ExSkill_Level_5-1 = "으하하하-!!!"
10111-CVGroup_ExSkill_Level_6-1 = "소용없다고-!"
10111-CVGroup_Formation_In_1-1 = "어쩔 수 없군."
10111-CVGroup_Formation_In_2-1 = "왜? 또 무슨 일 생겼어?"
10111-CVGroup_Formation_Select-1 = "하아……. 허전해. 스카잔 말이야."
10111-CVGroup_Growup_1-1 = "나쁘지 않잖아! 땡큐!"
10111-CVGroup_Growup_2-1 = "에? 아아 뭐, 그… 고마워."
10111-CVGroup_Growup_3-1 = "이러니까 진짜 학생과 선생 같네. ……아, 맞지? 참."
10111-CVGroup_Growup_4-1 = "감사합니다-! 선생님! ……이러면 좋아할까?"
10111-CVGroup_Relationship_Up_1-1 = "어떤 차림이든 나는 나니까. 선생도 평소처럼 대해 줘."
10111-CVGroup_Relationship_Up_2-1 = "으긋…… 뭔가 간질간질하고 따뜻한 느낌인데……. 아, 아니, 싫은 건 아니고……."
10111-CVGroup_Relationship_Up_3-1 = "뭐, 뭔가 평소보다 부끄러운 느낌이… 젠장! 뭐야 이거!?"
10111-CVGroup_Relationship_Up_4-1 = "선생…… 산책이라도 갈래? 모처럼 이런 옷차림이니까……."
10111-CVGroup_Tactic_In_1-1 = "가이드 일도 정신없구만."
10111-CVGroup_Tactic_In_2-1 = "뭐 이렇게 일이 많아?"
10111-CVGroup_Tactic_Victory_1-1 = "이 정도면 깔끔하지?"
10111-CVGroup_Tactic_Victory_2-1 = "더 있으면 지금 말해. 한 번에 끝내게."

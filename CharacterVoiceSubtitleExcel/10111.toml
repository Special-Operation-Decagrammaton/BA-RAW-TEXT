10111-CVGroup_Battle_Defense_1-1 = "มันจั๊กจี้นะ!"
10111-CVGroup_Battle_In_1-1 = "เอ้า-! ไปกันเลย-!"
10111-CVGroup_Battle_In_2-1 = "นี่มันอะไรกันเนี่ย?"
10111-CVGroup_Battle_Move_1-1 = "ต่อไป!"
10111-CVGroup_Battle_Move_2-1 = "ยังมีเจ้าพวกหัวทึบเหลืออยู่อีกเรอะ?"
10111-CVGroup_Battle_Recovery_1-1 = "แจ๋ว!"
10111-CVGroup_Battle_TacticalAction_1-1 = "ย้า!"
10111-CVGroup_Battle_Victory_1-1 = "อุตส่าห์คิดว่าจะมีเรื่องยิ่งใหญ่อะไรเกิดขึ้นนะเนี่ย..."
10111-CVGroup_Battle_Victory_2-1 = "ท่าทางจะไม่รู้สินะว่าฝ่ายตรงข้ามคือฉันน่ะ"
10111-CVGroup_CommonSkill-1 = "อ่า สุดยอดเลยแฮะ"
10111-CVGroup_ExSkill_1-1 = "เฮ้อ น่ารำคาญชะมัด หยุดอยู่ตรงนั้นซะดีๆ"
10111-CVGroup_ExSkill_2-1 = "เจอตัวแล้ว เจ้าตัวแสบพวกนี้"
10111-CVGroup_ExSkill_3-1 = "รู้สึกไม่ดีเลย... ก็แหงแหละ!"
10111-CVGroup_ExSkill_4-1 = "คงใกล้จะจบแล้วละมั้ง?"
10111-CVGroup_ExSkill_5-1 = "แค่นี้เองเหรอ? ถึงตาฉันแล้วสินะ!"
10111-CVGroup_ExSkill_6-1 = "เปล่าประโยชน์! เปล่าประโยชน์"
10111-CVGroup_ExSkill_Level_1-1 = "อย่ามาทำให้รำคาญน่า!"
10111-CVGroup_ExSkill_Level_2-1 = "เดี๋ยวก็จบแล้วละ"
10111-CVGroup_ExSkill_Level_3-1 = "เท่านี้ก็จบแล้ว"
10111-CVGroup_ExSkill_Level_4-1 = "ย้าาา-!!"
10111-CVGroup_ExSkill_Level_5-1 = "วะฮ่าฮ่าฮ่า-!!!"
10111-CVGroup_ExSkill_Level_6-1 = "เปล่าประโยชน์-!"
10111-CVGroup_Formation_In_1-1 = "ช่วยไม่ได้นะ"
10111-CVGroup_Formation_In_2-1 = "ทำไม? มีเรื่องอะไรรึไง?"
10111-CVGroup_Formation_Select-1 = "เฮ้อ... เปื่อยหมดแล้ว\nหมายถึงเสื้อซูคาจันน่ะ"
10111-CVGroup_Growup_1-1 = "ไม่เลวเลยนี่! แต้งกิ้ว!"
10111-CVGroup_Growup_2-1 = "เอ๊ะ? อ่า...\nเอาเถอะ ขะ... ขอบคุณนะ"
10111-CVGroup_Growup_3-1 = "พอเป็นแบบนี้ก็ดูเหมือนเป็นครูกับนักเรียนจริงๆ เลยนะ\nอ่า... ใช่มั้ยล่ะ? จริงๆ เลยเชียว"
10111-CVGroup_Growup_4-1 = "ขอบคุณค่ะ-! คุณครู!\nแบบนี้ดีมั้ยนะ?"
10111-CVGroup_Relationship_Up_1-1 = "ไม่ว่าจะใส่ชุดอะไร ฉันก็คือตัวฉันอยู่ดี\nคุณครูก็ทำตัวตามปกติเถอะ"
10111-CVGroup_Relationship_Up_2-1 = "อึก... รู้สึกอบอุ่นจั๊กจี้หัวใจดีจัง...\nปะ... เปล่านะ ก็ไม่ได้เกลียดอะไรหรอก..."
10111-CVGroup_Relationship_Up_3-1 = "คะ... แค่รู้สึกอายกว่าปกตินิดหน่อย...\nบ้าเอ้ย! นี่มันอะไรกันเนี่ย!?"
10111-CVGroup_Relationship_Up_4-1 = "ครู... ไปเดินเล่นกันมั้ย\nนานๆ ทีจะได้ใส่ชุดแบบนี้นี่นา..."
10111-CVGroup_Tactic_In_1-1 = "การเป็นไกด์นี่วุ่นวายชะมัดเลย"
10111-CVGroup_Tactic_In_2-1 = "ทำไมงานเยอะอะไรแบบนี้เนี่ย?"
10111-CVGroup_Tactic_Victory_1-1 = "แค่นี้ก็น่าจะพอแล้วใช่มั้ย?"
10111-CVGroup_Tactic_Victory_2-1 = "ถ้ามีอะไรอีกก็บอกมาได้เลย จะทำให้จบในรวดเดียวเอง"

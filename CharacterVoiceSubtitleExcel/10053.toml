[translation]
10053-CVGroup_Battle_Buffed_1-1 = "아, 고마워!"
10053-CVGroup_Battle_Covered_1-1 = "엄폐하겠어. 지원 부탁해!"
10053-CVGroup_Battle_Defense_1-1 = "맞을 리가 없잖아?"
10053-CVGroup_Battle_In_1-1 = "평소와는 조금 다른 변수에 주의하며…… 전진!"
10053-CVGroup_Battle_In_2-1 = "컨디션 만전! 결과는 정해져 있어!"
10053-CVGroup_Battle_Move_1-1 = "다음 목표는?"
10053-CVGroup_Battle_Move_2-1 = "목표를 향해, 전진!"
10053-CVGroup_Battle_Recovery_1-1 = "계산 외의 보급…… 고마워!"
10053-CVGroup_Battle_TacticalAction_1-1 = "다음으로 이동할게!"
10053-CVGroup_Battle_Victory_1-1 = "계산대로, 당연한 결과네."
10053-CVGroup_Battle_Victory_2-1 = "운동도…… 완벽해!"
10053-CVGroup_CommonSkill-1 = "하아… 한숨 돌리고 다시 가자!"
10053-CVGroup_ExSkill_1-1 = "자, 함께 가자!"
10053-CVGroup_ExSkill_2-1 = "밀레니엄의 기술력을 보여주자고!"
10053-CVGroup_ExSkill_3-1 = "자, 일어날 시간이야!"
10053-CVGroup_ExSkill_Level_1-1 = "신속하게!"
10053-CVGroup_ExSkill_Level_2-1 = "이쪽으로!"
10053-CVGroup_ExSkill_Level_3-1 = "우, 우와…. 생각보다 빨라……!"
10053-CVGroup_Formation_In_1-1 = "최적의 선택이네요."
10053-CVGroup_Formation_In_2-1 = "증명의 시간이에요."
10053-CVGroup_Formation_Select-1 = "어떠세요? 활동적이고 합리적이죠?"
10053-CVGroup_Growup_1-1 = "체육복은 효율적인 복장이죠. 선생님도 그렇게 생각하지 않나요?"
10053-CVGroup_Growup_2-1 = "그, 그렇게 지켜보시면 곤란하다고 할지……. \n그래도 뭐어, 선생님이라면……. 괜찮지만요."
10053-CVGroup_Growup_3-1 = "다시 태어난 기분이에요! ……움직이기 편해졌을 뿐이지만요."
10053-CVGroup_Growup_4-1 = "이번에도 질 거라고는 생각하지 않아요. 제 계산은 완벽하니까요!"
10053-CVGroup_Relationship_Up_1-1 = "무리는 금물이에요. 선생님도 조심하세요.\n……저도 자주 무리한다고요? 으읏, 그건 그렇지만……."
10053-CVGroup_Relationship_Up_2-1 = "목이 마르다면 말씀해 주세요. ……언제나 옆에서 서포트 해드릴 테니까요."
10053-CVGroup_Relationship_Up_3-1 = "체육복을 입으면, 의욕이 샘솟아요.\n이건 복장 때문일까요. 그게 아니면…… \n선생님이 옆에 있어서?"
10053-CVGroup_Relationship_Up_4-1 = "선생님과 함께 있다 보면 제 계산 능력이 둔해질 때가 있어요.\n오, 오해는 말아 주세요.\n그러니까…… 머리가 조금 멍해진다는 뜻이니까요……."
10053-CVGroup_Tactic_In_1-1 = "확실히 움직이기에 편하긴 합니다만……."
10053-CVGroup_Tactic_In_2-1 = "계산 완료. 절대로 지지 않겠어요."
10053-CVGroup_Tactic_Victory_1-1 = "예측대로, 완벽해~"
10053-CVGroup_Tactic_Victory_2-1 = "이미 답은 나와 있었어. 난 그걸 검산했을 뿐."

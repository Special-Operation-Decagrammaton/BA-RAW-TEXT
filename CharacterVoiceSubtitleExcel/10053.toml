[translation]
10053-CVGroup_Battle_Buffed_1-1 = "啊，謝謝！"
10053-CVGroup_Battle_Covered_1-1 = "進行掩蔽！\n請求支援！"
10053-CVGroup_Battle_Defense_1-1 = "怎麼可能會中呢？"
10053-CVGroup_Battle_In_1-1 = "注意與平時不同的變數……前進！"
10053-CVGroup_Battle_In_2-1 = "狀態非常萬全！\n結果已經注定！"
10053-CVGroup_Battle_Move_1-1 = "下一個目標是？"
10053-CVGroup_Battle_Move_2-1 = "向著目標，前進！"
10053-CVGroup_Battle_Recovery_1-1 = "計算之外的補給……非常感謝！"
10053-CVGroup_Battle_TacticalAction_1-1 = "繼續前進囉！"
10053-CVGroup_Battle_Victory_1-1 = "如我所算，是理所當然的結果呢。"
10053-CVGroup_Battle_Victory_2-1 = "運動也……完美！"
10053-CVGroup_CommonSkill-1 = "哈啊……稍作休息後就上吧！"
10053-CVGroup_ExSkill_1-1 = "來，一起走吧！"
10053-CVGroup_ExSkill_2-1 = "好好展現千年的技術力吧！"
10053-CVGroup_ExSkill_3-1 = "來，是時候起來囉！"
10053-CVGroup_ExSkill_Level_1-1 = "迅速地！"
10053-CVGroup_ExSkill_Level_2-1 = "這邊！"
10053-CVGroup_ExSkill_Level_3-1 = "哇，哇啊……比想像中還快……！"
10053-CVGroup_Formation_In_1-1 = "是最適當的選擇呢。"
10053-CVGroup_Formation_In_2-1 = "證明的時間到了。"
10053-CVGroup_Formation_Select-1 = "怎麼樣呀？\n既動感又合理對吧？"
10053-CVGroup_Growup_1-1 = "體育服是有很效率的服裝呢。\n老師不這麼覺得嗎？"
10053-CVGroup_Growup_2-1 = "那，那樣盯著我看該說有點困擾嗎……\n不過，好吧……如果是老師的話……也不是不行。"
10053-CVGroup_Growup_3-1 = "有種重獲新生的感覺！\n……雖然只是變得比較方便活動而已。"
10053-CVGroup_Growup_4-1 = "這次我也不覺得會輸。\n因為我的計算是完美的！"
10053-CVGroup_Relationship_Up_1-1 = "不可以勉強唷。\n也請老師多留意一下。\n……你說我也常勉強自己？\n嗚嗚，是這樣沒錯啦……"
10053-CVGroup_Relationship_Up_2-1 = "如果渴了的話，請跟我說一聲哦。\n……我隨時會在身旁協助你的。"
10053-CVGroup_Relationship_Up_3-1 = "穿上體育服之後，感覺幹勁就源源不絕地湧出呢。\n是服裝的關係嗎？還是說……\n是因為老師在我身邊呢？"
10053-CVGroup_Relationship_Up_4-1 = "跟老師在一起的時候，我的計算能力有時會變得有點遲鈍。\n請，請不要誤會哦？\n那個……是腦袋會有點恍惚的意思……"
10053-CVGroup_Tactic_In_1-1 = "雖然確實比較便於活動……"
10053-CVGroup_Tactic_In_2-1 = "計算完畢。\n絕對不會輸的。"
10053-CVGroup_Tactic_Victory_1-1 = "如我所料。\n完美～"
10053-CVGroup_Tactic_Victory_2-1 = "答案早就已經出現了。\n我只是加以驗算而已。"

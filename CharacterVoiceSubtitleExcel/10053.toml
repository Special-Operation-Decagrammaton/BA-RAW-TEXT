[translation]
10053-CVGroup_Battle_Buffed_1-1 = "อ๊ะ ขอบคุณนะ!"
10053-CVGroup_Battle_Covered_1-1 = "ฉันจะพรางตัวก่อน\nช่วยสนับสนุนด้วย!"
10053-CVGroup_Battle_Defense_1-1 = "ไม่มีทางโดนหรอกน่า!"
10053-CVGroup_Battle_In_1-1 = "ระวังตัวแปรที่ต่างไปจากปกติด้วยล่ะ... ลุยได้!"
10053-CVGroup_Battle_In_2-1 = "สภาพพร้อมสุดๆ! ผลลัพธ์มันถูกกำหนดไว้แล้วไงล่ะ!"
10053-CVGroup_Battle_Move_1-1 = "เป้าหมายต่อไปล่ะ?"
10053-CVGroup_Battle_Move_2-1 = "มุ่งสู่เป้าหมาย!"
10053-CVGroup_Battle_Recovery_1-1 = "เสบียงเหนือการคำนวณ...\nขอบคุณนะ!"
10053-CVGroup_Battle_TacticalAction_1-1 = "ไปต่อกันเลย!"
10053-CVGroup_Battle_Victory_1-1 = "ผลลัพธ์เป็นไปตามที่คำนวณไว้เลยนะ"
10053-CVGroup_Battle_Victory_2-1 = "การออกกำลังกายก็... สมบูรณ์แบบ!"
10053-CVGroup_CommonSkill-1 = "เฮ้อ... พักหายใจแล้วก็ไปกันต่อเถอะ!"
10053-CVGroup_ExSkill_1-1 = "เอ้า ไปกันเถอะคุณครู!"
10053-CVGroup_ExSkill_2-1 = "มาแสดงพลังแห่งเทคโนโลยีของมิลเลเนียมกันเถอะ!"
10053-CVGroup_ExSkill_3-1 = "เอ้า ถึงเวลาลุกแล้วนะ!"
10053-CVGroup_ExSkill_Level_1-1 = "รวดเร็วว่องไว!"
10053-CVGroup_ExSkill_Level_2-1 = "ทางนี้!"
10053-CVGroup_ExSkill_Level_3-1 = "วะ... ว้าว เร็วกว่าที่คิดอีก...!"
10053-CVGroup_Formation_In_1-1 = "เป็นตัวเลือกที่สมเหตุสมผลมากเลยค่ะ"
10053-CVGroup_Formation_In_2-1 = "ถึงเวลาพิสูจน์แล้วค่ะ"
10053-CVGroup_Formation_Select-1 = "เป็นยังไงบ้างคะ?\nสนุกและสมเหตุสมผลดีใช่มั้ยคะ?"
10053-CVGroup_Growup_1-1 = "ชุดพละเป็นชุดที่มีประสิทธิภาพมากค่ะ\nคุณครูไม่คิดแบบนั้นเหรอคะ?"
10053-CVGroup_Growup_2-1 = "ถะ... ถ้าเอาแต่จ้องกันแบบนั้น มันลำบากนะ...\nแต่ก็ช่างเถอะ ถ้าเป็นคุณครูละก็... อาจไม่เป็นไรก็ได้ค่ะ"
10053-CVGroup_Growup_3-1 = "รู้สึกเหมือนได้เกิดใหม่เลยค่ะ!\nถึงจะแค่เคลื่อนไหวสะดวกขึ้นก็เถอะ..."
10053-CVGroup_Growup_4-1 = "คราวนี้ฉันก็คิดว่าไม่แพ้หรอกค่ะ\nเพราะการคำนวณของฉันสมบูรณ์แบบค่ะ!"
10053-CVGroup_Relationship_Up_1-1 = "ห้ามฝืนเด็ดขาดค่ะ คุณครูเองก็ช่วยระวังด้วยค่ะ\nฉันก็มักจะฝืนตัวเองบ่อยๆ งั้นเหรอคะ...? อึก มันก็จริงอยู่หรอก..."
10053-CVGroup_Relationship_Up_2-1 = "ถ้ากระหายน้ำก็บอกได้เลยนะคะ\nฉันจะคอยสนับสนุนอยู่ข้างๆ คุณครูเสมอค่ะ..."
10053-CVGroup_Relationship_Up_3-1 = "พอใส่ชุดพละ ก็รู้สึกฮึดขึ้นมาเลยค่ะ\nเป็นเพราะชุดนี้รึเปล่าคะ หรือไม่งั้น... เป็นเพราะมีคุณครูอยู่ข้างๆ...?"
10053-CVGroup_Relationship_Up_4-1 = "เพราะเวลาที่อยู่กับคุณครู การคำนวณของฉันก็มักจะรวนๆ ค่ะ\nยะ... อย่าเข้าใจผิดนะคะ หมายถึง... มันจะรู้สึกหัวโล่งๆ หน่อยน่ะค่ะ..."
10053-CVGroup_Tactic_In_1-1 = "เคลื่อนไหวสะดวกขึ้นกว่าเดิมเยอะเลยค่ะ..."
10053-CVGroup_Tactic_In_2-1 = "คำนวณสำเร็จ ไม่มีทางแพ้แน่นอนค่ะ"
10053-CVGroup_Tactic_Victory_1-1 = "สมบูรณ์แบบตามที่คาดไว้~"
10053-CVGroup_Tactic_Victory_2-1 = "มีคำตอบตั้งแต่แรกแล้วละ ฉันก็แค่ตรวจสอบซ้ำเท่านั้น"

10091-CVGroup_Battle_TacticalAction_1-1 = "ฮึ!"
10091-CVGroup_Battle_Victory_1-1 = "เป็นไง คุณครู? ไม่แย่เลยใช่มั้ย?"
10091-CVGroup_Battle_Victory_2-1 = "เป็นไลฟ์ที่ดีมากเลย...! รึเปล่านะ"
10091-CVGroup_CommonSkill-1 = "ไหนดูซิ... อื้อ! ดีละ!"
10091-CVGroup_ExSkill_1-1 = "ฮู่ว... เฮ้อ-"
10091-CVGroup_ExSkill_2-1 = "อื้อ! ต้องทำได้สิ"
10091-CVGroup_ExSkill_3-1 = "ไม่เป็นไรหรอก เราฝึกซ้อมมาตั้งเยอะแล้วนี่"
10091-CVGroup_ExSkill_Level_1-1 = "ตามมาได้เลย"
10091-CVGroup_ExSkill_Level_2-1 = "มาฟังเพลงของพวกเราเถอะ!"
10091-CVGroup_ExSkill_Level_3-1 = "ลุยละนะ...!"
10091-CVGroup_Formation_In_1-1 = "จะร้องเพลงที่นี่เหรอ...?"
10091-CVGroup_Formation_In_2-1 = "เอ๋... ถูกที่รึเปล่านะ?"
10091-CVGroup_Formation_Select-1 = "ดะ... เดี๋ยวก่อน! คุณครู...! แบบนี้มันจะเด่นเกินไปนะ!"
10091-CVGroup_Growup_1-1 = "รู้สึกได้ถึงผลของการฝึกเลยแฮะ"
10091-CVGroup_Growup_2-1 = "เหมือนทักษะจะดีขึ้นนิดหน่อยแฮะ...?"
10091-CVGroup_Growup_3-1 = "รู้สึกเหมือนมีผู้จัดการเลยนะ\nปะ... เปล่านะ! ขอยกเลิกที่พูดไปเมื่อกี้! ลืมไปซะ!"
10091-CVGroup_Growup_4-1 = "ถ้าเรียนเข้าหัวได้ไวๆ เหมือนซ้อมดนตรีก็คงจะดีนะ... ฮ่าฮ่า"
10091-CVGroup_Relationship_Up_1-1 = "จะว่ายังไงดีล่ะ... มันชวนให้สนใจขึ้นกว่าเดิมอีกน่ะ...\nปะ... เปล่านะ! แค่พูดคนเดียวน่ะ"
10091-CVGroup_Relationship_Up_2-1 = "อาจไม่ได้มีความหมายอะไรมาก... แต่คำพูดที่ว่า\n 'ถ้ามีอะไรก็บอกฉันได้ตลอด' มันก็ยังใช้ได้อยู่นะ"
10091-CVGroup_Relationship_Up_3-1 = "คุณครู วันนี้พอมีเวลามั้ย?\nหืม? ปะ... เปล่าหรอก ไม่มีเหตุผลอะไรพิเศษหรอก"
10091-CVGroup_Relationship_Up_4-1 = "มีบางครั้งที่ฉันสงสัยว่า\nเราสนิทกันมากเกินไปรึเปล่าด้วยน่ะ..."
10091-CVGroup_Tactic_In_1-1 = "ว้าว... เยอะจัง..."
10091-CVGroup_Tactic_In_2-1 = "ไม่ได้ไลฟ์... งั้นหรอกเหรอ"
10091-CVGroup_Tactic_Victory_1-1 = "ไว้เรียกฉันมาอีกนะ..."
10091-CVGroup_Tactic_Victory_2-1 = "ก็พอใช้ได้อยู่นะ"

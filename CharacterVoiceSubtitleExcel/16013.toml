16013-CVGroup_Relationship_Up_3-1 = "ถ้ามีโอกาสแบบนี้อีกบ่อยๆ..."
16013-CVGroup_Relationship_Up_4-1 = "คราวหน้าฉันจะพาไปที่ดีๆ นะ!"
16013-CVGroup_Tactic_In_1-1 = "ตะ... ตามฉันมาได้เลย!"
16013-CVGroup_Tactic_In_2-1 = "อ๊ะ เข้าใจแล้ว! วางใจได้เลย!"

16013-CVGroup_ExSkill_3-1 = "ก็บอกว่าไม่ใช่ไง!!"
16013-CVGroup_ExSkill_Level_1-1 = "ยกโทษให้ไม่ได้!!"
16013-CVGroup_ExSkill_Level_2-1 = "เอานี่ไปกินเลย!!"
16013-CVGroup_ExSkill_Level_3-1 = "อ๊าาาาาา~!!"
16013-CVGroup_Formation_In_1-1 = "ต้องการตัวฉันสินะ?"

[translation]
10066-CVGroup_Battle_Buffed_1-1 = "ได้รับบัฟมาแล้วค่ะ!"
10066-CVGroup_Battle_Defense_1-1 = "จะแดชแล้วนะคะ!"
10066-CVGroup_Battle_In_1-1 = "จะทำความสะอาดด้วยพลังของน้องเมดค่ะ"
10066-CVGroup_Battle_In_2-1 = "ถึงจะเปลี่ยนอาชีพ แต่อาริสึก็ยังเป็นคนเดิมค่ะ"
10066-CVGroup_Battle_Move_1-1 = "อาริสึจะทำความสะอาดต่อแล้วค่ะ"
10066-CVGroup_Battle_Move_2-1 = "จะไปแล้วนะคะ"
10066-CVGroup_Battle_Recovery_1-1 = "HP ฟื้นฟูแล้วค่ะ!"
10066-CVGroup_Battle_TacticalAction_1-1 = "เคลื่อนย้ายไปยังเป้าหมายค่ะ"
10066-CVGroup_Battle_Victory_1-1 = "ภารกิจสำเร็จ! สุดยอดเลยค่ะคุณครู!"
10066-CVGroup_Battle_Victory_2-1 = "มิชชัน คอมพลีต! นี่เป็นประโยคเด็ดที่อาริสึชอบค่ะ!"
10066-CVGroup_CommonSkill-1 = "ชึบ ชึบ ดีละ!"
10066-CVGroup_ExSkill_1-1 = "ทำความสะอาด ทำความสะอาด~\nอ๊ะ! เตรียมตัวพร้อมแล้วค่ะ!"
10066-CVGroup_ExSkill_2-1 = "ถึงเวลาทำความสะอาดแล้ว~♪\nหืม? ไปแล้วนะคะ!"
10066-CVGroup_ExSkill_3-1 = "ฮึบ ฮึบ~\nโอ้? อาริสึจะพยายามค่ะ!"
10066-CVGroup_ExSkill_Level_1-1 = "ล็อกเป้าหมาย... ลำแสงทำลายล้าง!"
10066-CVGroup_ExSkill_Level_2-1 = "หนีไม่พ้นสายตาของอาริสึหรอกค่ะ!"
10066-CVGroup_ExSkill_Level_3-1 = "ด้วยความตั้งใจที่มุ่งมั่น... ลำแสงทำลายล้าง!"
10066-CVGroup_Formation_In_1-1 = "เมดอาริสึค่ะ\nขอฝากตัวด้วยนะคะ!"
10066-CVGroup_Formation_In_2-1 = "หน้าที่ของอาริสึในวันนี้...\nคือผู้โจมตีธาตุแสงเพียงหนึ่งเดียวค่ะ!"
10066-CVGroup_Formation_Select-1 = "ฮือ... อาริสึยังไม่ชินกับสกิลใหม่นี้เลยค่ะ..."
10066-CVGroup_Growup_1-1 = "น้องเมดเลเวลอัป!\nค่าสเตตัสของอาริสึเพิ่มขึ้นแล้วค่ะ!"
10066-CVGroup_Growup_2-1 = "เลเวลของอาริสึไม่มีขีดจำกัดทั้งในฐานะเมด หรือในฐานะผู้กล้าค่ะ!"
10066-CVGroup_Growup_3-1 = "อาริสึคิดว่าจะต้องทำยังไงเพื่อที่จะเป็นผู้กล้าเมดค่ะ\nซึ่งคำตอบก็คือต้องอัปเลเวลทั้งเมดและผู้กล้าก็พอค่ะ!\nคุณครูช่วยอาริสึด้วยนะคะ!"
10066-CVGroup_Growup_4-1 = "ถ้าอยู่กับคุณครูละก็ อาริสึจะต้องเป็นผู้กล้าเมดที่ยอดเยี่ยมได้แน่ค่ะ\nช่วยอยู่เคียงข้างอาริสึต่อไปด้วยนะคะ!"
10066-CVGroup_Relationship_Up_1-1 = "คุณครู! อาริสึเหมาะกับชุดเมดรึเปล่าคะ?"
10066-CVGroup_Relationship_Up_2-1 = "แหะๆ อาริสึดีใจที่ได้อยู่กับคุณครูนะคะ\nช่วยลูบหัวให้อีกนะคะ!"
10066-CVGroup_Relationship_Up_3-1 = "วันนี้อาริสึเป็นน้องเมดค่ะ!\nเพราะงั้น... จะนวดไหล่ให้คุณครูเองค่ะ! นวดนวด!"
10066-CVGroup_Relationship_Up_4-1 = "ค่าความสนิทกับอาริสึเพิ่มขึ้นแล้วค่ะ!\nอาริสึของอแงอีกหน่อยได้รึเปล่าคะ...?"
10066-CVGroup_Tactic_In_1-1 = "เริ่มเควสได้! อาริสึจะลุยแล้วนะคะ!"
10066-CVGroup_Tactic_In_2-1 = "อาริสึจะเป็นผู้กล้าเมดค่ะ!"
10066-CVGroup_Tactic_Victory_1-1 = "ทำได้แล้วค่ะ คุณครู! ชมอาริสึหน่อยสิคะ!"
10066-CVGroup_Tactic_Victory_2-1 = "เคลียร์ภารกิจทำความสะอาดได้แล้วค่ะ!"

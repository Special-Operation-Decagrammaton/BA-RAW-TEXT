10066-CVGroup_Relationship_Up_3-1 = "오늘의 아리스는 메이드입니다! 그러니, 선생님 어깨 두드릴게요! 통통!"
10066-CVGroup_Relationship_Up_4-1 = "아리스의 친애도가 상승했습니다! 조금만 더, 어리광 부려도 될까요……?"

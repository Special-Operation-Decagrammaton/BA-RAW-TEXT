[translation]
20023-CVGroup_CommonSkill-1 = "I have eyes on the suspect."
20023-CVGroup_ExSkill_1-1 = "Beginning interrogation."
20023-CVGroup_ExSkill_2-1 = "It's no use trying to trick me."
20023-CVGroup_ExSkill_3-1 = "I'm sure you've heard of the Feral Hound."
20023-CVGroup_ExSkill_Level_1-1 = "Freeze! This is the Valkyrie Public Peace Bureau!"
20023-CVGroup_ExSkill_Level_2-1 = "Freeze! If you so much as twitch, I'll haul you in for criminal charges!"
20023-CVGroup_ExSkill_Level_3-1 = "It looks like I made it just in time."
20023-CVGroup_Formation_In_1-1 = "Is it the Public Peace Bureau's turn?"
20023-CVGroup_Formation_In_2-1 = "If that's your order."
20023-CVGroup_Formation_Select-1 = "Hm? Is there anything that requires me to sign?"
20023-CVGroup_Growup_1-1 = "I see. That could be another solution. Good lesson."
20023-CVGroup_Growup_2-1 = "That should do for today's training."
20023-CVGroup_Growup_3-1 = "The work I do every day is for the citizens."
20023-CVGroup_Growup_4-1 = "A director who doesn't train diligently won't set a good example for her subordinates."
20023-CVGroup_Relationship_Up_1-1 = "If all adults were like you, we'd be out of our jobs... Eh-hem! Ignore me. I was just talking to myself. No need to worry."
20023-CVGroup_Relationship_Up_2-1 = "Not even I will be able to interrogate you for information, Sensei. Heehee..."
20023-CVGroup_Relationship_Up_3-1 = "A romantic relationship between teacher and student...? Wh-What are you implying?!?!"
20023-CVGroup_Relationship_Up_4-1 = "I will occasionally rely upon Schale."

20023-CVGroup_Growup_1-1 = "มีวิธีแบบนี้ด้วยสินะคะ เป็นการเรียนรู้ที่ดีเลยค่ะ"
20023-CVGroup_Growup_2-1 = "การฝึกฝนวันนี้... แค่นี้ก็เพียงพอแล้วค่ะ"
20023-CVGroup_Growup_3-1 = "ฉันจะทุ่มเทเพื่อชาวเมืองในทุกวันค่ะ"
20023-CVGroup_Growup_4-1 = "ต่อให้เป็นหัวหน้ากรม แต่ถ้าไม่ขยัน\nก็เป็นตัวอย่างที่ดีให้กับลูกน้องไม่ได้หรอกค่ะ"
20023-CVGroup_Relationship_Up_1-1 = "ถ้าผู้ใหญ่ทุกคนเป็นเหมือนคุณครู พวกฉันคงไม่ต้องทำงานหรอกค่ะ...\nฉันแค่บ่นคนเดียวน่ะค่ะ ไม่ต้องสนใจหรอก"
20023-CVGroup_Relationship_Up_2-1 = "ต่อให้เป็นฉัน ก็คงสืบสวนและเค้นข้อมูลจากคุณครูไม่ได้นะคะ ฮุฮุ..."
20023-CVGroup_Relationship_Up_3-1 = "ความรักระหว่างครูกับลูกศิษย์...?\nพะ... พูดอะไรออกมาคะเนี่ย!"
20023-CVGroup_Relationship_Up_4-1 = "ฉันจะพึ่งพาชาเล่ต์ดูบ้างค่ะ"

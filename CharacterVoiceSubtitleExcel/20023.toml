[translation]
20023-CVGroup_CommonSkill-1 = "嫌犯，逮捕！"
20023-CVGroup_ExSkill_1-1 = "來，開始審問吧。"
20023-CVGroup_ExSkill_2-1 = "想欺騙我也沒用的。"
20023-CVGroup_ExSkill_3-1 = "「狂犬」的名號，你們多少也聽過吧？"
20023-CVGroup_ExSkill_Level_1-1 = "這裡是女武神公安局！停止動作！"
20023-CVGroup_ExSkill_Level_2-1 = "不准動！一旦行動就視為犯人！"
20023-CVGroup_ExSkill_Level_3-1 = "趕上了嗎？"
20023-CVGroup_Formation_In_1-1 = "輪到公安局出動了嗎？"
20023-CVGroup_Formation_In_2-1 = "如果是命令的話。"
20023-CVGroup_Formation_Select-1 = "文件有缺少什麼嗎？"
20023-CVGroup_Growup_1-1 = "原來如此，還有那種方法。\n讓我上了一課。"
20023-CVGroup_Growup_2-1 = "今天的訓練……這樣就足夠了吧。"
20023-CVGroup_Growup_3-1 = "我會為了市民日益精進。"
20023-CVGroup_Growup_4-1 = "雖然身為局長，若怠於鍛鍊可無法成為部下的榜樣。"
20023-CVGroup_Relationship_Up_1-1 = "要是世上的大人都像老師一樣的話，\n我們就不需要工作了吧……\n只是自言自語而已。請別在意。"
20023-CVGroup_Relationship_Up_2-1 = "即便是我，想藉由審問從老師口中套出情報也是不可能的吧。\n呵呵……"
20023-CVGroup_Relationship_Up_3-1 = "老師與學生的戀愛……？\n您，您在說什麼！？"
20023-CVGroup_Relationship_Up_4-1 = "我偶爾會依賴夏萊的。"

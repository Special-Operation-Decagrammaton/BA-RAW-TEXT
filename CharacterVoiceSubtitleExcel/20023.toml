[translation]
20023-CVGroup_CommonSkill-1 = "용의자, 확보."
20023-CVGroup_ExSkill_1-1 = "자, 심문을 시작한다."
20023-CVGroup_ExSkill_2-1 = "날 속이려고 해도 소용없어."
20023-CVGroup_ExSkill_3-1 = "미친개의 이름을 한 번 쯤은 들어봤겠지."
20023-CVGroup_ExSkill_Level_1-1 = "발키리 공안국이다! 멈춰!"
20023-CVGroup_ExSkill_Level_2-1 = "움직이지 마! 움직이면 범인으로 간주하겠다!"
20023-CVGroup_ExSkill_Level_3-1 = "늦지 않은 것 같군."
20023-CVGroup_Formation_In_1-1 = "공안국이 나설 차례입니까?"
20023-CVGroup_Formation_In_2-1 = "명령이시라면."
20023-CVGroup_Formation_Select-1 = "응? 제 결제가 필요한 안건이라도?"
20023-CVGroup_Growup_1-1 = "과연, 그런 방법도 있었군요. 좋은 공부가 되었습니다."
20023-CVGroup_Growup_2-1 = "오늘의 훈련은…… 이만하면 충분하겠지요."
20023-CVGroup_Growup_3-1 = "시민을 위해 나날이 정진하겠습니다."
20023-CVGroup_Growup_4-1 = "국장이라 해도 부지런히 단련하지 않는다면, 부하들에게 모범이 되지 않겠지요."
20023-CVGroup_Relationship_Up_1-1 = "모든 어른이 선생님과 같다면, 저희가 일을 할 필요도 없겠습니다만……\n혼잣말이었으니 신경쓰지 마시길."
20023-CVGroup_Relationship_Up_2-1 = "아무리 저라도 선생님을 심문해서 정보를 캐내는 건 불가능하겠군요. 후후……"
20023-CVGroup_Relationship_Up_3-1 = "선생과 학생의 연애……? 무, 무슨 말씀을 하시는 겁니까!"
20023-CVGroup_Relationship_Up_4-1 = "가끔은, 샬레를 의지하겠습니다."

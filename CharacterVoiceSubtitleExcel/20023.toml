[translation]
20023-CVGroup_CommonSkill-1 = "ตรวจพบผู้ต้องสงสัย"
20023-CVGroup_ExSkill_1-1 = "เอาละ เริ่มการสอบสวนได้"
20023-CVGroup_ExSkill_2-1 = "คิดจะหลอกฉันก็ไม่มีประโยชน์หรอก"
20023-CVGroup_ExSkill_3-1 = "คงเคยได้ยินฉายาหมาบ้ามาแล้วละเนอะ"
20023-CVGroup_ExSkill_Level_1-1 = "นี่คือกรมความมั่นคงสาธารณะวัลคิรี่! หยุดนะ!"
20023-CVGroup_ExSkill_Level_2-1 = "อย่าขยับ! ถ้าขยับ ฉันจะถือว่าเป็นคนร้าย!"
20023-CVGroup_ExSkill_Level_3-1 = "ยังไม่สายไปสินะ"
20023-CVGroup_Formation_In_1-1 = "ถึงเวลากรมความมั่นคงสาธารณะออกโรงแล้วเหรอ?"
20023-CVGroup_Formation_In_2-1 = "ถ้าเป็นคำสั่งละก็"

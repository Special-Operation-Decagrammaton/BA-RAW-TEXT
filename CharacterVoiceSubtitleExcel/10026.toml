10026-CVGroup_Formation_Select-1 = "어이, 임마! 이거 놔! 바보!?"
10026-CVGroup_Growup_1-1 = "하, 나쁘지 않은걸. 답례는 제대로 해 줄 테니, 기대하라고!"
10026-CVGroup_Growup_2-1 = "하하! 좋잖아. 이런 걸 기다렸다고!"
10026-CVGroup_Growup_3-1 = "제법이잖아? 선생. 후회하지 않을 거라고."
10026-CVGroup_Growup_4-1 = "아아, 이건 나쁘지 않은데……! 좋아, 나머진 맡겨두라고!"
10026-CVGroup_Relationship_Up_1-1 = "어이, 각오해 둬……. 여기까지 어울려놓고\n농담이었습니다. 라고 변명할 생각 말라고."

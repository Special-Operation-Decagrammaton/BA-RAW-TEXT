10026-CVGroup_Relationship_Up_3-1 = "เฮ้อ เรื่องใหญ่เลยแฮะ\nหืม? อะไรน่ะ บอกว่าอย่ามองทางนี้ไง...!?"
10026-CVGroup_Relationship_Up_4-1 = "มันรู้สึกแปลกๆ น่ะ...\nไม่รู้ทำไมเวลาอยู่กับคุณครูจะเริ่มแปลกๆ ไปทุกที..."

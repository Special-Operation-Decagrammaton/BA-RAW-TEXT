10026-CVGroup_Relationship_Up_3-1 = "하아, 이거 큰일났네. 응? 뭐야. 이쪽 보지 말라고……!?"
10026-CVGroup_Relationship_Up_4-1 = "이상하단 말이지……. 왠지 선생이랑 있으면, 상태가 이상해진다고……."
10026-CVGroup_Tactic_In_1-1 = "자, 빨리 시작하자고."
10026-CVGroup_Tactic_In_2-1 = "이런 건 맡겨두라고!"
10026-CVGroup_Tactic_Victory_1-1 = "당연한 결과구만! 내가 누구라고 생각하냐?"
10026-CVGroup_Tactic_Victory_2-1 = "나에게 걸리면, 이 정도는 식은 죽 먹기지!"

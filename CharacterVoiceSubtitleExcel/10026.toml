10026-CVGroup_Battle_In_1-1 = "기다렸다고, 이때를 말이야!"
10026-CVGroup_Battle_In_2-1 = "맡겨둬. 금방 끝내줄 테니까!"
10026-CVGroup_Battle_Move_1-1 = "빨리빨리 넘어가자고!"
10026-CVGroup_Battle_Move_2-1 = "설마, 이걸로 끝은 아니겠지?"
10026-CVGroup_Battle_Recovery_1-1 = "나쁘지 않은 타이밍이야!"
10026-CVGroup_Battle_TacticalAction_1-1 = "하!!"
10026-CVGroup_Battle_Victory_1-1 = "하, 워밍업도 안되는구만."
10026-CVGroup_Battle_Victory_2-1 = "쉽다. 쉬워."
10026-CVGroup_CommonSkill-1 = "그게 전부냐?"
10026-CVGroup_ExSkill_1-1 = "……앙? 뭘 봐? 짜샤."
10026-CVGroup_ExSkill_2-1 = "어디 구경났어!?"
10026-CVGroup_ExSkill_3-1 = "박살나고 싶냐!?"
10026-CVGroup_ExSkill_Level_1-1 = "어이, 먹어라!"
10026-CVGroup_ExSkill_Level_2-1 = "하하하하하!!"
10026-CVGroup_ExSkill_Level_3-1 = "흐아압!!"
10026-CVGroup_Formation_In_1-1 = "뭐, 내가 있는 쪽이 낫겠지."

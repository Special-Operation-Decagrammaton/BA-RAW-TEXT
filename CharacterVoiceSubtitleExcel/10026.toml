[translation]
10026-CVGroup_Battle_Buffed_1-1 = "挺不賴的嘛！"
10026-CVGroup_Battle_Covered_1-1 = "不用急，我會對付你的。"
10026-CVGroup_Battle_Defense_1-1 = "哈哈！"
10026-CVGroup_Battle_In_1-1 = "我一直在等這個時候啊！"
10026-CVGroup_Battle_In_2-1 = "交給我吧，很快就會結束了！"
10026-CVGroup_Battle_Move_1-1 = "趕緊走吧！"
10026-CVGroup_Battle_Move_2-1 = "該不會這樣就結束了吧？"
10026-CVGroup_Battle_Recovery_1-1 = "時機挺不錯的嘛！"
10026-CVGroup_Battle_TacticalAction_1-1 = "好！"
10026-CVGroup_Battle_Victory_1-1 = "哈，連暖身運動都算不上。"
10026-CVGroup_Battle_Victory_2-1 = "輕鬆輕鬆！"
10026-CVGroup_CommonSkill-1 = "只有這點程度啊！？"
10026-CVGroup_ExSkill_1-1 = "……啊？看什麼看啊？"
10026-CVGroup_ExSkill_2-1 = "這可不是要讓你看的啊！"
10026-CVGroup_ExSkill_3-1 = "想被我打飛嗎！？"
10026-CVGroup_ExSkill_Level_1-1 = "喂，吃我這招！"
10026-CVGroup_ExSkill_Level_2-1 = "哈哈哈哈哈！"
10026-CVGroup_ExSkill_Level_3-1 = "哈啊！！"
10026-CVGroup_Formation_In_1-1 = "好吧，有我在也比較好吧。"
10026-CVGroup_Formation_In_2-1 = "挺有眼光的嘛！"
10026-CVGroup_Formation_Select-1 = "喂，放開我！笨蛋！"
10026-CVGroup_Growup_1-1 = "哈，挺不賴的嘛。\n我會好好報答你的，等著我吧！"
10026-CVGroup_Growup_2-1 = "哈哈！\n不錯嘛，我就在等著這個！"
10026-CVGroup_Growup_3-1 = "有兩下子嘛，老師。\n我不會讓你後悔的。"
10026-CVGroup_Growup_4-1 = "啊啊，這還真不錯……！\n好，之後就交給我吧！"
10026-CVGroup_Relationship_Up_1-1 = "喂，做好覺悟吧……\n陪我走到這一步，可不能用開玩笑來帶過啊。"
10026-CVGroup_Relationship_Up_2-1 = "……感覺還不賴。\n啊，不是，我什麼都沒說！？"
10026-CVGroup_Relationship_Up_3-1 = "唉，這還真是輸給你了……\n啊？怎樣啦，不要看我這邊……！？"
10026-CVGroup_Relationship_Up_4-1 = "真奇怪……\n總覺得只要跟老師待在一起，狀態就會變得很怪……"
10026-CVGroup_Tactic_In_1-1 = "好了，趕緊開始吧！"
10026-CVGroup_Tactic_In_2-1 = "這種事就交給我吧！"
10026-CVGroup_Tactic_Victory_1-1 = "這是理所當然的結果，你以為我是什麼人啊？"
10026-CVGroup_Tactic_Victory_2-1 = "只要有我在，這點小事根本不算什麼！"

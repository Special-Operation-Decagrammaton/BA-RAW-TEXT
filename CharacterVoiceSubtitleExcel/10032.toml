[translation]
10032-CVGroup_Battle_Buffed_1-1 = "啊哈，謝謝！"
10032-CVGroup_Battle_Defense_1-1 = "完全沒效唷～！"
10032-CVGroup_Battle_In_1-1 = "捉迷藏，開始～！"
10032-CVGroup_Battle_In_2-1 = "新年的委託，開始吧！"
10032-CVGroup_Battle_Move_1-1 = "好，繼續繼續！"
10032-CVGroup_Battle_Move_2-1 = "繼續繼～續玩吧！"
10032-CVGroup_Battle_Recovery_1-1 = "耶～！謝謝！"
10032-CVGroup_Battle_TacticalAction_1-1 = "稍微換個地方吧！"
10032-CVGroup_Battle_Victory_1-1 = "咯呵呵，嗯，意外還挺有趣的唷！"
10032-CVGroup_Battle_Victory_2-1 = "呵呵，多少有娛樂到了，還算及格吧？"
10032-CVGroup_CommonSkill-1 = "這招怎麼樣呀～！"
10032-CVGroup_ExSkill_1-1 = "啊哈～♪\n很好很好～！"
10032-CVGroup_ExSkill_2-1 = "哇哦，好厲害～！\n啊，想到了好主意！"
10032-CVGroup_ExSkill_3-1 = "玉屋～！\n真是不得了的煙火呢～！"
10032-CVGroup_ExSkill_Level_1-1 = "我也不會輸的唷～！\n看招～！"
10032-CVGroup_ExSkill_Level_2-1 = "鏘～！無月醬的特製煙火～！"
10032-CVGroup_ExSkill_Level_3-1 = "咯呵呵。我也正好帶著好東西呢～！"
10032-CVGroup_Formation_In_1-1 = "交給我吧，老師！\n我有個珍藏的作戰！"
10032-CVGroup_Formation_In_2-1 = "無論什麼委託都行唷，說說看吧？"
10032-CVGroup_Formation_Select-1 = "咯呵呵，老師你呀～想跟我用什麼方式玩樂呢？"
10032-CVGroup_Growup_1-1 = "老師，怎麼樣呀？\n不覺得稍微變大了嗎？"
10032-CVGroup_Growup_2-1 = "咯呵呵♪\n託老師的福，我變得這～麼強了唷！"
10032-CVGroup_Growup_3-1 = "咯呵呵，這樣啊～\n老師你，原來對我那麼……嘿～哼嗯～？"
10032-CVGroup_Growup_4-1 = "老師，你非常喜歡我呢……？\n咯呵呵，既然老師對我這麼期待，今年就讓你看更多比以往更帥氣的模樣吧！"
10032-CVGroup_Relationship_Up_1-1 = "一見到老師就會感到胸口一緊呢。\n這個，你覺得是為什麼呢？"
10032-CVGroup_Relationship_Up_2-1 = "唔嗯～只要待在老師身邊就會莫名覺得心癢癢的……\n所以……咯呵呵！就算稍微調戲一下也是沒辦法的！"
10032-CVGroup_Relationship_Up_3-1 = "老師，我還遠遠沒有感到滿足哦？\n所以還想稍微……再跟老師開心地多玩一下！"
10032-CVGroup_Relationship_Up_4-1 = "去年跟老師玩了很多次，真的很開心唷！\n所以不管今年還是明年，都要多～多跟我玩唷，老師！"
10032-CVGroup_Tactic_In_1-1 = "來，今年也開心地玩吧？"
10032-CVGroup_Tactic_In_2-1 = "咯呵呵！享樂準備OK了嗎？"
10032-CVGroup_Tactic_Victory_1-1 = "嗯～有點沒有完全燃燒呢～？\n吶，繼續玩吧！"
10032-CVGroup_Tactic_Victory_2-1 = "咯呵呵，大概就這樣吧？\n那麼，下次該玩什麼呢？"

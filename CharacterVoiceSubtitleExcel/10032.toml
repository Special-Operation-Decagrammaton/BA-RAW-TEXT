10032-CVGroup_Relationship_Up_4-1 = "작년에는 선생님이랑 많이 놀 수 있어서, 엄청 즐거웠어.\n그러니까 올해도, 내년에도, 잔뜩잔뜩 같이 놀자. 선생님!"

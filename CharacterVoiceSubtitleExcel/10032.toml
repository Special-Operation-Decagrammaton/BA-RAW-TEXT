[translation]
10032-CVGroup_Battle_Buffed_1-1 = "ฮะฮ่า ขอบคุณนะ!"
10032-CVGroup_Battle_Defense_1-1 = "คุยกันไม่รู้เรื่องเลยสักนิดเดียว~!"
10032-CVGroup_Battle_In_1-1 = "เริ่มเล่นซ่อนหาแล้วน้า~!"
10032-CVGroup_Battle_In_2-1 = "มาเริ่มภารกิจในวันปีใหม่กันเลยดีมั้ย~!"
10032-CVGroup_Battle_Move_1-1 = "เอ้า ต่อไป! ต่อไป!"
10032-CVGroup_Battle_Move_2-1 = "มาเล่นกันอีกเถอะ~!"
10032-CVGroup_Battle_Recovery_1-1 = "ว้าว! ขอบคุณนะ!"
10032-CVGroup_Battle_TacticalAction_1-1 = "เปลี่ยนตำแหน่งกันหน่อยมั้ย!"
10032-CVGroup_Battle_Victory_1-1 = "ฮุฮุฮุ อื้อ ภารกิจสนุกมากเลยละ!"
10032-CVGroup_Battle_Victory_2-1 = "ฮุฮุ มันสนุกนิดหน่อยนะ เอาเถอะ จะสอบผ่านรึเปล่าน้า?"
10032-CVGroup_CommonSkill-1 = "เจอนี่หน่อยเป็นไง~!"
10032-CVGroup_ExSkill_1-1 = "ฮะฮ่า~♪ ดีจังเลยน้า! ถูกใจที่สุดเลย!"
10032-CVGroup_ExSkill_2-1 = "ว้าว-! สุดยอดเลย~! อ๊ะ คิดอะไรดีๆ ออกแล้วละ!"
10032-CVGroup_ExSkill_3-1 = "ระเบิด~ไปซะ~! เป็นดอกไม้ไฟที่อลังการสุดๆ เลย~!"
10032-CVGroup_ExSkill_Level_1-1 = "เค้าจะยอมแพ้ได้ยังไงกัน~! เจอนี่ซะ!"
10032-CVGroup_ExSkill_Level_2-1 = "แต่นแต๊น~! การละเล่นดอกไม้ไฟของมุสึกิจัง!"
10032-CVGroup_ExSkill_Level_3-1 = "คิกคิกคิก เค้าพกของดีๆ มาด้วยนะ~"
10032-CVGroup_Formation_In_1-1 = "ไว้ใจเค้าได้เลย คุณครู! เค้ามีแผนลับ~!"
10032-CVGroup_Formation_In_2-1 = "มีภารกิจอะไรก็บอกมาได้เลยนะ"
10032-CVGroup_Formation_Select-1 = "คิกคิกคิก คุณครู~ อยากเล่นอะไรกับเค้าเหรอ~?"
10032-CVGroup_Growup_1-1 = "คุณครู เป็นไง? เค้าดูพัฒนาขึ้นบ้างมั้ย~?"
10032-CVGroup_Growup_2-1 = "คิกคิกคิก♪\nเพราะคุณครูอยู่ด้วย เค้าถึงแข็งแกร่งขึ้นได้แบบนี้น่ะ~!"
10032-CVGroup_Growup_3-1 = "คิกคิกคิก จริงด้วยสินะ~ คุณครูนี่ก็จริงๆ เลยเชียว\nถ้างั้นเค้าก็... ฮิฮิ ฮื้ม~?"
10032-CVGroup_Growup_4-1 = "คุณครูชอบเค้ามากขนาดนั้นเลยสินะ...\nฮุฮุฮุ คุณครูพึ่งพาเค้าขนาดนี้\nปีนี้เค้าก็จะแสดงภาพลักษณ์ที่ยอดเยี่ยมกว่าเดิมให้เห็นเอง!"
10032-CVGroup_Relationship_Up_1-1 = "เวลามองคุณครู เค้าจะรู้สึก 'หนึบหนับ' ในใจน่ะ\nเป็นเพราะ... อะไรกันนะ~?"
10032-CVGroup_Relationship_Up_2-1 = "อืม~ เวลาอยู่ข้างๆ คุณครู มันรู้สึกคันไม้คันมือน่ะ...\nเพราะงั้น... ฮุฮุฮุ เลยอดใจแกล้งเล่นไม่ได้น่ะสิ?!"
10032-CVGroup_Relationship_Up_3-1 = "คุณครู เค้ายังแข็งแกร่งไม่พอหรอก\nเพราะงั้นจะแข็งแกร่งขึ้นอีก...\nเค้าอยากไปเที่ยวเล่นสนุกกับคุณครูนะ~! "
10032-CVGroup_Relationship_Up_4-1 = "ปีที่แล้วได้ไปเที่ยวเล่นกับคุณครูตั้งหลายที่ สนุกมากเลยด้วย\nเพราะงั้นปีนี้ และปีหน้าก็มาเล่นด้วยกันเยอะๆ เลยนะคุณครู!"
10032-CVGroup_Tactic_In_1-1 = "เอาละ ปีนี้ก็มาเล่นสนุกกันนะ"
10032-CVGroup_Tactic_In_2-1 = "ฮุฮุฮุ เตรียมพร้อมเล่นสนุกแล้ว!"
10032-CVGroup_Tactic_Victory_1-1 = "อืม... ยังเครื่องร้อนไม่พอรึเปล่านะ~?\nเพราะงั้นมาเล่นกันต่อเถอะ!"
10032-CVGroup_Tactic_Victory_2-1 = "ฮุฮุฮุ ขนาดนี้เลยเหรอ?\nเอ้า ต่อไปจะเล่นอะไรดีล่ะ?"

[translation]
13000-CVGroup_Battle_Buffed_1-1 = "哎呀，非常感謝。"
13000-CVGroup_Battle_Covered_1-1 = "唔呵呵，是個好位置呢。"
13000-CVGroup_Battle_Defense_1-1 = "唔呵呵。"
13000-CVGroup_Battle_In_1-1 = "請交給我吧。\n陪伴在主人身邊，正是我存在的意義。"
13000-CVGroup_Battle_In_2-1 = "來吧，各位。\n我會乾淨、舒服地執行殲滅。"
13000-CVGroup_Battle_Move_1-1 = "呵呵，這裡也變乾淨了呢。"
13000-CVGroup_Battle_Move_2-1 = "前往下一場掃除吧？"
13000-CVGroup_Battle_Recovery_1-1 = "哎呀，真細心呢。"
13000-CVGroup_Battle_TacticalAction_1-1 = "嘿咻。"
13000-CVGroup_Battle_Victory_1-1 = "向主人獻上勝利作為禮物。\n那就是我的責任與任務。"
13000-CVGroup_Battle_Victory_2-1 = "一切，都為了主人。"
13000-CVGroup_CommonSkill-1 = "哎呀，原來在這裡啊。"
13000-CVGroup_ExSkill_1-1 = "排除主人的妨礙者。"
13000-CVGroup_ExSkill_2-1 = "哎呀，那麼就開始掃除吧？"
13000-CVGroup_ExSkill_3-1 = "您請看。目標……將會消失唷。"
13000-CVGroup_ExSkill_Level_1-1 = "優雅地，進行排除。"
13000-CVGroup_ExSkill_Level_2-1 = "各位。掃除，就麻煩了哦。"
13000-CVGroup_ExSkill_Level_3-1 = "還請務必小心哦。\n再會了。"
13000-CVGroup_Formation_In_1-1 = "來，那麼就開始侍奉吧。"
13000-CVGroup_Formation_In_2-1 = "授主人以愛，授敵人以鐵鎚。\n這就是C&C的侍奉。"
13000-CVGroup_Formation_Select-1 = "誠心誠意，為您侍奉。"
13000-CVGroup_Growup_1-1 = "如此一來，完美的侍奉……\n便化為可能了呢。"
13000-CVGroup_Growup_2-1 = "朱音，將會回應主人的期待。"
13000-CVGroup_Growup_3-1 = "敬請期待，主人。\n往後的朱音，將會有所改變。"
13000-CVGroup_Growup_4-1 = "往後的朱音想必……\n能100%滿足主人吧。"
13000-CVGroup_Relationship_Up_1-1 = "C&C的朱音。\n將誠摯地向主人獻上侍奉。"
13000-CVGroup_Relationship_Up_2-1 = "哎呀……您是在擔心我嗎？\n呵呵。我很高興。"
13000-CVGroup_Relationship_Up_3-1 = "究竟是為什麼呢……停止不了笑容。是因為主人就在身邊的關係嗎？"
13000-CVGroup_Relationship_Up_4-1 = "並非因為主人是老師才獻上侍奉。\n而是因為主人，我才能成為女僕。"
13000-CVGroup_Tactic_In_1-1 = "原來如此。是個出色的判斷。"
13000-CVGroup_Tactic_In_2-1 = "來，那麼就開始吧？\n打掃時間到了。"
13000-CVGroup_Tactic_Victory_1-1 = "優雅地獲得勝利。\n那就是我的責任與義務。"
13000-CVGroup_Tactic_Victory_2-1 = "不愧是我的主人呢。"

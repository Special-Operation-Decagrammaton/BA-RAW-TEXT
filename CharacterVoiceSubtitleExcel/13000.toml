[translation]
13000-CVGroup_Battle_Buffed_1-1 = "어머나, 감사해요."
13000-CVGroup_Battle_Covered_1-1 = "으흠~ 좋은 위치네요."
13000-CVGroup_Battle_Defense_1-1 = "우후후."
13000-CVGroup_Battle_In_1-1 = "맡겨주세요. 주인님과 함께 하는건, 저의 보람이니까요."
13000-CVGroup_Battle_In_2-1 = "자아 여러분. 깨끗하게, 산뜻하게, 섬멸해 드리겠습니다."
13000-CVGroup_Battle_Move_1-1 = "어머나, 여기도 깨끗해졌네요."
13000-CVGroup_Battle_Move_2-1 = "다음 청소 지역으로 가볼까요?"
13000-CVGroup_Battle_Recovery_1-1 = "어머, 눈치가 빠르시네요."
13000-CVGroup_Battle_TacticalAction_1-1 = "읏-챠."
13000-CVGroup_Battle_Victory_1-1 = "주인님께 승리를 선물하는 것. 그것이 저의 책임이자 임무랍니다."
13000-CVGroup_Battle_Victory_2-1 = "모든 것은, 주인님을 위해."
13000-CVGroup_CommonSkill-1 = "어머. 거기 계셨군요."
13000-CVGroup_ExSkill_1-1 = "주인님의 방해물을 제거하겠습니다."
13000-CVGroup_ExSkill_2-1 = "어머. 그럼 청소를 시작해 볼까요?"
13000-CVGroup_ExSkill_3-1 = "잘 보세요. 표적은……. 사라질 거예요."
13000-CVGroup_ExSkill_Level_1-1 = "우아하게, 제거합니다."
13000-CVGroup_ExSkill_Level_2-1 = "여러분. 청소 부탁 드려요."
13000-CVGroup_ExSkill_Level_3-1 = "정중하게 부탁드릴게요. 안녕히 가세요."
13000-CVGroup_Formation_In_1-1 = "자아, 그럼 봉사를 시작해볼까요."
13000-CVGroup_Formation_In_2-1 = "주인님께는 사랑을, 적에게는 철퇴를. 그것이 C&C의 봉사랍니다."
13000-CVGroup_Formation_Select-1 = "성심성의껏, 봉사하겠습니다."
13000-CVGroup_Growup_1-1 = "이것으로 더욱 완벽한 봉사가……. 가능해졌군요."
13000-CVGroup_Growup_2-1 = "아카네는, 주인님의 기대에 부응하겠습니다."
13000-CVGroup_Growup_3-1 = "기대해 주세요. 주인님. 앞으로의 아카네는 다를 테니까."
13000-CVGroup_Growup_4-1 = "이제부터 아카네는 분명……. 주인님을 100% 만족시킬 수 있을 거예요."
13000-CVGroup_Relationship_Up_1-1 = "C&C의 아카네. 삼가 주인님께 봉사를 다하겠습니다."
13000-CVGroup_Relationship_Up_2-1 = "어머……. 저를 걱정해주시는건가요? 후훗. 기뻐요."
13000-CVGroup_Relationship_Up_3-1 = "어째서일까요. 웃음이 멈추지 않아요. 주인님이 곁에 계시기 때문일까요?"
13000-CVGroup_Relationship_Up_4-1 = "주인님이 선생님이라서 봉사하는 게 아니에요.\n주인님이라서, 저는 메이드가 될 수 있던 거예요."
13000-CVGroup_Tactic_In_1-1 = "과연. 훌륭한 판단이에요."
13000-CVGroup_Tactic_In_2-1 = "자아. 그럼 시작해볼까요? 청소 시간이에요."
13000-CVGroup_Tactic_Victory_1-1 = "우아하게 승리하는 것. 그것이 저의 책임이자 의무죠."
13000-CVGroup_Tactic_Victory_2-1 = "역시, 저의 주인님이시네요."

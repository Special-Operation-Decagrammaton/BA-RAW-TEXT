[translation]
13000-CVGroup_Battle_Buffed_1-1 = "ตายจริง ขอบคุณค่ะ"
13000-CVGroup_Battle_Covered_1-1 = "อืม~ เป็นตำแหน่งที่ดีเลยนะคะ"
13000-CVGroup_Battle_Defense_1-1 = "ฮุฮุฮุ"
13000-CVGroup_Battle_In_1-1 = "วางใจฉันได้เลยค่ะ\nการได้อยู่กับนายท่านคือความภาคภูมิใจของฉันค่ะ"
13000-CVGroup_Battle_In_2-1 = "เอาละ ทุกคน\nฉันจะกวาดล้างให้สะอาดหมดจดเลยค่ะ"
13000-CVGroup_Battle_Move_1-1 = "ตายจริง ตรงนี้ก็สะอาดขึ้นด้วยนะคะ"
13000-CVGroup_Battle_Move_2-1 = "ไปจุดทำความสะอาดต่อไปเลยมั้ยคะ?"
13000-CVGroup_Battle_Recovery_1-1 = "ตายจริง ไหวพริบดีนะคะเนี่ย"
13000-CVGroup_Battle_TacticalAction_1-1 = "ฮึบ"
13000-CVGroup_Battle_Victory_1-1 = "การมอบชัยชนะเป็นของขวัญให้นายท่าน\nคือความรับผิดชอบและหน้าที่ของฉันค่ะ"
13000-CVGroup_Battle_Victory_2-1 = "ทุกอย่างเพื่อนายท่าน"
13000-CVGroup_CommonSkill-1 = "ตายจริง อยู่ตรงนั้นสินะคะ"
13000-CVGroup_ExSkill_1-1 = "ฉันจะกำจัดสิ่งกีดขวางของนายท่านให้ค่ะ"
13000-CVGroup_ExSkill_2-1 = "ตายจริง งั้นมาเริ่มทำความสะอาดกันเลยมั้ยคะ?"
13000-CVGroup_ExSkill_3-1 = "ดูให้ดีนะคะ เป้าหมาย... จะหายไปค่ะ"
13000-CVGroup_ExSkill_Level_1-1 = "กำจัดทิ้งอย่างสง่างามค่ะ"
13000-CVGroup_ExSkill_Level_2-1 = "ทุกคนคะ รบกวนทำความสะอาดด้วยค่ะ"
13000-CVGroup_ExSkill_Level_3-1 = "ขอความกรุณาด้วยนะคะ ลาก่อนค่ะ"
13000-CVGroup_Formation_In_1-1 = "เอาละ มาเริ่มการรับใช้กันเลยมั้ยคะ?"
13000-CVGroup_Formation_In_2-1 = "ความรักให้นายท่าน กระบองเหล็กให้ศัตรู\nนั่นคือการรับใช้ของ C&C ค่ะ"
13000-CVGroup_Formation_Select-1 = "ฉันจะทำงานจิตอาสาอย่างเต็มที่ค่ะ"
13000-CVGroup_Growup_1-1 = "สิ่งนี้จะทำให้รับใช้ได้อย่าง... สมบูรณ์แบบขึ้นเลยละค่ะ"
13000-CVGroup_Growup_2-1 = "อาคาเนะจะทำตามความคาดหวังของนายท่านค่ะ"
13000-CVGroup_Growup_3-1 = "ช่วยตั้งตารอด้วยนะคะ นายท่าน\nอาคาเนะในอนาคตจะต่างออกไปค่ะ"
13000-CVGroup_Growup_4-1 = "จากนี้ไปอาคาเนะจะ...\nทำให้นายท่านพอใจแบบ 100% ค่ะ"
13000-CVGroup_Relationship_Up_1-1 = "อาคาเนะจาก C&C\nจะตั้งใจรับใช้นายท่านค่ะ"
13000-CVGroup_Relationship_Up_2-1 = "ตายจริง... เป็นห่วงฉันงั้นเหรอคะ?\nฮุฮุ ดีใจจังเลยค่ะ"
13000-CVGroup_Relationship_Up_3-1 = "เป็นเพราะอะไรกันนะคะ ฉันหยุดยิ้มไม่ได้เลยค่ะ\nเป็นเพราะนายท่านอยู่ข้างๆ หรือเปล่าคะ?"
13000-CVGroup_Relationship_Up_4-1 = "ฉันไม่ได้รับใช้เพราะนายท่านคือคุณครูหรอกค่ะ\nเพราะคุณครูคือนายท่าน ฉันเลยเป็นเมดให้ได้น่ะค่ะ"
13000-CVGroup_Tactic_In_1-1 = "ตามคาดเลย เป็นการตัดสินใจที่ยอดเยี่ยมเลยค่ะ"
13000-CVGroup_Tactic_In_2-1 = "เอาละ งั้นมาเริ่มกันเลยมั้ยคะ?\nถึงเวลาทำความสะอาดแล้วค่ะ"
13000-CVGroup_Tactic_Victory_1-1 = "การชนะอย่างสง่างาม\nคือความรับผิดชอบและหน้าที่ของฉันค่ะ"
13000-CVGroup_Tactic_Victory_2-1 = "สมกับที่เป็นนายท่านของฉันเลยนะคะ"

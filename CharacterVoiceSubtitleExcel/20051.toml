[translation]
20051-CVGroup_CommonSkill-1 = "ด้วยความรัก ความกล้าหาญ และพลังแห่งมิตรภาพ!"
20051-CVGroup_ExSkill_1-1 = "จากตลับกระสุนสู่ลำกล้องปืน\nมาตราที่ 6 ของกฎหมายเวทมนตร์!"
20051-CVGroup_ExSkill_2-1 = "พลังที่ไม่หวั่นไหว!"
20051-CVGroup_ExSkill_3-1 = "นี่แหละคือตัวฉันค่ะ!"
20051-CVGroup_ExSkill_Level_1-1 = "โบลต์ ฟอร์เวิร์ด! เทอร์ไมต์ พิงค์!"
20051-CVGroup_ExSkill_Level_2-1 = "ตัวแทนแห่งความยุติธรรม... ปรากฏตัวแล้วค่ะ!"
20051-CVGroup_ExSkill_Level_3-1 = "ท้าดา~! ปาปาปาปาม! ปาปาปัง!"
20051-CVGroup_Formation_In_1-1 = "เทอร์ไมต์ พิงค์มาแล้วค่ะ!"
20051-CVGroup_Formation_In_2-1 = "กลุ่มรักษาความสงบเวทมนตร์ออกปฏิบัติการค่ะ!"
20051-CVGroup_Formation_Select-1 = "อุซาวะ เรอิสะ! หรือในอีกชื่อหนึ่ง... เทอร์ไมต์ พิงค์!"
20051-CVGroup_Growup_1-1 = "ฉันรับของสิ่งนี้ไว้ได้จริงๆ เหรอคะ...? ขอบคุณมากค่ะ!"
20051-CVGroup_Growup_2-1 = "ด้วยพลังที่ฉันได้รับจากคุณครู... ฉันจะแข็งแกร่งขึ้นให้ได้ค่ะ!"
20051-CVGroup_Growup_3-1 = "อุซาวะ เรอิสะจะมุ่งมั่นไปสู่เป้าหมายที่สูงขึ้นค่ะ!"
20051-CVGroup_Growup_4-1 = "ถ้าเพื่อคุณครูแล้วละก็ฉันจะ... แปลงร่างขั้น 2...\nไม่สิ แปลงร่างขั้น 17 เลยค่ะ!"
20051-CVGroup_Relationship_Up_1-1 = "พลังแห่งโชคชะตาน่ะแข็งแกร่งมากนะคะ!\nใช่แล้วค่ะ แข็งแกร่งที่สุดเลยด้วย!"
20051-CVGroup_Relationship_Up_2-1 = "ฉันชื่นชมความแข็งแกร่งของฮีโร่เสมอ...\nแต่ว่า... ฉันก็ชื่นชมความใจดีของคุณครูด้วยเหมือนกันค่ะ"
20051-CVGroup_Relationship_Up_3-1 = "คุณครูชมฉันบ่อยๆ นี่คะ?\nมันทำให้ฉัน... มีความสุขมากเลยค่ะ!"
20051-CVGroup_Relationship_Up_4-1 = "ฉันจะปกป้องความสงบสุขและคุณครูเองค่ะ!"

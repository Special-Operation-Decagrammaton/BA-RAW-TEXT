[translation]
20051-CVGroup_CommonSkill-1 = "以愛！勇氣！和友情的力量！"
20051-CVGroup_ExSkill_1-1 = "從Feed ramp到Chamber。六條右旋的魔法……！"
20051-CVGroup_ExSkill_2-1 = "以堅定不移的力量──！"
20051-CVGroup_ExSkill_3-1 = "這就是我！"
20051-CVGroup_ExSkill_Level_1-1 = "Bolt Forward！Thermite Pink！"
20051-CVGroup_ExSkill_Level_2-1 = "正義的夥伴，降臨！"
20051-CVGroup_ExSkill_Level_3-1 = "閃亮！砰！砰砰砰砰～！"
20051-CVGroup_Formation_In_1-1 = "Thermite Pink！出場！"
20051-CVGroup_Formation_In_2-1 = "正義的魔法自衛隊，出發！"
20051-CVGroup_Formation_Select-1 = "宇沢澪紗！又名～Thermite Pink！"
20051-CVGroup_Growup_1-1 = "這個……我收下真的沒問題嗎？\n非常感謝！"
20051-CVGroup_Growup_2-1 = "藉著老師給我的這股力量，我絕對會成長給你看的！"
20051-CVGroup_Growup_3-1 = "宇沢澪紗，將繼續追求更高的境界！"
20051-CVGroup_Growup_4-1 = "只要是為了老師，我！\n二段變身……不，就連十七段變身都會做到！！"
20051-CVGroup_Relationship_Up_1-1 = "羈絆的力量非常強大！\n沒錯，那當然！是最強的唷！"
20051-CVGroup_Relationship_Up_2-1 = "我雖然憧憬英雄的力量……\n不過……老師的溫柔，也讓我非常憧憬。"
20051-CVGroup_Relationship_Up_3-1 = "老師經常誇獎我對吧？\n那真的非常……讓人開心。"
20051-CVGroup_Relationship_Up_4-1 = "世界的和平與老師，兩者……我都會守護的！"

[translation]
13006-CVGroup_CommonSkill-1 = "깜짝 놀라게 해줄 테니까!"
13006-CVGroup_ExSkill_1-1 = "짜잔~ 불꽃놀이를 시작해볼까!"
13006-CVGroup_ExSkill_2-1 = "두근거리는 시간이 왔어!"
13006-CVGroup_ExSkill_3-1 = "자아, 간다아아-!"
13006-CVGroup_ExSkill_Level_1-1 = "받아랏~ 펑~ 아하하하하! 재미있어."
13006-CVGroup_ExSkill_Level_2-1 = "꺄하하하! 팝콘같아!"
13006-CVGroup_ExSkill_Level_3-1 = "쾅쾅 쏴버리면…... 폭! 발! 해! 라!"
13006-CVGroup_Growup_1-1 = "좋아, 선생님의 기대에 팍팍 부응해 줄 테니까~"
13006-CVGroup_Growup_2-1 = "어때? 나를 더 소중하게 생각하게 되었어?"
13006-CVGroup_Growup_3-1 = "쿠후후후, 더 강해진 느낌~"
13006-CVGroup_Growup_4-1 = "나를 이렇게까지 아껴준다는 건……. 내게! 애정이 있는 거구나~ 그치?"
13006-CVGroup_Relationship_Up_1-1 = "선생님과 함께 있으면, 어쩐지 평소보다 더 즐거워. 이유는 모르겠지만."
13006-CVGroup_Relationship_Up_2-1 = "이번엔 내가 선생님한테 부탁해 볼까나~"
13006-CVGroup_Relationship_Up_3-1 = "쿠후후~ 달려가 꽈악 매달리고 싶어."
13006-CVGroup_Relationship_Up_4-1 = "재미있으니까 함께 있는 거라고 생각했어.\n하지만……. 그 이유 때문만이 아니었던 거야.\n꺄핫!"
13006-CVGroup_Battle_Buffed_1-1 = "꺄하, 고마워."
13006-CVGroup_Battle_Defense_1-1 = "소용없다구~"
13006-CVGroup_Battle_In_1-1 = "으음~ 일단 신나게 가보는거야!"
13006-CVGroup_Battle_In_2-1 = "좋아~ 의뢰를 시작하자!"
13006-CVGroup_Battle_Move_1-1 = "꺄하하, 재밌었다~"
13006-CVGroup_Battle_Move_2-1 = "이쪽엔 뭐가 있으려나~?"
13006-CVGroup_Battle_Recovery_1-1 = "아하하, 고마워~"
13006-CVGroup_Battle_TacticalAction_1-1 = "간다아~"
13006-CVGroup_Battle_Victory_1-1 = "빙글~ 재미있었어!"
13006-CVGroup_Battle_Victory_2-1 = "짜자잔짠~ 승리, 승리!"
13006-CVGroup_Formation_In_1-1 = "금방 갈게!"
13006-CVGroup_Formation_In_2-1 = "의뢰의 시간, 시작이야!"
13006-CVGroup_Formation_Select-1 = "쿠후후, 역시 내가 필요하지?"
13006-CVGroup_Tactic_In_1-1 = "와아~ 신나게 놀아볼까나?"
13006-CVGroup_Tactic_In_2-1 = "이 녀석? 일단 해치워 둘게~"
13006-CVGroup_Tactic_Victory_1-1 = "끝났지? 선생님! 이제 놀자, 놀자!"
13006-CVGroup_Tactic_Victory_2-1 = "쿠후후후... 재미있었어."

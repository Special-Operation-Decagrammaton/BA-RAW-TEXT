[translation]
13006-CVGroup_CommonSkill-1 = "เค้าจะทำให้ตกใจเลยละ!"
13006-CVGroup_ExSkill_1-1 = "ทาด๊า~ มาเริ่มเล่นดอกไม้ไฟกันมั้ย?"
13006-CVGroup_ExSkill_2-1 = "เวลาที่น่าตื่นเต้นมาถึงแล้ว!"
13006-CVGroup_ExSkill_3-1 = "เอาละ ไปกันเลย!"
13006-CVGroup_ExSkill_Level_1-1 = "รับไปเลย~ ตู้ม~\nอะฮ่าฮ่าฮ่าฮ่า! สนุกจัง"
13006-CVGroup_ExSkill_Level_2-1 = "ฮ่าฮ่าฮ่าฮ่า! เหมือนป๊อปคอร์นเลย!"
13006-CVGroup_ExSkill_Level_3-1 = "ถ้ายิงปั้งๆ ละก็...\nระ! เบิด! เลย!"
13006-CVGroup_Growup_1-1 = "ดีละ จะทำให้สมกับที่คุณครูคาดหวังเลย~"
13006-CVGroup_Growup_2-1 = "เป็นไงล่ะ? เห็นคุณค่าของเค้าขึ้นบ้างหรือยัง?"
13006-CVGroup_Growup_3-1 = "ฮุฮุฮุฮุ รู้สึกแข็งแกร่งขึ้นแฮะ~"
13006-CVGroup_Growup_4-1 = "ที่หวงแหนเค้าขนาดนี้... แปลว่า! เอ็นดูเค้าสินะ~ ใช่ม้า?"
13006-CVGroup_Relationship_Up_1-1 = "ถ้าได้อยู่กับคุณครูจะรู้สึกสนุกกว่าปกติน่ะ\nแต่ไม่รู้เหตุผลหรอกนะ"
13006-CVGroup_Relationship_Up_2-1 = "ครั้งนี้เค้าขอร้องครูดูบ้างดีมั้ยน้า~"
13006-CVGroup_Relationship_Up_3-1 = "ฮุฮุฮุ~ อยากวิ่งไปเกาะไว้จัง"
13006-CVGroup_Relationship_Up_4-1 = "เค้าคิดว่าเราอยู่ด้วยกันเพราะมันสนุกน่ะ\nแต่ว่า... ไม่ได้มีแค่เหตุผลนั้นนะ ฮ่าฮ่า!"
13006-CVGroup_Battle_Buffed_1-1 = "ว้าว ขอบคุณนะ"
13006-CVGroup_Battle_Defense_1-1 = "ไม่มีประโยชน์หรอกน่า~"
13006-CVGroup_Battle_In_1-1 = "อืม~ มาสนุกกันก่อนแล้วกัน!"
13006-CVGroup_Battle_In_2-1 = "ดีละ~ มาเริ่มภารกิจกัน!"
13006-CVGroup_Battle_Move_1-1 = "ฮ่าฮ่าฮ่า สนุกจัง~"
13006-CVGroup_Battle_Move_2-1 = "ทางนี้จะมีอะไรบ้างนะ~?"
13006-CVGroup_Battle_Recovery_1-1 = "อะฮ่าฮ่า ขอบคุณนะ~"
13006-CVGroup_Battle_TacticalAction_1-1 = "เอาละนะ~"
13006-CVGroup_Battle_Victory_1-1 = "ฮิฮิ~ สนุกจังเลย!"
13006-CVGroup_Battle_Victory_2-1 = "ทาด๊าา~ ชนะ ชนะ!"
13006-CVGroup_Formation_In_1-1 = "จะรีบไปเดี๋ยวนี้ละ!"
13006-CVGroup_Formation_In_2-1 = "ได้เวลาทำภารกิจแล้ว!"
13006-CVGroup_Formation_Select-1 = "ฮุฮุฮุ ต้องการตัวเค้าล่ะสิ?"
13006-CVGroup_Tactic_In_1-1 = "ว้าว~ ไปเล่นสนุกหน่อยดีมั้ยน้า?"
13006-CVGroup_Tactic_In_2-1 = "เจ้านี่นี่! ขอเอาออกก่อนละนะ~"
13006-CVGroup_Tactic_Victory_1-1 = "เสร็จแล้วใช่มั้ย? คุณครู!\nงั้นก็ไปเล่นสนุกกันเถอะ!"
13006-CVGroup_Tactic_Victory_2-1 = "ฮุฮุฮุฮุ... สนุกจังเลย"

10031-CVGroup_Relationship_Up_4-1 = "รู้ตัวอีกทีอยู่กับคุณครูมาจนถึงตอนนี้แล้ว...\nทั้งปีนี้และในปีหน้า... ก็ฝากด้วยนะคุณครู"

[translation]
10031-CVGroup_Battle_Buffed_1-1 = "呵呵，幫大忙了。"
10031-CVGroup_Battle_Covered_1-1 = "已經確保安全了。"
10031-CVGroup_Battle_Defense_1-1 = "呵呵，沒用的唷？"
10031-CVGroup_Battle_In_1-1 = "勇猛精進……來，要開始囉！"
10031-CVGroup_Battle_In_2-1 = "來，今年也開始工作吧！"
10031-CVGroup_Battle_Move_1-1 = "好了，沒時間拖拖拉拉了唷。"
10031-CVGroup_Battle_Move_2-1 = "下一個，要出發囉！"
10031-CVGroup_Battle_Recovery_1-1 = "呵呵，感謝。"
10031-CVGroup_Battle_TacticalAction_1-1 = "要移動了。"
10031-CVGroup_Battle_Victory_1-1 = "今年的運勢，似乎不看也知道是大吉呢。"
10031-CVGroup_Battle_Victory_2-1 = "今年也從開頭就很完美呢。"
10031-CVGroup_CommonSkill-1 = "呵呵！"
10031-CVGroup_ExSkill_1-1 = "好好看著吧，我的實力……咦？\n啊 ，啊啊！？"
10031-CVGroup_ExSkill_2-1 = "仔細看著吧……咦，咦？\n咦咦！？"
10031-CVGroup_ExSkill_3-1 = "這種小事不算什……啊！\n不是，等等……！"
10031-CVGroup_ExSkill_Level_1-1 = "可，惡……嘿！！"
10031-CVGroup_ExSkill_Level_2-1 = "哇，等等……Chest！"
10031-CVGroup_ExSkill_Level_3-1 = "呀，呃……喝啊！？"
10031-CVGroup_Formation_In_1-1 = "呵呵，挺有眼光的嘛。"
10031-CVGroup_Formation_In_2-1 = "那個委託，我就接受吧。"
10031-CVGroup_Formation_Select-1 = "這，這件和服可是很貴的！\n對待的時候要小心一點哦！？"
10031-CVGroup_Growup_1-1 = "不愧是我，依然還有許多成長的餘地呢。"
10031-CVGroup_Growup_2-1 = "呵呵，我的真正價值越來越發揮出來了呢。"
10031-CVGroup_Growup_3-1 = "呵，呵呵。我的厲害之處，你總算明白了嗎？"
10031-CVGroup_Growup_4-1 = "呵呵，像這樣越變越強的我……\n多多依賴也沒關係的唷，老師？"
10031-CVGroup_Relationship_Up_1-1 = "老師跟我，不覺得是挺不錯的夥伴嗎？"
10031-CVGroup_Relationship_Up_2-1 = "呵呵，儘管高興吧。\n從今以後，我也會一直陪在你身邊的。"
10031-CVGroup_Relationship_Up_3-1 = "老師你，對我來說已經不再只是單純的委託人……\n是，是那個……沒錯，是VIP！"
10031-CVGroup_Relationship_Up_4-1 = "居然在不知不覺間，已經跟老師走到了這一步……\n今年自不必說，明年也……請多多指教囉，老師。"
10031-CVGroup_Tactic_In_1-1 = "是跟我這樣的領袖相符的工作呢。"
10031-CVGroup_Tactic_In_2-1 = "那份信賴，就由我來回應吧。"
10031-CVGroup_Tactic_Victory_1-1 = "呵呵，是當然的結果呢。"
10031-CVGroup_Tactic_Victory_2-1 = "怎麼樣，這就是所謂格調的差距唷！"

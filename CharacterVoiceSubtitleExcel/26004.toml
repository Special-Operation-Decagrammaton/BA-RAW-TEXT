[translation]
26004-CVGroup_CommonSkill-1 = "Knowledge is food for the soul."
26004-CVGroup_ExSkill_1-1 = "Hmhm! How fun!"
26004-CVGroup_ExSkill_2-1 = "Ooh! I'm touched!"
26004-CVGroup_ExSkill_3-1 = "*sigh* Is this...love?!"
26004-CVGroup_ExSkill_Level_1-1 = "Everyone! Please read more books!"
26004-CVGroup_ExSkill_Level_2-1 = "Read a book with me!"
26004-CVGroup_ExSkill_Level_3-1 = "Another testimony to the power of books!"
26004-CVGroup_Formation_In_1-1 = "Heehee. If you say so. Here I go!"
26004-CVGroup_Formation_In_2-1 = "If my strength could assist...!"
26004-CVGroup_Growup_1-1 = "Thank you, Sensei."
26004-CVGroup_Growup_2-1 = "The more books you read, the stronger you can become!"
26004-CVGroup_Growup_3-1 = "Wisdom from all corners of the world can be found in books."
26004-CVGroup_Growup_4-1 = "Another mote of knowledge!"
26004-CVGroup_Relationship_Up_1-1 = "I know what love is, you know. I've read all about it in books."
26004-CVGroup_Relationship_Up_2-1 = "Heehee! I feel just like I do when I finish a good book...happy."
26004-CVGroup_Relationship_Up_3-1 = "There are some things I can't learn from books. For example, they can't tell me a thing about you."
26004-CVGroup_Relationship_Up_4-1 = "Learning new things always makes me happy too. What would you like to know about me, Sensei?"

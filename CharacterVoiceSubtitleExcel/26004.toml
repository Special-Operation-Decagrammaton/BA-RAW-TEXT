[translation]
26004-CVGroup_CommonSkill-1 = "知識就是心靈的糧食呢～"
26004-CVGroup_ExSkill_1-1 = "哼哼～真有趣！"
26004-CVGroup_ExSkill_2-1 = "哦哦哦～真讓人感動！"
26004-CVGroup_ExSkill_3-1 = "哈啊……\n這就是……愛！？"
26004-CVGroup_ExSkill_Level_1-1 = "大家！請多讀一點書吧！"
26004-CVGroup_ExSkill_Level_2-1 = "跟我一起讀書吧！"
26004-CVGroup_ExSkill_Level_3-1 = "這也是書本的力量！"
26004-CVGroup_Formation_In_1-1 = "呵呵，真拿你沒辦法呢～\n出發囉！"
26004-CVGroup_Formation_In_2-1 = "如果我的力量能幫上忙的話……！"
26004-CVGroup_Growup_1-1 = "謝謝你，老師。"
26004-CVGroup_Growup_2-1 = "讀越多書，就能變得越強！"
26004-CVGroup_Growup_3-1 = "書本裡面，充滿了世界中的智慧。"
26004-CVGroup_Growup_4-1 = "知識又增加了呢～"
26004-CVGroup_Relationship_Up_1-1 = "愛是什麼樣的東西，我知道。\n我有在書本裡仔細學過了。"
26004-CVGroup_Relationship_Up_2-1 = "呵呵，就像讀了好書後的那種幸福的心情一樣。"
26004-CVGroup_Relationship_Up_3-1 = "也有從書裡無法學習的事物。\n舉例來說，就像老師一樣。"
26004-CVGroup_Relationship_Up_4-1 = "能夠了解原本不了解的事物，是件非常開心的事。\n老師你……想了解我到什麼程度呢？"

[translation]
26004-CVGroup_CommonSkill-1 = "지식은 마음의 양식이지요~"
26004-CVGroup_ExSkill_1-1 = "흐흐흐흠~ 재미있네요!"
26004-CVGroup_ExSkill_2-1 = "오오오~ 감동했어요!"
26004-CVGroup_ExSkill_3-1 = "하아- 이것은… 사랑?!"
26004-CVGroup_ExSkill_Level_1-1 = "여러분! 좀 더 책을 읽어 주세요!"
26004-CVGroup_ExSkill_Level_2-1 = "저와 함께 책을 읽죠!"
26004-CVGroup_ExSkill_Level_3-1 = "이것 또한, 책의 힘이에요!"
26004-CVGroup_Formation_In_1-1 = "후훗. 어쩔 수 없네요~\n갑니다!"
26004-CVGroup_Formation_In_2-1 = "제 힘이 도움이 된다면……!"
26004-CVGroup_Growup_1-1 = "감사합니다, 선생님."
26004-CVGroup_Growup_2-1 = "책을 읽으면 읽을수록 강해질 수 있어요!"
26004-CVGroup_Growup_3-1 = "책에는 세상의 모든 지혜가 담겨있죠."
26004-CVGroup_Growup_4-1 = "또 지식이 늘었네요~"
26004-CVGroup_Relationship_Up_1-1 = "사랑이 어떤 것인지, 알고 있어요. 책에서 확실하게 배웠으니까."
26004-CVGroup_Relationship_Up_2-1 = "후후, 마치 좋은 책을 읽고난 뒤의 기분처럼. 행복한 느낌이네요."
26004-CVGroup_Relationship_Up_3-1 = "책으로는 배울 수 없던 게 있더라고요.\n예를 들어, 선생님에 대해서라던가."
26004-CVGroup_Relationship_Up_4-1 = "알지 못했던 것을 알게 되는 건, 기쁜 일이지요.\n선생님은… 저에 대해 얼마나 알고 싶으신가요?"

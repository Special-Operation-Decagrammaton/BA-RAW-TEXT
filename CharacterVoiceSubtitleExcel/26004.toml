[translation]
26004-CVGroup_CommonSkill-1 = "ความรู้คืออาหารของจิตใจค่ะ~"
26004-CVGroup_ExSkill_1-1 = "ฮืมมม~ สนุกจังเลยค่ะ!"
26004-CVGroup_ExSkill_2-1 = "โอ้~ น่าประทับใจจังค่ะ!"
26004-CVGroup_ExSkill_3-1 = "ฮ่า... นี่คือ... ความรักเหรอ?!"
26004-CVGroup_ExSkill_Level_1-1 = "ทุกคน! อ่านหนังสือกันอีกหน่อยสิคะ!"
26004-CVGroup_ExSkill_Level_2-1 = "มาอ่านหนังสือกับฉันสิคะ!"
26004-CVGroup_ExSkill_Level_3-1 = "นี่ก็คือพลังของหนังสือเหมือนกันค่ะ!"
26004-CVGroup_Formation_In_1-1 = "ฮุฮุ ช่วยไม่ได้นะคะ~\nลุยล่ะนะ!"
26004-CVGroup_Formation_In_2-1 = "ถ้าฉันจะเป็นกำลังให้ได้ละก็...!"
26004-CVGroup_Growup_1-1 = "ขอบคุณค่ะ คุณครู"
26004-CVGroup_Growup_2-1 = "ยิ่งอ่านหนังสือ ก็จะยิ่งแข็งแกร่งนะคะ!"
26004-CVGroup_Growup_3-1 = "ความรู้ทั้งหมดในโลกมีอยู่ในหนังสือค่ะ"
26004-CVGroup_Growup_4-1 = "ความรู้เพิ่มขึ้นอีกแล้วนะคะ~"
26004-CVGroup_Relationship_Up_1-1 = "ฉันรู้ค่ะว่าความรักเป็นอย่างไร\nฉันเรียนจากในหนังสือมาอย่างดีเลยค่ะ"
26004-CVGroup_Relationship_Up_2-1 = "ฮุฮุ มีความสุขเหมือนตอนที่อ่านหนังสือดีๆ จบเลยค่ะ"
26004-CVGroup_Relationship_Up_3-1 = "มีเรื่องที่เรียนรู้ไม่ได้จากหนังสือด้วยค่ะ\nอย่างเช่นเรื่องเกี่ยวกับคุณครูน่ะค่ะ"
26004-CVGroup_Relationship_Up_4-1 = "การได้รู้เรื่องที่ไม่รู้เป็นเรื่องน่ายินดีค่ะ\nแล้วคุณครูน่ะ... รู้เกี่ยวกับฉันมากแค่ไหนคะ?"

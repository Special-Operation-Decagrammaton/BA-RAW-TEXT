[translation]
10114-CVGroup_Battle_Buffed_1-1 = "非常感謝！我會加油的！"
10114-CVGroup_Battle_Defense_1-1 = "啊嗚，好險……"
10114-CVGroup_Battle_In_1-1 = "1號桌的客人，我這就拿過去！"
10114-CVGroup_Battle_In_2-1 = "請問要點什麼呢？"
10114-CVGroup_Battle_Move_1-1 = "請稍等！"
10114-CVGroup_Battle_Move_2-1 = "好的！我立刻過去！"
10114-CVGroup_Battle_Recovery_1-1 = "非常感謝！"
10114-CVGroup_Battle_TacticalAction_1-1 = "下，下一單是，那個……"
10114-CVGroup_Battle_Victory_1-1 = "謝謝惠顧！\n……餅，餅醬你要去哪裡！"
10114-CVGroup_Battle_Victory_2-1 = "呵呵，這都多虧了老師！\n……餅，餅醬等等！"
10114-CVGroup_CommonSkill-1 = "這是您點的甜點！"
10114-CVGroup_ExSkill_1-1 = "最後把這個……好！\n奇，奇怪！？"
10114-CVGroup_ExSkill_2-1 = "收尾就用……完成了！\n呀啊！？"
10114-CVGroup_ExSkill_3-1 = "輕輕地……咦！\n怎麼會！？"
10114-CVGroup_ExSkill_Level_1-1 = "啊嗚嗚……怎麼辦才好……"
10114-CVGroup_ExSkill_Level_2-1 = "餅醬！請冷靜一點！"
10114-CVGroup_ExSkill_Level_3-1 = "不，不要搗亂……"
10114-CVGroup_Formation_In_1-1 = "是！讓您久等了！"
10114-CVGroup_Formation_In_2-1 = "找我嗎？"
10114-CVGroup_Formation_Select-1 = "呀啊……！\n讓您久等了，百匯來了！"
10114-CVGroup_Growup_1-1 = "謝謝你，老師！\n我……做得好嗎？"
10114-CVGroup_Growup_2-1 = "我今後也會加油的！\n一點一點，認真努力！"
10114-CVGroup_Growup_3-1 = "因為有老師在背後鼓勵……\n我現在才能站在這裡……！"
10114-CVGroup_Growup_4-1 = "我認為最重要的是幫上客人的……幫上他人的忙。"
10114-CVGroup_Relationship_Up_1-1 = "如果有一天，我能做出美味的料理的話……\n我想把第一口給老師享用！"
10114-CVGroup_Relationship_Up_2-1 = "我現在希望能把自己能做的事情拚盡全力，努力做好。\n如果能跟老師一起的話……感覺就能順利做到。"
10114-CVGroup_Relationship_Up_3-1 = "能待在老師身邊，真是太好了。\n我，最喜歡老師……老，老師的時間了！"
10114-CVGroup_Relationship_Up_4-1 = "老師，不介意的話，請享用這個百匯吧！\n那個……我真的做得很好！"
10114-CVGroup_Tactic_In_1-1 = "老師，請守望著我吧！"
10114-CVGroup_Tactic_In_2-1 = "在今天的排班結束之前，我會努力的！"
10114-CVGroup_Tactic_Victory_1-1 = "期待您的再次光臨！"
10114-CVGroup_Tactic_Victory_2-1 = "呵呵，謝謝您的光臨！"

[translation]
10114-CVGroup_Battle_Buffed_1-1 = "มีแรงฮึดแล้วค่ะ! ขอบคุณทุกๆ คนเลยค่ะ!"
10114-CVGroup_Battle_Defense_1-1 = "อ๊ะ! เกือบเป็นเรื่องแล้วมั้ยล่ะคะ..."
10114-CVGroup_Battle_In_1-1 = "ลูกค้าโต๊ะ 1 รบกวนรอสักครู่นะคะ!"
10114-CVGroup_Battle_In_2-1 = "จะสั่งอะไรดีคะ?"
10114-CVGroup_Battle_Move_1-1 = "รอสักครู่นะคะ!"
10114-CVGroup_Battle_Move_2-1 = "ค่ะ! จะไปเดี๋ยวนี้เลยค่ะ!"
10114-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ!"
10114-CVGroup_Battle_TacticalAction_1-1 = "อะ... ออเดอร์ต่อไป คือ..."
10114-CVGroup_Battle_Victory_1-1 = "ทำสำเร็จแล้วค่ะ!\nเอ๋? จะไปไหนน่ะ?!"
10114-CVGroup_Battle_Victory_2-1 = "ทุกอย่างต้องขอบคุณคุณครูเลยนะคะ!\nดะ... เดี๋ยวก่อน รอด้วยสิ!"
10114-CVGroup_CommonSkill-1 = "ของหวานที่สั่งได้แล้วค่า!"
10114-CVGroup_ExSkill_1-1 = "ถ้างั้นอันนี้... แหะๆๆ... อะ... เอ๋?"
10114-CVGroup_ExSkill_2-1 = "สุดท้ายก็อันนี้... สำเร็จแล้ว! อ๊ายย?!"
10114-CVGroup_ExSkill_3-1 = "ระวังนะ ระวัง... ว้าย! อย่านะ!"
10114-CVGroup_ExSkill_Level_1-1 = "โอ้ อ่า... ทำยังไงดีล่ะ..."
10114-CVGroup_ExSkill_Level_2-1 = "ใจเย็นๆ นะ แพนจัง!"
10114-CVGroup_ExSkill_Level_3-1 = "จะมาหงุดหงิดแบบนี้ไม่ได้นะ..."
10114-CVGroup_Formation_In_1-1 = "ค่ะ! ขอบคุณที่จำได้นะคะ!"
10114-CVGroup_Formation_In_2-1 = "เจอรึเปล่าคะ?"
10114-CVGroup_Formation_Select-1 = "กรี๊ด?! รอนานรึเปล่าคะ? พาร์เฟต์มาแล้วค่ะ!"
10114-CVGroup_Growup_1-1 = "ขอบคุณค่ะคุณครู!\nดะ... ดีขึ้นสักนิดรึเปล่าคะ?"
10114-CVGroup_Growup_2-1 = "ฉันจะพยายามค่ะ!\nจะค่อยๆ ทำอย่างระมัดระวังค่ะ!"
10114-CVGroup_Growup_3-1 = "ขอบคุณที่คอยดูแลฉันเสมอนะคะ\nทั้งหมด... ทุกอย่างนี้ต้องขอบคุณคุณครูเลยค่ะ...!"
10114-CVGroup_Growup_4-1 = "ฉันคิดว่าสิ่งสำคัญคือการทำให้ลูกค้ามีความสุขค่ะ\nพูดอีกอย่างก็คือการทำให้ผู้คนมีความสุขค่ะ"
10114-CVGroup_Relationship_Up_1-1 = "ถ้าฉันทำอาหารได้จริงๆ ละก็\nฉันอยากทำให้คุณครูเป็นคนแรกเลยค่ะ!"
10114-CVGroup_Relationship_Up_2-1 = "ฉันพยายามทำสิ่งที่ทำได้ในตอนนี้ให้ดีที่สุดค่ะ\nถ้าคุณครูคอยอยู่ข้างๆ... ฉันอาจจะทำได้ดีขึ้นอีกก็ได้นะคะ"
10114-CVGroup_Relationship_Up_3-1 = "ดีจังเลยค่ะที่คุณครูอยู่ด้วย\nค่ะ คือว่าฉัน... ฉันชอบที่คุณครูอยู่ด้วยแบบนี้ค่ะ!"
10114-CVGroup_Relationship_Up_4-1 = "ยังมีอาหารชนิดอื่นๆ... เอ่อ... อยู่อีกเยอะแยะเลย...\nแต่ดูเหมือนว่าพาร์เฟต์นี้จะฮิตที่สุดนะคะ!\nหวังว่าคุณครูจะทานให้อร่อยนะคะ!"
10114-CVGroup_Tactic_In_1-1 = "คุณครู คอยดูฉันด้วยนะคะ!"
10114-CVGroup_Tactic_In_2-1 = "วันนี้ฉันเป็นพนักงานเสิร์ฟค่ะ!"
10114-CVGroup_Tactic_Victory_1-1 = "พอใจกับบริการของเรารึเปล่าคะ คุณลูกค้า?"
10114-CVGroup_Tactic_Victory_2-1 = "ขอบคุณที่มาค่ะ คราวหน้าก็แวะมาอีกนะคะ"

[translation]
10109-CVGroup_Battle_Buffed_1-1 = "朝那個方向進行吧？"
10109-CVGroup_Battle_Covered_1-1 = "援護再麻煩了。"
10109-CVGroup_Battle_Defense_1-1 = "沒用的唷～？"
10109-CVGroup_Battle_In_1-1 = "據說睡前的簡單運動，將有助於提升睡眠的品質。"
10109-CVGroup_Battle_In_2-1 = "趕緊搞定之後去睡覺吧。"
10109-CVGroup_Battle_Move_1-1 = "這邊的整理結束了。"
10109-CVGroup_Battle_Move_2-1 = "目標是那邊呢。"
10109-CVGroup_Battle_Recovery_1-1 = "非常感謝。"
10109-CVGroup_Battle_TacticalAction_1-1 = "下一個。"
10109-CVGroup_Battle_Victory_1-1 = "是個不錯的休息。"
10109-CVGroup_Battle_Victory_2-1 = "今天的紀錄到此為止。辛苦了。"
10109-CVGroup_CommonSkill-1 = "鬆鬆軟軟的呢……"
10109-CVGroup_ExSkill_1-1 = "我應該說過，請保持安靜了吧……"
10109-CVGroup_ExSkill_2-1 = "要沉浸在讀後的餘韻……似乎不是個適合的場所呢。"
10109-CVGroup_ExSkill_3-1 = "呵呵，我也會參加的。"
10109-CVGroup_ExSkill_Level_1-1 = "呼，終於安靜下來了。"
10109-CVGroup_ExSkill_Level_2-1 = "那麼，請容我繼續讀書。"
10109-CVGroup_ExSkill_Level_3-1 = "呵呵，舒爽多了。"
10109-CVGroup_Formation_In_1-1 = "哎呀……有急事嗎？"
10109-CVGroup_Formation_In_2-1 = "夜間的散步是嗎？我也一起去。"
10109-CVGroup_Formation_Select-1 = "哎呀……？\n真是大膽呢，呵呵。"
10109-CVGroup_Growup_1-1 = "與未知的相會總是……會為我帶來驚喜與興奮。"
10109-CVGroup_Growup_2-1 = "今後也請多多指教與鞭撻。老師。"
10109-CVGroup_Growup_3-1 = "呵呵，這個也得紀錄下來才行。"
10109-CVGroup_Growup_4-1 = "是，我確實收到了。\n謝謝你。"
10109-CVGroup_Relationship_Up_1-1 = "……現在，只憑紀錄好像已經無法滿足了。"
10109-CVGroup_Relationship_Up_2-1 = "要是這個瞬間，能就這樣停止就好了。就像紀錄一樣。"
10109-CVGroup_Relationship_Up_3-1 = "我希望能將老師的一切……都留在記錄裡。"
10109-CVGroup_Relationship_Up_4-1 = "為了讓我今後也能繼續記錄老師，還請一直待在那裡哦。"
10109-CVGroup_Tactic_In_1-1 = "已確認問題兒童的出現。\n指揮……就麻煩你了。"
10109-CVGroup_Tactic_In_2-1 = "還請慢慢跟上來哦。"
10109-CVGroup_Tactic_Victory_1-1 = "老師總是與紀錄中的模樣保持一致呢。\n呵呵，今天也辛苦了。"
10109-CVGroup_Tactic_Victory_2-1 = "好的，我們回去吧。\n回去之後，我幫你泡杯能睡個好覺的茶。"

[translation]
10109-CVGroup_Battle_Buffed_1-1 = "Do we really intend to use that method?"
10109-CVGroup_Battle_Covered_1-1 = "Please provide cover for a moment."
10109-CVGroup_Battle_Defense_1-1 = "It's no use!"
10109-CVGroup_Battle_In_1-1 = "Light exercise before bedtime promotes good sleep."
10109-CVGroup_Battle_In_2-1 = "Let's wrap things up quickly and go to bed."
10109-CVGroup_Battle_Move_1-1 = "Cleaning is complete."
10109-CVGroup_Battle_Move_2-1 = "Our next objective is that way."
10109-CVGroup_Battle_Recovery_1-1 = "Thank you."
10109-CVGroup_Battle_TacticalAction_1-1 = "To the next point."
10109-CVGroup_Battle_Victory_1-1 = "That was a nice atmosphere change."
10109-CVGroup_Battle_Victory_2-1 = "Today's record ends here. Thank you for your hard work."
10109-CVGroup_CommonSkill-1 = "A soft and fluffy feeling..."
10109-CVGroup_ExSkill_1-1 = "I'm quite sure I asked for silence."
10109-CVGroup_ExSkill_2-1 = "It's difficult to enjoy reflection in this atmosphere."
10109-CVGroup_ExSkill_3-1 = "Fufu. I'll join this time too."
10109-CVGroup_ExSkill_Level_1-1 = "Phew, it's finally quiet."
10109-CVGroup_ExSkill_Level_2-1 = "Then shall we focus on reading again?"
10109-CVGroup_ExSkill_Level_3-1 = "Fufu, I feel refreshed."
10109-CVGroup_Formation_In_1-1 = "The sudden call makes me think this is urgent."
10109-CVGroup_Formation_In_2-1 = "A night stroll? I'm not opposed."
10109-CVGroup_Formation_Select-1 = "Oh my...? Fufu, you're quite bold."
10109-CVGroup_Growup_1-1 = "Exploring the unknown world is always scary, but it's also exciting."
10109-CVGroup_Growup_2-1 = "I look forward to your lessons today as well, Sensei."
10109-CVGroup_Growup_3-1 = "Fufu, I should record this as well."
10109-CVGroup_Growup_4-1 = "I understand clearly."
10109-CVGroup_Relationship_Up_1-1 = "...I don't think I can be satisfied with just records anymore."
10109-CVGroup_Relationship_Up_2-1 = "I wish I could pause this moment, like a record."
10109-CVGroup_Relationship_Up_3-1 = "I want to record everything about you, Sensei."
10109-CVGroup_Relationship_Up_4-1 = "Sensei, please stay right there, so I don't have to pause my records."
10109-CVGroup_Tactic_In_1-1 = "Troublemakers confirmed. I will leave the command to you."
10109-CVGroup_Tactic_In_2-1 = "Then please follow me slowly."
10109-CVGroup_Tactic_Victory_1-1 = "Your appearance always matches your records. Heehee, thank you for all your hard work."
10109-CVGroup_Tactic_Victory_2-1 = "Thank you for your hard work. Once we return, I'll make you a cup of tea to promote good sleep."

[translation]
10109-CVGroup_Battle_Buffed_1-1 = "과연, 이번에는 그 방법으로 갈까요?"
10109-CVGroup_Battle_Covered_1-1 = "잠시 엄호를 부탁드립니다."
10109-CVGroup_Battle_Defense_1-1 = "소용없어요~"
10109-CVGroup_Battle_In_1-1 = "취침 전의 가벼운 운동은 숙면에 도움이 되지요."
10109-CVGroup_Battle_In_2-1 = "그럼 빠르게 정리하고, 자러 갈까요."
10109-CVGroup_Battle_Move_1-1 = "이곳의 정리는 끝났습니다."
10109-CVGroup_Battle_Move_2-1 = "다음 목표는 저쪽입니다."
10109-CVGroup_Battle_Recovery_1-1 = "감사합니다."
10109-CVGroup_Battle_TacticalAction_1-1 = "다음 포인트로."
10109-CVGroup_Battle_Victory_1-1 = "제법 괜찮은 기분 전환이 되었네요."
10109-CVGroup_Battle_Victory_2-1 = "오늘의 기록은 여기까지. 수고 많으셨습니다."
10109-CVGroup_CommonSkill-1 = "푹신푹신한 느낌…"
10109-CVGroup_ExSkill_1-1 = "분명, 정숙을 부탁드렸을 텐데…"
10109-CVGroup_ExSkill_2-1 = "다소… 사색을 즐기기엔 적합하지 않은 분위기네요."
10109-CVGroup_ExSkill_3-1 = "후후. 이번에는 저도 참전해 볼까요."
10109-CVGroup_ExSkill_Level_1-1 = "후, 이제야 조용해졌네요."
10109-CVGroup_ExSkill_Level_2-1 = "그럼, 다시 독서에 집중해 볼까요?"
10109-CVGroup_ExSkill_Level_3-1 = "후후, 개운해졌네요."
10109-CVGroup_Formation_In_1-1 = "갑자기 부르신 걸 보니… 꽤 급한 일인가 보네요."
10109-CVGroup_Formation_In_2-1 = "밤 산책인가요? 나쁘지 않군요."
10109-CVGroup_Formation_Select-1 = "어머나…? 후후, 꽤나 대담하시네요."
10109-CVGroup_Growup_1-1 = "미지의 세계를 알아가는 건 언제나 두렵지만, 또 설레네요."
10109-CVGroup_Growup_2-1 = "오늘도 많은 가르침, 부탁드리겠습니다. 선생님."
10109-CVGroup_Growup_3-1 = "후후, 이것도 기록으로 남겨야겠네요."
10109-CVGroup_Growup_4-1 = "확실하게 이해했습니다."
10109-CVGroup_Relationship_Up_1-1 = "……더 이상은 기록으로 만족할 수 없을 것 같아요."
10109-CVGroup_Relationship_Up_2-1 = "이 순간이, 기록처럼 멈추었으면 좋겠네요."
10109-CVGroup_Relationship_Up_3-1 = "선생님의 모든 것을, 기록하고 싶어요."
10109-CVGroup_Relationship_Up_4-1 = "선생님. 제가 기록을 멈추지 않도록, 계속 그 자리에 머물러 주세요."
10109-CVGroup_Tactic_In_1-1 = "문제아들의 출현을 확인. 지휘는… 맡기겠습니다."
10109-CVGroup_Tactic_In_2-1 = "그럼, 천천히 따라와 주세요."
10109-CVGroup_Tactic_Victory_1-1 = "선생님의 모습은 어느 때나 기록과 다르지 않네요.\n후훗, 수고 많으셨습니다."
10109-CVGroup_Tactic_Victory_2-1 = "수고 많으셨습니다. 돌아가면 숙면에 도움이 되는 차를 한 잔 타드릴게요."

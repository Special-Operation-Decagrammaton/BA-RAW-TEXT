[translation]
20053-CVGroup_CommonSkill-1 = "ข้าน้อยจะสอนเคล็ดลับให้เอง...! "
20053-CVGroup_ExSkill_1-1 = "นี่คือเคล็ดวิชานินจามิจิรุ... ว้ากกกก?! "
20053-CVGroup_ExSkill_2-1 = "ดูสิ! นี่คือสิ่งที่ข้าน้อยเตรียมมา... กล้องถ่ายรูปละ?! "
20053-CVGroup_ExSkill_3-1 = "เคล็ดลับวิถีนินจาสาว มิจิรุจจี้ เริ่มแล้วววว?!"
20053-CVGroup_ExSkill_Level_1-1 = "จับได้แล้ว... ว้ากกก?! "
20053-CVGroup_ExSkill_Level_2-1 = "ฟิ้ว... ตาข้าน้อยยย! "
20053-CVGroup_ExSkill_Level_3-1 = "ฮู่ว... ตะ... ตอนนี้ไม่ได้นะ!"
20053-CVGroup_Formation_In_1-1 = "อ่า... อ่า... นี่คืออันเดอร์คัฟเวอร์ซีโร่วัน...\nพูดแบบนี้รึเปล่านะ?"
20053-CVGroup_Formation_In_2-1 = "ที่นี่เหรอ? พื้นที่ปฏิบัติการของเรา...!"
20053-CVGroup_Formation_Select-1 = "ชุดเดรสชุดนี้มันก็แค่ของสำหรับใช้ทำภารกิจเท่านั้น...!\nว่าแต่ว่าชุดนี้เป็นยังไงบ้างล่ะ ท่านอาจารย์?"
20053-CVGroup_Growup_1-1 = "นี่มัน...! รู้สึกเหมือนได้สวมเสื้อผ้าที่ทำมาให้ข้าน้อยเลย...!"
20053-CVGroup_Growup_2-1 = "ถึงจะแข็งแกร่งขึ้นพร้อมกับชุดใหม่...\nทว่าจิตวิญญาณแห่งนินจาจะไม่มีวันเปลี่ยนแปลง!"
20053-CVGroup_Growup_3-1 = "ของล้ำค่าขนาดนี้...! หรือนี่คือการบอกว่า\nอยากร่วมก้าวเดินไปบนวิถีนินจากับข้าน้อยงั้นเหรอ!"
20053-CVGroup_Growup_4-1 = "ฮุฮุ เป็นยังไงบ้าง ท่านอาจารย์? ข้าน้อยดูน่ารักขึ้น...\nไม่สิ! ดูแข็งแกร่งขึ้นกว่าเดิมแล้วใช่มั้ย? "
20053-CVGroup_Relationship_Up_1-1 = "มะ... มันน่าอายมากเลย ว้ากกก..."
20053-CVGroup_Relationship_Up_2-1 = "เป็นยังไงบ้าง ทรงผมใหม่ของข้าน้อย?\nข้าน้อยจัดทรงอยู่นานเลยนะ... "
20053-CVGroup_Relationship_Up_3-1 = "น่ารักงั้นเหรอ... คุณครูนี่ล่ะก็... ฮิฮิฮิฮี่..."
20053-CVGroup_Relationship_Up_4-1 = "ถ้าใส่ชุดนี้ละก็ ถึงจะคอยตามติดเป็นผู้พิทักษ์อยู่ข้างกายท่านอาจารย์\nกะ... ก็คงดูไม่ขัดตาใช่มั้ย...?"

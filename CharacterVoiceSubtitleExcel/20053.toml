[translation]
20053-CVGroup_CommonSkill-1 = "비법을 전수하도록 하지……!"
20053-CVGroup_ExSkill_1-1 = "이것이, 미치루류…… 우냐아악?!"
20053-CVGroup_ExSkill_2-1 = "보아라, 이것이 새로이 마련한…… 카메라아악?!"
20053-CVGroup_ExSkill_3-1 = "소녀인법첩 미치룻치, 시자아아악?!"
20053-CVGroup_ExSkill_Level_1-1 = "잡았다…… 우냐아악?!"
20053-CVGroup_ExSkill_Level_2-1 = "휘유…… 내 누우우운!"
20053-CVGroup_ExSkill_Level_3-1 = "후아…… 지, 지금은 안 돼!"
20053-CVGroup_Formation_In_1-1 = "아 아, 여긴 언더커버 제로원…… 이거 맞나?"
20053-CVGroup_Formation_In_2-1 = "이곳인가? 우리의 작전 지역이……!"
20053-CVGroup_Formation_Select-1 = "이 드레스는 어디까지나 임무 수행용……! 그래도, 어떤 것 같은가, 선생 공?"
20053-CVGroup_Growup_1-1 = "이것은……! 마치 딱 맞는 옷을 입은 것 같은 기분……!"
20053-CVGroup_Growup_2-1 = "새로운 옷과 함께 더 강해졌지만……! 닌자로서의 마음가짐만큼은, 변치 않는 법!"
20053-CVGroup_Growup_3-1 = "이런 귀한 걸……! 역시 나와 함께 닌자-로드를 걷고 싶다는 것인가!"
20053-CVGroup_Growup_4-1 = "후후, 어떤가 선생 공? 더 귀여워졌…… 아니, 더 강해졌다고?"
20053-CVGroup_Relationship_Up_1-1 = "이, 이거 조금 부끄러운걸, 우냐아아……."
20053-CVGroup_Relationship_Up_2-1 = "어때, 내 새로운 헤어스타일? 꽤 열심히 세팅했는데……."
20053-CVGroup_Relationship_Up_3-1 = "귀엽다, 라……. 후, 후히, 후햐햣……"
20053-CVGroup_Relationship_Up_4-1 = "이런 복장이라면, 선생 공 옆에 경호원으로 붙어 있어도, 어, 어색하지 않겠지……?"

[translation]
23005-CVGroup_CommonSkill-1 = "자아-! 부탁합니다!"
23005-CVGroup_ExSkill_1-1 = "상황은 파악했어요. 갑니다!!"
23005-CVGroup_ExSkill_2-1 = "지원이 필요한 타이밍......! 놓치지 않아요!"
23005-CVGroup_ExSkill_3-1 = "……지금이에요!"
23005-CVGroup_ExSkill_Level_1-1 = "후방 지원, 도착했습니다!"
23005-CVGroup_ExSkill_Level_2-1 = "타이밍이 딱 좋네요…!"
23005-CVGroup_ExSkill_Level_3-1 = "늦지 않았던 거 같네요."
23005-CVGroup_Formation_In_1-1 = "후방 지원은 맡겨주세요."
23005-CVGroup_Formation_In_2-1 = "제가 지원을 담당하겠습니다."
23005-CVGroup_Growup_1-1 = "아하하... 신경써주셔서 감사해요, 선생님."
23005-CVGroup_Growup_2-1 = "이걸로 모두를 좀 더 지원해줄 수 있겠네요."
23005-CVGroup_Growup_3-1 = "그게, 저, 지금보다 더 성장해도 괜찮은 걸까요……."
23005-CVGroup_Growup_4-1 = "네, 선생님의 기대에 부응하겠습니다."
23005-CVGroup_Relationship_Up_1-1 = "으응…… \n선생님이랑 이렇게 친해질 수 있어서 정말 기쁘지만…….\n주, 주변에서 이상하게 생각하면 어쩌죠…?"
23005-CVGroup_Relationship_Up_2-1 = "늘 이렇게 선생님껜 신세만 지는 거 같아서.....\n어떻게 보답해야 할까 고민이에요."
23005-CVGroup_Relationship_Up_3-1 = "아직 선생님한테 배우지 못한 게 많아서.....\n조금 더 같이 있고 싶어요."
23005-CVGroup_Relationship_Up_4-1 = "지금 이렇게 있는 게, 저에겐 과분하다고 느껴질 때가 있어요.\n아하하……. 아뇨, 아무것도 아니에요."

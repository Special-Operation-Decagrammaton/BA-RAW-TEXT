[translation]
23005-CVGroup_CommonSkill-1 = "來吧！拜託了！"
23005-CVGroup_ExSkill_1-1 = "狀況已經掌握了。\n上吧！"
23005-CVGroup_ExSkill_2-1 = "支援的時機……我不會錯過的！"
23005-CVGroup_ExSkill_3-1 = "……就是現在！"
23005-CVGroup_ExSkill_Level_1-1 = "後方支援抵達了！"
23005-CVGroup_ExSkill_Level_2-1 = "時機正好呢……！"
23005-CVGroup_ExSkill_Level_3-1 = "似乎趕上了呢。"
23005-CVGroup_Formation_In_1-1 = "後方支援請交給我。"
23005-CVGroup_Formation_In_2-1 = "我會負責支援。"
23005-CVGroup_Growup_1-1 = "啊哈哈……感謝您的關心，老師。"
23005-CVGroup_Growup_2-1 = "這樣一來就能為大家進行更多支援了呢。"
23005-CVGroup_Growup_3-1 = "那個，我，繼續成長沒關係嗎……"
23005-CVGroup_Growup_4-1 = "是，我一定會回應老師的期待。"
23005-CVGroup_Relationship_Up_1-1 = "那個……雖然我很高興能跟老師變得這麼親近……\n不，不過要是被周圍的大家誤會該怎麼辦呢……？"
23005-CVGroup_Relationship_Up_2-1 = "我總是像這樣，一味受到老師的照顧……\n究竟該如何報恩才好，真讓人傷腦筋。"
23005-CVGroup_Relationship_Up_3-1 = "因為尚未向老師學習的事物還有很多……\n我希望還能多待在一起。"
23005-CVGroup_Relationship_Up_4-1 = "現在的這段時光，對我而言實在太奢侈了……我有時會這麼想。\n啊哈哈……不，什麼都沒有。"

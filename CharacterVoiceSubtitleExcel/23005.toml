[translation]
23005-CVGroup_CommonSkill-1 = "เอาละ! รบกวนด้วยค่ะ!"
23005-CVGroup_ExSkill_1-1 = "ฉันวิเคราะห์สถานการณ์แล้วค่ะ\nไปละนะ!!"
23005-CVGroup_ExSkill_2-1 = "จังหวะที่ต้องการการสนับสนุน...!\nฉันจะไม่พลาดค่ะ!"
23005-CVGroup_ExSkill_3-1 = "ตอนนี้ละค่ะ!"
23005-CVGroup_ExSkill_Level_1-1 = "การสนับสนุนด้านหลังมาถึงแล้วค่ะ!"
23005-CVGroup_ExSkill_Level_2-1 = "ได้จังหวะเหมาะเลยค่ะ...!"
23005-CVGroup_ExSkill_Level_3-1 = "ยังทันนะคะเนี่ย"
23005-CVGroup_Formation_In_1-1 = "การสนับสนุนแนวหลังให้เป็นหน้าที่ฉันเองค่ะ"
23005-CVGroup_Formation_In_2-1 = "ฉันจะดูแลเรื่องการสนับสนุนเองค่ะ"
23005-CVGroup_Growup_1-1 = "อะฮ่าฮ่า..... ขอบคุณที่เอาใจใส่นะคะ คุณครู"
23005-CVGroup_Growup_2-1 = "สิ่งนี้คงสนับสนุนทุกคนได้มากขึ้นนะคะ"
23005-CVGroup_Growup_3-1 = "เอ่อ... ฉันพัฒนามากกว่าตอนนี้อีกหน่อยจะได้มั้ยคะ...?"
23005-CVGroup_Growup_4-1 = "ใช่ ฉันจะทำตามความคาดหวังของคุณครูค่ะ"
23005-CVGroup_Relationship_Up_1-1 = "อืม...\nฉันดีใจจริงๆ ค่ะที่ได้สนิทกับคุณครูแบบนี้...\nตะ... แต่ถ้าคนรอบตัวคิดอะไรแปลกๆ ขึ้นมาล่ะคะ?"
23005-CVGroup_Relationship_Up_2-1 = "เหมือนฉันเป็นหนี้บุญคุณคุณครูอยู่เรื่อยเลย...\nฉันเลยกังวลว่าต้องตอบแทนยังไงดีน่ะค่ะ"
23005-CVGroup_Relationship_Up_3-1 = "ยังมีหลายอย่างที่ฉันยังไม่ได้เรียนรู้จากคุณครู...\nฉันเลยอยากอยู่ด้วยอีกหน่อยค่ะ"
23005-CVGroup_Relationship_Up_4-1 = "การได้อยู่อย่างตอนนี้ บางครั้งฉันก็คิดว่ามากเกินไปสำหรับฉันค่ะ\nแหะๆๆ... ไม่ค่ะ ไม่มีอะไรหรอกค่ะ "

[translation]
10055-CVGroup_Battle_Buffed_1-1 = "之後會報答你的。"
10055-CVGroup_Battle_Covered_1-1 = "這裡，好像不錯。"
10055-CVGroup_Battle_Defense_1-1 = "沒用的唷。"
10055-CVGroup_Battle_In_1-1 = "哎呀，好像已經開始了呢。"
10055-CVGroup_Battle_In_2-1 = "啊，那走吧。"
10055-CVGroup_Battle_Move_1-1 = "繼續走吧。"
10055-CVGroup_Battle_Move_2-1 = "原來還有啊。"
10055-CVGroup_Battle_Recovery_1-1 = "哦，謝謝你。"
10055-CVGroup_Battle_TacticalAction_1-1 = "嘿咻。"
10055-CVGroup_Battle_Victory_1-1 = "為了慶祝來喝一杯……\n知道了，我知道了啦。"
10055-CVGroup_Battle_Victory_2-1 = "都這麼努力了就來一杯……\n……就說是開玩笑的了。"
10055-CVGroup_CommonSkill-1 = "來，能暖和身體哦。"
10055-CVGroup_ExSkill_1-1 = "穿幫了嗎。"
10055-CVGroup_ExSkill_2-1 = "既然穿幫也沒辦法了。"
10055-CVGroup_ExSkill_3-1 = "很在意這個燒瓶嗎？"
10055-CVGroup_ExSkill_Level_1-1 = "雖然還沒發酵，但味道我能保證哦。"
10055-CVGroup_ExSkill_Level_2-1 = "這東西稍微有點辣哦。"
10055-CVGroup_ExSkill_Level_3-1 = "再來一杯，請用！"
10055-CVGroup_Formation_In_1-1 = "嗯？我可以嗎？"
10055-CVGroup_Formation_In_2-1 = "總之會試試看的。"
10055-CVGroup_Formation_Select-1 = "哼～原來你喜歡這種的啊？"
10055-CVGroup_Growup_1-1 = "謝謝你，老師。\n謝禮就送……\n唔嗯，果然還是讓它發酵一下比較好吧。"
10055-CVGroup_Growup_2-1 = "總是一直受你照顧真不好意思。\n我也想做點回報呢。"
10055-CVGroup_Growup_3-1 = "居然這麼……這樣好嗎？\n雖然……我很高興。"
10055-CVGroup_Growup_4-1 = "既然獲得了這麼多，我也會為老師而努力。"
10055-CVGroup_Relationship_Up_1-1 = "雖然沒有討厭的意思……\n但這好像是不太適合我的感情。"
10055-CVGroup_Relationship_Up_2-1 = "願意像這樣接納我的老師，我一直都很感謝唷。"
10055-CVGroup_Relationship_Up_3-1 = "總覺得心情很好。\n要對和香保密唷。"
10055-CVGroup_Relationship_Up_4-1 = "下次要不要邊喝邊聊？\n……喝水也沒關係唷。"
10055-CVGroup_Tactic_In_1-1 = "那麼……打起精神上吧。"
10055-CVGroup_Tactic_In_2-1 = "要做的事堆積如山呢。"
10055-CVGroup_Tactic_Victory_1-1 = "以赤冬的問題兒童來說還挺不錯的吧？"
10055-CVGroup_Tactic_Victory_2-1 = "可以舉杯慶祝勝利嗎？"

[translation]
10055-CVGroup_Battle_Buffed_1-1 = "나중에 보답할게."
10055-CVGroup_Battle_Covered_1-1 = "여기가 좋겠네."
10055-CVGroup_Battle_Defense_1-1 = "안 통한다고."
10055-CVGroup_Battle_In_1-1 = "엇차, 벌써 시작한 모양이네."
10055-CVGroup_Battle_In_2-1 = "앗… 그럼 가 볼까?"
10055-CVGroup_Battle_Move_1-1 = "다음으로 갈까."
10055-CVGroup_Battle_Move_2-1 = "아직도 남았어?"
10055-CVGroup_Battle_Recovery_1-1 = "오, 고마워."
10055-CVGroup_Battle_TacticalAction_1-1 = "영차."
10055-CVGroup_Battle_Victory_1-1 = "축하의 의미로 한 잔…… 알았어, 알았어."
10055-CVGroup_Battle_Victory_2-1 = "고생했으니 시원하게 한 잔……. ……농담이야."
10055-CVGroup_CommonSkill-1 = "자, 몸을 덥혀줄 거야."
10055-CVGroup_ExSkill_1-1 = "들켜버렸나."
10055-CVGroup_ExSkill_2-1 = "들켰다니 어쩔 수 없네."
10055-CVGroup_ExSkill_3-1 = "이 플라스크의 내용물이 궁금해?"
10055-CVGroup_ExSkill_Level_1-1 = "발효는 아직이지만 맛은 보장할 수 있어."
10055-CVGroup_ExSkill_Level_2-1 = "이건 조금 스파이시한 녀석이야."
10055-CVGroup_ExSkill_Level_3-1 = "한 잔 더, 추가로!"
10055-CVGroup_Formation_In_1-1 = "응? 나로 괜찮겠어?"
10055-CVGroup_Formation_In_2-1 = "일단은 열심히 해 볼게."
10055-CVGroup_Formation_Select-1 = "흐응, 이런 게 취향이구나?"
10055-CVGroup_Growup_1-1 = "고마워, 선생님. 답례로 뭔가…… ……음, 역시 발효시키는 편이 좋을까?"
10055-CVGroup_Growup_2-1 = "언제나 받기만 해서 미안하네. 나도 뭔가 보답하고 싶은데."
10055-CVGroup_Growup_3-1 = "이렇게나…… 괜찮아? 기쁘긴……. 하지만."
10055-CVGroup_Growup_4-1 = "이것저것 받은 만큼, 선생님을 위해서 열심히 할게."
10055-CVGroup_Relationship_Up_1-1 = "싫은 건 아니지만……. 나에겐 그다지 어울리지 않는 감정일지도."
10055-CVGroup_Relationship_Up_2-1 = "이런 나를 받아주는 선생님에게는 항상 감사하고 있어."
10055-CVGroup_Relationship_Up_3-1 = "뭔가 살짝 좋은 기분이네. 노도카한테는 비밀이야."
10055-CVGroup_Relationship_Up_4-1 = "다음에 뭐라도 마시면서 이야기나 할래? ……물이라도 상관없어."
10055-CVGroup_Tactic_In_1-1 = "자~ 그럼 힘내볼까?"
10055-CVGroup_Tactic_In_2-1 = "해야 할 일이 잔뜩 있네."
10055-CVGroup_Tactic_Victory_1-1 = "붉은겨울의 문제아 치고는 제법 괜찮은 활약이었지?"
10055-CVGroup_Tactic_Victory_2-1 = "승리의 축배를 들어도 괜찮으려나?"

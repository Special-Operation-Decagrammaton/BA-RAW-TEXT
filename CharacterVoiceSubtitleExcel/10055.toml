[translation]
10055-CVGroup_Battle_Buffed_1-1 = "I'll pay you back for this later."
10055-CVGroup_Battle_Covered_1-1 = "This place looks good."
10055-CVGroup_Battle_Defense_1-1 = "It won't work."
10055-CVGroup_Battle_In_1-1 = "Heave-ho, it looks like it's started already."
10055-CVGroup_Battle_In_2-1 = "Ah... Shall we get going, then?"
10055-CVGroup_Battle_Move_1-1 = "Let's move to the next one."
10055-CVGroup_Battle_Move_2-1 = "There's still more?"
10055-CVGroup_Battle_Recovery_1-1 = "Oh, thank you."
10055-CVGroup_Battle_TacticalAction_1-1 = "Heave-ho."
10055-CVGroup_Battle_Victory_1-1 = "A glass as a celebratory toast... Okay, okay."
10055-CVGroup_Battle_Victory_2-1 = "Since I worked hard, I should crack open a cold... That was just a joke."
10055-CVGroup_CommonSkill-1 = "Now, this will warm you up."
10055-CVGroup_ExSkill_1-1 = "I've been caught."
10055-CVGroup_ExSkill_2-1 = "Can't be helped if I've been caught."
10055-CVGroup_ExSkill_3-1 = "Are you interested in what's in this flask?"
10055-CVGroup_ExSkill_Level_1-1 = "It hasn't fermented yet, but I can guarantee you the taste."
10055-CVGroup_ExSkill_Level_2-1 = "This one's a bit spicy."
10055-CVGroup_ExSkill_Level_3-1 = "Another glass!"
10055-CVGroup_Formation_In_1-1 = "Hm? You sure you're okay with me?"
10055-CVGroup_Formation_In_2-1 = "I'll try my best."
10055-CVGroup_Formation_Select-1 = "Hmm, so you'd like something like this?"
10055-CVGroup_Growup_1-1 = "Thank you, Sensei. In return... Hm, it's probably better that I ferment it, right?"
10055-CVGroup_Growup_2-1 = "I feel sorry for always being on the receiving end. I want to give something in return too."
10055-CVGroup_Growup_3-1 = "All this... Are you sure? Although...it does make me happy."
10055-CVGroup_Growup_4-1 = "With everything I've received, I'll work hard for Sensei."
10055-CVGroup_Relationship_Up_1-1 = "I don't hate it, but...this feeling doesn't quite sit well with me."
10055-CVGroup_Relationship_Up_2-1 = "I'm always thankful to Sensei for playing along with someone like me."
10055-CVGroup_Relationship_Up_3-1 = "This feels kind of nice. Don't tell Nodoka."
10055-CVGroup_Relationship_Up_4-1 = "Would you like to get a drink and have a chat next time? ...I'm fine even if it's just water."
10055-CVGroup_Tactic_In_1-1 = "Now then, shall we do this?"
10055-CVGroup_Tactic_In_2-1 = "There's lots of things to do."
10055-CVGroup_Tactic_Victory_1-1 = "Not too bad for a troublemaker of Red Winter, right?"
10055-CVGroup_Tactic_Victory_2-1 = "Would it be fine to raise a toast to victory?"

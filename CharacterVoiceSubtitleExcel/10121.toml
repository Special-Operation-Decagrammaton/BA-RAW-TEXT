[translation]
10121-CVGroup_Battle_Buffed_1-1 = "必將回應您的期待！"
10121-CVGroup_Battle_Covered_1-1 = "來來！我藏好了！"
10121-CVGroup_Battle_Defense_1-1 = "哼哼！太天真了！"
10121-CVGroup_Battle_In_1-1 = "請跟在小女子身後吧！要出發囉！"
10121-CVGroup_Battle_In_2-1 = "菁英的實力，就讓您見識見識吧！"
10121-CVGroup_Battle_Move_1-1 = "乘著這股氣勢出發吧！"
10121-CVGroup_Battle_Move_2-1 = "順勢而上～！"
10121-CVGroup_Battle_Recovery_1-1 = "Thank you very much，的說！"
10121-CVGroup_Battle_TacticalAction_1-1 = "請不要丟下小女子！"
10121-CVGroup_Battle_Victory_1-1 = "小女子華麗的快進擊，您看見了嗎？"
10121-CVGroup_Battle_Victory_2-1 = "呵呵！這不過是紫傳說的開端而已！"
10121-CVGroup_CommonSkill-1 = "是股獨～特的味道呢！"
10121-CVGroup_ExSkill_1-1 = "每一樣都棒得令人眼花……繚亂！？"
10121-CVGroup_ExSkill_2-1 = "Festival～的說！\n咦……？呀啊！？"
10121-CVGroup_ExSkill_3-1 = "這就是夏日祭典啊……！\n……稍，稍微有點太刺激了！？"
10121-CVGroup_ExSkill_Level_1-1 = "危，危險啊～！！"
10121-CVGroup_ExSkill_Level_2-1 = "呀啊啊啊啊！"
10121-CVGroup_ExSkill_Level_3-1 = "小女子，陷入危機了！"
10121-CVGroup_Formation_In_1-1 = "是！請交給小女子吧！\n需要為您做什麼呢？"
10121-CVGroup_Formation_In_2-1 = "身體好輕盈……\n這套裝束，真的很方便活動呢！"
10121-CVGroup_Formation_Select-1 = "要去哪裡都請儘管吩咐！\n我會隨侍在側！"
10121-CVGroup_Growup_1-1 = "老師對小女子的期待……我絕不會辜負！"
10121-CVGroup_Growup_2-1 = "小女子雖然還很不成熟……\n為了不辜負老師的期待，今後也會繼續努力！"
10121-CVGroup_Growup_3-1 = "學無止境……人生的一切皆是學習。\n老師您，總是能讓小女子看見未知的世界……\n真的非常感謝。"
10121-CVGroup_Growup_4-1 = "小女子，希望能變得更強……成為老師的助力。\n要比以往……更強！"
10121-CVGroup_Relationship_Up_1-1 = "這每個瞬間，對小女子來說都像是禮物一樣。\n然而……老師依然像這樣賜予了我呢。"
10121-CVGroup_Relationship_Up_2-1 = "從心底湧現出了非常溫暖的情感。\n這種心情，小女子不是很明白……老師您知道嗎？"
10121-CVGroup_Relationship_Up_3-1 = "花終有一日會枯萎，但想必不會對曾經綻放一事感到後悔吧。\n沒錯……只要老師希望，小女子就會盡情綻放。還請您在一旁見證哦。"
10121-CVGroup_Relationship_Up_4-1 = "真的，打從心底感謝您。\n小女子絕不會忘記這一刻的。"
10121-CVGroup_Tactic_In_1-1 = "百花繚亂有小女子在！\n我會讓整個奇普托斯都知道的！"
10121-CVGroup_Tactic_In_2-1 = "小女子，勘解由小路紫的無敵傳說要開始了！"
10121-CVGroup_Tactic_Victory_1-1 = "呵呵！這就是百花繚亂的力量！"
10121-CVGroup_Tactic_Victory_2-1 = "是個完～美的勝利！\n辛苦了，各位！"

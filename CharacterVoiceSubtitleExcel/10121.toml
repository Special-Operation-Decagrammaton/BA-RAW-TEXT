[translation]
10121-CVGroup_Battle_Buffed_1-1 = "ข้าจะตอบแทนให้สมกับที่คาดหวังเจ้าค่ะ!"
10121-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวเรียบร้อยแล้วเจ้าค่ะ!"
10121-CVGroup_Battle_Defense_1-1 = "ฮึ! เหยาะแหยะจริงๆ!"
10121-CVGroup_Battle_In_1-1 = "ข้าจะนำเองเจ้าค่ะ!"
10121-CVGroup_Battle_In_2-1 = "ข้าจะแสดงฝีมือของอิล~ลีทให้ดูเองเจ้าค่ะ!"
10121-CVGroup_Battle_Move_1-1 = "มุ่งไปกันต่อเลยเจ้าค่ะ!"
10121-CVGroup_Battle_Move_2-1 = "ไปตามกระแสนี้เลยเจ้าค่ะ!"
10121-CVGroup_Battle_Recovery_1-1 = "แต๊งกิ้ว เบรีมัชชุเจ้าค่ะ!"
10121-CVGroup_Battle_TacticalAction_1-1 = "อย่าปล่อยข้าไว้อย่างนี้สิเจ้าคะ!"
10121-CVGroup_Battle_Victory_1-1 = "เห็นพลังของข้าหรือยังเจ้าคะ!"
10121-CVGroup_Battle_Victory_2-1 = "ฮุฮุ! ตำนานบทใหม่ของยูคาริผู้ไร่พ่ายถือกำเนิดขึ้นแล้วเจ้าค่ะ~!"
10121-CVGroup_CommonSkill-1 = "เป็นรสชาติที่ยูนีคคุ~มากเจ้าค่ะ!"
10121-CVGroup_ExSkill_1-1 = "ตาหมุนติ้วๆ... ไปแล้วเหรอเจ้าคะ...?!"
10121-CVGroup_ExSkill_2-1 = "เพสสึทิ~บารุเจ้าค่ะ! เอ๋? อั๊ง?!"
10121-CVGroup_ExSkill_3-1 = "นี่คือเทศกาลฤดูร้อน...! มะ... มันสุดๆ เลยเจ้าค่ะ!"
10121-CVGroup_ExSkill_Level_1-1 = "เดนจาราสึ~! สุดๆ เจ้าค่ะ!"
10121-CVGroup_ExSkill_Level_2-1 = "อ๊าย!"
10121-CVGroup_ExSkill_Level_3-1 = "เดี๋ยวข้าหยิกให้เลยเจ้าค่ะ!"
10121-CVGroup_Formation_In_1-1 = "ค่ะ! ข้าต้องทำอะไรหรือเจ้าคะ!"
10121-CVGroup_Formation_In_2-1 = "ชุดนี้เคลื่อนไหวสะดวกมากเลยเจ้าค่ะ!"
10121-CVGroup_Formation_Select-1 = "ไม่ว่าที่ไหน เราก็จะมุ่งไปข้างหน้าเจ้าค่ะ!"
10121-CVGroup_Growup_1-1 = "ความคาดหวังที่มีต่อข้า... ข้าจะไม่ทำให้ผิดหวังเลยเจ้าค่ะ!"
10121-CVGroup_Growup_2-1 = "ถึงข้าจะยังบกพร่องอยู่มาก แต่ยูคาริผู้นี้จะทำสุดความสามารถ\nเพื่อตอบแทนความไว้วางใจของท่านอาจารย์เจ้าค่ะ!"
10121-CVGroup_Growup_3-1 = "การเรียนรู้ไม่มีที่สิ้นสุดจริงๆ เลยนะเจ้าคะ\nทุกสิ่งทุกอย่างในชีวิตคือการเรียนรู้ทั้งสิ้น\nท่านอาจารย์มักแสดงให้ข้าได้เห็นโลกที่ไม่รู้จักอยู่เสมอ ขอบคุณจริงๆ ค่ะ"
10121-CVGroup_Growup_4-1 = "ข้าอยากแข็งแกร่งขึ้น... เพื่อเป็นกำลังให้ท่านอาจารย์เจ้าค่ะ\nอยากแข็งแกร่งขึ้น... ยิ่งกว่านี้อีก!"
10121-CVGroup_Relationship_Up_1-1 = "ทุกช่วงเวลาที่เราได้อยู่ร่วมกันถือเป็นของขวัญยิ่งใหญ่สำหรับข้า\nท่านอาจารย์มักจะพยายามให้สิ่งต่างๆ กับข้าอยู่เสมอเลยนะเจ้าคะ"
10121-CVGroup_Relationship_Up_2-1 = "ข้ารู้สึกได้ถึงความอบอุ่นที่เกิดขึ้นในใจเลยเจ้าค่ะ\nข้าควรทำอย่างไรกับความรู้สึกที่ควบคุมไม่ได้นี้ดีเจ้าคะ?"
10121-CVGroup_Relationship_Up_3-1 = "ดอกไม้จะผลิบาน และจะไม่มีวันเสียใจที่ได้ผลิบานเจ้าค่ะ\nหากท่านอาจารย์ปรารถนาเช่นนั้น ข้าก็ยินดีเจ้าค่ะ\nได้โปรดคอยเฝ้าดูข้าด้วยนะเจ้าคะ"
10121-CVGroup_Relationship_Up_4-1 = "ขอบคุณมากๆ เลยเจ้าค่ะ\nข้าจะไม่มีวันลืมช่วงเวลานี้เลย"
10121-CVGroup_Tactic_In_1-1 = "ข้าจะประกาศให้โลกรู้ว่าเฮียกกะเรียวรันมียูคาริผู้นี้อยู่เจ้าค่ะ!"
10121-CVGroup_Tactic_In_2-1 = "ตำนานสาวน้อยไร้เทียมทานยังคงดำเนินต่อไปเจ้าค่ะ!"
10121-CVGroup_Tactic_Victory_1-1 = "ฮุฮุ เฮียกกะเรียวรันออกโรงทั้งที ผลมันก็ต้องแน่นอนอยู่แล้วสิเจ้าคะ!"
10121-CVGroup_Tactic_Victory_2-1 = "เป็นชัยชนะที่เพอร์เฟกต์โตะ~ ทุกคนเก่งมากเจ้าค่ะ!"

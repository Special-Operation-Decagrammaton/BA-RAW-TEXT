[translation]
10121-CVGroup_Battle_Buffed_1-1 = "반드시 부응해 보이겠사와요!"
10121-CVGroup_Battle_Covered_1-1 = "숨었사와요!"
10121-CVGroup_Battle_Defense_1-1 = "흐흥! 무릅니다!"
10121-CVGroup_Battle_In_1-1 = "소녀가 앞장서겠사와요!"
10121-CVGroup_Battle_In_2-1 = "엘리~트의 실력을 보여 드리겠사와요!"
10121-CVGroup_Battle_Move_1-1 = "이대로 쭉쭉 가겠사와요!"
10121-CVGroup_Battle_Move_2-1 = "이 흐름을 타고 가는 것이어요!"
10121-CVGroup_Battle_Recovery_1-1 = "땡큐 베리 머치와요!"
10121-CVGroup_Battle_TacticalAction_1-1 = "두고 가지 마시어요!"
10121-CVGroup_Battle_Victory_1-1 = "소녀의 멋진 활약, 보셨을까요!"
10121-CVGroup_Battle_Victory_2-1 = "후후! 유카리 불패 전설의 새로운 페이~지여요!"
10121-CVGroup_CommonSkill-1 = "유니쿠~한 맛이어요!"
10121-CVGroup_ExSkill_1-1 = "눈이 빙글빙글 돌아…… ……가네요?!"
10121-CVGroup_ExSkill_2-1 = "페스티~발이어요! ……어라라? 꺄앙?!"
10121-CVGroup_ExSkill_3-1 = "이것이 여름 축제……! ……조, 조금 과격하네요!"
10121-CVGroup_ExSkill_Level_1-1 = "데인저러수~! 이와요!"
10121-CVGroup_ExSkill_Level_2-1 = "꺄아앙!"
10121-CVGroup_ExSkill_Level_3-1 = "소녀, 핀~치여요!"
10121-CVGroup_Formation_In_1-1 = "네! 소녀가 무엇을 하면 될까요!"
10121-CVGroup_Formation_In_2-1 = "움직이기 편한 복장이네요!"
10121-CVGroup_Formation_Select-1 = "어디든, 진격이어요!"
10121-CVGroup_Growup_1-1 = "소녀에게 걸어주신 기대…… 결코 그르치지 않겠사와요!"
10121-CVGroup_Growup_2-1 = "아직 한참 미숙한 몸입니다만, 저 유카리, 선생님의 신뢰에 부응하도록 정진하겠사와요!"
10121-CVGroup_Growup_3-1 = "정말, 배움에는 끝이 없네요. 인생만사가 배움이라, 하듯이.\n선생님께서는 항상 모르는 세상을 보여주십니다.\n정말로, 감사드립니다."
10121-CVGroup_Growup_4-1 = "소녀, 더욱 강해져서…… 선생님께 힘이 되고 싶습니다.\n지금보다…… 더욱더!"
10121-CVGroup_Relationship_Up_1-1 = "함께하는 매 순간이 저에게는 크나큰 선물과 같은데.\n선생님께서는 자꾸만 더 주시려 하네요."
10121-CVGroup_Relationship_Up_2-1 = "소녀의 내면에서, 따뜻한 감정이 벅차오릅니다.\n이 주체할 수 없는 마음을 소녀는 어떻게 해야 할까요?"
10121-CVGroup_Relationship_Up_3-1 = "꽃은 반드시 지나, 피어남을 후회하지 않을 겁니다.\n선생님께서 바라시니, 저 역시 기꺼이 만개하겠사와요.\n부디 곁에서 지켜봐 주시길."
10121-CVGroup_Relationship_Up_4-1 = "정말, 감사합니다. 소녀는 이 순간을 결코 잊지 못할 겁니다."
10121-CVGroup_Tactic_In_1-1 = "백화요란에는 유카리가 있다는걸, 온 세상에 알려주겠사와요!"
10121-CVGroup_Tactic_In_2-1 = "소녀의 무적 전설, 쭉쭉 이어 나가는 것이어요!"
10121-CVGroup_Tactic_Victory_1-1 = "후후! 백화요란이 나선 이상, 당연한 결과입니다!"
10121-CVGroup_Tactic_Victory_2-1 = "퍼어~펙투한 승리였사와요! 다들 수고하셨사와요!"

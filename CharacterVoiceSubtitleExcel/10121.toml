[translation]
10121-CVGroup_Battle_Buffed_1-1 = "I'll live up to everyone's expectations!"
10121-CVGroup_Battle_Covered_1-1 = "I'm hiding!"
10121-CVGroup_Battle_Defense_1-1 = "Hmm! Too slow!"
10121-CVGroup_Battle_In_1-1 = "I shall take the lead!"
10121-CVGroup_Battle_In_2-1 = "Allow me to show you what an elite is made of!"
10121-CVGroup_Battle_Move_1-1 = "Let us go forth!"
10121-CVGroup_Battle_Move_2-1 = "We will maintain the pace!"
10121-CVGroup_Battle_Recovery_1-1 = "Thank you very much!"
10121-CVGroup_Battle_TacticalAction_1-1 = "Don't leave me here!"
10121-CVGroup_Battle_Victory_1-1 = "Did you see my incredible performance?!"
10121-CVGroup_Battle_Victory_2-1 = "Fufu! It's a new page in the legend of the undefeated Yukari!"
10121-CVGroup_CommonSkill-1 = "What unique taste!"
10121-CVGroup_ExSkill_1-1 = "My eyes are...spinning?!"
10121-CVGroup_ExSkill_2-1 = "It's a festival!...Huh? Kyaaah?!"
10121-CVGroup_ExSkill_3-1 = "So this is a summer festival...! 'T-Tis a bit intense!"
10121-CVGroup_ExSkill_Level_1-1 = "It's dangerous!"
10121-CVGroup_ExSkill_Level_2-1 = "Kyaaah!"
10121-CVGroup_ExSkill_Level_3-1 = "I'm in a pinch!"
10121-CVGroup_Formation_In_1-1 = "Yes! What should I do?"
10121-CVGroup_Formation_In_2-1 = "This outfit allows for easy movement!"
10121-CVGroup_Formation_Select-1 = "Wherever it be, charge!"
10121-CVGroup_Growup_1-1 = "I'll meet all your expectations! No matter what!"
10121-CVGroup_Growup_2-1 = "I still have much to learn, but I, Yukari, shall see to it that your trust is rewarded!"
10121-CVGroup_Growup_3-1 = "There truly is no end to the journey of knowledge. Life is but an adventure to learn more and more. And you always introduce me to new worlds I did not know existed, Sensei. Thank you, from the bottom of my heart."
10121-CVGroup_Growup_4-1 = "I wish to grow stronger...and be of help to you, Sensei! More and more!"
10121-CVGroup_Relationship_Up_1-1 = "Every moment we are together is a gift in and of itself. And yet, you continue to give me more, Sensei."
10121-CVGroup_Relationship_Up_2-1 = "My heart is filled to the brim with warmth. What do I do with this overwhelming feeling?"
10121-CVGroup_Relationship_Up_3-1 = "Flowers will inevitably wither, yet they never regret blooming. Since you wish it, I, too, will bloom splendidly, Sensei. Please watch by my side."
10121-CVGroup_Relationship_Up_4-1 = "You have my deepest gratitude. I will never forget this moment."
10121-CVGroup_Tactic_In_1-1 = "I'll make the name \"Yukari of the Hyakkaryouran\" known to the whole world!"
10121-CVGroup_Tactic_In_2-1 = "Let us continue the legend of the undefeated Yukari!"
10121-CVGroup_Tactic_Victory_1-1 = "Fufu! Since the Hyakkaryouran is here, it's a given!"
10121-CVGroup_Tactic_Victory_2-1 = "A perfect victory! Good work, everyone!"

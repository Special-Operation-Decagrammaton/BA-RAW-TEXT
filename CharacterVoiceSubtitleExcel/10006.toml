10006-CVGroup_Battle_Recovery_1-1 = "謝謝，感激不盡。"
10006-CVGroup_Battle_TacticalAction_1-1 = "進行移動！"
10006-CVGroup_Battle_Victory_1-1 = "這就是格黑娜風紀委員會的力量。"
10006-CVGroup_Battle_Victory_2-1 = "就算只有我一個人也很夠了。"
10006-CVGroup_CommonSkill-1 = "看招。"
10006-CVGroup_ExSkill_1-1 = "重新裝填完畢，覺悟吧。"
10006-CVGroup_ExSkill_2-1 = "已進入射程距離，要上囉。"
10006-CVGroup_ExSkill_3-1 = "格黑娜風紀委員會的狙擊槍，可別小看啊！"
10006-CVGroup_ExSkill_Level_1-1 = "逃也沒用的！"
10006-CVGroup_ExSkill_Level_2-1 = "這樣就搞定了！"
10006-CVGroup_ExSkill_Level_3-1 = "覺悟吧！\n可惡的違規者！"
10006-CVGroup_Formation_In_1-1 = "交給我吧。"
10006-CVGroup_Formation_In_2-1 = "如果那是命令的話。"
10006-CVGroup_Formation_Select-1 = "這個嘛，姑且還是會服從的……\n麻煩你囉，老師。"
10006-CVGroup_Growup_1-1 = "嘿～確實……有變強的感覺。"
10006-CVGroup_Growup_2-1 = "今後遇到困難的任務也交給我吧。"
10006-CVGroup_Growup_3-1 = "盡己所能，獲得成果。\n雖然很理所當然……不過能達成真的很開心。"

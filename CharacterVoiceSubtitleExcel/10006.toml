10006-CVGroup_Battle_Defense_1-1 = "呼。"
10006-CVGroup_Battle_In_1-1 = "來，要上囉！"
10006-CVGroup_Battle_In_2-1 = "服從指示，前進！"
10006-CVGroup_Battle_Move_1-1 = "那麼，趕緊清理一下吧。"

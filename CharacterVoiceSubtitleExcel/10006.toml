10006-CVGroup_Relationship_Up_2-1 = "以前我腦袋裡只想著風紀委員會的事，不過最近稍微……對其他事情有點著迷。\n我，我說的不是老師，是夏萊！"
10006-CVGroup_Relationship_Up_3-1 = "新任務來了。\n一起處理完之後……那個……回來的路上稍微去玩樂一下怎麼樣？"
10006-CVGroup_Relationship_Up_4-1 = "不，不要突然靠近我！\n要，要問為什麼的話就是……因為需要心理準備！"
10006-CVGroup_Tactic_In_1-1 = "沒有異議。出發吧。"
10006-CVGroup_Tactic_In_2-1 = "就由我來殲滅你們。"
10006-CVGroup_Tactic_Victory_1-1 = "我不會大意。"
10006-CVGroup_Tactic_Victory_2-1 = "這是理所當然的結果。"

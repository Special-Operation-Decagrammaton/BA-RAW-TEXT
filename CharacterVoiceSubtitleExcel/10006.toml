10006-CVGroup_Formation_Select-1 = "뭐, 일단은 따르겠지만…. 제대로 해줘. 선생님."
10006-CVGroup_Growup_1-1 = "헤에. 확실히…… 강해진 느낌이야."
10006-CVGroup_Growup_2-1 = "앞으로도, 힘든 임무라면 내게 맡겨."
10006-CVGroup_Growup_3-1 = "최선을 다하고, 성과를 얻는다.\n당연한 일 같지만… 이루어지면 정말 기쁜 일이지."
10006-CVGroup_Growup_4-1 = "고마워. 선생님. 앞으로도 잘 부탁해."
10006-CVGroup_Relationship_Up_1-1 = "이제는 좀, 믿음직한 선생님이 되었네."
10006-CVGroup_Relationship_Up_2-1 = "계속 선도부 일만으로 머릿속에 가득 차 있었지만\n최근에는 좀… 다른 것에 열중하고 있어.\n서, 선생님이 아니라 샬레를 말하는 거야!"
10006-CVGroup_Relationship_Up_3-1 = "새로운 임무가 들어왔어.\n같이 수행하고… 그… 오는 길에 잠깐 놀다 오는 건 어때?"
10006-CVGroup_Relationship_Up_4-1 = "가, 갑자기 다가오지 마!\n왜, 왜냐니, 그게… 마음의 준비가 필요하다고!"
10006-CVGroup_Tactic_In_1-1 = "이의 없어. 출발한다."

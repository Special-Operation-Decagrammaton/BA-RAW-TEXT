[translation]
10090-CVGroup_Battle_Buffed_1-1 = "一直都很感謝您！"
10090-CVGroup_Battle_Covered_1-1 = "會，會躲起來的！"
10090-CVGroup_Battle_Defense_1-1 = "呀啊！？嚇我一跳……"
10090-CVGroup_Battle_In_1-1 = "來吧，大家！要準備的東西有很多哦！"
10090-CVGroup_Battle_In_2-1 = "一步一步，按部就班。\n冷靜地完成吧！"
10090-CVGroup_Battle_Move_1-1 = "下一個地方是……？"
10090-CVGroup_Battle_Move_2-1 = "慶典還會繼續唷！"
10090-CVGroup_Battle_Recovery_1-1 = "謝，謝謝！"
10090-CVGroup_Battle_TacticalAction_1-1 = "那裡似乎不錯！"
10090-CVGroup_Battle_Victory_1-1 = "神轎、遊行、食物、煙火……\n慶典總是棒極了呢！"
10090-CVGroup_Battle_Victory_2-1 = "這次的慶典也非常棒！\n老師覺得如何呢？"
10090-CVGroup_CommonSkill-1 = "那麼……就是現在吧！"
10090-CVGroup_ExSkill_1-1 = "檢查，檢查……真有趣呢！"
10090-CVGroup_ExSkill_2-1 = "唔嗯，我看看……真不錯呢！"
10090-CVGroup_ExSkill_3-1 = "我看看……怎麼樣呢？"
10090-CVGroup_ExSkill_Level_1-1 = "來，就是這裡！"
10090-CVGroup_ExSkill_Level_2-1 = "在這邊施放煙火……！"
10090-CVGroup_ExSkill_Level_3-1 = "這裡似乎不錯呢！"
10090-CVGroup_Formation_In_1-1 = "難道有地方要舉辦慶典嗎！？"
10090-CVGroup_Formation_In_2-1 = "我會籌備最棒的慶典！"
10090-CVGroup_Formation_Select-1 = "哇啊！？\n真是的，老師。害我嚇了一跳。"
10090-CVGroup_Growup_1-1 = "耶嘿嘿，謝謝您，老師。\n我所獲得的成長……能讓我籌備出更加精彩的慶典對吧？"
10090-CVGroup_Growup_2-1 = "我應該還能成長才對！\n為了慶典……也為了老師！"
10090-CVGroup_Growup_3-1 = "似乎有股前進了一步的感覺！\n這種事……也不錯呢。"
10090-CVGroup_Growup_4-1 = "怎麼樣呀，老師？我……有成長嗎？\n如果有的話，我很開心……"
10090-CVGroup_Relationship_Up_1-1 = "您知道與慶典前日的悸動有關的事嗎……？\n我現在就是那樣的心情。耶嘿嘿。"
10090-CVGroup_Relationship_Up_2-1 = "那個，老師？\n只要有老師在的話……那個……就是……\n要，要我準備什麼樣的慶典好像都沒問題！\n唉……本來明明不是打算說這個的……"
10090-CVGroup_Relationship_Up_3-1 = "我偶爾會這麼想……\n只要跟老師在一起，每天是不是都能像慶典一樣……"
10090-CVGroup_Relationship_Up_4-1 = "那個，老師？\n雖然有很多話想跟您說……\n但最重要的是……那個，非常謝謝您。這是我的真心話。"
10090-CVGroup_Tactic_In_1-1 = "我最期待慶典開始的瞬間了！"
10090-CVGroup_Tactic_In_2-1 = "大家樂在其中的樣子，真是太棒了！"
10090-CVGroup_Tactic_Victory_1-1 = "是場非常厲害的慶典！\n您不這麼覺得嗎？"
10090-CVGroup_Tactic_Victory_2-1 = "結束雖然有些令人寂寞……\n不過還會有下一場慶典的！"

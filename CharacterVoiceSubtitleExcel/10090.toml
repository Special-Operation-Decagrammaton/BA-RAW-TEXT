[translation]
10090-CVGroup_Battle_Buffed_1-1 = "언제나 감사드려요!"
10090-CVGroup_Battle_Covered_1-1 = "수, 숨을 거니까요!"
10090-CVGroup_Battle_Defense_1-1 = "꺄아?! 놀랐어요……"
10090-CVGroup_Battle_In_1-1 = "자, 여러분! 준비할 게 아주 많아요!"
10090-CVGroup_Battle_In_2-1 = "하나씩, 하나씩. 차분하게 해 나가는 거예요!"
10090-CVGroup_Battle_Move_1-1 = "다음 장소는……?"
10090-CVGroup_Battle_Move_2-1 = "축제는 계속됩니다!"
10090-CVGroup_Battle_Recovery_1-1 = "아, 감사합니다!"
10090-CVGroup_Battle_TacticalAction_1-1 = "저기가 좋겠네요!"
10090-CVGroup_Battle_Victory_1-1 = "가마, 퍼레이드, 음식, 불꽃놀이…… 축제는 항상 최고네요!"
10090-CVGroup_Battle_Victory_2-1 = "이번 축제도 엄청났어요! 선생님은 어떠셨나요?"
10090-CVGroup_CommonSkill-1 = "그러면…… 지금이겠네요!"
10090-CVGroup_ExSkill_1-1 = "점검, 점검…… 즐겁네요!"
10090-CVGroup_ExSkill_2-1 = "흠. 으흠…… 좋아요!"
10090-CVGroup_ExSkill_3-1 = "어디, 어디…… 어때요?"
10090-CVGroup_ExSkill_Level_1-1 = "자, 여기랍니다!"
10090-CVGroup_ExSkill_Level_2-1 = "이쯤에서 불꽃을……!"
10090-CVGroup_ExSkill_Level_3-1 = "여기가 좋겠네요!"
10090-CVGroup_Formation_In_1-1 = "혹시 어딘가에서 축제가 개최되는 걸까요!?"
10090-CVGroup_Formation_In_2-1 = "최고의 축제를 준비해 드릴게요!"
10090-CVGroup_Formation_Select-1 = "와아?! 정말, 선생님. 놀랐잖아요."
10090-CVGroup_Growup_1-1 = "에헤헤. 감사합니다. 선생님.\n성장한 만큼…… 더욱 멋진 축제를 \n준비할 수 있겠죠?"
10090-CVGroup_Growup_2-1 = "저는 더 성장할 수 있을 거예요!\n축제를 위해서… 그리고 선생님을 위해서!"
10090-CVGroup_Growup_3-1 = "뭔가 한 발짝 나아간 느낌이에요! 이런 것도…… 좋네요."
10090-CVGroup_Growup_4-1 = "어때요, 선생님? 저... 성장했나요? 그렇다면, 기쁠 거 같아요…"
10090-CVGroup_Relationship_Up_1-1 = "축제 전날의 두근거림에 대해 알고 계세요……?\n지금 꼭 그런 기분이네요. 에헤헤."
10090-CVGroup_Relationship_Up_2-1 = "있잖아요, 선생님?\n저는 선생님만 계시면…… 저기…… 그……\n어, 어떤 축제라도 준비할 수 있을 것 같아요!\n하아…… 이런 말이 아니었는데……"
10090-CVGroup_Relationship_Up_3-1 = "가끔, 그런 생각을 해 보는데요.\n선생님과 함께라면, \n매일매일이 축제 같지 않을까, 하고요……"
10090-CVGroup_Relationship_Up_4-1 = "저, 선생님? \n여러 가지 드리고 싶은 말이 많지만……\n무엇보다, 감사드려요. 진심이에요."
10090-CVGroup_Tactic_In_1-1 = "저는 축제가 시작될 때 가장 기대돼요!"
10090-CVGroup_Tactic_In_2-1 = "모두가 노력하고 즐기는 모습은, 정말로 멋지네요!"
10090-CVGroup_Tactic_Victory_1-1 = "대단한 축제였어요! 그렇게 생각하지 않으세요?"
10090-CVGroup_Tactic_Victory_2-1 = "끝은 어딘가 아쉽기도 하지만…… 또 다른 축제가 있으니까요!"

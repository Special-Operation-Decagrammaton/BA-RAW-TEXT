[translation]
10090-CVGroup_Battle_Buffed_1-1 = "ขอบคุณเสมอๆ เลยนะคะ!"
10090-CVGroup_Battle_Covered_1-1 = "ฉะ... ฉันซ่อนตัวแล้วนี่คะ!"
10090-CVGroup_Battle_Defense_1-1 = "อ๊ะ?! ตกใจหมดเลยค่ะ..."
10090-CVGroup_Battle_In_1-1 = "เอาละค่ะทุกคน! มีของต้องเตรียมเยอะเลยนะคะ!"
10090-CVGroup_Battle_In_2-1 = "ทีละคน ทีละอย่าง มาค่อยๆ ทำไปอย่างใจเย็นเถอะค่ะ!"
10090-CVGroup_Battle_Move_1-1 = "สถานที่ต่อไป...?"
10090-CVGroup_Battle_Move_2-1 = "งานเทศกาลจะดำเนินต่อไปค่ะ!"
10090-CVGroup_Battle_Recovery_1-1 = "อ๊ะ ขอบคุณค่ะ!"
10090-CVGroup_Battle_TacticalAction_1-1 = "ตรงนั้นก็น่าจะเหมาะนะคะ!"
10090-CVGroup_Battle_Victory_1-1 = "เกี้ยว ขบวนพาเหรด อาหาร ดอกไม้ไฟ...\nงานเทศกาลนี่ดีที่สุดเลยค่ะ!"
10090-CVGroup_Battle_Victory_2-1 = "งานเทศกาลครั้งนี้ก็สุดยอดมากเลยค่ะ!\nคุณครูคิดยังไงบ้างคะ?"
10090-CVGroup_CommonSkill-1 = "ถ้างั้น... คงเป็นตอนนี้สินะคะ!"
10090-CVGroup_ExSkill_1-1 = "เช็ก เช็ก... สนุกจังเลยค่ะ!"
10090-CVGroup_ExSkill_2-1 = "ฮึ่ม ฮืม... ดีมากเลยค่ะ!"
10090-CVGroup_ExSkill_3-1 = "อยู่ไหน อยู่ไหนนะ... เป็นยังไงบ้างคะ?"
10090-CVGroup_ExSkill_Level_1-1 = "เอาละ ตรงนี้สินะคะ!"
10090-CVGroup_ExSkill_Level_2-1 = "ในเวลานี้ก็ต้องมีดอกไม้ไฟ...!"
10090-CVGroup_ExSkill_Level_3-1 = "ตรงนี้ดีจังเลยค่ะ!"
10090-CVGroup_Formation_In_1-1 = "มีงานเทศกาลจัดขึ้นที่ไหนรึเปล่าคะ!?"
10090-CVGroup_Formation_In_2-1 = "ฉันจะเตรียมสุดยอดงานเทศกาลให้เองค่ะ!"
10090-CVGroup_Formation_Select-1 = "ว้าย?! จริงๆ เลยนะคะคุณครู ฉันตกใจหมดเลยค่ะ"
10090-CVGroup_Growup_1-1 = "ฮิฮิๆ ขอบคุณนะคะคุณครู\nฉันจะเตรียมงานเทศกาลที่พิเศษยิ่งขึ้น...\nให้สมกับที่ฉันก้าวหน้าขึ้นได้สินะคะ?"
10090-CVGroup_Growup_2-1 = "ฉันยังก้าวหน้าขึ้นได้อีกค่ะ! เพื่องานเทศกาล... และก็เพื่อคุณครู!"
10090-CVGroup_Growup_3-1 = "รู้สึกเหมือนก้าวหน้าขึ้นอีกนิดหน่อยเลยค่ะ!\nอะไรแบบนี้... ดีจังเลยนะคะ"
10090-CVGroup_Growup_4-1 = "เป็นยังไงบ้างคะคุณครู? ฉัน... เติบโตขึ้นบ้างรึเปล่าคะ?\nถ้าเป็นอย่างฉัน... ฉันก็ดีใจค่ะ..."
10090-CVGroup_Relationship_Up_1-1 = "คุณครูรู้เรื่องความตื่นเต้นของวันก่อนงานเทศกาลมั้ยคะ...?\nตอนนี้ฉันรู้สึกแบบนั้นเลยค่ะ แหะๆ"
10090-CVGroup_Relationship_Up_2-1 = "คือว่าคุณครูคะ ขอแค่ฉันมีคุณครูอยู่ด้วย... คือว่า... เอ่อ...\nมะ... ไม่ว่างานเทศกาลแบบไหน ฉันก็จัดเตรียมได้ทั้งหมดเลยค่ะ!\nเฮ้อ... ฉันไม่ได้ตั้งใจจะพูดแบบนี้แท้ๆ..."
10090-CVGroup_Relationship_Up_3-1 = "บางครั้งฉันก็คิดแบบนั้นนะคะ คิดว่าถ้าได้อยู่ด้วยกันกับคุณครู\nทุกๆ วันคงมีสีสันเหมือนกับงานเทศกาล... น่ะค่ะ"
10090-CVGroup_Relationship_Up_4-1 = "คือว่า... คุณครูคะ? \nฉันมีหลายๆ อย่างที่อยากพูดกับคุณครู...\nแต่เหนือสิ่งอื่นใด ฉันต้องขอบคุณจริงๆ ค่ะ"
10090-CVGroup_Tactic_In_1-1 = "ฉันจะตื่นเต้นที่สุดในตอนที่งานเทศกาลกำลังจะเริ่มค่ะ!"
10090-CVGroup_Tactic_In_2-1 = "ภาพของทุกๆ คนที่ร่วมมือและสนุกสนานไปด้วยกัน\nมันสุดยอดมากๆ เลยค่ะ!"
10090-CVGroup_Tactic_Victory_1-1 = "เป็นงานเทศกาลที่สุดยอดมากเลยค่ะ! \nคุณครูไม่คิดแบบนั้นเหรอคะ?"
10090-CVGroup_Tactic_Victory_2-1 = "ถึงจะน่าเสียดายตอนงานจบ...\nแต่ยังไงก็มีงานเทศกาลอื่นอยู่อีกนี่คะ!"

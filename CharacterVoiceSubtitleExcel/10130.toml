[translation]
10130-CVGroup_Battle_Buffed_1-1 = "謝謝。我會繼續精進。"
10130-CVGroup_Battle_Covered_1-1 = "進行遮蔽。支援就麻煩了。"
10130-CVGroup_Battle_Defense_1-1 = "還沒結束！"
10130-CVGroup_Battle_In_1-1 = "將進行突入。請跟著我。"
10130-CVGroup_Battle_In_2-1 = "沒問題的。相信我吧。"
10130-CVGroup_Battle_Move_1-1 = "Clear。"
10130-CVGroup_Battle_Move_2-1 = "繼續前進。"
10130-CVGroup_Battle_Recovery_1-1 = "謝謝，相當有幫助。"
10130-CVGroup_Battle_TacticalAction_1-1 = "開始移動。"
10130-CVGroup_Battle_Victory_1-1 = "有讓你滿意嗎？那真是太好了。"
10130-CVGroup_Battle_Victory_2-1 = "壓制完畢。希望這樣就能解決問題。"
10130-CVGroup_CommonSkill-1 = "在滿分之中，你會給我幾分呢？老師。"
10130-CVGroup_ExSkill_1-1 = "……大家都在等著。"
10130-CVGroup_ExSkill_2-1 = "……這畢竟是工作。"
10130-CVGroup_ExSkill_3-1 = "……趕快結束吧。"
10130-CVGroup_ExSkill_Level_1-1 = "重新裝填，完成。"
10130-CVGroup_ExSkill_Level_2-1 = "繼續戰鬥。"
10130-CVGroup_ExSkill_Level_3-1 = "壓制射擊，開始。"
10130-CVGroup_Formation_In_1-1 = "是，老師。"
10130-CVGroup_Formation_In_2-1 = "明白了，我會準備。"
10130-CVGroup_Formation_Select-1 = "哇啊！？\n我，我才沒有被嚇到……是，是真的。"
10130-CVGroup_Growup_1-1 = "有種奇妙的感覺……\n這就是外面所說的「成長」嗎？"
10130-CVGroup_Growup_2-1 = "這就是成長的實感嗎？\n我也能像這樣往前邁進了呢。"
10130-CVGroup_Growup_3-1 = "我，希望能夠改變。\n……還請對其他人保密哦？"
10130-CVGroup_Growup_4-1 = "「相信並跟隨我」……？\n唉……那股自信到底是從哪裡湧出來的？\n不過嘛……僅限一次的話，倒也不是不能相信。"
10130-CVGroup_Relationship_Up_1-1 = "再次說出口還是有點害羞呢。\n該怎麼表達最適合，一度讓我感到猶豫……\n果然還是用簡單的方法最好吧。\n那個……有老師在，真的太好了。"
10130-CVGroup_Relationship_Up_2-1 = "其實，我還沒有百分之百信任老師。\n不過……大概有百分之九十五相信吧。"
10130-CVGroup_Relationship_Up_3-1 = "你曾經說過，每個學生對老師而言都是重要的存在對吧。\n一開始我還不太能夠理解……但最近我開始明白那句話的意義了。\n同時，也感覺有點遺憾就是了……"
10130-CVGroup_Relationship_Up_4-1 = "雖然老師常說希望我們能夠依靠你……\n不過在我看來，該說是有點抱歉……還是不夠滿足呢。\n沒，沒有什麼複雜的意思！\n只是，那個……我也希望能回報老師。\n因為報答所受的幫助就是奧利斯的風格。"
10130-CVGroup_Tactic_In_1-1 = "那麼，會是個什麼樣的地方呢？"
10130-CVGroup_Tactic_In_2-1 = "原來如此，是這種感覺啊。"
10130-CVGroup_Tactic_Victory_1-1 = "是場很有挑戰性的戰鬥。"
10130-CVGroup_Tactic_Victory_2-1 = "這就是奧利斯的風格。"

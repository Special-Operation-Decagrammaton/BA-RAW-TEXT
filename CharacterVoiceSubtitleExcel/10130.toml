[translation]
10130-CVGroup_Battle_Buffed_1-1 = "ขอบคุณนะคะ ฉันจะพยายามค่ะ"
10130-CVGroup_Battle_Covered_1-1 = "ซ่อนตัวเรียบร้อย ขอกำลังสนับสนุนด้วยค่ะ"
10130-CVGroup_Battle_Defense_1-1 = "ยังอีกไกลค่ะ!"
10130-CVGroup_Battle_In_1-1 = "จะบุกแล้วนะคะ ตามมาได้เลยค่ะ"
10130-CVGroup_Battle_In_2-1 = "ไม่เป็นไร ให้เป็นหน้าที่ฉันเองค่ะ"
10130-CVGroup_Battle_Move_1-1 = "เคลียร์"
10130-CVGroup_Battle_Move_2-1 = "ไปกันต่อเลยนะคะ"
10130-CVGroup_Battle_Recovery_1-1 = "ขอบคุณค่ะ ช่วยได้เยอะเลยค่ะ"
10130-CVGroup_Battle_TacticalAction_1-1 = "จะไปแล้วนะคะ"
10130-CVGroup_Battle_Victory_1-1 = "พอใจรึเปล่าคะ? ค่อยยังชั่วหน่อยค่ะ"
10130-CVGroup_Battle_Victory_2-1 = "ควบคุมสถานการณ์เรียบร้อย\nหวังว่าเท่านี้จะแก้ปัญหาได้แล้วนะคะ"
10130-CVGroup_CommonSkill-1 = "ถ้าประมาณนี้ได้กี่คะแนนเหรอคะ คุณครู?"
10130-CVGroup_ExSkill_1-1 = "ทุกคนกำลังรออยู่นะคะ..."
10130-CVGroup_ExSkill_2-1 = "ก็มันเป็นงานนี่คะ..."
10130-CVGroup_ExSkill_3-1 = "ทำให้เสร็จเร็วๆ ดีมั้ยคะ"
10130-CVGroup_ExSkill_Level_1-1 = "รีโหลด เสร็จเรียบร้อย"
10130-CVGroup_ExSkill_Level_2-1 = "ฉันจะลุยต่อไปค่ะ"
10130-CVGroup_ExSkill_Level_3-1 = "เริ่มยิงปราบปราม"
10130-CVGroup_Formation_In_1-1 = "ค่ะ คุณครู"
10130-CVGroup_Formation_In_2-1 = "เข้าใจแล้วค่ะ จะรีบเตรียมตัวค่ะ"
10130-CVGroup_Formation_Select-1 = "ว้าย?! มะ... ไม่ได้ตกใจเลยนะคะ... ฉันพูดจริงๆ ค่ะ"
10130-CVGroup_Growup_1-1 = "รู้สึกแปลกๆ จังเลยค่ะ...\nนี่คือสิ่งที่คนภายนอกเรียกว่า 'การเติบโต' สินะคะ"
10130-CVGroup_Growup_2-1 = "นี่คือความรู้สึกที่ได้เติบโตใช่มั้ยคะ\nฉันเองก็ก้าวต่อไปได้เช่นกันสินะคะ"
10130-CVGroup_Growup_3-1 = "ฉัน... มีความคิดที่อยากจะเปลี่ยนแปลงตัวเองค่ะ\nช่วยเก็บเป็นความลับจากคนอื่นๆ ได้มั้ยคะ...?"
10130-CVGroup_Growup_4-1 = "'เชื่อใจแล้วตามครูมาก็พอ'...?\nเฮ้อ... เอาความมั่นใจแบบนั้นมาจากไหนกันคะ?\nเอาเถอะค่ะ... ถ้าแค่ครั้งเดียวก็ไม่เป็นไรค่ะ"
10130-CVGroup_Relationship_Up_1-1 = "จะให้พูดออกมามันก็เขินนิดหน่อยค่ะ\nฉันกังวลว่าจะพูดออกไปยังไงดี...\nแต่สุดท้ายแล้วก็คิดว่า... พูดธรรมดาๆ ก็น่าจะดีที่สุดน่ะค่ะ\nคือ... โชคดีจริงๆ เลยนะคะที่มีคุณครูอยู่ด้วย"
10130-CVGroup_Relationship_Up_2-1 = "จริงๆ แล้วฉันยังไม่ได้ไว้ใจคุณครูร้อยเปอร์เซนต์หรอกนะคะ!\nแต่ก็สัก... 95 เปอร์เซนต์..."
10130-CVGroup_Relationship_Up_3-1 = "คุณครูบอกว่านักเรียนทุกคนสำคัญกับคุณครู\nตอนแรกฉันก็ยังไม่ค่อยเข้าใจเท่าไร...\nตอนนี้ฉันเหมือนเข้าใจความหมายแล้วละค่ะ\nถึงมันจะน่าเสียดายอยู่นิดหน่อยก็เถอะค่ะ..."
10130-CVGroup_Relationship_Up_4-1 = "คุณครูบอกว่าดีใจที่นักเรียนพึ่งพาคุณครู...\nเพียงเท่านี้มันจะพอจริงๆ เหรอคะ... ฉันรู้สึกว่ามันยังน้อยเกินไปด้วยซ้ำค่ะ\nมะ... ไม่ได้มีความหมายอะไรเป็นพิเศษหรอกนะคะ!\nก็แค่... การตอบแทนที่เท่าเทียมคือวิถีของอาเรียสค่ะ!"
10130-CVGroup_Tactic_In_1-1 = "เป็นสถานที่แบบไหนกันนะ"
10130-CVGroup_Tactic_In_2-1 = "อย่างนั้นสินะคะ ความรู้สึกแบบนี้สินะคะ"
10130-CVGroup_Tactic_Victory_1-1 = "เป็นการต่อสู้ที่ดุเดือดมากเลยค่ะ"
10130-CVGroup_Tactic_Victory_2-1 = "นี่คือวิถีของอาเรียสค่ะ"

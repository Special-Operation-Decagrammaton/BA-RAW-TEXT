[translation]
10130-CVGroup_Battle_Buffed_1-1 = "Thank you. I'll continue to do my best."
10130-CVGroup_Battle_Covered_1-1 = "Taking cover. Please support me."
10130-CVGroup_Battle_Defense_1-1 = "Not even close!"
10130-CVGroup_Battle_In_1-1 = "Going in. Follow me."
10130-CVGroup_Battle_In_2-1 = "It's okay. Trust me."
10130-CVGroup_Battle_Move_1-1 = "Clear."
10130-CVGroup_Battle_Move_2-1 = "Advancing."
10130-CVGroup_Battle_Recovery_1-1 = "Thank you. That helped."
10130-CVGroup_Battle_TacticalAction_1-1 = "Moving."
10130-CVGroup_Battle_Victory_1-1 = "Were you satisfied? That's a relief."
10130-CVGroup_Battle_Victory_2-1 = "Suppression complete. I hope this solves the problem."
10130-CVGroup_CommonSkill-1 = "What score did I get for that, Sensei?"
10130-CVGroup_ExSkill_1-1 = "...Everyone is waiting for me."
10130-CVGroup_ExSkill_2-1 = "...It's for work."
10130-CVGroup_ExSkill_3-1 = "...Let's finish this quickly."
10130-CVGroup_ExSkill_Level_1-1 = "Reload complete."
10130-CVGroup_ExSkill_Level_2-1 = "Continuing the battle."
10130-CVGroup_ExSkill_Level_3-1 = "Commencing suppressive fire."
10130-CVGroup_Formation_In_1-1 = "Yes, Sensei."
10130-CVGroup_Formation_In_2-1 = "Understood. I'll prepare."
10130-CVGroup_Formation_Select-1 = "Ack?! I-I wasn't surprised... Really."
10130-CVGroup_Growup_1-1 = "What a strange feeling... I suppose this is what they call \"growth,\" in the outside world."
10130-CVGroup_Growup_2-1 = "So this must be what it feels like to grow. I suppose I could move forward too, like the others."
10130-CVGroup_Growup_3-1 = "I've been thinking that I want to try to change. ...Could you keep this a secret from the others?"
10130-CVGroup_Growup_4-1 = "\"Trust me and follow me\"...? *sigh* ...Just where does that confidence stem from? Well... I'll try it out. Just once."
10130-CVGroup_Relationship_Up_1-1 = "It's a bit embarrassing to say aloud. I was trying to figure out the best way to convey it... but, in the end, I figured it'd be best to keep it simple. So... I'm really glad you're here, Sensei."
10130-CVGroup_Relationship_Up_2-1 = "I don't fully trust you yet! But...I think I do about 95% of the time."
10130-CVGroup_Relationship_Up_3-1 = "Sensei, you said every student is precious to you. I didn't really understand it at first...but I think I now know what you meant. It's a little disappointing, though."
10130-CVGroup_Relationship_Up_4-1 = "You say it makes you happy when students rely on you...but that just makes me feel guilty and insufficient... I-I don't mean anything special by that! It's just... It's the Arius way to repay our debts!"
10130-CVGroup_Tactic_In_1-1 = "What kind of place is this?"
10130-CVGroup_Tactic_In_2-1 = "I see. So this is how it feels."
10130-CVGroup_Tactic_Victory_1-1 = "That was a fun fight."
10130-CVGroup_Tactic_Victory_2-1 = "This is the Arius way."

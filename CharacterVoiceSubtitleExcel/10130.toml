[translation]
10130-CVGroup_Battle_Buffed_1-1 = "고마워요. 더욱 힘내겠습니다."
10130-CVGroup_Battle_Covered_1-1 = "엄폐합니다. 지원 부탁합니다."
10130-CVGroup_Battle_Defense_1-1 = "아직 멀었어요!"
10130-CVGroup_Battle_In_1-1 = "돌입합니다. 잘 따라오세요."
10130-CVGroup_Battle_In_2-1 = "괜찮아요. 저를 믿어 주세요."
10130-CVGroup_Battle_Move_1-1 = "클리어."
10130-CVGroup_Battle_Move_2-1 = "전진합니다."
10130-CVGroup_Battle_Recovery_1-1 = "감사합니다. 도움이 되었어요."
10130-CVGroup_Battle_TacticalAction_1-1 = "이동하겠습니다."
10130-CVGroup_Battle_Victory_1-1 = "만족하셨나요? 다행이네요."
10130-CVGroup_Battle_Victory_2-1 = "제압 완료입니다. 이걸로 해결됐다면 좋겠는데요."
10130-CVGroup_CommonSkill-1 = "이건 몇 점 정도일까요? 선생님."
10130-CVGroup_ExSkill_1-1 = "……모두가, 기다리고 있어서요."
10130-CVGroup_ExSkill_2-1 = "……일이니까 말이죠."
10130-CVGroup_ExSkill_3-1 = "……빠르게 끝내 둘까요."
10130-CVGroup_ExSkill_Level_1-1 = "재장전. 완료."
10130-CVGroup_ExSkill_Level_2-1 = "전투 지속합니다."
10130-CVGroup_ExSkill_Level_3-1 = "제압 사격 개시"
10130-CVGroup_Formation_In_1-1 = "네. 선생님."
10130-CVGroup_Formation_In_2-1 = "알겠습니다. 준비할게요."
10130-CVGroup_Formation_Select-1 = "우왓?! 노, 놀란 거 아니에요…… 진짜라고요."
10130-CVGroup_Growup_1-1 = "신기한 기분이네요……. 이게 바깥에서 말하는 '성장'인 걸까요."
10130-CVGroup_Growup_2-1 = "이것이 성장을 실감한다는 걸까요.\n저도 이렇게 앞으로 나아갈 수 있는 거군요."
10130-CVGroup_Growup_3-1 = "저, 달라지고 싶다고 생각하고 있어요.\n……다른 아이들에게는 비밀로 해주세요?"
10130-CVGroup_Growup_4-1 = "'나를 믿고 따라와'……? 하아…… 그 자신은 도대체 어디에서 솟아 나오는 건가요?\n뭐, 그래도…… 한 번 정도라면 상관없지만요."
10130-CVGroup_Relationship_Up_1-1 = "말로 하려니 조금 부끄럽네요.\n어떻게 전하는 게 가장 좋을지 고민했는데…… 역시, 간단한 게 최고이지 않을까, 해서요.\n저…… 선생님이 계셔서, 정말로 다행이에요."
10130-CVGroup_Relationship_Up_2-1 = "사실 아직 선생님을 백 퍼센트 믿게 된 건 아니니까 말이죠!\n그래도…… 95퍼센트, 정도는……"
10130-CVGroup_Relationship_Up_3-1 = "어떤 학생이든, 선생님에게는 소중하다고 하셨죠.\n처음에는 잘 이해가 되지 않았지만…… 지금은 그 의미를 알 것 같네요.\n그것이 약간, 아쉽게도 느껴지지만요……"
10130-CVGroup_Relationship_Up_4-1 = "학생이 선생님을 의지해 주면 기쁘다고 하시지만……\n저는 그걸로는 죄송하다고 할까, 모자란다는 느낌일까요.\n벼, 별 뜻은 없어요! 그냥, 단지…… 받은 만큼 돌려주는 게, 아리우스식이니까요!"
10130-CVGroup_Tactic_In_1-1 = "어디, 어떤 곳일까요."
10130-CVGroup_Tactic_In_2-1 = "그렇군요. 이런 느낌이네요."
10130-CVGroup_Tactic_Victory_1-1 = "손맛이 있는 싸움이었습니다."
10130-CVGroup_Tactic_Victory_2-1 = "이게 아리우스식이죠."

10140-CVGroup_Battle_TacticalAction_1-1 = "원호해줘!"
10140-CVGroup_Battle_Victory_1-1 = "이게 바로 SRT의 진가야!"
10140-CVGroup_Battle_Victory_2-1 = "특수부대의 힘을 조금은 깨달았으려나?"
10140-CVGroup_CommonSkill-1 = "가슴에 두 발…… 그리고 머리에 한 발!"
10140-CVGroup_ExSkill_1-1 = "자, 여기 봐. 치즈!"
10140-CVGroup_ExSkill_2-1 = "자, 웃는 게 좋을 거야."
10140-CVGroup_ExSkill_3-1 = "전방에…… 폭스트롯!"
10140-CVGroup_ExSkill_Level_1-1 = "섬광 방패, 충전 개시!"
10140-CVGroup_ExSkill_Level_2-1 = "무슨 공격이든 다 막아주겠어!"
10140-CVGroup_ExSkill_Level_3-1 = "짜릿하지?"
10140-CVGroup_Formation_In_1-1 = "FOX 3, 출동 준비 완료."
10140-CVGroup_Formation_In_2-1 = "드디어 내 차례인가 보네!"
10140-CVGroup_Formation_Select-1 = "후후, 이 방패로 말할 것 같으면……\n자, 잠깐! 돌려줘!"
10140-CVGroup_Growup_1-1 = "뭔가 훈련의 성과가 느껴져……\n이대로라면 조만간 나이스 바디가 될지도?"
10140-CVGroup_Growup_2-1 = "음, 좋은 훈련이었어!"
10140-CVGroup_Growup_3-1 = "시야가 한층 더 넓어진 느낌이야.\n선생님이 함께해 준 덕분일지도……"
10140-CVGroup_Growup_4-1 = "(몸이 둔해진 만큼…… 열심히 더 노력해야지.)"
10140-CVGroup_Relationship_Up_1-1 = "자, 잠깐…… 적정거리를 잊은 거야?\n너무 가깝다고! Danger Close야!"
10140-CVGroup_Relationship_Up_2-1 = "이것도…… 훈련의 일환이니까.\n차, 착각하지 말아 줘!"
10140-CVGroup_Relationship_Up_3-1 = "뭔가 필요한 거 없어?\n구해다 줄 테니까…… 정말 없어?!"
10140-CVGroup_Relationship_Up_4-1 = "이상하게 선생님은…… 의지가 돼.\n정말, 이상한 어른이야. 후훗."
10140-CVGroup_Tactic_In_1-1 = "FOX 3, 목표 구역에 도착했어."
10140-CVGroup_Tactic_In_2-1 = "걱정 마. 내가 앞장설 테니까!"
10140-CVGroup_Tactic_Victory_1-1 = "후훗.\n내가 활약하는 모습 똑똑히 봤지?"
10140-CVGroup_Tactic_Victory_2-1 = "아아~ 오늘도 힘냈다.\n선생님도 수고 많았어!"

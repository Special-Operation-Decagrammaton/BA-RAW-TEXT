[translation]
10002150-1 = "Afterword; How to Build the Perfect Sandcastle"
10002150-2 = "I'm disappointed at how quickly the sandcastle came apart, even if it was due to those troublemakers attacking us."
10002150-3 = "Maybe Azusa was right."
10002150-4 = "[s] \"It's a shame. You really did build a cool sandcastle.\""
10002150-5 = "How it looked didn't matter to me."
10002150-6 = "Only one factor determines a sandcastle's value..."
10002150-7 = "...and that's how much protection it offers!"
10002150-8 = "After all, there's no shortage of wet sand on the beach. Its disadvantage is its lack of structural integrity and inability to withstand external forces."
10002150-9 = "But what if it were mixed with something more cohesive...?"
10002150-10 = "Imagine the sandcastle you could build by mixing sand and concrete together. A sandstone castle!"
10002150-15 = "It would be able to withstand compression, but it would still crumble when a strong enough force attacks it."
10002150-16 = "It'll take more than that to build a sandcastle that can ward off those troublemaking students."
10002150-17 = "So what material SHOULD we use?"
10002150-18 = "Mortar could work. It's cheap and easy to come by."
10002150-19 = "Though it still wouldn't be the strongest and would need to be reinforced. Therefore, I recommend..."
10002150-20 = "...adding steel rebar."
10002150-21 = "Rebar wouldn't only raise the tensile strength of the mortar—it would also increase the cohesion of the structure, allowing us to build a stronger castle."
10002150-22 = "That's brilliant."
10002150-23 = "You always have brilliant ideas, Azusa."
10002150-24 = "When we first met, I thought you were just a deviant. In actuality, you're a genius strategist and well versed in fortification. I've never been so wrong."
10002150-25 = "You weren't the only one stricken with preconceived notions. I thought you were only another stubborn member of the Justice Task Force..."
10002150-26 = "...but the way you quickly reassess in any given situation caused me to reconsider."
10002150-27 = "[s] \"What does any of this have to do with sandcastles anymore?\""
10002150-29 = "I hope you're not implying our creation wouldn't technically be a sandcastle. It counts as long as sand is still part of the building materials."
10002150-31 = "And as it would serve defensive purposes, it would still be fair to call it a \"castle\"."
10002150-34 = "Therefore, it's STILL a sandcastle!"
10002150-35 = "[s] \"When did you two get so in sync...?\""
10002150-37 = "Shall we go fetch some concrete and rebar for the mortar?"
10002150-38 = "I'll lay the foundation for the floor!"
10002150-43 = "(Afterwards, Mashiro and Azusa teamed up and began building their so-called sandcastle on the beach...)"

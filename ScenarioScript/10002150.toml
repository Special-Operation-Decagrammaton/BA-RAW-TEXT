[translation]
10002150-1 = "後日談其二;完美無缺的沙堡？"
10002150-2 = "呼……雖然說被捲入了戰鬥，沒想到那麼巨大的沙堡居然會瞬間化為烏有……"
10002150-3 = "也許就如梓同學所說「一切都是徒勞的」也說不定呢……"
10002150-4 = "[s]「那確實是很壯觀的沙堡，真可惜……」"
10002150-5 = "不，我認為那樣還不足夠。"
10002150-6 = "畢竟沙堡的價值……"
10002150-7 = "是由防禦力來決定的！"
10002150-8 = "浸濕的沙雖然是能輕鬆取得的建材，卻也同時有著會被外力輕易破壞的缺點。"
10002150-9 = "必須取得更加堅固的素材才行……"
10002150-10 = "比如……在沙子裡混入石灰粉如何？#n這樣是不是多少能變得更堅固一點？"
10002150-15 = "不，那樣製成的砂漿，抗拉強度將令人擔憂。#n有輕易坍塌的可能性。"
10002150-16 = "如果想建造足以抵禦各種攻擊的沙堡，我認為選擇其他配方會比較好。"
10002150-17 = "原來如此，那要用什麼材料呢？"
10002150-18 = "砂漿本身作為素材並不壞。#n不只原料的價格低廉，還很容易取得。"
10002150-19 = "只是就如剛剛說的，問題出在抗拉強度不足……"
10002150-20 = "所以……只要在砂漿之間埋入鋼筋就行了。"
10002150-21 = "這樣一來一定能建出強度遠勝之前的城堡才對。"
10002150-22 = "原來如此。"
10002150-23 = "不愧是梓同學，又讓我學到了一課。"
10002150-24 = "說來慚愧，我以前一直認為梓同學只是個問題人物……#n沒想到你居然知道這麼多的知識……真是讓我另眼相看。"
10002150-25 = "我才應該這麼說。#n之前一直以為你只是個不懂變通的實現正義部成員……"
10002150-26 = "沒想到隨機應變的能力如此優秀，原來實現正義部也有這種人在啊。"
10002150-27 = "[s]「……可是這樣已經不能稱為『沙堡』了吧？」"
10002150-29 = "不，材料裡面確實有「沙子」！"
10002150-31 = "而且是以防禦為目的建造的建築，完全可以被稱為「城堡」。"
10002150-34 = "「「所以是沙堡（沒錯）！」」"
10002150-35 = "[s]「一搭一唱呢……」"
10002150-37 = "好，那麼為了重新建造「沙堡」，來去找石灰粉和鋼筋吧？"
10002150-38 = "我來負責打地基！"
10002150-43 = "（之後意氣相投的麻白和梓，開始在海邊蓋起了名為「沙堡」的堡壘……）"

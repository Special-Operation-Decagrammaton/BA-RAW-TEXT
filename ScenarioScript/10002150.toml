[translation]
10002150-1 = "#title;후일담;완벽한 모래성을 쌓는 방법"
10002150-2 = "3;마시로 수영복ND;99;후우. 아무리 불량배들의 공격을 받은 탓이라고는 하지만, 그 커다란 모래성이 단숨에 녹아내리다니…….\n#3;stiff\n#3;em;[속상함]\n#3;a"
10002150-3 = "3;마시로 수영복ND;01;아즈사 씨의 말처럼 모든 것이 헛되고 헛된 존재로군요……."
10002150-4 = "[s] \"정말 멋진 모래성이었는데 아쉽게 되었네.\""
10002150-5 = "3;마시로 수영복ND;02;아뇨. 모래성이 얼마나 멋졌는지는 제게 그리 중요한 사실이 아닙니다.\n#3;em;[반응]"
10002150-6 = "3;마시로 수영복ND;01;자고로 모래성의 가치는……"
10002150-7 = "3;마시로 수영복ND;05;방호력으로 결정되는 법이니까요!\n#3;em;[!]\n#3;closeup"
10002150-8 = "3;마시로 수영복ND;03;젖은 모래는 어디서나 쉽게 구할 수 있는 건축 재료이지만, 응집력이 낮아 외력에 쉽게 깨진다는 단점이 있지요.\n#3;em;[반짝]\n#3;closeup"
10002150-9 = "3;마시로 수영복ND;99;좀 더 응집력이 강한 건축 재료를 구하지 않으면…….\n#3;closeup"
10002150-10 = "3;마시로 수영복ND;02;모래에 콘크리트 가루를 섞으면 좀 더 단단한 모래성을 쌓을 수 있지 않을까요?\n#3;em;[?]\n#3;closeup"
10002150-11 = "#st;[0,0];instant;1;"
10002150-12 = "#clearST"
10002150-13 = "3;마시로 수영복ND;02\n#3;closeup\n#wait;2100"
10002150-14 = "3;마시로 수영복ND;02\n5;아즈사 수영복ND;00\n#3;m1\n#5;al\n#wait;1000"
10002150-15 = "5;아즈사 수영복ND;02;아니, 모래와 콘크리트를 섞어 만든 모르타르는 압축되는 힘에는 잘 견디지만, 인장 강도가 약해 쪼개지는 힘에 쉽게 무너질 위험이 있어.\n#5;em;[반응]"
10002150-16 = "5;아즈사 수영복ND;01;불량배들의 공격을 대비하려면 모래성을 더 단단하게 쌓아 올려야 해."
10002150-17 = "3;마시로 수영복ND;02;그럼 어떤 재료를 쓰는 게 좋을까요?\n#3;em;[?]"
10002150-18 = "5;아즈사 수영복ND;01;모르타르 자체는 소재로 나쁘지 않아. 가격도 저렴하고 구하기 쉬우니까."
10002150-19 = "5;아즈사 수영복ND;99;다만 아까 말했듯이 부족한 인장력을 보강해야 하니까, 내가 추천하는 방법은……\n#5;em;…"
10002150-20 = "5;아즈사 수영복ND;03;모르타르 사이에 철근을 심는 거야.\n#5;em;[음표]"
10002150-21 = "5;아즈사 수영복ND;03;철근은 모르타르의 부족한 인장력을 크게 끌어올릴 뿐더러, 구조물의 응집력을 높여주기 때문에 더욱 견고히 성을 쌓을 수 있지."
10002150-22 = "3;마시로 수영복ND;99;과연, 그렇군요.\n#3;greeting"
10002150-23 = "3;마시로 수영복ND;05;역시 아즈사 씨, 한 수 배웠습니다.\n#3;em;[반짝]"
10002150-24 = "3;마시로 수영복ND;03;그동안 아즈사 씨는 이상한 기행만 저지르는 문제아라고 생각했는데, 기지 구축에 이런 노하우를 갖고 계셨다니……새삼 다시 보았습니다."
10002150-25 = "5;아즈사 수영복ND;02;나야말로. 그동안 융통성 없는 정의실현부의 일원이라고만 생각했었는데……"
10002150-26 = "5;아즈사 수영복ND;03;상황에 따라 유연하게 대처할 줄도 알다니, 다시 봤어.\n#5;em;[반짝]"
10002150-27 = "[s] \"……이러면 더 이상 모래성이 아니지 않나?\""
10002150-28 = "5;아즈사 수영복ND;08\n3;마시로 수영복ND;05\n#3;h"

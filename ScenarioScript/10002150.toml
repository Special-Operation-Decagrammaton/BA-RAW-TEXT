[translation]
10002150-1 = "ย้อนวันวาน;วิธีก่อปราสาททรายที่สมบูรณ์แบบ"
10002150-2 = "เฮ้อ... ถึงจะบอกว่าเป็นเพราะยัยพวกแยงกี้นั่นบุกเข้ามาโจมตีก็เถอะ แต่ฉันรู้สึกผิดหวังนิดหน่อย#nที่ปราสาททรายมันหายไปเร็วแบบนั้น..."
10002150-3 = "บางทีที่คุณอาซึสะพูดก็คงถูกแล้วล่ะค่ะ..."
10002150-4 = "[s] \"อุตส่าห์ก่อปราสาททรายที่สุดยอดได้แล้ว น่าเสียดายเนอะ\""
10002150-5 = "ไม่หรอกค่ะ รูปลักษณ์ของมันจะสุดยอดแค่ไหนก็ไม่สำคัญหรอกค่ะ"
10002150-6 = "สิ่งสำคัญสำหรับปราสาททรายก็คือ..."
10002150-7 = "ความสามารถในการป้องกันของมันต่างหากค่ะ!"
10002150-8 = "ทรายเปียกเป็นวัสดุก่อสร้างที่สามารถหาได้จากทุกที่ แต่ว่ามันมีข้อเสียก็คือจะเสียหายได้ง่าย#nหากถูกแรงกระแทกจากภายนอก เนื่องจากมีความแข็งแกร่งทางโครงสร้างไม่เพียงพอ"
10002150-9 = "ถ้าไม่เอาวัสดุที่มีความแข็งแกร่ง ทนทานมาผสมเข้าด้วยกันละก็..."
10002150-10 = "ถ้าเอาคอนกรีตมาผสมกับทราย คงจะทำให้ปราสาททรายมีความแข็งแรงทนทานมากขึ้นใช่ไหมคะ?"
10002150-15 = "ไม่สิ ถ้าผสมทรายกับคอนกรีตล่ะก็อาจจะทนทานต่อแรงบีบอัดได้ดี แต่ก็อาจจะพังลงมาได้ง่ายๆ#nถ้าถูกโจมตีอย่างรุนแรง"
10002150-16 = "ถ้าจะรับมือกับพวกเด็กมีปัญหาพวกนั้นล่ะก็ คงจะต้องสร้างปราสาททรายที่มีความแข็งแกร่งกว่านี้อีก"
10002150-17 = "ถ้างั้นควรใช้วัสดุอะไรดีเหรอคะ?"
10002150-18 = "ปูนก็น่าจะใช้ได้นะ ราคาไม่แพงแถมยังหาง่ายอีกด้วย"
10002150-19 = "แต่ว่าอย่างที่ฉันบอกไปว่าควรเพิ่มความแข็งแรง เพราะงั้นวิธีที่ฉันอยากแนะนำก็คือ..."
10002150-20 = "เราควรใช้ปูนและเสริมด้วยเหล็กกล้า"
10002150-21 = "เหล็กกล้าไม่เพียงแต่จะเสริมความทนทานเท่านั้น แต่ยังช่วยให้การยึดตัวของโครงสร้างดีขึ้น#nเพราะงั้นเราจะสามารถสร้างปราสาททรายที่แข็งแรงได้ยังไงล่ะ"
10002150-22 = "อย่างนี้นี่เอง..."
10002150-23 = "สมกับเป็นคุณอาซึสะจริงๆ ฉันได้เรียนรู้อะไรเพิ่มขึ้นอีกแล้วล่ะค่ะ "
10002150-24 = "ในตอนแรกที่เจอกัน ฉันคิดว่าคุณอาซึสะเป็นเด็กเจ้าปัญหาที่ชอบก่อเรื่องซะอีก แต่ที่จริงแล้วคุณ#nเป็นนักวางกลยุทธ์ที่เชี่ยวชาญด้านการสร้างฐานทัพสินะคะ..."
10002150-25 = "ฉันเอง... ที่ผ่านมาฉันก็เคยคิดว่าเธอเป็นสมาชิกหัวรั้นของชมรมทวงความยุติธรรมเหมือนกัน..."
10002150-26 = "แต่พอเห็นเธอปรับตัวได้ดีในสถานการณ์ต่างๆ มันทำให้ฉันมองเธอใหม่เลยล่ะ"
10002150-27 = "[s] \"ถ้าแบบนี้ก็ไม่ใช่ปราสาททรายแล้วน่ะสิ...?\""
10002150-29 = "ไม่นะคะ วัสดุที่เราใช้ก็มี \"ทราย\" อยู่ด้วยนะคะ!"
10002150-31 = "อีกอย่าง เราสร้างมันขึ้นมาก็เพื่อใช้สำหรับเป็น \"ปราสาท\" ป้องกันยังไงล่ะ"
10002150-34 = "เพราะงั้นมันก็คือ \"ปราสาททราย\" ยังไงล่ะ! (...คะ!)"
10002150-35 = "[s] \"ทั้งสองคนเข้ากันดีจังเลยนะ...\""
10002150-37 = "เอาละ ถ้างั้นเราไปหาคอนกรีตกับเหล็กที่จะใช้มากันเลยดีมั้ย?"
10002150-38 = "ฉันจะจัดการเรื่องการปูพื้นให้เองค่ะ!"
10002150-43 = "(จากนั้นมาชิโระกับอาซึสะก็ผนึกกำลังกันช่วยสร้าง \"ปราสาททราย\" ของพวกเธอขึ้นมาที่ชายหาด...)"

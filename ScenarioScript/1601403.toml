[translation]
1601403-1 = "ไปปิกนิกกับอิบูกิกันเถอะ!"
1601403-2 = "สวัสดี คุณครู! ตอนที่อิบูกิไม่อยู่ สบายดีรึเปล่า?"
1601403-3 = "[s1] \"พออิบูกิไม่อยู่ ครูเหงามากเลย...\"\n[s2] \"ครูตั้งตารออิบูกิเลยนะ...\""
1601403-6 = "อ๊ะ แบบนั้นไม่ได้นะ!"
1601403-7 = "รุ่นพี่มาโคโตะบอกเอาไว้น่ะ ว่าเวลาที่ไม่มีใครอยู่ด้วย ก็ต้องอยู่คนเดียวให้ได้แบบคูลๆ!"
1601403-8 = "แต่ว่านะ... รุ่นพี่มาโคโตะน่ะมักจะอยู่ข้างๆ อิบูกิตลอดเลย ฮิฮิ "
1601403-9 = "ยังไงก็เถอะ คุณครู ตอนนี้อิบูกิก็มาหาแล้ว ไม่เป็นไรแล้วใช่มั้ย?"
1601403-10 = "[s] \"อื้อ ไม่เป็นไรแล้วละ! ครูก็เตรียมพุดดิ้งไว้ให้อิบูกิด้วยนะ!\""
1601403-11 = "ว้าววว! ขอบคุณค่า!"
1601403-12 = "[s] \"ไปนั่งกินที่ห้องพักผ่อนดีมั้ย?\""
1601403-13 = "ค่ะ!"
1601403-15 = "จะทานแล้วนะคะ!"
1601403-22 = "สรวงสวรรค์สำหรับทุกๆ คนที่เหนื่อยล้ากับชีวิตประจำวัน!"
1601403-26 = "ขอเชิญทุกๆ ท่านมาสนุกกันที่สวนสนุกอันดับหนึ่งในคิโวทอส 'ยูนีก สตูดิโอ คิโวทอส' ครับ!"
1601403-27 = "เพลิดเพลินกับช่วงเวลาของคุณกับครอบครัวและเพื่อนๆ ได้ที่ยูนีก สตูดิโอ คิโวทอส!"
1601403-28 = "..."
1601403-29 = "[s] \"อิบูกิ พุดดิ้งจะหกแล้ว\""
1601403-30 = "..."
1601403-34 = "[ns] \"อิบูกิ... ไปสวนสนุกกันมั้ย?\""
1601403-35 = "เอ๋? จริงเหรอ?! ไปได้จริงๆ เหรอ? "
1601403-36 = "อ่า แต่ว่า... การไปสวนสนุก... "
1601403-37 = "รุ่นพี่มาโคโตะบอกว่า... จะไปได้แค่เฉพาะวันพิเศษเท่านั้น..."
1601403-38 = "[s] \"วันที่อิบูกิมาที่ชาเล่ต์ก็ถือว่าเป็นวันพิเศษนะ! เพราะงั้นไปได้แน่นอน!\""
1601403-42 = "ถ้างั้นอิบูกิก็ไปด้วย...!"
1601403-43 = "อิบูกิน่ะ อยากไปสวนสนุกมากๆ เลย!"
1601403-44 = "อยากไปนั่งม้าหมุนกับคุณครู แล้วก็อยากไปดูขบวนพาเหรดด้วย!"
1601403-45 = "[s3] \"แบบนี้คงไม่ไปไม่ได้แล้วละ!\"\n[s4] \"วันนี้เตรียมตัวกันก่อน แล้วค่อยไปพรุ่งนี้ดีมั้ย?\""
1601403-48 = "ว้าว! คุณครูสุดยอดดด!"
1601403-49 = "ถ้างั้น... ถ้างั้นก็ต้องซื้อตั๋ว แล้วก็เตรียมข้าวกล่องไปกินด้วยสินะ?"
1601403-50 = "[s] \"เดี๋ยวครูจะจองตั๋วเอง ไม่ต้องห่วงนะ\""
1601403-51 = "ถ้างั้นอิบูกิจะเตรียมข้าวกล่องให้เอง! อิบูกิทำได้!"
1601403-52 = "งั้นเราก็ไปซื้อวัตถุดิบกันเถอะ คุณครู!"
1601403-55 = "อิบูกิจะทำเมนูที่อิบูกิชอบ!"
1601403-62 = "เยลลี่รูปหมี ลูกอมรสส้มกับคาราเมล แล้วก็... ของหวานเอาเป็นพุดดิ้ง...!"
1601403-63 = "[s5] \"อิบูกิ... ครูก็ชอบของพวกนั้นอยู่หรอกนะ...\"\n[s6] \"ข้าวกล่องเอาเป็นพวกข้าวปั้นดีมั้ย?\""
1601403-66 = "อื้อ! ข้าวปั้นก็ได้!"
1601403-67 = "ข้าวปั้นที่อิบูกิทำน่ะ รุ่นพี่อิโรฮะเคยชมด้วยนะ เพราะงั้นคุณครูเองก็คงจะชอบเหมือนกันแหละ!"
1601403-68 = "[s] \"จริงเหรอ? ครูตั้งตารอชิมเลยนะ\""
1601403-69 = "อื้อ รอชิมได้เลยค่ะ!"
1601403-71 = "(หลังจากที่คุณครูกับอิบูกิซื้อวัตถุดิบสำหรับทำข้าวกล่องเสร็จก็กลับมาที่ห้องทำอาหารที่ชาเล่ต์)"
1601403-73 = "ถ้างั้นตอนนี้เราก็มาทำข้าวกล่องกันเถอะ คุณครู"
1601403-78 = "อย่างแรกก็ปั้นข้าวให้เป็นก้อนๆ แล้วก็ใส่เยลลี่น้องหมีลงไป แบบนี้ๆ..."
1601403-79 = "[s] \"สะ...ใส่เยลลี่น้องหมี?!\""
1601403-80 = "อื้อ! ข้าวปั้นเยลลี่น้องหมีไง! เมื่อคราวก่อนตอนที่อิบูกิทำ รุ่นพี่อิโรฮะบอกว่าอร่อยมากด้วยนะ!"
1601403-81 = "[s7] \"มีเรื่องแบบนั้นด้วยเหรอ...!\"\n[s8] \"อื้ม! ครูอยากกินข้าวปั้นบ๊วยดองด้วย! ว่าไงอิบูกิ?!\""
1601403-84 = "คุณครูชอบไส้บ๊วยดองเหรอ? เข้าใจแล้ว!"
1601403-89 = "แต่นแต๊น! อิบูกิทำเสร็จแล้ว คราวนี้คุณครูก็ลองทำดูบ้างสิ!"
1601403-90 = "[s] \"ปั้นข้าวให้เป็นก้อน...\""
1601403-91 = "อื้อ! แบบนั้นแหละ เก่งมาก!"
1601403-92 = "ข้าวปั้นของคุณครู อิบูกิจะปั้นให้ใหญ่เป็นพิเศษเลย!"
1601403-93 = "เอาละนะ..."
1601403-98 = "เสร็จแล้ว!"
1601403-99 = "[s] \"ดูน่าอร่อยจริงๆ ด้วย ขอลองชิมหน่อยได้มั้ย?\""
1601403-100 = "อ๊ะ ไม่ได้นะ! ต้องเก็บไว้กินที่สวนสนุกพรุ่งนี้สิ!"
1601403-101 = "อดทนไว้ แล้วก็รอไปปิกนิกกับอิบูกิพรุ่งนี้นะ!"
1601403-104 = "(แต่ว่าวันต่อมา...)"
1601403-110 = "ฮือออ..."
1601403-111 = "ดูเหมือน... ฝนจะไม่หยุดตกง่ายๆ เลย ทั้งๆ ที่สัญญากับคุณครูว่าจะไปสวนสนุกด้วยกันแท้ๆ..."
1601403-112 = "อยากไปนั่งม้าหมุนกับคุณครู แล้วก็อยากไปดูขบวนพาเหรดด้วยกัน แล้วก็กินข้าวกล่องด้วยกัน..."
1601403-116 = "ฮืออออ ฮึก...ฮึก..."
1601403-117 = "[s] \"อิบูกิ...!\""
1601403-118 = "หะ... หืม?"
1601403-122 = "เอ๋ คุณครู? ปูเสื่อบนพื้นทำไมน่ะ?"
1601403-123 = "[s] \"อิบูกิ พอครูปูเสื่อบนพื้น ที่นี่ก็กลายเป็นสวนสนุกแล้วนะ\""
1601403-125 = "[ns] \"เอ้า อิบูกิ! ยินดีต้อนรับสู่ชาเล่ต์พาร์ก!\""
1601403-126 = "...ชาเล่ต์พาร์ก?"
1601403-127 = "[s9] \"ถึงจะไม่ได้ไปที่สวนสนุกยูนีก สตูดิโอแล้วก็เถอะ...\"\n[s10] \"งั้นวันนี้... ครูจะเนรมิตชาเล่ต์ให้เป็นสวนสนุกเอง!\""
1601403-130 = "ชาเล่ต์... จะเป็นสวนสนุก?"
1601403-131 = "[s11] \"อื้อ เพราะงั้นการปิกนิกในสวนสนุกจะเริ่มขึ้นแล้วนะ!\"\n[s12] \"เริ่มจากข้าวกล่องกันก่อนดีมั้ย?\""
1601403-134 = "ถอดรองเท้า... แล้วก็ขึ้นไปนั่งบนเสื่อที่ปูอยู่..."
1601403-139 = "ว้าว! ทำแบบนี้แล้วเหมือนปิกนิกจริงๆ เลย!"
1601403-140 = "[s] \"เอาละ อิบูกิก็รีบมาสิ\""
1601403-141 = "อื้อ คุณครู!"
1601403-148 = "เอ้านี่ ข้าวปั้นพิเศษสำหรับคุณครู!"
1601403-152 = "..."
1601403-153 = "[s] \"มีอะไรเหรอ?\""
1601403-154 = "...แต่ว่าแบบนี้มันไม่เป็นไรจริงๆ เหรอ?"
1601403-155 = "[s] \"ไม่เป็นไรจริงๆ รึเปล่าน่ะเหรอ?\""
1601403-156 = "ข้าวปั้นยักษ์อันนี้ อุตส่าห์ตั้งใจทำไว้ไปกินที่ยูนีก สตูดิโอเลยนะ..."
1601403-157 = "แต่เอามากินที่ชาเล่ต์พาร์กแบบนี้... คุณครูไม่เป็นไรแน่นะ?"
1601403-158 = "[s13] \"กินที่ไหนก็ไม่สำคัญ ที่สำคัญคือได้กินกับอิบูกิต่างหาก\"\n[s14] \"นี่เป็นข้าวกล่องที่ครูกับอิบูกิตั้งใจทำด้วยกันเลยนี่นา?\""
1601403-161 = "......"
1601403-162 = "อื้อ จริงด้วยนะ!"
1601403-163 = "อิบูกิก็เหมือนกัน ถ้าได้กินข้าวกับคุณครูละก็ จะกินที่ไหนก็ได้!"
1601403-165 = "(หลังจากนั้นคุณครูกับอิบูกิก็เล่นเกมและเล่นของเล่นด้วยกันที่ 'ชาเล่ต์พาร์ก' อย่างสนุกสนาน)"

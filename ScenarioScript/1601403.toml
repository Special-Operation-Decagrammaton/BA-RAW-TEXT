[translation]
1601403-1 = "A Picnic with Ibuki!"
1601403-2 = "Hi, Sensei! Did you miss Ibuki while Ibuki was gone?"
1601403-3 = "[s1] \"Yeah, it's been a little lonely without you.\"\n[s2] \"I couldn't wait to see you again.\""
1601403-6 = "Aw, that's no good!"
1601403-7 = "Makoto says real courage is when you have to stand all alone."
1601403-8 = "But when she says that, Ibuki's right there with her. Heehee."
1601403-9 = "Anyways! It'll be okay, Sensei. Because Ibuki is here now!"
1601403-10 = "[s] \"Of course! Also here. I got some pudding as a welcome gift!\""
1601403-11 = "Yay! Thank you!"
1601403-12 = "[s] \"Want to go eat it in the lounge?\""
1601403-13 = "Yeah!"
1601403-15 = "Thanks for the snack!"
1601403-22 = "It's a paradise for those sick of everyday life!"
1601403-26 = "The very best amusement park in Kivotos! Come on down to Galactic Studio Kivotos!"
1601403-27 = "A magical day for your friends and family! Only at Galactic Studio Kivotos!"
1601403-28 = "..."
1601403-29 = "[s] \"Ibuki, you're spilling your pudding.\""
1601403-30 = "..."
1601403-34 = "[ns] \"...Hey Ibuki, do you want to go to the amusement park?\""
1601403-35 = "Wha?! Really?! Can Ibuki go? "
1601403-36 = "Oh, but Makoto said... "
1601403-37 = "\"We can only go splurge on amusement parks on the most important of days!\""
1601403-38 = "[s] \"Well... You came to visit me at Schale today. And I think that's plenty important. And I am Sensei so...!\""
1601403-42 = "In that case, Ibuki wants to go!"
1601403-43 = "Take Ibuki to the amusement park!"
1601403-44 = "Ibuki wants to ride merry-go-rounds and watch parades with Sensei!"
1601403-45 = "[s3] \"All the more reasons to go!\"\n[s4] \"Let's start packing now, then go to the amusement park tomorrow?\""
1601403-48 = "Yay! Sensei, you're the best!"
1601403-49 = "Ah! Ah! We need to buy tickets! And pack lunches, too!"
1601403-50 = "[s] \"Sensei can buy the tickets. Don't worry about those.\""
1601403-51 = "Ibuki can pack our lunches then! Ibuki is an expert!"
1601403-52 = "Let's go out and buy the ingredients, Sensei!"
1601403-55 = "We can have Ibuki's favorite foods for lunch!"
1601403-62 = "Gummy bears, orange candies, caramel, and for dessert...pudding!"
1601403-63 = "[s5] \"Uh, Ibuki. All that sounds nice but...\"\n[s6] \"How about something like onigiri for lunch, okay?\""
1601403-66 = "Okay! Onigiri's also good!"
1601403-67 = "Iroha said Ibuki's onigiri is pretty tasty, so Ibuki knows Sensei will love them!"
1601403-68 = "[s] \"Really? I'll look forward to them then.\""
1601403-69 = "You better!"
1601403-71 = "After buying the ingredients we needed, we headed over to Schale's kitchen."
1601403-73 = "All right, Sensei. It's time to cook!"
1601403-78 = "First we pack the rice like this. Then we put the gummy bears inside. Then we squeeze and squeeze..."
1601403-79 = "[s] \"G-Gummy bears?!\""
1601403-80 = "Yes! Gummy bear onigiri! Iroha loved it!"
1601403-81 = "[s7] \"I see! Wh-What a unique dish!\"\n[s8] \"Mmm! Could Sensei also get one with pickled plums too, Ibuki?!\""
1601403-84 = "Is that the kind that Sensei likes? Sure!"
1601403-89 = "Tada! Here it is! Why don't you try making one, Sensei!"
1601403-90 = "[s] \"Sure thing. First we just pack the rice...\""
1601403-91 = "Yep! There you go! Good job!"
1601403-92 = "Ibuki will make an extra big one for Sensei!"
1601403-93 = "And..."
1601403-98 = "All done!"
1601403-99 = "[s] \"They look really good! Can I try one?\""
1601403-100 = "No! Bad! We're going to eat it at the amusement park tomorrow!"
1601403-101 = "So be patient and wait for tomorrow's picnic!"
1601403-104 = "But the next day..."
1601403-110 = "Hm..."
1601403-111 = "It doesn't look like the rain's gonna stop... But Ibuki wanted to go to the amusement park with Sensei..."
1601403-112 = "Ibuki wanted to ride the merry-go-round, and watch parades, and eat lunch, and—"
1601403-116 = "Ughhhh... *sniffle*..."
1601403-117 = "[s] \"...Ibuki!\""
1601403-118 = "Y-Yeah?"
1601403-122 = "Huh? Sensei, why are you laying a picnic mat on the floor?"
1601403-123 = "[s] \"Ibuki. The moment I laid down this picnic mat, we were teleported to an amusement park.\""
1601403-125 = "[ns] \"Now then, Ibuki! Welcome to Schale Park!\""
1601403-126 = "...Schale Park?"
1601403-127 = "[s9] \"We can't go to Galactic Studio...\"\n[s10] \"So how about we make Schale our amusement park for the day!\""
1601403-130 = "Schale...as an amusement park?"
1601403-131 = "[s11] \"Exactly! Now then, shall we begin our amusement park picnic?\"\n[s12] \"Ready for lunch, Ibuki?\""
1601403-134 = "So Ibuki just takes her shoes off and sits on the picnic mat?"
1601403-139 = "Wow! It really does feel like a picnic!"
1601403-140 = "[s] \"Hungry, Ibuki?\""
1601403-141 = "You bet, Sensei!"
1601403-148 = "Here, let's have the onigiri we made!"
1601403-152 = "..."
1601403-153 = "[s] \"...Did it get ants on it?\""
1601403-154 = "...No but... Is this really okay?"
1601403-155 = "[s] \"What do you mean by okay?\""
1601403-156 = "But, Ibuki made this onigiri to eat at Galactic Studio."
1601403-157 = "Sensei, are you sure you want to eat it at...Schale Park?"
1601403-158 = "[s13] \"Yeah. It doesn't matter where you eat. It's who you get to eat with.\"\n[s14] \"We both worked hard to make this meal, right?\""
1601403-161 = "..."
1601403-162 = "Yeah! You're right!"
1601403-163 = "As long as Ibuki's with Sensei, Ibuki can eat anywhere!"
1601403-165 = "Ibuki and I enjoyed a lovely afternoon playing with all the toys and games \"Schale Park\" had to offer."

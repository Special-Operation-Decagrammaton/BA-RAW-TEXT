[translation]
1601403-1 = "跟伊吹一起去郊遊！"
1601403-2 = "嗨，老師！伊吹不在的期間過得還好嗎？"
1601403-3 = "[s1]「伊吹不在的時候很寂寞……」\n[s2]「我一直都在等伊吹……」"
1601403-6 = "啊，那樣不行哦！"
1601403-7 = "真琴前輩說自己一個人的時候也要堅強一點。"
1601403-8 = "雖然真琴前輩還是一直待在伊吹身邊就是了。嘿嘿。"
1601403-9 = "總之老師，既然伊吹已經來了，應該已經沒事了吧？"
1601403-10 = "[s]「當然！為了表示歡迎，我準備了布丁！」"
1601403-11 = "哇啊！謝謝！"
1601403-12 = "[s]「那我們去休息室吃吧？」"
1601403-13 = "嗯！"
1601403-15 = "我要開動囉！"
1601403-22 = "為了因日常生活而疲憊的各位準備的天堂！"
1601403-26 = "歡迎各位來到奇普托斯最棒的遊樂園「Unique Studio Kivotos」！"
1601403-27 = "請在這裡和家人、朋友一起享受愉快的時光吧！"
1601403-28 = "……"
1601403-29 = "[s]「伊吹，布丁掉了哦。」"
1601403-30 = "……"
1601403-34 = "[ns]「……伊吹，要不要去遊樂園？」"
1601403-35 = "咦！？真的嗎！？可以去嗎？"
1601403-36 = "啊，但是遊樂園…… "
1601403-37 = "真琴前輩說……只有特別的日子可以去……"
1601403-38 = "[s]「伊吹來到夏萊就是特別的日子了！沒問題！」"
1601403-42 = "好，我要去！"
1601403-43 = "伊吹想去遊樂園！"
1601403-44 = "和老師一起搭旋轉木馬，還有看遊行！"
1601403-45 = "[s3]「那肯定要去吧！」\n[s4]「現在開始準備，明天就去吧？」"
1601403-48 = "哇啊！老師最棒了！"
1601403-49 = "那……要先買入場券，還要準備去那邊吃的便當對吧？"
1601403-50 = "[s]「老師會負責預購，不用擔心。」"
1601403-51 = "那便當就由伊吹準備吧！我有信心！"
1601403-52 = "現在去買材料吧，老師！"
1601403-55 = "便當的菜單就選伊吹喜歡吃的東西吧！"
1601403-62 = "小熊軟糖、橘子糖果、焦糖……還有當點心的布丁！"
1601403-63 = "[s5]「啊，伊吹，這樣當然也不錯……」\n[s6]「便當要不要準備飯糰呢？」"
1601403-66 = "嗯！飯糰也不錯！"
1601403-67 = "伊吹製作的飯糰也被伊呂波前輩稱讚過，老師一定也會喜歡的！"
1601403-68 = "[s]「真的嗎？我可以期待一下嗎？」"
1601403-69 = "嗯！請好好期待！"
1601403-71 = "（和伊吹買完便當材料後，回到了夏萊的料理室）"
1601403-73 = "我要開始準備便當囉，老師。"
1601403-78 = "好，先把飯揉成一團，在裡面加入小熊軟糖後捏一捏……"
1601403-79 = "[s]「小，小熊軟糖！？」"
1601403-80 = "嗯！這是小熊軟糖飯糰！#n伊吹之前做的時候，伊呂波前輩也說非常好吃！"
1601403-81 = "[s7]「果然是那樣嗎……！」\n[s8]「那個……老師的不要放軟糖，改放梅子可以嗎？伊吹！」"
1601403-84 = "老師喜歡那種嗎？我知道了！"
1601403-89 = "鏘！完成了！老師也來試試看吧！"
1601403-90 = "[s]「把飯揉成一團……」"
1601403-91 = "嗯！這樣就對了！老師做得很棒！"
1601403-92 = "伊吹會特別幫老師捏大一點的飯糰！"
1601403-93 = "好……"
1601403-98 = "完成了！"
1601403-99 = "[s]「看起來真的很好吃！可以先吃一口嗎？」"
1601403-100 = "啊！不行！這是明天要去遊樂園吃的！"
1601403-101 = "要忍耐，等明天和伊吹一起去郊遊哦！"
1601403-104 = "（隔天……）"
1601403-110 = "嗚嗚……"
1601403-111 = "雨看起來不會停的樣子……明明和老師約好要去遊樂園了……"
1601403-112 = "好想和老師一起搭旋轉木馬，還有看遊行隊伍，然後一起吃便當……"
1601403-116 = "嗚，嗚嗚……（啜泣）"
1601403-117 = "[s]「……伊吹！」"
1601403-118 = "咦？"
1601403-122 = "老師？為什麼要鋪地墊呢？"
1601403-123 = "[s]「伊吹，只要鋪上地墊，這裡就變成遊樂園了哦。」"
1601403-125 = "[ns]「伊吹！歡迎來到夏萊遊樂園！」"
1601403-126 = "……夏萊遊樂園？"
1601403-127 = "[s9]「雖然沒辦法去『Unique Studio Kivotos』……」\n[s10]「但今天，夏萊會變成一天限定的遊樂園哦！」"
1601403-130 = "夏萊……遊樂園？"
1601403-131 = "[s11]「嗯！所以從現在開始，要和伊吹一起去遊樂園郊遊！」\n[s12]「我們先吃便當吧？」"
1601403-134 = "在夏萊待客室鋪上地墊……然後脫鞋子走上去……？"
1601403-139 = "哇！這樣就像是真正的郊遊一樣！"
1601403-140 = "[s]「嗯，伊吹也趕快過來吧。」"
1601403-141 = "嗯，老師！"
1601403-148 = "來，這是為老師準備的飯糰！"
1601403-152 = "……"
1601403-153 = "[s]「有什麼在意的事嗎？」"
1601403-154 = "……這樣真的沒關係嗎？"
1601403-155 = "[s]「你指的是……？」"
1601403-156 = "這個大飯糰，是為了去「Unique Studio Kivotos」吃才做的。"
1601403-157 = "在夏萊遊樂園吃沒關係嗎，老師？"
1601403-158 = "[s13]「嗯，重要的不是在哪裡吃，而是和伊吹一起吃。」\n[s14]「這是老師和伊吹一起努力製作的便當，不是嗎？」"
1601403-161 = "……"
1601403-162 = "嗯！說的也是！"
1601403-163 = "只要是伊吹和老師一起吃，不管在哪裡吃都沒關係！"
1601403-165 = "（之後和伊吹在「夏萊遊樂園」一起玩遊戲和玩具，度過了愉快的午後時光）"

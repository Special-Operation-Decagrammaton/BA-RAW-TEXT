[translation]
62010-1 = "第1話;無名的公益活動"
62010-3 = "對救護的直覺，指引我們來到了這裡！"
62010-8 = "那到底是什麼意思！？"
62010-9 = "[s]「不……有可能。如果是美禰的話，確實有可能……」"
62010-10 = "怎麼回事……老師認識這些人嗎？#n我有點搞不清楚狀況。"
62010-15 = "啊，前輩！那些人是──"
62010-16 = "[s]「！？！？」"
62010-18 = "[ns]「先，先等一下！」"
62010-28 = "[ns]「大家都到齊了嗎？」"
62010-29 = "是，是的……"
62010-30 = "唔，嗯。雖然不知道發生了什麼事……"
62010-31 = "您不必那麼急著拉住我的手，只要跟我說一聲就……"
62010-32 = "所以有什麼事嗎，老師？"
62010-33 = "就是說呀！我還是第一次看到老師露出那種表情呢。#n如果發生了什麼可怕的事，花繪會為老師加油的！"
62010-34 = "[s]「首先……」"
62010-39 = "我們知不知道……這些學生是誰？"
62010-46 = "他們……是救護騎士團吧。"
62010-47 = "三一的……"
62010-48 = "救護騎士團的各位，你們好。#n自從第4聖所那次之後，就沒再見過面了對吧？"
62010-49 = "是，是的……小隊的各位都還好嗎？#n那個時候，實在有點暈頭轉向的……"
62010-50 = "我記得還有一位服裝很厲害的修女……他今天沒一起來啊。"
62010-52 = "櫻子大人是修女會所屬的──"
62010-57 = "櫻，櫻子大人現在正好有點忙！#n那，那個……為了準備考試！"
62010-59 = "原，原來如此……就是那場「考試」對吧……"
62010-63 = "咦……？#n那各位……不用準備考試嗎？"
62010-64 = "那個，就是……"
62010-69 = "要說伸出救護之手一事，就和考試同樣重要也不為過！"
62010-70 = "我深信在場的各位，都能同時兼顧救護與考試。"
62010-71 = "從某種角度來說，這也是一種救護的精神。"
62010-72 = "況且我在模擬考試中拿到的成績，也從來不曾掉到一級以下。"
62010-73 = "[s]「真厲害。不愧是美禰。」"
62010-77 = "謝，謝謝老師……"
62010-78 = "[s1]「我有件事想拜託在場的各位幫忙。」\n[s2]「希望大家能隱瞞救護騎士團和三一的事。」"
62010-84 = "為什麼呢？"
62010-85 = "是啊。這實在有些奇怪。#n既然行走在救護之路上，何必特意隱瞞呢……"
62010-92 = "團長？暫時就先照老師說的去做吧。"
62010-93 = "咦？為什麼呢，前輩？#n我們不是為了幫助這些人才來這裡的嗎？"
62010-94 = "那，那個……就是為了達成目的，我們才更有必要隱藏救護騎士團的身分！"
62010-95 = "是嗎……？"
62010-96 = "沒，沒錯！那個，經典裡不是也有記載嗎？#n「不要讓左手知道右手做了什麼」之類的句子！"
62010-97 = "雖然那句話基本上是正確的，但是跟救護騎士團相比，好像更適合用在修女會……"
62010-98 = "老師一定有他的用意的！"
62010-102 = "既然如此……我明白了。#n就這麼做吧，老師。"
62010-103 = "[s]「謝謝你，芹奈！這種時候果然還是芹奈最棒了！」"
62010-107 = "咦？謝謝老師。#n耶嘿嘿……"
62010-109 = "……雖然有點難以接受，但我理解老師的意思了。"
62010-110 = "不過就我個人而言，還是認為這種時候更應該廣泛傳播救護的精神……"
62010-111 = "向奧利斯的各位傳遞我們的真心就是了……"
62010-112 = "[s]「真的拜託了……好嗎？」"
62010-113 = "我明白了。既然這是老師的意思……"
62010-117 = "那麼在這裡的期間，我會盡量避免提到敝校和救護騎士團的。"
62010-118 = "[s]「其他人也都沒問題吧？」"
62010-128 = "沒，沒問題……"
62010-129 = "那個，我想向團長提出一個提議……"
62010-130 = "在這裡的期間……要不要改用「前輩」來稱呼團長呢？"
62010-131 = "畢竟光是團長這個稱呼，就可能會讓人聯想到組織。"
62010-132 = "咦？但是……"
62010-133 = "……不，這麼說也有道理。"
62010-134 = "各位，能麻煩用新的稱呼來叫我嗎？"
62010-135 = "好的！美禰團……前輩！"
62010-139 = "美禰……前輩……"
62010-140 = "那麼我也……美禰前輩……"
62010-144 = "對，對不起！這個稱呼僅限於待在這裡的期間而已！#n希望沒有冒犯到團長！"
62010-145 = "沒，沒事的。"
62010-146 = "而且有種親近的感覺……或許這樣反而更好。"
62010-151 = "看來大致都談好了，那麼我來統整一下。"
62010-152 = "救護騎士團……#n不對，是「無名的善意公益服務團體」為了宣揚救護的精神而來到了奧利斯分校。"
62010-153 = "目前這個認知是一致的吧？"
62010-154 = "嗯，謝謝你為大家整理。沙織同學。#n不過小隊的各位也同樣是奧利斯的學生對吧……"
62010-155 = "我們這樣做……沒關係嗎……？"
62010-156 = "沒事的，芹奈同學。#n如果問我們是否所屬於奧利斯的話，答案固然是肯定的……"
62010-157 = "……"
62010-158 = "只是現在……處於有點格格不入的狀態。"
62010-160 = "……要是只有這種程度也算幸運了吧。"
62010-161 = "雖然不是很懂，不過算是順利解決了吧？真是太好了！"
62010-162 = "呵呵，你是花繪同學對吧？#n總是充滿活力，感覺真好呢。#n往後請多關照囉？"
62010-163 = "嗯！"
62010-164 = "……"
62010-165 = "芹奈同學？可以把花繪同學暫時借給我們嗎？#n感覺只要看著他就能打起精神來……作為交換，我們也把日和給你。"
62010-167 = "什，什麼！？"
62010-168 = "咦咦咦！？！？"
62010-169 = "……"
62010-170 = "那，那就請兩位多多關照了。#n芹奈同學、美禰同學……"
62010-171 = "老，老師？請問這也是另一種……救護的方式嗎？"
62010-173 = "咦？那我接下來該怎麼辦呢？"
62010-174 = "抱歉抱歉，我剛才是開玩笑的。#n因為花繪同學實在太開朗又直爽了，一時沒忍住就……"
62010-176 = "原，原來是這樣啊……#n不過說的也是，花繪醬的確像是早晨的牽牛花一樣呢。"
62010-177 = "耶嘿嘿。我就知道只是在開玩笑而已……"
62010-182 = "嗚嗚嗚……"
62010-183 = "[s]「……還好嗎？」"
62010-184 = "有種精力都被吸走了的感覺……"
62010-185 = "[s]「我懂那種感覺……」"
62010-189 = "[ns]「那麼，大家接下來打算怎麼做呢？」"
62010-194 = "您問到重點了呢，老師。"
62010-195 = "想要宣揚救護的精神，就必須要有一個據點。"
62010-199 = "救護騎……不，我們這個無名的公益服務團體，將從設置救護所開始展開行動！"
62010-204 = "臨時救護所"
62010-206 = "辛苦了！美禰前輩，還有老師！"
62010-207 = "老師和美禰前輩，兩位都辛苦了。"
62010-208 = "前輩……"
62010-212 = "覺得設置的速度很快？#n因為我們已經很熟練了呀！"
62010-217 = "你好，老師。#n還有……"
62010-224 = "……"
62010-225 = "各位「志工」。"
62010-229 = "你，你好。#n你是這裡的……學生會長，對吧？"
62010-230 = "不，我還不到能以那種身分自稱的程度。#n畢竟這裡可是奧利斯啊。"
62010-231 = "不好意思。#n我們對那種事不是很瞭解……"
62010-236 = "咦……？"
62010-237 = "……？"
62010-240 = "（好不容易才阻止了正打算說出什麼的兩人……）"
62010-243 = "所以你們對於要做志願服務的地方一無所知，只是順著感覺來到了這裡？"
62010-244 = "那，那是……！"
62010-245 = "……"
62010-246 = "正是如此。請問有什麼問題嗎？"
62010-247 = "團，團長……前輩！？"
62010-248 = "問題……倒也不至於。#n只是在不知道會遇到什麼危險，也不知道會發生什麼的情況下……"
62010-249 = "只因為「看起來可憐」就貿然闖進來……#n為了自我實現做到這個地步……"
62010-250 = "從某種層面上來說，讓我覺得你們非常勇敢而已。"
62010-251 = "還以為你打算說什麼，原來不是什麼難懂的話題啊。"
62010-255 = "什麼？"
62010-256 = "這一切都只是因為「救護」不夠而已！"
62010-257 = "你說……救護？"
62010-258 = "若是救護不夠就投入更多救護──不僅只於足夠而已，而是要多到滿溢而出。"
62010-259 = "極盡所能減少受苦之人──哪怕只有一個也好！"
62010-260 = "這正是進行救護活動……以及志願服務時的基本心態！"
62010-261 = "在這樣的心態面前，其餘的附帶條件都只是微不足道的問題罷了！"
62010-263 = "啊，啊哈哈……"
62010-264 = "不愧是前輩！"
62010-269 = "……"
62010-270 = "果然和傳聞中一樣，是群相當了不起的人呢。"
62010-275 = "（傳聞中……！？）"
62010-279 = "三一救護騎士團的各位。"
62010-280 = "[s]「！？！？」"
62010-281 = "咦，咦咦！？不是的！#n我們，那個，我們是……！"
62010-282 = "哈哈。不必掩飾得那麼辛苦。"
62010-283 = "我又不是別人，怎麼可能會察覺不到「三一」的氣息呢。"
62010-284 = "……"
62010-285 = "這種麻煩的戲碼就到此為止吧。#n繼續長篇大論下去，對我們彼此都沒好處。"
62010-286 = "既然你們自稱無名的志願服務社團，並打算將這個身分貫徹到底……"
62010-287 = "那麼只要不超出志願服務的範圍，也不侵犯到奧利斯……我可以承諾不把事情鬧大。"
62010-288 = "然而，如果在這裡的各位是「茶會」或「修女會」的走狗，事情就得另當別論了。"
62010-289 = "雖然據我所知，救護騎士團在三一之中也算是相當特立獨行的社團就是了。"
62010-290 = "你……還真清楚呢。"
62010-291 = "不敢當。"
62010-292 = "況且……我們本來不都出自同一所學園嗎？"
62010-293 = "……！"
62010-294 = "總之結論就是這樣。#n只要各位保守祕密，我也會對此事保持沉默。"
62010-295 = "可以答應我嗎？"
62010-301 = "如果這就是你的條件的話……我明白了。"
62010-302 = "感謝各位。"
62010-303 = "話說救護騎士團的團長似乎沒有親自到場呢？#n雖然這也沒什麼好奇怪的。"
62010-304 = "身為大型社團的代表，的確不太可能每個活動都親自參與。#n畢竟人只有一個身體嘛。"
62010-305 = "！？"
62010-306 = "咦？其實……"
62010-307 = "沒，沒錯！團長現在正忙著進行其他的救護活動！#n所以這次的事情才會拜託我們來進行！啊哈哈哈……"
62010-308 = "那個……是，是的。#n就當作是……不，確實就是這樣。"
62010-312 = "嗯？這樣啊……我明白了。#n在我個人看來，這或許算是值得慶幸的一件事吧。"
62010-316 = "在我聽見的傳聞之中，那位團長似乎是個……#n只要自認正確就會一股腦地向前衝，將一切阻礙全部破壞的人對吧？"
62010-317 = "那樣的人出現在這種敏感場合會發生什麼……我實在不敢想像。"
62010-321 = "你好像……有點誤會了。"
62010-322 = "救護騎士團的團……團長大人他，只是願意為了宣揚救護精神犧牲一切而已……！"
62010-323 = "哈哈哈。這種人通常都會被稱為不知變通的死腦筋吧？"
62010-324 = "還請……留意一下自己的用詞。#n那位僅僅憑藉堅定的意志，武裝自己之人的決心……"
62010-325 = "如此輕率地出言貶低……對於不在場的他而言，實在有些失禮吧。"
62010-326 = "……看來救護騎士團的成員之間，確實存在深厚的信賴與尊敬呢。"
62010-327 = "我明白了。這個話題就到此為止吧。"
62010-328 = "要是再繼續待下去，恐怕會妨礙到各位的「志願服務」……我就先告辭了。"
62010-329 = "如果需要什麼幫助的話……歡迎隨時來找我，不必客氣。"
62010-335 = "美，美禰前輩……"
62010-336 = "美禰前輩……"
62010-338 = "……"
62010-339 = "我沒事的。芹奈、花繪。#n這種時候，我們才更應該專注於救護活動……"
62010-342 = "是，是……"
62010-347 = "不過在那之前……可以讓我稍作休息嗎？#n真是不好意思。"
62010-352 = "當然可以！請不必擔心！#n花繪醬，可以幫我一下嗎？我們一起把那邊的箱子搬到外面。"
62010-353 = "是！儘管交給我吧！"
62010-358 = "……"
62010-359 = "[s]「你還好嗎……？」"
62010-363 = "那當然。我……"
62010-364 = "……"
62010-365 = "不。試圖對老師有所隱瞞也沒什麼意義吧。"
62010-369 = "面對那無窮無盡、只能勉強壓抑的怒火……究竟該如何是好呢？"
62010-370 = "[s]「……那是你所感受到的情緒嗎？」"
62010-371 = "……是的。"
62010-372 = "從理性的角度來看──"
62010-373 = "我認為這也同樣是救護的一環。"
62010-374 = "包含承受長久以來始終待在這裡的……那些人的憎恨在內。"
62010-381 = "然而若是那些情緒永遠停滯不前，什麼都不會改變。"
62010-382 = "……一旦缺少了改變，單方面的救護終究會失去意義。"
62010-383 = "雖然這只是我個人的看法……#n說服這件事，只會對準備好被說服的人起作用。"
62010-384 = "因為有些人──明明迫切希望有人能阻止自己，卻始終向著極限不斷突進。"
62010-388 = "……老師？您沒事吧？#n您的臉色看起來有點……"
62010-389 = "[s3]「……無論我怎麼想，都覺得那時候的自己沒能做好。」\n[s4]「應該要繼續照顧他們直到最後的。」"
62010-392 = "……"
62010-393 = "請別這麼說，老師。#n老師已經盡力了。這點我可以向您保證。"
62010-394 = "不過這次的事……"
62010-395 = "在身為救護騎士團之前，我們也是三一的一員。#n要是自認為能夠理解奧利斯的各位的心情──"
62010-396 = "恐怕只會引起奧利斯的眾怒吧。"
62010-397 = "或許說出「理解」這兩個字，本身就是一種傲慢也說不定。"
62010-402 = "不過即便如此，我依然願意相信──我們終究能夠互相理解。"
62010-403 = "哪怕只有些微的可能性……#n唯有秉持著這樣的信念並付諸行動，我們才有機會迎來更好的明天。"
62010-404 = "但是……"
62010-405 = "[s]「我好像是第一次看到美禰這麼疲憊的樣子。」"
62010-406 = "呵呵，是嗎？"
62010-407 = "在我看來……老師似乎也和平時不太一樣。"
62010-412 = "那個，老師？#n身為老師的學生……我有件事想請教老師。"
62010-413 = "在最深、最底層的深淵之中……#n是什麼支撐著人們……讓人不至於徹底倒下呢？"
62010-414 = "[s]「……」"
62010-417 = "老師，你知道嗎。"
62010-418 = "如果有個人……"
62010-422 = "真的真的真的……想要放棄自己的人生的話。"
62010-423 = "該怎麼做才能阻止那個人呢？"
62010-426 = "[ns]「我想……應該是那個人相信的事物吧。」"
62010-427 = "相信的事物……是嗎？"
62010-428 = "呵呵，有點讓人意外呢。#n我原本以為老師您……"
62010-429 = "會說無論面對什麼樣的試煉，都要以理性的方式面對……這類的話呢。"
62010-430 = "[s5]「因為有些事情並不是那樣運作的。」\n[s6]「驅使人們展開行動的，終究是情感與信念。」"
62010-435 = "[ns7]「無論那是對某種偉大存在的信仰……」\n[ns8]「還是對自己內心深處某種感覺的信賴。」"
62010-438 = "您說情感這種東西，會從意識深處奔湧而出……"
62010-439 = "因此能夠立即觸發反應，幫助人們迅速做出判斷……？"
62010-440 = "或許情感並不是束縛人們的枷鎖，而是讓人更加忠於自身的可能性……？\n成為更直覺、更自發的存在……？"
62010-441 = "原來如此……這確實是一道「課程」呢。"
62010-442 = "……"
62010-443 = "[s9]「所以，如果你相信自己至今為止──」\n[s10]「並沒有走在錯誤的道路上的話……」"
62010-446 = "就應該堅守原本的方向……是嗎？"
62010-447 = "可是那條路究竟是否正確……誰也無法確定不是嗎？"

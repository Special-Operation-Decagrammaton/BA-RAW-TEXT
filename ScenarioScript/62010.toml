[translation]
62010-1 = "Episode 1;Anonymous Community Service"
62010-3 = "The sound of someone in need of aid called to us, so we marched towards it in accordance with our duty!"
62010-8 = "That doesn't even make sense!"
62010-9 = "[s] \"No... It does. When it comes to Mine, it does.\""
62010-10 = "What? You know them? I've never met them in my life."
62010-15 = "Ah, Subaru! They're—"
62010-16 = "[s] \"?!?!\""
62010-18 = "[ns] \"H-Hold on!\""
62010-28 = "[ns] \"Is everyone here?\""
62010-29 = "Y-Yes..."
62010-30 = "Here. But...what was the purpose of that?"
62010-31 = "Yes, please enlighten me. Rather than so brashly taking hold of my hand, you may simply explain..."
62010-32 = "What seems to be the issue, Sensei?"
62010-33 = "That was a super-scary face you made there! Do you need Hanae to cheer it away? Teehee!"
62010-34 = "[s] \"To start...\""
62010-39 = "Do I know...these people?"
62010-46 = "Yeah. They're the Remedial Knights."
62010-47 = "Trinity's Remedial Knights."
62010-48 = "A pleasure, Knights. I believe this is our first meeting since our encounter in the Fourth Sanctum."
62010-49 = "Th-That sounds about right. Aha! What a hectic day, wasn't it? Um, has the Squad been well?"
62010-50 = "That reminds me, where's that one nun? The one with the intense outfit?"
62010-52 = "Sakurako is busy with her duties as the Sisterhood's—"
62010-57 = "Sh-She's busy with testing! I mean, studying for tests!"
62010-59 = "A-Aha... That test..."
62010-63 = "Huh...? But doesn't that mean...you all should be studying too?"
62010-64 = "So, what happened is—"
62010-69 = "Holding out a hand in aid to those in need should not fall to the wayside simply because it is exam season!"
62010-70 = "I stake my honor that our brave Remedial Knights will emerge unscathed from both aid and exam! "
62010-71 = "This is the very embodiment of aid!"
62010-72 = "And, most significantly, I currently reign undefeated in the rankings for practice exams."
62010-73 = "[s] \"That's actually incredible. You're amazing, Mine.\""
62010-77 = "Th-Thank you, Sensei..."
62010-78 = "[s1] \"That said, I have a request for everyone here.\"\n[s2] \"Don't talk about Trinity or the Remedial Knights here.\""
62010-84 = "Wh-Why would we need to do that?"
62010-85 = "I am in agreement. To lay a veil of subterfuge over our righteous path of aid..."
62010-92 = "Captain? I actually think what Sensei is saying makes sense."
62010-93 = "You do? But are we not here to aid these beleaguered students?"
62010-94 = "You see... If we don't hide the fact we're Remedial Knights, it'll, um... It'll cause thorny vines to grow all over our path of aid!"
62010-95 = "Is that...so?"
62010-96 = "Y-Yes! It's also written in scripture, right? Something like, \"Do not let your left hand know what your right hand is doing!\""
62010-97 = "While I harbor no objections to the veracity of the statement, is the sentiment not more fitting of the Sisterhood?"
62010-98 = "I think Sensei must have a really good reason for it!"
62010-102 = "I see. I shall place my trust in your judgment. Sensei, we shall cooperate with your request."
62010-103 = "[s] \"Thank you! And you really are the best, Serina!\""
62010-107 = "M-Me? Eheehee. Thank you."
62010-109 = "...I understand. While my heart still finds itself unwilling, I have gleaned your intentions."
62010-110 = "However, times like these are precisely when one must be willing to take the stage and proudly promulgate our message of aid!"
62010-111 = "We need only conduct ourselves with sincerity, and Arius shall respond in kind."
62010-112 = "[s] \"I'm begging you... Please?\""
62010-113 = "I have given you my word. And it is my pleasure to heed Sensei's request."
62010-117 = "While here, neither word of the Remedial Knights nor Trinity shall pass our lips."
62010-118 = "[s] \"Is everyone else okay with that?\""
62010-128 = "Y-Yes..."
62010-129 = "So, that said... Captain...?"
62010-130 = "While we're here, do we have permission to call you just...Mine?"
62010-131 = "It may raise suspicion if we were to call you \"Captain.\""
62010-132 = "Pardon? However..."
62010-133 = "...No. It indeed would be a strange address in this setting. Then, I suppose..."
62010-134 = "P-Please go ahead, then."
62010-135 = "Yes! Ca— Mine!"
62010-139 = "\"Mine\"..."
62010-140 = "I can do that, Mine..."
62010-144 = "M-My apologies! I mean no offense! It's only due to the current circumstances!"
62010-145 = "N-Not at all."
62010-146 = "In fact, I find it rather pleasing. \"Mine.\" Does it not make me sound like a rather normal, approachable student?"
62010-151 = "Sorry for interrupting, but if we're all ready, then."
62010-152 = "The Remedial Knights... No, an anonymous community service club is visiting Arius to spread their message of aid."
62010-153 = "Understood, everyone?"
62010-154 = "Understood! While we really appreciate all of this, I was just wondering..."
62010-155 = "Are you and the rest of the Squad members...okay with this?"
62010-156 = "There's no need to worry, Serina. If anyone were to ask us where we were from, we would respond, \"Arius.\" Without question."
62010-157 = "..."
62010-158 = "But the reality is, we're somewhere in between."
62010-160 = "...Even that's being generous."
62010-161 = "Hmmm... So everyone's happy now, right? Yay! I'm so glad!"
62010-162 = "Fufu. It's always a pleasure to be around someone so exuberant. I look forward to working with you."
62010-163 = "Me too!"
62010-164 = "..."
62010-165 = "Having Hanae with us would be akin to taking an energy pill.  Why don't we trade, Serina? You could have...Hiyori in her stead."
62010-167 = "Wh-What?!"
62010-168 = "WHAAAT?! "
62010-169 = "..."
62010-170 = "N-Nice to meet you, Serina, Mine..."
62010-171 = "S-Sensei? Could we consider this proposition...a form of aid?"
62010-173 = "Eh? Where am I going?"
62010-174 = "Apologies, truly. Hanae was simply so bright, I couldn't help but poke fun."
62010-176 = "A-Ah! I understand now. Hanae really is like a morning glory bloom, isn't she?"
62010-177 = "Eheehee. I knew it was a joke the whole time... Definitely..."
62010-182 = "Ugh..."
62010-183 = "[s] \"...You okay?\""
62010-184 = "I feel a little drained..."
62010-185 = "[s] \"I know that feeling...\""
62010-189 = "[ns] \"So, what now?\""
62010-194 = "Excellent question, Sensei."
62010-195 = "To begin, we must lay down a foundation from which the spirit of aid will burst forth."
62010-199 = "The Rem... No. The Anonymous Community Service Club's first mission shall be to establish an infirmary!"
62010-204 = "Temporary Infirmary"
62010-206 = "Good work, Mine! And Sensei too!"
62010-207 = "Good work, Sensei. You too, Mine."
62010-208 = "\"Mine\"..."
62010-212 = "That went faster than you thought it would? Duh! This is our specialty!"
62010-217 = "Hello, Sensei. And..."
62010-224 = "..."
62010-225 = "Hello, \"volunteers.\""
62010-229 = "H-Hello. Are you the...student council president here?"
62010-230 = "We don't have those kinds of designations and titles here."
62010-231 = "I'm sorry. We're not fully familiar with how things are done here yet..."
62010-236 = "We're not...?"
62010-237 = "Pardon...?"
62010-240 = "I barely stopped the two from saying more..."
62010-243 = "So you mean to say you picked this place, of all places, to come volunteer, without doing any research or having any particular reason?"
62010-244 = "Th-That's...!"
62010-245 = "..."
62010-246 = "Yes, it is as you say. Do you find fault with that?"
62010-247 = "C-Cap—Mine?!"
62010-248 = "I wouldn't go that far, but you have no idea what dangers could lie ahead."
62010-249 = "Despite that, you came all the way here to help the pitiable for your own self-satisfaction."
62010-250 = "In a way, it's mind-bogglingly brave."
62010-251 = "Ah, I presumed your objections were of a more complicated nature. For my response is quite simple."
62010-255 = "Hm?"
62010-256 = "You suffer from a lack of aid!"
62010-257 = "\"Aid\"...?"
62010-258 = "As I said! And the only cure is to respond with a tsunami of aid!"
62010-259 = "And if, through our efforts, we may reduce the number of people suffering by even one, then we cannot surrender!"
62010-260 = "That is the essence of aid...and community service!"
62010-261 = "All else falls to the wayside!"
62010-263 = "Aha...haha..."
62010-264 = "That's incredible, Mine!"
62010-269 = "..."
62010-270 = "Indeed, \"incredible.\" Just as I've heard."
62010-275 = "(As she's heard?!)"
62010-279 = "Yes. I've heard a lot about Trinity's Remedial Knights."
62010-280 = "[s] \"What did you say?!?!\""
62010-281 = "Th-The Remedial Knights? Hah! Ahaha! That's definitely not us three! We're...the...Medial Soldiers...?"
62010-282 = "Haha. I appreciate the effort, but you can drop the act."
62010-283 = "Did you really think you could slip some Trinity students past me, of all people?"
62010-284 = "..."
62010-285 = "Now, I'm sure no one wants to drag this out, so let's get to the point."
62010-286 = "Just stick to your gimmick as some community service club who came to help."
62010-287 = "Stay in your lane, and I'll allow...this."
62010-288 = "Just know, we would be having an entirely different conversation if this were the Tea Party or the Sisterhood."
62010-289 = "But I do know that the Remedial Knights is a bit of an oddball club in Trinity."
62010-290 = "You...know all of that?"
62010-291 = "It was nothing."
62010-292 = "We were one academy once, weren't we?"
62010-293 = "...!"
62010-294 = "Well, that's that. Keep your heads down, and your mouths shut, and I'll give you a pass."
62010-295 = "Are we all in agreement?"
62010-301 = "...Understood. We agree to your conditions."
62010-302 = "Thank you."
62010-303 = "But the Remedial Knights captain didn't come with you all? Well, I guess that makes sense."
62010-304 = "There's only one of her, after all. Running a huge club like that must make it difficult to participate in its activities."
62010-305 = "?!"
62010-306 = "Huh? That's..."
62010-307 = "R-Right! Our captain is currently providing aid to others in need! That's why she sent us! Aha...haha..."
62010-308 = "Yes. That is...correct. Essentially."
62010-312 = "Okaaay... Well, anyways, I'm glad to hear that."
62010-316 = "I've heard things about her too. She's a militant leader who bulldozes anything and anyone in her way."
62010-317 = "Could you imagine if someone like THAT were to come HERE?"
62010-321 = "...I must interrupt. You seem to harbor a misunderstanding here. "
62010-322 = "The Remedial Knights captain is someone who has dedicated her very life and soul to the mission of spreading aid!"
62010-323 = "Hahaha. Here, we just call someone like that an ignorant blockhead."
62010-324 = "Have care with your words, please. She conducts herself with sincerity and unwavering resolve."
62010-325 = "To denigrate her efforts and character so flippantly..."
62010-326 = "...You Remedial Knights really do trust and respect each other, don't you?"
62010-327 = "Understood. Let's move on then."
62010-328 = "My presence is just going to distract from your \"community service,\" so I'll be stepping out."
62010-329 = "If something comes up, um... Well, call me. "
62010-335 = "M-Mine..."
62010-336 = "Mine..."
62010-338 = "..."
62010-339 = "Worry not, Serina, Hanae. This is ever more reason to wholly dedicate ourselves to our mission."
62010-342 = "Y-Yes..."
62010-347 = "However, before that, I shall retire for a short rest. My apologies."
62010-352 = "Of course! Take your time, please! Hanae, why don't we go move those boxes outside in the meantime?"
62010-353 = "Okie-dokie! Leave it to me!"
62010-358 = "..."
62010-359 = "[s] \"Hey. You okay?\""
62010-363 = "Naturally. I..."
62010-364 = "..."
62010-365 = "I suppose attempting to conceal this from you is a fool's errand."
62010-369 = "When one is faced with such bottomless fury, seething just beneath the surface... What is the proper recourse one could provide?"
62010-370 = "[s] \"...Is that what you felt?\""
62010-371 = "...Yes."
62010-372 = "These are the thoughts that stayed my tongue."
62010-373 = "The proper recourse... That in itself is offering aid."
62010-374 = "To receive the hatred of those who have resided here all this time."
62010-381 = "If that alone could dissipate it, I would receive it again and again. However, they remain steadfast in that boiling pot of hatred."
62010-382 = "...Aid is communication. A relationship. If I reach out my hand, and it is rejected, how can that be aid?"
62010-383 = "Perhaps my belief here is a cynical one, however. You cannot hope to persuade someone who does not at least hold open the door to allow you to peer in."
62010-384 = "I have seen it before. People who board up the entryway entirely, all while praying that someone with the strength to tear down their barricades entirely will one day come knocking."
62010-388 = "...Sensei? Is something troubling you? Are you injured?"
62010-389 = "[s3] \"I've thought about it again and again, but I should've handled things properly back then.\"\n[s4] \"I never should have left things the way I did, or as soon as I did.\""
62010-392 = "..."
62010-393 = "Hindsight is often our greatest critic. You cannot diminish what you have done for this place, and for us, with perceived mistakes and faults."
62010-394 = "However, regarding this situation..."
62010-395 = "To them, we are of Trinity, therefore we are of the Remedial Knights."
62010-396 = "Should we claim to empathize or understand their plight, the Arius students' hatred would only fester ever more deeply."
62010-397 = "So perhaps this desire of mine is one rooted in arrogance."
62010-402 = "Regardless, my naive soul desires to mend the bridge which binds us."
62010-403 = "We will never reach a better tomorrow through distrust and ignorance."
62010-404 = "It's...all lip service, however."
62010-405 = "[s] \"You know, this might be my first time seeing you tired, Mine.\""
62010-406 = "Fufu. It well may be."
62010-407 = "I feel you have shifted from your usual demeanor as well, Sensei."
62010-412 = "I have an inquiry. As your student, not as captain of the Remedial Knights."
62010-413 = "...When one finds themselves at the end of the rope, what gives them the strength to continue holding on?"
62010-414 = "[s] \"...\""
62010-417 = "Hey, Sensei."
62010-418 = "Say, hypothetically, if someone..."
62010-422 = "...really, really, really wanted to throw their life away."
62010-423 = "Is it even possible to stop them?"
62010-426 = "[ns] \"...The things they believe in. The people they trust in.\""
62010-427 = "\"Belief,\" you say?"
62010-428 = "Fufu. Your talent for catching me off guard remains unparalleled."
62010-429 = "Surely an educator's response should follow along the lines of, \"Act with logic and caution. Every challenge is merely an obstacle to overcome.\""
62010-430 = "[s5] \"But life doesn't always work that way.\"\n[s6] \"People tend to be motivated by their feelings and belief system.\""
62010-435 = "[ns7] \"Whether that be faith in something greater...\"\n[ns8] \"...or trust in something inside themselves.\""
62010-438 = "Hm? Emotions are reflections of our consciousness..."
62010-439 = "...which is why we tend to respond to them more reflexively...?"
62010-440 = "People aren't at the bidding of their emotions. They help push people forward and follow their hearts?"
62010-441 = "I see. It seems I've received a private lesson from you, Sensei."
62010-442 = "..."
62010-443 = "[s9] \"As long as you believe in yourself...\"\n[s10] \"...and that the path you've chosen is correct...\""
62010-446 = "...then I should continue down the path I have chosen?"
62010-447 = "However, who defines right from wrong? How can one be certain the path they've chosen is the correct one?"
62010-448 = "[s11] \"You have to prove it to yourself.\"\n[s12] \"I've been trying to do the same.\""
62010-451 = "You...as well? What could you possibly...?"
62010-452 = "[s13] \"How could I ignore a student in need of 'aid?'\"\n[s14] \"I couldn't call myself a teacher if I did.\""
62010-455 = "...!"
62010-456 = "How very simple, and yet it didn't occur to me."
62010-457 = "Thank you, Sensei."
62010-463 = "Truly. I cannot fully express my gratitude."
62010-468 = "Gently, Mine leaned her head against me."
62010-469 = "Please excuse me, Sensei. Just for this moment..."
62010-470 = "Yes, even a moment is enough..."
62010-471 = "So, please allow me this."
62010-475 = "With her head pressed against my shoulder, Mine began breathing evenly in no time."
62010-476 = "It felt like time had frozen for that moment, but it didn't take long for it to shatter."
62010-482 = "An unidentified noise... Sensei, did you hear it as well?"
62010-483 = "[s] \"I heard it too! What could it have been...?\""
62010-489 = "Is someone blowing a horn or something?"
62010-491 = "Yes. It could be interpreted as a signal of some sort."
62010-492 = "It's hard to tell..."
62010-493 = "It kinda had an ominous ring to it, though, didn't it?"
62010-495 = "I think so too... What should we do, Mine?"
62010-500 = "..."
62010-501 = "It matters not."
62010-505 = "We shall do as we must."
62010-507 = "Next Episode;The Trumpet's Blow"

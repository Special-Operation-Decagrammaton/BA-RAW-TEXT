[translation]
62010-1 = "ตอนที่ 1;กิจกรรมอาสานิรนาม"
62010-3 = "สัญชาตญาณบอกน่ะค่ะว่ามีคนต้องการการบรรเทาทุกข์!"
62010-8 = "พูดแบบนั้น หมายความว่ายังไงคะ?!"
62010-9 = "[s] \"ไม่ต้องแปลกใจหรอก... มิเนะสัมผัสถึงเรื่องแบบนี้ได้น่ะ...\""
62010-10 = "พูดเรื่องอะไรน่ะ คุณครูรู้จักคนกลุ่มนี้เหรอคะ? ฉันไม่เห็นรู้จักเลยค่ะ"
62010-15 = "อ๊ะ รุ่นพี่! คนกลุ่มนั้นน่ะ..."
62010-16 = "[s] \"??!!\""
62010-18 = "[ns] \"ดะ... เดี๋ยวก่อน!\""
62010-28 = "[ns] \"มากันครบแล้วใช่มั้ย?\""
62010-29 = "ค่ะ ค่ะ...\n"
62010-30 = "อะ... อืม ก็สงสัยว่ามีเรื่องอะไร..."
62010-31 = "นั่นสิคะ ไม่เห็นต้องรีบคว้ามือแล้ววิ่งออกมาขนาดนี้เลย บอกกันดีๆ ก็ได้..."
62010-32 = "ตกลงมีเรื่องอะไรเหรอ คุณครู?"
62010-33 = "นั่นสิคะ! นี่เป็นครั้งแรกเลยค่ะที่ฉันเห็นคุณครูมีสีหน้าแบบนั้น ถ้ารู้สึกกลัวอะไรอยู่ละก็ ฮานาเอะคนนี้จะปลอบใจเองค่ะ!"
62010-34 = "[s] \"ก่อนอื่นเลยนะ...\""
62010-39 = "ฉันรู้หรือเปล่า... ว่านักเรียนกลุ่มนี้คือใครน่ะเหรอคะ?"
62010-46 = "ก็ชมรมอัศวินบรรเทาทุกข์ยังไงล่ะคะ..."
62010-47 = "จากทรีนิตี้น่ะค่ะ..."
62010-48 = "สวัสดี ชมรมอัศวินบรรเทาทุกข์ทุกคน หลังจากตอนนั้นเราก็ไม่ได้เจอกันเลยใช่มั้ยล่ะ? ตอนเหตุการณ์หอคอยแห่งที่ 4 น่ะ"
62010-49 = "ค่ะ ใช่แล้วละค่ะ... สบายดีกันหรือเปล่าคะ สควอด... ทุกคน...? พอดีตอนนั้นพวกฉันไม่ค่อยมีเวลาทักทายเท่าไร..."
62010-50 = "ตอนนั้นรู้สึกจะมีแม่ชีที่ใส่ชุดเด่นสะดุดตาด้วย แต่วันนี้เหมือนจะไม่ได้มาด้วยกันสินะ"
62010-52 = "คุณซากุระโกะอยู่ชมรมซิสเตอร์..."
62010-57 = "ตะ... ตอนนี้คุณซากุระโกะงานยุ่งนิดหน่อยค่ะ! ใช่ค่ะ! ตะ... ต้องไปเตรียมสอบน่ะค่ะ!"
62010-59 = "อ่า อ้อ... ยุ่งกับการเตรียมสอบสินะคะ..."
62010-63 = "เอ๋...? ถ้างั้นพวกคุณไม่ไปเตรียมสอบ... กันเหรอคะ?"
62010-64 = "คือว่าเรื่องนั้น..."
62010-69 = "การยื่นมือเข้าไปบรรเทาทุกข์ให้ผู้อื่นก็เป็นเรื่องสำคัญไม่แพ้การสอบหรอกค่ะ!"
62010-70 = "ฉันมั่นใจว่าพี่น้องของเราจะบริหารจัดการเวลาเพื่องานบรรเทาทุกข์และการเตรียมสอบได้อย่างลงตัวค่ะ "
62010-71 = "แล้วการทำแบบนั้นก็เป็นจิตวิญญาณแห่งการบรรเทาทุกข์ในอีกแง่หนึ่งด้วยค่ะ"
62010-72 = "เหนือสิ่งอื่นใด ฉันไม่เคยพลาดระดับ 1 ในการสอบจำลองเลยแม้แต่สักครั้งค่ะ"
62010-73 = "[s] \"ยอดเยี่ยมไปเลยนะ สมแล้วละที่เป็นมิเนะ\""
62010-77 = "ขะ... ขอบคุณค่ะ คุณครู..."
62010-78 = "[s1] \"แต่ครูขอให้ช่วยปกปิดเรื่องชมรมอัศวินบรรเทาทุกข์กับทรีนิตี้ได้มั้ย\"\n[s2] \"ครูขอให้ช่วยทำเป็นไม่รู้จักชมรมอัศวินบรรเทาทุกข์กับทรีนิตี้ได้มั้ย?\""
62010-84 = "ทำไมล่ะคะ?"
62010-85 = "นั่นสิคะ พูดแบบนั้นมันออกจะแปลกๆ นะคะ ทำไมต้องปิดบังหนทางแห่งการบรรเทาทุกข์ด้วยล่ะ..."
62010-92 = "หัวหน้าคะ ตอนอยู่ที่นี่ เราทำตามที่คุณครูขอเถอะค่ะ"
62010-93 = "คะ? ทำไมเหรอคะ รุ่นพี่? พวกเรามาที่นี่เพื่อช่วยเหลือผู้คนเหล่านี้ไม่ใช่เหรอคะ?"
62010-94 = "คะ... คือว่า... ก็ถ้าจะทำอย่างนั้น เราน่าจะต้องปกปิดเรื่องที่เราเป็นชมรมอัศวินบรรเทาทุกข์น่ะค่ะ!"
62010-95 = "งั้น... เหรอคะ?"
62010-96 = "ค่ะ ใช่ค่ะ! ในพระคัมภีร์ก็มีคำสอนแบบนี้ไม่ใช่เหรอคะ? ที่บอกว่า 'จงให้มือซ้ายไม่รู้งานที่มือขวาทำ' น่ะค่ะ!"
62010-97 = "โดยพื้นฐานแล้วมันก็เป็นคำที่ถูกอยู่หรอกค่ะ แต่ดูๆ ไปแล้วมันน่าจะเหมาะกับชมรมซิสเตอร์มากกว่า#nชมรมอัศวินบรรเทาทุกข์นะคะ..."
62010-98 = "คุณครูต้องมีเหตุผลที่ขอให้ทำอย่างนั้นละค่ะ!"
62010-102 = "ถ้างั้นก็... เข้าใจแล้วค่ะ ฉันจะทำตามนั้นค่ะ คุณครู"
62010-103 = "[s] \"ขอบใจนะ เซรินะ! เวลาแบบนี้เซรินะช่วยครูได้ตลอดเลย!\""
62010-107 = "คะ? ค่ะ ขอบคุณค่ะ คุณครู แหะๆๆ..."
62010-109 = "อย่างนั้นสินะคะ... ถึงหัวใจของฉันจะยังไม่เข้าใจอยู่บ้าง แต่สมองของฉันเข้าใจแล้วค่ะ"
62010-110 = "ในช่วงเวลาแบบนี้ ส่วนตัวฉันคิดว่าเรายิ่งต้องเผยแพร่เจตนารมณ์ของการบรรเทาทุกข์ให้กว้างขวาง"
62010-111 = "ชาวอาเรียสจะได้รับรู้ถึงความจริงใจของพวกเราค่ะ แต่ก็นะ..."
62010-112 = "[s] \"ครูขอละนะ... เถอะนะ?\""
62010-113 = "ค่ะ เข้าใจแล้วค่ะ คุณครูก็คงมีเหตุผลของตัวเองค่ะ"
62010-117 = "ระหว่างอยู่ที่นี่ ฉันจะพยายามหลีกเลี่ยงการใช้คำว่า 'โรงเรียนของพวกฉัน' กับ 'ชมรมอัศวินบรรเทาทุกข์' ให้มากที่สุดเท่าที่จะเป็นไปได้ค่ะ"
62010-118 = "[s] \"คนอื่นก็ตกลงใช่มั้ย?\""
62010-128 = "ค่ะ ค่ะ..."
62010-129 = "เอ่อ... จะว่าไปแล้ว... หัวหน้าคะ...?"
62010-130 = "เฉพาะตอนมาอยู่ที่นี่... ฉันว่าเราเรียกหัวหน้าว่า... 'รุ่นพี่' จะดีมั้ยคะ?"
62010-131 = "ถ้าเรียกว่าหัวหน้า คนฟังอาจเข้าใจผิดว่าเราเป็นกลุ่มอะไรบางอย่างก็ได้ค่ะ"
62010-132 = "คะ? แต่ว่า..."
62010-133 = "ไม่สิ... ที่พูดมาก็สมเหตุสมผลค่ะ ถ้างั้นก็... อืม"
62010-134 = "ทุกคน ช่วยเรียกฉันด้วยคำเรียกใหม่แทนได้มั้ยคะ?"
62010-135 = "ได้ค่ะ! หัวหน้า... ไม่สิ รุ่นพี่มิเนะ!"
62010-139 = "รุ่นพี่... มิเนะ..."
62010-140 = "ได้เลยค่ะ รุ่นพี่มิเนะ..."
62010-144 = "ขะ... ขอโทษค่ะ! ฉันจะใช้คำเรียกนั้นเฉพาะตอนอยู่ที่นี่เท่านั้นค่ะ! อย่าคิดว่าฉันไม่มีมารยาทเลยนะคะ!"
62010-145 = "มะ... ไม่นะคะ ฉันไม่คิดแบบนั้นเลยค่ะ"
62010-146 = "ฉันว่ามันให้ความรู้สึกสนิทสนมกัน แบบนี้อาจจะดีกว่าด้วยซ้ำค่ะ..."
62010-151 = "ถ้าตกลงกันได้แล้ว งั้นฉันขอเสียมารยาทหน่อยนะ"
62010-152 = "สรุปว่าชมรมอัศวินบรรเทาทุกข์... ไม่สิ ชมรมกิจกรรมอาสานิรนามมาที่โรงเรียนสาขาอาเรียส เพื่อเผยแพร่เจตนารมณ์แห่งการบรรเทาทุกข์"
62010-153 = "ฉันเข้าใจแบบนี้ได้หรือเปล่า?"
62010-154 = "ค่ะ ขอบคุณที่ช่วยสรุปให้ค่ะ คุณซาโอริ แต่ว่าสควอดทุกคนก็น่าจะสังกัดอาเรียสกัน..."
62010-155 = "การที่พวกฉันมาทำแบบนี้... พวกคุณไม่ว่าอะไรเหรอคะ?"
62010-156 = "ไม่เป็นไรหรอก คุณเซรินะ ถ้าถามว่าพวกฉันสังกัดอยู่ที่ไหน ก็ต้องตอบว่าอาเรียสอยู่แล้ว..."
62010-157 = "..."
62010-158 = "แต่ตอนนี้เราอยู่ในสถานการณ์ที่ไม่ได้เป็นส่วนหนึ่งของกลุ่มน่ะ..."
62010-160 = "ถ้าแค่ไม่เป็นส่วนหนึ่งของกลุ่มมันก็ดีน่ะสิ..."
62010-161 = "ฉันไม่ค่อยเข้าใจเท่าไร แต่ทุกอย่างคงราบรื่นดีใช่มั้ยคะ? งั้นก็โล่งอกไปทีค่ะ!"
62010-162 = "ฮุฮุ เมื่อกี้บอกว่าชื่อคุณฮานาเอะใช่มั้ย? ดูมีพลังเหลือล้นตลอดเลยนะ ดีเลย งั้นต่อไปฉันก็ขอฝากตัวด้วยนะ"
62010-163 = "ได้เลยค่ะ!"
62010-164 = "..."
62010-165 = "คุณเซรินะ? ให้พวกฉันยืมตัวคุณฮานาเอะสักเดี๋ยวได้มั้ย? แค่ได้เห็นคุณฮานาเอะ ฉันว่าเราก็น่าจะมี#nพลังขึ้นมาเลยละ แล้วฉันจะให้ฮิโยริไปเป็นการตอบแทนนะ"
62010-167 = "คะ... คะ?!"
62010-168 = "คะะะะะ?!?! "
62010-169 = "..."
62010-170 = "ฝะ... ฝากตัวด้วยนะคะ คุณเซรินะ... คุณมิเนะ..."
62010-171 = "คะ... คุณครู? นี่ก็เป็นอีกรูปแบบของการบรรเทาทุกข์... เหรอคะ...?"
62010-173 = "เอ๋? แล้วจากนี้ฉันจะเป็นยังไงเหรอคะ?"
62010-174 = "ขอโทษๆ ขอโทษนะทุกคน ฉันแค่พูดเล่นน่ะ พอเห็นคุณฮานาเอะสดใสและตรงไปตรงมา ฉันก็เลยแกล้งพูดไป"
62010-176 = "ยะ... อย่างนั้นสินะคะ... ค่ะ ฮานาเอะจังสดใสเหมือนดอกมอร์นิ่งกลอรี่อยู่แล้วนี่คะ"
62010-177 = "แหะๆๆ ฉันรู้ว่าเป็นเรื่องล้อเล่นตั้งแต่แรกแล้วค่ะ..."
62010-182 = "อ่า..."
62010-183 = "[s] \"ไหวหรือเปล่า...?\""
62010-184 = "รู้สึกเหมือนโดนดูดพลังเลยค่ะ..."
62010-185 = "[s] \"ครูก็เข้าใจความรู้สึกนั้นเหมือนกัน...\""
62010-189 = "[ns] \"งั้นจากนี้ไปเราจะทำยังไงกันดีล่ะ?\""
62010-194 = "ถามได้ดีเลยค่ะ คุณครู"
62010-195 = "ถ้าจะเผยแพร่จิตวิญญาณแห่งการบรรเทาทุกข์ เราก็ต้องมีฐานที่มั่น"
62010-199 = "ชมรมอัศวิน... ไม่สิ ชมรมกิจกรรมอาสานิรนามของพวกฉันจะขอเริ่มด้วยการจัดตั้งศูนย์บรรเทาทุกข์ค่ะ!"
62010-204 = "ศูนย์บรรเทาทุกข์ชั่วคราว"
62010-206 = "ทำได้ดีมากเลยค่ะ! รุ่นพี่มิเนะ แล้วก็คุณครูด้วย!"
62010-207 = "คงเหนื่อยน่าดูเลยนะคะ คุณครู รุ่นพี่มิเนะด้วยค่ะ"
62010-208 = "รุ่นพี่..."
62010-212 = "สร้างเสร็จเร็วมากเลยงั้นเหรอคะ? นี่เป็นเรื่องคุ้นเคยอยู่แล้วน่ะค่ะ!"
62010-217 = "สวัสดีค่ะ คุณครู แล้วก็..."
62010-224 = "..."
62010-225 = "'อาสาสมัคร' ทุกคน"
62010-229 = "สะ... สวัสดีค่ะ คุณคือ... ประธานนักเรียนของที่นี่ใช่มั้ยคะ?"
62010-230 = "ไม่ใช่ค่ะ ไม่ถึงกับเป็นตำแหน่งนั้นได้หรอกค่ะ ก็ที่นี่คืออาเรียสนี่คะ"
62010-231 = "ขอโทษด้วยค่ะ พวกฉันไม่ค่อย... รู้เรื่องแบบนั้นเท่าไร..."
62010-236 = "คะ...?"
62010-237 = "...?"
62010-240 = "(คุณครูเข้ามาขัดจังหวะทั้ง 2 คนที่กำลังจะคุยบางอย่างกัน...)"
62010-243 = "เอ๋ พวกคุณมาโดยไม่มีข้อมูลเลยว่าสถานที่ที่จะมาทำกิจกรรมอาสาเป็นที่แบบไหนเหรอคะ? มาด้วยใจเฉยๆ เลยเหรอ?"
62010-244 = "ระ... เรื่องนั้นน่ะ...!"
62010-245 = "..."
62010-246 = "ใช่แล้วค่ะ ถ้ามาด้วยใจ จะเป็นปัญหาอะไรเหรอคะ?"
62010-247 = "หะ... หัวหน้า... ไม่สิ... รุ่นพี่?!"
62010-248 = "ก็ไม่ถึงกับ... เป็นปัญหาหรอกค่ะ แต่ที่นี่อาจเกิดอันตรายได้ แถมมาแล้วจะได้เจอเรื่องอะไรบ้างก็ไม่รู้"
62010-249 = "แต่พวกคุณก็ไม่ได้ใส่ใจ แล้วก็เข้ามาเพราะรู้สึกเห็นใจ อยากจะทำงานแบบนี้ก็เพื่อความพึงพอใจของ#nตัวเอง..."
62010-250 = "ในบางแง่แล้วฉันคิดว่าเป็นการกระทำที่กล้าหาญดีน่ะค่ะ"
62010-251 = "ก็สงสัยอยู่ว่าคุณจะพูดเรื่องอะไร เป็นอย่างนี้เองสินะคะ เข้าใจได้ง่ายเลยค่ะ"
62010-255 = "คะ?"
62010-256 = "ทั้งหมดนี้เกิดขึ้นเพราะมี 'การบรรเทาทุกข์' ไม่เพียงพอค่ะ"
62010-257 = "กะ... การบรรเทาทุกข์เหรอคะ...?"
62010-258 = "ใช่ค่ะ ถ้าการบรรเทาทุกข์ไม่เพียงพอ ก็ควรให้การบรรเทาทุกข์เพิ่ม แต่ไม่ใช่แค่ให้เพียงพอนะคะ ต้องให้จนถึงระดับล้นเหลือเลย"
62010-259 = "การลดจำนวนผู้ที่เจ็บปวดและทุกข์ทรมาน แม้จะเพียงแค่คนเดียวก็ตาม!"
62010-260 = "นั่นคือความตั้งใจพื้นฐานของการทำกิจกรรมบรรเทาทุกข์... ฉันหมายถึงกิจกรรมอาสาน่ะค่ะ!"
62010-261 = "และถ้ามีเงื่อนไขอื่นๆ มาหยุดเรา พวกมันก็เป็นแค่ปัญหาเล็กน้อยเท่านั้นค่ะ!"
62010-263 = "อ่า... อะฮะฮ่า..."
62010-264 = "สมกับที่เป็นรุ่นพี่เลยค่ะ!"
62010-269 = "..."

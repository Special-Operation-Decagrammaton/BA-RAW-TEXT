2000906-16 = "#wait;1000"
2000906-17 = "[ns] 체리노에게 후르츠 밀크를 건넨다."
2000906-18 = "3;체리노 온천ND;S2_02;흐음. 평범한 흰 우유와는 달리 후르츠 밀크는 달콤한 향이 나는 것이 무척이나 먹음직스러워 보이는구나.\n#3;em;[///]\n#3;stiff\n#3;closeup"

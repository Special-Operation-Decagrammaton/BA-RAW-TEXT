[translation]
2000906-1 = "牛奶製的權威"
2000906-2 = "（泡完溫泉後，正走向旅館前的商店時……）"
2000906-3 = "原來如此。#n在思緒混亂的時候泡湯，比想像中還好呢。"
2000906-4 = "煩躁感一掃而空，心情就像蔚藍的天空般晴朗……"
2000906-5 = "這就是修行者們所說的「無我的境界」嗎。"
2000906-6 = "雖然咱本來就很偉大，沒想到可以一口氣越過大人的階梯，直接到達聖人的境界……"
2000906-7 = "心靈的成長實在太快，連咱自己都覺得害怕啊。"
2000906-8 = "[s] 「所以不需要水果牛奶囉？」"
2000906-9 = "那怎麼可能呢！"
2000906-10 = "心靈的成長和想要享受美食的心情完全是兩回事！"
2000906-11 = "快把水果牛奶給咱！"
2000906-17 = "[ns] 把水果牛奶遞給潔莉諾"
2000906-18 = "呼呣。水果牛奶和原味牛奶不一樣，散發著一股香甜的味道呢！"
2000906-19 = "趕緊來喝喝看……"
2000906-26 = "― [log=체리노 온천ND]咕嚕，咕嚕…… 哈啊！[/log][wa:1730] "
2000906-30 = "― [log=체리노 온천ND]泡完澡之後喝杯水果牛奶……[/log][wa:1320] "
2000906-32 = "― [log=체리노 온천ND]這感覺真棒啊！[/log]"
2000906-35 = "― [log=체리노 온천ND]嗯？怎麼了嗎？同志？[/log][wa:2540] "
2000906-37 = "― [log=체리노 온천ND]咱的臉上沾到什麼東西了嗎？[/log][wa:1460] "
2000906-40 = "― [log=체리노 온천ND]……什麼？嘴巴周圍有鬍子形狀的痕跡……！？[/log][wa:3520] "
2000906-43 = "― [log=체리노 온천ND]哇，真的耶！？[/log][wa:930] "
2000906-45 = "― [log=체리노 온천ND]只是喝個牛奶，就有這麼棒的鬍子！[/log][wa:2140] "
2000906-48 = "― [log=체리노 온천ND]喝著這麼美味的飲料，[/log]"
2000906-50 = "― [log=체리노 온천ND]竟然還能得到新的鬍子……[/log]"
2000906-53 = "― [log=체리노 온천ND]太棒了！同志，再給咱多一點！[/log][wa:2310] "
2000906-55 = "― [log=체리노 온천ND]再把更多的水果牛奶拿來給咱吧！[/log][wa:2060] "
2000906-58 = "嗯？咦，鬍子不見了……？"
2000906-59 = "算了，反正每次喝水果牛奶，都會長出現新的鬍子嘛！"
2000906-60 = "這樣就不用擔心鬍子會脫落，也不用擔心會變髒了……"
2000906-61 = "好！今後咱就一直不停地喝水果牛奶吧！"
2000906-63 = "（之後，潔莉諾喝了十瓶以上的水果牛奶，把肚子搞壞了）"

[translation]
2000906-1 = "อำนาจรสนม"
2000906-2 = "(หลังแช่น้ำเสร็จแล้ว คุณครูก็มาเจอกับเชริโน่อีกครั้งที่ร้านค้าของที่พัก)"
2000906-3 = "ฮู่ว... ตอนที่ความคิดฟุ้งซ่าน การไปนอนแช่น้ำก็ไม่ใช่เรื่องแย่เท่าไรเลยนะ"
2000906-4 = "พอความคิดฟุ้งซ่านหายไป เราก็รู้สึกง่วงขึ้นมา..."
2000906-5 = "หรือว่านี่คือสภาวะการลืมตัวตนที่พวกผู้บำเพ็ญตนพูดถึงกันนะ?"
2000906-6 = "ถึงเราจะรู้จักความยิ่งใหญ่ดีก็เถอะ แต่แบบนี้แสดงว่าเราจะก้าวข้ามผ่านหนทางของการเป็นผู้ใหญ่#nไปสู่หนทางแห่งการเป็นนักปราชญ์เลยงั้นเหรอ..."
2000906-7 = "เป็นการเติบโตอย่างก้าวกระโดดที่น่ากลัวจริงๆ"
2000906-8 = "[s] \"งั้นไม่ต้องดื่มนมรสผลไม้ก็ได้ใช่มั้ย?\""
2000906-9 = "จะเป็นอย่างนั้นได้ไงกันน่ะ!"
2000906-10 = "การก้าวไปถึงหนทางสู่การเป็นนักปราชญ์กับการกินของอร่อยมันคนละเรื่องกันนะ!"
2000906-11 = "รีบส่งนมรสผลไม้มาให้เราเถอะน่า!"
2000906-17 = "[ns] ยื่นนมรสผลไม้ให้เชริโน่"
2000906-18 = "อื้มมม นมรสผลไม้นี่มีกลิ่นหอมหวานชวนให้ดื่มต่างกับนมทั่วๆ ไปเลยนะ"
2000906-19 = "ไหนขอดูหน่อยซิ..."
2000906-26 = "― [log=체리노 온천ND]อึกๆ... อึกๆ... อ๊าาา~[/log][wa:1290] "
2000906-30 = "― [log=체리노 온천ND]ได้ดื่มนมรสผลไม้ หลังจากแช่น้ำร้อน[/log][wa:480] "
2000906-32 = "― [log=체리노 온천ND]แบบนี้มัน...ยอดเยี่ยมจริงๆ เลย[/log]"
2000906-35 = "― [log=체리노 온천ND]หืม? ทำไมถึงจ้องเราแบบนั้นล่ะ สหาย?[/log][wa:1540] "
2000906-37 = "― [log=체리노 온천ND]ที่หน้าของเรามีอะไรติดอยู่งั้นเหรอ?[/log][wa:580] "
2000906-40 = "― [log=체리노 온천ND]...หืม? รอบๆ ปากของเรา... มีรอยนมเปื้อนรูปหนวดเหรอ?[/log][wa:2320] "
2000906-43 = "― [log=체리노 온천ND]ว้าว? จริงเหรอ?[/log][wa:610] "
2000906-45 = "― [log=체리노 온천ND]เราแค่ดื่มนมเองนะ ก็ได้หนวดสุดเท่อันใหม่เลย![/log][wa:1020] "
2000906-48 = "― [log=체리노 온천ND]ได้ดื่มนมแสนอร่อย...[/log]"
2000906-50 = "― [log=체리노 온천ND]แถมยังได้หนวดใหม่มาด้วยงั้นเหรอเนี่ย...[/log]"
2000906-53 = "― [log=체리노 온천ND]สุดยอดเลย! สหาย! ไปเอามาให้เราอีกเร็วเข้า![/log][wa:1190] "
2000906-55 = "― [log=체리노 온천ND] เราอยากได้นมรสผลไม้อีก![/log][wa:1700] "
2000906-58 = "หืม? รอยรูปหนวดหายไปแล้วเหรอ?  "
2000906-59 = "ไม่มีปัญหา รอยรูปหนวดน่ะ พอดื่มนมรสผลไม้อีกก็จะเกิดขึ้นใหม่เองนั่นล่ะ"
2000906-60 = "หนวดที่เกิดขึ้นจากรอยดื่มนมแบบนี้ ไม่ต้องกลัวว่าจะทำตก หรือว่าจะสกปรก..."
2000906-61 = "ต่อไปเราคงต้องดื่มนมรสผลไม้ต่อไปเรื่อยๆ เพื่อไม่ให้รอยรูปหนวดนี้หายไปแล้วล่ะ!"
2000906-63 = "(หลังจากนั้น เชริโน่ก็ตั้งอกตั้งใจดื่มนมรสผลไม้จนท้องเสียตลอดทั้งคืน)"

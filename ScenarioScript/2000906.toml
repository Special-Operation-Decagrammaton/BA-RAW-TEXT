[translation]
2000906-1 = "Milk-Made Authority"
2000906-2 = "I met Cherino again in front of the ryokan's stall after I finished bathing."
2000906-3 = "*sigh* Soaking yourself in a bath when your head is preoccupied is better than I thought it'd be."
2000906-4 = "My complicated thoughts disappear, and I start to feel drowsy..."
2000906-5 = "Wait, could this be that state of so-called selflessness monks talk about?"
2000906-6 = "I knew I was amazing, but I never thought I'd climb right over the stairs of adulthood and jump straight onto those of sainthood."
2000906-7 = "I'm actually starting to get scared of the rapidity of my inner growth."
2000906-8 = "[s] \"Then are you okay with not drinking fruit milk?\""
2000906-9 = "Of course not!"
2000906-10 = "Reaching sainthood and eating delicious food are entirely separate!"
2000906-11 = "Give me that fruit milk right now!"
2000906-17 = "[ns] Hand Cherino a fruit milk."
2000906-18 = "Hmm, unlike ordinary milk, fruit milk's sweet scent makes it appetizing."
2000906-19 = "Let me try it."
2000906-26 = "― [log=체리노 온천ND]*gulp* *gulp* ...Wow![/log][wa:1330] "
2000906-30 = "― [log=체리노 온천ND]Heehee. The taste of fruit milk after a bath...[/log][wa:10] "
2000906-32 = "― [log=체리노 온천ND]This is the absolute best![/log]"
2000906-35 = "― [log=체리노 온천ND]Hmm? Why are you looking at me like that, Comrade?[/log][wa:940] "
2000906-37 = "― [log=체리노 온천ND]Is there something on my face?[/log][wa:780] "
2000906-40 = "― [log=체리노 온천ND]Huh? I have a mustache-shaped mark above my mouth?[/log][wa:2360] "
2000906-43 = "― [log=체리노 온천ND]Woah, it's true![/log][wa:570] "
2000906-45 = "― [log=체리노 온천ND]All I did was drink milk, but now I have an awesome mustache![/log][wa:340] "
2000906-48 = "― [log=체리노 온천ND]I can enjoy yummy drinks[/log]"
2000906-50 = "― [log=체리노 온천ND]and get a new mustache as well?[/log]"
2000906-53 = "― [log=체리노 온천ND]Amazing! Comrade, bring more fruit milk! Immediately![/log][wa:750] "
2000906-55 = "― [log=체리노 온천ND]I need a whole lot more of this fruit milk![/log][wa:940] "
2000906-58 = "What? The mustache already disappeared? "
2000906-59 = "It doesn't matter. I can get a new mustache every time I drink fruit milk."
2000906-60 = "And I'll never have to worry about my mustache falling off or getting dirty..."
2000906-61 = "I'll just keep drinking fruit milk so my mustache doesn't dry out!"
2000906-63 = "Cherino suffered from a stomachache all night long, having drunk more than ten bottles of fruit milk."

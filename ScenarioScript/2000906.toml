2000906-59 = "3;체리노 온천ND;S2_09;상관없지. 수염 자국은 후르츠 밀크를 마실 때마다 새로 생겨나니까."
2000906-60 = "3;체리노 온천ND;S2_01;이렇게 만든 수염은 몸에서 떨어질 염려도, 더러워질 염려도 없으니……"
2000906-61 = "3;체리노 온천ND;S2_12;앞으로는 수염 자국이 마르지 않도록 후르츠 밀크를 쉬지 않고 계속 마셔야겠어!\n#3;em;[재잘]\n#3;hophop"
2000906-62 = "#all;hide"
2000906-63 = "#na;(이후, 체리노는 열 병이 넘는 후르츠 밀크를 마시고 배탈이 나 밤새도록 고생을 했다고 한다.)"

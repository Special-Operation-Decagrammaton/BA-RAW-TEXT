[translation]
2000906-1 = "#Title;우유로 만든 권위"
2000906-2 = "#na;(목욕을 마친 뒤, 료칸의 매점 앞에서 다시 체리노를 만났다.)"
2000906-3 = "3;체리노 온천ND;S2_12;후우. 머리가 복잡할 때 탕에 몸을 뉘고 있는 것도 생각보다 나쁘지는 않구나.\n#3;hophop\n#3;em;[음표]\n#3;a"
2000906-4 = "3;체리노 온천ND;S2_00;복잡한 생각이 사라지며 나른한 기분이 드는 것이……."
2000906-5 = "3;체리노 온천ND;S2_02;설마, 이것이 수행자들이 말하는 무아정적의 경지라는 것인가?\n#3;em;[?]"
2000906-6 = "3;체리노 온천ND;S2_09;이 몸의 위대함은 익히 알고 있었지만, 설마 어른의 계단을 넘어 성인(聖人)의 계단까지 단숨에 오르게 되었을 줄이야……."
2000906-7 = "3;체리노 온천ND;S2_12;엄청난 속도의 내적 성장에 스스로가 두려워질 정도로군.\n#3;hophop\n#3;em;[재잘]"
2000906-8 = "[s] \"그럼 후르츠 밀크는 마시지 않아도 괜찮아?\""
2000906-9 = "3;체리노 온천ND;S2_05;그럴 리가 없지 않느냐!\n#3;em;[빠직]\n#3;stiff"
2000906-10 = "3;체리노 온천ND;S2_09;성인의 경지에 다다르는 것과 맛있는 음식을 먹는 건 별개라고!"
2000906-11 = "3;체리노 온천ND;S2_01;어서 그 후르츠 밀크를 이리 주게!\n#3;em;[!]"
2000906-12 = "#st;[0,0];instant;1;"

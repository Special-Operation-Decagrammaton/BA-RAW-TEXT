[translation]
52220-1 = "ตอนที่ 22;งานเทศกาลต้องดำเนินต่อไป"
52220-5 = "คุณคาโฮะ คุณคาโฮะ!"
52220-6 = "มีเรื่องอะไรอีกคะ ทำไมถึงร้อนรนขนาดนั้นล่ะ...?"
52220-7 = "อีกไม่ถึงชั่วโมงก็จะเริ่มเทศกาลวาราคุแล้ว ฉันบอกแล้วนี่คะว่าถ้าไม่ใช่เรื่องเร่งด่วนมากก็ให้ไปบอก#nคุณนิยะที่อยู่ในห้องชมรมหยินหยางแทน"
52220-8 = "หรือว่าคุณนิยะหนีไปไหนอีกแล้วเหรอคะ?"
52220-9 = "ใช่ค่ะ คุณนิยะหนีไป 'อีกแล้ว' ค่ะ แต่สิ่งที่สำคัญกว่านั้น..."
52220-10 = "หายตัวไปในเวลาสำคัญๆ อีกแล้ว ครั้งนี้ฉันอุตส่าห์ย้ำนักย้ำหนาแล้วว่าห้ามขี้เกียจเด็ดขาด...!"
52220-11 = "ว่าแต่ 'สิ่งที่สำคัญกว่านั้น' ที่ว่าคืออะไรคะ?"
52220-12 = "มีปัญหาอื่นที่ใหญ่กว่าการที่คุณนิยะหายตัวไปก่อนจะเริ่มเทศกาลวาราคุอีกเหรอคะ?"
52220-13 = "หรือว่าเกิดปัญหาอะไรกับชิเซะจัง ไอดอลที่น่ารักของฉัน..."
52220-14 = "ฉันอยู่นี่~"
52220-15 = "อ๊ะ ชิเซะจัง โล่งอกไปทีที่ยังอยู่ดีนะคะ"
52220-16 = "งั้นถ้าไม่ใช่เรื่องของชิเซะจัง แล้วมันเป็นปัญหาอะไรกัน...?"
52220-17 = "ฉันว่า... คุณคาโฮะออกไปดูเองน่าจะเร็วกว่าค่ะ"
52220-21 = "เกิดอะไรขึ้นกันแน่..."
52220-22 = "อะไรกันคะ ทำไมถึงมีลูกตาอยู่ทั่วโรงเรียนแบบนี้?"
52220-23 = "มีลูกตากลอกกลิ้งไปทุกที่เลย..."
52220-24 = "คือว่า... จู่ๆ ก็มีวัตถุรูปร่างคล้ายลูกตาขนาดยักษ์ปรากฏอยู่ทั่วสถานที่จัดงานเลยค่ะ"
52220-25 = "คุณชิซุโกะจากชมรมจัดงานเทศกาลบอกว่าไม่รู้เรื่อง เราก็เลยสงสัยว่าเป็นอะไรที่คุณคาโฮะเตรียมไว้#nเป็นพิเศษเพื่อเทศกาลวาราคุหรือเปล่า"
52220-26 = "นี่เป็นเทศกาลโปรโมตความน่ารักของชิเซะจัง แล้วฉันจะไปเอาของที่น่าเกลียดแบบนี้มาไว้ในงานทำไม#nกันล่ะคะ!"
52220-27 = "แต่ถ้าคุณชิซุโกะก็ไม่รู้เรื่องนี้ แล้วลูกตาพวกนั้นมัน..."
52220-33 = "สายตาที่คุ้นเคยและน่าอึดอัดแบบนั้น รู้สึกเหมือนเคยเห็นมาก่อนเลย..."
52220-34 = "คาโฮะ ฉันขอแข่งจ้องตากับตาโตๆ นั่นได้มั้ย~?"
52220-35 = "ไม่ได้นะคะ!"
52220-38 = "แหวะ อะไรเนี่ย? ตาพวกนี้?"
52220-39 = "เห็นแล้วหงุดหงิดชะมัด... มันกะพริบตาได้เหมือนมีชีวิตอยู่จริงๆ เลย"
52220-40 = "ถ้าเอาปืนยิง มันจะกลัวจนกลิ้งหนีไปมั้ยนะ?"
52220-41 = "ช่วยรอสักครู่นะคะ ถ้าเรายังไม่รู้ตัวตนของมัน ฉันว่าเราไม่ควรไปยั่วยุมันโดยไม่จำเป็น..."
52220-45 = "กระสุน... ทะลุผ่านไปดื้อๆ เลยเหรอ?"
52220-46 = "นี่มันอะไรกันน่ะ? รู้สึกแปลกๆ เหมือนยิงภาพลวงตาอย่างนั้นละ..."
52220-54 = "อ๊ากก มันเริ่มมีเยอะขึ้นแล้ว!"
52220-55 = "นี่มัน... ปีศาจตอนที่เกิดไฟไหม้เมื่อคราวก่อน..."
52220-56 = "พะ... พวกเราทำอะไรเจ้าพวกนี้ไม่ได้หรอก... ทุกคนหนีเร็ว!"
52220-60 = "ซึคุโมะคามิ..."
52220-61 = "ปีศาจที่ชมรมความงามของธรรมชาติสร้างขึ้นมาสินะ"
52220-62 = "บังเอิญมาปรากฏตัวตอนที่เฮียกกะเรียวรันไม่อยู่พอดีด้วย..."
52220-63 = "ไม่สิ พวกนี้อาจตั้งใจมาในจังหวะนี้ก็ได้ แต่ไม่ว่าจะเป็นทางไหนก็แย่อยู่ดีค่ะ"
52220-64 = "ทะ... ท่านคาโฮะ พวกฉันควรทำยังไงดีคะ?"
52220-65 = "ก่อนอื่นไปประกาศให้ผู้ชมงานเทศกาลกับทีมงานในสถานที่จัดงานรู้ก่อนค่ะ บอกให้ทุกคนรู้ว่าอย่าสู้#nกับปีศาจพวกนั้นเด็ดขาด!"
52220-66 = "ส่วนคนที่เหลือก็ให้ไปอพยพชาวเมืองไปที่อื่นให้พ้นจากสายตาของลูกตาพวกนั้นค่ะ!"
52220-67 = "ตะ... แต่ลูกตาพวกนั้นมีอยู่ทั่วโรงเรียนเลยค่ะ เราต้องหนีไปไหนเหรอคะ?"
52220-68 = "อะ... เอ่อ... ไปที่..."
52220-70 = "รองหัวหน้าคาโฮะ! นอกจากลูกตาแล้วยังมีปีศาจที่มีรูปร่างเป็นวัตถุเก่าๆ เหมือนที่เคยโผล่มาตอนเกิด#nไฟไหม้ครั้งที่แล้วด้วยค่ะ ตอนนี้พวกนั้นก็กำลังจู่โจมชาวเมืองอยู่ด้วย"
52220-71 = "ไม่ว่าจะหนีไปทางไหนก็เจอปีศาจมาขวางทางค่ะ ราวกับพวกมันคอยเฝ้าดูเราอยู่อย่างนั้นละ..."
52220-72 = "ไม่ว่าจะไปทางไหนก็หนีจากสายตาพวกนั้นไม่พ้นเลยค่ะ!"
52220-77 = "ถ้าเป็นแบบนี้ต่อไป เทศกาลวาราคุก็คงจัดต่อไม่ได้..."
52220-78 = "ท่านคาโฮะ... พวกเราควรทำยังไงดีคะ?"
52220-80 = "นิยะ..."
52220-81 = "อย่างน้อยถ้านิยะอยู่ที่นี่ละก็..."
52220-82 = "สิ่งที่ฉันทำได้มีแค่ทำความเข้าใจและจัดการสถานการณ์ค่ะ"
52220-83 = "ฉันคิดหาทางออกจากวิกฤตนี้ไม่ได้เลย..."
52220-87 = "คาโฮะ..."
52220-88 = "ขอโทษนะคะ ชิเซะจัง"
52220-89 = "เราอุตส่าห์เตรียมงานกันมาอย่างดี แต่ฉันว่าเราคงต้องยกเลิกเทศกาลวาราคุครั้งนี้..."
52220-90 = "ไม่หรอก ที่ฉันจะบอกก็คือ"
52220-91 = "มีพวกนินจาอยู่ตรงโน้นน่ะ"
52220-92 = "นินจา...?"
52220-98 = "ชมรมวิจัยศาสตร์นินจา ได้เวลาออกโรง!"
52220-99 = "ท่านคาโฮะ ปลอดภัยดีใช่มั้ยคะ?"
52220-100 = "จะ... จู่ๆ พวกปีศาจก็โผล่มา... พวกฉันใช้เวลานานเลยค่ะกว่าจะกันพวกนั้นออกไปได้!"
52220-102 = "ชมรมวิจัยศาสตร์นินจาทุกคน มาทำอะไรกันที่นี่..."
52220-103 = "พวกคุณมาช่วยเรากำจัดปีศาจพวกนั้นเหรอคะ?"
52220-104 = "พะ... พวกข้าน้อยก็อยากช่วยเรื่องนั้นหรอกนะ แต่ตอนนี้พวกข้าน้อยมีเรื่องเร่งด่วนกว่านั้นที่จะบอก..."
52220-105 = "ใช่ค่ะ พอดีคุณครู [USERNAME] ขอให้พวกฉันช่วยทำอะไรบางอย่างน่ะค่ะ!"
52220-106 = "พวกฉันมาพร้อมข้อความจากคุณนิยะค่ะ นินนิน!"
52220-107 = "คุณครู [USERNAME] เหรอคะ...? แล้วก็ข้อความจากคุณนิยะด้วย...?"
52220-109 = "(ราวๆ 30 นาทีก่อน...)"
52220-112 = "อะฮะฮ่า... โธ่เอ๊ย น่าอายชะมัดเลย"
52220-113 = "นี่สินะที่บอกว่าต่อให้ทองสึกก็ยังเป็นทองอยู่ดี ถึงจะเป็นแค่เงา แต่เงาของหัวหน้าเฮียกกะเรียวรันก็#nเก่งกาจไม่เบาสินะ"
52220-114 = "ไม่ใช่คู่ต่อสู้ที่ง่ายเลยนะ หัวหน้าอายาเมะเนี่ย~"
52220-119 = "เรื่องลึกลับเริ่มกระจายไปหรือยังนะ"
52220-120 = "จนถึงจุดนี้อาจพูดได้ว่าเป็นสถานการณ์ที่เป็นไปตามคาด แต่ถ้าเราถูกมัดอยู่อย่างนี้ ก็คงทำได้แค่เฝ้าดูสถานการณ์ที่เกิดขึ้นเท่านั้น"
52220-121 = "เฮ้อ~ อย่างน้อยถ้ารู้ว่าจะเป็นแบบนี้ ฉันเตรียมแผนการอะไรไว้บ้างก็ดี"
52220-128 = "ท่านนิยะ!"
52220-129 = "หัวหน้านิยะ พวกเรามาช่วยแล้ว!"
52220-130 = "ปะ... เป็นยังไงบ้างคะ หัวหน้านิยะ?"
52220-131 = "ชมรมวิจัยศาสตร์นินจา...? รู้จักที่นี่ได้ยังไง..."
52220-132 = "ที่จริงพวกฉันตามมาตั้งแต่เมื่อกี้แล้วค่ะ!"
52220-133 = "คือว่า... ก่อนที่ท่านอาจารย์จะออกเดินทางไป ท่านอาจารย์ฝากให้พวกเราทำภารกิจพิเศษน่ะ"
52220-134 = "คุณครูฝากให้พวกคุณทำภารกิจเหรอคะ...?"
52220-135 = "ค่ะ ค่ะ! คุณครูบอกว่าถ้าเฮียกกะเรียวรันไม่อยู่ ก็อาจมีใครมาเล่นงานชมรมหยินหยางก็ได้ คุณครูก็เลยขอให้พวกฉันคอยคุ้มกันหัวหน้านิยะอย่างลับๆ ค่ะ..."
52220-136 = "ฮุฮุ การคุ้มกันคนอื่นอย่างลับๆ ในความมืดคืองานของนินจาอยู่แล้ว!"
52220-137 = "งั้นก็หมายความว่า... ทุกคนเฝ้าดูฉันตั้งแต่ตอนที่ฉันถูกเงาของหัวหน้าอายาเมะโจมตีแล้วเหรอคะ...?"
52220-141 = "อะ... เอ่อ... เรื่องนั้นน่ะ ตอนที่จู่ๆ หัวหน้าอายาเมะก็เข้ามาจู่โจมหัวหน้านิยะ พวกข้าน้อยเองก็มัวแต่#nตกใจกันจนไม่รู้จะช่วยยังไง..."
52220-142 = "แต่ต่อให้พวกข้าน้อยจะไปสมทบด้วยในตอนนั้น ยังไงก็สยบหัวหน้าอายาเมะไม่ได้หรอก"
52220-143 = "บะ... บอกตามตรงว่าแค่ดูการเคลื่อนไหวของหัวหน้าอายาเมะ ขาของฉันก็ก้าวไม่ออกแล้วค่ะ..."
52220-144 = "ตะ... แต่การต่อสู้ตัวต่อตัวก็ไม่ใช่แผนการที่ดีที่สุดเสมอไปนี่นา!"
52220-145 = "คอยหลีกเลี่ยงสถานการณ์ที่เสียเปรียบแล้วค่อยโจมตีในจังหวะที่ได้เปรียบ นั่นก็เป็นกลยุทธ์ของนินจา#nเหมือนกันนะ!"
52220-146 = "ข้าน้อยก็เลยแอบตามท่านนิยะมาจนกระทั่งเหลืออยู่ตัวคนเดียวนี่ละ!"
52220-147 = "แบบนี้สินะ หัวหน้า! ใช้ศาสตร์ย่างก้าวแบบไร้สุ้มเสียงสินะคะ!"
52220-148 = "เอาละ ท่านนิยะ! รีบออกไปจากที่นี่พร้อมกับพวกข้าน้อยเถอะ!"
52220-149 = "ไม่ได้หรอก... ตอนนี้เราไม่มีที่ให้หนีไปแล้วค่ะ"
52220-150 = "คะ...?! ทะ... ทำไมล่ะคะ?"
52220-151 = "ตอนนี้มีลูกตาฮิโตสึเมะปกคลุมอยู่ทั่วเฮียกคิยาโคเลยค่ะ"
52220-152 = "ฮิโตสึเมะเป็นตาที่มองได้จากทุกที่ และมองเห็นได้ทุกอย่างด้วยค่ะ"
52220-153 = "ตราบใดที่มีลูกตาพวกนั้นอยู่ทั่วเฮียกคิยาโค ทุกๆ เรื่องที่เกิดขึ้นในเฮียกคิยาโคก็จะอยู่ในการรับรู้ของ#nเธอคนนั้นค่ะ"
52220-154 = "ต่อให้จะพยายามออกจากเฮียกคิยาโค หรือจะมีใครจากข้างนอกเข้ามาในเฮียกคิยาโค อายาเมะกับตำนานร้อยเรื่องราวก็จะรู้ได้และชิงเคลื่อนไหวก่อนค่ะ"
52220-155 = "บางทีตอนนี้พวกนั้นอาจจะกำลังจับตาดูพวกเราที่กำลังวางแผนหนีออกไปอยู่ก็ได้ค่ะ"
52220-156 = "ผะ... แผนการของพวกเราถูกเปิดเผยงั้นเหรอ? อะ... แอบดูอยู่จากตรงไหนน่ะ?"
52220-161 = "ทะ... ทางโน้นเหรอ?! หรือว่าทางนั้น?!"
52220-162 = "ทะ... ทำยังไงดีล่ะคะ...? ถ้าอย่างงั้นต่อให้พวกเราจะวางแผนอะไร ก็ต้องถูกห้วงอัสดงกลืนกิน#nอย่างหนีไม่พ้นเหรอ..."
52220-163 = "ท่านสึคุโยะ ถึงจะเป็นอย่างนั้นแต่ว่าอย่าเพิ่งยอมแพ้สิคะ!"
52220-164 = "นินจาคือผู้ที่ยอมทุ่มสุดตัวแม้ในสถานการณ์อันตรายเพื่อทำตามคำสั่งของนายท่านนะคะ!"
52220-165 = "ฮุฮุ พูดถูกแล้วละค่ะ"
52220-166 = "แม้เราจะอยู่ในสถานการณ์ที่โดดเดี่ยวเดียวดายหรือกลืนไม่เข้าคายไม่ออก แต่เราจะไม่ทำอะไรเลยไม่ได้หรอกค่ะ"
52220-167 = "พวกเราแค่ต้องจัดการเรื่องนี้ให้ 'กลมกลืน' เหมือนที่เคยทำมาตลอดค่ะ"
52220-168 = "ชมรมวิจัยศาสตร์นินจาทุกคนคะ แทนที่พวกคุณจะช่วยฉันที่นี่ ฉันขอให้พวกคุณไปบอกอะไรกับคาโฮะ#nที่อยู่ในสถานที่จัดงานเทศกาลได้มั้ยคะ?"
52220-172 = "บอกคาโฮะว่าไม่ว่าสถานการณ์จะเป็นยังไง แต่งานเทศกาลก็ต้องดำเนินต่อไปค่ะ"
52220-174 = "คุณนิยะ... ฝากมาบอกอย่างนั้นเหรอคะ?"
52220-175 = "ใช่แล้ว! แต่จะให้จัดเทศกาลวาราคุต่อท่ามกลางความวุ่นวายแบบนี้น่ะเหรอ มันจะเป็นไปได้หรือไง~!"
52220-176 = "ตะ... แต่ถ้าหัวหน้าชมรมหยินหยางพูดอย่างนั้น... ก็แสดงว่าอาจจะมีแผนการหรือชั้นเชิงอะไรอยู่ก็ได้#nนะคะ?"
52220-177 = "คุณนิยะพูดอะไรเพิ่มเติมจากนี้มั้ยคะ?"
52220-178 = "อะ... อืม... พูดว่าจุดประสงค์ของชมรมหยินหยางก็เพื่อรักษาสมดุลในเฮียกคิยาโค เพราะงั้นก็ให้ทำงานต่อไปให้มีความ 'กลมกลืน'..."
52220-182 = "อย่างนี้เองสินะคะ..."
52220-183 = "ขอบคุณชมรมวิจัยศาสตร์นินจาทุกคนนะคะ พวกคุณคงเหนื่อยกันมาก แต่ฉันขอร้องอะไรอีกสักอย่าง#nได้มั้ยคะ?"
52220-184 = "ค่ะ! วางใจอิซุนะได้เลยค่ะ!"
52220-185 = "ช่วยพาคุณชิซุโกะจากชมรมจัดงานเทศกาลมาที่นี่ตอนนี้เลยได้มั้ยคะ?"
52220-190 = "ถ้าชมรมจัดงานเทศกาลมาถึง... ฉันจะจัดเทศกาลวาราคุต่อทันทีค่ะ!"
52220-192 = "ตอนต่อไป;บทเพลงแห่งความปรองดอง"

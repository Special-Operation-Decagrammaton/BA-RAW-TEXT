[translation]
52220-1 = "Episode 22;The Festival Must Go On"
52220-5 = "Kaho, Kaho!"
52220-6 = "...What is it now? Why are you in such a panic?"
52220-7 = "There's less than an hour until the Waraku Festival starts. This had best be as urgent as you're making it seem. Otherwise, Niya should handle it back at the Yin-Yang Club room."
52220-8 = "Or...don't tell me Niya has slipped away again?"
52220-9 = "Yes, Niya has disappeared again. But more importantly..."
52220-10 = "Now?! Of all times?! I warned her until I was blue in the face that her usual tactics would not be tolerated this time."
52220-11 = "But what is more important than our president's negligence?"
52220-12 = "What could possibly be more pressing than her disappearing moments before the Waraku Festival begins?"
52220-13 = "Surely nothing has befallen my sweet idol Chise..."
52220-14 = "I'm right here!"
52220-15 = "Ah, Chise. What a relief."
52220-16 = "Well, if it doesn't have to do with Chise, I hardly see the problem."
52220-17 = "...I think it'd be easier if you just came and saw for yourself."
52220-21 = "What on earth...?"
52220-22 = "Are those...eyes? All over the district?"
52220-23 = "Eyeballs...rolling, rolling, rolling around..."
52220-24 = "Yes! Just a few moments ago, they appeared out of nowhere, and everywhere!"
52220-25 = "Shizuko from the Festival Department has no idea where they came from, so we thought that maybe they were some special attraction you'd arranged for the Waraku Festival."
52220-26 = "This festival is meant to showcase Chise's adorable cuteness! You dare suggest I would decorate it with these...things?!"
52220-27 = "But if even Shizuko doesn't know, then those eyes must be..."
52220-33 = "This unsettling gaze... There's a strange familiarity to it."
52220-34 = "Kaho, can we do a staring contest with that big eye?"
52220-35 = "Absolutely not!"
52220-38 = "Ugh, what the heck are these eyeballs?"
52220-39 = "How creepy... Look! It's blinkin'! You think they're alive?"
52220-40 = "Maybe if we shoot 'em they'll get scared and, uh, roll away..."
52220-41 = "W-Wait a moment! Until we know what we're dealing with, we should abstain from engaging—"
52220-45 = "The bullet...passed right on through?"
52220-46 = "What the heck?! It's like I was shootin' at some illusion!"
52220-54 = "Ah, they're multiplyin'!"
52220-55 = "Ain't that...the monster from the last fire?!"
52220-56 = "This is way out of our league... Run for it!"
52220-60 = "...Artifact Spirits."
52220-61 = "This is the work of Nature's Beauty."
52220-62 = "Of all times, they make their move when the Hyakkaryouran are absent..."
52220-63 = "Or perhaps...that is precisely why they've chosen to act now. Regardless, it's less than ideal."
52220-64 = "Wh-What do we do, Vice President?"
52220-65 = "First, send out a broadcast to all the guests and staff currently in the festival grounds. They must not engage with the monsters!"
52220-66 = "All available staff should focus on safely evacuating every last civilian!"
52220-67 = "B-But...those eyeballs are everywhere. Where can we even take them?"
52220-68 = "W-Well..."
52220-70 = "Vice President Kaho! On top of the eyeballs, the same old-object monsters from last time have appeared! They're attacking everyone in sight!"
52220-71 = "It's like they were waiting for us... They've blocked off every escape route!"
52220-72 = "We can't escape their gazes!"
52220-77 = "Are we going to have to call off the festival?"
52220-78 = "What do we do, Vice President?"
52220-80 = "...Niya."
52220-81 = "If only Niya were here, at least..."
52220-82 = "The best I can do is to evaluate the situation and maintain safety and order..."
52220-83 = "It's beyond my capabilities to formulate a counterattack..."
52220-87 = "...Kaho."
52220-88 = "I'm sorry, Chise."
52220-89 = "All your hard work...and we're going to have to call off the Waraku—"
52220-90 = "No. That's not it."
52220-91 = "Look. A ninja."
52220-92 = "A ninja...?"
52220-98 = "The Ninjutsu Research Club is here!"
52220-99 = "Kaho! You're safe!"
52220-100 = "We got delayed...because of the monsters... We had to shake them off!"
52220-102 = "Ninjutsu Research Club? How are you...?"
52220-103 = "Are you here to help take down these monsters?"
52220-104 = "Um, yes! Technically! But we actually have an urgent message to deliver!"
52220-105 = "Yes, [USERNAME] Sensei gave us a very important mission...!"
52220-106 = "And we have a message from Niya! Nin nin!"
52220-107 = "[USERNAME] Sensei...? And a message from Niya...?"
52220-109 = "About 30 minutes earlier..."
52220-112 = "Nyahaha... How embarrassing."
52220-113 = "Even as a shadow, fighting the Hyakkaryouran president is no walk in the park."
52220-114 = "Ayame truly lives up to her reputation, now doesn't she?"
52220-119 = "I suppose her ghost story will begin snaking its tendrils through Hyakkiyako about now."
52220-120 = "Everything unfolded exactly as I expected...besides me ending up down here. Now all I can do is observe the final acts."
52220-121 = "Ai-yah. I suppose I should've prepared at least one ace up my sleeve."
52220-128 = "Niya!"
52220-129 = "President Niya, we've come to rescue you!"
52220-130 = "Are...you okay, President Niya?"
52220-131 = "...Ninjutsu Research Club? How did you find me...?"
52220-132 = "The three of us have been following you!"
52220-133 = "You see, Sensei bestowed a very special mission upon us before they left."
52220-134 = "Sensei did...?"
52220-135 = "Y-Yes, ma'am! They were worried...that with the Hyakkaryouran away, someone could attack the Yin-Yang Club. So Sensei asked us to secretly guard you, President Niya..."
52220-136 = "Fufu. And working in the shadows to provide discreet protection is the ninja way!"
52220-137 = "...So you mean to tell me that you stood idly by while I was being ambushed by Ayame's shadow?"
52220-141 = "W-Well... It happened out of nowhere, you know? We were taken completely off guard!"
52220-142 = "And more realistically, we really couldn't have done anything against her..."
52220-143 = "Yeah...just watching the way she moved...made me too scared to do anything..."
52220-144 = "Sometimes you just have to know when to pick your battles!"
52220-145 = "Avoid disadvantageous situations, and catch the enemy off guard when they least expect it! That's the ninja way too!"
52220-146 = "So we shadowed you until you were alone!"
52220-147 = "Wow, President! That's how we do things, sneaky-style!"
52220-148 = "This is the perfect chance! We'll get you out of here, Niya!"
52220-149 = "...No. The time for running has long passed."
52220-150 = "Huh...? What...do you mean?"
52220-151 = "The Hitotsume and Artifact Spirits have already spread all across Hyakkiyako."
52220-152 = "And nothing escapes Hitotsume's gaze."
52220-153 = "As long as Hyakkiyako is under its watchful gaze, there's nowhere to hide."
52220-154 = "Whether we try to leave or enter Hyakkiyako, Ayame and the Phantom Fable will be there."
52220-155 = "In fact, they might even be watching us now, as we speak."
52220-156 = "Our plan's been exposed? Wh-Where are they watching from?"
52220-161 = "There?! Or over there?!"
52220-162 = "What...should we do...? If they can...see all our plans...we're all going to be swallowed up by the spirit realm..."
52220-163 = "No, Tsukuyo! We can't give up!"
52220-164 = "Ninjas always fulfill their lord's order! No matter how dangerous, or at what cost!"
52220-165 = "Fufu. I like your style."
52220-166 = "We're cut off and boxed in, but no response is the worst response."
52220-167 = "So we do as we've always done. We maintain balance."
52220-168 = "Ninjutsu Research Club members, instead of rescuing me, could you deliver a message to Kaho at the Waraku Festival?"
52220-172 = "...The festival must go on."
52220-174 = "Niya...said that?"
52220-175 = "Truly? She wants us to hold the Waraku Festival under these conditions? What could she be thinking?"
52220-176 = "B-But since she's the president of the Yin-Yang Club...she must have some kind of plan, right?"
52220-177 = "Did Niya say anything else?"
52220-178 = "Um... She said that the Yin-Yang Club should do what it's always done, which is to maintain balance in Hyakkiyako."
52220-182 = "...Hm."
52220-183 = "Ninjutsu Research Club members, I'm sorry to ask after you've come all this way, but could I ask just one more favor of you?"
52220-184 = "Yes! Leave it to Izuna!"
52220-185 = "Could you please bring Shizuko from the Festival Operations Department here immediately?"
52220-190 = "Once Shizuko arrives, we'll hold a festival that no one will ever forget!"
52220-192 = "Next Episode;Festive Songs For All"

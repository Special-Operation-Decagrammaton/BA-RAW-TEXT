[translation]
52220-1 = "第22話;祭典必須繼續"
52220-5 = "佳穗大人，佳穗大人！"
52220-6 = "看你慌成這樣……有什麼事嗎？"
52220-7 = "距離和樂祭的開幕只剩不到一個小時。#n除了十萬火急的事情之外，都請向部室裡的仁耶大人報告……我應該交代過了才對。"
52220-8 = "難道仁耶大人又逃走了嗎？"
52220-9 = "是的，仁耶大人「又」消失了。#n不過比起這個……"
52220-10 = "居然在這麼重要的時刻又不見人影……#n我明明已經再三叮囑過他，這次絕對不能偷懶的……！"
52220-11 = "話說回來，你剛才說「比起這個」是什麼意思？"
52220-12 = "難道在和樂祭即將開始的此刻，還有比仁耶大人消失更嚴重的問題嗎？"
52220-13 = "該不會是我的甜心偶像，知世醬出了什麼事──"
52220-14 = "我在這裡唷～"
52220-15 = "啊，知世醬。幸好你平安無事。"
52220-16 = "如果跟知世醬無關的話，究竟發生了什麼……？"
52220-17 = "那個……我想您親自出來看看會更好理解。"
52220-21 = "這，這是怎麼回事……"
52220-22 = "圍繞整個學園的那些眼球到底是什麼？"
52220-23 = "四面八方都是滾來滾去的眼球──"
52220-24 = "就是……剛才會場周圍突然出現了大量巨型的眼球型物體。"
52220-25 = "因為就連節慶營運管理部的靜子同學也表示完全不知情，#n我本以為這是佳穗大人為和樂祭準備的特別裝置……"
52220-26 = "我怎麼可能在宣傳知世醬可愛的活動裡，擺上那種詭異的東西！"
52220-27 = "既然連靜子同學也沒有頭緒的話，這些眼睛到底是──"
52220-33 = "這種令人不快卻又似曾相識的視線，總覺得好像在哪裡見過……"
52220-34 = "佳穗，可以跟那些大眼睛打雪仗嗎～？"
52220-35 = "不可以！"
52220-38 = "嘔，這些眼球是什麼鬼啊……"
52220-39 = "有夠噁心……還像活著一樣在不停眨眼。"
52220-40 = "要不要開槍看看？說不定會嚇跑它們。"
52220-41 = "請，請先等一下！#n在弄清楚底細之前，不要隨意刺激那些東西──"
52220-45 = "子彈……直接穿過去了？"
52220-46 = "這到底是什麼啊？#n感覺就像幻影一樣詭異──"
52220-54 = "糟糕，數量開始增加了！"
52220-55 = "這不是……上次火災時出現過的那種怪物嗎……"
52220-56 = "我，我們沒辦法對付它們……大家快逃！"
52220-60 = "……付喪神。"
52220-61 = "是花鳥風月部製造的怪異。"
52220-62 = "偏偏選在百花繚亂不在的時候出現……"
52220-63 = "不，或許是對方有意為之也說不定。#n無論如何，時機都太糟了。"
52220-64 = "佳，佳穗大人。我們該怎麼做呢？"
52220-65 = "先用廣播通知會場裡所有的觀眾和工作人員，絕對不要與那些怪異交戰！"
52220-66 = "其他人則盡可能把市民疏散到那些眼睛的視線範圍之外！"
52220-67 = "可，可是整個學園沒有任何地方能避開那些眼睛的視線，我們該往哪裡逃呢？"
52220-68 = "這，這……"
52220-70 = "佳穗副部長！#n除了那些眼球之外，跟上次火災時一樣的舊物怪物也出現了！它們正在襲擊市民！"
52220-71 = "不管往哪裡逃，好像都被怪物堵住了……"
52220-72 = "完全無法擺脫那些視線！"
52220-77 = "再這樣下去的話，和樂祭恐怕得被迫中止……"
52220-78 = "……佳穗大人，我們該怎麼辦？"
52220-80 = "……仁耶大人。"
52220-81 = "要是仁耶大人能在這裡就好了。"
52220-82 = "我能做的，就只有掌握現狀並整理情況。"
52220-83 = "實在想不出能突破危機的計策……"
52220-87 = "……佳穗。"
52220-88 = "對不起，知世醬。"
52220-89 = "雖然我們努力準備了這麼久，但看來這次和樂祭只能中止──"
52220-90 = "不。不需要那樣。"
52220-91 = "那邊，有忍者。"
52220-92 = "忍者……？"
52220-98 = "忍術研究部，登場！"
52220-99 = "佳穗閣下，您平安無事真是太好了！"
52220-100 = "因為怪物突然出現的關係，花了一些時間才甩掉它們……"
52220-102 = "忍術研究部的各位？#n你們怎麼會在這裡……"
52220-103 = "難道是為了對付這些怪物嗎？"
52220-104 = "能，能幫上忙的話當然沒問題，不過現在有更緊急的事要傳達……"
52220-105 = "是的，我們是受[USERNAME]老師的委託而來！"
52220-106 = "還帶回了仁耶大人的口信，忍忍！"
52220-107 = "[USERNAME]老師……？#n還有仁耶大人的口信……？"
52220-109 = "（約30分鐘前……）"
52220-112 = "喵哈哈……竟然會被抓住，真是沒臉見人呢。"
52220-113 = "不愧是百花繚亂的委員長……即便只是影子也不好對付呢。"
52220-114 = "菖蒲委員長果然不是省油的燈～"
52220-119 = "怪談差不多該開始蔓延了吧。"
52220-120 = "雖然到目前為止還在預料之中……#n不過被這樣綁著，也只能眼睜睜地看著事態發展下去。"
52220-121 = "啊啊～要是早知道會變成這樣的話，就該預留一張底牌才對。"
52220-128 = "仁耶閣下！"
52220-129 = "仁耶部長，我們來救你了！"
52220-130 = "您，您沒事吧，仁耶部長？"
52220-131 = "……忍術研究部的各位？#n你們怎麼會知道這個地方……"
52220-132 = "其實伊樹菜跟夥伴們，剛才就一直跟在您身後了！"
52220-133 = "因為老師他在離開之前，特別委託了我們一件事。"
52220-134 = "老師委託了你們……？"
52220-135 = "是，是的！老師他說如果百花繚亂離開，可能會有人趁機對陰陽部不利，#n所以請我們暗中保護仁耶部長……"
52220-136 = "哼哼～暗中守護目標，也是忍者的職責哦！"
52220-137 = "也就是說……剛才菖蒲委員長的影子襲擊我的時候，你們就在一旁看著？"
52220-141 = "這，這個嘛……當時我們的確因為太慌張的關係，沒能立刻出手……"
52220-142 = "而且就算我們都衝上去，恐怕也無法阻止菖蒲委員長。"
52220-143 = "老，老實說，光是看他的動作，我們的腳就動彈不得……"
52220-144 = "不，不過正面硬拚並不是唯一的辦法！"
52220-145 = "避開不利的局面，等待時機來個出其不意才是忍者的妙計！"
52220-146 = "所以我們就一路跟了過來，等待仁耶大人獨自一人的機會！"
52220-147 = "不愧是部長！潛行之術真高明！"
52220-148 = "來，仁耶大人！現在就跟我們一起離開這裡吧！"
52220-149 = "……不，現在已經無處可逃了。"
52220-150 = "咦……！？#n為，為什麼呢？"
52220-151 = "因為那隻籠罩整個百鬼夜行的眼睛──「一目」。"
52220-152 = "一目既能從任何地方看見，也能看穿一切。"
52220-153 = "只要那隻眼睛覆蓋著百鬼夜行，這裡發生的所有事情就都在他的視線之下。"
52220-154 = "無論任何人想進出百鬼夜行，菖蒲和百物語都會先一步行動。"
52220-155 = "甚至連我們正在策劃逃跑的此時此刻，或許都被他看在眼裡也說不定哦？"
52220-156 = "我，我們的計畫被看穿了？是，是從哪裡看的？"
52220-161 = "那，那邊嗎！？還是這邊！？"
52220-162 = "怎，怎麼辦……？#n這樣無論我們怎麼計畫，最終都會被黃昏吞噬……"
52220-163 = "月夜閣下，即便如此也不能放棄！"
52220-164 = "忍者為了遵守主公的命令，無論多麼危險都要全力以赴！"
52220-165 = "呵呵，說得沒錯。"
52220-166 = "雖然我們孤立無援又進退兩難，也不能坐以待斃。"
52220-167 = "只要像往常一樣「和諧地」做該做的事就行了。"
52220-168 = "忍術研究部的各位。#n麻煩先暫時擱置救我的事，替我向在和樂祭會場的佳穗傳個話吧。"
52220-172 = "──祭典無論如何都必須進行下去。"
52220-174 = "仁耶大人他……真的這麼說嗎？"
52220-175 = "對啊！現在情況這麼混亂，到底要怎麼繼續舉辦和樂祭嘛～！"
52220-176 = "不，不過既然是陰陽部部長的命令……或許他有什麼特別的計策？"
52220-177 = "仁耶大人還有其他指示嗎？"
52220-178 = "這，這個嘛……#n他還說陰陽部的使命是維持百鬼夜行的均衡，#n所以要「和諧地」把該做的事持續下去……"
52220-182 = "……我明白了。"
52220-183 = "忍術研究部的各位。#n雖然你們想必已經很勞累了……可以再拜託你們一件事嗎？"
52220-184 = "是，交給伊樹菜吧！"
52220-185 = "那麼，能麻煩各位立刻將節慶運營管理部的靜子同學帶來這裡嗎？"
52220-190 = "等節慶部抵達之後……我們就會繼續舉辦和樂祭！"
52220-192 = "下一話;四面和樂"

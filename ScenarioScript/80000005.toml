[translation]
80000005-1 = "สินค้าช็อกโกแลตแบบใหม่!"
80000005-2 = "ด้านหน้าร้านป็อปอัป MOMO FRIENDS"
80000005-3 = "ฮือ... จะทำยังไงดี ฉันไม่รู้เลยว่าสินค้าออกใหม่ของท่านเพโรโร่จะเป็นสินค้าลิมิเต็ด..."
80000005-4 = "จะกลับไปเรียกเพื่อนๆ ที่โรงเรียนก็คงมีเวลาไม่พอ ถ้าเกิดตอนที่เดินกลับไปแล้วของหมดขึ้นมา..."
80000005-5 = "[s] \"มีอะไรรึเปล่า?\""
80000005-6 = "อ๊ะ คุณครู! มาได้จังหวะพอดีเลยค่ะ"
80000005-7 = "คือ... ขอแค่วันนี้วันเดียวก็ได้ค่ะ"
80000005-8 = "ช่วยมาเป็นคู่รักกับฉันหน่อยได้หรือเปล่าคะ?"
80000005-9 = "เอ่อ....คือ... ไม่ได้มีความหมายแปลกๆ อะไรแบบนั้นหรอกนะคะ..."
80000005-10 = "[s1] \"ครูพอเข้าใจสถานการณ์แล้ว\"\n[s2] \"ฮิฟุมิอยากซื้อสินค้าคู่รักใช่มั้ยล่ะ?\""
80000005-11 = "อ๊ะ ค่ะ"
80000005-12 = "อ๊ะ ใช่แล้วค่ะ"
80000005-13 = "มีสินค้าใหม่ของท่านเพโรโร่ฉลองเทศกาลวันวาเลนไทน์ออกมาจำหน่ายค่ะ แต่พอไปถึงที่ร้าน พนักงานกลับบอกว่าเป็นสินค้าพิเศษเฉพาะคู่รักน่ะค่ะ..."
80000005-14 = "แต่คุณครูเก่งมากเลยนะคะ เข้าใจสถานการณ์ได้โดยที่ฉันยังไม่ทันได้อธิบายอะไรเลยแท้ๆ"
80000005-15 = "[s] \"เพราะครูรู้จักฮิฟุมิมานานแล้วไงล่ะ\""
80000005-16 = "ฮิฮิ จริงด้วยนะคะ จนถึงตอนนี้ฉันเองก็รู้จักคุณครูมา..."
80000005-17 = "อ๊ะ คุณครู! ตอนนี้ไม่ใช่เวลาที่จะมามัวยืนคุยกันนะคะ ช็อกโกแลตของท่านเพโรโร่เป็นสินค้าลิมิเต็ต#nเอดิชั่น เดี๋ยวจะหมดซะก่อนค่ะ! รีบไปกันเถอะค่ะ!"
80000005-23 = "(หลังจากนั้นคุณครูก็เข้าไปซื้อช็อกโกแลตเพโรโร่สำหรับคู่รักกับฮิฟุมิที่ร้าน)"
80000005-26 = "ไชโย ได้มาแล้วค่ะ! ได้ช็อกโกแลตท่านเพโรโร่แบบลิมิเต็ดเอดิชั่นมาแล้วค่ะ!"
80000005-27 = "แต่น่าเสียดายนะคะที่เหลือแค่ชิ้นเดียว..."
80000005-28 = "ถ้าคุณครูไม่บังเอิญมาเจอเข้า ฉันคงพลาดสินค้าลิมิเต็ดชิ้นนี้แน่ๆ เลยค่ะ ขอบคุณมากๆ เลยนะคะ!"
80000005-29 = "เอ๊ะ? ในถุงมีช็อกโกแลตลิมิเต็ดมาสองชิ้นค่ะ สงสัยพนักงานจะให้เกินมานะคะ?"
80000005-30 = "ไม่สิ... ถ้าเป็นเซ็ตสำหรับคู่รักก็ควรมีสองชิ้นสินะคะ"
80000005-35 = "คุณครูคะ ช่วยรับช็อกโกแลตไปชิ้นนึงด้วยนะคะ"
80000005-36 = "[s] \"ให้ของสำคัญกับครูแบบนี้จะดีเหรอ?\""
80000005-37 = "ดีสิค่ะ ก็คุณครูช่วยให้ฉันซื้อช็อกโกแลตท่านเพโรโร่นี้มาได้นี่คะ"
80000005-38 = "แถมวันนี้ก็เป็นวันวาเลนไทน์ ฉันคิดว่าถ้าให้ช็อกโกแลตกับคุณครูก็คงจะดี..."
80000005-39 = "ช่วยรับไว้ด้วยเถอะนะคะ!"

[translation]
80000005-1 = "All-New Chocolate Merch!"
80000005-2 = "Momo Friends Pop-up Store"
80000005-3 = "Aw... What am I gonna do? I didn't think they'd limit who could and couldn't buy the newest Peroro merch."
80000005-4 = "There's no time to ask a friend to come from school.#nWhat if it sold out before they got here?"
80000005-5 = "[s] \"Hey, Hifumi. Something wrong?\""
80000005-6 = "Sensei! You got here just in time."
80000005-7 = "Um, just for today..."
80000005-8 = "...can we be a couple?"
80000005-9 = "It's not that I, you know, but I... You're the only one I can rely on..."
80000005-10 = "[s1] \"Ah, I get it. I see what's going on here.\"\n[s2] \"You need me to score some couples-only merch, huh?\""
80000005-11 = "Yeah... You got me."
80000005-12 = "Yeah... You got me."
80000005-13 = "New Peroro merch was released for Valentine's Day,#nbut I just learned that it's only limited to couples..."
80000005-14 = "You figured it out without me even having to tell you.#nThat's amazing."
80000005-15 = "[s] \"I know my Hifumi.\""
80000005-16 = "Heehee. I guess you do. We've known each for a while now..."
80000005-17 = "Wait! We don't have time to be standing around like this!#nThat merch is super-limited, so it'll sell out if we don't hurry!"
80000005-23 = "Hifumi and I bought the couples-only Peroro chocolate from the pop-up store."
80000005-26 = "Score! We got the limited edition Peroro chocolate!"
80000005-27 = "That was a close call. We got the last ones left."
80000005-28 = "I wouldn't have been able to get it if not for you.#nThanks so much, Sensei!"
80000005-29 = "Oh, I only needed one chocolate, but they gave us two."
80000005-30 = "They must come as a set because it's meant for couples."
80000005-35 = "Here, Sensei. You take the other one."
80000005-36 = "[s] \"Are you sure? It's still a limited edition.\""
80000005-37 = "I was only able to get mine thanks to you."
80000005-38 = "Besides... Today is Valentine's Day, so I want you to have it."
80000005-39 = "I hope you like it!"

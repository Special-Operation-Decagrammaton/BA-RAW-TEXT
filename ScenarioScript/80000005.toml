[translation]
80000005-1 = "新的巧克力產品！"
80000005-2 = "Momo好友專賣店前"
80000005-3 = "嗚……怎麼辦。沒想到佩洛洛大人的新周邊居然會有購買條件……"
80000005-4 = "朋友好像都不在附近，就算請他們過來，要是在等的期間賣完……"
80000005-5 = "[s]「嗨，日步美。遇到什麼困難了嗎？」"
80000005-6 = "啊，老師！你來得正好……！"
80000005-7 = "那個，只要今天就好……"
80000005-8 = "可，可以跟我成為情侶嗎？"
80000005-9 = "啊，那個……這個……我沒有奇怪的意思……"
80000005-10 = "[s1]「原來如此，我了解了。」\n[s2]「你想買情侶專用的周邊商品對吧？」"
80000005-11 = "啊……是的，沒錯。"
80000005-12 = "啊……是的，沒錯。"
80000005-13 = "這次為了慶祝情人節推出了新的佩洛洛大人巧克力，#n但是我到店裡才發現只限情侶購買……"
80000005-14 = "我都還沒說明就知道是怎麼回事，不愧是老師！"
80000005-15 = "[s]「畢竟我跟日步美都認識這麼久了。」"
80000005-16 = "呵呵，也是。我跟老師已經認識……"
80000005-17 = "現在不是說這些的時候！佩洛洛大人的巧克力說不定快賣完了！#n老師，快點去店裡面吧！"
80000005-23 = "（之後，和日步美一起買了情侶限定的佩洛洛巧克力）"
80000005-26 = "成功買到了呢！順利入手佩洛洛大人的情人節限定巧克力了！"
80000005-27 = "沒想到我們居然買到最後一份……真是好險呢。"
80000005-28 = "要不是老師正好路過，我可能就錯過這次的限定周邊商品了。真的很謝謝你！"
80000005-29 = "咦？限定巧克力有兩盒呢，是店員搞錯了嗎……？"
80000005-30 = "……啊，不對。因為是情侶用的商品，應該本來就是兩盒才對。"
80000005-35 = "來，請收下。一盒給老師。"
80000005-36 = "[s]「這麼寶貴的限定商品，真的可以給我嗎？」"
80000005-37 = "嗯。之所以能買到這個都是託老師的福呀。"
80000005-38 = "而且今天是情人節，我也想送老師禮物……"
80000005-39 = "啊，沒什麼，總之老師能珍惜的話我會很開心的！"

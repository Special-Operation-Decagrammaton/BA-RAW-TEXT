[translation]
80000005-1 = "#title;신상 초콜릿 굿즈!"
80000005-2 = "#place;모모프렌즈 팝업 스토어 앞"
80000005-3 = "3;히후미;01;하우우…… 이를 어쩌죠. 설마 페로로 님의 신작 굿즈에 제한이 걸려 있었을 줄은…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
80000005-4 = "3;히후미;99;학교로 돌아가서 친구를 불러오기에는 시간이 없을 것 같고, 그사이에 매진이라도 되어버린다면……."
80000005-5 = "[s] \"무슨 문제라도 있어?\""
80000005-6 = "3;히후미;02;앗, 선생님! 마침 잘 오셨어요.\n#3;em;[반응]"
80000005-7 = "3;히후미;04;저, 오늘만이라도 좋으니까……"
80000005-8 = "3;히후미;06;저와 커플이 되어 주지 않으시겠어요?\n#3;hophop"
80000005-9 = "3;히후미;04;아, 그게…… 그러니까…… 그런 이상한 뜻이 아니라…….\n#3;em;[///]"
80000005-10 = "[s1] \"상황은 이해했어.\"\n[s2] \"커플 전용의 굿즈를 구하고 싶은 거지?\""
80000005-11 = "3;히후미;04;앗…… 네, 맞아요."
80000005-12 = "3;히후미;04;앗…… 네, 맞아요."
80000005-13 = "3;히후미;99;이번 발렌타인 데이를 기념하여 페로로 님의 신상 초콜릿 굿즈가 출시되었는데, 가게에 도착해보니 커플 손님에게만 판매한다고 해서…….\n#3;em;[...]"
80000005-14 = "3;히후미;02;설명도 하지 않았는데 바로 눈치채시다니, 선생님도 눈썰미가 대단하시네요."
80000005-15 = "[s] \"히후미와는 이미 오랫동안 알고 지냈으니까.\""
80000005-16 = "3;히후미;03;후후, 그렇네요. 선생님을 만나게 된 지도 벌써……"
80000005-17 = "3;히후미;05;앗, 선생님! 이러고 있을 시간이 없어요. 페로로 님의 신상 초콜릿은 한정 상품이기 때문에 금방 매진될지도 몰라요! 어서 들어가죠!\n#3;em;[!]\n#3;stiff"
80000005-18 = "#st;[0,0];instant;1;"
80000005-19 = "#clearST"
80000005-20 = "3;히후미;05\n#3;dl\n#wait;1000"
80000005-21 = "#all;hide"
80000005-22 = "#wait;2000"
80000005-23 = "#na;(이후 가게에 들어가 히후미와 함께 커플 전용 페로로 초콜릿을 사서 나왔다.)"
80000005-24 = "#all;hide"
80000005-25 = "#wait;2500"
80000005-26 = "3;히후미;03;구입 성공이네요! 페로로 님의 발렌타인 한정 초콜릿을 무사히 손에 넣었어요!\n#3;em;[음표]\n#3;a"
80000005-27 = "3;히후미;04;하지만 저희가 구입한 상품이 마지막 재고였다니…… 아슬아슬했네요.\n#3;stiff"
80000005-28 = "3;히후미;03;선생님이 마침 그 자리를 지나가지 않으셨다면 이번 한정 굿즈는 놓치고 말았을 거예요. 정말 감사합니다!"
80000005-29 = "3;히후미;02;어라? 그런데 한정 초콜릿이 두 세트나 들어있네요. 점원의 착오일까요?\n#3;em;[?]"
80000005-30 = "3;히후미;05;……아니, 생각해보면 커플 전용의 상품이니 두 세트가 있는 게 당연하겠네요."
80000005-31 = "#st;[0,0];instant;1;"
80000005-32 = "#clearST"
80000005-33 = "3;히후미;99\n#3;em;…\n#wait;2500"
80000005-34 = "3;히후미;99\n#3;d\n#wait;1000"
80000005-35 = "3;히후미;01;선생님. 초콜릿 한 세트는 선생님이 받아주세요.\n#3;a\n#3;closeup"
80000005-36 = "[s] \"귀한 한정 굿즈를 내게 주어도 괜찮아?\""
80000005-37 = "3;히후미;03;네. 선생님 덕분에 이 페로로 님 초콜릿을 구할 수 있었으니까요.\n#3;greeting"
80000005-38 = "3;히후미;00;게다가 오늘은 발렌타인 데이니, 모처럼 선생님께 초콜릿을 선물하면 좋을 것 같아서……\n#3;em;[///]\n#3;stiff\n#fontsize;55"
80000005-39 = "3;히후미;03;그러니 부디 소중히 여겨주세요!\n#3;hophop"

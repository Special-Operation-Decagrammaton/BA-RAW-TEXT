[translation]
101090-1 = "第9話;衝突（１）"
101090-2 = "……那邊怎麼樣……"
101090-3 = "戒嚴令已……但是，聯邦學生會……"
101090-4 = "……女武神……"
101090-5 = "將軍傳來聯絡……還有……"
101090-6 = "[ns1]「…………」\n[ns2]睜開眼睛"
101090-9 = "[ns3]（沒看見希迪姆的箱子……）\n[ns4]（被拿走了嗎）"
101090-13 = "……還在待機中。#n我聽說那個箱子別說是駭入了，連電源都無法開啟。"
101090-14 = "在嘗試與總公司的數據中心連線後，#n似乎有8間公司都被斷電了。"
101090-15 = "所以現在才會一團亂。"
101090-16 = "剩下的方法只有那個老師了吧。"
101090-17 = "……啊？剛才的槍聲你有聽見嗎？"
101090-18 = "槍聲？"
101090-22 = "喂，在上面！"
101090-23 = "走吧！"
101090-36 = "哈啊……哈啊……"
101090-40 = "您平安無事嗎？[USERNAME]老師……"
101090-41 = "[ns]（這個聲音是……）"
101090-43 = "您沒事真是太好了。#n為了找出這個地方費了不少功夫……幸好沒有放棄。"
101090-44 = "[s]「環奈……！？」"
101090-45 = "──啊啊。我這種三流的惡人，您居然還記得啊。"
101090-46 = "我現在就為您開門，請稍等……咳咳。"
101090-47 = "……唔。"
101090-48 = "[s]「環奈，你的傷……」"
101090-49 = "這是……沒什麼，請您別在意。"
101090-53 = "哈，呼……來，請把手伸出來。"
101090-54 = "[ns]離開監牢"
101090-56 = "我想您應該有很多問題想問，不過目前離開這裡才是最優先的。"
101090-57 = "請跟我來。"
101090-61 = "[ns] 跟上去"
101090-64 = "什，什麼！？"
101090-65 = "嗚呃！？"
101090-77 = "這些傢伙是偽裝成女武神學生的PMC士兵……咳咳，咳咳。"
101090-78 = "[s]「是啊。我也是剛剛才知道……這裡是……？」"
101090-79 = "這是位於D.U.的女武神第3分校。#n因為預算不足的關係，本來是用於新生合宿的建築物……"
101090-80 = "不知何時卻落入了凱薩的手中。"
101090-81 = "[s]「凱薩……」"
101090-82 = "恐怕，在女武神內部有他們的協力者吧。"
101090-83 = "凱薩的魔掌究竟已經伸向女武神的何處，#n我無從得知……"
101090-84 = "不過部分的原因，就是因為有我這種墮落的警察存在。"
101090-85 = "[s]「……環奈。」"
101090-90 = "……我已經發送了信號，接下來前往後門吧。"
101090-91 = "已經準備好能逃出被封鎖的D.U.的路線了。"
101090-92 = "[s5]「封鎖……逃出……？」\n[s6]「到底發生什麼事了？」"
101090-95 = "……走吧。"
101090-99 = "[ns] 跟上去"
101090-108 = "這是……本來預計在這裡碰頭的，警備已經加強了嗎……"
101090-109 = "什麼人！！"
101090-110 = "在這裡！開火！！"
101090-114 = "唔……！老師，危險！"
101090-119 = "[ns]「環奈！！」"
101090-123 = "呃啊！？"
101090-124 = "居然……還有援軍……"
101090-131 = "老師！您沒事吧！？"
101090-132 = "唔唔……真不像是我會做的事，事情怎麼會變成這樣……"
101090-133 = "[s7]「桐乃！吹雪！！」\n[s8]「生活安全局，你們來了啊！」"
101090-136 = "哈啊……哈啊……幸好趕上了。"
101090-137 = "你，你有看到嗎！？本官完美又精準的射擊──咦，環奈公安局長！？"
101090-138 = "哇啊，好像很痛呢……還好嗎？"
101090-139 = "這不算什麼。我並不想成為你們的累贅。#n確保撤退的路線吧。"
101090-140 = "我知道了！那麼老師，請跟著本官和吹雪！"
101090-141 = "似乎還沒被敵人發現，狂犬──不，環奈局長也要小心地跟上來哦。"
101090-146 = "真是驚人的警戒狀態……嗚。"
101090-152 = "哈啊……哈啊……稍微，等等……"
101090-153 = "桐乃，局長似乎有點吃力。#n稍微放慢速度吧。"
101090-154 = "啊，失，失禮了！"
101090-155 = "先稍作休息，進入那邊的建築物吧。"
101090-156 = "好，走吧。"
101090-158 = "我想這裡應該是安全的。"
101090-159 = "不過沒時間了。稍微喘口氣就得趕快移動。"
101090-160 = "這裡是……哈啊……哈啊……"
101090-161 = "環奈局長……"
101090-162 = "為什麼要做這種不適合你的事呢？#n明明像個公安局長好好調查就好了……居然還特地跑到這種地方……"
101090-163 = "我可不能，把責任轉嫁給別人……"
101090-164 = "……"
101090-165 = "我想也是。"
101090-166 = "在這個利害關係錯綜複雜的情況下……#n我總不能，命令部下違反規則……跟上來吧。"
101090-167 = "[s]「我不在的期間，究竟發生了什麼事？」"
101090-168 = "……"
101090-169 = "這個嘛……"
101090-170 = "……6小時前，凱薩PMC襲擊了聯邦學生會。"
101090-173 = "指揮凱薩PMC的高階指揮官……通稱「將軍」解散了行政委員會，掌握了聖所之塔。並在D.U.全區發布了戒嚴令。"
101090-175 = "往來D.U.的所有交通網與通訊網都被切斷，#n包含女武神在內的其他機關也失去行政權限，目前處於等待命令的狀態……"
101090-177 = "現在D.U.的治安由於戒嚴令的關係，掌握在凱薩PMC手裡。"
101090-179 = "而我，像這樣救出老師並與凱薩PMC敵對的行為，#n就和違背了組織的命令沒什麼兩樣。"
101090-180 = "生活安全局的學生並不是維持治安的組織，#n因此只要說是「遵從碰巧遇見的上司的命令」，應該就不會被追究責任了吧。"
101090-181 = "本，本官並不在意那種事！#n為了正義，這種程度──"
101090-182 = "如果你們不在了，奇普托斯的交通怎麼辦？#n生活遇到困難的居民會怎麼樣呢？"
101090-183 = "既然各自所擁有的能力與立場不同，應該背負的責任也不一樣。"
101090-184 = "把你們牽扯進我的任務……之後再讓我好好賠罪吧。"
101090-185 = "……我的話只要一箱Master Donut的糖霜甜甜圈就夠了。"
101090-186 = "甜甜圈想拿多少都可以。公安局的辦公室裡多的像山一樣。"
101090-188 = "回歸正題吧。#n在老師下落不明之後──"
101090-190 = "行政官設立了「緊急對策委員會」並召集了各個自治區的代表。#n這點我想您應該知道。"
101090-191 = "因為老師本來也預計會參加。"
101090-192 = "但在那之後……本應從夏萊建築物出發的老師便不知去向……"
101090-196 = "情況如何？"
101090-197 = "沒辦法，到處都找不到老師的蹤跡。"
101090-198 = "……"
101090-199 = "琳前輩……"
101090-200 = "……我知道了。桃香請繼續追查老師的行蹤。#n無論使用任何手段，請一定要找到老師。"
101090-201 = "知道了～#n我會試試看的……"
101090-202 = "因為無法取消緊急對策委員會的召集，將依照計畫進行。"
101090-203 = "前輩……與防衛室的香耶同學也無法取得聯絡……"
101090-204 = "……阿拜多斯因為緊急狀況將會缺席。#n千年的莉央同學也沒有任何回應……"
101090-206 = "有很多人都是因為夏萊的老師會參加才回應了召集……#n這樣下去的話……"
101090-207 = "……"
101090-209 = "在老師不在的情況下，即使設立了緊急對策委員會──"
101090-213 = "……以上就是在奇普托斯各處出現的超高濃度能量體現象的全貌。"
101090-214 = "阿拜多斯沙漠、D.U.近郊的廢棄遊樂園、千年郊外的封鎖地區、三一與格黑娜的邊界附近、千年近郊的新都市……以及D.U.的聖所之塔。"
101090-215 = "為了查明此一現象，各自治區的協助是必不可少的。#n還請各位協助。"
101090-217 = "請先稍等。老師在哪裡呢？#n我聽說「夏萊」也會參加緊急對策委員會。"
101090-218 = "這，這個……"
101090-219 = "現在有比這更迫切的案件必須和「夏萊」討論。"
101090-220 = "更迫切的案件……櫻子同學，你指的是？"
101090-221 = "這……在這裡說的話，有點……"
101090-222 = "修女會又有事隱瞞著我們嗎！"
101090-223 = "我們也有事要向老師傳達。是和本案有密切關係的事。"
101090-224 = "那孩子在睡覺耶，還好嗎？#n聖亞醬明明在發言，是覺得很想睡嗎？"
101090-226 = "真琴前輩，請起來……現在大家都在看著前輩……"
101090-227 = "嘻嘻嘻……我並不是在睡覺。只是覺得那個連搖籃曲都算不上的噪音很不舒服而已。"
101090-228 = "吶～什麼時候才會結束？#n伊吹沒吃早餐，肚子餓了……"
101090-229 = "嘿，搖籃曲……？#n那我就讓你睡得更熟──"
101090-230 = "彌香，坐下吧。"
101090-231 = "啊哈哈，我只是想拉一下椅子而已☆"
101090-233 = "請等一下，我還沒有聽到回答。#n老師在哪裡呢？"
101090-234 = "不用問也知道。八成是被聯邦學生會藏起來了吧！#n也就是說，這個會議根本就毫無意義！"
101090-235 = "這是聯邦學生會的陰謀！#n連這點程度的陰謀都沒看穿，還能稱得上是君臨於學園頂點之人嗎？嘻嘻嘻。"
101090-236 = "啊啊真是的，都怪前輩說出那種話，情況越來越複雜了……"
101090-239 = "各位……請安靜一點。#n我們也正在尋找老師的行蹤。"
101090-240 = "尋找行蹤……？#n意思是老師下落不明嗎？"
101090-241 = "繼續討論也沒有意義。#n對方是夏萊就算了，我們和聯邦學生會無話可說！伊呂波、伊吹、皐月！回去了！"
101090-242 = "咦？請，請等一下……！"
101090-243 = "……以目前的情況來看，可疑之處確實不少。"
101090-244 = "沒錯。我們也試著分析眼前的情況吧，聖亞同學、彌香同學。"
101090-245 = "……看來，這不像是可以合作的狀況呢。"
101090-246 = "……"
101090-248 = "慢著！怎麼沒有布丁啊！#n咱都特地跑到這種地方來了！"
101090-249 = "會長，學園傳來了緊急消息。"
101090-250 = "……什麼，政變！？#n在咱外出的期間！"
101090-251 = "這次是「寒冬的乾布摩擦聯盟」？還有那種聯盟啊……？#n算了，無所謂！智惠，回去了！去鎮壓政變！"
101090-253 = "……唉，看來沒有那麼簡單呢……"
101090-254 = "這種事要做到什麼時候呢……？"
101090-255 = "……下次會議是哪些學園呢？"
101090-256 = "是，下次是──"
101090-261 = "──沒有下次了。"
101090-262 = "！！"
101090-263 = "財，財務室長……！"
101090-264 = "碧……"
101090-269 = "防衛室長下落不明了。#n因為這個「緊急對策委員會」而受到權限侵害最嚴重的人……#n偏偏在這個節骨眼消失。"
101090-270 = "那是……"
101090-271 = "而且，夏萊的老師也下落不明。#n我說……要說這是偶然，未免也太巧了吧？"
101090-272 = "……"
101090-273 = "還確認到SRT解散後出現的空缺將會由PMC填補這件事。#n雖然是無記名交易，但只要追蹤帳簿馬上就會知道。"
101090-274 = "將聯邦學生會的權力分給私人企業的計畫……#n這就是你的目的嗎？"
101090-275 = "……"
101090-276 = "琳行政官──是你在背後穿針引線的嗎？#n從哪裡開始是你的計劃呢？#nSRT的解散？夏萊的成立？還是──"
101090-278 = "──聯邦學生會長的失蹤？"
101090-279 = "我……"
101090-280 = "對不起，琳前輩。#n──到此為止吧。"
101090-284 = "那，那是……"
101090-285 = "是對你的不信任案唷。#n行政委員會過半數的6名成員，同意了琳行政官的不信任案。"
101090-286 = "……！"
101090-287 = "這是正式生效的命令書。#n前輩的行政命令，直到再信任投票通過為止將會全部停止。"
101090-289 = "下一話;衝突（２）"

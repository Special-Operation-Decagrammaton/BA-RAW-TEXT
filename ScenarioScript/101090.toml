[translation]
101090-1 = "Episode 9; Collision 1"
101090-2 = "How did they..."
101090-3 = "Martial law... But...the General Student Council..."
101090-4 = "Valkyrie..."
101090-5 = "A message from the general...and..."
101090-6 = "[ns1] \"...\"\n[ns2] Open your eyes."
101090-9 = "[ns3] \"(I don't see the Shittim Chest...)\"\n[ns4] \"(Did they take the Shittim Chest...?)\""
101090-13 = "We're still standing by. They haven't had any success turning on the Chest, let alone hacking it."
101090-14 = "They tried to connect to it with our servers, and eight of HQ's data centers were shut down."
101090-15 = "Everything's in an uproar."
101090-16 = "The only solution may be to utilize Sensei."
101090-17 = "Did you hear that?! Was that a gunshot?"
101090-18 = "Gunshot?!"
101090-22 = "It's coming from above!"
101090-23 = "Let's go!"
101090-36 = "*pant* *pant*"
101090-40 = "Fancy seeing you here, [USERNAME] Sensei."
101090-41 = "[ns] \"(That voice...)\""
101090-43 = "What a relief... I went through hell to find this place, but at least you're okay."
101090-44 = "[s] \"Kanna...?!\""
101090-45 = "Huh. You remember me. I didn't think a third-rate villain like me would play a big enough role in your story."
101090-46 = "Let me... *cough cough* ...get you out now... *cough*"
101090-47 = "Ugh."
101090-48 = "[s] \"Kanna, what happened? Why are you so injured?\""
101090-49 = "Oh, this? Perils of the job, don't worry about it."
101090-53 = "*pant* *pant* ...Okay. It should be open."
101090-54 = "[ns] Leave the cell."
101090-56 = "This way, Sensei... I'm sure you have a lot of questions, but we need to get somewhere safe first."
101090-57 = "Follow behind me."
101090-61 = "[ns] Follow Kanna."
101090-64 = "Wh-What?!"
101090-65 = "Gah?"
101090-77 = "They're all PMC soldiers disguised... *cough* as Valkyrie students... *cough cough*"
101090-78 = "[s] \"I knew that, but where are we?\""
101090-79 = "It's the third satellite school of Valkyrie Police School at D.U. It was only used for new Valkyrie student training because of the lack of budget..."
101090-80 = "I didn't realize it fell into the hands of the Kaiser Corporation..."
101090-81 = "[s] \"Kaiser...\""
101090-82 = "They must have had help from someone within Valkyrie."
101090-83 = "I don't know how far the Kaiser Group's hand reaches within Valkyrie..."
101090-84 = "But... I know this couldn't have happened like this without corruption in the ranks."
101090-85 = "[s] \"...Kanna.\""
101090-90 = "What's done is done. I've sent the signal. We need to make our way to the back entrance of the building."
101090-91 = "I've prepared a way to escape the blocked D.U."
101090-92 = "[s5] \"Escape...? Blocked...?\"\n[s6] \"What the hell is happening?\""
101090-95 = "...We have to keep moving."
101090-99 = "[ns] Follow her."
101090-108 = "This is bad. They're already on high alert. This was our designated meeting spot."
101090-109 = "Who's there?!"
101090-110 = "It's them! Fire!"
101090-114 = "Sensei, watch out!"
101090-119 = "[ns] \"Kanna!\""
101090-123 = "A-Ack?!"
101090-124 = "R-Reinforcements...!"
101090-131 = "Sensei! Are you okay?!"
101090-132 = "Ugh... I can't believe this is happening."
101090-133 = "[s7] \"Kirino! Fubuki!\"\n[s8] \"The Public Safety Bureau!\""
101090-136 = "*pant pant* Just in time."
101090-137 = "Did you see that? My shot! It was perfect! ...Huh?! Director Kanna?!"
101090-138 = "Whoa... You're a mess. Are you okay?"
101090-139 = "The last thing we need in this situation is another burden. Focus on the mission and secure the retreat route."
101090-140 = "Understood, Director! Sensei, please follow me and Fubuki! "
101090-141 = "I think it was just those two guards so far. Feral Hound... I mean, Director Kanna, we'll lead the way."
101090-146 = "Security's real tight... Ugh..."
101090-152 = "*pant* *pant* Just...need a moment... *pant*"
101090-153 = "Kirino, Director Kanna is heavily injured. We need to slow down."
101090-154 = "Y-You're right. My apologies!"
101090-155 = "Time for my expertise: taking a break. Quick, everyone, into this empty building."
101090-156 = "On it!"
101090-158 = "We should be safe for the time being. "
101090-159 = "Emphasis on \"the time being.\" We can't dilly-dally for too long."
101090-160 = "This place is... *pant* *pant*"
101090-161 = "Director..."
101090-162 = "If you don't mind me asking, what are you doing out here? Your job as the Public Peace Bureau director is interrogation. Why go to all this effort?"
101090-163 = "I...I had to take responsibility..."
101090-164 = "..."
101090-165 = "...I should have figured as much."
101090-166 = "The situation is too complex with too many conflicting parties. I couldn't ask my subordinates to break the law if I wasn't willing to do it myself."
101090-167 = "[s] \"Update me on what's happened since I was captured.\""
101090-168 = "..."
101090-169 = "That's..."
101090-170 = "...Kaiser PMC attacked the General Student Council six hours ago."
101090-173 = "A high-ranking commander of Kaiser PMC known as the general...took over and disbanded the Administration Board, occupied the Sanctum Tower, and declared martial law all over D.U."
101090-175 = "All transportation and communication networks to and from D.U. have been cut off, and other agencies, including Valkyrie, have lost administrative authority and are awaiting orders..."
101090-177 = "Currently, all D.U. security has been transferred to Kaiser PMC through martial law."
101090-179 = "The fact that I, the leader of a security organization, am now helping you and antagonizing Kaiser PMC is tantamount to disobeying the law."
101090-180 = "The Public Safety Bureau students…aren't a public security organization in the first place, so if I testify that you've fulfilled the order of a superior you \"accidentally\" got involved with, you two could at least avoid responsibility."
101090-181 = "I don't care if I'm breaking their laws! I'll do anything to serve justice, real justice!"
101090-182 = "Don't be so short-sighted. Without you, who will be in charge of traffic in Kivotos? Especially in times like these, who will help citizens in trouble?"
101090-183 = "You and I have different abilities, which means we each have to do our utmost to fulfill what duties only we can fulfill."
101090-184 = "When I can, I'll compensate you for putting you in such a precarious situation."
101090-185 = "All I want is a dozen glazed donuts from Master Donuts."
101090-186 = "If that's all you want, stuff yourself full. There's a whole pile of them in the Public Peace Bureau office."
101090-188 = "Back to the subject, Sensei. I don't have the whole picture, but I'll tell you everything I know."
101090-190 = "As you know, the chief officer held an Emergency Response Committee and summoned representatives from each district."
101090-191 = "We were all expecting your presence there, Sensei."
101090-192 = "But, as you well know, you went missing from Schale."
101090-196 = "Any update?"
101090-197 = "Zilch. Sensei's disappeared without a trace. "
101090-198 = "..."
101090-199 = "Rin..."
101090-200 = "...Okay. Continue searching, Momoka. No matter what it takes, no matter how small the clue, find something."
101090-201 = "I mean, I'll try..."
101090-202 = "We can hardly cancel the Emergency Response Committee at this point. We'll proceed as planned."
101090-203 = "But we can't get a hold of Chief of Defense Kaya either..."
101090-204 = "Abydos seems to have had an emergency they need to attend to. Rio of Millennium hasn't even responded."
101090-206 = "And most organizations only agreed to participate on the condition of Sensei's presence at the meeting..."
101090-207 = "..."
101090-209 = "The Emergency Response Committee meeting was carried out without you there, Sensei..."
101090-213 = "...This is the full picture of the ultra-high energy mass phenomena currently manifesting throughout Kivotos."
101090-214 = "The Abydos Desert, the abandoned amusement park near D.U., the closed area in the Millennium outskirts, the border area between Trinity and Gehenna, that new town near Millennium...and the D.U. Sanctum Tower."
101090-215 = "We are requesting the cooperation of each district to investigate this potential threat."
101090-217 = "Where is Sensei? I was told that Schale will be participating in the Emergency Response Committee."
101090-218 = "Th-That..."
101090-219 = "We have more urgent matters to discuss with Schale. Are they not here?"
101090-220 = "What could be more urgent than this, Sakurako?"
101090-221 = "It is...a delicate matter."
101090-222 = "What cannot be discussed here? What is the Sisterhood hiding this time?!"
101090-223 = "We have something we believe to be related to this incident that we must discuss with Sensei as well."
101090-224 = "Now, what could this be? She couldn't possibly be sleeping while Seia is talking, could she? I'd expect at least a modicum of respect from Gehenna."
101090-226 = "Makoto, please get up... Everyone is looking at you..."
101090-227 = "Heeheehee. I'm not sleeping, Iroha. I'm just tuning out all the nonsense."
101090-228 = "Are we done yet? Ibuki didn't get to have breakfast, and Ibuki's hungry!!"
101090-229 = "...Nonsense? Now that I think about it, if you're having trouble sleeping, I'm considered something of an expert at helping people sleep. Permanently."
101090-230 = "Mika, it's fine. Please sit down."
101090-231 = "Heehee. ☆ I was just adjusting my chair. I wasn't getting up, promise."
101090-233 = "Back to my original question. Where is Sensei?"
101090-234 = "The General Student Council is obviously hiding Sensei! This meeting is pointless!"
101090-235 = "This whole thing is a conspiracy! Haven't you nitwits figured that out yet?"
101090-236 = "Makoto, if you throw a wild accusation out there like that..."
101090-239 = "Order, please. We're doing everything we can to locate Sensei."
101090-240 = "Locate...? Has Schale's Sensei disappeared?"
101090-241 = "I see no point in discussing this further without Schale's presence. We have nothing to say to the General Student Council. Iroha, Ibuki, Satsuki, we're leaving!"
101090-242 = "W-Wait a minute, Makoto...!"
101090-243 = "I find all the circumstances of this situation incredibly suspicious."
101090-244 = "I must agree with Mine. Seia, Mika, the Tea Party will proceed independently of the General Student Council."
101090-245 = "Yes. They can't expect us to trust them with the current situation."
101090-246 = "..."
101090-248 = "Wait! There's no pudding! How can there be no pudding when I came all the way here?"
101090-249 = "President... There's an urgent message from the academy."
101090-250 = "What?! A coup d'état again while I was gone?!"
101090-251 = "Where did it happen this time? The Midwinter Cold Water Friction Federation? I've never heard of them... Anyway, let's go back, Tomoe! Let's go subdue the coup!"
101090-253 = "*sigh* I guess we shouldn't have expected anything less..."
101090-254 = "Do we have to keep doing this...?"
101090-255 = "What's the next district to discuss?"
101090-256 = "Yes, Chief Officer! The next district is..."
101090-261 = "There is none."
101090-262 = "!"
101090-263 = "Ch-Chief of Finance!"
101090-264 = "Aoi..."
101090-269 = "I have topics I would like to discuss. The chief of defense's disappearance is oddly convenient. The Emergency Response Committee infringes upon her office and rights more so than any other department."
101090-270 = "That's..."
101090-271 = "Not only that, Schale's Sensei is suddenly missing. Isn't that too much of a coincidence?"
101090-272 = "..."
101090-273 = "I've also confirmed that PMC was used to fill the void created after SRT disbanded. The exchange was anonymous, but I was able to figure it out by tracking the financial metrics."
101090-274 = "A plan to hand over the General Student Council's power to private companies... Was this all part of your greater scheme?"
101090-275 = "..."
101090-276 = "Chief Officer. Are you the mastermind of all these incidents? Has everything gone to plan? The dissolution of SRT? The establishment of Schale? And what about..."
101090-278 = "The missing president of the General Student Council?"
101090-279 = "...! That's... I...!"
101090-280 = "I'm sorry, Rin. That's enough."
101090-284 = "Th-That..."
101090-285 = "Here's the motion of Rin's censure. A majority of six members of the Administration Board agreed that they have no confidence in Chief Officer Rin."
101090-286 = "...!"
101090-287 = "This is the formally issued order. Now all executive orders will be suspended until a vote of confidence is conducted."
101090-289 = "Next Episode; Collision 2"

[translation]
83306050400-11 = "สมุดบันทึกเล่มนี้น่าจะเป็นเล่มสุดท้ายที่ถูกทิ้งไว้ในห้องเปียโนสินะ"
83306050400-14 = "ถึงจะน่าเสียดาย แต่วันนี้ฉันจะล้มเลิกความฝันนี้แล้ว"
83306050400-15 = "เหตุผลก็ไม่มีอะไรมาก ก็แค่สิ่งที่อยากทำกับสิ่งที่ทำได้... มันไม่ใช่สิ่งเดียวกัน"
83306050400-20 = "น่าเสียดายที่ฉันจะต้องละทิ้งความฝันไว้แค่เท่านี้... แต่ฉันจะทิ้งหนังสือโน้ตเพลง กับสมุดบันทึกเอาไว้ด้วยกันที่นี่"
83306050400-21 = "ถ้ามีใครมาเจอสิ่งนี้ ได้โปรดรับรู้ด้วยว่าการที่ฉันชอบเปียโน..."
83306050400-26 = "และวันที่ผ่านมาของฉันไม่ได้เป็นวันที่ไร้ความหมาย..."
83306050400-33 = "ฉันทำให้ฝันเป็นจริงไม่ได้ และจากที่นี่ไปอย่างไม่มีทางเลือก..."
83306050400-34 = "แต่ช่วงเวลานั้นของคุณไม่ได้ไร้ค่าหรอกนะ"
83306050400-35 = "เพราะมันยังหลงเหลืออยู่ที่นี่... อย่างชัดเจนเลยละ"
83306050400-42 = "วันนี้ซ้อมกับโน้ตเพลงนี้แล้วกัน"

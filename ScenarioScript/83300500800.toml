[translation]
83300500800-7 = "เฮ้อ... ก็สงสัยว่าเรื่องที่จู่ๆ ก็เกิดขึ้นหลังกลับมาจากที่ไปฝึกกันมาคือเรื่องอะไร"
83300500800-8 = "ปาร์ตี้เกเฮนน่าที่จะจัดในอีก 5 วันข้างหน้านี่เอง... รู้สึกถึงลางเลยละว่าปาร์ตี้ของปีนี้จะแตกต่างจาก#nที่เคยมีมาอย่างชัดเจน"
83300500800-12 = "และคนที่เป็นเจ้าภาพก็ไม่ใช่ใครที่ไหน แต่เป็นฮานุมะ มาโคโตะจากแพนเดโมเนียม โซไซตี้..."
83300500800-16 = "ใช่... มากังวลอยู่คนเดียวมันแก้ไขอะไรไม่ได้หรอก"
83300500800-17 = "พรุ่งนี้คงต้องไปที่แพนเดโมเนียม โซไซตี้แล้วละ"

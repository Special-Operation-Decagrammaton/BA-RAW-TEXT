10046030-164 = "Are you thinking that I have no intention of fixing my...bad habit?"
10046030-165 = "Heehee. But of course."
10046030-166 = "My premonitions made me who I am, after all."
10046030-167 = "Perhaps the idea of \"fixing it\" is nonsense. If I eventually change, I suspect it must happen naturally."
10046030-168 = "But, for today, I will try to refrain."
10046030-169 = "That self-centered, short-sighted troublemaker put a lot of effort into this vacation."
10046030-170 = "And, as a fellow member of the Tea Party..."
10046030-171 = "...No, as a friend...it would be rude of me not to support her."
10046030-176 = "*thud* *rumble*"
10046030-180 = "What was that?"

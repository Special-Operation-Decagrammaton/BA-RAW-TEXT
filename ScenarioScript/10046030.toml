10046030-246 = "Even if we ask them to relocate, correctly claiming that this is private property, it would be a shame to displace people from their homes."
10046030-247 = "...Even so, I'm shocked at the scale of this operation. I wonder if there's more construction planned."
10046030-248 = "Um... Huh?"

[translation]
10046030-1 = "第3話;任性高速公路"
10046030-4 = "渚，該起床了。"
10046030-5 = "我們到囉。"
10046030-10 = "嗯？老師？你是特別來迎接我們的嗎？"
10046030-11 = "要是知道你在等的話，我就多踩幾下油門了。"
10046030-15 = "渚。渚？"
10046030-19 = "……啊，啊。#n已經著陸了嗎？"
10046030-20 = "看來你做了個好夢呢。#n是夢到自己在天空飛翔了嗎？"
10046030-21 = "我根本沒有睡著好嗎……#n總之我已經決定從今天開始，只有不會移動的地面才能叫做陸地了。"
10046030-29 = "渚，地面本來就是不會移動的哦。"
10046030-35 = "聖亞同學，麻煩請你認真改掉自己的駕駛習慣。"
10046030-36 = "被你說的好像我超速了一樣呢。#n我可是有嚴格遵守法定速限的哦。"
10046030-37 = "這一帶根本沒有速限好不好！！"
10046030-41 = "……啊，老師。"
10046030-42 = "才剛抵達就讓您見到了不體面的模樣，真是萬分抱歉。"
10046030-43 = "都來到渡假地點了，講話有必要這麼拘謹嗎？"
10046030-47 = "……老師？你怎麼了？"
10046030-48 = "眼神就像看見了什麼稀奇的東西一樣。"
10046030-49 = "[s1]「你們兩個的裝扮看起來……」\n[s2]「……都非常有渡假的氣息呢。」"
10046030-54 = "……那當然囉？我們不就是來「渡假」的嗎？"
10046030-55 = "拋開平時的自己……允許一點小小的放縱。#n隨便應付的話就太可惜了。"
10046030-56 = "我可沒這麼想。#n本來想說穿普通的便服就夠了，是周遭的人硬要我換上……"
10046030-57 = "唉，又開始了。"
10046030-58 = "既然來都來了，就好好放輕鬆享受嘛。"
10046030-63 = "啊，不好意思。#n似乎是茶會的後輩有事找我……"
10046030-70 = "喂，你好？#n啊，是的，你並沒有打錯，我是百合園聖亞。"
10046030-71 = "嗯，今天渚休假。#n……我明白了，關於該業務的聯絡請全部轉給我。"
10046030-76 = "聖亞同學……？"
10046030-77 = "你應該沒忘記我們的約定吧？#n還是說，你打從一開始就沒打算遵守？"
10046030-78 = "來這裡之前我明明說過了。#n今天茶會的公務要全部……"
10046030-79 = "……交給聖亞同學處理。#n沒錯，我們確實有過這樣的約定。"
10046030-80 = "不過這和現在搶走我手機的行為顯然──"
10046030-81 = "顯然無關是嗎？#n你該不會打算用這種形式上的藉口來搪塞吧？"
10046030-85 = "如果只是為了緩解身體的疲勞，一個人躺在房間裡反而更有效率。#n既然如此，不惜特地跑到這麼遠的地方「渡假」的理由是什麼？"
10046030-86 = "將自己從日常的工作環境中抽離出來，讓身心能夠專注於恢復。#n在我的理解中，這才是渡假本質上的目的。"
10046030-87 = "難道是我哪裡理解錯了嗎？"
10046030-88 = "……不，聖亞同學說的沒錯。"
10046030-89 = "那麼，這台手機就由我來保管吧。"
10046030-90 = "只要還留有與日常聯絡的手段，就不能說你已經從工作中抽離。"
10046030-91 = "這也太過牽強了。那個……"
10046030-92 = "啊，順帶一提……無論你如何選擇，對我來說其實都無所謂。#n畢竟這個行程本來就不是我的計劃。嚴格來說，渚的渡假與我並沒有關聯。"
10046030-93 = "但彌香他會怎麼想呢？"
10046030-94 = "……！"
10046030-99 = "其實渚自始至終都沒打算遵守約定……#n彌香知道這件事的時候會露出什麼表情，實在令人有點好奇呢。"
10046030-100 = "渚究竟能不能滿足我的求知慾……我也同樣拭目以待哦。"
10046030-101 = "咕嗚……！"
10046030-106 = "我明白了。這次渡假期間，就麻煩聖亞同學保管我的手機吧。"
10046030-110 = "坦白說，我完全不明白這麼做究竟有什麼意義。"
10046030-111 = "光是彌香同學就已經夠讓人疲憊了，為什麼連聖亞同學也要這樣對我……"
10046030-120 = "沒想到這種強硬的手段，對渚還挺管用的呢。"
10046030-121 = "覺得怎麼樣啊，老師？#n我剛才模仿彌香模仿得不錯吧？"
10046030-122 = "[s3]「剛才那是在模仿彌香嗎？」\n[s4]「像……嗎？」"
10046030-127 = "哎呀，反應有點微妙呢。#n我其實還挺有信心的說。"
10046030-128 = "算了，沒關係。下次再找機會挽回吧。#n畢竟我還留著渚的模仿沒展現出來呢。"
10046030-129 = "老師，也許你今天……#n或者甚至說毫無疑問地──將會看到某些非常特別的東西。"
10046030-130 = "硬要形容的話……可以算是某種前傳吧。"
10046030-134 = "「拉著公主乘坐的南瓜馬車的老鼠，究竟從何而來？」"
10046030-135 = "沒錯，就是這樣的故事。"
10046030-139 = "……啊啊，我的壞習慣又犯了呢。#n其實並不是什麼複雜的故事。"
10046030-145 = "簡單來說……"
10046030-146 = "就是……"
10046030-151 = "不，還是就此打住吧。"
10046030-152 = "[s5]「好，好在意！」\n[s6]「太吊人胃口了吧，聖亞！」"
10046030-155 = "呵呵，畢竟劇透是不對的。"
10046030-156 = "如果凡事都提前知道的話，未免太無趣了。"
10046030-157 = "……啊啊，我本來就不打算提起什麼嚴肅的話題。"
10046030-158 = "只是這些普通的句子光是從我嘴裡說出來，就會顯得特別有分量罷了。#n當然，我也預料到老師聽完會感到有點困擾。"
10046030-159 = "看來這種總是想親眼確認的壞習慣，還是改不掉呢。"
10046030-163 = "……那個眼神代表什麼意思？"
10046030-164 = "是想說我「其實根本沒打算改卻還這麼想」嗎？"
10046030-165 = "呵呵，這不是理所當然的嗎？"
10046030-166 = "因為現在的我，正是由這些「壞習慣」所堆砌出來的。"
10046030-167 = "或許「改掉」這個說法本身就存在弊端也說不定。#n這應該是更深層、更根本性的變化才對。"
10046030-168 = "話雖如此，我今天還是會克制一下的。"
10046030-169 = "畢竟今天可是那位自我中心、目光短淺的任性大小姐──在深思熟慮後安排的一天。"
10046030-170 = "同樣作為茶會的幹部……"
10046030-171 = "不，作為他的朋友──如果不全心全意對待的話，未免太失禮了吧。"
10046030-176 = "（轟隆！乓噹──！）"
10046030-180 = "那是什麼聲音？"
10046030-181 = "是從海灘那邊傳來的。#n要形容的話，感覺像是在施工的聲音……"
10046030-182 = "[s7]「啊，這麼說來……！」\n[s8]（海灘上還堆著從溫泉開發部沒收來的建材！）"
10046030-191 = "那個……"
10046030-192 = "這是怎麼回事？"
10046030-193 = "我們的私人海灘上，什麼時候有這些東西了？"
10046030-197 = "渚，渚醬！？"
10046030-198 = "這，這件事我可以解釋！"
10046030-199 = "沒關係，你不必解釋了。"
10046030-203 = "（怎麼辦怎麼辦……）"
10046030-204 = "（果然引起他的懷疑了！）"
10046030-205 = "（渚醬他等等一定……）"
10046030-212 = "在有未知危險因素的地方，是不可能安心渡假的。"
10046030-213 = "我們還是到更安全的地方去吧。"
10046030-214 = "對了，比如安全屋怎麼樣？"
10046030-218 = "那，那今天的渡假……？"
10046030-222 = "當然得取消囉。"
10046030-228 = "不行～～～～！！"
10046030-232 = "嚇，嚇我一跳。#n彌香，你怎麼突然叫那麼大聲？"
10046030-236 = "沒，沒事！#n渚醬，這其實……"
10046030-237 = "嗯，我大概能猜到了。#n真傷腦筋呢。"
10046030-238 = "我可以解釋！"
10046030-239 = "我剛才也說過沒必要了。"
10046030-240 = "與其特地解釋，不如安靜離開更能減少騷動。"
10046030-244 = "……嗯？"
10046030-245 = "會變成這樣的原因，我也不是不能理解。#n雖然說是私人海灘，但我們這一代根本沒用過。"
10046030-246 = "現在才說這裡是私有地，要求將東西撤走……#n對附近的居民來說，只會覺得被外地人拿無主地找麻煩吧。"
10046030-247 = "……不過話雖如此，這個數量還是有點驚人呢。#n難道附近有人在施工嗎？"
10046030-248 = "啊……咦？"
10046030-249 = "啊～對耶！這麼說來～今天早上有施工人員來過哦！#n好像說是要徵求諒解之類的～？"
10046030-250 = "本來還想說要先告訴你們的，結果被我忘得一乾二淨了★"
10046030-254 = "什麼？這種事再怎麼說也不該忘記吧。"
10046030-255 = "抱歉抱歉～因為準備工作太忙碌了嘛～"
10046030-259 = "總之快點來吃午飯吧！#n我肚子餓了！快點快點！"
10046030-264 = "真是的，彌香你呀…………"
10046030-272 = "…………"
10046030-273 = "有順利糊弄過去了嗎……？"
10046030-278 = "彌香。"
10046030-282 = "聖亞醬！你剛剛都看到了嗎？"
10046030-283 = "嗯，看得很開心哦。#n你的演技還真不賴呢。"
10046030-287 = "不愧是曾經騙倒三一上上下下的人啊。"
10046030-288 = "聖亞醬！？那件事是能隨便開玩笑的嗎！？"
10046030-289 = "呵呵，抱歉抱歉。#n只是看到你坐立不安的模樣，忍不住想逗逗你。"
10046030-290 = "話說今天的渚……果然不出所料啊。"
10046030-291 = "雖然比預想中稍微早了一點，但最近渚確實太忙了，這也可以理解。"
10046030-292 = "[s9]「你說的『果然』是什麼意思？」\n[s10]「你早就知道渚會這樣反應嗎？」"
10046030-297 = "啊，這裡還有另一位坐立不安的人呢。"
10046030-298 = "雖然說出來也無傷大雅……"
10046030-302 = "…………"
10046030-303 = "果然還是不能劇透呢。"
10046030-304 = "什麼嘛，口氣那麼高高在上的樣子。"
10046030-305 = "我們本來就高高在上唷。#n當然因為某個沒分寸大小姐的關係，感覺被拉低了不少就是了。"
10046030-306 = "吼唷！！"
10046030-307 = "呼……我得忍住才行。"
10046030-308 = "哦？"
10046030-309 = "反正計劃進行得很順利，沒什麼好激動的！"
10046030-310 = "午餐的烤肉只要等食材送到就能開始烤，剩下的準備也……"
10046030-314 = "……？#n咦，現在幾點了？"
10046030-319 = "12點40分？"
10046030-320 = "咦，真奇怪。#n食材應該12點半就要送到了才對……"
10046030-321 = "唔嗯……總覺得有股不祥的預感……"
10046030-325 = "沒，沒事的！不用緊張！"
10046030-326 = "肯定沒問題的……總不可能今天碰巧有什麼突發狀況吧？"
10046030-335 = "現在……已經1點了呢……"
10046030-336 = "抱歉，老師。我打個電話。"
10046030-344 = "啊，你好！就是～關於今天的烤肉。"
10046030-352 = "嗯？嗯？"
10046030-353 = "先，先等一下。#n這樣沒頭沒尾的，我完全聽不懂啊？"
10046030-354 = "你說「運食材的卡車被人襲擊，目前正在追擊」……？"
10046030-355 = "不好意思，可以再說明得詳細一點嗎？"
10046030-360 = "嗯。嗯。"
10046030-361 = "所以你的意思是……載著烤肉食材的卡車被人劫持，現在下落不明？"
10046030-365 = "怎麼會！？"
10046030-366 = "騙人的吧！又不是運送現金或珠寶！"
10046030-367 = "雖然我確實準備了最好的食材，但那也只是烤肉食材啊！？"
10046030-371 = "那個，彌香？#n我剛才聽到很大的聲音，發生了什麼事嗎？"
10046030-375 = "沒，沒什麼啦！渚醬你先休息沒關係！"
10046030-376 = "啊……發生什麼問題了嗎？#n因為各位一直沒回來，蓮實前輩請我過來看看。"
10046030-377 = "一，一花醬！？"
10046030-378 = "那個……雖然我自己說出來也覺得奇怪……"
10046030-383 = "唔嗯……會襲擊高級烤肉食材卡車的團體……"
10046030-384 = "我腦中一下子就想到了五六個……"
10046030-385 = "真的假的！？"
10046030-386 = "哈哈……畢竟處理實現正義部工作的時候，總會遇到各種事情嘛。"
10046030-387 = "但話又說回來，情況確實有點麻煩呢。#n這裡不是什麼渡假村，所以應該沒辦法輕鬆找到烤肉的食材。#n離最近的大城市也挺遠的……"
10046030-388 = "不過幸好還有麵包和香腸，應該能勉強填飽肚子。"
10046030-389 = "那樣……不行！"
10046030-393 = "咦？"
10046030-394 = "因為我已經跟渚醬說好午餐是烤肉了！"
10046030-395 = "萬一被他知道烤肉沒準備好的話，這次渡假就要泡湯了！"
10046030-396 = "不……就算是渚大人，那也太誇張了吧……？"
10046030-397 = "你想想看，如果渚醬發覺食材消失跟犯罪行為有關的話……"
10046030-398 = "……啊。那確實有風險呢。"
10046030-399 = "對吧！？#n可是就算想馬上弄到烤肉食材……會有人正好隨身帶著嗎……"
10046030-404 = "[ns11]「……也許有。」\n[ns12]「雖然這個辦法……我真的很不想用……」"
10046030-409 = "[ns]「真的很不想用啊！！」"
10046030-410 = "老，老師！？你沒事吧？"
10046030-411 = "唔嗯……雖然不太清楚，但那麼做會讓老師為難嗎？"
10046030-412 = "如果會的話不用勉強沒關係，因為這是我們的問題～"
10046030-413 = "嗯？你擔心的是我……？"
10046030-418 = "……如果是的話就不用猶豫了。"
10046030-419 = "不管是什麼方法，我都已經做好為了今天不擇手段的覺悟了！"
10046030-423 = "…………原來如此，我明白了。"
10046030-435 = "呵呵，為了美食而來找我們──"
10046030-440 = "是個明智的選擇呢，唔呵呵。"

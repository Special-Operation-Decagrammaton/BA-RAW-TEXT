10046030-250 = "I was going to tell you, but I completely forgot! ★"
10046030-254 = "Huh? How could you forget something like that?"
10046030-255 = "Oh, you know. I'm just so busy..."
10046030-259 = "Anyway, let's hurry and eat lunch! I'm hungry! Come on, let's go, slowpoke!"

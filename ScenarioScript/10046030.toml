10046030-36 = "I followed the laws that made sense, and I meticulously stayed under the speed limit."
10046030-37 = "There is no speed limit around here!"
10046030-41 = "...Ah, Sensei."
10046030-42 = "We've only just arrived and are already embarrassing ourselves. My sincere apologies."
10046030-43 = "Nagisa, you are on vacation. There's no need to be so formal."
10046030-47 = "...Sensei? What is it?"
10046030-48 = "You appear quite...fascinated. Is something going on?"
10046030-49 = "[s1] \"You're both very...\"\n[s2] \"...You look ready for fun.\""
10046030-54 = "...? Naturally. We ARE here to have fun. Isn't that the point of a vacation?"
10046030-55 = "It is a golden opportunity to escape the confines of our usual selves. It would be a shame to waste it."
10046030-56 = "Speak for yourself, Seia. I thought I looked perfectly appropriate before. But the others insisted..."
10046030-57 = "Ah, ah. The cycle continues..."
10046030-58 = "You're already here, Nagisa. You might as well try to enjoy yourself."
10046030-63 = "Kindly pardon the interruption. I believe one of my juniors has an update."
10046030-70 = "Hello? Ah, no. You're not mistaken. This is Yurizono Seia."
10046030-71 = "Yes, Nagisa is on vacation today... NO, this isn't a joke. From now on, forward all work calls to me."
10046030-76 = "Seia...?"
10046030-77 = "Have you already forgotten your promise? Or did you never intend to follow it?"
10046030-78 = "We were clear. Today, all official Tea Party tasks will be delegated to—"
10046030-79 = "...Seia. Yes, I remember the promise."
10046030-80 = "But taking my phone like that was quite..."

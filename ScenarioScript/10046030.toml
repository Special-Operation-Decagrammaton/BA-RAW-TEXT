[translation]
10046030-1 = "ตอนที่ 3;ไฮเวย์ตามใจฉัน"
10046030-4 = "นางิสะ ตื่นได้แล้วค่ะ"
10046030-5 = "เรามาถึงกันแล้วค่ะ"
10046030-10 = "เอ๋? คุณครู? ออกมารับพวกฉันเหรอคะ?"
10046030-11 = "ถ้ารู้ว่าคุณครูออกมารออยู่ ฉันก็คงเหยียบให้เร็วกว่านี้อีกหน่อยแล้วค่ะ"
10046030-15 = "นางิสะ นางิสะ?"
10046030-19 = "อ๊ะ... อ่า... มาถึงบนบกแล้วเหรอคะ?"
10046030-20 = "ถึงบนบก? นั่งรถจนหลับฝันว่าได้ออกไปบินบนฟ้ามาเหรอคะ?"
10046030-21 = "ฉันไม่ได้หลับ... แต่ก็เอาเถอะค่ะ ตั้งแต่วันนี้ไปฉันจะเรียกพื้นดินที่ไม่มีการเคลื่อนไหวว่าบนบกค่ะ"
10046030-29 = "นางิสะ ปกติพื้นดินมันก็ไม่เคลื่อนไหวอยู่แล้วค่ะ"
10046030-35 = "คุณเซอา คุณต้องเปลี่ยนนิสัยการขับรถของตัวเองอย่างจริงจังนะคะ"
10046030-36 = "พูดเหมือนฉันขับรถเร็วเกินเหตุไปได้ ฉันขับมาด้วยความเร็วที่กฎหมายกำหนดอย่างเคร่งครัดนะคะ"
10046030-37 = "แถวนี้ไม่มีการกำหนดความเร็วสักหน่อยนี่คะ!!"
10046030-41 = "อ๊ะ... คุณครู"
10046030-42 = "ฉันให้คุณครูเห็นภาพลักษณ์ที่ไม่ดีตั้งแต่มาถึงเลยสินะคะ น่าอายจริงๆ ค่ะ"
10046030-43 = "เราได้มาทริปพักผ่อนกันทั้งที แต่ยังทักทายกันอย่างเป็นทางการแบบนั้นอีกเหรอคะ?"
10046030-47 = "คุณครู...? ทำไมเป็นอย่างนั้นล่ะคะ?"
10046030-48 = "แววตาเหมือนได้เห็นอะไรน่าประหลาดใจอย่างนั้นละ"
10046030-49 = "[s1] \"ทั้ง 2 คนตั้งใจมาเที่ยวให้สนุกเลยสินะ...\"\n[s2] \"ทั้ง 2 คนแต่งตัวมาเพื่อทริปพักผ่อนเลยสินะ\""
10046030-54 = "ก็แน่น่ะสิคะ ก็เรามาสนุกกันไม่ใช่เหรอคะ? นี่คือวันเพื่อ 'การพักผ่อนหย่อนใจ' นี่นา"
10046030-55 = "วันนี้เป็นวันที่เราได้รับอนุญาตให้ทิ้งตัวตนเดิมที่เป็น... แล้วเพลิดเพลินไปกับการเล่นซนดูบ้างค่ะ จะให้เป็นทริปง่ายๆ ก็น่าเสียดายแย่สิคะ"
10046030-56 = "ฉันไม่คิดแบบนั้นค่ะ ฉันว่าเราแค่ใส่ชุดไปรเวทมาก็ได้ แต่คนรอบตัวก็ยืนกรานให้ฉันใส่อะไรแบบนี้..."
10046030-57 = "ยะ... ยกเรื่องนี้มาพูดอีกแล้วสินะคะ"
10046030-58 = "ในเมื่อมาถึงแล้ว ก็เพลิดเพลินกับการเที่ยวเล่นพักผ่อนเถอะค่ะ"
10046030-63 = "อ๊ะ ขอโทษที่ขัดจังหวะระหว่างพูดนะคะ พอดีรุ่นน้องในสภาน้ำชาติดต่อมา..."
10046030-70 = "ฮัลโหล? อ้อ ค่ะ ไม่ได้เข้าใจผิดไปหรอกค่ะ ฉันยูริโซโนะ เซอาค่ะ"
10046030-71 = "ใช่ค่ะ พอดีวันนี้คิริฟุจิ นางิสะลาพักร้อนน่ะค่ะ งั้นสินะคะ... ถ้าจะติดต่อเกี่ยวกับงานนั้น ก็ติดต่อมาทางฉันเลยนะคะ"
10046030-76 = "คุณเซอา...?"
10046030-77 = "ลืมสัญญาของเราแล้วเหรอคะ? หรือว่าไม่ได้คิดจะรักษาสัญญาตั้งแต่แรกอยู่แล้วคะ?"
10046030-78 = "ก่อนเดินทางมาที่นี่ นางิสะพูดไว้ชัดเจนแล้วนะคะว่างานของสภาน้ำชาในวันนี้ทั้งหมด..."
10046030-79 = "จะมอบหมายให้คุณเซอารับผิดชอบ... ใช่ค่ะ ฉันสัญญาไว้อย่างนั้นค่ะ"
10046030-80 = "แต่เรื่องนั้นกับการแย่งโทรศัพท์มือถือของฉันไปเมื่อกี้มัน..."
10046030-81 = "ไม่เกี่ยวกัน? คงไม่พูดอ้างแบบขอไปทีว่ามันไม่เกี่ยวกันหรอกใช่มั้ยคะ?"
10046030-85 = "ถ้าอยากจะแค่บรรเทาความเมื่อยล้าของร่างกาย ฉันว่าการนอนพักเงียบๆ ในห้องคนเดียวน่าจะเป็นวิธี#nที่ดีกว่าด้วยซ้ำ แล้วทำไมถึงเดินทางมาตั้งไกล 'เพื่อพักผ่อนหย่อนใจ' ล่ะคะ?"
10046030-86 = "เท่าที่ฉันรู้ วัตถุประสงค์ของการหยุดพักร้อนก็เพื่อแยกตัวออกจากสภาพแวดล้อมการทำงาน เพื่อมุ่งเน้นไปที่การฟื้นฟูร่างกายและจิตใจนะคะ"
10046030-87 = "หรือว่าฉันเข้าใจส่วนไหนผิดไปคะ?"
10046030-88 = "ไม่หรอกค่ะ... คุณเซอาพูดถูกแล้วค่ะ"
10046030-89 = "ถ้างั้นฉันจะเก็บโทรศัพท์มือถือไว้ให้ค่ะ"
10046030-90 = "ตราบใดที่ยังมีอุปกรณ์เพื่อใช้ติดต่อสื่อสารในชีวิตประจำวันไว้กับตัว ก็พูดได้ไม่เต็มปากว่าคุณแยกตัว#nออกจากงานได้แล้วหรอกค่ะ"
10046030-91 = "แต่ทำแบบนี้มันเกินไปนะคะ..."
10046030-92 = "อ้อ จะบอกให้นะคะว่าฉันไม่สนหรอกว่านางิสะจะเลือกอะไร ยังไงฉันก็ไม่ได้เป็นแม่งานของทริปนี้ และพูดตามตรงว่าการหยุดพักร้อนของนางิสะก็ไม่เกี่ยวอะไรกับฉันด้วยค่ะ"
10046030-93 = "แต่คิดว่ามิกะจะรู้สึกยังไงเหรอคะ?"
10046030-94 = "...!"
10046030-99 = "ถ้ามิกะรู้ว่านางิสะไม่คิดจะรักษาสัญญาตั้งแต่แรก... ฉันก็สงสัยเหมือนกันนะคะว่ามิกะจะทำหน้ายังไง"
10046030-100 = "แล้วก็อยากรู้ด้วยค่ะว่านางิสะจะทำให้ฉันคลายสงสัยในเรื่องที่ว่าหรือเปล่า"
10046030-101 = "อึก...!"
10046030-106 = "เข้าใจแล้วค่ะ ระหว่างวันหยุดพักร้อน ฉันจะให้คุณเซอาเก็บโทรศัพท์มือถือของฉันไว้ค่ะ"
10046030-110 = "บอกตามตรงนะคะว่าฉันไม่รู้เลยว่าจะทำแบบนี้ไปเพื่ออะไร"
10046030-111 = "แค่คุณมิกะคนเดียวก็เหนื่อยมากพอแล้ว แต่คุณเซอายังเป็นไปกับเขาอีกคนอีก..."
10046030-120 = "น่าแปลกใจที่ความดื้อดึงแบบนี้ใช้ได้ผลดีกับนางิสะนะคะ"
10046030-121 = "ว่ายังไงล่ะคะ คุณครู ฉันเลียนแบบมิกะเก่งมั้ยคะ?"
10046030-122 = "[s3] \"เมื่อกี้เลียนแบบมิกะงั้นเหรอ?\"\n[s4] \"จะว่าเลียนแบบได้เหมือน... ดีมั้ยนะ?\""
10046030-127 = "ตายจริง ทำไมปฏิกิริยาของคุณครูแปลกแบบนั้นล่ะคะ ฉันคิดว่าตัวเองทำได้ดีเลยนะ"
10046030-128 = "แต่ก็เอาเถอะค่ะ ไว้ครั้งหน้าฉันจะแก้ตัวใหม่ค่ะ ยังเหลือนางิสะให้เลียนแบบอีกคนนี่คะ"
10046030-129 = "คุณครูคะ บางทีวันนี้ ไม่สิ วันนี้คุณครูต้องได้เห็นบางอย่างที่พิเศษแน่นอนเลยค่ะ"
10046030-130 = "ถ้าจะพูดให้ถูก... นี่ก็คือภาคก่อนหน้าอย่างหนึ่ง"
10046030-134 = "<หนูที่ลากรถฟักทองของเจ้าหญิงมาจากที่ไหนนะ?>"
10046030-135 = "ใช่ค่ะ เป็นเรื่องประมาณนั้นน่ะค่ะ"
10046030-139 = "อ่า... ให้คุณครูเห็นนิสัยไม่ดีของฉันจนได้ ที่จริงมันไม่ใช่เรื่องที่ซับซ้อนขนาดนั้นหรอกค่ะ"
10046030-145 = "ถ้าจะพูดง่ายๆ ละก็..."
10046030-146 = "มันก็คือ..."
10046030-151 = "ไม่ดีกว่า เราเลิกพูดเรื่องนี้กันเถอะค่ะ"
10046030-152 = "[s5] \"ตะ... แต่ครูอยากรู้นะเซอา!\"\n[s6] \"ทำให้อยากแล้วจากไปเหรอ\""
10046030-155 = "ฮุฮุ ก็การสปอยล์มันไม่ดีนี่คะ"
10046030-156 = "ถ้ารู้ล่วงหน้าว่ามันคืออะไร มันก็น่าเบื่อสิคะ"
10046030-157 = "อ่า... ฉันไม่ได้ตั้งใจจะพูดเรื่องจริงจังอะไรหรอกค่ะ"
10046030-158 = "ฉันเดาได้เลยว่าพอคุณครูได้ฟังคำแบบนั้นจากฉันไป คุณครูก็คงเอาไปคิดต่อ แต่ก็ไม่ต้องเก็บไปกังวลให้มากหรอกค่ะ"
10046030-159 = "การอยากเห็นด้วยตาของตัวเองเป็นนิสัยไม่ดีที่แก้ไม่หายสักทีนะคะ"
10046030-163 = "มองกันแบบนั้นหมายความว่ายังไงคะ...?"
10046030-164 = "กำลังคิดว่าฉันไม่อยากแก้นิสัยของตัวเองสักนิดงั้นเหรอคะ?"
10046030-165 = "ฮุฮุ มันก็แน่อยู่แล้วนี่คะ?"
10046030-166 = "ก็ 'นิสัยไม่ดี' แต่ละอย่างของฉันคือสิ่งที่ทำให้ฉันเป็นฉันในตอนนี้นี่คะ"
10046030-167 = "บางทีคำที่ว่า 'แก้นิสัย' อาจเป็นคำที่ไร้สาระก็ได้ค่ะ ก็นี่เป็นการเปลี่ยนแปลงขั้นพื้นฐานที่เกิดขึ้นจาก#nรากเหง้านี่คะ"
10046030-168 = "แต่วันนี้ฉันคงต้องระมัดระวังหน่อยแล้วละค่ะ"
10046030-169 = "ก็วันนี้เป็นวันที่คุณหนูผู้เอาแต่ใจและไม่รู้จักคิดหน้าคิดหลังให้ดีตั้งใจเตรียมมานี่คะ"
10046030-170 = "ในฐานะสมาชิกสภาน้ำชาอีกคนแล้ว..."
10046030-171 = "ไม่สิ ในฐานะเพื่อนแล้ว ถ้าฉันไม่ตั้งใจทำด้วยใจจริง มันก็จะเป็นเรื่องเสียมารยาทนี่คะ"
10046030-176 = "(โครมมม!)"
10046030-180 = "อะไรกันคะ? เสียงเมื่อกี้มัน?"
10046030-181 = "เหมือนมีเสียงก่อสร้างอะไรดังมาจากชายหาดเลย..."
10046030-182 = "[s7] \"อ๊ะ อุปกรณ์ก่อสร้างของเด็กพวกนั้น...!\"\n[s8] (อุปกรณ์ของชมรมพัฒนาออนเซ็นที่ยึดมายังอยู่ที่ชายหาด!)"
10046030-191 = "อืม..."
10046030-192 = "นี่มันอะไรกันคะ?"
10046030-193 = "ชายหาดส่วนตัวของพวกเรามีของแบบนี้อยู่ด้วยเหรอคะ?"
10046030-197 = "นะ... นางิจัง?!"
10046030-198 = "ฉะ... ฉันอธิบายได้นะ!"
10046030-199 = "ไม่ต้องหรอกค่ะ ไม่เป็นไรค่ะ"
10046030-203 = "(ทำยังไงดีล่ะ ทำยังไงดี...)"
10046030-204 = "(นางิจังต้องคิดอะไรแปลกๆ แน่!)"
10046030-205 = "(แล้วนางิจังก็ต้อง...)"
10046030-212 = "เราสนุกกับวันหยุดพักร้อนในพื้นที่ที่เสี่ยงอันตรายไม่ได้หรอกค่ะ"
10046030-213 = "เราไปหาที่อื่นที่ปลอดภัยกว่านี้กันเถอะค่ะ"
10046030-214 = "อย่างเช่น เซฟเฮาส์หรือสถานที่แบบนั้นไงคะ?"
10046030-218 = "ละ... แล้วทริปชายหาดของเราวันนี้ล่ะ...?"
10046030-222 = "ก็ต้องยกเลิกน่ะสิคะ"
10046030-228 = "ไม่ด้ายยยยยย~~~~!!!!"
10046030-232 = "ตะ... ตกใจหมดเลย มิกะ จู่ๆ ก็เป็นอะไรขึ้นมาคะ?"
10046030-236 = "ฟะ... ฟังฉันก่อนสิ! นางิจัง เรื่องนี้น่ะ!"
10046030-237 = "ค่ะ ฉันพอเดาได้อยู่ค่ะ เป็นเรื่องน่าลำบากใจจริงๆ นะคะ"
10046030-238 = "แต่ฉันอธิบายได้นะ!"
10046030-239 = "อย่างที่ฉันบอกไปเมื่อกี้ค่ะ ไม่ต้องอธิบายก็ได้"
10046030-240 = "ถ้าจะอธิบายอะไร ฉันว่าการอยู่เงียบๆ แล้วเดินทางกลับจะทำให้เรื่องวุ่นวายน้อยกว่านี้นะคะ"
10046030-244 = "หืม...?"
10046030-245 = "ฉันรู้อยู่แล้วละค่ะว่าจะเป็นแบบนี้ ต่อให้ที่นี่จะเป็นชายหาดส่วนตัวของเรา แต่พวกเราก็ยังไม่เคยมาใช้#nงานกันเลยนี่คะ"
10046030-246 = "คงมีคนไปบอกว่าตรงนี้เป็นพื้นที่ส่วนบุคคลและขอให้คนที่พักอาศัยอยู่แถวนี้ย้ายออกไป พวกเขาก็#nเลยมาก่อความวุ่นวาย เพราะคิดว่าที่นี่เป็นแค่ที่ดินที่เจ้าของที่เป็นคนต่างถิ่นไม่ได้มาเหยียบเลย"
10046030-247 = "แต่ถึงยังไง... การขนอุปกรณ์มาเยอะขนาดนี้ก็น่าตกใจนะคะ คิดจะมาก่อสร้างอะไรตรงไหนกัน#nงั้นเหรอคะ?"
10046030-248 = "อ่า... อ๊ะ?"
10046030-249 = "อ้อ~ จริงสิ! จะว่าไป~ เช้าวันนี้มีผู้รับเหมาก่อสร้างมาหาฉันน่ะ! ทางนั้นบอกว่าอุปกรณ์ที่ทิ้งไว้อาจ#nรบกวนสายตาก็ได้~ น่าจะใช่นะ?"
10046030-250 = "ฉันก็ว่าจะบอกนางิจังล่วงหน้า แต่ก็ดันลืมไปเสียสนิทเลย★"
10046030-254 = "คะ? คงเกิดอะไรขึ้นมากมายจนมีเรื่องให้ลืมเลยสินะคะ"
10046030-255 = "ขอโทษนะ ขอโทษที~ พอดีฉันต้องเตรียมอะไรเยอะเลยน่ะ~"
10046030-259 = "เรารีบไปกินมื้อกลางวันกันดีกว่า! ฉันหิวแล้วละ! ไปกันเถอะ เร็วเข้า!"
10046030-264 = "มิกะ คุณก็เป็นแบบนี้ตลอดเลย..."
10046030-272 = "......"
10046030-273 = "น่าจะผ่านไปได้ด้วยดีแล้วละเนอะ...?"
10046030-278 = "มิกะ"
10046030-282 = "เซอาจัง! อยู่ตรงนี้ด้วยเหรอ?"
10046030-283 = "อื้อ ฉันมาแอบฟังเพราะคิดว่าน่าสนุกดีน่ะ ทักษะการแสดงเมื่อกี้ไม่เลวเลยนะคะ"
10046030-287 = "ต้องบอกว่าสมกับที่เป็นสุภาพสตรีที่หลอกลวงทรีนิตี้เลยละ"
10046030-288 = "เซอาจัง?! จะเอาเรื่องนั้นมาพูดเหรอ?!"
10046030-289 = "ฮุฮุ ขอโทษนะคะ พอเห็นว่าคุณอยู่ไม่สุข ฉันก็เลยอยากแกล้งเล่นน่ะค่ะ"
10046030-290 = "จะว่าไป วันนี้นางิสะ... เป็นอย่างนั้นจริงๆ ด้วยสินะคะ"
10046030-291 = "ถึงมันจะเร็วกว่าที่ฉันคาดนิดหน่อย แต่หมู่นี้นางิสะมีงานรัดตัวมาก ฉันก็เลยเข้าใจได้ค่ะ"
10046030-292 = "[s9] \"เป็นอย่างนั้น 'จริงๆ' คืออะไรเหรอ?\"\n[s10] \"คิดไว้แล้วเหรอว่านางิสะจะมีท่าทีแบบนั้นน่ะ?\""
10046030-297 = "อ๊ะ ตรงนี้มีคนที่อยู่ไม่สุขเพิ่มอีกคนสินะคะ"
10046030-298 = "ฉันเองก็อยากจะบอกอยู่หรอกนะคะ"
10046030-302 = "......"
10046030-303 = "แต่การสปอยล์ไม่ใช่เรื่องดีหรอกค่ะ"
10046030-304 = "อะไรกัน ชอบพูดทำนองนี้อยู่เรื่อยเลย"
10046030-305 = "ก็นั่นเป็นนิสัยของฉันนี่คะ ฉันว่าตอนนี้มิกะก็น่าจะทำความเข้าใจได้บ้างแล้วนะคะ"
10046030-306 = "ขะ... เข้าใจยากชะมัดเลย!!"
10046030-307 = "ฮู่ว... ทนไว้ๆ มิกะ"
10046030-308 = "หืม?"
10046030-309 = "แพลนของวันนี้ยังดำเนินไปได้ราบรื่นตั้งแต่เริ่มต้น งั้นก็ไม่มีเหตุผลให้ต้องประหม่าหรอก!"
10046030-310 = "มื้อกลางวันของวันนี้คือบาร์บีคิว ถ้าวัตถุดิบมาถึง ก็แค่เอาไปย่าง งั้นสิ่งที่เหลือที่ต้องเตรียมก็คือ..."
10046030-314 = "เอ๋...? ตอนนี้กี่โมงแล้วนะ?"
10046030-319 = "เที่ยง 40 นาทีแล้วเหรอ?"
10046030-320 = "เอ๋ แปลกจัง ตามที่ตกลงกันไว้ วัตถุดิบอาหารจะมาส่งตอนเที่ยงครึ่งนี่นา"
10046030-321 = "อืมม~ รู้สึกไม่ดีเลย..."
10046030-325 = "มะ... ไม่หรอก ไม่เป็นอะไร!"
10046030-326 = "ไม่มีปัญหาอะไรหรอก คงไม่บังเอิญเกิดปัญหาอะไรขึ้นมาวันนี้หรอก"
10046030-335 = "บ่ายโมงแล้ว... สินะ..."
10046030-336 = "ขอโทษนะ คุณครู ฉันขอไปโทรศัพท์เดี๋ยวหนึ่งนะ"
10046030-344 = "อ๊ะ! อ้อ เรื่องวัตถุดิบทำบาร์บีคิววันนี้น่ะ~"
10046030-352 = "เอ๋? เอ๋?"
10046030-353 = "เดี๋ยวนะ เดี๋ยวก่อน พูดเร็วเป็นน้ำไหลไฟดับแบบนั้นฉันฟังไม่เข้าใจหรอกนะ?"
10046030-354 = "ที่บอกว่า 'รถบรรทุกอาหารถูกโจมตี ก็เลยกำลังไล่ล่าอยู่' นั่นน่ะ..."
10046030-355 = "ขอโทษนะ แต่ช่วยอธิบายให้มากกว่านี้ได้มั้ย?"
10046030-360 = "อื้อ อื้อ"
10046030-361 = "สรุปว่า... รถบรรทุกที่ขนวัตถุดิบบาร์บีคิวมาโดนปล้น แล้วตอนนี้ก็ไม่รู้ว่าอยู่ที่ไหนงั้นเหรอ?"
10046030-365 = "เป็นแบบนั้นไปได้ยังไงน่ะ?!"
10046030-366 = "เดี๋ยวนะ เดี๋ยวก่อน! แต่นั่นไม่ใช่รถขนเงินสดหรือเพชรพลอยสักหน่อยนะ!"
10046030-367 = "แน่นอนว่ามันก็เป็นของคุณภาพดีเหมือนกัน แต่นั่นก็แค่วัตถุดิบบาร์บีคิวเองไม่ใช่เหรอ?"
10046030-371 = "นี่ มิกะ เกิดปัญหาอะไรขึ้นเหรอคะ ทำไมต้องเสียงดังขนาดนั้นด้วยล่ะ?"
10046030-375 = "มะ... ไม่มีอะไรทั้งนั้น! นางิจังไปพักผ่อนเถอะนะ!"
10046030-376 = "อ่า... มีปัญหาอะไรหรือเปล่าคะ? เห็นว่าเลยเวลาอาหารเที่ยงไปแล้ว รุ่นพี่ฮาสุมิก็เลยให้ฉันออกมาดูน่ะค่ะ"
10046030-377 = "อะ... อิจิกะจัง?!"
10046030-378 = "คือว่า... จะให้พูดจากปากฉัน มันก็อาจจะฟังดูแปลกๆ..."
10046030-383 = "อืม... กลุ่มคนที่ถึงกับโจมตีรถบรรทุกเพราะอยากได้วัตถุดิบบาร์บีคิวคุณภาพสูง..."
10046030-384 = "ที่พอนึกออกทันทีก็มีอยู่ 5-6 คนค่ะ..."
10046030-385 = "จริงเหรอ?!"
10046030-386 = "แหะๆ... พอได้ทำงานของชมรมทวงความยุติธรรม ฉันก็เจอเรื่องนู้นเรื่องนี้เยอะเลยน่ะค่ะ"
10046030-387 = "อืม แต่ยังไงก็เป็นเรื่องใหญ่อยู่ดีนะคะ ที่นี่ไม่ใช่แหล่งท่องเที่ยว งั้นก็น่าจะหาวัตถุดิบทำบาร์บีคิวไม่ได้#nง่ายๆ แล้วที่นี่ก็อยู่ค่อนข้างไกลจากตัวเมืองด้วย..."
10046030-388 = "แต่ยังไงเราก็มีขนมปังกับไส้กรอกที่เตรียมมาต่างหาก ฉันว่าเราน่าจะกินแทนได้สักมื้อหนึ่งค่ะ"
10046030-389 = "แบบนั้น... ไม่ได้นะ!"
10046030-393 = "คะ?"
10046030-394 = "ฉันไปบอกนางิจังเอาไว้แล้วน่ะสิว่ามื้อกลางวันของวันนี้คือบาร์บีคิว!"
10046030-395 = "แต่ถ้านางิจังรู้ว่าไม่ได้เตรียมบาร์บีคิวมา วันหยุดพักร้อนที่ชายหาดก็คงจบแค่นี้!"
10046030-396 = "แต่ว่า... ถึงจะเป็นคนเจ้าระเบียบอย่างคุณนางิสะ แต่แบบนั้นมันดูไร้เหตุผลไปนะคะ...?"
10046030-397 = "ลองคิดดูสิว่าจะเป็นยังไง ถ้านางิจังรู้ว่าวัตถุดิบบาร์บีคิวของเราไปเกี่ยวข้องกับเหตุอาชญากรรมน่ะ!"
10046030-398 = "อ่า... มันก็จริงค่ะ แบบนั้นคงเป็นเรื่องเลยนะคะ"
10046030-399 = "ใช่มั้ยล่ะ?! แต่ถึงอย่างนั้นก็เถอะ... ตอนนี้จะมีใครที่ไหนมีวัตถุดิบบาร์บีคิวคุณภาพดีมั้ยนะ..."
10046030-404 = "[ns11] \"อาจจะมีก็ได้นะ...\"\n[ns12] \"บอกตามตรงว่า... ครูไม่อยากใช้วิธีนี้เลย..\""
10046030-409 = "[ns] \"ไม่อยากใช้วิธีนี้เลยจริงๆ!!!\""
10046030-410 = "คะ... คุณครู?! เป็นอะไรไปหรือเปล่า?"
10046030-411 = "อืม... ถึงจะไม่รู้ว่าคืออะไร แต่ถ้าทำแบบนั้นแล้วคุณครูจะงานเข้าเหรอ?"
10046030-412 = "งั้นก็ไม่เป็นไรหรอก นี่เป็นปัญหาของพวกฉันนี่นา~"
10046030-413 = "เอ๋? คุณครูเป็นห่วงฉันมากกว่าเหรอ...?"
10046030-418 = "ไม่ต้องเป็นห่วงหรอก..."
10046030-419 = "ไม่ว่าวิธีนั้นจะคืออะไร ฉันก็เตรียมตัวเตรียมใจมาแล้วว่าจะทำทุกอย่างเพื่อวันนี้เลย!"
10046030-423 = "เป็นอย่างนี้สินะ... ฉันพอเข้าใจสถานการณ์แล้วค่ะ"
10046030-435 = "ฮุฮุ การมาหาพวกฉันเพื่อถามเรื่องอาหารน่ะ"

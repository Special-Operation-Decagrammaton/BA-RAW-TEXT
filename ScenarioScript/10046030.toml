10046030-212 = "We can't enjoy our vacation if we're under active...attack. Or whatever this is."
10046030-213 = "Let's seek a more secure location."
10046030-214 = "Perhaps a...fortified safe house. Deep underground with absolutely no fun allowed."
10046030-218 = "B-But...what about our vacation?"
10046030-222 = "It's canceled, naturally."
10046030-228 = "NOOOOO!"

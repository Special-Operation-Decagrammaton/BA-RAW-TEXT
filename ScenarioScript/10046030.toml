10046030-236 = "N-No! Nagi! This is—!"
10046030-237 = "I suspect I know the answer. It's quite unfortunate."
10046030-238 = "I can explain!"
10046030-239 = "As I said before, there's no need."
10046030-240 = "Rather than explaining, it's probably best for us to ignore it. We mustn't cause a scene."
10046030-244 = "...Huh?"

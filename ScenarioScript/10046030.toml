10046030-85 = "You are not here to simply recuperate physically. You could have done that on a chaise lounge in the sunroom. Do you remember the reason for this vacation?"
10046030-86 = "It is to relieve you of your daily tasks so that you can completely focus your body and mind on recovery. We all agreed it was necessary."
10046030-87 = "Unless you believe I misunderstood?"
10046030-88 = "...No. You're right."
10046030-89 = "Then I will confiscate your phone."
10046030-90 = "Only by freeing yourself from the shackles of constant contact will you liberate your mind from work."
10046030-91 = "That's a bit dramatic! It's..."
10046030-92 = "By the way, I frankly don't care what decisions you make. I'm not the one planning this vacation, and I have little investment."
10046030-93 = "But I wonder if that's the case for Mika..."
10046030-94 = "...!"
10046030-99 = "I am curious how Mika will react once she learns that you...never intended to keep your promise."
10046030-100 = "However, on an intellectual level, I find your behavior quite fascinating. I wonder what you will choose?"
10046030-101 = "Ugh...!"
10046030-106 = "Very well. I'll entrust my phone to you for the rest of the vacation, Seia."
10046030-110 = "Honestly, I still struggle to find the purpose of all this performance."
10046030-111 = "Mika is already too much. I don't need you pestering me as well."
10046030-120 = "I'm surprised that whining works so well on Nagisa."
10046030-121 = "What do you think, Sensei? My impression of Mika was fairly decent, was it not?"
10046030-122 = "[s3] \"You were imitating Mika?\"\n[s4] \"Oh...uh...\""
10046030-127 = "What a lukewarm reception. I put so much effort into that."
10046030-128 = "I'll try harder next time. Perhaps I should focus on my Nagisa impression instead."
10046030-129 = "Sensei, you will perhaps... No, definitely, experience a special story today."
10046030-130 = "You could say...this is a bit of a prologue."
10046030-134 = "\"Where did Cinderella's mice come from?\""
10046030-135 = "Yes, this is that kind of story."
10046030-139 = "...Ah, sorry for that. I really mustn't complicate things."
10046030-145 = "To put it more simply..."
10046030-146 = "...Nothing other than..."
10046030-151 = "No, it's best to let it unfold on its own."
10046030-152 = "[s5] \"I-I want to know!\"\n[s6] \"Seia!\""
10046030-155 = "Fufu, one should avoid spoilers."
10046030-156 = "Trust me, there's nothing more boring than knowing the twist beforehand."
10046030-157 = "...Ah, I didn't mean to be so esoteric."

[translation]
2601102-1 = "ฉันคือตำนาน"
2601102-2 = "(คุณครูได้รับข้อความจากซาเต็น จึงมุ่งหน้าไปยังย่านการค้า)"
2601102-7 = "(ภาพของซาเต็นที่ยืนตาเป็นประกายอยู่บนถนนนั้นสะดุดตามาแต่ไกล)"
2601102-15 = "ตะ... ตายแล้ว... เรื่องแบบนี้... ความจริงแบบนี้มัน...!"
2601102-16 = "นี่มันเรื่องจริงใช่มั้ย? หรือที่นี่จะเป็นสวนสนุก หรือว่าเป็นการซ่อนกล้อง..."
2601102-17 = "ไม่ก็เป็นสถานที่ถ่ายภาพยนตร์... คงไม่ใช่หรอกเนอะ?"
2601102-18 = "มีทั้งคนที่มีปีก บางคนก็มีเขา แถมบางคนยังมีหูและหางเหมือนสัตว์ด้วย..."
2601102-19 = "ไม่สิ มีกระทั่งคนที่ดูเหมือนสัตว์ด้วยเลย..."
2601102-20 = "[s1] \"...ซาเต็น?\"\n[s2] \"มาทำอะไรอยู่ที่นี่เหรอ?\""
2601102-28 = "มะ... มีเสากับวงกลมที่เปล่งแสงอยู่บนฟ้าด้วย...!!"
2601102-29 = "[s3] \"กำลังตื่นเต้นเลยสินะ...\"\n[s4] \"นี่... คุณซาเต็น...?\""
2601102-32 = "......!?  เฮือก!?"
2601102-33 = "อ้อ คุณครู...? คุณครูเองหรอกเหรอคะ!"
2601102-34 = "ฉันตกใจหมดเลย... เมื่อกี้ฉันเพิ่งหนีคุณลุงชิบะพูดได้มาเลยค่ะ พอดีเขาเดินมาใกล้ฉัน..."
2601102-35 = "ทะ... ที่จริงฉันก็คิดว่าเขาน่ารักดีหรอกนะคะ... แต่ก็..."
2601102-36 = "...คะ?"
2601102-37 = "ไม่ต้องกังวลก็ได้เหรอคะ? พวกเขาไม่ใช่คนไม่ดีงั้นเหรอ?"
2601102-38 = "เอ๋?"
2601102-42 = "...แต่ฉันก็ไม่ได้กลัวพวกเขานะคะ?"
2601102-43 = "[s5] \"...หืม? ไม่ได้กังวลเรื่องนี้หรอกเหรอ?\"\n[s6] \"แล้วท่าทีเมื่อกี้...\""
2601102-46 = "อ่าก็ มันก็ตกใจอยู่หรอกค่ะ..."
2601102-47 = "อ่า นี่ฉันทำให้คุณครูต้องเป็นห่วงโดยไม่ได้ตั้งใจหรือเปล่าคะ แง ขอโทษนะคะ ฉันไม่ได้ตั้งใจให้เป็น#nแบบนั้นเลย"
2601102-48 = "ฉันแค่ได้เห็นสิ่งต่างๆ ที่ไม่เคยเห็นเลยจากที่ที่ฉันเคยอยู่น่ะค่ะ แล้วก็เห็นทุกอย่างพร้อมๆ กันเลยด้วย"
2601102-49 = "ตอนแรกฉันคิดว่าที่นี่ก็คงเป็นเมืองแห่งการศึกษาที่คล้ายๆ กับที่ที่ฉันจากมา แต่พอได้เห็นจริงๆ แล้วก็ต่างกันลิบลับ..."
2601102-50 = "จะว่ายังไงดี..."
2601102-51 = "เหมือนกับตำนานของเมืองทั้งหมดที่ฉันเคยตามหา กำลังมีชีวิตอยู่ในโลกใบนี้..."
2601102-52 = "และนี่ก็เป็นเรื่องที่น่าทึ่งสำหรับฉันมากค่ะ! ทุกอย่างของที่นี่เลย!!"
2601102-53 = "แต่ว่า... อืม..."
2601102-57 = "ความรู้สึกของฉัน... มันแปลกๆ น่ะค่ะ... ต้องบอกว่ามันต่างจากที่ฉันคาดไว้หรือเปล่า"
2601102-58 = "ทุกคนต่างออกมาทำกิจกรรมของตัวเองราวกับว่านี่เป็นเรื่องธรรมดา พอเห็นแบบนี้ฉันก็ไม่คิดว่านี่เป็น#nตำนานของเมืองแล้ว..."
2601102-59 = "[s7] \"พะ...เพราะนี่เป็นเรื่องธรรมดาของที่นี่น่ะ...\"\n[s8] \"ตำนานของแต่ละเมืองคงไม่เหมือนกันอยู่แล้ว\""
2601102-62 = "ก็คงใช่น่ะค่ะ คงเป็นแบบนั้นละ..."
2601102-66 = "...เอ๋"
2601102-67 = "...เฮือก!?  ถ้างั้นก็แปลว่า... ฉันเป็นตำนานของเมืองที่นี่...!?"
2601102-68 = "[s9] \"...ในแง่ของคนที่มาจากโลกอื่นน่ะ\"\n[s10] \"ถ้าคิดแบบนั้นมันก็ใช่อยู่นะ...\""
2601102-71 = "......!!!"
2601102-72 = "ฟังดูแล้วก็เป็นอย่างนั้นจริงๆ นะคะ! ฉันไม่เคยคิดแบบนั้นสักครั้งเลยค่ะ!"
2601102-73 = "ตำนานเมือง... นี่ฉันกลายเป็นตำนานของเมือง..."
2601102-74 = "...โอ้ โอ้ววว..."
2601102-75 = "คุณครูคะ...? ไม่ทราบว่า..."
2601102-81 = "...คุณครูเห็นฉันแล้วรู้สึกประหลาดใจไหมคะ?"
2601102-82 = "[s11] \"อยากฟังคำตอบแบบไหนเหรอ...\"\n[s12] \"มะ... ไม่รู้สิ... ต้องรู้สึกยังไงนะ...\""
2601102-85 = "ดูจากสีหน้าแล้ว คุณครูไม่รู้สึกว่าฉันน่าทึ่งเลยสินะคะ น่าเสียดายจัง"
2601102-86 = "แต่ก็ไม่เป็นไรค่ะ เรื่องนั้นเอาไว้ก่อน เอาเป็นว่าฉันพอเข้าใจแล้วละค่ะว่าทำไมสิ่งที่ฉันเห็นที่นี่ถึงดูไม่#nได้น่าตื่นเต้นสำหรับคนที่นี่"
2601102-87 = "แต่ยังไงที่นี่ก็มีตำนานของเมืองใช่ไหมคะ? อย่างเช่นเรื่องที่น่ากลัว... หรือสิ่งลี้ลับอะไรทำนองนั้น..."
2601102-88 = "[s13] \"เข้าเรื่องอย่างเนียนๆ เลยนะ\"\n[s14] \"ยังไม่ยอมแพ้สินะเนี่ย\""
2601102-91 = "แน่นอนอยู่แล้วค่ะ! ถ้าเป็นสิ่งที่สำคัญกับใจ เราต้องไม่ล้มเลิกและหาคำตอบต่อไปค่ะ!"
2601102-92 = "เอาละ คุณครู! เราไปตามหาด้วยกันเลยค่ะ! ไปหาตำนานของเมืองนี้ให้เจอ!!"
2601102-96 = "[ns] \"......\""
2601102-98 = "[ns] ตามน้ำตามซาเต็นไปก่อน"
2601102-100 = "(หลังจากนั้นคุณครูก็ได้ทัวร์รอบเมืองคิโวทอสไปกับซาเต็นที่ออกสำรวจอย่างไร้จุดหมาย)"
2601102-101 = "(แน่นอนว่าทั้งคู่ไม่สามารถหาสิ่งที่พอจะเป็น 'ตำนานของเมือง' ได้)"

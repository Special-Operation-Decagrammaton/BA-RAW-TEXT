[translation]
2601102-1 = "我是都市傳說"
2601102-2 = "（接到佐天的聯絡後，前往了商店街）"
2601102-7 = "（從遠處就看見了眼神閃閃發亮的佐天）"
2601102-15 = "這，這裡……這種事……是現實嗎……！"
2601102-16 = "這些都是真的吧？#n不是什麼主題樂園或整人節目……"
2601102-17 = "也不是電影片場之類的……對吧？"
2601102-18 = "有的人長著翅膀，有的人長著角……還有人長著動物的耳朵和尾巴……"
2601102-19 = "就連長得跟動物一樣的人都有……！"
2601102-20 = "[s1]「……佐天？」\n[s2]「你在這裡做什麼？」"
2601102-28 = "天上……天上還有神祕的光柱和光圈……！！"
2601102-29 = "[s3]「他好像很激動呢……」\n[s4]「那，那個，佐天同學……？」"
2601102-32 = "……哇啊！？"
2601102-33 = "啊，老師……？原來是老師啊！"
2601102-34 = "嚇我一跳……剛才有個會說話的狗狗大叔靠了過來，我不由自主地就逃跑了……"
2601102-35 = "雖，雖然我其實覺得……還挺可愛的。"
2601102-36 = "……嗯？"
2601102-37 = "你說不用擔心，那些人都不是壞人？"
2601102-38 = "咦……？"
2601102-42 = "……我沒有覺得害怕呀？"
2601102-43 = "[s5]「……嗯？你不是在害怕嗎？」\n[s6]「那你剛才的反應是……？」"
2601102-46 = "這個嘛，雖然的確是有點驚訝……"
2601102-47 = "啊，好像讓老師擔心了呢。#n嗚嗚，真不好意思，我不是有意的。"
2601102-48 = "只是一次看見太多原本的世界見不到的景象，所以一時有點驚訝而已。"
2601102-49 = "本來覺得這裡乍看之下跟學園都市很類似，仔細觀察之後才發現完全不一樣……"
2601102-50 = "該怎麼說呢……"
2601102-51 = "這裡簡直就像我以前探訪過的所有都市傳說組合而成的世界……"
2601102-52 = "這裡的一切，對我來說就是這麼不可思議！"
2601102-53 = "只不過……唔……"
2601102-57 = "真奇怪……總覺得心情……跟我預想的不太一樣。"
2601102-58 = "大家都理所當然地生活著，好像缺少了一點都市傳說的氣氛……"
2601102-59 = "[s7]「畢竟這是這裡隨處可見的景象……」\n[s8]「都市傳說就是相對的差異所產生的嘛。」"
2601102-62 = "果然……是這樣嗎？"
2601102-66 = "……咦？"
2601102-67 = "……！？#n也就是說，對這個地方而言……我才是都市傳說……！？"
2601102-68 = "[s9]「……因為你是從別的世界來的人？」\n[s10]「嗯……要這麼說的話倒也沒錯……」"
2601102-71 = "……！！！"
2601102-72 = "聽老師這麼一說好像真的是這樣耶！#n我從來沒有往這個方向想過！"
2601102-73 = "都市傳說……我是都市傳說……"
2601102-74 = "……哦，哦哦哦……"
2601102-75 = "老師……？你覺得……"
2601102-81 = "……我很奇怪嗎？"
2601102-82 = "[s11]「該怎麼回答好呢……」\n[s12]「這，這個嘛……該怎麼說呢……」"
2601102-85 = "看你的表情好像不是這樣呢，有點可惜。"
2601102-86 = "不過沒關係，這裡的情景對我來說奇不奇妙暫且不論，#n我現在看見的景象其實並沒有那麼稀奇，這點我已經明白了。"
2601102-87 = "但是，這裡應該也有屬於這裡的都市傳說吧？#n例如怪談……或是超自然現象之類的……"
2601102-88 = "[s13]「話題轉移得真自然呢。」\n[s14]「看來你還不想放棄呢。」"
2601102-91 = "那當然！因為最重要的，是永遠不放棄尋找新的可能性！"
2601102-92 = "好了，老師！我們一起去尋找吧！#n尋找符合這個世界的都市傳說！！"
2601102-96 = "[ns] 「…………」"
2601102-98 = "[ns] 總之先跟著佐天"
2601102-100 = "（之後，跟著相當投入的佐天在奇普托斯市區內轉了一圈）"
2601102-101 = "（想當然爾，並沒有發現足以被稱為「都市傳說」的事物）"

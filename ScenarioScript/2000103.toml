[translation]
2000103-1 = "การเรียนหนังสือมันยากจัง 1"
2000103-2 = "ห้องสมุด"
2000103-3 = "อ๊ะ คุณครู? มาห้องสมุดทำไมน่ะ?"
2000103-4 = "หืม? ถามฉันเหรอว่ามาทำไม ทั้งๆ ที่ก็สอบเสร็จแล้ว?"
2000103-5 = "คือว่า... คือฉันมีสอบซ่อม..."
2000103-6 = "[s1] \"มีสอบซ่อม? แปลว่าสอบตกหมดเลยเหรอ?\"\n[s2] \"คารินเป็นเด็กหัวไม่ดีสินะ?\""
2000103-7 = "......!"
2000103-8 = "......!"
2000103-9 = "มะ... ไม่ใช่นะ!"
2000103-10 = "พอดี... คะแนนสอบ... ไม่ค่อยดีน่ะ..."
2000103-11 = "ฉันก็เพิ่งเคยสอบตกเนี่ยแหละ"
2000103-12 = "เฮ้อ ก็ช่วยไม่ได้"
2000103-13 = "กิจกรรมของ C&C ค่อนข้างแตกต่างจากชมรมอื่น"
2000103-14 = "ในตอนกลางวันดูเป็นงานรับใช้ทั่วไป แต่พอตกกลางคืนต้องเป็นสายลับของมิลเลเนียม"
2000103-15 = "ไหนจะต้องเรียนหนังสือ แล้วก็ทำงานชมรมด้วย แถมยังต้องไปทำงานพาร์ทไทม์อีก อยากมีสัก 3 ร่างจัง"
2000103-16 = "[s] \"งานพาร์ทไทม์เหรอ?\""
2000103-17 = "ใช่ ส่วนหนึ่งก็เพื่อหาเงิน แต่ฉันก็มีความฝันอยู่ 2 อย่าง"
2000103-18 = "อย่างหนึ่งคือการได้เป็นเจ้าของคาเฟ่สวยๆ"
2000103-19 = "การเรียนเป็นเรื่องสำคัญก็จริง แต่การได้หาประสบการณ์ในหลายๆ ร้านก็ถือว่าสำคัญเหมือนกัน"
2000103-20 = "แต่การเรียนหนังสือมันไม่อ่อนโยนกับฉันเลย..."
2000103-21 = "อ้อ!"
2000103-22 = "คุณครู"
2000103-23 = "มีนักเรียนที่ต้องการความช่วยเหลืออยู่พอดี"
2000103-24 = "คุณครูคือ... คุณครูใช่มั้ย?"
2000103-25 = "มาช่วยเรื่องการเรียนของฉันหน่อยได้มั้ย?"
2000103-26 = "ฉันไม่ได้ขอให้มาสอนพิเศษหรอกนะ นี่คือคำถามจากข้อสอบที่ฉันรวบรวมไว้"
2000103-27 = "ช่วยถามคำถามพวกนี้ฉันหน่อยได้มั้ย?"
2000103-28 = "[s3] \"ให้เป็นหน้าที่ครูเอง\"\n[s4] \"ไม่มีคำถามสองแง่สามง่ามใช่มั้ย?\""
2000103-29 = "ขอบคุณนะ!"
2000103-30 = "มะ... ไม่มีอะไรแบบนั้นหรอก!"
2000103-31 = "งั้นมาเริ่มกันเลย!"
2000103-34 = "......"
2000103-35 = "[s5] \"การที่ค่าครองชีพของประเทศลดลง และเศรษฐกิจโดยรวมซบเซา เรียกว่า?\"\n[s6] \"การแยกใช้อำนาจ ปกติแบ่งเป็นอำนาจนิติบัญญัติ อำนาจบริหาร และ?\""
2000103-36 = "ขอตอบ! ภาวะเงินฝาด!"
2000103-37 = "หา...? ภาวะเงินฝืดงั้นเหรอ? อืม เกือบถูกแล้ว"
2000103-38 = "ขอตอบ! อำนาจตุลากร!"
2000103-39 = "หา...? อำนาจตุลาการหรอกเหรอ? ฉะ... ฉันรู้อยู่แล้วล่ะ พูดผิดแค่พยางค์เดียวเอง#nหยวนๆ ให้ไม่ได้เหรอ?"
2000103-40 = "เอาเถอะๆ คำถามต่อไปเลย"
2000103-41 = "เสียงคุณครู... น่าฟังจัง"
2000103-42 = "แบบนี้ต้องจำได้แม่นแน่ๆ"
2000103-43 = "[s] \"ความฝันอีกอย่างคืออะไรเหรอ?\""
2000103-44 = "ขอตอบ! แม่ที่เฉลียวฉลาดและภรรยาที่จิตใจดี... อ๊ะ! เดี๋ยวสิ!"
2000103-45 = "คือ... คือว่า... เรื่องความฝัน... แบบนี้มันเขินนะ..."
2000103-46 = "วะ.. ไว้ค่อยตอบคราวหลังแล้วกัน! ลืมที่ฉันพูดไปเถอะ!"
2000103-47 = "เอาล่ะ! คำถามต่อไปเลย!"
2000103-48 = "ข้อนี้จะตอบให้ถูกให้ได้เลย"

[translation]
2000103-1 = "學習很困難（１）"
2000103-2 = "圖書館"
2000103-3 = "哎呀，老師？#n你怎麼會來圖書館呢？"
2000103-4 = "嗯？你說我才是，明明考試都考完了為什麼還來，是嗎？"
2000103-5 = "那個……我還需要補考……"
2000103-6 = "[s1] 「補考？你考不及格嗎？每一科？」\n[s2] 「原來花凜不擅長念書嗎？」"
2000103-7 = "……！"
2000103-8 = "……！"
2000103-9 = "才，才不是！"
2000103-10 = "那個……雖然……本來我的成績就不算好。"
2000103-11 = "這也是第一次不及格。"
2000103-12 = "哈啊，這也沒辦法。"
2000103-13 = "C&C和其他的社團有點不一樣。"
2000103-14 = "白天雖然是普通的服務型社團，到了晚上就得成為千年的特務。"
2000103-15 = "又要念書又要當特務，#n再加上，我的打工也很重要，就算有三個分身都不夠用啊。"
2000103-16 = "[s] 「打工？」"
2000103-17 = "沒錯。先不論錢的問題，我有兩個夢想。"
2000103-18 = "其中一個，是總有一天要成為可愛咖啡廳的女店主。"
2000103-19 = "所以說，雖然說唸書很重要，但在各式各樣的店裡累積經驗也是一樣重要。"
2000103-20 = "但是，不管我怎麼努力念書都……"
2000103-21 = "啊。"
2000103-22 = "老，老師。"
2000103-23 = "這裡正好有個需要幫助的女學生。"
2000103-24 = "老師是……老師對吧？"
2000103-25 = "你能不能幫幫我呢？"
2000103-26 = "並不是說要你像家教一樣。這裡是我整理出來的問題。"
2000103-27 = "就從這上面有的問題裡，出幾題來考考我，怎麼樣？"
2000103-28 = "[s3] 「包在我身上。」\n[s4] 「……這上面怎麼沒有和花凜的三圍有關的問題。」"
2000103-29 = "謝謝老師！"
2000103-30 = "怎，怎麼可能會有那種東西嘛！？"
2000103-31 = "……那麼，我們就開始吧！"
2000103-34 = "……"
2000103-35 = "[s5] 「物價下跌、經濟蕭條的現象被稱為什麼呢？」\n[s6] 「三權分立的三權是指立法、司法和什麼呢？」"
2000103-36 = "我知道，是「反烏托邦」！"
2000103-37 = "……咦？是通貨緊縮？唔嗯……其實也算答對吧？"
2000103-38 = "我知道，是憲法！"
2000103-39 = "……耶？是行政？我，我當然知道。也算答對了一半吧。"
2000103-40 = "好了，快點出下一題吧。"
2000103-41 = "總覺得，老師的聲音很好聽呢。"
2000103-42 = "感覺很容易就能記住。"
2000103-43 = "[s] 「花凜的第二個夢想是什麼呢？」"
2000103-44 = "那個啊，是成為賢妻良……才怪！"
2000103-45 = "那，那個是……這個，那個……因為有點害羞……"
2000103-46 = "……之，之後會告訴你的！先把我剛才說的給忘了！"
2000103-47 = "好了！下一個問題是？"
2000103-48 = "這次，我一定會答對的。"

[translation]
61090-1 = "第9話;上課時間 "
61090-2 = "呼…… "
61090-3 = "唔，唔唔……！ "
61090-8 = "……只是毫釐之差啊。 "
61090-9 = "看來結果已經揭曉了。 "
61090-10 = "小隊……是不是有點生疏了？ "
61090-11 = "確實有這種感覺。 "
61090-12 = "不過你們看起來也有點散漫啊。 "
61090-13 = "……！ "
61090-14 = "那麼，你們打算怎麼做？ "
61090-15 = "我們應該已經證明自己的「存在價值」了吧？"
61090-19 = "雖然這也無可奈何……"
61090-20 = "小隊那些傢伙，居然還在那邊得意忘形……！"
61090-21 = "誰叫他們在「外面」經歷了那麼多事。#n這場戰鬥的結果本來就很明顯。 "
61090-22 = "明明之前連守住奧利斯都做不到，現在卻跑來指手畫腳……！"
61090-23 = "那群傢伙……！ "
61090-24 = "沒事的，美咲。你先冷靜。 "
61090-25 = "或許這就是我們必須承擔的事。"
61090-26 = "那個老師也是一樣。#n不只自以為是又我行我素…… "
61090-27 = "嘴上說是為了我們，背後肯定另有盤算……"
61090-35 = "哇啊！？"
61090-36 = "喂，喂！你沒事吧！？"
61090-37 = "暈過去了…… "
61090-38 = "沒，沒有任何準備動作的胸口[ruby=Double Tap]雙連擊[/ruby]加暴頭…… "
61090-39 = "雖然前輩剛才說他們生疏了……我感覺完全不像啊…… "
61090-41 = "敦，敦子！？ "
61090-42 = "噫噫噫…… "
61090-43 = "你們要怎麼評論我們都無所謂，但請不要對老師這樣。"
61090-44 = "我相信你們應該明白該有的分寸才對。"
61090-45 = "而且……我現在也還算是奧利斯的一員吧？ "
61090-46 = "是，是！ "
61090-47 = "…… "
61090-49 = "（大家看起來都有點害怕和畏縮……）"
61090-50 = "（因此決定要更開朗地說話） "
61090-51 = "[ns]「那麼孩子們！開始學習吧！」 "
61090-52 = "就，就算要學習好了……我們什麼都沒有啊！ "
61090-53 = "教室亂七八糟，又沒有知識、設備和器材……就連能教我們的人都沒有…… "
61090-54 = "……說著說著感覺更沮喪了。"
61090-55 = "[s1]「沒事沒事。」  \n[s2]「學習這種事呢，只要有桌椅和黑板就夠了。」"
61090-60 = "[ns]「至於負責教學的人，我也已經想好了！」 "
61090-64 = "……真的要在這裡上課嗎？"
61090-65 = "[s3]「哇！不錯嘛！桌子已經擺好，只要把椅子扶起來就行了！」  \n[s4]「而且還有講桌和黑板！簡直是完美的教室！」"
61090-68 = "雖然字典在我們奧利斯幾乎所剩無幾……"
61090-69 = "看來「完美」這個詞的定義，已經在不知不覺間發生了相當大的改變呢…… "
61090-70 = "而且馬上就要天黑了…… "
61090-71 = "[s5]「第一堂課本來就只會點名！」  \n[s6]「然後再講個概要而已，所以別擔心！」"
61090-74 = "這……真的沒問題嗎，老師……？ "
61090-75 = "[s]「別擔心！我相信我們的沙織！」 "
61090-76 = "！？"
61090-77 = "！？ "
61090-78 = "為什麼會在這個時候提到我的名字，老師？？？ "
61090-79 = "[s7]「因為……接下來經過特別選拔的實習老師們！」\n[s8]「將會負責進行第一堂課的教學！」"
61090-82 = "那個選拔是什麼時候進行的，老師？ "
61090-83 = "現在？好吧……原來如此。 "
61090-84 = "難道這就是老師說的「遠大的計畫」嗎！？ "
61090-85 = "仔細想想，老師之前也問過我們平常有沒有認真學習…… "
61090-86 = "真是完全不能掉以輕心啊。唉…… "
61090-87 = "可，可是我……我…… "
61090-88 = "[s]「哇！請教導我們吧，沙織老師！」"
61090-89 = "嗯。請教導我們吧，沙織老師。"
61090-90 = "不，不只是老師，連敦子也……！？"
61090-92 = "（沙織最後還是帶著尷尬的表情站上了講台……！）"
61090-94 = "（該怎麼教才好呢……）"
61090-95 = "（嗯？這是高中的社會科？而且是社會文化……社會契約論？）"
61090-99 = "（沒問題……這個我能教！） "
61090-100 = "各位！要開始上課了。都坐好！ "
61090-101 = "真，真的要坐著嗎？ "
61090-102 = "其實我已經坐著了…… "
61090-103 = "把筆記本打開！沒有的話就用奧利斯的學生手冊！#n我知道你們每個人都至少有一本！"
61090-104 = "假如真的沒有的話，之後再抄隔壁同學的筆記！ "
61090-105 = "用頭腦記跟用手寫相比，最後會留下的知識量可是完全不同的！ "
61090-106 = "是，是！ "
61090-107 = "完全是沙織前輩當教官時的樣子啊…… "
61090-108 = "在進入課程之前，我要先說一件事。"
61090-112 = "合約真的很重要！ "
61090-113 = "合，合約？ "
61090-114 = "那是……什麼東西？#n是外面的文化嗎……？ "
61090-115 = "所謂的合約，是為了保留法律證據和具體內容，在雙方的同意之下製作的文件……"
61090-116 = "要是沒有它的話……就算完成任務也拿不到報酬！"
61090-117 = "無論付出再多辛苦也只能空手而歸！這種事多到數不清啊！"
61090-118 = "真是充滿靈魂的吶喊……"
61090-119 = "他怎麼這麼清楚啊？#n難道……是他的親身經歷？ "
61090-120 = "加油，沙醬……！ "
61090-121 = "沙，沙織姐……！ "
61090-123 = "因此社會並不存在實體，而是由構成成員的契約維持的人工概念體──#n這就是社會契約論的核心概念。"
61090-124 = "也就是說，從一開始就沒有社會這種東西，而每個人都擁有與生俱來的固有權利。 "
61090-125 = "那，那個……我有個問題。 "
61090-126 = "說吧，舞彩。"
61090-127 = "如果說一開始什麼都沒有的話……#n那麼「與生俱來的權利」不也應該是不存在的嗎……？ "
61090-128 = "這個問題問得很好。#n這段話乍聽之下確實可能讓人感到矛盾。 "
61090-129 = "不過你可以理解成，這段話其實有這樣一個前提。 "
61090-130 = "那就是假設每個人都擁有與生俱來的權利──"
61090-131 = "有助於提高建立更好社會的可能性。"
61090-132 = "所，所以是雖然實際上沒有，但「假設如此」反而能帶來更好的結果嗎……"
61090-133 = "我從來沒有這樣想過耶……！ "
61090-137 = "嗯，時間差不多了。今天的課就先上到這裡。"
61090-138 = "有問題的話可以先記下來，留到下次上課的時候再問。 "
61090-139 = "預習……因為種種原因可能沒有辦法，但我建議要好好複習。 "
61090-140 = "畢竟從學習效果來看，複習本來就比預習來得更好。 "
61090-144 = "你，你覺得怎麼樣呢，老師……？ "
61090-145 = "[s9]「真是太棒了，沙織老師……」  \n[s10]「真是太令人感動了，沙織老師……」"
61090-148 = "唔，老師這個稱呼對我來說還有點……"
61090-149 = "不過，看來我做得還不算太差……真是太好了。"
61090-151 = "[ns]「那麼有請下一位，負責教物理學的美咲老師！」 "
61090-152 = "啊？為什麼是我啊？#n而且還是物理學！？你在開玩笑吧老師！？ "
61090-153 = "咦？你說彈道學不就是古典力學？#n這……！ "
61090-154 = "…… "
61090-155 = "不是完全沒關係，反而更讓人生氣了…… "
61090-156 = "唉……好吧，我試試看。 "
61090-159 = "總之先把公式背下來！#n因為你們的大腦還沒完全啟動！ "
61090-160 = "我不指望你們現在就理解！那種事等課程往後推進一點再說！"
61090-161 = "數學和物理是從背誦開始的學科，你們應該感到慶幸！"
61090-162 = "……當然，如果有人一開始就能理解的話，我會建議你走這條路。 "
61090-163 = "不過這類型的人，有時會傾向用數字和統計去看待別人……"
61090-164 = "進而因為不理解其他人的心情而惹出麻煩就是了…… "
61090-166 = "大家好。我是負責生物學的實習老師，秤敦子。 "
61090-167 = "那麼我們就直接開始吧。#n生物學是個既有趣又重要的學科哦。"
61090-168 = "它探討的是諸如「什麼是基因」…… "
61090-169 = "或者「生物必須經歷怎麼樣的過程才能留下後代」這類的問題。 "
61090-170 = "[s]「敦子！停停停！」 "
61090-171 = "為什麼要阻止我呢，老師？#n這明明是非常重要的理論呀？"
61090-172 = "呵呵。不用擔心，老師。#n我完全明白你的意思。"
61090-173 = "那麼，我們就先從什麼是「減數分裂」開始講起吧？ "
61090-175 = "至此，我們已經學到了細胞的組成成分與整體結構。 "
61090-176 = "細胞可說是生命的基本單位，所以要好好記住哦。"
61090-178 = "…… "
61090-179 = "大，大家好。#n嘿嘿……各種意義上來說，好久不見了呢…… "
61090-180 = "那，那個…… "
61090-184 = "老，老師！？我該怎麼辦……？"
61090-185 = "我，我平常除了看雜誌之外，根本沒學過什麼專業知識……！"
61090-186 = "[ns]「……！」 "
61090-188 = "[ns] （聽到「雜誌」這個詞的時候，突然靈光一閃） "
61090-189 = "嗯？要我講講外面的人是怎麼生活的？ "
61090-190 = "像是雜誌裡會看見什麼衣服、什麼食物、怎麼過日子之類的……？ "
61090-191 = "…… "
61090-192 = "嗯！要講這些的話……我應該沒問題……！"
61090-194 = "那，那麼重新……跟大家問好。 "
61090-195 = "聽，聽起來可能有點突然……不過…… "
61090-196 = "你們覺得「時尚」是什麼呢？ "
61090-200 = "嘿，嘿嘿……這個問題的確有點隨興…… "
61090-201 = "不過所謂的時尚……就是透過打扮來決定別人眼中的自己…… "
61090-202 = "其實這種事……比想像中還重要對吧……？ "
61090-203 = "還，還有「外面」的人都怎麼生活……關於「生活」的部分也是……！"
61090-205 = "（結果日和的時尚與生活講座，是四人之中反應最好的）"
61090-209 = "（或許是因為實習老師是由熟悉的小隊成員擔任的關係）"
61090-210 = "（能明顯感覺到奧利斯的學生們……對「上課」的戒心逐漸消退）"
61090-211 = "（就是在等這個時機！）"
61090-213 = "[ns11]「──綜合目前為止的討論，可以得出這樣的結論。」\n[ns12]「所謂自明，也就是本身就是正確無誤的命題──」 "
61090-219 = "（不少學生都跟上了課程）"
61090-225 = "（……當然也有些學生的情況完全相反） "
61090-226 = "（這些加總在一起……就是所謂的校園生活吧……） "
61090-228 = "[ns]「那麼今天的課程就到這裡！大家辛苦了！」"
61090-229 = "辛苦了…… "
61090-230 = "頭好痛…… "
61090-231 = "不過，意外地還算能應付？ "
61090-232 = "讓我看看你的筆記。 "
61090-233 = "你剛才沒記筆記在做什麼啊？ "
61090-234 = "一不小心就放空了…… "
61090-238 = "…… "
61090-240 = "暫時……就把這裡當成老師的宿舍吧。"
61090-241 = "抱歉，老師。#n我們只能準備這種地方……"
61090-242 = "[s13]「沒關係。我有想到會這樣，所以還帶了睡袋過來。」  \n[s14]「哦哦～簡直是天堂～」 "
61090-248 = "[ns]「怎麼了，沙織？」 "
61090-249 = "……老師。 "
61090-250 = "哪怕只有一下子也沒關係……"
61090-251 = "包含今天的事情在內，我有點事想跟你商量……可以嗎？ "
61090-253 = "下一話;傷痕與痕跡"

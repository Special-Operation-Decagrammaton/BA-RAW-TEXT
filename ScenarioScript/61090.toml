[translation]
61090-1 = "ตอนที่ 9;ชั่วโมงเรียน"
61090-2 = "ฮู่ว..."
61090-3 = "อะ... อึก...!"
61090-8 = "ต่างกันแค่นิดเดียวสินะ..."
61090-9 = "ถึงจะเห็นผลลัพธ์แล้วก็เถอะ"
61090-10 = "ความสามารถขึ้นสนิมไปหน่อยหรือเปล่าคะ สควอด?"
61090-11 = "ฉันก็รู้สึกแบบนั้นเหมือนกัน"
61090-12 = "แล้วก็รู้สึกว่าพวกเธอระส่ำระส่ายกันด้วย"
61090-13 = "...!"
61090-14 = "ทีนี้พวกเธอจะว่ายังไงล่ะ?"
61090-15 = "พวกฉันน่าจะพิสูจน์ 'คุณค่าของการมีอยู่' ของพวกฉันไปแล้วนะ?"
61090-19 = "งั้นก็ช่วยไม่ได้..."
61090-20 = "ยัยพวกสควอด หยิ่งผยองกันจังเลยนะ...!"
61090-21 = "พวกเธอได้ไปใช้ชีวิตและมีประสบการณ์จาก 'ข้างนอก' มากกว่าอยู่แล้วไม่ใช่เหรอ? ต่อให้สู้กันไป ก็รู้อยู่ดีว่าผลจะออกมายังไง"
61090-22 = "ทีพวกตัวเองยังปกป้องอาเรียสไว้ไม่ได้ แล้วยังโผล่มายุ่มย่ามให้พวกฉันทำนู่นทำนี่อีก...!"
61090-23 = "ยัยพวกนี้นี่...!"
61090-24 = "ไม่เป็นไรหรอก มิซากิ ไม่เป็นไร"
61090-25 = "นี่เป็นเรื่องที่เราต้องอดทนอยู่แล้วละ"
61090-26 = "คนที่เป็นคุณครูคนนั้นก็ด้วย ถือทิฐิ คิดจะทำอะไรตามอำเภอใจ..."
61090-27 = "ถึงปากจะบอกว่ามันจะเป็นประโยชน์ต่อพวกเราในอนาคต แต่จริงๆ แล้วคิดอย่างอื่นอยู่ละสิ..."
61090-35 = "อ๊ะ?!"
61090-36 = "นี่ นี่! เป็นอะไรหรือเปล่า?!"
61090-37 = "สลบไปแล้ว..."
61090-38 = "ยิงรัว 2 นัดเข้าที่หน้าอกโดยไม่เตือนล่วงหน้า แล้วก็เฮดช็อตต่อ..."
61090-39 = "ถึงรุ่นพี่จะบอกว่าสควอดความสามารถขึ้นสนิมไปแล้ว... แต่ไม่เห็นจะเป็นอย่างนั้นสักนิด..."
61090-41 = "อะ... อาสึโกะ?!"
61090-42 = "เฮือกกก..."
61090-43 = "พวกเธอจะกล่าวหาอะไรพวกฉันก็ได้ แต่ห้ามทำแบบนั้นกับคุณครู"
61090-44 = "ฉันคิดว่าเรื่องแค่นี้น่าจะมีวิจารณญาณกันนะ"
61090-45 = "แล้วฉันก็ยังเป็นสมาชิกของอาเรียสด้วยเหมือนกันนี่?"
61090-46 = "คะ... ค่ะ!"
61090-47 = "......"
61090-49 = "(ทุกคนดูหวาดกลัวจนเหมือนจะตัวลีบลง...)"
61090-50 = "(คุณครูก็เลยตั้งใจพูดให้บรรยากาศคึกคัก!) "
61090-51 = "[ns] \"เอาละ เด็กๆ! งั้นก็มาเรียนหนังสือกัน!\""
61090-52 = "ถะ... ถึงจะชวนให้เรียนหนังสือ แต่พวกเราก็ไม่มีอะไรเลยค่ะ!"
61090-53 = "ห้องเรียนก็เละเทะ ความรู้ก็เป็นศูนย์ อุปกรณ์การเรียนการสอนก็ไม่มี... ไหนจะคนที่มาสอนกันอีก..."
61090-54 = "พอพูดไปมันก็น่าเศร้าอยู่นะคะ..."
61090-55 = "[s1] \"ไม่เป็นไร แค่มีเก้าอี้กับโต๊ะก็พอแล้ว\"\n[s2] \"แค่มีเก้าอี้กับโต๊ะก็เรียนได้แล้วละ\""
61090-60 = "[ns] \"ส่วนคนที่จะมาสอน ครูคิดไว้แล้ว!\""
61090-64 = "จะให้เรียนที่นี่จริงๆ เหรอคะ...?"
61090-65 = "[s3] \"ว้าว! เยี่ยมเลย! โต๊ะก็มี ส่วนเก้าอี้แค่ตั้งให้เข้าที่!\"\n[s4] \"มีทั้งโต๊ะครู กระดานดำ! เป็นห้องเรียนที่สมบูรณ์แบบเลย!\""
61090-68 = "ถึงที่อาเรียสจะไม่ค่อยมีพจนานุกรมหลงเหลืออยู่แล้ว..."
61090-69 = "แต่ความหมายตามพจนานุกรมของคำว่า \"สมบูรณ์แบบ\" ไม่น่าจะใช่สภาพนี้นะคะ หรือว่าฉันพลาด#nอะไรไปหรือเปล่า..."
61090-70 = "แล้วนี่ก็ใกล้จะมืดค่ำแล้วด้วยค่ะ..."
61090-71 = "[s5] \"ปกติชั่วโมงแรกก็แค่เช็กชื่อเท่านั้นละ!\"\n[s6] \"ชั่วโมงแรกน่ะแค่เกริ่นเรื่องที่จะเรียนก็พอแล้ว!\""
61090-74 = "เอ่อ... แบบนี้จะไม่เป็นไรจริงๆ เหรอ ครู...?"
61090-75 = "[s] \"ไม่เป็นไรอยู่แล้ว! ครูเชื่อใจซาโอริของพวกเรานะ!\""
61090-76 = "?!"
61090-77 = "!?"
61090-78 = "ทำไมถึงมีชื่อของฉันอยู่ด้วยล่ะ ครู???"
61090-79 = "[s7] \"เพราะคุณครูที่ถูกคัดเลือกมาจะได้เริ่มสอนเลยน่ะสิ!\"\n[s8] \"เพราะคุณครูที่ถูกคัดเลือกมาจะเริ่มสอนคาบแรกเลยน่ะสิ!\""
61090-82 = "ไปคัดเลือกคุณครูกันตั้งแต่เมื่อไรเหรอ คุณครู?"
61090-83 = "ตั้งแต่ตอนนี้? อืม... งั้นสินะ"
61090-84 = "อย่าบอกนะว่านี่คือ 'แผนการอันยิ่งใหญ่' ที่ครูพูดถึงน่ะ?!"
61090-85 = "จะว่าไป คุณครูก็ถามว่าพวกเราขยันเรียนหนังสือในเวลาว่างบ้างหรือเปล่าด้วย..."
61090-86 = "จะประมาทไม่ได้เลยสินะ เฮ้อ..."
61090-87 = "ตะ... แต่ว่าฉัน... ฉัน..."
61090-88 = "[s] \"ว้าว! ช่วยสอนพวกเราหน่อยนะ คุณครูซาโอริ!\""
61090-89 = "อื้อ สอนพวกเราหน่อยนะ คุณครูซาโอริ"
61090-90 = "คะ... ครูคนเดียวยังไม่พอ แต่อาสึโกะก็ด้วยเหรอ...?!"
61090-92 = "(แล้วซาโอริก็ไปยืนที่โพเดียมด้วยสีหน้าเคอะเขิน...!)"
61090-94 = "(แต่จะให้สอนอะไร แล้วสอนยังไงล่ะ...)"
61090-95 = "(หืม? นี่หนังสือสังคมศึกษา ม.ปลายนี่นา? แล้วเล่มนี้ก็เป็นเรื่องวัฒนธรรมสังคม... และสัญญาประชาคม?)"
61090-99 = "(ถ้าเป็นเรื่องนี้ละก็... ฉันทำได้!)"
61090-100 = "เอาละ ทุกคน! ฉันจะเริ่มสอนแล้ว มานั่งประจำที่!"
61090-101 = "ตะ... ต้องนั่งเรียนจริงๆ เหรอ?"
61090-102 = "ที่จริงฉันก็นั่งอยู่แล้ว..."
61090-103 = "เปิดสมุดบันทึก! ถ้าไม่มี ก็เอาสมุดโน้ตนักเรียนอาเรียสขึ้นมาก็ได้! ฉันรู้นะว่าพกสมุดโน้ตกันอยู่#nคนละเล่มน่ะ!"
61090-104 = "ถ้าไม่มีจริงๆ ก็ให้ไปจดตามเพื่อนคนข้างๆ ทีหลัง"
61090-105 = "การจำเข้าหัวกับการเขียนลงไปด้วยมือน่ะได้ความรู้ไม่เท่ากันหรอกนะ"
61090-106 = "ค่ะ... ค่ะ!"
61090-107 = "นี่คือรุ่นพี่ซาโอริในโหมดเป็นคุณครูสินะ..."
61090-108 = "ก่อนที่เราจะเริ่มเรียน ฉันขอบอกเรื่องสำคัญไว้อย่างหนึ่ง"
61090-112 = "สัญญาจ้าง! เป็นสิ่งที่จำเป็นมาก!"
61090-113 = "สะ... สัญญาจ้าง?"
61090-114 = "มันคือ... อะไรเหรอ? เป็นวัฒนธรรมของโลกข้างนอกนั่นหรือเปล่า...?"
61090-115 = "สัญญาจ้างคือเอกสารที่เขียนขึ้นภายใต้ข้อตกลงระหว่าง 2 ฝ่าย เพื่อให้เป็นหลักฐานทางกฎหมายว่า#nมีการว่าจ้าง และเพื่อระบุเนื้อหาสัญญาที่เป็นรูปธรรม..."
61090-116 = "ถ้าไม่มีเอกสารนี้! ต่อให้ทำภารกิจเสร็จสิ้น! ก็จะไม่ได้ค่าตอบแทนของภารกิจ!"
61090-117 = "สรุปคือเหนื่อยเปล่า! แล้วจะเป็นคนตั้งใจทำงานแต่ถังแตกอยู่ร่ำไป!"
61090-118 = "นี่มันเสียงร้องจากจิตวิญญาณ..."
61090-119 = "ทำไมถึงรู้ดีขนาดนั้นนะ? หรือว่า... เป็นประสบการณ์ตรง?"
61090-120 = "พยายามเข้านะ ซัตจัง...!"
61090-121 = "พะ.... พี่ซาโอริ...!"
61090-123 = "ดังนั้นแก่นของสัญญาประชาคมก็คือ สังคมเป็นแนวคิดไร้แก่นสารที่สมาชิกจะต้องปฏิบัติตามสัญญา"
61090-124 = "หมายความว่าไม่มีสิ่งนั้นมาตั้งแต่แรกเริ่ม และทุกคนต่างก็มีสิทธิโดยกำเนิด... ที่ถูกมอบให้ตั้งแต่วินาทีที่เกิดมา"
61090-125 = "อะ... เอ่อ... ฉันมี... คำถามค่ะ"
61090-126 = "อะไรเหรอ? ไมอา"
61090-127 = "เมื่อกี้ที่บอกว่าไม่มีสิ่งนั้นมาตั้งแต่แรกเริ่ม ถ้างั้นสิทธิที่มอบให้ตั้งแต่เกิดก็ต้องไม่มีด้วยสิคะ...?"
61090-128 = "เป็นคำถามที่ดีเลย ถ้าฟังผ่านๆ ประโยคนั้นอาจฟังดูย้อนแย้ง"
61090-129 = "แต่ให้ลองคิดว่ามีสมมติฐานแบบนี้ดู"
61090-130 = "การ 'ถือว่า' ทุกคนมีสิทธิโดยกำเนิดที่ได้รับมาตั้งแต่เกิด"
61090-131 = "คือการเพิ่มโอกาสในการสร้างสังคมที่ดีขึ้น"
61090-132 = "มะ... หมายความว่าถึงจะไม่ใช่อย่างนั้น แต่การคิดว่ามันเป็นแบบนั้น ท้ายที่สุดแล้วจะให้ผลดีกว่า#nงั้นสินะ..."
61090-133 = "ไม่เคยคิดอะไรแบบนั้นมาก่อนเลย...!"
61090-137 = "อืม เวลาล่วงเลยมาขนาดนี้แล้วสินะ งั้นฉันขอจบการสอนของวันนี้เพียงเท่านี้"
61090-138 = "ถ้ามีคำถาม ให้จดเอาไว้แล้วมาถามในชั่วโมงต่อไป"
61090-139 = "ส่วนการเตรียมบทเรียนล่วงหน้า... คงทำไม่ได้ด้วยหลายๆ เหตุผล แต่ก็แนะนำให้ทบทวนบทเรียน#nของวันนี้ไว้นะ"
61090-140 = "ในความเป็นจริงแล้ว การทบทวนบทเรียนมีประสิทธิภาพกว่าการเตรียมบทเรียนล่วงหน้าน่ะ"
61090-144 = "เอ่อ เป็นยังไงบ้าง? ครู...?"
61090-145 = "[s9] \"ยอดเยี่ยมเลยละ คุณครูซาโอริ...\"\n[s10] \"น่าประทับใจมากเลย คุณครูซาโอริ...\""
61090-148 = "ฉะ... ฉันยังไม่ควรถูกเรียกว่าคุณครูหรอกนะ..."
61090-149 = "แต่ยังไงก็ค่อยยังชั่วนะ ฉันคิดว่าตัวเองทำได้ไม่เลวเลย"
61090-151 = "[ns] \"งั้นต่อไปก็เป็นคุณครูมิซากิ วิชาฟิสิกส์!\""
61090-152 = "ว่าไงนะ? ฉันเนี่ยนะ? แล้วให้สอนฟิสิกส์อีก?! คิดอะไรอยู่น่ะ คุณครู?!"
61090-153 = "ว่าไงนะ? วิถีกระสุนก็คือเรื่องกลศาสตร์คลาสสิกงั้นเหรอ? เรื่องนั้นมัน...!"
61090-154 = "......"
61090-155 = "พอปฏิเสธไม่ได้ว่ามันเกี่ยวข้องกันยิ่งทำให้ฉันโมโหเป็น 2 เท่าเลย..."
61090-156 = "เฮ้อ... งั้นก็ได้ ฉันจะลองดู"
61090-159 = "สมองของพวกเธอยังไม่ถูกกระตุ้นเต็มที่! งั้นอันดับแรกก็จำสูตรกันก่อน!"
61090-160 = "ฉันยังไม่หวังว่าพวกเธอจะเข้าใจได้ถ่องแท้หรอกนะ! ถ้าหลักสูตรพัฒนามากกว่านี้ละไม่แน่!"
61090-161 = "คิดว่าเป็นเรื่องดีเถอะที่คณิตศาสตร์กับฟิสิกส์เป็นวิชาที่ต้องเริ่มจากการจำน่ะ!"
61090-162 = "แน่นอนว่าถ้าเข้าใจได้ตั้งแต่แรก ฉันก็แนะนำให้เรียนตามความเข้าใจได้เลย..."
61090-163 = "แต่ในหลายๆ กรณี คนประเภทนั้นก็มักจะทำความเข้าใจคนอื่นผ่านทางตัวเลขและสถิติ..."
61090-164 = "หรือไม่ก็จะก่อเรื่องเพราะไม่เข้าใจความรู้สึกของเพื่อนมนุษย์ด้วยกัน..."
61090-166 = "สวัสดี ฉันชื่อฮาคาริ อาสึโกะ มาสอนวิชาชีววิทยา"
61090-167 = "งั้นเราจะเริ่มบทเรียนกันเลยนะ ชีววิทยาเป็นวิชาที่ทั้งสนุกและสำคัญเลยละ"
61090-168 = "วิชานี้เราจะได้รู้ว่ายีนคืออะไร"
61090-169 = "และเราเกิดขึ้นมาได้ยังไง มนุษย์มีทายาทสืบสกุลผ่านกระบวนการใด อะไรประมาณนี้"
61090-170 = "[s] \"อาสึโกะ! สต็อป! สต็อป\""
61090-171 = "ทำไมเหรอ คุณครู? นี่เป็นทฤษฎีที่สำคัญจริงๆ นะ"
61090-172 = "ฮุฮุ ไม่เป็นไรหรอก คุณครู ฉันก็รู้หมดแล้วละ"
61090-173 = "งั้นก่อนอื่นเรามาเริ่มกันที่กระบวนการแบ่งเซลล์ที่เรียกว่าไมโอซิส"
61090-175 = "เราจะได้เรียนรู้เกี่ยวกับองค์ประกอบและบทบาทของเซลล์ รวมถึงยีนด้วย"
61090-176 = "ให้จำไว้ว่าเซลล์เป็นหน่วยพื้นฐานของสิ่งมีชีวิต หรือจะบอกว่าเป็นสิ่งมีชีวิตเองก็ได้"
61090-178 = "......"
61090-179 = "สะ... สวัสดีค่ะทุกคน แหะๆ... ด้วยเหตุผลหลายๆ อย่าง... ทำให้เราไม่ได้เจอกันนานเลยนะคะ..."
61090-180 = "วะ... ว่าแต่..."
61090-184 = "คะ... คุณครูคะ?! ให้ฉันสอนอะไรเหรอคะ...?"
61090-185 = "นะ... นอกจากเรื่องนิตยสารแล้ว ฉันก็ไม่มีเรื่องที่เชี่ยวชาญเป็นพิเศษเลย แล้วก็..."
61090-186 = "[ns] \"......!\""
61090-188 = "[ns] (ใช่แล้ว จากนิตยสารนี่ละ!)"
61090-189 = "คะ? ให้ฉันเล่าให้ฟังว่าผู้คนข้างนอกใช้ชีวิตกันยังไงน่ะเหรอคะ?"
61090-190 = "ให้เล่าตามที่เห็นในนิตยสาร... ว่าผู้คนแต่งตัวกันยังไง กินอะไร และใช้ชีวิตแบบไหน...?"
61090-191 = "......"
61090-192 = "ค่ะ! ถ้าเป็นเรื่องนั้นละก็... ฉันมั่นใจว่าทำได้ค่ะ...!"
61090-194 = "สะ... สวัสดีอีกครั้งค่ะ... ทุกคน"
61090-195 = "นะ... นี่อาจจะฟังดูกะทันหันไปหน่อย... แต่ว่า..."
61090-196 = "ทุกคนมีความคิดยังไงเกี่ยวกับแฟชั่นเหรอคะ?"
61090-200 = "แหะ... แหะๆ... ฉันเข้าใจค่ะ ตกใจกับคำถามใช่มั้ยคะ..."
61090-201 = "แต่ทุกคนคะ แฟชั่นคือ... การเลือกใส่เสื้อผ้าเพื่อกำหนดว่าตัวเราจะดูเป็นยังไงในสายตาคนอื่น..."
61090-202 = "เรื่องแบบนั้น... เป็นสิ่งสำคัญมากกว่าที่คิดอีกนะคะ...?"
61090-203 = "ระ... เรื่อง 'การใช้ชีวิต' ของผู้คน 'ข้างนอก' นั่น... ก็สำคัญเหมือนกันค่ะ...!"
61090-205 = "(วิชาแฟชั่นและการใช้ชีวิตของฮิโยริได้รับความนิยมมากที่สุดในบรรดาทุกวิชา!)"
61090-209 = "(คงเป็นเพราะเด็กๆ สควอดเริ่มคุ้นเคยกับหน้าที่คุณครูบ้างแล้ว)"
61090-210 = "(ความระมัดระวังของนักเรียนอาเรียสที่มีต่อ 'การเรียน'... ก็ดูจะเบาบางลงไปด้วย)"
61090-211 = "(นี่คือช่วงเวลาที่คุณครูเฝ้ารอ!)"
61090-213 = "[ns11] \"จากการอภิปรายจนถึงตอนนี้ เราจะได้ข้อสรุปว่า...\"\n[ns12] \"สิ่งที่ชัดแจ้งก็คือ ความมั่นใจในตัวเอง...\""
61090-219 = "(มีนักเรียนหลายคนตั้งใจเรียนหนังสือและเรียนได้ดี)"
61090-225 = "(แม้ว่าเด็กบางคนจะทำตรงกันข้าม...)"
61090-226 = "(แต่รวมๆ แล้ว... นี่ก็คือเรื่องปกติในวัยเรียน...)"
61090-228 = "[ns] \"การเรียนของวันนี้จบลงแต่เพียงเท่านี้! ทุกคนทำได้ดีมาก!\""
61090-229 = "ขอบคุณค่ะคุณครู..."
61090-230 = "ปวดหัวจัง..."
61090-231 = "แต่การเรียนมันก็สนุกดีเหมือนกันเนอะ?"
61090-232 = "ขอดูที่จดไว้หน่อยสิ"
61090-233 = "แล้วเมื่อกี้ทำไมไม่จดล่ะ มัวทำอะไรอยู่?"
61090-234 = "ฉันนั่งเหม่ออยู่แค่แป๊บเดียวเอง รู้ตัวอีกทีก็ตามไม่ทันแล้ว..."
61090-238 = "......"
61090-240 = "คงต้องให้ตรงนี้เป็น... ที่พักของครู... ละนะ"
61090-241 = "ขอโทษนะครู... พวกฉันหาสถานที่ได้แค่นี้น่ะ..."
61090-242 = "[s13] \"ไม่เป็นไร ครูเตรียมถุงนอนมาแล้วละ\"\n[s14] \"ว้าว~ นี่มันสวรรค์ชัดๆ~\""
61090-248 = "[ns] \"เป็นอะไรไปเหรอ ซาโอริ?\""
61090-249 = "ครู..."
61090-250 = "จะแค่ช่วงเวลาสั้นๆ ก็ได้ แต่ฉัน..."
61090-251 = "ขอปรึกษาเรื่องของวันนี้หน่อยได้มั้ย?"
61090-253 = "ตอนต่อไป;บาดแผลและร่องรอย"

[translation]
61090-1 = "Episode 9;Class Is in Session"
61090-2 = "Phew..."
61090-3 = "U-Ugh...!"
61090-8 = "...That was a single bullet difference."
61090-9 = "Though we did still win."
61090-10 = "...Gotten a little rusty, have we, Squad?"
61090-11 = "I can't deny that."
61090-12 = "We had trouble finding our footing."
61090-13 = "...!"
61090-14 = "Then, what's your next move?"
61090-15 = "We've more than proven our \"value\" here."
61090-19 = "The rules...are the rules, I guess..."
61090-20 = "Ugh! Those traitorous, arrogant punks!"
61090-21 = "They've probably gotten into all kinds of crazy fights outside! The odds were stacked against us from the beginning."
61090-22 = "But they couldn't even protect Arius, and now they think they can just throw their weight around?"
61090-23 = "Those little—!"
61090-24 = "It's fine, Misaki. It'll be okay."
61090-25 = "It's not our right to invalidate their resentment."
61090-26 = "That \"Sensei\" person is just like that! Selfish and bullheaded!"
61090-27 = "They're pretending they care about us as \"students,\" but they're just waiting for the chance to stab us in the back!"
61090-35 = "Aah?!"
61090-36 = "H-Hey! You okay?!"
61090-37 = "She's out..."
61090-38 = "T-Two shots to the chest, and one to the head. I barely even saw it happen."
61090-39 = "Those are hardly the skills of someone who's rusty!"
61090-41 = "A-Atsuko?!"
61090-42 = "Eheeheeheehee..."
61090-43 = "We'll endure whatever you wish to throw at us, but you would do well not to direct any of it at Sensei."
61090-44 = "I trust you can exercise at least that much reason."
61090-45 = "I'm still from Arius too. Understood?"
61090-46 = "Y-Yes, ma'am!"
61090-47 = "..."
61090-49 = "The air was decidedly awkward and fearful after Atsuko's...outburst."
61090-50 = "With things being as tense as they were, I took this as an opportunity to liven the mood. "
61090-51 = "[ns] \"All right, kiddos! Let's get to studying!\""
61090-52 = "Y-You can say that, but we don't have anything a normal school has to offer."
61090-53 = "Our classrooms have been long abandoned. We have no coursework or curriculum to study, and no teachers."
61090-54 = "...Do you really want me to keep going?"
61090-55 = "[s1] \"Don't sweat the small stuff!\"\n[s2] \"All you need to learn are chairs, desks, and a blackboard.\""
61090-60 = "[ns] \"And I already have some teachers in mind!\""
61090-64 = "...So. This is it."
61090-65 = "[s3] \"It's perfect! Let's start with picking up the chairs!\"\n[s4] \"Look, there's even a podium and a blackboard!\""
61090-68 = "We don't have many dictionaries here in Arius..."
61090-69 = "...but I guess the definition of \"perfect\" changed at one point."
61090-70 = "It's too late anyways. The sun is setting soon."
61090-71 = "[s5] \"It's okay! The first class is more of an orientation!\"\n[s6] \"It's just a quick overview, and then attendance!\""
61090-74 = "A-Are you sure, Sensei?"
61090-75 = "[s] \"Of course! You can do it, Saori!\""
61090-76 = "?!"
61090-77 = "!?"
61090-78 = "Wh-What? What exactly am I doing, Sensei?"
61090-79 = "[s7] \"You're going to be one of our student teachers...\"\n[s8] \"...taking charge of first period!\""
61090-82 = "When...was this decided, Sensei?"
61090-83 = "...Just now? Ah. My apologies for even asking."
61090-84 = "This... This was your \"grand plan,\" Sensei?!"
61090-85 = "Is this why you asked if we've been keeping up with our studies?"
61090-86 = "*sigh* Everything makes sense now."
61090-87 = "B-but I... I..."
61090-88 = "[s] \"Yay! We're ready for class, Ms. Joumae!\""
61090-89 = "Yes. I'm ready, Miss Saori."
61090-90 = "You too, Atsuko?!"
61090-92 = "Saori looked distressed, and incredibly awkward, as she took the podium."
61090-94 = "(What am I supposed to teach? And how?)"
61090-95 = "(This is...a social studies textbook on...social contract theory?)"
61090-99 = "(I know about this!)"
61090-100 = "Class! Take your seats so we can start."
61090-101 = "Huh? Why should we sit just because she says so?"
61090-102 = "Well... We are already sitting, actually..."
61090-103 = "Open your notebooks! If you don't have one, use your Arius student handbook! I know you each have one of those, at the very least."
61090-104 = "If you really don't have anything to write on, copy your neighbor's notes later."
61090-105 = "Make sure to write things down! You'll never memorize anything if you just tell yourself you'll remember."
61090-106 = "U-Understood!"
61090-107 = "Eek... I'm getting war flashbacks to when Saori was our drill instructor..."
61090-108 = "Before we begin, there is one thing of utmost importance I have to impart on each of you."
61090-112 = "Contracts are important!"
61090-113 = "\"Contracts\"?"
61090-114 = "Wh-What is that? Some outside world thing?"
61090-115 = "A contract is a document drawn up between two parties, to serve as legal proof of their mutual agreement and the terms they agreed upon."
61090-116 = "It doesn't matter how perfect, or strong, or efficient you are when you work! Without a contract, you will never be paid!"
61090-117 = "You'll cut open your hands, pour out your heart and soul, and then leave with nothing! Not even your dignity! And it'll happen to you over, and over, and over again!"
61090-118 = "D-Do you think she's okay?"
61090-119 = "I know, right? That sounded really personal..."
61090-120 = "Hang in there, Sao-Sao!"
61090-121 = "S-Saori...!"
61090-123 = "Thus, social contract theory says that society has no meaning of its own and is instead an artificial concept maintained by the agreement and compliance of its members."
61090-124 = "So, while it is of artificial origins, society assumes that every contributing member is granted inherent, inalienable rights from birth."
61090-125 = "E-Excuse me... I have a question..."
61090-126 = "What is it, Maia?"
61090-127 = "If society isn't real, doesn't that mean those \"inherent rights\" aren't real either?"
61090-128 = "Good question. At first glance, that statement seems contradictory."
61090-129 = "But society is upheld by assumptions and agreements."
61090-130 = "It benefits the whole to assume that every person is born with what we call our \"human rights.\""
61090-131 = "And that assumption creates a better foundation for society."
61090-132 = "So, yes. None of it is real or true. However, choosing to believe in it serves everyone in the end."
61090-133 = "I've never thought of it like that before!"
61090-137 = "And that's all for today."
61090-138 = "If you have questions, write them down and bring them to our next class."
61090-139 = "It'd be unfair of me to ask you to study in advance. But you should review what you can, at least."
61090-140 = "Review is one of the most important parts of studying."
61090-144 = "Um... How did I do, Sensei?"
61090-145 = "[s9] \"Even better than expected, Ms. Joumae...\"\n[s10] \"As a fellow teacher, I was touched!\""
61090-148 = "I'm not quite used to being called that yet."
61090-149 = "But thank you for saying that. I'm relieved."
61090-151 = "[ns] \"Then next up is physics, Ms. Imashino!\""
61090-152 = "Excuse me? Physics, of all things? What is this, Sensei?!"
61090-153 = "What? Ballistics is basically classical mechanics? That's...!"
61090-154 = "..."
61090-155 = "That's actually true. Which infuriates me to no end."
61090-156 = "Ugh. Fine."
61090-159 = "First, memorize the formulas! You're all exercising your brains for the first time!"
61090-160 = "So my expectations are low! At least, until we get further into the curriculum."
61090-161 = "You should be grateful that math and physics start with memorizing formulas!"
61090-162 = "If you can understand everything I'm talking about already, then consider yourself a genius. Go become a physicist or rocket scientist."
61090-163 = "...Although, the smarter you are, the easier it is for your field of vision to narrow to just numbers and facts."
61090-164 = "Empathy and compassion play their own role in the sciences."
61090-166 = "Hello. I am Hakari Atsuko, and I'll be teaching you biology."
61090-167 = "Let us dive right into the lesson. Biology is both fun and important."
61090-168 = "For example, what is a gene?"
61090-169 = "What is the process for living things to produce offspring?"
61090-170 = "[s] \"Atsuko! Stop! STOOOP!\""
61090-171 = "Hm? Are you suggesting I skip over important theory, Sensei?"
61090-172 = "Heehee. Don't worry. You can trust me, Sensei."
61090-173 = "Then why don't we start with what meiosis is?"
61090-175 = "And that wraps up our look at the components and organelles that make up a cell, including the genes."
61090-176 = "If you remember anything, remember that a cell is the basic unit of life."
61090-178 = "..."
61090-179 = "Um. Well. H-Hi, everyone. It's, um, been a while."
61090-180 = "S-So, you see."
61090-184 = "Wh-What am I doing up here, Sensei?!"
61090-185 = "I'm not like the others! I just read a lot of magazines!"
61090-186 = "[ns] \"...!\""
61090-188 = "[ns] \"(As soon as she mentioned magazines, I knew the solution!)\""
61090-189 = "Huh? You want me to talk about how people live on the outside?"
61090-190 = "Like, what they wear, what they eat, how they live... The kinds of things I've seen in magazines...?"
61090-191 = "..."
61090-192 = "I-I can totally do that! Probably!"
61090-194 = "I-If you don't mind me starting over... Hi, everyone."
61090-195 = "Th-This might sound really random, but... Um..."
61090-196 = "What does everyone think of fashion?"
61090-200 = "Heehee... I know it doesn't seem very important, or like something you would learn in school..."
61090-201 = "But fashion is really just...choosing how you want to be seen..."
61090-202 = "I think that's a lot more important than you'd realize!"
61090-203 = "A-And it's a big part of people's daily lives on the outside, in fact...!"
61090-205 = "Hiyori's lecture on fashion and daily life was the most well-received of the four."
61090-209 = "It helped that their teachers were their peers, people they already knew and had grown up with."
61090-210 = "Bit by bit, we chipped away at the other students' wariness towards studying."
61090-211 = "Which was my cue to step in!"
61090-213 = "[ns11] \"From everything we've discussed so far, we can draw the following conclusion.\"\n[ns12] \"A self-evident proposition is something that's clear by its very nature...\""
61090-219 = "Surprisingly, a lot of the students were able to follow the lesson."
61090-225 = "...Not everyone, of course."
61090-226 = "But all of that is simply part of school life."
61090-228 = "[ns] \"And that's a wrap! Great job, everyone!\""
61090-229 = "Thank you..."
61090-230 = "Ugh... My head hurts..."
61090-231 = "I GUESS it wasn't all that bad, though..."
61090-232 = "Hey. Gimme your notes."
61090-233 = "You didn't take your own?!"
61090-234 = "I'm not going to lie. I totally spaced out..."
61090-238 = "..."
61090-240 = "This will be your room...if you could call it that."
61090-241 = "I apologize, Sensei. This is the best we have."
61090-242 = "[s13] \"Don't worry! I actually brought a sleeping bag too!\"\n[s14] \"Ahh... This is heaven...!\""
61090-248 = "[ns] \"Is everything okay, Saori?\""
61090-249 = "...Sensei."
61090-250 = "Do you have time to talk? I'll try not to take up too much of your time."
61090-251 = "I'd like to talk about some things with you...please."
61090-253 = "Next Episode;Scars and What Remain"

[translation]
13250-1 = "Episode 25;The Final Battle 1"
13250-6 = "Agh... Ugh...! "
13250-9 = "*cough* *cough*... Ugh...!"
13250-10 = "Not yet... *cough* *cough*..."
13250-11 = "..."
13250-12 = "Why...Why...am I still lacking...?"
13250-15 = "Am I still...inadequate...to reject Abydos..."
13250-16 = "Even after wandering so much... I'm still..."
13250-19 = " ...What is it you hoped to achieve here?"
13250-20 = "*huff*... *huff*..."
13250-21 = "You were targeting me? Too many of your actions don't align with that statement."
13250-22 = "..."
13250-23 = "...Is it true, Eyepatch? About the notebook?"
13250-24 = "Notebook....? Oh, hahaha... The student council president's notebook...?"
13250-27 = "Did you truly believe that thing still exists, Hoshino? A notebook lost in the middle of the Abydos Desert?"
13250-33 = "A fool. Only a fool like you would even make the effort to find it. "
13250-45 = "...I... "
13250-46 = "I must become the strongest..."
13250-47 = "Leaving that cursed land... Wandering, determined... Like this..."
13250-52 = "The strongest?"
13250-53 = "...Well, whatever. "
13250-57 = "Now, to destroy the Train Cannon.... "
13250-59 = "I don't think so!"
13250-63 = "Huh?"
13250-68 = "Welcome back, Hoshino."
13250-70 = "You're using that line, now of all times? You all seem pretty upset..."
13250-71 = "Hah... You followed this old-timer all the way out here? You guys are really something. Should I be scared...?"
13250-72 = "[s] \"We've come to stop you, Hoshino.\""
13250-73 = "And you even brought Sensei... You're making this harder and harder. You sure are determined, Ayane."
13250-78 = "That's all well and good, but why? If we let the Train Cannon be, it'll throw all of Abydos into chaos."
13250-79 = "The problem is you leaving after it's gone, Hoshino! "
13250-80 = "There's no other way for me to protect you from the consequences."
13250-81 = "What gives you the right? Who asked you? "
13250-83 = "Exactly! Why are you making these decisions without us? This is no different than the last time! "
13250-84 = "Yeah. Acting like this, when you're older than us..."
13250-86 = "Y-You're really going to point that out right now, Shiroko...?"
13250-87 = "That's it! The time for negotiations is over!"
13250-88 = "I'll stop you, here and now!"
13250-90 = "W-Wait... Ayane...? "
13250-95 = "Ayane this... Ayane that...!"
13250-96 = "H-Huh?!"
13250-97 = "...?"
13250-103 = "Stop calling me Ayane! Or your underclassman!"
13250-104 = "U-Um... Ayane...?"
13250-105 = "Start calling me..."
13250-110 = "...President Ayane!"

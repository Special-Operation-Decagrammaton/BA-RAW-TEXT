[translation]
13250-1 = "ตอนที่ 25;การต่อสู้ครั้งสุดท้าย 1"
13250-6 = "อึก... อึกก...!!"
13250-9 = "แค่กๆ... แค่ก...!"
13250-10 = "ทำไม... แค่ก... แค่ก...!"
13250-11 = "..."
13250-12 = "ทำไม... ทำไมถึง... ไม่พอนะ..."
13250-15 = "ฉันยังมีพลังไม่พอ... ที่จะต่อต้านอะบิดอสงั้นเหรอ..."
13250-16 = "ต่อให้เร่ร่อนไปมาถึงขนาดนั้นแล้ว... ฉันยัง..."
13250-19 = "เธอน่ะ อยากทำอะไรกันแน่...?"
13250-20 = "แฮ่ก... แฮ่ก..."
13250-21 = "ฉันคือเป้าหมายของเธองั้นเหรอ...? แต่ถึงอย่างนั้นฉันก็ไม่เข้าใจการกระทำของเธออยู่ดี"
13250-22 = "..."
13250-23 = "ผ้าปิดตาจัง... เรื่องสมุดโน้ตที่เธอพูดน่ะ เรื่องจริงหรือเปล่า?"
13250-24 = "สมุดโน้ต...? ฮ่าฮ่า... สมุดโน้ตของประธานสภานักเรียนน่ะเหรอ...?"
13250-27 = "เธอคิดว่ามันจะมีอยู่จริงๆ งั้นเหรอโฮชิโนะ? สมุดโน้ตที่หายไปกลางทะเลทรายอะบิดอสน่ะนะ...?"
13250-33 = "คงมีแต่คนโง่อย่างเธอเท่านั้นละที่พยายามตามหามัน..."
13250-45 = "ฉันน่ะ..."
13250-46 = "ต้องเป็นคนที่แข็งแกร่งที่สุดให้ได้..."
13250-47 = "ฉันออกจากพื้นที่ต้องคำสาป... เตร็ดเตร่ไปมา... และเตรียมตัวมาตั้งขนาดนี้..."
13250-52 = "แข็งแกร่งที่สุดเหรอ?"
13250-53 = "เฮอะ... ช่างเถอะ"
13250-57 = "ฉันจะไปทำลายปืนแม่เหล็กไฟฟ้า..."
13250-59 = "ไม่ให้ทำแบบนั้นหรอก!!!"
13250-63 = "เอ๋...?"
13250-68 = "เข้ามาสิ รุ่นพี่โฮชิโนะ"
13250-70 = "มาถึงที่นี่เพื่อพูดแบบนั้นเหรอ...? เหมือนทุกคนจะโกรธกันมากเลยสินะ..."
13250-71 = "เฮ้อ... ตามลุงกันมาถึงที่นี่เลยเหรอเนี่ย? เป็นรุ่นน้องที่น่ากลัวจริงๆ เลย ทำเอาลุงคนนี้ตัวสั่นเลยนะ..."
13250-72 = "[s] \"ทุกคนมาขวางเธอนะ โฮชิโนะ\""
13250-73 = "แล้วถ้ามีครูมาด้วยอีก... ก็คงจะลำบากแล้วสินะ เตรียมพร้อมไว้อย่างดีเลยนะเนี่ย อายาเนะจัง"
13250-78 = "ว่าแต่ทำไมล่ะ? ฉันบอกแล้วนี่ว่าถ้าปล่อยปืนแม่เหล็กไฟฟ้านี้ไว้ อะบิดอสจะตกอยู่ในความวุ่นวายนะ"
13250-79 = "ก็รุ่นพี่โฮชิโนะตั้งใจจะทำลายมันแล้วลาออกจากโรงเรียนนี่คะ!"
13250-80 = "ฉันต้องทำอย่างนั้น ความเสียหายจะได้ไม่ตกเป็นของรุ่นน้องไง..."
13250-81 = "แล้วมายุ่มย่ามเรื่องรุ่นน้องทำไม? มีใครบอกให้มายุ่งด้วยงั้นเหรอ!"
13250-83 = "ใช่ค่ะ! ทำไมถึงตัดสินใจอะไรเองคนเดียวล่ะคะ? แบบนี้ก็ไม่ต่างจากครั้งที่แล้วสิคะ!"
13250-84 = "อื้อ อายุก็เยอะกว่าพวกเราอีก"
13250-86 = "เวลาแบบนี้ยังจะมาพูดแบบนั้นอยู่เหรอ ชิโรโกะจัง...?"
13250-87 = "นี่ไม่ใช่เวลามาต่อปากต่อคำกันนะคะ!"
13250-88 = "ขอคุมตัวไว้เดี๋ยวนี้เลย!!"
13250-90 = "ดะ... เดี๋ยวสิ? อายาเนะจัง...?"
13250-95 = "อายาเนะจัง... อายาเนะจัง..."
13250-96 = "หะ... หืม...?"
13250-97 = "...?"
13250-103 = "ฉันไม่ใช่รุ่นน้อง... หรือว่าอายาเนะจังนะคะ..."
13250-104 = "หะ... หืม...? อายาเนะจัง...?"
13250-105 = "ถ้าจะเรียกฉัน..."
13250-110 = "ก็ต้องเรียกว่าท่านประธานอายาเนะ!!!!!!!!"

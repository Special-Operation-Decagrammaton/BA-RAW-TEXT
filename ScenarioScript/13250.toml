[translation]
13250-1 = "第25話;最後的戰鬥（１）"
13250-6 = "呃啊……唔……！！"
13250-9 = "咳咳，咳咳……咳……！"
13250-10 = "還沒……咳咳，咳咳……"
13250-11 = "……"
13250-12 = "為什麼……為什麼……不夠……"
13250-15 = "還……還不夠嗎……還不足以否定阿拜多斯……"
13250-16 = "都已經流浪這麼久了……我……"
13250-19 = "……你到底想做什麼？"
13250-20 = "哈啊……哈啊……"
13250-21 = "我是你的目標？#n……不，你的行動有太多讓人無法理解的地方。"
13250-22 = "……"
13250-23 = "……眼罩醬。#n手冊的事是真的嗎？"
13250-24 = "手冊……？哈哈……學生會長的手冊……？"
13250-27 = "在阿拜多斯沙漠中央弄丟的手冊……難道你以為真的存在嗎？星野。"
13250-33 = "會費盡心思尋找那種東西的人，就只有像你這種蠢蛋了吧……"
13250-45 = "我……"
13250-46 = "我一定要成為最強……"
13250-47 = "離開這個被詛咒的地方……#n明明是在流浪時覺悟到的……居然就這樣……"
13250-52 = "最強？"
13250-53 = "……唉，算了。"
13250-57 = "現在該去破壞列車砲……"
13250-59 = "不會讓你得逞的！！！"
13250-63 = "咦……"
13250-68 = "歡迎回來，星野前輩。"
13250-70 = "怎麼突然冒出這句台詞……？#n看來大家不是普通的生氣……"
13250-71 = "唉……追著大叔到這裡來了嗎？#n這些後輩真是讓大叔我有點害怕呢……"
13250-72 = "[s] 「我們是來阻止你的，星野。」"
13250-73 = "而且連老師都在……這下不太妙呢。#n看來你做好覺悟了，綾音醬。"
13250-78 = "但是為什麼？#n要是放任這門列車砲不管，阿拜多斯就會陷入混亂。"
13250-79 = "可是星野前輩不是想破壞它然後退學嗎！"
13250-80 = "因為這樣才不會讓後輩們受害……"
13250-81 = "沒有人拜託你這麼做吧？"
13250-83 = "就是說啊！為什麼要擅自做決定？這樣不就跟上次沒兩樣了嗎！"
13250-84 = "嗯，明明年紀比我們大還這樣。"
13250-86 = "這，這種時候也能吐槽嗎，白子醬……？"
13250-87 = "不必多說！"
13250-88 = "立刻實施逮捕！！"
13250-90 = "等，等等？綾音醬……？"
13250-95 = "綾音醬……綾音醬……"
13250-96 = "呃，嗯……？"
13250-97 = "……？"
13250-103 = "一下叫我後輩……一下叫我綾音醬……#n這樣不對吧……"
13250-104 = "那個……綾音醬？"
13250-105 = "現在應該叫我……"
13250-110 = "綾音會長才對！"

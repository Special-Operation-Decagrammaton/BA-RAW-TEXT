102030-248 = "มิยุเคยลอบยิงสำเร็จจากระยะ 1980 เมตรด้วยนะคะ"
102030-249 = "...... ไม่แปลกใจเลย แค่ดูความสามารถของสไนเปอร์ก็รู้แล้ว ตอนนี้อาจจะพัฒนากว่าเดิมแล้วด้วย"
102030-250 = "ดูจากการที่คุณครูไว้วางใจกองทหาร RABBIT ในเวลาสำคัญๆ และจากที่ช่วยกันชิงชาเล่ต์กลับมาด้วย#nกัน... เรื่องความสามารถคงไม่ใช่เรื่องโกหกสินะ"
102030-252 = "ก็นะ แต่เราไม่ได้คิดว่าพวกเราเก่งกาจอะไรหรอก..."
102030-253 = "แล้วก็..."

102030-164 = "ฮ่าฮ่าฮ่า ไม่เลวเลยนี่?! แต่เธอโดนดาเมจมากกว่าฉันอีกนะ?"
102030-166 = "คิกคิกคิก... โดนเหรอ..."
102030-167 = "...... ฮีลเสร็จหมดแล้วเถอะ!"
102030-168 = "...... ฮ่าฮ่าฮ่า! ต้องแบบนี้สิถึงจะตื่นเต้น!!"
102030-169 = "ก๊ากกกกกกกกกก!!"
102030-170 = "หยุดนะ! สองคนนั้นทำอะไรกันน่ะ!!"
102030-173 = "อ๊ะ... คุณยูกะ..."
102030-174 = "ฉันบอกให้แบ่งทีมตามแผนไม่ใช่เหรอ? แล้วทำไมถึงมัวมาสู้กันอย่างนี้ล่ะ? ไม่ใช่เด็กๆ กันแล้วนะ! "
102030-175 = "ขอโทษนะคะทุกคน คนที่จะห้ามสองคนนี้ได้ มีแค่ยูกะจังคนเดียวเท่านั้น..."

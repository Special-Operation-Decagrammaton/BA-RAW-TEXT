102030-224 = "นี่ RABBIT 3 สแตนด์บายสำหรับสนับสนุนทางอากาศเรียบร้อย กำลังรอคำสั่ง แล้วมิยุล่ะ?"
102030-225 = "RABBIT 4 อะ... เอ่อ... ตรงนี้ทัศนวิสัยไม่ค่อยดี... ลมพัดไปทางตะวันออกเฉียงใต้ด้วยความเร็ว 35 นอต... ถือว่าไม่ใช่สภาพแวดล้อมที่ดีนัก..."
102030-226 = "ตะ... แต่ก็ไม่ได้เป็นปัญหาในการลอบยิง..."
102030-232 = "ระดับนั้นถือว่าเป็นความเร็วลมความกดอากาศต่ำในเขตร้อนเลยนะ ไม่เป็นปัญหางั้นเหรอ?"
102030-234 = "มะ... มาแล้ว! สหายที่แข็งแกร่งมากๆ คนที่สอง...! โซระซากิ ฮินะ ประธานกรรมการโรงเรียนเกเฮนน่า ......!"
102030-235 = "ระ.. รบกวนด้วยนะคะ"
102030-237 = "สไนเปอร์ ตอนนี้อยู่ห่างจากเป้าหมายแค่ไหน?"
102030-238 = "คะ... คะ?!  ฉะ... ฉันเหรอคะ? ทะ... ที่นี่เหรอคะ? นะ... น่าจะราวๆ 950 เมตร..."
102030-239 = "แล้วอาวุธล่ะ?"
102030-240 = "ปืนไรเฟิลซุ่มยิง RABBIT Type 39 Rifle ค่ะ...! กระสุนปืน 7.62mm x 53mmR เอ่อ... กระสุนปืนมี 5 นัด... มะ... หมายเลขปืนก็..."
102030-242 = "คือว่า..."

102030-245 = "อยู่ไกลออกไปเป็นสองเท่าของระยะทำลายล้าง แถมยังยิงในสภาพแวดล้อมที่ไม่เอื้ออำนวยแบบนี้ได้อีก สุดยอดไปเลยนะ"

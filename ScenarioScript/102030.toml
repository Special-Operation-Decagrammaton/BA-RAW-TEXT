[translation]
102030-1 = "ตอนที่ 3;เตรียมปฏิบัติการ 1"
102030-2 = "หอคอยแห่งคำลวงที่ 1"
102030-3 = "เขตทะเลทรายอะบิดอส"
102030-5 = "ผู้รับผิดชอบปฏิบัติการหอคอยแห่งคำลวงที่ 1 โอคุโซระ อายาเนะค่ะ"
102030-6 = "ทุกคนไปประจำตำแหน่งที่กำหนดไว้แล้วหรือยังคะ? กองกำลังที่ 1 ตอบด้วยค่ะ"
102030-10 = "อื้ม อายาเนะจัง พวกเราเตรียมตัวพร้อมแล้ว"
102030-11 = "อื้ม! สแตนด์บายรอแล้วค่ะ"
102030-13 = "ค่ะ รับทราบค่ะ แล้วรุ่นพี่โฮชิโนะล่ะคะ?"
102030-15 = "อื้ม ลุงก็พร้อมแล้ว"
102030-16 = "ว่าแต่ ที่เห็นนั่นคือ <หอคอยแห่งคำลวง> เหรออายาเนะจัง?"
102030-17 = "ค่ะ ใช่แล้วค่ะ ถ้าจะทำลายหอคอยนั่นให้ได้... เราก็ต้องล่อให้ <บีนาห์> มาทางนี้ให้ได้ค่ะ"
102030-19 = "ได้สิ หน่วยรับจ้างสารพัดจะเป็น <เหยื่อล่อ> เพื่อจูงใจมันให้เอง ทุกคนเข้าใจแล้วใช่ไหม?"
102030-20 = "ค่ะ ค่ะ!! เราจะระเบิดรถไฟขบวนที่เสียนี้ แล้วตายอย่างวีรบุรุษกันใช่ไหมคะ?! ขะ.. เข้าใจแล้วค่ะ! เอาให้ตายเลยไหมคะ? ฉันจะยอมตายให้เลยค่ะ!!"
102030-21 = "อะฮ่าฮ่าฮ่า ฮารุกะจัง กระตือรือร้นมากเลยนะ"
102030-22 = "เปล่า ไม่ต้องตายก็ได้น่า... ฮารุกะ กองกำลังที่ 2 จะดึงดูดสายตาของบีนาห์ จากนั้นจะไปเข้าร่วมกับ#nกองกำลังที่ 1 แล้วโจมตีขนาบข้างกัน "
102030-23 = "นี่เป็นภารกิจอันตรายที่ต้องเคลื่อนไหวผ่านด้านบนของรถไฟ ทุกคนระวังเรื่องความปลอดภัยกันให้#nมากๆ ด้วยล่ะ "
102030-24 = "ฮึ่ม งานที่อันตรายที่สุดน่ะ ให้หน่วยรับจ้างสารพัด 68 จัดการได้เลย แบบนี้แหละที่เรียกว่าร้ายกาจ"
102030-25 = "ฮุฮุฮุฮุ ต้องสนุกมากๆ แน่เลย อาจจะตื่นเต้นเหมือนได้ขี่รถไฟเหาะเลยละ"
102030-26 = "อ้อ จะบอกให้นะ พวกเราจะใช้รถไฟเหล่านี้อย่างเต็มที่ แล้วก็จะระเบิดทิ้งไปเลย"
102030-27 = "จะไม่มีการมาเสียดายเอาทีหลังนะ?"
102030-31 = "อื้ม ไม่ต้องห่วงหรอกค่ะ ยังไงมันก็เป็นเศษเหล็กที่ไม่ได้ใช้งานอยู่แล้ว ยิ่งไปกว่านั้น..."
102030-33 = "รถไฟข้ามทะเลทรายนั่นยังเป็นกิจการที่ทำให้อะบิดอสเข้าใกล้สู่ความพังพินาศเร็วขึ้นด้วย..."
102030-34 = "ในทางกลับกัน ถ้ามันสามารถเอามาใช้กอบกู้โลกได้..."
102030-35 = "ฉันก็น่าจะดีใจอย่างถึงที่สุดเลยละค่ะ♧"
102030-36 = "รุ่นพี่โนโนมิ..."
102030-37 = "รถไฟข้ามทะเลทรายเป็นของเนฟธิสกรุ๊ปเหรอเนี่ย..."
102030-38 = "ไม่ใช่แค่นั้นนะ..."
102030-42 = "เอาละๆ ทางนี้เตรียมพร้อมแล้ว~"
102030-44 = "ค่ะ! ชาเล่ต์คอนโทรลที่ 0 ตอบด้วยค่ะ! หอคอยที่ 1 สแตนด์บายเรียบร้อยค่ะ!"
102030-46 = "ค่ะ รับทราบค่ะ มากิจัง ทางนั้นเป็นยังไงคะ?"
102030-49 = "ไม่มีปัญหาอะไร แต่ฉันอยากกำชับอะไรสักอย่าง..."
102030-50 = "ห้ามไปโดนเลเซอร์ที่ยิงออกมาจากปากของบีนาห์เด็ดขาดล่ะ"
102030-51 = "ว่ากันว่าเลเซอร์นั่นมีอุณหภูมิมหาศาลถึงขนาดที่ทำให้ก้อนหินสลายหายไปได้เลย"
102030-56 = "สถานการณ์ของหอคอยที่ 2 เป็นยังไงบ้างคะ? "
102030-58 = "หอคอยแห่งคำลวงที่ 2"
102030-59 = "เขตพื้นที่รกร้างมิลเลเนียม"
102030-61 = "อื้ม ผู้รับผิดชอบปฏิบัติการหอคอยแห่งคำลวงที่ 2 คืออิซุมิโมโตะ เอมิ"
102030-62 = "จากนี้ไปเราจะบุกโจมตีเชเซ็ดที่อยู่ในโรงงานอาวุธแห่งพื้นที่รกร้างมิลเลเนียม... "
102030-63 = "กองกำลังป้องกันที่สกัดกั้นทหารที่เชเซ็ดสร้างขึ้นอย่างไม่มีที่สิ้นสุดอยู่หน้าโรงงานอาวุธจะถูกลำเลียง#nขึ้นฟ้าไป 3 กิโลเมตรด้วยเครื่องบินขนส่ง "
102030-64 = "และกองกำลังโดดร่มก็จะแทรกซึมเข้าไปผ่านช่องระบายอากาศ และเข้าไปยังส่วนกลางของโรงงาน แล้วก็..."
102030-65 = "ค่ะ จัดกองกำลังโดดร่มแล้วหรือยังคะ? ใครจะเป็นฝ่ายขึ้นเครื่องบินขนส่งไปคะ?"
102030-66 = "อืม... พอดีว่า... มันมีปัญหานิดหน่อย"
102030-67 = "คะ? ปัญหาอะไรคะ...?"
102030-69 = "เธอนั่นแหละ ฟังภาษาคนไม่รู้เรื่องรึไง? หา?"
102030-70 = "คิกๆๆ"
102030-71 = "คิกๆๆๆ......"
102030-72 = "อะ... อืม..."
102030-73 = "มะ... ไม่น่าจะได้ค่ะ..."
102030-74 = "ดับเบิ้ลโอจาก C&C กับหัวหน้าชมรมทวงความยุติธรรมยังมีความคิดเห็นไม่ตรงกันค่ะ"
102030-75 = "......"
102030-77 = "หัวหน้า เรามีเวลาไม่มากแล้ว... นี่ไม่ใช่เวลามาทำแบบนี้นะ... "
102030-78 = "รอแป๊บน่า! ฉันละหัวร้อนกับยัยนี่ชะมัด ฮึ่ย! ควันขึ้นหัวแล้วเนี่ย!"
102030-82 = "เฮ้อ... ทางโน้นก็ช่วยปรามหัวหน้าชมรมทวงความยุติธรรมให้หน่อยเถอะค่ะ..."
102030-83 = "อ่า... ไม่น่าจะได้ค่ะ ถ้ารุ่นพี่ซึรุกิอยู่ในสภาพนั้น ก็ไม่มีใครห้ามปรามได้หรอกค่ะ"
102030-84 = "แล้วเราจะสู้กันทำไมเหรอ? ให้ฝ่ายที่เก่งกว่ารับผิดชอบแนวหน้าไปก็สิ้นเรื่องแล้วนี่?"
102030-85 = "อ๊ะ รุ่นพี่อาสึนะ! พูดคำต้องห้ามออกมาได้ไง!!"
102030-86 = "ซะ... ซวยละ"
102030-92 = "นี่... เธอน่ะ ออกมาเจอกันข้างนอกซิ"
102030-96 = "...... คิกๆๆๆๆๆ"
102030-100 = "ว้าว! จะสู้กันจริงด้วย!! แบบนี้สนุกขึ้นเยอะเลย! ตามไปดูกันเถอะ!"
102030-104 = "เฮ้อ สุดท้ายก็เป็นแบบนี้จนได้..."
102030-105 = "งั้นพวกเราก็ไปกันเถอะค่ะ"
102030-110 = "อืม..."
102030-111 = "ช่วยไม่ได้สินะคะ"
102030-118 = "เอมิ? เกิดเรื่องอะไรเหรอคะ?"
102030-119 = "สองคนนั้นออกไปสู้กันแล้วน่ะ..."
102030-120 = "......"
102030-129 = "อื้อหือ ไม่ธรรมดาเลยนะ หัวหน้าชมรมทวงความยุติธรรมเนี่ย"
102030-130 = "สู้ระยะประชิดกับรุ่นพี่เนรุได้ด้วย... ไม่เคยเห็นใครทำได้มาก่อนเลย"
102030-131 = "ก็นั่นคือซึรุกิแห่งทรีนิตี้นี่คะ เก่งขนาดที่ได้ฉายา <อาวุธยุทธศาสตร์แห่งทรีนิตี้> มาเลยด้วย..."
102030-133 = "โอ้โห ยอดไปเลยค่ะ ไม่ได้เจอคนที่ไม่กลัวรุ่นพี่ซึรุกิมานานแล้วนะคะ"
102030-141 = "คิกคิกคิก..."
102030-142 = "ก๊ากกกกกกกก!!"

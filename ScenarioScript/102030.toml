102030-200 = "......"
102030-201 = "รู้ผลกันสักที"
102030-203 = "โมโมอิ! มิโดริ! ยูสึ! มีเควสด่วนเข้ามาค่ะ! เราต้องไปถล่มดันเจี้ยนค่ะ!"
102030-204 = "ระ.. รู้แล้วน่า อย่าเอะอะมากเกินไปสิอาริสึ! นี่มันแผนการสำคัญนะ"
102030-205 = "พี่โมโมอิ... ระ.. เราจะไหวกันไหม?"
102030-206 = "อะ... อื้ม... คุณครูบอกว่าจะมีทีมที่ดีที่สุดมารวมตัวกันที่นี่ ยังไงก็ต้องผ่านไปได้ด้วยดีแหละ..."
102030-207 = "ค่ะ! อาริสึก็ได้ยินมาเหมือนกันค่ะ! คราวนี้เราจะได้สู้ไปพร้อมกับสหายที่แข็งแกร่งมากๆ เลยค่ะ! เราต้องทำสำเร็จแน่ค่ะ!"
102030-208 = "อะ... อืม... สหายที่แข็งแกร่งมากๆ..."
102030-209 = "หนึ่งในนั้นน่าจะมีหน่วยรบพิเศษเนอะ?"
102030-216 = "ที่นี่คือสลัมเพียเหรอ? บรรยากาศน่าขนลุกจัง"
102030-217 = "กองทหาร RABBIT เพิ่งมาถึงจุดหมายและเข้าร่วมกองบัญชาการหลักเลยค่ะ "
102030-219 = "มะ... มาแล้ว! SRT นี่นา! "
102030-220 = "สะ... สวัสดีค่ะ..."
102030-222 = "ค่ะ วันนี้ขอฝากเนื้อฝากตัวด้วยนะคะทุกคน"

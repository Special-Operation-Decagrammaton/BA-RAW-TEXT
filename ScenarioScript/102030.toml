102030-258 = "(คนจากเหตุการณ์ที่เกิดขึ้นในมิลเลเนียม...)"
102030-263 = "ปาปัม ปาปัม ป๊าม! ได้สหายเลเวลสูงสุดมาเข้าตี้แล้วค่า!!"
102030-264 = "......"
102030-265 = "เออะ...?!  อะ... อาริสึ...!?"
102030-266 = "ขะ... ขอโทษค่ะ! พอดีอาริสึจังของเราไม่ค่อยมีเซนส์สักเท่าไร..."
102030-267 = "อาริสึเคยได้ยินเรื่องของประธานกรรมการวินัยเกเฮนน่ามาจากคุณครูด้วยค่ะ!"
102030-269 = "คุณครู...? พูดถึงฉันเหรอ?"
102030-270 = "(กระซิบกระซาบ) ฉันเคยได้ยินข่าวลือว่าประธานกรรมการจากเกเฮนน่าเป็นคนน่ากลัวมาก และถ้ามี#nอะไรไม่ถูกใจละก็ เธอจะกำจัดทิ้งอย่างไม่ปรานีเลยละ..."
102030-271 = "(กระซิบกระซาบ) นะ... น่ากลัวจัง... ถ้าเผลอทำอะไรผิด... ระ... เราอาจจะโดนดุก็ได้..."
102030-272 = "ไม่หรอกค่ะ! คุณครูบอกกับอาริสึไว้ว่าท่านประธานกรรมการเป็นคนดีมากๆ เลยค่ะ!"
102030-273 = "งะ... งั้นเหรอ..?"
102030-274 = "คุณครูเหรอ?"
102030-278 = "...... แล้วบอกอะไรอีก?"
102030-279 = "แล้วก็... บอกว่าเป็นหนึ่งในคนที่คุณครูไว้วางใจและพึ่งพาได้มากที่สุดด้วยค่ะ!"
102030-280 = "อาริสึก็เลยรู้สึกเป็นเกียรติมากค่ะที่ได้อยู่ปาร์ตี้เดียวกันกับท่านประธานกรรมการ! อาริสึดีใจมากเลยค่ะ!"
102030-281 = "อืม..."
102030-285 = "ช่างเถอะ ไม่มีอะไรหรอก"
102030-286 = "สแตนด์บายที่หอคอยที่ 3 เรียบร้อย กองทหาร RABBIT และชมรมพัฒนาเกมกำลังรอคำสั่ง ตรวจสอบให้ด้วยว่าใครเป็นผู้รับผิดชอบปฏิบัติการ"
102030-287 = "อ่า... จะว่าไป ผู้รับผิดชอบปฏิบัติการนี้..."
102030-292 = "ผู้รับผิดชอบปฏิบัติการหอคอยที่ 3... ฮะ... ฮานาโอกะ ยูสึค่ะ..."
102030-293 = "ทะ... ทำไมถึงเป็นฉันนะ..."
102030-294 = "ยูสึจัง สู้ๆ นะ!"
102030-295 = "ใช่! ถ้าไม่ใช่ยูสึ ก็ไม่มีใครทำได้หรอก!"
102030-297 = "รับทราบค่ะ รบกวนด้วยนะคะคุณยูสึ "
102030-299 = "คะ... ค่ะ.... งือ..."
102030-301 = "ตอนต่อไป;เตรียมปฏิบัติการ 2"

[translation]
102030-1 = "Episode 3; Planning an Operation 1"
102030-2 = "The First False Sanctum"
102030-3 = "Abydos Desert District"
102030-5 = "This is Okusora Ayane, in charge of the first False Sanctum operation."
102030-6 = "Is everyone in their designated location? First unit, please respond."
102030-10 = "Yeah, Ayane. We're ready to go."
102030-11 = "Yup, yup! We're on standby."
102030-13 = "Affirmative. Hoshino?"
102030-15 = "All set."
102030-16 = "So, that's the False Sanctum, Ayane?"
102030-17 = "Yes. To destroy it...we have to lure Binah this way."
102030-19 = "Problem Solver will act as bait to lure Binah here. Does everyone know the plan?"
102030-20 = "Y-Yes! We're going to make this broken train go into overdrive and explode! I-I got it! W-We're all gonna die!"
102030-21 = "Hahaha! Haruka, I love how enthusiastic you are."
102030-22 = "We're not gonna die, Haruka. The second unit will lure Binah and join the first unit to attack together."
102030-23 = "This mission'll be dangerous, seeing as we're on top of a train and all, so look out for each other, okay? "
102030-24 = "Heehee. Looks like Problem Solver 68 has the most dangerous position. We're hard-boiled outlaws, after all."
102030-25 = "Heeheehee. It'll be like riding a roller coaster. This is gonna be a blast!"
102030-26 = "Just so you know, we'll blow these trains up as we please during the operation."
102030-27 = "Don't try to tell us otherwise, all right?"
102030-31 = "No problem-o! They're just old, abandoned scrap metal. Not only that..."
102030-33 = "The trans-desert railway was the project that accelerated the downfall of Abydos..."
102030-34 = "If we can use it to save the world..."
102030-35 = "There would be nothing more gratifying for me. ♧"
102030-36 = "Nonomi..."
102030-37 = "I didn't know the trans-desert railway was owned by Saint Nephthys."
102030-38 = "And on top of that..."
102030-42 = "All right, all right. Let's get moving!"
102030-44 = "Yes! Schale Control Zero, please respond! The first sanctum team is on standby!"
102030-46 = "Affirmative. Maki, how is it over there?"
102030-49 = "All set. But one thing before y'all go..."
102030-50 = "Make sure to not come in contact with the laser coming from Binah's mouth."
102030-51 = "It's a super-high-temperature laser that can even vaporize stone. So, be careful!"
102030-56 = "Okay, good. Second sanctum team, please update. "
102030-58 = "The Second False Sanctum"
102030-59 = "Millennium Ruins District"
102030-61 = "Yes, this is Izumimoto Eimi, in charge of the second sanctum."
102030-62 = "We will be attacking Chesed, located inside the Millennium ruins munitions factory..."
102030-63 = "We have a defensive unit blocking the front of the munitions factory. It'll slow down Chesed's endless supply of forces. "
102030-64 = "We're preparing a drop unit to fly up three kilometers in a transport plane and free-fall into a ventilation hole leading directly to the center of the factory."
102030-65 = "Understood. Have you formed the drop unit? Who will be on the transport plane?"
102030-66 = "...Um. That's where the problem lies."
102030-67 = "Huh? What's the problem?"
102030-69 = "Do you not understand the words coming out of my mouth?! Huh?"
102030-70 = "Kekeke."
102030-71 = "Kekekeke."
102030-72 = "Um... I..."
102030-73 = "This is...troublesome, to say the least."
102030-74 = "C&C's Double O and the president of the Justice Task Force are unable to find common ground."
102030-75 = "..."
102030-77 = "President, it's about time... We have to get going..."
102030-78 = "Shove it! I don't care! I'm pissed off! She's pissing me off, you hear?"
102030-82 = "*sigh* ...Is there anything you can do to calm your president, by chance?"
102030-83 = "If I could, I would, but I can't. When Tsurugi is like that, no one can reason with her."
102030-84 = "But why are they fighting? Why wouldn't the stronger side take the front?"
102030-85 = "A-Asuna! Don't say that out loud! Please!!!"
102030-86 = "Ugh. Too late."
102030-92 = "...Hey, you. Come outside."
102030-96 = "...Kekeke."
102030-100 = "Oooh, are they gonna fight! Heehee. Let's watch! This'll be fun."
102030-104 = "*sigh* Here we go..."
102030-105 = "I suppose we should go supervise."
102030-110 = "Um..."
102030-111 = "Well, it's not like I can do anything to stop it."
102030-118 = "Eimi? What's happening?"
102030-119 = "...The two presidents are fighting to see who is stronger."
102030-120 = "..."
102030-129 = "Whoa, the president of the Justice Task Force is impressive!"
102030-130 = "She held her own in close combat against Neru... I've never seen that before."
102030-131 = "She's Tsurugi of the Justice Task Force. They call her Trinity's secret weapon for a reason."
102030-133 = "Wow, incredible. It's been a while since I've seen someone who isn't threatened by Tsurugi."
102030-141 = "Kekeke..."
102030-142 = "Kyaaaah!"
102030-147 = "Hahaha! Nice! Try this next!"
102030-160 = "Hahaha! The president looks like she's having lots of fun."
102030-161 = "I see. A lot has happened recently... I guess she has been pretty stressed."
102030-162 = "Hmm. Tsurugi is at the top of her game today too."
102030-164 = "Hahaha. That wasn't bad! But I hope that's not all you've got! You took more damage than I did!"
102030-166 = "Kekeke... Who cares...?"
102030-167 = "...I've already healed."
102030-168 = "...Hahaha! I like your attitude!"
102030-169 = "Kyaaaaaaa!"
102030-170 = "Excuse me! What are you guys doing?!"
102030-173 = "Ah...! Yuuka..."
102030-174 = "You should be dividing the teams as we discussed! And you decide to have a brawl instead? Your immaturity astounds me! "
102030-175 = "I'm sorry, everyone. But I thought Yuuka was the only one who could stop this fight..."
102030-176 = "..."
102030-177 = "Ugh... It was just getting interesting..."
102030-179 = "Huh? But we have to decide who's stronger in order to divide the teams!"
102030-180 = "Are you serious right now?!"
102030-181 = "All right, you two!"
102030-182 = "Huh?"
102030-183 = "?"
102030-184 = "Play rock, paper, scissors!"
102030-188 = "What?! We can't decide like that!"
102030-189 = "Shut up! We don't have time for this! Are you going to let our whole plan go awry for your antics?"
102030-190 = "Hmph... Okay."
102030-196 = "Okay... Rock..."
102030-197 = "...Paper."
102030-198 = "...Scissors!"
102030-200 = "..."
102030-201 = "It's decided."
102030-203 = "Momoi! Midori! Yuzu! We have an urgent quest to clear a dungeon!"
102030-204 = "I-I know. We have to stay calm, Aris! This is an important quest."
102030-205 = "I-Is everything gonna be okay?"
102030-206 = "O-Of course... Sensei said they've gathered all the strongest people in Kivotos."
102030-207 = "Yes! I have heard we will have very powerful allies in our party, so we will be okay!"
102030-208 = "Yeah... Very powerful allies..."
102030-209 = "Some of them are special forces or something, right?"
102030-216 = "Is this Slumpia? It's kinda creepy."
102030-217 = "RABBIT Squad. We've arrived at the target area and joined the main unit."
102030-219 = "Th-They're here! SRT...!"
102030-220 = "H-Hello..."
102030-222 = "Hello. We're looking forward to working with you today."
102030-223 = "RABBIT 3, RABBIT 4, please report your locations."
102030-224 = "RABBIT 3, air support standby. Waiting for command. How's it going, Miyu?"
102030-225 = "RABBIT 4. Uh, visibility is poor... Wind is thirty-five knots from the southeast... So it's n-not a very nice environment..."
102030-226 = "S-Still...it won't be a b-big problem for sniping..."
102030-232 = "It's a tropical cyclone-class wind speed. How is it not a problem?"
102030-234 = "Th-There she is! Another powerful ally! Sorasaki Hina, the Gehenna head prefect!"
102030-235 = "N-Nice to meet you."
102030-237 = "Sniper. How far are you from the target?"
102030-238 = "H-Huh?! M-Me? H-Here? Oh... About nine hundred and fifty meters..."
102030-239 = "What's your firearm spec?"
102030-240 = "It's a RABBIT Type 39 sniper rifle...! Uses 7.62 by 53mmR bullets with a five-round feed internal magazine, and the gun number is..."
102030-242 = "Pardon me, but..."
102030-244 = "...Oh, sorry. I didn't mean to come off aggressively. "
102030-245 = "I was just curious. Being able to shoot from a distance twice the effective range of your weapon under such unfavorable conditions is well beyond your average sniper."
102030-246 = "Y-You really think so?"
102030-247 = "Wow...! Th-Thank you!"
102030-248 = "Miyu's incredible. She's successfully sniped her target at a distance of 1,980 meters before."
102030-249 = "...I'm impressed. You measure a sniper by their skill, not their weapon. I'm sure she'll grow even more."
102030-250 = "The rumors that it was thanks to the RABBIT Squad that Sensei was able to retake Schale seem to be undeniable."
102030-252 = "I-It really wasn't that big of a deal."
102030-253 = "Also..."
102030-257 = "You must be Tendou Aris..."
102030-258 = "(From that incident at Millennium...)"
102030-263 = "Bum bum bum! The max level expert has joined the party!"
102030-264 = "..."
102030-265 = "H-Huh?! Aris!"
102030-266 = "I-I'm sorry! Aris isn't good at reading the room..."
102030-267 = "Sensei has told me about the Gehenna head prefect!"
102030-269 = "...Sensei? About me?"
102030-270 = "*whisper* I hear the Gehenna head prefect is a very scary person who ruthlessly gets rid of anyone who defies her..."
102030-271 = "*whisper* Th-That's scary... She might yell at me if I do something wrong..."
102030-272 = "You are all wrong! Sensei says the head prefect is a very nice person!"
102030-273 = "R-Really...?"
102030-274 = "Really, Sensei?"
102030-278 = "...A-Anything else?"
102030-279 = "And that she is one of the people Sensei relies on the most! That she has all of their trust!"
102030-280 = "So it is a great honor for the head prefect to join our party! I am very happy!"
102030-281 = "Um..."
102030-285 = "...Nevermind. It's nothing."
102030-286 = "The third sanctum team, reporting. The RABBIT Squad and Game Development Department are on standby. Requesting operation manager confirmation."
102030-287 = "Ah. The operation manager is..."
102030-292 = "I-I'm Hanaoka Yuzu... The third sanctum operation manager..."
102030-293 = "Wh-Why me...?"
102030-294 = "Yuzu, we're cheering you on!"
102030-295 = "Yeah! Only you can handle this operation, Yuzu!"
102030-297 = "Confirmed. Yuzu, good luck."
102030-299 = "O-Okay... Ugh..."
102030-301 = "Next Episode; Planning an Operation 2"

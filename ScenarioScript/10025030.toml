[translation]
10025030-1 = "第3話;禁忌"
10025030-4 = "……我整理了調查的中期報告。"
10025030-8 = "詢問夜戶浦村的漁民們後得知，#n近幾個月來並沒有發生足以影響蝦隻捕撈的事件。"
10025030-9 = "證詞顯示，最近的漁獲量的確有減少，不過並非足以導致D.U.全區一蝦難求的程度。"
10025030-10 = "我也試著調查了「Red Hook Express」的加工廠，#n不過並沒有發現什麼事故或疑點。"
10025030-11 = "真是個和平的村子啊──不過說難聽一點，也是安靜到令人不適的村子。"
10025030-16 = "我確認了位於村子入口的監視器，#n不過除了一天兩班的公車之外，沒有任何車輛進出。"
10025030-17 = "雖然能運送大量冷凍蝦子的方法相當有限……"
10025030-18 = "不過除了「Red Hook Express」的定期船之外並沒有造訪村子的跡象。"
10025030-19 = "沒有在與外部交流嗎……？#n觀光客好像也只有我們而已……"
10025030-20 = "啊，有件事我有點在意……#n我在海邊遇到了一個帶著釣具的人……"
10025030-21 = "不過那個人與其說是對釣魚有興趣……#n反而更像是在尋找什麼別的東西……"
10025030-27 = "[ns]「總覺得……」"
10025030-28 = "……真可疑呢。"
10025030-29 = "綜合收集到的情報來看，這個村子應該沒有發生問題才對。#n然而D.U.卻一蝦難求，這就代表……"
10025030-31 = "雖然不是很想懷疑村民……"
10025030-32 = "這麼看來，是有人在說謊啊。"
10025030-33 = "[s]「大家與村民接觸後有什麼感想嗎？」"
10025030-34 = "唔嗯，這個嘛……"
10025030-35 = "大家都似乎都對外地人相當警戒，根本沒辦法好好對話。"
10025030-36 = "就連平時很親切的女武神警察學園的學生也很不友善。#n甚至到了讓人不太敢搭話的程度。"
10025030-38 = "有什麼……讓外地人知道的話會很不妙的事嗎……？"
10025030-39 = "咯嘻嘻……那當然囉，美優。"
10025030-40 = "沒有理由的話就沒必要那麼生氣了吧。#n他們肯定有所隱瞞。"
10025030-42 = "比如～你想想之前咲希他，因為衣服沒乾就沒穿內衣出任務時的反應──"
10025030-43 = "喂！為什麼要突然提起那件事啊……！"
10025030-49 = "還有……村民有提到要小心「深處的存在」。"
10025030-50 = "啊，那個我也有聽過。"
10025030-51 = "說是在附近游泳的話，要注意別讓「深處的存在」降下制裁。"
10025030-52 = "嗯……我是從釣客口中聽到如果能獲得「深處的存在」的幫助……之類的話。"
10025030-54 = "什麼意思，所以是跟釣魚有關係嗎？"
10025030-55 = "……難道這個村子會有海豚出沒？"
10025030-60 = "……「深處的存在」是[ruby=這裡]夜戶浦村[/ruby]自古以來就有的都市傳說。#n指的是棲息於海中的超凡存在──"
10025030-70 = "你是……？"
10025030-71 = "哎呀，打斷大家的談話，真是非常不好意思。"
10025030-72 = "實在是很久沒看見造訪村子的客人，情不自禁就出聲搭話了。"
10025030-73 = "初次見面。#n我是一名經營將夜戶浦村出產的蝦子進行加工，並送往D.U.事業的海運業者。"
10025030-75 = "運送蝦子？#n也就是說……"
10025030-76 = "你就是「Red Hook Express」的董事長嗎？"
10025030-77 = "哈哈。被這麼稱呼實在讓人有些難為情呢。"
10025030-78 = "以前我也曾經以一名船員的身分出海捕魚，不過卻始終無法達到資深漁夫的實力……因而半途而廢了。"
10025030-83 = "很高興見到您。"
10025030-84 = "我們也一直很想與總是供應非常美味的蝦子到D.U.的#n「Red Hook Express」的董事長見一面呢。"
10025030-85 = "哈哈哈，能聽到你們這麼說真是相當欣慰。"
10025030-86 = "不過……感覺最近在D.U.好像幾乎看不到蝦子呢。"
10025030-87 = "餐廳自不用說，連便利商店似乎也沒有見到……"
10025030-88 = "…………"
10025030-89 = "身為董事長的您，是否知道些什麼呢？"
10025030-90 = "那是因為──遭遇了漁獲量不佳的情況。"
10025030-91 = "雖然原因尚不清楚，也許是水溫上升之類的影響吧。#n甚至到了最近有捕蝦回來的船都很少見的程度。"
10025030-92 = "既然捕不到蝦子，自然也就無法供應給D.U.了不是嗎？"
10025030-93 = "我們面對自然實在無能為力，只能祈禱時間能解決問題而已。#n對我們來說，這同樣是與大家的生活息息相關的問題，因此也想設法解決……"
10025030-94 = "不過村民們都說雖然漁獲量有減少，但並不是什麼大問題啊……"
10025030-95 = "……畢竟這事關跑船人的自尊心。#n想必無法老實說出實情吧。"
10025030-96 = "況且他們也並非在捕撈作業上有疏失不是嗎？"
10025030-97 = "蝦子的量會由於各種因素有所變化也是很正常的。#n將其稱之為[ruby= ・     ・ ]問題[/ruby]，我想是有點語病。"
10025030-98 = "雖然是這樣沒錯，可是……"
10025030-100 = "真要說的話，我也對這個捕不到蝦子的情況很不滿意。"
10025030-101 = "光是這個月就不知道出現了多少損失……"
10025030-102 = "如果可以，我甚至都想請求「深處的存在」幫忙喚回蝦子們了。"
10025030-103 = "那，那個……「深處的存在」是什麼呢……？"
10025030-104 = "就像剛才提到的一樣，「深處的存在」指的是棲息於大海中傳說般的存在。#n時至今日依然在夜戶浦村口耳相傳著。"
10025030-105 = "據我所知，村子東邊名為「鬼岩礁」的岩礁地帶附近有座海底城市……#n他們似乎就棲息在那裡。"
10025030-106 = "其身體被鱗片所覆蓋，擁有能在深海來去自如的強健身軀。"
10025030-107 = "由於僅會因為肉體損傷的原因而死亡，#n據傳曾有許多夢想長生不老的人因而造訪了這個村子。"
10025030-108 = "……不過，那些尋夢者的下落似乎依然不得而知。"
10025030-109 = "噫，噫噫……"
10025030-110 = "此外，也有「深處的存在」會授予中意的人類各式各樣加護的說法。"
10025030-111 = "簡單來說，「深處的存在」──就是如同掌管大海的神一樣的存在，可以這麼說吧。"
10025030-112 = "[s1]「像是龍王嗎……？」\n[s2]「像是O行俠嗎……？」"
10025030-113 = "這個嘛，雖然不完全相同，但可以說是類似的概念吧。"
10025030-114 = "……嗯？你指的是……？"
10025030-115 = "總之……或許是因為漁獲量減少感到不安的緣故，#n最近大家又開始提起「深處的存在」了。"
10025030-116 = "還說「應當獻上祭品」以平息他們的憤怒，#n或是「應當趕走擾亂規律的外地人」之類的話。"
10025030-118 = "您說祭品……具體來說是什麼樣的祭品呢？"
10025030-120 = "那當然……是活生生的人類。"
10025030-122 = "……！"
10025030-124 = "……呵呵，開玩笑的。#n請不要那麼害怕。"
10025030-125 = "活人獻祭這種事不過是傳說罷了。#n其真偽現在也無從得知……"
10025030-126 = "但現在這個時代，如果有人消失的話，世人也不會默不作聲吧？"
10025030-127 = "……我們也想盡可能平靜地繼續在這裡做生意啊。"
10025030-128 = "（這種說法……簡直像是如果不會引起騷動，獻上祭品也在所不惜啊）"
10025030-129 = "如果各位還是對「深處的存在」感到好奇，不妨到「鬼岩礁」看看如何？"
10025030-130 = "不過，在潮差變化大的大潮之日，還請千萬不要靠近。"
10025030-131 = "……為什麼呢？"
10025030-132 = "根據傳說，「深處的存在」為了回收供品，會在大潮之日在陸地上現身。"
10025030-133 = "如果村民們在我們不知道的地方真的有獻上祭品……"
10025030-134 = "我並不認為打探村子情報的外地人會受到歡迎。"
10025030-136 = "……！！ "
10025030-138 = "哎呀……似乎有點說太久了呢。#n好像說了一些多餘的話。"
10025030-139 = "別這麼說，村裡的情況我們也明白了。#n謝謝您。"
10025030-140 = "……這個世界上，有些事還是不知道比較好呢。"
10025030-142 = "那麼，祝各位玩得愉快。"
10025030-150 = "這，這個村子果然被詛咒了……#n聽到「深處的存在」這個名字的時候，我們就應該回去才對……"
10025030-151 = "我們肯定會被當成祈求漁業繁盛的祭品……#n說不定現在村子的出入口都已經被堵住了……！"
10025030-152 = "美優，你在說什麼啊。#n我們幾個就算出入口被堵住也能逃走吧？"
10025030-153 = "可，可是……恐怖電影的開頭都是這樣演的！"
10025030-154 = "雖然起初只是單純覺得好奇，但從中途開始就變得想逃也逃不掉……"
10025030-155 = "肯定很快就會發生怪奇現象，然後恐怖的怪物就會出現在我們面前……"
10025030-156 = "接著我們會被幻影給附身，只能在恐懼之中度過剩餘的人生……！"
10025030-157 = "……你也太誇張了。#n怎麼可能會有那種怪物呢。"
10025030-158 = "不管是怪物還是詛咒，終究只是人類為了嚇人而編造出來的東西。"
10025030-159 = "我也這麼認為。"
10025030-160 = "如果擁有那種力量的存在真的在海中，奇普托斯的聯邦學生會一定會採取行動才對。"
10025030-161 = "……話說美優，你知道嗎？"
10025030-162 = "這個世界上最恐怖最可怕的存在……#n據說就棲息在聯邦學生會的財務室裡哦。"
10025030-164 = "我是不知道「深處的存在」到底是多麼了不起的存在，#n不過要是漁業活動影響到奇普托斯的經濟……#n財務室的稅務調查負責人可是絕對不會視而不見的哦？"
10025030-165 = "……這也太具體了吧。"
10025030-167 = "還以為透過奧德賽海洋高中弄來的導彈藏得很好的說……"
10025030-168 = "你又瞞著我們做了什麼啊！？"
10025030-169 = "總之聽清楚了。#n連哭泣的孩子都會沉默的SRT特殊學園的隊員，可不能被這種傳言給迷惑。"
10025030-171 = "究竟是誰在說謊……一定要查個水落石出！"
10025030-173 = "……但是，雖然想進行更進一步的調查，不過我們似乎已經太引人注目了呢。"
10025030-174 = "在被村民們警戒著的情況下，要立刻重新展開調查我想會有困難。"
10025030-175 = "所有人先回到據點趁早休息吧。"
10025030-176 = "等到村民們都入睡，寂靜降臨的時候──"
10025030-177 = "重新展開調查！"

[translation]
10025030-1 = "ตอนที่ 3;ข้อห้าม"
10025030-4 = "รายงานเรื่องที่ตรวจสอบได้ระหว่างปฏิบัติภารกิจค่ะ"
10025030-8 = "จากการสอบถามคนในหมู่บ้านยาโตอูระ ไม่พบว่าเกิดการเปลี่ยนแปลงด้านสภาพแวดล้อมพิเศษที่จะ#nส่งผลกระทบต่อการจับกุ้งในช่วงไม่กี่เดือนนี้เลยค่ะ"
10025030-9 = "ดูจากที่ชาวบ้านเล่ามาแล้ว ในช่วงไม่กี่ปีที่ผ่านมาปริมาณกุ้งที่จับได้มีจำนวนลดลงจริง... แต่ไม่ได้ลด#nลงมากพอที่จะทำให้เกิดการขาดแคลนกุ้งในเขต D.U. ได้ค่ะ"
10025030-10 = "ฉันลองตรวจสอบบันทึกดูแล้วว่าในช่วงที่ผ่านมาเกิดอุบัติเหตุอะไรที่โรงงานแปรรูปอาหารทะเล <เรด ฮุก เอ็กซ์เพรส> หรือเปล่า แต่ก็ไม่เจอปัญหาอะไรเลย"
10025030-11 = "...นอกจากเรื่องที่บรรยากาศในหมู่บ้านวังเวงจนน่ากลัวแล้ว ก็นับว่าทุกอย่างดูเงียบสงบดี"
10025030-16 = "ฉันตรวจสอบกล้องวงจรปิดทั้งหมดที่ทางเข้าหมู่บ้านแล้ว นอกจากรถบัสที่เข้าออกวันละสองครั้งแล้ว ก็ไม่มีรถอื่นเข้ามาเลย"
10025030-17 = "นอกจากใช้รถแล้ว การขนส่งกุ้งแช่แข็งหลายสิบตันทางบกก็เป็นไปไม่ได้..."
10025030-18 = "แถมยังดูไม่เหมือนว่าจะมีการขนส่งกุ้งไปยังเส้นทางอื่น นอกจากเส้นทางขนส่งประจำของ#n<เรด ฮุก เอ็กซ์เพรส> ด้วย"
10025030-19 = "นอกจากนี้ หมู่บ้านนี้ยังแทบไม่มีปฏิสัมพันธ์กับคนภายนอกเลย ดูเหมือนเราจะเป็นคนนอกเพียงกลุ่ม#nเดียวในหมู่บ้านนี้เลยละ"
10025030-20 = "อ่า... แต่ว่าฉันไปเจอนักตกปลาพร้อมอุปกรณ์ตกปลาที่แถวๆ ท่าเทียบเรือมาด้วย..."
10025030-21 = "แต่ว่าดูเหมือนคนคนนั้นจะไม่ได้สนใจเรื่องการตกปลา แต่เหมือนกำลังมองหาอะไรบางอย่างอยู่ด้วยละ"
10025030-27 = "[ns] \"บางอย่างงั้นเหรอ...\""
10025030-28 = "...น่าสงสัยจังเลยนะคะ"
10025030-29 = "ถ้าวิเคราะห์จากข้อมูล ที่นี่ดูเหมือนจะไม่ได้มีปัญหาใหญ่อะไร แต่จากสถานการณ์ที่ตรวจสอบได้ใน#nตอนนี้ก็ยังไม่สามารถอธิบายได้ว่าทำไมถึงเกิดปัญหาการขนส่งกุ้งไปที่เขต D.U. ค่ะ"
10025030-31 = "เว้นแต่ว่าคนในหมู่บ้านทุกคนกำลังหลงผิดอะไรบางอย่างอยู่..."
10025030-32 = "หมายความว่ามีชาวบ้านบางคนโกหกสินะ"
10025030-33 = "[s] \"มีเรื่องอื่นที่ติดใจอีกมั้ย?\""
10025030-34 = "จะเรียกว่าเป็นเรื่องที่ติดใจได้มั้ยนะ..."
10025030-35 = "ดูเหมือนคนในหมู่บ้านจะพร้อมใจกันระวังคนนอกมากๆ จนส่วนใหญ่ไม่คิดที่จะคุยกันเลยด้วยซ้ำน่ะ"
10025030-36 = "แม้แต่พวกนักเรียนของสถาบันฝึกตำรวจวัลคิรี่ที่ขึ้นชื่อเรื่องความมีน้ำใจยังแสดงออกว่าไม่พอใจอย่าง#nออกนอกหน้าเลย ดูน่ากลัวจนไม่กล้าคุยด้วยเลยละ"
10025030-38 = "ดูเหมือน... มีความลับอะไรบางอย่างที่ไม่อยากเปิดเผยให้คนนอกหมู่บ้านรู้รึเปล่านะ?"
10025030-39 = "ฮุฮุฮุ... แน่นอนอยู่แล้วมิยุ"
10025030-40 = "ส่วนใหญ่คนที่โมโหหรือแสดงท่าทางไม่พอใจออกมาอย่างไม่มีเหตุผลน่ะ มักจะเป็นพวกคนที่โดน#nจี้ใจดำเอาไงล่ะ"
10025030-42 = "อย่างเช่น ท่าทางของซากิที่ต้องไปปฏิบัติการโดยไม่ใส่ชุดชั้นในเพราะตากไว้แล้วมันไม่แห้ง—"
10025030-43 = "นี่! จู่ๆ เธอจะพูดเรื่องนั้นขึ้นมาอีกทำไมกันเล่า...!"
10025030-49 = "แล้วอีกอย่าง ถึงฉันจะไม่ค่อยเข้าใจเท่าไร แต่คนในหมู่บ้านบอกว่าให้ระวัง <ตัวตนแห่งห้วงลึก> ด้วยค่ะ"
10025030-50 = "อ่า เรื่องนั้นฉันก็ได้ยินมาจากสถานีตำรวจเหมือนกัน"
10025030-51 = "พวกเขาบอกว่าถ้าจะว่ายน้ำแถวนี้ละก็ ให้ระวังๆ อย่าไปทำให้ <ตัวตนแห่งห้วงลึก> ไม่พอใจน่ะ"
10025030-52 = "ฉันก็เหมือนกัน... ได้ยินว่าพวกนักตกปลาจะขอให้ <ตัวตนแห่งห้วงลึก> ช่วยให้ตกปลาได้..."
10025030-54 = "...ตัวตนของบางสิ่งบางอย่างที่อยู่ใต้ทะเลที่ช่วยเหลือเวลาตกปลา? มันคืออะไรน่ะ?"
10025030-55 = "ที่น่านน้ำนอกชายฝั่งทะเลมีพวกโลมาอยู่ด้วยงั้นเหรอ?"
10025030-60 = "... <ตัวตนแห่งห้วงลึก> เป็นคำโบราณของคนในหมู่บ้านนี้ที่ใช้เรียกสิ่งมีชีวิตลึกลับเหนือธรรมชาติใต้#nทะเลน่ะครับ"
10025030-70 = "คุณคือ...?"
10025030-71 = "อ่า ขอโทษที่เข้ามาขัดจังหวะระหว่างที่คุยกันนะครับ"
10025030-72 = "พอดีผมไม่ได้เห็นนักท่องเที่ยวที่มาจากเขตอื่นนานแล้ว เลยดีใจจนเผลอพูดไปโดยไม่รู้ตัวน่ะครับ"
10025030-73 = "จะขอแนะนำตัวให้ฟังก่อนนะครับ ผมคือผู้ดูแลบริษัทขนส่งที่รับผิดชอบการขนส่งกุ้งที่ผลิตในหมู่บ้าน#nยาโตอูระไปยังเขต D.U. น่ะครับ"
10025030-75 = "ขนส่งกุ้งเหรอ? ถ้างั้น..."
10025030-76 = "คุณคือประธานของ <เรด ฮุก เอ็กซ์เพรส> งั้นเหรอคะ?"
10025030-77 = "ฮะฮ่า พอได้ยินแบบนั้นแล้วก็เขินอยู่หน่อยๆ เหมือนกันนะครับเนี่ย"
10025030-78 = "ผมทำธุรกิจขนส่งเล็กๆ ที่หมู่บ้านนี้มานานแล้วละครับ แต่ถ้าเปรียบกับพวกชาวประมงในหมู่บ้านนี้ ก็นับว่ายังเป็นเด็กน้อยไร้ประสบการณ์อยู่เลยครับ"
10025030-83 = "ยินดีที่ได้พบคุณค่ะ"
10025030-84 = "ฉันเองก็อยากพบกับประธานของทาง <เรด ฮุก เอ็กซ์เพรส> ที่คอยจัดส่งกุ้งแสนอร่อยมาที่เขต D.U. มาตลอดเลยละค่ะ"
10025030-85 = "ฮ่าฮ่า ได้ยินแบบนั้นก็หายเหนื่อยเลยละครับ"
10025030-86 = "แต่ว่า... ช่วงนี้ไม่ค่อยเห็นกุ้งในเขต D.U. เลยนะคะ"
10025030-87 = "การจัดส่งกุ้งมีปัญหาอะไรรึเปล่าคะ ดูเหมือนช่วงนี้ไม่ค่อยเห็นเมนูกุ้งในร้านอาหารต่างๆ หรือข้าวกล่อง#nในร้านสะดวกซื้อเลย..."
10025030-88 = "......"
10025030-89 = "ท่านประธานคอยดูแลเรื่องการขนส่งกุ้งไปที่เขต D.U. อยู่... ไม่ทราบว่าพอจะรู้สาเหตุบ้างมั้ยคะ?"
10025030-90 = "เรื่องนั้น แน่นอนว่าเป็นเพราะช่วงนี้จับกุ้งไม่ค่อยได้น่ะครับ"
10025030-91 = "ไม่รู้ว่าเพราะช่วงนี้อากาศร้อนรึเปล่า ดูเหมือนว่าพวกชาวประมงจับกุ้งกันได้น้อยมาก จนเกือบจะกลับ#nมามือเปล่ากันเลยละครับ"
10025030-92 = "พอจับกุ้งไม่ได้ ก็เลยมีกุ้งไม่พอส่งไปที่เขต D.U. น่ะครับ"
10025030-93 = "ถ้าจับกุ้งได้ตามเดิมก็จะคลี่คลายปัญหานี้ได้ เพราะงั้นไม่ต้องกังวลไปหรอกนะครับ"
10025030-94 = "แต่ว่าชาวบ้านที่นี่บอกว่าปริมาณกุ้งที่จับได้ก็ไม่มีปัญหาอะไรนี่นา?"
10025030-95 = "...นั่นเพราะพวกชาวประมงน่ะรักศักดิ์ศรีกันจะตาย ไม่มีทางยอมพูดออกมาตามตรงหรอกครับ"
10025030-96 = "อีกอย่างมันก็ไม่ใช่ปัญหาจากการทำงานของพวกเขาด้วยนี่ครับ?"
10025030-97 = "มันเป็นธรรมชาติที่ปริมาณของกุ้งที่จับได้จะเพิ่มขึ้นหรือลดลงตามฤดูกาล เพราะงั้นจะเรียกว่าเป็น#n'ปัญหา' ก็คงไม่ถูกซะทีเดียวน่ะครับ"
10025030-98 = "ถึงจะจริงอย่างที่พูดมาก็เถอะ..."
10025030-100 = "อันที่จริง กระผมเองก็อยากร้องไห้กับสถานการณ์ในตอนนี้อยู่เหมือนกันครับ..."
10025030-101 = "ถ้าในเดือนนี้ยังไม่มีกุ้งขายอีกละก็คงจะเสียหายหลายส่วนเลย..."
10025030-102 = "ถ้าเป็นไปได้ก็อยากจะไปขอร้อง <ตัวตนแห่งห้วงลึก> ให้เรียกฝูงกุ้งกลับมาที่นี่อีกเลยละครับ"
10025030-103 = "คือว่า... <ตัวตนแห่งห้วงลึก> มันคืออะไรกันแน่เหรอคะ?"
10025030-104 = "ก็อย่างที่ผมบอกไปน่ะ <ตัวตนแห่งห้วงลึก> เป็นสิ่งมีชีวิตลึกลับใต้ทะเลที่เล่าต่อๆ กันมาเป็นตำนาน#nของหมู่บ้านยาโตอูระครับ"
10025030-105 = "ตามตำนานเก่าแก่ของหมู่บ้านนี้ เล่ากันว่าที่ใต้ <แนวประการังยักษ์> ที่อยู่ทางตะวันออกของหมู่บ้าน มีเมืองใต้น้ำที่เป็นที่อาศัยของสิ่งมีชีวิตลึกลับอยู่น่ะครับ"
10025030-106 = "ได้ยินว่าร่างกายของพวกนั้นปกคลุมไปด้วยเกล็ดปลา และมีพละกำลังแข็งแกร่งสามารถว่ายน้ำได้#nอย่างอิสระ ไม่ว่าจะอยู่ลึกแค่ไหนก็ตามด้วยครับ"
10025030-107 = "พวกนั้นจะไม่มีวันตายเพราะความชราภาพหรือความหิวโหย แต่จะตายเพราะถูกใช้ความรุนแรงเท่านั้น ผู้คนที่ใฝ่ฝันถึงความเป็นอมตะจึงมาที่หมู่บ้านแห่งนี้เพื่อมาพบสิ่งมีชีวิตลึกลับพวกนั้นยังไงล่ะครับ"
10025030-108 = "แน่นอนว่าในตำนานไม่ได้มีการเล่ากันมาว่าผู้คนที่ได้เผชิญหน้ากับพวกนั้นมีจุดจบอย่างไร แต่ว่า..."
10025030-109 = "ฮะ...เฮือก..."
10025030-110 = "ยิ่งไปกว่านั้น <ตัวตนแห่งห้วงลึก> สามารถเรียกฝูงปลาในทะเลมาได้อย่างอิสระ พวกนั้นเลยมักจะ#nสัญญาว่าจะมอบทุกสิ่งทุกอย่างที่สามารถหาได้จากทะเลให้กับมนุษย์ที่มันพึงพอใจครับ"
10025030-111 = "ถ้าจะพูดให้เข้าใจง่ายๆ ก็คือ <ตัวตนแห่งห้วงลึก> ก็เปรียบเสมือนกับเทพเจ้าแห่งท้องทะเลนั่นละครับ"
10025030-112 = "[s1] \"เทพมังกรเหรอ...?\"\n[s2] \"มนุษย์เงือกเหรอ...?\""
10025030-113 = "อืม ไม่ใช่เป๊ะๆ ทีเดียว แต่ก็อะไรคล้ายๆ แบบนั้นแหละ"
10025030-114 = "หืม...? นั่นมันตัวอะไรกันครับน่ะ...?"
10025030-115 = "ยังไงก็เถอะครับ... อาจเป็นเพราะช่วงที่ผ่านมากุ้งที่จับได้มีปริมาณลดลง เลยมีชาวบ้านที่พูดถึง <ตัวตนแห่งห้วงลึก> กันเยอะขึ้นน่ะครับ"
10025030-116 = "ตัวอย่างเช่น ควรส่งเครื่องสังเวยไปในทะเลเพื่อให้พวกนั้นหายโกรธบ้าง หรือขับไล่คนนอกที่เข้ามา#nรบกวนความสงบสุขของทะเลบ้างน่ะครับ"
10025030-118 = "เครื่องสังเวย... ต้องสังเวยอะไรเหรอคะ?"
10025030-120 = "มันก็แหงอยู่แล้ว... ก็คนเป็นๆ ยังไงล่ะครับ"
10025030-122 = "......!"
10025030-124 = "ฮุฮุ ล้อเล่นนะครับ ไม่ต้องกลัวไปหรอกนะ"
10025030-125 = "การส่งคนเป็นๆ ไปเป็นเครื่องสังเวยน่ะมีแค่ในตำนานหรือเรื่องเล่าสมัยก่อนเท่านั้นแหละ แถมยังไม่รู้#nด้วยว่าเป็นเรื่องจริงหรือเปล่าด้วยครับ"
10025030-126 = "อีกอย่างสมัยนี้ ถ้าจู่ๆ มีคนหายไปจากหมู่บ้านประมงห่างไกลอย่างยาโตอูระละก็... คงจะเกิดเรื่อง#nวุ่นวายไม่น้อยเลยละ ว่าไหมครับ? "
10025030-127 = "...พวกเราอยากทำงานที่เรารักกันต่อไปเงียบๆ ในหมู่บ้านนี้ก็เท่านั้นเองครับ"
10025030-128 = "(...ฟังดูเหมือน ถ้าเป็นไปได้ก็อยากโยนคนเป็นๆ ลงไปเป็นเครื่องสังเวยเลยแฮะ...)"
10025030-129 = "ถ้าหากพวกเธอสนใจเรื่องเกี่ยวกับ <ตัวตนแห่งห้วงลึก> ละก็ ผมแนะนำให้พวกเธอลองไปดูที่ <แนวปะการังยักษ์> เองดีกว่านะครับ"
10025030-130 = "...แต่ว่าอย่าเข้าไปใกล้ที่นั่นในคืนวันจันทร์ข้างแรมจะดีกว่านะ"
10025030-131 = "ทำไมล่ะคะ...?"
10025030-132 = "ว่ากันว่าในคืนจันทร์ข้างแรม <ตัวตนแห่งห้วงลึก> จะขึ้นมารับของบรรณาการบนบกน่ะครับ"
10025030-133 = "มันอาจเป็นเรื่องเล่าที่พวกชาวประมงคุยโม้กันเองก็ได้ แต่ถ้าเกิดว่าพวกนั้นมีตัวตนอยู่จริงๆ ละก็..."
10025030-134 = "พวกนั้นคงไม่ยินดีแน่ ถ้าเจอกับคนนอกที่เข้ามาขุดคุ้ยความลับของหมู่บ้านน่ะครับ"
10025030-136 = "......!!"
10025030-138 = "แย่ละสิ กระผมนี่พูดไปเรื่อยจริงๆ ดันพูดอะไรไร้สาระไปซะแล้วครับ"
10025030-139 = "ไม่หรอกค่ะ เรื่องที่คุณเล่ามาช่วยให้เราเข้าใจหมู่บ้านนี้ได้เยอะมากเลยค่ะ ขอบคุณนะคะ"
10025030-140 = "ในโลกนี้ยังมีอะไรอีกหลายอย่างที่เราไม่รู้อยู่อีกเยอะมากละนะ..."
10025030-142 = "ถ้างั้นผมขอตัวก่อนละ ขอให้ทุกคนสนุกกับวันหยุดพักผ่อนนะ"
10025030-150 = "คะ...คิดแล้วว่าเมืองนี้เป็นเมืองต้องสาป... สังหรณ์ใจตั้งแต่ได้ยินคำว่า <ตัวตนแห่งห้วงลึก> แล้วเชียว..."
10025030-151 = "พวกเราคงถูกเลือกให้เป็นเครื่องสังเวยเพื่อเรียกฝูงปลากลับมาที่หมู่บ้านอีกแน่ๆ... ตอนนี้ถึงจะอยาก#nหนีไปไกลๆ ก็คงทำไม่ได้แล้ว..."
10025030-152 = "พูดอะไรของเธอน่ะมิยุ ก็พวกเรามาที่หมู่บ้านนี้กันเองไม่ใช่รึไง?"
10025030-153 = "แต่ว่า... หนังสยองขวัญก็มักจะเริ่มเรื่องกันแบบนี้นี่นา!"
10025030-154 = "ตอนแรกก็โดนดึงดูดใจมาเพราะความอยากรู้อยากเห็น จากนั้นต่อให้อยากหนีไปให้พ้นก็หนีไปไม่ได้..."
10025030-155 = "เพราะมีสัตว์ประหลาดสุดสยองขวางทางหนีเอาไว้ แล้วสุดท้ายก็กัดกินเราไปจนถึงวิญญาณ..."
10025030-156 = "สุดท้ายก็จะต้องใช้ชีวิตอยู่ท่ามกลางความหวาดกลัว และเผชิญกับภาพหลอนในโลกแห่งความสยอง ...!"
10025030-157 = "...อย่าเพิ่งโวยวายเลยน่ามิยุ โลกนี้มีสัตว์ประหลาดแบบนั้นที่ไหนกันล่ะ?"
10025030-158 = "ทั้งพวกสัตว์ประหลาดหรือเรื่องคำสาป สุดท้ายมันก็เป็นเรื่องที่คนแต่งขึ้นมาเพื่อทำให้คนอื่นเค้ากลัว#nกันก็เท่านั้น"
10025030-159 = "ฉันเห็นด้วยค่ะ"
10025030-160 = "ถ้ามันมีสิ่งมีชีวิตลึกลับที่แข็งแกร่งขนาดนั้นอยู่ในทะเล ไม่มีทางที่องค์การนักเรียนของคิโวทอสจะไม่#nรับรู้ถึงการมีตัวตนของมันแน่ๆ ค่ะ"
10025030-161 = "รู้อะไรรึเปล่า มิยุ?"
10025030-162 = "สัตว์ประหลาดที่น่ากลัวที่สุดในโลกไม่ได้อยู่ในทะเลหรอก แต่อยู่ที่ฝ่ายการเงินขององค์การนักเรียน#nต่างหากล่ะ..."
10025030-164 = "ฉันไม่รู้หรอกนะว่า <ตัวตนแห่งห้วงลึก> จะลึกลับและทรงพลังแค่ไหน แต่ถ้าตัวตนของพวกมันมี#nอิทธิพลต่อการประมงและส่งผลกระทบต่อเศรษฐกิจของคิโวทอสละก็ คงไม่มีทางรอดพ้นสายตาของ#nทีมตรวจสอบภาษี 4 ของฝ่ายการเงินไปได้หรอก..."
10025030-165 = "ยกตัวอย่างมาได้เห็นภาพชัดสุดๆ เลยแฮะ..."
10025030-167 = "ฉันก็อุตส่าห์คิดว่าฉันซ่อนมิสไซล์ที่ลักลอบซื้อผ่านทางโรงเรียนโอดิสซีย์ไว้อย่างดีแล้วแท้ๆ..."
10025030-168 = "นี่เธอไปแอบทำอะไรโดยที่พวกเราไม่รู้อีกแล้วเหรอ?!"
10025030-169 = "ยังไงก็เถอะ กองทหารของสถาบันพิเศษ SRT ที่จับได้แม้กระทั่งผีอย่างพวกเรา จะถอนกำลังออกจาก#nสถานที่ปฏิบัติภารกิจแค่เพราะกลัวข่าวลือก็คงไม่ได้"
10025030-171 = "ฉันจะขุดคุ้ยให้ถึงที่สุดแล้วจับตัวการที่หาประโยชน์จากข่าวลือพวกนี้ให้ได้เลย!"
10025030-173 = "แต่ว่า... ต่อให้พวกเราคิดจะตรวจสอบเพิ่มเติมอีกก็ตาม แต่มันดูเหมือนว่าตอนนี้จะมีคนจับตาดูพวกเรา#nเยอะเกินไปค่ะ"
10025030-174 = "คนในหมู่บ้านจะระมัดระวังตัวกับพวกเราด้วย แบบนี้สืบต่อลำบากแน่ๆ ค่ะ"
10025030-175 = "เอาเป็นว่าวันนี้พวกเรากลับไปพักผ่อนให้เต็มที่ก่อนดีกว่าค่ะ"
10025030-176 = "พอหมู่บ้านเงียบลง และพวกชาวบ้านกลับไปพักผ่อนกันหมดแล้ว..."

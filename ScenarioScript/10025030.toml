10025030-105 = "3;해운업자;00;이 마을의 오랜 설화에 따르면, 마을 동쪽에 있는 <도깨비의 암초> 아래에는 신비한 힘을 지닌 존재가 사는 해저 도시가 있다고 하지요."
10025030-106 = "3;해운업자;00;그들은 물고기와 같이 온몸이 비늘로 덮여 있으며, 아무리 깊은 바닷속이라도 자유로이 헤엄칠 수 있는 튼튼한 몸을 갖고 있다고 합니다."

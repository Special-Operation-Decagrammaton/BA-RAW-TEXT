[translation]
10025030-1 = "Episode 3;Trespassers"
10025030-4 = "Let's begin the mission status report."
10025030-8 = "After questioning the fishermen of Yatoura Village, there doesn't seem to be any issues with the shrimp fishing itself."
10025030-9 = "The catches have been smaller than usual, but there's no sign it should have cut off the supply to the D.U. entirely."
10025030-10 = "I also checked to see if there was some problem at Red Hook Express' processing plant, but everything seems fine there."
10025030-11 = "The only thing I can report is that the town is uncomfortably silent."
10025030-16 = "I checked all the CCTVs in town. The only vehicle coming or going is the bus that goes through twice a day."
10025030-17 = "There's no way a truck loaded with five tons of frozen shrimp could sneak by without me noticing..."
10025030-18 = "I think we can rule out the idea that someone's smuggling shrimp under Red Hook Express' nose."
10025030-19 = "That matches what I saw. Besides us, the only people here are the local townsfolk."
10025030-20 = "Oh, actually, I did meet one other person from out of town by the pier..."
10025030-21 = "He said he was th-there for fishing, but he didn't know anything about fish and he seemed distracted by something..."
10025030-27 = "[ns] \"Something smells...\""
10025030-28 = "...fishy."
10025030-29 = "We don't have any evidence of wrongdoing, but we still can't explain why shrimp isn't making it to the D.U."
10025030-31 = "It's almost like the whole town is under a spell..."
10025030-32 = "Someone in this town is lying. That's for sure."
10025030-33 = "[s] \"You really didn't learn anything else?\""
10025030-34 = "We can ask questions until our faces are blue..."
10025030-35 = "But everyone here is wary of outsiders. Most wouldn't even talk to me."
10025030-36 = "Even the students from Valkyrie Police School had a bad attitude."
10025030-38 = "M-Maybe...the t-town has a dark secret..."
10025030-39 = "Heeheehee... Of course it does, Miyu."
10025030-40 = "People who look angry for no reason are usually hiding something."
10025030-42 = "Like that time Saki went on a mission without her underwear because the laundry wasn't finished drying..."
10025030-43 = "Hey! Why are you bringing that up NOW?!"
10025030-49 = "Now that you mention it, Sensei, I did hear some townsfolk mention something called the \"Deep Ones.\""
10025030-50 = "Oh, the Valkyrie student also mentioned that."
10025030-51 = "She told me I should be careful not to anger the \"Deep Ones.\""
10025030-52 = "Ah... That other person from out of town mumbled that the \"Deep Ones\" can help him catch fish..."
10025030-54 = "Deep so-and-sos that help with fishing? I don't get it..."
10025030-55 = "Maybe they trained dolphins to dive deep down and bring up fish...?"
10025030-60 = "The Deep Ones are an old superstition in these parts. Ancient creatures who live under the sea."
10025030-70 = "Who's there?"
10025030-71 = "I hope I'm not interrupting."
10025030-72 = "It's so rare to see new faces here. I got so excited that I jumped into the conversation."
10025030-73 = "Most days, the only people I see are fishermen bringing me their shrimp to be shipped off to the D.U."
10025030-75 = "You're in charge of shipping? That means..."
10025030-76 = "Are you the CEO of Red Hook Express?"
10025030-77 = "Haha... Guilty as charged."
10025030-78 = "I suppose I should be proud of my humble business, but the old salts of Yatoura don't seem to think much of it."
10025030-83 = "Well, it's a pleasure to meet you."
10025030-84 = "On behalf of the D.U., I want to thank Red Hook Express for all of the delicious shrimp you've sent our way."
10025030-85 = "Haha! It seems all my hard work paid off, after all."
10025030-86 = "But for some reason, we haven't seen any shrimp in the D.U. lately..."
10025030-87 = "Not in restaurants, and not in convenience stores... It's got to be an issue with distribution, right?"
10025030-88 = "..."
10025030-89 = "Since it's your company, I wonder if you know what's going on?"
10025030-90 = "That's because shrimp aren't being caught. Obviously."
10025030-91 = "Maybe it's because of this unusually hot weather, but the fishermen have been coming back empty-handed more often than not lately."
10025030-92 = "If there are no shrimp, then there's nothing to send to the D.U."
10025030-93 = "The shrimp will come back in no time. I'm sure of it."
10025030-94 = "Interesting... When we spoke with the fishermen, they said they're still catching shrimp."
10025030-95 = "Oh, that's because of...their pride, I bet. They don't want to admit they're having trouble."
10025030-96 = "And it's not like they can't catch other fish."
10025030-97 = "If you think about it, lots of things are seasonal. This is probably just part of the natural shrimp-fishing cycle."
10025030-98 = "I mean, I guess, but..."
10025030-100 = "In fact, if anyone should be complaining about this shrimp situation, it's me!"
10025030-101 = "You wouldn't believe how much money I'm losing over this shrimp shortage..."
10025030-102 = "I wish the Deep Ones would help me out and bring the shrimp back!"
10025030-103 = "Um... What exactly are the Deep Ones, anyway...?"
10025030-104 = "I mentioned they're a superstition here, right? More of a folktale, really."
10025030-105 = "They say there's an underwater city beneath Devil's Reef off the town's eastern shore."
10025030-106 = "The city's inhabitants are covered in fish-like scales, and they can survive at any depth."
10025030-107 = "They don't age or hunger, so many who seek immortality come to this town in search of them."
10025030-108 = "Although, no one knows what happens to those who actually find the Deep Ones..."
10025030-109 = "Um... Uh..."
10025030-110 = "They say that the Deep Ones have dominion over the fish of the sea, and those who earn their favor are promised all the riches of the ocean."
10025030-111 = "In short, the Deep Ones are gods of the sea."
10025030-112 = "[s1] \"Like the Dragon King of the Sea...?\"\n[s2] “Like that superhero who talks to fish...?\""
10025030-113 = "Ah, from mythology? It's not a perfect match, but they're pretty similar."
10025030-114 = "Huh? What kind of superhero is that...?"
10025030-115 = "Anyway... Maybe it's because of the shrimp situation, but the villagers have been talking about the Deep Ones a lot lately."
10025030-116 = "I've heard whispers that the town may need to offer a sacrifice to the Deep Ones...or drive away meddling outsiders..."
10025030-118 = "What kind of sacrifices...?"
10025030-120 = "What else? Human sacrifices."
10025030-122 = "...!"
10025030-124 = "Hahaha! I'm joking, of course. Don't look so scared!"
10025030-125 = "The old folktales mention sacrifices, but it's all just stories."
10025030-126 = "In this day and age, don't you think it'd be big news if a little fishing village like this was making human sacrifices?"
10025030-127 = "All the people here want is to go about their business in peace."
10025030-128 = "(That's what they always say before doing a human sacrifice...)"
10025030-129 = "If you want to know more about these Deep Ones, why not visit Devil's Reef for yourselves?"
10025030-130 = "Just don't go on a night when the tide is at its lowest."
10025030-131 = "Why not...?"
10025030-132 = "According to legend, on nights when the tide is lower than normal, the Deep Ones come to the surface to collect tribute."
10025030-133 = "Obviously, it's made-up nonsense, but... Well, just in case there's a kernel of truth in there..."
10025030-134 = "I doubt the Deep Ones would appreciate a group of outsiders digging around the town's secrets."
10025030-136 = "...!"
10025030-138 = "Ah, maybe I've said too much..."
10025030-139 = "Not at all. You've been a big help in letting us get to know the town. Thank you."
10025030-140 = "There are some things better left unknown, though."
10025030-142 = "Well, I'd best leave you to your vacation!"
10025030-150 = "This t-town is cursed... I sh-should have known when they started talking about the D-Deep Ones..."
10025030-151 = "We h-have been chosen by the D-Deep Ones... Th-They'll sacrifice us to bring back the fish... Th-There is no escape..."
10025030-152 = "Nobody chose us. We're the ones who decided to come here."
10025030-153 = "B-But...this is how scary movies always start!"
10025030-154 = "We w-were drawn here out of curiosity, b-but in the end we won't be able to run away even if we w-want to..."
10025030-155 = "T-Terrible monsters will rise from the waves and devour our s-sanity..."
10025030-156 = "We will f-forever be haunted by impossible abominations, l-locked into our own madness forever...!"
10025030-157 = "Snap out of it! There aren't any monsters like that in the real world."
10025030-158 = "Monsters. Curses. Whatever. It's all a story made up to scare us off."
10025030-159 = "I agree."
10025030-160 = "If the Deep Ones were real, the Kivotos General Student Council would already know about them."
10025030-161 = "Hey, Miyu, don't you know?"
10025030-162 = "The most terrifying creature in the world isn't under the sea... It's in the General Student Council Treasurer's Office!"
10025030-164 = "I don't care how tough these Deep Ones are. If they're smuggling shrimp, they'll have to answer to tax investigation team 4!"
10025030-165 = "That's specific..."
10025030-167 = "I still don't know how they found out about the torpedo I bought under-the-table from the Odyssey Maritime School..."
10025030-168 = "What were you planning to do with a torpedo?!"
10025030-169 = "Anyway! Not even a ghost can escape from SRT."
10025030-171 = "I'll debunk this story personally and find out what's really happening here!"
10025030-173 = "But for now, it will be hard to make any progress with the whole town watching us."
10025030-174 = "I doubt we'll get any useful answers through direct interrogation, either."
10025030-175 = "For now, let's make camp and get some rest."
10025030-176 = "Tonight, after the town has gone to sleep..."
10025030-177 = "...we'll continue the investigation!"

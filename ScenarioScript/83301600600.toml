[translation]
83301600600-9 = "เก็บเรื่องวุ่นวายของชมรมพัฒนาออนเซ็นไว้ก่อน เพราะสิ่งที่มาโคโตะขอร้องนั่นน่ะ..."
83301600600-10 = "ให้แสดงบรรเลงเปียโนต่อหน้าคนอื่น... นี่น่าจะเป็นครั้งแรกของฉันเลย"
83301600600-11 = "เรื่องแบบนี้ไม่ใช่สิ่งที่ฉันถนัดเลย... แต่ถ้าคุณครูคาดหวังอยู่ละก็"
83301600600-12 = "อืม ฉันอยากทำให้สมตามความคาดหวัง... อย่างน้อยก็เพื่อคนคนนั้น"
83301600600-13 = "พรุ่งนี้ไปฝึกให้มากกว่านี้กันเถอะ"

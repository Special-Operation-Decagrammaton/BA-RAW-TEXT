2002902-5 = "3;미모리 수영복ND;03;파라솔은 챙겼고, 돗자리랑 먹을 것들이랑 의자, 아이스박스……"
2002902-6 = "3;미모리 수영복ND;07;물안경과 튜브, 예비 수영복까지. 준비는 아무리 해도 부족하다고 하지만, 이 정도면 충분하겠네요. 선생님.\n#3;em;[반짝]"
2002902-7 = "[s1] \"어…… 고마, 워?\"\n[s2] \"역시 준비가 너무 과한 게 아닐까?\""

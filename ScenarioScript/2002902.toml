2002902-10 = "3;미모리 수영복ND;01;무슨 말씀을요. 언제나 수행을 잊지 말아야 하는 수행부의 부부장으로서, 이 정도는 기본적인 일인걸요."
2002902-11 = "3;미모리 수영복ND;02;네? 짐을…… 들어 주시겠다고요? 그, 그러면 제가 죄송해서……\n#3;em;[?]"
2002902-12 = "3;미모리 수영복ND;06;오히려 안 들게 해 주는 게 더 죄송한 일……? 서, 선생님께서 그러시다면…… 잘 부탁드릴게요……?"

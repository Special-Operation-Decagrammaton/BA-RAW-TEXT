[translation]
2002902-1 = "กุลสตรีแห่งท้องทะเลฤดูร้อน"
2002902-2 = "ทางเดินในโรงแรม"
2002902-5 = "ร่มกันแดด เสื่อปูพื้น ของกิน เก้าอี้ แล้วก็กล่องแช่เย็นก็เตรียมเรียบร้อยแล้ว..."
2002902-6 = "แว่นว่ายน้ำกับห่วงยาง ชุดว่ายน้ำสำรอง เขาว่ากันว่าถึงจะเตรียมตัวดีแค่ไหน แต่ก็อาจจะขาดอะไรไปก็ได้ อืม แต่เท่านี้ก็คงพอแล้วใช่มั้ยคะ คุณครู...?"
2002902-7 = "[s1] \"เอ่อ... ขอบคุณนะ\"\n[s2] \"เตรียมมาเยอะเกินไปรึเปล่า?\""
2002902-10 = "พูดอะไรอย่างนั้นกันคะ การเตรียมพร้อมแบบนี้ถือเป็นเรื่องพื้นฐานของรองหัวหน้าชมรมฝึกฝนที่ต้อง#nตระหนักถึงการฝึกฝนตลอดเวลาค่ะ"
2002902-11 = "คะ? คุณครู...จะถือสัมภาระให้งั้นเหรอคะ? บะ...แบบนั้นฉันจะดูเหมือนเสียมารยาท..."
2002902-12 = "ถ้าไม่ให้ช่วยถือจะเป็นการเสียมารยาทมากกว่างั้นเหรอคะ...? ถะ...ถ้าคุณครูพูดแบบนั้นละก็... ขอรบกวนด้วยนะคะ..."
2002902-13 = "ถ้างั้นคุณครูคะ ก่อนที่เราจะไปที่ชายหาดกัน"
2002902-19 = "(กางแขนกว้างๆ)"
2002902-23 = "[ns] \"มิโมริ? กางแขนแบบนี้ทำไมน่ะ...\""
2002902-24 = "ฮุฮุ ก่อนที่จะไปข้างนอกก็ต้องกอดกันก่อนสิคะ"
2002902-25 = "[s] \"หรือว่า...การกอดเพิ่มอ็อกซิโทซิน?!\""
2002902-26 = "ค่ะ ใช่แล้วค่ะ แบบนั้นแหละค่ะ"
2002902-27 = "เอาละค่ะ เชิญเลยค่ะ"
2002902-28 = "[s3] \"ยะ...ยังไงก็เถอะ นี่มันทางเดินนะ...\"\n[s4] \"ถ้าเกิดใครมาเห็นเข้า มันจะดูน่าอายนะ\""
2002902-31 = "หมายความว่า... คุณครูไม่อยากได้อ้อมกอดจากฉันเหรอคะ...?"
2002902-32 = "[s5] \"คะ...ครูว่าคำถามมันละเอียดอ่อนเกินไปที่จะตอบน่ะ!\"\n[s6] \"คะ...ครูว่าเราไปที่ชายหาดกันเถอะ วันนี้อากาศดีมากเลยนะ!\""
2002902-35 = "ค่ะ..."
2002902-41 = "ชายหาด"
2002902-43 = "(พอมาถึงที่ชายหาด คุณครูก็แอบสังเกตท่าทางของมิโมริอย่างระมัดระวัง)"
2002902-47 = "(ถึงจะดูเหมือนว่าไม่มีอะไร แต่คุณครูก็รู้สึกได้ว่ามิโมริดูซึมลงไปนิดหน่อย...)"
2002902-51 = "กางร่มกันแดดกับปูเสื่อเรียบร้อยแล้วค่ะ คุณครูมาช่วยกางแบบนี้เลยเสร็จได้ง่ายมากๆ เลยค่ะ "
2002902-52 = "คะ? ฉันเป็นอะไรรึเปล่าน่ะเหรอคะ? ฉันไม่เป็นไรค่ะ ทำไมจู่ๆ ถึงถามแบบนั้นล่ะคะ...?"
2002902-53 = "ไม่มีอะไรงั้นเหรอคะ? ถ้างั้นก็ค่อยโล่งใจหน่อยค่ะ"
2002902-54 = "เอาละค่ะคุณครู จะเริ่มทำอะไรกันก่อนดีคะ? เล่นน้ำทะเล? ดำน้ำ? หรือไม่งั้นก็... อาบแดดด้วยกัน?"
2002902-55 = "[s] \"ถะ...ถ้างั้นอาบแดด...\""
2002902-56 = "อ้อ อาบแดดสินะคะ ถ้างั้นคุณครูมานอนตรงนี้นะคะ ฉันจะทาครีมกันแดดให้ค่ะ "
2002902-64 = "จั๊กจี้เหรอคะ? โธ่... อดทนหน่อยสิคะ ถ้าไม่ทาให้ทั่วๆ ละก็ เดี๋ยวผิวจะไหม้นะคะ"
2002902-71 = "เอาละ เสร็จเรียบร้อยแล้วค่ะ ฉันจะเตรียมที่นอนอาบแดดให้นะคะ"
2002902-72 = "ฉันเหรอคะ? ฮุฮุ ฉันนั่งดูคุณครูอยู่ในร่มตรงนี้ดีกว่าค่ะ"
2002902-73 = "อ๊ะ อย่าลืมแว่นกันแดดนะคะ"
2002902-75 = "(คุณครูยอมให้มิโมริดูแลจัดการให้เรียบร้อย จากนั้นก็ทิ้งตัวลงนอนตรงที่แดดส่องถึง)"
2002902-81 = "(เสียงคลื่นซัดกระทบฝั่งและแสงแดดอบอุ่น ทำให้คุณครูค่อยๆ เคลิ้มหลับไป)"
2002902-92 = "(จู่ๆ ก็รู้สึกได้ถึงลมพัดเย็นสบายที่พัดมาจากที่ไหนสักแห่ง)"
2002902-93 = "(ความรู้สึกนุ่มนิ่มที่สัมผัสได้จากด้านหลังศีรษะ... ทำให้รู้สึกดีอย่างน่าประหลาด)"
2002902-98 = "อ๊ะ ตื่นแล้วเหรอคะ คุณครู?"
2002902-101 = "[ns] \"มิโมริ?!\""
2002902-103 = "[ns7] \"คอยพัดให้ครูอยู่ตลอดเลยเหรอ เกรงใจจัง...\"\n[ns8] \"ให้ครูนอนหนุนตักด้วยเหรอเนี่ย... เกรงใจจัง\""
2002902-106 = "ไม่เป็นไรเลยค่ะ ถ้าเป็นสมาชิกชมรมฝึกฝนที่มุ่งมั่นจะเป็นกุลสตรีที่เพียบพร้อมละก็ ต้องทำแบบนี้อยู่#nแล้วค่ะ"
2002902-107 = "ถ้างั้นคราวนี้..."
2002902-110 = "[ns] \"...\""
2002902-111 = "(จู่ๆ ก็เกิดความเงียบที่น่าอึดอัดขึ้น)"
2002902-114 = "[ns] \"อะ...อากาศดีจังเลยเนอะ! เราไปเดินเล่นกันมั้ย?!\""
2002902-115 = "อ๊ะ คุณครู อย่ารีบลุกขึ้นแบบนั้นสิคะ...!"
2002902-118 = "[ns9] \"เอ๋...?\"\n[ns10] \"จู่ๆ ก็รู้สึกเวียนหัวขึ้นมา...?!\""
2002902-124 = "คุณครู!"
2002902-131 = "[ns] \"อ่า... มิโมริ...?\""
2002902-132 = "(หลังจากฟื้นขึ้นมา คุณครูก็พบว่าตัวเองอยู่ในอ้อมกอดของมิโมริ)"
2002902-133 = "..."
2002902-134 = "ฮุฮุ..."
2002902-135 = "ฉันเผลอกอดช่วยเพิ่มอ็อกซิโทซินให้คุณครูไปซะแล้วค่ะ..."
2002902-136 = "[s] \"งะงะงะ... งั้นเหรอ...?!\""
2002902-137 = "เอาละค่ะ ค่อยๆ นะคะ ค่อยๆ ลุกค่ะ..."
2002902-138 = "ฉันจะคอยช่วยคุณครูจนถึงที่สุดเองค่ะ"
2002902-142 = "(คุณครูค่อยๆ ลุกขึ้นอย่างช้าๆ โดยมีมิโมริคอยช่วยอยู่ข้างๆ...)"
2002902-148 = "(หลังจากนั้นคุณครูกับมิโมริก็เดินไปบนชายหาดด้วยกันอย่างช้าๆ)"

[translation]
2002902-1 = "夏日海邊的大和撫子"
2002902-2 = "飯店．走廊"
2002902-5 = "我準備了遮陽傘、野餐墊、食物、椅子、冰桶……"
2002902-6 = "以及泳鏡、泳圈和備用泳裝。#n雖說準備永遠不嫌多，但有這些應該就沒問題了呢，老師。"
2002902-7 = "[s1]「嗯……謝謝你。」\n[s2]「會不會準備過頭了？」"
2002902-10 = "別這麼說。身為修行部的副部長，必須時時抱持修行的心。#n這也是應該的。"
2002902-11 = "咦？您要……幫我拿行李？#n那，那實在是有點過意不去……"
2002902-12 = "讓我拿會有罪惡感……？#n既，既然老師都這麼說了……就承蒙您的好意囉……？"
2002902-13 = "那麼老師，在到海邊之前……"
2002902-19 = "（咻）"
2002902-23 = "[ns]「三森？為什麼突然張開雙手……？」"
2002902-24 = "呵呵，在出門前得先來個擁抱才行。"
2002902-25 = "[s]「難道是……催產素擁抱！？」"
2002902-26 = "是的，老師說的沒錯。"
2002902-27 = "來吧老師，動作快。"
2002902-28 = "[s3]「再，再怎麼說這裡也是走廊……」\n[s4]「如果被別人看到……不會有點不好意思嗎？」"
2002902-31 = "您的意思是……不想和我擁抱嗎……？"
2002902-32 = "[s5]「這個問題也太難回答了！」\n[s6]「總，總之先去海邊吧，嗯！你看天氣這麼棒！」"
2002902-35 = "好，好的……"
2002902-41 = "海邊"
2002902-43 = "（來到海邊的同時，小心翼翼地觀察三森的臉色）"
2002902-47 = "（表面上看似沒問題，卻好像有點悶悶不樂……）"
2002902-51 = "遮陽傘和野餐墊都準備好了。#n這也多虧了老師的幫忙。"
2002902-52 = "咦？您問我還好嗎？#n沒什麼異狀呀，為什麼突然這麼問……？"
2002902-53 = "沒什麼是嗎？那就好。"
2002902-54 = "來吧老師，該先做什麼呢？#n海水浴？潛水？還是……日光浴？"
2002902-55 = "[s]「那，那就日光浴吧……」"
2002902-56 = "啊，日光浴是嗎。#n那麼請在這邊趴下，我先幫您擦防曬乳。"
2002902-64 = "會癢嗎？呵呵，請忍耐一下。#n不仔細擦的話，皮膚可是會被曬傷的唷？"
2002902-71 = "好，擦好了。#n那麼我來替您準備位置……"
2002902-72 = "我嗎？呵呵，我會在遮陽傘下看著老師的。"
2002902-73 = "對了，別忘了太陽眼鏡唷？"
2002902-75 = "（承蒙三森的好意，在陽光充足的地方鋪上墊子躺了下來）"
2002902-81 = "（在溫暖得恰到好處的陽光和海浪聲中，睡意開始慢慢湧現）"
2002902-92 = "（從某處不斷吹來涼快的風）"
2002902-93 = "（頭部後方感受到了一股柔軟，非常舒服）"
2002902-98 = "啊，老師，您醒了嗎？"
2002902-101 = "[ns]「三森！？」"
2002902-103 = "[ns7]「……啊，原來如此，你一直在幫我扇風啊。」\n[ns8]「而且還讓我躺在你的大腿上……太感謝了。」"
2002902-106 = "不必客氣，身為一名以大和撫子為目標努力的修行部員，這也是理所當然的。"
2002902-107 = "那麼，現在……"
2002902-110 = "[ns]「……」"
2002902-111 = "（隨即而來的是尷尬的沉默）"
2002902-114 = "[ns]「天，天氣還很好！一起散步吧！」"
2002902-115 = "啊，老師。那樣突然起來的話……！"
2002902-118 = "[ns9]「咦……？」\n[ns10]「突然覺得頭好暈……！？」"
2002902-124 = "老師！"
2002902-131 = "[ns]「啊……三森……？」"
2002902-132 = "（回過神來之後才意識到自己已經被三森抱在懷裡）"
2002902-133 = "……"
2002902-134 = "呵呵……"
2002902-135 = "我們做了催產素擁抱呢？"
2002902-136 = "[s]「是，是是是是是，是嗎！？」"
2002902-137 = "來，請小心……"
2002902-138 = "我會幫老師到最後的。"
2002902-142 = "（在三森的幫助下慢慢起身……）"
2002902-148 = "（兩人一起在海邊漫步）"

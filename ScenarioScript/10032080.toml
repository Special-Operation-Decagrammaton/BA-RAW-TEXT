[translation]
10032080-1 = "บทส่งท้าย;ทำงานไปเรื่อยๆ ก็ต้องมีวันแบบนี้บ้างละ"
10032080-4 = "ลูกชิ้นปลาแผ่นกับของทอดที่สั่งได้แล้วครับ~"
10032080-5 = "[s1] \"อ๊ะ ขอบคุณนะ\"\n[s2] รับอาหารมา"
10032080-8 = "ใส่เสื้อผ้าแพงๆ กันแท้ๆ แต่ทำไมถึงฝุ่นเต็มตัวกันแบบนี้ล่ะ? ไปตกหลุมอะไรในไซต์ก่อสร้างมาเหรอ?"
10032080-9 = "จะบอกให้นะ บางทีใส่เสื้อผ้าแพงๆ อย่างเดียวไม่ได้หรอก ต้องใส่สีเสริมดวงประจำวันด้วย จะได้ไม่ดวงตกแบบนี้ไง เอ้า! กินปลอบใจกันให้อิ่มเลยนะ! ฮ่าฮ่าฮ่า!!"
10032080-10 = "[s3] \"ตักให้เยอะจังเลย ขอบคุณนะ\"\n[s4] \"แหะๆ... ไปเจอเรื่องอะไรมานิดหน่อยน่ะ\""
10032080-15 = "แต่ยังไงก็ได้มานั่งกินกันพร้อมหน้านะ..."
10032080-16 = "ร้านข้างทางที่มีโต๊ะที่นั่งได้ 6 คนก็หาไม่ได้หาง่ายๆ เลยด้วย"
10032080-17 = "ถะ... ถ้าเก้าอี้ไม่พอ ให้ฉันยืนกินก็ได้นะคะ! ระ... หรือจะมานั่งตักฉันก็ได้เหมือนกัน..."
10032080-23 = "ไม่เป็นไรๆ! ฮารุกะจังนั่งอยู่อย่างนั้นแหละ!"
10032080-24 = "จะว่าไป สุดท้ายเราก็ไม่ได้อะไรเลย แบบนี้จะไม่เป็นอะไรเหรออารุจัง?"
10032080-25 = "ไม่ใช่อารุจัง บอกให้เรียกว่าท่านประธานไง!"
10032080-26 = "ตอนแรกเหมือนจะได้ยินอารุจังพูดปณิธานนู่นนี่ ที่บอกว่าเราจะร้ายกาจกันกว่าเดิม"
10032080-27 = "แต่สุดท้ายเราไม่ได้ทั้งอารันซิโน แถมโรงละครโอเปร่าก็เสียหายจนไม่เหลือชิ้นดีอีก"
10032080-28 = "ชะ... ช่วยไม่ได้นี่นา...! ก็เกิดระเบิดรุนแรงเสียขนาดนั้น!!"
10032080-29 = "พวกเราก็หลุดออกมาจากความวุ่นวายนั้นได้อย่างหวุดหวิดด้วย! ถ้าหนีออกมาไม่ทัน ป่านนี้คงได้โดนพวกวัลคิรี่..."
10032080-33 = "ข่าวด่วนค่ะ เกิดระเบิดครั้งใหญ่ที่โรงละครโอเปร่า ทำให้อาคารทั้งหลังพังทลายและผู้ชมอยู่ในสภาวะ#nตื่นตระหนก"
10032080-34 = "แต่จากการให้ข้อมูลของนักเรียนวัลคิรี่ ผู้ที่เกี่ยวข้องในโรงละครโอเปร่าเกือบทั้งหมดเป็นคนจากองค์กร#nอาชญากรรม..."
10032080-40 = "คาดว่าแรงจูงใจครั้งนี้คือความขัดแย้งระหว่างองค์กร ในตอนนี้กำลังมีการกำหนดทิศทางการสืบสวน และจับกุมตัวทุกคนไว้เพื่อสืบสวนต่อไปค่ะ"
10032080-41 = "คงจะถูกส่งตัวไปที่วัลคิรี่พร้อมพวกหัวโจกของสหพันธ์อันธพาลสินะ..."
10032080-42 = "ต้องมองว่าอารันซิโน... ไม่สิ สหพันธ์อันธพาลทั้งสหพันธ์สิ้นสุดลงแค่นี้แล้วละ"
10032080-43 = "คนที่จะจ่ายเงินก็ถูกจับไปด้วยกัน เท่ากับว่าเงินค่าจ้างส่วนที่เหลือก็หายวับไปกับตาแล้ว"
10032080-44 = "ขอโทษค่ะ ฉันโง่เองที่เอาระเบิดไปทิ้งไว้ตรงนั้น..."
10032080-45 = "ไม่หรอก ฮารุกะ ตรงกันข้ามเลย ให้มันเป็นแบบนั้นอาจจะดีแล้วละ"
10032080-46 = "ดูจากที่อันธพาลพวกนั้นไล่ตามเรามาอย่างดื้อดึงแล้ว ต่อให้วันนี้เราจะหนีมาได้ แต่ก็คงโดนรังควาญ#nอีกไม่หยุดหรอก..."
10032080-47 = "ฮั้นก็ฮิดเหมือนฮัน..."
10032080-51 = "อ่า..."
10032080-56 = "ฉันก็คิดเหมือนกัน..."
10032080-57 = "สุดท้ายแล้วฉันว่าการที่เราออกมาจากงานนี้ได้ ถือเป็นเรื่องที่ดีที่สุดแล้วละ"
10032080-58 = "[s5] \"กินกันเก่งจังนะ ดีจังเลย\"\n[s6] \"สั่งเพิ่มอีกได้เลยนะ มื้อนี้ครูเลี้ยงเอง\""
10032080-61 = "มะ... ไม่เป็นไรหรอก..."
10032080-62 = "ไม่สิ... ฉันควรต้องขอบคุณมากกว่าปฏิเสธสินะ"
10032080-63 = "ขอบคุณนะครู สักวันหนึ่งฉันจะตอบแทนบุญคุณนี้ให้"
10032080-69 = "คนอื่นไม่รู้คงคิดว่าเราอยู่ทีมเดียวกันแล้วนะเนี่ย?"
10032080-70 = "แต่ก็นะ ก็ตอนสุดท้ายเราจับมือกันนี่นา ส่วนตอนแรกที่ปะทะกัน ก็เพราะงานที่เราได้รับมามันต่างกัน#nก็เท่านั้น"
10032080-71 = "ถ้ามัวเอาแต่ใส่ใจเรื่องเล็กๆ น้อยๆ อยู่ เราก็ไม่มีทางได้มานั่งกินอาหารด้วยกันแบบนี้หรอก"
10032080-72 = "อยากพูดแบบนี้ใช่มั้ยล่ะ ประธาน...?"
10032080-73 = "หืม!? ฉันเหรอ...?!"
10032080-74 = "นะ... แน่นอนอยู่แล้ว! คิดว่าพวกเราเป็นคนยังไงกัน? พวกเราไม่เอาความรู้สึกส่วนตัวไปปนกับงาน#nหรอกนะ"
10032080-75 = "ไม่ต้องใส่ใจมากก็ได้ ไม่ว่าจะเป็นงานอะไรหรือต้องเผชิญหน้ากับฝ่ายไหน พวกเราก็คือวายร้ายที่แค่ทำภารกิจและรับค่าตอบแทนก็จบกัน"
10032080-76 = "นี่ละคติประจำใจของพวกเราหน่วยรับจ้างสารพัด 68"
10032080-77 = "แม้ว่าความจริงแล้วจะทำภารกิจพังไม่เป็นท่าและไม่ได้เงินค่าจ้างเลยก็เถอะนะ~"
10032080-78 = "บะ... บอกว่าไม่ต้องใส่ใจเรื่องหยุมหยิมไงเล่า! ถ้าทำงานไปเรื่อยๆ ก็ต้องมีวันแบบนี้บ้างละ!"
10032080-79 = "ใช่ ชีวิตคนทำงานมันก็ต้องมีวันแบบนี้บ้างสิ แค่ครั้งสองครั้งคงไม่ใช่เรื่องใหญ่อะไรหรอกว่ามั้ย?"
10032080-81 = "......!"
10032080-82 = "แบบนี้สินะ... ถ้าทำงานไปเรื่อยๆ ก็ต้องมีวันแบบนี้บ้าง..."
10032080-83 = "เป็นคำพูดที่ดีเลยนะ ฉันน่ะโดนสัญญาหลอกให้ทำแต่งานแล้วไม่ได้รับค่าจ้างอยู่บ่อยครั้งเลย..."
10032080-84 = "ทำงานไปเรื่อยๆ ก็ต้องมีวันแบบนี้บ้างอย่างนั้นเหรอ... แล้วฉันจะจำเอาไว้นะ"
10032080-85 = "ไปเจออะไรมาบ้างน่ะ... เธอจะยอมให้โดนหลอกใช้อยู่เรื่อยๆ ไม่ได้นะ"
10032080-86 = "อ่า..."
10032080-87 = "จะว่าไป คุณครู"
10032080-88 = "เรื่องสื่อการสอนน่ะ..."
10032080-89 = "อย่าว่าแต่การแสดงโอเปร่าเลย โรงละครตอนนี้เหลือแต่ซากแล้ว... แบบนี้จะทำสื่อการสอนได้เหรอ?"
10032080-93 = "อ่า..."
10032080-94 = "อ๊ะ..."
10032080-95 = "เฮือก...!!"
10032080-96 = "อ่า..."
10032080-100 = "[ns] \"แหะๆ...\""
10032080-104 = "[ns] \"ไม่เป็นไรหรอก...\""
10032080-110 = "[ns] \"ถ้าทำงานไปเรื่อยๆ ก็ต้องมีวันแบบนี้บ้างแหละนะ...\""
10032080-111 = "จากโอเปร่า 0068 แห่งความรัก!"

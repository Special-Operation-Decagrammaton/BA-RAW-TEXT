[translation]
10032080-1 = "尾聲;難免會有這種時候"
10032080-4 = "魚板和炸物來囉～"
10032080-5 = "[s1]「啊，是，謝謝。」\n[s2] 打招呼後接下碗盤"
10032080-8 = "大家怎麼穿著昂貴的衣服，結果都灰頭土臉的呢？#n剛才路過工地被什麼濺到了嗎？"
10032080-9 = "真倒霉！不過我裝得很滿，你們別難過啊！哈哈哈！！"
10032080-10 = "[s3]「謝謝你，老闆。」\n[s4]「哈哈……確實是遇到了類似的事。」"
10032080-15 = "……不過居然能讓所有人一起入座。"
10032080-16 = "想找到能讓六個人一起坐下的路邊攤可不容易啊。"
10032080-17 = "如，如果座位不夠的話，我站著就好了！或，或者乾脆要我當椅子也可以……"
10032080-23 = "沒關係沒關係！遙香醬就坐著吧！"
10032080-24 = "話說到頭來什麼都沒賺到耶？#n這樣下去真的沒問題嗎，亞瑠醬？"
10032080-25 = "不是亞瑠醬，叫我社長！"
10032080-26 = "一開始還說過會變得更有冷硬派的風格，要這樣那樣的……"
10032080-27 = "結果不只沒抓到阿蘭奇諾，歌劇院也悽慘地垮掉了。"
10032080-28 = "這，這也沒辦法啊……！都發生那種大爆炸了！！"
10032080-29 = "我們也是好不容易才逃出來的！#n要是繼續待在那裡，大家都會被女武神給……"
10032080-33 = "新聞快報。今天在歌劇院大劇場，#n發生了因大規模爆炸導致建築物倒塌、內部觀眾驚慌失措的事件。"
10032080-34 = "據出動的女武神學生表示，歌劇院內的多數觀眾和工作人員都與犯罪組織有關……"
10032080-40 = "……目前已將調查方向定為犯罪組織之間的抗爭，#n對在場的所有人進行全面拘留與調查。"
10032080-41 = "……八成會被女武神給逮捕吧。#n而且還是跟在場的幫派聯盟幹部一起。"
10032080-42 = "阿蘭奇諾……不，這次事件應該會讓整個幫派聯盟瓦解才對。"
10032080-43 = "不過既然連應該支付報酬的人也一起被抓走，報酬的尾款八成也已經付之東流了。"
10032080-44 = "非常抱歉，都是因為我像笨蛋一樣把炸彈放進那裡……"
10032080-45 = "不，遙香，那說不定也是件好事。"
10032080-46 = "既然那些傢伙都固執地追上來了，#n就算我們順利逃出去，他們也會繼續糾纏我們……"
10032080-47 = "……[ruby=偶也各模摁為]我也這麼認為[/ruby]。"
10032080-51 = "抱歉……"
10032080-56 = "……我也這麼認為。"
10032080-57 = "從結果來看，我們從這件事中乾淨俐落地脫身了。可說是最理想的情況。"
10032080-58 = "[s5]「大家都吃得很開心呢。」\n[s6]「想吃什麼盡量點，今天我請客。」"
10032080-61 = "……什，什麼！？"
10032080-62 = "……不，這種時候比起婉拒，道謝才是更好的選擇。"
10032080-63 = "謝謝你，老師。#n我會繼續努力，總有一天會回報這份恩情。"
10032080-69 = "在不認識的人眼中，我們看起來說不定就像同一個團隊的夥伴一樣呢？"
10032080-70 = "嗯，實際上最後也是那樣沒錯。#n一開始會有衝突也只是彼此接下的工作不同而已。"
10032080-71 = "如果在意每件小事的話，可是做不了這種工作的。"
10032080-72 = "……你是想這麼說吧，社長？"
10032080-73 = "嗯！？我……！？"
10032080-74 = "當，當然囉！你把我們當成什麼人了？我可不會把個人情感帶進工作裡。"
10032080-75 = "所以不必在意。#n無論是什麼樣的工作或關係，重點都是處理委託並收取報酬，這就是冷硬派的做法。"
10032080-76 = "也是我們便利屋68的座右銘。"
10032080-77 = "雖然結果不只委託沒了，錢也沒收到就是了～"
10032080-78 = "我，我不是才說不用在意每件小事嗎！工作難免會有這種時候嘛！"
10032080-79 = "嗯，難免就會遇到這種情況。#n反正這也不是只做一兩次就停手的工作，對吧？"
10032080-81 = "……！"
10032080-82 = "原來如此……難免會有這種時候……"
10032080-83 = "真是一句好話。#n我也很常被委託人矇騙，最後沒收到報酬……"
10032080-84 = "難免會有這種時候……我會銘記在心。"
10032080-85 = "不不不，那種事可不能隨便算了吧。#n你平常到底都受到什麼樣的對待啊……"
10032080-86 = "……啊。"
10032080-87 = "這麼說來，老師。"
10032080-88 = "那個……BD……"
10032080-89 = "別說是歌劇表演，連整個歌劇院都被炸掉了，當然沒辦法完成吧？"
10032080-93 = "……啊。"
10032080-94 = "……啊。"
10032080-95 = "……咳！！"
10032080-96 = "……啊。"
10032080-100 = "[ns]「……哈哈。」"
10032080-104 = "[ns]「嗯……」"
10032080-110 = "[ns]「……難免會有這種時候嘛。」"
10032080-111 = "來自歌劇 0068 的滿腔愛意！"

[translation]
10032080-1 = "Epilogue;One of Those Days"
10032080-4 = "Oden and tempura!"
10032080-5 = "[s1] \"Ah, yeah. Thanks.\"\n[s2] Wearily take the plate."
10032080-8 = "Y'all got your expensive clothing real messed up... Were you rolling around in the dirt or something?"
10032080-9 = "When it rains, it pours, huh? I gave you extra portions to cheer you up, so eat your fill! Hahaha!"
10032080-10 = "[s3] \"Thank you, Mister.\"\n[s4] \"Haha... You're not too far off...\""
10032080-15 = "...At least we can all sit."
10032080-16 = "Finding a food stall that could fit all of us was a pain."
10032080-17 = "I-I'll stand! Or you can use me as a chair!"
10032080-23 = "It's fine, it's fine! Just put your butt in the chair, Haruka!"
10032080-24 = "So how're you feeling, Aru? We didn't even get paid!"
10032080-25 = "I've told you to call me \"Boss\"! Not Aru!"
10032080-26 = "I seem to recall a certain someone talking about how hard-boiled she was going to be after this."
10032080-27 = "Let's review... Not only is the Opera House no more, but we lost the big dog, Arancino himself, right when we had him in our grasp."
10032080-28 = "Wh-What were we supposed to do after an explosion like that?!"
10032080-29 = "It's not our fault! We barely even made it out alive. And don't forget the Valkyrie students—"
10032080-33 = "Breaking news! A massive explosion at the Opera House has caused the building to collapse, shocking the audience members inside."
10032080-34 = "A Valkyrie student on scene reports that most of the audience and staff inside the Opera House were connected to a criminal organization!"
10032080-40 = "They believe this explosion resulted from a fierce clash between rival organizations! All suspects have been swiftly apprehended and are now under investigation."
10032080-41 = "...Valkyrie students arrested every last gang member there."
10032080-42 = "Arancino's done for, which means the Gang Alliance is too."
10032080-43 = "In other words, whoever was gonna pay us is rotting away in Valkyrie's jail right now, so you can forget about the money."
10032080-44 = "I-I'm so sorry! I'm sorry! I'm sorry I dumped the bombs there! I'm an idiot imbecile who doesn't deserve to live!"
10032080-45 = "You did us all a favor, Haruka."
10032080-46 = "Nothing was gonna make them give up. Even if we escaped, we would've been on the run for God knows how long."
10032080-47 = "...Mhmm! Mmmph, mmm!"
10032080-51 = "Mmm..."
10032080-56 = "I agree with Kayoko's statement."
10032080-57 = "In fact, Haruka's actions resulted in the ideal conclusion to what would have otherwise been a relentless pursuit."
10032080-58 = "[s5] \"I'm glad you're enjoying your meal.\"\n[s6] \"Order as much as you want. It's on me.\""
10032080-61 = "...?! I c-couldn't...!"
10032080-62 = "...That's rude of me. I should simply thank you for the offer."
10032080-63 = "I'll repay you for all you've done. Thank you, Sensei."
10032080-69 = "Haha! Look at us! All eating a meal together like old chums! Isn't it neat?"
10032080-70 = "It's not like we hate each other. Our goals were just different at first."
10032080-71 = "You'll never survive in this line of work if you hold grudges over the small stuff."
10032080-72 = "...Is what Aru is thinking, right, Boss?"
10032080-73 = "M-Me?! Did you say my name?"
10032080-74 = "Ahem! Do you think we're some bumbling amateurs? We know how to compartmentalize our personal feelings."
10032080-75 = "Hard-boiled outlaws never worry about anything except the job. We'll do the crime if you've got the dime."
10032080-76 = "Problem Solver 68 lives and dies by that motto!"
10032080-77 = "Except we didn't finish the crime and got no dimes!"
10032080-78 = "M-Mutsuki! D-Don't focus on the little details! Failure is a given working in a risky industry like this one!"
10032080-79 = "It was just one of those days! You can't give up after running into a rough job or two, okay?"
10032080-81 = "...!"
10032080-82 = "\"One of those days...\""
10032080-83 = "I've learned a lot from your work. I've been tricked by contractors and stiffed time and time again..."
10032080-84 = "But instances like those are just \"one of those days.\" I'll remember that next time."
10032080-85 = "Wait, wait. That's totally different. What kind of work have you been doing...?"
10032080-86 = "...Ah."
10032080-87 = "Um, Sensei..."
10032080-88 = "About... About that documentary."
10032080-89 = "What about it? What's Sensei gonna make an educational doc about? The blown-up Opera House and canceled concert?"
10032080-93 = "...Oh."
10032080-94 = "...Ah!"
10032080-95 = "*gasp*"
10032080-96 = "...Oops."
10032080-100 = "[ns] \"...Ahaha.\""
10032080-104 = "[ns] \"Well...\""
10032080-110 = "[ns] \"...One of those days, right?\""
10032080-111 = "From Opera 0068 with Love!"

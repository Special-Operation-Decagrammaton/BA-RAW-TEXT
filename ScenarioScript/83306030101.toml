[translation]
83306030101-5 = "ถึงการรับโทรศัพท์ก่อกวนที่ไม่มีความหมายอะไรเลยจะเป็นเรื่องน่าหงุดหงิด"
83306030101-6 = "แต่ปัญหาก็คือ ถ้าโทรศัพท์สายแบบนั้นทำให้เราไม่ได้ออกไปทำงานที่ต้องทำจริงๆ หรือทำให้รับมือ#nได้ล่าช้าละก็..."
83306030101-7 = "ใช่ค่ะ เราจะให้เกิดเรื่องแบบนั้นไม่ได้ ฉันละอยากจับตัวคนที่โทรมาแกล้งให้ได้จังเลยค่ะ"

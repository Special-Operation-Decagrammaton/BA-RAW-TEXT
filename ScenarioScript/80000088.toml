[translation]
80000088-1 = "RABBIT 4 จะส่งของขวัญแล้วนะคะ"
80000088-2 = "สำนักงานชาเล่ต์"
80000088-3 = "คือว่า คุณครูคะ..."
80000088-4 = "สะ... สวัสดีค่ะ อะ...อรุณสวัสดิ์ค่ะ..."
80000088-5 = "[s] \"อรุณสวัสดิ์มิยุ\""
80000088-6 = "คือว่า... วันนี้เป็นวันวาเลนไทน์..."
80000088-7 = "ฉันอยากตอบแทนคุณครูที่คอยช่วยเหลือฉันมาตลอด..."
80000088-8 = "ถึงจะเป็นของขวัญทั่วๆ ไป... แต่ฉันก็ตั้งใจเตรียมมาให้คุณครูค่ะ"
80000088-13 = "[ns] \"นี่มัน... ช็อกโกแลต?\""
80000088-14 = "ค่ะ... ช็อกโกแลตบาร์คค่ะ"
80000088-15 = "ฉันก็อยากให้ช็อกโกแลตหรูๆ กว่านี้นะคะ แต่ว่าคนอย่างฉันคงไปซื้อช็อกโกแลตแพงๆ ที่ร้านไม่ได้..."
80000088-16 = "ฉันเลยเอาช็อกโกแลตที่ได้มาจากเสบียงกับผลไม้ที่เก็บได้บนภูเขามาทำเป็นช็อกโกแลตนี่ค่ะ..."
80000088-17 = "ถึงมันจะดูไม่สวยแล้วรสชาติก็พื้นๆ... แต่ว่าช็อกโกแลตที่ฉันพอจะทำได้ก็มีแค่อันนี้เท่านั้น..."
80000088-18 = "ฮือ.... คุณครูคงผิดหวังที่ได้ช็อกโกแลตน่าเกลียดๆ แบบนี้สินะคะ...?"
80000088-19 = "[s] \"เปล่าเลย ครูดีใจนะที่ได้รับของขวัญจากใจของมิยุน่ะ\""
80000088-20 = "ถึงคุณครูจะพูดแบบนั้น... แต่คุณครูก็ได้รับช็อกโกแลตจากนักเรียนคนอื่นๆ มาเยอะแยะแล้วนี่คะ?"
80000088-21 = "ท่ามกลางกองช็อกโกแลตหรูๆ จากนักเรียนคนอื่นๆ คุณครูคงมองไม่เห็นช็อกโกแลตรูปใบไม้ร่วง#nซอมซ่อแบบนี้แน่... แล้วสุดท้ายก็มันก็จะถูกลืมเลือนไปจากความทรงจำของคุณครูสินะคะ..."
80000088-22 = "ถ้าเป็นอย่างนั้น คุณครูก็คงจะลืมเรื่องที่ได้รับของขวัญวันวาเลนไทน์จากฉันไปด้วย..."
80000088-23 = "สุดท้ายแล้วก็จะไม่มีใครจดจำฉันได้ และฉันก็จะค่อยๆ หายไปเหมือนกับช็อกโกแลตรูปใบไม้ร่วงอันนี้#nสินะคะ..."
80000088-27 = "[ns] กินช็อกโกแลตที่มิยุให้"
80000088-28 = "คุณครู...?"
80000088-32 = "[ns] สวาปามช็อกโกแลตของมิยุต่อ!"
80000088-33 = "คะ...คุณครู...? ทำไมถึงรีบร้อนกินช็อกโกแลตขนาดนั้นคะ?"
80000088-34 = "ถะ...ถ้ารีบกินขนาดนั้นจะท้องอืดได้นะคะ...!"
80000088-35 = "ยะ...หยุดก่อนเถอะค่ะ...!"
80000088-36 = "[s] \"แค่กๆ แค่กๆ!\""
80000088-37 = "ปะ...เป็นอะไรรึเปล่าคะ...?"
80000088-38 = "ขอบของช็อกโกแลตบาร์คจะคมมาก ถ้าไม่ระวังอาจจะบาดปากได้..."
80000088-39 = "ทะ...ทำไมถึงต้องรีบกินจนน่ากลัวแบบนี้ด้วยคะ?"
80000088-40 = "[s1] \"ก็ช็อกโกแลตของมิยุมันอร่อยมากเลยน่ะ...\"\n[s2] \"อร่อยจนหยุดกินไม่ได้เลย...\""
80000088-41 = "...คะ? แต่ว่าช็อกโกแลตของฉันทำจากเสบียงช็อกโกแลตธรรมดาๆ เองนะคะ?"
80000088-42 = "...คะ? แต่ว่าช็อกโกแลตของฉันทำจากเสบียงช็อกโกแลตธรรมดาๆ เองนะคะ?"
80000088-43 = "ผลไม้ที่ใช้เป็นส่วนผสมก็แค่ผลไม้ธรรมดาๆ ที่เก็บได้จากในป่าเอง..."
80000088-44 = "[ns] \"ช็อกโกแลอร่อยมากเลย ครูคงลืมไม่ได้แน่ๆ\""
80000088-46 = "...ว่าแล้วเชียว คุณครูใจดีจริงๆ เลยนะคะ"
80000088-47 = "คุณครู... ฉันน่ะ กลัวว่าคนอื่นจะจำฉันไม่ได้ก็จริง..."
80000088-48 = "แต่ถ้าคุณครูต้องบาดเจ็บเพราะช็อกโกแลตที่ฉันให้ละก็... แบบนั้นฉันยิ่งไม่ชอบเลยค่ะ"
80000088-49 = "เพราะงั้น..."
80000088-50 = "ต้องค่อยๆ กินช็อกโกแลตทีละชิ้นนะคะ?"

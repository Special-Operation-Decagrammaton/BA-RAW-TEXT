[translation]
80000088-1 = "#title;RABBIT 4, 선물합니다."
80000088-2 = "#place;샬레 집무실"
80000088-3 = "3;미유;02;저, 선생님……\n#3;a\n#3;em;…"
80000088-4 = "3;미유;04;아, 안녕하세요. 좋은 아침이에요……\n#3;greeting"
80000088-5 = "[s] \"좋은 아침, 미유.\""
80000088-6 = "3;미유;01;그게…… 오늘이 발렌타인 데이라고 해서……\n#3;em;…"
80000088-7 = "3;미유;99;평소에 신세를 졌던 선생님께 작게나마 답례를 하고 싶어서……"
80000088-8 = "3;미유;03;보잘 것 없는 선물이지만…… 선생님을 위해 준비했어요."
80000088-9 = "#st;[0,0];instant;1;"
80000088-10 = "#clearST"
80000088-11 = "3;미유;03\n#3;m5\n#wait;1000"
80000088-12 = "#wait;2500"
80000088-13 = "[ns] \"이건…… 초콜릿?\""
80000088-14 = "3;미유;02;네, 바크 초콜릿이에요.\n#3;em;[반응]"
80000088-15 = "3;미유;04;좀 더 화려한 초콜릿을 선물하고 싶었지만, 저희 사정에 가게에서 비싼 초콜릿을 구입할 수는 없어서……\n#3;m3"
80000088-16 = "3;미유;07;보급 받은 초콜릿과 산에서 따온 과일들을 섞어서 직접 만들었어요……\n#3;em;…"
80000088-17 = "3;미유;08;모양도 예쁘지 않고, 맛도 단조롭지만…… 제가 준비할 수 있는 건 이런 초콜릿 밖에 없어서……"
80000088-18 = "3;미유;06;우으으…… 역시 이런 못난 초콜릿을 받아서 실망하셨죠……?\n#3;em;[속상함]\n#3;stiff"
80000088-19 = "[s] \"아니야. 미유의 진심을 받을 수 있어서 정말 기뻐.\""
80000088-20 = "3;미유;01;그렇게 말씀하셔도…… 이미 다른 학생들도 선생님께 초콜릿을 잔뜩 선물했잖아요?\n#3;em;…"
80000088-21 = "3;미유;04;다른 학생들이 선물한 고급 초콜릿 사이에서, 이런 볼품없는 낙엽 모양의 초콜릿은 눈에도 들어오지 않을테고…… 결국은 선생님의 기억에서 잊혀지겠죠……"
80000088-22 = "3;미유;07;그럼 어느새 선생님께서는 제가 발렌타인 데이에 선물을 했다는 사실도 잊어버리실테고……"
80000088-23 = "3;미유;06;그렇게 끝내 저는 아무에게도 기억되지 못한 채 이 낙엽 모양의 초콜릿과 함께 쓸쓸히 버려지겠죠……\n#3;em;[세로선]"
80000088-24 = "#st;[0,0];instant;1;"
80000088-25 = "#clearST"
80000088-26 = "#wait;2500"
80000088-27 = "[ns] 미유의 초콜릿을 먹는다."
80000088-28 = "3;미유;02;선생님……?\n#3;em;[?]"
80000088-29 = "#st;[0,0];instant;1;"
80000088-30 = "#clearST"
80000088-31 = "#wait;1500"
80000088-32 = "[ns] 미유의 초콜릿을 전력으로 먹는다!"
80000088-33 = "3;미유;10;서, 선생님……? 어째서 그렇게 제 초콜릿을 황급히 드시는 건가요?\n#3;em;[땀]\n#3;stiff"
80000088-34 = "3;미유;01;그, 그렇게 빨리 드시면 체하실 수 있다고요……!"
80000088-35 = "3;미유;09;자, 잠시만 멈춰주세요……!\n#3;em;[!]"
80000088-36 = "[s] \"……콜록, 콜록!\""
80000088-37 = "3;미유;02;괘, 괜찮으세요……?\n#3;em;[땀]"
80000088-38 = "3;미유;01;바크 초콜릿은 안 그래도 가장자리가 날카로워서 자칫하면 먹다 입을 다칠 수도 있는데……"
80000088-39 = "3;미유;06;어째서 그렇게 위험하게 초콜릿을 삼키신 건가요?"
80000088-40 = "[s1] \"미유의 초콜릿이 너무 맛있어서……\"\n[s2] \"나도 모르게 먹는 걸 멈출 수가 없었어.\""
80000088-41 = "3;미유;02;……네? 하지만 제 초콜릿은 그저 평범한 보급 초콜릿을 녹였다 굳힌 것 뿐인 걸요?\n#3;em;[?]"
80000088-42 = "3;미유;02;……네? 하지만 제 초콜릿은 그저 평범한 보급 초콜릿을 녹였다 굳힌 것 뿐인 걸요?\n#3;em;[?]"
80000088-43 = "3;미유;04;안에 들어 있는 건과일도 야생에서 구할 수 있는 평범한 나무 열매뿐이고……"
80000088-44 = "[ns] \"이렇게 맛있는 초콜릿은 절대 못 잊을 것 같아.\""
80000088-45 = "3;미유;02\n#3;em;…\n#wait;2500"
80000088-46 = "3;미유;03;……역시 선생님은 상냥하시네요."
80000088-47 = "3;미유;99;선생님, 저는 남들에게 기억되지 못하는 것도 무섭긴 하지만……"
80000088-48 = "3;미유;02;그래도 제가 드린 초콜릿 때문에 선생님이 다치시는 게 더 싫어요.\n#3;em;[속상함]"
80000088-49 = "3;미유;01;그러니까……"
80000088-50 = "3;미유;11;초콜릿은 한 번에 한 개씩만 드셔야 해요?"

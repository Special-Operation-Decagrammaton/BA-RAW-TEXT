[translation]
80000088-1 = "Rabbit 4, Give"
80000088-2 = "Schale Executive Office"
80000088-3 = "H-Hey, Sensei..."
80000088-4 = "H-Hello. Good morning."
80000088-5 = "[s] \"Good morning, Miyu.\""
80000088-6 = "Well, um... They said today is V-Valentine's Day, so..."
80000088-7 = "I j-just thought... I've always been indebted to you, Sensei, so I-I wanted to give you a l-little something..."
80000088-8 = "And, um, it's d-definitely not a very good gift, but...h-here you go, Sensei."
80000088-13 = "[ns] \"Is this...chocolate?\""
80000088-14 = "Y-Yes, it's chocolate bark."
80000088-15 = "I, um, I really wanted to get you something better...but I c-can't afford expensive store-bought chocolate... S-Sorry..."
80000088-16 = "So I just, um...m-made a little by myself... It's just ration chocolate mixed with fruit I p-picked from the mountains."
80000088-17 = "So, I know it's not p-pretty, and it's k-kind of bland, but it's the only chocolate I c-could make..."
80000088-18 = "Um... Ugh. Y-You're disappointed, right? You w-wouldn't want to eat such ugly chocolate..."
80000088-19 = "[s] \"Not at all. I'm very touched by your sincerity, Miyu.\""
80000088-20 = "S-Sure, of course you'd say that, but... I kn-know you've gotten a lot of chocolate from other students. R-Right?"
80000088-21 = "A-And among all those f-fancy chocolates, these ugly, weird leaves will... They'll b-be forgotten, of course..."
80000088-22 = "And b-before you know it, you'll f-forget that I even gave you anything..."
80000088-23 = "A-And in the end no one will remember me, and I'll b-be left behind with this d-dusty chocolate in the back of a cabinet..."
80000088-27 = "[ns] Eat Miyu's chocolate."
80000088-28 = "S-Sensei?"
80000088-32 = "[ns] Eat Miyu's chocolate at full speed!"
80000088-33 = "S-Sensei...? Why are you eating s-so fast?"
80000088-34 = "You'll get s-sick if you eat that fast!"
80000088-35 = "S-Stop! Stop for a s-second!"
80000088-36 = "[s] \"*cough* *cough*\""
80000088-37 = "A-Are you okay?"
80000088-38 = "The c-center of the chocolate bark is sh-sharp, so you could hurt your mouth..."
80000088-39 = "Why w-would you eat it so d-dangerously?"
80000088-40 = "[s1] \"This chocolate is so delicious, Miyu...\"\n[s2] \"I just couldn't help myself!\""
80000088-41 = "W-What? But...um, it's really just...m-melted ration ch-chocolate...that I re-shaped..."
80000088-42 = "W-What? But...um, it's really just...m-melted ration ch-chocolate...that I re-shaped..."
80000088-43 = "Even the dried fr-fruit inside is j-just, um, w-wild tree fruit..."
80000088-44 = "[ns] \"I could never forget such delicious chocolate.\""
80000088-46 = "Oh... You're always s-so kind, Sensei..."
80000088-47 = "Sensei, I'm, um, kind of a-afraid of not being remembered by others, b-but..."
80000088-48 = "But I really h-hate the thought of you g-getting hurt because of chocolate that I gave you!"
80000088-49 = "So..."
80000088-50 = "Please o-only eat one chocolate at a time, okay?"

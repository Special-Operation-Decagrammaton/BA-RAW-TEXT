[translation]
80000088-1 = "RABBIT4，要送禮了"
80000088-2 = "夏萊．辦公室"
80000088-3 = "啊，老師……"
80000088-4 = "早，早安……"
80000088-5 = "[s]「早安，美優。怎麼了嗎？」"
80000088-6 = "那個……我聽說今天是情人節……"
80000088-7 = "所以想要給平時很照顧我們的老師，一點小小的謝禮……"
80000088-8 = "請，請收下……雖然不是什麼了不起的東西……"
80000088-13 = "[ns]「謝謝！這個是……？」"
80000088-14 = "這個叫做巧克力脆片……"
80000088-15 = "本來是想準備更豪華一點的巧克力的……#n可是，以目前的狀況有點困難……"
80000088-16 = "這是我用補給品中的巧克力和採集到的水果做的……"
80000088-17 = "雖然形狀不漂亮……#n不過我能準備的也就只有這種東西了……"
80000088-18 = "嗚……果然讓你失望了吧……？"
80000088-19 = "[s]「沒有那種事唷。能感受到美優的心意讓我很開心。」"
80000088-20 = "可是……老師應該也已經從其他人手中拿到很多巧克力了吧……"
80000088-21 = "這種不起眼的巧克力，我想很快就會從記憶中消失了吧……"
80000088-22 = "然後我送老師情人節禮物的事，也會被遺忘……"
80000088-23 = "我將不會遺留在任何人的記憶裡，像落葉一樣被拋棄……"
80000088-27 = "[ns]吃美優的巧克力"
80000088-28 = "老師……？"
80000088-32 = "[ns]全力吃美優的巧克力！"
80000088-33 = "老，老師……！？"
80000088-34 = "請，請等一下……怎麼突然這樣……！？"
80000088-35 = "吃，吃那麼急的話──"
80000088-36 = "[s]「……咳咳，咳咳！」"
80000088-37 = "你，你沒事吧……？"
80000088-38 = "一口氣吃那麼多的話，可能會噎到的唷……"
80000088-39 = "為什麼要這麼做呢……？"
80000088-40 = "[s1]「因為美優的巧克力太好吃了……」\n[s2]「……不小心就吃到忘我了。」"
80000088-41 = "……可是，那只是把補給品的巧克力融化再凝固而已……"
80000088-42 = "……可是，那只是把補給品的巧克力融化再凝固而已……"
80000088-43 = "裡面放的也只是在這附近採來的水果唷……？"
80000088-44 = "[ns]「就算是這樣也非常好吃唷。我絕對不會忘記的。」"
80000088-46 = "……老師果然很善良呢。"
80000088-47 = "但是我……雖然害怕被人遺忘……"
80000088-48 = "……不過我更不喜歡老師遇到危險。"
80000088-49 = "所以……"
80000088-50 = "老師如果能慢慢地……細細地品嘗巧克力的話，我會很高興的。"

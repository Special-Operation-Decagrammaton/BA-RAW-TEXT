1005805-95 = "3;미네;01;세상 일이 그렇게 쉽게 해결된다면 아무도 고생하지 않겠지요……"
1005805-96 = "[s] \"다행이야! 이성을 찾아 주었구나!\""
1005805-97 = "3;미네;02;아뇨, 그렇다기보다는 처음부터 알고 있었습니다.\n#3;em;[반응]"
1005805-98 = "3;미네;01;선생님의 행동을 제한하는 것으로 문제가 해결된다면, 이미 백 번이라도 그렇게 했겠습니다만……"
1005805-99 = "3;미네;01;그럴 상황이 아니라는 것 정도는 저도 자각하고 있으니까요."
1005805-100 = "3;미네;99;그리고 여기에서부터는 직감의 영역입니다만……\n#3;em;…"
1005805-101 = "3;미네;02;……선생님의 행동을 제한하게 되면, 거기에서 더 큰 문제가 일어날 것 같기도 하니까요."
1005805-102 = "[s] \"……결국 오늘 티타임의 의미는 뭐였던 거야?\""
1005805-103 = "3;미네;01;저희 구호기사단 소녀들이 평소에 신세를 많이 지고 있다고 들어서요."
1005805-104 = "3;미네;03;그 보답을 할 겸, 약간의 하소연을 하고 싶기도 했답니다.\n#3;em;[반짝]"
1005805-105 = "[s9] \"……심장에 좋지 않은 하소연이었어……\"\n[s10] \"……그렇게까지 큰 의미는 없었던 거구나……\""

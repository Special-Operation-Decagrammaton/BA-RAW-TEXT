1005805-9 = "3;미네;02;여기, 3단 트레이입니다.\n#3;em;[반응]\n#3;a"
1005805-10 = "3;미네;01;1층에는 계란을 곁들인 오이 샌드위치와 발사믹 식초를 뿌린 샐러드,"
1005805-11 = "3;미네;99;2층에는 요거트와 스콘, 클로티드 크림,"
1005805-12 = "3;미네;02;3층에는 과일과 티라미수를 마련했습니다."
1005805-13 = "3;미네;01;음료는 커피와 홍차가 있으니, 취향에 맞게 골라 드시면 됩니다."
1005805-14 = "[s1] \"화려하네…… 잘 먹을게.\"\n[s2] \"그냥 생각이 나서 하는 말인데, 파운드 케이크는 없어?\""
1005805-15 = "3;미네;99;변변찮습니다만, 즐겨 주신다면 감사하겠습니다.\n#3;greeting"
1005805-16 = "3;미네;04;……네? 파운드, 케이크, 말씀이십니까……?!\n#3;em;[땀]"
1005805-17 = "3;미네;06;그렇, 군요. 어떻게, 해서도. 필요하시다면."
1005805-18 = "3;미네;09;지금, 나가서, 어떤 식으로든, 사 오겠습니다……"
1005805-19 = "3;미네;05;반드시, 꼭, 무슨 일이 있어도, 파운드 케이크가 필요하시다면……!\n#3;em;[!]\n#3;stiff"
1005805-20 = "3;미네;04;괜찮으시다고요? 이 정도로도 충분하신 거군요?\n#3;em;[?]"
1005805-21 = "3;미네;99;감사합니다. 그렇게 보아주신다면 저로서도 마음의 부담을 덜 수 있을 것 같네요."
1005805-22 = "3;미네;01;변변찮습니다만, 즐겨 주신다면 감사하겠습니다.\n#3;greeting"

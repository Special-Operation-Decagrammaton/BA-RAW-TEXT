1005805-37 = "3;미네;01;……이건 저의 나쁜 버릇이기도 합니다만, 고민할 때에는 종종 티타임을 가지곤 합니다."
1005805-38 = "3;미네;99;누그러진 분위기의 장을 제공하면, 저 뿐만 아니라 모두들 마음을 열고 말해주시는 경우가 많으니까요."
1005805-39 = "3;미네;04;단지, 이렇게 티타임에… 뭐라고 할까요, 선생님을 끌여들어도 되는 건가 해서요….\n#3;em;[땀]"

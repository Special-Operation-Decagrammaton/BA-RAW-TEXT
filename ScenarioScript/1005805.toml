1005805-74 = "3;미네;99;누군가가 다치고, 상처 입는 것보다는 가능한 한 평화로운 키보토스가 더 좋겠지요."
1005805-75 = "3;미네;00;그래서 다시 생각했습니다. \n#3;em;[반응]"
1005805-76 = "3;미네;02;혹시 선생님이, 자의가 아니실지라도, 이 많은 사건들의 원인으로 기능하게 되어 버린 것이라면."
1005805-77 = "[s] \"저기요, 미네? 미네 씨?\""
1005805-78 = "3;미네;09;선생님의 신변을 구속하면 대부분의 일이 해결되지 않을까요?!\n#3;h\n#3;closeup\n#bgshake\n#fontsize;80"
1005805-79 = "[s7] \"살려줘어어어어어어!\"\n[s8] \"억울하다! 나는 무죄야!!\""
1005805-80 = "#wait;10"
1005805-81 = "#wait;10"
1005805-82 = "3;미네;05;괜찮습니다, 선생님! 구호기사단의 숙소는 편안하고 안락하며 안전한 것으로 유명합니다!\n#3;em;[반응]\n#3;closeup"
1005805-83 = "3;미네;99;정치적인 분쟁이나 요소가 끼어들 틈도 없고, 타 부서나 단체로부터의 개입도 없습니다!\n#3;closeup"
1005805-84 = "3;미네;09;뭐니뭐니해도 저희는 구호를 제1 목표로 하는 기사단이니까요!\n#3;closeup\n#fontsize;80"
1005805-85 = "[s] \"뭔가 핀트가 아주 많이 어긋난 것 같은데!?\""
1005805-86 = "3;미네;05;자, 두려워 마시고 저희에게 몸과 마음을!\n#3;em;[반응]\n#3;stiff\n#3;closeup"
1005805-87 = "3;미네;09;저의 모든 것을 걸고, 선생님을 외부의 모든 사건들로부터 해방시켜 드릴 테니!\n#3;closeup"

[translation]
1005805-1 = "Afternoon Tea"
1005805-6 = "[ns] \"Tea time with Mine... I'm kind of excited.\""
1005805-9 = "Here we have a three-tier tray."
1005805-10 = "Tier one has cucumber sandwiches and a salad with a balsamic vinegar dressing."
1005805-11 = "Tier two over here holds yogurt, scones, and clotted cream..."
1005805-12 = "...And finally tier three features fruit and tiramisu."
1005805-13 = "For drinks we have coffee and black tea, so you can choose whichever you would like."
1005805-14 = "[s1] \"How fancy. I'll help myself.\"\n[s2] \"I just wanted to ask, do you have any pound cake?\""
1005805-15 = "It's not much, but I hope you enjoy."
1005805-16 = "...Excuse me? Pound...cake?!"
1005805-17 = "I...see. If that's something you really desire..."
1005805-18 = "I can go and buy some myself..."
1005805-19 = "If you really must have pound cake, no matter what...!"
1005805-20 = "Oh, you're sure that you're fine? All of this is enough?"
1005805-21 = "Thank you. It takes some of the weight off my shoulders hearing you say that."
1005805-22 = "It's not much, but I hope you enjoy."
1005805-26 = "*sigh*"
1005805-27 = "Hm? Am I not going to have any?"
1005805-28 = "Of course... I understand that it would be strange if I was the only person who wouldn't partake in the tea party I put together."
1005805-29 = "But... *sigh*"
1005805-33 = "[ns] \"Something on your mind?\""
1005805-37 = "...This is a bad habit of mine, but I tend to hold tea parties when I have something on my mind."
1005805-38 = "This is because by providing a comfortable environment, everyone, myself included, can open up their hearts."
1005805-39 = "But still, I wonder if it would be...appropriate to drag you into tea time."
1005805-40 = "[s3] \"I like hearing about your life as you help me.\"\n[s4] \"I would actually welcome the opportunity.\""
1005805-43 = "I'm happy to hear you say that."
1005805-44 = "The matter on my mind?"
1005805-45 = "That's..."
1005805-56 = "It's you, Sensei."
1005805-60 = "[ns] \"Me?\""
1005805-61 = "I don't know exactly why myself but...when I think of you..."
1005805-62 = "I find my heart fluttering."
1005805-63 = "[s5] \"Huh? You, uh... What?\"\n[s6] \"I-I don't know if I'm honored or just plain surprised...\""
1005805-66 = "I wanted to invite you here personally..."
1005805-67 = "...In hopes of finding out exactly why my heart acts in this way."
1005805-68 = "And so, I gave it some thought."
1005805-69 = "Perhaps it's because there's been one incident after another in Kivotos, ever since you were appointed."
1005805-73 = "[ns] \"...I guess it really did play out that way, yes.\""
1005805-74 = "Of course, I would prefer a peaceful Kivotos over one where people get hurt."
1005805-75 = "And so, I started thinking again."
1005805-76 = "What if, whether or not you intended it to be so, you are the cause of all of these incidents?"
1005805-77 = "[s] \"Excuse me, Mine?\""
1005805-78 = "Wouldn't most things be solved simply by putting you in custody?!"
1005805-79 = "[s7] \"Someone help me!!!\"\n[s8] \"I'm innocent! Innocent!\""
1005805-82 = "Everything is fine, Sensei! Our housing is well known as the safest and most comfortable!"
1005805-83 = "With zero involvement from any other organization, there's no room for any political conflicts or any other kind of disagreement!"
1005805-84 = "Since we knights place aid as our top priority!"
1005805-85 = "[s] \"I feel like you're focusing on the wrong point here!\""
1005805-86 = "I promise, you'll be able to trust your body and soul to us!"
1005805-87 = "I promise you on everything I hold dear that I will release you from all outside concerns!"
1005805-92 = "[ns] \"Noooooo!\""
1005805-94 = "...Is what I would like to say."
1005805-95 = "But if everything was as easy as that, life would be easy for everyone."
1005805-96 = "[s] \"That's good! You've come to your senses!\""
1005805-97 = "No. I've actually known it from the start."
1005805-98 = "If restricting you would solve the problem, I would've done so a hundred times already, Sensei..."
1005805-99 = "But I'm aware that is not plausible."
1005805-100 = "And this is just my intuition speaking, but..."
1005805-101 = "I think restricting your movements may cause a larger problem, Sensei..."
1005805-102 = "[s] \"What was the meaning behind today's tea time?\""
1005805-103 = "I heard that, recently, you have been helping the Remedial Knights frequently."
1005805-104 = "I wanted to thank you for that, and vent a little bit as well."
1005805-105 = "[s9] \"That vent was terrible for my cardiovascular health...\"\n[s10] \"So, it didn't have that big of a meaning behind it...\""
1005805-108 = "Heehee."
1005805-109 = "But, don't you think that the true purpose of a tea time is to share stories without large meanings behind them?"
1005805-110 = "Thank you again for making time for me, Sensei."

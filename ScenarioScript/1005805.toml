[translation]
1005805-1 = "ชายามบ่าย"
1005805-6 = "[ns] \"ดื่มชากับมิเนะงั้นเหรอ... ตื่นเต้นจัง\""
1005805-9 = "นี่ค่ะ ถาดขนมสามชั้นค่ะ"
1005805-10 = "ชั้นแรกเป็นแซนด์วิชแตงกวากับไข่ และสลัดใส่น้ำส้มสายชูหมัก บัลซามิกค่ะ"
1005805-11 = "ชั้นที่สองจะเป็นโยเกิร์ต สโคน แล้วก็คล็อตเตดครีม"
1005805-12 = "ชั้นที่สามเป็นผลไม้กับทีรามิสุค่ะ"
1005805-13 = "ส่วนเครื่องดื่ม ฉันเตรียมกาแฟกับชาแดงเอาไว้ คุณครูเลือกดื่มได้ตามที่ชอบเลยนะคะ"
1005805-14 = "[s1] \"สุดยอดเลย... จะทานแล้วนะ\"\n[s2] \"แค่ถามเฉยๆ นะ... ไม่มีเค้กปอนด์เหรอ?\""
1005805-15 = "ฉันยังเตรียมการได้ไม่ดีเท่าที่ควรแท้ๆ แต่ก็หวังว่าคุณครูจะทานให้อร่อยนะคะ"
1005805-16 = "...คะ? เค้กปอนด์... งั้นเหรอคะ...?!"
1005805-17 = "จริงด้วย... ถ้าคุณครูต้องการละก็..."
1005805-18 = "เดี๋ยวฉันจะออกไปซื้อ... มาให้คุณครูเองค่ะ"
1005805-19 = "ไม่ว่ายังไง... ถ้าคุณครูอยากทานเค้กปอนด์จริงๆ ละก็...!"
1005805-20 = "ไม่เป็นไรงั้นเหรอคะ? แค่ของว่างที่เตรียมไว้ก็พอแล้วเหรอคะ?"
1005805-21 = "ขอบคุณค่ะ ถ้าคุณครูคิดแบบนั้น ฉันเองก็ค่อยเบาใจขึ้นหน่อยค่ะ"
1005805-22 = "ฉันยังเตรียมการได้ไม่ดีเท่าที่ควรแท้ๆ แต่ก็หวังว่าคุณครูจะทานให้อร่อยนะคะ"
1005805-26 = "เฮ้อ..."
1005805-27 = "คะ? ทำไมฉันไม่กินเลยงั้นเหรอคะ?"
1005805-28 = "นั่นสินะคะ... ในฐานะที่ฉันเป็นเจ้าภาพงานดื่มน้ำชา ถ้าไม่กินอะไรเลยก็คงแปลกสินะคะ"
1005805-29 = "แต่ว่า... เฮ้อ..."
1005805-33 = "[ns] \"มีเรื่องกังวลอะไรรึเปล่า?\""
1005805-37 = "...ฉันอาจทำแบบนี้จนติดเป็นนิสัยที่ไม่น่ารักก็ได้ค่ะ แต่เวลาที่ฉันกังวลอะไร ก็มักจะจัดงาน#nเลี้ยงน้ำชาขึ้นค่ะ"
1005805-38 = "ถ้าจัดเตรียมสถานที่ที่บรรยากาศดีๆ นอกจากฉันแล้ว คนอื่นๆ ก็อาจเปิดใจและยอมพูดคุยกับ#nฉันด้วยใช่มั้ยล่ะคะ"
1005805-39 = "แต่ว่าตอนนี้ฉันรู้สึกกังวลนิดหน่อยค่ะ... ว่าชวนคุณครูมาแบบนี้ มันเหมาะสมแล้วรึเปล่า"
1005805-40 = "[s3] \"ครูจะมานั่งดื่มน้ำชา แล้วก็ได้มาคุยกับมิเนะด้วยไง\"\n[s4] \"ครูต้องเป็นฝ่ายขอบคุณมิเนะมากกว่านะ\""
1005805-43 = "ขอบคุณที่คิดแบบนั้นนะคะ"
1005805-44 = "เรื่องที่ฉันกังวลน่ะเหรอคะ?"
1005805-45 = "เรื่องนั้นก็คือ..."
1005805-56 = "คุณครูนั่นแหละค่ะ"
1005805-60 = "[ns] \"ครูเหรอ?\""
1005805-61 = "ฉันก็ไม่รู้ว่าเพราะอะไร แต่พอคิดถึงคุณครูทีไร..."
1005805-62 = "จิตใจของฉัน... รู้สึกว้าวุ่นตลอดเลยค่ะ"
1005805-63 = "[s5] \"อะ...เอ๋?!\"\n[s6] \"ไม่รู้ว่าควรต้องรู้สึกดี หรือว่าควรจะต้องตกใจดีเลยแฮะ...?!\""
1005805-66 = "ฉันเลยชวนคุณครูมาที่นี่..."
1005805-67 = "เพื่อหาสาเหตุของอาการที่ฉันเป็นค่ะ"
1005805-68 = "และฉันก็ลองคิดมาแล้วค่ะ"
1005805-69 = "ว่าบางทีอาจจะเป็นเพราะหลังจากคุณครูมารับตำแหน่ง ก็เกิดเรื่องต่างๆ ขึ้นในคิโวทอสไม่หยุด"
1005805-73 = "[ns] \"...เอ่อ มันก็เป็นแบบนั้นจริงๆ นั่นแหละ\""
1005805-74 = "แน่นอนค่ะ ฉันปรารถนาให้คิโวทอสของเราสงบสุข และไม่มีใครได้รับบาดเจ็บ"
1005805-75 = "เพราะงั้นฉันเลยมาคิดดูอีกทีแล้วค่ะ "
1005805-76 = "ไม่ว่าคุณครูจะตั้งใจหรือไม่ก็ตาม แต่เรื่องที่คุณครูเป็นต้นเหตุของเหตุการณ์พวกนั้นก็เป็นเรื่องจริง"
1005805-77 = "[s] \"เดี๋ยวก่อน มิเนะ... คุณมิเนะ?\""
1005805-78 = "ดังนั้น ถ้าเกิดกักตัวคุณครูเอาไว้ เรื่องวุ่นวายส่วนใหญ่ก็คงจะไม่เกิดขึ้นสินะคะ?!"
1005805-79 = "[s7] \"ช่วยด้วยยยยยยย!\"\n[s8] \"ไม่ยุติธรรมเลย! ครูไม่ได้เป็นคนผิดสักหน่อย!\""
1005805-82 = "ไม่ต้องห่วงนะคะคุณครู! ที่พักของชมรมอัศวินบรรเทาทุกข์น่ะ ขึ้นชื่อเรื่องความปลอดภัยแล้วก็#nความสะดวกสบายมากค่ะ!"
1005805-83 = "ไม่มีช่องว่างให้กลุ่มที่ขัดแย้งทางการเมืองเข้ามาวุ่นวาย และไม่มีการแทรกแซงจากหน่วยงาน หรือองค์กรอื่นๆ ด้วยนะคะ!"
1005805-84 = "ไม่ว่ายังไง พวกเราก็คือกลุ่มอัศวินที่มีเป้าหมายสูงสุดคือการบรรเทาทุกข์ของผู้คน#nค่ะ!"
1005805-85 = "[s] \"ครูว่าเธอเข้าใจผิดไปไกลแล้วนะ!?\""
1005805-86 = "เอาละค่ะ ไม่ต้องกลัวนะคะ ยอมมอบจิตใจและร่างกายให้ฉันแล้วทำตามที่บอกเถอะค่ะ...!"
1005805-87 = "ส่วนฉันก็จะทุ่มเททุกอย่างที่มี ปกป้องคุณครูจากพวกคนภายนอกทุกคนเองค่ะ!"
1005805-92 = "[ns] \"ไม่เอาาาาา!\""
1005805-94 = "...นั่นคือสิ่งที่ฉันอยากบอกคุณครูค่ะ"
1005805-95 = "แต่ถ้าเรื่องทุกอย่างแก้ไขได้ง่ายแบบนั้น คงไม่มีใครต้องลำบากหรอกค่ะ..."
1005805-96 = "[s] \"ค่อยยังชั่วหน่อย เริ่มมีเหตุผลบ้างแล้วสินะ!\""
1005805-97 = "เปล่าค่ะ เรื่องนั้นฉันรู้ตั้งแต่แรกแล้วค่ะ..."
1005805-98 = "ถ้าปัญหานี้แก้ไขได้ด้วยการกักบริเวณคุณครูละก็ ฉันคงจะทำแบบนั้นไปเป็นร้อยๆ ครั้งแล้ว..."
1005805-99 = "แต่ฉันรู้ดีค่ะ ว่านี่ไม่ใช่สถานการณ์ที่จะทำแบบนั้นได้"
1005805-100 = "แถมฉันก็สังหรณ์ใจค่ะว่า..."
1005805-101 = "...ถ้ากักบริเวณคุณครูไว้ที่นี่ละก็ คงจะเกิดเรื่องใหญ่ขึ้นกว่านี้แน่นอนค่ะ"
1005805-102 = "[s] \"...สุดท้ายที่จัดงานเลี้ยงน้ำชาก็เพราะแบบนั้นเองเหรอ?\""
1005805-103 = "ฉันได้ยินมาว่าสมาชิกของชมรมเรามักไปรบกวนคุณครูบ่อยๆ "
1005805-104 = "ก็เลยอยากตอบแทนคุณครู แล้วก็ขอร้องอะไรนิดหน่อยด้วยค่ะ"
1005805-105 = "[s9] \"ช่างเป็นวิธีขอร้องที่ไม่ดีต่อใจซะเลย...\"\n[s10] \"ไม่ใช่เรื่องใหญ่อะไรสินะ...\""
1005805-108 = "ฮุฮุ..."
1005805-109 = "ยังไงก็ตาม จุดประสงค์ของงานเลี้ยงน้ำชาก็คือการใช้เวลาพูดคุยเรื่องเล็กๆ น้อยๆ แบบนี้ไม่ใช่#nเหรอคะ?"
1005805-110 = "ขอบคุณอีกครั้งที่สละเวลามาพบฉันนะคะคุณครู"

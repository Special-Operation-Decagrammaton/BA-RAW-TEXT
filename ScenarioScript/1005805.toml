[translation]
1005805-1 = "下午茶"
1005805-6 = "[ns]「居然能和美禰喝下午茶，真是期待。」"
1005805-9 = "為了能讓您一層一層地享用，我準備了蛋糕塔。"
1005805-10 = "第一層是雞蛋與小黃瓜的三明治和淋上巴薩米克醋的沙拉。"
1005805-11 = "第二層是優格、司康和凝脂奶油。"
1005805-12 = "第三層是水果和提拉米蘇。"
1005805-13 = "至於飲料請從咖啡和紅茶之中選擇您喜歡的吧。"
1005805-14 = "[s1]「真，真豪華呢……謝謝你，我要開動了。」\n[s2]「順帶一提，有磅蛋糕嗎？」"
1005805-15 = "不用客氣，能合老師的口味就太好了。"
1005805-16 = "磅蛋糕，是嗎……？"
1005805-17 = "我想想，雖然現在沒有……"
1005805-18 = "如果您想要的話，我會立刻不擇手段為您準備的。"
1005805-19 = "如果老師想吃，無論如何都……！"
1005805-20 = "……咦，您剛才只是想問問看而已？突然想吃提拉米蘇了？"
1005805-21 = "那真是太好了。我做為準備的一方也感到非常快樂。"
1005805-22 = "那麼，我為您泡杯紅茶。"
1005805-26 = "……"
1005805-27 = "……嗯？您問我不吃嗎？"
1005805-28 = "是呢……明明是我舉辦的茶會，如果我沒吃確實有點奇怪。"
1005805-29 = "但是，那個……"
1005805-33 = "[ns]「有什麼煩惱的話可以告訴我唷？」"
1005805-37 = "……這是我的壞習慣，當心裡有煩惱時，經常會想舉辦茶會。"
1005805-38 = "只要提供氛圍平靜的場所，不只是自己，其他人也會敞開心胸……"
1005805-39 = "只是，這樣的茶會……怎麼說呢，把老師捲進來真的好嗎……"
1005805-40 = "[s3]「不僅受到這樣的招待，如果還能幫美禰解決煩惱……」\n[s4]「我反而會覺得開心唷。」"
1005805-43 = "謝謝您。那……我可以告訴您嗎？"
1005805-44 = "我的煩惱就是……"
1005805-45 = "……"
1005805-56 = "不是別的，正是老師您。"
1005805-60 = "[ns]「……我？」"
1005805-61 = "雖然不清楚原因，但只要想到老師……"
1005805-62 = "內心總是會很混亂。"
1005805-63 = "[s5]「這……？」\n[s6]「該說感到有點意外，還是有點開心呢……」"
1005805-66 = "為何一想到老師就會覺得心煩意亂。"
1005805-67 = "為了找出這個原因，我才會請老師親自來一趟。"
1005805-68 = "我個人是這麼推測的。"
1005805-69 = "自從老師上任以來，奇普托斯和以往相比是不是意外與事件不斷發生呢……"
1005805-73 = "[ns]「是，是嗎……？」"
1005805-74 = "如果辦的到的話，不會有人受傷的、和平的奇普托斯是理想對吧。"
1005805-75 = "所以，我思考過該怎麼做才能實現這個理想。"
1005805-76 = "雖然我很清楚老師並不是會刻意引起事件的那種人，不過既然發生了這麼多事件，就代表──"
1005805-77 = "[s]「那，那個……美，美禰同學？」"
1005805-78 = "只要限制老師的行動，一切是不是就能迎刃而解了呢！"
1005805-79 = "[s7]「等等！！？！？」\n[s8]「我是冤枉的！！」"
1005805-82 = "別擔心，老師！救護騎士團隨時都做好溫柔迎接老師的準備！"
1005805-83 = "不僅不會捲入政治紛爭，也不會被其他社團或團體介入！"
1005805-84 = "畢竟，我們隨時都把「救護」視為最重要的目標！"
1005805-85 = "[s]「不是那個問題吧！？」"
1005805-86 = "來，請把身心都交給我吧！"
1005805-87 = "我們會賭上一切，將老師從所有事件中解放的！"
1005805-92 = "[ns]「不要啊啊啊啊啊！！」"
1005805-94 = "……雖然，我很想這麼說……"
1005805-95 = "但如果世界上的事都能這麼簡單地解決，就不會有人困擾了吧。"
1005805-96 = "[s]「你，你明白那個道理了嗎……？」"
1005805-97 = "是的……其實甚至無須討論，我一開始就知道了。"
1005805-98 = "如果限制老師的行動就能解決一切，在我採取行動之前就會有許多人那麼做了吧……"
1005805-99 = "事態已經有所改變這點，就算是我也很清楚。"
1005805-100 = "而且，雖然這只是我的直覺……"
1005805-101 = "……如果限制老師行動的話，似乎會引發更嚴重的問題。"
1005805-102 = "[s]「那今天的茶會究竟是……？」"
1005805-103 = "我聽救護騎士團的大家說，平時常常受老師許多的照顧。"
1005805-104 = "於是便想招待您作為回禮，不小心便萌生了一些不好的念頭……"
1005805-105 = "[s9]「對心臟有點不好啊……」\n[s10]「今天的美禰看起來很擔心，原來是這個原因啊，那我就放心了。」"
1005805-108 = "呵呵。"
1005805-109 = "不過，像這樣談論一些沒什麼意義的話題，不正是茶會本來的目的嗎？"
1005805-110 = "老師，再次感謝您為我空出時間。"

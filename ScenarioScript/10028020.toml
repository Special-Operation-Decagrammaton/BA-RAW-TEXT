[translation]
10028020-1 = "第2話;稀鬆平常"
10028020-7 = "哈啊……哈啊，哈啊……"
10028020-8 = "跑，跑得我快喘不過氣了……先等一下……"
10028020-13 = "不，不過幸好還是及時搭上車了。#n哈哈……"
10028020-20 = "老，老師……？你沒事吧！？#n有沒有因為跑得太急而受傷……！"
10028020-21 = "[s1]「別，別擔心。我沒事……」\n[s2]「看來我得多做點運動了……哈啊……」"
10028020-24 = "太，太好了……"
10028020-25 = "事情怎麼會變成這樣……本來應該要將老師舒服地送回去才對……"
10028020-29 = "對不起。才一開始就出了意外……"
10028020-30 = "……沒關係嗎？#n雖然很感謝老師能這麼說……"
10028020-31 = "卻還是有種從第一顆扣子就扣錯的感覺，真是懊惱。"
10028020-32 = "到底是哪裡出了差錯呢……"
10028020-36 = "不，不過換個角度想，多虧了老師才沒把公文包弄丟！"
10028020-37 = "不然差點就搞砸了，對吧？"
10028020-38 = "[s3]「沒錯，只是一點小狀況而已。」\n[s4]「這種事稀鬆平常啦。」"
10028020-41 = "就，就是說呀！啊哈哈哈！#n哎呀，其實也沒什麼大不了的～"
10028020-42 = "只要在車廂內找到公文包～接著在下一站轉乘開往三一的列車就行了～"
10028020-43 = "時間還很充裕～只要在今天之內送達就行了～"
10028020-47 = "當然明明有這麼多學園，卻偏偏是開往「格黑娜」的列車……#n確實讓人有點介意，但即便如此──"
10028020-52 = "…………？"
10028020-53 = "搞什麼？這傢伙不是三一的人嗎？為什麼三一的人會在這裡……"
10028020-54 = "等等，他手上的臂章……是實現正義部的對吧？"
10028020-55 = "為什麼三一的麻雀會在開往格黑娜的列車上……？"
10028020-70 = "嗯……"
10028020-71 = "那個……氣氛好像有點不對勁……"
10028020-72 = "感覺不太受歡迎呢……"
10028020-73 = "[s5]「我想應該是職務的關係……」\n[s6]「果然是因為學校間的氛圍吧……」"
10028020-76 = "喂，那邊的！吵什麼吵！又怎麼了？"
10028020-80 = "格黑娜的人就不能安分一點嗎！啊！？"
10028020-84 = "……嗯？怎麼回事？"
10028020-85 = "你不是三一的學生嗎？怎麼會搭上這班列車？#n這可是開往格黑娜的車哦？"
10028020-89 = "……算了，原因什麼的與我無關。#n先讓我看看車票，快點。"
10028020-90 = "咦，車，車票？#n呃，那個……我們……"
10028020-91 = "……嗯？怎麼？沒有車票嗎？"
10028020-92 = "那邊的大人呢？"
10028020-93 = "兩個人都沒有？是在開什麼玩笑……"
10028020-94 = "啊哈哈……那個，請稍等一下。先聽我們解釋……"
10028020-95 = "有什麼好解釋的？#n難不成是因為……"
10028020-96 = "覺得開往格黑娜的列車八成會亂成一團……"
10028020-97 = "……？"
10028020-98 = "……嗯？"
10028020-99 = "認為這些乘客根本無法可管……乘務員也只是形同虛設……！"
10028020-100 = "不，那個……"
10028020-101 = "所以就算搭霸王車也不會有人知道……？"
10028020-102 = "不是那樣的……請聽我們解釋……"
10028020-103 = "我沒說錯吧……！果然是這樣對吧……！？"
10028020-104 = "不，我們什麼都還沒……"
10028020-105 = "就算……就算……！！"
10028020-106 = "就算這班列車再怎麼無法無天也不能明目張膽地搭霸王車啊！？"
10028020-107 = "我什麼話都……還沒……說……"
10028020-108 = "我再也忍不下去了！！現在連三一的傢伙也不把我們放在眼裡嗎！？！？"
10028020-109 = "嗶──！嗶──────！！集合──！！"
10028020-110 = "發現2名逃票乘客！以指導手冊C型應對！！"
10028020-113 = "什麼！？逃票！？那些傢伙又來了嗎……！"
10028020-114 = "真是忍無可忍！不必多說！！把逃票犯給我全部抓起來！！"
10028020-115 = "集合──！！！！"
10028020-120 = "嗯……"
10028020-121 = "唔嗯……"
10028020-122 = "奇怪……怎麼會這樣……"
10028020-123 = "明明……"
10028020-128 = "明明不是什麼大不了的事……"

1003803-3 = "#na;(미야코가 어느 상가의 유리창 앞에서 안을 들여다보며 생각에 잠겨있다.)"
1003803-4 = "2;미야코;00;……….\n#2;a\n#2;em;…"
1003803-5 = "[s] \"미야코……?\""
1003803-6 = "2;미야코;99;으음………."
1003803-7 = "[s] \"미야코!\""
1003803-8 = "2;미야코;08;아, 아앗…… 선생님이셨군요.\n#2;em;[?!]\n#2;shake"
1003803-9 = "2;미야코;09;죄송합니다. 잠깐 생각에 잠겨 있느라.\n#2;m3"
1003803-10 = "[s] \"무얼 보고 있었던 거야?\""
1003803-11 = "2;미야코;02;아, 다름 아니라 이 펫숍의 동물들을 구경하고 있었습니다.\n#2;em;[반응]"
1003803-12 = "2;미야코;02;코우사기 공원 근처에 있는 펫숍이라, 출동 때마다 오가며 한번씩 보는 곳인데……."
1003803-13 = "2;미야코;03;최근 이 펫숍에 토끼가 들어왔습니다.\n#2;em;[음표]"
1003803-14 = "2;미야코;99;선생님도 아시겠지만, 토끼는 정말로 귀여운 동물입니다."
1003803-15 = "2;미야코;07;저 앙증맞은 앞다리와 쫑긋한 귀…… 정말 하루 종일 보고 있어도 질리지가 않습니다.\n#2;em;[하트]"
1003803-16 = "[s] \"그렇게 좋아하면 직접 분양받는 게 어때?\""
1003803-17 = "2;미야코;04;그건…….\n#2;em;…"
1003803-18 = "2;미야코;04\n1;펫 숍 직원;08;또 오셨군요, 손님!\n#1;hophop\n#2;m5\n#1;em;[반응]\n#1;ar"
1003803-19 = "1;펫 숍 직원;03;토끼를 분양받으러 오셨나요?"
1003803-20 = "2;미야코;08;네, 네? 아뇨…… 저는……\n#2;em;[?]"
1003803-21 = "1;펫 숍 직원;09;늘 저희 가게의 토끼를 애정 어린 시선으로 쳐다보고 계시기에 오늘에야말로 분양을 받으러 오신 줄 알았는데……\n#1;em;…"
1003803-22 = "1;펫 숍 직원;03;손님께서 눈여겨보고 계신 집토끼들은 사람 손을 잘 타서 순하고 착하답니다. #n이 기회에 데려가 주시는 게 어떤가요?"
1003803-23 = "2;미야코;04;하지만 저희는…… 돈도, 거주지도 충분치 않아서……\n#2;stiff\n#2;em;[땀]"
1003803-24 = "[s] \"제일 앞에 있는 하얀 토끼로 주세요.\""
1003803-25 = "1;펫 숍 직원;03\n2;미야코;08;선생님? 어, 어째서……?\n#1;dl\n#2;m3\n#2;em;[?!]"
1003803-26 = "2;미야코;08;선물이라고요? 하지만 저는 아직 동물을 키울 준비가……"
1003803-27 = "2;미야코;06;게다가 저희 RABBIT 소대는 제대로 된 건물도 없어서 공원에서 노숙하는 신세인걸요.\n#2;em;[땀]\n#2;stiff"
1003803-28 = "[s1] \"인질을 앞에 두고 돌아갈 수는 없지.\"\n[s2] \"토끼들도 좁은 케이지보다는 넓은 공원에서 뛰어놀고 싶어 할 거야.\""
1003803-29 = "2;미야코;02;그건……\n#2;em;…"
1003803-30 = "2;미야코;03;그렇네요. 이것도 구출작전의 일환."
1003803-31 = "2;미야코;02;그건……\n#2;em;…"
1003803-32 = "2;미야코;03;그렇네요. 유리창 안에만 있는 것은 가여우니까……"
1003803-33 = "2;미야코;07;감사합니다, 선생님.\n#2;greeting\n#2;em;[반짝]"
1003803-34 = "2;미야코;07;애정을 담아서 열심히 기를게요!"

[translation]
1003803-1 = "SRT，救出！"
1003803-2 = "奇普托斯市內．鬧區"
1003803-3 = "（都子在商店街某間店的櫥窗前一邊望著店內一邊思考著什麼）"
1003803-4 = "……"
1003803-5 = "[s] 「都子……？」"
1003803-6 = "唔嗯……"
1003803-7 = "[s] 「都子？」"
1003803-8 = "噫呀！……啊啊，是老師啊。"
1003803-9 = "對不起，我剛才在想事情。"
1003803-10 = "[s] 「你在看什麼呢？」"
1003803-11 = "呃，在看這裡的動物們。"
1003803-12 = "因為這裡是離公園很近的寵物店，每次經過的時候都會看到……"
1003803-13 = "最近這個寵物店裡，開始有兔子了。"
1003803-14 = "我想老師應該也知道，兔子是種非常可愛的動物。"
1003803-15 = "那可愛的前腳，立得直直的耳朵……真的是看一整天都不會膩。"
1003803-16 = "[s] 「既然這麼喜歡的話，不如養一隻怎麼樣呢？」"
1003803-17 = "這個……"
1003803-18 = "您又來了呀，這位客人！"
1003803-19 = "終於要來帶一隻兔子回家了嗎？"
1003803-20 = "什，什麼？不，我……"
1003803-21 = "客人您總是用充滿著愛的眼神看著我們店裡的兔子，#n我以為您今天總算要把牠們帶回家了……"
1003803-22 = "那些孩子都很親人，是群乖巧的好孩子唷。您覺得如何呢？"
1003803-23 = "但是我們沒有錢，又沒有舒服的地方可以住……"
1003803-24 = "[s] 「請給我最前面的那隻白色兔子。」"
1003803-25 = "老師！？為，為什麼……？"
1003803-26 = "禮物……是嗎？可是我還沒有做好飼養動物的準備……"
1003803-27 = "而且我們RABBIT小隊連正經的住所都沒有，還處在露宿公園的狀態……"
1003803-28 = "[s1] 「這麼可愛的人質就在眼前，怎麼能回去呢。」\n[s2] 「我想兔子們比起狹窄的籠子，更想在廣闊的公園裡玩吧。」"
1003803-29 = "這……"
1003803-30 = "也對。雖然這麼說有點奇怪，不過這也是救援作戰的一種。"
1003803-31 = "這……"
1003803-32 = "也對。一直待在玻璃窗裡也有點可憐……"
1003803-33 = "非常謝謝你，老師。"
1003803-34 = "我會傾注著愛情，好好努力飼養牠的！"
1003803-36 = "（之後，都子以幸福的表情抱著兔子回去了）"

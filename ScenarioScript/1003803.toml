[translation]
1003803-1 = "SRT ปฏิบัติการกู้ภัย!"
1003803-2 = "ย่านพลุกพล่าน ในเมืองคิโวทอส"
1003803-3 = "(มิยาโกะมองเข้าไปด้านในหน้าต่างห้างสรรพสินค้าแห่งหนึ่งและครุ่นคิดถึงเรื่องบางอย่าง)"
1003803-4 = "..."
1003803-5 = "[s] \"มิยาโกะ...?\""
1003803-6 = "อืม...."
1003803-7 = "[s] \"มิยาโกะ!\""
1003803-8 = "อะ... อ๊ะ คุณครูเองเหรอคะ"
1003803-9 = "ขอโทษด้วยค่ะ ฉันมัวแต่คิดอะไรเพลินไปหน่อย"
1003803-10 = "[s] \"ดูอะไรอยู่เหรอ?\""
1003803-11 = "อา... ไม่มีอะไรหรอกค่ะ ฉันแค่ดูพวกสัตว์เลี้ยงที่อยู่ในร้านขายสัตว์เลี้ยงเท่านั้นค่ะ"
1003803-12 = "ร้านนี้อยู่ใกล้กับโคะอุซางิ การ์เด้น เพราะงั้นทุกครั้งที่ออกปฏิบัติการเลยจะแวะมาบ้างค่ะ..."
1003803-13 = "เมื่อไม่นานมานี้มีน้องกระต่ายเพิ่มเข้ามาด้วยค่ะ"
1003803-14 = "คุณครูก็ทราบดีนี่คะว่ากระต่ายเป็นสัตว์ที่น่ารักมากๆๆ เลยค่ะ"
1003803-15 = "ขาหน้าเล็กๆ น่ารักกับหูยาวๆ ทั้งสองข้าง... นั่งมองได้ทั้งวันไม่เบื่อเลยค่ะ"
1003803-16 = "[s] \"ถ้าชอบมากขนาดนั้นก็ซื้อไปเลี้ยงสักตัวดีไหม?\""
1003803-17 = "เรื่องนั้น..."
1003803-18 = "คุณลูกค้า มาอีกแล้วนะครับ!"
1003803-19 = "วันนี้จะมารับน้องกระต่ายไปเลี้ยงเหรอครับ?"
1003803-20 = "คะ...คะ? ไม่ใช่ค่ะ คือว่าฉัน..."
1003803-21 = "ผมเห็นคุณลูกค้ามักจะมายืนมองน้องกระต่ายด้วยสายตาที่เอ็นดูน้องสุดๆ เลยคิดว่าวันนี้จะมารับ#nน้องกลับบ้านไปเลี้ยง..."
1003803-22 = "น้องกระต่ายที่คุณลูกค้าสนใจน่ารักและเชื่องกับคนมากๆ เลยนะครับ #nสนใจรับน้องกลับบ้านไปเลี้ยงไหมครับ?"
1003803-23 = "แต่ว่าฉัน... ตอนนี้ไม่มีที่อยู่เป็นหลักแหล่ง แถมยังมีเงินไม่พอ..."
1003803-24 = "[s] \"งั้นขอกระต่ายตัวสีขาวที่อยู่หน้าสุดตัวนั้น\""
1003803-25 = "คุณครูคะ ทะ...ทำไมถึงได้ซื้อให้ฉันล่ะคะ?"
1003803-26 = "ให้เป็นของขวัญเหรอคะ...? แต่ว่าฉันยังไม่ได้เตรียมตัวให้พร้อมที่จะเลี้ยงสัตว์..."
1003803-27 = "นอกจากนี้ กองทหาร RABBIT ของพวกเราไม่ได้อาศัยอยู่ที่พักที่เป็นอาคาร แต่ตอนนี้ไปขอใช้พื้นที่#nสวนสาธารณะตั้งแคมป์อยู่นะคะ"
1003803-28 = "[s1] \"เจอกระต่ายน่ารักอยู่ตรงหน้าแบบนี้จะปล่อยไว้ได้ยังไงล่ะ\"\n[s2] \"พวกกระต่ายเองก็คงอยากวิ่งเล่นในสวนกว้างๆ มากกว่าอยู่ในกรงนะ\""
1003803-29 = "เรื่องนั้น..."
1003803-30 = "จริงด้วยนะคะ นี่ก็เป็นส่วนหนึ่งของปฏิบัติการกู้ภัย"
1003803-31 = "เรื่องนั้น..."
1003803-32 = "จริงด้วยนะคะ ได้แต่นั่งมองอยู่หลังหน้าต่างกระจกแบบนี้ก็น่าสงสารนะคะ..."
1003803-33 = "ขอบคุณค่ะ คุณครู"
1003803-34 = "ฉันจะดูแลน้องกระต่ายให้ดีเลยค่ะ!"
1003803-36 = "(จากนั้นมิยาโกะก็อุ้มกระต่ายกลับไปด้วยสีหน้าที่มีความสุข)"

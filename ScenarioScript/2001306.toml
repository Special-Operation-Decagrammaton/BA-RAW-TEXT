[translation]
2001306-1 = "Black and White"
2001306-2 = "(เพื่อช่วยเหลืองานให้คำปรึกษาด้านการรักษาความปลอดภัยของจิฮิโระ ทั้งคู่จึงไปที่บริษัทแห่งหนึ่ง#nในเขตธุรกิจ)"
2001306-3 = "สวัสดีค่ะ คากามิ จิฮิโระจาก <เวอริทัส> ค่ะ"
2001306-4 = "คุณติดต่อมาเพราะเรื่องงานตรวจสอบเซิร์ฟเวอร์ใช่รึเปล่าคะ?"
2001306-5 = "...มาสายนะ!! ตอนนี้มันกี่โมงกี่ยามแล้วรู้มั้ย?!"
2001306-6 = "คะ? ไหนว่าจะตรวจสอบตอนสี่ทุ่มไม่ใช่เหรอคะ..."
2001306-7 = "นี่ฉันยุ่งมากนะ แค่บอกว่าจะเริ่มงานตอนสี่ทุ่มฉันก็ต้องมารอพวกเธอจนถึงดึกดื่นอย่างนั้นเหรอ มันใช่เรื่องมั้ย?"
2001306-8 = "ควรจะมารอที่สำนักงานล่วงหน้าเพื่อไม่ให้ลูกค้าต้องลำบากสิ!"
2001306-9 = "...ขอโทษนะคะ ครั้งหน้าจะระวังไม่ให้เกิดความไม่สะดวกแบบนี้อีกค่ะ"
2001306-10 = "เฮ้อ เพราะแบบนี้เลยไม่อยากจะจ้างงานพวกกลุ่มแฮ็กเกอร์ที่ไม่รู้ที่มาที่ไปแบบนี้"
2001306-11 = "จะมีความสามารถแค่ไหนก็ไม่รู้หรอกนะ แต่ไม่มีมารยาททางธุรกิจเลยสักนิด..."
2001306-12 = "รายละเอียดที่ต้องตรวจสอบอยู่ในเอกสารที่วางไว้บนโต๊ะแล้ว จัดการเอาเองก็แล้วกัน"
2001306-13 = "จะบอกเผื่อเอาไว้ถ้าหากคิดจะตุกติก... ที่ห้องเซิร์ฟเวอร์ของบริษัทเราติดตั้งระบบเฝ้าระวังแบบ#nทันสมัยที่ส่งภาพที่บันทึกแบบเรียลไทม์อยู่นะ"
2001306-14 = "ถ้าหากทำอะไรน่าสงสัยแม้แต่น้อยละก็ สัญญาณเตือนจะดังทันที อย่าคิดจะเล่นอะไรแผลงๆ เชียวล่ะ"
2001306-15 = "แน่นอนค่ะ ถ้าอย่างนั้นจะเริ่มงานเลยนะคะ"
2001306-19 = "[ns] \"...เป็นอะไรหรือเปล่า?\""
2001306-20 = "ก็ช่วยไม่ได้นะ... พอต้องรับมือกับลูกค้าบ่อยๆ ก็เจอลูกค้าหลายประเภทแบบนี้แหละ"
2001306-21 = "อีกอย่าง พอได้ยินชื่อ ‘เวอริทัส’ บางคนก็ดูเหมือนจะหยาบคายมากขึ้นโดยไม่รู้สาเหตุ"
2001306-22 = "...แต่เราก็ทำอะไรไม่ได้เพราะว่ามันเป็นกรรมที่ทำไว้น่ะ"
2001306-23 = "จะยังไงก็เถอะไม่ต้องไปสนใจหรอก เริ่มงานเลยดีกว่า กลางคืนเวลามันสั้นนะ"
2001306-26 = "การตั้งค่าเว็บไม่มีปัญหาอะไรจริงๆ ด้วย"
2001306-27 = "ทีนี้ก็เหลือแค่คัดลอกข้อมูลสำรองแล้วก็..."
2001306-28 = "หือ? นี่มันข้อมูลอะไรน่ะ...?"
2001306-29 = "[s] \"มีปัญหาอะไรรึเปล่า?\""
2001306-30 = "ไม่ใช่ปัญหาแต่ว่า...ใน DB มีข้อมูลที่คาดไม่ถึงเยอะมากเลย"
2001306-31 = "นี่มัน...ข้อมูลส่วนตัวของลูกค้าที่ติดตั้งแอปพลิเคชันของบริษัทนี้นี่ พวกเขาเก็บข้อมูลแบบนี้มาได้ยังไง?"
2001306-32 = "แล้วยังมีบันทึกการทำธุรกรรมที่น่าสงสัยที่ไม่ได้ระบุไว้ในบัญชีด้วย..."
2001306-33 = "ขอเสียมารยาทสักหน่อยแล้วกัน..."
2001306-37 = "อ่ะฮ่า... อย่างนี้นี่เอง แอบรวบรวมข้อมูลโดยการติดตั้งแบ็กดอร์ไว้ในแอปพลิเคชันที่แจกจ่ายอยู่ตอนนี้#nนั่นเอง"
2001306-38 = "จากนั้นก็ขายข้อมูลที่เก็บรวบรวมมาให้บริษัทประกันแล้วก็ซ่อนเงินสกปรกเอาไว้ เป็นเทคนิคที่เดาง่ายมาก"
2001306-39 = "[s1] \"นั่นมันเป็นอาชญากรรมไม่ใช่เหรอ?\"\n[s2] \"ถ้างั้นต้องรีบแจ้งความสิ!\""
2001306-40 = "นี่เป็นอาชญากรรมก็จริง...แต่การจะแจ้งความก็เป็นอีกปัญหาหนึ่ง"
2001306-41 = "นี่เป็นอาชญากรรมก็จริง...แต่การจะแจ้งความก็เป็นอีกปัญหาหนึ่ง"
2001306-42 = "ข้อมูลเซิร์ฟเวอร์ที่เจ้าหน้าที่รักษาความปลอดภัยได้มาโดยที่ไม่ได้รับอนุญาตจากลูกค้า มันก็ถือเป็น#nอาชญากรรมไม่ต่างกัน ต่อให้แจ้งตำรวจก็เอามาใช้เป็นหลักฐานไม่ได้อยู่ดี"
2001306-43 = "ยิ่งไปกว่านั้น ต่อให้เป็นการกระทำเพื่อความยุติธรรมแค่ไหน แต่ถ้ามีข่าวลือออกไปว่าผู้เชี่ยวชาญ#nด้านความปลอดภัยของเวอริทัสปล่อยให้ข้อมูลของบริษัทรั่วไหลออกไปโดยไม่ได้รับอนุญาตละก็..."
2001306-44 = "มันจะทำให้บริษัทที่เชื่อมั่นและจ้างงานเราหายากขึ้นน่ะ"
2001306-45 = "[s] \"แบบนั้นก็...\""
2001306-46 = "...ยุ่งยากเลยละนะ"
2001306-47 = "เป็นเรื่องยุ่งยากมากๆ จริงๆ นะ"
2001306-48 = "..."
2001306-51 = "(เช้าวันต่อมา)"
2001306-52 = "<ข่าวด่วนครับ คุณ A ประธานบริษัทพัฒนาแอปพลิเคชันชื่อดัง แอบติดตั้งแบ็กดอร์ในโค้ดของ#nแอปพลิชันเพื่อรวบรวมข้อมูลส่วนบุคคลของผู้ใช้งานครับ>"
2001306-53 = "<ข้อเท็จจริงนี้ถูกเปิดเผยโดยแฮ็กเกอร์นิรนามที่นำโค้ดนั้นมาเผยแพร่บนโลกออนไลน์ครับ ด้วยเหตุนี้#nราคาหุ้นของบริษัทที่คุณ A ดำเนินการอยู่จึงลดลงอย่างมากและตกอยู่ในวิกฤตการล้มละลายครับ>"
2001306-54 = "<ตอนนี้คุณ A ยังคงปฏิเสธข้อกล่าวหา แต่ดูเหมือนจะไม่ใช่เรื่องง่ายที่จะเปลี่ยนความคิดเห็นของ#nประชาชนที่กำลังเป็นไปในด้านลบครับ...>"
2001306-58 = "[ns] \"...\""
2001306-59 = "..."
2001306-60 = "[s3] \"...จิฮิโระ?\"\n[s4] \"นั่นเธอเป็นคนทำเหรอ?\""
2001306-63 = "มะ...ไม่ใช่แบบนั้นสักหน่อย เมื่อวานนี้แค่ตรวจสอบเซิร์ฟเวอร์ภายใต้ 'ระบบตรวจสอบขั้นสูง' แค่นั้นก็เหนื่อยจะแย่อยู่แล้ว"
2001306-64 = "ในคิโวทอสน่าจะมีแฮ็กเกอร์มากความสามารถที่เปี่ยมไปด้วยความยุติธรรมอยู่อีกเยอะน่ะ"
2001306-65 = "ใครสักคนนั่นละที่ไม่ใช่ฉัน..."
2001306-69 = "[ns] \"...\""
2001306-70 = "ขอโทษนะ... ฝีมือฉันเองแหละ"
2001306-71 = "ฉันไม่อยากเมินเฉยต่ออาชญากรรม ถึงจะอยากเลี่ยงที่จะทำให้เวอริทัสสูญเสียความน่าเชื่อถือ... แต่มันน่าโมโหมากๆ เลยคิดออกแค่วิธีนี้"
2001306-72 = "ปกติแล้วฉันจะบ่นสมาชิกเสมอให้รักษาจริยธรรมของแฮ็กเกอร์ แต่กลับใช้ความรู้สึกส่วนตัว และเปิดเผยข้อมูลของบริษัทที่รับผิดชอบแบบนี้..."
2001306-73 = "ฉันไม่มีคุณสมบัติของแฮ็กเกอร์เลย..."
2001306-74 = "คุณครู...ผิดหวังรึเปล่า"
2001306-75 = "[s] \"...ครั้งหน้าจะทำให้ถูกต้องใช่มั้ย?\""
2001306-79 = "[ns] \"ก็จิฮิโระเป็นรองหัวหน้าของเวอริทัสนี่นา\""
2001306-81 = "ผู้ใหญ่นี่จริงๆ เลยนะ..."
2001306-82 = "ลูกไม้หล่นไม่ไกลต้นอย่างนั้นเหรอ... สุดท้ายแล้วฉันก็เป็นส่วนหนึ่งของ ‘เวอริทัส’ นี่นะ"
2001306-83 = "ถึงท้ายที่สุดมันจะออกมาล้มเหลวก็เถอะ... ต่อไปคงต้องพยายามให้มากขึ้น ไม่ให้รุ่นน้องต้อง#nอับอายละนะ"
2001306-87 = "ถ้างั้น... ช่วยเก็บเรื่องนี้เป็นความลับจากพวกสมาชิกให้ทีนะ"

2001306-42 = "4;치히로;01;보안담당자가 클라이언트의 허가 없이 멋대로 서버를 뜯어 데이터를 얻어내는 건 똑같은 위법 행위니까. 경찰에 신고를 해도 증거로 채택되지는 못할 거야.\n#4;m3"
2001306-43 = "4;치히로;99;게다가 아무리 정의로운 행동이었다지만, 베리타스의 보안전문가가 멋대로 회사의 정보를 유출했다는 소문이 퍼져버린다면……"
2001306-44 = "4;치히로;06;우리를 믿고 일감을 맡기는 회사도 크게 줄어들겠지.\n#4;em;[땀]"

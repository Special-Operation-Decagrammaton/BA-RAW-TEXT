2001306-20 = "1;치히로;02;뭐 어쩔 수 없지. 손님을 상대하다 보면 별의별 사람이 다 있으니까.\n#1;em;[반응]\n#1;m3"
2001306-21 = "1;치히로;99;게다가 '베리타스'라는 이름을 들으면 이유 없이 사나워지는 사람도 있거든."
2001306-22 = "1;치히로;01;……그 점에 대해서는 우리도 저지른 업보가 있으니 어쩔 수 없으려나.\n#1;em;[땀]\n#1;stiff"

[translation]
2001306-1 = "Black & White"
2001306-2 = "（為了協助千尋的保安系統業務，一起拜訪了某間開發公司）"
2001306-3 = "您好，我是「貝里塔斯」的各務千尋。"
2001306-4 = "前來進行伺服器維護。"
2001306-5 = "終於來了啊，動作真慢……！？"
2001306-6 = "確實是約好晚上10點進行維護的……？"
2001306-7 = "雖然是這樣沒錯，不過我可是等你等到這個時候哦？"
2001306-8 = "一般來說這種時候應該要為了顧客而早點到才對吧？"
2001306-9 = "……失禮了。"
2001306-10 = "所以才說這種來歷不明的駭客集團……"
2001306-11 = "實力姑且不論，連一點商業禮儀都不懂，真是讓人困擾。"
2001306-12 = "啊啊，這次維護的要點已經整理好寫在那邊的文件上了，那就交給你了。"
2001306-13 = "以防萬一先告訴你，我們公司的機房可是搭載了最新的監視系統。"
2001306-14 = "系統會即時的傳送Log給我，只要你有任何一點可疑的舉動，警告就會馬上響起的。可別搞什麼小把戲啊。"
2001306-15 = "那是當然，我們這就開始進行作業。"
2001306-19 = "[ns] 「……還好嗎？」"
2001306-20 = "沒事的，他這麼失禮也不是現在才開始的。做生意的話總是會遇到各式各樣的人。"
2001306-21 = "也有一聽見「貝里塔斯」的名字就突然轉變態度的人。"
2001306-22 = "……不過這一點也不能說跟我們之前的所作所為無關就是了。"
2001306-23 = "總之趕快工作吧，夜晚也不長了。"
2001306-26 = "設定方面沒有問題……"
2001306-27 = "接下來就把備份用的檔案複製起來……"
2001306-28 = "……這是什麼？"
2001306-29 = "[s] 「怎麼了嗎？」"
2001306-30 = "看起來像是資料庫之類的，裡面有非常大量的數據……"
2001306-31 = "這是……下載過App的顧客的個人資料？怎麼做到的……"
2001306-32 = "這裡還有沒有被記載在帳簿上的可疑交易紀錄……"
2001306-33 = "唔嗯……稍微失禮一下。"
2001306-37 = "……果然沒錯。他們在發布的App中混入了一些可疑的東西，藉此收集顧客的情報。"
2001306-38 = "把這些情報賣給保險公司藉此賺錢啊……真是淺顯易懂的手法。"
2001306-39 = "[s1] 「那不是犯罪嗎……？」\n[s2] 「……向警察通報吧。」"
2001306-40 = "雖然是犯罪沒錯……不過是否要通報還要考慮另一個問題。"
2001306-41 = "雖然是犯罪沒錯……不過是否要通報還要考慮另一個問題。"
2001306-42 = "保安系統的負責人未經顧客許可擅自進入伺服器獲取數據……這也是違法行為。就算告訴警察，這些數據也無法作為證據被受理。"
2001306-43 = "況且要是傳出貝里塔斯洩漏顧客情報的傳聞的話，也會造成孩子們的困擾。"
2001306-44 = "就算能理解這是「出於正義感的行動」，願意相信我們、把工作交給我們的公司也會大大減少的。"
2001306-45 = "[s] 「這樣的話……」"
2001306-46 = "真傷腦筋。"
2001306-47 = "真是，傷腦筋啊……"
2001306-48 = "……"
2001306-51 = "（隔天早上……）"
2001306-52 = "「新聞快報。有名的App開發公司的A社長被證實在自家公司的App程式碼中偷偷植入後門程式，藉此收集用戶的個人資料。」"
2001306-53 = "「這個事實，是從匿名的駭客在網路上公布的程式碼為開端而被曝光。A社長公司的股價因此暴跌，目前已面臨破產的危機。」"
2001306-54 = "「A社長雖然仍堅持否認此一事實，然而證據已十分明確，要推翻負面的輿論可說是難如登天──」"
2001306-58 = "[ns] 「……」"
2001306-59 = "……"
2001306-60 = "[s3] 「……千尋？」\n[s4] 「難道……」"
2001306-63 = "你，你指的是什麼呢？我昨天只不過是在「最先進的監視系統」之下努力地進行伺服器的維護而已。"
2001306-64 = "肯定是在奇普托斯地某個地方有個出於正義感而行動的優秀駭客吧。"
2001306-65 = "大概……"
2001306-69 = "[ns] 「……」"
2001306-70 = "……抱歉，是我做的。"
2001306-71 = "我不想對犯罪視而不見，也想要避免損傷貝里塔斯的信用。不過卻怎麼也放不下……所以只能想出這種手段。"
2001306-72 = "本來不該用這種不正當的手段，應該要為自己的行為負責任的才對……或許我不配當駭客呢。"
2001306-73 = "明明平常總是對那些孩子嘮叨駭客倫理什麼的，輪到自己的時候卻還是選擇了這種像孩子一樣的做法……"
2001306-74 = "……老師，讓你幻滅了嗎？還是生氣了？"
2001306-75 = "[s] 「……不。你下次會好好解決的對吧？」"
2001306-79 = "[ns] 「畢竟千尋是貝里塔斯的副部長嘛。」"
2001306-81 = "……大人真狡猾呢。"
2001306-82 = "嘛，確實……我也是貝里塔斯的一員呢。"
2001306-83 = "從結果上來說，感覺像是失敗了……我還得更努力才行，為了成為那些孩子們的驕傲。"
2001306-87 = "……所以這件事，要對那些孩子們保密哦？"

[translation]
2001306-1 = "Black and White"
2001306-2 = "I accompanied Chihiro to a start-up company in the business district to help her with her security consulting work."
2001306-3 = "Good evening. I'm Kagami Chihiro of Veritas."
2001306-4 = "I understand you're in need of server maintenance."
2001306-5 = "You're late! Do you know what time it is?!"
2001306-6 = "I beg your pardon? The maintenance was scheduled for 10PM."
2001306-7 = "I couldn't care less what the schedule says! I'm a busy man!#nWhy do I have to deal with you at this hour?!"
2001306-8 = "You should have arrived early for MY convenience!"
2001306-9 = "My apologies... I'll try to remember that next time to avoid any inconvenience."
2001306-10 = "Hmph. This is why I don't want to do business with a group of hackers."
2001306-11 = "I can't speak for your abilities, but I can see your business etiquette is lacking."
2001306-12 = "Everything you need to know is in these documents on my desk."
2001306-13 = "Just make sure you don't screw this up. Our server room is equipped with a state of the art monitoring system that sends logs in real time."
2001306-14 = "We'll be alerted if anything out of the ordinary is detected, so don't even think of tampering with our server."
2001306-15 = "I wouldn't dream of it. I'll be getting to work now."
2001306-19 = "[ns] \"Are you okay?\""
2001306-20 = "I'm fine. Some clients are like this."
2001306-21 = "Veritas' name elicits a certain kind of reaction out of some people."
2001306-22 = "There isn't much we can do to stop people from jumping to conclusions based on our reputation."
2001306-23 = "Anyway, let's forget about that and get to work. The night is short."
2001306-26 = "There are no issues with their settings."
2001306-27 = "All I need to do is copy the backup data."
2001306-28 = "Hmm? What's this data?"
2001306-29 = "[s] \"Is something wrong?\""
2001306-30 = "Not necessarily. It's just that I came across a lot of unexpected data in the database."
2001306-31 = "This looks like the personal information of customers who installed the company's app. How did they collect this?"
2001306-32 = "That's not all. There are suspicious transaction records that weren't recorded in the ledger."
2001306-33 = "I'm going to look into this a little closer."
2001306-37 = "Now I get it. Their app installs a back door to collect info."
2001306-38 = "They've been selling the collected info to an insurance company.#nIt's a common trick."
2001306-39 = "[s1] \"Is that legal?\"\n[s2] \"Should we report them?\""
2001306-40 = "It's illegal, but reporting something like this can be complicated."
2001306-41 = "It's illegal, but reporting something like this can be complicated."
2001306-42 = "I'm also breaking the law by uncovering the data without the client's permission. It can't be submitted as evidence to be used by the police because of that."
2001306-43 = "And Veritas would lose a lot of trust and clients if it was discovered we intentionally leaked secure client data..."
2001306-44 = "...even if we had a justified reason for doing so."
2001306-45 = "[s] \"That seems unfair.\""
2001306-46 = "Yes, I know."
2001306-47 = "It's a sticky situation to find ourselves in."
2001306-48 = "..."
2001306-51 = "The next morning."
2001306-52 = "Breaking news. A well-known app developer has allegedly been collecting the personal information of users without their consent."
2001306-53 = "This was revealed when an anonymous hacker released the app's source code online, subsequently causing the stock price of the company to crash.#nThe company is facing possible bankruptcy."
2001306-54 = "President A of the company has denied the allegation, but that has not stopped public opinion from turning against the developer."
2001306-58 = "[ns] \"...\""
2001306-59 = "..."
2001306-60 = "[s3] \"Chihiro?\"\n[s4] \"Did you do this?\""
2001306-63 = "N-No. What makes you think that? It was difficult enough to sweep the server because of that \"state of the art\" monitoring system their president was bragging about."
2001306-64 = "Perhaps a skilled hacker in Kivotos was the one responsible."
2001306-65 = "Someone other than me..."
2001306-69 = "[ns] \"...\""
2001306-70 = "Okay, fine. It was me."
2001306-71 = "I couldn't condone what they were doing, but didn't want to damage Veritas' credibility either. I couldn't just let it go, so I...took matters into my own hands later."
2001306-72 = "I do my best to teach the others about hacking ethics, so if they knew I let my personal feelings get in the way and cause me to hack one of my clients..."
2001306-73 = "...I'd be too ashamed to face them."
2001306-74 = "Are you disappointed in me, Sensei?"
2001306-75 = "[s] \"You won't do it again, right?\""
2001306-79 = "[ns] \"You're supposed to be the vice president of Veritas.\""
2001306-81 = "Adults can be so harsh."
2001306-82 = "You're right. Veritas is part of who I am."
2001306-83 = "What I did represents our club, whether I try to divorce my actions from it or not. I'll have to work hard to make it up to my underclassmen. "
2001306-87 = "Still, I would appreciate it if we could keep this our little secret."

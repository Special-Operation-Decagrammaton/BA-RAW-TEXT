[translation]
2001306-1 = "#title;블랙 앤 화이트"
2001306-2 = "#na;(치히로의 보안 컨설팅 업무를 돕기 위해 함께 업무 지구의 한 개발 업체를 찾았다.)"
2001306-3 = "5;수상한 사장;00\n1;치히로;01;안녕하세요. <베리타스>의 카가미 치히로입니다.\n#1;a\n#1;em;[반응]\n#5;a"
2001306-4 = "1;치히로;01;서버 점검 대행 업무로 부르셨죠?"
2001306-5 = "5;수상한 사장;00;……늦었잖아! 지금 시간이 몇 시인 줄 알아?!\n#5;em;[빠직]\n#5;stiff"
2001306-6 = "1;치히로;02;네? 하지만 점검은 분명 오후 10시에 시작한다고 들었습니다만……\n#1;em;[?]"
2001306-7 = "5;수상한 사장;00;작업이 오후 10시에 시작한다고 해서, 이 바쁜 몸이 늦은 시간까지 너희를 상대해야 한다는 게 말이나 돼?\n#5;hophop"
2001306-8 = "5;수상한 사장;00;고객이 불편하지 않도록 미리 사무실에 와서 기다리고 있었어야지!"
2001306-9 = "1;치히로;99;……실례했습니다. 다음번에는 불편하시지 않도록, 꼭 참고하겠습니다.\n#1;em;…"
2001306-10 = "5;수상한 사장;00;흥, 이래서 근본도 알 수 없는 해커 집단에게 일을 맡기기 싫은 거라니까.\n#5;em;[속상함]\n#5;stiff"
2001306-11 = "5;수상한 사장;00;실력은 어떨지 몰라도 비즈니스 매너라고는 조금도 찾아볼 수가 없으니……."
2001306-12 = "5;수상한 사장;00;확인해야 할 내역은 책상 위의 서류에 모두 정리되어 있으니까 알아서 확인해.\n#5;em;[반응]"
2001306-13 = "5;수상한 사장;00;혹시라도 허튼수작을 부릴까 하는 소린데…… 우리 회사의 서버실에는 실시간으로 로그를 발송하는 최첨단 감시 시스템이 설치되어 있거든?"
2001306-14 = "5;수상한 사장;00;조금이라도 수상한 낌새가 보이면 바로 경고가 울릴 테니, 너희가 자주 치는 그 허튼 장난은 시도조차 하지 마.\n#5;hophop"
2001306-15 = "1;치히로;03;물론입니다. 그럼 바로 작업 시작하겠습니다.\n#1;em;[반짝]\n#1;greeting"

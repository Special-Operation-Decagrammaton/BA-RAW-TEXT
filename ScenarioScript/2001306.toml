2001306-37 = "4;치히로;03;……아하, 그렇군. 배포 중인 어플에 백도어를 심어서 몰래 정보를 수집한 거네.\n#4;em;[반응]"
2001306-38 = "4;치히로;05;그리고 이렇게 수집한 정보를 보험사에 팔아서 검은돈을 뒤로 챙겼군. 뻔한 수법이야."
2001306-39 = "[s1] \"그건 범죄 아냐?\"\n[s2] \"그럼 빨리 경찰에 신고해야지!\""
2001306-40 = "4;치히로;06;범죄는 맞긴 하지만…… 이걸 신고하는 건 또 다른 문제야.\n#4;em;…"

[translation]
42180-1 = "第18話;菁英與菁英"
42180-4 = "這群沒用的傢伙……！#n提供你們這些無業又無家可歸的人吃住的恩情，難道都忘了嗎！？"
42180-6 = "恩情？#n強行帶走我們，逼迫我們工作的不就是你們嗎！"
42180-7 = "經過這次的事之後，我已經下定決心了。#n之後永遠不要工作──"
42180-8 = "──要永遠與世界的所有抗爭！"
42180-9 = "放馬過來吧，這群慾望纏身的醜陋餓鬼！"
42180-10 = "你們這種人怎麼可能是我笛卡爾大人的對手！"
42180-12 = "這個忘恩負義的叛徒……在跟誰講道理啊！！"
42180-23 = "唔，唔唔……"
42180-24 = "同，同志啊……救救我……！"
42180-28 = "嗚啊！好痛好痛！"
42180-29 = "果然要跟凱薩的正規兵戰鬥還是太勉強了啦……！"
42180-30 = "快，快逃啊……！"
42180-35 = "這群膽小鬼！！#n不准逃啊！"
42180-37 = "多虧「所確幸」的大家，我們才能免於人數的劣勢……#n果然在突破力上還是不足呢。"
42180-38 = "在凱薩保全的支援隨時會抵達的情況下，不趕快突破的話可能會反被敵人包圍……"
42180-39 = "雖然危險，也只能由我出馬了……"
42180-44 = "咦？那個人是……"
42180-51 = "……這裡到底在吵些什麼？"
42180-52 = "請好好解釋一下吧──凱薩保全。"
42180-53 = "公安局長！#n你來得正好，快想辦法解決這些傢伙！"
42180-54 = "處理這些社會適應不良之人不是你們的工作嗎？"
42180-59 = "噫……是，是當時的「狂犬」……？"
42180-74 = "你，你這是在做什麼……！？"
42180-75 = "女武神警察學園的公安局長，竟然敢對擁有防衛室權限的我們開槍！"
42180-77 = "……公安局長？"
42180-78 = "你們應該也知道吧……公安局目前由於受到處分處於停止狀態。"
42180-79 = "所以呢？你的意思是說你只是單純想找我們麻煩而已嗎？"
42180-80 = "這裡的治安維護是我們的工作。#n女武神的麻雀們快滾吧！"
42180-81 = "不，除了公安局之外，D.U.還有另一個能管理治安的組織啊。"
42180-82 = "──女武神警察學園職務規章第32條第1項。#n「生活安全局」的學生可以暫時拘捕妨礙地鐵及大眾交通系統運作的市民。"
42180-89 = "……我打算協助[ruby=後輩]生活安全局[/ruby]的工作，就當作是社會貢獻的一環吧。"
42180-95 = "我們是生活安全局！所有人立即放下武器趴下！"
42180-100 = "一群蠢蛋……寄生社會的垃圾是那些人才對！"
42180-101 = "我們可是按照規定執行正當的公務啊！"
42180-103 = "就算是凱薩保全也沒有例外！"
42180-104 = "你們在車站前製造騷動是事實，乖乖跟我回署裡去吧！"
42180-105 = "不願就範的話，要用武力壓制也行哦？#n……在事情節外生枝之前，勸你們最好乖乖跟我們走唷～"
42180-107 = "……生活安全局？#n要壓制我們……？"
42180-108 = "呵呵……哈哈哈！"
42180-109 = "有，有什麼好笑的！？"
42180-110 = "當然好笑！生活安全局要用武力壓制我們？"
42180-111 = "雖然現在換了個名字活動，#n不過我們可是由凱薩PMC之中最優秀的SOF出身的隊員組成的菁英集團。"
42180-112 = "反觀你們就算在女武神警察學園裡也是由武裝最差的烏合之眾組成的生活安全局。#n就憑你們也想當我們的對手……別做白日夢了！"
42180-113 = "就算有再優秀的指揮官，雜魚也永遠不可能贏過菁英。"
42180-115 = "菁英與非菁英之間可是有一條永遠無法跨越的鴻溝啊！"
42180-117 = "烏合之眾……？#n你們似乎有什麼誤會啊──"
42180-118 = "生活安全局可是只有女武神警察學園最優秀的菁英才能加入的組織。"
42180-119 = "……就連曾為公安局局長的我，也曾經在申請加入生活安全局時被刷掉呢。"
42180-121 = "什麼？那是什麼意思……"
42180-122 = "吶，你知道嗎～？"
42180-123 = "距離上次兔寶寶站的修繕工程已經過了10年以上……#n所以支撐招牌的支架劣化相當嚴重。"
42180-124 = "擔心招牌會被強風吹垮的聲音，最近這幾個月一～直傳進生活安全局裡。"
42180-125 = "所以為了安全起見，本來打算這個月底就要更換新招牌的──"
42180-126 = "那又怎樣，你到底想說什麼？"
42180-127 = "……聽人家把話說完嘛。"
42180-128 = "算了，簡單來說……就是只要一點小小的衝擊就可能讓招牌掉下來，的意思。"
42180-133 = "這傢伙，該不會──"
42180-135 = "記得也要注意頭頂哦～"
42180-145 = "這群可惡的麻雀，我不會放過你們的！"
42180-147 = "桐乃，煙霧彈！"
42180-148 = "包在我身上！"
42180-153 = "該死，視野被……"
42180-154 = "堵住入口！#n別讓他們有機會進入車站！"
42180-159 = "雖然嘴巴上說是為了市民……看來相當不想讓人接近車站呢。"
42180-160 = "……不過你們挑錯地點了。#n對時常在此進行巡邏的生活安全局來說，車站就像主場一樣啊。"
42180-164 = "桐乃、吹雪。"
42180-165 = "麻煩你們和其他的學生一起取締「奧客」。"
42180-166 = "我會留在入口，避免不良乘客繼續增加。"
42180-168 = "是！"
42180-169 = "環奈局長～你會遵守約定，買MasterDonut的限定法蘭奇甜甜圈給我對吧？"
42180-171 = "啊啊，我沒有忘記。之後一定會買給你的。"
42180-172 = "……還有，SRT。"
42180-173 = "接下來就拜託你了。"
42180-174 = "……環奈局長，再次違背命令的話你會──"
42180-175 = "──這點你不必擔心。"
42180-176 = "和先前說過的一樣──我會自己做出決定並為其負責。"
42180-177 = "只要是為了貫徹我心中的正義──無論下場如何都無所謂。"
42180-178 = "局長……"
42180-183 = "那麼老師，這群笨蛋就拜託你了。"
42180-184 = "[s]「交給我吧！」"
42180-185 = "好了，接下來──"
42180-191 = "──我「狂犬」的名號，你們多少也聽過吧？"

[translation]
42180-1 = "Episode 18; Elite vs. Elite"
42180-4 = "Ungrateful lot... We sheltered you, clothed you, fed you, and this is the thanks we get?!"
42180-6 = "You're the ones who forced uniforms on folks not seeking employment!"
42180-7 = "All this ordeal taught me is that I never want to work again!"
42180-8 = "That I will fight all forms of material possession!"
42180-9 = "Have at you, villains!"
42180-10 = "You thin twig, you're no match for Descartes!"
42180-12 = "Traitor...! Who you calling twig?!"
42180-23 = "Ugh..."
42180-24 = "S-Someone... Help!"
42180-28 = "Ow! This really hurts!"
42180-29 = "Fighting Kaiser Corp's elite forces is brutal!"
42180-30 = "Retreat...!"
42180-35 = "Get back here, you wimps!"
42180-37 = "We're not outnumbered anymore thanks to the Pursuers, but breaking through is still another story."
42180-38 = "It's only a matter of time before Kaiser sends reinforcements. If we don't break through before then, we'll be surrounded."
42180-39 = "It's dangerous, so let me lead the way and..."
42180-44 = "Oh? That's a familiar face."
42180-51 = "This is a public facility meant for civilian use. What's all this chaos?"
42180-52 = "Someone give me an update, now! Kaiser?"
42180-53 = "Oh, thank goodness! Please do something about this, Director!"
42180-54 = "Maintaining order is your job right? Maintain it, please!"
42180-59 = "I-Is that... the Feral Hound...from last time?"
42180-74 = "What are you doing?!"
42180-75 = "Do you know what it means for the Public Peace Bureau director to open fire on us? Our authority was granted to us directly from the Acting President!"
42180-77 = "Director? Who? Of what?"
42180-78 = "I'm on leave right now, actually. Disciplinary action. I don't have much to lose, don'tcha think?"
42180-79 = "So, you're just out causing trouble? You have no authority here?"
42180-80 = "The security of this area is our purview, so you Valkyrie punks can run along now."
42180-81 = "You're mistaken. Another group has jurisdiction over D.U.'s security too."
42180-82 = "Valkyrie Police School administrative regulations article 32 paragraph 1. Students of the Public Safety Bureau have the authority to make arrests of individuals who interfere with public transportation services."
42180-89 = "...I thought I'd help out my juniors at the Public Safety Bureau during my disciplinary community service period."
42180-95 = "This is the Public Safety Bureau! Drop your weapons and get on the ground!"
42180-100 = "Who do you think you're pointing your gun at?!"
42180-101 = "We're just following protocol! According to the regulations!"
42180-103 = "And Kaiser Security has to follow those regulations, just like the rest of us."
42180-104 = "Due to the public disturbances around this train station, we will detain you at Valkyrie Police School."
42180-105 = "If you resist, we have the authority to bring you in by force. But let's just save all of us the extra work."
42180-107 = "...The Public Safety Bureau...is...arresting us...?"
42180-108 = "Oh, this is rich... Hahahaha!"
42180-109 = "Th-This is no laughing matter!"
42180-110 = "How is it not? What's the Public Safety Bureau gonna do? Throw a donut at us?"
42180-111 = "We might be under a different name now, but we're SOF, PMC's elite. The best of the best in Kaiser."
42180-112 = "The little rookies from Valkyrie's Public Safety Bureau armed with little pea shooters are gonna bring us in? Hah!"
42180-113 = "It doesn't matter how good a commander or whatever you think you are."
42180-115 = "No amount of positive thinking is going to bridge the gap between us and a bunch of rookies."
42180-117 = "Rookies...? There seems to be a misunderstanding here."
42180-118 = "The Public Safety Bureau is Valkyrie's most sought-after department to be accepted into."
42180-119 = "I even tried joining once. Got turned down."
42180-121 = "Wh-What? How could the director..."
42180-122 = "I have another fun fact."
42180-123 = "It's been over a decade since Kousagi Station was last serviced, so the supports under the station's sign are more rust than metal now."
42180-124 = "The Public Safety Bureau got a good handful of concerned calls about it, saying they were worried the sign was just going to fly off every time the wind blows."
42180-125 = "So, we've planned to replace it end of this month for safety's sake."
42180-126 = "Enough with your rambling!"
42180-127 = "An impatient one, aren't you?"
42180-128 = "I'll cut to the chase then. I bet even our little pea shooters could make that sign fall right now."
42180-133 = "Wait, you wouldn't!"
42180-135 = "Duck and cover!"
42180-145 = "You brats! I won't take this lying down!"
42180-147 = "Kirino, smoke grenade!"
42180-148 = "Please cover your nose and mouth!"
42180-153 = "Augh! I can't see!"
42180-154 = "Block the entrance! Don't let them take cover in the smoke and slip through!"
42180-159 = "The first sign of trouble, and they go running straight to protect the station. It didn't take long for them to drop their pretenses. There's definitely something down there."
42180-160 = "What a miscalculation on their part. A subway station as well-trafficked as this one? This is the Public Safety Bureau's home turf."
42180-164 = "Kirino, Fubuki."
42180-165 = "Work with the other Public Safety Bureau members to apprehend those causing the chaos."
42180-166 = "I'll cover the entrance, so we don't have anymore uninvited guests."
42180-168 = "Yes, ma'am!"
42180-169 = "But don't forget that you owe me a limited edition cruller from Master Donuts for this!"
42180-171 = "If you pull this off, I'll get you a whole dozen."
42180-172 = "There you go, SRT."
42180-173 = "I'm entrusting the clean-up to you two."
42180-174 = "Director Kanna, if you disobey direct orders again..."
42180-175 = "It's nothing to worry yourself over."
42180-176 = "Didn't I already tell you this? I have to take the responsibility of my decisions on my own two shoulders."
42180-177 = "If it's for what I believe in, something like this is child's play."
42180-178 = "Director..."
42180-183 = "Sensei, take care of these idiots."
42180-184 = "[s] \"Leave it to me!\""
42180-185 = "Now, then..."
42180-191 = "It's a bit unfortunate, but it seems everyone knows the name Feral Hound at this point. I didn't ask them to start calling me that, you know. Let me enlighten you on how I earned the name."

[translation]
42180-1 = "ตอนที่ 18;คนฉลาดกับหัวกะทิ"
42180-4 = "เจ้าพวกขอทานพวกนี้จากที่เคยไม่มีที่อยู่อาศัย จนมาได้อาหารกับเสื้อผ้าจากเราไป แต่กลับไม่สำนึก#nบุญคุณ และจะหักหลังกันอย่างนั้นเหรอ?!"
42180-6 = "หักหลังอะไรกันครับ? พวกคุณเองไม่ใช่เหรอครับที่ลากตัวพวกเราและบังคับตัวคนที่ไม่อยากทำงาน#nตั้งแต่แรกให้มาทำงานให้น่ะ!"
42180-7 = "พอเจอเรื่องนี้มา ผมตัดสินใจได้แล้ว ว่าต่อไปผมก็จะไม่ทำงานอีกไปตลอดชีวิต..."
42180-8 = "... และจะสู้กับการเป็นเจ้าของทุกสิ่งบนโลก!"
42180-9 = "เจ้าพวกคนร้ายกาจ! แน่จริงก็เข้ามาเลย!"
42180-10 = "คนสมองทึบอย่างพวกแกไม่มีวันเอาชนะท่านเดการ์ตได้หรอก!"
42180-12 = "คนทรยศอกตัญญู... มาว่าใครเป็นคนสมองทึบกันหา!!"
42180-23 = "อึกก..."
42180-24 = "พะ... พวกพ้อง... ช่วยด้วย...!"
42180-28 = "อ๊ะ! เจ็บชะมัดเลย!"
42180-29 = "เราสู้กับทหารของไคเซอร์ คอร์เปอเรชั่นที่ผ่านการฝึกมาแล้วไม่ได้แน่ๆ แบบนี้มันเกินกำลัง...!"
42180-30 = "นะ... หนีเร็ว...!"
42180-35 = "คนขี้ขลาดพวกนี้นี่... รีบกลับมาเดี๋ยวนี้นะ!"
42180-37 = "... ต้องขอบคุณ <ความสุขเล็กๆ> ทุกคนที่ช่วยไว้เลยนะคะ เราก็เลยไม่เป็นรองกว่าเรื่องจำนวนคน แต่เราก็ยังด้อยกว่าเรื่องการบุกอยู่ดีค่ะ"
42180-38 = "แถมเราก็ยังไม่รู้ว่าไคเซอร์ ซิเคียวริตี้จะมีกำลังเสริมเข้ามาสมทบอีกเมื่อไร ถ้าเราไม่รีบบุกเข้าไปก็อาจ#nจะถูกล้อมกลับได้ค่ะ..."
42180-39 = "ถึงจะต้องเสี่ยง แต่ตอนนี้ฉันคงไม่มีทางเลือกอื่นนอกจากออกไปจู่โจมด้วยตัวเองค่ะ"
42180-44 = "เอ๋? คนคนนั้น..."
42180-51 = "... ที่นี่คืออาคารที่ชาวเมืองใช้สัญจรกันนะ พวกเธอมาก่อจลาจลอะไรกันข้างหน้านี้?"
42180-52 = "ฉันต้องฟังคำอธิบายเรื่องนี้หน่อยแล้วค่ะ ไคเซอร์ ซิเคียวริตี้"
42180-53 = "อ๊ะ หัวหน้ากรมฯ! มาได้จังหวะพอดีเลย มาจัดการพวกคนไร้สมองพวกนี้ที!"
42180-54 = "งานของพวกเธอคือการจัดการคนที่ปรับตัวเข้ากับสังคมไม่ได้นี่?"
42180-59 = "เฮือก... 'หมาบ้า' ที่เคยเจอคราวนั้นเหรอ...?"
42180-74 = "ทำบ้าอะไรเนี่ย...?!"
42180-75 = "พวกเราได้รับอำนาจของหัวหน้าสำนักป้องเชียวนะ หัวหน้ากรมฯ จากสถาบันฝึกตำรวจวัลคิรี่กล้ายิงปืน#nใส่พวกเรางั้นเหรอ?!"
42180-77 = "... หัวหน้ากรมฯ เหรอ?"
42180-78 = "พวกนายก็น่าจะรู้ดีอยู่แล้วนี่ ว่าตอนนี้กรมความมั่นคงสาธารณะถูกระงับการทำงานอยู่เพราะว่าถูก#nลงโทษตักเตือน"
42180-79 = "อะไรกัน แสดงว่าไม่มีอำนาจอะไรเลยแต่ก็มาหาเรื่องกันงั้นเหรอ?"
42180-80 = "หน้าที่ดูแลรักษาความปลอดภัยที่นี่เป็นของฉัน พวกนกกระจอกวัลคิรี่น่ะออกไปเลยนะ!"
42180-81 = "เปล่าเลย ใน D.U. ไม่ใช่ว่ามันจะต้องมีแค่กรมความมั่นคงสาธารณะเท่านั้นหรอกนะที่จัดการเรื่องความ#nปลอดภัยได้"
42180-82 = "กฎระเบียบการปฏิบัติงานของสถาบันฝึกตำรวจวัลคิรี่ มาตรา 32 วรรค 1 นักเรียนจาก 'สำนักรักษาความ#nปลอดภัย' ของสถาบันฝึกตำรวจวัลคิรี่สามารถจับกุมชาวเมืองที่ขัดขวางการใช้งานรถไฟใต้ดินและการ#nขนส่งสาธารณะได้ชั่วคราว"
42180-89 = "... ฉันก็เลยว่าจะมาช่วยรุ่นน้องสำนักรักษาความปลอดภัยสักหน่อยน่ะ มันก็ยังถือว่าเป็นส่วนหนึ่งของ#nงานบริการสังคมอยู่"
42180-95 = "นี่คือสำนักรักษาความปลอดภัย! ทุกคนทิ้งอาวุธและหมอบลงซะ!"
42180-100 = "เจ้าพวกโง่เอ๊ย... พวกขยะที่กัดแทะสังคมอยู่ทางโน้นต่างหาก!"
42180-101 = "พวกฉันกำลังปฏิบัติหน้าที่อย่างชอบธรรมตามกฎระเบียบนะ!"
42180-103 = "ต่อให้เป็นไคเซอร์ ซิเคียวริตี้ ก็ไม่มีข้อยกเว้นค่ะ!"
42180-104 = "เราไม่ควรมาสร้างเรื่องวุ่นวายหน้าสถานี ตามพวกฉันมาที่สถานีตำรวจอย่างเงียบๆ เถอะค่ะ!"
42180-105 = "ถ้าไม่ยอมให้ความร่วมมือ เราอาจต้องใช้กำลังจัดการนะ... รีบตามมาอย่างว่าง่าย ก่อนที่จะเกิดเรื่อง#nยุ่งยากเถอะ"
42180-107 = "... สำนักรักษาความปลอดภัยเหรอ? เป็นแค่สำนักรักษาความปลอดภัย แต่กล้ามาจับพวกฉันเหรอ...?"
42180-108 = "หึหึหึ... ฮ่าฮ่าฮ่าฮ่า!"
42180-109 = "ทะ... ทำไมถึงหัวเราะอย่างนั้นล่ะคะ?"
42180-110 = "ก็จะไม่ให้หัวเราะได้ไงล่ะ สำนักรักษาความปลอดภัยจะใช้กำลังจับตัวพวกเรางั้นเรอะ?"
42180-111 = "ถึงตอนนี้จะทำงานในชื่อใหม่อยู่ แต่ไคเซอร์ PMC ของเรามีแต่สมาชิก SOF ที่ฉลาดและยอดเยี่ยมที่สุด#nเท่านั้น"
42180-112 = "แต่สถาบันฝึกตำรวจวัลคิรี่ก็ยังกล้าดีเอาพวกติดอาวุธแต่ไร้สมองจากสำนักรักษาความปลอดภัยมาเล่น#nงานเรา แบบนี้จะไม่ให้ขำยังไงไหว!"
42180-113 = "ต่อให้มีผู้บัญชาการที่มีความสามารถมากแค่ไหน แต่ก็สั่งการให้คนไร้สมองมาต่อกรกับคนฉลาดทางนี้#nไม่ได้หรอก"
42180-115 = "ระหว่างคนฉลาดกับคนไร้สมองน่ะ มันมีเส้นขนานที่กั้นกันไว้อยู่ยังไงล่ะ"
42180-117 = "คนไร้สมองงั้นเหรอ...? สงสัยว่าจะเข้าใจอะไรผิดไปนะ"
42180-118 = "สำนักรักษาความปลอดภัยคือองค์กรพิเศษที่มีแต่สุดยอดคนเก่งระดับหัวกะทิของสถาบันฝึกตำรวจ#nวัลคิรี่"
42180-119 = "... หัวหน้ากรมความมั่นคงสาธารณะอย่างฉันเคยสมัครเข้าสำนักรักษาความปลอดภัย เห็นอย่างนี้#nแต่ฉันก็ไม่ผ่านนะ"
42180-121 = "ว่าไงนะ? หมายความว่ายังไง..."
42180-122 = "อ้อ แล้วรู้เรื่องนั้นไหมล่ะ?"
42180-123 = "การก่อสร้างซ่อมแซมสถานีโคะอุซางิแล้วเสร็จมาเกิน 10 ปีแล้ว ป่านนี้ฐานตรงป้ายสถานีคงสึกกร่อน#nหมดแล้ว"
42180-124 = "สำนักรักษาความปลอดภัยได้รับการร้องเรียนจากชาวเมืองไม่หยุดเลยละว่าพอลมพัดแรงๆ แล้วป้ายมัน#nจะสั่น"
42180-125 = "เราก็เลยตั้งใจว่าจะเปลี่ยนป้ายใหม่ตอนสิ้นเดือน เพื่อเหตุผลทางด้านความปลอดภัย..."
42180-126 = "พวกเธอพูดเรื่องอะไรอีกเนี่ย?"
42180-127 = "...ไม่มีความอดทนเอาซะเลยนะ"
42180-128 = "ถ้าให้สรุปก็คือ... แค่ยิงเบาๆ ป้ายที่อยู่บนหัวก็อาจจะหล่นลงมาได้น่ะ"
42180-133 = "นี่พวกแก อย่าบอกนะว่า..."
42180-135 = "ระวังหัวด้วยล่ะ!"
42180-145 = "นกกระจอกพวกนี้ ฉันละเบื่อหน่ายเต็มที! ไม่ยอมปล่อยไว้เฉยๆ แน่!"
42180-147 = "คิริโนะ ปาระเบิดควัน!"
42180-148 = "วางใจฉันได้เลยค่ะ!"
42180-153 = "บ้าจริง มองไม่เห็นเลย..."
42180-154 = "ปิดทางเข้าไว้! อย่าให้เจ้าพวกนั้นใช้โอกาสจากระเบิดควันเข้าไปในสถานีได้!"
42180-159 = "พวกดีแต่เปลือกแล้วมาอ้างว่าจะทำเพื่อชาวเมือง พอเกิดปัญหาขึ้นมาก็รีบวิ่งเข้าไปในอาคารสถานี#nรถไฟทันทีเลย คงจะซ่อนอะไรที่ยอดเยี่ยมมากๆ เอาไว้ข้างในสินะ"
42180-160 = "... เลือกสถานที่ผิดแล้วละ อาคารสถานีรถไฟที่ชาวเมืองใช้กันทุกวันน่ะ มันไม่ได้ต่างไปจากสนามเจ้า#nบ้านของสำนักรักษาความปลอดภัยหรอกนะ"
42180-164 = "คิริโนะ ฟุบุกิ"
42180-165 = "ฉันมอบหมายให้เธอกับนักเรียนสำนักรักษาความปลอดภัยคนอื่นไปควบคุม 'ผู้โดยสารนิสัยไม่ดี' ที่มาปั่นป่วนอาคารสถานีรถไฟ"
42180-166 = "ส่วนฉันจะไปคุมทางเข้า จะได้ไม่มีแขกที่ไม่ได้เชิญเพิ่มมาอีก"
42180-168 = "รับทราบค่ะ!"
42180-169 = "แต่ต้องซื้อโดนัทครูเลอร์สุดลิมิเต็ดจากมาสเตอร์โดนัทให้ตามสัญญานะ?"
42180-171 = "ก็แค่โดนัทเอง ฉันซื้อให้ได้ไม่อั้นอยู่แล้ว"
42180-172 = "... แล้วก็ SRT"
42180-173 = "ฝากจัดการต่อจากนี้ด้วยล่ะ"
42180-174 = "... หัวหน้ากรมฯ คันนะ ถ้าครั้งนี้คุณฝ่าฝืนคำสั่งอีกครั้ง คุณจะ..."
42180-175 = "เธอไม่ต้องกังวลไปหรอก"
42180-176 = "ฉันเคยบอกไปก่อนหน้านี้แล้วไม่ใช่เหรอ ว่าเราต้องรับผิดชอบและตัดสินใจด้วยตัวเอง"
42180-177 = "ถ้าเป็นการทำเพื่อความยุติธรรมที่ฉันเชื่อมั่นละก็ ให้ตัดสินใจเรื่องที่ยิ่งใหญ่กว่านี้ฉันก็ทำได้"
42180-178 = "หัวหน้ากรมฯ ..."
42180-183 = "เอาละ คุณครูคะ ฝากจัดการคนสมองทึบพวกนี้ด้วยค่ะ"
42180-184 = "[s] \"วางใจครูได้เลย!\""
42180-185 = "เอาละ ถ้างั้น"
42180-191 = "ทุกคนน่าจะเคยได้ยินชื่อ 'หมาบ้า' กันมาแล้วละนะ"

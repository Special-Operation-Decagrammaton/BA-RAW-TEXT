[translation]
42180-1 = "第18話;エリートとエリート"
42180-4 = "この！ろくでなし共が……！#n職も家もないお前らに、食事と寝床を与えてやった恩を忘れたのか！？"
42180-6 = "恩？そもそも我々を強制連行し、無理矢理働かせたのはあなた達じゃないですか！"
42180-7 = "私は今回のことをきっかけに決意しました。#nこれからも永遠に働かないことを――"
42180-8 = "――世の中のすべての所有に立ち向かっていくことを！"
42180-9 = "来るがいい、欲に塗れた薄汚い餓鬼の群れめ！"
42180-10 = "お前みたいな輩は、このデカルト様の相手ではない！"
42180-12 = "この恩知らずの裏切り者が……誰に物を言っている！！"
42180-23 = "く、くうっ……"
42180-24 = "ど、同志よ……助けてください……！"
42180-28 = "うあっ！痛い痛い！"
42180-29 = "やっぱカイザーの正規兵相手は無理があるよ……！"
42180-30 = "に、逃げろ……！"
42180-35 = "この弱虫！！逃げるんじゃあない！"
42180-37 = "「所確幸」の皆さんのおかげで数的劣勢は免れましたが……#nやはり突破力が足りないですね。"
42180-38 = "カイザーセキュリティの応援がいつ来るかもわからない状況ですから、急いで突破しないと逆に包囲される可能性もあります……"
42180-39 = "危険を承知の上で、私が出るしか……"
42180-44 = "あれ？あの人は……"
42180-51 = "……これは一体何の騒ぎだ？"
42180-52 = "説明してもらおうか――カイザーセキュリティ。"
42180-53 = "公安局長！ちょうど良いところに。#nこいつらをどうにかしてくれ！"
42180-54 = "こういう社会不適合者を処理するのが君たちの仕事だろう？"
42180-59 = "ひっ……あ、あの時の「狂犬」……？"
42180-74 = "い、一体何を……！？"
42180-75 = "ヴァルキューレ警察学校の公安局長が、防衛室長の権限を持つ我々を撃つなんて！"
42180-77 = "……公安局長？"
42180-78 = "貴様らも知っているはずだが……公安局は懲戒のため、現在停止中だ。"
42180-79 = "じゃあ、一体何をしに来たんだ。#n何の権限もないくせに……まさかケンカでも売りに来たのか？"
42180-80 = "ここの治安業務は我々の担当だ。#nヴァルキューレはさっさと消えろ！"
42180-81 = "まぁ、別に公安局じゃなくてもD.U.で治安管理ができる組織は残っているがな。"
42180-82 = "――ヴァルキューレ警察学校執務規則第32条1項。「生活安全局」の生徒は、地下鉄および公共交通利用を妨害する市民を一時拘束できる。"
42180-89 = "……社会奉仕の一環として、生[ruby=後輩]活安全[/ruby]局の仕事でも手伝おうと思ってね。"
42180-95 = "生活安全局だ！武器を捨ててその場に伏せろ！"
42180-100 = "バカめ……社会に寄生するゴミはあっちだ！"
42180-101 = "我々は規定に従って正当な公務を遂行してるんだよ！"
42180-103 = "カイザーセキュリティであろうと、例外はありません！"
42180-104 = "駅前で騒いだのですから、おとなしく署までご同行願います！"
42180-105 = "もし応じないつもりなら、武力制圧もできるよ？#n……面倒なことになる前に、素直について来てね～。"
42180-107 = "……生活安全局が？お前らが、我々を制圧……？"
42180-108 = "ククッ……ハハハ！"
42180-109 = "な、何がおかしいんですか！？"
42180-110 = "可笑しいだろう？生活安全局が我々を武力制圧？"
42180-111 = "今は名を変えて活動しているが、我々はカイザーPMCの中で最も優秀なSOF出身の隊員で構成されたエリート集団だ。"
42180-112 = "対するお前らは、ヴァルキューレ警察学校の中で最も貧相な武装の寄せ集めである生活安全局。だというのに、我々の相手になるだなんて……夢のまた夢だな！"
42180-113 = "いくら有能な指揮官がいたところで、雑魚がエリートに勝てるはずがないのだからな。"
42180-115 = "エリートと非エリートの間には、越えられない壁があるのを思い知らされるだけだ。大人しくやめておけ。"
42180-117 = "寄せ集め……？#n貴様らは何か勘違いしているようだが――"
42180-118 = "生活安全局は、ヴァルキューレ警察学校の最優秀エリートだけが入れる特殊な組織だ。"
42180-119 = "……公安局の局長である私でさえ、生活安全局を志願して落ちたことがあるほどにな。"
42180-121 = "何？それは一体……"
42180-122 = "ねえ、知ってる～？"
42180-123 = "子ウサギ駅は補修工事から10年以上経っちゃってるからさ……#n看板を支える支柱が、結構劣化してるんだ。"
42180-124 = "風の強い日は看板が揺れて心配だ～っていう声が、ここ数ヶ月間ず～っとうちにきてるんだよねぇ。"
42180-125 = "だから、安全上の理由で今月末に交換することになったんだけど――"
42180-126 = "それで、一体何が言いたいんだ？"
42180-127 = "……話は最後まで聞いて欲しかったなぁ。"
42180-128 = "ま、つまり……軽い衝撃で看板が落ちちゃうかも、って話。"
42180-133 = "こいつ、まさか――"
42180-135 = "頭の上も注意しなよ～"
42180-145 = "サツ共め、人が大人しくしてれば調子に乗りやがって……#n容赦しないぞ！"
42180-147 = "キリノ、煙幕弾！"
42180-148 = "お任せください！"
42180-153 = "くそっ、視界が……"
42180-154 = "入り口を塞げ！奴らが駅に入れないようにするんだ！"
42180-159 = "市民のためだなんだと言っていたが……駅によほど近づいて欲しくないらしい。"
42180-160 = "……だが、逃げ込む場所を間違えたな。日常的にパトロールをしている生活安全局にとって、駅はホームグラウンドのようなものだ。"
42180-164 = "キリノ、フブキ。"
42180-165 = "他の生徒と共に、「不良乗客」の取り締まりを頼む。"
42180-166 = "私はここで、これ以上不審者が増えないよう入口を見ていよう。"
42180-168 = "はい！"
42180-169 = "カンナ局長～#nマスタードーナッツの限定クルーラー、約束通り買ってくれるんだよね？"
42180-171 = "ああ、忘れてなどいない。後で必ず届けよう。"
42180-172 = "……そして、SRT。"
42180-173 = "あとは任せた。"
42180-174 = "……ですが、ここで命令に背いたらあなたは――"
42180-175 = "――貴官が気にする必要はない。"
42180-176 = "前にも言った通り――責任と決定は、自ら下すものだからな。"
42180-177 = "私が信じる正義を貫くためであれば――どうなろうが構わないさ。"
42180-178 = "局長……"
42180-183 = "それでは、先生。#nこのバカ共をよろしくお願いします。"
42180-184 = "[s] \"うん、ありがとうカンナ。任せて。\""
42180-185 = "さて、と――"
42180-191 = "――「狂犬」の名を、一度は聞いたことがあるだろう？"

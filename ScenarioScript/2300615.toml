[translation]
2300615-1 = "ชุดชงชาโบราณ"
2300615-2 = "(คุณครูมาที่ร้านเฮียกคิยาโคในช่วงกลางวัน)"
2300615-7 = "[ns] \"นี่มัน... คนเยอะเกินไปมั้ยเนี่ย...?\""
2300615-9 = "อ๊ะ คุณครู... ไม่สิ นายท่าน! มาแล้วเหรอคะ!"
2300615-10 = "ตอนนี้เป็นช่วงที่ลูกค้าเข้าเยอะมากค่ะ...! โดยเฉพาะวันนี้..."
2300615-11 = "[s] \"อีเวนต์ประสบความสำเร็จสุดๆ เลยนี่!!\""
2300615-12 = "กะ... ก่อนอื่นฉันจะพาไปนั่งที่โต๊ะนะคะ! ทางนี้ค่ะ..."
2300615-17 = "(โชคดีที่มีที่ว่าง คุณครูจึงได้ที่นั่ง)"
2300615-18 = "ถ้างั้นจะสั่งเครื่องดื่มเลยมั้ยคะ?"
2300615-19 = "เมนูที่ขายดีที่สุดในตอนนี้คือเมนูที่ทำจากเปลือกแอปเปิลเกรดพิเศษโดยเอามาทำเป็น..."
2300615-20 = "[s] \"เอาอันนั้นแหละ!\""
2300615-21 = "ยังฟังไม่จบเลย?!"
2300615-22 = "ตะ... ตัดสินใจเร็วเกินไปรึเปล่าคะ?"
2300615-23 = "[s1] \"ก็ชิซุโกะยุ่งมากเลยนี่นา\"\n[s2] \"ถ้าเป็นชาที่ชิซุโกะเสิร์ฟให้ ครูคิดว่าอร่อยอยู่แล้วละ\""
2300615-26 = "ฮะ... ฮึ่ม~! พูดเอาใจกันแบบนี้อีกแล้ว..."
2300615-27 = "ไหนๆ คุณครูก็พูดแบบนั้นแล้ว ฉันจะบริการให้เต็มที่เลย!"
2300615-28 = "[s] \"ได้ผลสินะ...!\""
2300615-29 = "งั้นรอสักครู่นะคะ~!!"
2300615-34 = "เอาละ มาเตรียมการบริการที่น่าประทับใจ..."
2300615-35 = "ทะ... ท่านประธาน!"
2300615-36 = "บอกแล้วไงว่าไม่ใช่ประธาน แต่เป็นหัวหน้าต่างหาก! มีเรื่องอะไรล่ะ?"
2300615-37 = "หะ... หัวหน้า! ไม่มีชุดชงชาเหลือแล้วค่ะ...! วันนี้มีลูกค้ามาเยอะเกินไป..."
2300615-38 = "ว่าไงนะ?!"
2300615-39 = "ปกติแล้วลูกค้าก็จะสั่งเครื่องดื่มชนิดอื่นๆ กันพอสมควร แต่วันนี้ดูเหมือนชาแอปเปิลจะฮิตกันมากๆ..."
2300615-40 = "ทะ... ทำยังไงดีคะ? และถ้าจะเตรียมชาชุดใหม่อย่างน้อยก็ต้องใช้เวลาประมาณ 20 นาที..."
2300615-43 = "(อะ... อะไรกัน... ทำไมถึงมาเกิดเรื่องวันนี้เนี่ย...)"
2300615-44 = "(แต่จะไปขอให้คุณครูรอตั้ง 20 นาทีก็คงไม่ได้...)"
2300615-45 = "(เพราะร้านเฮียกคิยาโคเป็นร้านที่มอบบริการที่ดีที่สุดและน่าประทับใจที่สุดเสมอๆ...!!)"
2300615-46 = "(มีวิธีไหนบ้างนะ...)"
2300615-47 = "(จริงด้วย มีวิธีอยู่!!)"
2300615-50 = "ออเดอร์นี้ฉันจะจัดการเอง ฝากเรื่องออเดอร์เพิ่มของโต๊ะ 5 ด้วยนะ ฮานามิดังโงะ 2 ที่กับ#nขนมโมนากะแอปเปิล 1 ที่!"
2300615-51 = "ค่ะ... ได้ค่ะ!!"
2300615-53 = "(ครู่ต่อมา...)"
2300615-54 = "ชะ... ชาแอปเปิลกับขนมโยกังที่สั่งได้แล้วค่ะ!"
2300615-55 = "[s] \"เร็วเวอร์! ดูน่ากินมากเลย!\""
2300615-56 = "งั้น... ขอให้เพลิดเพลินกับเมนูต้นตำรับของร้านเฮียกคิยาโคนะคะ! ฮิฮิ"
2300615-60 = "[ns] \"เอ่อ แต่ว่า...\""
2300615-62 = "(คุณครูรู้สึกว่ามีบางอย่างต่างออกไปเล็กน้อย จึงก้มไปดูใกล้ๆ)"
2300615-63 = "[ns3] \"นี่ไม่ใช่ชุดชงชาที่ร้านเฮียกคิยาโคใช้นี่นา\"\n[ns4] \"ดูเก่านิดหน่อยแต่ก็ดูแลรักษาได้ดีเลยนะ\""
2300615-66 = "(ทั้งชาและขนมโยกังที่มาเสิร์ฟรสชาติดีทั้งคู่)"
2300615-68 = "ฮู่ว ตอนนี้ลูกค้าเริ่มบางตาลงแล้วนะ"
2300615-69 = "ทุกคนเก็บกวาดร้านแล้วก็พักสักหน่อยเถอะ"
2300615-70 = "ค่ะ หัวหน้า!!"
2300615-74 = "นายท่าน... คุณครู!! สนุกรึเปล่าคะ?"
2300615-75 = "ฮู่ว ปกติก็ยุ่งอยู่แล้ว แต่วันนี้ยุ่งกว่าทุกวันเลยละค่ะ!"
2300615-76 = "เห็นฝีมืออันแพรวพราวของฉันรึยังคะ?"
2300615-77 = "[s] \"อ่า ตอนที่ก้าวพลาดแล้วกระโดดตีลังกาสองรอบติดนั่นสุดยอดเลยนะ\""
2300615-78 = "นะ... นั่นไม่ใช่การแสดงแต่เป็นสถานการณ์จริงต่างหากค่ะ! ถ้าไม่ใช่คาวาวะ ชิซุโกะ ไอดอลสาว และมาสคอตที่น่าภูมิใจของร้านเฮียกคิยาโคละก็ ทำแบบนั้นมันอันตรายมากนะคะ?!"
2300615-79 = "เอาเถอะค่ะ ตอนนี้งานก็เริ่มเบาลงแล้ว เลยมานั่งพักสักหน่อยน่ะค่ะ ฮิฮิ"
2300615-80 = "[s5] \"ทำได้ดีมากเลยนะ ชิซุโกะ ว่าแต่ชุดชงชานี่...\"\n[s6] \"ว่าแต่ว่าชุดชงชานี่น่ะ เป็นชุด VIP เหรอ?\""
2300615-86 = "อ๊ะ อ่า... คุณครูสังเกตเห็นก่อนสินะคะ..."
2300615-87 = "จริงๆ แล้ว เมื่อกี้มีปัญหาอยู่นิดหน่อยค่ะ..."
2300615-89 = "ดะ... เดิมทีมันก็ไม่ควรเป็นแบบนี้..."
2300615-90 = "ฉะ... ฉันผิดเองที่ไม่ได้คิดวิธีรับมือเหตุการณ์แบบนี้เอาไว้ล่วงหน้าค่ะ"
2300615-91 = "และผลก็คือ... ฉันเลยต้องใช้ชุดชงชาส่วนตัวมาเสิร์ฟชาให้คุณครูแทน..."
2300615-92 = "[s] \"แล้วมันทำไมเหรอ?\""
2300615-93 = "คะ... คือว่า... ชุดชงชาที่เสิร์ฟให้คุณครู..."
2300615-98 = "กะ... ก็อย่างที่เห็นละค่ะว่ามันไม่เข้ากับบรรยากาศงานแฟร์ของร้านเฮียกคิยาโค..."
2300615-99 = "งานแอปเปิลแฟร์สุดพิเศษที่เริ่มขึ้นตั้งแต่วันนี้จะเน้นโชว์เรื่องของความสดใหม่ พวกเราเลยเตรียมภาชนะและชุดชาต่างๆ ให้เข้ากับบรรยากาศน่ารักๆ แล้ว..."
2300615-100 = "เฮ้อ ร้านเฮียกคิยาโคควรจะเป็นผู้นำสมัยอยู่เสมอแท้ๆ"
2300615-101 = "ฉันอยากจะเสิร์ฟชาเร็วๆ ก็เลยเลือกทำแบบนั้นไป..."
2300615-102 = "เหตุการณ์ที่เกิดขึ้นในวันนี้ทำให้ฉันขาดคุณสมบัติของผู้ดูแลร้านเฮียกคิยาโค..."
2300615-103 = "[s7] \"ไม่หรอก ครูว่าเป็นการแก้ปัญหาเฉพาะหน้าได้ดีเลยนะ\"\n[s8] \"เพราะชิซุโกะทำแบบนั้นครูเลยได้กินของอร่อยๆ เร็วนะ\""
2300615-106 = "จริงๆ เลยนะคะ พูดแบบนี้อีกแล้ว..."
2300615-107 = "[s] \"ชุดชงชาอันนี้ดูเก่าพอสมควรเลยนะ\""
2300615-108 = "อ่า ค่ะ เพราะมันคือ..."
2300615-109 = "มันเป็นชุดชงชาชุดแรกที่ฉันซื้อมาค่ะ"
2300615-110 = "ฉันรู้จักพิธีชงชาครั้งแรกเมื่อตอนยังเด็กมากๆ แล้วก็ฝึกฝนมาเรื่อยๆ ค่ะ"
2300615-111 = "เคยชงผิดพลาดมาก็เยอะค่ะ ถ้านับใบชาที่ต้องทิ้งไปก็... อืม..."
2300615-112 = "[s] \"มันเป็นส่วนหนึ่งของประวัติศาสตร์ของชิซุโกะสินะ\""
2300615-113 = "ฮุฮุ ถ้าเรียกว่าประวัติศาสตร์ก็อาจเป็นประวัติศาสตร์ก็ได้ค่ะ "
2300615-114 = "ก็พอเวลาผ่านไป มันก็เริ่มล้าสมัย และพอการตกแต่งร้านเฮียกคิยาโคจะต้องเปลี่ยนไปเรื่อยๆ ตามเทรนด์..."
2300615-115 = "ชะ... ชุดชานี้มันก็เลย... ดูเชยน่ะค่ะ..."
2300615-116 = "อึก... พอคิดว่าเอาของแบบนี้มาใช้แล้ว..."
2300615-117 = "[s] \"ไม่หรอก\""
2300615-118 = "...?"
2300615-119 = "[s9] \"ครูไม่ค่อยรู้เรื่องรสชาติของชาเท่าไร แต่ครูชอบมันนะ\"\n[s10] \"ได้สัมผัสบรรยากาศที่ดูลึกซึ้งแบบนี้ ครูชอบนะ\""
2300615-122 = "คะ... คะ?"
2300615-123 = "[s11] \"ชุดชาชุดนี้เป็นเพื่อนเก่าแก่ของชิซุโกะนี่นา\"\n[s12] \"รู้สึกเหมือนได้ดื่มชาที่มีความทรงจำของชิซุโกะด้วยน่ะ\""
2300615-126 = "อึก?!"
2300615-131 = "[ns] \"ชะ... ชิซุโกะ? เป็นอะไรรึเปล่า?\""
2300615-132 = "ปะ... เปล่าค่ะ... เมื่อกี้นี้... แค่การแสดงออกเวลาโดนคำพูดกระแทกหัวใจ...!"
2300615-133 = "ฮุฮุ เมื่อกี้นี้ ถ้าไม่ใช่ชิซุโกะคนแกร่งหรือมาสคอตสาวของร้านเฮียกคิยาโคแล้วละก็คงเป็นลมล้มพับไป#nแล้วละค่ะ!"
2300615-134 = "ไม่สิ... ถึงที่จริงแล้วจะไม่ใช่แบบนั้น แต่มันก็..."
2300615-135 = "[s] \"หะ... หืม?\""
2300615-136 = "ตะ... แต่เอาเถอะค่ะ!"
2300615-137 = "ฉันแค่ถูกใจคำพูดของคุณครูมากๆ ก็เท่านั้นเองค่ะ!"
2300615-138 = "ถ้าคุณครูสัมผัสได้ถึงรสชาติแห่งความทรงจำละก็... ในฐานะผู้ดูแลร้านเฮียกคิยาโคแล้วนับว่าเป็นเรื่อง#nที่น่าภูมิใจมากค่ะ"
2300615-139 = "......"
2300615-140 = "คะ... คุณครู..."
2300615-146 = "ไหนๆ คุณครูก็ชอบพูดแบบนั้นอยู่บ่อยๆ แล้วถ้าคุณครูไม่ว่าอะไรละก็ ต่อไป..."
2300615-147 = "ฉันจะใช้ชุดชงชานี้ชงชาให้คุณครูอีก... ดีมั้ยคะ?"
2300615-148 = "[s] \"อื้อ แล้วครูจะรอนะ\""
2300615-149 = "ฮุฮุ... ค่ะ!"
2300615-150 = "ตอนนี้ชุดชงชาอันนี้... กลายเป็นของที่มีความทรงจำของฉันกับคุณครูแล้วนะคะ"

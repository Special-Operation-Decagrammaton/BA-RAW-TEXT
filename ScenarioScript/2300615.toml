[translation]
2300615-1 = "The Antique of Momoyodou!"
2300615-2 = "I headed over to Momoyodou around lunch time."
2300615-7 = "[ns] \"It's...packed?!\""
2300615-9 = "Sens—I mean, Master! You came!"
2300615-10 = "I'm sorry, you came during the rush! And today is especially rush-y!"
2300615-11 = "[s] \"What a successful event!\""
2300615-12 = "F-For now, let me take you to your seat! This way, please!"
2300615-17 = "Somehow, Shizuko found an empty table for me to sit at."
2300615-18 = "What can I get for you today?"
2300615-19 = "Our most popular item is our apple tea, made with premium-grade peels and—"
2300615-20 = "[s] \"That one!\""
2300615-21 = "I wasn't even done explaining!"
2300615-22 = "Y-You don't want to think about it?!"
2300615-23 = "[s1] \"Well, you're so busy right now.\"\n[s2] \"As long as you make it, I know it'll be good.\""
2300615-26 = "A-Ah! Such blatant flattery..."
2300615-27 = "Talk all you want, but I was going to give you a ton of complementary service anyway!"
2300615-28 = "[s] \"S-Special service...!\""
2300615-29 = "Yes! So please wait right there!"
2300615-34 = "Now, to serve everything up perfectly."
2300615-35 = "B-Boss!"
2300615-36 = "I told you, I'm the president! Not the boss! What is it?"
2300615-37 = "P-President! We have so many customers that we ran out of tea!"
2300615-38 = "What?!"
2300615-39 = "Normally people order different things than just the tea! But the new apple tea is so popular..."
2300615-40 = "Wh-What should we do? It'll take us twenty minutes to get additional tea sets and make more!"
2300615-43 = "(O-Oh no... To think something like this would happen today, of all days...)"
2300615-44 = "(I can't keep Sensei waiting for twenty whole minutes!)"
2300615-45 = "(We always provide the best, highest-effort service at Momoyodou!)"
2300615-46 = "(What do I do...?)"
2300615-47 = "(I've got it!)"
2300615-50 = "I'll take care of this order, so please handle the additional order from table 5. Two hanami dangos and one sticky apple monaka!"
2300615-51 = "Yes! On it!"
2300615-53 = "A little while later..."
2300615-54 = "Now, here's the premium apple tea you ordered and some bite-sized yokans!"
2300615-55 = "[s] \"Looks delicious! And what fast service!\""
2300615-56 = "Yup! Proudly made by Momoyodou! Heehee."
2300615-60 = "[ns] \"But, um...\""
2300615-62 = "The tea set she served me with looked a little different from their standard sets, so I took a closer look."
2300615-63 = "[ns3] \"This is different from Momoyodou's usual tea set.\"\n[ns4] \"It looks a bit worn, but it's obviously well-maintained.\""
2300615-66 = "The tea, as well as the complimentary yokan, was delicious."
2300615-68 = "Phew, there are less customers now."
2300615-69 = "Okay, everyone! Just finish cleaning up, and you can take a break!"
2300615-70 = "Yes, President!"
2300615-74 = "Mast—Sensei! Are you enjoying yourself?"
2300615-75 = "Phew! Today was even busier than usual!"
2300615-76 = "Did you see how awesome I was?"
2300615-77 = "[s] \"I liked your performance when you slipped and did a double somersault!\""
2300615-78 = "N-No! That was an actual accident! If it weren't for the incredible skills of Kawawa Shizuko, idol and representative of Momoyodou, it would've been a dangerous situation!"
2300615-79 = "Ahem! Anyways! Now that we've gotten through the rush, I'm here to take a break with you, Sensei!"
2300615-80 = "[s5] \"You did amazing, Shizuko!\"\n[s6] \"But...is this a special tea set?\""
2300615-86 = "Ah! You realized before I got to tell you."
2300615-87 = "There was a bit of a situation earlier..."
2300615-89 = "I normally would never let something like that happen!"
2300615-90 = "But it was my fault that I didn't prepare for every possible outcome!"
2300615-91 = "And, so, I ended up using my personal tea set to serve you."
2300615-92 = "[s] \"Why...?\""
2300615-93 = "B-Because...it was the only available set at the time, Sensei."
2300615-98 = "I-I know! It doesn't exactly fit the aesthetic of this event!"
2300615-99 = "The Apple Fair was meant to be all about freshness, so we were serving these super-cute tea sets and utensils! I served you with something completely off-theme..."
2300615-100 = "*sigh* Momoyodou should always be on the cutting edge of trends, but..."
2300615-101 = "Even if I made the choice to make sure you received your order as quickly as possible..."
2300615-102 = "...it's unacceptable. I should be ousted as the owner of Momoyodou."
2300615-103 = "[s7] \"No, it's the kind of decision befitting Momoyodou's owner.\"\n[s8] \"I didn't have to wait and got delicious tea and desserts, thanks to you.\""
2300615-106 = "...Thank you for your kind words."
2300615-107 = "[s] \"I will say, it looks pretty used.\""
2300615-108 = "Ah, yes. That's because..."
2300615-109 = "...that's the first tea set I ever purchased."
2300615-110 = "I started conducting tea ceremonies when I was really young. I practiced a whole ton."
2300615-111 = "I messed up so many times! Just thinking about all the tea leaves I wasted back then... Ugh..."
2300615-112 = "[s] \"It's a part of your history.\""
2300615-113 = "Heehee. History. I guess you could put it that way!"
2300615-114 = "But it fell out of fashion after a while. We always try to stay on top of the latest trends with Momoyodou's designs, you know?"
2300615-115 = "L-Looking at it now, it looks...tacky..."
2300615-116 = "I can't believe I used something like that for so long. I—"
2300615-117 = "[s] \"No!\""
2300615-118 = "...?"
2300615-119 = "[s9] \"I'm no tea expert.\"\n[s10] \"But I loved the deep flavor it had.\""
2300615-122 = "H-Huh?"
2300615-123 = "[s11] \"This tea set is like an old friend to you!\"\n[s12] \"It felt like I was taking a sip of your memories, Shizuko!\""
2300615-126 = "Gah?!"
2300615-131 = "[ns] \"Sh-Shizuko? Are you okay?!\""
2300615-132 = "N-No! That reaction was me having a heart attack!"
2300615-133 = "Heehee. Just now, if it wasn't for my Momoyodou idol training, that may have been fatal!"
2300615-134 = "...Or, actually, maybe it was...a little bit..."
2300615-135 = "[s] \"H-Huh?\""
2300615-136 = "A-Anyway!"
2300615-137 = "That was a good phrase, so I'll be taking it!"
2300615-138 = "As the owner of Momoyodou, I'll proudly boast that I can brew you the flavor of memories!"
2300615-139 = "..."
2300615-140 = "S-Sensei..."
2300615-146 = "Well, since you said you liked it, if you don't mind...one day..."
2300615-147 = "Can I make tea for you again, with this tea set?"
2300615-148 = "[s] \"I'll look forward to it.\""
2300615-149 = "Heehee... Yes!"
2300615-150 = "From now on, this tea set will hold both our memories."

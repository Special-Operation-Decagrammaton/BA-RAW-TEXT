[translation]
2300615-1 = "百夜堂的看板娘喜歡古董！"
2300615-2 = "（中午時分，前往了百夜堂）"
2300615-7 = "[ns]「這……人也太多了吧……？」"
2300615-9 = "啊，老師……不，主人！歡迎回來！"
2300615-10 = "現在剛好是尖峰時段……！#n尤其今天又……"
2300615-11 = "[s]「真是盛況空前耶！！」"
2300615-12 = "我，我先帶您入座吧！請跟我來……"
2300615-17 = "（所幸正好有位置才得以坐下）"
2300615-18 = "請問要點什麼呢？"
2300615-19 = "現在最受歡迎的餐點是使用了特級蘋果皮的……"
2300615-20 = "[s]「就點那個吧！」"
2300615-21 = "我都還沒講完耶！？"
2300615-22 = "會不會太快決定了？"
2300615-23 = "[s1]「畢竟你現在很忙。」\n[s2]「而且只要是靜子端上來的茶都好喝。」"
2300615-26 = "哼，哼嗯～！又說那種體貼的話……"
2300615-27 = "就算老師那麼說，我還是會提供很多免費招待的東西！"
2300615-28 = "[s]「免費招待……！」"
2300615-29 = "請老師稍等～！！"
2300615-34 = "好，那我要大顯身手準備招待……"
2300615-35 = "社，社長！"
2300615-36 = "不是社長是部長！#n怎麼了嗎？"
2300615-37 = "部，部長！因為客人太多的關係……現在茶具組已經不夠了……！"
2300615-38 = "什麼！？"
2300615-39 = "平時其他飲料也會有一定量的訂單，但今天推出的蘋果茶實在太受歡迎……"
2300615-40 = "該，該怎麼辦？#n現在開始準備的話，至少還要20分鐘……"
2300615-43 = "（糟，糟糕……沒想到偏偏在今天發生這種事……）"
2300615-44 = "（可是總不能要求老師等20分鐘……）"
2300615-45 = "（因為百夜堂永遠該提供最好、最棒的服務……！）"
2300615-46 = "（方法方法……）"
2300615-47 = "（我有！！）"
2300615-50 = "這單我來解決，麻煩你處理5號桌的加點單。#n花見糰子兩個、Q彈蘋果最中餅一個！"
2300615-51 = "是，是！！"
2300615-53 = "（過了一會……）"
2300615-54 = "來，這是您點的特上蘋果茶和一口羊羹！"
2300615-55 = "[s]「好快！看起來真好吃！」"
2300615-56 = "那麼，請盡情享用百夜堂的自信之作！嘿嘿。"
2300615-60 = "[ns]「咦，不過……」"
2300615-62 = "（總覺得有點奇怪，於是仔細觀察了一下）"
2300615-63 = "[ns3]「這不是百夜堂平常使用的茶具。」\n[ns4]「雖然有點老舊，不過維護得很好。」"
2300615-66 = "（茶和免費招待的羊羹都很美味）"
2300615-68 = "呼，客人總算比較少了。"
2300615-69 = "大家整理好之後就去休息吧。"
2300615-70 = "是，部長！！"
2300615-74 = "主人……老師！用餐還愉快嗎？"
2300615-75 = "呼，雖然平常也是一樣，但今天真的是忙翻天了！"
2300615-76 = "我滿場跑的活躍表現！你有看到嗎？"
2300615-77 = "[s]「啊，你踩空後翻了兩個筋斗安全落地的表演很精彩哦。」"
2300615-78 = "那，那不是表演，是真正的意外啦！#n如果不是百夜堂引以為傲的看板娘兼大家的偶像河和靜子，說不定就要出大事了！"
2300615-79 = "總之既然忙碌的時段已經結束，我打算稍微休息一下。嘿嘿。"
2300615-80 = "[s5]「辛苦你了，靜子。」\n[s6]「話說這組茶具是VIP專用的嗎？」"
2300615-86 = "啊，啊啊……我都還沒提到，老師就已經發現啦……"
2300615-87 = "其實剛才發生了這樣的事……"
2300615-89 = "本，本來是不能這麼做的……"
2300615-90 = "沒有事先想好對策是我的錯。"
2300615-91 = "結果……在招待老師的時候，不得不使用我個人的茶具……"
2300615-92 = "[s]「那有什麼問題嗎？」"
2300615-93 = "因，因為……提供給老師的茶具組……"
2300615-98 = "如老師所見，跟這次百夜堂舉辦的活動主題不太吻合……"
2300615-99 = "由於「清爽」是這次蘋果祭的核心概念，所以準備的茶具和餐具都走可愛路線……#n相較之下，那套茶具看起來就顯得格格不入……"
2300615-100 = "唉，百夜堂本該隨時走在流行的尖端才對……"
2300615-101 = "就算是為了趕緊提供餐點，但這樣的選擇……"
2300615-102 = "對身為百夜堂堂主的我而言……恐怕不及格吧……"
2300615-103 = "[s7]「不，靜子真不愧是百夜堂的堂主。隨機應變的模樣很帥氣哦。」\n[s8]「托你的福，我才能快速享用到美味的茶和甜點。」"
2300615-106 = "……真是的，又說這種話。"
2300615-107 = "[s]「這套茶具看起來略有年紀，有種古董的感覺呢。」"
2300615-108 = "啊，嗯。因為……"
2300615-109 = "那是我第一次湊齊的茶具組。"
2300615-110 = "我小時候用它入門茶道，做了非常多的練習……"
2300615-111 = "當然也經歷了失敗。#n光是當時扔掉的茶葉就……唔……"
2300615-112 = "[s]「原來當中蘊含著靜子的歷史啊。」"
2300615-113 = "呵呵，也可以那麼說啦。"
2300615-114 = "不過隨著時間過去，它也漸漸變得與時代脫節。#n而百夜堂的裝潢，則是一直緊跟著最新趨勢……"
2300615-115 = "結果就是讓這組茶具顯得有點俗氣……"
2300615-116 = "唔，一想到用了那種東西就更……"
2300615-117 = "[s]「別這麼說。」"
2300615-118 = "……？"
2300615-119 = "[s9]「我不是很懂茶的味道。」\n[s10]「但我覺得能感受到深沉的韻味反而更好。」"
2300615-122 = "呃，咦？"
2300615-123 = "[s11]「這組茶具是靜子的老朋友。」\n[s12]「讓我有種品嚐了靜子回憶的感覺。」"
2300615-126 = "咕！？"
2300615-131 = "[ns]「靜，靜子？你沒事吧？」"
2300615-132 = "我，我沒事……剛才那……是靜子受到心靈攻擊時的反應……！"
2300615-133 = "呵呵，假如不是經歷千錘百鍊的百夜堂看板娘靜子，恐怕已經被擊沉了！"
2300615-134 = "不，其實就算是也已經……"
2300615-135 = "[s]「唔，唔嗯？」"
2300615-136 = "總，總之！"
2300615-137 = "我很喜歡老師剛才的說法，所以就接受了！"
2300615-138 = "能被老師說是「蘊含回憶的味道」……#n身為百夜堂的堂主，這是很值得驕傲的事。"
2300615-139 = "……"
2300615-140 = "……老，老師。"
2300615-146 = "既然如此，如果不介意的話，以後我可以經常……"
2300615-147 = "用這組茶具……泡茶給你喝嗎？"
2300615-148 = "[s]「嗯，我很期待哦。」"
2300615-149 = "呵呵……是！"
2300615-150 = "今後這組茶具……將會充滿老師和我的回憶。"

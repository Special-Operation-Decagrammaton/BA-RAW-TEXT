[translation]
1000902-1 = "變得很美味的方法"
1000902-2 = "格黑娜學園．學生用第19操場"
1000902-3 = "（到達了和泉約定的地方）"
1000902-4 = "老師！這邊這邊──！"
1000902-5 = "[s1]「總之我來看看了……」\n[s2]「結果，是要做什麼來著？」"
1000902-10 = "這個這個。這本書啊，寫著如昨天所說的東西。"
1000902-11 = "[s3]「『對運動有效的飲食』……？」\n[s4]「真是直接的標題呢。」"
1000902-12 = "嗯。看了標題就覺得這只能讀了，買了之後發現比想像中的還要有趣，就像是著魔似的一口氣看完了。"
1000902-13 = "嗯。看了標題就覺得這只能讀了，買了之後發現比想像中的還要有趣，就像是著魔似的一口氣看完了。"
1000902-14 = "[s]「像是著魔似的……」"
1000902-15 = "重要的是這裡！"
1000902-16 = "那──個啊……"
1000902-17 = "「作為鐵人三項選手每天激烈運動的我，最喜歡吃了」"
1000902-18 = "「雖然世上有很多美味的東西，不過有著我認為最好吃的東西」"
1000902-19 = "「那就是目清的杯麵，豚骨味的」"
1000902-20 = "「每天慢跑20km、深蹲200下、反覆橫跳100次。做完這樣嚴酷的菜單後，回到家後再吃杯麵的味道……」"
1000902-21 = "「是不管什麼山珍海味都無法取代，幸福的味道……」"
1000902-22 = "……咻嚕。"
1000902-23 = "[s]「那個，泉。該不會……？」"
1000902-24 = "這個……"
1000902-25 = "就是這個老師！"
1000902-26 = "也就是只要照這裡寫著一樣，結束激烈運動之後吃杯麵的話……！"
1000902-27 = "那就會變成，最──美味的味道沒錯吧！"
1000902-28 = "[s]「但是那應該是……」"
1000902-29 = "所以我帶來了唷！來，豚骨味的杯麵。加上老師的份一共兩個！"
1000902-30 = "[s]「沒在聽人說話！不過準備得很好！」"
1000902-31 = "當然也沒有忘記配料唷。來，草莓果醬！"
1000902-32 = "[s]「像，像是泉會做出的選擇……！」"
1000902-33 = "沒有使用昂貴的食材，也不需要困難的調理法，竟然就可以嚐到至上的味道……"
1000902-34 = "已經沒辦法待著不動了！"
1000902-35 = "來，一起運動吧，老師！"
1000902-36 = "[s]「果然我也要嗎……」"
1000902-38 = "（然後和泉兩人，開始了地獄的特訓）"
1000902-45 = "一──！二──！三──！四──！"
1000902-46 = "來，老師也加油！"
1000902-47 = "[s]「好，好難受！！」"
1000902-49 = "下一個是，跳遠唷，老師！"
1000902-51 = "一──二……！"
1000902-52 = "呼……！"
1000902-57 = "FIGHT唷，老師！"
1000902-58 = "[s]「唔哦哦哦哦……！！！」"
1000902-61 = "（這之後也進行了全力衝刺、深蹲、馬拉松、仰臥起坐、柔軟運動等等……）"
1000902-62 = "（花了2小時以上，和泉一起如書上所寫的運動了）"
1000902-65 = "[ns]「哈啊……哈啊……」"
1000902-66 = "呼……結束了──！有成就感呢！"
1000902-67 = "老師，還好嗎？"
1000902-68 = "[s]「吸，吸……吐……」"
1000902-69 = "戳戳，戳戳。老師，還活著嗎～？"
1000902-70 = "[s]「終於……結束……了……？」"
1000902-73 = "（啪啪啪啪啪……）"
1000902-74 = "[s]「竟然連瓦斯爐都準備了，很徹底呢。」"
1000902-75 = "為了好吃的東西這點程度是當然的呀～"
1000902-77 = "（咻）"
1000902-78 = "那麼，把熱水注入……草莓果醬也放入……進行攪拌～……然後等3分鐘就好！"
1000902-80 = "（咻嚕嚕嚕嚕嚕……）"
1000902-83 = "嗯，好了吧。"
1000902-84 = "那老師，來吃吧！"
1000902-85 = "[s]「那麼，味道如何……」"
1000902-87 = "啊呣，咻嚕咻嚕咻嚕！嚼嚼……"
1000902-88 = "……！"
1000902-89 = "這，這是……！？"
1000902-90 = "[s5]「呃，泉！？」\n[s6]「有，有那麼好吃！？」"
1000902-91 = "……普通。"
1000902-92 = "……普通。"
1000902-93 = "[s]「……咦？」"
1000902-94 = "一如往常的味道……這是，平常的杯麵啊……！"
1000902-95 = "不對！雖然比平常還美味！但是，該怎麼說……"
1000902-96 = "味道沒有那麼戲劇化的有變化……！？"
1000902-97 = "[s]「那是，該說只是運動了而已還是怎麼說呢……」"
1000902-98 = "但是，明明書上這麼寫了……書是錯的？不對，應該不會有那種事，那樣的話……"
1000902-99 = "……能感覺到食物美味的運動是根據每個人而不同，之類的？"
1000902-100 = "[s]「……」"
1000902-101 = "這樣，有必要再好好調查……"
1000902-102 = "在美食研究的途中可不能放棄，作為美食研究會的一員！……可能有點不夠。再拿一個來吧。"
1000902-103 = "[s7]「是，是嗎……」\n[s8]「我，我會應援的哦……！」"
1000902-104 = "嗯！謝謝老師！"
1000902-105 = "嗯！謝謝老師！"
1000902-108 = "（肚子餓的話會感覺比平常還要美味是理所當然的，並不是味道會改變唷，最後還是沒辦法傳達）"

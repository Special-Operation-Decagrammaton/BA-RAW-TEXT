[translation]
1000902-1 = "Peak Enjoyment"
1000902-2 = "Gehenna Student Playing Field 19"
1000902-3 = "I went to the place where Izumi wanted to meet."
1000902-4 = "Sensei! Over here!"
1000902-5 = "[s1] \"I showed up like I promised, but...\"\n[s2] \"So, what are you experimenting with today?\""
1000902-10 = "Here, Sensei. This is the book I read yesterday. I found something truly amazing in it."
1000902-11 = "[s3] \"I Exercise, Therefore I Eat...?\"\n[s4] \"That is one straightforward title.\""
1000902-12 = "Yep, after seeing that title, I knew I had to read the whole thing. So I consumed the book like I was in a trance."
1000902-13 = "Yep, after seeing that title, I knew I had to read the whole thing. So I consumed the book like I was in a trance."
1000902-14 = "[s] \"Like you were in a trance, huh...\""
1000902-15 = "Let me read you the highlight of the book, Sensei!"
1000902-16 = "The book says..."
1000902-17 = "\"As a triathlete who does intensive exercise, I really like eating.\""
1000902-18 = "\"While there's a myriad of delicacies in this world, there is one that I place above everything else.\""
1000902-19 = "\"It's the tonkotsu cup ramen from Mitoshin.\""
1000902-20 = "\"The taste of tonkotsu cup ramen always hits the spot after I return home from my daily exercise: running twenty kilometers, doing two hundred squats, and performing a hundred cartwheels.\""
1000902-21 = "\"In a way, the flavor feels much richer than any other delicacy in the world...\""
1000902-22 = "(drools)"
1000902-23 = "[s] \"Hey, Izumi...?\""
1000902-24 = "This..."
1000902-25 = "This is it, Sensei! "
1000902-26 = "According to this book, the taste of tonkotsu cup ramen after doing the indicated workout must be..."
1000902-27 = "...a heavenly experience that no other food on earth can come close to!"
1000902-28 = "[s] \"I'm pretty sure the author was exaggerating...\""
1000902-29 = "I prepared some tonkotsu cup ramen to see for myself! I got two, so you could have one too, Sensei."
1000902-30 = "[s] \"I knew it! That's what you're experimenting with!\""
1000902-31 = "Don't worry, I didn't forget the strawberry jelly to top it off!"
1000902-32 = "[s] \"I'd expect nothing less from you, Izumi!\""
1000902-33 = "To think that there might be a method to make food taste delicious without having to use expensive ingredients or complicated recipes..."
1000902-34 = "We owe it to ourselves to try, Sensei!"
1000902-35 = "All right! Let's get exercising, Sensei!"
1000902-36 = "[s] \"U-Uhhh...!\""
1000902-38 = "And so began my hellish training with Izumi..."
1000902-45 = "One! Two! Three! Four!"
1000902-46 = "There, I did it! It's your turn next, Sensei!"
1000902-47 = "[s] \"Mm-hmm!\""
1000902-49 = "Next up is the long jump, Sensei!"
1000902-51 = "One, two...!"
1000902-52 = "...Hyah!"
1000902-57 = "Okay, Sensei, you're next!"
1000902-58 = "[s] \"Mm-hmmmmmm!\""
1000902-61 = "(Sprints, squats, a marathon, sit-ups, stretches with our backs touching...)"
1000902-62 = "(Over the course of two hours, Izumi and I did every one of the exercises listed in the book.)"
1000902-65 = "[ns] *pant* *pant*"
1000902-66 = "Whew! Hard work! Feels good!"
1000902-67 = "Hm? What's wrong, Sensei?"
1000902-68 = "[s] \"*pant* *pant* Whew...\""
1000902-69 = "(poke) Sensei?"
1000902-70 = "[s] \"That's the end...right?\""
1000902-73 = "(Bubble bubble)"
1000902-74 = "[s] \"Even the burners were ready. You're quite prepared.\""
1000902-75 = "Of course! It's for my test."
1000902-77 = "*click*"
1000902-78 = "Now, pour hot water into the Mitoshin ramen... Take some strawberry jam and mix it in... Three minutes! Just a little bit more!"
1000902-80 = "(Pours liquid)"
1000902-83 = "Come on, come on..."
1000902-84 = "Okay, Sensei, it's done!"
1000902-85 = "[s] \"Let's see...\""
1000902-87 = "*chomp* *nibble nibble* *munch munch*"
1000902-88 = "...!"
1000902-89 = "Hey! Eeesh!"
1000902-90 = "[s5] \"Izumi, are you all right?!\"\n[s6] \"Is it good? Izumi?!\""
1000902-91 = "...It's just average."
1000902-92 = "...It's just average."
1000902-93 = "[s] \"Average?\""
1000902-94 = "The taste is simply average, Sensei. It tastes just like an ordinary tonkotsu cup of ramen!"
1000902-95 = "I mean it's delicious! But not as much as I thought it'd be..."
1000902-96 = "I'm not trying to be dramatic, but..."
1000902-97 = "[s] \"Well, that was a pretty average exercise.\""
1000902-98 = "But it was in the book. Perhaps the book is wrong? No. Maybe it's because..."
1000902-99 = "...Each person has their own exercise routine that makes the food taste better?"
1000902-100 = "[s] \"...\""
1000902-101 = "We'll need to look into this, Sensei..."
1000902-102 = "As a member of the Gourmet Research Society, I'll never stop studying delicious foods! ...I'm not sure this is enough. Should I get more?"
1000902-103 = "[s7] \"Of course.\"\n[s8] \"You have my support, Izumi!\""
1000902-104 = "Yay!"
1000902-105 = "Yay!"
1000902-108 = "(I didn't have the heart to tell her it's common sense that food tastes better when you're hungry.)"

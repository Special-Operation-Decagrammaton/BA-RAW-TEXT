1000902-10 = "3;이즈미;00;자, 선생님. 내가 어제 봤다는 책이 이거야. 여기에 정말 놀라운 이야기가 적혀 있었어.\n#3;closeup"
1000902-11 = "[s3] \"<나는 운동한다. 그러기 위해 먹는다>……?\"\n[s4] \"엄청 직설적인 제목이네.\""
1000902-12 = "3;이즈미;01;응, 제목을 보고 이건 읽을 수밖에 없겠다고 생각해서, 나도 모르게 홀린 듯이 읽어봤는데 말이야.\n#3;greeting\n#3;em;[반짝]"
1000902-13 = "3;이즈미;01;응, 제목을 보고 이건 읽을 수밖에 없겠다고 생각해서, 나도 모르게 홀린 듯이 읽어봤는데 말이야.\n#3;greeting\n#3;em;[반짝]"

[translation]
1000902-1 = "วิธีกินอาหารให้อร่อยขึ้นกว่าเดิม"
1000902-2 = "สนามกีฬาเลขที่ 19 เกเฮนน่า"
1000902-3 = "(คุณครูได้มาถึงที่ที่อิซุมินัดเอาไว้)"
1000902-4 = "คุณครู! ทางนี้ๆ!"
1000902-5 = "[s1] \"ครูมาตามนัดแล้ว แต่ว่า...\"\n[s2] \"สรุปแล้ว วันนี้เราจะมาทดลองอะไร?\""
1000902-10 = "นี่เลย คุณครู ฉันอ่านหนังสือเล่มนี้ไปเมื่อวาน และได้เจออะไรบางอย่างที่น่าสนใจด้วย"
1000902-11 = "[s3] \"<ฉันออกกำลังกายเพื่อกิน>...?\"\n[s4] \"ชื่อหนังสือชัดเจนดีนะ\""
1000902-12 = "อื้ม พอเห็นชื่อหนังสือแล้ว ฉันก็อยากอ่านทั้งเล่มเลย หลังจากนั้นฉันก็อ่านมันจนแทบจะ#nเอาไปต้มกินเลยล่ะ"
1000902-13 = "อื้ม พอเห็นชื่อหนังสือแล้ว ฉันก็อยากอ่านทั้งเล่มเลย หลังจากนั้นฉันก็อ่านมันจนแทบจะ#nเอาไปต้มกินเลยล่ะ"
1000902-14 = "[s] \"แทบจะเอาไปต้มกินเลยงั้นเหรอ...\""
1000902-15 = "ให้ฉันอ่านเนื้อหาหลักของหนังสือให้คุณครูฟังนะ!"
1000902-16 = "ในหนังสือบอกว่า..."
1000902-17 = "\"สำหรับนักไตรกีฬาที่ออกกำลังกายอย่างหนักแล้ว ฉันเป็นคนที่ชื่นชอบการกินมาก\""
1000902-18 = "\"ในโลกนี้มีของอร่อยอยู่เป็นร้อยเป็นพัน แต่มีของอร่อยอย่างหนึ่งที่ฉันชอบมากที่สุด\""
1000902-19 = "\"มันคือราเม็งคัปของมิโตะชินรสทงคตสึ\""
1000902-20 = "\"เมื่อฉันกลับมาที่บ้านหลังจากที่ไปวิ่ง 200 กิโลเมตร สควอท 200 ครั้ง และตีลังกา#nท่าล้อเกวียนอีก 100 ครั้งทุกวัน รสชาติของราเม็งคัปรสทงคตสึก็ยิ่งอร่อยสุดๆ ไปเลย\""
1000902-21 = "\"ในโลกนี้ไม่มีรสชาติไหนที่จะอร่อยลุ่มลึกได้เท่านี้อีกแล้ว\""
1000902-22 = "(จ๊อก จ๊อก) ...."
1000902-23 = "[s] \"อิซุมิ...?\""
1000902-24 = "คือว่า..."
1000902-25 = "นี่แหละ คุณครู!"
1000902-26 = "ตามหนังสือนี้ รสชาติของราเม็งคัปรสทงคตสึหลังจากที่ออกกำลังกายมาแล้วมันจะต้อง..."
1000902-27 = "...อร่อยระดับสุดๆๆ ยอด ไม่มีอาหารไหนมาเทียบได้อีกแล้ว!"
1000902-28 = "[s] \"แต่ครูว่าคนเขียนน่าจะโม้ไปสักหน่อย...\""
1000902-29 = "ฉันเตรียมราเม็งคัปรสทงคตสึไว้ให้ลองแล้ว! มี 2 ถ้วยไว้ให้คุณครูด้วย จะได้มาลองด้วยกัน!"
1000902-30 = "[s] \"กะแล้ว! นี่คือสิ่งที่เธออยากลองนี่เอง!\""
1000902-31 = "และแน่นอนว่าฉันไม่ลืมเอาแยมสตรอว์เบอร์รีมาเป็นท็อปปิ้งด้วย!"
1000902-32 = "[s] \"สมกับเป็นเธอจริงๆ อิซุมิ!\""
1000902-33 = "มันต้องมีวิธีที่เราสามารถดื่มด่ำกับอาหารที่แสนอร่อยได้โดยไม่ต้องใช้วัตถุดิบราคาแพง#nหรือวิธีการปรุงที่ซับซ้อนอยู่..."
1000902-34 = "เราคงต้องลองทดสอบกันดูแล้วล่ะ คุณครู!"
1000902-35 = "เอาล่ะ! มาออกกำลังกายกันเลย คุณครู!"
1000902-36 = "[s] \"อะ.. อื้ม...!\""
1000902-38 = "(ด้วยเหตุนี้การฝึกคอร์สนรกกับอิซุมิจึงได้เริ่มต้นขึ้น)"
1000902-45 = "หนึ่ง! สอง! สาม! สี่!"
1000902-46 = "ฉันเสร็จแล้ว! ต่อไปตาคุณครูแล้ว!"
1000902-47 = "[s] \"ฮะ.. ฮึบ!\""
1000902-49 = "ต่อไปก็เป็นกระโดดไกล คุณครู!"
1000902-51 = "หนึ่ง สอง...!"
1000902-52 = "ย้ากกก...!"
1000902-57 = "โอเค ต่อไปก็ตาคุณครูแล้ว!"
1000902-58 = "[s] \"ฮะ.. ฮึบบบบบ!!\""
1000902-61 = "(วิ่งเร็ว สควอท วิ่งมาราธอน ซิทอัป ช่วยกันดันหลังยืดกล้ามเนื้อและอื่นๆ อีก...)"
1000902-62 = "(หลังจากที่ผ่านมา 2 ชั่วโมงแล้ว คุณครูได้ทำทุกท่าในหนังสือกับอิซุมิทั้งหมดแล้ว)"
1000902-65 = "[ns] \"แฮ่ก... แฮ่ก...\""
1000902-66 = "ฮู่ว! เสร็จสักที! รู้สึกดีจังเลย!"
1000902-67 = "หื้ม? คุณครูเป็นอะไรไปน่ะ?"
1000902-68 = "[s] \"แฮ่ก แฮ่ก ฮู่ว...\""
1000902-69 = "จิ้ม จิ้ม คุณครู~?"
1000902-70 = "[s] \"เสร็จแล้ว...ใช่ไหม?\""
1000902-73 = "(ปุด ปุด)"
1000902-74 = "[s] \"แม้แต่เตาก็พร้อมแล้ว เธอเตรียมตัวมาดีทีเดียวเลย\""
1000902-75 = "แน่นอน! เพื่อการทดลองของฉันยังไงล่ะ"
1000902-77 = "(คลิ๊ก)"
1000902-78 = "ตอนนี้ก็เทน้ำร้อนไปในถ้วยราเม็งมิโตะชิน... ใส่แยมสตรอว์เบอร์รีลงไปแล้วคนให้เข้ากัน...#nแล้วรออีก 3 นาที!"
1000902-80 = "(ใส่น้ำ)"
1000902-83 = "เร็วๆ สิ เร็วๆ..."
1000902-84 = "โอเคคุณครู เสร็จแล้วล่ะ!"
1000902-85 = "[s] \"ไหนดูซิรสชาติเป็นยังไง...\""
1000902-87 = "หงั่บ หงั่บ ง่ำ ง่ำ..."
1000902-88 = "...!"
1000902-89 = "อึบ! อึบบบ!!"
1000902-90 = "[s5] \"อิซุมิ เป็นอะไรไหม?!\"\n[s6] \"อร่อยขนาดนั้นเลยเหรอ?! อิซุมิ?!\""
1000902-91 = "...ก็แค่เฉยๆ"
1000902-92 = "...ก็แค่เฉยๆ"
1000902-93 = "[s] \"เฉยๆ?\""
1000902-94 = "รสชาติก็เฉยๆ คุณครู มันก็รสชาติเหมือนกับราเม็งคัปรสทงคตสึทั่วไปเลย!"
1000902-95 = "มันอร่อยนะ แต่มันไม่ได้อร่อยมากเหมือนกับที่ฉันคิดเอาไว้..."
1000902-96 = "รสชาติของมันไม่ได้เปลี่ยนไปแบบก้าวกระโดดเลย..."
1000902-97 = "[s] \"ก็นั่นเป็นการออกกำลังกายแบบทั่วไป...\""
1000902-98 = "แต่มันก็มาจากในหนังสือนะ หรือว่าหนังสือจะบอกผิด? ไม่สิ มันอาจจะเป็นเพราะ..."
1000902-99 = "...แต่ละคนอาจจะมีวิธีออกกำลังกายของตัวเองที่ทำให้อาหารอร่อยขึ้นงั้นเหรอ?"
1000902-100 = "[s] \"....\""
1000902-101 = "เราต้องลองดูใหม่ คุณครู..."
1000902-102 = "ในฐานะสมาชิกของชมรมชิมอาหาร ฉันจะไม่หยุดการศึกษาของอร่อยไว้แค่นี้!#n...ฉันไม่แน่ใจว่านี่จะพอหรือยัง ฉันควรจะเอามาเพิ่มอีกไหม?"
1000902-103 = "[s7] \"แน่นอน...\"\n[s8] \"ครูจะสนับสนุนเอง...! อิซุมิ!\""
1000902-104 = "เย้!"
1000902-105 = "เย้!"
1000902-108 = "(คุณครูไม่กล้าบอกเธอจริงๆ ว่ามันเป็นเรื่องปกติอยู่แล้วที่อาหารจะอร่อยขึ้นเมื่อเราหิว)"

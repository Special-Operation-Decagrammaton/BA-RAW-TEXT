1000902-15 = "3;이즈미;03;중요한 건 바로 책의 이 부분이야. 선생님!\n#3;em;[재잘]\n#3;hophop"
1000902-16 = "3;이즈미;99;책에서 쓰여 있기를……."
1000902-17 = "3;이즈미;00;'트라이애슬론 선수로서 매일 같이 격렬한 운동을 하는 나는 먹는 걸 정말 좋아했다.'\n#3;m2"
1000902-18 = "3;이즈미;01;'세상엔 수많은 맛있는 음식이 있다지만, 내가 제일로 치는 음식은 따로 있다.'\n#3;m3"
1000902-19 = "3;이즈미;09;'바로 밋신에서 출시한 컵라멘 돈코츠 맛이다.'\n#3;m4"
1000902-20 = "3;이즈미;01;'매일 같이 20km 달리기, 스쿼트 200회. 옆구르기 100회 등의 운동을 끝낸 뒤, 숙소로 돌아와 먹는 컵라멘 돈코츠 맛.'\n#3;m3"

[translation]
1001006-1 = "地鐵"
1001006-2 = "D.U.．地鐵車站"
1001006-5 = "啊，老師。"
1001006-6 = "[s] 「白子？在這裡做什麼呢？」"
1001006-8 = "啊啊，嗯。有私人的事……"
1001006-9 = "什麼樣的事？"
1001006-10 = "我正在擬定比往常還要長距離的騎行計畫。先來個輕鬆點的400km左右。"
1001006-11 = "所以跑了遠一點來確認路線。"
1001006-12 = "嗯？不會太長嗎？"
1001006-13 = "嗯……只要做好通宵的覺悟，就可以在24小時內完成。"
1001006-14 = "老師目前在回家路上嗎？"
1001006-15 = "嗯？有事要到阿拜多斯？"
1001006-16 = "啊啊，嗯，這樣啊……"
1001006-17 = "話說回來這是老師上班搭的地鐵呢。來到D.U.的時候我還想，說不定能見到你。"
1001006-18 = "……嗯，雖然不是有意的，不過遇到了呢。 "
1001006-19 = "……"
1001006-20 = "那個，這只是偶然。"
1001006-21 = "……"
1001006-22 = "[s] 「……那，既然都偶然遇到了，要一起回去嗎？」"
1001006-23 = "嗯……"
1001006-25 = "（和白子一起搭地鐵回到阿拜多斯中央車站了）"

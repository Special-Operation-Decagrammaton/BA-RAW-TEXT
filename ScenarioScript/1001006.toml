[translation]
1001006-1 = "The Subway"
1001006-2 = "D.U. Subway Station"
1001006-5 = "Huh, Sensei?"
1001006-6 = "[s] \"Shiroko? What are you doing here?\" "
1001006-8 = "Well, it's supposed to be a personal matter... "
1001006-9 = "...but I guess I can tell you about it."
1001006-10 = "I've been planning a long distance ride—about 400 kilometers."
1001006-11 = "I'm actually in the process of scouting out the path right now."
1001006-12 = "What? You think that's too long?"
1001006-13 = "Well...if I ride all night, I should be able to make it."
1001006-14 = "Were you on your way home from work?"
1001006-15 = "Huh? You have business in the Abydos district?"
1001006-16 = "Oh, yeah. Of course..."
1001006-17 = "Now that I think about it, this is the subway line you use to get to work. I thought I might run into you when I came to D.U."
1001006-18 = "Uh... Not that I was hoping to run into you or anything!"
1001006-19 = "..."
1001006-20 = "It's just a coincidence, really!"
1001006-21 = "..."
1001006-22 = "[s] \"Well, putting aside how it happened, should we head home together?\""
1001006-23 = "Um..."
1001006-25 = "(I returned to Abydos central station with Shiroko.)"

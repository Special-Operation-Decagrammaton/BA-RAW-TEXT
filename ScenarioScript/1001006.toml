[translation]
1001006-1 = "รถไฟใต้ดิน"
1001006-2 = "สถานีรถไฟใต้ดิน D.U."
1001006-5 = "อ๊ะ คุณครู?"
1001006-6 = "[s] \"ชิโรโกะ? มาทำอะไรที่นี่เหรอ?\""
1001006-8 = "อ่า...อืม... ธุระส่วนตัวน่ะ..."
1001006-9 = "ธุระอะไรน่ะเหรอ?"
1001006-10 = "กำลังวางแผนเรื่องปั่นจักรยานระยะไกลอยู่น่ะ คงเริ่มจากเบาๆ ก่อน... สัก 400 กิโลเมตร"
1001006-11 = "เพราะงั้นเลยออกมาตรวจสอบเส้นทางที่จะใช้น่ะ"
1001006-12 = "หือ? ไกลไปงั้นเหรอ?"
1001006-13 = "อืม... หากเตรียมตัวให้ปั่นได้ตลอดทั้งคืนก็จะปั่นถึงภายใน 24 ชั่วโมงน่ะ"
1001006-14 = "คุณครูเพิ่งเลิกงานเหรอ?"
1001006-15 = "หือ? มีธุระที่เขตปกครองตนเองอะบิดอสงั้นเหรอ?"
1001006-16 = "อ่า... อืม แบบนี้นี่เอง..."
1001006-17 = "คุณครูนั่งรถไฟใต้ดินมาทำงานสินะ กำลังคิดอยู่เลยว่าถ้ามาที่ D.U. แล้วจะได้เจอคุณครูรึเปล่า"
1001006-18 = "อืม.... ถึงจะบังเอิญก็เถอะ แต่ก็ได้เจอแล้ว"
1001006-19 = "......."
1001006-20 = "ก็แค่บังเอิญนั่นละนะ"
1001006-21 = "......"
1001006-22 = "[s] \"ไหนๆ ก็บังเอิญเจอกันแล้ว กลับด้วยกันเลยไหม?\""
1001006-23 = "อืม..."
1001006-25 = "(คุณครูขึ้นรถไฟฟ้าใต้ดินไปพร้อมกับชิโรโกะ จนมาถึงสถานีกลางอะบิดอส)"

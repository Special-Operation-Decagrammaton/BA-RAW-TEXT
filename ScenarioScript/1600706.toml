[translation]
1600706-1 = "Failure Must Be Eradicated"
1600706-2 = "Welcome, Sensei."
1600706-3 = "Thank you for coming to help, Sensei."
1600706-4 = "[s] \"You threatened me. I had no choice...\""
1600706-5 = "Threatened you? I requested your assistance just like I normally do."
1600706-6 = "[s] \"You said we would both be purged if I ran away.\""
1600706-7 = "Yes, of course. You and I are comrades who share the same destiny."
1600706-8 = "My mistake is your mistake..."
1600706-9 = "In other words, joint responsibility!"
1600706-10 = "[ns] \"Why did you ask me to meet you in the kitchen?\""
1600706-14 = "Because today's mission is to develop a new sweet snack."
1600706-15 = "...Do you happen to know how to make a sweet snack with bell peppers?"
1600706-16 = "[s] \"A sweet snack with bell peppers?\""
1600706-17 = "You see, last month, the school lunch manager accidentally ordered a large number of bell peppers. A very large number."
1600706-18 = "The school lunch manager who made the grave mistake was immediately purged, but President Cherino declared she would never eat a bell pepper, no matter what."
1600706-19 = "But I believe if I can develop a sweet snack with them, our picky-eating president might enjoy it."
1600706-20 = "[s] \"That's something a parent or guardian would worry about.\""
1600706-21 = "Heehee, I'm always happy to see President Cherino enjoying delicious food."
1600706-22 = "But how do you make this bitter and pungent vegetable into a sweet snack?"
1600706-23 = "I'd love to hear your thoughts, Sensei."
1600706-24 = "[s1] \"How about dehydrating it?\"\n[s2] \"How about pickling it with sugar?\""
1600706-25 = "Indeed. Dehydrated vegetables have a crunchy texture like crackers."
1600706-26 = "Plus, it gives them a little bit of a sweet taste."
1600706-27 = "Indeed. The sugar's sweetness could mask the bell pepper's bitterness."
1600706-28 = "Plus, when the moisture evaporates from a pickled vegetable, its texture turns soft."
1600706-29 = "What an amazing plan. I knew I could count on you, Sensei!"
1600706-30 = "I'll start preparing right away."
1600706-35 = "We tried various methods to cook the bell peppers."
1600706-37 = "Hmm... There's something missing."
1600706-38 = "No matter how sweet you make it or how nice the texture is, you can't purge the bitter taste."
1600706-39 = "As a picky eater, Cherino would never try and enjoy this."
1600706-40 = "[s] \"Still, we worked so hard on it. I'm sure she'll understand.\""
1600706-41 = "Wh-What?! You want to report our failure to the president?!"
1600706-42 = "Nothing done in the president's name is a failure. The president is always right!"
1600706-43 = "*whisper* If Cherino asks about the whereabouts of the bell peppers, you must distract her with the luxurious pudding I've prepared for her."
1600706-47 = "Do you understand, Sensei? As far as I'm concerned, this never happened. Eradicate all evidence of failure."
1600706-48 = "[s] \"But there's a lot of bell pepper snacks left.\""
1600706-49 = "We just have to dispose of them one way or another."
1600706-50 = "Let's get to work, Sensei."
1600706-52 = "Afterwards, I ate the leftover bell pepper snacks with Tomoe."
1600706-53 = "...But there were too many left, so we handed them out to the students at Red Winter Academy."

[translation]
1600706-1 = "บันทึกความล้มเหลวต้องถูกลบหายไป"
1600706-2 = "เชิญค่ะคุณครู"
1600706-3 = "ฉันกำลังอยากให้คุณครูช่วยอยู่พอดีเลยค่ะ"
1600706-4 = "[s] \"ขู่กันไว้ขนาดนั้นจะไม่มาได้ยังไง...\""
1600706-5 = "ข่มขู่เหรอคะ...? ฉันก็แค่ขอร้องธรรมดาๆ เหมือนทุกครั้งเองนะคะ"
1600706-6 = "[s] \"คำว่าถ้าหนีจะถูกกวาดล้างเนี่ยนะ?\""
1600706-7 = "แน่นอนค่ะ คุณครูกับฉันเปรียบเหมือนสหายร่วมชะตากรรมเดียวกันนี่คะ"
1600706-8 = "ความผิดพลาดของฉันก็คือความผิดพลาดของสหาย..."
1600706-9 = "ดังนั้นมันคือความรับผิดชอบร่วมกันค่ะ!"
1600706-10 = "[ns] \"ว่าแต่ทำไมถึงเรียกมาที่ห้องครัวล่ะ?\""
1600706-14 = "นั่นก็เพราะว่าภารกิจในครั้งนี้คือการพัฒนาขนมชนิดใหม่ค่ะ"
1600706-15 = "คุณครูรู้จักวิธีทำขนมจากพริกหวานรึเปล่าคะ?"
1600706-16 = "[s] \"ขนมที่ทำจากพริกหวานเหรอ?\""
1600706-17 = "ค่ะ เมื่อเดือนก่อน ผู้ดูแลฝ่ายโภชนาการเกิดทำพลาดทำให้มีการสั่งซื้อพริกหวานจำนวนมาก#nมาที่สหภาพเรดวินเทอร์ค่ะ"
1600706-18 = "ผู้ดูแลฝ่ายโภชนาการคนนั้นถูกกวาดล้างไปทันที และพริกหวานพวกนี้#nท่านประธานเชริโน่ยืนกรานว่ายังไงก็จะไม่ยอมกินเด็ดขาดเลยค่ะ..."
1600706-19 = "ถ้าเกิดฉันพัฒนาสูตรขนมที่ทำจากพริกหวานได้ ท่านประธานที่มีนิสัยชอบเลือกกินก็คงต้อง#nชอบแน่ๆ ฉันเลยอยากจะทำขนมจากพริกหวานค่ะ"
1600706-20 = "[s] \"ความกลัดกลุ้มของผู้ปกครองสินะ...\""
1600706-21 = "ฮุฮุ การได้เห็นภาพท่านประธานเชริโน่กินอาหารอย่างเอร็ดอร่อย ทำให้ฉันรู้สึกดีมากๆ เลยค่ะ"
1600706-22 = "แต่ว่า... เราจะใช้ผักที่มีรสชาติเผ็ดและขมพวกนี้ทำขนมออกมาได้ยังไงกันล่ะคะ?"
1600706-23 = "ฉันเลยอยากขอคำแนะนำจากคุณครูค่ะ"
1600706-24 = "[s1] \"เอาไปตากแห้งเพื่อสะเด็ดน้ำในพริกออกดีมั้ย?\"\n[s2] \"เอาไปดองในน้ำตาลดูมั้ย?\""
1600706-25 = "ถ้าทำอย่างนั้น ผักที่ตากจนแห้งสนิทก็จะกรุบกรอบเหมือนขนมสินะคะ"
1600706-26 = "นอกจากนั้นฉันได้ยินว่าผักที่เสียน้ำไป จะมีรสชาติหวานขึ้น..."
1600706-27 = "ถ้าทำอย่างนั้น ความหวานของน้ำตาลก็จะช่วยกลบรสเผ็ดได้สินะคะ"
1600706-28 = "นอกจากนั้น ผักที่นำไปดองจะเสียความชุ่มชื้นภายในทำให้มีเนื้อที่นุ่มขึ้น..."
1600706-29 = "เป็นแผนการที่ยอดเยี่ยมมากเลยค่ะ สมกับที่เป็นคุณครูจริงๆ ค่ะ!"
1600706-30 = "ถ้างั้นฉันจะเตรียมทำอาหารเลยค่ะ"
1600706-35 = "หลังจากนั้นก็ลองใช้พริกหวานทำอาหารตามวิธีต่างๆ ดู..."
1600706-37 = "อืม... เหมือนมันยังขาดอะไรอยู่นะคะ"
1600706-38 = "ไม่ว่าจะเติมรสหวานลงไปหรือทำให้ดูน่ากินแค่ไหน แต่พริกหวานก็คือพริกหวานอยู่ดี ยังคงมีรสขม#nที่เป็นเอกลักษณ์อยู่นิดๆ ค่ะ"
1600706-39 = "ถ้าเป็นเชริโน่จังที่ชอบเลือกกินล่ะก็... คงไม่มีทางยอมรับขนมแบบนี้แน่ๆ ค่ะ"
1600706-40 = "[s] \"แต่ว่าเธอก็พยายามสุดๆ แล้วนะ เชริโน่คงจะเข้าใจ\""
1600706-41 = "คะ? คุณครูจะให้ไปรายงานความล้มเหลวกับท่านประธานเหรอคะ?"
1600706-42 = "งานทุกอย่างที่ทำในนามของท่านประธาน ห้ามล้มเหลวเด็ดขาดค่ะ#nไม่ว่าเมื่อไรท่านประธานก็ถูกต้องเสมอค่ะ!"
1600706-43 = "(กระซิบ) คือว่าถ้าเกิดเชริโน่จังถามถึงพริกหวานขึ้นมา แค่ยื่นพุดดิ้งชั้นเลิศให้หนึ่งถ้วย#nเดี๋ยวก็ลืมแล้วค่ะ"
1600706-47 = "เข้าใจชัดแล้วใช่ไหมคะคุณครู แผนการทำขนมจากพริกหยวกไม่เคยมีมาตั้งแต่แรกแล้วนะคะ#nฉันจะกำจัดบันทึกนี่ทิ้งไปค่ะ"
1600706-48 = "[s] \"แต่เรายังมีขนมที่ทำจากพริกหวานอยู่นะ\""
1600706-49 = "เรื่องนั้นแค่กำจัดไปพร้อมกับบันทึกนี่ก็ไม่มีปัญหาแล้วค่ะ"
1600706-50 = "คุณครู รบกวนช่วยฉันทำลายหลักฐานด้วยนะคะ"
1600706-52 = "จากนั้น คุณครูกับโทโมเอะก็แบ่งกันกินขนมที่ทำจากพริกหวานอย่างเอร็ดอร่อย"
1600706-53 = "ส่วนขนมที่ทำจากพริกหวานที่ยังกินไม่หมด ก็นำไปแบ่งให้กับนักเรียนคนอื่นๆ#nในสหภาพเรดวินเทอร์ที่ชอบกินขนมแทน"

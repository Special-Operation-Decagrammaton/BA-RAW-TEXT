[translation]
1600706-1 = "#title;실패한 기록은 말살해야 한다"
1600706-2 = "3;토모에;00;어서 오십시오, 선생님.\n#3;a\n#3;greeting"
1600706-3 = "3;토모에;03;선생님의 도움을 기다리고 있었습니다.\n#3;em;[반짝]"
1600706-4 = "[s] \"그렇게 협박을 하니 어쩔 수 없잖아…….\""
1600706-5 = "3;토모에;02;협박이라니요? 저는 평소처럼 평범하게 부탁을 드린 것뿐이었습니다만.\n#3;em;[?]"
1600706-6 = "[s] \"도망치면 같이 숙청을 당할 거라며?\""
1600706-7 = "3;토모에;00;그야 물론입니다. 선생님과 저는 운명을 함께 하는 동지나 다름없으니까요.\n#3;em;[반응]"
1600706-8 = "3;토모에;99;나의 실책은 곧 동지의 실책……"
1600706-9 = "3;토모에;03;이른바 연대 책임입니다!\n#3;closeup"
1600706-10 = "[ns] \"그나저나 어째서 주방으로 부른 거야?\""
1600706-11 = "#st;[0,0];instant;1;"
1600706-12 = "#clearST"
1600706-13 = "3;토모에;01\n#3;d\n#3;closeup\n#wait;1000"
1600706-14 = "3;토모에;02;그게, 이번의 과제가 새로운 과자를 개발하는 임무이기 때문입니다.\n#3;em;…\n#3;a"
1600706-15 = "3;토모에;06;……선생님께서는 혹시 피망으로 과자를 만드는 방법을 알고 계시는지요?"
1600706-16 = "[s] \"피망으로 과자를?\""
1600706-17 = "3;토모에;06;네. 지난달 급양 담당자의 실수로 붉은겨울 학원에 대량의 피망이 발주되고 말았습니다.\n#3;greeting"
1600706-18 = "3;토모에;04;중대한 실수를 한 급양 담당자는 바로 숙청되었지만, 체리노 회장님께서 피망은 무슨 일이 있더라도 입에 대지 않겠다고 하셔서…….\n#3;em;[땀]\n#3;stiff"
1600706-19 = "3;토모에;03;피망을 사용한 과자를 개발하면 편식이 심한 회장님께서도 잘 드실 것 같아서, 제가 남은 피망을 가져왔답니다."
1600706-20 = "[s] \"뭔가 보호자 같은 고민이네.\""
1600706-21 = "3;토모에;01;후후, 체리노 회장님이 맛있게 음식을 드시는 모습은 언제 봐도 기분 좋은 일이니까요.\n#3;em;[하트]"
1600706-22 = "3;토모에;06;하지만 이 쓰고 아린 맛의 채소를 어떻게 조리해야 과자처럼 만들 수 있을까요?"
1600706-23 = "3;토모에;06;부디 선생님께서 고견을 들려주셨으면 합니다."
1600706-24 = "[s1] \"말려서 물기를 빼면 되지 않을까?\"\n[s2] \"설탕에 절이면 되지 않을까?\""
1600706-25 = "3;토모에;02;과연. 말린 채소는 과자처럼 바삭바삭한 식감이 생기니까요.\n#3;em;[반응]"
1600706-26 = "3;토모에;99;게다가 수분을 잃고 농축된 채소에서는 단맛이 난다고도 하니……"
1600706-27 = "3;토모에;02;과연. 설탕의 단맛으로 쓴맛은 어느 정도 감출 수 있으니까요.\n#3;em;[반응]"
1600706-28 = "3;토모에;99;게다가 절인 채소는 수분이 빠져나가며 식감이 부드러워지니……"
1600706-29 = "3;토모에;03;훌륭한 계책이십니다. 역시 선생님이시군요!\n#3;em;[반짝]"
1600706-30 = "3;토모에;03;그럼 바로 조리 준비를 하겠습니다."
1600706-31 = "#all;hide"
1600706-32 = "#wait;1000"
1600706-33 = "#wait;3000"
1600706-34 = "#wait;1000"
1600706-35 = "#na;이후, 여러 가지 방법으로 피망을 조리해 보았다……."
1600706-36 = "#all;hide"
1600706-37 = "3;토모에;06;으음…… 역시 뭔가 부족하네요.\n#3;em;[속상함]\n#3;stiff\n#3;a"
1600706-38 = "3;토모에;06;아무리 단맛을 가미하고 식감을 좋게 해도 피망은 피망인지라, 특유의 아린 맛이 조금은 남아있네요."
1600706-39 = "3;토모에;04;편식이 심한 체리노 쨩이라면 이런 건 과자라고 인정해주지 않을 거예요.\n#3;em;[땀]"
1600706-40 = "[s] \"그래도 열심히 노력했으니 이해해 주지 않을까?\""
1600706-41 = "3;토모에;04;네? 지금 회장님께 실패했다는 보고를 하란 말씀이신가요?\n#3;em;[?!]\n#3;shake"
1600706-42 = "3;토모에;05;회장님의 이름으로 행하는 일에 실패란 없습니다. 회장님은 언제나 옳으시니까요!\n#3;closeup\n#fontsize;80"
1600706-43 = "3;토모에;01;(소근) 혹여 나중에라도 체리노쨩이 피망의 행방을 묻는다 해도, 고급 푸딩 하나만 준비해두면 금세 까맣게 잊어버릴 테니까요.\n#3;closeup\n#3;em;[재잘]"
1600706-44 = "#st;[0,0];instant;1;"
1600706-45 = "#clearST"
1600706-46 = "3;토모에;01\n#3;d\n#3;closeup\n#wait;1000"
1600706-47 = "3;토모에;05;잘 아시겠지요, 선생님? 피망으로 과자를 만든다는 계획은 애초부터 없었던 일입니다. 기록 말살입니다.\n#3;a"
1600706-48 = "[s] \"하지만 피망 과자는 아직도 잔뜩 남아 있는걸.\""
1600706-49 = "3;토모에;05;그것 또한 기록과 함께 없었던 것처럼 처리해 버리면 되는 일입니다.\n#3;em;[반응]"
1600706-50 = "3;토모에;03;자, 선생님. 저와 함께 증거 인멸을 도와주셔야겠어요.\n#3;em;[하트]\n#3;closeup\n#3;greeting"
1600706-51 = "#all;hide"
1600706-52 = "#na;(이후, 토모에와 함께 남은 피망 과자를 사이좋게 나누어 먹었다.)"
1600706-53 = "#na;(……그래도 먹지 못한 피망 과자는 당분이 부족한 붉은겨울 학원의 학생들에게 나누어 주었다.)"

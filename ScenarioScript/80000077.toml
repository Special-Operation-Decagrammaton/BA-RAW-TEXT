[translation]
80000077-1 = "#title;꽃과 초콜릿"
80000077-2 = "#place;아츠코의 화단"
80000077-3 = "3;아츠코;S2_03;안녕. 좋은 아침. 선생님.\n#3;em;[반응]\n#3;a"
80000077-4 = "[s] \"좋은 아침, 아츠코. 인사는 중요하지?\""
80000077-5 = "3;아츠코;S2_03;응. 선생님이 그렇게 말해 주니 기뻐."
80000077-6 = "3;아츠코;S2_02;오늘은 무슨 일이냐고?\n#3;em;[?]"
80000077-7 = "3;아츠코;S2_99;그건……"
80000077-8 = "3;아츠코;S2_03;……비밀이야."
80000077-9 = "3;아츠코;S2_03;그렇게 실망하지 마. 선생님. 농담이었어.\n#3;em;[재잘]"
80000077-10 = "3;아츠코;S2_03;자. 그 대신 이거 줄게."
80000077-11 = "#st;[0,0];instant;1;"
80000077-12 = "#clearST"
80000077-13 = "3;아츠코;S2_03\n#3;m5\n#wait;1000"
80000077-14 = "#wait;2500"
80000077-15 = "[ns] \"이건……? 혹시, 발렌타인 초콜릿이야?!\""
80000077-16 = "3;아츠코;S2_03;후후. 그건 비밀이야."
80000077-17 = "3;아츠코;S2_03;자, 어서 먹어 봐.\n#3;m3\n#3;em;[음표]"
80000077-18 = "#na;(아츠코의 재촉을 받고 초콜릿의 포장을 풀었다.)"
80000077-19 = "#na;(포장은 어딘가 서투른 데가 있었고, 초콜릿의 마감도 마찬가지였다.)"
80000077-20 = "[ns] \"이거, 혹시…….\""
80000077-21 = "3;아츠코;S2_02;내가 손수 만들었냐고?"
80000077-22 = "3;아츠코;S2_03;후훗. 그런 거라면, 어떨까?\n#3;em;[하트]"
80000077-23 = "[s] \"어디에서 초콜릿을 만든 거야?\""
80000077-24 = "3;아츠코;S2_02;어디에서? 으응…… 뭐라고 대답하면 좋을까."
80000077-25 = "3;아츠코;S2_03;비밀이야. 그것도.\n#3;em;[음표]"
80000077-26 = "[s] \"아츠코는 비밀이 많구나……\""
80000077-27 = "3;아츠코;S2_02;친구들에게 들었는데."
80000077-28 = "3;아츠코;S2_99;공주는 비밀이 많아도 좋은 법이래."
80000077-29 = "3;아츠코;S2_03;우습지? 난 더 이상 공주도, 무엇도 아닌데."
80000077-30 = "[s] \"아츠코는 내게 있어서 충분히 공주님이거든?!\""
80000077-31 = "3;아츠코;S2_02;그래?"
80000077-32 = "3;아츠코;S2_03;그건 조금 기쁠지도.\n#3;em;[///]"
80000077-33 = "3;아츠코;S2_99;그러면 공주님의 명입니다."
80000077-34 = "3;아츠코;S2_03;초콜릿, 맛있게 먹어 주세요."
80000077-35 = "3;아츠코;S2_03;그 꽃은 소중히 키운 아이니까, 완전히 시들 때까지는 잘 돌봐 주세요.\n#3;em;[반짝]"
80000077-36 = "[s] \"알았어! 드라이 플라워로 만들어서 평생 간직할게!\""
80000077-37 = "3;아츠코;S2_02;드라이 플라워라는 게 뭐야?\n#3;em;[?]"
80000077-38 = "#all;hide"
80000077-39 = "#na;(아츠코에게, 꽃의 수분을 말려 보관하는 드라이 플라워에 대해 설명했다.)"
80000077-40 = "#all;hide"
80000077-41 = "3;아츠코;S2_99;그렇구나. 그런 방법도 있었구나.\n#3;a"
80000077-42 = "[s] \"그렇게 하지 않으면 꽃을 보관하기 힘드니까……\""
80000077-43 = "3;아츠코;S2_01;응…… 그렇구나.\n#3;em;…"
80000077-44 = "3;아츠코;S2_03;그러면 선생님, 그 아이를 잘 부탁할게."
80000077-45 = "3;아츠코;S2_99;초콜릿은 사라지겠지만, 꽃의 형태는 남을 테니까."
80000077-46 = "[s] \"그렇게 말하니까 초콜릿도 먹으면 안 될 것 같아……\""
80000077-47 = "3;아츠코;S2_01;그건 곤란해, 선생님.\n#3;em;[땀]"
80000077-48 = "3;아츠코;S2_02;뭐가 곤란하냐고?"
80000077-49 = "3;아츠코;S2_03;나, 사실은 이 화단을 보면서 선생님과 함께 초콜릿을 먹고 싶었어."
80000077-50 = "[s] \"그래서 날 여기 불러 준 거야?\""
80000077-51 = "3;아츠코;S2_03;응. 열심히 가꿨어. 예쁘지?\n#3;em;[반짝]"
80000077-52 = "3;아츠코;S2_02;수고했다고?"
80000077-53 = "3;아츠코;S2_03;고마워. 그 말이 듣고 싶었어."
80000077-54 = "#all;hide"
80000077-55 = "#na;(아츠코와 초콜릿을 조금씩 나눠 먹으며, 화단을 바라보았다.)"

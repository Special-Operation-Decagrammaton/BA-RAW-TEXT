[translation]
80000077-1 = "ดอกไม้กับช็อกโกแลต"
80000077-2 = "สวนดอกไม้ของอาสึโกะ"
80000077-3 = "อรุณสวัสดิ์คุณครู..."
80000077-4 = "[s] \"อรุณสวัสดิ์อาสึโกะ การทักทายเป็นเรื่องสำคัญนี่เนอะ?\""
80000077-5 = "อื้อ ได้ยินคุณครูพูดแบบนี้แล้ว ดีใจจัง"
80000077-6 = "มีเรื่องอะไรน่ะเหรอ?"
80000077-7 = "เรื่องนั้น..."
80000077-8 = "...ความลับน่ะ"
80000077-9 = "อย่าทำหน้าผิดหวังแบบนั้นสิคุณครู ฉันแค่ล้อเล่นน่ะ"
80000077-10 = "เอ้า ฉันให้นี่ก็แล้วกัน"
80000077-15 = "[ns] \"หรือว่านี่คือ...? ช็อกโกแลตวาเลนไทน์เหรอ?!\""
80000077-16 = "ฮุฮุ เรื่องนั้นเป็นความลับ"
80000077-17 = "เอ้า ลองชิมดูสิ"
80000077-18 = "(คุณครูโดนลูกตื๊อของอาสึโกะ จึงรีบแกะห่อช็อกโกแลตออก)"
80000077-19 = "(ห่อกระดาษข้างนอกถูกห่อเอาไว้อย่างรีบร้อน และห่อช็อกโกแลตข้างในก็เช่นกัน)"
80000077-20 = "[ns] \"นี่มัน หรือว่า...\""
80000077-21 = "ใช่ช็อกโกแลตที่ฉันทำเองรึเปล่าน่ะเหรอ?"
80000077-22 = "ฮิฮิ ถ้าฉันทำเองแล้วจะเป็นยังไงนะ?"
80000077-23 = "[s] \"ไปทำช็อกโกแลตที่ไหนน่ะ?\""
80000077-24 = "ที่ไหนงั้นเหรอ? อืม... จะตอบว่ายังไงดีนะ"
80000077-25 = "เรื่องนั้น... ความลับน่ะ"
80000077-26 = "[s] \"อาสึโกะนี่ความลับเยอะจังนะ...\""
80000077-27 = "ฉันได้ยินมาจากพวกเพื่อนๆ น่ะ"
80000077-28 = "พวกเธอบอกว่าองค์หญิงต้องมีความลับเยอะๆ ถึงจะดีน่ะ"
80000077-29 = "น่าขำใช่มั้ย? ตอนนี้ฉันไม่ได้เป็นทั้งองค์หญิง และก็ไม่ได้เป็นอะไรเลยสักหน่อย"
80000077-30 = "[s] \"สำหรับครูน่ะ อาสึโกะเป็นองค์หญิงเสมอเลยนะ?!\""
80000077-31 = "งั้นเหรอ?"
80000077-32 = "ได้ยินแบบนี้ก็แอบดีใจนิดๆ นะ"
80000077-33 = "ถ้างั้นนี่คือคำสั่งจากองค์หญิงค่ะ"
80000077-34 = "ช็อกโกแลต... กินให้อร่อยนะคะ"
80000077-35 = "ดอกไม้นั่นน่ะ ฉันดูแลมาอย่างดี เพราะงั้นคุณครูช่วยดูแลให้ดีๆ จนกว่ามันจะผลิบานด้วยนะ"
80000077-36 = "[s] \"เข้าใจแล้ว! ครูจะเอาไปทำเป็นดอกไม้แห้งแล้วเก็บไว้อย่างดีเลย!\""
80000077-37 = "ดอกไม้แห้งคืออะไรเหรอ?"
80000077-39 = "(คุณครูอธิบายเกี่ยวกับขั้นตอนการนำดอกไม้สดมาเก็บรักษาเป็นดอกไม้แห้งให้อาสึโกะฟัง)"
80000077-41 = "อย่างนี้นี่เอง มีวิธีแบบนี้ด้วยสินะ"
80000077-42 = "[s] \"ถ้าไม่ทำแบบนั้นจะเก็บรักษาดอกไม้ไว้ยากน่ะ...\""
80000077-43 = "อื้อ... แบบนี้นี่เอง"
80000077-44 = "ถ้างั้นคุณครู... ฝากดูแลเด็กคนนั้นด้วยนะ"
80000077-45 = "ถึงช็อกโกแลตจะหายไป แต่ก็ยังเหลือรูปร่างของดอกไม้อยู่"
80000077-46 = "[s] \"พูดแบบนั้น เหมือนจะกินช็อกโกแลตไม่ได้เลยแฮะ...\""
80000077-47 = "แบบนั้นก็แย่น่ะสิคุณครู"
80000077-48 = "แย่ยังไงน่ะเหรอ?"
80000077-49 = "ฉันน่ะ ที่จริงอยากนั่งดูสวนดอกไม้นี้แล้วก็กินช็อกโกแลตไปพร้อมๆ กับคุณครูนะ"
80000077-50 = "[s] \"เพราะงั้นเลยเรียกครูมาที่นี่เหรอ?\""
80000077-51 = "อื้อ ฉันตั้งใจปลูกเลยนะ สวยใช่มั้ยล่ะ?"
80000077-52 = "พยายามได้ดีมากงั้นเหรอ?"
80000077-53 = "ขอบคุณนะ ฉันอยากฟังคำนั้นมาตลอดเลย"
80000077-55 = "(คุณครูกับอาสึโกะแบ่งช็อกโกแลตกินพร้อมกับนั่งชมสวนไปด้วยกัน)"

[translation]
80000077-1 = "青薔薇與巧克力"
80000077-2 = "敦子的花壇"
80000077-3 = "早安，老師。"
80000077-4 = "[s]「早安，敦子。『打招呼很重要』對吧？」"
80000077-5 = "嗯。我很高興你還記得。"
80000077-6 = "找老師出來的理由？"
80000077-7 = "理由是……"
80000077-8 = "……祕密。"
80000077-9 = "……開玩笑的。別露出那麼難過的表情。"
80000077-10 = "來，請收下。"
80000077-15 = "[ns]「難道……是情人節巧克力？」"
80000077-16 = "……那也是，祕密。"
80000077-17 = "快打開看看吧。"
80000077-18 = "（在敦子的催促下拆開了巧克力的包裝）"
80000077-19 = "（裡面巧克力的收尾處理，看起來有些許不純熟）"
80000077-20 = "[ns]「這難道是親手做的……？」"
80000077-21 = "……呵呵。"
80000077-22 = "如果是的話呢？"
80000077-23 = "[s]「這個，究竟是在哪裡怎麼做的……？」"
80000077-24 = "唔嗯……"
80000077-25 = "那也是祕密，吧。"
80000077-26 = "[s]「又是祕密啊……」"
80000077-27 = "……我聽日和說過。"
80000077-28 = "公主就算有很多祕密也沒關係。"
80000077-29 = "不過，我已經不是「公主」了呢。"
80000077-30 = "[s]「敦子現在依然是我的公主！請儘管命令我吧！」"
80000077-31 = "呵呵，是嗎？"
80000077-32 = "那，好像有點開心。"
80000077-33 = "那麼，接下來是公主的命令。"
80000077-34 = "請津津有味地享用巧克力吧。此外──"
80000077-35 = "請照顧那朵花到最後。#n……那是我，精心培養的孩子。"
80000077-36 = "[s]「遵命！我會把它做成乾燥花，珍惜一輩子的！」"
80000077-37 = "……乾燥花，是什麼呢？"
80000077-39 = "（向敦子說明乾燥花）"
80000077-41 = "……好厲害。原來還有那種方法啊。"
80000077-42 = "[s]「嗯，可以讓花朵維持在美麗的樣子唷。」"
80000077-43 = "這樣啊……那麼老師，那孩子就交給你了。"
80000077-44 = "……呵呵。這樣一來，那孩子就能永遠陪在老師身邊了。"
80000077-45 = "雖然巧克力會消失就是了。"
80000077-46 = "[s]「聽妳這麼一說，把巧克力吃了好像有點浪費……」"
80000077-47 = "……那樣我會有點困擾的。"
80000077-48 = "理由……？#n因為我想和老師一起吃巧克力。"
80000077-49 = "……一邊，欣賞著這座花壇。"
80000077-50 = "[s]「所以才會找我來這裡嗎？」"
80000077-51 = "嗯。想要讓老師看看我努力照顧的花朵們。"
80000077-52 = "能做出這麼漂亮的花壇，也是多虧了老師。"
80000077-53 = "謝謝你總是教導我各種事情。"
80000077-55 = "（一邊和敦子欣賞著花壇，一邊一起享用了巧克力）"

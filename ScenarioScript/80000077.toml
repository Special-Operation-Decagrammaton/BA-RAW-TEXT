[translation]
80000077-1 = "Flowers and Chocolate"
80000077-2 = "Atsuko's Flower Garden"
80000077-3 = "Hello! Good morning, Sensei."
80000077-4 = "[s] \"Good morning, Atsuko. Greetings are important, aren't they?\""
80000077-5 = "I agree! I'm glad you think so, Sensei."
80000077-6 = "Oh, you want to know what's going on?"
80000077-7 = "That's..."
80000077-8 = "...a secret."
80000077-9 = "Aw, don't worry, Sensei. It was a joke!"
80000077-10 = "Here. I'll give you this to make it up to you."
80000077-15 = "[ns] \"Oh, is this…Valentine's Day chocolate?\""
80000077-16 = "Heehee. That's a secret, too!"
80000077-17 = "What are you waiting for? Try it!"
80000077-18 = "I unwrapped the chocolate at Atsuko's insistence."
80000077-19 = "The wrapper was somewhat haphazard, and the chocolate looked a bit lopsided."
80000077-20 = "[ns] \"Did you...\""
80000077-21 = "Did I make it myself?"
80000077-22 = "Heehee. And what if I did?"
80000077-23 = "[s] \"Where did you even make this?\""
80000077-24 = "Where? Hmm... What do you think I'll say?"
80000077-25 = "That's another secret!"
80000077-26 = "[s] \"You sure do have a lot of secrets...\""
80000077-27 = "Is that so? My friends are always telling me..."
80000077-28 = "\"It's good for Hime to have secrets.\""
80000077-29 = "Isn't that funny? Because I'm no longer a princess anyways!"
80000077-30 = "[s] \"You'll always be Hime to me!\""
80000077-31 = "Yeah?"
80000077-32 = "I may be...a little happy to hear that."
80000077-33 = "Well then! It's the order of the princess."
80000077-34 = "Please enjoy the chocolate!"
80000077-35 = "And this flower is precious, so please take care of it until it drops all its petals."
80000077-36 = "[s] \"How about I press it and cherish it forever?\""
80000077-37 = "Press it? What's that?"
80000077-39 = "I explained the concept of a pressed flower to Atsuko, where you dry the flower to store it."
80000077-41 = "I see... I didn't know you could do that!"
80000077-42 = "[s] \"It's very difficult to store flowers otherwise.\""
80000077-43 = "Yes... I understand."
80000077-44 = "In that case, Sensei, please take good care of it."
80000077-45 = "The chocolate will be gone, but the flower will remain as a keepsake."
80000077-46 = "[s] \"Well, now I feel like I shouldn't eat the chocolate, either.\""
80000077-47 = "Well, that's going to be a problem, Sensei."
80000077-48 = "The problem is..."
80000077-49 = "I wanted us to eat the chocolate together as we look at the flowers, Sensei."
80000077-50 = "[s] \"Is that why you brought me here?\""
80000077-51 = "Yeah. I worked really hard on this garden. Isn't it pretty?"
80000077-52 = "...You think I did a good job?"
80000077-53 = "Well... thank you. I was hoping you'd say that."
80000077-55 = "Atsuko and I shared the chocolate and enjoyed the flower garden."

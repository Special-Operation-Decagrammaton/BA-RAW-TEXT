[translation]
10020030-9 = "It's Shiroko! She's reappeared!"
10020030-10 = "Good. This time, we won't let her get away."
10020030-15 = "That's right! We're armed to the teeth and ready for her!"
10020030-16 = "Shiroko! It's no use fighting. Prepare to be captured!"
10020030-22 = "[ns1] \"Shiroko! Tell me one thing!\"\n[ns2] \"Why are you taking orders from Phrenapates?\""
10020030-25 = "Sensei... No..."
10020030-26 = "I'm not taking orders from Phrenapates. It's the opposite."
10020030-27 = "[s] \"How can it be the opposite?\""
10020030-28 = "...The Guide of Chroma is taking orders from me."
10020030-29 = "[ns] \"What do you mean?\""
10020030-30 = "Listen, everyone! I've discovered Shiroko's current location!"
10020030-31 = "Her signal's coming from the abandoned zone of Area 4!"
10020030-37 = "Huh? But Area 4 is—"
10020030-39 = "Pretty far from Area 3's Dimension Engine room, yeah. I know it's a trip for you, but..."
10020030-40 = "..."
10020030-41 = "The thing is... We're looking at Shiroko. She's in front of us right now."
10020030-45 = "Huh? How can she be there?"
10020030-46 = "Wait, what?! I'm getting a signal indicating Shiroko's over there too!"
10020030-47 = "Shiroko is in both Area 4 AND the Area 3 Dimension Engine near you?"
10020030-48 = "Does that mean there are two Shirokos in the Ark right now? H-Hold on. I can't be wrong. I'm a genius!"
10020030-49 = "No, it's no mistake. The information is correct."
10020030-50 = "Huh...?"
10020030-51 = "Ah... I see what's going on..."
10020030-52 = "I thought the Chroma changed Shiroko... I thought..."
10020030-53 = "But that wasn't it."
10020030-59 = "That Shiroko isn't OUR Shiroko."
10020030-60 = "[s3] \"...What?\"\n[s4] \"...Come again?\""
10020030-64 = "Huh?!"
10020030-65 = "What do you mean?"
10020030-66 = "How is it not our Shiroko?"
10020030-74 = "Shiroko! She's getting ready to fight again!"
10020030-75 = "We have to respond."
10020030-76 = "No matter what the story is, we have to face it. We have to focus on this fight!"
10020030-77 = "[ns] \"Okay! All we can do right now is move forward!\""
10020030-78 = "Right! Let's subdue Shiroko and destroy the Dimension Engine!"
10020030-79 = "Sensei, we're ready for you!"

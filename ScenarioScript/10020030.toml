[translation]
10020030-9 = "รุ่นพี่ชิโรโกะโผล่มาอีกแล้วค่ะ..."
10020030-10 = "ดีละ คราวนี้ไม่ปล่อยให้หนีไปหรอก"
10020030-15 = "ใช่แล้ว! พวกเราเตรียมพร้อมมาเต็มพิกัด เตรียมใจไว้ได้เลย!"
10020030-16 = "ชิโรโกะจัง! ยอมให้จับตัวดีๆ เถอะนะคะ!"
10020030-22 = "[ns1] \"ชิโรโกะ! ช่วยบอกครูหน่อยสิ!\"\n[ns2] \"ทำไมเธอถึงฟังคำสั่งของเพลนาพาเทสล่ะ?\""
10020030-25 = "... เปล่าเลย คุณครู"
10020030-26 = "ฉันไม่ได้เชื่อฟังคำสั่งของเพลนาพาเทสเลย ตรงกันข้ามเลยต่างหาก"
10020030-27 = "[s] \"ตรงกันข้ามงั้นเหรอ...?\""
10020030-28 = "... <ผู้นำทางสีสัน> นั่นต่างหากที่เป็นฝ่ายฟังคำสั่งของฉัน"
10020030-29 = "[ns] \"หมายความว่ายังไง...?\""
10020030-30 = "ทุกคนคะ ฉันเจอตำแหน่งที่คุณชิโรโกะอยู่แล้วค่ะ!"
10020030-31 = "ตอนนี้คุณชิโรโกะอยู่ในเขตปิดของพื้นที่ที่ 4 ค่ะ! ตรวจพบสัญญาณที่นั่นค่ะ!"
10020030-37 = "คะ? ถ้าพื้นที่ที่ 4 ละก็..."
10020030-39 = "ค่ะ ที่นั่นอยู่ไกลจากห้องเครื่องทะลุมิติของพื้นที่ 3 ที่ทุกคนอยู่ตอนนี้มากทีเดียว..."
10020030-40 = "......"
10020030-41 = "อ่า... คือว่า ตะ...ตอนนี้ชิโรโกะจังอยู่ตรงหน้าพวกเรานะ...?"
10020030-45 = "...คะ? อยู่...ที่นั่นด้วย?"
10020030-46 = "เอ๋...? อะ...อะไรกันคะ? มะ...มันขึ้นว่าคุณชิโรโกะอยู่ที่นั่นนี่นา...?!"
10020030-47 = "คุณชิโรโกะอยู่ที่พื้นที่ 4 กับ...อยู่ที่ <เครื่องทะลุมิติ> ที่พื้นที่เขต 3 ตอนนี้ด้วย...?"
10020030-48 = "อะ...อะไรกันคะ? หมายความว่าบนเรือนี้มีคุณชิโรโกะอยู่สองคนเหรอ...? ดะ...เดี๋ยวก่อนค่ะ ระ...หรือว่า#nอัจฉริยะอย่างฉันจะทำผิดพลาดกัน...?!"
10020030-49 = "...ไม่หรอก ไม่ใช่เรื่องผิดพลาดอะไรหรอก ขอบใจนะ ได้ข้อมูลดีๆ มาเลยละ"
10020030-50 = "คะ...?"
10020030-51 = "อืม ตอนนี้ก็พอเข้าใจขึ้นหน่อยแล้ว อืม... แบบนี้เองสินะ~"
10020030-52 = "ฉันเชื่อว่าชิโรโกะจังเปลี่ยนไปเพราะเจ้าสิ่งที่เรียกว่า <สีสัน> นั่น... "
10020030-53 = "... แต่ว่าไม่ใช่แบบนั้นเลย"
10020030-59 = "ชิโรโกะคนนั้น ไม่ใช่ชิโรโกะจังที่เรารู้จักหรอกนะ"
10020030-60 = "[s3] \"... อะไรนะ?\"\n[s4] \"... ว่ายังไงนะ?\""
10020030-64 = "คะ...?!"
10020030-65 = "มะ...หมายความว่ายังไงคะ รุ่นพี่?"
10020030-66 = "ไม่ใช่รุ่นพี่ชิโรโกะ...ที่เรารู้จักงั้นเหรอคะ?"
10020030-74 = "ระ...รุ่นพี่ชิโรโกะเข้าโหมดต่อสู้อีกแล้วค่ะ...!"
10020030-75 = "พวกเราเองก็ต้องเตรียมตอบโต้แล้วค่ะ"
10020030-76 = "ก็นะ คงไม่มีทางเลือกอื่นนอกจากเผชิญกับความจริง ตอนนี้เราต้องตั้งสมาธิกับการต่อสู้ก่อน!"
10020030-77 = "[ns] \"...เข้าใจแล้ว! ตอนนี้ต้องเดินหน้าต่อเท่านั้น!!\" "
10020030-78 = "ค่ะ!! ตั้งแต่นี้ไปจะเข้าคุมตัวรุ่นพี่ชิโรโกะ และทำลาย <เครื่องทะลุมิติ> ค่ะ!!"
10020030-79 = "คุณครูคะ! ช่วยออกคำสั่งด้วยค่ะ!"

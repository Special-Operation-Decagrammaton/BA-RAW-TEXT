[translation]
10020030-9 = "白子前輩出現了呢……"
10020030-10 = "這次不會讓你逃走囉～"
10020030-15 = "覺悟吧！"
10020030-16 = "白子醬！請乖乖束手就擒吧！"
10020030-22 = "[ns1]「白子，希望你能告訴我一件事。」\n[ns2]「為何要聽從誘騙者的命令呢？」"
10020030-25 = "……你錯了，老師。"
10020030-26 = "並不是我在服從誘騙者的命令──正好相反。"
10020030-27 = "[s]「『正好相反』……？」"
10020030-28 = "……是「色彩的嚮導者」在服從我的命令。"
10020030-29 = "[ns]「那是什麼意思……？」"
10020030-30 = "找出白子同學現在的位置了！"
10020030-31 = "白子同學──就在方舟第4區域的封閉地區。從那邊確認到信號了！"
10020030-37 = "第4區域是……"
10020030-39 = "沒錯。和各位目前所在的第3區域「次元引擎」有一段距離。"
10020030-40 = "……"
10020030-41 = "嗯……？白子醬就在我們面前啊……？"
10020030-45 = "……你們那邊也有……是嗎？"
10020030-46 = "這，這究竟……白子同學也出現在你們那裡──？"
10020030-47 = "在第4區域和第3區域的「次元引擎」……？"
10020030-48 = "什麼……也就是說現在有兩個白子同學在這艘方舟裡……？#n請，請等一下。難，難道……身為天才美少女的我失誤了……！？"
10020030-49 = "……不，我想那應該不是失誤。#n謝謝你提供了很好的情報。"
10020030-50 = "咦……？"
10020030-51 = "這樣啊，原來是這麼回事啊──我終於想通了。"
10020030-52 = "白子醬因為「色彩」改變了──#n我們一直是這麼想的。"
10020030-53 = "……然而並不是這樣啊。"
10020030-59 = "[ruby=那個人]「白子」[/ruby]並不是我們認識的「白子醬」。"
10020030-60 = "[s3]「………………」\n[s4]「………………咦？」"
10020030-64 = "什麼……！？"
10020030-65 = "你，你在說什麼啊星野前輩。"
10020030-66 = "不是我們認識的……白子前輩……？"
10020030-74 = "白，白子前輩再次進入戰鬥狀態……！"
10020030-75 = "請應戰！"
10020030-76 = "真相究竟是什麼，只能親自去調查了呢。#n現在要先專注於戰鬥唷！"
10020030-77 = "[ns]「……我知道了！總之現在先前進吧！！」 "
10020030-78 = "是！！開始壓制白子前輩並破壞「次元引擎」！！"
10020030-79 = "老師，指揮就拜託了！"

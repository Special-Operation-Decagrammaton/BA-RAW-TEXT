[translation]
2003403-1 = "Do It Yourself!"
2003403-2 = "เพราะอย่างนี้ วันนี้ฉันก็เลยมาที่ศูนย์ฝึกทำโมจิยังไงล่ะคะ★"
2003403-3 = "[s] \"สมกับที่เป็นอาคาริเลยนะ...\""
2003403-4 = "ฮุฮุ ฉันอยากลองฝึกทำด้วยตัวเองดูน่ะค่ะ"
2003403-10 = "ยินดีต้อนรับสู่ศูนย์ฝึกทำโมจิค่ะ!"
2003403-11 = "ถูกต้องแล้วค่ะ ถ้าโมจิที่จะใส่ในอาหารมีไม่พอ เราก็ต้องทำโมจิขึ้นมาเองสิคะ!"
2003403-12 = "โมจิที่เพิ่งทำใหม่ๆ อร่อยอย่าบอกใครเลยละค่ะ! ยิ่งเป็นโมจิที่ทำเองแล้ว นอกจากอร่อยแล้วยัง#nได้ความภูมิใจด้วยค่ะ!"
2003403-13 = "[s] \"แต่ว่า... ใส่ชุดนี้ทำได้เหรอ?\""
2003403-14 = "คะ? อ้อ หมายถึงชุดกิโมโนนี้สินะคะ"
2003403-15 = "ฮุฮุ มีใครบอกว่าใส่ชุดกิโมโนแล้วห้ามทำโมจิงั้นเหรอคะ?"
2003403-16 = "และต่อให้ชุดพังหรือขาดขึ้นมา ฉันก็เอาไปเย็บได้ค่ะ หรือไม่ก็ซื้อใหม่อีกชุดไปเลยก็ได้"
2003403-17 = "สำหรับฉันแล้ว การได้กินโมจิอร่อยๆ อย่างเต็มที่สำคัญกว่าเรื่องชุดเป็นไหนๆ ค่ะ"
2003403-18 = "[s] \"อืม... เอาตามที่อาคาริสบายใจเลย...\""
2003403-19 = "ถ้างั้นเรามาเริ่มกันเลยมั้ยคะคุณครู?"
2003403-22 = "― [log=아카리 새해]ฮู่ว...[/log][wa:440] "
2003403-23 = "― [log=아카리 새해]ต้องออกแรงมากกว่าที่คิดนะคะเนี่ย[/log][wa:1670] "
2003403-26 = "― [log=아카리 새해]ไม่เป็นไรค่ะ คุณครู[/log][wa:530] "
2003403-27 = "― [log=아카리 새해]ฉันยังไหวค่ะ[/log][wa:1070] "
2003403-30 = "― [log=아카리 새해]ดีใจจังเลยค่ะที่เป็นห่วง...[/log][wa:640] "
2003403-31 = "― [log=아카리 새해]แต่ก็อยากรู้จังเลยนะคะ ว่าจะออกมาเป็นยังไง[/log][wa:3870] "
2003403-34 = "― [log=아카리 새해]จะได้โมจิแบบไหน[/log][wa:610] "
2003403-35 = "― [log=아카리 새해]และโมจินั้นจะเอาไปทำอาหารอะไรได้บ้าง...[/log][wa:2760] "
2003403-38 = "― [log=아카리 새해]... พอคิดว่า...[/log][wa:1000] "
2003403-39 = "― [log=아카리 새해]จะได้กินสิ่งนั้นกับคุณครู...[/log][wa:540] "
2003403-42 = "― [log=아카리 새해]... เอ่อ... คุณครูคะ?[/log][wa:1020] "
2003403-45 = "― [log=아카리 새해]ถ้าทำโมจิเสร็จแล้ว[/log]"
2003403-46 = "― [log=아카리 새해]ฉันอยากให้คุณครูลองชิมก่อน[/log][wa:800] "
2003403-49 = "― [log=아카리 새해]จะได้รึเปล่าคะ?[/log]"
2003403-52 = "โอ้โห เก่งจังเลยนะคะ! เพิ่งลองทำครั้งแรกจริงหรือเปล่าคะเนี่ย?"
2003403-56 = "ทำออกมาได้เหนียวพอดี แต่ก็ยังมีความอ่อนนุ่มอยู่ค่ะ!"
2003403-57 = "ถ้าเอาโมจินี้ไปทำโอโซนิ ต้องออกมาอร่อยแน่เลยค่ะ ฉันเองก็อยากกินดูบ้างแล้วค่ะ!"
2003403-58 = "ตอนแรกฉันตั้งใจว่าจะหัดทำโมจิเพื่อเอาไปใส่โอโซนิค่ะ..."
2003403-59 = "แต่พอเป็นแบบนี้แล้ว ฉันก็อยากหัดทำอาหารที่มีโมจิเป็นส่วนประกอบดูบ้างแล้วละค่ะ"
2003403-60 = "[s] \"ว่าแต่... ปกติอาคาริทำอาหารเองเหรอ?\""
2003403-61 = "อืม~ ถ้าฉันทำอาหารเองได้ ชีวิตนี้คงไม่ต้องการอะไรอีกแล้วละค่ะ"
2003403-62 = "แต่ก็ช่วยไม่ได้นะคะ! เรื่องการทำอาหารคงต้องฝากให้ร้านอาหารที่มีความสัมพันธ์อันดีกับชมรม#nชิมอาหารช่วยแล้วละค่ะ"
2003403-63 = "[s] (คงหมายถึงร้านอาหารที่ยังไม่โดนระเบิดสินะ...)"
2003403-64 = "ถ้างั้นเราไปกันเลยมั้ยคะคุณครู?"
2003403-69 = "อาหารที่ทำจากโมจิน่ะมีเยอะแยะเลยค่ะ! ทั้งโอโซนิ โอชิรุโกะ โอฮากิ อิโซเบะยากิ... ฮุฮุ เยอะไปหมดเลย!"
2003403-71 = "(หลังจากนั้นคุณครูกับอาคาริก็ได้กินสารพัดเมนูที่ทำจากโมจิด้วยกัน)"
2003403-72 = "(แม้จะกินได้ไม่ถึงครึ่ง แต่โมจิของอาคาริก็อร่อยจริงๆ)"

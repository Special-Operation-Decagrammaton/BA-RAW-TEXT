[translation]
2003403-1 = "Do It Yourself!"
2003403-2 = "So today, we're attending a mochi-making class. ★"
2003403-3 = "[s] \"...That's so Akari.\""
2003403-4 = "Heehee. They say that if you want something done right, you gotta do it yourself, right?"
2003403-10 = "Welcome to our mochi-making workshop!"
2003403-11 = "Oh, of course. If a dish is short on mochi, having your own on hand to enjoy is the way to go!"
2003403-12 = "Freshly made mochi is delicious! And the sweat you put in to make it knocks the flavor up a notch!"
2003403-13 = "[s] \"...You're making mochi in that?\""
2003403-14 = "Huh? Oh, my kimono?"
2003403-15 = "Heehee. Just because I'm in a kimono doesn't mean I can't make mochi, right?"
2003403-16 = "And if something gets damaged or worn out, I'll just get it mended. Or buy a whole new dress."
2003403-17 = "Eating lots of delicious mochi is more important than fancy clothes, don't you think?"
2003403-18 = "[s] \"...Well, if you say so...\""
2003403-19 = "All right, Sensei. Shall we begin?"
2003403-22 = "― [log=아카리 새해]*sigh*...[/log][wa:360] "
2003403-23 = "― [log=아카리 새해]Turns out this needs more muscle than I expected.[/log][wa:990] "
2003403-26 = "― [log=아카리 새해]That's all right, Sensei.[/log][wa:290] "
2003403-27 = "― [log=아카리 새해]I can keep going.[/log][wa:870] "
2003403-30 = "― [log=아카리 새해]I appreciate your concern...[/log][wa:600] "
2003403-31 = "― [log=아카리 새해]But how could I not feel excited?[/log][wa:4230] "
2003403-34 = "― [log=아카리 새해]What kind of mochi will we make?[/log][wa:10] "
2003403-35 = "― [log=아카리 새해]What kind of new dishes can be made with it?[/log][wa:2560] "
2003403-38 = "― [log=아카리 새해]...And then[/log][wa:1160] "
2003403-39 = "― [log=아카리 새해]I get to share all of those meals with you...[/log][wa:10] "
2003403-42 = "― [log=아카리 새해]...Um, Sensei?[/log][wa:1300] "
2003403-45 = "― [log=아카리 새해]Would you do me the honor[/log]"
2003403-46 = "― [log=아카리 새해]of taking the first bite of my mochi when it's done?[/log][wa:10] "
2003403-49 = "― [log=아카리 새해]Is that all right?[/log]"
2003403-52 = "Wow, you're amazing! Are you sure this is the first time you've ever made mochi!"
2003403-56 = "It's so sticky and yet perfectly soft!"
2003403-57 = "I really want to try some ozoni made with this mochi!"
2003403-58 = "From the start I wanted to make mochi so I could use it in ozoni but..."
2003403-59 = "Now, I've got to have it in every dish that mochi can be used in."
2003403-60 = "[s] \"Wait... Akari, are you doing all the cooking yourself?\""
2003403-61 = "Well, it would be great if I could but..."
2003403-62 = "I have no choice but to seek assistance from one of the few restaurants the Gourmet Research Society still has a good relationship with."
2003403-63 = "[s] \"(Probably a restaurant that hasn't worked with them yet...)\""
2003403-64 = "Shall we depart, Sensei?"
2003403-69 = "Ozoni, oshiruko, ohagi, isobeyaki... Hehe, there are so many dishes that can be made with mochi!"
2003403-71 = "And so, I got to taste all kinds of dishes made using mochi."
2003403-72 = "...To be honest, I couldn't finish half of them. But Akari's mochi was still very good."

2003403-9 = "3;체험관 직원;00\n#3;a\n#wait;1000"
2003403-10 = "3;체험관 직원;00;저희 떡 체험관에 오신 것을 환영합니다."
2003403-11 = "3;체험관 직원;00;아유, 그럼요. 그럼요. 음식에 들어갈 떡이 부족하다면, 직접 떡을 만들어 먹는 게 최고죠!\n#3;hophop"
2003403-12 = "3;체험관 직원;00;갓 만든 떡이 얼마나 맛있는데요! 거기에 자기가 만들었다는 보람까지 더해지면, 그 맛은 한층 더 각별하답니다!\n#3;em;[음표]"
2003403-13 = "[s] \"그런데…… 그 옷으로 괜찮겠어?\""
2003403-14 = "3;아카리 새해ND;02;네? 아하. 이 기모노 말씀이군요.\n#3;em;[?]"
2003403-15 = "3;아카리 새해ND;99;후훗. 기모노를 입고 있다고 해서, 떡을 만들지 말라는 법은 없잖아요?\n#3;greeting"
2003403-16 = "3;아카리 새해ND;01;거기에 만일 어딘가가 상하거나 망가지면, 수선을 부탁드리거나 아예 새로 한 벌 더 마련하면 되는 일이고요."
2003403-17 = "3;아카리 새해ND;00;저에게는 옷보다도, 맛있는 떡을 충분히 먹을 수 있다는 게 더 중요하답니다?"
2003403-18 = "[s] \"……응. 아카리가 그렇다면야…….\""
2003403-19 = "3;아카리 새해ND;03;그러면, 선생님. 시작해 볼까요?\n#3;greeting"

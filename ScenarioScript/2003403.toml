2003403-55 = "3;체험관 직원;03\n#3;greeting\n#wait;1000"
2003403-56 = "3;체험관 직원;00;찰기도 적당하고, 그러면서도 부드러움을 잃지 않았어요!\n#3;em;[음표]"
2003403-57 = "3;체험관 직원;00;이 떡으로 만든 오조니는…… 세상에. 저도 한번 먹어보고 싶어지네요!"
2003403-58 = "3;아카리 새해ND;02;처음에는 오조니에 넣기 위해서 만들자고 결심했지만…….\n#3;em;…"
2003403-59 = "3;아카리 새해ND;01;이렇게 된 이상, 이 떡으로 만들어 먹을 수 있는 요리는 한 번씩 다 만들어 봐야겠네요."
2003403-60 = "[s] \"그런데…… 아카리가 요리를 직접 하는 거야?\""
2003403-61 = "3;아카리 새해ND;99;으음~ 제가 직접 요리까지 할 수 있었다면 더할 나위 없겠지만."
2003403-62 = "3;아카리 새해ND;07;어쩔 수 없죠! 여기에서는 저희 미식연구회와 좋은 관계를 맺고 있던 식당 중 한 곳에 부탁드릴 수밖에요.\n#3;jump"
2003403-63 = "[s] (정확히는, 아직 아무 일도 일어나지 않은 식당이려나…….)"
2003403-64 = "3;아카리 새해ND;00;그러면, 선생님. 같이 가실까요?"

[translation]
2003403-1 = "#title;Do It Yourself!"
2003403-2 = "3;아카리 새해ND;07;그래서 오늘은 이렇게, 떡 만들기 체험 교실을 찾아왔습니다★\n#3;em;[반짝]\n#3;a"
2003403-3 = "[s] \"……여러 가지 의미로 아카리 답네…….\""
2003403-4 = "3;아카리 새해ND;01;후후. 아쉬우면 직접 자신의 손으로 해 보라는 말도 있잖아요?\n#3;jump"
2003403-5 = "#st;[0,0];instant;1;"

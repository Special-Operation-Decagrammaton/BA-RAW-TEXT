[translation]
2003403-1 = "Do It Yourself！"
2003403-2 = "所以今天來到了製作年糕的體驗教室★"
2003403-3 = "[s]「……在各種意義上，真不愧是亞伽里呢……」"
2003403-4 = "呵呵，不是有句話說「如果覺得可惜，就親自用雙手試一試」嗎？"
2003403-10 = "歡迎光臨年糕體驗館。"
2003403-11 = "哎呀，同學你說的對。#n如果年糕不夠的話，自己親手做就行了！"
2003403-12 = "剛做好的年糕真的非常好吃！#n配合親手製作而產生的成就感，滋味還會更上一層樓哦！"
2003403-13 = "[s]「不過……穿著那件衣服沒問題嗎？」"
2003403-14 = "咦？啊啊～你指的是和服對吧。"
2003403-15 = "呵呵，沒有規定穿著和服就不能做年糕吧？"
2003403-16 = "如果衣服受損也只要修補一下，或者乾脆準備新的一套就行了。"
2003403-17 = "對我來說比起衣服，能吃到好吃的年糕更重要。"
2003403-18 = "[s]「……嗯。既然亞伽里都這麼說了……」"
2003403-19 = "那麼老師，我們開始吧？"
2003403-22 = "― [log=아카리 새해]呼……[/log][wa:600] "
2003403-23 = "― [log=아카리 새해]比想像中，還需要力氣呢。[/log][wa:2470] "
2003403-26 = "― [log=아카리 새해]沒事的唷，老師。[/log][wa:970] "
2003403-27 = "― [log=아카리 새해]我還能繼續。[/log][wa:1310] "
2003403-30 = "― [log=아카리 새해]很高興你能擔心我……[/log][wa:1320] "
2003403-31 = "― [log=아카리 새해]可是我果然，期待得不得了。[/log][wa:5030] "
2003403-34 = "― [log=아카리 새해]會做出什麼樣的年糕……[/log][wa:770] "
2003403-35 = "― [log=아카리 새해]能用它做出什麼樣的料理……[/log][wa:3800] "
2003403-38 = "― [log=아카리 새해]……一想到……[/log][wa:1320] "
2003403-39 = "― [log=아카리 새해]能和老師一起享用……[/log][wa:1260] "
2003403-42 = "― [log=아카리 새해]……那個，老師？[/log][wa:1540] "
2003403-45 = "― [log=아카리 새해]年糕做好之後，[/log]"
2003403-46 = "― [log=아카리 새해]希望老師能最先品嘗。[/log][wa:1440] "
2003403-49 = "― [log=아카리 새해]可以吧？[/log]"
2003403-52 = "哇，太厲害了！真的是第一次做嗎？"
2003403-56 = "黏度適中，卻也不失柔軟！"
2003403-57 = "用這個年糕做的年糕湯……請務必讓我也品嘗看看！"
2003403-58 = "雖然一開始是為了煮年糕湯而做的……"
2003403-59 = "既然如此，能用這個年糕做的料理都得嘗試看看了呢。"
2003403-60 = "[s]「不過……亞伽里要親自下廚嗎？」"
2003403-61 = "嗯～如果我能親自下廚當然再好不過……"
2003403-62 = "不過沒辦法！這次就拜託和美食研究會有良好關係的一間餐廳吧。"
2003403-63 = "[s]（準確來說，應該是「還沒」出事的餐廳吧……）"
2003403-64 = "那麼老師，我們走吧？"
2003403-69 = "年糕湯、紅豆湯、牡丹餅和海苔年糕捲……呵呵，年糕能做的料理真多呢！"
2003403-71 = "（之後和亞伽里一起品嚐了各種年糕料理）"
2003403-72 = "（……雖然實際上只吃了一半，但亞伽里做的年糕真的非常好吃）"

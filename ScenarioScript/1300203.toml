[translation]
1300203-1 = "Garlic-A-Holic"
1300203-2 = "Schale Sensei's Executive Office"
1300203-6 = "After lunch, Akari returned with a happier face than usual."
1300203-7 = "Hmm, hmm... Hmm... ♪"
1300203-8 = "Ah, today's lunch was delicious. I got to try a tasty new restaurant, and it put me in a great mood."
1300203-9 = "Did you eat bread for lunch again?"
1300203-10 = "That's not okay. You ought to fill up for lunch if you want to stay focused through the whole afternoon. You should eat something more nutritious than that."
1300203-11 = "Even if you don't want to, you ought to eat at a restaurant instead of a convenience store. I know some good places near Schale you can try!"
1300203-12 = "[s] \"Did you go to a ramen joint for lunch, Akari?\""
1300203-13 = "Eh? How did you know?"
1300203-14 = "That's right, I had a bowl of ramen for lunch. There's this new ramen restaurant that just opened in front of the Schale building."
1300203-15 = "It says on the menu that 10 servings of the jumbo ramen are free if you finish them within 30 minutes. I ate two bowls in a row, and they were great!"
1300203-16 = "They served authentic tonkotsu ramen, with rich broth and plenty of toppings."
1300203-17 = "...By the way, how did you know that I ate ramen for lunch, Sensei?"
1300203-18 = "Wait...did you smell garlic on me?"
1300203-19 = "Wow... I brushed my teeth as hard as I could, but I guess the garlic scent really clings to me."
1300203-20 = "Now that I think about it, there were three whole bulbs of garlic in the ramen, and I ate it all... No wonder I smell like garlic."
1300203-21 = "I don't want to smell like garlic in front of you, but I don't want to eat tonkotsu ramen without garlic, either... Oh, what to do?"
1300203-22 = "[s] \"I don't care if you smell like garlic.\""
1300203-23 = "But this is a serious issue for me!"
1300203-24 = "I love eating all kinds of delicious foods, but I don't want you to remember me as that one student who smelled like garlic."
1300203-25 = "I need to come up with a solution..."
1300203-27 = "The next morning, the pungent stench of garlic bombarded my nose as soon as I stepped into the Schale Executive Office..."
1300203-28 = "Welcome, Sensei! I've been waiting for you!"
1300203-29 = "[s] \"What's with this smell...?\""
1300203-30 = "I looked up solutions on the internet yesterday, and apparently the human nose cannot distinguish a smell if it's exposed to a specific one for too long."
1300203-31 = "So, my solution is this: I'll bombard you with garlic smell, so much so that you won't smell anything odd when I'm nearby!"
1300203-32 = "All right, now. I've made some food with plenty of garlic in it for you, Sensei."
1300203-33 = "Garlic bread, garlic fried rice, garlic dumplings, garlic pickles..."
1300203-34 = "If we eat lots of garlic together, its scent will be nothing to us!"
1300203-36 = "Akari's food was great, but it made the Executive Office smell like garlic for four days straight..."

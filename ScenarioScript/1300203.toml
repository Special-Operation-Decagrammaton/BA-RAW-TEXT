[translation]
1300203-1 = "ยอมแพ้เจ้ากระเทียมไม่ได้!"
1300203-2 = "ห้องทำงานคุณครู สำนักงานชาเล่ต์"
1300203-6 = "หลังกินอาหารกลางวันเสร็จ อาคาริก็กลับมาด้วยใบหน้าที่ดูมีความสุขกว่าปกติ"
1300203-7 = "ฮืม ฮืมฮื้ม~ ฮืม ~♪"
1300203-8 = "อ่า.. อาหารกลางวันนี้อร่อยสุดๆ ไปเลย#nวันนี้ฉันไปลองกินที่ร้านใหม่มา มีความสุขจังเลยล่ะค่ะ"
1300203-9 = "คุณครูกินขนมปังเป็นอาหารกลางวันอีกแล้วอย่างนั้นเหรอคะ?"
1300203-10 = "แบบนั้นไม่โอเคเลยนะคะ คุณครูควรจะกินอาหารกลางวันให้อิ่มถ้าอยากจะมีแรงเหลือพอ#nในตลอดช่วงบ่าย คุณครูควรกินอะไรที่มีประโยชน์กว่านั้นนะคะ"
1300203-11 = "ถึงแม้ว่าคุณครูจะไม่อยากทำแบบนั้น คุณครูก็ควรไปกินที่ร้านอาหารแทนที่จะเป็น#nร้านสะดวกซื้อนะคะ ฉันรู้จักร้านดีๆ แถวชาเล่ต์ด้วย คุณครูน่าจะไปลองกินดูนะคะ!\n"
1300203-12 = "[s] \"อาคาริไปกินราเม็งตอนมื้อกลางวันมาใช่ไหม?\""
1300203-13 = "เอ๊ะ รู้ได้ยังไงคะเนี่ย?"
1300203-14 = "ใช่ค่ะ ฉันเพิ่งไปกินราเม็งตอนมื้อกลางวันมา มันมีร้านราเม็งเปิดใหม่อยู่ที่ด้านหน้าตึกชาเล่ต์น่ะค่ะ"
1300203-15 = "บนเมนูมีเขียนไว้ว่าจะเสิร์ฟราเม็ง 10 ชามยักษ์ให้ฟรีถ้าหากกินหมดได้ภายใน 30 นาที#nฉันกินสองชามรวดเลยเพราะมันอร่อยสุดๆ ไปเลยล่ะค่ะ!"
1300203-16 = "เขาเสิร์ฟราเม็งทงคตสึของแท้พร้อมกับซุปที่เข้มข้นและท็อปปิ้งอีกเพียบเลยด้วยค่ะ"
1300203-17 = "...ว่าแต่ คุณครูรู้ได้ยังไงคะว่ามื้อกลางวันฉันไปกินราเม็งมา?"
1300203-18 = "คะ? คุณครูได้กลิ่นกระเทียมบนตัวฉันเหรอคะ?"
1300203-19 = "แย่ล่ะสิ... ฉันพยายามแปรงฟันให้สะอาดที่สุดแล้วนะ แต่เหมือนจะยังมีกลิ่นกระเทียม#nติดตัวฉันอยู่ดีสินะคะ"
1300203-20 = "พอมาคิดดูแล้ว ในราเม็งมีหัวกระเทียมอยู่ 3 หัว และฉันกินมันไปหมดเลย...#nมิน่าล่ะฉันเลยมีกลิ่นเหมือนกระเทียม"
1300203-21 = "ฉันไม่อยากให้ตัวเองมีกลิ่นกระเทียมอยู่ต่อหน้าคุณครูเลย แต่ฉันก็ไม่อยากกินราเม็งทงคตสึ#nที่ไม่มีกระเทียมด้วยเหมือนกัน... จะทำยังไงดีคะ?"
1300203-22 = "[s] \"ครูไม่ว่าอะไรหรอกนะว่าจะมีกลิ่นเหมือนกระเทียมรึเปล่า\""
1300203-23 = "ไม่ค่ะ นี่มันเป็นปัญหาใหญ่สำหรับฉันนะคะ!"
1300203-24 = "ฉันชอบการกินอาหารที่อร่อยในทุกรูปแบบ แต่ฉันไม่อยากให้คุณครูจดจำฉันว่าเป็นนักเรียน#nที่มีกลิ่นเหมือนกระเทียมนะคะ"
1300203-25 = "ต้องหาวิธีแก้ปัญหาแล้วล่ะค่ะ..."
1300203-27 = "เช้าวันถัดมา กลิ่นที่รุนแรงของกระเทียมได้โชยเข้ามาที่จมูกทันทีที่ก้าวเข้าไปใน#nสำนักงานชาเล่ต์..."
1300203-28 = "ยินดีต้อนรับค่ะคุณครู! กำลังรอคุณครูอยู่เลยค่ะ!"
1300203-29 = "[s] \"นี่มันกลิ่นอะไรกัน...?\""
1300203-30 = "ฉันไปดูวิธีแก้ปัญหาในอินเทอร์เน็ตมาเมื่อวานนี้ค่ะ และได้พบกับความจริงว่าจมูก#nของคนจะแยกแยะกลิ่นไม่ได้ถ้าหากสูดดมกลิ่นใดกลิ่นหนึ่งเป็นเวลานานเกินไปค่ะ"
1300203-31 = "เพราะงั้นนี่ก็คือวิธีแก้ปัญหาของฉันค่ะ ฉันจะให้คุณครูดมกลิ่นกระเทียมเยอะๆ#nแบบไม่หยุดหย่อน ให้ถึงขั้นที่คุณครูจะไม่ได้กลิ่นอะไรแปลกๆ อีกต่อไป#nเมื่อฉันอยู่ใกล้ๆ เลยยังไงล่ะคะ!"
1300203-32 = "เอาล่ะ ฉันเตรียมอาหารที่มีกระเทียมเยอะๆ ไว้ให้คุณครูแล้วนะคะ"
1300203-33 = "ขนมปังกระเทียม ข้าวผัดกระเทียม เกี๊ยวซ่ากระเทียม กระเทียมดอง......"
1300203-34 = "ถ้าเรากินกระเทียมเยอะๆ ไปด้วยกัน กลิ่นของมันก็จะทำอะไรพวกเราไม่ได้อีกต่อไปค่ะ!"
1300203-36 = "อาหารที่อาคาริเตรียมไว้อร่อยอยู่ก็จริง แต่มันทำให้สำนักงานอบอวลไปด้วยกลิ่นกระเทียม#nติดต่อกันถึงสี่วัน..."

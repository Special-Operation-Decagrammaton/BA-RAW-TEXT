[translation]
1300203-1 = "#title;마늘은 포기할 수 없어"
1300203-2 = "#place;샬레 선생님 집무실"
1300203-3 = "5;아카리;02\n#5;al\n#wait;1000"
1300203-4 = "5;아카리;02\n#5;m4\n#5;em;[음표]\n#wait;1000"
1300203-5 = "5;아카리;02\n#5;m3\n#wait;1000"
1300203-6 = "#na;점심 식사 후, 아카리는 평소보다 더 즐거워 보이는 표정으로 돌아왔다."
1300203-7 = "5;아카리;99;흥, 흥흥~ 흥~ ♪\n#5;em;[음표]"
1300203-8 = "5;아카리;01;아아- 오늘 점심은 맛있었어요. #n모처럼 새로운 맛집을 발견해서 기분이 좋네요.\n#5;greeting"
1300203-9 = "5;아카리;04;선생님은 또 빵으로 점심을 때우셨나요?\n#5;em;[?!]\n#5;stiff"
1300203-10 = "5;아카리;99;안 돼요. 점심을 든든하게 먹지 않으면 오후 일과에 집중할 수 없다고요. #n좀 더 영양가 있는 음식을 드셔야죠."
1300203-11 = "5;아카리;02;귀찮더라도 식사는 편의점이 아니라 음식점을 이용하세요. 제가 나중에 샬레 근처의 맛집을 추천해 드릴게요!\n#5;greeting"
1300203-12 = "[s] \"아카리는 점심에 라멘 가게에 갔었어?\""
1300203-13 = "5;아카리;04;어라, 어떻게 아셨나요?\n#5;stiff\n#5;em;[?]"
1300203-14 = "5;아카리;01;말씀하신 대로 오늘 점심에는 라멘을 먹었어요. 샬레 건물 앞에 새로 생긴 라멘 가게가 하나 있더라구요."
1300203-15 = "5;아카리;99;메뉴판에 10인분짜리 점보 라멘이 30분 내로 먹으면 무료라고 써 있어서, 두 그릇이나 연달아 먹었답니다! 맛있었어요~.\n#5;em;[반짝]"
1300203-16 = "5;아카리;01;고명도 푸짐하게 올려져 있었고, 국물도 진한 것이 제대로 된 돈코츠 라멘이었어요."
1300203-17 = "5;아카리;04;……그나저나 선생님께서는 제가 점심으로 라멘을 먹었다는 걸 어떻게 알아차리셨나요?\n#5;em;[?]"
1300203-18 = "5;아카리;04;네? 제 몸에서 마늘 냄새가 나서 알아차리셨다고요?\n#5;stiff"
1300203-19 = "5;아카리;04;이런…… 제대로 양치를 했다고 생각했는데, 아직도 몸에 마늘 냄새가 배어 있었나 보네요.\n#5;em;[땀]"
1300203-20 = "5;아카리;99;확실히 생마늘을 통째로 세 개나 넣은 데다가 국물도 끝까지 마셔버렸으니…… 몸에서 마늘 냄새가 날 법도 하네요."
1300203-21 = "5;아카리;04;선생님 앞에서 마늘 냄새를 풍기고 싶지는 않지만, 그렇다고 마늘없이 돈코츠 라멘을 먹자니 또 아쉽고…… 이를 어쩌죠?\n#5;em;…"
1300203-22 = "[s] \"나는 마늘 냄새가 나더라도 상관없어.\""
1300203-23 = "5;아카리;04;아뇨. 이건 소녀의 순정이 걸린 중대사항이라고요!\n#5;jump\n#5;em;[!]"
1300203-24 = "5;아카리;99;맛있는 걸 잔뜩 먹는 건 좋지만, 선생님께 마늘 냄새나는 학생으로 기억되고 싶지는 않으니까요."
1300203-25 = "5;아카리;04;무언가 방법을 찾아봐야겠어요…….\n#5;em;…"
1300203-26 = "#all;hide"
1300203-27 = "#na;다음 날 아침. 샬레의 집무실에 들어서자마자 강렬한 마늘 냄새가 코를 찔러왔다……."
1300203-28 = "3;아카리;03;어서오세요, 선생님! 기다리고 있었어요!\n#3;a\n#3;greeting\n#3;em;[반짝]"
1300203-29 = "[s] \"이 강렬한 마늘 냄새는 도대체…….\""
1300203-30 = "3;아카리;01;어제 돌아가서 여러가지 방법을 찾아보았는데, 인터넷의 정보에 따르면 사람의 후각은 같은 냄새를 오래 맡으면 냄새를 구별할 수 없게 된다고 하더라고요."
1300203-31 = "3;아카리;02;그래서 생각해 낸 방법이 바로— 선생님께 마늘 냄새를 잔뜩 맡게 해서 제 몸에서 나는 마늘 냄새를 알아차리지 못하게 만드는 방법이에요!\n#3;em;[음표]\n#3;greeting"
1300203-32 = "3;아카리;03;자, 자. 선생님을 위해 마늘이 잔뜩 들어간 음식을 준비했어요.\n#3;hophop"
1300203-33 = "3;아카리;99;마늘빵, 마늘 볶음밥, 마늘 교자, 마늘 초절임……."
1300203-34 = "3;아카리;03;마늘을 잔뜩 먹고 같이 마늘 향에 익숙해지는 거예요!\n#3;em;[반짝]\n#3;jump\n#3;closeup"
1300203-35 = "#all;hide"
1300203-36 = "#na;아카리가 준비해 온 음식은 맛있었지만, 이후 사흘이 넘도록 집무실에서는 마늘 냄새가 빠지질 않았다……."

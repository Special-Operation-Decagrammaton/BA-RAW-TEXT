[translation]
10014070-1 = "ตอนที่ 7;พวกเราคือ 'แก๊งของหวานหลังเลิกเรียน'"
10014070-8 = "แฮ่ก... แฮ่ก... นี่มัน..."
10014070-9 = "ปกติฉันต้องเป็นฝ่ายไล่ตามตลอด จู่ๆ ก็ได้รับความสนใจมากมายขนาดนี้ ไม่รู้จะทำตัวยังไงดีเลยค่ะ"
10014070-10 = "ถึงจะไม่อยากยอมรับสักเท่าไร แต่ไม่เคยมีคนมากมายขนาดนี้ตามหาฉันมาก่อนเลยค่ะ...! ฮะฮ่า..."
10014070-14 = "น่าขนลุกจริงๆ... ยัยนี่จะอดทนไปถึงเมื่อไรกันเนี่ย!?"
10014070-15 = "ทนไม้ทนมือไม่ใช่เล่นเลยนะ โดนไปขนาดนั้นแล้วยังไม่เป็นไรสักนิด... สุดยอดไปเลย..."
10014070-16 = "ปลาบปลื้มใจอะไรของเธอน่ะหา! เสียสติไปแล้วรึไง นั่นมันศัตรูนะ!"
10014070-17 = "ไม่มีเวลาแล้ว ถึงจะอยู่นอกโรงเรียนแต่ถ้าก่อความวุ่นวายทั้งคืนแบบนี้ พรุ่งนี้เช้าต้องมีคนมาจัดการแน่"
10014070-18 = "ก่อนจะถึงตอนนั้นเราต้องล้วงข้อมูลของแคทส์ พาลูคให้ได้!!"
10014070-19 = "ใช่แล้ว ไม่มีวิธีอื่นแล้วละ"
10014070-20 = "ทุกคนถือปืนขึ้นมา!! กดดันเข้าไปจนกว่าจะยอมพูด!!"
10014070-25 = "ฉันก็บอกไปแล้วนี่คะว่าบอกไม่ได้หรอก... ฮะฮะ..."
10014070-26 = "ไม่คิดมาก่อนเลยว่าจะมีวันที่ฮีโร่ของทุกคนอย่างอุซาวะ เรอิสะจะต้องมาต่อสู้เพื่อแคทส์ พาลูค..."
10014070-27 = "ต้องมีชีวิตยืนยาวถึงจะได้เห็นเรื่องแบบนี้สินะคะ"
10014070-28 = "ถึงฉันจะเพิ่งอายุ 15 เองก็เถอะค่ะ!"
10014070-29 = "แต่ก็... ก็ดีค่ะ มาตัดสินแพ้ชนะกันสักตั้ง... จนถึงเช้าไปเลยค่ะ..."
10014070-30 = "ฉันน่ะ... สู้แบบนี้ทั้งวันก็ยังไหวค่ะ... แฮ่ก...แฮ่ก..."
10014070-31 = "ถึงจะพูดแบบนั้นแต่เสียงฟังดูไม่ไหวแล้วนะ..."
10014070-32 = "...?"
10014070-33 = "หืม...? เหมือนได้ยินเสียงคุ้นๆ เลยแฮะ..."
10014070-34 = "ฉันถึงบอกไงล่ะ ถ้าเอาแต่พูดจาดูอวดเก่งแบบนั้นมันจะยิ่งดูอ่อนแอกว่าเดิมน่ะ เวลาใครบอกอะไร#nก็หัดจำซะบ้างสิ"
10014070-38 = "ฮะฮ่า นี่มันเรื่องอะไรกัน หลอนจนถึงขั้นได้ยินเสียงแคทส์ พาลูคเลยเหรอเนี่ย..."
10014070-39 = "ท่าทางจะกระทบกระเทือนทางจิตใจน่าดูเลยละค่ะ คนแบบนั้นใจแคบจริงๆ เลยนะคะ"
10014070-40 = "อะ... อะไรน่ะ? เสียงใครกัน? เสียงดังมาจากทางไหน?"
10014070-41 = "...?"
10014070-42 = "เอ๊ะ...?"
10014070-43 = "หลังกำแพง! ข้างหลังกำแพงตอนนี้..."
10014070-44 = "...?"
10014070-50 = "...!!"
10014070-51 = "!!! ทุกคนถอยเร็ว!! ระเบิด!!"
10014070-56 = "แค่กๆ แค่กๆๆ...! ตกใจหมดเลย...! ทำไมจู่ๆ ก็มีระเบิด...!"
10014070-57 = "นี่! ไม่เป็นไรใช่มั้ย? มีใครบาดเจ็บรึเปล่า!?"
10014070-58 = "อือ ก็... ไม่รู้ว่าทำไม... ทุกคนแค่ตกใจกันเฉยๆ น่ะ"
10014070-59 = "ใครมันมาโจมตีกันแบบนี้...!"
10014070-62 = "อืม... ดีละ"
10014070-63 = "คงจะมาถูกที่แล้วสินะ"
10014070-64 = "อุซาวะ..."
10014070-65 = "หืม...?"
10014070-68 = "เอ่อ..."
10014070-69 = "เอ๊ะ..."
10014070-70 = "[s1] \"คงตกใจระเบิดจนหมดสติไปน่ะ\"\n[s2] \"ดูเหมือนจะไม่ได้รับบาดเจ็บนะ โล่งอกไปที\""
10014070-71 = "อืม..."
10014070-72 = "อืม..."
10014070-75 = "อะไรของยัยนี่น่ะ! นี่!! เธอเป็นใคร? นี่เป็นฝีมือเธองั้นเหรอ!?"
10014070-76 = "อยากตายรึไง!? หาา!? คิดจะทำอะไรกันแน่? ทำแบบนี้รู้มั้ยว่าที่นี่ที่ไหนและพวกเราเป็นใคร? ห้ะ?"
10014070-80 = "หือ? อะไรน่ะ นี่ ไม่ได้ยินที่พูดรึไง? พูดไม่ออกเลยล่ะสิ?"
10014070-84 = "...?"
10014070-85 = "อะไรเนี่ย แล้วตัวเล็กๆ นี่ใครอีก..."
10014070-95 = "เป็นพวกไร้มารยาทอย่างถ่องแท้เลยสินะ..."
10014070-96 = "พวกเธอนั่นแหละ รู้รึเปล่าว่าเธอคนนี้คือใคร ถึงได้มาทำแบบนี้?"
10014070-97 = "ถ้าจะให้พูด เธอคนนี้ก็คือราชาแห่งพื้นที่อาชญากรรมที่เก็บซ่อนพลังเอาไว้"
10014070-98 = "ปีศาจสุดน่ากลัวที่กำลังจะฟื้นคืนชีพมายึดครองพื้นที่ตรงนี้..."
10014070-102 = "...!?"
10014070-103 = "ไม่นะ ไม่สิ! เดี๋ยว!! นัตสึ! นี่!! ขอร้องละ...นัตสึ!"
10014070-110 = "เอาเลย! เอาอีก! เอาเท่าที่นัตสึของพวกเราต้องการเลย!!"
10014070-115 = "โอ้ว แจ๋วเลย!"
10014070-121 = "นัตสึของพวกเราเก่งมาก!!"
10014070-125 = "ปีศาจสุดน่ากลัว..."
10014070-126 = "...<แคทส์ พาลูค> ยังไงล่ะ!!!"
10014070-128 = "คะ... แคทส์ พาลูค...!? แคทส์ พาลูคเหรอ!? จริงเหรอ!?"
10014070-129 = "วะ... ว่าแล้วเชียว ข่าวลือเป็นความจริงสินะ! เห็นไหมล่ะ! บอกแล้วว่าเรื่องจริง!!"
10014070-131 = "ส่วนพวกเราก็คือลูกน้องของเธอ จตุรเทพแห่ง <แก๊งของหวานหลังเลิกเรียน>!!"
10014070-132 = "อ่า...? เอ๊ะ? จตุรเทพ?"
10014070-133 = "[s3] \"ดูเหมือนว่าจะรวมครูไปด้วยสินะ\"\n[s4] \"จตุรเทพ? ครูได้เลื่อนขั้นแล้วเหรอ?\""
10014070-134 = "ว่าไงนะ...!! ฉันไม่เกี่ยวนะ!! ฉันไม่ได้เป็นลูกน้องของยัยนั่นสักหน่อย...!!"
10014070-135 = "ว่าไงนะ...!! ฉันไม่เกี่ยวนะ!! ฉันไม่ได้เป็นลูกน้องของยัยนั่นสักหน่อย...!!"
10014070-136 = "ยะ...โยชิมิจัง เอาเป็นว่าครั้งนี้ยอมๆ ไปก่อนเถอะนะ..."
10014070-137 = "ให้ยอมไปก่อนงั้นเหรอ!!  ถึงอย่างนั้นก็เถอะ ให้เป็นลูกน้องของยัยนั่นฉันก็ขอปฏิเสธ!! เข้าใจมั้ย!?"
10014070-138 = "[s5] \"เดี๋ยวก่อน โยชิมิ ดูหน้าคาซึสะสิ\"\n[s6] \"เห็นหน้าแล้วยังพูดแบบนั้นได้เหรอ?\""
10014070-139 = "...??? หืม? หน้าเหรอ?"
10014070-140 = "...??? หืม? หน้าเหรอ?"
10014070-141 = "หน้าแบบไหน..."
10014070-145 = "หึ..."
10014070-146 = "...ก็บอกว่าอย่าไงเล่า...! จริงๆ เลย! พวกเธอทุกคนตายแน่...!!"
10014070-150 = "......"
10014070-151 = "พวกเราคือจตุรเทพแห่งแก๊งของหวานหลังเลิกเรียน!!"
10014070-152 = "พวกเราทุกคนยกเว้นคุณครู ลุยกันเลยยยย-!!"
10014070-153 = "เอาเลยยยย-!!"
10014070-154 = "หวาาา-!?"
10014070-155 = "ว้ากกก-!!!"
10014070-160 = "[ns7] \"ว้ากกกก-!\"\n[ns8] \"อ๊ะ ครูต้องอยู่ข้างหลังสินะ\""
10014070-163 = "เจ้า...พวกบ้านี่..."
10014070-164 = "ทั้งเจ้าพวกนี้แล้วก็พวกนั้น... อุซาวะ พวกแยงกี้สาว แล้วก็คุณครูด้วย ทุกคน..."
10014070-166 = "เดี๋ยวไว้จะจัดการให้หมดรวดเดียวเลย..."

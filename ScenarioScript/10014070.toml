[translation]
10014070-1 = "第7話;我們是「放學後的甜點團」"
10014070-8 = "哈啊，哈啊……#n這還真是……"
10014070-9 = "平常都是我在進攻，突然受到這種歡迎會讓我有點困擾呢。"
10014070-10 = "真不幸，這居然是第一次這麼多人有事找我……！#n哈哈……"
10014070-14 = "真難纏啊……這傢伙打算要掙扎到什麼時候啊！！"
10014070-15 = "沒想到竟然這麼耐打，難怪可以到處找人決鬥之類的……#n真厲害。"
10014070-16 = "你在佩服個什麼勁啊！清醒一點，他可是敵人啊！？"
10014070-17 = "沒時間了，就算是在郊外，一直鬧下去的話會被發現的。"
10014070-18 = "得在有人來之前問出凱茜．帕魯格的事才行！"
10014070-19 = "啊啊，沒錯。"
10014070-20 = "把槍拿好！！既然這樣就打到他願意說為止！！"
10014070-25 = "都說了，我不會告訴你們的……哈哈……"
10014070-26 = "大家的英雄──宇沢澪紗竟然會有為了凱茜．帕魯格戰鬥的一天啊……#n真是不可思議。"
10014070-27 = "活得久果然就會遇到各種事呢。"
10014070-28 = "──雖然我才15歲就是了。"
10014070-29 = "……好吧。#n就陪你們……打到早上吧……"
10014070-30 = "我……要再陪你們一整天……都沒問題……"
10014070-31 = "……雖然嘴巴上這麼說，聲音卻一點霸氣都沒有啊。"
10014070-32 = "……？"
10014070-33 = "……嗯？#n是我聽錯了嗎……好像有個熟悉的聲音……"
10014070-34 = "所以之前不就跟你說過了嗎。#n太纏人是不好的，好好記住別人說的話啊。"
10014070-38 = "哈哈……竟然會幻聽到凱茜．帕魯格的聲音……"
10014070-39 = "看來我的內心相當寂寞呢……真是軟弱。"
10014070-40 = "什，什麼？是誰的聲音？#n從哪裡傳來的？"
10014070-41 = "……？"
10014070-42 = "咦……？"
10014070-43 = "是那裡！！#n剛剛那面牆的後面……"
10014070-44 = "……？"
10014070-50 = "……！！"
10014070-51 = "！！！#n快閃開！！是炸彈！！"
10014070-56 = "咳，咳咳……！#n突然就爆炸了……！"
10014070-57 = "喂！！你們沒事吧？有受傷嗎？"
10014070-58 = "啊啊，嘛……勉勉強強……"
10014070-59 = "到底是誰會做這種事……！"
10014070-62 = "……嗯，好。"
10014070-63 = "看來這邊是對的呢。"
10014070-64 = "宇沢……"
10014070-65 = "嗯……？"
10014070-68 = "啊……"
10014070-69 = "……咦？"
10014070-70 = "[s1] 「好像是被爆炸的衝擊震暈了。」\n[s2] 「太好了，看起來沒有受傷。」"
10014070-71 = "……嗯。"
10014070-72 = "……嗯。"
10014070-75 = "喂！你這傢伙是誰啊？#n剛才是你幹的嗎！？"
10014070-76 = "想被打飛嗎！？啊啊！？#n看你都幹了什麼好事，知道我們是誰嗎？你這傢伙！"
10014070-80 = "啊？這傢伙搞什麼啊。#n哈囉！你有聽見嗎？無口系的？"
10014070-84 = "……什麼？"
10014070-85 = "這個小不點……"
10014070-95 = "……真是無禮。"
10014070-96 = "你們幾個，不知道這是誰嗎？"
10014070-97 = "這位正是藏起了爪子潛伏至今的暗黑街的女帝。"
10014070-98 = "不久之後即將復活並支配這一帶的恐怖魔獸……"
10014070-102 = "……！？"
10014070-103 = "不，不是！等等！！夏！#n喂！！停下來，求你了……！"
10014070-110 = "說的真好！"
10014070-115 = "來吧，趕快多說一點！"
10014070-121 = "夏最棒了！"
10014070-125 = "……恐怖的魔獸。"
10014070-126 = "……「凱茜．帕魯格」大人！！！"
10014070-128 = "凱，凱茜．帕魯格……！？#n你說凱茜．帕魯格！？真的嗎！？"
10014070-129 = "果，果然傳聞是真的啊……#n你看，我就說是真的吧！！"
10014070-131 = "而我們是他的手下──「放學後的甜點團」的四大天王！！"
10014070-132 = "……咦……？嗯？#n四大天王？"
10014070-133 = "[s3] 「好像把我也算進去了呢。」\n[s4] 「四大天王的一員……我終於出人頭地了？」"
10014070-134 = "咦！？等等！！我不是！！#n我才不是那傢伙的手下……"
10014070-135 = "咦！？等等！！我不是！！#n我才不是那傢伙的手下……"
10014070-136 = "喜，喜美醬！#n這裡就配合一下吧……？"
10014070-137 = "才不要！！不管怎樣都不要被當成是那傢伙的手下！！"
10014070-138 = "[s5] 「喜美，你看千紗的表情。」\n[s6] 「你看了之後還能說得出那種話嗎？」"
10014070-139 = "……表情？"
10014070-140 = "……表情？"
10014070-141 = "什麼表情……"
10014070-145 = "開……"
10014070-146 = "開什麼玩笑……趕快停下來……！！#n我是認真……！想把你們所有人……全部揍飛……！？"
10014070-150 = "……"
10014070-151 = "我們是「放學後的甜點團」的四大天王！！"
10014070-152 = "各位，除了老師之外大家衝啊──！！"
10014070-153 = "要上囉──！！"
10014070-154 = "要上了──！？"
10014070-155 = "GOGO！！"
10014070-160 = "[ns7] 「GOGO！」\n[ns8] 「啊，我得待在後面才行。」"
10014070-163 = "……你們。"
10014070-164 = "你們每個傢伙……不管是宇沢、太妹還是老師……所有人……"
10014070-166 = "等等給我做好覺悟……"

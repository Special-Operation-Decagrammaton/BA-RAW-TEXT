[translation]
1301402-1 = "泳裝與防禦力"
1301402-4 = "（聽說蓮華打算穿泳裝到山上去，於是慌慌張張地跟了過來）"
1301402-8 = "哦，師父？你來得比我想像中還快耶？"
1301402-9 = "[s]「原來你的意思是要去瀑布啊。」"
1301402-10 = "畢竟是需要穿泳裝的地方嘛。"
1301402-11 = "而且我還是有基本常識的好嗎！"
1301402-12 = "[s]「我還以為蓮華打算穿泳裝爬山呢。」"
1301402-13 = "呃，這個嘛……"
1301402-14 = "其實……我確實是穿著泳裝爬山沒錯。"
1301402-15 = "[s]「你還真的這麼做了！？」"
1301402-16 = "因為我在制服裡……事先穿好泳裝了。"
1301402-17 = "[s]「……！！」"
1301402-29 = "怎，怎麼樣呢？#n雖然有點害羞……但我覺得這也是青春的一部分……"
1301402-30 = "師父你……該不會也在衣服裡穿了泳裝吧？"
1301402-31 = "[s1]「……嗯。」\n[s2]「雖然沒穿著，但我有帶來！」"
1301402-32 = "不愧是師父！我們真的很合得來耶！"
1301402-33 = "呵呵，畢竟實在有點突然嘛。"
1301402-37 = "那我們就趕緊開始泳裝修煉吧。"
1301402-38 = "師徒一起……來場瀑布修煉！"
1301402-44 = "（於是和蓮華一起穿著泳裝站在瀑布下）"
1301402-48 = "哇！整個人都清醒了耶！#n師父你覺得怎麼樣！？"
1301402-49 = "[s]「唔，唔哇啊啊啊……！冷到我的頭都快裂開了！！」"
1301402-50 = "呵呵，叫得還真誇張。"
1301402-54 = "話說回來，穿上泳裝之後，感覺防禦力好像變高了耶？"
1301402-55 = "總覺得……好像真有那麼一回事。"
1301402-56 = "因為穿上泳裝就會想表現出該有的樣子，能讓人更集中精神……"
1301402-57 = "應該說是心靈上的防禦力變高了吧……"
1301402-58 = "師父你覺得呢？"
1301402-59 = "[s3]「瀑布太強了……」\n[s4]「要，要被沖走了……！」"
1301402-62 = "嗯，這種感覺也是精神防禦力提升的一部分。"
1301402-63 = "如果不一直集中精神的話，泳裝就會被沖走嘛。"
1301402-64 = "[s]「這種事靠集中精神就能解決嗎！？」"
1301402-65 = "你看我現在很專注，所以就沒問題啊？#n師父你……"
1301402-70 = "……！？"
1301402-71 = "[s5]「……好像有點涼颼颼的？」\n[s6]「我的泳裝去哪了……？」"
1301402-77 = "等，等我一下！我去幫你找回來！"
1301402-82 = "（過了一會……）"
1301402-86 = "啊！找到了！在這裡！"
1301402-87 = "[s7]「雖，雖然很謝謝你幫我找回來……！」\n[s8]「但是別帶著燦爛的笑容揮舞別人的泳裝好嗎……！」"
1301402-91 = "我閉上眼睛了，快過來吧！"
1301402-92 = "什麼都不會看到的哦。"
1301402-93 = "呵呵，這種事也挺青春有趣的呢。"
1301402-98 = "[ns]「除了閉眼之外，也麻煩你把頭轉過去……！」"
1301402-102 = "啊，抱歉！嘿嘿！"
1301402-104 = "（……之後又繼續和蓮華在瀑布下修煉）"

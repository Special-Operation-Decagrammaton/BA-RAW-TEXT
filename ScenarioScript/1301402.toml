[translation]
1301402-1 = "Swimsuits and Defense"
1301402-4 = "After Renge told me she was going to the mountains in her swimsuit, I rushed over to meet her."
1301402-8 = "Oh, Mentor? You're here early."
1301402-9 = "[s] \"Ah. You wanted to go to a waterfall.\""
1301402-10 = "Why else would I wear my swimsuit?"
1301402-11 = "I do have some amount of common sense, you know!"
1301402-12 = "[s] \"I really thought you wanted to climb the mountain in your swimsuit.\""
1301402-13 = "U-Umm... Well..."
1301402-14 = "Technically, I kind of did."
1301402-15 = "[s] \"Seriously?!\""
1301402-16 = "I'm...wearing my swimsuit underneath my uniform right now."
1301402-17 = "[s] \"...!\""
1301402-29 = "Wh-What do you think? I guess embarrassing things like this are a part of someone's youth too..."
1301402-30 = "Is there any chance you wore your swimsuit under your clothes too, Mentor?"
1301402-31 = "[s1] \"...Yes, I did.\"\n[s2] \"I'm not wearing one, but I did bring it!\""
1301402-32 = "Haha! We really do think alike, Mentor!"
1301402-33 = "Fufu. I did spring this on you out of nowhere."
1301402-37 = "Preparations are complete! Let's begin our swimsuit training!"
1301402-38 = "It's a waterfall episode, featuring the mentor and disciple!"
1301402-44 = "Renge and I stood underneath the waterfall together."
1301402-48 = "Wow, I feel alive! How are you doing, Mentor?!"
1301402-49 = "[s] \"C-C-Cold! I'm getting a brain freeze!\""
1301402-50 = "Fufu. You're being dramatic!"
1301402-54 = "Doesn't wearing a swimsuit feel like it raises your defenses?"
1301402-55 = "Ah. Um. How do I explain?"
1301402-56 = "I feel like I need to act appropriately to how I'm dressed, so it sharpens my mind."
1301402-57 = "So not my physical defenses, but my mental ones..."
1301402-58 = "Do you know what I mean, Mentor?"
1301402-59 = "[s3] \"This waterfall is too strong...\"\n[s4] \"I-It might fall off...!\""
1301402-62 = "Exactly! And so it raises my mental defenses!"
1301402-63 = "You have to keep your spirits high, otherwise your swimsuit will fall off."
1301402-64 = "[s] \"How are those two things correlated?!\""
1301402-65 = "Take a look. My sharpened state of mind ensures my safety, while for you, Mentor..."
1301402-70 = "...?!"
1301402-71 = "[s5] \"...Does it feel a little breezy all of a sudden?\"\n[s6] \"Where did my swimsuit go...?\""
1301402-77 = "D-Don't move an inch! I'll find it!"
1301402-82 = "A little while later..."
1301402-86 = "Aha! Found it! Here you go!"
1301402-87 = "[s7] \"Th-Thank you for finding it...!\"\n[s8] \"Please stop swinging it around!\""
1301402-91 = "My eyes are closed, so hurry and grab it!"
1301402-92 = "I promise I didn't see anything."
1301402-93 = "Fufu, this is fun. I think this is a part of \"youth\" as well."
1301402-98 = "[ns] \"Stop! Turn around completely! Right now!\""
1301402-102 = "Ah, sorry! Heehee!"
1301402-104 = "...After the swimsuit debacle, I was much more focused for the remainder of our waterfall training."

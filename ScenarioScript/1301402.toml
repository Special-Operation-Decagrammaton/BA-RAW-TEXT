[translation]
1301402-1 = "ชุดว่ายน้ำกับพลังป้องกัน"
1301402-4 = "(พอรู้ว่าเรนเกะจะใส่ชุดว่ายน้ำเข้าไปในภูเขา คุณครูก็รีบตามไป)"
1301402-8 = "โอ้ ท่านอาจารย์? มาเร็วกว่าที่คิดอีกแฮะ?"
1301402-9 = "[s] \"หมายถึงจะมาน้ำตกนี่เองสินะ\""
1301402-10 = "ก็มันเป็นที่ที่ใส่ชุดว่ายน้ำได้นี่นา"
1301402-11 = "เห็นอย่างนี้ฉันก็มีสามัญสำนึกกับเขาเหมือนกันนะ!"
1301402-12 = "[s] \"ครูคิดว่าเรนเกะจะมาเดินป่าในชุดว่ายน้ำเสียอีก\""
1301402-13 = "อะ... อืมม..."
1301402-14 = "ที่จริง... ฉันก็เดินป่าในชุดว่ายน้ำมาแล้วเหมือนกัน"
1301402-15 = "[s] \"จริงเหรอ?!\""
1301402-16 = "ก็ฉัน... ใส่ชุดว่ายน้ำไว้ในชุดนักเรียนอีกทีน่ะ"
1301402-17 = "[s] \"...!!\""
1301402-29 = "ทะ... ทำไมเหรอ? ถึงมันจะน่าเขินอยู่บ้าง... แต่ฉันก็คิดว่ามันคือการผจญภัยของวัยรุ่น..."
1301402-30 = "ว่าแต่ท่านอาจารย์... ใส่ชุดว่ายน้ำมาข้างในด้วยหรือเปล่า?"
1301402-31 = "[s1] \"อื้อ... แค่พกมาด้วยน่ะ\"\n[s2] \"ครูยังไม่ได้ใส่ แต่ก็เตรียมมาแล้วนะ!\""
1301402-32 = "สมแล้วที่เป็นท่านอาจารย์! ใจตรงกับฉันที่สุดเลย!"
1301402-33 = "ฮุฮุ ถึงมันจะกะทันหันไปหน่อยก็เถอะนะ"
1301402-37 = "งั้นเรามาเริ่มฝึกในชุดว่ายน้ำกันเถอะ"
1301402-38 = "นี่คือการฝึกในน้ำตก... ของท่านอาจารย์กับลูกศิษย์!"
1301402-44 = "(แล้วคุณครูก็ใส่ชุดว่ายน้ำไปยืนใต้น้ำตกกับเรนเกะ)"
1301402-48 = "โห! เย็นฉ่ำจนฉันตื่นเลย! ท่านอาจารย์ล่ะเป็นยังไงบ้าง!?"
1301402-49 = "[s] \"วะ... เหวออออ...! เย็นจนปวดหัวเลย!!\""
1301402-50 = "ฮุฮุ แสดงเก่งใช้ได้เลยนะเนี่ย"
1301402-54 = "จะว่าไป พอใส่ชุดว่ายน้ำแล้วท่านอาจารย์รู้สึกว่าพลังป้องกันเพิ่มขึ้นหรือเปล่า?"
1301402-55 = "อืม... สำหรับฉัน... รู้สึกเหมือนคำพูดนั้นเป็นเรื่องจริงเลยละ"
1301402-56 = "พอคิดว่าต้องทำพฤติกรรมให้เข้ากับชุดว่ายน้ำ ฉันก็ได้สติขึ้นมา... "
1301402-57 = "แต่พลังป้องกันที่เพิ่มขึ้นมา มันดูจะเป็นพลังป้องกันทางใจมากกว่าทางกายนะ..."
1301402-58 = "แล้วท่านอาจารย์ล่ะคิดยังไง?"
1301402-59 = "[s3] \"น้ำตกไหลแรงมากเลย...\"\n[s4] \"มะ... เหมือนชุดจะหลุดเลย...!\""
1301402-62 = "อืม เพราะอย่างนี้ละฉันถึงได้รู้สึกว่าพลังป้องกันทางใจสูงขึ้น"
1301402-63 = "ถ้าเราไม่ตั้งสมาธิเอาไว้ ชุดว่ายน้ำก็จะหลุดได้ยังไงล่ะ"
1301402-64 = "[s] \"ใช้สมาธิควบคุมชุดที่จะหลุดได้งั้นเหรอ?!\""
1301402-65 = "ไม่เชื่อก็ดูฉันสิ ฉันตั้งสมาธิเอาไว้ ก็เลยยังไม่สะทกสะท้านอยู่แบบนี้ไง ส่วนท่านอาจารย์น่ะ..."
1301402-70 = "...?!"
1301402-71 = "[s5] \"ทำไมรู้สึกว่างเปล่าแปลกๆ...?\"\n[s6] \"ชุดว่ายน้ำครูหายไปไหนแล้ว...?\""
1301402-77 = "ระ... รออยู่ตรงนั้นนะ! ฉันจะไปหามาให้เอง!"
1301402-82 = "(ครู่ต่อมา...)"
1301402-86 = "อ๊ะ! เจอแล้ว! อยู่ตรงนี้ไง ตรงนี้!"
1301402-87 = "[s7] \"ขะ... ขอบใจที่ช่วยหาให้นะ แต่อย่ามองมันได้มั้ย...!\"\n[s8] \"อย่าถือชุดว่ายน้ำของครูแล้วยิ้มแฉ่งแบบนั้นสิ...!\""
1301402-91 = "ฉันหลับตาให้อยู่นี่ไง รีบมารับไปสิ!"
1301402-92 = "ฉันไม่เห็นอะไรเลย"
1301402-93 = "ฮุฮุ แบบนี้ก็เป็นกิจกรรมของวัยรุ่นที่สนุกเหมือนกันแฮะ"
1301402-98 = "[ns] \"หลับตาแล้วก็หันไปข้างหลังด้วย...!\""
1301402-102 = "อ๊ะ ขอโทษที! แหะๆ!"
1301402-104 = "(หลังจากนั้นคุณครูกับเรนเกะก็ฝึกฝนใต้น้ำตกกันต่อ)"

[translation]
2000303-1 = "所謂的正義"
2000303-2 = "三一．教室"
2000303-3 = "正義……不管什麼時候聽起來都是這麼悅耳。#n這世界上還有比它更美妙的詞彙嗎？"
2000303-4 = "我們實現正義部，就是為了在奇普托斯伸張正義，以及規勸那些不義之人而存在的。"
2000303-5 = "我以前都抱持著「前輩們所做的一切都是正義、格黑娜學園的人所做的一切都是邪惡」的想法戰鬥……但是最近我的看法稍微有些改變了。"
2000303-6 = "當，當然，這並不代表我不信任前輩他們！"
2000303-7 = "但是，前輩們終究會畢業，遲早有一天需要由我來帶領實現正義部。到了那個時候，我就必須依照自己的判斷來執行正義了。"
2000303-8 = "所以說，我有必要好好的了解，所謂的正義究竟代表了什麼。"
2000303-9 = "為了這個我準備了這本，話題名作──《談談正義吧》！"
2000303-10 = "[s] 「《談談正義吧》……？」"
2000303-11 = "果然，不愧是本能夠引起話題的好書。#n書上舉了許多如何在各種情況下判斷是非善惡的例子。"
2000303-12 = "舉例來說……會欺負別人的人是邪惡，而為人們治療各種疾病的醫生則是正義；能帶給人們喜悅的美味食物是正義，而讓人反感的食物則是邪惡。"
2000303-13 = "你不覺得判斷地非常明確嗎？#n這就是我會喜歡正義的其中一個原因。"
2000303-14 = "但是，書上寫的某些例子，以我的能力實在是難以判斷，光是要理解就花了不少時間。"
2000303-15 = "方便的話可以請老師和我一起思考，然後教我究竟怎麼樣的行為才是正義的，好嗎？"
2000303-16 = "[s] 「沒問題，說給我聽聽看吧。」"
2000303-17 = "好的，首先是第一個例子。"
2000303-18 = "「假設你是一名火車的駕駛員。有一天，在你正準備開過去的軌道上，發現了有5個人被綁在那裡動彈不得。」"
2000303-19 = "「如果你選擇改走另一條路線的話，雖然能夠拯救這5個人的性命，卻會讓火車輾過新路線上的另一個人。在這個情況下，哪個選擇才是正確的呢？」"
2000303-20 = "唔嗯……真是困難的問題呢。為了拯救多數而改變路線雖然好像是個正確的決定，卻會讓一個本來不該死在這裡的人，被火車給輾過去。"
2000303-21 = "是該阻止本來不該發生的死亡，抑或是該拯救更多的生命。兩者之間，究竟哪個才是更加正確的選擇呢？"
2000303-22 = "[s] 「書上是怎麼寫的呢？」"
2000303-23 = "書上寫……這只是一個心理測驗，並不存在標準答案。"
2000303-24 = "正義竟然沒有標準答案，這怎麼可能。"
2000303-25 = "所謂的正義，應該一直都有最佳解存在的才對呀……"
2000303-26 = "[s] 「如果是麻白的話會怎麼選擇呢？」"
2000303-27 = "唔嗯……難道就沒有能夠拯救所有人的方法嗎。"
2000303-28 = "就算這樣是違背了出題者的用意，我也不想就這樣放棄。"
2000303-29 = "不管在什麼情況下，我都會絞盡腦汁、全力以赴，想辦法拯救所有人的。"
2000303-31 = "因為，這才是正義之道！"
2000303-33 = "（和麻白一起看書，度過了愉快的時光）"

[translation]
2000303-1 = "ความยุติธรรมคืออะไรกันแน่"
2000303-2 = "ห้องเรียนในสถาบันทรีนิตี้"
2000303-3 = "ความยุติธรรม...ฟังดูไพเราะทุกครั้งที่ได้ยินเลยนะคะ จะมีคำไหนที่ฟังแล้วรื่นหูกว่านี้อีกเหรอคะ?"
2000303-4 = "พวกเราชมรมทวงความยุติธรรมพยายามจะสร้างความยุติธรรมในคิโวทอสอยู่เสมอ และคอย#nลงโทษผู้ที่ทำเรื่องชั่วร้ายอย่างดีที่สุดค่ะ"
2000303-5 = "ที่ผ่านมาฉันเคยคิดว่าการกระทำของรุ่นพี่คือความยุติธรรม และสิ่งที่คนร้ายอย่างสถาบันเกเฮนน่า#nทำนั้นชั่วร้าย… แต่เมื่อเร็วๆ นี้ความคิดของฉันเปลี่ยนไปนิดหน่อยค่ะ"
2000303-6 = "แต่แน่นอนว่าฉันไม่ได้หมดศรัทธาในตัวรุ่นพี่นะคะ!"
2000303-7 = "เมื่อพวกรุ่นพี่จบการศึกษาและฉันได้เป็นผู้นำชมรมทวงความยุติธรรม ตอนนั้นฉันจะต้องผดุง#nความยุติธรรมตามดุลยพินิจของฉันเองค่ะ"
2000303-8 = "เพื่อที่จะทำให้ได้อย่างนั้น ฉันก็จะต้องรู้ว่าความยุติธรรมคืออะไรค่ะ"
2000303-9 = "เพราะงั้นฉันถึงได้เตรียมหนังสือเล่มนี้มาค่ะ หนังสือเรื่อง <สิ่งที่เรียกว่าความยุติธรรม>!"
2000303-10 = "[s] \"สิ่งที่เรียกว่าความยุติธรรม...?\""
2000303-11 = "หนังสือเล่มนี้ดีอย่างที่ฉันคิดไว้เลยค่ะ มันมีตัวอย่างการตัดสินความยุติธรรมหรือความชั่วร้าย#nในสถานการณ์ต่างๆ อยู่ด้วย"
2000303-12 = "ยกตัวอย่างเช่น... นักเลงที่กลั่นแกล้งผู้คนคือความชั่วร้าย แต่เหล่าผู้เสียสละที่ช่วยคนที่ถูกกลั่นแกล้ง#nคือความยุติธรรม อาหารอร่อยที่มอบความสุขให้ผู้คนคือความยุติธรรม แต่อาหารที่มากเกินไป#nจนทำให้คนอึดอัดคือความชั่วร้ายค่ะ"
2000303-13 = "เขียนไว้ชัดเจนจนเห็นภาพเลยใช่มั้ยล่ะคะ นี่คืออีกเหตุผลที่ฉันชอบความยุติธรรมค่ะ"
2000303-14 = "แต่มีบางตัวอย่างในหนังสือที่ฉันไม่ค่อยเข้าใจเท่าไหร่ เลยใช้เวลาทำความเข้าใจนานมากค่ะ"
2000303-15 = "ถ้าไม่ติดอะไร คุณครูลองฟังแล้วช่วยบอกว่าการกระทำที่ยุติธรรมที่ถูกต้องเป็นยังไงให้หน่อยได้มั้ยคะ?"
2000303-16 = "[s] \"ได้สิ ว่ามาได้เลย\""
2000303-17 = "ค่ะ ตัวอย่างแรกนะคะ"
2000303-18 = "\"คุณเป็นคนขับรถไฟ แล้วคุณเห็นคน 5 คนถูกมัดอยู่บนรางรถไฟที่รถไฟกำลังวิ่งเข้าไป\""
2000303-19 = "ถ้าสลับรางรถไฟก็จะช่วยชีวิต 5 คนนั้นได้ แต่จะมีคนหนึ่งคนที่ถูกรถไฟชนแทน#nในสถานการณ์นี้ เลือกวิธีไหนถึงจะถูกคะ?"
2000303-20 = "อืม... เป็นคำถามที่ตอบยากนะคะ การสับรางเพื่อช่วยชีวิตคนหลายคนน่าจะเป็นเรื่องที่ถูกต้อง#nแต่ถ้าเลือกทำแบบนั้น คนบริสุทธิ์หนึ่งคนก็จะต้องถูกรถไฟชนแทน..."
2000303-21 = "สิ่งไหนจะสำคัญกว่ากันระหว่างการป้องกันคนที่ไม่ควรตายกับการช่วยชีวิตคนหลายคนล่ะคะ?"
2000303-22 = "[s] \"ในหนังสือเขียนว่ายังไง?\""
2000303-23 = "เอ่อ... มันเป็นการทดสอบความคิดเลยไม่มีคำตอบค่ะ"
2000303-24 = "มันเป็นไปไม่ได้ที่ความยุติธรรมจะไม่มีคำตอบค่ะ"
2000303-25 = "ความยุติธรรมต้องมีคำตอบที่ชัดเจนเสมอ..."
2000303-26 = "[s] \"ถ้าเป็นมาชิโระจะเลือกข้อไหน?\""
2000303-27 = "อืม... ไม่มีวิธีที่ช่วยทุกคนได้เลยงั้นเหรอคะ"
2000303-28 = "แม้จะขัดกับเจตนาของผู้ถาม แต่ฉันจะไม่ยอมแพ้ค่ะ"
2000303-29 = "ไม่ว่าในสถานการณ์แบบไหน ฉันจะพยายามอย่างเต็มที่เพื่อช่วยชีวิตทุกคนไว้ให้ได้ค่ะ"
2000303-31 = "เพราะมันคือวิถีแห่งความยุติธรรมค่ะ!"
2000303-33 = "คุณครูได้ใช้เวลาอ่านหนังสือกับมาชิโระอย่างเพลิดเพลิน"

[translation]
2000303-1 = "#title;정의란 무엇인가"
2000303-2 = "#place;트리니티 교실 안"
2000303-3 = "3;마시로;99;정의…… 언제 읊어도 아름다운 울림입니다. #n이보다 더 멋진 단어가 세상에 또 있을까요?\n#3;em;[...]\n#3;a"
2000303-4 = "3;마시로;05;저희 정의실현부는 키보토스에 이 정의를 바로 세우기 위해 언제나 노력해왔고, 불의를 행하는 자는 철저히 응징해왔습니다."
2000303-5 = "3;마시로;01;한 때는 선배들이 행하는 것이 무조건 정의고, 게헨나 학원의 악당들이 행하는 것이 무조건 불의라고 믿고 싸웠던 적도 있었지만…… 최근에는 조금 생각이 달라졌습니다."
2000303-6 = "3;마시로;04;무, 물론 선배들에 대한 믿음이 없어졌다는 건 아닙니다!\n#3;shake\n#3;em;[!]"
2000303-7 = "3;마시로;01;다만 선배들이 졸업하면 저도 언젠가는 정의실현부를 이끌게 될 테고, 그 때는 저도 제 판단으로 정의를 행해야 하니까요."
2000303-8 = "3;마시로;02;그러기 위해서는 정의가 무엇인지 확실히 알아 둘 필요가 있습니다."
2000303-9 = "3;마시로;05;그래서 준비한 것이 바로 이 책, 화제의 명저— <정의란 이것이다> 입니다!\n#3;em;[반짝]\n#3;closeup"
2000303-10 = "[s] \"정의란 이것이다……?\""
2000303-11 = "3;마시로;03;과연, 소문만큼 좋은 책이더군요. #n이 책에는 여러가지 상황에서 정의와 불의를 판단할 수 있는 예시들이 적혀 있었습니다."
2000303-12 = "3;마시로;02;예를 들자면…… 사람들을 괴롭히는 불량배들은 불의의 존재지만, 사람을 괴로운 병에서 구해내는 의사들은 정의의 존재고. 사람에게 기쁨을 주는 맛있는 음식은 정의지만, 먹는 사람을 불쾌하게 만드는 괴식은 불의라고 합니다.\n#3;em;…"
2000303-13 = "3;마시로;03;참으로 명쾌하지 않습니까? #n이 또한 제가 정의를 좋아하는 이유이기도 합니다.\n#3;em;[반짝]"
2000303-14 = "3;마시로;99;그런데 이 책에 나온 몇 가지 예제들은 제 능력으로 판단하기가 어려워서, 이해하는 데 꽤 오랜 시간이 걸렸습니다."
2000303-15 = "3;마시로;02;괜찮으시다면 선생님께서 들어 보시고 어떤 행동이 정의인지 알려주실 수 있겠습니까?\n#3;em;[?]"
2000303-16 = "[s] \"좋아, 들려줘.\""
2000303-17 = "3;마시로;01;네, 첫번째 예시입니다.\n#3;greeting"
2000303-18 = "3;마시로;02;'당신은 기차를 운전하는 기관사입니다. 그런데 당신이 진입하려는 선로에 5명의 사람이 묶여 있는 것을 보았습니다.'\n#3;m2"
2000303-19 = "3;마시로;02;'선로를 바꾸면 5명의 목숨을 살릴 수 있지만, 이번에는 다른 한 사람이 기차에 치이게 됩니다. #n이 경우 어떤 선택을 하는 것이 옳은 일입니까?'\n#3;m4"
2000303-20 = "3;마시로;99;흐음…… 어려운 난제로군요. 사람을 많이 살리기 위해서라면 선로를 바꾸는 것이 옳겠지만, 그렇게 하면 죽지 않아도 될 한 사람이 기차에 치이게 되니까요.\n#3;em;[...]"
2000303-21 = "3;마시로;02;억울한 죽음을 막는 것과 많은 사람의 목숨을 살리는 것, 둘 중 어느 것이 더 중요한 가치일까요?\n#3;m3"
2000303-22 = "[s] \"책에는 무어라고 쓰여 있어?\""
2000303-23 = "3;마시로;04;그게…… 이것은 사고 실험이기 때문에 답은 존재하지 않는다고 합니다."
2000303-24 = "3;마시로;05;답이 존재하지 않는 정의라니, 말도 안 됩니다.\n#3;hophop\n#3;em;[빠직]"
2000303-25 = "3;마시로;99;정의란 언제나 명쾌한 하나의 정답만이 존재해야 할 텐데……"
2000303-26 = "[s] \"마시로라면 어떤 선택을 내리고 싶어?\""
2000303-27 = "3;마시로;01;으음…… 모두를 살릴 수 있는 방법은 없는 걸까요."
2000303-28 = "3;마시로;05;비록 출제자의 의도에 반하는 것이라 하더라도 포기할 수는 없습니다.\n#3;em;[!]\n#3;stiff"
2000303-29 = "3;마시로;99;저는 어떤 경우든 열심히 고민하고 노력해서 모두를 살릴 수 있도록 노력하겠습니다."
2000303-30 = "3;마시로;99\n#3;d\n#wait;1000"
2000303-31 = "3;마시로;05;그것이 정의의 길이니까요!\n#3;closeup\n#3;em;[반짝]\n#3;a"
2000303-32 = "#all;hide"
2000303-33 = "#na;마시로와 함께 책을 읽으며 즐겁게 시간을 보냈다."

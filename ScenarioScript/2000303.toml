[translation]
2000303-1 = "What Is Justice?"
2000303-2 = "Trinity Classroom"
2000303-3 = "Justice... It rolls off the tongue so easily. Is there any better word in existence?"
2000303-4 = "The Justice Task Force has always striven to uphold justice in Kivotos, and those who commit injustice are thoroughly punished."
2000303-5 = "I once fought believing everything my upperclassmen did was just and that the opposite was true for our enemies from Gehenna...but lately, I've had doubts."
2000303-6 = "Th-That isn't to say I've lost faith in my upperclassmen!"
2000303-7 = "However, once they graduate, the Justice Task Force will be left to me, and I'll have to use my own judgment to determine what is just."
2000303-8 = "To do so, I need to have a clear understanding of what justice is."
2000303-9 = "So I went out and picked up a copy of this best selling classic: \"Justice: It's the Right Thing to Do\"."
2000303-10 = "[s] \"I've never heard of that one...\""
2000303-11 = "It was everything I hoped it would be. It covered several examples of justice and injustice and how they applied to several situations."
2000303-12 = "For example, bullies who torment others are unjust, whereas doctors who save others from painful disease are just. Delicious food that brings joy to people is just, but bizarre food that causes stomach pain is unjust."
2000303-13 = "Everything felt so clear and straightforward. It spoke to my personal sense of justice."
2000303-14 = "But a few of the examples I still struggle to understand due to my inexperience."
2000303-15 = "Would you mind listening to them and telling me what the right thing to do is?"
2000303-16 = "[s] \"Sure, lay it on me.\""
2000303-17 = "Okay. Here's the first example."
2000303-18 = "\"You are a train engineer. One day, you see five people tied to the track you're about to enter.\""
2000303-19 = "\"If you switch to another track, you can save the five people, but as a result, you will hit one other person. What, in this case, would be the right thing to do?\""
2000303-20 = "It's difficult to answer. Switching to another track would be the right thing if I'm trying to save more people, but doing so requires sacrificing someone else who was otherwise not in harm's way."
2000303-21 = "What's more important? Saving lives or not willfully harming another?"
2000303-22 = "[s] \"What does the book have to say?\""
2000303-23 = "It says...that this is a thought experiment, so there is no answer."
2000303-24 = "Justice without an answer? What nonsense."
2000303-25 = "Justice should always have a clear, singular answer..."
2000303-26 = "[s] \"What would you choose to do?\""
2000303-27 = "Hmm. Is there no way to save them all?"
2000303-28 = "I can't accept that answer, even if it goes against the spirit of the scenario."
2000303-29 = "I would do my best to save all of them, no matter what it took."
2000303-31 = "That is the way of justice!"
2000303-33 = "Mashiro and I had a good time reading over the book together."

[translation]
1000103-1 = "Trend Research 1"
1000103-2 = "In Class"
1000103-3 = "You're here, Sensei."
1000103-4 = "I'm glad you could make it. I know you must be busy."
1000103-5 = "[s] \"What's been troubling you lately?\""
1000103-6 = "Well, honestly..."
1000103-7 = "What do you think...girls are like these days?"
1000103-8 = "[s] \"...Why are you asking me?\""
1000103-9 = "Well, because you're always surrounded by girls."
1000103-10 = "So I thought you'd be an expert..."
1000103-11 = "Was I mistaken?"
1000103-12 = "Hmm..."
1000103-13 = "[s] \"What brought this on?\""
1000103-14 = "Well...I've been having a hard time seeing eye to eye with my friends."
1000103-15 = "For example, they wanted to go to a new candy shop that just opened near the school."
1000103-16 = "If junk food is what they're after, wouldn't it be more economical to buy cheap greasy fries rather than expensive candy?"
1000103-17 = "That also doesn't account for the time spent standing in line. I just can't understand their reasoning."
1000103-18 = "[s] \"Sometimes candy just hits the spot.\""
1000103-19 = "That is a valid point...but there are other instances."
1000103-20 = "For example, why do girls find occult things so interesting? You know, like tarot cards, horoscopes, and fortune telling?"
1000103-21 = "Why in the world would anyone trust some fortune teller on TV? I mean, there's no logic there. I just don't get it."
1000103-22 = "[s] \"I don't understand it either...\""
1000103-23 = "So, there are some things you don't know about girls. Color me surprised."
1000103-24 = "Maybe I do have a chance, after all..."
1000103-25 = "Hmm? Oh, I didn't say anything."
1000103-26 = "Anyway, I need to know what girls like if I'm to be friends with them."
1000103-27 = "Does that make me sound like I'm not a real girl my age? I could hardly blame you if it did."
1000103-28 = "Sometimes I forget that I'm a student. Sensei, you strike me as more a...comrade than a teacher."
1000103-29 = "But thinking like that will only make graduating harder. And that wouldn't be efficient."
1000103-30 = "Now, Sensei. Let's read that magazine I brought and ponder the nature of girls."
1000103-32 = "Afterward, I read women's magazines with Eimi, but it did us little good..."

[translation]
1000103-1 = "การศึกษาแฟชั่น 1"
1000103-2 = "ในห้องเรียน"
1000103-3 = "มาแล้วเหรอคะคุณครู"
1000103-4 = "ฉันดีใจนะที่คุณครูแวะมาทั้งๆ ที่คุณครูเองก็มีงานยุ่งอยู่แท้ๆ..."
1000103-5 = "[s] \"ช่วงนี้มีเรื่องกังวลอะไรงั้นเหรอ?\""
1000103-6 = "คือว่าเรื่องนั้น...."
1000103-7 = "ช่วงนี้พวกเด็กผู้หญิง... เขาชอบอะไรกันงั้นเหรอ?\n"
1000103-8 = "[s] \"....ทำไมถึงถามเรื่องนี้กับครูล่ะ?\""
1000103-9 = "ก็เพราะคุณครูมักจะมีแต่เด็กผู้หญิงห้อมล้อมอยู่รอบๆ ตัวไม่ใช่รึไง?"
1000103-10 = "ฉันเลยคิดว่าคุณครูน่าจะรู้เรื่องนี้ดีที่สุดแล้วน่ะ...."
1000103-11 = "ฉันเข้าใจผิดไปงั้นเหรอ?"
1000103-12 = "อืม..."
1000103-13 = "[s] \"แล้วทำไมจู่ๆ ถึงสงสัยเรื่องนี้ล่ะ?\""
1000103-14 = "คือว่า... ช่วงนี้ฉันคุยกับเพื่อนๆ ไม่ค่อยรู้เรื่องเลยน่ะ"
1000103-15 = "อย่างเช่น ตอนที่พวกเพื่อนๆ ชวนฉันไปต่อคิวซื้อขนมหวานที่ร้านเปิดใหม่ที่หน้าโรงเรียน"
1000103-16 = "หมายถึงถ้าพวกเขาอยากกินอาหารที่มีแคลอรี่สูงก็ควรไปกินมันฝรั่งทอดไม่ดีกว่าเหรอ#nทำไมต้องไปต่อแถวซื้อขนมแพงๆ แบบนั้นด้วยล่ะ?"
1000103-17 = "ทำไมจะต้องไปเสียเวลาต่อคิวแบบนั้นด้วย... ฉันไม่เข้าใจเลย"
1000103-18 = "[s] \"บางทีอาจเป็นเพราะขนมของร้านนั้นอร่อยก็ได้นะ?\""
1000103-19 = "อืม... ฉันก็ยังไม่เข้าใจอยู่ดีแต่ก็เป็นเหตุผลที่ฟังขึ้นอยู่นะ"
1000103-20 = "แล้วก็อีกอย่าง... ทำไมพวกเด็กผู้หญิงถึงชอบพวกสายมูกันนักน่ะ อย่างเช่นการดูไพ่ทาโรต์ดูดวง หรือพวกทำนายโชคชะตาน่ะ?"
1000103-21 = "ทำไมถึงเชื่อพวกหมอดูที่มาทำนายสุ่มๆ ออกทีวีกันล่ะ? แบบนั้นมันไม่สมเหตุสมผลสักนิดเดียว ไม่เห็นจะเข้าใจเลย"
1000103-22 = "[s] \"เรื่องนั้นครูก็ไม่รู้เหมือนกัน...\""
1000103-23 = "มีเรื่องของเด็กผู้หญิงที่คุณครูไม่รู้อยู่เหมือนกันสินะ... น่าแปลกจัง..."
1000103-24 = "ถึงจะไม่เหมือนกับที่คิดไว้ แต่บางทีฉันน่าจะมีโอกาสก็ได้..."
1000103-25 = "เมื่อกี้ฉันพูดอะไรน่ะเหรอ? ไม่มีอะไรหรอก"
1000103-26 = "แต่ยังไงฉันก็ต้องรู้ให้ได้ว่าพวกเด็กผู้หญิงชอบอะไรกันจะได้ไปคุยกับเพื่อนๆ ได้ดีขึ้น"
1000103-27 = "พอพูดแบบนี้แล้วฉันดูไม่เหมือนเด็กผู้หญิงงั้นเหรอ? ฮ่าฮ่า... นั่นสินะ"
1000103-28 = "บางครั้งฉันเองก็ลืมไปเหมือนกันว่าฉันเป็นเด็กนักเรียน แล้วก็รู้สึกว่าคุณครูเองก็ดูเหมือน#nเพื่อนร่วมรบมากกว่าคุณครู... ฉันรู้สึกแบบนั้นน่ะ"
1000103-29 = "แต่ถ้าเอาแต่คิดแบบนี้อาจทำให้ฉันเรียนจบได้ช้าก็ได้... แบบนั้นคงไม่ดีแน่"
1000103-30 = "เอาล่ะคุณครู ตอนนี้มาช่วยกันอ่านนิตยสารที่ฉันรวบรวมมากันเถอะ มาช่วยกันหาข้อมูลว่า#nเด็กผู้หญิงชอบอะไรกันบ้างดีกว่า"
1000103-32 = "จากนั้นคุณครูก็นั่งอ่านนิตยสารกับเอมิ แต่ก็ไม่เจออะไรที่สะดุดตาเป็นพิเศษ..."

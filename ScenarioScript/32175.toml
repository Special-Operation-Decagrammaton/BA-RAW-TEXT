[translation]
32175-2 = "ฮึ่ม... เพราะเป็นแบบนี้สินะ ทุกคนถึงเรียกหาแต่ <ชาเล่ต์> พวกผู้ใหญ่นี่น่ารำคาญใจชะมัด"
32175-3 = "ถึงจะไม่เป็นไปตามคาดก็ไม่เป็นไรหรอก แต่นี่ฉันเสียเวลามามากเกินพอแล้ว..."
32175-4 = "ตอนนี้ทั้งเซอาจังทั้งนางิจังก็ไม่อยู่แล้วด้วย ฉันเริ่มต้นมาได้อย่างยากเย็นแล้ว#nจะให้ยอมถอยให้ก็คงทำให้ไม่ได้หรอกนะ"
32175-5 = "......."
32175-6 = "เอาล่ะ เสริมกองกำลังเรื่อยๆ แล้วมาโจมตีกันต่อเลยดีไหม?"
32175-7 = "คุณมิกะ! ที่เซอาจังถูกทำร้าย ก็เป็นการสั่งการของคุณเหรอคะ?!"
32175-8 = "หืม...?"
32175-9 = "อะฮ่ะฮ่า ทำไมมองกันด้วยสายตาแบบนั้นล่ะฮานาโกะ? "
32175-10 = "มันก็ต้องเป็นฉันแน่นอนอยู่แล้วสิ เซอาจังเอาแต่พูดอะไรไม่เข้าท่าอยู่เรื่อย#nทั้งเรื่องสวรรค์แล้วก็อะไรต่อมิอะไรที่ฟังแล้วไม่เห็นจะเข้าใจสักนิด"
32175-11 = "แต่ฉันไม่ได้สั่งให้ทำลายฮาโลหรอกนะ ฉันไม่ใช่ฆาตกร"
32175-12 = "ก็แค่คิดว่าจะขังไว้ในที่ที่เหมือนคุกจนกว่าจะเรียนจบ แต่พวกทีมจู่โจมกลับทำตามอำเภอใจจนเกิดเรื่อง"
32175-17 = "…"
32175-18 = "ถ้าอยากรู้ว่าใครคือฆาตกร... ก็คงต้องถามอาซึสะจัง เธออยู่ในทีมจู่โจมเซอาไม่ใช่เหรอ#nอาซึสะจัง? ช่วยพูดอะไรหน่อยสิ นี่เธอกำลังทำให้ฉันถูกเข้าใจผิดอยู่นะ"
32175-19 = "ทุกอย่างมันยุ่งเหยิงไปหมดเพราะสิ่งที่พวกเธอทำกับเซอาจังยังไงล่ะ"
32175-20 = "หืม? ต้องขอบคุณที่ทำให้ฉันไม่สามารถย้อนกลับไปได้งั้นเหรอ? นั่นก็เป็นเพราะพวกเธอ..."
32175-28 = "ระ... เรื่องนั้นน่ะ..."
32175-29 = "อาซึสะจัง... นี่มัน... อะไรกันคะ?"
32175-30 = "มะ... ไม่มีอะไรหรอก เรื่องนั้น..."
32175-34 = "หืม?"
32175-35 = "มะ...มีกลุ่มนักเรียนจากข้างนอกกำลังเข้ามาที่นี่ค่ะ...!"
32175-36 = "เป็นไปไม่ได้ ไม่มีทางที่พวกคนที่ฝ่าฝืนคำสั่งกฎอัยการศึกของสภาน้ำชาจะหลงเหลืออยู่ในโรงเรียน..."
32175-37 = "ไม่หรอกค่ะ... ยังมีเหลืออยู่ค่ะ ยังมีองค์กรอิสระที่ไม่ว่าสภาน้ำชา หรือใครๆ ก็ไม่สามารถออกคำสั่งได้..."
32175-38 = "กลุ่มกองกำลังนั่นกำลังออกมาจากมหาวิหารแล้วค่ะ"
32175-42 = "ซิสเตอร์! ชมรมซิสเตอร์กำลังมุ่งหน้ามาที่นี่ค่ะ!!"
32175-49 = "ตอนต่อไป;โลกแบบนั้น (2)"

[translation]
32175-2 = "……なるほどねー、そっかそっかぁ。そりゃみんな「シャーレ」「シャーレ」って言うわけだ。厄介だね、「大人」って。"
32175-3 = "予想外ではあったけど……うん、まあ問題無いかな。ちょっと時間はかかりそうだけど。"
32175-4 = "セイアちゃんもナギちゃんもいなくなるんだし、これでようやく始められるっていうのに、変に邪魔しないでほしいなあ。"
32175-5 = "……！"
32175-6 = "さて、増援部隊もまだまだ来るみたいだし続けよっか？"
32175-7 = "ミカさん、一つ聞かせてください！セイアちゃんを襲撃したのも、あなたの指示だったんですか！？"
32175-8 = "……？"
32175-9 = "あはっ、ハナコもそんな目をするんだね。"
32175-10 = "うん、私の指示だよ。セイアちゃんってば、いつも変なことばっかり言って。楽園だのなんだの、難しいことばっかり。"
32175-11 = "でもヘイローを破壊しろとは言ってないよ。私は人殺しじゃない。"
32175-12 = "ただ卒業するまで、檻の中に閉じ込めておいた方が良いなって思っただけ。でも、自然とああなっちゃったの。"
32175-17 = "……。"
32175-18 = "それ以上は、当事者に聞いた方が早いんじゃないかな？……ねえ、白洲アズサ。何だか一部誤解があるみたいだし、私の代わりに説明してくれない？"
32175-19 = "セイアちゃんがあんなことになっちゃったのが、ここまで事態が大きくなったきっかけなんだよ？"
32175-20 = "そこからもう色んなことがどうしようもなくなっちゃったわけだし……ねえ、その辺りどう思う？"
32175-28 = "そ、それは……。"
32175-29 = "アズサちゃん……？それはいったい、何のお話、ですか……？"
32175-30 = "ち、違う……あれは……。"
32175-34 = "んー？"
32175-35 = "トリニティの生徒が一部、こちらへ向かってきています！"
32175-36 = "……？なんで？ティーパーティーの戒厳令に背くような人たちは、もう……"
32175-37 = "……いますよ。ティーパーティーにも命令できない、独立的な集団が。"
32175-38 = "確認できました、大聖堂からです！ということは……"
32175-42 = "……シスターフッド！？"
32175-49 = "次回;そんな世界も（２）"

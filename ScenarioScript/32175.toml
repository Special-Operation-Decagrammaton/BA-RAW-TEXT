[translation]
32175-2 = "Geez. Now I get why all anyone ever talks about is Schale these days. Adults can be so meddlesome."
32175-3 = "What an unexpected turn of events, but that's all right."
32175-4 = "With Seia and Nagi out of the way, I can finally start doing things how I want. I would really appreciate you not interfering further."
32175-5 = "...!"
32175-6 = "More reinforcements will be here soon! Do you want to keep going?"
32175-7 = "Mika! Was it you? Were you the one behind Seia's attack?"
32175-8 = "Huh?"
32175-9 = "You don't have to look at me with such disdain, you know. "
32175-10 = "Buuut...you're right. I was the one who orchestrated Seia's attack. What other choice did I have? Seia would prattle on every day about nonsense like \"paradise\" and whatnot."
32175-11 = "Destroying her halo wasn't part of the plan, though. Give me a little credit—I'm not a murderer."
32175-12 = "I was just going to keep her under lock and key until she graduated, but the raid team, rascals they were, let things get out of hand and went a little too far."
32175-17 = "..."
32175-18 = "Isn't that right, Azusa? You were part of the raid team that killed Seia, weren't you? Care to clear up this misunderstanding?"
32175-19 = "It's all because of that little mishap that things have gotten out of hand like this."
32175-20 = "Get it? I can't turn back now because of that—because of you."
32175-28 = "I..."
32175-29 = "Azusa...? She isn't serious, right?"
32175-30 = "N-No, that's not what..."
32175-34 = "Huh?"
32175-35 = "A group of students are breaching from the outside!"
32175-36 = "That's impossible. There shouldn't be any students left on campus who would dare oppose the Tea Party's orders."
32175-37 = "I can think of one. An independent organization that doesn't bow to the Tea Party or anyone else for that matter."
32175-38 = "Status report. They're coming from the cathedral!"
32175-42 = "It's the Sisterhood!"
32175-49 = "Next Episode;The Way of the World Part 2"

[translation]
32175-2 = "……原來如此，難怪大家會一直把「夏萊」掛在嘴邊。#n所謂的「大人」還真麻煩呢。"
32175-3 = "雖然在意料之外……不過應該不成問題。#n只是可能得花費一點時間……"
32175-4 = "如今聖亞醬和渚醬都已經不在，總算可以開始我的計畫……可不能在這裡放棄。"
32175-5 = "……！"
32175-6 = "增援部隊還會一直過來，你們還想繼續嗎？"
32175-7 = "彌香同學！襲擊聖亞醬也是你的指示嗎！？"
32175-8 = "……嗯？"
32175-9 = "啊哈哈，這話是什麼意思？#n為什麼要用那種眼神看我呢，花子。"
32175-10 = "那當然是我的指示囉。誰叫聖亞醬總是在說一些奇怪的話。#n比如什麼樂園之類的，真是聽不懂。"
32175-11 = "但是我並沒有說要破壞光環哦。#n畢竟我並不是殺人兇手。"
32175-12 = "只是打算把他關在類似監牢的地方，直到他畢業而已。#n但結果卻變成了那樣。"
32175-17 = "……"
32175-18 = "要說殺人兇手的話……在那邊的梓醬。#n你也是襲擊聖亞的其中一員對吧？他們似乎有點誤會的樣子，能幫我說明一下嗎？"
32175-19 = "因為你們把聖亞醬變成那樣，事情才會變得一團糟。"
32175-20 = "都怪你們做了那種事，我才不得不走到今天這一步的哦？"
32175-28 = "那，那是……"
32175-29 = "梓醬……？這是怎麼回事……？"
32175-30 = "不，不是的……那是……"
32175-34 = "嗯？"
32175-35 = "有，有部分學生正在靠近這裡！"
32175-36 = "怎麼會。#n會違反茶會戒嚴令的人應該都已經……"
32175-37 = "……不，現在校內──#n依然還有連茶會也無法命令的獨立集團。"
32175-38 = "已確認對方來自大教堂！"
32175-42 = "是修女會！修女會正朝這裡靠近！！"
32175-49 = "下一話;就算是這樣的世界（２）"

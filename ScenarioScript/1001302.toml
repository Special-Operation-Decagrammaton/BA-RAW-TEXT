[translation]
1001302-1 = "距離感很重要！"
1001302-2 = "三一綜合學園．外圍區域"
1001302-3 = "……"
1001302-7 = "（發現了像以魔物般的動作四處徘徊的弦生）"
1001302-8 = "（正好有以前傳錯訊息的事，決定向對方搭話）"
1001302-9 = "[s1] 打招呼\n[s2] 揮手"
1001302-10 = "……？"
1001302-11 = "……？"
1001302-12 = "！！？"
1001302-13 = "……"
1001302-14 = "呀，呀啊啊啊啊啊啊啊啊啊──！？"
1001302-16 = "（颼──！）"
1001302-17 = "（弦生以驚人的速度逃走了）"
1001302-18 = "[s3] ……因為很有趣而追上去\n[s4] ……因為擔心而追上去"
1001302-23 = "哈啊……哈啊……"
1001302-24 = "[s5] （終於追上了）\n[s6] 「為什麼要逃！？」"
1001302-25 = "！！？"
1001302-26 = "！！？"
1001302-27 = "呀，呀啊啊哈哈啊啊──！？！"
1001302-29 = "（颼──！）"
1001302-30 = "（弦生再次以驚人的速度逃走了）"
1001302-35 = "[ns] 「等等──！」"
1001302-39 = "[ns] 「等一下啦──！」"
1001302-41 = "（叭啊啊啊啊啊啊──！）"
1001302-42 = "對不起──！！"
1001302-43 = "[s7] 「等，等一下！電車……！」\n[s8] 「弦生，看前面！！」"
1001302-44 = "！？！？"
1001302-45 = "！？！？"
1001302-46 = "（咚哐──！！）"
1001302-47 = "咿耶耶耶耶耶耶──！？！？"
1001302-48 = "（弦生被電車撞到，飛了10公尺遠）"
1001302-49 = "[s9] 「…………！？！！？」\n[s10] 「弦生！？」"
1001302-54 = "（起身）"
1001302-55 = "……"
1001302-56 = "對，對不起，老師…… "
1001302-57 = "[s11] （看起來沒事……）\n[s12] 「弦生很結實呢……」"
1001302-58 = "那，那個訊息是……不知道該傳什麼訊息才好……"
1001302-59 = "那，那個訊息是……不知道該傳什麼訊息才好……"
1001302-60 = "我煩惱了……5個小時左右……"
1001302-62 = "（砰咚）"
1001302-63 = "[s13] 「5小時！？」\n[s14] 「弦生！？」"
1001302-68 = "（弦生傳訊息給老師的5小時前）"
1001302-69 = "……"
1001302-71 = "（啪啦）"
1001302-72 = "（專題報導！和大人戀愛成功的7種方法！）"
1001302-73 = "（對方是大人！用充滿挑釁意味的訊息吸引關注吧！）"
1001302-74 = "（重點是別讓對方把自己當小孩看待！）"
1001302-75 = "（和對方保持距離！對方靠近就遠離，對方遠離就靠近，重點是維持一定的距離感！）"
1001302-76 = "……"
1001302-77 = "（搞不懂……什麼叫充滿挑釁意味的訊息……！？）"
1001302-78 = "（只要以對待敵人的方式對待老師就行了嗎……）"
1001302-79 = "咯咯咯咯，嘿嘿嘿嘿嘿！"
1001302-80 = "……"
1001302-81 = "（……那怎麼可能）"
1001302-82 = "（我該，怎麼做呢……？）"
1001302-83 = "（想和老師感情變好的話……）"
1001302-85 = "（按壓按壓）好，久，不，見，了。小，女，是，劍，先，弦，生…… "
1001302-86 = "不對！！一點挑釁意味都沒有！！"
1001302-87 = "重來……"
1001302-89 = "（5小時後）"
1001302-90 = "咿耶耶耶耶耶耶耶！我不知道該怎麼寫才好啦啊啊啊啊啊啊啊！！"
1001302-91 = "咿耶耶耶耶耶耶耶！咿呀呀呀呀！"
1001302-92 = "啊啊啊啊啊──！咿呀啊啊啊哦哦啊……"
1001302-93 = "（嗶嗶）"
1001302-94 = "（語音輸入完成，已傳送）"
1001302-95 = "咿耶啊……"
1001302-96 = "……"
1001302-97 = "呀啊啊啊啊啊啊啊！？！？"
1001302-99 = "……"
1001302-100 = "[s] 「原來是那麼回事啊。」"
1001302-101 = "對，對不起起起起起起！給，給您添麻煩了！！"
1001302-102 = "[s] 「沒關係唷。」"
1001302-103 = "……沒，沒關係，嗎？"
1001302-104 = "但是我寄出了意義不明的訊息……"
1001302-105 = "（弦生正坐立難安）"
1001302-106 = "[s15] 說「冷靜點」並摸摸弦生的頭\n[s16] 摸摸頭讓弦生冷靜"
1001302-111 = "（咻）"
1001302-112 = "……唔耶？"
1001302-114 = "（摸頭摸頭摸頭）"
1001302-115 = "[s] 告訴弦生沒關係，不管什麼時候都可以放輕鬆聯絡"
1001302-116 = "……"
1001302-117 = "（羞……！）"
1001302-118 = "啊……是……"
1001302-119 = "我，我知道，了……"
1001302-120 = "[s] 「但是過平交道的時候要仔細察看四周。」"
1001302-121 = "我，我會銘記，在心……"
1001302-122 = "[s] 「因為弦生醬不能受傷，知道嗎？」"
1001302-123 = "……啊，唔……是。"
1001302-124 = "（弦生滿臉通紅，聽話地回覆道）"
1001302-127 = "（當然，被添麻煩的站務員由我下跪道了歉）"

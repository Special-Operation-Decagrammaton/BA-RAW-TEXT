[translation]
10020045-5 = "สำเร็จแล้ว!!"
10020045-6 = "ทำลายเครื่องทะลุมิติทั้ง 4 เครื่องแล้ว!"
10020045-12 = "แฮ็กเข้าระบบพื้นที่ <เรืออะทราฮาซิส> ทั้งหมดสำเร็จ ยืนยัน อัตราการยึดครองสำเร็จ 100%"
10020045-13 = "อื้อ เท่านี้ก็เปิดใช้งาน <วงจรระเบิดตัวเอง> ของเรือนี้ได้แล้ว"
10020045-17 = "ทุกคน ถ้าเตรียมพร้อมแล้วส่งสัญญาณมาด้วยล่ะ!"
10020045-18 = "พอเปิดใช้งานวงจรระเบิดตัวเองแล้ว มันจะยกเลิกอีกไม่ได้นะ เพราะงั้นรีบกลับไปที่เรือรบอุตนาพิชทิม#nทันทีล่ะ!"
10020045-28 = "ค่ะ! ตอนนี้พวกเราก็ทำลายห้องควบคุมเรียบร้อยแล้วค่ะ!"
10020045-29 = "ชิโรโกะจังล่ะ?"
10020045-30 = "พื้นที่ที่รุ่นพี่ชิโรโกะถูกขังอยู่... คุณครูอยู่ที่นั่นค่ะ!"
10020045-34 = "[ns] เปิดประตูห้องที่ชิโรโกะอยู่"
10020045-37 = "...คุณครู"
10020045-38 = "[s] \"ชิโรโกะ... ไม่เป็นไรใช่มั้ย?\""
10020045-39 = "อื้อ ฉันมีอะไรอยากจะพูดเยอะเลย... แต่ว่าตอนนี้คงต้องรีบหนีกันก่อนแล้วละ"
10020045-40 = "[s] \"อื้อ ไปกันเถอะ เรื่องอื่นๆ ไว้ค่อยคุยกันเนอะ\""
10020045-41 = "รุ่นพี่ชิโรโกะ?! ไม่เป็นไรใช่มั้ยคะ?"
10020045-42 = "ไม่เป็นไร ฉันจะคุ้มกันคุณครูกลับไปเอง"
10020045-43 = "คะ...ค่ะ! ถ้างั้น... มาที่เรืออุตนาพิชทิมที่อยู่ที่พื้นที่ 1 นะคะ!! ฉันจะคอยบอกทางให้เองค่ะ!"
10020045-44 = "อื้อ ฝากด้วยนะ"
10020045-45 = "ไปกันเถอะ คุณครู"
10020045-46 = "[ns] \"อื้ม\""

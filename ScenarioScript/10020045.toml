[translation]
10020045-5 = "成功了！！"
10020045-6 = "4個次元引擎全都破壞了……！"
10020045-12 = "「阿特拉哈西斯的方舟」全部區域駭入完成。#n占有率達到100%。"
10020045-13 = "這樣就能啟動方舟的「自爆程式」了。"
10020045-17 = "各位，準備好就說一聲吧！"
10020045-18 = "「自爆程式」一旦啟動就無法取消。立刻回到船上去吧！"
10020045-28 = "控制室，破壞完畢！"
10020045-29 = "白子醬呢？"
10020045-30 = "老師已經前往白子前輩所在的區域了！"
10020045-34 = "[ns] 開啟白子所在區域的門"
10020045-37 = "……老師。"
10020045-38 = "[s]「白子……你沒事吧？」"
10020045-39 = "嗯。雖然有很多話想說，現在還是先離開吧。"
10020045-40 = "[s]「嗯。詳細的情況之後再說吧。」"
10020045-41 = "白子前輩，你沒事吧！？"
10020045-42 = "嗯，我會和老師一起行動……告訴我們路線吧。"
10020045-43 = "是，是……！那個……那麼，請到船所在的第1區域來！#n我會引導你們的！"
10020045-44 = "嗯。拜託了。"
10020045-45 = "走吧，老師。"
10020045-46 = "[ns]「嗯。走吧。」"

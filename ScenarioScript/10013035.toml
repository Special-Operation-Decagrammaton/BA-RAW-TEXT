[translation]
10013035-3 = "哈～哈哈哈哈！火熱，真是火熱！#n正因為雙方都不肯退讓，才能讓場面白熱化啊！就像開發溫泉一樣！"
10013035-4 = "把礙事的東西全都燒光吧！"
10013035-6 = "嗯嗯！就是這樣，這可是部長的命令喔！"
10013035-7 = "大家突擊！為了溫泉的開發，頭也不回地燃燒殆盡吧！"
10013035-14 = "我知道了，總之全部燒光就可以了吧。"
10013035-16 = "知世！？你為什麼會幫對方啊！？"
10013035-17 = "話說還真難纏……！"
10013035-18 = "為什麼要為了溫泉開發這種事賭上性命啊！？"
10013035-19 = "[s] 「因為是溫泉開發部嘛……」"
10013035-20 = "怎麼連老師都說這種話！"
10013035-22 = "哈～哈哈哈哈！等我們贏了之後，就把你們當成溫泉開發部的僕人來使喚吧！"
10013035-23 = "大家一起開始快樂的溫泉開發人生吧！"
10013035-24 = "[s] 「在大熱天下全力進行溫泉開發的夏天……」"
10013035-26 = "那種事我才不要！？"
10013035-27 = "社長～～！再這樣下去的話不妙啊～～！"
10013035-28 = "靜子醬！這樣下去的話……"
10013035-29 = "唔……能在這種情況下制服溫泉開發部的方法……"
10013035-30 = "……只有這招了！"
10013035-31 = "抓住溫泉開發部的部長！這樣一來就能一口氣制服他們才對！"
10013035-33 = "也就是說……要直取敵將首級，咚！的作戰囉！"
10013035-34 = "不愧是社長！真是沒血沒淚呢！"
10013035-35 = "哎呀……這個……"
10013035-36 = "難，難道……正在計畫那種好像會在時代劇出現的可怕戰術……伊樹菜，嚇了一跳！"
10013035-37 = "[s] 「靜子，真是可怕的孩子……」"
10013035-38 = "不不不！我才沒有那樣說！#n為什麼大家都是這種反應啊！"
10013035-39 = "雖然不知道你們在計畫什麼，不過已經太遲了！"
10013035-46 = "耶嘿嘿♪"
10013035-49 = "……啊，老師。"
10013035-50 = "[s] 「怎麼啦，知世？」"
10013035-51 = "那個……"
10013035-52 = "那邊……"
10013035-53 = "[s] 「那邊有什麼嗎？」"
10013035-54 = "嗯──"
10013035-58 = "……………………溫泉？"
10013035-59 = "咦？"
10013035-60 = "什麼？"
10013035-65 = "[ns] 「伊樹菜！朝知世指的地方丟手裏劍！」"
10013035-69 = "是！伊樹菜要上了！"
10013035-70 = "伊樹菜流忍法──渾身之術！"
10013035-71 = "手裏劍！嘿！"
10013035-80 = "嗚哇！？咦，什麼什麼！？嚇死我了！"
10013035-81 = "還以為要突然丟什麼過來呢……話說回來，剛才的是手榴彈嗎？"
10013035-82 = "真是帶著不錯的東西呢──"
10013035-94 = "哎呀，這個是……"
10013035-95 = "難道說，是因為剛才伊樹菜的攻擊──"
10013035-96 = "溫……溫溫……溫……"
10013035-97 = "是溫泉──！"
10013035-99 = "啊，佳澄部長！不要搶我的台詞啊！"
10013035-100 = "那種事無所謂啦！快點讓部員都做好準備！"
10013035-102 = "等等！和我們的戰鬥要怎麼辦！？"
10013035-104 = "現在不是爭鬥的時候了！溫泉可是湧出來了喔！"
10013035-105 = "那麼那麼，溫泉開發部的大家！預備！"
10013035-107 = "開始！"
10013035-129 = "騙人的吧……才一瞬間就蓋好了溫泉浴場……！"
10013035-130 = "這還真了不起呢……"
10013035-131 = "哎呀，真棒真棒！太好了！我很喜歡！#n嘛，雖然說和我追求的深海溫泉多少有點差異──"
10013035-132 = "不過話說回來，多虧有那剛才漂亮的一擊，湧出了相當不錯的溫泉！"
10013035-133 = "不過，究竟是怎麼找到的呢？這還真是不得了的能力啊。#n那位藍髮的小姐和狐狸耳朵的黑髮小姐，要不要加入我們溫泉開發部啊？"
10013035-134 = "溫泉人生可是很棒的喔？"
10013035-135 = "……？"
10013035-136 = "抱歉！伊樹菜已經是忍術研究部的一員了！"
10013035-137 = "這樣啊……真是遺憾。"
10013035-138 = "……那麼大家，回去進行收尾工作吧！"
10013035-139 = "等，等一下！這樣的話，我們的約定要怎麼辦！？"
10013035-140 = "啊，對了。"
10013035-141 = "唔～～～～～～～呣。"
10013035-142 = "……果然，是我們輸了吧？"
10013035-143 = "咦？"
10013035-144 = "在我們發現海洋深層水的溫泉之前，你們就先找到溫泉了嘛。"
10013035-145 = "哎呀，雖然可惜但也只能認輸了。"
10013035-146 = "[s] 「原來剛才那個是決定勝負的問題啊……」"
10013035-147 = "所以說，只好從這裡撤退了。"
10013035-148 = "咦咦！部長！我們還沒找到深海溫泉呢！？"
10013035-149 = "之後有機會再說。"
10013035-150 = "這裡就讓給新來的年輕人吧。"
10013035-151 = "唔嗯，雖然不太懂……但佳澄部長都這麼說了，那就這樣吧。"
10013035-152 = "還有啊，惠。能挖到溫泉的傢伙不會是壞人。#n所以這裡就交給他們吧！"
10013035-153 = "原來如此！那就沒問題了！"
10013035-155 = "哪裡沒問題啊……"
10013035-156 = "是啊是啊～雖然沒有找到海洋深層水的溫泉很可惜，但之後就交給你們啦。"
10013035-157 = "啊……"
10013035-158 = "[s] 「能順利回收合約真是太好了呢，靜子。」"
10013035-159 = "這樣就前進了一步呢，靜子醬！"
10013035-160 = "這，這個嘛……"
10013035-161 = "是這樣沒錯啦……"
10013035-163 = "那我們就先走了。"
10013035-169 = "等等！"
10013035-175 = "嗯？還有什麼事嗎？"
10013035-178 = "那個……"
10013035-179 = "呃，就是……"
10013035-180 = "……嗯，決定了！"
10013035-181 = "我想要把這裡交給你們！"
10013035-182 = "[s] 「靜子？」"
10013035-183 = "……那是什麼意思？"
10013035-184 = "和我定個契約吧。"
10013035-185 = "簡單來說，原本的合約就留在你們那裡沒關係。#n不過相對地，請和我們定新的合約。"
10013035-186 = "然後繼續留在這裡，營運這個你們所建造的溫泉渡假勝地。"
10013035-187 = "你們是為了「渡假勝地狩獵」而來的吧？那為什麼還要……"
10013035-188 = "因為……你們還想找海洋深層水溫泉對吧？"
10013035-189 = "那是當然！我們的目的還沒有達成，對吧部長？"
10013035-190 = "是這樣沒錯……"
10013035-191 = "嗯……為了這個要跟我們簽約是嗎？"
10013035-193 = "沒錯。這是我作為百夜堂老闆提出的合作案哦！"
10013035-194 = "聽起來就像是加盟契約一樣呢……"
10013035-195 = "加盟啊……確實這麼說的話比較準確呢。"
10013035-196 = "那麼，你覺得我的提案怎麼樣呢？"
10013035-197 = "…………"
10013035-201 = "哼，哼哼……哈哈哈……哈～哈哈哈哈！有趣！而且是個不錯的提案呢！"
10013035-202 = "明明開發了溫泉卻沒有被責備，反而還邀請我們協助……#n這對我們溫泉開發部來說還真是稀奇啊。好吧，偶爾這樣也不錯！"
10013035-203 = "那就讓我們協助你們的事業吧。接下來請多指教囉，社長！"
10013035-211 = "哇！真是快速的攻勢呢，社長！"
10013035-212 = "就說了我不是社長嘛！"
10013035-216 = "……不對，現在已經是社長了嗎？"
10013035-217 = "總，總之！"
10013035-221 = "請多指教囉，溫泉開發部！"

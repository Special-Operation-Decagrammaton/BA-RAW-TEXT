[translation]
10013035-3 = "วะฮ่ะฮ่ะฮ่าา!! แรงอีก! จัดมาอีก! ต่างฝ่ายต่างไม่ยอมกันแบบนี้ ตรงนี้ก็พลอยร้อนระอุไปด้วยเลย! เหมือนกับการพัฒนาออนเซ็นเลยนะ ดีๆๆ"
10013035-4 = "เผาทุกอย่างที่ขวางหน้าให้หมดเลย!"
10013035-6 = "อื้ม! อื้ม! นี่คือคำสั่งของหัวหน้าคาสุมิ~!"
10013035-7 = "ทุกคนจู่โจม! เพื่อการพัฒนา! อย่าถอยหลังกลับ เผาให้เรียบไปเลย!"
10013035-14 = "อื้ม~ ก่อนอื่นก็ให้เผาสินะ~"
10013035-16 = "ชิเซะ ทำไมเธอถึงไปอยู่ตรงนั้นล่ะ?!"
10013035-17 = "ฮึ่ย! ดื้อด้านชะมัด...!"
10013035-18 = "ทำไมถึงต้องดื้อดึงกับการพัฒนาออนเซ็นอะไรนั่นขนาดนั้นด้วย?!"
10013035-19 = "[s] \"ก็เพราะเป็น... ชมรมพัฒนาออนเซ็นไง...?\""
10013035-20 = "คุณครูก็เป็นไปด้วยเหรอคะ?!"
10013035-22 = "วะฮะฮะฮ่า!! ถ้าพวกฉันชนะ ก็จะใช้งานเธอเป็นผู้รับเหมาย่อยของชมรมพัฒนาออนเซ็นด้วยเหมือนกัน!"
10013035-23 = "มามีชีวิตอันน่าแสนสุขเพื่อพัฒนาออนเซ็นกันเถอะ!"
10013035-24 = "[s] \"ทุ่มเทแรงเพื่อพัฒนาออนเซ็นภายใต้แสงแดดจ้าของฤดูร้อน...\""
10013035-26 = "ขอปฏิเสธเรื่องนั้นได้มั้ยคะ?!"
10013035-27 = "แบบนี้มีหวังเราแพ้แน่ค่ะ~~ ท่านประธาน~~!"
10013035-28 = "ชิซุโกะจัง! ต้องคิดหาวิธีดีๆ แล้วละค่ะ!"
10013035-29 = "อึก! ถ้าจะหยุดพฤติกรรมหมู่ของชมรมพัฒนาออนเซ็นในสถานการณ์แบบนี้ละก็..."
10013035-30 = "ใช่! มีเพียงวิธีเดียวเท่านั้น!"
10013035-31 = "ต้องจับกุมหัวหน้าชมรมพัฒนาออนเซ็น... เพื่อทำให้ที่เหลืออ่อนกำลังลงในรวดเดียว!"
10013035-33 = "นี่คือยุทธศาสตร์การใช้มีดเฉือนคอศัตรูในรวดเดียวเลยสินะคะ!"
10013035-34 = "สมกับที่เป็นท่านประธาน...! ไอดอลตัวตึงของร้านเฮียกคิยาโคเลยละค่ะ!"
10013035-35 = "คุณพระช่วย..."
10013035-36 = "ทะ... ท่านชิซุโกะ...! วางแผนการร้ายกาจเหมือนในละครย้อนยุคเลย!! อิซุนะตกใจหมดเลยค่ะ...!"
10013035-37 = "[s] \"ชิซุโกะ... เป็นเด็กที่น่ากลัวสินะ\""
10013035-38 = "ไม่ๆๆๆ! ฉันไม่ได้พูดอย่างนั้นสักหน่อย?!  ทุกคนเอาแผนการของฉันไปพูดให้ดูแย่หมดเลย!"
10013035-39 = "ฉันไม่รู้หรอกว่าพวกเธอมีแผนอะไร แต่มันสายไปแล้วละ!"
10013035-46 = "ฮิฮิฮิ~~!"
10013035-49 = "อ่า... คุณครู"
10013035-50 = "[s] \"อื้ม ชิเซะ? มีอะไรเหรอ?\""
10013035-51 = "เรื่องนั้น... คือว่า..."
10013035-52 = "ที่ตรงโน้น..."
10013035-53 = "[s] \"ตรงโน้น? มีอะไรเหรอ?\""
10013035-54 = "อืม..."
10013035-58 = ".................. ออนเซ็น?"
10013035-59 = "หืม?"
10013035-60 = "หืม?"
10013035-65 = "[ns] \"อิซุนะ! ใช้ชูริเคนเลย! ตรงที่ชิเซะชี้อยู่!\""
10013035-69 = "อื้ม! นายท่าน! ได้เวลาอิซุนะออกโรงแล้วค่ะ!"
10013035-70 = "วิถีนินจาอิซุนะ...! เคล็ดวิชาอาวุธลับแห่งจิตวิญญาณ!"
10013035-71 = "ชูริเคน! ย้ากก!"
10013035-80 = "ว้ากกก...?! อะไรเนี่ย?! ตกใจหมดเลย!"
10013035-81 = "ทำไมจู่ๆ ก็โยนระเบิดใส่ล่ะ? ยิ่งไปกว่านั้น เมื่อกี้เป็นระเบิดรูปชูริเคนเรอะ?"
10013035-82 = "มีอาวุธเท่ๆ อยู่ด้วยเหรอเนี่ย คาดไม่ถึงเลยแฮะ..."
10013035-94 = "ตายจริง นี่มัน..."
10013035-95 = "อย่าบอกนะว่า... การโจมตีของอิซุนะเมื่อกี๊ทำให้..."
10013035-96 = "โอ้ว โอ้วววว..."
10013035-97 = "ออนเซ็น!"
10013035-99 = "อ๊ะ! หัวหน้าคาสุมิ! อย่าแย่งซีนฉันสิคะ~!"
10013035-100 = "ช่างเถอะ! เมกุ! เตรียมกำลังทั้งหมดของเรา!"
10013035-102 = "ดะ... เดี๋ยวก่อนสิ?! ไม่ได้กำลังสู้กับพวกเราอยู่หรอกเหรอ...?!"
10013035-104 = "ตอนนี้เรื่องนั้นมันสำคัญเหรอ?! น้ำพุร้อนกำลังระเบิดอยู่นะ!"
10013035-105 = "อื้ม..?! ชมรมพัฒนาออนเซ็นทุกคน~! เตรียมตัว~!"
10013035-107 = "ลุย!"
10013035-129 = "ปะ... ป่าทึบหายไปในชั่วพริบตา แล้วเกิดเป็นบ่อน้ำพุร้อนขึ้นมาเหรอ?!"
10013035-130 = "ว้าว... ขนลุกไปหมดเลยละค่ะ"
10013035-131 = "ว้าว~! วิเศษ! ดีเลิศ! ประเสริฐ ถูกใจดีจริงๆ! ถึงจะไม่ใช่ออนเซ็นทะเลลึกที่สมบูรณ์แบบเหมือนที่คิดไว้#nในหัวก็เถอะ"
10013035-132 = "เมื่อก่อนหน้านี้เราเพิ่งได้ออนเซ็นคุณภาพดีมาเลยนะ"
10013035-133 = "ว่าแต่เธอหาเจอได้ยังไงน่ะ? สกิลไม่ธรรมดาเลยนะ? แม่สาวผมฟ้ากับสาวหูจิ้งจอกผมดำ#nมาเข้าชมรมพัฒนาออนเซ็นของเรามั้ย?"
10013035-134 = "มาสัมผัสชีวิตออนเซ็นดูสิ"
10013035-135 = "......?"
10013035-136 = "ขอโทษค่ะ! อิซุนะเป็นสมาชิกของชมรมวิจัยศาสตร์นินจาไปแล้ว!"
10013035-137 = "งั้นเหรอ? น่าเสียดายจัง"
10013035-138 = "งั้นทุกคนเตรียมตัวกลับกันเถอะ~"
10013035-139 = "ดะ... เดี๋ยวก่อนสิ? แบบนี้เรื่องที่เราคุยกัน ต่อสู้กัน และเรื่องหนังสือสัญญาล่ะ...! มันจะกลายเป็นศูนย์เลยเหรอ?!"
10013035-140 = "จริงสิ~ เรื่องนั้น"
10013035-141 = "อืมมม~~~~"
10013035-142 = "พวกฉันแพ้ใช่มั้ย...?"
10013035-143 = "หืม?"
10013035-144 = "ก็พวกเธอหาออนเซ็นเจอก่อนพวกเรานี่"
10013035-145 = "เฮ้อ~ น่าเสียดายนะ แต่คงต้องยอมรับว่าเราแพ้"
10013035-146 = "[s] \"ตกลงว่าแข่งกันหาออนเซ็นเหรอ...?\""
10013035-147 = "งั้นก็คงต้องถอนตัวกันแล้วสินะ"
10013035-148 = "อ้าว~! หัวหน้าคาสุมิ! แต่เรายังไม่ได้ออนเซ็นทะเลลึกเลยนะ?!"
10013035-149 = "ฉันจะขอสละสิทธิ์ในสถานที่นี้..."
10013035-150 = "เพื่อมอบให้คนหนุ่มสาวหน้าใหม่ที่เข้ามาที่นี่แล้วกัน!"
10013035-151 = "อืม~ ถึงจะไม่เข้าใจ... แต่ถ้าหัวหน้าคาสุมิจะทำอย่างนั้น ก็เอาตามนั้นก็ได้..."
10013035-152 = "นอกจากนั้นนะเมกุ คนที่มาขุดออนเซ็นได้ก็ไม่ใช่คนร้ายที่ไหน เราจะฝากที่นี่ไว้ให้กับเด็กพวกนี้!"
10013035-153 = "อ้อ! ถ้างั้นก็ไม่กังวลแล้วละ!"
10013035-155 = "มันใช่เรื่องที่ต้องมากังวลมั้ยเนี่ย..."
10013035-156 = "เอาเถอะ~ น่าเสียดายที่พวกฉันขุดออนเซ็นทะเลลึกไม่ได้ แต่ยังไงก็จะยกให้พวกเธอดูแลที่นี่แล้วกัน"
10013035-157 = "อ่า..."
10013035-158 = "[s] \"ดีเลยนะ ชิซุโกะ เท่ากับว่าได้หนังสือสัญญาคืนมาแล้ว\""
10013035-159 = "ค่ะ! แบบนี้ดีกว่าที่คาดไว้อีกขั้นเลยนะคะ! ชิซุโกะจัง!"
10013035-160 = "เอ่อ... ตะ... แต่ว่า"
10013035-161 = "มัน..."
10013035-163 = "ถ้างั้นพวกฉันขอตัวละ..."
10013035-169 = "ดะ... เดี๋ยวก่อนสิ!"
10013035-175 = "หืม? ทำไมเหรอ? ยังมีธุระอื่นอีกเหรอ?"
10013035-178 = "คือว่า... "
10013035-179 = "อืมมม แบบว่า..."
10013035-180 = "กะ... ก็ได้! ฉันตัดสินใจแล้ว!"
10013035-181 = "ฉันจะฝากให้พวกเธอดูแลที่นี่"
10013035-182 = "[s] \"ชิซุโกะ?\""
10013035-183 = "หืม...? หมายความว่ายังไงน่ะ?"
10013035-184 = "ก็จะทำสัญญากับพวกเธอไงล่ะ"
10013035-185 = "ฉันจะไม่ขอหนังสือสัญญาคืน พวกเธอถือไว้แบบนั้นเลยก็ได้ แต่ต้องมาทำสัญญากับพวกฉัน"
10013035-186 = "ฉันอยากให้พวกเธออยู่ที่นี่ แล้วบริหารรีสอร์ตออนเซ็นที่สร้างมาต่อไป"
10013035-187 = "เอ๋...? จะไม่เอาสัญญาคืนจาก <การล่ารีสอร์ต> หรอกเหรอ? ทำไมล่ะ?"
10013035-188 = "ก็... พวกเธอยังอยากหาออนเซ็นทะเลลึกให้เจออยู่ไม่ใช่เหรอ?"
10013035-189 = "อื้ม! ใช่! พวกฉันยังไม่บรรลุเป้าหมายที่แท้จริง ใช่มั้ยหัวหน้า?!"
10013035-190 = "มันก็จริงอยู่..."
10013035-191 = "อืม... งั้นก็แปลว่า... จะให้โอกาสพวกเรา? แล้วก็จะทำสัญญาเหรอ?"
10013035-193 = "ใช่ เป็นข้อเสนอความร่วมมือจากร้านเฮียกคิยาโคที่เป็นเจ้าของ"
10013035-194 = "ก็เหมือนกับแฟรนไชส์สินะคะ"
10013035-195 = "แฟรนไชส์... อื้ม อาจจะเป็นแบบนั้น..."
10013035-196 = "ว่าไงล่ะ? สนใจข้อเสนอของฉันมั้ย?"
10013035-197 = "อืม..."
10013035-201 = "อะฮ่ะฮ่า! อื้ม! เป็นไอเดียที่น่าสนใจ! อื้ม! ก็ไม่ได้แย่เท่าไหร่!"
10013035-202 = "อืมม~ ถึงจะพัฒนาออนเซ็นได้แต่ก็ไม่ถูกติเตียนและได้รับข้อเสนอความร่วมมือ... เรื่องแบบนี้#nไม่ได้เกิดขึ้นบ่อยๆ กับชมรมพัฒนาออนเซ็น แต่ยังไงก็ต้องมีบ้างละ!"
10013035-203 = "งั้นพวกฉันจะให้ความร่วมมือในธุรกิจนี้เอง ต่อไปก็ฝากตัวด้วยละ ประธาน!"
10013035-211 = "ว้าวว! นี่คือการรุกอย่างรวดเร็วเลยค่ะท่านประธาน!"
10013035-212 = "ก็บอกแล้วว่าฉันไม่ใช่ประธาน..."
10013035-216 = "เดี๋ยวสิ แต่ตอนนี้ก็เป็นประธานแล้ว ใช่รึเปล่านะ...?"
10013035-217 = "อะ... เอาเถอะ!"
10013035-221 = "ยังไงก็ฝากด้วยนะ ชมรมพัฒนาออนเซ็น"

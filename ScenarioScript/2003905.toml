[translation]
2003905-1 = "Bird Flies Over the Nest"
2003905-2 = "Schale Office"
2003905-5 = "[ns] \"Then, I look forward to working with you today.\""
2003905-6 = "Leave it to me."
2003905-24 = "[ns] \"We're DONE!\""
2003905-25 = "Fufu. Are you pleased?"
2003905-26 = "Hm? No one likes to work? I suppose I agree with the sentiment..."
2003905-27 = "Regardless, your joy brings me joy as well, Sensei."
2003905-28 = "There are no other scheduled tasks, correct? Perhaps you should rest as well, Sensei."
2003905-29 = "Hm? It feels as if I am the boss? That would be a bit of a predicament. "
2003905-30 = "Every person...has a role and a place."
2003905-32 = "Kisaki gazed out the window, seemingly lost in thought."
2003905-35 = "Hm? Am I looking at the scenery? There's nothing especially intriguing..."
2003905-36 = "Nor am I thinking about anything in particular. Simply...looking."
2003905-38 = "Despite Kisaki's dismissive attitude..."
2003905-39 = "...it seemed as if she was entranced, by something she'd never seen before."
2003905-40 = "Like a child observing something new."
2003905-43 = "[ns] \"Kisaki.\""
2003905-44 = "Yes? What is it, Sensei?"
2003905-45 = "[s] \"Do you want to go to the rooftop?\""
2003905-46 = "Huh? Of this building?"
2003905-47 = "For what reason? It would be windy and rather dangerous, would it not?"
2003905-48 = "You would like to see the view from the rooftop together?"
2003905-49 = "..."
2003905-50 = "O-Okay. If that's what you wish, I see no reason to refuse, Sensei..."
2003905-52 = "Kisaki and I took the elevator to the rooftop."
2003905-57 = "Ack...!"
2003905-58 = "As I expected, the winds are rather strong. It's bright as well."
2003905-59 = "What was your objective here, Sensei?"
2003905-60 = "[s1] \"The weather's just so nice!\"\n[s2] \"But we can't ditch to go on a picnic!\""
2003905-66 = "Is that so...?"
2003905-67 = "Fufu. I suppose that's true."
2003905-79 = "It feels strange."
2003905-80 = "If we wanted to, we could see such scenery in Shanhaijing as well."
2003905-81 = "We need only look, just like this."
2003905-84 = "Like this..."
2003905-85 = "..."
2003905-86 = "If only we could go out a bit further..."
2003905-87 = "[s] \"Then let's do it.\""
2003905-88 = "?!?!"
2003905-89 = "D-Did you hear me say that?!"
2003905-90 = "[s] \"Since it's just the two of us.\""
2003905-91 = "...!"
2003905-92 = "...Surprisingly, you have terrible tendencies!"
2003905-93 = "[s] \"You don't want to?\""
2003905-94 = "*deep breath*"
2003905-95 = "[s] \"Personally, I'm excited.\""
2003905-96 = "I won't let you forget it, Sensei."
2003905-97 = "Hm..."
2003905-98 = "I suppose I haven't said I wouldn't like to, yet."
2003905-99 = "[s3] \"Yes. Here, and there, together.\"\n[s4] \"Let's go somewhere farther.\""
2003905-102 = "..."
2003905-103 = "May I...look forward to it, Sensei?"
2003905-104 = "[s] \"Of course.\""
2003905-110 = "Kisaki approached without a word."
2003905-111 = "Her gaze was somewhere else, far away."
2003905-112 = "But the tips of our fingers were touching."

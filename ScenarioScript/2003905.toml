[translation]
2003905-1 = "นกบินอยู่เหนือรัง"
2003905-2 = "สำนักงานชาเล่ต์"
2003905-5 = "[ns] \"ถ้างั้นวันนี้ครูก็ฝากด้วยนะ\""
2003905-6 = "อืม วางใจเราได้เลย"
2003905-24 = "[ns] \"เสร็จแล้ว~!\""
2003905-25 = "ฮุฮุ ดีใจขนาดนั้นเชียวหรือ?"
2003905-26 = "หืม? ไม่มีใครที่ชอบทำงานหรอก... อย่างนั้นหรือ? เรื่องนั้น... เราเองก็เหมือนกัน..."
2003905-27 = "แต่ก็เอาเถอะ พอเห็นครูมีความสุข เราก็พลอยสบายใจไปด้วยนะ"
2003905-28 = "งานวันนี้มีแค่นี้ใช่หรือไม่? เราว่าครูก็ควรพักผ่อนสักหน่อยนะ"
2003905-29 = "หะ... หืม? รู้สึกเหมือนว่าเราเป็นเจ้าของที่นี่อย่างนั้นหรือ? แบบนั้นน่าจะไม่ได้หรอก "
2003905-30 = "แต่ละคน... ย่อมมีที่ของตนอยู่แล้ว"
2003905-32 = "(คิซากิเริ่มมองวิวทิวทัศน์นอกหน้าต่าง)"
2003905-35 = "หืม? ที่เราดูวิวน่ะหรือ? เปล่านะ... ก็... ไม่ได้มีอะไรเป็นพิเศษ..."
2003905-36 = "เราแค่ดูเฉยๆ ไม่ได้คิดอะไรไปด้วยหรอก"
2003905-38 = "(คิซากิพูดเหมือนไม่รู้สึกอะไร)"
2003905-39 = "(คุณครูรู้สึกว่า... เธอเป็นเหมือนเด็กที่)"
2003905-40 = "(หลงใหลในวิวทิวทัศน์ที่เพิ่งเคยเห็นเป็นครั้งแรก...)"
2003905-43 = "[ns] \"คิซากิ\""
2003905-44 = "หืม? มีอะไรหรือครู?"
2003905-45 = "[s] \"ขึ้นไปบนดาดฟ้ากันมั้ย?\""
2003905-46 = "หะ... หืม? ดาดฟ้าของชาเล่ต์อย่างนั้นหรือ?"
2003905-47 = "ทำไมจู่ๆ ถึงชวนไปที่แบบนั้นเล่า... ที่นั่นน่าจะลมแรง และอาจจะอันตรายก็ได้นะ...?"
2003905-48 = "อยากไปชมวิวที่ดาดฟ้ากับเราอย่างนั้นหรือ...?"
2003905-49 = "..."
2003905-50 = "ขะ... เข้าใจแล้ว หากครูต้องการเช่นนั้น เราก็ไม่มีเหตุผลให้ปฏิเสธ..."
2003905-52 = "(คุณครูขึ้นลิฟต์ขึ้นไปบนดาดฟ้ากับคิซากิ)"
2003905-57 = "อึก...!"
2003905-58 = "ลมแรงตามคาดเลย แต่วิวก็สวยดีนะ"
2003905-59 = "ปกติแล้วผู้คนขึ้นมาที่นี่ทำไมหรือครู...?"
2003905-60 = "[s1] \"ก็... เพราะที่นี่อากาศดีไง!\"\n[s2] \"จะโดดงานไปปิกนิกที่อื่นก็จะลำบากเกินไปน่ะ!\""
2003905-66 = "เช่นนั้นหรือ..."
2003905-67 = "ฮุฮุ อาจจะเป็นเช่นนั้นจริงๆ ก็ได้นะ"
2003905-79 = "รู้สึกแปลกจังเลย"
2003905-80 = "ถ้าจะดูวิวละก็ ที่ซานไห่จิงก็มีให้ดูเยอะไปหมด"
2003905-81 = "แต่แค่การมาดูวิวที่นี่แบบนี้ ทำให้เรารู้สึกว่า..."
2003905-84 = "ถ้าได้..."
2003905-85 = "..."
2003905-86 = "ถ้าได้ออกไปไกลกว่านี้สักหน่อยละก็..."
2003905-87 = "[s] \"ไกลกว่านี้เหรอ ได้สิ\""
2003905-88 = "?!?!"
2003905-89 = "ดะ... ได้ยินเราหรือครู!?"
2003905-90 = "[s] \"ก็ที่นี่มีแค่พวกเรานี่\""
2003905-91 = "...!"
2003905-92 = "แอบฟังคนอื่น... เป็นนิสัยที่ไม่ดีนะครู...!"
2003905-93 = "[s] \"แล้วไม่อยากไปเหรอ?\""
2003905-94 = "...!!!"
2003905-95 = "[s] \"ครูอยากไปนะ\""
2003905-96 = "เราจะจำไว้แล้วกัน ครู..."
2003905-97 = "ฮืม..."
2003905-98 = "แล้วเราก็ไม่ได้บอกนะว่าไม่อยากไป"
2003905-99 = "[s3] \"อืม ไว้ไปด้วยกันนะ\"\n[s4] \"ไว้เราไปที่ไกลๆ กว่านี้ด้วยกันนะ\""
2003905-102 = "..."
2003905-103 = "เราตั้งตารอ... ได้ใช่มั้ย? ครู?"
2003905-104 = "[s] \"ได้เต็มที่เลย\""
2003905-110 = "(คิซากิเดินเข้ามาหาโดยไม่พูดอะไรสักคำ)"
2003905-111 = "(ดวงตาของคิซากิมองออกไปไกล)"
2003905-112 = "(แต่ปลายนิ้วของทั้งคู่ก็สัมผัสกันทีละน้อย)"

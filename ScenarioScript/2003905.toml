[translation]
2003905-1 = "離巢之鳥"
2003905-2 = "夏萊辦公室"
2003905-5 = "[ns]「那麼，今天也麻煩你囉。」"
2003905-6 = "唔呣，交給妾身吧。"
2003905-24 = "[ns]「好耶！做完了──！」"
2003905-25 = "呵呵。如此令汝高興嗎？"
2003905-26 = "嗯？應該沒有人會喜歡工作？#n這……雖然妾身也有同感……"
2003905-27 = "總之倒也無妨。#n能見到老師高興的樣子，妾身也感到舒坦許多。"
2003905-28 = "稍後應該沒有其他日程才是？#n老師也稍事休息吧。"
2003905-29 = "唔嗯？妾身彷彿才是這裡的主人？#n那再怎麼說都有些困難吧。"
2003905-30 = "人們……各有各應該待的地方。"
2003905-32 = "（於是妃姬就這樣眺望著窗外的景色）"
2003905-35 = "嗯？景色？#n不，沒什麼特別的……"
2003905-36 = "不過是在隨意眺望罷了。"
2003905-38 = "（雖然妃姬嘴上說得輕描淡寫……）"
2003905-39 = "（但總覺得……他就像是對初次看見的景色深深著迷的……）"
2003905-40 = "（那種孩子一般……）"
2003905-43 = "[ns]「妃姬。」"
2003905-44 = "嗯？老師，怎麼了嗎？"
2003905-45 = "[s]「我們要不要去頂樓看看？」"
2003905-46 = "唔嗯？汝指的是夏萊的頂樓嗎？"
2003905-47 = "為何突然出此提議……#n風應該很大，或許還有危險才是……？"
2003905-48 = "想與妾身一同在屋頂眺望風景……？"
2003905-49 = "……"
2003905-50 = "妾，妾身明白了。#n若老師希望如此，妾身自沒有理由拒絕……"
2003905-52 = "（和妃姬一起搭電梯到了屋頂上）"
2003905-57 = "唔……！"
2003905-58 = "風果然有點強勁。太陽也很刺眼。"
2003905-59 = "汝究竟想在這種地方做什麼？老師……？"
2003905-60 = "[s1]「因為天氣很好呀！」\n[s2]「雖然翹班來郊遊是有點不太好就是了！」"
2003905-66 = "原來如此……"
2003905-67 = "呵呵。或許真是如此吧。"
2003905-79 = "感覺真是奇妙。"
2003905-80 = "明明在山海經也能看到這樣的風景……"
2003905-81 = "但光是在此處看著……"
2003905-84 = "就讓人……"
2003905-85 = "……"
2003905-86 = "不禁想到更遠的地方看看……"
2003905-87 = "[s]「嗯，就這麼做吧。」"
2003905-88 = "！？！？"
2003905-89 = "汝，汝都聽見了嗎？老師！？"
2003905-90 = "[s]「畢竟這裡只有我們兩個嘛。」"
2003905-91 = "……！"
2003905-92 = "……真令人意外。#n想不到汝竟有這種不良嗜好……！"
2003905-93 = "[s]「不喜歡嗎？」"
2003905-94 = "……！！！"
2003905-95 = "[s]「我很期待哦。」"
2003905-96 = "妾身會銘記於心的，老師……"
2003905-97 = "咳，咳哼……"
2003905-98 = "妾身可從未，對此表達任何不滿。"
2003905-99 = "[s3]「嗯，一起到處逛逛。」\n[s4]「一起到更遠的地方去吧。」"
2003905-102 = "……"
2003905-103 = "妾身可以期待嗎，老師？"
2003905-104 = "[s]「敬請期待。」"
2003905-110 = "（妃姬默默地走了過來）"
2003905-111 = "（雖然妃姬的目光看著遠處……）"
2003905-112 = "（但兩人的指尖，卻逐漸接觸了彼此）"

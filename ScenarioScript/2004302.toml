2004302-74 = "3;이즈미 새해;10;이 가루를 뿌려서 먹어 보자!\n#3;em;[반짝]\n#3;greeting"
2004302-75 = "3;이즈미 새해;02;무슨 가루냐고? 바로, '짠맛 감초 사탕가루'야!"
2004302-76 = "[s3] \"그건 또 뭔데?!\"\n[s4] \"무슨 맛이 나길래!?\""
2004302-77 = "#wait;10"
2004302-78 = "#wait;10"
2004302-79 = "3;이즈미 새해;99;이건 말이지, 보통의 짠맛 감초 사탕이 아니야!"
2004302-80 = "3;이즈미 새해;00;바로…… 암모늄? 클로라이드? 가 들어간 감초 사탕이니까!\n#3;jump"
2004302-81 = "[s] \"……먹어도 괜찮은 거, 맞지……?\""
2004302-82 = "3;이즈미 새해;10;당연하지! 이 사탕의 원래 사용 방법 중 하나는, 기침을 가라앉히는 약이었으니까!"
2004302-83 = "3;이즈미 새해;02;어떻게 보면 몸에도 좋고 건강에도 좋은 것일 수도 있다구?"
2004302-84 = "3;이즈미 새해;00;자, 선생님도 사탕, 먹어 봐!\n#3;em;[반응]"

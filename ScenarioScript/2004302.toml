[translation]
2004302-1 = "朝向美食的冒險"
2004302-4 = "啊，老師！這邊這邊！"
2004302-5 = "[s]「嗨，泉！你今天看起來也很有精神呢！」"
2004302-6 = "嗯！因為是新年嘛！#n換上了新衣服，而且還見到了老師！"
2004302-7 = "怎麼能不開心呢！"
2004302-12 = "（泉突然輕輕往懷裡撲了過來！）"
2004302-13 = "[ns]「哎呀，泉這麼開心啊。」"
2004302-14 = "嗯！因為我又開發出新的組合了！"
2004302-18 = "[ns]「那是什麼……？怎麼好像有點可怕……」"
2004302-19 = "這個？老師果然很有眼光！#n這個呢……"
2004302-20 = "是我做的「薄荷巧克力沙丁魚檸檬章魚燒」！"
2004302-21 = "[s]「薄荷……什麼？」"
2004302-22 = "「薄荷巧克力沙丁魚檸檬章魚燒」！#n老師你聽我說哦……"
2004302-23 = "章魚燒和沙丁魚都很好吃，可是一起吃的話腥味會有點重對吧？"
2004302-24 = "所以我有一個想法。"
2004302-25 = "只要加上檸檬和薄荷巧克力醬……"
2004302-26 = "檸檬的清爽跟薄荷巧克力的清涼，不就能去除腥味了嗎！"
2004302-27 = "於是～鏘！跟我預料的一樣，完全沒有腥味！"
2004302-28 = "[s1]「那種吃法……」\n[s2]「腥味當然會完全被遺忘吧！？」"
2004302-31 = "對吧對吧？#n每次成功如願做出新料理的時候，真的都讓人超有成就感的！"
2004302-32 = "問我為什麼要把沙丁魚和章魚燒放在一起吃？"
2004302-36 = "當然是因為兩種料理都很好吃呀！#n好吃加上好吃，不就會變成超級好吃嗎？"
2004302-37 = "[s]「泉總是不停在挑戰新事物呢……」"
2004302-38 = "嗯？那當然囉，我可是美食研究會的一員呢。"
2004302-39 = "美食研究會……就是專門研究食物的社團對吧？"
2004302-40 = "不斷開發新的可能性，發掘讓食物更美味的吃法是我們的使命？"
2004302-41 = "……羽留奈是這樣告訴我的。"
2004302-42 = "不過美食研究會的大家追求美食的目的和方法，其實也各不相同。"
2004302-43 = "就比如羽留奈他認為，雖然料理本身的味道很重要沒錯──"
2004302-44 = "不過除此之外，他更重視什麼樣的元素能夠帶來全新的體驗。"
2004302-45 = "亞伽里則是最關心要吃多少才能滿足！這對他來說是最關鍵的！"
2004302-46 = "啊，當然如果食物不好吃還是不行的。#n讓人不開心的話，就吃不了多少了嘛。"
2004302-47 = "淳子的話……嗯……"
2004302-48 = "他最在意的是，要怎麼做才能吃得到食物！"
2004302-49 = "至於我呢，對如何找出新滋味最感興趣！"
2004302-50 = "[s]「原來如此，大家的出發點都各不相同呢。」"
2004302-51 = "嗯！如果是大家都愛吃的東西，好吃程度自然有保證……"
2004302-52 = "不過我果然還是想追尋更新鮮、更獨特的味道。"
2004302-53 = "從某種角度來說，人生不就是一連串追尋新事物的過程嗎？"
2004302-54 = "當然我也知道自己的口味比較獨特……#n但「鑽研味道」不就是美食「研究」的本質嗎？"
2004302-55 = "[s]「說的也是。追尋美食果然是場冒險呢。」"
2004302-56 = "冒險……？"
2004302-61 = "沒錯，老師！就是這樣！#n難怪我會這麼喜歡老師！"
2004302-62 = "那麼我們要不要……"
2004302-63 = "現在就開始美食的冒險呢？"
2004302-67 = "（雖然浮現了一股不祥的預感……）"
2004302-68 = "（但看著泉燦爛的笑容，還是不自覺地用力點了點頭！）"
2004302-69 = "老師真的很懂我呢！#n那麼，就先把薄荷巧克力沙丁魚檸檬章魚燒……"
2004302-74 = "撒上這個粉末來吃吃看吧！"
2004302-75 = "問我這是什麼粉末？#n是「鹽味的甘草糖粉」哦！"
2004302-76 = "[s3]「那又是什麼東西！？」\n[s4]「究竟會是什麼味道！？」"
2004302-79 = "這可不是普通的鹹甘草糖哦！"
2004302-80 = "是含有……什麼氯化……銨之類的甘草糖！"
2004302-81 = "[s]「吃下去之後不會有事吧……？」"
2004302-82 = "當然囉！這種糖原本的用途之一就是止咳藥！"
2004302-83 = "某種程度來說，是對身體有益的東西。"
2004302-84 = "來，老師快吃吃看吧！"
2004302-89 = "（不由自主地接過泉給的糖並含進了嘴裡！）"
2004302-90 = "（是顆神奇的……黑色菱形糖果……）"
2004302-91 = "[ns]「……哦？」"
2004302-94 = "怎麼樣，老師？吃起來如何？"
2004302-95 = "嗯？雖然甜但不是普通的甜味……"
2004302-96 = "有鹹味卻又不是普通的鹹味……"
2004302-97 = "鹹甜鹹甜的，有種難以言喻的感覺嗎？"
2004302-98 = "嗯！老師品嚐得很仔細呢！這種糖果吃起來就是這樣！"
2004302-99 = "那種來自於氯化……銨還是什麼的鹹味就是它的重點！"
2004302-100 = "現在再把這個糖粉撒在章魚燒上……！"
2004302-105 = "（嚼嚼）"
2004302-109 = "哇！這個味道真的太神奇了，老師！"
2004302-110 = "[ns]「就，就是說啊……」"
2004302-112 = "（之後，泉繼續用自己的特製香料搭配各種小吃一起品嚐）"
2004302-113 = "（隨後莫名答應他下次再一起繼續美食冒險……）"

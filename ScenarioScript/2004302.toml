2004302-65 = "#clearST"
2004302-66 = "#wait;2500"
2004302-67 = "#na;(어딘가 살짝 불길한 예감이 스쳐 지나갔지만…….)"
2004302-68 = "#na;(이즈미의 해맑은 미소에, 힘차게 고개를 끄덕였다!)"
2004302-69 = "4;이즈미 새해;00;알아주는구나, 선생님! 그러면 우선…… 이 민트초코 정어리 레몬 타코야키에 말이지!\n#4;em;[///]\n#4;stiff"

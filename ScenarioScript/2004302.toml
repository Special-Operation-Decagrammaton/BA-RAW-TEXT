[translation]
2004302-1 = "#title;미식을 향한 모험"
2004302-2 = "#wait;2000"
2004302-3 = "4;이즈미 새해;01\n#4;em;[반응]\n#4;a\n#wait;1000"
2004302-4 = "4;이즈미 새해;02;아, 선생님! 여기야, 여기!\n#4;hophop\n#4;m3"
2004302-5 = "[s] \"안녕, 이즈미! 오늘도 밝아 보이네!\""
2004302-6 = "4;이즈미 새해;10;응! 새해니까! 옷도 갈아입어 봤구, 선생님도 만났구!"
2004302-7 = "4;이즈미 새해;03;그야 당연히 기쁠 수밖에 없지!"
2004302-8 = "#st;[0,0];instant;1;"
2004302-9 = "#clearST"
2004302-10 = "4;이즈미 새해;02\n#4;closeup\n#4;a\n#wait;1000"
2004302-11 = "4;이즈미 새해;10\n#4;closeup\n#4;h\n#bgshake\n#wait;1200"
2004302-12 = "#na;(이즈미가 돌연 가볍게 안겨 왔다!)"
2004302-13 = "[ns] \"어이쿠, 우리 이즈미. 정말로 신났구나.\""
2004302-14 = "4;이즈미 새해;00;맞아! 마침 또 새로운 조합을 찾아내 봤거든!\n#4;em;[재잘]"
2004302-15 = "#st;[0,0];instant;1;"
2004302-16 = "#clearST"
2004302-17 = "4;이즈미 새해;02\n#4;greeting\n#4;h\n#wait;1300"
2004302-18 = "[ns] \"……조금 무서운데, 그거 뭐야……?\""
2004302-19 = "4;이즈미 새해;03;이거? 역시 선생님은 알아봐 주는구나! 이건 말이지……."
2004302-20 = "4;이즈미 새해;10;내가 만들어 본, '민트초코 정어리 레몬 타코야키'야!\n#4;em;[반짝]"
2004302-21 = "[s] \"민트…… 뭐요?\""
2004302-22 = "4;이즈미 새해;02;'민트초코 정어리 레몬 타코야키'! 이게 말이야, 선생님. 그러니까……."
2004302-23 = "4;이즈미 새해;01;타코야키도 정어리도 분명 맛있지만, 그 둘을 같이 먹으면 살짝 비린 맛이 날 수도 있거든?\n#4;em;[반응]"
2004302-24 = "4;이즈미 새해;99;그래서 생각해 본 거야."
2004302-25 = "4;이즈미 새해;02;레몬을 곁들이고 민트초코 소스를 뿌리면, 레몬의 상큼한 맛과!"
2004302-26 = "4;이즈미 새해;00;민트초코의 민트초코한 맛이 비린내를 잡아 주지 않을까 해서!\n#4;em;[!]"
2004302-27 = "4;이즈미 새해;03;그리고, 쨔안–! 보시다시피 생각대로 비린 맛이 하나도 안 나는 거 있지!"
2004302-28 = "[s1] \"물론 그렇게 먹으면!\"\n[s2] \"비린 맛은 다른 의미로 완전히 잊히기는 할 것 같은데!\""
2004302-29 = "#wait;10"
2004302-30 = "#wait;10"
2004302-31 = "4;이즈미 새해;10;그치? 그치? 이렇게 생각대로 무언가가 될 때마다, 정말로 기분이 좋거든!"
2004302-32 = "4;이즈미 새해;01;그런데 왜 애초에 정어리와 타코야키를 같이 먹으려던 거냐고?"
2004302-33 = "#st;[0,0];instant;1;"
2004302-34 = "#clearST"
2004302-35 = "4;이즈미 새해;01\n#4;em;…\n#4;h\n#wait;2500"
2004302-36 = "4;이즈미 새해;00;그야 둘 다 맛있으니까! 맛있는 것에 맛있는 것을 더하면, 최고가 되는 게 아닐까?\n#4;em;[반짝]\n#4;closeup\n#fontsize;80"
2004302-37 = "[s] \"이즈미는 언제나 새로운 시도를 하는구나…….\""
2004302-38 = "4;이즈미 새해;02;응? 그야 당연하지. 나는 미식연구회인걸."
2004302-39 = "4;이즈미 새해;01;미식연구회라는 건…… 그러니까, 음식을 연구하는 동아리잖아?"
2004302-40 = "4;이즈미 새해;10;어떻게 하면 음식을, 더 맛있고 특이하게 먹을 수 있을지 개척해 나가는 게, 우리의 사명? 같은 거야!\n#4;em;[재잘]\n#4;hophop"
2004302-41 = "4;이즈미 새해;02;……라고 하루나가 이야기해 줬어."
2004302-42 = "4;이즈미 새해;01;하지만 그것도 그럴 게, 미식연구회는 각각 다른 방법과 목적으로 미식을 추구하잖아?"
2004302-43 = "4;이즈미 새해;99;가령 하루나의 경우에는, 요리 본연의 맛도 중요하지만.\n#4;m2"
2004302-44 = "4;이즈미 새해;99;그것 이외에 어떤 요소가 새로운 경험을 가져다주는지를 중요하게 생각하고."
2004302-45 = "4;이즈미 새해;01;아카리는 얼마나 먹어야 만족할 수 있는가! 같은 걸 가장 중요하다고 하는 것 같아!\n#4;em;[!]"
2004302-46 = "4;이즈미 새해;02;아, 그래도 맛없으면 안 되긴 해. 불쾌해서 많이 못 먹게 된대.\n#4;m3"
2004302-47 = "4;이즈미 새해;99;준코는…… 음……."
2004302-48 = "4;이즈미 새해;00;어떻게 하면 먹을 수 있는가! 를 가장 절실하게 생각하고 있대!\n#4;jump"
2004302-49 = "4;이즈미 새해;10;그리고 내 경우는, 어떻게 하면 새로운 맛을 찾아낼 수 있을지가 가장 궁금한 거야!\n#4;em;[반짝]"
2004302-50 = "[s] \"과연. 각자 입장이 있었구나.\""
2004302-51 = "4;이즈미 새해;01;응! 남들이 다 먹는 건, 물론 검증된 것일 테니까 맛있긴 하지만……."
2004302-52 = "4;이즈미 새해;99;나는 아무래도 조금 더 새로운 것을 찾고 싶어."
2004302-53 = "4;이즈미 새해;00;어떻게 보면 인생이란 새로운 것을 찾아가는 과정이잖아?\n#4;em;[반응]"
2004302-54 = "4;이즈미 새해;10;그래도 이게 나만의 특이한 입맛이라는 것도 알고 있어. 하지만 맛을 연구하는 것이야말로? 미식 '연구'의 본질? 같은 게 아닐까?"
2004302-55 = "[s] \"확실히 그러네. 말 그대로 미식 모험이야.\""
2004302-56 = "4;이즈미 새해;01;모험……?\n#4;stiff"
2004302-57 = "#st;[0,0];instant;1;"
2004302-58 = "#clearST"
2004302-59 = "4;이즈미 새해;01\n#4;em;…\n#4;h\n#wait;2500"
2004302-60 = "4;이즈미 새해;00\n#4;em;[반짝]\n#4;h\n#wait;1200"
2004302-61 = "4;이즈미 새해;10;맞아, 선생님! 그거야! 나, 이래서 선생님이 정말 좋아!\n#4;hophop"
2004302-62 = "4;이즈미 새해;02;그러면 말이야, 우리 이제부터……."
2004302-63 = "4;이즈미 새해;10;새로운 미식 모험을 떠나지 않을래?\n#4;em;[음표]"

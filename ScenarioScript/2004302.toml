[translation]
2004302-1 = "การผจญภัยสู่อาหารเลิศรส"
2004302-4 = "อ๊ะ คุณครู! ทางนี้ ทางนี้!"
2004302-5 = "[s] \"สวัสดี อิซุมิ! วันนี้ก็สดใสจังเลยนะ!\""
2004302-6 = "อื้อ! ก็ปีใหม่ทั้งทีนี่นา! ฉันได้เปลี่ยนชุดใหม่ แล้วก็ได้มาเจอคุณครูด้วย!"
2004302-7 = "จะไม่ให้ฉันสดใสได้ยังไงล่ะ!"
2004302-12 = "(จู่ๆ อิซุมิก็เข้ามากอดเบาๆ!)"
2004302-13 = "[ns] \"โอ้ อิซุมิของครู ดูตื่นเต้นจังเลยนะเนี่ย\""
2004302-14 = "อื้อ! พอดีฉันเพิ่งเจอการผสมผสานใหม่ๆ มาอีกแล้วน่ะ!"
2004302-18 = "[ns] \"นั่นอะไรเหรอ...? ดูน่ากลัวหน่อยๆ นะเนี่ย...\""
2004302-19 = "อันนี้เหรอ? คุณครูดูออกสินะ!"
2004302-20 = "นี่ก็คือ... 'ทาโกะยากิปลาซาร์ดีนเลมอนมิ้นต์ช็อก' ที่ฉันทำขึ้นเอง!"
2004302-21 = "[s] \"ทาโกะยากิปลาซาร์ดีน... อะไรนะ?\""
2004302-22 = "เมนู 'ทาโกะยากิปลาซาร์ดีนเลมอนมิ้นต์ช็อก'! นี้น่ะ..."
2004302-23 = "ทาโกะยากิกับปลาซาร์ดีนมันก็อร่อยทั้งคู่ แต่พอกินด้วยกันก็อาจมีรสคาวนิดหน่อย"
2004302-24 = "ฉันก็เลยมาลองคิดดู"
2004302-25 = "ว่าถ้าใส่เลมอนกับซอสมิ้นต์ช็อกลงไป!"
2004302-26 = "รสชาติที่สดชื่นของเลมอนกับมิ้นต์ช็อกอาจจะช่วยกลบรสคาวให้ก็ได้!"
2004302-27 = "ก็เลยได้เป็น... ท้าดา! เมนูแหวกแนวที่ไม่มีรสคาวอย่างที่ฉันคิดไว้เลย!"
2004302-28 = "[s1] \"มันก็ไม่น่าจะเหลือรสคาวหรอก!\"\n[s2] \"แบบนั้นน่าจะได้รสอื่นมาแทนรสคาวอีกทีนะ!\""
2004302-31 = "ใช่มั้ยล่ะ? ใช่มั้ย? เวลาที่อะไรเป็นไปตามที่ฉันคิด ฉันจะรู้สึกดีมากๆ เลยละ!"
2004302-32 = "แล้วทำไมฉันถึงจะกินปลาซาร์ดีนกับทาโกะยากิด้วยกันตั้งแต่แรกน่ะเหรอ?"
2004302-36 = "ก็มันอร่อยทั้งคู่เลยนี่! ถ้าใส่ของอร่อยๆ ในของอร่อยๆ อีกที มันก็จะอร่อยแบบสุดขั้วเลยไม่ใช่เหรอ?"
2004302-37 = "[s] \"อิซุมิชอบทำอะไรใหม่ๆ ตลอดเลยสินะ...\""
2004302-38 = "หืม? มันก็แน่อยู่แล้ว ก็ฉันอยู่ชมรมชิมอาหารนี่นา"
2004302-39 = "ชมรมชิมอาหาร... เป็นชมรมที่ศึกษาเรื่องอาหารไม่ใช่เหรอ?"
2004302-40 = "ภารกิจของเราก็คือการบุกเบิกวิธีกินอาหารที่อร่อยและพิเศษยิ่งขึ้น!"
2004302-41 = "ฮารุนะบอกไว้ว่าอย่างนั้นน่ะ..."
2004302-42 = "แต่สมาชิกแต่ละคนในชมรมชิมอาหารก็แสวงหาอาหารเลิศรสด้วยวิธีและเป้าหมายที่ต่างกันออกไป"
2004302-43 = "อย่างเช่นฮารุนะที่เน้นเรื่องการชูรสชาติดั้งเดิมของอาหาร"
2004302-44 = "แต่ก็ยังให้ความสำคัญว่าองค์ประกอบใดบ้างของอาหารที่จะให้ประสบการณ์ใหม่ๆ ได้"
2004302-45 = "ส่วนอาคาริก็ให้ความสำคัญกับปริมาณอาหาร! ว่าต้องกินมากแค่ไหนถึงจะพอใจได้!"
2004302-46 = "อ่า แต่ถ้าให้เยอะแต่ไม่อร่อยก็ไม่ได้หรอก แบบนั้นคงไม่อยากกินให้อิ่มเท่าไร"
2004302-47 = "ส่วนจุนโกะก็... อืม..."
2004302-48 = "จุนโกะบอกว่าตัวเองเป็นคนที่จริงจังกับเรื่อง 'ต้องทำยังไงถึงจะได้กิน!' มากที่สุด!"
2004302-49 = "และในกรณีของฉัน ฉันมักสงสัยว่าจะทำยังไงถึงจะค้นพบรสชาติใหม่ๆ ได้!"
2004302-50 = "[s] \"แต่ละคนมีวิถีของตัวเองสินะ\""
2004302-51 = "อื้อ! อาหารปกติที่คนอื่นกินกันเป็นอาหารที่ผ่านการตรวจสอบแล้ว มันก็เลยอร่อยทั้งหมด..."
2004302-52 = "แต่ฉันอยากหาอะไรที่แปลกใหม่กว่านั้นน่ะ"
2004302-53 = "ชีวิตเราคือการค้นหาอะไรใหม่ๆ อยู่แล้วไม่ใช่เหรอ?"
2004302-54 = "แต่ยังไงฉันก็รู้ตัวนะว่านี่เป็นรสนิยมที่ไม่เหมือนใครของฉัน แต่การค้นหาและศึกษารสชาติมันก็เป็น#nแก่นแท้ของการตามหาอาหารเลิศรสนี่นา"
2004302-55 = "[s] \"นั่นสินะ นี่คือการผจญภัยเพื่ออาหารเลิศรสจริงๆ\""
2004302-56 = "ผจญภัย...?"
2004302-61 = "จริงด้วย คุณครู! นั่นแหละ! เพราะแบบนี้ละ ฉันถึงชอบคุณครูจริงๆ!"
2004302-62 = "เอาละ งั้นจากนี้ไป..."
2004302-63 = "เราไปออกผจญภัยสู่อาหารเลิศรสใหม่ๆ กันเลยมั้ย?"
2004302-67 = "(คุณครูเกิดความรู้สึกถึงลางไม่ดีนิดหน่อย...)"
2004302-68 = "(แต่เมื่อเห็นรอยยิ้มสดใสของอิซุมิ คุณครูก็พยักหน้าตอบอย่างยินดี!)"
2004302-69 = "คุณครูเข้าใจฉันสินะ! ถ้างั้นก็... ต้องลองทาโกะยากิปลาซาร์ดีนเลมอนมิ้นต์ช็อกก่อนเลย!"
2004302-74 = "ลองโรยผงนี้ลงไปด้วยดีกว่า!"
2004302-75 = "ผงอะไรน่ะเหรอ? มันก็คือ 'ผงลูกอมชะเอมรสเค็ม' ยังไงล่ะ!"
2004302-76 = "[s3] \"มันคืออะไรเหรอ?!\"\n[s4] \"มันจะเป็นรสยังไงเนี่ย!?\""
2004302-79 = "นี่ไม่ใช่ลูกอมชะเอมรสเค็มทั่วไปหรอกนะ!"
2004302-80 = "เพราะนี่คือ... ลูกอมชะเอมที่ใส่แอมโมเนียมคลอไรด์ลงไปด้วย!"
2004302-81 = "[s] \"มันกินได้จริงๆ ใช่มั้ย...?\""
2004302-82 = "ต้องได้สิ! เดิมทีแล้วลูกอมนี้เป็นยาที่เอาไว้บรรเทาอาการไอด้วยน่ะ!"
2004302-83 = "ถ้าพิจารณาดูแล้ว นี่มันดีต่อทั้งร่างกายและสุขภาพเลยนะ?"
2004302-84 = "เอ้า คุณครูก็ลองกินลูกอมดูสิ!"
2004302-89 = "(คุณครูกัดลูกอมที่อิซุมิยื่นมาให้อย่างกะทันหัน!)"
2004302-90 = "(ลูกอมทรงสี่เหลี่ยมขนมเปียกปูนสีดำอันนี้... มีรสชาติที่แปลกประหลาด...)"
2004302-91 = "[ns] \"หืม...?\""
2004302-94 = "เป็นยังไงบ้าง คุณครู? อร่อยมั้ย?"
2004302-95 = "หืม? มีรสหวานที่ไม่ใช่รสหวานทั่วไป"
2004302-96 = "แล้วก็มีรสเค็มที่ไม่ใช่รสเค็มปกติด้วยงั้นเหรอ?"
2004302-97 = "มันออกหวานๆ เค็มๆ แต่ก็อธิบายให้ชัดเจนได้ยาก?"
2004302-98 = "อื้อ! ได้ลิ้มรสชาติอย่างถูกต้องเลยนี่! มันเป็นลูกอมอย่างที่ว่าเลย!"
2004302-99 = "จุดเด่นของมันอยู่ที่รสเค็มแปลกๆ... ที่มาจาก แอมโมเนียมคลอไรด์นี่ละ!"
2004302-100 = "เอาละ งั้นก็เอามาผงลูกอมนี้มาโรยบนทาโกะยากิ...!"
2004302-105 = "(ง่ำ ง่ำ...)"
2004302-109 = "ว้าว! เป็นรสที่น่าทึ่งเลยละ คุณครู!"
2004302-110 = "[ns] \"กะ... ก็คงงั้นแหละ...\""
2004302-112 = "(หลังจากนั้นอิซุมิก็โรยผงเครื่องเทศที่ตัวเองเตรียมมาบนอาหารทุกจาน)"
2004302-113 = "(แล้วทั้งสองคนก็สัญญาว่าจะไปผจญภัยเพื่ออาหารเลิศรสด้วยกันอีก...)"

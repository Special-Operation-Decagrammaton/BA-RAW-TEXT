2004302-89 = "#na;(엉겁결에 이즈미가 주는 사탕을 받아 물었다!)"
2004302-90 = "#na;(검은 마름모 형태의…… 신기한 사탕이었다…….)"
2004302-91 = "[ns] \"……어?\""
2004302-92 = "3;이즈미 새해;00\n#3;h"
2004302-93 = "#wait;500"
2004302-94 = "3;이즈미 새해;10;어때, 선생님? 어때?"
2004302-95 = "3;이즈미 새해;01;응? 단맛은 단맛인데 보통의 단맛 같지가 않고.\n#3;em;[?]"
2004302-96 = "3;이즈미 새해;01;짠맛은 짠맛인데 보통의 짠맛 같지가 않다고?"
2004302-97 = "3;이즈미 새해;01;분명히 단짠단짠인데 뭔가, 형용할 수 없다고?"
2004302-98 = "3;이즈미 새해;10;응! 제대로 맛을 봤네! 이건 그런 사탕이거든!\n#3;em;[재잘]\n#3;hophop"
2004302-99 = "3;이즈미 새해;03;일반적인 짠맛이 아닌…… 암모늄? 클로라이드? 의 기묘한 짠맛이 포인트니까!"
2004302-100 = "3;이즈미 새해;00;이제 이 사탕가루를, 여기 타코야키 위에 뿌려서……!"

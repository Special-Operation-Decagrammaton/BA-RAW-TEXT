[translation]
3402-1 = "A Slightly Special Morning in Shanhaijing 2"
3402-2 = "I must say, it's truly fortunate."
3402-3 = "I've concluded the day's work before you arrived."
3402-4 = "[s1] \"That reminds me...\"\n[s2] \"...you get work done really quickly, Kisaki.\""
3402-7 = "Fufu. I have very limited time. I can't afford to waste a moment of it."
3402-8 = "Additionally, humans inherently are not existences that embrace \"work\" with open arms."
3402-9 = "[s] \"Does that mean...you're actually a lazy person?!\""
3402-10 = "I wonder... I could not say I particularly like or dislike work."
3402-11 = "I suppose the sentiment is more, \"I do it because there is something that needs to be done.\""
3402-12 = "And if it must be done, efficiency and speed are two tools at my disposal to reduce the work time."
3402-13 = "Yes. I would say, \"If you wish to not work, then do the work.\""
3402-17 = "Hm? People in society may call such a mindset that of a \"workaholic\"?"
3402-18 = "What is that? Ah. People who are addicted to work itself?"
3402-19 = "One would expect that to be a boon upon any organization, but..."
3402-20 = "Did you know, Sensei?"
3402-21 = "A superior that's too diligent, too inflexible...they may tire out their employees."
3402-22 = "With that in mind, me spending a moment of repose in the main room could potentially be seen as a benefit to Genryumon's future."
3402-23 = "What do you think of that, Sensei?"
3402-24 = "[s3] \"Okay, I'll also be more active and enterprising...\"\n[s4] \"...and laze around with Kisaki!\""
3402-27 = "I would, perhaps, say that you do quite enough of that already."
3402-33 = "I-Instructor Kokona?! That is the president's room—"
3402-37 = "Madam, Madam! Uh, um! Is it true?"
3402-39 = "Oh? If it isn't Instructor Kokona."
3402-44 = "Ah, I shouldn't be like this. I'm already a full-fledged lady and an instructor, so I need to follow proper etiquette."
3402-45 = "Hello, Madam! Greetings from the Disciplinary Support Department, Plum Blossom Garden first-year instructor, Sunohara Kokona!"
3402-46 = "Sensei is here too? What's going on?"
3402-47 = "[s] \"Um... I was just getting some tea.\""
3402-49 = "That's no good, Sensei! You shouldn't waste the president's time for no reason!"
3402-50 = "It's of no concern, Instructor Kokona. Well, what brings you here? I haven't seen you quite this frantic in a while."
3402-51 = "Ah, right! There was something I wanted to ask!"
3402-52 = "Is it true that you've started doing banzai stretches again?"
3402-56 = "B-Banzai stretches...?"
3402-57 = "U-Um..."
3402-58 = "Madam?"
3402-59 = "Nothing. I'm just...curious as to where you heard this information from."
3402-60 = "Oh, that! I was going to tell you! A lot of people in Shanhaijing are talking about it!"
3402-64 = "...What?"
3402-65 = "On top of that, while I didn't really get them, there are a bunch of weird rumors going around."
3402-66 = "Could you please tell me about these...rumors?"
3402-67 = "Of course! So there's stuff like, \"As expected, the president didn't give up on banzai stretches!\""
3402-68 = "Oh, and, \"the Genryumon president has been using every means possible to get taller, in secret.\""
3402-69 = "Another one was, \"Genryumon must have made a special 'request' to Saya of the Eastern Alchemy Society.\""
3402-74 = "No, that's, uh..."
3402-76 = "I almost forgot! \"Genryumon can always wipe out the Black Tortoise Promenade, but the reason why they don't do that..."
3402-77 = "...is because the Promenade has been secretly making them food that encourages growth!\""
3402-78 = "There's also something like, \"the day Madam grows taller is the day 'something' from Rikkagaku will be unleashed, which will make Shanhaijing the greatest academy in Kivotos\"."
3402-82 = "By the way, is the last one true, Madam...?"
3402-86 = "U-Um... Instructor Kokona? When it comes to rumors and hearsay, you can generally assume them to be false..."
3402-87 = "Phew, okay! I'm glad that's what I told the children at Plum Blossom Garden!"
3402-88 = "But I also thought it might be awesome to see you make Shanhaijing the greatest academy in all of Kivotos!"
3402-89 = "I'll do my utmost to reach that goal, without relying on fantasy and disorderly rumors..."
3402-90 = "Okie dokie!"
3402-91 = "Oh, my. I feel agitated. There isn't a dark, ulterior motive behind my morning exercises."
3402-92 = "To think that it sparked rumors about growing taller and strange, devious plots. Being the president can be exhausting."
3402-93 = "[s5] \"There's really no reason?\"\n[s6] \"NONE of the rumors are true?\""
3402-96 = "Hm?"
3402-97 = "Do you...also believe that I will not grow, at all?"
3402-98 = "[s] \"Wh-What...?!\""
3402-99 = "In other words, you believe I'll stay like this, forevermore?"
3402-100 = "Is that okay to you, Sensei?"
3402-101 = "Shouldn't humans exist to resist fate, persistently and endlessly?"
3402-102 = "[s] \"It's nothing like that! I respect your growth, Kisaki!\""
3402-103 = "Fufu... Then I shall ask again."
3402-104 = "Does that mean you, Sensei, believe in the rumors that I exercise in hopes of growing taller?"
3402-105 = "Furthermore, do you believe me to be an irrational person, one who follows such irrational thought processes?"
3402-106 = "You've piqued my curiosity. In your mind, what kind of student is Ryuuge Kisaki?"
3402-107 = "[s] \"Th-That is...!\""
3402-109 = "[ns] \"I'm sorry! Please spare me!\""
3402-110 = "Fufu. Don't worry so much, Sensei. At this rate, you're going to make me want to apologize."
3402-111 = "Excuse me...I feel like I've been forgotten."
3402-112 = "My apologies, Instructor Kokona. By any chance, did you hear any more of these...stories?"
3402-113 = "Ah, about that! This is where the rumors get kinda weird, but..."
3402-114 = "But I heard there's a \"Madam for Kung Fu\" faction, lead by Reijo from the Black Tortoise Promenade. The Martial Arts Research Club is part of it, too."
3402-115 = "And then, a \"Madam for Peking Opera\" faction, organized by the Peking Opera Club. Apparently, there's a vicious fight going on in underground channels!"
3402-116 = "?!"
3402-117 = "[ns] \"'What does that even mean?!\""
3402-118 = "Like I said, I don't really get it!"
3402-119 = "(\"Kung Fu Faction\" and \"Peking Opera Faction\"? This sounds strange, yet somewhat familiar...)"
3402-120 = "(Why does this evoke such an apprehensive feeling in me?)"
3402-121 = "Anyways! If you're really just exercising in the morning..."
3402-122 = "The Plum Blossom Garden children and I want to join! May we...?"
3402-123 = "I kind of gave up on banzai stretches, after I found out that they don't actually help with growth..."
3402-124 = "...but I think we'd all be motivated, if you joined! The children and I would definitely find the strength to wake up early!"
3402-125 = "[s] \"You're right! Exercise would be good for children's health!\""
3402-126 = "S-Sensei...?"
3402-127 = "..."
3402-128 = "Fufu. I see. Both Instructor Kokona and Sensei are making excellent points."
3402-129 = "Shanhaijing's future lies in the Plum Blossom Garden."
3402-130 = "I see no drawbacks from greeting the morning with our bright future."
3402-131 = "Really? Yay! Thank you, Madam!"
3402-132 = "Naturally, Sensei will join in as well."
3402-133 = "[s] \"Huh...? M-Me too?!\""
3402-134 = "Of course. Exercise is good for your health."
3402-135 = "The fresh morning air would provide even more benefits, don't you agree?"
3402-142 = "Not so fast. Just where are you scurrying off to, Sensei? There must be an EXTREMELY urgent matter you must attend to."
3402-143 = "[s] \"I don't, but what if I say I'm probably going to have one?\""
3402-144 = "That won't do."
3402-148 = "None of that pouting. Are you not an adult?"
3402-150 = "The story ended with us agreeing to do some morning exercises at the White Tiger Park..."

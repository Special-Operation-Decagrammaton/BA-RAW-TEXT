[translation]
3402-1 = "#title;산해경의 조금 특별한 아침 2"
3402-2 = "3;키사키;03;참으로 다행이라 하지 않을 수 없겠구나.\n#3;a"
3402-3 = "3;키사키;01;선생이 도착하기 전에, 오늘치 업무를 끝마칠 수 있었으니 말이다."
3402-4 = "[s1] \"새삼 느끼지만…….\"\n[s2] \"키사키는 일 처리가 정말 빠르구나…….\""
3402-5 = "#wait;100"
3402-6 = "#wait;100"
3402-7 = "3;키사키;18;후후. 무얼. 한정된 시간을 허투루 쓰고 싶지 않을 뿐이다.\n#3;em;[재잘]"
3402-8 = "3;키사키;99;거기에 사람이란, 모름지기 일을 반기지 않는 존재이니 말이다."
3402-9 = "[s] \"그 말은, 키사키가 사실은 게으름뱅이라든가?!\""
3402-10 = "3;키사키;03;그것은 어떨까……. 특별히 일에 대해 좋고 싫음을 생각하지는 않는다만.\n#3;em;…"
3402-11 = "3;키사키;03;그저 그곳에 해야 할 일이 있기에 그것을 한다, 는 쪽에 가깝겠지."
3402-12 = "3;키사키;07;그리고 이왕 해야 한다면…… 가능한 한 빠르고 효율적으로 끝마쳐 두는 것이 일을 줄이는 방향이 아니겠느냐."
3402-13 = "3;키사키;03;그렇구나. 이른바, '일을 하고 싶지 않다면 일을 하라'는 것에 가깝겠지."
3402-14 = "#st;[0,0];instant;1;"
3402-15 = "#clearST"
3402-16 = "#wait;2500"
3402-17 = "3;키사키;10;음? 세간에는 이른바 워커홀릭……? 이라 불리는 사람들도 있다?\n#3;em;[?]"
3402-18 = "3;키사키;04;그것은 무엇인가? 아하……. 일과 성취, 그 자체에 중독된 사람들 말이구나."
3402-19 = "3;키사키;04;물론 그것은 대개 조직의 발전을 가져올 확률이 높겠지만……."
3402-20 = "3;키사키;07;알고 있는가, 선생?"
3402-21 = "3;키사키;02;융통성 없이 부지런하기만 한 상사는…… 적지 않은 경우 많은 사람들을 피곤하게 하는 법이니 말이다."
3402-22 = "3;키사키;01;그러니 내가 이렇게 내실에서 망중한(忙中閑)을 즐기는 것도, 보기에 따라서는 우리 현룡문 전체를 생각하는 한 방향일 수 있지 않겠느냐."
3402-23 = "3;키사키;03;어떻게 생각하는가, 선생?"
3402-24 = "[s3] \"좋아, 나도 키사키랑 더욱 적극적이고 진취적으로!\"\n[s4] \"있는 힘껏 게으름을 피워 보이겠어!\""
3402-25 = "#wait;100"
3402-26 = "#wait;100"
3402-27 = "3;키사키;10;아니, 이미 충분히 그렇게 하고 있는 듯하다만…….\n#3;em;[땀]"
3402-28 = "#st;[0,0];instant;1;"
3402-29 = "#clearST"
3402-30 = "#all;hide"
3402-31 = "#wait;1500"
3402-32 = "#wait;500"
3402-33 = "#na;현룡문 부원;코, 코코나 교관?! 그곳은 문주님의 내실이므로–"
3402-34 = "#st;[0,0];instant;1;"
3402-35 = "#clearST"
3402-36 = "#wait;800"
3402-37 = "2;코코나;00;문주님, 문주님! 저기, 저기! 그게 사실인가요?\n#2;ar"
3402-38 = "#all;hide"
3402-39 = "3;키사키;18;호오. 코코나 교관이 아닌가.\n#3;closeup"
3402-40 = "#st;[0,0];instant;1;"
3402-41 = "#clearST"
3402-42 = "#all;hide"
3402-43 = "2;코코나;02\n#2;em;[!]\n#wait;1000"
3402-44 = "2;코코나;04;앗, 이래서는 안 돼요. 저는 이미 어엿한 숙녀이자 교관이니까, 충분한 예법과 차례를 지켜야 해요.\n#2;m3"
3402-45 = "2;코코나;03;안녕하세요, 문주님! 훈육지원부 매화원 소속 1학년 교관, 스노하라 코코나 인사드려요!\n#2;greeting\n#2;em;[반짝]"
3402-46 = "2;코코나;02;그런데 선생님도 계셨네요? 무슨 일이세요?"
3402-47 = "[s] \"음…… 그러니까 차를 얻어 마시고 있었어.\""
3402-48 = "#all;hide"
3402-49 = "3;코코나;12;안 돼요, 선생님! 문주님의 시간을 함부로 방해하면 못 쓴다구요!\n#3;hophop"
3402-50 = "3;키사키;03;괜찮다, 코코나 교관. 그보다 무슨 일인가? 코코나 교관이 이렇게 서두르는 것은 간만에 보는 것 같구나."
3402-51 = "3;코코나;11;아, 참. 그랬죠! 여쭈어 보고 싶은 게 있었어요!\n#3;em;[반응]"
3402-52 = "3;코코나;02;문주님께서 튼튼 체조를 다시 시작하셨다는 것이 사실인가요?\n#3;a\n#3;closeup"
3402-53 = "#st;[0,0];instant;1;"
3402-54 = "#clearST"
3402-55 = "#all;hide"
3402-56 = "3;키사키;10;트, 튼튼 체조……?\n#3;em;[!]"
3402-57 = "3;키사키;10;으음…….\n#3;stiff"
3402-58 = "3;코코나;02;문주님?\n#3;em;[?]"
3402-59 = "3;키사키;10;아니다. 그…… 우선, 그 소식을 어디에서 들었는지, 물어도 되겠는가?"
3402-60 = "1;코코나;01;아, 그거요! 그렇지 않아도 말이에요! 지금 산해경 여기저기가 문주님의 아침 체조 이야기로 떠들썩해요!\n#1;hophop\n#1;ar\n#3;m5"
3402-61 = "#st;[0,0];instant;1;"
3402-62 = "#clearST"
3402-63 = "1;코코나;01\n3;키사키;10\n#1;h\n#3;h\n#3;em;…\n#wait;2500"
3402-64 = "3;키사키;10;……뭐라?\n#3;em;[?]"
3402-65 = "1;코코나;01;거기에 저는 잘 이해 못했지만, 별의별 이상한 소문들도 같이 퍼지고 있는 중이어서요."
3402-66 = "3;키사키;04;좀 더 자세히 말해 볼 수 있겠느냐?"
3402-67 = "1;코코나;03;그럼요! 그러니까 가령…… 그래요! '역시 문주님께서는 튼튼 체조를 그만두지 않으셨다!' 라든가…….\n#1;em;[재잘]"
3402-68 = "1;코코나;02;'그동안 현룡문은 문주님의 키를 크게 하기 위해 모든 수단을 비밀리에 사용해 왔다.'"
3402-69 = "1;코코나;05;'그중에는 연단방의 사야에게 현룡문의 방식으로 특별한 '요청'을 했다는 것도 분명 있을 것이다.'"
3402-70 = "#st;[0,0];instant;1;"
3402-71 = "#clearST"
3402-72 = "1;코코나;05\n3;키사키;10\n#1;h\n#3;h\n#3;em;[땀]\n#wait;1500"
3402-73 = "#all;hide"
3402-74 = "3;키사키;10;아니, 그건, 그러니까…….\n#3;stiff\n#3;closeup"
3402-75 = "#all;hide"
3402-76 = "3;코코나;03;또 있어요! '현룡문은 언제든 현무상회를 일망타진할 수 있지만, 그렇게 하지 않는 것은.'\n#3;m2\n#3;jump"
3402-77 = "3;코코나;01;'현무상회가 비밀리에 키를 자라게 하는 데에 좋다는 음식을 진상하고 있기 때문일 것이다.' 도 있었고.\n#3;m3\n#3;em;[!]"
3402-78 = "3;코코나;99;'문주님의 키가 자라는 날, 마침내 육화각 지하에 봉인된 '무언가'가 풀려나, 산해경을 키보토스 제일의 학원으로 만들 것이다.' 같은 것도요.\n#3;m4\n#3;hophop"
3402-79 = "#st;[0,0];instant;1;"
3402-80 = "#clearST"
3402-81 = "3;코코나;99\n#3;em;…\n#wait;2500"
3402-82 = "3;코코나;02;그런데, 마지막 소문은 정말인가요. 문주님……?\n#3;em;[?]\n#3;m3"
3402-83 = "#st;[0,0];instant;1;"
3402-84 = "#clearST"
3402-85 = "3;키사키;04\n#3;em;[땀]\n#wait;1500"
3402-86 = "3;키사키;10;으, 으음…… 코코나 교관? 자고로 소문이나 풍문이란, 대부분의 경우 그다지 신뢰하여 믿을 것이 되지 못하는 법이니라…….\n#3;stiff"
3402-87 = "3;코코나;03;역시 그렇죠? 매화원 아이들에게 그렇게 말해 두길 잘했네요!\n#3;greeting\n#3;em;[반짝]"
3402-88 = "3;코코나;01;그렇지만 역시 문주님께서 산해경을 키보토스 제일의 학원으로 만드는 모습은 조금 보고 싶을지도요……."
3402-89 = "3;키사키;04;……그런 어수선하고 불안한 무언가에 의지하지 않고, 최대한 힘 내 보도록 하마……."
3402-90 = "3;코코나;03;네!\n#3;em;[!]"
3402-91 = "3;키사키;13;이것 참, 그야말로 뒤숭숭하구나. 애초에 내가 체조를 하는 이유는 다른 데에 있는데 말이다.\n#3;em;[속상함]\n#3;stiff"
3402-92 = "3;키사키;08;키를 크게 하기 위해 체조를 한다느니, 모르는 꿍꿍이가 있을 것이라느니. 정말이지, 문주라는 것도 피곤한 자리다."
3402-93 = "[s5] \"그런데… 정말 그 이유뿐이야?\"\n[s6] \"소문과는 정말로 관계없어?\""
3402-94 = "#wait;100"
3402-95 = "#wait;100"
3402-96 = "3;키사키;06;호오?"
3402-97 = "3;키사키;03;그 말은 즉, 선생도 내가 키가 크지 않을 것이라고 생각한다는 것인가?"
3402-98 = "[s] \"뭐, 뭐라고……?!\""
3402-99 = "3;키사키;03;즉, 내가 언제까지나 이대로 남을 것이라고 생각하느냐는 것이다."
3402-100 = "3;키사키;07;그러나, 선생. 그것으로 좋다고 생각하는가?\n#3;em;…"
3402-101 = "3;키사키;06;인간이란 모름지기, 끊임없이 저항해야 하는 존재여야 하지 않을까?"
3402-102 = "[s] \"그런 건 아니야! 키사키의 성장을 존중해!\""
3402-103 = "3;키사키;18;후후……. 그렇다면 다시 묻도록 하지."
3402-104 = "3;키사키;03;그렇다는 것은, 선생 역시 내가 키를 자라게 하기 위해서 체조를 한다는 소문을 믿는 것인가?"
3402-105 = "3;키사키;03;나아가, 내가 그렇게 비합리적인 사고방식을 따르는 비합리적인 사람으로 보이는가?"
3402-106 = "3;키사키;18;이쯤 되니 궁금해지는구나. 선생의 생각 속에서, 류우게 키사키는 어떤 학생인가?\n#3;a\n#3;closeup"
3402-107 = "[s] \"그, 그러니까……!\""
3402-108 = "#wait;1000"
3402-109 = "[ns] \"잘못했습니다! 살려주세요!\""
3402-110 = "3;키사키;03;후후. 괜찮다. 선생. 이쯤 되면 도리어 내가 미안해질 지경이구나.\n#3;em;[재잘]"
3402-111 = "1;코코나;04;저기……. 저 슬슬 잊혀지고 있지 않나요……?\n#1;em;…\n#1;ar\n#3;m5"
3402-112 = "3;키사키;04;음. 이거 실례했구나. 코코나 교관. 그러고 보니 또 다른 이야기는 없는가?"
3402-113 = "1;코코나;11;아, 그거 말이죠! 어, 그러니까 여기서부터는 진짜 잘 모르겠는 소문이긴 한데요…….\n#1;em;[!]"
3402-114 = "1;코코나;02;현무상회의 레이죠 언니와 무술연구부를 위시로 한 '문주님 쿵후파'와."
3402-115 = "1;코코나;02;경극부 언니들을 중심으로 한 '문주님 경극파'로 나뉘어서, 물밑 다툼을 하고 있다는 소리도 들리고는 있는데……."
3402-116 = "1;코코나;02\n3;키사키;10;?!\n#3;em;[?!]\n#3;stiff\n#1;h\n#3;h"
3402-117 = "[ns] \"그건 또 뭐야……?\""
3402-118 = "1;코코나;11;저도 정말 모르겠어요…….\n#1;em;[땀]"
3402-119 = "3;키사키;13;('쿵후파'와 '경극파'라고……? 무언가 알 듯하면서도 모를 듯한 이야기로구나.)\n#3;em;…\n#1;dl\n#3;m3"
3402-120 = "3;키사키;06;(그렇지만 이렇게나 불길한 예감이 드는 것은, 어찌하여……?)"
3402-121 = "3;코코나;01;아무튼요! 저기, 혹시 문주님께서 정말 아침 체조를 하고 계신 거라면…….\n#3;jump"
3402-122 = "3;코코나;02;저도, 매화원 아이들도 같이하고 싶어요! 혹시 안 될까요……?"
3402-123 = "3;코코나;99;키가 자라는 데에 큰 효과가 없다는 말에, 튼튼 체조를 그만두었지만……."
3402-124 = "3;코코나;03;문주님께서 함께 해 주신다면, 저도 매화원 아이들도 아침에 더 일찍 일어날 수 있을 것 같아요!\n#3;em;[!]"
3402-125 = "[s] \"그러네! 체조는 아이들의 건강에 좋을 것 같아!\""
3402-126 = "3;키사키;10;서, 선생……?\n#3;stiff"
3402-127 = "3;키사키;10;…….\n#3;em;…"
3402-128 = "3;키사키;03;후후. 그렇구나. 코코나 교관의 말에도, 선생의 말에도 일리는 있다."
3402-129 = "3;키사키;07;매화원은 언제나 산해경의 미래인 것이니……."
3402-130 = "3;키사키;03;그 미래와 함께, 아침을 맞는 것도 나쁜 길은 아닐 것 같구나."
3402-131 = "3;코코나;03;와아, 정말요? 감사합니다, 문주님!\n#3;hophop\n#3;em;[반짝]"
3402-132 = "3;키사키;18;그리고 그 길에는, 분명 선생도 함께할 것이라고 믿어 의심치 않노라."
3402-133 = "[s] \"어……? 나, 나도?!\""
3402-134 = "3;키사키;03;물론이다. 체조는 건강에 좋은 것이 아니더냐."
3402-135 = "3;키사키;03;그것이 아침의 신선하고 맑은 공기라면, 더더욱 그럴 것이고?"

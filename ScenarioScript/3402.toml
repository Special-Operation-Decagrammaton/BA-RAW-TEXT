[translation]
3402-1 = "ยามเช้าที่พิเศษนิดหน่อยของซานไห่จิง 2"
3402-2 = "เรารู้สึกโชคดีอย่างมากเลยนะ"
3402-3 = "ที่จัดการงานได้เสร็จก่อนที่ครูจะมาถึง"
3402-4 = "[s1] \"ครูคิดมานานแล้วนะว่าคิซากิทำงานเร็วมาก\"\n[s2] \"คิซากิทำงานเร็วมากจริงๆ เลยนะ\""
3402-7 = "ฮุฮุ ไม่เท่าไรหรอก เราแค่ไม่อยากให้เวลาอันล้ำค่าต้องเสียไปอย่างเปล่าประโยชน์ก็เท่านั้น"
3402-8 = "นอกจากนี้ มนุษย์เราเป็นสิ่งมีชีวิตที่ไม่ยินดีกับการทำงานหรอก"
3402-9 = "[s] \"งั้นหมายความว่าจริงๆ แล้วคิซากิเป็นคนขี้เกียจเหรอ?!\""
3402-10 = "จะเป็นอย่างไรกันนะ... เราไม่ได้ชอบหรือไม่ได้รังเกียจการทำงานเป็นพิเศษ"
3402-11 = "แต่ในเมื่อมีสิ่งที่เราต้องทำ เราก็เลยทำเท่านั้น"
3402-12 = "และในเมื่อเป็นสิ่งที่ต้องทำแล้ว... ก็ควรจะรีบทำอย่างรวดเร็วและมีประสิทธิภาพมากที่สุดเท่าที่จะเป็น#nไปได้มิใช่หรือ?"
3402-13 = "นั่นสินะ... มันอาจจะใกล้เคียงกับคำว่า 'ถ้าไม่อยากทำงาน ก็จงทำงาน' ก็ได้"
3402-17 = "หืม? มีคำที่ใกล้เคียงอยู่ด้วย...? เรียกย่อๆ ว่า 'คนบ้างาน' งั้นหรือ?"
3402-18 = "มันหมายถึงอะไรหรือ? อ้อ... หมายถึงคนที่เสพติดการทำงานและความสำเร็จสินะ"
3402-19 = "แน่นอนว่ามันจะเป็นสิ่งที่นำไปสู่การพัฒนาองค์กรได้มากที่สุด แต่ว่า..."
3402-20 = "รู้รึเปล่า ครู?"
3402-21 = "หัวหน้าที่เอาแต่ขยันอย่างเดียวจนไร้ความยืดหยุ่น... หลายครั้งก็ทำให้คนจำนวนมากต้องรู้สึกเหนื่อย..."
3402-22 = "เช่นนั้น การที่เราใช้เวลาพักผ่อนอย่างเงียบสงบอยู่ในห้องแบบนี้ ในอีกแง่หนึ่งก็คือการทำเพื่อสมาชิก#nมังกรดำทุกคนไม่ใช่หรือ?"
3402-23 = "คิดว่าอย่างไรเล่า ครู?"
3402-24 = "[s3] \"ดีละ ครูจะขยันไปพร้อมกับคิซากิเอง!\"\n[s4] \"ครูจะขี้เกียจให้สุดๆ ไปเลย!\""
3402-27 = "ไม่ละ เราทำเช่นนั้นมานานพอสมควรแล้ว..."
3402-33 = "ผะ... ผู้ฝึกสอนโคโคน่า?! ตรงนั้นมันห้องส่วนตัวของท่านประมุข..."
3402-37 = "ท่านประมุข! ท่านประมุข! คือ... คือว่า... เรื่องนั้นเป็นเรื่องจริงรึเปล่าคะ?"
3402-39 = "โฮ่ ผู้ฝึกสอนโคโคน่าเองหรือ"
3402-44 = "อ๊ะ ปล่อยไว้แบบนี้ไม่ได้แล้ว ในฐานะที่ฉันเป็นผู้ใหญ่ที่น่านับถือและเป็นผู้ฝึกสอน ฉันจะต้องปฏิบัติตามมารยาทให้เหมาะสมด้วย"
3402-45 = "สวัสดีค่ะ ท่านประมุข! ผู้ฝึกสอนปี 1 ของฝ่ายสนับสนุนด้านวินัยสวนต้นบ๊วย สึโนฮาระ โคโคน่าค่ะ!"
3402-46 = "ว่าแต่ว่าคุณครูก็อยู่ด้วยเหรอคะ? มีเรื่องอะไรรึเปล่าคะ?"
3402-47 = "[s] \"อืม... ครูแวะมาดื่มชาน่ะ\""
3402-49 = "ไม่ได้นะคะ คุณครู! จะมารบกวนเวลาของท่านประมุขแบบนี้ไม่ได้นะคะ!"
3402-50 = "ไม่เป็นไรหรอก ผู้ฝึกสอนโคโคน่า แล้วมาหาเราเพราะมีเรื่องอะไรงั้นหรือ? นานแล้วนะที่ไม่เห็นเธอรีบ#nร้อนแบบนี้น่ะ"
3402-51 = "อ๊ะ จริงด้วยค่ะ! ฉันมีเรื่องที่อยากจะถามอยู่ค่ะ!"
3402-52 = "จริงรึเปล่าคะที่ท่านประมุขเริ่มฝึกกายบริหารเพิ่มพละกำลังแล้วน่ะค่ะ?"
3402-56 = "กะ... กายบริการเพิ่มพละกำลัง...?"
3402-57 = "อืม..."
3402-58 = "ท่านประมุข?"
3402-59 = "ปะ... เปล่าหรอก แล้วนี่... เธอไปได้ข่าวนี้มาจากที่ไหนหรือ?"
3402-60 = "อ๊ะ ฉันกำลังจะบอกเรื่องนั้นพอดีเลยค่ะ! ตอนนี้คนอื่นๆ กำลังพูดถึงการฝึกกายบริหารของท่านประมุข#nอยู่ทั่วซานไห่จิงเลยค่ะ!"
3402-64 = "ว่าอย่างไรนะ...?"
3402-65 = "ฉันเองก็ไม่ค่อยเข้าใจเท่าไร แต่ว่ามันมีข่าวลือแปลกๆ แพร่กระจายไปทั่วเลยค่ะ"
3402-66 = "ช่วยเล่าให้เราฟังอีกหน่อยได้หรือเปล่า?"
3402-67 = "ได้อยู่แล้วค่ะ! เรื่องนั้นก็ประมาณว่า... 'คิดแล้วเชียว ท่านประมุขไม่ได้ล้มเลิกการฝึกกายบริหารเพิ่ม#nพละกำลังจริงๆ ด้วย!' "
3402-68 = "แล้วก็ 'ที่ผ่านมามังกรดำพยายามอย่างลับๆ เพื่อเพิ่มความสูงให้ท่านประมุข'..."
3402-69 = "หรือไม่ก็ 'ในบรรดาวิธีที่พวกมังกรดำใช้จะต้องมีคำขอพิเศษไปถึงท่านซายะแห่งชมรมวิจัยศาสตร์ปรุง#nยาแน่ๆ เลย'"
3402-74 = "เดี๋ยวก่อน นั่นมัน... คือว่า..."
3402-76 = "ยังมีอีกนะคะ! อย่างเช่น 'มังกรดำสามารถโจมตีย่านการค้าเทพเต่าดำได้ตลอด แต่ก็ไม่ยอมทำแบบนั้น'"
3402-77 = "หรือไม่ก็ 'ที่เป็นแบบนั้นก็อาจเป็นเพราะทางย่านการค้าอาจเตรียมอาหารสูตรเพิ่มความสูงส่งให้ทาง#nมังกรดำอย่างลับๆ ก็ได้' "
3402-78 = "'วันที่ท่านประมุขสูงขึ้น บางสิ่งที่ถูกกักขังไว้ที่ชั้นใต้ดินของอาคารหกเหลี่ยมนี้จะถูกปลดปล่อยออกมา และทำให้ซานไห่จิงเป็นสถาบันที่ยอดเยี่ยมที่สุดในคิโวทอส' แบบนี้ค่ะ"
3402-82 = "ว่าแต่ว่า ข่าวลือเรื่องสุดท้ายนี่เป็นความจริงรึเปล่าคะ ท่านประมุข...?"
3402-86 = "อะ... อื้ม... ผู้ฝึกสอนโคโคน่า? ตั้งแต่ไหนแต่ไรมาข่าวลือไม่ใช่เรื่องที่จะเชื่อถือได้อยู่แล้ว..."
3402-87 = "คิดแล้วเชียว เป็นอย่างนั้นสินะคะ ดีจังเลยที่ฉันบอกพวกเด็กๆ ที่สวนต้นบ๊วยเอาไว้ก่อนแล้วค่ะ!"
3402-88 = "แต่ถึงอย่างนั้นฉันก็อยากเห็นท่านประมุขทำให้ซานไห่จิงเป็นโรงเรียนที่ยอดเยี่ยมที่สุดในคิโวทอสอยู่#nเหมือนกันนะคะ..."
3402-89 = "เราจะพยายามอย่างเต็มที่เท่าที่เราจะทำได้ และจะไม่พึ่งพาสิ่งที่ไม่มั่นคงหรือเรื่องวุ่นวายเช่นนั้น..."
3402-90 = "ค่ะ!"
3402-91 = "จริงๆ เลย น่ากังวลนัก... ที่เราออกกำลังกายบริหารก็เพราะสาเหตุอื่นแท้ๆ"
3402-92 = "แต่กลับเอาไปเล่าลือกันว่าเราทำกายบริหารเพื่อให้สูงขึ้น หรือวางแผนอะไรบางอย่าง... การเป็นประมุขนี่ช่างเป็นเรื่องที่น่าเหนื่อยหน่ายเหลือเกิน"
3402-93 = "[s5] \"แต่ว่า... มีเหตุผลแค่นั้นจริงเหรอ?\"\n[s6] \"ไม่มีเหตุผลอื่นตามข่าวลือจริงเหรอ?\""
3402-96 = "โฮ่?"
3402-97 = "พูดเช่นนั้นหมายความว่า ครูเองก็คิดว่าเราจะไม่สูงขึ้นแล้วหรือ?"
3402-98 = "[s] \"พะ...พูดอะไรอย่างนั้นน่ะ?!\""
3402-99 = "พูดอีกอย่างก็คือ ครูคิดว่าความสูงของเราจะหยุดอยู่เพียงเท่านี้อย่างไรเล่า"
3402-100 = "แต่ว่านะ ครู บางทีนั่นอาจจะเป็นความคิดที่ดีก็ได้นะ"
3402-101 = "มนุษย์เราน่ะ จะต้องเผชิญกับการต่อต้านอย่างไร้ที่สิ้นสุด ถึงจะคงอยู่มิใช่หรือ?"
3402-102 = "[s] \"ไม่ใช่แบบนั้นซะหน่อย! ครูเชื่อในการเติบโตของคิซากินะ!\""
3402-103 = "ฮุฮุ... เช่นนั้นเราขอถามอีกครั้ง"
3402-104 = "ครูยังเชื่อข่าวเล่าลือที่ว่าเราออกกำลังกายบริหารเพื่อให้สูงขึ้นอยู่หรือ?"
3402-105 = "นอกจากนี้ เราดูเหมือนคนที่จะทำตามเรื่องที่ไม่สมเหตุสมผลเช่นนั้นหรือ?"
3402-106 = "ตอนนี้เราชักเริ่มสงสัยขึ้นมาแล้วสิ ว่าในความคิดของครู ริวเกะ คิซากิคนนั้นเป็นนักเรียนแบบไหนกัน?"
3402-107 = "[s] \"ครู... ครูหมายถึง...!\""
3402-109 = "[ns] \"ครูผิดไปแล้ว ยกโทษให้ครูเถอะ!\""
3402-110 = "ฮุฮุ ไม่เป็นไรหรอก ครู ตอนนี้เราเริ่มรู้สึกอยากขอโทษขึ้นมาแล้วละ"
3402-111 = "คือว่า... ยังไม่ลืมใช่ไหมคะว่าฉันอยู่ตรงนี้ด้วย...?"
3402-112 = "อืม ขอโทษที่เสียมารยาทนะ ผู้ฝึกสอนโคโคน่า แล้วนี่ยังมีเรื่องอื่นอีกหรือไม่?"
3402-113 = "อ๊ะ จริงด้วยค่ะ! แต่ว่าเป็นข่าวลือที่ฉันไม่ค่อยแน่ใจเท่าไร..."
3402-114 = "แต่มีข่าวลือว่ามีการแบ่งเป็นสองฝ่ายระหว่าง 'การฝึกกังฟูของท่านประมุข' ที่นำโดยพี่เรย์โจวจากย่าน#nการค้าและชมรมวิจัยศิลปะป้องกันตัว"
3402-115 = "กับฝ่าย 'การฝึกงิ้วของท่านประมุข' ที่นำโดยเหล่าพี่สาวจากชมรมการแสดงงิ้วด้วย..."
3402-116 = "?!"
3402-117 = "[ns] \"เรื่องอะไรอีกน่ะ?\""
3402-118 = "ฉันก็ไม่ค่อยรู้เหมือนกันค่ะ..."
3402-119 = "('ฝ่ายกังฟู' กับ 'ฝ่ายแสดงงิ้ว' งั้นเหรอ...? ช่างเป็นเรื่องที่เหมือนจะเข้าใจ แต่ก็ไม่เข้าใจเลยเสียจริงๆ)"
3402-120 = "(แต่ทำไมถึงสังหรณ์ใจไม่ดีเช่นนี้กันนะ...?)"
3402-121 = "ยังไงก็เถอะค่ะ! เอ่อ ถ้าเกิดว่าท่านประมุขทำกายบริหารตอนเช้าจริงๆ ละก็..."
3402-122 = "ฉันกับพวกเด็กๆ สวนต้นบ๊วยก็อยากร่วมด้วยค่ะ! จะได้รึเปล่าคะ...?"
3402-123 = "ฉันเลิกทำกายบริหารเพราะได้ยินมาว่ามันไม่ได้ช่วยทำให้สูงขึ้น..."
3402-124 = "แต่ถ้าท่านประมุขมาทำกายบริหารด้วยกันละก็ คงจะทำให้พวกเด็กๆ ยอมตื่นเช้ากันแน่ค่ะ!"
3402-125 = "[s] \"นั่นสิ! ทำกายบริหารจะช่วยให้เด็กๆ สุขภาพดีนะ!\""
3402-126 = "คะ... ครู...?"
3402-127 = "......"
3402-128 = "ฮุฮุ อย่างนั้นเองหรือ คำพูดของผู้ฝึกสอนโคโคน่ากับครูก็ฟังดูมีเหตุผลอยู่"
3402-129 = "เหล่าเด็กน้อยของสวนต้นบ๊วยคืออนาคตของซานไห่จิง..."
3402-130 = "พอคำนึงถึงเรื่องนั้นแล้ว เราคิดว่ามาร่วมกายบริหารตอนเช้าคงไม่ใช่เรื่องไม่ดี"
3402-131 = "ว้าว จริงเหรอคะ? ขอบคุณมากค่ะ ท่านประมุข!"
3402-132 = "และเพื่อการนั้นแล้ว... เรามั่นใจว่าครูก็จะมาร่วมกับเราด้วยเช่นกันนะ"
3402-133 = "[s] \"เอ๋...? ครู... ครูด้วยเหรอ?!\""
3402-134 = "ใช่แล้ว กายบริหารเป็นสิ่งที่ดีต่อสุขภาพไม่ใช่หรือ?"
3402-135 = "โดยเฉพาะการทำกายบริหารในตอนเช้าที่อากาศสดชื่นน่าจะยิ่งดีใช่หรือเปล่าล่ะ?"
3402-142 = "ฮึ่ม หรือครูคิดจะหนีไปเพียงคนเดียว? ตอนนี้มีเรื่องด่วนที่ต้องจัดการอยู่งั้นหรือ ครู?"
3402-143 = "[s] \"ไม่มีหรอก แต่คงมีในเร็วๆ นี้แหละ\""
3402-144 = "ไม่ได้"
3402-148 = "เดี๋ยวสิ อย่าทำหน้าเหมือนจะร้องไห้อย่างนั้นสิ ครูเป็นผู้ใหญ่แล้วนะ..."
3402-150 = "(และเรื่องราวการทำกายบริหารเพิ่มพละกำลังในยามเช้าก็ได้ข้อยุติลงแบบนั้น...)"

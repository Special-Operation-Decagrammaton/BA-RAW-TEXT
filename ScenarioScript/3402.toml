[translation]
3402-1 = "山海經的特別早晨（２）"
3402-2 = "屬實令人慶幸。"
3402-3 = "得以在老師抵達之前，將今日的工作處理完畢。"
3402-4 = "[s1]「我再次感受到……」\n[s2]「妃姬的工作效率還真高啊……」"
3402-7 = "呵呵。沒什麼，不過是不願虛耗有限的時間罷了。"
3402-8 = "況且，人本就不是喜歡工作的存在。"
3402-9 = "[s]「也就是說，妃姬其實是個懶惰的人嗎？」"
3402-10 = "怎麼說呢……妾身對工作並無好惡之類的情感。"
3402-11 = "眼見職責便將其完成……如此形容也許更貼切吧。"
3402-12 = "既然橫豎都得做……盡可能執行地快速而高效，不也能減少工作量嗎？"
3402-13 = "沒錯，也就是所謂的「知難而行」。"
3402-17 = "嗯？世上有種人被稱作「工作狂」……？"
3402-18 = "不知那指的是……？#n啊啊……意即對工作與成就感成癮之人啊。"
3402-19 = "儘管那通常能為組織發展有所成就……"
3402-20 = "不過老師應該也明白吧？"
3402-21 = "一名不知變通，僅有勤奮可言的上司……往往會導致許多人疲於奔命。"
3402-22 = "因此妾身於內堂中忙裡偷閒……某方面而言，也算是為整個玄龍門著想吧。"
3402-23 = "汝對此有何見解呢，老師？"
3402-24 = "[s3]「好，那我也要像妃姬一樣積極進取！」\n[s4]「我會盡全力偷懶給你看！」"
3402-27 = "唔，汝應已正在偷懶才是……"
3402-33 = "心，心菜教官！？#n那裡是門主大人的內堂──"
3402-37 = "門主大人，門主大人！#n那件事是真的嗎？"
3402-39 = "哦？是心菜教官啊。"
3402-44 = "啊，這樣不行。#n我已經是個成熟的淑女和教官了，應該遵守禮儀和順序才對。"
3402-45 = "您好，門主大人！#n培育支援部梅花園一年級教官，春原心菜向您問好！"
3402-46 = "老師也在這裡呀？有什麼事嗎？"
3402-47 = "[s]「唔嗯……只是來喝杯茶而已。」"
3402-49 = "這怎麼行呢，老師！不可以隨便占用門主大人的時間！"
3402-50 = "無須擔心，心菜教官。#n話說汝特此前來所為何事？心菜教官竟會如此著急，實屬罕見啊。"
3402-51 = "啊，差點忘了。#n我是來向您請教一件事的！"
3402-52 = "聽說門主大人重新開始做萬歲體操了，這是真的嗎？"
3402-56 = "萬，萬歲體操……？"
3402-57 = "唔嗯……"
3402-58 = "門主大人？"
3402-59 = "不，沒什麼。#n首先……能否請教汝是從何處得知此事？"
3402-60 = "啊，您說這個啊！#n其實現在山海經到處都在談論門主大人的早操哦！"
3402-64 = "……什麼？"
3402-65 = "而且還有很多……我不是很懂的奇怪傳聞。"
3402-66 = "能否請汝詳細說明？"
3402-67 = "當然！比如……對了！#n像是「門主大人果然沒有放棄萬歲體操！」……"
3402-68 = "「一直以來，玄龍門都在祕密使用各種手段讓門主大人長高」……"
3402-69 = "「其中肯定有向鍊丹術研究會的沙耶，以玄龍門的方式提出特別『請求』」之類的。"
3402-74 = "不，那個……"
3402-76 = "還不只這些哦！除此之外還有……#n「玄龍門其實隨時可以將玄武商會一網打盡，之所以沒有那麼做──」"
3402-77 = "「是因為玄武商會正祕密提供有助於長高的食物」之類的……"
3402-78 = "甚至還有「在門主大人長高的那天，封印在六和閣地下的『某物』將獲得釋放，#n讓山海經成為奇普托斯最好的學園」之類的。"
3402-82 = "話說最後一個傳聞是真的嗎，門主大人……？"
3402-86 = "唔，唔嗯……心菜教官？#n傳聞與流言，多數情況下都不值得相信……"
3402-87 = "果然是這樣嗎？#n我也是這麼告訴梅花園的孩子們的！"
3402-88 = "不過我還是有點想看見門主大人您，把山海經變成奇普托斯最好的學園的樣子……"
3402-89 = "此事妾身自會竭盡所能，然並不會倚賴此類混亂與不安之物……"
3402-90 = "是！"
3402-91 = "真不像話。#n妾身之所以做早操另有其用意。"
3402-92 = "稱之乃為了長高，或有不可告人之目的……居門主之位也真累人啊。"
3402-93 = "[s5]「不過……原因真的只有那樣嗎？」\n[s6]「真的跟傳聞說的無關嗎？」"
3402-96 = "哦？"
3402-97 = "老師言下之意──是認為妾身不會長高嗎？"
3402-98 = "[s]「咦，咦咦……！？」"
3402-99 = "換言之，汝認為妾身將永遠保持如此？"
3402-100 = "然而老師，汝真心覺得這樣好嗎？"
3402-101 = "人是應當不斷抗爭的存在──不是嗎？"
3402-102 = "[s]「我不是那個意思！我尊重妃姬的成長！」"
3402-103 = "呵呵……那麼妾身再問汝一次。"
3402-104 = "老師相信妾身做早操是為了長高的傳聞嗎？"
3402-105 = "或者進一步說，汝認為妾身是會遵循此類不合理想法之人嗎？"
3402-106 = "妾身十分好奇──在老師眼中，龍華妃姬究竟是名什麼樣的學生？"
3402-107 = "[s]「那，那個……！」"
3402-109 = "[ns]「對不起！請原諒我吧！」"
3402-110 = "呵呵。無須掛心，老師。#n如此妾身反而會感到有些過意不去。"
3402-111 = "那個……兩位是不是忘了我還在這裡……？"
3402-112 = "唔呣，恕妾身失禮了，心菜教官。#n除方才提及的內容外，是否還有其他傳聞？"
3402-113 = "啊，這麼說來……！#n唔嗯，不過接下來這個傳聞我就真的搞不太懂了……"
3402-114 = "聽說以玄武商會的令女姐姐和武術研究部為首的「門主大人功夫派」……"
3402-115 = "還有以京劇部姐姐們為首的「門主大人京劇派」正在暗中進行爭鬥……"
3402-116 = "！？"
3402-117 = "[ns]「這是怎麼回事……？」"
3402-118 = "我也完全搞不懂……"
3402-119 = "（「功夫派」與「京劇派」……？似乎能瞧出一些端倪）"
3402-120 = "（而且莫名有股不祥的預感……？）"
3402-121 = "總之！那個，如果門主大人真的在做早操的話……"
3402-122 = "我和梅花園的孩子們也想一起做！#n不知道可不可以呢……？"
3402-123 = "原本是聽說萬歲體操對長高沒什麼效果，所以才放棄的……"
3402-124 = "但如果是和門主大人一起做的話，我和梅花園的孩子們應該能更早起床才對！"
3402-125 = "[s]「有道理！而且做早操對孩子們的健康也有好處！」"
3402-126 = "老，老師……？"
3402-127 = "……"
3402-128 = "呵呵。這倒也是。#n心菜教官與老師所言確有其道理。"
3402-129 = "梅花園自古便是山海經的未來……"
3402-130 = "若能與未來一同迎接早晨，倒也不是件壞事。"
3402-131 = "哇，真的嗎？#n謝謝您，門主大人！"
3402-132 = "此外妾身也相信，老師亦將一同參加。"
3402-133 = "[s]「什麼……？我也要嗎！？」"
3402-134 = "那當然。早操對健康有好處──不是嗎？"
3402-135 = "若置身於早晨新鮮清爽的空氣中，則更是如此。"
3402-142 = "哦？汝想偷偷溜去哪裡？#n現在有急事需要立即處理嗎，老師？"
3402-143 = "[s]「雖然現在沒有，但可能很快就會有了……這樣可以嗎？」"
3402-144 = "那可不行。"
3402-148 = "好了，別這麼愁眉苦臉的。汝不是大人嗎……"
3402-150 = "（於是，最終被迫一大早就得到白虎公園做萬歲體操了……）"

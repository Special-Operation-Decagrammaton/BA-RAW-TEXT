[translation]
1601003-1 = "การเชียร์สุดตัวของไมสเตอร์"
1601003-4 = "สำนักงานชาเล่ต์"
1601003-8 = "(เพราะมัวแต่นั่งกู้ข้อมูลที่หายไป คุณครูเลยต้องอยู่จัดการงานที่ค้างอยู่จนดึก...)"
1601003-16 = "[ns1] \"...?\"\n[ns2] \"ใครมาตอนนี้กันนะ?\""
1601003-21 = "อืม..."
1601003-27 = "หวัดดี คุณครู..."
1601003-28 = "คือว่า..."
1601003-29 = "เห็นคุณครูบอกว่าอยากได้กำลังใจน่ะ"
1601003-30 = "[s] \"เลยแต่งชุดเชียร์ลีดเดอร์มาเหรอ?\""
1601003-31 = "อื้อ ก็มาให้กำลังใจคุณครูไง"
1601003-32 = "ไม่ว่างานใดในโลกนี้ก็มีชุดที่เหมาะกับงานนั้นๆ อยู่"
1601003-33 = "เหมือนพวกคนที่ต้องทำงานในอากาศร้อนๆ ก็ต้องสวมชุดที่ป้องกันความร้อน และคนที่ทำงานในสถานที่ที่ฝุ่นเยอะ ก็ต้องสวมชุดป้องกันฝุ่น..."
1601003-34 = "คนที่ทำหน้าที่เชียร์ก็ต้องใส่ชุดเชียร์ลีดเดอร์สิ หลักการง่ายๆ น่ะ"
1601003-35 = "[s] \"นี่มันชุดที่ใส่ตอนงานกีฬานี่นา?\""
1601003-36 = "อื้อ ใช่แล้ว"
1601003-37 = "ชุดนี้เป็นชุดที่ฉันตัดตอนเข้าวงการคอสเพลย์ใหม่ๆ เลยยังดูธรรมดาๆ"
1601003-38 = "แต่อย่างที่ฉันบอกไปคราวที่แล้วน่ะ สำหรับการคอสเพลย์ สิ่งสำคัญกว่าเสื้อผ้าคือความเข้าใจในตัวละครนั้นๆ"
1601003-39 = "ตอนงานกีฬา ฉันต้องเตรียมตัวอย่างฉุกละหุกเลยแทบไม่มีเวลาดื่มด่ำกับบทบาทเชียร์ลีดเดอร์เท่าไร..."
1601003-40 = "แต่ถ้าเป็นตอนนี้... ตอนที่ฉันอยากให้กำลังใจคุณครูอย่างสุดๆ ละก็ คงจะสวมบทเป็น 'เชียร์ลีดเดอร์ตัวจริง' ได้"
1601003-47 = "เพราะงั้นคุณครู... ช่วยดูการเชียร์ของฉันทีนะ"
1601003-50 = "― ฮูเร่ ฮูเร่... คุณครู![wa:2370] "
1601003-52 = "― สู้ๆ ชนะให้ได้นะ คุณครู...[wa:2160] "
1601003-55 = "― หืม...?[wa:10] "
1601003-57 = "― ฉันกำลังเชียร์ให้เอาชนะอะไรงั้นเหรอ?[wa:840] "
1601003-60 = "― นั่นสินะ..."
1601003-63 = "― คงเป็นพวกงานต่างๆ ที่รุมเร้าคุณครู[wa:1780] "
1601003-65 = "― หรือพวกความรับผิดชอบในฐานะคุณครู...[wa:1440] "
1601003-68 = "― ถ้าไม่ถูกใจละก็...[wa:350] "
1601003-70 = "― ฉันเปลี่ยนเนื้อเพลงเชียร์นิดหน่อยดีมั้ย?[wa:880] "
1601003-73 = "― พยายามเข้า...สู้เค้านะคุณครู![wa:2390] "
1601003-76 = "― (...รู้สึกบางอย่างแปลกๆ[wa:1220] "
1601003-79 = "― คุณครู...ไม่ได้ดูฮึกเหิมขึ้นเลย[wa:660] "
1601003-81 = "― แถมยังดูเหมือนจะไม่มีสมาธิอีกด้วย)[wa:1280] "
1601003-84 = "― (...บางทีตอนนี้ฉัน...[wa:1930] "
1601003-86 = "― อาจจะทำเรื่องไม่เข้าท่าอยู่ก็ได้...)[wa:850] "
1601003-91 = "เป็นไงคุณครู"
1601003-92 = "ดูการเชียร์ของฉันแล้วมีแรงฮึดขึ้นบ้างมั้ย?"
1601003-96 = "มีกองเชียร์โบกไปมาอยู่ตรงหน้า เลยรู้สึกไม่มีสมาธิกว่าเดิมเหรอ?"
1601003-97 = "อืม... โทษทีนะ ฉันไม่ได้คิดเรื่องนั้นมาก่อนเลย"
1601003-98 = "เวลาต้องตั้งสมาธิจดจ่อกับงานเอกสาร จะว่อกแว่กมองอย่างอื่นไม่ได้ การเชียร์เต็มรูปแบบแบบนี้คงจะไม่ช่วยเท่าไร"
1601003-99 = "ฉันพอเข้าใจแล้วละว่าทำไมเชียร์ลีดเดอร์ถึงไม่ทำงานในสำนักงาน"
1601003-100 = "ฉันเตรียมมาเพื่อช่วยคุณครูแท้ๆ แต่กลับทำให้คุณครูทำงานไม่ได้แทน..."
1601003-101 = "บางทีฉันอาจจะยังห่างไกลจากการเป็นไมสเตอร์ที่แท้จริงก็ได้..."
1601003-102 = "[s] \"ความหวังดีของฮิบิกิส่งมาถึงครูแล้วละ\""
1601003-106 = "[ns3] \"ครูคงไม่มีสมาธิเพราะเหนื่อยๆ น่ะ กาแฟสักแก้วคงช่วยได้\"\n[ns4] \"อืม ช่วยชงกาแฟให้ครูสักแก้วได้มั้ย?\""
1601003-111 = "ถ้าเรื่องชงกาแฟละก็ได้อยู่แล้ว"
1601003-112 = "ฉันต้องทำงานอยู่ที่ชมรมวิศวกรรมจนดึก ก็เลยชงกาแฟบ่อยๆ น่ะ"
1601003-116 = "ถ้างั้นก่อนอื่นก็ต้องสร้างเครื่องดริปกาแฟแรงดันสูงเพื่อดึงรสชาติของกาแฟออกมาให้ได้สูงสุด..."
1601003-117 = "[s] \"ขอกาแฟธรรมดาก็พอ...\""
1601003-118 = "เข้าใจแล้ว..."
1601003-119 = "ถ้างั้นฉันจะใส่กำลังใจลงไปในกาแฟแก้วนี้ให้ด้วยแล้วกัน"
1601003-121 = "(ด้วยแรงเชียร์สุดฮึกเหิมของฮิบิกิ คุณครูก็สามารถกู้ข้อมูลกลับมาได้อย่างเร็วกว่าที่คิดไว้...)"
1601003-122 = "(แต่ก็มีข่าวลือเรื่องที่คุณครูใช้เวลาอยู่กับนักเรียนที่แต่งชุดเชียร์ลีดเดอร์สองต่อสองจนดึกแพร่สะพัดออกไป ทำให้ถูกชาวเมืองมองด้วยสายตาแปลกๆ อยู่พักใหญ่...)"

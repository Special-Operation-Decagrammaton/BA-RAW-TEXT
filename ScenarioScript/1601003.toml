[translation]
1601003-1 = "巨匠的熱情應援"
1601003-4 = "夏萊．辦公室"
1601003-8 = "（為了修復意外遺失的數據，在辦公室工作到了深夜……）"
1601003-16 = "[ns1]「……？」\n[ns2]「……這個時間會是誰啊？」"
1601003-21 = "……那個。"
1601003-27 = "……老師。"
1601003-28 = "那個……該怎麼說呢……"
1601003-29 = "因為老師說……需要打氣……"
1601003-30 = "[s]「……所以你才穿著啦啦隊的服裝？」"
1601003-31 = "嗯……因為我是來幫老師加油的。"
1601003-32 = "得根據場合穿上合適的工作服。"
1601003-33 = "就像在高溫環境工作的人會穿隔熱衣，#n在粉塵瀰漫的環境工作的人會穿防塵衣一樣……"
1601003-34 = "……為別人加油打氣的人，穿上啦啦隊服也是理所當然的。"
1601003-35 = "[s]「……這是在大運動會時穿的衣服嗎？」"
1601003-36 = "嗯，沒錯。"
1601003-37 = "這是我在剛開始接觸Cosplay時做的……說實話，對品質不是很有自信……"
1601003-38 = "但之前也說了，Cosplay最重要的是扮演角色。"
1601003-39 = "上次大運動會的時候因為時間太趕，沒有辦法好好揣摩心境……"
1601003-40 = "但我現在充滿了為老師加油的心情，所以這次一定能夠扮演好「真正的啦啦隊」。"
1601003-47 = "所以……你就在那裡接受我的應援吧。"
1601003-50 = "― 加油，加油……老師！[wa:2850] "
1601003-52 = "― 上吧上吧，獲勝吧，老師……[wa:2680] "
1601003-55 = "― 嗯？[wa:200] "
1601003-57 = "― 你問是為了戰勝什麼而應援嗎？[wa:1720] "
1601003-60 = "― 是什麼呢……？"
1601003-63 = "― 應該是讓老師痛苦的工作，之類的吧。[wa:2460] "
1601003-65 = "― 或是身為老師的職責之類的……？[wa:2240] "
1601003-68 = "― 如果介意的話，[wa:790] "
1601003-70 = "― 我稍微改一下加油的口號吧……？[wa:1880] "
1601003-73 = "― 堅持，到底……老師！[wa:3150] "
1601003-76 = "―（……總覺得好像哪裡怪怪的。[wa:1620] "
1601003-79 = "― 老師不但沒有恢復精神，[wa:1460] "
1601003-81 = "― 看起來反而更無法集中）[wa:2200] "
1601003-84 = "―（……難道我現在，[wa:2450] "
1601003-86 = "― 正在做相當荒唐的事嗎……？）[wa:1730] "
1601003-91 = "……怎麼樣，老師。"
1601003-92 = "看到我的應援，有讓你提起幹勁了嗎？"
1601003-96 = "……咦，反而讓你的注意力下降了？"
1601003-97 = "嗯……抱歉，我考慮的不夠周全。"
1601003-98 = "……文書工作確實得盯著畫面看，華麗的應援可能不太管用。"
1601003-99 = "看來啦啦隊不適合在辦公室裡進行表演……"
1601003-100 = "明明是想來幫忙的，結果卻干擾了老師……"
1601003-101 = "也許我還無法成為一名真正的巨匠……"
1601003-102 = "[s]「響的心意已經充分傳達了唷。」"
1601003-106 = "[ns3]「而且，我是因為疲勞才會無法集中。」\n[ns4]「……可以麻煩你幫我泡杯咖啡嗎？」"
1601003-111 = "……交給我吧。"
1601003-112 = "工程師部熬夜工作的時候，我也常常幫大家泡咖啡。"
1601003-116 = "那麼，為了將咖啡的風味最大限度地引出來，我先做個高壓萃取裝置……"
1601003-117 = "[s]「……普通的咖啡就可以了。」"
1601003-118 = "……我知道了。"
1601003-119 = "那我就懷著滿腔的應援熱情，為老師泡一杯最棒的咖啡吧。"
1601003-121 = "（多虧了響的熱情應援，數據修復的速度比預期還快……）"
1601003-122 = "（但因為傳出與扮成啦啦隊的學生在深夜獨處的傳聞，#n　一段時間內都被市民們以異樣的眼光看待……）"

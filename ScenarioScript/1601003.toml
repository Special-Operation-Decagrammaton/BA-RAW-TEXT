[translation]
1601003-1 = "A Meister's Moving Cheer"
1601003-4 = "Schale Office"
1601003-8 = "I was staying late at the office to recover lost data..."
1601003-16 = "[ns1] \"...?\"\n[ns2] \"...Who's here at this hour?\""
1601003-21 = "Um."
1601003-27 = "...Hi, Sensei."
1601003-28 = "So... The thing is..."
1601003-29 = "...You said you needed help."
1601003-30 = "[s] \"Okay, I get that, but...what's up with the cheerleader getup?\""
1601003-31 = "Well... It's to...cheer you up."
1601003-32 = "It makes total sense. Every job in the world has clothes that, you know, might not be necessary, but are certainly optimal."
1601003-33 = "If you work in hot environments, you wear heat-resistant clothing. Or, um, less clothing, I guess. And if you work in dusty places, it's better to wear...dust-proof...clothing?"
1601003-34 = "So, obviously, the best way to optimize cheer potential is to wear a cheerleader outfit. Honestly, it's a self-evident principle."
1601003-35 = "[s] \"...Isn't this the outfit you wore on field day?\""
1601003-36 = "None other."
1601003-37 = "This outfit may be an awkward prototype I made when I just started cosplaying..."
1601003-38 = "But as I said before, the most important aspect of cosplay isn't the costume, it's the proper mindset."
1601003-39 = "On field day, I didn't have enough time to fully steep myself in the role..."
1601003-40 = "But the only thing on my mind now is cheering for you, there's no way I'll fail to be a cheerleader."
1601003-47 = "So, um, please be cheered up!"
1601003-50 = "― Play, play... Sensei![wa:2410] "
1601003-52 = "― Fight, win. Sensei...[wa:2360] "
1601003-55 = "― Huh?[wa:120] "
1601003-57 = "― What do I think you're fighting right now?[wa:600] "
1601003-60 = "― Um..."
1601003-63 = "― Work, maybe? Or...[wa:2420] "
1601003-65 = "― your...responsibilities as a teacher?[wa:1360] "
1601003-68 = "― Do...you not like it?[wa:230] "
1601003-70 = "― Should I change the cheer...?[wa:1320] "
1601003-73 = "― You can do it, you can do it...! Sensei![wa:1950] "
1601003-76 = "― ...I don't get it.[wa:1420] "
1601003-79 = "― (Instead of being motivated,[wa:780] "
1601003-81 = "― Sensei seems more distracted than ever.)[wa:1040] "
1601003-84 = "― (...On second thought... No,[wa:1650] "
1601003-86 = "― on third thought, I might be doing something absurd...)[wa:90] "
1601003-91 = "So...how was it?"
1601003-92 = "Did my cheering motivate you?"
1601003-96 = "...Me moving around so much was distracting?"
1601003-97 = "Hmm... Sorry, I didn't account for that..."
1601003-98 = "But in hindsight, it makes sense that flashy cheerleading would just distract from work."
1601003-99 = "Now I know why cheerleading isn't an office job..."
1601003-100 = "I tried helping you, but I ended up distracting you instead..."
1601003-101 = "Clearly I have a long way to go before I can consider myself a true meister..."
1601003-102 = "[s] \"Don't be too hard on yourself. I appreciated the sentiment.\""
1601003-106 = "[ns3] \"It's just hard to focus when I'm this tired.\"\n[ns4] \"...Could you do me a favor and bring me some coffee?\""
1601003-111 = "...Okay."
1601003-112 = "I often make coffee when I'm pulling all-nighters at the Engineering Department."
1601003-116 = "Oh, but since this isn't the club, I need to make a high-pressure flavor-concentration device for optimal coffeeness first..."
1601003-117 = "[s] \"...I'm good with regular coffee.\""
1601003-118 = "...Fine."
1601003-119 = "Then I'll prepare the best non-optimized cup of coffee you'll ever have."
1601003-121 = "With Hibiki's enthusiasm at my back, I was able to recover the data faster than expected..."
1601003-122 = "But rumor soon spread that I was alone with a student dressed as a cheerleader late at night, causing an awkward misunderstanding with the citizens..."

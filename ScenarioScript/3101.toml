[translation]
3101-1 = "價值的證明（１）"
3101-2 = "研討會．會議室"
3101-8 = "……嗯，看來所有人都到齊了呢。"
3101-9 = "那麼……"
3101-14 = "第28回千年預算審查會，現在開始～"
3101-19 = "雖然各位應該都已經知道了，不過姑且還是說明一下……這個會議是對各個社團和委員會的研究、開發計畫進行檢討，進而決定下一季預算的定期會議。"
3101-20 = "每季舉行一次，如果是能保障可行性與實用性的企劃的話就增加預算……這樣的形式來進行。"
3101-21 = "上一次……不，該說是和去年一樣嗎。#n雖然都是一些奇怪的東西……"
3101-22 = "希望這次能夠出現好的產品，開始會議吧。"
3101-25 = "那麼第一個審查對象是……新材料開發部的「柔軟水泥」！"
3101-26 = "「柔軟水泥」……？"
3101-31 = "是的！是我們新材料開發部所研發的特製水泥！"
3101-32 = "……明明是水泥卻是軟的嗎？"
3101-33 = "如各位所知，水泥是將石灰粉與沙子混合而成，#n由於其強度十分優秀，所以主要在建築方面受到廣泛的運用。"
3101-35 = "然而這樣的水泥也有缺點……沒錯，那就是凝固後十分堅硬！"
3101-36 = "在建築物裡當然會有人居住。#n而只要有人撞到牆壁的話就會感到疼痛對吧？"
3101-37 = "但是如果是「柔軟水泥」的話！不管是撞到牆壁還是跌倒撞到地板都完全不會痛！"
3101-39 = "原來如此……確實是十分新穎呢。"
3101-41 = "雖然確實是非常有趣的發明……"
3101-42 = "不過那種柔軟的水泥，有辦法承受鋼筋與磚頭的重量嗎？"
3101-43 = "……關於這點，還有能夠研究的空間！"
3101-47 = "話說，能吸收衝擊力的水泥有意義嗎……"
3101-49 = "駁回，下一個。"
3101-54 = "怎，怎麼這樣～！"
3101-55 = "下一個！"
3101-57 = "接下來是室笠朱音同學的提案「究極雞毛撢子」。"
3101-64 = "咦，朱音？#n這次C&C也提出了研究企畫書嗎……？"
3101-65 = "……C&C的預算不是有依據作戰而另外準備了嗎。#n為什麼會來這裡？"
3101-66 = "因為這並不是「C&C」，而是我個人的提案。"
3101-67 = "雖然我平時都作為C&C的一員，專注於奉侍和清掃……"
3101-68 = "但在那之前，我姑且也是千年科學學園的一名學生。"
3101-69 = "想提供新的點子，為學園的技術發展做出貢獻。"
3101-71 = "原來如此。對以創意和革新為目標的千年學生來說，簡直是模範的態度呢。"
3101-72 = "……雖然反而讓我有點不安就是了。"
3101-73 = "算了，不聽說明也不行……#n所以說，這和以前的雞毛撢子有哪裡不同呢？"
3101-75 = "以前我在清掃時很愛使用這個「雞毛撢子」。"
3101-76 = "但是有時也會遇到這種道具難以清理的髒汙。"
3101-77 = "每到這種時候就得再用其他的道具……的話，實在有點麻煩。#n能夠隨身攜帶的清掃用品也是有限的。"
3101-81 = "於是我想出的就是這個究極的雞毛撢子……#n──「附帶壓縮瓦斯噴射裝置雞毛撢子」！"
3101-85 = "壓縮瓦斯……？"
3101-86 = "是的，只要按下這個按鈕，就能從前端噴射出高溫的壓縮瓦斯，能夠將對象在轉眼間燃燒殆盡！"
3101-87 = "只要用它的話，不管是怎樣的髒污都能在瞬間清掃乾淨。"
3101-88 = "能夠燒盡髒污的清掃工具，是嗎……"
3101-89 = "那種東西，一般不就被稱為「火焰噴射器」嗎？"
3101-90 = "哎呀，是這樣嗎？#n我還以為是個嶄新的想法呢……"
3101-91 = "因為是已經存在的東西，所以不會提供開發費用。"
3101-93 = "所以駁回，下一個。"
3101-95 = "下一個是……"
3101-99 = "哎呀，是來自之前獲得千年大賞特別獎的「遊戲開發部」的桃井同學呢。"
3101-104 = "哼哼……不管冷酷計算機優香有多冷酷，在這份完美的提案面前都是無能為力的！"
3101-109 = "駁回。"
3101-110 = "等等！？#n為什麼在聽人說話之前就駁回啊！？"
3101-111 = "因為，基本上每天都在玩遊戲的你們，會拿來像樣提案的可能性……"
3101-112 = "這，這是偏見！#n就算是我們，也有認真的時候的！"
3101-113 = "而且這次我帶來的可是運用最新技術的#n「完美收益模型」！"
3101-114 = "……完美收益模型？"
3101-115 = "沒錯！這個是運用了區塊……什麼來著。#n總之就是應用了某個最新技術的遊戲企劃！"
3101-116 = "一般來說，在玩遊戲的時候都會獲得遊戲內的貨幣對吧？#n只要運用這個技術，就能把他們像現金一樣使用哦。"
3101-117 = "也就是說，哼哼……只要躺著玩遊戲就能賺到錢……！"
3101-118 = "想法大概是這樣啊。#n利用虛擬貨幣的話，應該能將遊戲幣穩定的轉換成現金……"
3101-119 = "那麼……收取遊戲內的貨幣，負責支付現金的是誰呢？"
3101-120 = "……咦？"
3101-121 = "那個……由研討會發行之類的……？"
3101-126 = "駁回！"
3101-132 = "結果這次也一樣呢……"
3101-133 = "是嗎？我個人倒是覺得有幾個有趣的提案。"
3101-137 = "特別是運用了更高技術的發明，相較去年增加了37%。"
3101-138 = "就算是新的技術，只用來生產奇怪的東西也沒用啊！"
3101-139 = "唉……大家為什麼能認真地提出這些沒有實用性的東西呢。"
3101-140 = "因為想出研究具體方針的不是我們，而是身為當事人的大家呀。"
3101-141 = "而且，就算是第一眼看起來沒有意義的研究……#n也有其實非常有價值、將來能夠成為各種技術基礎的可能性。"
3101-142 = "……就像我們研討會正在研究的「千年難題」一樣。"
3101-143 = "……"
3101-145 = "「研討會」……可以說是千年前身的學生會組織。本來是為了克服「現今的技術無法解決的7道難題」而聚集的研究者集團……"
3101-146 = "為了面對那些難題，需要進行大量的驗證和實驗……#n因此研究組織日益增加，最終誕生的就是這個「千年科學學園」。"
3101-147 = "雖然現在不知道這件事的學生或許是多數也說不定……"
3101-148 = "不過其理念，也就是各式各樣的研究或許都是與「7道難題」相關的過程和手段……這點並沒有改變。"
3101-149 = "……是呢。如果與那個「可能性」相關的話，在千年裡所有的思考和實驗都應該被肯定。"
3101-151 = "什麼事物會與怎樣的可能性有關是無法預測的……儘管如此，在現實方面，眼前的預算是可以預測的。"
3101-152 = "如果要滿足所有人的好奇心的話，學園會破產的……"
3101-153 = "呵呵。畢竟優秀的研究者往往會無視費用與時間這些現實層面的問題呢。"
3101-154 = "所以說，千年有優香醬這樣的會計真是太好了。"
3101-155 = "……難道是在挖苦我嗎？"
3101-156 = "如果真的擔心千年的財政狀況的話，明明多幫我一點忙就好了。"
3101-157 = "剛才AI研究部在說「自己會判斷引爆時機的炸彈」的時候，如果乃愛能幫我說點話的話就能更輕鬆地……"
3101-158 = "雖然遺憾，但是我是研討會的「書記」。"
3101-159 = "優秀的書記就是不管在什麼樣的情況下都不會參雜己見，#n中立地記錄狀況……這樣的人。"
3101-160 = "如果不是我的錯覺的話……"
3101-161 = "好像只有在對我不利的時候會擺出那種態度吧？"
3101-162 = "誰知道呢？#n我可是最喜歡優香醬了唷。"
3101-163 = "這點我倒是知道啦……"
3101-167 = "……話說回來，這份文件是什麼？"
3101-168 = "咦，剛才預算審查會的時候好像還沒有吧……？"
3101-169 = "是呀。各社團和委員會送來的申請書應該全都確認過了才對……"
3101-173 = "我看看，提案人是……"
3101-179 = "……貝里塔斯的，部長？"

3101-104 = "3;모모이;99;후후…… 유우카가 아무리 냉혹한 계산의 회계라 하더라도 내가 가져온 완벽한 제안서를 보면 투자를 하지 않고서는 못 배길걸?\n#3;em;[음표]\n#3;a"

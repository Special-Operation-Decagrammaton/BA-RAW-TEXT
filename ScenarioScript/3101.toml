3101-110 = "3;유우카;99\n5;모모이;04;자, 잠깐! 어째서 듣지도 않고 결정하려는 거야?!\n#5;hophop\n#5;al\n#3;m1"
3101-111 = "3;유우카;05;그야 뻔하지. 매일 제대로 된 부 활동도 하지 않고 게임만 하는 게임개발부가 제대로 된 제안서를 가져왔을 리가…….\n#3;stiff\n#3;em;[빠직]"
3101-112 = "5;모모이;05;펴, 편견이야! 우리도 제대로 할 때는 제대로 하거든?\n#5;em;[땀]"
3101-113 = "5;모모이;01;게다가 이번에는 최신 기술을 활용한 확실한 수익 모델도 가지고 왔다고!"
3101-114 = "3;유우카;02;……최신 기술을 활용한 수익 모델?\n#3;em;[?]"
3101-115 = "5;모모이;00;응. 이 제안서는 블록체인…… 뭔가 하는 최신 기술을 응용한 게임 기획서야!\n#5;em;[반응]"
3101-116 = "5;모모이;01;보통 게임을 하면 게임 머니가 쌓이잖아? 이 기술을 사용하면 게임에서 쓰이는 가상 화폐를 현금처럼 사용할 수 있다고 하더라고."
3101-117 = "5;모모이;03;그럼 앉아서 게임을 하기만 해도 돈을 잔뜩 벌 수 있겠지? 후후…….\n#5;em;[음표]\n#5;hophop"
3101-118 = "3;유우카;99;발상은 그럴듯하네. 암호화폐를 사용하면 게임 머니를 안정적으로 현금화할 수 있을 테니까."
3101-119 = "3;유우카;02;하지만 게임 머니와 교환되는 현금은 누가 지불하는데?\n#3;em;[반응]"
3101-120 = "5;모모이;02;……어? 현금……?"
3101-121 = "5;모모이;03;그건…… 세미나에서 계속 발행하면 되지 않을까……?\n#5;em;[?]"

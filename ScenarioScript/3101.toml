3101-17 = "#wait;1500"
3101-18 = "#all;hide"
3101-19 = "\n3;유우카;02;다들 알고 있겠지만, 이 예산심의위원회는 각 동아리의 연구, 개발 계획을 검토하여 다음 분기의 예산을 책정하는 정례 회의야.\n#3;em;[반응]"
3101-20 = "3;유우카;01;지난 분기보다 좀 더 많은 예산을 할당받고 싶다면…… 조금이라도 더 쓸모 있는 제품을 기획하여 증명하면 되는 거지."
3101-21 = "3;유우카;99;지난 예산심의위원회 때는 작년과 마찬가지로 실용성이라고는 조금도 찾아볼 수 없는 괴작들만 가득했지만……\n#3;em;…"
3101-22 = "3;유우카;07;이번에는 부디 좀 더 쓸모 있는 제품을 심사할 수 있으면 좋겠네."
3101-23 = "#st;[0,0];instant;1;"
3101-24 = "#clearST"
3101-25 = "1;노아;03;그럼, 첫 번째 심사 대상은…… 신소재개발클럽에서 제안한 <부드러운 시멘트>입니다!\n#1;em;[반응]\n#1;ar\n#3;m5"
3101-26 = "3;유우카;02;부드러운 시멘트……?\n#3;em;[?]"
3101-27 = "#st;[0,0];instant;1;"
3101-28 = "#clearST"
3101-29 = "1;노아;03\n3;유우카;02\n#3;d\n#1;d\n#wait;1500"
3101-30 = "#all;hide"
3101-31 = "3;신소재 개발부원;03;네! 저희 신소재개발클럽에서 새롭게 배합한 특제 시멘트입니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
3101-32 = "1;유우카;02;……시멘트가 부드럽다는 게 무슨 뜻이야?\n#1;ar\n#3;m5"
3101-33 = "3;신소재 개발부원;01;다들 알고 계시겠지만 석회 가루와 모래를 섞어 만든 시멘트는 성형이 용이한 데 비해, 물성이 단단하여 오래전부터 건축가에게 널리 사랑받아왔었죠."
3101-34 = "#all;hide"
3101-35 = "3;신소재 개발부원;07;하지만 시멘트에도 단점이 있었으니…… 그건 바로 굳어지면 지나치게 단단해진다는 점입니다!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
3101-36 = "3;신소재 개발부원;00;건물은 사람이 살기 위한 장소! 그런데 건물에 닿는 사람의 몸은 시멘트 벽보다 훨씬 연약하니, 넘어지거나 부딪히면 크게 다칠 수도 있었죠.\n#3;closeup"
3101-37 = "3;신소재 개발부원;03;하지만 이 특제 <부드러운 시멘트>로 만든 벽과 바닥은 완전히 굳어도 표면이 부드럽기 때문에 다칠 염려가 없답니다!\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
3101-38 = "#all;hide"
3101-39 = "3;노아;02;경화된 석고가 혼합물에 따라 부드러워질 수 있다니…… 이건 기존에 보고된 적 없는 새로운 발견이네요."
3101-40 = "#all;hide"
3101-41 = "5;신소재 개발부원;03\n1;유우카;99;으음, 확실히 흥미로운 발견이긴 하지만……"
3101-42 = "1;유우카;02;이 정도로 물성이 부드럽다면 다른 건축자재로 쓰이는 철근이나 벽돌의 무게를 어떻게 버틸 수 있는 건데?\n#1;em;[?]"
3101-43 = "5;신소재 개발부원;04;어…… 그러니까 그 점은…… 아직 연구의 여지가 남아 있기 때문에……\n#5;em;[땀]"

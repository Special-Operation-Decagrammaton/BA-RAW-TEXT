[translation]
3101-1 = "การพิสูจน์คุณค่า 1"
3101-2 = "ห้องประชุมเซมิน่า"
3101-8 = "ฉันว่าคนน่าจะมากันครบแล้วนะ..."
3101-9 = "ถ้างั้นก็..."
3101-14 = "ขอเริ่มการประชุมคณะกรรมการพิจารณางบประมาณมิลเลเนียม ครั้งที่ 28 ค่ะ~"
3101-19 = "ทุกคนคงจะทราบกันดีแล้วว่าการประชุมคณะกรรมการพิจารณางบประมาณ คือการประชุมสามัญเพื่อ#nตรวจสอบแผนการวิจัยและพัฒนาของแต่ละชมรม เพื่อจัดสรรงบประมาณสำหรับไตรมาสถัดไป"
3101-20 = "หากต้องการงบประมาณมากกว่าไตรมาสก่อน... ตอนนี้ก็ยังไม่สายที่จะวางแผนสร้างผลงานดีๆ และพิสูจน์คุณค่าของมันให้เห็น"
3101-21 = "ในการประชุมครั้งที่แล้ว เราได้เห็นแต่ผลงานประหลาดๆ ที่ดูเหมือนจะใช้งานจริงไม่ได้ ซึ่งก็เหมือนกับของปีที่แล้ว"
3101-22 = "หวังว่าครั้งนี้เราจะได้เห็นและตัดสินผลงานที่มีประโยชน์ใช้สอยขึ้นสักหน่อยนะคะ"
3101-25 = "เอาละค่ะ ผลงานแรกที่เราต้องตัดสินก็คือ... <ซีเมนต์นุ่ม> ของชมรมพัฒนาวัสดุใหม่ค่ะ!"
3101-26 = "ซีเมนต์นุ่ม......?"
3101-31 = "ใช่แล้วค่ะ! นี่เป็นซีเมนต์ชนิดพิเศษที่ชมรมพัฒนาวัสดุใหม่ของเราคิดค้นและผสมขึ้นใหม่ค่ะ!"
3101-32 = "ซีเมนต์... ที่มันนุ่มๆ งั้นเหรอ หมายความว่ายังไง?"
3101-33 = "ทุกท่านอาจทราบแล้วว่าซีเมนต์ที่ทำจากผงปูนและทรายผสมกันนั้นจะขึ้นรูปได้ง่าย และด้วยคุณสมบัติที่ทนทานของมัน เลยถูกนำมาใช้กันอย่างแพร่หลายในสถาปัตยกรรมค่ะ"
3101-35 = "แต่ซีเมนต์ก็มีข้อเสียนะคะ... เพราะถ้ามันแข็งตัวเมื่อไรละก็ มันจะแข็งแบบแข็งโป๊กเลยค่ะ!"
3101-36 = "อาคารคือสถานที่ที่เอาไว้ให้คนอยู่อาศัย! แต่ร่างกายของคนกลับอ่อนแอกว่ากำแพงซีเมนต์ ถ้าเผลอหกล้มหรือไปกระแทกเข้า เราก็จะบาดเจ็บได้ค่ะ"
3101-37 = "แต่กำแพงและพื้นที่สร้างจาก <ซีเมนต์นุ่ม> ที่เป็นนวัตกรรมพิเศษนี้ ถึงจะแข็งตัวเต็มที่แต่ผิวสัมผัสก็#nนุ่มนวล เราไม่ต้องกังวลว่าจะได้รับบาดเจ็บเลยละค่ะ!"
3101-39 = "ยิปซัมที่แข็งตัวที่สามารถนุ่มขึ้นได้ตามส่วนผสม... นี่เป็นการค้นพบใหม่ที่ยังไม่เคยเปิดเผยที่ไหนมา#nก่อนเลยนะคะ"
3101-41 = "อืม... มันเป็นการค้นพบที่น่าสนใจเลยละ..."
3101-42 = "แต่ถ้ามันนุ่มนิ่มได้ขนาดนั้น แล้วจะทนน้ำหนักของวัสดุก่อสร้างอื่นๆ อย่างเหล็กกับอิฐได้ยังไงกันล่ะ?"
3101-43 = "เอ่อ... สำหรับเรื่องนี้... เรายังมีลู่ทางในการวิจัยต่อ..."
3101-47 = "ซีเมนต์ถูกคิดค้นมาให้ทนต่อแรงกระแทกตั้งแต่แรก แล้วพวกเธอจะไปทำให้มันนุ่มเพื่อ..."
3101-49 = "ฉันไม่ให้ผ่าน!"
3101-54 = "ปะ... เป็นไปได้ยังไง~"
3101-55 = "ชมรมต่อไป!"
3101-57 = "ผลงานชิ้นต่อไปคือ <สุดยอดไม้ปัดฝุ่น> จากมุโรคาสะ อาคาเนะค่ะ"
3101-64 = "เอ๋? อาคาเนะ? ชมรม C&C ก็ส่งแผนการวิจัยกับเขาด้วยเหรอ?"
3101-65 = "(กระซิบ) แต่เราก็ให้งบประมาณ C&C ตามขนาดของปฏิบัติการอยู่แล้วนะ... จู่ๆ ก็มีปัญหาเรื่องค่าใช้จ่ายกันงั้นเหรอ?"
3101-66 = "ไม่หรอกค่ะ สิ่งประดิษฐ์นี้ไม่ใช่ของจำเป็นสำหรับปฏิบัติการของ C&C แต่เป็นสิ่งที่ฉันอยากเอามา#nนำเสนอเป็นการส่วนตัวค่ะ"
3101-67 = "ถึงปกติฉันจะทุ่มเทให้กับการทำจิตอาสาและการทำความสะอาดในฐานะของสมาชิก C&C..."
3101-68 = "แต่ฉันก็เป็นนักเรียนคนหนึ่งของโรงเรียนวิทย์มิลเลเนียม..."
3101-69 = "ฉันเลยอยากนำเสนอไอเดียใหม่ๆ เพื่อส่งเสริมการพัฒนาเทคโนโลยีของโรงเรียนค่ะ"
3101-71 = "นี่แหละค่ะตัวอย่างที่ดีของชาวมิลเลเนียมที่มีความคิดสร้างสรรค์และมุ่งเน้นในการปฏิรูป"
3101-72 = "......รู้สึกกังวลอะไรแปลกๆ แฮะ"
3101-73 = "ลองฟังการนำเสนอก่อนแล้วกัน <สุดยอดไม้ปัดฝุ่น> ของเธออันนี้ต่างจากไม้ปัดฝุ่นธรรมดายังไงบ้าง?"
3101-75 = "ที่ผ่านมา ฉันใช้ไม้ปัดฝุ่นอันนี้เป็นส่วนมากในการทำความสะอาดค่ะ"
3101-76 = "แต่พอทำไปเรื่อยๆ ก็มีหลายครั้งที่ฉันเจอคราบหรือรอยเปื้อนที่ปัดด้วยไม้ปัดฝุ่นไม่ออกค่ะ"
3101-77 = "เวลาเจอเรื่องแบบนั้น จะให้กลับไปหยิบอุปกรณ์ทำความสะอาดอื่นมาก็ดูจะยุ่งยาก และการพกอุปกรณ์ติดตัวหลายๆ ชิ้นก็ไม่สะดวกค่ะ"
3101-81 = "ฉันก็เลยได้ไอเดีย <สุดยอดไม้ปัดฝุ่นที่มากับเครื่องฉีดก๊าซความดัน> อันนี้ขึ้นมาค่ะ!"
3101-85 = "เครื่องฉีดก๊าซความดัน...?"
3101-86 = "ใช่ค่ะ เมื่อกดปุ่มที่ตัวไม้ปัดฝุ่น ก๊าซความดันอุณหภูมิสูงจะถูกฉีดออกมาจากปลายไม้แล้วเผาไหม้วัตถุ#nจนสะอาดเอี่ยมเลยละค่ะ!"
3101-87 = "ถ้าใช้ <สุดยอดไม้ปัดฝุ่น> พวกรอยเปื้อนหรือสารเหนียวเหนอะหนะต่างๆ จะถูกเผาจนไม่เหลือคราบ#nให้เห็นเลยค่ะ"
3101-88 = "อุปกรณ์ทำความสะอาดที่เผารอยเปื้อนได้อย่างหมดจดงั้นสินะ..."
3101-89 = "อุปกรณ์ที่คนทั่วไปเรียกว่าเครื่องพ่นไฟ..."
3101-90 = "เอ๋... อย่างนั้นเหรอคะ? ฉันคิดว่ามันเป็นไอเดียที่ค่อนข้างแปลกใหม่เสียอีก..."
3101-91 = "เราไม่จำเป็นต้องลงทุนเพื่อการพัฒนาผลิตภัณฑ์ที่มีอยู่แล้วหรอกนะ"
3101-93 = "ข้อเสนอนี้ฉันไม่อนุมัติ ชมรมต่อไป!"
3101-95 = "ต่อไปก็..."
3101-99 = "ตายจริง นี่เป็นข้อเสนอการวิจัยของโมโมอิจากชมรมพัฒนาเกม เจ้าของรางวัลพิเศษในงานมิลเลเนียม#nไพรซ์ครั้งก่อนค่ะ"
3101-104 = "ฮิฮิ... ถึงยูกะจะเป็นนักบัญชีที่เยือกเย็น แต่ถ้าได้เห็นแผนเสนอการวิจัยที่สมบูรณ์แบบของฉันละก็ ต้องอยากลงทุนให้จนตัวสั่นเลยละ"
3101-109 = "ไม่อนุมัติ"
3101-110 = "ดะ... เดี๋ยวก่อน! ทำไมถึงด่วนตัดสินใจล่ะ ฉันยังไม่ได้ขายของเลยนะ!"
3101-111 = "ของมันก็แน่อยู่แล้ว ชมรมพัฒนาเกมที่วันๆ เอาแต่เล่นเกม ไม่ทำกิจกรรมอะไรเป็นชิ้นเป็นอัน จะเอาแผนเสนอการวิจัยอะไรมาส่งได้..."
3101-112 = "ยะ... อย่าอคติสิ! ถ้าพวกฉันตั้งใจทำอะไรขึ้นมา เราก็ทำได้ดีเหมือนกันนะ"
3101-113 = "แถมครั้งนี้เรายังทำแบบจำลองรายได้อย่างแม่นยำที่ใช้เทคโนโลยีใหม่ล่าสุดมาด้วย!"
3101-114 = "แบบจำลองรายได้ที่ใช้เทคโนโลยีใหม่ล่าสุดงั้นเหรอ?"
3101-115 = "อื้ม นี่คือแผนของเกมที่ใช้เทคโนโลยีล่าสุด... เอ่อ... ที่เรียกว่าบล็อกเชนอะไรทำนองนั้นน่ะ!"
3101-116 = "ปกติเวลาเราเล่นก็จะได้เงินในเกมใช่ไหม? ถ้าใช้เทคโนโลยีนี้ เราจะใช้สกุลเงินเสมือนในเกมได้เหมือน#nเงินสดเลยละ"
3101-117 = "เท่ากับว่าแค่นั่งเล่นเกมเฉยๆ ก็จะหาเงินได้มหาศาลเลย! ฮิฮิ..."
3101-118 = "ไอเดียเข้าท่าดีนะ ถ้าใช้สกุลเงินดิจิทัล ก็จะทำเงินในเกมให้กลายเป็นเงินสดได้อย่างมีเสถียรภาพ"
3101-119 = "แต่ว่าใครจะเป็นคนจ่ายเงินสดที่แลกจากเงินในเกมล่ะ?"
3101-120 = "หืม...? เงินสดเหรอ......?"
3101-121 = "ก็... ให้ทางเซมิน่าช่วยพิมพ์ธนบัตรให้ไม่ได้เหรอ...?"
3101-126 = "คิดไว้อยู่แล้วว่าต้องถูกปัดตก!"
3101-132 = "สุดท้ายแล้วเราไม่ได้ผลงานอะไรเลยเหรอ..."
3101-133 = "ในความคิดของฉัน ฉันว่ามีแผนเสนอที่ใช้ได้อยู่นะคะ"
3101-137 = "โดยเฉพาะสิ่งประดิษฐ์ที่ใช้สิทธิบัตรสาขาเทคโนโลยีขั้นสูงใหม่ มีมากกว่าไตรมาสที่แล้วถึง 37% เลยค่ะ"
3101-138 = "แล้วยังไงล่ะ! ในเมื่อสิ่งประดิษฐ์ที่ใช้เทคโนโลยีใหม่ก็มีแต่ของพิลึกๆ!"
3101-139 = "...... ฉันละไม่เข้าใจเลย ทำไมทุกคนถึงจริงจังกับการวิจัยสิ่งประดิษฐ์ที่ไม่มีประโยชน์แบบนี้นะ"
3101-140 = "ก็เราไม่ได้มีบทบาทในการกำหนดทิศทางของการวิจัยนี่คะ"
3101-141 = "และถึงแม้มันจะดูไร้ความหมายในตอนนี้ แต่มันอาจเป็นรากฐานสำคัญในการพัฒนาเทคโนโลยีที่มี#nประโยชน์ในอนาคตก็ได้นะคะ"
3101-142 = "...... เหมือนโปรเจกต์ <ปัญหาพันปี> ที่เซมิน่าทำอยู่ยังไงล่ะคะ"
3101-143 = "......"
3101-145 = "'เซมิน่า' หรือองค์กรสภานักเรียนที่เรียกได้ว่าเป็นผู้มาก่อนกาลแห่งมิลเลเนียม เดิมทีแล้วเป็นกลุ่มของ#nนักวิจัยที่จัดตั้งขึ้นมาเพื่อแก้ไข '7 ปัญหาหนักใจที่ไม่สามารถแก้ไขได้ด้วยเทคโนโลยีในขณะนั้น'"
3101-146 = "มีการตรวจพิสูจน์และทดลองอยู่หลายต่อหลายครั้งเพื่อแก้ไขปัญหาเหล่านั้น... และเพื่อสนับสนุนสิ่งนี้ กลุ่มวิจัยก็ถูกขยายจนเกิดเป็นโรงเรียนวิทย์มิลเลเนียมในปัจจุบันค่ะ"
3101-147 = "แน่นอนว่าตอนนี้ นักเรียนส่วนใหญ่ก็ยังไม่เข้าใจแม้กระทั่งแนวคิดของปัญหาที่ยากจะแก้ไขนี้ค่ะ"
3101-148 = "แต่ความจริงที่ว่า 'แต่ละชิ้นงานวิจัยที่เซมิน่าคิดและทดลองเป็นทั้งกระบวนการและวิธีการแก้ปัญหาทั้ง 7' ก็ยังคงปรากฏอยู่ค่ะ"
3101-149 = "ก็ใช่... ตราบใดที่เป็นการพัฒนาเทคโนโลยี การคิดและการทดลองทั้งหมดที่เกิดขึ้นในมิลเลเนียมต้อง#nได้รับการสนับสนุนและส่งเสริม"
3101-151 = "ถึงเราจะยังคาดการณ์ไม่ได้ว่าการทดลองพวกนี้จะช่วยแก้ปัญหาได้หรือไม่ แต่ยังไงเราก็คาดการณ์งบ#nประมาณในเดือนหน้าได้ทันที"
3101-152 = "แต่ถ้าเราช่วยในทุกความอยากรู้อยากเห็นของนักเรียนละก็ มีหวังโรงเรียนได้ล้มละลายไปก่อนแน่...... "
3101-153 = "เฮ้อ... ก็เพราะนักวิจัยที่ยอดเยี่ยมมักจะไม่สนใจปัญหาที่เกิดขึ้นจริง ทั้งเรื่องค่าใช้ง่ายและเวลานี่คะ"
3101-154 = "โชคดีจังเลยนะคะที่โรงเรียนมิลเลเนียมของเรามีนักบัญชีที่ยอดเยี่ยมแบบยูกะจัง~"
3101-155 = "......นี่แซะกันหรือเปล่าเนี่ย?"
3101-156 = "ถ้ากังวลเรื่องสถานการณ์ทางการเงินของมิลเลเนียมมากขนาดนั้น ทำไมไม่ช่วยกันตั้งแต่เมื่อกี้ล่ะ"
3101-157 = "เมื่อกี้ที่เราถกเถียงกันเรื่องประโยชน์ของ <ระเบิดที่ตัดสินใจเองว่าจะระเบิดหรือไม่> ที่ชมรมวิจัย#nปัญญาประดิษฐ์เสนอ ถ้าโนอาช่วยพูดเสริมอะไรบ้าง ก็น่าจะโน้มน้าวได้อีกหน่อยนะ..."
3101-158 = "เสียใจด้วยนะคะ แต่ว่าฉันเป็น 'เลขา' ของเซมิน่าน่ะค่ะ"
3101-159 = "ไม่ว่าจะในสถานการณ์ไหนก็ตาม เลขาที่ยอดเยี่ยมต้องไม่เอาความคิดเห็นส่วนตัวเข้ามาเกี่ยวข้อง และต้องจดบันทึกสถานการณ์อย่างเป็นกลางด้วยค่ะ"
3101-160 = "หลักการแบบนั้น... มันไม่ง่ายดายไปหน่อยเหรอไง?"
3101-161 = "เธอดูจะเป็นกลางเฉพาะตอนที่ฉันเสียเปรียบเท่านั้นนะ..."
3101-162 = "ฮุฮุ แต่ยังไงฉันก็ชอบยูกะจังนะคะ"

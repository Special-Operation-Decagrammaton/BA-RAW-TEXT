[translation]
3101-1 = "Proof of Concept 1"
3101-2 = "Seminar Conference Room"
3101-8 = "Now that everyone's here..."
3101-9 = "We can begin."
3101-14 = "Welcome to the 28th Millennium Budget Review Committee Conference!"
3101-19 = "As you already know, the Budget Review Committee Conference is a periodic gathering where we review the research and development prospects of each club and allocate funds accordingly."
3101-20 = "If a club wants better funding, it is up to us to determine if they can earn it, usually by their ability to create useful products."
3101-21 = "The last conference was filled with bizarre items that had no practical purpose whatsoever. As was the conference before that..."
3101-22 = "I... I still believe in the potential of our students, however."
3101-25 = "We'll begin with...the New Material Development Club's Cushy Cement!"
3101-26 = "Cushy...?"
3101-31 = "Yes! It's a new, innovative approach to cement!"
3101-32 = "...What exactly does it mean for cement to be...cushy?"
3101-33 = "As you all know, cement is a beloved material in construction due to its malleability while wet and hardness while dry."
3101-35 = "However, cement has one fatal flaw... When it hardens, it becomes way too hard!"
3101-36 = "People live in buildings! But according to our research, the average person's body is much weaker than cement, so if someone falls or bumps into cement, they could get injured."
3101-37 = "However, Cushy Cement solves this problem by remaining soft even after it hardens, so not only will you not get hurt, you might even be tempted to lay down on it!"
3101-39 = "A building material that's soft to the touch? Truly revolutionary..."
3101-41 = "Hmm... This is all very interesting, however..."
3101-42 = "If it's that soft, how exactly would it not bend under the weight of other construction materials, such as steel or bricks?"
3101-43 = "Ah... Well, about that... As they say, the best inventions leave room for improvement..."
3101-47 = "So, to be clear, you took a building material often used for foundations and other purposes reliant on durability and toughness, and made it soft?"
3101-49 = "Rejected!"
3101-54 = "N-Nooo!"
3101-55 = "Next!"
3101-57 = "The next item is the Dragon Duster proposed by Murokasa Akane."
3101-64 = "Huh? Akane? C&C submitted a research proposal?"
3101-65 = "*whisper* C&C's budget is already allocated separately based on operational scope... Is that not enough?"
3101-66 = "Oh, no, this isn't a C&C proposal, it's from me as an individual."
3101-67 = "I am a dedicated member of C&C..."
3101-68 = "But I am also a student of Millennium Science School."
3101-69 = "Contributing to the academy's technological advancement by proposing new ideas is just another service I wish to provide!"
3101-71 = "What an excellent attitude for a Millennium student! We must all pursue innovation and creativity whenever possible."
3101-72 = "I have a bad feeling about this..."
3101-73 = "Let's hear her out. How is this Dragon Duster different from an ordinary duster?"
3101-75 = "Dusters are one of my favorite cleaning implements."
3101-76 = "However, I often encounter stains that ordinary dusters simply can't remove."
3101-77 = "There's obviously a limit to how many cleaning tools I can carry at once, and going out of my way to get another one is cumbersome and time-consuming."
3101-81 = "So I came up with the Dragon Duster... A duster equipped with a compressed gas sprayer!"
3101-85 = "Compressed gas sprayer...?"
3101-86 = "Not just any gas. Upon activating this function, the compressed gas will ignite as it's sprayed, completely incinerating the target!"
3101-87 = "No stubborn stains or sticky substance can withstand the Dragon Duster's cleansing flames."
3101-88 = "A tool that spews fire..."
3101-89 = "Akane, that's a flamethrower."
3101-90 = "Oh... But is it a novel flamethrower?"
3101-91 = "No. I don't think we need to fund a product that already exists."
3101-93 = "Rejected. Next!"
3101-95 = "Next is..."
3101-99 = "Oh my... This is a proposal from Momoi of the Game Development Department, who received a special award for the last Millennium Prize."
3101-104 = "Heh heh... Yuuka might be the Cold, Unfeeling Accountant, but she'll be begging to invest once she sees my impeccable proposal."
3101-109 = "Rejected."
3101-110 = "W-Wait! You didn't even hear it!"
3101-111 = "I don't need to. The Game Development Department just plays games all day instead of doing any actual club activities."
3101-112 = "Th-That's unfair! When we work, we deliver!"
3101-113 = "Besides, we already came up with a profit model that utilizes advanced technology!"
3101-114 = "...A profit model that utilizes advanced technology?"
3101-115 = "Yes! This proposal is a game design that implements the latest blockchain technology!"
3101-116 = "When you play games, you often earn in-game currency, right? By using this technology, we can just convert this in-game money to real money!"
3101-117 = "So, by just sitting down and playing games, you'll make money! Heehee."
3101-118 = "It sounds plausible. If you tied it to a cryptocurrency, it would allow players to cash out."
3101-119 = "Right, but who would be exchanging cash for this?"
3101-120 = "...Exchange? Cash...?"
3101-121 = "Well... Can't Seminar just print it...?"
3101-126 = "I knew it! Rejected!"
3101-132 = "Is every proposal really going to be rejected again..."
3101-133 = "A few proposals seemed promising."
3101-137 = "There was a 37% increase in proposals that planned to use emerging technology compared to last year."
3101-138 = "Is that even a good thing? None of their proposed uses of those technologies made any sense!"
3101-139 = "...I simply don't understand why everyone is so enamored with such impractical research."
3101-140 = "Our job isn't to decide the direction of the research."
3101-141 = "And who knows? The research may look meaningless now, but it could become the foundation of revolutionary technology in the future."
3101-142 = "...The Millennium Problem."
3101-143 = "..."
3101-145 = "Seminar, what could be considered the heart of Millennium, was originally a gathering of researchers with one goal: to find solutions to the seven unsolvable problems of the modern world."
3101-146 = "Countless experiments, approaches, tests, and more were conducted in order to crack these problems... And as they expanded their efforts, what we know as Millennium Science School came into being."
3101-147 = "Of course, most students these days don't even know what the problems are..."
3101-148 = "But each piece of research, each wild experiment, it's all a part of the process of solving those seven problems."
3101-149 = "...I suppose so. As long as there's a sliver of a chance of progress, all thinking and experimentation at Millennium is encouraged and recommended."
3101-151 = "However, nobody can know whether these wild ideas will actually bear fruit, but we can know what our budget will look like."
3101-152 = "We can encourage students all we want, but if we fund them endlessly, the academy will go bankrupt."
3101-153 = "Heehee. Great researchers often only notice practical things such as time and money once they've run out."
3101-154 = "Millennium School is so lucky to have a treasurer as brilliant as Yuuka."
3101-155 = "...You're messing with me, aren't you?"
3101-156 = "If you're so worried about Millennium's finances, why didn't you speak up more?"
3101-157 = "When we were debating the utility the AI Research Department's so-called Smart Bomb, which they claimed could determine when to detonate without human input, it would have been more persuasive if you'd said something, Noa..."
3101-158 = "Sorry, but I'm just a secretary."
3101-159 = "A good secretary doesn't interject, no matter the circumstances. We must be as neutral as our records."
3101-160 = "What convenient logic..."
3101-161 = "It sounds like you pick and choose when you want to be Seminar's secretary and when you want to be Ushio Noa..."
3101-162 = "Heehee! Whichever I am, it won't change the fact that I like you, Yuuka!"
3101-163 = "Yes, yes. I guess I shouldn't be surprised..."
3101-167 = "...What's this document?"
3101-168 = "Did we skip a proposal during the budget review?"
3101-169 = "Impossible. We heard from every club on the list."
3101-173 = "Hmm... The person who wrote the proposal was..."
3101-179 = "The president of Veritas?!"

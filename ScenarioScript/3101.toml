3101-86 = "1;아카네;02;네, 먼지떨이에 달린 버튼을 누르면 끝에서 고온의 압축가스가 분사되어 대상을 말끔히 연소시킨답니다!\n#1;em;[반응]\n#1;ar\n#3;m5"
3101-87 = "1;아카네;03;이 <궁극의 먼지떨이>를 사용하면 잘 지워지지 않는 얼룩도, 끈적거리는 이물질도 깨끗하게 태워 청소할 수 있어요.\n#1;greeting"
3101-88 = "#3;hide\n5;노아;02;불을 써서 이물질을 완벽하게 태워버리는 청소도구라……\n#5;em;…"
3101-89 = "5;유우카;99;세간에서는 그런 걸 화염방사기나 토치라고 부르고 있지만.\n#5;em;[속상함]\n#5;stiff"
3101-90 = "1;아카네;02;어라, 그런가요? 꽤 참신한 아이디어라고 생각했는데…….\n#1;em;[?]"
3101-91 = "5;유우카;01;이미 존재하는 기성품을 제작하기 위해 개발비를 재투자할 필요는 없겠지."

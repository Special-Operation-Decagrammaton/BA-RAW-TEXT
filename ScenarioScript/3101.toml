3101-64 = "5;유우카;02;어라? 아카네? C&C에서도 연구 기획서를 제출했다고?\n#5;em;[?]\n#5;al\n#3;m1"
3101-65 = "5;유우카;01;(소근) C&C의 예산은 작전 규모에 따라 별건으로 챙겨주고 있을 텐데…… 갑자기 비용이 필요한 문제라도 발생한 거야?\n#fontsize;50"
3101-66 = "3;아카네;02;아뇨. 이 발명품은 C&C의 작전에 필요한 물건이 아니라, 저 개인이 드리는 제안입니다.\n#3;em;[반응]"
3101-67 = "3;아카네;99;비록 평소에는 C&C의 일원으로서 봉사와 청소에 전념하는 삶을 살아가고 있지만……"
3101-68 = "3;아카네;01;저도 일단은 밀레니엄 사이언스 스쿨의 일원인바.\n#3;m3\n#5;dr"
3101-69 = "3;아카네;03;새로운 아이디어를 제시해서 학원의 기술 발전에 이바지할 수 있다면 기쁠 것 같아서요.\n#3;em;[반짝]\n#3;greeting"
3101-70 = "#all;hide"
3101-71 = "3;노아;03;과연, 창의와 혁신을 지향하는 밀레니엄의 학생다운 모범적인 자세네요."
3101-72 = "5;유우카;05;……뭔가 불안한데.\n#5;al\n#3;m1"
3101-73 = "5;유우카;02;일단 들어나 보지. 이 <궁극의 먼지떨이>는 기존의 먼지떨이와 어떻게 다른 건데?"
3101-74 = "#all;hide"
3101-75 = "3;아카네;01;저는 그동안 청소를 할 때 이 먼지떨이를 주로 애용해왔답니다.\n#3;em;…"
3101-76 = "3;아카네;02;하지만 청소를 하다 보면 먼지떨이로는 쉽게 제거되지 않는 얼룩이나 이물질을 마주할 때가 많거든요."
3101-77 = "3;아카네;99;그때마다 다른 도구를 찾으러 돌아가는 것도 번거롭고, 여러 개의 청소도구를 휴대하는 데에도 한계가 있습니다."
3101-78 = "#st;[0,0];instant;1;"
3101-79 = "#clearST"
3101-80 = "3;아카네;01\n#3;greeting\n#wait;1500"
3101-81 = "3;아카네;03;그래서 생각해낸 것이 바로 이 궁극의 먼지떨이…… <압축가스 분사 장치가 장착된- 궁극의 먼지떨이>입니다!\n#3;closeup\n#3;em;[반짝]"

3101-137 = "1;노아;03;특히 새로운 고도기술 분야의 특허를 사용한 발명품은 지난 분기에 비해 37%나 증가했네요."
3101-138 = "3;유우카;05;그럼 뭐해! 새로운 기술을 응용해서 만드는 물건들이 하나같이 괴작 뿐인데!\n#3;stiff\n#3;em;[빠직]"
3101-139 = "3;유우카;99;……도대체 왜 이렇게 다들 실용성 없는 연구에 진심인지 이해할 수가 없다니까."
3101-140 = "1;노아;01;연구의 구체적인 방향성을 결정하는 건 저희의 몫이 아니니까요.\n#1;em;[반응]"
3101-141 = "1;노아;03;그리고 지금은 무의미한 연구처럼 보여도, 먼 훗날에는 유용한 기술을 개발하는 데 필요한 초석이 될지도 모르잖아요?"
3101-142 = "1;노아;99;……마치 세미나가 연구하고 있는 <천년 난제>처럼 말이죠.\n#1;em;…"
3101-143 = "3;유우카;01;……."
3101-144 = "#all;hide"
3101-145 = "#na;노아;세미나— 밀레니엄의 전신이라 할 수 있는 이 학생회 조직은, 본래 '현재의 기술로는 절대 풀이가 불가능하다고 알려진 7개의 난제'를 해결하고자 하던 연구자들의 모임이었죠."

[translation]
2000309-1 = "Friends in High Places"
2000309-2 = "Downtown Kivotos"
2000309-3 = "I spotted Mashiro looking down at the city from atop a building while walking downtown."
2000309-4 = "She's watching the people below with a serious look on her face."
2000309-5 = "[s] \"I wonder what she's up to...\""
2000309-6 = "I decide to head up to the roof to see what she's doing."
2000309-8 = "Downtown Building Rooftop"
2000309-11 = "Sensei? What are you doing here?"
2000309-12 = "You happened to see me while you were walking down the street?"
2000309-13 = "I see. I must have been too preoccupied to notice."
2000309-14 = "You want to know if this is a sniper mission? No, this is just how I like to pass the time."
2000309-15 = "You can see a lot of the city from up here."
2000309-16 = "The cars coming and going from downtown, the people hard at work, and even the students at school..."
2000309-17 = "I find it hard to believe that injustice could exist in this city when I see how orderly it operates."
2000309-18 = "But I know there are people lurking in Kivotos waiting to break the peace."
2000309-19 = "I belong to the Justice Task Force. I should be doing more..."
2000309-20 = "[s] \"But you already work so hard, Mashiro.\""
2000309-21 = "Do I? I think my efforts are average at best."
2000309-22 = "And I'm only doing what I can to keep up with the other members of the task force. If I didn't..."
2000309-23 = "Still. If it pleases you, then perhaps being average isn't so bad. Heh..."
2000309-24 = "[s] \"Are you going to stay here longer?\""
2000309-25 = "I usually don't stay as long as I have."
2000309-26 = "But I wouldn't mind staying a while longer if I have you with me."
2000309-29 = "So? Will you humor me...for just a little while longer?"
2000309-31 = "Mashiro and I watched the city from the roof of the building until sunset."

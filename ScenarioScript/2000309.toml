[translation]
2000309-1 = "#title;연기와 바보는 높은 곳을 좋아한다"
2000309-2 = "#place;키보토스의 번화가"
2000309-3 = "#na;시내를 걷다가 우연히 건물 위에서 도심을 내려다보는 마시로를 발견했다."
2000309-4 = "#na;마시로는 진지한 표정으로 지나가는 행인들을 관찰하고 있다."
2000309-5 = "[s] \"무얼 하고 있는 걸까……\""
2000309-6 = "#na;걱정이 되니 마시로를 쫓아 옥상에 올라가보자."
2000309-7 = "#all;hide"
2000309-8 = "#place;건물 옥상"
2000309-9 = "5;마시로;01\n#5;em;[...]\n#wait;2500\n#5;a"
2000309-10 = "5;마시로;02\n#5;em;[반응]\n#5;shake\n#wait;1500"
2000309-11 = "5;마시로;04;어라, 선생님? 이 옥상에는 무슨 일이십니까?\n#5;m3\n#5;hophop"
2000309-12 = "5;마시로;04;길을 걷다가 우연히 저를 보고 올라오셨다고요?\n#5;em;[?]"
2000309-13 = "5;마시로;04;아하, 그렇군요. #n너무 무방비하게 난간에 몸을 기대고 있었을지도 모르겠습니다."
2000309-14 = "#5;hide\n3;마시로;01;새로운 저격 임무를 수행하는 중이냐고요? #n아뇨, 이건 제 순수한 취미입니다.\n#3;em;[반응]"
2000309-15 = "3;마시로;02;이곳에서 도심을 내려다보고 있으면 많은 것이 보이거든요."
2000309-16 = "3;마시로;99;차로를 따라 시내를 오가는 자동차들과, 부지런히 일을 하는 시민들, 그리고 등하굣길의 학생들까지……\n#3;em;[...]"
2000309-17 = "3;마시로;03;이렇게 질서정연한 모습을 보고 있노라면 이 도시에서 불의가 발생한다는 것을 믿기 어려울 정도입니다."
2000309-18 = "3;마시로;05;하지만 분명 불의는 이 평화를 깨트리기 위해 오늘도 키보토스 어디선가 흉계를 꾸미고 있겠지요."
2000309-19 = "3;마시로;99;좀 더 정의실현부의 일원으로서 노력하지 않으면……"
2000309-20 = "[s] \"마시로는 성실하구나.\""
2000309-21 = "3;마시로;04;그렇습니까? 저는 스스로가 그저 평범하다고만 생각했었는데…… \n#3;stiff\n#3;em;[땀]"
2000309-22 = "3;마시로;01;평범하니까 더 노력하지 않으면 선배들의 뒤를 좇을 수 없다고, 그래서 더 성실하게 노력을 해왔습니다만……"
2000309-23 = "3;마시로;03;선생님의 마음에 들 수 있다면 이 평범함도 나쁘지 않을지도 모르겠습니다. #n후후……\n#3;em;[///]"
2000309-24 = "[s] \"계속 더 여기에 머무를 거야?\""
2000309-25 = "3;마시로;99;평소라면 이만하고 내려갔겠지만……"
2000309-26 = "3;마시로;03;오늘은 선생님이 곁에 계시니까요. #n이 순간을 좀 더 즐기고 싶네요.\n#3;em;[반짝]"
2000309-27 = "3;마시로;03\n#3;d\n#wait;1000"
2000309-28 = "3;마시로;03\n#3;a\n#3;closeup\n#wait;1000"
2000309-29 = "3;마시로;03;오늘은 조금만 더…… 응석을 부리게 해 주시겠습니까?\n#3;closeup\n#3;em;[하트]"
2000309-30 = "#all;hide"
2000309-31 = "#na;이후, 해가 질 때까지 마시로와 도심을 관찰하다가 건물에서 내려왔다."

[translation]
2000309-1 = "คนทะเยอทะยานมักพยายามไขว่คว้าอำนาจ"
2000309-2 = "ย่านพลุกพล่านในคิโวทอส"
2000309-3 = "(ในขณะที่คุณครูกำลังเดินในเมืองก็ได้พบมาชิโระที่มองลงมากลางเมืองจากบนอาคารโดยบังเอิญ)"
2000309-4 = "(มาชิโระกำลังมองดูผู้คนที่ผ่านไปมาด้วยสีหน้าจริงจัง)"
2000309-5 = "[s] \"ทำอะไรอยู่น่ะ...\""
2000309-6 = "(ด้วยความเป็นห่วง คุณครูจึงตามมาชิโระขึ้นไปบนดาดฟ้า)"
2000309-8 = "ดาดฟ้าอาคาร"
2000309-11 = "เอ๊ะ คุณครูเหรอคะ? มาทำอะไรที่ดาดฟ้าคะ?"
2000309-12 = "บังเอิญมาเจอฉันระหว่างเดินอย่างนั้นเหรอคะ?"
2000309-13 = "ฮะฮ่า แบบนี้นี่เอง ฉันอาจจะพิงราวแบบไม่ระวังตัวไปหน่อยน่ะค่ะ"
2000309-14 = "กำลังทำภารกิจลอบยิงครั้งใหม่อยู่หรือเปล่าน่ะเหรอคะ? เปล่าค่ะ นี่แค่งานอดิเรกของฉันค่ะ"
2000309-15 = "เพราะการได้มองลงมากลางเมืองทำให้เห็นอะไรหลายอย่างน่ะค่ะ"
2000309-16 = "ทั้งรถยนต์ที่วิ่งไปมาตามถนนหนทางในตัวเมือง พลเมืองที่ทำงานอย่างขยันขันแข็ง#nทั้งนักเรียนที่กลับจากเรียนเสร็จ..."
2000309-17 = "พอได้มองดูเมืองที่เป็นระเบียบอย่างนี้แล้ว ไม่น่าเชื่อว่ามีเรื่องชั่วร้ายเกิดขึ้นในเมืองนี้นะคะ"
2000309-18 = "แต่แน่นอนว่าพวกชั่วร้ายยังวางแผนที่จะทำลายความสงบสุขอยู่ที่ไหนสักแห่งในคิโวทอส แม้แต่ตอนนี้เอง"
2000309-19 = "ในฐานะที่เป็นสมาชิกชมรมทวงความยุติธรรม ถ้าฉันไม่พยายามทำอะไรสักอย่าง..."
2000309-20 = "[s] \"มาชิโระนี่จริงจังน่าดูเลยนะ\""
2000309-21 = "งั้นเหรอคะ? ฉันคิดว่าตัวเองเป็นแค่คนธรรมดา..."
2000309-22 = "เพราะฉันเป็นคนธรรมดาๆ ถ้าฉันไม่พยายามคงจะตามพวกรุ่นพี่ไม่ทันค่ะ ฉันเลยพยายามอย่างหนัก..."
2000309-23 = "ถ้าคุณครูชอบ การเป็นคนธรรมดาก็ไม่แย่เหมือนกันนะคะ หึหึ..."
2000309-24 = "[s] \"จะอยู่ที่นี่ต่อเหรอ?\""
2000309-25 = "ปกติก็จะลงไปอยู่แล้วค่ะ แต่ว่า..."
2000309-26 = "วันนี้มีคุณครูอยู่ด้วย ฉันเลยอยากจะมีความสุขกับช่วงเวลานี้ต่ออีกหน่อยค่ะ"
2000309-29 = "วันนี้...คุณครูจะตามใจฉันอีกหน่อยได้มั้ยคะ?"
2000309-31 = "(หลังจากนั้นคุณครูก็เฝ้ามองเมืองกับมาชิโระจนพลบค่ำ จากนั้นจึงลงจากอาคาร)"

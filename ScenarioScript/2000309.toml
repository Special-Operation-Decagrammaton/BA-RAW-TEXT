[translation]
2000309-1 = "煙霧與笨蛋皆喜歡高處"
2000309-2 = "奇普托斯．鬧區"
2000309-3 = "（在市區散步時，偶然發現了正在從大樓樓頂往下俯瞰的麻白）"
2000309-4 = "（麻白一臉嚴肅地，觀察著路過的行人）"
2000309-5 = "[s] 「麻白在做什麼呢……」"
2000309-6 = "（我實在有點在意，於是就決定到麻白所在的頂樓看看）"
2000309-8 = "大樓屋頂"
2000309-11 = "咦，老師？你來屋頂上是有什麼事嗎？"
2000309-12 = "你說是走在路上的時候碰巧看到我，所以就跑上來了嗎？"
2000309-13 = "原來如此，是這樣啊。可能因為我靠著欄杆，所以就放輕了戒心也說不定。"
2000309-14 = "你問我是不是正在執行其他新的任務，是嗎？#n並不是這樣的，這純粹是我個人的興趣而已。"
2000309-15 = "因為從這裡往下看的話，能夠看到各式各樣的東西。"
2000309-16 = "像是在馬路上來來往往的車輛、正努力工作著的市民們，當然還有正在上下學的學生們……"
2000309-17 = "看著這麼有秩序的街道，讓人很難相信就算是在這個城市裡也會發生不好的事情。"
2000309-18 = "但是想必那些壞人，現在也躲在奇普托斯的某個地方做著某些不好的計畫，企圖要破壞這裡的和平吧。"
2000309-19 = "我身為實現正義部的一員，不再努力一點的話……"
2000309-20 = "[s] 「麻白真是認真的人呢。」"
2000309-21 = "是這樣嗎？我只覺得，自己只不過是個平凡的人而已……"
2000309-22 = "正因為我是個平凡的人，只要不努力就會跟不上前輩們的腳步。所以一直以來都很努力認真……"
2000309-23 = "如果這樣能讓老師喜歡的話，或許這份平凡也不是什麼壞事呢。#n呵呵……"
2000309-24 = "[s] 「還想再待一下嗎？」"
2000309-25 = "如果是平常的話，這個時候也差不多該回去了……"
2000309-26 = "但是因為今天有老師陪著我，#n所以還想再享受一下這段時光呢。"
2000309-29 = "今天就再稍微……讓我撒嬌一下，可以嗎？"
2000309-31 = "（之後，我便和麻白一起觀察街道，直到傍晚才離開）"

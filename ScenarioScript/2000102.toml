[translation]
2000102-1 = "หากต้องการความช่วยเหลือ... ให้เรียก C&C!"
2000102-2 = "ถนนในเมืองแถวๆ มิลเลเนียม"
2000102-4 = "......"
2000102-5 = "รหัสซีโร่ทู มาถึงหน้าอาคารที่ตัวประกันถูกจับตัวไว้แล้ว"
2000102-6 = "ตอนนี้พวกคนร้ายกำลังใช้งานคอมพิวเตอร์ คาดว่ากำลังถอดรหัส"
2000102-7 = "ถือว่ายังโชคดีที่ไฟล์ยังไม่ถูกโอนย้าย"
2000102-8 = "อ่า เห็นพวกตัวประกันจากตรงนี้แล้ว"
2000102-9 = "สันนิษฐานว่าตัวประกันคือคณะความมั่นคงของสภานักเรียน พวกเขาอาจถูกจับตัวในระหว่าง#nปกป้องไฟล์"
2000102-10 = "ตัวประกันคือเด็กผู้หญิงสองคนจากมิลเลเนียม ...หือ?"
2000102-11 = "คะ... คุณครู?"
2000102-12 = "ทำไมถึงมาอยู่ตรงนี้ได้...?"
2000102-13 = "เราได้รับรายงานว่าคุณครูถูกจับตัวในระหว่างพยายามปกป้องนักเรียนจากมิลเลเนียม..."
2000102-14 = "อะไรของเขาเนี่ย!"
2000102-15 = "สถานการณ์ฉุกเฉิน! ซีโร่ทูจะเข้าไปก่อน!"
2000102-17 = "ดะ... เดี๋ยวก่อน!"
2000102-19 = "ในอาคาร"
2000102-20 = "หึหึ เริ่มส่งไฟล์แล้ว"
2000102-21 = "แค่ส่งไฟล์นี้ให้นายจ้าง แล้วเราก็จะได้รับเงินก้อนใหญ่..."
2000102-22 = "(ตู้มมม!)"
2000102-23 = "อะ.. อะไรน่ะ!"
2000102-24 = "เราถูกจู่โจม! ชมรมเมดเข้ามาที่นี่!"
2000102-25 = "โธ่เอ๊ย! ทำไมถึงรู้เรื่องเร็วแบบนี้นะ!"
2000102-26 = "แต่ยังไงก็ต้องส่งไฟล์ให้ได้..."
2000102-28 = "(บู้มม!)"
2000102-30 = "ย้ากกก!"
2000102-31 = "นะ... นั่นมัน... แรงมากเลย!"
2000102-32 = "นะ... หนีไป!!"
2000102-35 = "คุณครู!"
2000102-36 = "เป็นอะไรมั้ย? ทำไมถึงมาอยู่ที่นี่ได้?"
2000102-37 = "ว่าไงนะ? พวกนักเรียนจากมิลเลเนียมตกอยู่ในอันตราย แต่เข้าไปช่วยไม่ได้..."
2000102-38 = "ก็เลยยอมถูกจับด้วยกัน?"
2000102-39 = "เชื่อเขาเลย..."
2000102-40 = "ฉันเองก็เคารพเจตนาดีและความสามารถในการสั่งการของคุณครูหรอกนะ..."
2000102-41 = "แต่คุณครูอ่อนแอเกินที่จะรับกระสุนได้... ฉันว่านี่ไม่น่าใช่การตัดสินใจที่ถูกต้อง"
2000102-42 = "ถ้าไม่ได้ฉัน คุณครูคงถูกเจ้าพวกนั้น..."
2000102-43 = "ยิงเล้ยยย!!!"
2000102-45 = "แย่ล่ะสิ! ยังมีเหลืออีกเหรอ!"
2000102-46 = "ไม่รู้จักยอมแพ้กันซะเลยนะ..."
2000102-47 = "วะฮ่ะฮ่า! ยอมแพ้งั้นเหรอ?!"
2000102-48 = "พวกเธอต่างหากที่ต้องยอมแพ้!"
2000102-49 = "ยัยเมด! ภารกิจของเธอคือการช่วยตัวประกันและได้ไฟล์ไปก่อนที่จะส่งสำเร็จใช่มั้ย?"
2000102-50 = "ถ้าไม่ใช่ เธอก็คงไม่ยิงคนที่อยู่หน้าคอมพิวเตอร์ก่อน"
2000102-51 = "......!"
2000102-52 = "แต่ทุกอย่างเสร็จหมดแล้วล่ะ! ทั้งการถอดรหัสและการส่งไฟล์! เธอทำภารกิจล้มเหลวแล้ว!"
2000102-53 = "วะ... ว่าไงนะ?!"
2000102-54 = "วะฮ่ะฮ่า! ไฟล์ถูกส่งไปก่อนที่เธอจะจู่โจมอีก ตอนเธอจู่โจมเวลาส่งไฟล์เหลือไม่ถึง 10 วิด้วยซ้ำ!#nตอนนี้นายจ้างของฉันคงจะได้รับไฟล์..."
2000102-55 = "เอ๋?"
2000102-56 = "อะ.. อะไรเนี่ย?!"
2000102-57 = "......?"
2000102-58 = "ทำไมหยุดส่งไฟล์ดื้อๆ ล่ะ เหลือแค่ 1 วินาทีเท่านั้นเอง! เกิดอะไรขึ้นเนี่ย...?"
2000102-59 = "เดี๋ยวนะ..."
2000102-60 = "คะ... ครูถืออะไรอยู่น่ะ...?!"
2000102-61 = "[s1] \"เผลอไปหยุดเวลาไว้น่ะ แย่จัง\"\n[s2] \"ดึงสายเน็ตได้ทันแฮะ\""
2000102-62 = "ดะ... ดีมากเลยคุณครู! สุดยอด!"
2000102-63 = "ดะ... ดีมากเลยคุณครู! สุดยอด!"
2000102-64 = "ฮึ่ม! ส่งสายนั่นมานะ!"
2000102-65 = "[s3] ยื่นสายให้\n[s4] ถามคารินว่าจะทำอย่างไร"
2000102-66 = "สายเน็ตเหรอ? ถึงคืนไปก็ไร้ประโยชน์"
2000102-67 = "สายเน็ตเหรอ? ถึงคืนไปก็ไร้ประโยชน์"
2000102-68 = "เพราะว่า..."
2000102-69 = "(ปั้ง!)"
2000102-71 = "(ตู้มมม!)"
2000102-72 = "ว้ากกก! คอมพิวเตอร์ฉัน!"
2000102-73 = "ฝะ... ฝะ... ฝากไว้ก่อนเหอะ!"
2000102-76 = "เฮ้อ..."
2000102-77 = "นี่ภารกิจสำเร็จแล้วใช่มั้ย...?"
2000102-78 = "หือ? พวกนั้นน่ะเหรอ? ฉันไม่ไปตามไล่หรอก อาจจะมีกันมากกว่านั้นก็ได้"
2000102-79 = "หน้าที่ของฉันไม่ใช่การจับตัวพวกนั้น แต่คือการปกป้องคนที่อยู่ที่นี่"
2000102-80 = "คุณครูก็ด้วย..."
2000102-81 = "อ่า จริงสิ เกือบลืมบอกเลย"
2000102-82 = "ขอบคุณนะคุณครู เพราะได้คุณครูช่วยไว้ ภารกิจของฉันก็เลยสำเร็จ"
2000102-83 = "คิดไม่ถึงเลย... ว่าจะไปดึงสายเน็ตมาได้"
2000102-84 = "......"
2000102-85 = "ขอโทษที่เมื่อกี้บอกว่าคุณครูเป็นคนอ่อนแอนะ"
2000102-86 = "คุณครูเป็นคนกล้าหาญต่างหาก"
2000102-89 = "สัญญาณกลับมาแล้ว ตอนนี้สมาชิกชมรมเมดกำลังจัดการพวกที่เหลืออยู่"
2000102-90 = "สงสัยต้องกลับแล้วล่ะ"
2000102-91 = "คือว่า... คุณครู"
2000102-92 = "ครั้งหน้าก็ขอฝากตัวด้วยนะ"

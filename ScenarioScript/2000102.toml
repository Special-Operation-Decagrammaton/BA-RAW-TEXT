[translation]
2000102-1 = "需要幫助時，就找C&C！"
2000102-2 = "千年近郊．鬧區"
2000102-4 = "……"
2000102-5 = "這裡是代號02，已經抵達囚禁人質的建築物前方。"
2000102-6 = "現在犯人們正在使用電腦，可能是在解析密碼。"
2000102-7 = "看來檔案還沒有被傳送出去，真是太好了。"
2000102-8 = "現在，從我這裡已經能看到人質們的位置了。"
2000102-9 = "推測是為了保護檔案而被抓住的，學生會保安部的學生。"
2000102-10 = "總之，人質為兩個千年的女學生和……嗯？"
2000102-11 = "老，老師？"
2000102-12 = "為什麼老師會在那種地方……"
2000102-13 = "剛才傳來老師為了保護被牽扯進來的女學生們而一起被抓走的報告……！"
2000102-14 = "真是的……那個人啊！"
2000102-15 = "判斷現場為緊急情況！代號02！先行入侵！"
2000102-17 = "請，請等一下！"
2000102-19 = "建築內部"
2000102-20 = "嘿嘿，差不多該開始傳送檔案了吧。"
2000102-21 = "只要把這個檔案傳給委託人，我們就能發大財了……"
2000102-22 = "（咚哐！）"
2000102-23 = "什，什，什麼！？"
2000102-24 = "是，是襲擊！女僕部的人衝進來了！"
2000102-25 = "可惡！已經被發現了啊！"
2000102-26 = "至少得想個辦法把這個檔案給……"
2000102-28 = "（噹──！）"
2000102-30 = "呃啊！"
2000102-31 = "那，那傢伙是怎樣！"
2000102-32 = "快，快逃啊！"
2000102-35 = "老師！"
2000102-36 = "沒事吧！你怎麼會跑到這種地方……"
2000102-37 = "嗯？因為千年的女學生們遇到了危險，自己卻幫不上忙……"
2000102-38 = "沒辦法之下，只好就這樣一起被抓？"
2000102-39 = "……真是難以置信。"
2000102-40 = "雖然我很尊敬老師的善良意志和指揮能力……"
2000102-41 = "但你可是只要中了一發子彈就會有生命危險的……考量到老師這麼弱，我實在不認為那是個好決定。"
2000102-42 = "要是我沒有過來的話，老師可能就被這些傢伙給……"
2000102-43 = "開火！"
2000102-45 = "可惡！殘黨嗎！"
2000102-46 = "這些傢伙真是不放棄啊……"
2000102-47 = "哼，要我們放棄！？"
2000102-48 = "該放棄的是你們才對！"
2000102-49 = "喂！女僕。#n你們的任務想必是拯救人質，還有在檔案被傳送前進行回收對吧？"
2000102-50 = "如果不是的話，你也不會一開始就攻擊電腦前的人了！"
2000102-51 = "……！"
2000102-52 = "哼哈哈，但不好意思，已經太遲了！#n不管是解析密碼！還是傳送檔案！沒錯，你們根本沒有趕上！"
2000102-53 = "你，你說什麼！？"
2000102-54 = "哼哈哈！剛才被你們攻擊時，離檔案傳送完成就已經只剩下10秒了！#n現在檔案早就已經傳到委託人那……"
2000102-55 = "奇怪？"
2000102-56 = "什，什，什麼？！"
2000102-57 = "……？"
2000102-58 = "檔案竟然在剩下一秒的時候停下來了！到底是怎麼回事……"
2000102-59 = "……嗯？"
2000102-60 = "老，老師！？你手上的那個是……"
2000102-61 = "[s1] 「是我……暫停了時間。哼。」\n[s2] 「你們的網路線，被我給拔掉了。」"
2000102-62 = "做，做得太好了，老師！Nice！"
2000102-63 = "做，做得太好了，老師！Nice！"
2000102-64 = "可惡！把那條線給還來！"
2000102-65 = "[s3] 把網路線還他\n[s4] 問花凜該怎麼做"
2000102-66 = "網路線嗎？還給他也沒關係的。"
2000102-67 = "網路線嗎？還給他也沒關係的。"
2000102-68 = "反正……"
2000102-69 = "（咚──！）"
2000102-71 = "（咚哐──！）"
2000102-72 = "呃啊啊啊！我的電腦啊！"
2000102-73 = "給，給，給我記住！"
2000102-76 = "呼……"
2000102-77 = "這麼一來總算是……完成任務了？"
2000102-78 = "嗯？我們不用去追他們。畢竟可能還有其他殘黨也說不定。"
2000102-79 = "我的工作並不是打倒他們，而是保護這裡的人們。"
2000102-80 = "而且，也還有老師在這……"
2000102-81 = "啊啊，這麼說來有句話忘記跟你說了。"
2000102-82 = "謝謝你，老師。託你的福，成功完成了任務。"
2000102-83 = "沒想到在那種情況下還能把網路線給拔掉。"
2000102-84 = "……"
2000102-85 = "我收回剛剛說老師很弱的那句話。"
2000102-86 = "老師是個勇敢的人呢。"
2000102-89 = "啊，訊息。#n……殘黨正在被女僕部的其他人來清掃。"
2000102-90 = "我得回去了。"
2000102-91 = "……那個，老師。"
2000102-92 = "之後也請多多指教。"

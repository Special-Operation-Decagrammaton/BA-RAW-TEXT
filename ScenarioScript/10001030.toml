[translation]
10001030-1 = "ตอนที่ 3;อาคารเรียนเก่า ห้องพิเศษ 227"
10001030-2 = "ภูเขาหิมะ สหภาพเรดวินเทอร์"
10001030-5 = "นะ... นี่มันก็ชั่วโมงกว่าแล้วนะ..."
10001030-6 = "ไม่เห็นจะมีอาคารอะไรเลยไม่ใช่รึไง!"
10001030-7 = "นี่เราต้องไปอีกแค่ไหนกันน่ะ?"
10001030-8 = "ที่ดินของสหภาพเรดวินเทอร์เป็นที่ดินที่กว้างที่สุดของโรงเรียนในคิโวทอสนะคะ#nถ้าจะไปให้ถึงชายขอบ ก็ต้องใช้เวลาเดินทางอีกหน่อยค่ะ"
10001030-9 = "เราก็รู้น่า~ แต่เมื่อไหร่จะถึงล่ะ!"
10001030-10 = "อึ่ก... เจ็บขาจนเดินต่อไม่ไหวแล้ว"
10001030-11 = "ถ้างั้นเราหยุดพักกันก่อนดีไหมคะ?"
10001030-13 = "ไม่ต้อง ไม่เป็นไรหรอก เรามีวิธีที่ดีกว่านั้น!"
10001030-17 = "สหาย! ขอขี่หลังหน่อยสิ!"
10001030-18 = "[s1] แบกเชริโน่ขึ้นหลัง\n[s2] ทำเป็นไม่ได้ยิน"
10001030-22 = "อย่ามาแกล้งทำเป็นไม่ได้ยินน่า!"
10001030-23 = "ถ้าไม่ยอมให้ขี่หลังดีๆ ล่ะก็ เราจะกระโดดขึ้นไปเองนะ!"
10001030-29 = "เอ่อ... สูงกว่าที่คิดนะเนี่ย... น่ากลัวเหมือนกันแฮะ"
10001030-30 = "แต่ข้างบนนี้อากาศดี แล้วก็จะเห็นอะไรได้เต็มตาดีนะ!"
10001030-31 = "นี่คือภาพที่มารินะกับโทโมเอะได้เห็นเหรอเนี่ย......"
10001030-33 = "โอ๊ะ ท่าทางดูเจ๋งดีมากๆ เลยล่ะค่ะ!"
10001030-35 = "น่ารักเหมือนลิงที่เกาะอยู่บนต้นไม้เลย... เอ่อ.. ฉันหมายถึง... ดูภูมิฐานมากเลยค่ะ!"
10001030-36 = "จะ... จริงเหรอ? แหะๆๆ..."
10001030-37 = "ขอถ่ายรูปไว้เป็นที่ระลึกหน่อยได้ไหมคะ?"
10001030-39 = "ถ่ายให้เต็มที่เลย! ถ้าอยู่สูงๆ แบบนี้ คงไม่ถูกใครบังหรือตกเฟรมอีก"
10001030-50 = "ดูสิคะเชริโน่จัง พอได้ขี่หลังคุณครู ในรูปก็ดูตัวสูงขึ้นมาเลยค่ะ!"
10001030-51 = "ไหน ไหน....."
10001030-54 = "โอ้ โอ้ เหมือนคนตัวสูงเลย!"
10001030-55 = "ฮุฮุฮุ ถูกใจมาก! ต่อไปถ้าได้กลับไปที่สำนักเลขาธิการ คงต้องขี่หลังคุณครูแล้วทำงานไปด้วยแล้วล่ะ"
10001030-56 = "ถ้าเป็นแบบนั้นก็จะไม่มีใครมาว่าเราตัวเตี้ยได้อีก! ฮ่ะฮ่ะฮ่า!"
10001030-57 = "เป็นความคิดที่ดีเลยค่ะท่านประธานเชริโน่"
10001030-58 = "ถ้าได้ขี่หลังคนอื่นแล้วออกคำสั่งอย่างเคร่งขรึมล่ะก็ นักเรียนของเรดวินเทอร์ก็จะต้องประทับใจ#nและชื่นชมในอำนาจที่สูงส่งของท่านประธานแน่ค่ะ"
10001030-59 = "เราก็ว่าอย่างนั้น ถ้าได้กลับไปที่สำนักเลขาธิการ เราจะไปขี่หลังมารินะ!"
10001030-60 = "แน่นอนว่าก่อนหน้านั้นเธอต้องถูกลงโทษที่ก่อการปฏิวัติในครั้งนี้ก่อน!"
10001030-61 = "ให้ไปให้อาหารกระต่ายในโรงเลี้ยงสัตว์สักเดือนหนึ่งดีไหมนะ?#nไม่ดีกว่า กระต่ายออกจะน่ารัก แบบนี้ไม่ถือว่าเป็นการลงโทษ! ต้องหาโทษที่หนักกว่านี้..."
10001030-64 = "[ns] \"แฮ่ก... เหนื่อยจัง\""
10001030-65 = "โอ๊ะ! รู้สึกไม่สบายตัวตรงไหนเหรอคะคุณครู?"
10001030-66 = "ไม่ได้ปวดตัวเพราะต้องแบกท่านประธานที่ตัวเบายิ่งกว่าขนนกใช่ไหมคะ?"
10001030-67 = "หรือว่า... คุณครูของชาเล่ต์ที่แข็งแกร่งจะทิ้งท่านประธานที่เจ็บขาแล้วหนีไปคนเดียวเหรอคะ?"
10001030-68 = "[s] \"ไม่ใช่อย่างนั้นสักหน่อย...\""
10001030-70 = "มัวชักช้าอะไรอยู่ล่ะสหาย! ขืนเดินช้าอยู่แบบนี้ เดี๋ยวมารินะก็ตามมาทันกันพอดี!"
10001030-71 = "รีบเดินไปที่อาคารเรียนเก่าเร็วๆ เถอะ!"
10001030-72 = "ไปเล้ยย!"
10001030-74 = "หลังจากเดินแบกเชริโน่ตามทางภูเขามาเกือบ 1 ชั่วโมง..."
10001030-76 = "อาคารเรียนเก่า สหภาพเรดวินเทอร์"
10001030-78 = "ในที่สุดก็ถึงแล้วค่ะท่านประธาน ที่นี่คืออาคารเรียนเก่าของเราค่ะ"
10001030-79 = "ถึงตอนนี้อาคารนี้จะถูกทิ้งร้าง แต่ในอดีตที่นี่คือสถานที่อันทรงเกียรติ#nที่พวกนักเรียนของสหภาพเรดวินเทอร์ได้ใช้ชีวิตวัยรุ่นร่วมกัน"
10001030-80 = "แต่ตอนนี้มันดูเหมือนซากอาคารสกปรกๆ เลย..."
10001030-81 = "แถมบรรยากาศยังน่ากลัว เหมือนว่าหมีจะโผล่ออกมาอย่างนั้นแหละ"
10001030-82 = "เราต้องอยู่ที่นี่กันจริงๆ เหรอโทโมเอะ?"
10001030-83 = "สักวันเราก็ต้องได้กลับไปที่สำนักเลขาธิการค่ะ"
10001030-84 = "แต่ตอนนี้คงกลับไปยากค่ะ เพราะหัวหน้าคณะฯ มารินะยังตามไล่ล่าท่านประธานอยู่"
10001030-85 = "แต่หากท่านประธานเชริโน่มีความพยายาม ฉันว่าเราน่าจะกลับไปได้เร็วขึ้นนะคะ"
10001030-86 = "จะ... จริงเหรอ?"
10001030-87 = "ถ้าไม่มีพลังจากเราทั้งคน คงไม่มีทางทำอะไรสำเร็จได้สินะ!"
10001030-88 = "ดี! ต่อไปนี้ที่นี่คือศูนย์บัญชาการใหม่ของเรา เราจะใช้ที่นี่เพื่อทวงสำนักเลขาธิการกลับมา!"
10001030-90 = "มาทำอะไรตามใจชอบได้ยังไงกันคะ!?"
10001030-91 = "มีคนอยู่ในที่ห่างไกลแบบนี้ด้วยเหรอ? หรือว่าจะเป็น... หมี?"
10001030-99 = "หมีงั้นเหรอคะ? มะ.. มีหมีอยู่ตรงไหนคะ?"
10001030-100 = "ใจเย็นก่อนโนโดกะ ประธานเชริโน่ที่ขี้ขลาดแค่เข้าใจไปผิดเท่านั้น"
10001030-102 = "ว่าใครขี้ขลาดกันน่ะ!?"
10001030-103 = "พวกเธอคือ..."
10001030-104 = "ฮึ่ม! เพิ่งจะจำพวกฉันได้เหรอคะ?"
10001030-106 = "ใครนะ...?"
10001030-107 = "เอ๋? ลืมพวกเราแล้วจริงๆ เหรอคะเนี่ย? ไม่อยากจะเชื่อเลย!"
10001030-108 = "พวกเราอดทนอยู่อย่างยากลำบากในสภาพแวดล้อมที่โหดร้ายของอาคารเรียนเก่า#nเพราะคิดว่าประธานเชริโน่จะเรียกพวกเรากลับไปอีกครั้ง!"
10001030-109 = "ถึงจะพูดแบบนี้ก็จำไม่ได้หรอกนะ..."
10001030-110 = "หัวหน้าเลขานุการโทโมเอะ มีชมรมอะไรอยู่ในอาคารเรียนเก่าของสหภาพเรดวินเทอร์ด้วยเหรอ?"
10001030-111 = "ถ้าอย่างเป็นทางการแล้วไม่มีค่ะ แต่ว่าในอาคารเรียนเก่ามีห้องที่เรียกว่า <ห้องพิเศษ 227>#nที่เป็นสถานที่ชั่วคราวของนักเรียนสหภาพเรดวินเทอร์ที่ถูกพักการเรียน"
10001030-112 = "สถานที่... ชั่วคราวงั้นเหรอ?#nแล้วทำไมนักเรียนพวกนี้ถึงยังไม่ได้กลับไปที่อาคารเรียนใหม่อีกล่ะ?"
10001030-113 = "คือว่าคนที่สั่งให้กลับเข้าไปได้ก็คือท่านประธานน่ะค่ะ"
10001030-114 = "...อ้อ! นึกออกแล้ว! พวกโรคจิตที่ใช้กล้องส่องทางไกลแอบสะกดรอยตามสหาย#nจนถูกพักการเรียนใช่ไหม?"
10001030-115 = "สำนักเลขาธิการมีเรื่องให้จัดการมากมายจนลืมพวกเธอไปแล้วล่ะนะ"
10001030-116 = "ส่งคนมาพื้นที่ที่แทบจะแข็งตายได้เลยแล้วมาบอกว่าลืมไปแล้วงั้นเหรอคะ!?#nพูดอะไรออกมากัน!"
10001030-117 = "รู้ไหมคะว่าพวกเราต้องลำบากแค่ไหนถึงจะ <มีชีวิตรอด> อยู่ที่นี่ได้?"
10001030-118 = "อย่าว่าแต่ของว่างเลย เราไม่ได้แม้แต่อาหารมื้อหลักให้อิ่มท้องเลยด้วยซ้ำ!"
10001030-119 = "แถมที่นี่ยังไม่มีอุปกรณ์ทำความร้อนให้ต่อสู้กับอากาศที่หนาวสุดขั้วอีก!"
10001030-120 = "ตอนกลางคืนก็มีแมลงออกมาจากผ้าห่ม!"
10001030-121 = "บางทีก็มีหมีที่หิวโหยมาเดินเตร็ดเตร่ในอาคารอีก!"
10001030-122 = "วะ.. ว่าไงนะ? มีหมีออกมาจริงๆ เหรอ?"
10001030-123 = "โท... โทโมเอะ ที่นี่คงไม่ได้การแล้วล่ะ ระ.. เราไปอยู่ที่อื่นกันดีมั้ย?"
10001030-124 = "ไม่ได้นะคะเชริโน่จัง ในสถานการณ์แบบนี้ยิ่งต้องแสดงถึงความเคร่งขรึมของผู้นำ#nของสหภาพเรดวินเทอร์สิคะ"
10001030-125 = "แต่เรากลัวหมีนี่นา..."
10001030-126 = "ช่างเถอะ ไหนๆ ประธานเชริโน่ก็มาที่นี่เองแล้ว#nแปลว่าพวกฉันออกไปจากอาคารเรียนเก่านี่ได้แล้วใช่ไหมคะ?"
10001030-127 = "อ่อ... เรื่องนั้น..."
10001030-128 = "น่าเสียใจที่ต้องบอกแบบนี้ แต่ว่าตอนนี้พวกฉันไม่มีสิทธิในการยกเลิกการพักการเรียน#nของทุกคนที่นี่หรอกค่ะ"
10001030-129 = "ทะ... ทำไมล่ะคะ?"
10001030-130 = "ท่านประธานเชริโน่อยู่ในระหว่างหลบหนี#nเพราะถูกยึดอำนาจจนสูญเสียตำแหน่งประธานนักเรียนไปน่ะค่ะ"
10001030-131 = "ทั้งหมดเพราะยัยมารินะนั่นเลย! ถ้ามารินะไม่ก่อปฏิวัติ เราก็คงไม่ต้องหนีออกมา#nจากสำนักเลขาธิการและมาอยู่ในที่ที่สกปรกแบบนี้!"
10001030-133 = "อะไรกัน? แบบนี้ก็แปลว่าตอนนี้ประธานเชริโน่ก็เป็นแค่เด็กธรรมดาที่ไม่มีอำนาจอะไรเลยสิคะ?"
10001030-134 = "น่าผิดหวังจริงๆ..."
10001030-135 = "อึ้กก! ใครบอกว่าเราเป็นเด็กกันน่ะ?"
10001030-136 = "ถึงจะสูญเสียอำนาจไป แต่เราก็ยังเป็นเลขาธิการ หัวหน้าฝ่ายตกแต่ง หัวหน้าฝ่ายทำความสะอาด...#nเรายังเป็นเชริโน่ที่ดำรงตำแหน่งใหญ่โตในสหภาพเรดวินเทอร์อยู่นะ!"
10001030-137 = "ไม่เห็นหนวดที่เป็นสัญลักษณ์ของอำนาจเรอะ?"
10001030-139 = "ฉันไม่สนใจหนวดปลอมอะไรนี่หรอกค่ะ!"
10001030-141 = "วะ.. ว่ายังไงนะ?"
10001030-145 = "โท... โทโมเอะ พวกนักเรียนรู้กันได้ยังไงว่าหนวดนี่เป็นหนวดปลอม?"
10001030-147 = "โนโดกะแค่เดาเอาเท่านั้นแหละค่ะ ไม่ต้องไปสนใจหรอกค่ะ"
10001030-148 = "ชะ.. ใช่! ถ้าไม่รู้อะไรก็อย่าพูดออกมาพล่อยๆ เลย!"
10001030-149 = "อย่าคิดว่าเราจะลืมล่ะว่าเธอคือเด็กน้อยโรคจิตที่แอบปีนขึ้นที่สูงเพื่อเอากล้องส่องทางไกล#nส่องคุณครูทุกวันหยุด!"
10001030-150 = "ฉะ... ฉันไม่ได้เป็นเด็กน้อยโรคจิตนะคะ!"
10001030-151 = "ประธานเชริโน่ต่างหากที่เอาแต่ขี่หลังคุณครูมาจนถึงอาคารเรียนเก่านี่!"
10001030-152 = "นะ.. น่าอับอายชะมัด..."
10001030-153 = "ประธานเชริโน่ดูเป็นเด็กตัวกะเปี๊ยกมากกว่าอีกค่ะ!"
10001030-154 = "นั่นเป็นแค่การแสดงความเป็นหนึ่งเดียวกันของเรากับสหายต่างหาก!#nคนที่คิดอะไรแบบนั้นต่างหากล่ะที่ควรเรียกว่าเด็กน้อย!"
10001030-155 = "และอย่างน้อยเราก็ไม่เคยสะกดรอยตามคุณครูด้วย!"
10001030-156 = "สะกดรอยตามอะไรกันล่ะคะ! นั่นเป็นสิ่งที่ฉันทำในฐานะของนักเรียนที่เคารพคุณครูต่างหาก!"
10001030-157 = "เลิกใส่ร้ายกันได้แล้ว เด็กตัวกะเปี๊ยกไม่ยอมโต!"
10001030-158 = "เธอนั่นแหละเด็กตัวกะเปี๊ยก เธออายุน้อยกว่าเรานะ!"
10001030-159 = "[s] \"ทะเลาะกันเหมือนเด็กประถมเลย...\""
10001030-160 = "โอ๊ะ โอ๊ะ ทั้งสองคนนี่พลังเหลือล้นกันจังเลยนะคะ ฮุฮุ"
10001030-161 = "แต่การมาทะเลาะกันในช่วงเวลาที่มารินะยึดสำนักเลขาธิการไว้แบบนี้...#nมันแก้ปัญหาอะไรไม่ได้หรอกนะคะ"
10001030-162 = "หากทุกคนในห้องเรียนพิเศษอยากจะออกไปจากอาคารเรียนเก่านี่ล่ะก็#nฉันว่ามาผนึกกำลังกับพวกฉันดีกว่าค่ะ"
10001030-163 = "จะให้ร่วมมือกับเด็กอวดดีคนนี้น่ะเหรอ..."
10001030-164 = "ฉันขอปฏิเสธค่ะ!"
10001030-165 = "เราเองก็เหมือนกัน! ให้เราจับมือกับเด็กโรคจิตนี่ไม่ได้หรอก!"
10001030-166 = "ถ้าทั้งคู่จะดื้อกันขนาดนี้... เราก็คงทำอะไรไม่ได้แล้วละค่ะ"
10001030-171 = "จริงสิ! งั้นก็มาตัดสินกันดูเลยสิว่าใครที่เป็นเด็กน้อยกว่ากัน!"
10001030-172 = "ชิกุเระจัง?"
10001030-173 = "ในสมัยโบราณมีคำพูดที่ว่า \"ผู้ใหญ่ที่แท้จริงจะไม่เมาแม้จะดื่มเหล้าไปกี่ไหก็ตาม\""
10001030-174 = "งั้นเรามา <แข่งดื่ม> กันเพื่อวัดดูเลยไหมว่าใครคือผู้ใหญ่ และใครคือเด็กน้อย?"
10001030-175 = "ชิกุเระจัง ถึงนี่จะเป็นอาคารเรียนเก่า แต่การดื่มเหล้าก็เป็นเรื่องผิดกฎของสหภาพเรดวินเทอร์นะคะ!"
10001030-176 = "ฉันไม่ได้บอกว่าให้แข่งดื่มเหล้าสักหน่อย"
10001030-177 = "ฉันมีกัมปอตสูตรพิเศษที่เตรียมเอาไว้เพื่อเทศกาลอีวาน คูปาลาในปีนี้!"
10001030-178 = "แต่ว่าตู้เย็นในอาคารเรียนเก่ามีไม่พอ เครื่องดื่มจากผลไม้นี้ก็เลยถูกหมักไปนิดหน่อย..."
10001030-179 = "ฟังดูแปลกๆ นะ..."
10001030-180 = "ถ้ากลัวก็ไม่ต้องดื่มก็ได้นะประธานเชริโน่"
10001030-181 = "แต่ก็ช่วยไม่ได้นะถ้าคนอื่นจะคิดว่าประธานเป็นคนขี้ขลาด..."
10001030-182 = "คะ... ใครเป็นคนขี้ขลาดกันล่ะ! ก็แค่น้ำผลไม้ จะให้ดื่มกี่ขวดก็ได้!"
10001030-183 = "ฉันก็ด้วยค่ะ! ฉันไม่ยอมแพ้ให้ประธานเชริโน่เด็ดขาด!"
10001030-184 = "ดีเลย! ถึงเวลาเอากัมปอตที่แช่ไว้ตั้งแต่ฤดูใบไม้ร่วงที่แล้วออกมาสักที!"
10001030-186 = "ชิกุเระไปเอาน้ำผลไม้ที่ส่งกลิ่นเปรี้ยวออกมา"
10001030-193 = "เอ่อ... ชิกุเระจัง นี่ไม่ใช่เหล้าใช่ไหม?"
10001030-194 = "จะ... จำได้แล้ว นักเรียนคนนี้คือคนที่เอาวอดก้าไปผสมในกัมปอตที่จะเอาไปแจกในโรงเรียน#nจนถูกพักการเรียนไป..."
10001030-195 = "เอาล่ะๆ ไม่มีเวลามาคุยกันเรื่องไร้สาระแล้ว"
10001030-196 = "เตรียมตัวให้ดี"
10001030-197 = "เริ่มการแข่งขันได้!"

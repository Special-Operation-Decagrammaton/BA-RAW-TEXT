10001030-114 = "3;체리노;01;……아, 기억났다! 전에 교내에서 콤라드를 몰래 망원경으로 스토킹하다가 걸려서 정학을 맞은 그 변태잖아?\n#3;em;[!]\n#3;m3\n#1;dl"

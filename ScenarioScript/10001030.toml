[translation]
10001030-1 = "第3話;舊校舍的另一面，227號特別班"
10001030-2 = "赤冬聯邦學園．雪山"
10001030-5 = "唔唔，已經走了一個小時了……"
10001030-6 = "別說舊校舍了，連棟建築都沒看見！"
10001030-7 = "還要多久才會到舊校舍？"
10001030-8 = "畢竟赤冬聯邦學園的占地面積比奇普托斯的所有學園都大……#n還需要一點時間才會到外圍。"
10001030-9 = "唔唔……不行了，已經不行了！"
10001030-10 = "腳已經痛到一步也走不動了！"
10001030-11 = "那麼，我們稍微休息一下吧？"
10001030-13 = "……不，沒有那個必要。咱有個好方法！"
10001030-17 = "同志，把咱揹起來吧！"
10001030-18 = "[s1] 把潔莉諾揹起來\n[s2] 假裝沒聽見"
10001030-22 = "別假裝沒聽到！想被肅清嗎！？"
10001030-23 = "就算你不揹，咱也有辦法騎到你背上！"
10001030-29 = "唔，唔唔……比，比想像中還要高，好可怕……"
10001030-30 = "不過，能看到比平常還要遠的地方，空氣也更清新了！"
10001030-31 = "這就是瑪麗娜和智惠所看到的世界嗎……"
10001030-33 = "哎呀，這模樣真是可愛呢！"
10001030-35 = "就和掛在樹上的猴子一樣可愛……不，是充滿威嚴！"
10001030-36 = "是，是嗎？欸嘿嘿……"
10001030-37 = "我可以拍張照片留作紀念嗎？"
10001030-39 = "想拍多少就拍多少！如果是這種狀態，就不用擔心畫面內拍不到咱了！"
10001030-50 = "請看，潔莉諾醬。多虧有老師揹著你，照片裡的你看起來很高唷！"
10001030-51 = "我瞧瞧……"
10001030-54 = "哦哦，真的耶！"
10001030-55 = "呵呵，真不錯。#n看來之後回到事務局，也要像這樣被揹著工作才行。"
10001030-56 = "這樣的話，肯定不會再有學生因為個子小而無視咱了……哈哈哈！"
10001030-57 = "我覺得是個好點子呢，潔莉諾會長。"
10001030-58 = "會長如果是從某人的背上下達嚴格的指示的話……學生們一定會感到震驚的。"
10001030-59 = "對吧？回到事務局後，就叫瑪麗娜揹著咱吧！"
10001030-60 = "當然，在那之前，得先以發動政變的罪名肅清她！"
10001030-61 = "派她去飼養場餵兔子一個月？ #n不，兔子那麼可愛，不算是懲罰！得處以更加、更加可怕的懲罰……"
10001030-64 = "[ns]「我好像有點累了……」"
10001030-65 = "哎呀，老師？哪裡不舒服嗎？"
10001030-66 = "該不會是……覺得我們比羽毛還輕的會長很「重」吧？"
10001030-67 = "而且，作為堂堂夏萊的老師，不會做出把腳痛的會長扔下這種事吧？"
10001030-68 = "[s]「我會努力的……」"
10001030-70 = "還在磨蹭什麼，同志。再繼續下去，說不定會被瑪麗娜追上的！"
10001030-71 = "快挪動腳步，往舊校舍出發！ "
10001030-72 = "來，走吧！"
10001030-74 = "之後，揹著潔莉諾走了將近一個小時的山路……"
10001030-76 = "赤冬聯邦學園．舊校舍"
10001030-78 = "終於到了，會長。"
10001030-79 = "舊校舍……雖然已經幾乎沒有在使用了，#n但這裡曾經是赤冬聯邦學園的學生們學習並度過青春時光的著名場所。"
10001030-80 = "儘管如此，現在看起來只是個又破又髒的廢墟……"
10001030-81 = "總覺得氣氛有點陰森，彷彿隨時都會有熊冒出來一樣。"
10001030-82 = "智惠，真的要待在這裡嗎？"
10001030-83 = "當然，我們總有一天會重回事務局。"
10001030-84 = "但是，在這個被瑪麗娜委員長追趕的當下，無法馬上回去……"
10001030-85 = "話雖如此，只要潔莉諾會長肯努力的話，一定很快就能回去的！"
10001030-86 = "是，是嗎？"
10001030-87 = "少了咱的力量，果然是什麼事都解決不了啊！"
10001030-88 = "好，那就把這裡當成咱們的新據點，想辦法奪回事務局吧！"
10001030-90 = "是誰啊！為什麼擅自決定那種事！"
10001030-91 = "！？你，你才誰啊！在這種偏遠的地方，該不會是熊吧！？？"
10001030-99 = "熊！？哪裡有熊？？"
10001030-100 = "冷靜點，和香。那只是被嚇壞的潔莉諾會長誤會了。"
10001030-102 = "誰，誰嚇壞了啊！？"
10001030-103 = "比起那個，你們……"
10001030-104 = "哼，終於想起我們了嗎？"
10001030-106 = "……誰啊？"
10001030-107 = "真，真的把我們給忘了嗎！？不敢相信！"
10001030-108 = "在舊校舍這種嚴酷的環境下，每天忍受著艱困的生活，#n相信總有一天潔莉諾會長會把我們喚回新校舍，一直等待著的說！"
10001030-109 = "就算你那麼說，咱還是想不起來……"
10001030-110 = "智惠秘書室長，舊校舍內有社團嗎？"
10001030-111 = "雖然官方紀錄上沒有，但在這座舊校舍裡，#n有一群被停學處分的赤冬聯邦學園的學生暫時住在這兒，名為「227號特別班」。"
10001030-112 = "──暫時住在這兒？#n這樣的話，為什麼這些傢伙們不回新校舍，一直待在這裡呢？"
10001030-113 = "因為沒有會長的許可是回不去的，所以只能一直等待命令下達。"
10001030-114 = "……啊，想起來了！#n是前段時間被抓到偷偷用望遠鏡偷窺同志，因而被停學的那個變態跟蹤狂吧？"
10001030-115 = "事務局有太多事情要忙了，我都忘了還有這件事……"
10001030-116 = "把人驅逐到結凍的北方，結果竟然「忘了」！ #n太不負責任了！"
10001030-117 = "你知道我們為了在這裡生存，吃了多少苦頭嗎？"
10001030-118 = "先不論點心，連用來填飽肚子的食物都沒有正常配給！"
10001030-119 = "也沒有像樣的暖氣設備能抵禦這種極寒。"
10001030-120 = "晚上有蟲子從被窩裡鑽出來！"
10001030-121 = "偶爾，還會有饑餓的熊在校舍周圍徘徊。"
10001030-122 = "什，什麼？真的有熊出沒？"
10001030-123 = "智，智惠，這間舊校舍果然不太優。不，不去找別的地方嗎？"
10001030-124 = "不行唷，潔莉諾醬。這種情況下，才是赤冬聯邦學園的領袖表現出威嚴的時候。"
10001030-125 = "可是……熊，很可怕……"
10001030-126 = "總之，既然潔莉諾會長都親自來了，那是不是代表我們可以離開舊校舍了？"
10001030-127 = "不，這個嘛……"
10001030-128 = "很遺憾，我們現在沒有取消各位停學處分的權限。"
10001030-129 = "為，為什麼？"
10001030-130 = "潔莉諾會長現在因為政變而從學生會長的寶座下台，目前正在逃亡中。"
10001030-131 = "這都是瑪麗娜的錯！#n要是那傢伙沒有發動政變，咱就不會從事務局逃到這種髒兮兮的地方了！"
10001030-133 = "什麼……也就是說，現在的潔莉諾會長只是個沒有任何權力的小孩是吧？"
10001030-134 = "……白高興一場。"
10001030-135 = "唔唔！誰是小孩啊！"
10001030-136 = "雖然暫時失去了學生會長的權力，但咱仍是赤冬聯邦學園的書記長、環境美化部長、整潔部長……是肩負著許多職責的偉大潔莉諾大人！"
10001030-137 = "你沒看到這象徵權威的鬍子嗎！"
10001030-139 = "那種假鬍子，沒有人會認為是權威！"
10001030-141 = "什，什麼……？"
10001030-145 = "（竊竊私語）智，智惠。這傢伙怎麼知道這鬍子是假的？"
10001030-147 = "和香醬肯定是信口胡說的。不用在意唷。"
10001030-148 = "是，是嗎！什麼都不知道就別隨便說話，你這個色小鬼！"
10001030-149 = "明明只是個每到假日就爬到高處，邊用望遠鏡偷窺老師邊興奮地哈哈笑的變態！"
10001030-150 = "誰，誰是色小鬼啊！？"
10001030-151 = "說那種話的潔莉諾會長，在來到這間舊校舍之前，不也一直被老師揹著嗎！？"
10001030-152 = "令人好生羨慕……！"
10001030-153 = "潔莉諾會長更像是色小鬼吧！"
10001030-154 = "那，那只是基於咱和同志的羈絆而做出的行為罷了！會這樣想的你才是色小鬼！"
10001030-155 = "至少咱不是跟蹤狂！"
10001030-156 = "什麼跟蹤！那是學生對尊敬的老師做出的自然行為！"
10001030-157 = "明明只是個比我還矮的小毛頭！"
10001030-158 = "明明只是個比咱還小的小毛頭！"
10001030-159 = "[s]「是小學生吵架啊……」"
10001030-160 = "哎呀，兩位還真是要好呢。呵呵呵。"
10001030-161 = "但瑪麗娜委員長現在已經佔領了事務局，再吵下去也解決不了什麼問題。"
10001030-162 = "畢竟特別班的各位也想要離開舊校舍，能請你們助我們一臂之力嗎？"
10001030-163 = "但是，竟然得和這種囂張的小毛頭聯手……"
10001030-164 = "恕我拒絕！"
10001030-165 = "咱也一樣！我才不和這種色小鬼當同伴！"
10001030-166 = "看來兩位都沒有要退讓的意思……這下可傷腦筋了。"
10001030-171 = "如果想確認誰才是小毛頭，正好有個方法唷。"
10001030-172 = "時雨醬？"
10001030-173 = "自古以來，就有「真正的大人無論喝多少酒都不會醉」……這種說法吧？"
10001030-174 = "那就來場「飲酒比賽」，來決定誰是才是真正的大人，誰才是小毛頭吧！"
10001030-175 = "時雨醬，就算是舊校舍，學生喝酒也是違反赤冬聯邦學園校規的唷！"
10001030-176 = "當然，所以不是喝真的酒唷。"
10001030-177 = "而是我為了這次「伊凡．庫帕拉」而製作的特製康波特。"
10001030-178 = "只不過舊校舍幾乎沒有冷藏設備，所以可能有點發酵……"
10001030-179 = "總感覺剛剛好像聽到了些非常糟糕的事……"
10001030-180 = "怕的話可以不參加，潔莉諾會長。"
10001030-181 = "但這樣的話，免不了要背負膽小鬼的污名就是了。"
10001030-182 = "誰，誰是膽小鬼啊！那種果汁，來多少喝多少！"
10001030-183 = "我，我也一樣！我不會輸給潔莉諾會長的！"
10001030-184 = "那就決定了。終於，輪到去年秋天做的康波特出場了……！"
10001030-186 = "時雨立即拿來了一種看似用帶酸味的果實製成的飲料。"
10001030-193 = "那個……時雨醬。這真的不是酒吧？"
10001030-194 = "想，想起來了……！#n這傢伙是之前因為在配給用的康波特裡摻入伏特加，最後被停學處分的那個……"
10001030-195 = "好了好了，沒時間閒聊了。"
10001030-196 = "那就預備，"
10001030-197 = "……開始！"

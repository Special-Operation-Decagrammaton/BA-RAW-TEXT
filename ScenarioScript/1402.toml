[translation]
1402-1 = "GUNS N' PEPPERS 2"
1402-2 = "ห้องปฏิบัติการชมรมวิศวกรรม"
1402-3 = "เตรียมพร้อมแล้วใช่ไหม โคโทริ?"
1402-4 = "แน่นอนค่ะ รุ่นพี่! ฉันกำลังรออยู่เลยค่ะ!"
1402-5 = "เอาล่ะ... ถ้างั้นฉันจะเอาออกแล้วนะ"
1402-7 = "แต่นแต๊น! ในที่สุดก็เสร็จสมบูรณ์แล้ว! นี่คือสิ่งประดิษฐ์ชิ้นใหม่ของชมรมวิศวกรรมของเรา#nปืนกลประดิษฐ์พร้อมติดตั้งหัวฉีดซอสชาบัสโก้เผ็ดร้อน!"
1402-8 = "ตรงข้ามกับที่คิดไว้เลย รูปร่างของมันก็ไม่ต่างจากปืน SMG ทั่วไปเท่าไหร่เลยนี่#nมันทำงานได้ปกติใช่ไหม?"
1402-9 = "แน่นอนค่ะ รุ่นพี่! ความแตกต่างก็คือเราจะไม่ใช้กระสุนธรรมดา#nแต่จะใช้เป็นกระสุนพิเศษที่ทำมาจากพริกไทยผสมกับน้ำส้มสายชูค่ะ!"
1402-10 = "พอใส่กระสุนพิเศษและลั่นไกยิงออกไป ส่วนผสมของพริกก็จะถูกคลุกเคล้ากันอย่างรวดเร็ว#nด้วยดินปืนที่อัดแน่นอยู่ข้างใน..."
1402-11 = "ตู้ม!"
1402-12 = "ก็จะทำให้สามารถฉีดซอสชาบัสโก้ออกจากปากกระบอกปืนได้ค่ะ!"
1402-13 = "อยู่ไหนนะ... อยู่ไหน"
1402-16 = "หืม ซอสชาบัสโก้จริงๆ ด้วย? แถมรสชาติก็เหมือนที่ขายที่ร้านเลยด้วยนะ"
1402-17 = "เราได้ทำการทดลองหลายครั้งเพื่อให้ได้มาซึ่งรสชาติแสนอร่อยนี่ด้วยนะคะ!#nสุดยอดเทคนิคของโรงเรียนมิลเลเนียมได้ถูกรวมเอาไว้ที่ปืนกระบอกนี้แล้ว!"
1402-18 = "นอกจากนี้ ถ้ากดสวิตซ์ปรับเป็นโหมดอัตโนมัติเต็มพิกัดแล้วล่ะก็...#nจะสามารถยิงซอสชาบัสโก้ออกมาได้ 1 ลิตรต่อวินาทีเลยนะ"
1402-19 = "ปังๆๆๆ!"
1402-20 = "ฮุฮุ เพียงแค่มีปืนอันนี้ก็สามารถฉีดซอสชาบัสโก้ได้ตามใจชอบเลย ได้ทุกที่ทุกเวลาที่ต้องการด้วย!"
1402-21 = "ว้าว น่าตกใจจริงๆ เหนือความคาดหมายสุดๆ"
1402-22 = "ปืนอันนี้มัน... ที่จริงแล้ว..."
1402-23 = "ไม่เห็นมีประโยชน์เลย..."
1402-24 = "นะ... นั่นสินะ#nพกขวดซอสชาบัสโก้แบบใช้แล้วทิ้งดูจะสะดวกกว่าปืนอันนี้อีกนะคะ"
1402-25 = "อีกอย่างพอใช้ปืนเสร็จแล้วก็ทำความสะอาดยากมาก เพราะว่ามันจะมีซอสเลอะที่ตัวปืนอยู่#n\nเต็มไปหมด... อืม... อาจติดปัญหาเรื่องความสะอาดอยู่นิดหน่อย...."
1402-27 = "หึหึ... แต่ก็สนุกดี ไม่เป็นไรหรอก"
1402-28 = "การประดิษฐ์น่ะไม่ได้หมายความว่าเราจะสร้างผลลัพธ์ที่น่าพึงพอใจได้ตลอดเวลาหรอกนะ#nเราจะต้องรู้สึกสนุกไปกับมัน ไม่ว่าจะเป็นเรื่องอะไรก็ตาม#nจากนั้นผลลัพธ์ที่ยิ่งใหญ่ก็จะตามมาเองนั่นแหละ"
1402-29 = "ใช่แล้วค่ะ! จากการทดลองครั้งนี้ทำให้ฉันได้ลองทดสอบเทคนิคลับเรื่องการยิงซอสหลายๆ#nอย่างเลยค่ะ ซึ่งในอนาคตจะสามารถนำเทคนิคนี้ไปปรับใช้ได้กับหลายแขนงได้อีกด้วยค่ะ"
1402-30 = "มีคำกล่าวที่ว่า \"ความล้มเหลวเป็นบ่อเกิดของความสำเร็จ\" ยังไงล่ะ"
1402-33 = "ว่าแต่ว่า... ปืนที่เอามาดัดแปลงนี่ปืนของใครเหรอ?"
1402-34 = "คะ? นี่มันปืนของรุ่นพี่อุทาฮะไม่ใช่เหรอคะ?"
1402-35 = "ปืนที่ฉันใช้มันเล็กกว่าปืนอันนี้ตั้งเยอะ#nอีกอย่าง ปืนพกที่ฉันใช้น่ะ ไม่ใช่ปืนที่มีด้ามจับสักหน่อย นี่มันปืน SMG นี่นา?"
1402-36 = "แต่ว่านั่นก็ไม่ใช่ปืนของฉันด้วยนะคะ?"
1402-37 = "...ไม่ใช่ฉันเหมือนกันนะ"
1402-38 = "เดี๋ยวนะ ลายมังกรสีสันฉูดฉาดแบบนี้..."
1402-39 = "คนที่จะวาดลายเฉิ่มๆ แบบนี้ลงบนปืนได้ก็คงมีแต่..."
1402-42 = "อ่า... ซ่อมเสร็จซะทีนะ ใช้เวลาซ่อมนานไม่สมกับเป็นชมรมวิศวกรรมเลย"
1402-43 = "ระ...รุ่นพี่เนรุ....?#nรุ่นพี่มาทำอะไรที่นี่เหรอคะ?"
1402-44 = "เอ๋? มาทำไมงั้นเหรอ? ฉันก็มาเอาปืนที่ฝากให้ซ่อมไว้ยังไงล่ะ มีปัญหาอะไรรึไง?"
1402-45 = "นะ...นั่นสิคะ จริงสิ!#nเกือบลืมไปเลย! แหะๆ...."
1402-46 = "อะไรกัน ทั้งๆ ที่บอกว่าลืมซ่อมให้ แต่เธอก็ถือปืนของฉันอยู่ไม่ใช่รึไง#nคงซ่อมเสร็จแล้วใช่ไหม? ถ้างั้นฉันขอปืนกลับไปล่ะนะ"
1402-47 = "ดะ...เดี๋ยวสิคะ ปืนนี้ยังมีปัญหา...."
1402-48 = "อะไรนะ? ฉันให้เวลาตั้งนานแต่ยังซ่อมไม่เสร็จอีกงั้นเหรอ? ถ้างั้นที่เมื่อกี้บอกว่า \"เสร็จสมบูรณ์แล้ว\"#nมันหมายถึงอะไรล่ะ"
1402-49 = "หรือว่าพวกเธอ...ตอนที่ฝากปืนไปซ่อมคงไม่ได้เอาปืนฉันไปทำอะไรแผลงๆ หรอกใช่ไหม! หืม?!"
1402-50 = "ปะ...เปล่านะคะ....! ปืนไม่ได้มีปัญหาอะไรเลยค่ะ!"
1402-51 = "งั้นเหรอ? ถ้างั้นก็แล้วไป (รับปืนแล้วก็เดินกลับไป)"
1402-53 = "ค่ะ.... กะ... กลับดีๆ นะคะ"
1402-54 = "อ่อ ขอบใจมากนะ ฉันจะใช้แบบทะนุถนอมเลยล่ะ"
1402-56 = "ระ... ระ รุ่นพี่คะ! เอายังไงดีคะ? ตอนนี้รุ่นพี่เนรุเอาปืนที่เราดัดแปลงไปแล้วค่ะ!"
1402-57 = "ถ้าเธอรู้ว่าปืนของตัวเองกลายเป็นที่ฉีดซอสไปแล้วล่ะก็... พวกเราต้องไม่รอดแน่ๆ"
1402-58 = "พวกเราจบเห่แล้วล่ะ... อีกไม่นานรุ่นพี่เนรุที่โกรธหนักมากๆๆ#nจะต้องมาจับพวกเราทุ่มลงไปในถังซอสชาบัสโก้แน่ๆ เลย...!"
1402-59 = "ทุกคนใจเย็นก่อน เรื่องยังไม่แดงสักหน่อย"
1402-60 = "ถ้าเอาปืนกลับมาได้โดยเนรุไม่ทันสังเกตล่ะก็ ฉันมั่นใจว่าจะซ่อมมันให้กลับเป็นอย่างเดิมแน่นอน"
1402-61 = "ให้ไปแย่งปืนมาโดยไม่ให้รุ่นพี่เนรุรู้ตัวเหรอคะ? เหมือนให้หนูเอากระพรวนไปแขวนคอแมวเลยนะ!"
1402-62 = "ไม่ว่าจะด้วยวิธีไหน สุดท้ายก็ต้องตายอยู่ดี...\n"
1402-63 = "ถ้างั้นก่อนอื่น ฉันจะทำปืนปลอมขึ้นมาแทนปืนของเนรุ ระหว่างนั้นทั้งสองคนจะต้องระวัง#nไม่ให้เนรุใช้ปืนได้เป็นอันขาดเลยนะ"
1402-64 = "แต่ถ้าระหว่างนั้นรุ่นพี่เนรุรู้ว่าปืนตัวเองแปลกๆ ไปล่ะคะ จะทำยังไง?"
1402-65 = "ฉันไม่อยากจะคิดแบบนั้นนะแต่ว่า..."
1402-66 = "มาสวดภาวนาให้เธอไม่ลดละความพยายามกันเถอะ"

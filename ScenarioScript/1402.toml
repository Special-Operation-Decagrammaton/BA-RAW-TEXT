[translation]
1402-1 = "Guns N' Peppers Part 2"
1402-2 = "Engineering Department Workshop"
1402-3 = "Are you ready, Kotori?"
1402-4 = "Of course! I've been waiting for this moment!"
1402-5 = "Allow me to do the honors, then."
1402-7 = "Ta-da! It's finally complete. This is the Engineering Department's newest invention:#na submachine gun with a hot sauce dispenser!"
1402-8 = "It looks a lot more like an ordinary submachine gun than I was expecting. Does it work?"
1402-9 = "You bet it does! The difference is that you have to use special bullets mixed with pepper and vinegar instead of regular bullets."
1402-10 = "When you put a special bullet in the magazine and pull the trigger, gunpowder causes the red pepper to be fermented in an instant."
1402-11 = "*bang*"
1402-12 = "And the hot sauce will come out of the barrel like this!"
1402-13 = "Let's see here..."
1402-16 = "It really is genuine hot sauce! It's completely indistinguishable from the pizza place's sauce."
1402-17 = "We've conducted multiple experiments to recreate the taste. This gun is the pinnacle of Millennium's latest engineering!"
1402-18 = "Plus, if you change it to full auto mode, you can dispense two pints of hot sauce per second."
1402-19 = "*pop* *pop* *pop* *tat*"
1402-20 = "Heh. Now that we have this gun, we can spray as much hot sauce as we want anytime, anywhere! We'll never have to worry about spicing our pizza again!"
1402-21 = "Simply marvelous. It's exceeded my every expectation."
1402-22 = "This gun is just so...so..."
1402-23 = "...pointless."
1402-24 = "Th-That's true. It'd be much cheaper and more convenient to carry hot sauce packets instead of carrying this gun."
1402-25 = "Besides, the sauce gets all over the barrel when you use it, which is a pain to clean. So there's a hygiene issue too..."
1402-27 = "Ha. Still, it was entertaining to see it put to practice, so that's quite all right."
1402-28 = "Not every invention needs to satisfy practicality. If you can enjoy what you're making, then great achievements naturally follow."
1402-29 = "That's right! This experiment allowed me to put our liquid-dispensing capabilities to the test! That data is sure to come in handy in the future."
1402-30 = "They say that failure is the prelude to success."
1402-33 = "By the way... Whose gun did you modify?"
1402-34 = "Huh? I thought this was your gun, Utaha."
1402-35 = "No, this is much too large to be my gun. I use a burst pistol without a stock. This is a submachine gun."
1402-36 = "Well, it's not my gun."
1402-37 = "Not mine either."
1402-38 = "Wait. Look at this gaudy dragon pattern."
1402-39 = "The only person who would put this kind of stupid design on a gun is..."
1402-42 = "Finally done with the repair job, I see. You Engineering Department geeks usually don't take so long."
1402-43 = "N-Neru? Wh-What are you doing here?"
1402-44 = "Huh? What do you mean? I'm here to pick up my gun. You got a problem with that?"
1402-45 = "O-Oh, right! I-I forgot about that. Haha..."
1402-46 = "Huh? But it's sitting right there. How could you forget? Well, whatever. I'll be taking it back if you're done."
1402-47 = "H-Hold on. There's still one little problem with this gun..."
1402-48 = "What the...? How's it still not done after all this time? I could hear you say something is \"finally complete\" before I walked in."
1402-49 = "...Don't tell me you guys messed with my gun! What did you do?!"
1402-50 = "N-Nothing...! There's nothing wrong with your gun!"
1402-51 = "Yeah? Fine. I'll be taking it back, then."
1402-53 = "O-Okay. T-Take care..."
1402-54 = "Whatever. Thanks, I guess."
1402-56 = "What do we do, Utaha?! Neru's gun was...!"
1402-57 = "She's sure to be saucy when she finds out her gun is nothing but a sauce dispenser now."
1402-58 = "We're toast. It won't be long before Neru comes charging in here in a rage and throws us into a barrel of hot sauce!"
1402-59 = "All of you calm down. She still doesn't know."
1402-60 = "If we can get Neru's gun back, we can fix it without her ever realizing it was modified."
1402-61 = "Take Neru's gun without getting caught? That's like walking into the lion's den!"
1402-62 = "We're dead no matter what we do."
1402-63 = "Nonsense. First, I'll make a decoy that we can swap for Neru's gun. In the meantime, you two need to make sure Neru doesn't touch the trigger."
1402-64 = "But...what if Neru finds out that there's something wrong with her gun before then?"
1402-65 = "I'd rather not think about that possibility."
1402-66 = "Let's just pray that she stays patient."

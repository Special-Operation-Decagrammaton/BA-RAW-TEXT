[translation]
1402-1 = "#title;GUNS N' PEPPERS 2"
1402-2 = "#place;엔지니어부 동아리 작업실"
1402-3 = "1;우타하;05;준비는 다 되었겠지, 코토리?\n#1;em;[반응]\n#1;a"
1402-4 = "5;코토리;02;물론이죠, 선배! 기다리고 있었습니다!\n#5;greeting\n#5;em;[반짝]\n#5;a"
1402-5 = "3;히비키;05;자…… 그럼 꺼낼게.\n#3;a"
1402-6 = "1;우타하;05\n5;코토리;02\n3;히비키;05\n#1;d\n#3;d\n#5;d\n#wait;2000"
1402-7 = "#1;hide\n#5;hide\n3;코토리;03;짜잔! 드디어 완성했습니다! #n이것이 저희 엔지니어부의 새로운 발명품, 차바스코 소스 분사장치가 달린 기관단총입니다!\n#3;em;[반짝]\n#3;hophop\n#3;a"
1402-8 = "3;우타하;02;생각했던 것과는 달리 모양 자체는 평범한 기관단총과 크게 다르지 않네. #n제대로 작동하는 거 맞겠지?\n#3;em;[?]"
1402-9 = "3;코토리;02;물론이죠, 선배! 대신 일반 탄환 말고 고추와 식초가 섞인 특제 탄환을 써야 한다는 점이 다르지만요!\n#3;greeting"
1402-10 = "5;히비키;02;탄창에 특제 탄환을 재고 방아쇠를 당기면, 화약에 의해 고추의 성분이 순식간에 발효되면서……\n#5;al\n#3;m1"
1402-11 = "#all;hide\n#na;탕!\n#fontsize;100"
1402-12 = "3;코토리;02;이렇게 총구에서 차바스코 소스가 뿜어져 나오게 됩니다!\n#3;em;[반짝]\n#3;a"
1402-13 = "1;우타하;02;어디, 어디…….\n#1;ar"
1402-14 = "1;우타하;01\n#1;m2\n#3;m4\n#wait;1000"
1402-15 = "1;우타하;01\n#1;shake\n#1;em;[?!]\n#wait;1500"
1402-16 = "1;우타하;03;헤에, 진짜 차바스코 소스잖아? 게다가 가게에서 파는 것과 똑같은 맛이야.\n#1;m1"
1402-17 = "3;코토리;02;이 맛을 재현해내기 위해 실험에 실험을 거듭했으니까요. #n밀레니엄 기술의 정수를 이 총에 모두 담아냈답니다!\n#3;em;[반짝]\n#3;greeting"
1402-18 = "#3;m3\n5;히비키;02;게다가 조정간을 풀 오토 모드로 바꾸면, 초당 1L의 차바스코 소스를 분사할 수 있어…….\n#5;al"
1402-19 = "#all;hide\n#na;타다다다당!\n#bgshake\n#fontsize;80"
1402-20 = "3;코토리;03;후후. 이제 이 총만 있으면 언제 어디서든 피자를 먹더라도 걱정 없이 마음껏 차바스코 소스를 뿌릴 수 있어요!\n#3;em;[음표] \n#3;a"
1402-21 = "3;우타하;07;우와, 정말 놀라운데. 생각했던 것 이상이야.\n#3;stiff"
1402-22 = "3;우타하;99;이 총은 정말로, 정말로……\n#3;em;…"
1402-23 = "3;우타하;05;……쓸모가 하나도 없어.\n#3;em;[반응]"
1402-24 = "3;우타하;05\n5;코토리;04;……그, 그렇긴 하죠. #n이 총을 들고 다닐 바에야 1회용 차바스코 패킷을 들고 다니는 게 훨씬 편리하고 저렴하니까요.\n#5;em;[땀]\n#5;a"
1402-25 = "1;히비키;06;게다가 사용하고 나면 총구에 소스가 잔뜩 묻기 때문에 청소하기도 어려워서…… #n위생적으로도 문제가 있어…….\n#1;a"
1402-26 = "5;코토리;04\n1;히비키;06\n3;우타하;99\n#3;em;…\n#wait;2500\n#1;d\n#5;d"
1402-27 = "3;우타하;03;후후. 그래도 재미있었으니까 괜찮아.\n#3;em;[재잘]"
1402-28 = "#1;hide\n#5;hide\n3;우타하;03;발명이라는 게 언제나 만족스러운 성과를 낼 수 있는 건 아니니까. 무엇이든지 즐길 줄 알아야 위대한 성과도 자연스레 뒤따르는 법이지.\n#3;closeup\n#3;em;[반짝]"
1402-29 = "3;코토리;02;맞아요! 이번 실험을 진행하면서 액체 분사 장치에 대한 노하우를 여러모로 시험해 볼 수 있었거든요. 이 기술은 앞으로도 여러 분야에 써먹을 수 있을거예요.\n#3;em;[반짝]\n#3;greeting"
1402-30 = "3;히비키;02;실패는 성공의 어머니라고 하니까……."
1402-31 = "3;히비키;02\n#3;d\n#wait;1000"
1402-32 = "#all;hide"
1402-33 = "1;우타하;02;그나저나…… 개조에 쓰인 이 총은 누구 총이야?\n#1;em;[반응]\n#1;a"
1402-34 = "5;코토리;05;네? 이 총, 우타하 선배의 물건 아니었나요?\n#5;em;[?]\n#5;a"
1402-35 = "1;우타하;01;내가 쓰는 총은 이것보다 훨씬 작은 걸. #n게다가 내가 쓰는 총은 엄밀히 말하자면 개머리판이 없는 연사권총이라고. 이건 기관단총이잖아?"
1402-36 = "5;코토리;01;하지만 제 총도 아닌데요?"
1402-37 = "3;히비키;06;……나도 아니야.\n#3;a"
1402-38 = "1;우타하;04;잠깐. 이 쓸데없이 화려한 용무늬는…….\n#1;stiff"
1402-39 = "5;코토리;04;이런 바보 같은 문양을 총에 새겨 넣을 만한 사람은 분명히…….\n#5;em;[땀]"
1402-40 = "#all;hide\n#wait;1500"
1402-41 = "#wait;2000"
1402-42 = "5;네루;03;아아— 드디어 수리가 끝났나. #n엔지니어부 답지 않게 이번에는 꽤나 오래 걸렸네.\n#5;al"
1402-43 = "1;코토리;04;네, 네루 선배……? #n여, 여기에는 어째서 오신건가요?\n#1;em;[?!]\n#1;a\n#1;shake"
1402-44 = "5;네루;02;아앙? 어째서 왔냐니. 전에 수리를 맡긴 내 총을 찾으러 왔는데. #n무슨 문제라도 있냐?\n#5;em;[?]"
1402-45 = "1;코토리;03;그, 그, 그랬었죠. 참! #n까, 깜박하고 있었어요. 하하…….\n#1;em;[땀]"
1402-46 = "5;네루;01;뭐야. 깜빡했다면서 이미 내 총을 꺼내 놓고 있었잖아. #n수리는 다 끝난 거겠지? 그럼 가져간다—\n#5;m4"
1402-47 = "1;코토리;04;자, 잠시만요. 이 총에는 아직 문제가…….\n#1;m2\n#1;em;[반응]\n#1;hophop"
1402-48 = "5;네루;02;뭐? 그렇게 시간을 줬는데 아직도 수리가 끝나지 않았단 말이야? #n그럼 아까 \"완성했다\"는 말은 뭐였는데?"
1402-49 = "5;네루;05;……설마 네 녀석들, 내 총의 수리를 맡아 놓고 딴짓을 한 건 아니겠지! 아앙?!\n#5;em;[?!]"
1402-50 = "1;코토리;04;아, 아뇨……! 총에는 아무 문제도 없어요!\n#1;shake"
1402-51 = "5;네루;01;그래? 그럼 문제 없네. #n총은 다시 받아간다."
1402-52 = "5;네루;01\n#5;greeting\n#wait;1500"
1402-53 = "1;코토리;04;네, 넵……. 조, 조심히 들어가세요…….\n#1;stiff"
1402-54 = "5;네루;03;아아. 수고했어. 잘 쓰도록 하지.\n#5;em;[음표]"
1402-55 = "5;네루;01\n#5;dr\n#wait;2000"
1402-56 = "#5;hide\n1;코토리;04;서, 서, 선배! 어쩌죠? #n네루 선배가 개조된 총을 그대로 가져가고 말았어요!\n#1;hophop\n#1;m3"
1402-57 = "#1;hide\n3;히비키;08;자신의 총이 소스 디스펜서가 되었다는 사실을 깨닫는다면 우리를 가만두지 않을텐데…….\n#3;stiff\n#3;em;[속상함]"
1402-58 = "3;코토리;04;저흰 끝났어요……. 곧 분노한 네루 선배가 달려와 저희를 차바스코 소스에 통째로 담궈 버릴거라구요……!\n#3;jump"
1402-59 = "3;우타하;99;다들 진정해. 아직 완전히 들킨 건 아니니까."
1402-60 = "3;우타하;05;네루 몰래 총을 되찾아 수리할 수 있다면, 분명 들키지 않고 넘어갈 수 있을 거야.\n#3;em;[반응]"
1402-61 = "5;코토리;04;들키지 않고 네루 선배의 손에서 총을 빼앗으라고요? 차라리 성난 사자의 목에 방울을 달고 말지!\n#5;al\n#3;m1\n#5;hophop"
1402-62 = "5;히비키;08;이러나 저러나 결국 죽는 건 기정사실인가…….\n#5;em;[속상함]"
1402-63 = "#3;hide\n1;우타하;05;우선은 내가 네루의 총을 대체할 더미를 만들고 있을 테니, 그동안 두 사람은 네루가 방아쇠에 손을 대지 못하도록 주의를 끌어줘."
1402-64 = "5;코토리;04;하지만…… 그 사이에 네루 선배가 자신의 총에 이상이 있다는 걸 먼저 알아차리면 어쩌죠?\n#5;em;[땀]"
1402-65 = "1;우타하;99;그 경우는 생각하고 싶지도 않지만……"
1402-66 = "1;우타하;05;부디 그녀의 인내심이 끊어지지 않기를 간절히 기원하도록 하자.\n#1;m3\n#5;dr"

[translation]
1402-1 = "GUNS N' PEPPERS（２）"
1402-2 = "工程師部．作業室"
1402-3 = "準備好了嗎，亞都梨？"
1402-4 = "那當然囉，前輩！準備萬全！"
1402-5 = "那麼……要揭曉了。"
1402-7 = "鏘～！終於完成了！#n這就是我們工程師部的新發明，附帶查巴斯科辣椒醬噴射裝置的衝鋒槍！"
1402-8 = "外型比想像中更像普通的衝鋒槍呢。#n不過，它能正常運作嗎？"
1402-9 = "當然了，前輩！#n雖然需要用辣椒和醋調合而成的特製子彈來代替一般的彈藥就是了！"
1402-10 = "只要將特殊彈裝進彈夾扣下扳機，就會因為火藥的爆炸使辣椒的成分迅速發酵……"
1402-11 = "（碰咻！！）"
1402-12 = "像這樣從槍口噴射出查巴斯科辣椒醬！"
1402-13 = "我看看……"
1402-16 = "……沒錯，這確實是查巴斯科辣椒醬。#n而且味道和店裡賣的一樣呢？"
1402-17 = "因為我為了重現這個味道，反覆進行了多次的實驗！#n千年技術的真髓，全都集結在這把槍裡！"
1402-18 = "不僅如此，變更為全自動模式的話，就可以在1秒內噴射出1L的查巴斯科辣椒醬……"
1402-19 = "（噠噠噠噠噠噠！）"
1402-20 = "呵呵！只要有這把槍，以後不管在哪裡吃披薩都可以盡情地加查巴斯科辣椒醬了！"
1402-21 = "原來如此，這還真是驚人，遠超我的想像呢。"
1402-22 = "這把槍真的是，完美的……"
1402-23 = "……一點用也沒有呢？"
1402-24 = "那倒是，沒說錯呢……#n畢竟與其隨身攜帶著這把槍，不如帶著分裝好的查巴斯科辣椒醬更加輕鬆實惠。"
1402-25 = "而且槍口在使用過後會因為查巴斯科辣椒醬變得黏黏的，打掃起來很麻煩……#n衛生方面也會有問題……"
1402-27 = "呵呵……算了，反正有趣就行了。"
1402-28 = "畢竟發明這種事，不是每次都能得到滿意的成果。無論什麼事，只要能享受其過程，總有一天自然會獲得偉大的成果。"
1402-29 = "說的沒錯！藉由這次的實驗，我也獲得了一些液體噴射裝置的相關知識。#n我想今後應該能運用在各種地方。"
1402-30 = "俗話也說失敗為成功之母……"
1402-33 = "……話說回來，用來改造的這把槍是誰的？"
1402-34 = "咦？這把槍不是詠葉前輩的東西嗎？"
1402-35 = "我的比這個還要小很多唷。而且它嚴格來說是沒有槍托的連發手槍。#n但這把是衝鋒槍吧？"
1402-36 = "不過這把槍也不是我的唷？"
1402-37 = "……也不是我的。"
1402-38 = "……等等。#n這道過於華麗的龍紋……"
1402-39 = "說到會在槍上面刻上這種紋樣的人……"
1402-42 = "啊啊，終於修理完了嗎？#n以工程師部來說罕見地花了很多時間啊。"
1402-43 = "寧，寧瑠前輩……！#n為，為什麼會來這裡？"
1402-44 = "啊啊？問我為什麼，我來拿之前送來修理的槍啊。#n有什麼問題嗎？"
1402-45 = "是，是，是嗎……是嗎！？#n不，不小心忘記了。啊哈哈……"
1402-46 = "嗯，什麼嘛，嘴巴上雖然說忘記了，你這不是已經把我的槍拿出來在等我了嗎？#n修理完了吧？那我就拿走囉。"
1402-47 = "請，請等一下！這把槍還有點問題……！"
1402-48 = "哈啊？過了那麼久還沒修理完嗎？#n那剛才遠遠就聽到的「完成了」是指什麼啊？"
1402-49 = "……你們該不會明明已經同意要修理我的槍，卻還跑去做別的事了吧！啊啊！？"
1402-50 = "沒，沒有，不是那樣的……！"
1402-51 = "是嗎，那就沒問題了吧。#n那我就拿走囉。"
1402-53 = "好，好的……請，請小心～……"
1402-54 = "啊啊，辛苦啦。#n再讓我好好的操一番吧～"
1402-56 = "前，前前前前前輩！怎麼辦！？#n寧瑠前輩他，拿著改造後的槍就那樣走掉了！？"
1402-57 = "要是知道自己的槍變成了「CHABASCO．DISPENSER」的話，#n我們肯定會吃不完兜著走的……"
1402-58 = "已經完蛋了……#n暴怒的寧瑠前輩隨時都有可能回來，把我們變得全身都是查巴斯科辣椒醬……！"
1402-59 = "你們兩個都先冷靜點，現在還沒有曝露。"
1402-60 = "只要在寧瑠察覺之前把槍拿回來修理好，事情就能安穩解決了。"
1402-61 = "要在不被寧瑠前輩發現的情況下把槍搶過來嗎！？怎麼可能！？#n跟那種事比起來，把鈴鐺別在憤怒獅子脖子上的任務都還更可行一點！"
1402-62 = "那就是終究會走向死亡的既定路線，沒錯吧……"
1402-63 = "首先，由我來製作用來替換寧瑠的槍的贗品。#n在那之前，希望你們可以吸引寧瑠的注意力，別讓他觸碰到扳機。"
1402-64 = "可是……要是在完成之前，寧瑠前輩發現自己的槍有異常的話怎麼辦？"
1402-65 = "那種事，我並不想去想像……"
1402-66 = "就祈求他的耐心不會耗光吧。"

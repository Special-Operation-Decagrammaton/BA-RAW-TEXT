[translation]
10042005-1 = "#title;프롤로그;누군가의 휴일, 누군가의 아르바이트"
10042005-2 = "#place;게헨나 중앙교정"
10042005-3 = "3;후우카 사복;17;…….\n#3;a\n#3;em;…"
10042005-4 = "3;후우카 사복;08;휴일이다!!!!!\n#3;closeup\n#fontsize;80"
10042005-5 = "3;후우카 사복;08;세상에, 정말로? 믿을 수 없어! 급양부의 휴일이라니!\n#3;m4\n#3;hophop"
10042005-6 = "3;후우카 사복;08;어떡하지? 이거 정말 현실일까? 내가 무슨 꿈 같은 걸 꾸고 있는 건 아닐까?\n#3;m2\n#3;hophop"
10042005-7 = "3;후우카 사복;05;여, 여기에서는 엄청나게 고전적인 방법이지만, 머리를 주먹으로……!\n#3;jump\n#3;m3"
10042005-8 = "#st;[0,0];instant;1;"
10042005-9 = "#clearST"
10042005-10 = "3;후우카 사복;05\n#3;greeting\n#wait;1000"
10042005-11 = "3;후우카 사복;04;아야야……. 아프네. 그러면 정말 현실이라는 뜻이고…… 진짜?!\n#3;em;[땀]\n#3;stiff\n#3;closeup"

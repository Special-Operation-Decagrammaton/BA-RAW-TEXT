[translation]
10042005-1 = "序幕;某人的假日，某人的打工日"
10042005-2 = "格黑娜．校園"
10042005-3 = "……"
10042005-4 = "放假了！！！！！"
10042005-5 = "天啊，真不敢相信！供給部居然能夠放假！"
10042005-6 = "怎麼辦？這真的是現實嗎？#n我該不會是在做夢吧？"
10042005-7 = "雖，雖然這樣很老套，不過還是用拳頭敲敲頭來確認一下吧……！"
10042005-11 = "哎呀呀……好痛。#n不過會痛就代表……這真的是現實嗎！？"
10042005-15 = "老師！你有聽見嗎？#n我，真的能放假了！"
10042005-16 = "剛好我昨天才用MomoTalk，向老師請教過這個問題。"
10042005-17 = "再拿MomoTalk出來看一下吧……"
10042005-18 = "「恭喜供給部放假！也幫我跟茱莉說一聲吧！」"
10042005-19 = "「今天一整天，不如就盡情享受跟料理無關的事吧？」"
10042005-20 = "「只要用心去找就會發現，這個世界上隱藏著各種精彩又有趣的事哦！」"
10042005-21 = "耶嘿嘿……老師真的好溫柔……"
10042005-22 = "不過該做什麼才好呢……？#n一直以來，我幾乎都只想著料理……"
10042005-23 = "……"
10042005-24 = "嗯！總之先出去到處走走吧！"
10042005-25 = "想去哪就去哪，走到哪玩到哪，到有趣的地方去！"
10042005-26 = "嗯？前輩好！"
10042005-27 = "茱莉！你知道嗎？老師傳訊息祝我們供給部放假快樂耶！"
10042005-28 = "真的嗎？#n哇！真讓人開心！"
10042005-29 = "話說你的那副打扮是……？#n當然很可愛很適合你沒錯……"
10042005-30 = "這個嗎？其實我今天要去附近的鬆餅咖啡廳當服務生。"
10042005-31 = "難得的假日……要去打工嗎？"
10042005-32 = "我自己是覺得……茱莉是不是也好好休息一下比較好？"
10042005-33 = "沒關係的，前輩。這是我自己決定要做的事。#n況且如果能以服務生的身分為客人上菜……"
10042005-34 = "雖然只是沾個邊，但應該多少會有親自料理款待客人的感覺吧！"
10042005-35 = "我真的很想嘗試看看！"
10042005-36 = "茱莉……"
10042005-37 = "這樣啊，那就祝你順利囉。"
10042005-38 = "前輩今天打算怎麼度過呢？"
10042005-39 = "老實說，因為我們幾乎沒有放過假的關係，我其實也沒什麼想法。#n不過……"
10042005-40 = "反正先出去看看就對了！"
10042005-41 = "不管是購物中心、運動場、展覽館、KTV、遊戲中心，或者是傳統市場……"
10042005-42 = "當，當然可能沒辦法全部都去……"
10042005-43 = "但我還是打算盡可能多體驗各種事情！"
10042005-44 = "……"
10042005-49 = "（前輩他，一直以來確實都沒有好好休假過呢……）"
10042005-54 = "我也會為前輩的一天加油的！#n希望前輩能度過最精彩的一天，不留任何遺憾。"
10042005-55 = "嗯，茱莉打工也加油。#n不過別拚過頭了哦，希望茱莉能好好享受打工。"
10042005-56 = "是，前輩！路上小心！"
10042005-57 = "謝謝，那我走囉！"
10042005-61 = "我也差不多該去咖啡廳了。#n今天……絕對不能麻煩前輩幫忙。"
10042005-62 = "不管發生什麼事，都要靠我自己的力量解決！#n一定要讓前輩能好好休息！"
10042005-64 = "格黑娜近郊．鬆餅咖啡廳"
10042005-66 = "你好，我要一份鮮奶油草莓糖漿鬆餅……再加一份奶油！"
10042005-67 = "鮮奶油草莓糖漿鬆餅加奶油，沒問題。"
10042005-68 = "我要巧克力鬆餅加咖啡鮮奶油。"
10042005-69 = "巧克力鬆餅，奶油要咖啡奶油……請問有需要飲料嗎？"
10042005-70 = "飲料啊……有需要點嗎？喝水就可以了吧？"
10042005-71 = "雖然是這樣沒錯……但會不會少了點什麼？"
10042005-72 = "（好，這種時候就用受訓時學過的話術……）"
10042005-73 = "兩位客人點的鬆餅都非常香甜可口，濃郁的甜味可能讓味覺變得遲鈍……"
10042005-74 = "所以建議搭配紅茶或咖啡來平衡一下，兩位覺得如何呢？"
10042005-75 = "嗯……那就點吧？"
10042005-76 = "畢竟加了鮮奶油跟糖漿……想想也有道理。"
10042005-77 = "那就來杯紅茶。"
10042005-78 = "我要冰咖啡。"
10042005-79 = "好的，幫兩位加點紅茶和冰咖啡。#n另外我們店裡也有販售百匯，要不要試試看呢？"
10042005-80 = "百匯，百匯……"
10042005-81 = "相信兩位絕對不會失望的！"
10042005-82 = "哎，不管了，再加兩份百匯！"
10042005-83 = "謝謝！麻煩兩位稍等！"
10042005-86 = "啊，茱莉同學。#n謝謝你，你真的做得很好。"
10042005-87 = "真的嗎？#n謝謝，耶嘿嘿……"
10042005-88 = "當然是真的！#n我都想拜託茱莉成為我們的正職員工，繼續在這裡工作了呢！"
10042005-89 = "謝，謝謝您的好意，不過我還有供給部的工作要忙……"
10042005-90 = "說的也是，茱莉同學是供給部的對吧？#n真不愧是格黑娜的供給部，果然名不虛傳。"
10042005-91 = "是，是嗎……？"
10042005-92 = "當然囉！#n光是每天都能準時提供那麼大量的餐點就已經很了不起了，每個人都還那麼認真……"
10042005-93 = "原來大家是這麼看待供給部的，真是太好了！"
10042005-94 = "不過雖然我完全不信，但確實有聽說偶爾會出現用不明食物做成的生命體……#n那肯定是謠言對吧？"
10042005-95 = "咦，咦！？#n那，那那那那，那當然囉！"
10042005-96 = "總之下午也麻煩你了，茱莉同學。#n多虧有你的幫忙，營業額也成長了不少。"
10042005-97 = "要是能繼續保持下去的話，要給你時薪以外的獎金也沒問題──"
10042005-102 = "！？"
10042005-103 = "！？"
10042005-104 = "發，發生什麼事了！？"
10042005-105 = "好像是咖啡廳的倉庫那邊……！"
10042005-107 = "咖啡廳．倉庫"
10042005-108 = "發，發生什麼事了！？快醒醒！"
10042005-109 = "唔唔……"
10042005-110 = "我把倉庫裡的白色火藥袋……誤認成裝麵粉的袋子……"
10042005-111 = "呃啊。"
10042005-112 = "昏過去了！"
10042005-116 = "這，這下糟了……！"
10042005-117 = "不過倉庫裡為什麼會有白色火藥袋呢！？"
10042005-118 = "嗯？怎麼了嗎？#n我只是隨手放在那裡的說。"
10042005-119 = "白色火藥袋……居然是一個路人隨手放的？這像話嗎？"
10042005-120 = "呃……不行嗎？"
10042005-121 = "當然不行！！"
10042005-122 = "哈哈，抱歉抱歉～"
10042005-123 = "唉，真受不了……要是所有人都能向茱莉同學多多學習就好了。"
10042005-124 = "您，您過獎了……"
10042005-128 = "（不過店裡的廚師昏倒了，接下來該怎麼辦……？）"
10042005-130 = "我點的鬆餅什麼時候才會好？為什麼這麼久啊？"
10042005-131 = "鬆餅要等倒還情有可原……#n可是我只點了一杯葡萄柚汽水而已耶？有需要等這麼久嗎？"
10042005-132 = "雖然這裡的鬆餅總是烤得外酥內軟，浸在糖漿裡吃簡直無敵……"
10042005-133 = "但也不能因為這樣就不用心經營吧？#n服務品質也太糟了……"
10042005-136 = "店，店長？怎麼辦！？客人們開始抱怨了……！"
10042005-137 = "就，就是說啊。該怎麼辦才好……"
10042005-138 = "拜託你了，茱莉同學。#n我可以幫你加薪，或者盡量在能力範圍內滿足你的要求……"
10042005-139 = "請你幫忙做鬆餅吧！"
10042005-140 = "什麼！？"
10042005-141 = "（要我……做鬆餅！？）"
10042005-142 = "不，不行！我做不到……"
10042005-143 = "我現在還沒辦法做料理！"
10042005-144 = "這是怎麼回事？茱莉同學不是供給部的嗎？#n應該每天都在社團裡跟料理打交道才對呀？"
10042005-145 = "……！"
10042005-146 = "這，這……雖然是這樣沒錯……"
10042005-147 = "鬆餅製作起來相對簡單。#n現在麵糊都已經調好，只要烘烤時注意一下，任何人都可以做出成功的鬆餅。"
10042005-148 = "只要注意火別開太大就好。#n烤好之後再加上配料就完成了！"
10042005-149 = "這些我也清楚，可是……"
10042005-150 = "問題……恐怕並不出在那裡……"
10042005-151 = "是，是嗎？#n那也沒辦法了……"
10042005-155 = "啊，對了！供給部！#n我記得供給部部長的名字是……「愛清風華」同學對吧？"
10042005-157 = "！？！？"
10042005-158 = "沒錯，仔細想想還有這個辦法！#n茱莉同學應徵打工的時候，有說過今天供給部放假……"
10042005-159 = "那麼風華同學今天一定也有空吧！"
10042005-160 = "只要他願意在今天剩下的時間幫忙，就給他兩倍……不，三倍的時薪……！"
10042005-161 = "！！！！！"
10042005-162 = "（要找前輩來這裡？）"
10042005-164 = "（前輩剛剛看起來那麼開心……）"
10042005-165 = "（不行。不能打擾前輩放假）"
10042005-166 = "（我不能讓其他人破壞前輩難得的假日。#n　前輩他……每天都為了供給部那麼努力……）"
10042005-168 = "（絕對不行！無論發生什麼事，我都要靠自己的力量解決！）"
10042005-169 = "我看看，風華同學的電話號碼是……"
10042005-170 = "店長！我來做吧！"
10042005-171 = "咦……？"
10042005-173 = "茱莉同學願意的話我當然很感激，不過……"
10042005-174 = "你剛才不是還堅持說不行嗎？"
10042005-175 = "那，那個……我改變心意了！"
10042005-176 = "今天是風華前輩很重要的日子，所以不能打擾他！#n就，就讓我來試試看吧！"
10042005-177 = "只要全心全意地努力，說不定就連我也可以……！"
10042005-178 = "你有這種心態當然很好……不過做鬆餅好像也沒必要拚成這樣……？"
10042005-179 = "總之謝謝你願意幫忙。#n拜託你了，茱莉同學。"
10042005-181 = "咖啡廳．廚房"
10042005-182 = "呼，哈，呼，哈……"
10042005-188 = "（還是有點可怕……）"
10042005-189 = "（如果只是練習的話，就算搞砸也沒關係。我只要自己承擔責任就好）"
10042005-190 = "（可是現在不一樣。我做的鬆餅，可是要端給客人吃的）"
10042005-191 = "（雖然我心裡一直都希望有一天，能看到人們開心地享用著我做的料理……！）"
10042005-192 = "鬆餅～還沒好嗎～？"
10042005-196 = "材料都準備好了……"
10042005-197 = "……"
10042005-198 = "……我果然還是沒有信心。#n不過……今天絕對不能讓前輩受到打擾。"
10042005-203 = "（拜託了）"
10042005-204 = "（不管是誰，無論是什麼都好）"
10042005-205 = "（……請助我一臂之力，保佑一切平安無事）"
10042005-206 = "（就算只有這一次也好，之後要發生什麼事都沒關係）"
10042005-207 = "（請讓我……守護前輩的假日吧！）"
10042005-208 = "牛，牛牧茱莉！"
10042005-209 = "要，要要要要，要上了！！！"
10042005-214 = "咦……？"
10042005-215 = "怎麼好像，真的做出了看起來還不錯的東西……？"

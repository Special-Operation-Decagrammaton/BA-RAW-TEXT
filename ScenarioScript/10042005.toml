10042005-13 = "#clearST"
10042005-14 = "3;후우카 사복;09\n#3;em;…\n#3;closeup\n#wait;2500"
10042005-15 = "3;후우카 사복;99;선생님! 어딘가에서 듣고 계세요? 저, 휴일 받았어요!\n#3;em;[반짝]\n#3;closeup"
10042005-16 = "3;후우카 사복;05;마침 어제 이 문제로 선생님께 모모톡으로 상담을 드렸으니까."
10042005-17 = "3;후우카 사복;03;다시 모모톡을 꺼내 볼까…….\n#3;em;[음표]"
10042005-18 = "3;후우카 사복;02;<급양부의 휴일이라니, 축하해! 주리에게도 그렇게 전해줘!> \n#3;greeting"
10042005-19 = "3;후우카 사복;01;<오늘 하루만이라도 요리와 관계없는 일을 즐겨 보는 것은 어떨까?>\n#3;greeting"
10042005-20 = "3;후우카 사복;03;<세상에는, 찾아보면, 정말 멋지고 신나는 일들이 많이 숨어 있을 테니까!>\n#3;greeting"
10042005-21 = "3;후우카 사복;12;에헤헤……. 역시 선생님은 상냥하셔…….\n#3;em;[하트]"
10042005-22 = "3;후우카 사복;09;그렇지만 정작 뭘 하면 좋지……? 지금까지 요리 말고는 거의 생각해 본 적이 없었는데……."
10042005-23 = "3;후우카 사복;09;…….\n#3;em;…"
10042005-24 = "3;후우카 사복;12;응! 일단 무조건 어디든 나가서 찾아보기로 하자!"
10042005-25 = "3;후우카 사복;03;걸음 가는 대로, 생각 가는 대로, 뭔가 재미있어 보이는 곳으로!\n#3;em;[반짝]"
10042005-26 = "1;주리 아르바이트;12;어? 선배! 안녕하세요!\n#1;ar\n#3;m5\n#1;em;[반응]"
10042005-27 = "3;후우카 사복;01;주리! 그거 알아? 선생님이 급양부 휴일 축하해 주셨어!\n#3;em;[재잘]"
10042005-28 = "1;주리 아르바이트;03;정말요? 와! 뭔가 정말로 기쁘네요!"
10042005-29 = "3;후우카 사복;09;그런데 그 복장은 어떻게 된 거야? 물론 잘 어울리고, 정말 귀여운데…….\n#3;em;[?]"
10042005-30 = "1;주리 아르바이트;12;이거요? 사실은 오늘 일일 아르바이트로, 근처 팬케이크 카페에서 웨이트리스를 하기로 했거든요."
10042005-31 = "3;후우카 사복;18;아르바이트? 모처럼 맞는 휴일인데……?\n#3;em;[땀]"
10042005-32 = "3;후우카 사복;09;주리도 쉬어야 하지 않을까? 나는 그렇게 생각하는데……."
10042005-33 = "1;주리 아르바이트;99;괜찮아요, 선배. 제가 하기로 했던 일이고, 무엇보다 웨이트리스 아르바이트를 하며 음식을 서빙해 주는 것도…….\n#1;m3\n#3;dr"
10042005-34 = "1;주리 아르바이트;03;약간이지만 제가 요리를 해서, 누군가에게 대접해 주는 것 같은 느낌이 들거든요!\n#1;closeup"
10042005-35 = "1;주리 아르바이트;11;오히려 정말로 해 보고 싶어요!\n#1;em;[음표]"
10042005-36 = "5;후우카 사복;14;주리…….\n#1;m1\n#5;em;…\n#5;al"
10042005-37 = "5;후우카 사복;99;그래. 그렇구나. 그러면 내가 뭐라고 할 수는 없겠네.\n#5;greeting"
10042005-38 = "1;주리 아르바이트;02;선배는 오늘 어떻게 보내실 생각이세요?\n#1;em;[?]"
10042005-39 = "5;후우카 사복;14;사실 잘 모르겠어. 이런 날이 우리에게 거의 없었잖아? 그렇지만, 그래도……."

[translation]
10042005-1 = "บทเริ่มต้น;วันหยุดของฉัน วันทำงานของเธอ"
10042005-2 = "สวนกลางเกเฮนน่า"
10042005-3 = "..."
10042005-4 = "ได้วันหยุดเหรอ!!!!!"
10042005-5 = "จริงหรือเค้กเนี่ย? ไม่อยากจะเชื่อเลย! ชมรมโภชนาการได้วันหยุดกับเขางั้นเหรอ!"
10042005-6 = "เอาไงดีล่ะ? นี่มันเรื่องจริงหรือเปล่า? ฉันไม่ได้กำลังฝันอยู่ใช่มั้ย?"
10042005-7 = "ถะ... ถ้าอยากรู้ก็ต้องทำให้ตัวเองตื่น แต่แค่หยิกแขนคงไม่พอ งั้นทุบหัวตัวเองไปเลย...!"
10042005-11 = "โอ๊ย... เจ็บจัง งั้นก็แสดงว่านี่เป็นเรื่องจริง... น่ะสิ?!"
10042005-15 = "คุณครู! แอบฟังอยู่จากที่ไหนหรือเปล่าคะ? ฉันได้วันหยุดด้วยค่ะ!"
10042005-16 = "เมื่อวานส่ง MOMOTALK ไปปรึกษาคุณครูเรื่องนี้พอดี"
10042005-17 = "คุณครูตอบมาหรือยังนะ ไหนเปิดดูหน่อยดีกว่า..."
10042005-18 = "<ชมรมโภชนาการได้หยุดงั้นเหรอ ครูดีใจด้วย! ฝากบอกจูริด้วยนะ!>"
10042005-19 = "<วันนี้ลองทำอะไรอย่างอื่นที่ไม่เกี่ยวกับการทำอาหารดูดีมั้ยนะ?>"
10042005-20 = "<โลกใบนี้มีเรื่องที่สนุกและน่าตื่นเต้นรอให้เราค้นพบอยู่ เราแค่ต้องไปหาให้เจอ!>"
10042005-21 = "แหะๆๆ... คุณครูเนี่ย ใจดีกับฉันจริงๆ เลย..."
10042005-22 = "ว่าแต่จะไปทำอะไรดีนะ...? นอกจากเรื่องการทำอาหารแล้ว ฉันยังไม่เคยคิดถึงเรื่องอื่นมาก่อนเลย..."
10042005-23 = "..."
10042005-24 = "อื้อ! ออกไปหาข้างนอกแล้วกัน!"
10042005-25 = "ให้ก้าวเดินและความคิดนำทางไป ไปยังที่ที่มีอะไรสนุกๆ!"
10042005-26 = "หืม? รุ่นพี่! สวัสดีค่ะ!"
10042005-27 = "จูริ! รู้อะไรหรือเปล่า? คุณครูส่งข้อความมาดีใจกับพวกเราที่ได้วันหยุดด้วยนะ!"
10042005-28 = "จริงเหรอคะ? ว้าว! ดีใจอย่างบอกไม่ถูกเลยค่ะ!"
10042005-29 = "ว่าแต่ทำไมถึงใส่ชุดแบบนี้ล่ะ? มันก็น่ารักมากๆ แล้วก็เข้ากับจูริอยู่หรอกนะ..."
10042005-30 = "ชุดนี้น่ะเหรอคะ? วันนี้ฉันจะไปทำงานพาร์ทไทม์รายวันค่ะ ฉันจะไปเป็นพนักงานเสิร์ฟที่คาเฟ่แพนเค้กน่ะ"
10042005-31 = "งานพาร์ทไทม์เหรอ? แต่ได้วันหยุดมาทั้งทีนะ...?"
10042005-32 = "จูริก็ควรพักผ่อนบ้างไม่ใช่เหรอ..."
10042005-33 = "ไม่เป็นไรค่ะ รุ่นพี่ งานนี้ฉันตั้งใจว่าจะทำอยู่แล้ว อีกอย่างนะคะ การได้เป็นพนักงานเสิร์ฟพาร์ทไทม์แล้วเสิร์ฟอาหารให้ลูกค้า..."
10042005-34 = "มันให้ความรู้สึกเหมือนฉันได้ทำอาหารเลี้ยงคนอื่นน่ะค่ะ!"
10042005-35 = "ฉันอยากลองทำงานนี้ดูค่ะ!"
10042005-36 = "จูริ..."
10042005-37 = "อืม อย่างนั้นสินะ ถ้างั้นฉันก็คงว่าอะไรไม่ได้"
10042005-38 = "แล้ววันนี้รุ่นพี่จะทำอะไรเหรอคะ?"
10042005-39 = "ที่จริงฉันยังไม่รู้เลย ก็พวกเราแทบไม่เคยได้วันหยุดมาก่อนเลยนี่เนอะ แต่ถึงยังไงก็..."
10042005-40 = "ฉันว่าจะลองออกไปข้างนอกดูก่อนน่ะ!"
10042005-41 = "ออกไปห้างสรรพสินค้า สนามกีฬา หอนิทรรศการ คาราโอเกะ ร้านเกม ตลาดดั้งเดิม..."
10042005-42 = "นะ... แน่นอนว่าคงไปไม่ได้ทุกที่ขนาดนั้นหรอก"
10042005-43 = "แต่ก็ว่าจะไปเดินเที่ยวหลายๆ ที่แล้วลองทำนู่นทำนี่ให้เยอะๆ ดูน่ะ!"
10042005-44 = "..."
10042005-49 = "(ที่ผ่านมารุ่นพี่ไม่เคยได้ใช้เวลาในวันหยุดเลยสินะ...)"
10042005-54 = "ดีเลยค่ะ! งั้นก็ขอให้เป็นวันหยุดที่สดใส และได้ใช้เวลาอย่างเต็มที่เลยนะคะ!"
10042005-55 = "อื้อ จูริก็สู้ๆ กับงานพาร์ทไทม์ล่ะ แต่ก็ไม่ต้องฝืนมากจนเกินไปนะ จะได้สนุกกับงานไง"
10042005-56 = "ค่ะ รุ่นพี่! พักผ่อนให้สนุกนะคะ!"
10042005-57 = "ขอบใจนะ ฉันไปก่อนนะ!"
10042005-61 = "งั้นฉันก็ไปคาเฟ่เลยดีมั้ยนะ? วันนี้... ห้ามขอความช่วยเหลือจากรุ่นพี่เด็ดขาดเลย"
10042005-62 = "ไม่ว่าจะเกิดอะไรขึ้น! ฉันก็ต้องจัดการด้วยตัวเองให้ได้! รุ่นพี่จะได้พักผ่อนอย่างเต็มที่ยังไงล่ะ!"
10042005-64 = "คาเฟ่แพนเค้ก แถบชานเมืองเกเฮนน่า"
10042005-66 = "ขอสั่งแพนเค้กวิปปิ้งครีมสตรอว์เบอร์รี่ไซรัปหน่อยค่ะ ขอเพิ่มเนยด้วยนะ!"
10042005-67 = "ค่ะ รับเป็นแพนเค้กวิปปิ้งครีมสตรอว์เบอร์รี่ไซรัป เพิ่มเนยนะคะ"
10042005-68 = "ส่วนฉันขอเป็นแพนเค้กช็อกโกแลตราดครีมกาแฟนะ"
10042005-69 = "แพนเค้กช็อกโกแลต ส่วนครีมก็รสกาแฟนะคะ รับเครื่องดื่มด้วยมั้ยคะ?"
10042005-70 = "เครื่องดื่ม เครื่องดื่ม... จำเป็นมั้ยนะ? แค่ดื่มน้ำก็พอแล้วหรือเปล่า?"
10042005-71 = "มันก็น่าจะได้นะ... แต่มันจะรู้สึกเสียดายหน่อยๆ หรือเปล่า?"
10042005-72 = "(ดีละ งั้นตรงนี้ก็ต้องงัดวิชาที่เรียนมา...)"
10042005-73 = "แพนเค้กที่สั่งทั้งหวานและอร่อยทั้งคู่เลยค่ะ แต่กินแล้วอาจจะกระหายน้ำ หรือว่าหวานเกินไปจนเลี่ยนได้ค่ะ"
10042005-74 = "ลองทานคู่กับชาแดงหรือกาแฟเพื่อตัดความหวานของแพนเค้กดูมั้ยล่ะคะ?"
10042005-75 = "อืม... ลองดูดีมั้ยนะ?"
10042005-76 = "ก็นะ แพนเค้กมีทั้งครีม เนย แล้วก็ไซรัป ที่พูดมาก็มีเหตุผล"
10042005-77 = "ถ้างั้นฉันเอาเป็นชาแดงแล้วกัน"
10042005-78 = "ของฉันขอเป็นกาแฟเย็น"
10042005-79 = "ค่ะ รับเป็นชาแดงกับกาแฟเย็นอย่างละแก้วนะคะ คาเฟ่ของเรามีพาร์เฟต์ขายด้วย สนใจรับด้วยมั้ยคะ? "
10042005-80 = "พาร์เฟ่ต์ พาร์เฟต์..."
10042005-81 = "รับรองว่าจะไม่ผิดหวังอย่างแน่นอนค่ะ!"
10042005-82 = "ฮึ่ย ไม่ต้องนับแคลกันแล้ว ขอพาร์เฟต์ 2 ถ้วยเลย!"
10042005-83 = "ขอบคุณค่ะ! ช่วยรอสักครู่นะคะ"
10042005-86 = "อ่า แม่หนูจูริ ขอบใจนะ ทำงานได้ดีจริงๆ เลย"
10042005-87 = "จริงเหรอคะ? ขอบคุณค่ะ แหะๆๆ..."
10042005-88 = "จริงแท้แน่นอน! ถ้าเป็นไปได้ทางนี้ก็อยากชวนมาเป็นพนักงานเสิร์ฟประจำของคาเฟ่เลยละ!"
10042005-89 = "ขะ... ขอบคุณที่คิดอย่างนั้นนะคะ แต่งานชมรมโภชนาการก็ทำเอาฉันไม่มีเวลาพักแล้วค่ะ..."
10042005-90 = "นั่นสินะ เคยบอกว่าอยู่ชมรมโภชนาการใช่มั้ย? ชมรมโภชนาการของเกเฮนน่านี่ยอดเยี่ยมจริงๆ เลย ไม่แปลกใจเลยละว่าทำไมถึงเป็นที่รู้จักกว้างขวางแบบนี้"
10042005-91 = "งะ... งั้นเหรอคะ?"
10042005-92 = "ก็ใช่น่ะสิ! เขาชมกันว่านอกจากจะเตรียมอาหารอย่างไม่ขาดตกบกพร่องทุกวันแล้ว ทุกคนยังขยันขันแข็งอีกด้วย"
10042005-93 = "ดีใจจังเลยนะคะที่ชมรมของเราเป็นที่รู้จักขนาดนี้!"
10042005-94 = "ที่จริงทางเราก็ไม่ได้เชื่อหรอกขนาดนั้น แต่ก็เคยได้ยินมาว่าบางทีก็มีสิ่งมีชีวิตแปลกๆ ปรากฏตัวที่นั่นด้วย... คงเป็นข่าวลือที่เชื่อไม่ได้ละเนอะ?"
10042005-95 = "คะ... คะ?! ชะ... ชะชะชะชะชะ... ใช่แล้วค่ะ ข่าวลือชัดๆ ค่ะ!"
10042005-96 = "เอาเป็นว่าบ่ายนี้ก็ขอฝากด้วยนะ แม่หนูจูริ พอทางเราได้จูริมาช่วย งานในครัวก็เบาขึ้น ยอดขายก็เพิ่มขึ้นจากเดิมด้วย"
10042005-97 = "ถ้าทำได้ดีแบบนี้ต่อไป ไว้ทางเราจะให้โบนัสเพิ่ม..."
10042005-102 = "?!"
10042005-103 = "!?"
10042005-104 = "มะ... มีเรื่องอะไรเหรอคะ?!"
10042005-105 = "เหมือนจะดังมาจากโกดังของร้านนะ...!"
10042005-107 = "โกดังร้าน"
10042005-108 = "กะ... เกิดอะไรขึ้นเหรอคะ?! ทำใจดีๆ ไว้ก่อนค่ะ!"
10042005-109 = "อะ... อึก..."
10042005-110 = "ฉันเข้าใจผิดว่าถุงดินปืนสีขาวในโกดังเป็นถุงแป้ง..."
10042005-111 = "เอื้อก..."
10042005-112 = "หมดสติไปแล้วค่ะ!"
10042005-116 = "ปะ... เป็นอย่างนี้สินะ! นี่มันเรื่องใหญ่เลย...!"
10042005-117 = "ว่าแต่ทำไมถึงมีถุงดินปืนสีขาวในคลังของร้านด้วยล่ะ?!"
10042005-118 = "หืม? แล้วจะมีไม่ได้เหรอ? ฉันเป็นคนเอาไปวางไว้เองแหละ"
10042005-119 = "เอาถุงดินปืนมาวางในร้าน... แถมยังเป็นคนที่ไม่ได้เกี่ยวข้องกับร้านอีก? ทำไมถึงคิดทำอะไรแบบนี้?"
10042005-120 = "อ่า... แล้วมันไม่ได้เหรอ?"
10042005-121 = "ไม่ได้สิ!!"
10042005-122 = "ฮ่าฮ่า งั้นก็ขอโทษแล้วกันค่ะ~"
10042005-123 = "เฮ้อ เด็กซนพวกนี้นะ... อยากให้ทุกคนเอาแม่หนูจูริเป็นแบบอย่างจังเลย"
10042005-124 = "ฉะ... ฉันไม่ได้ทำอะไรดีมากถึงขนาดนั้นหรอกค่ะ..."
10042005-128 = "(แต่เชฟในคาเฟ่ก็หมดสติไปแล้ว ถ้างั้น...)"
10042005-130 = "แพนเค้กที่ฉันสั่งไป เมื่อไรจะได้เหรอ? ทำไมให้รอนานจัง?"
10042005-131 = "แพนเค้กไม่น่าจะทำนานขนาดนั้นนะ... ส่วนเครื่องดื่ม ฉันก็สั่งแค่น้ำเกรปฟรุตโซดาไปแก้วเดียวเอง มันทำนานขนาดนั้นเลยเหรอ?"
10042005-132 = "ฉันรู้ว่าแพนเค้กของที่นี่ทอดให้ผิวด้านนอกสุกอย่างพอดี ส่วนข้างในก็ยังชุ่มฉ่ำ ถ้าราดไซรัปกินแล้วจะอร่อยจนลืมไปเลยว่าเคยรอนาน..."
10042005-133 = "แต่ปล่อยให้ลูกค้ารอนานแบบนี้มันเกินไปหรือเปล่า? บริการแย่มากเลย..."
10042005-136 = "คะ... คุณผู้จัดการร้านคะ? ทำยังไงดีล่ะคะ?! ลูกค้าเริ่มคอมเพลนกันแล้วค่ะ...!"
10042005-137 = "นะ... นั่นสิ เอาไงดีล่ะ..."
10042005-138 = "รบกวนด้วยนะ แม่หนูจูริ แล้วเดี๋ยวทางเราจะเพิ่มค่าจ้างรายชั่วโมงให้นะ หรือว่าถ้าอยากได้อะไร#nก็บอกทางเราได้เลย ถ้าช่วยได้ทางเราจะช่วยเอง..."
10042005-139 = "ขอร้องละ ช่วยทำแพนเค้กให้หน่อยสิ!"
10042005-140 = "คะ?!"
10042005-141 = "(แพนเค้ก... ให้ฉันทำแพนเค้กเหรอ?!)"
10042005-142 = "มะ... ไม่ได้ค่ะ! ฉันทำไม่ได้ค่ะ! ตอนนี้ฉันยัง..."
10042005-143 = "ตอนนี้ฉันยังทำอาหารไม่เป็นค่ะ!"
10042005-144 = "หมายความว่ายังไงน่ะ? แม่หนูจูริอยู่ชมรมโภชนาการไม่ใช่เหรอ? ชมรมนั้นทำอาหารทุกวันเลยนี่นา?"
10042005-145 = "...!"
10042005-146 = "มะ... มันก็จริงอย่างที่ว่าค่ะ..."
10042005-147 = "แพนเค้กเป็นอาหารที่ทำง่ายนะ แป้งก็ผสมไว้แล้วเรียบร้อย ถ้าใส่ใจและระมัดระวังสักหน่อยตอนทอด ไม่ว่าใครก็ทำได้ทั้งนั้นละ"
10042005-148 = "สิ่งเดียวที่ต้องระวังก็คืออย่าใช้ไฟแรงเกินไป พอทอดเสร็จแล้วก็ราดท็อปปิ้งให้สวย แค่นี้ก็เสร็จแล้วละ!"
10042005-149 = "ค่ะ ค่ะ ฉันก็พอรู้วิธีอยู่หรอกค่ะ แต่ว่า..."
10042005-150 = "ฉันก็คิดว่าบางทีมันอาจจะนำไปสู่... ปัญหาอื่น... ก็ได้"
10042005-151 = "งะ... งั้นเหรอ...? ถ้างั้นก็ช่วยไม่ได้..."
10042005-155 = "อ้อ จริงสิ! ชมรมโภชนาการ! เห็นว่าหัวหน้าชมรมโภชนาการ... ชื่อว่า 'ไอกิโยะ ฟูกะ' ใช่มั้ย?"
10042005-157 = "?!?!?!"
10042005-158 = "พอมาคิดดูแล้วก็เจอทางออกแล้วนะ! ตอนมาสมัครงานพาร์ทไทม์ แม่หนูจูริบอกว่าวันนี้เป็น#nวันหยุดของชมรมโภชนาการใช่มั้ยล่ะ..."
10042005-159 = "ถ้างั้นวันนี้แม่หนูฟูกะก็ต้องว่างเหมือนกันน่ะสิ!"
10042005-160 = "เดี๋ยวจะให้ค่าจ้างรายชั่วโมง 2 เท่า ไม่สิ จะให้ 3 เท่าไปเลย ขอแค่ให้มาช่วยจนถึงปิดร้านวันนี้ก็พอ...!"
10042005-161 = "!!!!!"
10042005-162 = "(ขอให้รุ่นพี่มาที่นี่เหรอ?)"
10042005-164 = "(แต่รุ่นพี่ดูมีความสุขที่ได้วันหยุดมากเลยนะ...)"
10042005-165 = "(ไม่ได้ จะปล่อยให้วันหยุดของรุ่นพี่ถูกแย่งไปไม่ได้)"
10042005-166 = "(ฉันไม่อยากทำลายวันหยุดของรุ่นพี่ รุ่นพี่น่ะ... ต้องเหน็ดเหนื่อยกับงานของชมรมโภชนาการ#nทุกวันเลย...)"
10042005-168 = "(จะให้เป็นอย่างนั้นไม่ได้! อีกอย่าง ฉันก็ตั้งใจไว้แล้วว่าจะแก้ไขปัญหาด้วยตัวเอง ไม่ว่าจะเกิดอะไรขึ้นก็ตาม!)"
10042005-169 = "ไหนดูซิ เบอร์โทรศัพท์ของแม่หนูฟูกะ..."
10042005-170 = "คุณผู้จัดการร้านคะ! ฉันจะทำให้เองค่ะ!"
10042005-171 = "เอะ... เอ๋...?"
10042005-173 = "ถ้าได้แม่หนูจูริมาช่วยงานในครัวด้วย ทางเราก็ดีใจอยู่หรอกนะ..."
10042005-174 = "แต่เมื่อกี้ยังปฏิเสธอยู่เลยไม่ใช่เหรอ?"
10042005-175 = "คะ... คือว่า... ฉันเปลี่ยนใจแล้วน่ะค่ะ!"
10042005-176 = "ห้ามติดต่อรุ่นพี่ฟูกะนะคะ! วันนี้เป็นวันสำคัญของรุ่นพี่! ฉันจะช่วยงานในครัวให้เองค่ะ!"
10042005-177 = "ต่อให้ฉันจะยังไม่เก่ง แต่ถ้าทุ่มเทอย่างสุดตัวและพยายามอย่างสุดความสามารถละก็ บางที บางที...!"
10042005-178 = "มีความตั้งใจจริงแบบนี้มันก็ดีอยู่หรอกนะ... แต่ว่าแพนเค้กมันไม่ใช่อาหารที่ต้องใช้ความแน่วแน่#nขนาดนั้นหรอก..."
10042005-179 = "เอาเถอะ ยังไงก็ขอบใจนะ ขอรบกวนด้วยล่ะ แม่หนูจูริ"
10042005-181 = "ครัวในคาเฟ่"
10042005-182 = "ฮู่ว... ฮ่า... ฮู่ว... ฮ่า..."
10042005-188 = "(แอบกลัวอยู่เหมือนกันแฮะ...)"
10042005-189 = "(ถ้าเป็นการฝึกทำอาหาร ฉันไม่กลัวอยู่แล้ว เพราะถ้าทำพลาดก็ทำใหม่ได้ แล้วฉันก็รับผิดชอบคนเดียวได้)"
10042005-190 = "(แต่นี่มันต่างกัน แพนเค้กที่ฉันทำเป็นถึงแพนเค้กที่จะเอาไปเสิร์ฟลูกค้า)"
10042005-191 = "(แน่นอนว่าฉันก็ฝันอยากทำอาหารให้คนอื่นกินอย่างเอร็ดอร่อย แต่ก็นะ...!)"
10042005-192 = "แพนเค้ก~ ยังไม่ได้อีกเหรอ~?"
10042005-196 = "ส่วนผสมเตรียมไว้พร้อมแล้ว..."
10042005-197 = "..."
10042005-198 = "ไม่มั่นใจจริงๆ ด้วย... แต่ว่า... ฉันจะรบกวนรุ่นพี่ไม่ได้"
10042005-203 = "(ขอร้องละ)"
10042005-204 = "(ใครก็ได้ค่ะ หรือจะเป็นอะไรก็ได้)"
10042005-205 = "(ได้โปรด... ช่วยฉันด้วยค่ะ ช่วยอย่าให้เกิดเรื่องอะไรเลยนะคะ)"
10042005-206 = "(ขอแค่ครั้งนี้ครั้งเดียวค่ะ ส่วนครั้งอื่นจะเป็นยังไงก็ช่าง)"
10042005-207 = "(ได้โปรดช่วยให้ฉัน... ได้ปกป้องวันหยุดของรุ่นพี่ด้วยเถอะนะคะ...!)"
10042005-208 = "อุ... อุชิมากิ จูริ!"
10042005-209 = "จะ... จะจะจะจะ... จะเปิดเตาเดี๋ยวนี้ค่ะ!!!"
10042005-214 = "หืม...?"
10042005-215 = "ทำไมออกมาดูใช้ได้เลยล่ะ...?"

[translation]
10042005-1 = "Prologue;Someone's Day Off, Someone's Part-Time Job"
10042005-2 = "Gehenna Campus"
10042005-3 = "..."
10042005-4 = "I have a day off!"
10042005-5 = "This is amazing! A day off for the whole School Lunch Club!"
10042005-6 = "What do I do? Is this really happening? Am I dreaming or something?"
10042005-7 = "Ooh, I should test that by hitting myself in the head..."
10042005-11 = "Owww... That hurt. So...it's really happening, then! For real!"
10042005-15 = "Sensei, if you're listening, I have the day off!"
10042005-16 = "It's what I talked to you about yesterday on MomoTalk."
10042005-17 = "Maybe I should check MomoTalk again..."
10042005-18 = "<A day off for the School Lunch Club. Congratulations! Make sure to tell Juri!> "
10042005-19 = "<What if you enjoy something that has nothing to do with cooking, just for today?>"
10042005-20 = "<There are all kinds of fun, exciting things hidden out in the world, if you look for them!>"
10042005-21 = "Heeheehee... Sensei's thoughtful as always..."
10042005-22 = "But what should I actually do...? All I've thought about up to this point is cooking..."
10042005-23 = "..."
10042005-24 = "Well, I'll just have to figure it out as I go!"
10042005-25 = "I'll just follow my feet and find some fun!"
10042005-26 = "Huh? Oh hi, Fuuka!"
10042005-27 = "Juri! Did you hear? Sensei sent us congratulations. We've got the whole day off!"
10042005-28 = "They did? Aw, nice!"
10042005-29 = "Uh, why are you dressed like that, though? I mean, you're cute, it looks good on you, but..."
10042005-30 = "Oh, this? I'm gonna do a one-day part-time job at this one pancake cafe down the street."
10042005-31 = "A part-time job? On your one day off?"
10042005-32 = "Shouldn't you rest or something? I mean, I think you should..."
10042005-33 = "Oh, don't worry about it. I've been planning this for a while. Because, you know, being able to serve food as a waitress..."
10042005-34 = "...it's a little bit like I'm cooking and treating someone!"
10042005-35 = "I really want to try it!"
10042005-36 = "Juri..."
10042005-37 = "Okay. That makes sense. Nothing to say about it."
10042005-38 = "What about you, Fuuka? What're you going to do today?"
10042005-39 = "I'm not really sure. We hardly ever get these days, you know? So..."
10042005-40 = "...for now, I'm just going out."
10042005-41 = "Maybe I'll go to a shopping mall, a stadium, an exhibition, a karaoke bar, an arcade, a traditional market..."
10042005-42 = "N-Nothing too far off, of course."
10042005-43 = "But I'm going to do as much as I can, as far as my feet take me!"
10042005-44 = "..."
10042005-49 = "(I guess Fuuka's never really had time on her hands...)"
10042005-54 = "That's great! I hope you have a great day, Fuuka! Have the best time ever, no regrets!"
10042005-55 = "Thanks. Good luck with the gig, Juri. But don't push yourself too hard. I hope you enjoy it."
10042005-56 = "I will! Have fun!"
10042005-57 = "Thanks. I'm going to go, then."
10042005-61 = "Should I hurry up and get to the cafe? I can't ask Fuuka to help me with anything today."
10042005-62 = "Whatever happens, I'll take care of it myself! Fuuka deserves her rest!"
10042005-64 = "Pancake Cafe on the Outskirts of Gehenna"
10042005-66 = "I'll have a whipped-cream, strawberry-syrup pancake. With butter!"
10042005-67 = "Got it. One whipped-cream, strawberry-syrup pancake with butter."
10042005-68 = "I'll have a chocolate pancake with coffee cream on it."
10042005-69 = "Chocolate pancake, and you said coffee cream. Would you like anything to drink?"
10042005-70 = "Drinks, drinks... Do we need any? We've got water..."
10042005-71 = "We do, but...it feels like we're missing something."
10042005-72 = "(All right. Just like I practiced...)"
10042005-73 = "The pancakes you ordered are both very sweet and delicious, but they can be a little on the sticky side. And the sweetness can be so intense, it overpowers your taste buds."
10042005-74 = "How about some black tea or coffee to cleanse your palate?"
10042005-75 = "Hmm... Should we?"
10042005-76 = "I mean there's cream, butter, and syrup. She's making sense."
10042005-77 = "I'll have a black tea, then."
10042005-78 = "Iced coffee for me."
10042005-79 = "All right, one black tea, one iced coffee. Oh, we also have parfaits. Would you like one? "
10042005-80 = "Parfaits, you say..."
10042005-81 = "You won't be disappointed!"
10042005-82 = "Eh, why not? Two parfaits!"
10042005-83 = "Perfect! We'll have them right out."
10042005-86 = "Hey, Juri, thanks! You're doing great."
10042005-87 = "Really? Thank you. Heeheehee..."
10042005-88 = "Of course! I'd love to hire you full-time!"
10042005-89 = "That's v-very kind of you, but I'm busy enough with the School Lunch Club..."
10042005-90 = "Oh, Gehenna's School Lunch Club? They're amazing. They've got quite a reputation, you know."
10042005-91 = "W-We do?"
10042005-92 = "Of course! They put out huge amounts of food every day, and they're all very sincere."
10042005-93 = "Oh, glad to hear people think of us that way!"
10042005-94 = "Also, not that I believe this, but I've heard something about...living food? That's just a rumor, right?"
10042005-95 = "Wh-What?! O-O-Of course it is. Just a rumor."
10042005-96 = "Well, this afternoon, I'm counting on you, Juri. And you're making things a whole lot easier around here."
10042005-97 = "If you keep this up, I'll make sure you get a nice bonus—"
10042005-102 = "!?"
10042005-103 = "?!"
10042005-104 = "Wh-What was that?!"
10042005-105 = "The storage room...!"
10042005-107 = "Cafe Storage"
10042005-108 = "Wh-What's happening?! Chef, wake up!"
10042005-109 = "U-Ugh..."
10042005-110 = "I thought that white powder was flour... It was gunpowder..."
10042005-111 = "(thud)"
10042005-112 = "He fainted!"
10042005-116 = "S-So that's what happened! This is a disaster...!"
10042005-117 = "But why was there gunpowder in our storage room?"
10042005-118 = "Oh, it was mine. Was I not supposed to put it here?"
10042005-119 = "Who even ARE you? You just walked in here with your gunpowder and— Does that make ANY sense?"
10042005-120 = "Uh... Not really, I guess..."
10042005-121 = "No, it doesn't!!"
10042005-122 = "Mm, yeah, my bad."
10042005-123 = "*sigh* So ridiculously careless... More people should learn from you, Juri."
10042005-124 = "Oh, I-I'm not a teacher..."
10042005-128 = "(Great, and now we don't have a chef, so...)"
10042005-130 = "Where are my pancakes? What's taking so long?"
10042005-131 = "PANCAKES can take a while, but I just ordered grapefruit-ade! How is THAT taking so long?"
10042005-132 = "They can take a while, yeah. These ones here are all crispy on the outside and fluffy on the inside. Just pour a little syrup on, and... Mmm!"
10042005-133 = "Yeah, their food's great, but their service is terrible!"
10042005-136 = "M-Manager? What do we do?! The customers are getting mad!"
10042005-137 = "R-Right. What DO we do...?"
10042005-138 = "...Juri, I can give you a pay increase. I can do anything you like, within reason..."
10042005-139 = "...Please, start making pancakes!"
10042005-140 = "What?!"
10042005-141 = "(Me...cook...pancakes?!)"
10042005-142 = "Oh, no! I can't! Cooking is..."
10042005-143 = "I-I'm not very good at it yet!"
10042005-144 = "What do you mean? Aren't you in the School Lunch Club? You cook every day, right?"
10042005-145 = "...!"
10042005-146 = "W-Well, we do, but..."
10042005-147 = "Look, they're not hard to make. The batter's already mixed. Just keep your eye on the pan, and they'll turn out fine."
10042005-148 = "All you need to do is not let them get too hot. Once they're ready, you just add the toppings and you're done!"
10042005-149 = "R-Right, I know the recipe, but..."
10042005-150 = "...I mean, you'd THINK it'd be easy, but..."
10042005-151 = "That's how it is, huh? Well, we're really up a creek, then..."
10042005-155 = "Oh, wait! Speaking of the School Lunch Club, their president...Aikiyo Fuuka, right?"
10042005-157 = "?!"
10042005-158 = "Right, because you mentioned earlier that your whole club had the day off..."
10042005-159 = "...so I bet she'll be free today!"
10042005-160 = "I can give her double—no, triple pay. If she can just come in for a few hours..."
10042005-161 = "*gasp*"
10042005-162 = "(Call her here?)"
10042005-164 = "(But she looked so happy...)"
10042005-165 = "(No. I can't interrupt her day off.)"
10042005-166 = "(She deserves it. She works so hard for all of us. I'm not going to ruin it for her.)"
10042005-168 = "(Not ever! Like I told her, no matter what, I'll take care of it myself!)"
10042005-169 = "Let's see, Fuuka's phone number is..."
10042005-170 = "Manager, I'll do it!"
10042005-171 = "Y-You will?"
10042005-173 = "I'd be grateful for the help, but..."
10042005-174 = "...didn't you just tell me you couldn't?"
10042005-175 = "Th-That's... I changed my mind!"
10042005-176 = "You can't call Fuuka! Today's an important day for her! And you don't need to, because you've got me, right here!"
10042005-177 = "I may not be the best at this, but if I put my whole heart into it, then maybe, just maybe..."
10042005-178 = "I like your enthusiasm, but...this isn't really life or death, you understand..."
10042005-179 = "Anyway, thanks, Juri. I'm counting on you, then."
10042005-181 = "Cafe Kitchen"
10042005-182 = "*huff* *puff* *huff* *puff*"
10042005-188 = "(...This is kind of scary.)"
10042005-189 = "(I can do this okay if I'm practicing. Because if I mess that up, it's okay. I'm only disappointing myself.)"
10042005-190 = "(But this is different. This is for other people. Customers.)"
10042005-191 = "(And I'd love for other people to enjoy my cooking SOMEDAY, but...)"
10042005-192 = "Are the pancakes done yet?"
10042005-196 = "I have all the ingredients..."
10042005-197 = "..."
10042005-198 = "...I don't know if I can do this, but I KNOW I can't let Fuuka down today."
10042005-203 = "(Please.)"
10042005-204 = "(Just let them turn out edible.)"
10042005-205 = "(Please...help me. Please let nothing go wrong.)"
10042005-206 = "(Just this once. It doesn't matter what happens after.)"
10042005-207 = "(So please...let me protect Fuuka's day off...!)"
10042005-208 = "M-My name is Ushimaki Juri!"
10042005-209 = "And I... I am here to do this!"
10042005-214 = "Huh...?"
10042005-215 = "They...actually turned out okay?"

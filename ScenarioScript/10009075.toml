[translation]
10009075-1 = "Epilogue;The Day After Valentine's"
10009075-2 = "Schale Office"
10009075-3 = "We managed to reclaim most of the stolen equipment, but at least half of it was broken."
10009075-4 = "Most of the troublemakers who aided the Fox of Calamity were also arrested and sent to correctional facilities."
10009075-5 = "That pretty much puts a cap on things."
10009075-6 = "And also..."
10009075-7 = "The students from other academies that came to help had messages they wanted us to pass along to you."
10009075-11 = "Yuuka said, \"I'm sorry I couldn't be of more help.\""
10009075-15 = "Suzumi and Chinatsu said much of the same and proposed scheduling regular meetings with Schale to discuss effective countermeasures against Wakamo."
10009075-19 = "As for Hasumi, she said, um...\"Why didn't you tell us the chocolate bars provided during the operation were 1,200 calories each?!\""
10009075-20 = "Hold up, Kirino. That was directed at us. She also had something for Sensei before that."
10009075-21 = "O-Oh, yeah. Sorry about that. She said, \"Please let me know if you ever need my help again.\""
10009075-23 = "[ns] \"Oh, okay. I'll have to thank all of them later.\""
10009075-24 = "*sigh* Thank goodness it's over. Talk about a hectic Valentine's Day."
10009075-25 = "My grades took a real beating too."
10009075-26 = "Meanwhile, the Fox of Calamity is still at large.#nIt was all for nothing!"
10009075-27 = "She must have just been toying us the entire time.#nNo wonder she was one of the Seven Prisoners."
10009075-28 = "Gah! It makes me so mad when I think about it!"
10009075-29 = "[s] \"For what it's worth, I think you both did fine...\""
10009075-30 = "Anyway, that concludes our report on the Valentine's Day incident."
10009075-31 = "We'll give you a call if something else comes up."
10009075-32 = "Catch ya later, Sensei. Let's go out for donuts sometime."
10009075-38 = "[ns] \"Hello.\""
10009075-40 = "Hello, Sensei."
10009075-41 = "My apologies for not calling sooner."
10009075-42 = "There's something I wanted to discuss."
10009075-43 = "I'm sorry we didn't continue our patrol yesterday. I never should have allowed myself to be fooled by that miscreant or left you alone like that."
10009075-44 = "It's my duty to protect the dead at all cost and..."
10009075-45 = "[s] \"Dead?\""
10009075-46 = "Sorry. I meant to say the injured and vulnerable. My poor judgment could have turned you into a corpse, though. My sincerest apologies."
10009075-47 = "[s1] \"It's fine. We were both flustered.\"\n[s2] \"Don't worry about it, Sena.\""
10009075-52 = "Are you saying I should keep looking forward rather than dwell on my mistakes?"
10009075-53 = "Adult wisdom, then. I'll take your word to heart."
10009075-54 = "[s] \"I really didn't say that much, you know.\""
10009075-55 = "Regardless..."
10009075-56 = "I should be going now."
10009075-57 = "I look forward to the next time we can work together."
10009075-62 = "After hanging up, I decided to unwind and read through the documents regarding yesterday's damages."
10009075-66 = "[ns] \"Come in! It's open!\""
10009075-70 = "I'm deducting 40 points from your security score. "
10009075-71 = "You leave your door unlocked and welcome in people when you don't even know who's on the other side of the door? How many times must I tell you to take security more seriously?"
10009075-72 = "[s] \"I let you in, and THIS is how you treat me?!\""
10009075-77 = "Not only that, but I can see several blind spots in Schale's security system."
10009075-78 = "The lock on the front entrance seems to be broken. No wonder you don't keep it locked—you can't."
10009075-79 = "What happened to it?"
10009075-80 = "[s] \"I-I don't know. Wear and tear?\""
10009075-81 = "You're this club's advisor. Shouldn't you take things more seriously?"
10009075-82 = "*sigh* It'd be one thing if it were only a software issue.#nThere's not much I can do when it comes to repairing hardware."
10009075-83 = "You should put in a request with the Engineering Department to come have a look."
10009075-84 = "Granted, they'll likely add some functions to the door it doesn't even need...but it's better than letting it remain broken, and they're trustworthy if nothing else."
10009075-85 = "[s] \"Oh, I didn't realize they were friends of yours.\""
10009075-86 = "I wouldn't go that far..."
10009075-87 = "Anyway, I came to apologize for yesterday."
10009075-88 = "[s] \"Why? You didn't do anything wrong.\""
10009075-89 = "Nonsense. I was the one in charge of the festival's security solutions."
10009075-90 = "I take responsibility for not catching the security holes that were taken advantage of sooner."
10009075-91 = "I'm sorry. I'll pay closer attention to prevent something like that happening again."
10009075-92 = "Sometimes you need to have your faults exposed in order to become stronger—both in security and in life."
10009075-93 = "That's all I wanted to say. I'll be going, then. "
10009075-94 = "I'll come see you again when I'm ready to run another routine check."
10009075-95 = "[s] \"Sure. See you later.\""
10009075-96 = "Yeah. Later."
10009075-100 = "Thankfully, the aftermath of the Valentine's Day incident was going smoothly thanks to the hard work of my students."
10009075-104 = "[ns] \"(Hmm. My students...)\""
10009075-107 = "[s] \"Wh-What the...?!\""
10009075-110 = "[ns] \"W-Wakamo?! What are YOU doing here?!\""
10009075-111 = "Heeheehee! ♥"
10009075-112 = "I'm making good on what I said yesterday!"
10009075-113 = "The door was open, so I decided to show myself in. See?#nThis is me seeing you later!"
10009075-114 = "[s] \"Maybe Chihiro was right about the door..\""
10009075-116 = "I've met many different kinds of students since I arrived in Kivotos.#nWakamo is undoubtedly the most persistent."
10009075-117 = "I'll just have to get used to having her around, because I don't think she'll be going anywhere for a long, long time."
10009075-118 = "Schale's Happy ♥ Valentine Patrol"

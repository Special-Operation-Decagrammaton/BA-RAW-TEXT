[translation]
10009075-1 = "尾聲;即使情人節已經結束"
10009075-2 = "夏萊．辦公室"
10009075-3 = "綜上所述，被搶走的裝備大多數都得以回收。#n雖然一半以上都已經毀損了……"
10009075-4 = "和「災厄之狐」一起鬧事的傢伙們也幾乎都遭到逮捕了。"
10009075-5 = "總之，可以說暫時告一段落了吧？"
10009075-6 = "啊……"
10009075-7 = "話說前來幫忙的各位學生們有向老師傳話……"
10009075-11 = "首先，優香表示「抱歉沒幫上忙……」。"
10009075-15 = "此外，鈴美和千夏表示……#n由於這次力有未逮讓他逃跑了，為了確實樹立今後的對策，日後想在夏萊進行會議。因此希望能提供可以定期對話的時間……他們兩位大概是這個意思。"
10009075-19 = "蓮實則表示，呃……「有件重要的事情，我可沒聽說作戰期間的戰鬥補給品巧克力棒的熱量有1200大卡，那種事請在我吃之前告訴我！」……大概是這樣。"
10009075-20 = "桐乃，那是對我們的抗議吧？"
10009075-21 = "啊，失禮了！呃，是這個吧。#n「今後若是有需要我們力量的時候，歡迎隨時通知我們」。"
10009075-23 = "[ns]「這樣啊，之後得各自向大家道謝才行。」"
10009075-24 = "呼，雖然現在說這些有點晚了，情人節還真是累人啊……"
10009075-25 = "不只成績變得很不妙……"
10009075-26 = "災厄之狐又不知去向！真是受夠了！"
10009075-27 = "真不愧是「七罪人」呢……簡直被玩弄在股掌之間……"
10009075-28 = "啊，真是做不下去了！！"
10009075-29 = "[s]「你們兩個也辛苦了……」"
10009075-30 = "總之，報告大概就是這樣。"
10009075-31 = "如果還有什麼事的話會再聯絡老師。"
10009075-32 = "老師也辛苦啦～下次再一起去吃甜甜圈吧。"
10009075-38 = "[ns]「喂？」"
10009075-40 = "啊，老師。"
10009075-41 = "這麼晚才連絡您非常抱歉。"
10009075-42 = "那個……"
10009075-43 = "昨天真是非常抱歉。因上當受騙而離開老師身邊……"
10009075-44 = "不應忘記本來的職責，應當致力於警備和回收屍體直到最後才對……"
10009075-45 = "[s]「……屍體？」"
10009075-46 = "……回收傷患直到最後才對。#n由於錯誤的判斷選擇單獨行動，給老師添了這麼多麻煩，不知道該怎麼謝罪才好。"
10009075-47 = "[s1]「不，當時看來那也是最佳選擇。」\n[s2]「我當時也沒阻止你，別在意。」"
10009075-52 = "……原來如此。#n與其回顧無法改變的過去，不如放眼或許能夠改變的未來，是這個意思吧。"
10009075-53 = "大人說的話……滲進了內心，我會當成金科玉律的。"
10009075-54 = "[s]「我剛才說的有那麼厲害嗎……？」"
10009075-55 = "我明白了。"
10009075-56 = "今天就先說到這裡吧。"
10009075-57 = "那麼……期待能再次與您一起行動的日子。"
10009075-62 = "（該來看與昨天損害狀況有關的各種文件了……）"
10009075-66 = "[ns]「啊，請進。」"
10009075-70 = "……安全檢查，－40分。"
10009075-71 = "老師，不該是「請進」吧。請提高一點安全意識。"
10009075-72 = "[s]「才見面就被罵了……」"
10009075-77 = "不只是這樣而已。來的途中我進行了各種調查，夏萊的安全根本是漏洞百出。"
10009075-78 = "大門的門鎖甚至早就壞了……"
10009075-79 = "這是怎麼回事？"
10009075-80 = "[s]「這個……因為很多孩子都會來嘛……」"
10009075-81 = "明明是與夏萊有關的事，老師卻是這種狀態……"
10009075-82 = "唉……如果是程式方面的問題我還可以處理，設施之類的硬體問題我也無能為力……"
10009075-83 = "之後最好請工程師部來修理比較好唷。"
10009075-84 = "雖然很可能會被加裝一些奇怪的功能……#n不過也沒有比他們更值得信賴的人了。"
10009075-85 = "[s]「啊，你們關係還挺不錯……不如說，你果然很信賴他們呢？」"
10009075-86 = "先不說那些了……"
10009075-87 = "我不是特地來罵人的，反而該說是來道歉的。"
10009075-88 = "[s]「可是，昨天的事也不是千尋的錯──」"
10009075-89 = "不，負責現場安全相關問題的是我。"
10009075-90 = "沒能在事前察覺問題，也無法當場立刻解決。#n這明顯是我的疏失。"
10009075-91 = "所以，抱歉。為了避免今後再發生同樣的狀況，我會好好處理的。"
10009075-92 = "聽起來可能有點像是在找藉口，不過所謂的安全系統……#n就是在破壞和修補的循環之中逐漸變強的東西。"
10009075-93 = "我想說的就是這些，下次見。"
10009075-94 = "之後有時間的話，我再會來檢查安全系統的。"
10009075-95 = "[s]「嗯，下次見。」"
10009075-96 = "……嗯，再見。"
10009075-100 = "（因為各種狀況而亂哄哄的情人節，在眾多學生們的努力下，總算是結束了）"
10009075-104 = "[ns]（大家，真的……）"
10009075-107 = "[ns]「！？」"
10009075-110 = "[ns]「……若藻！？你怎麼會在這裡……！？」"
10009075-111 = "呵呵呵……♡"
10009075-112 = "那當然是因為和您約定好了！老師！"
10009075-113 = "由於門正好開著，我實在按捺不住，就直接來見您了……！"
10009075-114 = "[s]「果然還是審視一下安全問題吧，為了心靈的健康……」"
10009075-116 = "（在有著形形色色學生的奇普托斯裡）"
10009075-117 = "（與格外殺氣騰騰的女孩，再次相遇了）"
10009075-118 = "夏萊的快樂♡情人節巡邏"

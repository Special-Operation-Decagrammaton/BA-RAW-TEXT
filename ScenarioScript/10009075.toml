[translation]
10009075-1 = "บทส่งท้าย;วันรุ่งขึ้นหลังจากวาเลนไทน์"
10009075-2 = "สำนักงานชาเล่ต์"
10009075-3 = "อุปกรณ์ของโรงเรียนที่ถูกขโมยไปส่วนใหญ่ก็เอากลับมาได้แล้ว แต่อุปกรณ์ครึ่งหนึ่งถูกทำลาย#nหรือไม่ก็ชำรุดไปแล้ว... รู้สึกปวดใจจริงๆ เลยค่ะ"
10009075-4 = "พวกเด็กเกเรที่ร่วมมือกับวาคาโมะ ส่วนใหญ่ก็ถูกจับกุมและส่งตัวไปที่ห้องคุมขังเรียบร้อยแล้ว"
10009075-5 = "อื้อ แบบนี้ก็คงเรียกว่าสถานการณ์ทั่วไปคลี่คลายลงได้แล้วล่ะ"
10009075-6 = "ยังมีอีกอย่างด้วยนะ..."
10009075-7 = "มีคำพูดจากนักเรียนโรงเรียนอื่นที่ฝากมาด้วยค่ะ"
10009075-11 = "คุณยูกะบอกว่า \"ขอโทษที่ไม่ได้ช่วยอะไรเลย...\""
10009075-15 = "ส่วนคุณสึซึมิกับคุณชินัตสึรู้สึกเสียดายที่ปล่อยให้ตัวการหลุดรอดไปได้ และอยากจะวางแผนรับมือ#nอย่างจริงจังร่วมกับทางชาเล่ต์ในภายหลัง เลยขอให้แจ้งเวลาที่สะดวกเข้าร่วมประชุมไว้ด้วยค่ะ"
10009075-19 = "ส่วนคุณฮาสุมิบอกว่า \"เดี๋ยวก่อนสิคะ เสบียงที่ส่งให้ระหว่างปฏิบัติการ ช็อกโกแลตบาร์มีแคลลอรี่สูงถึง 1200kcal เลย เรื่องนี้ก็ควรจะบอกกันก่อนที่จะส่งมาให้กินด้วยสิคะ!\" แบบนี้ค่ะ"
10009075-20 = "เดี๋ยวก่อน คิริโนะ เรื่องนั้นเอาไว้ทีหลังเถอะ ข้อความที่ฝากมาล่ะ"
10009075-21 = "ขะ... ขอโทษด้วยค่ะ! อ๋อ เธอบอกว่า \"ครั้งต่อไปหากต้องการความช่วยเหลือจากพวกเรา ก็สามารถติดต่อมาได้ตลอด\" แบบนี้ค่ะ"
10009075-23 = "[ns] \"อา อืม... ทุกคนเหนื่อยกันมากเลยนะ\""
10009075-24 = "จริงๆ เลย... ไม่รู้ทำไมถึงเกิดเรื่องแบบนี้ในวันวาเลนไทน์กันนะคะ"
10009075-25 = "เพราะเรื่องนั้นฉันถึงถูกตัดคะแนนไปเยอะเลยนะ!"
10009075-26 = "แถมตัวก่อเรื่องอย่างจิ้งจอกแห่งความพินาศก็มาหายตัวไปอย่างไร้ร่องรอยอีก!"
10009075-27 = "ฉายาเจ็ดอาชญากรนี่ไม่ใช่เล่นๆ เลยนะคะ ไม่คิดเลยว่าจะโดนต้มซะเปื่อยแบบนี้... ฮือ"
10009075-28 = "อึ่ก! น่าโมโหจริงๆ เลยยยย!!"
10009075-29 = "[s] \"เอ่อ... ทั้งสองคนทำงานหนักมากเลยนะ\""
10009075-30 = "ถ้างั้นขอจบการรายงานติดตามผลเท่านี้นะคะ"
10009075-31 = "ถ้ามีเรื่องอะไรเกิดขึ้นอีก จะรีบแจ้งให้คุณครูทราบนะคะ"
10009075-32 = "บ๊ายบาย คุณครู~ เอาไว้ไปกินโดนัทด้วยกันน้า~"
10009075-38 = "[ns] \"หืม ฮัลโหล?\""
10009075-40 = "อ๊ะ คุณครู ขอโทษที่ติดต่อมาช้านะคะ"
10009075-41 = "คือว่า..."
10009075-42 = "เฮ้อ"
10009075-43 = "เมื่อวานฉันถูกพวกเด็กเกเรหลอกเอา เลยทำให้ไปลาดตระเวนไม่สำเร็จ... ต้องขอโทษด้วยค่ะ"
10009075-44 = "ในฐานะผู้ที่ควรทำหน้าที่ให้ดีที่สุดเพื่อเก็บศพ..."
10009075-45 = "[s] \"ศพ...?\""
10009075-46 = "ฉันกลับละเลยผู้ที่ได้รับบาดเจ็บ และออกไปปฏิบัติการคนเดียว ต้องขอโทษที่ทำให้คุณครูเดือดร้อน#nด้วยนะคะ"
10009075-47 = "[s1] \"ไม่หรอก ตอนนั้นมันวุ่นวายจริงๆ นี่นา\"\n[s2] \"เซนะเองก็ไม่ต้องใส่ใจหรอก\""
10009075-52 = "ว่าแล้วเชียว... คำพูดนั้น... คำพูดที่หมายถึงให้สนใจอนาคตที่จะมาถึงมากกว่ามองย้อนกลับไปยัง#nอดีตที่แก้ไขไม่ได้แล้วสินะคะ"
10009075-53 = "นี่คือคำพูดของผู้ใหญ่... ซึมซับลงไปถึงจิตใจของฉันเลยค่ะ คำพูดที่เหมือนกฏที่ต้องรักษาอย่าง#nเคร่งครัด"
10009075-54 = "[s] \"เอ่อ คำพูดของครูยิ่งใหญ่ขนาดนั้นเลยเหรอ?\""
10009075-55 = "ค่ะ ฉันเข้าใจดีแล้วละค่ะ"
10009075-56 = "ถ้างั้น... คราวหน้า..."
10009075-57 = "คราวหน้า... หวังว่าเราจะได้ไปลาดตระเวนด้วยกันอีกนะคะ"
10009075-62 = "(หลังจากโทรพูดคุยกับนักเรียนหลายๆ คนแล้ว คุณครูก็ตรวจดูเอกสารรายงานถึงเหตุการณ์ความ#nเสียหายที่เกิดขึ้นเมื่อวาน)"
10009075-66 = "[ns] \"อ๊ะ เข้ามาได้เลย ประตูไม่ได้ล็อก\""
10009075-70 = "หักคะแนนความปลอดภัย 40 คะแนน..."
10009075-71 = "ยังไม่รู้ว่าเป็นใครเลยก็บอกให้เข้ามาแล้วงั้นเหรอ ฉันย้ำถึงความสำคัญของระบบความปลอดภัย#nกับคุณครูไปแล้วไม่ใช่รึไง?"
10009075-72 = "[s] \"จะเริ่มเทศนาครูตั้งแต่มาถึงเลยเหรอ?!\""
10009075-77 = "ไม่ใช่แค่นี้นะ ระหว่างขึ้นมาที่นี่ฉันก็ได้ตรวจสอบอาคารแล้ว แล้วก็เห็นจุดบอดเรื่องความปลอดภัย#nในชาเล่ต์เต็มไปหมดเลยด้วย"
10009075-78 = "ยิ่งกว่านั้น ตัวล็อกที่ประตูทางเข้าด้านหน้าก็ยังพังอีก"
10009075-79 = "นี่มันเกิดอะไรขึ้นกันเนี่ย...?"
10009075-80 = "[s] \"งะ...งั้นเหรอ? อาจเป็นเพราะมีนักเรียนมาบ่อยๆ...\""
10009075-81 = "นี่ เดี๋ยวนะ คุณครูไม่ได้ตระหนักถึงเรื่องที่เกิดขึ้นกับชาเล่ต์อย่างถูกต้องเลย..."
10009075-82 = "เฮ้อ... ถ้าโปรแกรมมีปัญหาฉันก็ยังพอจะแก้ไขได้อยู่หรอก แต่ถ้าเป็นปัญหาเกี่ยวกับอุปกรณ์ ก็คงไม่มีวิธีที่จะแก้ไขได้ในทันทีด้วย"
10009075-83 = "คราวหลังคงต้องขอให้ทางชมรมวิศวกรรมมาซ่อมให้แล้วล่ะ"
10009075-84 = "ฉันคิดว่ามีโอกาสที่พวกนั้นจะใส่ฟังก์ชันแปลกๆ เข้าไป แต่เรื่องอุปกรณ์ก็ไม่มีใครเก่งและน่าเชื่อถือ#nเท่าพวกนั้นแล้วล่ะ"
10009075-85 = "[s] \"อา... ดูเข้ากันได้ดีจังเลยนะ เชื่อใจกันและกันด้วยสินะ\""
10009075-86 = "อย่าพูดอะไรไร้สาระเลยน่า..."
10009075-87 = "ที่ฉันมาวันนี้ก็เพราะอยากขอโทษที่เมื่อวานฉันช่วยอะไรไม่ได้เลย"
10009075-88 = "[s] \"หืม? เรื่องเมื่อวานไม่ใช่ความผิดของจิฮิโระสักหน่อย\""
10009075-89 = "ไม่หรอก ถึงยังไงคนที่รับผิดชอบดูแลระบบความปลอดภัยของงานเทศกาลก็คือฉันนะ"
10009075-90 = "ฉันไม่ได้เตรียมวิธีรับมือปัญหาเอาไว้ล่วงหน้า และเรื่องที่แก้ปัญหาไม่ได้ก็เป็นความผิดของฉันเอง"
10009075-91 = "และเพื่อไม่ให้เกิดเรื่องแบบนี้อีกในอนาคต ฉันเลยคิดวางแผนรับมือเอาไว้แล้ว"
10009075-92 = "เพื่อให้ระบบความปลอดภัยแข็งแกร่งขึ้นกว่าเดิมขึ้นเรื่อยๆ"
10009075-93 = "ธุระวันนี้ก็มีเท่านี้ล่ะ ถ้างั้นฉันขอตัวก่อนนะ "
10009075-94 = "ถ้ามีเวลาฉันจะแวะมาตรวจสอบระบบความปลอดภัยให้อีกที"
10009075-95 = "[s] \"อื้อ ไว้เจอกันนะ\""
10009075-96 = "อื้อ... ฉันไปนะ"
10009075-100 = "(งานเทศกาลวันวาเลนไทน์ที่แสนวุ่นวายก็สิ้นสุดลงด้วยความทุ่มเทและความพยายามของนักเรียน#nหลายๆ คน)"
10009075-104 = "[ns] \"นักเรียนหลายๆ คน... งั้นเหรอ\""
10009075-107 = "[ns] \"วะ...ว้ากกกก?!\""
10009075-110 = "[ns] \"วะ...วาคาโมะ?! มาที่นี่ได้ยังไงน่ะ!\""
10009075-111 = "ฮุฮุฮุ♡"
10009075-112 = "ตามที่ให้สัญญาไว้ค่ะ...!"
10009075-113 = "ฉันเห็นประตูหน้าเปิดอยู่ เลยไม่รีรอที่จะมาพบคุณอีกครั้งค่ะ! คุณ-ครู!"
10009075-114 = "[s] \"อืม... ความปลอดภัยเป็นเรื่องสำคัญจริงๆ ด้วยสินะ\""
10009075-116 = "(การได้พบกับเด็กสาวที่กระหายเลือดเป็นพิเศษ จากในบรรดานักเรียนหลายๆ คนของในคิโวทอส...) "
10009075-117 = "(ไม่ว่ายังไง การพบกันครั้งนี้... ก็คงเป็นการพบกันที่ยาวนานต่อไป)"
10009075-118 = "แฮปปี้ ♡ วาเลนไทน์จากชาเล่ต์ ภาคสนาม"

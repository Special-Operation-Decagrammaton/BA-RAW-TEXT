[translation]
70001030-1 = "テルマエ・アカエ（３）"
70001030-3 = "結局、ここに来ることになるとは……"
70001030-4 = "仕方ないよ。それぞれ欠点があったんだし。"
70001030-5 = "それはそうだけど……"
70001030-6 = "ミレニアムサイエンススクールだけは避けたかったのに……"
70001030-7 = "……どうして？"
70001030-8 = "ミレニアムサイエンススクールといえば、最先端の技術が有名だよね？"
70001030-9 = "休憩室のコーヒーマシーンにさえ人工知能が搭載されてるって噂があるくらいだから……入浴施設の設備なんて、私たちには絶対に手が届かないよ……"
70001030-10 = "噂なんて[ruby=おおげさ]大袈裟[/ruby]に広がるものじゃない？"
70001030-11 = "とりあえず、値段だけでも聞いてこうよ。"
70001030-12 = "うん……"
70001030-18 = "き、緊急撤去！？"
70001030-19 = "私たちの改造した入浴施設に、何か問題でもありましたか！？"
70001030-20 = "い、いえ。その……[ruby=・   ・]現状[/ruby]、問題はありませんが……"
70001030-21 = "後ほど、他の学園の方が寮の浴場を見学されるので……"
70001030-22 = "セミナーの審査を通ってないエンジニア部の発明品を、他の学園の方に見せるのはちょっと……"
70001030-23 = "それはおかしい。私たちエンジニア部だって、ミレニアムサイエンススクールの一員として、発明品を外部に披露する資格があるはずだ。"
70001030-24 = "それに外部からお客さんが来るというのなら、なおさら私たちに任せた方が良いのでは？"
70001030-25 = "いえ、むしろ……そもそも皆さんはこれまで――"
70001030-28 = "あの、すみません……レッドウィンター連邦学園の者ですが……"
70001030-29 = "も、もう到着したんですか！？"
70001030-30 = "申し訳ありませんが……まだお見せする準備が整っていなくて……"
70001030-31 = "そうなんですか？#n問題ないように見えますけど……"
70001030-35 = "その通り。新しい入浴施設の準備は完璧さ。"
70001030-36 = "ウ、ウタハ部長……！"
70001030-37 = "新しい入浴施設……？"
70001030-39 = "新型入浴施設の機能については、私から説明しましょう！"
70001030-40 = "まずはこちら。浴槽に搭載された最先端の人工知能が、使用者のコンディションに合わせリアルタイムで水温を調整してくれます！"
70001030-41 = "使用者の肌状態を自動的に分析してくれるので、温度を設定する必要はありません！"
70001030-42 = "給湯器は、周辺のエネルギー源から熱を吸収するヒートポンプ式。#n冷媒としても使える……"
70001030-43 = "冷媒を活用した冷蔵庫もあるから、入浴中に冷たい飲み物が飲めるよ。"
70001030-46 = "冷蔵庫つきの浴槽……それはいいね。"
70001030-48 = "それと、この入浴施設には面倒くさがり屋のための自動入浴補助機能もあるんだ。"
70001030-49 = "複数のロボットアームが音声認識で動作し、身体を自動で洗ってくれる。"
70001030-50 = "この浴槽ひとつで、複数の家電代わりになるんだ。"
70001030-52 = "あの……お話を聞いていると、確かにすごそうですけど……"
70001030-53 = "これほどの機能があるとすると……やっぱり導入にはお金がかかりますよね……？"
70001030-55 = "お代のことでしたら、心配無用です！"
70001030-56 = "この新型入浴施設はまだ試作品ですので、製作費を除く設置費や修理費は全て、私たちエンジニア部で負担いたします！"
70001030-58 = "運転中に発生した事故については責任を負わない、という制約はつくけど……"
70001030-63 = "……この額でどう？"
70001030-68 = "こんなに安いの！？"
70001030-69 = "すぐに契約します！"
70001030-70 = "あの……ひとつ先に申し上げておきますと……"
70001030-71 = "エンジニア部の発明品は性能こそ確かなのですが、いつも予想外の機能が追加されることで悪名高いので……"
70001030-72 = "安全性のテストが終わるまで時間もかかりますし……他の学園の施設を取り入れた方が……"
70001030-73 = "大丈夫です！機能が追加されるならむしろお得じゃないですか！"
70001030-79 = "うん、その通りだとも。タダでおまけまで付いてくるのに、断る理由は無いね。"
70001030-80 = "サービス、サービス。"
70001030-82 = "レッドウィンター連邦学園の使者として、この場で承認します！"
70001030-83 = "私たちレッドウィンター連邦学園の寮に、新型入浴施設の設置をお願いします！"
70001030-85 = "お任せください！"
70001030-89 = "レッドウィンター連邦学園・学生寮"
70001030-92 = "ふむ……これが特別クラスのやつらがミレニアムサイエンススクールから取り入れたという入浴施設か……"
70001030-93 = "見た目は普通だが……ミレニアムの理屈バカがレッドウィンター連邦学園の生徒をサボタージュさせようと、怪しい機能を仕込んでいるかもしれない。"
70001030-94 = "我がレッドウィンター連邦学園生の安全のためにも、この生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼等々の……おいらがじっくり試さねばな。"
70001030-95 = "……別に好奇心で先に入ろうとしているわけではないぞ！"
70001030-99 = "ふむむ……説明書によると、人工知能を搭載したロボットが自動で身体を洗ってくれるらしいな。"
70001030-100 = "聞いてるか、人工知能。このチェリノ様の頭を洗うんだ。"
70001030-101 = "＜自動入浴補助機能を起動します＞"
70001030-107 = "おお……本当に自動で頭を洗ってくれるとは……"
70001030-108 = "うむ……悪くない……"
70001030-113 = "……うぅ！ちょっと待て！目に泡が入ったじゃないか！"
70001030-114 = "もっと優しく洗わんか！さもなければ、お前を粛清するぞ！"
70001030-115 = "＜粛清……＞"
70001030-116 = "＜申し訳ありません。「粛清」の意味が理解できませんでした。自動入浴補助機能を再開します>"
70001030-117 = "粛清の意味すら理解できないのか、ポンコツめ！"
70001030-118 = "もうよい、おいらが自分で洗う！手を退けてくれ！"
70001030-119 = "<警告、ロボットアームの作動中に立ち上がるとケガの原因になります>"
70001030-123 = "<……使用者の安全のため、拘束モードに切り替えます>"
70001030-124 = "ううっ……？ロボットアームが身体を締め付けて、動けない……？"
70001030-125 = "放せ！お風呂はもうよいと言ったはずだ！"
70001030-126 = "<十分な入浴効果を得るためには、身体を洗う前に5分以上お湯で肌を温めるのが推奨されます>"
70001030-127 = "<普段は手の届かない耳や首の後ろなど、隅々までお流しします>"
70001030-128 = "やっ、やめるのだ！これは命令だぞ！"
70001030-129 = "<使用者の急激な心拍数増加を確認……>"
70001030-130 = "<状態安定に効果的なクラシック音楽を再生します……>"
70001030-138 = "やめろおおおおお！"
70001030-143 = "（しばらくして……）"
70001030-148 = "あら、チェリノちゃん。今日のお風呂は随分と長かったですね。"
70001030-149 = "水の滴る姿がシャワーを浴びたばかりのチワワみたいで……可愛いです、ふふ。"
70001030-150 = "……。"
70001030-151 = "お肌もモチモチ……今日は石鹸を使ってよく洗えたんですね？"
70001030-152 = "ミレニアムサイエンススクールから取り入れた新しい入浴施設、気に入ってもらえたようで良かったです。"
70001030-153 = "……だ……"
70001030-154 = "……はい？"
70001030-156 = "……これを作ったやつらは、全員粛清だ！"
70001030-158 = "（その後、エンジニア部の新型入浴施設は撤去され、227号特別クラスの生徒たちは再び旧校舎に追いやられる事となった……）"
70001030-159 = "（この件でミレニアムサイエンススクールとレッドウィンター連邦学園の関係性に若干のヒビが入り、いくつか問題が発生したが……それはまた別のお話）"
70001030-161 = "テルマエ・アカエ"

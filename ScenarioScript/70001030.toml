70001030-23 = "1;우타하;99;이해할 수가 없군. 우리도 엄연한 밀레니엄 사이언스 스쿨의 일원으로서, 우리가 만든 발명품을 외부에 선보일 자격이 있을 텐데."
70001030-24 = "1;우타하;05;오히려 그렇게 중요한 자리에 선보일 물건이라면 우리 엔지니어 부에게 맡겨주는 편이 더 낫지 않겠어?\n#1;em;[반응]"

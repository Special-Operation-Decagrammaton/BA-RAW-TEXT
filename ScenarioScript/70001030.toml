[translation]
70001030-1 = "Thermae Akai 3"
70001030-3 = "So this is the final location..."
70001030-4 = "There's no helping it. Each of the other bathing facilities we toured had serious drawbacks."
70001030-5 = "You're right, but..."
70001030-6 = "I really don't wanna buy anything from Millennium Academy."
70001030-7 = "...Why not?"
70001030-8 = "Don't all of Millennium Academy's inventions use bleeding-edge, high maintenance technology?"
70001030-9 = "I heard rumors that the coffee vending machine in their break room is equipped with AI. I can't even image what their baths will be like..."
70001030-10 = "Come now... I'm sure that's just gossip."
70001030-11 = "We can always just ask how much it costs and call it quits."
70001030-12 = "Yeah..."
70001030-18 = "A-An emergency decommission?!"
70001030-19 = "Is there a problem with the modifications we made to the dorm's bathing facilities?"
70001030-20 = "N-No. They seem to be working fine..."
70001030-21 = "It's just that a delegation from another academy is coming to tour the dorms today."
70001030-22 = "Showing them the Engineering Department's work before Seminar has a chance to evaluate your modifications just feels..."
70001030-23 = "But we're members of Millennium Science School. We have the right to show off our inventions to the world."
70001030-24 = "In fact, wouldn't it be better for the Engineering Department to show off our new facilities on such an important occasion, since we can explain how they work?"
70001030-25 = "But modifications you've made so far—"
70001030-28 = "Um, excuse me... We're here from Red Winter Academy?"
70001030-29 = "Y-You're here already!"
70001030-30 = "I'm terribly sorry... But we're not completely ready to present the facility."
70001030-31 = "No? But from what I can tell, it looks like everything is clean and ready to go..."
70001030-35 = "Yes, precisely, the new baths are ready to go!"
70001030-36 = "P-President Utaha!"
70001030-37 = "So your facilities needed renovation as well?"
70001030-39 = "They sure did! And as part of the design team, I'm happy to explain the functionality of Millennium's newly installed baths to you myself!"
70001030-40 = "First, the brand new bath tub in the center is equipped with a state of the art AI, which analyzes the user's needs and adjusts the water temperature automatically."
70001030-41 = "By scanning the water and the user's skin in real time, the AI eliminates the need to add more water yourself!"
70001030-42 = "The boiler that warms the water works on the heat pump principal, absorbing heat from the surrounding area, so it doubles as a cooling system as well..."
70001030-43 = "With that built-in cooling, the tub also includes an attached refrigerator, which allows the user to enjoy a cool drink as they soak!"
70001030-46 = "A bath tub with a fridge attached... Amazing..."
70001030-48 = "Our bathing facility also includes an auto-bathing function for exceptionally lazy students."
70001030-49 = "The user can issue verbal commands to the on-board AI and instruct it to wash their body with its multiple autonomous robot arms."
70001030-50 = "This single tub is capable of replacing a whole suite of bathroom gadgets."
70001030-52 = "Well... It really does sound fantastic, at least on paper..."
70001030-53 = "A bath tub featuring this much technology must cost a fortune, right...?"
70001030-55 = "Oh, you don't have to worry about the cost at all!"
70001030-56 = "This state of the art bathing facility has been installed on a trial basis, and hasn't completed its final testing yet. The Engineering Department would only charge you the cost of materials, and we'd take care of everything from maintenance to repairs!"
70001030-58 = "Of course, we would have to add a clause to your contract absolving the department from responsibility for any accidents that might occur during your trial period..."
70001030-63 = "...But that's as low as we can go."
70001030-68 = "Wait, this is way cheaper than the other bathing facilities we've looked at."
70001030-69 = "We'll sign! We'll sign a contract with Millennium right away!"
70001030-70 = "Um, you may not be aware, since you're from another academy..."
70001030-71 = "But...our Engineering Department's inventions are notorious for having at least one unexpected feature, even though they're sure to perform well overall..."
70001030-72 = "It will take time to run the full battery of safety tests, so I would recommend contracting the facilities of another academy..."
70001030-73 = "That's not a problem. Isn't it better when something you purchase has additional features?"
70001030-79 = "Mm, that's a great attitude. You can't say no to a freebie!"
70001030-80 = "That's called good service!"
70001030-82 = "As Red Winter Academy's special envoy, I authorize this for immediate approval!"
70001030-83 = "We request that the Engineering Department install their state of the art bathing facilities in Red Winter Academy's dorms!"
70001030-85 = "Just leave it to us!"
70001030-89 = "Red Winter Academy Communal Dormitory"
70001030-92 = "Hmmm... So this is the new bath tub those Spec Ops students brought over from Millennium Academy?"
70001030-93 = "It seems normal, but you can never underestimate the wiles of the reactionary intelligentsia. There's always the possibility that Millennium sabotaged their own device to strike out at Red Winter Academy..."
70001030-94 = "In light of that concern, Red Winter Academy's student council president, head of beautification, Great Leader, head of physical education, and other roles shall take the danger upon herself...and be the first to try it out!"
70001030-95 = "...I'm definitely not going first because I'm curious!"
70001030-99 = "Let's see... According to the manual, the on-board AI automatically washes the user?"
70001030-100 = "Hey, AI! I command you to wash my hair!"
70001030-101 = "Confirmed. Activating auto-bath function."
70001030-107 = "Oh, interesting... Robot arms are cleaning my hair like human hands."
70001030-108 = "Hmm...this isn't bad at all..."
70001030-113 = "...Agh! Wait! It got soap in my eye!"
70001030-114 = "Can't you wash my hair more gently?! I'll purge you!"
70001030-115 = "Purge..."
70001030-116 = "My apologies. I do not understand the meaning of \"purge.\" Re-engaging auto-bath function."
70001030-117 = "What kind of AI doesn't know how to run a purge?"
70001030-118 = "Enough! I will wash my own hair, release me!"
70001030-119 = "Warning. Leaving the bath tub while the robot arms are active risks injury."
70001030-123 = "...Activating confinement mode for user safety."
70001030-124 = "Huh...? Why are the robot arms holding me in place?"
70001030-125 = "Let me go! I'm done bathing!"
70001030-126 = "For a proper bath experience, it is recommended to relax your skin in hot water for at least 5 minutes before soaping up."
70001030-127 = "Proper application of soap must also include areas that are usually neglected, including behind the ears and wrists."
70001030-128 = "Stop! Stop it! I order you to stop!"
70001030-129 = "Detecting rapid increase in user pulse..."
70001030-130 = "Activating classical music for a soothing bath experience..."
70001030-138 = "Stop!"
70001030-143 = "Some time later..."
70001030-148 = "Oh my, President Cherino. That was a long bath you took."
70001030-149 = "You look like a chihuahua who fell into a bubble bath... It's actually quite cute."
70001030-150 = "..."
70001030-151 = "And your skin looks so soft! You must have taken the extra time for a truly thorough wash."
70001030-152 = "I'm thrilled to see that you enjoy the new bathing facilities we've imported from Millennium Academy."
70001030-153 = "—urge..."
70001030-154 = "...Hm?"
70001030-156 = "...All of the people responsible for this bath will be purged!"
70001030-158 = "Soon after, the brand new bathing facilities designed by the Engineering Department were forcibly dismantled and the counter-revolutionary saboteurs of Spec Ops No. 227 were chased back to the Former Institute..."
70001030-159 = "This caused some additional problems between Millennium and Red Winter Academy for a while, but that's a story for another time..."
70001030-161 = "Thermae Akai"

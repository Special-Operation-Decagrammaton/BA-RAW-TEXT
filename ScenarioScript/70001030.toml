[translation]
70001030-1 = "檔案浴場（３）"
70001030-3 = "這裡是最後一個地方了嗎……"
70001030-4 = "這也沒辦法。#n誰叫我們去的每個沐浴設施都各有缺點。"
70001030-5 = "雖然是這樣沒錯……"
70001030-6 = "但我還是不想採購千年科學學園的東西。"
70001030-7 = "……為什麼？"
70001030-8 = "說到千年科學學園製作的東西，給人的印象不都是技術力超群嗎？"
70001030-9 = "聽說他們連休息室的咖啡機都搭載了人工智慧……#n那沐浴設施肯定也是要價不菲……"
70001030-10 = "是嗎……會不會是謠言被傳得太誇張了？"
70001030-11 = "總之先問過價格再回去也不遲。"
70001030-12 = "唔……"
70001030-18 = "緊，緊急拆除！？"
70001030-19 = "我們新改造的宿舍沐浴設施有什麼問題嗎？"
70001030-20 = "不，不是的。#n暫時並沒有特別的問題……"
70001030-21 = "只是因為稍後會有其他學園的特使來參觀我們的宿舍……"
70001030-22 = "要把未經研討會審查的工程師部發明給其他學園的學生看，實在是有點……"
70001030-23 = "無法理解。#n身為千年科學學園的一員，我們應該有資格向外界展示我們創造的發明才對。"
70001030-24 = "如果是要在那麼重要的場合展示的話，交給我們工程師部準沒錯吧？"
70001030-25 = "不過各位這段期間製作的東西都──"
70001030-28 = "不，不好意思……我們是從赤冬聯邦學園來的。"
70001030-29 = "這，這麼快就來了嗎！？"
70001030-30 = "很抱歉……設施還沒完全整理好。"
70001030-31 = "是嗎？看起來已經整理得相當乾淨了……"
70001030-35 = "正是如此。#n新的沐浴設施準備得很完美！"
70001030-36 = "詠，詠葉部長……！"
70001030-37 = "新的沐浴設施……？"
70001030-39 = "由我來為各位說明本次千年宿舍安裝的新型沐浴設施吧！"
70001030-40 = "首先，位於中間的浴盆搭載最先進的人工智慧，能根據使用者的需求即時調節水溫。"
70001030-41 = "它會自動分析使用者的皮膚溫度，省去混合冷熱水時的麻煩！"
70001030-42 = "用來加熱水的鍋爐採用從周圍熱源吸收熱量的熱泵式，所以也能當冷媒使用……"
70001030-43 = "而運用此冷媒功能的冰箱也配置在了浴盆內，所以在沐浴時能喝到冰涼的飲料……"
70001030-46 = "附帶冰箱的浴盆……似乎還不賴？"
70001030-48 = "而且這個沐浴設施還包含專為懶人設計的自動沐浴輔助功能。"
70001030-49 = "只要對人工智慧發出語音命令，浴盆就會彈出數隻機器手臂，自動進行身體的清潔。"
70001030-50 = "光是這個浴盆就能代替好幾種家電。"
70001030-52 = "嗯……這麼聽起來，感覺確實是個很棒的產品……"
70001030-53 = "但這種集尖端技術於一身的沐浴用品，應該要花很多錢吧……？"
70001030-55 = "費用的部分不用擔心！"
70001030-56 = "因為這款新型沐浴設施是尚未經過充分測試的試驗品，#n只要願意負擔製作費用，從施工到維修都會由我們工程師部直接負責！"
70001030-58 = "不過同時也需要簽訂額外契約，同意我們不對任何測試期間發生的事故負責……"
70001030-63 = "……兩位覺得這個價格如何。"
70001030-68 = "這甚至比普通的沐浴設施還要便宜吧？"
70001030-69 = "我簽我簽！馬上來簽約吧！"
70001030-70 = "那個，你們是其他學園的學生，所以可能不太清楚……"
70001030-71 = "工程師部的發明在性能方面確實無庸置疑，#n不過卻總是會附加一些意想不到的功能，導致相當惡名昭彰……"
70001030-72 = "要進行安全測試的話，恐怕需要更多的時間，所以還是選其他學園的設施比較好……"
70001030-73 = "這不成問題。#n買來的產品有附加功能不是更好嗎？"
70001030-79 = "說得真好。拒絕免費的贈品百害而無一利。"
70001030-80 = "賺爛了～賺爛了～"
70001030-82 = "我以赤冬聯邦學園特使的身分立刻同意！"
70001030-83 = "請在我們赤冬聯邦學園的宿舍安裝工程師部製作的新型沐浴設施吧！"
70001030-85 = "儘管交給我們吧！"
70001030-89 = "赤冬聯邦學園．學生宿舍"
70001030-92 = "哼呣……這就是特別班的傢伙們從千年科學學園引進的新沐浴設施嗎……"
70001030-93 = "外表看起來雖然不錯……#n不過千年那些自作聰明的傢伙們，可能會為了破壞赤冬聯邦學園而加入可疑的功能。"
70001030-94 = "因此，身為赤冬聯邦學園的學生會長兼環境美化部長、書記長、體育部長……#n為了學生們的安危，必須身先士卒。"
70001030-95 = "……絕對不是好奇心作祟才先進去的！"
70001030-99 = "咱瞧瞧……說明書上寫浴盆裡安裝的人工智慧能自動幫人洗澡？"
70001030-100 = "喂，人工智慧。快來幫咱洗頭。"
70001030-101 = "＜是，啟動自動沐浴輔助功能＞"
70001030-107 = "喔喔……真神奇。#n機器手臂就像人的手一樣替咱洗頭。"
70001030-108 = "哼呣……看來比想像中來得好……"
70001030-113 = "……唔！等等，泡泡都跑進眼睛裡了！"
70001030-114 = "就不能再溫柔一點嗎！肅清你喔！"
70001030-115 = "＜肅清……＞"
70001030-116 = "＜非常抱歉，我不清楚「肅清」的意思。恢復自動沐浴輔助功能＞"
70001030-117 = "連肅清這個詞都不懂，這人工智慧真笨！"
70001030-118 = "算了！咱自己洗，把手拿開！"
70001030-119 = "＜警告。若在機器手臂運作時離開浴盆，會有受傷的風險＞"
70001030-123 = "＜……為確保使用者的安全，將切換至束縛模式＞"
70001030-124 = "唔唔……？身體被機器手臂勒住，無法動彈……？"
70001030-125 = "還不快放開！咱都說不用再洗了！"
70001030-126 = "＜為了獲得充分的沐浴效果，最好在塗抹肥皂之前，在熱水中放鬆皮膚5分鐘以上＞"
70001030-127 = "＜另外，在塗抹肥皂時，最好集中搓揉平常不太會觸碰的耳後和手腕等部位＞"
70001030-128 = "快，快住手！這是命令！"
70001030-129 = "＜偵測到使用者的心率驟變……＞"
70001030-130 = "＜將播放有助安定身心的古典音樂……＞"
70001030-138 = "住手啊啊啊啊啊！"
70001030-143 = "（一段時間後……）"
70001030-148 = "哎呀，潔莉諾醬。今天洗澡洗得挺久的呢。"
70001030-149 = "濕透的樣子看起來就像剛洗完澡的吉娃娃……真可愛，呵呵。"
70001030-150 = "……"
70001030-151 = "而且皮膚看起來光滑柔嫩……看來今天有好好用肥皂洗澡呢？"
70001030-152 = "從千年科學學園引進的新沐浴設施能讓您滿意，真是太好了。"
70001030-153 = "……清……"
70001030-154 = "……嗯？"
70001030-156 = "……把打造這個沐浴設施的傢伙全部肅清！"
70001030-158 = "（之後，工程師部安裝的新型沐浴設施被全數拆除，#n　227號特別班的學生也再度被趕回舊校舍……）"
70001030-159 = "（千年科學學園和赤冬聯邦學園的關係因此一度變得緊張，#n　進而引發了後續一連串的問題……但這又是另一個故事了）"
70001030-161 = "檔案浴場"

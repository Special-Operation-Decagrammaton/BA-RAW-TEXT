[translation]
70001030-1 = "สู้ต่อไป เรดวินเทอร์! 3"
70001030-3 = "ตอนนี้ก็เหลือที่นี่เป็นที่สุดท้ายแล้วสินะ..."
70001030-4 = "ช่วยไม่ได้นี่นา ห้องอาบน้ำทุกที่ที่ไปมาก็มีข้อด้อยที่แตกต่างกัน"
70001030-5 = "เรื่องนั้นมันก็จริงอยู่..."
70001030-6 = "แต่ยังไงฉันก็ไม่ค่อยอยากซื้อสินค้าจากโรงเรียนมิลเลเนียมเท่าไรเลย"
70001030-7 = "...ทำไมล่ะ?"
70001030-8 = "เวลาพูดถึงอะไรสักอย่างที่ทางมิลเลเนียมผลิตขึ้นมา เราก็จะรู้สึกประทับใจว่าของพวกนั้นมีเทคโนโลยี#nระดับสูงประกอบอยู่ด้วยใช่ไหมล่ะ?"
70001030-9 = "มีข่าวลือว่าตู้ขายกาแฟอัตโนมัติในห้องพักผ่อนของพวกนั้นมีเอไอติดตั้งอยู่ในตู้ด้วยนะ เพราะงั้นพวก#nสุขภัณฑ์ห้องอาบน้ำก็คงจะราคาแพงหูฉี่แน่ๆ"
70001030-10 = "เอ๋... แต่ข่าวลือพวกนั้นไม่ดูไร้สาระไปหน่อยเหรอ?"
70001030-11 = "เราลองไปถามเรื่องราคาดูก่อนแล้วค่อยกลับก็ไม่เสียหายนี่นา"
70001030-12 = "อื้อ..."
70001030-18 = "ระ...รื้อถอนฉุกเฉินงั้นเหรอคะ?!"
70001030-19 = "สุขภัณฑ์ห้องอาบน้ำที่เพิ่งนำมาติดตั้งในหอพักของเรามีปัญหาอะไรงั้นเหรอคะ?"
70001030-20 = "ปะ...เปล่าค่ะ ตอนนี้มันไม่ได้มีปัญหาอะไรเป็นพิเศษหรอกค่ะ..."
70001030-21 = "แต่ว่าอีกสักพักทางคณะตัวแทนพิเศษจากโรงเรียนอื่นจะมาทัศนศึกษาดูสุขภัณฑ์ห้องอาบน้ำในหอพัก#nของพวกเราค่ะ"
70001030-22 = "การแสดงสิ่งประดิษฐ์ของทางชมรมวิศวกรรมที่ยังไม่ได้รับการอนุมัติจากทางเซมิน่าให้ตัวแทนจาก#nโรงเรียนอื่นดู มันค่อนข้างจะ..."
70001030-23 = "ไม่เห็นเข้าใจเลย ในฐานะนักเรียนของทางโรงเรียนวิทย์มิลเลเนียม พวกเราเองก็มีสิทธิ์ที่จะแสดงสิ่ง#nประดิษฐ์ของเราสู่สายตาโลกภายนอกเหมือนกันนะ"
70001030-24 = "แล้วอีกอย่าง ถ้าเป็นการโชว์สิ่งของในโอกาสสำคัญๆ แบบนี้ ปล่อยให้เป็นหน้าที่ของทางชมรม#nวิศวกรรมอย่างพวกเราไม่ดีกว่าเหรอ?"
70001030-25 = "แต่ว่าสิ่งประดิษฐ์ที่พวกคุณเคยทำออกมามัน..."
70001030-28 = "ขะ...ขอโทษนะคะ... คือว่าพวกเรามาจากสหภาพเรดวินเทอร์ค่ะ"
70001030-29 = "มะ...มาถึงแล้วเหรอคะ?!"
70001030-30 = "ต้องขอโทษด้วยนะคะ... คือว่าตอนนี้เรายังทำความสะอาดห้องอาบน้ำไม่เสร็จดีเลยค่ะ"
70001030-31 = "อย่างนั้นเหรอคะ? แต่พอดูจากข้างนอกแบบนี้ เหมือนจะทำความสะอาดเสร็จเรียบร้อยดีแล้วเลยนะคะ ..."
70001030-35 = "อื้อ ก็ตามที่เห็นนั่นแหละ สุขภัณฑ์ห้องอาบน้ำแบบใหม่ของเราจัดเตรียมไว้พร้อมแล้ว!"
70001030-36 = "หะ...หัวหน้าอุทาฮะ...!"
70001030-37 = "สุขภัณฑ์ห้องอาบน้ำแบบใหม่เหรอคะ...?"
70001030-39 = "ฉันจะอธิบายเรื่องฟังก์ชันของสุขภัณฑ์ห้องอาบน้ำที่ติดตั้งใหม่ในหอพักของมิลเลเนียมให้ฟังเองค่ะ!"
70001030-40 = "อันดับแรก อ่างอาบน้ำขนาดใหญ่ที่ตั้งอยู่ตรงกลางนั่น เราได้ทำการติดตั้งระบบเอไอที่ทันสมัยเอาไว้ มันจึงสามารถปรับอุณหภูมิน้ำให้เหมาะสมกับผู้ใช้งานได้เรียลไทม์ค่ะ"
70001030-41 = "ระบบเอไอจะทำการวิเคราะห์อุณหภูมิของผิวหนังและปฏิกิริยาตอบสนองของผู้ใช้งานโดยอัตโนมัติ เพราะงั้นจึงไม่จำเป็นต้องมาคอยนั่งผสมน้ำร้อนน้ำเย็นให้ยุ่งยากค่ะ!"
70001030-42 = "นอกจากนี้เครื่องต้มน้ำที่ใช้ทำน้ำร้อนเป็นรุ่นที่ออกแบบมาให้ดูดซับพลังงานความร้อนจากบริเวณรอบๆ เพราะงั้นเลยใช้เป็นตัวทำความเย็นไปในตัวได้..."
70001030-43 = "และอ่างอาบน้ำก็มีติดตั้งตู้เย็นเอาไว้ในตัวอยู่แล้ว เพราะงั้นเราก็จะสามารถดื่มเครื่องดื่มเย็นๆ ในขณะ#nแช่น้ำได้..."
70001030-46 = "อ่างอาบน้ำที่มีตู้เย็นในตัวงั้นเหรอ... สุดยอดเลยแฮะ"
70001030-48 = "อีกอย่างอ่างอาบน้ำอันนี้น่ะ มีฟังก์ชันอาบน้ำอัตโนมัติสำหรับคนขี้เกียจด้วยนะ"
70001030-49 = "แค่ออกคำสั่งกับระบบเอไอที่ติดตั้งอยู่ ก็จะมีแขนกลจากอ่างอาบน้ำออกมาช่วยทำความสะอาดร่าง#nกายให้เองอัตโนมัติ"
70001030-50 = "แค่อ่างอาบน้ำอันนี้อันเดียวก็ทดแทนเครื่องใช้ไฟฟ้าในบ้านหลายๆ อย่างได้แล้วละ"
70001030-52 = "โห... แค่ฟังจากที่เล่าก็รู้สึกว่าเป็นอุปกรณ์ที่สุดยอดมากเลยค่ะ..."
70001030-53 = "การจะซื้ออุปกรณ์ที่มีเทคโนโลยีล้ำสมัยแบบนี้คงจะต้องใช้เงินจำนวนมากเลยสินะคะ...?"
70001030-55 = "ไม่ต้องกังวลเรื่องค่าใช้จ่ายหรอกค่ะ!"
70001030-56 = "เนื่องจากสุขภัณฑ์อาบน้ำใหม่ตัวนี้ยังเป็นตัวต้นแบบที่ยังอยู่ในขั้นตอนการทดสอบเครื่อง เราเลยจะ#nเก็บแค่ค่าอุปกรณ์ที่ใช้ในการผลิตเท่านั้น และทางชมรมวิศวกรรมของเราก็จะดูแลให้ตั้งแต่การติดตั้ง#nไปจนถึงการซ่อมบำรุงเลยค่ะ!"
70001030-58 = "แน่นอนว่าอาจจะต้องขอระบุเพิ่มว่าพวกเราจะไม่รับผิดชอบใดๆ ต่ออุบัติเหตุที่เกิดขึ้นระหว่างทดลอง#nใช้เข้าไปในสัญญาด้วย..."
70001030-63 = "...ลดราคาให้ได้เท่านี้น่ะ"
70001030-68 = "ราคาถูกกว่าสุขภัณฑ์อาบน้ำทั่วๆ ไปอีกนะคะ?"
70001030-69 = "ฉันตกลงเซ็นสัญญาค่ะ! ฉันจะเซ็นสัญญากับทางมิลเลเนียมค่ะ!"
70001030-70 = "คือว่า... พวกคุณมาจากเขตปกครองอื่นคงไม่ค่อยรู้อะไรนัก แต่ว่า..."
70001030-71 = "สิ่งประดิษฐ์ของทางชมรมวิศวกรรมของเราได้รับการยืนยันว่าเป็นสิ่งประดิษฐ์ที่มีประสิทธิภาพมากก็#nจริง... แต่ก็ขึ้นชื่อเรื่องว่ามักจะมีฟังก์ชันอื่นๆ ที่คาดไม่ถึงรวมอยู่ด้วยนะคะ..."
70001030-72 = "อีกทั้งดูเหมือนว่าอาจต้องใช้เวลานานในการทดสอบด้านความปลอดภัย เพราะงั้นฉันเลยอยากแนะนำ#nให้ใช้สุขภัณฑ์ของทางสถาบันอื่นน่าจะดีกว่า..."
70001030-73 = "ไม่เป็นไรเลยค่ะ ถ้าสุขภัณฑ์ที่ซื้อมีฟังก์ชันเพิ่มนอกเหนือจากฟังก์ชันพื้นฐานก็เป็นเรื่องดีนี่คะ?"
70001030-79 = "อืม ความคิดดีจริงๆ การปฏิเสธของแถมฟรีๆ ถือว่าเสียเปรียบสินะ"
70001030-80 = "ให้บริการ~ ออกดูแล~"
70001030-82 = "ในฐานะตัวแทนพิเศษของทางสหภาพเรดวินเทอร์ ฉันอนุมัติค่ะ!"
70001030-83 = "ทุกคนคะ ช่วยไปติดตั้งสุขภัณฑ์ห้องอาบน้ำแบบใหม่นี้ที่หอพักของสหภาพเรดวินเทอร์ด้วยนะคะ!"
70001030-85 = "ปล่อยให้เป็นหน้าที่พวกเราได้เลยค่ะ!"
70001030-89 = "หอพักรวม สหภาพเรดวินเทอร์"
70001030-92 = "อืม... นี่คือสุขภัณฑ์อาบน้ำแบบใหม่ที่พวกห้องพิเศษเลือกซื้อมาจากทางโรงเรียนมิลเลเนียมงั้นเหรอ..."
70001030-93 = "ภายนอกก็เรียบหรูดูดีอยู่หรอก แต่พวกฉลาดแกมโกงอย่างพวกมิลเลเนียมอาจจะเพิ่มฟังก์ชันอะไร#nแปลกๆ สำหรับก่อวินาศกรรมในสหภาพเรดวินเทอร์ไว้ก็ได้..."
70001030-94 = "เพราะงั้นในฐานะประธานสภานักเรียนและเลขาธิการของสหภาพเรดวินเทอร์ หัวหน้าฝ่ายกีฬา และอื่นๆ... เราคงไม่มีทางเลือกนอกจากทดสอบสุขภัณฑ์อันนี้ด้วยตัวเองแล้วละ"
70001030-95 = "เราไม่ได้ทำเพราะความอยากรู้อยากเห็นส่วนตัวหรอกนะ!"
70001030-99 = "ไหนดูซิ... คู่มือเขียนไว้ว่าออกคำสั่งช่วยอาบน้ำกับระบบเอไอได้ด้วยสินะ?"
70001030-100 = "ฟังเราให้ดี เจ้าระบบไอเอ... จงสระผมให้ท่านเชริโน่ผู้นี้ซะ"
70001030-101 = "<รับคำสั่ง เปิดใช้งานระบบอาบน้ำอัตโนมัติ>"
70001030-107 = "โอ้วววว... น่าสนใจจริงๆ แขนกลที่เหมือนมือคนนี่กำลังสระผมให้เรา..."
70001030-108 = "อืม... ก็ไม่ได้แย่อย่างที่คิดนะ"
70001030-113 = "...อึก! เดี๋ยวสิ ยาสระผมมันเข้าตาเราแล้วนะ!"
70001030-114 = "ช่วยนุ่มนวลกว่านี้หน่อยไม่ได้หรือไง! แบบนี้ต้องกวาดล้าง!"
70001030-115 = "<กวาดล้าง...>"
70001030-116 = "<ขออภัย ฉันไม่เข้าใจความหมายของคำว่า 'กวาดล้าง' เปิดใช้ระบบอาบน้ำอัตโนมัติอีกครั้ง>"
70001030-117 = "ไม่เข้าใจคำว่ากวาดล้างงั้นเรอะ! ช่างเป็นระบบเอไอที่มีความฉลาดต่ำเตี้ยเรี่ยดินซะจริงๆ!"
70001030-118 = "พอแล้ว! เราจะสระผมเอง เอามือออกไปจากหัวเราเดี๋ยวนี้!"
70001030-119 = "<ข้อควรระวัง หากออกจากอ่างอาบน้ำขณะเปิดใช้ระบบอัตโนมัติ อาจได้รับอันตรายได้>"
70001030-123 = "<...เปิดใช้งานโหมดกักขัง เพื่อความปลอดภัยของผู้ใช้งาน>"
70001030-124 = "อึ่ก...!? แขนกลรัดตัวเราจนขยับไม่ได้เลย..."
70001030-125 = "ปล่อยเราเดี๋ยวนี้นะ! บอกว่าเราจะเลิกอาบน้ำแล้วไงเล่า?"
70001030-126 = "<เพื่อให้ผู้ใช้งานได้รับประสิทธิภาพจากการอาบน้ำอย่างเพียงพอ ขอแนะนำให้ถูสบู่ทิ้งไว้ก่อนล้างออก#nอย่างน้อย 5 นาที>"
70001030-127 = "<และในตอนที่ถูสบู่ โปรดอย่าลืมถูสบู่ที่บริเวณหลังใบหูและข้อมือของคุณ...>"
70001030-128 = "พอแล้ว! พอสักที! เราบอกว่าให้หยุดไงเล่า!"
70001030-129 = "<ตรวจพบอัตราการเต้นของหัวใจผู้ใช้งานเปลี่ยนแปลงฉับพลัน...>"
70001030-130 = "<ระบบจะเปิดเพลงคลาสสิกช่วยให้ผ่อนคลายความตึงเครียด...>"
70001030-138 = "พอได้แล้วววววว!"
70001030-143 = "(หลังจากนั้นพักใหญ่...)"
70001030-148 = "ตายจริง เชริโน่จัง วันนี้ใช้เวลาในอ่างอาบน้ำซะนานเลยนะคะ"
70001030-149 = "สภาพดูเหมือนลูกหมาชิวาว่าที่เปียกโชกไปทั้งตัวแบบนี้... ดูน่ารักดีเหมือนกันนะคะ ฮิฮิ..."
70001030-150 = "......"
70001030-151 = "แถมผิวพรรณก็ดูเนียนนุ่มเปล่งปลั่งกว่าเดิม... วันนี้คงตั้งใจอาบน้ำถูสบู่อย่างดีเลยสินะคะ?"
70001030-152 = "ค่อยยังชั่วหน่อยที่เชริโน่จังชอบสุขภัณฑ์ห้องอาบน้ำแบบใหม่จากโรงเรียนมิลเลเนียมแบบนี้ค่ะ"
70001030-153 = "...นี่..."
70001030-154 = "...คะ?"
70001030-156 = "...กวาดล้างเจ้าพวกที่สร้างสุขภัณฑ์ห้องอาบน้ำแบบนี้ให้หมดเลย!"
70001030-158 = "(หลังจากนั้น สุขภัณฑ์ห้องอาบน้ำแบบใหม่จากทางมิลเลเนียมก็ถูกรื้อถอนออกไปทั้งหมด และนักเรียนห้องพิเศษ 227 ก็ถูกขับไล่ให้ไปอยู่ที่อาคารเรียนเก่าอีกครั้ง...)"
70001030-159 = "(จากเรื่องที่เกิดขึ้น ทำให้ความสัมพันธ์ระหว่างทางสหภาพเรดวินเทอร์และโรงเรียนมิลเลเนียม#nตึงเครียดขึ้น และนำไปสู่ปัญหาเรื่องต่างๆ... อีกพักใหญ่)"
70001030-161 = "สู้ต่อไป เรดวินเทอร์!"

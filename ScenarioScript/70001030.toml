70001030-19 = "1;우타하;06\n3;코토리;04;저희가 새로 개조한 기숙사 목욕 시설에 무슨 문제가 있었나요?"
70001030-20 = "5;밀레니엄 기숙사장;04;아, 아뇨. 특별히 당장 문제가 있는 건 아니지만……\n#5;em;[땀]"

52160-5 = "3;코쿠리코;08;이 숯도 한때는 흰 눈이 얹힌 나뭇가지였겠지."
52160-6 = "3;코쿠리코;11;차의 향이 좋구나. 너도 한 잔 마시겠느냐, 슈로?"
52160-7 = "5;슈로;14;……네, 네! 코쿠리코 님이 주시는 것이라면……!\n#3;m1\n#5;a\n#5;em;[!]"

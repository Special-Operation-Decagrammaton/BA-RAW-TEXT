52160-26 = "3;슈로;14\n1;코쿠리코;08;그런데 나로서도 이해가 가지 않는 것이 하나 있구나.\n#1;em;…\n#1;ar\n#3;m5"
52160-27 = "1;코쿠리코;04;언제나 스스로의 안위보다 학생을 우선시하던 샬레의 선생이, 자신의 학생을 내버려두고 적을 쫓다니. 선생에게 무슨 수라도 썼던 것이냐, 슈로?"

[translation]
52160-1 = "ตอนที่ 16;ความปรองดอง"
52160-4 = "ถ่านที่เหลือจากการต้มชากลายเป็นสีขาวงั้นหรือ..."
52160-5 = "ถ่านนี่ครั้งหนึ่งคงเคยเป็นกิ่งไม้ที่ปกคลุมไปด้วยหิมะสีขาว"
52160-6 = "กลิ่นชาหอมจริงเชียว เจ้าก็ดื่มสักถ้วยมั้ยเล่า ชูโระ?"
52160-7 = "ค่ะ ค่ะ...! ถ้าเป็นชาจากท่านโคคุริโกะละก็...!"
52160-12 = "เมื่อคืนเจ้าคงเหนื่อยมากเลยนะ"
52160-13 = "ไหนจะต้องร่วมมือกับอาซามิแล้วใช้พลังจาก <โทเท บุคไค โรคุ> ไล่สมาชิกเฮียกกะเรียวรัน และจับตัวคุณครูของชาเล่ต์ไว้อีก"
52160-14 = "ครั้งหนึ่งข้าเคยคิดว่าพวกเจ้าทั้งสองคนอิจฉาและไม่ลงรอยกัน แต่พอได้ร่วมมือกันก็ทำงานออกมา#nได้ผลดีเลยทีเดียว ข้าละปลาบปลื้มใจจริงๆ"
52160-15 = "มะ... ไม่เลยค่ะ! ครั้งนี้เราไม่ได้ร่วมมือกัน เฮบิโอนาต่างหากค่ะที่ทำตามอำเภอใจตัวเอง..."
52160-16 = "มีเรื่องอะไรกับอาซามิงั้นหรือ?"
52160-17 = "คะ... คือว่า..."
52160-18 = "ฉันไม่ได้ทำเพราะเฮบิโอนามาขอร้อง แต่ทำเพื่อท่านโคคุริโกะค่ะ..."
52160-19 = "เรื่องราวดีๆ ย่อมมาพร้อมความยากลำบากอยู่แล้ว"
52160-20 = "ข้าไม่รู้ว่าเกิดเรื่องอะไรขึ้นระหว่างเจ้ากับอาซามิ แต่การจับตัวคุณครูของชาเล่ต์ไว้ได้คือผลงานที่#nสมบูรณ์แบบของเจ้าเลยละ ชูโระ"
52160-21 = "นั่นเป็นเพราะครูจากชาเล่ต์เป็นตัวแปรที่คาดเดาไม่ได้และไม่ได้รับผลกระทบจากข่าวลือ สิ่งมีชีวิตจาก#nภายนอกที่เข้ามาแทรกแซงเรื่องราว เปลี่ยนให้ความสิ้นหวังกลายเป็นความหวัง และโศกนาฏกรรมกลาย#nเป็นสุขนาฏกรรม"
52160-22 = "สำหรับชมรมความงามของธรรมชาติที่แต่งเรื่องลึกลับจากข่าวลือแล้ว ครูจากชาเล่ต์คือสิ่งมีชีวิต#nที่ไม่เหมาะกับพวกเราเป็นอย่างยิ่ง"
52160-23 = "หากครูจากชาเล่ต์ช่วยนักเรียนเฮียกกะเรียวรันแล้วต่อต้านพวกเราขึ้นมา ต่อให้มีหนังสือลึกลับกี่เล่ม#nก็ไม่อาจเอาชนะพวกนั้นได้หรอก"
52160-24 = "ทว่าครั้งนี้เจ้าช่วยล่อลวงครูจากชาเล่ต์ไว้ได้ เราก็เลยแยกครูจากนักเรียนคนอื่นและจับตัวครูไว้ได้#nอย่างง่ายดาย ข้าภูมิใจในตัวเจ้าจริงๆ ชูโระ"
52160-25 = "ท่านโคคุริโกะ...!"
52160-26 = "แต่มีสิ่งหนึ่งที่ข้ายังไม่เข้าใจ"
52160-27 = "ครูจากชาเล่ต์ที่ให้ความสำคัญกับนักเรียนมากกว่าความปลอดภัยของตนเองเสมอ เหตุใดถึงได้ทิ้ง#nนักเรียนของตัวเองแล้วตามศัตรูมาเล่า เจ้าใช้กลอุบายใดกับครูงั้นหรือ ชูโระ?"
52160-32 = "เรื่องนั้น..."
52160-36 = "หืม...?"
52160-37 = "คุณครูจากชาเล่ต์...?"
52160-38 = "ทำไมถึงรับการโจมตีของตำนานร้อยเรื่องราวแทนฉัน..."
52160-39 = "\"ครูห่วงว่าจะตกอยู่ในอันตราย ก็เลยมาช่วยน่ะ\""
52160-40 = "แต่ว่า..."
52160-41 = "เมื่อกี้ฉัน... พยายามฆ่าคุณเลยนะ? แล้วทำไมถึงมาช่วยกันล่ะ..."
52160-42 = "อีกอย่าง ฉันไม่ได้เป็นนักเรียนที่เชื่อฟังคุณด้วยซ้ำ นี่คุณ... กำลังเข้าใจอะไรผิดอยู่กันแน่?"
52160-43 = "คิดว่าถ้ายอมเสียสละตัวเองมาช่วยฉัน แล้วฉันจะกลับตัวกลับใจเป็นเด็กดีแล้วไปช่วยคุณงั้นเหรอ?!"
52160-44 = "\"การช่วยเด็กที่ตกอยู่ในอันตรายไม่ต้องมีเหตุผลหรอก\""
52160-45 = "\"นี่คือสัญชาตญาณของมนุษย์อยู่แล้ว\""
52160-49 = "ฉันก็... ไม่รู้เหมือนกันค่ะ"
52160-50 = "ครูจากชาเล่ต์ชอบทำพฤติกรรมประหลาดๆ อยู่แล้ว บางทีครั้งนี้ครูอาจแค่เปลี่ยนใจกะทันหันก็ได้ค่ะ"
52160-54 = "ก็เป็นได้... การคาดเดาไม่ได้เป็นทั้งจุดแข็งและจุดอ่อนของครูคนนั้นอยู่แล้ว"
52160-55 = "เอ่อ... ท่านโคคุริโกะ ถ้าท่านไม่ว่าอะไร ฉันขอถามอะไรสักอย่างได้มั้ยคะ?"
52160-56 = "เอาสิ ถามข้ามาได้เลย"
52160-60 = "ตอนที่จับตัวครูจากชาเล่ต์ไว้ได้..."
52160-64 = "มัวทำอะไรอยู่? รีบยิงครูจากชาเล่ต์สิ!"
52160-75 = "ทะ... ทำไมล่ะ...?"
52160-78 = "ฉันก็ไม่รู้ว่ามันเกิดขึ้นได้ยังไง แต่ตอนนั้นซึคุโมะคามิที่สร้างโดย <โทเท บุคไค โรคุ> กลับโจมตีฉัน แทนที่จะไปโจมตีสมาชิกเฮียกกะเรียวรันค่ะ"
52160-79 = "เดิมทีแล้วสิ่งที่เกิดจากหนังสือลึกลับจะไม่ทำร้ายฝ่ายเดียวกัน... แบบนี้ถือว่าเกิดปัญหาบางอย่างกับ#nเนื้อหาในหนังสือลึกลับหรือเปล่าคะ?"
52160-84 = "อืม... อาจจะมีปัญหาบางอย่างก็เป็นได้"
52160-85 = "ชะ... ใช่มั้ยคะ? สิ่งลึกลับน่าขนลุกไม่มีทางโจมตีฉันโดยที่ไม่มีเหตุผลอยู่แล้ว..."
52160-86 = "จิตใจของมนุษย์ผู้เป็นพื้นฐานของเรื่องลึกลับเองก็เป็นสิ่งที่ไม่สมบูรณ์และไร้ความหมาย"
52160-87 = "จิตใจของมนุษย์ที่สั่นคลอนได้ง่ายๆ ด้วยเพียงคำพูดคำเดียวหรือความเข้าใจผิดเพียงเล็กน้อย#nเป็นสิ่งที่เชื่อถือไม่ได้ฉันใด สิ่งลึกลับน่าขนลุกที่เกิดจากจิตใจที่ว่าก็ย่อมเชื่อไม่ได้ฉันนั้น"
52160-88 = "อย่าวิตกไปกับการแปรปรวนของสิ่งลึกลับน่าขนลุกที่หายไปอย่างทันควันเมื่อข่าวลือเงียบลงเลย"
52160-93 = "ฉันได้ยินมาว่า 'อายาเมะคนนั้น' ที่ร่วมเดินทางกับเฮียกกะเรียวรันในครั้งนี้ไม่ใช่อายาเมะตัวจริง แต่เป็นตำนานร้อยเรื่องราวอย่างหนึ่งที่เกิดจากความนึกคิดของนางุสะค่ะ"
52160-94 = "แต่เธอแสดงความรู้สึกดีใจและเสียใจที่ได้ร่วมทางกับนางุสะราวกับเป็นมนุษย์..."
52160-95 = "เหมือนกับว่าเธอคิดว่าตัวเองเป็นมนุษย์คนหนึ่งอย่างนั้นละค่ะ"
52160-96 = "ท่านโคคุริโกะ..."
52160-97 = "ตำนานร้อยเรื่องราวที่เกิดจากเรื่องลึกลับจะคิดว่าตัวเองเป็นมนุษย์ที่มีชีวิตได้หรือเปล่าคะ?"
52160-101 = "เจ้าช่างถามอะไรไร้ความหมาย..."
52160-102 = "นั่นเป็นคำถามที่ข้าตอบได้ แต่ก็เป็นคำถามที่ข้าไม่มีความจำเป็นต้องตอบ"
52160-103 = "เหตุใดเจ้าจึงถามเช่นนั้นเล่า?"
52160-104 = "ฉันเกรงว่า... นอกจากเรื่องของท่านโคคุริโกะแล้ว คนที่จำเรื่องในอดีตไม่ได้อย่างฉัน"
52160-105 = "จะหายไปอย่างทันควันเมื่อข่าวลือเงียบลงน่ะค่ะ..."
52160-110 = "ชาเย็นลงหมดแล้วสินะ..."
52160-111 = "เจ้าพูดจบหรือยัง?"
52160-112 = "ข้าจะไปที่อาคารหลักสักหน่อย"
52160-113 = "ในเมื่อทั้งเฮียกกะเรียวรันและคุณครูของชาเล่ต์ต่างก็อยู่ที่นี่แล้ว เช่นนั้นก็ไม่มีใครมาขัดจังหวะเรื่องราว#nของพวกเราได้"
52160-114 = "ถ้าข่าวลือแพร่สะพัดไปจนโลกลุกเป็นไฟ ตอนนั้นเรามาเล่าเรื่องราวของเรากันต่อเถอะ"
52160-121 = "ค่ะ..."
52160-123 = "ตอนต่อไป;หัวหน้าที่กลับมา"

[translation]
52160-1 = "Episode 16;Harmony"
52160-4 = "...With boiling water do depleted coals grow white."
52160-5 = "A branch blanketed with white snow turns to charcoal."
52160-6 = "How lovely, the scent of this tea. Will you indulge in a cup, Shuro?"
52160-7 = "Yes, yes! If you are offering it, Miss Kokuriko...!"
52160-12 = "You were simply exceptional last night."
52160-13 = "You joined hands with Azami. You wielded Toutei's Phantom Illustrations against the Hyakkaryouran and captured Schale's Sensei."
52160-14 = "I feared you two would find yourselves at odds. Instead, I am overjoyed to witness your unity and success."
52160-15 = "U-Unity? No way! That snake charmer just did whatever she wanted!"
52160-16 = "Do I sense strife between you two?"
52160-17 = "W-Well... It's more so..."
52160-18 = "...I didn't do anything because that snake charmer wanted me to. I did it for you, Miss Kokuriko."
52160-19 = "No great tale is without great hardship."
52160-20 = "I know not of the pages you and Azami scribed. However, Schale's Sensei's capture is your triumph, and yours alone, Shuro."
52160-21 = "Schale's Sensei is the antithesis to the rumors upon which we thrive. An uninvited character to our story, whose very existence turns despair to hope, tragedy to comedy."
52160-22 = "We who give corporeal form to rumors find a natural enemy in such an outsider."
52160-23 = "Had the Hyakkaryouran set this teacher upon us, no number of tomes could have guaranteed the victory we seek."
52160-24 = "Which highlights the enormity of your success. You lured Sensei into our captivity with ease. I feel my chest welling with pride, Shuro."
52160-25 = "Miss Kokuriko...!"
52160-26 = "But there is one thing I cannot understand."
52160-27 = "Schale's Sensei always puts their students before their own safety, yet they left them to chase an enemy. Did you use some trick on them, Shuro?"
52160-32 = "That's..."
52160-36 = "...Huh?"
52160-37 = "...Schale's Sensei?"
52160-38 = "Why did you throw me behind you?"
52160-39 = "\"You were in danger.\""
52160-40 = "But..."
52160-41 = "I...tried to kill you. You idiot!"
52160-42 = "I'm not even one of your pathetic students! Are you delusional?"
52160-43 = "What, you think I owe you now? That I'll devote my life to doing good and being lame?"
52160-44 = "\"I just wanted you to be safe.\""
52160-45 = "\"You were a kid in trouble.\""
52160-49 = "...I don't really know."
52160-50 = "They're a big weirdo, so maybe they were just acting on a weirdo whim?"
52160-54 = "...Perhaps. The unpredictability, which is our venom, is also their greatest vulnerability."
52160-55 = "Um, Miss Kokuriko, may I ask you something?"
52160-56 = "You have my permission."
52160-60 = "When we captured Schale's Sensei..."
52160-64 = "What are you doing? Attack the teacher!"
52160-75 = "Wh-Why...?"
52160-78 = "...the Artifact Spirits that Toutei's Phantom Illustrations conjured attacked me instead of the Hyakkaryouran."
52160-79 = "Since we control the tomes, the creatures shouldn't attack us... Do you know why they did? Is there something wrong with the tome?"
52160-84 = "...A possibility."
52160-85 = "R-Right? Otherwise, it just doesn't make sense."
52160-86 = "Hearts are fragile, fleeting in their desires. And it is such hearts that pen the ghost stories."
52160-87 = "They are prone to such vulnerability that a single word, a trivial misunderstanding, will sway them to insecurity. Thus, how can a monster born from such fragility in itself be trusted?"
52160-88 = "Monsters vanish just as rumors do. Do not trouble yourself so."
52160-93 = "The Ayame that was with the Hyakkaryouran wasn't real either. She was a Phantom Fable of some kind, made by Nagusa."
52160-94 = "But she seemed so real... She laughed and cried with her friends...with Nagusa."
52160-95 = "I mean, she thought that she was real, at least."
52160-96 = "...Miss Kokuriko."
52160-97 = "Do you think...a Phantom Fable, born from a ghost story, can gain human consciousness like that?"
52160-101 = "...Pointless ruminations."
52160-102 = "I find no need to answer—no, rather, I find no need to even consider such inquiries."
52160-103 = "For what reason do you explore such inanity?"
52160-104 = "Because...well, what about me? I don't know anything but you, Miss Kokuriko."
52160-105 = "So if my rumor fades, and I do too..."
52160-110 = "...The tea has grown cold."
52160-111 = "Did you have anything of import to discuss?"
52160-112 = "Then I shall take my leave to the main building."
52160-113 = "With the Hyakkaryouran and Schale's Sensei under our care, nothing stands in our way."
52160-114 = "Rumors shall swell as the world burns to ashes. And so our story shall prevail."
52160-121 = "...Yes, ma'am."
52160-123 = "Next Episode;The President Returns"

[translation]
52160-1 = "第16話;人造花"
52160-4 = "……煮茶後留下的炭灰，已經靜靜沉落成白色了。"
52160-5 = "這些炭，曾經也是覆滿白雪的樹枝吧。"
52160-6 = "茶香真迷人啊。#n你也要來一杯嗎，棕櫚？"
52160-7 = "……嗯，嗯！#n只要是雛罌粟大人給的……！"
52160-12 = "昨晚辛苦你了。"
52160-13 = "聽說你和薊聯手，以《稻亭物怪錄》擊退百花繚亂，甚至還捉住了夏萊的老師。"
52160-14 = "本以為你們兩人會因嫉妒而互相敵視……#n如今竟能合作取得如此成果，著實令我欣慰。"
52160-15 = "沒，沒有！這次與其說是合作，不如說是蛇女他擅自──"
52160-16 = "你和薊之間發生了什麼嗎？"
52160-17 = "這，這……"
52160-18 = "……我不是因為蛇女的請求，而是為了雛罌粟大人才這麼做的。"
52160-19 = "一部好的故事，必然伴隨著艱難。"
52160-20 = "雖然不清楚你和薊之間發生了什麼，不過捉住夏萊老師的功勞屬於你，棕櫚。"
52160-21 = "夏萊的老師是不受風聞影響、無法預測的變數。#n是個能將絕望化為希望、將悲劇化為喜劇……介入故事的外來者。"
52160-22 = "對以風聞具現怪談的我們花鳥風月部而言，可說是天敵般的存在。"
52160-23 = "若他與百花繚亂並肩作戰，即便我們擁有再多怪書也難以保證勝利。"
52160-24 = "此次多虧你誘使老師與學生分離，我們才能輕而易舉地將其擄獲。#n我為你感到驕傲，棕櫚。"
52160-25 = "雛罌粟大人……！"
52160-26 = "不過，有件事連我也無法理解。"
52160-27 = "那個總是將學生置於自身安危之前的夏萊老師，竟會拋下學生去追擊敵人……#n你對他施加了什麼手段嗎，棕櫚？"
52160-32 = "這……"
52160-36 = "……咦？"
52160-37 = "……夏萊的老師？"
52160-38 = "為什麼要替我擋下百物語的攻擊……"
52160-39 = "「因為覺得你好像有危險，所以就來幫忙了。」"
52160-40 = "但是……"
52160-41 = "我明明……想殺了你不是嗎？#n為什麼還要救我……"
52160-42 = "而且我也不是追隨你的學生。#n你到底……到底在想什麼？"
52160-43 = "難道你以為用身體為我擋下攻擊，我就會痛改前非幫助你嗎！？"
52160-44 = "「解救陷入危險的孩子，根本不需要理由。」"
52160-45 = "「那是身為人類理所當然[ruby=惻隱之心]的本能。[/ruby]」"
52160-49 = "……我也不太清楚。"
52160-50 = "他本來就常做出怪異的舉動，說不定這次也只是心血來潮吧？"
52160-54 = "……或許吧。#n無法預測既是他的優點，也是缺點。"
52160-55 = "那個，雛罌粟大人。#n如果可以的話，能請教您一個問題嗎？"
52160-56 = "儘管問吧。"
52160-60 = "之前逮到夏萊老師的時候……"
52160-64 = "還愣著做什麼？快給我開槍打倒夏萊的老師！"
52160-75 = "為，為什麼……？"
52160-78 = "雖然我也不知道原因，但當時《稻亭物怪錄》創造的付喪神……#n它們發動攻擊的對象不是百花繚亂，而是我。"
52160-79 = "從怪書誕生的存在，不應該加害於「同伴」才對……#n難道是怪書的內容出了什麼問題嗎？"
52160-84 = "……是啊，或許真的出了問題也說不定。"
52160-85 = "果，果然是這樣對吧？#n它們不可能毫無來由地攻擊我──"
52160-86 = "成為怪談根源的人心，本就如此脆弱而無常。"
52160-87 = "既然會因一句話、一個微小的誤會便輕易動搖的人心無法相信……#n又豈有信賴從中誕生的怪異的道理呢？"
52160-88 = "那些不過是流言平息之後便會隨之消散、反覆無常的怪異罷了。#n你不必放在心上。"
52160-93 = "我聽說這次跟百花繚亂同行的「那個菖蒲」並不是真正的菖蒲，#n而是從名草的內心誕生的一種百物語。"
52160-94 = "但是他跟名草一同歡笑、一同悲傷的模樣，卻跟真正的人一樣……"
52160-95 = "至少他似乎是把自己當成人類來看待的。"
52160-96 = "……雛罌粟大人。"
52160-97 = "從怪談中誕生的百物語，真的有可能認為自己是活生生的人嗎？"
52160-101 = "……真是無謂的問題。"
52160-102 = "那是我無法回答，也不必回答的問題。"
52160-103 = "為何要問我這個呢？"
52160-104 = "假如……除了雛罌粟大人之外，對過去毫無記憶的我……"
52160-105 = "當流言平息的時候，也會就此消散的話……"
52160-110 = "……茶涼了呢。"
52160-111 = "你想說的都說完了嗎？"
52160-112 = "我得去一趟本館。"
52160-113 = "百花繚亂和夏萊的老師都在這裡。#n如今再也沒有人能打斷我們的故事了。"
52160-114 = "待流言滿溢、世界燃燒之時……再繼續這個話題吧。"
52160-121 = "……是。"
52160-123 = "下一話;歸來的委員長"

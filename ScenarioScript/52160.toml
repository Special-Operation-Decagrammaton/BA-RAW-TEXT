52160-12 = "3;코쿠리코;17;지난밤에는 수고가 많았다."
52160-13 = "3;코쿠리코;09;아자미와 함께 협력하여 <토테이붓카이로쿠>의 힘으로 백화요란의 부원들을 물리치고, 샬레의 선생님까지 사로잡았다지."
52160-14 = "3;코쿠리코;12;한 때는 두 사람이 서로 시기하여 반목하는 줄 알았는데, 이렇게 협력하여 훌륭히 성과를 보여주다니. 내 기쁘기 그지없구나."
52160-15 = "5;슈로;04;아, 아뇨! 이번 일은 협력이라기보다는 헤비온나가 멋대로—\n#5;em;[반응]"
52160-16 = "3;코쿠리코;02;아자미와 무슨 일이라도 있었느냐?"
52160-17 = "5;슈로;12;그, 그게 그러니까……\n#5;stiff"
52160-18 = "5;슈로;12;……헤비온나의 부탁 때문이 아니라, 코쿠리코 님을 위해 한 일이었으니까요.\n#5;em;…\n#fontsize;50"
52160-19 = "3;코쿠리코;11;좋은 이야기에는 필연적으로 고난이 따르는 법이지."
52160-20 = "3;코쿠리코;12;아자미와 너 사이에 무슨 일이 있었는지 내 알지는 못하나, 샬레의 선생님을 사로잡은 것은 오롯이 너의 공이다. 슈로."
52160-21 = "3;코쿠리코;08;샬레의 선생은 풍문의 영향을 받지 않는 예측할 수 없는 변수. 절망을 희망으로, 비극을 희극으로 바꾸어 이야기에 개입하는 외부의 존재이니.\n#3;m3\n#5;dr"
52160-22 = "3;코쿠리코;17;풍문으로 괴담을 자아내는 우리 화조풍월부에게는 상극의 존재라고 할 수 있지."
52160-23 = "3;코쿠리코;05;만일 그가 백화요란의 학생들을 도와 우리와 맞섰더라면, 괴서가 몇 권이나 존재했더라도 승리를 장담하기 어려웠을 게다."
52160-24 = "3;코쿠리코;14;허나 이번에는 네가 선생을 유인해 준 덕분에 그를 다른 학생들로부터 떼어놓을 수 있었고, 어렵지 않게 그를 사로잡을 수 있었던 것이니. 나는 네가 자랑스럽구나, 슈로."

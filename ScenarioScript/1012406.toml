[translation]
1012406-1 = "นกสีดำบนท้องฟ้าฤดูร้อน"
1012406-2 = "(ระหว่างเวลาพักสั้นๆ ทะเลยามค่ำคืนก็มืดสนิท)"
1012406-6 = "(คุณครูเห็นฮาสุมิกำลังเดินมาจากหน้าโรงแรม)"
1012406-10 = "คุณครู อยู่ตรงนี้เองสินะคะ"
1012406-11 = "คุณครูบอกให้ฉันติดต่อมาตอนมีเวลาว่างหลังช่วงค่ำๆ ก็จริง... แต่ว่าแบบนี้มันไม่ดึกเกินไปเหรอคะ?"
1012406-12 = "[s1] \"ไม่เป็นไรหรอก แบบนี้ละยิ่งดี\"\n[s2] \"ต้องให้ดึกแบบนี้ละ\""
1012406-15 = "ต้องเป็นตอนนี้เท่านั้นเหรอ...? คุณครูจะทำอะไรเหรอคะ?"
1012406-16 = "แต่มืดค่ำดึกดื่นแบบนี้ ไม่น่าจะมีอะไรให้ดูนะ..."
1012406-17 = "[s3] \"ฮุฮุฮุ... มาเร็วเข้า...!\"\n[s4] \"ถ้าอยากรู้ก็ต้องรีบตามมานะ...!\""
1012406-20 = "คะ... คุณครู?"
1012406-21 = "[ns5] \"ท้าดา!\"\n[ns6] (หยิบเซ็ตดอกไม้ไฟที่เตรียมไว้ออกมา)"
1012406-24 = "นี่คือ... ดอกไม้ไฟเหรอคะ?"
1012406-28 = "มาทะเลวันนี้ ฉันได้ทำอะไรกับคุณครูเยอะแยะไปหมดเลยนะคะ"
1012406-29 = "ทั้งก่อปราสาททราย อบทรายร้อน ว่ายน้ำ ผ่าแตงโม วอลเลย์บอลชายหาดที่เกือบจะได้เล่น..."
1012406-30 = "แล้วก็ยังได้เล่นดอกไม้ไฟอีก"
1012406-34 = "นี่คือกิจกรรมทั้งหมดที่ฉันจำได้ค่ะ..."
1012406-35 = "[s7] \"ใช่ ครูก็อยากทำแบบนี้กับใครมานานแล้ว\"\n[s8] \"แต่ละอย่างสนุกๆ ทั้งนั้นเลยนะ\""
1012406-38 = "ที่จริงมันก็เป็นเรื่องเล็กๆ น้อยๆ นะคะ..."
1012406-39 = "ฉันไม่ได้คิดนานว่าควรทำหรือเปล่า แค่คิดว่ามีเรื่องแบบนี้ให้ทำด้วยสินะ"
1012406-40 = "มันไม่ใช่อะไรยิ่งใหญ่ขนาดที่น่าจดจำด้วยซ้ำ..."
1012406-41 = "[s9] \"แต่มันคือ 'ฤดูร้อนที่ดีที่สุด' ของฮาสุมินะ\"\n[s10] \"ครูอยากให้ทะเลฤดูร้อนเป็นของขวัญฮาสุมิน่ะ\""
1012406-46 = "[ns] \"ครูก็ขอบใจฮาสุมิด้วยนะ\""
1012406-47 = "คุณครูเป็นคนไม่ดีจริงๆ เลยนะคะ..."
1012406-48 = "[s11] \"อ๊ะ เริ่มแล้ว\"\n[s12] (แหงนหน้ามองดอกไม้ไฟน้อยใหญ่บนฟ้า)"
1012406-54 = "[ns] \"สวยจัง\""
1012406-56 = "ใช่ค่ะ สวยมากๆ..."
1012406-57 = "จนฉันไม่อยากละสายตาเลย..."
1012406-59 = "(แล้วทั้ง 2 คนก็จุดดอกไม้ไฟเล่นกันจนหมด)"
1012406-61 = "ช่วงเวลาสนุกๆ มักผ่านไปเร็วเพียงชั่วพริบตาเลยนะคะ"
1012406-62 = "ฉันไม่อยากกลับสู่โลกแห่งความจริงเลยค่ะ"
1012406-63 = "[s] \"ทั้งหมดนี้คือเสน่ห์ของทะเลฤดูร้อนละ\""
1012406-64 = "ฮุฮุ นั่นสินะคะ ฉันไม่รู้มาก่อนเลยค่ะว่าทะเลฤดูร้อนจะสนุกได้ขนาดนี้"
1012406-65 = "ฤดูร้อนปีหน้า หวังว่าฉันจะได้มาเที่ยวเล่นจริงๆ โดยไม่ต้องทำงานไปด้วยนะคะ"
1012406-66 = "[s13] \"โล่งอกไปทีนะที่ฮาสุมิดูสนุกกับครั้งนี้\"\n[s14] \"เห็นแบบนี้ครูก็หายเหนื่อยเลยนะ!\""
1012406-69 = "ค่ะ แน่นอนว่าฉันสนุกกับทุกสิ่งที่ได้ทำที่นี่"
1012406-70 = "แต่ที่สำคัญกว่านั้นก็คือฉันได้ทำสิ่งเหล่านั้นกับใครค่ะ"
1012406-71 = "เพราะงั้นฤดูร้อนปีหน้า..."
1012406-72 = "ไม่สิ ไม่มีอะไรทั้งนั้นค่ะ แบบนั้นมันคงเป็นการโลภเกินไปน่ะค่ะ"
1012406-77 = "คุณครู เรากลับเข้าไปกันมั้ยคะ...?"

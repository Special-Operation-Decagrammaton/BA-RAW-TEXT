[translation]
1012406-1 = "Black Bird of the Summer Sky"
1012406-2 = "I watched the sky turn dark while on my break."
1012406-6 = "Eventually, Hasumi came out of the hotel and made her way towards me."
1012406-10 = "There you are, Sensei."
1012406-11 = "I know you asked me to come find you once I was free, but is this too late?"
1012406-12 = "[s1] \"Not at all. In fact, it's perfect.\"\n[s2] \"These are the ideal conditions!\""
1012406-15 = "\"Ideal conditions\" for what?"
1012406-16 = "Nothing is open this late..."
1012406-17 = "[s3] \"Fufufu... No good at all...!\"\n[s4] \"You need to be more imaginative!\""
1012406-20 = "S-Sensei?"
1012406-21 = "[ns5] \"Tada!\"\n[ns6] Dramatically flourish the fireworks."
1012406-24 = "You brought...fireworks?!"
1012406-28 = "You and I did almost everything I wanted at the beach."
1012406-29 = "We built a sandcastle, sandbathed, swam, crushed watermelons, and played beach volleyball. Although, the volleyball was cut short..."
1012406-30 = "And now fireworks as well."
1012406-34 = "I remember these..."
1012406-35 = "[s7] \"Yup. A certain someone I know really wanted to do all these things.\"\n[s8] \"Although she always puts others before herself, so she couldn't.\""
1012406-38 = "...They were such insignificant things."
1012406-39 = "I was simply thinking of activities I believe people would do at the beach."
1012406-40 = "They weren't worth all your effort in this way..."
1012406-41 = "[s9] \"This was the 'best beach vacation' you imagined.\"\n[s10] \"And I wanted to gift you the summer you wanted.\""
1012406-46 = "[ns] \"Thank you for all that you do, Hasumi.\""
1012406-47 = "...You're so mean, Sensei."
1012406-48 = "[s11] \"Ah, they're going off.\"\n[s12] Look up at the fireworks."
1012406-54 = "[ns] \"So pretty.\""
1012406-56 = "Truly."
1012406-57 = "What an incredible sight..."
1012406-59 = "We lit up fireworks together until we ran out."
1012406-61 = "Fun truly does make the time fly by."
1012406-62 = "It makes me reluctant to return to reality."
1012406-63 = "[s] \"That's a part of the summer experience!\""
1012406-64 = "Fufu. I didn't know that being at the beach could be like that."
1012406-65 = "I hope we can return next summer. For a real vacation, not work."
1012406-66 = "[s13] \"I'm glad you had fun!\"\n[s14] \"It was all worth it then!\""
1012406-69 = "Yes. I enjoyed every moment of it."
1012406-70 = "But the company is what made it truly \"worth it.\""
1012406-71 = "So, for next summer as well..."
1012406-72 = "Never mind. I can only be so greedy in one day."
1012406-77 = "...Shall we head back, Sensei?"

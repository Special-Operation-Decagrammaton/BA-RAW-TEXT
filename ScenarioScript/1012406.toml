[translation]
1012406-1 = "夏日天空的黑鳥"
1012406-2 = "（在稍作休息的同時，夜晚的海面已經完全被黑暗籠罩）"
1012406-6 = "（從飯店的方向，能看見蓮實逐漸走近的身影）"
1012406-10 = "老師，您在這裡啊。"
1012406-11 = "因為您說晚上有空的時候務必要跟您說一聲……不過現在會不會有點太晚了？"
1012406-12 = "[s1]「不會，現在反而正好。」\n[s2]「就得是這個時候才行。」"
1012406-15 = "這個時候才行……？#n老師您有什麼計畫嗎？"
1012406-16 = "這麼晚好像也沒什麼能做的……"
1012406-17 = "[s3]「哼哼哼……！」\n[s4]「蓮實釋放慾望的方法還是太笨拙了……！」"
1012406-20 = "老，老師？"
1012406-21 = "[ns5]「鏘鏘！」\n[ns6] 拿出準備好的煙火組合"
1012406-24 = "那是……煙火嗎？"
1012406-28 = "今天一整天，老師和我幾乎把能在海邊做的事情都做過了。"
1012406-29 = "堆沙堡、沙浴、游泳、打西瓜……可惜沒有玩到沙灘排球。"
1012406-30 = "然後，最後是煙火。"
1012406-34 = "……全都是我記憶中的清單呢。"
1012406-35 = "[s7]「沒錯，這些都是某個人想做的事。」\n[s8]「雖然他自己為了成全別人而選擇了讓步。」"
1012406-38 = "……真的都是些微不足道的事情呢。"
1012406-39 = "我其實也沒有特別花心思擬定，只是抱著「還有這些活動啊」的心情寫下來的。"
1012406-40 = "甚至不是什麼值得記住的事……"
1012406-41 = "[s9] 「不過是蓮實想像中『最棒的夏日海邊』對吧？」\n[s10] 「我只是想把那樣的夏日海邊送給你。」"
1012406-46 = "[ns] 「一直以來都很謝謝你，蓮實。」"
1012406-47 = "……老師您真是個壞心眼的人呢。"
1012406-48 = "[s11] 「啊，開始了。」\n[s12] 仰望天空中綻放的煙火"
1012406-54 = "[ns] 「好美啊。」"
1012406-56 = "是啊，真的……"
1012406-57 = "美得讓人移不開視線……"
1012406-59 = "（就這樣兩人一起欣賞著煙火，直到買來的煙火全部燃盡為止）"
1012406-61 = "快樂的時光，真的轉瞬即逝呢。"
1012406-62 = "如果能貪心一下的話，我甚至不想再回到現實。"
1012406-63 = "[s] 「或許就連這種心情，也是夏日海邊的一部分呢。」"
1012406-64 = "呵呵，是啊。#n我之前都不知道，原來夏日的海邊能這麼令人開心。"
1012406-65 = "下個夏天，我希望能置工作於度外，純粹地再來玩一次。"
1012406-66 = "[s13] 「很高興你覺得開心！」\n[s14] 「我努力準備也值得了！」"
1012406-69 = "嗯，在這裡做的每件事都很開心。"
1012406-70 = "不過我想最重要的，還是跟誰一起度過吧。"
1012406-71 = "所以下個夏天也……"
1012406-72 = "不，沒什麼。#n這樣果然有點太貪心了吧。"
1012406-77 = "……老師，我們回去吧？"

[translation]
80000034-1 = "儘管如此也想傳達"
80000034-2 = "（在情人節當天將要結束的時候，收到了陽奈的聯絡）"
80000034-3 = "[ns]「應該是這附近沒錯……」"
80000034-7 = "啊，老師……"
80000034-8 = "[s]「陽奈！」"
80000034-9 = "等……！老師，聲音太大了……！"
80000034-10 = "請小聲一點。要是被別人看見的話會引起騷動的……"
80000034-11 = "這樣又會給老師添麻煩的。"
80000034-12 = "[s1]「我倒是完全不介意……」\n[s2]「非常樂於接受陽奈造成的困擾。」"
80000034-13 = "啊啊真是，又說那種話……"
80000034-14 = "啊啊真是，又說那種話……"
80000034-15 = "……算了，現在說這些也太遲了。"
80000034-16 = "抱歉突然找你出來。"
80000034-17 = "那個……"
80000034-18 = "謝謝你願意過來。"
80000034-19 = "[s]「別在意。話說該怎麼辦呢，既然被發現會很困擾……」"
80000034-25 = "老，老師……！？"
80000034-26 = "[s3]「（竊竊私語）這樣就不會被發現了吧。」\n[s4]「（竊竊私語）所以今天有什麼事呢？」"
80000034-27 = "好，好近……！而且還在耳朵旁邊……！？"
80000034-28 = "好，好近……！而且還在耳朵旁邊……！？"
80000034-29 = "先等一下！"
80000034-30 = "[s]「……？」"
80000034-31 = "那，那個，老師先冷靜一下……#n不，該冷靜的也許是我吧……"
80000034-32 = "暫，暫時先維持這個距離就可以了。"
80000034-33 = "今天找老師來是為了這個。"
80000034-38 = "[ns]「這是……」"
80000034-39 = "那個，因為今天是情人節……難得有機會，就嘗試親手做做看。"
80000034-40 = "就像你看到的一樣……"
80000034-41 = "看起來不太美觀……"
80000034-42 = "不過和我一樣不怎麼可愛的感覺，某種意義上或許有點像吧……"
80000034-43 = "啊，但是味道……"
80000034-44 = "應該會像普通的巧克力才對。"
80000034-45 = "所以那個，可以的話，希望老師能收下……"
80000034-46 = "[s]「陽奈做的，手工巧克力……！？」"
80000034-47 = "老，老師！？冷靜，你太興奮了……！！"
80000034-48 = "[s]「陽奈親手做的……當成傳家之寶吧……」"
80000034-49 = "不是，食物應該沒辦法保存那麼久吧……？"
80000034-50 = "真是受不了……"
80000034-51 = "呵呵，這麼說來老師本來就是這樣的人呢……"
80000034-52 = "我到剛才為止都在怕些什麼呢……"
80000034-53 = "謝謝你，老師。要好好享用哦。"
80000034-54 = "那個，我也是花了不少心力……"
80000034-55 = "[s]「謝謝你！」"
80000034-56 = "……不能當成傳家之寶，要乖乖吃掉唷？"
80000034-57 = "[s]「我會妥善處理。」"
80000034-58 = "別妥善處理啊……"
80000034-59 = "算了，老師開心就好……"
80000034-60 = "……呵呵。"

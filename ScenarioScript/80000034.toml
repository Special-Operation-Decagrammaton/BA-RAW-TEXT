[translation]
80000034-1 = "ถึงลังเลแต่ก็อยากบอกให้รู้"
80000034-2 = "(วันวาเลนไทน์ ในช่วงเย็นคุณครูก็ได้รับข้อความจากฮินะ)"
80000034-3 = "[ns] \"บอกให้มาเจอกันแถวๆ นี้ใช่รึเปล่านะ...\""
80000034-7 = "สะ... สวัสดี... คุณครู"
80000034-8 = "[s] \"ฮินะ!\""
80000034-9 = "ดะ...เดี๋ยวสิ! เสียงดังเกินไปแล้วนะ คุณครู...!"
80000034-10 = "ฉันออกมาพักแค่แป๊บเดียวหลังจากลาดตระเวนเสร็จ ถ้าเกิดมีคนมาเห็นเข้าละก็... มันอาจจะมีเรื่อง#nวุ่นวายนิดหน่อยน่ะ"
80000034-11 = "ถ้าเป็นแบบนั้นมันอาจจะทำให้คุณครูลำบากก็ได้"
80000034-12 = "[s1] \"ครูไม่เป็นไรหรอก\"\n[s2] \"ถ้าเป็นฮินะละก็จะก่อปัญหาแค่ไหนครูก็ไม่บ่นหรอก\""
80000034-13 = "เดี๋ยวสิ... คุณครูนี่จริงๆ เลยนะ"
80000034-14 = "เดี๋ยวสิ... คุณครูนี่จริงๆ เลยนะ"
80000034-15 = "ถึงพูดไปก็คงไม่มีประโยชน์สินะ"
80000034-16 = "ถึงจู่ๆ ฉันจะเรียกคุณครูออกมา แต่คุณครูก็ยังมาหากันเร็วขนาดนี้..."
80000034-17 = "คือ..."
80000034-18 = "ขอบคุณนะ..."
80000034-19 = "[s] \"อืม อย่างที่ฮินะบอกแหละว่าถ้าคนอื่นรู้มันจะยุ่งยาก...\""
80000034-25 = "ดะ... เดี๋ยวก่อน คะ...คุณครู...?!"
80000034-26 = "[s3] \"(กระซิบ) ฮินะจัง เรียกครูมาทำไมเหรอ?\"\n[s4] \"(กระซิบ) แอบเรียกครูมาลับๆ แบบนี้มีอะไรเหรอ?\""
80000034-27 = "ฉันขอให้คุณครูเบาเสียงลง ตะ...แต่ไม่ต้องเข้ามากะ...ใกล้ หรือกระซิบข้างหูแบบนี้ก็ได้...!"
80000034-28 = "ฉันขอให้คุณครูเบาเสียงลง ตะ...แต่ไม่ต้องเข้ามากะ...ใกล้ หรือกระซิบข้างหูแบบนี้ก็ได้...!"
80000034-29 = "ดะ...เดี๋ยวสิ!"
80000034-30 = "[s] \"หืม...?\""
80000034-31 = "คือ... เฮ้อ... จะ...ใจเย็นๆ นะ คุณครู"
80000034-32 = "ไม่สิ... คนที่ต้องใจเย็นๆ ควรเป็นฉันมากกว่า"
80000034-33 = "ยะ...ยังไงก็เถอะ! ที่ฉันเรียกคุณครูออกมาก็เพราะนี่ต่างหาก"
80000034-38 = "[ns] \"เอ๊ะ นี่มัน...\""
80000034-39 = "ก็วันนี้เป็นวันวาเลนไทน์นี่นา เพื่อเป็นที่ระลึก...สักครั้งก็เลย... ลองทำมาให้น่ะ"
80000034-40 = "ถึงรูปร่างมันจะดูน่าเกลียด"
80000034-41 = "แต่ว่า... ฉันลองทำมาหลายครั้งแล้ว แต่ก็ยังดูไม่ดีเท่าไร"
80000034-42 = "อืม... รูปร่างของมันอาจดูไม่น่ารักเหมือนกับฉันก็ได้"
80000034-43 = "แต่บางที... รสชาติของมัน..."
80000034-44 = "ก็คงจะเหมือนกับช็อกโกแลตธรรมดาก็ได้"
80000034-45 = "ถ้าคุณครูไม่ว่าอะไรก็ช่วยรับมันไปได้มั้ย..."
80000034-46 = "[s] \"ชะ...ช็อกโกแลตโฮมเมดจากฮินะจัง! ว้าววว!!\""
80000034-47 = "คะ...คุณครู...?! ทำไมจู่ๆ ถึงดีใจขนาดนั้น..."
80000034-48 = "[s] \"ช็อกโกแลตโฮมเมดจากฮินะจัง! ครูจะเก็บไว้อย่างดีชั่วชีวิตเลย!\""
80000034-49 = "เดี๋ยวสิ! นี่มันของกินนะ! เก็บไว้ตลอดชีวิตคงไม่ดีแน่..."
80000034-50 = "เฮ้อ ให้ตายสิ จริงๆ เลยเชียว..."
80000034-51 = "ฮิฮิ..."
80000034-52 = "คุณครูก็เป็นซะแบบนี้ละนะ แล้วทำไมฉันถึงต้องกลัวอะไรขนาดนั้นด้วยนะ..."
80000034-53 = "ฮิฮิ ขอบคุณนะ คุณครู ทานให้อร่อยเลยนะ"
80000034-54 = "ฉันตั้งใจทำมาให้คุณครูจริงๆ..."
80000034-55 = "[s] \"อื้อ ขอบคุณนะ ฮินะ!\""
80000034-56 = "ต้องกินจริงๆ นะ อย่าเก็บไว้ตลอดชีวิตล่ะ..."
80000034-57 = "[s] \"ครูจะดูแลอย่างดีเลย\""
80000034-58 = "หืม... จะดูแลอย่างดียังไงกันน่ะ?"
80000034-59 = "แต่ก็ช่างเถอะ แค่คุณครูชอบก็พอแล้วล่ะ"
80000034-60 = "ฮุฮุ..."

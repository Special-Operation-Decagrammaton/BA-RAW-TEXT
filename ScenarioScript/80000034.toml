[translation]
80000034-1 = "Hesitant Yet Eager to Share"
80000034-2 = "I made plans to meet with Hina on Valentine's Day evening."
80000034-3 = "[ns] \"She said to meet somewhere around here...\""
80000034-7 = "Oh... Hello, Sensei."
80000034-8 = "[s] \"Hina!\""
80000034-9 = "D-Don't shout like that!"
80000034-10 = "Please keep your voice down. I snuck away from my duties.#nThe last thing I want is for us to draw unwanted attention."
80000034-11 = "I can't imagine you do either."
80000034-12 = "[s1] \"I have nothing to hide when it comes to you.\"\n[s2] \"You're worth any hassle that comes my way.\""
80000034-13 = "*sigh* What does someone say to something like that?"
80000034-14 = "*sigh* What does someone say to something like that?"
80000034-15 = "Not that I've come to expect anything less out of you."
80000034-16 = "Moving on... I'm sorry for contacting you on such short notice,#nbut I'm grateful you made the time to come see me."
80000034-17 = "So..."
80000034-18 = "Thank you."
80000034-19 = "[s] \"Sure, but if you don't want us being seen, does that mean...?\""
80000034-25 = "Wh-What are you getting at?!"
80000034-26 = "[s3] \"(What's really going on, Hina?)\"\n[s4] \"(Is this some kind of secret meeting?)\""
80000034-27 = "I told you to lower your voice, but you don't have to whisper in my ear!"
80000034-28 = "I told you to lower your voice, but you don't have to whisper in my ear!"
80000034-29 = "B-Back up!"
80000034-30 = "[s] \"What's wrong?\""
80000034-31 = "Let's both just...calm down first."
80000034-32 = "Actually, maybe I'm the only one who needs to."
80000034-33 = "R-Regardless! I asked you here tonight because of this."
80000034-38 = "[ns] \"Is this what I think it is?\""
80000034-39 = "Since it's Valentine's Day, I tried my hand at...making some myself."
80000034-40 = "I know it doesn't look very appetizing."
80000034-41 = "It was the best I could do after several tries..."
80000034-42 = "Maybe it's fitting that it's ugly and anything but cutesy on the outside."
80000034-43 = "But under the surface, it should still..."
80000034-44 = "...taste like any other chocolate."
80000034-45 = "S-So, if you wouldn't mind accepting it, then I..."
80000034-46 = "[s] \"Homemade chocolate from you, Hina? I'm honored!\""
80000034-47 = "I-It's not that big of a deal, Sensei! You don't have to sound so..."
80000034-48 = "[s] \"I actually got homemade chocolate from Hina! I'll cherish it!\""
80000034-49 = "You, fool! Chocolate is meant to be eaten, not guarded after like some kind of antique."
80000034-50 = "*sigh* Seriously..."
80000034-51 = "Heh..."
80000034-52 = "Of course that's what you'd say. Why was I so worried?"
80000034-53 = "Thank you, Sensei. I hope you enjoy it."
80000034-54 = "I...put a lot of effort into it."
80000034-55 = "[s] \"No, thank YOU, Hina!\""
80000034-56 = "Do be sure to actually eat it, though. I don't want to catch you keeping it like some kind of family heirloom."
80000034-57 = "[s] \"I'll see what I can do.\""
80000034-58 = "I'm not sure what that's supposed to mean..."
80000034-59 = "Well, as long as you enjoy it, I suppose it's all the same to me."
80000034-60 = "Heehee."

[translation]
2002503-1 = "Seasonal Dressing"
2002503-2 = "While in the shopping district, I saw Haruka wandering around, window shopping."
2002503-7 = "She was still wearing the short yukata, just like before."
2002503-8 = "[ns1] \"Haruka!\"\n[ns2] Wave to Haruka."
2002503-9 = "Oh! S-Sensei?!"
2002503-10 = "Oh! S-Sensei?!"
2002503-11 = "S-Sorry! You came so far, and then you had to go further because I couldn't find you!"
2002503-12 = "...What?"
2002503-13 = "You want me to follow you? Y-Yes! Understood."
2002503-20 = "S-Sensei? Where are we..."
2002503-21 = "You thought I looked cold? You wanted to go inside...just for me to warm up?"
2002503-22 = "Y-You don't have to do that... Not for someone like me..."
2002503-23 = "What? Oh, this? You want to know...why I'm wearing a short one...?"
2002503-24 = "[s3] \"Is it okay for me to ask about that yukata?\"\n[s4] \"I was wondering why you chose that one.\""
2002503-25 = "T-This is..."
2002503-26 = "T-This is..."
2002503-27 = "Uh, it's n-not very interesting... It's just...this one is..."
2002503-28 = "Th-This is the most affordable..."
2002503-29 = "[s5] \"You're worried about the cost?\"\n[s6] \"So that's the reason...\""
2002503-30 = "O-Of course. I see... Even though it's cheap...it's still too pretty to suit the likes of me. That's just the way it is, isn't it?"
2002503-31 = "O-Of course. I see... Even though it's cheap...it's still too pretty to suit the likes of me. That's just the way it is, isn't it?"
2002503-32 = "I...I wasn't even sure I should buy this one, but I thought...I thought it would be more of an inconvenience if I didn't, since everyone else at the office had one..."
2002503-33 = "So I bought this one to blend in, but it wouldn't make sense to spend a lot of money on it, since it's for someone like me, so..."
2002503-34 = "I'msorryI'msorryI'msor...!"
2002503-35 = "...What?"
2002503-36 = "That wasn't what you meant? W-What do you mean? You...knew it'd be something like that? I don't understand..."
2002503-37 = "[s7] \"Want to go shopping for winter clothes?\"\n[s8] \"Let's get a new kimono. It's on me.\""
2002503-38 = "Well, okay. Sure..."
2002503-39 = "Well, okay. Sure..."
2002503-40 = "...Huh?"
2002503-41 = "Wait... What did you say?"
2002503-45 = "...Ah."
2002503-46 = "Nonononononononononononono!"
2002503-47 = "N-No way! No! You cannot use your precious money on someone like me! Never, never, never! That could never happen!"
2002503-48 = "If you did... If I ever got it dirty... If I ever got a single speck of dust on it... I'd die!"
2002503-49 = "I-I'm fine, Sensei. Please, don't! Please don't do something like that!"
2002503-50 = "[s9] \"Huh? W-Why? Okay...\"\n[s10] (I was trying to help, but it seems like I made things worse... Somehow.)"
2002503-51 = "T-This outfit has many good qualities! It's more than enough for me! Yes! I don't even deserve something like this, actually! I-It's cheap and soft and comfortable to move in!"
2002503-52 = "T-This outfit has many good qualities! It's more than enough for me! Yes! I don't even deserve something like this, actually! I-It's cheap and soft and comfortable to move in!"
2002503-53 = "It's because of this outfit that I could come here with you, and even r-receive your care—"
2002503-54 = "N-No! No no no no no! I take back that one! I didn't mean it! That was a mistake! I was just saying things!"
2002503-55 = "No no no wait no wait I didn't mean that I didn't mean what I said I wasn't just giving you any reason off the top of my head I just meant that uhhh!"
2002503-56 = "Uh!"
2002503-57 = "Um!"
2002503-58 = "..."
2002503-62 = "I wanna die!"
2002503-64 = "Once I calmed Haruka down, I bought her a dessert from a cafe instead of going clothes shopping."
2002503-66 = "I'm sorry... You really didn't have to do all this..."
2002503-67 = "I-It's fine? How could it be fine? I'm such a nuisance... And you paid for everything..."
2002503-68 = "...What?"
2002503-69 = "Y-You want me to make a promise? Something about my outfit? W-What promise..."
2002503-70 = "I mean! Wait. O-Of course I'll keep a promise to you as if my life depends on it, Sensei!"
2002503-71 = "[s11] \"I want you to promise not to strain yourself.\"\n[s12] \"If you ever feel like you're going to catch a cold, go find somewhere to warm up.\""
2002503-72 = "Uh... Hmm... I'm not sure I understand why... Why you'd ask that..."
2002503-73 = "Uh... Hmm... I'm not sure I understand why... Why you'd ask that..."
2002503-74 = "B-But yes! I promise! I will make sure I do!"
2002503-75 = "So is that... Is that okay?"
2002503-76 = "It's good? T-That's great... Um... I guess..."
2002503-77 = "[s13] \"You don't seem to believe it.\"\n[s14] \"I'm happy about it. Do you trust me?\""
2002503-78 = "Yes! Yes I do!"
2002503-79 = "Yes! Yes I do!"
2002503-80 = "I wasn't questioning you! I would never!"
2002503-81 = "Anything you say must be true!"
2002503-82 = "Absolutely so! Because I'll destroy anyone who says otherwise!"
2002503-83 = "..."
2002503-84 = "Hee... Heehee..."
2002503-86 = "I bought Haruka a hot pack to keep her warm on her walk back, and then returned to Schale."

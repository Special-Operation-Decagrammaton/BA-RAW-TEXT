[translation]
2002503-1 = "季節感"
2002503-2 = "（出門到附近的商店街，看見了正在四處張望的遙香）"
2002503-7 = "（……身上穿著之前見過一次的，裙襬較短的和服）"
2002503-8 = "[ns1]「遙香！」\n[ns2]「我在這裡哦！」"
2002503-9 = "……啊！老，老師……！！"
2002503-10 = "……啊！老，老師……！！"
2002503-11 = "對，對不起！#n您明明就在附近，我卻沒發現您……！！"
2002503-12 = "……咦？"
2002503-13 = "我，我知道了……我跟您走……"
2002503-20 = "老，老師……？#n為什麼要來這種地方……"
2002503-21 = "我看起來很冷所以來溫暖的地方……？"
2002503-22 = "怎，怎麼會……您沒必要為我這種人這麼……"
2002503-23 = "……嗯？是什麼問題呢？"
2002503-24 = "[s3]「那個……可以問你那件和服的問題嗎？」\n[s4]「有什麼特別選擇它的理由嗎？」"
2002503-25 = "啊……那個……這，這……"
2002503-26 = "啊……那個……這，這……"
2002503-27 = "沒，沒有什麼特別的原因……#n只是……這是最……"
2002503-28 = "最……便宜的……"
2002503-29 = "[s5]「……原來如此……」\n[s6]「所以才會選擇裙子比較短的和服……」"
2002503-30 = "果，果然是那樣吧……！就算再便宜，#n這麼漂亮的衣服穿在我這種人身上也一點都不適合吧……！？"
2002503-31 = "果，果然是那樣吧……！就算再便宜，#n這麼漂亮的衣服穿在我這種人身上也一點都不適合吧……！？"
2002503-32 = "我原本也不打算買的，可是如果事務所裡只有我穿著普通的衣服會很顯眼……#n可能會造成大家的困擾……！"
2002503-33 = "所以雖然為了配合大家而買了下來……#n果然還是有種不知分寸的感覺……"
2002503-34 = "對不起對不起對不起……！！"
2002503-35 = "……咦？"
2002503-36 = "那為什麼會提到和服……？"
2002503-37 = "[s7]「那件雖然也很適合，不過還是想看看更有冬天氛圍的和服。」\n[s8]「不用擔心錢的問題，要不要一起去買新的和服？」"
2002503-38 = "啊……是，是……"
2002503-39 = "啊……是，是……"
2002503-40 = "……什麼？"
2002503-41 = "咦……老師……？#n您剛才，說什麼……？"
2002503-45 = "…………"
2002503-46 = "不不不不不不不不不不不不不！！！"
2002503-47 = "那，那那那那，那怎麼可以！居然為了我這種人花費老師寶貴的錢！#n絕對……絕對不能……發生那種事……！！"
2002503-48 = "如果真的買了……每當衣服沾到灰塵，就只能以死謝罪……！！"
2002503-49 = "真，真的沒關係的！#n所以還請您……務必重新考慮……！！"
2002503-50 = "[s9]「至，至於嗎……？」\n[s10] （好像反而讓他更有壓力了……）"
2002503-51 = "而，而且，這套衣服也有優點！#n活動起來很方便，以價格來說外表也很不錯……"
2002503-52 = "而，而且，這套衣服也有優點！#n活動起來很方便，以價格來說外表也很不錯……"
2002503-53 = "更，更重要的是多虧有這套衣服，才能跟老師一起來這裡……！"
2002503-54 = "……！！我，我我我我我，我收回剛才那句話！！#n我想說個理由，不小心就脫口而出了……！！"
2002503-55 = "啊，不是，我絕對沒有敷衍的意思……！#n嗚，該，該怎麼說才好呢……"
2002503-56 = "那個……！"
2002503-57 = "所，所以……！！"
2002503-58 = "…………"
2002503-62 = "──我還是去死好了！！！"
2002503-64 = "（之後，讓遙香冷靜下來後，作為買衣服的代替買了咖啡廳的甜點給他）"
2002503-66 = "對，對不起……因為我害您……"
2002503-67 = "……咦？可，可是我剛才給您添麻煩了……#n而且還讓老師付了所有的錢……"
2002503-68 = "……什麼？"
2002503-69 = "約定……是嗎？#n是，是什麼樣的……？"
2002503-70 = "沒，沒什麼，無論內容是什麼，只要老師開口我就會拚命遵守……"
2002503-71 = "[s11]「穿著那套和服的時候不要太逞強哦。」\n[s12]「感覺快要感冒的時候，就要去暖和的地方。」"
2002503-72 = "……呃……為什麼要做這種約定呢……？"
2002503-73 = "……呃……為什麼要做這種約定呢……？"
2002503-74 = "不，不過……好的，我明白了！我一定會照做的！#n因為不是和其他人，是和老師的約定！"
2002503-75 = "……這，這樣可以……嗎……？"
2002503-76 = "老，老師滿意的話就好……嗚……"
2002503-77 = "[s13]「……？」\n[s14]「如果有話想說要告訴我哦？」"
2002503-78 = "啊，沒有！沒有那種事！"
2002503-79 = "啊，沒有！沒有那種事！"
2002503-80 = "老師搞錯了什麼的……"
2002503-81 = "那種事絕對不可能發生！"
2002503-82 = "說老師錯了的人，我會把他們全都消滅！！"
2002503-83 = "…………"
2002503-84 = "……嘿……嘿嘿……"
2002503-86 = "（之後買了暖暖包給遙香，然後回到了夏萊）"

[translation]
2002503-1 = "อารมณ์ตามฤดูกาล"
2002503-2 = "(คุณครูออกมาที่ย่านการค้า แล้วก็พบฮารุกะเดินวกไปวนมาอยู่แถวนั้น)"
2002503-7 = "(...คุณครูสังเกตเห็นว่าฮารุกะยังใส่ยูกาตะสั้นเหมือนที่เห็นเมื่อคราวก่อน)"
2002503-8 = "[ns1] \"ฮารุกะ\"\n[ns2] โบกมือเรียกฮารุกะ"
2002503-9 = "...!? อ๊ะ... คะ... คุณครู...!!"
2002503-10 = "...!? อ๊ะ... คะ... คุณครู...!!"
2002503-11 = "ขะ... ขอโทษค่ะ! คุณครูอุตส่าห์สละเวลามาแท้ๆ แต่ฉันกลับหาคุณครูไม่เจอ...!!"
2002503-12 = "คะ...?"
2002503-13 = "คุณครูอยากให้ฉันตามคุณครูไปงั้นเหรอคะ...? คะ...ค่ะ! เข้าใจแล้วค่ะ..."
2002503-20 = "คะ... คุณครู...? ที่นี่มัน..."
2002503-21 = "คะ...? ให้เข้าไปในร้านก่อนจะได้อุ่นๆ งั้นเหรอคะ?"
2002503-22 = "คะ...คุณครูไม่เห็นต้องทำแบบนี้ พะ...เพื่อคนอย่างฉันเลย..."
2002503-23 = "ยะ...อยากรู้ว่าทำไมฉันถึงใส่ชุดยูกาตะสั้นเหรอคะ...?"
2002503-24 = "[s3] \"ครูแค่อยากรู้ว่าทำไมถึงใส่ยูกาตะตัวนั้นน่ะ?\"\n[s4] \"ครูแค่สงสัยว่ามีเหตุผลพิเศษอะไรรึเปล่า?\""
2002503-25 = "ชะ... ชุดนี้มัน... เอ่อ..."
2002503-26 = "ชะ... ชุดนี้มัน... เอ่อ..."
2002503-27 = "ไม่ได้มีเหตุพิเศษอะไรเลยค่ะ... แค่ตัวนี้... มัน..."
2002503-28 = "เพราะมัน...ราคาถูกที่สุดแล้ว..."
2002503-29 = "[s5] \"เพราะราคาถูกงั้นเหรอ?\"\n[s6] \"เพราะราคานี่เอง...\""
2002503-30 = "วะ...ว่าแล้วเชียว ถึงจะเป็นของที่ราคาถูกสุดๆ แค่ไหน ตะ...แต่ว่าคนอย่างฉันคงไม่เหมาะที่จะสวมชุด#nสวยๆ แบบนี้อยู่ดีใช่มั้ยล่ะคะ!? คะ...คงดูแปลกๆ เกะกะลูกตาใช่มั้ยคะ?!"
2002503-31 = "วะ...ว่าแล้วเชียว ถึงจะเป็นของที่ราคาถูกสุดๆ แค่ไหน ตะ...แต่ว่าคนอย่างฉันคงไม่เหมาะที่จะสวมชุด#nสวยๆ แบบนี้อยู่ดีใช่มั้ยล่ะคะ!? คะ...คงดูแปลกๆ เกะกะลูกตาใช่มั้ยคะ?!"
2002503-32 = "ที่จริงฉันคิดว่าจะไม่ซื้อมาใส่แล้ว แต่จะให้ตัวเองใส่เสื้อผ้าต่างจากคนอื่นในสำนักงาน... มันจะยิ่งเป็น#nจุดสนใจและทำให้คนอื่นๆ เดือดร้อนน่ะค่ะ...!"
2002503-33 = "ฉะ...ฉันเลยซื้อชุดนี้มาใส่เพื่อให้เหมือนสมาชิกคนอื่นๆ... แต่การซื้อเสื้อผ้าแพงๆ มาใส่มันก็จะเกินกำลัง#nคนอย่างฉันไปหน่อย เพราะงั้นฉันก็เลย..."
2002503-34 = "ขอโทษค่ะขอโทษค่ะขอโทษ...!!"
2002503-35 = "คะ...?"
2002503-36 = "ไม่ได้หมายถึงเรื่องนั้นเหรอคะ? คะ...คุณครูเดาไว้แล้วว่าน่าจะเป็นเพราะเหตุผลแบบนั้นงั้นเหรอคะ#nมะ...หมายความว่ายังไงคะ..."
2002503-37 = "[s7] \"ไปซื้อเสื้อผ้าฤดูหนาวด้วยกันมั้ย?\"\n[s8] \"ไปซื้อกิโมโนตัวใหม่กันเถอะ เดี๋ยวครูซื้อให้เอง\""
2002503-38 = "อ๋อ ค่ะ... ค่ะ..."
2002503-39 = "อ๋อ ค่ะ... ค่ะ..."
2002503-40 = "คะ...?"
2002503-41 = "อ่า... คะ? เมื่อกี้... คุณครูพูดว่าอะไรเหรอคะ..."
2002503-45 = "อ่า..."
2002503-46 = "ไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะไม่ได้ค่ะ!!!"
2002503-47 = "เรื่องแบบนั้นไม่ได้เด็ดขาดค่ะ! คุณครูจะใช้เงินอันมีค่าของตัวเองเพื่อคน#nอย่างฉันเหรอคะ! ฉันจะปล่อยให้เกิดเรื่องแบบนั้นไม่ได้...!!"
2002503-48 = "ถ้าเกิดคุณครูซื้อชุดให้ฉัน แล้วเกิดมีฝุ่นติดหรือชุดสกปรกขึ้นมา... ฉันคงต้องตายเพื่อชดใช้ค่ะ!"
2002503-49 = "ฉะ... ฉันไม่เป็นไรจริงๆ ค่ะคุณครู อย่าทำแบบนั้นเลยนะคะ! ดะ...ได้โปรดเก็บเงินที่แสนสำคัญไว้เถอะ#nนะคะ!"
2002503-50 = "[s9] \"ขนาดนั้นเลย...?\"\n[s10] (แค่อยากช่วย แต่ดูเหมือนจะทำให้ลำบากใจขึ้นแฮะ...)"
2002503-51 = "ชุดนี้ก็มีข้อดีมากมายในตัวของมันนะคะ!! แค่มีชุดนี้ก็เพียงพอแล้ว! อะไรนะคะ!! ที่จริงมันดีเกินพอสำหรับคนอย่างฉันแล้วละค่ะ!! ใส่แล้วคล่องตัว! ราคาถูกด้วย!"
2002503-52 = "ชุดนี้ก็มีข้อดีมากมายในตัวของมันนะคะ!! แค่มีชุดนี้ก็เพียงพอแล้วค่ะ! อันที่จริงมันดีเกินพอสำหรับคน#nอย่างฉันแล้วละค่ะ!! ใส่แล้วคล่องตัวดี แถมราคาถูกด้วยค่ะ!"
2002503-53 = "เพราะฉันใส่ชุดนี้มาก็เลยได้มาที่แบบนี้กับคุณครู... ละ...และยังได้รับการดูแลจากคุณครู...!"
2002503-54 = "มะ... ไม่ใช่นะคะ!! ขอถอนคำพูดเมื่อกี้ค่ะ! ฉันไม่ได้ตั้งใจจะพูดแบบนั้นเลยค่ะ! แค่จะอธิบายเหตุผลแต่ดันเผลอพูดไร้สาระออกไป...!!"
2002503-55 = "มะ...ไม่ใช่นะคะ ฉัน... ฉันไม่เคยคิดจะพูดเรื่องไร้สาระเรื่อยเปื่อยกับคุณครูเลยค่ะ... คะ... คือจะว่ายังไงดี!"
2002503-56 = "คือว่า...!!"
2002503-57 = "เอ่อ...!!"
2002503-58 = "..."
2002503-62 = "อยากตายจังเลยค่ะ...!!"
2002503-64 = "(หลังจากคุณครูปลอบให้ฮารุกะใจเย็นลงได้แล้ว ก็เลี้ยงขนมหวานแทนการซื้อเสื้อผ้าให้เธอ...)"
2002503-66 = "ขอโทษด้วยนะคะ... เป็นเพราะฉันแท้ๆ เลย..."
2002503-67 = "มะ... ไม่เป็นไรงั้นเหรอคะ? แต่ฉันทำตัววุ่นวายขนาดนั้น... แถมครูยังต้องมาจ่ายเงินให้ด้วย..."
2002503-68 = "คะ...?"
2002503-69 = "แต่ต้องให้สัญญาหนึ่งอย่างเหรอคะ...? แทนที่จะใส่ชุดเดิมเหรอคะ...? มะ...หมายถึงอะไรเหรอคะ..."
2002503-70 = "มะ... ไม่สิ จะเป็นเรื่องสัญญาหรืออะไรก็ตาม แค่คุณครูบอกมา ฉันก็จะใช้ชีวิตเป็นเดิมพันเพื่อทำตามให้#nได้ค่ะ"
2002503-71 = "[s11] \"ครูอยากให้ฮารุกะสัญญาว่าจะไม่หักโหมเกินไปน่ะ\"\n[s12] \"สัญญานะว่าถ้ารู้สึกเหมือนจะเป็นหวัดก็ให้ไปในที่อุ่นๆ\""
2002503-72 = "เอ่อ... มะ...หมายความว่ายังไงคะ... ไม่เข้าใจเลยว่าทำไมถึงออกคำสั่งแบบนั้น..."
2002503-73 = "เอ่อ... มะ...หมายความว่ายังไงคะ... ไม่เข้าใจเลยว่าทำไมถึงออกคำสั่งแบบนั้น..."
2002503-74 = "ตะ... แต่ว่า... ค่ะ!! เข้าใจแล้วค่ะ!! จะทำตามนั้นค่ะ!!"
2002503-75 = "บะ...แบบนี้จะไม่เป็นไรจริงๆ เหรอคะ?"
2002503-76 = "แค่นั้นคุณครูดีใจแล้วเหรอคะ...? ถะ... อย่างอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ ตะ...แต่ว่า..."
2002503-77 = "[s13] \"สีหน้าเหมือนไม่เชื่อเลย\"\n[s14] \"ครูดีใจจริงๆ นะ ไม่เชื่อกันเหรอ?\""
2002503-78 = "ปะ... เปล่าค่ะ!"
2002503-79 = "ปะ... เปล่าค่ะ!!"
2002503-80 = "ฉะ...ฉันต้องเชื่ออยู่แล้วค่ะ!!!"
2002503-81 = "ถ้าเป็นสิ่งที่คุณครูพูดละก็ ฉันเชื่อโดยไม่สงสัยเลยค่ะ!! คุณครูพูดว่ายังไงก็ต้องเป็นแบบนั้นค่ะ!"
2002503-82 = "ค่ะ!! ถ้ามีใครเห็นต่างฉันจะยิงทิ้งให้หมดเลยค่ะ!!"
2002503-83 = "..."
2002503-84 = "...แหะ... แหะๆ..."
2002503-86 = "(ระหว่างทางที่กลับมาที่ชาเล่ต์ คุณครูก็แวะซื้อฮอตแพ็กให้ฮารุกะเพราะกลัวเธอจะเป็นหวัด...)"

[translation]
1007205-1 = "สัตว์ประหลาดในหาดโคลน"
1007205-2 = "(หลังได้ข้อความจากซากิ คุณครูออกมาที่บริเวณโขดหินฝั่งตะวันตกของหมู่บ้าน)"
1007205-7 = "อ๊ะ คุณครู มาถึงเร็วกว่าที่คิดอีกนะ ฉันกำลังรออยู่เลย..."
1007205-12 = "...ทำไมถึงใส่ชุดธรรมดามาละ?"
1007205-13 = "[s] \"ชุดมันทำไมเหรอ...?\""
1007205-14 = "ฉันบอกแล้วไงว่าจะไปหาดโคลนน่ะ แล้วทำไมถึงยังใส่เสื้อผ้าที่เลอะง่ายแบบนี้มาเล่า..."
1007205-15 = "...ถ้ามันเป็นคราบหรือซักไม่ออก ฉันไม่รู้ด้วยนะ?"
1007205-16 = "[s1] \"ครูใส่รองเท้าบูทมาตามที่บอกแล้ว\" \n[s2] \"เดี๋ยวครูรออยู่ข้างนอกก็ได้ ไม่เป็นไรหรอก\""
1007205-19 = "คุณครู... คงไม่ได้ดูถูกหาดโคลนอยู่หรอกใช่มั้ย?"
1007205-20 = "หาดโคลนเป็นพื้นที่ลื่นเหมือนหนองน้ำเลย ถือเป็นพื้นที่อันตรายที่เกิดอุบัติเหตุขึ้นบ่อยๆ ทุกปี"
1007205-21 = "โดยเฉพาะเวลาที่พลาดจมลงไปทั้งสองขา โอกาสที่จะหนีออกมาได้ก็แทบจะเป็นศูนย์ เนื่องจากโดน#nโคลนบริเวณรอบๆ ดูดเอาไว้"
1007205-22 = "นอกจากนั้นหาดโคลนตอนเวลาน้ำลงน่ะยิ่งอันตรายขึ้นกว่าเดิมอีก เพราะเวลาผ่านไปน้ำก็จะกลับขึ้นมา#nไงล่ะ"
1007205-23 = "เพราะงั้นเวลาอยู่ที่หาดโคลน วิธีที่ดีที่สุดคือการหลีกเลี่ยงไม่ให้เสื้อผ้าเปื้อนโคลน และอยู่ในท่าที่#nเคลื่อนไหวน้อยที่สุดไงละ"
1007205-24 = "แถวนี้มีพวกชาวบ้านอยู่ ถ้าเกิดเหตุฉุกเฉินก็คงจะขอความช่วยเหลือได้อยู่หรอก แต่ว่า..."
1007205-25 = "[s] \"ครูจะระวังไม่เดินไปตรงลึกๆ แล้วกัน\""
1007205-26 = "เข้าใจแล้ว ถ้างั้นฉันจะเป็นคนไปหาอาหารทะเลเอง คุณครูแค่ตามฉันมาก็พอแล้ว"
1007205-30 = "...ถ้างั้นก็ไปลุยหาดโคลนกันเลยมั้ย?"
1007205-35 = "คุณครู ดูนี่สิ! หอยหลอดละ!"
1007205-36 = "เห็นมีรูอยู่บนพื้นเลยลองเอาที่คีบแหย่ลงไปก็จับได้เลย"
1007205-37 = "เก็บหอยได้ง่ายๆ แบบนี้เลยเหรอเนี่ย... ชักสนุกขึ้นมาแล้วสิ"
1007205-39 = "เอ๋? ตรงนี้ก็มีรูอยู่ด้วย..."
1007205-40 = " ไหนดูซิ..."
1007205-44 = "คราวนี้เป็นปลาตีนงั้นเหรอ..."
1007205-45 = "ถึงจะหน้าตาดูไม่น่ากิน แต่ถ้าเอาไปต้มทำหม้อไฟละก็อร่อยมากเลยนะ"
1007205-46 = "ฮุฮุ... พอล้วงเข้าไปในรูโคลนก็ได้หอยตัวใหญ่ๆ แบบนี้ตลอด... รู้สึกเหมือนกำลังเปิดกล่องสมบัติ#nอยู่เลยแฮะ"
1007205-47 = "[s] \"ดูชำนาญกว่าที่คิดอีกนะเนี่ย\""
1007205-48 = "ก็แหงสิ ถ้าเป็นสมาชิกกองทหาร SRT ละก็ ไม่ว่าในสภาพแวดล้อมแบบไหนก็ต้องปฏิบัติการได้อย่าง#nชำนาญอยู่แล้ว"
1007205-49 = "ในฐานะพลชี้เป้าของกองทหาร RABBIT เรื่องระบุตัวเป้าหมายที่อยู่ในโคลนแบบนี้น่ะเรื่องง่ายๆ!"
1007205-53 = "อ๊ะ ตรงนี้ก็มีรูอยู่ด้วย"
1007205-54 = "คราวนี้จะจับได้ตัวอะไรนะ..."
1007205-61 = "ได้แล้ว!"
1007205-67 = "หืม...?"
1007205-68 = "...นี่มันอะไรน่ะ?"
1007205-73 = "อะไรบางอย่างลื่นๆ เมือกๆ น่าขยะแขยง...เหมือนปลิงทะเลสีแดงเลย..."
1007205-74 = "คะ...คุณครู นี่มันตัวอะไรเหรอ?"
1007205-75 = "[s] \"ครูเองก็ไม่รู้จักแฮะ...\""
1007205-82 = "โอ๊ะ นั่นมันหนอนทะเลนี่นา"
1007205-83 = "นะ...หนอนทะเล...? มันคืออะไรน่ะ...?"
1007205-84 = "อืม คิดดูแล้ว พวกคนในเมืองคงไม่ค่อยรู้จักกันสินะ"
1007205-89 = "หนอนทะเลเป็นสัตว์ทะเลชนิดหนึ่งที่มักจับได้แถวๆ หาดโคลน ปกติจะเอาไปทำเป็นซาซิมิหรือไม่ก็#nเอาไปยำเป็นเครื่องเคียงน่ะ"
1007205-90 = "ถึงหน้าตามันจะดูแปลกๆ ไปสักหน่อย แต่เนื้อมันมีรสชาติหวาน และนุ่มหนึบน่าเคี้ยวมาก ถือเป็น#nวัตถุดิบชั้นสูงอย่างหนึ่งที่พวกนักชิมชื่นชอบเลยนะ"
1007205-91 = "มาจับสัตว์ทะเลที่หาดโคลนครั้งแรก ก็จับได้ของแพงแบบนี้เลยเหรอเนี่ย เธอนี่โชคดีจังเลยนะ"
1007205-98 = "เอ่อ... คุณครู"
1007205-99 = "ช่วยรับมันไปที... ได้มั้ย?"
1007205-100 = "[s] \"ทำไมล่ะ?\""
1007205-101 = "คือว่า... เจ้าหนอนทะเลนี่... ตะ...ตอนจับมันเหมือนจะขยับไปมาอยู่ในมือ... ละ...แล้วก็ปล่อยน้ำ#nเหนียวๆ ออกมาด้วย..."
1007205-102 = "ละ...เลยอยากเอาออกไปห่างๆ ตัวเร็วๆ น่ะ..."
1007205-103 = "[s] \"ถ้างั้นก็ปล่อยมันไปก็ได้นี่นา?\""
1007205-104 = "ไม่ได้ยินที่เขาพูดเมื่อกี้เหรอ? เจ้าหนอนทะเลนี่เป็นวัตถุดิบราคาแพงเลยนะ!"
1007205-105 = "ถึงหน้าตามันจะน่าเกลียด แต่ยังไงก็อุตส่าห์จับมาได้แล้ว จะให้ปล่อยไปได้ยังไง..."
1007205-106 = "ทำแบบนั้นไม่ได้เด็ดขาด!"
1007205-110 = "เพราะงั้น... ละ...เลยอยากให้คุณครูช่วยถือเจ้าหนอนทะเลนี่แทนหน่อย..."
1007205-111 = "[s] ใส่เกียร์สุนัขวิ่งหนี"
1007205-116 = "อ๊ะ หยุดนะ หยุดเลยนะ!"
1007205-121 = "(...หลังจากนั้น คุณครูก็ถูกซากิที่วิ่งข้ามหาดโคลนมาจับได้ และโดนบังคับให้ถือหนอนทะเลไว้แทน...)"
1007205-122 = "(พอกลับไปถึงหมู่บ้าน คุณครูกับซากิก็นำหนอนทะเลไปทำซาซิมิกิน แล้วก็พบว่ารสชาติของมัน#nหวานอร่อยกว่าที่คิดไว้เยอะ...)"

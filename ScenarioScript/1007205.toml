1007205-11 = "3;사키 수영복;12\n#3;em;…\n#wait;2500"
1007205-12 = "3;사키 수영복;10;……어째서 평소와 같은 평상복을 입고 온 거야?\n#3;em;[?]"
1007205-13 = "[s] \"무슨 문제라도 있어……?\""
1007205-14 = "3;사키 수영복;05;갯벌에 들어간다고 했잖아. 그런데 이렇게 더럽혀지기 쉬운 옷을 입고 오다니……"
1007205-15 = "3;사키 수영복;12;……나중에 빨래하느라 고생해도 안 도와줄 거라고?\n#3;stiff"
1007205-16 = "[s1] \"일단 장화는 제대로 신고 왔는걸.\" \n[s2] \"나는 근처에서 구경만 하고 있을 테니까 괜찮아.\""
1007205-17 = "#wait;10"
1007205-18 = "#wait;10"
1007205-19 = "3;사키 수영복;11;선생님, 갯벌을 너무 만만히 보는 거 아냐?\n#3;em;[?]"
1007205-20 = "3;사키 수영복;06;갯벌의 펄은 늪처럼 쉽게 빠지는 성질이 있기 때문에 매년 사고가 발생하는 위험한 지역이라고."
1007205-21 = "3;사키 수영복;05;특히 양다리가 다 빠지게 되면 다리를 둘러싸고 있는 진흙의 무게 때문에 자력으로 탈출하는 것이 거의 불가능해."
1007205-22 = "3;사키 수영복;99;게다가 물이 빠진 갯벌은 조금만 시간을 지체해도 밀물이 들어오기 때문에 더욱 위험하지.\n#3;em;…"
1007205-23 = "3;사키 수영복;02;그래서 갯벌 위에서는 옷이 더러워질 것을 감수하고 낮은 포복 자세로 이동하는 것이 가장 좋은 방법이야."
1007205-24 = "3;사키 수영복;01;물론 오늘은 주변에 다른 마을 주민들도 있으니 유사시에는 도움을 받을 수 있겠지만……"
1007205-25 = "[s] \"너무 깊이 들어가지 않도록 주의할게.\""
1007205-26 = "3;사키 수영복;99;알았어. 그럼 본격적인 채취는 내가 할 테니 선생님은 옆에서 천천히 따라와 줘."

[translation]
1007205-1 = "Monster in the Mudflats"
1007205-2 = "I headed out to the mudflats on the west side of town to meet with Saki."
1007205-7 = "Ah, Sensei, there you are."
1007205-12 = "...What are you wearing?"
1007205-13 = "[s] \"Huh? These are my normal clothes...\""
1007205-14 = "I tell you to meet me in the mudflats, and you show up in your normal clothes..."
1007205-15 = "You don't expect me to wash those for you later, do you?"
1007205-16 = "[s1] \"At least I remembered to wear boots.\"\n[s2] \"It's fine. I'll just watch from the sidelines.\""
1007205-19 = "Don't underestimate the mudflats."
1007205-20 = "People come here, expecting a nice day near the sea, only to find that it's every bit as treacherous as a swamp."
1007205-21 = "If you let both legs get sucked into the mud, it pins you down, making it impossible to escape on your own."
1007205-22 = "And if you're trapped in the mud when the tide comes in? You're in trouble."
1007205-23 = "So keep your center of gravity low and focus on keeping your footing, even if it means getting your nice clothes dirty."
1007205-24 = "At least there are some villagers around today, so we'll have help in case of an emergency, but..."
1007205-25 = "[s] \"I'll watch my step.\""
1007205-26 = "Okay. I'll do the actual gathering. You follow slowly and stay off to the side."
1007205-30 = "I suppose this is a good place to start..."
1007205-35 = "Sensei, look! I found a razor clam!"
1007205-36 = "I found a hole here, and when I stuck my fist in, this came out."
1007205-37 = "It's so much easier, catching clams..."
1007205-39 = "Oh, another hole."
1007205-40 = "Let's see..."
1007205-44 = "Ah, I caught a goby this time."
1007205-45 = "They're ugly, but they taste great boiled in a hot pot."
1007205-46 = "Heehee... Every time I stick my hand in the mud, a big clam or fish pops out. It's like hunting for treasure."
1007205-47 = "[s] \"You're pretty good at this.\""
1007205-48 = "Of course I am. As a student of SRT Academy, I can handle myself in any kind of terrain."
1007205-49 = "As the RABBIT Squad's point woman, locking on to a hiding target is a piece of cake!"
1007205-53 = "Ah, here's another hole."
1007205-54 = "What will it be this time...?"
1007205-61 = "Gotcha!"
1007205-67 = "Hmm...?"
1007205-68 = "What IS this?"
1007205-73 = "Ugh, it's like a slippery...red...sea cucumber thing..."
1007205-74 = "S-Sensei, do you know what this is?"
1007205-75 = "[s] \"Not a clue!\""
1007205-82 = "Oh, that there's a fat innkeeper worm."
1007205-83 = "A f-fat innkeeper worm...?!"
1007205-84 = "Hm. Not something you city slickers would see much of, I suppose."
1007205-89 = "They're good eating. Cut 'em up and eat 'em raw, or marinate 'em for some extra flavor."
1007205-90 = "It's not pretty, exactly, but it's got a good savory flavor with just a hint of sweet. Gourmets gobble 'em up."
1007205-91 = "That's a real fancy catch you got there. Beginner's luck, I'd say!"
1007205-98 = "Sensei."
1007205-99 = "Take this from me."
1007205-100 = "[s] \"What's the rush?"
1007205-101 = "This. This worm. It squirms. And it's squirting...stuff..."
1007205-102 = "I need this away from me. Now."
1007205-103 = "[s] \"Just drop it, then.\""
1007205-104 = "Weren't you listening? This is a gourmet ingredient!"
1007205-105 = "I can't just throw away good food..."
1007205-106 = "I won't!"
1007205-110 = "So, uh... PLEASE just take it already!"
1007205-111 = "[s] Run away."
1007205-116 = "Hey! Get back here!"
1007205-121 = "After quite a chase, Saki finally caught me and shoved the fat innkeeper worm into my hands."
1007205-122 = "We had it made into sashimi back in town. And, as it happens, it was good eating..."

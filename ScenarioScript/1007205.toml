[translation]
1007205-1 = "潛藏於泥灘之物"
1007205-2 = "（接到咲希的聯絡後，來到了村子西側的泥灘）"
1007205-7 = "哦，老師。來得真早呢……"
1007205-12 = "……你怎麼穿跟平時一樣？"
1007205-13 = "[s]「有什麼問題嗎……？」"
1007205-14 = "我不是說過要到泥灘裡去嗎。#n居然還穿這種衣服來……"
1007205-15 = "……之後泥巴洗不掉我可不管哦？"
1007205-16 = "[s1]「不過至少有穿著長靴。」 \n[s2]「我會在一旁看著咲希抓魚的。」"
1007205-19 = "老師，你是不是太小看泥灘了？"
1007205-20 = "危險程度可是達到幾乎每年都會發生腳陷入泥巴裡動彈不得的意外哦。"
1007205-21 = "雙腳都陷進去的話，想要獨自脫困幾乎是不可能的。"
1007205-22 = "如果正好遇到漲潮，水面逐漸升高就危險了。"
1007205-23 = "因此即使會弄髒衣服，移動時還是放低重心比較安全。"
1007205-24 = "當然今天還有其他居民在附近，就算出了狀況也能請他們幫忙沒錯……"
1007205-25 = "[s]「知道了，我會小心的。」"
1007205-26 = "嗯。我就算弄髒了也沒關係，捕魚就交給我吧。"
1007205-30 = "……那要開始囉。"
1007205-35 = "老師，你看這個！是竹蟶！"
1007205-36 = "我只是把手伸進洞裡就輕鬆抓到了！"
1007205-37 = "居然這麼簡單……之前的辛苦到底都算什麼。"
1007205-39 = "咦？這裡也有個洞……"
1007205-40 = "我看看……"
1007205-44 = "這次是彈塗魚啊！"
1007205-45 = "雖然長得很有趣，不過拿來煮火鍋還不錯吃。"
1007205-46 = "呵呵，每次把手伸進洞裡都可以抓到貝類或魚。#n簡直有種在開寶箱的感覺。"
1007205-47 = "[s]「咲希的身手真靈活呢。」"
1007205-48 = "那當然。SRT的隊員必須要能適應各種環境才行。"
1007205-49 = "身為RABBIT小隊的先鋒，找出潛藏在泥灘中的目標根本不算什麼！"
1007205-53 = "啊，這裡也有個洞。"
1007205-54 = "這次會挖到什麼呢……"
1007205-61 = "抓到了！"
1007205-67 = "嗯……？"
1007205-68 = "……這是什麼？"
1007205-73 = "抓到了一個滑溜溜而且形狀有點噁心，類似紅色海參的東西……"
1007205-74 = "老，老師……你知道這是什麼嗎？"
1007205-75 = "[s]「抱歉，我也不知道……」"
1007205-82 = "哦哦，那不是海腸嗎。"
1007205-83 = "海，海腸……？"
1007205-84 = "都市的人可能沒有看過。"
1007205-89 = "海腸時常能在泥灘這類的地方抓到。#n雖然多半被用來作為釣大魚的餌，不過也能做成生魚片或醃菜吃。"
1007205-90 = "形狀很奇怪對吧？#n不過牠淡淡的甜味與鮮味相當迷人，在美食家眼中也是很有人氣的食材。"
1007205-91 = "哈哈，你們的運氣還真不錯！"
1007205-98 = "……老師。"
1007205-99 = "可以……把手伸出來嗎？"
1007205-100 = "[s]「為，為什麼呢……？」"
1007205-101 = "這個叫海腸的東西……一直在我手裡蠕動，還吐出了一些腥味很重的水……"
1007205-102 = "我想盡快離開牠……"
1007205-103 = "[s]「那就離開吧……？」"
1007205-104 = "老師剛才也聽到了吧？#n這可是在美食家之間也很有人氣的食材耶！"
1007205-105 = "雖然噁心，但放棄好不容易得到的食材這種事……"
1007205-106 = "我做不到！"
1007205-110 = "所以，那個……想請老師幫我保管一下……"
1007205-111 = "[s] 逃跑"
1007205-116 = "喂，站住！"
1007205-121 = "（……之後，被跨越泥灘跑來的咲希抓住，被迫接過了海腸）"
1007205-122 = "（做成生魚片的海腸，意外的非常美味）"

[translation]
10014040-1 = "ตอนที่ 4;แก๊งของหวานหลังเลิกเรียน?"
10014040-2 = "(วันต่อมา...)"
10014040-3 = "เอ๋ คุณครู... มาถึงก่อนแล้วสินะ"
10014040-4 = "ว่าแต่มีเรื่องอะไรเหรอ?"
10014040-5 = "คงไม่ได้มีเรื่องอะไรเกิดขึ้นระหว่างนั้นอีกใช่มั้ย?"
10014040-6 = "ไม่ใช่ คือว่าไม่ได้จะซักไซ้อะไรหรอก ก็แค่สงสัยเฉยๆ น่ะ..."
10014040-7 = "หือ...?"
10014040-8 = "ต้อง 'ปรึกษา' กันต่อเพื่อแก้ปัญหาเหรอ?"
10014040-9 = "อ่า... ปรึกษา? เรื่องนั้นก็ยังไงๆ อยู่นะ..."
10014040-10 = "ไม่ได้ให้คำปรึกษาอุซาวะ... แต่เป็นฉันเหรอ? ทำไมถึงเป็นฉันล่ะ...?"
10014040-14 = "อืม ไม่สิ ถ้าผู้ใหญ่ว่ายังไงก็เอาตามนั้นแล้วกัน จะเอาแต่ถามเหตุผลก็คงไม่ค่อยดีสักเท่าไร"
10014040-15 = "ถ้าอย่างนั้นก่อนอื่นไปหาที่นั่ง..."
10014040-16 = "กิ๋วๆ น้องหนูคนสวยตรงนั้นน่ะ~"
10014040-17 = "ดูท่าทางเบื่อๆ นะ~ พอจะมีเวลามั้ย? ไปเล่นสนุกกับพวกพี่ๆ มั้ยจ๊ะ~?"
10014040-18 = "......?"
10014040-19 = "[ns] \"เสียงนี้มัน...\""
10014040-24 = "......?"
10014040-25 = "......??????"
10014040-26 = "ฮ่าฮ่าฮ่า งงเป็นไก่ตาแตกเลยละสิ อึ้งไปเลยใช่มั้ยล่ะ ทำหน้างงแบบนั้นแล้วน่ารักไม่เบาเลยนะ"
10014040-27 = "ชะ... ใช่แล้ว! พะ...พวกเราเป็นคนที่น่ากลัวมากเลยนะ! ก็พวกเราเป็นพวกคนนิสัยไม่ดีนี่นา!"
10014040-28 = "ใช่แบบนี้เหรอ...? ทำแบบนี้จริงอะ? แน่ใจนะ?"
10014040-33 = "อะไรเนี่ย...?"
10014040-34 = "[s3] \"...???\"\n[s4] (แต่งคอสเพลย์เป็นนักเรียนอันธพาล...?)"
10014040-35 = "นะ... นี่พวกเธอ... มาทำอะไรกันที่นี่เนี่ย? แล้วแต่งตัวอะไรกันมิทราบ?"
10014040-36 = "นะ... นี่พวกเธอ... มาทำอะไรกันที่นี่เนี่ย? แล้วแต่งตัวอะไรกันมิทราบ?"
10014040-37 = "คะ... คาซึสะจัง! ไม่ว่าคาซึสะจังจะเป็นยังไง พวกเราก็จะอยู่กับคาซึสะจังนะ! ดูนี่สิ! ดูพวกเราสิ!"
10014040-38 = "เดี๋ยวสิ ที่พูดแบบนั้นก็ขอบคุณอยู่หรอก แต่ตอนนี้กำลังทำอะไรอยู่กันแน่น่ะ..."
10014040-39 = "ไม่เห็นจะเข้าใจเลย แต่งตัวแบบนั้นกันทำไม? แล้วนัตสึทำไมถึงได้พูดจาแปลกๆ ไม่เป็นตัวของตัวเอง#nแบบนั้น..."
10014040-40 = "ฮุฮุฮุ... ก็ดีใจนะที่เธอใส่ใจ แต่ไม่ต้องผลักไสพวกเราหรอก พวกเราน่ะเตรียมการมาพร้อมแล้ว"
10014040-41 = "ชีวิตในวันข้างหน้า โลกใบใหม่ที่ต่างไปจากตอนนี้..."
10014040-42 = "ชีวิตในวันข้างหน้า...? โลกใบใหม่ที่ต่างไป...?"
10014040-46 = "ไม่สิ... เดี๋ยวนะ ยัยคนนี้ เรื่องแค่นี้ก็ไม่เข้าใจเหรอไงฮะ?"
10014040-47 = "[s5] \"ใช่ คิดว่าน่าจะเครื่องรวนไปแล้วละ\"\n[s6] \"แต่งคอสเพลย์ดูท่าจะไม่เวิร์คนะ...\""
10014040-48 = "ตั้งแต่วันนี้เป็นต้นไป ชมรมของเราจะเปลี่ยนชื่อจาก <ชมรมของหวานหลังเลิกเรียน> เป็น <แก๊งของหวานหลังเลิกเรียน>"
10014040-49 = "ตั้งแต่วันนี้เป็นต้นไป ชมรมของเราจะเปลี่ยนชื่อจาก <ชมรมของหวานหลังเลิกเรียน> เป็น <แก๊งของหวานหลังเลิกเรียน>"
10014040-50 = "คาซึสะจัง! พวกเราก็อยากให้คาซึสะจังอยู่ด้วยกันอย่างสบายใจนะ!"
10014040-52 = "เดี๋ยวนะ ก็แค่เปลี่ยนจาก 'ชมรม' เป็น 'แก๊ง' เองนี่ แล้วทำไมจู่ๆ ต้องทำอะไรแบบนั้นด้วย..."
10014040-53 = "หมายความว่ายังไงกันแน่..."
10014040-54 = "แป๊บนะ ตอนนี้ยัยนี่ไม่เข้าใจอะไรสักนิดเลยไม่ใช่เหรอ? ไม่รู้เลยว่าตอนนี้พวกเรากำลังทำอะไรกันอยู่น่ะ"
10014040-55 = "ก่อนอื่นเลยพวกเราต้องอธิบายความตั้งใจของพวกเราก่อน..."
10014040-56 = "คิดไว้แล้วว่าต้องเป็นแบบนี้!!!"
10014040-59 = "[ns] \"อ่า...\""
10014040-61 = "......?"
10014040-62 = "เอ๊ะ เสียงนี้มัน..."
10014040-63 = "เสียงที่ทำให้รู้สึกเดจาวู..."
10014040-65 = "อย่างนี้นี่เองสินะคะ มันเป็นอย่างนี้เองสินะคะ...!"
10014040-66 = "ถึงฉันจะคิดว่ามันอาจจะมีบางที... บางทีอาจจะกลับตัวกลับใจแล้วจริงๆ แต่ก็เป็นอย่างนี้สินะคะ! ไม่มีทางกลับใจได้อยู่ดีสินะคะ!! "
10014040-67 = "เพราะว่าธาตุแท้อันชั่วร้ายของคุณน่ะ มันกลบลงให้มิดไม่ได้ยังไงล่ะคะ!"
10014040-68 = "แล้วอีกอย่าง <แก๊งของหวานหลังเลิกเรียน> นั่นน่ะ...! เป็นชื่อที่น่าหวาดกลัวสิ้นดี!!"
10014040-69 = "คงจะหมายความว่าจะเขมือบบริเวณพื้นที่นี้เหมือนกับของหวานนุ่มๆ สินะคะ!? หมายความเอาไว้แบบนั้นสินะคะ!?"
10014040-70 = "แถมยังลักพาตัวคุณครูมาอีกด้วย...! นี่มันแผนลับที่จะยึดอำนาจของเบื้องบน!!"
10014040-71 = "ที่ผ่านมาคงเฝ้ารอเวลาที่จะหวนกลับมาอยู่ตลอดสินะคะ! คุณน่ะ..."
10014040-72 = "ก่อตั้งองค์กรใหม่ขึ้นมาก็เพื่อจะฟื้นคืนชีพอีกครั้งสินะ เคียวยามะ คาซึสะ!"
10014040-73 = "ไม่สิ..."
10014040-74 = "<แคทส์ พาลูค>!!"
10014040-78 = "พูดถึงเรื่องอะไรน่ะ...? แคทส์... อะไรนะ?"
10014040-79 = "ฟื้นคืนชีพ? องค์กรใหม่...? หรือว่าพูดถึงแยงกี้สาว!? พวกนั้นเป็นแยงกี้สาวเหรอ?"
10014040-80 = "แคทส์ พา... อะไรแล้วนะ?"
10014040-81 = "...ลักพาตัว...!?"
10014040-85 = "...คาซึสะน่ะเหรอ!? ลักพาตัวคุณครู!?"
10014040-86 = "คะ... คาซึสะจัง...!? เรื่องจริงเหรอ!?"
10014040-87 = "นี่พวกเธอพูดเรื่องบ้าอะไรกันห้ะ!!!!"
10014040-88 = "[s9] \"...!? อย่างนี้เองหรอกเหรอ คาซึสะ!?\"\n[s10] \"เรื่องเข้าใจผิดมักจะกลายเป็นเรื่องใหญ่โตแบบนี้แหละนะ\""
10014040-89 = "มันไม่ตลกเลยสักนิดนะคุณครู!!"
10014040-90 = "ยังจะมาอธิบายอย่างไม่สะทกสะท้านอีกนะ!!"
10014040-91 = "ตอนนี้ไม่ใช่เวลามาล้อเล่นนะ! รีบอธิบายก่อนที่จะเข้าใจผิดกันไปใหญ่โตกว่านี้เถอะ..."
10014040-92 = "นี่คุณกำลังข่มขู่คุณครูอยู่เหรอคะ!?"
10014040-94 = "ถึงจะอยู่ต่อหน้าผู้ใหญ่ก็ทำตัวหยิ่งยโสได้อยู่อีกงั้นสินะ โหดร้ายจริงๆ เลย เคียวยามะ คาซึสะ!!"
10014040-95 = "...ชิ มันสายไปแล้วสินะ"
10014040-96 = "ยัยนั่นพูดอะไรไม่รู้ตั้งแต่เมื่อกี้แล้ว..."
10014040-97 = "คาซึสะ ทำอะไรสักอย่างสิ เพื่อนเธอไม่ใช่เหรอ"
10014040-98 = "...!? ใครบอกว่าเป็นเพื่อน!? ใครเป็นเพื่อนกันไม่ทราบ!?"
10014040-103 = "อภัยให้ไม่ได้ค่ะ เพื่อความสงบสุขของที่นี่! และเพื่อให้ทุกคนเดินทางไปโรงเรียนได้อย่างปลอดภัย!!"
10014040-104 = "เตรียมตัวไว้เลยค่ะ เคียวยามะ คาซึสะและ <แก๊งของหวานหลังเลิกเรียน>!!"
10014040-105 = "ครั้งนี้ฉันจะต้องเอาชนะพวกคุณและผดุงความยุติธรรมเอาไว้ให้ได้ ณ ที่นี้!!"
10014040-106 = "ฉันจะขอท้าคุณค่ะ!!"
10014040-107 = "ไม่สิ เดี๋ยวนะ..."
10014040-112 = "ฮุฮุฮุ ยังไงก็ต้องยอมรับคำท้านั่นอยู่แล้วละ เหล่าผู้ท้าชิงเอ๋ย"
10014040-113 = "ชะ... ใช่แล้วค่ะ! ถึงจะไม่ค่อยเข้าใจเท่าไร แต่จะไม่ให้อภัยที่มาทำให้คาซึสะจังต้องลำบากเด็ดขาด!!"
10014040-114 = "ถึงจะไม่รู้ว่าคุณเป็นใคร... แต่พวกเราก็จะไม่ยอมอยู่เฉยค่ะ!!"
10014040-116 = "อะไรนะ...?"
10014040-117 = "ท้าดวลสำเร็จสินะคะ... ดีละ เตรียมตัวเตรียมใจเอาไว้ได้เลยค่ะ!!"
10014040-118 = "แสดงความสามัคคีของพวกเรา <แก๊งของหวานหลังเลิกเรียน> ให้เห็นกันเลย!!"
10014040-119 = "โจมตี-!!!"
10014040-120 = "ละ... ลุย!!!"
10014040-121 = "ยะ... ย้ากกกกกก!!"
10014040-137 = "คุณครู... เราจะทำยังไงกันดี..."
10014040-138 = "[s13] \"ลุยเลย!! แก๊งของหวานหลังเลิกเรียน!!\"\n[s14] \"ยึดครองพื้นที่นี้ให้เหมือนขนมหวานนุ่มๆ เลย!!\""

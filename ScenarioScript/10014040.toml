[translation]
10014040-1 = "第4話;放學後的甜點團？"
10014040-2 = "（……隔天）"
10014040-3 = "啊啊，老師……你來了啊。"
10014040-4 = "……所以怎麼了呢？"
10014040-5 = "難道又發生了什麼嗎？"
10014040-6 = "啊，不是。#n我沒有在生氣，只是單純有點在意而已……"
10014040-7 = "……咦？"
10014040-8 = "為了解決問題要繼續「諮詢」比較好……？"
10014040-9 = "……諮詢？#n雖然是這樣沒錯啦……"
10014040-10 = "不是對宇沢……而是我？#n要諮詢的對象是我嗎？為什麼……？"
10014040-14 = "唔嗯。嘛，身為大人的老師都這麼說了，那就這樣吧。#n每個理由都問到底也不好。"
10014040-15 = "那就先找個地方坐吧……"
10014040-16 = "嘿嘿～那邊的可愛妹妹～"
10014040-17 = "你看起來很無聊呢。#n要不要跟大姊姊快樂一下呀？"
10014040-18 = "……？"
10014040-19 = "[ns] 「這個聲音是……」"
10014040-24 = "……？"
10014040-25 = "……？？？"
10014040-26 = "哈哈哈！#n看你這慌張的樣子，還挺可愛的嘛。"
10014040-27 = "那，那是當然的！#n因，因為我們很可怕！畢，畢竟是不良學生呀！"
10014040-28 = "哎……這樣對嗎？#n真的沒問題嗎？"
10014040-33 = "……什麼？"
10014040-34 = "[s3] 「……？？？」\n[s4] （不良學生的Cosplay……？）"
10014040-35 = "你，你們……在這裡做什麼？#n……那個打扮是？"
10014040-36 = "你，你們……在這裡做什麼？#n……那個打扮是？"
10014040-37 = "千，千紗醬！#n不管千紗醬過去是什麼樣的人，我們都會跟千紗醬在一起唷！"
10014040-38 = "你這麼說我是很感謝啦……#n比起那個，我在問你們在做什麼……"
10014040-39 = "真是搞不懂。#n那是在做什麼？夏的說話方式也很奇怪……"
10014040-40 = "哼哼哼……沒有必要抗拒的唷千紗。"
10014040-41 = "接下來的人生，與過往不同的世界……就讓我們一起前進吧。"
10014040-42 = "接下來的人生……？和過往不同的世界……？"
10014040-46 = "……不是，先等一下。#n他只是單純沒有理解現在的情況而已吧？"
10014040-47 = "[s5] 「那個，能說明一下嗎？」\n[s6] 「Cosplay失敗了呢……」"
10014040-48 = "從今天起我們的社團從「放學後的甜點部」改為「放學後的甜點團」了。"
10014040-49 = "從今天起我們的社團從「放學後的甜點部」改為「放學後的甜點團」了。"
10014040-50 = "千紗醬！#n我們想讓你能更輕鬆自在地和我們在一起。"
10014040-52 = "呃，只不過是從「部」變成「團」而已不是嗎。#n為什麼要突然做這種事啊……"
10014040-53 = "到底是怎麼回事……"
10014040-54 = "吶，等等。他果然沒有理解吧？"
10014040-55 = "得先好好說明我們的想法才行啊……"
10014040-56 = "果然！！我就知道是這樣！！！"
10014040-59 = "[ns] 「……啊。」"
10014040-61 = "……？？"
10014040-62 = "啊咧，這個聲音是……"
10014040-63 = "……好像在哪聽過。"
10014040-65 = "……果然是這樣啊。#n我就知道是這樣沒錯……！"
10014040-66 = "還以為你真的改過自新了……我就知道！沒有這回事對吧！！"
10014040-67 = "你那邪惡的本性沒有那麼容易改變的！"
10014040-68 = "「放學後的甜點團」……多麼可怕的名字！！"
10014040-69 = "簡直像是在吃軟綿綿的甜點一樣……#n是要把這一帶給吃乾抹淨的那種恐怖的意思對吧！？"
10014040-70 = "而且還綁架了老師……！#n竟然連公權力都想要拿到手！！"
10014040-71 = "你果然是在等待復出的機會到來……"
10014040-72 = "沒錯，你為了復活而成立了新的組織對吧，杏山千紗！"
10014040-73 = "不對……"
10014040-74 = "「凱茜．帕魯格」！！"
10014040-78 = "什麼意思……？凱茜……什麼？"
10014040-79 = "凱茜．帕魯格不就是那個傳說中的太妹嗎？#n那些孩子是太妹嗎？"
10014040-80 = "……凱茜帕……什麼？"
10014040-81 = "綁架……！？"
10014040-85 = "……千紗你！？綁架了老師！？"
10014040-86 = "千，千紗醬……？他說的是真的嗎！？"
10014040-87 = "不是，你們在說什麼啊！？"
10014040-88 = "[s9] 「千紗……是這樣嗎！？」\n[s10] 「所謂的誤會就是會在轉眼間變大的東西呢。」"
10014040-89 = "白癡啊！是你叫我出來的吧！！"
10014040-90 = "老師，為什麼還跟沒事一樣在解說啊！！"
10014040-91 = "現在不是說這些的時候了！#n在奇怪的謠言傳開之前不趕快澄清的話……"
10014040-92 = "你剛才在威脅老師對吧？"
10014040-94 = "對大人還擺出那種態度……真是無情啊，杏山千紗！！"
10014040-95 = "……可惡。#n已經太遲了嗎。"
10014040-96 = "從剛才開始就在說什麼東西啊那傢伙……"
10014040-97 = "吶，千紗。#n想想辦法吧，他是你的朋友對吧？"
10014040-98 = "……不是，他才不是我朋友咧！？"
10014040-103 = "……不可原諒。#n為了這裡的和平！為了保護大家能夠安心上學的街道！！"
10014040-104 = "覺悟吧！杏山千紗！還有「放學後的甜點團」！！"
10014040-105 = "這次一定要打倒你們，實現正義！！"
10014040-106 = "收下我的挑戰書吧！！"
10014040-107 = "不是，都說了等等……"
10014040-112 = "哼哼哼……#n你的挑戰，我接受了。"
10014040-113 = "沒，沒錯！#n雖然搞不太懂，不過我不允許你繼續欺負千紗醬了！！"
10014040-114 = "雖然不知道你是誰……我們也不會坐視不管的！！"
10014040-116 = "……什麼？"
10014040-117 = "決鬥成立了呢……很好。#n請做好覺悟吧！！"
10014040-118 = "讓他見識我們「放學後的甜點團」的團結吧！！"
10014040-119 = "進攻──！！！"
10014040-120 = "哇，哇──！！！"
10014040-121 = "嘿啊啊啊啊啊啊──！"
10014040-137 = "老師……#n我該怎麼辦才好……"
10014040-138 = "[s13] 「上吧！！『放學後的甜點團』！！」\n[s14] 「就像在吃軟綿綿的甜點一樣，掌控這一帶吧！！」"
10014040-139 = "……"
10014040-140 = "……"
10014040-141 = "我……"
10014040-143 = "啊啊，覺得已經改變了的人就只有我而已啊。#n到頭來，我還是被過去的罪孽追著跑……"

[translation]
31100-1 = "Episode 10;Boot Camp, Here We Come!"
31100-5 = "Trinity Outskirts Annex"
31100-7 = "We're finally here! So, this is where our boot camp is going to be?"
31100-8 = "H-Haha... Guess so. "
31100-9 = "When I heard we'd be going to an unused annex, I just assumed it wouldn't be furnished at all. So much for sleeping naked together on the cold, hard floor."
31100-10 = "But it's actually quite comfy-looking and spacious. Even the beds are really cute!"
31100-12 = "I'm so glad we won't have to be on the floor when we sleep naked together! ♥"
31100-13 = "Why does every scenario end with us sleeping together in the nude?! And there are plenty of beds, so stay in your own!"
31100-14 = "Aw, are you sure? It's not every day we get to attend boot camp together. We're here to study, so...why not study a few other things about ourselves?"
31100-15 = "We're not here to study perversion! No lewdness allowed! "
31100-16 = "A shame. Well, the day is still young. Let's see if you change your tune later tonight. ♥"
31100-17 = "...?!"
31100-22 = "Well, anyway. This is where we're going to be staying over the next week for our studies. We'll be doing everything here, from sleeping to eating. And that's why I want you all to..."
31100-26 = "Wait a sec. Where did Azusa go?"
31100-27 = "Oh, yeah. She was with us just a minute ago."
31100-34 = "Encampment scouting complete."
31100-35 = "Scouting? Wait, did you just call the annex an encampment?"
31100-36 = "We're a comfortable distance from Trinity's main building. Sniper fire is unexpected. Location acceptable."
31100-37 = "There are only two entrances connecting to the outside, which I also find favorable."
31100-38 = "Worst-case scenario, we could barricade one entrance and lead the enemy to an ambush in the first floor gym."
31100-39 = "I've also identified several weak points in our defenses, but they shouldn't pose a problem with a little fortification."
31100-41 = "U-Uhhh... "
31100-42 = "And this must be the barracks... Excuse me. Dormitory is the proper name, yes? Unexpectedly luxurious."
31100-43 = "I'm surprised such a valuable foothold has been lying unused. What a waste."
31100-44 = "Azusa! We came here to study, not to prepare for a war, remember?"
31100-45 = "I'm aware. We're here to train for a week, correct? High-intensity training where we're banned from leaving the grounds, having free time, and are under 24-hour surveillance a day."
31100-46 = "It isn't quite that strict..."
31100-47 = "I'm prepared for anything. I brought all of my personal belongings: changes of clothes, gym equipment, toothbrushes, toothpaste, soap, dry goods, blankets, water..."
31100-48 = "Oh, my. You're so thorough, Azusa. "
31100-49 = "Naturally. Preparedness is the key to survival."
31100-51 = "Heeheehee. Eating together, sleeping together, studying toward the same goal... Doesn't boot camp sound absolutely divine?"
31100-52 = "Hm..."
31100-53 = "Yes. I'm looking forward to it."
31100-57 = "But completing the mission comes first. I'll study and pass the second evaluation exam. That is our main objective."
31100-58 = "It's not my intention to be a liability again."
31100-59 = "Azusa... "
31100-60 = "By the way, I prepared anti-personnel mines and claymores for possible ambushes. I also brought the necessary materials to manufacture IEDs and antitank mines. "
31100-61 = "E-Enough, Azusa! We're not going to need all that! "
31100-63 = "Hmm."
31100-64 = "Nagisa said we'd have to go to boot camp if we failed the first evaluation exam."
31100-65 = "We'll be here for a week until the second exam."
31100-66 = "The building is showing its age and is a little neglected, but it should be more than fine with some cleaning. And we still have a lot of amenities available to us, like a gym and shower room."
31100-67 = "There's even a swimming pool outside. It looks like it hasn't been used for a long time, though."
31100-68 = "Yeah, and we're within walking distance of the main building. There's a kitchen in the basement where you can cook simple dishes too, so we shouldn't go hungry. "
31100-69 = "Not to mention, [USERNAME] Sensei will be with us the entire time we're here, so we can always ask for help if we really need it..."
31100-70 = "[s] \"Helping is my middle name.\""
31100-71 = "Haha. Thanks, Sensei. There's a room for you at the other end of the hall to stay in too."
31100-77 = "Stop right there, Hanako! No lewdness allowed!"
31100-78 = "I didn't say anything at all. I haven't the faintest idea of what you're talking about."
31100-79 = "That's because it's written all over your face! Do you want the death penalty?!"
31100-80 = "My, you're so strict."
31100-81 = "Is Sensei using the room down the hall truly necessary? There are enough beds in this room. I find splitting our unit apart to be to our disadvantage."
31100-82 = "[s] \"I'll leave you all to get comfortable, so holler if you need me.\""
31100-83 = "S-Sure... Well, let's unpack and get to today's studies."
31100-84 = "Wait a minute. Don't you think there's something else we should do first?"
31100-85 = "Huh?"
31100-90 = "Practice installing traps while under fire?"
31100-94 = "No..."
31100-95 = "I mean cleaning. ♥"
31100-96 = "C-Cleaning?"
31100-97 = "Yes! The exterior's been maintained, but the inside is so dusty and dirty from not having been used in so long, don't you think?"
31100-98 = "How can that be good for us? They say a healthy body leads to a healthy mind, so let's start off by giving this place a good cleaning before we hit the books!"
31100-99 = "I...guess you have a point. It makes sense to clean all the desks at the very least before we begin using them."
31100-100 = "Hygiene is a critical responsibility. It has a large effect on unit morale."
31100-101 = "Seriously? Cleaning? Well, I guess if it's just a little bit..."
31100-102 = "I think Hanako makes a good point. We shouldn't push ourselves too hard too soon."
31100-103 = "Let's remember that this is a marathon, not a sprint. We have a long week ahead of us."
31100-108 = "All right, team! Let's get ourselves fired up with some spring cleaning! "
31100-109 = "[s] \"Let's goooooo!\""
31100-110 = "Everyone, go change so you don't get your uniforms dirty. We'll gather downstairs in ten minutes!"
31100-111 = "Understood."
31100-112 = "Okie dokie!"
31100-118 = "Clothes to wear for cleaning? I guess my gym clothes would work."
31100-120 = "Ten minutes later."
31100-122 = "Annex Entrance"
31100-123 = "Sorry to keep you waiting, Sensei!"
31100-124 = "[s1] \"You went with your gym clothes, huh?\"\n[s2] \"You look ready to get to work.\""
31100-125 = "Well, I needed to put on something appropriate for the occasion. My gym clothes are plenty easy to move around in and wash if they get dirty."
31100-126 = "Well, I needed to put on something appropriate for the occasion. My gym clothes are plenty easy to move around in and wash if they get dirty."
31100-127 = "So now what...?"
31100-128 = "You got here quickly, Koharu."
31100-129 = "Reporting in."
31100-130 = "Uh, Azusa. I don't think you need to carry your weapon right now..."
31100-131 = "I would rather have my firearm and not need it than need it and not have it. Wouldn't you?"
31100-132 = "I guess you have a point..."
31100-137 = "Goodness. Am I the last to arrive?"
31100-138 = "NO! NOPE! ABSOLUTELY NOT!"
31100-139 = "Oh? "
31100-140 = "Why would you need to wear your swimsuit for spring cleaning?!#nIt's completely inappropriate! "
31100-141 = "But it's easy to move in, and I'm used to getting...dirty when I wear it."
31100-142 = "What are you talking about?! You're supposed to wear a swimsuit in a swimming pool! Wh-What if someone sees?!"
31100-143 = "What's the big deal? It's just us here. "
31100-144 = "No! Absolutely, 100-percent forbidden! You are forbidden from wearing a swimsuit from now on! "
31100-146 = "Aw. "
31100-147 = "H-Haha...ha..."
31100-149 = "Hanako then left to change into her gym clothes."
31100-151 = "Next Episode;Spring Cleaning!"

[translation]
31100-1 = "第10話;合宿、スタート！"
31100-5 = "トリニティの別館「合宿所」"
31100-7 = "ようやく着きましたね、ここが私たちの……"
31100-8 = "はい、合宿の場所です。ようやく着きましたね、ふぅ……。"
31100-9 = "しばらく使われていない別館の建物と聞いたので、冷たい床で裸になって寝ないといけないのかと思ってましたが……。"
31100-10 = "広いですし、きちんとしてますし、可愛いベッドもあって何よりです。"
31100-12 = "これならみんなで寝られそうですね、裸で♡"
31100-13 = "さっきから何でちょいちょい「裸」を強調するの！？それにベッドの数もちゃんとあるんだから、みんなで寝る必要無いでしょ！？"
31100-14 = "せっかくの合宿ですし、そういうお勉強も必要ではないでしょうか？"
31100-15 = "ダメ！エッチなのは禁止！死刑！！"
31100-16 = "まあ今はまだ明るいですし、そういうことにしておきましょう。夜は長いですからね……♡"
31100-17 = "えっ、は、ど、どういう意味！？！！？"
31100-22 = "その、これから一週間寝食と勉強を共にするので、みなさん仲良く……"
31100-26 = "って、あれ？アズサちゃんは……？"
31100-27 = "あら、先ほどまでは一緒にいたのですが……。"
31100-34 = "偵察完了だ。"
31100-35 = "て、偵察……？"
31100-36 = "トリニティの本校舎からはかなり離れてるし、流石に狙撃の危険は無さそう。"
31100-37 = "外への入口が二つだけというところも気に入った。"
31100-38 = "いざという時は片方の入り口を塞いで、襲撃者たちを1階の体育館に誘導した上での殲滅戦が有効になるかな。"
31100-39 = "まあ他に幾つかセキュリティ上の脆弱性も確認できたけど、改修すれば問題無い範囲だ。"
31100-41 = "え、えっと……。"
31100-42 = "それから、ここが兵舎……いや、居住区か。……綺麗だな。"
31100-43 = "こんな施設を使わずに放置していたなんて……無駄遣いも良いところだ。"
31100-44 = "あの、アズサちゃん……私たちはここへ戦いに来たのではなく、勉強をしに来たんですよ……？"
31100-45 = "うん、分かってる。一週間の集中訓練だろう？外出禁止、自由時間は皆無、24時間一挙手一投足まで油断することは許されないハードなトレーニング。"
31100-46 = "そ、そこまででは無いと思いますが……。"
31100-47 = "きちんと準備もしてきた。体操着や細かい着替え、衛生面の歯ブラシや歯磨き粉、石鹸、非常食、毛布、水筒……"
31100-48 = "さすがはアズサちゃん、用意周到ですね。"
31100-49 = "当然だ。徹底した準備こそ成功への糸口。"
31100-51 = "うふふっ。みんなで一緒に食欲を満たし、睡眠欲を満たし、そしてみんなが欲する目標へと向かって脇目も振らず手を動かす……良いですね、合宿。"
31100-52 = "……。"
31100-53 = "……うん、そうだね。"
31100-57 = "あ、でも任務は確実に遂行する。きちんと勉強をして、第2次特別学力試験にはどうにか合格する。その目標のためにここに来たんだ。"
31100-58 = "……迷惑は、かけたくない。"
31100-59 = "アズサちゃん……。"
31100-60 = "大丈夫、万が一の敵襲に備えて対人地雷とクレイモアも用意してきた。あとは[ruby=IED]即席爆発装置[/ruby]の材料になりそうなもの一式と、対戦車地雷も多少――"
31100-61 = "あ、アズサちゃん！ですからそういうのは……！"
31100-63 = "……というわけで、あらためて。"
31100-64 = "ナギサ様から言われた通りです。第1次特別学力試験には残念ながら落ちてしまったので……"
31100-65 = "この別館で合宿をすることになりました。私たちは2次試験までの一週間、ここに滞在することになります。"
31100-66 = "長い間放置されていたそうですが、少しお掃除すれば全然使えそうですし、体育館やシャワー室なども充実しているようですし……。"
31100-67 = "うん、そういえば外にプールもあった。しばらく使われていないようだったけれど。"
31100-68 = "あ、そうだったんですね。あと、ここはトリニティの本校舎からも頑張れば歩ける距離ですし、地下に食堂設備のようなものもありましたから、特にお腹を空かせる心配もなさそうです。"
31100-69 = "それに私たちがここにいる間、[USERNAME]先生もずっと一緒にいてくれる予定ですので、何かあっても大丈夫だと思います！"
31100-70 = "[s] \"うん、任せて。\""
31100-71 = "ありがとうございます。えっと、通路を挟んで向かい側にもお部屋があるのですが、先生は――"
31100-77 = "ダメっ、絶対ダメ！！同衾とかエッチじゃん！！！！死刑！！！"
31100-78 = "えっと、コハルちゃん？私、まだ何も言っていませんが……？"
31100-79 = "何を言い出すのかだいたい分かるわよ！！ダメったらダメ！そういうことはさせないんだから！"
31100-80 = "コハルちゃんは厳しいですねぇ……。"
31100-81 = "私は先生もここで一向に構わないけど？ベッドも余ってるし、無駄に部屋をいくつも使うこともない。"
31100-82 = "[s] \"みんなで交流を深めておいて。何かあったら呼んでくれれば。\""
31100-83 = "で、では一旦そういうことで。そうしたら、荷物を片付けて早速お勉強を……"
31100-84 = "あら、でもその前にやることがあると思いませんか？ヒフミちゃん？"
31100-85 = "えっ……？"
31100-90 = "なるほど、敵襲を想定してトラップの設置を？"
31100-94 = "いえ、そうではなく……"
31100-95 = "お掃除、ですよ♡"
31100-96 = "……お、お掃除、ですか？"
31100-97 = "はい。管理されていた建物とはいえ、長い間使われていなかったこともあって、埃なども多いように見えませんか？"
31100-98 = "このままここで過ごすというのも健康に良くなさそうですし、今日はまずお掃除から始めて、気持ち良い環境で勉強を始めるというのはいかがでしょう？"
31100-99 = "なるほど、確かにそうですね。まずは身の回りの整理整頓から始めるのは定石ですし、そうでないと途中で気になってしまいますし……。"
31100-100 = "うん、衛生面は大切。実際、戦場でもすごく士気に関わりやすい部分だ。"
31100-101 = "お、お掃除……？えっと、まあ、普通のお掃除なら……。"
31100-102 = "はい、ハナコちゃんの言う通りかもしれません。やる気が空回りしても困りますし……。"
31100-103 = "私たちがするのは一夜漬けではなく、きちんと用意された期間の中での試験勉強……つまりは長距離走のように、順番やペース、作戦も考えないとです。"
31100-108 = "それではまず、大掃除から始めるとしましょう！"
31100-109 = "[s] \"よし、頑張ろう！\""
31100-110 = "それでは汚れても良い服に着替えてから、10分後に建物の前に集合としましょう！"
31100-111 = "分かった。"
31100-112 = "はい♪"
31100-118 = "よ、汚れても良い服……た、体操着で良い……？"
31100-120 = "10分後……"
31100-122 = "合宿所・正門"
31100-123 = "先生、お待たせしました！"
31100-124 = "[s1] \"おお、体操着姿。\"\n[s2] \"掃除って感じがするね。\""
31100-125 = "はい、服装から入るのも大事ですからね。体操着の方が動きやすいですし、汚れた時に洗濯もしやすいですし。"
31100-126 = "はい、服装から入るのも大事ですからね。体操着の方が動きやすいですし、汚れた時に洗濯もしやすいですし。"
31100-127 = "……で、私は何をやれば良いの？"
31100-128 = "あっ、コハルちゃん早かったですね。"
31100-129 = "お待たせ。"
31100-130 = "アズサちゃんも――って、どうして銃を……？"
31100-131 = "肌身離さず持っていないと、銃の意味が無い。襲撃はいつ来るか分からないものだ。"
31100-132 = "いえ、それはその、何と言いますか、その通りかもしれませんが……。"
31100-137 = "お待たせしました、みなさん早かったですね？"
31100-138 = "アウトーーーーーー！！！"
31100-139 = "あら……？"
31100-140 = "何で掃除するのに水着なの！？バカなの！？バカなんでしょ！？バーカ！！"
31100-141 = "ですが動きやすいですし、何かで汚されても大丈夫ですし、洗い流すのも簡単で――"
31100-142 = "そういう問題じゃないでしょ！？水着はプールで着るものなの！っていうか、だっ、誰かに見られたらどうするの！？"
31100-143 = "誰かも何も、ここには私たち以外いませんよ……？"
31100-144 = "と、とにかくダメ！アウトったらアウト！あんたはもう水着の着用禁止！"
31100-146 = "あら……それはそれで、まあ……。"
31100-147 = "あうぅ……。"
31100-149 = "その後ハナコは、きちんと体操着に着替えて出てきた。"
31100-151 = "次回;大掃除！"

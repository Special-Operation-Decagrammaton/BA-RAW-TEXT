[translation]
31100-1 = "ตอนที่ 10;เริ่มแคมป์ฝึกฝน!"
31100-5 = "อาคารย่อยหลังหนึ่งในชานเมืองทรีนิตี้"
31100-7 = "มาถึงแล้วค่ะ! ที่นี่คือสถานที่จัดแคมป์ฝึกฝนของเราเหรอคะ?"
31100-8 = "อ่า... อ่า แหะๆ... "
31100-9 = "ตายจริง เห็นว่าเป็นอาคารย่อยที่ไม่ได้ใช้งาน ฉันเลยว่าจะใส่เสื้อผ้าน้อยชิ้น แล้วนอนบนพื้นเย็นๆ ดูแล้วเชียว..."
31100-10 = "เป็นที่พักกว้างๆ แล้วก็มีเตียงน่ารักๆ ด้วยนี่เองนะคะ!"
31100-12 = "ดีจังเลย แบบนี้เราก็นอนยุกยิกบนเตียงด้วยกันได้แล้วล่ะค่ะ แบบไม่ต้องใส่อะไรเยอะนะคะ♡"
31100-13 = "นี่เราต้องนอนเปลือยด้วยกันรึไง?!  เธอก็นอนคนละเตียงกันไปซะสิ!!"
31100-14 = "อืม...? งั้นเหรอคะ? ได้มาแคมป์ฝึกฝนทั้งที ฉันว่าถ้าเราได้ลองเรียนรู้อะไรที่ตื่นเต้นขึ้นก็น่าจะดีนะ..."
31100-15 = "เรียนรู้อะไรกันล่ะ! ห้ามพูดเรื่องลามกนะ! เดี๋ยวลงโทษซะเลย!! "
31100-16 = "อืม... ก็...  ก็มันเป็นตอนกลางคืนนี่นะ♡"
31100-17 = "...?!"
31100-22 = "อ่า... พวกเราต้องพักและเรียนด้วยกันที่นี่ตลอด 1 สัปดาห์เลย เพราะงั้นทุกคนควรจะ..."
31100-26 = "เอ๋? อาซึสะจังไปไหนแล้วล่ะคะ?"
31100-27 = "หืม? เมื่อกี๊ยังอยู่ด้วยกันอยู่เลย..."
31100-34 = "ฉันไปสำรวจค่ายมาน่ะ"
31100-35 = "คะ? สำรวจค่ายเหรอคะ?"
31100-36 = "อื้ม ฉันให้ผ่าน ที่นี่ตั้งอยู่ห่างจากอาคารส่วนกลางของทรีนิตี้ เลยไม่ต้องห่วงว่าจะถูกลอบยิง"
31100-37 = "อีกอย่าง ฉันชอบที่มันมีทางเข้าที่เชื่อมกับภายนอกแค่ 2 จุดด้วย"
31100-38 = "หากเกิดสถานการณ์อะไร เราสามารถปิดทางเข้า 1 ทางแล้วหลอกล่อพวกศัตรูที่บุกมา#nไปยังโรงยิมชั้น 1 แล้วก็จัดการพวกนั้นซะ"
31100-39 = "แต่ก็ยังมีอีกหลายจุดที่ระบบรักษาความปลอดภัยอ่อนแอ ถ้าเราซ่อมและปรับปรุงก็คงไม่เกิดปัญหา"
31100-41 = "เอ่อ... "
31100-42 = "ส่วนที่นี่คงเป็นที่พักชั่วคราว... ไม่สิ... เป็นหอพักใช่ไหม? มันดู... หรูหราฟู่ฟ่าจังเลยนะ"
31100-43 = "ไม่อยากเชื่อเลยว่าเครื่องมือดีๆ จะถูกทิ้งไว้แบบนี้มาตลอด น่าเสียดายที่นี่จัง"
31100-44 = "เอ่อ... เราไม่ได้มาที่นี่เพื่อต่อสู้นะคะ... เรามาเรียนต่างหากล่ะคะอาซึสะจัง"
31100-45 = "ฉันรู้หรอกน่า ก็เรามาที่นี่เพื่อฝึกฝนตลอด 1 สัปดาห์ไง? เราต้องฝึกอย่างเข้มข้นภายใต้การควบคุม#nทุกการเคลื่อนไหวตลอด 24 ชั่วโมง ห้ามออกไปข้างนอก แล้วก็ห้ามมีเวลาว่างด้วย"
31100-46 = "ไม่น่าจะเข้มงวดขนาดนั้นนะ..."
31100-47 = "ฉันเอาสัมภาระอื่นมาเพื่อความสะดวกสบายในการฝึกด้วย ทั้งชุดพละและเสื้อผ้าที่จะใส่#nแล้วก็มีของใช้ส่วนตัวเพื่อสุขอนามัย ทั้งแปรงสีฟัน ยาสีฟัน สบู่ อาหารแห้ง ผ้าห่ม กระบอกน้ำ..."
31100-48 = "โอ๊ะ อาซึสะจังเตรียมตัวมาดีจังเลยนะคะ? "
31100-49 = "แน่นอนอยู่แล้ว แค่เตรียมตัวดีก็มีชัยไปกว่าครึ่ง"
31100-51 = "ฮุฮุฮุ... ทุกคนมากินอยู่ด้วยกันแล้วพยายามไปด้วยกันเพื่อวัตถุประสงค์เดียวกัน...#nแคมป์นี้มันน่าสนุกจังเลยว่าไหมคะ?"
31100-52 = "อืม..."
31100-53 = "ก็ใช่นะ... รอดูได้เลย"
31100-57 = "แน่นอนว่าฉันก็จะทำภารกิจให้สำเร็จด้วย การที่มาอยู่ที่นี่ก็เพื่อตั้งใจเรียน#nแล้วก็สอบประเมินครั้งที่ 2 ให้ผ่านให้ได้"
31100-58 = "ฉันไม่อยากเป็นภาระให้ใครน่ะ..."
31100-59 = "อาซึสะจัง... "
31100-60 = "ฉันเอาทุ่นระเบิดสังหารบุคคลกับเคลย์มอร์มาด้วย เผื่อว่าศัตรูจะโจมตีเข้ามา#nแล้วก็มีชิ้นส่วนทำระเบิดแสวงเครื่องและทุ่นระเบิดทำลายยานพาหนะ... "
31100-61 = "อ่า... เอ่อ… อาซึสะจัง พะ... พอได้แล้วค่ะ! "
31100-63 = "อืม..."
31100-64 = "คุณนางิสะให้เรามาอยู่แคมป์ฝึกฝนในอาคารย่อยแห่งนี้ เพราะเราไม่ผ่านการสอบประเมินครั้งที่ 1..."
31100-65 = "และพวกเราก็จะต้องอยู่ที่นี่กว่า 1 สัปดาห์จนกว่าจะถึงการสอบครั้งที่ 2 ค่ะ"
31100-66 = "ถึงอาคารนี้จะเก่าเพราะถูกทิ้งร้างมานาน แต่ถ้าปัดกวาดเช็ดถูหน่อยก็คงจะใช้งานได้#nแถมยังมีโรงยิมและสิ่งอำนวยความสะดวกอย่างห้องอาบน้ำอีกด้วย..."
31100-67 = "ข้างนอกมีสระว่ายน้ำด้วย ถึงสภาพจะเหมือนไม่ได้ใช้งานมานานแล้วก็เถอะ"
31100-68 = "อาคารส่วนกลางก็ไม่ได้อยู่ไกลมาก แถมชั้นใต้ดินยังมีโรงอาหารให้ทำอาหารง่ายๆ เองได้#nเพราะฉะนั้นไม่ต้องห่วงว่าจะอดหรอกค่ะ... "
31100-69 = "นอกจากนี้คุณครู [USERNAME] ก็จะอยู่กับเราที่นี่ด้วย#nถ้าอยากขอความช่วยเหลืออะไรก็น่าจะขอได้..."
31100-70 = "[s] \"อื้ม วางใจได้เลย\" "
31100-71 = "อ่า แหะๆๆ... ขอบคุณนะคะคุณครู ฉันเตรียมห้องที่สะดวกสบายตรงข้ามทางเดินไว้#nให้คุณครูใช้เป็นที่พักแล้วค่ะ เชิญคุณครูใช้ห้องนั้น..."
31100-77 = "ไม่ได้นะ!! ห้ามเด็ดขาด!!  เดี๋ยวลงโทษซะเลย!!"
31100-78 = "หืม...? โคฮารุจัง? ฉันยังไม่ได้พูดอะไรออกมาเลยนะ..."
31100-79 = "ก็เห็นกันอยู่ชัดๆ ว่าจะพูดอะไร! ไม่ได้นะ! ห้ามเด็ดขาด! ไม่งั้นจะโดนลงโทษ! "
31100-80 = "เอ่อ... โคฮารุจังเนี่ย... ดุจังเลยนะคะ"
31100-81 = "แต่ฉันไม่ติดอะไรนะ เตียงที่นี่ก็เหลืออยู่ด้วย... ถ้าจะใช้หลายห้องมันก็สิ้นเปลืองนะ"
31100-82 = "[s] \"ไม่เป็นไรหรอก ห้องไม่ได้อยู่ไกลมาก ถ้ามีเรื่องอะไรก็เรียกนะ\""
31100-83 = "แหะๆๆ... งั้นเรามาจัดของแล้วเริ่มเรียนของวันนี้กันเลย..."
31100-84 = "โอ๊ะ? ฮิฟุมิจัง เรามีงานที่ต้องทำก่อนหน้านั้นสินะคะ?"
31100-85 = "เอ่อ...?"
31100-90 = "ติดตั้งกับดักรับการโจมตีจากศัตรูเหรอ...?"
31100-94 = "งานที่ว่าก็คือ..."
31100-95 = "การทำความสะอาดยังไงล่ะคะ♡"
31100-96 = "ทะ... ทำความสะอาดเหรอคะ?"
31100-97 = "ใช่ค่ะ! ถึงใครจะบอกว่าที่นี่มีการดูแลอย่างดีก็เถอะค่ะ แต่อาคารก็ถูกทิ้งร้างมานานแล้ว#nมันมีหลายจุดเลยค่ะที่ฝุ่นจับจนสกปรก"
31100-98 = "ถ้าปล่อยไว้แบบนี้จะไม่ดีต่อสุขภาพนะคะ วันนี้เราควรเริ่มจากทำความสะอาด#nแล้วจัดข้าวของรอบๆ ให้เป็นระเบียบก่อนแล้วค่อยเรียนหนังสือดีกว่าค่ะ!"
31100-99 = "กะ.. ก็จริงนะคะ ฉันว่าต้องทำความสะอาดโต๊ะเรียนก่อนถึงจะเริ่มเรียนได้..."
31100-100 = "อื้ม สุขอนามัยเป็นสิ่งสำคัญที่สุด การปัดฝุ่นและเก็บขยะที่ถูกทิ้งไว้นานๆ#nก็อาจจะช่วยกระตุ้นขวัญกำลังใจพวกเราได้"
31100-101 = "ทะ... ทำความสะอาด? ถะ... ถ้าอย่างนั้น... อืม..."
31100-102 = "จริงด้วย... อย่างที่ฮานาโกะจังว่าเลยค่ะ ในตอนแรกเริ่มเราจะให้ความตั้งใจมาเป็น#nสิ่งเดียวที่นำทางไม่ได้สินะคะ"
31100-103 = "สิ่งที่พวกเราต้องทำก็คือการแข่งขันระยะไกลที่ต้องควบคุมความเร็วควบคู่กันไปด้วย...#nเราจะลืมสิ่งนี้ไม่ได้..."
31100-108 = "ใช่ค่ะ! งั้นเราก็มาทำความสะอาดครั้งใหญ่เพื่อเตรียมพร้อมอย่างถูกต้องกันเลยค่ะ! "
31100-109 = "[s] \"โอ้วว!\""
31100-110 = "งั้นเราแยกย้ายกันไปเปลี่ยนชุดเป็นชุดทำความสะอาด แล้วอีก 10 นาทีมาเจอกันหน้าอาคารนะคะ!"
31100-111 = "เข้าใจแล้วล่ะ"
31100-112 = "ค่า~!"
31100-118 = "ชุดทำความสะอาดเหรอ...? ใส่ชุดพละก็น่าจะได้เนอะ?"
31100-120 = "10 นาทีต่อมา"
31100-122 = "ประตูหน้าอาคารย่อย"
31100-123 = "มาเลยค่ะคุณครู!"
31100-124 = "[s1] \"นั่นมันชุดพละนี่นา\"\n[s2] \"จริงจังกันจังเลยนะ\""
31100-125 = "ค่ะ ถ้าจะทำอะไรจริงจัง ชุดที่ใส่ก็สำคัญนะคะ เพราะเราเคลื่อนไหวสะดวกในชุดพละ#nและถึงชุดจะเลอะก็ซักออกง่ายด้วย..."
31100-126 = "ค่ะ ถ้าจะทำอะไรจริงจัง ชุดที่ใส่ก็สำคัญนะคะ เพราะเราเคลื่อนไหวสะดวกในชุดพละ#nและถึงชุดจะเลอะก็ซักออกง่ายด้วย..."
31100-127 = "ให้ฉันทำอะไรเหรอ...?"
31100-128 = "มาเร็วจังเลยนะคะโคฮารุจัง"
31100-129 = "อื้ม ฉันก็มาแล้ว"
31100-130 = "อาซึสะจัง... ไม่เห็นต้องเอาปืนมาด้วยเลย..."
31100-131 = "ขึ้นชื่อว่าอาวุธเฉพาะกายก็ต้องพกติดตัวไว้ตลอดสิ เราไม่รู้หรอกนะว่าจะมีใครโจมตีมาเมื่อไร"
31100-132 = "อ่า... เอ่อ..."
31100-137 = "อุ๊ย นี่ทุกคนมากันครบแล้วเหรอคะเนี่ย?"
31100-138 = "แม่เจ้า!!  ไม่ได้นะ!!  แบบนี้ไม่ได้!!"
31100-139 = "โอ๊ะโอ? "
31100-140 = "ทำไมถึงใส่ชุดว่ายน้ำมาทำความสะอาดล่ะ! นี่มันใช้ได้ที่ไหนกันเล่า! "
31100-141 = "แต่ฉันเคลื่อนไหวสะดวกในชุดนี้ แถมเป็นชุดที่ถึงจะเลอะอะไรก็ซักง่ายด้วย..."
31100-142 = "พูดบ้าๆ อะไรออกมาน่ะ! ชุดว่ายน้ำก็เอาไว้ใส่ตอนว่ายน้ำสิ! ถะ... ถ้ามีใครมาเห็นเข้าจะทำยังไง...!"
31100-143 = "อืม... แต่ที่อาคารย่อยแห่งนี้ก็มีแค่พวกเรานี่คะ? "
31100-144 = "ยังไงก็ไม่ได้!  ไม่ได้นะ! จากนี้ห้ามฮานาโกะใส่ชุดว่ายน้ำอีก!! "
31100-146 = "อืมม... "
31100-147 = "เฮ้อ..."
31100-149 = "แล้วฮานาโกะก็ไปเปลี่ยนชุดเป็นชุดพละ"
31100-151 = "ตอนต่อไป;ทำความสะอาดครั้งใหญ่!"

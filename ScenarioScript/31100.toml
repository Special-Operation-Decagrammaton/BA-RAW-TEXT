[translation]
31100-1 = "第10話;合宿，START！"
31100-5 = "三一的別館「合宿處」"
31100-7 = "終於到了！這裡就是我們合宿的地方嗎？"
31100-8 = "啊，啊哈哈…… "
31100-9 = "哎呀，聽說是已經一段時間沒人使用的別館，#n本來還以為必須裸體睡在冰冷的地板上呢……"
31100-10 = "結果不只寬敞又整潔，甚至連可愛的床都有。"
31100-12 = "真是太好了，這樣大家就能一起在床上裸睡了呢♡"
31100-13 = "為什麼要一直強調「裸體」啊！？#n而且床的數量也夠，各睡各的不就好了！！"
31100-14 = "唔嗯……可是難得有機會合宿，多學習形形色色的知識不也是件好事嗎？"
31100-15 = "不行！禁止色色！死刑！！ "
31100-16 = "嗯……好吧，反正夜晚還很漫長♡"
31100-17 = "……！？"
31100-22 = "那個……大家接下來一週都要一起吃住和學習，所以……"
31100-26 = "咦？梓醬到哪裡去了……？"
31100-27 = "哎呀，剛才還在這裡的說……"
31100-34 = "已偵查完畢。"
31100-35 = "偵，偵查……？"
31100-36 = "距離三一本館有相當的距離，應該沒有被狙擊的風險。"
31100-37 = "與外部相連的出入口只有兩個，這點我也很滿意。"
31100-38 = "如果遇到緊急情況可以擋住一邊的入口，將襲擊者引誘到1樓體育館進行殲滅戰。"
31100-39 = "雖然有確認到某些地方的安全性不足，不過只要改建一下應該不成問題。"
31100-41 = "啊嗚嗚…… "
31100-42 = "而這裡就是兵營……不，居住區嗎。#n……真漂亮呢。"
31100-43 = "竟然將這種設施放置不用……浪費也要有個限度。"
31100-44 = "啊嗚，梓醬……我們並不是來這裡戰鬥，是來學習的唷……？"
31100-45 = "我知道。是為期一週的集中訓練對吧？#n禁止外出、毫無自由時間、24小時的一舉一動都會受到控制的高強度訓練。"
31100-46 = "應該是沒有到那種程度啦……"
31100-47 = "為了不影響訓練，我把個人物品都帶來了。#n像是體育服、換洗衣服，衛生方面的牙膏牙刷、肥皂、緊急食品、毛毯、水壺等等。"
31100-48 = "哎呀哎呀，不愧是梓醬，準備得真周到呢。 "
31100-49 = "當然。徹底做好準備是成功的第一步。"
31100-51 = "……唔呵呵。#n大家一起吃飯、睡覺，並朝著同一個目標努力……感覺會是場快樂的合宿呢？"
31100-52 = "……"
31100-53 = "……嗯，希望如此。"
31100-57 = "不過我也會確實完成任務。#n「為了在第2次特別學力測驗中合格而努力念書」才是來到這裡的目標。"
31100-58 = "……我不想造成大家的麻煩。"
31100-59 = "梓醬…… "
31100-60 = "除此之外，為了防範可能的敵襲，我也準備了對人地雷和闊刀地雷。#n還有可以製作[ruby=IED]簡易爆炸裝置[/ruby]的材料一式和數枚對戰車地雷──"
31100-61 = "啊，啊嗚……梓醬，先，先別說這些了！"
31100-63 = "唔嗯……"
31100-64 = "根據渚大人的命令，因為我們很遺憾地沒有通過第1次特別學力測驗……"
31100-65 = "所以在第2次特別學力測驗前的一週，我們必須在這個別館進行合宿。"
31100-66 = "雖然是棟長期被棄置的建築，只要稍微打掃一下應該還能正常使用才對。#n體育館和淋浴室之類的附加設施也很齊全……"
31100-67 = "外面還有個泳池。不過看起來也好一段時間沒人使用了。"
31100-68 = "嗯，這裡距離三一本館也是走路就能抵達的距離，#n地下還有能做些簡單料理的食堂，我想應該不用擔心會餓肚子。 "
31100-69 = "而且我們在這裡的期間，[USERNAME]老師也預計會一直和我們在一起，#n要是真的有什麼狀況也能求助……"
31100-70 = "[s]「嗯，包在我身上。」"
31100-71 = "啊哈哈……謝謝老師。#n我為老師準備了走道另一側的房間，請老師……"
31100-77 = "不行，絕對不行！！同衾什麼的根本是色色嘛！！！死刑！！！"
31100-78 = "嗯？小春醬？我什麼都還沒說呀……？"
31100-79 = "你會說什麼我基本上都知道啦！！不行就是不行！禁止！死刑！ "
31100-80 = "小春醬真嚴格呢……"
31100-81 = "其實也無所謂吧？#n反正這裡還有床，用那麼多房間也有點浪費。"
31100-82 = "[s]「沒關係，我就在附近，如果有什麼事再叫我吧。」"
31100-83 = "啊哈哈……那麼我們就趕緊整理行李，開始讀書吧……"
31100-84 = "哎呀？日步美醬，在那之前應該還有事要先做吧？"
31100-85 = "咦……？"
31100-90 = "是要設置陷阱防止敵襲……？"
31100-94 = "不對……"
31100-95 = "正確答案是打掃唷♡"
31100-96 = "打，打掃……？"
31100-97 = "沒錯！就算這裡是有在管理的建築，#n也因為長時間沒人使用的關係積了很多灰塵不是嗎？"
31100-98 = "就這樣在這裡生活對健康不太好，今天就先把環境打掃乾淨，之後再開始讀書吧？"
31100-99 = "……說，說的也是。#n在開始念書之前總是要整理一下書桌……"
31100-100 = "嗯，衛生是很重要的。#n把灰塵和垃圾清理乾淨也有助於提升士氣。"
31100-101 = "打，打掃……？#n也，也不是不行……"
31100-102 = "……嗯，花子醬說的對。#n一開始就充滿幹勁也未必是好事……"
31100-103 = "我們應該像長距離賽跑一樣，好好維持自己的節奏與步伐才對……"
31100-108 = "那麼就先從大掃除開始吧！"
31100-109 = "[s]「好，加油吧！」"
31100-110 = "請大家換上掃除服裝，10分鐘後在建築物前集合！"
31100-111 = "我知道了。"
31100-112 = "是～！"
31100-118 = "掃除服裝……？體，體育服就可以了吧……？"
31100-120 = "（10分鐘後……）"
31100-122 = "合宿處．正門"
31100-123 = "老師，久等了！"
31100-124 = "[s1]「哦哦，穿著體育服。」\n[s2]「有打掃的感覺呢。」"
31100-125 = "是，想認真打掃的話，服裝也是很重要的。#n體育服不只方便行動，萬一弄髒也很好清洗。"
31100-126 = "是，想認真打掃的話，服裝也是很重要的。#n體育服不只方便行動，萬一弄髒也很好清洗。"
31100-127 = "我，我該做什麼……？"
31100-128 = "小春醬來得真快呢。"
31100-129 = "久等了。"
31100-130 = "梓醬……？應該沒必要帶槍過來吧……？"
31100-131 = "槍不隨身攜帶就沒有意義了吧？#n畢竟沒人知道襲擊什麼時候會發生。"
31100-132 = "啊，啊嗚……"
31100-137 = "久等了，大家動作真快呢？"
31100-138 = "出局──────！！！"
31100-139 = "咦……？ "
31100-140 = "為什麼明明是打掃卻穿泳裝啊！？是笨蛋嗎！？是笨蛋吧！？笨──蛋！！"
31100-141 = "可是泳裝不只行動很方便，弄髒後也很好洗……"
31100-142 = "不是那種問題吧！？泳裝是在泳池穿的東西！話說，被，被別人看到了怎麼辦！？"
31100-143 = "啊……可是別館裡除了我們也沒有別人呀？"
31100-144 = "總之不行就是不行！我說出局就是出局！以後禁止你再穿泳裝！"
31100-146 = "哎呀……"
31100-147 = "啊，啊嗚……"
31100-149 = "（之後花子乖乖換上了體育服）"
31100-151 = "下一話;大掃除！"

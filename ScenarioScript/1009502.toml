[translation]
1009502-1 = "我要當女僕，老師"
1009502-2 = "（在千年的行程比預想中還早結束）"
1009502-3 = "（想起綠說的話後，決定前往遊戲開發部）"
1009502-7 = "[ns]「有人在嗎～？我來玩了～」"
1009502-9 = "嗯？老，老老老老，老師！？#n現，現在有點，就是……！"
1009502-10 = "雖，雖然說過如果老師能來的話我會很開心……！"
1009502-11 = "[s1]「你好呀，綠。」\n[s2]「這次是女僕裝啊。」"
1009502-14 = "為什麼這麼淡定！？"
1009502-15 = "[s]「沒有啦，只是漸漸開始習慣了。」"
1009502-16 = "可是這麼淡定會讓我覺得有點難過！"
1009502-17 = "[s]「為什麼！？」"
1009502-18 = "因為這樣的話，就好像只有我很慌張一樣！"
1009502-19 = "而且我畢竟換上了跟平常不同的衣服，老師都沒反應不太好吧！"
1009502-20 = "當然那也不是壞事！"
1009502-21 = "只是覺得……多少也該有一點反應……！"
1009502-22 = "[s]「有關反應的部分，麻煩再說得詳細一點。」"
1009502-23 = "想讓我說出來嗎！？"
1009502-24 = "如果老師想要的話……也不是……不行……"
1009502-26 = "該怎麼說呢，就是……#n比方說，就好比，簡單來說就是……！"
1009502-27 = "[s]「沒關係，綠，你先冷靜……」"
1009502-30 = "那個……我在構想以女僕為主角的遊戲原畫。"
1009502-31 = "可是卻越想越搞不清楚……"
1009502-32 = "因為女僕裝的參考資料非常多。"
1009502-33 = "或者該說多到讓人傷腦筋的地步……"
1009502-34 = "害我反而抓不到核心。"
1009502-35 = "所以才想說要不要乾脆直接體驗看看……"
1009502-36 = "[s]「所以才會親自試穿女僕裝嗎？」"
1009502-37 = "是……"
1009502-38 = "你問我需要做到這個地步嗎？#n那當然！"
1009502-39 = "老師，一般的女僕太無聊了，現在就是這種時代。"
1009502-40 = "在所有方面都優秀得無懈可擊，唯獨在自己面前會展現出軟弱一面的那種女僕──#n簡直就跟路邊的石頭一樣多。"
1009502-41 = "強大、擅長戰鬥、潛入和剷除目標，進而解救世界的女僕……現在實在太常見了！"
1009502-42 = "[s] （那種女僕如果常見，實在不太妙吧……）"
1009502-43 = "所以現在！我想要反其道而行，構想出一名正宗的女僕！"
1009502-44 = "可是……卻在這裡陷入了瓶頸……"
1009502-45 = "所謂正宗的女僕，究竟是什麼樣的呢……？"
1009502-46 = "老師有什麼想法嗎？"
1009502-47 = "[s]「我也不知道……」"
1009502-48 = "沒關係，老師。我稍微有點頭緒了。"
1009502-49 = "對於正宗女僕來說，重要的是「主人」！"
1009502-50 = "主人必須下達指示、進行管理、完成工作時提供報酬，對於不足之處則給予懲罰！"
1009502-51 = "要說得更直接一點的話，如果沒有服侍的對象，那服侍的人也就沒有意義了。"
1009502-52 = "從現實的角度來看，要是沒有提供報酬的僱主，女僕就無法存在！"
1009502-53 = "[s]「報酬確實重要！」"
1009502-54 = "對吧？呵呵呵。很高興老師能理解。"
1009502-55 = "總之，對於現在的我來說，最重要的是瞭解什麼是女僕。"
1009502-56 = "為了瞭解女僕，我必須親自站在女僕的立場。"
1009502-57 = "而為了站在女僕的立場──"
1009502-58 = "主人可說是不可或缺的！"
1009502-59 = "因此從今天起，我只能暫時當老師的女僕了！"
1009502-60 = "[s]「不覺得結論有點奇怪嗎！？」"
1009502-61 = "不，這是極為合理的結論。"
1009502-62 = "至少比姐姐寫的劇本有邏輯！"
1009502-63 = "[s]「好像……很有說服力！」"
1009502-64 = "呵呵呵。對吧？"
1009502-65 = "所以老師，之後要暫時請你多多關照了。"
1009502-66 = "請問有什麼指示呢？"
1009502-67 = "主人？"
1009502-68 = "如果需要的話，現在一起回夏萊做各種家務也沒問題……"
1009502-72 = "我也覺得這是個好主意，馬上執行吧！"
1009502-73 = "[s]「綠，你先冷靜一點。」"
1009502-74 = "我現在就非常冷靜哦？"
1009502-76 = "（勸退了堅持要服侍的綠之後，好不容易才離開……）"

[translation]
1009502-1 = "ฉันจะเป็นเมดค่ะคุณครู"
1009502-2 = "(งานของคุณครูที่มิลเลเนียมเสร็จเร็วกว่าที่คิดเอาไว้)"
1009502-3 = "(คุณครูนึกถึงข้อความของมิโดริ จึงตัดสินใจไปหาเธอที่ชมรมพัฒนาเกม)"
1009502-7 = "[ns] \"มีใครอยู่มั้ย~? ขอเล่นเกมหน่อย~\""
1009502-9 = "เอ๋? คะ... คะคะคะคะ... คุณครู?! ตะ... ตอนนี้มัน...!"
1009502-10 = "ฉะ... ฉันบอกไปว่าอยากให้คุณครูแวะมาที่ห้องชมรมก็จริง...!"
1009502-11 = "[s1] \"อื้อ สวัสดี มิโดริ\"\n[s2] \"ใส่ชุดเมดอยู่ด้วยเหรอเนี่ย\""
1009502-14 = "ทำไมนิ่งเฉยขนาดนั้นล่ะคะ?!"
1009502-15 = "[s] \"อ่า ตอนนี้ครูเริ่มชินกับหลายๆ อย่างแล้วน่ะ\""
1009502-16 = "แต่นั่นก็เป็นท่าทีที่น่าเสียใจอยู่นะคะ!"
1009502-17 = "[s] \"ทำไมล่ะ?!\""
1009502-18 = "ก็การที่ฉันตกใจอยู่คนเดียวมันก็ยังไงๆ อยู่!"
1009502-19 = "เพราะนี่เป็นชุดที่ฉันไม่ได้ใส่ในเวลาปกติ แต่คุณครูก็มีปฏิกิริยาธรรมดาสุดๆ ไปเลย!"
1009502-20 = "แน่นอนว่านั่นไม่ใช่เรื่องไม่ดีหรอกค่ะ!"
1009502-21 = "แต่ฉันแค่คิดว่าคุณครูอาจจะแสดงท่าทีบางอย่างที่มากกว่านั้นได้...!"
1009502-22 = "[s] \"ท่าทีบางอย่างที่ว่าคืออะไรเหรอ?\""
1009502-23 = "ฉันต้องบอกคุณครูด้วยตัวเองเหรอคะ?!"
1009502-24 = "แต่ถ้าคุณครูอยากให้ฉันบอก ฉันก็บอกได้ค่ะ..."
1009502-26 = "ถ้าจะให้บอกก็คือ... ตัวอย่างเช่น... สมมติว่า... ถ้าให้สรุปละก็...!"
1009502-27 = "[s] \"ไม่เป็นไรนะ มิโดริ ช้าๆ ใจเย็นๆ ก่อน...\""
1009502-30 = "อ่า... คือตอนนี้ฉันกำลังวาดรูปต้นแบบของเกมที่มีเมดเป็นตัวละครหลักอยู่น่ะค่ะ"
1009502-31 = "แต่พอวาดไปเรื่อยๆ ก็เริ่มไม่แน่ใจค่ะ..."
1009502-32 = "ฉันลองหารูปอ้างอิงเกี่ยวกับชุดเมดดู แล้วมันก็มีเยอะเต็มไปหมดเลยน่ะค่ะ"
1009502-33 = "พอมันมีเยอะเกิน กลายเป็นว่าฉันยิ่งเลือกไม่ถูก..."
1009502-34 = "เพราะไม่รู้ว่าจะยึดจากอะไรดีค่ะ"
1009502-35 = "ฉันก็เลยคิดว่าถ้างั้นก็ลองใส่เองเลยดีมั้ย..."
1009502-36 = "[s] \"ก็เลยลองใส่ดูอย่างที่เห็นตอนนี้เหรอ?\""
1009502-37 = "ค่ะ..."
1009502-38 = "ฉันไม่จำเป็นต้องทำขนาดนั้นก็ได้เหรอคะ? ต้องทำขนาดนั้นสิคะ!"
1009502-39 = "คุณครู ตอนนี้เมดเป็นอาชีพที่น่าเบื่อนะคะ"
1009502-40 = "ถึงพวกเธอจะเป็นเลิศและเก่งกาจในทุกเรื่อง แต่สุดท้ายเมื่อเธออยู่คนเดียวก็จะเปิดเผยด้านที่อ่อนแอ#nของตัวเองออกมา เมดแบบนี้น่ะมีอยู่เกลื่อนถนนเลยค่ะ"
1009502-41 = "เมดที่แข็งแกร่ง ต่อสู้เก่ง ทำภารกิจแฝงตัว กำจัดเป้าหมาย และกอบกู้โลกได้น่ะมีถมเถไปค่ะ!"
1009502-42 = "[s] (ไม่น่าจะมีถมเถไปนะ...)"
1009502-43 = "เพราะงั้นฉันก็เลยจะวาดเมดแบบดั้งเดิมแทนค่ะ! ต้องทำอย่างนั้นค่ะ!"
1009502-44 = "แต่ว่า... ฉันก็ติดอยู่ที่ตรงนี้ละค่ะ..."
1009502-45 = "เมดแบบดั้งเดิม... เป็นยังไงเหรอคะ...?"
1009502-46 = "คุณครูคิดว่ายังไงบ้างเหรอคะ?"
1009502-47 = "[s] \"ครูก็ไม่รู้เหมือนกัน...\""
1009502-48 = "ไม่เป็นไรค่ะคุณครู ฉันมีคิดไว้บ้างแล้วค่ะ"
1009502-49 = "สิ่งสำคัญของเมดแบบดั้งเดิมก็คือการมี 'นายท่าน' ค่ะ"
1009502-50 = "นายท่านที่ออกคำสั่ง จัดการ มอบรางวัลให้เมื่อทำงานได้ดี และลงโทษเมื่อทำงานพลาด!"
1009502-51 = "ถ้าให้พูดตรงๆ ก็คือ ถ้าไม่มีคนให้คอยปรนนิบัติรับใช้ ฝ่ายที่รับใช้ก็จะไม่มีความหมายค่ะ"
1009502-52 = "และถ้าให้พูดตามความเป็นจริงก็คือ ถ้าไม่มีผู้ว่าจ้างที่ให้ค่าตอบแทน เมดก็อยู่ไม่ได้ค่ะ"
1009502-53 = "[s] \"ค่าตอบแทนก็สำคัญอย่างที่ว่าละนะ\""
1009502-54 = "คิดเหมือนกันใช่มั้ยคะ? แหะๆๆ ดีใจจังเลยค่ะที่คุณครูเข้าใจ"
1009502-55 = "สิ่งสำคัญของฉันในตอนนี้ก็คือการทำความเข้าใจเมดค่ะ"
1009502-56 = "และถ้าจะเข้าใจในตัวเมด ฉันก็ควรทดลองเป็นเมดด้วยตัวเอง"
1009502-57 = "และเพื่อจะได้เป็นเมดที่ว่า"
1009502-58 = "ฉันก็ต้องมีนายท่านค่ะ!"
1009502-59 = "เพราะงั้นตั้งแต่วันนี้เป็นต้นไป ฉันจะเป็นเมดให้คุณครูสักระยะค่ะ!"
1009502-60 = "[s] \"ข้อสรุปมันแปลกไปหน่อยหรือเปล่า?!\""
1009502-61 = "ไม่หรอกค่ะ นี่คือข้อสรุปที่สมเหตุสมผลที่สุดแล้วค่ะ"
1009502-62 = "อย่างน้อยก็มีเหตุผลมากกว่าเนื้อเรื่องของพี่โมโมอิค่ะ!"
1009502-63 = "[s] \"โน้มน้าวเก่ง... ใช้ได้เลยนะ!\""
1009502-64 = "แหะๆๆ ฉันพูดถูกใช่มั้ยคะ?"
1009502-65 = "เพราะงั้น คุณครูคะ ต่อไปก็ขอรบกวนด้วยนะคะ"
1009502-66 = "จะสั่งงานอะไรก่อนเหรอคะ"
1009502-67 = "นายท่าน?"
1009502-68 = "จะให้ฉันกลับไปชาเล่ต์กับนายท่าน แล้วให้ฉันช่วยงานบ้านก็ได้นะคะ...?"
1009502-72 = "การพูดเสนอตัวก่อนก็ดีเหมือนกันนะคะเนี่ย รีบไปกันเถอะค่ะ!"
1009502-73 = "[s] \"มิโดริ ครูขอละ ใจเย็นๆ ก่อนนะ ตั้งสติก่อน\""
1009502-74 = "ตอนนี้ฉันมีสติมากๆ แล้วนะคะ"
1009502-76 = "(มิโดริดื้อดึงว่าจะมารับใช้คุณครู แต่คุณครูก็ห้ามปรามไว้ได้และกลับมายังชาเล่ต์ได้อย่างหวุดหวิด...)"

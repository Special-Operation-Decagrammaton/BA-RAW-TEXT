[translation]
1009502-1 = "#title;메이드가 될 거예요, 선생님."
1009502-2 = "#na;(밀레니엄에서의 일정이 생각보다 빨리 끝났다.)"
1009502-3 = "#na;(미도리의 말이 떠올라서, 게임개발부를 찾아가 보기로 했다.)"
1009502-4 = "#all;hide"
1009502-5 = "#wait;2000"
1009502-6 = "#wait;1200"
1009502-7 = "[ns] \"누구 있어~? 놀러 왔는데~\""
1009502-8 = "4;미도리 메이드;10\n#4;a\n#4;em;[?!]\n#wait;1200"
1009502-9 = "4;미도리 메이드;10;어? 서, 서서서서, 선생님?! 지, 지금은 조금, 그러니까……!\n#4;m3\n#4;jump"
1009502-10 = "4;미도리 메이드;04;부, 분명 부실에 들러 주시면 기쁠 것 같다고 말씀드리기는 했지만……!\n#4;shake\n#4;em;[훌쩍]"
1009502-11 = "[s1] \"아, 응. 안녕. 미도리.\"\n[s2] \"이번엔 메이드복이구나.\""
1009502-12 = "#wait;100"
1009502-13 = "#wait;100"
1009502-14 = "4;미도리 메이드;10;왜 그렇게 태연하신 거예요?!\n#4;hophop"
1009502-15 = "[s] \"아니, 그게. 이제 슬슬 여러모로 익숙해져 가고 있달까.\""
1009502-16 = "4;미도리 메이드;12;그것도 어딘가 서운한 반응인데요!\n#4;em;[속상함]"
1009502-17 = "[s] \"어째서?!\""
1009502-18 = "4;미도리 메이드;10;그러니까 우선, 저만 당황하는 것도 뭔가 그렇고!\n#4;hophop\n#4;em;[!]"
1009502-19 = "4;미도리 메이드;10;그래도 평소와는 다른 옷인데, 평범하게 반응하시는 것도 그렇고!\n#4;stiff"
1009502-20 = "4;미도리 메이드;07;물론 그게 나쁘다는 것은 아니긴 한데요!\n#4;jump"
1009502-21 = "4;미도리 메이드;12;좀 더 이런저런 반응을 할 수도 있는 것 아닌가, 하는 생각도 들고……!\n#4;em;[속상함]"
1009502-22 = "[s] \"그, 이런 저런 반응이라는 부분을 좀 더 자세하게.\""
1009502-23 = "4;미도리 메이드;10;그걸 말하게 할 생각이신가요?!\n#4;hophop"
1009502-24 = "4;미도리 메이드;07;……그렇지만 선생님께서 원하신다면 말해 드릴 수도…… 없는 건…… 아니고요……."
1009502-25 = "#all;hide"
1009502-26 = "3;미도리 메이드;10;그러니까, 말하자면, 예를 들어, 가령, 요약해서……!\n#3;closeup\n#3;a"
1009502-27 = "[s] \"괜찮아, 미도리. 다 괜찮으니까 진정하자…….\""
1009502-28 = "#all;hide"
1009502-29 = "3;미도리 메이드;05\n#3;a"
1009502-30 = "3;미도리 메이드;05;그러니까…… 메이드가 주인공인 게임의 원화를 구상하고 있었어요."
1009502-31 = "3;미도리 메이드;07;그런데, 점점 더 뭔가 잘 모르게 되어서 말이죠…….\n#3;em;[세로선]"
1009502-32 = "3;미도리 메이드;07;메이드복이란 건 찾아보면 엄청나게 레퍼런스가 많지만요."
1009502-33 = "3;미도리 메이드;10;아뇨, 오히려 많다 못해 흘러넘쳐 곤란할 지경이지만요…….\n#3;stiff"
1009502-34 = "3;미도리 메이드;12;오히려 그래서 중심을 못 잡겠는 거 있죠?"
1009502-35 = "3;미도리 메이드;07;그러니 차라리 직접 체험해 보면 어떨까 하는 생각에…….\n#3;em;[속상함]"
1009502-36 = "[s] \"직접 메이드복을 입어 보고 있었다는 거야?\""
1009502-37 = "3;미도리 메이드;07;네……."
1009502-38 = "3;미도리 메이드;02;그렇게까지 할 일이냐고요? 당연히 그렇게까지 할 일이죠!\n#3;em;[?]"
1009502-39 = "3;미도리 메이드;05;선생님. 웬만한 메이드는 식상해요. 그런 시대예요."
1009502-40 = "3;미도리 메이드;99;모든 일에 우수하고 무적이지만, 왠지 나에게만은 약한 모습을 보여 주는 메이드는 길거리에 굴러다니는 돌멩이만큼 많죠."
1009502-41 = "3;미도리 메이드;05;강하고, 잘 싸우고, 잠입 임무와 목표물 제거, 나아가 세상을 구하는 메이드는 이제 너무 흔하다구요!\n#3;em;[!]"
1009502-42 = "[s] (그런 게 흔하면 안 되지 않을까…….)"
1009502-43 = "3;미도리 메이드;13;그러니까 여기서는! 역발상으로 정통파 메이드를 구상하는 거예요! 그래야 해요!\n#3;hophop"
1009502-44 = "3;미도리 메이드;12;그런데…… 여기에서 막혔어요…….\n#3;em;[속상함]"
1009502-45 = "3;미도리 메이드;07;정통파 메이드라는 건, 또다시, 도대체 무엇일까요……?\n#3;stiff"
1009502-46 = "3;미도리 메이드;02;선생님께서는 어떻게 생각하세요?"
1009502-47 = "[s] \"나도 잘 모르겠는데…….\""
1009502-48 = "3;미도리 메이드;99;괜찮아요. 선생님. 저, 어느 정도 생각해 둔 부분이 있어요."
1009502-49 = "3;미도리 메이드;13;정통파 메이드에게 중요한 건, 바로 '주인님'이에요!\n#3;em;[!]"
1009502-50 = "3;미도리 메이드;05;지시를 내리고, 관리하고, 제대로 해 낸 일에는 보상을, 그리고 미흡한 일에는 페널티를 내리는 존재!\n#3;jump"
1009502-51 = "3;미도리 메이드;05;단도직입적으로 말씀드리자면, 섬길 대상이 없으면 섬기는 사람도 의미가 없다고 할 수 있죠."
1009502-52 = "3;미도리 메이드;13;더 현실적으로 말씀드리자면, 보수를 줄 고용인이 없으면 메이드는 존립할 수 없는 거예요!\n#3;hophop"
1009502-53 = "[s] \"확실히 보수는 중요하긴 해!\""
1009502-54 = "3;미도리 메이드;11;그렇죠? 에헤헤. 선생님께서 이해해 주신 것 같아서 기쁘네요.\n#3;em;[반짝]"
1009502-55 = "3;미도리 메이드;01;어쨌든 지금의 저에게 중요한 것은, 메이드라는 게 무엇인지 이해하는 거예요."
1009502-56 = "3;미도리 메이드;02;그리고 메이드를 이해하기 위해서는, 직접 메이드의 입장이 되어 보아야 하죠."
1009502-57 = "3;미도리 메이드;99;다시 한번, 그리고, 메이드의 입장이 되기 위해서는."
1009502-58 = "3;미도리 메이드;13;주인님이 필요한 것이라고 할 수 있죠!\n#3;closeup"
1009502-59 = "3;미도리 메이드;05;따라서 저는 오늘부터 당분간 선생님의 메이드가 될 수밖에 없는 거예요!\n#3;em;[!]\n#3;closeup"
1009502-60 = "[s] \"결론이 조금 이상하지 않아?!\""
1009502-61 = "3;미도리 메이드;05;아뇨. 이건 지극히 타당한 결론이에요.\n#3;hophop"
1009502-62 = "3;미도리 메이드;13;적어도 언니의 시나리오보다는 논리적이에요!\n#3;em;[!]"
1009502-63 = "[s] \"설득력이…… 있어!\""
1009502-64 = "3;미도리 메이드;11;에헤헤. 그렇죠?\n#3;em;[반짝]"
1009502-65 = "3;미도리 메이드;03;그런 의미에서, 선생님. 앞으로 당분간 잘 부탁드릴게요.\n#3;greeting"
1009502-66 = "3;미도리 메이드;03;뭐부터 지시하실 건가요."
1009502-67 = "3;미도리 메이드;11;주인님?"
1009502-68 = "3;미도리 메이드;03;여차하면 지금부터, 샬레로 같이 돌아가 여러 가지 가사를 도와드릴 수도 있고요……?"
1009502-69 = "#st;[0,0];instant;1;"
1009502-70 = "#clearST"
1009502-71 = "3;미도리 메이드;02\n#3;em;[!]\n#wait;1200"
1009502-72 = "3;미도리 메이드;11;스스로 말하고도 좋은 생각 같네요. 당장 실행하죠!\n#3;jump"
1009502-73 = "[s] \"미도리. 부탁이니까 진정해. 침착해야 해.\""
1009502-74 = "3;미도리 메이드;03;저는 더없이 침착한 상태인데요?\n#3;em;[반짝]"
1009502-75 = "#all;hide"
1009502-76 = "#na;(끝끝내 나를 모시겠다는 미도리를 만류하며, 간신히 돌아올 수 있었다…….)"

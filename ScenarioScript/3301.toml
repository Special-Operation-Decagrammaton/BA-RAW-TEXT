[translation]
3301-1 = "Swinging for the Fences 1"
3301-3 = "Let's play ball!"
3301-5 = "All right, everyone!"
3301-6 = "This is a practice match, so no need to be nervous."
3301-7 = "The opposing team is just a bunch of robots... Don't worry about getting booed or hit by a pitch."
3301-12 = "Wait, the Engineering Department made these?! That's super dangerous!"
3301-13 = "The pitching machine we got from them was merciless! It kept throwing balls as fast as the pros!"
3301-14 = "That darn robot would even taunt us before pitching!"
3301-15 = "Mmm, I know all of us are traumatized from that game..."
3301-16 = "But Seminar said they fixed all the bugs. We have nothing to fear this time."
3301-17 = "Now let's go play some good old baseball."
3301-27 = "Strike three! You're out!"
3301-30 = "Ugh... Struck out again."
3301-36 = "The pitching's too fast."
3301-45 = "Next up, Millennium Baseball Club's cleanup batter, Nomasa Rei."
3301-46 = "Hey, isn't she the rookie who just joined?"
3301-47 = "I heard she's an ace with an incredible 0.08 batting average..."
3301-48 = "Wait, she hits 8 out of every 100 balls? I can't even hit 1..."
3301-49 = "Aw, come on, girls. You're making me blush. Heeheehee..."
3301-50 = "Rei! Look out! The pitcher—"
3301-54 = "(Wind it up and—)"
3301-55 = "Here it comes!"
3301-67 = "She hit it!"
3301-68 = "At that speed?!"
3301-69 = "Look at it go!"
3301-70 = "No way! Is this the first home run of the season?"
3301-74 = "...Flyout!"
3301-76 = "*sigh*"
3301-77 = "Inning complete. Defense team, take positions!"
3301-80 = "...And that's game. Good work, everyone!"
3301-82 = "Good game!"
3301-83 = "You were on fire today, Rei!"
3301-84 = "Same to you. Good job out there!"
3301-85 = "I really thought we were gonna see a home run today..."
3301-86 = "Yeah. There was some real power behind that swing."
3301-87 = "Thanks...but..."
3301-88 = "That was no home run. I knew it the moment I hit the ball..."
3301-89 = "You could tell just from feeling the hit?"
3301-90 = "N-Not quite. I mean I've never ever landed a home run before."
3301-91 = "...It just didn't have that \"kablam\" feeling that comes from a real home run."
3301-92 = "Uhh...if you say so..."
3301-93 = "Well, I still have plenty of games left to bat a real one."
3301-94 = "You gals wouldn't happen to have any tips for hitting home runs would you?"
3301-99 = "Home run tips? I think launch angles are important?"
3301-100 = "A flying ball has constant acceleration movement vertically, and uniform linear motion horizontally. It reaches its maximum distance when struck at an angle of 45 degrees."
3301-101 = "No way! That ballistic equation only works in a vacuum. It's only considering the force of gravity. There are many other factors!"
3301-102 = "For a more accurate calculation, we need to consider drag and lift."
3301-107 = "The material of the bat is also important. You can get a faster swing if the bat is light with a lot of repulsive force."
3301-108 = "I heard the New Material Development Club did a report on the bat they made—"
3301-109 = "Maybe if you position yourself according to the golden rectangle, you can use the \"spin\" on the bat to—"
3301-116 = "I guess there's no magic formula to land a home run..."
3301-117 = "Maybe I just need some more muscle training?"
3301-121 = "M-Muscle training?"
3301-122 = "But muscle training is... *gasp* exercise."
3301-127 = "Don't do it! The Millennium Baseball Club is a theoretical one. Our focus is on equipment, record keeping, and theory! Not training!"
3301-128 = "Besides...you don't NEED to land home runs, right? Just get some good hits in and score some points."
3301-129 = "Right. The number of successful hits is more important than home runs when it comes to winning games."
3301-134 = "I know that, but I still want to land a home run!"
3301-138 = "Sorry, Rei. Our club can't really help when it comes to getting better at the game itself."
3301-139 = "I'm the president, and even I'm not in very competitive shape. All I've got for you is theory on how to score more hits."
3301-140 = "...I see."
3301-141 = "That said, I do know of an expert."
3301-142 = "Have you heard of the Athletics Training Club?"
3301-143 = "The Athletics Training Club?"
3301-145 = "Millennium Fitness Club"
3301-148 = "The new girl is running late..."
3301-149 = "If she keeps missing sessions, she's going to lose muscle."
3301-154 = "...Figures. She probably gave up on training after yesterday's workout."
3301-155 = "It feels like we're bleeding members. For both the Athletics Training Club, and the fitness club we work out in."
3301-156 = "Maybe I need to go out and recruit new members myself—"
3301-163 = "Excuse me. Is this the Athletics Training Club?"
3301-164 = "Why yes it is..."
3301-165 = "Hello, I'm Nomasa Rei from the Millennium Baseball Club."
3301-166 = "I talked to my president about getting some training to improve my batting average..."
3301-167 = "Training?"
3301-168 = "And she said your club would be great for strengthening my muscles."
3301-169 = "Muscles!"
3301-170 = "There's only so much I can do on my own, but I've heard the Athletics Training Club's regimens are based on science."
3301-171 = "Would it be all right if I joined until the next inter-high baseball season?"
3301-175 = "Sorry. I realize this is such a big ask. And on such short notice too..."
3301-176 = "I'll come back next week to give you time to think it—"
3301-178 = "Let's start right now!"
3301-179 = "H-Huh?"
3301-181 = "The effectiveness of training is like day and night if you've got the right mindset!"
3301-182 = "Once you've chosen the path of fitness, there's no time to waste!"
3301-183 = "Even just standing there, your muscles are shrinking bit by bit!"
3301-188 = "Let's fix that! Give me ten sets of squats! Do it!"
3301-189 = "W-Wait! I haven't even changed yet!"
3301-197 = "...And so, Rei began her fitness training journey with Sumire."

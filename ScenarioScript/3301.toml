[translation]
3301-1 = "ขว้างไปให้ไกล (1)"
3301-3 = "<เพลย์ บอล...!>"
3301-5 = "เอาละ ทุกคนตั้งใจฟัง!"
3301-6 = "การแข่งขันครั้งนี้เป็นเพียงแค่การฝึกแข่งขัน ทุกคนไม่ต้องเครียดไปหรอกนะ"
3301-7 = "ฝ่ายตรงข้ามเป็นแค่หุ่นยนต์ที่ทางชมรมวิศวกรรมช่วยสร้างให้... เพราะงั้นไม่ต้องกลัวว่าจะถูกเย้ยหยัน หรือโดนปาบอลใส่"
3301-12 = "แต่ถ้าเป็นหุ่นยนต์ที่ชมรมวิศวกรรมสร้าง ก็ยิ่งอันตรายไม่ใช่เหรอคะ?"
3301-13 = "ได้ยินว่าเครื่องขว้างบอลที่สมาชิกใหม่ของชมรมวิศวกรรมเอามาให้เมื่อคราวก่อนขว้างลูกฟาสต์บอล#nแบบไม่หยุดหย่อนเลยนะคะ แถมยังขว้างได้ดีกว่านักเบสบอลระดับโปรอีกด้วย..."
3301-14 = "ไม่ใช่แค่นั้นนะคะ หุ่นยนต์ตัวนั้นยั่วยุอีกฝ่ายก่อนจะขว้างบอลด้วยค่ะ!"
3301-15 = "อืม ก็จริงนะ ตอนนั้นฉันเจ็บใจมากเลยละ..."
3301-16 = "แต่หลังจากเหตุการณ์เมื่อคราวนั้น กรรมการจากเซมิน่าก็รับปากว่าจะแก้ปัญหาให้ เพราะงั้นครั้งนี้เราก็ไม่ต้องกังวลหรอก"
3301-17 = "ทุกคนมาสนุกกับเบสบอลและการแข่งขันกันเถอะ"
3301-27 = "<ทรี สไตรค์... เอาต์!>"
3301-30 = "เฮ้อ... ฮอตสวิงอีกจนได้"
3301-36 = "บอลเร็วเกินไปแล้วนะ~"
3301-45 = "<และแบตเตอร์คนต่อไปก็คือ... โนมาสะ เรย์ แบตเตอร์ลำดับที่ 4 ของชมรมเบสบอลแห่งมิลเลเนียม>"
3301-46 = "เด็กคนนั้น... เป็นเด็กใหม่ที่เพิ่งมาเข้าชมรมเบสบอลนี่นา?"
3301-47 = "ได้ยินว่าตอนทดสอบเข้าชมรม เธอตีลูกได้ถึง 8% จนได้ตำแหน่งเอซเลยนะ..."
3301-48 = "ตีได้ตั้ง 8 ลูกจาก 100 ลูกเลยเหรอ ทำได้ยังไงกันน่ะ? สุดยอดไปเลย..."
3301-49 = "ไม่เอาน่า พวกรุ่นพี่นี่ก็... ชมกันแบบนี้ฉันก็เขินนะคะ แหะๆ..."
3301-50 = "เรย์จัง ดูข้างหน้าสิ! ข้างหน้า!"
3301-54 = "<พร้อมขว้าง...>"
3301-55 = "มาแล้ว...!"
3301-67 = "โดนด้วย...!"
3301-68 = "ตีลูกเร็วๆ แบบนั้นได้งั้นเหรอ?"
3301-69 = "บอลขึ้นไปสูงมากเลย!"
3301-70 = "อย่าบอกนะว่านี่จะเป็นโฮมรันแรกของซีซั่นนี้..."
3301-74 = "<ฟลาย เอาต์...!>"
3301-76 = "เฮ้อ..."
3301-77 = "<เปลี่ยนฝ่ายรับ กลับไปตำแหน่งรับบอล!>"
3301-80 = "จบการแข่งขัน ทุกคนทำได้ดีมาก!"
3301-82 = "ขอบคุณมากค่ะ!"
3301-83 = "เรย์จังก็ทำได้ดีมากเลยนะ! วันนี้ทำผลงานได้เยี่ยมไปเลย"
3301-84 = "ไม่ขนาดนั้นหรอกค่ะ พวกรุ่นพี่ก็ทำได้ดีมากเลยค่ะ!"
3301-85 = "จะว่าไปก็น่าเสียดายนะ คิดว่าวันนี้จะได้เห็นลูกโฮมรันแล้วซะอีก..."
3301-86 = "นั่นน่ะสิ ลูกเมื่อกี้ที่ตีโดนเข้าอย่างจังนั่นน่ะ ฉันคิดว่าต้องเป็นโฮมรันแล้วเชียว"
3301-87 = "ยังไงก็ขอบคุณนะคะ..."
3301-88 = "แต่ที่จริงแล้ว ฉันรู้สึกได้ตั้งแต่ตอนที่บอลโดนไม้แล้วละค่ะว่านั่นไม่ใช่ลูกโฮมรัน"
3301-89 = "แค่ใช้ความรู้สึกตอนตีลูกก็รู้ได้เลยเหรอว่าจะเป็นโฮมรันรึเปล่าน่ะ?"
3301-90 = "อ่า ไม่ใช่อย่างนั้นหรอกค่ะ ฉันเองก็ไม่เคยตีลูกโฮมรันได้มาก่อน ก็เลยไม่ได้รู้ละเอียดอะไร..."
3301-91 = "แต่แค่ฉันไม่รู้สึกว่ามัน 'เป้ง' ตามเอกลักษณ์ของลูกโฮมรันน่ะค่ะ"
3301-92 = "อืม... ไม่เห็นเข้าใจเท่าไรเลย..."
3301-93 = "เอาเถอะค่ะ การแข่งขันยังเหลืออีกตั้งเยอะนะคะ"
3301-94 = "ว่าแต่ ถ้าต่อไปฉันอยากตีลูกโฮมรันให้ได้ ฉันต้องใส่ใจเรื่องไหนเหรอคะ?"
3301-99 = "เคล็ดลับในการตีลูกโฮมรัน... น่าจะเป็นเรื่องมุมของบอลนะ?"
3301-100 = "บอลที่ลอยไปจะเคลื่อนที่ในแนวดิ่งด้วยความเร่งที่มีค่าคงตัว ส่วนในแนวนอนจะเคลื่อนที่แบบวงกลม#nสม่ำเสมอ และจะทำระยะได้ไกลที่สุดเมื่อทำมุม 45 องศา"
3301-101 = "เดี๋ยวสิ นั่นมันสมการของการเคลื่อนที่ในสูญญากาศที่พิจารณาเฉพาะผลแรงโน้มถ่วงไม่ใช่เหรอ?"
3301-102 = "ถ้าจะคำนวณแรงภายนอกที่กระทำต่อวัตถุให้ถูกต้อง ก็ต้องพิจารณาแรงยกกับแรงต้านด้วยสิ"
3301-107 = "คุณภาพของไม้ตีก็สำคัญนะ ยิ่งแรงผลักเยอะและน้ำหนักเบา ก็จะยิ่งสวิงได้เร็วขึ้น!"
3301-108 = "ล่าสุดไม้ตีจากวัสดุใหม่ที่ทาง <ชมรมพัฒนาวัสดุใหม่> คิดค้นขึ้นก็มีงานวิจัยว่าให้ความรู้สึกตอนตีดีขึ้น#nด้วย..."
3301-109 = "ต่อให้ตีทำแต้มไม่ได้ แต่ถ้าขว้างบอลในทิศตามสี่เหลี่ยมทองได้ละก็..."
3301-116 = "ถ้าจะตีลูกโฮมรันให้ได้..."
3301-117 = "ก็ต้องฝึกฝนกล้ามเนื้อในระดับเข้มข้นสินะคะ?"
3301-121 = "ฝะ... ฝึกฝนกล้ามเนื้อ...?"
3301-122 = "แต่การทำแบบนั้นมัน... น่าจะเหนื่อยน่าดูเลยนะ"
3301-127 = "และชมรมเบสบอลของมิลเลเนียมก็เป็นชมรมสายทฤษฎีที่เน้นเรื่องอุปกรณ์และบันทึกการแข่งขัน..."
3301-128 = "แล้วก็... ต่อให้ตีลูกโฮมรันไม่ได้ แต่แค่ตีลูกอื่นให้ได้แต้มก็พอแล้วนี่?"
3301-129 = "แน่นอนว่าถ้าดูแค่การแพ้และชนะ จำนวนครั้งที่ตีลูกได้แต้มอาจจะสำคัญกว่าโฮมรันก็ได้..."
3301-134 = "แต่ยังไงฉันก็อยากจะตีลูกโฮมรันให้ได้ค่ะ!"
3301-138 = "ขอโทษนะเรย์จัง ชมรมเบสบอลของเรายังขาดความรู้ในด้านนั้นน่ะ"
3301-139 = "หัวหน้าอย่างฉันก็ไม่ค่อยอินกับการฝึกฝนกล้ามเนื้อด้วย ถ้าจะถามวิธีตีลูกให้ได้ไกลๆ ฉันก็คงช่วยตอบ#nได้ในทางทฤษฎีเท่านั้น"
3301-140 = "งั้นเหรอคะ..."
3301-141 = "แต่ฉันช่วยแนะนำผู้เชี่ยวชาญทางด้านนั้นให้ได้นะ"
3301-142 = "เคยได้ยินชื่อ <ชมรมออกกำลังกาย> มาก่อนไหม?"
3301-143 = "ชมรมออกกำลังกายเหรอคะ...?"
3301-145 = "ฟิตเนสเซ็นเตอร์ มิลเลเนียม"
3301-148 = "มาช้านะคะ คุณสมาชิก..."
3301-149 = "แบบนี้เดี๋ยวก็สูญเสียกล้ามเนื้อหรอกค่ะ"
3301-154 = "สงสัยจะถอดใจเพราะเหนื่อยจากการฝึกเมื่อวานสินะคะ"
3301-155 = "ไม่มีวี่แววว่าสมาชิกชมรมจะเพิ่มขึ้นเลย แถมหมู่นี้ก็แทบจะไม่มีสมาชิกฟิตเนสมาออกกำลังกายด้วย..."
3301-156 = "สงสัยฉันจะต้องออกไปหาสมาชิกข้างนอกให้มาสมัครเข้าด้วยตัวเองแล้วละ..."
3301-163 = "ขอโทษนะคะ ที่นี่ใช่ชมรมออกกำลังกายหรือเปล่าคะ?"
3301-164 = "ใช่แล้วละค่ะ..."
3301-165 = "อ่า ฉันคือโนมาสะ เรย์ จากชมรมเบสบอลของมิลเลเนียมค่ะ"
3301-166 = "พอดีว่าฉันไปขอคำปรึกษาเรื่องการฝึกฝนร่างกายจากหัวหน้าชมรม..."
3301-167 = "ฝึกฝนร่างกายเหรอคะ...?"
3301-168 = "ใช่ค่ะ หัวหน้าชมรมของฉันก็บอกว่าถ้ามาที่นี่ ฉันจะสร้างกล้ามเนื้อที่ช่วยในการตีลูกได้"
3301-169 = "กล้ามเนื้อ...!"
3301-170 = "แต่ฉันไม่น่าจะออกกำลังกายคนเดียวได้... และได้ยินมาว่าชมรมออกกำลังกายมีคอร์สการฝึกฝน#nร่างกายเชิงวิทยาศาสตร์ ฉันก็เลยอยากได้รับความช่วยเหลือน่ะค่ะ"
3301-171 = "ฉันจะขอลองทำกิจกรรมของชมรมนี้ จนกว่าจะถึงการแข่งชิงแชมป์ทั่วประเทศซีซั่นหน้าได้ไหมคะ?"
3301-175 = "อ่า ฉันมาอย่างกะทันหันเกินไปใช่ไหมคะ คุณน่าจะตั้งตัวไม่ทันแน่ๆ เลย"
3301-176 = "งั้นไว้ฉันมาใหม่สัปดาห์หน้านะคะ ไว้ให้คำตอบฉันตอนนั้น..."
3301-178 = "มาเริ่มกันเลยค่ะ!"
3301-179 = "คะ... คะ...?"
3301-181 = "ประสิทธิภาพของการออกกำลังกายขึ้นอยู่กับความตั้งใจค่ะ!"
3301-182 = "ถ้าอยากสร้างกล้ามเนื้อ เราจะต้องไม่ผัดผ่อนแม้แต่นาทีเดียว!"
3301-183 = "เพราะตอนนี้กล้ามเนื้อของคุณก็กำลังสลายไปทีละนิดๆ ค่ะ!"
3301-188 = "เอาละ สควอทเดี๋ยวนี้เลยค่ะ! ทำทั้งหมด 10 เซ็ต เริ่มได้!"
3301-189 = "ดะ... เดี๋ยวก่อนสิคะรุ่นพี่! ฉันยังไม่ได้เปลี่ยนเสื้อผ้าเลยนะคะ!"
3301-197 = "(และการฝึกฝนพิเศษที่ยาวนานของเรย์กับสึมิเระก็เริ่มขึ้น...)"

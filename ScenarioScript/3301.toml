[translation]
3301-1 = "揮向遠方（１）"
3301-3 = "「──比賽開始！」"
3301-5 = "來，大家注意這邊！"
3301-6 = "這次的比賽只是練習賽，大家不必緊張。"
3301-7 = "況且對方也只是工程師部製作的機器人……不必擔心被嘲諷或觸身球擊中的問題。"
3301-12 = "……可是工程師部的機器人不是更危險嗎？"
3301-13 = "你難道忘了上次工程師部的新成員拿來的那台投球機嗎？#n那東西一直不停地發射比職業選手還快的高速球……"
3301-14 = "而且甚至還會在投球之前挑釁我們！"
3301-15 = "唔，雖然那次的事確實讓我也留下了不小的陰影……"
3301-16 = "但我聽說後來研討會的幹部已經把有問題的地方都改掉了，#n我想這次應該不用太擔心才對。"
3301-17 = "好好享受這場比賽，享受打棒球的樂趣吧！"
3301-27 = "「三好球……三振出局！」"
3301-30 = "唔……又揮空了。"
3301-36 = "球速實在太快了啦～"
3301-45 = "「下一位打者是……千年棒球部的四號打擊手，野正莉」"
3301-46 = "那傢伙……不是最近才剛加入棒球部的菜鳥嗎？"
3301-47 = "我聽說他在入部考試中創下了零成八的打擊率，並因此成為了棒球部的王牌……"
3301-48 = "竟然能在100顆球中打中8顆？#n真是太厲害了……"
3301-49 = "哎呀～前輩們也真是的，這樣稱讚我會讓我很不好意思啦，嘿嘿……"
3301-50 = "莉醬，看前面，前面！"
3301-54 = "「揮棒──」"
3301-55 = "來了……！"
3301-67 = "打中了──！"
3301-68 = "竟然打中了那麼快的球？"
3301-69 = "球飛得好高！"
3301-70 = "難道本季的第一發全壘打要出現了嗎……"
3301-74 = "「──接殺出局！」"
3301-76 = "唉…………"
3301-77 = "「攻守交換，就守備位置！」"
3301-80 = "……比賽結束，大家都辛苦了！"
3301-82 = "辛苦了！"
3301-83 = "莉醬也辛苦了！#n你今天真的表現得很棒哦。"
3301-84 = "過獎了，前輩今天也辛苦了。"
3301-85 = "話說還真可惜啊，我本來以為今天能看到貨真價實的全壘打的說……"
3301-86 = "就是說啊，你剛才打出直球的時候，我還以為那一定會是支全壘打呢。"
3301-87 = "謝謝前輩這麼相信我……"
3301-88 = "不過其實我在打到球的瞬間就覺得沒希望了。"
3301-89 = "光從打擊感就能感覺出是不是全壘打了嗎？"
3301-90 = "那倒不是……#n畢竟我也沒打出過全壘打，所以其實也不知道那具體是怎麼樣的感覺……"
3301-91 = "該怎麼說呢……#n或許是我沒有感受到全壘打特有的那種「鏘啷！」的感覺吧。"
3301-92 = "唔，雖然聽不太懂……"
3301-93 = "不過沒關係，反正我們之後還有很多比賽可以打。"
3301-94 = "話說回來，如果想要打出全壘打的話，應該加強什麼部分比較好呢？"
3301-99 = "能夠輕鬆打出全壘打的關鍵……應該還是在擊球的角度吧？"
3301-100 = "因為被擊飛的球會朝垂直方向進行等加速度運動，並同時水平地進行等速直線運動，所以當角度呈現45度時，球的飛行距離會是最遠的。"
3301-101 = "不，你說的那是只考慮重力影響的真空彈道方程式。"
3301-102 = "如果想準確計算出作用在物體上的外力，那阻力和升力的力矩也要考慮進去才行。"
3301-107 = "球棒的材質也很重要。#n球棒的重量越輕、反彈力越高，都能使球飛得更快。"
3301-108 = "像最近就有一份研究報告指出，#n如果用新材料開發部研發的創新材質製作球棒，就能讓球棒的打擊感變得更好……"
3301-109 = "就算打不出安打，只要能投出符合黃金矩形規則的球──"
3301-116 = "我認為想要打出全壘打……"
3301-117 = "最重要的還是更高強度的肌肉訓練吧？"
3301-121 = "肌，肌肉訓練……？"
3301-122 = "可是肌肉訓練……不是都很累嗎？"
3301-127 = "況且我們千年棒球部本來就是理論派的社團……#n比起訓練，我們更重視裝備和紀錄……"
3301-128 = "反正……就算打不出全壘打，我們還是能靠安打得到分數啊。"
3301-129 = "雖然就比賽勝負而言，安打數或許真的比全壘打數更重要……"
3301-134 = "但我就是想要打出全壘打！"
3301-138 = "抱歉，莉醬。#n我們棒球部對這方面的知識實在不是很夠。"
3301-139 = "畢竟就連身為部長的我都對肌肉訓練敬而遠之，#n所以除了理論以外，我們也沒辦法教你提升長打率的方法。"
3301-140 = "果然是這樣嗎……"
3301-141 = "不過呢，我倒是可以介紹這方面的專家給你認識。"
3301-142 = "你有聽過訓練部嗎？"
3301-143 = "訓練部……？"
3301-145 = "千年健身中心"
3301-148 = "會員們來的真慢呢……"
3301-149 = "這樣萬一肌肉流失了該怎麼辦……？"
3301-154 = "……是因為昨天的訓練而放棄了嗎。"
3301-155 = "不僅完全沒有新成員加入，最近也沒幾個會員來訓練……"
3301-156 = "看來我們還是得親自去外頭招募成員……"
3301-163 = "不好意思，請問這裡是訓練部嗎？"
3301-164 = "嗯，沒錯……"
3301-165 = "啊，我是棒球部的野正莉。"
3301-166 = "我想找訓練部部長諮詢有關體能訓練的問題……"
3301-167 = "體能訓練……？"
3301-168 = "我聽說你們這裡會教人如何訓練肌肉，並且提升打擊率。"
3301-169 = "……肌肉！"
3301-170 = "因為自己單獨運動的成效有限……#n聽說你們訓練部有一套科學化的體能訓練課程，所以想來找你們幫忙。"
3301-171 = "在下次校際體育大賽開打之前，我想暫時加入你們社團……請問可以嗎？"
3301-175 = "啊，這樣跑來是不是太突然了？"
3301-176 = "我還是下週再過來吧，到時候再給我答覆也──"
3301-178 = "立刻開始吧！"
3301-179 = "咦，咦……？"
3301-181 = "運動的成效會隨運動者的決心產生巨大的差異！"
3301-182 = "如果想練出肌肉的話，我們就沒有任何時間可以浪費！"
3301-183 = "因為就連現在這個瞬間，你的肌肉組織也正在一點一滴地流逝啊！"
3301-188 = "來，深蹲運動10組──開始動作！"
3301-189 = "請，請等一下，前輩！我連衣服都還沒換耶！？"
3301-197 = "（……就這樣，莉和堇正式展開了漫長的特別訓練）"

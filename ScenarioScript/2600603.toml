[translation]
2600603-1 = "บันทึกการสังเกตการณ์"
2600603-2 = "ดาดฟ้าของอาคารแห่งหนึ่ง"
2600603-4 = "โนโดกะส่องกล้องส่องทางไกลและจดจ่ออยู่กับอะไรบางอย่าง"
2600603-5 = "แปลกจัง...#nก่อนหน้านี้ยังนั่งอยู่ในสำนักงานอยู่เลย..."
2600603-6 = "ไปห้องน้ำงั้นเหรอ?"
2600603-7 = "[s] \"กำลังหาใครอยู่เหรอ?\""
2600603-8 = "กรี๊ดดดด! คะ... คุณครู?!"
2600603-9 = "มะ...มาตั้งแต่เมื่อไหร่คะ?#nเมื่อกี้ยังอยู่ในห้องทำงานอยู่เลย..."
2600603-10 = "คะ? อ่านข้อความของฉันแล้วรู้สึกเป็นห่วงก็เลยมาหางั้นเหรอคะ?"
2600603-11 = "ถะ... ถ้ารู้ว่าจะเป็นแบบนี้ ฉันจะไม่ส่งข้อความไปเลย…"
2600603-12 = "[s] \"ใช้กล้องส่องทางไกลส่องครูอยู่เหรอ?\""
2600603-13 = "เอ่อ... ฉัน... ฉันไม่ได้แอบส่องคุณครูอยู่หรอกนะคะ..."
2600603-15 = "แต่ก็ช่วยไม่ได้นี่คะ#n#nถ้าวันนี้ฉันไม่สังเกตการณ์คุณครู ฉันก็ไม่หายอยากแน่ๆ ค่ะ!"
2600603-16 = "ที่ฉันทำแบบนี้เพราะว่าคุณครูต่างหากที่เจอตัวได้ยากค่ะ!"
2600603-17 = "คะ? ถ้าอยากเจอก็บอกให้ออกมาหาได้เลยงั้นเหรอคะ?"
2600603-18 = "ขะ...ขอบคุณค่ะ แต่ฉันคงทำแบบนั้นไม่ได้หรอกค่ะ"
2600603-19 = "เพราะตอนที่ฉันแอบใช้กล้องส่องคุณครู ใบหน้าของคุณครูดูเปล่งประกายเจิดจ้ากว่าตอนได้เจอหน้ากันตรงๆ อีกค่ะ!"
2600603-20 = "ภาพด้านข้างของคุณครูยามที่เผลอ... มันช่าง... อื้มมมมม..."
2600603-21 = "อ๊ะ...! ช่วยทำเป็นไม่ได้ยินเรื่องที่ฉันพูดไปเมื่อกี้ด้วยค่ะ!"
2600603-23 = "หลังจากนั้นคุณครูก็ได้ขอให้สำนักเลขาธิการเรดวินเทอร์จับตามองโนโดกะอย่างใกล้ชิดมากขึ้น"
2600603-24 = "...และขอให้ขยายเวลาคุมตัวในห้องเรียนพิเศษของโนโดกะออกไปด้วย..."

[translation]
2600603-1 = "觀察日記"
2600603-2 = "某棟大樓的屋頂上"
2600603-4 = "（和香正全神貫注地用望遠鏡看著某樣東西）"
2600603-5 = "真奇怪……#n剛才明明還坐在辦公室……"
2600603-6 = "去洗手間了嗎？"
2600603-7 = "[s]「你在找誰呀？」"
2600603-8 = "呀啊？老，老師？"
2600603-9 = "你，你什麼時候來的？#n剛，剛才不是還在夏萊嗎……"
2600603-10 = "咦？看到我傳的訊息之後，擔心我便過來了？"
2600603-11 = "呃呃，早知如此就不要傳MomoTalk了……"
2600603-12 = "[s]「你一直在用望遠鏡觀察我嗎？」"
2600603-13 = "這個，那個……這絕對不是，想要偷窺老師……"
2600603-15 = "……我，我也沒辦法啊！#n要是不對老師觀察完今天的份量，我會提不起勁！"
2600603-16 = "這都是，很難見到面的老師的錯！"
2600603-17 = "什麼？如果想見面的話可以直接找老師，是嗎？"
2600603-18 = "謝，謝謝……但是我辦不到。"
2600603-19 = "比起直接親眼拜見老師的臉，還是用望眼鏡偷窺才會顯得更加耀眼！"
2600603-20 = "說到老師那副毫無防備的側臉就……哈啊，哈啊……"
2600603-21 = "啊……！剛，剛才說的話拜託你當作沒聽到！"
2600603-23 = "（之後我聯絡了赤冬事務局，請對方加倍嚴密監視和香）"
2600603-24 = "（和香的特別班關押期間也因此延長了……）"

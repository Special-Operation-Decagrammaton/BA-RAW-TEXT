[translation]
2600603-1 = "#title;관찰일기"
2600603-2 = "#place;어느 건물의 옥상"
2600603-3 = "5;노도카;05\n#5;a\n#5;em;[...]\n#wait;2000"
2600603-4 = "#na;노도카가 망원경을 들여다본 채 무언가에 몰두하고 있다."
2600603-5 = "5;노도카;05;이상하다…… #n아까 까지만 하더라도 집무실에 앉아 계셨는데……"
2600603-6 = "5;노도카;05;화장실에 가셨나?"
2600603-7 = "[s] \"누구를 찾고 있는 거야?\""
2600603-8 = "5;노도카;04;꺄악? 서, 선생님?\n#5;shake\n#5;em;[?!]"
2600603-9 = "5;노도카;04;어, 언제 오셨나요? #n바, 방금까지만 하더라도 샬레에……\n#5;m3\n#5;hophop"
2600603-10 = "5;노도카;02;네? 제 메일을 보고 걱정이 되어서 오셨다고요?"
2600603-11 = "#5;hide\n3;노도카;06;으으, 이럴 줄 알았으면 메일을 보내지 말 걸 그랬어요……\n#3;em;[속상함]\n#3;stiff"
2600603-12 = "[s] \"망원경으로 나를 관찰하고 있었던 거야?\""
2600603-13 = "3;노도카;04;어, 그러니까…… 이건 선생님을 망원경으로 지켜보고 있었던 게 아니라……\n#3;em;[땀]\n#3;stiff"
2600603-14 = "3;노도카;99\n#3;em;[...]\n#wait;2000"
2600603-15 = "3;노도카;05;하지만 어쩔 수 없는걸요. #n오늘 분의 선생님을 관찰하지 않으면 의욕이 나지 않으니까!\n#3;hophop"
2600603-16 = "3;노도카;05;이건 선생님이 뵙기 어려운 게 잘못이라고요!\n#3;em;[!]"
2600603-17 = "3;노도카;04;네? 선생님의 얼굴이 보고 싶으면 직접 불러달라고요?\n#3;stiff"
2600603-18 = "3;노도카;06;가, 감사합니다…… 하지만 그럴 수는 없어요."
2600603-19 = "3;노도카;07;선생님의 얼굴은 직접 마주하고 볼 때보다 망원경으로 몰래 훔쳐볼 때 더 빛이 나거든요!\n#3;closeup"
2600603-20 = "3;노도카;07;선생님의 그 무방비한 옆모습은 정말이지…… 하아, 하아……\n#3;em;[반짝]\n#3;closeup"
2600603-21 = "3;노도카;04;앗……! 바, 방금 그 이야기는 못 들은 걸로 해주세요!\n#3;shake"
2600603-22 = "#all;hide"
2600603-23 = "#na;이후, 붉은겨울 사무국에 일러 노도카를 더욱 엄중하게 감시하도록 부탁했다."
2600603-24 = "#na;……노도카의 특별반 수감 기간이 연장되었다……"

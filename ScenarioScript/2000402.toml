[translation]
2000402-1 = "#title;귀여움은 정의!"
2000402-2 = "#place;트리니티 인근 수영복 매장"
2000402-3 = "3;마시로;06;으음, 이 수영복은 예쁘긴 하지만 프릴이 많아 움직임이 불편해 보이네요.\n#3;a\n#3;em;…"
2000402-4 = "#st;[0,0];instant;1;"
2000402-5 = "#clearST\n3;마시로;01\n#3;m4\n#wait;1500"
2000402-6 = "3;마시로;04;이 수영복은 지나치게 노출이 심해, 저에게는 어울리지 않을 것 같고…….\n#3;em;[땀]"
2000402-7 = "3;마시로;01;정의실현부의 이름에 부끄럽지 않을, 훌륭한 수영복이 어디 없을까요?"
2000402-8 = "1;동물 점원;01;뭔가 찾으시는 수영복이라도 있으신가요?\n#1;ar\n#1;em;[반응]\n#3;m5"
2000402-9 = "3;마시로;02;아, 아뇨. 특별히 찾는 수영복은 없지만……."
2000402-10 = "1;동물 점원;01;그렇다면 이 프릴이 달린 귀여운 수영복은 어떠신가요?\n#1;m2\n#1;hophop\n#1;em;[반짝]"
2000402-11 = "1;동물 점원;01;이 디자인의 수영복이 요즘 여학생들에게 제일 인기 있는 모델이랍니다!"
2000402-12 = "3;마시로;01;확실히 귀엽긴 하지만…… 이런 귀여운 디자인의 수영복은 저에게는 어울리지 않을 것 같은데요.\n#3;em;…"
2000402-13 = "1;동물 점원;01;그렇지 않아요. 세상에 귀여운 수영복이 어울리지 않는 소녀는 없어요!\n#1;hophop"
2000402-14 = "1;동물 점원;01;왜냐하면……\n#1;m3\n#3;dr"
2000402-15 = "#all;hide"
2000402-16 = "3;동물 점원;01;귀여운 수영복은 <정의>니까요!\n#3;em;[반짝]\n#3;greeting"
2000402-17 = "3;마시로;04;……저, 정의?!\n#3;shake\n#3;em;[?!]"
2000402-18 = "3;동물 점원;01;네, 귀여운 수영복은 그 자체만으로도 상대의 시선을 사로잡는 마력을 갖고 있거든요."
2000402-19 = "3;동물 점원;01;손님도 귀여운 수영복을 입고 마음에 둔 상대에게 매력을 마음껏 어필해 보세요!\n#3;em;[하트]\n#3;greeting"
2000402-20 = "3;마시로;04\n#3;h"
2000402-21 = "3;마시로;04\n#3;h\n#wait;1000"
2000402-22 = "#wait;1000"
2000402-23 = "3;마시로;05;(이런 실책을…….)\n#3;stiff"
2000402-24 = "3;마시로;05;(정의와 관련된 일이라면 빠짐없이 숙지하고 있다고 생각했는데…… 설마 귀여운 수영복에도 정의가 깃들어 있었다니!)\n#3;stiff\n#3;em;[!]"
2000402-25 = "3;마시로;06;(……하지만 귀여운 수영복을 입는 게 어째서 정의인 걸까요? 교칙에 귀여운 수영복에 대한 내용이라도 있었던 걸까요?)"
2000402-26 = "3;마시로;99;(………….)\n#3;em;…"
2000402-27 = "3;마시로;04;(우으…… 아무리 생각해도 귀여운 수영복을 입는 게 어째서 정의를 실현하는 것과 관련이 있는지 떠오르지가 않아요.)\n#3;em;[땀]"
2000402-28 = "3;마시로;06;(누군가 정의에 대해 잘 아는 사람에게 물어보아야…….)"
2000402-29 = "3;마시로;06\n#3;h"
2000402-30 = "#wait;1000"
2000402-31 = "[ns] \"무슨 문제라도 있어?\""
2000402-32 = "3;마시로;02;아, 선생님. 그게……\n#3;stiff\n#3;em;[반응]"
2000402-33 = "3;마시로;01;정의실현부의 이름에 부끄럽지 않을 훌륭한 수영복은 찾았습니다만……."
2000402-34 = "3;마시로;06;정의에 대한 제 배움이 얼마나 얄팍한 것인지 새삼 깨닫게 되었습니다……."
2000402-35 = "[s] \"……그게 무슨 소리야?\""
2000402-36 = "#wait;500"
2000402-37 = "#all;hide"
2000402-38 = "#na;마시로에게 방금 있었던 일에 대해 설명을 들었다."
2000402-39 = "#all;hide"
2000402-40 = "3;마시로;06;……그래서 한동안 귀여운 수영복과 정의의 연관성에 대해 고민을 해봤지만 뾰족한 답을 찾을 수가 없었습니다.\n#3;em;…\n#3;a"
2000402-41 = "3;마시로;06;이 역시 정의에 대한 제 배움이 부족한 탓이겠지요."
2000402-42 = "3;마시로;05;선생님, 귀여운 수영복에 어떤 정의가 깃들어 있는지 제게 알려주시겠습니까?\n#3;em;[반응]"
2000402-43 = "[s] 마시로의 오해를 설명해준다."
2000402-44 = "3;마시로;02;네? 점원이 말한 '정의'는 '좋다'는 표현 대신 쓰이는 관용어라고요?\n#3;em;[?]"
2000402-45 = "3;마시로;00;그럼…… 귀여운 수영복을 입는 건 정의실현부의 일과 상관없는 일이겠군요."
2000402-46 = "3;마시로;04;어휴. 저는 또 제가 모르고 있던 정의가 또 있는 줄 알고 걱정하고 있었습니다.\n#3;em;[땀]"
2000402-47 = "[s] \"마시로는 정의와 관련된 일이라면 정말 엉뚱해지는구나.\""
2000402-48 = "3;마시로;02;그렇습니까? 스스로는 평범한 편이라고 생각하고 있었습니다만……."
2000402-49 = "3;마시로;99;여하튼 제가 생각하는 정의의 기준이 틀리지 않았다니 다행입니다."
2000402-50 = "3;마시로;01;……그럼 이 수영복은 원래의 자리에 돌려놓고 오겠습니다."
2000402-51 = "#st;[0,0];instant;1;"
2000402-52 = "3;마시로;01\n#3;d\n#wait;2000"
2000402-53 = "#all;hide\n[ns] \"잠깐 기다려!\""
2000402-54 = "3;마시로;02;네? 무슨 문제라도 있나요?\n#3;em;[반응]\n#3;a"
2000402-55 = "3;마시로;00;이 수영복은 정의와 전혀 상관없는 물건인데요?"
2000402-56 = "[s1] \"그 수영복은 마시로에게 잘 어울린다고 생각해.\"\n[s2] \"역시 생각해보니 귀여운 수영복은 정의인 것 같아.\""
2000402-57 = "3;마시로;02;네? 이 프릴이 잔뜩 달린 귀여운 수영복이요?\n#3;em;[?]"
2000402-58 = "3;마시로;02;네? 갑자기?\n#3;em;[?]"
2000402-59 = "3;마시로;01;으음…….\n#3;greeting"
2000402-60 = "3;마시로;00;이 수영복은 어쩐지 활동성도 나빠 보이고, 장식으로 달린 프릴이 걸리적거려 훈련에도 방해가 될 것 같습니다."
2000402-61 = "3;마시로;99;그래도 선생님께서 골라주신 수영복이라면……."
2000402-62 = "3;마시로;02;네, 이번에는 이 수영복으로 하겠습니다.\n#3;em;[반짝]"
2000402-63 = "3;마시로;01\n#3;d\n#wait;1000"
2000402-64 = "3;마시로;03;누구의 말마따나…… 귀여운 수영복은 '정의'니까요!\n#3;em;[!]\n#3;closeup\n#3;a"
2000402-65 = "#all;hide"
2000402-66 = "#na;(이후, 귀여운 수영복을 구입한 마시로와 함께 학교로 돌아왔다.)"

[translation]
2000402-1 = "Cuteness is Justice!"
2000402-2 = "Swimsuit Store Near Trinity"
2000402-3 = "Hmm, this swimsuit is pretty, but it has too many frills. Seems uncomfortable."
2000402-6 = "This swimsuit is too revealing, which I don't think I can pull off."
2000402-7 = "I wonder if I can find one that would live up to the Justice Task Force's name."
2000402-8 = "Are you looking for anything specific?"
2000402-9 = "Oh, no... I don't have anything in mind."
2000402-10 = "What about this frilly swimsuit here?"
2000402-11 = "This is the most popular design among girls these days!"
2000402-12 = "I don't deny that it's cute. It's just...I don't think it would look good on me."
2000402-13 = "That's not true at all. What girl wouldn't look good in such a cute swimsuit?"
2000402-14 = "Because after all..."
2000402-16 = "...cuteness is justice!"
2000402-17 = "J-Justice?!"
2000402-18 = "Of course. A cute swimsuit can capture everyone's attention simply by existing."
2000402-19 = "You should wear a cute swimsuit and show off your charm to someone you fancy!"
2000402-23 = "(I feel like there's something I'm missing.)"
2000402-24 = "(I thought I knew everything there was to know about justice. I can't believe I was ignorant about the justice that comes from wearing a cute swimsuit!)"
2000402-25 = "(But what makes it just? Is there a school rule about cute swimsuits I don't know about?)"
2000402-26 = "(...)"
2000402-27 = "(No matter how hard I think about it, I can't figure out how wearing a cute swimsuit relates to justice.)"
2000402-28 = "(I should ask someone who's in expert in the field.)"
2000402-31 = "[ns] \"What's wrong?\""
2000402-32 = "Oh, it's you Sensei. Well..."
2000402-33 = "I found a good swimsuit that would be appropriate for upholding the Justice Task Force's name..."
2000402-34 = "...but I realized how much I still have to learn about justice in the process."
2000402-35 = "[s] \"What are you talking about?\""
2000402-38 = "Mashiro then explained her situation."
2000402-40 = "I've been thinking about the connection between cute swimsuits and justice for a while, but I still haven't come up with anything."
2000402-41 = "There must be so much about justice I still don't understand."
2000402-42 = "Sensei, can you tell me what a cute swimsuit has to do with justice?"
2000402-43 = "[s] Clear up Mashiro's misconception."
2000402-44 = "You think the clerk was saying that I would look good in the swimsuit?"
2000402-45 = "Then...wearing a cute swimsuit has nothing to do with the business of the Justice Task Force."
2000402-46 = "Thank goodness. I thought there was something fundamental that I didn't understand about justice."
2000402-47 = "[s] \"You can be a little weird when it comes to justice.\""
2000402-48 = "Really? I thought I was acting perfectly normal."
2000402-49 = "Anyway, I'm glad that my definition of justice doesn't need to be corrected."
2000402-50 = "I think I'll return the swimsuit, then."
2000402-53 = "[ns] \"Let's not be too hasty!\""
2000402-54 = "Huh? Is there a problem?"
2000402-55 = "You said it yourself. The swimsuit doesn't have anything to do with justice."
2000402-56 = "[s1] \"I think it would look good on you too, Mashiro.\"\n[s2] \"A cute swimsuit just has to do with a DIFFERENT kind of justice.\""
2000402-57 = "You don't think it's too frilly?"
2000402-58 = "Where is this coming from all of a sudden?"
2000402-59 = "Hmm..."
2000402-60 = "I'm afraid it's going to be uncomfortable. The frills might get in the way when I'm training."
2000402-61 = "Then again, you did give it your approval..."
2000402-62 = "Okay. I'll keep this swimsuit."
2000402-64 = "Perhaps the clerk was right. Maybe the swimsuit will do me justice!"
2000402-66 = "We returned to campus with Mashiro's new swimsuit."

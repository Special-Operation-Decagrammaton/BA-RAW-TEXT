[translation]
2000402-1 = "ความน่ารักคือความยุติธรรม!"
2000402-2 = "ร้านชุดว่ายน้ำใกล้ๆ ทรีนิตี้"
2000402-3 = "อืม... ชุดว่ายน้ำนี่ก็สวยดีนะคะ แต่ว่ามันมีระบายเยอะไปหน่อย น่าจะเคลื่อนไหวได้ไม่สะดวก"
2000402-6 = "แถมยังโชว์เนื้อหนังมากเกินไป คงไม่เหมาะกับฉันแน่ๆ..."
2000402-7 = "พอจะมีชุดว่ายน้ำเท่ๆ ที่เหมาะกับชมรมทวงความยุติธรรมบ้างมั้ยคะ?"
2000402-8 = "มีชุดไหนที่สนใจเป็นพิเศษรึเปล่าครับคุณลูกค้า?"
2000402-9 = "ปะ...เปล่าค่ะ ที่จริงฉันยังไม่มีชุดในใจเลยค่ะ"
2000402-10 = "งั้นเป็นชุดว่ายน้ำที่มีระบายน่ารักๆ แบบนี้มั้ยครับ?"
2000402-11 = "ชุดสไตล์นี้กำลังเป็นที่นิยมในหมู่นักเรียนสาวๆ เลยนะครับ!"
2000402-12 = "มันก็น่ารักดีอยู่หรอกค่ะ... แต่ฉันคงไม่เหมาะกับอะไรที่น่ารักๆ แบบนี้"
2000402-13 = "ไม่หรอกครับ! ไม่มีผู้หญิงคนไหนไม่เหมาะกับชุดว่ายน้ำน่ารักๆ หรอกนะครับ!"
2000402-14 = "นั่นก็เพราะว่า..."
2000402-16 = "ชุดว่ายน้ำที่น่ารักคือ <ความยุติธรรม> ยังไงละครับ!"
2000402-17 = "ความ... ยุติธรรม... งั้นเหรอคะ?!"
2000402-18 = "ใช่ครับ เพราะชุดว่ายน้ำมีมนตร์ขลังที่จะดึงดูดสายตาของผู้ที่พบเห็นได้"
2000402-19 = "คุณลูกค้าลองใส่ชุดว่ายน้ำน่ารักๆ แล้วไปหว่านเสน่ห์ใส่คนที่อยู่ในใจดูสิครับ!"
2000402-23 = "(ฉันพลาดเรื่องนี้ไปได้ไงเนี่ย...)"
2000402-24 = "(คิดว่าเข้าใจทุกอย่างเกี่ยวกับความยุติธรรมแล้วซะอีก... แต่ไม่ยักรู้เลยว่าในชุดว่ายน้ำน่ารักๆ ก็มีความ#nยุติธรรมแฝงอยู่ด้วย!)"
2000402-25 = "(ว่าแต่... การใส่ชุดว่ายน้ำน่ารักๆ มันคือความยุติธรรมตรงไหนนะ? แล้วในกฎโรงเรียนมีระบุเกี่ยวกับชุด#nว่ายน้ำน่ารักๆ ไว้ด้วยอย่างนั้นเหรอ?)"
2000402-26 = "(...)"
2000402-27 = "(อืม... คิดเท่าไหร่ก็คิดไม่ออกเลยว่าการใส่ชุดว่ายน้ำที่น่ารักมันจะแสดงถึงความยุติธรรมได้ยังไง)"
2000402-28 = "(หรือว่าต้องไปถามจากคนที่รู้จักความยุติธรรมอย่างถ่องแท้นะ...)"
2000402-31 = "[ns] \"มีเรื่องอะไรเหรอ?\""
2000402-32 = "อ๊ะ คุณครูคะ คือว่า..."
2000402-33 = "ฉันเจอชุดว่ายน้ำที่เหมาะกับชมรมทวงความยุติธรรมแล้วค่ะ แต่ว่า..."
2000402-34 = "มันทำให้ฉันตระหนักได้ค่ะว่าความรู้ที่มีต่อความยุติธรรมของฉันมันตื้นเขินแค่ไหน..."
2000402-35 = "[s] \"หมายความว่ายังไงน่ะ?\""
2000402-38 = "(มาชิโระเล่าให้คุณครูฟังว่าเกิดอะไรขึ้น)"
2000402-40 = "ฉันก็เลยเอาแต่คิดหาความเชื่อมโยงระหว่างชุดว่ายน้ำที่น่ารักกับความยุติธรรม แต่ก็ไม่ได้คำตอบอะไร#nที่ชัดเจนเลยค่ะ"
2000402-41 = "คงเป็นเพราะว่าฉันยังขาดความรู้ด้านความยุติธรรมอยู่แน่ๆ"
2000402-42 = "คุณครูพอจะบอกฉันได้มั้ยคะว่าชุดว่ายน้ำที่น่ารักมันแฝงความยุติธรรมอะไรไว้?"
2000402-43 = "[s] อธิบายให้มาชิโระหายเข้าใจผิด"
2000402-44 = "คะ? คำว่า 'ยุติธรรม' ที่พนักงานขายพูด มีความหมายว่า 'ดี' แค่นั้นเหรอคะ?"
2000402-45 = "ถ้างั้น... ชุดว่ายน้ำที่น่ารักๆ ก็ไม่ได้เกี่ยวอะไรกับงานของชมรมทวงความยุติธรรมสินะคะ"
2000402-46 = "เฮ้อ... ฉันอุตส่าห์กังวลว่าจะมีเรื่องสำคัญเกี่ยวกับความยุติธรรมที่ฉันยังไม่รู้อีกหรือเปล่า"
2000402-47 = "[s] \"ถ้าเป็นเรื่องความยุติธรรม มาชิโระก็จะอ๊องๆ ได้เหมือนกันสินะ\""
2000402-48 = "งั้นเหรอคะ? ฉันคิดว่าก็ไม่ได้มีอะไรผิดปกตินะ..."
2000402-49 = "แต่ก็เอาเถอะค่ะ ถือว่าโชคดีแล้วที่มาตรฐานความรู้เรื่องความยุติธรรมที่ฉันคิดมันไม่ได้ผิดพลาดอะไร"
2000402-50 = "งั้นฉันจะเอาชุดว่ายน้ำนี้ไปคืนค่ะ"
2000402-53 = "[ns] \"เดี๋ยวสิ!\""
2000402-54 = "ทำไมล่ะคะคุณครู?"
2000402-55 = "ชุดว่ายน้ำนี้มันไม่ได้เกี่ยวกับความยุติธรรมแล้วนี่คะ?"
2000402-56 = "[s1] \"ครูว่าชุดว่ายน้ำนี้มันเหมาะกับมาชิโระนะ\"\n[s2] \"มาคิดดูแล้ว ครูว่าชุดว่ายน้ำที่น่ารักก็คือความยุติธรรมละ\""
2000402-57 = "คะ? ชุดว่ายน้ำน่ารักที่มีระบายห้อยลงมาเนี่ยเหรอคะ?"
2000402-58 = "อ้าว? ไม่เหมือนที่คุยกันไว้นี่นา?"
2000402-59 = "อืม..."
2000402-60 = "แต่ฉันว่าชุดนี้ใส่แล้วน่าจะไม่คล่องตัว แล้วระบายที่ตกแต่งไว้ก็ดูรุงรัง มันน่าจะไม่เหมาะกับการฝึกฝน#nนะคะ"
2000402-61 = "แต่ถ้าเป็นชุดว่ายน้ำที่คุณครูเลือกให้แล้วละก็..."
2000402-62 = "ฉันเอาเป็นชุดนี้ก็ได้ค่ะ"
2000402-64 = "บางทีคนขายอาจพูดถูกก็ได้ค่ะที่ว่า... \"ชุดว่ายน้ำที่น่ารักคือความยุติธรรม\" ค่ะ!"
2000402-66 = "(หลังจากนั้นคุณครูก็กลับโรงเรียนไปพร้อมกับมาชิโระที่ได้ชุดว่ายน้ำชุดใหม่มา)"

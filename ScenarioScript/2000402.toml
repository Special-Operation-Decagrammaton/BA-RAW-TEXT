[translation]
2000402-1 = "可愛即是正義"
2000402-2 = "三一近郊的店．泳裝賣場"
2000402-3 = "這件泳裝雖然好看，但很多荷葉邊感覺行動不太方便……而且好像也可愛過頭了……"
2000402-6 = "這件則是過度暴露，應該不適合我……"
2000402-7 = "嗯～到底哪件泳裝才符合實現正義部的身分呢……？"
2000402-8 = "歡迎光臨，請問有要試穿的款式嗎？"
2000402-9 = "啊，不是，我在猶豫要選哪件……"
2000402-10 = "我明白了。客人您的話……這件有荷葉邊的可愛泳裝怎麼樣呢？"
2000402-11 = "這個款式的設計最近深受女高中生歡迎！"
2000402-12 = "確，確實很可愛……但感覺太可愛了，應該不適合我……"
2000402-13 = "沒有這回事！#n客人您非常可愛，更何況這個世界上，絕不會有「不適合可愛泳裝的女孩子」！"
2000402-14 = "而且……"
2000402-16 = "可愛泳裝就是「正義」！"
2000402-17 = "……正，正義！？"
2000402-18 = "是！可愛泳裝本身就具備吸引眾人目光的魔力。"
2000402-19 = "本來就充滿魅力的女孩，再搭配上「可愛泳裝」……#n如此讓人無法抗拒的魅力，不是「正義」還能是什麼呢！"
2000402-23 = "（竟，竟……）"
2000402-24 = "（竟然有這種事……#n　還以為我已經對「正義」瞭若指掌了，沒想到「可愛泳裝」也是一種正義！）"
2000402-25 = "（……但穿上可愛泳裝為何是「正義」呢？#n　校規中應該沒有關於可愛泳裝的內容……）"
2000402-26 = "（…………）"
2000402-27 = "（……我不懂。為什麼可愛泳裝就是正義……？）"
2000402-28 = "（必須去請教非常了解「正義」的人……）"
2000402-31 = "[ns] 「麻白，讓你久等……你怎麼一臉困惑，怎麼了嗎？」"
2000402-32 = "啊，老師。那個，是這樣的……"
2000402-33 = "和之前說的一樣，#n我想找到一件不會愧對實現正義部名號的泳裝，所以就先稍微看了一下……"
2000402-34 = "卻沒想到會在這種地方，了解到自己對「正義」的認知還有待加強……"
2000402-35 = "[s] 「……什麼意思？」"
2000402-38 = "（麻白說明了剛才發生的事）"
2000402-40 = "所以我便針對「可愛泳裝」做了一番思考，卻想不出一個明確的答案……"
2000402-41 = "讓我不禁覺得自己對「正義」還需要多加學習。"
2000402-42 = "請問老師知道「可愛泳裝就是正義」這句話代表什麼意思嗎？"
2000402-43 = "[s] 先告訴她這只是自己的推測，然後慢慢說明"
2000402-44 = "「正義」一詞，有時也能代表「非常好」，或是「會因此不自覺全盤接受」……？"
2000402-45 = "也就是說……「穿上可愛泳裝」和我們實現正義部，其實幾乎沒有關係囉。"
2000402-46 = "這下我放心了。我還以為今後實現正義部活動時，大家都必須一直穿著可愛泳裝……"
2000402-47 = "[s] 「感覺只要牽扯到正義，麻白就會鑽牛角尖呢……」"
2000402-48 = "……？"
2000402-49 = "總之，幸好這不會為我心中的「正義」，帶來另一套不同的見解。"
2000402-50 = "那我先去把這件泳裝放回原位……"
2000402-53 = "[ns] 「先等一下！」"
2000402-54 = "咦？有什麼問題嗎？"
2000402-55 = "雖然這件泳裝確實不錯，但我還是想選個更適合實現正義部的款式……"
2000402-56 = "[s1] 「我認為那件泳裝很適合麻白。」\n[s2] 「麻白若穿上那件可愛泳裝，我覺得就能稱為正義。」"
2000402-57 = "咦？可是這件泳裝有這麼多荷葉邊，這麼可愛……？"
2000402-58 = "咦？咦？"
2000402-59 = "唔嗯……"
2000402-60 = "這件泳裝感覺危急時會不方便活動，裝飾用的荷葉邊也可能會妨礙訓練……"
2000402-61 = "但既然老師說這件很好……那好吧。"
2000402-62 = "那我決定選這件泳裝。"
2000402-64 = "……我會盡己所能，用這件可愛泳裝展現正義！"
2000402-66 = "（之後，和購買了可愛泳裝的麻白回到了學校）"

[translation]
1003205-1 = "激烈的戰鬥"
1003205-3 = "（因為無月的邀約，來到了約定的地點）"
1003205-4 = "咯呵呵。老師，竟然沒有逃跑呢？"
1003205-5 = "對這場勝負就這麼有自信嗎～？"
1003205-6 = "[s] 「與其說有自信，倒不如說難得被無月叫出來……？」"
1003205-7 = "……是因為被我叫出來的關係？"
1003205-8 = "哼──嗯……但是老師？既然都來了，可不會這麼輕易就讓你回去喔？"
1003205-9 = "別看我這樣，我對羽根突可是相當有自信的唷！"
1003205-10 = "這次就用這把從新年福袋中得到的「最強羽子板」！"
1003205-11 = "把老師打得落花流水！咯呵呵！"
1003205-12 = "[s1] 「『最強羽子板』……？」\n[s2] 「有什麼特殊功能嗎……？」"
1003205-13 = "啊哈，聽完可別嚇到囉～？"
1003205-14 = "啊哈，聽完可別嚇到囉～？"
1003205-15 = "這場羽根突有條特別的規則，那就是……"
1003205-16 = "輸的人要聽從贏的人一件事，不管是什麼都行！"
1003205-17 = "[s] 「那是無月一貫的自訂規則吧……！」"
1003205-18 = "啊哈哈！老師也只有現在能這樣悠哉了！"
1003205-19 = "來吧，老師，一決勝負吧！"
1003205-20 = "[s] 「雖然我是沒有覺得很悠哉啦……好，來吧！」"
1003205-23 = "（就這樣，和無月間的激烈戰鬥開始了）"
1003205-24 = "那麼，由我開始。"
1003205-28 = "呀！"
1003205-32 = "（無月的板子漂亮地劃過半空）"
1003205-36 = "[ns] 「……？」"
1003205-37 = "……唔，剛才是練習。那就正式來囉！"
1003205-38 = "來認真的囉，老師！"
1003205-39 = "呀！"
1003205-43 = "（再一次，無月的板子乾淨俐落地劃過半空）"
1003205-47 = "[ns] 「無月……？」"
1003205-48 = "……不，不對不對！等等，剛剛不算！再一次！"
1003205-49 = "呀啊！！"
1003205-53 = "（以下省略）"
1003205-57 = "…………"
1003205-58 = "……啊哈！真有一套啊，老師！"
1003205-59 = "沒想到還藏了這麼一手。這就是你能這麼悠哉的原因嗎～？"
1003205-60 = "既然如此，就算是無月醬我，也無法只靠尋常辦法應付呢！"
1003205-61 = "[s] 「我什麼都還沒做呢……」"
1003205-62 = "呣──，因為寫了「最強羽子板」才從玩具店買回來的……不良品？"
1003205-63 = "啊哈。那也沒辦法了──，今天的勝負就當沒發生過……"
1003205-67 = "[ns3] 「……這樣好嗎？」\n[ns4] 「那就照無月說的，輸家要聽贏家的……」"
1003205-68 = "耶，等等等等！？"
1003205-69 = "耶，等等等等！？"
1003205-70 = "沒這回事，還沒有分出勝負！"
1003205-71 = "沒錯！如果瞬間就分出勝負的話，就不有趣了！"
1003205-72 = "難得玩新年時才會玩的遊戲，肯定會想慢慢品嘗的吧？"
1003205-73 = "沒錯，這麼做也是為了老師！"
1003205-74 = "[s] 「無月式理論……」"
1003205-75 = "總之從頭來過！再一次！勝負，現在才要開始！"
1003205-76 = "不會再放水囉，老師？這次真的要……！"
1003205-77 = "[s] 「……嗯，來吧！」"
1003205-79 = "（之後，又嘗試了好幾次……）"
1003205-80 = "啊啊！為什麼！？"
1003205-82 = "哇！？剛，剛剛是因為風的關係……！"
1003205-84 = "為什麼老師打的球會在空中變換軌道！？那是什麼必殺技～！？"
1003205-87 = " （不知是因為新手運，還是單純運氣好……）"
1003205-88 = " （正式開始後，我在12場比賽中取得了12場完全勝利）"
1003205-91 = "不可能──！為什麼老師會這麼強！？"
1003205-92 = "是不是用了什麼作弊的板子？還是祕密武器？老師，告訴我你做了什麼！"
1003205-93 = "[s] 「不，沒特別做什麼……」"
1003205-94 = "啊，真是的～難得我想把老師的臉整個塗黑的──！"
1003205-95 = "嗚……！"
1003205-96 = "……"
1003205-100 = "……想到了個好點子。"
1003205-101 = "[s] （總覺得有種不祥的預感……）"
1003205-102 = "好，再一次，老師！再一次！下次我絕──對會贏的！然後讓老師痛哭流涕！"
1003205-103 = "啊，可以讓老師先攻嗎？"
1003205-104 = "我會讓你看看，我認真起來有多恐怖！"
1003205-105 = "[s] 「那麼，我就……」"
1003205-109 = "揮拍之前……啊哈，有破綻～！"
1003205-110 = "[s] 「無月！？」"
1003205-111 = "老師的，"
1003205-112 = "脖子～…"
1003205-113 = "咬♪"
1003205-119 = "啊──！老師，羽球掉地上了吧？"
1003205-120 = "呵呵，老師的那裡很敏感嗎？滿臉通紅呢～？"
1003205-121 = "但不管怎麼說，真是可惜呢，羽球掉了就代表老師輸了吧？"
1003205-122 = "[s] 「剛，剛才是各種違規了吧……！？」"
1003205-123 = "咯呵呵，老師～？這是「不服輸」的意思嗎？"
1003205-124 = "所以說～……"
1003205-127 = "― 啊哈，可～惜！是我贏囉，老師！[wa:3410] "
1003205-130 = "― 咯呵呵，[wa:100] "
1003205-132 = "― 你至今為止的奮鬥，我給予肯定～……[wa:1080] "
1003205-135 = "― 但勝負的世界是很殘酷的。[wa:1000] "
1003205-137 = "― 這也是沒辦法的吧？咯呵♪[wa:1350] "
1003205-140 = "― 那麼，畫什麼好呢？[wa:1420] "
1003205-142 = "― 圓圈？叉叉？還是有其他更好的？[wa:1780] "
1003205-145 = "― 現在老師說出口的話，[wa:460] "
1003205-147 = "― 什麼我都聽唷？[wa:630] "
1003205-150 = "― 啊，我改變主意了。[wa:1230] "
1003205-152 = "― 如果只畫個普通的記號，有點不太夠……[wa:790] "
1003205-155 = "― 我要塗滿整張臉！[wa:2350] "
1003205-158 = "嗯，畫好了！"
1003205-164 = "……咯呵，啊哈哈哈！老師的臉真不得了！呵呵，真是棒呢～！"
1003205-165 = "[s] 「再一次！這次我一定會贏……！」"
1003205-166 = "老師，你在說什麼？我已經贏了，今天就到此為止！"
1003205-167 = "[s] 「贏了就跑也太狡猾了吧！？」"
1003205-168 = "耶──，沒有那樣的事吧？"
1003205-169 = "還是說，老師想要我再做一次剛才的事嗎？"
1003205-170 = "什麼什麼，是這個意思嗎？對它上癮了嗎？"
1003205-171 = "[s] 「不，我不是那個意思……！」"
1003205-172 = "啊哈哈哈！開玩笑的～，害羞的老師也很可愛呢！咯呵呵♪"
1003205-173 = "那今天就到這兒吧，很有趣，非常滿足！"
1003205-174 = "那既然是我贏了，你會聽我的話，對吧？當然，老師沒有拒絕的權利！"
1003205-175 = "[s] 「到底要做什麼……」"
1003205-176 = "現在跟我一起，"
1003205-182 = "去散步吧！"
1003205-186 = "啊，但不能洗臉唷，保持這樣！好了好了，快點！"
1003205-188 = "（後來我被一臉天真無邪的無月拉著手，在附近散起步來）"
1003205-189 = "（雖然不知道被畫了什麼華麗的圖案，但周圍的人們都盯著看，而無月自始至終都很開心……）"

[translation]
1003205-1 = "It Takes Two to Hanetsuki!"
1003205-3 = "(I couldn't refuse Mutsuki and came out to play hanetsuki with her.)"
1003205-4 = "Wow, Sensei. I never thought you'd be arrogant enough to meet my challenge head on."
1003205-5 = "Are you so confident you'll win?"
1003205-6 = "[s] \"I...I just came because you asked me.\""
1003205-7 = "Oh... I see. You just came because I asked you to."
1003205-8 = "Regardless! Don't blame me when you regret accepting my challenge so easily."
1003205-9 = "I may not look it, but I am very confident in my hanetsuki skills!"
1003205-10 = "Especially since I have this ultra-powerful hanetsuki I got from my New Year lucky pouch!"
1003205-11 = "Heehee! I'll make you cry like a baby, Sensei!"
1003205-12 = "[s1] \"Ultra-powerful hanetsuki?\"\n[s2] \"Does it have some kind of special function?\""
1003205-13 = "Yep! Don't be too scared when I tell you, okay?"
1003205-14 = "Yep! Don't be too scared when I tell you, okay?"
1003205-15 = "This hanetsuki does indeed have a special function. That function is..."
1003205-16 = "the loser of the game has to listen to the winner!"
1003205-17 = "[s] \"I think you just made that up...\""
1003205-18 = "Heehee, details, details! Now, prepare for doom, Sensei!"
1003205-19 = "Game on!"
1003205-20 = "[s] \"I don't know if doom is the right word...but okay! I accept your challenge!\""
1003205-23 = "(Thus began my intense hanetsuki battle with Mutsuki!)"
1003205-24 = "I'll go first."
1003205-28 = "Yah!"
1003205-32 = "(Mutsuki's paddle ripped through the air without hitting the shuttlecock at all.)"
1003205-36 = "[ns] \"...Uh.\""
1003205-37 = "Haha, that was just a warm-up! Get ready for the real deal!"
1003205-38 = "This next one is for real, Sensei!"
1003205-39 = "Yah!"
1003205-43 = "(Once again, Mutsuki's paddle ripped through the air without hitting the shuttlecock.)"
1003205-47 = "[ns] \"Mutsuki, this is...\""
1003205-48 = "N-No! Wait! One more time!"
1003205-49 = "Yah!"
1003205-53 = "(Once again, Mutsuki's paddle ripped through the air- the rest is omitted.)"
1003205-57 = "..."
1003205-58 = "Hahaha! Whoops! Sensei...you're pretty good!"
1003205-59 = "I had no clue you were hiding such skill. No wonder you were unconcerned."
1003205-60 = "That's how you're able to triumph over me, the world champion Mutsuki!#nThat must be what's happening!"
1003205-61 = "[s] \"I didn't even do anything.\""
1003205-62 = "I bought this at the toy store because they said it was the most powerful hanetsuki, but... I guess it's a defective product."
1003205-63 = "Haha, I guess there's nothing we can do about it. Let's forget about today's match."
1003205-67 = "[ns3] \"Mutsuki, a rule is a rule. It's time for some doodles.\"\n[ns4] \"Or, according to your own rule, the loser has to obey the winner.\""
1003205-68 = "Uh, w-wait! Sensei!"
1003205-69 = "Uh, w-wait! Sensei!"
1003205-70 = "Time out! Time out! The match isn't over yet! "
1003205-71 = "Yeah! That's right! It's no fun if it just ends like this!"
1003205-72 = "We came out here just to play hanetsuki for New Year's, so we need to play more matches to decide the winner!"
1003205-73 = "That's how it works! What do you say, Sensei? Huh? You agree, right...? Right?!"
1003205-74 = "[s] \"You're such a tyrant...\""
1003205-75 = "Again! Let's play again! I let you win the first round, but the real game starts now!"
1003205-76 = "I'll show no mercy this time! Sensei! You'd better be prepared!"
1003205-77 = "[s] \"Fine, I'll accept your arbitrary challenge.\""
1003205-79 = "(After that, I played several hanetsuki matches with Mutsuki, but it was the same result every time.)"
1003205-80 = "No! I missed again!"
1003205-82 = "Shoot! Stupid wind!"
1003205-84 = "How are you making the shuttlecock change direction midair?#nAre you using some kind of special technique when you hit it?"
1003205-87 = " Maybe it was beginner's luck or just simple fortune..."
1003205-88 = " ...but I won twelve out of twelve matches against Mutsuki."
1003205-91 = "NO! WAY! How?! You're too good, Sensei!"
1003205-92 = "Do you have some kind of device attached to your hanetsuki equipment? You're cheating somehow, aren't you?!"
1003205-93 = "[s] \"No, of course not.\""
1003205-94 = "Ah! What about my plan to draw all over your face with ink?!"
1003205-95 = "Ugh!"
1003205-96 = "Hmph!"
1003205-100 = "Well, if that's the way it's gonna be..."
1003205-101 = "[s] (I have a bad feeling about this.)"
1003205-102 = "One more time! Sensei, let's play one more time! I'll definitely make you whine and say, \"I'm furious! How can this be?!\""
1003205-103 = "Okay, Sensei, you go first. Make sure you're prepared, all right?"
1003205-104 = "I'm really scary when I'm serious!"
1003205-105 = "[s] \"Yeah, yeah, okay, just let me...\""
1003205-109 = "Aha! I see an opening!"
1003205-110 = "[s] \"M-Mutsuki?! Hello?!\""
1003205-111 = "Now's my chance to..."
1003205-112 = "bite your neck!"
1003205-113 = "*nom*"
1003205-119 = "Ahaha! You were so flustered you missed the shuttlecock!"
1003205-120 = "Heehee, Sensei, I've found your weakness! Your face is bright red!"
1003205-121 = "Well, it's a pity, but since you missed the shuttlecock, you lost this time!"
1003205-122 = "[s] \"Wait! That is against the rules of hanetsuki!\""
1003205-123 = "Heehee! Losers don't get a say!"
1003205-124 = "Now then, hiyah!"
1003205-127 = "― Oh, what a shame. I win, Sensei![wa:2730] "
1003205-130 = "― Heh heh heh.[wa:10] "
1003205-132 = "― I admit you put up a good fight,[wa:480] "
1003205-135 = "― but defeat is a bitter pill to swallow no matter what.[wa:10] "
1003205-137 = "― Now take your medicine. Heehee! ♪[wa:510] "
1003205-140 = "― So, what should I draw?[wa:860] "
1003205-142 = "― A circle? An X? Or do you have a better idea?[wa:580] "
1003205-145 = "― Now's your chance, Sensei.[wa:10] "
1003205-147 = "― I'll take any request.[wa:30] "
1003205-150 = "― Actually, I change my mind.[wa:510] "
1003205-152 = "― Something that easy won't do...[wa:270] "
1003205-155 = "― Instead, I'll draw all over your face. Every bit of it![wa:470] "
1003205-158 = "I'm done drawing! And the result is..."
1003205-164 = "Hahaha! Sensei, your face looks hilarious! It's too funny!"
1003205-165 = "[s] \"N-Next time! Next time, I'll win for sure!\""
1003205-166 = "Nope. Not happening. I won, so that's the end of today's game!"
1003205-167 = "[s] \"Come on! That's not fair!\""
1003205-168 = "What? What do you mean not fair? "
1003205-169 = "Well, if you want, I can keep doing the same attack as before."
1003205-170 = "Heehee. Sensei, do you want me to keep attacking you like that?"
1003205-171 = "[s] \"No, that's not it...\""
1003205-172 = "Ahahaha! I'm just kidding! Sensei, you're so cute when you're embarrassed!"
1003205-173 = "But that's the end of today's game! I had fun, so I'm satisfied!"
1003205-174 = "Starting now, I will exercise my authority as the winner!"
1003205-175 = "[s] \"What do you mean by 'authority as the winner?'\""
1003205-176 = "That's..."
1003205-182 = "I want to go on a walk with you right now while your face is messed up!"
1003205-186 = "Okay, Sensei. Let's go!"
1003205-188 = "I took Mutsuki's hand as she smiled brightly and went on a walk around the venue."
1003205-189 = "(I didn't know what my face looked like, but as I walked alongside a smiling Mutsuki, I attracted a lot of attention.)"

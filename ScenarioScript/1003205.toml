[translation]
1003205-1 = "การแข่งฮาเนะสึกิอันดุเดือด!"
1003205-3 = "(คุณครูทนลูกอ้อนของมุสึกิไม่ไหว สุดท้ายก็ยอมออกมาเล่นฮาเนะสึกิกับเธอ)"
1003205-4 = "อะไรกัน~ คุณครู ยอมเห็นชัยชนะของเค้าไม่ได้จนต้องออกมาเลยเหรอ"
1003205-5 = "มั่นใจว่าจะชนะขนาดนั้นเลยเหรอ~?"
1003205-6 = "[s] \"ไม่ใช่สักหน่อย... ก็มุสึกิเรียกออกมานี่นา\""
1003205-7 = "อ่า... งั้นเหรอ? หืมมม... งั้นเหรอ~ เพราะเค้าอ้อนให้ออกมาเหรอ..."
1003205-8 = "แต่ว่านะคุณครู... รับคำท้าแข่งกับเค้าอาจเสียใจไม่รู้นะ"
1003205-9 = "เห็นแบบนี้แต่เค้าน่ะ... เล่นฮาเนะสึกิเก่งมากเลยนะ!"
1003205-10 = "ถ้าใช้ <สุดยอดฮาเนะสึกิ> สุดพิเศษที่เค้าได้มาจากถุงโชคดีจากงานปีใหม่นี้ไม่แพ้แน่!"
1003205-11 = "คิคิคิกๆ...! เค้าอาจทำให้คุณครูร้องไห้ขี้มูกโป่งกลับไปเลยก็ได้นะ!"
1003205-12 = "[s1] \"<สุดยอดฮาเนะสึกิ>...?\"\n[s2] \"แล้วมันพิเศษยังไงเหรอ..?\""
1003205-13 = "อ่ะฮ่า~ ฟังแล้วอย่าตกใจล่ะ~?"
1003205-14 = "อ่ะฮ่า~ ฟังแล้วอย่าตกใจล่ะ~?"
1003205-15 = "ฮาเนะสึกิอันนี้มีฟังก์ชั่นพิเศษมากอยู่นะ และฟังก์ชั่นก็คือ..."
1003205-16 = "ทำให้คนที่แพ้ในการแข่งขันเชื่อฟังคนที่ชนะไงล่ะ!"
1003205-17 = "[s] \"ไม่ใช่ว่าเป็นกฎที่มุสึกิเพิ่งตั้งขึ้นมาหรอกเหรอ...?\""
1003205-18 = "แฮ่~ ยังไงก็ถือว่าดีแล้วกัน~! เอาล่ะ! คุณครูจะทำตัวสบายๆ ได้เท่านี้ล่ะ!"
1003205-19 = "คุณครู! เอาล่ะ! มาแข่งกัน!"
1003205-20 = "[s] \"ครูไม่ได้ทำตัวสบายๆ นะแต่ว่า... ก็ได้! ครูขอรับคำท้า!\""
1003205-23 = "(และแล้วการแข่งขันฮาเนะสึกิอันดุเดือดก็เริ่มขึ้น!)"
1003205-24 = "ถ้างั้นเค้าจะเริ่มก่อนเอง"
1003205-28 = "ย้าาา!"
1003205-32 = "(มุสึกิโยนลูกบอลขึ้นไปและหวดไม้ผ่านอากาศ... โดยที่ไม่โดนลูก)"
1003205-36 = "[ns] \"โอ๊ะ...\""
1003205-37 = "อ่ะฮ่า~ เมื่อกี้แค่ซ้อมน่ะ! ของจริงกำลังจะเริ่มต่างหาก!"
1003205-38 = "ต่อไปเอาจริงล่ะนะ! คุณครู!"
1003205-39 = "ย้าาา!"
1003205-43 = "(มุสึกิโยนลูกบอลขึ้นไปและหวดไม้ผ่านอากาศโดยที่ไม่โดนลูก... อีกครั้ง)"
1003205-47 = "[ns] \"มุสึกิ นี่มัน...\""
1003205-48 = "มะ... ไม่นะ...! เดี๋ยวสิ! ขออีกครั้งนึง!"
1003205-49 = "ย้าาา!"
1003205-53 = "(มุสึกิโยนลูกบอลขึ้นไปและหวดไม้ผ่านอากาศ... หลังจากนั้นก็ละไว้ในฐานที่เข้าใจ)"
1003205-57 = "...."
1003205-58 = "อ่ะฮะฮะ~! อื้อ~! คุณครู... ฝีมือใช้ได้เลยนี่~!"
1003205-59 = "คิดแล้วเชียวว่าต้องซ่อนไพ่ตายอะไรไว้แน่ๆ เพราะงั้นเลยทำตัวสบายๆ ได้สินะ"
1003205-60 = "เพราะงั้นก็ต้องโดนมือวางอันดับหนึ่งของโลกอย่างเค้าจัดการล่ะนะ! อื้อ! ใช่แล้วล่ะ!"
1003205-61 = "[s] \"ครูยังไม่ได้ทำอะไรเลยนะ\""
1003205-62 = "หืมมม~ เค้าซื้อมาเพราะเจ้าของร้านของเล่นบอกว่าเป็นสุดยอดฮาเนะสึกิ...#nเฮ้อ... ดูเหมือนจะเป็นของที่ไม่ได้มาตรฐานสินะ"
1003205-63 = "อาฮะ~ งั้นก็ช่วยไม่ได้นะ วันนี้คงเล่นไม่ได้แล้วล่ะ"
1003205-67 = "[ns3] \"มุสึกิ กฎต้องเป็นกฎนะ... ได้เวลาวาดรูปแล้วล่ะ\"\n[ns4] \"ถ้าไม่งั้นก็ทำตามกฎของมุสึกิที่บอกว่าคนที่แพ้จะต้อง...\""
1003205-68 = "อ๊ะ เดี๋ยวก่อนสิ! คุณครู?"
1003205-69 = "อ๊ะ เดี๋ยวก่อนสิ! คุณครู?"
1003205-70 = "เวลานอก! ขอเวลานอก! เรายังไม่รู้แพ้รู้ชนะกันสักหน่อย!"
1003205-71 = "อื้อ! ใช่! ถ้าเล่นแป๊ปเดียวจบมันก็ไม่สนุกน่ะสิ!"
1003205-72 = "อีกอย่างไหนๆ ก็มาเล่นฮาเนะสึกิที่งานปีใหม่กันแล้ว มาแข่งกันหลายๆ รอบ แล้วค่อยตัดสินแพ้ชนะ#nดีกว่า!"
1003205-73 = "เค้าคิดแบบนั้นนะ! ว่าไงล่ะคุณครู? หืม? คุณครูก็เห็นด้วยใช่มั้ย...? หือออ~?"
1003205-74 = "[s] \"เอาแต่ใจสมกับเป็นมุสึกิเลย...\""
1003205-75 = "เอาล่ะ! อีกที! มาลองอีกที! ฮึ่ม~ ครั้งแรกถือว่าเค้ายอมให้แล้วกัน แต่การแข่งขันน่ะมันเพิ่งเริ่ม#nต่างหากล่ะ!"
1003205-76 = "ตั้งแต่นี้ไปเค้าจะไม่ปรานีแล้วนะ! คุณครู! เตรียมตัวให้ดีได้เลย~!"
1003205-77 = "[s] \"ได้อยู่แล้ว การแข่งขันที่เอาแต่ใจแบบนี้... ครูยอมรับคำท้า!\""
1003205-79 = "(จากนั้นคุณครูกับมุสึกิก็แข่งฮาเนะสึกิกันอีกสองสามรอบ แต่ว่าทุกๆ ครั้งที่ตีนั้น...)"
1003205-80 = "อ๊ะ อีกแล้วๆ ไม่โดนอีกแล้ว!"
1003205-82 = "อ๊ายยยย~! เมื่อกี้พลาดเพราะลมแรงต่างหาก!"
1003205-84 = "อะไรกัน~ ทำไมลูกขนไก่ที่คุณครูตีมันถึงเปลี่ยนทิศทางตอนลอยอยู่ในอากาศล่ะ~!#nคุณครูใช้ท่าไม้ตายพิเศษอะไรรึเปล่า~?"
1003205-87 = "(โชคของมือใหม่หรือแค่ว่าดวงดีกันนะ... แปลกจริงๆ)"
1003205-88 = "(คุณครูแข่งกับมุสึกิทั้งหมด 12 ตา และชนะ 12 ตารวด...)"
1003205-91 = "เป็น~ไป~ไม่~ได้~! ได้ไงน่ะคุณครู! ทำไมแข็งแกร่งอะไรแบบนี้?!"
1003205-92 = "ติดอุปกรณ์อะไรไว้ที่ไม้ตีฮาเนะสึกิรึเปล่าน่ะ? คุณครู! แอบทำอะไรโดยที่เค้าไม่รู้ใช่มั้ย?!"
1003205-93 = "[s] \"เปล่านะ ไม่ได้ทำสักหน่อย\""
1003205-94 = "อ่า... ถ้างั้นแผนของเค้าที่จะใช้หมึกดำวาดรูปบนหน้าคุณครูจะทำยังไงล่ะ~!"
1003205-95 = "ฮือออออ...!"
1003205-96 = "อืม... อืม..."
1003205-100 = "อ๊ะ ถ้าเป็นแบบนี้ล่ะก็..."
1003205-101 = "[s] (รู้สึกไม่สบายใจอย่างบอกไม่ถูก...)"
1003205-102 = "ดีล่ะ! มาลองอีกครั้ง! คุณครู มาลองกันอีกครั้ง! คราวนี้เค้าจะทำให้คุณครูโกรธจนหัวฟัดหัวเหวี่ยง#nแล้วก็ร้องไห้ขี้มูกโป่งให้ดู!"
1003205-103 = "คุณครูเสิร์ฟก่อนเลย เตรียมตัวให้ดีล่ะ"
1003205-104 = "เวลาเค้าเอาจริงน่ะ น่ากลัวนะจะบอกให้~!"
1003205-105 = "[s] \"จ้าๆ... งั้นเสิร์ฟล่ะนะ...\""
1003205-109 = "อ่ะฮ่า~! เจอช่องโหว่แล้ว~!"
1003205-110 = "[s] \"มะ...มุสึกิ?! เดี๋ยวสิ?!\""
1003205-111 = "เค้าเล็งตอนที่คุณครูเผลอมีช่องโหว่..."
1003205-112 = "แล้วก็โจมตีด้วยการงับเข้าที่คอคุณครูไงล่ะ~"
1003205-113 = "งับ!"
1003205-119 = "อ่ะฮะฮะ! คราวนี้คุณครูตกใจจนลูกขนไก่หล่นแล้ว~"
1003205-120 = "ฮิฮิ ตรงนี้เป็นส่วนอ่อนไหวของคุณครูสินะ~ หน้าแดงแป๊ดเลย~!"
1003205-121 = "น่าเสียดายนะ แต่คุณครูพลาดแล้วแสดงว่าคราวนี้คุณครูแพ้เค้าแล้วล่ะ"
1003205-122 = "[s] \"เดี๋ยวสิ! เมื่อกี้มันไม่รวมอยู่ในกฎการเล่นสักหน่อย!\""
1003205-123 = "ฮิฮิ~ คนแพ้ไม่มีสิทธิ์เถียงนะ~"
1003205-124 = "เอาล่ะน้า~ ย้า~!"
1003205-127 = "― อ่ะฮ่า~ น่าเสียดายนะแต่เค้าชนะแล้วละ~ คุณครู![wa:2210] "
1003205-130 = "― คิคิคิ[wa:20] "
1003205-132 = "― เค้าขอชมนะ ที่พยายามเต็มที่... จนถึงท้ายที่สุดน่ะ[wa:10] "
1003205-135 = "― แต่โลกของการแพ้ชนะน่ะ มันโหดร้ายนะ[wa:120] "
1003205-137 = "― ช่วยไม่ได้น้า ฮิฮิ♪[wa:1070] "
1003205-140 = "― เอาล่ะ วาดรูปอะไรดีน้า~?[wa:820] "
1003205-142 = "― รูปวงกลม? กรรไกร? หรือรูปอะไรดีนะ?[wa:1020] "
1003205-145 = "― ถ้าบอกมาตอนนี้ เค้าจะยอมวาดตามที่คุณครูชอบ[wa:10] "
1003205-147 = "― ไม่ว่ารูปอะไร เค้าก็จะวาดให้เอง?[wa:10] "
1003205-150 = "― อ๊ะ... เปลี่ยนใจแล้วล่ะ[wa:670] "
1003205-152 = "― ถ้าแบบธรรมดาๆ ไม่น่าจะพอแล้วละ...[wa:190] "
1003205-155 = "― เอาเป็นว่า... ละเลง... ให้เต็มหน้าแบบนี้เลยดีกว่า![wa:670] "
1003205-158 = "วาดเสร็จแล้วล่ะ! และผลก็คือ..."
1003205-164 = "พรืดดดด วะฮะฮะฮ่า! หน้าของคุณครูเละสุดๆ ไปเลย! พรืดดดด วะฮะฮะฮ่า! ตลกจังเลย!!"
1003205-165 = "[s] \"คะ..ครั้งต่อไป! คราวต่อไปครูไม่แพ้แน่!\""
1003205-166 = "หือออ~? ไม่หรอก เค้าชนะแล้ว เพราะงั้นการแข่งวันนี้ก็จบแค่นี้ล่ะ!"
1003205-167 = "[s] \"อ๊ะ! ใจร้ายจัง!\""
1003205-168 = "เอ๋~? ใจร้ายงั้นเหรอ"
1003205-169 = "ถ้าจะเล่นต่อ เค้าจะจู่โจมแบบเมื่อกี้ต่อเรื่อยๆ ก็ได้นะ"
1003205-170 = "หรือว่าคุณครู...อยากโดนเค้ากัดแบบนั้นอีกงั้นเหรอ?"
1003205-171 = "[s] \"ไม่ล่ะ... เรื่องนั้นมัน...\""
1003205-172 = "ฮะฮะฮ่าฮ่า! ล้อเล่นหรอกน่า! คุณครูตอนเขินนี่ก็น่ารักดีนะ! คิคิคิกๆ...!"
1003205-173 = "แต่ว่าวันนี้เลิกเล่นแค่นี้ล่ะ! เค้าสนุกพอแล้วล่ะ พอใจแล้ว!"
1003205-174 = "ถึงเวลาที่ผู้ชนะจะใช้สิทธิ์ของผู้ชนะแล้ว!#nแน่นอนว่าคุณครูไม่มีสิทธิ์ปฏิเสธด้วย!"
1003205-175 = "[s] \"สิทธิ์ของผู้ชนะงั้นเรอะ?\""
1003205-176 = "นั่นก็คือ..."
1003205-182 = "คุณครูต้องไปเดินเล่นกับเค้าโดยที่หน้าเละเทะแบบนั้น!"
1003205-186 = "เอาละคุณครู... ไปกันเถอะ!"
1003205-188 = "(จากนั้นคุณครูกับมุสึกิที่หัวเราะอย่างร่าเริงก็จับมือกันไปเดินเล่นใกล้ๆ สถานที่จัดงานปีใหม่)"
1003205-189 = "(ถึงคุณครูจะไม่รู้ว่าตอนนี้สภาพหน้าตาของตัวเองเป็นอย่างไร แต่ในตอนที่เดินไปพร้อมกับมุสึกิ#nที่หัวเราะอย่างร่าเริง ก็พบว่าคนรอบๆ หันมามองด้วยความสนใจมาก...)"

[translation]
10018040-1 = "Episode 4; Nobody Can Tell the Difference!"
10018040-2 = "Factory Interior"
10018040-5 = "The only taste that matters is the taste of money!"
10018040-6 = "Just keep things safe enough to eat! Seasoning is enough flavor for the masses!"
10018040-7 = "Gourmet food is just cognitive dissonance!"
10018040-8 = "Profit is reality!"
10018040-12 = "Buy mediocre ingredients in large quantities, then mix in low-grade ingredients to increase our supply and profit margins!"
10018040-13 = "Nyao Foods' patented synthetic seasoning will drown out the quality while we drown in money!"
10018040-14 = "Don't worry about the complaints! If they're complaining, that means they're buying!"
10018040-18 = "Mwahahaha! And all this profit will go towards a good cause..."
10018040-19 = "The operation and expansion of Cafe Nyao, the franchise of the future!"
10018040-20 = "Idiots cultivate food. I cultivate business!"
10018040-22 = "I have something to report, boss."
10018040-23 = "A report, excellent. Mwahahaha. By the way, I told you to call me Chairman Nyao here."
10018040-24 = "Oh, right. Um, Chairman Nyao, there's something urgent to report."
10018040-25 = "Urgent? Pfft. Mwahahaha."
10018040-26 = "What could be more urgent than gloating to myself about my money?"
10018040-27 = "If this isn't more worthwhile than that, you will pay for it. In the literal sense. Mwahahaha."
10018040-28 = "So... The message is..."
10018040-30 = "Hmm..."
10018040-31 = "What should we do, Chairman Nyao?"
10018040-32 = "I've been thinking about what to do with that restaurant..."
10018040-33 = "First off, some small club like the Gourmet Research Society is of no interest to me."
10018040-34 = "What could be a problem, however, is the huge academy that club is a part of, Gehenna."
10018040-36 = "I've heard that the Gourmet Research Society isn't very popular in Gehenna."
10018040-37 = "Is that information reliable?"
10018040-38 = "Huh? Uh, yeah, sure."
10018040-39 = "Okay. Your clear confidence gives me faith in your answer."
10018040-43 = "Now, all I need to do is swat away the bug that is the Gourmet Research Society..."
10018040-46 = "Sparrow Interior"
10018040-47 = "Please reconsider. Sparrow is too valuable to give up on!"
10018040-48 = "Yes, we're just getting started. Don't give up before giving yourself a chance..."
10018040-50 = "Thank you, everyone. I appreciate your kindness."
10018040-51 = "But I feel as guilty as I do grateful. I've been nothing but a burden to you."
10018040-52 = "[s] \"Haruna and Fuuka agreeing is a rare sight.\""
10018040-53 = "Sensei? What do you mean by that?"
10018040-54 = "...No need to worry about that right now."
10018040-55 = "Anyway, if we get involved any more, there'll be plenty of problems to overcome."
10018040-56 = "And a big company like Nyao Foods is too big of a problem to deal with."
10018040-57 = "At first, I thought the problem was my lack of skill, and all I needed to do was to get a little help..."
10018040-58 = "...but things are getting more and more out of control."
10018040-60 = "But this restaurant has been passed down for generations."
10018040-61 = "Right, you said you wanted to protect it no matter what."
10018040-66 = "You're right... It might be best to join the Nyao Foods' franchise."
10018040-67 = "I'd keep the building at least."
10018040-68 = "No, that's not right."
10018040-69 = "Gourmet dining isn't just about the food, but also the location, the atmosphere, the history, the situation..."
10018040-70 = "Gourmet is when all those elements work together to make buying dinner more than a simple transaction."
10018040-71 = "I don't intend to allow Sparrow to lose its soul."
10018040-78 = "I don't think you should give up."
10018040-79 = "R-Really?"
10018040-83 = "I'm not a good cook at all."
10018040-84 = "Everything I make ends in ruins. The only things I can create are disasters."
10018040-85 = "I make one little mistake, and suddenly the food is alive and attacking people."
10018040-87 = "...What? Aren't you burying the lede here?"
10018040-88 = "But no matter how many pasta-related injuries I cause, I'll never give up!"
10018040-89 = "Fuuka and Sensei are always there to support and encourage me, and more than anything, I don't want to turn away from cooking!"
10018040-90 = "I may not be a good cook, but I love cooking!"
10018040-92 = "Nothing makes me happier than people eating my food."
10018040-93 = "There's no point quitting halfway through!"
10018040-94 = "One day, I know that I'm going to make delicious food each and every day."
10018040-96 = "And I don't want to see you give up either..."
10018040-97 = "I hope I didn't overstep by saying that to you."
10018040-98 = "Everyone..."
10018040-99 = "But, if I don't give up, what should I even do?"
10018040-102 = "[s] \"Well, we have the food, we have the chefs...\""
10018040-104 = "[ns] \"We just need customers to know about it.\""
10018040-107 = "I see. How about a food-tasting promotion?"
10018040-108 = "Yes. It's time to show people the results of our hard work."
10018040-109 = "A new and improved Sparrow restaurant with food good enough to back that claim. Heehee."
10018040-110 = "A restaurant with loyal customers can survive anything! Let's do this together!"
10018040-112 = "Is it..."
10018040-117 = "Is it really okay to have one more chance?"
10018040-120 = "I've been waiting for you to ask."
10018040-121 = "And the answer is yes! We'll help you with anything!"
10018040-123 = "We're just getting started."
10018040-124 = "!!"
10018040-128 = "[ns] \"Time to give people a taste of Sparrow.\""

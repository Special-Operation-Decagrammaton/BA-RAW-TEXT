[translation]
10018040-1 = "第4話;愚民們分不出來吧！"
10018040-2 = "工廠內部"
10018040-5 = "味道怎麼樣都無所謂！重要的是利潤！"
10018040-6 = "衛生只要維持在不會被告的程度就行了！調味料加好加滿！"
10018040-7 = "美食什麼的都是假的，到頭來也只是個人喜好罷了！"
10018040-8 = "沒錯，這種沒有標準的主觀感受，可是幫我們賺進了大把大把的鈔票啊！"
10018040-12 = "一開始先用高級的食材吸引顧客，再慢慢地混入便宜貨──"
10018040-13 = "最後用喵食品特製的化學調料唬弄過去，薄利多銷的供應鏈就完成了！"
10018040-14 = "絕對不會有投訴上門！反正愚民們也分不出差異！"
10018040-18 = "呣呵呵呵。如果將這些收益──"
10018040-19 = "都用來擴展連鎖店「喵食堂」的店鋪數的話……"
10018040-20 = "將會讓利潤的循環更往前一步……我的事業總算要走上正軌，要發大財了！"
10018040-22 = "老大，有事稟報。"
10018040-23 = "呣呵呵呵，什麼事這麼突然？#n而且我說過，在這裡要叫我會長吧？"
10018040-24 = "失禮了，會長。有緊急的事要向您報告……"
10018040-25 = "緊急？還真是難得呢。"
10018040-26 = "難不成是營業額下滑了嗎？"
10018040-27 = "如果沒有足以說服我的理由，可是要受罰的唷。#n呣呵呵呵。"
10018040-28 = "事情是這樣的。#n剛剛收到現場人員的聯絡……"
10018040-30 = "呣呵呵唔唔……"
10018040-31 = "該怎麼辦呢，會長？"
10018040-32 = "那間餐廳的老闆娘居然給我來這套……呵呣。"
10018040-33 = "我對美食研究會那種學生社團沒有興趣。"
10018040-34 = "真正必須留意的，是他們社團所屬的……名為格黑娜的巨型學園。"
10018040-36 = "據說美食研究會，在格黑娜內部也是相當引人注目的社團。"
10018040-37 = "那項情報的消息來源可靠嗎？"
10018040-38 = "是，團內的成員們都異口同聲地這麼說。"
10018040-39 = "唔呣，我就相信你說的吧。#n這下事情就簡單了。"
10018040-43 = "接下來只要搞定美食研究會就行了……"
10018040-46 = "麻雀亭．內部"
10018040-47 = "請再重新考慮一下。麻雀亭可是無價之寶啊。"
10018040-48 = "是啊。現在才剛開始呢。如果在這裡停下腳步的話……"
10018040-50 = "真的很感謝大家。#n但是，只要有這份心意就足夠了。"
10018040-51 = "而且我還給大家添了很多麻煩，真的很不好意思。"
10018040-52 = "[s]「羽留奈和風華居然意見一致，真少見……」"
10018040-53 = "老師？您剛才說了什麼嗎？"
10018040-54 = "……算了，這樣總比放棄來得好。"
10018040-55 = "但是就算再繼續抵抗下去……我認為也不是個辦法。"
10018040-56 = "想和喵食品這種大企業對抗，無論如何都是辦不到的。"
10018040-57 = "起初我以為只要借助大家的力量，彌補自己不足的部分就行了……"
10018040-58 = "結果事情卻漸漸變得越來越棘手……"
10018040-60 = "那這間代代相傳的店該怎麼辦呢？"
10018040-61 = "就是說呀。老闆娘不是說過無論如何都想守住它嗎？"
10018040-66 = "我想……成為喵食品的連鎖店，恐怕是當下最好的選擇了吧。"
10018040-67 = "那樣一來，至少能守住這棟建築物。"
10018040-68 = "不，我並不這麼認為。"
10018040-69 = "美食除了食物本身之外，還包括場所、氛圍、歷史、情境……"
10018040-70 = "所有要素融合在一起，才能真正稱得上是美食。"
10018040-71 = "我不打算讓麻雀亭失去任何一個要素。"
10018040-78 = "我也認為不應該放棄。"
10018040-79 = "嗯……？"
10018040-83 = "我其實並不擅長做料理。"
10018040-84 = "每次動手都只會搞得一團糟，造成不好的結果。"
10018040-85 = "一不小心就會讓食材起死回生，甚至襲擊人們。"
10018040-87 = "……那樣能算是「一不小心」的等級嗎？根本是神祕現象吧？"
10018040-88 = "但我還是沒有放棄！"
10018040-89 = "因為有風華前輩的陪伴和老師的鼓勵……以及最重要的，是我對料理的喜愛。"
10018040-90 = "雖然做得還不是很好，我還是很享受做料理的時光！"
10018040-92 = "光是想像自己的料理被人享用的瞬間，心情就會變得很高興對吧？"
10018040-93 = "如果半途而廢……是得不到任何成果的。"
10018040-94 = "總有一天，我一定也能做出美味的料理！"
10018040-96 = "所以……我希望老闆娘也不要放棄……"
10018040-97 = "雖然我說這些話，可能會讓你覺得太多管閒事……"
10018040-98 = "大家……"
10018040-99 = "但是，我該怎麼做才好呢……？"
10018040-102 = "[s]「既然做了料理，要不要讓大家嘗嘗看？」"
10018040-104 = "[ns]「先看看客人們的反應，再考慮之後的方針吧。」"
10018040-107 = "原來如此，是想透過試吃來促銷啊。"
10018040-108 = "老闆娘，這是展示新味道的機會唷！"
10018040-109 = "重生的麻雀亭……全新的料理……唔呵呵。"
10018040-110 = "只要顧客們滿意，餐廳隨時都能重新開幕的。#n老闆娘，一起試試看吧！"
10018040-112 = "大家……"
10018040-117 = "現在重新開始努力……真的可以嗎？"
10018040-120 = "我就在等那句話呢。"
10018040-121 = "沒錯！我們也會盡力幫忙的！"
10018040-123 = "現在才剛開始哦。"
10018040-124 = "！！"
10018040-128 = "[ns]「那麼，開始著手準備試吃會吧。」"

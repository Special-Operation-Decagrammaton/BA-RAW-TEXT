[translation]
10018040-1 = "ตอนที่ 4;ผู้ที่โง่เขลาไม่อาจแยกแยะได้!"
10018040-2 = "ด้านในโรงงาน"
10018040-5 = "เรื่องรสชาติจะเป็นยังไงก็ได้ ที่สำคัญคือกำไร!"
10018040-6 = "เรื่องความสะอาด ขอแค่กินแล้วไม่ท้องเสียก็พอ! ถ้าเคยกินผงชูรสจนเคยชินแล้วละก็ เรื่องรสชาติจะ#nยังไงก็ได้หมด!"
10018040-7 = "อาหารรสเลิศอะไรกัน... มันก็แค่เรื่องจินตนาการที่คิดไปเองกันทั้งนั้น!"
10018040-8 = "พวกเราคือนักขายฝันที่ได้กำไรเป็นของตอบแทนต่างหากล่ะ!"
10018040-12 = "ซื้อส่วนผสมคุณภาพกลางๆ มาเยอะๆ แล้วเอามาผสมกับวัตถุดิบคุณภาพต่ำๆ"
10018040-13 = "แล้วก็เอาเครื่องปรุงรสสูตรพิเศษของเนียวฟู้ดไปผสมจะได้เอาไปขายให้ได้กำไรเยอะๆ!"
10018040-14 = "ใครจะร้องเรียนก็ไม่สน! พวกไม่มีสมองน่ะแยกแยะไม่ได้หรอก!"
10018040-18 = "อุวะฮะฮะฮ่า และกำไรที่ได้จากการขายทั้งหมดนั่นน่ะ"
10018040-19 = "ก็เอาไปลงทุนเชิงรุกเพื่อขยายสาขาและดูแล \"ร้านอาหารเหมียวเหมียว\" และสาขาต่างๆ ที่เปิดขึ้นในรูปแบบแฟรนไชส์!"
10018040-20 = "ชื่อเสียงในวงการธุรกิจก็จะเพิ่มขึ้น และธุรกิจก็จะรุ่งเรืองขึ้นในทุกๆ วัน! "
10018040-22 = "รายงานค่ะบอส"
10018040-23 = "อุวะฮะฮะฮะ มีอะไร? บอกแล้วไงว่าอยู่ที่นี่ให้เรียกว่าท่านประธานน่ะ?"
10018040-24 = "อ๊ะ จริงด้วยค่ะท่านประธาน ฉันมีเรื่องด่วนจะมารายงานค่ะ"
10018040-25 = "เรื่องด่วนงั้นเหรอ เกิดเรื่องอะไรขึ้นสินะ... วะฮะฮะ"
10018040-26 = "มีเรื่องอะไรด่วนกว่าความผันผวนของกำไรจากธุรกิจอีกรึไง?"
10018040-27 = "ถ้าเธอพูดให้ฉันเชื่อไม่ได้ ก็เตรียมตัวชดใช้ด้วยราคาที่สูงลิบลิ่วได้เลย อุวะฮะฮะฮะ"
10018040-28 = "คือว่า... เราได้รับการติดต่อมาจากคนที่ลงพื้นที่ค่ะ..."
10018040-30 = "หืม...?"
10018040-31 = "ทำยังไงดีคะท่านประธาน?"
10018040-32 = "ฉันกำลังคิดเรื่องจัดการร้านอาหารนั้นอยู่..."
10018040-33 = "เอาเป็นว่าฉันไม่สนใจพวกชมรมปลาซิวปลาสร้อยอย่างพวกชมรมชิมอาหารอะไรนั่นหรอก"
10018040-34 = "สิ่งที่เป็นอันตรายก็คือสถาบันเกเฮนน่า... โรงเรียนขนาดใหญ่ที่พวกชมรมนั้นสังกัดอยู่ต่างหาก"
10018040-36 = "สำหรับเรื่องนั้น ได้ยินว่าแม้แต่ในเกเฮนน่าเอง ชมรมชิมอาหารก็เป็นชมรมที่ไม่มีใครสนใจเหมือนกันค่ะ"
10018040-37 = "ข่าวลือนั่นคงไม่ใช่ข่าวลวงหรอกใช่มั้ย?"
10018040-38 = "คะ? ค่ะ... แน่นอนค่ะ"
10018040-39 = "ดีละ ฉันจะเชื่อที่เธอบอกก็แล้วกัน เท่านี้เรื่องก็ง่ายขึ้นเยอะเลยนะ"
10018040-43 = "ถ้างั้นที่เหลือก็แค่จัดการเจ้าพวกชมรมชิมอาหารซะ..."
10018040-46 = "ด้านในร้านซุซุเมะ"
10018040-47 = "ช่วยทบทวนดูอีกครั้งด้วยเถอะค่ะ ร้านซุซุเมะเองก็มีคุณค่าเหมือนกันนะคะ!"
10018040-48 = "ใช่แล้วค่ะ เราเพิ่งจะเริ่มกันเองนะคะ ถ้ามาล้มเลิกตั้งแต่ตอนนี้ละก็..."
10018040-50 = "ขอบคุณทุกคนมากนะคะ แต่ว่าฉัน... ขอรับเอาไว้เพียงน้ำใจของทุกคนก็พอค่ะ"
10018040-51 = "ยิ่งกว่านั้น เหมือนว่าฉันจะทำให้ทุกคนลำบากกันมาก... จนไม่กล้าสู้หน้าทุกคนแล้วค่ะ"
10018040-52 = "[s] \"หายากนะที่ฮารุนะกับฟูกะจะมีความเห็นตรงกันแบบนี้น่ะ...\""
10018040-53 = "คุณครู? พูดอะไรกันน่ะคะ?"
10018040-54 = "เปล่านะ... ไม่เอาด้วยหรอก แบบนั้นฉันยอมตายดีกว่า"
10018040-55 = "แต่ว่าถ้ายังดึงดันต่อไปแบบนี้... จะต้องลำบากมากขึ้นนะคะ"
10018040-56 = "การต่อสู้กับธุรกิจขนาดใหญ่อย่างเนียวฟู้ดน่ะ ดูยังไงก็เป็นเรื่องที่เกินกำลังเกินไปค่ะ"
10018040-57 = "ตอนแรกฉันคิดว่าเป็นเพราะฉันเองที่ฝีมือไม่ดีพอ ถ้าได้รับความช่วยเหลือจากทุกคนละก็ทุกอย่างคง#nจะเป็นไปได้ด้วยดี..."
10018040-58 = "แต่ว่ามันกลับเจอแต่เรื่องที่รับมือได้ยากขึ้นเรื่อยๆ เลยน่ะค่ะ..."
10018040-60 = "แล้วร้านที่สืบทอดกันมารุ่นต่อรุ่นแบบนี้จะทำยังไงล่ะคะ?"
10018040-61 = "นั่นสิคะ คุณบอกเองนี่คะว่าไม่ว่ายังไงก็อยากรักษาร้านนี้เอาไว้น่ะค่ะ"
10018040-66 = "ถ้างั้น... การเข้าร่วมเป็นแฟรนไชส์ของเนียวฟู้ดอาจเป็นทางที่ดีที่สุดก็ได้นะคะ"
10018040-67 = "ถ้าทำอย่างนั้น อย่างน้อยก็อาจจะรักษาตึกนี้เอาไว้ก็ได้นะคะ"
10018040-68 = "ไม่หรอกค่ะ ไม่มีทางเป็นแบบนั้นแน่ค่ะ"
10018040-69 = "อาหารรสเลิศน่ะไม่ใช่แค่อาหาร แต่ยังรวมถึงสถานที่ บรรยากาศ ประวัติศาสตร์ สถานการณ์..."
10018040-70 = "เมื่อทุกอย่างรวมเข้าด้วยกันเป็นหนึ่ง ถึงจะเรียกว่าอาหารเลิศรสค่ะ"
10018040-71 = "ฉันไม่อยากให้ร้านซุซุเมะต้องเสียสิ่งเหล่านั้นไปค่ะ"
10018040-78 = "ฉันคิดว่ายังไม่ควรยอมแพ้นะคะ"
10018040-79 = "คะ...?"
10018040-83 = "ฉันเองก็ทำอาหารไม่เก่งค่ะ"
10018040-84 = "ไม่ว่าจะลงมือปรุงอาหารอะไรก็จะพังทุกอย่าง จนกลายเป็นอาหารที่ไม่อร่อย"
10018040-85 = "และพอเผลอทำพลาดไปนิดเดียว อาหารก็จะมีชีวิต และก็โบยบินออกไปโจมตีผู้คนด้วยค่ะ"
10018040-87 = "...แบบนั้นเรียกว่า \"พลาดนิดเดียว\" ได้ด้วยเหรอ? น่าจะเรียกปรากฏการณ์ประหลาดมากกว่ามั้ง?"
10018040-88 = "แต่ว่าฉันไม่ยอมแพ้หรอกค่ะ!"
10018040-89 = "ฉันยังมีรุ่นพี่ฟูกะอยู่ และก็ยังมีคุณครูคอยเป็นกำลังใจให้ ยิ่งไปกว่านั้น... ฉันไม่อยากยอมแพ้เรื่องการ#nทำอาหารด้วยค่ะ!"
10018040-90 = "ถึงฉันจะทำอาหารไม่เก่ง แต่ยังไง... การทำอาหารก็เป็นเรื่องน่าสนุกอยู่ดีค่ะ!"
10018040-92 = "การได้เอาอาหารที่ทำไปให้คนอื่นกิน... แค่คิดก็น่าสนุกแล้วนี่คะ?"
10018040-93 = "ถ้าล้มเลิกไปกลางคันละก็... ฉันคงทำอะไรไม่ได้แน่ๆ ค่ะ"
10018040-94 = "สักวันหนึ่งฉันน่ะ... จะต้องทำอาหารอร่อยๆ ออกมาให้ได้ค่ะ"
10018040-96 = "เพราะงั้นคุณเจ้าของร้านเอง... ก็อย่าเพิ่งยอมแพ้ไปแบบนี้เลยนะคะ"
10018040-97 = "ฉันรู้ดีว่าการพูดแบบนี้อาจเป็นการล้ำเส้นเกินไปค่ะ..."
10018040-98 = "ทุกคน..."
10018040-99 = "แต่ว่าจะทำยังไงดีล่ะคะ...?"
10018040-102 = "[s] \"อาหารที่ทำออกมาแล้ว น่าเสียดายออก\""
10018040-104 = "[ns] \"เพราะงั้นเอาไปให้คนอื่นๆ ลองชิมดูกันเถอะ\""
10018040-107 = "เป็นการโปรโมตผ่านการชิมสินะคะ"
10018040-108 = "จริงด้วยค่ะ พวกเราพยายามกันขนาดนี้แล้ว ต้องแสดงให้ทุกคนได้เห็นสิคะ"
10018040-109 = "ร้านซุซุเมะที่ถือกำเนิดใหม่... อาหารที่ทำขึ้นเพื่อพิสูจน์เรื่องนั้น... ฮุฮุฮุ"
10018040-110 = "ร้านอาหารที่ทำให้ลูกค้าพึงพอใจ ต้องยืนหยัดขึ้นได้อีกครั้งแน่นอนค่ะ มาร่วมมือกับพวกเราเถอะค่ะ!"
10018040-112 = "คือฉัน..."
10018040-117 = "ลองพยายามดูอีกสักครั้ง... คงไม่เป็นไรใช่มั้ยคะ?"
10018040-120 = "กำลังรอฟังคำนั้นอยู่เลยค่ะ"
10018040-121 = "ค่ะ! ไม่ว่าเรื่องไหน พวกเราจะช่วยคุณเองค่ะ! "
10018040-123 = "พวกเรายังไม่ได้เริ่มกันเลยนี่นะ"
10018040-124 = "!!"
10018040-128 = "[ns] \"ถ้างั้นเราก็มาเริ่มงานชิมอาหารกันเถอะ\""

[translation]
2300303-1 = "#title;에너지 드링크 중독"
2300303-2 = "#place;베리타스 해커 휴게실"
2300303-3 = "4;하레;01\n#4;greeting\n#wait;1000"
2300303-4 = "4;하레;01\n#4;greeting\n#wait;1500"
2300303-5 = "4;하레;02;아, 선생님. 왔구나.\n#4;em;[반응]"
2300303-6 = "4;하레;01;새로 개조한 드론의 제어 실험이 거의 다 끝나가고 있는지라…… #n미안. 조금만 더 기다려줘."
2300303-7 = "[s] 가져온 에너지드링크 캔을 건넨다."
2300303-8 = "4;하레;03;<요괴 MAX> 패션후르츠 맛이잖아? 마침 집중이 안 되던 참이었는데…… 고마워.\n#4;m3\n#4;em;[반응]"
2300303-9 = "#all;hide"
2300303-10 = "3;하레;99;하아…… <요괴 MAX>는 역시 패션 후르츠 맛이 최고야. #n다른 맛은 인공감미료 특유의 쓴 내가 나서 뒷맛이 안 좋거든.\n#3;stiff\n#3;em;[반짝]"
2300303-11 = "3;하레;06;오늘은 멀리서부터 에너지 드링크를 사다 달라고 부탁해서 미안해."
2300303-12 = "3;하레;99;아까도 말했지만 어제 오늘은 새 프로그램을 짜느라 정신없이 바빠서 에너지 드링크를 사러 나갈 틈도 없더라고.\n#3;em;…"
2300303-13 = "3;하레;02;밥은 먹었느냐고? 식사는 괜찮아. 일하는 동안 틈틈이 에너지 드링크를 마셨거든.\n#3;em;[반응]"
2300303-14 = "3;하레;01;<요괴 MAX>에는 잠을 깨우는 데 도움이 되는 카페인 뿐만 아니라, 기력을 낼 수 있도록 도와주는 당분과 비타민이 충분히 포함되어 있어서 괜찮아."
2300303-15 = "3;하레;03;이거 한 캔이면 밤샘 작업도 문제없다고!\n#3;jump\n#3;em;[반짝]"
2300303-16 = "[s] 오늘 하루 동안 에너지 드링크를 얼마나 마셨는지 묻는다."
2300303-17 = "3;하레;02;그다지 많이 마시지는 않았어. 네 캔 정도……?\n#3;em;[반응]"
2300303-18 = "3;하레;99;평소에 비하면 오히려 적게 마신 편이지. 많이 마실 때는 열 캔을 마실 때도 있으니까."
2300303-19 = "3;하레;02;……뭐어? 에너지 드링크는 몸에 나쁘니까 이제 그만 마시라고?\n#3;em;[?!]\n#3;shake"
2300303-20 = "3;하레;06;하지만 에너지 드링크 없이 밤샘 작업을 하면 졸음이 쏟아지는 데다가, 달콤한 탄산 음료가 없으면 일할 의욕이 나지 않는걸…….\n#3;em;…"
2300303-21 = "3;하레;99;으음……."
2300303-22 = "3;하레;06;선생님이 그렇게 부탁한다면 어쩔 수 없지."
2300303-23 = "3;하레;03;알겠어. 이 기회에 한 번 끊어볼게.\n#3;greeting\n#3;em;[반짝]"
2300303-24 = "3;하레;01;뭐, 졸음을 쫓는 물건이라면 비타민 정제도 있고, 민트 껌도 있으니까."
2300303-25 = "3;하레;02;대신 밤 늦게까지 혼자 작업하는 건 어려울 테니까…… 선생님이 나를 좀 도와줄래?\n#3;em;[?]"
2300303-26 = "3;하레;03;그렇게 어려운 일은 없으니까 걱정 마."
2300303-27 = "3;하레;01;우선은 그 쪽에 있는 공구상자를 이쪽으로 옮긴 다음에…….\n#3;m2"
2300303-28 = "#all;hide"
2300303-29 = "#na;다음날, 아침."
2300303-30 = "3;하레;04;하아암…….\n#3;a\n#3;em;[속상함]\n#3;stiff"
2300303-31 = "[s] \"좋은 아침이야, 하레.\""
2300303-32 = "3;하레;04;좋은 아침, 선생님……."
2300303-33 = "3;하레;02;어젯밤에는 어쩐지 잠이 도통 오질 않아서…… 침대 위에서 한참을 뒤척거리다가 새벽이 되어서야 잠에 들었어."
2300303-34 = "3;하레;04;어쩐지 나른하고 자꾸 피로가 몰려오는 게…… 카페인 금단 현상이려나.\n#3;em;[땀]"
2300303-35 = "3;하레;06;이럴 때는 <요괴 MAX> 한 캔이면 개운하게 털어낼 수 있는데."
2300303-36 = "3;하레;02;하지만 당분간은 에너지 드링크를 끊어야 하니까…… 조금만 더 힘내볼게."
2300303-37 = "3;하레;03;고작 음료수 한 캔을 참는 것 뿐이잖아? 그렇게 어려운 일도 아니라고.\n#3;greeting\n#3;em;[음표]"
2300303-38 = "#all;hide"
2300303-39 = "#na;그 이튿날, 아침."
2300303-40 = "3;하레;04;………….\n#3;em;…\n#3;a"
2300303-41 = "[s1] \"괜찮아?\"\n[s2] \"표정이 어두워.\""
2300303-42 = "3;하레;04;머리도 아프고, 몸도 무겁고, 구역질도 나고…… 잠을 충분히 잤는데도 피로가 완전히 가시질 않아서…… 금방이라도 기절할 것만 같아.\n#3;em;[속상함]\n#3;stiff"
2300303-43 = "3;하레;04;머리도 아프고, 몸도 무겁고, 구역질도 나고…… 잠을 충분히 잤는데도 피로가 완전히 가시질 않아서…… 금방이라도 기절할 것만 같아.\n#3;em;[속상함]\n#3;stiff"
2300303-44 = "3;하레;04;역시 카페인 금단 현상이겠지……."
2300303-45 = "3;하레;04;내 자신이 이렇게 카페인에 중독되어 있었을 줄이야…… 새삼 과거의 내가 원망스럽네."
2300303-46 = "3;하레;06;저, 선생님. 에너지 드링크, 딱 한 모금만 마시면 안 될까?\n#3;em;[반응]"
2300303-47 = "3;하레;06;딱 한 모금만 마시면 기운이 날 것 같은데……."
2300303-48 = "3;하레;04;……역시 안 되겠지?\n#3;em;[땀]"
2300303-49 = "[s] \"지금 에너지 드링크를 마시면 어제의 노력이 수포로 돌아갈 거야.\""
2300303-50 = "3;하레;04;알았어, 알았어. 오늘은 다른 걸로 참아볼게.\n#3;greeting"
2300303-51 = "3;하레;06;민트 껌을 어디에 놔뒀더라…….\n#3;m4"
2300303-52 = "#all;hide"
2300303-53 = "#na;그리고 그다음 날, 아침."
2300303-54 = "#all;hide"
2300303-55 = "1;하레;04\n#1;ar\n#wait;1500"
2300303-56 = "1;하레;04\n#1;m2\n#wait;1000"
2300303-57 = "1;하레;04\n#1;stiff\n#wait;1000"
2300303-58 = "1;하레;04\n#1;m3\n#wait;1500"
2300303-59 = "1;하레;04;안 돼…… 더는 못 버티겠어……. #n카페인…… 카페인이 부족해…….\n#1;em;…"
2300303-60 = "1;하레;04;선생님…… 이제 한계니까…… 빨리 드링크를 마시게 해줘……. \n#1;em;[속상함]\n#1;stiff"
2300303-61 = "[s3] 에너지 드링크를 건네준다.\n[s4] 거절한다."
2300303-62 = "#wait;100"
2300303-63 = "#1;hide\n3;하레;05;선생님이 안 된다고 해도…… 더는 못 참아!\n#3;closeup\n#3;em;[!]"
2300303-64 = "#all;hide"
2300303-65 = "3;하레;99;크으…… 시원해…… 맛있어…….\n#3;stiff\n#3;em;[하트]"
2300303-66 = "3;하레;04;사흘만에 맛보는 에너지 드링크의 맛이 몸 속에 스며들어서…… 녹아버릴 것 같아…….\n#3;em;[반짝]"
2300303-67 = "3;하레;04;역시 에너지 드링크 없이 사흘을 버티는 건 애초에 무리였어…….\n#3;em;[땀]"
2300303-68 = "[s] \"그럼 오늘은 이걸로 만족하고 다시 끊는 거야?\""
2300303-69 = "3;하레;05;아니…… 앞으로는 못 끊어. 이 맛은 절대로 포기 못해!\n#3;em;[!]\n#3;stiff"
2300303-70 = "3;하레;05;설령 카페인 중독으로 죽는 한이 있더라도…… 에너지 드링크를 끊는 일은 앞으로 절대 없을 테니까!\n#3;hophop\n#3;closeup"

[translation]
2300303-1 = "ติดเครื่องดื่มชูกำลัง"
2300303-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
2300303-5 = "อ่า มาแล้วสินะคุณครู"
2300303-6 = "อีกไม่นานฉันก็จะทดสอบการควบคุมของโดรนที่ปรับแต่งเสร็จเรียบร้อยแล้ว...#nโทษที คุณครูช่วยรอก่อนนะ"
2300303-7 = "[s] (ส่งเครื่องดื่มชูกำลังที่เอามาด้วยให้)"
2300303-8 = "นี่มันมอนสเตอร์แม็กซ์รสเสาวรสใช่มั้ย? กำลังไม่มีสมาธิอยู่พอดีเลย... ขอบคุณนะ"
2300303-10 = "อ่า... มอนสเตอร์แม็กซ์รสเสาวรสน่ะอร่อยที่สุดเลยละ รสอื่นๆ จะมีรสขมจากสารให้ความหวาน#nติดปากอยู่"
2300303-11 = "ขอโทษนะที่ทำให้ต้องไปตั้งไกลเพื่อซื้อเครื่องดื่มชูกำลังมาให้ฉัน"
2300303-12 = "อย่างที่บอก ช่วงไม่กี่วันมานี้ฉันกำลังยุ่งอยู่กับโปรเจกต์ใหม่ จนไม่มีเวลาออกไปซื้อเครื่องดื่ม#nชูกำลังเองเลย"
2300303-13 = "ฉันได้กินข้าวบ้างหรือเปล่าน่ะเหรอ? ไม่ต้องห่วง ฉันเตรียมเครื่องดื่มชูกำลังไว้เต็มที่เลยใน#nตอนที่ทำงาน"
2300303-14 = "มอนสเตอร์แม็กซ์ไม่ได้มีแค่คาเฟอีนที่ทำให้ฉันตื่น แต่ยังเต็มไปด้วยน้ำตาลและวิตามินที่ให้#nพลังงานกับฉันด้วย"
2300303-15 = "แค่ดื่มอันนี้กระป๋องเดียว ฉันก็อยู่ได้ทั้งคืนแล้วละ!"
2300303-16 = "[s] ถามว่าวันนี้ดื่มเครื่องดื่มชูกำลังไปกี่กระป๋องแล้ว"
2300303-17 = "ก็ไม่มากเท่าไหร่ ประมาณสี่กระป๋องหรือเปล่านะ...?"
2300303-18 = "ความจริงฉันดื่มน้อยกว่าปกติ ถ้าเป็นช่วงงานหนักล่ะก็ฉันดื่มได้เป็นสิบกระป๋องเลย"
2300303-19 = "หืม...? เครื่องดื่มชูกำลังไม่ดีต่อสุขภาพ ฉันจึงควรหยุดดื่มงั้นเหรอ?"
2300303-20 = "แต่ฉันจะอยู่ทำงานทั้งคืนไม่ได้ถ้าไม่ดื่มมัน อีกอย่างถ้าไม่มีน้ำตาลจากน้ำอัดลม ฉันก็ไม่มีแรง#nจะทำงานเลย..."
2300303-21 = "อืม..."
2300303-22 = "ถ้าคุณครูพูดแบบนั้น ฉันว่าก็คงไม่มีทางเลือก"
2300303-23 = "เข้าใจแล้ว ฉันจะลองหยุดดื่มเครื่องดื่มชูกำลังดูก็ได้"
2300303-24 = "ฉันค่อยกินวิตามินอัดเม็ดหรือเคี้ยวหมากฝรั่งรสมินต์ก็ได้ถ้าฉันไม่อยากให้ตัวเองง่วง"
2300303-25 = "แต่การทำงานดึกๆ แบบนี้คนเดียวมันก็ยากเหมือนกันนะ... คุณครูช่วยอะไรฉันหน่อยได้มั้ย?"
2300303-26 = "ไม่ต้องห่วง ครั้งนี้ไม่ต้องใช้แรงอะไรมากมายหรอกนะ"
2300303-27 = "อย่างแรก ช่วยเลื่อนกล่องเครื่องมือทางนั้นหน่อย..."
2300303-29 = "เช้าวันต่อมา..."
2300303-30 = "หาววว...."
2300303-31 = "[s] \"อรุณสวัสดิ์ ฮาเระ\""
2300303-32 = "อรุณสวัสดิ์ คุณครู..."
2300303-33 = "เมื่อคืนฉันนอนไม่หลับเลย... ฉันนอนพลิกตัวไปมาตั้งนาน แล้วก็มาหลับเอาตอนที่เกือบจะสว่าง"
2300303-34 = "ฉันง่วงนอนมากเลย... นี่เป็นผลของการงดคาเฟอีนหรือเปล่านะ?"
2300303-35 = "ในเวลาแบบนี้ แค่มอนสเตอร์แม็กซ์กระป๋องเดียวก็จะทำให้ตื่นเลยนะ"
2300303-36 = "แต่ในเมื่อฉันกำลังงดเครื่องดื่มชูกำลังอยู่...ฉันจะลองทนดูอีกหน่อย"
2300303-37 = "มันก็แค่โซดากระป๋อง... ถ้าจะเลิกก็คงไม่มีปัญหาอะไร"
2300303-39 = "เช้าวันต่อมา..."
2300303-40 = "..."
2300303-41 = "[s1] \"เป็นอะไรหรือเปล่า?\"\n[s2] \"สีหน้าไม่ดีเท่าไรเลย\""
2300303-42 = "ฉันรู้สึกปวดหัว ไม่มีแรง และก็คลื่นไส้... ถึงนอนพอแล้วแต่ยังรู้สึกเหนื่อยอยู่...#nฉันเหมือนจะเป็นลมได้ตลอดเวลาเลย"
2300303-43 = "ฉันรู้สึกปวดหัว ไม่มีแรง และก็คลื่นไส้... ถึงนอนพอแล้วแต่ยังรู้สึกเหนื่อยอยู่...#nฉันเหมือนจะเป็นลมได้ตลอดเวลาเลย"
2300303-44 = "มันต้องเป็นผลจากการงดคาเฟอีน..."
2300303-45 = "น่าตกใจจริงๆ ที่ร่างกายฉันต้องพึ่งคาเฟอีนมากขนาดนี้... คงต้องโทษตัวฉันคนก่อนหน้านี้แล้วละ"
2300303-46 = "คะ... คุณครู ขอจิบเครื่องดื่มชูกำลังสักหน่อยได้มั้ย?"
2300303-47 = "ถ้าฉันได้จิบนิดนึงก็คงทำให้กลับมามีชีวิตชีวาได้..."
2300303-48 = "...มันไม่ใช่ความคิดที่ดีใช่มั้ย?"
2300303-49 = "[s] \"ถ้าดื่มเครื่องดื่มชูกำลังตอนนี้ ทั้งหมดที่เธอทำมาตั้งแต่เมื่อวานจะสูญเปล่า\""
2300303-50 = "ก็ได้ ก็ได้ ฉันจะหาอะไรมาเบี่ยงเบนความสนใจของฉันก่อน"
2300303-51 = "วางหมากฝรั่งรสมินต์ไว้ที่ไหนแล้วนะ..."
2300303-53 = "เช้าวันต่อมา..."
2300303-59 = "ไม่ไหวแล้ว... ฉันทนอีกต่อไปไม่ได้แล้ว... ฉัน... ต้อง... การ... คาเฟอีน..."
2300303-60 = "คุณครู มันถึงลิมิตของฉันแล้ว... ฉันต้องการเครื่องดื่มชูกำลัง..."
2300303-61 = "[s3] (ให้เครื่องดื่มชูกำลัง)\n[s4] (ปฏิเสธ)"
2300303-63 = "ไม่ว่าครูจะพูดยังไง... ฉันจะไม่ทนอีกต่อไปแล้ว!"
2300303-65 = "อึ่ก... ชื่นใจจัง... อร่อย..."
2300303-66 = "ร่างกายที่ได้รับรสของเครื่องดื่มชูกำลังที่ไม่ได้ลิ้มรสมาสามวัน... มันเหมือนจะละลายเลย..."
2300303-67 = "นึกแล้วว่าเป็นไปไม่ได้เลยที่จะงดเครื่องดื่มชูกำลังติดต่อกัน 3 วัน..."
2300303-68 = "[s] \"ถ้าวันนี้พอใจแล้วอยากจะงดเครื่องดื่มชูกำลังอีกมั้ย?\""
2300303-69 = "ไม่เอา... ฉันจะไม่งดดื่มอีกแล้ว ฉันคงอยู่ไม่ได้ถ้าไม่มีรสชาติที่แสนอร่อยแบบนี้!"
2300303-70 = "ต่อให้จะต้องติดคาเฟอีนตายก็เถอะ... แต่จากนี้ไปฉันจะไม่เลิกดื่มเครื่องดื่มชูกำลังแน่ๆ!"

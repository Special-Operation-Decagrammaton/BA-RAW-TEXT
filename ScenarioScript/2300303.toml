[translation]
2300303-1 = "Energy Drink Addiction"
2300303-2 = "Veritas Hacker's Lounge"
2300303-5 = "Ah, there you are, Sensei."
2300303-6 = "I'm almost done testing out the modified drone's controls... Sorry. Just give me another moment."
2300303-7 = "[s] (Hand her the energy drink you brought.)"
2300303-8 = "Isn't this the passion fruit-flavored Frenzy MAX? I was having a difficult time focusing. Thanks."
2300303-10 = "Haha... Passion fruit is the best flavor of Frenzy MAX for sure. The other ones have this nasty, bitter aftertaste from the artificial sweetener."
2300303-11 = "Sorry to make you go so far out of your way to get an energy drink for me."
2300303-12 = "As I said before, I've been too busy working on a new program these past couple days to go out and buy energy drinks for myself."
2300303-13 = "Have I eaten? Don't worry, I made sure to have plenty of energy drinks handy while working."
2300303-14 = "I'm fine. Frenzy MAX not only has caffeine to keep me awake, but also plenty of sugar and vitamins to give me energy."
2300303-15 = "I can pull an all-nighter with just one of these bad boys!"
2300303-16 = "[s] Ask her how many cans of energy drink she's had today."
2300303-17 = "Not that many. Four, I think?"
2300303-18 = "I'm actually drinking less than usual. I can drink up to ten cans when I'm going hard."
2300303-19 = "Are you suggesting energy drinks are bad for my health, so I should stop drinking them?"
2300303-20 = "But I can't stay awake all night long without them. Plus, I'm just not motivated to work without the sugar I get from soft drinks..."
2300303-21 = "Hmm..."
2300303-22 = "Since it's you, Sensei, I guess I don't have any other choice."
2300303-23 = "Okay. I'll quit drinking energy drinks."
2300303-24 = "I can eat vitamin tablets or chew mint gum if I need to stay awake."
2300303-25 = "It's difficult to work all by myself late at night, though... Can you help me, Sensei?"
2300303-26 = "Don't worry, it's nothing too strenuous this time."
2300303-27 = "First, move the toolbox over there..."
2300303-29 = "The next morning..."
2300303-30 = "*yawn*"
2300303-31 = "[s] \"Good morning, Hare.\""
2300303-32 = "Morning, Sensei..."
2300303-33 = "I just couldn't fall asleep last night for some reason... I was only able to fall asleep at the crack of dawn, after tossing and turning in bed for a long time."
2300303-34 = "I'm feeling so drowsy... Is this caffeine withdrawal?"
2300303-35 = "Just one can of Frenzy MAX will shake this feeling off. I'm telling you."
2300303-36 = "But since I'm cutting off my energy drink intake for a while...I'll endure."
2300303-37 = "It's just a can of soda... I should have no problem giving it up."
2300303-39 = "The next morning..."
2300303-40 = "..."
2300303-41 = "[s1] \"You all right?\"\n[s2] \"You don't look so good.\""
2300303-42 = "My head hurts, my body feels heavy, and my stomach feels gross... I'm still tired, even after getting enough sleep... I could collapse at any moment."
2300303-43 = "My head hurts, my body feels heavy, and my stomach feels gross... I'm still tired, even after getting enough sleep... I could collapse at any moment."
2300303-44 = "It must be caffeine withdrawal..."
2300303-45 = "I'm shocked to realize how much my body depended on caffeine... I blame my old self."
2300303-46 = "Hey, Sensei. Can I just have a sip of an energy drink?"
2300303-47 = "I think I'll come right back to life if I have just a sip..."
2300303-48 = "You wouldn't hold out on me, would you?"
2300303-49 = "[s] \"You can't give in now, can you?\""
2300303-50 = "Fine, fine. I'll just distract myself with something else."
2300303-51 = "Now, where did I put my mint gum..."
2300303-53 = "The next morning..."
2300303-59 = "It's no good... I can't take it anymore... Need...more...caffeine..."
2300303-60 = "I'm at my limit, Sensei... I need an energy drink now... "
2300303-61 = "[s3] (Give her the energy drink.)\n[s4] (Refuse.)"
2300303-63 = "No matter what you say... I just can't bear it anymore!"
2300303-65 = "Ahhh. It's so refreshing...and tasty."
2300303-66 = "Finally, an energy drink after three long days of abstinence... My body's gonna melt..."
2300303-67 = "I knew it would be impossible to go three days without an energy drink."
2300303-68 = "[s] \"Had enough for your cheat day? Are you going to quit energy drinks again?\""
2300303-69 = "Nope! I won't quit again. I can't live without that tasty flavor!"
2300303-70 = "Even if caffeine addiction is the end of me... Give me energy drinks or give me death!"

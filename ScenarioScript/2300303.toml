[translation]
2300303-1 = "能量飲中毒"
2300303-2 = "貝里塔斯．駭客休息室"
2300303-5 = "啊，老師。你來了啊。"
2300303-6 = "新改裝的無人機操縱測試快結束了……#n抱歉，再等我一下。"
2300303-7 = "[s] 遞出帶來的能量飲料"
2300303-8 = "啊，「妖怪MAX」百香果口味。我正好專注力有些下滑了……謝謝。"
2300303-10 = "哈啊…… 「妖怪MAX」果然還是百香果口味最棒了。#n其他口味都有人工香料的苦味，會留在喉嚨……"
2300303-11 = "謝謝老師特地買來給我。"
2300303-12 = "我從昨天開始就一直忙著編寫新程式，連出門買東西的時間都沒有。"
2300303-13 = "你問我吃飯沒？沒問題，抽空喝能量飲料就好了。"
2300303-14 = "「妖怪MAX」不只含有能提神醒腦的咖啡因，還有豐富糖分與維他命，能補充元氣。"
2300303-15 = "只要有這一罐，熬夜工作一整晚都沒有問題！"
2300303-16 = "[s] 問今天一整天喝了多少能量飲料"
2300303-17 = "也沒喝很多啦。大概四罐左右……？"
2300303-18 = "跟平常比起來算少了。多的時候甚至會喝到十罐。"
2300303-19 = "……嗯？你說能量飲料喝太多對身體不好，要我盡量別喝了？"
2300303-20 = "但是不喝能量飲料，熬夜工作的時候就會很想睡，不喝些甜甜的碳酸飲料，也不會有動力工作……"
2300303-21 = "唔嗯……"
2300303-22 = "既然老師都這樣說，那就沒辦法了。"
2300303-23 = "我知道了，就藉這個機會試著戒一次看看吧。"
2300303-24 = "反正，要驅趕睡意還能靠保健食品，不然也有薄荷口香糖。"
2300303-25 = "但這麼一來會很難一個人工作到半夜，所以相對的……老師，你來幫我吧？"
2300303-26 = "不會叫你做太難的工作的，不用擔心。"
2300303-27 = "首先，把那邊的工具箱搬到這裡。然後……"
2300303-29 = "（隔天的早上）"
2300303-30 = "呼啊……"
2300303-31 = "[s]「早啊，晴。」"
2300303-32 = "老師早安……"
2300303-33 = "我昨天完全睡不著……在床上翻了好一陣子，一直快到天亮才好不容易睡著。"
2300303-34 = "現在不知為何全身無力，一直覺得很疲勞……這是咖啡因的戒斷症狀嗎。"
2300303-35 = "這種時候如果有一罐「妖怪MAX」，馬上就能回復精力了……"
2300303-36 = "沒事，我已經決定要暫時戒掉能量飲料……我會再多努力。"
2300303-37 = "不過是忍住不喝一種飲料，這種事又沒多難。"
2300303-39 = "（再隔天的早上）"
2300303-40 = "…………"
2300303-41 = "[s1]「還好嗎？」\n[s2]「你看起來很不舒服……」"
2300303-42 = "頭好痛，身體好沉重，而且還好想吐……明明有充分睡眠，但還是沒有消除疲勞……感覺隨時都會暈倒。"
2300303-43 = "頭好痛，身體好沉重，而且還好想吐……明明有充分睡眠，但還是沒有消除疲勞……感覺隨時都會暈倒。"
2300303-44 = "這果然是咖啡因戒斷症狀吧……"
2300303-45 = "沒想到我會咖啡因中毒到這種程度……我好恨過去的自己。"
2300303-46 = "老師，那個……能讓我喝一口能量飲料嗎？"
2300303-47 = "我感覺只要喝一口，精神就會變好了……"
2300303-48 = "……果然還是不行啊？"
2300303-49 = "[s]「如果現在喝能量飲料，昨天的努力就白費了。」"
2300303-50 = "……知道了啦。今天就用其他的方法忍耐看看吧。"
2300303-51 = "我把薄荷口香糖放哪去了……"
2300303-53 = "（再隔一天的早上）"
2300303-59 = "不行……我撐不住了……#n咖啡因……咖啡因不足……"
2300303-60 = "老師……我已經到極限了……快給我能量飲料…… "
2300303-61 = "[s3] 遞出能量飲料\n[s4] 拒絕"
2300303-63 = "就算老師說不行……我也忍不下去了！"
2300303-65 = "呼……好清涼……好好喝……"
2300303-66 = "久違的能量飲料，滲透到身體的每個角落……我要融化了……"
2300303-67 = "果然要忍住不喝能量飲料3天，根本不可能……"
2300303-68 = "[s]「那麼今天也喝足了，要再戒看看嗎？」"
2300303-69 = "不……以後都不戒了。我果然還是無法放棄這個味道！"
2300303-70 = "就算我會因為咖啡因中毒而死……以後我也絕對不戒能量飲料！"

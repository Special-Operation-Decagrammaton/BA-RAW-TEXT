[translation]
1600603-1 = "วัตถุดิบลับของเด็กสาว"
1600603-3 = "[ns1] \"งั้นอิซุมิจะไปไหนเหรอ?\"\n[ns2] \"ที่นี่ไม่ใช่ชายทะเลสักหน่อย?\""
1600603-4 = "อืมมม..."
1600603-5 = "อืมมม..."
1600603-6 = "ของอร่อยไม่จำเป็นต้องไปกินที่ทะเลอย่างเดียวหรอกนะคุณครู"
1600603-7 = "เพราะตามที่ฉันค้นคว้ามา ที่นี่ก็มีร้านเด็ดอยู่ด้วยเหมือนกัน"
1600603-8 = "[s] \"ข้อมูลนั่นเชื่อถือได้เหรอ?\""
1600603-9 = "แต่คุณยายที่มาเที่ยวทะเลบอกฉันไว้เลยนะ?"
1600603-10 = "คุณยายบอกฉันว่า \"ยัยหนูดูเกิดมาเพื่อกินโดยแท้ ลองกินขนมเซ็มเบ้นี่ดูหน่อยไหม?\""
1600603-11 = "ฉันก็เลยรับขนมมากินทันที คุณครูรู้ไหมว่ามันเป็นเซ็มเบ้กุ้งที่อร่อยมากเลยละ...! (กลืนน้ำลาย)"
1600603-12 = "[s] \"ชักจะตอบออกทะเลแล้วนะ\""
1600603-13 = "เอ๋?!"
1600603-14 = "อ๊ะ! (กลืนน้ำลาย) ตะ... แต่ก็เอาเถอะ นั่นไม่ใช่เรื่องสำคัญหรอก"
1600603-15 = "ถ้าผ่านถนนเส้นนี้ไป เราจะได้เจอกับร้านบะหมี่เย็นตำรับจีนที่เป็นอาหารท้องถิ่นที่มีชื่อเสียงของที่นี่!"
1600603-16 = "และนั่นคือสิ่งที่เราจะมากินกันวันนี้!"
1600603-20 = "ต้องเป็นที่นี่แน่เลย!"
1600603-21 = "ร้านบะหมี่เย็นตำรับจีน อาหารจานเด็ดของฤดูร้อน!"
1600603-22 = "[s] \"หืม? แต่ว่า...\""
1600603-25 = "ไหนบอกว่าเป็นอาหารท้องถิ่นที่มีชื่อเสียง แต่ทำไมไม่มีลูกค้าเลยล่ะ?"
1600603-26 = "เอ๋?! ร้านเจ๊งไปแล้วเหรอเนี่ย?! เป็นแบบนี้ไม่ได้นะ!"
1600603-27 = "ฉันอุตส่าห์เดินตามถนนในวันที่แดดเปรี้ยงมาถึง 30 นาทีเลยนะ!"
1600603-28 = "จ่ายค่าเหนื่อยมาเลย!"
1600603-29 = "[s] \"อิซุมินี่... ไม่มีความปรานีเลยนะ\""
1600603-30 = "ระ... ร้านยังไม่เจ๊งหรอกหนู!"
1600603-31 = "แต่เป็นเพราะร้านริมทะเลที่เปิดใหม่ที่ชายทะเลน่ะ..."
1600603-32 = "พอถึงฤดูร้อน ลูกค้าก็แห่ไปกินที่ร้านของแชมป์นักตักทรายกันหมด..."
1600603-33 = "ยะ...ยังไม่เจ๊งใช่ไหม?"
1600603-34 = "งั้นดีเลย งั้นเราเอาบะหมี่เย็น 2 ที่นะลุง! "
1600603-35 = "[s] \"ปณิธานเต็มเปี่ยมเหมือนเดิมเลยนะเรา\""
1600603-37 = "มาแล้ว บะหมี่เย็นตำรับจีน 2 ที่! เชิญทานให้อร่อยเลยคร้าบบ!"
1600603-39 = "ว้าวว เครื่องเคียงหลากสีจัง น่าอร่อย!"
1600603-40 = "งั้นขอลองเลยนะ"
1600603-45 = "[ns] \"เป็นไงบ้าง?\""
1600603-46 = "อืมม ก็อร่อยอยู่หรอกนะ แต่เหมือนมีบางอย่างขาดหายไป"
1600603-47 = "อืมมมม!! อ๊ะ! ใช่แล้ว! ลองใส่นี่ดูหน่อยดีกว่า"
1600603-49 = "[s] \"อิซุมิ...? ใส่อะไรลงไปน่ะ?\""
1600603-50 = "อันนี้เหรอ? ก็เนยถั่วที่ฉันทำเองไงล่ะ"
1600603-51 = "ใส่เนยถั่วไปในบะหมี่เย็นตำรับจีน แล้วก็คนๆๆ ให้เข้ากัน... เป็นอันเสร็จ!"
1600603-52 = "คราวนี้ต้องอร่อยแน่ ฉันมั่นใจ! คุณครูเองก็จะลองกินดูด้วยไหมล่ะ?"
1600603-53 = "[s3] \"เนยถั่วที่อิซุมิทำเอง...\"\n[s4] \"ในบะหมี่เย็นตำรับจีนน่ะเหรอ…?!\""
1600603-60 = "อ้าปากสิคุณครู อ้ามมม"
1600603-61 = "(หลับตาปี๋!)"
1600603-62 = "(หลับตาปี๋แล้วชิมบะหมี่เย็นตำรับจีนสูตรของอิซุมิ)"
1600603-63 = "(ง่ำๆ)"
1600603-64 = "(กลืน)"
1600603-67 = "(น้ำซุปบะหมี่เย็นที่อมเปรี้ยวกับความหวานและข้นของเนยถั่ว... การพบกันของรสชาตินี้มัน...!)"
1600603-68 = "[s] \"อะ...อร่อย...? ได้ยังไงกัน?\""
1600603-69 = "อร่อยใช่ไหมล่ะ?! ว่าแล้วว่าต้องเข้ากัน!"
1600603-70 = "ฉันต้องกินบ้างแล้ว! ง่ำ!"
1600603-73 = "อื้ม! อร่อยเด็ดดวง! บะหมี่ร้านนี้อร่อยสุดๆ ไปเลยล่ะคุณครู!"
1600603-74 = "[s] \"อืม... จริงเหรอ...??\""
1600603-77 = "(วันต่อมา)"
1600603-78 = "เอ๋?! อะไรกันเนี่ย?! ทำไมคนถึงเยอะแบบนี้ล่ะ?!"
1600603-79 = "[s] \"เมื่อวานยังไม่มีลูกค้าเข้าร้านอยู่เลย...\""
1600603-80 = "อะไรกัน ว่าจะมากินเมนูอื่นนอกจากบะหมี่เย็นตำรับจีนสักหน่อย!"
1600603-81 = "แบบนี้ก็ไม่มีที่นั่งให้คู่หูตะลุยร้านเด็ดหน้าร้อนน่ะสิ! เอาไงดีล่ะคุณครู?!"
1600603-82 = "[s] \"ยังใช้ชื่อนี้อยู่อีกเหรอเนี่ย?\""
1600603-83 = "อืมมม แบบนี้ก็คงไม่มีทางเลือกอื่น ต้องไปที่อื่นแล้วล่ะ"
1600603-84 = "คุณยายคนนั้นก็แนะนำร้านอร่อยๆ ไว้อีกร้านเหมือนกัน!"
1600603-85 = "แบบนี้มันก็น่าเสียดายอยู่ แต่ก็คงต้องไปร้านนั้น ไปกันเถอะ!"
1600603-87 = "[ns] \"ที่นี่มัน?\""
1600603-88 = "ร้านข้าวหน้าปลาไหลร้านดัง... เขาบอกกันมาแบบนั้นน่ะ"
1600603-89 = "แต่ที่นี่ก็ไม่มีลูกค้าเหมือนกันแฮะ"
1600603-90 = "เฮือก?! อย่าบอกนะว่าเจ๊งไปแล้ว?!"
1600603-91 = "ไม่ใช่อย่างนั้นใช่ไหม? ยังขายอยู่ใช่ไหม?!"
1600603-92 = "ใช่แล้วครับคุณลูกค้า!"
1600603-93 = "แต่ที่ไม่มีลูกค้าเพราะคนแห่ไปกินร้านแชมป์ตักทรายกันหมด แถมจู่ๆ ร้านราเม็งข้างทางก็มี#nลูกค้าแน่นตั้งแต่เช้านี้อีก..."
1600603-95 = "ยังไม่เจ๊งก็ดีแล้วล่ะลุง!"
1600603-96 = "งั้นฉันขอข้าวหน้าปลาไหล 2 ที่!"
1600603-98 = "ข้าวหน้าปลาไหล 2 ที่ มาเสิร์ฟแล้วคร้าบบ!"
1600603-100 = "ดีเลย! งั้นมาลองชิมกันหน่อย~"
1600603-105 = "อืมมมม...."
1600603-106 = "อืมมม หืมม?"
1600603-107 = "[s] \"เป็นอะไรไปอีกน่ะอิซุมิ?\""
1600603-108 = "คือว่า... ข้าวหน้าปลาไหลนี้มันก็รสชาติดีอยู่นะคุณครู รสชาติดีอยู่..."
1600603-109 = "ดีอยู่ที่แปลว่า..."
1600603-110 = "[s] \"ยังขาดอะไรไปงั้นเหรอ?\""
1600603-111 = "อื้ม! ใช่! คุณครูรู้ใจฉันได้ยังไงน่ะ?!"
1600603-112 = "มันมีอะไรที่ยังขาดไปอยู่เรื่อยเลย อืมม..."
1600603-117 = "[ns] \"อีกแล้วเหรอ?\""
1600603-118 = "อื้ม! เวลาแบบนี้ต้องเอาเนยถั่วที่เตรียมไว้ออกมา! "
1600603-123 = "ง่ำๆๆๆ"
1600603-124 = "ฮื้มม อร่อยจัง!"
1600603-125 = "คุณครูก็ลองชิมดูด้วยเอามั้ย?"
1600603-126 = "[s] \"อร่อยจริงนะ?\""
1600603-131 = "อ้าปากสิครู อ้ามมม ฉันจะป้อนให้เอง!"
1600603-134 = "(การผสมผสานของรสหวานที่กลมกล่อมจากปลาไหลที่ใส่เข้าไปเต็มปากกับรสจางๆ ของเนยถั่ว)"
1600603-135 = "(ข้าวหน้าปลาไหลที่พัฒนาไปอีกขั้น!)"
1600603-136 = "ว่าไง? อร่อยใช่ไหมล่ะ? ก็บอกแล้วว่าเนยถั่วน่ะกินกับอะไรก็อร่อย "
1600603-137 = "ว่ากันว่าถ้าทำขนมปังที่ทาเนยถั่วตกพื้น ด้านที่เป็นเนยถั่วจะคว่ำหน้าโดนพื้นก่อนอยู่เรื่อย"
1600603-138 = "เจ้าเนยถั่วนี่มันต๊าชมาก!"
1600603-139 = "[s5] \"ตะ... ต๊าชเหรอ...?\"\n[s6] \"แต่ทำไมมันถึงอร่อยได้นะ...?\""
1600603-140 = "เห็นอย่างนี้ ฉันก็เป็นสมาชิกชมรมชิมอาหารนะ~"
1600603-141 = "เห็นอย่างนี้ ฉันก็เป็นสมาชิกชมรมชิมอาหารนะ~"
1600603-142 = "คนที่มุ่งมั่นในการชิมอาหารรสเลิศอยู่ตลอด ต้องมีความรู้พื้นฐานพวกนี้อยู่แล้วน่า!"
1600603-143 = "(อิซุมิกินข้าวหน้าปลาไหลอย่างเอร็ดอร่อย ส่วนคุณครูก็มีคำถามมากมายในใจเป็นหมื่นล้านคำ...)"
1600603-146 = "(วันต่อมาร้านข้าวหน้าปลาไหลก็มีลูกค้าแห่เข้ามาอย่างเนืองแน่นโดยไม่ทราบสาเหตุ)"
1600603-147 = "เอ๋?!  ทำไมคนมาเยอะอีกแล้วล่ะ?!"
1600603-148 = "เมื่อวานร้านเงียบจนได้ยินเสียงยุงบินเลย แล้วทำไมวันนี้เป็นแบบนี้ไปได้ล่ะ?!"
1600603-149 = "[s] \"อิซุมินี่... ไม่มีความปรานีเลยนะ\""
1600603-150 = "(งอแง) เมื่อวานกินข้าวหน้าปลาไหลไปแล้ว วันนี้ก็เลยตั้งใจจะมากินซูชิปลาไหลพิเศษแท้ๆ เลยนะ!"
1600603-151 = "แล้วทำไมเป็นงี้ไปได้ล่ะ??"
1600603-156 = "อ๊ะ! หนูคนเมื่อวานนี่นา! อาหารที่หนูมากิน กลายเป็นอาหารที่เรียกลูกค้าเข้าร้านหมดเลย!"
1600603-157 = "ลุงตกใจหมดเลยนะ!"
1600603-158 = "ว่าไงนะ?!"
1600603-159 = "เด็กสาวคนนั้น!"
1600603-160 = "ที่ปรึกษาธุรกิจในตำนานที่ชุบชีวิตร้านที่เงียบเหงาได้ในบัดดล!!"
1600603-161 = "[s] \"หืม...?\""
1600603-162 = "ขอร้องล่ะ!"
1600603-163 = "ขอคำแนะนำให้ร้านของเราดังเปรี้ยงปร้างในฤดูร้อนบ้าง!"
1600603-164 = "ช่วยพวกเราด้วยนะหนู!"
1600603-166 = "เอ๋?!  อะไรเนี่ย?!"
1600603-167 = "[s] \"เราหนีก่อนเถอะอิซุมิ\""
1600603-168 = "อะไรกันเนี่ยยย~! ฉันแค่อยากกินของอร่อยในฤดูร้อนก็เท่านั้นเองน๊า!!"
1600603-170 = "(อิซุมิกับคุณครูวิ่งหนีเจ้าของร้านอาหารที่ตามมาไปจนถึงสุดหาด)"

[translation]
1600603-1 = "泉與祕密的材料"
1600603-3 = "[ns1] 「所以，我們這是要去哪？」\n[ns2] 「不去海邊沒關係嗎？」"
1600603-4 = "哼哼哼……"
1600603-5 = "哼哼哼……"
1600603-6 = "老師還是太嫩了！夏天的美食並不代表只存在於海邊唷！"
1600603-7 = "根據我的調查，這附近有家不錯知名的餐廳喔！"
1600603-8 = "[s] 「是其他美食研究會成員的情報嗎？」"
1600603-9 = "沒有，是海邊的一位老奶奶告訴我的！"
1600603-10 = "我幫老奶奶提行李之後，她就給了我一片蝦餅。"
1600603-11 = "那片蝦餅超好吃的，明明外表很普通，一咬下去蝦子濃縮的鮮味整個爆發出來──"
1600603-12 = "[s] 「泉，離題了喔……」"
1600603-13 = "哈！咻嚕……"
1600603-14 = "呃，那個，我是要說什麼？"
1600603-15 = "對了對了，然後那位老奶奶就告訴我，過了這條路，就會抵達一間有名的「中華涼麵」攤販！"
1600603-16 = "今天我要吃那個！"
1600603-20 = "到了──！"
1600603-21 = "這就是傳聞中的中華涼麵攤販啊！"
1600603-22 = "[s] 「不過怎麼感覺……」"
1600603-25 = "奇怪，明明是當地美食，怎麼一個人都沒有呢……？"
1600603-26 = "難道說……人家已經倒閉了！？"
1600603-27 = "嗚哇～虧我們頂著大太陽走了30分鐘耶！"
1600603-28 = "結果白跑一趟嗎！？我不要──！"
1600603-29 = "[s] 「那個，不要在人家店門前說這種話啦……」"
1600603-30 = "誰，誰說我們倒閉了！"
1600603-31 = "呃唔……都是因為海邊新開的那間海之家……"
1600603-32 = "每次客人都會被那位「奇普托斯倒竿冠軍」經營的店給搶走……"
1600603-33 = "啊，還沒倒閉嗎？"
1600603-34 = "那我們要兩份中華涼麵！"
1600603-35 = "[s] 「多聽聽人家講話好不好！？」"
1600603-37 = "客人點的兩份中華涼麵，久等了！"
1600603-39 = "哇啊，顏色好豐富──！看起來很好吃！"
1600603-40 = "事不宜遲，我開動了……！"
1600603-45 = "[ns] 「怎麼樣？」"
1600603-46 = "……唔──嗯，好吃是好吃……但好像少了些什麼。"
1600603-47 = "嗯──是什麼呢……啊，我知道了！"
1600603-49 = "[s] 「泉…？妳剛才加了什麼？」"
1600603-50 = "這個嗎？這是我自製的花生醬？"
1600603-51 = "加進去之後攪拌均勻……嗯，完美！"
1600603-52 = "這下應該更美味了！老師要不要也試試看呢？"
1600603-53 = "[s3] 「給中華涼麵，加花生醬……！？」\n[s4] 「雖然泉說是自製的，但實在想像不出味道……」"
1600603-60 = "來，老師！啊～！"
1600603-61 = "（……）"
1600603-62 = "（心一橫，一口吃下泉餵的中華涼麵佐花生醬）"
1600603-63 = "（細嚼慢嚥……）"
1600603-64 = "（……吞下）"
1600603-67 = "（這……中華涼麵的湯汁和食材，搭配上花生醬的濃郁甘甜形成一種絕佳的合奏……！）"
1600603-68 = "[s] 「怎麼回事！？這也太好吃了！？」"
1600603-69 = "對吧！好吃吧！我就知道會很搭！"
1600603-70 = "我也要開動了──！"
1600603-73 = "嗯，果然超好吃！"
1600603-74 = "[s] 「這是什麼原理……？」"
1600603-77 = "（隔天……）"
1600603-78 = "咦耶耶耶！？為，為什麼人會這麼多呢！？"
1600603-79 = "[s] 「無法想像和昨天是同一個地方。」"
1600603-80 = "今天我還想試試看中華涼麵以外的料理耶！"
1600603-81 = "這下我們常夏美食家雙人組根本沒位子可以坐了！怎麼辦老師！？"
1600603-82 = "[s] 「你還真喜歡那個名稱……」"
1600603-83 = "唔唔──嗯，沒辦法了。去其他地方吧。"
1600603-84 = "正巧那位老奶奶除了中華涼麵，還有告訴我另一間美食餐廳！"
1600603-85 = "雖然很可惜，但今天就去那邊吧！"
1600603-87 = "[ns] 「這裡？」"
1600603-88 = "嗯，聽說這間店的鰻魚飯很有名。"
1600603-89 = "不過這裡也沒什麼人耶……"
1600603-90 = "不會倒閉了吧！？"
1600603-91 = "沒那回事吧！？只是還沒開始營業吧！？"
1600603-92 = "我，我們還沒倒閉啊！客人！"
1600603-93 = "只是客人幾乎都被「奇普托斯倒竿冠軍」的店，以及今天一大早就莫名其妙人滿為患的中華涼麵攤販給吸走了……"
1600603-95 = "那就好！"
1600603-96 = "麻煩來兩份鰻魚飯──！"
1600603-98 = "久等了！鰻魚飯來了！"
1600603-100 = "耶──！馬上來吃吃看……"
1600603-105 = "……嗯嗯嗯嗯嗯嗯？"
1600603-106 = "嗯──，嗯嗯嗯……？"
1600603-107 = "[s] 「看你這反應，難道……」"
1600603-108 = "嗯，確實是很好吃……雖然好吃──……"
1600603-109 = "但這感覺，唔──嗯……"
1600603-110 = "[s] 「又少了什麼嗎？」"
1600603-111 = "嗯，沒錯！感覺少了點什麼！"
1600603-112 = "有種就差一步的感覺，唔──嗯……果然還是要……"
1600603-117 = "[ns] 「難道又要……？」"
1600603-118 = "沒錯，這種時候就要使用我自製的花生醬！"
1600603-123 = "現在再吃一次，嚼嚼嚼嚼……"
1600603-124 = "嗯，果然沒錯！變得更好吃了！！"
1600603-125 = "老師要不要也吃吃看呢？"
1600603-126 = "[s] 「這我就……」"
1600603-131 = "來，老師。啊～～……！"
1600603-134 = "（鰻魚的香醇甘美和些微苦澀充斥整個口腔，再由花生醬的風味溫柔包覆整體，譜出了一首協奏曲……）"
1600603-135 = "（讓鰻魚飯進化了！）"
1600603-136 = "如何，好吃吧？"
1600603-137 = "花生醬果然有著不可思議的力量！聽說如果塗在麵包上，落地的時候一定會是塗了花生醬的那一面朝下。"
1600603-138 = "花生醬太神啦！"
1600603-139 = "[s5] 「那個原理好像又有點不一樣……？」\n[s6] 「不過真好吃……為什麼會好吃呢……？」"
1600603-140 = "嘿嘿！不管怎麼說我也是美食研究會的成員！"
1600603-141 = "嘿嘿！不管怎麼說我也是美食研究會的成員！"
1600603-142 = "論吃的就交給我準沒錯！這種小改良只是基本而已！"
1600603-143 = "（腦袋無法理解但舌頭卻很開心，整個謎團越來越難以捉摸……）"
1600603-146 = "（隔天，又到了那家鰻魚飯餐館……）"
1600603-147 = "奇怪？！怎麼人又這麼多？！"
1600603-148 = "昨天為止明明連個鬼影都沒有，根本就是風中殘燭了！怎麼會這樣！？"
1600603-149 = "[s] 「泉啊，說話方式要更委婉一點……」"
1600603-150 = "呃啊啊啊！我今天本來想吃吃看「鰻魚蛋卷」的耶！"
1600603-151 = "不過為什麼我們去過的店家都會這樣呢……？"
1600603-156 = "啊，就是那個孩子！只要經過那孩子的手，任何料理都能瞬間引爆人氣！"
1600603-157 = "雖然我也嚇了一跳，但這是真的！"
1600603-158 = "那個孩子嗎！"
1600603-159 = "原來如此，就是她……！"
1600603-160 = "不管多麼落魄潦倒的店家，也能瞬間起死回生的傳奇美食諮詢家！！"
1600603-161 = "[s]「……嗯？」"
1600603-162 = "拜託！拜託也幫幫我們！"
1600603-163 = "任何祕訣！任何建議都行！"
1600603-164 = "救救我們吧！小姐！"
1600603-166 = "咦耶耶耶？！什麼東西？！這怎麼回事！？"
1600603-167 = "[s] 「泉，我們先逃走吧。」"
1600603-168 = "我，我只是，想吃遍夏天的美食而已呀～～～！！"
1600603-170 = "（和泉擠開蜂擁而來的各家餐廳老闆，一起逃往海邊）"

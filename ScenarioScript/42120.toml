[translation]
42120-1 = "第12話;決心"
42120-5 = "子ウサギ公園"
42120-7 = "[ns] \"ただいま。\""
42120-9 = "[ns1] \"あれ、みんな……？\"\n[ns2] \"高級特上牛弁当を持ってきたんだけど――\""
42120-16 = "（……しばらく公園を探し回ったものの、RABBIT小隊員の姿はどこにも見当たらなかった）"
42120-25 = "（小隊員が泊まっていたテントの中はきれいに片付けられていて、一枚の手紙が残されている）"
42120-29 = "[ns3] \"これは……。\"\n[ns4] 机の上に置かれた手紙を読む。"
42120-34 = "[USERNAME]先生へ。"
42120-35 = "先生、ミヤコです。こうして手紙でのご挨拶となってしまってごめんなさい。"
42120-39 = "本日より、私たちは子ウサギ公園でのデモを終了し、先輩方の所に戻ります。"
42120-44 = "あの日の先輩方の言葉に納得した事と……"
42120-45 = "SRTの復権に好意的なカヤ室長が連邦生徒会長代行になった以上、#nここでデモを続ける理由がなくなってしまったからです。"
42120-46 = "理由のない闘争を続けるほど、公園での生活は楽なものではありませんから。"
42120-49 = "食べ物も、寝床も……身体を洗うことさえも難しい環境で……#n皆さんにはすごく迷惑をかけました。"
42120-50 = "それに、先生にもたくさん助けていただきました。"
42120-51 = "先生がいなかったら、私たちはとっくに挫けていたと思います。"
42120-52 = "でも、今は先輩方がいます。"
42120-53 = "サキが求める厳格な規律のある生活も、モエが求める強力な装備も、#nミユが求める温かい部屋も、すべてあります。"
42120-54 = "ただ、私の信念に関しては、少し引っかかる所がありますが……"
42120-59 = "私たちは結局、命令に従う武器に過ぎませんから。"
42120-60 = "これが最善の選択である事を願うばかりです。"
42120-61 = "……先生に相談せず、勝手に決めてしまう悪い子でごめんなさい。"
42120-62 = "本来は直接顔を合わせて話すべきことで、それができなかったらせめて電話で先生に相談するのが筋だと、分かってはいますが……"
42120-63 = "先生の声を聞いたら、なんだか迷ってしまいそうで……"
42120-64 = "こうして手紙で最後のご挨拶をする事を、何卒ご容赦ください。"
42120-65 = "これまで、大変ご迷惑をおかけしました。"
42120-66 = "公園にある物資は、作戦がすべて終わったら片付けます。"
42120-70 = "機会があれば、いつか……別の場所、違う姿でお目にかかれますように。"
42120-71 = "ミヤコより。"
42120-74 = "[ns] 公園に残された荷物を少し片付ける。"
42120-82 = "D.U.郊外・捨てられた軍事訓練場"
42120-85 = "座標が正しければ、ここが例のポイントだが……"
42120-90 = "これは……軍事訓練場か？"
42120-92 = "こんな人里離れた場所に、この規模の施設があったなんて……"
42120-94 = "変だね。衛星写真とオンライン地図では何もない空き地として表示されているのに……"
42120-95 = "カメラの認識機能を阻害する大型ECM装置でも設置されてるとか？"
42120-101 = "……連邦生徒会長が失踪する前に建てられた、SRT専用の軍事訓練場です。"
42120-102 = "有事の際に拠点として活用できるよう、存在そのものが機密扱いになっていました。#n私も実際に来たのは初めてですが……"
42120-104 = "……ついに決心したようだな。"
42120-112 = "ユキノ先輩……"
42120-120 = "……報告します。"
42120-121 = "SRT特殊学園所属、[ruby=つきゆき]月雪[/ruby]ミヤコ、他3名はFOX小隊への編入を命じられました。"
42120-122 = "そのため、現時刻をもってRABBIT小隊は解体。小隊員の統制権限はFOX小隊の小隊長である、[ruby=しちど]七度[/ruby]ユキノ隊長に移譲します。"
42120-124 = "――統制権限の移譲を確認。現時刻をもって月雪ミヤコ、他3名はFOX小隊所属のRABBIT支隊として活動することになる。"
42120-130 = "FOX小隊へようこそ、月雪支隊長。"
42120-131 = "……ありがとうございます。"
42120-139 = "お、いらっしゃい。ウサギの後輩くんたち。"
42120-140 = "……遅い。先輩をどれだけ待たせるつもりなの？"
42120-141 = "オトギ先輩、クルミ先輩……！"
42120-143 = "みんな、遠路はるばるお疲れ様。"
42120-144 = "お腹すいたよね？ご飯にする？それとも、シャワーにする？"
42120-149 = "し、シャワー……？"
42120-150 = "こ、ここにはシャワー室もあるのですか……？"
42120-152 = "もちろんあるわよ。#n衛生管理は部隊の戦闘力に直結する重大な問題だもの。"
42120-153 = "いくら劣悪な環境でも、シャワー設備なしで訓練なんて……"
42120-159 = "あ……わ、悪かったわね。"
42120-160 = "大丈夫です。あの公園を拠点にしたのは私たちの選択ですから。"
42120-162 = "この訓練場にはシャワー室はもちろん、ベッドも人数分あるよ。#n設備は好きなだけ使っていいからね。"
42120-164 = "ありがとうございます……！"
42120-165 = "はぁ、疲れた……早くシャワーを浴びてふかふかのお布団に入りたい……"
42120-167 = "シャワーもいいけど、その前に……"
42120-175 = "今から特技の上達訓練を始めるよ！"
42120-180 = "と、特技訓練ですか……？#nどうして……"
42120-182 = "この前の戦闘で、あなた達の基礎戦闘能力がかなり低下してるように感じたのよ。"
42120-183 = "だから、歓迎会を兼ねて特技の腕をもう一度じっくりテストさせてもらうわよ。"
42120-185 = "RABBIT支隊、全員着替えて練兵場に集合！"
42120-186 = "うぅ……久しぶりにお布団に入れると思ったのに……"
42120-187 = "先輩方が直々にトレーニングをしてくれるなんて……気合が入るな。"
42120-188 = "よし、急ぐぞ。早く荷解きをして着替えないと！"
42120-189 = "……予定外の訓練で喜べるのは、SRTでもあんたしかいないと思うわ。"
42120-190 = "でも、ここにはシャワー室があるから……安心して訓練に集中できそう。"
42120-192 = "ふふっ。今日は後輩も来たことだし、夕食も作りがいがありそう。"
42120-198 = "……？ミヤコ、どうした？#n何か心配事でもあるのか？"
42120-199 = "あ、いえ……ただ……"
42120-205 = "……なんでも、ないです。"
42120-209 = "次回;衝撃と恐怖"

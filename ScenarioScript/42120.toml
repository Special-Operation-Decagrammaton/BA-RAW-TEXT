[translation]
42120-1 = "ตอนที่ 12;ตัดสินใจ"
42120-5 = "โคะอุซางิ การ์เด้น"
42120-7 = "[ns] \"... ครูกลับมาแล้ว\""
42120-9 = "[ns1] \"ทุกคนไปไหนกันหมดน่ะ?\"\n[ns2] \"ครูเอาข้าวกล่องเนื้อวัวเกรดพรีเมียมมาเลยนะ\""
42120-16 = "(... คุณครูเดินดูรอบๆ สวนสาธารณะอยู่พักหนึ่ง แต่ก็ไม่มีวี่แววของกองทหาร RABBIT เลย)"
42120-25 = "(สมาชิกกองทหารเก็บกวาดข้าวของภายในเต็นท์ที่เคยพักไว้อย่างสะอาดสะอ้าน เหลือไว้เพียงแค่#nจดหมายฉบับเดียว)"
42120-29 = "[ns3] \"นี่มัน...\"\n[ns4] อ่านจดหมายที่วางไว้บนโต๊ะ"
42120-34 = "ถึงคุณครู [USERNAME]"
42120-35 = "คุณครู ฉันมิยาโกะนะคะ ขอโทษที่ต้องบอกลาผ่านจดหมายแบบนี้นะคะ"
42120-39 = "ตั้งแต่วันนี้ไป พวกฉันจะหยุดการประท้วงที่โคะอุซางิ การ์เด้น และจะกลับไปยังที่ที่พวกรุ่นพี่อยู่ค่ะ"
42120-44 = "วันนั้นฉันเปลี่ยนใจเพราะสิ่งที่ได้ยินจากพวกรุ่นพี่น่ะค่ะ..."
42120-45 = "ในเมื่อหัวหน้าสำนักฯ คายะที่คิดจะฟื้นฟู SRT ได้ขึ้นเป็นรักษาการแทนประธานองค์การนักเรียน พวกฉันก็คิดว่าไม่มีเหตุผลที่จะมาประท้วงอยู่ที่นี่อีกต่อไปค่ะ"
42120-46 = "การใช้ชีวิตในสวนสาธารณะไม่ได้ง่ายพอที่จะต่อสู้อย่างไร้เหตุผลน่ะค่ะ"
42120-49 = "เราไม่สะดวกทั้งอาหาร ที่นอน และที่อาบน้ำ... และสมาชิกกองทหารก็เดือดร้อนกันมาก"
42120-50 = "อีกทั้งเราเองก็ได้รับความช่วยเหลือจากคุณครูเยอะมากเลยด้วยเหมือนกันค่ะ"
42120-51 = "ถ้าไม่มีคุณครู ป่านนี้ชีวิตของพวกฉันคงพังไปแล้วละค่ะ"
42120-52 = "แต่ตอนนี้พวกฉันไปรับความช่วยเหลือจากพวกรุ่นพี่ได้แล้ว"
42120-53 = "ต่อไปก็คงใช้ชีวิตที่มีวินัยอย่างที่ซากิหวัง มีอาวุธทรงพลังที่โมเอะชอบ และมีที่อยู่อาศัยที่สะดวกสบาย#nอย่างที่มิยุต้องการค่ะ"
42120-54 = "ถึงจะมีบางจุดที่ไม่ตรงกับอุดมการณ์ของฉันไปบ้างก็ตาม..."
42120-59 = "แต่ยังไงพวกฉันก็เป็นแค่อาวุธที่ทำตามคำสั่งเท่านั้นค่ะ"
42120-60 = "ฉันเลยได้แต่หวังว่าการตัดสินใจครั้งนี้จะเป็นทางเลือกที่ดีที่สุดค่ะ"
42120-61 = "... ขอโทษที่เป็นเด็กไม่ดีที่ตัดสินใจอะไรตามใจนะคะ"
42120-62 = "จริงๆ แล้วฉันอยากเจอหน้าคุณครู หรืออย่างน้อยก็วิดีโอคอลก็ยังดี แล้วฉันก็คิดด้วยนะคะ#nว่าควรปรึกษาคุณครูก่อน..."
42120-63 = "แต่ถ้าได้ยินเสียงของคุณครูเข้าละก็ ฉันกลัวว่าตัวเองจะใจอ่อนลงได้น่ะค่ะ..."
42120-64 = "ต้องขอโทษด้วยนะคะที่มาบอกลาแบบนี้ หวังว่าคุณครูจะเข้าใจกันนะคะ"
42120-65 = "ที่ผ่านมาพวกฉันทำให้คุณครูเดือดร้อนมามากเลยค่ะ"
42120-66 = "ส่วนของที่เหลือในสวนสาธารณะ ไว้พวกฉันจะกลับมาเก็บหลังจากเสร็จปฏิบัติการค่ะ"
42120-70 = "และถ้ามีโอกาส... หวังว่าสักวันหนึ่งเราจะได้เจอกันในที่อื่น และในภาพลักษณ์อื่นๆ นะคะ"
42120-71 = "จากมิยาโกะ"
42120-74 = "[ns] จัดข้าวของที่เหลือในสวนสาธารณะ"
42120-82 = "สนามฝึกทหารที่ถูกทิ้งร้างในชายขอบ D.U."
42120-85 = "ดูจากพิกัดแล้ว ที่นี่คือที่ที่พวกรุ่นพี่บอกให้เรามาแหละ..."
42120-90 = "อาคารนี้มัน... สนามฝึกทหารเหรอ?"
42120-92 = "ไม่คิดเลยนะว่าจะมีอาคารใหญ่โตขนาดนี้ในสถานที่ห่างไกลแบบนี้ด้วย..."
42120-94 = "แปลกๆ แฮะ ถ้าตามภาพจากดาวเทียมและแผนที่แล้ว ที่นี่คือพื้นที่ว่างเปล่าที่ไม่มีอะไรเลย..."
42120-95 = "หรือว่าจะมีอุปกรณ์ ECM ขนาดใหญ่ที่ขัดขวางการทำงานของกล้องนะ?"
42120-101 = "... นี่คือสนามฝึกทหารของสถาบัน SRT ที่สร้างไว้ก่อนที่ประธานองค์การนักเรียนจะหายตัวไปสินะคะ"
42120-102 = "สนามแห่งนี้ถูกใช้เป็นฐานอย่างลับๆ เฉพาะในกรณีฉุกเฉิน ฉันก็เลยไม่เคยมาที่นี่มาก่อนเหมือนกันค่ะ..."
42120-104 = "... ในที่สุดก็ตัดสินใจได้แล้วสินะ"
42120-112 = "รุ่นพี่ยูกิโนะ..."
42120-120 = "... ขอรายงานตัวค่ะ"
42120-121 = "สึคิยูกิ มิยาโกะ และสมาชิกอีก 3 คนจากสถาบันพิเศษ SRT ได้รับคำสั่งให้ย้ายมากองทหาร FOX ค่ะ"
42120-122 = "มีผลให้กองทหาร RABBIT ถูกยุบตั้งแต่เวลานี้ อำนาจจัดการที่มีต่อสมาชิกในกองทหารจะถูกส่งต่อให้#nชิจิโดะ ยูกิโนะ หัวหน้ากองทหาร FOX ค่ะ"
42120-124 = "รับทราบ ตั้งแต่นี้เป็นต้นไป สึคิยูกิ มิยาโกะ และอีก 3 คนจะปฏิบัติหน้าที่ในฐานะหน่วย RABBIT สังกัดกองทหาร FOX"
42120-130 = "ยินดีต้อนรับสู่กองทหาร FOX นะ หัวหน้าหน่วยสึคิยูกิ"
42120-131 = "... ขอบคุณค่ะ"
42120-139 = "โอ๊ะ มาแล้วเหรอ? รุ่นน้อง RABBIT"
42120-140 = "... มาสายนะ จะให้พวกรุ่นพี่รอไปถึงกี่โมงฮะ?"
42120-141 = "รุ่นพี่โอโทกิ รุ่นพี่คุรุมิ...!"
42120-143 = "ทุกคนคงเหนื่อยกันมากสินะที่เดินทางมาตั้งไกล"
42120-144 = "หิวใช่ไหม? ให้เราเตรียมอาหารให้เลยไหมล่ะ? หรือว่าจะอาบน้ำกันก่อน?"
42120-149 = "อะ... อาบน้ำ...?"
42120-150 = "ที่นี่มีห้องให้อาบน้ำด้วยเหรอคะ...?"
42120-152 = "ก็ต้องมีสิ สุขอนามัยเป็นเรื่องสำคัญที่ส่งผลโดยตรงกับพละกำลังของกองทหารนะ"
42120-153 = "ไม่ว่าสภาพแวดล้อมจะเลวร้ายแค่ไหน แต่ถ้าไม่มีที่ให้อาบน้ำ ก็ฝึกไม่ได้หรอก..."
42120-159 = "อ๊ะ... ขะ... ขอโทษที"
42120-160 = "ไม่เป็นไรค่ะ ที่ไปประท้วงในสวนสาธารณะนั่นเป็นการตัดสินใจของพวกฉันเองนี่คะ"
42120-162 = "ในสนามฝึกนี้มีทั้งห้องอาบน้ำ แล้วก็เตียงนอนส่วนตัวให้ด้วย เพราะงั้นก็ใช้กันตามใจได้เลยนะ"
42120-164 = "ขอบคุณค่ะ...!"
42120-165 = "เฮ้อ เหนื่อยจัง... อยากรีบอาบน้ำแล้วมานอนห่มผ้านุ่มๆ บนเตียงแล้ว...."
42120-167 = "ฉันก็อยากให้อาบน้ำอยู่หรอก แต่ก่อนจะได้อาบ..."
42120-175 = "ต้องฝึกความเชี่ยวชาญพิเศษกันก่อน เริ่มตั้งแต่ตอนนี้เลย!"
42120-180 = "ฝะ... ฝึกความเชี่ยวชาญพิเศษเหรอคะ...? ทำไมจู่ๆ ก็..."
42120-182 = "ดูจากการต่อสู้ครั้งที่แล้ว ฉันคิดว่าทักษะในการต่อสู้ขั้นพื้นฐานดูไม่แน่นกันเท่าไรเลย..."
42120-183 = "ไหนๆ ก็มารายงานตัวแล้ว ทดสอบความเชี่ยวชาญพิเศษไปด้วยเลยก็ไม่เลวนะ"
42120-185 = "หน่วย RABBIT ทุกคนไปเปลี่ยนเป็นชุด CS แล้วมารวมตัวกันที่สนามฝึก!"
42120-186 = "กะ... ก็คิดเอาไว้แล้วละว่าจะได้พักผ่อนในที่พักที่สุขสบายจริงๆ แน่หรือเปล่า..."
42120-187 = "ฮุฮุ... เราไม่ได้รับการฝึกจากรุ่นพี่มานานแล้ว รู้สึกตื่นเต้นแปลกๆ นะเนี่ย"
42120-188 = "นี่ ทุกคนมัวทำอะไรกันอยู่? รีบเอาของไปเก็บแล้วก็เปลี่ยนชุดสิ!"
42120-189 = "... คนใน SRT ที่ดีใจที่จะได้ฝึกนอกตารางเพิ่มคงมีแต่เธอนั่นแหละ"
42120-190 = "แต่ยังไงที่นี่ก็มีห้องอาบน้ำ... งั้นก็คงฝึกหนักจนเหงื่อออกได้โดยไม่ต้องกังวลว่าตัวจะสกปรกเนอะ"
42120-192 = "วันนี้เรามีรุ่นน้องมาอยู่ด้วย งั้นต้องใส่พลังให้เต็มที่ในการเตรียมอาหารเย็นแล้วละ ฮุฮุ"
42120-198 = "หืม...? มิยาโกะ มีอะไรเหรอ? มีเรื่องกังวลอะไรหรือเปล่า?"
42120-199 = "มะ... ไม่ค่ะ ก็แค่..."
42120-205 = "... ไม่มีอะไรหรอกค่ะ"
42120-209 = "ตอนต่อไป;เรื่องสะเทือนใจและความกลัว"

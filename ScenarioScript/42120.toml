[translation]
42120-1 = "第12話;決心"
42120-5 = "兔寶寶公園"
42120-7 = "[ns]「……我回來了。」"
42120-9 = "[ns1]「咦，大家人呢……？」\n[ns2]「我帶了高級特上牛肉便當來了哦──」"
42120-16 = "（……雖然在公園找了一會，卻完全沒有看到RABBIT小隊成員的蹤影）"
42120-25 = "（小隊員們曾生活過的帳篷裡被打掃得相當乾淨，只留下了一封信）"
42120-29 = "[ns3]「這是……」\n[ns4] 閱讀放在桌子上的信"
42120-34 = "給[USERNAME]老師："
42120-35 = "老師，我是都子。#n很抱歉只能透過信件向你說明。"
42120-39 = "我們決定從今天起，結束在兔寶寶公園的示威，並返回前輩們所在的地方。"
42120-44 = "之所以做出這個決定，不僅是因為接受了那天前輩們所說的話……"
42120-45 = "既然對SRT復權持友善態度的香耶室長成為了聯邦學生會長代理，#n我們似乎也沒有理由繼續在這裡示威了。"
42120-46 = "在公園的生活並沒有快樂到足以繼續失去初衷的抗爭。"
42120-49 = "不僅是食物、睡眠……這連盥洗都有困難的環境……#n已經造成大家相當大的困擾。"
42120-50 = "此外，也受了老師很多的幫助。"
42120-51 = "要是沒有老師的話，我想我們恐怕早就以失敗告終了。"
42120-52 = "不過，現在還有前輩們在。"
42120-53 = "不管是咲希追求的嚴格且規律的生活、萌所追求的強力裝備，#n還是美優所追求的溫暖房間，全都能夠得到。"
42120-54 = "雖然這與我的信念有些許分歧……"
42120-59 = "不過我們終究只是聽命行事的武器罷了。"
42120-60 = "只希望這是個最佳的決定。"
42120-61 = "……很抱歉，我是個沒事先和老師商量就擅自作主的壞孩子。"
42120-62 = "這本來是該直接和老師討論，或者至少要打電話向老師商量的問題，#n這點我也很清楚……"
42120-63 = "可是如果聽到老師的聲音，總覺得又會陷入迷惘……"
42120-64 = "所以只能以信件的方式跟老師做最後的道別，還請老師見諒。"
42120-65 = "這段時間以來，真的給老師添了許多麻煩。"
42120-66 = "留在公園的物資，會在作戰全部結束後進行整理。"
42120-70 = "假如日後有機會的話……希望我們能以嶄新的面貌在其他地方重逢。"
42120-71 = "都子敬上。"
42120-74 = "[ns] 稍微整理遺留在公園裡的行李"
42120-82 = "D.U.郊區．廢棄的軍事訓練場"
42120-85 = "如果座標沒錯的話，這裡應該就是那個地點才對……"
42120-90 = "這裡是……軍事訓練場嗎？"
42120-92 = "這麼偏遠的地方竟然會有這種規模的設施……"
42120-94 = "真奇怪，不管是衛星照片還是網路地圖，都顯示這裡是一片荒蕪的空地啊……"
42120-95 = "難道這裡設置了能夠限制攝影機識別功能的大型[ruby=電子反制]ECM[/ruby]裝置嗎？"
42120-101 = "……這裡是聯邦學生會長在失蹤前建造的，SRT學園專用的軍事訓練場。"
42120-102 = "為了在非常情況下作為據點活用，連這裡的存在都被列為機密。#n我也是第一次實際來到這個地方……"
42120-104 = "……總算是下定決心了啊。"
42120-112 = "雪乃前輩……"
42120-120 = "……報告。"
42120-121 = "SRT特殊學園所屬，月雪都子及其他三人奉命編入FOX小隊。"
42120-122 = "因此，RABBIT小隊自即刻起解散。#n小隊員的管轄權限將轉讓給身為FOX小隊小隊長的七度雪乃隊長。"
42120-124 = "──已確認管轄權限的轉讓。#n即刻起，月雪都子及其他三人將以FOX小隊所屬的RABBIT分隊進行活動。"
42120-130 = "歡迎加入FOX小隊，月雪分隊長。"
42120-131 = "……謝謝。"
42120-139 = "哦，歡迎你們。兔子後輩們。"
42120-140 = "……來得太慢了。你們打算讓前輩們等多久？"
42120-141 = "御伽前輩、胡桃前輩……！"
42120-143 = "大家長途跋涉都辛苦了。"
42120-144 = "肚子餓了吧？要不要先吃飯？還是要先沖個澡？"
42120-149 = "沖，沖澡……？"
42120-150 = "這，這裡連淋浴間都有嗎……？"
42120-152 = "當然有囉。#n畢竟衛生管理可是直接關係到部隊戰鬥力的重大問題。"
42120-153 = "就算環境再怎麼惡劣，要在連淋浴設備都沒有的情況下訓練什麼的……"
42120-159 = "啊……抱，抱歉。"
42120-160 = "沒關係。#n畢竟以那座公園為據點是我們自己的選擇。"
42120-162 = "這座訓練場不只有淋浴間，床也是每個人都有哦。#n所有設施都可以自由使用。"
42120-164 = "非常感謝……！"
42120-165 = "哈啊，已經累了……好想快點洗個澡，然後鑽進鬆軟的棉被裡……"
42120-167 = "要洗澡是可以，不過在那之前……"
42120-175 = "現在開始專業的加強訓練！"
42120-180 = "專，專業訓練……？#n為什麼……"
42120-182 = "在之前的戰鬥中，我發現你們的基礎戰鬥能力似乎正在退步。"
42120-183 = "所以，就再來好好測試一下專業能力，順帶作為歡迎會吧。"
42120-185 = "RABBIT分隊，全員著裝完畢後至練兵場集合！"
42120-186 = "唔……還以為能久違地鑽進棉被裡了說……"
42120-187 = "呵呵……居然能被前輩們親自訓練……感覺真興奮。"
42120-188 = "很好，動作快。#n得趕快卸下行李換衣服才行！"
42120-189 = "……會因為突如其來的訓練而感到高興的人，就算在SRT也就只有你而已吧。"
42120-190 = "不過至少這裡有淋浴間……看來可以放心地專注在訓練上了。"
42120-192 = "呵呵。今天後輩們也來了，看來今天的晚餐值得好好準備。"
42120-198 = "嗯……？#n都子，怎麼了？有什麼心事嗎？"
42120-199 = "啊，沒有……只是……"
42120-205 = "……沒什麼。"
42120-209 = "下一話;衝擊與恐懼"

[translation]
42120-1 = "Episode 12; Determination"
42120-5 = "Kousagi Park"
42120-7 = "[ns] \"...I'm back.\""
42120-9 = "[ns1] \"Where did everyone go?\"\n[ns2] \"I even brought some high-quality beef lunch bentos.\""
42120-16 = "I searched all throughout their encampment, but it was a ghost town."
42120-25 = "Finally, I found their old sleeping tent empty with only a letter left inside."
42120-29 = "[ns3] \"This is...\"\n[ns4] Read the letter on the desk."
42120-34 = "Dear [USERNAME] Sensei,"
42120-35 = "Hello, this is Miyako. I'm sorry that I'm delivering this news in a letter."
42120-39 = "Starting today, we are officially ending our Kousagi Park occupation and protest to rejoin our senior classmates."
42120-44 = "When we talked... I truly did believe in what you told me and the things we discussed."
42120-45 = "But with Acting President Kaya supporting the revival of SRT Academy, our protest no longer had a cause."
42120-46 = "I couldn't justify asking my squad members to continue living under these conditions when there was no longer a fight to rally behind."
42120-49 = "Living in the park has been hard: scrounging for expired bentos and stealing barrels just to have somewhere to bathe. I can't forget how difficult it was for my squad members when we first moved here. "
42120-50 = "But, despite all that, your support was invaluable. I don't want you to think it wasn't."
42120-51 = "Any one of those struggles I mentioned would have brought us to our knees had you not been there to pick us back up, every single time."
42120-52 = "It's thanks to you that we can now look forward and accept support from others too."
42120-53 = "All their needs will be met. We can follow Saki's regimented daily routine, and Moe will have enough firepower to blow up Kivotos. (I'm just kidding. I hope.) Even Miyu will finally get to have that comfy bed she's always wanted."
42120-54 = "It wasn't an easy decision. It required sacrificing my principles."
42120-59 = "But, maybe my principles were wrong. At the end of the day, a weapon that can't serve its purpose is useless, right?"
42120-60 = "I do hope this decision was best for everyone..."
42120-61 = "I'm sorry I didn't discuss it with you first."
42120-62 = "I wanted to ask you for advice in person at first. I wanted to know what you thought of my choice."
42120-63 = "But... I felt that hearing your voice would've made me second-guess myself."
42120-64 = "So, I hope you understand why this letter is the only thing we left you as a good-bye."
42120-65 = "We put you through a lot, didn't we? Thank you, Sensei."
42120-66 = "We'll come back to clean up the park and gather our supplies after completing our operation."
42120-70 = "I hope our paths cross again one day... Maybe in a different place, in a different world..."
42120-71 = "Sincerely,#nMiyako"
42120-74 = "[ns] Clean up what was left behind."
42120-82 = "Abandoned Training Facility, D.U. Outskirts"
42120-85 = "Based off the coordinates, this is where they said to meet them..."
42120-90 = "This is the biggest training facility I've ever seen, if that's even what it is."
42120-92 = "W-We're so far out... Who knew there was a whole facility all the way out here..."
42120-94 = "Weird... It doesn't show up on satellite images."
42120-95 = "ECM devices blocking cameras, maybe?"
42120-101 = "This was an SRT Academy training facility before the council president disappeared."
42120-102 = "It was meant to serve as a base of operations in the event of an emergency, so its very existence was highly confidential. This is my first time here as well."
42120-104 = "You've made your choice?"
42120-112 = "Yukino..."
42120-120 = "...Reporting."
42120-121 = "I have received orders that Tsukiyuki Miyako and the other three members of the RABBIT Squad are to join the FOX Squad."
42120-122 = "As squad leader, I hereby disband the RABBIT Squad and transfer authority of its members to FOX Squad Leader, Shichido Yukino."
42120-124 = "Confirmed. As of now, Tsukiyuki Miyako and the three members of her squad will serve as an active unit under the FOX Squad."
42120-130 = "Welcome to the FOX Squad, Squad Leader Tsukiyuki."
42120-131 = "...Thank you."
42120-139 = "There they are. I found the rabbits."
42120-140 = "You took your sweet time! We've been waiting."
42120-141 = "Otogi and Kurumi...!"
42120-143 = "Thank you for coming all the way here."
42120-144 = "Are you hungry? Or would you like to shower first?"
42120-149 = "Sh-Shower?"
42120-150 = "We get to...shower? In a room?"
42120-152 = "Absolutely. Cleanliness is vital for combat readiness."
42120-153 = "No matter how dire the situation, you can't train efficiently if you're not..."
42120-159 = "Ah. Sorry, I forgot."
42120-160 = "Not at all. We were the ones who chose to live in a park."
42120-162 = "Well, I'm happy to say we're equipped with showers and individual beds for each of you! Please make yourself at home."
42120-164 = "Thank you!"
42120-165 = "I’m exhausted... I just want a good shower and a soft bed..."
42120-167 = "That does sound nice. But before that..."
42120-175 = "We're starting all of your specialty training routines! Up and at 'em, bun buns!"
42120-180 = "Specialized training? R-Right now?"
42120-182 = "Based on recent observations, your combat skills need sharpening. A lot."
42120-183 = "Consider it a bonding activity! We'll get to evaluate your strengths and weaknesses."
42120-185 = "RABBIT Squad, gear up and meet at the training area!"
42120-186 = "Ugh... Just when I thought I could finally experience luxury and comfort in my poor, hard-knock life."
42120-187 = "Heh. Heh. We're going to get special training, directly from our seniors! Heehee."
42120-188 = "No dilly-dallying! Unpack and gear up! Now!"
42120-189 = "You're probably the only one in SRT history to be excited about surprise training."
42120-190 = "At least there are showers. We don't have to worry about being sticky if we sweat!"
42120-192 = "Since our adorable underclassmen are here, I'll have to put in some extra effort in today's dinner menu."
42120-198 = "Miyako? Everything okay?"
42120-199 = "O-Oh. Everything's great."
42120-205 = "...Yeah. Everything's great."
42120-209 = "Next Episode;Shock and Fear"

[translation]
10050030-1 = "第3話;所得申報"
10050030-2 = "三一學生宿舍"
10050030-3 = "哎呀～好累哦。#n明明才第一天的說。"
10050030-4 = "辛苦了，部長。"
10050030-5 = "不過學園裡居然會有這種地方，真不愧是三一呢。"
10050030-6 = "畢竟是與外界頻繁交流的學園，會有這種水準的設施也不足為奇。"
10050030-7 = "……雖然價格也挺可觀的就是了。"
10050030-8 = "唔嗯～想到這都是我們要負擔的出差費用，總覺得有點可惜呢。#n早知道當初就把分潤比例再提高一點了。"
10050030-9 = "那樣Meruri同學可能就不會同意簽約了吧……"
10050030-10 = "不過今天一整天下來似乎賣得不錯，應該能多少彌補一些才對？"
10050030-11 = "既然都說到這個了，不如就來看看賺了多少吧。#n總不至於會虧損吧？"
10050030-12 = "哎呀～果然還是這種時候最讓人心跳加速了呢。#n我來看看……"
10050030-13 = "……"
10050030-14 = "……"
10050030-19 = "振，振作一點啊，貴音！"
10050030-20 = "部長……這肯定是在做夢對吧？#n那樣的話我就能夠理解了。"
10050030-21 = "不，貴音。這是不折不扣的現實。"
10050030-22 = "部長是要我相信，這種好事會發生在我們身上嗎！？"
10050030-23 = "我懂你想表達的意思，不過這就是現實……試著接受它吧。"
10050030-24 = "話說，數字的位數明顯有差呢。#n到底多了幾個零啊……這就是三一嗎？#n可怕，太可怕了……"
10050030-25 = "果然想賺錢就得去有錢的地方賺呢！"
10050030-26 = "現在回頭想想，我們的故事對三一的學生相當新奇……這也是個重點呢。"
10050030-27 = "讓我回想起了某位學生曾經發表過的感想。#n好像是「感受到了從未品嚐過的養分……」之類的。"
10050030-28 = "在赤冬已經習以為常的東西，在其他地方可能並非如此呢。"
10050030-29 = "看來文化果然必須要有交流才行啊。#n一旦缺少循環便會停滯不前，進而成為腐蝕周圍的弊端。"
10050030-30 = "……就像那已經腐壞的陳年舊夢一樣。"
10050030-31 = "部長……"
10050030-32 = "總之，我們的工作基本上就是將文化廣泛傳播，並促進它的循環。"
10050030-33 = "……畢竟所謂的文化，就是在名為金錢的土壤上生長的生物啊。"
10050030-34 = "雖然金錢這個概念所具備的交換價值過度膨脹也是原因之一……"
10050030-35 = "不過循環果然還是必要的。#n這對我們來說是個非常重要的價值。"
10050030-36 = "過時的舊夢和陳腐的文化，只不過是會毀壞許多事物的悲哀遺產而已。"
10050030-37 = "當然最重要的……還是金錢會在這個過程中跟著流動就是了。呣呵呵。"
10050030-38 = "是是是。部長說的對……"
10050030-39 = "那麼又到了另一種意義上的結算時間了呢！#n先來聯絡知識解放戰線吧！"
10050030-43 = "呼啊……有什麼事啊，八雲。#n我都快睡著了說……"
10050030-44 = "現在可不是睡覺的時候啊，愛瑠。#n雖然有很多話想跟你說……還是數字比言語更簡潔有力吧。"
10050030-45 = "收下吧。這是今天結算的金額。"
10050030-46 = "結算……？#n啊，對吼。我來看看……"
10050030-53 = "愛瑠前輩？愛瑠前輩！？你怎麼了！？！？"
10050030-54 = "紅葉，我的眼睛好像怪怪的……你幫我確認一下……"
10050030-55 = "嗯？這是……今天的結算金額嗎？"
10050030-56 = "咦咦咦咦──！？！？"
10050030-57 = "老實回答我，八雲。你該不會是去搶銀行了吧？#n還是鑽了什麼重大的金融漏洞或犯罪之類的……？"
10050030-59 = "你把我當成什麼人了啊。#n我一向是在商言商的好嗎？"
10050030-60 = "那種來路不明或不知道有什麼風險的資金，我可敬謝不敏。"
10050030-61 = "所以……"
10050030-62 = "……這是真的嗎？"
10050030-63 = "真是的，所以我才受不了你們這些創作者。#n滿腦子只知道創作創作，根本不懂該怎麼宣傳。"
10050030-64 = "總之先去吃點東西吧。#n你們今天八成也沒吃晚餐吧？"
10050030-65 = "真的可以嗎……？"
10050030-66 = "當然可以。那是任何人都無法否認的、屬於知識解放戰線的成果。"
10050030-67 = "就是那麼回事。恭喜你們囉。"
10050030-68 = "啊，嗯，那個……就是說……"
10050030-69 = "不行哦，愛瑠前輩。#n這種時候就該好好說出來才行。"
10050030-70 = "謝謝你們，出版部的各位。#n真的是多虧了你們……我們才能得救……！"
10050030-71 = "哎呀～基本上還是因為書本身足夠優秀，所以才賣得出去啦。 "
10050030-72 = "我可沒有厲害到能把沒有潛力的東西賣掉哦？"
10050030-73 = "……你居然會誇獎別人，真是難得一見啊，八雲。"
10050030-74 = "咦，有那麼奇怪嗎？#n不過那種話也只有我這種人才說得出口，換作是貴音應該絕對辦不到吧？"
10050030-75 = "你這麼說倒也沒錯。"
10050030-77 = "……部長？Meruri同學？#n兩位這麼和氣是在聊什麼呢？"
10050030-78 = "噫噫！？#n沒，沒什麼！什麼都沒有！"
10050030-79 = "就，就是說啊！#n只是在聊做生意的時候難免會遇到的一些……對了對了！一些生意經而已啦！"
10050030-80 = "哼嗯……"
10050030-81 = "總，總之！從這股買氣來看，應該幾天之內就能全部賣完收工了！"
10050030-82 = "請拭目以待！相信我們就對了！"
10050030-83 = "嗯，嗯！我本來就相信你們，看到今天的結果又更放心了！"
10050030-84 = "部長姑且不論，Meruri同學是什麼時候變得那麼相信我了？#n某方面來說還真奇妙呢。"
10050030-85 = "總之我先掛囉！謝謝你們！"
10050030-86 = "沒，沒問題！記得要按時吃飯哦！"
10050030-91 = "好，好了！那我們也去休息吧？#n得要好好消除疲勞，明天才能繼續做生意嘛！"
10050030-92 = "是是是，部長。我們也早點休息吧。"
10050030-93 = "話說，貴音居然有辦法承受這種行軍般的行程呢……？我對你刮目相看了。"
10050030-94 = "那不是理所當然的嗎？#n跟赤冬相比，這不過是普通程度而已……"
10050030-95 = "這麼說也對。#n不過……畢竟貴音身上總是散發著某種高貴的氣息嘛……"
10050030-96 = "就像今天也有人說「沒想到赤冬會有像貴音這種貴族千金般的學生」之類的……"
10050030-97 = "你，你在說什麼啊，部長！#n首先我們赤冬就不可能有什麼千金之類的吧！？"
10050030-98 = "事實當然是那樣沒錯，不過沒有人規定行銷的時候一定得100%符合事實吧？"
10050030-99 = "……說難聽一點，現實中播出的大部分廣告只能算是「沒有說謊」而已。"
10050030-100 = "……所以你想表達什麼呢，部長？"
10050030-101 = "請你先聽我說，這也算是宣傳策略的一部分哦？#n所以……"
10050030-106 = "實現正義部．教室"
10050030-107 = "老師和志美子同學，你們好！#n今天也為了實現正義一起前進吧！"
10050030-108 = "[s]「你，你好啊，麻白。真是充滿活力的早晨呢……」"
10050030-109 = "氣勢十足呢，麻白同學……"
10050030-110 = "啊，如果嚇到兩位的話，我很抱歉。#n因為能和圖書委員會合作，加上老師也參與其中……不禁讓我有點興奮。"
10050030-111 = "況且居然是未經認可的書籍……沒有比這更背離正義的東西了。"
10050030-112 = "怎麼看都很可疑，怎麼看都很偷雞摸狗，怎麼看都一定有見不得人的部分……"
10050030-113 = "是必須連根拔起、徹底剷除的對象！"
10050030-114 = "[s]（總覺得麻白的熱情，好像正朝著有點奇怪的方向燃燒……）"
10050030-115 = "話說，請問你有讀過那本書嗎，麻白同學？"
10050030-116 = "沒有看的必要。反正那肯定是違背正義的事。"
10050030-117 = "是，是嗎……？"
10050030-118 = "而且考慮到我們的時間相當有限……"
10050030-119 = "我已經派遣實現正義部的成員前往三一各地了！"
10050030-120 = "應該很快就能鎖定那本地下刊物的交易地點才對！"
10050030-121 = "[s]「嗯？已經派人出去了！？」"
10050030-122 = "是，是的！老師！#n我一定會全力以赴……！"
10050030-123 = "絕對不會讓老師失望的！"
10050030-124 = "謝謝你們。#n請到各自負責的崗位待命吧。"
10050030-125 = "知道了！"
10050030-130 = "那麼我也先去現場了。#n歡迎隨時聯絡我！"
10050030-135 = "真是驚人的熱情呢……"
10050030-136 = "[s]「就是說啊……甚至到了讓人有點擔心的程度……」"
10050030-137 = "老師擔心麻白同學嗎？"
10050030-138 = "[s1]「麻白固然讓人有點擔心……」\n[s2]「不過那些在賣書的孩子也是……雖然還不知道他們是誰。」"
10050030-141 = "啊啊，原來是這個意思啊。#n其實我也剛好在思考相同的事呢。"
10050030-142 = "覺得意外嗎？我想憂委員長應該也會說相同的話才對哦？#n畢竟喜愛書本的人，不可能會是壞人的。"
10050030-143 = "您說對方也可能只把書當成賺錢的工具……？"
10050030-144 = "……"
10050030-145 = "或許這種可能性確實存在，但我並不這麼認為。"
10050030-146 = "因為書本這種東西……已經變得不夠喜愛就無法買賣了。"
10050030-147 = "說白了，只想賺錢的人何必買賣書本呢？#n其他能賺大錢的方法明明還多的是。"
10050030-148 = "[s]「這……確實沒錯呢。」"
10050030-149 = "對吧？所以我覺得引起這場騷動的，一定也是好人。"
10050030-150 = "……至少是能夠互相溝通，壞不到哪裡去的人才對。"

10050030-2 = "#place;트리니티 학생 숙소"
10050030-3 = "3;야쿠모;04;아이고~ 힘드네요, 이거. 이제 겨우 첫날인데.\n#3;em;[땀]\n#3;a"
10050030-4 = "5;타카네;07;고생 많으셨어요, 부장님.\n#5;a\n#3;m1\n#5;em;[반응]"
10050030-5 = "3;야쿠모;01;그렇다고는 해도 역시 트리니티네요. 학교 안에 이런 곳이 다 있고."
10050030-6 = "5;타카네;00;어쨌든 외부와의 교류가 많은 학원이니까요. 이 정도 시설은 있을 수 있겠죠."
10050030-7 = "5;타카네;06;……제법 가격이 있기는 했지만요…….\n#5;stiff"
10050030-8 = "3;야쿠모;04;으음~ 이것도 다 우리가 부담해야 하는 출장 비용이라고 생각하니, 뭔가 아깝긴 하네요. 역시 그때 정산 비율을 좀 더 올릴 걸 그랬나요.\n#3;em;…"
10050030-9 = "5;타카네;99;그랬다간 메루리 씨가 마지막까지 계약 안 했을 걸요……."
10050030-10 = "5;타카네;08;그래도 오늘 하루 제법 잘 팔렸던 것 같으니, 어느 정도 보충이 되지 않을까요?\n#5;m4"
10050030-11 = "3;야쿠모;09;말이 나온 김에, 얼마나 벌었는지 보죠. 설마 손해겠어요?\n#3;m2"
10050030-12 = "3;야쿠모;03;이야아~ 역시 이때가 가장 두근거린단 말입니다. 그러면 어디, 어디…….\n#3;greeting\n#3;em;[음표]"

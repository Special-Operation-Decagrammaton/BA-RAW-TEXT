10050030-18 = "3;야쿠모;12\n#5;hide\n#bgshake\n#wait;1500"
10050030-19 = "3;야쿠모;13;저, 정신 차려요. 타카네!\n#3;m3\n#3;hophop"
10050030-20 = "3;야쿠모;13\n#na;타카네;부장님…… 저 알았어요. 이거 꿈이죠? 그렇다면 다 받아들일 수 있어요."
10050030-21 = "3;야쿠모;07;아닙니다. 타카네. 이건 엄연한 현실이에요."
10050030-22 = "3;타카네;04;우리에게 이렇게 좋은 일이 일어나다니, 그걸 믿으라는 건가요?!\n#3;a\n#3;greeting"
10050030-23 = "3;야쿠모;11;무슨 말인지는 알겠는데, 그래도 이건 현실이에요. 받아들여요.\n#3;em;[음표]"
10050030-24 = "3;야쿠모;04;그런데, 확실히 단위 수가 다르긴 하네요. 0이 도대체 몇 개가 더 붙은 거죠……. 이것이 트리니티? 두렵네요. 실로 두려워요……."
10050030-25 = "3;야쿠모;08;역시 돈을 벌려면 돈이 모이는 곳으로 가야 하는 거였어요!\n#3;jump"
10050030-26 = "5;타카네;08;이제 와서 하는 감상이지만, 트리니티 학생분들이 우리의 이야기를 신선하게 받아들이는 것도 컸던 것 같아요.\n#3;m1\n#5;al\n#5;em;[반응]"
10050030-27 = "5;타카네;12;한 학생분의 감상이 생각나네요. '지금까지 맛보지 못했던 영양소를 느꼈다……' 였던가요."
10050030-28 = "5;타카네;07;붉은겨울에서는 어느 정도 익숙해진 것이라도, 다른 곳에서는 그렇지 않을 수 있다는 거네요.\n#5;em;[재잘]"
10050030-29 = "3;야쿠모;03;역시 문화는 교류해야 해요. 순환해야 하고요. 그렇지 않으면 정체되어서, 주위를 좀먹는 폐단이 되죠."
10050030-30 = "3;야쿠모;07;……마치 오래되어 상해 버린, 묵은 꿈처럼요."
10050030-31 = "5;타카네;01;부장님……."
10050030-32 = "3;야쿠모;10;뭐, 기본적으로 우리가 하는 일은, 문화를 널리 퍼트리고 순환시키는 일이죠.\n#3;m3\n#5;dr\n#3;em;[반응]"
10050030-33 = "3;야쿠모;09;……아무튼 문화는, 돈이라는 토양에서 자라나는, 살아 있는 무생물이니까요."
10050030-34 = "3;타카네;11;돈이라는 개념이 갖는 교환 가치가, 너무 커진 탓도 있겠지만요…….\n#3;em;[땀]"
10050030-35 = "3;야쿠모;08;그래도 역시 순환은 필요합니다. 그건 우리에게 있어 중요한 가치예요.\n#3;jump"
10050030-36 = "3;야쿠모;09;오래 묵은 꿈과 오래 묵은 문화는, 많은 것을 망가뜨리는 슬픈 유산들이니까요."
10050030-37 = "3;야쿠모;11;무엇보다 그 과정에서 돈 역시 돌게 되는 것이고요. 힛. 힛. 히.\n#3;em;[음표]"
10050030-38 = "3;타카네;12;네에, 네에. 부장님. 물론이죠……."
10050030-39 = "3;야쿠모;08;아무튼, 또다시 다른 의미의 정산 시간입니다! 우선 지식해방전선과 연락하도록 할까요!\n#3;greeting"

[translation]
10050030-1 = "ตอนที่ 3;แจ้งรายได้"
10050030-2 = "หอพักนักเรียน ทรีนิตี้"
10050030-3 = "เฮ้อ~ เพลียร่างจังเลยนะคะ เพิ่งผ่านมาวันเดียวแท้ๆ"
10050030-4 = "เหนื่อยน่าดูเลยนะคะ หัวหน้า"
10050030-5 = "แต่ทรีนิตี้นี่ก็ยอดเยี่ยมจังเลยนะคะ ในโรงเรียนมีสถานที่แบบนี้อยู่ด้วย"
10050030-6 = "ก็ที่นี่เป็นโรงเรียนที่มีปฏิสัมพันธ์กับโลกภายนอกเป็นอย่างมากนี่คะ ก็ต้องมีสิ่งอำนวยความสะดวก#nแบบนี้อยู่แล้วละค่ะ"
10050030-7 = "ถึงจะค่อนข้างแพงเลยก็เถอะ..."
10050030-8 = "อืม~ พอคิดว่าเราต้องควักกระเป๋าจ่ายเองเพื่อการทำงานครั้งนี้ มันก็น่าเสียดายอยู่หน่อยนะคะ รู้งี้ฉันเพิ่มสัดส่วนกำไรของเราให้มากกว่านี้ก็ดี"
10050030-9 = "ถ้าเป็นอย่างนั้น คุณเมรูริก็คงไม่ยอมทำสัญญาด้วยหรอกค่ะ..."
10050030-10 = "แต่ยังไงวันนี้เราก็ขายได้ค่อนข้างดีเลยทีเดียว งั้นก็น่าจะช่วยชดเชยได้บ้างนะคะ"
10050030-11 = "ไหนๆ ก็คุยเรื่องนี้แล้ว งั้นเรามาดูกันดีกว่าค่ะว่าขายได้เท่าไร ฉันว่าเราไม่น่าจะขาดทุนหรอกนะคะ?"
10050030-12 = "ฮื้ม~ นี่เป็นช่วงเวลาที่หัวใจฉันเต้นแรงที่สุดเลยละค่ะ ไหนขอนับหน่อยซิ..."
10050030-13 = "..."
10050030-14 = "..."
10050030-19 = "ตะ... ตั้งสติไว้ค่ะ ทาคาเนะ!"
10050030-20 = "หัวหน้า... ฉันรู้ดีค่ะ นี่คือความฝันใช่มั้ยคะ? ถ้าไม่ใช่ฝันก็ไม่รู้จะว่ายังไงแล้วค่ะ"
10050030-21 = "ไม่ใช่ค่ะ ทาคาเนะ นี่คือความจริงแท้แน่นอนเลยค่ะ"
10050030-22 = "หัวหน้ากำลังบอกให้ฉันเชื่อว่าเรื่องดีๆ แบบนี้เกิดขึ้นกับพวกเราจริงๆ งั้นเหรอคะ?!"
10050030-23 = "ฉันเข้าใจความรู้สึกนะคะ แต่นี่ก็คือความจริงอยู่ดีค่ะ ยอมรับเถอะค่ะ"
10050030-24 = "ยอดขายในสองโรงเรียนต่างกันลิบลับเลยนะคะ มีเลขศูนย์ติดกันกี่ตัวคะเนี่ย... นี่สินะความน่ากลัวของทรีนิตี้ ฉันกลัวแล้วค่ะ..."
10050030-25 = "ถ้าจะหาเงิน ก็ต้องไปที่ที่มีเงินหมุนเวียน ฉันคิดถูกจริงๆ ด้วยค่ะ!"
10050030-26 = "พอมาคิดดูอีกที ต้องขอบคุณนักเรียนทรีนิตี้ที่เปิดรับเรื่องราวของเราด้วยมุมมองใหม่ๆ นะคะ"
10050030-27 = "ฉันจำความประทับใจของนักเรียนคนหนึ่งได้ค่ะ เธอคนนั้นบอกว่า 'รู้สึกถึงรสชาติที่ไม่เคยลิ้มลองมาก่อน'... เลยละค่ะ"
10050030-28 = "ถึงจะเป็นสิ่งที่คุ้นชินระดับหนึ่งแล้วในเรดวินเทอร์ แต่กับที่อื่นแล้วอาจจะไม่เป็นอย่างนั้นก็ได้สินะคะ"
10050030-29 = "วัฒนธรรมต้องมีการแลกเปลี่ยนและหมุนเวียนกันค่ะ ถ้าไม่อย่างนั้นมันก็จะหยุดชะงัก และกลายเป็นสิ่งที่กัดกร่อนสิ่งแวดล้อมโดยรอบ"
10050030-30 = "ก็คงเหมือนความฝันเก่าๆ ที่เลือนรางเมื่อเวลาผ่านไปน่ะค่ะ..."
10050030-31 = "หัวหน้า..."
10050030-32 = "โดยพื้นฐานแล้วสิ่งที่เราทำก็คือการเผยแพร่และหมุนเวียนวัฒนธรรมค่ะ"
10050030-33 = "ก็วัฒนธรรมคือสิ่งมีชีวิตที่เติบโตได้ในที่ดินที่เรียกว่าเงินนี่คะ..."
10050030-34 = "ฉันว่าส่วนหนึ่งอาจเป็นเพราะเราให้ค่ากับเงินในฐานะตัวกลางการแลกเปลี่ยนมากเกินไปค่ะ..."
10050030-35 = "แต่ยังไงก็ต้องมีการหมุนเวียนอยู่ดีค่ะ นั่นคือสิ่งสำคัญสำหรับเราค่ะ"
10050030-36 = "ก็ความฝันและวัฒนธรรมเก่าๆ คือมรดกน่าเศร้าที่ทำลายหลายสิ่งหลายอย่างนี่คะ"
10050030-37 = "เหนือสิ่งอื่นใด เงินก็หมุนเวียนอยู่ในกระบวนการนี้ด้วยค่ะ ฮิ ฮิ ฮิ"
10050030-38 = "ค่า ค่ะ หัวหน้า พูดอีกก็ถูกอีกค่ะ..."
10050030-39 = "เอาละค่ะ ถึงเวลาคิดบัญชีอีกครั้งแล้วค่ะ แต่ครั้งนี้ความหมายจะต่างออกไปนะคะ! เริ่มจากติดต่อชมรมแนวร่วมปลดปล่อยความรู้กันเลยค่ะ!"
10050030-43 = "ฮ้าวว... อะไรกันน่ะ ยาคุโมะ ใกล้จะถึงเวลานอนแล้วนะ..."
10050030-44 = "นี่ไม่ใช่เวลาจะมาง่วงอยู่นะคะ เมรุ ฉันมีสิ่งที่อยากพูดมากมาย... แต่ตัวเลขน่าจะสื่อความหมายได้#nชัดเจนกว่าคำพูดค่ะ"
10050030-45 = "ดูสิคะ นี่คือส่วนแบ่งยอดขายของวันนี้ค่ะ"
10050030-46 = "ยอดขายเหรอ...? อ้อ นั่นสินะ ลืมไปเลย งั้นขอดูหน่อย..."
10050030-53 = "รุ่นพี่เมรุ? รุ่นพี่เมรุ?! ทำไมถึงล้มไปเลยล่ะคะ?!?!"
10050030-54 = "โมมิจิ ตาของฉันน่าจะมีปัญหาน่ะ... ช่วยเช็กแทนให้หน่อยสิ..."
10050030-55 = "คะ? ไหนดูซิ... นี่มันยอดแบ่งยอดขายของเราในวันนี้นี่คะ? แต่ว่า...?"
10050030-56 = "เฮือกกกกก?!?!"
10050030-57 = "บอกฉันมาตามตรงนะ ยาคุโมะ เธอไม่ได้ไปปล้นธนาคารมาใช่มั้ย? หรือว่าไปใช้ช่องโหว่เพื่อหา#nผลประโยชน์ หรือไปก่ออาชญากรรมทางการเงินอะไรมา...?"
10050030-59 = "คิดว่าฉันเป็นคนยังไงกันคะ? โดยพื้นฐานแล้วฉันเป็นคนที่พยายามรักษาหัวการค้านะคะ"
10050030-60 = "ฉันปฏิเสธที่จะรับเงินใดๆ ก็ตามที่มีที่มาไม่ชัดเจน และจะก่อให้เกิดความเสี่ยงในอนาคตอยู่แล้วค่ะ"
10050030-61 = "ถ้างั้นนี่ก็..."
10050030-62 = "เป็นรายได้จริง... งั้นเหรอคะ?"
10050030-63 = "จริงๆ เลยนะคะ ก็เพราะอย่างนี้ละ นักสร้างสรรค์ทั้งหลายก็เลยรู้แค่วิธีการสร้างสรรค์ แต่ไม่รู้วิธีการโปรโมตผลงานของตัวเอง"
10050030-64 = "เอาเป็นว่าไปซื้อข้าวกินกันก่อนเถอะค่ะ มื้อเย็นของวันนี้ก็ยังไม่ได้กินกันเลยใช่มั้ยล่ะคะ?"
10050030-65 = "ให้ทำแบบนั้นได้จริงเหรอคะ...?"
10050030-66 = "ค่ะ ก็นี่คือความสำเร็จของชมรมแนวร่วมปลดปล่อยความรู้ที่ไม่ว่าใครก็ปฏิเสธไม่ได้นี่คะ"
10050030-67 = "ใช่ค่ะ ยินดีด้วยนะคะ ทุกคน"
10050030-68 = "อ่า เอ่อ... กะ... ก็นะ..."
10050030-69 = "ไม่ได้สิคะ รุ่นพี่เมรุ ในสถานการณ์แบบนี้ รุ่นพี่ยิ่งต้องพูดให้ชัดๆ สิคะ"
10050030-70 = "ขอบคุณค่ะ ชมรมสื่อสิ่งพิมพ์ทุกคน พวกฉัน... รอดกันได้... เพราะได้ทุกคนช่วยไว้เลยค่ะ...!"
10050030-71 = "ก็นะ ยังไงก็ต้องยอมรับว่านี่เป็นหนังสือที่ดีค่ะ ไม่งั้นก็คงไม่ขายดีเป็นเทน้ำเทท่าหรอกค่ะ"
10050030-72 = "เห็นอย่างนี้ ฉันก็ไม่มีพรสวรรค์ในการขายสินค้าที่สินค้าที่ไม่มีศักยภาพอยู่แล้วค่ะ"
10050030-73 = "ทำไมถึงมาชมกันถึงขนาดนี้เนี่ย... ยาคุโมะ"
10050030-74 = "ตายจริง มันแปลกงั้นเหรอคะ? ฉันก็พูดไปตามที่รู้สึกค่ะ แต่ถ้าเป็นทาคาเนะคงไม่ทำแบบนี้หรอก"
10050030-75 = "พอฟังดูก็สมเหตุสมผลดีนะ"
10050030-77 = "หัวหน้า...? คุณเมรูริ? วันนี้ดูสนิทสนมกันจังเลย ทั้งสองคนคุยเรื่องอะไรกันอยู่เหรอคะ?"
10050030-78 = "เฮือก?! มะ... ไม่มีอะไรทั้งนั้น!"
10050030-79 = "ก็แค่... ใช่แล้วค่ะ! ก็แค่การพูดคุยทางธุรกิจทั่วไป... ที่เกิดขึ้นได้อยู่แล้วน่ะค่ะ"
10050030-80 = "ฮืม..."
10050030-81 = "อะ... เอาเถอะค่ะ! ถ้าการตอบรับยังดีแบบนี้ พวกฉันน่าจะขายหนังสือหมดได้ภายในไม่กี่วันค่ะ!"
10050030-82 = "เพราะงั้นก็ตั้งตารอกันได้เลยค่ะ! ไว้ใจพวกฉันได้เลย!"
10050030-83 = "อะ... อื้อ! ที่จริงฉันก็เชื่ออย่างนั้นอยู่แล้ว แต่พอเห็นผลลัพธ์ในวันนี้ก็ยิ่งอยากเชื่อมากขึ้นไปอีก!"
10050030-84 = "ตายจริง ถ้ากับหัวหน้าก็พอเข้าใจได้ แต่กับฉันแล้ว คุณเมรูริเชื่อใจฉันตั้งแต่เมื่อไรกันคะ เป็นเรื่องน่าอัศจรรย์จังเลยนะคะเนี่ย"
10050030-85 = "ขอวางสายแค่นี้ละ! ขอบใจนะ!"
10050030-86 = "คะ... ค่ะ! กินข้าวให้ครบ 3 มื้อกันด้วยนะคะ!"
10050030-91 = "เอาละ! งั้นพวกเราก็นอนกันเถอะค่ะ ต้องพักผ่อนให้เต็มที่ จะได้ทำธุรกิจในวันพรุ่งนี้ได้ยังไงล่ะคะ!"
10050030-92 = "ค่ะ ค่ะ หัวหน้า งั้นเราก็มาพักผ่อนกันบ้างเถอะค่ะ"
10050030-93 = "จะว่าไป ทาคาเนะก็อดทนทำงานลำบากๆ แบบนี้ได้ดีเกินคาดเลยนะคะ? ฉันต้องมองทาคาเนะใหม่แล้วละ"
10050030-94 = "มันก็แน่อยู่แล้วไม่ใช่เหรอคะ? ตารางงานแบบนี้น่ะ ถ้าเทียบกับของเรดวินเทอร์แล้วก็ไม่เท่าไรเลยค่ะ..."
10050030-95 = "ค่ะ ก็ใช่ค่ะ แต่ทาคาเนะดูมีออร่าของผู้ลากมากดีอยู่นิดหน่อยนี่คะ"
10050030-96 = "วันนี้ฉันได้ยินคนอื่นพูดกันด้วยว่าในเรดวินเทอร์มีนักเรียนที่เหมือนคุณหนูสูงศักดิ์ อย่างทาคาเนะอยู่ด้วย..."
10050030-97 = "พะ... พูดเรื่องอะไรคะ หัวหน้า! ในเรดวินเทอร์ไม่มีทางมีคุณหนูอะไรแบบนั้นอยู่แล้วค่ะ!"
10050030-98 = "ถึงความจริงจะเป็นอย่างนั้น แต่ในทางการตลาดแล้ว เราไม่จำเป็นต้องพูดตามความจริง 100% นี่คะ?"
10050030-99 = "ถ้าให้พูดตามตรง โฆษณาส่วนใหญ่ที่ป่าวประกาศออกมามีเนื้อหาที่สรุปได้ว่า 'ฉันไม่ได้โกหก' ค่ะ"
10050030-100 = "อยากจะสื่ออะไรกันแน่คะ หัวหน้า...?"
10050030-101 = "ก็อย่างนี้ไงคะ ลองฟังฉันดูนะ นี่ก็เป็นกลยุทธ์การโปรโมตสินค้าค่ะ มันก็คือ..."
10050030-106 = "ห้องชมรมทวงความยุติธรรม"
10050030-107 = "สวัสดีค่ะ คุณครู! คุณชิมิโกะ! วันนี้เราก็มาก้าวไปข้างหน้า เพื่อสร้างความยุติธรรมกันเถอะค่ะ!"
10050030-108 = "[s] \"อ๊ะ สวัสดี มาชิโระ สดใสและมีพลังตั้งแต่เช้าเลยนะ...\""
10050030-109 = "ดูมุ่งมั่นตั้งใจสุดๆ ไปเลยนะคะ คุณมาชิโระ..."
10050030-110 = "อ่า ถ้าฉันทำให้ตกใจก็ขอโทษด้วยนะคะ ฉันตื่นเต้นนิดหน่อยที่ได้ร่วมงานกับชมรมอ่านหนังสือน่ะค่ะ ที่สำคัญที่สุดคือมีคุณครูอยู่ด้วย"
10050030-111 = "และเหนือสิ่งอื่นใด มันไม่มีอะไรที่ขัดกับความยุติธรรมมากไปกว่าหนังสือเถื่อนที่ไม่ได้รับอนุญาตอีก#nแล้วละค่ะ"
10050030-112 = "ไม่ว่าจะมองมุมไหนก็ดูน่าสงสัย ไม่ว่าจะคิดยังไงก็ไม่ถูกต้อง ฉันว่าต้องมีความไม่ชอบมาพากล#nซ่อนอยู่แน่ๆ..."
10050030-113 = "นี่คือสิ่งที่เราต้องถอนรากถอนโคนไปให้สิ้นซากเลยค่ะ!"
10050030-114 = "[s] (ไฟในการทำงานของมาชิโระดูจะปะทุผิดทิศผิดทางนะ...)"
10050030-115 = "ว่าแต่ คุณมาชิโระได้อ่านหนังสือเล่มนั้นหรือยังคะ?"
10050030-116 = "ไม่จำเป็นต้องอ่านให้เสียเวลาหรอกค่ะ ยังไงมันก็ขัดต่อความยุติธรรมอย่างไม่ต้องสงสัยอยู่แล้วค่ะ"
10050030-117 = "งะ... งั้นเหรอคะ...?"
10050030-118 = "และเวลาที่เราได้รับมา ก็เปรียบเสมือนทรัพยากรที่มีจำกัด..."
10050030-119 = "ฉันก็เลยส่งสมาชิกชมรมทวงความยุติธรรมไปกระจายตัวอยู่ทั่วทรีนิตี้แล้วค่ะ!"
10050030-120 = "อีกไม่นานเราก็น่าจะระบุสถานที่ขายหนังสือเถื่อนนั้นได้แล้วค่ะ!"
10050030-121 = "[s] \"หืม? ส่งคนออกไปสืบแล้วเหรอ?!\""
10050030-122 = "ค่ะ ใช่ค่ะ คุณครู! ฉันจะพยายาม... เต็มที่เลยค่ะ!"
10050030-123 = "พวกเราจะไม่ทำให้ผิดหวังแน่นอนค่ะ!"
10050030-124 = "ขอบคุณค่ะทุกคน ช่วยไปสแตนด์บายในตำแหน่งของตัวเองด้วยนะคะ"
10050030-125 = "เข้าใจแล้วค่ะ!"

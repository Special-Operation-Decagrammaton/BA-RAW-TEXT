[translation]
10050030-1 = "Episode 3;Sales Report"
10050030-2 = "Trinity Student Quarters"
10050030-3 = "Oh heavens. We busted our butts today, and it was just the first day."
10050030-4 = "Good work, President."
10050030-5 = "Anyway, Trinity really is as impressive as they say. I didn't think they'd have somewhere we could stay."
10050030-6 = "This school has more commercial and political networks than most. I expect guest facilities are almost necessities for them."
10050030-7 = "...Though it was somewhat pricey..."
10050030-8 = "Hm, it does eat into our profits more than I'd like. Maybe I should've argued for a bigger cut..."
10050030-9 = "No one in their right mind, not even Meruri, would have agreed at that point..."
10050030-10 = "However, we had a rather successful day today. Surely we can cover our travel and living expenses."
10050030-11 = "You've got a point. Let's see if we're up or down."
10050030-12 = "Eheehee. My favorite part. Let's see, let's see..."
10050030-13 = "..."
10050030-14 = "..."
10050030-19 = "G-Get a hold of yourself, Takane!"
10050030-20 = "Is this a dream, President? I can think of no other rational explanation."
10050030-21 = "Focus, Takane. This is reality. This is real."
10050030-22 = "It's impossible! Good things like this don't happen to us."
10050030-23 = "I know, I know. But accept it. Breathe it in. Enjoy the moment."
10050030-24 = "This really is on a completely different scale. I can barely even count the zeroes. Trinity is scary... So scary..."
10050030-25 = "Like I said, if you want to make money, you have to follow its trail!"
10050030-26 = "It certainly helped that the Trinity students found the plot to be refreshing and new as well."
10050030-27 = "One student in particular even said, \"It's like eating a brand new flavor you've never experienced in your entire life.\""
10050030-28 = "What's familiar to Red Winter can still be new and exciting elsewhere."
10050030-29 = "This is what I've been saying! Culture wants to be exchanged. It NEEDS to be. Without good circulation, it stagnates and becomes harmful, eroding the surrounding environment."
10050030-30 = "...Like an antiquated, spoiled dream."
10050030-31 = "President..."
10050030-32 = "Well, fundamentally, our work is to spread culture and circulate it."
10050030-33 = "...Since culture is a non-biological organism that grows on the soil we call \"money.\""
10050030-34 = "Perhaps it's because the value of money—and the act of exchange—has become a concept larger than the currency itself..."
10050030-35 = "In any case, circulation is necessary. That's the core of what we do."
10050030-36 = "Stagnated dreams and stagnated culture are tragic inheritances that ruin society."
10050030-37 = "Moreover, as culture circulates, money circulates. Heh heh heh."
10050030-38 = "Yes, yes, of course, President..."
10050030-39 = "Anyway, it's settlement time in a different sense! First, let's contact the Knowledge Liberation Front!"
10050030-43 = "*yawn* What is it, Yakumo? It's too late for this."
10050030-44 = "This is no time to snooze, Meru. I have a lot of things to say...but I'm sure numbers will have a greater impact than words."
10050030-45 = "Here. This is today's settlement."
10050030-46 = "Settlement...? Ah, right, right. In that case..."
10050030-53 = "Meru? Meru?! What's wrong?!?!"
10050030-54 = "Momiji. I must be hallucinating... Can you look? Make sure I'm not crazy."
10050030-55 = "Huh? So, this is... Today's settlement? But...?"
10050030-56 = "Eeeek!!!"
10050030-57 = "Be honest, Yakumo. Did you rob a bank or something? Commit white-collar crime? Defraud the entire financial sector?"
10050030-59 = "You've got me all wrong. I live with a business-first mindset."
10050030-60 = "I would never deal in dirty cash. Dirty sources mean dirty risks in the business' future."
10050030-61 = "Then this..."
10050030-62 = "...is real?"
10050030-63 = "Dear, dear. This is what happens when creatives are left to their own devices. They don't even know what it means to sell."
10050030-64 = "C'mon, go get yourselves a nice meal. Let me guess... You ate your hopes and dreams for dinner again?"
10050030-65 = "We can really...?"
10050030-66 = "Yes. No one can deny the results of your hard work."
10050030-67 = "So that's that. Congratulations, everyone."
10050030-68 = "Uh, ah, um, er, well... That is..."
10050030-69 = "You know better, Meru. Say it clearly!"
10050030-70 = "Thank you, Publishing Department. You... You really saved us...!"
10050030-71 = "Well, I suppose it was a well-made book. That's why it sold. "
10050030-72 = "I have no talent in selling things that have no potential."
10050030-73 = "...You? Dolling out compliments?"
10050030-74 = "Is that such a rare occurrence? Well, I can promise you that it'd never happen with Takane, at least."
10050030-75 = "That much we're able to agree on."
10050030-77 = "...President? Meruri? Just what are you two going on about?"
10050030-78 = "Eek?! I-It's nothing!"
10050030-79 = "R-Right! It's just... Um! It's just business talk that can happen between business people!"
10050030-80 = "Hm..."
10050030-81 = "M-Moving on. At the rate these books are flying off the shelves, we'll be out of stock in a few days."
10050030-82 = "So just trust us and watch for our return over the horizon!"
10050030-83 = "Y-Yeah! I already trusted you, but experiencing the results firsthand deepened my trust that much more!"
10050030-84 = "Meruri's trust is more shocking than the president's compliment."
10050030-85 = "Anyways, we're going to bed! Good night! Thank you!"
10050030-86 = "Y-Yes! Eat well!"
10050030-91 = "Well, then. Shall we tuck ourselves in as well? I expect another busy day of sales tomorrow!"
10050030-92 = "Yes, President. Let's get our rest."
10050030-93 = "You've been keeping up surprisingly well with the intense schedule. I'm impressed."
10050030-94 = "It's nothing at all. And this is rather nice compared to back home at Red Winter..."
10050030-95 = "Right, right. But you have a noble aura about you, Takane."
10050030-96 = "Just today, someone said they didn't know a princess like you attends Red Winter..."
10050030-97 = "Wh-What are you saying, President?! You know there's no such thing as nobility in Red Winter!"
10050030-98 = "Well, what's marketing without a teeny tiny bit of deceit mixed in?"
10050030-99 = "...To be frank, most ads realistically tend to be in the \"We're TECHNICALLY Telling the Truth\" zone."
10050030-100 = "...What are you trying to say, President?"
10050030-101 = "It's something like this. Hear me out. This is all a part of our marketing! So..."
10050030-106 = "Justice Task Force Club Room"
10050030-107 = "Hello, Sensei! Shimiko! Let's achieve justice together today as well!"
10050030-108 = "[s] \"Ah, hello. Mashiro. A bright and energetic morning to you...\""
10050030-109 = "You seem very excited, Mashiro..."
10050030-110 = "Ah, sorry if I startled you. The idea of teaming up with not just the Library Committee, but Sensei as well, excited me."
10050030-111 = "And an unauthorized book of this nature must be the very antithesis of justice!"
10050030-112 = "It must be a suspicious, good-for-nothing, unpleasant thing..."
10050030-113 = "We have to pluck it from its roots!"
10050030-114 = "[s] \"(It feels like Mashiro's passion is somewhat misguided...)\""
10050030-115 = "Have you, by chance, read the book, Mashiro?"
10050030-116 = "Of course not! I do not need to read it to know it opposes justice."
10050030-117 = "I-Is that so...?"
10050030-118 = "And time is a limited resource..."
10050030-119 = "So I have already deployed Justice Task Force members all over Trinity."
10050030-120 = "It will not be long before we track down the source of this book's distribution!"
10050030-121 = "[s] \"What? Already?!\""
10050030-122 = "Yes! Sensei. I will...do everything I can!"
10050030-123 = "I will not let you down!"
10050030-124 = "Thank you, everyone. Please stand by at your locations."
10050030-125 = "Understood!"
10050030-130 = "Then I will also head out to the field. Please contact me anytime!"
10050030-135 = "Her passion is incredible..."
10050030-136 = "[s] \"Yes... To the point that it concerns me.\""
10050030-137 = "Are you worried about Mashiro, Sensei?"
10050030-138 = "[s1] \"Well, yes, her. Mashiro...\"\n[s2] \"But also the students responsible for the distribution.\""
10050030-141 = "Ah, you mean them. I was actually thinking something similar."
10050030-142 = "You didn't expect that? But President Ui would likely say something like: There's no way someone who loves books can be bad."
10050030-143 = "Huh? It could be someone who just looks at books as a way to make money?"
10050030-144 = "..."
10050030-145 = "That may be, but I don't think that's the case."
10050030-146 = "With today's technology, books have become more of a collector's item. It's unlikely people will be dealing in them unless they love books in some way or another."
10050030-147 = "If someone truly just wanted to make money, why would they choose to sell books? These days, there are much more efficient methods."
10050030-148 = "[s] \"You do...have a point.\""
10050030-149 = "Right? So I believe the ones creating this ruckus must be good people."
10050030-150 = "...At the very least, they're likely not awful people. I'm sure we'll be able to talk to each other."

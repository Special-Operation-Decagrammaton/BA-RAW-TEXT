10050030-43 = "5;메루;16;후아암…… 뭐야, 야쿠모. 이제 조금 있으면 잘 시간이라고…….\n#5;em;[한숨]\n#5;sig"
10050030-44 = "3;야쿠모;03;지금 졸고 있을 때가 아니에요, 메루. 여러 가지 할 말이 있지만…… 말보다는 숫자가 한번에 와 닿기 마련이죠.\n#5;sig"

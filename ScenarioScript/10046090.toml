[translation]
10046090-1 = "ตอนที่ 9;หากผ่านคืนวันเสาร์ไป"
10046090-4 = "อ๊ะ คุณครู มาแล้วเหรอคะ?"
10046090-5 = "นี่ก็ผ่านไปไม่นานเอง แต่รู้สึกเหมือนไม่ได้เจอคุณครูนานเลยนะคะ"
10046090-6 = "ค่ะ ฉันรู้ค่ะ คุณครูจะแวะไปที่สภาน้ำชาใช่มั้ยคะ?"
10046090-7 = "ฉันจะพาไปเองค่ะ"
10046090-14 = "คุณนางิสะยื่นมือเข้ามาจัดการไว้... ก่อนจะบานปลายเป็นปัญหาทางการทูตน่ะค่ะ"
10046090-15 = "ตอนนี้ชายหาดส่วนตัวของสภาน้ำชาเปิดให้บริการแก่สาธารณชนแล้วค่ะ"
10046090-16 = "เรื่องที่ชมรมพัฒนาออนเซ็นผลุนผลันเข้ามาในหาดก็เลยคลี่คลายได้"
10046090-17 = "แต่พอมีข่าวออกไปว่ามีการเปิดชายหาดแห่งนั้น นักท่องเที่ยวก็หลั่งไหลกันมาจากทั่วสารทิศของ#nคิโวทอสเลยค่ะ... อืม..."
10046090-18 = "ฉันไม่อยากเล่าเท่าไรเลยค่ะว่าเกิดเรื่องอะไรขึ้นบ้างหลังจากนั้น แหะๆๆ"
10046090-23 = "หืม~? หมายความว่ายังไงเหรอ?"
10046090-24 = "บทสนทนานี้ยากเกินไปสำหรับมิกะเหรอคะ? งั้นฉันจะอธิบายให้ฟังนะคะ เอาให้ง่ายๆ แบบที่แม้แต่#nเด็กยังเข้าใจได้เลย"
10046090-28 = "แหะๆ... ฉันขอนำทางคุณครูมาแค่ตรงนี้นะคะ"
10046090-29 = "เรื่องราวหลังจากนี้ ฉันว่าฉันขอไม่ฟังดีกว่าค่ะ"
10046090-30 = "[s1] \"ขอบใจที่พามาส่งนะ ว่าแต่ชมรมนั้น...\"\n[s2] \"จริงสิ ครูมีเรื่องอยากถามอยู่อย่างหนึ่ง\""
10046090-35 = "คะ...? หมายถึงชมรมพัฒนาออนเซ็นเหรอคะ?"
10046090-36 = "อ้อ เท่าที่ฉันรู้มาน่ะ..."
10046090-42 = "เฮ้อ..."
10046090-43 = "จะมีวันไหนบ้างมั้ยคะที่ทั้ง 2 คนจะไม่โต้เถียงกันน่ะ?"
10046090-48 = "ที่พูดมามันเสี่ยงต่อการเข้าใจผิดนะคะ การโต้เถียงกันเป็นคำที่ใช้ระหว่างคู่ต่อสู้ที่มีสติปัญญา#nเท่าเทียมกันค่ะ"
10046090-50 = "คุณเซอา พูดแรงเกินไปแล้วนะคะ..."
10046090-52 = "แหะๆ~ เซอาจังดูจะเก่งเรื่องการโต้เถียงนะ"
10046090-57 = "คุณมิกะ เรามาคุยกันอย่างใจเย็นขึ้นหน่อยเถอะค่ะ"
10046090-59 = "เรื่องการโต้เถียง... ฉันไม่มั่นใจเลยค่ะ ไม่มั่นใจว่าจะไม่ทำให้อีกฝ่ายเดือดร้อนใจน่ะค่ะ"
10046090-60 = "ดูเหมือนว่านิ้วมือของฉันจะแฝงพลังที่ใช้ฆ่าคนได้นะคะ"
10046090-61 = "อะไรน่ะ...? พูดแบบนั้นมันเบียวมากเลยนะ?"
10046090-66 = "[ns3] \"สวัสดีทุกคน\"\n[ns4] \"วันนี้ก็ดูเป็นมิตรกันจังเลยนะ\""
10046090-71 = "คะ... คุณครู?! มีธุระอะไรที่นี่เหรอ?"
10046090-73 = "ฉันเป็นคนเรียกคุณครูมาเองละค่ะ ว่าจะคุยเรื่องการจัดการชายหาดคราวก่อนน่ะ"
10046090-74 = "คงจะดีที่สุดถ้าพวกเราจะยุติเรื่องนี้กันเอง แต่เรื่องผลประโยชน์ร่วมในกระบวนการหลังจากนี้มัน#nค่อนข้างซับซ้อน ฉันก็เลยคิดว่าคงยากที่จะได้ข้อสรุปถ้าไม่มีชาเล่ต์มาช่วยไกล่เกลี่ยค่ะ"
10046090-75 = "ว่าแต่ทำไมแค่การเปิดชายหาดถึงได้เกิดความวุ่นวายขนาดนี้ด้วยก็ไม่รู้..."
10046090-76 = "เพราะอย่างนั้นคุณครูก็เลยจะแวะมาที่นี่เพื่อช่วยคลี่คลายสักระยะหนึ่งค่ะ น่าอายจริงๆ เลยค่ะที่ต้องขอ#nให้มาแบบนี้"
10046090-77 = "[s5] \"ครูก็ฝากตัวกับทุกคนด้วยนะ!\"\n[s6] \"ใช้งานครูได้เต็มที่เลย!\""
10046090-80 = "อ๊ะ ถ้างั้นก็!!"
10046090-81 = "ไม่ได้ค่ะ"
10046090-82 = "ฉันยังไม่ได้พูดอะไรเลยนะ?!"
10046090-83 = "ฉันรู้ค่ะว่าคุณมิกะยังทำงานหลักของตัวเองไม่เสร็จเลย คุณมิกะห้ามเข้าใกล้คุณครู จนกว่าจะส่งแผนงบประมาณเพื่อจัดการชายหาดส่วนตัวและผ่านการตรวจสอบแล้วค่ะ"
10046090-84 = "แหงะ... ไม่ชอบเลยอ่ะ"
10046090-85 = "อย่างที่ฉันบอกเสมอว่านี่ไม่ได้เป็นเรื่องของการชอบหรือไม่ชอบค่ะ คุณมิกะเองไม่ใช่เหรอคะที่เสนอตัว#nเป็นผู้รับผิดชอบตั้งแต่แรกน่ะ? จะทำงานด้วยอารมณ์เหมือนกับอยู่ในสถานที่พักผ่อนหย่อนใจไปตลอด#nไม่ได้หรอกนะคะ"
10046090-86 = "เริ่มบ่นอีกแล้ว~ ทีตอนอยู่ชายหาดล่ะพูดจ้อเรื่องอื่นไม่หยุด~"
10046090-87 = "ก็ตอนนี้กับตอนนั้นมันต่างสถานที่ต่างวาระกันนี่คะ การปฏิบัติตัวของเราย่อมต้องแตกต่างกันไปตาม#nกาลเทศะค่ะ"
10046090-88 = "ที่จิตวิญญาณของโรงเรียนทรินิตี้ค่อยๆ เสื่อมถอยลงก็มาจากความผิดพลาดของพวกเราไม่น้อยเลยค่ะ พวกเราสภาน้ำชาต้องตระหนักถึงอิทธิพลของตัวเอง และต้องตื่นตัวอยู่เสมอเพื่อเป็นตัวอย่างให้กับ#nนักเรียนคนอื่นค่ะ"
10046090-89 = "คุณเซอาเองก็เหมือนกันค่ะ!"
10046090-94 = "ฉันยังไม่ได้พูดอะไรเลยสักคำนะคะ...?"
10046090-96 = "บ่นชุดใหญ่จังเลย..."
10046090-97 = "[s] \"ที่ชายหาดไม่กี่วันมานี้เป็นเรื่องน่าเหลือเชื่อเลยละ\""
10046090-102 = "นั่นสินะ ฮิฮิ"
10046090-110 = "หืม?"
10046090-111 = "โอ้ว~ ใครกันเนี่ย?"
10046090-117 = "เป็นของขวัญที่คาดไม่ถึงเลยนะ คุณครูมาหาพวกฉันก่อนเลยเหรอ?"
10046090-118 = "หืม? ทำไมฉันถึงอยู่คนเดียวน่ะเหรอ?"
10046090-123 = "อืม~ เรื่องนั้นน่ะ เหมือนว่าการที่พวกฉันไป 'ทำเรื่องดีๆ' ไว้ในเขตปกครองตนเองทรีนิตี้จะล่วงรู้ถึงหู#nของประธานคณะกรรมการวินัยเข้าน่ะ"
10046090-124 = "ตอนนี้พวกฉันก็เลยไม่อยากจะเจอคณะกรรมการวินัยสักเท่าไร แต่ก็แค่นิดเดียว~~~ นะ"
10046090-125 = "เพราะงั้นพวกฉันเลยจะอยู่กันเงียบๆ จนกว่าท่านประธานแพนเดโมเนียม โซไซตี้ที่ยิ่งใหญ่ของพวกฉัน#nจะหาเรื่องทำให้ประธานคณะกรรมการวินัยสติแตกได้ก่อนยังไงล่ะ"
10046090-126 = "แล้วนี่ก็เป็นการให้สมาชิกชมรมเราได้หยุดพักร้อนกันด้วยน่ะ! วะฮ่าฮ่าฮ่า!"
10046090-130 = "หืม? แล้วทำไมฉันถึงมาอยู่ที่นี่น่ะเหรอ?"
10046090-131 = "ก็อย่างที่คุณครูรู้นั่นละ ก็แหม~ ฉันมันค่อนข้างมีชื่อเสียงนี่นา"
10046090-135 = "มีคนจำฉันได้เยอะแยะไปหมด ถ้าใครมาอยู่กับฉันก็คงไม่ได้พักผ่อนกันหรอก"
10046090-136 = "ฉันก็เลยใช้ข้ออ้างนั้นมาอ่านหนังสืออยู่คนเดียวน่ะสิ...! วะ~ ฮะฮะฮะฮ่า!"
10046090-137 = "คุณครูคงไม่คิดว่าฉันจะปล่อยทุกคนไปพักร้อนแล้วไม่ได้พักอยู่คนเดียวหรอกใช่มั้ย?"
10046090-138 = "ตอนนี้ฉันปิดกิจการของชมรมพัฒนาออนเซ็นชั่วคราวน่ะ ฉันไม่รู้หรอกว่าคุณครูมาหาใคร และต้องบอกไว้ล่วงหน้าว่าฉันก็ไม่รู้ว่าสมาชิกชมรมแต่ละคนอยู่ไหนกันด้วย~"
10046090-139 = "หืม? ไม่ได้มาหาคนอื่น? แต่มาคุยธุระกับฉันงั้นเหรอ?"
10046090-140 = "ทำยังไงดีล่ะ ฉันไม่ใช่คนใจบุญที่ทำธุระให้ใครฟรีๆ น่ะสิ"
10046090-141 = "แต่ฉันก็เป็นติดหนี้กับคุณครูอยู่หลายเรื่อง งั้นฉันก็ไม่ควรใจดำกับคุณครูหรอกเนอะ~"
10046090-142 = "ว่าไงล่ะ ตกลงมีธุระอะไร?"
10046090-143 = "[s7] \"ทำไมตอนนั้นถึงช่วยอิจิกะเหรอ?\"\n[s8] \"ทำไมตอนนั้นคาสุมิถึงช่วยอิจิกะเหรอ?\""
10046090-146 = "ถามอะไรแปลกๆ การสงสัยแบบนี้มันผิดตั้งแต่แรกเลยนะ"
10046090-147 = "มันเป็นสัญญาของเราน่ะ ทั้งสัญญาที่บอกว่าจะคืนอุปกรณ์ก่อสร้างที่ถูกยึดไปทั้งหมด และสัญญาที่บอกว่าจะช่วยทำให้พัฒนาชายหาดส่วนตัวได้"
10046090-148 = "ฉันพูดเหมือนช่วยเหลือคนอื่นด้วยเจตนาดีเลยเนอะ? แต่ไม่ใช่หรอก ฉันแค่ทำตามสัญญาต่างหาก"
10046090-149 = "......"
10046090-150 = "ปกติถ้ากับคนอื่นฉันแค่พูดอ้อมแอ้มแบบนี้ก็จบเรื่อง~ แต่กับคุณครูคงใช้ไม่ได้ผลสินะเนี่ย"
10046090-151 = "อยากรู้ความรู้สึกที่แท้จริงของฉันงั้นเหรอ?"
10046090-159 = "ก็ไม่รู้สิ?"
10046090-160 = "ฉันก็ไม่ได้มีเหตุผลอะไรพิเศษหรอก ก็แค่อยากทำแบบนั้นน่ะ"
10046090-161 = "ทำไมล่ะ เหมือนฉันโกหกหรือไง?"
10046090-165 = "ทุกคนก็เคยมีวันแบบนั้นกันไม่ใช่เหรอ?"
10046090-166 = "วันที่อยากแกล้งเป็นบ้าและทำในสิ่งที่ปกติไม่เคยทำน่ะ"
10046090-167 = "วันนั้นมันก็เป็นวันแบบนั้นละ ทั้งคุณหนูที่น่ารัก แล้วก็ฉันด้วย"
10046090-168 = "เอาเป็นว่าเราให้เหตุผลเป็นอย่างนั้น แล้วปล่อยมันไปเถอะ นะ?"
10046090-169 = "การมาขุดคุ้ยเรื่องราวในอดีตก็ไม่ใช่เรื่องดีเท่าไรด้วยไม่ใช่เหรอ?"
10046090-175 = "หัวหน้า~!!!!"
10046090-179 = "โธ่ถัง!"
10046090-184 = "เอ๋ คุณครูก็อยู่ด้วยเหรอเนี่ย! งั้นก็ดีเลยนะ! ฉันซื้อไอศกรีมมาน่ะ มากินด้วยกันสิ!"
10046090-185 = "ให้หัวหน้ากับคุณครูคนละแท่ง ส่วนของฉันต้องไปซื้อมาใหม่ แต่ไม่เป็นไรหรอก!"
10046090-186 = "หะ... หืม?"
10046090-187 = "เดี๋ยวนะ เดี๋ยวก่อน เมกุ"
10046090-188 = "อืม...? เอ๋? ทำไมเมกุถึงมาที่นี่ในตอนนี้ล่ะ?"
10046090-189 = "หัวหน้า เป็นอะไรไปเนี่ย? หัวหน้าเรียกฉันมาเองแท้ๆ แต่ทำไมทำหน้าบึ้งตึงแบบนั้นล่ะ?"
10046090-190 = "เอ่อ เมกุ? เมกุเองก็เป็นนักอ่านเหมือนกันใช่มั้ย ที่ผ่านมาฉันแค่ไม่รู้ใช่มั้ยล่ะ?"
10046090-191 = "อ่า... ไม่นะ ฉันไม่ค่อยชอบอ่านหนังสือเท่าไร ฉันก็ชอบหนังสือที่มีรูปภาพเยอะๆ หรอกนะ แต่ว่าหนังสือที่หัวหน้าอ่านน่ะมีแต่ข้อความ แล้วตัวก็เล็กอีก"
10046090-192 = "ก็คงอย่างนั้นละเนอะ? ฉันก็กะไว้แล้วละ"
10046090-193 = "ถ้างั้นเมกุมาที่นี่ทำไมเหรอ...?"
10046090-194 = "ก็หัวหน้าบอกให้ฉันทำสิ่งที่อยากทำไม่ใช่เหรอ? ฉันก็เลยจะทำในสิ่งที่อยากทำไงล่ะ"
10046090-195 = "หืม? หืมมมม~?"
10046090-202 = "เอ๋ อะไรเนี่ย? หัวหน้าเมกุก็อยู่ที่นี่เหรอ?"
10046090-203 = "ทำยังไงดีล่ะ? พวกฉันคิดว่าจะมีแค่หัวหน้าชมรม ก็เลยไม่ได้ซื้อของหัวหน้าเมกุมาด้วยน่ะสิ"
10046090-209 = "อ่า... หรือว่าคำสั่งของฉันมันไม่เคลียร์งั้นเหรอ?"
10046090-210 = "ฉันให้ทุกคนไปทำสิ่งที่อยากทำโดยไม่ต้องเกี่ยวกับงานของชมรมก็ได้... แต่ทำไมทุกคนถึงกลับมาที่นี่กันล่ะ?"
10046090-215 = "หืม? ก็... กลัวว่าหัวหน้าจะเบื่อถ้าอยู่คนเดียวน่ะสิ"
10046090-216 = "ก็ถ้าพวกเราปล่อยหัวหน้าไว้คนเดียว หัวหน้าก็จะไม่ไปไหนและเอาแต่อ่านหนังสือใช่ไหมล่ะ?"
10046090-217 = "อ้อ บอกไว้ก่อนเลยนะว่าพวกฉันไม่ได้เตี๊ยมกันเลย"
10046090-218 = "พวกเราก็บังเอิญมาเจอกันข้างหน้านี้เหมือนกัน"
10046090-226 = "เอ๋ อะไรเนี่ย? ทุกคนอยู่ที่นี่เหรอ?"
10046090-227 = "พวกฉันมาช้างั้นเหรอ?"
10046090-229 = "ฮึ่ม..."
10046090-233 = "ฮะฮ่า"
10046090-234 = "วะ~ ฮะฮะฮะฮ่า!! คุณครู ดูเข้าสิ!"
10046090-235 = "บอกแล้วว่าฉันดวงดีเรื่องบริวารจริงๆ..."
10046090-236 = "เอ่อ ขอโทษจริงๆ นะ คุณครู"
10046090-237 = "[s9] \"อื้อ คงจะอายสินะ งั้นไว้ครูแวะมาใหม่!\"\n[s10] \"ขี้อายสินะเรา!\""
10046090-242 = "ว่าไงนะ...?"

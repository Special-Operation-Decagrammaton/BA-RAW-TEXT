[translation]
10046090-1 = "第9話;當週六夜過去"
10046090-4 = "啊，老師。歡迎你來。"
10046090-5 = "雖然才沒過多久，感覺卻像很久沒見了呢。"
10046090-6 = "嗯，我知道。老師是來拜訪茶會的對吧？"
10046090-7 = "我幫你帶路。"
10046090-14 = "在事情演變成外交問題之前，渚大人率先採取行動……"
10046090-15 = "將茶會的私人海灘對外開放了。"
10046090-16 = "拜其所賜，溫泉開發部的擅自闖入才得以不了了之。"
10046090-17 = "不過海灘開放的消息一傳出去，奇普托斯各地的客人便蜂擁而至……"
10046090-18 = "至於後來發生了什麼事情……我就先不提了。#n哈，哈哈……"
10046090-23 = "嗯～？所以你是什麼意思？"
10046090-24 = "對彌香來說還是太難了嗎？#n那我改用幼兒也能懂的方式解釋給你聽吧。"
10046090-28 = "……哈哈，我就送老師到這裡吧。"
10046090-29 = "後面的內容，我還是不要聽比較好。"
10046090-30 = "[s1]「謝謝你帶我來，一花。」\n[s2]「對了，我有件事想問你。」"
10046090-35 = "……是關於溫泉開發部嗎？"
10046090-36 = "唔嗯，據我所知……"
10046090-42 = "唉……"
10046090-43 = "你們兩位就非得每天爭執個不停嗎？"
10046090-48 = "這話似乎不夠嚴謹呢。#n所謂的爭執，必須在雙方都具備同等智慧的前提下才能成立。"
10046090-50 = "聖亞同學，這麼說未免也太……"
10046090-52 = "嘿～聖亞醬～你連爭執也很懂是吧？"
10046090-57 = "彌香同學，請你也先冷靜下來。"
10046090-59 = "爭執……我確實沒什麼自信。#n不過是在不讓對方受傷這方面就是了。"
10046090-60 = "畢竟在我的手指之中，似乎蘊含著足以致人於死的力量啊。"
10046090-61 = "……什麼意思？是某種中二病宣言嗎？"
10046090-66 = "[ns3]「嗨。」\n[ns4]「感情還是一樣好呢。」"
10046090-71 = "老，老師！？你怎麼會來這裡？"
10046090-73 = "是我請老師來的。#n為了處理開放海灘而引發的後續問題。"
10046090-74 = "雖然我原本希望能自行解決，可惜牽涉到的利害關係實在太多……#n若是缺少夏萊的協調，恐怕難以圓滿收場。"
10046090-75 = "沒想到只是將海灘對外開放，居然會引發這麼多騷動……"
10046090-76 = "這段期間再麻煩老師多多協助了……真是不好意思。"
10046090-77 = "[s5]「雖然有點突然，但請多指教囉！」\n[s6]「儘管使喚我吧！」"
10046090-80 = "啊，那麼……！！"
10046090-81 = "不行。"
10046090-82 = "我都還沒說完耶！？"
10046090-83 = "因為彌香同學還沒完成自己分內的工作。#n在提交私人海灘的管理預算案並通過審核之前，不得接近老師。"
10046090-84 = "吼唷，討厭。"
10046090-85 = "我已經強調過很多次，這不是喜不喜歡的問題。#n當初主動承擔責任的不是彌香同學自己嗎？不可以永遠都抱著渡假的心情。"
10046090-86 = "又開始念念念了～#n渚醬在海灘上明明也玩得很開心的說～"
10046090-87 = "當時的場合與地點都和現在不同。#n在每個場合都拿出應有的態度……這就是所謂的格調，所謂的禮儀。"
10046090-88 = "如今三一的校風逐漸鬆散，我們也難辭其咎。#n身為茶會成員的我們應當意識到自身的影響力──#n時刻保持警惕、成為他人的榜樣才是。"
10046090-89 = "聖亞同學也一樣！"
10046090-94 = "……我什麼話都沒說耶？"
10046090-96 = "真是可怕的碎念連環砲……"
10046090-97 = "[s]「幾天前在海灘的景象，簡直就像一場夢呢。」"
10046090-102 = "就是說呀，嘿嘿。"
10046090-110 = "嗯？"
10046090-111 = "哦～這可真是位稀客啊。"
10046090-117 = "是什麼風把老師颳來了呢？"
10046090-118 = "嗯？怎麼只有我一個人？"
10046090-123 = "哎呀～其實是我們之前在三一做的「好事」似乎傳進風紀委員長耳裡了。"
10046090-124 = "所以現在實在有～～～點不想見到風紀委員會。"
10046090-125 = "因此在風紀委員長的注意力被萬魔殿議長吸走之前，我們決定暫時克制一下。"
10046090-126 = "順便也讓部員們過個暑假！哈～哈哈哈哈！"
10046090-130 = "嗯？那我為什麼待在這裡？"
10046090-131 = "老師你應該也知道，我姑且算是挺有人氣的吧？"
10046090-135 = "因為會認出我的人實在太多，跟我待在一起根本沒辦法好好渡假。"
10046090-136 = "……不過這其實只是我爭取看書時間的藉口而已啦！哈～哈哈哈哈！"
10046090-137 = "難道你認為我是會主動讓自己吃虧的那種人嗎？"
10046090-138 = "總之呢，溫泉開發部目前暫時停業。#n雖然不知道你想找的人是誰，但我也不清楚部員們現在人在哪裡～"
10046090-139 = "嗯？是來找我的？"
10046090-140 = "該怎麼辦好呢。#n我畢竟不是做慈善的，可不能免費幫忙。"
10046090-141 = "不過我平時也受了老師不少幫助，還是別那麼錙銖必較吧～"
10046090-142 = "所以呢，你找我有什麼事嗎？"
10046090-143 = "[s7]「我只是覺得有點好奇。」\n[s8]「你當時為什麼會決定幫助一花呢？」"
10046090-146 = "這個問題從前提開始就錯了哦。"
10046090-147 = "那純粹只是契約關係而已。#n無論是被沒收的建材，還是私人海灘的開發權……我都確實拿到了。"
10046090-148 = "怎麼被老師說得像是善意的幫忙一樣呢？"
10046090-149 = "…………"
10046090-150 = "平常只要這樣就能糊弄過去了，怎麼對老師就不管用了呢？"
10046090-151 = "你是想聽我的真心話吧？"
10046090-159 = "……沒什麼特別的理由。"
10046090-160 = "就只是那天心情好而已。"
10046090-161 = "嗯？聽起來像是在說謊？"
10046090-165 = "每個人都會有那種時候吧？"
10046090-166 = "突然起心動念，想嘗試一些平常絕對不會做的事。"
10046090-167 = "那天只是碰巧遇上了那個日子而已。#n無論對那個可愛的小姑娘，還是我來說都一樣。"
10046090-168 = "就當作是這麼回事吧？"
10046090-169 = "追究已經過去的事情也不怎麼帥氣，你說是吧？"
10046090-175 = "部長～～！！"
10046090-179 = "哇！？"
10046090-184 = "咦，原來老師也在啊！那正好！#n我買了冰淇淋過來，大家一起吃吧！"
10046090-185 = "先給部長和老師一人一份，我的份待會再去買就好！"
10046090-186 = "唔……嗯？"
10046090-187 = "不不不，你先等等，惠。"
10046090-188 = "……奇怪，為什麼惠會出現在這裡？"
10046090-189 = "怎麼了嗎，部長？#n怎麼找人過來卻露出那種痛苦的表情？"
10046090-190 = "那個，該不會惠也是個讀書人吧？#n我怎麼不知道有這個設定？"
10046090-191 = "沒……沒有啦，我不太喜歡看書。#n圖多的書還能考慮一下，可是部長看的書都只有超小的字而已。"
10046090-192 = "也是啦，跟我預想的差不多。"
10046090-193 = "……那惠又為什麼會來這裡？"
10046090-194 = "部長不是要我們做自己想做的事嗎？#n所以我就來做自己想做的事了呀！"
10046090-195 = "嗯？嗯～～～？"
10046090-202 = "哎呀，原來惠班長也在啊？"
10046090-203 = "本來以為只有部長一個人，所以沒有買班長的份呢。#n這下該怎麼辦呢。"
10046090-209 = "……奇怪，是我那時候表達得不夠清楚嗎？"
10046090-210 = "我明明告訴大家可以去做跟社團無關、自己想做的事……怎麼又全都跑回來了？"
10046090-215 = "嗯？因為……我怕部長一個人會覺得寂寞啊。"
10046090-216 = "就是說啊。#n要是放著不管的話，部長就會自己一個人窩著看書對吧？"
10046090-217 = "啊，話先說在前頭，我們可沒有跟班長偷偷約好哦？"
10046090-218 = "沒錯沒錯，我們也是剛剛才在外頭遇到的。"
10046090-226 = "咦？怎麼，原來大家都在啊。"
10046090-227 = "看來是我們晚了一步？"
10046090-229 = "哈……"
10046090-233 = "哈哈。"
10046090-234 = "哈～哈哈哈哈！！老師，你看到了嗎！"
10046090-235 = "居然能遇上一群這麼好的部員，我可真是走運啊……"
10046090-236 = "那個……不好意思啦，老師。"
10046090-237 = "[s9]「嗯，我之後還會再來的！」\n[s10]「看來佳澄也是會害羞的嘛？」"
10046090-242 = "……什麼？"
10046090-243 = "哈哈。"
10046090-256 = "算了，就當作是這樣吧。"
10046090-257 = "夏日天空的約定"

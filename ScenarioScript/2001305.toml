[translation]
2001305-1 = "บำรุงรักษา"
2001305-2 = "ศูนย์ข้อมูลใกล้ๆ เขตธุรกิจศูนย์กลาง"
2001305-8 = "สายเคเบิลและแลนเชื่อมต่อกันดีแล้ว ความจุฮาร์ดแวร์ก็เพียงพอ..."
2001305-9 = "การตั้งค่าความปลอดภัยไม่มีอะไรผิดปกติ หลังจากอัปเดตเคอร์เนลล่าสุดแล้ว แค่สำรอง DB ไว้ก็พอ"
2001305-10 = "[s] \"...\""
2001305-11 = "ทำไมน่ะ? คิดว่าเป็นแฮ็กเกอร์แล้วจะต้องนั่งกดคีย์บอร์ดอย่างบ้าคลั่ง พร้อมกับมองหน้าจอ#nคอมพิวเตอร์ที่มีไฟสีแดงกระพริบอย่างนั้นเหรอ?"
2001305-12 = "ก็ไม่ใช่ว่าจะไม่มีเหตุการณ์ฉุกเฉินที่ต้องรับมือเร่งด่วนขนาดนั้นหรอกนะ..."
2001305-13 = "วันนี้แค่ตรวจสอบตามที่กำหนดไว้น่ะ ถ้าทุกอย่างปกติก็แค่ทำไปตามปกติก็พอ"
2001305-14 = "[s] \"แล้วทำไมต้องมาทำงานกลางดึกแบบนี้ด้วยล่ะ?\""
2001305-15 = "ก็เพราะว่าตอนที่ตรวจสอบจะใช้งานเซิร์ฟเวอร์ไม่ได้น่ะสิ ถึงจะต่างกันไปตามประเภทของเซิร์ฟเวอร์#nก็เถอะ เลยต้องทำในช่วงที่คนใช้งานน้อยเพื่อหลีกเลี่ยงไม่ให้เกิดความไม่สะดวก"
2001305-16 = "อีกอย่างตอนกลางคืนก็มีคนใช้งานในพื้นที่น้อยทำให้ประมวลผลข้อมูลเร็วด้วย"
2001305-17 = "...แต่ก็แน่นอนว่าการที่มาตรวจสอบตอนกลางคืนแบบนี้มันก็ไม่ได้มีแต่เรื่องดีๆ มันอาจจะมีบางคนที่#nต้องการใช้งานเซิร์ฟเวอร์ตอนกลางคืนอยู่ก็ได้"
2001305-18 = "ยังไงก็คงทำให้ทุกคนพอใจไม่ได้อยู่แล้ว ฉันก็เลยทำตามที่ตัวเองคิดว่าถูกต้องก็แค่นั้นน่ะ"
2001305-19 = "[s] \"ลำบากมากเลยสินะ\""
2001305-20 = "ไม่ได้ลำบากอะไรหรอก ก็นี่มันงานของฉันนี่นา"
2001305-24 = "...การบำรุงรักษาเซิร์ฟเวอร์ก็เหมือนกับงานของตำรวจหรือนักดับเพลิง การที่ไม่มีงานทำมันก็นับว่า#nเป็นเรื่องดีอยู่หรอก"
2001305-25 = "ไม่ว่าจะเป็นผู้ดูแลเซิร์ฟเวอร์ที่มีความสามารถมากแค่ไหน ก็แค่ต้องการดูแลให้เซิร์ฟเวอร์ 'ไม่มีปัญหา' อะไรเท่านั้น"
2001305-26 = "อาจจะเป็นงานที่เรียบง่าย และมีช่วงที่ยากลำบากอยู่บ้าง...แต่ก็ต้องมีคนทำงานแบบนี้ โลกถึงจะหมุนไปได้ตามปกติใช่มั้ยล่ะ?"
2001305-31 = "[ns] \"ฮ้าวว...\""
2001305-32 = "คุณครูคงจะเหนื่อยมากสินะ"
2001305-33 = "ใกล้จะสำรองข้อมูลเสร็จแล้วล่ะ เดี๋ยวตรวจสอบเสร็จแล้วเราออกไปหากาแฟดื่มกันหน่อยดีมั้ย?"
2001305-34 = "[s] \"แต่ว่าเวลาแบบนี้ ร้านน่าจะปิดหมดแล้วนะ\""
2001305-35 = "ไม่เป็นไร ฉันมีร้านที่ไปเป็นประจำเวลาโต้รุ่งอยู่น่ะ"
2001305-36 = "ฉันเคยบอกว่าจะเลี้ยงกาแฟคุณครูหนึ่งแก้ว งั้นรอบนี้ฉันจ่ายให้เอง"
2001305-37 = "ถ้างั้น...รอแป๊บหนึ่งนะ"
2001305-42 = "(หลังจากตรวจสอบเซิร์ฟเวอร์เสร็จเรียบร้อยก็เดินออกมาที่ถนนในซอยพร้อมจิฮิโระ)"
2001305-47 = "[ns] \"ในซอยแบบนี้จะยังมีคาเฟ่เปิดอยู่ด้วยเหรอ?\""
2001305-48 = "อืม เคยอยู่แถวนี้นี่น่า"
2001305-52 = "อ่า...อยู่นี่เอง คุณครู มาทางนี้สิ"
2001305-58 = "― ฮุฮุ คิดแล้วเชียว ว่ารสชาติของกาแฟที่ดื่มหลังทำงานเสร็จนี่อร่อยดีจริงๆ[wa:3440] "
2001305-61 = "― หืม...? นึกว่าจะเป็นคาเฟ่งั้นเหรอ?[wa:2040] "
2001305-64 = "― ขอโทษนะ เวลาแบบนี้คงไม่มีที่ที่จะดื่มกาแฟได้แล้วล่ะ[wa:1350] "
2001305-66 = "― ที่ที่จะดื่มกาแฟได้... ก็คงจะมีแค่ที่นี่เท่านั้น[wa:80] "
2001305-69 = "― ฉันน่ะ หลังจากที่...ทำงานโต้รุ่งเสร็จแล้ว[wa:1680] "
2001305-71 = "― ก็จะมาดื่มกาแฟที่นี่ ทุกครั้งเลย[wa:10] "
2001305-74 = "― ตู้ขายกาแฟนี่น่ะ ในเวลาแบบนี้...[wa:1420] "
2001305-76 = "― ถึงจะไม่มีใครเห็น...[wa:40] "
2001305-79 = "― มันก็ยังทำงานต่อไปแบบเงียบๆ อยู่นี่น่า[wa:1840] "
2001305-82 = "― ภาพของมัน... ที่ตั้งใจทำงาน[wa:10] "
2001305-84 = "― ในสถานที่มืดๆ ทำให้ฉันรู้สึกเหมือนเห็นตัวเองเลยน่ะ...[wa:1230] "
2001305-87 = "― คุณครูเอง...[wa:760] "
2001305-89 = "― ถ้าคุณครูได้ลองลิ้มรสกาแฟนี่ดู จะต้องชอบแน่ๆ[wa:1760] "
2001305-92 = "เอ๊ะ เวลาผ่านไปขนาดนี้แล้วเหรอ"
2001305-93 = "พอได้คุยกับคุณครูก็ไม่รู้ตัวเลยว่าพระอาทิตย์ขึ้นแล้ว"
2001305-94 = "เที่ยวรถช่วงดึกน่าจะหมดแล้วละ คงจะกลับหอพักของมิลเลเนียมลำบากแล้วสิ..."
2001305-95 = "คุณครู... ขอยืมห้องนอนที่ชาเล่ต์หน่อยได้รึเปล่าล่ะ?"
2001305-97 = "(หลังจากนั้นก็เดินทางกลับมาที่หอพักของชาเล่ต์เพื่อให้จิฮิโระได้นอนหลับพักผ่อน)"

[translation]
2001305-1 = "#title;메인터넌스"
2001305-2 = "#place;중앙구 업무지구 인근 데이터 센터"
2001305-3 = "#wait;200"
2001305-4 = "1;치히로;01\n#1;a\n#wait;2500"
2001305-5 = "1;치히로;01\n#1;m4\n#wait;1000"
2001305-6 = "#wait;2000"
2001305-7 = "1;치히로;01\n#1;greeting\n#wait;1500"
2001305-8 = "1;치히로;02;케이블과 랜의 접속 상태도 양호하고, 하드웨어 용량도 충분하고…….\n#1;em;…"
2001305-9 = "1;치히로;03;보안 설정에도 이상이 없네. 최신 커널을 업데이트한 뒤 DB만 백업해두면 되겠어.\n#1;m3"
2001305-10 = "[s] \"…….\""
2001305-11 = "1;치히로;01;왜. 해커의 작업이라고 해서 빨간 불이 점멸하는 모니터 아래에서 정신없이 키보드를 두들기는 광경을 상상했었어?\n#1;em;[?]"
2001305-12 = "1;치히로;99;뭐, 그렇게 실시간으로 긴급 대응을 요하는 경우도 없는 건 아니지만……."
2001305-13 = "1;치히로;03;오늘은 정기점검이고, 정상적인 상황이라면 루틴에 맞추어 작업하기만 하면 되니까.\n#1;greeting\n#1;em;[음표]"
2001305-14 = "[s] \"그런데 어째서 한밤중에 작업을 하는 거야?\""
2001305-15 = "1;치히로;02;그야 점검 중에는 서버를 사용할 수 없으니까. 서비스 종류에 따라 다르겠지만, 보통은 사람들의 접속이 뜸한 심야의 시간대를 활용해야 불편을 최소화할 수 있거든.\n#1;em;[반응]"
2001305-16 = "1;치히로;01;그리고 한밤중에는 업무지구의 회선을 쓰는 사람이 적기 때문에 데이터를 처리하는 속도도 더 빠르다는 장점도 있지."
2001305-17 = "1;치히로;99;……물론 심야에 진행하는 점검이라 해도 좋은 소리만 듣는 건 아니야. 누군가는 한밤중에 서비스를 이용하고 싶을 수도 있으니까."
2001305-18 = "1;치히로;02;어떻게 한들 모두를 만족시킬 수 없다면 내가 맞다고 생각하는 편을 따르는 게 좋겠지."
2001305-19 = "[s] \"고생이 많네.\""
2001305-20 = "1;치히로;02;고생이랄 것도 없어. 이게 내 일인걸."
2001305-21 = "#st;[0,0];instant;1;"
2001305-22 = "#clearST"
2001305-23 = "1;치히로;01\n#1;em;…\n#wait;2500"
2001305-24 = "1;치히로;99;……서버 유지는 경찰이나 소방관의 일과 마찬가지야. 할 일이 없으면 없을수록 좋지."
2001305-25 = "1;치히로;06;아무리 유능한 서버 관리자라 하더라도 '문제가 없게' 서버를 운용하는 게 고작이니까."
2001305-26 = "1;치히로;03;수수한 일이고, 힘든 때도 많지만…… 이런 부류의 일을 하는 사람도 있어야 세상이 제대로 돌아가지 않겠어?\n#1;em;[반짝]"
2001305-27 = "#st;[0,0];instant;1;"

[translation]
2001305-1 = "伺服器維護"
2001305-2 = "中央區．數據中心"
2001305-8 = "線纜的連接狀況沒有問題，硬碟的容量也十分充足……"
2001305-9 = "安全系統設定也沒有異常。更新核心後進行DB的備份……"
2001305-10 = "[s] 「……」"
2001305-11 = "……難道老師期待著，既然是駭客就應該「在五顏六色的燈光閃爍之中對著螢幕中大量出現的視窗敲著鍵盤」之類的情景嗎？"
2001305-12 = "嘛，實際上如果是需要即時應對的緊急狀況的話，倒也不是沒有那種情景……"
2001305-13 = "不過今天只不過是定期維護的一環，基本上只會進行例行性的作業而已。"
2001305-14 = "[s] 「不過為何要在深夜進行呢？」"
2001305-15 = "那是因為在維護中，伺服器無法運作。雖然會因為服務的種類而有所不同，不過還是在連接數比較少的深夜時段比較理想。"
2001305-16 = "還有，在這種深夜時段使用附近線路的人比較少，數據處理不會有延遲也是一個優點。"
2001305-17 = "……不過當然就算是深夜，也不都只有優點。畢竟也有想要在這種時段使用服務的人嘛。"
2001305-18 = "因為無論如何都無法同時滿足所有人，最終我選擇相信自己，在安靜的時候進行。"
2001305-19 = "[s] 「真辛苦呢……」"
2001305-20 = "嘛，也沒什麼。這就是我的工作嘛。"
2001305-24 = "……這種安全層面的工作，就像警察跟消防員一樣，沒事才是好事。"
2001305-25 = "不管是個多麼優秀的伺服器管理者，「沒有問題」的狀態才是最棒的。"
2001305-26 = "雖然很枯燥，也會遇到辛苦的事情，不過這份工作也有獨特的優點。"
2001305-31 = "[ns] 「呼……」"
2001305-32 = "呵呵，差不多到適合的時間了呢。"
2001305-33 = "備份作業似乎也快完成了，結束之後要不要去喝杯咖啡呀？"
2001305-34 = "[s] 「雖然我贊成，不過這種時間還有店開著嗎……」"
2001305-35 = "沒問題，我有個通宵工作後常常去的好地方。"
2001305-36 = "跟之前說得一樣，這次我請客。"
2001305-37 = "那麼，我想差不多該結束了……"
2001305-42 = "（結束伺服器的維護後，和千尋一起離開，來到了附近的巷子裡）"
2001305-47 = "[ns] 「在這種地方……？」"
2001305-48 = "嗯，就快到了。"
2001305-52 = "來吧，老師，在這裡。"
2001305-58 = "— 呵呵，果然，工作結束後喝的咖啡，別有一番滋味呢。[wa:5240] "
2001305-61 = "— ……嗯？你以為會去咖啡廳嗎？[wa:2800] "
2001305-64 = "― 真抱歉。這種時間已經沒有店家在營業了，[wa:2630] "
2001305-66 = "― 也只有這種地方能喝點東西。[wa:1480] "
2001305-69 = "― 我每次通宵工作後都會在這裡，[wa:2760] "
2001305-71 = "― 喝著咖啡。[wa:600] "
2001305-74 = "― 這台販賣機就算在這種時間，[wa:2180] "
2001305-76 = "― 就算沒有人看到，[wa:520] "
2001305-79 = "― 也依然默默認真地盡著自己的職責。[wa:2720] "
2001305-82 = "― 總覺得這一點，[wa:380] "
2001305-84 = "― 和自己的工作好像重疊了一樣……[wa:2750] "
2001305-87 = "― ……如果老師也能夠，[wa:840] "
2001305-89 = "― 理解這杯咖啡的滋味的話，我會很開心的。[wa:2760] "
2001305-92 = "啊啊，已經這個時間了啊……"
2001305-93 = "和老師一聊起天，不知不覺就快要天亮了呢。"
2001305-94 = "在這種時間回到千年的宿舍也有點……"
2001305-95 = "可以借用一下夏萊的休息室嗎?"
2001305-97 = "（之後一起回到了夏萊，兩人很快都進入了夢鄉）"

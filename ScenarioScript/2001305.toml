[translation]
2001305-1 = "Maintenance"
2001305-2 = "Business District Data Center"
2001305-8 = "The cable and LAN connections are good, and the hardware capacity is sufficient."
2001305-9 = "No problem with the security settings. I just need to back up the database after updating to the latest kernel."
2001305-10 = "[s] \"...\""
2001305-11 = "What's wrong? Did you picture me frantically pounding the keyboard in front of a flashing-red monitor like you see hackers do in TV and movies?"
2001305-12 = "Well, I suppose sometimes it can look like that during emergency response cases."
2001305-13 = "This is just routine maintenance. This is what it's like under normal circumstances."
2001305-14 = "[s] \"But why work in the middle of the night?\""
2001305-15 = "Because the server has to go offline during maintenance. Every service is different, but you can generally minimize inconvenience to the client by performing maintenance during late-night hours."
2001305-16 = "The business district is relatively quiet at night, so processing data is also faster."
2001305-17 = "Though working at night does have its drawbacks, and there are always some people that require service at any time of day."
2001305-18 = "It's impossible to please everyone, however, so this is just the best course of action to take."
2001305-19 = "[s] \"You have a lot on your plate.\""
2001305-20 = "I don't mind. This is my job, after all."
2001305-24 = "Server maintenance isn't all that different from other public services like law enforcement or firefighting—the less you have to do, the better."
2001305-25 = "Every server manager's job is the same, no matter how competent they are: operate the server without issue."
2001305-26 = "It's not a glamorous job, but someone has to do it."
2001305-31 = "[ns] \"*yawn*\""
2001305-32 = "You must be getting tired."
2001305-33 = "The backup should be done soon. We can go out and get some coffee once it's done."
2001305-34 = "[s] \"Is there any place open at this hour?\""
2001305-35 = "Don't worry. There's a spot I like to go to when I'm working graveyard shifts."
2001305-36 = "I told you last time that I'd treat you to some coffee, so I insist."
2001305-37 = "We'll be done soon. Just hold out a little while longer."
2001305-42 = "The server maintenance was done soon after that. I then followed Chihiro outside."
2001305-47 = "[ns] \"Is there really a cafe open around here?\""
2001305-48 = "It should be just around this corner."
2001305-52 = "There. Follow me, Sensei."
2001305-58 = "― Heehee. There's nothing like a good coffee after work.[wa:4080] "
2001305-61 = "― Hmm? You thought we were going to a cafe?[wa:1760] "
2001305-64 = "― Sorry to disappoint. Nothing is open at this hour.[wa:1390] "
2001305-66 = "― A vending machine is the only place you can get a drink.[wa:10] "
2001305-69 = "― I come here to have a can of coffee[wa:1920] "
2001305-71 = "― whenever I'm finishing an all-nighter.[wa:10] "
2001305-74 = "― This vending machine is always here,[wa:1260] "
2001305-76 = "― even if no one else is this late.[wa:10] "
2001305-79 = "― Doing its job, ready to help someone in need.[wa:1560] "
2001305-82 = "― I sort of admire that.[wa:10] "
2001305-84 = "― It reminds me of the work that I do...[wa:1830] "
2001305-87 = "― That's why, Sensei,[wa:480] "
2001305-89 = "― it'd make me happy if you came to appreciate this coffee like I do.[wa:840] "
2001305-92 = "Whew. Look at the time."
2001305-93 = "I got so wrapped up in our conversation that I didn't realize it's almost dawn."
2001305-94 = "The late-night trains aren't even running anymore. It will be difficult to make it back to the Millennium dorms."
2001305-95 = "Is there somewhere I can crash at Schale?"
2001305-97 = "I walked Chihiro back to the Schale residence hall and gave her an open room to get some rest."

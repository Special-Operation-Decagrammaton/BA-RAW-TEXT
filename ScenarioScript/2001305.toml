2001305-31 = "[ns] \"하암…….\""
2001305-32 = "1;치히로;02;선생님. 많이 피곤한 모양이네.\n#1;em;[반응]"
2001305-33 = "1;치히로;01;백업 작업도 곧 끝날 것 같은데. 점검이 끝나면 나가서 커피라도 한잔하는 게 어때?\n#1;m3"
2001305-34 = "[s] \"하지만 이 시간이면 대부분의 가게는 닫았을 텐데.\""
2001305-35 = "1;치히로;03;괜찮아. 내가 철야를 할 때마다 자주 찾는 장소가 있거든.\n#1;em;[음표]"
2001305-36 = "1;치히로;02;전에 커피 한 잔 산다고 했으니, 이번에는 내가 한턱낼게."
2001305-37 = "1;치히로;03;그럼…… 조금만 기다려 줘."

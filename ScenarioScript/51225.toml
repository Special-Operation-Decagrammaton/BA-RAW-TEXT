[translation]
51225-7 = "嗯？這裡是……"
51225-9 = "啊哈，你醒啦？"
51225-10 = "你是誰…………？"
51225-11 = "哎呀，我好難過哦，你不記得我了嗎？"
51225-12 = "我是你的代理人。"
51225-13 = "替你將「感情」傳達給所有人的[ruby=怪談家]說書人[/ruby]。"
51225-14 = "感情……指的是……"
51225-19 = "將那份「感情」原封不動地奉還──難道不想嗎？"
51225-24 = "難道…… "
51225-25 = "來來來，請看吧巫女。#n大街是不是很美呀？"
51225-26 = "什麼……？"
51225-44 = "這是……怎麼回事……慶典大街……為什麼會……"
51225-45 = "啊哈哈哈。很美對吧？"
51225-46 = "這充滿風情的光景，我真的非常喜歡。"
51225-47 = "為什麼……要做這種令人髮指的事。"
51225-48 = "咦？你這樣說讓我很難過耶。"
51225-49 = "說的好像都是我一個人的錯一樣。"
51225-50 = "……咦？"
51225-51 = "我只是替巫女表達你的感情而已哦？"
51225-52 = "看不到嗎？#n站在你面前的「那個」。"
51225-53 = "那就是巫女表露出的…… "
51225-58 = "從你內心深處誕生的「感情」。"
51225-59 = "……！！"
51225-65 = "……啊啊。"
51225-66 = "這是……我的……"
51225-67 = "從我心裡誕生的……「感情」？"
51225-73 = "唔……！"
51225-76 = "光是看著就能感覺到吧？"
51225-77 = "在裡頭翻騰的濃煙與熊熊燃燒的烈火。"
51225-78 = "充斥內心的……那濃密而強烈的情感！"
51225-80 = "這一切都多虧了你哦，巫女。"
51225-82 = "……多虧了我……？"
51225-84 = "沒錯，我可以理解。"
51225-85 = "沒有任何人願意理解我的心……誰都不願意聽自己訴說。"
51225-86 = "除了自己以外的他人全都在踐踏自己的內心、願望以及心聲。"
51225-87 = "要人採取正確的行動──只是強行將他人的願望加諸在自己身上而已。"
51225-88 = "所以你很痛苦對吧？已經很累了對吧？"
51225-89 = "啊，唔……"
51225-91 = "是不是很想甩開這一切？"
51225-92 = "甩向對你說那種話的人，甩向不聽你的意見，對你不理不睬的那些人。"
51225-96 = "[log][ff4444]「希望把一切都燒個精光」[-][/log]"
51225-98 = "這就是你心裡的想法對吧？"
51225-100 = "我……小女子我……"
51225-102 = "啊哈哈哈！"
51225-103 = "那就是從你的內心和感情中誕生的、不具臉龐的形代。"
51225-104 = "如果要幫它取個名字的話…… "
51225-105 = "嗯，就叫「無貌的形代」吧？"
51225-106 = "它一定能如你所願，用艷紅的火焰將整個百鬼夜行夷為平地。#n實在是太棒，太美了！"
51225-107 = "那樣……才能成為完美的風情。"
51225-108 = "啊──"
51225-115 = "大街在燃燒。"
51225-116 = "從遠處傳來的，是某人痛苦的哀號聲。"
51225-117 = "沿地面燃燒的鮮紅火焰。"
51225-120 = "這全部……都是因為「我」。"
51225-128 = "因為我……抱持著那種想法。"
51225-129 = "夢想加入百花繚亂，逃避本該背負的義務。"
51225-133 = "扮演夢裡所描繪的……成為百花繚亂的自己而遭受的懲罰。"
51225-136 = "（啊……原來如此）"
51225-137 = "（因為我有那種想法，所以才會……）"
51225-140 = "那是……[ruby=我犯下的錯]因我而生的東西[/ruby]。"
51225-150 = "哎呀，失去意識了呢。"
51225-151 = "真沒意思，現在才正要開始的說。"
51225-152 = "算了，無所謂。#n巫女的職責已經結束，現在該輪到我棕櫚了。"
51225-153 = "一切已經準備就緒。#n角色和舞台也都準備完畢。"
51225-154 = "沒錯，這樣終於……能如雛罌粟大人所願。"
51225-155 = "專屬於我的「百物語」──"
51225-157 = "終於完成了！"
51225-163 = "[ns]「到此為止了，棕櫚！」"
51225-169 = "把紫還給我們……！"
51225-173 = "…………你們。"
51225-177 = "下一話;捏造的謊言"

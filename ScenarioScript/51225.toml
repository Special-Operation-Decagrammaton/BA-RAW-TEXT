[translation]
51225-7 = "อืม... ที่นี่มัน..."
51225-9 = "อะฮ่า ฟื้นแล้วเหรอคะ?"
51225-10 = "คุณ... เป็นใคร?"
51225-11 = "ตายจริง ถามแบบนี้ก็เสียดายแย่ จำฉันไม่ได้เหรอคะ?"
51225-12 = "ฉันคือตัวแทนของคุณไงคะ"
51225-13 = "ฉันคือนักเล่าเรื่องลึกลับที่จะถ่ายทอด <ความรู้สึก> ของคุณให้แก่ทุกคนยังไงล่ะคะ"
51225-14 = "ความรู้สึก..."
51225-19 = "คุณไม่คิดอยากให้คนอื่นได้รับรู้ 'ความรู้สึก' นั้นเหรอคะ?"
51225-24 = "อย่าบอก.. นะว่า..."
51225-25 = "ดูนู่นสิคะคุณมิโกะ ถนนสวยมากเลย ว่ามั้ยคะ?"
51225-26 = "เจ้าคะ...?"
51225-44 = "นี่มัน... อะไรกัน... ทำไม... ทำไมถนนเทศกาล... ถึงได้..."
51225-45 = "อะฮ่าฮ่าฮ่า ยอดเยี่ยมไปเลยใช่มั้ยคะ?"
51225-46 = "เป็นภาพที่เต็มไปด้วยความสง่างาม ถูกใจฉันจริงๆ เลยค่ะ"
51225-47 = "ทำไมถึง... ทำเรื่องเลวร้ายแบบนี้"
51225-48 = "เอ๋? พูดแบบนี้ คนฟังเสียใจหมดนะคะ"
51225-49 = "พูดเหมือนฉันเป็นคนก่อเรื่องคนเดียวเลยนะ"
51225-50 = "...เจ้าคะ?"
51225-51 = "ฉันก็แค่เล่าความรู้สึกของคุณมิโกะแทนให้เท่านั้นเองค่ะ"
51225-52 = "ไม่เห็นเหรอคะ? <สิ่งนั้น> ที่อยู่ข้างหน้าคุณน่ะ"
51225-53 = "สิ่งที่คุณมิโกะพรั่งพรูออกมา..."
51225-58 = "หลักฐานของ <ความรู้สึก> จากก้นบึ้งหัวใจของคุณ"
51225-59 = "......!!"
51225-65 = "...อ่า"
51225-66 = "นั่นมัน..."
51225-67 = "<ความรู้สึก>... ที่เกิดขึ้นจากตัวข้าเหรอ...?"
51225-73 = "อึก...!"
51225-76 = "แค่ดูเฉยๆ ก็รู้สึกได้เลยใช่ไหมล่ะคะ?"
51225-77 = "ควันที่ไหลเวียนและเปลวเพลิงที่ลุกโชนอยู่ในนั้น"
51225-78 = "ความรู้สึกที่เข้มข้นและรุนแรงที่ถูกตรึงไว้ในนั้น"
51225-80 = "ต้องขอบคุณมากนะคะคุณมิโกะ ทั้งหมดนี้เกิดขึ้นได้เพราะคุณเลยค่ะ"
51225-82 = "ทั้งหมดนี้... เกิดขึ้นเพราะข้างั้นเหรอ...?"
51225-84 = "ใช่ค่ะ ฉันเข้าใจนะคะ ไม่มีใครพยายามรับรู้ความรู้สึกของเราเลย"
51225-85 = "ไม่มีใครเงี่ยหูฟังเสียงของเราเลย"
51225-86 = "คนอื่นพยายามแต่จะเหยียบย่ำหัวใจและความปรารถนาของเรา"
51225-87 = "คำที่ว่าจงทำตัวให้ถูกต้อง มันก็แค่คำที่คนอื่นพูดออกมาเพื่อจะบังคับเราและผลักดันความปรารถนา#nของพวกเขาก็เท่านั้น"
51225-88 = "คุณก็เลยเหน็ดเหนื่อยทุกข์ระทมอยู่ใช่ไหมคะ?"
51225-89 = "อ่า... เอ่อ..."
51225-91 = "เพราะเป็นแบบนี้ คุณก็เลยอยากขว้างทุกอย่างไปให้สุดแรง"
51225-92 = "ขว้างไปทางคนที่พูดจาแบบนั้นกับเรา ไปทางคนที่ไม่คิดจะฟังและเพิกเฉยต่อความคิดเห็นของเรา"
51225-96 = "[log][ff4444]<อยากแผดเผาให้ราบไปเลย>[-][/log]"
51225-98 = "นั่นคือความรู้สึกที่คุณเก็บไว้ในใจใช่หรือเปล่าล่ะคะ?"
51225-100 = "ข้า... ข้า..."
51225-102 = "อะฮ่าฮ่าฮ่า!"
51225-103 = "นั่นคือตัวแทนไร้ใบหน้าที่เกิดขึ้นจากหัวใจและความรู้สึกเช่นนั้นของคุณ"
51225-104 = "และถ้าจะให้ตั้งชื่อให้มันละก็..."
51225-105 = "จริงด้วยค่ะ ให้ชื่อ <คาตะชิโระไร้หน้า> ดีไหมคะ?"
51225-106 = "สิ่งนั้นจะแผดเผาทั้งเฮียกคิยาโคด้วยเปลวไฟสีแดงสดอย่างที่คุณปรารถนา เผาอย่างงดงามเลยละค่ะ"
51225-107 = "และนั่นจะเป็น... ความสง่างามที่ไม่มีวันลืม"
51225-108 = "อ่า......"
51225-115 = "ถนนกำลังลุกเป็นไฟ"
51225-116 = "เสียงที่ได้ยินมาจากที่ไกลๆ คือเสียงกรีดร้องของใครบางคนที่ทุกข์ทรมานจากเปลวไฟนั่น"
51225-117 = "เปลวไฟสีแดงสดที่ลุกโชนไปตามพื้น"
51225-120 = "ทั้งหมดนี้... เป็นเพราะ <ข้า>"
51225-128 = "ข้า... ทำให้มันเกิดขึ้นเพราะมีความรู้สึกแบบนั้น"
51225-129 = "ข้าฝันใฝ่ในเฮียกกะเรียวรัน และละทิ้งหน้าที่ของตระกูลที่ควรจะต้องยอมรับมัน"
51225-133 = "ข้าวาดฝันให้ตัวเองเป็นเฮียกกะเรียวรัน และทำตัวเช่นนั้นในฐานะเฮียกกะเรียวรัน... ก็เลยถูกลงโทษ"
51225-136 = "(อ่า... เป็นแบบนี้สินะ)"
51225-137 = "(เพราะข้าตัดสินใจแบบนั้น...)"
51225-140 = "สิ่งนั้น... ก็เลยเกิดขึ้นจากตัวข้าสินะ... เป็นความผิดของข้าเอง"
51225-150 = "เอ๋ เป็นลมไปเลยเหรอคะ?"
51225-151 = "หมดสนุกเลย ของจริงมันเพิ่งจะเริ่มเองนะ"
51225-152 = "แต่ก็ช่างเถอะค่ะ คุณมิโกะ คุณได้แสดงบทบาทของตัวเองไปแล้ว จากนี้ไปให้เป็นหน้าที่ของชูโระคนนี้#nเถอะค่ะ"
51225-153 = "ฉันเตรียมเสร็จเรียบร้อยแล้วค่ะ ทั้งบทบาท ทั้งเวที ทุกอย่างพร้อมแล้วค่ะ"
51225-154 = "ตามที่ท่านโคคุริโกะปรารถนาไว้..."
51225-155 = "ในที่สุด... <ตำนานร้อยเรื่องราว> ของฉัน..."
51225-157 = "ก็จะสมบูรณ์แล้วค่ะ"
51225-163 = "[ns] \"หยุดแค่นั้นนะ ชูโระ!\""
51225-169 = "ฉันมาพายูคาริกลับไป...!"
51225-173 = "พวกคุณ..."
51225-177 = "ตอนต่อไป;คำโกหกที่แต่งขึ้น"

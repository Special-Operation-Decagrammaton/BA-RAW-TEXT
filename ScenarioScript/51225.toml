[translation]
51225-7 = "Um... What's happening?"
51225-9 = "Hah! You're awake!"
51225-10 = "My apologies... Have we met?"
51225-11 = "I'm wounded! You don't remember me?"
51225-12 = "Consider me your representative! "
51225-13 = "I am your bard! I deliver your feelings to the masses!"
51225-14 = "My...feelings? What do you mean?"
51225-19 = "To make them suffer as you've suffered!"
51225-24 = "I don't desire... "
51225-25 = "Look upon the chaos, miko. Isn't it simply stunning?"
51225-26 = "What?"
51225-44 = "The streets are ablaze? H-How...did you?"
51225-45 = "Hahaha! I know! It's inspiring! Beautiful!"
51225-46 = "Truly the epitome of elegance."
51225-47 = "How...could you? Why would you do this?"
51225-48 = "Please don't disappoint me with that kind of talk."
51225-49 = "After all, we did this together."
51225-50 = "...What?"
51225-51 = "I only did what you wished me to do, in your heart of hearts."
51225-52 = "Look all around you!"
51225-53 = "This is all yours! "
51225-58 = "All your emotions bursting out from your soul!"
51225-59 = "...!!"
51225-65 = "...Ah."
51225-66 = "This destruction...is mine?"
51225-67 = "All these terrible emotions came from me?"
51225-73 = "Ugh...!"
51225-76 = "You can feel it, right? "
51225-77 = "The fuel underneath all this flame and smoke..."
51225-78 = "All of it is being fueled by anger and hatred, loneliness and fear."
51225-80 = "And I couldn't have done it without you, miko."
51225-82 = "Without...me?"
51225-84 = "Yes. Don't worry. I understood how you felt."
51225-85 = "No one thought your words meant anything."
51225-86 = "They trampled all over your feelings, took away any agency you had."
51225-87 = "What have you heard your whole life? Fulfill your duty. Meet expectations. Everyone, everyone using you for their own ends."
51225-88 = "You pitiable little thing. Didn't it feel so unfair? Wasn't it so tiring?"
51225-89 = "I...um..."
51225-91 = "Imagine how it would feel to finally be free."
51225-92 = "You would no longer be chained down by expectations, free of those who have belittled and oppressed you."
51225-96 = "[log][ff4444]I want everything to burn.[-][/log]"
51225-98 = "Isn't that how you feel?"
51225-100 = "I... I..."
51225-102 = "Hahaha! Good, good!"
51225-103 = "That's the manifestation of your hate! Your despair!"
51225-104 = "What to call it... "
51225-105 = "Ah! Let's call it Faceless Katashiro. Your very own representative."
51225-106 = "With its strength, you can give everyone who's hurt you what they deserve. Let Hyakkiyako BURN!"
51225-107 = "It is the essence of elegance!"
51225-108 = "Ah."
51225-115 = "The streets are on fire."
51225-116 = "I hear a voice from afar. It screams in agony as the flames burn its flesh away."
51225-117 = "The streets flow with crimson."
51225-120 = "The fault...lies with me. "
51225-128 = "My naive ideals gave birth to destruction."
51225-129 = "I attempted to escape from expectation, from my duties. I chased my dreams at the Hyakkaryouran."
51225-133 = "This is my punishment for dreaming. The Hyakkaryouran was never mine to claim."
51225-136 = "(Ah... I understand now.)"
51225-137 = "(I was never allowed to dream.)"
51225-140 = "The streets are burning with my flames. How could I ever atone for this despair?"
51225-150 = "Waaah. Did she just faint? "
51225-151 = "Right when the party was really starting to get going."
51225-152 = "Whatever. She did what I needed her to do anyway."
51225-153 = "It's my turn now. Everything is as it should be."
51225-154 = "I've fulfilled your wish, Kokuriko."
51225-155 = "At long last!"
51225-157 = "Witness the creation of my ghost story!"
51225-163 = "[ns] \"I won't let you take this any further, Shuro!\""
51225-169 = "Give me back Yukari!"
51225-173 = "...Pests."
51225-177 = "Next Episode;Elaborate Lies"

[translation]
1000408-1 = "A Strange Night"
1000408-2 = "Gehenna Prefect Team Building"
1000408-3 = "It was a late holiday night. No one was around."
1000408-4 = "Only the head prefect's office still had its lights on."
1000408-7 = "In Front of the Head Prefect's Office"
1000408-9 = "*knock* *knock*"
1000408-10 = "..."
1000408-11 = "There was no response."
1000408-12 = "*knock* *knock* *knock*"
1000408-13 = "..."
1000408-14 = "[s] Go inside."
1000408-19 = "Huh...? S-Sensei?"
1000408-20 = "[s] \"I came to give you a hand.\""
1000408-21 = "You want to help me with my work...?"
1000408-22 = "At this hour? "
1000408-23 = "I appreciate the thought, but this is my responsibility. I don't think there's anything for you to do."
1000408-24 = "[s] \"Then I'll just stay here with you.\""
1000408-25 = "..."
1000408-26 = "...Have it your way."
1000408-28 = "I decided to sit next to Hina and watch her work."
1000408-31 = "*rustle* *rustle*"
1000408-32 = "..."
1000408-34 = "*rustle* *rustle* *rustle*"
1000408-35 = "..."
1000408-37 = "*rustle* *rustle* *rustle*"
1000408-38 = "This isn't going to work."
1000408-39 = "Staying focused is difficult enough without having you stare at me."
1000408-40 = "..."
1000408-41 = "And why is it suddenly getting so hot in here...?"
1000408-42 = "[s1] \"Your face is red.\"\n[s2] \"Do you have a fever?\""
1000408-43 = "W-Wait! What are you doing?!"
1000408-44 = "W-Wait! What are you doing?!"
1000408-45 = "[s] Press your hand to her forehead."
1000408-46 = "A-Ah...!"
1000408-47 = "..."
1000408-48 = "..."
1000408-49 = "[s3] \"Your head is burning up.\"\n[s4] \"Your cheeks are burning up.\""
1000408-50 = "N-Naturally. I mean, it must be because I haven't slept in days."
1000408-51 = "N-Naturally. I mean, it must be because I haven't slept in days."
1000408-52 = "[s] \"Are sleep deprivation-induced fevers a thing?\""
1000408-53 = "Of course they are! The body naturally raises its temperature to account for a lack of sleep!"
1000408-54 = "[s5] Pat, pat, pat.\n[s6] \"You're adorable when you get like this.\""
1000408-59 = "..."
1000408-60 = "Ugh. K-Knock it off..."
1000408-63 = "..."
1000408-64 = "I said quit it!"
1000408-67 = "..."
1000408-68 = "I'm supposed to be working right now."
1000408-69 = "I get so comfortable when you pat my head that I feel like I could fall asleep..."
1000408-70 = "[s] \"I'm sorry.\""
1000408-71 = "Don't be. You don't have to apologize..."
1000408-72 = "..."
1000408-73 = "...Haha."
1000408-74 = "Now that I think about it...it's been a strange night. "
1000408-75 = "I never thought we'd be in this office alone together at this hour."
1000408-76 = "With you here...I feel like I could fall asleep just like this."

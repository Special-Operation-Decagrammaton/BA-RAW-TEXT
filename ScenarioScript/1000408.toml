[translation]
1000408-1 = "ค่ำคืนที่แสนลึกลับ"
1000408-2 = "อาคารเรียน คณะกรรมการวินัยเกเฮนน่า"
1000408-3 = "(ที่อาคารเรียนไม่มีคนอยู่เนื่องจากเป็นคืนวันหยุด)"
1000408-4 = "(มีเพียงแค่ไฟของห้องประธานกรรมการวินัยเท่านั้นที่ยังสว่างอยู่)"
1000408-7 = "หน้าห้องประธานกรรมการ"
1000408-9 = "(ก๊อก ก๊อก)"
1000408-10 = "(...)"
1000408-11 = "(ไม่มีเสียงตอบรับ)"
1000408-12 = "(ก๊อก ก๊อก ก๊อก)"
1000408-13 = " -----------"
1000408-14 = "[s] เข้าไปในห้อง"
1000408-19 = "เอ๋...? คะ...คุณครู!"
1000408-20 = "[s] \"ครูมาช่วยเธอน่ะ\""
1000408-21 = "มะ...มาช่วยงั้นเหรอ? ช่วย...งานเหรอ...?"
1000408-22 = "กลางดึกแบบนี้เนี่ยนะ?"
1000408-23 = "ขอบคุณที่มานะ แต่ว่านี่เป็นงานที่มีแค่ฉันที่ทำได้... คงไม่มีอะไรที่คุณครูช่วยได้หรอก..."
1000408-24 = "[s] \"ถ้างั้นเดี๋ยวนั่งอยู่เป็นเพื่อนแล้วกันนะ\""
1000408-25 = "......"
1000408-26 = "แบบนั้นก็ได้..."
1000408-28 = "(นั่งลงข้างๆ ฮินะและดูเธอทำงาน)"
1000408-31 = "(แกร็กๆๆ)"
1000408-32 = "....."
1000408-34 = "(แกร็กๆๆๆ)"
1000408-35 = "..."
1000408-37 = "(แกร็กๆๆๆๆ)"
1000408-38 = "แบบนี้มันกวนใจนิดๆ นะ"
1000408-39 = "พอคุณครูมานั่งจ้องแบบนี้ ฉันไม่มีสมาธิเลย..."
1000408-40 = ".......\n"
1000408-41 = "ทำไมถึงร้อนขนาดนี้นะ…"
1000408-42 = "[s1] \"หน้าแดงแล้ว\"\n[s2] \"ไม่สบายรึเปล่า?\""
1000408-43 = "ดะ...เดี๋ยวสิ?! จะทำอะไรน่ะ?!"
1000408-44 = "ดะ...เดี๋ยวสิ?! จะทำอะไรน่ะ?!"
1000408-45 = "[s] แตะหน้าผากของฮินะ"
1000408-46 = "อ๊ะ...อ๊ะ...!"
1000408-47 = "........"
1000408-48 = "..."
1000408-49 = "[s3] \"ตัวอุ่นๆ นะ\"\n[s4] \"ตัวร้อนมากเลย\""
1000408-50 = "นะ...แน่สิ! ฉันไม่ได้นอนมาตั้งหลายวันแล้วนะ"
1000408-51 = "นะ...แน่สิ! ฉันไม่ได้นอนมาตั้งหลายวันแล้วนะ"
1000408-52 = "[s] \"ถ้าง่วงนอนตัวจะอุ่นๆ เหรอ?\""
1000408-53 = "มันเรื่องปกติน่า! เวลาที่ง่วงนอนอุณหภูมิร่างกายก็จะสูงขึ้นไงล่ะ!"
1000408-54 = "[s5] \"ลูบหัวฮินะจัง\"\n[s6] \"น่ารักเหมือนเด็กๆ เลยนะ\""
1000408-59 = "........."
1000408-60 = "อึ่ก... ยะ...หยุดนะ..."
1000408-63 = "..."
1000408-64 = "บอกให้หยุดไง!!"
1000408-67 = "........."
1000408-68 = "ฉันกำลังทำงานอยู่นะ..."
1000408-69 = "ถ้ามาลูบหัวแบบนี้มันจะรู้สึกเคลิ้มๆ... เดี๋ยวฉันก็เผลอหลับไปหรอก..."
1000408-70 = "[s] \"ขอโทษนะ\""
1000408-71 = "ไม่เป็นไร... คุณครูไม่ต้องขอโทษหรอก..."
1000408-72 = "......"
1000408-73 = "ฮึฮึ..."
1000408-74 = "พอมาคิดดูแล้ว... คืนนี้เป็นคืนที่แปลกดีนะ"
1000408-75 = "ได้อยู่กับคุณครูตามลำพังสองต่อสองในสำนักงานตอนกลางคืนแบบนี้"
1000408-76 = "แบบนี้ถ้าฉันเผลอหลับไปละก็... คงไม่เป็นไรหรอกใช่มั้ย"
1000408-77 = "ฮึฮึ... อืม แบบนั้น... มันก็คงไม่แย่เท่าไรหรอกมั้ง"
1000408-78 = "ง่วงจัง... แถมรู้สึกผ่อนคลายแบบนี้อีก..."
1000408-79 = "คุณครู..."
1000408-81 = "(ล้มฟุบ)"
1000408-82 = "(ฮินะทิ้งตัวลงไปนอนอยู่ข้างๆ หน้าต่าง)"
1000408-85 = "― ..."
1000408-88 = "― ถ้าคุณครูเอาแต่จ้องฉันแบบนั้น...ฉันก็รู้สึกเขินเหมือนกันนะ...[wa:2140] "
1000408-91 = "― แปลกจังเลย พอได้อยู่กับคุณครูแบบนี้... รู้สึกผ่อนคลายจัง[wa:4880] "
1000408-94 = "― ที่จริงแล้ว…ฉันชอบสีหน้าแบบนั้นของคุณครูนะ[wa:2200] "
1000408-97 = "― ..."
1000408-100 = "― เฮ้อ... ฉันไม่อยากคิดถึงเรื่องอื่นอีกแล้วล่ะ[wa:2080] "
1000408-103 = "― ..."
1000408-106 = "(แล้วฮินะก็ค่อยๆ ผล็อยหลับไป)"
1000408-107 = "(คุณครูถอดเสื้อโค้ทคลุมให้ฮินะ แล้วออกไปจากห้องอย่างเงียบๆ)"

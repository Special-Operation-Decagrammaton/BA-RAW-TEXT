[translation]
1000408-1 = "某個神祕的夜晚"
1000408-2 = "格黑娜學園．風紀委員會專用校舍"
1000408-3 = "（因為是休息日的深夜，校舍周圍都沒有人）"
1000408-4 = "（只有風紀委員會房間的燈還亮著）"
1000408-7 = "風紀委員會．辦公室前"
1000408-9 = "（叩叩）"
1000408-10 = "（……）"
1000408-11 = "（沒有反應）"
1000408-12 = "（叩叩叩）"
1000408-13 = "────────。"
1000408-14 = "[s] 進入"
1000408-19 = "咦……？老，老師？"
1000408-20 = "[s] 「我來幫忙了唷。」"
1000408-21 = "幫，幫忙？我的工作嗎……？"
1000408-22 = "在這個時間？"
1000408-23 = "……雖然很謝謝你來，但這是只有我能做的工作……#n我想沒有老師能幫忙的工作……"
1000408-24 = "[s] 「那麼，我就待在這裡。」"
1000408-25 = "……"
1000408-26 = "……只是這樣的話，是可以。"
1000408-28 = "（我決定坐在旁邊，看著陽奈工作）"
1000408-31 = "（唰唰──）"
1000408-32 = "……"
1000408-34 = "（唰唰唰唰──）"
1000408-35 = "…………"
1000408-37 = "（唰唰唰唰──）"
1000408-38 = "……果然還是會有些在意。"
1000408-39 = "老師在旁邊盯著看的話，不太能集中精神…… "
1000408-40 = "……"
1000408-41 = "話說回來，為什麼會這麼熱呢……"
1000408-42 = "[s1] 「臉很紅唷。」\n[s2] 「發燒了嗎？」"
1000408-43 = "等，等等！？做什麼……！？"
1000408-44 = "等，等等！？做什麼……！？"
1000408-45 = "[s] 把手放在陽奈的額頭上"
1000408-46 = "啊，啊嗚……！"
1000408-47 = "……"
1000408-48 = "………"
1000408-49 = "[s3] 「額頭很熱唷。」\n[s4] 「臉頰很熱唷。」"
1000408-50 = "這，這也沒辦法吧。這幾天都沒睡覺。"
1000408-51 = "這，這也沒辦法吧。這幾天都沒睡覺。"
1000408-52 = "[s] 「睏的話，身體會發熱嗎？」"
1000408-53 = "……這是生理現象！睏的話體溫就會上升！"
1000408-54 = "[s5] 「好乖好乖。」\n[s6] 「像個孩子真可愛。」"
1000408-59 = "……"
1000408-60 = "……那個……別，別這樣……"
1000408-63 = "……"
1000408-64 = "停下來！！"
1000408-67 = "……"
1000408-68 = "……現在，還在，工作。"
1000408-69 = "被那樣撫摸的話，總感覺很安心……感覺會就那樣睡著……"
1000408-70 = "[s] 「抱歉。」"
1000408-71 = "……不。不是需要道歉的事……"
1000408-72 = "……"
1000408-73 = "……呵呵。"
1000408-74 = "這樣一想……總覺得是個神祕的夜晚呢。"
1000408-75 = "在這樣的時間，竟然和老師兩個人在辦公室獨處。"
1000408-76 = "就這樣倒下睡著……似乎也挺好的。"
1000408-77 = "呵呵……嗯，那樣……好像也不錯。"
1000408-78 = "好睏……好安心……"
1000408-79 = "老師……"
1000408-81 = "（啪噠──）"
1000408-82 = "（因為陽奈就那樣向後傾倒，所以讓她躺在窗台上）"
1000408-85 = "― ……"
1000408-88 = "― 被那樣盯著看的話……就算是我也會害羞的。[wa:3780] "
1000408-91 = "― 真是不可思議呢。和老師在一起總覺得很安心。[wa:6280] "
1000408-94 = "― 其實……我喜歡老師的那種表情。[wa:3280] "
1000408-97 = "― ……"
1000408-100 = "― 哈啊……什麼都不想思考。[wa:3360] "
1000408-103 = "― ……"
1000408-106 = "（陽奈就這樣睡著了）"
1000408-107 = "（將大衣披在陽奈身上，悄悄地走出了房間）"

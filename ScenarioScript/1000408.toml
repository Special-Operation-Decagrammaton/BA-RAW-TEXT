1000408-78 = "So sleepy...and comfortable."
1000408-79 = "Sensei..."
1000408-81 = "(flops)"
1000408-82 = "Hina fell back and sprawled out by the window."
1000408-85 = "― ..."
1000408-88 = "― When you stare at me like that...even I can get a bit embarrassed.[wa:1940] "
1000408-91 = "― I don't get it. I feel so at ease when we're together.[wa:4960] "
1000408-94 = "― The truth is...seeing you smile makes me happy.[wa:2000] "
1000408-97 = "― ..."
1000408-100 = "— *sigh* I don't want to think about anything.[wa:2040] "
1000408-103 = "― ..."
1000408-106 = "Just like that, Hina was fast asleep."
1000408-107 = "I put a coat over her and quietly left the room."

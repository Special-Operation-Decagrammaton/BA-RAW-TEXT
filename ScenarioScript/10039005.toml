[translation]
10039005-1 = "序幕;搶奪機車"
10039005-3 = "……對不起，老師。"
10039005-4 = "您明明已經盡力幫助我們了，結果卻變成了這樣。"
10039005-5 = "真不知道該如何向您說明才好。"
10039005-6 = "或許這一切，都應該歸咎於我的介入。"
10039005-7 = "是我的過度干涉釀成了這個結果。"
10039005-8 = "但即便如此……"
10039005-9 = "嗯，我不能就這麼坐以待斃。#n必須有所行動才行。"
10039005-10 = "拜託了，老師。#n我明白這個要求十分厚顏無恥……"
10039005-14 = "……即使事情變成這樣，能請您依舊原諒我嗎？"
10039005-23 = "「是真的嗎？那個消息……？」"
10039005-27 = "「兩小時後在三一廣場。消息已經傳開了。」"
10039005-31 = "「哇，這真的太扯了。到底是怎麼回事。」"
10039005-35 = "「這根本就是……」"
10039005-40 = "[log]「要開戰了吧？」[/log]"
10039005-47 = "喂，那邊的！在發什麼呆啊，快讓開！！#n你擋到我的路了！！"
10039005-48 = "……沒反應是怎樣，有意見是不是？"
10039005-49 = "咦，那副打扮是三一的……"
10039005-50 = "修……女……？"
10039005-59 = "……！？#n你，你這是什麼意思！？"
10039005-60 = "…………？"
10039005-61 = "……請下車。"
10039005-62 = "……啊？"
10039005-63 = "請你從機車上下來。#n我需要借用你的機車。"
10039005-67 = "咦……？#n修女同學，你剛才說什麼……？"
10039005-68 = "難道你現在打算要搶我的機車……？#n而且還拿槍指著我……"
10039005-69 = "這到底是……"
10039005-75 = "噫！？嚇死我了……！"
10039005-76 = "非常抱歉，但我沒有時間解釋。"
10039005-77 = "先，先等一下！這到底是什麼情況！？#n為什麼三一的修女要搶我的機車……！！"
10039005-81 = "我，我知道了！知道了啦！！#n全聽你的總行了吧……！"
10039005-82 = "……謝謝你。#n我之後一定會回來贖罪並請求原諒的。"
10039005-88 = "所以到底是怎麼回事啊……至少給我個大概的解釋吧……"
10039005-92 = "……我明白了。"
10039005-93 = "這是……"
10039005-95 = "「為了拯救三一。」"

[translation]
10039005-1 = "บทเริ่มต้น;ปล้นมอเตอร์ไซค์"
10039005-3 = "ขอโทษนะคะ คุณครู..."
10039005-4 = "คุณครูอุตส่าห์ช่วยฉันอย่างเต็มที่ แต่ผลลัพธ์กลับกลายเป็นแบบนี้"
10039005-5 = "พอเป็นอย่างนี้ ฉันก็ไม่กล้าพูดอะไรเลยค่ะ"
10039005-6 = "บางทีทั้งหมดอาจเป็นเพราะฉันตั้งแต่แรกก็ได้"
10039005-7 = "เพราะฉันเข้าไปยุ่งมากเกินไป"
10039005-8 = "แต่ถึงยังไง..."
10039005-9 = "ค่ะ ฉันคงอยู่เฉยๆ แบบนี้ไม่ได้หรอกค่ะ ฉันจะเคลื่อนไหวก่อนเองค่ะ"
10039005-10 = "ได้โปรดเถอะค่ะคุณครู... ฉันรู้ว่ามันน่าละอายใจที่พูดอย่างนี้..."
10039005-14 = "ถึงทุกอย่างจะลงเอยแบบนั้นไปแล้ว แต่คุณครูให้อภัยฉันได้มั้ยคะ?"
10039005-23 = "\"ข่าวลือนั่นเป็นเรื่องจริงเหรอ...?\" "
10039005-27 = "\"เขาลือกันให้แซ่ดเลยละ ได้ยินว่าอีก 2 ชั่วโมงที่จัตุรัสทรีนิตี้น่ะ\""
10039005-31 = "\"ว้าว สุดยอดไปเลย จู่ๆ ก็อยากรู้เลยแฮะว่าเกิดอะไรขึ้น\""
10039005-35 = "\"ต้องมีอะไรเด็ดๆ ให้ดูแน่...\""
10039005-40 = "[log]\"วันนี้พวกเราจะมีสงครามเหรอ?\"[/log]"
10039005-47 = "นี่! เธอตรงนั้นน่ะ! อย่ายืนเหม่ออยู่สิ หลีกไปเลย!! ยืนขวางทางกันอยู่ได้!!"
10039005-48 = "เอ้า...? ไม่ตอบแฮะ? อะไรของเธอเนี่ย จะหาเรื่องงั้นเหรอ?"
10039005-49 = "เอ๋ จะว่าไป เธอเด็กทรีนิตี้นี่นา เหมือนใส่ชุดของชมรม..."
10039005-50 = "ซิส... เตอร์...?"
10039005-59 = "ทะ...ทำบ้าอะไรของเธอน่ะ...!?"
10039005-60 = "...?"
10039005-61 = "ลงมาเถอะค่ะ..."
10039005-62 = "ว่าไงนะ...?"
10039005-63 = "ฉันขอให้ลงมาจากมอเตอร์ไซค์ที่คุณนั่งอยู่ก่อนค่ะ ฉันอยากยืมมอเตอร์ไซค์ของคุณสักเดี๋ยวน่ะค่ะ"
10039005-67 = "วะ... ว่ายังไงนะ...? ทำอะไรของเธอน่ะ? คุณซิสเตอร์...?"
10039005-68 = "นี่ฉันโดนปล้นมอเตอร์ไซค์เหรอ...? แล้วยังเอาปืนมาขู่กันอีก..."
10039005-69 = "นี่มันอะไรกัน..."
10039005-75 = "ฮะ... เฮือก!? ตกใจหมดเลย...!"
10039005-76 = "ขอโทษด้วยค่ะ แต่ฉันไม่มีเวลาอธิบายแล้ว"
10039005-77 = "ดะ... เดี๋ยวก่อน! เดี๋ยวก่อน! นี่มันสถานการณ์อะไรกันเนี่ย!? ทำไมคุณซิสเตอร์จากทรีนิตี้ถึงมาปล้น#nมอเตอร์ไซค์ของฉันเล่า...!!"
10039005-81 = "กะ... ก็ได้! ยอมแล้ว!! จะให้ไปก่อนแล้วกัน...!"
10039005-82 = "ขอบคุณค่ะ... ส่วนเรื่องการไถ่บาปและการให้อภัย เอาไว้ตอนเราเจอกันคราวหน้านะคะ"
10039005-88 = "อะไรเนี่ย... อย่างน้อยก็ช่วยอธิบายหน่อยสิ..."
10039005-92 = "ให้อธิบายเหรอคะ..."
10039005-93 = "เรื่องนี้มัน... ใช่แล้วละค่ะ"
10039005-95 = "\"ฉันทำเพื่อกอบกู้ทรีนิตี้ค่ะ\""

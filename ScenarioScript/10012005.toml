[translation]
10012005-1 = "序幕;人生，世事難料"
10012005-5 = "阿拜多斯對策委員會部室"
10012005-9 = "……大家都到齊了嗎？"
10012005-13 = "嗯。"
10012005-14 = "在～☆"
10012005-15 = "唔嘿……"
10012005-16 = "大叔一直在這裡睡覺，到底怎麼了……"
10012005-21 = "……那麼，大家都到齊了就開始吧。"
10012005-24 = "……？"
10012005-25 = "綾音，茜香他還沒……"
10012005-26 = "茜，茜香醬之後會再通知他……！"
10012005-27 = "綾音醬這麼著急真是罕見吶。"
10012005-31 = "咳哼……有個重大的消息要告訴大家！"
10012005-32 = "終於，我們對策委員會的努力有了成果！"
10012005-33 = "沒錯……每個月一邊償還利息，將剩餘的錢一點一點存下來的結果……"
10012005-34 = "對策委員會總算擁有了首個大型配備……！！"
10012005-35 = "……啊。"
10012005-36 = "操場上的那台直升機難不成……"
10012005-37 = "嘛，嘛嘛，等他把話說完呀……#n綾音醬好不容易將大家聚集起來，對吧？"
10012005-38 = "嗯嗯！大型配備怎麼了嗎？綾音醬！"
10012005-44 = "是……終於……！！"
10012005-51 = "大，大家！！"
10012005-52 = "快看！！"
10012005-57 = "我，在賓果大會中獎了！！而且還是頭獎！！"

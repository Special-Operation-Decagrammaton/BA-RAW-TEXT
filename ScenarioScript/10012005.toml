10012005-31 = "เอาเถอะค่ะ เหตุผลที่ฉันเรียกทุกคนมารวมตัวกันที่นี่ในวันนี้ นั่นก็เพราะว่าฉันมีเรื่องที่ต้องประกาศให้#nทราบค่ะ!"

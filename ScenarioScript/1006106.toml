[translation]
1006106-1 = "งานอดิเรกที่คาดไม่ถึง"
1006106-2 = "(คุณครูมุ่งหน้าไปยังสำนักงานของวิหารที่ซากุระโกะอยู่เพื่อให้คำปรึกษากับเธอ)"
1006106-6 = "มาแล้วเหรอคะคุณครู"
1006106-12 = "นี่เป็นเรื่องส่วนตัวแท้ๆ ขอบคุณมากนะคะที่อุตส่าห์เดินทางไกลมาหากัน"
1006106-13 = "ที่ถูกต้องคือฉันต้องเป็นฝ่ายไปหาคุณครู แต่ตอนนี้ฉันออกไปไม่ได้..."
1006106-14 = "[s1] \"ครูรู้อยู่แล้ว เรื่องงานใช่มั้ยล่ะ?\"\n[s2] \"ไม่ต้องห่วงหรอก ครูเข้าใจซากุระโกะมากกว่าใครเลย\""
1006106-17 = "อ่า... ค่ะ ขอบคุณมากเลยนะคะ คุณครู"
1006106-21 = "งั้นเพื่อไม่ให้คุณครูต้องเสียเวลามาก ฉันจะเล่าให้ฟังแบบรวบรัดนะคะ"
1006106-22 = "มันเป็นเรื่องเกี่ยวกับ 'งานอดิเรก' ค่ะ"
1006106-23 = "[s] \"งานอดิเรก...?\""
1006106-24 = "ค่ะ ฉันได้รับคำถามเกี่ยวกับเรื่องนี้มาเมื่อไม่นานมานี้เองค่ะ"
1006106-25 = "ระหว่างที่ฉันรับฟังซิสเตอร์คนหนึ่งบอกว่าตัวเองไม่ค่อยมีเวลาทำงานอดิเรกเหมือนเมื่อก่อน..."
1006106-26 = "ซิสเตอร์คนนั้นก็ถามฉันว่า \"แล้วงานอดิเรกของคุณซากุระโกะคืออะไรเหรอคะ?\""
1006106-27 = "แต่ว่าฉันไม่ได้ตอบกลับไปค่ะ"
1006106-28 = "ฉันหาคำตอบไม่ได้เลยค่ะ ในความเป็นจริงแล้ว ฉันไม่คิดว่าจะมีอะไรเป็นงานอดิเรกสำหรับฉันได้ค่ะ"
1006106-29 = "ฉันไม่รู้ด้วยซ้ำค่ะว่างานอดิเรกคืออะไร"
1006106-30 = "ถึงแม้คนอื่นจะมีงานอดิเรกกัน แต่ฉันก็ไม่ได้คิดว่าตัวเองต้องมีบ้างเหมือนคนอื่นหรอกค่ะ"
1006106-31 = "แต่ก็..."
1006106-32 = "[s3] \"อย่างน้อยก็เพื่อให้ตัวเองเข้าใจคนอื่นสินะ\"\n[s4] \"อยากเข้าใจความรู้สึกนั้นสินะ\""
1006106-35 = "ใช่ค่ะ แต่ว่าเรื่องนี้ก็ใช่ว่าจะเกี่ยวกับฉันไปเสียทั้งหมดนะคะ"
1006106-36 = "หน้าที่ประจำของฉันในแต่ละวันถูกกำหนดเอาไว้เหมือนเดิมเสมอ และฉันก็ไม่มีเวลาเหลือมากด้วยค่ะ"
1006106-37 = "ต่อให้มีเวลาว่าง ฉันก็จะไปช่วยงานของวิหารและตรวจสอบตารางงานของซิสเตอร์คนอื่นค่ะ"
1006106-38 = "คนอื่นๆ ไม่ได้ทำงานตามเวลาที่กำหนด แล้วก็ไม่ได้รู้สึกกดดันด้วยน่ะค่ะ"
1006106-39 = "...คุณครูคะ"
1006106-45 = "เวลาว่างมันคืออะไรเหรอคะ? แล้วงานอดิเรกมันหน้าตาเป็นยังไงคะ?"
1006106-46 = "ถึงคุณครูจะมีตารางงานยุ่งยิ่งกว่าฉัน แต่ฉันได้ยินมาว่าบางครั้งคุณครูก็มีเวลาไปหมกมุ่นอยู่กับ#nงานอดิเรกค่ะ"
1006106-47 = "ฉันก็เลยอยากรู้ค่ะ ต้องทำยังไงถึงจะมีเวลาเพื่องานอดิเรก แล้วจะไปหางานอดิเรกนั่นที่ไหน..."
1006106-48 = "...คะ?"
1006106-49 = "มันแค่สิ่งที่ติดเป็นนิสัย ไม่ใช่การกระทำที่มีจุดประสงค์หรือความหมายอะไร... นั่นคือความหมายของ#nงานอดิเรกเหรอคะ?"
1006106-53 = "อย่างนี้นี่เอง เป็นคำพูดที่มีเหตุผลเลยละค่ะ"
1006106-54 = "ฉันคิดว่างานอดิเรกคือการกระทำที่ตั้งใจทำเพื่อฟื้นฟูตัวเอง หรือเป็นงานที่ทำให้รู้จักตัวเองมากขึ้นเสีย#nอีกค่ะ"
1006106-55 = "มันเป็นงานที่ไม่ต้องตั้งใจทำก็ได้เหรอคะเนี่ย ถ้างั้นฉันก็น่าจะพอรู้แล้วละค่ะ"
1006106-56 = "ว่างานอดิเรกของฉันจะเป็นอะไรได้บ้าง..."
1006106-57 = "[s] \"ลองนึกถึงสิ่งที่เพิ่งได้ทำไปตอนมีเวลาว่างดูสิ\""
1006106-61 = "[ns5] \"ลองนึกถึงนิสัยที่ทำโดยไม่รู้ตัวดูสิ\"\n[ns6] \"ลองนึกถึงสิ่งที่ทำไปโดยไม่มีเป้าหมายดูสิ\""
1006106-66 = "แบบนี้นี่เองสินะคะ"
1006106-67 = "สิ่งที่ทำโดยไม่รู้ตัว... สิ่งที่ทำเมื่อมีเวลาว่าง โดยไม่ได้ตั้งเป้าหมายยิ่งใหญ่อะไร..."
1006106-68 = "ถ้างั้นก็คงจะเป็นสิ่งที่ทำตอนที่ฉันมีเวลาเหลือเพราะทำงานเสร็จก่อนกำหนด หรือเมื่อมีเวลาว่าง#nระหว่างการเดินทางสินะคะ"
1006106-69 = "อืม ล่าสุดก็คงเป็น..."
1006106-70 = "ส่ง MOMOTALK ไปพูดคุยเรื่องโน้นเรื่องนี้กับคุณครู..."
1006106-71 = "ไม่ก็คุยกับคุณครูเกี่ยวกับเรื่องที่ผุดขึ้นมาในหัวของฉัน..."
1006106-72 = "ไม่ก็ขอคำปรึกษาเมื่อมีปัญหาหรือเรื่องกังวลใจ..."
1006106-73 = "น่าจะ... เป็น... อย่างนั้น..."
1006106-74 = "นะ... คะ..."
1006106-84 = "[ns7] \"...ซากุระโกะ?\"\n[ns8] \"เมื่อกี้ว่ายังไงนะ?\""
1006106-89 = "อ้อ..."
1006106-90 = "อ่า... อืม... คือว่า..."
1006106-94 = "...คุณครูคะ"
1006106-95 = "ขอโทษนะคะ แต่ขอจบเรื่องนี้ไว้เพียงเท่านี้ได้มั้ยคะ?"
1006106-96 = "ฉันเหมือนจะ... รู้คำตอบแล้วน่ะค่ะ แต่ฉันอยากได้เวลาจัดระเบียบความคิดสักหน่อยค่ะ"
1006106-97 = "ฉันรู้ว่านี่เป็นการกระทำที่ไม่มีลำดับและเสียมารยาท"
1006106-98 = "แต่ก็ได้โปรดเถอะค่ะ... ฉันขอร้องค่ะ"
1006106-99 = "วะ... วันนี้..."
1006106-100 = "พอแค่นี้ก่อนเถอะนะคะ..."
1006106-105 = "[ns] \"............\""
1006106-107 = "[ns] \"......????\""
1006106-109 = "(จากนั้นซากุระโกะก็เดินออกมาส่งครูด้วยสีหน้ากระอักกระอ่วน)"

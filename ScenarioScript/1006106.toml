[translation]
1006106-1 = "#title;의외의 취미"
1006106-2 = "#na;(사쿠라코와의 상담을 위해, 사쿠라코가 사용하는 성당의 집무실로 향했다.)"
1006106-3 = "#st;[0,0];instant;1;"
1006106-4 = "#clearST"
1006106-5 = "#wait;2000"
1006106-6 = "#na;사쿠라코;오셨군요, 선생님."
1006106-7 = "#st;[0,0];instant;1;"
1006106-8 = "#clearST"
1006106-9 = "#wait;1500"
1006106-10 = "#all;hide"
1006106-11 = "#wait;500"
1006106-12 = "3;사쿠라코;02;개인적인 일인데도, 먼 길 와 주셔서 감사합니다.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1006106-13 = "3;사쿠라코;99;본래라면 응당 제가 선생님을 찾아뵈었어야 할 일이지만, 지금 그럴 수 없는 일이 좀……."
1006106-14 = "[s1] \"알고 있어, 업무 때문이잖아?\"\n[s2] \"걱정하지 마. 누구보다 이해하고 있으니까.\""
1006106-15 = "#wait;10"
1006106-16 = "#wait;10"
1006106-17 = "3;사쿠라코;02;아. 네, 감사합니다. 선생님."
1006106-18 = "#st;[0,0];instant;1;"
1006106-19 = "#clearST"
1006106-20 = "3;사쿠라코;01\n#3;m4\n#wait;1500"
1006106-21 = "3;사쿠라코;99;그럼 선생님의 시간을 낭비하지 않기 위해, 거두절미하고 바로 이야기 드릴까 합니다."
1006106-22 = "3;사쿠라코;02;이건 그러니까 '취미'라는 것에 관련되는 이야기입니다.\n#3;em;[반응]"
1006106-23 = "[s] \"취미?\""
1006106-24 = "3;사쿠라코;01;네. 얼마 전에, 그런 질문을 받았었거든요.\n#3;m3"
1006106-25 = "3;사쿠라코;99;취미생활을 할 시간이 줄어들어 힘들다던, 어떤 자매님의 이야기를 들어주던 도중…….\n#3;em;…"
1006106-26 = "3;사쿠라코;07;자매님께서 문득 저에게, \"사쿠라코님의 취미는 무엇인가요?\"라고 여쭈셨었습니다."
1006106-27 = "3;사쿠라코;13;그리고 저는, 대답을 하지 못했습니다.\n#3;em;[속상함]\n#3;stiff"
1006106-28 = "3;사쿠라코;07;그럴 수밖에 없었습니다. 실제로, 취미라고 생각할 만한 게 딱히 없었으니까요."
1006106-29 = "3;사쿠라코;99;취미라고 할 만한 것이 무엇인지도 잘 모릅니다."
1006106-30 = "3;사쿠라코;02;물론 다른 분들이 모두 취미를 가지고 있다고 해서, 제가 꼭 취미를 가져야 한다고 생각하지는 않습니다만.\n#3;em;[반응]"
1006106-31 = "3;사쿠라코;13;그치만……."
1006106-32 = "[s3] \"다른 사람을 이해해 주기 위해서라도.\"\n[s4] \"그 감정에 대해서 알고 싶은 거구나.\""
1006106-33 = "#wait;10"
1006106-34 = "#wait;10"
1006106-35 = "3;사쿠라코;99;맞습니다. 말씀드리고 나니, 딱히 저에 대한 이야기만은 아닐 지도 모르겠군요."
1006106-36 = "3;사쿠라코;01;저의 하루 일과는 늘 동일하게 정해져 있고, 크게 남는 시간이 없습니다."
1006106-37 = "3;사쿠라코;02;설령 남는 시간이 생긴다 해도, 성당의 행사나 자매님들의 일정을 재점검합니다."
1006106-38 = "3;사쿠라코;01;그것들을 딱히 시간에 쫓기면서 하는 일도 아니고, 괴롭거나 부담스럽다고 느끼지도 않습니다."
1006106-39 = "3;사쿠라코;99;……선생님.\n#3;em;…"
1006106-40 = "#st;[0,0];instant;1;"
1006106-41 = "#clearST"
1006106-42 = "3;사쿠라코;07\n#3;d\n#3;h\n#wait;1000"
1006106-43 = "3;사쿠라코;07\n#3;a\n#3;closeup\n#3;h\n#wait;1000"
1006106-44 = "#wait;1000"
1006106-45 = "3;사쿠라코;13;남는 시간이란 뭘까요. 취미란 무엇일까요?\n#3;em;[?]\n#3;closeup"
1006106-46 = "3;사쿠라코;07;선생님께서는 저보다 바쁜 일정을 소화하고 계시면서도, 때때로 취미에 열중하신다는 이야기를 들은 적이 있습니다.\n#3;closeup"
1006106-47 = "3;사쿠라코;99;그렇기에 알고 싶었습니다. 취미를 어떻게 만드시는 건지, 어째서 그것을 구하시는 것인지…….\n#3;closeup"
1006106-48 = "3;사쿠라코;07;……네?\n#3;em;[?]\n#3;closeup"
1006106-49 = "3;사쿠라코;07;굳이 목적이나 의미를 담은 행동이 아니라 습관……이라고요? 취미가?\n#3;closeup"
1006106-50 = "#st;[0,0];instant;1;"
1006106-51 = "#clearST"
1006106-52 = "3;사쿠라코;07\n#3;em;…\n#3;closeup\n#wait;2500"
1006106-53 = "3;사쿠라코;99;그렇군요. 과연. 일리가 있는 말씀입니다.\n#3;closeup"
1006106-54 = "3;사쿠라코;01;저는 쭉 취미가 자신의 회복이나 추가적인 자아 확보를 위해 하는 의식적인 행동일 거라 생각했는데.\n#3;closeup"
1006106-55 = "3;사쿠라코;02;생각보다 훨씬 무의식적인 것이었군요. 그런 거라면 대충 알 것도 같습니다.\n#3;greeting\n#3;em;[반짝]\n#3;closeup"
1006106-56 = "3;사쿠라코;99;그렇다면 제 취미라는 것도, 어쩌면…….\n#3;closeup"
1006106-57 = "[s] \"최근 시간 날 때 했던 것들을 떠올려 봐.\""
1006106-58 = "#st;[0,0];instant;1;"
1006106-59 = "#clearST"
1006106-60 = "3;사쿠라코;07\n#3;em;[?]\n#3;h\n#3;closeup\n#wait;1200"
1006106-61 = "[ns5] \"무의식적으로 했던 습관들을 떠올려 봐.\"\n[ns6] \"큰 목적이나 의미 없이 그냥 했던 걸 떠올려 봐.\""
1006106-62 = "#st;[0,0];instant;1;"
1006106-63 = "#st;[0,0];instant;1;"
1006106-64 = "#clearST"
1006106-65 = "3;사쿠라코;07\n#3;em;…\n#3;h\n#wait;2500"
1006106-66 = "3;사쿠라코;99;과연. 그렇군요."
1006106-67 = "3;사쿠라코;01;무의식적으로 했던 일들……. 최근 들어, 시간이 날 때, 별 의미 없이 했던 일들……."
1006106-68 = "3;사쿠라코;02;보통은 업무를 하다가 남는 대기 시간이나, 이동 도중 짬이 날 때의 일들이겠군요.\n#3;em;[반응]"
1006106-69 = "3;사쿠라코;99;뭐, 그럴 때는 최근……."
1006106-70 = "3;사쿠라코;99;보통 선생님께 모모톡으로 잡담을 보내거나…….\n#3;em;…"
1006106-71 = "3;사쿠라코;99;문득 떠오른 주제에 대해서 선생님께 말을 걸거나……."
1006106-72 = "3;사쿠라코;99;고민 같은 게 생겼을 때 상담을 신청하거나……."
1006106-73 = "3;사쿠라코;99;그랬……던……. 것……."
1006106-74 = "3;사쿠라코;07;같……은……데……."

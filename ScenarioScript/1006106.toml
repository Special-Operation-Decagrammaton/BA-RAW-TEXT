1006106-94 = "3;사쿠라코;06;……선생님.\n#3;em;[세로선]\n#3;closeup"
1006106-95 = "3;사쿠라코;06;대단히 죄송합니다만, 이 이야기는 여기까지 해도 괜찮을까요?\n#3;closeup"
1006106-96 = "3;사쿠라코;08;해결은……. 이미 되었습니다. 다만, 저 스스로 조금 추스를 시간이 필요할 것 같습니다.\n#3;em;[반응].\n#3;closeup"
1006106-97 = "3;사쿠라코;08;두서도 없고, 예의도 없는 행동이라는 걸 알고 있지만.\n#3;closeup"
1006106-98 = "3;사쿠라코;09;부디……. 이렇게 부탁드립니다.\n#3;closeup"
1006106-99 = "3;사쿠라코;13;오, 오늘은.\n#3;em;[///]\n#3;stiff\n#3;closeup"
1006106-100 = "3;사쿠라코;13;여기까지만, 하게 해주십시오…….\n#3;closeup"

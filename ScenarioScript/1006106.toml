[translation]
1006106-1 = "意外的興趣"
1006106-2 = "（為了和櫻子的諮詢，前往了櫻子所在的教堂辦公室）"
1006106-6 = "您來了啊，老師。"
1006106-12 = "非常感謝您願意為了我個人的事情專程過來。"
1006106-13 = "本來應該是我去見老師才對，但現在實在無法抽身……"
1006106-14 = "[s1]「沒關係，是工作的關係吧？」\n[s2]「別擔心，這種狀況我也很清楚。」"
1006106-17 = "……謝謝您，老師。"
1006106-21 = "那麼，為了不浪費老師的時間，我就直接進入正題了。"
1006106-22 = "簡單來說……是和「興趣」有關的事。"
1006106-23 = "[s]「興趣？」"
1006106-24 = "是的。不久前，有人問了我這樣的問題。"
1006106-25 = "某位修女告訴我，自己正因能享受興趣的時間減少而感到煩惱……"
1006106-26 = "那位修女問了我「您的興趣是什麼呢？」。"
1006106-27 = "而我卻無法回答這個問題。"
1006106-28 = "我實在別無選擇。#n事實上，我並沒有能稱為興趣的事……"
1006106-29 = "甚至就連所謂的興趣究竟是什麼，我也不是很清楚。"
1006106-30 = "我明白即便其他人都有興趣，我也沒有必要變得和他們一樣。"
1006106-31 = "但果然……"
1006106-32 = "[s3]「為了理解其他人，」\n[s4]「所以你想了解這樣的心情對吧。」"
1006106-35 = "是的──也就是說，這並非我一個人的事。"
1006106-36 = "我每天的行程都很固定，沒有什麼多餘的時間。"
1006106-37 = "即便有，也必須用來重新檢查教堂的安排或修女們的行程。"
1006106-38 = "這些事不會讓我覺得自己被時間追趕，我也不認為這些事情是負擔。"
1006106-39 = "……那個，老師。"
1006106-45 = "希望您可以告訴我空閒的時候該做什麼，以及什麼是興趣。"
1006106-46 = "我曾聽說老師每天的行程比我更忙碌，卻還是有非常熱衷的興趣。"
1006106-47 = "因此我很想知道，該怎麼培養興趣，以及為何要擁有興趣──"
1006106-48 = "──咦？"
1006106-49 = "並非有目的或意義的行為，而是一種習慣……是嗎？"
1006106-53 = "……原來如此，是這樣啊。"
1006106-54 = "我以為……那是有意識地療癒自己、獲得嶄新自我而進行的行動。"
1006106-55 = "原來是比想像中更加偏向無意識的行為呢。我似乎稍微能理解了。"
1006106-56 = "那麼我的興趣……或許……"
1006106-57 = "[s]「試著回想最近的行動吧。」"
1006106-61 = "[ns5]「像是自己下意識會做的事。」\n[ns6]「或是沒有特別目的或意義的事。」"
1006106-66 = "這樣啊……"
1006106-67 = "下意識採取的行動，或是沒有特殊意義的事……"
1006106-68 = "像是工作時的等待時間、或是移動過程中的空檔嗎。"
1006106-69 = "那種時候……"
1006106-70 = "通常都會傳MomoTalk給老師……"
1006106-71 = "或是把心裡想到的話題傳達給老師……"
1006106-72 = "有煩惱的時候就詢問是否能向老師諮詢……"
1006106-73 = "我想應該──"
1006106-74 = "……"
1006106-84 = "[ns7]「……櫻子？」\n[ns8]「怎麼了嗎？」"
1006106-89 = "啊……那個……"
1006106-90 = "非，非常抱歉……"
1006106-94 = "……那個，老師。"
1006106-95 = "真的很抱歉，這個話題可以到此為止嗎？"
1006106-96 = "我想……我已經知道答案了。#n不過，我想可能還需要一些獨處的時間……"
1006106-97 = "我很清楚這是非常突然和無禮的行為……"
1006106-98 = "還請您諒解……"
1006106-99 = "今，今天就……"
1006106-100 = "拜託您，到此為止……"
1006106-105 = "[ns] 「…………」"
1006106-107 = "[ns] 「……？？？」"
1006106-109 = "（不知為何被露出尷尬表情的櫻子送離了大教堂）"

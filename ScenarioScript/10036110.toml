[translation]
10036110-1 = "Epilogue"
10036110-3 = "Phew."
10036110-4 = "That's it for the teardown. Nothing left here but sand."
10036110-13 = "[ns] \"Good morning, Saori.\""
10036110-15 = "Hey, Sensei. Hey, everybody."
10036110-16 = "Were you taking a walk?"
10036110-17 = "S-Something like that. I just wanted to see the festival site again before we leave."
10036110-18 = "The heat, the excitement...I seriously couldn't believe I was up on stage like that."
10036110-19 = "I just hope I wasn't a laughingstock."
10036110-20 = "[s1] \"No. No, it was a blast to see you up there.\"\n[s2] \"I almost got cramps from having too much fun.\""
10036110-26 = "Yeah, SO much fun. Just like the beach parties I read about in the magazines."
10036110-27 = "I guess it wasn't half bad..."
10036110-28 = "I enjoyed it too. Especially seeing Sao-Sao's hidden talent."
10036110-30 = "A talent... A-Ahem! Let's all take a walk together."
10036110-36 = "It's so quiet here now. As if all the commotion never happened."
10036110-37 = "With the festival site gone, it looks even more empty."
10036110-38 = "Yep, it looks like a whole different place without all the Helmet Gangsters."
10036110-42 = "..."
10036110-49 = "Breaking waves, shining sunlight..."
10036110-50 = "An empty beach. It feels so...new."
10036110-51 = "I'm still sleepy, but it was worth waking up for this."
10036110-52 = "So, leader, did you solve what was bothering you?"
10036110-53 = "H-Huh?!"
10036110-54 = "Geez..."
10036110-55 = "You have a habit of loitering around when you're anxious."
10036110-56 = "Even I know that."
10036110-57 = "*cough*"
10036110-58 = "Heehee. She's cute when she panics, isn't she?"
10036110-63 = "...You're going to leave again, aren't you?"
10036110-64 = "Got some more self-discovery to do?"
10036110-66 = "...Yeah."
10036110-67 = "But I think it's going to be different now."
10036110-68 = "Before, I felt like I was running in the dark. I didn't know where I was or how fast I was going..."
10036110-69 = "But now, I've seen a little light."
10036110-70 = "So, I'm going to use that light as a guide, while I wander around and bump into things. A little more."
10036110-71 = "And I'm sorry. I'm sorry for—"
10036110-75 = " You don't have to apologize now."
10036110-76 = "Indeed not. We'll always root for you, Sao-Sao. Don't worry about us."
10036110-77 = "T-Try to call if you can. Maybe if we're in the same neighborhood, we can all hang out."
10036110-83 = "...Thank you, all of you."
10036110-84 = "And Sensei..."
10036110-85 = "[s3] \"I'll root for you too.\"\n[s4] \"Let me know whenever you need help.\""
10036110-88 = "Thank you."
10036110-89 = "Then I suppose this is where we part ways for now."
10036110-91 = "...I guess. You guys can leave first this time. Let me see you off."
10036110-93 = "S-Stay safe, Saori..."
10036110-99 = "...Don't get yourself hurt."
10036110-105 = "Until we meet again. Goodbye, Sao-Sao."
10036110-114 = "..."
10036110-115 = "[s] \"Cheer up, Saori. Sometimes, a goodbye is a chance for another hello.\""
10036110-116 = "Are they gone yet?"
10036110-117 = "[s] \"...Huh?\""
10036110-118 = "There's something I didn't tell them."
10036110-119 = "I didn't get paid."
10036110-120 = "[s] \"What?!\""
10036110-121 = "I shouldn't have trusted the Helmet Gang, or underestimated them. There's a reason they've been able to grow so quickly."
10036110-122 = "Contracts are sacred. You taught me that, Sensei."
10036110-123 = "Circumstances change, and people can make accomodations..."
10036110-124 = "...but stiffing a contractor is an unforgivable act!"
10036110-125 = "So with that in mind, Sensei..."
10036110-126 = "[s] \"Oh yeah, if that's the case, I'll help you however I can.\""
10036110-127 = "Great. All right, then."
10036110-132 = "After those Helmet Gangsters!"
10036110-134 = "I suppose the summer's not quite over yet..."
10036110-135 = "Sheside outside"

[translation]
10036110-1 = "尾聲"
10036110-3 = "呼。"
10036110-4 = "東西撤除之後，就只剩下空蕩蕩的沙灘了啊……"
10036110-13 = "[ns]「早安，沙織。」"
10036110-15 = "老師，還有大家……"
10036110-16 = "沙醬在散步嗎？"
10036110-17 = "算，算是吧。#n我想再看一眼昨天的慶典現場。"
10036110-18 = "那份熱情，那份興奮，還有最重要的……#n我居然會站在舞台上，真是難以置信……"
10036110-19 = "希望沒有淪為笑柄。"
10036110-20 = "[s1]「沒有那種事！昨天非常有趣！」\n[s2]「我還因為玩得太嗨，今天全身都在痠痛呢！」"
10036110-26 = "就，就是說呀……真的玩得很開心。#n簡直就像雜誌上看到的海灘派對一樣！"
10036110-27 = "這個嘛，確實是挺不錯的……"
10036110-28 = "嗯，我也很開心。#n沒想到沙醬還有這方面的才能呢。"
10036110-30 = "說什麼才能……咳，咳哼！總之一起散散步吧。"
10036110-36 = "海灘真安靜呢。#n讓人完全無法想像昨晚有多熱鬧。"
10036110-37 = "慶典會場拆除之後，好像顯得更空曠了。"
10036110-38 = "就是說呀……頭盔團的人也都走了，感覺就像另一個地方一樣。"
10036110-42 = "……"
10036110-49 = "細碎的浪花，耀眼的陽光……"
10036110-50 = "空蕩蕩的海灘也別有一番風情呢。"
10036110-51 = "雖然辛苦，但早起還是值得的啊。"
10036110-52 = "話說你的煩惱解決了嗎，隊長？"
10036110-53 = "唔，嗯！？"
10036110-54 = "……真是的。"
10036110-55 = "不自覺地四處徘徊，是你心煩意亂時的習慣吧。"
10036110-56 = "這種事我還是知道的。"
10036110-57 = "咳，咳哼。"
10036110-58 = "呵呵，慌張的沙醬也很可愛呢。"
10036110-63 = "……你還是打算離開嗎？"
10036110-64 = "要繼續尋找自我嗎？"
10036110-66 = "……啊啊，沒錯。"
10036110-67 = "不過這次或許跟以往有點不同。"
10036110-68 = "以前的我，就像是在一片黑暗中漫無目的地奔跑……"
10036110-69 = "但這次的經歷，讓我隱約看見了一線光明。"
10036110-70 = "所以我打算以那道光為目標，繼續嘗試與探索。"
10036110-71 = "雖然對你們很抱歉……"
10036110-75 = "事到如今也不必道歉了。"
10036110-76 = "嗯，沙醬。我們會一直為你加油的，不用擔心我們。"
10036110-77 = "偶，偶爾也請聯絡一下我們吧……#n如果碰巧在附近的話，說不定還可以見個面……"
10036110-83 = "……大家，謝謝你們。"
10036110-84 = "還有老師也是。"
10036110-85 = "[s3]「我也會為你加油的。」\n[s4]「需要幫助的時候，隨時可以跟我說。」"
10036110-88 = "謝謝你，老師。"
10036110-89 = "那麼，是時候該告別了嗎？"
10036110-91 = "……啊啊，你們先走吧。#n每次都是我先行離開，這次就換我來送行吧。"
10036110-93 = "要，要好好保重哦，沙織姐……"
10036110-99 = "……別受傷了。"
10036110-105 = "嗯，下次見囉，沙醬。"
10036110-114 = "……"
10036110-115 = "[s]「打起精神來，沙織。離別是下一次相遇的……」"
10036110-116 = "孩子們都走了嗎？"
10036110-117 = "[s]「……嗯？」"
10036110-118 = "雖然沒在孩子們面前提起……#n因為後來事情亂成一團的關係，有件事被我忽略了。"
10036110-119 = "那就是我好不容易完成了這個委託，結果卻沒拿到報酬。"
10036110-120 = "[s]「什麼……！？」"
10036110-121 = "頭盔團……果然是群不容小覷的傢伙啊。#n他們能在奇普托斯壯大勢力不是沒有原因的。"
10036110-122 = "老師先前這麼教導過我──#n在簽約、打工、工作的過程中……往往會遇到各式各樣的情況。"
10036110-123 = "雖然途中可以視情況給予他人一些方便或好處……"
10036110-124 = "但明明簽了合約卻不付報酬，這是絕對不能容忍的行為……！"
10036110-125 = "所以，老師……"
10036110-126 = "[s]「嗯，我會全力協助你的。」"
10036110-127 = "好，那麼……"
10036110-132 = "立刻開始追擊頭盔團吧！"
10036110-134 = "（看來距離夏天結束，似乎還早得很呢）"
10036110-135 = "Sheside outside"

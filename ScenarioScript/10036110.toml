[translation]
10036110-1 = "บทส่งท้าย"
10036110-3 = "ฮู่ว..."
10036110-4 = "พอรื้อถอนทุกอย่างออก ก็เหลือแต่หาดทรายสินะ..."
10036110-13 = "[ns] \"อรุณสวัสดิ์ ซาโอริ\""
10036110-15 = "อ้อ... ครู และก็ทุกคนด้วย..."
10036110-16 = "กำลังเดินเล่นอยู่เหรอ?"
10036110-17 = "กะ... ก็ประมาณนั้น ฉันแค่อยากมาดูที่จัดงานเทศกาลเมื่อวานอีกครั้งน่ะ"
10036110-18 = "ทั้งความคึกคัก ความตื่นเต้น และที่สำคัญที่สุด... ฉันยังไม่อยากเชื่อเลยว่าตัวเองได้ไปยืนบนเวที..."
10036110-19 = "หวังว่าฉันจะไม่เป็นที่น่าหัวเราะของคนดูนะ"
10036110-20 = "[s1] \"ไม่หรอก! สนุกมากเลยต่างหาก!\"\n[s2] \"เมื่อวานครูโยกจนปวดเนื้อปวดตัวไปหมดเลยนะ!\""
10036110-26 = "ชะ... ใช่ค่ะ สนุกมากๆ เลยค่ะ เหมือนปาร์ตี้ริมหาดที่ฉันอ่านเจอในนิตยสารยังไงยังงั้นเลยค่ะ!"
10036110-27 = "มันก็... ไม่ได้แย่หรอกนะ..."
10036110-28 = "อื้ม ฉันก็สนุกเหมือนกัน ไม่คิดเลยนะว่าซัตจังจะมีพรสวรรค์แบบนั้นด้วย"
10036110-30 = "พรสวรรค์เหรอ... อะ... อะแฮ่ม! งั้นเราไปเดินเล่นกันมั้ย?"
10036110-36 = "ชายหาดเงียบสงบดีจัง เงียบจนลืมไปเลยนะว่าเมื่อวานเกิดเรื่องโกลาหลขึ้นน่ะ"
10036110-37 = "พอรื้อถอนเวทีกับถอนทุกอย่างออกก็ดูว่างเปล่าขึ้นมาเลย"
10036110-38 = "นั่นสิคะ... แก๊งหมวกกันน็อกก็กลับกันไปหมดแล้ว แบบนี้ยิ่งเหมือนเป็นคนละที่กันเลยค่ะ"
10036110-42 = "..."
10036110-49 = "คลื่นสาดกระเซ็น แสงแดดส่องประกาย..."
10036110-50 = "ชายหาดที่เหลือแค่ธรรมชาติก็ให้ความรู้สึกแตกต่างออกไปเนอะ"
10036110-51 = "ถึงจะเหนื่อยอยู่บ้าง แต่ก็คุ้มค่านะที่ตื่นมาแต่เช้า"
10036110-52 = "แล้วเริ่มคลายความกังวลลงบ้างหรือยังล่ะ หัวหน้า?"
10036110-53 = "หะ... หืม?!"
10036110-54 = "เฮ้อ..."
10036110-55 = "ก็ที่ออกมาเดินไปเดินมา มันเป็นนิสัยตอนจิตใจว้าวุ่นไม่ใช่เหรอ?"
10036110-56 = "เรื่องแค่นี้ฉันรู้น่า"
10036110-57 = "คะ... แค่กๆ"
10036110-58 = "ฮุฮุ ซัตจังตอนตกใจก็น่ารักดีนะ"
10036110-63 = "อยากออกไปทำอีกครั้งล่ะสิ...?"
10036110-64 = "จะค้นหาตัวเองต่องั้นเหรอคะ?"
10036110-66 = "อืม... ใช่"
10036110-67 = "แต่มันอาจจะไม่เหมือนทั้งหมดที่ผ่านมาก็ได้"
10036110-68 = "แต่ก่อนฉันรู้สึกว่าตัวเองกำลังวิ่งอยู่ในความมืด ที่ไม่รู้ทั้งทิศทาง ไม่รู้ทั้งความเร็ว..."
10036110-69 = "แต่จากเรื่องที่เกิดขึ้นครั้งนี้ ฉันเริ่มรู้สึกได้ถึงแสงสว่างบ้างแล้วละ ถึงมันจะยังริบหรี่ก็เถอะ"
10036110-70 = "ฉันเลยจะใช้แสงนั่นเป็นเครื่องนำทาง แล้วออกไปค้นหาตัวเองต่อ"
10036110-71 = "ต้องขอโทษทุกคนด้วยนะ..."
10036110-75 = "ไม่ต้องขอโทษพวกเราแล้วละ"
10036110-76 = "อื้ม พวกเราจะเป็นกำลังให้ซัตจังเสมอนะ ไม่ต้องห่วงพวกเราหรอก"
10036110-77 = "ตะ... ติดต่อมาบ้างนะคะพี่ซาโอริ... ถ้าบังเอิญว่าเราอยู่ใกล้ๆ กัน เราจะได้มาเจอหน้ากันได้บ้าง..."
10036110-83 = "ขอบใจนะทุกคน..."
10036110-84 = "และก็ครูด้วย"
10036110-85 = "[s3] \"ครูก็จะเป็นกำลังใจให้นะ\"\n[s4] \"ถ้าต้องการความช่วยเหลือก็บอกครูนะ\""
10036110-88 = "ขอบคุณนะครู"
10036110-89 = "งั้นเราคงต้องลากันตรงนี้สินะ"
10036110-91 = "คงจะเป็นอย่างนั้นน่ะ... ทุกคนไปกันก่อนเถอะ ที่ผ่านมาฉันเป็นคนจากไปก่อนทุกครั้ง ครั้งนี้ขอให้ฉันได้ส่งทุกคนเถอะนะ"
10036110-93 = "ระ... รักษาตัวด้วยนะคะพี่..."
10036110-99 = "อย่าเจ็บตัวล่ะ..."
10036110-105 = "อื้ม จนกว่าจะถึงวันที่ได้เจอกันใหม่ ลาก่อนนะ ซัตจัง"
10036110-114 = "..."
10036110-115 = "[s] \"ร่าเริงหน่อยสิ ซาโอริ เราจากลากันเพื่อพบกันใหม่นะ...\""
10036110-116 = "ทุกคนไปกันแล้วหรือยังน่ะ?"
10036110-117 = "[s] \"หืม...?\""
10036110-118 = "ฉันไม่ได้บอกเรื่องนี้กับทุกคนน่ะ แล้วเมื่อวานก็เกิดเรื่องขึ้นหลายอย่างจนฉันก็ลืมคิดไปเลย"
10036110-119 = "ครั้งนี้ฉันทำภารกิจลุล่วงไปได้ด้วยดี แต่ก็ไม่ได้เงินค่าจ้างน่ะ"
10036110-120 = "[s] \"ว่าไงนะ...?!\""
10036110-121 = "แก๊งหมวกกันน็อก... เป็นพวกที่ไม่ควรประมาทด้วยจริงๆ พวกนั้นคงไม่ได้มาขยายอำนาจในคิโวทอส#nกันขำๆ เลยสินะ"
10036110-122 = "ฉันได้เรียนรู้จากครูด้วยนะ ว่าเวลาทำสัญญาและทำงานพาร์ทไทม์ ก็อาจเกิดเรื่องมากมายขึ้นได้อย่าง#nคาดไม่ถึงเลย"
10036110-123 = "ถ้าเป็นปัญหาเล็กๆ น้อยๆ เราก็อาจจะหยวนๆ ให้ได้ เพื่อให้งานเดินต่อ..."
10036110-124 = "แต่การไม่จ่ายเงินค่าจ้างทั้งๆ ที่ทำสัญญาจ้างงานกันแล้วเป็นเรื่องที่ยอมให้ไม่ได้...!"
10036110-125 = "เพราะงั้นแล้ว ครู..."
10036110-126 = "[s] \"อื้ม ถ้าเป็นเรื่องนั้นครูจะช่วยเต็มที่เลย\""
10036110-127 = "ดีละ ถ้างั้นก็..."
10036110-132 = "ไปสั่งสอนแก๊งหมวกกันน็อกกันเลย!"
10036110-134 = "(ดูเหมือนว่าฤดูร้อนจะยังไม่จบง่ายๆ แค่นี้...)"
10036110-135 = "Sheside outside"

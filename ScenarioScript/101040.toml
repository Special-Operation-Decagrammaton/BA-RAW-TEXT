[translation]
101040-1 = "第4話;日常的龜裂（２）"
101040-2 = "奧利斯自治區．某處 "
101040-7 = "在，在這裡……！找到了！"
101040-11 = "櫻子大人，請看。"
101040-12 = "……原來如此，果然在這裡啊。"
101040-13 = "最後的聖徒會長留下的……「優斯提娜聖徒會的禮裝」。"
101040-14 = "明明打壓了奧利斯，卻又協助他們的[ruby=Exodus]三一自治區逃離[/ruby]，並支援其復興的，那位聖徒會長── "
101040-15 = "將本應傳承給繼任者的禮裝……藏在了這個奧利斯自治區啊。"
101040-16 = "……為何要捨棄它呢？"
101040-17 = "是因為後悔……還是責任感呢？#n……在那之後，你對這裡所發生的悲劇──"
101040-18 = "──不，我沒有能夠得知其理由的手段吧。"
101040-24 = "優斯提娜聖徒會最後的意志，就由身為修女會代表的我……#n以正當的繼承權限加以繼承。"
101040-25 = "……我無法再對有損優斯提娜聖徒會威嚴的行為視而不見。"
101040-32 = "櫻，櫻子大人……！請來這裡……！"
101040-33 = "我知道了。"
101040-35 = "您，您請看……"
101040-36 = "這個是……"
101040-39 = "……立刻召集修女會的祭司來這裡。"
101040-40 = "是，是……！"
101040-47 = "……"
101040-48 = "如果在奧利斯自治區發生了那件事……"
101040-49 = "事態或許遠比想像中的……更加嚴重。"
101040-51 = "三一．議事堂"
101040-61 = "──那麼，透過一共三次的聽證會，對茶會的聖園彌香做出下列的結論。"
101040-62 = "……"
101040-63 = "一，剝奪聖園彌香身為茶會成員的所有權限。"
101040-64 = "包含個人住宅、個人活動費、在特別校舍的課程等等……#n所有茶會成員的特權今後將不再繼續提供。"
101040-65 = "二，聖父派將內部會議中，對於聖園彌香對聖父派代表性的質疑提交到了本會。"
101040-66 = "因此聖父派將行使其固有的權限，選出新的代表。#n不過，在選出新的代表之前，聖園彌香的權限將維持不變。"
101040-67 = "……"
101040-68 = "三，即刻起終止聖園彌香的拘禁，允許其重返學業。"
101040-69 = "但是，請時時銘記自身的立場，避免參加與學業無關的活動。"
101040-70 = "以上就是藉由本聽證會所傳達的三一學生的意見。"
101040-75 = "聖園彌香，如有異議請你提出。"
101040-76 = "不，我沒有異議哦。"
101040-78 = "那麼最後，如果有話要說就請發言吧。"
101040-79 = "……"
101040-80 = "……感謝各位賜予我的機會，我會遵從決定。"
101040-83 = "……那麼聽證會到此結束。"
101040-90 = "補課部．教室"
101040-91 = "我有件重大的事要發表。"
101040-92 = "梓醬……？"
101040-93 = "重大的事？"
101040-94 = "什，什麼事？露出那麼恐怖的表情……怎麼了嗎？"
101040-98 = "大家仔細聽我說。#n不久前，我透過情報商得到了極密情報……這是非常重大的事件。"
101040-99 = "極……極密情報……？"
101040-100 = "情報商？"
101040-101 = "重大的，事件……？"
101040-106 = "發現了只存在記錄裡，傳說中的──#n「佩洛洛吉拉」玩偶的所在地。"
101040-107 = "……"
101040-108 = "佩洛洛吉拉……？"
101040-109 = "沒錯。聽好了，佩洛洛吉拉就是──"
101040-110 = "佩洛洛吉拉──！？"
101040-111 = "梓醬，那是真的嗎？佩洛洛吉拉的玩偶……那不就是因為運輸船的沉沒，導致沒有在市場上流通過的那個，傳說中的……！？"
101040-112 = "那個事件造成了玩偶承包業者的破產……之後就再也沒有重新販售，簡直就像歐帕茲一樣的東西！？居然真的存在嗎！？"
101040-113 = "不愧是你呢，日步美醬。"
101040-114 = "啊啊，不愧是日步美。正如你所說。"
101040-115 = "雖然現在已是消失的商品……不過似乎有在大量生產前用於設計監修的樣品──"
101040-116 = "目前為止都掌握在收集家的手中……但是最近其中一個似乎流通到市面上了。"
101040-117 = "原，原來如此……那確實是有可能。"
101040-118 = "但，但是，它的價格應該會很高……光靠我的存款……#n不，就算用我們四個人的所有財產恐怕也很難買到…… "
101040-119 = "咦！？我們四個人！？為什麼！？"
101040-120 = "剩，剩下的方法……啊，啊嗚嗚……#n果然，要迅速解決就只能──"
101040-121 = "為，為什麼要拿出手機？你打算聯絡誰？#n停下來！總之先停下來！"
101040-122 = "哎呀哎呀♡日步美醬，眼神真認真呢。"
101040-123 = "但，但是為了取得傳說中的商品……也只好做出各種犧牲……"
101040-124 = "你在說什麼啊日步美！振作點！！"
101040-128 = "不……我只是想說一起去看看而已……"
101040-129 = "什，什麼！？是，是那個意思嗎？#n啊，不，雖然那也是……理所當然的……"
101040-130 = "……非得弄到手嗎？"
101040-131 = "……我知道了。如果日步美想要的話，就這麼做吧。"
101040-132 = "咦！？"
101040-133 = "我雖然沒受過這類的訓練，所以可能比不上專家……#n不過，總會有辦法的。"
101040-134 = "咦！？啊，不用，沒關係的梓醬！#n我已經清醒過來了，不那麼做也沒關係！"
101040-135 = "……是，是嗎？"
101040-136 = "是的！只去看看也沒關係的！#n居然能親眼見到傳說中的「佩洛洛吉拉」玩偶，真是幸福！"
101040-137 = "這樣啊。那沒時間在這裡浪費了，立刻出發吧。"
101040-144 = "嗯！我們走吧！"
101040-151 = "……"
101040-152 = "唔呵呵，真不錯呢。#n今天的補課就到此■■了呢♡"
101040-157 = "……唔唔，什麼跟什麼啊……"
101040-158 = "等，等等！別丟下我啊！"
101040-166 = "可疑的商店"
101040-167 = "就是這裡嗎？"
101040-168 = "沒想到三一郊外會有這種地方……我之前都不知道。"
101040-169 = "嗚嗚……我怎麼會在這裡……"
101040-174 = "老闆，我聽說這裡有那個東西。"
101040-179 = "呵呵……真是的。您也是被傳說給吸引過來的客人啊……"
101040-180 = "這本來是連想看一眼都沒辦法的珍品……#n就特別讓客人您瞧一瞧吧。"
101040-182 = "（心動動）"
101040-183 = "（吞口水）"
101040-188 = "……！？"
101040-189 = "……咦？這，這個……"
101040-190 = "哼哼哼，怎麼樣啊？#n這就是傳說中的佩洛洛吉拉1/1000比例的玩偶！#n驚訝到連話都說不出來了吧？"
101040-191 = "這……不是佩洛洛吉拉。"
101040-192 = "對，這是佩洛洛恐龍。"
101040-193 = "你，你說什麼！？"
101040-194 = "唔嗯……不是類似的東西嗎？"
101040-195 = "不一樣，完全不一樣！"
101040-196 = "所以才說外行人就是不懂啊。"
101040-197 = "請仔細看！#n佩洛洛吉拉應該要更豐滿一點，而且有長舌頭這個特徵。"
101040-201 = "而這個佩洛洛恐龍。#n像是穿著衣服一樣，側重於臉部的描寫。"
101040-202 = "兩個完全不一樣。連類似都不算。"
101040-204 = "怎麼會……！？#n我可是在黑市花了大把鈔票才買到，結果居然不是！？"
101040-206 = "三一．5號門"
101040-207 = "佩洛洛吉拉……好想看真品……"
101040-208 = "請打起精神來，梓醬……#n就算遇不見佩洛洛吉拉……他也活在我們的心裡。"
101040-209 = "唔呵呵……請兩位都打起精神來。"
101040-210 = "咦……？"
101040-213 = "撤回聽證會的判決！"
101040-214 = "背叛者不需要同情！"
101040-215 = "把魔女吊起來！！"
101040-219 = "各，各位，禁止開火哦。請不要對空鳴槍……#n啊，對旁邊的人開槍也不行。"
101040-223 = "那個是……？"
101040-224 = "……是無法接受聽證會判決的學生呢。"
101040-225 = "……原來如此。是反對聖園彌香待遇的人嗎……"
101040-226 = "都已經第幾天了！還吵不膩嗎？#n也該適可而止了吧！"
101040-227 = "啊嗚……不過，大家有集會的自由……"
101040-228 = "……聖父派代表的職位空了出來，企圖利用今後政治混亂的各個勢力……"
101040-232 = "以及覬覦權威掃地的茶會權力的政治家……"
101040-236 = "還有單純只覺得有趣，順便落井下石的人……"
101040-237 = "花子醬……？"
101040-238 = "唔呵呵……三一果然是毒蛇的巢穴♡ "
101040-239 = "啊，啊嗚嗚……"
101040-240 = "……今後，彌香同學走上的路將會很兇險吧。"
101040-242 = "雖，雖然他所做的可能確實是壞事……#n不過也沒必要像那樣……"
101040-246 = "梓醬覺得呢？"
101040-247 = "我……"
101040-248 = "……聽說彌香和老師一起幫助了敦子。"
101040-249 = "不僅如此。#n還有沙織、日和與美咲──幫助了小隊的所有人。"
101040-250 = "……既然如此，我就沒有憎恨彌香的理由。"
101040-252 = "我反而更不喜歡這種聚眾攻擊一個人的狀況。"
101040-253 = "就算這樣也不能攻擊那些人唷，梓醬……"
101040-254 = "我知道……"
101040-255 = "……就是說啊。#n要是這些人也能和梓醬有相同的想法就好了。"
101040-256 = "「即使是不懂得寬恕與慈悲的我們──也會有獲得救贖的那一天嗎？」"
101040-257 = "我也不清楚。"
101040-258 = "但是，無論等待著我的是怎樣的結局……"
101040-260 = "「都必須要努力才行」……對吧！"
101040-261 = "哎呀？小春醬很清楚呢。"
101040-262 = "還，還好吧。因為梓常常這麼說，所以就記起來了。"
101040-263 = "……呵呵。不愧是小春醬，對朋友的事無所不知呢♡"
101040-264 = "啊！？我，我……！"
101040-265 = "謝謝你，小春。我也想更了解小春。"
101040-266 = "之後如果有機會，再像上次一樣一起洗澡吧。"
101040-267 = "什，什麼……！？"
101040-268 = "哎呀♡我也可以加入嗎？"
101040-269 = "你，你不行！！你加入的話一定會做些奇怪的事！不行！禁止！"
101040-270 = "啊，啊嗚……"
101040-277 = "撤回結果！那種判決誰能接受啊！"
101040-278 = "給予背叛者懲罰！"
101040-284 = "嗯……這是什麼情況？"
101040-285 = "這是怎麼回事！？愛莉，你有確認清楚嗎？"
101040-286 = "咦！？我看看……下午3點，三一第5後門……#n限定巧克力冰淇淋，100份賣完為止……嗯，是這裡沒錯唷。"
101040-287 = "……沒看見冰淇淋車，只看到示威的學生……"
101040-288 = "唔嗯……對了。#n那邊的小姐們，可以問你們一下嗎？"
101040-289 = "要問什麼？別妨礙我們！"
101040-290 = "難道，你們是支持彌香的人！？"
101040-292 = "彌香……？"
101040-293 = "支持……？"
101040-294 = "……什麼意思？"
101040-295 = "如果你們不是彌香派的，要不要一起抗議？#n一起看看那討人厭的聖園彌香被拉下台的樣子吧！"
101040-296 = "啊哈哈！一定會很爽吧！"
101040-297 = "……有人理解了嗎？"
101040-298 = "（搖頭）"
101040-299 = "（搖頭）"
101040-300 = "啊，我知道了！#n聖園彌香大人……！茶會的那位！"
101040-301 = "茶會？這麼突然？"
101040-302 = "今天不是要吃巧克力冰淇淋嗎？"
101040-303 = "不，我不是在說那個……茶會是……"
101040-304 = "你說的是學生會的那個茶會？"
101040-305 = "咦，什麼意思？"
101040-306 = "千紗，你知道嗎？"
101040-307 = "……不。"
101040-308 = "真是的……你們連學園手冊都沒看過嗎。"
101040-309 = "少囉嗦，夏！反正你也只是誤以為是點心聚會才會看的吧！"
101040-310 = "……"
101040-311 = "看來是答對了。"
101040-312 = "總，總之！"
101040-313 = "茶會裡有一個叫做彌香大人的非常漂亮的人……#n好像被捲入了某個事件……"
101040-314 = "最近示威抗議也很多……好像跟他有關係？"
101040-315 = "是嗎……？"
101040-316 = "我沒特別注意……"
101040-317 = "不過，對學生會有興趣的人也沒多少吧？#n我想大部分的人也不太清楚他們在抗議什麼。"
101040-318 = "算是吧。所以為了讓更多學生知道這件事才要來抗議啊！"
101040-319 = "沒錯沒錯！雖然我從來沒看過聖園彌香，不過感覺很有趣嘛！#n啊哈哈！"
101040-325 = "……話說你們有看見冰淇淋車嗎？#n本來是預計在這裡舉辦限量販售活動的。"
101040-327 = "啊～你說餐車的話，因為會妨礙示威所以把它趕走了唷。"
101040-328 = "趕，趕走了！？"
101040-329 = "那個……知道去了哪裡嗎？"
101040-330 = "誰會知道啊，煩死人了！#n沒有要加入就閃遠一點！少礙事！"
101040-334 = "呀啊！？"
101040-339 = "……"
101040-340 = "謝，謝謝你，千紗醬……"
101040-341 = "喂，你們是想怎樣！！"
101040-342 = "……你，剛才推了我們家的愛莉嗎？"
101040-344 = "那又怎樣？"
101040-345 = "……"
101040-346 = "……"
101040-347 = "我，我沒事的……！千，千紗醬，夏醬，喜美醬！#n……不，不用那麼生氣……"
101040-348 = "千紗。"
101040-349 = "嗯。"
101040-350 = "人在缺乏糖分的時候，思緒就會不太清晰對吧？"
101040-351 = "沒錯。"
101040-352 = "甜蜜與苦澀共存的巧克力，可以說就和人生一樣……#n也就是說，現在開始發生的事全都是巧克力造成的。"
101040-353 = "雖然完全不懂你在說什麼，總之錯的是巧克力吧。我知道了。"
101040-354 = "正是如此……那麼──"
101040-361 = "……"
101040-362 = "……"
101040-363 = "……嗯？"
101040-364 = "你，你們想幹嘛……！"
101040-365 = "啊，啊啊啊……"
101040-366 = "你對我們家的愛莉做了什麼！！"
101040-371 = "全部，都是巧克力的錯。"
101040-372 = "本來就已經，很吵了，你們連禮貌跟道德都沒有嗎！？"
101040-373 = "看清楚了……這就是陷入糖分缺乏症的野獸們，其危險性的證明啊，朋友們。"
101040-374 = "大，大家……"
101040-375 = "你們到底想怎樣啊！"
101040-381 = "敵人增加了！夏，那邊就拜託你了！"
101040-382 = "好的好的，包在我身上。"
101040-383 = "大家，在示威中打架是不行的……唉……完蛋了。"
101040-389 = "啊，啊～聽得見嗎？第5後門的學生們發生了一點狀況。#n請立刻支援……不，只是平常的那種，大約三、四個人就可以了……"
101040-393 = "請，請不要打架！"
101040-394 = "請冷靜下來！"
101040-396 = "呿，麻雀──不，是實現正義部！#n大家快跑！"
101040-401 = "快跑呀愛莉！這邊！"
101040-402 = "啊，咦，大家等等……！？"
101040-408 = "在戰鬥的盡頭……以及我們的未來，究竟有什麼在等待著呢──大概是巧克力冰淇淋吧。那麼……Adios。"
101040-409 = "都跟你說趕快跑了！"
101040-415 = "下一話;日常的龜裂（３）"

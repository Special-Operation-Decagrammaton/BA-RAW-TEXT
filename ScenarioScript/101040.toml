[translation]
101040-1 = "Episode 4; A Fissure in Everyday Life 2"
101040-2 = "Somewhere in the Arius District"
101040-7 = "Over here! I found it here!"
101040-11 = "Sakurako, it's here."
101040-12 = "What a relief. Just as we had hoped."
101040-13 = "The ceremonial dress of the Saint Justina Council left here by the last council president..."
101040-14 = "The last council president may have been an oppressive leader, but she was vital in organizing their safe exodus to their district and even Arius' eventual revival. "
101040-15 = "The dress should have been handed down to her successor, but instead she hid it away here, in the Arius district."
101040-16 = "Why, of all places, did you abandon it here, Council President?"
101040-17 = "This district is saturated with the tragedy it has been forced to endure. Was this decision a manifestation of your guilt? Regret?"
101040-18 = "...Speculation will get me nowhere."
101040-24 = "As a representative of the Sisterhood, I will adopt the last will of the Saint Justina Council by the rights of succession."
101040-25 = "Yes... I can no longer stand by as the Saint Justina Council's dignity is trod upon."
101040-32 = "S-Sakurako! Could you come look at this please?"
101040-33 = "Of course. Lead the way."
101040-35 = "O-Over here."
101040-36 = "This..."
101040-39 = "...Please summon the scholars of the Sisterhood immediately."
101040-40 = "Y-Yes, ma'am!"
101040-47 = "..."
101040-48 = "If something related to that happened in the Arius district..."
101040-49 = "The problem could be a lot more serious than we thought..."
101040-51 = "Trinity Hearing Room"
101040-61 = "After three hearings, we have come to the following verdicts for Misono Mika of the Tea Party."
101040-62 = "..."
101040-63 = "First, all of Misono Mika's privileges as a Tea Party member are officially revoked."
101040-64 = "All the Tea Party benefits, such as private residences, private operating expenses, and independent classes with special teachers, will no longer be provided."
101040-65 = "Second, while we have accepted the Pater Faction's resolution, a question has been raised about Misono Mika's representation of said faction."
101040-66 = "The Pater Faction shall elect a new representative according to its own bylaws. However, Mika's authority will be maintained until this representative is elected."
101040-67 = "..."
101040-68 = "Lastly, Misono Mika's detention is suspended, and she will be allowed to return to her studies, effective immediately."
101040-69 = "That being said, we remind you to remember the gravity of your position and not step out of line."
101040-70 = "This verdict has been drawn after hearing the concerns and opinions of the Trinity student body and leaders throughout the hearing."
101040-75 = "Do you have any objections, Misono Mika?"
101040-76 = "No, I do not, ma'am."
101040-78 = "Do you have any final words you would like to share?"
101040-79 = "..."
101040-80 = "...Thank you for giving me a second chance. I will abide by your verdict."
101040-83 = "Good. This hearing is adjourned."
101040-90 = "Make-Up Work Club Classroom"
101040-91 = "I have an important announcement."
101040-92 = "Huh? Azusa?"
101040-93 = "An important announcement?"
101040-94 = "Wh-What is it? Why are you being so serious...?"
101040-98 = "Listen closely. I've recently obtained top-secret, classified information through an intelligence dealer. We have never undertook a more important mission."
101040-99 = "T-Top secret...?"
101040-100 = "...Intelligence dealer?"
101040-101 = "*gulp* C-Classified...?"
101040-106 = "Yes. This is a legendary item that's only ever existed in records. I have confirmed the existence and location of a Perorodzilla's stuffed toy."
101040-107 = "..."
101040-108 = "Perorod...zilla...?"
101040-109 = "Take heed! Perorodzilla is none other..."
101040-110 = "PERORODZILLA?! "
101040-111 = "Azusa, are you sure? You're telling the truth? There is nothing in the history of all merchandise more legendary than that stuffed toy! The cargo ship carrying the flagship stock sank and it never released to the general markets!"
101040-112 = "To make matters worse, the subcontractor that made the toy went bankrupt from this tragedy and went out of business! They never manufactured more, and so they became legendary artifacts!"
101040-113 = "It's like hearing the details from a Perorodzilla history book."
101040-114 = "Yes, Hifumi. You understand."
101040-115 = "All of the merchandise on that ship was indeed lost, but rumors began to float within the community that a few of the original design prototypes still existed."
101040-116 = "They unfortunately fell into the hands of evil: the dark collectors. But, at long last, exactly one Perorodzilla stuffed toy appeared on the market recently."
101040-117 = "I-I never thought of that. But that makes total sense."
101040-118 = "B-But, that kind of item would be a luxury beyond our wildest dreams... If all four of us pooled all our money... No, we still wouldn't be able to afford it. "
101040-119 = "Why am I being included in this?!"
101040-120 = "Okay, think, Hifumi... What can... The only solution we have is to... Ugh, we would need an expert for that..."
101040-121 = "What in the world are you thinking? What expert?! ...No! Hifumi, you can't!"
101040-122 = "Hifumi, I must admit, that gleam in your eyes is a bit terrifying right now."
101040-123 = "You don't understand... Morals and common sense have no role to play when it comes to procuring legendary merchandise."
101040-124 = "No morals?! Stop being crazy, Hifumi!"
101040-128 = "I... I just wanted to go look at it."
101040-129 = "Wh-Wh-What?! That's, uh, that's what I was saying too! Duh!"
101040-130 = "Is owning the stuffed toy of great importance as well?"
101040-131 = "...Okay, Hifumi. If that is what you want, that is what we'll do."
101040-132 = "What?!"
101040-133 = "I have never received official training, so I will not be as skilled as the experts you wished to contact. But if we plan well and for all possible outcomes, our mission will be successful."
101040-134 = "Hold on a second, Azusa! I had a momentary lapse of judgment. It's not worth it! "
101040-135 = "I-I see..."
101040-136 = "I promise! I'm just happy I have the chance to see the legendary Perorodzilla stuffed toy with my own eyes!"
101040-137 = "Then we won't waste another moment. Let's go."
101040-144 = "Yes! Let's do it! "
101040-151 = "..."
101040-152 = "Heehee. How nice. We get to skip doing make-up work again!"
101040-157 = "Wh-What...is happening here?"
101040-158 = "Wait! But don't leave me behind!"
101040-166 = "Suspicious Shop"
101040-167 = "This is it."
101040-168 = "To think there were places like this so close to Trinity..."
101040-169 = "I-I'm not here by choice! You hear?!"
101040-174 = "Hello, Owner. I hear the item is here."
101040-179 = "Heehee. You've come for the legendary item. Like a moth to the flame."
101040-180 = "Naturally, we can't show off something like that to just anyone...but for potential buyers anything is possible."
101040-182 = "*thump thump*"
101040-183 = "*gulp*"
101040-188 = "...?!"
101040-189 = "B-But... This is..."
101040-190 = "Heehee. Yes, I know! You must be amazed! This is the one, the only, the legendary Perorodzilla stuffed toy, one-thousandth the size of the real thing!"
101040-191 = "This is...not Perorodzilla."
101040-192 = "She's right. This is Perorosaurus."
101040-193 = "Wh-What?!"
101040-194 = "Um... Isn't it basically the same thing?"
101040-195 = "It's different! Completely and utterly different!"
101040-196 = "The words of an amateur."
101040-197 = "Perorodzilla is a little chubbier with a long tongue."
101040-201 = "Obviously this is Perorosaurus. You can tell by the shape of the face and the costume."
101040-202 = "It's like comparing apples and oranges! They're completely different!"
101040-204 = "Wh-What do you mean?! Do you know how much I paid for this?! It's not the genuine article...?"
101040-206 = "Trinity Main Gate 5"
101040-207 = "I really thought...we were going to see Perorodzilla..."
101040-208 = "It's okay, Azusa... Perorodzilla will always be alive in our hearts, at the very least... "
101040-209 = "Hahaha. It'll be okay, you two."
101040-210 = "Wh-What's happening over there?"
101040-213 = "Rescind the verdict!"
101040-214 = "No mercy for the wicked!"
101040-215 = "Hang the witch!"
101040-219 = "D-Don't fire into the sky... No, shooting the person next to you isn't allowed either..."
101040-223 = "Isn't that...?"
101040-224 = "A protest against the hearing's verdict... "
101040-225 = "I see. They're dissatisfied with the decision regarding Misono Mika's fate."
101040-226 = "It's been days! Days! Don't they have better things to do?! Why are they doing this?"
101040-227 = "Well... They have the right to freedom of assembly..."
101040-228 = "With the Pater Faction essentially leaderless, opposing forces are attempting to take advantage of the political confusion."
101040-232 = "On top of that, the Tea Party has lost too much of its authority over the school and greedy politicians are grasping for its power."
101040-236 = "And of course some people are just tossing stones, amused to see where they might land..."
101040-237 = "Hanako...?"
101040-238 = "In conclusion, Trinity is a festering den of snakes. ♡ "
101040-239 = "U-Ugh..."
101040-240 = "Misono Mika's life will be no cake walk from here on out."
101040-242 = "Sh-She looks scary...but she didn't seem like a bad person..."
101040-246 = "How do you feel about it, Azusa?"
101040-247 = "Me? I..."
101040-248 = "I heard that Mika helped Sensei rescue Atsuko."
101040-249 = "Not just Atsuko. Saori, Hiyori, Misaki... She saved everyone."
101040-250 = "I don't know who Misono Mika is, but for that alone I could not hate her."
101040-252 = "And it is unjust for an entire crowd to be harassing just one person."
101040-253 = "P-Please don't attack them, Azusa... "
101040-254 = "If you say so."
101040-255 = "But your heart is in the right place. If only those people could see things from your perspective."
101040-256 = "Can those who refuse to embrace forgiveness or mercy find salvation, Azusa?"
101040-257 = "I don't have an answer to that."
101040-258 = "But even if the results aren't guaranteed..."
101040-260 = "\"We have to try our best!\" Right?! "
101040-261 = "Oh? Koharu, you took the words right out of her mouth."
101040-262 = "Duh! Azusa's always saying boring stuff like that!"
101040-263 = "Heehee. How sweet of you Koharu. You always pay attention when your friends speak."
101040-264 = "Wh-What?! That's not what I meant at all!"
101040-265 = "I appreciate it, Koharu. I, too, pay attention when you talk."
101040-266 = "To further our bond, we should take a bath together again."
101040-267 = "What are you saying...?!"
101040-268 = "This is warming my heart. I'd like to join as well!"
101040-269 = "N-No way! You always make things weird! Stay back, you dirty person! "
101040-270 = "O-Oh my..."
101040-277 = "Say no to the hearing!"
101040-278 = "Punish the traitor!"
101040-284 = "What's going on over here?"
101040-285 = "What is this?! Airi, did you get the place right?"
101040-286 = "Th-This should be right! Three o' clock at Trinity's fifth rear entrance... Yes! This is where they're selling the hundred limited-edition chocolate ice creams. We even got here early since they're on a first-come, first-serve basis."
101040-287 = "Unless those protesting students are selling the ice cream, I don't think it's here."
101040-288 = "Hey, you there. Angry ladies. Can I ask a question?"
101040-289 = "Huh?! We're busy over here!"
101040-290 = "Wait! Are you Mika supporters?"
101040-292 = "Mika...?"
101040-293 = "Supporters...?"
101040-294 = "...What?"
101040-295 = "Not supporters then... In that case, join us! Don't you want to see Misono Mika pay for her actions?"
101040-296 = "We'll finally see her get what she deserves!"
101040-297 = "...Are you following?"
101040-298 = "Nope."
101040-299 = "No."
101040-300 = "Oh! I understand. Misono Mika from the Tea Party!"
101040-301 = "Oh? Where's the party?"
101040-302 = "Stay focused, Airi. We're here for limited-edition chocolate ice cream, not a tea party."
101040-303 = "No, no! Not a tea party, THE Tea Party!"
101040-304 = "Oh, I think I know this one. That's the name of our academy's student council, right?"
101040-305 = "Huh? Really?!"
101040-306 = "What about you, Kazusa? Did you know about them?"
101040-307 = "...Should I?"
101040-308 = "Tsk, tsk. You didn't even open up the academy's information brochure, did you? Ladies and gentlemen, the grim future of Trinity."
101040-309 = "You're talking real big for someone who thought Airi was talking about an actual party! You thought it was a dessert club meet-up, didn't you?! "
101040-310 = "..."
101040-311 = "She got you there."
101040-312 = "W-Well, anyways...!"
101040-313 = "I hear there's a beautiful princess named Mika in the Tea Party, but something terrible happened to her...!"
101040-314 = "That must be what those protests we've been seeing all over campus grounds were about!"
101040-315 = "There were protests...?"
101040-316 = "I didn't really notice them, to be honest."
101040-317 = "Paying so much attention to politics and all those higher-ups isn't very romantic. I bet half of the people here don't even know what this is about."
101040-318 = "That's exactly why we need to shout even louder, so more students hear our message and participate! "
101040-319 = "What she said! I've never even met Misono Mika, but it's fun to protest her! Hahaha!"
101040-325 = "...More importantly, have you seen an ice cream truck? It was supposed to be selling limited-edition chocolate ice cream."
101040-327 = "Oh, we kicked them out because they were getting in the way of the protest."
101040-328 = "Kicked them out?!"
101040-329 = "Do you happen to know where they went?"
101040-330 = "Like I care! Look, if you're not going to join us, get lost! All this talking is detracting from our protesting!"
101040-334 = "A-Ack?!"
101040-339 = "..."
101040-340 = "Ah! Thank you, Kazusa."
101040-341 = "Hey! What the hell do you think you're doing?"
101040-342 = "...Did you really just push Airi? Our Airi?"
101040-344 = "So what? What are you gonna do about it? "
101040-345 = "..."
101040-346 = "..."
101040-347 = "W-Wait! Look, I'm okay! No injuries! Kazusa...! Natsu, Yoshimi, please...!"
101040-348 = "Kazusa."
101040-349 = "Yes."
101040-350 = "When people's blood sugar falls low, it can cause aggression, can't it?"
101040-351 = "It can. "
101040-352 = "Chocolate, where sweetness and bitterness coexist, is like a metaphor for life... So, everything that happens from now on is in the name of chocolate."
101040-353 = "You're spewing nonsense again. But I can agree that \"everything is because of the chocolate.\" Makes sense."
101040-354 = "Since we're all on the same page..."
101040-361 = "..."
101040-362 = "..."
101040-363 = "...Huh?"
101040-364 = "Wh-What the heck...?"
101040-365 = "A-Ah!"
101040-366 = "Who do you think you are, huh?! "
101040-371 = "Everything is because of the chocolate!"
101040-372 = "How rude can you idiots be?! It's loud enough here to begin with! Huh? HUH?!"
101040-373 = "These are the dangerous beasts low blood sugar levels can create, my friends."
101040-374 = "E-Everyone... Please..."
101040-375 = "What the hell is going on here?!"
101040-381 = "Natsu, reinforcements! Take that side."
101040-382 = "I'm on it."
101040-383 = "You can't fight during a protest... Ugh. It's already a disaster. "
101040-389 = "Testing, testing. Can you hear me? Student disturbance at the fifth rear entrance. Please send backup, at least three or four. This isn't the first incident today."
101040-393 = "P-Please! No more fighting!"
101040-394 = "Everyone, calm down!"
101040-396 = "Hmph. It's the brass... I mean, the Justice Task Force! Run!"
101040-401 = "Let's get out! Airi, this way!"
101040-402 = "W-Wait! Everyone...?"
101040-408 = "What lies at the end of this conflict? These trials and tribulations? I do hope it's limited-edition chocolate ice cream. With that, adios."
101040-409 = "Stop your monologuing and run!"
101040-415 = "Next Episode; A Fissure in Everyday Life 3"

[translation]
101040-1 = "ตอนที่ 4;รอยร้าวในชีวิตประจำวัน 2"
101040-2 = "ที่แห่งหนึ่งในเขตปกครองตนเองอาเรียส "
101040-7 = "นะ... นี่ไง...! เจอแล้วค่ะ!"
101040-11 = "ทางนี้ค่ะท่านซากุระโกะ"
101040-12 = "...... จริงด้วย อยู่ตรงนี้จริงๆ ด้วยค่ะ"
101040-13 = "ชุดพิธีของสาวกยูสตาร์ที่หัวหน้าสาวกคนสุดท้ายทิ้งไว้..."
101040-14 = "สาวกคนสุดท้ายที่ข่มเหงอาเรียสอย่างรุนแรงกว่าใครอื่น แต่ก็ไปช่วยการหลบหนีของพวกนั้น แถมยังสนับสนุนการฟื้นฟูของเขตปกครองอีก... "
101040-15 = "เอาชุดพิธีที่เดิมทีต้องเอาไปให้ทายาทของผู้หญิงคนนั้น... มาซ่อนไว้ที่เขตปกครองตนเองอาเรียสนี่#nเองสินะคะ"
101040-16 = "ทำไมหัวหน้าถึงเอาสิ่งนี้มาทิ้งไว้นะ?"
101040-17 = "เป็นเพราะเสียใจหรือโทษตัวเองหรือเปล่าคะ? แล้วโศกนาฏกรรมที่จะตามมาในเขตปกครองตนเองนี้..."
101040-18 = "......ไม่สิ ไม่มีทางที่ฉันจะรู้เรื่องนั้นได้เลยค่ะ"
101040-24 = "ความตั้งใจสุดท้ายของสาวกยูสตาร์นั้น ฉันจะเป็นคนรับช่วงต่อด้วยอำนาจและสิทธิที่คู่ควรเองค่ะ"
101040-25 = "ใช่ค่ะ... ฉันจะไม่เมินเฉยต่อการบิดเบือนเกียรติของสาวกยูสตาร์อีกต่อไปแล้วค่ะ"
101040-32 = "ทะ... ท่านซากุระโกะ...! หะ... เห็นทีต้องมาตรงนี้แล้วค่ะ..."
101040-33 = "ค่ะ ได้ค่ะ"
101040-35 = "ทะ... ทางนี้ค่ะ..."
101040-36 = "นี่มัน..."
101040-39 = "สั่งให้บัณฑิตของชมรมซิสเตอร์มารวมตัวกันที่นี่เดี๋ยวนี้ค่ะ"
101040-40 = "ค่ะ!!"
101040-47 = "......"
101040-48 = "ถ้ามีเรื่องที่เกี่ยวกับสิ่งนั้นเกิดขึ้นในเขตปกครองตนเองอาเรียสละก็..."
101040-49 = "ปัญหาอาจจะร้ายแรงกว่าที่คิดก็ได้ค่ะ..."
101040-51 = "ห้องพิจารณาคดี ทรีนิตี้"
101040-61 = "...จากการสืบพยานและไต่สวนที่จัดขึ้นทั้งหมดถึง 3 ครั้ง เราขอประกาศคำตัดสินเกี่ยวกับมิโซโนะ มิกะ แห่งสภาน้ำชาดังต่อไปนี้"
101040-62 = "......"
101040-63 = "ประการแรก มิโซโนะ มิกะจะถูกถอดถอนสิทธิพิเศษทั้งหมดในฐานะสภาน้ำชา"
101040-64 = "มิโซโนะ มิกะจะไม่ได้รับการอำนวยความสะดวกสบายใดๆ ในฐานะสมาชิกสภาน้ำชาอีกต่อไป อาทิ ทั้งคฤหาสน์ส่วนตัว ค่าใช้จ่ายในการดำเนินงานส่วนตัว หรือคาบเรียนอิสระในห้องเรียนพิเศษ"
101040-65 = "ประการที่สอง จากในการประชุมที่จัดขึ้นภายในกลุ่มปาเตอร์ มีการตั้งคำถามเกี่ยวกับความเหมาะสม#nในการเป็นผู้แทนของกลุ่มปาเตอร์ของมิโซโนะ มิกะ"
101040-66 = "กลุ่มปาเตอร์จะใช้อำนาจพิเศษของตนในการเลือกผู้แทนคนใหม่ อย่างไรก็ดี อำนาจของมิกะจะยังคงอยู่#nจนกว่าจะเลือกผู้แทนคนใหม่ได้"
101040-67 = "......"
101040-68 = "ประการที่สาม การกักขังมิโซโนะ มิกะจะถูกยกเลิกตั้งแต่บัดนี้เป็นต้นไป และอนุญาตให้กลับไปเรียนได้"
101040-69 = "อย่างไรก็ตาม เราแนะนำให้มิกะตระหนักในจุดยืนของตนและใช้ชีวิตอย่างมีสติอยู่เสมอ จบคำตัดสิน"
101040-70 = "และนี่คือความคิดเห็นส่วนใหญ่ของนักเรียนทรีนิตี้ที่แสดงออกผ่านการพิจารณาคดี"
101040-75 = "มีข้อคัดค้านต่อความคิดเห็นดังกล่าวไหม? มิโซโนะ มิกะ?"
101040-76 = "ไม่ละ ไม่มี"
101040-78 = "ถ้าอย่างนั้น สุดท้ายนี้หากมีอะไรจะพูด..."
101040-79 = "......"
101040-80 = "......ขอบคุณที่ให้โอกาสฉันค่ะ ฉันจะยอมรับและทำตามคำตัดสินค่ะ"
101040-83 = "...ถ้าเช่นนั้นก็ ขอปิดการพิจารณาตัดสิน"
101040-90 = "ห้องเรียนชมรมชั้นเรียนเสริม"
101040-91 = "ฉันมีเรื่องสำคัญจะแจ้งน่ะ"
101040-92 = "อาซึสะจัง...?"
101040-93 = "เรื่องสำคัญเหรอ?"
101040-94 = "อะ... อะไรเหรอ? เรื่องอะไรน่ะ ทำไมทำท่าจริงจังขนาดนั้น... "
101040-98 = "ทุกคนตั้งใจฟังให้ดีนะ เมื่อไม่นานมานี้ ฉันได้รับข้อมูลลับสุดยอดผ่านทางหน่วยข่าวกรอง มันเป็นเรื่อง#nที่สำคัญมากๆ"
101040-99 = "ขะ... ข้อมูลลับสุดยอด...?"
101040-100 = "หน่วยข่าวกรอง?"
101040-101 = "(กลืนน้ำลาย) ระ... เรื่องสำคัญ...?"
101040-106 = "ฉันค้นพบสถานที่ที่มีตุ๊กตาผ้า <เพโรโร่ซิลล่า> วัตถุในตำนานที่ถูกกล่าวถึงแค่ในบันทึกเท่านั้นแล้ว... "
101040-107 = "......"
101040-108 = "เพโรโร่ซิลล่า...?"
101040-109 = "ฟังให้ดีนะ สิ่งที่เรียกว่าเพโรโร่ซิลล่า..."
101040-110 = "เพโรโร่ซิลล่าเหรอคะ...?! "
101040-111 = "อาซึสะจัง นั่นเป็นเรื่องจริงเหรอคะ? ตุ๊กตาเพโรโร่ซิลล่า สินค้าในตำนานที่เรือบรรทุกสินค้าจมลงใน#nทะเลจนเอาไปขายในตลาดไม่ได้แม้แต่ชิ้นเดียว!"
101040-112 = "จากเหตุการณ์นั้น ผู้ผลิตรายย่อยที่สร้างตุ๊กตาก็เลยล้มละลาย ทำให้ตุ๊กตานั่นเป็นดั่งวัตถุหลงยุคที่จะ#nเอามารีเซลใหม่ก็ไม่ได้! อาซึสะจังกำลังบอกว่ามันยังมีอยู่จริงๆ เหรอคะ?!"
101040-113 = "ฮิฟุมิจังรู้รายละเอียดอยู่แล้วสินะคะ... สมแล้วที่เป็นฮิฟุมิจัง..."
101040-114 = "อืม ใช่แล้ว ฮิฟุมิ"
101040-115 = "ถึงตอนนี้มันจะเป็นของที่สูญหายไปแล้ว แต่ว่ากันว่ายังมีตุ๊กตาต้นแบบหลงเหลืออยู่บ้าง และมันคือ#nต้นแบบที่ผลิตไว้เพื่อตรวจสอบการออกแบบก่อนจะผลิตจริงในจำนวนมากน่ะ"
101040-116 = "ถึงที่ผ่านมาพวกมันจะอยู่ในมือของนักสะสมในความมืด... แต่ดูเหมือนว่าจะมีหนึ่งตัวที่ออกสู่ตลาดเมื่อ#nไม่นานมานี้"
101040-117 = "ถะ... ถ้าเป็นอย่างนั้นละก็... ฟังดูมีเหตุผลค่ะ"
101040-118 = "ตะ... แต่ถ้าเป็นของแบบนั้น ราคาก็คงจะแพงไม่ใช่เล่นเลย... แค่เงินเก็บของฉันที่มี... ไม่สิ ถึงเราสี่คน#nจะรวมเงินกันก็ไม่น่าจะซื้อไหว... "
101040-119 = "หืม?! เราสี่คนเหรอ? ทำไมล่ะ?!"
101040-120 = "ถะ... ถ้างั้นวิธีที่เหลือก็... อ่า... เรื่องแบบนั้น... ฝากไว้กับผู้เชี่ยวชาญ... น่าจะดีกว่า..."
101040-121 = "ทำอะไรน่ะ?! โทรศัพท์ทำไม จะโทรหาใครน่ะ? อย่านะ! หยุดเลยนะ!"
101040-122 = "ฮิฟุมิจัง... จู่ๆ สายตาก็น่ากลัวขึ้นมาแล้วละค่ะ..."
101040-123 = "ตะ... แต่เพื่อให้สินค้าในตำนานนั้นมาอยู่ในมือเรา... บางทีเราก็ต้องมองข้ามศีลธรรมและสามัญสำนึก..."
101040-124 = "พูดอะไรของเธอน่ะ! ตั้งสติหน่อยสิ! ฮิฟุมิ!"
101040-128 = "เปล่า... ฉันแค่จะชวนไปดูเฉยๆ น่ะ..."
101040-129 = "คะ... คะ?! แค่จะชวนไปดูเหรอคะ? มะ... ไม่สิ... แต่มันก็ต้องดูก่อนอยู่แล้ว..."
101040-130 = "ต้องซื้อตุ๊กตาตัวนั้นมาให้ได้เลยเหรอ?"
101040-131 = "เข้าใจแล้ว... ถ้าฮิฟุมิอยากได้ ฉันก็จะทำให้ "
101040-132 = "คะ?!"
101040-133 = "ถึงฉันจะไม่เก่งเท่าผู้เชี่ยวชาญเพราะไม่ได้รับการฝึกฝนด้านนี้มา แต่ถ้าเราวางแผนการให้ดี ยังไงก็ไม่น่าจะล้มเหลวนะ "
101040-134 = "คะ?!  มะ... ไม่เป็นไรค่ะ อาซึสะจัง ฉันควบคุมตัวเองได้แล้วค่ะ ไม่ต้องทำแบบนั้นก็ได้ค่ะ! "
101040-135 = "งะ... งั้นเหรอ?"
101040-136 = "ค่ะ! แค่ไปดูเฉยๆ ก็พอค่ะ! แค่ได้ดูตุ๊กตาผ้า <เพโรโร่ซิลล่า> ในตำนานด้วยสองตาก็เกินพอแล้วค่ะ!"
101040-137 = "อื้ม งั้นก็ไม่ต้องเสียเวลาอยู่หรอก ไปกันตอนนี้เลย"
101040-144 = "ค่ะ! รีบไปกันเลยค่ะ! "
101040-151 = "......"
101040-152 = "ฮุฮุ ดีจังเลยค่ะ วันนี้เราได้โดดคาบเรียนเสริมกันแบบนี้สินะคะ♡"
101040-157 = "นะ... นี่มันเรื่องอะไรกันเนี่ย..."
101040-158 = "ระ... รอด้วย! ฉันไปด้วย!"
101040-166 = "ร้านที่ดูน่าสงสัย"
101040-167 = "ที่นี่เหรอคะ?"
101040-168 = "ไม่คิดเลยนะคะว่าจะมีที่แบบนี้ในชานเมืองทรีนิตี้ด้วย..."
101040-169 = "ทะ... ทำไมฉันถึงมาอยู่ที่นี่ได้นะ..."
101040-174 = "พ่อค้า ฉันได้ยินมาว่าที่นี่มีของชิ้นนั้น"
101040-179 = "ฮุฮุ... แหมๆ มีผีเสื้อบินมาหาสินค้าในตำนานชิ้นนั้นถึงที่นี่อีกแล้วสินะ"
101040-180 = "ปกติแล้วผมไม่เอาของแบบนั้นออกมาโชว์หรอก... แต่ครั้งนี้จะเอาให้ดูเป็นกรณีพิเศษก็แล้วกันครับ"
101040-182 = "(ตื่นเต้นจัง)"
101040-183 = "(กลืนน้ำลาย)"
101040-188 = "......?!"
101040-189 = "......เอ๋? นะ... นี่มัน....."
101040-190 = "ฮุฮุ เป็นยังไงละครับ? นี่แหละตุ๊กตาผ้าขนาด 1:1000 ของเพโรโร่ซิลล่าในตำนาน! ตกใจจนพูดไม่#nออกเลยใช่ไหมครับ?"
101040-191 = "นี่มัน... ไม่ใช่เพโรโร่ซิลล่า"
101040-192 = "ใช่ค่ะ นี่มันเพโรโร่ซอรัสนี่คะ"
101040-193 = "วะ... ว่าไงนะ?!"
101040-194 = "หืม... ก็คล้ายๆ กันไม่ใช่เหรอคะ?"
101040-195 = "ไม่คล้ายค่ะ คนละอย่างกันเลยค่ะ!"
101040-196 = "พวกเพิ่งเข้าวงการจะรู้ได้ยังไงน่ะ"
101040-197 = "ดูให้ดีนะคะ เพโรโร่ซิลล่ามีลักษณะพิเศษคือลำตัวที่อ้วนและมีลิ้นยาวค่ะ"
101040-201 = "ส่วนเพโรโร่ซอรัสตัวนี้ จุดเด่นคือส่วนหนึ่งของใบหน้าที่เหมือนกับใส่ชุดตุ๊กตาอยู่ค่ะ"
101040-202 = "ทั้งสองตัวต่างกันอย่างสิ้นเชิงเลย จะบอกว่าเหมือนกันไม่ได้"
101040-204 = "เป็นไปได้ยังไง...!  อุตส่าห์จ่ายเงินแพงๆ ซื้อมาจากตลาดมืด แต่มันไม่ใช่ตุ๊กตาในตำนานหรอกเหรอ?!"
101040-206 = "ประตูหน้าทรีตินี้ 5"
101040-207 = "อยากเห็นเพโรโร่ซิลล่าของจริงจังเลย..."
101040-208 = "ไม่เป็นไรนะคะ อาซึสะจัง... ถึงเราจะไม่ได้เจอเพโรโร่ซิลล่า... แต่ว่ามันก็มีชีวิตอยู่ในหัวใจของพวกเรา#nนะคะ"
101040-209 = "อ่า... แหะๆๆๆ... ร่าเริงเข้าไว้นะคะ ทั้งสองคน"
101040-210 = "เอ๋...?"
101040-213 = "เพิกถอนคำตัดสินซะ!"
101040-214 = "เราไม่เห็นต้องไปให้อภัยคนทรยศเลย!"
101040-215 = "เอาแม่มดไปแขวนไว้ซะ! !"
101040-219 = "อะแฮ่ม ทุกคน ห้ามยิงนะคะ ห้ามยิงขึ้นฟ้าเด็ดขาดเลย... ไม่นะคะ ยิงคนข้างๆ ก็ไม่ได้ค่ะ"
101040-223 = "คะ... คนพวกนั้น..."
101040-224 = "...... พวกนักเรียนที่ไม่เห็นด้วยกับการสืบพยานสินะคะ "
101040-225 = "อย่างนี้นี่เอง... พวกนี้ไม่เห็นด้วยกับคำตัดสินของมิโซโนะ มิกะงั้นเหรอ..."
101040-226 = "กี่วันเข้ามาแล้วเนี่ย ไม่เบื่อกันบ้างเลยรึไง! ทำไมถึงมาทำแบบนี้กันล่ะเนี่ย!"
101040-227 = "อ่า... แต่ว่าเราก็มีเสรีภาพในการชุมนุม..."
101040-228 = "...พอตำแหน่งผู้แทนกลุ่มปาเตอร์ว่าง แต่ละกลุ่มอำนาจก็เลยพยายามใช้ประโยชน์จากความวุ่นวาย#nทางการเมืองที่จะเกิดขึ้นหลังจากนี้..."
101040-232 = "นักการเมืองก็ถูกความโลภเข้าครอบงำจนคิดช่วงชิงอำนาจที่ถดถอยของสภาน้ำชา..."
101040-236 = "ไหนจะคนที่สักแต่ว่าจะขว้างหินออกไปเพราะมันสนุกดีอีก..."
101040-237 = "ฮานาโกะจัง...?"
101040-238 = "สรุปแล้วทรีนิตี้ก็คือถ้ำงูพิษดีๆ นี่เองนะคะ♡ "
101040-239 = "อะ... เอ่อ..."
101040-240 = "...อนาคตข้างหน้าของมิโซโนะ มิกะจะต้องลำบากกว่านี้แน่เลยค่ะ"
101040-242 = "ถะ... ถึงมิกะจะดูน่ากลัว... แต่เธอก็คงไม่ใช่คนเลวร้ายอะไรนะ... ไม่น่าเลย..."

10007030-70 = "1;노도카 온천 온천장ND;05\n#1;ar\n#3;m5\n#wait;1500"
10007030-71 = "1;노도카 온천 온천장ND;14;지금 무얼 하고 계시는 건가요?!\n#1;em;[빠직]\n#1;stiff"
10007030-72 = "3;메루 온천ND;02;어라? 노도카 쨩이잖아?\n#3;em;[반응]"
10007030-73 = "3;메루 온천ND;01;손님이 목욕하는 탕에 지배인이 멋대로 들어오다니. 이 온천장의 접객 교육은 어떻게 돼먹은 거야?"
10007030-74 = "1;노도카 온천 온천장ND;15;그건 제가 할 말이에요! 왜 자꾸 남이 목욕하는 탕에 들어가서 수상한 시선으로 학생들을 지켜 보시는 건가요?\n#1;em;[!]"
10007030-75 = "1;노도카 온천 온천장ND;05;벌써 대욕탕 두 곳과 노천탕 한 곳에서 목욕 중 수상한 시선이 느껴진다고 항의가 들어왔다고요!"
10007030-76 = "3;메루 온천ND;01;응? 나는 노천탕 쪽에는 간 적이 없는데.\n#3;em;[?]"
10007030-77 = "3;메루 온천ND;02;노천탕에서 다른 학생들이 목욕하는 모습을 지켜보며 하악거렸던건…… 내가 아니라 노도카 쨩 아니야?"
10007030-78 = "1;노도카 온천 온천장ND;12;그, 그랬었던가……?\n#1;stiff"
10007030-79 = "1;노도카 온천 온천장ND;14;하, 하지만 다른 사람이 목욕하는 모습을 지켜보는 데 그치지 않고 스케치까지 한 메루 쨩의 죄질이 훨씬 나빠요!\n#1;em;[빠직]"
10007030-80 = "1;노도카 온천 온천장ND;05;저는 그저 지배인으로서의 소임을 다했을 뿐이라고요?"
10007030-81 = "3;메루 온천ND;05;그렇게 치면 나도 그저 예술을 하고 있었을 뿐이거든?\n#3;em;[반응]"
10007030-82 = "3;메루 온천ND;09;오히려 권력을 악용해서 다른 사람의 목욕을 훔쳐본 노도카 쨩이 더 나빠!"
10007030-83 = "1;노도카 온천 온천장ND;14;여하튼! 탕을 즐기러 오신 손님들이 메루 양의 그 '예술 행위' 때문에 떠나시기라도 한다면 저희 온천장은 대손해를 입는다고요!\n#1;hophop"
10007030-84 = "1;노도카 온천 온천장ND;05;유감이지만, 저희 온천장에서 나가주셔야겠어요!"
10007030-85 = "3;메루 온천ND;05;흥, 이쪽도 목숨을 걸고 그리고 있으니까!\n#3;em;[빠직]"
10007030-86 = "3;메루 온천ND;09;모처럼 좋은 소재를 얻을 수 있는 기회인데, 호락호락 물러날 수는 없어!"
10007030-87 = "1;노도카 온천 온천장ND;21;우읏…… 계속 그렇게 비협조적으로 나오신다면……\n#1;stiff"
10007030-88 = "1;노도카 온천 온천장ND;14;강제로 퇴거시키겠습니다! \n#1;em;[!]\n#fontsize;80"
10007030-89 = "[s] \"그냥 둘 다 빨리 나가줬으면 좋겠어…….\""

[translation]
10007030-1 = "ตอนที่ 3;สายตาที่น่าสงสัย"
10007030-2 = "บ่อออนเซ็นส่วนตัว ออนเซ็น No.227"
10007030-4 = "(ดื่มด่ำกับการแช่ออนเซ็น...)"
10007030-5 = "[s] \"ออนเซ็นดีจังเลยน้า~\""
10007030-6 = "ฮุฮุ ฮุฮุฮุ..."
10007030-12 = "[ns1] \"คะ...ใครน่ะ?!\"\n[ns2] \"โนโดกะเหรอ...?\""
10007030-15 = "ยะ...แย่ละสิ.. เหมือนจะถูกจับได้ซะแล้ว"
10007030-16 = "ถ้าเป็นแบบนี้ก็คงต้องเปิดเผยตัวแล้วสินะ..."
10007030-22 = "[ns] \"เธอคือ...?\""
10007030-23 = "ดีจ้า~ ได้ยินจากข่าวลือมาตั้งนานแล้ว แต่เพิ่งได้เจอกันครั้งแรกเลยนะครู"
10007030-24 = "ฉันชื่อฮิเมกิ เมรุ จากชมรมแนวร่วมปลดปล่อยความรู้! หรือเรียกตามนามปากกาว่า \"เมรูริ\" ก็ได้★"
10007030-25 = "[s3] \"ชมรมแนวร่วมปลดปล่อยความรู้...\"\n[s4] \"ชมรมที่รวบรวมหนังสือแปลกๆ นั่นน่ะเหรอ?\""
10007030-26 = "อื้อ เคยเจอกับโมมิจิมาแล้วใช่มั้ยล่ะ?"
10007030-27 = "ถึงความชอบจะแตกต่างกันนิดหน่อย แต่เธอก็เป็นหนึ่งในสหายไม่กี่คนที่จะไว้วางใจได้ใน#nสหภาพเรดวินเทอร์ที่แสนวุ่นวายนี้น่ะ ฮุฮุ..."
10007030-28 = "หนังสือแปลกๆ งั้นเหรอ พูดเกินไปแล้ว!"
10007030-29 = "ตอนนี้อาจจะถูกปฏิบัติเหมือนพวกแปลกๆๆ ก็เถอะ..."
10007030-30 = "แต่สักวันหนังสือ BL หรือ GL จะต้องได้รับการยอมรับในฐานะผลงานศิลปะชนิดหนึ่งแน่นอน!"
10007030-31 = "ฮึ่ม ฮึ่ม..."
10007030-32 = "ยังไงก็เถอะนะ แต่นี่คือครูที่เด็กนักเรียนในคิโวทอสไว้วางใจและยอมปฏิบัติตามงั้นเหรอ..."
10007030-37 = "ฮิฮิ... รูปร่างหน้าตาเหมือนที่จิ้นเอาไว้เลยนะ"
10007030-38 = "ถ้าไม่สเก็ตรูปร่างกับลักษณะร่างกายเอาไว้ละก็..."
10007030-42 = "อ๊ะ ไมต้องใส่ใจฉันหรอก แช่น้ำสบายๆ ไปได้เลย"
10007030-43 = "ฉันจะนั่งวาดรูปเฉยๆ น่ะ"
10007030-44 = "[s] \"ยิ่งต้องใส่ใจใหญ่เลย...\""
10007030-45 = "หืม? แค่วาดรูปเองไม่ได้ถ่ายรูปสักหน่อย จะใส่ใจทำไม?"
10007030-46 = "การวาดรูปเป็นศิลปะที่สร้างสรรค์ขึ้นตามอัตวิสัยของแต่ละคนนะ! ฉันไม่ได้ถ่ายรูปสักหน่อย#nไม่เห็นต้องอายเลย"
10007030-47 = "[s] \"เมรุมาทำอะไรที่นี่เหรอ?\""
10007030-48 = "หืม? ก็แน่นอนอยู่แล้วสิว่ามาหาแรงบันดาลใจงานโดจินชิน่ะ"
10007030-49 = "ครูเองก็น่าจะรู้นะ ว่างานโดจินชิขนาดใหญ่อย่าง <คอมิกเซ็นเตอร์> หรือเรียกย่อๆ ว่า <คอมิเซ็น> มันใกล้เข้ามาแล้ว..."
10007030-50 = "ในงานนี้จะมีการขายโดจินชิจากทั่วคิโวทอส มันเป็นงานสำคัญมากสำหรับ <ชมรมแนวร่วมปลดปล่อยความรู้> ของเราน่ะ"
10007030-51 = "อ่านผลงานใหม่ๆ ที่วางแแผง ประเมิน แล้วก็แอบเอาไปจัดแสดงไว้ในห้องสมุดโดยไม่ให้#nประธานเชริโน่รู้..."
10007030-52 = "โมมิจิบอกว่าแค่อ่านผลงานของนักเรียนโรงเรียนอื่นก็พอแล้ว แต่ฉันว่ามันไม่พอหรอกนะ!"
10007030-53 = "แทนที่จะนั่งชื่นชมผลงานอย่างเดียวเหมือนพวกคนรวย เราต้องสร้างผลงานใหม่ๆ ขึ้นมาด้วยมือ#nของเราเองสิ ถึงจะสมกับเป็นนักเรียนของสหภาพเรดวินเทอร์!"
10007030-54 = "...ว่าแล้วจู่ๆ ก็ได้ยินว่ามีออนเซ็นสร้างใหม่อยู่แถวๆ นี้น่ะ"
10007030-55 = "ถ้าเป็นออนเซ็นละก็ มันเป็นสถานที่ที่มีเหตุการณ์พิเศษสุดคลาสสิกที่พลาดไม่ได้ในอนิเมะ#nในธีมฤดูหนาวเลยนะ!"
10007030-56 = "ถ้าเป็นที่นี่ละก็จะคงมีแรงบันดาลใจดีๆ ให้เอาไปวาดรูปลงงานคอมิเซ็นได้แน่ๆ ฉันก็เลยมาที่นี่ไงล่ะ!"
10007030-57 = "แล้วครูเจออะไรดีๆ ที่น่าสนใจที่ออนเซ็นนี่บ้างมั้ย?"
10007030-58 = "อย่างเช่น ประธานกรรมการโรงเรียนเกเฮนน่ากับหัวหน้าคณะทวงความยุติธรรมของทรีนิตี้กำลัง#nดื่มด่ำกับบรรยากาศและใกล้ชิดกันด้วยร่างที่เปลือยเปล่า..."
10007030-59 = "[s] \"สองคนนั้นน่ะเหรอ... เป็นไปไม่ได้หรอก\""
10007030-60 = "โธ่เอ๊ย ในโลกนี้ไม่มีคำว่าเป็นไปไม่ได้หรอกนะ"
10007030-61 = "แล้วอีกอย่างโลกแห่งความคิดสร้างสรรค์น่ะลึกซึ้งมากเลยนะ ความเป็นไปได้แค่นิดเดียวก็อาจนำไป#nสู่สถานการณ์อื่นๆ ได้อีกนะ"
10007030-62 = "'ศัตรูคู่อาฆาตทั้งสองคนได้มาพบกันในสถานที่ที่ไม่คาดฝัน ดวงตาของทั้งสองฉายแววความ#nเกลียดชัง...'"
10007030-63 = "'อา... สองคนนั้นต้องแอบคบกันอยู่แน่ๆ เลย!'#nแฮ่ก... แฮ่ก..."
10007030-64 = "[s5] \"เด็กคนนี้ไหวมั้ยเนี่ย...\"\n[s6] \"ถ้าไม่รีบทำอะไรสักอย่าง...\""
10007030-71 = "กำลังทำอะไรอยู่กันคะ?!"
10007030-72 = "เอ๊ะ? โนโดกะจังนี่นา?"
10007030-73 = "ผู้ดูแลโผล่เข้ามาในห้องอาบน้ำของลูกค้าตามอำเภอใจได้ด้วยเหรอ ที่นี่อบรมพนักงานยังไงกัน?"
10007030-74 = "ฉันต่างหากที่ต้องเป็นฝ่ายพูดแบบนั้นนะคะ! ทำไมถึงชอบแอบเข้ามาในห้องอาบน้ำ แล้วแอบดูนักเรียนคนอื่นด้วยสายตาแปลกๆ แบบนั้นคะ?"
10007030-75 = "มีลูกค้าร้องเรียนมาจากทั้งบ่อออนเซ็นกลางแจ้ง แล้วก็บ่อออนเซ็นใหญ่ทั้งสองที่ว่ามีความรู้สึก เหมือนมีคนถ้ำมองตอนอาบน้ำด้วยนะคะ!"
10007030-76 = "หืม? ฉันยังไม่เคยไปแถวบ่อออนเซ็นกลางแจ้งเลยนะ"
10007030-77 = "คนที่ไปถ้ำมองนักเรียนคนอื่นๆ อาบน้ำที่บ่อออนเซ็นกลางแจ้งไม่น่าจะใช่ฉันหรอก#nน่าจะเป็นโนโดกะจังมากกว่านะ?"
10007030-78 = "งะ...งั้นเหรอ...?"
10007030-79 = "ตะ... แต่เมรุจังต่างหากที่แย่กว่า ไปถ้ำมองคนอื่นอาบน้ำแถมวาดรูปพวกเขาด้วยนะคะ!"
10007030-80 = "ฉันแค่ไปทำหน้าที่ดูแลในฐานะผู้จัดการก็เท่านั้นเองค่ะ"
10007030-81 = "ถ้าเธอพูดอย่างนั้น งั้นฉันก็แค่มาวาดรูปศิลปะก็เท่านั้นเองนะ"
10007030-82 = "โนโดกะนี่แย่ที่สุดเลย เธอใช้อำนาจผู้ดูแลเข้าไปแอบส่องคนอื่นอาบน้ำนะ!"
10007030-83 = "จะยังไงก็ช่างเถอะ! ถ้าเกิดลูกค้าที่มาใช้บริการไม่พอใจจาก \"การวาดรูปศิลปะ\" ของเมรุจังละก็ ออนเซ็นของเราจะเสียหายหนักเลยนะคะ!"
10007030-84 = "ฉันขอโทษนะคะ แต่ช่วยออกไปจากออนเซ็นของเราด้วยค่ะ!"
10007030-85 = "หืม? แต่ฉันยังมีงานค้างอยู่นะ!"
10007030-86 = "นี่เป็นโอกาสที่จะได้รูปดีๆ อยู่แล้วเชียว จะให้ยอมกลับไปเฉยๆ ได้ยังไงกัน!"
10007030-87 = "อึก... ถ้าจะไม่ให้ความร่วมมือกันแบบนี้ละก็..."
10007030-88 = "ฉันคงจะต้องขอบังคับให้ออกไปแล้วค่ะ! "
10007030-89 = "[s] \"ครูว่าออกไปจากตรงนี้ทั้งคู่เลยดีกว่านะ...\""

[translation]
10007030-1 = "第3話;奇怪的視線"
10007030-2 = "227號溫泉浴場．專用露天溫泉"
10007030-4 = "（泡湯中）"
10007030-5 = "[s]「溫泉果然很棒啊……」"
10007030-6 = "呵呵，呵嘻嘻嘻……"
10007030-12 = "[ns1]「是，是誰……！？」\n[ns2]「……和香？」"
10007030-15 = "哎呀呀，被發現了啊～"
10007030-16 = "既然如此也沒辦法了。"
10007030-22 = "[ns]「……那個，初次見面？」"
10007030-23 = "嗨嗨。雖然聽過傳聞不過還是第一次見面呢，老師！"
10007030-24 = "我是「知識解放戰線」的姬木愛瑠！也可以用筆名「Meruri」來稱呼我唷★"
10007030-25 = "[s3]「『知識解放戰線』……」\n[s4]「啊啊，是那個……在收集奇怪書本的社團嗎？」"
10007030-26 = "嗯，你之前有見過紅葉對吧？之前稍微聽說了唷。"
10007030-27 = "雖然興趣的取向有～點不一樣。#n但赤冬對書籍的檢查和取締特別嚴格，所以我和他可以算是同志吧。"
10007030-28 = "那是什麼拐彎抹角的說法！"
10007030-29 = "或許現在確實稱不上是主流……"
10007030-30 = "不過總有一天，BL和GL能被認可是主流藝術的日子一定會到來的！"
10007030-31 = "先不說這個了……"
10007030-32 = "呼呣呼呣，你就是被奇普托斯的各種學生仰慕著的那位傳聞中的老師嗎……"
10007030-37 = "呵呵……原來如此，和我想的一樣。"
10007030-38 = "這個肉體與身材的曲線，得好好記錄下來用來傳教才行……#n呵呵呵，這可能會讓奇普托斯為之瘋狂哦。"
10007030-42 = "啊，不用在意我哦。"
10007030-43 = "我只會在這裡畫畫而已。"
10007030-44 = "[s]「要不在意有點難啊……」"
10007030-45 = "是嗎？又不是要拍成照片。所謂的畫，基本上是依存於個人主觀的藝術。#n而照片……說不是的話是騙人的……#n不過，至少不會比照片羞恥吧？"
10007030-46 = "哎呀，這肌膚。這優美的肌肉。原來如此……！"
10007030-47 = "[s]「那個，愛瑠是來這裡做什麼呢……？」"
10007030-48 = "那當然是為了尋找同人誌的素材囉。"
10007030-49 = "我想老師應該也知道超大型同人活動「漫畫博覽會」……簡稱「漫博」就快開始了。"
10007030-50 = "簡單來說就是匯集奇普托斯所有同人作品的一大活動，#n同時也是各地的同志們集合的場所！#n因此對於我們「知識解放戰線」來說也是一年之中相當重要的活動……！"
10007030-51 = "在此之前，我們也在那裡邂逅了許多的新作品，#n非常珍惜地一讀再讀、訴說著感想，瞞著潔莉諾會長在圖書館展示、傳教……#n過著那樣的日子。"
10007030-52 = "但是，這樣還不足以滿足我！雖然紅葉說這樣就很夠了，#n但是我的靈魂在吶喊著這樣還不夠！我已經無法像[ruby=資產階級]布爾喬亞階級[/ruby]的人們一樣只是坐著不動了！"
10007030-53 = "當然，我並沒有要比較誰優於誰的意思，平等萬歲。#n但是，我想把寄宿在心中的這份熱情化為實體！#n具體來說，就是想描繪女孩子互相糾纏親熱的畫面！採取行動才稱得上是真正的赤冬聯邦學園的學生！"
10007030-54 = "就在那時，我偶然聽說了這附近有個很棒的溫泉浴場。#n既然得知了這種情報，當然就只能來看看了吧？"
10007030-55 = "特別是在以寒冷地帶為舞台的作品裡，溫泉事件是一定一定要有的！"
10007030-56 = "我想在這裡一定能獲得要在「漫博」上展出的作品的靈感，於是就跑過來了。"
10007030-57 = "所以，我也想問問老師……你有沒有在這個溫泉浴場發現什麼美味的素材啊？"
10007030-58 = "比如格黑娜的行政官和三一實現正義部的副部長，雖然表面上展現互相敵對的態度，私底下卻情話綿綿、靜靜擁抱著彼此的場面之類的……"
10007030-59 = "[s]「我想他們兩個應該不會做那種事吧……」"
10007030-60 = "我當然知道！實際上或許是不可能的！#n還有用現實人物當同人作品素材的時候需要非常小心！#n但是與此同時，世上沒有什麼事是「絕對」的！"
10007030-61 = "創作的世界是很深奧的啊，就算只有一點跡象也沒關係。#n比如就算兩人只是站在彼此身旁……"
10007030-62 = "「兩人在意外的地點相遇了。他們的眼神之中寄宿著憎恨的火焰……」"
10007030-63 = "「但那只是表面上的假象！其實他們在暗地裡正偷偷交往著……！」#n呵呵呵……光是這樣就能配三碗飯了！"
10007030-64 = "[s5]「……呃，你還好嗎？」\n[s6]「可能已經沒救了……」"
10007030-71 = "喂，喂！你在那裡做什麼！？"
10007030-72 = "咦，和香醬？"
10007030-73 = "問我在做什麼……只是在素描正在泡溫泉的老師而已啊？#n比起這個，客人正在泡湯的時候，經理跑進來是想做什麼？"
10007030-74 = "什……直接看什麼的好羨慕……不，不對，那種不檢點的行為，我身為這個溫泉浴場的經理可不能視而不見！"
10007030-75 = "而且，大浴場和露天溫泉也收到投訴了唷！說是在入浴時感受到了古怪的視線！#n那也是愛瑠醬……！"
10007030-76 = "嗯？大浴場姑且不論，我還沒有去過露天溫泉哦。"
10007030-77 = "也就是說，他們指的不是我，而是和香醬不是嗎？"
10007030-78 = "不，不對，我才沒有……！？"
10007030-79 = "就，就算退一百步來說，素描他人身體的愛瑠醬還是惡劣多了！"
10007030-80 = "我只是盡了經理應盡的本分而已！"
10007030-81 = "那我也只是在進行藝術活動而已。"
10007030-82 = "真要說的話，濫用自己權力的和香更惡劣吧？"
10007030-83 = "唔……總，總之！如果愛瑠醬的「藝術活動」趕跑了前來享受溫泉的客人的話，#n會對我們溫泉浴場造成很大的損失！"
10007030-84 = "抱歉，我得請你出去！"
10007030-85 = "真可惜，我還是會拚命畫下去的。"
10007030-86 = "這可是難得能取得好素材的機會，沒辦法輕言放棄！"
10007030-87 = "看來沒辦法了呢……"
10007030-88 = "既然如此，只能以溫泉浴場經理的名義強制送你出去了！覺悟吧！"
10007030-89 = "[s]「在那之前，你們兩個可以先出去嗎……」"

10007030-42 = "3;메루 온천ND;02;아, 나는 신경 쓰지 말고 계속 느긋하게 목욕해."
10007030-43 = "3;메루 온천ND;03;나는 그저 그림을 그리고 있을 뿐이니까.\n#3;em;[음표]"
10007030-44 = "[s] \"더 신경 쓰여…….\""
10007030-45 = "3;메루 온천ND;01;응? 사진도 아니고 그림인데, 뭐가 신경 쓰여?\n#3;em;[?]\n#3;m3"
10007030-46 = "3;메루 온천ND;02;그림이란 사람의 주관에 의존하는 창작 예술! 사진으로 찍는 것도 아니니, 부끄러워할 필요는 없다고."
10007030-47 = "[s] \"메루는 이곳에 뭐하러 온 거야?\""
10007030-48 = "3;메루 온천ND;01;응? 당연히 동인 소재를 찾으러 왔지.\n#3;em;[반응]"
10007030-49 = "3;메루 온천ND;02;선생도 알고 있겠지만, 초대형 동인 행사인 <코믹 센터>…… 약칭 <코미센>이 이제 얼마 남지 않았거든."
10007030-50 = "3;메루 온천ND;01;키보토스 전역의 동인 작품들이 일시에 배포되는 이 행사는 우리 <지식해방전선>에게도 아주 중요한 행사야."
10007030-51 = "3;메루 온천ND;99;새로 들여온 작품들을 읽고, 평가하고, 체리노 회장의 눈을 피해 도서관에 전시하고…….\n#3;em;…"
10007030-52 = "3;메루 온천ND;05;모미지는 다른 학원에서 만든 작품들을 읽는 것만으로도 충분하다고 말하고 있지만, 그래서는 안 돼!"
10007030-53 = "3;메루 온천ND;03;유산계급처럼 앉아서 소비하는 데 그치지 않고, 직접 발로 뛰며 새로운 작품을 생산해야 진정한 붉은겨울 학원의 학생이라고 할 수 있지!\n#3;greeting\n#3;em;[반짝]"
10007030-54 = "3;메루 온천ND;02;……그런데 마침 이 근처에 근사한 온천장이 새로 생겼다지 뭐야?"
10007030-55 = "3;메루 온천ND;00;온천이라면 겨울을 배경으로 하는 애니메이션에서 빠지지 않는 단골 이벤트 장소!"
10007030-56 = "3;메루 온천ND;03;이곳이라면 코미센에 쓸 좋은 소재가 가득할거라는 생각에 바로 달려왔지!\n#3;hophop\n#3;em;[재잘]"
10007030-57 = "3;메루 온천ND;02;선생도 혹시 이 온천에서 뭔가 좋은 소재를 목격한 적이 있어?"
10007030-58 = "3;메루 온천ND;08;예를 들자면, 게헨나의 선임행정관과 트리니티의 정의부 부부장이 민달팽이처럼 달라붙어 알몸의 교제를 하는 장면이라던가……."
10007030-59 = "[s] \"……두 사람이 그럴 리가 없잖아.\""
10007030-60 = "3;메루 온천ND;09;에이, 세상에 절대라는 건 없다고!\n#3;hophop"
10007030-61 = "3;메루 온천ND;01;게다가 창작의 세계라는 건 심오하기 때문에, 약간의 빌미만 주어져도 얼마든지 상황을 부풀릴 수 있지."
10007030-62 = "3;메루 온천ND;99;'의외의 장소에서 마주친 두 숙적. 서로를 경멸에 찬 눈으로 흘겨보는데…….'"
10007030-63 = "3;메루 온천ND;07;'아아, 저 두 사람은 분명히 몰래 사귀고 있는 거야!' #n하아, 하아…….\n#3;stiff\n#3;em;[///]"
10007030-64 = "[s5] \"이 녀석, 안 되겠어…….\"\n[s6] \"빨리 어떻게든 하지 않으면…….\""

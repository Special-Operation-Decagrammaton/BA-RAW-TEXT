10007030-37 = "3;메루 온천ND;99;후후…… 역시 생각했던 대로의 모습이네."
10007030-38 = "3;메루 온천ND;08;이 육체와 바디 라인은 기록으로 남기지 않으면…….\n#3;stiff\n#3;em;[///]"

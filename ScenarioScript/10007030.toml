10007030-26 = "3;메루 온천ND;02;응, 모미지와는 전에 만난 적 있지?\n#3;em;[반응]"
10007030-27 = "3;메루 온천ND;00;동인 취향은 조금 다르기 하지만, 이 어수선한 붉은겨울 학원에서 등을 맡길 수 있는 몇 안 되는 동료 중 하나지. 후후……."
10007030-28 = "3;메루 온천ND;05;이상한 책이라니, 말이 심하네!\n#3;stiff\n#3;em;[빠직]"
10007030-29 = "3;메루 온천ND;02;지금은 분명 괴짜들의 취급을 받고 있긴 하지만……"
10007030-30 = "3;메루 온천ND;03;언젠간 BL이나 GL작품도 메이저 예술로 인정받는 날이 올 거라고!\n#3;em;[반짝]\n#3;hophop"
10007030-31 = "3;메루 온천ND;99;흠, 흠."
10007030-32 = "3;메루 온천ND;02;여하튼 이 사람이 온 키보토스의 학생들이 믿고 따른다던 그 선생인가…….\n#3;em;…"

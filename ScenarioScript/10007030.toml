[translation]
10007030-1 = "Episode 3;A Suspicious Gaze"
10007030-2 = "Hot Springs Resort No. 227 Special Private Bath"
10007030-4 = "While I was enjoying a nice hot spring bath..."
10007030-5 = "[s] \"What a nice hot spring!\""
10007030-6 = "Heeheehee!"
10007030-12 = "[ns1] \"Wh-Who is it?!\"\n[ns2] \"...Nodoka? Is that you?\""
10007030-15 = "Oh, darn. Looks like you caught me."
10007030-16 = "I suppose I have no choice but to show myself..."
10007030-22 = "[ns] \"...Who are you?\""
10007030-23 = "I've heard a lot about you, but it's my first time meeting you in person, Sensei."
10007030-24 = "I am Himeki Meru of the Knowledge Liberation Front! You can call me by my pen name, Meruri. ★"
10007030-25 = "[s3] \"The Knowledge Liberation Front is the...\"\n[s4] \"The gathering that collects strange books?\""
10007030-26 = "Yep! You've met Momiji, right?"
10007030-27 = "We have slightly different fan book tastes, but she's one of the few companions here at this troubled Red Winter Academy I can lean on. Heehee..."
10007030-28 = "What do you mean strange books? How rude!"
10007030-29 = "They are being treated like weird genres for now, but..."
10007030-30 = "The day will come when BL or GL works will be recognized as major art!"
10007030-31 = "A-Ahem."
10007030-32 = "Anyway, are you the Sensei that the students of Kivotos trust and follow?"
10007030-37 = "Heehee...You look just how I imagined you."
10007030-38 = "If I don't leave a record of your body and shape then..."
10007030-42 = "Oh, don't mind me and continue bathing."
10007030-43 = "I'm just drawing Sensei's figure."
10007030-44 = "[s] \"Saying that bothers me more...\""
10007030-45 = "I'm just drawing you. I'm not even taking a photo. Why is that bothersome?"
10007030-46 = "Drawing is a creative art that simply expresses the artist's perspective!#nThere's no need to be shy."
10007030-47 = "[s] \"Why are you here, Meru?\""
10007030-48 = "I'm here to get inspiration for my fan book, naturally."
10007030-49 = "I'm sure I don't need to tell you this, but Comic Center is coming up. Or as us fan book writers call it, Komisen."
10007030-50 = "This event, where fan books from all over Kivotos are distributed at once, is a very important event for the Knowledge Liberation Front."
10007030-51 = "We read new works, evaluate them, and put them on display at the library without President Cherino noticing."
10007030-52 = "Momiji says reading works from other academies is enough, but it shouldn't be enough!"
10007030-53 = "Instead of just passively consuming like the bourgeois class, we as students have to be innovation itself at Red Winter Academy and produce new works ourselves!"
10007030-54 = "And then I just happened to hear about a new, fabulous hot springs resort in the vicinity."
10007030-55 = "Hot springs are a classic winter setting always present in anime!"
10007030-56 = "I came here right away thinking that it would be full of good material for Komisen!"
10007030-57 = "Sensei, have you witnessed anything here that could be in my fan book?"
10007030-58 = "For example, a scene where the Gehenna senior administrator and the Trinity's Justice Task Force vice president are making out in the bath, clinging to each other like slugs..."
10007030-59 = "[s] \"...They would never do such a thing.\""
10007030-60 = "Never say never, Sensei!"
10007030-61 = "Besides, the world of creativity is profound, so even something small can be used as inspiration for any kind of situation."
10007030-62 = "\"Two enemies meet in an unexpected place. They look at each other with contempt...\""
10007030-63 = "\"Ah, but they are actually secret lovers!\" #n*pant* *pant*..."
10007030-64 = "[s5] \"(This girl...is bad news...)\"\n[s6] \"(I have to do something about her...)\""
10007030-71 = "What in the world are you doing?!"
10007030-72 = "Oops, it's Nodoka."
10007030-73 = "How dare the manager burst in on guests in the bath! Does this hot springs resort not have any hospitality training?"
10007030-74 = "You're the one who needs training! Why do you keep sneaking into other people's baths and watching other students?"
10007030-75 = "There have already been complaints from people at both our large public bath and our open-air bath about how they feel a suspicious gaze while bathing!"
10007030-76 = "What? But I haven't gone to the open-air baths yet."
10007030-77 = "Aren't you the one who was panting and watching other students bathe, Nodoka?!"
10007030-78 = "W-Was it me...?"
10007030-79 = "B-But not only were you watching other people bathe, you even sketched them, Meru!"
10007030-80 = "I was simply fulfilling my duties as the manager!"
10007030-81 = "If you say it like that, I was fulfilling my duties as an artist!"
10007030-82 = "Actually, abusing your power to peep is much worse, Nodoka!"
10007030-83 = "Anyway! If the guests who come to enjoy the baths leave because of Meru's art, we're the ones who'll suffer huge losses!"
10007030-84 = "I'm sorry, but you have to leave our hot springs resort!"
10007030-85 = "Hmph! My life is at stake here as well!"
10007030-86 = "It's an opportunity to get great material for my fan book, so I won't back down!"
10007030-87 = "Argh! If you continue being so uncooperative..."
10007030-88 = "I'll have to force you out! "
10007030-89 = "[s] \"I just want both of you to leave...\""

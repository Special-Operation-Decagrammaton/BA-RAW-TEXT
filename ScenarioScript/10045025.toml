[translation]
10045025-2 = "[log]70人淘汰！[/log]"
10045025-4 = "[log]比賽結束！[/log]"
10045025-7 = "謝謝大家。#n多虧有你們才能晉級。"
10045025-8 = "各位辛苦了！"
10045025-10 = "……戰鬥比預期中還要激烈呢。"
10045025-11 = "這樣就全員晉級了！#n要是沒有其他人幫忙的話，真不知道會怎麼樣呢。"
10045025-13 = "……"
10045025-14 = "桔梗，你沒事吧？臉色不太好耶。"
10045025-15 = "……頭髮有點濕了。"
10045025-16 = "唔，被弄濕的感覺果然很不舒服。"
10045025-21 = "……怎麼了？為什麼露出那種眼神。"
10045025-22 = "如果有話想說就直接說出來吧？"
10045025-23 = "沒有啦，我只是想到除了洗澡之外，好像真沒見過你下水的樣子而已。"
10045025-24 = "我不想讓別人看到自己被水弄得凌亂的樣子。"
10045025-26 = "誰看了都會覺得像貓吧。"
10045025-33 = "（……沒錯。被認為像貓也沒關係）"
10045025-34 = "（重點在於自然地表現出我討厭水這件事）"
10045025-35 = "（這樣一來，就算真的掉進水裡也有藉口可用）"
10045025-36 = "（一切……都在計畫之中！）"
10045025-38 = "那麼～各位參賽者都辛苦了！"
10045025-39 = "在公布下一場比賽的項目之後，會有短暫的休息時間！"
10045025-40 = "請大家好好休息，為下一個項目做好準備！"
10045025-41 = "[ns]「下一場比賽就是這個！」"
10045025-43 = "[log]暴走噴射快艇！[/log]"
10045025-46 = "不斷漂移與俯衝的水上噴射快艇！#n只要掉下去就失去資格！"
10045025-47 = "[ns]「比賽將持續到剩下10個人為止！」"
10045025-48 = "我們部屬了非常多安全人員，請大家放心享受比賽，喵喵！"
10045025-51 = "……完蛋了。"

[translation]
10045025-2 = "[log]70 players eliminated![/log]"
10045025-4 = "[log]Match ended![/log]"
10045025-7 = "You have our gratitude. We never would have survived without your assistance."
10045025-8 = "Great work, everyone!"
10045025-10 = "...It was truly a fierce battle."
10045025-11 = "I am relieved we all passed! What would we have done without you?"
10045025-13 = "..."
10045025-14 = "Kikyou? Everything okay?"
10045025-15 = "...My hair is damp."
10045025-16 = "Ugh. The feeling makes my skin crawl."
10045025-21 = "...What? Why are you looking at me like that?"
10045025-22 = "Stop biting your tongue, and out with it."
10045025-23 = "I was just thinking that I've never seen you actually go in the water before. Besides when you're bathing, I suppose."
10045025-24 = "Getting wet causes one to look disheveled. I dislike others witnessing me in that state."
10045025-26 = "...Are you actually a cat?"
10045025-33 = "(...Let them think what they want.)"
10045025-34 = "(It's essential they continue to believe that my hesitance is simply my natural distaste of water.)"
10045025-35 = "(It will be my cover in the event I do actually fall in the water.)"
10045025-36 = "(Everything WILL unfold according to plan!)"
10045025-38 = "Wow! Good work, everyone!"
10045025-39 = "Please take a break and recuperate with some refreshing drinks!"
10045025-40 = "But first, let's announce the next game!"
10045025-41 = "[ns] \"The next match is...\""
10045025-43 = "[log]Jet Boat Rampage![/log]"
10045025-46 = "You'll board a frenzied jet boat that'll jump and dive as it pleases! Fall into the water, and you'll be eliminated!"
10045025-47 = "[ns] \"Only ten people will move on to the next round!\""
10045025-48 = "We have lifeguards stationed everywhere, so ride to your heart's content, nyan!"
10045025-51 = "...This is the worst."

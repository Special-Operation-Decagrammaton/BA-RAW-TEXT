[translation]
2000003-1 = "心中燃起的火焰"
2000003-2 = "千年．走廊"
2000003-3 = "（到千年來找響）"
2000003-4 = "（咚哐──！）"
2000003-5 = "[s1]「？！」\n[s2]「爆炸聲？」"
2000003-11 = "千年．工程師部"
2000003-12 = "（咳咳咳咳）"
2000003-13 = "哇，火藥量太多了嗎…… #n看來化學方面的知識還是不太夠呢……"
2000003-14 = "嗯？"
2000003-15 = "老師……？"
2000003-16 = "[s3] 「怎麼回事？」\n[s4] 「我聽到有爆炸聲。」"
2000003-20 = "啊……沒什麼，請放心。"
2000003-21 = "就如訊息中所說，我現在在製作的是煙火發射器。"
2000003-22 = "雖然說到煙火還是百鬼夜行那邊最有名。"
2000003-23 = "但我們千年，也還是想在慶典夜晚發射煙火。"
2000003-24 = "既然受到了委託，那我就想說要打造個機器，能發射出適合那情景的煙火。"
2000003-25 = "而剛才的爆炸……就是其中一次實驗失敗。"
2000003-26 = "至於今天想讓老師看的，則是另一種全新概念的煙火。"
2000003-27 = "不靠化學，而是以科學技術產生煙火……"
2000003-28 = "完全擺脫以往對於煙火的觀念，打造出能帶來全新概念煙火的機器……#n全像投影機。"
2000003-29 = "[s5] 「全像投影，是指在半空中投放影像的那個？」\n[s6] 「是很厲害啦……但方向好像錯了。」"
2000003-30 = "沒錯。準確來說，叫做立體顯示。"
2000003-31 = "但其實也不是什麼了不起的技術。"
2000003-32 = "全像投影技術本身，如今已活用於日常生活。"
2000003-33 = "包括老師的信用卡或紙鈔，上面那些防止違法複製而設計的閃閃發亮的部分，也是一種全像投影技術。"
2000003-34 = "只要用這個投影機，就可以在低亮度的天空──也就是夜空中──投影出各式各樣的煙火。"
2000003-35 = "和剛剛使用黑色火藥的傳統煙火不一樣，沒有危險。 #n只要有資源，就能半永久的在夜空中顯示煙火。"
2000003-36 = "嗯？問題不在這裡……？"
2000003-37 = "你說全像投影煙火可能會無法滿足情懷？"
2000003-38 = "若要這麼說，我覺得反而全像投影煙火……"
2000003-39 = "更能蘊含煙火獨有的，所謂「轉瞬即逝」的這種特別情懷。"
2000003-40 = "唔嗯……看起來還是無法接受的樣子。"
2000003-41 = "不過，老師應該比我瞭解煙火。"
2000003-42 = "好吧，這次就採納老師的意見吧。"
2000003-43 = "那麼這樣如何？雖然實驗次數不像全像投影機那麼多……"
2000003-44 = "另外還有一個會在飛行時散發光芒、冒煙，並在到達最高點時劇烈爆炸……"
2000003-45 = "體型稍大且粗曠，但也是最接近一般煙火形象的方案。"
2000003-48 = "[ns7] 「這是不能綻放光芒的憎恨之光。」\n[ns8] 「好酷！」"
2000003-49 = "實際上，這東西曾讓某個犯罪組織基地包覆在熊熊燃燒的絢爛業火之中。"
2000003-50 = "實際上，這東西曾讓某個犯罪組織基地包覆在熊熊燃燒的絢爛業火之中。"
2000003-51 = "而民眾目睹時驚呼連連的反應，也確實和煙火發射時完全相同。"
2000003-52 = "嗯？這也不行？ #n耶，絕對不行？"
2000003-53 = "嗯～真可惜。 #n看來只能回頭開發剛才不小心引爆的普通煙火了。"
2000003-54 = "那種有點太普通了，感覺不夠過癮。"
2000003-55 = "……"
2000003-56 = "唉，真慚愧。"
2000003-57 = "明明想在老師面前耍帥一下的說。"
2000003-58 = "[s] 「現在已經夠帥氣了喔。」"
2000003-59 = "……"
2000003-60 = "呵呵，謝謝。"
2000003-61 = "……啊，老師。 #n不能隨便亂碰那邊的開關喔。"
2000003-62 = "其中之一是這顆飛彈的發射鈕──"
2000003-63 = "[s9] （咔嚓）\n[s10] 手滑了"
2000003-64 = "啊……"
2000003-65 = "啊……"
2000003-67 = "（咻──）"
2000003-68 = "啊，射出去了……"
2000003-70 = "（咚哐──！！）"
2000003-71 = "……"
2000003-73 = "（聽說所有的千年學生，都看到了命中千年塔的巨大煙火（飛彈））"

[translation]
2000003-1 = "เปลวไฟที่ลุกโชนอยู่ในหัวใจ"
2000003-2 = "ทางเดินในตึก มิลเลเนียม"
2000003-3 = "(คุณครูมามิลเลเนียมตามคำขอของฮิบิกิ)"
2000003-4 = "(ตู้มมมมมมม!!!!!)"
2000003-5 = "[s1] \"?!\"\n[s2] \"เสียงระเบิดเหรอ?\""
2000003-11 = "ชมรมวิศวกรรม มิลเลเนียม"
2000003-12 = "(แค่กๆ แค่กๆ)"
2000003-13 = "ฮ่า... สงสัยคงจะใส่ดินปืนมากเกินไป ฉันไม่ถนัดด้านเคมีจริงๆ ด้วยแฮะ..."
2000003-14 = "หือ?"
2000003-15 = "คุณครู...?"
2000003-16 = "[s3] \"เกิดอะไรขึ้นเหรอ?\"\n[s4] \"ครูได้ยินเสียงระเบิดเลยมาที่นี่\""
2000003-20 = "อ๋อ... ไม่มีอะไรหรอก"
2000003-21 = "ตามที่บอกไปในข้อความน่ะ นี่เป็นอุปกรณ์ยิงดอกไม้ไฟที่ฉันกำลังทำอยู่"
2000003-22 = "ถึงทางเฮียกคิยาโคจะขึ้นชื่อเรื่องการจัดแสดงดอกไม้ไฟที่สุด..."
2000003-23 = "แต่ว่าตอนนี้ทางมิลเลเนียมเองก็กำลังจัดเตรียมเทศกาลตอนกลางคืนอยู่เหมือนกัน"
2000003-24 = "เลยได้รับคำขอให้สร้างอุปกรณ์ยิงดอกไม้ไฟที่จะใช้ในงานเทศกาลมาน่ะ"
2000003-25 = "เสียงระเบิดเมื่อกี้นี้... เป็นแค่การทดลองเท่านั้นละ"
2000003-26 = "ฉันอยากให้คุณครูดูคอนเซ็ปของเทศกาลดอกไม้ไฟที่ฉันคิดน่ะ"
2000003-27 = "เราจะสร้างดอกไม้ไฟขึ้นโดยใช้วิทยาศาสตร์แทนการผสมสารเคมี..."
2000003-28 = "เครื่องยิงดอกไม้ไฟรูปแบบใหม่ที่ไม่เคยเห็นที่ไหนมาก่อน... นี่ก็คือเครื่องฉายโฮโลแกรมยังไงล่ะ"
2000003-29 = "[s5] \"จะฉายภาพโฮโลแกรมขึ้นไปบนท้องฟ้าเหรอ?\"\n[s6] \"ยอดไปเลย... แต่เหมือนจะผิดประเด็นรึเปล่า?\""
2000003-30 = "จริงด้วย พูดให้ชัดๆ ก็คือ... นี่คือเครื่องแสดงผลสามมิติ"
2000003-31 = "มันก็ไม่ได้ยอดเยี่ยมอะไรขนาดนั้นหรอก"
2000003-32 = "ที่จริงแล้วโฮโลแกรมก็เป็นเทคโนโลยีที่เห็นอยู่ทั่วไปสักพักแล้ว"
2000003-33 = "ทั้งพวกอุปกรณ์ป้องกันการปลอมแปลงบนบัตรเครดิตของคุณครูหรือบนธนบัตรเองก็เป็น#nโฮโลแกรมประเภทหนึ่งเหมือนกัน"
2000003-34 = "ถ้าใช้เครื่องฉายโฮโลแกรมนี่ ก็จะฉายภาพดอกไม้ไฟขึ้นไปบนท้องฟ้าได้ยังไงล่ะ"
2000003-35 = "แถมไม่อันตรายเหมือนกับดอกไม้ไฟที่ทำมาจากดินระเบิดเหมือนที่ทดลองเมื่อกี้ด้วย ถ้าทำภาพดีๆ เอาไว้ก็จะฉายภาพดอกไม้ไฟขึ้นบนท้องฟ้าได้ตามที่ต้องการเลยนะ"
2000003-36 = "หือ? มีปัญหาอยู่งั้นเหรอ...."
2000003-37 = "ดอกไม้ไฟโฮโลแกรมจะให้ความรู้สึกที่แตกต่างจากดอกไม้ไฟจริงๆ งั้นเหรอ?"
2000003-38 = "ไม่จริงหรอก อาจตรงกันข้ามเลยต่างหาก...."
2000003-39 = "...ฉันคิดว่ามันเติมเต็มความรู้สึกในเรื่อง \"ความไม่ต่อเนื่อง\" ของดอกไม้ไฟจริงๆ ได้นะ"
2000003-40 = "อืม... ดูเหมือนคุณครูจะยังไม่เชื่อนะ"
2000003-41 = "คุณครูอาจจะรู้เรื่องเกี่ยวกับดอกไม้ไฟดีกว่าฉันก็ได้"
2000003-42 = "ก็ได้ ฉันจะรับฟังความคิดเห็นของคุณครูก็แล้วกัน"
2000003-43 = "ถ้างั้นแบบนี้เป็นยังไงบ้าง? ถึงจะไม่ได้ใช้เวลาทำเท่าตอนที่ทำเครื่องฉายโฮโลแกรมก็เถอะนะ..."
2000003-44 = "เจ้าเครื่องนี้จะปล่อยแสงออกมารอบๆ และปล่อยควันหลากสีออกมา และพอถึงตำแหน่งที่กำหนดไว้#nมันก็จะระเบิด..."
2000003-45 = "เป็นอุปกรณ์ที่ใกล้เคียงกับดอกไม้ไฟของจริงที่สุดแล้วนะ"
2000003-48 = "[ns7] \"ครูว่าไม่ควรใช้อุปกรณ์ที่อันตรายแบบนี้หรอกนะ...\"\n[ns8] \"ยอดไปเลย!\""
2000003-49 = "เจ้าเครื่องนี้เคยทำกองบัญชาการของพวกอาชญากรไหม้จนราบเป็นหน้ากลองมาแล้วด้วยนะ"
2000003-50 = "เจ้าเครื่องนี้เคยทำกองบัญชาการของพวกอาชญากรไหม้จนราบเป็นหน้ากลองมาแล้วด้วยนะ"
2000003-51 = "คนอื่นๆ กรีดร้องแล้วก็ตะโกนกันยกใหญ่เลย... เหมือนตอนที่เห็นดอกไม้ไฟเลยละ"
2000003-52 = "หืม? เครื่องนี้ก็ใช้ไม่ได้เหรอ? หะ...ห้ามใช้เด็ดขาดเลยงั้นเหรอ?"
2000003-53 = "อืม น่าเสียดายจัง คงไม่มีทางเลือกอื่นนอกจากสร้างเครื่องยิงดอกไม้ไฟที่ระเบิดไปเมื่อกี้ขึ้นมาใหม่#nแล้วละ"
2000003-54 = "มันดูธรรมดาจะตายไป ไม่เห็นจะสนุกเลย..."
2000003-55 = "....."
2000003-56 = "เฮ้อ น่าอายจัง"
2000003-57 = "ฉันอยากจะโชว์สิ่งประดิษฐ์เจ๋งๆ ให้คุณครูดูแท้ๆ"
2000003-58 = "[s] \"แค่นี้ก็สุดยอดแล้วละ\""
2000003-59 = "......."
2000003-60 = "หึหึ ขอบคุณนะ"
2000003-61 = "อ๊ะ... คุณครู ห้ามโดนสวิตช์ไฟตรงนั้นนะ"
2000003-62 = "สวิตช์ตรงนั้นมันเป็นสวิตช์สำหรับยิงมิสไซล์"
2000003-63 = "[s9] (แกร็ก)\n[s10] มือเลื่อนไปโดนสวิตช์"
2000003-64 = "อ๊ะ...."
2000003-65 = "อ๊ะ...."
2000003-67 = "(ฟิ้ววววว!!)"
2000003-68 = "ยะ...ยิงออกไปแล้ว.....!"
2000003-70 = "(ตู้มมมมมมม!!!!!)"
2000003-71 = "......"
2000003-73 = "เด็กนักเรียนทุกคนของโรงเรียนมิลเลเนียมต่างเห็นภาพที่ดอกไม้ไฟขนาดใหญ่พุ่งเข้าชนหอคอย#nมิลเลเนียม"

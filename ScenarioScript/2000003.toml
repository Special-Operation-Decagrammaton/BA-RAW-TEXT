2000003-20 = "3;히비키;07;아…… 별일 아니야.\n#3;em;[...]\n#3;a"
2000003-21 = "3;히비키;01;문자로 말했듯, 현재 내가 만들고 있는 건 불꽃놀이용 기계야."
2000003-22 = "3;히비키;99;불꽃놀이하면 역시 백귀야행이 가장 유명하지만."
2000003-23 = "3;히비키;02;밀레니엄 역시 밤의 축제를 준비하고 있어.\n#3;em;[반짝]"
2000003-24 = "3;히비키;05;나 역시 의뢰를 받은 이상, 걸맞은 불꽃놀이용 폭죽 기계를 만들려 해."
2000003-25 = "3;히비키;06;조금 전의 폭발은…… 하나의 시행착오였을 뿐이야."
2000003-26 = "3;히비키;02;선생님에게 보여주려는 신개념 불꽃놀이는, 다른거야.\n#3;em;[반응]"
2000003-27 = "3;히비키;01;화학이 아닌, 과학만으로도 불꽃놀이를 가능케 해주는……"
2000003-28 = "3;히비키;05;종래의 불꽃놀이에 대한 상식에서 완전히 벗어난, 신개념 폭죽기계……#n홀로그램 영사기를 만들었어.\n#3;closeup"
2000003-29 = "[s5] \"홀로그램이라면 그 허공에 뿌리는 영상 같은 거 아냐?\"\n[s6] \"굉장하긴 한데…… 방향이 잘못된 것 같아.\""
2000003-30 = "3;히비키;01;맞아. 더 정확히 말하면. 체적형 디스플레이라고 해.\n#3;greeting\n#3;em;[반짝]"
2000003-31 = "3;히비키;02;그렇게 굉장한 것도 아니야."
2000003-32 = "3;히비키;99;홀로그램 기술 자체는 이미 일상적으로 사용되고 있어."
2000003-33 = "3;히비키;01;선생님의 신용카드나 지폐의 불법 복사를 막기 위한 반짝이는 부분도 일종의 홀로그램이니까.\n#3;em;[음표]"
2000003-34 = "3;히비키;02;이 영사기를 사용하면 낮은 조도의 허공, 아니 간단히 말해서 밤하늘에 다양한 불꽃을 상영할 수 있어."
2000003-35 = "3;히비키;03;방금 실험의 흑색화약을 사용한 폭죽처럼 위험하지도 않고, #n리소스만 제작하면 반영구적으로 밤하늘에 폭죽을 출력할 수 있지.\n#3;em;[재잘]"
2000003-36 = "3;히비키;02;응? 다른 게 문제가 아니라……"
2000003-37 = "3;히비키;02;홀로그램 폭죽은, 감성 부분을 채울 수 없을 것 같다고?\n#3;em;[?]"
2000003-38 = "3;히비키;99;그렇지 않아. 아니 오히려 홀로그램 폭죽만이……"
2000003-39 = "3;히비키;05;…… 불꽃놀이의 '덧없음'이라는…… 특별한 감성마저 채울 수 있다고 생각해.\n#3;em;[반응]"
2000003-40 = "3;히비키;01;흐음…… 그래도 납득이 잘 안되는 모양이네."
2000003-41 = "3;히비키;99;하지만, 선생님이 나보다 불꽃놀이에 대해 잘 알고 있을 테니.\n#3;em;[...]"
2000003-42 = "3;히비키;02;좋아. 선생님의 의견을 받아들이도록 할게."
2000003-43 = "3;히비키;01;그럼 이건 어떨까? 홀로그램 영사기만큼 심혈을 기울인 건 아니지만…….\n#3;em;[반응]"
2000003-44 = "3;히비키;02;빛을 분사하며 날아가고, 알록달록한 연기를 뿌리며, 고점에 도달하면 폭발하는……\n#3;m5"
2000003-45 = "3;히비키;03;일반적인 불꽃놀이의 이미지에 가장 가까운 도구야.\n#3;greeting"

[translation]
2000003-1 = "The Burning in My Heart"
2000003-2 = "Millennium Hallway"
2000003-3 = "(Hibiki asked me to come to Millennium.)"
2000003-4 = "*boooooom*"
2000003-5 = "[s1] \"...?!\"\n[s2] \"An explosion?\""
2000003-11 = "Millennium Engineering Department"
2000003-12 = "*cough* *cough*"
2000003-13 = "Maybe we used too much gunpowder? I never claimed to be an expert in chemistry..."
2000003-14 = "Huh?"
2000003-15 = "Sensei...?"
2000003-16 = "[s3] \"What's going on?\"\n[s4] \"I heard an explosion.\""
2000003-20 = "That...? It's no big deal."
2000003-21 = "This is what I texted you about. I'm putting a fireworks machine together!"
2000003-22 = "Hyakkiyako is famous for its fireworks shows..."
2000003-23 = "...and Millennium is lending a hand with the night festival's prep."
2000003-24 = "That's where I come in. I'm making a machine that will make the fireworks show one to remember."
2000003-25 = "The explosion was...just a little setback."
2000003-26 = "Anyway, I asked you to come over because there's something I want to show you."
2000003-27 = "I'm working on something that can create fireworks with pure science and technology, rather than old fashioned chemistry."
2000003-28 = "It's a new type of machine unlike anything that's been used before! I've developed a true to life hologram projector!"
2000003-29 = "[s5] \"Are holograms those images you shoot up in the sky?\"\n[s6] \"That's amazing...but doesn't it kind of defeat the point?\""
2000003-30 = "Sure is. I call it a volumetric display."
2000003-31 = "Well, it's not like this has never been done before."
2000003-32 = "Hologram technology has been around for a while, you know."
2000003-33 = "You know those shiny bits inside cash and on credit cards that prevent counterfeiting? That's a type of hologram too."
2000003-34 = "Basically, this projector is going to display all types of fireworks into the night sky. "
2000003-35 = "And it won't be nearly as dangerous as using fireworks full of gunpowder. With enough resources, we can put up as many fireworks as we want."
2000003-36 = "Huh? You think it's missing something?"
2000003-37 = "Hologram fireworks won't have the same impact as real fireworks?"
2000003-38 = "That's where you're wrong! The fact that they're holograms is what makes them unique."
2000003-39 = "I think they can be just as good as, or even better than, real fireworks!"
2000003-40 = "Though...you're not looking very convinced."
2000003-41 = "Maybe you know more about fireworks than I do."
2000003-42 = "All right. Let's hear your thoughts, then."
2000003-43 = "What about this? I didn't put as many hours into this one as I did the hologram project..."
2000003-44 = "...but it emits light, has colored smoke, and has a really nice grand finale explosion built in."
2000003-45 = "It's the closest solution I have to the real thing."
2000003-48 = "[ns7] \"I don't know how I feel about you using something like this.\"\n[ns8] \"Wow, this is awesome!\""
2000003-49 = "Well, it did once burn down a crime syndicate's hideout."
2000003-50 = "Well, it did once burn down a crime syndicate's hideout."
2000003-51 = "People were yelling and screaming at the top of their lungs when that happened... That's kind of like a fireworks show, right?"
2000003-52 = "What, you don't think that'll work either? Never in a million years?"
2000003-53 = "Well, that's a shame. I guess I could always recreate the explosion I set off earlier and count that as fireworks."
2000003-54 = "But that would be way too easy to do! Where's the fun in that?"
2000003-55 = "..."
2000003-56 = "*sigh* I'm so embarrassed."
2000003-57 = "I just wanted to impress you with something cool."
2000003-58 = "[s] \"You always impress me, Hibiki.\""
2000003-59 = "..."
2000003-60 = "Heehee. Thanks."
2000003-61 = "Wait! I wouldn't touch those switches."
2000003-62 = "One of them will launch this missile."
2000003-63 = "[s9] *click*\n[s10] \"My hand slipped.\""
2000003-64 = "Oh..."
2000003-65 = "Oh..."
2000003-67 = "*whirrr*"
2000003-68 = "Oh, no... It launched!"
2000003-70 = "*boooooom*"
2000003-71 = "..."
2000003-73 = "Every Millennium student was then treated to an impromptu fireworks show as the rocket smacked the Millennium Tower."

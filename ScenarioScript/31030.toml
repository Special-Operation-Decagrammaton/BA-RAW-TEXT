[translation]
31030-1 = "Episode 3;Tea Party"
31030-2 = "I've been wondering what you might look like, Sensei. You don't look all that different from us."
31030-3 = "I think I like you, Sensei! What do you think, Nagisa?"
31030-4 = "I don't believe it's polite to comment on such things in front of Sensei, Mika."
31030-5 = "There's no shame in affection, but there's a proper time and place for it. "
31030-6 = "Oh. Is that how it works?"
31030-7 = "Sorry, Sensei. I guess I was being too informal. I guess I should say something like...I'm pleased to meet you!"
31030-8 = "[s] \"Well, it's nice to meet you too.\""
31030-9 = "..."
31030-10 = "Heehee."
31030-11 = "If memory serves, you're the first person outside of Trinity to be invited to the Tea Party. "
31030-12 = "This is normally a place that ordinary students could scarcely hope to be invited to."
31030-13 = "Sheesh, Nagi! Don't make such a big deal out of it!"
31030-14 = "..."
31030-15 = "*sigh* That wasn't my intention, Mika."
31030-16 = "Right. My bad. I'll keep a lid on it."
31030-17 = "... "
31030-18 = "We brought you here because we have a small favor to ask."
31030-19 = "[s] \"And what's that?\""
31030-21 = "Hold on, Nagi. Are we really going straight to the point?!"
31030-22 = "Shouldn't we, like, make small talk or something? Chat a bit to break the ice?"
31030-23 = "We could talk about how great the weather is or what we ate yesterday. Should we really be skipping all that? "
31030-24 = "Isn't the Tea Party supposed to be all about social gathering?"
31030-25 = "..."
31030-26 = "You can stare at me with those pretty eyes all you want, but I'm not backing down. This has to do with proper Tea Party etiquette!"
31030-27 = "You're more than welcome to uphold those values when you're the host, Mika. I am the host at the moment, so you will be following my lead."
31030-28 = "..."
31030-29 = "..."
31030-30 = "Forgive me. It's unsightly of us to quarrel in front of a guest."
31030-31 = "Why don't we change the subject as Mika suggested?"
31030-32 = "[s] \"You all act as Trinity's Student Council presidents, right?\""
31030-33 = "Whoa, Sensei can really read the room! Take a good look, Nagi. Those are some grownup conversational skills. Listen to the eloquence and flow!"
31030-34 = "...Ignoring that, yes, you are correct, Sensei. We are the Student Council presidents of Trinity."
31030-35 = "You might be wondering why there are multiple presidents. It's a tradition of Trinity's Student Council to have multiple presidents serve simultaneously."
31030-36 = "Hey! Why did you ignore me, Nagi?"
31030-37 = "Before Trinity was unified, the representatives of each branch academy would hold tea parties to resolve any disputes..."
31030-38 = "Are you really doing this? That's so mean. My feelings..."
31030-39 = "The representatives of the Pater, Filius, and Sanctus academies came together to hold tea parties meant to create an atmosphere of reconciliation, and since then..."
31030-40 = "You're just straight-up ignoring me, Nagi. Are you doing this to get back at me? You're the worst. Is this how you treat a friend that you've known for over ten years?"
31030-41 = "...the Student Council of Trinity has been called the Tea Party, and the representatives of each faction host—"
31030-42 = "Will you shut up?!"
31030-43 = "..."
31030-44 = "I'm in the middle of something! Can you not keep your mouth shut?!"
31030-46 = "Mika!"
31030-47 = "On and on and on!"
31030-48 = "If you don't shut that little yap of yours..."
31030-49 = "...I'll stuff it shut for you with a roll cake!"
31030-51 = "..."
31030-54 = "..."
31030-55 = "[s] \"...\""
31030-56 = "..."
31030-57 = "Pardon me. I don't know what came over me."
31030-58 = "*exhale* My apologies, Mika... Sensei."
31030-59 = "S-So scary..."
31030-60 = "[s] \"(I hope we can get to the point eventually...)\""
31030-63 = "What we're requesting of you is rather simple, Sensei."
31030-64 = "Yeah, simple but important."
31030-65 = "Very important."
31030-66 = "Could you take charge of the Make-Up Work Club?"
31030-67 = "[s] \"Make-Up Work Club?\""
31030-68 = "Yes. To put it plainly, we want you to operate a special class meant to save failing students."
31030-69 = "Trinity is an academic institution with a long history of intellectual and martial excellence."
31030-70 = "But somehow, this proud institution has no fewer than four failing students."
31030-71 = "Yup. We've got a lot on our plate right now."
31030-72 = "Things are pretty disorganized due to the Eden Treaty."
31030-73 = "We need to deal with these failing students pronto, but we're short on manpower and time..."
31030-74 = "That's when we read this! An article about all the amazing things Schale has been doing!"
31030-75 = "Finding cats, cleaning streets, delivering packages—Schale may just be the greatest errand runners Kivotos has ever seen!"
31030-76 = "To think there was someone we could stick with all our most tedious work, right under our noses! You're our savior!"
31030-77 = "[s] \"...\""
31030-78 = "I wouldn't go quite that far, Mika..."
31030-79 = "Why not? That's what we're doing, isn't it?"
31030-80 = "Besides, you're a teacher, Sensei."
31030-81 = "These days, lectures are held on Blu-ray discs. While we still have faculty members, administration, guest lecturers, and associate professors,#na regular old teacher is pretty rare."
31030-82 = "A teacher is someone who uses their own knowledge to guide others, right?#nIn other words, a leader."
31030-83 = "In that sense, a teacher is also someone who commands respect and gives others direction in life. That sounds perfect for the Make-Up Work Club."
31030-84 = "Yes, but I've heard Sensei here isn't quite someone I'd consult with about my direction in life..."
31030-85 = "Haha. I feel you. We've heard a lot of stories about you. I'll save you the embarrassment of repeating what we've heard."
31030-86 = "[s1] \"(What kind of reports are they getting?!)\"\n[s2] \"(I don't even want to know...)\""
31030-87 = "Anyway! We're in a bit of jam, so you taking care of this would be great!"
31030-88 = "Anyway! We're in a bit of jam, so you taking care of this would be great!"
31030-89 = "The Make-Up Work Club is simply an interim arrangement, established to give failing students the help they need."
31030-90 = "Given it's being formed under these special circumstances, Schale's extrajudicial authority will be necessary to have it established."
31030-91 = "It's a necessary expenditure if it's to help failing students."
31030-92 = "What do you say, Sensei? Surely you wouldn't turn away students in need..."
31030-93 = "[s] \"I won't refuse if it means helping students who need me.\""
31030-94 = "Yes, we did it! Thank you, Sensei!"
31030-95 = "..."
31030-96 = "Very well. I didn't necessarily expect you to decline our request, but..."
31030-97 = "Never mind. Then please, take a look at this document."
31030-98 = "[ns] Take the list."
31030-100 = "These are the students."
31030-102 = "Yup. Each one a thorn in Trinity's side, so to speak."
31030-103 = "You could put it more tactfully than that, Mika. We'll put it this way: These are the students in need of Trinity's love."
31030-104 = "Sure, whatever."
31030-107 = "[ns] \"(Wait a minute...!)\""
31030-108 = "Hmm? Do you recognize any of the students, Sensei?"
31030-109 = "[s3] \"Well, not exactly...\"\n[s4] Answer vaguely."
31030-110 = "We'll send you some documents with all the details. Do you have any other questions?"
31030-111 = "We'll send you some documents with all the details. Do you have any other questions?"
31030-113 = "[s] \"What's the Eden Treaty?\""
31030-114 = "..."
31030-115 = "..."
31030-116 = "Hmm... That's a toughie."
31030-117 = "It is quite a long story, so we'll set aside some time for that at a later date. The information is classified after all."
31030-118 = "Regardless, it doesn't concern your work with the Make-Up Work Club."
31030-119 = "[s] \"Shouldn't the Tea Party have three Student Council presidents?\""
31030-120 = "..."
31030-121 = "Well, yes, but..."
31030-122 = "Seia isn't at Trinity right now. She's taken ill."
31030-123 = "Correct. Seia is supposed to be the one hosting this party, but...since she's absent, I'm hosting in her place."
31030-124 = "We all take turns acting as the Tea Party's host. Though that also isn't any of your concern."
31030-125 = "[s] \"I guess that's it then...\""
31030-126 = "Splendid."
31030-127 = "You can officially work for Trinity once preparations are complete."
31030-128 = "Once again, we appreciate your assistance. This will be a great help to us."
31030-129 = "Bye, Sensei! See you next time. Hopefully."
31030-130 = "It's actually unusual for every Tea Party host to be gathered in one place. "
31030-131 = "Oh, don't act like we're always busy. Still, this meeting with Sensei is the first time I've seen your face in a while. It's nice."
31030-132 = "I feel the same way, Mika."
31030-133 = "Heehee."
31030-134 = "We'll be counting on you, Sensei. I will be escorting you from this point forward as the host of the Tea Party."
31030-135 = "[s] \"I'll be in your care.\""
31030-141 = "(I decided to see a student whose name I recognized on the list for the Make-Up Work Club.)"
31030-145 = "[ns] \"It really is you!\""
31030-146 = "A-Ahaha... Hi, Sensei."
31030-147 = "I can explain everything."
31030-148 = "Well..."
31030-150 = "Next Episode;Failing Students Part 1"

31030-33 = "1;미카;10;우와, 분위기를 잘 읽어주는 선생님! 응, 잘 봐! 나기 쨩. 이게 바로 어른의 화술! 자연스럽게 대화를 유도하는 능숙함!\n#1;em;[반짝]"
31030-34 = "3;나기사;01;……네. 맞습니다. 저희가 바로 트리니티 종합학원의 학생회장들입니다."
31030-35 = "3;나기사;02;왜 학생회장들, 이냐고 물어보실 수 있겠지만…… 기본적으로 트리니티의 학생회장은 여러 명으로 존재해 왔습니다."
31030-36 = "1;미카;04;어라…… 나기 쨩……? 무시? \n#1;stiff\n#1;em;[땀]"
31030-37 = "3;나기사;01;과거 트리니티가 연합을 이루기 전, 각 분파 학원들의 대표들이 분쟁을 해결하기 위해 티파티를 열었던 것에서부터 이 역사가 시작되었는데……."
31030-38 = "1;미카;13;진짜로? 너무해…… 나 조금 상처……. \n#1;em;…"

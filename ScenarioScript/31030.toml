31030-80 = "1;미카;01;게다가, 선생님이잖아. 선생님.\n#1;hophop"
31030-81 = "1;미카;02;지금이야 다들 BD로 학습하는 시대이고, 교직원, 교무원, 강사, 교수 등은 있지만, <선생님> 이라는 개념은 흔치 않으니까.\n#1;em;[반응]"
31030-82 = "1;미카;01;응. 선생. 이것은 삶을 앞서간 사람, 즉, 이끌어주는 사람이라는 뜻이잖아?\n#1;greeting"

31030-9 = "......."
31030-10 = "ฮุฮุ..."
31030-11 = "...... เท่าที่ฉันจำได้ นี่คือครั้งแรกเลยที่สภาน้ำชาเชิญคนอื่นนอกจากทรีนิตี้เข้ามา"

31030-17 = "......."
31030-18 = "ที่เราเชิญคุณครูมาที่นี่เพราะต้องการขอความช่วยเหลืออะไรนิดหน่อยค่ะ"
31030-19 = "[s] \"ขอความช่วยเหลือ?\""
31030-21 = "เดี๋ยวสินางิจัง จะเข้าประเด็นเลยเหรอ?!"
31030-22 = "เอ่อ.. เราควรจะ... คุยกันเรื่องทั่วไปเพื่อทำความรู้จักกันก่อนสิ ใช่แล้ว! ไอซ์เบรกกิ้งไง!#nเราจะได้ไม่เกร็งกันมาก..."
31030-23 = "เช่นวันนี้อากาศดีจัง เมื่อวานกินอะไรมาเหรอ? ชวนคุยอะไรแบบนี้ไง?"
31030-24 = "ก็สภาน้ำชาคือการรวมตัวเพื่อเข้าสังคมนี่นา..."
31030-25 = "......"
31030-26 = "ถึงจะจ้องกันด้วยสายตาที่เป็นประกายแบบนั้นก็เถอะ แต่นี่ก็คือมารยาทของสภาน้ำชานะ#nต้องทำให้ถูกต้องสิ!"
31030-27 = "เรื่องแบบนั้นเอาไว้ทำตอนที่คุณมิกะเป็นโฮสต์นะคะ ครั้งนี้ฉันเป็นโฮสต์#nกรุณาทำตามวิธีของฉันด้วยค่ะ"
31030-28 = "......"
31030-29 = "......"
31030-30 = "แต่เชิญแขกมาร่วมประชุมทั้งที เราก็ไม่ควรจะให้แขกได้เห็นภาพการต่อเถียงอะไรแบบนี้..."
31030-31 = "ก็ได้ค่ะ... ฉันจะลองพูดอ้อมๆ ตามที่คุณมิกะเสนอ"
31030-32 = "[s] \"พวกเธอคือประธานสภานักเรียนของทรีนิตี้ใช่ไหม?\""
31030-33 = "ว้าว คุณครูเปลี่ยนบรรยากาศได้ดีเลย! ดูแบบนี้ไว้นะนางิจัง นี่แหละ นี่แหละวาทศิลป์ของผู้ใหญ่!#nความเชี่ยวชาญในการจูงใจเข้าบทสนทนาอย่างเป็นธรรมชาติ!"
31030-34 = "ค่ะ... ถูกต้องแล้วค่ะ พวกเราคือประธานสภานักเรียนของโรงเรียนสามัญทรีนิตี้ค่ะ"
31030-35 = "คุณครูอาจสงสัยว่าทำไมถึงเป็นประธานสภานักเรียนกันหมด... นั่นเพราะว่าโดยพื้นฐานแล้ว#nประธานสภานักเรียนของทรีนิตี้จะมีหลายคนค่ะ"
31030-36 = "เดี๋ยวนะ... นางิจัง? นี่เมินฉันเหรอ?"
31030-37 = "ในอดีตก่อนที่ทรีนิตี้จะรวมกันเป็นหนึ่ง เหล่าตัวแทนของโรงเรียนแต่ละกลุ่มได้จัดตั้งสภาน้ำชาขึ้นมา#nเพื่อแก้ไขการขัดแย้ง และประวัติศาสตร์ก็เริ่มมาตั้งแต่ตรงนี้..."
31030-38 = "เอาอย่างนี้จริงเหรอ? ทำเกินไปแล้ว... แบบนี้ฉันเสียใจนะ..."
31030-39 = "ตัวแทนจากโรงเรียนปาเตอร์ ฟีเลียส และซางตุสได้จัดตั้งสภาน้ำชาขึ้นเพื่อสร้างบรรยากาศ#nของการคืนดีกัน..."
31030-40 = "นางิจัง... เธอจะเมินฉันง่ายๆ แบบนี้เลยเหรอ หืม? กวนประสาทชะมัด#nเพื่อนตั้งแต่สมัยเด็กที่รู้จักกันมากกว่าสิบปี... ทำกันแบบนี้เหรอ..."
31030-41 = "และหลังจากนั้นสภานักเรียนของทรีนิตี้ก็ใช้ชื่อว่าสภาน้ำชา และจะมีโฮสต์จากแต่ละกลุ่มโรงเรียน..."

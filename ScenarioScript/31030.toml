[translation]
31030-1 = "第3話;ティーパーティー"
31030-2 = "へー、これが噂の先生かー。あんまり私たちと変わらない感じなんだね？"
31030-3 = "なるほどー、ふーん……うん、私は結構良いと思う！！ナギちゃん的にはどう？"
31030-4 = "……ミカさん、初対面でそういった話はあまり礼儀がなっていませんよ。"
31030-5 = "愛が溢れるのは結構ですが、時と場所は選びましょうね。"
31030-6 = "うぅっ、それはまあ確かに……。"
31030-7 = "先生、ごめんね？まあとりあえず、これからよろしくってことで！"
31030-8 = "[s] \"こちらこそ、よろしく。\""
31030-9 = "……。"
31030-10 = "……ふふっ。"
31030-11 = "……トリニティの外の方が、このティーパーティーの場に招待されたのは、私の記憶では先生が初めてです。"
31030-12 = "普段は、トリニティの一般の生徒たちも簡単には招待されない席でして……。"
31030-13 = "あー、何それナギちゃんちょっといやらしい！恩着せがましい感じー！"
31030-14 = "……。"
31030-15 = "……失礼しました、先生。そういった意図は無かったのですが……それはさておき、ミカさん？"
31030-16 = "あー……ごめん、大人しくしてるね。できるだけ。"
31030-17 = "……では、あらためて。"
31030-18 = "こうして先生をご招待したのは、少々お願いしたいことがありまして。"
31030-19 = "[s] \"お願い？\""
31030-21 = "おおっ、ナギちゃんいきなりだね！？"
31030-22 = "もうちょっとこう、アイスブレイクとか要らないの？ちょっとした小粋な雑談とかは？"
31030-23 = "天気が良いですねとか、昨日は何を食べたのですか、とか。そういうの挟まないの？"
31030-24 = "ほら、ティーパーティーって、基本的には社交界なんだし？"
31030-25 = "……。"
31030-26 = "そんな綺麗な目で睨んでも、これはティーパーティーとしての在り方の問題なんだからダメー！きちんとしないと！"
31030-27 = "ミカさん、そういったことはあなたがホストになった際に追求してください。今は一応私がホストですので、私の方法に従ってくださいな。"
31030-28 = "……。"
31030-29 = "……。"
31030-30 = "まあ、お客様の前でこのような論争を広げるのもまた、望ましい姿ではないことは確かですね。"
31030-31 = "……そうですね。ミカさんの言う通り、少し話の方向を変えましょうか。"
31030-32 = "[s] \"あなたたちが、トリニティの生徒会長なんだよね？\""
31030-33 = "おお、先生の方から空気を読んでくれた！ほら、ナギちゃん見た！？これが大人の話術だよ！自然な会話への誘導！"
31030-34 = "……はい。仰る通り、私たちがトリニティ総合学園の生徒会長[ruby=・・]たち[/ruby]です。"
31030-35 = "「生徒会長たち」というのは耳慣れない言葉かもしれませんね……最初からご説明しますと、トリニティの生徒会長は代々複数人で担っているものなのです。"
31030-36 = "あれ、ナギちゃん無視？もしかして無視かなー？おーい？"
31030-37 = "昔……「トリニティ総合学園」が生まれる前、各分派の代表たちが紛争を解決するために「ティーパーティー」を開いたことから、この歴史は始まりました。"
31030-38 = "え、ひどっ……くすん、私ちょっと傷ついた……。"
31030-39 = "パテル、フィリウス、サンクトゥス……それらの三つの学園の代表を筆頭にティーパーティーを開き、和解への流れが生み出されたのです。"
31030-40 = "ナギちゃんが本当に無視した……嫌がらせだぁ……ひどくない？私たち一応十年来の幼馴染だよ？こんなこと今までに……結構あったかもだけど……。"
31030-41 = "……その後から、トリニティの生徒会は「ティーパーティー」という通称で呼ばれるようになり、各派閥の代表たちが順番に「ホスト」を――"
31030-42 = "ああもう[ruby=うるさ]五月蠅[/ruby]いですね！？"
31030-43 = "ひぇっ……。"
31030-44 = "今、私が説明をしているんですよ！？"
31030-46 = "それなのにさっきからずっと！"
31030-47 = "横でぶつぶつぶつぶつと……！"
31030-48 = "どうしても黙れないのでしたら、その小さな口に……"
31030-49 = "ロールケーキをぶち込みますよっ！？"
31030-51 = "……。"
31030-54 = "……。"
31030-55 = "[s] \"……。\""
31030-56 = "……あら。"
31030-57 = "……私ったら、何という言葉遣いを……。"
31030-58 = "……失礼しました、先生……ミカさんも。"
31030-59 = "いやー、怖い怖い……。"
31030-60 = "[s] （中々本題に入らないな……）"
31030-63 = "……そろそろ本題に入りましょうか。私たちが先生にお願いしたいのは、簡単なことです。"
31030-64 = "簡単だけど、重要なことだよ。"
31030-65 = "はい、そうですね。"
31030-66 = "……補習授業部の、顧問になっていただけませんか？"
31030-67 = "[s] \"補習授業部？\""
31030-68 = "はい。つまり、落第の危機に陥っている生徒たちを救っていただきたいのです。「部」という形ではありますが、今回は顧問というより「担任の先生」と言った方が良いかもしれませんね。"
31030-69 = "トリニティ総合学園は、昔からキヴォトスにおいて「文武両道」を掲げる、歴史と伝統が息づく学園です。"
31030-70 = "それなのにあろうことか、よりにもよってこの時期に、成績の振るわない方がなんと4名もいらっしゃいまして……。"
31030-71 = "私たちとしてはちょっと困ったタイミングでっていうか……。"
31030-72 = "「エデン条約」の件で、今はバタバタしててね。"
31030-73 = "あの子たちの件も何とか解決しないといけないんだけど、人手も時間も足りなくって……。"
31030-74 = "その時にちょうど見つけたの！新聞に載ってた「シャーレ」の活躍っぷりを！"
31030-75 = "猫探し、街の掃除、宅配便の配達まで、八面六臂の大活躍！"
31030-76 = "この「シャーレ」になら、きっと面倒ごとを任せられそうだなって！"
31030-77 = "[s] \"……。\""
31030-78 = "……「面倒ごと」なんて言ってはいけませんよ、ミカさん。"
31030-79 = "ま、まあでも、ある意味本当のことでもあるし……。"
31030-80 = "それに、「先生」なんでしょ？"
31030-81 = "今はみんなBDで学習する時代だし、学校の職員とか、教授とかならまだしも、「先生」って概念は珍しいんだよね。"
31030-82 = "先の道を生きると書いて「先生」……つまり、「導いてくれる役割」ってことだよね？"
31030-83 = "尊敬の対象、あるいは生きる指針としてみんなに手を差し伸べ、導く……「補習授業部」の顧問として、これはぴったりだなって思って！"
31030-84 = "噂では、「尊敬」という言葉が合うかどうかについては、意見が割れているようですが……。"
31030-85 = "あー、そうだったね。報告書によって全然違うっていうか……まあ、これは先生の名誉のために何も言わないでおくね。"
31030-86 = "[s1] （いったいどんな噂が……）\n[s2] （……聞かなかったことにしよう！）"
31030-87 = "とにかく！今はちょっと忙しいこともあって、ぜひ先生に、この子たちを引き受けてほしいの！"
31030-88 = "とにかく！今はちょっと忙しいこともあって、ぜひ先生に、この子たちを引き受けてほしいの！"
31030-89 = "もう少々説明しますと……この「補習授業部」は常設されているものではなく、特殊な事態に応じて創設し、救済が必要な生徒たちを加入させるものです。"
31030-90 = "少々特殊な形ではありますが、急ぎということもあり、シャーレの超法規的な権限をお借りしつつ……といった形で、ですね。"
31030-91 = "色々とややこしいですが、本質はあくまで「成績の振るわない生徒たちを救済すること」にあります。だからこそ、こういった特殊な形での創設が許されたわけですが……。"
31030-92 = "いかがでしょう、先生？助けが必要な生徒たちに、手を指し伸べていただけませんか？"
31030-93 = "[s] \"私にできることであれば、喜んで。\""
31030-94 = "やった！ありがとー先生！"
31030-95 = "……。"
31030-96 = "ふふっ、きっと断らないでしょうとは思っていましたが……。"
31030-97 = "ありがとうございます。では、こちらを。"
31030-98 = "[ns] 生徒たちの名簿を受け取る。"
31030-100 = "そちらの方々が対象です。"
31030-102 = "つまりトリニティのやっか――"
31030-103 = "その表現は愛が足りませんよ、ミカさん。こう言いましょうか、トリニティにおける「愛が必要な生徒たち」。"
31030-104 = "まあ呼び方は何でもいいけどねー。"
31030-107 = "[ns] （あれ、この子って……）"
31030-108 = "ん？何か気になる子でもいた、先生？"
31030-109 = "[s3] \"……ううん、何でもない。\"\n[s4] 口笛を吹く。"
31030-110 = "詳しい内容についてはまた追ってご連絡いたします。他に気になる点はございませんか？"
31030-111 = "詳しい内容についてはまた追ってご連絡いたします。他に気になる点はございませんか？"
31030-113 = "[s] \"エデン条約……って、何？\""
31030-114 = "……。"
31030-115 = "……。"
31030-116 = "うーん……それは、何て言えば良いのかなあ。"
31030-117 = "その説明には中々時間がかかってしまいますので、また後日お話ししますね。一応、それなりに内部機密ということもありますし……。"
31030-118 = "それに、補習授業部の件とはそれほど関係のないことですから……。"
31030-119 = "[s] \"あと、ティーパーティーのもう一人の生徒会長は？\""
31030-120 = "……。"
31030-121 = "それは……。"
31030-122 = "セイアちゃんは今、トリニティにいないの。入院中で……。"
31030-123 = "本来であれば、今のホストはそのセイアさんだったのですが……そういった事情で不在のため、私がホストを務めているところです。"
31030-124 = "元々ティーパーティーのホストは、順番でやるものだからね。"
31030-125 = "[s] \"そっか、早く良くなると良いね。……今聞きたいのはこれぐらいかな。\""
31030-126 = "承知しました、また何かあれば聞いてください。"
31030-127 = "では準備が整い次第、先生にはトリニティ総合学園に派遣という形で来ていただくことにできればと。"
31030-128 = "先生のご協力に感謝します、これで一安心です。"
31030-129 = "じゃっ、またね先生。また会えるのかどうか分からないけどっ。"
31030-130 = "そうですね。特に今は忙しい時期ですし、ティーパーティーの生徒会長がこうしてまたすぐに集まれるとも限りませんから。"
31030-131 = "ふふっ、やっぱり忙しいんだ？ま、でも先生のおかげでナギちゃんの顔も見られたし、良かった良かった。"
31030-132 = "はい、私もですよ。ミカさん。"
31030-133 = "ふふっ。"
31030-134 = "では、これからよろしくお願いいたしますね、先生。私もティーパーティーのホストとして、先生をエスコートいたしますので。"
31030-135 = "[s] \"うん、よろしくね。\""
31030-141 = "（まずは補習授業部の名簿にあった、見たことのある名前の生徒に会いに行くことに……）"
31030-145 = "[ns] \"やっぱり……！\""
31030-146 = "あ、あはは……こんにちは、先生。"
31030-147 = "あの、これはその、やむを得ない事情がありまして……。"
31030-148 = "あうぅ……。"
31030-150 = "次回;補習授業部の生徒たち（１）"

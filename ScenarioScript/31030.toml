[translation]
31030-1 = "第3話;茶會"
31030-2 = "嘿～這就是傳聞中的老師啊。感覺跟我們沒什麼差別耶？ "
31030-3 = "原來如此，哼嗯……嗯，我覺得很不錯！！渚醬覺得呢？"
31030-4 = "……彌香同學，對初次見面的人說那種話不太符合禮儀唷。 "
31030-5 = "雖然充滿愛是件好事，不過還是選擇一下時機和場合吧。"
31030-6 = "啊……是，是嗎？"
31030-7 = "抱歉，老師。#n我好像有點太隨興了……不過還是請你多多指教！"
31030-8 = "[s]「請多指教。」"
31030-9 = "……"
31030-10 = "……呵呵。"
31030-11 = "……在我的印象中，老師您是第一個被茶會招待的三一外部人士。"
31030-12 = "平時就連三一的一般學生也很難被招待至此……"
31030-13 = "嗚哇～那種說法！渚醬好下流！！"
31030-14 = "……"
31030-15 = "我並沒有那個意思……唉，彌香同學？"
31030-16 = "啊……抱歉，我會安分一點的。"
31030-17 = "……"
31030-18 = "之所以勞煩老師過來，是想拜託您一件小事。"
31030-19 = "[s]「一件小事？」"
31030-21 = "哦哦！渚醬怎麼突然就進入正題！？"
31030-22 = "不需要再進行一點……破冰活動之類的嗎？或是來點消除尷尬的閒聊？"
31030-23 = "像是「天氣真好呀～」、「昨天吃了什麼呢～」之類的。#n不聊點這種話題嗎？"
31030-24 = "你想想，茶會基本上不就是社交的場合嗎？"
31030-25 = "……"
31030-26 = "就算你用那雙漂亮的眼睛瞪我也沒用。#n這是關乎茶會態度的問題，要確實做到才行！"
31030-27 = "彌香同學，那種事請等到你當主席的時候再追求吧。#n現在姑且是我擔任主席，請你尊重我的做法。"
31030-28 = "……"
31030-29 = "……"
31030-30 = "不過在客人面前展開這樣的爭論，確實也不是我所樂見的。"
31030-31 = "……我明白了。#n就按照彌香同學所說，稍微換個話題吧。"
31030-32 = "[s]「你們就是三一的學生會長對吧？」"
31030-33 = "哦哦，老師看懂氣氛了！渚醬看到了嗎！？#n這就是大人的話術唷！自然而然地引導對話！"
31030-34 = "……是。您說得沒錯，我們正是三一綜合學園的學生會長[ruby=．]們[/ruby]。"
31030-35 = "您可能會對「學生會長[ruby=．]們[/ruby]」這個說法感到疑惑……#n不過基本上，三一的學生會長一直都是由多人同時擔任。"
31030-36 = "咦……渚醬……？無視我？"
31030-37 = "在「三一綜合學園」誕生前，#n各派系的代表們為解決紛爭而舉辦的「茶會」開始了這段歷史……"
31030-38 = "真的無視？糟糕……好像讓我有點受傷……"
31030-39 = "聖父、聖子、聖靈──三所學園的代表舉辦茶會，孕育了和解的氛圍。#n在那之後……"
31030-40 = "渚醬……真的無視我耶……這完全是在欺負人吧……#n不覺得有點過分嗎？居然這樣對待認識10年以上的青梅竹馬……"
31030-41 = "……在那之後，三一的學生會便被稱為「茶會」。#n由各派系的代表們輪流擔任「主席」──"
31030-42 = "吵夠了沒！"
31030-43 = "……"
31030-44 = "彌香同學！"
31030-46 = "你到底要吵到什麼時候！"
31030-47 = "一直嘰嘰喳喳地說個不停！煩死人了！"
31030-48 = "如果你實在無法閉上那張小嘴……"
31030-49 = "我就用蛋糕捲塞滿你的嘴巴哦！"
31030-51 = "……"
31030-54 = "……"
31030-55 = "[s]「……」"
31030-56 = "……"
31030-57 = "我，我真是的，怎麼這樣說話……"
31030-58 = "唉……我在此向老師……還有彌香同學道歉。"
31030-59 = "哎呀，好可怕好可怕…… "
31030-60 = "[s] （完全進不了正題呢……）"
31030-63 = "……我們想拜託老師的是件簡單的事。"
31030-64 = "嗯。雖然簡單，不過很重要唷。"
31030-65 = "沒錯，是件重要的事。"
31030-66 = "──可以請老師擔任補課部的顧問嗎？"
31030-67 = "[s]「補課部？」"
31030-68 = "是的。從結論來說，#n我們想請老師負責營運「為了拯救陷入留級危機的學生們」設立的特別班級。"
31030-69 = "我們三一自古就是奇普托斯文武兼備，兼具歷史和傳統的學園。"
31030-70 = "然而竟偏偏在這個時期，出現多達4位成績不良的學生……"
31030-71 = "嗯。在對外關係方面，我們現在可說是面臨了最艱難的時期……"
31030-72 = "因為「伊甸園條約」的關係，四處都忙得一團亂。"
31030-73 = "在這種情況下，那些孩子的事必須盡快解決，不過人手和時間實在不夠……"
31030-74 = "但是就在這時！我們正好在新聞上看見了「夏萊」的活躍表現！"
31030-75 = "從找貓咪、打掃街道到宅配工作，夏萊簡直是便利的萬事屋！"
31030-76 = "既然如此，把麻煩的事交給夏萊準沒錯！"
31030-77 = "[s]「……」"
31030-78 = "……怎麼能說是「麻煩的事」呢，彌香同學。"
31030-79 = "是，是嗎……可是某部分來說也是事實……"
31030-80 = "不過老師是「老師」對吧？"
31030-81 = "現在是大家都用BD學習的時代，#n雖然學校的職員、講師、教授都還在，但「老師」這個概念已經很罕見了呢。"
31030-82 = "師是傳授知識的人，而教又是傳授知識並解惑的重要手段，#n所以稱之為[ruby=老師]「教師」[/ruby]……也就是「指引道路之人」沒錯吧？"
31030-83 = "從這個意義上來看，老師可以說是尊敬的對象，或者是能當作人生指標的人……#n作為「補課部」的顧問，我認為非常適合！"
31030-84 = "雖然根據傳言，對於是否符合「尊敬」這個詞的意見似乎並不統一……"
31030-85 = "啊哈哈，嗯，這點我也同意。#n根據各處傳來的報告書……為了老師的名譽著想，還是別說了吧。"
31030-86 = "[s1] （究竟是什麼樣的報告書……！？）\n[s2] （好像還是別過問比較好……）"
31030-87 = "總之！因為現在處於特殊時期，希望老師務必能接管這些孩子！"
31030-88 = "總之！因為現在處於特殊時期，希望老師務必能接管這些孩子！"
31030-89 = "這個「補課部」並非常設性的社團，而是特別為需要救濟的學生而創立。"
31030-90 = "由於形式相對特殊，希望能借用「夏萊」超越法規的權限……"
31030-91 = "不過其本質終究還是為了「救濟成績不良的學生們」所採取的手段……"
31030-92 = "您意下如何呢，老師？#n希望您務必能向陷入困境的學生伸出援手……"
31030-93 = "[s]「如果有孩子需要幫忙的話，我很樂意。」"
31030-94 = "太好了！謝謝你，老師！"
31030-95 = "……"
31030-96 = "呵呵，雖然原本就認為您不會拒絕……"
31030-97 = "非常感謝。那麼，請您收下這個。"
31030-98 = "[ns] 收下學生們的名冊"
31030-100 = "那些學生們就是補課的對象。"
31030-102 = "嗯，換句話說就是三一的麻煩人物。"
31030-103 = "那個形容實在有些缺乏愛……這麼說吧，他們是三一「需要愛的學生們」。"
31030-104 = "嗯，你開心就好。"
31030-107 = "[ns] （這，這孩子是……！）"
31030-108 = "嗯？有你認識的孩子嗎，老師？"
31030-109 = "[s3] 「……不，沒什麼。」\n[s4] 吹口哨"
31030-110 = "詳細內容日後會再以書面形式告知。#n請問是否還有說明不夠清楚的地方呢？"
31030-111 = "詳細內容日後會再以書面形式告知。#n請問是否還有說明不夠清楚的地方呢？"
31030-113 = "[s]「伊甸園條約是什麼？」"
31030-114 = "……"
31030-115 = "……"
31030-116 = "唔嗯……該怎麼說比較好呢……"
31030-117 = "要說明這點會花上不少時間，日後會再向您說明的。#n這姑且也算是內部機密……"
31030-118 = "和補課部的事也沒什麼關聯……"
31030-119 = "[s]「還有，茶會的學生會長不是應該有三個人嗎？」"
31030-120 = "……"
31030-121 = "這……"
31030-122 = "聖亞醬現在人不在三一。#n那孩子正在住院……"
31030-123 = "是的。原本擔任現任主席的應該是那位聖亞同學……#n不過由於他缺席的關係，現在由我負責主席的職務。"
31030-124 = "茶會的主席是輪流擔任的哦。#n雖然跟這件事沒什麼關係就是了。"
31030-125 = "[s]「嗯……現在想問的大概就是這些吧。」"
31030-126 = "我明白了。"
31030-127 = "那麼在準備就緒之後，我們會以派遣的形式，邀請老師來到三一綜合學園。"
31030-128 = "再次感謝老師的協助，這樣就能放心了。"
31030-129 = "掰掰囉～老師。雖然不知道還會不會見面。"
31030-130 = "也對，茶會的學生會長們要齊聚一堂，其實也不是件容易的事。"
31030-131 = "是在裝忙嗎？#n不過也是多虧了老師才能久違地見到渚醬，真是太好了。"
31030-132 = "是，我也有同感，彌香同學。"
31030-133 = "呵呵。"
31030-134 = "那麼，今後就請您多多指教了，老師。#n我也會以茶會主席的身分引導老師。"
31030-135 = "[s]「嗯，請多指教。」"
31030-141 = "（首先決定先去和補課部的名冊上，有看過名字的學生見面……）"
31030-145 = "[ns]「果然是你！！」"
31030-146 = "啊，啊哈哈……你好，老師。"
31030-147 = "啊嗚嗚……那個，這是因為某些不得已的原因……"
31030-148 = "啊嗚……"
31030-150 = "下一話;補課部的學生們（１）"

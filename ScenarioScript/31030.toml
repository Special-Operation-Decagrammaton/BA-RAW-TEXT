31030-68 = "ใช่ค่ะ ถ้าให้สรุปก็คือ พวกเราอยากขอให้คุณครูมาดูแลชั้นเรียนพิเศษ#nของพวกนักเรียนที่สอบไม่ผ่านค่ะ"
31030-69 = "สถาบันทรีนิตี้ของพวกเราเป็นโรงเรียนที่เป็นเลิศทั้งด้านอักษรศาสตร์และวิชาทางทหาร#nเราสืบทอดประวัติศาสตร์และประเพณีของคิโวทอสมาตั้งแต่สมัยโบราณ"
31030-70 = "แต่ก็ไม่รู้ว่าเป็นเพราะอะไร เราถึงมีนักเรียนที่สอบตกมากถึง 4 คนในสถานการณ์แบบนี้..."

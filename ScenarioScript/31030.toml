31030-40 = "1;미카;07;나기 쨩…… 이젠 막 무시하고…… 이거 완전 괴롭힘이잖아. 응? 너무하잖아. 십년 넘게 알고 지내온 소꿉친구를 이렇게 막…….\n#1;em;[속상함]\n#1;stiff"

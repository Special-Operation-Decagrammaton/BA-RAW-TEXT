[translation]
2001406-1 = "เตรียมพร้อมอย่างดี"
2001406-2 = "ภูเขาที่ด้านหลังโคะอุซางิ การ์เด้น"
2001406-3 = "(ระหว่างที่กำลังเก็บสิ่งของสำหรับตั้งแคมป์อยู่ที่จุดตรวจบนภูเขา...)"
2001406-4 = "ฮิฮิ... มีแต่ของดีๆ อยู่เต็มเลย"
2001406-5 = "มีทั้งผ้าใบขนาดใหญ่ที่กันฝนได้ ทั้งกระสุนปืนขนาด 7.62 มม. ด้วย..."
2001406-6 = "ถ้าเป็นของที่มีสภาพแบบนี้ก็พอเอาไปใช้ได้ แถมยังช่วยประหยัดงบของแคมป์ได้ด้วย"
2001406-7 = "คุณครู ทำอะไรอยู่ข้างบนนั้นน่ะ?"
2001406-8 = "แถวนี้ไม่มีป้ายบอกทาง ถ้าเกิดไม่ทำป้ายเอาไว้จะหลงได้งั้นเหรอ?"
2001406-9 = "ถ้าไม่เดินตามมาติดๆ ก็อาจหลงได้แบบคราวที่แล้วนั่นแหละ"
2001406-10 = "[s] \"คราวที่แล้วคนที่หลงคือซากิไม่ใช่เหรอ?\""
2001406-11 = "คราวนี้ไม่เหมือนกับคราวที่แล้วหรอกนะ?!"
2001406-12 = "หลังจากหลงคราวก่อน ฉันก็ทบทวนวิธีการอ่านดูพิกัดแผนที่อย่างละเอียด แล้วก็ศึกษาภูมิศาสตร์#nของพื้นที่รอบๆ มาแล้ว..."
2001406-13 = "แล้วอีกอย่าง คุณครูก็มีสมาร์ทโฟนที่ติดตั้ง GPS ไว้นี่ ไม่มีทางหลงหรอกน่า!"
2001406-14 = "ยะ...ยังไงก็เถอะ บนภูเขาฟ้าจะมืดเร็ว รีบกลับกันก่อนพระอาทิตย์ตกจะดีกว่า"
2001406-19 = "[ns] \"แฮ่ก... แฮ่ก...\""
2001406-20 = "หืม...? คุณครู ทำไมเดินแบบนั้นละ?"
2001406-21 = "ดูเหมือนเดินไม่ค่อยสะดวกเลยนะ"
2001406-22 = "หรือว่าได้รับบาดเจ็บตอนเดินอยู่บนภูเขาเหรอ?"
2001406-23 = "[s1] \"ทุกครั้งที่เดิน สายสะพายกระเป๋ามันบาดไหล่น่ะ...\"\n[s2] \"ครูเจ็บที่ไหล่นิดหน่อยก็เลยเดินหลังค่อมแบบนี้น่ะ\""
2001406-28 = "นั่งพักตรงนั้นก่อนดีกว่า..."
2001406-29 = "ถอดกระเป๋าสะพายออกสิ ขอฉันดูแผลที่ไหล่หน่อย"
2001406-30 = "[s3] \"ให้ถอดเสื้อออกในที่แบบนี้เนี่ยนะ?\"\n[s4] \"แบบนี้มันน่าอายนะ...\""
2001406-31 = "อย่ามัวแต่พูดน่า รีบถอดเร็วๆ เข้า!"
2001406-32 = "ไม่เห็นมีอะไรต้องอายเลย รีบถอดเร็วๆ เข้า!"
2001406-37 = "ว่าแล้วเชียว มีแผลพองอยู่ที่ไหล่จริงๆ ด้วย"
2001406-38 = "คุณครูคงไม่เคยสะพายกระเป๋าหนักๆ เดินป่ามาก่อนใช่ไหม?"
2001406-39 = "ถ้าสะพายกระเป๋าหนักๆ ทั้งที่ใส่เสื้อบางๆ แบบนี้ เวลาเดินขึ้นหรือลงเขา น้ำหนักจะถูกถ่ายโอนมาที่#nหัวไหล่ เลยทำให้เกิดเป็นแผลพุพองได้ง่าย"
2001406-40 = "เพราะงั้นฉันเลยบอกให้ใส่เสื้อหนาๆ มา..."
2001406-41 = "[s] \"ก็อากาศมันร้อน ครูเลยคิดว่าใส่มาได้ไม่เป็นอะไร...\""
2001406-42 = "ตรงกันข้ามเลย ยิ่งวันที่อากาศร้อนจะยิ่งเกิดแผลได้ง่าย เพราะงั้นควรเตรียมตัวป้องกันให้ดีที่สุด"
2001406-43 = "ถ้าเตรียมตัวตามคู่มือภาคสนามละก็คงจะไม่เกิดเรื่องแบบนี้แท้ๆ..."
2001406-44 = "คุณครูมีเสื้อตัวอื่นที่จะสวมทับอีกชั้นไหม?"
2001406-45 = "หรือไม่งั้นก็ลดจำนวนสัมภาระลงหน่อยดีไหมนะ...?"
2001406-46 = "[s5] \"ครูผิดเอง ไม่ต้องห่วงหรอกนะ\"\n[s6] \"ครูจะแบกกระเป๋านี่ลงไปเอง\""
2001406-47 = "ถ้ารู้ว่าจะเกิดเรื่องแบบนี้ ฉันน่าจะแบ่งสัมภาระของคุณครูมา..."
2001406-48 = "ถ้ารู้ว่าจะเกิดเรื่องแบบนี้ ฉันน่าจะแบ่งสัมภาระของคุณครูมา..."
2001406-49 = "ช่วยไม่ได้นะ..."
2001406-53 = "เอ้า รับไปสิ"
2001406-54 = "แผ่นรองช่วยลดแรงกระแทกที่ไหล่ พอใส่แล้วจะช่วยลดอาการเจ็บที่ไหล่ลงได้น่ะ"
2001406-55 = "[s] \"เมื่อกี้ซากิใช้อยู่ไม่ใช่เหรอ?\""
2001406-56 = "มะ...มันก็ใช่ แต่ว่า...!"
2001406-57 = "ฉันไม่มีอันสำรองนี่... อย่างน้อยก็คงดีกว่าไม่ได้ใช้เลยแล้วกัน"
2001406-58 = "ตัวฉันเคยแบกของหนักเดินเขามาก่อนตอนฝึกที่สถาบัน SRT ก็เลยชินแล้วน่ะ ถ้าไม่รังเกียจก็ใช้เถอะ"
2001406-59 = "[s] \"ขอบคุณนะ ครูขอรับไว้แล้วกัน\""
2001406-63 = "[ns] เอาเข้ามาดูใกล้ๆ"
2001406-65 = "ทะ... ทะ... ทะ... ทำอะไรน่ะ?!"
2001406-66 = "คะ...คงไม่ได้คิดจะดมกลิ่นหรอกใช่ไหม!?"
2001406-67 = "ฉันกำลังกังวลเรื่องกลิ่นเหงื่ออยู่เลยนะ...!"
2001406-68 = "เอาคืนมาเลย!"
2001406-69 = "[s] \"ครูยังไม่ได้ทำอะไรเลย...!\""
2001406-73 = "เดี๋ยว! หยุดอยู่ตรงนั้นนะ! รีบๆ เอาแผ่นรองคืนมาเลย!"
2001406-75 = "(แผ่นรองที่ซากิให้ยืมช่วยบรรเทาอาการเจ็บลงได้อย่างดี ทำให้คุณครูลงเขามาได้อย่างปลอดภัย...)"
2001406-79 = "(แต่ก็ถูกซากิที่วิ่งตามหลังมาเล่นงานจนอ่วมในภายหลัง...)"

[translation]
2001406-1 = "Fully Prepared"
2001406-2 = "Mountain behind Kousagi Park"
2001406-3 = "I was on my way back from a mountainside post with camping supplies."
2001406-4 = "What a good haul."
2001406-5 = "From raincoats that can be used as a substitute for tarpaulins, to 7.62mm rifle bullets…"
2001406-6 = "They're in pretty good shape too. This'll save us a little extra cash."
2001406-7 = "Sensei, what are you doing up there?"
2001406-8 = "There's no signs, so it's easy to lose the trail."
2001406-9 = "You'll be lost like last time if you don't stay close to me."
2001406-10 = "[s] \"Weren't you the one who got lost?\""
2001406-11 = "I-It's different!"
2001406-12 = "And I practiced map reading really hard, and studied the geography of the area since then."
2001406-13 = "Not only that, I have a smartphone with GPS now, so we won't get lost!"
2001406-14 = "Anyway, it's gonna get dark soon, so let's head back to the park."
2001406-19 = "[ns] *pant pant*"
2001406-20 = "Sensei? Why're you walking like that?"
2001406-21 = "Are you okay?"
2001406-22 = "Are you hurt somewhere?"
2001406-23 = "[s1] \"The straps are digging into my shoulders.\"\n[s2] \"I keep hunching my shoulders because of the pain.\""
2001406-28 = "Sit down, Sensei."
2001406-29 = "Put the sack down. Lift your shirt and show me your shoulder."
2001406-30 = "[s3] \"Take my shirt off? Here?\"\n[s4] \"That's kind of embarrassing.\""
2001406-31 = "Stop playing around. Hurry up!"
2001406-32 = "Don't be stupid! Hurry up!"
2001406-37 = "You have blisters on your shoulder."
2001406-38 = "Sensei, you've never carried a heavy bag like this while hiking before, have you?"
2001406-39 = "You'll get blisters like these if you're carrying a really heavy pack with no protection. It's too much weight on your shoulder."
2001406-40 = "That's why I told you to wear something thick."
2001406-41 = "[s] \"I thought it'd be fine because it's so hot.\""
2001406-42 = "The skin gets softer on a hot day, so you have to account for that."
2001406-43 = "Didn't you read the field manual I gave you?"
2001406-44 = "Do you have anything you can wear over your shirt?"
2001406-45 = "If not, maybe we can take some stuff out of the bag."
2001406-46 = "[s5] \"It was my fault, so don't worry.\"\n[s6] \"I'm responsible for carrying this bag.\""
2001406-47 = "I should've thought to bring some equipment for you..."
2001406-48 = "I should've thought to bring some equipment for you..."
2001406-49 = "...Okay, fine."
2001406-53 = "Here, take these."
2001406-54 = "They're shoulder pads. Put them under the straps and it'll help."
2001406-55 = "[s] \"Weren't you wearing these, Saki?\""
2001406-56 = "I mean, technically yes!"
2001406-57 = "But it'll be much better for your shoulders. I should've brought extras..."
2001406-58 = "I'm used to carrying heavy armor from SRT training. Don't worry."
2001406-59 = "[s] \"Thank you, Saki.\""
2001406-63 = "[ns] Bring them close to your face to examine them."
2001406-65 = "Wh-Wh-What are you doing?"
2001406-66 = "Did you just sniff them?"
2001406-67 = "I know they're sweaty, okay!"
2001406-68 = "Give them back right now!"
2001406-69 = "[s] \"I was just looking!\""
2001406-73 = "Get back here! Give them to me!"
2001406-75 = "I was able to get to camp pain-free thanks to Saki's shoulder pads."
2001406-79 = "But Saki gave me a beatdown when she finally caught up to me."

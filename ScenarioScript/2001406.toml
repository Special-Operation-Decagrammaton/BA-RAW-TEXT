[translation]
2001406-1 = "準備OK"
2001406-2 = "兔寶寶公園．後山"
2001406-3 = "（到了半山腰之後，確實有一些露營用品跟物資被棄置在那裡）"
2001406-4 = "呵呵，這些東西還真不錯呢……"
2001406-5 = "雨衣，還有7.62mm步槍子彈……"
2001406-6 = "這種保存狀態已經十分堪用了，看來可以節省不少資源了。"
2001406-7 = "……話說回來，老師一直待在那裡做什麼呢？"
2001406-8 = "在這種地方迷路的話可不得了哦。"
2001406-9 = "已經不想再像之前一樣了……"
2001406-10 = "[s] 「之前迷路的是咲希吧……？」"
2001406-11 = "少，少囉嗦！不要再提以前的事了！"
2001406-12 = "而且在那之後我有好好複習讀圖法，也已經事先掌握了周圍的地理情況。"
2001406-13 = "更何況有手機在的話就能用GPS！在這種狀態下迷路是不可能的！"
2001406-14 = "……先不管那個了，在山裡不知道會發生什麼事。還是在太陽下山前盡早回去吧。"
2001406-19 = "[ns] 「……」"
2001406-20 = "……老師？"
2001406-21 = "你的走路姿勢是不是怪怪的？"
2001406-22 = "難道是受傷了嗎……？"
2001406-23 = "[s1] 「怎麼說呢，肩膀有點……」\n[s2] 「是因為被背帶壓得太緊了嗎……」"
2001406-28 = "……先在那裡坐一下吧。"
2001406-29 = "把背包放下，上衣脫掉。"
2001406-30 = "[s3] 「咦，要在這裡脫掉嗎……？」\n[s4] 「人家好害羞……」"
2001406-31 = "這是猶豫的時候嗎！"
2001406-32 = "這是害羞的時候嗎，笨蛋！"
2001406-37 = "……原來如此，起水泡了啊。"
2001406-38 = "是因為老師很少有這種揹著重物登山的經驗吧。"
2001406-39 = "穿這麼薄的衣服的話，行李的重量會直接壓在身體上，#n所以才會起水泡或是容易出現撕裂傷。"
2001406-40 = "所以說才說要「穿著像樣的衣服」來啊……"
2001406-41 = "[s] 「總覺得會很熱所以……」"
2001406-42 = "正好相反啊笨蛋。在皮膚會變得柔軟的熱天才更應該要準備好對策才行。"
2001406-43 = "這種事應該有寫在教科書上吧……"
2001406-44 = "……有沒有可以穿在外面的衣服？"
2001406-45 = "或是減少一點行李……"
2001406-46 = "[s5] 「沒關係的，別在意。」\n[s6] 「休息一下之後已經好一點了。」"
2001406-47 = "哈啊，畢竟有老師在，應該多做點準備的……"
2001406-48 = "哈啊，畢竟有老師在，應該多做點準備的……"
2001406-49 = "真沒辦法……"
2001406-53 = "來，這個給你。"
2001406-54 = "這是能吸收衝擊的「護墊」。只要把它放在背帶那邊的話應該會輕鬆一點的。"
2001406-55 = "[s] 「這不是咲希一直在用的東西嗎……？」"
2001406-56 = "是，是這樣沒錯啦……！"
2001406-57 = "但我也帶沒有備用的護墊，這總比不用好吧……"
2001406-58 = "反正我已經因為SRT的訓練很習慣了，你不用擔心。"
2001406-59 = "[s] 「……謝謝，那我就不客氣了。」"
2001406-63 = "[ns] 目不轉睛地盯著收下的護墊"
2001406-65 = "等，你在做什麼……！"
2001406-66 = "你這傢伙該不會是在聞它的味道吧！？"
2001406-67 = "所以我剛剛才不想借你的，我也知道上面有汗啊……！"
2001406-68 = "果然還是還我吧！！"
2001406-69 = "[s] 「明明我什麼都還沒做……！」"
2001406-73 = "等等，別逃啊！快點還我！！"
2001406-75 = "（多虧了咲希給的護墊，總算是順利下山了……）"
2001406-79 = "（不過被後面追來的咲希狠狠揍了一拳）"

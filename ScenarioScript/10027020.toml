10027020-37 = "3;메루;09;까, 깜짝이야?! 다짜고짜 발밑에 총 쏘는 그거! 그 버릇 좀 고치라고! 게다가 그렇게 사사건건 비꼬아 대니까, 너는 늘 겉도는 거야! \n#3;closeup\n#3;em;[빠직]"
10027020-38 = "3;타카네 실루엣;10;어머. 기껏 동인행사에 참가했는데도, 그 어떤 작가에게도 말을 붙이지 못한 나머지, 혼자 굳센 척 아무렇지 않아 하는 건 메루리 씨 역시 마찬가지 아닌가요?\n#3;closeup\n#3;em;[음표]"

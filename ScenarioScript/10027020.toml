10027020-20 = "5;메루;05\n1;타카네 실루엣;02;이분은……?\n#1;a\n#5;a\n#1;em;[반응]"
10027020-21 = "5;메루;00;으응~? 그런가아~? 타카네 씨께서는 처음이었던가아~? 그러면 어쩔 수 없구만! 이 내가 직접 소개해 줄 수밖에!\n#5;em;[재잘]"
10027020-22 = "1;타카네 실루엣;06;으, 으으으으음……! 다른 누구도 아닌 당신에게 소개받게 되다니, 이 무슨 굴욕……!\n#1;stiff"
10027020-23 = "1;타카네 실루엣;05;그, 그렇지만……! 처음 뵙는 분께 직접 스스로를 소개해 달라고 말씀드리는 것도 경우에 어긋나는 일일 터……!\n#1;em;[!]"
10027020-24 = "5;메루;03;그렇지~? 그렇지~? 이야아, 이거 무릎 꿇고 지금까지의 오만과 무례를 용서해 달라고 눈물로써 빌면 못 해 줄 것도 없는데 말이야~?\n#5;hophop"

[translation]
10027020-1 = "第2話;最終卷"
10027020-3 = "嘔嘔嘔……沒想到偏偏在這裡碰到這種東西……"
10027020-4 = "居然用「這種東西」稱呼別人，還真像自稱人氣漫畫家Meruri同學的用字遣詞呢。#n需不需要我下次送你一本字典？"
10027020-5 = "才，才不需要咧！#n要是收下你的禮物，晚上八成會做惡夢吧……"
10027020-6 = "沒想到Meruri同學竟然會開這麼高級的玩笑，需要我表揚你一下嗎？"
10027020-7 = "還真謝謝你哦！#n尤其是用「表揚」這個詞來刻意強調上下關係，真符合你的行事作風！"
10027020-8 = "哎呀，居然發現了我的用心，看來察言觀色的能力增長了不少嘛。"
10027020-10 = "……！"
10027020-11 = "……！"
10027020-17 = "[ns1]「好了好了，你們兩個都別說了。」\n[ns2]「過度的爭吵對你們都沒有好處哦。」"
10027020-20 = "這位是……？"
10027020-21 = "哼嗯～？哎呀～原來貴音同學是第一次見到嗎～？#n那就沒辦法了，就由我來向．你．介．紹．吧！"
10027020-22 = "唔唔唔唔唔……！#n我竟然需要你來介紹，簡直是奇恥大辱……"
10027020-23 = "不，不過……！#n要求初次見面的人自我介紹，實在是過於失禮……"
10027020-24 = "對吧～對吧～？哎呀～要是你願意跪下，哭著求我原諒你過去的傲慢和無理的話……#n我倒是可以大發慈悲替你介紹喔～"
10027020-29 = "你少得寸進尺！"
10027020-37 = "嚇，嚇死我了！？不要突然朝人家腳邊開槍啦！#n不是跟你說過趕快把這個壞習慣改掉了嗎！#n你就是因為每件事都要鑽牛角尖，才會老是跟別人合不來啦！"
10027020-38 = "哎呀，我可不想被參加同人活動的時候，#n因為沒人來搭話只能站在原地的Meruri同學這麼說呢，你這不是五十步笑百步嗎？"
10027020-39 = "你說夠了沒！雖然是事實沒錯！"
10027020-45 = "[ns3]「我說～」\n[ns4]「你們是不是把我給忘了～？」"
10027020-48 = "啊。"
10027020-49 = "哎呀。"
10027020-50 = "啊，那個……總之，這位是……"
10027020-59 = "哎呀，哎呀哎呀哎呀。"
10027020-60 = "初次見面，老師。#n居然能親眼見到那位傳說中的夏萊老師，真是作夢都沒想到呢。"
10027020-61 = "我的名字叫做三善貴音，隸屬於出版部。#n平時經常在「赤熊」上投稿對赤冬出版的各式作品的心得評論。"
10027020-62 = "[s]「出版部……？」"
10027020-63 = "是的。#n我們是由一群對赤冬聯邦學園中的出版、寫作等等活動深感興趣的學生組成的社團。"
10027020-64 = "不是我在自賣自誇……身為一名專業的評論家──#n我不僅看過所有赤冬出版的書籍，甚至還一一留下了評論。"
10027020-65 = "都把自己從頭誇到腳了，還說不是在自賣自誇……"
10027020-66 = "呵呵，希望老師下次有空的話，也能來我們出版部坐坐。"
10027020-67 = "不要無視我！#n再說了，今天跟老師有約的人是我！"
10027020-68 = "這麼說來確實挺稀奇的呢。#n我還以為就算世界要滅亡了，你也會把自己關在工作室裡的說。#n居然會來到這種地方……"
10027020-69 = "呃……我偶爾也是會出來做點取材的……"
10027020-70 = "這話說的真有趣呢。#n平常這種事不都是由你的助手負責的嗎……？"
10027020-71 = "哎呀，這麼說來，今天好像沒看到你的助手呢？"
10027020-73 = "紅葉同學去哪裡了呢？"
10027020-74 = "啊……那，那個……！#n他暫時去別的地方了……"
10027020-76 = "……哼嗯？真奇怪。#n都來到這種地方了，紅葉同學卻沒有跟你同行。聽起來不太對勁呢。"
10027020-77 = "……"
10027020-78 = "發生什麼事了，Meruri同學？#n平時那個任性又吵鬧的你跑到哪裡去了？"
10027020-79 = "啊啊，我這可不是在擔心你……之所以會這麼問，只是因為有一丁點的在意罷了。#n假如你想感謝我的話，倒也不是不行。"
10027020-80 = "不，果然還是別感謝我好了，那會讓我覺得有點噁心。"
10027020-81 = "話都是你在說！#n煩死人了……"
10027020-82 = "[s5]「話說，貴音你剛才說赤冬出版的書……」\n[s6]「你全部都看過，對吧？」"
10027020-85 = "沒錯，我再強調一遍，這絕對不是在自賣自誇。"
10027020-86 = "分明就是……"
10027020-87 = "[s]「既然如此……那你應該也知道《LUNA》這部作品吧？」"
10027020-88 = "《LUNA》是嗎……？"
10027020-89 = "如果是問知不知道這部作品的話，我當然知道。"
10027020-90 = "不過我有點好奇……為什麼老師和Meruri同學會對《LUNA》產生興趣呢？"
10027020-91 = "[s]「我們正在找《LUNA》的最終卷。」"
10027020-93 = "在找《LUNA》？而且還是最終卷……？"
10027020-103 = "……原來如此。#n紅葉同學因而離開了圖書館，現在不知去向……"
10027020-104 = "……"
10027020-105 = "我早就知道這一天遲早會到來了，Meruri同學。"
10027020-106 = "你，你又知道了！？"
10027020-107 = "請回想一下你平時的名聲吧。#n老實說，事情現在才發生反而更讓我訝異。"
10027020-108 = "你說名聲？是啊，我的名聲確實不好，但你自己不也一樣嗎！#n整天寫一些晦澀難懂的評論，根本沒人看得懂你在寫什麼！"
10027020-109 = "你以為隨便寫幾個字就能稱之為評論了嗎？#n能夠從別人沒想到的觀點切入，並且發掘作品新價值的文章才叫做評論。#n看不懂是你們自己的問題！"
10027020-110 = "哼！要是沒有創作者，哪來的評論家！"
10027020-111 = "有深度的評論能讓作品更加發光發熱！#n況且，沒有讀者的作品還能稱之為作品嗎！？"
10027020-113 = "赤冬不就有很多嗎？例如潔莉諾會長的宣傳文宣之類的！"
10027020-114 = "這點我倒是認同！"
10027020-119 = "[ns7]「好了好了，你們都別吵了。」\n[ns8]「剛才是在說《LUNA》的最終卷吧。」"
10027020-122 = "啊，對喔……"
10027020-123 = "……"
10027020-124 = "情況我已經明白了，老師。"
10027020-125 = "也包含您為什麼會幫助這個尚未社會化、就連願意走出戶外都很稀奇的生物了。"
10027020-126 = "根本把我當成野生動物了……"
10027020-127 = "不過老師，從結論來說──"
10027020-128 = "《LUNA》的最終卷背後牽扯到了很多複雜的問題……"
10027020-129 = "至少那並非一朝一夕就能找到的東西。"
10027020-130 = "麻煩說人話好嗎？"
10027020-131 = "況且你從剛剛開始就說得好像對《LUNA》很了解的樣子……#n你該不會也正在收集《LUNA》吧？是想用這種方式讓我們放棄嗎？"
10027020-132 = "一次問這麼多問題，別人該怎麼回答呢？#n不知道所謂的對話應該是要有來有往的嗎？"
10027020-133 = "……"
10027020-134 = "Meruri同學，接下來這些話是要對你說的。"
10027020-135 = "去一趟出版部吧。"
10027020-136 = "嗯？出版部？去那裡做什麼？"
10027020-137 = "因為那裡或許還留有一些關於《LUNA》最終卷的線索。"
10027020-138 = "假如你是真心想替誰找到那本書的話…… "
10027020-139 = "……也許能夠抵達吧。"
10027020-140 = "……嗯？"
10027020-142 = "那麼我就先告辭了。#n之後有機會的話再見吧，[USERNAME]老師。"
10027020-143 = "至於Meruri同學……就算了吧。"
10027020-144 = "最後那句話是多餘的！"
10027020-150 = "喂，等，等等！"

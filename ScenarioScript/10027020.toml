10027020-106 = "5;메루;10;뭐, 뭐가!\n#5;hophop"
10027020-107 = "1;타카네;07;평소 당신의 인망을 돌아보세요. 이런 일이 이제서야 터졌다는 게 오히려 놀랍기만 하네요."
10027020-108 = "5;메루;05;인망이라고 했냐! 말 잘했어. 그건 너도 마찬가지잖아! 맨날 어려운 평론만 하고, 말을 빙빙 돌리니까 알아듣는 사람이 없지!\n#5;em;[빠직]"
10027020-109 = "1;타카네;09;평론에는 형식이 필요한 법이거든요? 다른 사람들이 보지 못한 관점을 짚어, 작품의 새로운 가치를 발견하는 것이 평론이죠. 그 정도는 슬슬 이해하세요!"
10027020-110 = "5;메루;00;헹! 창작자 없이는 평론가도 없는 법이라고!"
10027020-111 = "1;타카네;10;좋은 평론은 작품을 더욱 빛나게 한다고요! 독자가 없는 작품이라는 게 존재할 수 있나요?\n#1;em;[?]"

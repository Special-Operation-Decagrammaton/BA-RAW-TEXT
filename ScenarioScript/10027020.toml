10027020-124 = "1;타카네;07;사정은 잘 알았어요. 선생님. "
10027020-125 = "1;타카네;03;선생님께서 왜 저런 식으로 사회성은 요만큼도 없는 데다, 밖으로 나온 것조차 신기하기 짝이 없는 생물을 도우려고 하는 것인지도 말이죠.\n#1;em;[음표]"
10027020-126 = "5;메루;05;이젠 야생동물 취급이냐……."
10027020-127 = "1;타카네;02;그렇지만 결론부터 말씀드리자면. 선생님.\n#1;em;[반응]"
10027020-128 = "1;타카네;99;……<루나>의 완결권인 22권에는 굉장히 복잡한 사정이 얽혀 있어요. "
10027020-129 = "1;타카네;99;적어도 어느 누구 씨가 찾아야지. 라고 마음먹었다고 바로 찾을 수 있는 물건은 아니지요.\n#1;em;…"
10027020-130 = "5;메루;02;무슨 뜬구름 잡는 소리를 하는 거야? \n#5;em;[?]"
10027020-131 = "5;메루;00;그리고, 조금 전부터 <루나>에 대해 뭔가 잘 알고 있다는 듯이 구는데. 혹시 너도 <루나> 수집 중이야? 그래서 우리를 견제하는 거고?"
10027020-132 = "1;타카네;05;질문을 한 번에 몰아서 하지 마세요. 대화에는 순번이 있다는 것도 모르시나요?\n#1;em;[!]"

10027020-89 = "1;타카네;10;일단 알고 있느냐, 알고 있지 않느냐로 물으신다면, 그거야 당연히 알고 있답니다.\n#1;greeting"
10027020-90 = "1;타카네;12;단지, 선생님과…… 메루리 씨가, <루나>에 대해 관심을 보이는 이유가 갑자기 궁금해지는군요.\n#1;em;…"

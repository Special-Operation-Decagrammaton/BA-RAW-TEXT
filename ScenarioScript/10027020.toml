[translation]
10027020-1 = "ตอนที่ 2;เล่มสุดท้าย"
10027020-3 = "เหอะ... ทำไมต้องมาเจออะไรแบบนี้ที่นี่ด้วย..."
10027020-4 = "เรียกคนอื่นว่า 'อะไรแบบนี้' เหรอคะเนี่ย ใช้คำได้สมกับที่มีฉายาเป็นนักวาดชื่อดังที่ตั้งขึ้นเองเลยนะคะ คุณเมรูริ ถ้าหากมันจำเป็นจะต้องใช้ เอาไว้คราวหน้าฉันให้พจนานุกรมเป็นของขวัญดีไหมคะ?"
10027020-5 = "มะ... ไม่ต้องใช้หรอก! ถ้าได้พจนานุกรมจากเธอ ตอนกลางคืนความน่ากลัวคงได้คืบคลานเข้ามาใน#nความฝันของฉันกันพอดี..."
10027020-6 = "เจ้าบทเจ้ากลอนดีจัง เป็นการล้อเล่นที่ใช้คำมาตรฐานสูงสำหรับคุณเมรูริเลยนะคะ ให้ฉันชมให้เอาไหมคะ?"
10027020-7 = "ไม่ต้องเลย! พอใช้คำว่า 'ชม' เพื่อจะสื่อถึงความสัมพันธ์แบบผู้อาวุโสกับผู้น้อยเบาๆ แบบนั้นมันก็เข้า#nกับเธอเลยนะ!"
10027020-8 = "ตายจริง อ่านใจฉันออกด้วย เดี๋ยวนี้ความสามารถในการอ่านสถานการณ์ดีขึ้นนะคะเนี่ย "
10027020-10 = "......!"
10027020-11 = "......!"
10027020-17 = "[ns1] \"เอาละๆ พอกันได้แล้วละทั้งสองคน\"\n[ns2] \"เถียงกันไปก็ไม่มีอะไรดีขึ้นนะทุกคน\""
10027020-20 = "ท่านนี้คือ...?"
10027020-21 = "หืม~? เป็นงั้นเองหรอกเหรอ~? คุณทาคาเนะยังไม่เคยเจอเหรอเนี่ย~? ถ้างั้นก็ช่วยไม่ได้สินะ! ฉันคงต้องเป็นฝ่ายแนะนำให้เองแล้ว!"
10027020-22 = "อะ... อื้ม...! นี่ฉันต้องมาให้คุณแนะนำให้เหรอคะเนี่ย แบบนี้ก็เสียศักดิ์ศรีน่ะสิ...!"
10027020-23 = "ตะ... แต่ว่า...! จะไปขอให้คนที่เพิ่งเจอกันเป็นครั้งแรกแนะนำตัวเองให้ฟังมันก็จะดูไม่ดี...!"
10027020-24 = "ใช่มั้ยล่ะ~? ใช่ม้า~? เฮ้อ ถ้ายอมคุกเข่าลงแล้วบีบน้ำตาขอให้ยกโทษเรื่องที่ทำตัวอวดดีและไม่มี#nมารยาททุกอย่างที่ผ่านมาละก็ ฉันก็อาจยกโทษให้หมดเลยก็ได้นะ~"
10027020-29 = "ให้มันน้อยๆ หน่อยเถอะค่ะ!"
10027020-37 = "ตะ... ตกใจหมดเลย!! อยู่ดีๆ ก็มายิงปืนใส่เท้ากันเนี่ย! แก้นิสัยนั้นสักทีเถอะ! แถมยังพูดประชดประชัน#nไปซะทุกเรื่องอีก เธอกับฉันนี่มันไม่มีทางจะญาติดีกันได้จริงๆ!"
10027020-38 = "ตายจริง คุณเมรูริเองก็เหมือนกันไม่ใช่เหรอคะ ที่ต่อให้เข้าร่วมงานของชมรมแต่คุณก็พูดคุยกับนักวาด#nคนอื่นๆ ไม่ได้ แถมยังแสร้งทำเป็นเข้มแข็งอยู่คนเดียวอีก"
10027020-39 = "ฉันขอพูดบ้างแล้วกัน! ถึงที่เธอพูดมามันจะจริงก็เถอะ แต่ว่า...!"
10027020-45 = "[ns3] \"นี่ๆ~\"\n[ns4] \"นี่ครูถูกลืมไปแล้วหรือเปล่า~?\""
10027020-48 = "อ๊ะ"
10027020-49 = "อุ๊ย"
10027020-50 = "อะ... อืม นั่นสินะ คนคนนี้ก็คือ..."
10027020-59 = "ตายจริง ตายแล้วๆๆ"
10027020-60 = "ดีใจที่ได้เจอนะคะ คุณครู ฉันเคยแต่ได้ยินกิตติศัพท์ของคุณครูผ่านคนอื่นมา ไม่คิดเลยค่ะว่าจะได้เจอ#nตัวจริงเสียงจริง นี่มันฝันที่ไม่กล้าฝันชัดๆ"
10027020-61 = "ฉันชื่อว่ามิโยชิ ทาคาเนะค่ะ ฉันอยู่ชมรมสื่อสิ่งพิมพ์ เป็นคนเขียนบทวิจารณ์ผลงานต่างๆ ของเรดวินเทอร์ลงใน <เรดแบร์> ค่ะ"
10027020-62 = "[s] \"ชมรมสื่อสิ่งพิมพ์...?\""
10027020-63 = "ใช่ค่ะ ชมรมของเราเป็นชมรมของนักเรียนที่ทุ่มเทในงานตีพิมพ์ประเภทต่างๆ ในเรดวินเทอร์ รวมถึงงานที่เกี่ยวกับผู้เขียนด้วยค่ะ"
10027020-64 = "ฉันก็ไม่ได้อยากจะโม้หรอกนะคะ แต่ในฐานะนักวิจารณ์คนหนึ่ง ตอนนี้ฉันกำลังอ่านและวิจารณ์หนังสือ#nทั้งหมดที่ตีพิมพ์ในเรดวินเทอร์อยู่ค่ะ"
10027020-65 = "ไหนว่าไม่ได้โม้ ที่พูดอยู่นี่ละที่เรียกว่าโม้..."
10027020-66 = "ฮุฮุ ไว้ถ้ามีโอกาสก็มาเยี่ยมชมรมสื่อสิ่งพิมพ์ของพวกฉันสักครั้งนะคะ"
10027020-67 = "ทำเป็นเมินที่ฉันพูดเหรอ! แต่ก็ช่างเถอะ ยังไงซะตอนนี้ฉันก็เป็นฝ่ายที่มีนัดกับครูก่อน!"
10027020-68 = "เป็นเรื่องที่ไม่ได้พบเจอได้ง่ายๆ เลยนะคะ ฉันเคยคิดว่าต่อให้โลกจะแตก แต่คุณเมรูริก็คงเลือกที่จะ#nเก็บตัวอยู่แต่ในห้องทำงานเสียอีก นึกไม่ถึงเลยนะคะว่าจะมาข้างนอกด้วยตัวเองแบบนี้"
10027020-69 = "เอ่อ... ก็... บางครั้งฉันก็ออกมาสำรวจหน้างานบ้างน่ะ..."
10027020-70 = "ใช้คำพูดได้น่าสนใจอีกแล้วนะคะ ปกติงานแบบนี้จะไม่ไปขอร้องให้คนที่อยู่ด้วยกันทำแทนให้หรอก#nเหรอคะ...?"
10027020-71 = "ตายจริง จะว่าไป ฉันไม่เห็นเธอเลยนะคะ "
10027020-73 = "คุณโมมิจิอยู่ไหนเหรอคะ?"
10027020-74 = "หืม...? คะ... คือว่า...! ตอนนี้ไปอยู่ที่อื่นน่ะ..."
10027020-76 = "...หืม? ฟังดูแปลกๆ นะคะ คุณมาถึงร้านหนังสือมือสองแบบนี้ แต่คุณโมมิจิไม่มาด้วย แบบนี้มันผิดปกติ#nนะคะ"
10027020-77 = "......"
10027020-78 = "มีเรื่องอะไรกันเหรอคะคุณเมรูริ? ปกติคุณจะหน้าไม่อาย ทั้งยังโวยวายเสียงดัง แต่วันนี้คุณดูห่างไกล#nกับเวอร์ชันนั้นมากเลยนะคะ?"
10027020-79 = "อ้อ นี่ไม่ใช่ว่าฉันเป็นห่วงคุณหรอกนะคะ ฉันก็แค่คิดถึงคุณเท่าๆ ปลายเล็บของนกฮัมมิงเบิร์ดก็เท่านั้น#nเองค่ะ แต่ขอบคุณฉันด้วยก็ดีนะคะ"
10027020-80 = "ไม่สิ ไม่ต้องขอบคุณฉันดีกว่าค่ะ แบบนั้นจะอารมณ์เสียซะเปล่าๆ"
10027020-81 = "จะเอาแบบไหนก็เลือกมาสักทางเถอะ! น่ารำคาญจริงๆ..."
10027020-82 = "[s5] \"หนังสือที่ตีพิมพ์ในเรดวินเทอร์น่ะ\"\n[s6] \"เห็นบอกว่าอ่านมาหมดแล้วใช่ไหม?\""
10027020-85 = "ใช่ค่ะ และฉันขอบอกอีกครั้งนะคะว่าฉันไม่ได้โม้"
10027020-86 = "ไม่ได้โม้งั้นเหรอ? แล้วจะให้เรียกว่าอะไรล่ะ..."
10027020-87 = "[s] \"ถ้างั้น... ก็รู้จัก <ลูน่า> ด้วยไหม?\""
10027020-88 = "<ลูน่า> งั้นเหรอคะ...?"
10027020-89 = "ถ้าถามแค่ว่ารู้จักไหม ฉันก็คงต้องตอบว่ารู้จักค่ะ"
10027020-90 = "แต่ว่าอยู่ๆ ก็สงสัยขึ้นมาเลยนะคะว่าทำไมคุณครู... กับคุณเมรูริถึงได้สนใจใน <ลูน่า> ขึ้นมา"
10027020-91 = "[s] \"พวกเรากำลังหาเล่มสุดท้ายของ <ลูน่า> อยู่น่ะ\""
10027020-93 = "กำลังหา <ลูน่า> เหรอคะ? แล้วก็หาเล่มสุดท้ายด้วย...?"
10027020-103 = "...เพราะแบบนี้สินะ คุณโมมิจิก็เลยออกจากห้องสมุดและไปซ่อนตัวอยู่ที่ไหนสักแห่ง..."
10027020-104 = "......"
10027020-105 = "ฉันคิดไว้แล้วละค่ะ ว่าสักวันหนึ่งมันจะต้องเกิดเรื่องแบบนี้ คุณเมรูริ"
10027020-106 = "อะ... อะไรเล่า!"
10027020-107 = "ลองย้อนไปมองถึงความมีชื่อเสียงของคุณดูสิคะ ที่จริงฉันค่อนข้างแปลกใจเสียด้วยซ้ำค่ะที่เรื่องนี้มัน#nเพิ่งจะมาเกิดขึ้นเอาป่านนี้"
10027020-108 = "ชื่อเสียงงั้นเหรอ! พูดได้ดีเลย! เธอเองก็เหมือนกันไม่ใช่รึไง! เอาแต่วิจารณ์ด้วยคำพูดยากๆ แล้วก็เขียน#nวกไปวนมาจนไม่มีใครอ่านแล้วเข้าใจน่ะ!"
10027020-109 = "จะวิจารณ์ทั้งทีมันก็ต้องมีรูปแบบนี่คะ? การวิจารณ์คือการค้นพบคุณค่าใหม่ในงานเขียนโดยพิจารณา#nจากมุมมองที่คนอื่นมองไม่เห็นไงคะ คุณเองก็รู้เรื่องพวกนั้นไว้บ้างเถอะค่ะ!"
10027020-110 = "เหอะ! ถ้าไม่มีคนสร้างผลงาน ก็ไม่มีนักวิจารณ์หรอกนะ!"
10027020-111 = "การวิจารณ์ที่ดียิ่งจะทำให้งานเขียนนั้นมีคุณค่านะคะ! มีผลงานอะไรที่ไม่มีผู้อ่านบ้างไหมล่ะคะ?"
10027020-113 = "มันก็มีเกลื่อนเรดวินเทอร์เลยไม่ใช่รึไง? อย่างเช่นงานเขียนโฆษณาประธานเชริโน่ไง!"
10027020-114 = "มันก็ใช่อยู่หรอกค่ะ!"
10027020-119 = "[ns7] \"เอาละๆ หยุดก่อน หยุดทั้งคู่เลย\"\n[ns8] \"ครูอยากคุยเรื่อง <ลูน่า> เล่มสุดท้ายมากกว่า\""
10027020-122 = "อ่า... จริงสิ..."
10027020-123 = "......"
10027020-124 = "ฉันเข้าใจสถานการณ์ของคุณครูดีค่ะ "
10027020-125 = "เข้าใจว่าทำไมคุณครูถึงพยายามช่วยเหลือสิ่งมีชีวิตที่ไม่มีสังคมเลยแม้แต่น้อย ซ้ำยังเกลียดการออกมา#nข้างนอกอย่างหาใครเปรียบเทียบเป็นไม่มีอีก"
10027020-126 = "ทีนี้จะเปรียบฉันเป็นสัตว์ป่าเหรอ..."
10027020-127 = "แต่คุณครูคะ ถ้าจะให้ฉันสรุปเลยละก็"
10027020-128 = "... <ลูน่า> เล่ม 22 ที่เป็นเล่มจบบริบูรณ์มีสถานการณ์ที่ซับซ้อนมากเลยค่ะ "
10027020-129 = "อย่างน้อยก็ไม่ใช่สิ่งที่หาได้ง่ายๆ มันไม่ใช่แค่คิดว่าต้องให้ใครสักคนไปหาให้เจอค่ะ"
10027020-130 = "พูดอะไรเข้าใจยากอีกแล้ว "
10027020-131 = "อีกอย่าง เธอพูดเหมือนรู้อะไรเกี่ยวกับ <ลูน่า> เป็นอย่างดีตั้งแต่เมื่อกี้แล้วด้วย หรือว่าตอนนี้เธอก็กำลัง#nรวบรวม <ลูน่า> อยู่? ก็เลยตั้งใจว่าจะมาขัดขวางพวกเราสินะ?"
10027020-132 = "ช่วยถามทีละคำถามสิคะ คุณไม่รู้หรอกเหรอคะว่าการจะสนทนามันต้องมีลำดับขั้นตอนด้วย?"
10027020-133 = "......"
10027020-134 = "จากนี้ฉันขอเป็นฝ่ายพูดให้คุณเมรูริฟังนะคะ"
10027020-135 = "ลองไปที่ชมรมสื่อสิ่งพิมพ์ดูสิคะ "
10027020-136 = "หืม? ชมรมสื่อสิ่งพิมพ์? ให้ไปที่นั่นทำไม?"
10027020-137 = "ก็เพราะว่ามันมีร่องรอยของ <ลูน่า> เล่ม 22 หลงเหลืออยู่ที่นั่นยังไงล่ะคะ"
10027020-138 = "ถ้าคุณกำลังตามหาเล่ม 22 อย่างจริงจังเพื่อใครสักคนแล้วละก็... "
10027020-139 = "ก็อาจจะเข้าถึง... ได้นะคะ"
10027020-140 = "หืม...?"
10027020-142 = "ถ้าอย่างนั้นฉันขอตัวก่อน ถ้ามีโอกาสไว้เจอกันใหม่นะคะ คุณครู [USERNAME]"
10027020-143 = "...ขอเจอแบบไม่มีคุณเมรูรินะคะ"
10027020-144 = "อย่าให้ฉันได้พูดบ้างนะ!"
10027020-150 = "ดะ... เดี๋ยวก่อนสิ!!"

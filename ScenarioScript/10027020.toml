[translation]
10027020-1 = "Part 2; The Final Volume"
10027020-3 = "Ugh... This jerk."
10027020-4 = "Ah... Childish namecalling from a self-proclaimed author. How...predictable. Perhaps you should consult a thesaurus the next time you attempt to insult me, Meruri. You might be more successful."
10027020-5 = "I-I don't need one! Besides, any thesaurus you think is good would probably give me nightmares."
10027020-6 = "That was a classy joke for you, Meruri. Perhaps, just this once, I'll deign to give you a compliment."
10027020-7 = "You'll deign, will you? You know, those high-credit words make you sound more snooty than sophisticated."
10027020-8 = "Ah! So you CAN read between the lines! Very good! I was worried you wouldn't understand. "
10027020-10 = "...!"
10027020-11 = "...!"
10027020-17 = "[ns1] \"Okay, that's enough—both of you.\"\n[ns2] \"All this sniping isn't healthy.\""
10027020-20 = "And who might this be?"
10027020-21 = "Ah, that's right. This is your first time meeting Takane. Why don't I introduce you?"
10027020-22 = "It's such a shame that YOU'd be the one to introduce us."
10027020-23 = "However, I can't very well ask you to introduce yourself. Such impropriety is beneath me."
10027020-24 = "Is it? In that case, I'd be perfectly happy to let you get down on your knees and tearfully beg us to forgive your arrogance."
10027020-29 = "You've gone too far!"
10027020-37 = "Q-Quit that! You can't just shoot at people every time you get mad! You know, this is why no one likes you. Well, that and nobody wants to be friends with a sarcastic know-it-all. "
10027020-38 = "Meruri...honey...you're no different than I am. You, the fledgling author who finally joined a club event only to be ignored by everyone involved. You had to pretend you didn't care just to save face."
10027020-39 = "I'm warning you! If you say one more word—"
10027020-45 = "[ns3] \"Eh-HEM!\"\n[ns4] \"Aren't you two forgetting something?\" "
10027020-48 = "Oh."
10027020-49 = "Oh, my."
10027020-50 = "Right... This is..."
10027020-59 = "My, oh, my..."
10027020-60 = "I'm positively delighted to finally meet you, Sensei. I've heard so much about you."
10027020-61 = "My name is Miyoshi Takane. I work in Red Winter's Publishing Department, writing reviews about new works for the 'Red Bear'."
10027020-62 = "[s] \"Publishing Department...?\""
10027020-63 = "Yes. It's an exclusive club for students at Red Winter who wish to dedicate themselves to the fields of writing and publication."
10027020-64 = "Not to boast, but I'm proud to share that, as a reviewer, I have read and reviewed every book published out of Red Winter."
10027020-65 = "And yet, you boast..."
10027020-66 = "Heehee! Next time you have a moment, you should stop by the Publishing Department."
10027020-67 = "Don't you dare invite Sensei and ignore me. I have first dibs!"
10027020-68 = "Curious... I assumed you were so determined to remain a recluse that you would never crawl out of your den. But here you are."
10027020-69 = "You— I— There's such a thing as site visits, you know!"
10027020-70 = "Isn't that something you usally ask your assistant to do for you?"
10027020-71 = "Ah, but I don't see her right now.  "
10027020-73 = "Tell me, where is Momiji?"
10027020-74 = "Uh... Th-That's... She had other engagements today!"
10027020-76 = "Since when are the two of you apart? You're together so often, I started to think you were joined at the hip."
10027020-77 = "..."
10027020-78 = "What's wrong, Meruri? You're uncharacteristically silent all of a sudden. Where are your signature brash retorts?"
10027020-79 = "If I'm being completely honest, I'm a touch concerned. You should be grateful that I care."
10027020-80 = "On second thought, don't thank me. I'd rather not see you grovel. "
10027020-81 = "Just commit to one mood or the other! This flip-flopping is tiresome."
10027020-82 = "[s5] \"The books that come out of Red Winter...\"\n[s6] \"You said you've read them all?\""
10027020-85 = "Yes. But again, I don't mean to brag."
10027020-86 = "This is what it's like when you're NOT bragging?"
10027020-87 = "[s] \"Does that mean you're familiar with 'Luna'?\""
10027020-88 = "\"Luna\"...?"
10027020-89 = "Yes, I'm familiar with the work."
10027020-90 = "Why are you and Meruri so interested in it?"
10027020-91 = "[s] \"We're looking for the final volume.\""
10027020-93 = "The infamous final volume of \"Luna\"?"
10027020-103 = "I see. And right when Momiji is nowhere to be found..."
10027020-104 = "..."
10027020-105 = "Well, it pains me to be right, but I knew this would happen someday, Meruri."
10027020-106 = "Wh-What?!"
10027020-107 = "You heard me. Look at how you conduct your personal affairs. Honestly, I'm surprised it didn't happen sooner."
10027020-108 = "YOU have the audacity to criticize MY personal life?! You, who criticizes everything and everyone and talks in circles, so no one can understand you?!"
10027020-109 = "I'll have you know that criticism is an art form. I see perspectives others can't. I shine a light on otherwise unappreciated works. It's high time you understood that!"
10027020-110 = "Tch! Critics like you would be nowhere without creators like me!"
10027020-111 = "Nonsense. A good review makes a work of art shine! What would a good novel be without someone to read it?"
10027020-113 = "That's a bunch of Red Winter nonsense on par with President Cherino's propaganda!"
10027020-114 = "Nonsense or not, it's true!"
10027020-119 = "[ns7] \"Okay, okay, that's enough!\"\n[ns8] \"Can we get back to the last volume of 'Luna'?\" "
10027020-122 = "Ah, right..."
10027020-123 = "..."
10027020-124 = "I understand your situation, Sensei. "
10027020-125 = "Though I don't know why you're determined to help such an anti-social creature."
10027020-126 = "Now you're comparing me to a wild animal?!"
10027020-127 = "Here's the bottom line, Sensei."
10027020-128 = "The final volume of \"Luna\", Volume 22, has a very complicated history. "
10027020-129 = "It won't simply turn up just because you're dead set on finding it."
10027020-130 = "What the heck does that mean?! "
10027020-131 = "You know what? You seem to know a lot about \"Luna\". I bet you're looking for it too, and you're trying to throw us off the scent! Ha! That's it, isn't it?!"
10027020-132 = "Stop asking a bunch of questions at once. Didn't anyone ever teach you how to hold a conversation?"
10027020-133 = "..."
10027020-134 = "Now, I'm about to give you important instructions, Meruri."
10027020-135 = "Visit the Publishing Department.  "
10027020-136 = "Huh? Why there?"
10027020-137 = "Because there is a clue to finding \"Luna\" Volume 22 there."
10027020-138 = "If you want to find Volume 22... "
10027020-139 = "This is how you do it."
10027020-140 = "Wait. What?"
10027020-142 = "I'll be going now. I do hope I have another opportunity to see you, [USERNAME] Sensei."
10027020-143 = "...without Meruri around."
10027020-144 = "That's the last straw, you—"
10027020-150 = "Hey, w-wait! WAIT!"

10027020-1 = "#title;제2화;마지막 한 권"
10027020-2 = "1;타카네 실루엣;01\n5;메루;05\n#1;h\n#5;h\n#1;a\n#5;a"
10027020-3 = "5;메루;05;으엑……. 하필 여기에서 이런 거랑…….\n#5;em;[속상함]"
10027020-4 = "1;타카네 실루엣;05;사람을 가리켜 '이런 거'라고 표현하시다니, 자칭 인기 작가 메루리 씨 다운 어휘 활용이네요. 필요하다면 다음에 단어 사전이라도 선물해 드릴까요?\n#1;em;[!]"
10027020-5 = "5;메루;04;피, 필요 없어! 무엇보다 네 사전을 받으면 밤에 꿈자리가 사나울 것 같단 말이야…….\n#5;stiff"
10027020-6 = "1;타카네 실루엣;03;메루리 씨 치고는 수준 높은 농담이었어요. 치하해 드릴까요?\n#1;em;[반짝]"
10027020-7 = "5;메루;05;됐거든! 거기서 굳이 '치하'라는 표현을 써서 은근슬쩍 상하관계를 집어넣는 게 너 답긴 하네!\n#5;em;[빠직]"
10027020-8 = "1;타카네 실루엣;05;어머. 그 부분을 읽어내시다니 분위기를 읽는 능력이 많이 늘었군요. "

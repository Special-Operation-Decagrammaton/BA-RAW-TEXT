10027020-59 = "3;타카네 실루엣;04;어머. 어머, 어머, 어머.\n#3;stiff\n#3;em;[///]"
10027020-60 = "3;타카네;14;처음 뵙겠습니다. 선생님. 그 말씀으로만 듣던 샬레의 선생님을 직접 뵐 날이 올 줄은, 정말이지 꿈에서도 생각하지 못했기에.\n#3;greeting"
10027020-61 = "3;타카네;03;저는 미요시 타카네라고 합니다. 출판부에 소속되어, 붉은겨울에서 출판되는 여러 작품들의 평론을 <붉은 곰>에 기고하고 있죠.\n#3;em;[반짝]"
10027020-62 = "[s] \"출판부……?\""
10027020-63 = "3;타카네;07;네. 붉은겨울에서 이루어지는 각종 출판 활동, 저자 활동 등, 다양한 활동에 힘쓰는 학생들이 소속되어 있는 동아리랍니다."
10027020-64 = "3;타카네;10;자랑은 아닙니다만, 저 또한 한 명의 평론가로서, 붉은겨울에서 출간되는 책들을 전부 읽어보며 평론을 하고 있답니다."
10027020-65 = "5;메루;05;자랑이 아니라면서 자랑은 다 하고 있잖아…….\n#5;al\n#5;em;[빠직]\n#3;m1"
10027020-66 = "3;타카네;08;후후, 다음에 시간이 되신다면 한 번 저희 출판부에도 들러주시길.\n#3;em;[음표]"
10027020-67 = "5;메루;05;무시하는 거냐! 그렇다고 할까, 일단 이 자리에서 선생과 선약이 있는 건 내 쪽인데?!\n#5;em;[스팀]\n#5;hophop"
10027020-68 = "3;타카네;02;그것참 드문 일이군요. 세상이 두 쪽 나도 작업실에 틀어박히기를 선택하는 것이 메루리 씨라고 생각했는데, 이렇게 몸소 여기까지 발걸음을 내딛다니요."
10027020-69 = "5;메루;04;어…… 뭐, 나도 가끔은 현장 시찰이라고 할까, 그런 거 한다고…….\n#5;em;[속상함]"
10027020-70 = "3;타카네;03;그것도 재미있는 말이로군요. 보통 그런 일은 함께 계시는 분에게 부탁하시지 않으신지……?"
10027020-71 = "3;타카네;02;어머. 그런데 정작 그분이 보이지 않는군요. \n#3;em;[반응]"
10027020-72 = "#all;hide"
10027020-73 = "3;타카네;11;모미지 씨는 어디에 계시죠?\n#3;closeup\n#3;em;[?]"
10027020-74 = "3;메루;07;어……? 그, 그게……! 지금은 조금, 다른 곳에 있어……\n#3;closeup\n#3;em;[땀]"
10027020-75 = "#all;hide"
10027020-76 = "5;메루;07\n1;타카네;16;……흐음? 그건 이상하네요. 다른 곳도 아닌 이곳에 당신이 와 있는데, 모미지 씨가 같이 오지 않는 것은 비상식적인 일이예요."
10027020-77 = "5;메루;09;…….\n#5;em;…"
10027020-78 = "1;타카네;02;어떻게 된 거죠, 메루리 씨? 평소 뻔뻔함이 지나쳐서 시끄럽기까지 한 당신의 모습과는 너무나 거리가 있는데요?\n#1;em;[?]"
10027020-79 = "1;타카네;03;아, 이것은 드물게도 제가 당신을, 걱정하는 것은 아니고, 벌새의 발톱 끝만큼이라도 생각해서 한 말이에요. 감사하도록 하세요."
10027020-80 = "1;타카네;16;아뇨. 역시 감사하지 마세요. 그건 어딘가 기분이 나쁘군요. "
10027020-81 = "5;메루;05;둘 중 하나만 하라고! 정말이지 귀찮다니까…….\n#5;em;[빠직]"
10027020-82 = "[s5] \"있잖아. 붉은겨울에서 나오는 책은\"\n[s6] \"전부 읽어 봤다고 했지?\""

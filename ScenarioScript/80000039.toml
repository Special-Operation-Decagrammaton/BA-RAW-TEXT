80000039-74 = "3;후우카;99\n#3;greeting\n#wait;1500"
80000039-75 = "#wait;2500"
80000039-76 = "[ns] \"이건 코코아……?\""
80000039-77 = "3;후우카;03;네. 밥도 든든하게 먹었으니, 이건 저의 발렌타인 데이 선물……이에요.\n#3;em;[///]\n#3;m3"
80000039-78 = "3;후우카;99;저희 급양부가 직접 밭에서 채취한 카카오를 가공해 만든 초콜릿 가루……. 그걸로 탄 코코아니까.\n#3;greeting"
80000039-79 = "3;후우카;01;그게 저……. 앞에서 제가 너무 막무가내로 이야기하긴 했지만, 오늘은 그래도 발렌타인 데이잖아요?"
80000039-80 = "3;후우카;00;후후, 따듯할 때 드셔 주세요. 잠이 잘 올 거예요.\n#3;em;[음표]"
80000039-81 = "[s] \"후우카 땅! 사랑해!\""
80000039-82 = "3;후우카;02;네, 넷?! 사, 사랑?! 저, 저기…… 선생님?!\n#3;em;[///]\n#3;stiff"
80000039-83 = "[s] \"아, 근데 이 머그컵 두 개. 디자인이 같네.\""
80000039-84 = "3;후우카;02;……!! 앗! 그게, 이건 특별한 의미나 의도가 있는 게 아니라……!\n#3;em;[!]\n#3;jump"
80000039-85 = "3;후우카;06;어, 어디까지나 급양부 부실에서 남는 걸 가져왔다고 할까…….\n#3;stiff"
80000039-86 = "3;후우카;04;우, 우와앙. 저, 머, 먼저 실례할게요!\n#3;em;[땀]\n#3;hophop\n#fontsize;80"

[translation]
80000039-1 = "在特別的日子裡獻上特別的心意"
80000039-2 = "夏萊．休息室"
80000039-3 = "（在夏萊的休息室休息時……）"
80000039-4 = "[s]「稍微告一段落了，剩下的就改天……」"
80000039-5 = "（做不完的事讓人累得連吃飯的力氣都沒有，#n　就在向便利商店買來的巧克力伸出手的瞬間）"
80000039-9 = "[ns]「請進。」"
80000039-10 = "啊，是我。我是風華，老師。"
80000039-11 = "[s]「風華？」"
80000039-15 = "老，老師好。"
80000039-16 = "[s]「今天來有什麼事？」"
80000039-17 = "那個……老師吃過飯了嗎？"
80000039-18 = "啊，還沒是嗎。"
80000039-19 = "……老師手上拿著的是？"
80000039-20 = "[s]「是巧克力。」"
80000039-21 = "你說是自己在便利商店買的？"
80000039-22 = "……這樣可不行！"
80000039-23 = "我就知道可能會有這種狀況，來找老師果然是對的！！"
80000039-24 = "[s]「那個……？」"
80000039-25 = "打擾了！"
80000039-31 = "盒子放這裡，"
80000039-35 = "這個和那個就……"
80000039-39 = "好，這樣就OK了！"
80000039-40 = "[s]「這些是……」"
80000039-41 = "是我做的便當。"
80000039-42 = "老師平時工作這麼忙碌，我擔心老師是不是又沒有好好吃飯。"
80000039-43 = "就算今天是情人節，老師居然想用巧克力代替正餐……！"
80000039-44 = "還是就因為是情人節嗎？打算一天三餐都吃巧克力之類的……？"
80000039-45 = "[s]「那倒不至於……」"
80000039-46 = "那我就放心了。就算今天是特別的日子，吃太多甜的東西對健康不好唷。"
80000039-47 = "我沒辦法視而不見！"
80000039-48 = "[s]「對，對不起……」"
80000039-49 = "不過今天來的原因不止這個……"
80000039-50 = "最近每次看到老師都覺得老師的身體狀況好像不太好……"
80000039-51 = "之前有和老師說過對吧？"
80000039-52 = "要是想吃我做的料理，隨時都可以告訴我。"
80000039-53 = "所，所以我今天才會過來！"
80000039-54 = "只要吃下好吃的食物回復體力，大部分的事都會有辦法解決的。"
80000039-55 = "來，老師請用吧？"
80000039-56 = "[s]「謝謝你，風華。」"
80000039-57 = "不客氣。身為供給部部長，這是我應該做的。"
80000039-58 = "[s]「來都來了，要不要一起吃？」"
80000039-59 = "咦，我，我也一起吃嗎……？"
80000039-60 = "兩人獨自，隔著餐桌面對面地……？"
80000039-61 = "好，好的！老，老師不介意的話……"
80000039-67 = "（就這樣和風華兩人一起吃了飯）"
80000039-69 = "[ns]「感謝招待，非常好吃。」"
80000039-70 = "呵呵。有合老師的口味真是太好了。"
80000039-71 = "啊，還有這個……"
80000039-76 = "[ns]「這是，可可亞……？」"
80000039-77 = "是的……這是我給老師的……情人節禮物。"
80000039-78 = "這是用供給部菜園裡採的可可果加工而成的巧克力……泡成的可可亞。"
80000039-79 = "那個，雖然剛才也說過今天是情人節……"
80000039-80 = "請老師趁熱喝吧。這樣今晚應該能睡個好覺。"
80000039-81 = "[s]「風華……！」"
80000039-82 = "怎，怎麼突然哭了……！？你，你還好嗎老師！？"
80000039-83 = "[s]「謝謝你……啊，話說這兩個馬克杯是一對的嗎？」"
80000039-84 = "那，那個是！沒有什麼特別的意義……！"
80000039-85 = "我，我只是隨手把供給部的杯子拿來而已……"
80000039-86 = "那個，今天就先告辭了！"
80000039-90 = "[ns]「風華……！？」"
80000039-94 = "對了，剩下的小菜請放進盒子冰到冰箱喔！盒子我之後會再來拿的！"
80000039-95 = "那麼再見……！"
80000039-99 = "[ns]「嗯，嗯，謝謝……」"
80000039-101 = "（就這樣一邊被慌忙（？）離去的風華殘留的溫暖給療癒，一邊喝著熱可可）"
80000039-103 = "[ns]「好暖好甜……」"

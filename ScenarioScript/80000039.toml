[translation]
80000039-1 = "#title;특별한 날엔 특별한 마음을"
80000039-2 = "#place;샬레의 휴게실."
80000039-3 = "#na;(잠시나마 샬레의 휴게실에서 쉬고 있을 무렵.)"
80000039-4 = "[s] \"쌓인 일은…… 또 언제 끝내지…….\""
80000039-5 = "#na;(수많은 걱정거리와 업무에 지쳐 밥을 먹을 기력도 나지 않아, 대충 편의점에서 사 온 초콜릿을 먹으려던 찰나였다.)"
80000039-6 = "#st;[0,0];instant;1;"
80000039-7 = "#clearST"
80000039-8 = "#wait;1500"
80000039-9 = "[ns] \"누구세요?\""
80000039-10 = "#na;???;아, 저, 후우카예요. 선생님."
80000039-11 = "[s] \"앗, 후, 후우카?! 잠깐만 기다려줘!\""
80000039-12 = "#st;[0,0];instant;1;"
80000039-13 = "#clearST"
80000039-14 = "#wait;1500"
80000039-15 = "3;후우카;01;아, 안녕하세요.\n#3;em;[반짝]\n#3;greeting\n#3;a"
80000039-16 = "[s] \"후우카가 여긴 왜…….\""
80000039-17 = "3;후우카;00;그게, 다름이 아니라……. 선생님. 혹시 식사는 하셨나요?\n#3;em;[///]"
80000039-18 = "3;후우카;02;아, 아직이신가요? 그런데……."
80000039-19 = "3;후우카;05;손에 들고 계신 그건 뭔가요?\n#3;em;[반응]"
80000039-20 = "[s] \"초콜릿입니다.\""
80000039-21 = "3;후우카;06;발렌타인 데이 기념으로, 요 앞에 엔젤 편의점에서 사 온 초콜릿이라고요?\n#3;em;[...]"
80000039-22 = "3;후우카;08;아뇨! 그래선 안 돼요! 저, 이럴 줄 알았어요!\n#3;stiff"
80000039-23 = "3;후우카;01;역시 제가 찾아뵙는 게 정답이었던 거네요!\n#3;em;[반짝]"
80000039-24 = "[s] \"으, 응?\""
80000039-25 = "3;후우카;03;잠시 실례할게요!"
80000039-26 = "#st;[0,0];instant;1;"
80000039-27 = "#clearST"
80000039-28 = "3;후우카;01\n#3;m2\n#wait;750"
80000039-29 = "3;후우카;01\n#3;greeting\n#wait;750"
80000039-30 = "3;후우카;01\n#3;m3\n#wait;750"
80000039-31 = "3;후우카;01;이 찬합은 여기에 두고.\n#3;greeting"
80000039-32 = "#st;[0,0];instant;1;"
80000039-33 = "#clearST"
80000039-34 = "3;후우카;01\n#3;m4\n#wait;750"
80000039-35 = "3;후우카;02;가져온 이 보온통은…… 여기면 될까요?\n#3;em;[재잘]\n#3;greeting"
80000039-36 = "#st;[0,0];instant;1;"
80000039-37 = "#clearST"
80000039-38 = "3;후우카;03\n#3;m3\n#wait;1250"
80000039-39 = "3;후우카;03;좋았어. 이것으로 준비 만전이에요!\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
80000039-40 = "[s] \"저기, 이게 다 무엇인지…….\""
80000039-41 = "3;후우카;02;네? 보다시피 제가 직접 만들어온 도시락들인데요?\n#3;em;[?]"
80000039-42 = "3;후우카;06;평소 업무 때문에 무척이나 바쁘신 선생님이니, 오늘도 제대로 식사를 못 하신 게 아닐까 걱정이 되었거든요."
80000039-43 = "3;후우카;05;그런데……. 설마 그걸 넘어서서, 아예 식사를 초콜릿으로 때우려고 하시다니! 아무리 발렌타인 데이라고 해도……!\n#3;em;[속상함]"
80000039-44 = "3;후우카;08;아니, 설마 발렌타인 데이이기 때문인가요?! 삼시 세끼를 초콜릿으로 드시려는, 남몰래 그런 하드한 챌린지를 준비하고 계셨던 건가요……?\n#3;stiff"
80000039-45 = "[s] \"아니, 아무리 그래도 거기까지는…….\""
80000039-46 = "3;후우카;01;그렇죠? 제아무리 오늘이 특별한 날이라고 해도, 너무 단 것만 드시면 건강을 해치시게 될 거예요."
80000039-47 = "3;후우카;05;설사 선생님이 그러고 싶으시다 하셔도 제가 용납할 수 없으니까요. 떽!\n#3;em;[!]\n#3;jump"
80000039-48 = "[s] \"떼……떽……?\""
80000039-49 = "3;후우카;08;오늘 제가 이렇게 찾아온 이유는 식사를 챙겨 드리기 위한 것도 있지만.\n#3;em;[...]"
80000039-50 = "3;후우카;06;그게……. 선생님께서 요즘 들어 특히나 기운이 없어 보이시는 게, 걱정되었다고나 할까……. 그게 또……."
80000039-51 = "3;후우카;02;그. 그래! 그래요! 그렇지 않아도 저번에 말씀드린 적 있었잖아요?\n#3;em;[반응]\n#3;hophop"
80000039-52 = "3;후우카;01;언제라도 집밥이 드시고 싶어지면 얼마든지 절 찾아 달라고……."
80000039-53 = "3;후우카;03;네, 넷! 그런 거예요! 아무튼 그런 이유로 찾아뵈었답니다!\n#3;greeting"
80000039-54 = "3;후우카;02;우선 배를 든든하게 채우고 체력을 비축하면 대부분의 걱정거리는 어떻게든 될 테니까."
80000039-55 = "3;후우카;00;제가 서포트하겠어요! 선생님!\n#3;hophop"
80000039-56 = "[s] \"……응. 고마워. 후우카.\""
80000039-57 = "3;후우카;03;후후. 별말씀을요. 이건 급양부 부장으로서 당연히 해야 할 일인걸요.\n#3;em;[반짝]"
80000039-58 = "[s] \"그럼, 밥, 같이 먹자.\""
80000039-59 = "3;후우카;02;네? 저, 저도요……?\n#3;em;[?]"
80000039-60 = "3;후우카;99;혼자 먹기엔 많은 거 같으니, 식탁에 마주 앉아서 단둘이 식사를…….\n#3;stiff\n#fontsize;55"
80000039-61 = "3;후우카;03;아, 네, 넷! 서, 선생님께서 그렇게까지 말씀하신다면…….\n#3;em;[///]\n#3;greeting"

[translation]
80000039-1 = "A Special Gesture for a Special Day"
80000039-2 = "Schale Lounge"
80000039-3 = "I was taking a break in the Schale lounge."
80000039-4 = "[s] \"How am I going to finish all this work?\""
80000039-5 = "I felt too exhausted and stressed from work to make any food.#nInstead, I was going to snack on some chocolate I bought from#nthe convenience store."
80000039-9 = "[ns] \"Wh-Who's there?\""
80000039-10 = "Oh, it's me, Sensei."
80000039-11 = "[s] \"F-Fuuka?! Wait a second!\""
80000039-15 = "H-Hello."
80000039-16 = "[s] \"What are you doing here, Fuuka?!\""
80000039-17 = "Well, um....I was wondering if you'd eaten yet."
80000039-18 = "You haven't, right? But..."
80000039-19 = "...what's that in your hand?"
80000039-20 = "[s] \"It's chocolate.\""
80000039-21 = "You bought chocolate on sale from the convenience store because it's Valentine's Day, huh?"
80000039-22 = "I knew you would do something like this."
80000039-23 = "It's a good thing I'm here!"
80000039-24 = "[s] \"What do you mean 'something like this'?\""
80000039-25 = "Please wait right there, Sensei."
80000039-31 = "Here's a stacked bento."
80000039-35 = "Can't forget the thermos."
80000039-39 = "Lunch is served!"
80000039-40 = "[s] \"What is all of this for?\""
80000039-41 = "Huh? For you, obviously."
80000039-42 = "I made food for you since I heard you'd been very busy at work recently.#nI had a feeling you were skipping meals."
80000039-43 = "And here I find you skipping meals to eat only chocolate!#nThat's unacceptable, even if it is Valentine's Day!"
80000039-44 = "Was this some silly Valentine's challenge to eat only chocolate today?#nHuh?"
80000039-45 = "[s] \"No, it's not like that...\""
80000039-46 = "Well, you know you shouldn't eat so many sweets even if it's a special day!"
80000039-47 = "I'm not gonna let you ruin your health. Tsk tsk!"
80000039-48 = "[s] \"Did you just 'tsk tsk' me?\""
80000039-49 = "Aside from coming here to make sure you're eating properly..."
80000039-50 = "...well, I also was just plain concerned because you seem so exhausted lately."
80000039-51 = "Have you forgotten my invitation?"
80000039-52 = "I said you could come to me anytime you miss home-cooked food."
80000039-53 = "And that's the reason behind my visit!"
80000039-54 = "You'll never be able to get all your work done without a delicious meal to fuel you."
80000039-55 = "Lean on me a little, okay, Sensei?"
80000039-56 = "[s] \"Thank you, Fuuka.\""
80000039-57 = "Heehee. It's just my responsibility as the School Lunch Club president."
80000039-58 = "[s] \"Will you join me?\""
80000039-59 = "You want me to?"
80000039-60 = "I suppose I overdid myself a little bit. It's a lot for one person."
80000039-61 = "Okay! Let's enjoy this meal together, if that's what you'd like, Sensei."
80000039-67 = "After Fuuka and I enjoyed dinner..."
80000039-69 = "[ns] \"Whew! That was great!\""
80000039-70 = "I'm glad you liked it."
80000039-71 = "And lastly..."
80000039-76 = "[ns] \"Is this cocoa?\""
80000039-77 = "Yes. For dessert, here's your Valentine's Day gift."
80000039-78 = "I collected and processed the chocolate myself to make the cocoa."
80000039-79 = "Like I said before, today is Valentine's Day, so..."
80000039-80 = "Drink it while it's warm. It'll help you relax a little."
80000039-81 = "[s] \"I love you, Fuuka!\""
80000039-82 = "S-Sensei! L-Love?!"
80000039-83 = "[s] \"By the way, these sorta look like couples mugs.\""
80000039-84 = "Th-That's not why I picked them out!"
80000039-85 = "They were just what was left in the School Lunch Club room..."
80000039-86 = "A-Anyway. I-I'm glad you ate well! I have to go!"
80000039-90 = "[ns] \"What's the rush?\""
80000039-94 = "Oh! Don't forget to put whatever is left over in the container and refrigerate it."
80000039-95 = "I-I'll see you later then!"
80000039-99 = "[ns] \"Okay. Bye...\""
80000039-101 = "Fuuka left as quickly as she could. I pondered what could cause her to leave so suddenly as I drank the rest of the hot chocolate."
80000039-103 = "[ns] \"Mmm. It's sweet.\""

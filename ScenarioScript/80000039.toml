[translation]
80000039-1 = "วันพิเศษกับหัวใจดวงพิเศษ"
80000039-2 = "ห้องพักผ่อน ชาเล่ต์"
80000039-3 = "(ขณะคุณครูกำลังพักผ่อนอยู่ในห้องพักที่ชาเล่ต์)"
80000039-4 = "[s] \"งานที่เหลืออยู่... จะเสร็จเมื่อไรกันนะ...\""
80000039-5 = "(คุณครูเดินไปหยิบช็อกโกแลตมากินแทนข้าว เพราะรู้สึกเหนื่อยจากงานจนกินข้าวไม่ลง)"
80000039-9 = "[ns] \"ใครน่ะ?\""
80000039-10 = "อ๊ะ ฟูกะเองค่ะ คุณครู"
80000039-11 = "[s] \"อ๊ะ ฟะ... ฟูกะ?! รอก่อนนะ!\""
80000039-15 = "สะ...สวัสดีค่ะ"
80000039-16 = "[s] \"ฟูกะมาทำอะไรที่นี่เหรอ...\""
80000039-17 = "คุณครู คือว่า... ทานข้าวรึยังคะ?"
80000039-18 = "ยะ...ยังไม่ได้ทานเหรอคะ? ถ้างั้น..."
80000039-19 = "แล้วอันที่ถืออยู่ในมือล่ะคะ?"
80000039-20 = "[s] \"ช็อกโกแลตน่ะ\""
80000039-21 = "วันนี้เป็นวันวาเลนไทน์ เลยซื้อช็อกโกแลตจากร้านสะดวกซื้อข้างหน้านี่มาเหรอคะ?"
80000039-22 = "ไม่ได้นะคะ! ทำแบบนี้ไม่ได้เด็ดขาดค่ะ ฉันคิดแล้วเชียว!"
80000039-23 = "คิดถูกแล้วที่มาหาคุณครูแบบนี้!"
80000039-24 = "[s] \"หืม?\""
80000039-25 = "ขอเสียมารยาทหน่อยนะคะ"
80000039-31 = "ขอวางกล่องข้าวไว้ตรงนี้ก่อน"
80000039-35 = "ส่วนกระติกน้ำร้อนที่เอามา... อืม ขอวางตรงนี้ได้มั้ยคะ?"
80000039-39 = "เอาล่ะ ตอนนี้ก็เตรียมพร้อมแล้วค่ะ!"
80000039-40 = "[s] \"เอ่อ... นี่มันอะไรกันเหรอ...\""
80000039-41 = "คะ? นี่เป็นข้าวกล่องที่ฉันทำมาเองค่ะ"
80000039-42 = "ปกติคุณครูมักจะงานยุ่งอยู่ตลอด ฉันเลยกังวลว่าคุณครูจะไม่ได้ทานข้าว..."
80000039-43 = "แต่ไม่คิดเลยว่าคุณครูจะกินช็อกโกแลตแทนข้าวแบบนี้ ถึงจะเป็นวันวาเลนไทน์ก็เถอะนะคะ...!"
80000039-44 = "หรือว่ากินเพราะวันนี้เป็นวันวาเลนไทน์คะ? คุณครูคงไม่ได้ทำชาเลนจ์กินช็อกโกแลตสามมื้อหรอก ใช่ไหมคะ...?"
80000039-45 = "[s] \"เปล่า... แบบนั้นไม่ไหวหรอก\""
80000039-46 = "นั่นสินะคะ ถึงวันนี้จะเป็นวันพิเศษ แต่ถ้ากินของหวานมากเกินไปจะไม่ดีต่อสุขภาพค่ะ"
80000039-47 = "ถ้าคุณครูคิดจะทำแบบนั้น ฉันไม่ยกโทษให้หรอกนะคะ ชิส์!"
80000039-48 = "[s] \"ชะ...ชิส์...??\""
80000039-49 = "และที่ฉันมาที่นี่วันนี้ ก็เพื่อมาเตรียมอาหารให้คุณครูค่ะ"
80000039-50 = "เพราะว่า... ช่วงนี้คุณครูดูอิดโรยเป็นพิเศษ ฉันเลยเป็นห่วงค่ะ... แล้วอีกอย่าง..."
80000039-51 = "ชะ...ใช่แล้ว! ฉันเคยบอกคุณครูไว้แล้วนี่คะ"
80000039-52 = "ว่าถ้าอยากทานอาหารปรุงเองที่บ้านก็แวะมาหาได้ตลอดเวลาน่ะ..."
80000039-53 = "ชะ...ใช่แล้วค่ะ! ฉันมาที่นี่เพราะเรื่องนั้นแหละค่ะ!"
80000039-54 = "ก่อนอื่น ถ้าเติมพลังให้ท้องอิ่มแล้ว ความกังวลส่วนใหญ่ก็จะหายไปเอง"
80000039-55 = "เพราะงั้นฉันจะคอยช่วยคุณครูเองค่ะ!"
80000039-56 = "[s] \"อื้อ ขอบใจนะ ฟูกะ\""
80000039-57 = "ฮิฮิ ด้วยความยินดีค่ะ นี่ก็เป็นหน้าที่ของสมาชิกชมรมโภชนาการค่ะ"
80000039-58 = "[s] \"ถ้างั้นมากินข้าวด้วยกันเถอะ\""
80000039-59 = "คะ? ฉันด้วยเหรอคะ...?"
80000039-60 = "อาหารมีเยอะกินคนเดียวคงไม่หมด เลยอยากให้ฉันกินข้าวด้วยกัน..."
80000039-61 = "คะ...ค่ะ! ถ้าคุณครูพูดแบบนั้นฉันก็ยินดีค่ะ..."
80000039-67 = "(หลังจากทานมื้อเย็นกับฟูกะแล้ว)"
80000039-69 = "[ns] \"อร่อยมากเลย\""
80000039-70 = "ฮุฮุ... ค่อยยังชั่วที่รสชาติถูกปากคุณครูค่ะ"
80000039-71 = "แล้วก็... นี่ค่ะ"
80000039-76 = "[ns] \"โกโก้เหรอ...?\""
80000039-77 = "ค่ะ ตอนนี้ก็กินข้าวอิ่มแล้ว นี่ค่ะ ของขวัญวาเลนไทน์...จากฉันค่ะ"
80000039-78 = "ฉันใช้ผงช็อกโกแลตจากเมล็ดโกโก้ที่ปลูกเองในแปลงผักของชมรมโภชนาการมาชงเป็นโกโก้ร้อนค่ะ"
80000039-79 = "คือว่าฉัน... ตอนแรกฉันอาจจะพูดเอาแต่ใจไปสักหน่อย แต่ถึงยังไงวันนี้ก็เป็นวันวาเลนไทน์นี่คะ"
80000039-80 = "ฮิฮิ เพราะงั้นดื่มตอนที่ร้อนๆ นะคะ จะช่วยให้หลับสบายขึ้นค่ะ"
80000039-81 = "[s] \"ฟูกะตัน! รักที่สุดเลย!\""
80000039-82 = "คะ...คะ?! ระ...รักเหรอ?! ดะ...เดี๋ยวสิคะ คุณครู?!"
80000039-83 = "[s] \"อ๊ะ แก้วสองใบนี้เหมือนกันเลยเนอะ\""
80000039-84 = "...!! คือว่ามันไม่ได้มีความหมายพิเศษอะไรหรอกนะคะ...!"
80000039-85 = "ฉะ...ฉันก็แค่เอาแก้วที่มีอยู่ที่ชมรมโภชนาการมาก็เท่านั้นเอง..."
80000039-86 = "อะ... อ๊ายยยย คะ...คือ... ฉันขอตัวก่อนนะคะะะ!"
80000039-90 = "[ns] \"ฟูกะ?!\""
80000039-94 = "จริงสิคะ! อย่าลืมเอาอาหารที่เหลือเก็บเข้าตู้เย็นนะคะ ไม่งั้นจะบูดเอาได้ค่ะ! อย่าลืมนะคะ! "
80000039-95 = "(พยักหน้า) ถ้างั้นฉะ...ฉันขอตัวกลับก่อนนะคะ!"
80000039-99 = "[ns] \"อะ...อื้อ กลับดีๆ นะ...\""
80000039-101 = "(คุณครูรู้สึกอึ้งนิดๆ แต่ก็นั่งดื่มช็อกโกแลตที่เหลือพร้อมกับมองที่นั่งว่างเปล่าของฟูกะอย่างเงียบๆ...)"
80000039-103 = "[ns] \"อืม หวานดีนะ\""

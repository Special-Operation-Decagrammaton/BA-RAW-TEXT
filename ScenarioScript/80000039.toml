80000039-68 = "#all;hide"
80000039-69 = "[ns] \"엄청 맛있었어.\""
80000039-70 = "3;후우카;03;후후……. 입맛에 맞으셨다니, 다행이에요.\n#3;em;[반짝]\n#3;a"
80000039-71 = "3;후우카;01;그리고 이거…….\n#3;m5"
80000039-72 = "#st;[0,0];instant;1;"

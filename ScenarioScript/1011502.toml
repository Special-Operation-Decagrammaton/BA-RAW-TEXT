[translation]
1011502-1 = "特別訓練（１）"
1011502-2 = "（應莉的邀約，前往了千年棒球部的訓練場）"
1011502-9 = "啊，你來啦，老師！謝謝你！"
1011502-10 = "[s1]「畢竟你都邀請我了嘛！擊掌！」\n[s2]「還是來個低空版擊掌！？」"
1011502-11 = "嗯！擊掌！耶嘿嘿。"
1011502-12 = "低空擊掌！手往下……嘿！"
1011502-13 = "那麼請看吧，老師。"
1011502-15 = "今天的訓練要開始囉！"
1011502-20 = "（於是莉便精神奕奕地進入訓練場，但是……）"
1011502-27 = "「三好球……三振出局！」"
1011502-28 = "唔……！在這裡反而用直球當決勝球嗎？#n不愧是千年製的訓練輔助員……！"
1011502-29 = "但是接下來才是關鍵！"
1011502-35 = "看到了！"
1011502-39 = "「揮得漂亮！野正莉同學。可惜角度稍微偏高。」"
1011502-40 = "「飛球出局。辛苦了。」"
1011502-41 = "哈啊……"
1011502-45 = "「滾地球。」"
1011502-46 = "唔……！"
1011502-49 = "「內野飛球。」"
1011502-50 = "拜託……！"
1011502-54 = "「揮空。三振。」"
1011502-55 = "唔唔……！"
1011502-64 = "辛苦了……"
1011502-65 = "嗚嗚，今天還是怎麼打都不太順利。"
1011502-66 = "好不容易打到的也全都是飛球、滾地球，不然就是直線打。"
1011502-67 = "雖然不是無安打，也算是不幸中的大幸吧……"
1011502-68 = "[ns]「問題出在哪呢？」"
1011502-69 = "……"
1011502-70 = "答案的話，我其實知道哦。"
1011502-71 = "[s]「咦，真的嗎？」"
1011502-72 = "嗯，說白了只是時機問題而已。"
1011502-73 = "有句話叫「打擊講求時機，而投球講求破壞時機」嘛。"
1011502-77 = "……應該對吧？還是反過來才對？"
1011502-78 = "總之，球是從投手的投球動作開始之後，在特定時機飛過來的。"
1011502-79 = "而打者則必須從中抓準時機揮棒……"
1011502-80 = "唔唔，果然很不容易啊。#n除了要看出是直球還是變化球之外，如果是變化球還得看出是什麼球種。"
1011502-81 = "有時候明明動態視力能跟得上，身體卻會因為雜念太多而反應不及……"
1011502-82 = "[ns3]「時機，時機啊……」\n[ns4]「那麼來做點時機訓練吧！」"
1011502-85 = "咦，時機訓練？有這種訓練嗎？"
1011502-86 = "如果真的有就再好不過了……"
1011502-87 = "不過要是真的有這種訓練的話，怎麼會到現在都沒人知道呢？"
1011502-88 = "這種時候需要轉變思維，相信你跟你走就對了？"
1011502-89 = "老，老師？我真的可以相信你嗎？#n知，知道了！我會跟你走，所以不用一直推我肩膀……！"
1011502-95 = "這裡是……遊戲中心！？"
1011502-96 = "不管怎麼看都跟時機訓練之類的沒關係吧！"
1011502-97 = "[s]「怎麼會沒關係呢，莉。說到時機就會想到節奏遊戲呀！」"
1011502-98 = "節奏……遊戲？那是什麼？#n其實我幾乎沒來過這種地方……"
1011502-99 = "試過就知道了是嗎？#n唔嗯……"
1011502-100 = "好吧，那我就相信老師囉……"
1011502-102 = "（就這樣一起大步走進了遊戲中心）"
1011502-103 = "（其實也有順便讓莉排解壓力和緊張的用意……）"
1011502-104 = "原來如此，這就是節奏遊戲啊。"
1011502-105 = "根據掉落的條狀音節，在正確的時機按下特定按鈕……"
1011502-106 = "……確實符合時機訓練的要素呢。我完全沒想到。"
1011502-107 = "咦？其實節奏遊戲還有很多種類？#n有打鼓的、彈吉他的，甚至還有打爵士鼓的……？"
1011502-108 = "到了那種程度的話，好像已經跟時機訓練無關了……我也只是第一次玩的新手而已。"
1011502-112 = "那麼首先，就從老師介紹的這個遊戲開始吧……"
1011502-114 = "（於是莉小心翼翼地開始了人生第一場節奏遊戲）"
1011502-115 = "（接著……）"
1011502-123 = "這邊，這邊，長按之後是那邊……#n好，就這樣……！"
1011502-134 = "快看那邊！那個在玩BearMania IDX的同學！"
1011502-135 = "他玩的是3天前新出的12級曲子吧？#n人類有可能破關嗎？"
1011502-145 = "不可能3天之內就把譜背完吧……#n我的天，他居然是看著譜按的嗎？"
1011502-146 = "這裡用反拍……然後是連打模式……我看見了！"
1011502-169 = "老師！最高難度也破關了！#n……咦？"
1011502-173 = "這些人……是誰啊？"
1011502-174 = "[s5]「那個……總之恭喜你，莉！」\n[s6]「你現在是遊戲中心的歷史排行榜第1名哦，莉！」"
1011502-177 = "咦！？我只是依照看到的時機按下去而已，這樣就第1名了？"
1011502-178 = "所以這些人全都是……"
1011502-179 = "你聽到了嗎？他說自己只是配合時機按按鈕而已！"
1011502-180 = "雖然節奏遊戲本來就很看天賦，沒想到真的有人能達到那個境界……"
1011502-181 = "如果只看節奏遊戲的話，他搞不好能跟傳說中的玩家……UZQueen一較高下！"
1011502-182 = "剛才老師叫他「莉」對吧？#n所以這就是「REIQueen」的誕生嗎！？"
1011502-186 = "呃，這……？"
1011502-187 = "那，那個……？#n如果可以的話，能跟你一起拍照嗎……？"
1011502-188 = "咦！？我，我沒有那麼厲害，而且擅長的也不是遊戲而是棒球……"
1011502-189 = "總，總之這畢竟不是棒球，實在讓人有點為難又過意不去……"
1011502-193 = "唔啊啊啊──！#n對不起，真的對不起，我先告辭了──！"
1011502-200 = "哈啊，哈啊，哈啊……"
1011502-207 = "[ns7]「哈啊，哈啊，哈啊……」\n[ns8]「不愧是棒球選手，腳程真快……」"
1011502-210 = "啊，老師！？#n對不起！我為了逃跑就自顧自地衝出來了……！"
1011502-211 = "而且以球員的標準來說，我跑得其實沒有特別快……"
1011502-212 = "嗚嗚，嚇我一跳。#n仔細想想，真正球賽時的觀眾應該更多才對。"
1011502-213 = "該說是因為從來沒那麼受矚目有點意外，還是說因為太意外而慌了陣腳……"
1011502-214 = "[s]「嗯……抱歉，莉。」"
1011502-215 = "老師為什麼要道歉？你其實不必……"
1011502-216 = "這本來就是為了幫助我找到節奏感，才特別推薦給我的特別訓練方法不是嗎？"
1011502-217 = "因為害我驚嚇過度，所以應該道歉……？"
1011502-218 = "別，別這麼說！#n這並不是老師的錯，只是我自己太容易被嚇到而已！"
1011502-219 = "而且我之所以離開那個地方，一部分當然是因為慌張沒錯……#n不過最主要的原因是──那裡並不是我的「戰場」。"
1011502-220 = "我的用詞太誇張了？哪有！"
1011502-221 = "這點我一定要說清楚才行──棒球就是場戰爭！"
1011502-222 = "對於所有賭上一切全力以赴的人來說，他們努力耕耘的領域就是「戰場」。"
1011502-223 = "這麼一想，我這麼做對於在節奏遊戲這個領域戰鬥的人們……好像很失禮。"
1011502-224 = "唔，我剛才說話好像有點混亂，真不好意思。"
1011502-225 = "[s9]「沒事沒事。」\n[s10]「莉真的對棒球很認真呢。」"
1011502-228 = "謝，謝謝老師願意這樣解讀。嘿嘿。"
1011502-229 = "總之……我好像稍微得到了一點自信！"
1011502-230 = "多虧有老師的幫忙，我感覺抓到節奏感了。#n大概是「啪！」的這種感覺！"
1011502-231 = "請看著吧，老師。#n這次的打擊訓練……一定會很順利的！"
1011502-233 = "（於是莉充滿幹勁地前往了訓練場）"
1011502-234 = "（不知該說意外還是不意外……他壯烈地敗北了）"
1011502-235 = "怎麼會──！？！？！？"

[translation]
1011502-1 = "การฝึกซ้อมพิเศษ 1"
1011502-2 = "(คุณครูมุ่งหน้าไปยังสนามซ้อมของชมรมเบสบอลมิลเลเนียมตามคำชวนของเรย์)"
1011502-9 = "อ๊ะ มาแล้วสินะคะ คุณครู! ขอบคุณนะคะ"
1011502-10 = "[s1] \"ก็ได้รับคำชวนทั้งทีนี่เนอะ มาไฮทัชกัน!\"\n[s2] \"ก็ได้รับคำชวนทั้งทีนี่เนอะ มาโลวทัชกัน!\""
1011502-11 = "ค่ะ! ไฮทัช! แหะๆๆ"
1011502-12 = "โลวทัช! เอามือลงสิคะ... แบบนี้ละ!"
1011502-13 = "ถ้างั้นก็ช่วยเฝ้าดูฉันด้วยนะคะ คุณครู"
1011502-15 = "ฉันจะเริ่มการฝึกซ้อมของวันนี้เดี๋ยวนี้ค่ะ!"
1011502-20 = "(แล้วเรย์ก็วิ่งเข้าสนามด้วยพละกำลังที่เต็มเปี่ยม แต่ว่า...)"
1011502-27 = "<ทรี สไตรค์... เอาต์!>"
1011502-28 = "อึก...! ใช้เทคนิคขว้างลูกตรงๆ งั้นเหรอ สมแล้วที่เป็นผู้ช่วยฝึกของมิลเลเนียม...!"
1011502-29 = "แต่ว่าครั้งต่อไปน่ะ!"
1011502-35 = "เป็นยังไงล่ะ!"
1011502-39 = "<ตีลูกได้ดีเลยครับ โนมาสะ เรย์ แต่ว่าองศามันเยอะไปหน่อยครับ>"
1011502-40 = "<ฟลาย เอาต์ พยายามได้ดีแล้วครับ>"
1011502-41 = "เฮ้อ..."
1011502-45 = "<ลูกตกพื้นครับ>"
1011502-46 = "อึก...!"
1011502-49 = "<ป็อป ฟลาย>"
1011502-50 = "โธ่เอ๊ย...!"
1011502-54 = "<ไม่โดนลูก ตีไม่ถูก 3 ครั้งแล้วครับ>"
1011502-55 = "เฮือก...!"
1011502-64 = "ได้ฝึกซ้อมอย่างดีเลย ขอบคุณค่ะ..."
1011502-65 = "ฮือ วันนี้ตีไม่ค่อยได้เรื่องเลยค่ะ"
1011502-66 = "ลูกที่ตีโดนก็ฟลายเอาต์ ตกพื้น หรือไม่ก็พุ่งเป็นเส้นตรงขนานกับพื้นไปเสียอย่างงั้น"
1011502-67 = "หรือว่าฉันควรจะคิดว่าโชคดีแล้วที่ตีโดนลูกคะ..."
1011502-68 = "[ns] \"ปัญหาอยู่ที่ตรงไหนกันนะ?\""
1011502-69 = "..."
1011502-70 = "ฉันรู้อยู่แก่ใจค่ะ"
1011502-71 = "[s] \"หืม? งั้นเหรอ?\""
1011502-72 = "ค่ะ มันเป็นเรื่องของจังหวะน่ะค่ะ"
1011502-73 = "มีคำพูดที่ว่าการตีลูกต้องอาศัยจังหวะ ส่วนการขว้างลูกก็คือการแย่งจังหวะค่ะ"
1011502-77 = "หรือเปล่านะ...? หรือว่าจะสลับกัน?"
1011502-78 = "แต่ก็เอาเถอะค่ะ ลูกจะลอยมาในจังหวะที่กำหนด โดยเริ่มตั้งแต่ตอนที่พิชเชอร์เหวี่ยงแขน"
1011502-79 = "แล้วคนที่เป็นแบตเตอร์อย่างฉันก็ต้องเหวี่ยงไม้ให้ถูกจังหวะพอดี..."
1011502-80 = "ฮือ มันไม่ง่ายเลยค่ะ ฉันต้องอ่านให้ออกว่าลูกที่ขว้างมาเป็นลูกตรงหรือลูกที่เปลี่ยนทิศทาง"
1011502-81 = "บางครั้งฉันจะจับการเคลื่อนไหวได้เร็วค่ะ แต่บางครั้งฉันก็เกิดความคิดฟุ้งซ่านจนร่างกายก็ตอบสนอง#nช้า..."
1011502-82 = "[ns3] \"จังหวะ... งั้นก็มาฝึกเรื่องจังหวะกันเถอะ\"\n[ns4] \"ถ้างั้นเราก็มาฝึกจังหวะกันเถอะ!\""
1011502-85 = "คะ? ฝึกจังหวะงั้นเหรอคะ? มีอะไรแบบนี้ด้วยเหรอคะ?"
1011502-86 = "ถ้ามีการฝึกพิเศษเฉพาะเรื่องก็คงดีอยู่หรอกค่ะ..."
1011502-87 = "แต่ถ้ามีการฝึกแบบนั้นจริงๆ ทำไมถึงไม่มีใครรู้เลยล่ะคะ?"
1011502-88 = "สิ่งสำคัญของการฝึกนี้คือการเปลี่ยนความคิดงั้นเหรอคะ? ให้เชื่อใจและทำตามก่อนงั้นเหรอ?"
1011502-89 = "คะ... คุณครู? ฉันเชื่อคุณครูได้ใช่มั้ยคะ? งั้นก็ได้ค่ะ ฝึกก็ฝึก! แต่นี่ฉันไม่ได้จะหนีสักหน่อย อย่าผลักไหล่กันอย่างนั้นสิคะ!"
1011502-95 = "ที่นี่มัน... ร้านเกมนี่คะ!?"
1011502-96 = "มันไม่เห็นจะเกี่ยวกับการฝึกจังหวะเลยสักนิดนะคะ?!"
1011502-97 = "[s] \"ไม่หรอก เรย์ ถ้าเป็นเรื่องจังหวะ ก็ต้องเกมจังหวะดนตรีนี่ละ!\""
1011502-98 = "เกมจังหวะดนตรี...? มันเป็นยังไงเหรอคะ? ที่จริงฉันแทบไม่เคยมาที่แบบนี้เลยค่ะ..."
1011502-99 = "ถ้าได้ลองเล่นก็จะรู้เองงั้นเหรอคะ? อ่า..."
1011502-100 = "เข้าใจแล้วค่ะ ฉันจะเชื่อคุณครูค่ะ..."
1011502-102 = "(แล้วคุณครูกับเรย์ก็เดินเข้าร้านเกมด้วยความปรารถนาอันแรงกล้า)"
1011502-103 = "(ที่จริงคุณครูอยากให้เรย์ได้มาคลายเครียดและคลายความกดดันไปด้วย...)"
1011502-104 = "นี่สินะคะ เกมจังหวะดนตรีที่ว่า"
1011502-105 = "เกมที่ต้องกดปุ่มที่กำหนดในจังหวะที่แม่นยำ เพื่อให้ตรงกับโน้ตที่ตกลงมา..."
1011502-106 = "มีส่วนช่วยในการฝึกจังหวะจริงๆ ด้วย... ฉันคาดไม่ถึงเลยค่ะ"
1011502-107 = "คะ? ที่จริงเกมจังหวะมีหลายอย่าง ทั้งเกมตีกลอง แล้วก็เกมดีดกีตาร์ด้วยเหรอคะ...?"
1011502-108 = "ถ้าไปเล่นเกมพวกนั้นด้วย ฉันว่ามันจะยิ่งห่างไกลจากการฝึกนะคะ แล้วฉันก็เป็นมือใหม่ในเรื่องนี้ด้วยค่ะ"
1011502-112 = "งั้นฉันขอเริ่มจากเกมที่คุณครูแนะนำให้ก่อน..."
1011502-114 = "(แล้วเรย์ก็เริ่มเล่นเกมจังหวะเป็นครั้งแรกในชีวิตอย่างระมัดระวัง)"
1011502-115 = "(และ...)"
1011502-123 = "ตรงนี้ ตรงนี้ ตรงนี้ต้องกดค้าง แล้วก็ตรงโน้นอีก... ดีมาก แบบนี้ละ..."
1011502-134 = "ดูโน่นสิ! นักเรียนที่เล่นเกม BearMania IDX อยู่!"
1011502-135 = "นั่นมันเพลงเลเวล 12 ที่เพิ่งเพิ่มมาเมื่อ 3 วันก่อนไม่ใช่เหรอ? เพลงนั้นมีใครเล่นผ่านด้วยเหรอ?"
1011502-145 = "ไม่น่ามีใครจำโน้ตได้ทั้งหมดใน 3 วันนะ... งั้นก็แปลว่ากดปุ่มแบบดูโน้ตไปด้วยงั้นเหรอ?!"
1011502-146 = "ตรงนี้จังหวะไม่เหมือนเดิมสินะ... ส่วนตรงนี้ก็เข้าแพทเทิร์นกดรัวๆ... ดีละ!"
1011502-169 = "คุณครู! ฉันเล่นผ่านระดับความยากสุดท้ายแล้ว! เอ๋ แต่เดี๋ยวนะ...?"
1011502-173 = "คนพวกนี้... คือใครเหรอคะ?"
1011502-174 = "[s5] \"ได้ที่ 1 เลย... ดีใจด้วยนะ เรย์!\"\n[s6] \"ทำคะแนนได้เป็นอันดับ 1 ของร้านเลยละ เรย์!\""
1011502-177 = "คะ?! ฉันก็แค่กดปุ่มตามจังหวะเท่านั้นเอง แต่ได้ที่ 1 เลยเหรอคะ?"
1011502-178 = "ถ้างั้นคนพวกนี้ก็..."
1011502-179 = "ได้ยินหรือเปล่า? คนนั้นบอกว่าแค่กดปุ่มตามจังหวะเอง!"
1011502-180 = "ว่ากันว่าเกมจังหวะต้องอาศัยพรสวรรค์ตั้งแต่เกิด คนที่ทำได้ก็ทำได้ดีจริงๆ สินะ..."
1011502-181 = "ถึงตอนนี้อาจจะเล่นได้ดีแค่เกมจังหวะ แต่ก็น่าจะประชันกับ... เกมเมอร์ UZQueen ได้เลยนะเนี่ย!"
1011502-182 = "เมื่อกี้คุณครูเรียกนักเรียนคนนั้นว่า 'เรย์' หรือเปล่านะ? หรือว่าเกมเมอร์ 'เรย์ควีน' ได้ถือกำเนิดแล้ว?!"
1011502-186 = "เอะ... เอ๋....?"
1011502-187 = "ขะ... ขอโทษนะคะ...? ถ้าไม่ว่าอะไร ฉันขอถ่ายรูปด้วยจะได้มั้ยคะ...?"
1011502-188 = "คะ?! ฉะ... ฉันไม่ใช่คนดังอะไรนะคะ แล้วฉันก็ไม่ใช่เกมเมอร์ แต่เป็นนักเบสบอลมากกว่า..."
1011502-189 = "นะ... นี่ไม่ใช่การแข่งขันเบสบอล งั้นฉันก็ไม่ควรหรือเปล่าคะ แบบนี้มันจะเป็นการเสียมารยาทต่อ#nเกมเมอร์ด้วย..."
1011502-193 = "แงงงง! ขอโทษนะคะ ฉันคงต้องขอตัวก่อนค่ะ!"
1011502-200 = "แฮ่ก... แฮ่ก... แฮ่ก..."
1011502-207 = "[ns7] \"แฮ่ก... แฮ่ก... แฮ่ก...\"\n[ns8] \"นักเบสบอลวิ่งเร็วจริงๆ ด้วยนะ...\""
1011502-210 = "อ๊ะ? คุณครู?! ขอโทษที่ฉันรีบวิ่งหนีออกมานะคะ...!"
1011502-211 = "แล้วถ้าเทียบกับนักกีฬาคนอื่นแล้ว แบบนั้นยังไม่ถือว่าวิ่งเร็วด้วยค่ะ..."
1011502-212 = "ฮือ ฉันตกใจน่ะค่ะ แต่พอคิดดูแล้ว ตอนแข่งเบสบอลมีคนมาดูกันเยอะกว่าในร้านเกมอีก"
1011502-213 = "แต่ฉันก็ไม่เคยได้รับความสนใจมากมายขนาดนั้น ก็เลยตกใจจนทำตัวไม่ถูกค่ะ..."
1011502-214 = "[s] \"อืม... ขอโทษนะ เรย์\""
1011502-215 = "คะ? ทำไมคุณครูถึงมาขอโทษฉันล่ะคะ? คุณครูไม่ได้ทำอะไรผิดนี่นา..."
1011502-216 = "ที่คุณครูชวนฉันไปร้านเกมก็เพื่อจะเสนอการฝึกซ้อมพิเศษให้ฉันจับจังหวะเป็นไม่ใช่เหรอคะ?"
1011502-217 = "แต่ขอโทษเพราะสุดท้ายมาทำให้ฉันตกใจงั้นเหรอคะ...?"
1011502-218 = "มะ... ไม่เป็นไรเลยค่ะ! นั่นไม่ใช่ความผิดของคุณครูค่ะ ฉันผิดที่ตกใจไปเองมากกว่า! อีกอย่าง..."
1011502-219 = "ที่ฉันหนีจากตรงนั้นมา... เหตุผลหนึ่งคือฉันตกใจ แต่เหตุผลที่ใหญ่กว่านั้นก็คือที่นั่น... ไม่ใช่ 'สนามรบ' ของฉันค่ะ"
1011502-220 = "ฉันเลือกใช้คำพูดยิ่งใหญ่เกินไปงั้นเหรอคะ? ไม่หรอกค่ะ!"
1011502-221 = "คุณครูคะ เบสบอลคือสงครามนะคะ!"
1011502-222 = "และสำหรับทุกคนที่เอาทุกอย่างเป็นเดิมพันและทุ่มเทจนสุดกำลังแล้ว แขนงที่พวกเขาเชี่ยวชาญก็คือ#nสนามรบดีๆ นี่ละค่ะ "
1011502-223 = "พอมาคิดแบบนั้น ฉันก็เลยรู้สึกว่า... มันจะเป็นการเสียมารยาทต่อเหล่าเกมเมอร์ที่แข่งขันเกมจังหวะกัน#nด้วยค่ะ"
1011502-224 = "อืม จะว่าไปฉันก็ใช้คำที่สับสนอยู่หน่อยๆ นะคะ ต้องขอโทษด้วยค่ะ"
1011502-225 = "[s9] \"ไม่เป็นไร ไม่เป็นไรเลยนะ\"\n[s10] \"เรย์จริงใจกับกีฬาเบสบอลมากเลยนะ\""
1011502-228 = "ถะ... ถ้าคุณครูคิดแบบนั้น ฉันก็ขอบคุณค่ะ แหะๆ"
1011502-229 = "การฝึกจากคุณครู... ทำให้ฉันมีความมั่นใจขึ้นมาอีกนิดค่ะ!"
1011502-230 = "คุณครูช่วยให้ฉันจับจังหวะได้ดีขึ้น ฉันไม่ได้คิดไปเองด้วยนะ!"
1011502-231 = "คอยเฝ้าดูฉันนะคะคุณครู การซ้อมตีลูกครั้งนี้... ต้องทำได้ดีแน่นอนค่ะ!"
1011502-233 = "(แล้วเรย์ก็มุ่งหน้าสู่สนามซ้อมด้วยความกระตือรือร้น)"
1011502-234 = "(แต่เรย์ก็แพ้ยับเยิน... ต้องเรียกว่าคาดไม่ถึงหรือคาดไว้แล้วดีนะ)"
1011502-235 = "ไหงเป็นงี้ล่ะ?!?!?!"

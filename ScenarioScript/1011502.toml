[translation]
1011502-1 = "Special Training 1"
1011502-2 = "As Rei suggested, I headed to the Millennium Baseball Club's training grounds."
1011502-9 = "Ah, Sensei, you're here! Thanks for coming!"
1011502-10 = "[s1] \"Well, I couldn't turn down an invitation. Up high!\"\n[s2] \"Down low!\""
1011502-11 = "...And one more high five! Heehee."
1011502-12 = "And one more down low! Liiike...that!"
1011502-13 = "All right, now go ahead and watch, Sensei."
1011502-15 = "I'm starting today's training!"
1011502-20 = "Rei strode out onto the field, but..."
1011502-27 = "Strike three! You're out!"
1011502-28 = "Tch...! You mixed it up with a fastball. Very Millennium of you!"
1011502-29 = "I'll hit the next one for sure!"
1011502-35 = "I see it!"
1011502-39 = "Good hit, Nomasa Rei. But your angle was a bit too high."
1011502-40 = "Flyout. Not bad."
1011502-41 = "*sigh*"
1011502-45 = "Ground ball."
1011502-46 = "Ugh..."
1011502-49 = "Infield fly."
1011502-50 = "Come on!"
1011502-54 = "Whiff. Strike three."
1011502-55 = "Eek...!"
1011502-64 = "Good practice..."
1011502-65 = "Ugh, why does my hitting still suck?"
1011502-66 = "Every ball I hit was either a flyout, or a ground ball, or a liner."
1011502-67 = "I mean, at least I got on base, once, but..."
1011502-68 = "[ns] \"What do you think you're missing?\""
1011502-69 = "..."
1011502-70 = "I think I know, actually."
1011502-71 = "[s] \"You do?\""
1011502-72 = "Yeah, I think so. My timing's off."
1011502-73 = "There's a saying that \"hitting is timing, and pitching is upsetting timing.\""
1011502-77 = "...Or was it the other way around?"
1011502-78 = "Anyways, yeah. Once the pitcher winds up, there's a certain amount of time before it crosses the plate."
1011502-79 = "The batter needs to plot that time out and know exactly when to swing."
1011502-80 = "Ugh, but it's not easy. Sometimes, they throw fastballs, sometimes it's breaking balls, or different types of breaking balls."
1011502-81 = "I can follow the ball with my eyes, usually, but that always throws my timing off..."
1011502-82 = "[ns3] \"Timing, hmm...?\"\n[ns4] \"All right, let's do some timing practice!\""
1011502-85 = "Timing practice? That's a thing?"
1011502-86 = "I'd love it if there were a drill for that, but..."
1011502-87 = "...if there is, how come no one's ever heard of it?"
1011502-88 = "Hmm? You want me to think outside the box and just trust you for now?"
1011502-89 = "I-I can do that. Right, Sensei? ...Okay, geez, I'm going! You don't have to push me like that..."
1011502-95 = "...Isn't this an arcade?!"
1011502-96 = "What could this possibly have to do with timing practice?"
1011502-97 = "[s] \"Two words: rhythm games.\""
1011502-98 = "Rhythm...games? What are those? I've actually never really been to one of these before..."
1011502-99 = "I'll know when I see it? Uhh..."
1011502-100 = "Okay. I'll trust you, Sensei..."
1011502-102 = "I walked her into the arcade with a heart full of ambition."
1011502-103 = "Honestly, it was only partly about athletic training. I also wanted to burn off her stress and settle her nerves."
1011502-104 = "I see. So THIS is a rhythm game."
1011502-105 = "So these little sticks come falling down, and when they hit the boxes, I push the buttons?"
1011502-106 = "...That DOES make sense for timing practice. I couldn't have imagined."
1011502-107 = "...Wait, there's more of these! Like that one with the guitar, or the one with the drum kit, or... Are those taiko drums?"
1011502-108 = "...Okay, let's not go TOO far off track here. I'm an absolute beginner at this stuff."
1011502-112 = "Here, since we're already AT the stick game, let me just try that..."
1011502-114 = "For the first time in her life, Rei tried her hand at a rhythm game."
1011502-115 = "And before long..."
1011502-123 = "Yep, yep, got it, got it, nailed it! Just gotta keep it up, keep it up..."
1011502-134 = "Oh, look over at the BearMania IDX machine! That girl is rocking it!"
1011502-135 = "She's doing that new Level 12 song. They just put it in three days ago! That's song's beatable?! By humans?!"
1011502-145 = "She couldn't have memorized the chart in three days. Is she...tracking it all on the fly?"
1011502-146 = "Oh, they threw in an off beat there...and then a spam pattern... Wow, I see it now!"
1011502-169 = "Hey look, Sensei! I beat the final difficulty! Um, by the way..."
1011502-173 = "Who are...all these people?"
1011502-174 = "[s5] \"Uh, first, congratulations, Rei...\"\n[s6] \"You just took the number one spot, Rei!\""
1011502-177 = "Seriously? I just watched them fall and timed the hits. Does that make me number one?"
1011502-178 = "So everybody here is..."
1011502-179 = "Did you hear that? She WAS tracking them on the fly!"
1011502-180 = "I've heard legends of rhythm game prodigies, but to see one up close like this..."
1011502-181 = "I don't know about other games, but on this one, she could probably take UZQueen!"
1011502-182 = "Sensei just called her \"Rei\" earlier, right? So is she going to be \"Rei Queen?\" Are we witnessing her origin story?!"
1011502-186 = "U-Uhh...?"
1011502-187 = "E-Excuse me, could we take a picture together?"
1011502-188 = "What?! I-I'm not that amazing. I'm not even a gamer. I'm in baseball."
1011502-189 = "Th-This isn't baseball, so I... I'm way off my game here..."
1011502-193 = "Aaahh!! I'm sorry, I'm really sorry, just...please excuse me!"
1011502-200 = "*pant* *pant* *pant*"
1011502-207 = "[ns7] \"*pant* *pant* *pant*\"\n[ns8] \"Well, your running's top notch.\""
1011502-210 = "Ugh, ah? Sensei?! Oh, I'm sorry! I ran away without you...!"
1011502-211 = "I'm not really that fast of a runner, either."
1011502-212 = "Ugh, that caught me way off guard. Although I guess, if I want to get good at baseball, I should probably get used to the idea of having fans."
1011502-213 = "I just didn't expect THAT, not there. I've never really gotten that much attention before."
1011502-214 = "[s] \"Yeah... I'm sorry for that, Rei.\""
1011502-215 = "What? Oh, no no, you've got nothing to apologize for, Sensei."
1011502-216 = "You wanted me to do some rhythm training so I could learn to anticipate and not be surprised, right?"
1011502-217 = "Hm? You feel sorry because you didn't think I'd get surprised THAT way?"
1011502-218 = "D-Don't worry about that! It wasn't your fault. I just get a little jumpy sometimes."
1011502-219 = "Honestly, it wasn't just that. I felt like I was on the wrong battlefield, so to speak."
1011502-220 = "You think that's too grandiose? Well, I don't think so!"
1011502-221 = "Let me tell you something. Baseball is war!"
1011502-222 = "For everybody who gives it all they've got in their own training fields, those are battlefields too for them!"
1011502-223 = "And...I kind of felt like I was infringing on other people's fields. You know, rhythm game players' fields."
1011502-224 = "I'm...kind of mixing metaphors now. I'm sorry."
1011502-225 = "[s9] \"It's fine, it's fine.\"\n[s10] \"You're really serious about baseball, aren't you?\""
1011502-228 = "Thanks for understanding."
1011502-229 = "Anyway, if nothing else, I'm definitely feeling more confident now!"
1011502-230 = "I've got a whole new appreciation for the rhythm of things thanks to you!"
1011502-231 = "So watch me now. I'm going to nail this next batting practice!"
1011502-233 = "Rei then bounded over to home plate..."
1011502-234 = "...where she struck out hard, a bunch of times."
1011502-235 = "Why?!!"

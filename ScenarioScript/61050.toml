[translation]
61050-1 = "Episode 5;The Last Supper(?)"
61050-3 = "The sponsor was...Kirifuji Nagisa? Of all people?"
61050-4 = "Explain yourself! I wasn't warned of this!"
61050-5 = "Waaah! Goodbye, cruel world... We're going to be abducted and taken to Trinity...probably tortured... Just don't take my fingernails, please!"
61050-9 = "Hiyori, we no longer do such things..."
61050-10 = "\"No longer\"? That would imply that you once did! \"Arius Apocrypha\" must have been true!"
61050-23 = "S-Sensei...?"
61050-24 = "Sensei?"
61050-26 = "[ns1] \"Let's all take a big, deep breath!\"\n[ns2] \"Neither Nagisa nor I have any ill intent.\""
61050-30 = "You expect us to believe that?"
61050-31 = "UWAAAAAAH!"
61050-33 = "Ahem. Then, shall we start over? It's a pleasure to see you again, Arius Squad."
61050-34 = "I'm Kirifuji Nagisa, the host of Tea Party."
61050-35 = "Hello, Nagisa. And I am Hakari Atsuko, of the Arius Squad. The pleasure is all ours."
61050-36 = "I'm happy to formally meet you."
61050-40 = "Imashino Misaki."
61050-41 = "I-I'm Tsuchinaga Hiyori... Eheehee..."
61050-42 = "...Joumae Saori."
61050-43 = "I'd expect you know of me, at the very least."
61050-45 = "No, not just you. I know all of you, if only through reports and hearsay."
61050-46 = "And the nature of our past makes you not knowing me an impossibility."
61050-47 = "...You get right to the point, don't you?"
61050-48 = "E-Eeeek..."
61050-49 = "Enough, Misaki. Let's not pass up this opportunity to speak candidly with each other. So, please... You as well, Saori."
61050-51 = "...Fine."
61050-52 = "Understood."
61050-54 = "Well then. With introductions out of the way, shall we proceed inside?"
61050-55 = "Wh-What...? Inside the ship?"
61050-56 = "Yes, of course. I've rented this cruise ship for the day, so please don't worry about prying eyes."
61050-58 = "?!"
61050-59 = "?!"
61050-60 = "..."
61050-61 = "[ns3] \"You've rented this ENTIRE SHIP?!\"\n[ns4] \"Isn't that a little overboard?!\""
61050-64 = "Hm? Why? The ship will remain docked the entire time. It's not as if I had to hire a sailing crew."
61050-65 = "This much is well within budget. Now then."
61050-69 = "This is...its own kind of nightmare... Actually, I wish this WAS a nightmare... Not even adulthood is scarier than this..."
61050-70 = "...They do operate in a different world from us, in more ways than one."
61050-71 = "Wh-What do we do here?"
61050-73 = "[ns] \"Let's...accept her hospitality...? For the time being...?\""
61050-75 = "Excellent. Let's follow her, then."
61050-76 = "Hm? You're relieved that at least I'm taking this well?"
61050-77 = "Aha. You see, it's rare to see you so baffled. Which led me to believe that these circumstances must truly be unusual ones."
61050-78 = "If we are already beyond our wildest expectations, it'd be wise to simply bend with the wind, yes?"
61050-79 = "[ns] \"If Atsuko can do it, so can I!\""
61050-83 = "Wh-Whoa..."
61050-84 = "Is anyone hungry? This restaurant has no menu, so please instead order whatever your heart desires."
61050-86 = "...Just order anything I want? How can someone operate a restaurant without a designated menu?"
61050-87 = "[ns5] \"No, Misaki... This is the mark of their culinary pride!\"\n[ns6] \"They're confident they can really make anything!\""
61050-90 = "I-Is that how it is? I was unaware that was even possible..."
61050-91 = "...Is this meant to be our last supper? This is just..."
61050-93 = "\"L-Last supper\"? What do you mean? I only wanted for us to share a meal..."
61050-94 = "Miss Nagisa? I'd like to apologize. We're not very used to places like this."
61050-95 = "Could we leave the ordering to you?"
61050-96 = "Of course, Atsuko.#nExcuse me? We're ready to order."
61050-101 = "Understood, Miss Nagisa. As you wish."
61050-102 = "Well then."
61050-104 = "Course after course came out...filled with types of dishes I'd never even seen before, let alone tried."
61050-110 = "For Nagisa, this seemed to be just another normal meal. The rest of us were so overwhelmed by the unfamiliar foods, we couldn't even process all the different tastes."
61050-111 = "...That is, except for one person."
61050-115 = "Sho gooh... Shooo gooo...! "
61050-116 = "H-Hiyori? It's rude to talk with your mouth full..."
61050-117 = "*munch* *gulp* S-Sorry...! It's just sooo delicious! So many flavors I've never tasted!"
61050-118 = "I'm happy to hear that. Please, help yourself. There's more than enough."
61050-120 = "Did everyone enjoy their meal?"
61050-121 = "[s] \"It was incredible...\""
61050-122 = "...Thanks. Really."
61050-123 = "I agree. I felt almost guilty, eating something so luxurious."
61050-127 = "M-Maybe we can get a box for takeout!"
61050-128 = "While I understand how you're feeling, it would be best to exercise some moderation, Hiyori."
61050-129 = "Boooooo... Okay..."
61050-131 = "Shall we have some tea to help digest our meal?"
61050-132 = "I've brought with me tea leaves from Brinings. It's one of my favorite brands."
61050-133 = "Shall we prepare it for you, my lady?"
61050-134 = "No, thank you. I will do it myself. It'll take only a moment. "
61050-136 = "Nagisa brewed the black tea with a practiced air, precise and exacting in her process."
61050-141 = "It wasn't long before we could smell the delicious aroma of black tea."
61050-143 = "There we go. All done. While not quite up to my usual standard, I do hope you'll enjoy."
61050-147 = "H-Heehee... It's so warm...makes me feel fuzzy... Mmm, this reminds me of Water Time back at Arius."
61050-148 = "...Ah. Yeah. We did have that."
61050-150 = "\"Water Time\"...?"
61050-152 = "It was a rare treat, but they'd sometimes award a cup of warm water to whoever performed best during training that day."
61050-153 = "It'd be around this time of year, usually."
61050-155 = "[ns] \"(Warm water...?)\""
61050-156 = "Whenever I got it, I would savor it with the teeniest, tiniest sips. But then it'd get cold..."
61050-157 = "It's funny how it was just some lukewarm water...but it was somehow the yummiest thing in the world..."
61050-158 = "Gah! M-Miss...Nagisa? My lady? Your majesty? Um, anyways, your tea is a million times better than some boring cup of water, of course!"
61050-160 = "Thank you. And please feel free to call me Nagisa."
61050-161 = "I was actually the one who asked Sensei to help arrange this meeting."
61050-162 = "...You contacted Sensei first?"
61050-163 = "..."
61050-164 = "How did you know? The two transfer students were the only ones Sensei spoke to."
61050-166 = "[ns] \"Ahem! So, if I could explain—!\""
61050-167 = "No, Sensei. I believe this would be best coming from me."
61050-168 = "Or at least, this is why I wanted to have this meeting."
61050-169 = "Where shall I begin?"
61050-170 = "Trinity's Intelligence Committee works tirelessly and achieves excellent results."
61050-171 = "...So you knew about them before Sensei even did."
61050-172 = "And considering you made first contact... You have all the transfers from Arius under surveillance, don't you?"
61050-173 = "You see..."
61050-174 = "[ns7] \"Aaand, now leave it to Sensei!\"\n[ns8] \"The baton touch might be a little early, but I hope you don't mind!\""
61050-177 = "S-Sensei?"
61050-178 = "[s9] \"It's okay, Nagisa. Sometimes, you have to rely on me.\"\n[s10] \"And I've confirmed everything you told me already.\""
61050-181 = "...I'll leave it to you, then."
61050-186 = "[ns11] \"You're right. Every transfer student has a Trinity student assigned to them.\"\n[ns12] \"But they're there to help them adjust, not to monitor them.\""
61050-189 = "[ns13] \"The transfer students were actually the ones...\"\n[ns14] \"...who told their Trinity counterparts about our meeting.\""
61050-192 = "...And I'm just supposed to believe that?"
61050-193 = "I understand that I'm asking for a lot. There are too many broken bridges between our schools, and I am a member of the Tea Party... But still..."
61050-195 = "[ns] \"Can you trust this teacher of yours, at least?\""
61050-197 = "..."
61050-198 = "I-I can... You're Sensei, you know..."
61050-199 = "Hiyori..."
61050-200 = "B-But Sensei's helped us a lot..."
61050-201 = "They could've called Valkyrie on us anytime they wanted. They could do it right now!"
61050-202 = "We'd be locked up deeeeep in the Corrections Bureau...or somewhere even more terrifying..."
61050-203 = "W-Wait! Were you pretending to be nice to us all this time, biding your time until you dragged us away?! EEEK!"
61050-204 = "After everything we've been through...this is finally the end! Life is nothing but pain and suffering! All is in vain! So I might as well finish this black tea before you lock me up!"
61050-211 = "S-Sensei? Is she..."
61050-212 = "[s15] \"Don't worry... That's our Hiyori...\"\n[s16] \"Don't pay her too much mind.\""
61050-215 = "If you say so..."
61050-216 = "Hm? I should focus on what I came here to do?"
61050-217 = "..."
61050-218 = "Yes. You're correct. This entire endeavor would've been for naught if I didn't fulfill my objective."
61050-219 = "All, I would like to say something. I will not lie to you and pretend that my presence here today is merely in a personal capacity. "
61050-220 = "It's the nature of holding the title of Tea Party host. Whatever I do will be open to interpretation, and whatever I say will be scrutinized for its true intent."
61050-221 = "So..."
61050-226 = "I would like to formally, and sincerely, apologize to each one of you."
61050-230 = "...Huh?!"
61050-231 = "Wh-What are you...?!"
61050-232 = "..."
61050-233 = "Earlier, you said that whatever you do will be open to interpretation, and whatever you say will be scrutinized for its true intent."
61050-234 = "Could I ask you to elaborate, Nagisa?"
61050-236 = "I would expect you to. However, it is as I said."
61050-237 = "As the Tea Party host, and a Trinity student..."
61050-238 = "...and as the one who currently represents Trinity."
61050-239 = "I apologize to you all, and to the Arius Satellite School."
61050-240 = "But why? We acted against Trinity first, did we not?"
61050-241 = "Yes. I know that the Arius Squad was at the forefront of that incident."
61050-242 = "However, I also know the long, twisted road that led us there."
61050-243 = "Arius and Trinity's problems did not begin with us."
61050-244 = "After the Council, Trinity and Arius...devolved into what we are now."
61050-245 = "But today, looking at the relationship, there are ways in which we are closer than any other schools in Kivotos."
61050-246 = "And you suddenly just woke up one day and had a conscience about all that?"
61050-247 = "Misaki."
61050-249 = "It's okay. You're well within your rights to feel that way."
61050-250 = "Trinity...should never have banned Arius. Their only crime was a difference in perspective."
61050-251 = "I believe I've also been personally guilty of neglecting those who were suffering around me. "
61050-252 = "I blamed it on politics and circumstances."
61050-253 = "If I can reach out my hand to those who are still suffering, I wish to do so."
61050-255 = "...I don't buy it."
61050-256 = "S-Seriously?!"
61050-257 = "I don't want to sit here and sift through the past..."
61050-258 = "But let me be blunt. Were you, Kirifuji Nagisa, not the victim of the Eden Treaty incident?"
61050-259 = "And you can hardly deny that we were the perpetrators of said incident."
61050-260 = "So why are you, the victim, apologizing? You can see why that'd be weird to us."
61050-261 = "When people's actions don't make sense to you, it means they know something you don't."
61050-263 = "Enough, Misaki."
61050-264 = "..."
61050-265 = "Please, it's okay. I understand your concerns, I truly do. "
61050-266 = "I can offer...two answers. One more palatable, the other difficult to accept."
61050-267 = "What would the palatable answer be?"
61050-268 = "Well..."
61050-269 = "If my apology alone was all it took to quell the Trinity student body's lingering anxiety regarding Arius..."
61050-270 = "...it'd be quite the keen political maneuver on my part to give one."
61050-271 = "...You should've been honest from the beginning."
61050-272 = "Now, now. Let's hear her out, Misaki."
61050-273 = "So what of your more complicated answer?"
61050-275 = "..."
61050-276 = "Allow me to tell a story of a student who leads the Tea Party in Trinity."
61050-277 = "After experiencing a particularly harrowing incident called the Eden Treaty, she spent much time reflecting upon what had gone wrong."
61050-278 = "In her need for answers, she began digging into records of the past. Some were so confidential that even as a member of the Tea Party, she had difficulty finding them. But she was overwhelmed with this gnawing hunger to understand all that had taken place."
61050-279 = "Later, as she was gazing down at the Trinity campus, at all the students living out their peaceful lives, the answer finally dawned on her."
61050-280 = "In order for both schools to move forward, their relationship could not stay as it was. "
61050-281 = "What Trinity did was wrong."
61050-282 = "And so, should it not be Trinity who reaches out their hand in reconciliation first? Whether it be grasped or cut off?"
61050-283 = "...Reminds me of a freakishly strong, pink princess."
61050-284 = "Yes. Perhaps it was that very princess that helped this student to finally open her eyes."
61050-286 = "..."
61050-287 = "..."
61050-288 = "Heehee."
61050-292 = "Then, me as well."
61050-296 = "...!"
61050-297 = "As one of royal blood..."
61050-298 = "And perhaps the one closest to the role of student council president..."
61050-299 = "On behalf of Arius Satellite School..."
61050-300 = "I'd like to apologize for the terrorism we committed against you."
61050-301 = "I do appreciate it. Truly."
61050-302 = "However, the apologies spoken here will hardly be enough to resolve the years of conflict between our schools."
61050-303 = "I'd like the opportunity to one day apologize to the transfer students living in Trinity..."
61050-304 = "...as well as to those who remained in Arius."
61050-305 = "A certain teacher once taught me something."
61050-306 = "Apologies hold no weight without also taking responsibility."
61050-307 = "And such responsibility must be upheld with action."
61050-309 = "...I agree with that sentiment. I have much to apologize for as well."
61050-310 = "But let's not waste anymore time on platitudes."
61050-311 = "Why did you want to meet with us? I take it you had a different objective than just bowing your head."
61050-312 = "You've gone to great lengths just for the chance to apologize and tell us you've grown."
61050-313 = "Yes, well said, Saori."
61050-314 = "Allow me to usher along this meeting's agenda."
61050-315 = "Now, I'm sure Sensei has already spoken to you about exams."
61050-316 = "Do you mean...?"
61050-317 = "Yes."
61050-318 = "Perhaps this is arrogance on my part."
61050-319 = "But I share Sensei's sentiment."
61050-320 = "I wish for everyone from Arius..."
61050-321 = "...to have the opportunity to hold their heads high in society. If they so wish."
61050-322 = "That's very kind. Thank you, Nagisa."
61050-323 = "I was concerned...that you would see this as patronizing or controlling."
61050-327 = "Because behind every altruistic act..."
61050-328 = "...lies the possibility of being motivated by a subconscious feeling of superiority."
61050-329 = "For one to believe that they alone know best, and to judge that others should live as they see fit..."
61050-330 = "But that was never your intention, was it, Nagisa?"
61050-331 = "Atsuko..."
61050-332 = "I believe such awareness around one's actions begets trust in its own way."
61050-333 = "Doesn't it, Misaki?"
61050-335 = "...You're not wrong."
61050-336 = "I-I actually don't even care if you do think like that..."
61050-337 = "So... It's okay...to me at least..."
61050-342 = "...Thank you, everyone."
61050-343 = "We appreciate your hospitality thus far."
61050-344 = "So, what is it you'd like for the Squad and Sensei to do?"
61050-345 = "I-I haven't even broached...! How did you...?"
61050-346 = "Hm..."
61050-347 = "This may sound arrogant, but..."
61050-349 = "...this is what they call \"street smarts.\""
61050-351 = "L-Leader...!"
61050-352 = "You actually looked quite cool saying that."
61050-353 = "But it still counts as a strike, Sao-Sao."
61050-355 = "I-I figured as much..."
61050-357 = "Next Episode;A Seat on the Other Side"

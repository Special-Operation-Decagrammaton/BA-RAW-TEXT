[translation]
61050-1 = "ตอนที่ 5;อาหารเย็นมื้อสุดท้าย(?)"
61050-3 = "สปอนเซอร์ที่ว่าก็คือ... คิริฟุจิ นางิสะเหรอ...?"
61050-4 = "อะไรกันน่ะ! ฉันไม่เห็นรู้เรื่องนี้มาก่อนเลย!!!"
61050-5 = "แงงง~! แย่แล้วค่ะ! จบเห่แล้ว! จากนี้พวกเราคงโดนลากออกไปนอกทรีนิตี้แล้วโดนทรมานด้วยการ#nถอดเล็บแน่ๆ ค่ะ!"
61050-9 = "เอ่อ เรื่องแบบนั้นจะไม่เกิดขึ้นอีกแล้วค่ะ..."
61050-10 = "ไม่เกิดขึ้นอีกแล้วงั้นเหรอ? แสดงว่าเคยเกิดขึ้นมาก่อนจริงๆ สินะ! เป็นไปตามที่บันทึกไว้ใน#nพระคัมภีร์ของอาเรียสเลย!"
61050-23 = "คะ... ครู?"
61050-24 = "คุณครู?"
61050-26 = "[ns1] \"ทุกคนใจเย็นๆ ก่อนนะ~\"\n[ns2] \"ทั้งครูและนางิสะไม่ได้มีเจตนาไม่ดีหรอก~\""
61050-30 = "คิดว่าฟังขึ้นงั้นเหรอ!"
61050-31 = "มุแงงงงง~!"
61050-33 = "อะแฮ่ม งั้นฉันขอแนะนำตัวอีกครั้งค่ะ สบายดีกันมั้ยคะ? สควอดของอาเรียสทุกคน"
61050-34 = "ฉันชื่อว่าคิริฟุจิ นางิสะ เป็นโฮสต์คนปัจจุบันของสภาน้ำชาค่ะ"
61050-35 = "สวัสดี คุณนางิสะ ฉันคือสควอดของอาเรียส ชื่อว่าฮาคาริ อาสึโกะ ขอบคุณที่ทักทายกันก่อนนะ"
61050-36 = "ค่ะ ขอฝากเนื้อฝากตัวด้วยนะคะ"
61050-40 = "อิมาชิโนะ มิซากิ"
61050-41 = "ฉะ... ฉันสึจินากะ ฮิโยริ... ค่ะ แหะ... แหะๆ..."
61050-42 = "ฉันโจมาเอะ ซาโอริ..."
61050-43 = "อย่างน้อยเธอก็น่าจะรู้เกี่ยวกับฉันดีนะ"
61050-45 = "ค่ะ ไม่ใช่แค่คุณซาโอริคนเดียวหรอกค่ะ ฉันรู้จักทุกคนดีจากข้อมูลในเอกสารที่มีค่ะ"
61050-46 = "และแน่นอนว่าพวกคุณทุกคนก็น่าจะรู้เกี่ยวกับอดีตของฉันกันอย่างดีด้วยค่ะ"
61050-47 = "พูดชวนให้คิดสินะ..."
61050-48 = "ฮะ... เฮือกกก..."
61050-49 = "มิซากิ พอได้แล้ว ตอนนี้ยังเป็นสถานการณ์ที่เราคุยกันดีๆ ได้ไม่ใช่เหรอ? เพราะงั้นก็น้อยๆ หน่อย... เข้าใจใช่มั้ย? ซาโอริเองก็ด้วย"
61050-51 = "ก็ได้..."
61050-52 = "ฉันจะระวัง"
61050-54 = "ถ้างั้นก็ ทุกคนคะ ในเมื่อมารวมตัวกันครบแล้ว งั้นเราเข้าไปข้างในกันก่อนมั้ยคะ?"
61050-55 = "คะ... คะ...? ข้างใน... เรือสำราญน่ะเหรอคะ...?"
61050-56 = "ค่ะ ฉันเช่าเหมาลำเรือสำราญนี้ไว้ทั้งวันแล้ว เพราะงั้นก็ไม่ต้องกังวลสายตาของคนอื่นหรอกค่ะ"
61050-58 = "?!"
61050-59 = "!?"
61050-60 = "......"
61050-61 = "[ns3] \"เช่าเหมาลำทั้งวันเลยเหรอ... เล่นใหญ่ไปหรือเปล่า?!\"\n[ns4] \"เช่าเหมาลำทั้งวันเลยเหรอ... เวอร์ไปหน่อยหรือเปล่า!?\""
61050-64 = "คะ? ไม่หรอกค่ะ ฉันไม่ได้สั่งให้เรือสำราญแล่นไปที่ไหน ก็แค่ขอเช่าพื้นที่และสิ่งอำนวยความสะดวก#nบนเรือในขณะที่เรือจอดอยู่เท่านั้นเองค่ะ"
61050-65 = "ถือว่ายังอยู่ในงบการใช้จ่ายปกติค่ะ งั้นก็ไปกันเถอะค่ะ"
61050-69 = "น่ากลัว... น่ากลัวจัง... น่ากลัวกว่าผู้ใหญ่อีกค่ะ... ฉันอยากให้ทั้งหมดนี่เป็นแค่ความฝันจังเลย..."
61050-70 = "เป็นคนที่ต่างกับพวกเราในหลายๆ ด้านเลยนะ..."
61050-71 = "วะ... เวลาแบบนี้ต้องทำยังไงดีนะ..."
61050-73 = "[ns] \"ตอบรับความหวังดี... ก่อนดีกว่าเนอะ...?\""
61050-75 = "อื้อ งั้นก็ตามคุณนางิสะเข้าไปกันเถอะ"
61050-76 = "รู้สึกวางใจเพราะฉันดูสุขุมงั้นเหรอ?"
61050-77 = "ฮุฮุ พอเห็นว่าแม้แต่คุณครูเองก็ตกใจ ฉันก็เลยคิดว่านี่เป็นสถานการณ์ที่ไม่คาดคิดจริงๆ"
61050-78 = "ถ้าทุกอย่างไม่เป็นไปตามคาด ฉันว่าเราก็น่าจะปล่อยให้มันเป็นไปนะ?"
61050-79 = "[ns] \"ตอนนี้ครูคงต้องเอาอย่างอาสึโกะแล้วละ...\""
61050-83 = "วะ... ว้าวว..."
61050-84 = "หิวกันหรือเปล่าคะ? ภัตตาคารบนเรือลำนี้เป็น 'ภัตตาคารที่ไม่มีเมนู' เพราะงั้นถ้าอยากรับประทานอะไร ก็สั่งได้ตามต้องการเลยค่ะ"
61050-86 = "ถ้าไม่มีเมนู แล้วจะทำกิจการยังไง? หมายความว่ายังไงเนี่ย...?"
61050-87 = "[ns5] \"ไม่ใช่อย่างนั้น มิซากิ... เชฟที่นี่ทำได้ทุกเมนูต่างหาก...\"\n[ns6] \"หมายความว่า... เชฟเก่งถึงขนาดที่ทำอาหารได้ทุกเมนูน่ะ!\""
61050-90 = "งะ... งั้นหรอกเหรอ...!! ทำแบบนั้นได้ด้วยเหรอ...?"
61050-91 = "จะให้พวกฉันกินอาหารเย็นมื้อสุดท้ายหรืออะไรทำนองนั้นเหรอ...? จริงๆ เลย..."
61050-93 = "มะ... ไม่ค่ะ อาหารเย็นมื้อสุดท้ายอะไรกันคะ ฉันไม่ได้มีเจตนาแบบนั้น..."
61050-94 = "คุณนางิสะ ขอโทษด้วยนะ พวกฉันไม่ค่อยคุ้นเคยกับสถานที่แบบนี้เท่าไรน่ะ"
61050-95 = "งั้นเรื่องอาหาร ฉันขอรบกวนคุณนางิสะแล้วกัน ได้ใช่มั้ย?"
61050-96 = "ค่ะ แน่นอนค่ะคุณอาสึโกะ ถ้างั้น มาสเตอร์คะ ฉันจะสั่งอาหารให้เองค่ะ"
61050-101 = "รับทราบครับ คุณหนูนางิสะ อยากทานอะไรบอกมาได้เลยครับ"
61050-102 = "งั้นเอาเป็น..."
61050-104 = "(หลังจากนั้นก็มีอาหารเสิร์ฟทีละคอร์สๆ... ซึ่งเป็นเมนูที่ไม่เคยเห็นมาก่อนในชีวิต)"
61050-110 = "(นางิสะเพลิดเพลินกับอาหารราวกับเป็นจานที่คุ้นเคย แต่คนอื่นๆ กลับไม่คุ้นชิน และแทบจะไม่รู้สึกถึง#nรสชาติที่แท้จริงของเมนูแปลกตาเหล่านั้นเลย)"
61050-111 = "(ยกเว้นอยู่หนึ่งคน...)"
61050-115 = "อาหย่อยย... อาหย่อยจังเลยค่ะ!"
61050-116 = "ฮะ... ฮิโยริ? พูดระหว่างกินข้าวมันเสียมารยาทนะ..."
61050-117 = "ง่ำๆ เอื้อก...! ขะ... ขอโทษค่ะ...! แต่มันอร่อยจนแสงออกปากเลย... นี่เป็นครั้งแรกที่ฉันได้กินอะไร#nแบบนี้เลยค่ะ!"
61050-118 = "ค่ะ ทานเยอะๆ นะคะ เห็นอย่างนี้ฉันก็พลอยดีใจไปด้วยเลยค่ะ"
61050-120 = "อาหารเป็นยังไงบ้างคะ ทุกคน?"
61050-121 = "[s] \"อลังการมากเลย...\""
61050-122 = "ขอบคุณสำหรับอาหารนะ... ขอบคุณจริงๆ"
61050-123 = "อื้อ... ฉันถึงกับถามตัวเองเลยละว่าพวกเรากินอะไรแบบนี้ได้จริงๆ เหรอ..."
61050-127 = "ขะ... ขอห่อกลับไปด้วยได้มั้ยคะ...?"
61050-128 = "ฉันก็พอเข้าใจอยู่หรอก แต่อดใจไว้ก่อนเถอะนะ ฮิโยริ"
61050-129 = "แงงง... ค่ะ..."
61050-131 = "งั้นเรามา 'จิบชา' เพื่อช่วยย่อยสักหน่อยดีมั้ยคะ?"
61050-132 = "นี่คือชาจากแบรนด์ <ทไวไลท์> ที่ฉันชอบค่ะ แบรนด์นี้ใช้ใบชาดีทีเดียวค่ะ"
61050-133 = "ให้ผมชงให้มั้ยครับ คุณหนู?"
61050-134 = "ไม่เป็นไรค่ะ วันนี้ฉันจะชงให้เองค่ะ ทุกคนช่วยรอสักครู่ได้มั้ยคะ?"
61050-136 = "(นางิสะชงชาแดงด้วยทักษะที่ชำนาญ)"
61050-141 = "(กลิ่นหอมฟุ้งของชาแดงกระจายไปทั่ว)"
61050-143 = "เอาละ เสร็จแล้วค่ะ ถึงจะไม่ใช่อะไรที่ยิ่งใหญ่มาก แต่ก็ดื่มให้อร่อยนะคะ"
61050-147 = "แหะ... แหะๆ... ทั้งอุ่นและก็รสชาติดีจังเลยนะคะ... นึกถึง 'วอเทอร์ ไทม์' ในอาเรียสสมัยก่อนขึ้นมา#nเลยค่ะ..."
61050-148 = "ใช่... แต่ก่อนเคยมีอะไรแบบนั้นด้วย"
61050-150 = "วอเทอร์... ไทม์ งั้นเหรอคะ...?"
61050-152 = "มันไม่ใช่เรื่องที่ทำเป็นประจำหรอก แต่ที่นั่นจะแจกน้ำอุ่นให้คนที่ได้คะแนนดีเยี่ยมจากการฝึกซ้อม#nคนละแก้วน่ะ"
61050-153 = "แล้วก็แจกในเวลาที่... ไล่เลี่ยกับตอนนี้เลยด้วย"
61050-155 = "[ns] (น้ำอุ่น...?)"
61050-156 = "คนที่ได้น้ำแก้วนั้นไปจะละเลียดดื่มทีละนิดจนน้ำเย็นไปเลยค่ะ..."
61050-157 = "น่าทึ่งใช่มั้ยล่ะคะ? มันเป็นแค่น้ำอุ่นแท้ๆ... แต่ในเวลานั้น น้ำแก้วนั้นเป็นสิ่งที่อร่อยกว่าอะไรทั้งหมด#nเลยละค่ะ..."
61050-158 = "อ๊ะ! แน่นอนว่าชาของคุณนางิสะ...? ท่านนางิสะ...? อร่อยกว่ามากค่ะ!"
61050-160 = "เรียกฉันตามสบายได้เลยค่ะ คุณฮิโยริ"
61050-161 = "เหนือสิ่งอื่นใด ฉันเป็นคนที่ขอให้คุณครูเชิญทุกคนมาที่นี่เองนี่คะ"
61050-162 = "หมายความว่าคุณเป็นคนติดต่อคุณครูเกี่ยวกับเรื่องนี้ก่อนเหรอ...?"
61050-163 = "......"
61050-164 = "ได้ไงล่ะ? คนที่แอบคุยกับคุณครูน่าจะมีแค่เด็ก 2 คนนั้นที่ย้ายมาจากอาเรียสไม่ใช่เหรอ?"
61050-166 = "[ns] \"เรื่องนั้นน่ะ! คือว่า!\""
61050-167 = "ไม่เป็นไรค่ะคุณครู ฉันคิดว่าฉันควรต้องอธิบายเรื่องนี้ด้วยตัวเองค่ะ"
61050-168 = "อย่างน้อยนั่นก็เป็นเหตุผลที่ฉันขอให้มาพบกันในวันนี้นี่คะ"
61050-169 = "สิ่งแรกที่ฉันควรบอกก่อนก็คือ ใช่ค่ะ น่าจะต้องเป็นเรื่องนี้ก่อน"
61050-170 = "ฝ่ายข่าวกรองของทรีนิตี้ทำงานเก่งมากค่ะ"
61050-171 = "งั้นเหรอ... คงรายงานข่าวกันตั้งแต่ตอนที่เด็กพวกนั้นไปหาคุณครูแล้วสินะ"
61050-172 = "และนั่นก็หมายความว่า... เด็กที่ย้ายมาจากอาเรียสทุกคนถูกจับตาดูอยู่ตลอดเวลา"
61050-173 = "เรื่องนั้น..."
61050-174 = "[ns7] \"ถึงตาของครูแล้วสินะ\"\n[ns8] \"เห็นทีต้องเป็นตาของครูแล้วละ\""
61050-177 = "คะ... คุณครู?"
61050-178 = "[s9] \"ไม่เป็นไร นางิสะ เรื่องแบบนี้ถ้าพูดเองจะยิ่งส่งผลเสียมากกว่านะ\"\n[s10] \"ไหนๆ ก็เป็นเรื่องที่นางิสะบอกครู และครูก็ตรวจสอบมาแล้วนี่\""
61050-181 = "งั้นฉันรบกวนด้วยนะคะ..."
61050-186 = "[ns11] \"เด็กจากอาเรียสทุกคนมีนักเรียนบัดดี้ในทรีนิตี้\"\n[ns12] \"เด็กจากอาเรียสมีบัดดี้ที่คอยดูแล ไม่ใช่สอดส่อง\""
61050-189 = "[ns13] \"แล้วทุกคนก็บอกบัดดี้เองว่ามาเจอกับครู\"\n[ns14] \"แล้วทุกคนก็บอกบัดดี้ว่ามาขอคำปรึกษาจากครู\""
61050-192 = "คิดว่าพวกฉันต้องเชื่อคำพูดนั้นถึงแค่ไหนเหรอ...?"
61050-193 = "ฉันเข้าใจดีค่ะว่าพวกคุณจากอาเรียสทุกคนคงไม่ไว้วางใจทรีนิตี้ง่ายๆ... โดยเฉพาะอย่างยิ่งกับฉันที่#nเป็นสภาน้ำชา แต่ว่า..."
61050-195 = "[ns] \"อย่างน้อยก็ช่วยเชื่อใจครูเถอะนะ\""
61050-197 = "......"
61050-198 = "ฉะ... ฉันเชื่อใจค่ะ... ก็คุณครูเป็นคุณครูนี่คะ..."
61050-199 = "ฮิโยริ..."
61050-200 = "ตะ... แต่คุณครูก็เคยช่วยพวกเราไว้ตั้งหลายอย่าง..."
61050-201 = "ที่จริงแล้วถ้าคุณครูตั้งใจขึ้นมา ก็แค่ติดต่อไปที่วัลคิรี่หรือที่อื่นๆ..."
61050-202 = "แล้วก็โยนพวกเราให้สำนักควบคุมหรือที่อื่นที่น่ากลัวกว่านั้นก็ยังได้..."
61050-203 = "เฮือก...?! อย่าบอกนะคะว่าเรียกมาเพราะจะทำแบบนั้นน่ะ!? ที่ผ่านมาคุณครูทำดีกับพวกฉัน ก็เพื่อการนี้เหรอคะ...?"
61050-204 = "แงงงง~! โดนหลอกเข้าให้แล้วค่ะ! หมดกัน! ชีวิตจบเห่แล้ว! ชีวิตมีแต่ความเจ็บปวดจริงๆ ด้วยค่ะ! งั้นฉันขอดื่มชาแดงนี้ให้หมดก่อนไปนะคะ!"
61050-211 = "เอ่อ... คุณครูคะ? นี่มัน..."
61050-212 = "[s15] \"ไม่ต้องห่วงหรอก... ฮิโยริน่าเอ็นดูแบบนี้ละ...\"\n[s16] \"ไม่เป็นไรหรอก วางใจเถอะนะ...\""
61050-215 = "งะ... งั้นเหรอคะ...?"
61050-216 = "คะ? ขอให้ฉันอย่ากังวลเรื่องนี้มากเกินไป แล้วทำสิ่งที่ตัดสินใจได้เลยงั้นเหรอคะ?"
61050-217 = "......"
61050-218 = "ค่ะ เข้าใจแล้วค่ะ ถ้าไม่ทำอย่างนั้น... ฉันก็คงเก็บเรื่องนี้ไว้เป็นความลับกับทุกคน แล้วก็ไม่มีเหตุผลที่จะมาที่นี่ด้วย"

[translation]
61050-1 = "第5話;最後的晚餐（？）"
61050-3 = "贊助者……居然是桐藤渚……？"
61050-4 = "什麼意思！這種事我完全沒聽說過啊！！！"
61050-5 = "嗚哇啊～！完蛋了！沒救了！#n我們接下來一定會被拖去三一，然後遭受拔指甲的拷問！"
61050-9 = "不，那種事已經……"
61050-10 = "已經？意思就是曾經有過對吧！#n奧利斯外典裡也是這麼紀載的！"
61050-23 = "老，老師……？"
61050-24 = "老師？"
61050-26 = "[ns1]「大家先冷靜～」\n[ns2]「我跟渚都沒有其他居心啦～」"
61050-30 = "這話根本沒說服力好嗎！"
61050-31 = "嗚哇啊啊啊～！"
61050-33 = "咳哼。那麼請容我再次向各位問好。#n奧利斯小隊的各位都別來無恙嗎？"
61050-34 = "我是茶會的現任主席，名叫桐藤渚。"
61050-35 = "你好，渚同學。我是奧利斯小隊的秤敦子。#n謝謝你主動向我們打招呼。"
61050-36 = "不必客氣，還請多多指教。"
61050-40 = "戒野美咲。"
61050-41 = "我，我叫槌永日和……#n嘿，嘿嘿……"
61050-42 = "……我是錠前沙織。"
61050-43 = "與我有關的事，你應該已經很清楚了吧。"
61050-45 = "是的。不只是沙織同學……#n關於各位的事，我至少都藉由文件了解過。"
61050-46 = "當然……各位想必也對我的經歷瞭如指掌吧。"
61050-47 = "……這個人話中有刺啊。"
61050-48 = "噫，噫噫……"
61050-49 = "等等，美咲。我們現在還能好好談話，不是嗎？#n所以先冷靜下來……好嗎？沙織你也是。"
61050-51 = "……知道了。"
61050-52 = "我會注意。"
61050-54 = "那麼，各位。#n既然大家都到齊了，我們就先進去吧？"
61050-55 = "咦，咦咦……要進到郵輪裡面嗎……？"
61050-56 = "是的。我今天把這艘郵輪包下來了，所以各位不必擔心其他人的視線。"
61050-58 = "！？"
61050-59 = "！？"
61050-60 = "……"
61050-61 = "[ns3]「把整艘郵輪……包下了一天……！？」\n[ns4]「這，這會不會太誇張了！？」"
61050-64 = "嗯？不，您不必擔心。#n因為我並沒有要讓郵輪出航，只是在停泊的情況下租用設施和空間而已。"
61050-65 = "這種程度還在一般支出的範圍之內。#n請跟我來吧。"
61050-69 = "好可怕……太可怕了……#n簡直比大人還可怕……我寧願這一切只是場夢……"
61050-70 = "各方面的層級都跟我們完全不同啊……"
61050-71 = "這，這種時候該怎麼辦才好……"
61050-73 = "[ns]「暫且……接受這份好意怎麼樣？」"
61050-75 = "嗯，那就跟著渚同學走吧。"
61050-76 = "看到我冷靜的樣子覺得很安心？"
61050-77 = "呵呵。看到老師也有點慌張，反而讓我覺得這真的是意料之外的狀況。"
61050-78 = "既然一切都無法預期，不如就順著情況走吧？"
61050-79 = "[ns]「我也應該向敦子學習呢……」"
61050-83 = "哇，哇啊……"
61050-84 = "各位應該都餓了吧？#n這艘船上的餐廳供應的是「無菜單料理」。#n想吃什麼料理都可以隨意提出。"
61050-86 = "沒有菜單的話……不會很難營業嗎？#n這是什麼意思……？"
61050-87 = "[ns5]「不是這樣的，美咲……」\n[ns6]「這是無論什麼料理都能做出來的……自信表現哦！」"
61050-90 = "什，什麼……！？#n這種事真的能做得到嗎……？"
61050-91 = "這種誇張程度……該不會是要給我們吃什麼「最後的晚餐」吧？"
61050-93 = "不，不是的。#n我完全沒有這個意思……"
61050-94 = "渚同學？不好意思，我們不是很習慣這種地方。"
61050-95 = "所以能不能請渚同學替我們安排呢？"
61050-96 = "當然沒問題，敦子同學。#n主廚，可以麻煩你嗎？"
61050-101 = "我明白了，渚小姐。請儘管吩咐。"
61050-102 = "那麼──"
61050-104 = "（不久之後，生平從未見過的套餐料理……一道道端了上來）"
61050-110 = "（雖然渚熟練地享用著料理，其他人卻都因為太陌生的關係，甚至幾乎嚐不出味道）"
61050-111 = "（……除了某個人之外）"
61050-115 = "好好初……好好初哦……！"
61050-116 = "日，日和？#n邊吃東西邊說話是不禮貌的行為哦……？"
61050-117 = "（嚼嚼，咕嚕……！）對，對不起……！#n可是真的太好吃了……這種東西我還是第一次吃到呢！"
61050-118 = "歡迎各位多多享用。我也感到很高興呢。"
61050-120 = "各位，今天的餐點還滿意嗎？"
61050-121 = "[s]「太厲害了……」"
61050-122 = "……謝謝你的款待。真的非常好吃。"
61050-123 = "是啊……好到讓人不禁懷疑自己有沒有資格吃到這種東西了……"
61050-127 = "那，那個，可以讓我打包一點回去嗎……？"
61050-128 = "我能理解你的心情，但現在還是忍耐一下吧，日和。"
61050-129 = "嗚嗚嗚……好……"
61050-131 = "那麼，接下來要不要一起來個「Tea Time」呢？"
61050-132 = "這是我喜歡的「唐凌」品牌推出的茶葉，品質非常不錯。"
61050-133 = "需要為您代勞嗎？"
61050-134 = "沒關係。這裡就由我親自為各位沖泡吧。#n還請各位稍後片刻。"
61050-136 = "（渚熟練地泡起了紅茶）"
61050-141 = "（茶香瀰漫著整個空間）"
61050-143 = "好，完成了。#n雖然只是粗茶，還請各位慢用。"
61050-147 = "嘿，嘿嘿……這種溫暖又舒服的感覺……#n讓我想起了以前奧利斯的「Water Time」呢……"
61050-148 = "……是啊，當時確實有那種東西。"
61050-150 = "Water Time……？"
61050-152 = "雖然不是慣例，但有時候會給訓練成績優秀的人一杯熱水。"
61050-153 = "時間……也差不多是這個時段吧。"
61050-155 = "[ns]（熱水……？）"
61050-156 = "那時我們都會很珍惜地慢慢喝，直到水漸漸涼掉……"
61050-157 = "很神奇對吧？#n明明只是普通的熱水，卻覺得比什麼都好喝……"
61050-158 = "啊！當然渚……同學？渚大人……？的茶更好喝哦！"
61050-160 = "隨意稱呼我就可以了，日和同學。"
61050-161 = "畢竟這次邀請老師和各位一起來到這裡的人，正是我。"
61050-162 = "……意思是你事先跟老師談過這件事？"
61050-163 = "……"
61050-164 = "怎麼做到的？#n老師之前應該只跟兩個奧利斯出身的轉學生私下聊過才對。"
61050-166 = "[ns]「這，這是因為……！」"
61050-167 = "不，老師。至少這件事情，應該由我親自說明。"
61050-168 = "因為這才是我請老師安排這次聚會的目的。"
61050-169 = "首先……應該從這點開始說起吧。"
61050-170 = "三一情報部的能力非常優秀。"
61050-171 = "……原來如此。#n從那些孩子和老師見面的時候開始，就已經有報告送出去了吧。"
61050-172 = "同時這也代表……所有奧利斯的轉學生都會受到監視。"
61050-173 = "這……"
61050-174 = "[ns7]「接下來該輪到老師出場了。」\n[ns8]「雖然交棒得有點快，但總之就是這樣。」"
61050-177 = "老，老師！？"
61050-178 = "[s9]「沒關係，渚。這種事自己開口反而會適得其反。」\n[s10]「反正你已經跟我說過，我也確認過內容了。」"
61050-181 = "……麻煩您了。"
61050-186 = "[ns11]「轉學生確實會由三一的學生一對一負責。」\n[ns12]「不過並不是為了監視，而是為了輔助轉學生適應。」"
61050-189 = "[ns13]「就連我跟他們見過面這件事……」\n[ns14]「也是那些轉學過來的孩子們自己說出來的。」"
61050-192 = "……我們該相信到什麼程度？"
61050-193 = "我明白奧利斯的各位難以對三一……甚至身為茶會一員的我抱持信任的態度。#n可是……"
61050-195 = "[ns]「能不能至少相信老師我呢？」"
61050-197 = "……"
61050-198 = "我，我相信……#n因為是老師嘛……"
61050-199 = "日和……"
61050-200 = "老，老師在很多方面都幫助過我們……"
61050-201 = "而且只要老師有那個意思，隨時都能聯絡女武神之類的地方……"
61050-202 = "就算要立刻把我們送去矯正局……或者更可怕的地方都沒問題……"
61050-203 = "咦……！？難道是我想的這樣嗎！？#n老師至今為止對我們好，都是為了這一刻……？"
61050-204 = "嗚哇啊啊～！完蛋了！結束了！毀滅了！人生果然只有痛苦！#n拜託至少讓我把這壺紅茶喝完再走吧！"
61050-211 = "老師……？#n這是……"
61050-212 = "[s15]「沒事的……這才是我們的日和嘛……」\n[s16]「而且你可以放心了……」"
61050-215 = "是，是嗎……"
61050-216 = "嗯？不必在意這些，去做自己決定要做的事？"
61050-217 = "……"
61050-218 = "是啊，您說的對。#n如果不這麼做的話……就沒有理由瞞著大家出現在這裡了。"
61050-219 = "各位。我不打算用諸如「只是以個人身分來到這裡」的拙劣藉口。"
61050-220 = "因為學生會長就是這樣的位置。#n無論做什麼都需要解釋，不管說什麼都會被追問真意。"
61050-221 = "所以……"
61050-226 = "對不起。"
61050-230 = "……咦！？"
61050-231 = "他，他現在是……！"
61050-232 = "……"
61050-233 = "無論做什麼都需要解釋，不管說什麼都會被追問真意……對吧。 "
61050-234 = "既然如此，我可以向你提出這個問題嗎，渚同學？ "
61050-236 = "當然可以。#n我的意圖就和各位現在見到的一樣。 "
61050-237 = "無論作為一名三一的學生，還是茶會的主席……"
61050-238 = "或者進一步說……身為現今三一的代表。 "
61050-239 = "我希望向各位和奧利斯分校致上歉意。 "
61050-240 = "為什麼？最先對三一發動恐怖行動的，應該是我們才對。 "
61050-241 = "沒錯。當時確實是奧利斯小隊的四位主導了那起事件。 "
61050-242 = "不過當時……確實存在必須那麼做的理由。 "
61050-243 = "不……應該說「曾經」存在比較正確吧。 "
61050-244 = "自從「公會議」之後，三一與奧利斯……最終走到了這樣的結果。 "
61050-245 = "但即便如此，我們兩所學園在某種意義上……#n和其他學園相比，應該依然存在本該是一體的部分才對。 "
61050-246 = "所以是突然感到良心不安，事到如今才跑來道歉嗎？ "
61050-247 = "美咲。 "
61050-249 = "沒關係。我認為各位完全有資格說這種話。 "
61050-250 = "以「解釋差異」為由驅逐奧利斯，這確實是三一的……陳舊錯誤。 "
61050-251 = "除此之外，我也在思考自己一直以來……"
61050-252 = "是否都因為政治局勢或立場之類的理由，過於忽視了身邊正在受苦的人們呢。"
61050-253 = "明明那些痛苦與折磨至今仍在延續……對其置之不理也並不是正確的事。"
61050-255 = "……我還是難以理解。 "
61050-256 = "咦，咦咦！？ "
61050-257 = "雖然我不喜歡回頭追究過去的事……"
61050-258 = "但我就直說吧。#n那場伊甸園條約事件的受害者，毫無疑問是你桐藤渚。 "
61050-259 = "而加害者則毫無疑問是我們奧利斯小隊。 "
61050-260 = "不覺得奇怪嗎？#n受害者竟然先向加害者道歉，這根本不合常理。 "
61050-261 = "每當這種說不通的事情發生的時候……背後往往都隱藏著其他盤算。 "
61050-263 = "美咲，克制一下。 "
61050-264 = "……"
61050-265 = "沒關係，各位。#n美咲同學的質疑相當合理。  "
61050-266 = "而我……既有大家都能接受的答案，也有並非如此的答案。 "
61050-267 = "大家都能接受的答案是什麼？ "
61050-268 = "那就是…… "
61050-269 = "如果「奧利斯分校殘存學生」這個三一後方的不穩定因素，#n能藉由我一個人道歉就消除的話……"
61050-270 = "這將會是個相當划算的政治行為。 "
61050-271 = "……是啊，你一開始這麼說不就好了。 "
61050-272 = "等等。先聽渚同學把話說完吧。"
61050-273 = "那並非如此的答案又是什麼呢？ "
61050-275 = "…… "
61050-276 = "比如說，某個曾經擔任三一茶會主席的學生……"
61050-277 = "在經歷名為伊甸園條約的特殊事件後，開始思考事情為何會走到那個局面。"
61050-278 = "並且，在接觸到除了茶會成員之外難以取得的……#n過去的記錄之後，從原點重新了審視一切。"
61050-279 = "接著在俯瞰三一校園時……突然浮現了「必須這麼做」的想法。"
61050-280 = "因為這兩所學園……不能再維持現在這種關係了。  "
61050-281 = "而為了達成這一點──"
61050-282 = "背負著過錯的三一，就必須以某種方式釋出和解的意願……他或許是這麼想的吧。 "
61050-283 = "……完全是某個力氣大的粉紅公主會說的話呢。 "
61050-284 = "是啊……或許事到如今，他才總算能稍微理解那位朋友的心情了吧。"
61050-286 = "…… "
61050-287 = "…… "
61050-288 = "嘿，嘿嘿…… "
61050-292 = "那麼，接下來該輪到我了。 "
61050-296 = "……！ "
61050-297 = "作為曾經被稱為皇家血統的人……"
61050-298 = "作為或許在過去的奧利斯分校……"
61050-299 = "最接近學生會長位置的人…… "
61050-300 = "我在此為我們所引發的所有恐怖行動，致上歉意。 "
61050-301 = "謝謝你願意這麼說。 "
61050-302 = "不過我並不認為光是向在場的各位道歉，所有問題就能迎刃而解。 "
61050-303 = "除了已經轉入三一的奧利斯學生們之外……"
61050-304 = "如今依然留在奧利斯分校的學生們……#n總有一天，我也必須向他們道歉才行。 "
61050-305 = "同時，道歉必須伴隨著責任。 "
61050-306 = "而所謂的責任，通常需要以行動來表示…… "
61050-307 = "這一點，是我從老師身上學到的。 "
61050-309 = "……我明白了。#n當然，我也有許多該向你道歉的事……"
61050-310 = "不過如果繼續說下去，恐怕剩下的時間都會花費在互相道歉上……#n我想還是先進入下一個話題吧。 "
61050-311 = "為什麼……你會想親自出席這次的會面呢？#n在我的理解之中，你應該有話要對我們說才對。 "
61050-312 = "……否則你也不會特地向老師提出這個要求，只要事後私下了解情況就夠了吧。 "
61050-313 = "你的推測相當正確，沙織同學。 "
61050-314 = "那麼，是時候該進入正題了。 "
61050-315 = "關於「考試」的事，我想老師先前應該已經向各位提過了才對。"
61050-316 = "……？#n難道說……？ "
61050-317 = "沒錯。"
61050-318 = "或許這同樣是某種強硬、偏頗……甚至稱得上傲慢的想法也說不定。"
61050-319 = "但我依然和老師一樣……"
61050-320 = "希望各位……以及留在奧利斯分校的所有人…… "
61050-321 = "都能夠堂堂正正地，成為社會的一員。 "
61050-322 = "謝謝你的心意，渚同學。 "
61050-323 = "不過如果換個角度來看，這種想法也可能被視為所謂的「施恩」吧？ "
61050-327 = "隱藏在體貼與親切背後的，實際上是「我比你優越」的心態…… "
61050-328 = "而自己……甚至可能對此渾然不知。 "
61050-329 = "喜歡教導他人，用狹隘的例子來裁斷別人的人生……正是這種心態的體現。"
61050-330 = "但渚同學並不是這樣吧？ "
61050-331 = "敦子同學…… "
61050-332 = "我認為如果對方能意識到「自己可能有這樣的心態」的話，就是個值得信任的對象。"
61050-333 = "對吧，美咲？ "
61050-335 = "……我不覺得有什麼問題。 "
61050-336 = "其實，就算渚同學真的有那種想法……嘿，嘿嘿…… "
61050-337 = "嗯，我也覺得……這樣沒問題…… "
61050-342 = "……謝謝你們。 "
61050-343 = "我們也感謝你的寬容。 "
61050-344 = "那麼……你希望我們小隊和老師為你做些什麼呢？ "
61050-345 = "咦？我，我好像還沒說到那一步吧？#n你為何……！ "
61050-346 = "唔嗯…… "
61050-347 = "雖然這麼說也許會顯得有點狂妄……"
61050-349 = "你就當作是「在街頭打滾久了，總會明白一些事」吧。 "
61050-351 = "隊，隊長……！ "

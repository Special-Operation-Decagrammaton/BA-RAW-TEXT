[translation]
10002010-1 = "ตอนที่ 1;อุปสรรคในวันหยุดฤดูร้อน 1"
10002010-2 = "อะ... เอาเป็นว่าไหนๆ ก็มาถึงทะเลกันแล้ว มาเริ่มภารกิจที่ทำได้อย่างแรกกันเถอะค่ะ!"
10002010-7 = "กะ... ก่อนอื่นในรายการภารกิจ... ที่ทำได้ง่ายที่สุด..."
10002010-8 = "...อันนี้ค่ะ! <ก่อปราสาททรายกับการอบทรายร้อน> "
10002010-9 = "ฮิฮิ ถ้าเป็นอันนี้คงไม่มีปัญหาแน่นอนค่ะ!"
10002010-10 = "ถ้าทำไม่เป็นก็ไม่เป็นไรค่ะ เดี๋ยวฉันจะเริ่มก่อปราสาททรายให้ดูนะคะ"
10002010-11 = "คุณครู! รบกวนฝากกล้องหน่อยนะคะ! ถ้าคุณครูเห็นจังหวะเหมาะๆ ก็ถ่ายรูปเก็บไว้ได้เลยนะคะ"
10002010-16 = "ขอรบกวนด้วยนะคะ เราจะต้องถ่ายรูปการพักผ่อนที่สนุกสนานไปเป็นหลักฐานให้ได้ค่ะ!"
10002010-17 = "[s1] \"อืม... รู้สึกเหมือนเปลี่ยนตัวเอกยังไงก็ไม่รู้...\"\n[s2] \"นี่คือมาเที่ยวเพื่อถ่ายรูปเก็บเป็นหลักฐานงั้นเหรอ?\""
10002010-18 = "คือว่า... มันก็ควรเป็นแบบนั้นไม่ใช่เหรอคะ"
10002010-19 = "คือว่า... มันก็ควรเป็นแบบนั้นไม่ใช่เหรอคะ"
10002010-20 = "ก็พวกเรารับภารกิจนั่นมาแล้วนี่คะ!"
10002010-21 = "ฉันบอกคุณครูไปแล้วนี่คะ ถ้าเกิดทำภารกิจล้มเหลวล่ะก็คงเกิดเทศกาลละเลงเลือดขึ้นแน่ค่ะ!#nไหนจะเรื่องถอดเล็บนั่นอีก! เราต้องทำให้สำเร็จให้ได้..."
10002010-22 = "..."
10002010-23 = "ฮะ... เฮือก!? ขะ...ขอโทษด้วยค่ะ! คุณครูคงรู้สึกลำบากใจใช่ไหมคะ...!?"
10002010-24 = "[s] \"ไม่เป็นไรเลย ดูน่าสนุกดีออก\""
10002010-25 = "งะ...งั้นเหรอคะ...? ฉะ...ฉันไม่ค่อยแน่ใจเท่าไหร่..."
10002010-26 = "แต่มันไม่ได้ยากอะไร คงไม่มีปัญหาแน่นอนค่ะ!"
10002010-30 = "ก่อนอื่นก็เอาน้ำใส่ถังแบบนี้..."
10002010-33 = "เอาล่ะ... แล้วพอขุดทรายเสร็จแล้ว..."
10002010-34 = "ฮึบ ฮึบ!"
10002010-36 = "..."
10002010-37 = "แล้วก็เอาทรายที่เปียกน้ำค่อยๆ ก่อเป็นรูปวงกลมเล็กๆ... แล้วก็ตกแต่ง..."
10002010-38 = "..."
10002010-41 = "แต่นแต๊น~! เสร็จแล้วค่า! สมบูรณ์แบบ!!"
10002010-42 = "..."
10002010-43 = "มะ...ไม่ชอบเหรอคะ?"
10002010-45 = "ปังๆๆๆๆ!!"
10002010-46 = "อะ... อ๊าาา?! ปราสาททรายที่อุตส่าห์ทำขึ้นมา...!?"
10002010-53 = "เคี๊ยก ฮ่าๆๆๆๆ...! "
10002010-54 = "ใครอนุญาตให้พวกเธอมาเล่นทรายที่นี่กัน? หา?"
10002010-55 = "ชายหาดมูอิกาฮามะนี้น่ะ เป็นอาณาเขตของกลุ่มเราตั้งแต่เมื่อวานนี้แล้ว!"
10002010-60 = "เอ๋?! คะ?!"
10002010-61 = "...?!"
10002010-62 = "..."
10002010-77 = "ฮะ... เฮือก!! "
10002010-78 = "อะไรน่ะ?! พลังที่สุดยอดนี่มันอะไรกัน...?!"
10002010-81 = "เจ้าพวกเด็กมีปัญหาาาาา...!!!"
10002010-83 = "เห็นด้วย..."
10002010-84 = "นับว่ากล้ามากเลยนะที่มาทำลายปราสาททรายของฮิฟุมิน่ะ"
10002010-85 = "คะ?! คะ...?!"
10002010-86 = "อภัยให้ไม่ได้ จะลุยล่ะนะ หัวหน้าชมรมทวงความยุติธรรม ไปสั่งสอนเจ้าพวกนั้นกันเถอะ"
10002010-87 = "ว้ากกกกกกกก!!"

[translation]
1008306-1 = "เปิดใจ"
1008306-6 = "[ns] \"มาถึงห้องไกล่เกลี่ยเฮียกกะเรียวรันตามที่เรียกแล้ว...\""
1008306-11 = "ฉันอยู่ที่ห้องเก็บของข้างหลัง ถ้ามาถึงแล้วก็มาที่นั่นนะ"
1008306-13 = "[ns] \"มีห้องเก็บของอยู่ข้างหลังด้วยสินะ\""
1008306-16 = "(คุณครูเดินไปไม่นานก็เจอห้องเก็บของอยู่ด้านหลังอาคารเฮียกกะเรียวรันตามที่คิเคียวบอก)"
1008306-20 = "[ns] \"คิเคียว ครูเข้าไปนะ\""
1008306-27 = "― [log=키쿄]มาตรงเวลาเลยนะ คุณครู[/log][wa:1540] "
1008306-29 = "― [log=키쿄]ยังทำหน้าทึ่มๆ เหมือนเดิมเลยนะ[/log][wa:670] "
1008306-32 = "[ns] \"แต่วันนี้คิเคียวดูสดชื่นจังเลยนะ\""
1008306-33 = "― [log=키쿄]งั้นเหรอ... มีใครบางคนบอกไว้น่ะ[/log][wa:1720] "
1008306-36 = "― [log=키쿄]ว่าการพักผ่อนสำคัญพอๆ กับการทำงาน[/log][wa:1170] "
1008306-38 = "― [log=키쿄]ไม่สิ สำคัญมากกว่าต่างหาก[/log][wa:2160] "
1008306-41 = "― [log=키쿄]ฮุฮุ ที่ปรึกษาที่ยอดเยี่ยม[/log][wa:1340] "
1008306-43 = "― [log=키쿄]ย่อมจดจำคำพูดของคนอื่นได้ดีอยู่แล้ว[/log][wa:380] "
1008306-46 = "― [log=키쿄]ดูสิ หนังสือที่ฉันอยากแนะนำคุณครู[/log][wa:1280] "
1008306-48 = "― [log=키쿄]มีเยอะขนาดนี้เลย[/log]"
1008306-51 = "― [log=키쿄]อ่า แต่ก่อนหน้านั้น...[/log][wa:330] "
1008306-53 = "― [log=키쿄]ช่วยทำความสะอาดห้อง แล้วก็ขอชาเขียวให้ฉันแก้วหนึ่งได้มั้ย?[/log][wa:1260] "
1008306-56 = "― [log=키쿄]ตัวเองเคยบอกไว้เองไม่ใช่เหรอ?[/log][wa:10] "
1008306-58 = "― [log=키쿄]คงจะไม่ปฏิเสธหรอกใช่มั้ย?[/log]"
1008306-61 = "[ns] \"ดีเลย ถ้าเรื่องนั้นวางใจครูได้ ครูจะซัพพอร์ตเต็มที่เลย!\""
1008306-62 = "― [log=키쿄]อืม... คุณก็เป็นคนอย่างนี้ละ[/log][wa:2040] "
1008306-64 = "― [log=키쿄]...ฉันรู้อยู่แล้ว[/log]"
1008306-67 = "― [log=키쿄]แต่ก็ไม่เป็นไรหรอก[/log]"
1008306-69 = "― [log=키쿄]เพราะฉัน คิริว คิเคียว ไม่ปฏิเสธโอกาสที่ตัวเองรอคอยหรอก[/log][wa:1330] "
1008306-72 = "― [log=키쿄]ฉันจะยอมให้ตามใจจนเต็มที่[/log]"
1008306-74 = "― [log=키쿄]งั้นก็เตรียมตัวไว้ล่ะ... ฮุฮุ[/log][wa:1350] "
1008306-77 = "(แล้วคุณครูกับคิเคียวที่มีสีหน้าที่แตกต่างจากปกติก็ได้ใช้เวลาด้วยกันในแบบที่ต่างออกไป)"

[translation]
1008306-1 = "With an Open Heart"
1008306-6 = "[ns] \"Well, I'm here at the Hyakkaryouran's regulatory office!\""
1008306-11 = "\"Upon arrival, go to the storage room in the back.\""
1008306-13 = "[ns] \"Huh. I didn't know there was even a room back there.\""
1008306-16 = "Not long after, I was able to find the place Kikyou mentioned in the back of Hyakkaryouran's club room."
1008306-20 = "[ns] \"I'm coming in, Kikyou.\""
1008306-27 = "― [log=키쿄]You've arrived, Sensei.[/log][wa:1460] "
1008306-29 = "― [log=키쿄]You appear rather confounded.[/log][wa:710] "
1008306-32 = "[ns] \"I've never seen you so relaxed.\""
1008306-33 = "― [log=키쿄]Well... A certain someone said as much before.[/log][wa:1120] "
1008306-36 = "― [log=키쿄]Finding time to rest is essential.[/log][wa:1130] "
1008306-38 = "― [log=키쿄]Perhaps even more so than I realized.[/log][wa:1680] "
1008306-41 = "― [log=키쿄]Hah. A good officer[/log][wa:1620] "
1008306-43 = "― [log=키쿄]does not so easily dismiss good advice from others.[/log][wa:10] "
1008306-46 = "― [log=키쿄]Come, look. There are many books [/log][wa:1280] "
1008306-48 = "― [log=키쿄]I'd like to recommend to you, Sensei.[/log]"
1008306-51 = "― [log=키쿄]However, first and foremost...[/log][wa:10] "
1008306-53 = "― [log=키쿄]I request your assistance in cleaning. And a cup of green tea.[/log][wa:1100] "
1008306-56 = "― [log=키쿄]Did you not say it yourself?[/log][wa:10] "
1008306-58 = "― [log=키쿄]That you would take care of me.[/log]"
1008306-61 = "[ns] \"I did. And I'll follow through on that promise, Kikyou!\""
1008306-62 = "― [log=키쿄]I suppose... That is the essence of your character.[/log][wa:1120] "
1008306-64 = "― [log=키쿄]Then again, this was already known to me.[/log]"
1008306-67 = "― [log=키쿄]In the end, it matters not.[/log]"
1008306-69 = "― [log=키쿄]I am not one to waste a rare opportunity.[/log][wa:1890] "
1008306-72 = "― [log=키쿄]I will strive to be your most spoiled student,[/log]"
1008306-74 = "― [log=키쿄]so you had best prepare yourself... Hah.[/log][wa:910] "
1008306-77 = "I enjoyed the day I spent with this version of Kikyou. Her expression seemed softer than usual."

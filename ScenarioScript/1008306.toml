[translation]
1008306-1 = "敞開心扉"
1008306-6 = "[ns]「雖然照桔梗說的來到了百花繚亂的調停室……」"
1008306-11 = "「我在後面的倉庫，到了之後就來那裡找我。」"
1008306-13 = "[ns]「原來後面還有個倉庫啊。」"
1008306-16 = "（沒走多遠便在百花繚亂調停室的後方發現了桔梗所說的倉庫）"
1008306-20 = "[ns]「桔梗，我進去囉。」"
1008306-27 = "― [log=키쿄]來的真準時呢，老師。[/log][wa:1980] "
1008306-29 = "― [log=키쿄]還是跟以前一樣傻里傻氣的表情。[/log][wa:1270] "
1008306-32 = "[ns]「今天的桔梗看起來跟平常不太一樣呢。」"
1008306-33 = "― [log=키쿄]也許是吧……畢竟某人曾這麼說過。[/log][wa:2320] "
1008306-36 = "― [log=키쿄]好好休息就和工作一樣……[/log][wa:2010] "
1008306-38 = "― [log=키쿄]不，比那還重要。[/log][wa:2840] "
1008306-41 = "― [log=키쿄]呵呵，優秀的參謀，[/log][wa:2020] "
1008306-43 = "― [log=키쿄]就連別人的金玉良言也會銘記於心哦。[/log][wa:1100] "
1008306-46 = "― [log=키쿄]你看，想推薦給老師的書……[/log][wa:2080] "
1008306-48 = "― [log=키쿄]有這麼多。[/log]"
1008306-51 = "― [log=키쿄]啊，不過在那之前……[/log][wa:810] "
1008306-53 = "― [log=키쿄]房間的打掃，還有一杯綠茶……可以麻煩你嗎？[/log][wa:2740] "
1008306-56 = "― [log=키쿄]這是你自己說過的吧？[/log][wa:260] "
1008306-58 = "― [log=키쿄]應該不會拒絕吧？[/log]"
1008306-61 = "[ns]「這種事就交給我吧，我會盡全力幫忙！」"
1008306-62 = "― [log=키쿄]沒錯……你就是這樣的人……[/log][wa:2640] "
1008306-64 = "― [log=키쿄]……雖然我早就知道了。[/log]"
1008306-67 = "― [log=키쿄]算了，無所謂。[/log]"
1008306-69 = "― [log=키쿄]桐生桔梗絕不會浪費這難得的大好機會。[/log][wa:2810] "
1008306-72 = "― [log=키쿄]我會使盡渾身解數向你撒嬌的……[/log]"
1008306-74 = "― [log=키쿄]要做好覺悟哦……呵呵。[/log][wa:2070] "
1008306-77 = "（於是和看起來跟平常不太一樣的桔梗，一起度過了不太尋常的一天）"

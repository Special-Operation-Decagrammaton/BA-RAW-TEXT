[translation]
83301200400-6 = "นี่ สมาชิกชมรมพัฒนาออนเซ็น ฉันขอคุยด้วยหน่อยได้ไหม?"
83301200400-7 = "หืม?"
83301200400-8 = "ว้ากกก?! ประธานกรรมการวินัย?! ทำไมถึงมาอยู่ที่นี่ได้ล่ะ?!"
83301200400-9 = "ฉะ... ฉันไม่ได้ทำอะไรเลยนะ! เดี๋ยวเย็นนี้จะเป็นเวรของฉันน่ะ ฉันก็เลยแค่มาพักแป๊บเดียวเท่านั้น!"
83301200400-10 = "ฉันไม่ได้จะมาตำหนิหรือก่อกวนเธอหรอก"
83301200400-11 = "ก็แค่... อยากถามเรื่องการพัฒนาออนเซ็นหน้าหอประชุมของแพนเดโมเนียม โซไซตี้ในวันนี้น่ะ"
83301200400-12 = "ว่าไงนะ?! จะมาเค้นข้อมูลจากฉันเหรอ?! คิดว่าฉันจะทรยศชมรมรึไง...!"
83301200400-13 = "ทรยศงั้นเหรอ... น่าสนใจดีนะ ตามมุมมองแล้วก็อาจจะเป็นอย่างนั้นได้สินะ"
83301200400-14 = "ฉันก็ไม่คิดที่จะซักไซ้หรอก แต่ว่า..."
83301200400-15 = "ฉันได้ยินข่าวลือมาว่าหมู่นี้ชมรมพัฒนาออนเซ็นกำลังวางแผนทำอะไรที่ไม่ชอบมาพากลอยู่ ฉันก็เลยแค่อยากจะตรวจสอบ"
83301200400-16 = "เห็นว่าเป็น... การปฏิวัติออนเซ็นอะไรสักอย่าง แถมยังมีการขายบัตรเออร์ลี แอกเซส...? อะไรทำนองนั้นด้วย "
83301200400-17 = "ฉันไม่รู้หรอกนะว่าจุดประสงค์ที่น่าเคลือบแคลงของพวกเธอคืออะไร แต่ถ้าก่อความวุ่นวายด้วยเหตุผล#nนั้นน่ะ..."
83301200400-18 = "ว่าไงนะ...?"
83301200400-19 = "......?"
83301200400-20 = "จุดประสงค์ที่น่าเคลือบแคลงงั้นเหรอ!?"
83301200400-21 = "เฮอะ! พวกที่หัวรั้นและหัวโบราณอย่างคณะกรรมการวินัยของคุณจะไปรู้อะไร!"
83301200400-22 = "คุณคงไม่รู้ทั้งเป้าหมายที่ยิ่งใหญ่และอลังการของพวกเราชมรมพัฒนาออนเซ็น! แล้วก็ไม่รู้ด้วยว่า#nหัวหน้าคาสุมิกับหัวหน้างานอย่างเมกุจังทุ่มเทมากแค่ไหนกับงานนี้!"
83301200400-23 = "เป้าหมายที่ยิ่งใหญ่และอลังการ..."
83301200400-24 = "บ่อออนเซ็นที่เราจะสร้างที่ลานจอดรถของแพนเดโมเนียม โซไซตี้เป็นแค่ส่วนหนึ่งของเป้าหมายนี้ก็#nเท่านั้น...!"
83301200400-25 = "ถ้าออนเซ็นจุดอื่นในเกเฮนน่าที่กำลังขุดอยู่ตอนนี้สำเร็จทั้งหมดละก็...!"
83301200400-26 = "เกเฮนน่าแห่งนี้ก็จะมีออนเซ็นสุดสมบูรณ์แบบที่หาที่ไหนเปรียบไม่ได้เลยละ!"
83301200400-27 = "ความสำเร็จของ <ยุทธการเกเฮนน่าเดือดปุดๆ> อยู่แค่เอื้อมแล้ว...!"
83301200400-28 = "<ยุทธการเกเฮนน่าเดือดปุดๆ>...?"
83301200400-29 = "อ๊ะ...! เผลอพูดไปเพราะความโมโหซะได้...!"
83301200400-35 = "นะ... หนีดีกว่า~~!"
83301200400-39 = "เดี๋ยวก่อน...!"

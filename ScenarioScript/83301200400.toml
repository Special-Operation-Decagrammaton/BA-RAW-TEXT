83301200400-9 = "3;온천 부원;04;나, 난 아무 것도 안 했어! 오늘 오후는 비번이라 잠깐 쉬고 있을 뿐이구!\n#3;jump"
83301200400-10 = "3;히나;14;딱히 널 탓하거나, 해코지하기 위해 찾아온 게 아니야."
83301200400-11 = "3;히나;14;단지…… 오늘 있었던 만마전 의사당 앞 온천개발의 건과 관련해 묻고 싶은 게 있을 뿐이야."

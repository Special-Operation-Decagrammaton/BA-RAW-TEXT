[translation]
83301200400-6 = "溫泉開發部的成員，可以打擾一下嗎？"
83301200400-7 = "嗯？"
83301200400-8 = "嗚哇啊啊！？風紀委員長！？你怎麼會在這裡！？"
83301200400-9 = "我，我什麼都沒做！#n我今天下午休息，只是在這裡打發時間而已！"
83301200400-10 = "我並不是來責怪或傷害你的。"
83301200400-11 = "只是……想要詢問有關今天溫泉開發部，在萬魔殿議事堂前面做的事情而已。"
83301200400-12 = "什麼！？想從我口中探聽消息！？#n你以為我會做出那種背叛行為嗎……！"
83301200400-13 = "背叛……是嗎。#n從某個角度來說或許是這樣沒錯。"
83301200400-14 = "我沒有強迫你回答的意思，不過……"
83301200400-15 = "因為有人說最近溫泉開發部在策畫可疑的事，我只是想確認真相而已。"
83301200400-16 = "是叫……溫泉革命嗎？#n還有在賣溫泉搶先體驗券……之類的東西。"
83301200400-17 = "雖然不清楚那可疑的目的是什麼，但如果因為那種理由引起騷動……"
83301200400-18 = "什麼……？"
83301200400-19 = "……？"
83301200400-20 = "怎麼能說是可疑的目的！"
83301200400-21 = "哼！像你們風紀委員會那種不知變通的人當然不會懂！"
83301200400-22 = "為了達成我們溫泉開發部偉大而遠大的目標！#n佳澄部長和作業班長惠醬可是付出了相當多的努力！"
83301200400-23 = "偉大而遠大的目標……"
83301200400-24 = "想在萬魔殿停車場建造的溫泉只不過是個中介點而已……！"
83301200400-25 = "等到格黑娜各處挖掘中的溫泉候選地全都完成……！"
83301200400-26 = "格黑娜將會獲得任何地方都無法相提並論的最完美溫泉！"
83301200400-27 = "我們「格黑娜咕嘟咕嘟大作戰」的成功已經近在眼前了……！"
83301200400-28 = "「格黑娜咕嘟咕嘟大作戰」……？"
83301200400-29 = "…………啊！因為太生氣，結果全都說溜嘴了……！"
83301200400-35 = "快，快逃啊～～！"
83301200400-39 = "慢著……！"

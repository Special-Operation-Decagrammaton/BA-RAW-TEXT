83301200400-15 = "3;히나;01;최근 온천개발부가 무언가 수상한 일을 꾸미고 있다는 소식을 접해서, 그 사실관계를 확인하고 싶었을 뿐."
83301200400-16 = "3;히나;99;온천 혁명……이라고 했던가? 거기에 온천 얼리 엑세스 티켓……? 같은 것도 판다고 했고.\n#3;em;[…]"
83301200400-17 = "3;히나;01;무슨 수상한 목적을 가졌는지는 모르겠지만, 그런 이유로 난동을 피우는 건……"

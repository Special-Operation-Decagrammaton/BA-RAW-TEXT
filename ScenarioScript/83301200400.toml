[translation]
83301200400-6 = "Excuse me, you're a member of the Hot Springs Department, correct?"
83301200400-7 = "Hm?"
83301200400-8 = "Wah?! Head Prefect?! Why are you here?!"
83301200400-9 = "I-I haven't done anything today! I'm just taking a break—I'm off duty this afternoon!"
83301200400-10 = "I'm not here to take you to task."
83301200400-11 = "I just wish to learn more about the hot springs development at the Pandemonium Society Assembly Hall earlier."
83301200400-12 = "What?! Do you think I'm an informant?! I'll never betray my club!"
83301200400-13 = "Betrayal... Yes, I could see how it could be taken as such."
83301200400-14 = "...But I have no plans on forcing you to talk."
83301200400-15 = "I simply heard a rumor that the Hot Springs Department was up to something unseemly."
83301200400-16 = "I believe it was called...a hot springs revolution...? For which, some untrustworthy Hot Spring Early Access tickets were sold...?"
83301200400-17 = "But looking at you, I'm sure you wouldn't cause a commotion over a nonsensical goal like that..."
83301200400-18 = "What...did you say?"
83301200400-19 = "...?"
83301200400-20 = "You dare call our dream nonsense?!"
83301200400-21 = "Heh! Of course the head of the Prefect Team would be too stubborn to recognize its beauty!"
83301200400-22 = "You're all blind to the great and glorious plans of the Hot Springs Department! You have no idea how hard President Kasumi and Foreman Megu are working towards our goals!"
83301200400-23 = "Great and glorious, hmm?"
83301200400-24 = "The hot spring we began at the Pandemonium Society was merely a connecting passage in the center!"
83301200400-25 = "Once we complete all the hot springs we're digging throughout Gehenna right now..."
83301200400-26 = "Gehenna will experience a hot spring revolution beyond their wildest dreams!"
83301200400-27 = "We're only few steps away from achieving Operation Gehenna Bubble!"
83301200400-28 = "Operation...Gehenna Bubble?"
83301200400-29 = "...Oh no! I got so angry that I told you everything!"
83301200400-35 = "R-Run away!"
83301200400-39 = "Wait!"

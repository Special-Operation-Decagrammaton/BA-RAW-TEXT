10031020-66 = "3;마코토;05;지나간 시간을 되새기기보다 앞으로 펼쳐질 창대하고 장대한 우리의 미래에 대해 이야기를 나누는 것이 바람직하겠지. 그렇게 생각하지 않나. 선생!"

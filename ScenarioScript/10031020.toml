10031020-129 = "3;마코토;06;그건 그렇다만…… 왜 온천 개발이 아니라, 준공식이 열리는 의사당 앞에 찾아와서 횡포를 부리는 게냐."
10031020-130 = "3;마코토;04;애당초 온천 개발 지역은 이곳이 아니잖아. 지금 이게 무슨 짓인 거냐. 온천개발부."

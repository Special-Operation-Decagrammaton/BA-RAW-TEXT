[translation]
10031020-1 = "第2話;首次準備"
10031020-2 = "（在正式決定幫助萬魔殿準備格黑娜派對的第一天，收到了真琴的聯絡）"
10031020-7 = "咯咯咯。之前也跟老師提過，#n我們萬魔殿為了紀念這次「格黑娜特別派對」的舉辦，建造了一座新議事堂。"
10031020-8 = "可以請老師出席新議事堂的竣工儀式，為儀式增光嗎？"
10031020-9 = "[s]「嗯，知道了。我這就去。」"
10031020-10 = "嘻嘻嘻。那麼我等你。"
10031020-17 = "咯咯咯………… "
10031020-18 = "嘻嘻嘻嘻嘻嘻嘻嘻嘻！！！"
10031020-19 = "這樣就取得[USERNAME]老師的協助了。"
10031020-20 = "這不單純只是請老師幫忙……#n我還會指示千秋拍攝得到老師協助的場景，為我們萬魔殿製作煽動性的紀錄片……"
10031020-21 = "咯咯咯，接著只要把影片送到奇普托斯各地，#n就能把我們萬魔殿，已經和夏萊的權力密切融合的事昭告天下了吧……！"
10031020-22 = "這樣一來……萬魔殿的影響力將會不斷竄升……！"
10031020-27 = "[ns]「那個，真琴……你電話還沒掛哦。」"
10031020-28 = "啊…………"
10031020-29 = "這……這……不，不是那樣的，老師。"
10031020-30 = "[s]「如果要拍攝的話還請容我鄭重拒絕。」"
10031020-31 = "我，我的計畫啊…………！"
10031020-32 = "呃唔唔……！沒，沒，沒，沒辦法了……"
10031020-33 = "總，總之我會在現場等你！"
10031020-54 = "[ns]「大家都很忙呢。」"
10031020-57 = "嘻嘻嘻。因為這次的派對具有重要的意義。"
10031020-58 = "[s]「啊，真琴。」"
10031020-59 = "歡迎來到萬魔殿，老師。"
10031020-60 = "嗯，雖說已經定下約定，沒想到老師會這麼爽快地協助萬魔殿……#n我再次向你道謝，嘻嘻。"
10031020-61 = "[s1]「嗯，畢竟我已經答應過了。」\n[s2]「當然，之後我是不會拍攝的哦。」"
10031020-64 = "呃……！那，那是……！"
10031020-65 = "…………總，總之重要的不是過去，而是未來！"
10031020-66 = "與其回顧過去發生的事，不如暢談我們即將展開的宏大未來──#n你不這麼覺得嗎？老師！"
10031020-67 = "[s]（啊，轉移話題了）"
10031020-71 = "[ns]「你之前說這是新議事堂的竣工儀式……也就是建了新的議事堂對吧？」"
10031020-72 = "嗯，藉著準備這次「格黑娜特別派對」的機會……"
10031020-73 = "我想順便進一步擴充和增設平時就認為有必要的設施。"
10031020-74 = "順帶一提，我也預計把舉辦這次派對的會場設在新議事堂。#n咯咯咯……"
10031020-75 = "[s]「原來如此，所以才選在這種時候舉行竣工儀式……」"
10031020-76 = "當然，擴充的設施不僅只於此！"
10031020-77 = "還有網咖、投幣式洗衣店、圖書館、便利商店、遊戲中心等等……！#n我打算一不做二不休，把風紀委員會的人聽了就頭痛的設施全部蓋好！"
10031020-78 = "以後我們萬魔殿的新議事堂，將會成為格黑娜新文化空間的指標！"
10031020-79 = "[s]「那與其說是議事堂，更像是綜合購物中心吧……？」"
10031020-80 = "嘻嘻嘻！其中我最推薦的地方……是這次計畫中投入預算最多的特別設施……"
10031020-81 = "沒錯，就是「特別溫泉」！#n為了讚揚萬魔殿的眾多學生，我特別請人建設在議事堂後方！"
10031020-82 = "[s]「規模確實與眾不同。」"
10031020-83 = "嘰嘻嘻嘻！沒錯！因為我真琴大人就是如此重視這次新議事堂的建設！#n所以才會跟伊呂波、千秋、皐月，還有伊吹一起拚盡全力！"
10031020-84 = "已經能想像之後風紀委員會的人，在知道這件事之後嚇得瞠目結舌的表情了……！#n嘻嘻嘻嘻嘻嘻！！！"
10031020-85 = "[s]「那個，我有一個問題。溫泉設施是委託誰建的呢……？」"
10031020-86 = "嗯？那當然……"
10031020-87 = "是格黑娜的溫泉開發部囉？"
10031020-91 = "[ns]「…………啊。」"
10031020-94 = "突，突然怎麼了！？"
10031020-98 = "大，大事不好了！議長……！#n事情是這樣的……"
10031020-99 = "因為溫泉的關係，那些傢伙……！"
10031020-100 = "那些傢伙……？"
10031020-107 = "啊……！！"
10031020-119 = "你，你們是……！"
10031020-121 = "呀齁～！溫泉開發部登場～！"
10031020-122 = "哦？居然有熟面孔，原來老師也在呀。"
10031020-123 = "萬魔殿的議長和老師，真是新鮮的組合。"
10031020-124 = "[s]「啊……你們好呀，惠、佳澄。」"
10031020-125 = "嗯嗯～呀齁！老師！"
10031020-126 = "嗯，雖然是意料之外的相遇，互相問候一下也不錯。"
10031020-127 = "話說回來，這次溫泉開發的委託人……真琴議長，是你沒錯吧？"
10031020-129 = "是沒錯……但你們為什麼不去開發溫泉，而是跑來舉辦竣工儀式的議事堂前胡鬧呢？"
10031020-130 = "當初委託進行溫泉開發的區域不是這裡吧。#n你們這是在做什麼？溫泉開發部。"
10031020-131 = "啊，原來是這件事啊。"
10031020-132 = "當然，我們原先接到的委託內容，的確是在新議事堂的後方建造新的溫泉設施……"
10031020-133 = "但驚人的是……！#n我在新議事堂後方以外的地點，也就是這座萬魔殿的停車場──"
10031020-134 = "感覺到了更加強烈的泉源氣息！"
10031020-135 = "[s]「那個……這麼說的根據是？」"
10031020-136 = "哎呀～老師你真是的，怎麼現在還問這種問題呢？"
10031020-137 = "當然是我的直覺囉！"
10031020-139 = "所以部長和我們……也沒有多加討論！#n聽完部長的話就「啪」地一聲湧現了靈感！"
10031020-140 = "與其按照原本的委託……不如立刻開發這裡！"
10031020-141 = "不不不！這裡即將舉行竣工儀式耶！？"
10031020-142 = "啊，真的嗎……？"
10031020-143 = "可是那跟我們有什麼關係？#n我們可是好不容易才接到開發超棒溫泉的委託。"
10031020-144 = "為了滿足客戶的期待，當然應該全力以赴，開發超棒的溫泉不是嗎？"
10031020-145 = "嗯？沒委託我們挖開停車場？#n哎唷，別在意那種細節嘛～"
10031020-146 = "哈～哈哈哈哈！如果真的湧出溫泉，真琴議長也會很開心的！#n你們就相信我吧！我可是溫泉方面的專家！"
10031020-147 = "[s]「……難怪一直有股不好的預感。」"
10031020-148 = "好！全員突擊！儘管挖個過癮吧！開發溫泉的時間到了！"
10031020-154 = "聽從佳澄部長的指示！前進～！"
10031020-160 = "唔……！以，以為我會就這樣，放任你們妨礙我真琴大人的竣工儀式嗎！#n我可不會坐視不管！"
10031020-161 = "大家上！阻止他們！"
10031020-179 = "[ns]「等，等等……大家先冷靜…………」"
10031020-185 = "等挖好溫泉之後，大家自然會冷靜！"
10031020-186 = "嗯嗯！畢竟溫泉能陶冶心靈嘛！還是陶治？總之能讓心沉澱下來～！"
10031020-191 = "呃，呃唔唔！！怎，怎麼會變成這樣……！#n我做錯了什麼……！是哪裡出了差錯！"
10031020-192 = "[s]「呃，會不會決定委託溫泉開發部就是個錯誤……？」"
10031020-198 = "哈～哈哈哈哈！！！開發溫泉！爆破！#n把這裡挖個底朝天，給所有格黑娜學生一人一個溫泉……！"
10031020-203 = "…………………………………………"
10031020-211 = "[ns]「剛，剛才那是……！」"
10031020-217 = "我收到這裡發生騷動的通報……"
10031020-218 = "現在……這是什麼情況？"
10031020-219 = "[s]「陽奈和亞子……！」"
10031020-220 = "……老師？"
10031020-221 = "咦！？老師為什麼會在這種地方……？"
10031020-223 = "哎咿！陽奈……！今天可是我們萬魔殿，舉辦新議事堂竣工儀式的大好日子……！"
10031020-224 = "居然在這種時候跑來這裡……#n難道你這傢伙……是來妨礙我真琴大人的嗎……！"
10031020-225 = "[s]「不管誰看都知道是來幫忙的吧……？」"
10031020-226 = "不管！我才不需要風紀委員長的幫忙！"
10031020-227 = "與其接受那傢伙的幫忙，我寧可議事堂的停車場出現溫泉……！"
10031020-228 = "這種事……我……我甘之如飴……"
10031020-229 = "不行……果然還是無法接受……！"
10031020-230 = "[s]「原來有這麼難接受啊……」"
10031020-235 = "我們也不是想幫萬魔殿才來的好嗎！？"
10031020-236 = "只是收到了溫泉開發部在作亂的消息才會過來而已。"
10031020-242 = "雖然只是常見的狀況……要協助萬魔殿還是讓人覺得很不舒服……！"
10031020-243 = "我要先解決這場騷動。#n老師，你有什麼想說的嗎？"
10031020-244 = "[s]「沒有。」"
10031020-245 = "是嗎。"
10031020-249 = "風紀委員會！全員準備！"
10031020-252 = "是……！"
10031020-257 = "包含風紀委員長在內的所有風紀委員都進入備戰狀態了！"
10031020-259 = "哇啊啊～！超危險的啦！"
10031020-263 = "噫，噫，噫啊──！！！"
10031020-268 = "啊！而且佳澄部長還陷入了恐慌狀態！"
10031020-269 = "因為佳澄部長他超級害怕風紀委員長！"
10031020-270 = "緊急情況～！！總之所有人先應戰吧！！"
10031020-276 = "！！"

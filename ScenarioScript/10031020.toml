10031020-71 = "[ns] \"근데 신 의사당 준공식이라는 건…… 의사당을 새로 지었단 거지?\""
10031020-72 = "3;마코토;99;그래. 이번 <게헨나 특별 파티>를 준비하는 김에……"
10031020-73 = "3;마코토;01;기왕이면 좀 더 평소 필요하다고 생각했던 시설을 더욱 확충하고 늘릴 필요가 있다고 생각했기 때문이지."
10031020-74 = "3;마코토;03;참고로 이번 파티가 열리는 파티장도 의사당 내부에 새로 들어설 예정이다. 크크큭…….\n#3;em;[재잘]"
10031020-75 = "[s] \"과연, 그래서 이런 타이밍에 준공식을…….\""
10031020-76 = "3;마코토;01;물론 확충된 시설은 그뿐만이 아니다!\n#3;em;[!]"
10031020-77 = "3;마코토;00;그 밖에도 PC방이나 코인세탁소, 도서관, 편의점, 오락실 등등……! 기왕 만드는 김에 선도부 녀석들이 듣기만 해도 배 아파할 만한 시설이란 시설은 전부 지을 예정이야!"
10031020-78 = "3;마코토;03;추후 우리 만마전 신 의사당은, 그 자체만으로도 게헨나에 있어 새로운 문화공간의 아이콘으로 떠오르게 될 테지!\n#3;em;[반짝]"
10031020-79 = "[s] \"그건 의사당이라기보다는, 그냥 복합쇼핑몰 아냐……?\""
10031020-80 = "3;마코토;10;키키킥! 특히나 이 몸께서 가장 추천하는 장소는…… 이번에 새로 만든 것 중에서도 가장 많은 예산이 들어간 특별 시설…….\n#3;hophop\n#3;em;[재잘]"
10031020-81 = "3;마코토;03;그래. <특제 온천 시설>이다! 만마전을 칭송할 뭇 게헨나 학생들을 위해 특별히 의사당 뒤편에 건설 발주를 넣어둔 참이지!"
10031020-82 = "[s] \"그야말로 규모가 남다르구나.\""
10031020-83 = "3;마코토;10;키시시싯! 그렇다! 그만큼 이 마코토 님께선, 이번 신 의사당 준공에 사활을 걸고 이로하나 치아키, 사츠키. 그리고 이부키와 함께 전력으로 달려온 게야!\n#3;em;[!]\n#3;jump"
10031020-84 = "3;마코토;03;시간이 지나, 이를 알게 된 선도부 녀석들이 깜짝 놀라 입이 떡 벌어지는 표정이 벌써부터 머릿속에 그려지는 군……! 키키키키키킥!!!\n#3;em;[재잘]"

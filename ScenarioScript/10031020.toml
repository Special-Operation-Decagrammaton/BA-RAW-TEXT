10031020-7 = "3;마코토;03;크크큭. 저번에도 말한 적이 있지만 이번 <게헨나 특별 파티> 개최를 기념해, 새롭게 우리 만마전의 신 의사당을 짓게 되었다.\n#3;sig\n#3;em;[재잘]"

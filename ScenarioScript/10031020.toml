10031020-59 = "3;마코토;03;만마전에 찾아온 것을 환영한다. 선생."
10031020-60 = "3;마코토;01;뭐, 약속을 했다고는 하나 저번의 제안 이후, 이렇게나 흔쾌히 만마전에 협력해 줄 줄이야……. 다시 한번 감사를 표하도록 하지. 키킷."

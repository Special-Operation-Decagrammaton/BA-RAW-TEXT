[translation]
10031020-1 = "ตอนที่ 2;เตรียมงานครั้งแรก"
10031020-2 = "(วันแรกหลังจากที่คุณครูตอบตกลงว่าจะช่วยเตรียมงานปาร์ตี้เกเฮนน่าของแพนเดโมเนียม โซไซตี้ มาโคโตะก็ติดต่อคุณครูมา)"
10031020-7 = "หึหึหึ อย่างที่บอกไปคราวที่แล้วว่า <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ครั้งนี้จะจัดขึ้นในหอประชุมใหม่#nของแพนเดโมเนียม โซไซตี้"
10031020-8 = "และเพราะอย่างนั้น เราเลยอยากเชิญให้ครูมาเข้าร่วมในพิธีเฉลิมฉลองการก่อสร้างที่เสร็จสมบูรณ์ ครูช่วยมาหน่อยได้มั้ยล่ะ?"
10031020-9 = "[s] \"ได้สิ แล้วครูจะไปให้\""
10031020-10 = "หึหึหึ งั้นเราจะรอ"
10031020-17 = "หึหึหึ... "
10031020-18 = "หึหึหึหึหึหึหึหึหึ!!!"
10031020-19 = "ถือว่าได้ร่วมมือกับครู [USERNAME] แล้ว"
10031020-20 = "นี่ไม่ได้เป็นการขอความร่วมมือเพื่อเตรียมงานเท่านั้นหรอกนะ... เราจะสั่งให้จิอากิบันทึกภาพที่เราได้#nรับความช่วยเหลือจากครูในงาน... จากนั้นก็จะเอาไปทำเป็นสารคดีส่งเสริมแพนเดโมเนียม โซไซตี้..."
10031020-21 = "หึหึหึ ถ้าเผยแพร่วิดีโอนั้นทั่วคิโวทอส เราก็จะทำให้ทุกคนก็จะได้รู้ว่าแพนเดโมเนียม โซไซตี้มีความ#nใกล้ชิดกับชาเล่ต์ในระดับไหน...!"
10031020-22 = "และด้วยวิธีนั้น... การขยายอิทธิพลของแพนเดโมเนียม โซไซตี้ก็ไม่ใช่เรื่องที่เกินเอื้อมอีกต่อไป...!"
10031020-27 = "[ns] \"คือ... มาโคโตะ ยังไม่ได้วางสายเลยนะ\""
10031020-28 = "อ่า..."
10031020-29 = "เอ่อ... คือว่า... ครู... คือว่าเรื่องนั้น..."
10031020-30 = "[s] \"ถ้าจะบันทึกภาพละก็ ครูขอปฏิเสธนะ\""
10031020-31 = "ตะ... แต่มันเป็นแผนการของเราเลยนะ...!"
10031020-32 = "ฮึ่มมมม...! งะ... งะ... งั้นก็ช่วยไม่ได้..."
10031020-33 = "เอาเป็นว่าเราจะรอที่หน้างานแล้วกัน!"
10031020-54 = "[ns] \"ทุกคนดูงานยุ่งกันจังเลยนะ\""
10031020-57 = "หึหึหึ ก็ปาร์ตี้ครั้งนี้มันมีความหมายที่สำคัญยังไงล่ะ"
10031020-58 = "[s] \"อ้อ มาโคโตะ\""
10031020-59 = "ยินดีต้อนรับสู่แพนเดโมเนียม โซไซตี้"
10031020-60 = "ต่อให้สัญญากันไว้ก็เถอะ แต่หลังจากข้อเสนอคราวก่อน เราคิดไม่ถึงเลยนะว่าครูจะยินดีให้ความร่วมมือ#nกับแพนเดโมเนียม โซไซตี้ขนาดนี้... เราขอแสดงความขอบคุณอีกครั้งนะ หึหึ"
10031020-61 = "[s1] \"อื้ม ครูสัญญาไว้แล้วนี่นา\"\n[s2] \"แต่ถ้าจะถ่ายวิดีโออะไร ครูขอปฏิเสธนะ\""
10031020-64 = "อึก...! ระ... เรื่องนั้น...!"
10031020-65 = "อะ... เอาเถอะ สิ่งสำคัญไม่ใช่อดีต แต่เป็นอนาคตต่างหาก!"
10031020-66 = "แทนที่จะมาคิดทบทวนถึงเวลาที่ผ่านไปแล้ว เราว่าเรามาพูดคุยเกี่ยวกับอนาคตอันยิ่งใหญ่และเจิดจรัส#nของเราจะดีกว่า ครูเองก็คิดเหมือนกันมั้ยล่ะ?"
10031020-67 = "[s] (พาเข้าเรื่องอื่นอีกแล้ว)"
10031020-71 = "[ns] \"แต่พิธีฉลองก่อสร้างอะไรนี่ แปลว่าสร้างหอประชุมใหม่เสร็จแล้วเหรอ?\""
10031020-72 = "ใช่ ไหนๆ เราก็จะมี <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ของปีนี้กันแล้ว..."
10031020-73 = "เราก็เลยคิดว่าเราต้องขยายอาคารสถานที่ที่เราคิดว่ามันจำเป็นในยามปกติขึ้นอีก"
10031020-74 = "อ้อ แล้วปาร์ตี้ครั้งนี้ก็จะจัดขึ้นภายในหอประชุมใหม่แห่งนี้ด้วยนะ หึหึหึ..."
10031020-75 = "[s] \"ก็เลยมีพิธีฉลองก่อสร้างในจังหวะนี้สินะ...\""
10031020-76 = "ไม่ใช่แค่หอประชุมหรอกนะที่เราสร้างขึ้นใหม่!"
10031020-77 = "ยังมีร้านอินเทอร์เน็ต ร้านซักผ้าหยอดเหรียญ ห้องสมุด ร้านสะดวกซื้อ ร้านเกม แล้วก็อื่นๆ อีก! เราจะมีสิ่งอำนวยความสะดวกครบครัน เอาให้เจ้าพวกกรรมการวินัยเห็นแล้วต้องไข้ขึ้นไปเลย!"
10031020-78 = "และในอนาคต หอประชุมใหม่ของแพนเดโมเนียม โซไซตี้ก็จะเป็นพื้นที่แลนด์มาร์กทางวัฒนธรรม#nแห่งใหม่ของเกเฮนน่าด้วย!"
10031020-79 = "[s] \"ฟังดูเหมือนห้างมากกว่าหอประชุมอีกนะ...?\""
10031020-80 = "หึหึหึ! ไม่ได้มีแค่นั้นนะ ที่ที่เราอยากแนะนำเป็นที่สุดก็คือสิ่งอำนวยความสะดวกพิเศษที่ใช้งบประมาณ#nไปมากที่สุดของแผนก่อสร้างนี้..."
10031020-81 = "ใช่แล้ว ที่ที่ว่าก็คือ <ออนเซ็นพิเศษ> หลังหอประชุม! เราสั่งงานก่อสร้างไว้เป็นพิเศษสำหรับนักเรียน#nเกเฮนน่าที่สรรเสริญในแพนเดโมเนียม โซไซตี้!"
10031020-82 = "[s] \"งานช้างเลยนะนั่น\""
10031020-83 = "หึหึหึหึ! เราไม่ปฏิเสธ! เพื่อหอประชุมแห่งใหม่นี้ ท่านมาโคโตะผู้นี้ต้องเสี่ยงชีวิตในการสร้างขึ้นมา ส่วนอิโรฮะ จิอากิ ซัตสึกิ และอิบูกิก็มาช่วยกันอย่างสุดฝีมือเลยด้วย!"
10031020-84 = "หากทุกการก่อสร้างสำเร็จลุล่วง เราจินตนาการไว้ในหัวแล้วละว่าเจ้าพวกกรรมการวินัยจะตกใจ#nจนอ้าปากค้างแค่ไหนตอนที่มาเห็นเข้า...! หึหึหึหึหึหึ!!!"
10031020-85 = "[s] \"ครูแค่ถามเผื่อๆ ไว้ก่อนน่ะ สั่งให้ใครมาสร้างออนเซ็นเหรอ...?\""
10031020-86 = "หืม? ถามแปลกๆ..."
10031020-87 = "ก็ชมรมพัฒนาออนเซ็นของเกเฮนน่าไง?"
10031020-91 = "[ns] \"อ่า...\""
10031020-94 = "จะ... จู่ๆ ก็เกิดเรื่องอะไรขึ้นน่ะ?!"
10031020-98 = "กะ... เกิดเรื่องใหญ่แล้วค่ะ! ท่านประธาน...! คือว่า... "
10031020-99 = "เรื่องออนเซ็นน่ะค่ะ พวกนั้น...!"
10031020-100 = "พวกนั้น...?"
10031020-107 = "ว่าไงนะ...?!"
10031020-119 = "พะ... พวกเธอนี่นะ...!"
10031020-121 = "สวัสดี สวัสดี~! พวกเราคือชมรมพัฒนาออนเซ็น~!"
10031020-122 = "โอ๊ะ? ก็ว่าอยู่ว่าหน้าคุ้นๆ คุณครูนี่เอง มาอยู่ที่นี่กับเขาด้วยเหรอ?"
10031020-123 = "คุณครูกับประธานแพนเดโมเนียม โซไซตี้... เป็นการรวมตัวที่แปลกใหม่ดีนะ"
10031020-124 = "[s] \"วะ... ว่าไง เมกุ คาสุมิ\""
10031020-125 = "อื้อ~ สวัสดีคุณครู!"
10031020-126 = "ได้มาทักทายกันในการพบปะที่คาดไม่ถึงแบบนี้ก็ไม่เลวนะ"
10031020-127 = "แต่เรื่องนั้นเอาไว้ก่อนเถอะ คนที่ขอให้พวกเรามาพัฒนาออนเซ็นครั้งนี้คือคุณใช่มั้ย... ประธานมาโคโตะ?"
10031020-129 = "ก็ใช่... แต่ทำไมถึงไม่ไปขุดบ่อออนเซ็น แต่มาก่อความวุ่นวายที่หน้าหอประชุมที่กำลังมีพิธีฉลอง#nก่อสร้างแบบนี้ล่ะ?"
10031020-130 = "ตรงนี้ไม่ใช่พื้นที่ที่จะพัฒนาออนเซ็นสักหน่อย มาทำอะไรของพวกเธอน่ะ ชมรมพัฒนาออนเซ็น?"
10031020-131 = "ก็เพราะเรื่องนั้นนั่นแหละ"
10031020-132 = "คำขอที่เราได้มาตอนแรกคือให้ขุดบ่อออนเซ็นแห่งใหม่ตรงด้านหลังหอประชุมใหม่..."
10031020-133 = "แต่ก็น่าประหลาดใจอย่างยิ่ง...! เพราะเราสัมผัสได้ถึงตาน้ำพุร้อนที่เดือดพล่าน! ที่ไม่ได้อยู่ด้านหลังหอประชุม!"
10031020-134 = "แต่อยู่ข้างหน้านี้! ตรงลานจอดรถของแพนเดโมเนียม โซไซตี้ต่างหาก!"
10031020-135 = "[s] \"แล้วนี่... มีหลักฐานยืนยันมั้ย?\""
10031020-136 = "แหม~ คุณครู ถามเหมือนไม่เคยเห็นมาก่อนงั้นแหละ?"
10031020-137 = "หลักฐานที่ว่ามาจากเซนส์ของฉันล้วนๆ เลย!"
10031020-139 = "ถึงฉันจะยังไม่ได้บอกรายละเอียดกับหัวหน้าและคนอื่นๆ ก็เถอะ!"
10031020-140 = "แต่ฉันอยากเสนอให้ขุดบ่อออนเซ็นตรงนี้ แทนที่จะเป็นพิกัดเดิมที่ได้รับคำขอมาตอนแรกน่ะ!"
10031020-141 = "ไม่ๆๆๆ! ตรงนี้จะใช้เปิดพิธีฉลองการก่อสร้างนะ!!"
10031020-142 = "อ่า งั้นเหรอ...?"
10031020-143 = "แต่ก็ไม่เกี่ยวอะไรกับพวกเรานี่? หน้าที่ของพวกเราคือพัฒนาออนเซ็นที่ยิ่งใหญ่แห่งใหม่ให้"
10031020-144 = "เราก็เลยจะตอบสนองความต้องการนั้นด้วยการสร้างบ่อออนเซ็นที่ยิ่งใหญ่ที่สุดดด! เท่าที่เราจะทำได้ไงล่ะ!"
10031020-145 = "เราไม่ได้มาขอให้ขุดพื้นที่ตรงลานจอดรถแทนเราสักหน่อย นั่นเป็นงานของพวกเรา ไม่ต้องกังวลหรอกน่า~"
10031020-146 = "วะฮะฮะฮะฮ่า! ถ้าสร้างเสร็จละก็ ประธานมาโคโตะคงต้องถูกใจแน่นอน! เชื่อฉันได้เลย! ฉันเป็นถึงผู้เชี่ยวชาญด้านออนเซ็นเลยนะ!"
10031020-147 = "[s] \"ว่าแล้วต้องออกมาเป็นแบบนี้...\""
10031020-148 = "เอาละทุกคน! ลุยเลย! ทุบเข้าไป ขุดเข้าไป เจาะเข้าไป... ขุดลงไปอีก! นี่คือเวลาแห่งการพัฒนาออนเซ็น!"
10031020-154 = "รับคำสั่งหัวหน้าคาสุมิ! หน้าเดิน~!"
10031020-160 = "ฮึ่ยยย! คะ... คิดว่าท่านมาโคโตะผู้นี้จะปล่อยให้พวกเธอขัดขวางพิธีฉลองก่อสร้างงั้นเรอะ! เราไม่ปล่อยไว้เฉยๆ แน่!"
10031020-161 = "ทุกคน! ขวางไว้!"
10031020-179 = "[ns] \"ดะ... เดี๋ยวก่อน ทุกคนใจเย็นๆ นะ...\""
10031020-185 = "ไว้ขุดบ่อออนเซ็นเสร็จ ทุกคนก็ใจเย็นกันเองละ!"
10031020-186 = "อื้อ! ก็ออนเซ็นเป็นที่เยียวยาจิตใจ! แล้วก็เป็นที่พักใจด้วยนะ~!"
10031020-191 = "ฮึ่ยยยย!! ทะ... ทำไมสถานการณ์ถึงเป็นแบบนี้ไปได้...! เราทำอะไรผิดไปตั้งแต่ตอนไหน...! ต้องมีอะไรผิดพลาดตรงไหน!"
10031020-192 = "[s] \"น่าจะตั้งแต่ขอให้ชมรมพัฒนาออนเซ็นมาช่วยแล้วนะ...?\""
10031020-198 = "วะฮะฮะฮ่า!!! ได้เวลาพัฒนาออนเซ็นแล้ว! ระเบิดเลย! ระเบิดให้หมด มาสร้างอภิมหาออนเซ็นให้เด็ก#nเกเฮนน่าทุกคนได้ใช้กันคนละบ่อเลย...!"
10031020-203 = "............"
10031020-211 = "[ns] \"ดะ... เดี๋ยวนะ... เมื่อกี้มัน...!\" "
10031020-217 = "ฉันเพิ่งได้รับแจ้งว่ามีเรื่องวุ่นวายเกิดขึ้นที่นี่ค่ะ"
10031020-218 = "นี่มัน... เรื่องอะไรกันน่ะ?"
10031020-219 = "[s] \"ฮินะกับอาโกะ...!\""
10031020-220 = "คุณครู...?"
10031020-221 = "เอ๋?! ทำไมคุณครูถึงมาอยู่ที่นี่...?"
10031020-223 = "หน็อย! ฮินะ...! วันนี้เรามีพิธีฉลองก่อสร้างหอประชุมใหม่ของแพนเดโมเนียม โซไซตี้น่ะสิ...!"
10031020-224 = "มาที่นี่ในวันที่มีพิธีสำคัญแบบนี้... อย่าบอกนะว่าจะมาขัดขวางท่านมาโคโตะผู้นี้น่ะ...!"
10031020-225 = "[s] \"ดูเอาก็น่าจะรู้ไม่ใช่เหรอว่ามาช่วย...?\""
10031020-226 = "เฮอะ! เราไม่ต้องการความช่วยเหลือจากประธานกรรมการวินัยหรอกนะ!"
10031020-227 = "ถ้าจะให้รับความช่วยเหลือจากยัยนั่น เรายอมให้มีบ่อออนเซ็นที่ลานจอดรถ...!"
10031020-228 = "ของหอประชุมใหม่ยังจะ... ดะ... ดีซะกว่า..."
10031020-229 = "ไม่สิ... เรื่องนี้ยังไงก็ยอมไม่ได้...!"
10031020-230 = "[s] \"ว่าแล้วเชียว คงยอมให้ไม่ได้สินะ...\""
10031020-235 = "พวกฉันก็ไม่ได้มาเพราะอยากช่วยแพนเดโมเนียม โซไซตี้หรอกนะคะ!"
10031020-236 = "ที่เรามาก็เพราะได้รับแจ้งว่าชมรมพัฒนาออนเซ็นกำลังวุ่นวายกันใหญ่"
10031020-242 = "ฉันคิดว่านี่เป็นปัญหาแก้ไม่ตกที่มีอยู่เรื่อยๆ ก็เลยมาจัดการ... แต่พอรู้ว่านี่เป็นการช่วยแพนเดโมเนียม โซไซตี้ ก็รู้สึกไม่ค่อยอยากช่วยสักเท่าไรเลยค่ะ...!"
10031020-243 = "ฉันจะสะสางสถานการณ์นี้ก่อน คุณครูติดอะไรรึเปล่า?"

10031020-20 = "3;마코토;03;이건 단지 준비만을 위한 협력 요청이 아니야…… 현장에서 선생에게 도움받는 장면을, 치아키를 통해 촬영하도록 지시해서…… 우리 만마전을 위한 선동용 다큐멘터리를 만든다면…….\n#3;sig"
10031020-21 = "3;마코토;10;크크큭. 해당 영상을 키보토스 전역에 송출하는 것으로 우리 만마전이 어떤 형태로든 샬레의 권력과 밀접 접촉하고 있단 사실을 만천하에 알릴 수 있겠지……!\n#3;sig"
10031020-22 = "3;마코토;10;그 방법만 취할 수 있다면…… 판데모니움 소사이어티의 영향력을 확대하는 것도 얼마든지……!\n#3;sig"

10031020-133 = "3;카스미;99;무려 놀랍게도……! 신 의사당 뒤편이 아니라, 바로 이 앞에! 이 만마전의 주차장에서!\n#3;stiff"
10031020-134 = "3;카스미;05;더우우우욱 더 진한 온천 수맥의 기운이 느껴졌단 말이지!\n#3;jump"

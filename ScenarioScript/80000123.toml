[translation]
80000123-1 = "#title;스위트 저널리즘"
80000123-2 = "3;치아키;03;수-고하셨습니다-!\n#3;ar"
80000123-3 = "3;치아키;08;덕분에 아주 뜨겁고 시끌시끌한 발렌타인 특집 기사가 나올 것 같네요!\n#3;em;[반짝]"
80000123-4 = "[s] \"말하면 안 되는 것까지 말해버린 것 같은데……\""
80000123-5 = "3;치아키;03;에이 그런 사소한 건 신경 쓰지 말구요~ 오히려 그런 게 있어야 좋은 기사 아니겠어요?\n#3;em;[재잘]"
80000123-6 = "3;치아키;11;그러면 얼른 탈고하러 가겠습니다!"
80000123-7 = "#st;[0,0];instant;1;"
80000123-8 = "#clearST"
80000123-9 = "3;치아키;11\n#3;dr\n#wait;2000"
80000123-10 = "5;치아키;02;아! 그러고 보니 오늘 발렌타인데이인데 빈손으로 오기도 뭣해서 하나 준비했단 말이죠!\n#5;em;[반응]\n#5;al"
80000123-11 = "5;치아키;12;선생님께서 <주간 만마전>의 풍성한 기사를 위해 명예와 미래까지 한 몸 바쳐주셨으니 이건 답례입니다!\n#5;hophop"
80000123-12 = "[s] \"내가 한 대답이 그 정도였다고?!\""
80000123-13 = "5;치아키;01;좋은 게 좋은 거예요! 그보다 어디에 있더라……\n#5;greeting"
80000123-14 = "5;치아키;07;아! 여기 있네요!\n#5;em;[반응]"
80000123-15 = "#st;[0,0];instant;1;"
80000123-16 = "#clearST"
80000123-17 = "#wait;2000"
80000123-18 = "5;치아키;12;짠! 어때요?\n#5;em;[반짝]"
80000123-19 = "[s1] \"어떻다고 말한들……\"\n[s2] \"이게 뭘까?\""
80000123-20 = "#wait;10"
80000123-21 = "#wait;10"
80000123-22 = "5;치아키;03;차암 섭섭하게! 선생님 전용의 <주간 만마전 특별 호외판> 이에요!\n#5;m3\n#5;em;[재잘]"
80000123-23 = "5;치아키;99;원래 이런 초콜릿은 수제로 직접 만드는 거에 의미가 있는 거잖아요? 그래서 중요한 부분만 캐치했죠."
80000123-24 = "5;치아키;08;가장 멋진 모습을 담은 사진, 이거야말로 수제 초콜릿을 전달하는 가장 효과적이고 극적인 방법 아닐까요?\n#5;em;[반짝]"
80000123-25 = "[s] \"과연……\""
80000123-26 = "#st;[0,0];instant;1;"
80000123-27 = "#clearST"
80000123-28 = "#wait;1000"
80000123-29 = "[ns] \"……그런데 초콜릿이 영 사진하고 다른데?\""
80000123-30 = "5;치아키;03;맞아요, 역시 게헨나 정론지 <주간 만마전>의 애독자다운 날카로운 안목이 있으시군요!\n#5;em;[음표]"
80000123-31 = "5;치아키;03;초콜릿 같은 식품을 최대한 사진에서 예쁘게 담아내려면 여러 가지 연출이 필요하답니다?"
80000123-32 = "5;치아키;99;가령, 수프 위에 허브 같은 가니쉬를 올려서 사진을 찍을 때에는 어떻게 해야 할까요?"
80000123-33 = "[s] \"푸짐하고 넉넉하게 넣는 건가?\""
80000123-34 = "5;치아키;12;땡땡-! 틀렸습니다!\n#5;hophop"
80000123-35 = "5;치아키;99;오히려 가니쉬를 많이 올리면 금방 가라앉아서 사진이 예쁘게 나오지 않아요."
80000123-36 = "5;치아키;11;그래서 예쁘게 연출하기 위해서 그릇 안에 작은 그릇을 엎어놓고 올린답니다!"
80000123-37 = "[s] \"그릇을 그릇 안에……?\""
80000123-38 = "5;치아키;03;에이, 그래도 그릇만 건져내면 수프는 평범하게 먹을 수 있다구요!\n#5;em;[재잘]"
80000123-39 = "5;치아키;01;요점은, 사진을 잘 담아내기 위해서는 여러 연출이 필요하다는 점!"
80000123-40 = "5;치아키;13;이번에는 열심히 사진을 찍다 보니 셔터 찬스를 잡느라 초콜릿이 눌어붙고 굳어버려서 어쩔 수 없었어요.\n#5;em;[땀]"
80000123-41 = "[s] \"'생생하게 담아낸 저널리즘' 이라기엔 괴리가……\""
80000123-42 = "5;치아키;01;어쨌건 사진으로는 비주얼이 남았고, 결과물로는 맛이 남았으니 잘된 일 아닐까요?"
80000123-43 = "5;치아키;12;사진을 드시면서 초콜릿을 보시면 실감이 날 거예요!\n#5;em;[음표]"
80000123-44 = "[s] \"반대 아닌가?\""
80000123-45 = "#all;hide"
80000123-46 = "#na;(이후, 사진을 보며 초콜릿을 먹었다.)"
80000123-47 = "#na;(초콜릿의 맛은 평범했고 치아키가 귀여웠다.)"

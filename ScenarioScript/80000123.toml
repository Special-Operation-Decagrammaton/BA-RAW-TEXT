[translation]
80000123-1 = "Sweet Journalism"
80000123-2 = "Greeeeeat work!"
80000123-3 = "Thanks to you, we're going have a hot and rowdy Valentine's feature article!"
80000123-4 = "[s] \"It feels like you just said something you shouldn't have...\""
80000123-5 = "Don't sweat the little details! Stuff like that is necessary for a good article!"
80000123-6 = "I'll be off to go finish writing this article, then!"
80000123-10 = "Ah! Right! Before I forget! I couldn't come empty handed on Valentine's Day, so I brought you something."
80000123-11 = "This is your reward for dedicating your honor and future for another hit article in \"Weekly Pandemonium Society\"!"
80000123-12 = "[s] \"My responses were that significant?!\""
80000123-13 = "All's well that ends well! Before that, where did I put it?"
80000123-14 = "Ah! Here it is!"
80000123-18 = "Ta-da! What do you think?"
80000123-19 = "[s1] \"Even if you ask me what I think...\"\n[s2] \"What is it?\""
80000123-22 = "Are you serious?! It's your very own, exclusive \"Weekly Pandemonium Society Special Extra\"!"
80000123-23 = "Chocolates are meaningful because they're homemade, right? So I captured the important parts of it."
80000123-24 = "Using the best possible picture of homemade chocolate is the most effective and dramatic way to deliver it, don't you agree?"
80000123-25 = "[s] \"I see...\""
80000123-29 = "[ns] \"...But doesn't the chocolate look really different from the picture?\""
80000123-30 = "You're right. As expected from a dedicated reader of Gehenna's reputable journal \"Weekly Pandemonium Society,\" you have sharp eyes!"
80000123-31 = "I utilize various staging techniques to take a pretty photo of foods, like this chocolate, you know?"
80000123-32 = "For example, what would you do when you want to take a photo of soup with a garnish, like some herbs, on top?"
80000123-33 = "[s] \"Put a generous amount of it?\""
80000123-34 = "Beep! Incorrect!"
80000123-35 = "Putting a lot of garnish on top would actually make them sink too fast, so the photo wouldn't capture them well at all!"
80000123-36 = "So to make it look pretty, you flip a smaller bowl upside down, put it inside the soup bowl, then place the garnish on top!"
80000123-37 = "[s] \"A bowl in a bowl...?\""
80000123-38 = "Well, you can still eat the soup after taking the bowl out!"
80000123-39 = "The point is that lots of staging is required to take a good photo!"
80000123-40 = "It just couldn't be helped this time because the chocolate melted and hardened while I was trying to get the camera angle right!"
80000123-41 = "[s] \"It's a bit of a stretch to call it 'lively captured journalism'...\""
80000123-42 = "Anyhow, we have good visuals with the photo and good taste with the actual chocolate, so it's fine, right?"
80000123-43 = "It'll feel more realistic if you looked at the chocolate while eating the photo!"
80000123-44 = "[s] \"Wouldn't it be the other way around?\""
80000123-46 = "Afterwards, I ate the chocolate while looking at the photo."
80000123-47 = "The chocolate tasted about average, and Chiaki was cute."

[translation]
80000123-1 = "甜點新聞學"
80000123-2 = "辛苦啦～！"
80000123-3 = "多虧有老師的幫忙，這次的情人節特輯一定會成為話題滿滿的大新聞！"
80000123-4 = "[s]「……我好像說了一些不該說的內容。」"
80000123-5 = "哎呀～那種小事不用在意～#n就是要有爆點才能成為好報導不是嗎？"
80000123-6 = "那我就趕稿去囉！"
80000123-10 = "啊，對了！今天可是情人節，空手來實在不是很好……所以我也準備了一點小禮物！"
80000123-11 = "畢竟老師可是為了《週刊萬魔殿》的精彩內容，連名譽和未來都豁出去了嘛！#n這是我的一點心意！"
80000123-12 = "[s]「有到那種程度嗎！？」"
80000123-13 = "別擔心別擔心！#n話說回來……我放到哪去了呢……"
80000123-14 = "啊！找到了！"
80000123-18 = "鏘鏘～怎麼樣呀？"
80000123-19 = "[s1]「被你這麼一問……」\n[s2]「這究竟是什麼……？」"
80000123-22 = "怎麼這麼說呢～這可是老師專屬的《週刊萬魔殿．特別號》哦！"
80000123-23 = "情人節巧克力不就是要自己做才有意義嗎？所以我抓住了最重要的精髓！"
80000123-24 = "把最美的模樣拍下來，才是傳遞手工巧克力最有效又最戲劇性的方法不是嗎？"
80000123-25 = "[s]「原來如此……」"
80000123-29 = "[ns]「……不過這些巧克力跟照片裡的差別有點大耶？」"
80000123-30 = "沒錯～不愧是我們《週刊萬魔殿》的忠實讀者，觀察力真敏銳！"
80000123-31 = "要把巧克力這種食物拍得漂亮，其實需要很多小技巧哦～"
80000123-32 = "舉例來說，在拍攝用香草裝飾的湯品時，該怎麼拍才好看呢？"
80000123-33 = "[s]「把香草放得豐盛一點之類的？」"
80000123-34 = "噗噗～答錯了！"
80000123-35 = "放太多裝飾的話反而會沉下去，拍起來就不好看了。"
80000123-36 = "所以要在碗裡再倒扣一個小碗，然後把裝飾放在上面才會好看！"
80000123-37 = "[s]「要在碗裡放碗……？」"
80000123-38 = "哎呀～把小碗拿掉之後，湯還是可以正常喝的！"
80000123-39 = "重點是為了拍出好照片，就不能缺少這些步驟！"
80000123-40 = "而我這次就是因為太專注於拍照，#n結果為了抓住按下快門的時機，搞得巧克力都凝固了……"
80000123-41 = "[s]「這好像不太符合『報導真相』的精神……」"
80000123-42 = "不過至少照片裡保留了視覺效果，實體又留下了味道，這樣不也挺好的嗎？"
80000123-43 = "邊看照片邊吃巧克力的話，會更有感覺哦！"
80000123-44 = "[s]「不是應該反過來嗎？」"
80000123-46 = "（之後一邊看著照片，一邊吃著巧克力）"
80000123-47 = "（巧克力的味道雖然普通，但千秋真的很可愛）"

10034100-5 = "3;카즈사 밴드;16;……뭐, 뭐야. 갑자기 왜 그런 걸 물어보고 그래.\n#3;a\n#3;em;[땀]"
10034100-6 = "1;요시미 밴드;02;처음에는 없었어. 운영위원회에서 뽑은 당직 학생들과 자경단 정도가 고작이었지.\n#1;a\n#1;em;[반응]"

[translation]
10034100-1 = "後日談（２）;叛徒們"
10034100-2 = "[ns1]「話說回來，當時你們去偷襲營運委員會的時候……」\n[ns2]「一開始沒有跟實現正義部交手，對吧？」"
10034100-5 = "……怎，怎麼突然問起這個。"
10034100-6 = "一開始的確沒有。#n現場只有營運委員會的值班學生和自衛隊而已。"
10034100-7 = "聽說實現正義部本來也有自己的活動計畫……"
10034100-8 = "畢竟誰也沒料到會有「一群瘋子」敢夜襲茶會主辦的活動。"
10034100-9 = "……你的語氣未免也太事不關己了吧？瘋子A同學……？"
10034100-10 = "我當然還記得唷。#n凱茜．帕魯格教我們的……"
10034100-11 = "就跟你說別提了，到底要我說幾遍。"
10034100-15 = "……杏山千紗教我們的「新手幹架必勝法」。"
10034100-17 = "正面交鋒對我們來說完全沒勝算，所以要盡量讓對方放鬆警戒、製造混亂……"
10034100-18 = "效果十分顯著。"
10034100-19 = "……不過我也沒料到你會直接脫裙子嚇人就是了。"
10034100-20 = "裡面有穿安全褲啦。這是經過精密計算後得出的戰術。"
10034100-21 = "……保險起見，我先聲明一下。#n這方法絕對不是我教的。"
10034100-22 = "但我們不是贏了嗎？#n多虧有這招，我們才能勢如破竹地攻進核心區域。"
10034100-23 = "就說了架幾乎都是我在打，你在那邊得意個什麼勁……"
10034100-24 = "不過實現正義部加入後，我們就被打得落花流水，只能倉皇撤退。"
10034100-25 = "本來就不該挑戰他們。#n如果真的交手起來，事情可不會這麼簡單就算了。"
10034100-26 = "總之，結果是好的就行了。"
10034100-27 = "往好的方面想，我也難得活動了一下筋骨……"
10034100-29 = "我都聽說了！！杏山千紗！！！"
10034100-30 = "我不在的時候，你又做了件大事呢！！"
10034100-34 = "……啊。"
10034100-35 = "糟糕……怎麼偏偏傳進那傢伙的耳裡呢……這下麻煩了……"
10034100-37 = "[ns] 「………」"
10034100-41 = "[ns3]「那我先走了。」\n[ns4]「祝大家有個美好的一天～」"
10034100-44 = "……什麼！？老師！？"
10034100-45 = "你要走了！？現在！？偏偏挑這種時候……！？"
10034100-50 = "……啊！這麼說來，我也突然想起有件事要做。"
10034100-54 = "原來如此。那我也不能當兩位的電燈泡……"
10034100-62 = "啊哈哈哈……"
10034100-64 = "怎麼全都跑了！？真的假的啦！？認真要丟下我不管！？是在開什麼玩笑！？"
10034100-65 = "這也太過分了吧！！明明是大家一起做的，結果要我一個人承擔！？啊！？"
10034100-66 = "你們……！"
10034100-72 = "這些叛徒──！！！"

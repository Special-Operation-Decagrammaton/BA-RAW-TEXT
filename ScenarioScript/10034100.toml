[translation]
10034100-1 = "เรื่องหลังจากนั้น 2;เหล่าคนทรยศ"
10034100-2 = "[ns1] \"จะว่าไป ตอนที่ไปจู่โจมคณะกรรมการบริหาร...\"\n[ns2] \"ตอนแรกชมรมทวงความยุติธรรมไม่อยู่ตรงนั้นใช่มั้ย?\""
10034100-5 = "อะ... อะไรกัน ทำไมอยู่ๆ ก็ถามเรื่องนั้นล่ะ?"
10034100-6 = "ตอนแรกพวกชมรมทวงความยุติธรรมไม่อยู่หรอก จะมีก็แค่นักเรียนที่อยู่เวรให้คณะกรรมการบริหาร กับพวกกลุ่มรักษาความสงบน่ะ"
10034100-7 = "ได้ยินว่าชมรมทวงความยุติธรรมก็มีงานที่ตัวเองอาสาไปทำกันอยู่..."
10034100-8 = "และพวกนั้นก็คงคาดไม่ถึงตั้งแต่แรกด้วยว่าจะมีพวกเด็กบ้าๆ บอๆ มาก่อกวนงานที่สภาน้ำชาผู้สูงส่ง#nเป็นเจ้าภาพน่ะ"
10034100-9 = "พูดเหมือนไม่ใช่เรื่องที่ตัวเองไปก่อเอาไว้เลยนะ...? คุณ A นามสมมติ...?"
10034100-10 = "ฉันยังจำได้อยู่เลยนะ สิ่งที่คุณแคทส์ พาลูคสอนไว้น่ะ..."
10034100-11 = "เงียบไปเลย ฉันบอกกี่รอบแล้วว่าอย่าพูดอีก"
10034100-15 = "ทั้ง 'วิธีเอาชนะในการต่อสู้ของมือใหม่' ที่คุณเคียวยามะ คาซึสะอุตส่าห์ถ่ายทอดให้..."
10034100-17 = "ทั้งเทคนิคที่บอกว่า 'ถ้าบุกเข้าไปซึ่งๆ หน้าละก็ไม่มีทางชนะแน่ เราต้องทำให้อีกฝ่ายประมาทมากที่สุด... เพื่อให้เกิดความสับสน'"
10034100-18 = "แต่ละอย่างดีๆ ทั้งนั้นเลยละ"
10034100-19 = "ก็นะ... ถึงจะคิดไม่ถึงว่าจู่ๆ จะถอดกระโปรงแล้ววิ่งเข้าไปกลางวงจนคนอื่นตกตะลึงขนาดนั้นก็เถอะ"
10034100-20 = "ก็ใส่กางเกงไว้ข้างในนี่นา ถือว่าเตรียมการมาอย่างดีเลยละ"
10034100-21 = "ฉันขอพูดเผื่อว่าจะเกิดการเข้าใจผิดนะ แต่ฉันไม่ได้หมายถึงให้ทำอย่างนั้น"
10034100-22 = "แต่ยังไงเราก็ชนะไม่ใช่เหรอ? นั่นทำให้เรามีพลังอันแข็งแกร่งจนบุกเข้าไปได้ถึงส่วนกลางเลยนะ"
10034100-23 = "ฉันแทบจะฉายเดี่ยวต่อสู้ให้แท้ๆ แต่ทำไมเธอถึงจะเคลมผลงานไปแบบนั้นล่ะ..."
10034100-24 = "แต่พอชมรมทวงความยุติธรรมมา กลายเป็นว่าเราโดนจัดการอยู่ฝ่ายเดียวจนต้องฝ่าออกมานะ"
10034100-25 = "จะให้สู้กลับใส่พวกนั้นมันก็เกินกำลังไปนะ ถ้าเราบุกใส่ ก็คงไม่จบแค่เท่านั้นหรอก"
10034100-26 = "เอาเถอะน่า ยังไงก็โชคดีที่สุดท้ายมันก็จบลงได้ด้วยดีนะ"
10034100-27 = "แล้วก็เป็นโอกาสดีที่ฉันได้ยืดเส้นยืดสาย..."
10034100-29 = "ฉันได้ยินเรื่องทั้งหมดแล้วค่ะ!! เคียวยามะ คาซึสะ!!!"
10034100-30 = "ได้ยินว่าคุณก่อเรื่องใหญ่ไว้ตอนฉันไม่อยู่เหรอคะ?!"
10034100-34 = "อ่า..."
10034100-35 = "อึก... ทำไมเรื่องนี้ถึงไปเข้าหูยัยนั่นได้นะ... น่าเหนื่อยใจชะมัด..."
10034100-37 = "[ns] \"......\""
10034100-41 = "[ns3] \"ถ้างั้นครูขอตัวก่อนนะ\"\n[ns4] \"ขอให้มีวันที่ดีนะทุกคน~\""
10034100-44 = "อะไรกัน? คุณครู!?"
10034100-45 = "จะไปแล้วเหรอ!? ตอนนี้เนี่ยนะ!? ทำไมต้องเป็นตอนนี้ด้วย...!?"
10034100-50 = "อ๊ะ! จะว่าไป ฉันก็มีงานที่ต้องทำแฮะ?"
10034100-54 = "งั้นเหรอ? งั้นสินะ ถ้างั้นฉันก็คงต้องเออออตามไปด้วย..."
10034100-62 = "อะฮ่าฮ่าฮ่า..."
10034100-64 = "ไปกันหมดเลยเหรอ!? จะทิ้งฉันไว้คนเดียวเนี่ยนะ!? อะ... เอาจริงเหรอเนี่ย!? ไม่จริงใช่มั้ย!? แกล้งกันใช่มั้ย!?"
10034100-65 = "แบบนี้มันเกินไปแล้วนะ!! ไหนตกลงกันซะดิบดีว่าจะลงเรือลำเดียวกัน แล้วไหงทิ้งฉันไว้คนเดียวล่ะ!? หา!?!"
10034100-66 = "นี่พวกเธอ...!"
10034100-72 = "พวกคนทรยศศศศศ!!!"

[translation]
10034100-1 = "Afterword 2;Traitors"
10034100-2 = "[ns1] \"Hey, now that I think about it, when the committee ambush...happened...\"\n[ns2] \"...the Justice Task Force wasn't there at first, were they?\""
10034100-5 = "...Wh-What? Where'd that question come from?"
10034100-6 = "No, not at first. They had Vigilante Crew, and whatever students the committee picked, at best."
10034100-7 = "Well, I heard the Justice Task Force was busy trying to host an event at the time..."
10034100-8 = "Who would've expected a pack of maniacs would pull an ambush, in an event hosted by the Tea Party, of all people?"
10034100-9 = "...You're talking like it's someone else's story. Aren't you Maniac A?"
10034100-10 = "Well, I learned a lesson from Cath Palug..."
10034100-11 = "Please stop. You're really overdoing that."
10034100-15 = "...\"How to fight and win as a rookie,\" by Kyoyama Kazusa."
10034100-17 = "Yep. When you can't win a fight head-on, cause chaos and throw them off their game."
10034100-18 = "And throw them off it did."
10034100-19 = "Yeah, especially when you took your skirt off and ran right at them."
10034100-20 = "I was wearing leggings under it! A well-prepared strategy, if I say so myself."
10034100-21 = "Just to be clear, I never suggested that."
10034100-22 = "But it was the right move, wasn't it? Our rush succeeded because of it."
10034100-23 = "Hey, I did all the fighting. Why are you acting so proud?"
10034100-24 = "Plus, once the Justice Task Force showed up, we all got our butts kicked and ran away."
10034100-25 = "We couldn't have beaten them. If we'd tried, things would have gotten worse."
10034100-26 = "Anyways, I'm just glad it all worked out."
10034100-27 = "And, well, to put it nicely, it's been a while since I've been able to—"
10034100-29 = "I heard ALL of that! Kyoyama Kazusa!!"
10034100-30 = "You were up to something big again while I was gone!!"
10034100-34 = "...Oh."
10034100-35 = "Tch... So SHE heard. This is going to be awkward..."
10034100-37 = "[ns] \"...\""
10034100-41 = "[ns3] \"Okay then. I'll be on my way.\"\n[ns4] \"Have a good one, everyone!\""
10034100-44 = "Hm?! Sensei?!"
10034100-45 = "You're leaving?! Now?! Of all times...?!"
10034100-50 = "...Ah! Now that I think about it, I have something to do too!"
10034100-54 = "Yes, and...I, too, have other commitments..."
10034100-62 = "Ahahaha..."
10034100-64 = "You're all bailing on me? Seriously? You're gonna leave me like this? Really? No, you're joking, right?!"
10034100-65 = "This isn't right! You were part of the robbery too, so why am I the only one getting screwed here? Huh?!"
10034100-66 = "You..."
10034100-72 = "You traitors!!"

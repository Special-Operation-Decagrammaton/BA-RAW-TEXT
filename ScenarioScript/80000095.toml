[translation]
80000095-1 = "真相就在另一側"
80000095-2 = "（接到佳澄的聯絡後，往夜晚渺無人煙的橋上走去）"
80000095-3 = "（沒過多久，就看到從遠方揮著手走來的佳澄）"
80000095-4 = "哦哦～老師～！！你來得真早啊～？"
80000095-5 = "哈～哈哈哈哈！等很久了嗎？抱歉抱歉。#n我本來打算更早出來迎接老師的……"
80000095-6 = "不過就像你知道的一樣，找我有事的人實在不少……#n所以為了避開那些傢伙的耳目，多花費了一點時間。"
80000095-7 = "之所以選擇在這種夜深人靜的橋樑上見面，也是因為這個原因。"
80000095-8 = "……嗯？問我有什麼事？"
80000095-9 = "真是的～怎麼問這種問題呢？#n就算是我，也知道今天是什麼日子呀～"
80000095-10 = "應該不用我多說了吧？#n今天可是情人節……"
80000095-11 = "還是說……其實你不是很想從我手中收到巧克力？"
80000095-12 = "如果是這樣的話，我可能得先跟你道歉了。#n畢竟我白白佔用了你寶貴的時間啊。哈～哈哈哈！！"
80000095-13 = "……絕對沒這回事？那真是太好了！#n既然如此，我也能放心地送你了。"
80000095-14 = "那麼就……"
80000095-15 = "鏘鏘……！"
80000095-20 = "[ns1]「拖……鞋？」\n[ns2]「是巧克力……嗎？」"
80000095-23 = "沒錯沒錯！怎麼樣，看起來挺有模有樣的吧？"
80000095-24 = "老師還記得嗎？#n之前我的拖鞋在森林裡壞掉的時候，你不是買了新的拖鞋給我嗎？"
80000095-25 = "雖然我覺得老師應該馬上就把這件事給忘了……但我絕對不是個有借無還的人。"
80000095-26 = "不過就算還一雙同樣的拖鞋，對老師來說應該也沒有太大的意義……#n所以我才趁機做了這個！"
80000095-27 = "如何？老師也覺得看起來就像真的拖鞋一樣吧？"
80000095-28 = "……嗯？"
80000095-29 = "問我是不是親手做的？#n這個嘛……你覺得呢？"
80000095-30 = "哼哼哼。至少裡頭確實有我經手的痕跡，這點我可以向你保證。"
80000095-31 = "不，或許並不是「手」……"
80000095-32 = "……而是「腳」也說不定呢。"
80000095-36 = "[ns3]「…………咦？」\n[ns4]「……腳……？」"
80000095-39 = "來～先別管那些小事了！"
80000095-40 = "現在就……"
80000095-44 = "……哎呀。"
80000095-45 = "不好意思，老師。#n因為位置好像被發現了的關係，我可能得先離開了。"
80000095-46 = "要是被風紀委員會之類的傢伙發現老師跟我待在一起，可能會造成你的困擾……"
80000095-47 = "所以儘快離開這裡吧！！今晚剩下的時光也要好好享受喔～！"
80000095-48 = "再會～！！"
80000095-56 = "……啊！！"
80000095-57 = "如果真的在意到吃不下去的話，要拿來穿也行哦～！#n它的材質是可以穿的～！！"
80000095-58 = "隨你想怎麼用吧～！！哈～哈哈哈哈！！"
80000095-66 = "（隨後回到夏萊，仔細地觀察了佳澄送的巧克力）"
80000095-67 = "（……與堅硬的下層不同，上層的味道既柔軟又甜美，吃起來十分美味）"

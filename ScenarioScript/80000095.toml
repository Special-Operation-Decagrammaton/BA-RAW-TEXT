80000095-22 = "#wait;10"
80000095-23 = "3;카스미;03;그렇지, 그렇지! 어때, 좀 그럴싸해 보여?\n#3;em;[재잘]"
80000095-24 = "3;카스미;08;기억하고 있어? 전에 숲에서 내 슬리퍼가 끊어졌을 때, 선생님이 새 슬리퍼 사 줬잖아.\n#3;m3"
80000095-25 = "3;카스미;99;물론 사 준 선생님이야 그러고 바로 잊어버렸을 거라고 생각하긴 하지만……. 나는 빚 진 채로 넘어가는 주의가 아니거든.\n#3;em;…"
80000095-26 = "3;카스미;02;그렇지만 똑같은 슬리퍼를 사 줘 봐야 당장 선생님에게는 큰 의미가 없을 거 같고……. 그래서 이번 기회로 만들어 온 거지!"
80000095-27 = "3;카스미;05;어때. 꽤 그럴싸하지? 선생님이 보기에도 진짜 슬리퍼 같지?\n#3;em;[반짝]"
80000095-28 = "3;카스미;08;……응?"
80000095-29 = "3;카스미;10;직접 만들었냐고? ……글쎄? 어떨 거 같아?"
80000095-30 = "3;카스미;14;후후후. 일단 확실히 나의 흔적은 담겨 있어. 그건 약속하지.\n#3;em;[음표]"
80000095-31 = "3;카스미;01;어쩌면 그게 손이 아니라……."
80000095-32 = "3;카스미;10;……발 쪽일 수도 있긴 해도 말이야."

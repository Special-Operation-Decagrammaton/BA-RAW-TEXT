[translation]
80000095-1 = "#title;진실은 저 너머에"
80000095-2 = "#na;(카스미의 연락을 받고, 인적이라곤 보이지 않는 밤의 다리 위로 향했다.)"
80000095-3 = "#na;(잠시간 기다리니, 저 멀리서 손을 흔들며 저벅저벅 걸어오던 카스미의 모습이 보였다.)"
80000095-4 = "#na;카스미;오오~. 선생님~!! 일찍부터 나와 있었네~?"
80000095-5 = "3;카스미;03;와핫핫핫핫! 기다렸어? 미안, 미안. 원래는 좀 더 일찍 나와서 내가 선생님을 기다릴 계획이었지만…….\n#3;em;[재잘]\n#3;a"
80000095-6 = "3;카스미;02;알다시피 내가 좀, 여기저기서 찾는 사람이 많아서 말이야. 쫓아오는 녀석들 눈을 피해 오느라 시간이 좀 걸렸지."
80000095-7 = "3;카스미;99;애초에 이런 오밤중에, 이런 썰렁한 다리 위에서 보자고 한 것도 그런 이유고 말이야."
80000095-8 = "3;카스미;08;……응? 그래서 무슨 일이냐고?\n#3;em;[?]"
80000095-9 = "3;카스미;10;어허~. 왜 이러시나, 이 사람. 아무리 나라도 이런 날 정도는 챙길 줄 안다고~."
80000095-10 = "3;카스미;02;당연하잖아? 오늘은 발렌타인 데이고……."
80000095-11 = "3;카스미;11;그게 아니라면……. 역시 나한테서 받는 초콜릿은 그다지 바라던 게 아니었던 걸까?"
80000095-12 = "3;카스미;03;만약 그런 거라면 미리 사과해야겠는걸. 괜히 소중한 시간 잡아먹게 해서. 와하하핫!!\n#3;em;[재잘]\n#3;hophop"
80000095-13 = "3;카스미;02;……절대 그런 게 아니라고? 그거 정말 다행이군! 덕분에 나도 맘 편하게 줄 수 있겠어."
80000095-14 = "3;카스미;01;그럼…….\n#3;greeting"
80000095-15 = "3;카스미;01;자……. 여기! 두둥!!\n#3;em;[!]\n#3;hophop"
80000095-16 = "#st;[0,0];instant;1;"
80000095-17 = "#clearST"
80000095-18 = "3;카스미;01\n#3;m5\n#wait;1500"
80000095-19 = "#wait;2500"
80000095-20 = "[ns1] \"슬……리퍼?\"\n[ns2] \"초콜릿……인가?\""

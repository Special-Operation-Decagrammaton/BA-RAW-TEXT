[translation]
80000095-1 = "ความจริงใจที่แฝงอยู่"
80000095-2 = "(หลังจากคุณครูได้รับการติดต่อจากคาสุมิก็รีบออกมาที่สะพานกลางดึกที่ไร้ผู้คน)"
80000095-3 = "(คุณครูยืนรอไม่นานนัก ก็เห็นภาพของคาสุมิเดินแกว่งมือไปมาจากที่ไกลๆ)"
80000095-4 = "โอ้~ คุณครู~!! มาเร็วเชียวนะ~?"
80000095-5 = "วะฮะฮะฮะฮ่า!! มารองั้นเหรอ? โทษทีๆ ตอนแรกฉันก็คิดว่าจะออกมารอคุณครูอยู่หรอก..."
80000095-6 = "แต่คุณครูก็น่าจะรู้ว่ามีหลายๆ คนตามตัวฉันอยู่ พอต้องหาทางหลบพวกที่ไล่ตามมาก็เลยใช้เวลาเยอะ#nไปหน่อยน่ะ"
80000095-7 = "และที่ชวนให้มาเจอกันบนสะพานที่ดูเงียบสงบกลางดึกแบบนี้ก็เพราะเรื่องนั้นแหละ"
80000095-8 = "หืม...? แล้วฉันเรียกออกมาเพราะเรื่องอะไรน่ะเหรอ?"
80000095-9 = "เฮ้อ~ อะไรกันเนี่ยคนคนนี้... เห็นแบบนี้ฉันก็รู้จักธรรมเนียมของวันเทศกาลแบบนี้เหมือนกันนะ~"
80000095-10 = "มันก็แน่นอนอยู่แล้วมั้ยล่ะ วันนี้เป็นวันวาเลนไทน์นะ..."
80000095-11 = "หรือว่า... ไม่ได้คาดหวังว่าจะได้ช็อกโกแลตจากฉันอย่างนั้นเหรอ?"
80000095-12 = "ถ้าเป็นอย่างนั้นละก็... ขอโทษด้วยแล้วกันที่รบกวนเวลาอันแสนมีค่าของคุณครูน่ะ วะฮะฮะฮะฮ่า!!"
80000095-13 = "ไม่ใช่แบบนั้นเลยงั้นเหรอ...? งั้นก็ค่อยยังชั่วหน่อย! แบบนี้ฉันก็คงจะให้ช็อกโกแลตได้อย่างสบายใจ#nแล้วละ"
80000095-14 = "ถ้างั้น..."
80000095-15 = "เอ้า... นี่ไง! แต่นแต๊น!!"
80000095-20 = "[ns1] \"ระ...รองเท้าแตะ?\"\n[ns2] \"ช็อกโกแลตงั้นเหรอ...?\""
80000095-23 = "ใช่แล้วๆ เป็นไง เหมือนมากเลยใช่ไหมล่ะ?"
80000095-24 = "จำได้ใช่ไหมล่ะ? ก่อนหน้านี้ตอนที่อยู่ในป่าแล้วรองเท้าแตะของฉันขาด คุณครูซื้อรองเท้าแตะคู่ใหม่#nให้ด้วยไงล่ะ"
80000095-25 = "แน่นอนว่า คุณครูที่เป็นคนซื้อให้อาจจะลืมไปแล้วก็ได้... แต่ฉันน่ะ ไม่ใช่คนประเภทที่ชอบติดหนี้#nบุญคุณใครหรอกนะ"
80000095-26 = "แต่ว่าถ้าเกิดไปซื้อรองเท้าแตะมาให้คุณครูเฉยๆ มันก็ดูจะไม่มีความหมายอะไร... เพราะงั้นก็เลย#nใช้โอกาสนี้ทำมันขึ้นมายังไงล่ะ!"
80000095-27 = "เป็นไง! ดูเหมือนมากเลยใช่ไหมล่ะ? คุณครูเองก็คิดว่าเหมือนรองเท้าแตะเลยใช่ไหม?"
80000095-28 = "หืม...?"
80000095-29 = "ฉันทำเองเลยรึเปล่างั้นเหรอ...? นั่นสินะ คิดว่ายังไงล่ะ?"
80000095-30 = "ฮุฮุฮุ เอาเป็นว่ามีรอยประทับของฉันอยู่ก็แล้วกัน"
80000095-31 = "แต่ว่าไม่ใช่รอยมือหรอกนะ..."
80000095-32 = "อาจเป็นรอยเท้าก็ได้..."
80000095-36 = "[ns3] \"พูดใหม่ซิ...?\"\n[ns4] \"รอยเท้า...?\""
80000095-39 = "เอาละ~ เรื่องเล็กๆ น้อยๆ พวกนี้น่ะ ข้ามๆ ไปเถอะ!"
80000095-40 = "ถ้างั้นคราวนี้ก็..."
80000095-44 = "เฮ้อ..."
80000095-45 = "คุณครู ขอโทษนะแต่เหมือนฉันต้องไปแล้วละ ดูเหมือนพวกนั้นจะเจอพิกัดของฉันเข้าแล้ว"
80000095-46 = "ถ้าโดนพวกคนอื่นๆ หรือพวกคณะกรรมการวินัยจับได้ว่าอยู่กับฉันละก็ คุณครูเองก็คงจะลำบาก..."
80000095-47 = "เพราะงั้นรีบแยกย้ายไปจากที่นี่เถอะ!! ขอให้มีค่ำคืนที่มีความสุขนะ~!"
80000095-48 = "ฟิ้ววว~!!"
80000095-56 = "อ๊ะ...!!"
80000095-57 = "ถ้าไม่สะดวกใจที่จะกินละก็ ใส่เดินไปไหนมาไหนแทนก็ได้นะ~! ทำมาให้ใช้ได้สองแบบเลยน่ะ~!"
80000095-58 = "เลือกได้ตามใจชอบเลย~!! วะฮะฮ่าฮ่าฮ่า!!"
80000095-66 = "(จากนั้น พอคุณครูกลับมาถึงชาเล่ต์ก็ค่อยๆ ตรวจสอบช็อกโกแลตที่คาสุมิให้มาอย่างละเอียด)"
80000095-67 = "(ตรงด้านบนมีความนุ่มฟูและมีรสหวานต่างจากตรงพื้นข้างล่างนิดหน่อย... คุณครูจึงทานได้อย่าง#nเอร็ดอร่อย)"

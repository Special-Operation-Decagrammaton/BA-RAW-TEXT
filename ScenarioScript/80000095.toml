[translation]
80000095-1 = "The Truth Lies Beyond"
80000095-2 = "I received Kasumi's call and headed out to the bridge that night. There was no one else in sight."
80000095-3 = "After a few moments of waiting, I saw Kasumi walking toward me, waving in the distance."
80000095-4 = "Ohhh Sensei!! You're here pretty early, aren't you?"
80000095-5 = "Wahahaha! Kept you waiting, huh? Sorry about that. I had planned to get here earlier, so I'd be the one waiting for you, but..."
80000095-6 = "I'm kind of a little bit of a, you know, fugitive. It took a while to get away from all my pursuers."
80000095-7 = "That's why I asked to meet you here, in the middle of the night, on this lonesome bridge in the first place."
80000095-8 = "...Hm? You're wondering what's going on?"
80000095-9 = "Ugh. Come on. Even I can remember a special day like this."
80000095-10 = "Shouldn't it be obvious? It's Valentine's Day, after all..."
80000095-11 = "If that's not it, then... Maybe you're not an enjoyer of chocolate, after all?"
80000095-12 = "If that's the case, forgive me for wasting your precious time. Wahahahahaha!"
80000095-13 = "...Oh, I haven't? Excellent! So no need to hesitate about giving it to you."
80000095-14 = "Now then..."
80000095-15 = "Here! Ta-da!!"
80000095-20 = "[ns1] \"A...slipper?!\"\n[ns2] \"Is this chocolate?!\""
80000095-23 = "That's right, that's right! How about it?! Doesn't it look all delicious?"
80000095-24 = "Remember when my slipper broke while we were in the woods? You bought me a new one."
80000095-25 = "I'm sure you completely forgot about it. But I'm not the kind of person to forget a debt."
80000095-26 = "I didn't think buying you the exact same slippers would mean much to you...so I took the opportunity to make these ones instead!"
80000095-27 = "How about it? Masterworks, no? They look just like real slippers, don't they?"
80000095-28 = "...Hm?"
80000095-29 = "Did I make them myself? What do you think?"
80000095-30 = "Heehee. Well, they've definitely got my prints on them. I promise you that."
80000095-31 = "Though, it wasn't quite my handprints..."
80000095-32 = "...More like my footprints."
80000095-36 = "[ns3] \"...?\"\n[ns4] \"Footprints?\""
80000095-39 = "All right! Enough small talk!"
80000095-40 = "Now..."
80000095-44 = "...Uh-oh."
80000095-45 = "I'm sorry, Sensei. I need to get back. It looks like my location has been discovered."
80000095-46 = "It'd be troublesome for you if the Prefect Team or those other thugs caught us associating."
80000095-47 = "So it's time to skedaddle! Have a lovely night!"
80000095-48 = "Woosh!!"
80000095-56 = "...Ah!!"
80000095-57 = "If you're concerned about the flavor, feel free to wear it instead of eating it! The material's quite durable!"
80000095-58 = "Enjoy it as you like!! Wahahahahahaha!!!"
80000095-66 = "Back at Schale, I thoroughly examined the chocolate slippers Kasumi gave me."
80000095-67 = "While the sole was hard, the top of the sandal was soft and sweet. I enjoyed eating it."

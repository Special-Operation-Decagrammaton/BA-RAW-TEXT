[translation]
1003420-1 = "The Sincerity of a Proper Lady"
1003420-3 = "Welcome, Sensei!"
1003420-4 = "Thank you for coming! I wanted to show you the results of my recent training."
1003420-5 = "If you please, would you mind accompanying me to the kitchen?"
1003420-6 = "The Inner Discipline Club Kitchen"
1003420-7 = "This is the Inner Discipline Club's kitchen. "
1003420-8 = "It's used for cooking practice, meal prep, training of the mind and body and many...other...things?"
1003420-23 = "Why is the kitchen such a mess?!"
1003420-24 = "Ah! Um... H-Hey Mimori! Well... The Mouryo had a little celebration in the kitchen last night..."
1003420-25 = "So I'm afraid the kitchen is closed until we get it cleaned up. You'll have to come back tomorrow."
1003420-26 = "..."
1003420-27 = "I'm afraid I cannot do that."
1003420-44 = "Mimori?!"
1003420-45 = "All this calls for is some good, old-fashioned elbow grease!"
1003420-46 = "[s] \"If that's the case, I'd love to help.\""
1003420-47 = "What?! You're going to clean, Sensei?!"
1003420-48 = "I absolutely cannot abide by that! Please allow me to take care of the cleaning! This kitchen is the responsibility of the Inner Discipline Club!"
1003420-49 = "A real, proper lady would have been able to predict the Mouryo's festivities and the state of the kitchen before Sensei arrived!"
1003420-50 = "And knowing that, a proper lady would have arrived at the scene of the crime in the early hours and made sure it was sparkling before your visit!"
1003420-51 = "[s] \"That's asking a lot of yourself!\""
1003420-52 = "But... but..."
1003420-53 = "It's due to my inaction that this mess occurred..."
1003420-54 = "I could hardly ask you, my guest, to help with my mistake..."
1003420-55 = "[s1] \"You don't need to overthink it, Mimori.\"\n[s2] \"A proper lady knows when to accept help too.\""
1003420-58 = "..."
1003420-59 = "If you insist, Sensei, then... I will accept."
1003420-60 = "Thank you for your help, Sensei."
1003420-61 = "Th-Then! I must match Sensei's dedication!"
1003420-62 = "I, Mizuha Mimori, as the Vice President of the Inner Discipline Club..."
1003420-63 = "Will pour my heart and soul into this! Serious-Mode Mimori!"
1003420-64 = "[s] \"You look plenty serious normally though!\""
1003420-65 = "You have yet to see me serious! I must embody the proper lady with everything I am!"
1003420-66 = "Which means, I must use \"that.\""
1003420-73 = "[ns] \"Is it a high-tech cleaning tool?!\""
1003420-74 = "Ta-da! Let us begin!"
1003420-77 = "Mimori in serious mode(?) was truly...beyond amazing. Her energy and zeal bordered upon terrifying."
1003420-84 = "Whew... Thank you for your hard work, Sensei."
1003420-85 = "...What? I did all of the work? Haha..."
1003420-86 = "It was an even effort, Sensei! And you were just an assistant anyways!"
1003420-87 = "Since we're all done, allow me to take this off."
1003420-92 = "...I sh-shouldn't take it off? Wh-What do you mean you think it's \"cute\"?"
1003420-93 = "Such joking is not proper behavior, Sensei!"
1003420-94 = "Oh... It's not a joke...?"
1003420-95 = "..."
1003420-96 = "I-I'm sure you're tired! Why don't we go relax?"
1003420-99 = "Please wait here. I'll bring out some tea."
1003420-112 = "I hope you enjoy your drink, Sensei. I've brought some complementary wagashi as well."
1003420-113 = "This wagashi was actually the reason I invited you over. I've been working very hard on the recipe."
1003420-120 = "What do you think? Do you like the taste?"
1003420-121 = "[s] \"It's incredible! And it smells so good too!\""
1003420-122 = "What a relief! I'm happy to hear that."
1003420-123 = "What? My...apron?"
1003420-124 = "..."
1003420-125 = "It was the day I decided to become a proper lady, actually. I was inspired by a manga I was reading and went out and bought it.  "
1003420-126 = "It's a bit old now, but it still does its job very well."
1003420-127 = "[s] \"And it's still in really good condition!\""
1003420-128 = "Heehee. I'm glad it looks that way, but you can see all the patches and frayed edges I've fixed if you look a little closer."
1003420-129 = "But to me...to me it's still perfect.  "
1003420-130 = "I can't quite explain it, but I find it comforting when I have it on."
1003420-131 = "Cleaning, cooking, laundry, tailoring, mind reading... Its uses are endless."
1003420-132 = "[s] \"...I'm sorry, did you say mind reading?\""
1003420-133 = "Ah! D-Did I?"
1003420-134 = "You must have misheard! Or I misspoke!"
1003420-136 = "I kept pestering Mimori about what she knew about mind reading, but she was too skilled at changing the topic."
1003420-138 = "Ahem! Anyway, I bought this apron many years ago, and I actually had to fold it up because it was too big!"
1003420-139 = "I made a promise to myself, then. I promised myself I would be a proper lady by the time I could fit my apron properly."
1003420-140 = "I'm a little embarrassed, saying that out loud."
1003420-141 = "[s] \"It's a great sentiment. Don't be embarrassed.\""
1003420-142 = "...Do you truly think so?"
1003420-143 = "You see, at that time, I believed in my heart that I could achieve anything with the proper mindset and hard work."
1003420-144 = "But here I am, big enough to fit this apron perfectly."
1003420-145 = "Am I the proper lady I hoped to be by this time? Would the younger Mimori be proud of the current me?"
1003420-147 = "As I was opening my mouth to reassure Mimori she was giving it her all..."
1003420-148 = "Now then, Sensei. You weren't going to tell me I'm giving it my all and that's what matters, were you?"
1003420-149 = "[s] \"H-How did you know?!\""
1003420-150 = "Heehee... It's right out of the Sensei playbook! Although I appreciate it nonetheless.  "
1003420-151 = "[s3] \"Could this be the power of the apron?!\"\n[s4] \"The apron does give you mind-reading powers!\""
1003420-154 = "H-Huh?! I never said anything like that!"
1003420-158 = "Do not wink at me, Sensei! I have no secret mind-reading powers!"
1003420-159 = "Sensei? Sensei?!"
1003420-161 = "Afterwards, a very flustered Mimori tried to explain herself while we both enjoyed the rest of the tea and wagashi."

[translation]
1003420-1 = "大和撫子的真心"
1003420-3 = "歡迎您的到來，老師！"
1003420-4 = "今天邀請老師來……是想展現料理修行的成果給老師看。"
1003420-5 = "那麼我們趕緊到調理室去吧。"
1003420-6 = "修行部．調理室"
1003420-7 = "這裡就是我們修行部的調理室。"
1003420-8 = "除了料理修行之外，從準備食材到身心鍛鍊……都會在這裡進……行……？"
1003420-23 = "為什麼調理室會亂成這樣！？"
1003420-24 = "三，三森醬，是這樣的……昨晚妖怪劇團好像在調理室辦慶典。"
1003420-25 = "就算現在開始整理也要花不少時間，所以今天可能沒辦法使用了……"
1003420-26 = "……"
1003420-27 = "這樣不行。"
1003420-44 = "三森醬！？"
1003420-45 = "這種程度的髒亂，不用多久就能搞定了！"
1003420-46 = "[s]「啊，那我也來幫忙。」"
1003420-47 = "咦！？老師也要幫忙！？！？"
1003420-48 = "沒，沒關係的，請交給我吧！#n這裡畢竟是我們修行部的調理室！"
1003420-49 = "況且……一名理想的大和撫子應當事先預料到妖怪劇團會在這裡辦慶典才對……"
1003420-50 = "還要提前到達現場，將他們一網打盡才行……"
1003420-51 = "[s]「大和撫子不是那樣的吧！？」"
1003420-52 = "可，可是……"
1003420-53 = "都是因為我事前沒做好準備，調理室才會變成這樣……"
1003420-54 = "如果再給老師添麻煩的話……"
1003420-55 = "[s1]「不用放在心上。」\n[s2]「我也希望能幫助三森。」"
1003420-58 = "……"
1003420-59 = "既然老師都這麼說了……好吧。"
1003420-60 = "萬事拜託了，老師。"
1003420-61 = "那，那麼！為了花時間幫忙的老師……！"
1003420-62 = "我，水羽三森，作為修行部的副部長……"
1003420-63 = "會比平時加倍努力！更加全力以赴！"
1003420-64 = "[s]「平常那樣還不夠認真嗎！？」"
1003420-65 = "是的！為了成為更理想的大和撫子，必須隨時保持著上進的心！"
1003420-66 = "所以今天……要使用「那個東西」！"
1003420-73 = "[ns]「圍，圍裙！？」"
1003420-74 = "那麼，我要開始了！"
1003420-77 = "（認真模式（？）的三森實在是……非同小可，有點嚇人……）"
1003420-84 = "呼……辛苦了，老師。"
1003420-85 = "咦？工作幾乎都被我做完了？"
1003420-86 = "呵呵，請別這麼說。#n接受老師的幫助……反而會讓我覺得不好意思的。"
1003420-87 = "而且，可能也是多虧了這個……"
1003420-92 = "咦？您說穿著這件圍裙……很可愛？"
1003420-93 = "老師真是的，請別取笑我了。"
1003420-94 = "不是在取笑……？"
1003420-95 = "……"
1003420-96 = "老，老師應該累了，先換個地方吧！#n來，請往這裡！"
1003420-99 = "麻煩老師稍等，我這就去泡茶。"
1003420-112 = "來，請用。#n機會難得，我也準備了一些和菓子。"
1003420-113 = "其實……之所以邀請老師來，是想讓老師看著我製作和菓子的樣子……"
1003420-120 = "口味如何呢？茶會不會太燙？"
1003420-121 = "[s]「非常美味，茶也很香哦。」"
1003420-122 = "呵呵，太好了……"
1003420-123 = "咦？這件圍裙……是嗎？"
1003420-124 = "……"
1003420-125 = "這……是我第一次夢想成為理想的自己時，看漫畫買的圍裙。 "
1003420-126 = "一直珍惜地使用到了現在……已經有點老舊了。"
1003420-127 = "[s]「不過看起來好像跟新的差不多呢？」"
1003420-128 = "呵呵，是嗎？#n其實仔細看的話已經起毛球了，而且到處都有修補的痕跡哦。"
1003420-129 = "但對我來說……這是無可取代的圍裙。"
1003420-130 = "不只穿起來很舒服，最重要的是它所帶給我的安心感……"
1003420-131 = "打掃、做料理、洗衣服、裁縫、讀心……用途無窮無盡呢。"
1003420-132 = "[s]「……讀心？」"
1003420-133 = "啊，不，不對！"
1003420-134 = "不是的！是我說錯了！"
1003420-136 = "（雖然多次詢問有關讀心的事，但三森總是會馬上轉移話題……）"
1003420-138 = "由於是在很久之前買的，當時都得折好幾次才能穿。"
1003420-139 = "那時……我心裡是這麼想的──#n等這件圍裙變合身的時候，我一定已經更接近自己的夢想了吧。"
1003420-140 = "呵呵……真懷念。#n現在回想起來好像有點難為情呢。"
1003420-141 = "[s]「我覺得這不是件需要感到害羞的事哦？」"
1003420-142 = "是嗎……我也不清楚。"
1003420-143 = "當時的我認為只要有所期待，任何事都能如願以償。"
1003420-144 = "如今圍裙已經變得如此合身……"
1003420-145 = "而我是否成為年幼時希望成為的自己了呢……我並不清楚。"
1003420-147 = "（正打算告訴三森已經夠努力了的瞬間──）"
1003420-148 = "啊，老師，您現在是不是想說「我已經夠努力了」？"
1003420-149 = "[s]「你怎麼知道！？」"
1003420-150 = "呵呵……可能是因為這很像是老師會說的話吧。#n我感到很安心，謝謝您。 "
1003420-151 = "[s3]「這件圍裙果然有什麼祕密吧！」\n[s4]「只要穿上就能提升讀心術的能力之類的！？」"
1003420-154 = "什，什麼！？#n我從來沒有這麼說過哦……？"
1003420-158 = "就，就算老師用「全都明白了」 的表情看我也……！"
1003420-159 = "老師？老師？？"
1003420-161 = "（三森難得表現出慌張的一面，然而卻還是沒有好好回答問題……）"

[translation]
101-1 = "ประกาศจับ ได้เริ่มขึ้นแล้ว"
101-2 = "ห้องยุทธการ องค์การนักเรียน"
101-3 = "ไม่ได้พบกันนานเลยนะ คุณครู สบายดีหรือเปล่า?"
101-4 = "ฉันต้องขอบคุณคุณครูกับนักเรียนคนอื่นๆ ของชาเล่ต์ที่คอยแก้ปัญหาเรื่องต่างๆ ให้#nฉันถึงได้มีเวลาว่างมานั่งกินขนมแบบนี้ (ง่ำๆ)"
101-5 = "จริงๆ นะ พวกเด็กๆ ของชาเล่ต์นี่หลอกใช้ง่าย... เอ้ย มีน้ำใจมากจริงๆ"
101-6 = "แต่แน่นอนว่าเด็กนักเรียนทุกคนในคิโวทอสไม่ได้น่ารักเหมือนเด็กในสังกัดของชาเล่ต์หรอกนะ"
101-7 = "เด็กนักเรียนบางคนก็มักก่ออาชญากรรมร้ายแรงที่ทางองค์การนักเรียนไม่สามารถควบคุมได้เลย"
101-8 = "ไหนๆ ก็พูดถึงเรื่องนี้แล้ว คุณช่วยจัดการพวกเด็กๆ ที่อยู่ในรายชื่อประกาศจับหน่อยได้ไหม?"
101-9 = "ถ้าเรื่องนี้คลี่คลายได้ ฉันจะแบ่งมันฝรั่งทอดรสไข่ปลาให้เอง~ (ง่ำๆ)"

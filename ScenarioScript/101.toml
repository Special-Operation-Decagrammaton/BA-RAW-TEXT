[translation]
101-1 = "特殊任務．懸賞通緝"
101-2 = "聯邦學生會．作戰指揮室"
101-3 = "好久不見，老師。 #n最近過得好嗎？"
101-4 = "多虧老師和夏萊的學生們解決了各種事件，我才能每天吃著零食悠哉度日唷。（喀滋）"
101-5 = "哎呀，夏萊的學生好使喚……是些親切的人真是太好了。"
101-6 = "不過並不是奇普托斯的所有學生都是溫柔善良的孩子。"
101-7 = "其中也有聯邦學生會難以控制，因犯下重罪而受懸賞通緝的學生。"
101-8 = "……所以說，有時間的話，可以替我們把這些被懸賞通緝的學生抓回來嗎？"
101-9 = "要是順利的話，我會分一點餅乾給你吃的～（喀滋喀滋）"

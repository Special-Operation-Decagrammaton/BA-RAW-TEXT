[translation]
101-1 = "#title;현상수배, 시작합니다."
101-2 = "#place;총학생회 상황실"
101-3 = "3;모모카;11;오랜만이야, 선생님. #n그동안 잘 지냈어?\n#3;a\n#3;em;[반응]"
101-4 = "3;모모카;45;나야 선생님과 샬레의 학생들이 온갖 말썽을 해결해준 덕분에 과자나 먹으며 여유로운 나날을 보내는 중이지. (와작)"
101-5 = "3;모모카;34;정말이지 샬레의 학생들은 써먹기 편리해서…… 아니, 친절해서 다행이라니까.\n#3;em;…"
101-6 = "3;모모카;02;물론 키보토스의 모든 학생들이 샬레의 학생들처럼 상냥한 건 아니야.\n#3;em;[반응]"
101-7 = "3;모모카;05;개중에는 총학생회의 통제를 벗어난 중범죄를 일으켜 현상수배가 걸린 학생들도 있어."
101-8 = "3;모모카;20;그래서 말인데, 시간이 남으면 이 현상수배 중인 학생들을 대신 좀 처리해 줄래?\n#3;em;[음표]"
101-9 = "3;모모카;45;일이 잘 해결되면 나중에 내 명란 과자를 나누어 줄게~ (와작)"

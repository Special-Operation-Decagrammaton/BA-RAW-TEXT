[translation]
10005050-1 = "Episode 5;Problem Solving, the C&C Way"
10005050-4 = "Golden Fleece Brig"
10005050-6 = "Ah, that stings... I'm all scraped up."
10005050-7 = "Are you okay Sensei? Are you hurt?"
10005050-8 = "[s1] \"I'm fine. I'm not hurt.\"\n[s2] \"You were the one on the front lines.\""
10005050-11 = "Whew."
10005050-12 = "I'm relieved. I would've had to bash more heads in if you got hurt."
10005050-13 = "...Anyway, I swear there were like a hundred guards in there."
10005050-14 = "I would've took them all down if not for these stupid shoes."
10005050-15 = "Tch. I told you guys playing it smart wouldn't work."
10005050-16 = "...I am sorry though, Sensei. Now even you're captured."
10005050-17 = "[s3] \"I'm okay. Don't worry about me.\"\n[s4] \"All things considered, you're pretty calm, Neru.\""
10005050-18 = "If you say so..."
10005050-19 = "If you say so..."
10005050-20 = "Well, honestly, this is par for the course I guess. You learn to expect these things in our line of work."
10005050-21 = "And it's not like we can't salvage this either."
10005050-22 = "I am irked at how annoying it's going to get from here on out, though..."
10005050-26 = "Yoohoo! Neru, I'm hee-eeere!"
10005050-27 = "*sigh*"
10005050-28 = "This is what I mean by annoying."
10005050-35 = "Yahahaha! You really got me there!"
10005050-36 = "Asuna's cute little face popped up on the display board, and then yours right behind me!"
10005050-37 = "But tough luck to you! Visitors are completely protected here."
10005050-38 = "Basically, all of these wonderful guards are each my very own personal bodyguards. Even you can't win, Neru!"
10005050-39 = "Not unless you face down every single person here and cause trouble at a different school.\n\n"
10005050-40 = "Hmm... Or..."
10005050-41 = "You could try your hand at getting a VIP Pass by drawing an S-grade from the raffle."
10005050-42 = "You'd get extrajudicial powers and immunity, so that'd work for you! Yahahahaha!"
10005050-43 = "Not like that'd happen! Hah! I'd love to see Neru spending her precious money for an S-grade."
10005050-44 = "Even after using all those bonds, I still haven't seen an S-grade. So good luck with that!"
10005050-45 = "This time, I, Kurosaki Koyuki, am really truly free from the evils of Milennium!"
10005050-46 = "My beautiful, wonderful self will take over this ship and live the life of royalty I deserve."
10005050-47 = "Well, aren't you full of energy?\n\n\n"
10005050-48 = "But mind your manners. Can't you see there's an adult present?"
10005050-49 = "Huh? An adult?"
10005050-51 = "*gasp*"
10005050-52 = "Wow! I've never seen you before!"
10005050-53 = "It's nice to meet you. I'm Kurosaki Koyuki, but my beloved upperclassmen like to call me by the codename White Rabbit."
10005050-54 = "[s5] \"Hi, Koyuki. You look as used to this as Neru is.\"\n[s6] \"The target knows her own codename...\""
10005050-55 = "Yahahahaha! This isn't my first rodeo!"
10005050-56 = "Yahahahaha! This isn't my first rodeo!"
10005050-57 = "Anyway, what's an adult like you doing here? Are you Neru's guardian?"
10005050-58 = "What...?!"
10005050-59 = "[s7] \"You could say something along those lines.\"\n[s8] \"As much as I'd love that, unfortunately no.\""
10005050-60 = "Sh-Shut up! It's not! It's not like that at all!"
10005050-61 = "Sh-Shut up! Why are you saying weird things?!"
10005050-62 = "Don't entertain the brat, Sensei!"
10005050-63 = "Huh?"
10005050-65 = "Sensei...?!"
10005050-66 = "Ooh, wow! You're a sensei? I've never seen one of you before!"
10005050-67 = "What does a sensei even do? Babysit Neru?"
10005050-68 = "Shut your trap, brat! It's none of your business!"
10005050-69 = "[s9] \"Well, what about you, Koyuki?\"\n[s10] \"Your upperclassmen were worried. What are you doing here?\""
10005050-70 = "Me? Nothing bad I promise, heehee."
10005050-71 = "Me? Nothing bad I promise, heehee."
10005050-72 = "...What?"
10005050-73 = "I guess I did take a bond or two for the raffle once I ran out of money..."
10005050-74 = "I'd say more than one or two..."
10005050-75 = "Have you been tracking your spending at all? Do you realize how much you've spent?"
10005050-76 = "Keeping track? Should I have been?"
10005050-77 = "Yahahaha! I just spent whenever I needed, so you'll need to ask for an invoice to know how much!"
10005050-78 = "Just how much did you play?! Were you just going to waste your life away gambling?"
10005050-79 = "Hmph! It's not like I was logging my hours! And I was gonna win soon, thank you very much!"
10005050-80 = "*sigh* And what'll you do once you spend all of Millennium's money?"
10005050-81 = "Other schools have money too."
10005050-82 = "..."
10005050-83 = "And you don't see anything wrong with that? At all?"
10005050-84 = "Wrong...? If the money's there... Why can't I spend it?"
10005050-85 = "It's good for the economy for money to circulate. I'm being helpful, right?"
10005050-89 = "Do you understand now, Sensei? There's no getting through to her."
10005050-90 = "I could say the same, Neru! Hmph. Always temperamental and violent."
10005050-91 = "I might be behind these bars, but you better watch your tongue."
10005050-92 = "The others'll come and spring me outta here soon enough."
10005050-93 = "And as soon as they do, my fist is going straight...!"

[translation]
10005050-1 = "ตอนที่ 5;แก้ปัญหาสไตล์ C&C"
10005050-4 = "ห้องขัง เรือโกลเด้น ฟลีซ"
10005050-6 = "อ๊ะ แสบจัง... ถลอกหมดแล้วเนี่ย"
10005050-7 = "ครูเป็นอะไรมั้ย? บาดเจ็บตรงไหนรึเปล่า..."
10005050-8 = "[s1] \"ไม่เป็นไร ครูไม่ได้เจ็บอะไร\"\n[s2] \"ครูถอยออกมาทันน่ะ\""
10005050-11 = "เฮ้อ..."
10005050-12 = "โล่งอกไปทีนะ ถ้าคุณครูบาดเจ็บละก็ ฉันคงจะไม่อยู่เฉยแน่ๆ"
10005050-13 = "แต่ว่าน่าทึ่งไปเลยนะ ห้องแค่ห้องเดียวแท้ๆ แต่มีการ์ดเฝ้าอยู่เป็นร้อยเลย"
10005050-14 = "ถ้าไม่ใช่เพราะใส่รองเท้าแบบนี้อยู่ ฉันคงจัดการเจ้าพวกนั้นได้หมดไปแล้ว..."
10005050-15 = "ชิ... ต่อให้พวกนั้นฉลาดมาจากไหนก็เถอะ แต่พอจะเจอวิธีที่ไม่คุ้นเคย สุดท้ายก็กลายเป็นแบบนั้น"
10005050-16 = "ขอโทษนะ เป็นเพราะพวกเรา ครูก็เลยต้องลำบากไปด้วยเลย"
10005050-17 = "[s3] \"ครูไม่เป็นไรหรอก ไม่ต้องห่วง\"\n[s4] \"พอคิดดูแล้ว เนรุก็ใจเย็นมากเลยนะ\""
10005050-18 = "อืม... ก็นะ..."
10005050-19 = "อืม... ก็นะ..."
10005050-20 = "ก็ใช่อยู่หรอก และที่จริงแล้วนี่ก็ไม่ใช่เรื่องที่ต้องกังวลมากเกินไปด้วย เพราะเวลาทำงาน เรื่องแบบนี้#nเกิดขึ้นได้เป็นปกติอยู่แล้ว"
10005050-21 = "และภารกิจของเราก็ยังไม่ล้มเหลวสักหน่อย"
10005050-22 = "แต่ที่ฉันหงุดหงิดน่ะเป็นเรื่องที่จะเกิดขึ้นหลังจากนี้ต่างหาก..."
10005050-26 = "ยะฮู้ว~! ฉันมาแล้วค่ะรุ่นพี่~!"
10005050-27 = "เฮ้อ..."
10005050-28 = "อืม... เรื่องที่ต้องเห็นสีหน้าที่มีความสุขของยัยเด็กนั่นน่ะละ"
10005050-35 = "ฮะฮะฮะฮ่า!! ทำเอาตกใจหมดเลย"
10005050-36 = "จู่ๆ หน้าของรุ่นพี่อาสึนะก็ขึ้นอยู่บนจอยักษ์แบบนั้น แถมพอหันไปก็เจอรุ่นพี่...!"
10005050-37 = "แต่ก็ทำอะไรฉันไม่ได้หรอกนะคะ! ในฐานะของลูกค้าของที่นี่ ฉันได้รับความคุ้มครอง#nอย่างแน่นหนาเลยละค่ะ"
10005050-38 = "หรือพูดอีกอย่างก็คือ การ์ดของที่นี่เป็นเหมือนผู้พิทักษ์ของฉันเลยค่ะ! ถึงจะเป็นพวกรุ่นพี่ก็ตามที#nมีแค่ 4 คนก็คงยากหน่อยนะคะ~"
10005050-39 = "ถ้าไม่ได้คิดจะมาเผชิญหน้ากับทุกคนที่นี่แล้วเป็นปรปักษ์กับโรงเรียนนี้ละก็..."
10005050-40 = "อืม... งั้นพวกรุ่นพี่ก็ต้อง..."
10005050-41 = "ต้องไปเล่นล็อตโต้... แล้วก็สุ่มให้ได้ระดับ S แล้วไปแลกตั๋ว VIP มา"
10005050-42 = "แบบนั้นก็จะได้สิทธิ์พิเศษในการอยู่เหนือกฎของที่นี่ แถมยังได้รับสิทธิ์คุ้มกันด้วยนะ อ่ะฮะฮะฮะฮะ!!"
10005050-43 = "แต่คงเป็นไปไม่ได้หรอกเนอะ... รุ่นพี่จะสุ่มได้ระดับ S ด้วยเงินที่มีน่ะเหรอ..."
10005050-44 = "ขนาดฉันทุ่มเงินไปเป็นกระสอบแล้วยังไม่ได้ระดับ S เลยค่ะ~ สรุปเลยก็คือ... ไปไม่ได้ไงล่ะ!"
10005050-45 = "คราวนี้คงได้เวลาที่ฉัน... คุโรซากิ โคยูกิจะหลุดพ้นจากการตามล่าของยักษ์แห่งมิลเลเนียมแล้วค่ะ!"
10005050-46 = "ในฐานะของเจ้าของเรือลำนี้ ฉันจะขับไล่รุ่นพี่ออกไป และใช้ชีวิตอย่างราชินีอยู่ที่นี่ค่ะ!"
10005050-47 = "ให้ตายสิ ดูชอบอกชอบใจน่าดูเลยนะ"
10005050-48 = "...จะว่ายังไงดีล่ะ นี่เธอลืมมารยาทไว้ที่บ้านรึยังไง? ไม่เห็นผู้ใหญ่ที่อยู่ข้างๆ ฉันเหรอ?"
10005050-49 = "คะ...? ผู้ใหญ่...?"
10005050-51 = "เอ่อ... ฮึก!"
10005050-52 = "สะ...สวัสดีค่ะ! เพิ่งมีโอกาสได้พบเป็นครั้งแรกเลยค่ะ!"
10005050-53 = "คุโรซากิ โคยูกิค่ะ ส่วนใหญ่ตอนที่ถูกตามล่าตัวจะถูกเรียกด้วยโค้ดเนม 'ชิโระอุซางิ' ค่ะ!"
10005050-54 = "[s5] \"สวัสดีโคยูกิ เธอก็ดูคุ้นเคยดีเหมือนเนรุเลยนะ\"\n[s6] \"คนที่เป็นเป้าหมายรู้โค้ดเนมที่ใช้เรียกตัวเองด้วยเหรอ...\""
10005050-55 = "อ่ะฮะฮะฮะฮะ!! ฉันไม่ได้เพิ่งถูกตามล่าแค่ครั้งสองครั้งนี่คะ~"
10005050-56 = "อ่ะฮะฮะฮะฮะ!! ฉันไม่ได้เพิ่งถูกตามล่าแค่ครั้งสองครั้งนี่คะ~"
10005050-57 = "ว่าแต่คุณผู้ใหญ่ตรงนี้เป็นใครกัน... ผู้ปกครองของรุ่นพี่เหรอคะ?"
10005050-58 = "หาาาา...!!"
10005050-59 = "[s7] \"ไม่ใช่ก็ใกล้เคียงน่ะ\"\n[s8] \"ถึงใจอยากจะเป็นก็เถอะ แต่ก็น่าเสียดายน้า\""
10005050-60 = "นะ... หนวกหูน่า!! เปล่านะ ไม่ใช่แบบนั้นสักหน่อย!"
10005050-61 = "นะ...หนวกหูน่า!! เปล่านะ ไม่ใช่แบบนั้นสักหน่อย!"
10005050-62 = "ครูนี่พูดอะไรแปลกๆ อีกแล้ว!? อย่าเอาฉันไปพูดล้อเล่นกับยัยเด็กนั่นสิ!!"
10005050-63 = "หืม? คุณ...?"
10005050-65 = "คุณครู...!?"
10005050-66 = "คุณครูงั้นเหรอคะ!? ว้าว! ฉันเพิ่งเคยได้เจอคุณครูเลยค่ะ!!"
10005050-67 = "ว่าแต่ว่าคุณครูทำงานอะไรเหรอคะ? แล้วทำไมคุณครูถึงได้มาอยู่ที่นี่กับรุ่นพี่เนรุล่ะ...?"
10005050-68 = "ไม่ต้องรู้หรอกน่า เจ้าเด็กบ้า! จะอยากรู้ไปทำไม?"
10005050-69 = "[s9] \"แล้วโคยูกิล่ะ มาทำอะไรที่นี่?\"\n[s10] \"พวกรุ่นพี่เป็นห่วงเธอนะ ไม่ได้ทำเรื่องไม่ดีใช่มั้ย?\""
10005050-70 = "คะ? เรื่องไม่ดี? เรื่องไม่ดีอะไรเหรอคะ?"
10005050-71 = "คะ? เรื่องไม่ดี? เรื่องไม่ดีอะไรเหรอคะ?"
10005050-72 = "คะ...?"
10005050-73 = "เรื่องพันธบัตรน่ะเหรอคะ? พอดีฉันมาเล่นล็อตโต้ที่นี่แล้วเงินไม่พอ ก็เลยเอามาใช้นิดหน่อยเอง..."
10005050-74 = "นิดหน่อย? แบบนั้นเรียกนิดหน่อยเรอะ?"
10005050-75 = "ได้คำนวณบ้างรึเปล่าว่าผลาญเงินไปเท่าไรแล้วน่ะ? ดูแล้วคงจะไม่ได้คิดเลยใช่มั้ย?#nแค่ผลาญเล่นๆ ไปเท่านั้น?"
10005050-76 = "คำนวณยอดเหรอคะ? ก็นะ... ไม่เคยคิดเลย"
10005050-77 = "ฉันพิมพ์ออกมาใช้ทุกครั้งที่นึกได้ เพราะงั้นถ้าไปขอบิลมาก็น่าจะรู้ยอดได้นะคะ"
10005050-78 = "เธอเล่นล็อตโต้ไปเท่าไรเนี่ย! คิดจะทุ่มเงินที่มีเล่นล็อตโต้ที่นี่ไปตลอดชีวิตรึไง!?"
10005050-79 = "ตะ... ต้องนับก่อนสิคะถึงจะรู้ยอดเงินน่ะ แล้วก็ถ้าเงินหมด ก็แค่ไปเอามาจากที่อื่นก็ได้นี่คะ!"
10005050-80 = "เฮอะ แล้วถ้าใช้เงินของโรงเรียนมิลเลเนียมหมดแล้วล่ะ?"
10005050-81 = "โรงเรียนอื่นไม่มีเงินเหรอคะ?"
10005050-82 = "...."
10005050-83 = "...เคยคิดบ้างมั้ยว่าการเอาเงินของคนอื่นมาผลาญเล่นแบบนี้มันเป็นเรื่องแปลกน่ะ"
10005050-84 = "ก็... ไม่นะ? ทำไมเหรอคะ? ก็แค่เอาเงินที่มีอยู่มาใช้แค่นั้นเอง"
10005050-85 = "ปกติเงินก็มีไว้ใช้ให้หมุนเวียนนี่คะ การเอาเก็บไว้เฉยๆ ต่างหากเป็นเรื่องที่ทำไม่ถูกนะคะ"
10005050-89 = "เห็นมั้ยล่ะครู ยัยนี่เป็นเด็กแบบนี้ละ ยัยนี่น่ะคุยกันไม่รู้เรื่องหรอก"
10005050-90 = "รุ่นพี่นั่นละที่พูดไม่รู้เรื่อง! เฮ้อ... ก็เป็นคนที่ทำอะไรก็ใช้ความรุนแรงตลอดนี่น้า~"
10005050-91 = "เฮอะ... ยัยเด็กคนนี้... ที่กล้าพูดแบบนี้คงเพราะคิดว่าตัวเองยังไม่ถูกจับได้สินะ..."
10005050-92 = "เตรียมตัวให้ดีเหอะ อีกไม่นานเดี๋ยวพวกคนอื่นๆ ก็มาพาฉันออกไปได้แล้วละ"
10005050-93 = "พอออกไปแล้ว ฉันจะจัดการเธอให้ดู...!"
10005050-105 = "อยู่ที่นี่เองสินะ"
10005050-106 = "โอ๊ะ เหมือนจะมารวมตัวกันอยู่ที่นี่หมดเลยนะคะ"
10005050-108 = "เฮือกกก!? ระ...รุ่นพี่...!?"
10005050-109 = "วะฮ่ะฮ่ะฮ่า! เห็นมั้ยล่ะ เมื่อกี้ฉันบอกว่าไง?"
10005050-110 = "ฉันรู้อยู่แล้วว่าจะต้องเป็นแบบนี้! ฉันเชื่อมือพวกนี้อยู่แล้วละว่าจะต้องมาช่วยพวกฉันออกไป!"
10005050-115 = "มัวยืนทำอะไรอยู่ล่ะ? รีบเข้าไปข้างในสิ!"
10005050-117 = "...?"
10005050-118 = "ฮุฮุ..."
10005050-119 = "..."
10005050-120 = "คือว่า... พวกเราก็ถูกจับมาเหมือนกัน"
10005050-124 = "กรรมของเวรแท้ๆ... ให้ตายสิ..."

[translation]
10005050-1 = "第5話;接下來就是平時的C&C"
10005050-4 = "黃金芙利號．臨時牢房"
10005050-6 = "啊啊可惡，這不是都擦傷了嗎……"
10005050-7 = "老師，你還好吧？有沒有受傷？"
10005050-8 = "[s1]「嗯，我沒事。」\n[s2]「因為有寧瑠保護我。」"
10005050-11 = "呼……"
10005050-12 = "沒有受傷就好。#n要是老師受傷的話，我是絕對不會放過那些傢伙的。"
10005050-13 = "話說，在那種狹窄的地方「1對100以上」果然還是太多了啊……#n那些警備員到底是多閒……"
10005050-14 = "呿，要是沒有穿著這雙鞋的話應該就能贏了……"
10005050-15 = "真是的，就是因為不習慣什麼「聰明地」才會落得這種下場……"
10005050-16 = "……抱歉，老師。都是因為我們才會把你捲進來。"
10005050-17 = "[s3]「我沒事，別在意。」\n[s4]「總覺得寧瑠非常冷靜呢。」"
10005050-18 = "嗯……算吧。"
10005050-19 = "嗯……算吧。"
10005050-20 = "畢竟現在也不是什麼需要緊張的狀況。這種事經常發生。"
10005050-21 = "而且任務也還沒失敗。"
10005050-22 = "雖然那件事對我來說無所謂，但想到之後的事還是會有點煩躁啊……"
10005050-26 = "呀齁～！前輩，好久不見──！！"
10005050-27 = "……唉。"
10005050-28 = "因為我們必須看見那傢伙幸災樂禍的樣子……"
10005050-35 = "哎呀～嚇了我一跳呢真是的～"
10005050-36 = "明日奈前輩熟悉的臉突然「咚」的一聲出現，想說怎麼會這樣，#n結果一回頭就看見了總是板著一張臉的寧瑠前輩……！"
10005050-37 = "不過現在已經完全沒問題了！#n畢竟我現在以這艘船客人的身分被保護得好好的！"
10005050-38 = "這裡大量的警備員，全部都像是我的護衛一樣哦！#n就算是前輩們，面對這麼龐大的數量也無能為力吧～？"
10005050-39 = "雖然剛才也來了不少，但警備員還有非常多唷？#n而且，雖然處於半獨立經營的狀態，你們也不想與這所學校為敵吧？#n既然身分已經曝光，作戰就算失敗了吧？"
10005050-40 = "嗯，如果說前輩們還有機會的話……"
10005050-41 = "像是在遊憩大廳的遊戲贏得「S級」，成為VIP之類的？"
10005050-42 = "那樣的話，似乎就能獲得超越法規的特權，說不定就能突破這個狀況了呢？#n尼哈哈哈哈哈！"
10005050-43 = "不過，那種事只有夢裡才會發生吧～？"
10005050-44 = "前輩們現在身上也沒多少錢對吧？#n我至今為止投入了相當高的金額也沒出現過，我想實際上是不會出現的吧～！"
10005050-45 = "我黑崎小雪，這次一定會逃離千年的魔掌給你們看的！"
10005050-46 = "成為這艘船的主人，把前輩們趕出去……無憂無慮、隨心所欲地活下去！"
10005050-47 = "哈。嘰嘰喳喳的說個沒完，看起來很開心嘛。"
10005050-48 = "太過入迷讓視力變差了嗎？還是連禮儀這兩個字都忘記了？#n沒看到這裡有個大人在嗎？"
10005050-49 = "大人……？"
10005050-51 = "……啊！？"
10005050-52 = "你，你好！應該是初次見面吧！？"
10005050-53 = "我叫黑崎小雪。代號是「白兔」，正在被懸賞通緝！"
10005050-54 = "[s5]「初次見面，小雪。」\n[s6]「你也用那個代號稱呼自己啊……」"
10005050-55 = "尼哈哈哈哈！該說是習慣了嗎，因為平時總是被這麼叫著。"
10005050-56 = "尼哈哈哈哈！該說是習慣了嗎，因為平時總是被這麼叫著。"
10005050-57 = "話說回來……你是寧瑠前輩的監護人嗎？"
10005050-58 = "啊……！！"
10005050-59 = "[s7]「現在確實有點類似。」\n[s8]「我也是很想那麼做。」"
10005050-60 = "不是，你是笨蛋嗎！？才不是那樣！？"
10005050-61 = "不是，你是笨蛋嗎！？才不是那樣！？"
10005050-62 = "老師也別陪那傢伙胡鬧了！！"
10005050-63 = "「老師」……？"
10005050-65 = "老，老師！？"
10005050-66 = "原來是老師啊！？哇……！#n我還是第一次見到老師呢！！"
10005050-67 = "先不說那個了，老師和寧瑠前輩一起來這種地方做什麼……？"
10005050-68 = "不用告訴他，老師！話說，你知道那些又想怎樣！"
10005050-69 = "[s9]「小雪你在這裡做什麼呢？」\n[s10]「前輩們都很擔心，你沒有在做什麼奇怪的事吧？」"
10005050-70 = "奇怪的事嗎……不，沒做什麼特別的啊？"
10005050-71 = "奇怪的事嗎……不，沒做什麼特別的啊？"
10005050-72 = "……債券？"
10005050-73 = "啊啊，那是因為在那個遊戲裡把錢花光了，所以才用了一點……"
10005050-74 = "喂，金額我可是有聽說過，那才不是一點吧。"
10005050-75 = "你知道自己花了多少錢嗎？我猜你恐怕想也沒想就一直用下去了吧？"
10005050-76 = "這個嘛，沒特別算過呢……？"
10005050-77 = "因為我想用的時候就會拿來用，合計起來可能確實不少吧～？"
10005050-78 = "才不是「不少吧～」咧！雖然我也沒記清楚但是個很驚人的數字啊！"
10005050-79 = "就算你這麼說，我又沒算過……反正沒錢了再從其他地方拿過來不就好了？"
10005050-80 = "如果千年所有的錢都用完了該怎麼辦？"
10005050-81 = "其他學校不是還有錢嗎？"
10005050-82 = "……"
10005050-83 = "……話說，你難道都不覺得擅自花別人的錢很奇怪嗎？"
10005050-84 = "不覺得。哪裡奇怪了？"
10005050-85 = "錢本來就是要拿來流通的。放在那裡不用才奇怪吧？"
10005050-89 = "……我想你應該也明白了，老師。這傢伙就是這樣的人，完全沒辦法溝通。"
10005050-90 = "那是我的台詞吧～所以才說遇到事情就用暴力的前輩很讓人困擾啊。"
10005050-91 = "這傢伙，在這種時候才敢得意忘形……"
10005050-92 = "給我等著……"
10005050-93 = "我一離開這裡，馬上就會把你這傢伙給……！"
10005050-105 = "啊啊，果然在這裡啊。"
10005050-106 = "哎呀哎呀，真是大團圓呢。"
10005050-108 = "前，前輩們……！？"
10005050-109 = "哈，看到了吧！"
10005050-110 = "就知道你們會來！"
10005050-115 = "還站著做什麼！快給我進去！"
10005050-117 = "……啊？"
10005050-118 = "……呵呵。"
10005050-119 = "……"
10005050-120 = "……抱歉，我們也被抓了。"
10005050-124 = "喂喂喂喂……"

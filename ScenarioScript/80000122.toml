[translation]
80000122-1 = "สูตรลับ"
80000122-2 = "[ns] \"วันนี้งานเยอะจริงๆ เลยแฮะ...\""
80000122-3 = "(ขณะที่คุณครูกำลังยืดเส้นยืดสาย)"
80000122-8 = "ว่าไง~ ครู!"
80000122-9 = "[s] \"ซัตสึกิ...?\""
80000122-13 = "[ns] \"วันนี้ซัตสึกิเข้าเวรตัวแทนเหรอ?\""
80000122-14 = "เปล่า เปล่าหรอก"
80000122-15 = "ฉันมีเรื่องจะบอกก็เลยมาหาน่ะ"
80000122-16 = "ฮุฮุ อยากรู้ใช่มั้ยล่ะ?"
80000122-17 = "เอาละ ตั้งใจดูให้ดีๆ นะ!"
80000122-21 = "นี่เป็นช็อกโกแลตที่ฉันทำขึ้นเพื่อเสริมความผูกพันระหว่างครูกับฉัน"
80000122-22 = "ถ้ากินน้ำตาลในปริมาณที่เหมาะสมจะช่วยคลายความเหนื่อยล้าได้ เพราะงั้นนี่ถือว่าเป็นของขวัญที่#nเหมาะสำหรับคนที่งานเคร่งเครียดอย่างครูเลยใช่มั้ยล่ะ?"
80000122-23 = "[ns] \"ว้าว~ ขอบใจนะ!\""
80000122-25 = "[ns] \"แต่ว่า... ทำเองงั้นเหรอ?\""
80000122-26 = "อื้อ! การทำช็อกโกแลตเองจะช่วยเพิ่มความใกล้ชิดได้ใช่มั้ยล่ะ?"
80000122-27 = "ครูเป็นผู้ให้ความร่วมมือคนสำคัญของแพนเดโมเนียม โซไซตี้ทั้งคน ฉันก็ควรทุ่มเทให้สมน้ำสมเนื้อสิ"
80000122-28 = "เอาละ~ เอาละ~ อย่ามัวแต่จ้องอยู่เลย รีบกินเถอะ"
80000122-29 = "[s1] \"อ่า อื้อ... ครูแค่แปลกใจนิดหน่อย\"\n[s2] \"งั้นขอชิมเลยแล้วกันนะ?\""
80000122-34 = "[ns] \"อร่อยจนแปลกใจเลยแฮะ...\""
80000122-35 = "ฉันไม่คิดว่ามันจะน่าแปลกอะไรเลยนะ"
80000122-36 = "ถ้าทำช็อกโกแลตไม่อร่อยสิ น่าแปลกใจมากกว่าอีกไม่ใช่รึไง?"
80000122-37 = "มีบางคนทำช็อกโกแลตได้ไม่อร่อยด้วยงั้นเหรอ? น่าแปลกจังเลยนะ"
80000122-38 = "อ๊ะ ฉันใส่สูตรลับพิเศษของตัวเองลงไปด้วย มันอาจจะทำให้รสชาติดีขึ้นก็ได้ ฮุฮุ"
80000122-39 = "[s] \"เดี๋ยวนะ สูตรลับพิเศษ... ของซัตสึกิเหรอ?\""
80000122-40 = "เอ๊ะ ดูเหมือนจะอยากรู้เลยนะ"
80000122-41 = "[s] \"เรียกว่าเริ่มระแวงมากกว่าอยากรู้ดีกว่ามั้ง?\""
80000122-42 = "อะฮ่าฮ่า คิดแล้วเชียว แต่มันสายไปแล้วละนะ ก็ครูกินเข้าไปแล้วนี่นา~!"
80000122-43 = "เป็นไง? รู้สึกอะไรบ้างมั้ย?"
80000122-44 = "[s] \"ก็ไม่ได้รู้สึกอะไรเป็นพิเศษหรอก... ว่าแต่สูตรลับอะไรน่ะ?\""
80000122-45 = "จริงๆ แล้วมันเป็นสูตรลับที่ฉันไม่บอกใครนะ แต่ครูถือว่าเป็นบุคคลเป้าหมาย เพราะงั้นฉันจะคลาย#nความอยากรู้ของครูให้ก็ได้"
80000122-46 = "ช็อกโกแลตอันนี้น่ะ..."
80000122-47 = "[ns] \"เอื๊อก...\""
80000122-48 = "ฉันใส่เวทมนตร์ที่ทำให้มันอร่อยอย่างน่าเหลือเชื่อลงไปด้วยน่ะสิ!"
80000122-52 = "[ns] \"หืม?\""
80000122-53 = "ฮุฮุ... ฉันได้เวทมนตร์ลับจากกลุ่มลับๆ แห่งหนึ่งจากฝ่ายข่าวกรองของแพนเดโมเนียม โซไซตี้มาน่ะ"
80000122-54 = "ตอนทำช็อกโกแลตอันนี้ฉันตั้งใจร่ายคาถาเต็มที่ เพราะงั้นมันต้องได้ผลแน่ๆ"
80000122-55 = "เวทมนตร์ที่ทำให้อาหารอร่อยขึ้น ครูเองก็น่าจะเคยได้ยินใช่มั้ยล่ะ?"
80000122-56 = "[s] \"หรือว่านั่น...\""
80000122-57 = "อะฮ่าฮ่า สมกับที่เป็นครูจังเลยนะ คงจะรู้จักสินะ?"
80000122-58 = "หมุนมันไปรอบๆ แบบนี้ แล้วก็ร่ายคาถาว่า \"จงอร่อยขึ้น จงอร่อยขึ้น\""
80000122-59 = "[s3] \"อืม...\"\n[s4] \"นั่นน่ะเหรอเวทมนตร์ลับ นั่นมัน...\""
80000122-62 = "ฮุฮุ นี่เป็นช็อกโกแลตสำหรับครูเลยนะ เพราะงั้นฉันก็ต้องตั้งใจทำให้ดีที่สุดสิ"
80000122-63 = "ถ้าช็อกโกแลตอันนี้ทำให้สนิทกับครูได้มากขึ้น จนครูยอมให้ความร่วมมือกับทางแพนเดโมเนียม โซไซตี้ละก็ จะมีอะไรดีไปกว่านี้อีกล่ะ?"
80000122-64 = "[s5] \"ครูว่ามันไม่เป็นแบบนั้นหรอก...\"\n[s6] \"ขอบใจที่ตั้งใจทำให้ครูนะ อร่อยมากเลย\""
80000122-67 = "หืม~ ถึงจะน่าเสียดาย แต่อย่างน้อยปฏิกิริยาตอบรับก็ไม่เลว ถือว่าคืบหน้าไปกว่าครึ่งก็แล้วกันนะ"
80000122-68 = "ถือว่าคุ้มค่าที่มาหาด้วยตัวเองแบบนี้"
80000122-69 = "เอาละ อย่ามัวแต่เขินเลย รีบๆ กินเข้าไปอีกสิ กินอีกๆ"
80000122-71 = "(และซัตสึกิก็นั่งดูคุณครูอยู่อย่างนั้น กระทั่งคุณครูกินช็อกโกแลตของเธอหมดถึงได้ยอมกลับไป)"

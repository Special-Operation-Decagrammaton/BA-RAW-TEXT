[translation]
80000122-1 = "Secret Recipe"
80000122-2 = "[ns] \"I have so much work again today...\""
80000122-3 = "I was twisting my tired body around to stretch, when..."
80000122-8 = "Hello, Sensei!"
80000122-9 = "[s] \"Satsuki...?!\""
80000122-13 = "[ns] \"Are you on Student Rep duty today?\""
80000122-14 = "No, no!"
80000122-15 = "I simply came here to deliver a gift to you."
80000122-16 = "Fufu, you're curious, yes?"
80000122-17 = "Now then, take a good look!"
80000122-21 = "It's chocolate I made to strengthen our bond and improve our relationship!"
80000122-22 = "An appropriate amount of sugar intake is known to help with fatigue, so it's the perfect gift for you, who is constantly overwhelmed with work."
80000122-23 = "[ns] \"Wow! Thank you!\""
80000122-25 = "[ns] \"Wait... You made it?\""
80000122-26 = "Indeed! Its homemade qualities serve to strengthen our bond even more, no?"
80000122-27 = "I thought I should do that much for you, Pandemonium Society's close partner."
80000122-28 = "Now, now. Don't just stand there! Try one!"
80000122-29 = "[s1] \"Ah, s-sure... I was just surprised because it was unexpected.\"\n[s2] \"I-I'll go ahead and try one then.\""
80000122-34 = "[ns] \"...It's delicious, which is even more surprising.\""
80000122-35 = "Is that really something to be surprised about?"
80000122-36 = "Wouldn't it be harder to make bad chocolate?"
80000122-37 = "That's actually very possible? Very interesting."
80000122-38 = "Ah, of course, it may be delicious because I used my special recipe for it. Fufu."
80000122-39 = "[s] \"Hold on. Your...special recipe?\""
80000122-40 = "Oho, have I piqued your curiosity?"
80000122-41 = "[s] \"I think 'worried' would be more accurate than 'curious.'\""
80000122-42 = "Ahaha, you're sharp. But the moment you ate the chocolate, you'd already fallen for my trap!"
80000122-43 = "How do you feel? Did it work?"
80000122-44 = "[s] \"I don't feel anything special... What was the recipe?\""
80000122-45 = "It is a secret I would normally keep close to the chest, but I suppose satisfying your curiosity serves my purpose as well."
80000122-46 = "In this chocolate..."
80000122-47 = "[ns] *gulp*"
80000122-48 = "I cast a spell to make it delicious!"
80000122-52 = "[ns] \"Huh?\""
80000122-53 = "Fufu... With the power of the Pandemonium Society's Intelligence Committee, I acquired a special spell used by a secret organization."
80000122-54 = "Utilizing all my focus, I cast a spell on the chocolate while making it. I'm certain it worked."
80000122-55 = "Do you happen to know the spell to make things delicious as well, Sensei?"
80000122-56 = "[s] \"Do you mean...?\""
80000122-57 = "Ahaha, as expected. You do know!"
80000122-58 = "You spin it like this, and repeat over and over, \"Become delicious, become delicious!\""
80000122-59 = "[s3] \"Y-Yeah...\"\n[s4] \"Th-That was a spell?\""
80000122-62 = "Fufu, I did my best because it was for you."
80000122-63 = "Now it would be perfect if this event improves our relationship so drastically that you voluntarily submit to the wishes of the Pandemonium Society."
80000122-64 = "[s5] \"I don't think that would ever happen...\"\n[s6] \"But thank you for putting your all in it. It was very tasty.\""
80000122-67 = "Hmm. What a shame. But your reaction wasn't half bad, so I suppose I'll call it half of a success."
80000122-68 = "I'm glad I came all this way to give it to you in person."
80000122-69 = "Well then, don't hold back, have more. More, more."
80000122-71 = "Satsuki watched me finish all the chocolates, then headed back."

[translation]
80000122-1 = "祕密食譜"
80000122-2 = "[ns]「今天也是一堆工作啊……」"
80000122-3 = "（一邊伸展僵硬的身體，一邊做著像是拉筋的動作時──）"
80000122-8 = "嗨～老師！"
80000122-9 = "[s]「皐月……？」"
80000122-13 = "[ns]「今天輪到你當值日生嗎？」"
80000122-14 = "不對不對。"
80000122-15 = "我是有東西要給你才來的。"
80000122-16 = "呵呵，很好奇吧？"
80000122-17 = "來～請看！"
80000122-21 = "這是我為了加深和老師的羈絆、提升親密度而做的巧克力哦！"
80000122-22 = "適量的糖分有助於減輕疲勞，#n對於總是忙到不可開交的老師來說，這是再適合不過的禮物了！"
80000122-23 = "[ns]「哇～謝啦！」"
80000122-25 = "[ns]「不過……你說這是你做的？」"
80000122-26 = "沒錯！畢竟手工製作對提升親密度更有幫助不是嗎？"
80000122-27 = "身為萬魔殿的重要合作夥伴，這點心意是應該的。"
80000122-28 = "來來來～別發呆了，快嚐一口看看吧！"
80000122-29 = "[s1]「啊，嗯……因為我有點驚訝。」\n[s2]「那我就吃一顆囉？」"
80000122-34 = "[ns]「……竟然意外地好吃。」"
80000122-35 = "這沒什麼好驚訝的吧？"
80000122-36 = "我反而覺得，要把本來就好吃的巧克力做得難吃比較困難。"
80000122-37 = "偶爾還是會有例外發生？那還真神奇呢。"
80000122-38 = "啊，當然也可能是因為我加了特製的祕方，所以才會這麼好吃吧。呵呵。"
80000122-39 = "[s]「等等。皐月的特製……祕方？」"
80000122-40 = "哎呀，看你的表情好像很好奇呢？"
80000122-41 = "[s]「比起好奇，說是不安應該更貼切吧？」"
80000122-42 = "啊哈哈，你果然很敏銳呢。#n可惜你在吃下去的時候就已經中計囉～老師！"
80000122-43 = "怎麼樣？有感覺到什麼效果嗎？"
80000122-44 = "[s]「倒是沒什麼特別的感覺……所以到底是什麼祕方？」"
80000122-45 = "其實我本來並不打算把祕方告訴任何人，#n不過既然是有意為之，我就來為老師揭曉謎底吧？"
80000122-46 = "這個巧克力裡面呢……"
80000122-47 = "[ns]「……（吞口水）」"
80000122-48 = "加入了能讓東西變好吃的咒語哦！"
80000122-52 = "[ns]「嗯？」"
80000122-53 = "呵呵～那可是我靠著萬魔殿情報部的力量，從某個神祕組織入手的祕密咒語。"
80000122-54 = "我在做巧克力的時候很認真地施加了這個咒語，肯定有發揮效果才對！"
80000122-55 = "讓食物變好吃的咒語，老師應該也聽過吧？"
80000122-56 = "[s]「該不會是……」"
80000122-57 = "啊哈哈，老師果然知道呢？"
80000122-58 = "就是那個邊轉圈邊說「變好吃吧～變好吃吧～」的咒語沒錯！"
80000122-59 = "[s3]「唔嗯……」\n[s4]「那能算是祕密咒語嗎……」"
80000122-62 = "呵呵，這畢竟是要送給老師的巧克力，所以我可是拚盡了全力。"
80000122-63 = "如果能趁機提高老師的親密度，#n進而讓你心甘情願地服從萬魔殿的話，那就再好不過了。"
80000122-64 = "[s5]「那實在不太可能……」\n[s6]「不過還是感謝你的用心，真的很好吃。」"
80000122-67 = "哼嗯～雖然遺憾但反應還不錯，就當作是成功一半吧！"
80000122-68 = "親自走一趟果然是值得的。"
80000122-69 = "來來來～別客氣，再多吃一點吧！#n盡量吃盡量吃！"
80000122-71 = "（就這樣被皐月盯著，直到吃完所有巧克力他才離開）"

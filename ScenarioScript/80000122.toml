[translation]
80000122-1 = "#title;비밀 레시피"
80000122-2 = "[ns] \"오늘도 업무가 많구나……\""
80000122-3 = "#na;(찌뿌둥한 몸을 이리저리 뒤틀며 스트레칭 비슷한 것을 하던 찰나.)"
80000122-4 = "#st;[0,0];instant;1;"
80000122-5 = "#clearST"
80000122-6 = "#wait;1000"
80000122-7 = "#wait;2000"
80000122-8 = "3;사츠키;02;안녕~ 선생!\n#3;a\n#3;em;[반짝]"
80000122-9 = "[s] \"사츠키……?\""
80000122-10 = "#st;[0,0];instant;1;"
80000122-11 = "#clearST"
80000122-12 = "#wait;1000"
80000122-13 = "[ns] \"오늘 당번이었던가?\""
80000122-14 = "3;사츠키;99;아니, 아니야.\n#3;em;…"
80000122-15 = "3;사츠키;01;전해줄 것이 있어서 온 것뿐."
80000122-16 = "3;사츠키;03;후후, 궁금하지?"
80000122-17 = "3;사츠키;02;자아, 목도하도록 해!\n#3;closeup\n#3;em;[!]"
80000122-18 = "#st;[0,0];instant;1;"
80000122-19 = "#clearST"
80000122-20 = "#all;hide\n#wait;2000"
80000122-21 = "#na;사츠키;선생과의 유대감을 강화하고 친밀도를 높이기 위해 만든 초콜릿이야."
80000122-22 = "#na;사츠키;적절한 당분은 피로를 감소시키는 효과가 있으니, 항상 격무에 시달리는 선생에게 딱 알맞은 선물이지?"
80000122-23 = "[ns] \"와아~ 고마워!\""
80000122-24 = "#wait;1000"
80000122-25 = "[ns] \"그런데…… 만들었다고?\""
80000122-26 = "3;사츠키;03;응! 아무래도 수제라는 점이 친밀도 상승에는 더 유리하지 않겠어?\n#3;a\n#3;em;[음표]"
80000122-27 = "3;사츠키;99;만마전의 긴밀한 협력자인 선생에게 그 정도 수고는 들여야지."
80000122-28 = "3;사츠키;02;자아~ 자아~ 멍하니 있지 말고 어서 먹어봐."
80000122-29 = "[s1] \"아, 으응…… 의외라서 조금 놀랐어.\"\n[s2] \"그럼 하나 먹어볼까?\""
80000122-30 = "#st;[0,0];instant;1;"
80000122-31 = "#st;[0,0];instant;1;"
80000122-32 = "#clearST"
80000122-33 = "#wait;1500"
80000122-34 = "[ns] \"……평범하게 맛있어서 또 놀랍네.\""
80000122-35 = "3;사츠키;04;놀랄 포인트는 아니라고 생각하지만 말야.\n#3;em;[땀]"
80000122-36 = "3;사츠키;04;초콜릿인데 맛없게 만들기가 더 어렵지 않아?"
80000122-37 = "3;사츠키;01;가끔 그런 케이스가 나오기도 한다고? 신기하네."
80000122-38 = "3;사츠키;02;아, 물론 나의 특제 레시피가 더해졌기에 맛있게 느끼는 걸지도 몰라. 후후.\n#3;em;[반응]"
80000122-39 = "[s] \"잠깐. 사츠키의 특제…… 레시피?\""
80000122-40 = "3;사츠키;03;어라, 궁금한 눈치네.\n#3;em;[반짝]"
80000122-41 = "[s] \"궁금함보다는 불안함으로 해석하는 게 맞지 않을까?\""
80000122-42 = "3;사츠키;02;아하하, 역시 예리해. 하지만 이미 초콜릿을 먹은 이상 걸려들었다구, 선생~!\n#3;em;[재잘]"
80000122-43 = "3;사츠키;03;어때? 효과가 좀 있었으려나?"
80000122-44 = "[s] \"딱히 뭔가 느낌은 없지만…… 무슨 레시피인데?\""
80000122-45 = "3;사츠키;01;원래 누구에게도 말해주지 않을 비법이지만, 목적한 바가 있으니 선생의 궁금증을 풀어줘야겠지?"
80000122-46 = "3;사츠키;99;이 초콜릿에는……\n#3;em;…"
80000122-47 = "[ns] \"꿀꺽……\""
80000122-48 = "3;사츠키;03;엄청나게 맛있어지는 주문을 걸었다구!\n#3;em;[!]\n#3;closeup"
80000122-49 = "#st;[0,0];instant;1;"
80000122-50 = "#clearST"
80000122-51 = "#wait;2500"
80000122-52 = "[ns] \"으응?\""
80000122-53 = "3;사츠키;99;후후…… 만마전 정보부의 힘으로 어딘가의 집단에서 비밀리에 쓰인다는 주문을 입수했거든.\n#3;em;…"
80000122-54 = "3;사츠키;02;이 초콜릿을 만들 때 제대로 집중해서 걸었으니까, 분명 효과 있었을 거야."
80000122-55 = "3;사츠키;03;음식이 맛있어지는 주문. 선생도 알고 있으려나?\n#3;em;[?]"
80000122-56 = "[s] \"그거 혹시……\""
80000122-57 = "3;사츠키;02;아하하, 역시 선생이네. 아는구나?\n#3;em;[재잘]"
80000122-58 = "3;사츠키;03;이렇게 빙글빙글 돌리면서, '맛있어져라, 맛있어져라'를 반복하는 거.\n#3;greeting"
80000122-59 = "[s3] \"으응……\"\n[s4] \"비밀 주문이었나, 그거……\""
80000122-60 = "#wait;10"
80000122-61 = "#wait;10"
80000122-62 = "3;사츠키;99;후후, 선생에게 줄 초콜릿이니까 아무래도 최선을 다했달까."
80000122-63 = "3;사츠키;01;이 이벤트로 인해 선생의 친밀도가 높아져서, 자발적으로 만마전에 복종하게 된다면 그보다 더 좋은 일은 없겠지."
80000122-64 = "[s5] \"그럴 일은 없겠지만……\"\n[s6] \"정성을 다해줘서 고마워. 맛있었어.\""
80000122-65 = "#wait;10"
80000122-66 = "#wait;10"
80000122-67 = "3;사츠키;03;으흥~ 아쉽지만 그래도 반응이 나쁘지 않으니 절반의 성공이네.\n#3;em;[음표]"
80000122-68 = "3;사츠키;01;이렇게 직접 전해주러 온 보람이 있어."
80000122-69 = "3;사츠키;02;자아, 사양하지 말고 더 먹어. 더, 더.\n#3;closeup"
80000122-70 = "#all;hide"
80000122-71 = "#na;(그렇게 사츠키는 초콜릿을 다 먹을 때까지 지켜보다 돌아갔다.)"

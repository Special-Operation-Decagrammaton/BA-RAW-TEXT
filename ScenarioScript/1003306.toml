[translation]
1003306-1 = "Unchanging Faith"
1003306-2 = "I tried to finish up my work as quickly as possible to make time for my plans with Wakamo."
1003306-3 = "Work kept coming in, though, and it took me six hours later to finish my work than I originally promised."
1003306-7 = "I finally arrived at the meeting place, six hours late."
1003306-8 = "I was worried Wakamo may have gotten into trouble during that time,#nso I began searching the area as quickly as I could."
1003306-14 = "[ns] \"(There she is!)\""
1003306-16 = "How can you lie in front of a total stranger like that and expose your belly?"
1003306-17 = "I'll just have to teach you a lesson and show you what happens when you let your guard down."
1003306-18 = "[s] \"W-Wakamo?! What are you doing?!\""
1003306-26 = "Take this! How do you like that, hmm...? How about here?#nDo you like it when I scratch you here?"
1003306-30 = "Heehee. Well too bad."
1003306-31 = "I feel like scratching the back of your neck instead."
1003306-32 = "You can cry and pout all you want, but I'm the one who's in charge of the petting here."
1003306-33 = "[s] \"Wakamo? What are you doing?\""
1003306-34 = "What...?"
1003306-38 = "S-Sensei?!"
1003306-39 = "Oh. I was just...playing with this cat!"
1003306-40 = "I-It's not what it looks like!"
1003306-41 = "[s] \"It's exactly what it looks like. This is a surprise.\""
1003306-42 = "I-Is it?"
1003306-43 = "Oh. I suppose I've never told you how much I like animals."
1003306-44 = "Heehee. The truth is, I adore them."
1003306-45 = "I find them a lot easier to get along with than other people.#nThey don't talk, and can't say hurtful things..."
1003306-46 = "They're never ungrateful for attention, nor are they quick to betray."
1003306-47 = "It's a little sad how easy it is for them to reciprocate that kindness compared to the rest of us."
1003306-48 = "I just can't help myself around them."
1003306-49 = "I love how pure they are. Heehee."
1003306-50 = "[s1] \"R-Right. Reciprocate...\"\n[s2] \"I really messed up, huh?\""
1003306-51 = "Hmm?"
1003306-52 = "Hmm?"
1003306-53 = "Why so glum? Is something wrong, Sensei?"
1003306-54 = "[s3] \"I promised to see you after work, but let you down.\"\n[s4] \"I let you down by taking so long to finish work.\""
1003306-55 = "You feel like you disappointed me?"
1003306-56 = "You feel like you disappointed me?"
1003306-57 = "Oh. Was I making you think I was referring to you?"
1003306-58 = "Please, I would never do that! Of course I have complete trust in you."
1003306-59 = "I never even considered that you could betray me...#nThe thought never crossed my mind!"
1003306-67 = "[ns] \"W-Wakamo?!\""
1003306-70 = "The only thing I'm disappointed by is that you misunderstood me."
1003306-71 = "It's too painful, thinking of the possibility that I'd even consider you abandoning me like that."
1003306-72 = "You were late. So what? These things happen.#nIt was only six hours, but who's counting?"
1003306-73 = "Certainly not me! My heart has been pounding all day because I was so excited to spend time with you!"
1003306-74 = "[s] \"Y-You made your point. You can let me go now...\""
1003306-75 = "Nonsense. Come closer and stroke my cheek.#nOr would you rather I stroke yours?"
1003306-76 = "Heehee. I don't mind waiting as long as I get to spend time with you.#nI can endure as long as it takes. ♥ "
1003306-77 = "How could I ever think you betrayed me? Please don't take what I said the wrong way."
1003306-78 = "I know such a tragedy could never happen. I don't know how to express my feelings right now."
1003306-79 = "[s] \"Okay, I get it. Relax.\""
1003306-80 = "Oh. You understand me? Are you sure?"
1003306-81 = "I'm so relieved!"
1003306-82 = "[s5] \"But what compelled you to wait so long?\"\n[s6] \"What if I wasn't able to make it?\""
1003306-83 = "Do you mean, what if you never showed up?"
1003306-84 = "Do you mean, what if you never showed up?"
1003306-85 = "Why would you even worry about that? I know you'd never break a promise with me."
1003306-86 = "Even I had to wait for more than six hours..."
1003306-87 = "...I know you would never break your word. You never break my trust and are always there to guide my hand."
1003306-88 = "So whether it took six hours, days, weeks, or even months,#nI would keep on waiting."
1003306-89 = "So why would I worry about that? Heehee. You're so silly."
1003306-90 = "[s] \"...\""
1003306-91 = "At least that's how I feel about the matter."
1003306-92 = "But I do still feel somewhat sad right now."
1003306-93 = "You thought I might lose faith in you because you were so late.#nHow can I prove that would never happen?"
1003306-94 = "[s] \"You really don't have to prove anything.\""
1003306-95 = "Oh!"
1003306-96 = "I have just the idea."
1003306-97 = "What if we spent tonight standing in the moonlight, and I whispered sweet nothings into your ears all night?"
1003306-98 = "Things like how my heart will never change how it feels about you."
1003306-99 = "Simply imagining it brings me so much joy that I can hardly contain myself.#nI feel like I could explode at a moment's notice."
1003306-100 = "[s] \"W-We wouldn't want that! Let's do something else, yeah?\""
1003306-101 = "Something else...?"
1003306-102 = "Goodness! You really want to spend time with me, don't you? ♥"
1003306-103 = "That makes me overjoyed, but..."
1003306-104 = "...I shouldn't rashly jump at the opportunity to overwhelm you again.#nI'm too devoted for something like that."
1003306-110 = "I'll save your offer for the future."
1003306-111 = "[s] \"Well, okay. Go easy on me when the time comes.\""
1003306-112 = "Heehee. You're so adorable when you're nervous."
1003306-113 = "Okay. I can hold out for now—this time. Heehee."
1003306-115 = "The day was coming to end, but we did manage to get a little shopping in as I walked Wakamo home."

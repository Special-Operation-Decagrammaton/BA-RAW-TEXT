1003306-15 = "#wait;2000"
1003306-16 = "3;와카모 사복;07;……초면인 제 앞에서 그렇게 벌러덩 드러누워 무방비하게 배를 내밀다니.\n#3;em;…\n#3;a"
1003306-17 = "3;와카모 사복;05;낯선 이에게 경계심을 품지 않았을 때, 어떤 말로를 걷게 될지. 직접 그 몸에 가르쳐 드리지요.\n#3;stiff"
1003306-18 = "[s] \"아니, 저, 저기?! 와카모 씨?!\""
1003306-19 = "#st;[0,0];instant;1;"
1003306-20 = "#clearST"
1003306-21 = "3;와카모 사복;05\n#3;d\n#wait;1000"
1003306-22 = "3;와카모 사복;05\n#3;a\n#3;closeup\n#wait;1000"
1003306-23 = "#wait;1000"
1003306-24 = "#wait;300"
1003306-25 = "#wait;1000"
1003306-26 = "3;와카모 사복;08;에잇! 에잇! 어떠신가요? 여기? 여기인가요? 여기를 긁어주는 쪽이 더 좋다 이건가요?\n#3;em;[반응]\n#3;closeup"
1003306-27 = "#st;[0,0];instant;1;"
1003306-28 = "#clearST"
1003306-29 = "#wait;2000"
1003306-30 = "3;와카모 사복;99;후훗. 하지만 안타깝군요.\n#3;closeup"
1003306-31 = "3;와카모 사복;01;제가 다음에 긁어 드릴 곳은 그곳이 아니라. 목 뒤쪽이랍니다.\n#3;closeup"
1003306-32 = "3;와카모 사복;06;어디 제 공격 앞에, 천박하게 고롱고롱 소리를 내며 울부짖어보도록 하시지요!\n#3;closeup\n#3;em;[!]"
1003306-33 = "[s] \"와카모 씨……? 지금 무엇을 하시는 건지……?\""
1003306-34 = "3;와카모 사복;08;……엣.\n#3;em;[?]"
1003306-35 = "#st;[0,0];instant;1;"
1003306-36 = "#clearST"
1003306-37 = "3;와카모 사복;08\n#3;em;…\n#wait;2500"
1003306-38 = "3;와카모 사복;02;서……, 선생님……?!\n#3;shake\n#3;em;[?!]"
1003306-39 = "3;와카모 사복;02;아, 그건 그러니까……! 고, 고양이 씨와 잠깐 가벼운 장난을 치고 있었달까……!"
1003306-40 = "3;와카모 사복;04;저 와카모, 결코 수상하거나 이상한 짓은……!\n#3;em;[///]\n#3;stiff"
1003306-41 = "[s] \"그렇구나……. 그보다 조금은 의외네.\""
1003306-42 = "3;와카모 사복;02;네? 의외?"
1003306-43 = "3;와카모 사복;01;아……. 제가 그렇게나 동물을 귀여워할 줄은 몰랐다……?\n#3;em;[반응]"
1003306-44 = "3;와카모 사복;03;글쎄요. 후후훗. 오히려 저는 이런 동물이라면 얼마든지 귀여워할 수 있답니다?"
1003306-45 = "3;와카모 사복;99;……사람과는 다르게 그 입으로 말을 꺼낼 일도 없고, 네에- 그렇기에 비로소 혀로 타인을 벨 일도 없는…….\n#3;em;…"
1003306-46 = "3;와카모 사복;03;얼마든지 귀여워하더라도 우쭐해 하지도 않고, 감히 배신을 하지도, 할 생각조차 못 하면서-\n#3;greeting"
1003306-47 = "3;와카모 사복;01;그저 할 줄 아는 거라곤 순수하게 자기가 받은 신뢰에 있는 그대로 답하는 것밖에 못 하는 가련한 것이 어찌 이리도 안타까운지."
1003306-48 = "3;와카모 사복;99;이런 안타깝기 그지없는 아이들을."
1003306-49 = "3;와카모 사복;03;네에, 귀여워하지 않을 도리가 없지요. 후후훗.\n#3;em;[하트]"
1003306-50 = "[s1] \"그, 그렇구나…….\"\n[s2] \"그, 그런 점에서……, 미안! 약속까지 했는데! 너무 늦어버려서!\""
1003306-51 = "3;와카모 사복;02;네……?"
1003306-52 = "3;와카모 사복;02;네……?"
1003306-53 = "3;와카모 사복;04;선생님께선 갑자기 무슨 이야기를 하시는지……. 저 와카모, 잘 이해가…….\n#3;stiff\n#3;em;[땀]"
1003306-54 = "[s3] \"일을 끝내고 바로 온다고 했는데. 이렇게나 늦어버렸잖아.\"\n[s4] \"이래서야 와카모를 배신한 거나 다름없으니까.\""
1003306-55 = "3;와카모 사복;02;선생님이, 저를 배신……?\n#3;em;…"
1003306-56 = "3;와카모 사복;02;선생님이, 저를 배신……?\n#3;em;…"
1003306-57 = "3;와카모 사복;03;아, 설마 방금 제가 한 말 때문에……? 그런 오해를……?"
1003306-58 = "3;와카모 사복;08;아, 아니요! 그런 말씀 마셔요! 그거라면 단언컨대 망설이지 않고 말할 수 있답니다!\n#3;em;[!]\n#3;stiff"
1003306-59 = "3;와카모 사복;99;저 와카모, 이제껏 단 한 번도 당신께서 저를 배신한다는 생각 따위……. 입 밖에 내어본 적도, 생각의 편린조차도 떠올려본 적도 없답니다!"
1003306-60 = "#st;[0,0];instant;1;"
1003306-61 = "#clearST"
1003306-62 = "3;와카모 사복;01\n#3;d\n#wait;1000"
1003306-63 = "3;와카모 사복;01\n#3;a\n#3;closeup\n#wait;1000"
1003306-64 = "#wait;500"
1003306-65 = "3;와카모 사복;01\n#3;jump\n#3;closeup\n#wait;200"
1003306-66 = "#all;hide\n#wait;2000"
1003306-67 = "[ns] \"와, 와카모……?!\""
1003306-68 = "3;와카모 사복;01\n#3;closeup\n#3;h"
1003306-69 = "#wait;500"
1003306-70 = "3;와카모 사복;99;아아……. 절, 절 그렇게 오해하셨단 말인가요? 너무, 너무 슬픕니다.\n#3;closeup\n#3;em;[///]\n#3;stiff"
1003306-71 = "3;와카모 사복;03;슬픔에 가슴이 옥죄어, 미어질 정도로- 저 와카모는 결단코 당신께서 절 내치실 거라는 불경한 생각 따윈 해본 적도 없는데. 어찌하여…….\n#3;closeup"
1003306-72 = "3;와카모 사복;01;원래 약속했던 시간보다 겨우 6시간 정도 늦었다는 게……. 그게, 뭐, 어찌 되었단 말인가요?\n#3;closeup"
1003306-73 = "3;와카모 사복;03;당신과 약속을 잡은 날이면, 이미 저는 만나기 전부터 당신을 만날 생각만으로도 가슴이 이렇게 뜨거워지는데……!\n#3;em;[하트]\n#3;greeting\n#3;closeup"
1003306-74 = "[s] \"자, 잠깐. 와카모. 이것 좀 놓고…….\""
1003306-75 = "3;와카모 사복;99;아아……. 좀 더 가까이, 제 뺨을 쓰다듬어 주시겠나요? 아니면, 제가 당신의 뺨을 쓰다듬어도 될까요?\n#3;stiff\n#3;em;[///]\n#3;closeup"
1003306-76 = "3;와카모 사복;03;후후후……♡ 네에, 바로 이런 시간이 기다리고 있다는 걸 아는 이상, 그 사이의 기다림 따위. 결코 괴롭지도 안타깝지도 않답니다. \n#3;closeup"
1003306-77 = "3;와카모 사복;01;그런 제가 당신께 배신감을 느꼈으리라는 오해를 하신다니, 안 돼요. 그건 곤란합니다.\n#3;closeup"
1003306-78 = "3;와카모 사복;99;절대로 그런 가슴 아픈 일 따윈 절대로 없으리라고, 제 가슴 속에 담긴 진심을 당신께 어찌 전해야 좋을지…….\n#3;closeup"
1003306-79 = "[s] \"알았으니까. 응. 진정해.\""
1003306-80 = "3;와카모 사복;03;아아……. 알아주시는, 건가요? 정말, 이시지요?\n#3;em;[반짝]\n#3;greeting"
1003306-81 = "3;와카모 사복;01;네, 그러시다면 다행입니다♡"
1003306-82 = "[s5] \"흠흠, 그래도 무작정 기다리기만 하면 어떡해.\"\n[s6] \"만약에 정말로 약속이 파투 났으면 어쩌려고 그래.\""
1003306-83 = "3;와카모 사복;04;……네? 약속이 파투 난다?\n#3;em;[?]"
1003306-84 = "3;와카모 사복;04;……네? 약속이 파투 난다?\n#3;em;[?]"
1003306-85 = "3;와카모 사복;02;어째서 그런 걱정을 하시나요? 당신이 저와 약속하셨다면, 그럴 일은 절대로 일어나지 않는걸요?"
1003306-86 = "3;와카모 사복;99;설사 이곳에서 당신을 기다리며 6시간이 아니라……."
1003306-87 = "3;와카모 사복;01;다른 치들과 달리 배신하지도, 거짓말을 하지도 않고, 오롯이 제 믿음에 보답해주며 어떤 상황이라도 손을 잡아주는 당신이라면……\n#3;em;…"
1003306-88 = "3;와카모 사복;03;6일, 6주, 여섯 달이 지나더라도 오늘, 지금처럼 당신은 반드시 저를 만나러 와줄 터인데."
1003306-89 = "3;와카모 사복;01;저 와카모가 어찌하여 그런 걱정을 하겠나요? 우후훗. 이상하신 분.\n#3;em;[하트]"
1003306-90 = "[s] \"…….\""
1003306-91 = "3;와카모 사복;03;네, 그렇게 정해져 있는 거랍니다."
1003306-92 = "3;와카모 사복;99;아아. 그렇다고는 해도, 저 와카모. 조금은 슬퍼졌답니다."
1003306-93 = "3;와카모 사복;04;제가 감히 당신께 그런 생각을 품었을 것이라 오해하시다니, 으음. 그럴 일은 결코 없을 것이라고 저 와카모가 어떻게 해야 증명할 수 있을는지.\n#3;stiff\n#3;em;[속상함]"
1003306-94 = "[s] \"아니, 굳이 증명까지 필요하지는…….\""
1003306-95 = "3;와카모 사복;02;아……!\n#3;em;[반응]"
1003306-96 = "3;와카모 사복;99;후후……. 좋은 생각이 났답니다."
1003306-97 = "3;와카모 사복;01;오늘 밤 단둘이, 휘영청 떠오른 달 아래에서 몇 번이고, 몇백, 몇천 번이고. 저 와카모의 마음 변치 않노라고……."
1003306-98 = "3;와카모 사복;03;밤을 지새워가며 속삭여 드리는 건 어떠할까요?\n#3;em;[반짝]\n#3;greeting"
1003306-99 = "3;와카모 사복;99;저, 상상한 것만으로도 이 깊은 곳, 넘쳐흐르는 기쁨으로 아아. 어찌해야 좋을지……."
1003306-100 = "[s] \"그, 그건 참아주라! 대신 다른 부탁이라면 들어줄 테니까!\""
1003306-101 = "3;와카모 사복;02;그걸 대신하여 다른 부탁을……?"
1003306-102 = "3;와카모 사복;03;어머나아♡ 그럼, 그건 어떠한 것이라도 괜찮다는 말씀이실까요?\n#3;stiff\n#3;em;[///]"
1003306-103 = "3;와카모 사복;01;또 기쁘기 그지없는 말씀을 하시다니……. 으음, 하지만 그렇군요."
1003306-104 = "3;와카모 사복;99;먹음직스러워 보인다고 하여 무작정 달려들어, 또다시 선생님을 기겁하게 만들어서야, 당신을 따르는 몸으로써 언어도단."
1003306-105 = "#st;[0,0];instant;1;"
1003306-106 = "#clearST"
1003306-107 = "3;와카모 사복;01\n#3;d\n#wait;1000"
1003306-108 = "3;와카모 사복;01\n#3;a\n#3;closeup\n#wait;1000"
1003306-109 = "#wait;1000"
1003306-110 = "3;와카모 사복;03;당신께서 주신 그 귀중한 기회, 후일을 도모하며 조금은 아껴두도록 하지요.\n#3;closeup\n#3;em;[하트]"
1003306-111 = "[s] \"그때는 살살 부탁드립니다…….\""
1003306-112 = "3;와카모 사복;99;우후후훗, 슬며시 겁먹은 체하는 요란마저 너무나도 귀여우신 분.\n#3;closeup"
1003306-113 = "3;와카모 사복;03;네에, 그럼 그것은 또 그때의 즐거움으로 남겨두도록 하지요. 후훗♡\n#3;em;[반짝]\n#3;closeup"
1003306-114 = "#all;hide"
1003306-115 = "#na;(그 뒤로 많이 늦게 되었지만, 무사히 와카모의 쇼핑에 어울려줄 수 있었다.)"

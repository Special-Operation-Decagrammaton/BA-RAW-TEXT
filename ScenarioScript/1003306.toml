[translation]
1003306-1 = "不變的心"
1003306-2 = "（與若藻約好之後，雖然想盡快完成工作前去赴約……）"
1003306-3 = "（然而等到總算處理完蜂擁而至的工作時，離約好的時間已經過了6個小時）"
1003306-7 = "（整整遲到了6個小時）"
1003306-8 = "（由於實在遲到太久，在擔心著若藻的同時，連忙跑向了見面的地點）"
1003306-14 = "[ns] （啊，若藻……！）"
1003306-16 = "面對初次見面的我，竟然毫無防備地將肚子露出來……"
1003306-17 = "缺少防人之心會面臨什麼樣的下場……我就讓你親身體會吧！"
1003306-18 = "[s]「若藻同學！？」"
1003306-26 = "嘿咿！嘿咿！怎麼樣呀？#n這裡，還是這裡？喜歡搔癢這裡嗎？"
1003306-30 = "呵呵，可惜……"
1003306-31 = "我接下來要搔你的是你的下巴！"
1003306-32 = "來！在我的攻擊之下盡情發出咕嚕咕嚕的聲音吧！"
1003306-33 = "[s]「那個，若藻同學……？」"
1003306-34 = "……咦。"
1003306-38 = "老，老師……！？"
1003306-39 = "這是，該怎麼說呢……！#n只，只是在對貓做一點小小的惡作劇而已……！"
1003306-40 = "若藻我絕沒有做奇怪或危險的事……！"
1003306-41 = "[s]「原來如此……好像有點意外。」"
1003306-42 = "意外……？"
1003306-43 = "啊……您沒想到我會這麼喜愛動物是嗎？"
1003306-44 = "原來如此，呵呵。#n我反而很想盡情疼愛這些動物呢。"
1003306-45 = "這些孩子與人不同，僅能發出「喵～」這類的聲音……卻也因此不會傷害他人……"
1003306-46 = "即便百般疼愛也不會因而拿翹，更遑論出現背叛的念頭……"
1003306-47 = "所能做的僅有將受到的信任如數報答……多麼令人不捨啊。"
1003306-48 = "面對如此惹人憐愛的孩子們……"
1003306-49 = "要人怎麼不去疼愛呢？呵呵。"
1003306-50 = "[s1]「這，這樣啊。話說回來……」\n[s2]「真的很抱歉！明明跟你約好了卻遲到這麼久……！」"
1003306-51 = "咦……？"
1003306-52 = "咦……？"
1003306-53 = "老師為何突然這麼說呢……若藻我不是很明白。"
1003306-54 = "[s3]「明明說了工作結束馬上過來，結果居然遲到這麼久……」\n[s4]「感覺就像背叛了和若藻的約定……」"
1003306-55 = "老師您，背叛了我……？"
1003306-56 = "老師您，背叛了我……？"
1003306-57 = "啊，難道是我剛才說的話……讓您誤會了？"
1003306-58 = "不是的！請您千萬別這麼說！#n若藻我能在此毫不猶豫地斷言──"
1003306-59 = "閣下背叛我這種事，哪怕一分一秒都從未出現在我的腦海裡！"
1003306-67 = "[ns]「若，若藻……！？」"
1003306-70 = "啊啊……是我讓您誤會了吧……#n我感到無比……無比的哀傷。"
1003306-71 = "胸口彷彿被揪住，將要被粉碎一般──#n即便若藻我從未出現閣下將離我而去……這樣不敬的想法。"
1003306-72 = "僅僅只是遲了6個小時又如何呢？"
1003306-73 = "與閣下約定的日子……#n若藻我在與您相見之前，心中早已為此感到熾熱無比……！"
1003306-74 = "[s]「等，等等若藻……先放開我吧……」"
1003306-75 = "啊啊……可以請您再靠近我一些，摸摸我的臉頰嗎？#n或者，能讓我摸摸閣下的臉頰嗎？"
1003306-76 = "呵呵呵……♡#n既然明白此刻終將到來……又怎會因等待而感到痛苦和悲傷呢？"
1003306-77 = "不能讓您誤以為我有被您背叛的感覺……否則我會很困擾的。"
1003306-78 = "若藻我心裡絕對沒有這麼認為……這深藏於內心的想法，該如何傳達給閣下呢……"
1003306-79 = "[s]「我，我知道了，你先冷靜……」"
1003306-80 = "啊啊……您明白了嗎？"
1003306-81 = "那真是太好了♡"
1003306-82 = "[s5]「不過如果等待遲遲沒有結果……」\n[s6]「假如我真的打破約定的話……你會怎麼做？」"
1003306-83 = "……打破約定？"
1003306-84 = "……打破約定？"
1003306-85 = "為何要擔心那種事呢……？#n既然閣下和我定下了約定，就絕不可能發生那種事不是嗎？"
1003306-86 = "即便等待閣下的時間並非6小時……"
1003306-87 = "如果是與他人不同，不會背叛、說謊……#n願意真摯回應我的信賴……無論何時都會緊握我手的閣下……"
1003306-88 = "哪怕經過6天、6週、6個月……都一定會像今天一樣前來見我的。"
1003306-89 = "若藻我又何必為此擔心呢？#n呵呵，真是奇怪的人呢♡"
1003306-90 = "[s]「……」"
1003306-91 = "沒錯，這就是我的想法。"
1003306-92 = "啊啊，話雖如此，若藻我依舊感到有些悲傷呢。"
1003306-93 = "竟然讓閣下產生了我會如此認為的誤解……該如何向您證明絕無此事呢？"
1003306-94 = "[s]「呃，其實不證明也沒關係……」"
1003306-95 = "啊……"
1003306-96 = "呵呵……我想到了一個好辦法。"
1003306-97 = "今夜單獨兩人，於燦爛明月之下……"
1003306-98 = "重複向您訴說數十、數百、數千次──若藻我的心意永不改變……直到天明如何？"
1003306-99 = "啊啊，光是想像，內心深處便滿溢著喜悅，這該如何是好……"
1003306-100 = "[s]「麻，麻煩請你忍耐一下！如果是其他請求的話我可以答應你！」"
1003306-101 = "其他請求是嗎……？"
1003306-102 = "哎呀哎呀♡#n您的意思是無論任何請求都可以嗎？"
1003306-103 = "雖然這確實令人雀躍……"
1003306-104 = "不過若是過於躁進，驚嚇到老師可就得不償失了。"
1003306-110 = "您賜予我的寶貴機會……還請容許我暫時保留，待深思熟慮後再行使用。"
1003306-111 = "[s]「到時候還請手下留情……」"
1003306-112 = "唔呵呵……就連暗自感到害怕的模樣也同樣惹人憐愛呢。"
1003306-113 = "好的，那麼就留待之後再來享用吧……♡"
1003306-115 = "（之後雖然時候已經不早，還是順利陪若藻買完了東西）"

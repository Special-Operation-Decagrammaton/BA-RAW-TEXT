[translation]
1003306-1 = "ความเชื่อที่ไม่มีวันเสื่อมคลาย"
1003306-2 = "(คุณครูพยายามทำงานให้เสร็จเร็วที่สุดเพื่อไปให้ทันเวลาตามที่สัญญากับวาคาโมะไว้)"
1003306-3 = "(แต่กว่าจะทำงานที่ค้างไว้เสร็จก็ใช้เวลากว่าหกชั่วโมง)"
1003306-7 = "(คุณครูจึงมาช้ากว่าเวลาที่นัดไว้ไปหกชั่วโมง)"
1003306-8 = "(คุณครูเป็นห่วงว่าจะเกิดอะไรขึ้นกับวาคาโมะในระหว่างนั้น คุณครูจึงรีบไปยังสถานที่#nนัดอย่างเร็วที่สุดเท่าที่จะทำได้)"
1003306-14 = "[ns] (อ๊ะ! วาคาโมะ...!)"
1003306-16 = "มานอนหงายท้องผึ่งพุ่งต่อหน้าคนแปลกหน้าได้ยังไงกัน?"
1003306-17 = "ฉันจะสอนบทเรียนให้เองว่าจะเกิดอะไรขึ้นถ้าไม่ระวังตัวเวลาอยู่กับคนอื่นค่ะ"
1003306-18 = "[s] “นี่ วาคาโมะ?!”"
1003306-26 = "เป็นยังไงบ้างคะ? ตรงนี้? ตรงนี้เหรอคะ? เกาตรงนี้ดีกว่าเหรอคะ?"
1003306-30 = "ฮุฮุ แต่ว่าน่าเสียดายนะคะ"
1003306-31 = "เดี๋ยวฉันจะเกาตรงหลังคอให้นะคะ"
1003306-32 = "ถึงจะส่งเสียงคร่ำครวญวิงวอนแค่ไหน แต่ฉันคือผู้ที่อยู่เหนือกว่าค่ะ!"
1003306-33 = "[s] “วาคาโมะ...? ทำอะไรน่ะ...?”"
1003306-34 = "เอ๋...?"
1003306-38 = "คะ...คุณครู...?!"
1003306-39 = "คือว่า ก็คือว่า...! คะ... คุณแมว กำลังเล่นกับคุณแมวอยู่เท่านั้นเองค่ะ...!"
1003306-40 = "วาคาโมะผู้นี้ไม่ได้ทำอะไรที่น่าสงสัยเลยนะคะ...!"
1003306-41 = "[s] “อย่างนั้นเองหรอกเหรอ... เกินคาดเลย”"
1003306-42 = "คะ? เกินคาดเหรอคะ?"
1003306-43 = "ไม่คิดว่าฉันจะชอบเล่นกับสัตว์เหรอคะ...?"
1003306-44 = "ฮุฮุฮุ ที่จริงแล้วฉันน่ะ ชอบพวกสัตว์มากเลยค่ะ"
1003306-45 = "พวกมันไม่เหมือนมนุษย์ มันไม่พูด... และไม่พูดจาเรื่องแย่ๆ ทำร้ายจิตใจคนอื่นค่ะ"
1003306-46 = "พวกมันก็ไม่เคยทำตัวหยิ่ง ไม่หักหลัง และไม่ทรยศกันด้วยค่ะ"
1003306-47 = "ช่างน่าเศร้าที่พวกมันทำได้เพียงแค่ตอบแทนความเชื่อมั่นที่ได้รับอย่างไร้เดียงสา"
1003306-48 = "เหล่าเด็กๆ ที่น่าสงสาร"
1003306-49 = "ฉันหลงใหลความไร้เดียงสาของพวกมันค่ะ ฮิฮิฮิ"
1003306-50 = "[s1] \"บะ... แบบนี้นี่เอง...\"\n[s2] “ครูขอโทษนะ! สัญญาไว้แล้วแท้ๆ! แต่ก็สายจนได้!”"
1003306-51 = "คะ...?"
1003306-52 = "คะ...?"
1003306-53 = "คุณครูก็พูดเรื่องอะไรคะ...วาคาโมะผู้นี้ไม่เห็นเข้าใจเลย..."
1003306-54 = "[s3] “ครูบอกว่าจะมาทันทีหลังทำงานเสร็จ คงผิดหวังสินะ”\n[s4] “ครูทำงานนานเกินไป คงทำให้วาคาโมะผิดหวังสินะ”"
1003306-55 = "ผิดหวังเหรอคะ...?"
1003306-56 = "คุณครูทำให้ฉันผิดหวังเหรอคะ...?"
1003306-57 = "อ่า หรือว่าเพราะเรื่องที่ฉันพูดเมื่อกี้...? เข้าใจผิดคิดว่าฉันหมายถึงคุณท่านเหรอคะ...?"
1003306-58 = "ไม่ใช่เลยนะคะ ฉันไม่มีวันพูดแบบนั้นกับคุณท่านเด็ดขาดค่ะ!#nฉันเชื่อใจและไว้ใจคุณท่านอย่างหมดหัวใจเลยค่ะ!"
1003306-59 = "วาคาโมะผู้นี้ ไม่เคยคิดเลยสักครั้งว่าคุณท่านจะหักหลังฉัน ไม่เคยคิดเลยสักครั้งค่ะ!"
1003306-67 = "[ns] \"วะ...วาคาโมะ...?!”"
1003306-70 = "คุณท่านเข้าใจฉันผิดฉันแบบนี้ มันน่าเศร้ามากเลยละค่ะ"
1003306-71 = "เพียงแค่คิดว่าคุณท่านจะทอดทิ้งฉันไป... หัวใจของฉันก็เจ็บปวดมากเลยค่ะ"
1003306-72 = "แต่การที่คุณท่านมาสายแบบนี้... ก็แค่หกชั่วโมงเองค่ะ... แต่ฉันไม่สนใจหรอกค่ะ"
1003306-73 = "ถ้าวันที่มีนัดกับคุณท่าน แค่คิดว่าจะได้เจอคุณท่าน ฉันก็รู้สึกร้อนในอกจนจะ#nคลั่งตั้งแต่ก่อนได้เจอคุณท่านล่ะค่ะ...!"
1003306-74 = "[s] \"ดะ...เดี๋ยวก่อนสิวาคาโมะ ปล่อยก่อนได้มั้ย...\""
1003306-75 = "อา... เข้ามาใกล้ๆ และลูบแก้มฉันหน่อยสิคะ หรือว่าจะให้ฉันลูบแก้มของคุณท่านดีคะ?"
1003306-76 = "ฮุฮุฮุ...♡ ใช่ค่ะ เพียงแค่คิดว่ามีเรื่องแบบนี้รออยู่ การรอคอยระหว่างนั้นก็ไม่ทรมาน#nและไม่น่าเศร้าเลยสักนิดค่ะ "
1003306-77 = "ฉันจะคิดว่าคุณท่านหักหลังฉันได้ยังไงคะ? ได้โปรดอย่าเข้าใจฉันผิดไปเลยนะคะ"
1003306-78 = "เรื่องน่าเศร้าแบบนั้นไม่มีทางเกิดขึ้นอย่างแน่นอนค่ะ ตอนนี้... ฉันไม่รู้ว่าจะสื่อความรู้สึก#nภายในใจตอนนี้ไปให้คุณท่านยังไงดี..."
1003306-79 = "[s] “เข้าใจแล้ว ใจเย็นๆ ก่อนนะ”"
1003306-80 = "เข้าใจแล้วใช่ไหมคะ? เข้าใจจริงๆ แน่นะคะ?"
1003306-81 = "ค่ะ ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ♡"
1003306-82 = "[s5] “ถึงอย่างนั้นก็เถอะ เอาแต่รอแบบนั้นได้ยังไงกัน”\n[s6] “ถ้าหากโดนเทนัดขึ้นมาจริงๆ จะทำยังไงล่ะ”"
1003306-83 = "หมายถึงถ้ารอจนคุณท่านไม่มางั้นเหรอคะ?"
1003306-84 = "...คะ? โดนเทนัดเหรอคะ?"
1003306-85 = "ทำไมถึงต้องกังวลอะไรอย่างนั้นล่ะคะ? ถ้าคุณท่านสัญญากับฉันแล้ว ยังไงคุณท่านก็ต้องมาแน่ๆ ใช่ไหมคะ?"
1003306-86 = "ไม่ว่าจะให้ฉันรอคุณท่านที่นี่หกชั่วโมงก็ตาม..."
1003306-87 = "ถ้าหากเป็นคุณท่านที่คอยจับมือฉันเอาไว้ ไม่ว่าจะในสถานการณ์ไหน ไม่เคยหักหลังหรือโกหกฉัน และทำให้ฉันเชื่อมั่นเสมอละก็..."
1003306-88 = "จะหกวัน หกสัปดาห์ หรือหกเดือน คุณท่านก็คงจะมาหาฉันเหมือนอย่างวันนี้ไงค่ะ"
1003306-89 = "แล้วทำไมวาคาโมะผู้นี้ถึงต้องกังวลเรื่องแบบนั้นกันล่ะคะ? ฮุฮุฮุ แปลกคนจริงๆ เลยนะคะ"
1003306-90 = "[s] \"...\""
1003306-91 = "ใช่ค่ะ นั่นคือสิ่งที่ฉันคิดค่ะ"
1003306-92 = "ถึงจะพูดอย่างนั้นก็เถอะ แต่วาคาโมะผู้นี้ก็ยังเศร้าอยู่นิดนึงนะคะ"
1003306-93 = "คุณท่านคิดว่าฉันจะสูญเสียความเชื่อมั่นในคุณท่านไปแค่เพียงเพราะคุณท่านมาช้า#nอืม... วาคาโมะผู้นี้จะพิสูจน์ให้คุณท่านเห็นยังไงดีคะ?"
1003306-94 = "[s] “ไม่ถึงขนาดต้องพิสูจน์หรอก...”"
1003306-95 = "อา...!"
1003306-96 = "ฮุฮุ คิดอะไรดีๆ ออกแล้วค่ะ"
1003306-97 = "เรามาใช้เวลาในช่วงค่ำคืนภายใต้ดวงจันทราที่ลอยล่องเป็นร้อยเป็นพันครั้งในคืนนี้#nเพื่อแสดงให้เห็นว่าความรู้สึกของวาคาโมะไม่เคยเปลี่ยนแปลงดีมั้ยคะ..."
1003306-98 = "ให้ฉันกระซิบความรู้สึกของฉันให้คุณท่านฟังทั้งคืนเลยดีมั้ยคะ?"
1003306-99 = "แค่คิดก็รู้สึกมีความสุขจนแทบจะควบคุมตัวเองไม่อยู่แล้วค่ะ อา... จะทำยังไงดี"
1003306-100 = "[s] “ระ... เรื่องนั้นเอาไว้ก่อนเถอะ ไปทำอย่างอื่นกันดีกว่า!”"
1003306-101 = "ขอเรื่องอื่นแทนอย่างนั้นเหรอคะ...?"
1003306-102 = "อุ๊ย แหมๆ♡ คุณท่านอยากใช้เวลาอยู่กับฉันจริงๆ สินะคะ"
1003306-103 = "ดีใจจังเลยค่ะที่คุณท่านพูดแบบนั้น..."
1003306-104 = "ถึงความรู้สึกจะท่วมท้นแค่ไหน แต่ถ้าจู่ๆ วิ่งเข้าไปหาแบบนั้นอีกก็คงไม่ดี#nฉันไม่ควรฉกฉวยโอกาสกับคุณท่านแบบนั้นสินะคะ... "
1003306-110 = "ฉันจะเก็บโอกาสอันมีค่าที่คุณท่านให้ไว้สำหรับโอกาสในอนาคตค่ะ"
1003306-111 = "[s] “ถึงตอนนั้นก็ช่วยเบามือด้วยนะ...”"
1003306-112 = "ฮุฮุฮุ ท่าทางที่ดูประหม่าของคุณท่านดูน่ารักมากเลยนะคะ"
1003306-113 = "ค่ะ ถ้าอย่างนั้นฉันจะรอเก็บช่วงเวลานี้ไว้เพลิดเพลินในอนาคตแล้วกันนะคะ ฮุฮุ♡"
1003306-115 = "(ถึงแม้ว่าจะเลยเวลาไปนานมากก็ตาม แต่ก็ได้ไปช้อปปิ้งกับวาคาโมะอย่างปลอดภัย)"

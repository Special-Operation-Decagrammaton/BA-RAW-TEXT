[translation]
1003306-1 = "#title;절대로 변치 않는 믿음"
1003306-2 = "#na;(와카모와 약속을 하고 난 뒤 어떻게든 일을 일찍 끝내고 찾아가려고 했지만.)"
1003306-3 = "#na;(계속해서 밀려든 업무를 간신히 마칠 수 있었던 건, 약속 시각으로부터 6시간이나 지난 뒤였다.)"
1003306-4 = "#all;hide"
1003306-5 = "#wait;500"
1003306-6 = "#wait;2000"
1003306-7 = "#na;(약속 시각보다 6시간이나 늦어버렸다.)"
1003306-8 = "#na;(너무 늦은 나머지. 혹시 그사이 와카모가 무슨 일을 저지르진 않았을까. 걱정을 끌어안은 채 단숨에 약속 장소까지 내달렸다.)"

[translation]
80000036-1 = "วิธีทำช็อกโกแลตรสเลิศ"
80000036-4 = "ย่องย่อง ย่องย่อง"
80000036-9 = "คุณครู... ชู่ว... มันมืดนะคะ เดินระวังด้วยค่ะ"
80000036-10 = "[s] \"อะ...อื้อ\""
80000036-12 = "ถึงจะมืดแต่ฉันก็รู้จักทุกซอกทุกมุมของห้องครัวดีค่ะ~"
80000036-14 = "น่าจะแถวๆ นี้..."
80000036-16 = "อ๊ะ นี่ไง!"
80000036-19 = "ดูสิ! คุณครู! ว่างเปล่าละ! วันนี้ก็ไม่มีใครตามที่คิดเลย!"
80000036-20 = "อื้อ! วันนี้ฉันจะใช้คนเดียวให้เต็มที่เลย!"
80000036-21 = "[s1] \"ว่าแต่ทำไมครูถึงโดนลากมาที่นี่ล่ะ...\"\n[s2] \"นี่อิซุมิ เรามาทำอะไรที่นี่เหรอ...\""
80000036-22 = "หืม? ที่มาที่ห้องครัวน่ะเหรอ?"
80000036-23 = "หืม? ที่มาที่ห้องครัวน่ะเหรอ?"
80000036-24 = "อย่างที่รู้ ก็วันนี้เป็นวันวาเลนไทน์นี่นะ"
80000036-25 = "[s] \"อื้อ ก็ใช่\""
80000036-26 = "เพราะงั้นเหตุผลที่มาที่นี่ก็มีแค่ข้อเดียวเท่านั้น!"
80000036-27 = "คือการทำสุดยอดช็อกโกแลตวาเลนไทน์กับคุณครูยังไงล่ะ!"
80000036-28 = "เอาล่ะ! ไปกันเถอะ คุณครู! ไม่มีเวลามาโอ้เอ้แล้ว!"
80000036-32 = "[ns] \"หา...?!\""
80000036-34 = "ฉันอยากลองชิมสุดยอดช็อกโกแลตในวันวาเลนไทน์ดูน่ะ"
80000036-35 = "แต่ของอร่อยๆ จะให้รออยู่เฉยๆ มันก็ไม่มาหาเราเองหรอกนะ"
80000036-36 = "ถ้าเป็นสมาชิกที่ภาคภูมิใจของชมรมชิมอาหารแล้วละก็ ต้องมุ่งไปหาอาหารเลิศรสด้วยตัวเราเองสิ!"
80000036-37 = "ยิ่งถ้าเป็นสุดยอดช็อกโกแลตละก็ แทนที่จะกินคนเดียว ชวนคุณครูมากินด้วยกันน่ะดีที่สุด! ใช่มะ?"
80000036-38 = "[s] \"อิซุมิ เธอนี่จริงๆ เลยนะ...!\""
80000036-39 = "ฉันเตรียมวัตถุดิบสำหรับทำช็อกโกแลตเอาไว้แล้วล่ะ!"
80000036-40 = "ก่อนอื่น นี่คือซอสถั่วเหลืองสูตรต้นตำรับชื่อดังที่ขายในซูเปอร์มาร์เก็ต!"
80000036-41 = "[s] \"หืม? เอาซอสถั่วเหลืองมาทำไมน่ะ?\""
80000036-42 = "หืม? ก็ช็อกโกแลตจะต้องมีสีดำวิ้งๆ ที่สวยงามด้วยไงล่ะ"
80000036-43 = "แล้วอีกอย่าง ฉันได้ยินมาจากที่ไหนสักแห่งว่าช่วงนี้ช็อกโกแลตรสผลไม้กำลังเป็นที่นิยมมากๆ!"
80000036-44 = "ฉันเลยไปหามาว่าผลไม้อะไรที่อร่อยที่สุด แล้วก็เจอผลไม้ที่เรียกว่า \"ราชาแห่งผลไม้\" ก็เลยซื้อมาด้วย!"
80000036-49 = "[ns] \"อึ่ก กะ...กลิ่นมัน...!\""
80000036-50 = "ผลไม้ที่เรียกว่าทุเรียนน่ะ"
80000036-51 = "แต่ถ้ามีแค่ราชาผลไม้ มันก็ดูเหมือนจะขาดอะไรไปสักหน่อย"
80000036-52 = "ยังไงมันก็ได้ชื่อว่าราชาแห่งผลไม้ล่ะนะ พอคิดว่าจะไม่มีอะไรที่สมน้ำสมเนื้อกับมันเลยเหรอ#nฉันก็เลยลองหาดู... "
80000036-53 = "แล้วก็เจอราชาแห่งปลาล่ะ!"
80000036-54 = "ปลากะพงแดง! ได้ยินมาว่าปลากะพงแดงอุดมด้วยวิตามินหลายชนิดเลยนะ"
80000036-55 = "ช็อกโกแลตนอกจากจะอร่อยแล้ว ก็ควรดีต่อสุขภาพด้วยใช่ไหมล่ะ?"
80000036-56 = "เอาล่ะ ตอนนี้เราก็มีส่วนผสมครบแล้ว มาทำช็อกโกแลตกันเถอะ!"
80000036-57 = "[s] \"ถามจริง? เอาของพวกนี้มาทำจะไม่เป็นไรจริงเหรอ?\""
80000036-59 = "(คุณครูเริ่มทำช็อกโกแลตพร้อมกับอิซุมิอย่างเงอะๆ งะๆ)"
80000036-67 = "เสร็จแล้วล่ะ คุณครู! ดูสิ!"
80000036-72 = "เอ้า คุณครู ลองชิมดูสักคำสิ!"
80000036-73 = "เราใช้สุดยอดวัตถุดิบทำ เพราะงั้นรสชาติต้องอร่อยแน่นอน!"
80000036-74 = "[s3] (ช็อกโกแลตที่อิซุมิทุ่มเททำ...!!)\n[s4] \"อืม ถะ...ถ้างั้นไหนขะ...ขอสักคำ...\""
80000036-83 = "[ns] \"ระ...รสชาตินี่มัน...!\""
80000036-84 = "(รสชาติกลมกล่อมของซอสถั่วเหลืองที่หมักมาอย่างดีบนเนื้อปลากะพงแดงบดเหนียวนุ่ม)"
80000036-85 = "(และขณะที่เคี้ยวก็มีกลิ่นที่เป็นเอกลักษณ์ของทุเรียนผสมกันออกมาได้ลงตัวอย่างไม่คาดคิด!)"
80000036-86 = "[s] \"อะ...อร่อย... ถึงจะไม่ใช่รสช็อกโกแลตก็เถอะ!\""
80000036-87 = "งั้นเหรอ? ฮะฮะฮ่า! โชคดีจัง!"
80000036-88 = "คิดแล้วเชียวว่าการได้ลองด้วยตัวเองเป็นวิธีที่ดีที่สุด! อื้อ! หนทางแห่งนักชิมนี่สุดยอดจริงๆ!"
80000036-89 = "[s] \"วันนี้ขอบคุณนะ อิซุมิ\""
80000036-90 = "อื้อ! ไม่เป็นไร! ยังมีเหลืออีกเยอะเลย ที่เหลือก็มาแบ่งกันกินเถอะ!"
80000036-91 = "อ๊ะ...อ๊าาา ลืมเลย แฮปปี้วาเลนไทน์นะ คุณครู!"
80000036-93 = "(คุณครูได้ใช้วันวาเลนไทน์ที่แปลกใหม่ไม่เหมือนใครกับอิซุมิ)"

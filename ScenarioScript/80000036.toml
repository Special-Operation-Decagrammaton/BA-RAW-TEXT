[translation]
80000036-1 = "How to Make the Best Chocolate"
80000036-4 = "..."
80000036-9 = "Keep it down, Sensei. It's dark, so watch your step."
80000036-10 = "[s] \"Why did I agree to do this?\""
80000036-12 = "I could navigate the cafeteria with my eyes closed! Don't worry!"
80000036-14 = "Right around..."
80000036-16 = "Hah! Here!"
80000036-19 = "Look, Sensei, look! As predicted, it's empty!"
80000036-20 = "No one will show up, so it's all ours today!"
80000036-21 = "[s1] \"Why was I dragged here?\"\n[s2] \"Izumi, why are we here?\""
80000036-22 = "Huh? You mean why the cafeteria?"
80000036-23 = "Huh? You mean why the cafeteria?"
80000036-24 = "Today's Valentine's day!"
80000036-25 = "[s] \"Yes, I know that.\""
80000036-26 = "There's only one reason to be in the cafeteria on Valentine's Day!"
80000036-27 = "We're here to make scrumptious Valentine's chocolates!"
80000036-28 = "Let's get to work, Sensei! There's no time to waste!"
80000036-32 = "[ns] \"Huh?\""
80000036-34 = "This Valentine's Day, my goal is to try the best chocolate ever made."
80000036-35 = "And I can't just sit around waiting for miracles to fall in my lap!"
80000036-36 = "As a proud member of the Gourmet Research Society, I'll make my own destiny!"
80000036-37 = "And the best kind of chocolate is the kind you share with others, you know!"
80000036-38 = "[s] \"You're a force of nature, Izumi.\""
80000036-39 = "Don't worry! I've prepared all the ingredients we need."
80000036-40 = "First, this is a special traditional soy sauce distributed in markets by real artisans!"
80000036-41 = "[s] \"Soy sauce?\""
80000036-42 = "You're so silly, Sensei! Obviously, we need that beautiful dark sheen!"
80000036-43 = "Oh! Oh! And I heard fruity chocolate is trendy."
80000036-44 = "So I found what they call \"the king of fruits\"!"
80000036-49 = "[ns] \"Wh-What's that smell?!\""
80000036-50 = "A durian!"
80000036-51 = "But the best chocolate ever made can't have just one kingly ingredient."
80000036-52 = "It really took me a while to figure out what would go with it. "
80000036-53 = "And then I found it! The snapper—king of fish!"
80000036-54 = "As an added bonus, it has a ton of good vitamins!"
80000036-55 = "So not only will our chocolate be delicious, but also healthy!"
80000036-56 = "That's everything we need. We're good to go!"
80000036-57 = "[s] \"I don't think anything about this is good!\""
80000036-59 = "Thus, Izumi began to make the most cursed chocolate in Valentine's Day history."
80000036-67 = "It's done! Sensei, look!"
80000036-72 = "Here! You can have the first bite."
80000036-73 = "We used only the best ingredients, so it'll definitely be delicious."
80000036-74 = "[s3] \"(Well, she did try really hard...)\"\n[s4] \"O-Okay, I'll try it...\""
80000036-83 = "[ns] \"Th-This flavor! It can't be!\""
80000036-84 = "The unique flavor of soy sauce on the soft texture of snapper fish..."
80000036-85 = "The unmistakable taste of durian fills the gap between the two for an unexpected harmony on my taste buds!"
80000036-86 = "[s] \"It's definitely not chocolate, but it's delicious!\""
80000036-87 = "Is it? Heehee! I'm ecstatic!"
80000036-88 = "Aren't you glad we tried? A gourmand's journey is so incredible!"
80000036-89 = "[s] \"Thank you for today, Izumi.\""
80000036-90 = "Thanks to you too, Sensei! Let's eat up, together!"
80000036-91 = "Here, open your mouth. \"Ahhhhhh.\" Happy Valentine's Day, Sensei!"
80000036-93 = "It was a unique Valentine's Day for me and Izumi."

80000036-21 = "[s1] \"일단 무작정 끌려오긴 했다마는…….\"\n[s2] \"저기, 이즈미. 여긴 어쩐 일로…….\""
80000036-22 = "1;이즈미;07;응? 오늘 급식실을 방문한 이유?\n#1;em;[?]"
80000036-23 = "1;이즈미;07;응? 오늘 급식실을 방문한 이유?\n#1;em;[?]"
80000036-24 = "1;이즈미;01;그야 오늘은 선생님도 알다시피 발렌타인 데이잖아?\n#1;greeting"
80000036-25 = "[s] \"응, 그렇지.\""
80000036-26 = "1;이즈미;02;그러니 여길 찾아온 이유도 딱 하나!"
80000036-27 = "1;이즈미;03;선생님이랑 같이 발렌타인 데이 최고의 초콜릿을 만들기 위해서인 게 당연하지!\n#1;em;[음표]\n#1;greeting"

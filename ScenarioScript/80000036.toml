[translation]
80000036-1 = "製作最強巧克力的方法"
80000036-4 = "…………"
80000036-9 = "啊，老師。那裡，請小心腳步……！"
80000036-10 = "[s]「了解。」"
80000036-12 = "呵呵。就算在黑暗之中，只要和食物有關的事都逃不過我的眼睛……"
80000036-14 = "應該就在這附近……"
80000036-16 = "啊，找到了！"
80000036-19 = "哦～完全沒人！感覺真奇怪！"
80000036-20 = "好，看來今天可以包場了呢！"
80000036-21 = "[s1]「雖然糊裡糊塗地就跟來了……」\n[s2]「泉，今天為什麼要來這裡……？」"
80000036-22 = "那當然是因為～"
80000036-23 = "那當然是因為～"
80000036-24 = "今天是情人節不是嗎？"
80000036-25 = "[s]「嗯，沒錯哦。」"
80000036-26 = "所以才要來呀！"
80000036-27 = "為了和老師一起做出最棒的情人節巧克力！"
80000036-28 = "我們開始吧，老師！時間所剩不多了唷！"
80000036-32 = "[ns]「……咦？」"
80000036-34 = "難得到了情人節，會想吃最棒的巧克力也是理所當然的吧？"
80000036-35 = "但只是張著嘴巴等待的話，巧克力並不會自己出現。"
80000036-36 = "身為美食研究會的一員，當然得靠自己的雙手來實現理想囉！"
80000036-37 = "而且既然是最棒的巧克力，果然不該只有我自己獨享，#n而是要其他人一起享用才對吧？"
80000036-38 = "[s]「泉……！」"
80000036-39 = "所以說，我已經準備好材料了！"
80000036-40 = "首先，是職人們會使用的特製醬油！"
80000036-41 = "[s]「……醬油？」"
80000036-42 = "嗯！要讓巧克力散發漂亮的光澤果然得靠這個對吧？"
80000036-43 = "還有，最近的巧克力界似乎流行水果巧克力哦！"
80000036-44 = "所以我對水果做了各種調查……"
80000036-49 = "[ns]「這個味道是……！」"
80000036-50 = "鏘～是水果之王「榴槤」！"
80000036-51 = "但是只有這個的話有點空虛……"
80000036-52 = "心想著有沒有什麼類似的東西時，我找到的是……"
80000036-53 = "被稱為「魚中之王」的！"
80000036-54 = "鏘鏘～「鯛魚」！據說鯛魚富含維生素，對健康很好哦！"
80000036-55 = "既美味又能兼顧健康，這才能稱得上是最強的巧克力！"
80000036-56 = "那麼食材都準備好了！開始製作吧！"
80000036-57 = "[s]「心裡只有滿滿的不安！！」"
80000036-59 = "（就這樣和泉一起開始製作最強（？）的巧克力）"
80000036-67 = "完成──！你看你看，老師！"
80000036-72 = "第一口給老師吃！"
80000036-73 = "畢竟用了最頂級的食材，味道一定也是最頂級的！"
80000036-74 = "[s3]（這可是泉努力做出來的巧克力……）\n[s4]「我，我要開動了……！」"
80000036-83 = "[ns]「這，這個是……！」"
80000036-84 = "（油脂豐厚且口感軟嫩的鯛魚，以及不過度影響其風味的醬油調味……）"
80000036-85 = "（同時還有榴槤獨特的香氣加以提味，竟然意外的和諧……！）"
80000036-86 = "[s]「……好吃！雖然我覺得這不是巧克力！」"
80000036-87 = "好耶！"
80000036-88 = "果然什麼都得挑戰看看呢，這才是通往美食之道！"
80000036-89 = "[s]「說的沒錯。謝謝你，泉。」"
80000036-90 = "不客氣！來吧來吧，還剩下很多，一起吃吧！"
80000036-91 = "來，嘴巴張開，啊──#n老師，情人節快樂！"
80000036-93 = "（就這樣和泉共度了稍微有點獨特的情人節）"

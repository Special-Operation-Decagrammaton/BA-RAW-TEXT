80000036-34 = "3;이즈미;99;발렌타인 데이를 맞이해, 최고의 초콜릿을 맛보고 싶다고 생각했지만.\n#3;em;…\n#3;a"
80000036-35 = "3;이즈미;05;역시 그런 건 기다린다고 먼저 다가와 주지 않는 법이야.\n#3;greeting"
80000036-36 = "3;이즈미;01;미식연구회의 자랑스러운 부원이라면 직접 자기 발로 뛰고, 자기 손으로 쟁취해야 하는 법!\n#3;em;[!]\n#3;hophop"
80000036-37 = "3;이즈미;03;그리고 최고의 초콜릿이라면, 당연히 나 혼자 먹기보다 선생님과 같이 먹는 게 제일이고! 그렇지?"
80000036-38 = "[s] \"크흑, 이즈미, 너란 아이는……!\""
80000036-39 = "3;이즈미;00;그래서 여기, 초콜릿을 만들기 위한 재료를 준비해왔어!\n#3;em;[음표]\n#3;m2"
80000036-40 = "3;이즈미;01;먼저 여기, 장인이 만들어서 슈퍼마켓에 유통하고 있다는 특제 전통 간장 소스야!\n#3;greeting"
80000036-41 = "[s] \"……응? 어째서 간장 소스?\""
80000036-42 = "3;이즈미;07;응? 초콜릿에서 멋진 검은색 광택은 빼놓을 수 없으니까?\n#3;em;[반응]"
80000036-43 = "3;이즈미;02;그리고 맞다. 요즘 유행은 과일 초콜릿이라고, 어디선가 들은 기억이 나!"
80000036-44 = "3;이즈미;03;그래서 최고로 맛있는 과일이 뭘까. 하고 찾아봤는데. 과일의 왕이라고 불리는 과일이 있다길래 가져왔어!\n#3;hophop\n#3;m4"

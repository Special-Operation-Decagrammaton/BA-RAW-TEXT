80000036-50 = "3;이즈미;01;두리안이라는 거 있지?\n#3;em;[반응]"
80000036-51 = "3;이즈미;05;근데 과일의 왕만 있으면 뭔가 아쉬운 거 같더라구.\n#3;m3"
80000036-52 = "3;이즈미;07;근데 과일의 왕이라고 하니까. 비슷하게 굉장한 뭔가가 없을까. 찾아보다가……. \n#3;em;…"
80000036-53 = "3;이즈미;07;생선의 왕이라는 걸 찾았거든!\n#3;hophop"
80000036-54 = "3;이즈미;03;도미야! 참고로 도미엔 비타민이 풍부해서 건강에도 좋대.\n#3;em;[!]\n#3;hophop"
80000036-55 = "3;이즈미;02;초콜릿이 맛있는 데다가 건강에도 좋아지면 또 최강일 거 아냐?"
80000036-56 = "3;이즈미;09;자, 그럼 재료는 전부 있으니까! 만들자! 초콜릿!\n#3;em;[음표]\n#3;greeting"

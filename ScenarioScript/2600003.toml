[translation]
2600003-1 = "หนึ่งวันที่เรียบง่าย"
2600003-2 = "...มาแล้วเหรอคะคุณครู มาทางนี้สิคะ"
2600003-3 = "คะ? แปลกใจที่ฉันชวนมาเจอที่ร้านเกมเหรอคะ?"
2600003-4 = "ยะ... อย่างนี้นี่เองสินะคะ เวลาฉันอยู่โรงเรียนดูเหมือนเป็นอีกคน ฉันเข้าใจค่ะ..."
2600003-5 = "ที่จริงฉันก็คิดไว้แล้วล่ะค่ะ ว่าคุณครูต้องตกใจถ้าได้เห็นฉันในอีกมุมหนึ่งแน่เลย..."
2600003-6 = "แต่ฉันก็ยอมรับนะคะว่าชอบที่เงียบๆ มากกว่า อย่างห้องอ่านหนังสือ ไม่ก็ห้องพยาบาล..."
2600003-7 = "แต่ถึงยังไงฉันก็ไม่ได้ต้องการอยู่ในที่แบบนั้นตลอดเวลาหรอกนะคะ"
2600003-8 = "บางครั้งฉันก็มาร้านเกมเหมือนคนอื่น หรือไม่ก็ออกไปช้อปปิ้งบ้าง"
2600003-9 = "เช่นเดียวกับวันนี้ค่ะ"
2600003-10 = "...ก็วันนี้ฉันไม่ต้องทำงานของคณะกรรมการวินัยยังไงล่ะคะ"
2600003-11 = "[s1] \"งั้นก็เป็นวันหยุดเหรอ?\"\n[s2] \"โดดงานมาเหรอ? ครูก็ชอบโดดงานเหมือนกัน!\""
2600003-12 = "ใช่ค่ะ วันนี้เป็นวันหยุด"
2600003-13 = "แต่ไม่ใช่วันหยุดของคณะกรรมการวินัยทุกคนหรอกนะคะ เป็นวันหยุดของฉันคนเดียวค่ะ"
2600003-14 = "......"
2600003-15 = "อืม... เหมือนกับการใช้วันลาพักร้อนน่ะค่ะ..."
2600003-16 = "เอาเป็นว่า วันนี้ฉันใช้เวลาทำสิ่งที่อยากทำได้อย่างเต็มที่เลยล่ะค่ะ"
2600003-17 = "......"
2600003-18 = "เพราะฉะนั้น... ถ้าคุณครูไม่ว่าอะไร..."
2600003-19 = "วันนี้มาอยู่กับฉันได้มั้ยคะ...?"
2600003-20 = "คิดว่าเป็นการตอบแทน... ที่คุณครูช่วยฉันครั้งก่อนก็ได้ค่ะ..."
2600003-21 = "ละ... และถ้าฉันไม่ลาหยุดแบบนี้ ฉันก็คงไม่มีเวลามาเล่นสนุกอยู่ข้างนอกแบบนี้หรอกค่ะ"
2600003-22 = "ฉันว่าฉันวนมาถามคำถามเดิมอีกแล้ว..."
2600003-23 = "แต่ว่า... วันนี้คุณครูมีเวลามั้ยคะ? หวังว่าที่ฉันทำอยู่จะไม่รบกวนคุณครูนะคะ..."
2600003-24 = "[s3] \"อยากอยู่กับครูจริงๆ เหรอ?\"\n[s4] \"ไม่อยากอยู่กับเพื่อนคนอื่นในชมรมเหรอ?\""
2600003-25 = "ไม่ใช่ว่าฉันไม่อยากอยู่กับเพื่อนคนอื่นในชมรมหรอกนะคะ ทุกคนก็ดีกับฉันมากเลย"
2600003-26 = "ไม่ใช่ว่าฉันไม่อยากอยู่กับเพื่อนคนอื่นในชมรมหรอกนะคะ ทุกคนก็ดีกับฉันมากเลย"
2600003-27 = "แต่อย่างที่ฉันพูดเมื่อกี้ ตอนนี้ฉันอยากได้เวลาพักผ่อน... แบบที่ไม่ต้องอยู่กับคนที่เจอมาทุกวัน"
2600003-28 = "เพราะบางครั้งเราก็ไม่ได้ชอบในเรื่องเดียวกันทั้งหมดน่ะค่ะ"
2600003-29 = "เวลามีคนอื่นอยู่ข้างๆ บางครั้งเราก็เหนื่อยเพราะต้องคอยดูแลเขาตลอดใช่มั้ยล่ะคะ"
2600003-30 = "ขอโทษนะคะ... ฉันเผลอบ่นอะไรออกไปก็ไม่รู้..."
2600003-31 = "แต่คุณครูคงเข้าใจฉันดีใช่มั้ยคะ ก็คุณครูเป็นครูนี่นา"
2600003-32 = "เพราะงั้น... อย่าให้ต้องพูดวกวนเลยค่ะ... ฉันก็แค่..."
2600003-33 = "[s5] \"เราต่างก็ต้องการเวลาฮีลตัวเองกันทั้งนั้น ครูจะช่วยเอง\"\n[s6] \"วันนี้ครูจะดูแลเจ้าหญิงเอง\""
2600003-34 = "......!?"
2600003-35 = "......!?"
2600003-36 = "คะ... คุณครูพูดอะไรออกมาน่ะ..."
2600003-37 = "......"
2600003-38 = "ไม่ใช่สิคะ... อืม... ก็ได้ค่ะ"
2600003-39 = "ฉันไม่รู้ว่าที่คุณครูตอบตกลงเพราะอยากเอาใจ หรือเพราะว่าอยากมาอยู่ด้วยกันจริงๆ..."
2600003-40 = "......"
2600003-41 = "แต่ในเมื่อคุณครูพูดออกมาแบบนี้แล้ว"
2600003-42 = "ถ้างั้นก็ขอรบกวนอีกครั้งด้วยนะคะ แล้วก็.. ขอบคุณนะคะ..."
2600003-43 = "จากใจจริงเลยค่ะ..."
2600003-45 = "(พูดจบแล้วชินัตสึก็จับมือคุณครูแล้วพาเดินไป)"
2600003-57 = "(ทั้งคู่ใช้เวลาว่างในวันหยุดของชินัตสึไปกับการเล่นเกม ไปคาเฟ่ การเต้นฮิปฮอป...)"
2600003-58 = "(สุดท้ายก็มาแวะที่ห้างสรรพสินค้า)"
2600003-59 = "(นับเป็นวันหยุดที่เรียบง่าย ไม่มีเหตุการณ์อะไรเป็นพิเศษ)"
2600003-61 = "(เป็นอีกหนึ่งวันที่ธรรมดาจริงๆ)"
2600003-62 = "(ถือเป็นวันหยุดที่แสนเรียบง่ายเหมือนที่ชินัตสึบอกไว้ในข้อความ)"
2600003-65 = "(ชินัตสึหยุดก้าวเดินในตอนที่ดวงอาทิตย์กำลังจะลับขอบฟ้า)"
2600003-66 = "เท่านี้แหละค่ะคุณครู สิ่งที่ฉันตั้งใจจะทำในวันนี้... เราทำด้วยกันหมดแล้วล่ะค่ะ"
2600003-67 = "คุณครูเป็นยังไงบ้างคะ? ส่วนฉันน่ะ... มีความสุขมากเลย..."
2600003-68 = "แต่กับคุณครูอาจจะเป็นแค่วันที่แสนน่าเบื่อก็ได้..."
2600003-69 = "[s7] \"ครูก็ชอบวันที่เงียบสงบแบบนี้เหมือนกันนะ\"\n[s8] \"วันที่ได้อยู่กับชินัตสึคือวันที่แสนพิเศษนะ!\""
2600003-70 = "......"
2600003-71 = "......"
2600003-72 = "พะ... พูดอะไรแบบนี้อีกแล้ว..."
2600003-73 = "แต่ยังไงก็... ขอบคุณมากจริงๆ นะคะ"
2600003-74 = "ที่จริงฉันกังวลมากเลยล่ะค่ะ ฉันไม่มีใครที่จะใช้เวลาอย่างผ่อนคลายได้เลย..."
2600003-75 = "ถ้าคุณครูไม่ติดอะไรละก็..."
2600003-76 = "โอกาสหน้าฉันจะ... ชวนออกมาแบบนี้อีกนะคะ..."
2600003-77 = "......"
2600003-78 = "แต่แน่นอนว่าคุณครูก็ต้องมีเวลาด้วยนะคะ...! ฉันจะไม่ชวนมาตอนที่คุณครูงานยุ่งหรอกค่ะ...!"
2600003-79 = "......"
2600003-80 = "ฮุฮุฮุ..."
2600003-81 = "คุณครูเนี่ย... เป็นคนที่น่าสนใจจังเลยนะคะ"
2600003-82 = "ต่อไปฉันชวนคุณครูแบบนี้อีกได้จริงๆ ใช่มั้ยคะ...?"
2600003-83 = "[s] \"ได้อยู่แล้ว\""
2600003-84 = "......"
2600003-85 = "ค่ะ... เข้าใจแล้วล่ะค่ะ"
2600003-86 = "ขอบคุณค่ะคุณครู แล้วไว้ออกมาเล่นสนุกกันใหม่นะคะ"
2600003-87 = "แต่ฉันจะไม่รบกวนคุณครูบ่อยๆ หรอกค่ะ เพราะคณะกรรมการวินัยไม่ได้มีวันหยุดเยอะเท่าไหร่"
2600003-88 = "......"
2600003-89 = "ตอนนี้ถึงฉันจะพูดแสดงความรู้สึกออกมาได้ไม่หมดก็ตาม..."
2600003-90 = "แต่หวังว่าคุณครูจะเข้าใจนะคะว่าฉันรู้สึกอย่างไร"
2600003-91 = "......"
2600003-92 = "มะ... ไม่เป็นไรหรอกค่ะ"
2600003-93 = "แค่นี้ก็... พอแล้วล่ะค่ะ"
2600003-94 = "มาทำความรู้จักกันทีละหน่อยก็ได้นี่คะ..."
2600003-96 = "(ก่อนจะกลับห้องชมรม คุณครูได้ไปส่งชินัตสึ ในระหว่างที่ไปส่งเธอก็มอบรอยยิ้มให้#nแล้วค่อยกลับไป)"

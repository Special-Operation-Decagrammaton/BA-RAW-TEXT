2600003-56 = "4;치나츠;04\n#4;d\n#wait;2000"
2600003-57 = "#4;hide\n#na;(그리고 말했던 대로 처음에는 게임, 그다음은 카페와 힙합 공연……)"
2600003-58 = "#na;(마지막으로는 쇼핑센터를 들르며 자신이 말했던 휴일의 계획을 착실하게 진행해 나갔다.)"
2600003-59 = "#na;(그렇게 아무 일 없이. 아무런 사건사고 없는 평범한 하루의 일정이 지나갔다.)"

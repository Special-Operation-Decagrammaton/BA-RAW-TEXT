[translation]
2600003-1 = "#title;아무 일 없는 하루"
2600003-2 = "3;치나츠;01;……오셨군요, 선생님. 여깁니다.\n#3;a\n#3;em;[반응]"
2600003-3 = "3;치나츠;02;네? 의외시라고요? 게임 센터에서 뵙자고 한 게?"
2600003-4 = "3;치나츠;99;그, 그렇군요. 하긴, 늘 보여드렸던 모습이 그런 분위기였다 보니……\n#3;em;…"
2600003-5 = "3;치나츠;01;실은 어느 정도 예상한 일이긴 합니다만……"
2600003-6 = "3;치나츠;01;물론 말씀하신 대로, 좀 더 조용한 곳도 좋아합니다. 독서실이라든가, 보건실이라든가……\n#3;m2"
2600003-7 = "3;치나츠;99;하지만 아무리 저라고 해도, 늘 그런 것만은 아니니까요."
2600003-8 = "3;치나츠;02;때로는 저도 남들처럼 게임 센터도 다니고, 쇼핑도 꽤 다닌답니다.\n#3;m3"
2600003-9 = "3;치나츠;01;특히나 오늘 같은 날."
2600003-10 = "3;치나츠;07;……선도부의 일로부터 자유로운 날에는 말이죠.\n#3;em;[반짝]"
2600003-11 = "[s1] \"휴일 같은 거야?\"\n[s2] \"농땡이입니까! 저도 정말 좋아하죠!\""
2600003-12 = "3;치나츠;07;네. 휴무일입니다.\n#3;greeting"
2600003-13 = "3;치나츠;02;선도부 전체가 쉬는 건 당연히 아니고, 제 개인적인 휴무일이에요."
2600003-14 = "3;치나츠;01;……"
2600003-15 = "3;치나츠;06;으음…… 평범하게 휴무를 낸 것입니다만……\n#3;em;[땀]\n#3;stiff"
2600003-16 = "3;치나츠;01;아무튼 그래서 오늘은 저에게 있어, 지극히 개인적인 날입니다."
2600003-17 = "3;치나츠;01;……"
2600003-18 = "3;치나츠;04;그, 그러니 만약 선생님만 괜찮으시다면.\n#3;em;[///]\n#3;stiff"
2600003-19 = "3;치나츠;04;지난 번의 일에 대한 보답도 겸해서, 오늘 하루 정도……"
2600003-20 = "3;치나츠;04;함께 해주시길…… 부탁드리고 싶었습니다……\n#3;greeting"
2600003-21 = "3;치나츠;99;……이, 이런 날이 아니면, 좀처럼 시간을 내기가 힘든 것도 사실이니까요.\n#3;em;…"
2600003-22 = "3;치나츠;01;이제 와서 다시 여쭙는 것도 우습지만……"
2600003-23 = "3;치나츠;02;혹시 괜찮으실까요? 혹시 제가 폐를 끼치고 있는 것일지요?\n#3;em;[?]"
2600003-24 = "[s3] \"정말 나로 괜찮은 거야?\"\n[s4] \"다른 부원들이랑 같이 있는 건 별로야?\""
2600003-25 = "3;치나츠;01;물론 다른 부원들과 함께 있는 것이 싫다는 뜻은 아닙니다. 모두 좋은 사람들이죠."
2600003-26 = "3;치나츠;01;물론 다른 부원들과 함께 있는 것이 싫다는 뜻은 아닙니다. 모두 좋은 사람들이죠."
2600003-27 = "3;치나츠;99;하지만 아까도 말씀드렸듯, 그것과는 별개로 저에게도 쉬는 시간이 필요하니까요."
2600003-28 = "3;치나츠;06;다들 가끔 걷잡을 수 없이 치고 나갈 때가 있어서……\n#3;stiff\n#3;em;[속상함]"
2600003-29 = "3;치나츠;01;누군가가 곁에 있을 때, 그 사람을 보살피듯 신경 써야 한다는 것은 피곤한 법입니다."
2600003-30 = "3;치나츠;99;……죄송합니다. 잔소리 같이 말해버렸네요.\n#3;greeting"
2600003-31 = "3;치나츠;01;당연히 선생님이시니까 그런 부분에 대해선 저보다 잘 알고 계시겠지요."
2600003-32 = "3;치나츠;04;그러니까 그…… 자꾸 말이 길어지는데…… 하고자 하는 말은……\n#3;em;…"
2600003-33 = "[s5] \"포상의 날은 중요하지. 맡겨달라고.\"\n[s6] \"오늘 하루는 제게 맡기시죠, 공주님.\""
2600003-34 = "3;치나츠;04;……!?\n#3;em;[?!]\n#3;shake"
2600003-35 = "3;치나츠;04;……!?\n#3;em;[?!]\n#3;shake"
2600003-36 = "3;치나츠;04;……바, 방금 뭐라고……"
2600003-37 = "3;치나츠;04;……"
2600003-38 = "3;치나츠;06;아닙니다. 네…… 그러시군요.\n#3;em;[땀]"
2600003-39 = "3;치나츠;06;어리광을 받아 주시는 건지, 정말로 괜찮으신 건지 저로선 알 수가 없습니다만……"
2600003-40 = "3;치나츠;99;……"
2600003-41 = "3;치나츠;01;하지만 알겠습니다. 선생님께서 그렇게 말씀해주셨으니까요."
2600003-42 = "3;치나츠;07;그럼 다시 한 번 잘 부탁드립니다. 그리고 다시 한 번, 정말로 감사합니다.\n#3;greeting"
2600003-43 = "3;치나츠;03;……정말로요.\n#3;em;[반짝]"

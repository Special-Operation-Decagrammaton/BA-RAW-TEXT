2600003-61 = "#na;(……그것은 정말로 아무런 특이사항이 없는)"
2600003-62 = "#na;(문자 그대로, '평범한 휴일'의 하루였다.)"
2600003-63 = "#all;hide"
2600003-64 = "#wait;2000"
2600003-65 = "#na;(해가 질 즈음이 되자, 앞서 나가던 치나츠는 갑자기 발걸음을 멈췄다.)"
2600003-66 = "3;치나츠;02;끝났습니다, 선생님. 준비해 두었던 일정은 여기까지였습니다.\n#3;a"
2600003-67 = "3;치나츠;04;……어, 어떠셨을까요? 저는 정말 좋았지만……\n#3;em;[///]\n#3;stiff"
2600003-68 = "3;치나츠;06;어떻게 보면 반대로 선생님께는 지루하셨을 지도 모르고……"
2600003-69 = "[s7] \"내게도 별 일 없는 날은 꽤 귀하거든.\"\n[s8] \"충분히 특별하지. 치나츠랑 함께였으니까!\""
2600003-70 = "3;치나츠;04;……\n#3;em;…"
2600003-71 = "3;치나츠;04;……\n#3;em;…"
2600003-72 = "3;치나츠;04;또, 또 그런 말씀을……\n#3;em;[///]"
2600003-73 = "3;치나츠;07;그렇지만…… 네. 그러셨다면 정말로 다행입니다.\n#3;greeting"
2600003-74 = "3;치나츠;99;내심 걱정이 많았거든요. 제게 이렇게까지 마음을 놓고 있을 수 있는 사람은 없어서……"
2600003-75 = "3;치나츠;01;호, 혹시 가능하다면 앞으로도……"
2600003-76 = "3;치나츠;04;앞으로도 종종…… 부탁드리고 싶었기 때문에……\n#3;stiff"
2600003-77 = "3;치나츠;04;……\n#3;em;[///]"
2600003-78 = "3;치나츠;04;무, 물론 선생님께서 괜찮으실 때의 이야기이에요……! 그때만의 이야기입니다……!\n#3;hophop"
2600003-79 = "3;치나츠;04;……"
2600003-80 = "3;치나츠;03;……후후훗.\n#3;em;[재잘]"
2600003-81 = "3;치나츠;07;정말로 신기한 분이시로군요. 선생님은."
2600003-82 = "3;치나츠;02;정말로 괜찮을까요? 앞으로도 이렇게 종종 부탁드려도……"
2600003-83 = "[s] \"물론이지.\""
2600003-84 = "3;치나츠;99;……"
2600003-85 = "3;치나츠;07;……네. 알겠습니다.\n#3;greeting\n#3;em;[반짝]"
2600003-86 = "3;치나츠;07;감사합니다, 선생님. 그럼 앞으로도 잘 부탁드리겠습니다."
2600003-87 = "3;치나츠;99;물론 너무 자주 귀찮게 해드리진 않을 겁니다. 선도부의 휴일은, 그리 많지 않거든요."
2600003-88 = "3;치나츠;99;……"
2600003-89 = "3;치나츠;02;지금은 제가 이런 식으로 밖에 말씀드리지 못하지만……"
2600003-90 = "3;치나츠;07;지금 제가 어떤 기분인지, 선생님께서는 이해해주고 계실 거라고 생각합니다."
2600003-91 = "3;치나츠;07;……"
2600003-92 = "3;치나츠;06;……아, 아닙니다. 역시 모르겠습니다.\n#3;em;[땀]\n#3;stiff"
2600003-93 = "3;치나츠;03;하지만…… 괜찮습니다.\n#3;greeting"
2600003-94 = "3;치나츠;07;……천천히 알아가면 되니까요."
2600003-95 = "#all;hide"
2600003-96 = "#na;(그렇게 미소 지으며 돌아간 치나츠를 돌려보내고, 다시 부실로 돌아왔다.)"

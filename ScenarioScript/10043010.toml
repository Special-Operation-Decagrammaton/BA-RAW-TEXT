[translation]
10043010-1 = "Episode 1;Never Say \"Never\""
10043010-6 = "Wow, we're actually in the Heroes' locker room."
10043010-7 = "I'm not very familiar with baseball culture, but...they don't usually invite fans into the team facilities, do they?"
10043010-8 = "[s] \"And they don't sneak them in like they did with us...\""
10043010-13 = "Schale's Sensei. Welcome."
10043010-17 = "[ns] \"I don't believe we've met.\""
10043010-23 = "Pardon me, let me introduce myself. I'm the coach of the Corgi Heroes."
10043010-28 = "The coach! Wow!"
10043010-29 = "This is..."
10043010-31 = "As your students mentioned, we don't normally bring fans into the facilities, especially not mid-game."
10043010-32 = "But there's an urgent issue, and Sensei, we need your help."
10043010-36 = "We need you to save the Heroes."
10043010-41 = "From...what exactly?"
10043010-42 = "Is it something to do with training?"
10043010-43 = "Probably not!"
10043010-45 = "The truth is...!"
10043010-54 = "Hello, Coach. New orders. You better be ready."
10043010-57 = "!!!"
10043010-59 = "I-I am ready. But what do you want? Is it money? If so, we—"
10043010-60 = "It's not money. What's important is the game."
10043010-61 = "Now listen closely. I'm only going to say this once. Next time your team comes to the plate..."
10043010-62 = "...get a man on base, then bunt. Got it? I want to see exactly that. Nothing else."
10043010-64 = "If you step out of line, you're going to force my hand."
10043010-65 = "*gulp*"
10043010-66 = "And if you call Valkyrie, or if the game gets interrupted in any way, same thing. I'll do it. Right then and there."
10043010-67 = "I'll call again when you're back up to bat. And you WILL pick up."
10043010-72 = "Did they hang up...?"
10043010-73 = "Ugh, I didn't like that voice at all. Sounded like they were using a modulator."
10043010-75 = "Why do they keep doing this...?!"
10043010-76 = "[s] \"What are they threatening you with?\""
10043010-80 = "Maybe I should explain that first. If I can even get the words out..."
10043010-82 = "And WHY are they threatening you? What does anybody stand to gain from threatening a baseball coach?"
10043010-83 = "I have no idea about any of this..."
10043010-85 = "I can barely even think about it, it's so scary..."
10043010-86 = "They said..."
10043010-94 = "...well, you see, the Heroes have an exclusive deal with a certain chew toy factory, and...and they said they'd blow it up!"
10043010-95 = "They're terrorists! They're the worst!"
10043010-99 = "[ns] \"Okay, slow down...\""
10043010-101 = "A chew toy factory...?"
10043010-102 = "Uh...Coach? I'm sorry. I don't really understand..."
10043010-104 = "...Okay. Let me tell you the rest."
10043010-105 = "The chew toys they make there are just the right hardness. I don't know what they do with the texture, but it makes them feel perfect in your mouth."
10043010-106 = "Plus, they add this umami flavor that seeps out the longer you chew. It's...indescribable! It's that good!"
10043010-107 = "When the players get too excited, they chew on 'em to regulate their feelings and all that."
10043010-108 = "Most of the team swears by 'em. They hardly ever step up to the plate OR the mound without chewing on 'em first."
10043010-109 = "If we didn't have 'em, our batting average would drop by half at least!"
10043010-110 = "And our ERA... Woof."
10043010-112 = "I see..."
10043010-113 = "(I still don't really get it...but if the team's performance is at stake...)"
10043010-119 = "Hm, Trainer? I'm not as familiar with baseball as Rei is..."
10043010-120 = "...but all this threatening and whatnot doesn't seem very sportsman-like."
10043010-124 = "No. No, it doesn't. And...nice job talking about sports outside of training!"
10043010-125 = "Maybe baseball's broadening your perspective."
10043010-126 = "A healthy perspective comes from a healthy body."
10043010-127 = "Problems are easier to solve when you're fit, you know!"
10043010-128 = "You were doing so well..."
10043010-130 = "[ns] \"All right, Coach, I think I understand.\""
10043010-134 = "Th-Then...could you help us?"
10043010-135 = "...Hey, speaking as a baseball fan, or just a sports fan in general...this is super wrong."
10043010-136 = "Baseball stadiums are sacred. You don't mess with that."
10043010-137 = "Especially not with TERROR threats! We can't let them get away with it. No way."
10043010-138 = "I agree, Trainer. If we were to let these terrorists have their way..."
10043010-139 = "...it wouldn't just impact the game. It could change the entire sports scene in all of Kivotos."
10043010-140 = "[s1] \"Good, we all agree.\"\n[s2] \"We'll find a way to help.\""
10043010-146 = "Th-Thank you... Thank you!"
10043010-148 = "What exactly can we do, though?"
10043010-152 = "Huh? Look around the stands for the culprit? ...Right, we don't have any other leads, so that'd be a good place to start."
10043010-153 = "Right, of course. The Shiratori series isn't live streamed."
10043010-154 = "If the bad guys are watching the game in real time, they have to be doing it from right here in the stadium. One of their people does, at least."
10043010-155 = "They said they'd call back at the end of the inning."
10043010-156 = "That's true. And they could make more demands."
10043010-157 = "We'll have to be ready."
10043010-161 = "Aha... Say we join the call. We can listen in, maybe talk to the culprit ourselves, while we're looking for them."
10043010-162 = "Right, we might be able to trick them into giving something away."
10043010-163 = "Rei, Trainer, I'll leave that part to you two. "
10043010-164 = "I'm an athlete, not a hostage negotiator."
10043010-165 = "You need anything done physically, though, I'm on it."
10043010-166 = "[s3] \"All right, let's divvy up the roles.\"\n[s4] \"One team handles the phones, one goes out and searches for the caller.\""
10043010-169 = "Sounds good. I'll help with the calls and search on the side."
10043010-170 = "And I'll be the primary searcher."
10043010-171 = "Sounds like you've got the right idea, Sensei. I'll keep the line open."
10043010-175 = "And...Sumire, was it? "
10043010-180 = "That's right, Coach. What's up?"
10043010-181 = "Well, I think Rei here will blend in, but..."
10043010-182 = "...you might stand out a bit, if you go poking around."
10043010-183 = "How so? Trainer, is there something wrong with my outfit?"
10043010-184 = "[s] \"No, no! That's not what they meant!\""
10043010-185 = "Although I guess I'm not exactly dressed for baseball..."
10043010-186 = "All right, what do you suggest?"
10043010-191 = "Well, we're IN a baseball stadium..."
10043010-192 = "...so there must be some suitable clothes around?"
10043010-193 = "[s] \"Like what, specifically?\""
10043010-194 = "Ah! Hey, coach, do you have any... *whisper* *whisper*"
10043010-199 = "Hm? Ah, yes I do! I can go grab some right now!"
10043010-216 = "...All right, thanks for waiting, everybody. Come on out, Sumire!"
10043010-224 = "Hm, these actually feel...kind of refreshing."
10043010-225 = "Hey, um, Trainer?"
10043010-226 = "How...do I look...?"
10043010-227 = "[s] \"...!\""
10043010-229 = "[ns5] \"Those really suit you, Sumire!\"\n[ns6] \"It's like we're seeing a whole new side of you.\""
10043010-232 = "R-Really?"
10043010-233 = "If you say so, Trainer... Fufu, maybe I could get used to these."
10043010-234 = "Especially since I can distribute drinks to the crowd while I'm wearing them, like healthy protein drinks..."
10043010-235 = "That's really not it, Sumire."
10043010-236 = "Anyway! I think we're good to go now. Let's get moving! "
10043010-237 = "We've been talking for a while. They could've flipped the inning by now."
10043010-238 = "Actually...still just one out. We've got time."
10043010-239 = "Wait, all this time, and just ONE out? "
10043010-240 = "How many at-bats have they had?!"
10043010-246 = "..."
10043010-247 = "..."
10043010-248 = "[s] \"...\""
10043010-253 = "W-Well, hey...baseball's full of surprises! You never know what'll happen until the very end!"

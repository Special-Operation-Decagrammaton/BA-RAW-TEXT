10043010-165 = "#1;hide\n5;스미레;99;체력과 육체적 에너지가 필요한 일이라면 자신 있는 편입니다만."
10043010-166 = "[s3] \"그러면, 약간씩만 역할을 분담하자.\"\n[s4] \"크게 범인의 탐색과 범인과의 협상이 있다고 치고…….\""

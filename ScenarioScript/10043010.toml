10043010-152 = "5;스미레;08;네? 우선은 각자 관중석을 돌면서 범인을 찾아보자…… 그렇군요. 단서가 부족하니, 지금은 실질적으로 움직여야 한다는 것이로군요."
10043010-153 = "1;레이;99;네……. 시라토리 시리즈는 기본적으로 생중계까지는 하지 않는 경기들이라."
10043010-154 = "1;레이;00;경기 결과를 실시간으로 확인하려면, 경기장 내에 범인이나 공범이 있을 수밖에 없다는 결론이 되겠네요.\n#1;em;…"
10043010-155 = "1;레이;02;하지만…… 범인은 공수 교대 타임에 연락해 올 거라고도 했는데 말이죠……?"
10043010-156 = "5;스미레;05;확실히 그렇습니다, 트레이너. 범인이 또 어떤 억지스러운 요구를 해 올지 알 수 없는 일입니다."
10043010-157 = "5;스미레;99;이 부분에 대한 대책도 필요할 것으로 보입니다."
10043010-158 = "#st;[0,0];instant;1;"
10043010-159 = "#clearST"
10043010-160 = "5;스미레;00\n1;레이;02\n#1;em;[반응]\n#5;em;[반응]\n#1;h\n#5;h\n#wait;1200"
10043010-161 = "1;레이;00;아하……. 그 부분은, 회선을 동시에 연결해서, 그때그때 범인의 요구에 대응하자고요?"
10043010-162 = "5;스미레;99;그렇군요. 즉각적으로 협상을 해 가며, 범인의 진짜 의도를 알아낸다……."
10043010-163 = "5;스미레;08;그러면 그 부분은 트레이너와 레이 양에게 맡기도록 하겠습니다. \n#5;m3\n#1;dl"

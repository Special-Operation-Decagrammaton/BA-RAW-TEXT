10043010-104 = "3;코기 감독;00;아니다…… 이건 정말로 중요한 일이란다.\n#3;em;[반응]"
10043010-105 = "3;코기 감독;00;그 공장에서 만들어지는 개껌은, 굳기도 적당하고 씹는 감촉도 괜찮은 데다.\n#3;m4"
10043010-106 = "3;코기 감독;00;무엇보다 은근히 오래 씹을수록 배어 나오는 특유의 감칠맛이 정말로 참을 수 없을 정도지!\n#3;hophop"
10043010-107 = "3;코기 감독;00;선수들도 그 개껌을 씹으면 마음이 가라앉고, 경기 중의 지나친 흥분이 저절로 조절되는 효과가 있다고 입을 모아 칭찬할 정도라."
10043010-108 = "3;코기 감독;00;대부분의 선수가 투구나 타석에 들어서기 전에 루틴처럼 그 개껌을 씹고 있지.\n#3;m3"
10043010-109 = "3;코기 감독;00;그게 없다면 분명…… 우리 코기 브레이브스의 팀 타율은 지금보다 0.5할 이상 떨어질 것이 분명하고!\n#3;stiff"
10043010-110 = "3;코기 감독;00;팀 방어율 역시 1점 이상 치솟을 것이 분명해!\n#fontsize;100\n#3;closeup"

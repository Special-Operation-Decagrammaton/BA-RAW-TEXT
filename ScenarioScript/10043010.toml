10043010-119 = "3;스미레;02;음, 트레이너? 제가 레이 양보다 야구에 대해 잘 아는 것은 아닙니다만."
10043010-120 = "3;스미레;08;그래도 이 일은 일반적인 '스포츠 정신', 나아가 '스포츠'와는 상당히 거리가 먼 일처럼 보이는데요. 그렇지 않습니까?"

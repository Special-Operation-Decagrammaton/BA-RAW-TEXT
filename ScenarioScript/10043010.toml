10043010-59 = "3;코기 감독;00;주, 준비는 되었다. 그렇지만 도대체 원하는 게 뭐지? 역시 돈인가? 그런 거라면…….\n#3;stiff"
10043010-60 = "3;코기 감독;00\n#na;의문의 목소리;돈 같은 것에는 관심이 없다. 중요한 건 경기지."
10043010-61 = "3;코기 감독;00\n#na;의문의 목소리;다시 한번 말하겠다. 그대로 실행하도록 해. 이번 수비가 끝나고 다음번 공격에서……."
10043010-62 = "3;코기 감독;00\n#na;의문의 목소리;반드시, 주자 진루 후 번트 작전을 실행해라. 알겠나? 무조건이다. 다른 이야기는 듣지 않겠다."
10043010-63 = "#all;hide"
10043010-64 = "#na;의문의 목소리;이 작전을 이행하지 않을 시, 나는 반드시 '그 예고'를 실행하고 말겠다."
10043010-65 = "3;코기 감독;00;으, 으음!\n#3;stiff"
10043010-66 = "3;코기 감독;00\n#na;의문의 목소리;그리고 발키리 경찰학교에 신고하거나 하여 경기가 중단되기라도 하면, 그 즉시 '그 예고'는 실행될 것이다."
10043010-67 = "#na;의문의 목소리;공수 교대 타임에, 한 번 더 연락하도록 하겠다. 가능한 한 빨리 응답하는 것이 좋을 거야."

[translation]
10043010-1 = "第1話;絕對不說「絕對」"
10043010-6 = "我們居然能進入勇士隊的選手休息室……"
10043010-7 = "雖然我不是很了解棒球的文化，#n不過一般來說，讓無關人員進入球隊設施……應該很少見吧？"
10043010-8 = "[s]「而且還是被悄悄帶到這裡來的……」"
10043010-13 = "感謝您的大駕光臨，夏萊的老師。"
10043010-17 = "[ns]「請問你是……！？」"
10043010-23 = "啊，我應該先自我介紹才對。#n我是柯基勇士隊的總教練。"
10043010-28 = "柯基隊的總教練？真的假的！？"
10043010-29 = "這位就是……"
10043010-31 = "就如剛才這位同學所說……#n原則上在比賽期間，球隊的設施是禁止無關人員進入的。"
10043010-32 = "不過這次的情況相當緊急，我實在想不到請夏萊的老師幫忙以外的辦法。"
10043010-36 = "請您救救我們……救救勇士隊吧！"
10043010-41 = "到底發生了什麼事……？"
10043010-42 = "是能靠訓練解決的事嗎？"
10043010-43 = "怎麼想都不可能吧！"
10043010-45 = "其實──"
10043010-54 = "總教練，是我。#n你準備好……執行我指示的作戰計畫了嗎？"
10043010-57 = "！！！"
10043010-59 = "已，已經準備好了，但是你想要的到底是什麼？#n果然還是錢嗎？如果要錢的話……"
10043010-60 = "我對錢沒興趣。我重視的是比賽。"
10043010-61 = "再強調一次，務必聽從我的指示。#n這次防守結束後的下次攻擊……"
10043010-62 = "必須在跑者進壘後執行短打戰術，聽懂了嗎？#n沒有討價還價的空間，我不要聽任何藉口。"
10043010-64 = "如果不乖乖執行這個作戰計畫，我一定會按照「預告」說的去做。"
10043010-65 = "唔……！"
10043010-66 = "要是你敢通報女武神警察學園，或者用任何方式中斷比賽的話……下場也是一樣。"
10043010-67 = "攻守交換的時候我會再聯絡，勸你最好快點接啊。"
10043010-72 = "掛斷了呢……"
10043010-73 = "對方的聲音……聽起來相當可疑呢。#n甚至還用了變聲器。"
10043010-75 = "唔唔唔……他到底有什麼目的……！"
10043010-76 = "[s]「他說的『預告』是什麼？」"
10043010-80 = "也對，確實該從這點開始說起。#n那是……啊啊，真是可怕到讓我難以啟齒的威脅……！"
10043010-82 = "威脅……？內容是什麼呢？#n而且威脅棒球隊的總教練，究竟想得到什麼……？"
10043010-83 = "實在讓人一頭霧水啊……"
10043010-85 = "那傢伙的威脅……真的非常可怕。"
10043010-86 = "那就是……"
10043010-94 = "要把我們柯基勇士隊的特約潔牙骨工廠，炸得連塊磚頭都不剩！"
10043010-95 = "光是說出口都讓我毛骨悚然啊！"
10043010-99 = "[ns]「……咦？」"
10043010-101 = "潔牙骨……？"
10043010-102 = "那個……總教練？#n不好意思，我不太懂你的意思……"
10043010-104 = "請各位聽我說……這件事真的事關重大。"
10043010-105 = "那間工廠製作的潔牙骨不只嚼勁適中，口感更是一流。"
10043010-106 = "重點是還越嚼越香，獨有的鮮味簡直讓人無法抗拒！"
10043010-107 = "就連選手們也一致同意嚼那個潔牙骨能讓心情平靜下來，#n甚至可以調節比賽中興奮過頭的情緒。"
10043010-108 = "在站上投手丘或打擊區之前嚼嚼那個牌子的潔牙骨，已經是很多選手的例行公事了。"
10043010-109 = "如果沒有那個的話……我們柯基勇士隊的團隊打擊率絕對會下滑超過0.05！"
10043010-110 = "團隊防禦率也肯定會飆升1以上啊！"
10043010-112 = "是嗎……？"
10043010-113 = "（老實說我還是聽不太懂……不過要是會影響到團隊打擊率和防禦率的話……）"
10043010-119 = "指導員？#n雖然我對棒球的了解不如莉同學……"
10043010-120 = "不過在我看來，這種行為不僅違反了「運動家精神」──#n甚至完全破壞了「運動」本身的意義不是嗎？"
10043010-124 = "是，是這樣沒錯……#n不過前輩居然會提到訓練以外的事，讓我有點意外呢。"
10043010-125 = "難道前輩也以棒球為契機，擴展見識和認知之後擺脫訓練腦了嗎？"
10043010-126 = "健康的精神，將寓於健康的身體。"
10043010-127 = "如果具備充足的肌力，遇到這種問題也能迎刃而解吧？"
10043010-128 = "還以為前輩終於轉性了，到頭來結論還是訓練嘛！"
10043010-130 = "[ns]「情況我了解了，總教練。」"
10043010-134 = "那，那麼……您願意幫忙嗎？"
10043010-135 = "首先，身為一名棒球的粉絲……不，身為一個體育愛好者，這種事實在太奇怪了。"
10043010-136 = "在神聖的棒球比賽中發生這種匪夷所思的事情，真的讓人很不開心。"
10043010-137 = "這可是恐攻預告耶！？怎麼可以放著不管呢！"
10043010-138 = "我也持相同的意見，指導員。#n如果對這種暴行置之不理……"
10043010-139 = "不僅是這場棒球比賽，就連整個奇普托斯的體育界都會受到負面影響。"
10043010-140 = "[s1]「看來我們達成共識了。」\n[s2]「我們會想想辦法的，總教練。」"
10043010-146 = "謝，謝謝……真是感激不盡！"
10043010-148 = "不過老師，我們能做些什麼呢？"
10043010-152 = "先分頭巡視觀眾席，試著找出犯人……是嗎？#n也對，既然目前缺乏足夠的線索，只能直接採取行動了。"
10043010-153 = "嗯……因為白鳥系列賽基本不會進行實況轉播……"
10043010-154 = "如果犯人想即時掌握比賽結果的話──他本人或共犯一定就在球場內。"
10043010-155 = "不過犯人剛才有說過，會在攻守交換的時候聯絡對吧……？"
10043010-156 = "確實如此，指導員。#n不知道犯人還會提出什麼無理的要求。"
10043010-157 = "看來也需要針對這個部分擬定好對策呢。"
10043010-161 = "老師的意思是……我們可以共享通訊，即時應對犯人的要求嗎？"
10043010-162 = "原來如此。#n要在談判的同時查明犯人真正的意圖啊……"
10043010-163 = "那麼，這部分的事就交給指導員和莉同學了。"
10043010-164 = "畢竟我並不擅長談判與協商。"
10043010-165 = "不過如果是需要體力和力氣的工作，我倒還頗有自信。"
10043010-166 = "[s3]「那麼就來進行分工吧。」\n[s4]「大致上可以分為搜捕組和談判組……」"
10043010-169 = "這樣啊。那我主要負責談判，同時協助搜捕工作……"
10043010-170 = "了解。所以我只要多專注在觀眾席尋找犯人就行了吧？"
10043010-171 = "我這邊會保持線路暢通。#n萬事拜託了，老師。"
10043010-175 = "另外……這位是堇同學對吧？"
10043010-180 = "是的，總教練。#n請問有什麼事嗎？"
10043010-181 = "以莉同學目前的打扮，在觀眾席走動應該沒什麼問題……"
10043010-182 = "但堇同學的話，可能會有點引人注目。"
10043010-183 = "嗯？我的衣服有那麼奇怪嗎，指導員？"
10043010-184 = "[s]「沒有沒有，也不能說是奇怪啦。」"
10043010-185 = "這樣啊。考量到棒球場的特性，這副打扮看起來確實比較顯眼。"
10043010-186 = "不過……該怎麼辦呢，指導員？"
10043010-191 = "啊！我想到了一個好主意，老師！#n既然這裡是棒球場的話……"
10043010-192 = "前輩只要換上能完美融入棒球場的衣服不就好了嗎？"
10043010-193 = "[s]「哪裡有那種衣服呢？」"
10043010-194 = "總教練，請問你們有沒有……（窸窸窣窣）"
10043010-199 = "嗯？啊啊……！#n當然！那種東西隨時都有！"
10043010-216 = "讓各位久等了！#n來，前輩！快出來看看吧！"
10043010-224 = "嗯……這套衣服，讓人有股新奇的感覺呢。"
10043010-225 = "那個……指導員？"
10043010-226 = "你覺得怎麼樣呢……？"
10043010-227 = "[s]「……！」"
10043010-229 = "[ns5]「很令人耳目一新哦，堇！非常適合你！」\n[ns6]「有股不同於平時的魅力呢！」"
10043010-232 = "是，是嗎？"
10043010-233 = "既然指導員都這麼說了……呵呵，看來這個打扮還算過得去呢。"
10043010-234 = "能為觀眾提供飲料這點也很不錯。#n這樣就可以把對身體有益的蛋白質飲料分給更多人了……"
10043010-235 = "不對不對，前輩。不是你想的那樣啦。"
10043010-236 = "總之換上這套衣服就沒問題了！#n趕緊開始吧，時間所剩不多了！"
10043010-237 = "剛才已經花了不少時間，現在說不定都換我們進攻了哦……？"
10043010-238 = "這個嘛……目前才一出局而已，時間方面應該還很充裕。"
10043010-239 = "什麼！？都過這麼久了才一出局！？#n所以也就是說……"
10043010-240 = "我們守備了這麼久，竟然只抓到一個出局數嗎……！"
10043010-246 = "……"
10043010-247 = "……"
10043010-248 = "[s]「……」"
10043010-253 = "棒，棒球不比到最後一刻都不能下定論嘛！"

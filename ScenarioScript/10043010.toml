10043010-134 = "3;코기 감독;00;그, 그렇다면…… 힘을 빌려주시는 겁니까?\n#3;stiff"
10043010-135 = "3;레이;99;……우선, 한 명의 야구팬…… 아니, 스포츠를 사랑하는 사람으로서, 이건 조금 이상한 것 같아요.\n#3;em;…"
10043010-136 = "3;레이;05;우선 신성한 야구 경기에서, 이해할 수 없는 일을 벌이고 있다는 게 마음에 들지 않고요."
10043010-137 = "3;레이;18;애초에 테러 예고잖아요?! 내버려두면 안 되는 거잖아요!? 그냥 당연한 거잖아요!!??\n#3;em;[반응]"
10043010-138 = "5;스미레;00;저도 같은 의견입니다, 트레이너. 이런 폭거를 방치한다는 것은.\n#5;al\n#3;m1"
10043010-139 = "5;스미레;10;비단 이 야구 경기뿐만이 아니라, 키보토스 전체의 스포츠계에도 악영향을 끼치겠지요."
10043010-140 = "[s1] \"의견이 이렇게 모였으니.\"\n[s2] \"저희는 저희가 할 수 있는 일을 찾아보겠습니다.\""

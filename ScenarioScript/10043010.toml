10043010-124 = "3;레이;05;그, 그건 그래요. 이건…… 조금 놀랍네요. 선배가 트레이닝 이외의 스포츠를 언급하다니."
10043010-125 = "3;레이;02;혹시 선배도, 야구를 계기로 보다 넓은 식견과 인식을 하게 되어, 트레이닝 일변도에서 벗어나게 된 것이–?"
10043010-126 = "5;스미레;99;건강한 정신이란 결국, 건강한 육체에 깃드는 법.\n#5;al\n#3;m1"

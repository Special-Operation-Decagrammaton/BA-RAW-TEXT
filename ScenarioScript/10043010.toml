[translation]
10043010-1 = "ตอนที่ 1;อย่าพูดว่า 'ไม่เด็ดขาด' โดยเด็ดขาด"
10043010-6 = "พวกเราได้เข้ามาในห้องพักนักกีฬาของเบรฟส์เหรอคะเนี่ย..."
10043010-7 = "ฉันก็ไม่ค่อยรู้เกี่ยวกับธรรมเนียมในสนามเบสบอลมากนัก แต่การให้คนนอกเข้ามาในห้องของทีม#nไม่น่าใช่เรื่องที่เกิดขึ้นบ่อยๆ หรือเปล่าคะ?"
10043010-8 = "[s] \"ครูถูกเชิญให้เข้ามาเงียบๆ น่ะ...\""
10043010-13 = "ขอบคุณที่มานะครับ คุณครูของชาเล่ต์"
10043010-17 = "[ns] \"ใครกันน่ะ...?!\""
10043010-23 = "อ๊ะ ผมลืมแนะนำตัวไปสินะครับ ผมเป็นโค้ชทีมคอร์กี้ เบรฟส์ครับ"
10043010-28 = "หืม? โค้ชทีมคอร์กี้? จริงเหรอคะ?!"
10043010-29 = "คนนี้น่ะเหรอคะ..."
10043010-31 = "อย่างที่นักเรียนคนนี้ว่าเลยครับ ปกติแล้วเราจะห้ามไม่ให้คนนอกเข้ามาในห้องของนักกีฬา..."
10043010-32 = "แต่เรื่องนี้มันเร่งด่วนมากจนผมต้องขอความช่วยเหลือจากคุณครูของชาเล่ต์อย่างหลีกเลี่ยงไม่ได้ครับ"
10043010-36 = "ได้โปรด... ช่วยทีมเบรฟส์ด้วยเถอะครับ!"
10043010-41 = "นี่มันเรื่องอะไรกันเหรอคะ...?"
10043010-42 = "ปัญหานี้แก้ไขด้วยการเทรนนิ่งได้มั้ยคะ?"
10043010-43 = "ไม่น่าจะได้นะคะรุ่นพี่!"
10043010-45 = "คือว่า..."
10043010-54 = "โค้ช นี่ฉันเองนะ... พร้อมทำตามคำสั่งของฉันหรือยัง?"
10043010-57 = "!!!"
10043010-59 = "กะ... ก็พร้อมอยู่หรอก แต่ว่านายต้องการอะไรจากพวกเรากันแน่? เงินใช่มั้ย? ถ้าเป็นเรื่องนั้นละก็..."
10043010-60 = "ฉันไม่สนใจเรื่องเงินทองหรอก การแข่งขันต่างหากที่สำคัญ"
10043010-61 = "ฉันขอกำชับอีกครั้งนะ ทำตามที่ฉันสั่งอย่างว่าง่ายเถอะ พอจบเกมรับนี้แล้ว ในเกมรุกต่อไป..."
10043010-62 = "ให้ใช้กลยุทธ์วิ่งเข้าเบสแล้วตีลูกสั้น เข้าใจใช่มั้ย? ห้ามเล่นแบบอื่นล่ะ ฉันไม่ยอมรับความเห็นต่าง#nอะไรทั้งนั้น"
10043010-64 = "ถ้าไม่ทำตามกลยุทธ์นี้ ฉันจะทำอย่างที่เคย 'เตือน' นายไว้"
10043010-65 = "อะ... อื้อ!"
10043010-66 = "แล้วถ้าไปแจ้งสถาบันฝึกตำรวจวัลคิรี่จนการแข่งขันต้องชะงักไป พวกนายจะได้เห็น 'การเตือน' นั้นทันที"
10043010-67 = "แล้วฉันจะติดต่อมาอีกรอบตอนเปลี่ยนเกมรุกเกมรับ ถ้าไม่อยากงานเข้า ก็รับโทรศัพท์ให้มันเร็วๆ เข้าล่ะ"
10043010-72 = "วางสายไปแล้วเหรอคะ..."
10043010-73 = "เป็นเสียงที่... ฟังดูน่าสงสัยมากเลยนะคะ ถึงกับต้องดัดแปลงเสียงด้วยอีก"
10043010-75 = "อึกก... เขาต้องการอะไรกันแน่นะ...!"
10043010-76 = "[s] \"แล้ว 'การเตือน' ที่ว่าคืออะไรเหรอ?\""
10043010-80 = "ผมน่าจะต้องอธิบายตั้งแต่ตรงนั้นเลยนะครับ ที่จริงการข่มขู่นี้... มันน่ากลัวจนผมไม่อยากพูดออกจาก#nปากตัวเองเลย...!"
10043010-82 = "ข่มขู่เหรอคะ? อะไรกัน... แล้วทำไมถึงมาข่มขู่โค้ชทีมเบสบอลล่ะ เขาต้องการอะไรกันแน่คะ?"
10043010-83 = "มีบางส่วนจากการสนทนาที่ฉันไม่เข้าใจด้วยค่ะ..."
10043010-85 = "มันเป็น... การข่มขู่ที่น่ากลัวมากๆ เลยละ"
10043010-86 = "ทางนั้นขู่ว่า..."
10043010-94 = "จะระเบิดโรงงานหมากฝรั่งน้องหมาที่คอร์กี้ เบรฟส์ทำสัญญาไว้ ไม่ให้เหลือแม้แต่อิฐสักก้อนเดียว!"
10043010-95 = "ไม่อยากจะเชื่อเลย จิตใจทำด้วยอะไรเนี่ย!"
10043010-99 = "[ns] \"ว่าไงนะ...?\""
10043010-101 = "หมากฝรั่งน้องหมา... เหรอคะ...?"
10043010-102 = "คือว่า... โค้ชคะ? ฉันไม่ค่อยเข้าใจเลยค่ะ..."
10043010-104 = "เข้าใจหน่อยเถอะ... นี่มันเรื่องคอขาดบาดตายเลยนะ"
10043010-105 = "หมากฝรั่งจากโรงงานนั้นมีความแข็งพอดี และมีเนื้อสัมผัสตอนเคี้ยวที่น่าพึงพอใจเลยด้วย"
10043010-106 = "เหนือสิ่งอื่นใด รสชาติอันเป็นเอกลักษณ์ที่ยิ่งเคี้ยวก็ยิ่งอร่อยนั่นมันไม่อาจต้านทานได้จริงๆ!"
10043010-107 = "นักกีฬาของเราถึงกับพูดเป็นเสียงเดียวกันว่าหมากฝรั่งนี่ช่วยให้จิตใจสงบลงได้ แล้วยังช่วยควบคุมความประหม่าระหว่างการแข่งขันได้ด้วย"
10043010-108 = "ก่อนที่นักกีฬาของเราจะไปขว้างบอลหรือยืนในเขตตีก็จะเคี้ยวหมากฝรั่งนี้จนเป็นนิสัยเลยละ"
10043010-109 = "ถ้าไม่มีหมากฝรั่งจากโรงงานนี้... เปอร์เซ็นต์การตีลูกของทีมคอร์กี้ เบรฟส์ต้องลดลงมากกว่าครึ่ง#nเปอร์เซ็นต์แน่นอน!"
10043010-110 = "แล้วเปอร์เซ็นต์การรับก็ต้องแย่ลงตามไปด้วยอย่างไม่ต้องสงสัย!"
10043010-112 = "อย่างนั้น... เหรอคะ?"
10043010-113 = "(ที่จริงก็ยังไม่เข้าใจอยู่ดี... แต่ถ้ามันส่งผลถึงการเล่นทั้งรุกและรับเลยละก็...)"
10043010-119 = "อืม เทรนเนอร์คะ? ถึงฉันจะไม่ได้เป็นผู้เชี่ยวชาญด้านเบสบอลแบบเรย์"
10043010-120 = "แต่การข่มขู่แบบนี้มันเป็นทั้ง 'การขัดต่อน้ำใจนักกีฬา' และ 'ขัดต่อการแข่งกีฬา' เลยค่ะ คิดเหมือนกันมั้ยคะ?"
10043010-124 = "ฉะ... ฉันเห็นด้วยค่ะ แต่ว่า... เป็นเรื่องน่าตกใจเลยนะคะ ไม่คิดเลยว่ารุ่นพี่จะพูดเรื่องการแข่งกีฬา#nโดยไม่เอ่ยถึงการเทรนนิ่งเลย..."
10043010-125 = "หรือว่ารุ่นพี่มีความรอบรู้และความตระหนักรู้ที่กว้างขึ้นจากเบสบอล จนค่อยๆ หลุดพ้นจากการเทรนนิ่ง#nได้แล้ว?"
10043010-126 = "จิตใจที่แจ่มใสย่อมอยู่ในร่างกายที่สมบูรณ์ค่ะ"
10043010-127 = "ถ้ามีกล้ามเนื้อแข็งแรงเพียงพอ ปัญหาพวกนี้ก็น่าจะคลี่คลายได้นะคะ?"
10043010-128 = "คิดว่าจะดีแล้วเสียอีก สุดท้ายก็พาเข้าเรื่องเทรนนิ่งเหรอคะ!"
10043010-130 = "[ns] \"พวกเราเข้าใจสถานการณ์แล้วละคุณโค้ช\""
10043010-134 = "ถะ... ถ้าอย่างนั้น... ผมขอความช่วยเหลือได้มั้ยครับ?"
10043010-135 = "ก่อนอื่นเลยนะคะ... ในฐานะแฟนเบสบอล ไม่สิ ในฐานะผู้ที่รักในกีฬาแล้ว ฉันว่าเรื่องนี้ค่อนข้างแปลกค่ะ"
10043010-136 = "แล้วฉันก็ไม่ชอบความคิดว่าจะเกิดเรื่องที่ไม่อาจเข้าใจได้ในการแข่งขันเบสบอลอันศักดิ์สิทธิ์ด้วยค่ะ"
10043010-137 = "นั่นมันคำเตือนการก่อการร้ายเลยนะคะ?! เราจะปล่อยผ่านไปทั้งอย่างนั้นไม่ได้ ใช่มั้ยล่ะคะ!!??"
10043010-138 = "ฉันก็เห็นด้วยค่ะ เทรนเนอร์ การเมินเฉยต่อพฤติกรรมความรุนแรงแบบนี้น่ะ..."
10043010-139 = "มันจะส่งผลกระทบเชิงลบไม่เพียงแต่กับการแข่งขันเบสบอล แต่อาจส่งผลไปถึงวงการกีฬาทั้งหมด#nของคิโวทอสเลยค่ะ"
10043010-140 = "[s1] \"ในเมื่อความคิดเห็นเป็นอย่างนี้ งั้นพวกเราจะช่วยดูให้นะ\"\n[s2] \"งั้นพวกเราจะดูว่าจะช่วยอะไรได้บ้างนะ\""
10043010-146 = "ขะ... ขอบคุณครับ... ขอบคุณมากครับ"
10043010-148 = "แต่ว่า คุณครูคะ จะมีอะไรที่พวกเราทำได้เหรอคะ?"
10043010-152 = "คะ? ก่อนอื่นให้ไปเดินรอบๆ อัฒจันทร์แล้วหาตัวคนร้ายเหรอ... ในเมื่อเราขาดเบาะแส งั้นเราก็ต้องเคลื่อนไหวกันเองสินะคะ"
10043010-153 = "ค่ะ... การแข่งขันในชิราโทริซีรีส์เป็นการแข่งขันที่ไม่มีการถ่ายทอดสด"
10043010-154 = "ถ้าคนร้ายหรือผู้สมรู้ร่วมคิดอยากรู้คะแนนแบบเรียลไทม์ ก็ต้องมาอยู่ในสนามกีฬาแน่นอนค่ะ"
10043010-155 = "แต่ว่า... คนร้ายบอกว่าจะติดต่อมาอีกตอนเปลี่ยนเกมรุกเกมรับด้วยนะคะ...?"
10043010-156 = "จริงด้วยค่ะ เทรนเนอร์ เราไม่รู้เลยว่าคนร้ายจะเรียกร้องให้ทำอะไรไม่สมเหตุสมผลแบบไหนอีก"
10043010-157 = "ฉันว่าเราก็ต้องหาแผนรับมือเกี่ยวกับเรื่องนี้ด้วยค่ะ"
10043010-161 = "อ่า... จะถือสายไว้ตลอด แล้วค่อยรับมือกับคำสั่งของคนร้ายในตอนนั้นเหรอคะ?"
10043010-162 = "เจรจาในทันทีแล้วหาเจตนาที่แท้จริงของคนร้าย... เราจะทำอย่างนั้นกันสินะคะ"
10043010-163 = "ถ้างั้นในส่วนนี้ฉันขอฝากให้เทรนเนอร์กับเรย์จัดการนะคะ"
10043010-164 = "การเจรจาหรือต่อรองไม่ใช่งานถนัดของฉันเท่าไร"
10043010-165 = "ฉันมั่นใจกับงานที่ต้องใช้พละกำลังมากกว่าค่ะ"
10043010-166 = "[s3] \"งั้นเรามาแบ่งงานกันดีกว่า\"\n[s4] \"งั้นเราต้องทั้ง 'หาตัวคนร้าย' กับ 'เจรจากับคนร้าย' สินะ\""
10043010-169 = "ได้เลยค่ะ ฉันจะรับผิดชอบเรื่องการเจรจาเป็นหลัก ส่วนการหาตัวคนร้ายไว้ฉันเป็นกำลังเสริมให้..."
10043010-170 = "เข้าใจแล้วค่ะ ถ้างั้นฉันจะไปเดินสำรวจอัฒจันทร์แล้วหาตัวคนร้ายดูค่ะ"
10043010-171 = "ครับ ผมจะถือสายการสนทนาไว้ตลอดครับ งั้นเราทำตามแผนการนี้กันเลยนะครับ คุณครู"
10043010-175 = "แล้วก็... เมื่อกี้บอกว่าชื่อสึมิเระใช่มั้ย?"
10043010-180 = "ใช่ค่ะ โค้ช มีอะไรหรือเปล่าคะ?"
10043010-181 = "ถ้าให้เรย์ไปเดินสำรวจอัฒจันทร์ในชุดนั้น ก็น่าจะไม่สะดุดตาเท่าไรหรอก แต่ว่า..."
10043010-182 = "ผมเกรงว่าสึมิเระจะเป็นจุดสนใจนิดหน่อยน่ะ"
10043010-183 = "เอ๋ ชุดของฉันมันแปลกถึงขนาดนั้นเลยเหรอคะ? เทรนเนอร์?"
10043010-184 = "[s] \"ไม่หรอกๆ มันไม่ได้แปลกหรอกนะ แต่แค่...\""
10043010-185 = "งั้นเหรอคะ ถ้าพิจารณาจากลักษณะของสนามเบสบอล มันก็อาจจะเป็นอย่างที่โค้ชว่าก็ได้ค่ะ"
10043010-186 = "เข้าใจแล้วค่ะ ถ้าอย่างนั้น... ฉันควรทำยังไงดีคะ เทรนเนอร์?"
10043010-191 = "อ๊ะ! ฉันมีไอเดียดีๆ ค่ะคุณครู! ในเมื่อที่นี่เป็นสนามเบสบอล..."
10043010-192 = "ก็ให้รุ่นพี่เปลี่ยนเป็นชุดที่ดูแล้วไม่น่าสงสัยเวลาอยู่ในสนามสิคะ"
10043010-193 = "[s] \"ว่าแต่จะมีชุดแบบนั้นหรือเปล่าน่ะ?\""
10043010-194 = "คุณโค้ชคะ มีชุดแบบนี้มั้ยคะ? (กระซิบ)"
10043010-199 = "หืม? อ้อ...! มีสิ! ถ้าเป็นของแบบนั้นละก็ ผมเตรียมให้ได้ทันทีเลย!"
10043010-216 = "พวกเรารอนานแล้วนะคะรุ่นพี่! ออกมาได้แล้วค่ะ! ทางนี้ๆ!"
10043010-224 = "อืม... ชุดแบบนี้ให้ความรู้สึกแปลกใหม่ดีนะคะ"
10043010-225 = "เอ่อ... เทรนเนอร์?"
10043010-226 = "ฉัน... ดูเป็นยังไงบ้างคะ...?"
10043010-227 = "[s] \"......!\""
10043010-229 = "[ns5] \"ลุคนี้แปลกใหม่และเข้ากับสึมิเระมากเลยละ!\"\n[ns6] \"เหมือนได้ค้นพบเสน่ห์อีกด้านหนึ่งของสึมิเระเลย!\""
10043010-232 = "งะ... งั้นเหรอคะ?"
10043010-233 = "ถ้าเทรนเนอร์ถึงกับพูดขนาดนั้นละก็... ฮุฮุ งั้นการใส่ชุดนี้ก็ไม่แย่เท่าไรนะคะ"
10043010-234 = "ฉันจะได้ไปแจกเครื่องดื่มให้ผู้ชม ยิ่งไปกว่านั้น ฉันจะได้ให้เครื่องดื่มโปรตีนที่ดีต่อสุขภาพอีกด้วย..."
10043010-235 = "ไม่ค่ะ รุ่นพี่ นี่คือการพรางตัวเพื่อทำภารกิจนะคะ"
10043010-236 = "เอาเถอะๆ! ถ้าอยู่ในชุดนั้นก็ไม่น่ามีปัญหา! เรารีบเริ่มกันเถอะค่ะ ไม่มีเวลาแล้วค่ะ!"
10043010-237 = "ที่สำคัญคือเวลาล่วงเลยไปมากแล้วค่ะ ตอนนี้อาจเปลี่ยนเกมรุกเกมรับจนพวกเราไปเล่นเกมรุกอยู่แล้ว#nก็ได้ค่ะ..."
10043010-238 = "อืม คือว่า... ตอนนี้ยังแค่เอาต์เดียว น่าจะยังมีเวลาเหลืออยู่มากนะ"
10043010-239 = "คะ?! ผ่านไปตั้งนานแล้ว แต่ยังแค่เอาต์เดียวงั้นเหรอคะ!? ทำไมกัน..."

[translation]
1600303-1 = "To Shine So Blindingly"
1600303-2 = "There you are, Sensei. Over here. It's Suzumi."
1600303-3 = "Please tell me your destination. I'll escort you."
1600303-5 = "...Hmm. Very well."
1600303-6 = "It's a little far, but don't worry. I'll see to it you make it there safely."
1600303-7 = "...!"
1600303-8 = "[s] \"...Suzumi?\""
1600303-9 = "It's dangerous, Sensei! Hide behind the car! Quickly!"
1600303-10 = "Deploying flash grenade!"
1600303-12 = "*bam* *riiiiiinnnnnng*"
1600303-13 = "Gyaaaaaa! Wh-What's going on?! My eyes...! I can't see!"
1600303-14 = "I feel dizzy! Urgh. Everything is spinning...!"
1600303-15 = "Wh-What the hell is going on?!"
1600303-16 = "Now's our chance. Let's get out of here! Quickly, follow me!"
1600303-19 = "...Phew. We should be safe now."
1600303-20 = "To think they would target you in broad daylight... How bold."
1600303-21 = "What? You thought they were just regular students? Don't be naive, Sensei."
1600303-22 = "You saw the way they were holding their phones, didn't you?"
1600303-23 = "They must have been trying to take photos of you to report to their superiors."
1600303-24 = "[s1] \"That's surprising...\"\n[s2] \"Are you sure?\""
1600303-25 = "One can never be too sure, but the probability is high."
1600303-26 = "One can never be too sure, but the possibility is high."
1600303-27 = "Even you need to be cognizant when on a mission."
1600303-28 = "Right now, my mission is to escort you to your destination."
1600303-30 = "...! Someone suspicious is standing over there!"
1600303-31 = "Flash Grenade!"
1600303-33 = "*bam* *riiiiiiinnnng*"
1600303-34 = "Ah! What was that?!"
1600303-35 = "What's going on?! I can't see anything!"
1600303-36 = "Crowds are too dangerous, like I thought. We need to move!"
1600303-37 = "Follow me! This way!"
1600303-40 = "*pant* *pant*"
1600303-41 = "Are you okay, Sensei? We should be safe for now."
1600303-42 = "Still, this isn't too much for me to handle. I can monitor this many people."
1600303-43 = "I can strike from here if we spot anyone too suspicious moving forward."
1600303-44 = "Excuse me? You think I'm taking it too far?"
1600303-45 = "No, Sensei. I'm here to escort you today."
1600303-46 = "If anything were to happen to you, I...wouldn't be able to forgive myself."
1600303-47 = "What brought on this concern all of a sudden, Sensei?"
1600303-48 = "Do you think I was overstepping my bounds?"
1600303-49 = "[s3] \"I'm grateful—don't get me wrong. But you're too tense.\"\n[s4] \"Loosen up. Think of it as us going on a peaceful walk.\""
1600303-50 = "Hearing you say that makes me even more nervous..."
1600303-51 = "Hearing you say that makes me even more nervous..."
1600303-52 = "...but I shall try. If you want me to relax, I will comply."
1600303-53 = "We can make excellent time if we go straight this way. Let's go, Sensei."
1600303-55 = "[s] (I followed Suzumi.)"
1600303-58 = "We made it without incident, thankfully."
1600303-59 = "Perhaps you were right. My guard may have been up unnecessarily."
1600303-60 = "Maybe I'm not fit to be your escort. I feel like you could have gotten here faster without me..."
1600303-61 = "You expected things to go this way? Then why did you...?"
1600303-62 = "...? You just wanted to walk with me...?"
1600303-63 = "S-Sensei, what has gotten into you?! What kind of services do you think the Vigilante Crew are offering?!"
1600303-64 = "N-Not that I don't want you to call me...!"
1600303-65 = "I would have considered had you simply asked from the beginning..."
1600303-66 = "I-I mean...this is unacceptable!"
1600303-67 = "..."
1600303-68 = "...Um."
1600303-69 = "Next time, you can ask me personally, Sensei."
1600303-70 = "If all you want is company and not protection, I will treat things differently."
1600303-71 = "That way I'll do a much better job than I did today."
1600303-72 = "...So, uh...yeah."
1600303-73 = "I'm glad we both...agree, then...!"
1600303-76 = "(Suzumi suddenly rushed off on her own and left me behind.)"
1600303-77 = "(She looked just as awkward running away as she did before.)"

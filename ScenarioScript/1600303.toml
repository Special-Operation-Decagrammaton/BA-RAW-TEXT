[translation]
1600303-1 = "สว่างเจิดจ้าจนแสบตา"
1600303-2 = "มาแล้วเหรอคะคุณครู ทางนี้ค่ะ สึซึมิเองค่ะ"
1600303-3 = "บอกจุดหมายปลายทางมาได้เลยค่ะ เดี๋ยวฉันจะเดินไปส่งคุณครูเอง"
1600303-5 = "อืม... งั้นเหรอคะ เข้าใจแล้วค่ะ"
1600303-6 = "ค่อนข้างไกลทีเดียว แต่ไม่ต้องห่วงนะคะ ฉันจะคอยดูแลคุณครูเองค่ะ"
1600303-7 = "...!"
1600303-8 = "[s] \"สึซึมิ...?\""
1600303-9 = "อันตรายค่ะคุณครู! มาทางนี้ค่ะ!! ไปซ่อนด้านหลังรถก่อนค่ะ!"
1600303-10 = "จะขว้างระเบิดแสงแล้วนะคะ!!"
1600303-12 = "ตู้ม! วี๊ดดดดดดดดด!!!"
1600303-13 = "กรี๊ดดดดดด! อะไรกันเนี่ย!? ตา...! โอ๊ย แสบตาจังเลย!"
1600303-14 = "เวียนหัวไปหมดแล้ว! วะ... เวียนหัวจังเลย...!"
1600303-15 = "เกิดอะไรขึ้นน่ะ!?"
1600303-16 = "จังหวะนี้ค่ะ รีบออกไปจากที่นี่กันเถอะค่ะ! มาทางนี้ค่ะ!"
1600303-19 = "...เฮ้อ ตอนนี้เราออกมานอกเขตอันตรายแล้วค่ะ"
1600303-20 = "พวกเขาคิดจะเล่นงานคุณครูกลางวันแสกๆ แบบนี้เลยเหรอเนี่ย กล้าดีจริงๆ เลย"
1600303-21 = "คะ? พวกเธอเป็นนักเรียนธรรมดางั้นเหรอคะ? อย่ามาทำเป็นใสซื่อเลยค่ะคุณครู"
1600303-22 = "เมื่อกี้ฉันเห็นพวกนั้นถือโทรศัพท์อยู่ในมือด้วย"
1600303-23 = "พวกนั้นคงคิดจะถ่ายรูปคุณครูแล้วส่งไปรายงานให้หัวหน้าแน่ๆ เลยค่ะ"
1600303-24 = "[s1] \"ครูไม่คิดแบบนั้นนะ...\"\n[s2] \"แน่ใจเหรอ?\""
1600303-25 = "ฉันก็ยังไม่ค่อยแน่ใจหรอกค่ะ แต่มันก็มีโอกาสเป็นไปได้นะคะ"
1600303-26 = "ฉันก็ยังไม่ค่อยแน่ใจหรอกค่ะ แต่มันก็มีโอกาสเป็นไปได้นะคะ"
1600303-27 = "ฉันรู้ว่าคุณครูเป็นคนจิตใจดี แต่ถึงอย่างนั้นก็ควรระวังตัวไว้ตลอดเวลานะคะ"
1600303-28 = "อีกอย่างตอนนี้ฉันกำลังปฏิบัติภารกิจพาคุณครูไปส่งยังจุดหมายอยู่ค่ะ"
1600303-30 = "...!! เดี๋ยวค่ะ ฉันเห็นคนน่าสงสัยอยู่ตรงนั้น!"
1600303-31 = "ขว้างระเบิดแสง!!"
1600303-33 = "ฟิ้ววว! วี๊ดดดดดดดดด!!!"
1600303-34 = "อะเฮือก!! ตกใจหมดเลย!!"
1600303-35 = "อะไรกันเนี่ย! มองไม่เห็นอะไรเลย!"
1600303-36 = "ว่าแล้วเชียวที่ที่คนพลุกพล่านนี่อันตรายจริงๆ รีบไปจากที่นี่กันเถอะค่ะ!"
1600303-37 = "ตามฉันมาค่ะ ทางนี้ค่ะคุณครู!"
1600303-40 = "แฮ่ก... แฮ่ก..."
1600303-41 = "คุณครูโอเครึเปล่าคะ? ตรงนี้... น่าจะปลอดภัยแล้วค่ะ"
1600303-42 = "แถวนี้คนไม่พลุกพล่าน... ถึงมีใครผ่านมาก็สังเกตได้ง่ายด้วยค่ะ"
1600303-43 = "ถ้ามีคนที่น่าสงสัยคงจัดการได้ไม่ยากแน่นอน"
1600303-44 = "คะ...? ไม่ต้องทำถึงขั้นนั้นก็ได้เหรอคะ?"
1600303-45 = "ไม่ได้นะคะคุณครู วันนี้ฉันจะคอยคุ้มครองคุณครูเองค่ะ"
1600303-46 = "ถ้ามีอะไรเกิดขึ้นกับคุณครู... ฉันคงไม่ให้อภัยตัวเองแน่ๆ ค่ะ"
1600303-47 = "ว่าแต่...ทำไมถึงพูดแบบนั้นล่ะคะ?"
1600303-48 = "หรือว่า...คุณครูคิดว่าฉันทำเกินไปงั้นเหรอคะ?"
1600303-49 = "[s3] \"ขอบคุณนะ แต่ไม่ต้องเครียดขนาดนั้นก็ได้\"\n[s4] \"ไม่ต้องจริงจังขนาดนั้นหรอก คิดว่าเราไปเดินเล่นกันก็ได้\""
1600303-50 = "พอคุณครูพูดแบบนี้มันทำให้ฉันประหม่ากว่าเดิมอีก..."
1600303-51 = "พอคุณครูพูดแบบนี้มันทำให้ฉันประหม่ากว่าเดิมอีก..."
1600303-52 = "...แต่ว่าขอบคุณนะคะ ฉันจะลองพยายามผ่อนคลายดูค่ะ"
1600303-53 = "ถ้าเราเดินตรงไปทางนี้ก็จะถึงที่หมายแล้ว รีบไปเถอะค่ะคุณครู"
1600303-55 = "[s] (คุณครูเดินตามสึซึมิไป)"
1600303-58 = "...ถึงแล้วค่ะ โชคดีมากที่ไม่มีอะไรเกิดขึ้นระหว่างทาง"
1600303-59 = "ฉันคิดว่าคุณครูพูดถูกนะคะ วันนี้ฉันคงเครียดมากไปหน่อย"
1600303-60 = "อืม... ฉันคงไม่ใช่ผู้คุ้มกันที่ดีแน่เลย คุณครูคงมาถึงที่นี่ได้เร็วกว่านี้แน่ๆ ถ้ามาคนเดียว..."
1600303-61 = "คะ? คิดแล้วว่าจะเป็นแบบนี้เหรอคะ? ถ้างั้นทำไมถึงได้...?"
1600303-62 = "...? วันนี้แค่อยากใช้เวลาเดินเล่นกับฉันเหรอคะ...?"
1600303-63 = "อะ...อย่า...! ทำแบบนี้ฉันลำบากใจนะคะคุณครู!#nสมาชิกกลุ่มรักษาความสงบไม่ใช่คนที่จะมาชวนเดตได้นะคะ!"
1600303-64 = "ตะ...แต่ไม่ใช่ว่าคุณครูจะเรียกฉันออกมาไม่ได้หรอกนะคะ"
1600303-65 = "ถ้าคุณครูบอกฉันแต่แรกล่ะก็คงจะดีกว่านี้น่ะ...!"
1600303-66 = "มะ...ไม่ใช่แบบนั้นนะคะ เอาเป็นว่ายังไงก็ไม่ได้ค่ะ วิธีนี้ห้ามใช้อีกนะคะ!"
1600303-67 = "......"
1600303-68 = "...เอาไว้..."
1600303-69 = "เอาไว้ค่อยชวนฉันใหม่แล้วกันนะคะ คุณครู"
1600303-70 = "ถ้าคุณครูอยากได้เพื่อนเดินแทนคนคุ้มกันละก็... คราวหน้าฉันจะเปลี่ยนวิธีเองค่ะ"
1600303-71 = "ถ้าแบบนั้นฉันคงทำได้ดีกว่าตอนนี้ค่ะ ฉันจะพยายามนะคะ"
1600303-72 = "...ค่ะ เข้าใจแล้วค่ะ"
1600303-73 = "ถ้างั้น...เอาเป็นว่าเข้าใจตรงกันแล้วนะคะ...!"
1600303-76 = "(สึซึมิรีบวิ่งหายไปทันทีและปล่อยให้คุณครูยืนอยู่ตรงนั้นคนเดียว)"
1600303-77 = "(คราวนี้ท่าวิ่งของเธอก็ดูแปลกๆ เช่นเดียวกับตอนที่วิ่งหนีไปคราวที่แล้ว)"

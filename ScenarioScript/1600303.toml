[translation]
1600303-1 = "閃亮到眼冒金星"
1600303-2 = "早安，老師。我在這裡。"
1600303-3 = "今天要護送老師到哪裡呢？"
1600303-5 = "……原來如此，我明白了。"
1600303-6 = "離這邊有點距離呢。不過別擔心，我會負責保障安全到最後……"
1600303-7 = "……！"
1600303-8 = "[s]「……鈴美？」"
1600303-9 = "老師請往這裡！！請躲到車後面！"
1600303-10 = "我要丟閃光彈了！！"
1600303-12 = "（砰！嘰咿咿咿咿咿咿──）"
1600303-13 = "呀啊啊啊！？怎，怎麼回事！？眼睛……！眼睛看不見了！"
1600303-14 = "什麼東西啊……！嗚呃……！"
1600303-15 = "到，到底發生了什麼事！？"
1600303-16 = "趁現在保持距離吧，請往這邊！！"
1600303-19 = "……呼，總之先脫離危險地帶了。"
1600303-20 = "竟然光天化日之下用那種方式襲擊老師……真是膽大包天。"
1600303-21 = "咦？你覺得那只是一般學生……？不，沒有那回事。"
1600303-22 = "那些學生剛剛把手機拿到胸口的高度了。"
1600303-23 = "看手機的角度，她們一定要是拍下老師的照片，傳給上頭的人。"
1600303-24 = "[s1] 「看起來不像耶……」\n[s2] 「真的嗎……？」"
1600303-25 = "當然我也不能一口咬定，不過可能性很高。"
1600303-26 = "當然我也不能一口咬定，不過可能性很高。"
1600303-27 = "我知道老師為人善良，但執行任務與戰鬥時，首要基礎就是要保持戒心。"
1600303-28 = "而我現在的任務，是要護送老師抵達目的地。"
1600303-30 = "……！！ 那邊又有個行跡可疑的人物！"
1600303-31 = "投擲閃光彈！"
1600303-33 = "（砰！嘰咿咿咿咿咿咿──）"
1600303-34 = "呃啊！怎麼回事！？"
1600303-35 = "嗚！！我的眼睛……！！"
1600303-36 = "人多的地方果然危險……！再前往其他地方吧！"
1600303-37 = "老師，請往這邊！"
1600303-40 = "哈啊，哈啊……"
1600303-41 = "你還好嗎，老師？這裡應該就安全了。"
1600303-42 = "這裡人跡罕至，就算有人來也能馬上看到。"
1600303-43 = "就算遭到襲擊也能輕易鎮壓，地點不錯。"
1600303-44 = "……？你說不需要戒備到這種程度？"
1600303-45 = "那可不行。今天無論如何我都要平安護送老師到目的地。"
1600303-46 = "要是老師出了什麼事，我將要負全責……我絕不容忍那種狀況發生。"
1600303-47 = "話說老師怎麼突然提這些……？"
1600303-48 = "……難道，老師覺得我今天太緊繃了嗎？"
1600303-49 = "[s3] 「我很感激，但你也別這麼緊張。」\n[s4] 「希望你能當作是一起散步。」"
1600303-50 = "你，你那樣說我反倒更緊張……"
1600303-51 = "你，你那樣說我反倒更緊張……"
1600303-52 = "……不過還是謝謝老師。是，那容我稍微做個深呼吸……"
1600303-53 = "沿著這條路走應該馬上就到了，我們走吧。"
1600303-55 = "[s] 跟著鈴美走"
1600303-58 = "……到了。幸好什麼事都沒發生。"
1600303-59 = "就如老師所說，我一開始似乎太緊張了。"
1600303-60 = "……難道說，我給老師添麻煩了嗎？感覺比正常的路程還要花了不少時間……"
1600303-61 = "咦？你說早就預料到會多花時間了……？"
1600303-62 = "……只是想要一起散步而已？"
1600303-63 = "老，老師！？這是自衛隊的護衛任務，可不是什麼約會，所以……"
1600303-64 = "當，當然，也不是說希望老師不要聯絡我……！"
1600303-65 = "只是一開始就這麼告訴我的話，我也會……！"
1600303-66 = "不對不對！反正這種行為很不好！"
1600303-67 = "……"
1600303-68 = "……不過。"
1600303-69 = "希望老師之後能再邀請我。"
1600303-70 = "如果不是護送而只是要一起走，那我也會用該有的態度做陪伴……"
1600303-71 = "到時候……我一定可以表現的比這次更好。"
1600303-72 = "……是，謝謝老師。"
1600303-73 = "那麼……今天就先告辭了……！"
1600303-76 = "（話一說完，鈴美便快步離開了）"
1600303-77 = "（從後面看她的腳步，和之前一樣變得有點彆扭）"

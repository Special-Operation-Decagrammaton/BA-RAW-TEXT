[translation]
10002045-1 = "第4話;沙堡與沙浴（２）"
10002045-2 = "（等到擊退所有湧入的太妹時，沙堡也已經幾乎完全崩毀了……）"
10002045-3 = "啊啊……"
10002045-4 = "梓醬和麻白同學辛苦堆的沙堡……"
10002045-5 = "這也沒辦法，日步美。#n一切皆為徒勞，有形之物終究會消失。"
10002045-6 = "可，可是……"
10002045-7 = "沙堡只要再做就行了。#n即使是在這個充斥著徒勞的世界裡，持續的抗爭和戰鬥肯定也是有意義的。"
10002045-8 = "正是如此。#n邪惡無處不在，因此我們要隨時做好對抗的準備。"
10002045-9 = "我，我已經搞不清楚了……"
10002045-10 = "這樣……"
10002045-11 = "真的是對的嗎……？"
10002045-15 = "弦，弦生同學怎麼看呢……？"
10002045-16 = "嘻嘿嘿嘿嘿嘿嘿！！"
10002045-18 = "喀哈哈哈哈哈哈哈哈！！"
10002045-19 = "[s]「弦生看起來很快樂，真是太好了。」"
10002045-21 = "這，這樣啊……那就好……"
10002045-22 = "啊，話說回來雖然「沙堡」已經完成，「沙浴」卻還沒做呢……？"
10002045-23 = "……咦？#n已經拍好了沙浴的照片？"
10002045-24 = "是，是在什麼時候？#n究竟是誰……？"
10002045-25 = "……咦，是弦生同學和太妹們……"
10002045-26 = "是嗎……？"
10002045-27 = "……那，那些照片，可以讓我看一下嗎……？"
10002045-32 = "[ns] 拿出拍好的照片"
10002045-35 = "啊，原，原來如此……？"
10002045-36 = "老師……這個，與其說是「沙浴」……"
10002045-37 = "感覺更像是……「被埋在沙子裡」……才對吧？"

[translation]
10002045-1 = "ตอนที่ 4;ก่อปราสาททรายกับการอบทรายร้อน 2"
10002045-2 = "(หลังจากที่เอาชนะพวกแยงกี้สาวที่แห่กันเข้ามาได้แล้ว ปราสาททรายก็พังลงจนไม่เหลือเค้าเดิม)"
10002045-3 = "อ่า..."
10002045-4 = "ปราสาททรายที่คุณมาชิโระกับอาซึสะจังอุตส่าห์สร้างขึ้นมา..."
10002045-5 = "ช่วยไม่ได้นะ ฮิฟุมิ ทุกอย่างที่มีแก่นสารล้วนมีวันบุบสลายไป... เพราะทุกอย่างมันล้วนไร้แก่นสาร#nยังไงล่ะ"
10002045-6 = "ตะ...แต่ว่า..."
10002045-7 = "ปราสาททรายน่ะ ก่อขึ้นใหม่ก็ได้แล้ว เพราะสิ่งเดียวที่สำคัญในโลกที่แสนจะไร้แก่นสารแห่งนี้#nก็คือการต่อสู้ยังไงล่ะ"
10002045-8 = "ถูกต้องแล้วค่ะ เพราะความชั่วร้ายมีอยู่ทุกที่ยังไงล่ะคะ#nพวกเราต้องเตรียมตัวให้พร้อมที่จะรับมือตลอดค่ะ"
10002045-9 = "อะ... อ่า... มะ...เหมือนจะไม่ใช่นะ..."
10002045-10 = "ฉันไม่เห็นจะเข้าใจเลยสักนิดเดียว..."
10002045-11 = "เป็นแบบนี้จะดีจริงๆ เหรอคะ...?"
10002045-15 = "คะ...คุณซึรุกิ... "
10002045-16 = "คิกๆๆๆ!!"
10002045-18 = "คิกๆๆ ฮ่าๆๆๆ!!!"
10002045-19 = "[s] \"เหมือนกำลังสนุกอยู่เลยนะ\""
10002045-21 = "ยะ...อย่างนั้นเหรอคะ... ถ้าคุณครูพูดแบบนั้นก็น่าจะใช่...นะคะ"
10002045-22 = "จะ...จริงด้วยสิ เราต้องถ่ายรูปตอนอบทรายร้อนด้วยนี่นา จะต้องทำยังไงเหรอคะ"
10002045-23 = "...? คะ? ถ่ายรูปเสร็จแล้วเหรอคะ? รูปตอนอบทรายร้อนน่ะเหรอคะ?"
10002045-24 = "ตะ... ตอนไหนกันคะ? มีใครอบทรายร้อนไปแล้วเหรอคะ?"
10002045-25 = "....คะ? มันเป็นรูปที่ให้พวกแยงกี้สาวอบทรายร้อนแทนอย่างนั้นเหรอคะ?"
10002045-26 = "หมายความว่ายังไงคะ..."
10002045-27 = "คะ... คือว่าฉันขอ... ดูรูปหน่อยได้ไหมคะคุณครู...?"
10002045-32 = "[ns] (ยื่นรูปที่ถ่ายให้ฮิฟุมิ)"
10002045-35 = "อืม... ว่าแล้ว..."
10002045-36 = "คุณครูคะ... นี่มันไม่ใช่ \"การอบทรายร้อน\" นะคะ... "
10002045-37 = "มันน่าจะเป็น \"ถูกฝังอยู่ในทราย\" มากกว่านะคะ?"

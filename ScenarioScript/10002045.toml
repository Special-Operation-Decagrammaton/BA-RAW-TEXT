[translation]
10002045-1 = "Episode 4;Sandcastles and Sunbathing Part 2"
10002045-2 = "(Once the dust—er, sand—settled, the castle had almost completely collapsed.)"
10002045-3 = "Oh..."
10002045-4 = "Azusa and Mashiro's sandcastle..."
10002045-5 = "Don't let it bother you, Hifumi. Form is emptiness, emptiness is form. All things are destined to crumble and fade away eventually."
10002045-6 = "B-But..."
10002045-7 = "Sandcastles can be rebuilt. Survival is far more important in such an empty world."
10002045-8 = "Correct. Evil can exist anywhere. We must prepare ourselves to fight it at all times."
10002045-9 = "I don't know what's happening anymore..."
10002045-10 = "What are we supposed to do now?"
10002045-11 = "How are we going to accomplish our missions?"
10002045-15 = "Wh-What do you think, Tsurugi? "
10002045-16 = "Kihehehehe!"
10002045-18 = "Hahahaha!"
10002045-19 = "[s] \"Looks like she's having fun again.\""
10002045-21 = "I-I'll take your word for it, Sensei."
10002045-22 = "Oh, I just realized we only took a picture of the sandcastle part. We still need one of us sunbathing, so what do we do?"
10002045-23 = "Huh? You already took one, Sensei?"
10002045-24 = "Wh-When did that happen? And who's in the picture?"
10002045-25 = "What? It was a picture of the thugs?"
10002045-26 = "What in the world...?"
10002045-27 = "Can I take a look?"
10002045-32 = "[ns] Hand Hifumi the picture."
10002045-35 = "How to put this...?"
10002045-36 = "I don't think this counts as sunbathing, Sensei. "
10002045-37 = "It looks more like they were buried alive."

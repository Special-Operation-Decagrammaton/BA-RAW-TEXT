[translation]
10004085-1 = "#title;제8화;슌과 슈에링"
10004085-2 = "#place;산해경 매화원"
10004085-3 = "#na;매화원 학생 A;교관 언니, 얘네들 또 싸워요!"
10004085-4 = "4;슌;05;자자, 싸우지 마세요. 같은 매화원 친구들끼리 사이좋게 지내야죠.\n#4;a\n#4;em;[반응]"
10004085-5 = "4;슌;02;오늘은 무슨 일 때문에 싸우고 있었던 건가요?"
10004085-6 = "#na;매화원 학생 B;얘가 저보고 키가 작다고 놀렸단 말이에요!"
10004085-7 = "#na;매화원 학생 C;하지만 얘가 먼저 제 안경이 촌스럽다고 놀렸는 걸요!"
10004085-8 = "4;슌;01;친구의 외모를 가지고 놀리는 건 나쁜 일이에요. 자, 서로 사과하고 화해하도록 하세요.\n#4;m3\n#4;em;[반짝]"
10004085-9 = "#na;매화원 학생 B;……미안. 실은 그 안경, 정말 예쁘다고 생각했어. 그런데 막상 말하려니 부끄러워서 나도 모르게 나쁜 말을 해버렸어……."
10004085-10 = "#na;매화원 학생 C;나도 미안해. 사실은 나도 작은 키를 신경 쓰고 있었거든."
10004085-11 = "#na;매화원 학생 C;나도 슌 언니처럼 빨리 커다란 사람이 되고 싶은데……."
10004085-12 = "#na;매화원 학생 B;맞아, 맞아. 슌 언니는 키도 크고 머리도 똑똑해서 정말 부러워."
10004085-13 = "#na;매화원 학생 C;언니, 어떻게 하면 언니처럼 커다란 사람이 될 수 있어?"
10004085-14 = "4;슌;01\n#4;h"
10004085-15 = "#wait;500"
10004085-16 = "4;슌;99;(후후, 얼마전까지는 어린 아이로 돌아가고 싶다고 노래를 불렀었는데…… 반대로 빨리 나이를 먹고 싶다고 하는 아이들을 보고 있으니 조금 이상한 기분이네요.)\n#4;em;…"
10004085-17 = "4;슌;99\n#4;h"
10004085-18 = "#wait;500"
10004085-19 = "4;슌;01;여러분은 이해하지 못하겠지만, 키가 크다고 해서 좋은 일만 있는 건 아니랍니다.\n#4;em;[반응]"
10004085-20 = "4;슌;03;키가 커서 불편한 일을 겪을 때도 많아요."
10004085-21 = "#na;매화원 학생 B;키가 큰 게 뭐가 불편해? 높은 곳에 있는 물건도 꺼낼 수 있고, 매화원의 다락방에도 쉽게 올라갈 수 있잖아."
10004085-22 = "4;슌;01;물론 물건을 옮길 때는 편리하지만, 그만큼 쉽게 지치고, 또 높은 곳의 문턱에 머리를 부딪힐 수도 있거든요."
10004085-23 = "4;슌;03;저는 여러분처럼 키가 작을 때가 오히려 더 그리워요.\n#4;greeting\n#4;em;[반짝]"
10004085-24 = "#na;매화원 학생 B;그럼 자라지 않고 어린 채로 있는 게 더 좋은 거야?"
10004085-25 = "4;슌;02;……글쎄요. 키가 큰 게 불편하다고 말하기는 했지만, 꼭 나쁜 일만 있는 건 아니었네요."
10004085-26 = "#na;매화원 학생 A;뭔데? 알려줘!"
10004085-27 = "4;슌;01;음……\n#4;em;…"
10004085-28 = "4;슌;99;그건 바로……."
10004085-29 = "4;슌;14;후후, 비밀! 때가 되면 여러분도 자연스럽게 알 수 있을 거예요.\n#4;em;[음표]"
10004085-30 = "#na;매화원 학생 A;우으으……"
10004085-31 = "#na;매화원 학생 A;슌 언니, 치사해!"
10004085-32 = "[s1] \"안녕, 슌.\"\n[s2] \"오늘도 바빠보이네.\""
10004085-33 = "4;슌;02;어머나, 선생님. 매화원에는 어쩐 일이신가요?\n#4;em;[반응]"
10004085-34 = "4;슌;02;어머나, 선생님. 매화원에는 어쩐 일이신가요?\n#4;em;[반응]"
10004085-35 = "4;슌;01;아하, 오시는 길에 현무상회에서 매화원 아이들을 위한 간식을 받아 오셨군요. 정말 감사해요."
10004085-36 = "4;슌;01;모처럼 오셨으니 차라도 한 잔 하시며 쉬었다 가시는 게 어떠신가요?"
10004085-37 = "4;슌;03;저도 선생님과 이야기를 나누고 싶던 참이기도 했고요.\n#4;greeting\n#4;em;[반짝]"
10004085-38 = "[s3] \"미안하지만 밀린 샬레의 일이 많아서…….\"\n[s4] \"빨리 가봐야 할 것 같아.\""

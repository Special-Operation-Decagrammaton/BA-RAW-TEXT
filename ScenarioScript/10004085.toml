[translation]
10004085-1 = "ตอนที่ 8;ชุนกับชุนหลิง"
10004085-2 = "สวนต้นบ๊วย ซานไห่จิง"
10004085-3 = "พี่ชุนนน พวกเขากำลังต่อสู้กันอีกแล้ว!"
10004085-4 = "เอาล่ะๆ อย่าตีกันนะคะ เด็กโรงเรียนเดียวกันควรเป็นมิตรต่อกันนะคะ"
10004085-5 = "วันนี้ทะเลาะกันเพราะเรื่องอะไรเหรอคะ?"
10004085-6 = "เขามาล้อหนูว่าหนูตัวเตี้ยกว่าเขาค่ะ!"
10004085-7 = "แต่ว่าเขามาล้อเลียนหนูก่อน บอกว่าแว่นของหนูน่าเกลียด!"
10004085-8 = "การล้อรูปลักษณ์ของเพื่อนเป็นสิ่งที่ไม่ควรทำนะคะ เอาล่ะค่ะ ขอโทษแล้วคืนดีกันเถอะนะคะ"
10004085-9 = "ขอโทษนะ ที่จริงแว่นของเธอก็สวยดีนะ... แต่ว่าพอฉันจะพูดแบบนั้นก็รู้สึกเขินๆ เลยพูดอะไรแย่ๆ#nออกไปโดยไม่รู้ตัวน่ะ..."
10004085-10 = "ฉันก็ขอโทษเหมือนกัน ที่จริงฉันกังวลเรื่องความสูงอยู่น่ะ"
10004085-11 = "ฉันอยากจะรีบโตเป็นผู้ใหญ่ไวๆ ให้เหมือนพี่ชุน..."
10004085-12 = "ใช่ๆ พี่ชุนน่ะทั้งตัวสูงแล้วก็ฉลาดด้วย น่าอิจฉาจริงๆ "
10004085-13 = "พี่ชุน~ ทำยังไงถึงจะโตเป็นผู้ใหญ่แบบพี่ได้เหรอ?"
10004085-16 = "(ฮุฮุ เมื่อไม่นานมานี้ฉันเพิ่งพูดว่าอยากกลับไปเป็นเด็กแท้ๆ... แต่พอเห็นพวกเด็กๆ ที่อยากรีบโตเป็น#nผู้ใหญ่ไวๆ แล้วแบบนี้ก็รู้สึกแปลกนิดหน่อยเหมือนกันนะคะ)"
10004085-19 = "ถึงตอนนี้ทุกคนอาจจะยังไม่ค่อยเข้าใจ แต่ว่าการที่ตัวสูงน่ะ ไม่ได้มีแต่เรื่องดีๆ หรอกนะคะ"
10004085-20 = "พอตัวสูงแล้วก็มีเรื่องลำบากอยู่เหมือนกันค่ะ"
10004085-21 = "เรื่องลำบากอะไรเหรอ? ถ้าตัวสูงก็จะหยิบของจากที่สูงได้ แล้วก็ปีนขึ้นไปที่ห้องใต้หลังคาได้ง่ายๆ#nด้วยนี่นา"
10004085-22 = "แน่นอนว่าการที่ตัวสูงจะหยิบของได้สะดวก แต่ว่าก็จะเหนื่อยได้ง่ายๆ แล้วก็มีโอกาสที่หัวจะชนกับ#nขอบประตูได้เหมือนกันนะคะ"
10004085-23 = "ฉันคิดถึงตอนที่ตัวเล็กๆ เหมือนกับทุกคนมากกว่านะคะ"
10004085-24 = "ถ้างั้นการเป็นเด็กดีกว่าการโตเป็นผู้ใหญ่งั้นเหรอ?"
10004085-25 = "นั่นสิคะ... ถึงการที่ตัวโตขึ้นจะมีเรื่องลำบากอยู่บ้าง แต่ว่าก็ไม่ได้มีแต่เรื่องไม่ดีหรอกนะคะ"
10004085-26 = "อะไรเหรอ? เล่าให้ฟังหน่อยสิ!"
10004085-27 = "อืม..."
10004085-28 = "นั่นก็คือ..."
10004085-29 = "ฮุฮุ ความลับค่ะ! เอาไว้โตแล้วก็จะเข้าใจเองค่ะ"
10004085-30 = "ฮือ..."
10004085-31 = "พี่ชุนขี้โกงงง!"
10004085-32 = "[s1] \"สวัสดี ชุน\"\n[s2] \"วันนี้ดูยุ่งมากเลยนะ\""
10004085-33 = "อุ๊ย คุณครู มาที่สวนต้นบ๊วยแบบนี้มีธุระอะไรรึเปล่าคะ?"
10004085-34 = "อุ๊ย คุณครู มาที่สวนต้นบ๊วยแบบนี้มีธุระอะไรรึเปล่าคะ?"
10004085-35 = "อ่า คุณครูแวะเอาขนมจากย่านการค้าเทพเต่าดำมาฝากเด็กๆ นี่เองสินะคะ  ขอบคุณมากเลยค่ะ"
10004085-36 = "ไหนๆ คุณครูก็มาแล้ว มาดื่มชาแล้วพักผ่อนก่อนกลับสักหน่อยดีมั้ยคะ?"
10004085-37 = "ฉันเองก็มีเรื่องที่อยากคุยกับคุณครูอยู่พอดีเลยล่ะค่ะ"
10004085-38 = "[s3] \"ขอโทษนะ แต่ครูยังมีงานที่ต้องทำให้เสร็จอยู่น่ะ...\"\n[s4] \"เหมือนว่าครูจะต้องรีบกลับน่ะ\""
10004085-41 = "คะ? จะกลับแล้วเหรอคะ?"
10004085-42 = "งือ~ ไม่เอานะคะ~"
10004085-43 = "ต่อไปฉันจะเชื่อฟังที่คุณครูพูดค่ะ ช่วยอยู่ต่ออีกสักหน่อยเถอะนะคะ"
10004085-44 = "นะคะ..."
10004085-48 = "[ns5] \"นะ... นี่ชุนหลิงเหรอ?\"\n[ns6] \"หรือว่าผลข้างเคียงของยายังอยู่งั้นเหรอ...?\""
10004085-49 = "ไม่ใช่หรอกค่ะ ฉันยังเป็นชุนคนเดิมค่ะ"
10004085-50 = "ไม่ใช่หรอกค่ะ ฉันยังเป็นชุนคนเดิมค่ะ"
10004085-51 = "ถึงจะเป็นผู้ฝึกสอนที่เข้มงวดของซานไห่จิง แต่บางครั้งก็มีเวลาที่อยากกลับไปเป็นเด็กเหมือนกันนะคะ"
10004085-52 = "เพราะงั้นวันนี้..."
10004085-53 = "ให้ฉันได้งอแงกับคุณครูอีกสักหน่อยเถอะนะคะ ♥"
10004085-55 = "(จากนั้นคุณครูก็ใช้เวลาสนุกสนานอยู่กับชุนที่เกาะแขนคุณครูไม่เลิกเหมือนเด็กๆ)"
10004085-56 = "เล่นซ่อนแอบในดินแดนในฝัน"

[translation]
10004085-1 = "Episode 8;Shun and Shunling"
10004085-2 = "Plum Blossom Garden"
10004085-3 = "Instructor, they're fighting again!"
10004085-4 = "Hey, stop that. Are we not all friends at Plum Blossom Garden?"
10004085-5 = "Why were you fighting?"
10004085-6 = "This kid teased me for being short!"
10004085-7 = "But she teased me first and said my glasses were ugly!"
10004085-8 = "It's not nice to make fun of the way people look. Now, you should apologize to each other and make up."
10004085-9 = "I'm sorry. I actually think your glasses are really pretty, but I was too embarrassed to tell you, so I said something mean instead."
10004085-10 = "I'm sorry too. The truth is, I wish I was taller."
10004085-11 = "I wanna grow up fast so I can be an adult like Shun."
10004085-12 = "Yeah, me too. Shun is so tall and smart. I'm so jealous."
10004085-13 = "Shun, how can I become tall like you?"
10004085-16 = "(Haha. Up until recently, I was saying that I wanted to go back to being a child. It feels a little strange to see children who want to grow up so quickly.)"
10004085-19 = "I know you don't understand, but being tall doesn't mean that only good things happen to me."
10004085-20 = "Sometimes, being tall can be inconvenient."
10004085-21 = "What's wrong with being tall? You can get things from high places and climb up to the attic of Plum Blossom Garden!"
10004085-22 = "It's convenient when I'm moving stuff, but I get tired of it easily, and sometimes I hit my head on the top of the door frame."
10004085-23 = "You know, I miss being small like you."
10004085-24 = "Then, is it better to stay young and small?"
10004085-25 = "I don't know. I did say being tall can be inconvenient, but that doesn't mean that it's always bad."
10004085-26 = "Why? Tell me!"
10004085-27 = "Um..."
10004085-28 = "That's..."
10004085-29 = "Heehee. That's a secret! When the time comes, you'll find out."
10004085-30 = "Ugh..."
10004085-31 = "Come on, Shun!"
10004085-32 = "[s1] \"Hi, Shun.\"\n[s2] \"Busy as usual?\""
10004085-33 = "What a surprise, Sensei. To what do I owe the pleasure?"
10004085-34 = "What a surprise, Sensei. To what do I owe the pleasure?"
10004085-35 = "Oh, you got the snacks from the Black Tortoise Promenade for the kids on your way. Thank you so much."
10004085-36 = "Since you're here, why don't you have a cup of tea and relax a bit before you go?"
10004085-37 = "I've...been wanting to talk to you."
10004085-38 = "[s3] \"I'm sorry, but I have a lot of work to do for Schale.\"\n[s4] \"I have to get going, actually.\""
10004085-41 = "What? You're leaving already?"
10004085-42 = "Ugh, nooo!"
10004085-43 = "I'll be nicer to you from now on, so please, just take a teensy little break?"
10004085-44 = "Huh?"
10004085-48 = "[ns5] \"I-Is this...Shunling?\"\n[ns6] \"Are the side effects still lingering?\""
10004085-49 = "No. I'm still Shun."
10004085-50 = "No. I'm still Shun."
10004085-51 = "But sometimes, the strict instructor of Shanhaijing wants to act like a child."
10004085-52 = "So, today..."
10004085-53 = "...please let me cut loose a little!"
10004085-55 = "I spent a good amount of time afterward struggling with Shun as she clung to my arm like a child."
10004085-56 = "Playing Tag at Neverland"

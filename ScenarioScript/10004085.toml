10004085-49 = "3;슌;01;그럴리가요, 저는 여전히 슌이랍니다.\n#3;em;[반응]\n#3;closeup"
10004085-50 = "3;슌;01;그럴리가요, 저는 여전히 슌이랍니다.\n#3;em;[반응]\n#3;closeup"

[translation]
10004085-1 = "第8話;旬和小旬"
10004085-2 = "山海經．梅花園"
10004085-3 = "教官姐姐，他們又在吵架了～！"
10004085-4 = "孩子們，不能吵架唷。#n大家都是梅花園的朋友，要好好相處哦？"
10004085-5 = "是為了什麼事吵架呢？"
10004085-6 = "他說我矮……！"
10004085-7 = "是他先說我的眼鏡很俗氣的！"
10004085-8 = "針對別人的外貌和穿著口出惡言是不對的唷。#n每個人都有自己的特質和喜歡的東西，對吧？"
10004085-9 = "……對不起。其實我覺得那副眼鏡真的很可愛……#n只是又感覺說出來很害羞所以才說那種難聽的話……"
10004085-10 = "我也很抱歉……其實我最近也一直想要再長高一點……"
10004085-11 = "想快點長大，變得跟旬姐姐一樣……"
10004085-12 = "嗯，旬姐姐很高大，頭腦又聰明，也很會打扮呢。"
10004085-13 = "我也這麼覺得！旬姐姐，要怎麼做才能和你一樣呢？"
10004085-16 = "（呵呵……是啊，孩子們都想快點長大成人）"
10004085-19 = "這個嘛……大家也許還不太能理解，但長高也不全都是好事唷？"
10004085-20 = "個子高也是有許多不方便的時候。"
10004085-21 = "是嗎？手能摸到高處，也能輕鬆爬上閣樓。"
10004085-22 = "這種時候當然很方便，但頭也經常會撞到柱子呢。"
10004085-23 = "而且，我反而更羨慕像大家一樣矮的身高呢。"
10004085-24 = "是嗎？那不要長大，繼續當個孩子會比較好嗎？"
10004085-25 = "唔嗯，這個問題有點難回答呢……#n個子高雖然有不方便的地方，卻也不一定都是壞事……"
10004085-26 = "為什麼？告訴我們嘛？"
10004085-27 = "……"
10004085-28 = "這個……"
10004085-29 = "呵呵，是祕密！#n等大家長大自然就會明白了唷！"
10004085-30 = "咦──！？"
10004085-31 = "旬姐姐好狡猾──！"
10004085-32 = "[s1] 「早安，旬。」\n[s2] 「大家今天都很有精神呢。辛苦了。」"
10004085-33 = "啊，老師！今天怎麼會來梅花園？"
10004085-34 = "啊，老師！今天怎麼會來梅花園？"
10004085-35 = "哎呀，在來的路上順便為孩子們買了玄武商會的點心是嗎？#n真是太感謝你了。"
10004085-36 = "難得過來一趟，稍微喝杯茶休息一下如何？"
10004085-37 = "我正好也有很多話想和老師說。"
10004085-38 = "[s3] 「抱歉，之後還有些緊急的事要處理……」\n[s4] 「夏萊那邊還有工作要做，之後的話……」"
10004085-41 = "咦，怎麼這樣……"
10004085-42 = "唔唔，一下下也不行嗎……？"
10004085-43 = "我以後會乖乖聽老師說的話，不再耍任性……"
10004085-44 = "好嗎……？"
10004085-48 = "[ns5] 「怎，怎麼感覺現在，出現了小旬的影子……！？」\n[ns6] 「難不成又是副作用……！？」"
10004085-49 = "……開玩笑的。"
10004085-50 = "……開玩笑的。"
10004085-51 = "不好意思耽誤你了。#n不過山海經的教官偶爾也會想撒嬌的。"
10004085-52 = "所以……"
10004085-53 = "請再讓我撒嬌一下吧♥"
10004085-55 = "（之後被像個孩子般的旬拉著手無法離開，只好再多陪了他一會）"
10004085-56 = "夢幻島的捉迷藏"

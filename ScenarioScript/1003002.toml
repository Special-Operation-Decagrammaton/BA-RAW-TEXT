[translation]
1003002-1 = "工作狂"
1003002-2 = "格黑娜近郊．溫泉浴場"
1003002-3 = "（聽從千夏的建議，來到了據說有著恢復疲勞效果的格黑娜近郊的溫泉）"
1003002-7 = "之前作戰時的受傷率太高，所以急救包用得比想像中還要快……"
1003002-8 = "首先，先下單10箱左右的紗布和OK繃……"
1003002-9 = "[s] 「千夏……？」"
1003002-10 = "咦……老師？"
1003002-11 = "老師怎麼會來這裡……？"
1003002-12 = "啊，是因為之前說的那個原因，才會想來泡溫泉嗎？"
1003002-13 = "原來如此，是這樣啊。#n看來老師也有要好好休息的打算，身為一名救護人員，我感到安心多了。"
1003002-14 = "老師現在打算要去泡湯吧？#n那麼我推薦別館的露天溫泉。"
1003002-15 = "聽說這邊的露天溫泉含有能消除疲勞的各種礦物值。"
1003002-16 = "接著用浸過溫泉的毛巾按摩一下眼部周圍的話，還能減緩眼睛的疲勞喔。"
1003002-17 = "[s] 「千夏也是來休息的嗎？」"
1003002-21 = "啊，嗯。其實……"
1003002-22 = "我本來沒有打算要來這裡的，但是從陽奈委員長手上收到了這裡的住宿券。"
1003002-23 = "因為最近經常加班，所以讓委員長擔心了。"
1003002-24 = "本來是想拒絕，或是讓給其他風紀委員……#n不過大家都不願意收下，只能接受委員長的好意了。"
1003002-25 = "但與此同時，我該做的工作依然堆積如山……"
1003002-26 = "[s] 「原來如此，這些文件就是那些『該做的工作』……」"
1003002-28 = "是的。該說是因為「明明還有這麼多事沒做完，現在休息真的沒問題嗎？」的心情，還是覺得自己一個人跑來渡假有點過意不去呢……"
1003002-29 = "我把需要盡速處理的文件帶來了……"
1003002-30 = "像是消耗品的訂單、因為受傷需要休息的風紀委員名單等等，諸如此類的文件……"
1003002-31 = "這種繁雜的工作，如果我不盡早處理完的話，之後風紀委員會的人會非常辛苦的。"
1003002-32 = "所幸，這個溫泉浴場也是個非常適合工作的空間。"
1003002-33 = "不會太冷也不會太熱，溫度相當舒適。也沒有會到處引起槍戰的問題兒童們。"
1003002-34 = "說不定這裡比起校舍，更能集中精神呢。"
1003002-35 = "[s1] 「可以的話，現在專心休息一下如何？」\n[s2] 「可以晚點處理的文件，之後再做如何？」"
1003002-36 = "但，但是，其他部員們現在肯定都在努力工作，#n只有我一個人在這裡悠閒享受的話有點……"
1003002-37 = "但，但是，其他部員們現在肯定都在努力工作，#n只有我一個人在這裡悠閒享受的話有點……"
1003002-38 = "而且，我現在也沒有覺得特別累或是身體不舒服……"
1003002-39 = "[s3] 「千夏不休息的話，那我也不休息了。」\n[s4] 「休息也是工作的一部分，不是嗎？」"
1003002-44 = "呵呵，沒想到老師會這麼說……#n不過也對，明明對老師說了那麼多休息的重要性，我自己這樣很沒有說服力呢。"
1003002-45 = "那我今天也暫時忘了工作，專心休息吧。"
1003002-46 = "但是把做到一半的事放在一邊會讓我無法放心，#n所以還是讓我把這裡的文件處理完再去休息吧。"
1003002-47 = "[s] 「那我也一起幫忙吧。」"
1003002-48 = "這，這樣多不好意思……"
1003002-49 = "……老師也會不放心，是嗎？"
1003002-50 = "……呵呵，也對。老師確實是這種人呢。"
1003002-51 = "也不能浪費老師的好意……"
1003002-57 = "我知道了。那麼就拜託您了，老師。"
1003002-59 = "（之後，跟千夏一起拚死拚活地處理了風紀委員會的文件）"
1003002-60 = "（雖然在日落之前處理完了，卻還是因為時間太晚所以沒有泡到溫泉……）"

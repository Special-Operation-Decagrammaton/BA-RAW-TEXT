[translation]
1003002-1 = "#Title;워커홀릭"
1003002-2 = "#Place;게헨나 인근 온천장"
1003002-3 = "#na;(치나츠의 조언에 따라 피로 해소에 좋은 탕이 있다는 게헨나 인근의 온천장을 찾았다.)"
1003002-4 = "#st;[0,0];instant;1;"
1003002-5 = "#clearST"
1003002-6 = "4;치나츠 온천ND;09\n#4;a\n#wait;2500"
1003002-7 = "4;치나츠 온천ND;08;지난번 작전에서는 부상률이 높았던 탓에 구급 키트가 예상보다 훨씬 빠르게 소모되었네요.\n#4;em;…"
1003002-8 = "4;치나츠 온천ND;09;우선은 거즈와 반창고를 10박스 추가 발주하고……."
1003002-9 = "[s] \"치나츠……?\""
1003002-10 = "4;치나츠 온천ND;08;서, 선생님?\n#4;shake\n#4;em;[?!]"
1003002-11 = "4;치나츠 온천ND;09;학원에서 멀리 떨어진 이런 외진 온천장에는 어쩐 일로…….\n#4;m3"
1003002-12 = "4;치나츠 온천ND;08;아…… 지난번 제가 드린 조언을 듣고 휴식차 온천장을 방문하셨다고요?"
1003002-13 = "4;치나츠 온천ND;03;다행입니다. 선생님께서 본격적인 휴식을 취하기로 결정하셨다니, 보건 담당으로서 한시름 놓아도 되겠군요.\n#4;em;[음표]"
1003002-14 = "4;치나츠 온천ND;01;지금부터 탕을 즐기실 생각이시라면 별관에 포함된 노천탕을 추천해 드리겠습니다."
1003002-15 = "4;치나츠 온천ND;02;이 온천장의 노천탕에는 피로 해소에 좋은 여러 가지 미네랄 성분이 포함되어 있다고 하거든요."
1003002-16 = "4;치나츠 온천ND;03;거기에 더해 뜨거운 온천수를 적신 수건으로 눈가를 마사지하시면 눈의 피로를 해소하는 데에도 큰 도움이 될 겁니다.\n#4;greeting\n#4;em;[반짝]"
1003002-17 = "[s] \"치나츠도 쉬러 온 거야?\""
1003002-18 = "#st;[0,0];instant;1;"
1003002-19 = "#clearST"
1003002-20 = "4;치나츠 온천ND;04\n#4;shake\n#4;em;[?!]\n#wait;1500"
1003002-21 = "4;치나츠 온천ND;04;아, 그게 그러니까…… 저는…….\n#4;stiff"
1003002-22 = "4;치나츠 온천ND;06;사실 저까지 온천장에 올 필요는 없었는데, 이곳의 숙박권을 강제로 받아버려서요.\n#4;em;[땀]"
1003002-23 = "4;치나츠 온천ND;09;최근 업무가 몰린 탓에 잔업을 자주 치렀더니, 히나 부장께서 휴식을 하고 오라며 이 온천장의 숙박권을 건네주셨답니다."
1003002-24 = "4;치나츠 온천ND;08;거절하거나 다른 부원에게 넘겨주려고 했지만 다들 받으려 하지 않아서…… 어쩔 수 없이 떠밀리듯 이 온천장에 오게 되었습니다."
1003002-25 = "4;치나츠 온천ND;06;해야 할 일이 아직 태산처럼 남아있는데, 이렇게 쉬어도 될지 걱정이네요.\n#4;em;[속상함]\n#4;stiff"
1003002-26 = "[s] \"이 서류들은 뭐야?\""
1003002-27 = "#all;hide"
1003002-28 = "3;치나츠 온천ND;09;방금 말씀드린 대로 할 일을 잔뜩 놔둔 채 저 홀로 이렇게 휴양지에 와 있다는 게 마음에 걸려서……"
1003002-29 = "3;치나츠 온천ND;08;우선 선도부에서 급하게 처리해야 하는 서류 작업 일감부터 가져왔답니다."
1003002-30 = "3;치나츠 온천ND;09;공무에 필요한 소모품의 발주 리스트와, 부상으로 인해 휴식이 필요한 선도부원들의 명단, 그리고 그 외의 잡다한 서류들……\n#3;em;…"
1003002-31 = "3;치나츠 온천ND;07;이런 자잘한 업무까지 제가 처리하지 않으면 선도부의 누군가가 그만큼 더 고생을 하게 되겠지요."
1003002-32 = "3;치나츠 온천ND;99;그리고 외람된 말일지도 모르겠습니다만, 이 온천장은 휴식만큼이나 업무를 하기에도 훌륭한 공간인 듯합니다."
1003002-33 = "3;치나츠 온천ND;01;너무 춥지도 덥지도 않은 것이 온도도 쾌적하고, 학원에서 종종 목격되는 소란스러운 문제아들도 이 주변에서는 보이질 않으니……."
1003002-34 = "3;치나츠 온천ND;03;어쩌면 부실에서 작업을 할 때보다 더 집중해서 일을 할 수 있을 것 같습니다.\n#3;greeting\n#3;em;[반짝]"
1003002-35 = "[s1] \"지금은 휴식에 집중하는 게 좋지 않을까?\"\n[s2] \"서류 작업은 나중에 하는 게 좋겠어.\""
1003002-36 = "3;치나츠 온천ND;08;하지만 지금도 다른 부원들은 열심히 업무에 매진하고 있을 텐데, 저 혼자 태평하게 휴양을 즐기는 것은 조금…….\n#3;em;[땀]\n#3;stiff"
1003002-37 = "3;치나츠 온천ND;08;하지만 지금도 다른 부원들은 열심히 업무에 매진하고 있을 텐데, 저 혼자 태평하게 휴양을 즐기는 것은 조금…….\n#3;em;[땀]\n#3;stiff"
1003002-38 = "3;치나츠 온천ND;09;게다가 저는 특별히 피로하거나 몸에 불편한 곳도 없는 걸요?"
1003002-39 = "[s3] \"치나츠를 두고 나 혼자 쉴 수는 없어.\"\n[s4] \"전에 휴식도 업무의 일부라고 했잖아?\""
1003002-40 = "#st;[0,0];instant;1;"
1003002-41 = "#st;[0,0];instant;1;"
1003002-42 = "#clearST"
1003002-43 = "3;치나츠 온천ND;08\n#3;em;[...]\n#wait;2500"
1003002-44 = "3;치나츠 온천ND;99;그렇네요. 선생님께 그렇게 휴식의 중요성에 대해 강조하고선, 저 혼자 일에 빠져 있는 것도 모양새가 좋지 않으니……."
1003002-45 = "3;치나츠 온천ND;02;그럼 저도 이번 휴가 기간 중에는 업무는 잊은 채 오롯이 집중하도록 하겠습니다.\n#3;em;[반응]"
1003002-46 = "3;치나츠 온천ND;01;하지만 하던 일을 중간에 버려두고 쉬러 가는 것도 마음에 걸리니, 여기에 있는 서류들은 마저 처리하고 쉬도록 하겠습니다."
1003002-47 = "[s] \"나도 같이 도와줄게.\""
1003002-48 = "3;치나츠 온천ND;09;아뇨. 이렇게까지 도와주시지 않으셔도…….\n#3;em;[땀]\n#3;stiff"
1003002-49 = "3;치나츠 온천ND;08;돕지 않으면 선생님의 마음이 편치 않으실 것 같다고요?"
1003002-50 = "3;치나츠 온천ND;99;……후훗. 그렇네요.\n#3;em;[...]"
1003002-51 = "3;치나츠 온천ND;01;모처럼 쉬러 오신 선생님의 마음을 불편하게 만들 수는 없으니까요."
1003002-52 = "#st;[0,0];instant;1;"
1003002-53 = "#clearST"
1003002-54 = "3;치나츠 온천ND;01\n#3;d\n#wait;1000"
1003002-55 = "3;치나츠 온천ND;01\n#3;a\n#3;closeup\n#wait;1000"
1003002-56 = "#wait;1000"
1003002-57 = "3;치나츠 온천ND;03;그럼 이번만큼은 부탁드리겠습니다, 선생님.\n#3;greeting\n#3;closeup\n#3;em;[반짝]"
1003002-58 = "#all;hide"
1003002-59 = "#na;(이후, 치나츠와 함께 게헨나 선도부의 밀린 서류 작업을 열심히 처리했다.)"
1003002-60 = "#na;(다행히 날이 저물기 전에 서류 작업을 모두 끝낼 수 있었지만, 시간이 너무 늦어진 탓에 탕에는 들어가지 못했다…….)"

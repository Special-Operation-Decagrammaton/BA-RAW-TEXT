[translation]
1003002-1 = "คนบ้างาน"
1003002-2 = "ออนเซ็นใกล้กับเกเฮนน่า"
1003002-3 = "(คุณครูมาที่ออนเซ็นใกล้กับเกเฮนน่าตามคำแนะนำของชินัตสึ ที่บอกว่ามีออนเซ็นที่ช่วยบรรเทา#nความเหนื่อยล้าได้เป็นอย่างดี)"
1003002-7 = "ในปฏิบัติการครั้งล่าสุด มีจำนวนผู้บาดเจ็บจำนวนมากทำให้ชุดปฐมพยาบาลที่เตรียมไว้#nใช้หมดไปเร็วกว่าที่คิด"
1003002-8 = "ก่อนอื่นต้องสั่งผ้าก๊อซและพลาสเตอร์ปิดแผลมาเพิ่มอีก 10 กล่อง..."
1003002-9 = "[s] \"ชินัตสึ...?\""
1003002-10 = "คะ...คุณครู?"
1003002-11 = "ทำไมคุณครูถึงมาที่ออนเซ็นที่อยู่ไกลจากโรงเรียนขนาดนี้คะ..."
1003002-12 = "อา... คุณครูมาพักผ่อนที่ออนเซ็นเพราะคำแนะนำที่ฉันบอกไปเมื่อคราวก่อนเหรอคะ?"
1003002-13 = "ค่อยโล่งใจหน่อยค่ะ คุณครูตัดสินใจที่จะใช้เวลาพักผ่อนอย่างเต็มที่แบบนี้#nในฐานะผู้ดูแลด้านสุขอนามัย ฉันก็คงวางใจได้ครู่หนึ่งแล้วค่ะ"
1003002-14 = "ถ้าคุณครูอยากจะเพลิดเพลินกับการแช่น้ำร้อน ฉันขอแนะนำให้ลองบ่อออนเซ็นกลางแจ้ง#nที่อยู่ตรงอาคารย่อยค่ะ"
1003002-15 = "ได้ยินว่าบ่อออนเซ็นกลางแจ้งมีแร่ธาตุหลายชนิดที่ช่วยบรรเทาอาการเหนื่อยล้าได้ดีค่ะ"
1003002-16 = "นอกจากนี้การใช้ผ้าขนหนูชุบน้ำในบ่อออนเซ็นมาประคบรอบๆ ดวงตาจะช่วยบรรเทาอาการตาล้า#nได้ดีด้วยค่ะ"
1003002-17 = "[s] \"ชินัตสึก็มาพักผ่อนเหมือนกันเหรอ?\""
1003002-21 = "เอ่อ... คือว่าฉัน..."
1003002-22 = "ที่จริงแล้ว ฉันไม่ได้คิดจะมาออนเซ็นเลยค่ะ แต่ถูกบังคับให้รับบัตรกำนัลของที่นี่มาน่ะค่ะ"
1003002-23 = "เมื่อไม่นานมานี้ฉันมักจะอยู่ทำงานล่วงเวลาบ่อยๆ พอดีว่ามีงานค้างอยู่เยอะมาก ท่านประธานฮินะก็เลยสั่งให้ฉันหยุดพักและให้บัตรกำนัลของที่นี่มาค่ะ"
1003002-24 = "ฉันคิดจะปฏิเสธแล้วก็ให้บัตรกำนัลนี่กับสมาชิกคนอื่น แต่ว่าไม่มีใครยอมรับไปเลยค่ะ#nฉันเลยต้องมาอย่างเลี่ยงไม่ได้ค่ะ"
1003002-25 = "ฉันรู้สึกกังวลนิดหน่อยที่มาพักผ่อนแบบนี้ เพราะยังมีงานที่ต้องทำอยู่เยอะเลยค่ะ"
1003002-26 = "[s] \"นี่เอกสารอะไรเหรอ?\""
1003002-28 = "อย่างที่บอกค่ะ การมาพักผ่อนคนเดียวแบบนี้ทั้งที่มีงานที่ต้องทำอยู่#nมันทำให้ฉันไม่ค่อยสบายใจ..."
1003002-29 = "เพราะงั้นฉันเลยเอาเอกสารบางส่วนของคณะกรรมการวินัยที่ต้องจัดการให้เสร็จโดยด่วนมาด้วยค่ะ"
1003002-30 = "รายการสั่งซื้อของใช้จำเป็นสำหรับส่วนกลาง รายชื่อสมาชิกที่ต้องหยุดพักเนื่องจากได้รับบาดเจ็บ#nและเอกสารงานเบ็ดเตล็ดอื่นๆ..."
1003002-31 = "ถ้าฉันไม่จัดการงานเบ็ดเตล็ดพวกนี้ สมาชิกคนอื่นอาจจะต้องเหนื่อยมากขึ้นกว่าเดิมแน่ค่ะ"
1003002-32 = "ฉันไม่แน่ใจว่าพูดแบบนี้จะดูแปลกๆ รึเปล่า แต่ว่าที่ออนเซ็นนี่เงียบสงบเหมาะสำหรับการทำงาน#nพอๆ กับการพักผ่อนเลยค่ะ"
1003002-33 = "อุณหภูมิที่นี่ไม่ร้อนหรือไม่หนาวเกินไป และแถมไม่มีพวกเด็กเกเรที่ชอบส่งเสียงดังเหมือนกับที่#nโรงเรียนด้วย..."
1003002-34 = "ดูเหมือนจะมีสมาธิอยู่กับงานได้ดีกว่าตอนอยู่ที่ห้องทำงานอีกค่ะ"
1003002-35 = "[s1] \"ตอนนี้สนใจเรื่องการพักผ่อนก่อนไม่ดีกว่าเหรอ?\"\n[s2] \"งานเอกสารเอาไว้ทำทีหลังดีกว่ามั้ย\""
1003002-36 = "แต่ว่าตอนนี้สมาชิกคนอื่นๆ ก็กำลังทำงานกันอย่างหนักอยู่#nการที่ฉันมาพักผ่อนอยู่คนเดียวแบบนี้ มันก็ดูไม่ค่อยดี..."
1003002-37 = "แต่ว่าตอนนี้สมาชิกคนอื่นๆ ก็กำลังทำงานกันอย่างหนักอยู่#nการที่ฉันมาพักผ่อนอยู่คนเดียวแบบนี้ มันก็ดูไม่ค่อยดี..."
1003002-38 = "แล้วอีกอย่าง ฉันก็ไม่ได้รู้สึกเหนื่อยหรือว่าร่างกายบาดเจ็บเลยด้วยค่ะ"
1003002-39 = "[s3] \"ครูทิ้งชินัตสึไว้แล้วไปพักผ่อนคนเดียวไม่ได้หรอก\"\n[s4] \"ไหนบอกว่าการพักผ่อนเป็นส่วนหนึ่งของงานไงล่ะ?\""
1003002-44 = "จริงด้วยสินะคะ ฉันเน้นย้ำเรื่องความสำคัญของการพักผ่อนกับคุณครูไปแท้ๆ แต่ตัวฉันเองกลับ#nเอาแต่ทำงานแบบนี้..."
1003002-45 = "ก็ได้ค่ะ ถ้างั้นในช่วงวันหยุดฉันจะหยุดทำงานก่อน แล้วสนุกกับวันหยุดพักผ่อนให้เต็มที่แทนค่ะ"
1003002-46 = "แต่การทิ้งงานเพื่อไปพักผ่อนแบบนี้ มันกวนใจฉันนิดหน่อยค่ะ งั้นฉันจะจัดการเอกสารที่นี่#nให้เสร็จก่อนแล้วค่อยไปพักนะคะ"
1003002-47 = "[s] \"เดี๋ยวครูช่วยแล้วกัน\""
1003002-48 = "ไม่เป็นไรค่ะ คุณครูไม่ต้องลำบากมาช่วยฉันก็ได้นะคะ..."
1003002-49 = "ถ้าไม่ช่วยก็จะรู้สึกไม่สบายใจงั้นเหรอคะ?"
1003002-50 = "ฮิฮิ อย่างนั้นเหรอคะ"
1003002-51 = "คุณครูไม่ได้หยุดพักผ่อนมานานแล้ว ถ้าทำให้คุณครูไม่สบายใจในช่วงวันหยุดก็คงไม่ดีเท่าไร"
1003002-57 = "ถ้างั้นก็ขอรบกวนด้วยนะคะคุณครู"
1003002-59 = "(จากนั้น คุณครูก็ช่วยชินัตสึจัดการเอกสารของคณะกรรมการวินัยที่ค้างอยู่)"
1003002-60 = "(โชคดีที่ทั้งสองคนทำงานทั้งหมดเสร็จก่อนที่จะหมดวัน แต่ว่าเนื่องจากดึกมากแล้ว#nจึงไม่สามารถไปแช่ออนเซ็นได้...)"

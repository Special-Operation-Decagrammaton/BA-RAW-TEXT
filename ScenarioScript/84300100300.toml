84300100300-36 = "1;카린 교복;08;어…… 그렇지만 분명 세미나의 회계가 예의를 차리라고…….\n#1;em;[땀]\n#1;ar\n#3;m5"
84300100300-37 = "3;세이아;99;예의와 존댓말이 꼭 엮여 있지는 않으니까요. 게다가 저는 이번 행사가 딱딱하지 않기를 바라고 있어요."
84300100300-38 = "3;세이아;01;애초에 두 학교가 가까워지기 위한 교류이기도 하니……. 편하게 부탁드립니다. 이건 저희 쪽의 정식 요청이라고 들으셔도 좋아요."
84300100300-39 = "1;카린 교복;04;저, 정식 요청? ……그, 그런가? 그렇게 될 수가 있나……?"

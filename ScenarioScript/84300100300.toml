[translation]
84300100300-6 = "Hello, honored guest!"
84300100300-11 = "\"Honored guest\"? ...Who, me?"
84300100300-12 = "Yes, you! Seminar even gave me a photo to spot you with. Here, take a look!"
84300100300-16 = "That...is certainly a picture of me, yes."
84300100300-18 = "Hey, Asuna! You can't just walk up to her like that...!"
84300100300-19 = "She's high up in Trinity. Show some decorum!"
84300100300-25 = "Excuse me, but who are you two, exactly?"
84300100300-26 = "Huh? Us? We are..."
84300100300-28 = "I'm Karin. I'm a guide for the Millennium Expo."
84300100300-32 = "A pleasure to make your acquaintance."
84300100300-33 = "And...pardon me. I'm not used to being all formal."
84300100300-34 = "It's fine. You don't have to be formal with me. If anything, I should be grateful to you, since you're here to look after me."
84300100300-35 = "Honestly, I'm not always formal myself. So please, speak freely."
84300100300-36 = "Um...but the treasurer of Seminar said to be polite..."
84300100300-37 = "Politeness and formality are not the same thing. I don't want this event to be overly stiff, in any case."
84300100300-38 = "And remember, the event's whole purpose is to bring our schools together. So speak in whatever manner you like. In fact, consider that a formal request from our side."
84300100300-39 = "A-A formal request? Really? Is that okay?"
84300100300-41 = "All right, I'll be super-casual from here on out. Welcome!"
84300100300-43 = "\"'From here on out,' as in...\""
84300100300-44 = "I wasn't expecting to have guides here. I thought it would be up to me to lead my fellow students."
84300100300-45 = "Well, guiding and leading aren't the same thing either. We can show you around, at least."
84300100300-46 = "..."
84300100300-50 = "Hmm? What's up?"
84300100300-51 = "...No, you're right. Millennium's students are best qualified to guide Millennium's guests, of course."
84300100300-52 = "Will there be more joining you?"
84300100300-54 = "Yep! There's more on the other side. Three of them!"
84300100300-55 = "Should I call them for you?"
84300100300-64 = "...Hello, I'm Murokasa Akane, also a guide. I'll look forward to working with you."
84300100300-65 = "Asuma Toki. If you need anything, let me know anytime."
84300100300-66 = "Actually, \"anytime\"...might be a bit difficult."
84300100300-78 = "Hey, everyone? You can't go that way. Please wait."
84300100300-83 = "...Everyone?"
84300100300-87 = "I'm sorry. There's a lot of people here, so I need to step away for a bit."
84300100300-88 = "I hope you have a pleasant look around."
84300100300-92 = "I'll get going too."
84300100300-98 = "...They disconnected."
84300100300-99 = "As you can see, they're each guiding students from Trinity. There are quite a lot of students in all."
84300100300-101 = "Yes, I see. "
84300100300-102 = "It seems you've both put in a lot of effort just for my sake. I don't want to take up any more of your time than I have to."
84300100300-104 = "All right! Let's get going! Follow me!"
84300100300-109 = "W-Wait, Asuna...!"
84300100300-114 = "If you ditch the people you're guiding, you're not a guide anymore!"
84300100300-118 = "...Fine, let's go slowly."

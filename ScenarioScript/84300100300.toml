[translation]
84300100300-6 = "สวัสดี! แขกคนสำคัญ!"
84300100300-11 = "แขกคนสำคัญ? หมายถึงฉันเหรอคะ...?"
84300100300-12 = "อื้อ! ทางเซมิน่าให้รูปมาน่ะ จะได้หากันเจอได้ง่ายๆ ไง! นี่ไงรูป!"
84300100300-16 = "นี่มัน... รูปของฉันจริงด้วยนะคะ"
84300100300-18 = "ดะ... เดี๋ยวสิ รุ่นพี่อาสึนะ! จะพูดเป็นกันเองอย่างนี้เลยเหรอ...!"
84300100300-19 = "คนนี้เป็นคนใหญ่คนโตจากทรีนิตี้นะ เราต้องพูดให้มีมารยาทกว่านี้สิ!"
84300100300-25 = "ขอโทษนะคะ แต่ว่า... ฉันขอถามได้มั้ยคะว่าพวกคุณทั้งสองคนคือใคร?"
84300100300-26 = "หืม? พวกเราเหรอ? พวกเราคือ..."
84300100300-28 = "ฉันชื่อคาริน มารับหน้าที่เป็น <ไกด์> ในงานมิลเลเนียม เอ็กซ์โปครั้งนี้น่ะ..."
84300100300-32 = "ค่ะ... ขอฝากตัวด้วยนะคะ"
84300100300-33 = "อืม ขอโทษนะคะ ฉันไม่ชินกับการพูดแบบมีหางเสียงเท่าไรน่ะ..."
84300100300-34 = "ไม่เป็นไรค่ะ ไม่ต้องฝืนตัวเองหรอกค่ะ ฉันต่างหากค่ะที่ต้องขอบคุณพวกคุณที่มาช่วยดูแลฉัน"
84300100300-35 = "ส่วนเรื่องการพูด ทางฉันเองก็เลือกใช้อย่างอิสระเหมือนกันค่ะ เพราะงั้นก็ไม่ต้องกังวล และพูดกับฉันอย่างสบายได้เลยนะคะ"
84300100300-36 = "อ่า... แต่นักบัญชีแห่งเซมิน่ากำชับไว้ว่าให้รักษามารยาท..."
84300100300-37 = "แต่มารยาทกับการพูดเพราะไม่จำเป็นต้องอยู่ด้วยกันเสมอไปนี่คะ อีกอย่างฉันก็หวังว่างานครั้งนี้จะไม่#nทำให้พวกเราเกร็งกันจนเกินไปด้วยค่ะ"
84300100300-38 = "การแลกเปลี่ยนนี้ก็มีขึ้นเพื่อให้ทั้งสองโรงเรียนใกล้ชิดกันด้วย... งั้นก็เชิญทำตัวตามสบายเถอะค่ะ คิดว่านี่เป็นคำขอร้องอย่างเป็นทางการจากฉันก็ได้ค่ะ"
84300100300-39 = "คะ... คำขอร้องอย่างเป็นทางการ? งะ... งั้นเหรอ...? มะ... มีอะไรแบบนี้ด้วยเหรอ...?"
84300100300-41 = "อื้อ! ถ้างั้นจากนี้ไปฉันก็จะพูดอย่างเป็นกันเองละนะ! คุณแขกคนสำคัญ!"
84300100300-43 = "'จากนี้ไป'...?"
84300100300-44 = "แต่จะว่าไป... ที่บอกว่าเป็นไกด์น่ะค่ะ ฉันนึกว่าการนำเพื่อนนักเรียนของฉันในงานนี้คือหน้าที่ของฉัน#nเสียอีกค่ะ..."
84300100300-45 = "คำว่า 'นำ' กับ 'ไกด์' มันมีความหมายต่างกันอยู่นิดหน่อยน่ะ แต่ยังไงการแนะนำภายในมิลเลเนียมก็#nควรเป็นงานของพวกเราอยู่แล้วนี่?"
84300100300-46 = "..."
84300100300-50 = "เป็นอะไรไปเหรอ...?"
84300100300-51 = "เปล่าค่ะ... นั่นสินะคะ คุณพูดถูกแล้วละค่ะ การแนะนำภายในโรงเรียนมิลเลเนียมก็ควรเป็นงานของ#nนักเรียนมิลเลเนียมถูกแล้วละค่ะ"
84300100300-52 = "ไม่ทราบว่ามีไกด์ท่านอื่นด้วยมั้ยคะ?"
84300100300-54 = "อื้อ! มีคนอื่นนอกจากพวกเราอีก มีตั้งสามคนเลยนะ!"
84300100300-55 = "ฉันลองโทรหาให้มั้ย?"
84300100300-64 = "สวัสดีค่ะ ฉันชื่อ <มุโรคาสะ อาคาเนะ> มาเป็นไกด์ให้เหมือนกันค่ะ ขอฝากตัวด้วยนะคะ"
84300100300-65 = "ฉันชื่อ <อะซุมะ โทคิ> ค่ะ ถ้าต้องการอะไรก็บอกพวกเราได้ทุกเมื่อเลยค่ะ"
84300100300-66 = "ที่จริงถ้าเป็น 'ทุกเมื่อ'... ก็อาจจะลำบากนิดหน่อยก็ได้ค่ะ"
84300100300-78 = "อ๊ะ ทุกคน? จะไปทางนั้นไม่ได้นะคะ เดี๋ยวก่อนค่ะ"
84300100300-83 = "ทุกคนคะ...?"
84300100300-87 = "ขอโทษนะคะ มีคนมาดูงานตรงนี้เหมือนกัน... ฉันคงต้องไปก่อนแล้วละค่ะ"
84300100300-88 = "ขอให้สนุกกับการดูงานในวันนี้นะคะ"
84300100300-92 = "ฉันก็ต้องขอตัวเหมือนกันค่ะ"
84300100300-98 = "สายตัดไปแล้ว...!"
84300100300-99 = "อย่างที่เห็นว่าตอนนี้แต่ละคนกำลังทำหน้าที่เป็นไกด์ให้นักเรียนโรงเรียนทรีนิตี้กันอยู่ เพราะว่าครั้งนี้มีนักเรียนมาเข้าร่วมงานกันเยอะน่ะ"
84300100300-101 = "อย่างนั้นสินะคะ เข้าใจแล้วค่ะ "
84300100300-102 = "รู้สึกเหมือนทั้งสองคนต้องเสียเวลากันมากเพราะฉันคนเดียวเลยนะคะ น่าจะงานยุ่งกันแท้ๆ งั้นรีบไปกันเถอะค่ะ"
84300100300-104 = "ได้สิ! งั้นก็ไปกันเลย! ตามฉันมาได้เลย!"
84300100300-109 = "ดะ... เดี๋ยวก่อนสิ รุ่นพี่...!"
84300100300-114 = "ถ้าตัวเองรีบบึ่งไปก่อนแบบนี้ แล้วจะเรียกว่าเป็นไกด์ได้ยังไงล่ะ..."
84300100300-118 = "ค่อยๆ ตามฉันมาแล้วกันนะ..."

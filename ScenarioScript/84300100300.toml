[translation]
84300100300-6 = "嗨～！重要的客人～！"
84300100300-11 = "重要的客人？#n……是在說我嗎？"
84300100300-12 = "嗯！研討會為了方便辨認給了我一張照片！你看這個！"
84300100300-16 = "這……確實是我的照片呢。"
84300100300-18 = "等，等一下，明日奈前輩！怎麼突然這樣……！"
84300100300-19 = "我不是說過那是三一的高層，說話要有禮貌一點嗎！"
84300100300-25 = "不好意思，可以請問……兩位是誰嗎？"
84300100300-26 = "嗯？我們嗎？#n我們是……"
84300100300-28 = "我是這次負責千年博覽會「導覽」的花凛……"
84300100300-32 = "……我的名字叫做花凛。還請多多指教。"
84300100300-33 = "唔嗯，實在抱歉。#n因為我不太習慣說敬語……"
84300100300-34 = "沒關係，反而是我該說聲謝謝才對。#n因為兩位是來護送我的。"
84300100300-35 = "而且我們這邊也是自由選擇是否使用敬語。#n兩位不需要太拘謹，輕鬆說話就行了。"
84300100300-36 = "唔嗯……不過研討會的會計要我務必遵守禮儀……"
84300100300-37 = "禮儀與敬語未必是互相綁定的關係。#n而且我也不希望這次的活動太過嚴肅。"
84300100300-38 = "畢竟交流的目的，本來就是為了拉近學園間的關係……所以隨意就好。#n或者要把這當作是我們的正式請求也可以。"
84300100300-39 = "正，正式請求？#n……是，是嗎？真的可以那樣嗎……？"
84300100300-41 = "嗯嗯！那我接下來說話就隨意一點囉！客人！"
84300100300-43 = "……「接下來」？"
84300100300-44 = "話說……導覽啊。#n我本來還以為，帶領三一的學生是我的工作……"
84300100300-45 = "我想「帶領」和「導覽」之間還是存在些微的差異。#n總之介紹千年的工作就交給我們吧。"
84300100300-46 = "…………"
84300100300-50 = "……怎麼了嗎？"
84300100300-51 = "……不，你說的沒錯。#n千年內部的介紹，交給千年的學生才是正確的吧。"
84300100300-52 = "還有其他人嗎？"
84300100300-54 = "嗯！另一邊還有更多人哦！一共還有三個人！"
84300100300-55 = "要我幫忙聯絡嗎？"
84300100300-64 = "您好，我是同樣負責導覽的「室笠朱音」。#n還請多多指教。"
84300100300-65 = "我是「飛鳥馬季」。#n如果有任何需要，歡迎隨時跟我說。"
84300100300-66 = "雖然「隨時」可能稍微有點困難……"
84300100300-78 = "啊，各位？#n不可以往那邊走哦。請稍等。"
84300100300-83 = "……各位？"
84300100300-87 = "非常抱歉。#n這邊也有一些客人……所以我得暫時離開一下。"
84300100300-88 = "祝各位都能看得開心。"
84300100300-92 = "那我也先告辭了。"
84300100300-98 = "……掛斷了！"
84300100300-99 = "如你所見，由於參加的人數相當多，因此大家都在各自的崗位上引導三一的學生。"
84300100300-101 = "原來如此，我明白了。"
84300100300-102 = "我一個人好像占用兩位太多時間了。#n你們應該也很忙才對，趕緊出發吧。"
84300100300-104 = "好～！要出發囉！#n跟我來吧──！"
84300100300-109 = "不，不是，前輩……！"
84300100300-114 = "丟下要導覽的人先走，還能算是導覽嗎……"
84300100300-118 = "……我們慢慢跟上去吧。"

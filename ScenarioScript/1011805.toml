[translation]
1011805-1 = "สถานที่ที่คาดไม่ถึง"
1011805-3 = "(คุณครูกำลังเดินไปขึ้นรถไฟใต้ดินตามปกติ)"
1011805-6 = "[ns] \"เอ๋?\""
1011805-8 = "อ๊ะ! อะไรกัน? คุณครูนี่นา!"
1011805-9 = "วะฮะฮ่า~ ได้เจอกันที่นี่ด้วยสินะ!"
1011805-10 = "[s1] \"สวัสดี โนโซมิ มาทำอะไรเหรอ?\"\n[s2] \"ว่าไง โนโซมิ มาทำอะไรที่นี่น่ะ?\""
1011805-13 = "ก็มาขึ้นรถไฟใต้ดินน่ะสิ"
1011805-14 = "ครูก็มาขึ้นรถไฟใต้ดินด้วยเหรอ?"
1011805-15 = "ดีเลย งั้นก็ไปด้วยกันเถอะ"
1011805-17 = "ลักกี้! ได้นั่งด้วย~!"
1011805-18 = "คุณครู~ มานั่งตรงนี้สิ!"
1011805-26 = "[ns3] \"โนโซมิก็ขึ้นรถไฟใต้ดินกับเขาเหรอเนี่ย?\"\n[ns4] \"ปกติก็ขึ้นรถไฟใต้ดินบ่อยเหรอ?\""
1011805-29 = "วะฮะฮ่า ก็บางที่รถไฟมันไปไม่ถึงนี่นา ฉันก็เลยมาขึ้นรถไฟใต้ดินแบบนี้ละ"
1011805-30 = "แล้วมันก็คล้ายๆ กับรถไฟธรรมดาด้วย ฉันชอบนะ รถไฟใต้ดินเนี่ย"
1011805-31 = "[s] \"มันก็คล้ายๆ กันอย่างที่ว่าละนะ\""
1011805-32 = "ทั้งจุผู้โดยสารได้เยอะ แล้วก็มาตรงเวลา"
1011805-33 = "นอกจากนี้มันก็เปิดโล่ง นั่งแล้วไม่เมารถด้วย"
1011805-34 = "วะฮะฮ่า ข้อดีส่วนมากก็คล้ายๆ กับรถไฟเลยนะ!"
1011805-35 = "แต่ส่วนที่ต่างกับรถไฟ ก็คงเป็นเรื่องขนาดที่เล็กกว่านิดหน่อย ดูวุ่นวายและจอดบ่อยด้วย"
1011805-36 = "รถไฟบนดินน่ะดีกว่าอยู่แล้ว! ว่ามั้ยล่ะ?"
1011805-37 = "[s5] \"แต่บางพื้นที่ก็ไม่มีทางรถไฟไปถึงนะ\"\n[s6] \"แต่รถไฟใต้ดินไปไหนได้มากกว่านะ\""
1011805-40 = "ฮึ่ม~ มันก็จริงอยู่หรอก"
1011805-41 = "มันอาจจะมีประโยชน์มากกว่ารถไฟก็ได้ ถ้าดูจากสถานที่ที่จะไป"
1011805-42 = "ถ้ามีโอกาส ฉันก็อยากลองขับรถไฟใต้ดินดูบ้างจัง"
1011805-43 = "[s] \"แล้วถ้าเป็นเรือล่ะ คิดว่าไง?\""
1011805-44 = "เรือเหรอ? ไม่รู้สิ ฉันไม่เคยนั่งเรือมาก่อนเลย แต่ได้ยินว่านั่งเรือแล้วจะเมาเรือหนักเลยละ"
1011805-45 = "แบบนั้นไม่ใช่ทางของฉันหรอก!"
1011805-46 = "ยิ่งเป็นเรือลำใหญ่ ก็ยิ่งไม่เมาเรืองั้นเหรอ? แหะๆ คุณครูคงได้นั่งอะไรมาหลายอย่างเลยสินะ?"
1011805-47 = "วะฮะฮ่า! เข้าใจแล้ว ฉันก็คงได้นั่งเรือในสักวันละนะ"
1011805-48 = "แต่ถึงยังไง รถไฟบนทะเลก็น่าจะเจ๋งกว่าเรือนะ?"
1011805-49 = "[s7] \"รถไฟที่วิ่งบนทะเลงั้นเหรอ!\"\n[s8] \"ถ้ามีแบบนั้นจริงๆ ก็ยอดไปเลยนะ\""
1011805-52 = "ถ้าพวกเราพยายามสร้างเส้นทางรถไฟทุกรูปแบบ ในอนาคตมันก็น่าจะเป็นไปได้อยู่นะ? วะฮะฮ่า!"
1011805-54 = "(แล้วคุณครูกับโนโซมิก็คุยกันเรื่องการเดินทางกันอีกพักใหญ่...)"
1011805-58 = "(จนนั่งเลยสถานีที่ต้องลง...)"

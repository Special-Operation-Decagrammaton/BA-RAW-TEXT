[translation]
1011805-1 = "意外的場所"
1011805-3 = "（一如往常前往地鐵）"
1011805-6 = "[ns]「咦？」"
1011805-8 = "哦？這不是老師嗎！"
1011805-9 = "噗哈哈～竟然會在這裡遇到你！"
1011805-10 = "[ns1]「嗨，希望。」\n[ns2]「你來這裡有什麼事嗎？」"
1011805-13 = "當然是來搭地鐵囉。"
1011805-14 = "老師也要搭這班嗎？"
1011805-15 = "這樣啊，那我們一起上車吧。"
1011805-17 = "Lucky！有位置耶～！"
1011805-18 = "老師～來坐這邊！"
1011805-26 = "[ns3]「沒想到會在地鐵上遇到希望，讓我有點驚訝。」\n[ns4]「你平時常搭嗎？」"
1011805-29 = "噗哈哈，畢竟有些地方沒有規劃鐵道，所以偶爾也會搭地鐵。"
1011805-30 = "感覺跟列車挺像的，我還算喜歡。"
1011805-31 = "[s]「感覺的確差不多。」"
1011805-32 = "能載很多人，也有還算準時的時刻表。"
1011805-33 = "空間帶有開放感，所以不容易暈車。"
1011805-34 = "噗哈哈，大部分的優點都跟列車很像！"
1011805-35 = "雖然地鐵還是比列車小又擁擠，停靠的站數也更多就是了。"
1011805-36 = "果然還是鐵路比較好吧！你說是不是？"
1011805-37 = "[s5]「不過還是有很多地方沒有鐵道經過。」\n[s6]「這種時候就必須依靠地鐵和公車了。」"
1011805-40 = "哼嗯～也是啦。"
1011805-41 = "根據目的地的不同，有時確實會比列車更方便。"
1011805-42 = "有機會的話，我也想開一次地鐵看看。"
1011805-43 = "[s]「那你覺得船怎麼樣？」"
1011805-44 = "船？我沒搭過所以不知道，但有聽說很容易暈船。"
1011805-45 = "應該不太符合我的喜好！"
1011805-46 = "你說船也是越大越不容易暈？#n咦，老師什麼都搭過啊？"
1011805-47 = "噗哈哈！嗯嗯，說不定我將來也有機會搭吧。"
1011805-48 = "不過跟船比起來，還是海上列車更帥吧？"
1011805-49 = "[s7]「在海上行駛嗎！」\n[s8]「如果真的能實現的話，應該會超酷的。」"
1011805-52 = "只要努力鋪設各種鐵道路線，總有一天會實現吧？噗哈哈！"
1011805-54 = "（就這樣和希望聊了很久關於交通工具的話題……）"
1011805-58 = "（結果錯過了要下車的站……）"

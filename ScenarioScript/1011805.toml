[translation]
1011805-1 = "Unexpected Place"
1011805-3 = "I was on my way to take my usual subway ride."
1011805-6 = "[ns] \"Eh?\""
1011805-8 = "Wait, what? Sensei?"
1011805-9 = "Pahyahya! I didn't expect to see you here!"
1011805-10 = "[ns1] \"Hi, Nozomi.\"\n[ns2] \"What brings you here?\""
1011805-13 = "I'm here to take the subway, of course."
1011805-14 = "Are you taking this one too, Sensei?"
1011805-15 = "That's great! Let's go together."
1011805-17 = "Lucky! Got a seat!"
1011805-18 = "Sensei! Sit here!"
1011805-26 = "[ns3] \"I don't see you on the subway much.\"\n[ns4] \"Do you take the subway often?\""
1011805-29 = "Pahyahya! I take it sometimes, since some places don't have train tracks installed."
1011805-30 = "It's not that different from a train, so I like it, you know?"
1011805-31 = "[s] \"I suppose they do feel similar.\""
1011805-32 = "They hold a lot of people, they're usually on schedule..."
1011805-33 = "...plus, they feel open, so I don't get motion sickness."
1011805-34 = "Pahyahya! So yeah, most of the pros are very train-like!"
1011805-35 = "Cons: it's smaller, it can get cramped, and it stops more than trains do."
1011805-36 = "I guess that means trains are better. Don't you think?"
1011805-37 = "[s5] \"Yeah, but like you said, not every place has train tracks.\"\n[s6] \"Subways and buses have their place.\""
1011805-40 = "Hmm. I guess."
1011805-41 = "They CAN be more practical than trains, depending on where you're going."
1011805-42 = "Maybe I'll get to drive a subway sometime."
1011805-43 = "[s] \"Ever thought about piloting a ship?\""
1011805-44 = "A ship? I've never sailed before, but I hear the motion sickness gets really bad."
1011805-45 = "It's probably not for me!"
1011805-46 = "Oh? You get less motion sick on bigger ships? Heh, I guess you've been on all kinds of vehicles, haven't you?"
1011805-47 = "Pahyahya! Well, maybe someday, I'll take a boat trip somewhere."
1011805-48 = "But you know what'd be really cool? A sea train!"
1011805-49 = "[s7] \"Riding on sea tracks!\"\n[s8] \"That'd be cool if it was a thing.\""
1011805-52 = "We've just got to keep building new tracks, right? It'll happen eventually. Pahyahya!"
1011805-54 = "We talked about different transportation methods for a while..."
1011805-58 = "...and that's how I missed my stop."

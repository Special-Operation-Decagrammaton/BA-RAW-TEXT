1011805-41 = "3;노조미;99;어딜 가느냐에 따라 열차보다 더 유용할 수도 있긴 해.\n#3;closeup"
1011805-42 = "3;노조미;16;기회가 되면 나중에 지하철도 한 번 운행해 보고 싶네.\n#3;closeup"
1011805-43 = "[s] \"배 같은 건 어때?\""
1011805-44 = "3;노조미;02;배? 배는 안 타봐서 모르겠지만 멀미가 엄청 심하다는 말은 들었는데.\n#3;closeup\n#3;em;[?]"
1011805-45 = "3;노조미;09;아무래도 내 취향은 아닐 듯!\n#3;closeup"
1011805-46 = "3;노조미;05;배도 클수록 멀미를 안 한다고? 헤에, 선생님은 이런저런 거 많이 타봤구나?\n#3;closeup"
1011805-47 = "3;노조미;03;파햐햐! 그래, 그래. 언젠가는 나도 탈 일이 있을지도 모르겠네.\n#3;closeup\n#3;em;[재잘]"
1011805-48 = "3;노조미;10;그치만 배보다는 해상 열차 쪽이 더 멋지지 않아?\n#3;closeup"

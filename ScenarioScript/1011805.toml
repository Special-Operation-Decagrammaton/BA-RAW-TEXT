1011805-29 = "3;노조미;03;파햐햐, 열차 노선이 안 깔린 곳도 있다 보니 종종 이용하는 편이지.\n#3;closeup\n#3;em;[재잘]"
1011805-30 = "3;노조미;10;열차랑 비슷하기도 하고. 꽤 좋아한다고? 지하철.\n#3;closeup"
1011805-31 = "[s] \"아무래도 비슷한 느낌이지.\""
1011805-32 = "3;노조미;99;사람도 많이 태울 수 있고, 시간표가 있을 만큼 정시성도 좋고.\n#3;closeup\n#3;em;[반짝]"
1011805-33 = "3;노조미;09;개방감이 있어서 멀미도 안 생긴다고.\n#3;closeup"
1011805-34 = "3;노조미;03;파햐햐, 장점 중 대부분은 열차랑 비슷하네!\n#3;closeup\n#3;em;[음표]"
1011805-35 = "3;노조미;14;뭐, 열차와는 다르게 좀 더 작고 번잡하고 금방금방 멈추긴 하지만.\n#3;closeup"
1011805-36 = "3;노조미;08;아무래도 철도가 더 낫지! 안 그래?\n#3;closeup"
1011805-37 = "[s5] \"하지만 지금처럼 노선이 없는 곳도 있잖아.\"\n[s6] \"그럴 때는 지하철이나 버스에 꽤 신세 지고 있지.\""

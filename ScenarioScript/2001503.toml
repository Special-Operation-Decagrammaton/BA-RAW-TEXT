2001503-75 = "#na;TV광고;<세상이 원할 때! 가면 드라이버는 반드시 운전한다!>"
2001503-76 = "#na;TV광고;올해로 기념비적인 <가면 드라이버> 15주년 신 시리즈 개시! 그걸 위한 특별 히어로쇼 개최 예정! 현장에서 직접 <가면 드라이버>를 만나볼 기회! 지금 당장 예매하세요!"

2001503-44 = "#all;hide"
2001503-45 = "[ns] \"카에데, 냉장고에 남아있는 푸딩 말인데.\""
2001503-46 = "3;카에데;07;어?! 냉장고에 있는 푸딩이라면, 오른쪽 맨 위 칸에 있는 <스위트 캬라멜 푸딩>?!\n#3;a\n#3;em;[?!]"
2001503-47 = "3;카에데;14;그거 일부러 남겨둔 건데! 아, 으……. 아, 아니!"
2001503-48 = "3;카에데;14;서, 선생님이…… 어, 어떻게든 먹고 싶다면……. 우, 우으…….\n#3;stiff\n#3;em;[속상함]"

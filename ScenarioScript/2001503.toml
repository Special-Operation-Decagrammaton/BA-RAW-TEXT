[translation]
2001503-1 = "想成為完美淑女！"
2001503-2 = "（在楓的邀請下，我來到修行部的社團教室）"
2001503-3 = "啊，老師！"
2001503-4 = "[s]「你說的『世紀大發現』是什麼呀？」"
2001503-5 = "嗯～首先啊，別看我這樣，我為了成為「完美淑女」，不是每天都有在鍛鍊嗎？"
2001503-6 = "不久前我還把加了青椒丁的咖哩吃乾淨了！"
2001503-7 = "[s]「那真是了不起！」"
2001503-8 = "耶嘿嘿！然後我就在想，還有其他哪些可以做的。"
2001503-9 = "於是我就上網查了一下。"
2001503-10 = "[s1]「原來是這樣。」\n[s2]「果然是現代小孩。」"
2001503-11 = "唉唷～沒那麼了不起啦～反正我就快速查找了一下！"
2001503-12 = "唉唷～沒那麼了不起啦～反正我就快速查找了一下！"
2001503-13 = "網路上說：「完美淑女，面對任何狀況都要不慌不忙，游刃有餘」！"
2001503-14 = "[s]「原來是這樣……？」"
2001503-15 = "不過在這部分，我已經相當有自信了！"
2001503-16 = "遇到任何情況我都不會慌張，畢竟我可是修行部的吉祥物！"
2001503-17 = "於是我查覺到了，難道我……在不知不覺中……！？"
2001503-18 = "[s]「原來如此，所以你說的世紀大發現……」"
2001503-19 = "沒錯，我說不定，早就成為「完美淑女」了！！"
2001503-20 = "[s]「好像有道理？」"
2001503-21 = "但這種事，我一個人也無法證明對吧？"
2001503-22 = "所以我今天才會叫老師來！"
2001503-23 = "所以了老師，你試著讓我驚慌失措吧！我要證明我面對任何情況都不會慌張！"
2001503-24 = "來吧！這是老師和我的決鬥！"
2001503-25 = "[s3]「決鬥……？」\n[s4]「那好吧，我了解了。」"
2001503-26 = "很好！預備……起！"
2001503-27 = "很好！預備……起！"
2001503-29 = "（於是，讓楓驚慌失措的決鬥（？）就這麼開始了）"
2001503-31 = "來吧！要從哪邊攻擊都沒問題！"
2001503-32 = "[s]「其實啊，我今天有帶奶油蛋糕來唷。」"
2001503-33 = "真，真的嗎！？"
2001503-34 = "[s]「我可以把蛋糕上的草莓吃掉嗎？」"
2001503-35 = "嗚！草，草莓……！老師竟然要吃掉，可說是奶油蛋糕最精華部位的草莓……！？"
2001503-36 = "[s5]「開玩笑啦，我把蛋糕放這裡囉。」\n[s6]「你剛才是不是很慌呀……？」"
2001503-37 = "……哈？！才，才沒有！剛剛那個不算啦，那是……"
2001503-38 = "……哈？！才，才沒有！剛剛那個不算啦，那是……"
2001503-39 = "沒錯！我只是擔心老師光吃草莓，會不會吃壞肚子！"
2001503-40 = "我，我一點都，都沒有慌！"
2001503-41 = "再來一次！"
2001503-43 = "（之後我繼續和楓進行十分激烈的心理戰（？））"
2001503-45 = "[ns]「楓，放在冰箱裡的那個布丁啊。」"
2001503-46 = "咦，你說那個「甜蜜焦糖布丁」嗎！？"
2001503-47 = "你，你難道要把它……！？"
2001503-48 = "不過，如果老師不管怎樣都想吃……嗚嗚嗚……！！"
2001503-49 = "[s]「不是，嗯……」"
2001503-51 = "[ns]「楓，這個裝滿好多寶物的盒子，是你的嗎？」"
2001503-52 = "啊啊！！老師，那個拿的時候要小心！裡面裝了非常貴重的東西！"
2001503-53 = "裡面裝著我之前，在小浣熊河邊發現的超光滑石頭！"
2001503-54 = "啊，機會難得，要看看嗎？很不得了喔！我從來沒看過那麼──"
2001503-64 = "[ns]「……目前為止模擬了這麼多情境……」"
2001503-65 = "哼，哼哼……老師的手段也很多呢……"
2001503-66 = "甚至差點就讓我驚慌失措了！當然，頂多就是差點，我完全沒有慌！"
2001503-67 = "[s]「是，是喔……」"
2001503-68 = "總之，經過這次實測……！"
2001503-69 = "終於能夠證明「完美淑女總是不會驚慌」這句話，幾乎也可以適用在我身上了……！"
2001503-70 = "咦啊啊！？"
2001503-71 = "[s]「怎麼了？」"
2001503-72 = "我都忘記今天要播「假面的士」系列的特別直播節目了！"
2001503-73 = "等一下，遙控器……有了！"
2001503-74 = "現在要來告訴電視機前的觀眾朋友們！"
2001503-75 = "「只要世上還有道路！假面的士的車就會繼續開下去！」"
2001503-76 = "今年「假面的士」迎來15週年，終於將推出全新系列！同時也將舉辦實鏡英雄秀！請各位不要錯過，和「假面的士」本人見面的機會！"
2001503-80 = "！！"
2001503-81 = "嗚……"
2001503-82 = "[s] 「……楓？」"
2001503-83 = "哇啊啊啊啊啊！！？！？"
2001503-84 = "老，老師！他說會辦「假面的士」的英雄秀耶！能親眼看到假面的士耶！！"
2001503-85 = "快點！我要快點訂票才行！？"
2001503-86 = "咦啊啊！？"
2001503-87 = "老師！訂票網站完全連不上！？怎麼辦！？"
2001503-88 = "[s]「嗯，手機借我一下。」"
2001503-89 = "謝謝老師！拜託了！最喜歡你了！！"
2001503-96 = "[ns]「距離成為完美淑女還有好長一段路呢……」"
2001503-97 = "……？"

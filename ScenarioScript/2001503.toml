2001503-50 = "#all;hide"
2001503-51 = "[ns] \"카에데가 잔뜩 모은 보물이 담겨 있는 이 철제 상자 말인데.\""
2001503-52 = "3;카에데;07;아앗! 선생님! 그건 조심히 다뤄야 해! 엄청 귀중한 물건이 들어있으니까!\n#3;em;[!]\n#3;a\n#3;hophop"
2001503-53 = "3;카에데;11;바로 요전 번에 렛서팬더 강가에서 발견한 완전 매끈한 조약돌도 들어있거든!"
2001503-54 = "3;카에데;03;아, 모처럼이니까 한번 볼래? 대단하다구? 이제까지 본 적 없을 정도로 매끈한 게-\n#3;em;[반짝]"

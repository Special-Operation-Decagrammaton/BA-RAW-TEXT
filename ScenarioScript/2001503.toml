[translation]
2001503-1 = "ฉันอยากเป็นเลดี้ที่เพียบพร้อม!"
2001503-2 = "(คุณครูมาที่ห้องชมรมฝึกฝนตามคำเชิญของคาเอเดะ)"
2001503-3 = "อ๊ะ คุณครู! เชิญเลย!"
2001503-4 = "[s] \"เจออะไรดีๆ งั้นเหรอ?\""
2001503-5 = "อื้อ คุณครู! เห็นแบบนี้แต่ฉันก็ตั้งใจฝึกฝนเพื่อการเป็นเลดี้ที่เพียบพร้อมนะ"
2001503-6 = "เมื่อไม่นานมานี้ฉันกินพริกหวานจนหมดโดยไม่เหลือได้แล้วนะ!"
2001503-7 = "[s] \"พยายามได้ดีมากเลย คาเอเดะ!\""
2001503-8 = "อ่ะแฮะๆ เพราะงั้นฉันก็เลยคิดหาวิธีใหม่ๆ เพื่อฝึกฝนการเป็นเลดี้ที่เพียบพร้อมน่ะ"
2001503-9 = "แล้วก็ลองหาในอินเทอร์เน็ตดูด้วยนะ"
2001503-10 = "[s1] \"หาวิธีมาจากอินเทอร์เน็ตงั้นเรอะ...!\"\n[s2] \"คาเอเดะก็เป็นคนทันสมัยดีนะเนี่ย!\""
2001503-11 = "อื้มๆ ใช่มั้ยๆ ชมฉันอีกก็ได้นะ~ แต่ฉันก็แค่ลองหาในเน็ตเท่านั้นเอง"
2001503-12 = "อื้มๆ ใช่มั้ยๆ ชมฉันอีกก็ได้นะ~ แต่ฉันก็แค่ลองหาในเน็ตเท่านั้นเอง"
2001503-13 = "เลดี้ที่เพียบพร้อมน่ะ ไม่ว่าในสถานการณ์ไหนก็ต้องไม่ตกใจและเตรียมพร้อมเสมอ..."
2001503-14 = "[s] \"งั้นเหรอ...?\""
2001503-15 = "ฮุฮุฮุ! ถึงจะแปลกใจแต่มันก็เป็นแบบนั้น ฉันมั่นใจเรื่องนั้นนะ!"
2001503-16 = "มาสคอตแห่งชมรมฝึกฝนที่คงความสุขุมไว้และไม่ตื่นตระหนกไม่ว่าจะเกิดอะไรขึ้น ฉันเองนี่ไง คุณครู!"
2001503-17 = "หา?! โธ่เอ๊ย หรือว่า... คุณครูไม่เคยสังเกตเห็นเลยเหรอ?!"
2001503-18 = "[s] \"ถ้างั้นการค้นพบยิ่งใหญ่ที่คาเอเดะพูดถึง...\""
2001503-19 = "ใช่แล้ว! คุณครู! ฉันอาจได้เป็นเลดี้ที่เพียบพร้อมเลยก็ได้นะ!"
2001503-20 = "[s] \"ว่าแล้วเชียว ต้องพูดแบบนี้!\""
2001503-21 = "แต่ว่าเรื่องนี้น่ะ แค่ฉันพูดคนเดียวก็พิสูจน์หรือรับรองอะไรไม่ได้หรอก"
2001503-22 = "เพราะงั้นวันนี้ฉันเลยเรียกคุณครูมา เพื่อแสดงให้เห็นว่าฉันได้กลายเป็นเลดี้ที่เพียบพร้อมแล้วไงล่ะ!"
2001503-23 = "เอ้า! คุณครู! ลองทำให้ฉันตกใจหน่อยสิ! ฉันจะแสดงให้ดูเองว่าเลดี้ที่เพียบพร้อมน่ะ ไม่ว่าในสถานการณ์ไหนก็ไม่ตกใจหรอก!   "
2001503-24 = "นั่นคือการแข่งขันแพ้ชนะตัวต่อตัวระหว่างฉันกับคุณครูไงล่ะ!"
2001503-25 = "[s3] \"ตัดสินแพ้ชนะ...?\"\n[s4] \"น่าสนุกดีนะ ดีละ! มาดวลกัน!\""
2001503-26 = "อื้อ ลุย-เลย!"
2001503-27 = "อื้อ ลุย-เลย!"
2001503-29 = "(จากนั้นการแข่งขันแพ้ชนะเพื่อทำให้คาเอเดะตกใจ(??) ก็ได้เริ่มขึ้น...)"
2001503-31 = "เอ้า! คุณครู! จะแข่งแบบไหนก็ว่ามาได้เลย! รับรองว่าฉันจะไม่ตกใจเด็ดขาด!   "
2001503-32 = "[s] \"คาเอเดะ วันนี้ครูเอาชอร์ตเค้กสตรอว์เบอร์รี่มาด้วยนะ\""
2001503-33 = "ว่าไงนะ! คุณครูเอาของแบบนั้นมาด้วยเหรอ?!"
2001503-34 = "[s] \"น่าเสียดายแต่ว่าครูกินสตรอว์เบอร์รี่ที่อยู่บนเค้กไปแล้ว\""
2001503-35 = "สะ...สตรอว์เบอร์รี่...? นะ...นั่นมัน...เป็นของสำคัญของชอร์ตเค้กเลยนะ..."
2001503-36 = "[s5] \"ล้อเล่นน่า ครูจะวางเค้กไว้ตรงนี้นะ\"\n[s6] \"คาเอเดะ... เมื่อกี้ตกใจใช่มั้ย?\""
2001503-37 = "ฉันคิดว่าคุณครูกินสตรอว์เบอร์รี่ไปคนเดียว... ก็เลย..."
2001503-38 = "หา?! ปะ...เปล่านะ! คะ...คุณครูกินสตรอว์เบอร์รี่ไปคนเดียวเลยก็ได้..."
2001503-39 = "ใช่แล้ว! ฉันแค่เป็นห่วงว่าคุณครูจะท้องเสียรึเปล่า! กะ...ก็แค่นั้น!"
2001503-40 = "ฉันไม่ได้ตกใจอะไรเลยสักนิดเดียว!"
2001503-41 = "เอ้า! ต่อไป ข้ามไปเรื่องต่อไปได้เลย!"
2001503-43 = "(หลังจากนั้นการแข่งขันอันดุเดือด(??) ก็ดำเนินต่อไป)"
2001503-45 = "[ns] \"คาเอเดะ พุดดิ้งที่เหลืออยู่ในตู้เย็นน่ะ...\""
2001503-46 = "หาาา?! พุดดิ้งที่อยู่ในตู้เย็น... หมายถึง <สวีต คาราเมล พุดดิ้ง> ที่อยู่บนชั้นด้านขวาบนสุดรึเปล่า?"
2001503-47 = "ฉันตั้งใจเหลือเก็บไว้เลยนะ! มะ...ไม่นะ!!"
2001503-48 = "ตะ...แต่ถ้าคุณครูบอกว่าอยากกินละก็... ฮะ...ฮือออออ..."
2001503-49 = "[s] \"อะ...อื้อ\""
2001503-51 = "[ns] \"กล่องที่คาเอเดะเก็บสมบัติเอาไว้เยอะแยะใบนี้น่ะ...\""
2001503-52 = "อ๊าาาา! คุณครู! จับระวังๆ หน่อยนะ ข้างในมีแต่ของสำคัญหายากๆ ทั้งนั้นเลย!"
2001503-53 = "มีก้อนกรวดที่เรียบเนียนสุดๆ ที่ฉันเก็บมาได้จากริมแม่น้ำเรดแพนด้าด้วยนะ!"
2001503-54 = "อา... คุณครูอยากลองดูหน่อยมั้ย? มันสุดยอดมากเลยนะ? ก้อนกรวดเรียบเนียนสวยงามที่หาดูได้#nยากมากๆ..."
2001503-64 = "[ns] \"ครูว่าเท่านี้ก็พอแล้วล่ะ...\""
2001503-65 = "ฮู่วว... ฮู่วว... อื้มมม! สุดยอด! สมกับเป็นคุณครูจริงๆ!"
2001503-66 = "เกือบทำให้ฉันตกใจได้แบบนี้! อ๊ะ แต่ว่าฉันไม่ตกใจหรอกนะ!"
2001503-67 = "[s] \"ไม่ตกใจแต่ก็แพ้เนี่ยนะ...\""
2001503-68 = "ยังไงก็เถอะ เลดี้ที่เพียบพร้อมน่ะไม่หวั่นไหวง่ายๆ...หรอก...นะ! "
2001503-69 = "ผลลัพธ์การทดลองวันนี้! คิดไว้ไม่มีผิดเลยละคุณครู! ฉันอาจจะกลายเป็นเลดี้ที่เพียบพร้อมไปแล้ว#nก็ได้นะ...! อ่ะแฮ่ม!"
2001503-70 = "หืม? อ๊ะ เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย!"
2001503-71 = "[s] \"ทำไมเหรอ คาเอเดะ? มีอะไรรึเปล่า?\""
2001503-72 = "อ๋อ อื้อ! วันนี้จะมีฉายตอนพิเศษของซีรีส์ <หน้ากากไดร์เวอร์> ในช่องทีวีน่ะสิ!"
2001503-73 = "ย้ากกก!"
2001503-74 = "เหล่าไดร์เวอร์ที่อยู่หน้าทีวีทั้งหลาย!"
2001503-75 = "<เมื่อโลกต้องการ... หน้ากากไดร์เวอร์ก็จะไปหาแน่นอน!>"
2001503-76 = "ถือเป็นการเริ่มต้นอย่างยิ่งใหญ่ฉลองครบรอบ 15 ปีของซีรีส์ <หน้ากากไดร์เวอร์>! การแสดงโชว์ฮีโร่#nจะเริ่มขึ้นในเร็วๆ นี้! โอกาสทองในการได้พบกับ <หน้ากากไดร์เวอร์> ตัวจริงเสียงจริง! จองตั๋วได้แล้ว#nวันนี้...! "
2001503-80 = "!!"
2001503-81 = "วะ..."
2001503-82 = "[s] \"วะ...?\""
2001503-83 = "ว้าากกกกกก!!"
2001503-84 = "คะ... คุณครู! เขาบอกว่าจะจัดโชว์พิเศษของ <หน้ากากไดร์เวอร์> ด้วยละ! แถมจะได้เจอหน้ากาก#nไดร์เวอร์ตัวเป็นๆ อีกด้วย! "
2001503-85 = "จอง... ต้องรีบจองตั๋วแล้ว!"
2001503-86 = "...!"
2001503-87 = "ห๊าาา?! คะ... คุณครู! เว็บจองออนไลน์ล่มไปแล้ว! ทำยังไงดี?!"
2001503-88 = "[s] \"อื้อ รอเดี๋ยวนะ เดี๋ยวครูลองจองให้\""
2001503-89 = "อ๊ะ ขอบคุณนะ คุณครู! ดีจังเลย!"
2001503-96 = "[ns] \"นั่นสินะ... เส้นทางสู่การเป็นเลดี้นี่ยากจริงๆ...\""
2001503-97 = "หืม?"

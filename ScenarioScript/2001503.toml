[translation]
2001503-1 = "#title;멋진 레이디가 되고 싶어!"
2001503-2 = "#na;(카에데의 초대를 받아, 수행부의 부실을 방문했다.)"
2001503-3 = "3;카에데;00;앗! 선생님! 어서 와!\n#3;a\n#3;em;[반응]"
2001503-4 = "[s] \"그래서 좋은 걸 발견했다니 뭐야?\""
2001503-5 = "3;카에데;11;응! 선생님! 나, 이래 봬도 매일 같이 멋진 레이디가 되기 위해 단련에 단련을 거듭하고 있잖아?"
2001503-6 = "3;카에데;11;얼마 전엔 카레에서 피망을 남기지 않고 다 먹는 데 성공했고!\n#3;hophop"
2001503-7 = "[s] \"카에데, 노력했구나!\""
2001503-8 = "3;카에데;03;에헤헷! 그래서 이번엔 또 멋진 레이디가 되기 위해 새로운 방법이 뭐 없을까 고민하다가.\n#3;em;[재잘]"
2001503-9 = "3;카에데;00;마침 생각난 김에 인터넷으로 검색해봤거든."
2001503-10 = "[s1] \"과연, 인터넷 검색인가……!\"\n[s2] \"카에데는 요즘 아이구나!\""
2001503-11 = "3;카에데;11;응~ 그치? 좀 더 칭찬해도 좋다구~? 하여간 그렇게 검색해봤더니 말이야~!\n#3;em;[반짝]\n#3;hophop"
2001503-12 = "3;카에데;11;응~ 그치? 좀 더 칭찬해도 좋다구~? 하여간 그렇게 검색해봤더니 말이야~!\n#3;em;[반짝]\n#3;hophop"
2001503-13 = "3;카에데;00;멋진 레이디란, 그 어떤 상황에서도 당황하지 않고 여유를 가진 사람을 말하는 거라지. 뭐야?!"
2001503-14 = "[s] \"그런……가?\""
2001503-15 = "3;카에데;09;후! 후! 후! 그런데 놀랍게도 마침! 나! 그런 거에 엄청 자신 있거든!"
2001503-16 = "3;카에데;03;어떤 상황에서도 당황하지 않고 평정을 유지하는 수행부의 마스코트! 그게 바로 나야! 선생님!\n#3;hophop"
2001503-17 = "3;카에데;07;핫?! 그렇다는 건 설마……… 나, 눈치채지 못한 사이에 이미?!\n#3;em;[?!]\n#3;shake"
2001503-18 = "[s] \"그럼 카에데가 말했던 세기의 대발견이라는 게…….\""
2001503-19 = "3;카에데;11;맞아! 선생님! 난 이미 멋진 레이디가 된 걸지도 몰라!\n#3;em;[반응]"
2001503-20 = "[s] \"과연! 그런 결론이란 말이지!\""
2001503-21 = "3;카에데;00;하지만 역시 이런 건, 나 혼자서 말해봐야 증명할 수 없는 거잖아?"
2001503-22 = "3;카에데;03;그래서 오늘 이렇게 선생님을 부른 건, 내가 그 멋진 레이디가 되었다는 걸 보여주기 위해서야!\n#3;em;[재잘]\n#3;hophop"
2001503-23 = "3;카에데;00;자! 선생님! 날 당황하게 해봐! 어떤 상황에서도 당황하지 않는 멋진 레이디의 모습을 보여줄게!"
2001503-24 = "3;카에데;00;선생님과 나의 일대 승부야!\n#3;em;[!]"
2001503-25 = "[s3] \"승부……?\"\n[s4] \"재밌어 보이니까. 좋아! 승부다!\""
2001503-26 = "3;카에데;11;응! 렛츠- 고!\n#3;em;[재잘]\n#3;closeup"
2001503-27 = "3;카에데;11;응! 렛츠- 고!\n#3;em;[재잘]\n#3;closeup"
2001503-28 = "#all;hide"
2001503-29 = "#na;(그리하여 카에데를 당황하게 만들기 위한 승부(?)가 시작되었다.)"
2001503-30 = "#all;hide"
2001503-31 = "3;카에데;00;자! 선생님! 얼마든지 도전해도 좋아! 나- 절대로 당황하지 않을 거니까!\n#3;a\n#3;em;[반응]"
2001503-32 = "[s] \"그럼 카에데, 오늘 선물로 가져온 딸기 쇼트케이크 말인데.\""
2001503-33 = "3;카에데;07;뭐?! 선생님! 그런 걸 가져왔던 거야?!\n#3;em;[?!]\n#3;shake"
2001503-34 = "[s] \"아쉽지만, 케이크 위에 놓인 딸기는 내가 먹을게.\""
2001503-35 = "3;카에데;04;따, 딸기……? 그, 그건……. 어, 엄청 중요한……… 쇼트케이크의 꽃……\n#3;stiff\n#3;em;…"
2001503-36 = "[s5] \"농담이야. 케이크는 여기에 둘게.\"\n[s6] \"하지만 카에데. 지금 당황했지?\""
2001503-37 = "3;카에데;10;……핫?! 아, 아냐! 그냥! 응! 그냥! 선생님 혼자 딸기를 다 먹어버리면 그…….\n#3;stiff\n#3;em;[땀]"
2001503-38 = "3;카에데;10;……핫?! 아, 아냐! 그냥! 응! 그냥! 선생님 혼자 딸기를 다 먹어버리면 그…….\n#3;stiff\n#3;em;[땀]"
2001503-39 = "3;카에데;03;맞아! 혹시 배탈이 나지 않을까 걱정했을 뿐이니까!\n#3;hophop"
2001503-40 = "3;카에데;13;하나도 당황, 안 했으니까!"
2001503-41 = "3;카에데;00;자! 다음! 다음이야!\n#3;hophop"

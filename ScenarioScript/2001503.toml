2001503-66 = "3;카에데;07;아슬아슬하게 날 당황하게 만들 뻔했네! 물론 전혀 안 통했지만!\n#3;hophop"
2001503-67 = "[s] \"과연 안 통한 거로 치는 거구나…….\""
2001503-68 = "3;카에데;00;어쨌거나 멋진 레이디는 당황하지 않는다! 라는 설……!\n#3;em;…"
2001503-69 = "3;카에데;03;오늘 실험해본 결과! 역시 선생님! 나는 나도 모르는 새에 멋진 레이디가 되어버린 걸지도 모르겠어……! 엣-헴!\n#3;closeup"
2001503-70 = "3;카에데;02;응? 앗! 벌써 시간이 이렇게!\n#3;em;[?!]\n#3;closeup"
2001503-71 = "[s] \"왜 그래? 카에데? 무슨 일 있어?\""
2001503-72 = "3;카에데;00;아, 응! 오늘 저녁에 TV에서 <가면 드라이버> 시리즈의 특별방송이 있다고 했거든!"

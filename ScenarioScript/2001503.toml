[translation]
2001503-1 = "I Wanna Be a Proper Lady!"
2001503-2 = "I made my way to the Inner Discipline Club's club room at Kaede invitation."
2001503-3 = "Oh, Sensei! Welcome!"
2001503-4 = "[s] \"So what were you so excited to find out?\""
2001503-5 = "Sensei! You know how hard I'm training to become a proper lady, right?"
2001503-6 = "The other day, I successfully ate all the green peppers in my curry!"
2001503-7 = "[s] \"Nicely done.\""
2001503-8 = "I've been thinking about what else I can do to accomplish my goal."
2001503-9 = "So I searched the internet."
2001503-10 = "[s1] \"Good thinking. You can find anything on the internet.\"\n[s2] \"I didn't realize you were so tech savvy, Kaede.\""
2001503-11 = "I know, right? Aren't I smart...? Anyway, I found some good stuff."
2001503-12 = "I know, right? Aren't I smart...? Anyway, I found some good stuff."
2001503-13 = "Including an article that said a proper lady always keeps her cool in ALL situations."
2001503-14 = "[s] \"You...don't say.\""
2001503-15 = "And you know what? I'm already really good at that!"
2001503-16 = "I'm the mascot of the Inner Discipline Club who never gets flustered in any situation. That's me, Sensei!"
2001503-17 = "Whoa?! Does this mean that...? Have I already...?"
2001503-18 = "[s] \"So this great discovery you were referring to was...\""
2001503-19 = "Right, Sensei! Maybe I've already become a proper lady!"
2001503-20 = "[s] \"That would be quite the conclusion!\""
2001503-21 = "But I can't prove it alone, you know?"
2001503-22 = "I asked you to come today so I could show you I've become a proper lady!"
2001503-23 = "Go ahead, Sensei. Try to fluster me! I'll show you how a proper lady handles the situation!"
2001503-24 = "This is a one-on-one duel between you and me!"
2001503-25 = "[s3] \"I think you're being a little dramatic...\"\n[s4] \"Okay, you're on. Then it's a duel!\""
2001503-26 = "Come on—let's go!"
2001503-27 = "Come on—let's go!"
2001503-29 = "And so, the duel to fluster Kaede began."
2001503-31 = "Come at me with everything you've got, Sensei! I'm unflappable!"
2001503-32 = "[s] \"You asked for it. So...about the strawberry shortcake I brought today...\""
2001503-33 = "You brought cake?! Why didn't you say so?!"
2001503-34 = "[s] \"Sorry, but I'll be eating all the strawberries on the cake myself.\""
2001503-35 = "B-But everyone knows that the strawberries are the centerpiece...of the shortcake..."
2001503-36 = "[s5] \"Got you. And I was just kidding, by the way. Here, have some.\"\n[s6] \"Looks like it's Sensei: one—Kaede: zero.\""
2001503-37 = "N-No, wait! I just thinking that...if you ate all the strawberries, then...!"
2001503-38 = "N-No, wait! I just thinking that...if you ate all the strawberries, then...!"
2001503-39 = "Y-Yeah! I was just worried you'd get a stomachache, that's all."
2001503-40 = "I wasn't flustered one bit!"
2001503-41 = "Okay, let's move on to the next one!"
2001503-43 = "After that, the fierce psychological warfare with Kaede continued."
2001503-45 = "[ns] \"Kaede, about the pudding in the refrigerator...\""
2001503-46 = "Huh? You mean the sweet caramel pudding on the top shelf?"
2001503-47 = "I was saving that! U-Ugh... W-Well!"
2001503-48 = "I-If you really want to eat it, then... Ugh..."
2001503-49 = "[s] \"Y-Yeah...\""
2001503-51 = "[ns] \"About this steel chest containing all of your treasures...\""
2001503-52 = "Oh! Sensei! You have to handle that with care! It contains a lot of precious things!"
2001503-53 = "There's a super smooth pebble that I found in the Red Panda River the other day!"
2001503-54 = "Oh, do you wanna take a look? I've never seen anything so smooth..."
2001503-64 = "[ns] \"I think that's enough.\""
2001503-65 = "*pant* *pant* Hmph! That was pretty amazing, Sensei!"
2001503-66 = "You almost got me flustered! It didn't work at all, though!"
2001503-67 = "[s] \"So you still think you weren't flustered...\""
2001503-68 = "A proper lady always keeps her cool!"
2001503-69 = "Based on today's experiment, it looks like I've already become a proper lady...#nSo be it!"
2001503-70 = "Oh, look at the time. Today really flew by, didn't it?"
2001503-71 = "[s] \"Yeah. Was there something else you have to do?\""
2001503-72 = "Yeah! There's a special broadcast of the Masked Driver series tonight!"
2001503-73 = "Ya!"
2001503-74 = "\"Listen up, all you drivers in front of the TV!\""
2001503-75 = "\"Wherever you are in the world, the Masked Driver will be there!\""
2001503-76 = "This year marks the 15th anniversary of the monumental Masked Driver series!#nA special hero show will be held to celebrate the brand new episodes!#nMeet the Masked Driver in person! Get your tickets now!"
2001503-80 = "...!"
2001503-81 = "I..."
2001503-82 = "[s] \"Huh?\""
2001503-83 = "AHHHHHH!!!"
2001503-84 = "S-SENSEI! I GET TO MEET THE MASKED DRIVER IN PERSON!"
2001503-85 = "Ticket! I need to buy a ticket!"
2001503-86 = "...!"
2001503-87 = "What?! S-Sensei, the online ticketing site is down! What should I do?!"
2001503-88 = "[s] \"Um, wait here. I'll get you one.\""
2001503-89 = "Yay! Thank you, Sensei! You're the best!"
2001503-96 = "[ns] \"The road to becoming a lady seems like a long one.\""
2001503-97 = "Huh?"

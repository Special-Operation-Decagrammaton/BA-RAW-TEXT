[translation]
2600306-1 = "在他的手心"
2600306-2 = "（做好了萬全的準備，來到了公園）"
2600306-3 = "（走向公園沒什麼人影的角落，把帶來的東西排好）"
2600306-4 = "（接下來就……）"
2600306-8 = "[ns1] 「嗚，好痛，好難受，快死掉了……」\n[ns2] 「唔！肚子好痛好痛啊！」"
2600306-13 = "……咻。"
2600306-15 = "唰唰唰唰，咻咻咻咻咻……！"
2600306-21 = "你怎麼了嗎，老師！"
2600306-22 = "又亂來了嗎……！？"
2600306-23 = "但是不用擔心！"
2600306-24 = "我不論何時何地都會……！"
2600306-28 = "……？"
2600306-29 = "……老師？"
2600306-30 = "[s3] 「作戰成功！」\n[s4] 「抱歉，嚇到你了嗎？」"
2600306-31 = "咦……？這，這是怎麼回事……？"
2600306-32 = "咦……？這，這是怎麼回事……？"
2600306-33 = "野餐墊、三明治還有果汁……"
2600306-34 = "老師，這是什麼？你不是不舒服嗎……？"
2600306-35 = "……嗯？"
2600306-36 = "總之先坐下來……是嗎？"
2600306-37 = "啊，是，那就……"
2600306-42 = "……咦？什麼？"
2600306-43 = "……是為了我準備的？"
2600306-44 = "這，這些全部都是……？"
2600306-45 = "為，為什麼呢……！？"
2600306-46 = "這麼突然……？"
2600306-47 = "[s5] 「因為總是受你的照顧嘛。」\n[s6] 「因為芹奈總是為了大家很辛苦嘛。」"
2600306-51 = "……呃。"
2600306-52 = "抱歉，那個……"
2600306-53 = "這種時候該，嗯……"
2600306-57 = "……哼哼。"
2600306-58 = "呵呵呵，啊哈哈……！"
2600306-59 = "[s] 「芹，芹奈？」"
2600306-60 = "……呵呵，不好意思。"
2600306-69 = "― 真是的，老師……[wa:2000] "
2600306-71 = "― 真的是，嚇了一跳……[wa:1120] "
2600306-74 = "― ……感覺真不可思議。[wa:680] "
2600306-76 = "― 我是第一次遇到這種事，"
2600306-79 = "― 總覺得有些不知所措……[wa:2180] "
2600306-82 = "― 真的是……[wa:760] "
2600306-84 = "― ……這樣的人，我還是第一次遇到。[wa:2200] "
2600306-87 = "― 對不起，我有點混亂……[wa:2480] "
2600306-89 = "― 非常感謝，我很開心……！[wa:3100] "
2600306-92 = "― ……託老師的福。[wa:660] "
2600306-94 = "― ……是託老師的福，才有這種心情哦。[wa:2520] "
2600306-97 = "（之後，和芹奈一邊開心的聊天一邊吃東西）"
2600306-98 = "（回去的時候，芹奈也咻的一下就不知去向了。關於這點，或許什麼都不知道也是好事吧）"
2600306-103 = "芹奈，之後也會隨時隨地出現的唷！"

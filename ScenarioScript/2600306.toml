[translation]
2600306-1 = "ในที่สุดก็จับได้แล้ว!"
2600306-2 = "(คุณครูเตรียมของสำหรับไปปิกนิกและออกมาที่สวนสาธารณะ)"
2600306-3 = "(คุณครูเลือกมุมที่ไม่ค่อยมีคนพลุกพล่านในสวน และหยิบของที่เตรียมไว้ออกมา)"
2600306-4 = "(ตอนนี้เหลือเพียงอย่างเดียว...)"
2600306-8 = "[ns1] \"อา... เหนื่อยจังเลย เหมือนจะตายเลย~\"\n[ns2] \"อึ่ก! จะ...จู่ๆ ดันปวดท้องซะได้~!\""
2600306-13 = "ครืด...!"
2600306-15 = "ครืด...! พรึ่บ...!!"
2600306-21 = "มีอะไรเหรอคะคุณครู?!"
2600306-22 = "สุขภาพไม่ดีอีกแล้วสินะคะ!?"
2600306-23 = "แต่ไม่เป็นไรหรอกค่ะ เพราะเซรินะอยู่ที่นี่แล้วค่ะ!"
2600306-24 = "ตั้งแต่นี้ไปฉันจะคอยช่วย..."
2600306-28 = "...?"
2600306-29 = "คุณครู...?"
2600306-30 = "[s3] \"หึหึ โดนจับได้อีกแล้วสินะ!\"\n[s4] \"ขอโทษนะ ตกใจรึเปล่า?\""
2600306-31 = "เอ๋...? นะ...นี่มัน เกิดอะไรขึ้นกันแน่คะ?"
2600306-32 = "เอ๋...? นะ...นี่มัน เกิดอะไรขึ้นกันแน่คะ?"
2600306-33 = "ที่ด้านหลังคุณครูมีทั้งแซนด์วิช กับน้ำผลไม้ด้วย...?"
2600306-34 = "คุณครูคะ? นี่มันอะไรกันคะ? ไม่ได้ป่วยเหรอคะ?"
2600306-35 = "คะ...?"
2600306-36 = "ให้ฉันนั่งข้างๆ คุณครูก่อนเหรอคะ?"
2600306-37 = "เอ่อ... ค่ะ ถ้างั้น..."
2600306-42 = "หืม...? อะไรนะคะ?"
2600306-43 = "ฉันเหรอคะ...?"
2600306-44 = "คุณครูเตรียมของพวกนี้มาเพื่อฉันเหรอคะ? ทั้งหมดนี่...เลยเหรอ?"
2600306-45 = "ทะ...ทำไมคะ...!? เพราะอะไรคะ?!"
2600306-46 = "ทำไมจู่ๆ ถึงได้เตรียมให้ฉันล่ะคะ...?"
2600306-47 = "[s5] \"เพราะเธอช่วยเหลือครูมาตลอดไงล่ะ\"\n[s6] \"เพราะเซรินะเอาแต่คอยดูแลคนอื่นตลอดไงล่ะ\""
2600306-51 = "เอ่อ..."
2600306-52 = "เอ่อ... เรื่องนั้นคือว่า... คือว่ามัน..."
2600306-53 = "คือว่า..."
2600306-57 = "พรืดดด..."
2600306-58 = "ฮิฮิ ฮิฮิฮิ...!"
2600306-59 = "[s] \"เซรินะ?\""
2600306-60 = "อา... ขอโทษด้วยค่ะ"
2600306-69 = "― จริงๆ เลยนะคะ คุณครูเนี่ย...[wa:1200] "
2600306-71 = "― ตกใจจนพูดอะไรไม่ออกเลยละค่ะ[wa:440] "
2600306-74 = "― เพิ่งเคยรู้สึกแบบนี้เลยค่ะ[wa:40] "
2600306-76 = "― ฉันเพิ่งเคยได้รับอะไรแบบนี้ครั้งแรก "
2600306-79 = "― ต้องบอกว่า... รู้สึกตกใจนิดหน่อยละมั้ง...[wa:980] "
2600306-82 = "― จริงๆ เลย...[wa:480] "
2600306-84 = "― เพิ่งเคยเจอคนแบบนี้ เป็นครั้งแรกเลยค่ะ[wa:1320] "
2600306-87 = "― ขอโทษด้วยนะคะ เมื่อกี้... ฉันยังไม่ค่อยมีสติเท่าไร...[wa:800] "
2600306-89 = "― ขอบคุณค่ะ ฉัน... ดีใจมากๆ เลยค่ะ![wa:2260] "
2600306-92 = "― เพราะคุณครูเลยนะคะ...[wa:140] "
2600306-94 = "― ฉันรู้สึกแบบนี้... เพราะคุณครูเลยค่ะ[wa:1760] "
2600306-97 = "(หลังจากนั้น คุณครูก็นั่งคุยกับเซรินะอย่างสนุกสนาน พร้อมกับกินขนมที่เธอเตรียมมา...)"
2600306-98 = "(จนเซรินะกลับไปแล้ว คุณครูก็ไม่ได้ถามว่าเธอมาที่นี่ได้ยังไงเลย)"
2600306-103 = "ไม่ว่าที่ไหนเมื่อไรก็ต้อง 'เซรินะ'"

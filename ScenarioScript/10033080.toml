10033080-9 = "4;우미카;03;'진짜' 신목제가 개최되는 시기에는, 백귀야행 각지로부터 크고 작은 가마를 조립해, 그 가마들을 신목제 광장까지 운반해 온답니다!\n#4;m3\n#3;dl\n#4;greeting\n#4;em;[반짝]"

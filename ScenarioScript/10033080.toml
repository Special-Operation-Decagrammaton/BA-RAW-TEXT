[translation]
10033080-1 = "第8話;在慶典的中心"
10033080-3 = "神木祭。"
10033080-4 = "這是百鬼夜行的象徵，在那棵巨大的櫻花樹舉行的慶典和儀式！"
10033080-5 = "神木在百鬼夜行的每個地方都可以看到哦！？大家應該都漸漸習慣了吧！？"
10033080-7 = "呼啊啊……簡單來說，就是在神木底下舉行慶典……祈求一切順利……"
10033080-8 = "而神木祭的起源，就是祈求整年豐收的儀式！"
10033080-9 = "在舉行「真正的」神木祭時，#n百鬼夜行各地將會製作大大小小的轎子，接著一起向神木祭廣場聚集！"
10033080-10 = "我們相信──當轎子在百鬼夜行各地巡遊時，將會帶來好的消息和運氣。"
10033080-11 = "而它們所含有的好運，會在神木前舉行的慶典中，跟所有人一起分享！"
10033080-12 = "雖然這次各位參與的神木祭，#n很遺憾地無法展示慶典的前半部分，也就是轎子的組裝及搬運的場景……"
10033080-13 = "不過最具代表性的巨型神轎！"
10033080-18 = "還有在神木祭廣場進行祭祀儀式的過程，都將原汁原味地向各位展示！"
10033080-19 = "尤其是本次負責主持奉獻儀式，擔任巫女角色的就是──！"
10033080-23 = "沒錯！百鬼夜行公認第一的偶像！"
10033080-24 = "知世同學～！"
10033080-25 = "喵～？"
10033080-29 = "哦哦～就是那個轎子嗎……"
10033080-30 = "超大，感覺可以同時容納20個人吧？"
10033080-31 = "聽說轎子在百鬼夜行巡遊的時候，人們真的會爬上去演奏樂器、呼喊口號呢。"
10033080-32 = "雖然現在上頭空空如也，真可惜。"
10033080-36 = "（得在這裡扳回一城）"
10033080-37 = "（神木祭可是這趟修學旅行的最大亮點……）"
10033080-38 = "（只要神木祭的環節好好處理，就能彌補目前為止的所有失誤）"
10033080-39 = "（幸好神木祭的導覽已經順利結束……）"
10033080-40 = "（……而且在神木祭結尾要放的煙火，也為了抓緊行程提前搬過來了……！）"
10033080-47 = "身穿白衣的人們開始圍住轎子了！"
10033080-49 = "他們打算做什麼？#n啊哈……原來是要打開轎子的頂部啊。"
10033080-50 = "剛才說過裡面有個小木箱對吧？裝著好運氣的那個。"
10033080-51 = "聽說在巫女碰觸之前，絕對不能打開箱子哦！#n否則一整年的厄運就會全部降臨在他身上。"
10033080-52 = "要是厄運降臨會怎樣？"
10033080-53 = "比如說……#n每次開門都會踢到腳趾、走路永遠會踩到小小的塑膠玩具，或是很容易中暑之類的？"
10033080-54 = "太沒人性了！百鬼夜行，真可怕！"
10033080-55 = "好，就用火來淨化厄運吧！上啊，燃燒彈！"
10033080-56 = "為什麼要往我這裡丟啊！"
10033080-59 = "如各位所見，我們在搬運箱子時，會盡可能地避免直接接觸。"
10033080-60 = "而是會用乾淨的白布包裹箱子，以竹子做成的搬運臺將其搬運到舞臺上方。"
10033080-61 = "接著為了避免好運消散，必須不停以笛子演奏的樂聲將其迷惑住。"
10033080-66 = "雖然不是很清楚，總之需要音樂對吧？要不要來唱個校歌？"
10033080-67 = "你還記得我們的校歌是什麼嗎？"
10033080-68 = "仔細想想我也不記得了。#n話說我們有校歌嗎？"
10033080-69 = "還好你也是。我還以為只有我沒印象咧。"
10033080-71 = "嗯……如果問十個路過的小孩，八成也全都會說不知道吧……"
10033080-74 = "唔嗯……時間應該差不多了……？"
10033080-82 = "嗯？好像突然開始有花瓣飄下來了？"
10033080-83 = "啊！是從神木上飄下來的！"
10033080-87 = "沒錯～！傳說當好運降臨百鬼夜行之時！神木將會撒下花瓣加以慶祝！"
10033080-88 = "也許是因為這個關係，每當箱子抵達廣場的時候，花瓣總是會像這樣飛舞哦！#n很厲害吧？"
10033080-90 = "其實是負責慶典的學生們偷偷撒的就是了……"
10033080-94 = "就在這個時候！擔任巫女的知世大人現身了！"
10033080-97 = "依循道路，曲曲折折，來至此處。"
10033080-101 = "哦哦！知世大人正緩緩地走向舞台！"
10033080-102 = "厄運消散，擁抱好運，緊握手中。"
10033080-103 = "現在各位所聽到的詩歌，也是奉獻儀式的一部分！#n這首歌會在巫女登上祭壇時驅除厄運、祈求福氣！"
10033080-104 = "花朵綻放，春風吹拂，登上山丘。"
10033080-108 = "在巫女登上祭壇之後……！將會在祭壇垂掛長長的紙垂！"
10033080-113 = "哦……？巫女手裡好像拿著什麼？是把紙張貼在木棒上嗎？"
10033080-114 = "這是一種叫做「御幣」的祭禮道具。#n能夠淨化厄運，驅除不祥的氣息哦！"
10033080-115 = "只要在箱子上揮舞御幣，接著以「神木祭之舞」祈求好運到來──"
10033080-116 = "虛假的神木祭到此為止！"
10033080-117 = "！？"
10033080-118 = "咦咦！？"
10033080-119 = "怎麼回事！！"
10033080-120 = "哦……？"

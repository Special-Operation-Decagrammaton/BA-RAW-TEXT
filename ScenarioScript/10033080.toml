[translation]
10033080-1 = "ตอนที่ 8;ณ ใจกลางงานเทศกาล"
10033080-3 = "งานต้นไม้ศักดิ์สิทธิ์"
10033080-4 = "สิ่งนี้ก็คือ! พิธีการและเทศกาลที่จัดขึ้น ณ ต้นซากุระยักษ์ที่เปรียบดังสัญลักษณ์ของเฮียกคิยาโคค่ะ!"
10033080-5 = "ต้นไม้ศักดิ์สิทธิ์เห็นได้จากทุกที่ในเฮียกคิยาโคเลยนะจะบอกให้! ทุกคนเห็นกันจนชินตาแล้วใช่มั้ย?!"
10033080-7 = "ฮ้าววว... ถ้าพูดง่ายๆ ก็คือ ในงานนี้เราจะไหว้ต้นไม้ศักดิ์สิทธิ์... และขอพรให้กิจการงานทุกอย่าง#nราบรื่นน่ะ..."
10033080-8 = "การขอพรในงานต้นไม้ศักดิ์สิทธิ์เริ่มมาจากพิธีขอให้มีการเก็บเกี่ยวที่อุดมสมบูรณ์ตลอดทั้งปีค่ะ!"
10033080-9 = "ในช่วงที่มีการจัดงานต้นไม้ศักดิ์สิทธิ์ 'จริงๆ' ในแต่ละพื้นที่ของเฮียกคิยาโคจะทำเกี้ยวหลายๆ ขนาด#nขึ้นมา แล้วขนมาที่จัตุรัสงานต้นไม้ศักดิ์สิทธิ์ค่ะ!"
10033080-10 = "นั่นเพราะมีความเชื่อว่าหากแห่เกี้ยวพวกนั้นไปทั่วเฮียกคิยาโค จะเป็นการส่งต่อข่าวดีและพลังงานดีๆ ให้กันค่ะ"
10033080-11 = "และจะมีการเซ่นไหว้พลังงานดีๆ ที่ลานต้นไม้ศักดิ์สิทธิ์แล้วแบ่งปันกับทุกคนค่ะ"
10033080-12 = "น่าเสียดายนะคะที่ในงานต้นไม้ศักดิ์สิทธิ์ครั้งนี้ เราจะไม่ได้เห็นการแห่เกี้ยวที่นับเป็นขั้นตอนแรกของ#nเทศกาลนี้..."
10033080-13 = "แต่เราก็จะได้เห็นเกี้ยวขนาดใหญ่ที่เรียกได้ว่าเป็นตัวแทนของเกี้ยวทุกหลัง!"
10033080-18 = "และได้เห็นพิธีการที่จัตุรัสงานต้นไม้ศักดิ์สิทธิ์ รวมถึงการเซ่นไหว้ประจำงานนี้ได้ค่ะ!"
10033080-19 = "โดยเฉพาะอย่างยิ่งมิโกะที่จะมารับหน้าที่ในพิธีเซ่นไหว้ในครั้งนี้! ซึ่งก็คือ!"
10033080-23 = "ใช่แล้วค่ะ! อีกหนึ่งไอดอลคนดังของเฮียกคิยาโค!"
10033080-24 = "คุณชิเซะนั่นเองค่ะ~!"
10033080-25 = "เมี๊ยว~?"
10033080-29 = "โอ้ว~ นั่นน่ะเหรอเกี้ยวที่ว่า..."
10033080-30 = "ใหญ่น่าดูเลยแฮะ น่าจะขึ้นไปนั่งได้สัก 20 คนเลยนะ?"
10033080-31 = "ตอนที่แห่เกี้ยวไปทั่วเฮียกคิยาโค ได้ยินว่ามีคนขึ้นไปเล่นเครื่องดนตรีบนนั้นแล้วออกคำสั่งอะไรด้วยนะ"
10033080-32 = "แต่ตอนนี้ไม่เห็นมีใครเลย น่าเสียดายจัง"
10033080-36 = "(วันนี้ต้องแก้ตัวให้ได้)"
10033080-37 = "(งานต้นไม้ศักดิ์สิทธิ์เป็นกิจกรรมที่สำคัญที่สุด และถือเป็นไฮไลท์ของการทัศนศึกษาครั้งนี้ด้วย...)"
10033080-38 = "(ถ้างานต้นไม้ศักดิ์สิทธิ์ผ่านไปได้ด้วยดี ก็จะชดเชยให้กับทุกความผิดพลาดของเมื่อวานได้)"
10033080-39 = "(ค่อยยังชั่วหน่อยที่การแนะนำงานต้นไม้ศักดิ์สิทธิ์ผ่านไปอย่างราบรื่นแล้ว...)"
10033080-40 = "(ดอกไม้ไฟที่จะจุดในตอนท้ายของงานก็เตรียมไว้ล่วงหน้าแล้วด้วย...!)"
10033080-47 = "คนที่แต่งกายด้วยชุดสีขาวเริ่มมายืนล้อมรอบเกี้ยวกันแล้ว!"
10033080-49 = "จะทำอะไรกันน่ะ? อ้อ... จะเปิดหลังคาเกี้ยวสินะ"
10033080-50 = "เมื่อกี้บอกว่าในนั้นจะมีลังไม้เล็กๆ ใช่มั้ย? ที่บอกว่ามีพลังงานดีๆ ข้างในน่ะ"
10033080-51 = "เห็นว่าห้ามเปิดลังจนกว่ามิโกะจะได้แตะต้องด้วยนะ! เพราะถ้าไปเปิดเข้า เคราะห์ร้ายทั้งหมดของปี จะตกไปอยู่ที่คนคนนั้นละ!"
10033080-52 = "แล้วคนนั้นจะเป็นยังไงเหรอ?"
10033080-53 = "ก็... นิ้วเท้าคงโดนกระแทกทุกครั้งที่เปิดประตู เดินไปไหนก็เหยียบของเล่นพลาสติกอยู่ตลอด หรือไม่ก็เป็นคนขี้ร้อนขึ้นมาเฉยๆ น่ะ"
10033080-54 = "ต้องเจอเรื่องไม่ดีขนาดนั้นเลยเหรอ! เฮียกคิยาโคนี่น่ากลัวจัง!"
10033080-55 = "ดีละ งั้นมาขจัดเคราะห์ร้ายด้วยไฟกันเถอะ! แบบนี้ต้องเจอระเบิดมือ!"
10033080-56 = "แล้วทำไมถึงขว้างมาที่ฉันล่ะ!"
10033080-59 = "อย่างที่ทุกคนเห็นนะคะ ตอนที่ยกลังไม้ เราต้องไม่ให้มือไปโดนที่ลังเด็ดขาดเลยค่ะ"
10033080-60 = "เราจะใช้ผ้าสะอาดสีขาวคลุมลังไว้ แล้วจะลำเลียงลังขึ้นเวทีด้วยไม้ไผ่ค่ะ"
10033080-61 = "จากนั้นก็จะมีการเป่าขลุ่ยเพื่อให้พลังงานดีๆ เคลิบเคลิ้มไปในเสียงดนตรี จะได้ไม่ล่องลอยไปที่อื่นค่ะ"
10033080-66 = "ถึงจะไม่ค่อยเข้าใจ แต่ก็แปลว่าต้องมีดนตรีใช่มั้ย? ร้องเพลงประจำโรงเรียนกันมั้ย?"
10033080-67 = "เธอจำเนื้อเพลงประจำโรงเรียนได้ด้วยรึไง?"
10033080-68 = "พอคิดดูแล้วก็... จำไม่ได้แฮะ เดี๋ยวนะ โรงเรียนเรามีเพลงรึเปล่านะ?"
10033080-69 = "โล่งอกไปที นึกว่าฉันจะเป็นคนเดียวที่ไม่รู้จักเพลงประจำโรงเรียนซะอีก"
10033080-71 = "อืม... ถ้าลองถามเด็กคนอื่นดู ฉันว่าถาม 10 คนก็ต้องบอกว่าไม่รู้จักทั้ง 10 คนแหละ..."
10033080-74 = "งืม... เหมือนจะเริ่มแล้วสินะ..."
10033080-82 = "หืม? จู่ๆ กลีบดอกไม้ก็ปลิวว่อนเลย?"
10033080-83 = "อ๊ะ! ต้นไม้ศักดิ์สิทธิ์กำลังโปรยกลีบดอกไม้อยู่ละ!"
10033080-87 = "ใช่ค่ะ! ตามตำนานแล้ว เวลาที่โชคดีมาเยือนเฮียกคิยาโค! ต้นไม้ศักดิ์สิทธิ์จะโปรยกลีบดอกไม้ เพื่อแสดงความยินดีกับพลังงานดีๆ พลังงานนั้นค่ะ!"
10033080-88 = "เพราะแบบนี้สินะ... เวลาลังไม้มาถึงที่จัตุรัส กลีบดอกไม้ถึงได้ปลิวไปทั่วแบบนี้เลย! ยอดเยี่ยมไปเลยว่ามั้ย?"
10033080-90 = "แม้ว่าที่จริงเราจะให้นักเรียนคนอื่นไปแอบโปรยกลีบดอกไม้อยู่ก็เถอะ..."
10033080-94 = "และแล้วก็ถึงเวลาของคุณชิเซะที่รับหน้าที่เป็นมิโกะในวันนี้แล้วค่ะ!"
10033080-97 = "เดินมาตามทาง ย่างมาตามโค้ง..."
10033080-101 = "ค่ะ! ตอนนี้คุณชิเซะกำลังค่อยๆ เดินขึ้นเวทีอยู่ค่ะ!"
10033080-102 = "สิ่งร้ายอันตรธาน โชคดีแผ่ซ่าน แด่ทุกผู้คน..."
10033080-103 = "การเอ่ยบทกลอนที่ได้ยินกันอยู่ตอนนี้เป็นหนึ่งในขั้นตอนของพิธีเซ่นไหว้ และยังเป็นบทเพลงที่มิโกะ#nร้องเพื่อขับไล่โชคร้าย และอธิษฐานขอให้มีแต่โชคดีค่ะ!"
10033080-104 = "ดอกไม้เบ่งบาน ลมพัดผ่านจากทิศใต้ ขึ้นไปบนเนินเขา..."
10033080-108 = "และเมื่อมิโกะไปถึงแท่นบูชา...! กระดาษยาวๆ ก็จะห้อยลงมาจากแท่นบูชาบนเวที!"
10033080-113 = "เอ๋...? มิโกะถืออะไรอยู่น่ะ? เอากระดาษไปติดที่ต้นไม้งั้นเหรอ?"
10033080-114 = "นั่นคืออุปกรณ์ที่ใช้ในพิธีเซ่นไหว้ เรียกว่าโกเฮค่ะ ว่ากันว่าโกเฮจะช่วยชำระล้างพลังงานที่ไม่ดี แล้วขับไล่ความโชคร้ายออกไปค่ะ!"
10033080-115 = "มิโกะจะเขย่าโกเฮเหนือลังไม้ จากนั้นก็ประสาทพรด้วย 'ระบำแห่งงานต้นไม้ศักดิ์สิทธิ์'"
10033080-116 = "ดีละ! งานต้นไม้ศักดิ์สิทธิ์จอมปลอมนั่นน่ะ มาได้แค่นี้แหละ!"
10033080-117 = "?!"
10033080-118 = "เอะ... เอ๋?"
10033080-119 = "อะไรกันน่ะ!!"
10033080-120 = "หืม...?"

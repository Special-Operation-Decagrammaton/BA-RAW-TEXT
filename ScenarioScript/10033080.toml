[translation]
10033080-1 = "Episode 8;In the Middle of a Festival"
10033080-3 = "The Tree of Deities ritual!"
10033080-4 = "It's a two-for-one: a ritual and a festival! This yearly event takes place under this cherry blossom tree, the very icon of Hyakkiyako itself!"
10033080-5 = "The coolest thing about the Tree of Deities is that you can see it from anywhere in Hyakkiyako. Which I'm sure you've noticed!"
10033080-7 = "*yawn* We hold a ritual for the tree...to pray for good blessings..."
10033080-8 = "This ritual has a long history, originating from when the people of Hyakkiyako would pray to the tree in hopes of a bountiful harvest for the rest of the year!"
10033080-9 = "Usually during the festival, craftsmen from all over the district build and decorate ornate palanquins that are then sent to the Tree of Deities Plaza."
10033080-10 = "During their long travels through Hyakkiyako, the palanquins deliver good fortunes and energy to our many citizens!"
10033080-11 = "The hopes of all our people are carried all the way here and shared during the ritual!"
10033080-12 = "Due to short notice, you unfortunately won't see the early parts of the festival when these palanquins travel to the plaza."
10033080-13 = "Instead, you'll get to enjoy this majestic palanquin, representing all the other ones that can't be present today!"
10033080-18 = "You'll have the chance to see how we give offerings for the ritual right here in the Tree of Deities Plaza."
10033080-19 = "And as a treat, we have someone very special taking on the role of the miko for the ritual!"
10033080-23 = "That's right! The renowned idol of Hyakkiyako herself!"
10033080-24 = "It's Chise!"
10033080-25 = "Meow?"
10033080-29 = "Whoa, is that the palanquin she was talking about?"
10033080-30 = "It's even bigger than I thought it'd be. We could probably fit, like, twenty of us on there."
10033080-31 = "I heard someone say people do hop on it and play instruments and other fun stuff as it travels. I wanna do that."
10033080-32 = "Aw man, me too. It wouldn't be that fun to do while it's empty though."
10033080-36 = "(Today I'll make up for everything that's happened thus far.)"
10033080-37 = "(The Tree of Deities ritual is intended to be the highlight of the entire field trip.)"
10033080-38 = "(As long as this goes well, I'll be able to maintain our club's reputation and live up to everyone's expectations.)"
10033080-39 = "(Thankfully the introduction to the ritual at least went smoothly.)"
10033080-40 = "(To top it all off, I've already brought and set up the fireworks we'll be setting off at the end of the festival! That way, we're already ahead of schedule.)"
10033080-47 = "People in white clothes are surrounding the palanquin!"
10033080-49 = "Look, look. I didn't even know the roof could open up like that. Whoa."
10033080-50 = "Oh yeah, I read there's a small wooden box up there that holds all the good fortune stuff the tour guide was talking about."
10033080-51 = "If the box opens before the miko touches it, you'll be cursed! Well, I think you just get like bad luck for the rest of the year or something like that."
10033080-52 = "Spooky! What kind of bad luck?"
10033080-53 = "Huh, I don't know. Maybe like you stub your toe every time you get out of bed, or you'll accidentally step on a particularly small, plastic toy, or you'll get heatstroke every time you go outside?"
10033080-54 = "I didn't know Hyakkiyako was like that! That sounds like a nightmare."
10033080-55 = "Then we should help them cleanse the bad energy! With fire! Here, take these incendiary grenades!"
10033080-56 = "Why are you giving them to me?!"
10033080-59 = "As you can see here, the box must not be touched while it's being moved."
10033080-60 = "We carefully cover it with a clean, white cloth, and then transport it in this bamboo carrier."
10033080-61 = "To ensure the good energy doesn't escape, we charm it with the flute as its being moved."
10033080-66 = "I kinda spaced out, but do you want us to sing or something? Hey, do you know our school anthem?"
10033080-67 = "Of course not. Do you?!"
10033080-68 = "Obviously not! Wait... Do we even have one?"
10033080-69 = "Dude, you scared me. I thought I was the only one who didn't know."
10033080-71 = "Nah. I bet you could ask anyone on this field trip and they'd be clueless."
10033080-74 = "Right about now..."
10033080-82 = "Whoa! Where'd all these petals come from?!"
10033080-83 = "Look, look. They're falling from the Tree of Deities!"
10033080-87 = "Yes, ma'am! According to the legends, flower petals fall from the Tree of Deities like pink rain when Hyakkiyako is visited by good fortunes!"
10033080-88 = "We must be really lucky today! The petals started falling when the chest finished its journey to the plaza!"
10033080-90 = "It's definitely not students sprinkling them from the rooftops..."
10033080-94 = "And, at last, we have the star of the hour! Chise!"
10033080-97 = "I took the road less traveled, braving the twists and turns, and arrived."
10033080-101 = "Our miko, Chise, is making the journey to the stage for the ritual."
10033080-102 = "Bad luck begone, for fortune has won. Hold tight, with all your might."
10033080-103 = "She is reciting the poem of offerings! It is the song of our prayers, delivered by the miko to chase away bad luck and wish for good fortune!"
10033080-104 = "The flower blooms, let the breeze loom. Climb, climb, climb up the hill."
10033080-108 = "Once the miko is at the top of the stage, a big sheet of paper goes across the altar. Just like she's doing now!"
10033080-113 = "What's that in her hand? It looks like...a piece of wood with paper glued to it."
10033080-114 = "It's a ritual tool called gohei. It cleanses the chest and chases the bad energy away!"
10033080-115 = "She'll shake the gohei above the box here, and then perform the Tree of Deities dance to infuse it with good—"
10033080-116 = "Stop right there! This farce of a ritual ends now!"
10033080-117 = "?!"
10033080-118 = "A-Ah?!"
10033080-119 = "Wh-What's happening?"
10033080-120 = "...?!"

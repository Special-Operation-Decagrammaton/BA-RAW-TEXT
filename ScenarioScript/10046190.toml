[translation]
10046190-3 = "อิจิกะ"
10046190-4 = "รุ่นพี่ซึรุกิ?!"
10046190-5 = "มาเปลี่ยนเวรกันมั้ย?"
10046190-6 = "ไม่ค่ะ ไม่เป็นไรค่ะ! นี่ไม่ใช่เรื่องที่รุ่นพี่ซึรุกิต้องรับผิดชอบแทนหรอกค่ะ!"
10046190-7 = "ฉันจัดการเองได้ค่ะ..."
10046190-8 = "แต่ก็จะไม่ไหวแล้วไม่ใช่เหรอ?"
10046190-9 = "แหะๆ... ฉันปกปิดอะไรกับรุ่นพี่ซึรุกิไม่ได้เลยนะคะ"
10046190-10 = "แต่ฉันก็ยอมรับว่างานนี้มันเกินกำลังจริงๆ ค่ะ..."
10046190-11 = "......"
10046190-12 = "อืม~ ถ้าเป็นปกติฉันคงตอบตกลงว่า ค่ะ... โดยไม่รีรอเลย แต่ครั้งนี้มัน..."
10046190-13 = "จะฝ่าฝืนคำสั่งงั้นเหรอ?"
10046190-14 = "ไม่ใช่ค่ะ! ไม่ใช่อย่างนั้นค่ะ..."
10046190-15 = "ฉันมีเหตุผลที่ต้องทำให้วันหยุดพักร้อนนี้ประสบความสำเร็จน่ะค่ะ"
10046190-16 = "เพราะงั้นอย่างน้อยก็ช่วยฉันอยู่ข้างๆ เถอะนะคะ!"
10046190-17 = "งั้นเหรอ?"
10046190-18 = "ฮาสุมิบอกฉันว่าจะเจอผลลัพธ์ที่คาดไม่ถึง ฉันก็สงสัยว่าหมายถึงอะไร... เป็นอย่างนี้เองสินะ คิกคิกคิก!"
10046190-19 = "คิกคิกคิกคิก...!!"
10046190-20 = "ฉันเป็นคนประเภทที่ห้ามไม่ได้หรอกนะ รู้ดีใช่มั้ยล่ะ?"
10046190-21 = "ค่ะ! ฉันจะเชื่อฟังรุ่นพี่ทุกอย่างเลยค่ะ!"
10046190-22 = "ต้องใจสู้แบบนี้ละ..."
10046190-26 = "ดีละ ถ้างั้นก็ไปกันเลย"
10046190-27 = "คิกคิกคิก..."
10046190-33 = "คิกคิกคิกคิกคิก!!!"

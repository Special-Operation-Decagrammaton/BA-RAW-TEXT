[translation]
10046190-3 = "一花。"
10046190-4 = "弦生前輩！？"
10046190-5 = "要換班嗎？"
10046190-6 = "沒，沒關係的！還不到需要弦生前輩出馬的程度！"
10046190-7 = "這種程度我自己就能……"
10046190-8 = "你差不多到極限了吧。"
10046190-9 = "……哈哈。面對弦生前輩，果然沒辦法打迷糊仗呢。"
10046190-10 = "確實是有點吃力……"
10046190-11 = "…………"
10046190-12 = "唔嗯～如果是平常的話，我一定會毫不猶豫地說「好」……"
10046190-13 = "要抗命嗎？"
10046190-14 = "絕對不是！不是那樣的……"
10046190-15 = "只是這次的假期，對我來說有非成功不可的理由。"
10046190-16 = "所以請至少讓我在一旁幫忙吧！"
10046190-17 = "這樣啊。"
10046190-18 = "蓮實說的「意外的收穫」就是指這個嗎……嘰嘻嘻！"
10046190-19 = "嘰嘻嘻嘻……！！"
10046190-20 = "……我不會手下留情。明白我的意思吧？"
10046190-21 = "是！我會全程跟上的！"
10046190-22 = "……我不討厭這種固執。"
10046190-26 = "好，出發吧。"
10046190-27 = "嘰嘻嘻嘻……"
10046190-33 = "嘰嘿嘿耶耶耶耶耶耶耶耶！！！"

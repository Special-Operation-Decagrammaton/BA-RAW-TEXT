[translation]
1002603-1 = "ขอความช่วยเหลือเรื่องเล็กๆ น้อยๆ"
1002603-2 = "(สถานที่ที่เนรุเรียกไปก็คือโรงยิมขนาดเล็กที่อยู่บริเวณชานเมืองมิลเลเนียม)"
1002603-3 = "(อาจจะเพราะเป็นโรงยิมขนาดเล็ก และวิธีเดินทางค่อนข้างลำบาก ทำให้ไม่เห็นคนอื่นๆ ในบริเวณนั้น)"
1002603-4 = "อึ่ก..."
1002603-5 = "[s] \"...?\""
1002603-6 = "อืออ... อา...!"
1002603-7 = "ชิ... สุดท้ายก็เป็นแบบนี้สินะ"
1002603-8 = "[s] \"???\""
1002603-9 = "มันทำยังไงกันแน่นะ...?"
1002603-10 = "คนอื่นๆ ก็ดูจะไม่มีปัญหาอะไรแท้ๆ..."
1002603-11 = "อะ... โอ๊ย... เจ็บอีกแล้วสิเนี่ย..."
1002603-12 = "[s1] \"เนรุ!?\"\n[s2] รีบวิ่งไปยังบริเวณที่มาของเสียง"
1002603-23 = "[ns] \"เนรุ...?\""
1002603-24 = "หืม...? ครู?"
1002603-25 = "อา... มาเร็วกว่าที่คิดอีกนะ มาได้จังหวะพอดีเลย เอาของที่บอกไปมาด้วยใช่มั้ย?"
1002603-26 = "หืม...? ฉันบาดเจ็บตรงไหนบ้างรึเปล่างั้นเหรอ?"
1002603-27 = "เฮ้อ... ครู ไม่ฟังที่ฉันพูดเลยสินะ? ฉันบอกว่าไม่ต้องสนใจยังไงล่ะ"
1002603-28 = "แค่จะเอามาแปะตรงที่เท้าลอกก็เท่านั้นเอง ไม่ได้มีปัญหาอะไรหรอก"
1002603-29 = "ว่าไงนะ?"
1002603-30 = "ทำไมฉันถึงใส่ชุดนี้อีกงั้นเหรอ? แล้วทำไมเท้าถึงลอกงั้นเหรอ?"
1002603-31 = "ช่วยถามทีละคำถามได้มั้ยครู"
1002603-32 = "ก็นะ... ก็นั่นแหละ ไหนๆ ครูก็อุตส่าห์มาถึงที่นี่ ฉันจะตอบให้ก็ได้"
1002603-33 = "ฉันแค่มาฝึกส่วนตัวน่ะ"
1002603-34 = "ถึงจะเป็นชุดที่ไม่ได้ใส่ประจำ แต่ก็ควรเคลื่อนไหวให้เป็นธรรมชาติใช่มั้ยล่ะ?"
1002603-35 = "เพราะไม่รู้ว่าจะต้องใส่ชุดแบบนี้ไปทำภารกิจอีกเมื่อไรน่ะสิ"
1002603-36 = "แต่ว่ารองเท้านี่..."
1002603-37 = "ฉันไม่ค่อยชอบรองเท้าประเภทนี้น่ะ ก็เลยไม่ค่อยได้ใส่บ่อยเท่าไร พอต้องมาใส่แบบนี้แล้ว มันก็#nรู้สึกรำคาญทุกครั้งเลย"
1002603-38 = "ฉันว่าจะลองใส่ให้ชินสักหน่อย แต่พอใส่เดินดูแล้วกลับกลายเป็นว่าเท้าฉันถลอกหมดเลยนี่สิ"
1002603-39 = "ทีนี้เข้าใจรึยัง...? มันไม่ใช่เรื่องใหญ่อะไรหรอก ถ้าเข้าใจแล้วก็รีบๆ ส่งพลาสเตอร์มาได้แล้ว#nฉันแสบจะแย่แล้วนะ"
1002603-40 = "หา...? เดี๋ยวครูจะแปะให้งั้นเหรอ?"
1002603-41 = "พะ...พูดบ้าอะไรน่ะ!? อย่ามัวพูดไร้สาระ รีบส่งพลาสเตอร์มาได้แล้ว!"
1002603-42 = "เอ๋? ถ้าไม่ยอมให้ครูแปะให้ ก็จะไม่ส่งพลาสเตอร์ให้ฉันเหรอ? อะไรเนี่ย!? ทำไมจู่ๆ ครูเป็นแบบนี้เนี่ย!"
1002603-43 = "เดี๋ยวสิ ทำไมครูถึงได้ทำแบบนี้ล่ะ...!"
1002603-44 = "..."
1002603-45 = "เฮ้อ..."
1002603-46 = "ชิ... ก็ได้ คงไม่มีวิธีอื่นแล้วสินะ"
1002603-47 = "งั้นก็ตามใจครูแล้วกัน"
1002603-50 = "― อะ... อะไรเล่า ทำไมถึงมองฉันแบบนั้น[wa:3380] "
1002603-53 = "― อะ...อื้อ...โอเค[wa:1780] "
1002603-56 = "― แปะดีแล้วใช่มั้ย?"
1002603-58 = "― อา... ใช้ได้เลยล่ะ แต้งกิ้ว[wa:2250] "
1002603-61 = "[ns3] \"พอมาคิดดูแล้ว...\"\n[ns4] \"ได้เห็นเนรุในแบบนี้ก็ดูแปลกตาดีนะ\""
1002603-62 = "― ...บอกไว้ก่อนเลยนะ [wa:840] "
1002603-63 = "― ถึงจะพูดแบบนั้น... [wa:840] "
1002603-65 = "― ปกติเรื่องแบบนี้ ฉันไม่ขอให้คนอื่นช่วยหรอก...[wa:150] "
1002603-68 = "― แต่ที่ฉันขอให้ช่วย... ก็เพราะว่าเป็นครูไงล่ะ...[wa:10] "
1002603-71 = "― ก็นะ... ช่างเถอะ[wa:1530] "
1002603-73 = "― คุณครูยังเป็นคนที่... แปลกเหมือนเดิมเลยนะ[wa:110] "
1002603-76 = "― เพราะงั้น... จะว่ายังไงดีล่ะ...[wa:5410] "
1002603-79 = "― แน่นอนว่าเรื่องนี้น่ะ...[wa:10] "
1002603-81 = "― เรื่องนี้น่ะ ห้ามเอาไปพูดกับคนอื่นเด็ดขาดเลยนะ[wa:340] "
1002603-84 = "พอมาคิดดูแล้ว ฉันก็บังเอิญได้เห็นอีกด้านหนึ่งของครูเหมือนกันนะ"
1002603-85 = "สีหน้าของครูตอนถีบประตูเข้ามาตอนนั้นน่ะ..."
1002603-86 = "คิคิ... ได้เห็นสีหน้าแบบนั้นก็ถือว่าคุ้มนะ"
1002603-87 = "อะไรน่ะ... สีหน้าดูไม่ทุกข์ร้อนแบบนั้น ไม่สนุกเอาซะเลย"
1002603-88 = "แต่ว่า... ยังไงก็เถอะ"
1002603-89 = "เรื่องเมื่อกี้น่ะ... ขอบคุณนะครู"
1002603-91 = "(หลังจากนั้นคุณครูก็ใช้เวลากับเนรุต่ออีกสักพักก่อนจะกลับไปยังห้องทำงานที่ชาเล่ต์)"

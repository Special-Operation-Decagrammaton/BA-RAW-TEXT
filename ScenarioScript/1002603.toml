[translation]
1002603-1 = "A Small Favor"
1002603-2 = "Neru called me out to a small gym in the Millennium outskirts."
1002603-3 = "Maybe because it was such a small place and difficult to get to, but I couldn't spot a single person in the area."
1002603-4 = "Tch."
1002603-5 = "[s] \"...?\""
1002603-6 = "U-Uh. Ah!"
1002603-7 = "Tch. Not this again."
1002603-8 = "[s] \"...?\""
1002603-9 = "How in the world is this supposed to work?!"
1002603-10 = "Everybody else seems to be able to do it just fine."
1002603-11 = "Ow... Did I hurt myself again?"
1002603-12 = "[s1] \"Neru?!\"\n[s2] Hurry towards the source of the sound."
1002603-23 = "[ns] \"Neru?\""
1002603-24 = "Huh? Sensei?"
1002603-25 = "You got here faster than expected. You brought what I asked for, right?"
1002603-26 = "Huh? Am I hurt anywhere?"
1002603-27 = "*sigh* Were you even listening, Sensei? I told you not to worry!"
1002603-28 = "I just have a little scrape on my foot. It's no big deal."
1002603-29 = "Huh?!"
1002603-30 = "You want to know why I'm wearing this outfit? And how I scraped my foot?"
1002603-31 = "One question at a time, Sensei!"
1002603-32 = "Well, fine. Since you came all this way, I can at least answer your questions."
1002603-33 = "I'm just trying to practice."
1002603-34 = "Even though I don't normally wear outfits like these, I want to look natural when I do."
1002603-35 = "What if I have to wear something like this to work?"
1002603-36 = "But these shoes..."
1002603-37 = "I can't stand these shoes! I don't wear them very often, but when I do it's a real pain."
1002603-38 = "I thought maybe I could break them in, but I just ended up scraping my feet."
1002603-39 = "So now you know. It's really no big deal, so hurry and hand over that bandage! It's still stinging."
1002603-40 = "What? You want to put it on yourself?"
1002603-41 = "Stop being ridiculous and just give me the bandage!"
1002603-42 = "If you can't put it on yourself, you're just going to leave? Wh-What the hell?! What's wrong with you?"
1002603-43 = "I mean, why the hell are you doing this?!"
1002603-44 = "..."
1002603-45 = "*sigh*"
1002603-46 = "Tch, fine! Well, I guess I have no choice."
1002603-47 = "Do whatever you want."
1002603-50 = "― Wh-What? Why are you looking at me like that?[wa:2980] "
1002603-53 = "― Yeah, okay.[wa:1980] "
1002603-56 = "― Is it on?"
1002603-58 = "― Ah. That's good. Thank you.[wa:2250] "
1002603-61 = "[ns3] \"Come to think of it...\"\n[ns4] \"Seeing you like this is pretty new.\""
1002603-62 = "― I'm letting you know,[wa:760] "
1002603-63 = "― I'm letting you know,[wa:760] "
1002603-65 = "― I usually don't ask people for things like this.[wa:30] "
1002603-68 = "― I asked because it was you, Sensei.[wa:100] "
1002603-71 = "― Well, okay.[wa:1730] "
1002603-73 = "― You're still a strange person, Sensei.[wa:230] "
1002603-76 = "― Well, so. How do I say this?[wa:5530] "
1002603-79 = "― It's a given.[wa:10] "
1002603-81 = "― You can't tell a single soul about this, okay?![wa:300] "
1002603-84 = "You know, I got to see a totally different side of you too, Sensei."
1002603-85 = "Your face when you suddenly burst through the door!"
1002603-86 = "It was quite a sight! Haha!"
1002603-87 = "Hmph! You're supposed to be at least a little embarrassed."
1002603-88 = "Well, at any rate..."
1002603-89 = "Thanks for coming all the way out here, Sensei."
1002603-91 = "After spending a little more time with Neru, I returned to Schale."

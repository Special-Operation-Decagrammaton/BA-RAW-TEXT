[translation]
1002603-1 = "正因為不是什麼大事"
1002603-2 = "（被寧瑠叫去的地方是千年外的一個小體育館）"
1002603-3 = "（大概是因為太偏僻，幾乎沒什麼人）"
1002603-4 = "啊──，可惡……"
1002603-5 = "[s] 「……？」"
1002603-6 = "嗯，這還真痛啊。"
1002603-7 = "嘖……"
1002603-8 = "[s] 「……？？？」"
1002603-9 = "果然有什麼不對嗎……？"
1002603-10 = "如果大家都變這樣的話，就不會穿這個了吧……"
1002603-11 = "啊──好痛……"
1002603-12 = "[s1] 「寧瑠！？」\n[s2] 慌忙地進去"
1002603-23 = "[ns] 「……寧瑠？」"
1002603-24 = "……嗯？老師？"
1002603-25 = "啊啊，比想像中還早來。給我帶來了嗎？"
1002603-26 = "……啊？"
1002603-27 = "所以啊，MomoTalk上不也說了不是什麼大不了的事吧？"
1002603-28 = "只是有點被鞋子磨破皮而已。"
1002603-29 = "……哈啊？"
1002603-30 = "怎麼又穿這件……？"
1002603-31 = "啊──，這該怎麼說呢……"
1002603-32 = "嘛，老師應該沒關係吧……"
1002603-33 = "我只是想要先習慣這身衣服。"
1002603-34 = "又不是平常都在穿，所以都沒有機會習慣這套衣服。"
1002603-35 = "如果有天遇到任務需要穿這套衣服的話，就麻煩了吧？"
1002603-36 = "所以，為了習慣這套衣服，我只是稍微活動了一下……唉。"
1002603-37 = "這雙鞋子，真的很麻煩吶……"
1002603-38 = "真是丟臉，被鞋子磨成這副德性。"
1002603-39 = "……吶，沒什麼大不了的吧？所以給我吧。"
1002603-40 = "……哈啊？你要幫我貼……？"
1002603-41 = "說，說什麼呢！別把我當成小孩子！"
1002603-42 = "咦，不然你要回去了？怎麼突然和小孩子一樣耍任性啊！？"
1002603-43 = "等下，你是認真的嗎，笨蛋！？啊啊真是的……！"
1002603-44 = "……"
1002603-45 = "……唉。"
1002603-46 = "嘛，反正是老師，沒什麼大不了的……"
1002603-47 = "……來吧，動作快。"
1002603-50 = "― 哈啊……什，什麼啊那副眼神。[wa:4220] "
1002603-53 = "― ……嗯，OK。[wa:2140] "
1002603-56 = "― 有貼好嗎？"
1002603-58 = "― 啊啊，沒問題了嗎，謝啦。[wa:2850] "
1002603-61 = "[ns3] 「這麼說來……」\n[ns4] 「寧瑠的這種模樣，還挺少見的。」"
1002603-62 = "― ……話先說在前頭，[wa:1240] "
1002603-63 = "― ……話先說在前頭，[wa:1240] "
1002603-65 = "― 我平常這種事情是不會拜託其他人的啊。[wa:1230] "
1002603-68 = "― 因為是老師所以我才拜託的……[wa:940] "
1002603-71 = "― ……嘛，算了。[wa:1890] "
1002603-73 = "― 老師還是一樣，依然是個怪人呢。[wa:1150] "
1002603-76 = "― 嘛，所以說……[wa:6370] "
1002603-79 = "― ……明白了吧，[wa:210] "
1002603-81 = "― 這種事，不能跟其他傢伙說哦？[wa:1620] "
1002603-84 = "……仔細想想，這麼說來，我也看到了老師罕見的一面。"
1002603-85 = "突然把門踹開，闖進來時的表情……"
1002603-86 = "哈哈！真是太妙了。"
1002603-87 = "……幹嘛，我還以為你會露出更慌張的表情呢。"
1002603-88 = "嘛，總之……"
1002603-89 = "……謝謝你啦，老師。"
1002603-91 = "（之後和寧瑠再稍微悠閒了一段時間後回到了夏萊）"

[translation]
90001080-1 = "第8話;霍刻瑪"
90001080-11 = "出口在那裡！#n老師、陽葵部長，動作快！"
90001080-12 = "門是鎖著的呢……我來破門！"
90001080-20 = "[ns]「咦……？」"
90001080-22 = "這是……"
90001080-23 = "所以我們……現在是在凍原上看到的……"
90001080-24 = "那座火山的內部嗎……？"
90001080-25 = "[s]「我們一直沿著路走，結果竟然走到了火山裡面？」"
90001080-26 = "等等，莉央。#n真的是這裡沒錯嗎？"
90001080-27 = "……這是當時最好的做法。#n畢竟就連現在，火山上方也幾乎沒有任何敵方兵力的動靜。"
90001080-33 = "火山……炎熱地帶……而且還要爬山……"
90001080-34 = "簡直是在火上澆油……#n現在怎麼辦，老師，請你負責。"
90001080-35 = "[s]「跟你平時的服裝相比，現在應該已經相對涼快了吧……？」"
90001080-36 = "雖然是這樣沒錯……"
90001080-37 = "但還是好熱……"
90001080-44 = "呼，目前所處的情況姑且不論，現在的環境總算舒服多了。"
90001080-45 = "真想立刻回直升機上吹冷氣……"
90001080-46 = "可以麻煩你不要把直升機當成冰箱嗎……？"
90001080-50 = "總覺得越往上爬……探鑽設施的數量就越多呢。"
90001080-51 = "是啊。好像它們主要的開採地點其實是這座山一樣。"
90001080-52 = "（冰海、凍原和火山地帶……花費這麼多功夫開採資源，到底打算用在什麼地方？）"
90001080-53 = "（難道是要送去給擔任「軍需工廠」的「赫賽德」？#n　不，從目前的情況來看……）"
90001080-54 = "那個，英美的狀態看起來好像不太對勁……#n你還好嗎，英美？"
90001080-55 = "……"
90001080-60 = "我果然……已經到極限了。"
90001080-61 = "假如……我……真的出了什麼事的話……"
90001080-62 = "請在我的墳墓上放一支冰淇淋……#n不……請放一箱吧……"
90001080-63 = "就算你現在開這種玩笑，我們也完全笑不出來耶……"
90001080-64 = "敵人似乎停止追擊了。#n你們先在那裡稍作休息吧。"
90001080-65 = "……敵人停止了追擊？"
90001080-66 = "沒錯。我用無人機和AMAS在周圍偵察，但是都沒有發現前來追擊的十字神名兵力。"
90001080-67 = "雖然這對我們來說是件好事……#n不過換個角度來想，似乎也有些令人毛骨悚然。"
90001080-68 = "怎麼說呢？"
90001080-69 = "也可以這麼想對吧。#n如果這附近有什麼兵力不能接近的東西呢？"
90001080-70 = "又或者這裡存在著某樣東西，所以根本不需要兵力接近。"
90001080-72 = "這題的答案是……以上皆是哦～"
90001080-76 = "[ns]「這是……這個聲音是！」"
90001080-78 = "你，你們能大駕光臨確實挺了不起的……#n啊不對，我是說你們能來，來到這裡確實有兩下子……！"
90001080-79 = "雖然這一切都只是白費工夫而已！"
90001080-80 = "老實說，你們的確挺厲害的。#n讓人忍不住想為你們鼓掌。"
90001080-81 = "不，不，不過……一切就到此為止了！"
90001080-82 = "耶嘿嘿，我成功說出來了……！"
90001080-83 = "[s]「你們一直在暗中觀察我們嗎？」"
90001080-84 = "那，那當然。#n自從你們抵達凍原地帶開始……"
90001080-85 = "你們不是跟我們的手下交手過了嗎？#n你覺得我們會沒發現嗎？"
90001080-86 = "真是的，竟然讓我們解釋這麼理所當然的事情。#n害我對你們有點失望呢。人類果然很愚蠢。"
90001080-87 = "總，總之！一，一切都結束了……！#n因為這裡，這裡……！"
90001080-88 = "嗯，就像Ain說的一樣，一切即將在這裡畫上句點。"
90001080-89 = "如果你們願意投降的話，我們也不是不能考慮一下哦？#n就把這當作是我們大發慈悲吧。畢竟你們確實挺可憐的。"
90001080-90 = "[s1]「可是總得知道接下來會發生什麼，才能決定要不要投降吧？」\n[s2]「你們到底打算做什麼？」"
90001080-93 = "這，這種事可以……跟他們說嗎？"
90001080-94 = "唔嗯……雖然細節肯定是不能說的，但某些部分就算告訴他們也無所謂吧？#n你怎麼看，Soph？"
90001080-95 = "那好吧。我們打算將一切從頭重造，並建立全新的地基。#n從某種角度來看……"
90001080-96 = "……這麼做也可以說是為了你們。"
90001080-97 = "換，換句話說，這是為了提供你們……一個完美的標準答案。"
90001080-98 = "來來來，所有人注意。#n接下來要說的部分非常重要。"
90001080-99 = "舉例來說──#n人類有時候不是會不知道該怎麼抉擇，或者不知道怎樣的抉擇才是最好的嗎？"
90001080-100 = "所以接下來，我們將大發慈悲……"
90001080-101 = "讓你們從此不再有那樣的煩惱！"
90001080-102 = "雖然總覺得Aur只是想到什麼就說什麼……總之，這也是那位大人的存在意義。"
90001080-107 = "哎呀，這不是科幻電影裡的壞人都會說的台詞嗎？"
90001080-108 = "看來沒必要繼續聽下去了。#n假如你們真的問心無愧，打從一開始就不應該遮遮掩掩的。"
90001080-109 = "沒錯，我也聽說過──#n凡是宣稱「為了大家好」或者「從頭重造」之類的，基本上都不是什麼好事。"
90001080-110 = "好，好過分！"
90001080-111 = "……老實說，他們剛才說的確實讓人有點火大。"
90001080-112 = "不過算了。#n目前為止都還算在我們的預料之內。"
90001080-117 = "原來你們就是那些十字神名的工程師啊。"
90001080-118 = "……調月莉央。"
90001080-119 = "調月莉央。"
90001080-120 = "你終於現身了啊，我們的新變數。"
90001080-121 = "……為什麼現在才現身呢？#n雖然這麼問也沒什麼意義。"
90001080-122 = "最先發現那位大人的存在，並不知天高地厚地展開追查的人就是你吧。"
90001080-123 = "最後一次現身，是在奇普托斯的天空本該崩塌的那天……"
90001080-124 = "要是像之前一樣，躲在某個陰暗的角落就好了。"
90001080-125 = "你們要這麼說我也無可奈何。這點我必須承認。"
90001080-126 = "不過話說回來，你們意外地對我相當了解呢。"
90001080-127 = "畢，畢竟預防所有的可能性，本來就是我們的工作……！"
90001080-128 = "所，所所，所以！接下來霍刻瑪醬……會讓一切都回歸原點的！"
90001080-133 = "[ns3]「地面……？」\n[ns4]「火山的狀態好像不太對勁……！」"
90001080-137 = "老師，火山突然活躍起來了。"
90001080-138 = "而且……！"
90001080-148 = "[ns]「又怎麼了嗎！？」"
90001080-149 = "是新預言者的信號！"
90001080-150 = "我也偵測到了。#n這個信號難道是……「霍刻瑪」！？"
90001080-151 = "[s]「『霍刻瑪』……？」"
90001080-156 = "霍刻瑪！生命之樹的第二個質點！"
90001080-157 = "守護王國的古代守護者！"
90001080-158 = "光，光耀的知性！隱藏的智慧！"
90001080-159 = "變數只會帶來麻煩。#n所以我們要藉由霍刻瑪，讓這裡的火山噴發──"
90001080-164 = "將夏萊的老師這個最大的變數徹底剷除！"
90001080-165 = "而調月莉央──下一個就是你。"
90001080-166 = "……沒問題吧，Ain？"
90001080-167 = "……"
90001080-168 = "……嗯。#n如果是為了姐姐大人的話……"
90001080-169 = "況且是對方先拒絕我們的提議的。"
90001080-170 = "的……的確是這樣沒錯。#n我知道了，嗯！"
90001080-177 = "[ns]「那是……什麼！？！？」"
90001080-179 = "這怎麼可能！岩漿上怎麼會有那種東西……？#n這是什麼特異現象嗎？"
90001080-180 = "仔細想想，我們原本的確是尋找特異現象的社團沒錯。"
90001080-181 = "那種特異跟這種特異還是有點區別的吧！？"
90001080-183 = "（這個信號是「無名之神」的……？）"
90001080-188 = "葛夫拉果然很可靠。雖然略顯衝動，不過也有細心的一面。#n所以冰海地區的警戒工作才會交給它負責。"
90001080-189 = "其實引誘你們來到這裡的計畫，也全都是葛夫拉想出來的哦～"
90001080-190 = "只，只要是在霍刻瑪醬所處的岩，岩漿裡頭，#n無論老師……還有調月莉央再怎麼厲害，肯，肯定也束手無策了吧！？"
90001080-191 = "和，和泉元英美怕熱，飛鳥馬季的Abi-Eshuh現在又需要時間整，整備……！"
90001080-192 = "你們已經接連不斷地戰鬥到現在了對吧？#n也差不多該好好休息一下了。"
90001080-193 = "就讓我們來幫點小忙吧。#n只不過有種休息可是要休一輩子的哦～"
90001080-199 = "……對付那種敵人，有時並不需要精心設計的作戰或計畫。"
90001080-200 = "[s]「你打算怎麼做，莉央？」"
90001080-211 = "我要動用所有可以使用的AMAS，利用現場設施的殘骸構築防禦陣線和結構物。"
90001080-212 = "雖然時間方面難以做好萬全的準備……#n但是面對這種原始的敵人，有時也得使出相應的手段。"
90001080-213 = "那是……？"
90001080-214 = "原來如此，那樣一來確實……"
90001080-219 = "[ns]「謝謝你，莉央！」"
90001080-224 = "（話雖如此，剛才十字神名的工程師們提到要徹底剷除老師這個最大的變數）"
90001080-225 = "（這代表老師的存在，對他們而言是個相當大的威脅嗎……？）"
90001080-230 = "老師？"
90001080-231 = "[s]「雖然不清楚那些人到底在想什麼，又準備要做些什麼……」"
90001080-235 = "[ns]「總之就先從眼前的問題開始解決吧！」"
90001080-236 = "那老師之後願意幫我開空調嗎？"
90001080-237 = "[s]「……要幫你開十個小時都沒問題！」"
90001080-238 = "謝謝你，老師。#n我就喜歡你的這種地方。"
90001080-239 = "那個，這樣可能會用光直升機的燃料耶……？"
90001080-246 = "準備應戰。"
90001080-248 = "那麼各位，請做好覺悟吧。"
90001080-249 = "把你們趕來這裡也費了我們不少功夫呢～"
90001080-250 = "拜，拜託你了，霍刻瑪醬！"
90001080-251 = "雖然調月莉央好，好像有所準備，不過我相信霍刻瑪醬肯定沒問題的……！"
90001080-256 = "[ns]「大家小心！」"

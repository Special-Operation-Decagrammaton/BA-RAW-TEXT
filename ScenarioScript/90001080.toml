[translation]
90001080-1 = "Episode 8;Chokmah"
90001080-11 = "I have located the exit. Hurry, Sensei! President Himari!"
90001080-12 = "It's locked. I'm forcing my way through! Excuse me!"
90001080-20 = "[ns] \"Huh...?!\""
90001080-22 = "This is..."
90001080-23 = "You mean to say...this...inside..."
90001080-24 = "We're now inside the volcano we saw earlier?"
90001080-25 = "[s] \"The path led us...into the heart of the volcano?\""
90001080-26 = "This is really it, Rio?"
90001080-27 = "...It was the most logical decision at the time. At the least, there're no enemies here."
90001080-33 = "Volcano... High-temperature area...and climbing..."
90001080-34 = "The heat...is unbearable now. How are you going to fix this? Sensei. Take responsibility."
90001080-35 = "[s] \"You're better dressed...than in your usual outfit...at least?\""
90001080-36 = "I...suppose..."
90001080-37 = "I'm melting...away..."
90001080-44 = "Phew. We may have ended up inside a volcano, but at least we can catch our breath. "
90001080-45 = "Let's go back to the helicopter. And AC. Right now."
90001080-46 = "Our state-of-the-art helicopter is not your refrigerator..."
90001080-50 = "The further in we proceed, the more drilling rigs there are."
90001080-51 = "This mountain was likely the core target of their mining operations."
90001080-52 = "(The Glacial Sea, the tundra, and a volcano... Just what are they planning on doing with this wealth of resources?)"
90001080-53 = "(Is it for Chesed's munition factory? No...if that were the case...)"
90001080-54 = "Eimi, you look unwell... Will you be okay?"
90001080-55 = "..."
90001080-60 = "No. I truly am at my limit."
90001080-61 = "If...I don't make it..."
90001080-62 = "...please leave a scoop...no! Please leave a whole box of ice cream, in memory of me, on my grave."
90001080-63 = "Given the context, that sounds alarmingly...not like a joke."
90001080-64 = "However, the enemy seems to have stopped their pursuit. As hot as it may be, we can recollect ourselves here for a moment."
90001080-65 = "They stopped? "
90001080-66 = "Yes. I'm scouting the area with drones and AMAS, but I've detected no enemy troops in the area."
90001080-67 = "On the surface, that's a relief. Underneath, it's an ominous statement."
90001080-68 = "How so?"
90001080-69 = "Why would the enemy, who severely outnumbers us, not press their advantage? The only deterrent would be something of a greater threat."
90001080-70 = "Or something they shouldn't approach..."
90001080-72 = "Ding, ding, ding! The answer is, in fact, both!"
90001080-76 = "[ns] \"That... That voice!\""
90001080-78 = "Y-You've somehow managed to reach—I mean, intrude on this place!"
90001080-79 = "It's a shame it'll be all for nothing, isn't it?!"
90001080-80 = "Yes, yes. Congratulations are in order, however, are they not? Quite a feat, they have achieved!"
90001080-81 = "I-I-It doesn't matter, because it's all over now! "
90001080-82 = "Hee...heehee... I said it! I did it!"
90001080-83 = "[s] \"Have you been watching us?\""
90001080-84 = "O-Of course. Ever since you set foot on the tundra..."
90001080-85 = "Did you think you could scuffle with OUR troops and still escape our attention?"
90001080-86 = "Oh my, oh dear. Do humans really require such glaring facts to be explained to them? \"Disappointed\" cannot accurately express the feeling running through my circuits! I suppose it's to be expected."
90001080-87 = "F-From here, it's all over! Right here, right now!"
90001080-88 = "Yes. Yeah. Like Ein said, let's get this over with."
90001080-89 = "Of course, if you choose to surrender, I cannot fathom a reason to not accept. Do we call this mercy? A sense of pity?"
90001080-90 = "[s1] \"You can't expect us to surrender without knowing the situation.\"\n[s2] \"What are you trying to do here?\""
90001080-93 = "I-Is it okay to tell them...?"
90001080-94 = "Hm, hm... The details we cannot, but there are things we could reveal to the humans. Sof?"
90001080-95 = "Why not? We intend to build a new foundation for this world. Create everything anew! If you really think about it..."
90001080-96 = "...we're doing it for you."
90001080-97 = "T-To put it simply, we will present the perfect model. The complete answer."
90001080-98 = "Yes, yes, yes. Now, listen closely. This next matter is one of great import. "
90001080-99 = "Allow me to explain it in terms you understand. Is it not the bane of human existence? To agonize over the \"right\" and \"wrong\" decisions? Whether the path you tread is the optimal choice?"
90001080-100 = "We will graciously grant each and every one of you mercy!"
90001080-101 = "You will never again have another worry!"
90001080-102 = "Normally, Ohr's just yapping...but that was the master's very reason for existence."
90001080-107 = "Oh my. Have you been watching too many science fiction movies? What a third-rate villain line."
90001080-108 = "And a waste of time. Not even worth listening to. If you believe in your message, you shouldn't feel the need to hide things."
90001080-109 = "That is correct. I have been told that nothing can be for the good of all, and creating something anew is not worthwhile."
90001080-110 = "Y-You're going too far!"
90001080-111 = "...I'm starting to get a little angry."
90001080-112 = "It's of no concern. This outcome was still within the range of our predictions, was it not?"
90001080-117 = "The Decagrammaton engineers I've been hearing about."
90001080-118 = "...Tsukatsuki, Rio."
90001080-119 = "Tsukatsuki Rio."
90001080-120 = "The new variable. You've arrived."
90001080-121 = "...So why did this variable finally make her appearance? No. Another useless question."
90001080-122 = "You. The first to notice the master's presence. The audacious one, who follows its trail."
90001080-123 = "You have not resurfaced since the day the Kivotos' sky almost fell."
90001080-124 = "And, like that time, you should have remained put in the shadows. Where you belong."
90001080-125 = "I can acknowledge the sentiment. Your perception of me is yours to keep, after all."
90001080-126 = "However, you've gathered more data on me than I expected."
90001080-127 = "W-We, the engineers, prepare for any and all possibilities! B-Because we're the engineers!"
90001080-128 = "Th-Th-That's why Chokmah...will return everything to how it should be!"
90001080-133 = "[ns3] \"The ground...!\"\n[ns4] \"Something's happening to the volcano...!\""
90001080-137 = "Detecting activity from the volcano, Sensei. "
90001080-138 = "There...!"
90001080-148 = "[ns] \"There's more?!\""
90001080-149 = "A prophet! I'm seeing signals of a new prophet!"
90001080-150 = "Yes, I can confirm. The wave patterns... Is this Chokmah?!"
90001080-151 = "[s] \"Chokmah...?\""
90001080-156 = "Chokmah! The second Sephira of the Tree of Life!"
90001080-157 = "The Realm's Ancient Guardian!"
90001080-158 = "Sh-Shining Intelligence! And Hidden Wisdom!"
90001080-159 = "Unwelcome variables are unwelcome. With Chokmah's power, this volcano will erupt..."
90001080-164 = "...and eradicate the most unwelcome variable here! Schale's Sensei!"
90001080-165 = "And, of course, you. Tsukatsuki Rio."
90001080-166 = "...No problem for you, right, Ein?"
90001080-167 = "..."
90001080-168 = "If it's for Elder Sister..."
90001080-169 = "And did they not decline our offer of mercy?"
90001080-170 = "Y-You're...right! They did... Yes!"
90001080-177 = "[ns] \"Wh-What in the world?\""
90001080-179 = "This makes no sense! That...thing! On top of the lava! It's a super phenomenon!"
90001080-180 = "Right. I think the original purpose of our club was to investigate such things."
90001080-181 = "The super phenomena we were created to investigate and this...thing are two entirely different breeds!"
90001080-183 = "(This signal...is the Nameless Gods...?)"
90001080-188 = "Geburah was always reliable. A hothead, but still reliable. That's why we left the important task of patrolling the Glacial Sea to it."
90001080-189 = "In fact, it was Geburah's idea to lure you ingrates here!"
90001080-190 = "Even the amazing Sensei...and Tsukatsuki Rio can't do anything to f-fight Chokmah, not while it's in lava!"
90001080-191 = "I-Izumimoto Eimi is weak to heat, and Asuma Toki's Abi-Eshuh is in need of m-maintenance!"
90001080-192 = "It sure is tiring fighting without rest, huh? It's break time, in more ways than one!"
90001080-193 = "We will go ahead and grant you one! An eternal rest!"
90001080-199 = "...Against these kinds of enemies, sometimes a straightforward operation works best."
90001080-200 = "[s] \"What are you going to do, Rio?\""
90001080-211 = "I will deploy every AMAS I have to build a defense line. We can use the remains from the field facility. "
90001080-212 = "It won't be a proper barrier, but sometimes against primitive opponents, you need primitive methods."
90001080-213 = "That's...?"
90001080-214 = "I see. That must be..."
90001080-219 = "[ns] \"Thank you, Rio!\""
90001080-224 = "(The engineers stated that Sensei was their primary target for eradication.)"
90001080-225 = "(In their eyes, Sensei's presence is the biggest threat?)"
90001080-230 = "Sensei?"
90001080-231 = "[s] \"I don't know what those children are thinking or planning.\""
90001080-235 = "[ns] \"But for now, let's take care of what's right in front of us!\""
90001080-236 = "And then you'll definitely turn on the AC for me?"
90001080-237 = "[s] \"...For ten hours straight if you want!\""
90001080-238 = "Thank you, Sensei. That's why I like you."
90001080-239 = "Um. The helicopter is going to run out of fuel if you do that..."
90001080-246 = "Preparing for battle."
90001080-248 = "It's settled, everyone. Let us engage."
90001080-249 = "We sure worked hard to lure them all the way out here!"
90001080-250 = "G-Good luck, Chokmah! "
90001080-251 = "Ts-Tsukatsuki Rio may have deployed countermeasures, but our beloved Chokmah can handle them!"
90001080-256 = "[ns] \"Everyone! Look out!\""

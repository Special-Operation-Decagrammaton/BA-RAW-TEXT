[translation]
33095-2 = "*pant* *pant*..."
33095-3 = "Ugh..."
33095-7 = "[s] \"Hina!\""
33095-12 = "The Gehenna head prefect...has fallen. "
33095-13 = "Finally... I'm surprised she made it so far with those kinds of wounds."
33095-14 = "..."
33095-15 = "All key figures of Trinity and Gehenna have been dealt with. You're the only one that remains, Sensei of Schale."
33095-16 = "[s] \"And you all must be Arius' Squad.\""
33095-17 = "..."
33095-18 = "Hmm."
33095-19 = "Heehee..."
33095-20 = "..."
33095-24 = "Correct—we are Squad. It's good to finally meet you, and thank you for taking such good care of Azusa."
33095-25 = "[s] \"...!\""
33095-26 = "She seems to be doing well. We'll have plenty of time to catch up with her soon enough."
33095-27 = "We signed the treaty on Trinity's behalf at the Cathedral of Communion."
33095-28 = "..."
33095-29 = "[s] \"Why would you do that?\""
33095-30 = "Because in the name of paradise, we, Arius' Squad, have become the Eden Treaty Organization: a new armed force that will guard the treaty's sanctity."
33095-31 = "[s] \"...!\""
33095-32 = "It was always meant to be our duty. That was the right to be given to us at the First Council."
33095-33 = "But Trinity saw fit to trample on that duty. We were persecuted and blamed for every conflict of the age—suppressed and made to be scapegoats."
33095-34 = "However, with the ETO's authority, we now have the power to designate who will be suppressed."
33095-35 = "Gehenna and Trinity are both threats to the treaty. They're targets which must be eliminated."
33095-36 = "[s] \"You can't be serious...\""
33095-37 = "Trinity and Gehenna will be erased from Kivotos."
33095-44 = "They will meet their ends at the hands of the commandments' guardians standing before you now."
33095-45 = "And everyone will bear witness to the hatred we've harbored for the centuries after the First Council."
33095-46 = "But before that, there's one last element to take care of."
33095-50 = "[ns] \"(So this is what it's like to have a gun pointed at you...)\""
33095-51 = "She said you would be the largest obstacle to our plan."
33095-54 = "Aaaaaaaargh!"
33095-60 = "Sorasaki Hina! How can you still move?!"
33095-61 = "Sena! Over here!"
33095-65 = "A-An ambulance?!"
33095-74 = "This way, Sensei! Take my hand!"
33095-78 = "Don't think it'll be that easy!"
33095-82 = "H-How can she still have this much strength?"
33095-89 = "We lost them."
33095-90 = "That's fine. Hina may have tried her best to shield Sensei, but I can confirm Sensei was hit. "
33095-91 = "They're not a denizen of Kivotos. Without a halo, it's only a matter of time before Sensei falls to death's embrace."
33095-92 = "Still... Why would she go so far to protect Sensei? Are they truly that important?"
33095-93 = "..."
33095-94 = "Hime's signing something... Everything would have gone according to plan without Sensei? And Azusa wouldn't have betrayed us?"
33095-95 = "..."
33095-98 = "[ns] \"(My stomach... It's so hot.)\""
33095-99 = "Listen closely, Sensei. You've been shot. "
33095-100 = "Count yourself lucky that none of your vitals were hit, but you'll bleed out if we don't treat you."
33095-101 = "I'm going to start administering first aid. Don't be afraid to cry out if it hurts. "
33095-102 = "I won't let you die. This is what the Medical Emergency Club is trained for."
33095-106 = "[ns] \"(I'm going to pass out...)\""
33095-108 = "..."
33095-109 = "Hmm. Nice of you to join us."
33095-110 = "I didn't expect you to actually show yourself. You could have just run away."
33095-111 = "H-Heehee. I guess it's been a while... "
33095-117 = "*pant*... *pant*..."
33095-118 = "How have you been, Azusa?"
33095-119 = "Why? How dare you...? "
33095-120 = "You already know the answer to that. There's no place for you—neither with Trinity nor Schale."
33095-121 = "There's no place in the world that accepts murderers like us."
33095-122 = "How DARE you harm Sensei?!"
33095-123 = "Even if such a place existed, it would be fleeting and vanish in the blink of an eye...just as your Sensei has now."
33095-124 = "Everything is in vain, so why try to fight it, Shirasu Azusa?"
33095-125 = "SAORIII!!!"
33095-132 = "Even now, you're dozing away in a sweet dream. I have no choice but to wake you from it, then."
33095-133 = "I'll wake you from those dreams again and again, as many times as it takes."
33095-134 = "Now, come."
33095-138 = "[ns] \"Isn't this...?\""
33095-139 = "Nice to meet you, Sensei."
33095-140 = "I'm Yurizono Seia."
33095-141 = "We're in your dream...or maybe this is my dream."
33095-142 = "[s] \"Seia...\""
33095-143 = "Ah. So maybe this isn't is our first meeting."
33095-144 = "That could be the case. The flow of time has become rather convoluted for me."
33095-145 = "Regardless, I'm glad to have this opportunity to speak with you."
33095-150 = "So, shall we begin unraveling this story?"
33095-152 = "Next Episode;Sweet Lies"

[translation]
33095-2 = "哈啊，哈啊……哈啊……"
33095-3 = "呃……"
33095-7 = "[ns]「陽奈！！」"
33095-12 = "格黑娜的風紀委員長，終於倒下了。 "
33095-13 = "終，終於嗎……很痛吧，真虧她能以那種傷勢撐到現在……"
33095-14 = "……"
33095-15 = "三一和格黑娜的主要人物全都清除了。就只剩下你了，夏萊的老師。"
33095-16 = "[s]「……妳們就是，奧利斯小隊？」"
33095-17 = "……"
33095-18 = "呼……"
33095-19 = "欸嘿嘿……"
33095-20 = "……"
33095-24 = "……啊啊，沒錯。我們就是「奧利斯小隊」。終於見面了呢，老師。"
33095-25 = "[s]「……！」"
33095-26 = "聽說梓受你照顧了。我預計接下來要去見她。"
33095-27 = "……我們代替了三一，在這個「通功的古教堂」締結了條約。"
33095-28 = "……"
33095-29 = "[s]「……什麼意思？」"
33095-30 = "我們「奧利斯小隊」，成為了以樂園之名守護條約的武力集團……「[ruby=ETO]伊甸園條約機構[/ruby]」的意思。"
33095-31 = "[s]「！？」"
33095-32 = "這原本是我們的義務。我們本該在第一次公會議時行使的理所當然的權利。"
33095-33 = "但是，卻被三一踐踏了。我們被定義為紛爭的原因，也就是「鎮壓對象」，徹底地進行了壓制。"
33095-34 = "……接下來，「奧利斯小隊」將行使作為[ruby=ETO]伊甸園條約機構[/ruby]的權限，重新定義「鎮壓對象」。"
33095-35 = "格黑娜，還有三一。這兩校正是違反伊甸園條約的紛爭要素，必須排除的鎮壓對象。"
33095-36 = "[s]「那樣，也就是說……」"
33095-37 = "將三一和格黑娜從奇普托斯抹消。就如字面上的意思。"
33095-44 = "……和這項條約之戒律的守護者一起。"
33095-45 = "你們自第一次公會議以來，持續數百年累積的怨恨……接下來將會見證我們的憎惡吧。"
33095-46 = "……不過在那之前，先處理你吧。"
33095-50 = "[ns]（槍口……）"
33095-51 = "夏萊的老師……你將會是計劃裡最大的障礙，她是這麼說的。"
33095-54 = "啊啊啊啊啊啊啊！！！"
33095-60 = "……！還能動嗎，空崎陽奈！"
33095-61 = "瀨奈！這邊！！"
33095-65 = "救護車……！？"
33095-74 = "老師！手！"
33095-78 = "別想跑！！"
33095-82 = "還，還有那種力量……"
33095-89 = "……被逃走了。"
33095-90 = "算了。雖然受到空崎陽奈的妨礙，不過子彈擊中了。"
33095-91 = "那是奇普托斯的外來人。光環會損壞……不，應該會死吧。"
33095-92 = "不過，那個樣子……那個老師，是那麼重要的存在嗎。"
33095-93 = "……"
33095-94 = "「沒有那個人的話，全都會照計劃進行才對」……？是，是那樣嗎公主醬？咦，「而且梓也一定……」？"
33095-95 = "……"
33095-98 = "[ns]（肚子好熱……）"
33095-99 = "請聽清楚了老師，你被槍擊中了。"
33095-100 = "雖然奇蹟似的避開了要害，不過這個出血量不能放著不管。"
33095-101 = "現在將進行應急措施。會痛的話請大叫出聲。"
33095-102 = "不會讓你死的。因為我是，急救醫學部啊。"
33095-106 = "[ns]（意識，開始模糊了……）"
33095-108 = "……"
33095-109 = "……妳居然在這種時候出現。"
33095-110 = "沒想到會現身呢……明明就那樣逃出去就好了。"
33095-111 = "欸嘿嘿，好久不見呢……"
33095-117 = "哈啊，哈啊，哈啊……"
33095-118 = "……如何，梓。"
33095-119 = "為什麼，為什麼……"
33095-120 = "跟我說的一樣吧。三一也好，夏萊也罷，都沒有妳的容身之處。"
33095-121 = "會接受我們這種「殺人兇手」的地方，這個世界上並不存在啊。"
33095-122 = "為什麼，把老師……！"
33095-123 = "就算看起來有那種地方，也全都會如夢似幻地消失……就像剛才的「老師」一樣。"
33095-124 = "……全都是徒勞的。然而為什麼要掙扎呢，白洲梓。"
33095-125 = "沙織────！！！！"
33095-132 = "還沉浸在甜美的夢中嗎……沒辦法，我來幫妳吧。"
33095-133 = "不管幾次，我都會讓妳從那個夢中醒來。"
33095-134 = "來吧。"
33095-138 = "[ns]「這裡是……」"
33095-139 = "……應該是初次見面吧，老師。"
33095-140 = "我的名字是百合園聖亞。"
33095-141 = "然後這裡是你的夢境中……或者是，我的夢境中也說不定呢。"
33095-142 = "[s]「聖亞……」"
33095-143 = "哦，難道不是「初次見面」嗎？"
33095-144 = "失禮了。對現在的我來說，時間的流動稍微有點扭曲呢。"
33095-145 = "不過老師，重要的不是這個，而是你和我像這樣見面了啊。"
33095-150 = "好……那麼，來解開故事的謎題吧。"
33095-152 = "下一話;甜蜜的謊言"

[translation]
33095-2 = "แฮ่ก แฮ่ก..."
33095-3 = "อึ่ก..."
33095-7 = "[ns] “ฮินะ...!!”"
33095-12 = "ประธานกรรมการโรงเรียนเกเฮนน่าล้มลงไปแล้ว "
33095-13 = "ทนบาดแผลมาได้แค่นี้สินะ..."
33095-14 = "......."
33095-15 = "ปัจจัยสำคัญของทรีนิตี้และเกเฮนน่าถูกกำจัดหมดแล้ว ทีนี้ก็เหลือแค่คุณล่ะ ครูจากชาเล่ต์..."
33095-16 = "[s] \"พวกเธอคือสควอดของอาเรียสเหรอ...?\""
33095-17 = "......."
33095-18 = "ฮึ่ม"
33095-19 = "หึหึ..."
33095-20 = "......."
33095-24 = "อืม พวกเราก็คือสควอดของอาเรียส ในที่สุดก็ได้เจอกันนะครู พวกเราติดหนี้อาซึสะแล้วล่ะ"
33095-25 = "[s] “......!!”"
33095-26 = "อาซึสะคงจะสุขสบายดีสินะ ฉันว่าจะไปหาเธอสักหน่อยเหมือนกัน"
33095-27 = "พวกเราได้ลงนามในสนธิสัญญาที่วิหารปันบุญโบราณแห่งนี้แทนทรีนิตี้"
33095-28 = "......."
33095-29 = "[s] \"หมายความว่ายังไง...?\""
33095-30 = "ก็หมายความว่า <สควอดของอาเรียส> ได้เป็นกองกำลังติดอาวุธใหม่ที่พิทักษ์สนธิสัญญา#nในนามของสวรรค์ ที่ได้ชื่อว่า[ruby=ETO]องค์การสนธิสัญญาเอเดน[/ruby]ยังไงล่ะ"
33095-31 = "[s] \"......!\""
33095-32 = "นี่คือหน้าที่ของเราตั้งแต่แรก สิทธิที่เราควรจะได้ใช้ตั้งแต่แรกในการประชุมสภาครั้งที่ 1"
33095-33 = "แต่ว่าทรีนิตี้ก็เหยียบย่ำสิทธินั้นตามอำเภอใจ พวกนั้นนิยามเราว่าเป็นเป้าของความขัดแย้ง#nและกดขี่เราอย่างหนัก"
33095-34 = "ดังนั้น <สควอดของอาเรียส> จะใช้สิทธิของ ETO ในการนิยาม <เป้าของความขัดแย้ง> เสียใหม่"
33095-35 = "เกเฮนน่าและทรีนิตี้คือปัจจัยของความขัดแย้งที่ละเมิดต่อสนธิสัญญาเอเดน เป็นเป้าหมายที่ต้องกำจัด"
33095-36 = "[s] \"แปลว่า...\""
33095-37 = "แปลว่าฉันจะลบทรีนิตี้กับเกเฮนน่าออกจากคิโวทอสไงล่ะ"
33095-44 = "ฉันและเหล่าผู้พิทักษ์ที่ปกป้องบรรทัดฐานของสนธิสัญญานี้..."
33095-45 = "สิ่งที่พวกเธอจะได้เห็นก็คือความเจ็บแค้นหลายร้อยปีหลังจากการประชุมสภาครั้งที่ 1#nและความเกลียดชังของพวกเราที่สั่งสมมาตลอดระยะเวลานั้น"
33095-46 = "อ้อ จริงสิ เกือบลืมไปเลยว่าต้องกำจัดครูจากชาเล่ต์ก่อน"
33095-50 = "[ns] (ถูกเอาปืนจ่อหัว...)"
33095-51 = "เธอคนนั้นบอกว่าคุณจะเป็นอุปสรรคที่ใหญ่ที่สุดต่อแผนการนี้เลยล่ะ"
33095-54 = "ไม่นะะะะ!!"
33095-60 = "......!! ยังขยับได้อยู่อีกเรอะ? โซระซากิ ฮินะ!"
33095-61 = "เซนะ!!  ทางนี้!!"
33095-65 = "รถฉุกเฉินเหรอ...?!"
33095-74 = "คุณครูคะ! ทางนี้ค่ะ! จับมือไว้ค่ะ!"
33095-78 = "อย่าให้หนีไปได้!!"
33095-82 = "ทะ... ทำไมถึงยังมีแรงแบบนี้อยู่อีก..."
33095-89 = "พลาดแล้ว..."
33095-90 = "ช่างเถอะ ถึงฮินะจะเข้ามาขวางไว้ แต่ฉันก็มั่นใจว่าถูกยิงไปแล้ว"
33095-91 = "ถ้าไม่ใช่คนในคิโวทอส ฮาโลก็คงถูกทำลาย... ไม่สิ ต้องบอกว่าตายมากกว่า"
33095-92 = "แต่เข้ามาปกป้องกันขนาดนั้น... ครูคนนั้นเป็นคนสำคัญมากขนาดนั้นเลยเหรอ?"
33095-93 = "......."
33095-94 = "หากไม่มีคนคนนั้น ทุกอย่างก็จะเป็นไปตามแผน... ใช่ไหมคะ?  องค์หญิง? อาซึสะเองก็ด้วย...? "
33095-95 = "......."
33095-98 = "[ns] (รู้สึกร้อนวูบบริเวณท้อง)"
33095-99 = "ฟังฉันให้ดีนะคะคุณครู คุณถูกยิงมาค่ะ "
33095-100 = "ถึงจะเป็นปาฏิหาริย์ที่ไม่โดนจุดสำคัญ แต่ยังไงก็ต้องห้ามเลือดค่ะ"
33095-101 = "ฉันจะทำการปฐมพยาบาลเดี๋ยวนี้เลยค่ะ ถ้าเจ็บก็ร้องออกมานะคะ "
33095-102 = "อ้อ ฉันไม่ปล่อยให้คุณครูตายหรอกค่ะ ฉันคือหน่วยแพทย์ฉุกเฉินนะคะ"
33095-106 = "[ns] (สติเริ่มเลือนราง...)"
33095-108 = "......."
33095-109 = "ฮึ่ม... อย่างนี้เองเหรอ โผล่มาที่นี่จนได้สินะ"
33095-110 = "ไม่คิดเลยนะว่าจะได้เจอตัวที่นี่... น่าจะหนีๆ ไปให้สิ้นเรื่อง"
33095-111 = "แหะ แหะๆ ไม่ได้เจอกันนานเลยนะคะ... "
33095-117 = "แฮ่ก แฮ่ก... แฮ่ก..."
33095-118 = "รู้สึกยังไงบ้างล่ะ... อาซึสะ?"
33095-119 = "กล้าดียังไง... กล้าดียังไง! "
33095-120 = "เป็นอย่างที่ฉันบอกเลยใช่ไหม? ไม่มีที่ไหนที่เธอจะเข้าไปอยู่ได้หรอก ทั้งทรีนิตี้ ทั้งชาเล่ต์ ไม่มีเลย"
33095-121 = "โลกนี้ไม่มีที่ไหนยอมรับฆาตกรอย่างพวกเราหรอก"
33095-122 = "กล้าดียังไง... ถึงทำร้ายคุณครู..."
33095-123 = "ถึงแม้จะมีสิ่งนั้นอยู่ แต่สุดท้ายแล้วก็จะหายไปอย่างไร้ประโยชน์อยู่ดีน่ะแหละ ก็เหมือนกับตอนนี้"
33095-124 = "ถ้าทุกอย่างมันไร้ประโยชน์ แล้วทำไมเธอต้องดิ้นรนด้วยล่ะ? ชิราสึ อาซึสะ?"
33095-125 = "ซาโอริ!!!!!!!!!"
33095-132 = "ถ้ายังไม่ตื่นจากฝันหวานล่ะก็ สงสัยฉันคงต้องช่วยปลุกให้ละนะ"
33095-133 = "จะช่วยปลุกให้ได้สติขึ้นมาเลยล่ะ ตื่นจากฝันหวานของเธอได้แล้ว"
33095-134 = "ก็เข้ามาสิ"
33095-138 = "[ns] \"ที่นี่คือ...\""
33095-139 = "ยินดีที่ได้พบค่ะคุณครู..."
33095-140 = "ฉันคือยูริโซโนะ เซอาค่ะ"
33095-141 = "ที่นี่คือความฝันของคุณค่ะ หรืออาจจะเป็นความฝันของฉันก็ได้"
33095-142 = "[s] \"เซอา...\""
33095-143 = "เอ๋... หรือว่านี่ไม่ใช่การพบกันครั้งแรกของเราเหรอคะ? "
33095-144 = "อาจจะเป็นอย่างนั้นก็ได้นะคะ เพราะตอนนี้กระแสเวลาของฉันมันพัวพันกันจนยุ่งเหยิงเลยละค่ะ..."
33095-145 = "แต่ว่าสิ่งที่สำคัญก็คือ... การที่ฉันได้พบกับคุณครูเสียที"
33095-150 = "งั้นฉันขอเริ่มเรื่องเลยนะคะ..."
33095-152 = "ตอนต่อไป;คำโกหกแสนหวาน"

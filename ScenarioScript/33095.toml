[translation]
33095-2 = "はぁ、はぁ……はぁ……"
33095-3 = "くっ……"
33095-7 = "[ns] \"ヒナっ！！\""
33095-12 = "ゲヘナの風紀委員長、ようやく倒れた。"
33095-13 = "や、やっとですか……痛かったですよねぇ、よくあの傷でここまで……。"
33095-14 = "……。"
33095-15 = "トリニティとゲヘナの主要人物は全部片付いた。残りはもう貴様だけだ、シャーレの先生。"
33095-16 = "[s] \"……君たちが、アリウススクワッド？\""
33095-17 = "……。"
33095-18 = "ふぅ……。"
33095-19 = "えへへ……。"
33095-20 = "……。"
33095-24 = "……ああ、そうだ。私たちが「アリウススクワッド」。ようやく会えたな、先生。"
33095-25 = "[s] \"……！\""
33095-26 = "アズサが世話になったと聞いた。あいつには今から会いに行く予定だ。"
33095-27 = "……我々はトリニティに代わり、この「通功の古聖堂」で条約に調印した。"
33095-28 = "……。"
33095-29 = "[s] \"……どういう意味？\""
33095-30 = "私たち「アリウススクワッド」が、楽園の名の下に条約を守護する新たな武力集団……「[ruby=ETO]エデン条約機構[/ruby]」になったということだ。"
33095-31 = "[s] \"！？\""
33095-32 = "これは元々、私たちの義務だった。本来ならば第一回公会議の時点で、私たちが行使すべき当然の権利。"
33095-33 = "だがそれを、トリニティが踏みにじった。私たちを紛争の原因、すなわち「鎮圧対象」として定義し、徹底的に弾圧を行った。"
33095-34 = "……これからは「アリウススクワッド」が[ruby=ETO]エデン条約機構[/ruby]としての権限を行使し、「鎮圧対象」を定義し直す。"
33095-35 = "ゲヘナ、そしてトリニティ。この両校こそエデン条約に反する紛争要素であり、排除すべき鎮圧対象だ。"
33095-36 = "[s] \"それは、つまり……。\""
33095-37 = "トリニティとゲヘナを、キヴォトスから消し去る。文字通りにな。"
33095-44 = "……この条約の戒律、その守護者たちと共に。"
33095-45 = "貴様らは第一回公会議以来、数百年に渡って積み上げられてきた恨み……私たちの憎悪を確認することになるだろう。"
33095-46 = "……だがその前に、貴様を処理しておくとしようか。"
33095-50 = "[ns] \"（銃口が……）\""
33095-51 = "シャーレの先生……貴様が計画の一番の支障になりそうだと、彼女は言っていたからな。"
33095-54 = "ああぁあぁぁぁっ！！！"
33095-60 = "……っ！まだ動けるのか、空崎ヒナ！"
33095-61 = "セナっ！ こっち！！"
33095-65 = "救急車……！？"
33095-74 = "先生！手を！"
33095-78 = "逃すかっ！！"
33095-82 = "ま、まだそんな力が……。"
33095-89 = "……逃げられた。"
33095-90 = "まあ良い。空崎ヒナに妨害はされたが、銃弾は当たっている。"
33095-91 = "あれはキヴォトスの外の者だ。ヘイローは壊れ……いや、死ぬはずだ。"
33095-92 = "しかし、あの様子……あの先生が、そんなに大事な存在なのか。"
33095-93 = "……。"
33095-94 = "「あの人がいなかったら、全て計画通りになったはず」……？そ、そうなんですか姫ちゃん？え、「それにアズサもきっと……」？"
33095-95 = "……。"
33095-98 = "[ns] \"（お腹が熱い……）\""
33095-99 = "よく聞いてください先生、あなたは銃で撃たれました。"
33095-100 = "奇跡的に急所は避けていますが、この出血は放っておけません。"
33095-101 = "これより応急処置に入ります。痛かったら悲鳴を上げてください。"
33095-102 = "死なせはしません。私は、救急医学部ですから。"
33095-106 = "[ns] \"（意識に、靄が……）\""
33095-108 = "……。"
33095-109 = "……ここでお前が出てくるのか。"
33095-110 = "まさか姿を現すとはね……そのまま逃げ出しても良かったのに。"
33095-111 = "えへへ、お久しぶりですね……"
33095-117 = "はぁ、はぁ、はぁ……。"
33095-118 = "……どうだ、アズサ。"
33095-119 = "どうして、どうして……"
33095-120 = "私の言った通りだっただろう。トリニティにも、シャーレにも、お前の居場所は無い。"
33095-121 = "私たちみたいな「人殺し」を受け入れてくれる場所なんて、この世界には無いんだよ。"
33095-122 = "どうして、先生を……！"
33095-123 = "そんな場所があるように見えても、全ては儚く消える……さっきの「先生」とやらのようにな。"
33095-124 = "……全ては無駄だ。それなのにどうして足掻くんだ、白洲アズサ。"
33095-125 = "サオリいぃぃぃぃっ！！！！"
33095-132 = "まだ甘い夢に酔っているのか……仕方ない、手伝ってやろう。"
33095-133 = "何度でも、その夢から目を覚まさせてやる。"
33095-134 = "来い。"
33095-138 = "[ns] \"ここは……。\""
33095-139 = "……初めましてかな、先生。"
33095-140 = "私の名前は[ruby=ゆりぞの]百合園[/ruby]セイア。"
33095-141 = "そしてここは君の夢の中だ……或いは、私の夢の中かもしれないがね。"
33095-142 = "[s] \"セイア……。\""
33095-143 = "おっと、もしかして「初めまして」ではないのかな？"
33095-144 = "これは失敬。今の私にとって、時間の流れは少しばかり捻じれていてね。"
33095-145 = "しかし先生、大事なのはそこではなく、君と私がこうして会えているということだ。"
33095-150 = "さあ……では、お話を紐解いていくとしよう。"
33095-152 = "次回;甘い嘘"

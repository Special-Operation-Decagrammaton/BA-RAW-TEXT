[translation]
3002-1 = "Shadow of the Canned Food Part 2"
3002-5 = "Did you all hear that, too?"
3002-6 = "Yes. That was definitely Miyu screaming."
3002-10 = "She must've been attacked! Let's go!"
3002-15 = "Miyu! Are you okay?!"
3002-16 = "O-Over there...in the f-food storage..."
3002-17 = "Where? Is there someone here?"
3002-18 = "N-No... The canned food over th-there..."
3002-19 = "Which one? The seafood sauce can?"
3002-20 = "Y-Yeah... I-It moved by itself!"
3002-26 = "...Did you fall asleep or something?"
3002-27 = "We thought it was an intruder...but it's sentient cans?"
3002-28 = "Have you been overworking yourself, Miyu?"
3002-30 = "I-I didn't imagine it! And I wasn't dreaming!"
3002-31 = "I p-promise... It made these weird c-clicking noises and m-moved."
3002-32 = "Here, I'll check for you."
3002-38 = "Definitely not alive."
3002-39 = "You must not be getting enough rest between operations."
3002-41 = "N-No, it really w-was shaking and moving..."
3002-42 = "People can begin to hallucinate if they're deprived of sleep. You're in no shape for guard duty!"
3002-44 = "I'll take over the night shift. Get some rest."
3002-45 = "B-But..."
3002-47 = "Don't worry, don't worry."
3002-48 = "They say old ladies never sleep past sunrise."
3002-49 = "Hey! Who you calling an old lady?!"
3002-50 = "Okay, okay. Thank you for covering guard duty, Saki."
3002-54 = "The rest of us will get some rest. Let us know if you need anything."
3002-56 = "...Th-Thanks, Saki. G-Good luck."
3002-68 = "... *click*"
3002-75 = "...The next morning."
3002-76 = "Heehee. Breakfast tastes even better after a long night shift."
3002-77 = "Not only that, but we have so many options!"
3002-82 = "Thanks for your help last night, Saki."
3002-83 = "You should pick first."
3002-84 = "Haha! Thanks, Miyako. I'll take the canned chicken noodle soup."
3002-85 = "The red bean rice and stewed mackerel in miso for me~!"
3002-86 = "I'll go with the Yorkshire pudding and vegetarian omelet."
3002-87 = "Oatmeal p-porridge and chocolate cookies..."
3002-88 = "Nice, everyone got what they wanted. Anything else good?"
3002-96 = "Well... There's the mixed seafood sauce... Does anyone want it? Miyu?"
3002-97 = "E-Eeek..."
3002-98 = "Okay, fair. I wouldn't want to eat a can I thought I saw move, either."
3002-99 = "Moe? C'mon, you'll eat anything. It doesn't smell that bad!"
3002-100 = "Seafood in a can sounds...unsafe..."
3002-101 = "The stewed mackerel in your hand is seafood too, you know."
3002-102 = "...Miyako?"
3002-103 = "I'm fine with my food..."
3002-104 = "We'll just...save it for later, then."
3002-109 = "Okay, time to eat!"
3002-112 = "Thanks for the meal!"
3002-119 = "So the mixed seafood sauce can lay forgotten, until eventually..."
3002-126 = "...it passed its expiration date."

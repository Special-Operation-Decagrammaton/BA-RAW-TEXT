[translation]
3002-1 = "เงาของกระป๋อง 2"
3002-5 = "อะ...อะไรน่ะ เสียงเมื่อกี้นี้?!"
3002-6 = "เป็นเสียงร้องของมิยุแน่นอนเลยค่ะ"
3002-10 = "หรือว่าจะถูกซุ่มโจมตีระหว่างที่กำลังเฝ้าระวังเขตแดนรึเปล่า?"
3002-15 = "มิยุ เกิดอะไรขึ้นน่ะ!"
3002-16 = "คะ... คือว่า... ที่คลังเสบียงอาหาร..."
3002-17 = "คลังอาหารทำไมเหรอ? หรือว่าโดนซุ่มโจมตี?"
3002-18 = "คะ... คือว่า ไม่ใช่อย่างนั้น... กระป๋องตรงนั้นมัน..."
3002-19 = "กระป๋องตรงนั้นเหรอ? ซีฟู้ดคลุกซอสกระป๋องนั่นมันทำไมเหรอ?"
3002-20 = "กระป๋องมัน.. ขยับได้เอง..."
3002-26 = "...อะไรของเธอน่ะ?"
3002-27 = "ฉันก็คิดว่าเกิดเรื่องวุ่นวายอะไรซะอีก แค่กระป๋องขยับเองเนี่ยนะ..."
3002-28 = "ช่วงนี้ทำงานหนักเกินไปหรือเปล่าคะ?"
3002-30 = "มะ... ไม่ได้ตาฝาดไปเองนะ!"
3002-31 = "กระป๋องนั่นมันขยับไปมาเองจริงๆ นะ..."
3002-32 = "ไหนดูซิ..."
3002-38 = "ไม่เห็นจะขยับเลยสักนิดนี่?"
3002-39 = "...สงสัยจะเหนื่อยล้าสะสมเพราะแผนการเมื่อตอนกลางวันสินะคะ"
3002-41 = "เอ๊ะ...? แปลกจัง ก็เมื่อกี้ยังขยับแรงๆ อยู่เลยนี่นา..."
3002-42 = "เหนื่อยจนเห็นภาพหลอนแบบนี้แล้วยังมาเฝ้าระวังเขตแดนอะไรกัน?"
3002-44 = "เอาละ ที่เหลือฉันจะเฝ้าต่อเอง เธอกลับเข้าไปพักเถอะ"
3002-45 = "แต่ว่า..."
3002-47 = "อย่าไปคิดมากน่า ไม่ต้องคิดมากหรอก"
3002-48 = "ได้ยินว่าพวกคุณยายไม่ค่อยนอนตอนเช้ากันใช่มั้ยล่ะ? ซากิเองก็ตื่นแต่เช้ามาคนแรกทุกวัน#nคงไม่เป็นไรหรอก"
3002-49 = "เธอเรียกใครว่ายายน่ะ"
3002-50 = "...ถ้างั้นหน้าที่เฝ้าระวังเขตแดนที่เหลือก็ฝากด้วยนะคะ ซากิ"
3002-54 = "ส่วนสมาชิกคนอื่นก็กลับไปนอนพักที่เต็นท์เถอะค่ะ"
3002-56 = "ขอบคุณนะ ซากิจัง ถ้างั้นก็ฝากด้วยนะ"
3002-68 = "แกรก..."
3002-75 = "(เช้าวันต่อมา...)"
3002-76 = "ฮุฮุ มื้อเช้าหลังจากอยู่เวรทั้งคืนนี่พิเศษจริงๆ ด้วยนะ"
3002-77 = "แล้วยิ่งเมื่อวานยังได้เสบียงอาหารมาเพิ่มเยอะขนาดนั้น ถูกใจมากเลยที่มีตัวเลือกเยอะขนาดนี้"
3002-82 = "ขอบคุณนะคะซากิที่อุตส่าห์อยู่เฝ้าระวังเขตแดนทั้งคืน"
3002-83 = "ถ้าไม่ว่าอะไรก็ เชิญเลือกเมนูก่อนได้เลยค่ะ"
3002-84 = "ถ้างั้นฉัน... ขอซุปก๋วยเตี๋ยวไก่กระป๋องนี้แล้วกัน"
3002-85 = "ฉันขอข้าวถั่วแดงกับปลาแมคเคอเรลเคี่ยวเต้าเจี้ยว!"
3002-86 = "ฉันขอยอร์คเชียร์ พุดดิ้งกับออมเล็ตมังสวิรัติแล้วกันค่ะ"
3002-87 = "ฉะ... ฉัน.. ขอโจ๊กข้าวโอ๊ตกับคุกกี้ช็อกโกแลต..."
3002-88 = "โล่งอกไปนะที่เลือกไม่ซ้ำกันเลย ถ้างั้นเมนูที่เหลือ..."
3002-96 = "ไม่มีใครกินซีฟู้ดคลุกซอสกระป๋องอันนี้เหรอ?"
3002-97 = "เฮือก!"
3002-98 = "ท่าทางมิยุจะยังติดใจกับเรื่องที่เกิดขึ้นเมื่อวานสินะ..."
3002-99 = "โมเอะ เธอกินมั้ย? ถึงกลิ่นจะไม่ค่อยดีเท่าไร แต่ถ้ากินกับข้าวก็น่าจะพอใช้ได้อยู่นะ"
3002-100 = "\nไม่รู้สินะ ฉันไม่ค่อยชอบอาหารทะเลกระป๋อง..."
3002-101 = "ปลาแมคเคอเรลเคี่ยวเต้าเจี้ยวมันก็อาหารทะเลเหมือนกันนะ"
3002-102 = "ถ้างั้นมิยาโกะล่ะ...?"
3002-103 = "วันนี้ฉันเองก็ไม่ค่อย..."
3002-104 = "อย่างนั้นเหรอ งั้นอันนี้ก็เอาไว้กินทีหลังแล้วกัน"
3002-109 = "เอาละ ถ้างั้นก็มากินมื้อเช้ากันเลยมั้ย?"
3002-112 = "จะกินให้อร่อยเลยค่ะ!"
3002-119 = "(หลังจากนั้น ซีฟู้ดคลุกซอสกระป๋องก็ถูกทิ้งไว้โดยไม่มีใครสนใจ...)"
3002-126 = "(...จนกระทั่งวันหมดอายุของมันได้มาถึง)"

[translation]
3002-1 = "罐頭的陰影（２）"
3002-5 = "剛才那個聲音是怎麼回事？！"
3002-6 = "不會錯，是美優的聲音。"
3002-10 = "難道她被襲擊了嗎……？！"
3002-15 = "美優，沒事吧！發生什麼事了！"
3002-16 = "那，那個……糧食倉庫裡……"
3002-17 = "糧食倉庫怎麼了？被人偷襲了嗎？"
3002-18 = "不，不是的……是那邊的罐頭……"
3002-19 = "……罐頭？那個海鮮拌醬罐頭怎麼了？"
3002-20 = "那個罐頭……會自己動……"
3002-26 = "……你睡昏頭了嗎？"
3002-27 = "還以為出什麼事了，居然說罐頭會動……"
3002-28 = "你最近是不是太累了啊？"
3002-30 = "我，我是說真的……！"
3002-31 = "那個罐頭真的自己一直在喀答喀答地亂動……真的……"
3002-32 = "我看看……"
3002-38 = "……它沒在動啊？"
3002-39 = "……一定是因為你累積太多疲勞了。"
3002-41 = "咦……？它剛剛明明就一直劇烈地抖動……"
3002-42 = "竟然會看到幻覺，看來你是真的累壞了……"
3002-44 = "接下來我來站哨就行了，美優趕快回去休息吧。"
3002-45 = "可是……"
3002-47 = "別在意，別在意。"
3002-48 = "咲希本來就會每天一大清早準時起床，不用擔心她啦。"
3002-49 = "少多嘴。"
3002-50 = "……那後續就麻煩你站哨了，咲希。"
3002-54 = "其他成員都回去帳篷好好休息吧。"
3002-56 = "……謝謝你，咲希醬。那就拜託你了。"
3002-68 = "……喀答。"
3002-75 = "（……隔天早晨）"
3002-76 = "呵呵，站完夜哨後的早餐果然別有風味。"
3002-77 = "而且今天早上，能從昨天帶回來的戰備口糧中盡情挑選，更令人期待了。"
3002-82 = "早晨站哨辛苦了，咲希。"
3002-83 = "如果你想的話，就由你先挑吧。"
3002-84 = "既然如此……那我要選這個雞肉湯麵罐頭。"
3002-85 = "我要紅豆飯和味噌鯖魚！"
3002-86 = "我選約克郡布丁和蔬菜歐姆蛋。"
3002-87 = "我，我想吃燕麥粥和巧克力餅乾……"
3002-88 = "大家想吃的都不一樣呢。那這樣就只剩下……"
3002-96 = "這個海鮮拌醬罐頭沒有人想吃嗎？"
3002-97 = "咿，咿咿……"
3002-98 = "既然美優還是很在意昨晚發生的事……"
3002-99 = "那萌，你要吃嗎？雖然味道有點重，不過拌飯吃的話倒是還不錯。"
3002-100 = "嗯──，我不是很喜歡海鮮罐頭……"
3002-101 = "味噌鯖魚不也是海鮮嗎。"
3002-102 = "……那都子呢？"
3002-103 = "我今天也不太想……"
3002-104 = "是喔……好吧，那這個就等以後再吃吧。"
3002-109 = "好了，大家來吃早餐吧。"
3002-112 = "我要開動囉！"
3002-119 = "（後來，那個海鮮拌醬罐頭就這樣放到被大家遺忘……）"
3002-126 = "（……最後還放到保存期限過了）"

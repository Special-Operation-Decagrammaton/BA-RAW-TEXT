[translation]
10016070-1 = "ตอนที่ 7;ความร่วมมือ 2"
10016070-2 = "อะไรกันเนี่ย? ทำไมรถถังนี่ไม่ยอมขยับเลยล่ะ!"
10016070-3 = "[s1] \"ก็เพราะมันไม่ใช่รถถังไง...\"\n[s2] \"เมื่อวานชมรมวิศวกรรมซ่อมจนใช้ฟังก์ชันต่อสู้ไม่ได้สินะ...\""
10016070-4 = "เป็นศัตรูที่อ่อนหัดกว่าที่คิดไว้เสียอีกนะคะ แบบนี้ก็คงไม่ต้องใช้แรงอะไรมากหรอกค่ะ"
10016070-5 = "เป็นศัตรูที่อ่อนหัดกว่าที่คิดไว้เสียอีกนะคะ แบบนี้ก็คงไม่ต้องออกแรงอะไรให้มากหรอกค่ะ"
10016070-6 = "นั่นสินะคะ โล่งอกไปทีที่ไม่เกิดปัญหาใหญ่โต แต่ก็ไม่คิดเลยนะคะว่าจะปราบได้ง่ายๆ ด้วยแรงแค่ไม่#nเท่าไรเอง"
10016070-10 = "อึ้ก... พูดเหมือนพวกเราเป็นคนโง่เลย...!"
10016070-11 = "ถอนกำลังก่อน! พวกฉันจะออกไปเกณฑ์มวลชนที่เห็นด้วยกับการทำงานสัปดาห์ละ 3 วัน แล้วมาสู้เพื่อ#nเรื่องนี้ต่อ!"
10016070-16 = "นี่! หยุดอยู่ตรงนั้นเลยนะ!"
10016070-19 = "สวัสดีค่ะ ผู้ชมช่องโครโนสทุกท่าน! รับประทานอาหารกลางวันกันอิ่มอร่อยเลยหรือเปล่าคะ?"
10016070-20 = "การแข่งขันประเภทบุคคลในช่วงเช้าก็จบไปเป็นที่เรียบร้อยแล้วนะคะ! มาเช็กอันดับของแต่ละโรงเรียน#nกันเลยค่ะ!"
10016070-21 = "ตอนเริ่มการแข่งขัน สถาบันเกเฮนน่าทำคะแนนขึ้นทิ้งห่างมาเป็นอันดับ 1"
10016070-22 = "และอันดับในตอนนี้..."
10016070-23 = "เป็นไปได้ยังไงคะเนี่ย ตอนนี้โรงเรียนวิทย์มิลเลเนียมขึ้นนำมาเป็นที่ 1 แล้วค่ะ!"
10016070-24 = "วิทย์มิลเลเนียมเหรอคะ? ปกติมิลเลเนียมดูจะไม่สันทัดเรื่องออกกำลังกายกันเท่าไร ที่ผ่านมาก็ทำ#nคะแนนในงานแข่งกีฬาได้ไม่ดีอยู่ตลอด เราก็เลยคิดว่าปีนี้จะครองอันดับบ๊วยเหมือนทุกทีเสียอีกค่ะ"
10016070-25 = "หรือว่านี่คือการโชว์ศักดิ์ศรีในฐานะเจ้าภาพคะเนี่ย?"
10016070-26 = "แต่ถึงอย่างไรก็ห้ามประมาทเลยค่ะ เพราะเกเฮนน่ากับทรีนิตี้กำลังไล่ตามมาติดๆ เลย!"
10016070-27 = "ผลการแข่งขันที่ดุเดือดทำให้เราต้องจับตามองการแข่งขันประเภททีมที่จะมีขึ้นในช่วงบ่ายเลยค่ะ"
10016070-28 = "และการแข่งขันในรายการต่อไปก็คือ... <วิ่งผลัดข้ามสิ่งกีดขวาง> ค่ะ!"
10016070-29 = "ได้ชื่อว่าเป็นการแข่งวิ่งผลัดข้ามสิ่งกีดขวาง ก็ต้องเป็นการวิ่งไปด้วย เอาชนะอุปสรรคที่เจอไปด้วย ใช่มั้ยคะ?"
10016070-30 = "ใช่ค่ะ เราจะเห็นได้ว่าตอนนี้ในสนามมีสิ่งกีดขวางการวิ่งของนักกีฬาวางอยู่เต็มไปหมดเลยค่ะ"
10016070-31 = "มีตั้งแต่ <มาคิบิชินินจา> ทั้ง <ฝาขวดที่ขนาดเท่าเหรียญ 500 เยน> ไปจนถึง <ตุ๊กตาน้องแมวที่อยู่ใน#nกล่องที่เขียนว่า 'รับเลี้ยงด้วยเถอะค่ะ'>..."
10016070-32 = "ถ้าเจออะไรแบบนั้นอยู่บนสนาม คงจะกวนใจจนวิ่งไปข้างหน้าลำบากกันแน่ๆ เลยค่ะ"
10016070-33 = "นอกจากนั้นแล้ว ในการแข่งวิ่งผลัดข้ามสิ่งกีดขวางครั้งนี้ยังมีกฎพิเศษเพิ่มเข้ามาด้วยค่ะ"
10016070-34 = "และกฎที่ว่าก็คือ... แทนที่จะเป็นการวิ่งส่งไม้ผลัดธรรมดา เราจะวิ่งส่งระเบิดมือรูปแท่งที่ใส่ท่อจุดชนวน#nอิเล็กทรอนิกส์เข้าไปแทนค่ะ!"
10016070-35 = "ให้วิ่งรับส่งระเบิดมือแทนไม้ผลัดเหรอคะ? จะไม่อันตรายเหรอคะเนี่ย?"
10016070-36 = "ไม่หรอกค่ะ มีคนกระซิบมาว่าหากส่งต่อให้นักวิ่งคนต่อไปได้ในเวลาที่กำหนดก็จะไม่ระเบิดค่ะ"
10016070-37 = "แต่ว่าหากใช้เวลาในการมาถึงจุดของนักวิ่งคนถัดไปนานเกินไปละก็ ระเบิดมือก็จะระเบิดและต้องตกรอบ#nไปค่ะ!"
10016070-38 = "นี่คือกฎเพื่อให้ทีมไม่ผลักภาระให้นักกีฬาคนใดคนหนึ่งโดยเฉพาะ แต่ให้พึ่งพาทุกคนให้เท่ากันสินะคะ"
10016070-40 = "ไม่รู้ว่ามีโรงเรียนไหนสายมูกันบ้างหรือเปล่า แต่ถ้าขอเทพองค์ไหนไว้ก็ขอให้โชคดีกันนะคะ"
10016070-42 = "และนักกีฬาจากอะบิดอสที่จะลงแข่งในการ <วิ่งผลัดข้ามสิ่งกีดขวาง> ในครั้งนี้ก็คือ..."
10016070-43 = "เซริกะจัง รุ่นพี่โฮชิโนะ และรุ่นพี่ชิโรโกะค่ะ"
10016070-47 = "แหะๆ~ กระดูกกระเดี้ยวลุงจะไหวมั้ยนะ"
10016070-48 = "อืม... วางใจได้เลย"
10016070-49 = "ถึงจะมีอะไรแปลกๆ ในการแข่งขันมากกว่าระเบิดมือและลูกแมวที่ถูกทิ้งก็เถอะ..."
10016070-50 = "แต่เพื่อเงินรางวัลชนะเลิศคะแนนรวมจากฮาโลเฟสติวัลแล้ว โรงเรียนเราจะต้องได้อันดับ 1 ในการแข่ง#nรายการนี้ให้ได้!"
10016070-54 = "เฮ้อ... แต่สำหรับโรงเรียนขนาดเล็กของพวกเราแล้ว การได้รางวัลชนะเลิศคะแนนรวมในฮาโลเฟสติวัล มันจะไม่ยากไปหน่อยเหรอคะ...?"
10016070-55 = "เอาเป็นว่าเรามาเต็มที่กับการแข่งขันนี้กันก่อนแล้วกันค่ะ"
10016070-56 = "ถ้าพวกเราแสดงฝีมือที่ยอดเยี่ยมในงานมหกรรมแข่งขันกีฬา ก็อาจจะมีนักเรียนจากโรงเรียนอื่นย้ายมา#nโรงเรียนอะบิดอสก็ได้ค่ะ"
10016070-57 = "เหอะๆ~ อายาเนะจังนี่ไม่รู้อะไรเอาซะเลยน้า~"
10016070-58 = "ถ้าอยากดึงดูดความสนใจของผู้คนในงานอย่างการแข่งขันกีฬา สู้ทำตัวให้เด่นๆ อยู่ข้างๆ อัฒจันทร์ มันได้ผลดีกว่าการโชว์ผลงานดีๆ ในสนามอีกนะ"
10016070-59 = "ข้างๆ อัฒจันทร์เหรอคะ...?"
10016070-60 = "ใช่ค่ะ หมายถึงพวกเชียร์ลีดเดอร์ที่คอยเชียร์อยู่ข้างอัฒจันทร์ไงคะ"
10016070-61 = "วันก่อนรุ่นพี่โฮชิโนะก็บอกกับฉันแบบนั้น ฉันก็เลยเตรียมท่าเชียร์มาด้วย..."
10016070-62 = "ยอดเยี่ยม! ยิ่งใหญ่! เกรียงไกร!"
10016070-63 = "ต้องยกให้!"
10016070-64 = "กองเชียร์ชุดว่ายน้ำ~ ☆"
10016070-65 = "กองเชียร์ชุดว่ายน้ำอีกแล้วเหรอ? อะไรเนี่ย? เห่ยชะมัดเลย!"
10016070-69 = "อืม... ฉันก็เตรียมการเชียร์ของฉันมาเหมือนกัน"
10016070-70 = "รู้สึกใจคอไม่ดีเลยค่ะ..."
10016070-74 = "จรวดพิฆาตรถถังขนาด 60 มม..."
10016070-76 = "ชะ... ใช้ยังไงคะเนี่ย?!"
10016070-77 = "เอาไว้ยิงขู่ไง..."
10016070-78 = "การเพิ่มขวัญกำลังใจของทีมเราก็เป็นสิ่งสำคัญในการเชียร์ แต่การตัดกำลังใจของทีมคู่แข่งก็สำคัญ#nไม่แพ้กัน"
10016070-79 = "ตอนออกตัววิ่ง หากเราถือจรวดพิฆาตรถถังวิ่งไปด้วย นักกีฬาจากทีมอื่นที่เห็นพลังเพลิงที่เหนือกว่าก็#nจะหมดกำลังใจได้"
10016070-80 = "อื้ม~ แผนการใช้ได้เลย เราต้องตัดหน้าก่อนแบบนี้แหละ~"
10016070-81 = "ฮุฮุ น่าสนุกจังเลยนะคะ! ☆"
10016070-84 = "แผนการอะไรแบบนั้น..."
10016070-85 = "จะมีกรรมการที่ไหนอนุญาตให้ใช้ล่ะคะ!"
10016070-87 = "ฮุฮุ... ถึงระเบิดมือรูปแท่งที่ใช้ในการวิ่งผลัดข้ามสิ่งกีดขวางครั้งนี้จะดูเหมือนรุ่นเก่าที่ใช้ชนวนแบบ#nเสียดทาน แต่ที่จริงแล้วใช้ชนวนไฟฟ้าเทคโนโลยีชั้นสูงที่ทำงานตามเซ็นเซอร์ที่ด้ามจับต่างหากค่ะ!"
10016070-88 = "แต่มันก็ถูกสร้างขึ้นอย่างด่วนจี๋เมื่อวาน เลยยังไม่ค่อยมั่นใจว่ามันจะทำงานได้ดีหรือเปล่าค่ะ..."
10016070-89 = "แต่ว่าการทดสอบประสิทธิภาพของสิ่งประดิษฐ์ก็เป็นแนวทางปฏิบัติของ[ruby=ไมสเตอร์]ช่างฝีมือ[/ruby]ที่ดี! ฉันก็เลยจะลงแข่งเพื่อทดสอบค่ะ!"
10016070-90 = "รุ่นพี่อุทาฮะ ฉันจะไปทดสอบชนวนของระเบิดมือให้ค่ะ ระหว่างนี้ฝากเรื่องเชียร์การแข่งขันด้วยนะคะ!"
10016070-94 = "อื้ม เรื่องการเชียร์ให้เป็นหน้าที่ของพวกเราเอง!"
10016070-95 = "ฮือ... ที่จริงฉันอยากลงสนามไปทดสอบเองมากกว่า..."
10016070-96 = "ยังจะมัวมางอแงอยู่อีกเหรอ ฮิบิกิ?"
10016070-97 = "เป็นกองเชียร์ที่ต้องสร้างบรรยากาศให้กับทีมแท้ๆ ถ้ามาทำหน้าหมดพลังแบบนี้อยู่ นักกีฬาจะมีกำลัง#nใจในการแข่งขันได้ยังไงล่ะ!"
10016070-98 = "เอาละๆ ทำหน้าทำตาให้มันสดใสหน่อย!"
10016070-99 = "ออกไปกันเลย! สู้ๆ! สู้ตาย! ไว้ลาย! มิลเลเนียม!"
10016070-100 = "มะ... มิลเลเนียม...!"
10016070-102 = "เฮ้อ... เหนื่อยชะมัดเลย..."
10016070-103 = "ต้องเจอแต่เรื่องแปลกๆ มาตั้งแต่เมื่อคืนแล้ว..."
10016070-104 = "นี่ถ้าฉันหายตื่นเต้นกว่านี้หน่อยคงได้สลบเหมือดไปเลยแน่..."
10016070-105 = "ทุกคนมาออกแรงสู้กันอีกหน่อยนะคะ ฮาโลเฟสติวัลยังไม่จบแค่นี้ค่ะ"
10016070-106 = "ตอนนี้เราก็ยังไม่รู้เลยด้วยค่ะว่าผู้ก่อการร้ายที่เหี้ยมโหดกำลังวางแผนร้ายอะไรอยู่ที่ไหน"
10016070-110 = "เรดาร์ของฉันตรวจจับได้ว่ามีวัตถุขนาดใหญ่กำลังมุ่งหน้าเข้ามาทางสนามนี้..."
10016070-111 = "แบบนี้จะเป็นอะไรมั้ยนะ...?"
10016070-113 = "(เฮ้อ... ไม่อยากลงแข่งในการแข่งขันที่น่ารำคาญใจแบบนี้เลย...)"
10016070-114 = "(แต่อาโกะก็บอกไว้ว่า หากทำคะแนนจนได้อยู่ใน 3 อันดับแรก ก็จะให้ 'บัตรกำนัลอาหารครอบจักรวาล' ที่เอาไปกินอะไรก็ได้ในฮาโลเฟสติวัล...)"
10016070-117 = "(เอาเป็นว่ามาวิ่งให้สุดแรงเกิดก่อนแล้วกัน...?)"
10016070-125 = "นักกีฬาออกตัวไปพร้อมกับเสียงสัญญาณแล้วค่ะ!"
10016070-129 = "ตอนนี้นักกีฬาของเรากำลังวิ่งเร็วสุดใจ!"
10016070-133 = "ผ่านมาคิบิชิที่เป็นสิ่งกีดขวางแรกได้ และส่งต่อไม้ผลัด เอ๊ย! ส่งระเบิดมือให้กับนักกีฬาคนที่สองกัน#nแล้วค่ะ!"
10016070-134 = "และสิ่งกีดขวางชิ้นต่อไปก็คือ..."
10016070-135 = "ครืนนนน—!"
10016070-136 = "เอ๊ะ นี่มันเสียงอะไรกันคะ?"
10016070-141 = "จะ... เจ้าพวกดื้อด้าน..."
10016070-142 = "ยะ... อย่าตามมานะ!"
10016070-148 = "เอ๋? รถถัง?! ทำไมในฮาโลเฟสติวัลถึงมีรถถังด้วยล่ะคะ?"
10016070-149 = "พวกฉันจะอธิบายให้เองค่ะ!"
10016070-150 = "หุ่นยนต์ทรงกลมนี้เป็นหุ่นยนต์เชียร์ที่พวกฉันสร้างขึ้นมาเพื่องานมหกรรมแข่งขันกีฬาค่ะ"
10016070-151 = "เราออกแบบให้เป็นทรงกลมและผนวกเข้ากับล้อตีนตะขาบเพื่อให้สามารถเคลื่อนที่ไปยังจุดต่างๆ ได้อย่างรวดเร็วค่ะ"
10016070-152 = "แต่มันมี 'อุบัติเหตุเล็กน้อย' จนทำให้เราไม่ได้เอามันมาใช้อย่างเป็นทางการน่ะ..."
10016070-154 = "แล้วทำไมมันไปอยู่ตรงนั้นได้ล่ะ...?"
10016070-155 = "ละ... แล้วปืนกลขนาดยักษ์ที่ติดอยู่ตรงด้านหน้าล่ะคะ?"
10016070-156 = "อันนั้นเป็นระบบต่อสู้ที่เราติดตั้งไว้ เวลามีเหตุวุ่นวายหรือก่อการร้ายในสนาม จะได้ปราบปรามได้น่ะ"
10016070-157 = "แต่ไม่ต้องห่วงนะ เราตั้งค่าไว้ให้มันไม่ทำงาน ถ้าไม่มีการก่ออาชญากรรมหรือไม่มีการกระทบกระเทือน#nอย่างรุนแรงละก็ มันก็จะไม่..."
10016070-158 = "ฟี้วววว—"
10016070-159 = "ตู้มม!"
10016070-160 = "รุ่นพี่ชิโรโกะ! ก็บอกแล้วไงว่าอย่าใช้อันนั้นน่ะ!"
10016070-161 = "ใครเค้าใช้จรวดพิฆาตรถถังในการเชียร์กันเนี่ย?!"
10016070-162 = "ไม่ได้หรอกเหรอ..."
10016070-163 = "ก็ไม่ได้น่ะสิ!"
10016070-164 = "อ่า... เหมือนมันจะไปโดนรถถังราคาแพงๆ เลย... จะเป็นอะไรมั้ยนะ..."
10016070-166 = "<ตรวจพบการระเบิดของหัวรบมีที่พลังทะลวงมากกว่า 400 มม. เปิดระบบต่อสู้>"
10016070-167 = "<กำลังค้นหาเด็กเกเรในรัศมี 1 กม.>"
10016070-168 = "<นักเรียนที่มีกระสุนปืน JHP ผิดกฎหมาย 3 คน นักเรียนที่ใส่ชุดกีฬาที่ไม่ได้รับอนุญาต 7 คน และนักเรียนที่เดินกินอาหาร 5 คน...>"
10016070-170 = "เกณฑ์ประเมินเด็กเกเรเข้มงวดกว่าที่คิดอีกนะคะเนี่ย"
10016070-171 = "อัลกอริทึมที่ใช้ในการพัฒนาการเรียนรู้ของ AI คืออัลกอริทึมการตัดสินใจของเซมิน่าน่ะ"
10016070-172 = "ระหว่างนั้นอาจได้รับอิทธิพลจาก 'นักบัญชีที่เยือกเย็น' มาด้วยก็ได้..."
10016070-174 = "<ค้นหาสำเร็จ นับว่านักเรียนทั้งหมดในรัศมี 1 km เป็น 'เด็กเกเร'>"
10016070-175 = "<เดินเครื่อง! ทำลายให้หมดทุกคน>"
10016070-176 = "ตู้มม!"
10016070-178 = "ดะ... เดี๋ยวก่อนสิ! นี่มันอะไรกันเนี่ย? ทำไมถึงมีรถถังในสนามแข่งได้ล่ะ?!"
10016070-180 = "รถถังวิ่งพร่านเพราะการระเบิดเมื่อกี้งั้นเหรอ?!"
10016070-181 = "โธ่เอ๊ย...! เป็นเพราะรุ่นพี่ชิโรโกะคนเดียวเลย!"
10016070-183 = "ว้าย! ควบคุมไม่ได้เลยค่ะ! ระ... รุ่นพี่! ช่วยด้วยค่ะ!"
10016070-184 = "<กำจัดเด็กเกเรที่มาขัดขวางงานมหกรรมแข่งขันกีฬา... เดี๋ยวนี้>"
10016070-186 = "เผยตัวตนออกมาแล้วสินะ ผู้ก่อการร้ายจากมิลเลเนียม!"
10016070-187 = "ในเมื่อเป็นแบบนี้แล้ว ถ้าเราเข้าไปตัดโคจรด้วยระเบิดมือได้ละก็..."
10016070-191 = "เอ๋? ระเบิดมือไม่ทำงาน—"
10016070-193 = "ตู้มม!"
10016070-194 = "ซากิจัง——!"
10016070-196 = "ทะ... ทุกคนคะ เห็นกันหรือเปล่าคะ?"
10016070-197 = "ตอนนี้มีรถถังเข้ามาโจมตีนักเรียนในสนามวิ่งผลัดข้ามสิ่งกีดขวางค่ะ!"
10016070-198 = "ไม่น่าเชื่อเลยค่ะว่าจะมีอาวุธสงครามโผล่ออกมาในเทศกาลแห่งสันติภาพอย่างฮาโลเฟสติวัล..."
10016070-199 = "นี่มันข่าวใหญ่... ไม่สิ เป็นเหตุการณ์ใหญ่ที่ยากที่จะเกิดขึ้นเลยนะคะ!"
10016070-201 = "ยูกะ รถถังนั่นมันอะไรเหรอคะ?"
10016070-202 = "ตอนประชุมตารางการจัดการแข่งขันใน <ฮาโลเฟสติวัล> ไม่เห็นมีแจ้งเลยนะคะว่าจะมีการแข่งขันที่ใช้#nรถถังด้วย"
10016070-203 = "ฉะ... ฉันก็ไม่รู้เรื่องรถถังคันนี้มาก่อนเหมือนกัน!"
10016070-204 = "ตอนเด็กเกเรพูดถึงรถถัง ฉันคิดว่าจะเป็นของก๊อปปี้หรืออะไรทำนองนั้นเสียอีก..."
10016070-205 = "ถึงจะไม่รู้ก็เถอะ แต่เด็กพวกนั้นใช้ถ้อยคำในการพูดเหมือนคุณเลยนะคะ"
10016070-206 = "ทั้ง <ทำลายให้หมด> บ้างละ <สมบูรณ์แบบ> บ้างละ..."
10016070-207 = "ฉันไม่ได้ใช้คำพูดอะไรแบบนั้นสักหน่อย?!"
10016070-208 = "รถถังนั่นมันอะไรกันคะคุณครู? นี่มันเรื่องอะไรกันคะเนี่ย?!"
10016070-209 = "[s3] \"อ่า... อธิบายยังไงดี...\"\n[s4] \"พอจะมีเวลาว่างสัก 2-3 ชั่วโมงมั้ยล่ะ...\""
10016070-212 = "เรื่องอธิบาย เอาไว้แก้ไขสถานการณ์ได้แล้วค่อยทำก็ได้ค่ะ"
10016070-213 = "คุณมารี ก่อนอื่นรบกวนแจ้งให้ผู้ชมอพยพออกจากพื้นที่ก่อนนะคะ"
10016070-214 = "...ได้ค่ะ!"
10016070-215 = "ส่วนนักเรียนที่เหลือทั้งหมด ให้ไปปราบรถถังของศัตรูเป็นอันดับแรกค่ะ!"
10016070-217 = "ทำมาเป็นสั่ง ถึงจะไม่ได้สั่งแบบนี้ ฉันก็กะว่าจะทำอย่างนั้นอยู่แล้วละค่ะ"
10016070-218 = "จริงๆ เลย— จะต้องขอรายงานจากใครก็ตามที่ก่อเรื่องแบบนี้!"

10016070-19 = "1;마이;01\n5;시논;01;안녕하세요, 크로노스 채널의 시청자 여러분! 점심 식사는 다들 맛있게 하셨나요?\n#1;a\n#5;a\n#5;em;[반응]"
10016070-20 = "5;시논;02;개인 대항 종목이 주를 이루었던 오전 경기가 모두 끝난 지금! 학교별 중간 순위를 확인하고 가겠습니다!"
10016070-21 = "1;마이;01;대회가 시작한 직후에는 게헨나 학원이 압도적인 격차로 1위를 차지했는데요."
10016070-22 = "1;마이;01;현재 순위는 과연……\n#1;em;…"
10016070-23 = "1;마이;02;이럴 수가, 놀랍게도 밀레니엄 사이언스 스쿨이 선두로 치고 올라왔습니다!\n#1;hophop"
10016070-24 = "5;시논;04;밀레니엄 사이언스 스쿨이요? 운동과는 거리가 먼 학원이라, 언제나 대운동회에서 나쁜 성적을 기록했기에 이번에도 좋은 성적을 거두지 못할 거라 생각했는데요.\n#5;em;[땀]"
10016070-25 = "5;시논;02;역시 주최교로서의 자존심을 보여주려 하는 걸까요?\n#5;em;[음표]"
10016070-26 = "1;마이;01;하지만 게헨나와 트리니티가 그 뒤를 바짝 뒤쫓고 있으니 방심해서는 안 되겠습니다!"
10016070-27 = "5;시논;03;치열한 승부 덕분에 오후에 있을 학원 대항 종목의 결과가 더욱 주목되는데요."
10016070-28 = "5;시논;00;이어지는 다음 경기는…… <장애물 이어달리기>입니다!\n#5;em;[!]"
10016070-29 = "1;마이;02;장애물 이어달리기라면, 장애물을 극복하며 주자가 이어서 달리는 경기인가요?\n#1;em;[?]"
10016070-30 = "5;시논;01;네. 말씀하신 것처럼 트랙 위에는 선수들의 달리기를 방해하기 위한 장애물이 잔뜩 배치되어 있습니다."
10016070-31 = "5;시논;99;'닌자용 마름쇠' 부터 '500엔짜리 동전처럼 보이는 병뚜껑', '<주워가 주세요>라고 적힌 박스에 담긴 고양이 인형'까지……\n#5;em;…"
10016070-32 = "1;마이;00;과연, 그런 게 트랙 위에 있으면 신경이 쓰여서 달리기 어렵겠네요.\n#1;em;[반응]"
10016070-33 = "5;시논;01;거기에 더해 이번 장애물 이어달리기에는 특별한 룰이 추가되었습니다."
10016070-34 = "5;시논;00;그건 바로…… 배턴 대신 전자식 뇌관을 삽입한 막대형 수류탄을 사용한다는 점입니다!\n#5;em;[!]"
10016070-35 = "1;마이;04;배턴 대신 수류탄을 주고받는다고요? 그럼 위험하지 않을까요?\n#1;em;[땀]"
10016070-36 = "5;시논;02;네, 하지만 일정 시간 내에 다음 주자에게 인계하면 터지지 않는다고 하네요."
10016070-37 = "5;시논;00;하지만 너무 오랜 시간 반환점에 들어오지 못하면 그대로 수류탄이 폭발하면서 탈락합니다!\n#5;hophop"

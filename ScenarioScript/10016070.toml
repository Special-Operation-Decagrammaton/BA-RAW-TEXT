[translation]
10016070-1 = "第7話;合作（２）"
10016070-2 = "這台戰車是怎麼回事！#n為什麼不會動啊！？"
10016070-3 = "[s1]「那是因為它真的不是戰車……」\n[s2]「大概是工程師部昨天修理時關閉了戰鬥功能吧……」"
10016070-4 = "敵人比想像中還要無趣耶。甚至連暖身都算不上。"
10016070-5 = "敵人比想像中還要無趣耶。甚至連暖身都算不上。"
10016070-6 = "我也有同感。#n沒有演變成大問題雖然是件好事，沒想到這麼簡單就壓制住了……讓人有點失望。"
10016070-10 = "唔……竟然直接當著面把人當笨蛋耍……！"
10016070-11 = "可惡！撤退撤退！我們去會場外，把贊成週休4日的同志們集結起來！"
10016070-16 = "啊啊！站住！"
10016070-19 = "克洛盧斯頻道的各位觀眾朋友，午安！有好好享用過午餐了嗎？"
10016070-20 = "以個人對抗項目為主的比賽都已經在上午結束，#n現在讓我們來確認一下各學園當前的排名吧！"
10016070-21 = "雖然格黑娜學園在開幕式後便以壓倒性差距佔據第一名的寶座……"
10016070-22 = "現在的排名究竟──"
10016070-23 = "什麼！目前竟然是千年科學學園躍居榜首！"
10016070-24 = "那個千年科學學園？#n由於是向來和運動無緣的學園，本以為這次的成績也會和往常一樣……"
10016070-25 = "果然是想展現作為主辦學校的自尊心嗎？"
10016070-26 = "不過格黑娜和三一也是緊追在後，千萬不能掉以輕心！"
10016070-27 = "這令人目不轉睛的戰況……讓下午舉辦的學園對抗項目更加值得關注！"
10016070-28 = "緊接而來的比賽是……「障礙賽跑」！"
10016070-29 = "既然叫做「障礙」賽跑，肯定是需要跨過各項障礙的比賽吧？"
10016070-30 = "沒錯。賽道上設置了各種妨礙選手的障礙物。"
10016070-31 = "從「忍者用菱角」到「硬幣大小的瓶蓋」，#n甚至是「外盒上寫著『請收編』的玩偶」……"
10016070-32 = "原來如此，賽道上放著那種東西的話，確實是很難跑呢。"
10016070-33 = "此外，這次的障礙賽跑還新增了一項特殊規則。"
10016070-34 = "那就是……用柄式手榴彈代替接力棒！"
10016070-35 = "用手榴彈代替接力棒？#n這樣不會很危險嗎？"
10016070-36 = "沒錯。但只要在一定時間內將手榴彈交給下一位跑者就能避免爆炸。"
10016070-37 = "如果花費太多時間卻沒有進入折返點，就會因為手榴彈爆炸而淘汰哦！"
10016070-38 = "原來如此，看來這是為了不仰賴特定選手，讓大家都能全力以赴所採取的措施。"
10016070-40 = "那麼……在這場比賽中，勝利女神將會向哪一個學園露出微笑呢？"
10016070-42 = "代表阿拜多斯參加「障礙賽跑」的選手是……"
10016070-43 = "是茜香醬、星野前輩以及白子前輩。"
10016070-47 = "唔嘿～好緊張啊。"
10016070-48 = "……嗯，交給我吧。"
10016070-49 = "手榴彈、驚嚇箱……比賽裡好像混進了一些奇奇怪怪的東西……"
10016070-50 = "不過為了獲得晄輪大祭的總冠軍獎金，這場比賽一定要拿下第1名！"
10016070-54 = "啊哈哈……雖然是這麼說沒錯，#n但像我們這種弱小的學園要奪下總冠軍應該很困難吧……？"
10016070-55 = "不過……還是請大家全力以赴。"
10016070-56 = "如果我們在大運動會上表現出色的話，#n說不定能吸引學生們轉校到阿拜多斯高中。"
10016070-57 = "唔嘿～綾音醬還是太嫩了～"
10016070-58 = "想在大運動會上吸引目光的話，比起在運動場上努力，#n不如花時間在觀眾席上會更有效果。"
10016070-59 = "……觀眾席嗎？"
10016070-60 = "對！在觀眾席上的啦啦隊……沒錯，就是應援合戰！"
10016070-61 = "我聽了星野前輩的話，事先準備了些應援口號……"
10016070-62 = "加油！"
10016070-63 = "加油！"
10016070-64 = "泳裝應援團～☆"
10016070-65 = "泳裝應援團是什麼啦！？#n就沒有更好的名字嗎！？"
10016070-69 = "……嗯，如果是應援的話，我也有準備。"
10016070-70 = "有種不祥的預感……"
10016070-74 = "……60mm反戰車火箭筒。"
10016070-76 = "……這是要做什麼！？"
10016070-77 = "威嚇射擊。"
10016070-78 = "雖然可以透過加油來提升我方的士氣，但降低對方的士氣也很重要。"
10016070-79 = "如果在接力賽中拿著這個反戰車火箭筒進入賽道，#n對方一看見這壓倒性的火力差距，肯定會士氣低落。"
10016070-80 = "哎呀～聽起來不錯呢。#n戰鬥果然就是要先給對方來個下馬威～"
10016070-81 = "呵呵，感覺很有趣呢☆"
10016070-84 = "那種事……"
10016070-85 = "那種事怎麼可能會被允許啊！"
10016070-87 = "呵呵……#n障礙賽跑中使用的柄形手榴彈看起來是使用了摩擦式延遲引信的舊型號……#n但實際上是使用了最先進的電子引信！"
10016070-88 = "不過，因為是昨天匆忙製作的，所以有點擔心能不能正常啟動……"
10016070-89 = "因此……親自參加比賽測試性能，才稱得上是[ruby=巨匠]職人[/ruby]吧？"
10016070-90 = "那麼，詠葉前輩。#n手榴彈的測試就交給我，拜託你為選手們應援囉！"
10016070-94 = "嗯，應援就交給我吧！"
10016070-95 = "唔……我也想去親自確認……"
10016070-96 = "怎麼還在說那種喪氣話呢，響。"
10016070-97 = "應援團如果露出那種表情，選手們也會發揮不了實力不是嗎？"
10016070-98 = "來，露出笑容！用腹式發聲喊出口號！"
10016070-99 = "上吧！上吧！獲勝吧！千年！"
10016070-100 = "千，千年……！"
10016070-102 = "唉……"
10016070-103 = "連續兩天都被捲入奇怪的事件……真累人……"
10016070-104 = "感覺只要稍微鬆懈下來就會立刻倒下……"
10016070-105 = "還有一點時間，大家再加把勁。#n晄輪大祭還沒有結束。"
10016070-106 = "目前還不清楚窮凶極惡的恐怖份子會在何處搗亂。"
10016070-110 = "喂，雷達捕捉到一個巨大物體正在往這裡靠近……"
10016070-111 = "這個……沒問題嗎……？"
10016070-113 = "（唉……我明明不想參加這麼麻煩的比賽……）"
10016070-114 = "（但亞子說只要進入前3名的話，#n　就會給我能享用晄輪大祭中所有美食的「萬能餐券」……）"
10016070-117 = "（總之先努力一下吧……？）"
10016070-125 = "那麼，開始的信號聲響起了！選手們一起衝了出去！"
10016070-129 = "以猛烈的氣勢在賽道上奔馳著！"
10016070-133 = "順利通過了第一道障礙「菱角賽道」，#n把接力棒──更正，把手榴彈交給了第二棒的跑者！"
10016070-134 = "下一道障礙是……"
10016070-135 = "（轟隆隆隆隆隆隆！）"
10016070-136 = "咦？這是什麼情況？"
10016070-141 = "真，真是煩人啊……"
10016070-142 = "別跟過來啊！"
10016070-148 = "哎呀！！這是怎麼回事！？#n戰車！賽道上突然出現了戰車！"
10016070-149 = "關於這個就交由我們工程師部來說明吧！"
10016070-150 = "這個機器人是我們工程師部為大運動會所製造的應援機器人。"
10016070-151 = "為了在任何場所都能迅速地移動，我們將它的身體設計成空氣阻力較低的球形，#n並配上可以跨越台階的履帶！"
10016070-152 = "不過因為發生了點「小問題」，所以還沒有正式啟用……"
10016070-154 = "為什麼它會出現在這裡呢……？"
10016070-155 = "竟然是應援機器人！#n不過，看到那管巨大的機關砲後，要稱呼它為應援機器人似乎有點勉強呢？"
10016070-156 = "啊啊。那是為了在發生騷動或恐怖攻擊時能立即鎮壓而搭載的戰鬥系統。"
10016070-157 = "當然現在已經調整成不會隨意啟動。#n沒錯……只要不對它產生強烈的衝擊，就不會發生異常──"
10016070-158 = "（噗咻──）"
10016070-159 = "（咚哐──！）"
10016070-160 = "白子前輩！都說了不能用那個！"
10016070-161 = "哪有應援團會發射反戰車火箭的啦！？"
10016070-162 = "不行嗎……"
10016070-163 = "肯定不行吧！"
10016070-164 = "哇啊……感覺是很昂貴的戰車。#n不要緊吧……"
10016070-166 = "＜感知到具備400mm以上穿透力的彈頭爆炸。啟動戰鬥系統。＞"
10016070-167 = "＜正在探測半徑1km以內的不良學生……＞"
10016070-168 = "＜持有違法JHP子彈的學生3名、穿著未經許可的自製體育服的學生7名、#n　邊走邊吃的學生5名……＞"
10016070-170 = "……判斷不良的標準比想像中還要嚴格呢。"
10016070-171 = "因為在AI的機器學習上使用了研討會的決策演算法。"
10016070-172 = "可能是在過程中受某個「冷酷計算機」所影響……"
10016070-174 = "＜調查完畢。將半徑1km內的所有學生都視為「不良學生」。＞"
10016070-175 = "＜對全員進行──因數分解！＞"
10016070-176 = "（咚哐──！）"
10016070-178 = "喂，那是怎樣！？#n為什麼會有戰車啊！？"
10016070-180 = "剛才的火箭彈讓戰車失控了！？"
10016070-181 = "真是的……！這都是白子前輩的錯吧！"
10016070-183 = "哇，哇啊！失去控制了！#n前輩──！請救救我！"
10016070-184 = "＜妨礙大運動會圓滿舉辦的不良學生……立即排除。＞"
10016070-186 = "終於現身了嗎，千年的恐怖份子！"
10016070-187 = "既然這樣，只能用手榴彈炸斷履帶了……"
10016070-191 = "……哎呀？手榴彈沒有反應──"
10016070-193 = "咚哐──！"
10016070-194 = "咲，咲希醬──！"
10016070-196 = "大，大家……看到了嗎？"
10016070-197 = "有戰車闖入了障礙賽跑，正在攻擊學生！"
10016070-198 = "在本應攜手努力的晄輪大祭上，竟然出現了那種東西……"
10016070-199 = "這可是史無前例的大新聞……不，大事件呢！"
10016070-201 = "優香，那輛戰車到底是？"
10016070-202 = "我沒聽說過「晄輪大祭」有會使用到那種戰車的比賽啊？"
10016070-203 = "我，我也沒聽說過會有那種戰車啊！"
10016070-204 = "因為剛才的問題學生，我以為它只是紙糊的仿品……"
10016070-205 = "雖然你嘴上這麼說，但它可是正在用跟你相似的口吻大吵大鬧呢。"
10016070-206 = "什麼「進行因數分解～」或是「完美～」什麼的……"
10016070-207 = "那個是在模仿我說話嗎！？"
10016070-208 = "話說老師，那輛戰車到底是怎麼回事？#n昨天我睡著的時候究竟發生了什麼！？"
10016070-209 = "[s3]「那個，該怎麼說呢……」\n[s4]「這說來話長……」"
10016070-212 = "晚點再說明也不遲。"
10016070-213 = "瑪麗同學，請先引導觀眾們去避難。"
10016070-214 = "……好，好的！"
10016070-215 = "剩餘的人就去癱瘓戰車吧！"
10016070-217 = "不用你說我也打算這麼做！"
10016070-218 = "真是的！#n老師，請做好之後要繳交檢討報告的覺悟！"

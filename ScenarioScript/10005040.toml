[translation]
10005040-1 = "第4話;峰迴路轉一如往常"
10005040-2 = "遊憩大廳．後方走廊"
10005040-5 = "……Clear，沒有異常。"
10005040-6 = "我這裡也沒問題。"
10005040-7 = "後面呢？"
10005040-9 = "沒問題。"
10005040-10 = "現在說可能有點晚了，真的是這裡嗎……我對這種種不確定感到十分後悔。#n那個時候，要是我有稍微手下留情的話……"
10005040-11 = "請別在意，花凜。是我有錯在先。"
10005040-12 = "而且現在比起走投無路好多了。#n畢竟我們最終還是知道了該去的地方。"
10005040-13 = "說的也是。那個警備員昏過去之後，嘴裡還是一直喃喃唸著「遊憩大廳」……"
10005040-14 = "我想他在昏過去之前應該就在重複這句話了……#n只是因為嘴巴被封住的關係，所以我們才沒聽懂……"
10005040-15 = "不過比起那個，「遊憩大廳」指的是……？"
10005040-16 = "就跟導覽書上寫的一樣，是在中央的大房間的名字吧？"
10005040-17 = "不，那個我知道……"
10005040-18 = "你想問的是，那裡是用來做什麼的房間吧？"
10005040-19 = "確實，我也不太理解它的意思……"
10005040-20 = "會跟那孩子發行的債券有關嗎？"
10005040-21 = "老師您怎麼看？"
10005040-22 = "[s1]「這個嘛……」\n[s2]「從字面上來看，應該是『遊樂場』的意思吧……」"
10005040-24 = "這樣啊……"
10005040-26 = "感覺是呢……"
10005040-28 = "算了，不管是什麼都無所謂吧。要做的事情跟以前一樣。"
10005040-29 = "那裡是什麼地方都沒關係。#n總之就是衝進去除掉所有擋路的人，把白兔那傢伙綁回去。"
10005040-30 = "和平時做的事沒什麼兩樣，對吧？"
10005040-31 = "沒錯，基本上也只能那麼做了……#n要說附加條件的話，就是這次要盡可能安靜地進行而已。"
10005040-32 = "反正，本來計畫的步驟也已經亂成一團了……"
10005040-33 = "那麼再重複一次，這次的目標只有「白兔」而已。"
10005040-34 = "進入「遊憩大廳」後就各自分頭去尋找白兔。#n一旦發現白兔請立刻聯絡其他人。"
10005040-35 = "迅速地制伏白兔後，儘速離開這艘船吧。"
10005040-36 = "請不要使用煙霧彈和閃光彈之外的武器。#n再把事情鬧大的話可是會被罵的。"
10005040-37 = "此外，避免不必要的戰鬥。請不要做出把警衛全部打倒這種事……#n就照著這種感覺行動吧。"
10005040-38 = "唉，怎麼又有一堆麻煩的條件……"
10005040-39 = "[s3]「我知道這可能有點困難，不過還是拜託你囉，寧瑠。」\n[s4]「我相信你一定能辦得到，寧瑠。」"
10005040-43 = "……"
10005040-44 = "啊啊真囉嗦！就算不說那種場面話我也會做的！"
10005040-45 = "你以為我是誰啊，這點小事不算什麼。"
10005040-46 = "看著吧。我會很快找到他，安靜地往他後腦勺來一拳，迅速把他帶回來的。"
10005040-47 = "那麼就開始吧。"
10005040-48 = "好。啊，老師就跟我來吧。#n要是發生什麼事的話我會保護你的，不用擔心。"
10005040-49 = "……那麼，作戰開始！"
10005040-51 = "遊憩大廳"
10005040-53 = "哦……"
10005040-54 = "這裡就是「遊憩大廳」啊……？"
10005040-55 = "怎麼說呢……不就是個豪華的遊戲中心嗎？"
10005040-60 = "歡迎來到遊憩大廳！各位看起來對這裡很好奇呢，是第一次來這裡嗎？"
10005040-61 = "……啊？"
10005040-62 = "初次見面，我是負責導覽這裡的大廳嚮導！"
10005040-63 = "負責向各位說明使用方法和規則。"
10005040-64 = "首先，在「黃金芙利號」上的服務，會因為在這裡的遊戲裡獲得的財貨而有所改變，#n這點各位應該清楚吧？"
10005040-65 = "遊戲……？"
10005040-66 = "哎呀，來這裡的時候沒有向各位說明嗎……？"
10005040-67 = "那麼我重新說明一次，這艘船上的所有服務……#n無論是住宿設施、遊戲設施，就連洗手間都會由遊戲中獲得的兌換券來決定服務的等級。"
10005040-68 = "等級由低到高分別為D至S，#n基本上只要獲得「A」就能夠以最高待遇享受所有船上的服務！"
10005040-69 = "[s5]「也就是說……」\n[s6]「到達『S』後，會有什麼特別的服務……？」"
10005040-70 = "呵呵，沒錯。但是「S」就算說是傳說一般的存在也不為過。"
10005040-71 = "呵呵，沒錯。但是「S」就算說是傳說一般的存在也不為過。"
10005040-72 = "在黃金芙利號上，可以說是超越法規的──"
10005040-73 = "呃啊啊啊啊啊！！"
10005040-74 = "……怎麼了？"
10005040-80 = "不行了！！又停在C了！"
10005040-81 = "總，總算抽到B了……"
10005040-82 = "咦，你抽到「B」了嗎！？#n「B」和「C」不同，咖哩飯上會有炸雞對吧！？"
10005040-83 = "如果是「A」的話會變成什麼樣呢？感覺服務會變得特別好？"
10005040-84 = "確實會比B好多了吧。不過跟S級比起來完全是小巫見大巫。"
10005040-85 = "聽說只要有S級的「VIP票」的話，就可以無視這艘船上的所有校規……"
10005040-86 = "無視校規……？可以那樣……？"
10005040-88 = "哦，看來有客人從C級提升到B級了呢！恭喜您！！"
10005040-89 = "其他客人們也一起努力提升等級吧～～！！"
10005040-91 = "……那是在做什麼？"
10005040-92 = "那個巨大螢幕上的那傢伙的等級提高了？為此而慶祝嗎？真搞不懂。"
10005040-93 = "[s7]「看來在這艘船上，等級是非常重要的呢。」\n[s8]「以遊戲的結果決定一切的世界……」"
10005040-94 = "哼……所以這些傢伙才會完全不在意周圍，只盯著機器看啊。"
10005040-95 = "哼……所以這些傢伙才會完全不在意周圍，只盯著機器看啊。"
10005040-96 = "這些傢伙也不去學校，一直在這裡做這種事嗎……？"
10005040-97 = "……什麼？"
10005040-98 = "原來我也會在意這種事……？"
10005040-99 = "少，少囉嗦！我雖然常常遲到，但不會曠課好不好！#n你把我當成什麼人了啊！？"
10005040-100 = "總之，現在重要的不是那個……"
10005040-101 = "……就算那傢伙在這裡，確實也不奇怪。"
10005040-102 = "每個人都像著魔了一樣，又吵到聽不見其他人說話。"
10005040-103 = "不想工作、不想做麻煩的事、不想被任何人束縛……#n這裡對那傢伙來說再適合不過了。"
10005040-105 = "雖然這麼說……"
10005040-106 = "假設那傢伙真的在這裡的話……"
10005040-107 = "究竟在做什麼呢……？"
10005040-111 = "[ns9]「寧瑠？」\n[ns10]「怎麼了？」"
10005040-112 = "……找到了。"
10005040-113 = "……找到了。"
10005040-114 = "在那裡……能看到嗎？坐在深處那邊的傢伙。"
10005040-118 = "啊哈──！今天感覺還行呢！"
10005040-119 = "今天就先見好就收……"
10005040-120 = "……不，既然氣勢正旺應該再玩一下吧……？"
10005040-124 = "好，要上囉！！加油啊小雪，你可以的小雪！！#n相信自己的力量！傳說的「S」肯定就在眼前……！"
10005040-129 = "……呃，怎麼是B。才不需要咧！？"
10005040-130 = "吶～怎麼會這樣──！？怎麼可能，以為我今天丟了多少錢進去了啊！？#n保底的S也差不多該出來了吧！"
10005040-131 = "這樣我要什麼時候才能成為VIP啊！！我已經等不下去了────！！！"
10005040-136 = "請，請住手！不要敲打機器……！不然要禁止客人進入了哦！"
10005040-137 = "唔……"
10005040-138 = "對，對不起……"
10005040-144 = "[ns11]「……就是那個孩子？」\n[ns12]「意外的一下就找到了呢？」"
10005040-145 = "啊啊，沒錯……"
10005040-146 = "啊啊，沒錯……"
10005040-147 = "那個沉迷於遊戲，完全沒注意到我們的小鬼就是「白兔」。"
10005040-148 = "真是，還以為他在做些什麼……"
10005040-149 = "原來只是把發行債券拿到的錢，全都丟進遊戲裡而已嗎……？"
10005040-150 = "真無聊……就因為那種事，害我們特地跑到這裡來……！"
10005040-151 = "[s13]「不過，不是更糟的事情真是太好了。」\n[s14]「原來如此，是個自由的孩子呢。」"
10005040-152 = "……唉。"
10005040-153 = "……唉。"
10005040-154 = "不過比起和研討會的會計說的一樣，在這裡策畫什麼陰謀……#n他這樣或許也算不錯了。"
10005040-155 = "……雖然就算他真的那麼做也無所謂。"
10005040-159 = "啊，啊……能聽見嗎？發現「白兔」了，到我所說的位置集合。"
10005040-160 = "哎呀，知道了。"
10005040-161 = "了解，立刻過去。"
10005040-165 = "看來這樣就結束了呢。"
10005040-166 = "雖然只是短暫的時間，老師辛苦了。"
10005040-167 = "等花凜跟朱音過來，就能告一段落了吧。"
10005040-168 = "那傢伙似乎也完全沒有──"
10005040-175 = "竟然竟然！這位明日奈小姐，第10次就獲得了A級！"
10005040-176 = "恭喜！是否會乘著這股氣勢，一口氣升上S級成為VIP呢？"
10005040-177 = "注意到，我，們……"
10005040-181 = "……啊？"
10005040-182 = "[s15]「明日奈……？」\n[s16]「現在明日奈直接出現在超大的畫面上……」"
10005040-183 = "咦，咦？騙人的吧？"
10005040-184 = "咦，咦？騙人的吧？"
10005040-185 = "咦！？剛才那不是明日奈前輩嗎！？"
10005040-186 = "為，為什麼會在這裡……！？"
10005040-187 = "也就是說……"
10005040-188 = "該不會……？"
10005040-189 = "……呿。"
10005040-193 = "[ns]「你好呀。」"
10005040-194 = "唔哇啊啊──！？你好哇──！？"
10005040-195 = "警備員姐姐！！這裡有入侵者！#n有入侵者唷────！！！！"
10005040-196 = "什麼，有入侵者！？"
10005040-197 = "在那裡在那裡！"
10005040-198 = "快把他們抓起來！"
10005040-199 = "所有人集合！！抓住這些嫌犯！！"
10005040-210 = "喂，老師。退後吧。接下來……"
10005040-211 = "……這傢伙，絕對不會讓他逃了。"

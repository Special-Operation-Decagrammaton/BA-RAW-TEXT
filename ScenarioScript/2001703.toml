[translation]
2001703-1 = "少女依然不放棄"
2001703-2 = "再開發地區．預計拆除的大樓內部"
2001703-3 = "啊，啊……！？"
2001703-4 = "老，老師怎麼在這裡……！？"
2001703-5 = "不管在哪裡都會被找到……逃不出老師的手掌心……"
2001703-6 = "好可怕……這就是大人……"
2001703-7 = "[s]「我很好奇你說的『好事』是什麼。」"
2001703-8 = "耶嘿嘿……就是呀，我想和老師分享，就算生活這麼苦也還是能有小確幸……"
2001703-9 = "如果剛剛相片有傳出去就更好了……但反正現在直接見面了，這樣也好。"
2001703-10 = "其實……是因為今天大豐收，想要跟老師炫耀一下……耶嘿嘿……"
2001703-11 = "[s]「豐收……？」"
2001703-12 = "沒錯，先從這個開始。"
2001703-16 = "（日和拿出一綑泛黃的廢紙）"
2001703-17 = "[s]「一綑廢紙……？」"
2001703-18 = "沒，沒錯……#n這是我從廢紙回收箱撿來的……月刊雜誌《ron-ro》合併號……雖然是去年的。"
2001703-19 = "這可是很稀有的雜誌唷……就連D.U.市中心的大型書店也不一定會有……"
2001703-20 = "再加上因為我們到處流浪而沒辦法用網購，要買電子書也沒無法線上付款……#n這種事幾乎是可遇不可求……"
2001703-21 = "可是我卻撿到了這種超稀有珍品！而且有8本！"
2001703-22 = "[s1]「恭……恭喜你。」\n[s2]「這麼多本……原來日和喜歡時尚雜誌啊。」"
2001703-23 = "耶嘿嘿……雜誌裡有很多神奇的內容，看雜誌一點都不無聊……#n而且專題也都很好看……"
2001703-24 = "耶嘿嘿……雜誌裡有很多神奇的內容，看雜誌一點都不無聊……#n而且專題也都很好看……"
2001703-25 = "除了《ron-ro》之外，我還撿到了超過20本《BiBi》。"
2001703-26 = "上次寒流來襲時，全部被我們當柴火用掉了……"
2001703-27 = "雖然那些書都非常珍貴……可是總不能讓自己被凍死……"
2001703-28 = "但我還是想看「海邊小惡魔！新作泳裝大盤點！」、#n「貼身取材！D.U.時尚教主五大必敗精選」這兩個專欄啊……"
2001703-29 = "可是全被燒掉了……塵歸塵土歸土……人生就是這樣……就是這麼痛苦……#n現在回想起來還是會很糾結當時有沒有其他辦法……人生真是充滿後悔呢……"
2001703-30 = "[s]「冷，冷靜點，日和……」"
2001703-31 = "……"
2001703-32 = "……啊，啊啊。差點又把話題帶到奇怪的方向了。"
2001703-33 = "總，總之！我就是想分享我這次非常幸運！"
2001703-34 = "反正也只能向老師分享……#n其他人聽了只會說聲「這樣啊」，表現得非常冷漠……"
2001703-35 = "啊，還有其他東西唷！"
2001703-39 = "（日和拿出一個生鏽的鐵箱）"
2001703-40 = "[s]「這是，急救箱……？」"
2001703-41 = "耶嘿嘿……沒錯。雖然箱子很破舊，但裡面放滿了常備藥物。#n有胃腸藥，感冒藥，退燒塞劑，消毒用酒精……"
2001703-42 = "醫療用品不都很昂貴嗎，所以這種東西也特別少見！"
2001703-43 = "事先備好常備藥物是非常重要的。還記得我上次吃了半顆爛掉的蘋果……#n結果居然在床上躺了三天。要是當時手邊有胃腸藥的話……"
2001703-44 = "[s3]「這觀念怎麼好像不太對勁……？」\n[s4]「你吃了爛掉的蘋果！？」"
2001703-45 = "因為肚子實在太餓了嘛……我平常才不會那麼飢不擇食。"
2001703-46 = "因為肚子實在太餓了嘛……我平常才不會那麼飢不擇食。"
2001703-47 = "只要有常備藥物，總覺食物壞了也有辦法吃下去……"
2001703-48 = "[s] （不，不行。放任不管會出大事的……！）"
2001703-49 = "而且這些藥可厲害了……"
2001703-50 = "咦？老師……？"
2001703-51 = "[s]「日和，能跟我去一個地方嗎？」"
2001703-52 = "啊，好的！？我知道了……請問，怎麼這麼突然……！？"
2001703-55 = "感冒液，胃腸藥，消毒藥，退燒藥……"
2001703-56 = "謝謝您的惠顧。"
2001703-57 = "……"
2001703-58 = "[s]「藥品也是有有效期限的……你用這些吧。」"
2001703-59 = "……便利商店也買得到藥喔。"
2001703-60 = "我，我又欠老師人情了。啊……我是不是已經完蛋了。"
2001703-64 = "我，我難道脫離不了大人的魔掌了嗎！？"
2001703-65 = "嗚哇！既然如此一不做二不休……請把這些也買給我吧……"
2001703-66 = "[s]「……這些也請幫我結帳。」"
2001703-70 = "《ron-ro》和《BiBi》最新刊，謝謝您的惠顧。"
2001703-71 = "嗚哇……這下我真的完蛋了。不過，我會心存感激拜讀的，老師！"
2001703-73 = "（帶著悲喜交織，已經語無倫次的日和離開了便利商店）"

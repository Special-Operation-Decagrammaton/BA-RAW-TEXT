2001703-70 = "1;직원;04;<ron-ro>와 <BiBi> 최신호 둘 다 결제완료했습니다.\n#1;em;[땀]\n#1;stiff"
2001703-71 = "5;히요리;11;으아아앙-! 고마워요. 그치만 망했어요. 완전히 망했네요. 잘 볼게요, 선생님! 망했지만 잘 볼게요.\n#5;hophop"

[translation]
2001703-1 = "#title;소녀는 그래도 포기하지 않는다"
2001703-2 = "#place;재개발 지구의 철거 예정인 건물 안의 으슥한 안쪽"
2001703-3 = "3;히요리;10;아, 앗……!?\n#3;a\n#3;em;[?!]"
2001703-4 = "3;히요리;10;서, 선생님이 어째서 여기에……!"
2001703-5 = "3;히요리;03;……그, 그렇군요. 어딜 가나 선생님의 손바닥 안인 거네요……."
2001703-6 = "3;히요리;04;무서워…… 무서워…… 어른…….\n#3;stiff\n#3;em;[속상함]"
2001703-7 = "[s] \"좋은 일이 있다길래 와봤어.\""
2001703-8 = "3;히요리;03;……헤헤. 그러네요. 이렇게 고통스러운 삶 속에서 약간의 행복이라도 있으면 나눠야 하는 법인 거죠……."
2001703-9 = "3;히요리;03;휴대폰이 사진 전송이라도 잘 되면 더 행복하겠지만…… 뭐, 이렇게 직접 오셨으니까 상관없겠네요."
2001703-10 = "3;히요리;03;실은…… 오늘 수확이 꽤 대단해서 자랑하고 싶었달까……. 헤헤…….\n#3;stiff"
2001703-11 = "[s] \"수확……?\""
2001703-12 = "3;히요리;03;네! 일단은 먼저 이것부터.\n#3;em;[반짝]"
2001703-13 = "#st;[0,0];instant;1;"
2001703-14 = "#clearST"
2001703-15 = "3;히요리;03\n#3;greeting\n#wait;1500"
2001703-16 = "#na;(히요리가 낡은 폐지 묶음을 꺼내왔다.)"
2001703-17 = "[s] \"어…… 이건 폐지 묶음……?\""
2001703-18 = "3;히요리;10;네?! 폐지라뇨? 무, 물론 폐지 수거함에서 주워오긴 했지만…… 이건 월간 잡지<ron-ro>의 재작년 모음집이에요.\n#3;em;[?!]\n#3;shake"
2001703-19 = "3;히요리;03;쉽게 구할 수 없는 희귀한 잡지거든요…… D.U.의 시내 한복판의 대형 서점에서나 간신히 볼 수 있는……."
2001703-20 = "3;히요리;04;게다가 저희는 떠돌아다니는 신세니 우편 배송 같은 것도 안 되고, 웹으로 보려고 해도 유료 결제를 해야만 하고…… 저희에게는 그림의 떡 같은 존재인데…….\n#3;em;…"
2001703-21 = "3;히요리;10;그런 초레어한 물건을 폐지 수거함에서 주웠단 말이에요! 그것도 8권씩이나!\n#3;closeup\n#3;hophop"
2001703-22 = "[s1] \"어…… 축하해.\"\n[s2] \"히요리는 이런 걸 좋아하는구나?\""
2001703-23 = "3;히요리;03;헤헤헤…… 뭔가 신기한 게 많아서 보고 있으면 지루하지 않으니까…… 특집 기사도 재미있고, 패션 사진 같은 것도 계속 보게 되고…….\n#3;em;[///]\n#3;stiff"
2001703-24 = "3;히요리;03;헤헤헤…… 뭔가 신기한 게 많아서 보고 있으면 지루하지 않으니까…… 특집 기사도 재미있고, 패션 사진 같은 것도 계속 보게 되고…….\n#3;em;[///]\n#3;stiff"
2001703-25 = "3;히요리;03;<ron-ro> 말고도 <BiBi> 도 20권 넘게 모았었어요."
2001703-26 = "3;히요리;04;저번에 한파가 몰아쳤을 때 땔감으로 다 써버렸지만…….\n#3;em;[속상함]\n#3;stiff"
2001703-27 = "3;히요리;04;굉장히 아끼던 거였는데…… 그래도 얼어 죽는 것보단 나으니까……."
2001703-28 = "3;히요리;04;특히 <치명적인 매력을 뽐낸다! 신상 수영복 20종 리뷰!>랑, <밀착취재! D.U. 패션 리더들의 필수 아이템 top.5> 기사는 아직 다 보지도 못했는데……."
2001703-29 = "3;히요리;04;불타버렸죠…… 재는 재로…… 흙은 흙으로…… 인생이란 그런 것…… 괴로운 것……. 지금 생각해보면 뭔가 다른 방법이 있지 않았을까 싶지만…… 어차피 인생은 돌아보면 후회뿐이고…….\n#3;em;…"
2001703-30 = "[s] \"지, 진정해. 히요리…….\""
2001703-31 = "3;히요리;04;……."
2001703-32 = "3;히요리;03;……아, 아아. 또 이상한 곳으로 가버릴 뻔했어요.\n#3;em;[땀]\n#3;stiff"
2001703-33 = "3;히요리;05;아무튼! 이런 굉장한 행운을 자랑하고 싶었던 거예요."
2001703-34 = "3;히요리;03;어차피 자랑할 사람이 선생님 밖에 없고…… 다른 사람들은 그런가? 하는 표정으로 심드렁하기만 하고…….\n#3;stiff"
2001703-35 = "3;히요리;03;아, 이것 말고도 하나 더 있어요!\n#3;em;[반응]\n#3;hophop"
2001703-36 = "#st;[0,0];instant;1;"
2001703-37 = "#clearST"
2001703-38 = "3;히요리;03\n#3;greeting\n#wait;1500"
2001703-39 = "#na;(히요리가 반쯤 녹슨 철제 상자를 꺼냈다.)"
2001703-40 = "[s] \"이건…… 녹슨 구급상자……?\""
2001703-41 = "3;히요리;03;헤헤헤…… 맞아요. 케이스는 낡았지만 안에는 한번도 쓰지 않은 상비약이 있다구요. 소화제, 감기약, 해열용 좌약, 소독용 알코올…….\n#3;em;[///]"
2001703-42 = "3;히요리;03;의료용품은 엄청 귀하거든요. 보기도 힘들다구요! 게다가 비싸잖아요!\n#3;hophop"
2001703-43 = "3;히요리;04;상비약을 준비해두는 건 엄청 중요해요. 저번에 반쯤 썩은 사과를 먹고 3일을 앓았을 때 소화제가 있었다면 아프지 않았을 건데……."
2001703-44 = "[s3] \"그건 뭔가 아닌거 같은데……?\"\n[s4] \"썩은 사과를 먹었다고?\""
2001703-45 = "3;히요리;03;그건 너무 배가 고파서 그랬던 거고…… 평소에도 그러진 않아요.\n#3;em;…"
2001703-46 = "3;히요리;03;그건 너무 배가 고파서 그랬던 거고…… 평소에도 그러진 않아요.\n#3;em;…"
2001703-47 = "3;히요리;03;게다가 소화제가 있으면 어쩐지 상한 음식도 자신있게 먹을 수 있을 거고……."
2001703-48 = "[s] (아, 안되겠어. 이대로 두었다간 큰일이 나버려……!)"
2001703-49 = "3;히요리;03;게다가 이 좌약이라면……"
2001703-50 = "3;히요리;03;어, 어라? 선생님……?\n#3;em;[?]"
2001703-51 = "[s] \"히요리. 잠깐 나랑 어디 좀 같이 가자.\""
2001703-52 = "3;히요리;10;네, 네?! 어, 어딜요? 지금요? 어, 어째서……?!\n#3;em;[?!]\n#3;shake"

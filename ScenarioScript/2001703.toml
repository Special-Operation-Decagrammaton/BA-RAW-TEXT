2001703-56 = "1;직원;03;다 해서 결제 완료되었습니다.\n#1;greeting\n#1;em;[반짝]"
2001703-57 = "5;히요리;01;…….\n#5;em;…"
2001703-58 = "[s] \"의약품도 유통기한이 있으니까…… 이걸 쓰도록 해.\""
2001703-59 = "5;히요리;03;……편의점에서도 약을 구할 수 있었네요.\n#5;em;[땀]"
2001703-60 = "5;히요리;10;이렇게 또 선생님에게 신세를 지게 되었네요. 이, 이제 전 끝장인가요? 시키는 대로 할 수밖에 없는 건가요? 망한 건가요?\n#5;stiff"

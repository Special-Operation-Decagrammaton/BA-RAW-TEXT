[translation]
2001703-1 = "ถึงยังไงก็จะไม่ยอมแพ้"
2001703-2 = "ด้านในอาคารที่มีกำหนดจะทุบทิ้งในเขตพัฒนาใหม่"
2001703-3 = "อ๊ะ...?!"
2001703-4 = "คุณครูมาที่นี่ได้ยังไงคะ...!"
2001703-5 = "งะ... งั้นเหรอคะ ไม่ว่าจะไปที่ไหนก็ไม่พ้นสายตาคุณครูสินะคะ"
2001703-6 = "นะ...น่ากลัวจัง... น่ากลัวจังเลย... ผู้ใหญ่..."
2001703-7 = "[s] \"เห็นว่ามีเรื่องดีๆ เลยมาหาน่ะ\""
2001703-8 = "แหะๆๆ นั่นสินะคะ... ในชีวิตที่แสนทรมานแบบนี้ ถ้ามีความสุขเล็กๆ เกิดขึ้นละก็ เราก็ควรจะแบ่งปันกัน#nสิคะ..."
2001703-9 = "ฉันจะมีความสุขมากขึ้นถ้ามือถือส่งรูปไปให้ได้... แต่ในเมื่อคุณครูมาถึงที่นี่แล้วก็คงไม่เป็นไรแล้วค่ะ"
2001703-10 = "ที่จริงแล้ว... วันนี้ฉันเก็บของมาได้เยอะมากๆ เลยอยากจะโชว์ให้ดูสักหน่อยค่ะ แหะๆๆ..."
2001703-11 = "[s] \"เก็บเหรอ...?\""
2001703-12 = "ค่ะ เริ่มจากอันนี้ค่ะ"
2001703-16 = "(ฮิโยริวางกองกระดาษเก่าๆ ให้ดู)"
2001703-17 = "[s] \"นะ... นี่มันกองเศษกระดาษ...?\""
2001703-18 = "คะ? เศษกระดาษเหรอคะ? ถะ...ถึงฉันจะเก็บมาจากถังขยะกระดาษก็จริง... แต่นี่เป็นนิตยสารรายเดือน <ron-ro> ของเมื่อสองปีก่อนนะคะ"
2001703-19 = "นี่เป็นนิตยสารที่หายากมากๆ เลยค่ะ... หายากมากจนร้านหนังสือขนาดใหญ่ที่ใจกลางเขต D.U. ยังไม่มีเลยค่ะ..."
2001703-20 = "แล้วก็พวกเราเป็นพวกที่ย้ายที่อยู่บ่อย เลยรับนิตยสารส่งทางจดหมายไม่ได้ ถะ...ถึงต่อให้สมัครทาง#nเว็บไซต์ก็ต้องเสียเงินค่าสมัคร... สำหรับเราแล้วมันเหมือนฝันที่เกินฝันเลยค่ะ..."
2001703-21 = "แต่ว่าฉันเก็บของล้ำค่าขนาดนั้นมาได้จากถังขยะกระดาษเลยนะคะ! แถมยังเก็บมาได้ตั้ง 8 เล่มเลยค่ะ!"
2001703-22 = "[s1] \"อ่า... ครูดีใจด้วยนะ\"\n[s2] \"ฮิโยริชอบของพวกนี้สินะ?\""
2001703-23 = "แหะๆๆ...  มันมีเรื่องน่าสนใจเต็มไปหมด ให้นั่งอ่านทั้งวันก็ไม่เบื่อเลยค่ะ... สกู๊ปพิเศษก็อ่านแล้วสนุกดี พวกรูปแฟชั่นก็ดูได้ไม่เบื่อ..."
2001703-24 = "แหะๆๆ...  มันมีเรื่องน่าสนใจเต็มไปหมด ให้นั่งอ่านทั้งวันก็ไม่เบื่อเลยค่ะ... สกู๊ปพิเศษก็อ่านแล้วสนุกดี พวกรูปแฟชั่นก็ดูได้ไม่เบื่อ..."
2001703-25 = "นอกจาก <ron-ro> แล้วฉันยังเก็บ <BiBi> มาได้อีกยี่สิบกว่าเล่มเลยนะคะ"
2001703-26 = "ถึงฉันจะเอาไปใช้เป็นเชื้อเพลิงจุดไฟตอนที่มีพายุลมหนาวพัดมาคราวก่อนแล้วก็เถอะค่ะ..."
2001703-27 = "เสียดายมากๆ เลย... แต่อย่างน้อยก็คงดีกว่าจะต้องหนาวตาย..."
2001703-28 = "โดยเฉพาะบทความ <รีวิวชุดว่ายน้ำใหม่ล่ามาแรง 20 ชุด เพิ่มเสน่ห์ปังปัง!> กับบทความเรื่อง <เกาะติดเทรนด์ใหม่! ไอเทมท็อป 5 ที่แฟชั่นตัวแม่ในเขต D.U. ต้องมี!> ฉันยังอ่านไม่จบเลย..."
2001703-29 = "แต่ก็ถูกเผาไป... กลายเป็นเถ้าถ่าน... กลายเป็นเศษดิน... ชีวิตคนเรานี่... มันน่า...เจ็บปวดจริงๆ เลย...#nนะคะ... พอมาย้อนคิดดูตอนนี้ว่าจะมีวิธีอื่นอีกรึเปล่า... แต่ชีวิตคนเราน่ะ เวลามองย้อนกลับไปก็มักจะ#nมีแต่เรื่องที่น่าผิดหวังเต็มไปหมด..."
2001703-30 = "[s] \"ใจเย็นๆ ก่อนนะ ฮิโยริ...\""
2001703-31 = "..."
2001703-32 = "อ๊ะ... เผลอพูดอะไรแปลกๆ ออกไปอีกแล้วสินะคะ"
2001703-33 = "ยังไงก็เถอะค่ะ! ฉันอยากโชว์ให้คุณครูได้เห็นความโชคดีมากๆ ของฉันค่ะ"
2001703-34 = "เพราะถึงยังไงคนที่ฉันจะอวดเรื่องแบบนี้ได้ก็คงมีแค่คุณครูเท่านั้น... ถ้าเป็นคนอื่นๆ ก็คงจะทำสีหน้า#nประมาณว่า \"งั้นเหรอ?\" แล้วก็ไม่สนใจ..."
2001703-35 = "นะ...นอกจากนิตยสารนี่แล้วยังมีอย่างอื่นอีกนะคะ!"
2001703-39 = "(ฮิโยริหยิบกล่องเหล็กที่ขึ้นสนิมเกือบหมดแล้วออกมา)"
2001703-40 = "[s] \"นี่มัน... กล่องปฐมพยาบาลที่ขึ้นสนิม...?\""
2001703-41 = "แหะๆๆ... ใช่แล้วคะ ถึงกล่องมันจะเก่าแล้ว แต่พวกอุปกรณ์ยาฉุกเฉินข้างในยังไม่ได้ใช้เลยนะคะ ทั้งยาลดกรด ยาแก้ไข้หวัด ยาลดไข้ แอลกอฮอลล์สำหรับฆ่าเชื้อ..."
2001703-42 = "อุปกรณ์การแพทย์สำคัญมากๆ เลยนะคะ หายากมากด้วยค่ะ! แถมยังแพงมากๆๆ อีกด้วยนะคะ!"
2001703-43 = "การจัดเตรียมยาสามัญประจำบ้านให้พร้อมเป็นเรื่องสำคัญมากนะคะ ครั้งที่แล้วฉันกินแอปเปิลที่เน่า#nไปครึ่งนึงเลยต้องทนปวดท้องไปตั้งสามวัน... ถ้าตอนนั้นมียาช่วยย่อยก็คงจะไม่ต้องทรมานขนาดนั้น..."
2001703-44 = "[s3] \"ครูว่ามันไม่น่าช่วยนะ...?\"\n[s4] \"กินแอปเปิลเน่างั้นเหรอ?\""
2001703-45 = "งั้นเหรอคะ? ฉันหิวมากก็เลยกินแอปเปิลเน่าไปค่ะ... แต่ปกติฉันก็ไม่ได้กินของแบบนั้นหรอกค่ะ"
2001703-46 = "คือว่าฉันหิวมากก็เลยกินแอปเปิลเน่าไปค่ะ... แต่ปกติฉันก็ไม่ได้กินของแบบนั้นหรอกค่ะ"
2001703-47 = "อีกอย่างถ้ามียาช่วยย่อยละก็ต่อให้เป็นอาหารที่เสียแล้ว ฉันมั่นใจว่าก็คงจะกินได้..."
2001703-48 = "[s] (มะ...ไม่ได้การแล้ว ถ้าปล่อยไว้ต้องเป็นเรื่องใหญ่แน่...!)"
2001703-49 = "อีกอย่าง ถ้ามียาเหน็บละก็..."
2001703-50 = "เอ๊ะ...เอ๋...? คุณครู...?"
2001703-51 = "[s] \"ฮิโยริ ไปข้างนอกกับครูแป๊ปนึงสิ\""
2001703-52 = "คะ...คะ? ไปไหนเหรอคะ? ตอนนี้เลยเหรอคะ มะ...มีอะไรเหรอคะ....?!"
2001703-55 = "ครับ ยาแก้ไข้หวัดชนิดน้ำ ยาช่วยย่อย ยาฆ่าเชื้อ ยาลดไข้..."
2001703-56 = "รับชำระเงินเรียบร้อยครับ"
2001703-57 = "..."
2001703-58 = "[s] \"ยาก็มีวันหมดอายุเหมือนกันนะ... เพราะงั้นใช้พวกนี้แทนเถอะ\""
2001703-59 = "หาซื้อยาที่ร้านสะดวกซื้อได้ด้วยเหรอคะ..."
2001703-60 = "ฉันติดหนี้บุญคุณคุณครูอีกแล้วสินะคะ... บะ...แบบนี้ฉันก็จบเห่แล้วสินะคะ? ฉะ...ฉันคงทำได้แค่สิ่ง#nที่คุณครูสั่งให้ทำเท่านั้นสินะคะ? คงแย่แน่ๆ แล้วสินะคะ...?"
2001703-64 = "มุแงงงง-! ฉันจะหนีออกจากเงื้อมมือของผู้ใหญ่ไม่พ้นจริงๆ เหรอคะ...?"
2001703-65 = "ไหนๆ ก็เป็นแบบนี้แล้ว รบกวนซื้ออันนี้ให้ด้วยนะคะ-!"
2001703-66 = "[s] \"ช่วยคิดเงินอันนี้เพิ่มด้วย...\""
2001703-70 = "รับชำระเงินค่านิตยสาร <ron-ro> กับ <BiBi> ฉบับใหม่เรียบร้อยแล้วครับ"
2001703-71 = "มุแงงงง--! ขอบคุณมากค่ะ แต่ฉันจบเห่แล้วจริงๆ ด้วยค่ะ...! ฉันแย่แล้วจริงๆ ด้วยค่ะ ฉันจะตั้งใจอ่าน#nอย่างดีเลยค่ะ คุณครู! ถึงชีวิตนี้จะย่ำแย่ก็จะตั้งใจอ่านให้ดีเลยค่ะ!"
2001703-73 = "(คุณครูพาฮิโยริที่พูดคำเดิมๆ ที่เข้าใจยากวกไปวนมาออกมาจากร้านสะดวกซื้อ...)"

[translation]
2001703-1 = "The Girl Still Doesn't Give Up"
2001703-2 = "Abandoned Building in a Construction Area"
2001703-3 = "Eek?"
2001703-4 = "Sensei?! What are you doing here?"
2001703-5 = "Am I destined to be trapped in the palm of your hand no matter where I run?"
2001703-6 = "Adults are scary... So scary..."
2001703-7 = "[s] \"I'm just here to find out the good news.\""
2001703-8 = "Oh, heehee. In this life of suffering, we must celebrate the small victories."
2001703-9 = "If my phone could send photos, it would be easier but...at least you're here now."
2001703-10 = "I...wanted to show you what I acquired today... Heeheehee."
2001703-11 = "[s] \"Should I be concerned?\""
2001703-12 = "Of course not! Look at this!"
2001703-16 = "Hiyori takes out a bundle of waste paper."
2001703-17 = "[s] \"Oh... That's a very nice pile of trash.\""
2001703-18 = "Did you say t-trash?! I may have found it in a trash can, but that's beside the point! This is a collection of last year's issues of the esteemed magazine Ren-ro!"
2001703-19 = "They're incredibly rare, Sensei! You could scour the biggest bookstores and come up with naught."
2001703-20 = "And...homeless, unaffiliated students like us can't order them or read them online. I thought even holding a single issue of this magazine was an unattainable dream."
2001703-21 = "Imagine how I felt when I found eight whole editions in the trash can!"
2001703-22 = "[s1] \"Oh... Congratulations.\"\n[s2] \"So you like magazines like this?\""
2001703-23 = "Heeheehee... It's got fun feature articles, and the fashion photos are my favorite part. It eases the ever-present burden of existence."
2001703-24 = "Heeheehee... It's got fun feature articles, and the fashion photos are my favorite part. It eases the ever-present burden of existence."
2001703-25 = "Beside Ren-ro, one time I even managed to collect more than twenty issues of BiBi."
2001703-26 = "...But we had no paper for fire so up those went in flames."
2001703-27 = "I really loved them with all my heart...but I also love not freezing to death..."
2001703-28 = "I still think about the articles I didn't get to read. \"Deadly Charm! Review of 20 New Swimsuits!\" and \"Close Coverage! Top 5 Essential Items for D.U. Fashion Leaders\"..."
2001703-29 = "They're all burned... Ashes to ashes, dust to dust... The suffering of life is no surprise... I have so many regrets... So many thoughts that keep me up at night... Could I have prevented it?"
2001703-30 = "[s] \"C-Calm down, Hiyori!\""
2001703-31 = "..."
2001703-32 = "Sorry, I got carried away again."
2001703-33 = "Well, I just wanted to show you my lucky finds, Sensei."
2001703-34 = "I didn't know who else to call... No one else cares about me..."
2001703-35 = "Oh, wait! One more thing!"
2001703-39 = "Hiyori took out a rusty steel chest."
2001703-40 = "[s] \"Is that...a rusty first-aid kit?\""
2001703-41 = "Heh...heh. Correct! It might look old, but the medicine inside is untouched. Digestion medicine, cold medicine, a suppository for fevers, disinfecting alcohol..."
2001703-42 = "Medical supplies are very valuable. They're hard to find, and way out of our budget."
2001703-43 = "It's super important to keep the squad's health up, you know. This digestion medicine would have come in handy when I ate that rotten apple... I was sick for three days."
2001703-44 = "[s3] \"That's sort of alarming...\"\n[s4] \"You ate a rotten apple?\""
2001703-45 = "I was really hungry... I didn't have a choice."
2001703-46 = "I was really hungry... I didn't have a choice."
2001703-47 = "But, now my suffering will at least be lessened! I can just eat spoiled food and take the digestion medicine after."
2001703-48 = "[s] \"(This is really bad! I have to do something before she dies!)\""
2001703-49 = "Also, this suppository medicine..."
2001703-50 = "Sensei? What's wrong?"
2001703-51 = "[s] \"Hiyori, I need you to come somewhere with me. Right now.\""
2001703-52 = "Why now? What? Wh-Where?!"
2001703-55 = "Liquid cold medicine, digestion medicine, a disinfectant, a fever reducer..."
2001703-56 = "Payment processed. Thank you, valued customer!"
2001703-57 = "..."
2001703-58 = "[s] \"Medicine can still expire even if they're unopened.\""
2001703-59 = "I didn't know you could just buy medicine like this."
2001703-60 = "You helped me again. Am I a failure?! Is there no hope for me? Without another's help, I would wilt away into useless nothingness!"
2001703-64 = "*cry* Am I trapped in the schemings of a grown-up?"
2001703-65 = "B-B-But also, I want these too please!"
2001703-66 = "[s] \"...Those too.\""
2001703-70 = "The latest issues of Ron-ro and BiBi... Here you go."
2001703-71 = "WAAAH!! I can't stop my horrible ways! But thank you! Even though I'm a failure!"
2001703-73 = "Hiyori kept crying in gibberish as we left the convenience store."

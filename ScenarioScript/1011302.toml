[translation]
1011302-1 = "#title;취미 생활 (1)"
1011302-2 = "#na;(세나와 만나기로 한 공원에, 조금 일찍 도착해 있었다.)"
1011302-3 = "[ns1] \"으–음. 세나와 만나기로 한 건 좋은데.\"\n[ns2] \"만나서 뭘 하면 좋을까…….\""
1011302-4 = "#wait;10"
1011302-5 = "#wait;10"
1011302-6 = "#wait;1000"
1011302-7 = "[ns3] \"세나의 취미는 대기와 약품 정비…….\"\n[ns4] \"그런데…… 세나가 정말 그걸로 즐거워해 줄까……?\""
1011302-8 = "#wait;10"
1011302-9 = "#wait;10"
1011302-10 = "#na;???;선생님은 자신보다 상대의 즐거움을 신경 쓰시는 타입이십니까?"
1011302-11 = "[ns] \"꼭 그런 것만은 아니지만, 같이 즐거워하면 좋으니까…….\""
1011302-12 = "#na;???;그렇다면 어떤 상황에서 자신보다 상대가 즐거워한다면, 그것으로 만족하실 수 있으시다는 건가요?"
1011302-13 = "[ns5] \"약간은 상황을 타겠지만 말이지…….\"\n[ns6] \"그래도 기쁠 것 같아.\""
1011302-14 = "#wait;10"
1011302-15 = "#wait;10"
1011302-16 = "#na;???;그렇군요. 좋은 참고 증례가 되었습니다."
1011302-17 = "[ns] \"응, 그래……. 그런데 잠깐, 이거?!\""
1011302-18 = "#st;[0,0];instant;1;"
1011302-19 = "#clearST"
1011302-20 = "#wait;1800"
1011302-21 = "3;세나 사복;01\n#3;a\n#wait;1500"
1011302-22 = "3;세나 사복;02;안녕하십니까. 선생님. 일찍 나오셨군요.\n#3;greeting"
1011302-23 = "[s] \"왔으면 왔다고 말을 해 주지 그랬어–!\""
1011302-24 = "3;세나 사복;01;이것으로 선생님이 어떠한 분이신지는 조금 더 자세히 알게 되었습니다."
1011302-25 = "3;세나 사복;01;예상대로이기도 하면서도, 그 예상을 약간 넘어서는 범주에 계신 분이라는 것도요.\n#3;em;[반응]"
1011302-26 = "3;세나 사복;02;저는 어떠냐고요? 그런 건 아무래도 상관없습니다. 그렇지만 선생님을 만나게 되어서 기쁘네요."
1011302-27 = "3;세나 사복;01;선생님과의 만남. 기대하고 있었으니까요."
1011302-28 = "3;세나 사복;02;그러면, 선생님. 이제부터 무엇을 하실 생각이신가요?\n#3;em;[?]"
1011302-29 = "3;세나 사복;01;저 말씀이십니까? 저는 선생님과 만나는 것으로 소기의 목적을 달성했다고 생각합니다."
1011302-30 = "3;세나 사복;01;그러므로 정말로 극단적인 상황을 상정한다면, 저희의 만남은 여기에서 마무리 짓거나."
1011302-31 = "3;세나 사복;99;아니면 반대로, 내친김에 조금 더 나아가서 미래의 계획을 설계해 보는 것도……."
1011302-32 = "3;세나 사복;99;……음.\n#3;em;[...]"
1011302-33 = "[s7] \"아냐, 아냐! 그건 진짜 아닌 것 같아!\"\n[s8] \"우리, '대기'하자. 응? 대기!\""
1011302-34 = "#wait;10"
1011302-35 = "#wait;10"
1011302-36 = "3;세나 사복;01;대기…… 말씀이시군요. 네. 알겠습니다. 그렇게 하겠습니다."
1011302-37 = "3;세나 사복;01;다만, 저에게는 익숙한 일이나, 선생님에게도 괜찮을지는 정확히 판단하기 어렵군요."
1011302-38 = "3;세나 사복;02;괜찮으시다고요? 알겠습니다. 그 말씀, 믿도록 하겠습니다.\n#3;em;[반응]"
1011302-39 = "#all;hide"
1011302-40 = "#na;(그렇게 세나와 함께, 공원에서의 '대기'를 시작했다…….)"
1011302-41 = "#all;hide"
1011302-42 = "#all;hide"
1011302-43 = "#all;hide"
1011302-44 = "3;세나 사복;01;괜찮으신가요, 선생님?\n#3;a\n#3;em;[?]"
1011302-45 = "3;세나 사복;02;무엇이, 말씀이십니까? 말씀드리자면 이런 것입니다."
1011302-46 = "3;세나 사복;01;지금의 선생님께서는, 꽤나 '한가하다'고 분류될 수 있는 감정 상태에 빠져 계신 것으로 보이기에."
1011302-47 = "[s] \"알 수 있어?!\""
1011302-48 = "3;세나 사복;99;보면 압니다."
1011302-49 = "3;세나 사복;01;대강은요."
1011302-50 = "3;세나 사복;01;저는 어떻게 느끼느냐고요? 그렇군요. 저의 상태를 선생님께 공유해 드리는 것도, 필요한 것으로 보입니다.\n#3;em;[...]"
1011302-51 = "3;세나 사복;99;지금의 저는, 간단히 말씀드리자면."
1011302-52 = "3;세나 사복;02;보이는 모든 것이, 너무나 위험하게만 느껴집니다."
1011302-53 = "[s] \"어째서?! 뭐가!? 왜?!?!\""
1011302-54 = "3;세나 사복;01;가령 저쪽을 보십시오."
1011302-55 = "2;뱁새 남동생;00\n3;뱁새 누나;00\n#2;h\n#3;h"
1011302-56 = "2;뱁새 남동생;00\n3;뱁새 누나;00\n#3;greeting\n#2;stiff\n#2;h\n#3;h\n#wait;700"
1011302-57 = "2;뱁새 남동생;00\n3;뱁새 누나;00\n#3;greeting\n#2;stiff\n#2;h\n#3;h\n#wait;700"
1011302-58 = "3;뱁새 누나;00\n2;뱁새 남동생;00;아하하하! 아하하하하하! 그만해, 누나! 간지러워!!!\n#2;hophop\n#2;em;[재잘]\n#2;m1"
1011302-59 = "2;뱁새 남동생;00\n3;뱁새 누나;00;여기냐? 여기인 거냐?! 에잇, 도망치지 마! 더 간지럽혀 줄 테니까!!!\n#3;m2\n#3;jump\n#3;em;[!]"
1011302-60 = "#2;hide\n3;세나 사복;01"
1011302-61 = "3;세나 사복;02;그냥 아이들이 놀고 있는 것 아니냐고요? 물론 충분히 그렇게 관찰될 수 있는 광경입니다."
1011302-62 = "3;세나 사복;01;그렇지만 동시에, 상당히 위험한 광경이기도 합니다."
1011302-63 = "3;세나 사복;02;인체는 일반적으로 99%의 산소 포화도를 유지하는 것이 정상입니다\n#3;em;[반응]"
1011302-64 = "3;세나 사복;01;하지만 지나친 간지럼 태우기는, 자칫 그 산소 포화도를 떨어트려, 저산소증을 유발할 가능성이 있습니다."
1011302-65 = "3;세나 사복;02;그렇게까지는 간지럼을 태우지 않는 게 보통이지 않느냐고요?"
1011302-66 = "3;세나 사복;99;선생님. 사람은 다음에 무슨 짓을 할지 알 수 없는 생물입니다.\n#3;em;[한숨]"
1011302-67 = "3;세나 사복;01;그리고 또 저기에도, 위험한 행동을 하는 사람이 있군요."
1011302-68 = "3;로봇2 시민;00"
1011302-69 = "3;로봇2 시민;00;오오…… 라면이 맛있게 익었구나.\n#3;em;[반짝]"
1011302-70 = "3;로봇2 시민;00;오늘은 왠지 면의 맛을 먼저 느끼고 싶으니, 온천 달걀은 잠시 옆으로 밀어 두고."
1011302-71 = "3;로봇2 시민;00;이 부드럽고 고소한 면부터, 우선 먹어 보도록 할까.\n#3;em;[재잘]"
1011302-72 = "3;세나 사복;01"
1011302-73 = "3;세나 사복;01;온천 계란을 넣은 컵라면을, 나름의 방법으로 즐기는 것 아니냐고요? 예. 그렇게 보일 수 있는 사안이라는 것은 인정합니다.\n#3;em;[...]"
1011302-74 = "3;세나 사복;01;하지만 온천 계란은 상대적으로 면에 비해 먹기 어렵고, 면은 한 번에 들이키기 쉽습니다."
1011302-75 = "3;세나 사복;99;이럴때는 계란을 먼저 섭취하여, 어느 정도 식도와 위장에 신호를 주는 것이 보다 안전합니다."
1011302-76 = "3;세나 사복;01;무엇보다 면을 한 번에 너무 많이 먹으면, 기도가 막혀 시체…… 응급 환자가 될 수 있으니까요."
1011302-77 = "3;세나 사복;02;그것이 전부가 아닙니다. 저기에도 위험 요소가 있군요."
1011302-78 = "3;시민 B;00"
1011302-79 = "3;시민 B;00;흥~ 흐흥~ 나는 치즈가 좋아~\n#3;em;[음표]\n#3;jump"
1011302-80 = "3;시민 B;00;그리고 치즈에는 피클을 빼놓을 수 없지~\n#3;greeting"
1011302-81 = "3;시민 B;00;살짝 느끼한 치즈의 맛을, 상큼한 피클이 잡아 주니까~"
1011302-82 = "3;세나 사복;01"
1011302-83 = "3;세나 사복;01;그렇습니다. 치즈와 피클을 같이 먹는 것이 문제입니다. 거기의 어디에 위험 요소가 있느냐고요? \n#3;em;[반응]"
1011302-84 = "3;세나 사복;02;티라민이라는 성분이 있습니다. 식품이 발효될 때 생성되는 성분이죠."
1011302-85 = "3;세나 사복;01;그리고 티라민은 치즈에도, 식초에 절인 피클에도 다량 함유되어 있습니다."
1011302-86 = "3;세나 사복;02;이 티라민 성분이 교감신경을 과도하게 자극하면, 심장박동이 불규칙적으로 일어나는 부정맥이 발생할 수 있습니다.\n#3;em;[...]"
1011302-87 = "3;세나 사복;99;부정맥은 심정지를 유발할 수 있는, 주의를 기울여야 할 의학적 현상이기도 하죠."
1011302-88 = "[s9] \"그러면 말이야…… 안전하게 살려면…….\"\n[s10] \"먹지도 말고 움직이지도 말고, 아무것도 안 해야 하는 거 아닐까……?\""
1011302-89 = "#wait;10"
1011302-90 = "#wait;10"
1011302-91 = "3;세나 사복;02;네. 영양 공급을 비롯한, 다른 모든 의식주 같은 제반 사정이 해결된다면, 그게 가장 안전한 방법이 아닐까요?\n#3;em;[?]"
1011302-92 = "[s] \"그건 좀 너무한 게 아닐까 싶은데–?!\""
1011302-93 = "3;세나 사복;99;그리고, 그런 비상 상황이 일어나더라도 빠르게 대처하기 위해, 저 같은 사람들이 언제나 대기하고 있는 것이기도 합니다."
1011302-94 = "[s] \"거기에서 그런 말을 한다면, 내 쪽에서 할 말이 없네…….\""
1011302-95 = "3;세나 사복;02;빠르게 상황에 대처하기 위해서, 대기하는 것을 좋아하느냐고요?"
1011302-96 = "3;세나 사복;99;……반드시 그런 것만은 아닙니다."
1011302-97 = "3;세나 사복;01;물론 대기하면서 서류 정리나 업무 기록 같은 것들도 누락된 부분이 없는지 챙겨본다든가.\n#3;em;[반응]"
1011302-98 = "3;세나 사복;02;다른 사람이 없는 시간이, 저 개인에게 있어서는 안정적인 시간으로 느껴지기도 합니다만."
1011302-99 = "3;세나 사복;01;더 근본적으로는…… 네. '일어나지 않은 일'에 대한 기대감을, 가질 수 있기 때문이기도 합니다."
1011302-100 = "[s] \"조금 더 이야기해 줄래?\""
1011302-101 = "3;세나 사복;99;……."
1011302-102 = "3;세나 사복;04;미래는, 알 수 없는 것입니다. 그리고 거기에서 오는 불안감은 분명히 존재하죠.\n#3;em;[땀]"
1011302-103 = "3;세나 사복;01;그러나 바로 그렇기에, 결코 우리가 알 수 없는 것이기에."
1011302-104 = "3;세나 사복;02;보다 구체적으로는 어디에서 어떤 시체…… 부상자가 생길지 우리는 예상할 수 없기에."
1011302-105 = "3;세나 사복;99;대기 중에 바라보는 풍경은, 저에게 가벼운 긴장감을 가져다줍니다."
1011302-106 = "3;세나 사복;02;물론, 아무 일이 일어나지 않는 것이 가장 좋을 것입니다. 저도 진심으로 그렇게 되기를 바랍니다.\n#3;em;[반응]"
1011302-107 = "3;세나 사복;01;그러나 그것과는 별개로, 어떤 종류의 긴장감을 유지하며 세계를 지켜보는 것에는…… 거기에서만 느낄 수 있는, 정서적인 만족감이 있습니다."
1011302-108 = "3;세나 사복;02;그리고 그 긴장감 속에서 세계를 지켜보는 것이, 그 자체로 저 개인에게는 의미 있는 일이 되기도 하고요."
1011302-109 = "#all;hide"
1011302-110 = "#all;hide"
1011302-111 = "#wait;1000"
1011302-112 = "#all;hide"
1011302-113 = "3;세나 사복;01;어느새, 이렇게 시간이 흘렀군요.\n#3;a\n#3;em;[...]"
1011302-114 = "3;세나 사복;02;복장이 이런 탓인지, 저의 체온이 평소보다 조금 더 내려가 있습니다."
1011302-115 = "3;세나 사복;99;달리 말씀드리자면, 저체온증이 유발될 수 있는 상태라는 것이죠."
1011302-116 = "3;세나 사복;01;그리고 저체온증을 막기 위해서는, 저희 사이의 거리를 보다 줄일 필요가 있다고 생각합니다."

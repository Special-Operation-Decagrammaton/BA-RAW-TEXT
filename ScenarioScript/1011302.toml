[translation]
1011302-1 = "興趣生活（１）"
1011302-2 = "（和瀬奈約好見面後，提早抵達了約定的公園）"
1011302-3 = "[ns1]「唔嗯，能和瀬奈見面是很開心沒錯……」\n[ns2]「不過見面之後該做什麼好呢……」"
1011302-7 = "[ns3]「瀬奈的興趣是待命和整備藥品……」\n[ns4]「不過他真的會因為做這些事而由衷感到開心嗎……？」"
1011302-10 = "老師是那種比起自己，更顧慮對方的心情的類型嗎？"
1011302-11 = "[ns]「也不完全是那樣，不過大家都開心的話當然更好……」"
1011302-12 = "那麼，如果對方在某些情況下會比自己更開心的話，老師會因此感到滿足嗎？"
1011302-13 = "[ns5]「雖然還是要視情況而定……」\n[ns6]「不過應該會很高興吧。」"
1011302-16 = "這樣啊。那我大概知道了。"
1011302-17 = "[ns]「嗯，那就好……咦，先等一下！？」"
1011302-22 = "你好，老師。#n你提早到了呢。"
1011302-23 = "[s]「既然來了就說一聲嘛！」"
1011302-24 = "這樣一來，我就更了解老師是什麼樣的人了。"
1011302-25 = "雖然有符合猜想，但也稍微超出了我的預料。"
1011302-26 = "你問我覺得如何嗎？#n那種事並不重要。重要的是我很高興能見到老師。"
1011302-27 = "因為我一直很期待跟老師見面。"
1011302-28 = "那麼，老師你接下來打算做什麼呢？"
1011302-29 = "我嗎？我只要能見到老師，就已經達成此行的目的了。"
1011302-30 = "所以如果要假設的極端一點的話，就算要現在解散也沒關係。"
1011302-31 = "或者也可以反過來，順勢規劃進一步的未來……"
1011302-32 = "……之類的。"
1011302-33 = "[s7]「不不不！那倒是不必！」\n[s8]「我們一起『待命』吧。『待命』！」"
1011302-36 = "待命……是嗎。#n嗯，沒問題。就這麼做吧。"
1011302-37 = "雖然這對我來說再熟悉不過了，但我無法確定對老師來說是否適合。"
1011302-38 = "你說沒關係嗎？#n好的，那麼我也相信老師。"
1011302-40 = "（就這樣和瀬奈一起，在公園開始「待命」……）"
1011302-44 = "你還好嗎，老師？"
1011302-45 = "為什麼這麼問？#n因為……"
1011302-46 = "現在老師的情緒，似乎陷入了可以被歸類為「悠哉」的狀態。"
1011302-47 = "[s]「能看得出來嗎！？」"
1011302-48 = "大致上……"
1011302-49 = "能看得出來。"
1011302-50 = "你好奇我的感覺如何？#n這樣啊，看來我也有必要與老師分享我的狀態。"
1011302-51 = "我現在的感受，簡單來說……"
1011302-52 = "認為所見的一切都非常危險。"
1011302-53 = "[s]「咦，會嗎！？哪裡危險！？」"
1011302-54 = "舉例來說，請你看那邊。"
1011302-58 = "啊哈哈哈！啊哈哈哈哈哈！好了啦，姐姐！很癢啦！！！"
1011302-59 = "你說這裡嗎？還是這裡！？#n喂，別跑啊！我還沒搔過癮耶！！！"
1011302-61 = "只是小朋友在玩耍而已？#n那固然是能藉由觀察得出的結論沒錯……"
1011302-62 = "不過那同時也是相當危險的景象。"
1011302-63 = "一般來說，人體的血氧飽和度應該維持在99%。"
1011302-64 = "然而過於激烈的搔癢，可能會導致人體的血氧飽和度降低，進而引發低血氧症。"
1011302-65 = "一般而言很難搔癢到那種程度？"
1011302-66 = "老師，人類是種難以預測其行為的生物。"
1011302-67 = "而且那邊也有人正在做出危險行為。"
1011302-69 = "哦哦……泡麵真香啊。"
1011302-70 = "今天不知為何想從麵開始吃起，先把溫泉蛋放到一邊吧。"
1011302-71 = "先來嘗嘗這個又香又Q的麵條。"
1011302-73 = "你說他只是根據自己的喜好，享用加了溫泉蛋的泡麵而已？#n嗯，這樣的解讀確實也不能說有錯。"
1011302-74 = "不過與麵條相比，溫泉蛋相對難以食用。"
1011302-75 = "所以這種時候應該先從雞蛋開始攝取，藉此向食道和胃部發送信號比較安全。"
1011302-76 = "最重要的是，一次吃太多麵條可能會堵塞氣管變成屍體……更正，是急診患者。"
1011302-77 = "情況還不只這些。#n那邊也暗藏著風險。"
1011302-79 = "嗯哼～嗯哼～我喜歡起司～"
1011302-80 = "吃起司就要配酸黃瓜～"
1011302-81 = "因為清爽的酸黃瓜，可以中和濃郁的起司味～"
1011302-83 = "沒錯。問題就出在「起司與酸黃瓜」的搭配上。#n想知道哪裡危險是嗎？"
1011302-84 = "在食品的發酵過程中，會產生一種名為酪胺的成分。"
1011302-85 = "因此起司和醋醃蔬菜之中，都含有大量的酪胺。"
1011302-86 = "如果酪胺過度刺激交感神經的話，可能會導致心律不整。"
1011302-87 = "而心律不整則是可能引發心跳驟停，必須謹慎以對的醫學症狀。"
1011302-88 = "[s9]「照你這麼說……如果想活得安全一點的話……」\n[s10]「是不是得不吃、不動，什麼都不做才行……？」"
1011302-91 = "是的，如果能滿足包含營養攝取在內的所有需求，那確實是最安全的做法。"
1011302-92 = "[s]「會不會太極端了──！？」"
1011302-93 = "正是為了即時應對那些緊急狀況，像我這樣的醫護工作者才會隨時待命。"
1011302-94 = "[s]「你都說到這個層次了，我好像也無話可說……」"
1011302-95 = "我之所以隨時待命，是不是因為喜歡能隨時應對緊急狀況？"
1011302-96 = "……不完全如此。"
1011302-97 = "我在待命的期間，也會順便整理文件或檢查業務紀錄是否有遺漏的部分。"
1011302-98 = "而且獨處的時間，也是我個人比較能放鬆的時候。"
1011302-99 = "至於最根本的原因是……可以對「還沒發生的事」抱有期待感。"
1011302-100 = "[s]「可以再多說明一下嗎？」"
1011302-101 = "……"
1011302-102 = "未來是未知的。由此產生的不安感也確實存在。"
1011302-103 = "但正是因為我們永遠無法預知未來……"
1011302-104 = "或者更具體地說，我們無法預知會在哪裡出現什麼樣的屍體……我是說傷患。"
1011302-105 = "所以在待命時看見的風景，總是能帶給我輕微的緊張感。"
1011302-106 = "當然，什麼事都沒發生自然再好不過。#n我也由衷希望如此。"
1011302-107 = "然而在保持緊張感的情況下，觀察世界的細節……能帶給我無可取代的滿足感。"
1011302-108 = "在緊張感中眺望世界，對我個人來說是件很有意義的事。"
1011302-113 = "時間總是不知不覺間就過去了呢。"
1011302-114 = "可能是因為今天穿著這種服裝，我的體溫比平常稍微低了一點。"
1011302-115 = "換句話說，這樣有可能會引發失溫症。"
1011302-116 = "為了防止失溫，我認為縮短我們之間的距離會比較好。"
1011302-121 = "[ns]「……真的是為了防止失溫嗎？」"
1011302-122 = "不，這只是藉口而已。"
1011302-123 = "想和老師待在一起──這就是唯一的原因。"
1011302-124 = "今天……"
1011302-128 = "我還是想再說一次，能見到老師真的很開心。"
1011302-129 = "……抱歉，我總是這樣呢。"
1011302-130 = "一想到待命約會就是這種感覺，不由得感到有點興奮。"
1011302-131 = "什麼是待命約會？#n怎麼問這麼理所當然的問題呢，老師。"
1011302-132 = "當然是一邊待命一邊約會囉。"
1011302-133 = "就跟現在的我們一樣。"
1011302-135 = "（就這樣和瀬奈一起，度過半天的「待命約會」後才回到夏萊）"
1011302-136 = "（畢竟約會本來就帶有「單純見面」的意思嘛！）"

[translation]
1011302-1 = "ทำงานอดิเรก 1"
1011302-2 = "(คุณครูมาถึงสวนสาธารณะที่นัดกับเซนะไว้ก่อนเวลานิดหน่อย)"
1011302-3 = "[ns1] \"อืม ดีจังเลยนะที่ได้นัดเจอกับเซนะ\"\n[ns2] \"วันนี้จะทำอะไรกับเซนะดีนะ\""
1011302-7 = "[ns3] \"งานอดิเรกของเซนะคือการเตรียมพร้อมและจัดยา\"\n[ns4] \"แต่ว่า... เซนะสนุกกับงานอดิเรกของตัวเองจริงๆ เหรอ...?\""
1011302-10 = "คุณครูเป็นคนประเภทที่ใส่ใจกับความสนุกของอีกฝ่ายมากกว่าของตัวเองเหรอคะ?"
1011302-11 = "[ns] \"ใช่ว่าจะเป็นอย่างนั้นเสมอไปหรอก แต่ถ้าได้สนุกด้วยกันมันก็ดีน่ะ...\""
1011302-12 = "แล้วถ้าอยู่ในสถานการณ์ที่อีกฝ่ายสนุกมากกว่าตัวเอง แค่นั้นคุณครูพอใจแล้วเหรอคะ?"
1011302-13 = "[ns5] \"มันก็น่าจะขึ้นอยู่กับสถานการณ์นะ...\"\n[ns6] \"ครูว่าก็น่าจะเป็นอย่างนั้นนะ\""
1011302-16 = "งั้นเหรอคะ? เป็นกรณีศึกษาที่ดีเลยค่ะ"
1011302-17 = "[ns] \"อื้ม ใช่...เดี๋ยวนะ นี่เซนะ?\"!\""
1011302-22 = "สวัสดีค่ะ คุณครู ออกมาเร็วจังเลยนะคะ"
1011302-23 = "[s] \"ถ้ามาถึงก่อนแล้วทำไมไม่บอกครูล่ะ\""
1011302-24 = "นี่ทำให้ฉันเข้าใจมากขึ้นเลยนะคะว่าคุณครูเป็นคนยังไง"
1011302-25 = "ฉันได้รู้ว่าถึงคุณครูจะเป็นอย่างที่ฉันคาดไว้ แต่ก็มีมุมที่เกินคาดนิดหน่อยด้วยค่ะ"
1011302-26 = "แล้วฉันมีความเห็นว่ายังไงน่ะเหรอคะ? ฉันไม่ห่วงเรื่องแบบนั้นหรอกค่ะ แต่วันนี้ฉันดีใจนะคะที่ได้มา#nเจอคุณครู"
1011302-27 = "ฉันรอที่จะได้เจอคุณครูมานานแล้วน่ะค่ะ "
1011302-28 = "ถ้างั้น จากนี้ไปคุณครูจะทำอะไรคะ?"
1011302-29 = "ฉันเหรอคะ? แค่ฉันได้มาเจอคุณครู ฉันก็บรรลุเป้าหมายของวันนี้แล้วค่ะ"
1011302-30 = "ถ้ามีสถานการณ์เลวร้ายเกิดขึ้น การพบกันของเราก็อาจจบลงตรงนี้ได้"
1011302-31 = "แต่ถ้าตรงกันข้าม บางทีเราอาจจะไปกันต่ออีกนิดแล้ววางแผนสำหรับอนาคตดู..."
1011302-32 = "อืม..."
1011302-33 = "[s7] \"ไม่ๆ! จะแค่เห็นหน้าแล้วบอกลากันได้ไง!\"\n[s8] \"เรามา 'เตรียมพร้อม' กันเถอะ ว่าไงล่ะ? เตรียมพร้อมสำหรับงานไง!\""
1011302-36 = "เตรียมพร้อมสำหรับทำงาน... อย่างนี้เองสินะคะ ค่ะ เข้าใจแล้วค่ะ ฉันจะทำอย่างนั้นค่ะ"
1011302-37 = "นี่เป็นสิ่งที่ฉันทำบ่อยจนคุ้นเคยแล้ว แต่ไม่รู้เลยนะคะว่าคุณครูจะเป็นยังไง "
1011302-38 = "ไม่เป็นไรงั้นเหรอคะ? เข้าใจแล้วค่ะ ฉันจะเชื่อที่คุณครูพูดค่ะ"
1011302-40 = "(แล้วการ 'เตรียมพร้อมสำหรับงาน' ในสวนสาธารณะของคุณครูกับเซนะก็เริ่มขึ้น...)"
1011302-44 = "แบบนี้ไม่เป็นไรใช่มั้ยคะ คุณครู?"
1011302-45 = "หมายถึงเรื่องอะไรน่ะเหรอคะ? ก็แบบว่า..."
1011302-46 = "ตอนนี้คุณครูดูเหมือนกำลัง 'ชิล' มากเลยน่ะค่ะ"
1011302-47 = "[s] \"ดูออกเลยเหรอ?!\""
1011302-48 = "แน่นอนค่ะ"
1011302-49 = "ฉันพอมองออกคร่าวๆ ค่ะ"
1011302-50 = "แล้วฉันเป็นยังไงน่ะเหรอคะ? นั่นสินะ ฉันเองก็คงต้องบอกให้คุณครูรู้ด้วยว่ารู้สึกยังไง"
1011302-51 = "ตอนนี้ฉัน... ถ้าให้พูดง่ายๆ ละก็"
1011302-52 = "ฉันรู้สึกถึงอันตรายจากทุกอย่างที่เห็นเลยค่ะ"
1011302-53 = "[s] \"ทำไมล่ะ?! มีอะไรอันตรายเหรอ!? ทำไม?!?!\""
1011302-54 = "ลองมองไปทางโน้นสิคะ"
1011302-58 = "อะฮะฮะฮ่า! อะฮะฮะฮะฮะฮ่า! หยุดนะ พี่! ฉันจั๊กจี้นะ!!!"
1011302-59 = "ตรงนี้เหรอ? ตรงนี้ใช่มั้ย?! อย่าหนีสิ! จะจั๊กจี้ให้หนักกว่าเดิมอีก!!!"
1011302-61 = "ก็แค่เด็กๆ ที่เล่นกันอย่างนั้นเหรอคะ? จะมองแบบนั้นก็ไม่แปลกหรอกค่ะ"
1011302-62 = "แต่ในขณะเดียวกัน นั่นก็เป็นการกระทำที่อันตรายใช่ย่อยเลยละค่ะ"
1011302-63 = "ปกติแล้วร่างกายของมนุษย์จะรักษาระดับออกซิเจนให้อยู่ที่ 99%"
1011302-64 = "แต่การจั๊กจี้ที่มากเกินพอดีจะทำให้ระดับออกซิเจนในเลือดลดลง และอาจก่อให้เกิดภาวะขาด#nออกซิเจนได้ค่ะ"
1011302-65 = "แต่คนเราก็ไม่น่าจะจั๊กจี้กันจนระดับออกซิเจนลดลงงั้นเหรอคะ?"
1011302-66 = "คุณครู มนุษย์เป็นสิ่งมีชีวิตที่คาดเดาไม่ได้ค่ะ"
1011302-67 = "แล้วก็ยังมีคนที่มักทำอะไรอันตรายๆ ด้วย"
1011302-69 = "โอ้ว... บะหมี่สุกกำลังดีเลย"
1011302-70 = "วันนี้ฉันอยากลิ้มรสเส้นก่อน งั้นเอาไว้ค่อยใส่ไข่ออนเซ็นคราวหลังแล้วกัน"
1011302-71 = "เอาละ ขอกินเส้นที่หนานุ่มและกลมกล่อมก่อนละนะ"
1011302-73 = "คุณครูคิดว่าการใส่ไข่ออนเซ็นในบะหมี่ถ้วยเป็นวิธีกินที่น่าสนุกเหรอคะ? ค่ะ จะคิดแบบนั้นก็ไม่ผิดค่ะ"
1011302-74 = "แต่เมื่อเทียบกับเส้นบะหมี่แล้ว ไข่ออนเซ็นค่อนข้างกินยาก แล้วถ้าเป็นเส้น ก็กลืนลงคอง่ายๆ ได้ในครั้งเดียวค่ะ"
1011302-75 = "ในกรณีนี้ การกินไข่ก่อนเพื่อส่งสัญญาณให้หลอดอาหารและกระเพาะอาหารรู้ก่อนจะปลอดภัยกว่าค่ะ"
1011302-76 = "และที่สำคัญ การกินมากๆ ในครั้งเดียวอาจทำให้อาหารไปติดหลอดลมจนกลายเป็นศพ... ไม่สิ จนกลายเป็นผู้ป่วยฉุกเฉินได้ค่ะ"
1011302-77 = "ยังไม่หมดแค่นี้นะคะ ทางโน้นก็เสี่ยงเหมือนกันค่ะ"
1011302-79 = "ฮืม~ ฮื้ม~ ฉันชอบชีสที่สุด~"
1011302-80 = "แล้วถ้ามีชีส ก็ต้องมีแตงกวาดองด้วย~"
1011302-81 = "ก็แตงกวาดองจะช่วยชูรสชาติที่เข้มข้นของชีสยังไงล่ะ~"
1011302-83 = "ใช่ค่ะ ปัญหาอยู่ที่การกินชีสกับแตงกวาดองด้วยกันค่ะ แล้วมันอันตรายอย่างไรน่ะเหรอคะ?"
1011302-84 = "ในอาหารหมักดองมีสารที่เรียกว่าไทรามีนค่ะ"
1011302-85 = "ไทรามีนที่ว่านี้พบได้มากในชีสและผักที่ดองด้วยน้ำส้มสายชู"
1011302-86 = "หากไทรามีนไปกระตุ้นระบบประสาทซิมพาเทติกมากเกินไป ก็อาจทำให้หัวใจเต้นผิดจังหวะได้ค่ะ"
1011302-87 = "ภาวะหัวใจเต้นผิดจังหวะก็เป็นภาวะทางการแพทย์ที่ต้องได้รับการรักษา เพราะมันนำไปสู่ภาวะหัวใจ#nหยุดเต้นได้ค่ะ"
1011302-88 = "[s9] \"ถ้าไม่อยากอยู่ในอันตราย งั้นก็ไม่ควรทำอะไรเลยสินะ...\"\n[s10] \"งั้นก็ไม่ควรทำอะไรเลย เพื่อความปลอดภัยของชีวิตสินะ...\""
1011302-91 = "ค่ะ ถ้าจัดการเรื่องโภชนาการและปัจจัยพื้นฐานทั้งหมดในการดำรงชีวิตในบ้านได้ การอยู่แต่บ้าน ไม่ออกไปทำอะไรเลยก็น่าจะปลอดภัยที่สุดค่ะ"
1011302-92 = "[s] \"แบบนั้นมันก็เกินไปหน่อยหรือเปล่า?!\""
1011302-93 = "อีกอย่าง ถ้าต้องรับมือกับเหตุการณ์ฉุกเฉินแบบนั้นอย่างรวดเร็ว ก็ต้องมีคนอย่างฉันที่ต้อง#nเตรียมพร้อมอยู่ตลอดด้วยค่ะ"
1011302-94 = "[s] \"ถ้าพูดแบบนั้น ครูก็พูดอะไรต่อไม่ได้น่ะสิ...\""
1011302-95 = "ที่ฉันชอบการเตรียมพร้อมหรือสแตนด์บาย ก็เพราะอยากไปรับมือกับเหตุการณ์ฉุกเฉินได้อย่างทัน#nท่วงทีหรือเปล่าน่ะเหรอคะ?"
1011302-96 = "ก็ไม่เป็นอย่างนั้นเสมอไปหรอกค่ะ..."
1011302-97 = "แน่นอนว่าระหว่างนั้น ฉันก็จะจัดเอกสารหรือตรวจเช็กบันทึกการทำงานด้วย"
1011302-98 = "สำหรับฉันแล้ว เวลาที่อยู่คนเดียวแบบนี้จะสะดวกต่อการจัดการงานอื่นๆ ค่ะ"
1011302-99 = "และโดยพื้นฐานแล้ว... ค่ะ ฉันน่าจะชอบเพราะตอนนั้นฉันคาดหวังกับ 'สิ่งที่ยังไม่เกิดขึ้น' ได้น่ะค่ะ"
1011302-100 = "[s] \"ช่วยอธิบายอีกหน่อยได้มั้ย?\""
1011302-101 = "......"
1011302-102 = "อนาคตเป็นสิ่งที่คาดเดาไม่ได้ค่ะ และแน่นอนว่าคนเราย่อมมีความวิตกกังวลเกี่ยวกับอนาคตนั้น"
1011302-103 = "แต่ถึงยังไง เราก็ไม่อาจล่วงรู้ถึงอนาคตได้"
1011302-104 = "นั่นยิ่งทำให้เราไม่อาจคาดเดาได้ว่าจะมีศพ... ไม่สิ จะมีผู้ได้รับบาดเจ็บอยู่ที่ไหน และจะบาดเจ็บตรง#nไหนของร่างกายบ้าง"
1011302-105 = "ภาพที่ฉันเห็นตรงหน้าก็เลยทำให้ฉันตึงเครียดอยู่นิดหน่อยน่ะค่ะ"
1011302-106 = "แน่นอนว่ามันจะดีที่สุดถ้าไม่มีอะไรเกิดขึ้น ฉันก็หวังเป็นอย่างยิ่งว่ามันจะเป็นแบบนั้นค่ะ"
1011302-107 = "แต่ถึงอย่างนั้น ความรู้สึกเมื่อได้เฝ้าดูสิ่งที่เกิดขึ้นโดยไม่วางใจมากเกินไป... ก็ให้ความพึงพอใจทาง#nอารมณ์กับฉันอยู่เหมือนกัน"
1011302-108 = "และการเฝ้าดูสิ่งที่เกิดขึ้นด้วยความตึงเครียดในลักษณะนั้นก็เป็นสิ่งที่มีความหมายสำหรับฉันเป็นการ#nส่วนตัวด้วยค่ะ"
1011302-113 = "เวลาผ่านไปเร็วจังเลยนะคะ"
1011302-114 = "ไม่รู้ว่าเป็นเพราะชุดหรือเปล่า ฉันเลยรู้สึกเหมือนตัวเย็นกว่าปกติเล็กน้อยค่ะ"
1011302-115 = "ในอีกนัยหนึ่ง นี่อาจนำไปสู่ภาวะอุณหภูมิร่างกายต่ำกว่าปกติได้"
1011302-116 = "และเพื่อป้องกันภาวะอุณหภูมิร่างกายต่ำกว่าปกติ ฉันว่าเราต้องลดระยะห่างระหว่างกันค่ะ"
1011302-121 = "[ns] \"เหตุผลเพราะกลัวภาวะนั้นจริงๆ เหรอ?\""
1011302-122 = "ไม่หรอกค่ะ มันเป็นแค่ข้ออ้างน่ะค่ะ"
1011302-123 = "เหตุผลจริงๆ ก็คือ ฉันอยากอยู่ใกล้ชิดกับคุณครูค่ะ"
1011302-124 = "ค่ะ วันนี้..."
1011302-128 = "ฉันอยากบอกอีกครั้งว่าฉันดีใจที่ได้พบคุณครูในวันนี้ค่ะ"
1011302-129 = "ขอโทษนะคะ... ฉันเป็นคนแบบนี้น่ะค่ะ แต่ถึงยังไง..."
1011302-130 = "ความคิดที่ว่า 'การเดตสแตนบายด์เป็นอย่างนี้สินะ' ก็ทำให้ฉันใจสั่นหวิวค่ะ"
1011302-131 = "เดตสแตนบายด์คืออะไรน่ะเหรอคะ? ถามอะไรอย่างนั้นคะ คุณครู"
1011302-132 = "มันก็คือการเดตในระหว่างที่เตรียมพร้อมเพื่อทำงานยังไงล่ะคะ"
1011302-133 = "เหมือนกับเราในตอนนี้ไง"
1011302-135 = "(จากนั้นคุณครูก็ 'เดตสแตนบายด์' กับเซนะอยู่ครึ่งวันแล้วกลับมา)"
1011302-136 = "(ก็การเดตยังหมายถึงการพบกันแบบเรียบง่ายด้วยนี่เนอะ!)"

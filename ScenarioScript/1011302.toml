1011302-126 = "#clearST"
1011302-127 = "3;세나 사복;99\n#3;em;[...]\n#3;closeup\n#wait;2500"
1011302-128 = "3;세나 사복;01;다시금 말씀드리는 것입니다만, 선생님을 만나게 되어서 기쁩니다.\n#3;closeup"
1011302-129 = "3;세나 사복;99;……죄송합니다. 저는 항상 이런 느낌이어서. 그래도.\n#3;closeup\n#3;greeting"
1011302-130 = "3;세나 사복;06;대기 데이트라는 게 이런 느낌일 것 같다는 생각에, 설레고 있기도 합니다.\n#3;em;[///]\n#3;closeup"
1011302-131 = "3;세나 사복;02;대기 데이트라는 게 무엇이냐고요? 당연한 것을 물으시네요. 선생님.\n#3;closeup"
1011302-132 = "3;세나 사복;01;그것은 대기 중에 이루어지는 데이트입니다.\n#3;closeup"

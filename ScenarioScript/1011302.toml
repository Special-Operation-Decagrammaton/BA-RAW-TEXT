1011302-121 = "[ns] \"……정말로 저체온증 때문이야?\""
1011302-122 = "3;세나 사복;02;아니오. 그건 일종의 핑계 같은 것입니다.\n#3;closeup\n#3;em;[반응]"
1011302-123 = "3;세나 사복;99;선생님과 이렇게 있고 싶다는 마음이 들었습니다. 이유는 그것뿐입니다.\n#3;closeup"

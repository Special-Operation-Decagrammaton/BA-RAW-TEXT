[translation]
11234030-1 = "#title;팀워크;최고의 프로그램 1"
11234030-2 = "3;카즈사 밴드;17;으음…….\n#3;a\n#3;em;…"
11234030-3 = "3;카즈사 밴드;17;음……."
11234030-4 = "3;아이리 밴드;02;……카즈사 쨩? 왜 그래? 뭔가 고민에 빠진 얼굴인데.\n#3;a\n#3;em;[?]"
11234030-5 = "3;카즈사 밴드;16;아, 아니. 뭐 큰일은 아니고……."
11234030-6 = "3;카즈사 밴드;04;뭔가 열심히 하는 거랑은 별개로, 손발이 좀 안 맞는달까, 조율이 안 되는 것 같은 느낌을 지울 수가 없네.\n#3;em;[땀]"
11234030-7 = "3;요시미 밴드;02;그래? 그럭저럭 맞춰져 가고 있다고 생각했는데? 그 정도로는 부족하려나?\n#3;a"
11234030-8 = "3;아이리 밴드;07;확실히……. 개인 연주 자체만 보자면 꽤 늘은 것 같지만……."
11234030-9 = "3;나츠 밴드;99;모인 요소들이 하나가 되지 못하면 무너지게 마련. 그것은 무엇이든 만고의 진리겠지.\n#3;a"
11234030-10 = "3;나츠 밴드;02;다시 협동심을 키울 때로군. 합동 훈련이다.\n#3;em;[반짝]"
11234030-11 = "3;카즈사 밴드;16;아니, 지금이 이미 합동 훈련이거든."
11234030-12 = "3;카즈사 밴드;16;나는 그냥 좀 더 맞춰보자는 느낌으로…….\n#3;em;…"
11234030-13 = "3;나츠 밴드;10;갈-!!!!\n#3;closeup\n#fontsize;80"
11234030-14 = "3;나츠 밴드;10;그런 나약한 마인드로는 천하제일 연주대회에서 살아남을 수 없다!!\n#3;closeup\n#fontsize;80\n#3;em;[!]"
11234030-15 = "3;요시미 밴드;01;그런 대회였냐, 우리?\n#3;em;[땀]"
11234030-16 = "3;나츠 밴드;05;서로 눈빛만 봐도, 아니 눈빛 교환조차 필요 없을 만큼 척하면 척이어야 해. 모두 하나의 음에 다 같이 몸을 실어야 해!"
11234030-17 = "3;나츠 밴드;10;하나의 음에 몸을 싣는다……. 그래. 바로 그런 훈련이 따로 병행돼야 한다!!\n#3;em;[!]\n#3;closeup"
11234030-18 = "#all;hide"

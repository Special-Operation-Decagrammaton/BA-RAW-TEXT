[translation]
11234030-1 = "團隊合作;絕佳的計畫（１）"
11234030-2 = "哼嗯……"
11234030-3 = "嗯……"
11234030-4 = "……千紗醬？怎麼了？你看起來好像有煩惱的樣子。"
11234030-5 = "啊，不，沒什麼……"
11234030-6 = "只是覺得我們雖然練得很努力，但還是有種不太協調的感覺。"
11234030-7 = "會嗎？我倒是覺得還挺不錯的，這樣還不夠嗎？"
11234030-8 = "唔嗯……如果只看獨奏的話，大家確實都進步了不少……"
11234030-9 = "然而只要各個元素無法融合在一起，最終就註定會失敗。#n這是亙古不變的道理。"
11234030-10 = "看來是時候培養一下團隊默契了。#n來做個默契訓練吧。"
11234030-11 = "不是，我們現在不就已經在練習了嗎。"
11234030-12 = "我只是覺得再磨合一下會更好而已……"
11234030-13 = "太天真了──！！！！"
11234030-14 = "憑藉這種軟弱的心態，是無法在天下第一演奏大會上存活的！！"
11234030-15 = "我們要參加的是那種大會嗎？"
11234030-16 = "得做到光靠一個眼神……不，甚至不需要眼神就能讓所有人都心領神會！"
11234030-17 = "要讓彼此的頻率達成一致……沒錯，必須進行這樣的訓練才行！"
11234030-19 = "讓彼此的頻率……？"
11234030-20 = "達成一致……？"
11234030-22 = "哼哼，我早就預料到會出現這種情況，所以事先做了準備。#n接下來，我們要做的就是……"
11234030-23 = "……「合體體操」！！"
11234030-24 = "什麼跟什麼啊。"
11234030-25 = "肯定又是什麼奇怪的東西吧。我早就習慣他的這種套路了。"
11234030-26 = "哼哼哼……包在我身上。"
11234030-27 = "就讓你們見識什麼叫絕佳的計畫吧！！"

[translation]
11234030-1 = "ทีมเวิร์ก;โปรแกรมที่ดีที่สุด 1"
11234030-2 = "อืม..."
11234030-3 = "อืม..."
11234030-4 = "คาซึสะจัง...? เป็นอะไรไปเหรอ? หน้าตาเหมือนดูกังวลอะไรเลย"
11234030-5 = "ปะ... เปล่าหรอก มันไม่ใช่เรื่องใหญ่อะไร..."
11234030-6 = "ฉันก็แค่รู้สึกว่าพวกเราตั้งใจกันมากก็จริง แต่พอเล่นแล้วมันดูไม่ประสานกันเท่าไร เลยคิดว่าควรปรับ#nเข้าหากันดูน่ะ"
11234030-7 = "งั้นเหรอ? ฉันคิดว่าเราเล่นประสานกันได้ดีอยู่นะ หรือว่าแค่นี้ยังดีไม่พออีก?"
11234030-8 = "อืม... ถ้าดูแค่ตอนซ้อมเดี่ยว ฉันว่าทุกคนก็พัฒนาขึ้นอย่างเห็นได้ชัดนะ..."
11234030-9 = "แต่ถ้ารวมกันแล้วไม่เป็นหนึ่งเดียว ก็ถือว่าล่มทั้งหมดนะ นี่คือสัจธรรมเก่าแก่ของทุกสรรพสิ่งเลยละ"
11234030-10 = "ถึงเวลาร่วมแรงร่วมใจอีกครั้งสินะ มาร่วมแรงร่วมใจกันซ้อม!"
11234030-11 = "เดี๋ยวก่อน ที่ผ่านมาเราก็ร่วมแรงร่วมใจกันอยู่แล้ว"
11234030-12 = "ฉันแค่เสนอให้เราเล่นให้เข้ากันอีกหน่อย..."
11234030-13 = "ลุย!!!!"
11234030-14 = "เราจะผ่านการแข่งขันสุดหฤโหดด้วยจิตใจที่อ่อนแอแบบนั้นไม่ได้หรอกนะ!!"
11234030-15 = "กลายเป็นการแข่งขันสุดหฤโหดเฉยเลย?"
11234030-16 = "เราต้องเป็นหนึ่งเดียวกัน ขนาดที่ไม่ต้องมองตาก็รู้ใจ! ผสานร่างกายจนเกิดเสียงเดียวกัน!"
11234030-17 = "ผสานร่างกายจนเกิดเสียงเดียวกัน... ใช่ เราต้องฝึกแบบนี้ควบคู่กันไป!!"
11234030-19 = "ผสานร่างกาย...?"
11234030-20 = "จนเกิด... เสียงเดียวกัน...? "
11234030-22 = "ฮุฮุ ฉันรู้แล้วละว่าจะเป็นแบบนี้ ก็เลยเตรียมนี่มาด้วย จากนี้สิ่งที่พวกเราต้องทำก็คือ..."
11234030-23 = "\"ร่วมแรงร่วมใจกายบริหาร\"...!!"
11234030-24 = "อะไรของเขาอีกล่ะทีนี้?"
11234030-25 = "ให้ทำอะไรแปลกๆ อีกแล้วสินะ เจอทุกวันแต่ก็ยังไม่ชินอยู่ดีแฮะ"
11234030-26 = "ฮุฮุฮุ... ไว้ใจฉันได้เลย"
11234030-27 = "ฉันจะเปิดโปรแกรมที่ดีที่สุดให้เอง!!"

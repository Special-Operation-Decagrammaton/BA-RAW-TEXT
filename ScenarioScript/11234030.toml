[translation]
11234030-1 = "Teamwork;The Best Program 1"
11234030-2 = "Hm..."
11234030-3 = "Hm..."
11234030-4 = "...Kazusa? What's wrong? You look like there's something on your mind."
11234030-5 = "W-Well, uh... It's nothing serious..."
11234030-6 = "Even though we're all working hard, it's like something's not clicking right... I can't shake the feeling that we're just not coordinating well."
11234030-7 = "Yeah? I thought we were doing all right. Do you think we're not good enough?"
11234030-8 = "Now that you mention it...we've all improved in terms of individual performance..."
11234030-9 = "But if we cannot stand together, we will all fall apart. That is simple, eternal truth."
11234030-10 = "We have to improve our teamwork. It's time for group training."
11234030-11 = "Um, we're already doing group training."
11234030-12 = "I was just going to suggest we play together more..."
11234030-13 = "Shush!"
11234030-14 = "You won't survive the World Performing Arts Tournament with that kind of weak mentality!!"
11234030-15 = "Since when is this a world tournament...?"
11234030-16 = "We should be able to communicate with just a look...no, without even needing to look at each other. We must throw ourselves into a single note together!"
11234030-17 = "Throwing ourselves into a single note... Yes. That's the training we need!"
11234030-19 = "...A single note...?"
11234030-20 = "Throw ourselves...together...?"
11234030-22 = "Heh heh. Fortunately, I planned for such an occasion. What we need now is..."
11234030-23 = "...a team-building exercise!"
11234030-24 = "What do you mean?"
11234030-25 = "Probably something weird again. We should all be used to that by now."
11234030-26 = "Heehee... Leave it all to me."
11234030-27 = "I'll design the greatest exercise we could ever have!"

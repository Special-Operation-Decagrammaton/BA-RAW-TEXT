11234030-20 = "2;아이리 밴드;07;다 같이 몸을……. 싣는다……?"
11234030-21 = "#all;hide"
11234030-22 = "3;나츠 밴드;08;후훗. 이럴 수도 있겠다 싶어서 챙겨 왔지. 이제부터 우리가 해야 할 일은…….\n#3;em;…"
11234030-23 = "3;나츠 밴드;05;……바로 \"합동 체조\"!!\n#3;jump"
11234030-24 = "3;요시미 밴드;08;그건 또 뭐야.\n#3;em;[땀]"
11234030-25 = "3;카즈사 밴드;18;보나마나 또 이상한 거겠지. 이 패턴도 이제 익숙하잖아."
11234030-26 = "3;나츠 밴드;08;후후후……. 여긴 내게 맡겨."
11234030-27 = "3;나츠 밴드;10;최고의 프로그램을 선사해 주지!!\n#3;em;[!]\n#3;closeup"

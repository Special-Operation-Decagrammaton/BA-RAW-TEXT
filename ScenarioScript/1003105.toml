[translation]
1003105-1 = "The First Step With You"
1003105-2 = "(I headed over to the meeting spot after Aru's last message.)"
1003105-6 = "(Everything was quieter and cleaner than normal on the first morning of the year.)"
1003105-8 = "(Even the lights of the city felt a little brighter.)"
1003105-9 = "(Maybe that's why I felt like the wind was giving me more goosebumps than ever before.)"
1003105-12 = "(It was just early enough and cold enough to turn your cheeks and the tip of your nose red.)"
1003105-14 = "(I lost track of time as I walked and the cold slowly took hold of me, through my winter clothes.)"
1003105-15 = "(Finally, I arrived at the New Year's event just in the nick of time.)"
1003105-20 = "You're late, Sensei."
1003105-21 = "[s] \"I'm sorry. By the way...\""
1003105-22 = "Huh? Why are you looking at me like that?"
1003105-23 = "Heehee. You look like you have something to say."
1003105-25 = "*nervous glance*"
1003105-26 = "... *nervous glance*"
1003105-27 = "[s1] \"I didn't get the chance to tell you last time, but...\"\n[s2] \"Your outfit, it's...\""
1003105-28 = "Um, w-wait!"
1003105-29 = "Um, w-wait!"
1003105-32 = "(Wh-What was up with that awkward silence just now?! My heart is about to leap out of my chest. Abort! I'm not ready! I'm not readyyy!)"
1003105-33 = "(Stall! Stall!!!)"
1003105-36 = "L-Let's talk about that later. We have more pressing matters to discuss."
1003105-37 = "[s] \"More pressing matters?\""
1003105-38 = "I called you here so early in the morning for good reason."
1003105-39 = "I wanted to say my New Year's greetings to you in person."
1003105-40 = "Did you know that this place is sacred ground? It wouldn't hurt to ask, so...care to hang out with me a little, Sensei?"
1003105-41 = "[s] \"Sure.\""
1003105-42 = "Okay, then let's go, Sensei!"
1003105-45 = "― Heehee. You're so slow, Sensei.[wa:2670] "
1003105-47 = "― Huh? I walk too fast? Don't be silly.[wa:3210] "
1003105-50 = "― Well, it's just that I always try to be punctual.[wa:1270] "
1003105-52 = "― I am a boss after all.[wa:2860] "
1003105-55 = "― The early bird catches the worm.[wa:910] "
1003105-58 = "― As for this year, Problem Solver[wa:10] "
1003105-60 = "― is going to work harder than ever.[wa:1070] "
1003105-63 = "― Of course, that includes you as well, Sensei.[wa:10] "
1003105-66 = "― You're our business partner, after all."
1003105-68 = "― We wouldn't leave you out of our business plans.[wa:1610] "
1003105-71 = "― Here's to our relationship.[wa:1070] "
1003105-73 = "― I hope we'll be together for a long time.[wa:1050] "
1003105-76 = "― O-Our business relationship, I mean! Strictly professional![wa:920] "
1003105-79 = "― (Wh-What am I saying right now?![wa:3020] "
1003105-81 = "― Me and my big mouth!)[wa:160] "
1003105-88 = "Thanks again for meeting with me so early in the morning, Sensei."
1003105-89 = "It's pretty cold out. Are you holding up okay?"
1003105-90 = "[s] \"Yeah, never better.\""
1003105-91 = "Oh, o-okay."
1003105-92 = "Well, I think that wraps things up. Shall we head home?"
1003105-93 = "[s] \"Aru.\""
1003105-94 = "Y-Yes? Wh-What is it, Sensei?"
1003105-95 = "[s3] \"That outfit really suits you.\"\n[s4] \"You look really pretty today.\""
1003105-96 = "...!"
1003105-97 = "...!"
1003105-101 = "Heh heh. Well, of course. I am the leader of Problem Solver 68, after all."
1003105-107 = "But thank you for the compliment, Sensei."

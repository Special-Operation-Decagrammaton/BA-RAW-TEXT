[translation]
1003105-1 = "ก้าวแรกของเรา"
1003105-2 = "(คุณครูมาที่สถานที่นัดพบหลังคุยแชทกับอารุ)"
1003105-6 = "(ถนนในเช้าแรกของวันปีใหม่ ดูเงียบสงบและสะอาดตากว่าวันอื่นๆ)"
1003105-8 = "(แสงไฟภายในเมืองก็ดูส่องสว่างกว่าทุกๆ วัน)"
1003105-9 = "(และรู้สึกว่าอากาศเย็นมากกว่าปกติจนรู้สึกแสบผิว)"
1003105-12 = "(อากาศเย็นตอนเช้าตรู่ทำให้จมูกและผิวบริเวณแก้มเปลี่ยนเป็นสีชมพู...)"
1003105-14 = "(นานแค่ไหนแล้วที่ไม่ได้เดินฝ่าลมเย็นๆ ที่ทำให้รู้สึกหนาวจนต้องเอามือซุกไว้ในกระเป๋าเสื้อแบบนี้...)"
1003105-15 = "(ในที่สุดคุณครูก็มาถึงสถานที่จัดงานฉลองปีใหม่ ทันเวลาที่นัดไว้...)"
1003105-20 = "มาช้านะ คุณครู"
1003105-21 = "[s] \"อ๊ะ ขอโทษนะแต่ว่า....\""
1003105-22 = "หืม? อะไรกัน ทำไมจ้องฉันแบบนั้นล่ะ"
1003105-23 = "ฮุฮุฮุ ทำหน้าเหมือนอยากพูดอะไรเลยนะ"
1003105-25 = "(เหลือบมอง)"
1003105-26 = "....(เหลือบมอง)"
1003105-27 = "[s1] \"คือคราวที่แล้วครูลืมบอกไป\"\n[s2] \"ชุดนั้นมัน...\""
1003105-28 = "ดะ... ดะ...เดี๋ยวก่อน!"
1003105-29 = "ดะ... ดะ...เดี๋ยวก่อน!"
1003105-32 = "(ความเงียบเมื่อกี้คืออะไรกัน ตะ...ตื่นเต้นจนลนไปหมดแล้ว! มะ...ไม่นะ! ไม่ๆ!#nไม่เอา... ไม่ใช่ตอนนี้สิ ฉันยังไม่ได้เตรียมใจเลย!)"
1003105-33 = "(ฉันยังไม่ได้เตรียมใจเลย... เอาไว้คราวหน้า เอาไว้คราวหน้าแล้วกัน!)"
1003105-36 = "เรื่องนั้นเอาไว้เดี๋ยวค่อยคุยกันเถอะ มีเรื่องด่วนกว่ารออยู่น่ะ"
1003105-37 = "[s] \"เรื่องด่วน?\""
1003105-38 = "ที่ฉันเรียกคุณครูมาแต่เช้าแบบนี้..."
1003105-39 = "วันนี้ฉันอยากจะชวนไปขอพรปีใหม่ด้วยกันน่ะ"
1003105-40 = "ได้ยินว่าที่นี่ศักดิ์สิทธิ์มาก แล้ว... คุณครูจะไปกับฉันหน่อยได้มั้ย?"
1003105-41 = "[s] \"ไปสิ\""
1003105-42 = "อื้อ งั้นไปกันเถอะคุณครู!"
1003105-45 = "― ฮุฮุ คุณครู... เดินช้าไปแล้วนะ[wa:2710] "
1003105-47 = "― หืม? ฉันเดินเร็วงั้นเหรอ? เปล่าสักหน่อย[wa:3130] "
1003105-50 = "― ฉันก็แค่พยายามใส่ใจมากขึ้น...[wa:2070] "
1003105-52 = "― เพื่อจะได้ไม่สายเท่านั้นเอง ก็ฉันเป็นหัวหน้านี่นา[wa:1780] "
1003105-55 = "― นกที่ตื่นเช้า มักจับหนอนได้ก่อนเสมอนะ[wa:710] "
1003105-58 = "― ปีนี้หน่วยรับจ้างสารพัดของเรา...[wa:10] "
1003105-60 = "― จะต้องรุ่งเรือง มากกว่า ...ปีที่แล้วเป็นเท่าตัวเลย[wa:430] "
1003105-63 = "― แน่นอน...ว่าต้องมีคุณครูร่วมด้วยไงล่ะ[wa:90] "
1003105-66 = "― ตอนนี้คุณครูเป็นหุ้นส่วนในธุรกิจของเรา..."
1003105-68 = "― เพราะงั้น... จะขาดคุณครูไปไม่ได้สิ[wa:2170] "
1003105-71 = "― การได้ใช้เวลาร่วมกับคุณครู[wa:1110] "
1003105-73 = "― ถ้าเป็นแบบนี้ต่อไปก็คงดีนะ[wa:1650] "
1003105-76 = "― คิดไปถึงไหนกันน่ะ ฉันพูดถึงเรื่องงานต่างหาก![wa:1520] "
1003105-79 = "― (เดี๋ยวสิ ฉันพูดอะไรอยู่เนี่ย)[wa:3100] "
1003105-81 = "― (พูดอะไรออกไปก็ไม่รู้...!)[wa:10] "
1003105-88 = "ขอบคุณนะคุณครูที่มากับฉันตั้งแต่เช้า"
1003105-89 = "วันนี้อากาศหนาวจริงๆ คุณครูไม่เป็นไรนะ?"
1003105-90 = "[s] \"อื้อ ก็ได้อยู่\""
1003105-91 = "อ่า งั้นเหรอ..."
1003105-92 = "งะ...งั้นตอนนี้ก็เสร็จธุระแล้วละ งั้น...เรากลับกันเลยมั้ย? อะฮ่าฮ่าฮ่า..."
1003105-93 = "[s] \"อารุ\""
1003105-94 = "หะ...หืม? มีอะไรเหรอคุณครู?"
1003105-95 = "[s3] \"ชุดนั้นเหมาะกับเธอมากเลย\"\n[s4] \"วันนี้อารุสวยมากเลยนะ\""
1003105-96 = "...!"
1003105-97 = "...!"
1003105-101 = "ฮุฮุฮุ ของมันแน่อยู่แล้ว ถึงใครจะว่ายังไง แต่ฉันเป็นหัวหน้าของหน่วยรับจ้างสารพัด 68 เชียวนะ"
1003105-107 = "ขอบคุณที่ชมนะ คุณครู"

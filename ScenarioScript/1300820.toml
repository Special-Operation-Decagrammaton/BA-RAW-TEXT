1300820-81 = "I really like this bag..."
1300820-86 = "W-Well, these things happen, you know? And I've had it for forever anyways...!"
1300820-90 = "..."
1300820-91 = "But I did...really like my bag..."
1300820-92 = "[s] \"...Let's go, Serika!\""
1300820-93 = "Huh? Go where? Do we have somewhere to be?"
1300820-97 = "Y-You don't have to pull me! I'll come, okay? Sensei!"
1300820-103 = "Where...are we?"
1300820-104 = "You come here for alterations and repairs? Did you need to pick something up?"
1300820-105 = "[s3] \"Just trust me a little bit.\"\n[s4] \"Owner? Are you in?\""
1300820-111 = "Well, well, well. If it isn't my favorite Sensei."
1300820-112 = "[s] \"You see...\""
1300820-115 = "I get it now. Is it your bag we'll be fixing, young lady?"
1300820-116 = "O-Oh, yeah, right here..."
1300820-122 = "Let's see what we're working with... Broken strap, a tear in the corner here..."
1300820-123 = "And an expected amount of the usual wear-and-tear."
1300820-124 = "Ugh... "
1300820-125 = "But besides that, the bag is in excellent condition. I tip my hat to you."
1300820-126 = "R-Really...?!"
1300820-127 = "Without a doubt. What makes an item valuable isn't its price tag, but the care its given as it properly fulfills its duty. And I can tell you've taken great care of it."
1300820-128 = "Thank you! I-I hope you don't think that's weird."
1300820-129 = "Not at all. If anything, it makes me more excited to get working. Wait here just a moment."
1300820-135 = "[ns] \"That's a relief. I'm happy for you, Serika.\""
1300820-136 = "Me too..."
1300820-137 = "But it's just a bag, you know. Both of you are making way too big of a deal out of this."
1300820-138 = "[s] \"It's not too big of a deal if it's important to you.\""
1300820-139 = "H-Huh?! It's not like that! It's just a—"
1300820-143 = "I-It's just...just a bag..."
1300820-144 = "..."
1300820-145 = "[s] \"It seems like it means a lot to you.\""
1300820-146 = "It's not like that. It really isn't anything that meaningful."
1300820-147 = "I guess I just got a little attached to it, because it was the first thing I bought for myself with my very first paycheck after I started working."
1300820-148 = "The advertising was super cool! It sounded like everything I wanted in a bag: versatile, perfect for school or the gym, study..."
1300820-149 = "[s] \"So, it's not 'just a bag', is it?\""
1300820-150 = "You think so too, Sensei?"
1300820-151 = "Heehee. You're right. It's my bag! And it really lives up to all its claims!  "
1300820-152 = "It's really comfortable and has so many pockets! It just really makes you want to use it for some reason."
1300820-153 = "Actually, that means it's a pretty well-made, sturdy bag, doesn't it?"
1300820-154 = "I guess I do have a good eye for things after all!"
1300820-155 = "[s] \"...\""
1300820-156 = "Wh-What's with that look on your face, Sensei?!"
1300820-160 = "S-Stop it! Wipe that goofy smile off your face and say something!"
1300820-161 = "..."
1300820-162 = "Ugh! I'm gonna go to the bathroom!"
1300820-169 = "It should feel good as new. Go on, try it out."
1300820-170 = "It's even better! It looks just like the day I bought it, and the strap doesn't strain my shoulder as much!"
1300820-171 = "Good to hear! You like it?"
1300820-172 = "L-Like it? I'm speechless..."
1300820-173 = "I'll take it. This old dog's still got it."
1300820-174 = "Thank you so much. Um, how much...?"
1300820-175 = "Oh, the bill? Hm, why don't you just pay my base repair fee and we'll call it a day?"
1300820-176 = "Wait, but you did so much work! Are you sure?"
1300820-177 = "I can't upcharge when one of my regulars brings me a new client. Especially one that's so passionate about her bag! Call it a new customer discount."
1300820-178 = "..."
1300820-184 = "Thank you so, so much! I promise to take really good care of it!"
1300820-185 = "Ack! The time! I'm going to be late for work, Sensei! I'll see you soon, okay? Thank you again!"
1300820-189 = "...So."
1300820-190 = "Are you satisfied with the results, Sensei?"
1300820-191 = "[ns] Nod."
1300820-192 = "The bag repairs and whatnot cost a pretty penny... I mean, I was paid either way, so it wasn't a big deal. "
1300820-193 = "Even if you were calling in a rush job, that was a pretty big advance payment on your end."
1300820-194 = "[s5] \"It's just rare for Serika to buy anything for herself.\"\n[s6] \"I wanted to get the bag fixed for her without her worrying about the costs.\""
1300820-200 = "...I see."
1300820-201 = "Well, consider it mission accomplished. I can guarantee it'll hold up for a good, long time."
1300820-203 = "We spoke fondly about Serika for a little longer until I eventually found my way back to Schale."

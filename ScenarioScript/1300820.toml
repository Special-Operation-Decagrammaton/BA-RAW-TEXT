[translation]
1300820-1 = "มาตรฐานของสิ่งของที่ดี"
1300820-4 = "แฮ่ก... แฮ่ก... แฮ่ก...!"
1300820-5 = "ทีนี้เข้าใจรึยัง คุณครู? ซ่อนตัวอยู่ตรงนี้ดีๆ ก่อนล่ะ!"
1300820-11 = "ห้ามออกมาข้างนอกเด็ดขาดจนกว่าฉันจะบอกว่าปลอดภัยนะ สัญญาแล้วนะ?"
1300820-12 = "[s1] \"ขะ...เข้าใจแล้ว!\"\n[s2] \"ว่าแต่ว่า... เซริกะเป็นห่วงครูมากๆ เลยสินะเนี่ย...\""
1300820-15 = " คะ...ใครเป็นห่วงกันเล่า! คุณครูบ้า!"
1300820-16 = "ยังไงก็เถอะ คอยระวังลูกหลงดีๆ แล้วก็ซ่อนตัวให้ดีๆ ด้วยล่ะ!"
1300820-21 = "(เซริกะวิ่งออกไปโดยไม่รอฟังคำตอบจากคุณครู...)"
1300820-27 = "อะไรกัน เห็นวิ่งหนีหัวซุกหัวซุนไป สุดท้ายก็มาอยู่นี่เองเรอะ?"
1300820-31 = "คิกๆๆๆ... นั่นน่ะสิน้า ตอนพูดด้วยดีๆ ก็ควรจะฟังกันสักหน่อยสิ ที่ต้องอยู่ในสภาพดูไม่จืดแบบนี้#nก็เพราะไม่ยอมฟังกันยังไงล่ะ"
1300820-37 = "พูดได้ดีนี่..."
1300820-38 = "งั้นคอยดูแล้วกันว่าใครกันแน่ที่จะตกอยู่ในสภาพที่ดูไม่จืดน่ะ!"
1300820-39 = "ฮึ่ยยย ฉันโมโหสุดๆ แล้วนะ!"
1300820-42 = "โอ๊ย เจ็บนะ! บอกว่าเจ็บไงเล่า! เจ็บบบบ! หยุดเซ่!"
1300820-43 = "เกิดอะไรขึ้นเนี่ย? ตอนแรกยังวิ่งหนีหางจุกตูดแบบไม่คิดชีวิตเลยแท้ๆ...!"
1300820-50 = "นี่มันยังแค่เพิ่งเริ่มต้นเท่านั้น... อย่าเพิ่งรีบโอดครวญกันสิ"
1300820-51 = "บะ...บ้าเอ๊ย! ตอนนี้... รีบถอยก่อนเหอะ!"
1300820-55 = "นี่! ทำไมหนีไปคนเดียวเล่า! รอด้วยสิ!"
1300820-59 = "หยุดอยู่ตรงนั้นเลย! ฉันจะซัดให้หมอบอยู่ตรงนี้เอง...!"
1300820-61 = "[s] \"เอาละๆ คุณเซริกะ วันนี้พอเท่านี้เถอะนะ\""
1300820-68 = "คุณครู?! ฉันบอกให้ไปซ่อนตัวให้ดีๆ ไงล่ะ! ทำไมถึงออกมาจากที่ซ่อนก่อนฉันจะส่งสัญญาณให้แบบนี้!"
1300820-69 = "...ถ้ายังนั่งรออยู่แบบนั้น ก็คงไม่ได้ยินสัญญาณคำว่า 'ปลอดภัยแล้ว' ตลอดไปแน่ๆ งั้นเหรอ...?"
1300820-70 = "พะ...พูดอะไรน่ะ! แบบนั้นก็เหมือนว่าฉันเป็นคนที่พอโมโหก็ลืมตัว ฟาดงวงฟาดงาทำลายของทุกอย่าง#nที่ขวางหน้าน่ะสิ!"
1300820-71 = "[s] \"เอาน่า ไม่เป็นไรแล้วๆ\""
1300820-72 = "...พูดอะไรขอไปทีแบบนั้นอีกแล้ว..."
1300820-77 = "เอ๋? กระเป๋าฉัน..."
1300820-78 = "อ๊ะ... สายสะพายข้างหนึ่งขาดซะแล้ว... แถมตรงมุมกระเป๋าก็ขาดด้วย..."
1300820-79 = "......"
1300820-80 = "[ns] \"เซริกะ?\""
1300820-81 = "ทั้งที่เป็นกระเป๋าชั้นดีแท้ๆ..."
1300820-86 = "ชะ...ช่วยไม่ได้ละนะ... ฉันใช้มานานแล้วด้วย... "
1300820-90 = "......"
1300820-91 = "ทั้งที่เป็น...กระเป๋าที่...ชอบใช้แท้ๆ..."
1300820-92 = "[s] \"ไปกันเถอะ...!\""
1300820-93 = "เอ๋ คุณครู? จู่ๆ เป็นอะไรน่ะ? แล้วนี่จะไปไหนงั้นเหรอ?"
1300820-97 = "มะ...ไม่ต้องลากก็ได้ ฉันเดินตามไปอยู่แล้วละน่า! นี่ คุณครู? คุณครู!"
1300820-103 = "ที่นี่... คือที่ไหนน่ะ?"
1300820-104 = "ร้านรับซ่อมอุปกรณ์ที่คุณครูมาประจำงั้นเหรอ? ว่าแต่ว่าเรามาที่นี่ทำไมน่ะ?"
1300820-105 = "[s3] \"เอาน่าๆ ให้เป็นหน้าที่ของครูเอง\"\n[s4] \"เถ้าแก่~ อยู่รึเปล่า?\""
1300820-111 = "เสียงนี้มัน... คุณครูจากชาเล่ต์สินะ วันนี้มีอะไรพังมาอีกล่ะ?"
1300820-112 = "[s] \"คือว่าเรื่องนั้น...\""
1300820-115 = "อย่างนี้นี่เอง กระเป๋าของนักเรียนคนนี้เหรอ?"
1300820-116 = "อะ...อ้อ นี่ค่ะ..."
1300820-122 = "อืม... สายสะพายขาด แล้วก็ตรงมุมกระเป๋าก็เป็นรูด้วย..."
1300820-123 = "แถมยังมีรอยขนแมวเต็มไปหมดเลยนะเนี่ย"
1300820-124 = "งือ... "
1300820-125 = "แต่ก็เป็นกระเป๋าชั้นดีเลยนะ แถมดูเหมือนได้เจอเจ้าของที่รักษาของดีด้วย"
1300820-126 = "จะ...จริงเหรอ...?!"
1300820-127 = "จริงสิ แค่เห็นสภาพของกระเป๋านี่ก็รับรู้ได้ถึงความเอาใจใส่ของเจ้าของแล้วละ กระเป๋าใบนี้ทำหน้าที่#nของมันได้เป็นอย่างดี ก็เลยเป็นที่รักของเจ้าของไง แน่นอนว่าสิ่งของแบบนี้ต้องถือว่าเป็นของชั้นดี#nอยู่แล้วละ"
1300820-128 = "งะ...งั้นเหรอ...? ระ...รู้สึกอายจังเลย..."
1300820-129 = "คราวนี้ก็คงเป็นงานที่คุ้มค่าแน่นอน ดีละ เดี๋ยวฉันจะเริ่มซ่อมให้เลยก็แล้วกัน"
1300820-135 = "[ns] \"ค่อยยังชั่วเนอะ เซริกะ\""
1300820-136 = "อะ...อื้อ"
1300820-137 = "โธ่เอ๊ย ก็แค่กระเป๋าใส่อุปกรณ์กีฬาใบเดียวแท้ๆ แต่คุณครูกับเจ้าของร้านกลับเล่นใหญ่จริงๆ เลยนะ..."
1300820-138 = "[s] \"แต่มันเป็นกระเป๋าใบสำคัญของเซริกะนี่นา?\""
1300820-139 = "พะ...พูดอะไรน่ะ! มันก็แค่..."
1300820-143 = "ก็แค่..."
1300820-144 = "......"
1300820-145 = "[s] \"กระเป๋าใบนี้มีความทรงจำอะไรอยู่งั้นเหรอ?\""
1300820-146 = "ไม่มีหรอก ไม่มีเรื่องยิ่งใหญ่หรือเรื่องสำคัญอย่างความทรงจำดีๆ อะไรแบบนั้นหรอก"
1300820-147 = "ก็แค่... มันก็แค่กระเป๋าใส่อุปกรณ์กีฬาที่ฉันซื้อ ตอนที่ได้เงินจากการทำพาร์ทไทม์ครั้งแรกก็เท่านั้น"
1300820-148 = "ก็แค่หลงเชื่อคำพูดว่าเป็นกระเป๋าสารพัดประโยชน์ที่แข็งแรงทนทาน ใส่อะไรก็ได้ ทั้งใส่อุปกรณ์ต่างๆ อุปกรณ์กีฬา อุปกรณ์ทำงานพิเศษ หรือแม้แต่อุปกรณ์การเรียน..."
1300820-149 = "[s] \"จากที่เห็นก็ไม่ได้ดูโฆษณาเกินจริงเลยนะ...\""
1300820-150 = "คุณครูเองก็คิดแบบนั้นเหมือนกันเหรอ?"
1300820-151 = "...ฮิฮิ อื้อ ใช่แล้วละ ดีจริงๆ ที่ซื้อมา คุ้มค่าสมคำโฆษณาสุดๆ..."
1300820-152 = "คงเรียกว่าเป็นกระเป๋าที่ฉันเผลอถูกใจโดยไม่รู้ตัว แล้วใช้บ่อยๆ จนชินมือไปแล้วน่ะ..."
1300820-153 = "ก็นะ คงเพราะไม่มีกระเป๋าใบไหนที่ทนทานเหมือนใบนี้ละมั้ง?"
1300820-154 = "เห็นแบบนี้ ฉันก็ตาแหลมเหมือนกันนะ!"
1300820-155 = "[s] \"...\""
1300820-156 = "อะไรกันคุณครู ทำไมจู่ๆ ถึงเงียบไปล่ะ"
1300820-160 = "อะ...อะไรเล่า?! ทำไมมองกันด้วยสายตากรุ้มกริ่มแบบนั้น...!"
1300820-161 = "..."
1300820-162 = "ฉะ...ฉันขอไปล้างมือแป๊บหนึ่ง เดี๋ยวมานะ!"
1300820-169 = "เอ้า ซ่อมเสร็จแล้วละ ลองดูสิ"
1300820-170 = "เอ๋...? ซ่อมจนเหมือนของใหม่เลยแฮะ? สายกระเป๋าที่เปลี่ยนให้ก็ดูแข็งแรงกว่าเดิมเยอะเลย..."
1300820-171 = "เป็นไง ถูกใจรึเปล่า?"
1300820-172 = "จะให้บอกว่าชอบหรือไม่ชอบก็คงบอกไม่ถูกหรอก... แต่นี่มันน่าทึ่งสุดๆ เลยนะ...?"
1300820-173 = "ถ้างั้นก็ค่อยยังชั่วหน่อย ท่าทางฝีมือของฉันจะยังไม่ตกสินะ"
1300820-174 = "ขะ...ขอบคุณค่ะ คุณเจ้าของร้าน เอ่อ แล้วค่าซ่อม..."
1300820-175 = "ค่าซ่อม? จริงด้วยสินะ ถ้างั้นจ่ายมาแค่ค่าบริการพื้นฐานก็แล้วกัน"
1300820-176 = "เอ๋? ทำแบบนั้นได้จริงเหรอ?!"
1300820-177 = "เห็นแก่คุณครูที่เป็นลูกค้าประจำหรอกนะ แล้วอีกอย่าง พอได้เจอคนที่ใช้ของอย่างทะนุถนอมแบบเธอ มันทำให้ฉันรู้สึกใจฟูขึ้นด้วยน่ะ เพราะงั้น... คิดซะว่าเป็นบริการเสริมให้ลูกค้าที่มาครั้งแรกก็แล้วกัน"
1300820-178 = "..."
1300820-184 = "ขอบคุณนะ คุณเจ้าของร้าน! ฉันจะใช้กระเป๋าใบนี้อย่างดีเลย!"
1300820-185 = "อ๊ะ ใกล้ถึงเวลาทำงานพาร์ทไทม์แล้ว ขอโทษนะคุณครู ฉันขอตัวก่อนนะ!"
1300820-189 = "...คือว่า"
1300820-190 = "แค่นี้ก็พอแล้วใช่มั้ย คุณครู?"
1300820-191 = "[s] (พยักหน้า)"
1300820-192 = "ทั้งค่าซ่อม ค่าแรง... รวมแล้วก็ไม่ใช่เล่นๆ เลย แต่ก็นะ แค่ได้เงินค่าจ้างมาฉันก็พอแล้วละ "
1300820-193 = "แต่ว่ามีความจำเป็นอะไรที่ต้องจ่ายค่าซ่อมแพงๆ ล่วงหน้า แล้วก็เรียกฉันมากะทันหันแบบนี้งั้นเหรอ คุณครู?"
1300820-194 = "[s5] \"กระเป๋าใบนั้นเป็นของที่เซริกะยอมซื้อให้ตัวเองเลยนี่นา\"\n[s6] \"อยากให้เธอได้ใช้กระเป๋าใบนั้นนานๆ น่ะ จะแพงเท่าไรก็ยอม\""
1300820-200 = "...อย่างนี้นี่เอง"
1300820-201 = "ไม่ต้องห่วง ถึงกระเป๋าใบนั้นจะดูเก่าไปสักหน่อย แต่ซ่อมแล้วก็คงใช้ต่อไปได้อีกหลายปีเลยละ"
1300820-203 = "(คุณครูนั่งคุยกับเจ้าของร้านซ่อมเรื่องเซริกะต่ออยู่ครู่หนึ่ง จากนั้นก็กลับไปที่ชาเล่ต์...)"

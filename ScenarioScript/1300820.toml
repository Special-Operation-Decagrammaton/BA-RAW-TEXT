[translation]
1300820-1 = "好東西的標準"
1300820-4 = "哈啊，哈啊，哈啊……！"
1300820-5 = "聽清楚囉，老師？#n乖乖躲在這裡別出來。"
1300820-11 = "在我說可以之前，絕對不能擅自出來哦。知道了嗎？我們約好了喔？"
1300820-12 = "[s1]「我，我知道了！」\n[s2]「話說……茜香真愛操心呢……」"
1300820-15 = "我，我哪有愛操心！笨蛋老師！"
1300820-16 = "總之一定要躲好哦！還有要小心流彈！"
1300820-21 = "（還沒聽到回答，茜香就跑走了……）"
1300820-27 = "什麼嘛，還以為你已經夾著尾巴逃走了，原來在這裡啊？"
1300820-31 = "咯咯，你當初就該乖乖聽話才對。#n你看，現在有苦頭吃了吧……"
1300820-37 = "……還真敢說。"
1300820-38 = "那就來看看有苦頭吃的人究竟是誰吧！"
1300820-39 = "啊啊，真是！有夠火大！"
1300820-42 = "唔，好痛！痛死我了！快住手！"
1300820-43 = "這是怎麼回事？#n剛剛明明頭也不回地逃跑了啊……！"
1300820-50 = "你們該不會以為這樣就結束了吧？"
1300820-51 = "呿！暫時撤退！"
1300820-55 = "喂！別自己一個人逃跑啊！等等我！"
1300820-59 = "給我站住！我還有帳沒跟你們算完啊……！"
1300820-61 = "[s]「哎呀哎呀，茜香同學。今天就到此為止吧。」"
1300820-68 = "老師！？我不是跟你說要乖乖躲好嗎！#n都還沒叫你出來，你怎麼就自己跑出來了！？"
1300820-69 = "……你說繼續看下去的話可能這輩子都不用出來了？"
1300820-70 = "什，什麼嘛！#n我又不是會氣昏頭的人！"
1300820-71 = "[s]「沒關係沒關係，別在意。」"
1300820-72 = "……又用這種方式蒙混過關……"
1300820-77 = "咦？我的包包……"
1300820-78 = "啊……一邊的揹帶斷了……糟糕，邊緣也磨破了……"
1300820-79 = "……"
1300820-80 = "[ns] 「茜香？」"
1300820-81 = "我還挺喜歡這個包包的說……"
1300820-86 = "這，這也沒辦法！#n反正……這個包包也用很久了。嗯！"
1300820-90 = "……"
1300820-91 = "明明，是個好包包的說……"
1300820-92 = "[s]「……跟我走吧！」"
1300820-93 = "咦，老師？為什麼突然抓住我？#n走？要走去哪裡啊？"
1300820-97 = "不，不用拉著我也會跟你走啦！#n老師？老師！"
1300820-103 = "這裡……是哪裡？"
1300820-104 = "是你常來的維修店？那又為什麼要來這裡呢？"
1300820-105 = "[s3]「好了好了，你就相信老師吧。」\n[s4]「店長，你在嗎？」"
1300820-111 = "這個聲音……是夏萊的老師啊。#n今天來有什麼事嗎？"
1300820-112 = "[s]「這個嘛……」"
1300820-115 = "原來如此，這位同學的包包啊……"
1300820-116 = "嗯，嗯，就是這個……"
1300820-122 = "嗯……除了揹帶斷掉之外，邊角也有點磨損……"
1300820-123 = "其他地方也有不少損傷呢……"
1300820-124 = "唔唔…… "
1300820-125 = "不過這是個很不錯的包包呢，而且似乎遇到了一個好主人。"
1300820-126 = "是，是嗎……！？"
1300820-127 = "當然，就連我都能感受到使用者對這個包包的愛惜。#n只有深受喜愛的物品才能持續堅守自己的崗位，而這樣的東西肯定是好東西。"
1300820-128 = "是，是這樣……嗎？#n好像，讓人有點難為情呢……"
1300820-129 = "好，畢竟這也算是好事一樁，我就幫你們修補吧。"
1300820-135 = "[ns]「太好了，茜香。」"
1300820-136 = "嗯，嗯……"
1300820-137 = "不過，其實就是個運動包而已，老師跟店長會不會太誇張了……"
1300820-138 = "[s]「可是這個包包對茜香來說很重要對吧？」"
1300820-139 = "你，你在說什麼啊！那個只是……！"
1300820-143 = "只是……"
1300820-144 = "……"
1300820-145 = "[s]「那個包包有什麼回憶嗎？」"
1300820-146 = "沒有，其實也不是什麼值得被稱為回憶的事。"
1300820-147 = "不過……那個運動包是我用第一筆薪水買的。"
1300820-148 = "因為聽說它不僅能用在上學、打工、運動和戰鬥……#n而且想裝什麼都裝得下，所以才……"
1300820-149 = "[s]「看來沒有廣告不實呢。」"
1300820-150 = "老師你也這麼認為嗎？"
1300820-151 = "……嘿嘿。嗯，沒錯，我很珍惜它，一直很珍惜它。"
1300820-152 = "連我自己也覺得不可思議，但我就是對這個包包情有獨鍾，所以經常帶著它出門……"
1300820-153 = "或許是因為它既堅固又沒什麼特別的缺點吧？"
1300820-154 = "別看我這樣，其實我對自己的眼光還是有點自信的唷！"
1300820-155 = "[s]「……」"
1300820-156 = "嗯？老師，為什麼要突然沉默？"
1300820-160 = "怎，怎樣啦！？為什麼要用那種滿足的表情看我……！"
1300820-161 = "……"
1300820-162 = "我，我去洗個手！"
1300820-169 = "來，修好了，你檢查看看吧。"
1300820-170 = "咦……簡直跟新的一樣！？#n而且連揹帶也換成了更堅固的材質……"
1300820-171 = "如何，還滿意嗎？"
1300820-172 = "已經不是滿不滿意的問題了……這也太神奇了吧……？"
1300820-173 = "那真是太好了。#n哈哈，看來我還是寶刀未老嘛。"
1300820-174 = "謝，謝謝你，店長。#n那，修理費的部分……？"
1300820-175 = "修理費？這個嘛……付我基本費就行了。"
1300820-176 = "咦？真的可以嗎！？"
1300820-177 = "畢竟老師也是我的老顧客了，而且能夠見到這麼愛惜物品的主人，我也感到很高興。#n就當作是新客優惠吧。"
1300820-178 = "……"
1300820-184 = "謝謝你，店長！我之後也會好好愛惜它的！"
1300820-185 = "啊，快到打工時間了。#n不好意思，老師！我得先走一步了！"
1300820-189 = "……那麼。"
1300820-190 = "這樣就行了嗎，老師？"
1300820-191 = "[ns] 點頭"
1300820-192 = "修理費和縫補費……可不是筆小錢啊。#n雖然對我來說由誰付錢都無所謂……"
1300820-193 = "但我還是不太明白你為什麼要預先把高昂的修理費結清，老師。"
1300820-194 = "[s5]「那個運動包是茜香少數為自己買的東西。」\n[s6]「所以我希望可以盡可能替他延長包包的使用期限。」"
1300820-200 = "……這樣啊。"
1300820-201 = "放心吧，無論那孩子怎麼使用那個包包，它都能再撐個好幾年的。"
1300820-203 = "（和店長聊了跟茜香有關的話題後，回到了夏萊）"

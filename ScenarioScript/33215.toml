[translation]
33215-2 = "ETOとETOの衝突……楽園を信じる者たちと、否定する者たち……。"
33215-3 = "……そうか。"
33215-4 = "「楽園に辿り着きし者の真実を、証明することはできるのか」"
33215-5 = "「YES」か「NO」かを強いられる、この暴力的で不可能な証明要求……"
33215-6 = "しかし先生の答えは、「それに答える必要はない」……と。"
33215-7 = "強引にどちらかを取るのではなく……信じることによって、証明される楽園……。"
33215-8 = "……その発想は無かったよ。"
33215-9 = "いや。むしろ楽園というものは、そうやってずっと私たちのそばに存在していた……"
33215-10 = "そう言っていたのかもしれないね？"
33215-11 = "ひどい話だ……そのようなものは証明でも何でもない。"
33215-12 = "しかし……ああ。私の負けだ、先生。"
33215-13 = "たとえ証明などできなくても、か……ああ、私が間違っていたとも。これは、そんなお話ではなかった。"
33215-14 = "そもそも大人と勝負して勝とうだなんて、無謀な話だったかな……。"
33215-19 = "大人はいつもそうやって、思いもよらない方法で勝ってしまうのだから。"
33215-21 = "次回;楽園の名前は（３）"

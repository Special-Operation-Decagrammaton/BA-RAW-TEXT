[translation]
33215-2 = "A clash between two separate ETOs... One that has faith in paradise, and the other that denies it."
33215-3 = "How interesting."
33215-4 = "\"Can we prove that anyone has ever reached paradise?\""
33215-5 = "A paradisaical paradox, yet it demands an answer all the same."
33215-6 = "Perhaps the question isn't so flawed as many think. You've chosen to answer that there's no need for evidence."
33215-7 = "Rather, your paradise exists simply through the power of faith."
33215-8 = "That possibility never occurred to me."
33215-9 = "You could then argue that paradise has always existed—here, alongside all of us."
33215-10 = "Perhaps that is what you meant."
33215-11 = "It's so brazen that it's ridiculous. It doesn't prove anything."
33215-12 = "And yet, I'm still conceding the victory to you, Sensei."
33215-13 = "Now I understand this story. I was mistaken."
33215-14 = "In retrospect, it may have been foolish to challenge an adult in the first place."
33215-19 = "Snatching victory from the jaws of defeat is one of the things you do best after all."
33215-21 = "Next Episode;The Name of Paradise Part 3"

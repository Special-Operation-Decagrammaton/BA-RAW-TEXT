[translation]
33215-2 = "ETO和ETO的衝突……相信樂園之人，與否定樂園之人……"
33215-3 = "……是嗎。"
33215-4 = "「抵達樂園之人的真相，是否能夠證明」"
33215-5 = "被迫選擇「YES」或「NO」的，這個暴力且不可能的證明要求……"
33215-6 = "然而老師的回答是，「沒有必要回答」……"
33215-7 = "不是強硬的選擇任何一方……而是由於相信，而被證明的樂園……"
33215-8 = "……我沒這樣想過呢。"
33215-9 = "不。不如說所謂的樂園，是像那樣一直存在於我們身旁的……"
33215-10 = "或許是在這麼說呢？"
33215-11 = "真是糟糕啊……那樣的東西不是證明也不是任何東西。"
33215-12 = "然而……啊啊。是我輸了，老師。"
33215-13 = "就算無法證明，嗎……啊啊，是我搞錯了。這並不是，那樣的故事。"
33215-14 = "再說了和大人決勝負並獲勝什麼的，是個無謀的舉動嗎……"
33215-19 = "因為大人總是那樣，以讓人想不到的方法獲勝啊。"
33215-21 = "下一話;樂園之名為（３）"

[translation]
33215-2 = "การต่อสู้ระหว่าง ETO กับ ETO... การต่อสู้ระหว่างผู้ที่เชื่อในสวรรค์และผู้ที่ปฏิเสธสวรรค์..."
33215-3 = "งั้นเหรอคะ..."
33215-4 = "\"เราจะพิสูจน์ความจริงของคนที่มาถึงสวรรค์ได้หรือไม่?\""
33215-5 = "ความต้องการที่จะพิสูจน์คำตอบว่า \"ได้\" หรือ \"ไม่ได้\" แต่ว่าคุณครู..."
33215-6 = "ไม่ใช่ว่าคำถามที่ถูกตั้งขึ้นนั้นผิด แต่ว่าสิ่งที่ไม่จำเป็น... คือการหาคำตอบในเรื่องนั้นสินะคะ"
33215-7 = "สวรรค์ที่พิสูจน์ได้ด้วยความเชื่อ"
33215-8 = "ฉันไม่เคยคิดมาก่อนเลยค่ะ"
33215-9 = "ไม่สิ... สำหรับพวกเรา สวรรค์ก็เป็นเช่นนั้นมาตลอด"
33215-10 = "นั่นคือสิ่งที่ต้องการประกาศสินะคะ"
33215-11 = "ถ้าเช่นนั้นความดันทุรังที่ไร้ประโยชน์... มันก็ไม่ใช่ข้อพิสูจน์อะไรทั้งสิ้น"
33215-12 = "ค่ะ ฉันแพ้แล้วละค่ะ... คุณครู"
33215-13 = "เรื่องราวเป็นแบบนี้สินะคะ ฉันเองที่เป็นฝ่ายผิดค่ะ"
33215-14 = "การเดิมพันกับผู้ใหญ่ อาจเป็นการเดิมพันที่ไม่มีโอกาสชนะมาตั้งแต่แรกแล้วก็ได้ค่ะ"
33215-19 = "ไม่ว่าเมื่อไร ผู้ใหญ่ก็มักใช้วิธีที่เด็กคาดไม่ถึง แล้วเอาชนะได้เสมอนี่นา"
33215-21 = "ตอนต่อไป;นามแห่งสวรรค์ (3)"

[translation]
1003402-1 = "ได้เวลาตื่นแล้วนะคะ"
1003402-2 = "(คุณครูรู้สึกลืมตาแทบไม่ขึ้น เพราะความเหน็ดเหนื่อยสะสมจากการทำงานโต้รุ่ง)"
1003402-3 = "(ได้ยินเสียงใครบางคนเรียก)"
1003402-4 = "อรุณสวัสดิ์ค่ะ คุณครู ได้เวลาลุกแล้วนะคะ"
1003402-5 = "[s] \"อืม ขออีกห้านาทีนะ...\""
1003402-6 = "จะขอต่อเวลาเป็นเด็กแบบนี้ไม่ได้นะคะ"
1003402-7 = "ฉันมาปลุกคุณครูเองเลยนะคะ"
1003402-12 = "[ns] \"หืม... ที่นี่ที่ไหน...?\""
1003402-13 = "อรุณสวัสดิ์ค่ะ คุณครูขี้เซา!"
1003402-14 = "[s] \"อะ...อรุณสวัสดิ์ มิโมริ\""
1003402-15 = "เผลอหลับไปอีกแล้วเหรอคะ?"
1003402-16 = "[s1] \"ครูทำงานเหนื่อยจนเผลอหลับต่างหาก\"\n[s2] \"ว่าแต่มิโมริมาทำอะไรที่นี่เหรอ...?\""
1003402-17 = "คุณครูทำงานดึกจนเผลอหลับไปอีกแล้วเหรอคะ..."
1003402-18 = "คุณครูทำงานดึกจนเผลอหลับไปอีกแล้วเหรอคะ..."
1003402-19 = "แถมยังนั่งฟุบหลับไปกับโต๊ะ แทนที่จะได้นอนบนเตียงดีๆ อีก..."
1003402-20 = "แบบนี้ไม่ดีกับหลังนะคะ แล้วก็ไม่น่าจะหลับได้สบายด้วย"
1003402-21 = "ขืนทำแบบนี้ต่อไป สุขภาพของคุณครูอาจจะแย่ลงได้นะคะ..."
1003402-23 = "ฉันเข้าใจแล้วค่ะ โชคดีจริงๆ"
1003402-24 = "ฉันทำถูกแล้วที่มาหาคุณครูค่ะ"
1003402-25 = "[s] \"หืม?\""
1003402-26 = "ตอนนี้จะมัวช้าไม่ได้แล้วค่ะ คุณครู"
1003402-27 = "คุณครูต้องไปเข้างานในอีก 30 นาทีนะคะ"
1003402-28 = "เพราะงั้นไปล้างหน้าล้างตาก่อนดีไหมคะ คุณครู?"
1003402-29 = "[s] \"หืม...?\""
1003402-32 = "[ns3] \"ครูไปอาบน้ำมาแล้ว...\"\n[ns4] \"ว่าแต่มิโมริมาทำอะไรที่นี่เหรอ...?\""
1003402-33 = "เอาละ ถ้าอาบน้ำแล้วก็อย่ามัวแต่ยืนเฉยอยู่ มานั่งตรงนี้ก่อนสิคะ"
1003402-34 = "ถ้าอาบน้ำแล้วก็อย่ามัวแต่ยืนเฉยอยู่ มานั่งตรงนี้ก่อนสิคะ"
1003402-35 = "[s] \"กะ...ก็ได้\""
1003402-41 = "ก่อนไปทำงานก็ต้องทานอะไรรองท้องหน่อยนะคะ"
1003402-42 = "ฉันเตรียมอาหารเช้าไว้ให้คุณครูแล้วค่ะ♪"
1003402-44 = "[s] \"แซนด์วิชเหรอ?\""
1003402-45 = "ใช่ค่ะ แซนด์วิชโฮมเมดของฉันที่ทำเองมาเพื่อคุณครูค่ะ"
1003402-46 = "[s] \"มิโมริทำเองเลยเหรอ...!\""
1003402-47 = "ฉันใส่ใจเลือกวัตถุดิบมาเป็นพิเศษ จะได้ไม่หนักเกินสำหรับมื้อเช้าค่ะ"
1003402-48 = "ฉันเลือกใช้ไข่ ผักกาดหอม แล้วก็แฮมแทนเบคอนที่มีมันเยอะ แล้วก็ใช้ซีอิ๊วทาบนขนมปังแทนซอสรสจัด"
1003402-49 = "อันที่จริงฉันก็อยากทำอาหารเช้าแบบดั้งเดิม อย่างซุปมิโสะและปลาย่างมาให้คุณครูทานเป็นมื้อเช้าค่ะ..."
1003402-50 = "[s] \"ไม่หรอก แค่นี้ครูก็ดีใจมากแล้ว\""
1003402-51 = "ฮุฮุ จริงเหรอคะ? โล่งอกไปทีค่ะ"
1003402-52 = "จริงด้วย ฉันเตรียมชาร้อนใส่กระบอกเก็บความร้อนมาด้วยค่ะ"
1003402-53 = "[s] \"จะทานให้อร่อยเลย!\""
1003402-56 = "ทานให้อร่อยนะคะ ฉันเตรียมมาเยอะเลย ค่อยๆ ทานได้ตามสบายเลยค่ะ"
1003402-59 = "อุ๊ย แหมๆ ทำไมทานให้เลอะแก้มแบบนี้ล่ะคะ?"
1003402-60 = "เดี๋ยวฉันเช็ดให้นะคะ"
1003402-67 = "ฮิฮิ"
1003402-70 = "[ns] \"อร่อยจังเลย\""
1003402-71 = "ฉันดีใจที่คุณครูชอบนะคะ"
1003402-72 = "ถ้างั้นต่อไป รบกวนเอนหลังมาหน่อยค่ะ ฉันจะนวดไหล่ให้ค่ะ"
1003402-73 = "[s] \"หืม?\""
1003402-74 = "เมื่อคืนคุณครูนอนที่นี่ คงจะเมื่อยเนื้อเมื่อยตัวใช่ไหมคะ"
1003402-79 = "เอาละ เป็นยังไงบ้างคะ? สบายตัวขึ้นบ้างไหมคะ? ช่วงหลังคอตึงมากๆ เหมือนที่คิดไว้เลยค่ะ"
1003402-80 = "ฉันเคยบอกแล้วนี่คะว่าถ้าไม่นอนให้ถูกสุขลักษณะ จะทำให้ร่างกายแย่ลง"
1003402-81 = "[s5] \"สบายจังเลย...\"\n[s6] \"มิโมรินวดเก่งจัง\""
1003402-82 = "ฉันดีใจที่คุณครูชอบค่ะ"
1003402-83 = "ฉันดีใจที่คุณครูชมนะคะ"
1003402-86 = "เอาล่ะ ผ่อนคลายกล้ามเนื้อเสร็จแล้ว ตอนนี้ก็รีบไปทำงานเถอะค่ะ"
1003402-87 = "อีกสิบนาทีก็จะถึงเวลาเข้างานแล้วนะคะ"
1003402-88 = "[s] \"หะ... หา?\""
1003402-90 = "ไม่ต้องห่วงค่ะ ฉันเตรียมของให้คุณครู และเก็บกวาดทุกอย่างเรียบร้อยแล้วค่ะ"
1003402-91 = "คุณครูไม่ได้ลืมอะไรใช่ไหมคะ?"
1003402-92 = "[s] \"อื้ม\""
1003402-93 = "ฮิฮิ เตรียมตัวไปทำงานพร้อมแล้วสินะคะ"
1003402-94 = "ถ้างั้น..."
1003402-95 = "(อ้าแขนกว้างๆ)"
1003402-96 = "[s] \"หืม? อ้าแขนทำไมน่ะ มิโมริ...?\""
1003402-97 = "กอดส่งคุณครูไปทำงานไงล่ะคะ"
1003402-98 = "[s] \"กะ... กอดเหรอ?!\""
1003402-99 = "ใช่ค่ะ การกอดจะทำให้สารอ็อกซิโทซินหลั่งได้ดีและช่วยเติมพลังในการทำงานด้วยค่ะ"
1003402-100 = "ฮุฮุ ฉันอ่านเจอมาจากอินเทอร์เน็ตค่ะ เป็นสิ่งที่กุลสตรีที่เพียบพร้อมควรทำค่ะ..."
1003402-101 = "..."
1003402-102 = "ระ...หรือว่า...?"
1003402-103 = "หรือว่าฉันเข้าใจผิดคะ?"
1003402-104 = "[s7] \"ไม่หรอก ถูกแล้ว กอดช่วยเพิ่มอ็อกซิโทซิน!\"\n[s8] \"ใช่แล้ว ต้องเติมพลังก่อนไปทำงาน!\""
1003402-114 = "ฮุฮุ ตั้งใจทำงานนะคะคุณครู สู้ๆ ค่ะ"
1003402-115 = "[s] \"นะ... แน่นอน!\""
1003402-117 = "(หลังจากได้รับอ้อมกอดเติมพลังก่อนไปทำงานจากมิโมริ คุณครูก็รีบมาเข้างานที่ชาเล่ต์ได้อย่าง#nทันเวลา)"
1003402-118 = "(แต่สุดท้ายคุณครูก็ไม่ได้รู้เหตุผลว่าทำไมมิโมริถึงมาหาที่ห้องเรียนได้...)"

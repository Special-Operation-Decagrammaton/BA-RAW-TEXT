[translation]
1003402-1 = "早上了唷，請起床？"
1003402-2 = "（眼皮好重。因為連日熬夜的疲勞，感覺起不了身……）"
1003402-3 = "（就在這時，聽到了某人的聲音）"
1003402-4 = "早上了唷，老師。請起床？"
1003402-5 = "[s]「嗯……再5分鐘……」"
1003402-6 = "不行唷。"
1003402-7 = "這樣下去的話會遲到的，不起床不行。"
1003402-12 = "[ns]「嗯……咦，這裡是……？」"
1003402-13 = "您醒了嗎，老師？早安。"
1003402-14 = "[s] 「啊……早安，三森。」"
1003402-15 = "居然睡在這種地方……"
1003402-16 = "[s1]「工作上有不得不找的資料……」\n[s2]「話說回來，為什麼三森在這裡……？」"
1003402-17 = "看來您在這間教室工作到深夜了呢……"
1003402-18 = "看來您在這間教室工作到深夜了呢……"
1003402-19 = "沒有在床上好好休息，而是像這樣趴在桌子上睡覺……"
1003402-20 = "不只對腰不好，想必也沒辦法熟睡吧。"
1003402-21 = "這種生活再持續下去的話，遲早會對老師的健康造成負面影響的唷……？"
1003402-23 = "既然如此……我明白了。"
1003402-24 = "果然實際來看看是正確的呢。"
1003402-25 = "[s]「咦，什麼意思？」"
1003402-26 = "現在不是做這種事的時候。"
1003402-27 = "距離上班時間也不到30分鐘了……"
1003402-28 = "首先去洗臉如何呢，老師？"
1003402-29 = "[s]「唔，嗯……？」"
1003402-32 = "[ns3] 「我洗好了……」\n[ns4] 「話說三森怎麼會在這裡……」"
1003402-33 = "好的，洗完臉的話接下來……請坐在這裡。"
1003402-34 = "好的，洗完臉的話接下來……請坐在這裡。"
1003402-35 = "[s]「是……」"
1003402-41 = "在上班之前，得要好好吃早餐才行哦？"
1003402-42 = "我這裡正好有來這裡之前做好的東西♪"
1003402-44 = "[s]「這是……三明治？」"
1003402-45 = "是的，是我親手做的三明治。"
1003402-46 = "[s]「三森親手做的……！」"
1003402-47 = "為了不在早上造成腸胃的負擔，在材料方面我也特別用心挑選過。"
1003402-48 = "以萵苣和火腿代替油膩的培根，#n並且以雞蛋為底，用醬油代替味道濃厚的醬汁塗上後再烤過。"
1003402-49 = "雖然原本想準備味噌湯和烤魚的傳統早餐……"
1003402-50 = "[s]「沒關係，這樣我就已經很開心了。」"
1003402-51 = "呵呵，那真是太好了。"
1003402-52 = "來，水壺裡有溫暖的熱茶唷。"
1003402-53 = "[s]「我要開動了！」"
1003402-56 = "請慢慢享用。不夠的話還有很多唷。"
1003402-59 = "老師真是的。吃得太著急了，麵包屑都沾到臉上了唷……？"
1003402-60 = "來，請不要動哦？"
1003402-67 = "呵呵。"
1003402-70 = "[ns]「呼，真好吃。」"
1003402-71 = "味道還合您的胃口嗎？"
1003402-72 = "那麼接下來，由我來為您按摩肩膀。"
1003402-73 = "[s]「咦……？」"
1003402-74 = "您趴在桌上以奇怪的姿勢睡了一整晚，肌肉想必很僵硬吧。"
1003402-79 = "感覺如何呢？肩膀有舒服一點嗎？#n果然和預期中的一樣，脖子後面的部分很僵硬呢……"
1003402-80 = "平時不用正確的姿勢睡覺的話，就會變成這樣的唷？"
1003402-81 = "[s5]「嗯……好舒服……」\n[s6]「三森的按摩，真棒……」"
1003402-82 = "呵呵，很高興您能那麼說。"
1003402-83 = "呵呵，很高興您能那麼說。"
1003402-86 = "好，那麼肩膀也舒服一點了，差不多該去上班了呢？"
1003402-87 = "距離夏萊的上班時間只剩10分鐘左右了唷。"
1003402-88 = "[s]「啊，已經那麼晚了？」"
1003402-90 = "已經做好準備，垃圾的收拾也結束了。"
1003402-91 = "老師沒有忘記帶什麼吧？"
1003402-92 = "[s]「嗯，沒問題。」"
1003402-93 = "呵呵，那麼大致上準備完成了呢。"
1003402-94 = "只剩下……"
1003402-95 = "（伸）"
1003402-96 = "[s]「嗯？三森，為什麼張開雙手……」"
1003402-97 = "工作前的擁抱。"
1003402-98 = "[s]「工作前的擁抱！？」"
1003402-99 = "是的，為了在工作前補充能量的催產素擁抱。"
1003402-100 = "呵呵，是我前幾天在網路上看到的。#n聽說大和撫子平常都會這麼做。"
1003402-101 = "……"
1003402-102 = "咦……？莫非……"
1003402-103 = "是我誤會了什麼嗎……？"
1003402-104 = "[s7]「沒有，沒有誤會唷。來吧，催產素擁抱！」\n[s8]「工作前的能量補充很重要呢，嗯！」"
1003402-114 = "呵呵呵，那麼祝您一路順風，老師。#n今天也要加油哦！"
1003402-115 = "[s]「嗯！！！」"
1003402-117 = "（在三森的目送下離開，準時抵達了夏萊）"
1003402-118 = "（不過最終還是沒能問出三森過來的原因）"

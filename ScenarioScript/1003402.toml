[translation]
1003402-1 = "Time to Rise and Shine"
1003402-2 = "I could hardly open my eyes. My body felt so heavy because of the fatigue from working all night."
1003402-3 = "Then I heard someone calling me."
1003402-4 = "Good morning, Sensei. Rise and shine."
1003402-5 = "[s] \"Ugh. Five more minutes...\""
1003402-6 = "Sensei, you're being a child!"
1003402-7 = "It's time to wake up."
1003402-12 = "[ns] \"Hmm. Where...am I?\""
1003402-13 = "Good morning, sleepyhead!"
1003402-14 = "[s] \"G-Good morning, Mimori.\""
1003402-15 = "Did you fall asleep here?"
1003402-16 = "[s1] \"I guess I've been a little tired from work.\"\n[s2] \"I had to find some documents for work, and then...\""
1003402-17 = "So you worked all night and passed out..."
1003402-18 = "So you worked all night and passed out..."
1003402-19 = "And you slept hunched over at the desk."
1003402-20 = "It's bad for your back and not conducive to good health."
1003402-21 = "If you continue on like this, your health will begin to decline."
1003402-23 = "I understand now. Excellent."
1003402-24 = "It is very fortunate I came to see you."
1003402-25 = "[s] \"Wh-What do you mean?\""
1003402-26 = "Please, Sensei. There's no time."
1003402-27 = "You need to be at work in 30 minutes."
1003402-28 = "Why don't we start with brushing your teeth?"
1003402-29 = "[s] \"Huh?!\""
1003402-32 = "[ns3] \"Okay, I brushed my teeth...\"\n[ns4] \"D-Did my breath smell?\""
1003402-33 = "Now your breath is minty fresh! Okay, please sit."
1003402-34 = "Now your breath is minty fresh! Okay, please sit."
1003402-35 = "[s] \"O-Okay.\""
1003402-41 = "Breakfast is the most important meal of the day."
1003402-42 = "I've brought this from home. Please eat."
1003402-44 = "[s] \"Is this...a sandwich?\""
1003402-45 = "Yes, made especially for you, Sensei!"
1003402-46 = "[s] \"Y-You made it?!\""
1003402-47 = "Indeed! I tried to make something light, since it's for breakfast."
1003402-48 = "I avoided oily or strong tastes like bacon or eggs. Instead, it's made of lettuce and ham, and then bread with soy sauce spread on it!"
1003402-49 = "Or would you have preferred a more traditional soup and grilled fish breakfast...?"
1003402-50 = "[s] \"No, this is perfect.\""
1003402-51 = "Really? That's wonderful!"
1003402-52 = "And some tea as well! It should be nice and warm."
1003402-53 = "[s] \"Don't mind if I do.\""
1003402-56 = "Please enjoy to your heart's content."
1003402-59 = "Aw, Sensei. There's sauce on your cheek..."
1003402-60 = "Allow me."
1003402-67 = "Heehee."
1003402-70 = "[ns] \"Whew! That was delicious.\""
1003402-71 = "I'm happy to hear it."
1003402-72 = "And next, please lie down for your massage."
1003402-73 = "[s] \"My what?\""
1003402-74 = "Your muscles must be sore from sleeping at a desk."
1003402-79 = "How is that? Ah! The back of your neck is so stiff."
1003402-80 = "This tends to happen when you sleep incorrectly."
1003402-81 = "[s5] \"You're really good at this, Mimori!\"\n[s6] \"I feel my muscles relaxing.\""
1003402-82 = "That's wonderful to hear."
1003402-83 = "That's wonderful to hear."
1003402-86 = "Your therapy is complete! Now, it's time to go."
1003402-87 = "Your work at Schale begins in ten minutes."
1003402-88 = "[s] \"T-Ten minutes?\""
1003402-90 = "Don't worry, I've cleaned up everything."
1003402-91 = "You just have to worry about making sure you have everything."
1003402-92 = "[s] \"Looks good.\""
1003402-93 = "Heehee. Then preparations are complete."
1003402-94 = "And, finally."
1003402-95 = "*opens arms*"
1003402-96 = "[s] \"Mimori? Wh-Why are you spreading your arms?\""
1003402-97 = "Please, give me a hug."
1003402-98 = "[s] \"A h-hug?!\""
1003402-99 = "Hugs help release oxytocin and re-energize you for your day."
1003402-100 = "I saw it online. Proper ladies see their job through till the end."
1003402-101 = "..."
1003402-102 = "Hmm? W-Was I..."
1003402-103 = "...out of line?"
1003402-104 = "[s7] \"No, of course not. An oxytocin hug it is!\"\n[s8] \"A proper lady like you could never.\""
1003402-114 = "Heehee. Off you go, Sensei. Have a good day!"
1003402-115 = "[s] \"R-Right!\""
1003402-117 = "I made it to work in time thanks to Mimori..."
1003402-118 = "...though I never did learn why she was there in the first place."

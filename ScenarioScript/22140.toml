[translation]
22140-1 = "Episode 14; The Fortress City of Eridu"
22140-2 = "You responded to the commotion even quicker than we thought."
22140-3 = "Did she already know we'd come here?"
22140-5 = "Yes, Rio knows everything."
22140-6 = "From C&C's movements and decisions... "
22140-7 = "...As well as what and where Sensei is aiming for."
22140-8 = "I will tell you this once. Any more resistance will be meaningless. Please surrender quietly."
22140-9 = "Hmm... I see."
22140-10 = "Heehee. I don't think so!"
22140-20 = "...?!"
22140-21 = "Wow! That even scared me!"
22140-22 = "My, my. You avoided that rather easily."
22140-23 = "A-Akane...?"
22140-24 = "...Murokasa Akane."
22140-25 = "According to the data...she's C&C's key member who prioritizes wide-area suppression..."
22140-26 = "And prefers explosives in battles."
22140-27 = "Heehee. It's kind of embarrassing to hear that an underclassman I've never met before knows so much about me."
22140-28 = "The pleasure is all mine, truly."
22140-29 = "..."
22140-30 = "Nice to meet you, my underclassman. Was your name...Toki?"
22140-31 = "I heard our president owes you a debt from last time."
22140-32 = "And now... You have the audacity to request our surrender."
22140-33 = "Heehee. I know you're President Rio's bodyguard...but still..."
22140-35 = "...I do believe you're underestimating C&C."
22140-36 = "...!"
22140-40 = "You see, we always pay back our debts. Always."
22140-45 = "So perhaps, you should be the one who surrenders quietly."
22140-47 = "I will not."
22140-48 = "I received an order from Rio."
22140-49 = "To suppress C&C members that violate orders and act arbitrarily."
22140-50 = "I will fight and fulfill my orders."
22140-52 = "What a loyal little dog! Arf, arf!"
22140-53 = "Well, that response was more or less what was expected."
22140-54 = "C&C is known as a secret agent organization..."
22140-55 = "I thought you would follow your usual M.O., and attempt to infiltrate."
22140-56 = "I admit, I did not expect you to be brash enough to challenge us head-on."
22140-57 = "...You got me. You must have predicted my response."
22140-59 = "...Do you think so?"
22140-60 = "Hahaha. I don't know what you're talking about."
22140-62 = "Oh, dear. How clever. We should've thought to simply infiltrate..."
22140-63 = "You can pretend all you want."
22140-64 = "But due to your actions, I have a grasp of the situation now."
22140-65 = "While the three of you keep me here, Neru and Sensei will work on retrieving the target."
22140-66 = "Is that not your plan?"
22140-67 = "And while avoiding head-to-head confrontation with me, the one with Rio's weapon..."
22140-68 = "Neru, who could be said to be the strongest force in Millennium, will take action while I'm incapacitated..."
22140-69 = "You must have thought you had a chance of winning this way."
22140-70 = "Wrong!"
22140-78 = "Hahaha! You're late, President!"
22140-79 = "Neru... Why are you here?"
22140-80 = "What do you mean?"
22140-81 = "I'm here for a revenge match, of course."
22140-82 = "Revenge...?"
22140-83 = "If I'd have gone where you expected me, you'd have abandoned the situation here and come to stop me."
22140-84 = "Why bother doing things the hard way?"
22140-85 = "I can just go save the kid..."
22140-86 = "...after I beat you up."
22140-87 = "Hey, underclassman. You did a number on my arm last time."
22140-88 = "Now, I think it's my turn."
22140-95 = "...!"
22140-96 = "I accept your challenge."
22140-102 = "Ha! All right. Let's do this!"
22140-106 = "With this...!"
22140-107 = "We've defeated all the drones that were blocking the passage!"
22140-108 = "[ns] \"Now, everyone! Be prepared! We're going above ground!\""
22140-114 = "We did it! We're outside!"
22140-115 = "Now where are we going?!"
22140-117 = "I think Aris must be in the central area of Eridu..."
22140-118 = "It's the central tower."
22140-119 = "Judging from your current location, you can get there by going north via the road on the left!"
22140-120 = "[ns] \"Okay! Thanks for the support! Then...\""
22140-131 = "Get out of my way!"
22140-139 = "I'll guide you all through the city."
22140-140 = "Now, everyone! Go save Aris!"
22140-142 = "Next Episode; A Trap"

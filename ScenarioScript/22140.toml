[translation]
22140-1 = "ตอนที่ 14;เมืองแห่งปราการเอริดู"
22140-2 = "ปรากฏตัวเร็วกว่าที่คิดไว้เสียอีกนะคะเนี่ย"
22140-3 = "หรือว่ารู้ตั้งแต่แรกแล้วว่าเราจะมาที่นี่?"
22140-5 = "ใช่ค่ะ ท่านริโอะรู้ทุกอย่างอยู่แล้วค่ะ"
22140-6 = "ทั้งการเคลื่อนไหว และการตัดสินใจของ C&C "
22140-7 = "รวมถึงสิ่งที่คุณครูต้องการด้วย"
22140-8 = "ดังนั้นฉันจะบอกให้นะคะ ว่าถึงจะต่อต้านไปก็ไร้ความหมายค่ะ ยอมจำนนแต่โดยดีเถอะนะคะ"
22140-9 = "โห... อย่างนั้นเหรอ"
22140-10 = "อื้ม~ ยอมจำนนงั้นเหรอ~ ไม่ได้อยู่ในแผนของเราด้วยนี่สิ~"
22140-20 = "......?!"
22140-21 = "ว้าว ตกใจหมดเลย"
22140-22 = "โอ๊ะ หลบได้สบายๆ เลยนะคะเนี่ย?"
22140-23 = "อะ... อาคาเนะ?"
22140-24 = "รุ่นพี่มุโรคาสะ อาคาเนะ..."
22140-25 = "จากข้อมูลแล้ว รุ่นพี่คือสมาชิกตัวตึงของ C&C ที่เมื่อเข้าสู่สนามรบแล้วก็จะควบคุมพื้นที่ในวงกว้าง..."
22140-26 = "ด้วยระเบิด..."
22140-27 = "ฮุฮุ พอได้ฟังคำชมจากรุ่นน้องที่เพิ่งเจอกันครั้งแรก แบบนี้มันก็เขินอยู่หน่อยๆ นะคะ"
22140-28 = "แต่ก็ได้ยินมาจนเบื่อแล้วละค่ะ"
22140-29 = "......"
22140-30 = "ยินดีที่ได้รู้จักนะคะรุ่นน้อง เมื่อกี้บอกว่าชื่อ... โทคิ... สินะคะ?"
22140-31 = "ได้ยินว่าคราวก่อนเอ็นดูหัวหน้าของเราอย่างดีเลยสินะคะ"
22140-32 = "เพราะงั้นตอนนี้... ก็เลยกล้าที่จะมาบอกให้พวกเรายอมแพ้กันแบบนี้"
22140-33 = "ฮุฮุ... ฉันรู้ดีค่ะว่าคุณเป็นบอดี้การ์ดของประธานริโอะ... แต่ว่าแบบนี้มัน..."
22140-35 = "...คุณคิดว่า C&C เป็นอะไรงั้นเหรอคะ?"
22140-36 = "......!"
22140-40 = "ถ้าได้รับอะไรมาเท่าไหร่ เราก็จะสนองคืนให้อย่างเท่าเทียม เพราะงั้นพวกเราถึงมาที่นี่กันค่ะ"
22140-45 = "...แต่ถ้ายอมจำนนอย่างว่าง่ายละก็ เราก็อาจจะยอมมองข้ามไปก็ได้นะคะ"
22140-47 = "ทำแบบนั้นให้ไม่ได้หรอกค่ะ..."
22140-48 = "ฉันได้รับคำสั่งมาจากท่านริโอะค่ะ"
22140-49 = "คำสั่งให้ <กำราบ C&C ที่ละเมิดคำสั่งและเคลื่อนไหวตามใจตัวเอง>..."
22140-50 = "เพราะแบบนั้นฉันเลยหลีกทางให้ไม่ได้ค่ะ"
22140-52 = "ฮื้ม~ ซื่อสัตย์ซะเหลือเกินนะ~ โทคิจัง"
22140-53 = "เป็นไปตามที่คาดไว้เลย"
22140-54 = "C&C คือองค์กรที่ได้ชื่อว่าเป็นเจ้าหน้าที่ลับ..."
22140-55 = "ต้องยอมรับว่าตอนแรกฉันเตรียมใจไว้ว่า C&C อาจจะลักลอบเข้ามาเพื่อสร้างสถานการณ์ปั่นป่วนขึ้นที่นี่"
22140-56 = "แต่ไม่คิดเลยว่าจะเข้ามาซึ่งๆ หน้าแบบนี้"
22140-57 = "...แบบไม่ทันตั้งตัวเลยค่ะ คงจะคาดการณ์การรับมือของทางนี้แล้วคิดแผนการขึ้นมาสินะคะ"
22140-59 = "ใช่ไหมนะ...?"
22140-60 = "อ่ะฮ่ะฮ่า~ ไม่น่าใช่น้า เอ๊ะหรือจะใช่~"
22140-62 = "โอ๊ะโอ นั่นสินะคะ คิดไม่ถึงเลยค่ะ"
22140-63 = "ถึงจะพูดกำกวมแบบนั้นไปก็ไม่มีประโยชน์หรอกค่ะ"
22140-64 = "ตรงกันข้าม เพราะยิ่งทำตัวกันแบบนี้ ฉันยิ่งเห็นเจตจำนงของพวกรุ่นพี่อย่างทะลุปรุโปร่งเลยละค่ะ"
22140-65 = "ในระหว่างที่รุ่นพี่ทั้งสามคนมาถ่วงเวลาฉันไว้อยู่ตรงนี้ ฝั่งรุ่นพี่เนรุกับคุณครูก็คงจะไปหาเป้าหมายแล้ว"
22140-66 = "คงเป็นแผนการประมาณนี้สินะคะ?"
22140-67 = "คงคิดว่าถ้ารุ่นพี่เนรุผู้ได้ชื่อว่าแข็งแกร่งที่สุดในมิลเลเนียมหลีกเลี่ยงการต่อสู้กับฉันที่มี <อาวุธ> ของท่านริโอะ"
22140-68 = "และเลือกที่จะเคลื่อนไหวในตอนที่ฉันถูกรั้งตัวอยู่ละก็"
22140-69 = "ก็จะมีความเป็นไปได้สูงที่จะชนะ... งั้นสินะคะ"
22140-70 = "ใครว่าล่ะ?"
22140-78 = "อ่ะฮะฮะ! มาช้านะเนี่ย~! หัวหน้า!"
22140-79 = "รุ่นพี่เนรุ... ทำไมถึง... มาอยู่ตรงนี้...?"
22140-80 = "ทำไมงั้นเรอะ ยัยเด็กนี่"
22140-81 = "ก็แหงอยู่แล้ว... มาเอาคืนยังไงล่ะ!"
22140-82 = "เอาคืน...?"
22140-83 = "ก็ถ้าฉันมุ่งหน้าไปทางนั้น เธอก็คงไม่สนใจทางนี้ แล้วไปขวางฉันแทนไม่ใช่เรอะ?"
22140-84 = "เบื่อชะมัด อะไรที่น่ารำคาญเนี่ย"
22140-85 = "จะบอกอะไรให้นะ เรื่องไปช่วยเด็กน้อยนั่นน่ะ..."
22140-86 = "ไว้ค่อยไป 'หลังจาก' ที่ฉันจัดการเธอไปแล้วก็ยังได้"
22140-87 = "นี่รุ่นน้อง คราวก่อนบิดแขนฉันซะเจ็บสุดๆ ไปเลยนะ..."
22140-88 = "รุ่นพี่คนนี้จะทำให้ดูเองว่าถ้าโกรธขึ้นมาแล้วจะเป็นยังไง"
22140-95 = "......!!"
22140-96 = "งั้นฉันก็จะเริ่มโต้กลับค่ะ"
22140-102 = "เฮอะ! เอาสิ! มีอะไรก็ใส่มาให้หมดเลย!"
22140-106 = "และด้วยสิ่งนี้...!"
22140-107 = "โดรนทั้งหมดที่มีอยู่เต็มทางเดินก็เลยโดนสอยหมดแล้ว...!"
22140-108 = "[ns] \"เอาละทุกคน! เตรียมตัวให้ดี! เราจะออกไปกันแล้ว!\""
22140-114 = "ว้าวววว! ออกมาข้างนอกแล้วละ!"
22140-115 = "จากนี้เราต้องไปทางไหนเหรอ?!"
22140-117 = "ฉันคิดว่าสถานที่ที่อาริสึอยู่ตอนนี้ก็คือ... พื้นที่ส่วนกลางของเอริดู"
22140-118 = "ที่นั่นไง หอคอยที่อยู่ตรงกลางนั่น"
22140-119 = "ถ้าดูจากตำแหน่งปัจจุบันแล้ว เราน่าจะต้องไปทางทิศเหนือผ่านถนนที่ทอดยาวไปทางซ้ายค่ะ!"
22140-120 = "[ns] \"อื้ม โอเค! ขอบใจที่ช่วยซัพพอร์ตให้นะ! งั้นก็ลุย...!\""
22140-131 = "หลบไป! หลบๆ! หลบไปให้หมด!!"
22140-139 = "เดี๋ยวทางนี้จะนำทางให้เอง"
22140-140 = "เอาละ! ทุกคน! เดินหน้าเต็มกำลัง!"
22140-142 = "ตอนต่อไป;กับดัก"

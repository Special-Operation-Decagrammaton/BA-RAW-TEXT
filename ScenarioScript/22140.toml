[translation]
22140-1 = "第14話;要塞都市埃里都"
22140-2 = "比想像中還早出現呢。"
22140-3 = "一開始就預料到我們會來這裡了啊。"
22140-5 = "是的。莉央大人已經掌握了一切。"
22140-6 = "C&C的判斷、行動──"
22140-7 = "以及──包含老師目的在內的，一切。"
22140-8 = "所以，恕我冒昧。#n──繼續抵抗是沒有意義的。希望各位老實地投降。"
22140-9 = "哦……這樣啊。"
22140-10 = "唔嗯，這倒是有點困難呢？"
22140-20 = "……！？"
22140-21 = "哇，嚇我一跳！"
22140-22 = "哎呀，這種程度還不足以對付妳啊？"
22140-23 = "朱，朱音……？"
22140-24 = "……室笠朱音前輩。"
22140-25 = "……戰鬥時擅長利用爆裂物進行大範圍壓制──"
22140-26 = "──C&C需要注意的人物。"
22140-27 = "呵呵，被初次見面的後輩這麼說讓人有點害羞呢。"
22140-28 = "不過剛才的，只不過是想打個招呼而已……"
22140-29 = "……"
22140-30 = "很高興認識妳，學妹。名字叫……季對吧？"
22140-31 = "聽說之前部長受妳照顧了。"
22140-32 = "而且……還這麼有禮貌地勸我們投降……"
22140-33 = "呵呵，雖然聽說妳是莉央會長的保鏢……#n真是的。"
22140-35 = "……小看C&C的話，我會很困擾的。"
22140-36 = "……！"
22140-40 = "以牙還牙，以眼還眼。我們今天就是為此而來的。"
22140-45 = "……當然，如果妳願意乖乖投降的話，之前的事也可以當作沒發生過唷？"
22140-47 = "……辦不到。"
22140-48 = "我收到了莉央會長的命令。"
22140-49 = "「壓制違反命令行動的C&C」……"
22140-50 = "所以，無法從這裡撤退。"
22140-52 = "哼～是個認真的孩子呢，季醬♪"
22140-53 = "意料之內的反應。"
22140-54 = "C&C是祕密特務組織……"
22140-55 = "起初以為會透過潛入進行干擾，所以做好準備……"
22140-56 = "沒想到會從正面進攻……"
22140-57 = "……確實是意料之外。#n我會出現在這裡也在妳們的作戰之內吧？"
22140-59 = "……是嗎？"
22140-60 = "啊哈哈♪是那樣嗎～？"
22140-62 = "哎呀，是呢……我們也沒有意料到唷。"
22140-63 = "──想誤導我也是沒用的。"
22140-64 = "我已經看穿前輩們的想法了。"
22140-65 = "寧瑠前輩和老師不在這裡呢。"
22140-66 = "也就是說，是這樣的作戰吧？#n前輩們負責阻止我。"
22140-67 = "那在某種意義上是正確的。避免與擁有莉央大人「武裝」的我正面對決。"
22140-68 = "趁機讓千年最強戰力的寧瑠前輩自由行動──"
22140-69 = "這樣一來，沒錯……確實會有勝算吧。"
22140-70 = "妳說誰有勝算啊？"
22140-78 = "啊哈哈！來的太慢了啦部長！"
22140-79 = "寧瑠……前輩為何……會在這裡……？"
22140-80 = "啊？那還用問嗎。"
22140-81 = "當然是來打復仇戰囉。"
22140-82 = "復仇……？"
22140-83 = "我要是個別行動的話，妳這傢伙肯定會來阻止我的對吧？"
22140-84 = "那種麻煩的事我可受不了。"
22140-85 = "既然如此，去救小不點的事──"
22140-86 = "等打倒妳「之後」再做也不遲啊。"
22140-87 = "喂，學妹。之前虧妳敢那麼做呢。"
22140-88 = "頂撞前輩會有什麼下場，我會慢～慢告訴妳的。"
22140-95 = "……！！"
22140-96 = "應對，開始。"
22140-102 = "哈！很好！辦得到的話就試試看吧！"
22140-106 = "這樣一來……！"
22140-107 = "礙事的機器人就，全部，擊倒了……！"
22140-108 = "[ns]「大家，做好準備！馬上就到地上了唷……！」"
22140-114 = "很──好！到外面了！"
22140-115 = "那麼，接下來要往哪裡才好呢？"
22140-117 = "愛麗絲所在的地方很可能是埃里都的中心……"
22140-118 = "沒錯，就是位於中央的那座塔唷。"
22140-119 = "計算出從目前地點出發的路線了。#n沿著左方的大路直直向北方前進就能抵達。"
22140-120 = "[ns]「感謝支援。那我們走吧。」"
22140-131 = "滾開滾開──！"
22140-139 = "導航就交給我們。"
22140-140 = "儘管上吧！GOGO～！"
22140-142 = "下一話;陷阱"

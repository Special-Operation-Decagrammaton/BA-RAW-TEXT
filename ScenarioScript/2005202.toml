[translation]
2005202-1 = "基礎建設"
2005202-2 = "今天也很冷呢～"
2005202-3 = "雖然一向都是如此就是了～"
2005202-4 = "[s]「大老遠跑來這種荒郊野外……真的有必要嗎？」"
2005202-5 = "當然有。"
2005202-6 = "雖然這只是出版部的一小步……"
2005202-7 = "卻可能成為赤冬重要的一大步……！"
2005202-8 = "……是為了完成這樣的事業而來的。"
2005202-9 = "[s]「那究竟是……？」"
2005202-10 = "誠如我先前所說，是架設通訊線路！"
2005202-14 = "一副「為什麼出版部要做這種事」的表情呢。"
2005202-15 = "呣呵呵，我懂我懂。#n這的確是公共領域的事情沒錯。"
2005202-16 = "基於這層意義，原則上應該由赤冬事務局負責才對。"
2005202-17 = "不過考慮到事務局的工作效率，恐怕過了一百年都不會開工吧～"
2005202-18 = "[s]「所以出版部是因為……？」"
2005202-19 = "是的，應該不需要我多做解釋了吧？"
2005202-20 = "正是因為出版部承包了這項工程。"
2005202-21 = "[s1]「原來如此……」\n[s2]「事務局把這件事外包出去了啊……」"
2005202-24 = "所以我是不是得一個人架設好所有通訊線路……是嗎？#n為什麼我得親自動手呢？"
2005202-25 = "重要的不是只有「安裝好了」這個結果嗎？"
2005202-26 = "來吧，各位！請過來這邊！"
2005202-34 = "要是把事情辦好就買額外的布丁給我們……這話不是騙我們的吧，出版部？"
2005202-35 = "還有如果能提早完工，就把透過特別管道弄來的「特製漿果汁」當成獎勵也是！"
2005202-37 = "當然是真的。這種事情最重要的不就是誠信嗎？"
2005202-38 = "我，出版部部長荒槇八雲──只要事情跟錢有關就絕不馬虎！"
2005202-42 = "……老師？為什麼一臉驚訝的表情？"
2005202-43 = "[s3]「怎麼會……既然你都層層轉包了……！」\n[s4]「我本來以為你會用某種方式從中撈油水……」\n[s5]「藉此讓出版部的利益最大化的說……！」"
2005202-47 = "怎麼說這種話呢，老師。#n我也沒有惡毒到那種程度嘛。"
2005202-48 = "……雖然要是有人想賴帳，我也有變得比惡魔更惡毒的覺悟就是了。"
2005202-49 = "看來老師也是只知其一不知其二呢。呣呵呵。"
2005202-50 = "[s6]「可惡，被八雲這麼說真讓人不甘心！」\n[s7]「那八雲知道的其二又是什麼！」"
2005202-53 = "這個嘛……"
2005202-54 = "基礎建設必須足夠廉價，才能做成真正的生意啊！"
2005202-55 = "老師不妨想想看……#n如果基礎建設的安裝成本上升，安裝方勢必會用某種方式從使用者身上賺回來。"
2005202-56 = "更別說這次發包的還是那個事務局。"
2005202-57 = "那群鐵公雞當初編列的預算，可是少到幾乎不可能完工哦？"
2005202-58 = "不過話雖如此，假如因為預算不足就額外敲竹槓，只追求眼前的利益……"
2005202-59 = "無異於是為了短期利益而造成長期損失的行為！"
2005202-60 = "對於一個萬物相連的超連結社會而言，通訊網路就是另一種形式上的生命線！"
2005202-61 = "要是輕率地讓生命線民營化，最後所有人都會完蛋的！"
2005202-62 = "因此就這件事而言──#n即便出版部必須承擔短期損失，也要盡可能以最低的成本架設好通訊基礎建設！"
2005202-63 = "接著再回頭跟事務局交涉使用權的部分，這才是可持續的長期商業模式！"
2005202-64 = "注意不是所有權而是使用權哦，使用權。#n這點是很重要的。"
2005202-65 = "[s]「所以……你究竟打算怎麼做……？」"
2005202-66 = "這個部分就請您拭目以待吧。"
2005202-67 = "呣呵呵。"
2005202-70 = "終於……連我們的宿舍也牽好有線網路了！"
2005202-71 = "這樣就不用再依靠又貴又慢，甚至還會斷線的……劣質無線網路了……"
2005202-76 = "話說，各位……"
2005202-77 = "有了這又快又便宜，而且不會斷線的網路之後……大家打算做什麼呢？"
2005202-79 = "咦？聽你這麼一說……"
2005202-80 = "仔細想想，好像還真的沒考慮過這件事呢……"
2005202-81 = "來來來～這種時候不如先忘掉一切，從有趣的事情開始吧？"
2005202-82 = "只要連上我們出版部打造的串流平台，就可以免費看100篇網路小說哦！"
2005202-83 = "100篇！？"
2005202-84 = "而且還是免費！？"
2005202-85 = "沒錯。而且一段時間之後，還會繼續釋出新的免費內容。"
2005202-86 = "當然如果支付少許的費用……就能比其他人更快、更精準地看到後續的付費內容哦？"
2005202-87 = "付費內容……？"
2005202-88 = "哎呀～都讓我們免費看100篇了，哪需要課金呢？"
2005202-92 = "（呣呵呵……每個人一開始都是這麼想的呢……）"
2005202-93 = "[s]（八雲……這傢伙……！）"
2005202-96 = "我，我全部看完了耶！？"
2005202-97 = "就是說啊！沒有後續嗎？後續！"
2005202-98 = "請大家冷靜，冷靜。#n我剛才不是說過了嗎？只要支付少許的費用……"
2005202-100 = "我已經付錢了！就是連付費的也看完了啊！"
2005202-101 = "下一話什麼時候會出啊？#n要我每個月付費訂閱也可以，拜託！"
2005202-102 = "！？"
2005202-103 = "這，這還真是驚人。#n沒想到各位消耗內容的速度居然這麼快……"
2005202-104 = "那麼……要不要先來享受一下，這部由網路小說改編的網路漫畫呢？"
2005202-105 = "閱讀文字和用圖片感受的體驗，可是截然不同的哦？"
2005202-106 = "我要看！我要看！"
2005202-107 = "咦……可是漫畫只有10話免費耶……？"
2005202-108 = "哎呀，這個部分真的只能請各位多多包涵了。#n畢竟畫圖這種事情，真的不是普通的辛苦呢！"
2005202-109 = "如果實在等不及的話……#n也可以藉由對「作者」進行小額的「自發性贊助」來參與募資唷？"
2005202-110 = "現在的世界上……能夠驅動人的力量，說白了就是錢嘛。呣呵呵呵。"
2005202-111 = "（而且負責媒合募資的同樣是我們出版部，過程中的手續費自然也能賺好賺滿）"
2005202-112 = "可是……為什麼要設定付費上限啊？"
2005202-113 = "就是說啊！要是可以的話，我本來還想花更多錢的說！"
2005202-114 = "這份心意我十分感謝，不過我們出版部的目標終究是各位讀者的幸福與快樂。"
2005202-115 = "要是因為我們出版部的平台而影響到日常生活的話，這不就本末倒置了嗎？"
2005202-116 = "（也是因為不能讓消費者在金錢或心理上破產，生意才能做得長久啦～）"
2005202-117 = "如果各位還想看點別的東西……我們這邊也準備了許多影像作品。"
2005202-122 = "哎呀呀……這下子有點困擾了呢……"
2005202-123 = "又，又怎麼了？"
2005202-124 = "咦……？以這裡現在的網路速度，沒辦法順暢觀看高畫質的影片……？"
2005202-125 = "說來遺憾，不過似乎是這樣呢。#n唉，這都要怪事務局不肯給更多預算……真是的。"
2005202-126 = "不知道各位怎麼看呢？#n為了享受更多網路小說和漫畫……"
2005202-127 = "還有享受更高品質的影音和內容……#n更快的網路環境──"
2005202-128 = "──是必要的對吧？"
2005202-134 = "那當然！"
2005202-135 = "這也是事務局的錯嗎……很好！我馬上去抗議！"
2005202-136 = "順便把宿舍的人都叫來吧！"
2005202-137 = "沒錯！也叫其他宿舍的人來幫忙！"
2005202-138 = "呣呵呵。如果各位願意順便幫我們出版部的平台宣傳一下的話，我會非常感謝的。"
2005202-139 = "大家能夠一起欣賞到優質的內容，豈不是皆大歡喜嗎？"
2005202-140 = "不用擔心！儘管交給我們！"
2005202-141 = "啊，這裡還有社群可以寫心得、閒聊或留下意見耶。感覺不錯嘛！"
2005202-142 = "各位，謝謝你們。"
2005202-143 = "我們赤冬出版部，永遠會致力於用更優質的內容來回饋大家。"
2005202-144 = "（雖然其中的大約三分之一，是從赤冬外部低價買進來充數的內容……）"
2005202-145 = "（不過那些在赤冬也還算新鮮，所以倒也不成問題。呣呵呵）"
2005202-147 = "（於是學生們便找上了事務局，集體要求安裝更好的線路）"
2005202-148 = "（而出版部的事業，也因此發展得更加勢如破竹……！）"
2005202-154 = "……結果好像對事務局的財政造成了一點打擊呢。"
2005202-155 = "不過那本來就是事務局該做卻偷懶沒做的事，所以也不能算是出版部的錯吧？"
2005202-156 = "呣呵呵呵！"
2005202-157 = "[s]「老師我啊……」"
2005202-158 = "嗯？"
2005202-159 = "[s]「有時候會覺得，八雲好像才是最可怕的呢……」"
2005202-160 = "哎呀，您怎麼這麼說呢～#n其他地方哪找得到像我這麼單純無害的學生呀～？"

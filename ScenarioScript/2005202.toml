[translation]
2005202-1 = "โครงสร้างพื้นฐาน"
2005202-2 = "วันนี้ก็หนาวอีกแล้วนะคะ~"
2005202-3 = "ถึงจะหนาวทุกวันอยู่แล้วก็เถอะค่ะ~"
2005202-4 = "[s] \"มีงานอะไร... ถึงต้องออกมาไกลขนาดนี้เลยเหรอ?\""
2005202-5 = "ก็ต้องมีสิคะ"
2005202-6 = "ถึงนี่จะเป็นแค่ก้าวเล็กๆ ของชมรมสื่อสิ่งพิมพ์"
2005202-7 = "แต่สำหรับเรดวินเทอร์แล้ว... นี่คือก้าวสำคัญ!"
2005202-8 = "ฉันมาเพื่อก้าวนั้นที่ตัวเองก็ไม่ค่อยรู้เท่าไรค่ะ..."
2005202-9 = "[s] \"มันคืออะไรเหรอ?\""
2005202-10 = "ก็อย่างที่ฉันเฉลยใน MOMOTALK ไปค่ะ นี่คือการติดตั้งสายสื่อสารไงคะ!"
2005202-14 = "มองฉันเหมือนจะถามว่าทำไมชมรมสื่อสิ่งพิมพ์ต้องออกมาทำอะไรแบบนี้เลยนะคะ"
2005202-15 = "ฉันเข้าใจค่ะ ฉันเข้าใจ ฮิ ฮิ ฮิ นี่คืองานสาธารณะอย่างไม่ต้องสงสัย"
2005202-16 = "โดยหลักการแล้วงานพวกนี้ต้องอยู่ในความรับผิดชอบของสำนักเลขาธิการเรดวินเทอร์ค่ะ"
2005202-17 = "แต่ถ้าดูจากความเร็วในการทำงานของสำนักเลขาธิการแล้ว อีก 100 ปีข้างหน้าการก่อสร้างก็คงยัง#nไม่เริ่มเลยค่ะ~"
2005202-18 = "[s] \"ชมรมสื่อสิ่งพิมพ์ก็เลยมาทำให้...?\""
2005202-19 = "ใช่ค่ะ แต่ถ้าจะพูดให้ถูก"
2005202-20 = "ต้องบอกว่านี่คืองานที่เรารับช่วงต่อมาค่ะ"
2005202-21 = "[s1] \"เป็นแบบนี้สินะ...\"\n[s2] \"สำนักเลขาธิการส่งต่องานนี้ให้สินะ...\""
2005202-24 = "แล้วฉันต้องมาติดตั้งสายสื่อสารทั้งหมดคนเดียวหรือเปล่าน่ะเหรอคะ? ทำไมฉันต้องทำเองด้วยล่ะ?"
2005202-25 = "สิ่งสำคัญสำหรับฉันไม่ใช่กระบวนการ แต่เป็นผลลัพธ์ต่างหาก"
2005202-26 = "เอาละ ทุกคน! เข้ามาได้เลยค่ะ!"
2005202-34 = "ห้ามเฉไฉนะชมรมสื่อสิ่งพิมพ์ ที่บอกว่าถ้าทำงานนี้ได้ดี จะซื้อพุดดิ้งเพิ่มให้น่ะ!"
2005202-35 = "แล้วก็ถ้ารีบทำจนเสร็จก่อนกำหนด ก็จะให้ 'มอร์สสูตรพิเศษ' ที่หามาจากช่องทางพิเศษเป็นโบนัสด้วย!"
2005202-37 = "แน่นอนอยู่แล้วค่ะ งานแบบนี้น่ะ ความไว้วางใจเป็นสิ่งสำคัญที่สุดอยู่แล้วนี่คะ"
2005202-38 = "ถ้าเป็นสิ่งที่ทำเงินได้ อารามากิ ยาคุโมะ หัวหน้าชมรมสื่อสิ่งพิมพ์คนนี้ไม่สัญญาอะไรส่งเดชอยู่แล้วค่ะ!"
2005202-42 = "คุณครู...? ทำไมถึงทำหน้าตกใจขนาดนั้นล่ะคะ?"
2005202-43 = "[s3] \"รับช่วงงานมา แล้วมาจ้างให้คนอื่นรับช่วงอีกทีเหรอ...!\"\n[s4] \"แบบนี้ก็เท่ากับรับช่วงงานมาแล้วหักหัวคิวน่ะสิ!\"\n[s5] \"หากำไรเข้าชมรมจากการจ้างคนอื่นอีกทีสินะ!\""
2005202-47 = "พูดอะไรอย่างนั้นคะคุณครู ฉันไม่ใช่นักธุรกิจหน้าเลือดนะคะ"
2005202-48 = "ถ้าฉันคิดจะรีดเงินจากใครจริงๆ ละก็ ฉันรู้วิธีในการเป็นนายหน้าที่โหดร้ายกว่านี้อีกค่ะ..."
2005202-49 = "เอาเป็นว่า คุณครูก็มองอะไรด้านเดียวเหมือนคนอื่นสินะคะ ฮิ ฮิ ฮิ"
2005202-50 = "[s6] \"แล้วอีกด้านที่ยาคุโมะเห็นคืออะไรเหรอ!\"\n[s7] \"แล้วอีกด้านที่ครูไม่เห็นคืออะไรเหรอ!\""
2005202-53 = "อีกด้านหนึ่งก็คือข้อเท็จจริงที่ว่า..."
2005202-54 = "เราต้องมีโครงสร้างพื้นฐานที่ย่อมเยา ธุรกิจถึงจะดำเนินต่อไปได้ดียังไงล่ะคะ!"
2005202-55 = "ลองคิดตามนะคะคุณครู ถ้าต้นทุนในการติดตั้งโครงสร้างพื้นฐานแพงขึ้น ผู้ติดตั้งก็ย่อมต้องเรียกเก็บ#nค่าใช้จ่ายนั้นจากผู้บริโภคไม่ว่าทางใดก็ทางหนึ่ง"
2005202-56 = "ที่หนักกว่านั้นก็คือ ฝ่ายที่มีอำนาจสั่งซื้อหรือจัดจ้างก็ดันเป็นสำนักเลขาธิการ"
2005202-57 = "แล้วงบประมาณจากคนขี้เหนียวพวกนั้นน่ะ แทบจะไม่พอก่อสร้างตั้งแต่แรกด้วยซ้ำค่ะ"
2005202-58 = "แต่ถึงยังไง การไปรีดราคาเกินจริงกับงานที่ได้งบประมาณไม่พอ เพียงเพื่อจะหวังเอาผลกำไร..."
2005202-59 = "มันจะทำให้เกิดปัญหากำไรระยะสั้นและขาดทุนระยะยาวค่ะ!"
2005202-60 = "ในสังคมที่ทุกคนมีการเชื่อมต่อกันระดับยิ่งยวด! พวกสายสื่อสารก็ไม่ต่างจากเส้นเลือดใหญ่ของสังคม#nหรอกค่ะ!"
2005202-61 = "และถ้าเราให้เอกชนมาจัดการเส้นเลือดใหญ่นี้แทนพวกเรา สุดท้ายทุกคนจะวายวอดกันหมดค่ะ!"
2005202-62 = "ต่อให้เกิดการขาดทุนในระยะสั้น แต่ชมรมสื่อสิ่งพิมพ์ก็จะติดตั้งโครงสร้างพื้นฐานด้านการสื่อสาร#nอย่างประหยัดที่สุดเท่าที่จะเป็นไปได้!"
2005202-63 = "จากนั้นเราก็จะเจรจาสิทธิในการใช้ประโยชน์กับทางสำนักเลขาธิการค่ะ นี่ละแผนธุรกิจระยะยาวของเรา!"
2005202-64 = "สิทธิในการใช้ประโยชน์ค่ะ ไม่ใช่สิทธิในการเป็นเจ้าของ นี่คือประเด็นสำคัญค่ะ"
2005202-65 = "[s] \"ถ้างั้น... ท้ายที่สุดแล้วจะทำยังไงเหรอ...?\""
2005202-66 = "เรื่องนั้นก็คงต้องดูจากนี้ไปละค่ะ"
2005202-67 = "ฮิ ฮิ ฮิ"
2005202-70 = "ในที่สุด... หอพักของเราก็มีเครือข่ายอินเทอร์เน็ตแบบสายแลนแล้ว!"
2005202-71 = "จากนี้ก็ไม่จำเป็นต้องพึ่งพาอินเทอร์เน็ตไร้สายที่คุณภาพต่ำ ราคาแพง ช้า แล้วก็หลุดบ่อยอีกแล้ว..."
2005202-76 = "แต่จะว่าไปนะคะ ทุกคน"
2005202-77 = "จากนี้ทุกคนคิดจะทำอะไร... ด้วยอินเทอร์เน็ตที่ทั้งเร็ว เสถียร และราคาย่อมเยาเหรอคะ?"
2005202-79 = "หืม? ระ... เรื่องนั้น..."
2005202-80 = "จะว่าไป ฉันยังไม่เคยคิดถึงเรื่องนั้นมาก่อนเลย..."
2005202-81 = "เอาละๆ ฉันว่าเราลืมทุกอย่างไปก่อน แล้วมาเริ่มทำอะไรที่สนุกๆ ดูมั้ยคะ?"
2005202-82 = "ดูสิคะ ถ้าเข้าแพลตฟอร์มสตรีมมิงที่ทางชมรมสื่อสิ่งพิมพ์ทำไว้ละก็ จะอ่านนิยายออนไลน์ได้ฟรีๆ 100 ตอนเลยนะคะ"
2005202-83 = "100 ตอนเลยเหรอ?!"
2005202-84 = "แถมยังฟรีอีกด้วย!"
2005202-85 = "ใช่ค่ะ และถ้าผ่านไปสักระยะแล้ว จะมีบทวิจารณ์ให้อ่านฟรีกันอีกรอบด้วยค่ะ"
2005202-86 = "แต่ว่าถ้าจ่ายค่าสมาชิกแค่นิดหน่อย... ก็จะได้สิทธิ์ดูคอนเทนต์ชำระเงินอื่นๆ ที่ทั้งละเอียดและดูได้#nรวดเร็วกว่าใครเลยละค่ะ"
2005202-87 = "คอนเทนต์ชำระเงิน...?"
2005202-88 = "ไม่เอาน่า ได้อ่านฟรีๆ ตั้ง 100 ตอนแล้ว ยังต้องจ่ายค่าสมาชิกเพิ่มเพื่ออ่านอย่างอื่นอีกเหรอ?"
2005202-92 = "(ฮุฮุฮุ... ตอนแรกทุกคนก็คิดกันอย่างนี้ละค่ะ...)"
2005202-93 = "[s] (ยาคุโมะ... เด็กคนนี้นี่...!)"
2005202-96 = "อะ... อ่านหมดแล้วเหรอเนี่ย?!"
2005202-97 = "นั่นสิ! ไม่มีตอนฟรีให้อ่านแล้วเหรอ? ตอนต่อไปอยู่ไหน!"
2005202-98 = "ใจเย็นๆ ก่อนค่ะ ฉันก็บอกไปเมื่อกี้แล้วนี่คะ? ถ้าจ่ายค่าสมาชิกแค่นิดหน่อย..."
2005202-100 = "ฉันจ่ายไปแล้วและอ่านทุกอย่างหมดแล้วไง!"
2005202-101 = "ตอนต่อไปจะมีให้อ่านเมื่อไร? ให้ฉันเหมาจ่ายค่าสมาชิกไว้เลยก็ได้ ขอร้องละ!"
2005202-102 = "?!"
2005202-103 = "นะ... น่าทึ่งเลยนะคะ ไม่คิดเลยว่าจะเสพคอนเทนต์เร็วขนาดนี้..."
2005202-104 = "ถ้าอย่างนั้น ระหว่างนี้ลองเปลี่ยนมาสนุกกับเว็บตูนที่ดัดแปลงมาจากนิยายออนไลน์เรื่องนี้มั้ยคะ?"
2005202-105 = "การอ่านตัวหนังสือกับการดูภาพให้ความรู้สึกที่แตกต่างกันอย่างสิ้นเชิงเลยละค่ะ"
2005202-106 = "เอาสิ! เว็บตูนก็ได้!"
2005202-107 = "เอ๋... แต่เว็บตูนให้อ่านฟรีแค่ 10 ตอนเองเหรอ...?"
2005202-108 = "ตายแล้ว เรื่องนั้นยอมผ่อนปรนให้หน่อยเถอะนะคะ การวาดรูปแบบนี้ก็ไม่ใช่งานง่ายเลยค่ะ!"
2005202-109 = "แต่ถ้ารอไม่ไหวละก็... ยังมีวิธี 'โดเนทโดยสมัครใจ' เพื่อเป็นกำลังใจให้ 'นักวาด' ด้วยนะคะ"
2005202-110 = "ถึงใครจะว่ายังไง... แต่ในโลกสมัยนี้น่ะ สิ่งที่ขับเคลื่อนคนได้ก็คือเงินนี่คะ ฮิ ฮิ ฮิ"
2005202-111 = "(คนที่ได้รับโดเนทก็คือชมรมสื่อสิ่งพิมพ์ของเราเอง และยังได้ทำธุรกิจจากค่าธรรมเนียมไปด้วย)"
2005202-112 = "ว่าแต่... ทำไมถึงมีการกำหนดขีดจำกัดในการชำระเงินไว้ล่ะ?"
2005202-113 = "นั่นสิ! ถ้าฉันมีเงินมากพอ ฉันก็อยากจ่ายทุกอย่างแบบไม่ต้องมีลิมิตเลย!"
2005202-114 = "ขอบคุณที่ให้ความสนใจนะคะ แต่เป้าหมายของชมรมสื่อสิ่งพิมพ์ก็คือความสุขและความเพลิดเพลินของ#nผู้อ่านค่ะ"
2005202-115 = "ถ้าแพลตฟอร์มของชมรมสื่อสิ่งพิมพ์สูบเงินจนส่งผลกระทบต่อการใช้ชีวิตประจำวันของผู้อ่าน ก็ถือว่าทำไม่ถูกจุดประสงค์ของชมรมสิคะ"
2005202-116 = "(การไม่ทำให้ผู้บริโภคล้มละลายทางการเงินและทางอารมณ์จะทำให้ดำเนินธุรกิจต่อได้นานขึ้นด้วย...)"
2005202-117 = "นอกจากนี้พวกฉันยังเตรียมวิดีโอแบบนี้ไว้อีกหลายโปรเจกต์เลยค่ะ... เผื่อว่าจะอยากดูอะไรเพิ่มกันยังไง#nล่ะคะ"
2005202-122 = "เอ๋... แบบนี้ก็แย่น่ะสิคะ..."
2005202-123 = "ทำไมเหรอ มีอะไรอีก?"
2005202-124 = "หืม...? ดูวิดีโอความละเอียดสูงแบบนี้ด้วยความเร็วของอินเทอร์เน็ตของที่นี่ไม่ได้งั้นเหรอ...?"
2005202-125 = "น่าเสียดายที่เป็นอย่างนั้นนะคะ จริงๆ เลยเชียว ทางสำนักเลขาธิการก็ไม่ค่อยจะเต็มใจจัดสรร#nงบประมาณให้ด้วยค่ะ"
2005202-126 = "แต่ทุกคนคิดยังไงกันเหรอคะ? เรื่องนิยายออนไลน์ เว็บตูน แล้วก็วิดีโอทั้งหลาย..."
2005202-127 = "ถ้าอยากสนุกกับคอนเทนต์คุณภาพสูง ก็ต้องมีการเชื่อมต่ออินเทอร์เน็ตที่เร็วขึ้น..."
2005202-128 = "ว่ามั้ยล่ะคะ...?"
2005202-134 = "จะเป็นอย่างอื่นไปไม่ได้เลย!"
2005202-135 = "เรื่องนี้ก็เป็นเพราะสำนักเลขาธิการอีกแล้วสินะ... ดีละ! ฉันจะไปประท้วง!"
2005202-136 = "ไหนๆ ก็จะไปแล้ว ไปเกณฑ์เพื่อนๆ ในหอพักออกมาด้วยดีกว่า!"
2005202-137 = "ใช่! ไปขอความช่วยเหลือจากหอพักอื่นด้วยเลย!"
2005202-138 = "ฮิ ฮิ ฮิ งั้นฉันฝากโปรโมตแพลตฟอร์มของชมรมสื่อสิ่งพิมพ์ด้วยเลยนะคะ"
2005202-139 = "ถ้าได้ดูอะไรสนุกๆ ด้วยกัน ทุกคนก็น่าจะชอบไม่ใช่เหรอคะ?"
2005202-140 = "ไม่ต้องห่วงนะ! วางใจพวกฉันได้เลย!"
2005202-141 = "อ๊ะ เข้ามาแชร์ความประทับใจ เขียนความคิดเห็น แล้วก็ชวนคุยนู่นนี่ในคอมมูนิตี้นี้ได้ด้วยสินะ ดีจังเลยนะ!"
2005202-142 = "ขอบคุณนะคะ ทุกคน"
2005202-143 = "ชมรมสื่อสิ่งพิมพ์เรดวินเทอร์ของเราจะตอบแทนทุกคนด้วยคอนเทนต์ที่มีคุณภาพค่ะ"
2005202-144 = "(ถึงแม้ว่าราวๆ 1 ใน 3 ของคอนเทนต์ทั้งหมดจะเป็นคอนเทนต์ที่เราซื้อมาจากนอกเรดวินเทอร์ในราคา#nถูกก็เถอะ...)"
2005202-145 = "(แต่ในเรดวินเทอร์แล้ว คอนเทนต์แบบนั้นก็เป็นเรื่องใหม่ที่น่าสนใจ ก็เลยไร้ปัญหา ฮิ ฮิ ฮิ)"
2005202-147 = "(จากนั้นเหล่านักเรียนก็มุ่งหน้าไปที่สำนักเลขาธิการ และร่วมกันขอให้ติดตั้งสายสัญญาณที่ดีกว่าเดิม)"
2005202-148 = "(แล้วธุรกิจของชมรมสื่อสิ่งพิมพ์ก็เติบโตขึ้นอีกขั้นอย่างรวดเร็ว...!)"
2005202-154 = "ผลที่ตามมาก็คือ ดูเหมือนว่าสถานะทางการเงินของสำนักเลขาธิการจะได้รับผลกระทบอยู่บ้างค่ะ..."
2005202-155 = "แต่ยังไงนั่นก็เป็นงานที่สำนักเลขาธิการต้องทำอยู่แล้ว แต่ก็เลือกที่จะผัดผ่อนออกไปเอง สุดท้ายแล้วก็ไม่ใช่ความผิดของชมรมสื่อสิ่งพิมพ์หรอกค่ะ"
2005202-156 = "ฮิ ฮิ ฮิ"
2005202-157 = "[s] \"บางครั้งนะ ครูคิดว่า...\""
2005202-158 = "คะ?"
2005202-159 = "[s] \"ยาคุโมะเหมือนจะเป็นนักเรียนที่น่ากลัวที่สุดเลยละ...\""
2005202-160 = "อะไรกันคะ พูดอะไรอย่างนั้นน่ะ ไม่มีนักเรียนคนไหนที่ไร้พิษสงได้เท่ากับฉันแล้วค่ะ"

[translation]
2005202-1 = "Infrastructure"
2005202-2 = "Ah, another cold day!"
2005202-3 = "Well, what was I expecting, really? Heh."
2005202-4 = "[s] \"Did we really have to come so far out?\""
2005202-5 = "Yes! Yes, we absolutely did."
2005202-6 = "It may be a small step for the Publishing Department, but..."
2005202-7 = "...it could be an...important step for Red Winter!"
2005202-8 = "A step towards achieving something of actual import."
2005202-9 = "[s] \"And what would that be?\""
2005202-10 = "Like I said, the installation of communication lines!"
2005202-14 = "Heh. I know, I know. You're thinking, \"Why on earth would the Publishing Department be involved with something like that?\""
2005202-15 = "I understand, I really do. Heh, heh, heh. This is clearly a public works matter, after all."
2005202-16 = "Therefore, in principle, it really is a Red Winter Office matter, isn't it?"
2005202-17 = "Well, I'm not a big fan of red tape, and neither are they. If it were up to them, we wouldn't even see a blueprint until a hundred years from now."
2005202-18 = "[s] \"Then the reason why the Publishing Department is handling this matter is...\""
2005202-19 = "Yes, yes. Exactly what you're thinking."
2005202-20 = "This is an official contract gig."
2005202-21 = "[s1] \"Is that so...?\"\n[s2] \"So the Red Winter Office is outsourcing now...\""
2005202-24 = "Hm? How am I going to install all the communication lines myself? Why...would I do such a thing?"
2005202-25 = "Results are what matter, Sensei. Results. It doesn't matter how it gets done."
2005202-26 = "All right, this way, everyone! Welcome!"
2005202-34 = "You meant it, right, Publishing Department? You'll compensate us with extra pudding for this job?"
2005202-35 = "And even that \"special-grade mors,\" obtained through your special contacts?"
2005202-37 = "I mean every word I say. After all, business can't run without trust."
2005202-38 = "I, Aramaki Yakumo, President of the Publishing Department, would never make a mockery of money matters!"
2005202-42 = "...Sensei? Why do you look so surprised?"
2005202-43 = "[s3] \"I can't believe it... This is like...a pyramid scheme!\"\n[s4]\"Trying to play the middleman, is that it?\"\n[s5]\"I thought you'd be trying to maximize the Publishing Department's profits!\""
2005202-47 = "What are you saying, Sensei? You act like I'm the devil incarnate, come to Kivotos."
2005202-48 = "...Though, if anyone tries to stiff me on payment, I'm prepared to become something much, much worse than that."
2005202-49 = "Either way, it seems you're missing the bigger picture, Sensei. Heh, heh, heh."
2005202-50 = "[s6] \"Ugh, right message, wrong messenger!\"\n[s7]\"Then, what is it that you know and I don't, Yakumo?\""
2005202-53 = "Well, you see..."
2005202-54 = "You can't run a business without an affordable infrastructure!"
2005202-55 = "Think about it, Sensei. If the cost of installing infrastructure goes up, the installer will naturally find a way to pass that off onto the consumer."
2005202-56 = "And the organization responsible for initiating the agenda items around here is the Red Winter Office."
2005202-57 = "Those cheapskates allocated so little to the budget that the project was impossible to begin with."
2005202-58 = "All they see is profit, profit, profit, and instant gratification. So they cut the budget and then overcharge the consumers."
2005202-59 = "It's a simple equation of short-term gains and long-term losses!"
2005202-60 = "In this hyperconnected society where everyone is connected to everyone all the time... Communication networks can truly be thought of as lifelines!"
2005202-61 = "So if these lifelines are recklessly privatized, it'll be the end of us all!!"
2005202-62 = "Here, the Publishing Department will build the communication infrastructure as cheaply as possible, even if it means taking a short-term loss!"
2005202-63 = "And that will lend to the success of our long-term goals: negotiating rights of use with the Red Winter Office!"
2005202-64 = "Rights of USE, not ownership. That part's crucial."
2005202-65 = "[s] \"So... What's the plan, exactly?\""
2005202-66 = "Just wait and see."
2005202-67 = "Heh, heh, heh."
2005202-70 = "Finally, our dorms support...ethernet!!"
2005202-71 = "At long last! Free us from the shackles of that turtle-like, sloth-like, unreliable, low-quality wireless internet!"
2005202-76 = "Now then, everyone."
2005202-77 = "You hold the power of fast, affordable internet in your hands... How will you wield it?"
2005202-79 = "Huh? W-Well..."
2005202-80 = "When she puts it like that, I guess I don't really know what you can do online..."
2005202-81 = "You're lucky that I was coincidentally around to help you! Forget everything you know for now, and let's just start with FUN."
2005202-82 = "See here, if you access this streaming platform you can enjoy up to 100 web novel chapters for free, created, hosted, and sponsored by the Publishing Department!"
2005202-83 = "100 chapters?!"
2005202-84 = "FOR FREE?!"
2005202-85 = "Indeed. And, given a reasonable time period, after you finish those 100 chapters, you'll even get free previews for new ones!"
2005202-86 = "...Of course, if you don't like the sound of waiting, you can always pay for premium and get access to content faster than other users."
2005202-87 = "Pay? Premium...?"
2005202-88 = "C'mon, it's 100 free chapters! We're never going to need to pay!"
2005202-92 = "(Heh, heh, heh... Everyone thinks that way at first...)"
2005202-93 = "[s] \"(Yakumo... You little...!)\""
2005202-96 = "I... I'm already caught up?!"
2005202-97 = "Exactly! Where's the next part?! I need to know what happens next!"
2005202-98 = "Calm down, calm down. Didn't I tell you earlier? If you just pay the fee for premium content..."
2005202-100 = "I heard you! And I already bought all of them and finished it!"
2005202-101 = "So when's the next part coming out?! I'll even pay for a subscription! PLEASE!!"
2005202-102 = "?!"
2005202-103 = "I-I have to admit, even I didn't predict you would finish everything that quickly."
2005202-104 = "Hm, good thing I'm always the girl with a solution. Why don't you indulge yourself in this animated adaptation of the web novel you were reading?"
2005202-105 = "After all, there's a huge difference between reading words and seeing it in motion, isn't there?"
2005202-106 = "Yes! I wanna watch them!"
2005202-107 = "Eh...? But you only get 10 free episodes for shows...?"
2005202-108 = "Ah, about that... I hope you can find some understanding in your heart for these poor souls. Drawing pictures is no easy task, you know!"
2005202-109 = "If the anticipation is too much...you could also fund the \"author\" by making a \"voluntary donation.\""
2005202-110 = "No matter how you slice it, that's the way of the world. Money is what makes it move. Heh, heh, heh."
2005202-111 = "(And since our very own Publishing Department is acting as the middleman, we'll be able to make a decent profit from commission fees too.)"
2005202-112 = "Another thing... Why did you limit how much I could spend?"
2005202-113 = "Yeah, get rid of it! I'd buy everything I could! I still have some money left!"
2005202-114 = "Although I am grateful for the sentiment, our Publishing Department's goal is, above all, the happiness and enjoyment of our readers."
2005202-115 = "We would never want any of you to find yourself with empty pockets just because of our platform. Wouldn't that be putting the cart before the horse?"
2005202-116 = "(...Also, it'll ensure the longevity of this business if we don't bankrupt our consumers, financially or emotionally.)"
2005202-117 = "And if there's anything else you'd like to see... At this time, we've prepared several video projects like this..."
2005202-122 = "Oh dear... How troublesome..."
2005202-123 = "Wh-What now?"
2005202-124 = "Huh...? With the current speeds on the installed internet lines, you can't smoothly watch a high-definition video like this...?"
2005202-125 = "Unfortunately, that seems to be the case. WHATEVER will we do now? The Red Winter Office just won't budge on the budget, you see."
2005202-126 = "But what do you think? More web novels, webtoons, videos..."
2005202-127 = "For the best possible viewing experience, you would need a faster internet connection..."
2005202-128 = "...Don't you think?"
2005202-134 = "You're absolutely right!"
2005202-135 = "Ugh! Of course the Office is getting in the way, even here! I've never seen a better reason to start a protest!"
2005202-136 = "Let's do it! Call everyone from the dorms!"
2005202-137 = "Sounds good! I'm sure the other dorms will feel the same way!"
2005202-138 = "Heh, heh, heh. While you're at it, we'd be grateful if you could promote our platform a little too."
2005202-139 = "When we can all watch fun content together, everyone's happy, right?"
2005202-140 = "Don't worry! Leave it to us!"
2005202-141 = "Oh, so you can chat, post reviews, or write opinions in the community too. This is great!"
2005202-142 = "Thank you, everyone."
2005202-143 = "The Red Winter Publishing Department will always strive to provide you with the highest-quality content there is!"
2005202-144 = "(To be honest, about a third of it is filled by buying slop content from outside Red Winter...)"
2005202-145 = "(But to the students here, its fresh material, so it's no problem. Heh, heh, heh.)"
2005202-147 = "It didn't take long for the students to organize a march against the Red Winter Office, demanding better lines be installed."
2005202-148 = "And the Publishing Department's business was developing with even greater fervor...!"
2005202-154 = "...As a result, it seems that the Red Winter Office's finances have taken a hit."
2005202-155 = "Either way, this was something the Red Winter Office should have done in the first place, but they tried to just push off onto me. So isn't it fair to say the Publishing Department is completely innocent?"
2005202-156 = "Heh, heh, heh."
2005202-157 = "[s] \"Sometimes...\""
2005202-158 = "What?"
2005202-159 = "[s] \"Sometimes I think you're the scariest person I know, Yakumo.\""
2005202-160 = "Oh, come on. What are you saying? Where else would you find a student as harmless as me?"

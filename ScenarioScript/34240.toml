[translation]
34240-1 = "ตอนที่ 24;คำอธิษฐานเพื่อเด็กสาว 2"
34240-2 = "......."
34240-3 = "อะไรกัน...? ทำไมกองสนับสนุนถึง..."
34240-4 = "อะไรคะเนี่ย? บาร์บาราอยู่ที่ไหนคะ?! ทำไมถึงยังมาไม่ถึงที่นี่อีกคะ...?  "
34240-9 = "......!!"
34240-14 = "เพลงนี้มัน..."
34240-15 = "นี่มัน... เพลงขอความเมตตา"
34240-16 = "[s] \"มิกะ...!\""
34240-18 = "ปะ... เป็นไปไม่ได้!!"
34240-19 = "ไม่ได้นะคะ! ห้ามเปิดเพลงที่พูดถึงความเมตตาในเขตแดนของฉันค่ะ!!!"
34240-20 = "ได้ยังไงกัน? เกิดเรื่องแบบนี้ได้ยังไง! "
34240-21 = "เครื่องดนตรีกับเครื่องเล่นแผ่นเสียงถูกทำลายไปหมดแล้วไม่ใช่เหรอ!!  หรือว่าจะเกิดปาฏิหาริย์!!  ทำไมเรื่องแบบนี้ถึง...?!  ทำไมล่ะ!!"
34240-22 = "พวกเธอต้องร้องเพลงแห่งความแค้น การดูถูก และการสาปแช่งสิ!"
34240-23 = "พวกเธอต้องโดนพวกฉันขูดรีดในนรกแห่งการหลอกลวงและทำร้ายซึ่งกันและกันสิ!! "
34240-27 = "[ns] \"หุบปากซะ\""
34240-29 = "ว่าไงนะ...?!"
34240-30 = "[s] \"อย่ามาพูดจาแบบนั้นกับนักเรียนที่มีค่าของฉัน\""
34240-31 = "......!!!"
34240-32 = "[s1] \"เธอทำให้เด็กนักเรียนของฉันต้องเจ็บปวดเพราะคำสั่งสอนผิดๆ\"\n[s2] \"ฉันไม่ยกโทษให้เธอเด็ดขาด\""
34240-33 = "กล้าดียังไงถึงพูดกับฉันแบบนี้...?!!"
34240-34 = "กล้าดียังไงถึงพูดกับฉันแบบนี้...?!!"
34240-38 = "กล้าดียังไง!!"
34240-43 = "ระ... เริ่มเปลี่ยนแปลงอีกครั้งแล้วเหรอคะ...?!"
34240-45 = "ก็ได้ ในเมื่อเป็นอย่างนี้ ซาโอริ!!"
34240-46 = "ฉันจะใช้เธอเป็นเครื่องสังเวยใหม่!!"
34240-48 = "......!!"
34240-49 = "แก...! แกเป็นคนพาครูมาที่นี่และทำให้แผนการของฉันพังพินาศ...! จงชดใช้สิ่งที่ตัวเองทำลงไปซะ!!"
34240-53 = "เอาเลยสิ มาดาม"
34240-55 = "หะ... หัวหน้า...!?"
34240-56 = "ทำอะไรของเธอน่ะ...!"
34240-58 = "ฉันรู้สึกขอบคุณด้วยซ้ำ... ถ้าฉันพอจะชดใช้อะไรได้บ้าง"
34240-62 = "เอาสิมาดาม อยากได้ฉันมากนักใช่มั้ย? ฉันอยู่นี่แล้วไง!! แล้วก็จะไม่หนีไปไหนด้วย!"
34240-64 = "แค่ก แค่ก! คุณครู...! เร็วเข้า...!"
34240-66 = "[ns] \"นี่คือการต่อสู้ครั้งสุดท้าย! ไปเลยทุกคน!\""
34240-67 = "ค่ะ!!"
34240-69 = "ย้าาาาก!"

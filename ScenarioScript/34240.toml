[translation]
34240-1 = "第24話;少女たちのためのキリエ（２）"
34240-2 = "……。"
34240-3 = "……何故、来ないのですか……？"
34240-4 = "バルバラは？#n何故まだ誰も……"
34240-9 = "……！！"
34240-14 = "この歌は……。"
34240-15 = "これは……[ruby=キリエ]Kyrie eleison[/ruby]……？"
34240-16 = "[s] \"ミカ……！\""
34240-18 = "なりません！！！"
34240-19 = "なりません！私の領地で慈悲を語る歌を響かせるなど！"
34240-20 = "一体どのような手段を……？"
34240-21 = "楽器も蓄音機もすべて破壊したというのに！――奇跡が起きたとでも？"
34240-22 = "なりません！！#n生徒は憎悪を軽蔑を……呪いを謳わなければなりません！"
34240-23 = "お互いを騙し傷つけ合う地獄の中で、私たちに搾取される存在であるべきなのです！"
34240-27 = "[ns] \"黙れ。\""
34240-29 = "……なに！？"
34240-30 = "[s] \"私の大切な生徒に話しかけるな。\""
34240-31 = "……！！！"
34240-32 = "[s1] \"あなたは偽りの教えで子供たちを奈落へ落とした。\"\n[s2] \"あなたを絶対に許せない。\""
34240-33 = "よ、よくも私にそのような……"
34240-34 = "よ、よくも私にそのような……"
34240-38 = "言葉をぉおおお――！！"
34240-43 = "ま、また変わり始めましたよ……！？"
34240-45 = "ああ、そうだサオリ――"
34240-46 = "貴様を新しい生贄として捧げましょう！"
34240-48 = "……！！"
34240-49 = "貴様が私の計画を台無しにしたのですから、その代償を支払うのです！！"
34240-53 = "――いくらでもどうぞ、マダム。"
34240-55 = "り、リーダー！？"
34240-56 = "……何をバカな事言ってるの！？"
34240-58 = "私にまだ払える代償があるのなら……むしろ感謝したいくらいだ。"
34240-62 = "さあ、マダム。#n私はここにいる！！持っていくがいい！"
34240-64 = "くっ、先生……！早く……！"
34240-66 = "[ns] \"最後の戦いだ！みんな行こう！\""
34240-67 = "は、はい！！"
34240-69 = "ぐっ、……あッ、アアアア！"

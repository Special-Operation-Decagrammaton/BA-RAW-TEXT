[translation]
34240-1 = "第24話;為了少女們的垂憐經（２）"
34240-2 = "……"
34240-3 = "……為什麼，為什麼沒有過來……？"
34240-4 = "白芭蕾呢？#n為什麼誰也沒來……"
34240-9 = "……！！"
34240-14 = "這首歌是……"
34240-15 = "這是……[ruby=垂憐經]Kyrie Eleison[/ruby]……？"
34240-16 = "[s] 「彌香……！」"
34240-18 = "不可以！！！"
34240-19 = "不可以！竟敢讓訴說憐憫的歌在我的領地裡響起！"
34240-20 = "到底用了什麼手段……？"
34240-21 = "明明所有的樂器和留聲機都已經破壞掉了才對！──難道是引發了奇蹟嗎？"
34240-22 = "不可以！！#n學生們必須……謳歌憎恨、輕蔑和詛咒才行！"
34240-23 = "要在這相互欺騙互相傷害的地獄裡，成為被我們榨取的存在才對！"
34240-27 = "[ns] 「給我閉嘴。」"
34240-29 = "……什麼！？"
34240-30 = "[s] 「不准對我重要的學生說話。」"
34240-31 = "……！！！"
34240-32 = "[s1] 「你用虛偽的教導讓孩子們墜入了深淵。」\n[s2] 「我絕對不會原諒你。」"
34240-33 = "竟，竟敢對我……"
34240-34 = "竟，竟敢對我……"
34240-38 = "說這種話──！！"
34240-43 = "又，又開始變身了……！？"
34240-45 = "對了，沙織──"
34240-46 = "就把你當成新的祭品獻上吧！"
34240-48 = "……！！"
34240-49 = "竟敢破壞我的計畫，我要讓你付出代價！！"
34240-53 = "──儘管來吧，夫人。"
34240-55 = "隊，隊長？"
34240-56 = "……你在說什麼傻話！？"
34240-58 = "如果我還有能夠付出的代價的話……反而應該要感謝她呢。"
34240-62 = "來啊，夫人。我就在這裡！！儘管來拿吧！"
34240-64 = "唔，老師……！趕快……！"
34240-66 = "[ns] 「這是最後的戰鬥了！大家上吧！」"
34240-67 = "是，是的！！"
34240-69 = "唔……啊，啊啊啊啊！"

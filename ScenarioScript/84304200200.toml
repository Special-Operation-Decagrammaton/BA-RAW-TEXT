[translation]
84304200200-5 = "好，那情況大概都整理好了……"
84304200200-7 = "呃啊……"
84304200200-8 = "什，什麼……你是誰……！"
84304200200-9 = "你到底是……！！"
84304200200-17 = "……噫。"
84304200200-19 = "真是經典的台詞啊。#n你們難道是在同一所學園學到的嗎？"
84304200200-20 = "而且你們都被打敗了還好意思先提問？#n有資格先提問的人是我才對吧？"
84304200200-21 = "你們是誰？來這裡搞砸其他學園的活動做什麼？"
84304200200-27 = "根據你們的回答……"
84304200200-32 = "我，我們沒有惡意！我們對這所學園沒有惡意！"
84304200200-33 = "沒錯，我們只是打，打工仔而已……！！"
84304200200-35 = "……打工仔？"
84304200200-36 = "工作是誰指派給你們的？對方是怎麼說的？"
84304200200-38 = "唔……那個我不能說。#n要是在這裡說出來就太不講義氣了──"
84304200200-46 = "來，換你。"
84304200200-47 = "噫噫噫噫噫噫──！！"
84304200200-48 = "不知道，我真的不知道！！我們也不知道那個人是做什麼的！"
84304200200-49 = "只是收到聯絡，對方說只要做他交代的事就會給錢……！！"
84304200200-55 = "啊，有電話。"
84304200200-56 = "……要接嗎？"
84304200200-57 = "打開擴音吧。"
84304200200-64 = "啊，啊～喂？有聽到嗎？"
84304200200-65 = "……怎麼樣？事情還順利嗎？"
84304200200-66 = "啊，嗯。你吩咐的健身中心已經搞定了。現在要付錢了嗎？"
84304200200-67 = "啊，當然當然！哎呀～那應該壓力挺大的吧，辛苦你們啦！我馬上匯款……"
84304200200-68 = "……啊！"
84304200200-69 = "話說我還有一份工作。能請你們一起進行嗎？"
84304200200-70 = "當然我也會付錢的！"
84304200200-71 = "嗯！？還有……？#n為，為什麼？不是都做完了嗎？"
84304200200-72 = "畢竟在做大事的時候，本來就會出現大大小小的問題嘛……"
84304200200-73 = "不，不用了。我們就做到這裡為止！#n所以趕快匯款給我們吧！現在馬上！"
84304200200-74 = "……？？？？"
84304200200-75 = "咦？真奇怪。你們的反應有點讓我意外呢？#n我還以為你們會很高興的說。"
84304200200-76 = "是因為事情比想像中還吃力嗎？還是突然有重要的約會？"
84304200200-77 = "又或者……"
84304200200-79 = "……是因為被敵人抓住，不想讓自己再罪加一等？"
84304200200-80 = "……！！！"
84304200200-81 = "……！"
84304200200-82 = "哎呀，真是的。#n那個反應……我只是隨便試探一下而已，看來被我猜中了啊？"
84304200200-83 = "雖然很令人遺憾……但你們應該知道吧？#n我們的合約是如果在途中被抓住……"
84304200200-84 = "導致違反保密條款的時候，契約就會失效。#n所以費用……我當然也不會支付囉？"
84304200200-85 = "你，你說什麼！？這太不講道理了……！#n你知道我們至今為止吃了多少苦頭嗎！！"
84304200200-86 = "說的也是，那樣實在太令人遺憾了對吧？"
84304200200-87 = "不過別擔心。#n我也不是凶神惡煞的惡鬼，所以打算再給各位一次機會。"
84304200200-88 = "雖然從合約來看是我單方面吃虧……但你們也確實吃了不少苦頭。"
84304200200-89 = "你到底想說什麼……"
84304200200-90 = "啊，不過這個條件也挺困難的，恐怕沒那麼容易哦。"
84304200200-91 = "畢竟如果我沒猜錯的話，抓到你們的人應該是C&C的美甘寧瑠對吧？"
84304200200-93 = "……！！！"
84304200200-94 = "你怎麼會知道？"
84304200200-95 = "哈哈，都做這行這麼久了，想不知道都難啊。#n你本來就是個名人。"
84304200200-96 = "不過……本來以為這陣子挺安分的，沒想到你居然還在當調月莉央會長的左右手啊。"
84304200200-97 = "……啊？"
84304200200-98 = "你在說什麼啊？#n我從來沒有當過那傢伙的左右手啊？"
84304200200-99 = "嗯？是嗎？#n啊啊，所以你們只是單純的合作關係囉？"
84304200200-100 = "哎呀，我真糊塗。#n抱歉抱歉，我還以為你跟那個人是好朋友呢。"
84304200200-101 = "哈哈，不過想想也是。#n畢竟這世上又有誰……"
84304200200-102 = "會想跟那種人站在同一邊呢？"
84304200200-103 = "我也沒那麼說過好嗎。"
84304200200-104 = "算了，現在那不是重點！#n在你那邊的那些人……是跟我約好要一起做這件事的同伴。"
84304200200-105 = "就算被你抓住了，我們現在還是有一起共事的合約關係。"
84304200200-106 = "就這樣拋棄他們……以商業角度來看實在不太合適。#n畢竟我跟某人可不一樣嘛。"
84304200200-110 = "……？#n這聲音是……"
84304200200-111 = "嗯？這是什麼聲音？#n有東西在嗶嗶叫……"
84304200200-116 = "……！！炸彈！！"
84304200200-122 = "咳咳，咳咳……！！#n這種地方什麼時候放了炸彈……！！"
84304200200-123 = "各位趁現在！！快逃吧！！"
84304200200-128 = "……！！！#n喂！快起來！！趕緊溜吧！！"
84304200200-132 = "嗯，咦……！？怎麼會有爆炸！？"
84304200200-133 = "嚇我一跳……！！#n話說我是昏倒了嗎？"
84304200200-134 = "現在不是說這些的時候！先跑就對了！！！"
84304200200-139 = "這些傢伙居然來這招……！！！"
84304200200-140 = "還不給我站住！！"

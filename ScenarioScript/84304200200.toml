[translation]
84304200200-5 = "Now that things are more or less settled..."
84304200200-7 = "Ugh..."
84304200200-8 = "Wh-What... Who are you...?!"
84304200200-9 = "Who...?!"
84304200200-17 = "...Eek!"
84304200200-19 = "Wow, what a cliche. Do they teach you all these lines in thug school or something?"
84304200200-20 = "Also, I beat YOU! Why are YOU asking questions?"
84304200200-21 = "Now, who are you? Why are you here, ruining our school event?"
84304200200-27 = "And choose your words carefully."
84304200200-32 = "We didn't mean anything bad! We don't have any beef with this school!"
84304200200-33 = "Yeah. It's just... Just a part-time job...!!"
84304200200-35 = "...A part-time job, huh? "
84304200200-36 = "Who hired you? What do you know about it?"
84304200200-38 = "Ah... I couldn't say. I'd feel bad if I started blabbing right off the bat—"
84304200200-46 = "Next. You."
84304200200-47 = "Eeek!!"
84304200200-48 = "We don't know! We really don't know!! We don't know who she is!"
84304200200-49 = "She just called us up, and she said she'll give us money if we did what she said...!!"
84304200200-55 = "Oh, the phone's ringing..."
84304200200-56 = "...Should I take it?"
84304200200-57 = "On speaker."
84304200200-64 = "Ah. Ah, Hello? Do you hear me?"
84304200200-65 = "Maybe it's not going through... How's it going out there? Everything on schedule?"
84304200200-66 = "Uh, y-yeah. We took care of the Fitness Center, just like you said. Are you going to send the money now?"
84304200200-67 = "Of course! Sounds like it was a tough job. But good work! I'll send the payment..."
84304200200-68 = "...Ah!"
84304200200-69 = "Oh, there is one other matter. Would you mind taking care of that too?"
84304200200-70 = "I'll pay you for it right away."
84304200200-71 = "Huh?! Other matter...? Wh-What? Isn't everything over?"
84304200200-72 = "When you work on big projects, little issues pop up here and there."
84304200200-73 = "Um, uh-uh. We're done! We've done enough, so just hurry up and pay us. Right now!!"
84304200200-74 = "Hm?"
84304200200-75 = "Hm? That's an odd reaction. I thought you'd be happy."
84304200200-76 = "Was the task more pressure than expected? Or do you suddenly have an important appointment somewhere else?"
84304200200-77 = "Or, if it's not that..."
84304200200-79 = "...maybe you don't want to add on to your crimes when you're already captured by the enemy."
84304200200-80 = "...!!"
84304200200-81 = "..."
84304200200-82 = "Oh my, that reaction... I was just throwing it out there, but I guess I hit the bullseye."
84304200200-83 = "My condolences...but if you remember, our contract does say, if you're captured on the job..."
84304200200-84 = "...and you break our NDA, the contract is null and void. Including your payment, unfortunately."
84304200200-85 = "Wh-What?! No, no way...! Do you know how hard we worked??"
84304200200-86 = "Tell me about it. It really is a shame. Though you should have considered that before you were captured."
84304200200-87 = "Don't worry. I'm not a monster. And since you did work so hard, I'm willing to give you one more chance."
84304200200-88 = "That's not in the contract, mind you. It's a favor from me to you, in recognition for everything you've done."
84304200200-89 = "What are you...?"
84304200200-90 = "I should mention, this'll be hard for you. Not easy at all."
84304200200-91 = "How so? Well, if I'm not mistaken, the one who's holding you captive is none other than Mikamo Neru of the C&C."
84304200200-93 = "...!!"
84304200200-94 = "How'd you know?"
84304200200-95 = "Haha. When you've been doing this as long as I have, it's impossible not to know. You're very famous."
84304200200-96 = "You know, it's funny. You'd been so independent lately. I didn't think you'd actually go back to being President Tsukatsuki Rio's right-hand woman."
84304200200-97 = "You... What?"
84304200200-98 = "What are you talking about? I was never her right-hand woman."
84304200200-99 = "Oh? Is that so? Ah, then it must have been a simple partnership."
84304200200-100 = "I am so sorry for the misunderstanding. I thought you two were friends. "
84304200200-101 = "Haha, but of course. It makes sense. Who in the world..."
84304200200-102 = "...would WANT to join up with the likes of her? Am I right?"
84304200200-103 = "You said it, not me."
84304200200-104 = "Anyway, that's not what's important! Back on topic, those people you've captured are allies of mine. We all worked together on this project."
84304200200-105 = "And even if they are captured, we are under contract to do this together."
84304200200-106 = "Leaving them high and dry just wouldn't be good business. Unlike SOME people I could name, I understand that."
84304200200-110 = "...What was that...?"
84304200200-111 = "What's that sound? Something's beeping..."
84304200200-116 = "*gasp* Bomb!!"
84304200200-122 = "*cough* *cough*...!! When did she plant a bomb here?!"
84304200200-123 = "Now's your chance!! Everyone! Retreat!!"
84304200200-128 = "*gasp* Hey!! Get up, get up!! We've got to run!!"
84304200200-132 = "H-Hm?! Huh...?! An explosion?!"
84304200200-133 = "That scared me...!! Huh? Did I faint?"
84304200200-134 = "Forget all that! Run!!"
84304200200-139 = "They're playing dirty...!!"
84304200200-140 = "Stop right there!!"

[translation]
84304200200-5 = "เอาละ เท่านี้ก็ถือว่าเคลียร์สถานการณ์ได้ระดับหนึ่งแล้ว..."
84304200200-7 = "อึก..."
84304200200-8 = "นะ... นี่มันอะไรกัน... แกเป็นใครน่ะ...!"
84304200200-9 = "แกเป็นใครกันแน่...!!"
84304200200-17 = "เฮือก..."
84304200200-19 = "ใช้คำพูดซ้ำซากกันจังแฮะ พวกแกนี่มีสถาบันที่สอนพูดอะไรแบบนี้ด้วยหรือไง?"
84304200200-20 = "อีกอย่าง พวกที่ถูกอัดจนหน้าหงายมีสิทธิ์มาถามอะไรแบบนี้ด้วยเหรอ? ฉันควรจะเป็นฝ่ายที่ถามก่อน#nมากกว่านะ?"
84304200200-21 = "พวกแกเป็นใคร? ทำไมถึงเข้ามาทำลายงานของโรงเรียนอื่นกันแบบนี้?"
84304200200-27 = "ชีวิตพวกแกขึ้นอยู่กับคำตอบนี่ละ..."
84304200200-32 = "พะ... พวกเราไม่ได้มีเจตนาร้ายนะคะ! พวกเราไม่มีความแค้นใจอะไรกับโรงเรียนนี้ด้วยค่ะ!"
84304200200-33 = "ใช่ค่ะ นี่ก็แค่งานพาร์ทไทม์ เราถูกจ้างมาอีกทีน่ะ...!!"
84304200200-35 = "ถูกจ้างมางั้นเหรอ...? "
84304200200-36 = "แล้วใครเป็นคนจ้างมา? ทางนั้นบอกว่าให้มาทำอะไร?"
84304200200-38 = "เอ่อ... เรื่องนั้นบอกไม่ได้หรอกค่ะ ถ้าบอกไป จะเป็นการเสียจรรยาบรรณลูกจ้าง..."
84304200200-46 = "งั้นเธอก็บอกมา"
84304200200-47 = "เฮือกกกกก!!"
84304200200-48 = "ไม่รู้ค่ะ ฉันไม่รู้จริงๆ ค่ะ!! พวกฉันก็ไม่รู้อย่างแน่ชัดว่าคนคนนั้นตั้งใจจะทำอะไรค่ะ!"
84304200200-49 = "พวกฉันก็แค่รับงานผ่านโทรศัพท์ แล้วทำตามที่สั่งเพื่อให้ได้เงินเท่านั้น...!!"
84304200200-55 = "อ๊ะ มีสายเข้าพอดี"
84304200200-56 = "ควรรับมั้ยคะ...?"
84304200200-57 = "เปิดลำโพงเลย"
84304200200-64 = "อ่า... อ่า ฮัลโหล? ได้ยินมั้ยคะ?"
84304200200-65 = "สัญญาณไม่ดีหรือเปล่านะ... เป็นยังไงบ้างคะ? งานราบรื่นดีหรือเปล่า?"
84304200200-66 = "อ่า... เอ่อ... อื้อ งานที่ฟิตเนสเซ็นเตอร์เสร็จแล้ว จะจ่ายค่าจ้างได้หรือยัง?"
84304200200-67 = "อ่า แน่นอนสิคะ! โธ่ พวกคุณคงเหนื่อยกันแย่เลยนะคะ! ฉันจะโอนเงิน..."
84304200200-68 = "อ๊ะ...!"
84304200200-69 = "จะว่าไป ยังมีงานเหลืออีกงานนะคะ พวกคุณจะทำงานนั้นให้ด้วยได้มั้ยล่ะคะ?"
84304200200-70 = "แน่นอนว่าฉันจะจ่ายค่าจ้างงานนั้นให้ด้วยค่ะ!"
84304200200-71 = "หืม!? เหลืออีกงานเหรอ...? ทะ... ทำไมล่ะ...? ไม่ใช่ว่าหมดแล้วหรอกเหรอ?"
84304200200-72 = "ปกติเวลาจะทำสิ่งที่ยิ่งใหญ่ ก็จะเกิดปัญหานู่นนี่แบบนี้ละค่ะ..."
84304200200-73 = "มะ... ไม่เอาหรอก พวกเราขอพอแค่นี้! โอนเงินค่าจ้างมาเฉพาะงานที่เราทำก็พอ โอนมาตอนนี้เลย!!"
84304200200-74 = "...????"
84304200200-75 = "เอ๋? แปลกจังเลยนะคะ พวกคุณไม่น่ามีท่าทีแบบนี้นี่นา? ฉันคิดว่าพวกคุณจะดีใจที่ได้งานเสียอีก"
84304200200-76 = "งานที่สั่งมันเกินกำลังพวกคุณเหรอคะ? หรือว่าจู่ๆ ก็มีนัดสำคัญขึ้นมา?"
84304200200-77 = "ถ้ายังไม่ใช่อีกละก็..."
84304200200-79 = "หรือว่าพวกคุณถูกศัตรูจับได้ ก็เลยรู้สึกไม่อยากทำเรื่องไม่ดีต่อหน้าพวกเขาคะ?"
84304200200-80 = "...!!!"
84304200200-81 = "...!"
84304200200-82 = "โธ่ ตายจริง ดูทำเข้าสิ... ฉันแค่ลองๆ ถามเฉยๆ แต่กลับเป็นเรื่องจริงเสียอย่างนั้น?"
84304200200-83 = "ฉันเองก็เสียใจนะคะ... แต่พวกคุณรู้ใช่มั้ยคะ? ที่ระบุไว้ในสัญญาของพวกเราน่ะ... กรณีที่เกิดความผิด#nพลาดหรือถูกจับได้ระหว่างปฏิบัติงาน..."
84304200200-84 = "จะถือว่าสัญญาสิ้นสุดลงเพราะละเมิดข้อตกลงเรื่องการรักษาความลับ แล้วค่าจ้างก็... จะไม่ได้รับค่ะ"
84304200200-85 = "วะ... ว่าไงนะ!? ได้ยังไงกัน...! พวกเราต้องเหนื่อยกันแค่ไหนรู้มั้ย!!"
84304200200-86 = "ก็นั่นน่ะสิคะ ฉันถึงได้บอกว่าน่าเสียใจยังไงล่ะคะ พวกคุณไม่ควรถูกจับได้เลยแท้ๆ"
84304200200-87 = "แต่ก็ไม่ต้องกังวลไปนะคะ ฉันก็ไม่ใช่คนใจไม้ไส้ระกำ ก็เลยว่าจะให้โอกาสพวกคุณอีกครั้งน่ะค่ะ"
84304200200-88 = "ตามสัญญาแล้ว ทางฉันสามารถยุติการจ้างได้เลย... แต่พวกคุณก็คงเหนื่อยกันมาไม่ใช่น้อยอย่างที่#nบอกใช่มั้ยล่ะคะ"
84304200200-89 = "จะสื่อว่าอะไรกันแน่..."
84304200200-90 = "อ้อ แน่นอนว่านี่ก็เป็นเงื่อนไขที่ค่อนข้างยากเลยค่ะ งานนี้ไม่ง่ายค่ะ"
84304200200-91 = "ใช่มั้ยล่ะคะ? ถ้าการคาดเดาของฉันถูกต้องละก็ ตอนนี้คนที่จับตัวพวกคุณอยู่คงเป็นมิคาโมะ เนรุจาก C&C"
84304200200-93 = "...!!!"
84304200200-94 = "รู้ได้ยังไงน่ะ"
84304200200-95 = "ฮ่าฮ่า ถ้าทำงานแบบนี้ไปเรื่อยๆ เรื่องแบบนี้ต้องรู้อยู่แล้วค่ะ ก็ทางนั้นเป็นคนดังนี่คะ"
84304200200-96 = "แต่จะว่าไป ฉันนึกว่าคุณจะวางมือจากเรื่องแบบนี้แล้วเสียอีก แต่ดูท่าทางแล้ว มิคาโมะ เนรุยังทำงาน#nเป็นมือขวาให้ประธานสึคัตสึกิ ริโอะอยู่สินะคะ"
84304200200-97 = "ว่าไงนะ...?"
84304200200-98 = "เดี๋ยวก่อน พูดอะไรน่ะ? ฉันไม่เคยเป็นมือขวาให้ใครหรอกนะ?"
84304200200-99 = "หืม? งั้นเหรอคะ? อ้อ สงสัยจะแค่ร่วมงานกันเฉยๆ สินะคะ"
84304200200-100 = "ตายจริง สงสัยฉันจะคิดผิดไปน่ะค่ะ ต้องขอโทษด้วยนะคะ ฉันคิดว่าคุณกับคนคนนั้นเป็นเพื่อนกันเสีย#nอีกค่ะ "
84304200200-101 = "ฮ่าฮ่า นั่นสินะคะ ก็คงจะเป็นอย่างนั้นนะคะ ในโลกนี้คงไม่มีใคร..."
84304200200-102 = "อยากอยู่ฝ่ายเดียวกับคนแบบนั้นหรอกค่ะ ใช่มั้ยล่ะคะ?"
84304200200-103 = "ฉันไม่เคยพูดถึงขนาดนั้นนะ"
84304200200-104 = "เอาเถอะค่ะ ตอนนี้เรื่องแบบนั้นไม่ใช่สิ่งสำคัญหรอก! พวกคนที่อยู่ตรงนั้นน่ะ... เห็นอย่างนั้นก็เป็น#nเพื่อนร่วมงานที่มาทำงานกับฉันในครั้งนี้"
84304200200-105 = "ถึงจะถูกจับตัวไว้ แต่ยังไงเราก็เป็นหุ้นส่วนทางสัญญากัน"
84304200200-106 = "จะให้ทิ้งไว้อย่างนั้นเลยก็ไม่ได้... ทำแบบนั้นคงไม่ดีเท่าไรในทางธุรกิจน่ะ ก็ฉันไม่เหมือนกับใครบางคน#nนี่คะ"
84304200200-110 = "เสียงนี้มัน...?"
84304200200-111 = "หืม? อะไรน่ะ เสียงนี้? เหมือนเสียงจับเวลาเลย..."
84304200200-116 = "ระเบิด...!!"
84304200200-122 = "แค่ก แค่ก...!! เอาระเบิดมาไว้ในที่แบบนี้ตั้งแต่เมื่อไร...!!"
84304200200-123 = "ใช้จังหวะนี้ละค่ะ!! ทุกคน! ถอนกำลังออกมาค่ะ!!"
84304200200-128 = "นี่ นี่...!!! ฟื้นสิ ฟื้น!! รีบหนีกันเร็ว!!"
84304200200-132 = "หะ... หืม?? เอ๋...?! มีระเบิดงั้นเหรอ!?"
84304200200-133 = "ตกใจหมดเลย...!! เมื่อกี้ฉันสลบไปเหรอ?"
84304200200-134 = "นี่ไม่ใช่เวลาจะมาพูดแบบนี้นะ! หนีกันก่อนเถอะน่า!!!"
84304200200-139 = "ยัยพวกนี้นี่ ใช้จังหวะนี้หนีเรอะ...!!!"
84304200200-140 = "หยุดเดี๋ยวนี้นะ!!"

[translation]
10042080-1 = "ตอนที่ 8;ผลที่น่าพอใจ"
10042080-2 = "ผลก็คือ..."
10042080-3 = "กำจัดได้อยู่หมัดแล้วยังน่ะ...?"
10042080-4 = "อ่า จะพูดอย่างนั้นได้หรือยังนะ..."
10042080-8 = "เอาละ! ฉันจะไปดูตรงนั้นให้เอง!"
10042080-9 = "คุณครูไปสแตนด์บายข้างหลังไว้ก่อน!"
10042080-13 = "ตรงนี้ให้เป็นหน้าที่ของฉันเองค่ะ!"
10042080-15 = "อะ... อึก..."
10042080-16 = "พบสมาชิกชมรมโภชนาการหนึ่งคน! แล้วก็..."
10042080-18 = "..."
10042080-19 = "อ่า... อาโกะจังที่นอนหมดสติอยู่ในสภาพซอสสีเขียวท่วมตัว แล้วก็..."
10042080-25 = "ถ้ามองแบบนี้ก็ตัวเล็กนิดเดียว แต่ทำไมเมื่อกี้ถึงตัวใหญ่ยักษ์ได้ขนาดนั้นนะ..."
10042080-30 = "ขอรายงานเป็นครั้งสุดท้าย แพนเค้กกลับมาอยู่ในขนาดปกติแล้ว"
10042080-34 = "[ns] \"เป็นยังไงบ้าง อิโอริ?! แพนเค้กนั่นไม่อันตรายเหรอ?\""
10042080-35 = "ตอนนี้มันไม่ขยับตัวแล้วละ"
10042080-36 = "ไม่รู้ว่าฉันใช้คำนี้ได้หรือเปล่า... แต่มันน่าจะสลบไปแล้วน่ะ"
10042080-38 = "..."
10042080-39 = "..."
10042080-40 = "นี่ อาโกะจัง? เอ่อ... คือว่า..."
10042080-41 = "อยู่เฉยๆ กันเลยค่ะ คนอื่นเป็นยังไงฉันไม่รู้ แต่ฉันยังสะสางไม่เสร็จค่ะ"
10042080-42 = "อึก"
10042080-43 = "กล้าดีชะมัด... กล้าดียังไงถึงมาทำกับฉันอย่างนี้คะ?"
10042080-44 = "ทั้งม้วน พัน ปล่อยเมือกเหนียวหนืดออกมา แล้วเอาหนวดมา... อุดปากฉันอีก... อึก...!"
10042080-45 = "ปากฉันสกปรกหมดแล้ว... สกปรกหมดเลย...!"
10042080-46 = "[s1] \"อะ... อาโกะ? โอเค... หรือเปล่า?\"\n[s2] \"ก็แค่ซอสแพนเค้กเปื้อนเฉยๆ น่ะ...\""
10042080-49 = "ไม่ต้องพูดอะไรทั้งนั้นค่ะ! ฉันกับเจ้าแพนเค้กยักษ์นั่น..."
10042080-50 = "จะได้เห็นดีกัน...!!"
10042080-51 = "อาโกะจัง?! ระวังด้วย!"
10042080-57 = "ฮะ...!? เฮือกกก!?!?"
10042080-58 = "อุ้บบบบบ?!?! อุ้บ!?!?"
10042080-59 = "[ns3] \"อ๊ะ! เข้าหน้าอาโกะเลย...!\"\n[ns4] \"โดนโถมใส่เหมือนตอนอิโอริเลย!!!\""
10042080-65 = "อึก... รู้สึกเดจาวูยังไงไม่รู้..."
10042080-66 = "ซอสนั่นรสชาติแย่มากเลยด้วย..."
10042080-70 = "แต่ตอนนี้มันเหมือนจะสงบลงอีกครั้งแล้วนะ...?"
10042080-71 = "แพนจัง..."
10042080-72 = "ใช่แล้วค่ะ ที่ผ่านมาเกิดเรื่องขึ้นเยอะเลย..."
10042080-73 = "ความผิดพลาดของฉันทำให้มีคนได้รับบาดเจ็บเต็มไปหมด และในตอนแรกฉันก็ไม่รู้ว่าควรทำยังไง"
10042080-74 = "แต่ตอนนี้สถานการณ์ก็คลี่คลายได้อย่างปลอดภัย และแพนจังก็กลับมาเป็นเหมือนเดิมแล้ว...!"
10042080-75 = "อื้อ นั่นสินะ"
10042080-76 = "ในเมื่อกลับมาตัวเล็กเหมือนเดิมแล้ว..."
10042080-85 = "อ๊ะ?!"
10042080-86 = "[s5] \"เอาแพนจังไปทิ้งถังขยะเลยเหรอ...!\"\n[s6] \"โยนแพนจังลงถังขยะเศษอาหารเลยเหรอ...!\""
10042080-89 = "ก็อาหารที่ออกมาจากกระทะแล้วตกพื้นแล้ว ถือว่าไม่ถูกสุขอนามัย ฉันก็ควรเอาไปทิ้งสิ"
10042080-90 = "อะ... เอางั้นเลยเหรอ...! ตะ... แต่ก็เข้าใจได้ค่ะ...!!"
10042080-91 = "ถูกต้องจนฉันเถียงไม่ออกเลยค่ะ"
10042080-92 = "..."
10042080-94 = "งั้นก็ถือว่า... ทุกอย่างจบแล้วใช่มั้ยคะ?"
10042080-95 = "คงเป็นอย่างนั้นละ หรืออยากให้มันกลับมาตัวใหญ่แล้วเพ่นพ่านไปทั่วอีกรอบล่ะ?"
10042080-96 = "บอกตามตรงเลยนะ ฉันไม่อยากเจอความวุ่นวายไปมากกว่านี้แล้ว..."
10042080-100 = "[ns] \"วันนี้มีแต่เรื่องน่าทึ่งนะ...\""
10042080-101 = "น่าทึ่งตรงไหนกัน...! ฉันไม่ยกโทษให้เด็ดขาด!!"
10042080-102 = "อาโกะจัง? ฟื้นแล้วเหรอ?"
10042080-103 = "ฟื้นเฟิ้นอะไรกันคะ! ใครมาได้ยินคงคิดว่าฉันตายไปจริงๆ แล้วหรอกค่ะ! แล้ว... แพนจังหรืออะไรนั่น ตอนนี้เป็นยังไงแล้วคะ?!"
10042080-104 = "อ่า... ถ้าแพนจังลงไปอยู่ในถังขยะเศษอาหาร ก็จะขยับเขยื้อนไม่ได้แล้วค่ะ..."
10042080-105 = "..."
10042080-106 = "ถ้างั้นก็ค่อยยังชั่วอยู่หรอก..."
10042080-107 = "แต่ความโกรธของฉันล่ะ ทีนี้จะเอาไประบายที่ไหนดี...?"
10042080-108 = "[s7] \"ห่วงเรื่องเนื้อตัวกับเสื้อผ้าก่อนดีกว่ามั้ย อาโกะ?\"\n[s8] \"ครูว่า... ไปอาบน้ำแทนการระบายความโกรธมั้ย?\""
10042080-111 = "!!!!!"
10042080-113 = "จริงๆ เลย! ทุกอย่างมัน!!! แย่ไปหมดเลยค่ะ!!!!!"
10042080-117 = "[log]แล้วเรื่องของแพนจังที่ทำให้สถาบันเกเฮนน่าต้องเผชิญความปั่นป่วนเล็กๆ น้อยๆ#nก็คลี่คลายลงได้หลังจากทิ้งความวุ่นวายต่างๆ ไว้เบื้องหลัง[/log]"
10042080-120 = "[log]ขอย้ำอีกครั้งว่า คำว่า 'ความปั่นป่วนเล็กๆ น้อยๆ' ที่ว่า#nใช้ได้กับในสถาบันเกเฮนน่าเท่านั้น...[/log]"
10042080-123 = "[log]ไม่กี่วันต่อมา[/log]"
10042080-127 = "ห้องครัว โรงอาหารเกเฮนน่า"
10042080-128 = "จูริ! หัวหอม! เตรียมหัวหอมเสร็จหรือยัง?"
10042080-129 = "ค่ะ รุ่นพี่! ฉันหั่นไว้ให้หมดแล้วค่ะ!"
10042080-130 = "งั้นระหว่างที่ฉันผัดหัวหอม ก็ฝากมันฝรั่งกับแคร์รอตด้วยนะ!"
10042080-131 = "ได้ค่ะ! ต้องผัดหัวหอมก่อนเพื่อเอาน้ำออกและเพิ่มความหวานสินะคะ!"
10042080-132 = "ก็เมนูวันนี้คือสตูว์เนื้อกับมันฝรั่งนี่!"
10042080-134 = "โรงอาหารเกเฮนน่า"
10042080-135 = "นี่~ ทำไมสตูว์เนื้อกับมันฝรั่งวันนี้มันจืดจัง~?"
10042080-136 = "อุตส่าห์ดีใจว่าจะได้กินเนื้อวัว แต่ดันเป็นเนื้อหมูซะงั้น แบบนี้น่าผิดหวังอยู่หน่อยนะ"
10042080-137 = "ฉันชอบแบบที่ใส่เส้นบุกด้วย แต่เหมือนจะไม่มีนะ..."
10042080-138 = "ไม่ใส่ผักดองให้เหรอ? แบบนี้มันก็ขาดอะไรไปน่ะสิ แล้วจะพอกินได้ยังไง"
10042080-139 = "ค่ะ เมนูอาหารกลางวันของวันนี้ก็อาหารบ้านๆ อย่างสตูว์เนื้อกับมันฝรั่งสินะคะ"
10042080-140 = "งั้นหัวข้อสำรวจของชมรมชิมอาหารในวันนี้ก็ต้องยกให้ 'สตูว์เนื้อกับมันฝรั่ง'"
10042080-141 = "เราจะมาสำรวจว่ากินแล้วจะให้อารมณ์คิดถึงบ้านมากแค่ไหนค่ะ"
10042080-142 = "มีแต่เรื่องให้ปวดหัวทุกวันเลย!!!"
10042080-144 = "เฮ้อ... ในที่สุดวันนี้ก็จบลงสักที..."
10042080-145 = "เหนื่อยแย่เลยนะคะ รุ่นพี่..."
10042080-146 = "มันก็เป็นอย่างนี้อยู่ทุกวันนั่นละ ทำงานในครัวจนตัวเป็นเกลียว หัวเป็นน็อต"
10042080-147 = "แต่บ่นไปก็ใช่ว่าจะมีใครมาช่วยอะไรหรอก...!"
10042080-148 = "ขอโทษค่ะ รุ่นพี่ ถ้าฉันทำงานได้ดีกว่านี้..."
10042080-149 = "ไม่หรอก จูริ ตอนนี้จูริก็ทำได้ดีแล้วละ แค่มีจูริ ฉันก็หายเหนื่อยไปได้เยอะเลย"
10042080-150 = "พอมาคิดๆ ดูแล้ว ถ้าไม่มีจูริสักคน ฉันก็จินตนาการไม่ออกเลยว่าชมรมโภชนาการของเราจะไปรอด#nหรือเปล่า..."
10042080-151 = "ได้ยินแบบนั้นฉันก็ดีใจและขอบคุณนะคะ แต่ฉันก็รู้สึกเศร้าในเวลาเดียวกันด้วย..."
10042080-156 = "[ns] \"สวัสดี จูริ! ฟูกะ! วันนี้ก็เหนื่อยแย่เลยนะ!\""
10042080-157 = "อ๊ะ คุณครู!"
10042080-158 = "คุณครู! เอ๋? มะ... ไม่เห็นต้องลำบากซื้อของพวกนี้มาเลย..."
10042080-159 = "คะ? รู้ว่าพวกฉันทำงานหนักกัน ก็เลยแวะเอาเครื่องดื่มมาให้งั้นเหรอคะ...?"
10042080-160 = "ขอบคุณค่ะ... คุณครู โชคดีจริงๆ เลยนะคะที่พวกฉันมีคุณครู"
10042080-161 = "คุณครูก็ดื่มด้วยกันสิคะ! ฉันจะไปเอาแก้วมาให้เองค่ะ!"
10042080-162 = "ว่าแต่พอมีอะไรที่กินด้วยกันได้มั้ยนะ..."
10042080-167 = "..."
10042080-168 = "เอ่อ รุ่นพี่? คุณครู?"
10042080-169 = "ถ้าไม่ว่าอะไรละก็... ที่จริงฉันเตรียมอะไรเอาไว้นิดหน่อย..."
10042080-170 = "ตะ... แต่ว่าถ้ากังวล ไม่สบายใจ หรือว่ารู้สึกกลัว ก็บอกกับฉันตามตรงได้เลยค่ะ...!"
10042080-171 = "ของที่จูริเตรียมไว้งั้นเหรอ?"
10042080-172 = "..."
10042080-173 = "อื้อ ฉันก็อยากเห็นเหมือนกันนะ มันคืออะไรเหรอ?"
10042080-174 = "[s] \"ครูด้วย ครูด้วย!\""
10042080-175 = "จะ... จริงเหรอคะ? จะไม่เป็นไร... จริงๆ เหรอคะ?"
10042080-176 = "งั้นช่วยรอสักครู่นะคะ!"
10042080-188 = "เอ๋? นี่มัน... แพนเค้กนี่นา? แล้วก็ดูน่าอร่อยมากด้วย?"
10042080-189 = "[ns] \"แพนเค้กฝีมือจูริเหรอเนี่ย?\""
10042080-190 = "ค่ะ แหะๆๆ... วันที่ฉันไปทำงานพาร์ทไทม์ที่คาเฟ่ ฉันได้เรียนรู้อะไรมาเยอะเลยค่ะ"
10042080-191 = "ครั้งนี้ฉันก็เลยพยายามอย่างหนัก... จนได้ออกมาเป็นแพนเค้กจานนี้ค่ะ"
10042080-192 = "ถ้าไม่รังเกียจละก็... ลองชิมดูมั้ยคะ?"
10042080-193 = "..."
10042080-197 = "คุณครู?"
10042080-198 = "[s] \"อื้อ เรามากินด้วยกันเถอะ!\""
10042080-199 = "ค่ะ คุณครู เอ้า จูริก็ด้วย"
10042080-200 = "ขะ... ขอบคุณค่ะ!"
10042080-201 = "ขอบคุณ... จริงๆ นะคะ..."
10042080-203 = "(แล้วทุกคนก็กินแพนเค้กของจูริด้วยกัน)"
10042080-204 = "(แพนเค้กของจูริแตกต่างกับแพนเค้กทั่วไปอยู่เล็กน้อย)"
10042080-205 = "(แต่ก็สัมผัสได้ว่าเต็มไปด้วยความพยายาม...)"
10042080-206 = "(และ 'ความรัก' ที่ชัดเจนของจูริอยู่ในนั้น)"
10042080-209 = "มหันตภัยเขย่าโลก~ เรื่องพิศวงของแพนเค้ก~"

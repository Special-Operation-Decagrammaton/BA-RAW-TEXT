[translation]
10042080-1 = "第8話;結果"
10042080-2 = "結果究竟……"
10042080-3 = "……成功了嗎？"
10042080-4 = "啊，現在說那句台詞有點危險哦……"
10042080-8 = "交給我吧！我來確認現場！"
10042080-9 = "為了以防萬一，請老師在後面待命！"
10042080-13 = "這裡交給我！"
10042080-15 = "唔，唔唔……！"
10042080-16 = "發現一名供給部成員！#n然後下一個是……"
10042080-18 = "……"
10042080-19 = "呃……發現滿身綠色醬汁，失去意識的亞子醬了。#n還有……"
10042080-25 = "現在看起來明明很小，沒想到居然能長那麼大……"
10042080-30 = "最終回報，發現恢復原本大小的個體。"
10042080-34 = "[ns]「你沒事吧，伊織！？會不會有危險？」"
10042080-35 = "它現在已經停止行動了。"
10042080-36 = "雖然不曉得這樣說對不對，不過它……大概是昏過去了吧。"
10042080-38 = "……"
10042080-39 = "……"
10042080-40 = "那個，亞子醬？#n就是……"
10042080-41 = "什麼話都別說。#n你們可能已經覺得沒事了，但對我來說事情還沒完。"
10042080-42 = "呃。"
10042080-43 = "這種東西……竟敢把我搞得這麼慘？"
10042080-44 = "不只把我纏住，綁住，害我全身沾滿黏答答的液體……#n甚至還用觸手把我的嘴巴……嘔嘔嘔……！"
10042080-45 = "我被弄髒了……被弄髒了啦……！"
10042080-46 = "[s1]「亞，亞子？你還好嗎……？」\n[s2]「那只是鬆餅的醬汁啦……」"
10042080-49 = "什麼話都別說！我和那傢伙之間的勝負……"
10042080-50 = "現在才正要開始……！！"
10042080-51 = "亞子醬，小心！"
10042080-57 = "什……！？唔唔！？"
10042080-58 = "嗯唔唔唔──！？！？噗唔──！？！？"
10042080-59 = "[ns3]「啊啊！亞子的臉……！」\n[ns4]「就跟伊織那時候一樣被完全蓋住了！！！」"
10042080-65 = "唔哇……不禁有種既視感……"
10042080-66 = "那個醬汁的味道真的很讓人反胃……"
10042080-70 = "不過它現在好像又安分下來了呢……？"
10042080-71 = "餅醬……"
10042080-72 = "雖然發生了很多事……"
10042080-73 = "一開始發現因為我的錯誤導致很多人受傷的時候，我實在不知道該如何是好。"
10042080-74 = "不過既然事件已經順利落幕，餅醬也恢復原狀的話……！"
10042080-75 = "……嗯，就是說啊。"
10042080-76 = "既然它已經恢復原狀了，現在就該……"
10042080-85 = "啊啊！？"
10042080-86 = "[s5]「風華把餅醬……！」\n[s6]「丟進不知道從哪冒出來的廚餘桶裡了！」"
10042080-89 = "食物從鍋子裡逃出來，還在地上到處亂爬……這樣很不衛生，當然得丟掉才行。"
10042080-90 = "這，這……！確實是這樣沒錯……！！"
10042080-91 = "是完全無法反駁的正確觀念呢。"
10042080-92 = "…………"
10042080-94 = "那麼……一切都結束了嗎？"
10042080-95 = "沒錯，就算它不結束也得結束。"
10042080-96 = "老實說，我實在不想再遇到這種騷動了……"
10042080-100 = "[ns]「從各方面來說，今天都是難忘的大日子呢……」"
10042080-101 = "什麼大日子……！不可原諒！！"
10042080-102 = "亞子醬？你復活了嗎？"
10042080-103 = "不要用「復活」這個字眼好不好！這樣別人會以為我真的死過耶！#n那個……叫什麼餅醬的最後怎麼樣了！？"
10042080-104 = "餅醬它……在被丟進廚餘桶之後就不動了。"
10042080-105 = "……"
10042080-106 = "雖然是件值得慶幸的好事……"
10042080-107 = "……但我這滿腔的怒火，不就沒地方發洩了嗎？"
10042080-108 = "[s7]「話說亞子你真的沒事嗎？身體和衣服都……」\n[s8]「你是不是……應該先去洗個澡？」"
10042080-111 = "！！！！！"
10042080-113 = "真是的！今天真是糟透了！！！！！"
10042080-117 = "[log]就這樣，讓格黑娜學園略顯波瀾的餅醬事件，在喧鬧聲中平安落幕。[/log]"
10042080-120 = "[log]當然所謂的「略顯」，自然是以格黑娜的標準而言……[/log]"
10042080-123 = "[log]幾天後[/log]"
10042080-127 = "格黑娜．供餐廚房"
10042080-128 = "茱莉！洋蔥準備好了嗎？"
10042080-129 = "是，前輩！已經全都切好了！"
10042080-130 = "那我炒洋蔥的時候，就麻煩你處理馬鈴薯和紅蘿蔔了！"
10042080-131 = "嗯！要先把洋蔥的水分炒乾，讓洋蔥釋放出甜味對吧！"
10042080-132 = "今天的菜單是馬鈴薯燉肉！"
10042080-134 = "格黑娜．食堂"
10042080-135 = "那個～這個馬鈴薯燉肉，味道好像有點淡耶？"
10042080-136 = "我本來還期待會有牛肉的說，結果居然是豬肉……好失望哦。"
10042080-137 = "好像沒有放我喜歡的蒟蒻絲……"
10042080-138 = "醃菜就只有這麼一點嗎？份量有點不夠吧。"
10042080-139 = "嗯。今天的午餐是家常的馬鈴薯燉肉啊。"
10042080-140 = "那麼今天美食研究會的研究主題，就訂為馬鈴薯燉肉吧。"
10042080-141 = "裡面究竟蘊含著多麼深厚的家常滋味呢。"
10042080-142 = "為什麼連羽留奈也在啦！！！"
10042080-144 = "唉……今天也總算結束了……"
10042080-145 = "辛苦了，前輩……"
10042080-146 = "就是說啊，這裡總是這樣。#n不只行程緊湊，該用心的地方又不能馬虎……"
10042080-147 = "而且還沒有人會體諒……！"
10042080-148 = "對不起，前輩。#n要是我能幫上更多忙的話……"
10042080-149 = "別這麼說，茱莉。你已經做得很好了。#n光是有茱莉在這裡，就已經幫了我很大的忙。"
10042080-150 = "要是沒有茱莉的話，我根本無法想像供給部該怎麼經營下去……"
10042080-151 = "雖然前輩這麼說讓我既開心又感謝，卻也有點難過呢……"
10042080-156 = "[ns]「嗨，茱莉！風華！辛苦了！」"
10042080-157 = "啊，老師……！"
10042080-158 = "老師……咦？#n其，其實不用買這種東西過來的……"
10042080-159 = "嗯？知道我們很辛苦，所以帶喝的來慰勞我們……？"
10042080-160 = "……謝謝你，老師。#n有老師陪在我們身邊真是太好了。"
10042080-161 = "老師也一起喝吧！我去拿三個杯子過來！"
10042080-162 = "話說，有沒有什麼可以配飲料的……"
10042080-167 = "……"
10042080-168 = "那個……前輩、老師。"
10042080-169 = "如果可以的話……#n其實我剛才準備了一些東西……"
10042080-170 = "當，當然如果你們覺得不放心或害怕的話，我也完全可以理解……！"
10042080-171 = "茱莉準備的東西？"
10042080-172 = "……"
10042080-173 = "嗯，那我也想看看呢。#n你準備了什麼呢？"
10042080-174 = "[s]「我也要看，我也要看！」"
10042080-175 = "真，真的嗎？#n真的……沒關係嗎？"
10042080-176 = "那麼請稍等一下！"
10042080-188 = "咦？這是……鬆餅？而且看起來超好吃的耶？"
10042080-189 = "[ns]「這真的是茱莉做的嗎？」"
10042080-190 = "耶嘿嘿……那天在咖啡廳打工的時候，我趁機學了一點東西。"
10042080-191 = "這次我真的很用心……總算是成功了。"
10042080-192 = "如果可以的話……你們願意嚐嚐看嗎？"
10042080-193 = "……"
10042080-197 = "老師？"
10042080-198 = "[s]「好，我們一起吃吧！」"
10042080-199 = "嗯，老師。#n來，茱莉也一起吃吧。"
10042080-200 = "謝，謝謝！"
10042080-201 = "真的……很感謝你們……"
10042080-203 = "（就這樣，大家一起和睦地享用茱莉的鬆餅）"
10042080-204 = "（雖然味道的確有點微妙，和普通鬆餅略有不同……）"
10042080-205 = "（不過毫無疑問的是，裡面飽含了茱莉的用心……）"
10042080-206 = "（以及滿滿的「愛」）"
10042080-209 = "瘟疫危機～奇蹟的鬆餅～"

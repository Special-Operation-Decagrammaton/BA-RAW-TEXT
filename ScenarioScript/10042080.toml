10042080-138 = "Are there any more of those vegetable pickles? I can never get enough of them."
10042080-139 = "Well, today's lunch menu is the meat-and-potato stew, the most homey of all dishes."
10042080-140 = "For today, the research subject of the Gourmet Society is that very dish."
10042080-141 = "And how much of it can contain the feeling of home."
10042080-142 = "You really shouldn't be doing all of this here!"
10042080-144 = "*sigh* Another day done..."
10042080-145 = "Good work today, Fuuka..."
10042080-146 = "It's always like this. My work is never really done."
10042080-147 = "And it's not like anyone out there appreciates it either..."
10042080-148 = "I'm sorry. I wish I could help you out more..."
10042080-149 = "No, Juri. You're doing a fine job. Just having you here is a big help."
10042080-150 = "I can't even imagine how the School Lunch Club would ever get by without you..."

1002505-63 = "[s] \"겉보기에는 튼튼해 보이는데…….\""
1002505-64 = "3;꼬마 슌ND;17;아뇨. 슬라이드도 트램펄린과 마찬가지로 타보기 전까지는 확인할 수 없는 불안 요소가 많아요."
1002505-65 = "3;꼬마 슌ND;05;경사각이 너무 가파르면 안에서 넘어질 수도 있는 데다가, 표면에 날카로운 흠집이라도 나 있으면 큰일이니까요!\n#3;em;[!]"

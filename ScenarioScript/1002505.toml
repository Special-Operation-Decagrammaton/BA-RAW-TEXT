[translation]
1002505-1 = "因為是安全確認！"
1002505-2 = "奇普托斯中央區．室內遊樂場"
1002505-3 = "就是這裡啊……！"
1002505-4 = "原來如此，看起來確實有很多很有趣的遊樂設施！"
1002505-5 = "畫著可愛角色的彈跳床、大型球池……"
1002505-6 = "呵呵，看來應該能滿足梅花園的孩子們。"
1002505-7 = "來，老師。我們要先玩哪一個呢？"
1002505-8 = "[s] 「啊，果然還是要實際玩過嗎？」"
1002505-9 = "當，當然呀！畢竟用眼睛看和實際體驗是不一樣的！"
1002505-10 = "必須要親自確認才能知道，實際遊玩時器材會怎麼動，還有是不是真的有危險。"
1002505-12 = "……絕對不是因為我想玩！"
1002505-13 = "[s1] 「確實有道理。」\n[s2] 「機會難得，或許真的要認真玩才能明白這些。」"
1002505-14 = "（這，這反應，到底有沒有被說服啊……？）"
1002505-15 = "（這，這反應，到底有沒有被說服啊……？）"
1002505-16 = "那，那麼首先，從那邊的彈跳床開始吧？"
1002505-18 = "彈跳床乍看之下是個單純的遊樂設施，#n但因為利用了彈簧的彈性，相對容易讓人受傷。"
1002505-19 = "例如彈簧可能會因為耐久度不足而損壞，也可能因為彈性過強而將人彈到軟墊外。#n此外也可能在遊玩過程中夾到手，一有閃失就可能會嚴重受傷的。"
1002505-20 = "因此我們現在，要先來測試耐久度……"
1002505-26 = "……嗯，現在用手壓過後，感覺應該沒有問題。#n這樣就算同時有多名孩子上去玩應該也不會出事，設計上也不會夾傷手。"
1002505-27 = "接下來……就讓我實際遊玩看看吧。"
1002505-34 = "哇哇！彈好高喔……！？"
1002505-37 = "這個彈簧床的彈性比想像中更好……！"
1002505-38 = "啊哈，好厲害喔！感覺就像是飛起來了……！"
1002505-39 = "[s3] 「……旬？」\n[s4] 「你好像很開心呢。」"
1002505-40 = "啊，這是……！"
1002505-41 = "啊，這是……！"
1002505-42 = "沒，沒錯！站在小朋友們的立場來看，這確實很好玩！相信大家一定也能玩得開心……！"
1002505-47 = "嗯，實際遊玩下來應該是沒有問題了。"
1002505-48 = "真要挑毛病的話就是彈簧床太好玩了，小朋友們可能會不想馬上下來……"
1002505-49 = "[s] 「再繼續玩一下也沒關係吧？」"
1002505-50 = "不，不用顧慮我！我們不是來玩的！"
1002505-51 = "那麼接下來……我們去那個大型球池吧！"
1002505-53 = "大型球池是室內遊樂場中最寬敞的遊樂設施。"
1002505-54 = "充滿了五顏六色的球球，真可愛。呵呵……！"
1002505-55 = "啊……！"
1002505-57 = "老，老師，你看那個！有溜滑梯耶！"
1002505-58 = "好棒喔，可以從那麼高的地方滑溜滑梯下來飛進球池裡……！"
1002505-59 = "感覺一定很好玩！"
1002505-60 = "[s] 「去坐看看如何？」"
1002505-61 = "好的！畢竟原本的身體沒辦法遊玩那種遊樂設施……！"
1002505-62 = "啊，當，當然最主要的目的，是要幫梅花園的孩子們確認遊玩時是否安全！#n沒錯！這是我身為教官的職責！"
1002505-63 = "[s] 「外觀看起來很堅固，感覺應該沒什麼危險。」"
1002505-64 = "這可難說喔。溜滑梯也和彈簧床一樣，存在著沒有實際遊玩就不會發現的要素。"
1002505-65 = "例如角度沒設計好就可能會無法保持姿勢，#n或是滑道表面如果因損傷而露出尖銳的部分就糟了！"
1002505-66 = "那麼，為了確認安全性，我要去玩了！"
1002505-71 = "（旬踏著輕快的腳步，又跑又跳地爬上溜滑梯）"
1002505-73 = "太棒了！這個溜滑梯真好玩！"
1002505-74 = "坡度與彎度設計得相當巧妙，速度也讓人非常雀躍……！"
1002505-75 = "再，再玩一次……！"
1002505-76 = "[s] 「安全方面沒問題嗎？」"
1002505-78 = "啊，那個……因為速度有點太快了，還沒辦法完全掌握內部狀況……"
1002505-79 = "我要再去確認一次！安全上的確認不管做幾次都不嫌多……！"
1002505-80 = "況且也不知道以後還有沒有機會這樣玩……"
1002505-81 = "[s] 「是啊，不管玩幾次都可以，你就去慢慢確認吧。」"
1002505-82 = "唔唔唔……！"
1002505-83 = "老師你是不是在取笑我……！？"
1002505-85 = "（旬帶著彆扭的表情坐上滑梯之後臉上的表情馬上轉為笑容，最後玩了5次滑梯）"

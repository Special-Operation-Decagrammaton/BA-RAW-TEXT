1002505-57 = "3;꼬마 슌ND;13;서, 선생님, 저것 보세요! 초대형 볼풀 슬라이드예요!\n#3;em;[반응]"
1002505-58 = "3;꼬마 슌ND;13;천장부터 이어지는 파이프 라인을 꼬아 저렇게 복잡한 슬라이드를 만들다니……."

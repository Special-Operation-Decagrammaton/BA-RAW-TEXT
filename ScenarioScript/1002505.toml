[translation]
1002505-1 = "ตรวจสอบความปลอดภัยสนามเด็กเล่น"
1002505-2 = "สนามเด็กเล่นในอาคาร ส่วนกลางคิโวทอส"
1002505-3 = "ที่นี่คือสนามเด็กเล่นในอาคารที่เพิ่งเปิดใหม่สินะ..."
1002505-4 = "มีของเล่นกับอุปกรณ์น่าสนุกเยอะเหมือนที่เขาพูดกันเลยค่ะ"
1002505-5 = "ทั้งแทรมโพลีนลายตัวการ์ตูน แล้วก็บ้านบอลขนาดใหญ่ด้วย..."
1002505-6 = "ของพวกนี้ต้องถูกใจเด็กๆ สวนต้นบ๊วยแน่เลยค่ะ"
1002505-7 = "งั้นเราไปเล่นอะไรกันก่อนดีล่ะคะคุณครู?"
1002505-8 = "[s] \"จะลองเล่นเองเลยเหรอ?\""
1002505-9 = "ก็ใช่น่ะสิคะ! การได้เห็นกับลงมือเล่นเองมันต่างกันนะคะ!"
1002505-10 = "ฉันต้องตรวจสอบด้วยตัวเองว่าอุปกรณ์พวกนี้รุนแรงกับเด็กๆ หรือเปล่า แล้วก็ต้องดูด้วยว่ามัน#nปลอดภัยพอที่จะขึ้นไปเล่นสนุกได้มั้ยด้วยค่ะ"
1002505-12 = "ไม่ใช่ว่าฉันอยากเล่นเองหรอกนะคะ ไม่ใช่แบบนั้นนะคะ!"
1002505-13 = "[s1] \"ได้~ เอาที่สบายใจเลย\"\n[s2] \"ไหนๆ ก็ตัวเล็กลงแล้ว จะไปเล่นครูก็ไม่ว่าอะไรหรอก\""
1002505-14 = "(ทำไมทำหน้าเหมือนไม่เชื่อกันเลยล่ะ...)"
1002505-15 = "(ทำไมทำหน้าเหมือนไม่เชื่อกันเลยล่ะ...)"
1002505-16 = "งั้นเราไปดูแทรมโพลีนทางโน้นกันก่อนมั้ยคะ?"
1002505-18 = "ถึงแทรมโพลีนจะเป็นอุปกรณ์ง่ายๆ ที่ใช้ความยืดหยุ่นของสปริงในการทำให้คนกระโดดขึ้นได้#nแต่มันก็เป็นอุปกรณ์ที่ทำให้เจ็บตัวได้ง่ายเหมือนกันค่ะ"
1002505-19 = "ความไม่ทนทานอาจทำให้ลวดสปริงขาดได้ และหากยืดหยุ่นมากไปเด็กก็อาจจะตกลงมาจากพื้น#nและถ้าเป็นแบบนั้นเด็กคนอื่นที่ปีนไปข้างบนก็อาจจะได้รับบาดเจ็บสาหัสค่ะ"
1002505-20 = "งั้นเราต้องทดสอบความทนทานก่อน..."
1002505-26 = "อืม... ไม่น่าจะมีปัญหาอะไรนะคะ ถ้าทนทานแบบนี้ลวดสปริงก็คงไม่ขาดง่ายๆ ต่อให้มีเด็กๆ ขึ้นไป#nวิ่งเล่นพร้อมกันหลายคน"
1002505-27 = "งั้นต่อไปก็ต้องขึ้นไปบนพื้นเพื่อทดสอบความยืดหยุ่นค่ะ"
1002505-34 = "ว้าวว! โดดขึ้นได้สูงจังเลยค่ะ!"
1002505-37 = "แทรมโพลีนนี้มันยืดหยุ่นกว่าที่คิดอีก..."
1002505-38 = "เหมือนได้บินขึ้นฟ้าเลยค่ะ! อะฮ่ะฮ่า!"
1002505-39 = "[s3] \"ชุน...?\"\n[s4] \"ไม่ได้อยากไปเล่นเองจริงๆ ใช่มั้ย?\""
1002505-40 = "เฮือก...!"
1002505-41 = "เฮือก...!"
1002505-42 = "กะ... ก็แน่น่ะสิคะ! ฉันก็แค่ทดสอบดูเพราะรู้สึกเหมือนเป็นเด็กก็เท่านั้นเองค่ะ!"
1002505-47 = "อืม... งั้นเรื่องความยืดหยุ่นก็ไม่น่าจะมีอะไรให้กังวลเหมือนกันแล้วล่ะค่ะ"
1002505-48 = "แต่ว่าเด็กๆ อาจจะเล่นสนุกกับแทรมโพลีนจนไม่อยากลงมาก็ได้..."
1002505-49 = "[s] \"ถ้าชุนสนุกก็ไปเล่นอีกก็ได้นะ\""
1002505-50 = "ฉะ... ฉันไม่เป็นไรหรอกค่ะ ก็บอกแล้วไงคะว่าไม่ได้มาเล่น"
1002505-51 = "อืม... งั้นต่อไปก็บ้านบอลค่ะ!"
1002505-53 = "นี่คือบ้านบอลที่เป็นอุปกรณ์ขนาดใหญ่ที่สุดของสนามเด็กเล่นในอาคารแห่งนี้ค่ะ"
1002505-54 = "วัสดุก็นุ่มนิ่ม มีลูกบอลหลากสีด้วย น่ารักจังเลย..."
1002505-55 = "เอ๋...?"
1002505-57 = "คุณครูดูนั่นสิคะ! มีสไลเดอร์ขนาดใหญ่ในบ้านบอลด้วยล่ะค่ะ!"
1002505-58 = "ไม่อยากเชื่อเลยว่าจะมีสไลเดอร์ที่มีท่อคดเคี้ยวลงมาจากเพดานด้วย..."
1002505-59 = "อันนี้ต้องสนุกแน่ๆ เลยค่ะ!"
1002505-60 = "[s] \"อยากเล่นเหรอ?\""
1002505-61 = "แน่นอนสิคะ ก็พอโตขึ้นฉันก็ไม่ได้เล่นสไลเดอร์ของเด็กๆ เลยนี่นา..."
1002505-62 = "เอ่อ... ไม่ใช่อย่างนั้นค่ะ! ฉันหมายถึง ในฐานะผู้ฝึกสอนฉันต้องตรวจสอบให้แน่ใจว่าอุปกรณ์นี้จะ#nไม่เป็นอันตรายกับเด็กๆ ต่างหากค่ะ!"
1002505-63 = "[s] \"แต่ดูจากภายนอกก็แข็งแรงดีนะ...\""
1002505-64 = "ไม่หรอกค่ะคุณครู สไลเดอร์ก็เหมือนกับแทรมโพลีนแหละค่ะ จะให้ประเมินด้วยสายตาอย่างเดียว#nไม่ได้ ต้องขึ้นไปเล่นเลยค่ะ"
1002505-65 = "เพราะถ้ามันชันมากไปก็อาจจะล้มคะมำในนั้นได้ อีกอย่างถ้าพื้นผิวมีรอยแตกแหลมๆ เข้าล่ะก็#nจะเจ็บตัวได้เลยนะคะ!"
1002505-66 = "งั้นฉันจะขึ้นไปตรวจสอบความปลอดภัยบนนั้นนะคะ"
1002505-71 = "(ชุนเดินขึ้นบันไดไปขึ้นสไลเดอร์...)"
1002505-73 = "อะฮ่ะฮ่า! สไลเดอร์บ้านบอลอันนี้สนุกจังเลย!"
1002505-74 = "มันถูกออกแบบมาให้มีความลาดชันและความโค้งที่ยอดเยี่ยม ตอนนั่งลงมามันเร็วจนแอบเสียวเลย สนุกมากๆ เลยค่ะ!"
1002505-75 = "งั้นขอไปขึ้นอีกครั้งหนึ่ง..."
1002505-76 = "[s] \"ยังเช็กความปลอดภัยไม่หมดเหรอ?\""
1002505-78 = "เอ่อ... เมื่อกี้ฉันยังเช็กสภาพภายในไม่ครบน่ะค่ะ..."
1002505-79 = "ถ้าจะเช็กความปลอดภัยอย่างถี่ถ้วน ครั้งเดียวไม่พอหรอกค่ะ!"
1002505-80 = "อีกอย่างฉันก็ไม่รู้ว่าจะมีโอกาสได้ขึ้นอีกเมื่อไหร่ ถ้าจะให้กลับเลยคงน่าเสียดาย..."
1002505-81 = "[s] \"ไหนว่าไม่ได้มาเล่นไงล่ะ?\""
1002505-82 = "งือ..."
1002505-83 = "อย่ามาล้อกันสิคะ!"
1002505-85 = "(หลังจากนั้นชุนก็ไปเล่นสไลเดอร์ด้วยสีหน้าบูดบึ้งอีก 5 รอบ)"

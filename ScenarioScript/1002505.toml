1002505-19 = "3;꼬마 슌ND;16;내구도가 약해서 용수철이 끊어지거나, 탄성이 너무 강해서 매트 밖으로 떨어지기라도 하면 위에 올라간 아이들이 크게 다칠 수도 있으니까요."

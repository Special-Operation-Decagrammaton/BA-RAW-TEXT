1002505-2 = "#place;키보토스 중앙구, 실내 놀이터"
1002505-3 = "3;꼬마 슌ND;02;이곳이 이번에 새로 개장한 어린이용 실내 놀이터…….\n#3;em;…\n#3;a"
1002505-4 = "3;꼬마 슌ND;01;소문대로 흥미로워 보이는 놀이기구들이 잔뜩 있네요."
1002505-5 = "3;꼬마 슌ND;99;귀여운 캐릭터가 그려진 트램펄린부터 대형 볼풀장까지……."
1002505-6 = "3;꼬마 슌ND;03;분명 이 시설이라면 매화원의 아이들도 만족할거예요.\n#3;hophop\n#3;em;[반짝]"
1002505-7 = "3;꼬마 슌ND;13;자, 선생님. 그럼 어떤 놀이기구부터 타 볼까요?\n#3;em;[반응]"
1002505-8 = "[s] \"……직접 타 볼 생각이야?\""
1002505-9 = "3;꼬마 슌ND;04;다, 당연하죠! 눈으로 보는 것과 실제로 타보는 것은 다르니까요!\n#3;stiff\n#3;em;[땀]"
1002505-10 = "3;꼬마 슌ND;08;어린아이의 몸으로 기구 위에 올라갔을 때 얼마나 격렬하게 느껴지는지, 안전장치에는 이상이 없는지 직접 확인해봐야 해요."
1002505-11 = "3;꼬마 슌ND;08\n#3;em;[...]\n#wait;2500"
1002505-12 = "3;꼬마 슌ND;09;……절대로 제가 놀고 싶어서 그러는 게 아니니까요!\n#3;em;[땀]"
1002505-13 = "[s1] \"네~ 네~.\"\n[s2] \"모처럼이니 놀아도 상관은 없지만.\""
1002505-14 = "3;꼬마 슌ND;19;(어쩐지 믿어주시지 않는 것 같은데…….)\n#3;stiff"
1002505-15 = "3;꼬마 슌ND;19;(어쩐지 믿어주시지 않는 것 같은데…….)\n#3;stiff"

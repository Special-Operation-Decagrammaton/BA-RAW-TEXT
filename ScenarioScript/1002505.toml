[translation]
1002505-1 = "Playground Safety Check"
1002505-2 = "Kivotos Hub, Indoor Playground"
1002505-3 = "This is the new indoor children's playground that opened recently..."
1002505-4 = "I guess the rumors were true. There's a lot of interesting equipment here."
1002505-5 = "It has a trampoline with cute characters drawn on it and even a large ball pit."
1002505-6 = "I'm sure the Plum Blossom children will have a wonderful time with facilities like these."
1002505-7 = "Now then, Sensei, what should we try first?"
1002505-8 = "[s] \"Are you planning to try this stuff yourself?\""
1002505-9 = "O-Of course! There's a big difference between simply looking at it and having first-hand experience!"
1002505-10 = "I need to know how the equipment feels so I can check whether there will be any safety issues when the children come here to play."
1002505-12 = "I'm definitely not doing this because I wanna have fun!"
1002505-13 = "[s1] \"Whatever you say, Shun.\"\n[s2] \"Knock yourself out. I don't mind.\""
1002505-14 = "(That look on your face says you don't believe me.)"
1002505-15 = "(That look on your face says you don't believe me.)"
1002505-16 = "Let's begin on that trampoline over there."
1002505-18 = "Trampolines are simple. They use the elasticity of springs to bounce a person into the air, but it's also easy to get hurt on one."
1002505-19 = "Someone could be injured if a spring were to break due to poor durability, or if the elasticity is strong enough to throw people off the mat."
1002505-20 = "I'll start by testing the durability."
1002505-26 = "Hmm. It seems fine. I don't think any of the springs will break, even if several kids jump around and play at the same time."
1002505-27 = "Next up, let's get on top of the mat so we can check the elasticity of the springs."
1002505-34 = "W-Wow! It bounces me so high up!"
1002505-37 = "The elasticity of this trampoline is better than I expected."
1002505-38 = "I thought I was flying! Hahaha!"
1002505-39 = "[s3] \"Shun?\"\n[s4] \"Are you sure you're not playing here?\""
1002505-40 = "Hey!"
1002505-41 = "Hey!"
1002505-42 = "I-I'm not playing! I'm just testing it because I feel like a child!"
1002505-47 = "Hmm. Hmmm. There's nothing wrong with the elasticity."
1002505-48 = "The only problem I can think of is that the trampoline might be so fun that the children won't want to play on anything else."
1002505-49 = "[s] \"As long as you're having fun.\""
1002505-50 = "I-I'm not here to play, so it's fine!"
1002505-51 = "Hmm. Next up is the large ball pit!"
1002505-53 = "This ball pit is the largest play area in the indoor playground."
1002505-54 = "There are soft balls of all sorts of colors scattered around here. It's so pretty..."
1002505-55 = "Huh?"
1002505-57 = "S-Sensei, look at that! It's an extra-large ball pit slide!"
1002505-58 = "I can't believe they fit in a twisty slide all the way to the ceiling!"
1002505-59 = "I'm positive this will be fun!"
1002505-60 = "[s] \"Do you want to go down it?\""
1002505-61 = "Of course I do. I couldn't fit on the children's slides, when I was taller..."
1002505-62 = "Er, I mean! I need to personally check it before the Plum Blossom children as their instructor!"
1002505-63 = "[s] \"It looks pretty sturdy from the outside...\""
1002505-64 = "No. Just like the trampoline, the slide has many instability factors that can only be checked by personally riding on it."
1002505-65 = "You could fall too fast if the angle is steep. Furthermore, it could be really dangerous if there are any sharp cracks on the surface!"
1002505-66 = "So, I'll be back after checking on its safety!"
1002505-71 = "Shun climbed the ladder so she could ride down the ball pit slide."
1002505-73 = "Ahaha! It's so much fun!"
1002505-74 = "The incline and curve are are just right, so the slide is fast all the way down!"
1002505-75 = "I think we should try riding down the slide one more—"
1002505-76 = "[s] \"You aren't done checking for safety hazards?\""
1002505-78 = "Oh, uh...I wasn't able to completely check the condition of the interior finish."
1002505-79 = "I can't inspect all of the safety aspects perfectly on just one ride, you know!"
1002505-80 = "Besides, I don't know when I'll be able to ride on this again, so it'd be a waste to leave now..."
1002505-81 = "[s] \"I thought you weren't here to play.\""
1002505-82 = "U-Uh..."
1002505-83 = "Stop teasing me!"
1002505-85 = "Shun made a pouty face and then left to ride the ball pit slide five more times."

[translation]
90002090-1 = "第9話;Dress Up"
90002090-6 = "老師，等很久了吧？"
90002090-7 = "[s]「綠……？」"
90002090-8 = "怎麼了……？"
90002090-9 = "[s]「就是……非常可愛……！」"
90002090-10 = "耶嘿嘿。謝謝。太好了……"
90002090-15 = "如果借用愛麗絲的說法，我們為大家打造了全新的鐵甲與武裝。"
90002090-16 = "現在綠身上穿的防護服也是其中之一。"
90002090-17 = "[s1]「全部？」\n[s2]「八個人全部？」"
90002090-20 = "是的，"
90002090-21 = "那種程度的事，只要想做就做得到。在這裡的話。"
90002090-22 = "設計方面就如各位所知，綠早就都準備好了。"
90002090-23 = "在功能性上則由我和季負責審核。"
90002090-24 = "多虧運輸船上新安裝的Kei醬設備，整個作業流程變得非常輕鬆。"
90002090-25 = "等等，停。本身體還有話要說，妹妹啊。"
90002090-26 = "為什麼只有我們兩個被做得這麼笨重！？"
90002090-28 = "實際行動上應該沒有太大問題吧。只不過是外觀那樣而已。"
90002090-30 = "外觀也是很重要的啊！"
90002090-31 = "姐姐，你不是說怕痛嗎？所以幫你做得安全一點而已。"
90002090-32 = "的，的確有這麼說過啦……"
90002090-33 = "但是呢……有點……像主角一樣帥氣點……咦？"
90002090-34 = "[s]「我覺得看起來還不錯啊？」"
90002090-35 = "咦？是，是嗎？既然老師都這麼說了。耶嘿嘿……"
90002090-37 = "總之桃井與綠的戰鬥服，在防禦力上是所有套裝裡最高的。"
90002090-38 = "萬一……發生什麼事，也能撐到最後替大家收拾殘局。"
90002090-39 = "K，Kei醬！？這麼不吉利的話，製作時沒有說到啊……？"
90002090-40 = "我只不過是隨口說說罷了，綠。就這樣吧。"
90002090-41 = "然後下一個是──"
90002090-45 = "您好，老師。#n我是卸下過去的厚重武裝，完成輕量化、極速化與最佳化的機動型飛鳥馬季。蹦蹦。"
90002090-46 = "……在這種時候還一刻也安分不下來呢……"
90002090-47 = "無論是哪位學生收到新衣服時，想讓老師第一個看見不是正常的嗎？"
90002090-48 = "雖然也不是每個人都會這樣……"
90002090-49 = "但我是啦。"
90002090-50 = "是是是，我知道了……"
90002090-51 = "[s]「原來如此，畢竟把Abi-Eshuh交給愛麗絲了……」"
90002090-52 = "是的，藉此機會概念與氛圍也徹底更新。這次將預計以最前線速度取勝，作為機動偵察隊活躍。"
90002090-53 = "最重要的是，與我過去那套有流失體溫問題的女僕裝不同，這次在保暖性方面給予高度評價。"
90002090-57 = "[ns]「……你很冷嗎？」"
90002090-58 = "是的，"
90002090-59 = "[s]「那為什麼還要穿那種衣服？」"
90002090-60 = "是的，"
90002090-61 = "問我為什麼？"
90002090-62 = "……"
90002090-63 = "老師，人總有必須靠意志力撐下去的時候。"
90002090-64 = "為什麼呢？"
90002090-66 = "因為我不能輸給英美啊。"
90002090-67 = "[s]「真的聽不懂在說什麼，季……」"
90002090-68 = "沒事的。我自己懂就好。"
90002090-73 = "季，季……"
90002090-74 = "唉……"
90002090-75 = "繼續吧。雙持能源手槍為主要武裝。當電池殼全部耗盡時，會以噴射方式從後方排出。"
90002090-76 = "是我負責配色的！我覺得季的個人色應該是白色與青色！"
90002090-77 = "而且只要脫下這件白色外套，老師還能欣賞到我完美的身材。老師現在要看一下嗎？"
90002090-78 = "咦！？"
90002090-79 = "[s]「當然不行！至少現在絕對不行！」"
90002090-80 = "這樣呀，那就下次在我們兩人的專屬時光時再讓你欣賞。"
90002090-81 = "季同學！？"
90002090-82 = "每個都要回應的話會沒完沒了的，綠……"
90002090-83 = "總之下一位是英美。什麼？已經快熱死了？"
90002090-84 = "稍微忍耐一下……偶而真想從工程角度分析你的體質，而不是從生物學……"
90002090-90 = "呼……"
90002090-91 = "英美！？披風跑去哪了！？"
90002090-92 = "那個？太熱所以脫掉了啊？"
90002090-93 = "不是，看得出來……"
90002090-94 = "英美，你這次主要負責後方支援對吧？披著披風提高偽裝指數，才比較「有效率」不是嗎？"
90002090-95 = "可是一直穿著的話，我可能會先中暑吧。"
90002090-96 = "指定射手因為太熱而無法準確支援，那才算是沒效率吧？"
90002090-98 = "沒錯……唔……我就知道，所以把英美的披風設計成可以綁在腰間的。"
90002090-100 = "謝謝你，綠。舒服多了。"
90002090-101 = "……"
90002090-102 = "好……是我考慮不周……這個人本來就是這樣……"
90002090-103 = "英美的主武裝和季一樣也做了更換。共通點是都使用電池殼的能源武器。"
90002090-104 = "不過輸出與容量是截然不同的。"
90002090-105 = "護目鏡是為了迅速鎖定支援點而追加的HUD，因此整體能源消耗率有所提升……"
90002090-106 = "背包也比季的還大。"
90002090-108 = "老師，怎麼樣？"
90002090-109 = "看起來有效率嗎？嗯……"
90002090-110 = "……"
90002090-111 = "[s]「怎麼了，英美？」"
90002090-112 = "不是，我也覺得有點怪怪的。以前那是最好的稱讚……"
90002090-113 = "不過現在想聽點不一樣的話。"
90002090-114 = "什麼話？例如……"
90002090-118 = "……"
90002090-119 = "漂亮？"
90002090-121 = "！？"
90002090-122 = "！？"
90002090-127 = "[ns]「嗯，非常漂亮也很合適。」"
90002090-128 = "沒錯，"
90002090-129 = "……謝謝你，老師"
90002090-131 = "綠。我現在好像看到很可怕的畫面……"
90002090-132 = "不，不能講那種話啦，Kei醬！"
90002090-133 = "我知道。我明白。可是……"
90002090-137 = "……"
90002090-138 = "呃啊啊。對於無法理解的事物決定迅速從腦中抹去。接下來換已經很雀躍的那位。請出場。"
90002090-141 = "呵呵。我的新套裝如何，老師？"
90002090-142 = "[s]「呃……說這種話可能有點失禮……」"
90002090-143 = "嗯？"
90002090-144 = "[s]「不冷……嗎？」"
90002090-145 = "哎呀，我還以為要說什麼呢。"
90002090-146 = "請別擔心。像我這種超級天才駭客虛弱美少女怎麼可能沒準備。"
90002090-147 = "這是具備防寒、防水、各種情境應對能力，甚至有纖細與清純感的現場支援萬能套裝。"
90002090-151 = "[ns3]「纖細……」\n[ns4]「清純……」"
90002090-157 = "……我從以前就想問了，自己講這種話真的可以嗎……？"
90002090-158 = "Kei真的是。對事實進行明確敘述才是科學方法論的基礎吧？"
90002090-159 = "對事實進行明確敘述……沒錯……我知道了……我認輸…"
90002090-160 = "不過穿上這套象徵純淨的潔白套裝後……"
90002090-161 = "嗚嗚……"
90002090-162 = "[s]「陽葵？怎麼了？發生什麼事……？」"
90002090-163 = "怎麼辦，老師……因為太美太可愛都快感動到流淚了。"
90002090-164 = "對不起，老師。現在的陽葵部長由我負責處理。"
90002090-169 = "英美？英美！？我還沒介紹完啊──！？"
90002090-172 = "[ns]「暴風雨終於過去了……」"
90002090-173 = "正如所言……"
90002090-174 = "（必，必須轉換一下氣氛！再這樣下去的話……！)"
90002090-178 = "莉央會長？請出來！快點！"
90002090-185 = "[ns]「莉央……？」"
90002090-186 = "怎麼了，老師？"
90002090-187 = "[s]「不，這……」"
90002090-188 = "我不太清楚老師為什麼是這種反應，不過就這樣了。"
90002090-189 = "這是以現場應對、設施活用與情勢分析……各種方面為核心的泛用性戰鬥套裝。"
90002090-190 = "如同字面上所傳達的，「合理」。"
90002090-191 = "不知道為何總覺得必須要這樣，所以色調選擇與陽葵前輩相反的方向。可是……"
90002090-192 = "再怎麼想都覺得那個設計方向確實有點問題，綠──！！！"
90002090-193 = "部長。冷靜點。不然要我把你強行塞回運輸船裡面嗎？"
90002090-194 = "嗚嗚嗚……"
90002090-195 = "陽，陽葵部長一直這樣說我也沒辦法！因為這關係到身為設計師的自尊！"
90002090-197 = "我對於自己的選擇與決定……一點也不後悔！"
90002090-202 = "我對於這件事情，就不便多做評論了……"
90002090-203 = "反正莉央的套裝還特意強化了防禦性能與電子戰對應規格。"
90002090-204 = "他表示會和陽葵不同，並親自到現場進行技術支援。"
90002090-205 = "[s]「莉央自己？不危險嗎……？」"
90002090-206 = "但是比起讓陽葵去現場，我親自去才更合理吧？"
90002090-207 = "這裡是鋼鐵大陸，和其他戰場不同的是必須考慮技術層面的戰鬥。"
90002090-208 = "[s5]「好。原來如此。」\n[s6]「拜託了，莉央。」"
90002090-211 = "嗯。"
90002090-212 = "交給我，老師。"
90002090-213 = "然後下一個是……"
90002090-219 = "柚子？"
90002090-220 = "……出來吧，柚子。都來到這裡了……"
90002090-221 = "柚子醬？沒事的啦！"
90002090-229 = "嗚嗚嗚……"
90002090-230 = "[s]「咦？跟桃井或綠的……很不一樣呢？」"
90002090-231 = "那，那個……"
90002090-232 = "我有特別提出一些要求。"
90002090-233 = "是的，本來想跟我們一樣的方向一起設計的……"
90002090-234 = "[s]「為什麼？」"
90002090-235 = "……"
90002090-236 = "現在可能不方便透漏原因，可以嗎？"
90002090-237 = "這裡是鋼鐵大陸……現在我們的對話可能也被實時地監聽著。"
90002090-238 = "而且將柚子的套裝以這種方向設計，也是為了應對幾乎不會發生的意外。"
90002090-239 = "[s]「也就是說，終極武器也想對友軍有所隱瞞？」"
90002090-240 = "……對不起，老師。還有大家。雖然我知道不應該這樣。"
90002090-241 = "也明白必須相信大家，才得以超越自身的極限……"
90002090-242 = "[s]「沒關係，我相信莉央。」"
90002090-243 = "真，真的嗎……？"
90002090-245 = "真的可以嗎，老師？"
90002090-246 = "嗯？莉央對現在為止也都沒有懷著惡意制訂計劃過，不是嗎？"
90002090-247 = "這樣看來好像也沒錯……"
90002090-248 = "好的！愛麗絲也是這樣想的！"
90002090-249 = "愛麗絲！？"
90002090-250 = "愛麗絲醬！？"
90002090-251 = "愛麗絲，醬……？？"
90002090-256 = "……"
90002090-257 = "相信我嗎……？"
90002090-258 = "是的，因為莉央前輩也是直到最後一刻，都努力幫忙調整愛麗絲的Abi-Eshuh和Kei的槍。"
90002090-259 = "我認為如果莉央前輩有不好的念頭的話，絕對不會幫忙到這種地步的。"
90002090-260 = "我也有幫忙啊！？"
90002090-261 = "沒錯！陽葵前輩也有幫忙！"
90002090-262 = "呵……好。看在愛麗絲的面子上，這次就算了吧。"
90002090-263 = "還有很多隱藏技能，大家可以好好期待！"
90002090-268 = "[ns]「話說回來，Kei的槍？」"
90002090-269 = "嗯？"
90002090-270 = "啊，好。嗯……沒錯。"
90002090-271 = "現在在奇普托斯沒有帶著槍行動的話，感覺會比裸體行走還奇怪……"
90002090-272 = "名字是埃蘭迪爾：Luminous Nova。也是個能源武器。"
90002090-273 = "嗚嗚嗚……果然我還是不太理解……這件衣服適合我嗎……？"
90002090-274 = "甚至，我真的是適合站在這個位置嗎……？"
90002090-275 = "[s7]「沒關係，柚子。都很合適的。」\n[s8]「我們……需要柚子！」"
90002090-278 = "咦！？"
90002090-279 = "那個，就是說……"
90002090-280 = "既然老師都這麼說的話……"
90002090-281 = "我，知道了。我……會全力以赴的。"
90002090-282 = "[s]「那麼，最後一個檢查！」"
90002090-294 = "那個，Kei？"
90002090-295 = "莉央，怎麼了？"
90002090-296 = "我有些話想單獨對你說。"
90002090-297 = "？為什麼是我？不是還有老師嗎？"
90002090-298 = "那個。"
90002090-299 = "雖然是從以前的事情來推測的。"
90002090-300 = "你……能對鋼鐵大陸和那三個孩子隱藏某些情報，對吧？"
90002090-301 = "……"
90002090-302 = "很敏銳呢。你是怎麼知道的？"
90002090-303 = "直到抵達提法瑞特之前，那三個孩子都不知道你和愛麗絲的存在。"
90002090-304 = "所以你才判斷可以把剛才的祕密與……終極武器告訴我？"
90002090-305 = "好啦，不過無法維持很久。在這裡建立的防火牆，時間最多維持不到30秒。"
90002090-306 = "沒錯，這樣應該就足夠了。"
90002090-309 = "……"
90002090-310 = "…………"
90002090-311 = "………………"
90002090-312 = "怎，怎麼了？"
90002090-313 = "莉央。你這傢伙。"
90002090-314 = "咦？"
90002090-315 = "不太正常呢……？"
90002090-316 = "是，是這樣嗎……？這種程度誰都能……"
90002090-317 = "不，為了預防意外做到這種程度，已經超出常理……"
90002090-318 = "……沒有。這裡是鋼鐵大陸，就必須也將那種假設都納入可能性中。"
90002090-319 = "話雖如此，天哪……"
90002090-320 = "奇怪嗎……？"
90002090-321 = "要是換作其他情況也許會這樣想。"
90002090-322 = "但這種情況下……"
90002090-323 = "……"
90002090-324 = "但從某方面來說，幸好有你在。莉央。"
90002090-325 = "是，是嗎…？"
90002090-326 = "總而言之，才因此那樣設計柚子的套裝嗎？"
90002090-327 = "沒錯。"
90002090-328 = "還有剛才說的第二階段……"
90002090-329 = "不會做不到。甚至還因為有前例……反而可以更容易。"
90002090-330 = "當然我也希望如你所說，不必動用那種手段。"
90002090-331 = "沒錯，對吧。終極武器在沒有使用的時候最強。"
90002090-332 = "[s]「嗯？終極武器？」"
90002090-333 = "老，老師！？！？"
90002090-334 = "這個，所以說，那個……！"
90002090-335 = "……"
90002090-336 = "在討論驚喜派對要準備什麼菜，才能成為王牌。"
90002090-337 = "[s]「驚喜派對？」"
90002090-338 = "嗯。"
90002090-339 = "我們會贏的吧。不是嗎？"
90002090-340 = "[s]「啊哈。原來如此。」"
90002090-341 = "是的，"
90002090-342 = "莉央，對吧？"
90002090-343 = "……"
90002090-344 = "是啊。沒錯。"
90002090-345 = "老師，你在做什麼？啊，莉央前輩和Kei也是！"
90002090-346 = "嗯？是在說這件事結束的驚喜派對嗎？這點子不錯耶！"
90002090-347 = "愛麗絲只要跟老師一起就什麼都好！"
90002090-348 = "[s9]「對了！老師也是嗎！」\n[s10]「就算是為了派對……一定要平安歸來！」"
90002090-351 = "……必須這樣才行。"
90002090-352 = "為此，我想要提出更具體的計畫。"
90002090-353 = "具體的計畫？"
90002090-354 = "是的，各預言者的擊退與區域佔領並沒有特定順序，依老師指示就可以了。"
90002090-355 = "不過看來<薇娜>的區域應該要最先佔領。"
90002090-356 = "[s]「薇娜是第一個？為什麼？」"
90002090-357 = "因為就在剛剛好不容易成功鎖定薇娜的位置了。"
90002090-358 = "[s]「不愧是Kei醬！」"
90002090-359 = "我不是Kei醬！！！"
90002090-360 = "咳嗯……然後還有一個原因。"
90002090-361 = "剛剛有說鋼鐵大陸整體被一種網路覆蓋，對吧？"
90002090-362 = "而在薇娜的區域設有進入那個網路的防火牆。"
90002090-363 = "如果要突破鋼鐵大陸的網路安全系統，必須要先透過物理或是電子的方式解除那道防火牆。"
90002090-364 = "成功突破那道防火牆的話，就能更容易掌握道其他預言者的位置。"
90002090-365 = "再加上如果放任那道防火牆不管……借用愛麗絲的話來說，"
90002090-366 = "就是無論我等級再高，也無法對鋼鐵大陸下達停止擴張的命令。"
90002090-367 = "[s]「原來如此？」"
90002090-368 = "也就是說，Kei現在掌握的資訊等同一種總體操作手冊，而為了要取得更高的安全權限……"
90002090-369 = "是的，最重要的是，必須要先取得薇娜區域的網路存取權，以及薇娜的資訊核心。"
90002090-370 = "[s]「那麼，第一個目標就這麼決定了。」"
90002090-371 = "是的，老師，我們的第一個目標。"

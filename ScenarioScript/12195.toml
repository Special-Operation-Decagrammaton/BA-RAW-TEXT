[translation]
12195-2 = "นี่ โฮชิโนะจัง"
12195-3 = "มีบางอย่างที่ฉันอยากจะบอกเธอนะ"
12195-4 = "ตอนที่เจอโฮชิโนะจังครั้งแรก ฉันต้องหยิกตัวเองหลายครั้งเลยละ เพราะฉันนึกว่ามันเป็นเรื่องฝันไป"
12195-5 = "ฉันดีใจมากเลยที่มีรุ่นน้องที่ทั้งน่ารัก แข็งแกร่ง และเชื่อใจได้อย่างโฮชิโนะจัง"
12195-6 = "อืม... ฉันหัวไม่ค่อยดีเท่าไร คงจะอธิบายออกมาเป็นคำพูดดีๆ ไม่ได้ แต่ว่า..."
12195-7 = "การที่มีโฮชิโนะจังมาให้ฉันนั่งมองตาแบบนี้ ถือว่าเป็นปาฏิหาริย์สำหรับฉันเลยละ..."
12195-8 = "แต่เราก็เจอกันทุกวันอยู่แล้วนี่คะ "
12195-9 = "เมื่อวานก็เจอ วันนี้ก็เจอ พรุ่งนี้ก็เจออีก จะตื่นเต้นอะไรกับเรื่องที่ต้องเจอทุกวันแบบนี้กัน?"
12195-10 = "อ่า... แต่ว่า..."
12195-11 = "ปาฏิหาริย์มันยิ่งใหญ่และหายากกว่านั้นนะคะ"
12195-12 = "อืม... ไม่หรอกโฮชิโนะจัง ฉันไม่คิดแบบนั้นนะ"
12195-13 = "ถึงฉันจะไม่ได้ฉลาดมากนัก... แต่เรื่องนั้นฉันมั่นใจนะ"
12195-14 = "โฮชิโนะจัง หากวันไหนโฮชิโนะจังได้มีรุ่นน้องที่น่ารักๆ บ้างละก็..."
12195-16 = "......"

[translation]
12195-2 = "吶，星野醬。"
12195-3 = "我啊……"
12195-4 = "在第一次見到星野醬的時候，我還懷疑是不是在做夢，捏了自己的臉頰好幾次。"
12195-5 = "能有像星野醬這樣可愛又厲害的後輩陪在我身邊，實在太開心了……"
12195-6 = "唔嗯……因為我是笨蛋，所以也說不太清楚……"
12195-7 = "不過能和星野醬待在一起，對我來說就像奇蹟一樣……"
12195-8 = "……不是每天都會見面嗎。"
12195-9 = "不管是昨天、今天還是明天。#n這麼理所當然的事有什麼好大驚小怪的。"
12195-10 = "哈嗚……可是……"
12195-11 = "「奇蹟」應該是更厲害、更難得的東西才對。"
12195-12 = "……不，星野醬。我不這麼認為。"
12195-13 = "雖然我是笨蛋……但這點我很確定。"
12195-14 = "吶，星野醬。如果哪天星野醬也有了可愛的後輩的話，到時候──"
12195-16 = "……"
12195-19 = "前輩應該就在那裡沒錯！！"
12195-20 = "破壞不了……再試一次……"
12195-22 = "綾，綾音醬！？為什麼在這裡！？"
12195-23 = "搭著從夏萊借的直升機來了！星野前輩呢！？"
12195-24 = "在這裡！但是門打不開……！！"
12195-25 = "請各位讓開！！"
12195-26 = "（咚哐哐哐哐──！）"
12195-28 = "（發生了什麼……）"
12195-29 = "（身體恢復自由了……？我在做夢嗎……）"
12195-30 = "（而且還聽到了後輩們的聲音……果然是夢啊）"
12195-31 = "（聲音……）"
12195-36 = "（是從這裡傳來的嗎……）"
12195-37 = "（就算是夢也好……最後……再讓我……）"
12195-40 = "（嚓哐──！）"
12195-42 = "星野前輩！！！！"
12195-46 = "哎呀呀……怎麼會……"
12195-47 = "為什麼……我……明明……"
12195-50 = "[ns]「星野。」"
12195-52 = "星野"
12195-53 = "……啊啊。"
12195-56 = "星野"
12195-57 = "這樣啊。是大家，還有老師……"
12195-60 = "星野"
12195-61 = "是大人……嗯。"
12195-66 = "茜香"
12195-67 = "[7cd0ff]對策委員會[-]"
12195-68 = "……歡，歡迎回來！前輩！"
12195-71 = "野乃美"
12195-72 = "[7cd0ff]對策委員會[-]"
12195-73 = "啊，被茜香醬搶先了！明明說會害羞不肯說的，好狡猾！"
12195-76 = "茜香"
12195-77 = "[7cd0ff]對策委員會[-]"
12195-78 = "少，少囉嗦！順序什麼的無所謂吧！"
12195-81 = "白子"
12195-82 = "[7cd0ff]對策委員會[-]"
12195-83 = "……沒事真是太好了。"
12195-86 = "綾音"
12195-87 = "[7cd0ff]對策委員會[-]"
12195-88 = "星野前輩，歡迎回來！！"
12195-91 = "野乃美"
12195-92 = "[7cd0ff]對策委員會[-]"
12195-93 = "歡迎回來！！"
12195-96 = "白子"
12195-97 = "[7cd0ff]對策委員會[-]"
12195-98 = "歡迎回來，星野前輩。"
12195-102 = "星野"
12195-103 = "[7cd0ff]對策委員會[-]"
12195-104 = "啊哈哈……"
12195-107 = "星野"
12195-108 = "[7cd0ff]對策委員會[-]"
12195-109 = "……總覺得大家的表情都充滿期待呢。"
12195-112 = "星野"
12195-113 = "[7cd0ff]對策委員會[-]"
12195-114 = "……都在等那句台詞嗎～？"
12195-117 = "茜香"
12195-118 = "[7cd0ff]對策委員會[-]"
12195-119 = "真，真是的！！既然知道就別吊我們胃口了嘛！！"
12195-124 = "星野"
12195-125 = "[7cd0ff]對策委員會[-]"
12195-126 = "唔嘿～"
12195-129 = "星野"
12195-130 = "[7cd0ff]對策委員會[-]"
12195-131 = "既然是可愛後輩的請求……真拿你們沒辦法呢。"
12195-134 = "我回來了"

[translation]
33120-1 = "ตอนที่12;ความสับสนที่เพิ่มขึ้น (2)"
33120-2 = "อาการของคุณครูเป็นยังไงบ้างคะ!"
33120-3 = "ขณะนี้เราอยู่ที่ห้องฉุกเฉินของชมรมอัศวินบรรเทาทุกข์ค่ะ! ตามคำบอกของสมาชิกคนอื่น คุณครูเสียเลือดเยอะมาก แต่ได้ปฐมพยาบาลฉุกเฉินเบื้องต้นแล้ว..."
33120-4 = "คุณครูปลอดภัยรึเปล่าคะ!"
33120-5 = "คะ...ค่ะ โชคดีที่ไม่อันตรายถึงชีวิต แต่ว่า... ตอนนี้ยังไม่ได้สติเลย..."
33120-6 = "คุณครู... "
33120-10 = "ผลวิเคราะห์เครื่องยิงได้แล้วค่ะ! ไม่ใช่เครื่องยนต์แรมเจ็ตค่ะ!"
33120-11 = "!!"
33120-12 = "ถ้าไม่ใช่แรมเจ็ต... ทางเกเฮนน่าได้เทคโนโลยีใหม่ที่ไม่ปรากฏในคิโวทอสมางั้นเหรอ?"
33120-13 = "กำลังแกะรอยพิกัดที่ยิงอยู่ค่ะ...!!"
33120-14 = "เกเฮนน่าเป็นฝ่ายยิงเหรอคะ?!"
33120-15 = "มะ...ไม่ใช่ค่ะ ... พิกัดคือ... "
33120-16 = "ตะ...ตอนนี้ยังระบุพิกัดที่แน่นอนไม่ได้ก็จริง แต่ว่าพิกัดการยิงอยู่ภายในเขตของทรีนิตี้ค่ะ!!"
33120-17 = "...!!"
33120-18 = "กู้ระบบภาพวงจรปิดตอนที่เกิดเหตุระเบิดที่วิหารโบราณได้แล้วค่ะ!! ตรงกับรายงานของกลุ่มซิสเตอร์ที่ปะทะกับกองกำลังเกเฮนน่าที่วิหารโบราณขณะนี้ค่ะ!!"
33120-20 = "จะเปิดภาพวิดีโอนะคะ!!"
33120-35 = "นี่มันอะไรกัน..."
33120-36 = "คุณครู... ทุกคน... กำลังต่อสู้อยู่กับอะไรกันแน่...?"
33120-37 = "นะ...นั่นมัน... ชุดแบบนั้นมัน..."
33120-38 = "... <สาวกยูสตาร์> ค่ะ..."
33120-39 = "คะ? พะ... พูดอะไรน่ะ?!"
33120-40 = "..."
33120-41 = "คะ... คุณฮานาโกะ..."
33120-42 = "..."
33120-48 = "........"
33120-53 = "สาวก... สนธิสัญญาเอเดน... การบุกโจมตีสภาน้ำชา... "
33120-61 = "สควอดของอาเรียส... การประชุมสภาครั้งที่ 1... วิหารโบราณ... พิกัดของการยิง... ช่วงเวลาที่เกิดการปฏิวัติที่ผิดปกติ..."
33120-67 = "สุสานใต้ดิน... ข่าวลือแปลกๆ เกี่ยวกับสวนสนุก... ตำแหน่งของเขตปกครองตนเองอาเรียส..."
33120-77 = "การปกป้องบรรทัดฐาน... ผู้พิทักษ์... สนธิสัญญาเอเดน... สนธิสัญญาเอเดน... สนธิสัญญาเอเดน... เอเดน..."
33120-80 = "..."
33120-81 = "คะ... คุณฮานาโกะ...? ปะ...เป็นอะไรรึเปล่าคะ?!"
33120-82 = "..."
33120-83 = "ข้อสรุปมีเพียงหนึ่งเดียว..."
33120-84 = "จากข้อสันนิษฐานหลายสิบอย่าง... บางทีข้อสรุปที่แท้จริง..."
33120-85 = "มันไม่มีวิธีแก้ไขเรื่องนี้ได้เลยละค่ะ..."
33120-86 = "คะ...?"
33120-87 = "ทรีนิตี้และเกเฮนน่าจะถูกลบหายไปจากคิโวทอสค่ะ..."
33120-89 = "เหมือนอย่างพวกอาเรียสหลังจากการประชุมสภาครั้งที่ 1..."
33120-91 = "ตอนต่อไป;สิ่งที่ไม่อาจไขว่คว้า"

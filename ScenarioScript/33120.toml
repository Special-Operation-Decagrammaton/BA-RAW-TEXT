[translation]
33120-1 = "Episode 12;Aggravated Confusion Part 2"
33120-2 = "What's Sensei's condition?!"
33120-3 = "Sensei is currently being treated in the Remedial Knights' infirmary. They've lost a lot of blood according to one member, but the wound has been treated."
33120-4 = "Will Sensei be all right?"
33120-5 = "Yes, the Knights believe so. The injury isn't life-threatening, but the patient remains unconscious."
33120-6 = "Sensei... "
33120-10 = "Projectile analysis is complete! We've discovered that the weapon that struck the cathedral lacked a ramjet engine! "
33120-11 = "...!"
33120-12 = "That's impossible. How could Gehenna have gotten their hands on weaponry unlike anything else in Kivotos?"
33120-13 = "I'm tracking the launch location now."
33120-14 = "Was it fired from their campus?"
33120-15 = "N-No. The location is... "
33120-16 = "I can't pinpoint it exactly, but it unquestionably came from within the Trinity district!"
33120-17 = "...!"
33120-18 = "We're receiving the restored camera footage from the explosion now. It's consistent with reports from our forces currently engaging Gehenna at the cathedral."
33120-20 = "I'll play it now!"
33120-35 = "What am I looking at?"
33120-36 = "Are these what Sensei and the others were fighting against?"
33120-37 = "Those outfits..."
33120-38 = "It's the Saint Justina Council!"
33120-39 = "Wh-What?!"
33120-40 = "..."
33120-41 = "Hanako..."
33120-42 = "..."
33120-48 = "..."
33120-53 = "The Council, the Eden Treaty, and the attacks on the Tea Party... "
33120-61 = "The Arius Squad, the First Council, the cathedral, the launch point, the timing of the coup d'etat..."
33120-67 = "The catacombs, the rumors about the theme park, the location of Arius' district..."
33120-77 = "The guardians of the commandments, the Eden Treaty, Eden, paradise..."
33120-80 = "..."
33120-81 = "Hanako? Are you okay?"
33120-82 = "..."
33120-83 = "I may have an idea."
33120-84 = "It relies on making several assumptions, but if my theory is correct..."
33120-85 = "...we may already be too late."
33120-86 = "Huh?"
33120-87 = "It will only be a matter of time before Trinity and Gehenna disappear from Kivotos if things continue like this."
33120-89 = "Just as Arius did after the First Council."
33120-91 = "Next Episode;A Side Beyond Reach"

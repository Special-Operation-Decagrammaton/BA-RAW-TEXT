[translation]
33120-1 = "第12話;加速する混乱（２）"
33120-2 = "先生の容体は！？"
33120-3 = "現在は救護騎士団の部屋に！団員の情報によると出血多量ですが、応急処置はきちんとなされているとのことで……"
33120-4 = "ご無事なんですね……！？"
33120-5 = "は、はい。幸い命に別状は無さそうなのですが、意識を取り戻せてないと……。"
33120-6 = "意識が……先生……。"
33120-10 = "分析結果が出ました！古聖堂に向けて放たれていたのは、ラムジェットエンジンのものではありません！"
33120-11 = "！！"
33120-12 = "ラムジェットではない……となるとゲヘナは、そんなあり得ないレベルの技術をどうやって手に入れたんですか？"
33120-13 = "発射位置についても現在確認中……！"
33120-14 = "ゲヘナのどの連中ですか、場所さえわかれば……！"
33120-15 = "い、いえ、それが……"
33120-16 = "詳しい位置は特定できませんが……発射地点は「トリニティ自治区の内部」です！"
33120-17 = "……！！"
33120-18 = "カメラの映像が復旧しました、古聖堂が爆発された時のものです！現在古聖堂でゲヘナと交戦中の、シスターたちの報告と一致します！！"
33120-20 = "映像、再生します！"
33120-35 = "これは……"
33120-36 = "先生やみなさんが戦っていたのは、まさか……？"
33120-37 = "あ、あれは……。"
33120-38 = "……「ユスティナ聖徒会」です。"
33120-39 = "え、えっ……！？"
33120-40 = "……。"
33120-41 = "は、ハナコさん……。"
33120-42 = "…………。"
33120-48 = "…………………………………。"
33120-53 = "ユスティナ聖徒会、エデン条約、あの襲撃……"
33120-61 = "アリウススクワッド、第一回公会議、古聖堂、発射地点とタイミング……"
33120-67 = "カタコンベ、アミューズパークの怪談、アリウス自治区の位置……"
33120-77 = "戒律の守護者…………エデン条約……「エデン」…………"
33120-80 = "……"
33120-81 = "は、ハナコさん……！？大丈夫ですか！？"
33120-82 = "……。"
33120-83 = "……仮定に過ぎません。"
33120-84 = "数十にも渡る飛躍を前提としていますが、しかし、万が一これが本当なら……"
33120-85 = "これを解決できる方法は、存在しない……？"
33120-86 = "……え？"
33120-87 = "このままでは……トリニティとゲヘナは文字通り、キヴォトスの地図から消えてしまいます。"
33120-89 = "……かつて「第一回公会議」の後、アリウスがそうなったように。"
33120-91 = "次回;届かない向こう側"

[translation]
33120-1 = "第12話;加速的混亂（２）"
33120-2 = "老師的情況呢！？"
33120-3 = "目前在救護騎士團的房間！根據團員的情報雖然有大量的出血，不過有確實做了應急措施……"
33120-4 = "也就是沒事吧……！？"
33120-5 = "是，是的。雖然幸好沒有性命上的安危，不過還沒有恢復意識……"
33120-6 = "意識還沒……老師……"
33120-10 = "分析結果出來了！往古教堂發射的導彈，並不是由衝壓引擎驅動！"
33120-11 = "！！"
33120-12 = "不是衝壓……這樣的話格黑娜，是怎麼獲得那種不可能等級的技術？"
33120-13 = "關於發射位置仍在確認中……！"
33120-14 = "是格黑娜的哪些人呢，只要知道位置的話……！"
33120-15 = "不，不是，那是……"
33120-16 = "雖然沒辦法特定詳細位置……不過發射地點是「三一自治區的內部」！"
33120-17 = "……！！"
33120-18 = "監視器的影像修復了，是古教堂發生爆炸時的影像！和目前在古教堂和格黑娜交戰中的，修女們的報告一致！！"
33120-20 = "影像，播放！"
33120-35 = "這是……"
33120-36 = "老師和大家在戰鬥的，該不會是……？"
33120-37 = "那，那是……"
33120-38 = "……是「優斯提娜聖徒會」。"
33120-39 = "咦，咦……！？"
33120-40 = "……"
33120-41 = "花，花子同學……"
33120-42 = "…………"
33120-48 = "…………………………………"
33120-53 = "優斯提娜聖徒會、伊甸園條約、那個襲擊……"
33120-61 = "奧利斯小隊、第一次公會議、古教堂、發射地點和時機……"
33120-67 = "地下墓穴、遊樂園的怪談、奧利斯自治區的位置……"
33120-77 = "戒律的守護者…………伊甸園條約……「伊甸園」…………"
33120-80 = "……"
33120-81 = "花，花子同學……！？還好嗎！？"
33120-82 = "……"
33120-83 = "……這只是假設。"
33120-84 = "雖然是非常飛躍性的思考，不過，萬一這是真的……"
33120-85 = "可以解決這個的方法，並不存在……？"
33120-86 = "……咦？"
33120-87 = "這樣下去……三一和格黑娜會和字面上的意思一樣，從奇普托斯的地圖上消失。"
33120-89 = "……就像過去「第一次公會議」後的，奧利斯一樣。"
33120-91 = "下一話;遙不可及的另一側"

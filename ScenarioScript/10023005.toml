[translation]
10023005-1 = "Prologue;I Told You, That Uniform is Dangerous"
10023005-2 = "Toki's Office"
10023005-3 = "Welcome, Sensei."
10023005-4 = "I'm still settling in, so I hope you can excuse the lackluster atmosphere."
10023005-5 = "[s] \"Are you here by yourself, Toki?\""
10023005-6 = "...Technically, yes. Yes, I am."
10023005-7 = "The others are on the field, completing a mission."
10023005-8 = "Yes...completing a mission...something that I have yet to do, despite also being a C&C member..."
10023005-9 = "Well, it's not as if I'm needed. They're already a well-oiled machine on their own."
10023005-10 = "My call sign, Zero-Four, can just collect dust...neglected and forgotten... *sniff*"
10023005-11 = "[s] \"A-Are you, by chance, um...upset?\""
10023005-12 = "Why would you ask that? I am a professional, highly-trained agent. I do not care. I. Am. Fine."
10023005-13 = "[s1] \"You're trying really hard to convince me...\"\n[s2] \"You sound like this is your last straw...\""
10023005-14 = "Your assessment of the situation is entirely incorrect, Sensei."
10023005-15 = "Your assessment of the situation is entirely incorrect, Sensei."
10023005-16 = "I have never been better. My heart rate has remained constant, and I have not exhibited any of the usual physical symptoms of an emotional response."
10023005-17 = "And regardless of my feelings, Seminar has refused to transfer me to another department in any official capacity."
10023005-18 = "The only people I am currently permitted to take orders from would be the General Student Council. Which, consequently, would mean you, as a member of Schale."
10023005-19 = "Therefore, unless you need me to sort paperwork or get coffee for you today, I am on indefinite standby. Which is fine. Completely and utterly fine."
10023005-20 = "[s] \"Toki...?\""
10023005-21 = "I am a professional. Professionals do not complain about their assignments. Or even the lack thereof. I have no problems with the current situation."
10023005-22 = "[s] \"...\""
10023005-23 = "Yes. No problem."
10023005-24 = "..."
10023005-25 = "I understand the meaning behind your expression, and I maintain my dissent."
10023005-26 = "Anyways, can I help you with anything? Oh! Is that what you came here for? To request C&C for work? Something I could do? \n"
10023005-27 = "...Ahem. Not that I am hoping for any such thing. Because I am fine with the situation as it is."
10023005-28 = "[s] \"I actually did have something...\""
10023005-29 = "...I appreciate the effort, but it's fine, Sensei."
10023005-30 = "[s] \"H-Huh? What do you mean?\""
10023005-31 = "I know what you're doing. You're trying to make me feel better."
10023005-32 = "There's no need. I don't need some menial task, born from your pity."
10023005-33 = "I am nowhere near lonely, melancholy, or bored enough to raid Seminar myself and demand work. Not even close."
10023005-34 = "[s3] \"I'm not making up orders for you, I promise.\" \n[s4] \"I do have a genuine request of C&C!\""
10023005-39 = "Analyzing the slight furrow of your brow and earnest gleam in your eyes... You're serious."
10023005-40 = "I will respond to your resolve in kind."
10023005-41 = "We must have the correct ambiance for your request. Would you like some tea, Sensei?"
10023005-42 = "You don't need any? But..."
10023005-43 = "Understood. It's just... This is my first assignment since joining C&C."
10023005-44 = "It's juvenile but...it also feels like a significant moment for me."
10023005-45 = "I'm ready. What is my very first mission as a C&C member?"
10023005-46 = "[ns] \"I need maid uniforms. \""
10023005-47 = "...Maid uniforms?"
10023005-48 = "..."
10023005-49 = "...I see."
10023005-50 = "[s] \"What was with that judgmental silence?!\""
10023005-51 = "It was not judgment but rather...curiosity as to when and why you began wearing maid uniforms, Sensei."
10023005-52 = "But, as I said, I will not judge you. I hope the ones here will fulfill your needs... It may be difficult, but I'll try to find a spare in your size."
10023005-53 = "If this is an urgent request, would you like me to take mine off? I'm doubtful it will fit, however..."
10023005-54 = "[s] \"Wait, wait, wait! You misunderstood!\""
10023005-56 = "[ns] \"I need maid uniforms for the Game Development Department!\""
10023005-57 = "What?"
10023005-58 = "The Game Development Department...?"

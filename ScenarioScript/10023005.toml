[translation]
10023005-1 = "序幕;因為我是善解人意的女僕"
10023005-2 = "季的辦公室"
10023005-3 = "恭候多時了，老師。"
10023005-4 = "很抱歉是個未經裝飾的房間，還請您諒解。"
10023005-5 = "[s]「咦，現在只有季一個人？」"
10023005-6 = "……是的。目前就是如此。"
10023005-7 = "因為前輩們去執行任務了。"
10023005-8 = "而我雖然一直是C&C所屬，卻不曾和前輩們一起執行任務……"
10023005-9 = "沒被派去執行任務也是無可奈何的事……"
10023005-10 = "沒錯，代號Zero Four之名正在哭泣。哭哭。"
10023005-11 = "[s]「……你是不是有點生氣？」"
10023005-12 = "並沒有。我和平時一樣。"
10023005-13 = "[s1]「越是常說那種話的人……」\n[s2]「好像越容易感情用事……？」"
10023005-14 = "老師您似乎有什麼誤會……"
10023005-15 = "老師您似乎有什麼誤會……"
10023005-16 = "我現在極度的冷靜。#n簡直可以說是心如止水。"
10023005-17 = "此外，研討會拒絕了對我命令權的繼承。#n因此，現在能對我下達指示的──"
10023005-18 = "只有夏萊──也就是只有老師而已。#n所以，除非老師對我下達命令……"
10023005-19 = "否則我就只能永遠在這裡待命。#n沒錯，大概就是這樣，嗯嗯。"
10023005-20 = "[s]「季……？」"
10023005-21 = "我只是在陳述事實罷了，請您不用在意。"
10023005-22 = "[s]「……」"
10023005-23 = "沒錯，沒有任何問題。"
10023005-24 = "……"
10023005-25 = "……怎麼了嗎？"
10023005-26 = "找我有什麼事嗎？#n……找C&C的代號Zero Four，我飛鳥馬季。"
10023005-27 = "不……非常抱歉。#n我很清楚老師並沒有那種打算。"
10023005-28 = "[s]「有是有，不過……」"
10023005-29 = "沒關係的，老師。您不必操心。"
10023005-30 = "[s]「是真的有哦！？」"
10023005-31 = "不必為了顧慮我的心情增加多餘的工作。"
10023005-32 = "和我剛才說的一樣，我現在極度的冷靜。"
10023005-33 = "寂寞、不安……既然閒到不行就來搞點事吧～#n完全沒有這些想法，嗯嗯。"
10023005-34 = "[s3]「那個……雖然不是指示也不是命令……」\n[s4]「我確實有事想拜託季。」"
10023005-39 = "看您的表情……似乎是認真的呢。"
10023005-40 = "那麼我也使出全力來回應吧。"
10023005-41 = "如果需要長時間討論的話，我替您泡杯茶如何，老師？"
10023005-42 = "……沒關係是嗎，我知道了。 "
10023005-43 = "這是我身為C&C的代號Zero Four，從老師手上收到的第一個委託。"
10023005-44 = "是個值得紀念的瞬間呢。#n究竟會被要求做什麼事呢……"
10023005-45 = "……我已經做好心理準備。#n那麼，能請您這就開始說明嗎？"
10023005-46 = "[ns]「……我想要女僕裝。」"
10023005-47 = "……女僕裝，是嗎？"
10023005-48 = "……"
10023005-49 = "………………這樣啊。"
10023005-50 = "[s]「先等一下！剛才的沉默是什麼意思！？」"
10023005-51 = "只是在想原來老師有那種興趣啊。#n不，我只需要執行命令而已。"
10023005-52 = "但是──嗯，在這裡的這些是否能讓老師滿意呢？#n尺寸也是個問題，我先去看看是否有預備的衣服。"
10023005-53 = "啊啊……如果急用的話，要不要當場脫給您呢？#n尺寸是否正確我就不清楚了。"
10023005-54 = "[s]「等等，你誤會了！」"
10023005-56 = "[ns]「要穿女僕裝的是遊戲開發部的孩子們！」"
10023005-57 = "嗯……？"
10023005-58 = "遊戲開發部，是嗎？"

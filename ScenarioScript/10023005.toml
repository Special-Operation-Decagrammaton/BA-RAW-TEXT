[translation]
10023005-1 = "บทเริ่มต้น;อย่างที่บอกไปค่ะว่าชุดนั้นมันอันตราย"
10023005-2 = "สำนักงานของโทคิ"
10023005-3 = "เชิญค่ะ คุณครู"
10023005-4 = "สภาพห้องของฉันอาจไม่เป็นที่น่าดูนัก ยังไงก็ต้องขอโทษด้วยนะคะ"
10023005-5 = "[s] \"ตอนนี้โทคิอยู่คนเดียวเหรอ?\""
10023005-6 = "... ตอนนี้ก็ ใช่ค่ะ"
10023005-7 = "พวกรุ่นพี่ออกไปทำภารกิจกันน่ะค่ะ"
10023005-8 = "ถึงตอนนี้ฉันจะสังกัด C&C แล้ว แต่ก็ไม่ได้ทำภารกิจร่วมกับพวกรุ่นพี่ค่ะ..."
10023005-9 = "มันก็ช่วยไม่ได้นี่คะที่ฉันไม่ได้ถูกเรียกให้ไปทำภารกิจด้วย..."
10023005-10 = "ใช่ค่ะ รหัสประจำตัวซีโร่โฟร์กำลังร้องไห้อยู่ค่ะ ฮือ ฮือ..."
10023005-11 = "[s] \"... ไม่ได้โกรธหรอกใช่ไหม?\""
10023005-12 = "ฉันเป็นปกติมากค่ะ ตอนนี้ไม่ได้งอนหรืออารมณ์เสียแม้แต่นิดเดียวเลยค่ะ"
10023005-13 = "[s1] \"... แต่ยิ่งพูดอย่างนั้นก็ยิ่ง...\"\n[s2] \"แบบนี้ถือว่าน่าอันตรายอยู่นะ...\""
10023005-14 = "คุณครูคงกำลังเข้าใจอะไรผิดไปนะคะ"
10023005-15 = "คุณครูคงกำลังเข้าใจอะไรผิดไปนะคะ"
10023005-16 = "ฉันปกติมากค่ะ ทั้งจิตใจ ทั้งความรู้สึกของฉันมันไม่มีความรู้สึกอะไรเลยค่ะ"
10023005-17 = "แถมทางเซมิน่ายังปฏิเสธที่จะรับช่วงต่อในการสั่งงานฉัน ดังนั้นตอนนี้คนที่สั่งงานอะไรฉันได้อย่างเป็น#nทางการก็คือ..."
10023005-18 = "ชาเล่ต์ที่ขึ้นตรงกับองค์การนักเรียน... และคุณครูที่สังกัดในนั้นอีกทีค่ะ ดังนั้นถ้าคุณครูไม่สั่งงานฉัน..."
10023005-19 = "ฉันก็ไม่มีทางเลือกอื่นนอกจากต้องสแตนด์บายรองานอย่างไม่มีที่สิ้นสุดค่ะ แต่ก็ไม่เป็นไรหรอกค่ะ"
10023005-20 = "[s] \"โทคิ...?\""
10023005-21 = "ฉันไม่เป็นไรค่ะ ไม่มีปัญหาอะไรทั้งนั้นค่ะ"
10023005-22 = "[s] \"......\""
10023005-23 = "สบายมาก ไร้ปัญหาค่ะ"
10023005-24 = "......"
10023005-25 = "ทำไมถึงมองกันด้วยสายตาแบบนั้นล่ะคะ?"
10023005-26 = "หรือว่ามีงานอะไรจะสั่งฉันหรือเปล่าคะ? ถ้าเป็นไปได้ก็สั่งในฐานะ C&C ไหมคะ?"
10023005-27 = "แต่ก็นะ ฉันรู้ดีค่ะว่าไม่มีทางเป็นแบบนั้นได้"
10023005-28 = "[s] \"คือว่า... งานน่ะมันก็มีอยู่หรอกนะ\""
10023005-29 = "ไม่เป็นไรหรอกค่ะคุณครู ไม่ต้องฝืนก็ได้ค่ะ"
10023005-30 = "[s] \"ฝืนอะไรเหรอ?!\""
10023005-31 = "ฉันหมายความว่า คุณครูไม่ต้องพยายามทำให้ฉันรู้สึกดีขึ้นก็ได้ค่ะ"
10023005-32 = "ก็อย่างที่บอกไปแล้วค่ะว่าฉันรู้สึกปกติมาก มากเหลือเกินด้วยซ้ำไปค่ะ"
10023005-33 = "ฉันไม่ได้รู้สึกเหงา เปล่าเปลี่ยว ว่างงาน หรือเบื่อกับการรอจนจะไปก่อเรื่องอะไรเลยสักนิดค่ะ"
10023005-34 = "[s3] \"นี่ไม่ใช่คำสั่งของครูหรอกนะ\"\n[s4] \"แต่ครูก็มีเรื่องที่อยากรบกวน C&C อยู่น่ะ\""
10023005-39 = "ดูจากสายตาและสีหน้าแล้ว... ที่พูดมาเป็นความจริงสินะคะ"
10023005-40 = "ถ้าอย่างนั้นฉันก็ต้องมีท่าทีที่สอดคล้องกับคำขอของคุณครูสินะคะ"
10023005-41 = "ดูจะเป็นเรื่องที่ต้องคุยกันยาวเลยนะคะ ให้ฉันไปเตรียมชามาให้ดีไหมคะคุณครู?"
10023005-42 = "ไม่เป็นไรงั้นเหรอคะ? แต่ว่า..."
10023005-43 = "ก็ได้ค่ะ พอดีนี่เป็นภารกิจแรกที่ฉันจะได้ทำในฐานะ C&C"
10023005-44 = "ก็เลยเป็นช่วงเวลาแห่งประวัติศาสตร์ของฉันน่ะค่ะ"
10023005-45 = "คำขอของคุณครูในช่วงเวลาแห่งประวัติศาสตร์นี้คืออะไรกันคะ?"
10023005-46 = "[ns] \"ครูอยากได้ชุดเมดน่ะ\""
10023005-47 = "...... ชุดเมดเหรอคะ?"
10023005-48 = "......"
10023005-49 = "......... อย่างนี้นี่เอง"
10023005-50 = "[s] \"เดี๋ยวก่อน! ทำไมเมื่อกี้ถึงเงียบแปลกๆ ล่ะ?!\""
10023005-51 = "ฉันแค่คิดน่ะค่ะว่าทำไมจู่ๆ คุณครูถึงได้อยากใส่ชุดเมดขึ้นมา มันก็น่าสนใจดีนะคะ"
10023005-52 = "แต่ว่า... ชุดที่อยู่ตรงนี้จะทำให้คุณครูพอใจได้หรือเปล่าคะ มันน่าจะติดเรื่องไซซ์ด้วย เอาเป็นว่าฉันจะ#nไปเช็กมาให้ก่อนนะคะว่ามีชุดเหลือหรือเปล่า"
10023005-53 = "อ่า... ถ้าคุณครูอยากรีบใช้ชุด งั้นให้ถอดตรงนี้เลยไหมคะ? ไม่รู้เหมือนกันนะคะว่าไซซ์จะพอดีหรือเปล่า"
10023005-54 = "[s] \"เดี๋ยวก่อน เข้าใจผิดแล้ว!\""
10023005-56 = "[ns] \"คนใส่ไม่ใช่ครู ชมรมพัฒนาเกมต่างหาก!\""
10023005-57 = "คะ?"
10023005-58 = "ชมรม... พัฒนาเกมเหรอคะ?"

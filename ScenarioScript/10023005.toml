[translation]
10023005-1 = "#title;프롤로그;말씀드렸듯이, 그 옷은 위험합니다."
10023005-2 = "#place;토키의 오피스"
10023005-3 = "3;토키 모드 1;99;어서 오십시오, 선생님.\n#3;a\n#3;em;[반응]\n#3;greeting"
10023005-4 = "3;토키 모드 1;02;조금 살풍경한 공간일지도 모르겠습니다만, 그 부분은 양해를 부탁드립니다."
10023005-5 = "[s] \"어라, 토키는 지금 혼자야?\""
10023005-6 = "3;토키 모드 1;01;……일단은, 그렇습니다.\n#3;em;…"
10023005-7 = "3;토키 모드 1;99;선배님들은 임무에 가 버리신 상태고."
10023005-8 = "3;토키 모드 1;02;저는, 지금까지 C&C 소속이긴 했어도, 선배님들과 임무를 수행하고 있던 것은 아니니……"
10023005-9 = "3;토키 모드 1;01;임무에 불리지 않는 것도 어쩔 수 없는 일입니다……."
10023005-10 = "3;토키 모드 1;99;네, 콜사인 제로포의 이름이 울고 있네요. 훌쩍훌쩍.\n#3;em;[훌쩍]"
10023005-11 = "[s] \"……화 난 거 아니지?\""
10023005-12 = "3;토키 모드 1;99;저는 완전히 정상이며, 조금도 토라지거나 삐쳐 있지 않습니다."
10023005-13 = "[s1] \"……하지만 그런 말을 하는 사람일수록.\"\n[s2] \"오히려 위험한 상황에 처해 있다던데…….\""
10023005-14 = "3;토키 모드 1;02;무언가 잘못 생각하고 계신 것 같습니다만, 선생님."
10023005-15 = "3;토키 모드 1;02;무언가 잘못 생각하고 계신 것 같습니다만, 선생님."
10023005-16 = "3;토키 모드 1;99;저는 지극히 정상입니다. 심경의 변화도, 기분의 급격한 요동침도 없습니다."
10023005-17 = "3;토키 모드 1;99;덧붙여, 세미나에서는 저에 대한 명령권의 인수인계를 거부한 상태이고, 그렇기에 공식적으로 저에게 무언가를 지시할 수 있는 것은."
10023005-18 = "3;토키 모드 1;99;총학생회의 샬레…… 그리고 그 구성원이신 선생님뿐이며, 따라서 선생님께서 저에게 지시를 내려 주시지 않는 한.\n#3;em;…"
10023005-19 = "3;토키 모드 1;01;저는 무한히 대기 상태를 유지할 수밖에 없게 되어 버렸습니다만, 괜찮습니다."
10023005-20 = "[s] \"토키……?\""
10023005-21 = "3;토키 모드 1;99;저는 괜찮습니다. 아무 문제 없습니다."
10023005-22 = "[s] \"…….\""
10023005-23 = "3;토키 모드 1;02;문제없습니다."
10023005-24 = "3;토키 모드 1;02;……"
10023005-25 = "3;토키 모드 1;01;왜 그런 시선으로 바라보시죠?"
10023005-26 = "3;토키 모드 1;02;아니면, 제게 무언가 지시하실 사항이라도 있으신가요? 가능하면 C&C의 이름으로?\n#3;em;[?]"
10023005-27 = "3;토키 모드 1;99;물론 그럴 리가 없다는 것쯤은 인지하고 있습니다만."
10023005-28 = "[s] \"그…… 있긴 있어.\""
10023005-29 = "3;토키 모드 1;99;괜찮습니다. 선생님. 무리하지 않으셔도 됩니다.\n#3;greeting"
10023005-30 = "[s] \"뭐가?!\""
10023005-31 = "3;토키 모드 1;01;일부러 제 기분을 맞춰 주시려고 애쓰시지 않으셔도 된다는 이야기였습니다."
10023005-32 = "3;토키 모드 1;02;말씀드렸다시피, 저는 지극히 평온한 기분이기에."
10023005-33 = "3;토키 모드 1;99;절대로 외롭다거나, 쓸쓸하다거나, 한가하고 지루하다 못해 사고를 쳐 버릴까 같은 감정을 느끼고 있지도 않습니다."
10023005-34 = "[s3] \"명령이나 지시 같은 것은 아니지만.\"\n[s4] \"C&C에게 부탁하고 싶은 것이라면…… 있기는 해.\""
10023005-35 = "#st;[0,0];instant;1;"
10023005-36 = "#st;[0,0];instant;1;"
10023005-37 = "#clearST"
10023005-38 = "3;토키 모드 1;07\n#3;em;…\n#wait;2500"
10023005-39 = "3;토키 모드 1;01;그 눈빛과 표정…… 이건 진심이시군요."
10023005-40 = "3;토키 모드 1;02;그렇다면 저 역시 그에 상응하는 태도를 보여야 하겠군요."
10023005-41 = "3;토키 모드 1;01;가벼이 흘려들을 이야기는 아닌 것으로 보입니다. 차라도 내올까요, 선생님?\n#3;m4"
10023005-42 = "3;토키 모드 1;01;괜찮으시다고요? 하지만…… \n#3;em;[?]"
10023005-43 = "3;토키 모드 1;99;알겠습니다. 이것은 C&C인 저에게 처음으로 보내는 의뢰."
10023005-44 = "3;토키 모드 1;01;어떤 의미로는 역사적인 순간이군요."
10023005-45 = "3;토키 모드 1;03;이 역사적인 순간에 선생님께서 하실 부탁이란, 도대체?\n#3;em;[반응]\n#3;m3"
10023005-46 = "[ns] \"메이드복이 필요해. \""
10023005-47 = "3;토키 모드 1;04;……메이드, 복이요?\n#3;em;[?]"
10023005-48 = "3;토키 모드 1;04;……."
10023005-49 = "3;토키 모드 1;99;…………그렇군요."
10023005-50 = "[s] \"잠깐! 방금 그 요상한 침묵은 뭐야?!\""
10023005-51 = "3;토키 모드 1;02;선생님께서 무슨 일로 갑자기 메이드복을 입고 싶어 하시게 된 건지, 흥미롭다고 생각했을 뿐입니다."
10023005-52 = "3;토키 모드 1;01;하지만…… 어떨까요, 여기 있는 것으로 과연 만족하실 수 있을지. 사이즈 문제도 있을 것이고, 일단 여분이 있는지부터 확인하고 오겠습니다.\n#3;em;…"
10023005-53 = "3;토키 모드 1;01;아…… 혹시 급하게 필요하시다면, 이 자리에서 벗을까요? 크기가 맞을지는 모르겠지만요."
10023005-54 = "[s] \"잠깐만, 오해야!\""
10023005-55 = "#wait;1000"
10023005-56 = "[ns] \"내가 아니라 게임개발부 아이들 쪽이니까!\""

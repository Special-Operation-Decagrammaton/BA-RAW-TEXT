[translation]
1008302-1 = "守護宅邸的貓"
1008302-5 = "……以上是我們百花繚亂今年各季的訓練計畫及營運目標。"
1008302-6 = "若以這份文件為基礎，今年應該能和夏萊維持更密切的業務合作關係。"
1008302-14 = "我想說的都說完了。"
1008302-15 = "……有問題請發問。"
1008302-16 = "[s1]「嗯，目前沒有特別想問的問題。」\n[s2]「資料和說明都很好理解，非常完美。」"
1008302-19 = "是嗎。"
1008302-20 = "[s]「這麼短的時間就能有這麼棒的完成度，真不愧是桔梗。」"
1008302-21 = "哼，這種冠冕堂皇的話大可不必。"
1008302-22 = "身為百花繚亂的作戰參謀，這點程度只是基本而已。"
1008302-23 = "……況且我們才剛重新起步。"
1008302-24 = "為了讓百花繚亂恢復昔日風光，「可以利用的手段越多越好」。#n和夏萊的業務合作也是其中之一。"
1008302-25 = "雖然任重而道遠，也只能在能力範圍內慢慢前進。"
1008302-26 = "[s]「有桔梗在的百花繚亂很令人放心。」"
1008302-27 = "……你有在聽我說話嗎？#n明明已經提到了「手段」兩個字──"
1008302-28 = "你還覺得無所謂？"
1008302-29 = "……真是的。#n說得像別人的事一樣簡單。"
1008302-30 = "算了，我要說的就是這些。#n如果沒別的事就先這樣吧。"
1008302-31 = "[s]「啊，嗯。今天辛苦你了，桔梗。」"
1008302-32 = "…………"
1008302-33 = "嗯……"
1008302-34 = "我這麼說沒有別的意思……"
1008302-35 = "老師今天特地來一趟也辛──"
1008302-44 = "──辛苦你了。#n記得確認有沒有把東西掉在這裡，我就不送行了。"
1008302-45 = "[s]「那個……桔梗。天花板好像突然塌了耶。」"
1008302-46 = "你不需要在意那種事。"
1008302-47 = "走吧，出口在那邊。"
1008302-51 = "啊，小心別踩到那裡的瓦礫。"
1008302-52 = "要是跌倒就麻煩了……"
1008302-59 = "[ns]「桔梗！？你腳下的地板塌了耶！？」"
1008302-60 = "……這不算什麼。"
1008302-61 = "你不需要在意……"
1008302-67 = "[ns]「怎麼看都不像沒什麼吧！？到底怎麼回事……？」"
1008302-71 = "……唉。"
1008302-73 = "[ns]「你說是因為建築老化？」"
1008302-74 = "……沒錯。"
1008302-75 = "這間調停室自百花繚亂成立以來就一直存在……卻已經很久沒進行修繕作業了。"
1008302-76 = "古老的建築只要不加以整頓，很快就會變得破舊不堪。"
1008302-77 = "無論是看得到還是看不到的地方，甚至每個角落都要整修也不奇怪。"
1008302-78 = "但這終究是我們百花繚亂的事，不需要夏萊的老師費心。"
1008302-79 = "所以你就乖乖回去吧……"
1008302-80 = "[s]「不，這可不行！」"
1008302-84 = "什麼？"
1008302-85 = "既然看到了……就不能視而不見？"
1008302-86 = "……為什麼？"
1008302-87 = "[s]「就算你這麼問也……」"
1008302-88 = "修復這間建築對你沒有任何好處吧？"
1008302-89 = "即使是主動幫忙，這件事對像你這樣的外人來說也只是在浪費時間……"
1008302-90 = "為什麼要自找麻煩多管閒事……"
1008302-91 = "[s]「因為我想幫助遇到困難的學生。」"
1008302-95 = "唉……好吧。"
1008302-96 = "既然你執意多管閒事，那就隨你高興吧。"
1008302-97 = "順便一提，我得處理百花繚亂的工作，可沒閒工夫幫你。"
1008302-98 = "……我本來打算完成工作之後再自己處理，結果你卻自告奮勇說要幫忙。"
1008302-99 = "嗯，既然那麼愛管閒事，就讓你管個夠吧？"
1008302-100 = "[s]「真的嗎？是你說可以的哦！包在我身上！」"
1008302-113 = "（實在無法理解）"
1008302-114 = "（說什麼看到有人遇到困難就想幫忙……#n　幫助陷入困境的學生是理所當然的事……）"
1008302-115 = "（反正八成只是嘴上功夫……）"
1008302-116 = "（只是因為在當下視而不見有失面子，才不得不做做樣子吧？）"
1008302-117 = "（這種被棄置很久的建築，可不是稍微幫忙就能修好的）"
1008302-123 = "……哼。"
1008302-124 = "反正馬上就會開始抱怨了。"
1008302-129 = "（於是便開始修理調停室的各個角落，不知不覺過了5個小時……）"
1008302-135 = "[ns]「地板這樣就行了，接著修理天花板吧。」"
1008302-137 = "……等等，你還想繼續嗎？"
1008302-138 = "[s]「嗯？因為地板已經處理好了，但天花板還沒……」"
1008302-139 = "已經這麼晚了哦？#n難道你其實很閒嗎？"
1008302-140 = "因為你已經答應要幫忙修了……？"
1008302-141 = "這不算什麼，有把握在3小時之內完成……？"
1008302-142 = "……簡直讓人無言以對。"
1008302-146 = "…………"
1008302-147 = "好吧，我知道了。"
1008302-152 = "要修天花板就拿這個梯子去用吧，我幫你扶著。"
1008302-153 = "需要什麼工具就告訴我，我會在底下遞給你。"
1008302-154 = "[s]「不過桔梗……你不是說有事要忙嗎？」"
1008302-155 = "……你以為我是誰？#n工作已經全部搞定了。"
1008302-156 = "而且……再讓你一個人修理也只會拖延修理完成的時間而已。"
1008302-157 = "所以我也會幫忙。"
1008302-158 = "[s]「是嗎？謝謝你。那我就不客氣了，一起加油吧！」"
1008302-159 = "……哼。"
1008302-166 = "[ns]「好，這樣就全部結束了。辛苦了，桔梗。」"
1008302-167 = "……辛苦的是你才對。"
1008302-168 = "想不到……真的在今天之內全部修好了……"
1008302-169 = "我承認……似乎是我誤判你了。"
1008302-170 = "[s]「你這樣說，我有點不好意思耶。」"
1008302-175 = "[ns]「總之這樣就大功告成了，我先回去囉。」"
1008302-179 = "[ns]「那個……桔梗？為什麼要拉住我的衣角……」"
1008302-183 = "……啊。"
1008302-187 = "……沒事，沒有什麼特別的原因。"
1008302-188 = "只是現在已經過了晚餐時間……"
1008302-189 = "等你回到夏萊應該也接近深夜了……"
1008302-190 = "所以……為了表示謝意……"
1008302-191 = "……我可以招待你吃個晚餐。"
1008302-192 = "只是想說這些而已。"
1008302-193 = "當然更好的做法是提供更合理的報酬……#n而且突然被招待吃晚餐，可能會有點困擾沒錯──"
1008302-195 = "[ns]「我想吃桔梗做的晚餐！一定會好好享用！」"
1008302-199 = "雖然提議要招待你的人好像不適合這麼說……有必要那麼開心嗎？"
1008302-200 = "我從剛才就在想，你這個人真的……"
1008302-201 = "……很奇怪。"
1008302-202 = "[s]「……咦！？有那麼奇怪嗎！？」"
1008302-203 = "……算了。"
1008302-204 = "先去洗手吧。"
1008302-210 = "我會精心準備能讓你滿意的晚餐。"
1008302-212 = "（之後便和桔梗共進晚餐，順便聊了聊合作業務以及身邊的瑣碎小事）"

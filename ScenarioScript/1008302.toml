[translation]
1008302-1 = "An Overprotective Cat"
1008302-5 = "...This concludes my report on the Hyakkaryouran's training and operation plans for the year."
1008302-6 = "Our intent is a close working relationship with Schale. We hope our transparency can help facilitate that."
1008302-14 = "That is all."
1008302-15 = "Any questions?"
1008302-16 = "[s1] \"Mm, nothing in particular for now.\"\n[s2] \"Your presentation was thorough and easy to understand.\""
1008302-19 = "Good."
1008302-20 = "[s] \"You're amazing, Kikyou. You put something this thorough together so quickly.\""
1008302-21 = "Please cease your pandering."
1008302-22 = "I am the Hyakkaryouran's operations officer. You should expect nothing less of me."
1008302-23 = "We are at last beginning to find our footing again."
1008302-24 = "The more resources we have, the better. Working with Schale is simply one amongst many methods I am employing."
1008302-25 = "The road may be long and the shadows dark, but we can only move forward."
1008302-26 = "[s] \"With Kikyou on the case, the Hyakkaryouran will be up and running in no time.\""
1008302-27 = "...I declared your existence merely a means to an end. Does that elicit no suspicions from Schale?"
1008302-28 = "...No? It's \"fine\"?"
1008302-29 = "You speak as if it has no bearing on your feelings whatsoever."
1008302-30 = "I suppose it's of no matter either way. I'll take my leave."
1008302-31 = "[s] \"Have a good night. And great work today, Kikyou.\""
1008302-32 = "..."
1008302-33 = "... ..."
1008302-34 = "Do not take this as more than it is."
1008302-35 = "But I would like to thank you—"
1008302-44 = "...for your presence here today. That is all. You can show yourself out now."
1008302-45 = "[s] \"...Um, Kikyou. The ceiling just collapsed.\""
1008302-46 = "Concern yourself not."
1008302-47 = "Idle chatter is time wasted. The exit is that way."
1008302-51 = "Do be careful of the debris."
1008302-52 = "It would be...bothersome if you injured yourself."
1008302-59 = "[ns] \"Kikyou?! The floorboards just collapsed under you?!\""
1008302-60 = "How many different ways can I say it is of no matter?"
1008302-61 = "You needn't worry. Truly."
1008302-67 = "[ns] \"I'm worried, okay?! What's happening here?\""
1008302-71 = "... *sigh*"
1008302-73 = "[ns] \"...The entire building is falling apart?!\""
1008302-74 = "...Yes. It's grown decrepit from neglect."
1008302-75 = "The regulatory office has existed since the establishment of the Hyakkaryouran."
1008302-76 = "Old buildings such as this one quickly fall into disrepair without proper maintenance."
1008302-77 = "So is its current state such a surprise? The situation is likely even more dire than what meets the eye."
1008302-78 = "But, again. Do not concern yourself. The Hyakkaryouran will handle the Hyakkaryouran's problems."
1008302-79 = "It is time for you to return to Schale."
1008302-80 = "[s] \"No, I can't!\""
1008302-84 = "Excuse me?"
1008302-85 = "...You cannot ignore this situation? You wish to assist with repairs?"
1008302-86 = "...Why? "
1008302-87 = "[s] \"What do you mean why?! It's falling apart!\""
1008302-88 = "There lies no benefit for you."
1008302-89 = "We can offer no reward. You are an outsider with no reason to concern yourself with the safety of our facilities."
1008302-90 = "There is no logical reason for you to assist."
1008302-91 = "[s] \"I want to help students who need help.\""
1008302-95 = "Hah. Fine."
1008302-96 = "Stick your meddling nose in our business. See if I care."
1008302-97 = "I am preoccupied with my own work, so I will lend no assistance. "
1008302-98 = "...You are the one who volunteered for this position after all."
1008302-99 = "Do you truly still wish to pursue this?"
1008302-100 = "[s] \"As long as you're okay with it, leave it to me!\""
1008302-113 = "(What incomprehensible behavior...)"
1008302-114 = "(They speak of such nonsensical ideals...providing aid...helping students...)"
1008302-115 = "(Ridiculous sentiments that mean nothing.)"
1008302-116 = "(Pity must be their motivation. I can think of no other reason to assist us.)"
1008302-117 = "(This building has been long abandoned. The amount of effort it would require to repair it...)"
1008302-123 = "...Hmph."
1008302-124 = "Sensei will grow tired of their posturing and turn tail soon."
1008302-129 = "After about five hours of repairing and working on the regulatory office..."
1008302-135 = "[ns] \"Finally finished the floor! Time to tackle the ceiling.\""
1008302-137 = "...You're still here?"
1008302-138 = "[s] \"Yup! I'm just about to get started on the ceiling!\""
1008302-139 = "Do you have no responsibilities? No work to get back to?"
1008302-140 = "...Just because you \"made a promise\" doesn't mean..."
1008302-141 = "...This is fine? You'll complete your work in another three hours?"
1008302-142 = "That is absurd. You are absurd."
1008302-146 = "..."
1008302-147 = "Fine."
1008302-152 = "Here. Take this tool. I will hold the ladder."
1008302-153 = "Whatever tool you require, ask and I will hand it to you."
1008302-154 = "[s] \"Uh, Kikyou... Weren't you busy with work?"
1008302-155 = "You have severely underestimated me if you mean to imply I would require more than five hours to complete my tasks."
1008302-156 = "And I am growing increasingly frustrated with your inefficiency."
1008302-157 = "So I will assist."
1008302-158 = "[s] \"Well, I'm not complaining! Let's get to it!\""
1008302-159 = "...Hmph."
1008302-166 = "[ns] \"That should cover everything! Good job, Kikyou.\""
1008302-167 = "...Likewise."
1008302-168 = "Really now. For you to repair this entire building in a day..."
1008302-169 = "It appears I must reevaluate my judgment of you."
1008302-170 = "[s] \"Stop! I'm blushing!\""
1008302-175 = "[ns] \"Since the building is up to safety codes now, I'll be on my—\""
1008302-179 = "[ns] \"K-Kikyou? I can't exactly leave if you're holding onto my shirt...\""
1008302-183 = "Ah."
1008302-187 = "I'm aware."
1008302-188 = "However, the hour has grown late. You have missed dinner, have you not?"
1008302-189 = "The return journey to Schale from here is long. It will likely be past midnight by the time you arrive home."
1008302-190 = "I'm not one to be indebted to another."
1008302-191 = "I would like to treat you to dinner as payment for the repairs. "
1008302-192 = "I will release your shirt now."
1008302-193 = "Perhaps dinner is not proper compensation for your work. Do not feel obligated to accept my invitation out of some vague sense of propriety."
1008302-195 = "[ns] \"Dinner with Kikyou? I'll enjoy every last bite!\""
1008302-199 = "Perhaps it's contradictory of me to question your acceptance, but is that such an enjoyable offer?"
1008302-200 = "Sensei, I am beginning to think..."
1008302-201 = "You are rather strange."
1008302-202 = "[s] \"Huh?! Why am I strange for being excited for dinner?\""
1008302-203 = "...Forget it."
1008302-204 = "Wash your hands."
1008302-210 = "I will prepare a dinner that will be worthy of this...excitement of yours."
1008302-212 = "Kikyou and I made small talk about Hyakkaryouran affairs, Schale's business, and more as we ate. It was a delicious dinner."

[translation]
1008302-1 = "น้องแมวที่ปกป้องคฤหาสน์"
1008302-5 = "...และนี่คือแผนการฝึกฝนและตารางปฏิบัติการแต่ละไตรมาสของเฮียกกะเรียวรันในปีนี้"
1008302-6 = "ถ้าเอาเอกสารนี้มาปรึกษาหารือกัน ฉันว่าเราน่าจะรักษาความสัมพันธ์กับชาเล่ต์ในแง่ความร่วมมือ#nทางการงานได้มากขึ้น"
1008302-14 = "เรื่องของฉันก็มีเท่านี้"
1008302-15 = "...ถ้ามีคำถามอะไรก็ถามได้เลย"
1008302-16 = "[s1] \"อืม ตอนนี้น่าจะยังไม่มีนะ\"\n[s2] \"เอกสารที่ให้มาก็อธิบายเข้าใจง่าย สมบูรณ์แบบเลย\""
1008302-19 = "อื้ม"
1008302-20 = "[s] \"ทำได้ขนาดนี้ภายในเวลาสั้นๆ สมแล้วที่เป็นคิเคียว เก่งมาก\""
1008302-21 = "ฮึ่ม ไม่ต้องมาอวยกันหรอก"
1008302-22 = "สำหรับที่ปรึกษายุทธศาสตร์เฮียกกะเรียวรันแล้ว นี่มันก็แค่เรื่องพื้นฐาน"
1008302-23 = "...ตอนนี้พวกเราเริ่มกลับมากอบกู้ชื่อเสียงกันอีกครั้ง"
1008302-24 = "เพื่อฟื้นฟูเฮียกกะเรียวรันให้กลับมาเหมือนเดิมแล้ว <ยิ่งมีวิธีการที่ใช้ได้มากเท่าไรก็ยิ่งดี> และการขอความร่วมมือกับชาเล่ต์ก็เป็นหนึ่งในวิธีการเหล่านั้น"
1008302-25 = "และต่อให้หนทางจะยาวไกล แต่ก็ต้องเริ่มจากสิ่งที่ทำได้อย่างค่อยเป็นค่อยไป"
1008302-26 = "[s] \"พอมีคิเคียว ครูก็หายห่วงเรื่องเฮียกกะเรียวรันนะ\""
1008302-27 = "...ตั้งใจฟังที่ฉันเพิ่งพูดไปอยู่รึเปล่า? ฉันพูดถึงเรื่องวิธีการไปนะ"
1008302-28 = "ถึงอย่างนั้นก็ไม่เป็นไรงั้นเหรอ?"
1008302-29 = "...จริงๆ เลย พูดง่ายเหมือนเป็นเรื่องของคนอื่นเลยนะคุณ"
1008302-30 = "เอาเถอะ งั้นก็ถือว่ารับทราบ จบธุระของฉันแล้ว ถ้าไม่มีอะไรจะพูดต่อ ฉันขอตัว"
1008302-31 = "[s] \"อ่า... อื้ม วันนี้ก็ขอบใจมากนะ คิเคียว\""
1008302-32 = "......"
1008302-33 = "ก็นะ..."
1008302-34 = "ถึงจะไม่มีอะไรเป็นพิเศษก็เถอะ"
1008302-35 = "แต่คุณก็ลำบากมาถึงที่นี่... ยังไงก็... ขอบคุณนะ"
1008302-44 = "ขากลับฉันไม่ไปส่งหรอกนะ ก่อนกลับก็ตรวจดูให้ดีด้วยล่ะว่าลืมอะไรไว้รึเปล่า"
1008302-45 = "[s] \"...เอ่อ คิเคียว จู่ๆ เพดานก็ร่วงลงมาน่ะ\""
1008302-46 = "นั่นไม่ใช่เรื่องที่ต้องสนใจหรอก"
1008302-47 = "เลิกพูดเรื่องไม่มีประโยชน์แล้วกลับไปเถอะ ทางออกอยู่ทางนี้"
1008302-51 = "อ้อ ระวังเศษเพดานที่ร่วงลงมาด้วยล่ะ"
1008302-52 = "ถ้าเกิดไปสะดุดล้มเข้าก็คงน่าเซ็ง......"
1008302-59 = "[ns] \"คิเคียว?! พื้นตรงที่คิเคียวยืนอยู่มันยุบลงไปแล้วนะ?!\""
1008302-60 = "...นี่ก็ไม่ใช่เรื่องใหญ่อะไรหรอก"
1008302-61 = "ไม่ต้องสนใจ..."
1008302-67 = "[ns] \"ไม่ใช่เรื่องใหญ่ไม่ได้นะแบบนี้?! เกิดเรื่องแบบนี้ได้ไง...?\""
1008302-71 = "...เฮ้อ"
1008302-73 = "[ns] \"เพราะตัวอาคารเก่าแล้วงั้นเหรอ?\""
1008302-74 = "...อื้ม ใช่แล้ว"
1008302-75 = "อาคารห้องไกล่เกลี่ยนี้ถูกใช้มาตั้งแต่เริ่มก่อตั้งเฮียกกะเรียวรัน... และมันก็ถูกปล่อยปละละเลย#nเป็นเวลานานจนถึงตอนนี้"
1008302-76 = "อาคารเก่าๆ น่ะ ถ้าขาดการบำรุงรักษาก็ทรุดโทรมลงแบบนี้เป็นธรรมดา"
1008302-77 = "ไม่น่าแปลกใจหรอกที่เราจะต้องฟื้นฟูในหลายๆ จุด ทั้งในจุดที่มองเห็นและไม่เห็น"
1008302-78 = "แต่มันก็เป็นธุระของเฮียกกะเรียวรัน ครูชาเล่ต์อย่างคุณไม่ต้องสนใจหรอก"
1008302-79 = "เพราะงั้นก็กลับ..."
1008302-80 = "[s] \"ไม่ ครูไม่สนใจไม่ได้หรอก!\""
1008302-84 = "ว่าไงนะ?"
1008302-85 = "พอเห็นว่ามันพังลงมาแล้ว จะให้แกล้งทำเป็นเหมือนไม่เคยเห็นไม่ได้ ก็เลยจะช่วยซ่อมให้งั้นเหรอ?"
1008302-86 = "...ทำไมล่ะ?"
1008302-87 = "[s] \"ถามมาได้ว่าทำไม...\""
1008302-88 = "ถึงจะมีการบูรณะอาคาร แต่มันก็ไม่เกี่ยวกับคุณไม่ใช่เหรอ? คุณไม่ได้ประโยชน์อะไรสักหน่อย"
1008302-89 = "ถึงจะแสดงเจตจำนงว่าจะช่วย แต่สำหรับคนอื่นอย่างคุณแล้ว มันก็คงเป็นแค่การเสียเวลาเท่านั้น..."
1008302-90 = "ทำไมจะต้องเข้ามายุ่มย่ามให้น่ารำคาญด้วยนะ..."
1008302-91 = "[s] \"ถ้านักเรียนลำบาก ครูก็อยากจะช่วยไง\""
1008302-95 = "เฮ้อ... ก็ได้"
1008302-96 = "ถ้าจะดึงดันขนาดนั้นละก็ จะทำอะไรก็ทำตามใจเลย"
1008302-97 = "ส่วนฉันมีงานของเฮียกกะเรียวรันที่ต้องทำ ฉันไม่อยู่ช่วยหรอกนะ"
1008302-98 = "...ฉันตั้งใจว่าจะซ่อมเองหลังจากเสร็จงานที่ฉันได้รับมอบหมาย แต่คุณมาบอกว่าจะซ่อมตามอำเภอใจ"
1008302-99 = "งั้นก็ได้ เอาตามนั้น ยุ่มยามให้สมใจเลย"
1008302-100 = "[s] \"จริงนะ? อนุญาตแล้วเนอะ? ดีละ! วางใจครูได้เลย!\""
1008302-113 = "(ไม่เห็นจะเข้าใจเลย)"
1008302-114 = "(อยากช่วยนักเรียนที่ตกอยู่ในความยากลำบากบ้างละ... ถ้าเจอนักเรียนที่ตกทุกข์ก็ย่อมต้องช่วยเหลือ#nบ้างละ...)"
1008302-115 = "(สุดท้ายก็เป็นแค่คำพูดหวานหู...)"
1008302-116 = "(เพราะตัวเองมีหน้ามีตาเกินกว่าจะแกล้งทำเป็นไม่เห็นสิ่งที่เกิดอยู่ตรงหน้า ก็เลยแกล้งทำเป็นสนใจ#nอย่างหลีกเลี่ยงไม่ได้ คุณก็แค่รู้สึกและทำอย่างนี้ไม่ใช่เหรอ?)"
1008302-117 = "(อาคารที่ถูกละเลยมานานแบบนี้ไม่น่าจะซ่อมเสร็จได้ง่ายๆ ด้วย)"
1008302-123 = "...ฮึ่ม"
1008302-124 = "เป็นใครก็เดาออกว่าทำได้แค่นิดหน่อยก็คงเหนื่อยแล้วถอดใจไปก่อน"
1008302-129 = "(จากนั้นคุณครูก็เริ่มซ่อมจุดนั้นจุดนี้ในอาคารเฮียกกะเรียวรัน และเวลาก็ผ่านไปกว่า 5 ชั่วโมงแล้ว...)"
1008302-135 = "[ns] \"ซ่อมพื้นแค่นี้คงพอแล้ว ต่อไปก็ไปซ่อมเพดาน\""
1008302-137 = "...อะไรกัน ยังซ่อมอยู่อีกเหรอ?"
1008302-138 = "[s] \"หืม? อื้ม พื้นครูทำเสร็จแล้ว แต่ว่ายังเหลือเพดานอยู่...\""
1008302-139 = "แต่เวลามันล่วงเลยมาขนาดนี้แล้วนะ? นี่คุณต้องมีเวลาว่างแค่ไหนกันเนี่ย?"
1008302-140 = "เพราะสัญญาไว้ตั้งแต่แรกแล้วว่าจะทำให้... งั้นเหรอ?"
1008302-141 = "ว่าไงนะ? แค่นี้สบายมาก? และมั่นใจว่าจะทำที่เหลือให้เสร็จภายใน 3 ชั่วโมง?"
1008302-142 = "...เชื่อเขาเลย"
1008302-146 = "......"
1008302-147 = "ก็ดี เข้าใจแล้ว"
1008302-152 = "ถ้าจะซ่อมเพดาน ก็ต้องใช้อุปกรณ์อันนี้ใช่มั้ย? ถ้าต้องปีนบันได เดี๋ยวฉันช่วยจับให้"
1008302-153 = "ถ้าอยากได้อุปกรณ์อะไรก็บอกละ ฉันจะหยิบส่งให้เอง"
1008302-154 = "[s] \"หืม? คิเคียว... เมื่อกี้บอกว่ามีงานต้องทำไม่ใช่เหรอ?\""
1008302-155 = "...ไม่รู้เหรอว่าฉันเป็นใคร? งานนั้นน่ะฉันทำเสร็จไปนานแล้ว"
1008302-156 = "อีกอย่าง... ถ้าปล่อยให้คุณทำอยู่คนเดียว ก็คงอีกนานกว่าจะเสร็จ"
1008302-157 = "งั้นจากนี้ไปฉันจะช่วยเอง"
1008302-158 = "[s] \"งั้นเหรอ? ขอบใจนะ งั้นครูจะไม่ปฏิเสธ เอาละ ลุยกันเลย!\""
1008302-159 = "...ฮึ่ม"
1008302-166 = "[ns] \"เยี่ยมมาก เสร็จหมดทุกอย่างแล้ว ทำได้ดีมากเลย คิเคียว\""
1008302-167 = "...คุณต่างหากที่ทำได้ดี"
1008302-168 = "คาดไม่ถึงเลย... ว่าจะซ่อมทุกอย่างเสร็จได้ภายในวันนี้"
1008302-169 = "ขอยอมรับเลยว่าที่ปรึกษายุทธศาสตร์คนนี้... ประเมินคุณผิดไปหน่อย"
1008302-170 = "[s] \"พูดแบบนี้ก็แอบเขินอยู่แฮะ\""
1008302-175 = "[ns] \"เอาเป็นว่าธุระของครูก็เสร็จแล้ว งั้นครูขอกลับก่อนนะ\""
1008302-179 = "[ns] \"อ๊ะ... คิเคียว? ทำไมชายเสื้อถึง...\""
1008302-183 = "อ้อ"
1008302-187 = "...ไม่มีอะไรหรอก ไม่มีอะไรเป็นพิเศษ"
1008302-188 = "นี่เวลาก็ผ่านไปมากจนมืดค่ำแล้วด้วย"
1008302-189 = "กว่าจะไปถึงชาเล่ต์ก็คงจะดึกดื่นพอดี"
1008302-190 = "เพราะงั้น... เพื่อแสดงความขอบคุณที่ช่วยซ่อมอาคารเฮียกกะเรียวรันให้"
1008302-191 = "ฉันว่าฉันน่าจะ... ทำอาหารเย็นให้... ได้"
1008302-192 = "ฉันก็แค่อยากจะพูดอะไรแบบนั้นน่ะ"
1008302-193 = "แน่นอนว่าการจ่ายเป็นค่าตอบแทนดูจะเหมาะสมกว่า และการที่จู่ๆ จะมีใครมาทำอาหารให้ ก็คงทำให้คุณลำบากใจไม่น้อย──"
1008302-195 = "[ns] \"ขอเลือกเป็นอาหารเย็นจากคิเคียวดีกว่า!\""
1008302-199 = "...ถึงมันจะแปลกๆ ที่คำนี้ออกมาจากปากคนที่จะตอบแทนก็เถอะ แต่นี่เป็นเรื่องที่ต้องทำหน้าตาดีใจ#nขนาดนั้นเลยเหรอ?"
1008302-200 = "ฉันคิดมาอยู่สักพักแล้ว คนอย่างคุณนี่นะ ช่าง..."
1008302-201 = "แปลกคนจริงๆ"
1008302-202 = "[s] \"...หืม?! แปลกขนาดนั้นเลยเหรอ?!\""
1008302-203 = "...ช่างเถอะ"
1008302-204 = "ไปล้างมือมา"
1008302-210 = "แล้วคุณจะได้รับประทานอาหารเย็นที่เต็มไปด้วยความเอาใจใส่จากฉัน"
1008302-212 = "(หลังจากนั้นคุณครูกับคิเคียวก็กินอาหารเย็นพร้อมกับพูดคุยเรื่องงานของเฮียกกะเรียวรันกับชาเล่ต์ รวมถึงเรื่องสัพเพเหระอื่นๆ ด้วยกัน)"

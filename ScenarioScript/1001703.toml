[translation]
1001703-1 = "Bell Peppers and Hamburger Steak"
1001703-2 = "Red Winter Academy Executive Office"
1001703-3 = "Heehee, heeheehee..."
1001703-4 = "Muhahaha!"
1001703-5 = "They really know how to get me excited!"
1001703-6 = "[s] \"Did something good happen?\""
1001703-7 = "Ah! You noticed, Comrade!"
1001703-8 = "As you might have guessed, something quite special awaits me today."
1001703-9 = "It's..."
1001703-10 = "Today's lunch, hamburger steak!"
1001703-11 = "What's with the face, Comrade? Do you not like hamburger steak?"
1001703-12 = "[s] \"No, I like it.\""
1001703-13 = "Mm, mm! Of course."
1001703-14 = "Because no one in the world hates hamburger steak!"
1001703-15 = "What's more, the hamburger steak from Red Winter Academy's School Lunch Club is just as delicious as any steak from a fancy restaurant!"
1001703-16 = "O-Of course, I've never had steak from a real fancy restaurant, but...surely there is no other meat dish in Kivotos that tastes better than our school's hamburger steak."
1001703-17 = "And if you put a slice of cheese on top..."
1001703-18 = "Oh, and don't forget the over-easy egg!"
1001703-19 = "Heeheehee, I can't wait!"
1001703-20 = "Hamburger! Hamburger! Delicious hamburger! ♪"
1001703-23 = "Red Winter Academy Cafeteria"
1001703-25 = "Wh-What is this..."
1001703-27 = "What did you do to my hamburger steak?!"
1001703-28 = "I-Is there a problem, President Cherino?"
1001703-29 = "Of course, there is! Take a good look at this tray!"
1001703-30 = "You said that today's lunch is hamburger steak!"
1001703-31 = "So why...why is there a bell pepper on top?!"
1001703-32 = "W-Well, there were a lot of bell peppers left over from last time... We had no choice but to use them all this week."
1001703-33 = "Then you should've just thrown them in the trash! Why would you do such a terrible thing to a delicious hamburger steak?!"
1001703-34 = "B-But meat and bell peppers are a solid combination. The kick of the bell pepper balances the meat's greasiness—"
1001703-35 = "I don't want to hear it! The School Lunch Club members have committed the offense of ruining my much-anticipated hamburger steak. They deserve to be purged a hundred times over! Take all of them to former institute Spec Ops #227!"
1001703-36 = "[s] \"Calm down, Cherino.\""
1001703-39 = "What is it, Comrade?"
1001703-40 = "No matter how much you might like bell peppers, this is unacceptable!"
1001703-41 = "What? Are you saying that I won't grow taller if I'm picky about my food?"
1001703-42 = "And that I'll be ugly in the future because my skin will get bad?"
1001703-43 = "I already know that!"
1001703-44 = "But...but..."
1001703-45 = "But I can't help that bell peppers don't taste good! They're bitter!"
1001703-46 = "No matter how much you try to convince me, I just can't eat bell peppers!"
1001703-47 = "[s] \"If you just eat the bell pepper, I'll buy you pudding next time we're downtown\""
1001703-50 = "R-Really? Is it okay if it's the limited edition pudding from L'Oiseau Bleu?"
1001703-51 = "Hmm... Do I eat the bell pepper so I can have pudding with my comrade, or avoid it entirely..."
1001703-52 = "Bah, I won't die from eating it!"
1001703-56 = "*munch* *munch*"
1001703-57 = "H-Huh? It's not nearly as bitter as the bell pepper I tried last time."
1001703-58 = "Y-Yes! We marinated the bell pepper in soy sauce in advance..."
1001703-59 = "I guess my taste buds must have matured since then. I'm amazing!"
1001703-60 = "Huh? What were you going to say, School Lunch Club President?"
1001703-61 = "Nothing, President Cherino! You even eat bell peppers... You are the very picture of a mature leader!"
1001703-62 = "Heehee! Even if you butter me up like that, you won't get any brownie points from me."
1001703-63 = "I won't forget how you put bell peppers on my hamburger steak!"
1001703-64 = "I'll be taking two puddings today for dessert!"
1001703-66 = "Afterwards, Cherino ate two puddings, and another one just for good measure."

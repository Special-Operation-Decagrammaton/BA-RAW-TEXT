1001703-25 = "3;체리노;04;……이, 이 무슨…….\n#3;em;[땀]\n#3;a"
1001703-26 = "3;체리노;05;\n#wait;1500\n#3;stiff"
1001703-27 = "3;체리노;05;……이 몸의 햄버거 스테이크에 이게 무슨 짓이냐……!!!\n#bgshake\n#fontsize;80\n#3;closeup"
1001703-28 = "#na;급양부장 붉은겨울;무, 무슨 문제라도 있으십니까. 체리노 회장님?"
1001703-29 = "3;체리노;01;있고말고! 이 식판을 잘 보거라!\n#3;hophop\n#3;closeup"
1001703-30 = "3;체리노;01;그대의 입으로 오늘의 점심은 햄버거 스테이크가 나온다고 말하지 않았었느냐!\n#3;closeup"
1001703-31 = "3;체리노;05;그런데 어째서…… 어째서 이 위에 피망이 올려져 있는 것이냐!\n#3;em;[빠직]\n#3;stiff\n#3;closeup"
1001703-32 = "#na;급양부장 붉은겨울;그, 그게 지난번에 들여온 피망이 생각보다 많이 남아서…… 이번 주 내로 모두 소모하기 위해서는 어쩔 수가 없었습니다."
1001703-33 = "3;체리노;01;그럼 쓰레기통에라도 던져 넣으면 되는 것 아니냐! #n하필이면 맛있는 햄버거 스테이크에 이런 끔찍한 짓을 저지르다니!\n#3;hophop\n#3;closeup"
1001703-34 = "#na;급양부장 붉은겨울;하, 하지만 고기와 피망은 요리에 자주 쓰이는 조합입니다. 피망의 매운맛이 고기의 느끼함을 잡아주어—."
1001703-35 = "3;체리노;05;듣기 싫다! 이 몸이 기대하던 햄버거 스테이크를 망쳐버린 급양부원들의 죄는 백 번 숙청해 마땅해! 전원 구교사 227호 특별반 행이다!\n#3;em;[빠직]\n#3;closeup"
1001703-36 = "[s] \"진정해, 체리노.\""

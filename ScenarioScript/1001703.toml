[translation]
1001703-1 = "พริกหวานกับสเต๊กแฮมเบอร์เกอร์"
1001703-2 = "สำนักงานสหภาพเรดวินเทอร์"
1001703-3 = "ฮุฮุ ฮุฮุฮุ..."
1001703-4 = "วะฮาฮาฮ่า!"
1001703-5 = "ทำให้เราตื่นเต้นอย่างนี้ได้ พวกนั้นก็เก่งเหมือนกันนะ!"
1001703-6 = "[s] \"มีเรื่องดีๆ อะไรเหรอ?\""
1001703-7 = "อ๊ะ สายตาเฉียบแหลมไม่เบาเลยนี่สหาย!"
1001703-8 = "เป็นอย่างที่สหายคิดเอาไว้นั่นละ วันนี้มีเรื่องสุดพิเศษกำลังรอเราอยู่"
1001703-9 = "นั่นก็คือ..."
1001703-10 = "มื้อเที่ยงวันนี้จะเสิร์ฟสเต๊กแฮมเบอร์เกอร์ล่ะ!"
1001703-11 = "ทำไมทำสีหน้าแบบนั้นล่ะสหาย ไม่ชอบสเต๊กแฮมเบอร์เกอร์งั้นเหรอ?"
1001703-12 = "[s] \"เปล่า ครูเองก็ชอบ\""
1001703-13 = "ดีมาก! ต้องอย่างงี้สิ"
1001703-14 = "ไม่มีใครในโลกนี้เกลียดสเต๊กแฮมเบอร์เกอร์หรอก!"
1001703-15 = "นอกจากนั้นสเต๊กแฮมเบอร์เกอร์จากชมรมโภชนาการของสหภาพเรดวินเทอร์ ยังอร่อยระดับภัตตาคาร#nชั้นสูงเลยละ!"
1001703-16 = "ถะ...ถึงเราจะยังไม่เคยกินสเต๊กจากภัตตาคารชั้นสูงจริงๆ... แต่ไม่มีที่ไหนในคิโวทอสจะทำเมนูเนื้อ#nได้อร่อยกว่าสเต๊กแฮมเบอร์เกอร์จากโรงเรียนของเราแล้ว"
1001703-17 = "และพอวางชีสแผ่นนึงไว้ด้านบน..."
1001703-18 = "อา... เราไม่มีทางลืมไข่ดาวกึ่งสุกนั่นได้เลยละ!"
1001703-19 = "ฮิฮิฮิ เราแทบทนรอไม่ไหวแล้วละ!"
1001703-20 = "แฮมเบอร์เกอร์~ แฮ่ม แฮม~ เบอร์ เกอร์~ แสนอร่อย~♪"
1001703-23 = "โรงอาหารโภชนาการในสหภาพเรดวินเทอร์"
1001703-25 = "นะ... นี่มัน..."
1001703-27 = "เกิดอะไรขึ้นกับสเต๊กแฮมเบอร์เกอร์ของเรา...!!!"
1001703-28 = "ท่านประธานเชริโน่ มีเรื่องอะไรงั้นเหรอคะ?"
1001703-29 = "ไม่มีได้ยังไง! ดูในจานนี่สิ!"
1001703-30 = "ไหนบอกเองว่ามื้อเที่ยงวันนี้จะมีสเต๊กแฮมเบอร์เกอร์ไงล่ะ!"
1001703-31 = "แล้วทำไม... ทำไมถึงมีพริกหวานวางอยู่ข้างบนนั่น!"
1001703-32 = "คือว่ามีพริกหวานเหลืออยู่เยอะมากจากครั้งก่อน... และเพื่อจะใช้ให้หมดภายในสัปดาห์นี้เลยต้องเอามา#nใส่ค่ะ"
1001703-33 = "ถ้างั้นก็ทิ้งๆ ไปซะเลยไม่ได้รึไง! ทำไมต้องทำเรื่องที่เลวร้ายกับสเต๊กแฮมเบอร์เกอร์แสนอร่อยนี้ด้วย!"
1001703-34 = "ตะ... แต่เนื้อและพริกหวานเป็นวัตถุดิบที่มักใช้คู่กันในการทำอาหาร รสชาติเผ็ดของพริกหวานจะช่วย#nขับรสเนื้อให้ดีขึ้น—"
1001703-35 = "เราไม่ฟัง! ความผิดของชมรมโภชนาการที่ทำลายสเต๊กแฮมเบอร์เกอร์ที่เราตั้งตารอสมควรถูกจัดการ!#nพาพวกนี้ไปที่ห้องพิเศษ 227 ในอาคารเรียนเก่าซะ!"
1001703-36 = "[s] \"เชริโน่ใจเย็นๆ ก่อน\""
1001703-39 = "ว่าไงนะสหาย?"
1001703-40 = "ต่อให้สหายจะชอบพริกหวานมากแค่ไหน แต่นี่เป็นเรื่องที่รับไม่ได้!"
1001703-41 = "อะไรนะ? ถ้าเลือกกินเราจะไม่สูงงั้นเหรอ?"
1001703-42 = "แล้วผิวก็จะเหี่ยวย่นและจะดูไม่ดีด้วยงั้นเหรอ?"
1001703-43 = "เรื่องนั้นเรารู้อยู่แล้วน่า!"
1001703-44 = "แต่ว่า... แต่ว่า..."
1001703-45 = "จะทำยังไงกับพริกหวานที่ไม่อร่อยล่ะ? ทั้งแสบ ทั้งเผ็ด ทั้งขม!"
1001703-46 = "ถึงสหายจะพูดแบบนั้น แต่เรากินพริกหวานไม่ได้หรอกนะ!"
1001703-47 = "[s] \"ถ้ายอมกินพริกหวาน ครั้งหน้าครูจะซื้อพุดดิ้งจากในเมืองมาให้\""
1001703-50 = "จะ...จริงเหรอ? ถ้างั้นพุดดิ้งลิมิเต็ดเอดิชั่นของลูวาโซ บลูก็ได้ใช่มั้ย?"
1001703-51 = "อืม... จะยอมกินพริกหวานเพื่อให้ได้กินพุดดิ้งกับสหาย หรือเลือกจะเลี่ยงพริกหวาน..."
1001703-52 = "เอาล่ะ กินไปคงไม่ตายหรอก!"
1001703-56 = "(ง่ำ ง่ำ...)"
1001703-57 = "เอ๋? ไม่เห็นจะขมหรือเผ็ดเหมือนกับพริกหวานที่เคยกินก่อนหน้านี้เลย?"
1001703-58 = "คะ...ค่ะ! เพราะเราเอาพริกหวานไปหมักในซอสถั่วเหลืองไว้ก่อน—"
1001703-59 = "ฮู่ว... การลิ้มรสของเราเติบโตขึ้นเป็นผู้ใหญ่แล้วสินะ!"
1001703-60 = "หืม? หัวหน้าชมรมโภชนาการมีอะไรจะบอกอย่างงั้นเหรอ?"
1001703-61 = "เปล่าค่ะ ท่านประธานเชริโน่ ท่านกินได้แม้กระทั่งพริกหวาน... ช่างเป็นแบบอย่างของผู้นำที่เป็นผู้ใหญ่#nจริงๆ ค่ะ!"
1001703-62 = "ฮิฮิ ไม่ต้องพูดถึงขนาดนั้นก็ได้"
1001703-63 = "แต่เราจะไม่ลืมความเจ็บปวดที่ใส่พริกหวานในสเต๊กแฮมเบอร์เกอร์หรอกนะ!"
1001703-64 = "วันนี้จะต้องให้พุดดิ้งเราพิเศษ 2 ถ้วยด้วยล่ะ!"
1001703-66 = "(หลังจากนั้นเชริโน่ก็กินพุดดิ้ง 2 ถ้วยจนหมดและขอเพิ่มอีก 1 ถ้วย)"

1001703-57 = "3;체리노;02;어, 어라? 전에 먹었던 피망과는 달리 맵지도 쓰지도 않잖아?\n#3;em;[반응]"
1001703-58 = "#na;급양부장 붉은겨울;네, 네! 미리 피망을 간장에 절여 매운맛을 빼 두었기 때문에—."
1001703-59 = "3;체리노;99;후우…… 역시 그사이에 입맛마저 어른스러워진 게 분명하군. 역시 이 몸이야!"

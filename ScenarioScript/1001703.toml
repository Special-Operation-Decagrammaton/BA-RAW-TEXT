1001703-42 = "3;체리노;02;게다가 피부도 나빠져서 나중에는 못난이가 될 거라고?"
1001703-43 = "3;체리노;05;그런 건 이미 알고 있느니라!\n#3;hophop"
1001703-44 = "3;체리노;06;하지만…… 하지만……."
1001703-45 = "3;체리노;01;하지만 피망이 맛이 없는 걸 어떻게 해? 맵고, 쓰고, 아리고!"
1001703-46 = "3;체리노;05;아무리 콤라드가 설득한다 하더라도 피망은 못 먹어!\n#3;em;[빠직]"
1001703-47 = "[s] \"편식하지 않고 피망을 먹으면 다음에 키보토스 시내에서 푸딩을 사 줄게.\""

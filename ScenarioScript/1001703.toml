1001703-61 = "#na;급양부장 붉은겨울;아닙니다, 체리노 회장님! #n피망까지 가리지 않고 잘 드시다니…… 역시 어른스러운 지도자의 귀감이십니다!"
1001703-62 = "3;체리노;03;헤헤, 그렇게 말해도 나오는 건 없다구.\n#3;em;[음표]"
1001703-63 = "3;체리노;05;하지만 햄버거 스테이크에 피망을 넣은 원한은 잊지 않을 테니까!\n#3;em;[빠직]\n#3;stiff"

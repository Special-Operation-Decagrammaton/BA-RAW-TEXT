[translation]
1001703-1 = "青椒與漢堡排"
1001703-2 = "赤冬聯邦學園．辦公室"
1001703-3 = "哼哼，哼哼哼……"
1001703-4 = "哼哈哈哈哈哈哈！"
1001703-5 = "竟然能讓咱這麼興奮，那些傢伙也是相當了不起呀！"
1001703-6 = "[s] 「發生了什麼好事嗎？」"
1001703-7 = "唔姆，真虧你能注意到啊同志！"
1001703-8 = "就跟你想的一樣，今天有件值得期待的事在等著咱呢。"
1001703-9 = "那就是……"
1001703-10 = "今天的午餐裡，會有漢堡肉！"
1001703-11 = "怎麼啦同志，怎麼露出那種表情。你討厭漢堡肉嗎？"
1001703-12 = "[s] 「沒有，我也很喜歡唷。」"
1001703-13 = "唔姆，唔姆！就是說嘛！"
1001703-14 = "這世界上應該不存在討厭漢堡肉的人才對！"
1001703-15 = "更何況我赤冬聯邦學園供給部所做的漢堡肉，美味程度可是不輸高級餐廳的牛排啊！"
1001703-16 = "嘛，雖然咱沒有真的吃過高級餐廳的牛排……#n但奇普托斯的任何地方，一定都找不到比咱們學園的漢堡肉還好吃的料理。"
1001703-17 = "如果在上面再放上一片起司的話……"
1001703-18 = "啊，當然半熟的荷包蛋也不能少啊！"
1001703-19 = "哼哼哼，從現在就讓人期待的受不了呀！"
1001703-20 = "漢堡肉～漢堡肉～好吃的漢堡肉～♪"
1001703-23 = "赤冬聯邦學園．學生餐廳"
1001703-25 = "……這，這是什麼東西……"
1001703-27 = "……你對咱的漢堡肉做了什麼……！！"
1001703-28 = "有，有什麼問題嗎，潔莉諾會長？"
1001703-29 = "當然有！你仔細看這個盤子！"
1001703-30 = "你說過今天的午餐是漢堡肉的吧！"
1001703-31 = "雖然是漢堡肉沒錯，但是為什麼……為什麼旁邊放了青椒啊！"
1001703-32 = "那，那是因為之前買來的青椒剩得比預期中還多……#n為了在這個星期內全部用完，所以只好……"
1001703-33 = "那樣的話，拿去當射擊的靶子不就好了！#n竟然偏偏對這麼美味的漢堡肉做出這麼過分的事情！"
1001703-34 = "但，但是，「肉和青椒」是料理中常見的組合啊。青椒可以減少肉的油膩感──"
1001703-35 = "咱不想聽這種藉口！竟敢毀掉咱期待的漢堡肉，供給部罪該萬死！#n就算肅清一百遍也不夠！所有人都給咱到舊校舍的227號特別班去！"
1001703-36 = "[s] 「哎呀哎呀……冷靜一點，潔莉諾。」"
1001703-39 = "怎麼了，同志。"
1001703-40 = "就算同志你喜歡青椒，這也是不可饒恕的事！"
1001703-41 = "……什麼？你說挑食的話會長不高，是嗎？"
1001703-42 = "而且對皮膚也不好，之後這麼漂亮的臉蛋會變的很糟糕……？"
1001703-43 = "那，那種事咱當然知道！"
1001703-44 = "可是……可是……"
1001703-45 = "可是青椒不好吃的事實還是不會改變！該怎麼辦才好，青椒這麼苦！"
1001703-46 = "不管同志你說什麼，青椒咱是絕對不會吃的！"
1001703-47 = "[s] 「如果吃掉的話，之後就買布丁給你吃。」"
1001703-50 = "真，真的嗎？#n「L'Oiseau．Bleu」的限量布丁也可以嗎！？"
1001703-51 = "唔……該選和同志一起吃布丁，還是要選青椒……"
1001703-52 = "哎呀，就算吃了也不會死的吧！"
1001703-56 = "（嚼嚼……）"
1001703-57 = "咦？好像跟之前吃過的青椒不一樣，不會苦？"
1001703-58 = "是，是的！因為有先用醬油醃漬來去除苦味……"
1001703-59 = "原來如此……肯定是咱的味覺已經在不知不覺間變得像大人一樣了！真不愧是咱！"
1001703-60 = "嗯？你剛剛有說什麼嗎？供給部部長？"
1001703-61 = "什麼都沒有，潔莉諾會長！#n竟然連青椒都敢吃了……真不愧是您，您是領導者的榜樣啊！"
1001703-62 = "嘿嘿，就算這麼誇獎咱也不會有獎勵唷？"
1001703-63 = "但是，咱不會忘記你在漢堡肉加上青椒的仇的！"
1001703-64 = "所以說咱今天要特別多領一個甜點的布丁！"
1001703-66 = "（於是潔莉諾就吃了兩個布丁──#n　才剛這麼想，就又多吃了一個不知道從哪拿來的布丁）"

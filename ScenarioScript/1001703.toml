1001703-1 = "#Title;피망과 햄버거 스테이크"
1001703-2 = "#Place;붉은겨울 학원 집무실"
1001703-3 = "3;체리노;99;후후, 후후후…….\n#3;a"
1001703-4 = "3;체리노;03;음하하하—!\n#3;em;[재잘]\n#3;hophop"
1001703-5 = "3;체리노;05;이 몸을 이렇게 들뜨게 만들다니 녀석들도 제법이로군!"
1001703-6 = "[s] \"무슨 좋은 일이라도 있어?\""
1001703-7 = "3;체리노;01;음, 잘도 눈치챘구나. 콤라드!\n#3;em;[반응]"
1001703-8 = "3;체리노;01;그대가 예상한 대로 오늘 이 몸에게는 아주 즐거운 일이 기다리고 있지."
1001703-9 = "3;체리노;99;그것은 바로……"
1001703-10 = "3;체리노;01;오늘 점심 급식으로 햄버거 스테이크가 나온다는 것이다!\n#3;closeup"
1001703-11 = "3;체리노;02;뭔가, 그 표정은. 콤라드. 그대는 햄버거 스테이크를 싫어하는 것인가?\n#3;em;[?]\n#3;closeup"
1001703-12 = "[s] \"아니, 나도 좋아해.\""
1001703-13 = "3;체리노;03;음, 음! 그렇겠지.\n#3;em;[음표]"
1001703-14 = "3;체리노;01;세상에 햄버거 스테이크를 싫어하는 사람은 없으니까!"
1001703-15 = "3;체리노;03;게다가 붉은겨울 학원의 급양부에서 내오는 햄버거 스테이크는 고급 레스토랑의 스테이크 만큼이나 맛있는 것이다!\n#3;em;[재잘]\n#3;hophop"
1001703-16 = "3;체리노;04;무, 물론 진짜 고급 레스토랑의 스테이크를 먹어 본 일은 없지만…… 분명 우리 학교의 햄버거 스테이크보다 맛있는 고기 요리는 키보토스 어디에도 존재하지 않을 거다.\n#3;stiff\n#3;em;[땀]"
1001703-17 = "3;체리노;02;그리고 그 위에 치즈를 한 장 얹으면……"
1001703-18 = "3;체리노;01;아, 반숙 계란 프라이도 빼놓을 수 없지!"
1001703-19 = "3;체리노;99;후후후, 벌써부터 기대가 되어 견딜 수가 없구나!\n#3;em;[///]\n#3;stiff"
1001703-20 = "3;체리노;03;햄버거~ 햄버거~ 맛있는 햄버거~♪\n#3;em;[음표]\n#3;hophop"

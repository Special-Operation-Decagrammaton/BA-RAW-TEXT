[translation]
10029055-5 = "There's more of them than I expected...?! You fought all these off by yourself before, Eimi?!"
10029055-6 = "No. This is more than usual. They pose no real threat, but this will take more time than I like."
10029055-7 = "It would be good if we had more firepower."
10029055-8 = "...More firepower?"
10029055-9 = "...! More firepower!"
10029055-10 = "That's right! Now is the time! A perfect opportunity!!"
10029055-11 = "Mikoto! The railgun we made for you!"
10029055-12 = "What? Me?!"
10029055-13 = "It's got to be fully charged by now. Just change it to railgun mode."
10029055-15 = "A mobile railgun. It's a marvel of engineering."
10029055-16 = "I'll finally get to behold it with my own two eyes! A railgun you can hold in your hands...!"
10029055-17 = "Ahaha... They're expecting a lot from you, Misaka."
10029055-18 = "Wh-What's gotten into you three all of a sudden?! I have to change the mode of my gun...?"
10029055-19 = "L-Like this...? And this?"
10029055-20 = "Hurry. They're coming."
10029055-21 = "All right! Don't rush me...!"
10029055-25 = "...I did it!"
10029055-26 = "Mode change complete! ...Firing!!"
10029055-28 = "Ra...!!"
10029055-30 = "...il...!!"
10029055-32 = "...gun!!"
10029055-36 = "[ns] \"...Fire!!\""
10029055-41 = "...?"
10029055-42 = "...What?"
10029055-43 = "...Huh?"
10029055-44 = "Um..."
10029055-45 = "Did it fire...? Just now?"
10029055-47 = "...Did you pull the trigger?"
10029055-48 = "S-Something fired... It sounded kind of like...a mosquito..."
10029055-49 = "C-Compared to the usual, it's a little...cute..."
10029055-50 = "I wish Shirai could have seen that..."
10029055-54 = "...They're coming."
10029055-55 = "We don't have sufficient firepower to hold them off. We must change tactics."
10029055-56 = "There's no time to fight them. If there's no other way, we'll use explosives to block this path and take route B."
10029055-57 = "..."
10029055-58 = "Tch. It can't be helped."
10029055-62 = "[ns1] \"Misaka? That's...a coin?\"\n[ns2] \"She took out a coin from her pocket?\""
10029055-65 = "You're saying we just have to take care of these automatons rushing at us? Then we can continue on this path?"
10029055-66 = "...Everyone, get back. I'm not in my best condition, but..."
10029055-67 = "If it's one shot, I can do it if I concentrate."
10029055-68 = "...?"
10029055-69 = "One shot? What are you shooting?"
10029055-73 = "...!"
10029055-74 = "Back, everyone, please get back! It's dangerous to stand too close! Get back!"
10029055-75 = "Um? Okay..."
10029055-76 = "Wh-What's with this mood?! Everyone's so tense!"
10029055-77 = "It's the same vibe as when someone's about to operate some heavy machinery."
10029055-79 = "Well..."
10029055-80 = "...I wouldn't say you're wrong about that."
10029055-82 = "...Here I go."
10029055-87 = "...!"
10029055-91 = "...Phew."
10029055-92 = "Oww... My head."
10029055-93 = "I really can't use this too often here. My head hurts like crazy..."
10029055-100 = "[ns] \"...\""
10029055-102 = "[ns3] \"What we just saw...\"\n[ns4] \"...was that a railgun?\""
10029055-108 = "You should see the looks on your faces."
10029055-109 = "I guess that makes sense. It still surprises me every time I see it."
10029055-110 = "Yes, it is an impressively brutish power. Quite fitting for Miss Misaka."
10029055-111 = "Sensei? Everyone?"
10029055-112 = "They're in shock..."
10029055-117 = "..."
10029055-118 = "..."
10029055-120 = "She...fired a railgun...from her bare hand...?"
10029055-121 = "It's literally...a railgun in her hands..."
10029055-122 = "This is the power...of an esper...!"
10029055-123 = "Right. This is a true railgun...!"
10029055-124 = "...?!"
10029055-125 = "U-Umm?! What's with the weird reactions?"
10029055-126 = "That was amazing...! How did you do it? Can your hand really generate that much power?"
10029055-127 = "Kotori, I understand your curiosity, but those questions are rude."
10029055-128 = "If it's all right with you... Can you show us one more time? That technique you used just now?"
10029055-129 = "Sh-Show you? Again...?"
10029055-130 = "It's not really something I should use so flippantly."
10029055-131 = "Ah... I'm sorry."
10029055-132 = "It would be rude of me to ask you to spend your own money."
10029055-133 = "Hibiki, do you happen to have any coins on you? I don't have any..."
10029055-135 = "...Huh?"
10029055-136 = "Mm... All I have is a ten-yen coin."
10029055-137 = "I see. Assuming that this ability's power is determined by the value of the coin, we'll be limited by whatever pocket change we have on us right now."
10029055-138 = "H-Hold on. How is that a logical conclusion?"
10029055-139 = "No, actually! That's not the problem...!"
10029055-141 = "I've got a 500-yen coin!"
10029055-142 = "...!! Kotori...! To make such a sacrifice for all of our sakes...!!"
10029055-143 = "Excuse me? Hello? Is anybody listening?"
10029055-144 = "That wasn't money I fired... It was just an arcade token..."
10029055-145 = "A 500-yen coin would be a waste...!"
10029055-146 = "[s5] \"Don't pay them any mind.\"\n[s6] \"You could say they're easily excited...\""
10029055-150 = "I don't think they're listening to us, guys..."
10029055-151 = "Isn't this nice, Miss Misaka? You've finally made some new friends, and all you had to do was jump to another world."
10029055-153 = "What do you mean, nice?!"
10029055-154 = "Please. Kotori has put her entire dinner budget on the line! If it's not enough, please take my ten-yen coin as well...!"
10029055-155 = "Please!"
10029055-156 = "Accept our 500 yen!"
10029055-157 = "510 yen!"
10029055-158 = "...510 yen!"
10029055-160 = "I'm telling you..."
10029055-164 = "...!"
10029055-165 = "*sigh*"
10029055-166 = "I'm only doing this once. Give me the 500..."
10029055-170 = "...510 yen."
10029055-171 = "...And don't throw away your money next time."

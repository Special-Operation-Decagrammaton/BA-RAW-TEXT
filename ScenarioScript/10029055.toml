[translation]
10029055-5 = "比想像中還多耶……！？#n英美之前都是單獨對付這麼多敵人的嗎！？"
10029055-6 = "不，現在的數量比平時還多。#n要處理不成問題，但是會花費很多時間。"
10029055-7 = "要是有更強大的火力就好了。"
10029055-8 = "……強大的火力？"
10029055-9 = "……！！#n強大的火力！？"
10029055-10 = "原來如此，就是現在！機會來了！！"
10029055-11 = "美琴同學！使用我們製造的超電磁砲吧！"
10029055-12 = "……咦！？我嗎！？"
10029055-13 = "現在應該已經累積了足夠的電力。#n把槍的發射模式改成超電磁砲吧。"
10029055-15 = "只在傳聞中聽過的攜帶型電磁砲──所有工學家的夢想。"
10029055-16 = "終於能親眼看到了！「從手中發射的電磁砲」……！！"
10029055-17 = "啊哈哈……相當受人期待呢，御坂學姊。"
10029055-18 = "什，什麼啦，這樣我壓力好大哦！知道了，知道了啦！#n切換這把槍的模式就行了吧？"
10029055-19 = "是，是這個嗎……？#n這樣就行了？"
10029055-20 = "動作快，已經湧過來了。"
10029055-21 = "知道了，別催我……！"
10029055-25 = "……行了！"
10029055-26 = "模式變更結束！……發射！！"
10029055-28 = "……超！！"
10029055-30 = "電……！！"
10029055-32 = "……磁！！"
10029055-36 = "[ns]「……砲！！！」"
10029055-41 = "…………？"
10029055-42 = "……咦？"
10029055-43 = "……嗯？"
10029055-44 = "呃……"
10029055-45 = "剛才……發射了嗎？"
10029055-47 = "……有順利發射嗎，御坂同學？"
10029055-48 = "感，感覺是有發射了什麼……發出了……像蚊子一樣的聲音……"
10029055-49 = "跟，跟平常看到的不一樣，好像……有點可愛。"
10029055-50 = "不知道白井同學看到會有什麼反應……"
10029055-54 = "……敵人更接近了。"
10029055-55 = "那種火力是阻止不了的，必須趕緊換成其他戰術。"
10029055-56 = "沒時間了。如果沒有其他辦法的話，先用炸彈炸毀這條路，改走B路線吧。"
10029055-57 = "…………"
10029055-58 = "……嘖，沒辦法了。"
10029055-62 = "[ns1]「御坂？那是……硬幣？」\n[ns2]「從口袋裡掏出了硬幣？」"
10029055-65 = "總之只要轟飛前面那些機器就行了吧？"
10029055-66 = "……大家都退後吧。#n雖然狀態不是很好……"
10029055-67 = "但集中精神的話應該能發射一次。"
10029055-68 = "……？"
10029055-69 = "發射一次？要發射什麼？"
10029055-73 = "……！！"
10029055-74 = "大，大家！快後退！太靠近的話很危險的！快保持距離！"
10029055-75 = "嗯？我知道了……"
10029055-76 = "怎，怎麼回事！？氣氛突然緊張了起來！？"
10029055-77 = "就像在操作重裝備一樣呢。"
10029055-79 = "嗯……"
10029055-80 = "……這麼說並沒有錯哦。"
10029055-82 = "……我要上了。"
10029055-87 = "……！！！"
10029055-91 = "……呼。"
10029055-92 = "唔……我的頭……"
10029055-93 = "在這裡果然無法經常使用啊。#n頭居然會痛成這樣……"
10029055-100 = "[ns] 「…………」"
10029055-102 = "[ns3]「剛才的就是……」\n[ns4]「超電磁……砲……？」"
10029055-108 = "果然第一次看到的人反應都很大呢。"
10029055-109 = "雖然我每次看到都還是很驚訝就是了……"
10029055-110 = "說的沒錯。這誇張的威力……確實很像御坂同學的風格。"
10029055-111 = "……老師？各位？"
10029055-112 = "大家都一臉茫然……"
10029055-117 = "…………"
10029055-118 = "……………………"
10029055-120 = "徒手……發射了……超電磁砲……？"
10029055-121 = "不是比喻……真的是「徒手」……？"
10029055-122 = "這就是……「超能力者」……！"
10029055-123 = "原來如此，所以才被稱為「[ruby=Railgun]超電磁砲[/ruby]」……！"
10029055-124 = "……！？"
10029055-125 = "什，什麼，怎麼突然這樣？"
10029055-126 = "實在太厲害了……！#n究竟是怎麼辦到的？手裡有那種力量嗎！？"
10029055-127 = "亞都梨，我能理解你對原理的好奇心，但那種問法很失禮的。"
10029055-128 = "這個要求可能有點奇怪，不過……可以再讓我看一次剛才的那個能力嗎？"
10029055-129 = "剛才的能力？再看一次……？"
10029055-130 = "這並不是想用就能隨意使用的能力啊……"
10029055-131 = "……啊，我真糊塗。"
10029055-132 = "不好意思。既然是我們的請求，當然不能讓你破費。"
10029055-133 = "響，抱歉，你手邊有硬幣嗎？#n我現在正好身無分文……"
10029055-135 = "……咦？"
10029055-136 = "唔嗯，有是有，不過只有10元……"
10029055-137 = "如果威力會隨硬幣的大小或價值改變的話……我們手邊的硬幣是有極限的。"
10029055-138 = "……等，等等，你在說什麼啊？為什麼變成那樣了？"
10029055-139 = "不是，你們先等等！問題不是出在那裡……！"
10029055-141 = "我正好有500元硬幣！"
10029055-142 = "……！！#n亞都梨……！你居然為了大家做出這麼大的犧牲……！！"
10029055-143 = "那個……哈囉～？有聽見我說話嗎～？"
10029055-144 = "我用的不是錢，是遊戲中心的硬幣……"
10029055-145 = "突然就拿500元出來，那樣太浪費了吧……！"
10029055-146 = "[s5]「沒關係，他們只是很感動而已。」\n[s6]「他們本來就是群容易興奮的孩子……」"
10029055-150 = "大家好像聽不見學姊的話呢……"
10029055-151 = "真是太好了，御坂同學。#n居然這麼快就能在異世界交到朋友。"
10029055-153 = "好什麼好啊！！"
10029055-154 = "拜託了，這是亞都梨的晚餐錢！如果還不夠的話我也出10元……！"
10029055-155 = "萬事拜託了！"
10029055-156 = "請你收下吧！我們的500元！"
10029055-157 = "510元！"
10029055-158 = "……510元！"
10029055-160 = "呃，這……"
10029055-164 = "……！"
10029055-165 = "……唉。"
10029055-166 = "下不為例哦。#n那我就收下這500……"
10029055-170 = "……510元了。"
10029055-171 = "……之後可不能再拿錢開玩笑了哦。"

[translation]
10029055-5 = "เยอะกว่าที่คิดเอาไว้อีกแฮะ...!?  ตอนนั้นเอมิสู้กับหุ่นจักรกลมากมายขนาดนี้คนเดียวเลยเหรอ??"
10029055-6 = "ไม่หรอก ตอนนี้มันออกมากันมากกว่าปกติ เราน่าจะจัดการพวกมันได้อย่างไร้ปัญหา แต่ว่าน่าจะเสียเวลาไม่น้อยเลย"
10029055-7 = "ถ้ามีพลังยิงที่รุนแรงกว่านี้ก็คงจะดี"
10029055-8 = "... พลังยิงที่รุนแรงกว่านี้?"
10029055-9 = "...!! พลังยิงที่รุนแรง!?"
10029055-10 = "แบบนี้นี่เอง งั้นก็ตอนนี้เลยค่ะ! ตอนนี้คือโอกาสแล้วค่ะ!!"
10029055-11 = "คุณมิโคโตะ! เรลกันที่พวกฉันสร้างให้ยังไงล่ะคะ!"
10029055-12 = "เอะ... เอ๋!?  ฉันเหรอ!?"
10029055-13 = "ตอนนี้พลังน่าจะชาร์จเต็มแล้วด้วย เปลี่ยนโหมดการยิงของปืนเป็นโหมดเรลกันเลย"
10029055-15 = "ปืนเรลกันแบบพกพาที่เคยได้ยินแต่กิตติศัพท์เท่านั้น นี่มันความฝันของวิศวกรทุกคนเลยละ"
10029055-16 = "ในที่สุดก็จะได้เห็นกับตาตัวเองแล้วสินะคะ! เรลกันที่ยิงออกไปจากมือ...!!"
10029055-17 = "... แหะๆๆ... คุณมิซากะถูกคาดหวังไม่เบาเลยนะคะเนี่ย"
10029055-18 = "พะ... พูดให้รู้สึกกดดันทำไมเนี่ย! รู้แล้วน่า รู้แล้ว! ก็แค่เปลี่ยนโหมดของปืนใช่มั้ย?"
10029055-19 = "นะ... นี่เหรอ...? แบบนี้ใช่มั้ย?"
10029055-20 = "เร็วๆ เข้าเถอะ พวกมันแห่มากันเต็มไปหมดแล้วนะ"
10029055-21 = "รู้แล้วน่า อย่าเร่งกันสิ...!"
10029055-25 = "... ได้แล้ว!"
10029055-26 = "เปลี่ยนโหมดเสร็จแล้ว! ... จะยิงละนะ!!"
10029055-28 = "... ปืน!!"
10029055-30 = "เรล...!!"
10029055-32 = "... กัน!!"
10029055-36 = "[ns] \"... ยิงเลย!!!\""
10029055-41 = "...?"
10029055-42 = "... อะไรเนี่ย?"
10029055-43 = "... หืม?"
10029055-44 = "อ่า..."
10029055-45 = "เมื่อกี้? ยิงออกอยู่ใช่มั้ย...?"
10029055-47 = "... ยิงไปหรือเปล่า?"
10029055-48 = "มะ... เหมือนมีอะไรถูกยิงออกไปอยู่นะ... ได้ยินเหมือนเป็นเสียง... เสียงคล้ายๆ ยุงน่ะ..."
10029055-49 = "นะ... น่ารักกว่าที่เคยเห็นปกตินะคะ... เนี่ย"
10029055-50 = "ถ้าคุณชิราอิมาเห็นเข้า จะทำหน้าแบบไหนกันนะ..."
10029055-54 = "... มากันไม่หยุดไม่หย่อนเลย"
10029055-55 = "พลังแค่นั้นคงยับยั้งเอาไว้ไม่ไหวแน่ ต้องรีบเปลี่ยนมาใช้ยุทธวิธีอื่น"
10029055-56 = "ไม่มีเวลาแล้ว ถ้าไม่มีวิธีอื่นละก็ ก่อนอื่นคงต้องระเบิดทางแล้วไปตามเส้นทาง B แทน"
10029055-57 = "......"
10029055-58 = "... โธ่เอ๊ย งั้นก็ช่วยไม่ได้"
10029055-62 = "[ns1] \"มิซากะ? นั่น... เหรียญเหรอ?\"\n[ns2] \"หยิบเหรียญออกมาจากกระเป๋าเหรอ?\""
10029055-65 = "เราแค่ต้องจัดการพวกหุ่นจักรกลข้างหน้าใช่มั้ย? แค่นี้เราก็จะเดินทางกันต่อได้เนอะ?"
10029055-66 = "... ทุกคนถอยออกมา ถึงฉันจะไม่รู้สึกกระปรี้กระเปร่าเหมือนปกติ..."
10029055-67 = "แต่คิดว่าถ้าตั้งใจก็น่าจะยิงออกไปได้สักครั้งน่ะ"
10029055-68 = "...?"
10029055-69 = "ยิงออกไปเหรอ? ยิงอะไร?"
10029055-73 = "...!!"
10029055-74 = "เอาละๆ! ทุกคนถอยออกมาค่ะ! ถ้าอยู่ใกล้ๆ จะอันตรายได้นะคะ! ถอนกำลังออกมาค่ะ!"
10029055-75 = "หะ... หืม? ก็ได้..."
10029055-76 = "อะ... อะไรกันคะเนี่ย??  บรรยากาศนี้มัน!?  ความตึงเครียดฉับพลันแบบนี้!?"
10029055-77 = "อยู่ๆ ก็รู้สึกเหมือนจะมีการใช้อาวุธหนักเลยแฮะ"
10029055-79 = "ก็นะ..."
10029055-80 = "... รู้สึกแบบนั้นก็ไม่ผิดหรอก"
10029055-82 = "... เอาละนะ"
10029055-87 = "...!!!"
10029055-91 = "... ฮู่ว"
10029055-92 = "โอยยย... หัวฉัน"
10029055-93 = "ใช้พลังที่นี่บ่อยๆ ไม่ได้จริงด้วย ไม่คิดเลยว่าจะปวดหัวหนักขนาดนี้..."
10029055-100 = "[ns] \"......\""
10029055-102 = "[ns3] \"เมื่อกี้มัน...\"\n[ns4] \"เรล... กัน...?\""
10029055-108 = "ทำหน้าตื่นตกใจไม่เบาเลยนะคะ น่าจะเพราะเพิ่งเคยเห็นเป็นครั้งแรกน่ะค่ะ"
10029055-109 = "อย่าว่าแต่คนที่ไม่เคยเลย ทุกครั้งที่ฉันเห็นก็ยังตกใจค่ะ..."
10029055-110 = "นั่นสินะ เป็นพลังงานที่เด็ดดวงจริงๆ เลยละ สมกับภาพลักษณ์ของคุณมิซากะดีนะ"
10029055-111 = "... คุณครู? ทุกคนคะ?"
10029055-112 = "กรรมการอึ้ง ทุกคนอึ้งสินะ..."
10029055-117 = "......"
10029055-118 = "............"
10029055-120 = "ใช้มือเปล่า... ยิง... เรลกัน... เหรอ...?"
10029055-121 = "นี่ไม่ใช่แค่พูดเปรียบเทียบนะ... แต่ใช้ 'มือเปล่า' จริงๆ เหรอเนี่ย...?"
10029055-122 = "นี่สินะ... 'ผู้ใช้พลังจิต'...!"
10029055-123 = "นี่สินะเรลกัน...!"
10029055-124 = "...!?"
10029055-125 = "เอะ... เอ๋!?  อะ... อะไรกัน อยู่ๆ ทำไมถึง?"
10029055-126 = "ยอดเยี่ยมไปเลยค่ะ...! ทำได้ยังไงเนี่ย? ในมือคุณมีพลังแบบนั้นด้วยเหรอคะ??"
10029055-127 = "โคโทริ ฉันเข้าใจว่าเธออยากรู้อยากเห็นเรื่องหลักการหรอกนะ แต่ถามไปแบบนั้นจะเป็นการเสียมารยาทได้นะ"
10029055-128 = "แทนที่จะถามแบบนั้น เอาเป็นว่า... ช่วยทำให้พวกเราดูอีกครั้งจะได้ไหม? สกิลเมื่อกี้น่ะ?"
10029055-129 = "ยะ... อยากดูอีกรอบงั้นเหรอ? นี่น่ะนะ?"
10029055-130 = "มันไม่ใช่อะไรที่คิดจะใช้ก็ใช้ได้สุ่มสี่สุ่มห้าหรอกนะ"
10029055-131 = "... อ่า สงสัยฉันสติเตลิดไป"
10029055-132 = "ขอโทษด้วยนะ เราไม่อาจทำให้คนอื่นต้องวุ่นวายกับเรื่องที่เราขอร้องหรอก"
10029055-133 = "ฮิบิกิ ขอโทษนะ เธอพอจะมีเหรียญบ้างไหม? พอดีตอนนี้ฉันไม่มี..."
10029055-135 = "... ว่าไงนะ?"
10029055-136 = "อืม ก็มีอยู่หรอกนะ แต่มีแค่เหรียญ 10 เยนเท่านั้น..."
10029055-137 = "ถ้าเป็นสกิลที่พลังเปลี่ยนแปลงไปตามขนาดและมูลค่าของเหรียญละก็ เหรียญที่พวกเรามีตอนนี้ก็มี#nข้อจำกัดอยู่"
10029055-138 = "... ดะ... เดี๋ยวก่อน พูดเรื่องอะไรกันน่ะ? ทำไมมันถึงกลายเป็นเรื่องนี้ไปได้ล่ะ?"
10029055-139 = "ไม่สิ เดี๋ยวก่อน! ปัญหาไม่ได้อยู่ที่ตรงนั้นนะ...!"
10029055-141 = "ฉันมีเหรียญ 500 เยนอยู่พอดีเลยค่ะ!"
10029055-142 = "...!!  โคโทริ...! ทำไมจะต้องเสียสละครั้งยิ่งใหญ่แบบนั้น...!!"
10029055-143 = "ฮัลโหล? นี่พวกคุณ? ช่วยฟังที่ฉันพูดหน่อยได้ไหมคะ?"
10029055-144 = "เหรียญที่ฉันใช้ไม่ใช่เงิน แต่เป็นเหรียญจากตู้เกมเซนเตอร์ต่างหาก...!"
10029055-145 = "จะเอา 500 เยนออกมาโยนทำไม ไม่เสียดายเงินเหรอ...!"
10029055-146 = "[s5] \"ช่างเถอะ ทุกคนแค่รู้สึกประทับใจน่ะ\"\n[s6] \"ปกติพวกนี้ตื่นเต้นง่ายอยู่แล้วด้วย...\""
10029055-150 = "เหมือนทุกคนจะไม่ได้ยินสินะคะ..."
10029055-151 = "งั้นก็ดีแล้วค่ะ คุณมิซากะ คงได้มีเพื่อนจากโลกใบนี้เร็วๆ นี้แล้วละ"
10029055-153 = "ดีเดออะไรกันเล่า!!"
10029055-154 = "ขอร้องละ ความปรารถนาภายใต้ข้าวเย็นของโคโทริ! ถ้าไม่พอเดี๋ยวฉันให้อีก 10 เยนเลย...!"
10029055-155 = "ขอร้องละค่ะ!"
10029055-156 = "ช่วยรับไว้เถอะนะ! 500 เยนของพวกเรา!"
10029055-157 = "510 เยนสิ!"
10029055-158 = "... 510 เยน!"
10029055-160 = "อ่า ก็บอกอยู่ว่า..."
10029055-164 = "...!"
10029055-165 = "... เฮ้อ"
10029055-166 = "ครั้งเดียวนะ งั้นก็เอา 500 เยนนั่นมาก่อน..."
10029055-170 = "... 510 เยนสิ"
10029055-171 = "... แล้วต่อไปก็อย่าเอาเรื่องเงินมาล้อกันเล่นล่ะ"

[translation]
11034020-1 = "#N-02"
11034020-3 = "จะว่าไป ฉันว่ามันก็นานแล้วนะที่พวกเรามารวมตัวกัน 4 คน แล้วทำอะไรอย่างมีเป้าหมายที่ยิ่งใหญ่#nแบบนี้"
11034020-4 = "เยี่ยมไปเลย เพราะแบบนี้สินะถึงได้บอกกันว่าทุกเรื่องที่เกิดขึ้นบนโลกย่อมมี 'เหตุ' ให้เกิดกันทั้งนั้น"
11034020-8 = "ถ้าอย่างนั้นในอนาคตฉันจะหา 'เหตุ' ให้ได้ทำสิ่งต่างๆ มากขึ้นนะ"
11034020-12 = "ใครก็ได้เอายัยนี่ไปเก็บที"
11034020-13 = "...??? เธอนั่นแหละเอายัยนั่นไปเก็บที เพราะเธอมักโดนยัยนั่นเล่นงานเป็นคนแรกตลอดเลยนี่นา"
11034020-15 = "อะฮ่าฮ่าฮ่า..."

[translation]
84309100101-6 = "你們兩個，關係看起來挺好的。"
84309100101-7 = "為什麼突然說這種話啊？什麼意思？"
84309100101-8 = "……沒什麼意思。"
84309100101-10 = "以後有機會的話，莉央也一起來吧。#n如果是要體驗類似的感覺的話，有很多像是密室逃脫遊戲店之類的地方。"
84309100101-11 = "雖然在千年可能不太方便，但是在其他地區的話應該沒問題吧？#n就比如三一之類的。"
84309100101-13 = "密室逃脫遊戲啊……聽起來完全是在遊樂嘛。"
84309100101-14 = "我，我……還沒有資格那麼悠哉……"
84309100101-15 = "所以你是想去還是不想去？"
84309100101-16 = "……"
84309100101-17 = "……等完成所有該做的事情之後，再來討論這件事吧。"
84309100101-18 = "呵呵，好吧。#n那我們說好了哦？寧瑠也要一起。"
84309100101-22 = "……我也要？？"
84309100101-23 = "嗯……我們三個人都要。"

[translation]
84309100101-6 = "You two seem pretty close."
84309100101-7 = "What are you talking about?"
84309100101-8 = "...It's nothing."
84309100101-10 = "Hey Rio, I was just thinking, if you get the chance later, you should join us for an escape room. They're a lot like these missions."
84309100101-11 = "You might not be able to get away with it here, but somewhere else, I'm sure you could. Trinity, for example."
84309100101-13 = "An escape room? As in, a game? Hm."
84309100101-14 = "I-I... I still don't have the right to enjoy that kind of leisure..."
84309100101-15 = "Is that a yes or a no?"
84309100101-16 = "..."
84309100101-17 = "...Once everything I have to do here is over, I'll let you know."
84309100101-18 = "Fufu, all right. It's a promise. You too, Neru."
84309100101-22 = "...? Me too??"
84309100101-23 = "Yes. ...All three of us."

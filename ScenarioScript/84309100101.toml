[translation]
84309100101-6 = "ทั้งสองคนดูสนิทกันมากเลยนะ"
84309100101-7 = "จู่ๆ ก็พูดอะไรของเธอเนี่ย พูดแบบนั้นหมายความว่าอะไร?"
84309100101-8 = "ไม่มีอะไรหรอก..."
84309100101-10 = "ถ้าคราวหน้ามีโอกาส ริโอะเองก็ไปด้วยกันสิคะ ไปเที่ยวคาเฟ่เขาวงกตด้วยกันก็ได้ค่ะ"
84309100101-11 = "ถึงจะไปไหนมาไหนในมิลเลเนียมได้ยาก แต่ถ้าเป็นเขตพื้นที่อื่นก็น่าจะไม่เป็นไรไม่ใช่เหรอคะ? อย่างเช่นในทรีนิตี้น่ะ"
84309100101-13 = "คาเฟ่เขาวงกตงั้นเหรอ ฟังดูก็เดาได้เลยว่าจะไปเล่นสนุกกันน่ะ"
84309100101-14 = "ฉะ... ฉัน... ยังไม่มีสิทธิ์ไปเล่นสนุกแบบนั้นหรอก..."
84309100101-15 = "ตกลงอยากไปหรือไม่อยากไปเนี่ย"
84309100101-16 = "..."
84309100101-17 = "ไว้ทำทุกอย่างที่ต้องทำหมดแล้ว ฉันจะบอกอีกทีแล้วกัน"
84309100101-18 = "ฮุฮุ ดีเลยค่ะ สัญญาแล้วนะคะ เนรุก็ด้วยนะ"
84309100101-22 = "ฉันด้วยเหรอ...??"
84309100101-23 = "ค่ะ... ไปกันทั้งสามคนนี่ละค่ะ"

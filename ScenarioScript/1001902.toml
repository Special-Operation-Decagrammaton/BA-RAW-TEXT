[translation]
1001902-1 = "การซ่อนเร้น"
1001902-2 = "เขตเมืองในทรีนิตี้"
1001902-3 = "(คุณครูลองไปตามพิกัดก็พบว่ามันคือถนนที่แสนคึกคักในเขตสถาบันทรีนิตี้)"
1001902-4 = "..."
1001902-5 = "มาแล้วเหรอคุณครู"
1001902-6 = "ทำไมทำหน้าแบบนั้นล่ะ? เพราะนัดมาพบกันในที่ที่คนพลุกพล่านแบบนี้เหรอ?"
1001902-7 = "หรือว่าคาดหวังให้เป็นสถานที่ลับอะไรอยู่งั้นเหรอ? เสียใจด้วยนะ ที่สถาบันทรีนิตี้ไม่มีที่ที่แบบนั้นหรอก"
1001902-8 = "ถ้าจะพูดว่ามีโอกาสที่จะถูกดักฟัง สะกดรอยตามหรือเฝ้าจับตาดูก็คงไม่เกินจริงหรอก ก็ที่นี่มันเหมือน#nกับถ้ำงูพิษดีๆ เลยละ"
1001902-9 = "[s1] \"ถ้ำงูพิษ...\" \n[s2] \"เปรียบเทียบได้แรงมาก...\""
1001902-10 = "ครูก็พูดเกินไป"
1001902-11 = "ครูก็พูดเกินไป"
1001902-12 = "ถ้าเป็นที่ที่ปลอดภัยละก็คงเป็นที่ที่มีคนเยอะและกว้างใหญ่แบบนี้ ที่ที่ไม่มีใครสนใจพวกเราแบบนี้#nไงล่ะ"
1001902-13 = "เหมือนกับคำกล่าวว่าหากจะซ่อนต้นไม้ก็ต้องเอาไปซ่อนในป่า"
1001902-14 = "ดูสิ ตอนนี้ไม่มีใครสนใจพวกเราเลยไม่ใช่รึไง?"
1001902-16 = "เอ๋? นั่นเด็กน่ารักๆ ที่เพิ่งย้ายโรงเรียนมานี่นา?"
1001902-17 = "แล้วผู้ใหญ่คนนั้นใครกันล่ะ?"
1001902-18 = "หรือว่าจะเป็นคนในข่าวลือนั่น...?"
1001902-19 = "...."
1001902-20 = "...."
1001902-21 = "[s3] \"อาซึสะนี่สะดุดตาดีนะ...\"\n[s4] \"ครูเองก็เป็นที่สะดุดตาทุกที่เลยนะเนี่ย...\""
1001902-22 = "ไม่นะ... ฉันลืมเอาชุดพรางตัวมาด้วย พวกเราคงต้องหาวิธีที่จะทำให้ดูกลมกลืนกับฝูงชนแล้ว..."
1001902-23 = "ไม่นะ... ฉันลืมเอาชุดพรางตัวมาด้วย พวกเราคงต้องหาวิธีที่จะทำให้ดูกลมกลืนกับฝูงชนแล้ว..."
1001902-24 = "แต่เดี๋ยวก่อนสิ ตอนนี้ทั้งฉันและครูไม่ได้แต่งตัวสะดุดตาเลยสักหน่อย...!"
1001902-25 = "ทำไมเด็กนักเรียนโรงเรียนนี้ถึงสนใจคนอื่นมากขนาดนี้นะ?!"
1001902-26 = "[s] \"ทำไมต้องตะโกนใส่ครูด้วย...\""
1001902-27 = "กะ... ก่อนอื่นมาทางนี้กันก่อนเถอะ!"
1001902-29 = "ที่นี่คงไม่เป็นไรแล้วละ"
1001902-30 = "ถ้าเป็นที่นี่เราคงจะหลบการดักฟัง สะกดรอยตาม หรือเฝ้าระวังได้..."
1001902-31 = "เฮ้อ... แต่เราห้ามการ์ดตกเด็ดขาด เพราะถ้าทำอย่างนั้นละก็..."
1001902-32 = "[s] \"อ๊ะ! ตรงนั้นมีคนใส่ชุดพรางตัวแอบดูเราอยู่!\""
1001902-37 = "(แกรก)"
1001902-39 = "ปังปังปังปังปังปังๆๆๆ!!"
1001902-44 = "..."
1001902-45 = "[s] \"...\""
1001902-46 = "อืม..."
1001902-47 = "อาจเป็นแค่ลมพัดเลยทำให้พุ่มไม้สั่นก็ได้นะคุณครู"
1001902-48 = "[s] \"ขอโทษนะ ครูแค่ล้อเล่น...\""
1001902-49 = "..."
1001902-51 = "ฉันพอจะเข้าใจสิ่งที่คุณครูอยากจะสื่อแล้วละ..."
1001902-52 = "คุณครูคงคิดว่าฉันระวังตัวมากเกินไปสินะ"
1001902-53 = "แต่ช่วยอย่าล้อเล่นแบบเมื่อกี้อีกก็แล้วกัน ถ้าพลาดไปอาจจะทำให้คุณครูบาดเจ็บก็ได้"
1001902-54 = "[s] \"ขอโทษนะ...\""
1001902-55 = "ฉันยังไม่ค่อยมั่นใจเรื่องที่นี่สักเท่าไหร่น่ะ..."
1001902-56 = "สถานที่ที่ไม่คุ้นเคย ผู้คนที่ไม่คุ้นเคย ชีวิตที่ไม่คุ้นเคย... ถ้าฉันจะกังวลมันก็ช่วยไม่ได้นี่นา"
1001902-57 = "สำหรับฉันแล้ว พวกนักเรียนที่นี่ดูทำตัวตามสบายเกินไปด้วยซ้ำ"
1001902-58 = "เราทุกคนมีชีวิตเพียงแค่หนึ่งเดียว ทำไมพวกนั้นถึงใช้ชีวิตอย่างเสียเปล่าไปแบบนั้นกัน?#nพวกเธอหัวทึบกันรึเปล่า? นั่นละคือสิ่งที่ฉันคิดเวลาเห็นคนพวกนั้น"
1001902-59 = "ฉันรู้ดีว่าที่นี่ ฉันอาจเป็นฝ่ายที่แปลก... ฉันรู้เรื่องนั้นดี"
1001902-60 = "เพราะอย่างนั้นฉันเลยอยากให้คุณครูช่วย"
1001902-61 = "และนั่นก็คือเหตุผลที่ฉันเรียกคุณครูมาวันนี้"
1001902-62 = "[s] \"จะให้ครูช่วยยังไงเหรอ?\""
1001902-63 = "ก่อนอื่น..."
1001902-64 = "ฉันอยากปรับตัวเข้ากับที่นี่ให้ได้"
1001902-65 = "แต่ว่าฉันยังไม่ค่อยรู้เรื่องของที่นี่เท่าไหร่เลย..."
1001902-66 = "[s5] \"ถ้างั้นลองทัวร์สำรวจทรีนิตี้กับเพื่อนๆ ดูมั้ย\"\n[s6] \"ให้เพื่อนคนอื่นช่วยดีมั้ย...?\""
1001902-67 = "ฉันไม่อยากให้นักเรียนคนอื่นช่วยนี่นา! ฉันอยากได้มุมมองจากคนภายนอกมากกว่า"
1001902-68 = "ฉันไม่อยากให้นักเรียนคนอื่นช่วยนี่นา! ฉันอยากได้มุมมองจากคนภายนอกมากกว่า"
1001902-69 = "นักเรียนโรงเรียนทรีนิตี้คนอื่นคุ้นเคยกับที่นี่อยู่แล้ว มุมมองจากคนที่คุ้นชินแล้วช่วยไม่ได้หรอก"
1001902-70 = "เพราะความคุ้นเคยจะทำให้มองข้ามจุดสำคัญไป และการมองข้ามจุดสำคัญก็จะนำไปสู่..."
1001902-71 = "การถูกทำลายยังไงละ... เรื่องนี้คือความจริงแท้แน่นอน"
1001902-72 = "แล้วก็... ถ้าเป็นคุณครูละก็..."
1001902-73 = "[s7] \"ครูช่วยเอง สัญญา\"\n[s8] \"ตั้งแต่พรุ่งนี้ไป ครูจะพาไปทัวร์พิเศษ\""
1001902-74 = "เข้าใจแล้ว..."
1001902-75 = "เข้าใจแล้ว..."
1001902-76 = "แล้วฉันจะติดต่อไปใหม่นะ"
1001902-77 = "ส่วนชื่อแฝงที่ใช้เวลาสื่อสารกัน ฉันจะใช้เป็นชื่อ <เพนกวิ้น> นะ"
1001902-78 = "และของคุณครูก็คือ <เป็ด>"
1001902-79 = "[s] \"เป็ด...? เพนกวิ้น...?\""
1001902-80 = "มะ...มันไม่มีเหตุผลพิเศษอะไรหรอก! ถ้ามีเหตุผลก็ไม่ใช่ชื่อแฝงสิ!"
1001902-81 = "ถ้างั้นก็รอฉันติดต่อไปแล้วกัน..."
1001902-83 = "...บาย"

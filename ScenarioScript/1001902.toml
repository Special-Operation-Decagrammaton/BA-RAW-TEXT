[translation]
1001902-1 = "隱匿事項"
1001902-2 = "三一．市區"
1001902-3 = "（前往座標指定的地點，原來是三一學園的鬧區）"
1001902-4 = "……"
1001902-5 = "你來了啊，老師。"
1001902-6 = "……那是什麼表情？該不會是因為我找你來這種人多的地方吧？"
1001902-7 = "難不成你以為會帶你到某個隱密場所嗎？很抱歉，何況三一學園境內根本沒有隱密場所這種東西。"
1001902-8 = "你最好當作我們隨時都正在被竊聽、跟蹤或監視，這裡可是個魔窟。"
1001902-9 = "[s1] 「魔窟……」\n[s2] 「好不留情的評論……」"
1001902-10 = "是老師太天真了。"
1001902-11 = "是老師太天真了。"
1001902-12 = "因此要反其道而行，像這種寬敞人多，能夠混入人群中的地方反而比較安全。"
1001902-13 = "俗話說藏木於林，就是這個道理。"
1001902-14 = "你看，實際上根本沒有人注意我們，對吧？"
1001902-16 = "哦！是那個可愛的轉學生！"
1001902-17 = "旁邊還有個大人耶……！那是誰呢？"
1001902-18 = "難道就是傳聞中的那個……？"
1001902-19 = "……"
1001902-20 = "……嗚。"
1001902-21 = "[s3] 「梓很可愛很醒目呢……」\n[s4] 「我好像太醒目了……」"
1001902-22 = "嗚，看來我應該找個能更加融入人群之中的方法……"
1001902-23 = "嗚，看來我應該找個能更加融入人群之中的方法……"
1001902-24 = "不過，我和老師又沒有打扮得很顯眼……！"
1001902-25 = "……這間學園裡的人怎麼都對別人這麼感興趣啊？！"
1001902-26 = "[s] 「你問我我也不知道呀……」"
1001902-27 = "總，總之你先跟我來！"
1001902-29 = "……這邊應該就行了吧？"
1001902-30 = "這邊不管是受到狙擊、竊聽或跟蹤的風險都非常低。"
1001902-31 = "呼……啊，但依然不能鬆懈，老師。要是一放鬆警戒……"
1001902-32 = "[s] 「啊！那邊有個穿吉利服的人！」"
1001902-37 = "（喀嚓！）"
1001902-39 = "（噠噠噠噠噠噠噠噠噠噠！！）"
1001902-44 = "……"
1001902-45 = "[s]「……」"
1001902-46 = "……嗯。 "
1001902-47 = "看來，那只是剛好有風吹過樹叢而已。放心吧，老師。"
1001902-48 = "[s]「對不起……我是開玩笑的。」"
1001902-49 = "……"
1001902-51 = "……不過，我知道老師你想要說什麼了。"
1001902-52 = "總而言之就是不需要太過緊張對吧。"
1001902-53 = "不過還請你別開剛才那樣的玩笑。要是有個閃失，說不定會讓老師受傷的。"
1001902-54 = "[s]「對不起……」"
1001902-55 = "……我本來就幾乎無法信任自己周遭的事物。"
1001902-56 = "加上現在身處於陌生的地方、陌生的人群、陌生的生活……這麼多因素，要我不緊張根本不可能。"
1001902-57 = "我反而覺得是這裡的學生太沒有危機意識了。 "
1001902-58 = "人的性命只有一條，卻怎麼能過得這麼輕鬆？就算是自己熟悉的環境，也未免太過安逸了。老實說這讓我非常錯愕。"
1001902-59 = "但想必，在這個地方我才算是異類吧……這點自知之明我還是有的。"
1001902-60 = "所以我希望老師你能幫幫我。"
1001902-61 = "我今天找你來就是為了這件事……"
1001902-62 = "[s] 「我很樂意。我該怎麼幫忙呢？」"
1001902-63 = "首先……"
1001902-64 = "我想要適應這個地方。"
1001902-65 = "我才來到這裡沒多久，還不清楚在這學園裡怎樣才叫做正常……"
1001902-66 = "[s5] 「帶你參觀一下三一就可以了嗎？」\n[s6] 「如果是這樣，請其他學生會比較……」"
1001902-67 = "對了，我不要其他學生！我需要「也沒有很習慣的」外部人士意見。"
1001902-68 = "對了，我不要其他學生！我需要「也沒有很習慣的」外部人士意見。"
1001902-69 = "其他三一的學生都已經摸透這個地方了。從她們的角度勢必會有所忽略。"
1001902-70 = "習慣會造成盲點，而一旦忽略盲點……"
1001902-71 = "就會像群蟻潰堤一般毀於一旦，是最典型的毀滅模式。"
1001902-72 = "還有……如果是老師的話……"
1001902-73 = "[s7] 「好，我答應你。」\n[s8] 「那就明天開始觀光三一吧。」"
1001902-74 = "……謝謝。"
1001902-75 = "……謝謝。"
1001902-76 = "那麼我會馬上再連絡你。"
1001902-77 = "啊，然後我們之後聯絡時的暗號，我是「企鵝」。"
1001902-78 = "然後老師是「鴨子」。"
1001902-79 = "[s] 「企鵝……？鴨子……？」"
1001902-80 = "沒什麼理由。更何況最好不要硬是給暗號添加理由！ "
1001902-81 = "……那麼，"
1001902-83 = "……下次見。"

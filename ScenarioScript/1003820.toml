[translation]
1003820-1 = "#title;SRT, 추억합니다."
1003820-2 = "#place;샬레 휴게실"
1003820-3 = "#na;(샬레의 휴게실에서 미야코와 함께 RABBIT 소대의 세탁물을 수거하던 중……)"
1003820-4 = "3;미야코;03;……도와주셔서 감사합니다, 선생님.\n#3;a\n#3;em;[반응]"
1003820-5 = "3;미야코;07;덕분에 미뤄두었던 빨래들을 모두 깨끗이 말릴 수 있었네요."
1003820-6 = "3;미야코;03;선생님께서 건조기를 빌려주시지 않았더라면, 장마가 끝날 때까지 덜 마른 옷을 입고 생활을 해야 했을 거예요."
1003820-7 = "3;미야코;99;덜 마른 옷은 불쾌한 감촉은 둘째치더라도, 소대원들의 건강에 나쁜 영향을 끼칠 것이 분명하니……\n#3;em;…"
1003820-8 = "[s1] \"너무 무리는 하지 마.\"\n[s2] \"필요하다면 샬레의 다른 시설도 자유롭게 사용해.\""
1003820-9 = "#wait;100"
1003820-10 = "#wait;100"
1003820-11 = "3;미야코;03;……감사합니다, 선생님.\n#3;em;[음표]\n#3;greeting"
1003820-12 = "3;미야코;02;처음 공원에서 야영을 시작했을 때만 하더라도 추위나 더위 걱정만 했지, 샤워나 세탁과 같은 일상적인 부분에서 지장이 생길 거라고는 상상치도 못했거든요."
1003820-13 = "3;미야코;99;교범으로 작전을 배울 때와는 달리, 실제 상황에서는 언제나 예상치 못한 변수가 잔뜩 생기는 것 같네요.\n#3;em;[땀]"
1003820-14 = "3;미야코;06;어엿한 한 사람의 소대장이 되기 위해서는 아직도 한참 배워야 할 것 같습니다."
1003820-15 = "#st;[0,0];instant;1;"
1003820-16 = "#clearST"
1003820-17 = "#wait;2500"
1003820-18 = "3;미야코;02;남은 세탁물의 건조도 모두 끝난 모양이네요.\n#3;em;[반응]"
1003820-19 = "3;미야코;03;저는 먼저 가서 세탁물을 분류하고 있겠습니다. 선생님께서는 이곳에서 편히 쉬고 계세요.\n#3;greeting"
1003820-20 = "#st;[0,0];instant;1;"
1003820-21 = "#clearST"
1003820-22 = "3;미야코;03\n#3;m2\n#wait;1500"
1003820-23 = "#wait;1500"
1003820-24 = "3;미야코;03\n#3;m1\n#wait;2500"
1003820-25 = "[ns3] \"미야코, 뭔가 떨어졌어.\"\n[ns4] \"이건…… 명찰인가?\""
1003820-26 = "#wait;100"
1003820-27 = "#wait;100"
1003820-28 = "3;미야코;02;아……\n#3;em;[반응]"
1003820-29 = "3;미야코;04;감사합니다, 선생님. 빨래 바구니에서 떨어진 걸 알아차리지 못했었네요.\n#3;m3"
1003820-30 = "[s5] \"세탁 중에 제복에서 떨어져 나간 건가?\"\n[s6] \"다시 붙여야 한다면 반짇고리를 빌려줄게.\""
1003820-31 = "#wait;100"
1003820-32 = "#wait;100"
1003820-33 = "3;미야코;02;아뇨, 괜찮습니다. 이 명찰은 제복에 붙어있던 것이 아니라……\n#3;em;…"
1003820-34 = "3;미야코;03;처음부터 떨어진 걸 주머니에 넣어두고 있었던 것이라서요."
1003820-35 = "[s] \"어째서 떨어진 명찰을 가지고 다니는 거야?\""
1003820-36 = "3;미야코;99;이 명찰은…… 제가 SRT 학원에 처음 입학했을 때 받은 훈련생용 명찰입니다.\n#3;em;…"
1003820-37 = "3;미야코;01;낡은 훈련복에 붙이는 명찰이라, 정식으로 소대 배치를 받은 이후로는 착용할 일은 없었지만……"
1003820-38 = "3;미야코;03;이 명찰을 보고 있노라면 처음 SRT 학원에 입학했을 때의 감정이 새록새록 떠오르거든요."
1003820-39 = "3;미야코;99;가혹한 상황에서도 변치 않는 굳건한 정의와, 빛나는 선배들의 모습들……"
1003820-40 = "3;미야코;03;마음이 꺾였을 때도 이 감정을 떠올릴 수만 있다면, 그 어떤 유혹이라도 이겨낼 수 있을 것 같아서요."
1003820-41 = "3;미야코;07;그래서 초심을 잃지 않기 위해 이 명찰은 언제나 주머니에 넣어 가지고 다닌답니다.\n#3;em;[음표]"
1003820-42 = "[s] \"멋진 마음가짐이네.\""
1003820-43 = "#st;[0,0];instant;1;"
1003820-44 = "#clearST"
1003820-45 = "#wait;2500"
1003820-46 = "[ns7] \"그러고 보니 처음 만났을 때 미야코는 나를 싫어했었지……\"\n[ns8] \"초심을 유지하는 건 좋지만, 미야코가 나를 또 싫어하게 되면 어쩌지?\""
1003820-47 = "#wait;100"
1003820-48 = "#wait;100"
1003820-49 = "3;미야코;08\n#3;em;[?!]\n#3;shake\n#wait;1500"
1003820-50 = "3;미야코;10;놀리지 말아 주세요, 선생님.\n#3;stiff"
1003820-51 = "3;미야코;09;그때는 선생님이 저희를 방해한다고 생각했었고…… 무엇보다 선생님에 대해 잘 모르던 때였으니까요.\n#3;em;[///]"
1003820-52 = "3;미야코;99;선생님과 함께 한 일상과 이 기억들이 사라지지 않는 한……"
1003820-53 = "3;미야코;03;……변치 않는 것은 지금의 마음일 테니까요.\n#3;em;[하트]"
1003820-54 = "#all;hide"
1003820-55 = "#na;(이후, 미야코와 옛이야기를 나누며 즐거운 시간을 보냈다.)"

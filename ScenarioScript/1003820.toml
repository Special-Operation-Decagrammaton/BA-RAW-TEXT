[translation]
1003820-1 = "Remembering SRT"
1003820-2 = "Schale Lounge"
1003820-3 = "I was helping Miyako fold the RABBIT Squad's laundry in the Schale Lounge."
1003820-4 = "Thank you for your help, Sensei."
1003820-5 = "Now our laundry should be nice and dry."
1003820-6 = "If you had not let us use the dryer here, we would be stuck with damp clothes in the middle of the rainy season."
1003820-7 = "I cannot imagine how uncomfortable that would be. Or what the cold weather and wet clothes would do to the squad's health."
1003820-8 = "[s1] \"Be careful out there.\"\n[s2] \"Feel free to use Schale's other facilities as needed.\""
1003820-11 = "Thank you, Sensei."
1003820-12 = "When we first started camping, our only worry was the weather. Needing to take showers or do laundry never crossed our minds."
1003820-13 = "I guess life isn't as straightforward as the operations in our textbooks."
1003820-14 = "Seems I have a lot to learn before I can become a full-fledged squad leader."
1003820-18 = "Ah, the rest of our laundry finished drying."
1003820-19 = "I'll fold those. Feel free to take a break, Sensei."
1003820-25 = "[ns3] \"Miyako, you dropped something.\"\n[ns4] \"Is this a name tag?\""
1003820-28 = "Oh..."
1003820-29 = "You're quite observant, Sensei. It must have fallen from the laundry basket."
1003820-30 = "[s5] \"Maybe the laundry machine knocked it off your uniform?\"\n[s6] \"I have a sewing kit if you need to stitch it back on.\""
1003820-33 = "No, it's fine. I never wore this name tag on my uniform..."
1003820-34 = "I always keep it tucked away in my pocket."
1003820-35 = "[s] \"Why carry a nametag that fell off?\""
1003820-36 = "This is my trainee nametag. I received it when I first came to SRT Academy."
1003820-37 = "It was meant for our old trainee uniforms. After I was officially assigned to a squad, I never had to use it again."
1003820-38 = "Holding it brings me back to the old days."
1003820-39 = "Our unyielding justice even in the harshest conditions. Looking upon my seniors, so bold and brilliant."
1003820-40 = "Even when I'm feeling down, when I remember those times, I find the strength to pull through."
1003820-41 = "That is why I keep this nametag in my pocket, as my personal forget-me-not."
1003820-42 = "[s] \"That's pretty thoughtful...\""
1003820-46 = "[ns7] \"Now that I think about it, we didn't meet under the best circumstances.\"\n[ns8] \"It's nice to remember the good old days, but hopefully you don't remember us butting heads...\""
1003820-50 = "Don't be cheeky, Sensei."
1003820-51 = "At the time I thought you were just getting in the way... Honestly? I didn't trust you yet."
1003820-52 = "I remember the good moments too, Sensei."
1003820-53 = "So don't worry. How I feel right now won't change..."
1003820-55 = "Miyako and I had a nice time reminiscing and folding clothes."

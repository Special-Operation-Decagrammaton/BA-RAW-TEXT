[translation]
1003820-1 = "SRT วันแห่งความทรงจำค่ะ"
1003820-2 = "ห้องพักผ่อนชาเล่ต์"
1003820-3 = "(ระหว่างที่คุณครูช่วยมิยาโกะแยกผ้าของกองทหาร RABBIT ที่นำมาซักอยู่ที่ห้องพักผ่อนของชาเล่ต์...)"
1003820-4 = "...ขอบคุณที่ช่วยนะคะ คุณครู"
1003820-5 = "คุณครูบอกให้มาใช้ที่นี่ได้ ก็เลยซักผ้าได้หอมสะอาดเลยละค่ะ"
1003820-6 = "ถ้าคุณครูไม่ให้ยืมใช้เครื่องอบผ้าละก็ คงจะต้องใส่เสื้อผ้าชื้นๆ ไปจนฝนฤดูร้อนจะหยุดตกแน่ๆ เลยค่ะ"
1003820-7 = "ผ้าชื้นๆ น่ะ นอกจากจะทำให้ไม่สบายตัว ยังส่งผลเสียต่อสุขภาพของสมาชิกคนอื่นๆ ด้วยค่ะ..."
1003820-8 = "[s1] \"อย่าฝืนตัวเองจนเกินไปล่ะ\"\n[s2] \"ถ้าจำเป็นก็มาใช้อุปกรณ์ของชาเล่ต์ได้ตามสบายเลย\""
1003820-11 = "...ขอบคุณนะคะ คุณครู"
1003820-12 = "ตอนแรกที่ออกมาใช้ชีวิตตั้งแคมป์กลางแจ้ง ฉันก็กังวลแค่เรื่องอากาศหนาวกับอากาศร้อนแค่นั้น ไม่ได้คิดถึงเรื่องในชีวิตประจำวันอย่างการอาบน้ำ หรือซักผ้าเลยค่ะ"
1003820-13 = "การใช้ชีวิตจริงไม่เหมือนกับที่เรียนรู้วิธีปฏิบัติการจากในคู่มือเลย ดูเหมือนมันมักจะมีตัวแปรอื่นๆ ที่คาดไม่ถึงเกิดขึ้นมาเรื่อยๆ เลยค่ะ"
1003820-14 = "ฉันยังห่างไกลกับการเป็นหัวหน้ากองที่น่านับถืออยู่มาก คงต้องเรียนรู้อีกเยอะเลยค่ะ"
1003820-18 = "ผ้าที่เหลือดูเหมือนจะแห้งหมดแล้วละค่ะ"
1003820-19 = "ฉันขอไปแยกผ้าก่อนนะคะ คุณครูพักผ่อนตามสบายเลยค่ะ"
1003820-25 = "[ns3] \"มิยาโกะ มีอะไรหล่นอยู่แน่ะ\"\n[ns4] \"นี่มัน...ป้ายชื่อเหรอ?\""
1003820-28 = "อ๊ะ..."
1003820-29 = "ขอบคุณค่ะคุณครู ฉันไม่ได้สังเกตเลยว่ามันตกลงมาจากตะกร้าผ้าที่เอามาซักน่ะค่ะ"
1003820-30 = "[s5] \"หลุดมาจากชุดนักเรียนตอนซักแหละมั้ง?\"\n[s6] \"ถ้าต้องเย็บติดใหม่ เดี๋ยวครูไปเอากล่องเย็บผ้ามาให้นะ\""
1003820-33 = "ไม่เป็นไรค่ะ ไม่ต้องหรอกค่ะ ป้ายชื่ออันนี้ไม่ใช่ป้ายที่ติดอยู่ที่ชุดนักเรียนหรอกค่ะ..."
1003820-34 = "มันเป็นป้ายชื่อที่เก็บไว้ในกระเป๋าน่ะค่ะ คงหล่นมาจากในกระเป๋ามากกว่า"
1003820-35 = "[s] \"ทำไมถึงพกป้ายชื่อใส่กระเป๋าไปไหนมาไหนด้วยล่ะ?\""
1003820-36 = "ป้ายชื่ออันนี้... เป็นป้ายชื่อที่ใช้ตอนเป็นเด็กฝึก สมัยเข้าเรียนที่สถาบัน SRT ใหม่ๆ ค่ะ"
1003820-37 = "มันเป็นป้ายชื่อที่ติดอยู่ที่ชุดฝึกเก่าๆ เพราะงั้นหลังจากที่ได้รับป้ายกองกำลังอย่างเป็นทางการมาแล้ว ก็เลยไม่ค่อยได้ใช้เลยค่ะ..."
1003820-38 = "เวลาที่เห็นป้ายชื่ออันนี้ มันทำให้ชวนนึกถึงความรู้สึกในตอนที่เข้าเรียนที่สถาบัน SRT ครั้งแรกอยู่เสมอๆ เลยค่ะ"
1003820-39 = "ภาพของพวกรุ่นพี่ที่เปล่งประกาย ความยุติธรรมที่ไม่สั่นคลอน แม้จะอยู่ในสถานการณ์เลวร้ายแค่ไหน ..."
1003820-40 = "ในตอนที่หวั่นไหว ฉันคิดว่าถ้าจำความรู้สึกเหล่านี้ได้ละก็ ไม่ว่าจะเจอการหลอกล่อแบบไหนก็ดูเหมือน#nจะเอาชนะได้แน่ๆ น่ะค่ะ"
1003820-41 = "เพราะงั้นฉันเลยพกป้ายชื่ออันนี้ใส่กระเป๋าไปไหนมาไหนด้วยตลอด เพื่อไม่ให้ลืมความตั้งใจเดิมไปค่ะ"
1003820-42 = "[s] \"เป็นความมุ่งมั่นที่สุดยอดเลยนะ\""
1003820-46 = "[ns7] \"จะว่าไป ตอนเจอกันครั้งแรก มิยาโกะก็ไม่ชอบขี้หน้าครูนี่นา...\"\n[ns8] \"รักษาความตั้งใจเดิมไว้ก็ดีอยู่หรอก แต่ถ้ามิยาโกะเกลียดครูขึ้นมาทำไงล่ะ?\""
1003820-50 = "อย่ามาล้อกันเล่นสิคะ คุณครู..."
1003820-51 = "ตอนนั้น ฉันคิดว่าคุณครูมาขัดขวางพวกเรา... แล้วก็เป็นตอนที่ยังไม่รู้จักคุณครูดีเลยด้วยค่ะ"
1003820-52 = "ตราบใดที่ความทรงจำต่างๆ และชีวิตประจำวันที่มีร่วมกับคุณครูแบบนี้ไม่หายไป..."
1003820-53 = "ความรู้สึกในตอนนี้ก็จะไม่เปลี่ยนแปลงไปหรอกค่ะ"
1003820-55 = "(หลังจากนั้น คุณครูก็ใช้เวลาพูดคุยเรื่องราวต่างๆ ในอดีตกับมิยาโกะอย่างสนุกสนาน)"

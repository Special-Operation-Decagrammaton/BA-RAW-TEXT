[translation]
1003820-1 = "SRT，回憶"
1003820-2 = "夏萊．休息室"
1003820-3 = "（在夏萊的休息室和都子一起收拾RABBIT小隊洗好的衣服時……）"
1003820-4 = "……謝謝你的協助，老師。"
1003820-5 = "託你的福，堆積的衣服終於可以烘乾了。"
1003820-6 = "要不是有老師借我們烘衣機，我們可能就得穿著沒乾的衣服，直到梅雨季結束了。"
1003820-7 = "穿著沒乾的衣服除了不舒服外，也會對小隊員們的健康造成負面影響……"
1003820-8 = "[s1]「不要太勉強。」\n[s2]「有需要的話，也可以自由使用夏萊的其他設施。」"
1003820-11 = "……謝謝你，老師。"
1003820-12 = "剛開始在公園露營時，我擔心的只有天氣的冷熱……#n沒想到在洗澡、洗衣等等日常生活方面也會出現困難。"
1003820-13 = "與在教戰手冊中學習戰略不同，實際情況總是充滿意料之外的變數。"
1003820-14 = "看來要成為一名獨當一面的小隊長，我還有很多需要學習的地方。"
1003820-18 = "剩下的衣服好像也都烘乾了。"
1003820-19 = "我先去把洗好的衣服分類一下。#n請老師在這裡好好休息。"
1003820-25 = "[ns3]「都子，有東西掉了唷。」\n[ns4]「這是……名牌嗎？」"
1003820-28 = "啊……"
1003820-29 = "謝謝你，老師。#n我沒發現它從洗衣籃裡掉出來了。"
1003820-30 = "[s5]「是清洗時從制服上掉下來了嗎？」\n[s5]「需要縫回去的話，我可以借你針線盒。」"
1003820-33 = "不，沒關係。這塊名牌不是縫在衣服上的……"
1003820-34 = "它從一開始就放在口袋裡。"
1003820-35 = "[s]「為什麼要帶著脫落的名牌呢？」"
1003820-36 = "這塊名牌……是我剛進入SRT學園時拿到的訓練生用名牌。"
1003820-37 = "因為是貼在舊訓練服上的名牌，所以在正式分配小隊後就沒有戴過了……"
1003820-38 = "看著這塊名牌，就會讓我回想起剛進入SRT學園時的心情。"
1003820-39 = "即使身處嚴酷的環境也永不動搖的正義，以及前輩們閃亮耀眼的模樣……"
1003820-40 = "每當我灰心喪志的時候，#n只要回想當初的心情，彷彿就能夠克服任何誘惑。"
1003820-41 = "所以為了不忘初衷，我一直將這塊名牌放在口袋裡。"
1003820-42 = "[s]「態度令人讚賞呢。」"
1003820-46 = "[ns7]「這麼說來，第一次見面的時候，都子很討厭我……」\n[ns8]「保持初衷固然好，但要是都子又討厭我的話該怎麼辦呢？」"
1003820-50 = "請別取笑我了，老師。"
1003820-51 = "那時我以為老師是想阻礙我們……更重要的是，那時我還不了解老師。"
1003820-52 = "只要還記得與老師共度的日常……"
1003820-53 = "……現在的心情就永遠不會改變。"
1003820-55 = "（之後，和都子聊著往事，度過了愉快的時光）"

[translation]
12110-1 = "ตอนที่ 11;การต่อสู้ที่ไร้หนทางชนะ"
12110-2 = "(แกรก แกรก)"
12110-3 = "ท่านประธานคะ... นี่ฉันต้องเขียนไปจนถึงเมื่อไรเหรอคะ?"
12110-4 = "ตอนนี้ได้แค่ 200 หน้าเองนี่นา เธอไม่ได้บอกเองเหรอว่าจะเขียนให้ได้ 1,000 หน้า? \n\n"
12110-5 = "ฉันแค่เปรียบเปรยว่าจะเขียนหนังสือสำนึกผิดให้เยอะๆ แค่นั้น..."
12110-6 = "เงียบไปเลย\n"
12110-7 = "เฮ้อ... ก็ได้ค่ะ ฉันจะเขียนเพิ่มอีกค่ะ...\n\n"
12110-8 = "(แกรก แกรก)"
12110-9 = "ว่าแต่..."
12110-12 = "คนที่ชื่อโฮชิโนะจากอะบิดอสนั่น... ประธานรู้จักด้วยเหรอคะ?"
12110-13 = "ไม่หรอก เพิ่งเคยเจอตัวจริงครั้งแรกเหมือนกันน่ะ"
12110-14 = "งั้นเหรอคะ... แต่ท่านประธานพูดเหมือนกับว่ารู้จักคนคนนั้นเลย..."
12110-15 = "......"
12110-16 = "ทาคานาชิ โฮชิโนะ... \n"
12110-17 = "เด็กนักเรียนที่ได้รับการขนานนามว่าเป็น <อัจฉริยะ> เมื่อสองปีก่อน หน่วยข่าวกรองระบุไว้ว่า คนคนนั้นเป็นหนึ่งในคนที่มีความสามารถที่อาจเป็นภัยคุกคามเกเฮนน่าได้"
12110-18 = "คะ? แต่ดูจากลักษณะแล้วไม่น่าเป็นอย่างนั้นเลยนี่คะ?!"
12110-21 = "ดูเหมือนจะเป็นคนชิลๆ ไม่ค่อยสนอะไรซะมากกว่า..."
12110-23 = "อย่าตัดสินคนจากภายนอกสิ อาโกะ \n"
12110-24 = "...แต่ตอนนี้เธอคนนั้นดูจะต่างไปจากเมื่อสองปีก่อนเหมือนกัน"
12110-25 = "เมื่อก่อนเธอคนนั้นเป็นคนหัวร้อน เอะอะก็ชอบใช้ความรุนแรง เป็นคนบ้าระห่ำ แต่ก็ฉลาดเป็นกรด"
12110-26 = "แต่ก็เอาเถอะ..."
12110-27 = "ถ้าต้องต่อสู้กับเธอคนนั้นในสมัยก่อนละก็ สมาชิกของคณะกรรมการวินัยคงต้านทานไม่ไหวแน่ และนั่นก็เป็นเพราะนิสัยใจร้อนของเธอนะ อาโกะ"
12110-28 = "ดีไม่ดีเราอาจได้รับความเสียหายมากขึ้นอีก เพราะมี <ชาเล่ต์> เข้ามาเกี่ยวข้องด้วย"
12110-29 = "แต่ว่าเราก็วิเคราะห์ความสามารถของพวกนั้นไว้ทั้งหมดแล้วนี่คะ... ตามข้อมูลบอกว่า..."
12110-30 = "จู่ๆ พวกนั้นก็หยุดออกปฏิบัติการ และไม่มีข่าวคราวอะไรอยู่พักใหญ่"
12110-31 = "ก็โรงเรียนนั้นเล็กมาก หน่วยข่าวกรองคงคิดว่าไม่เป็นภัยคุกคามอะไรแล้ว"
12110-32 = "ถ้าอยากรู้รายละเอียดละก็ ลองไปค้นเอกสารเก่าๆ ของหน่วยข่าวกรองดูสิ"
12110-36 = "ยังคงไม่คิดจะไปจากอะบิดอสสินะ... ทาคานาชิ โฮชิโนะ"
12110-37 = "ทำไมกันนะ...?"
12110-39 = "เจ้าหนี้ของอะบิดอส...\n"
12110-40 = "......ไคเซอร์ คอร์เปอเรชั่น"
12110-42 = "อ่อ หรือว่าฉันควรแนะนำตัวอย่างเป็นทางการดีล่ะ...? ฉันคือกรรมการใหญ่ของไคเซอร์ คอร์เปอเรชั่น สินเชื่อไคเซอร์ และไคเซอร์ คอนสตรัคชั่น"
12110-43 = "และตอนนี้ก็รับหน้าที่ประธานกรรมการของไคเซอร์ PMC"
12110-44 = "ไม่ต้องอธิบายอะไรให้มากหรอก คุณก็คือคู่กรณีหน้าเลือดที่หลอกโรงเรียนอะบิดอสสินะ\n\n\n"
12110-45 = "...โฮ่?"
12110-46 = "ใช่! คนร้ายที่สั่งให้แก๊งหมวกกันน็อกและหน่วยรับจ้างสารพัดมาก่อกวนพวกเรา! คือแกใช่ไหม?\n\n\n"
12110-47 = "หืม?"
12110-48 = "เพราะพวกแก อะบิดอสของเราก็เลย... ก็เลย...!!\n"
12110-49 = "แย่จริงๆ เลยนะ... คนเรามันจะดื้อด้านอะไรได้ขนาดนี้ \n"
12110-50 = "บุกรุกพื้นที่ส่วนบุคคลตามอำเภอใจ แล้วโจมตีพนักงาน PMC ที่ขันแข็งของพวกเรา ทำลายโรงงานเรา... แต่กลับมาโยนให้เป็นความผิดฉันงั้นเหรอ?"
12110-51 = "คึก... คึกคึก แบบนี้ก็ดี"
12110-53 = "มาคุยให้ชัดเจนดีกว่า ที่นี่คือที่ทำงานของไคเซอร์ PMC ที่ถูกต้องตามกฎหมาย และตอนนี้พวกเธอก็ทำ#nผิดในฐานะที่บุกรุกพื้นที่ส่วนบุคคล"
12110-54 = "...!!"
12110-55 = "...!!"
12110-56 = "อ้อ จริงสิ ที่ดินของเขตปกครองตนเองอะบิดอส ฉันเป็นคนซื้อไว้เอง"
12110-57 = "แต่แล้วจะทำไมล่ะ? ทุกอย่างฉันทำอย่างถูกต้องตามกฎหมายนี่? ฉันมีเอกสารบันทึกประวัติการซื้อขาย#nทั้งหมดอยู่ด้วย"
12110-58 = "ไม่สบอารมณ์เลยนะที่มาทำเหมือนฉันเป็นฝ่ายที่ทำอะไรผิดกฎหมายแบบนี้"
12110-59 = "สงสัยใช่ไหมว่าพวกเราทำอะไรกันอยู่ที่นี่? หรือว่าสงสัยว่าฉันซื้อที่ดินของพวกเธอไปทำไม?"
12110-60 = "บอกให้ก็ได้ พวกเรากำลังหาสมบัติที่ซ่อนอยู่ที่ไหนสักแห่งในอะบิดอสยังไงล่ะ"
12110-61 = "...!!"
12110-62 = "...โกหกหน้าด้านๆ!!\n"
12110-63 = "ใช่ ถ้าแค่จะหาของ ทำไมต้องมีกองกำลัง PMC ล่ะ?\n"
12110-64 = "ไม่ได้คิดจะตั้งกองกำลังขึ้นมาเพื่อยึดเขตปกครองตนเองของเรางั้นเหรอ?"
12110-67 = "......\n"
12110-68 = "รถถังหลายร้อยคัน ทหารฝีมือดีหลายร้อยคน กระสุนและดินปืนหลายร้อยตัน"
12110-69 = "คิดว่าฉันจะเตรียมอะไรมากมายแบบนี้ไว้เพื่อโรงเรียนที่มีนักเรียนเหลือกันแค่ 5 คนงั้นเหรอ? ตลกเป็นบ้า"
12110-70 = "ทั้งหมดนี้เอาไว้เพื่อป้องกันพวกที่เข้ามาขัดขวางการขุดหาสมบัติต่างหาก ไม่ได้เอาไว้ใช้กับพวกเธอหรอก"
12110-71 = "ถ้าจะสู้กับพวกเธอ... แค่สิ่งนี้ก็คงจะเพียงพอแล้วละ"
12110-73 = "ฉันเอง... ฟังไม่ผิดหรอก... จัดการได้เลย"
12110-74 = "อะไรน่ะ? ทำไมจู่ๆ ก็โทรศัพท์ล่ะ? จัดการงั้นเหรอ? หมายความว่าไง?\n\n\n\n"
12110-75 = "น่าเสียดายจังนะ ขอบอกว่าเครดิตของโรงเรียนพวกเธอน่ะ ตอนนี้มันตกต่ำสุดขีดแล้วละ"
12110-78 = "(กริ๊งงงงง)"
12110-79 = "ทำไมจู่ๆ ก็มีโทรศัพท์เข้า...?\n\n\n"
12110-81 = "ติดต่อจากสินเชื่อไคเซอร์ครับ ทางเราได้ปรับลดเครดิตของอะบิดอสให้อยู่ในระดับต่ำที่สุด โดยจะมีผล#nทันที..."
12110-82 = "?!?\n"
12110-83 = "และจะมีการปรับขึ้นอัตราดอกเบี้ยเป็น 3000% ยอดชำระของเดือนหน้าจะอยู่ที่ 91,300,000 เยนนะครับ"
12110-84 = "กรุณาชำระคืนตามกำหนดด้วยนะครับ"
12110-85 = "คะ?! เดี๋ยวก่อนสิคะ... นี่มันอะไรกัน? เดือนหน้างั้นเหรอ? \n\n"
12110-87 = "90 ล้านเยนเหรอ?! บะ.. บ้าไปแล้วหรือไง?! \n\n\n"
12110-88 = "...หึหึหึ"
12110-89 = "ทีนี้รู้หรือยังล่ะ? ว่าชะตากรรมของพวกเธออยู่ในกำมือของใคร?"
12110-90 = "...!"
12110-91 = "ดะ.. เดี๋ยวก่อน! นี่มัน...\n"
12110-92 = "......\n"
12110-93 = "คิดว่าโหดร้ายเกินไปเหรอ? แต่ว่ามันยังไม่จบแค่เท่านี้หรอกนะ"
12110-94 = "จริงสิ ต้องเรียกเก็บเงินประกันเงินของเงินต้นรวมทั้งหมด 900 ล้านเยนที่ยืมไปด้วยสินะ งั้นก็รีบไปหาเงินมาฝากที่สินเชื่อไคเซอร์ 300 ล้านเยนภายในอาทิตย์นี้ด้วยล่ะ"
12110-95 = "พวกเธอต้องพิสูจน์ให้ได้ว่าจะชดใช้หนี้ได้ในอัตราดอกเบี้ยนี้ หึหึหึ ถ้าทำได้นะ"
12110-96 = ".......\n"
12110-97 = ".......\n"
12110-98 = "งะ... เงินตั้งเยอะแบบนั้นจะไปหาที่ไหน... ตอนนี้ก็แทบจะจ่ายดอกเบี้ยไม่ไหวอยู่แล้ว..."
12110-100 = "งั้นก็ยอมทิ้งโรงเรียนแล้วไปจากที่นี่ซะสิ"
12110-101 = "!!\n\n"
12110-102 = "พวกเธอจะลาออกหรือทำเรื่องขอย้ายโรงเรียนไปซะสิ พวกเธอทำแบบนั้นได้ไม่ใช่หรือไง? นี่ไม่ใช่หนี้สิน#nที่พวกเธอเป็นคนก่อไว้ตั้งแต่แรกซะหน่อย"
12110-103 = "โรงเรียนต่างหากที่ต้องจ่ายหนี้พวกนี้ ไม่ใช่พวกเธอ"
12110-104 = "พะ.. พวกเราไม่มีวันทำเรื่องเลวร้ายแบบนั้นหรอกค่ะ!\n\n"
12110-105 = "นั่นโรงเรียนของพวกเรานะ!! จะให้ทิ้งไปได้ยังไงล่ะ!!\n\n"
12110-106 = "อะบิดอสคือเมืองของพวกเรานะ"
12110-108 = "ดื้อด้านเกินเยียวยาจริงๆ แล้วพวกเธอคิดจะทำยังไงล่ะ? คิดจะปกป้องเมืองโดยยืนเถียงกับฉันอยู่อย่างนี้#nน่ะเหรอ?"
12110-109 = "...พวกเรา กลับกันเถอะ"
12110-110 = "รุ่นพี่โฮชิโนะ...!!"
12110-111 = "...อย่าสู้รบอะไรที่นี่อีกเลย มีแต่เสียกับเสียเท่านั้นแหละ\n"
12110-112 = "ถูกต้องแล้วรองประธานนักเรียน เธอคนเดียวสินะที่สติสมประกอบ \n\n"
12110-113 = "อ่อ... จริงสิ จำได้แล้ว ประธานสภานักเรียนคนนั้นตัดสินใจอะไรฉลาดๆ แบบนี้ไม่ได้นี่นะ? ฮ่าฮ่าๆๆ"
12110-114 = "......"
12110-115 = "อย่าลืมจ่ายหนี้ของเดือนหน้าให้ครบด้วยล่ะ คุณลูกค้าที่น่ารัก"
12110-116 = "อะฮ่าฮ่าฮ่าฮ่าาา...!!"
12110-117 = "รู้สึกสดชื่นขึ้นแล้วสิ เอาละ พาแขกไปส่งหน้าประตูได้แล้ว"
12110-122 = "......\n"
12110-124 = "ตอนต่อไป;ความลับ"

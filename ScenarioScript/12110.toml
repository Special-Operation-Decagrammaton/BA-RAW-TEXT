[translation]
12110-1 = "Episode 11;A Losing Battle"
12110-2 = "*scratch* *scratch*"
12110-3 = "President...how much longer do we have to keep writing?"
12110-4 = "You're only on page two hundred. Weren't you the one who said you'd fill out a thousand?"
12110-5 = "It was just an expression! I didn't think you'd actually expect me to write a thousand pages..."
12110-6 = "No more talking."
12110-7 = "A-Ahaha... Okay, I'll continue..."
12110-8 = "*scratch* *scratch*"
12110-9 = "By the way..."
12110-12 = "About Hoshino from Abydos—do you know her?"
12110-13 = "...No. That was my first time seeing her in person."
12110-14 = "I see... You sounded like you knew her pretty well..."
12110-15 = "..."
12110-16 = "...Takanashi Hoshino."
12110-17 = "She's a super-elite student who'd been praised as a genius. Two years ago, the Intelligence Committee identified her as potential threat to Gehenna."
12110-18 = "Really? She didn't look like that kind of person at all!"
12110-21 = "She seemed really laid-back..."
12110-23 = "You mustn't judge people by their looks, Ako."
12110-24 = "...But she's completely different from the way she was two years ago."
12110-25 = "She used to be much more belligerent and violent... She seemed very tough and sharp."
12110-26 = "...Well, anyway."
12110-27 = "If we had fought her as she was then, the Prefect Team would have been decimated by your hasty actions, Ako."
12110-28 = "And with Schale there, the damage could have been even worse."
12110-29 = "B-But the intel was solid... We analyzed everything..."
12110-30 = "That's because they stopped operating for an extended period."
12110-31 = "It's such a tiny school that the Intelligence Committee must have decided that they were no longer a threat."
12110-32 = "If you want more details, Ako, you'll have to dig through the old files of the Intelligence Committee."
12110-36 = "So you never left Abydos after all... Takanashi Hoshino."
12110-37 = "Why...?"
12110-39 = "Abydos' creditor..."
12110-40 = "...is from the Kaiser Corporation."
12110-42 = "Ah, I suppose I should properly introduce myself. I'm a senior executive of Kaiser Corporation, Kaiser Loans, and Kaiser Construction."
12110-43 = "Right now, I'm also the CEO of Kaiser PMC."
12110-44 = "You've said enough. We know you're the one who exploited our school."
12110-45 = "...Huh?"
12110-46 = "That's right! You're the culprit who hired the Helmet Gang and Problem Solver to come after us! Aren't you?!"
12110-47 = "Hmm?"
12110-48 = "You're the reason that Abydos...that Abydos is..."
12110-49 = "My, my... Such spurious allegations."
12110-50 = "You break into private property, assault my innocent PMC employees, destroy our facilities, and then blame ME for it?"
12110-51 = "...Hah. Hahahaha. Now that's comedy."
12110-53 = "Let me make this clear. This is the legal place of operations of Kaiser PMC, and you are trespassing on private property."
12110-54 = "...!"
12110-55 = "...!"
12110-56 = "Oh, right. Abydos District. Sure, we bought the land."
12110-57 = "Every step of that transaction was legitimate. We have the ledgers and records to prove it."
12110-58 = "I find it highly distasteful that you're acting as if we're committing a crime."
12110-59 = "Curious about what we're doing here? About why we bought your precious land?"
12110-60 = "Fine. I'll tell you. We're searching for the treasure buried somewhere in Abydos."
12110-61 = "...!"
12110-62 = "...That's a bold-faced lie!"
12110-63 = "Yeah. How do you explain all these PMC soldiers?"
12110-64 = "How are they not here to claim our district by force?"
12110-67 = "..."
12110-68 = "Hundreds of tanks, hundreds of elite soldiers. Untold tons of black powder and ammo."
12110-69 = "Do you truly believe we prepared all this for a school with only five students remaining? Surely you jest."
12110-70 = "This is but a defensive measure against those who would interrupt our treasure hunt. It isn't meant for you all."
12110-71 = "As for dealing with you lot... well, something like this should be more than enough."
12110-73 = "...It's me. Yes. Proceed."
12110-74 = "Wh-What? Who did you just call? \"Proceed\"?"
12110-75 = "I regret to inform you that your school's credit rating has just taken another hit."
12110-78 = "*beep* *beep*"
12110-79 = "A-A phone call? Now?"
12110-81 = "This is Kaiser Loans. From this point forward, Abydos' credit score will be set to the minimum rating."
12110-82 = "?!"
12110-83 = "This has raised the variable interest rate by three thousand percent, and so the amount you will be responsible for starting next month is 91.3 million yen."
12110-84 = "Please be sure to make your next payment by the end of the month."
12110-85 = "Excuse me?! H-Hold on... W-Wait... So suddenly? By next month?"
12110-87 = "Did you say 90 million yen?! Wh-What are you talking about?!"
12110-88 = "...Heh heh heh."
12110-89 = "That's right. Now do you get it? Do you finally see whose hand is holding the leash around your necks?"
12110-90 = "...!"
12110-91 = "Ah, w-wait... This is..."
12110-92 = "..."
12110-93 = "Do you find that too harsh? Ah, but there's more."
12110-94 = "We never received a deposit for the 900 million yen you originally borrowed. Please deposit 300 million to Kaiser Loans within the week."
12110-95 = "You'll have to prove that you can pay off the debt even at this interest rate. Assuming that IS even possible."
12110-96 = "..."
12110-97 = "..."
12110-98 = "Th-There's no way we can get that kind of money. We're barely keeping up with the interest as it is. How...?"
12110-100 = "In that case, you'll just have to give up your academy and leave."
12110-101 = "!!"
12110-102 = "Drop out and transfer. Isn't that the right thing to do? The debt was never yours to begin with."
12110-103 = "It's the school's debt to pay. It isn't your responsibility."
12110-104 = "Th-That's...!! There's no way we'd ever do something like that!"
12110-105 = "It's OUR school! We can't just abandon it!"
12110-106 = "Abydos is our home."
12110-108 = "Such foolishness. What do you plan to do? Continue to stand here arguing with us?"
12110-109 = "...Let's go back, everyone."
12110-110 = "Hoshino?!"
12110-111 = "We can't fight them here. That's what they want."
12110-112 = "Wise decision, Vice President."
12110-113 = "Now I remember. Your president wasn't as bright as you, was she? Haha."
12110-114 = "..."
12110-115 = "Well, I'll be looking forward to next month's payment, dear customers!"
12110-116 = "Hahaha!"
12110-117 = "Ahh, that was refreshing. Now then, escort our guests to the exit."
12110-122 = "..."
12110-124 = "Next Episode;Secrets"

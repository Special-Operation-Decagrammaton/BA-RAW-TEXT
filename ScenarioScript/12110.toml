[translation]
12110-1 = "第11話;打不贏的仗"
12110-2 = "（喀哩喀哩……）"
12110-3 = "委員長，那個……我要寫這個到什麼時候呢……？"
12110-4 = "……現在差不多是200張吧。#n你不是自己說要寫1000張的嗎？"
12110-5 = "那，那只是一種會寫很多的比喻……"
12110-6 = "動口不如動手。"
12110-7 = "我，我會加油的……"
12110-8 = "（唰唰……）"
12110-9 = "話說回來……"
12110-12 = "您認識那個阿拜多斯的星野嗎？"
12110-13 = "……不，實際見面是第一次。"
12110-14 = "這樣啊……感覺您似乎非常了解對方……"
12110-15 = "……"
12110-16 = "……小鳥遊星野。"
12110-17 = "被評為「天才」的超級菁英。#n根據2年前情報部的分析，他被視為格黑娜的潛在威脅之一。"
12110-18 = "咦！？我怎麼完全看不出來……"
12110-21 = "該說是散發著悠悠哉哉的氛圍嗎……"
12110-23 = "亞子，不要以貌取人。"
12110-24 = "……不過他給人的感覺確實和2年前完全不同。"
12110-25 = "本來是擅長攻擊性的戰術，性格相當好戰……給人粗暴而敏銳的印象。"
12110-26 = "總之……"
12110-27 = "當時如果繼續戰鬥下去，大半的風紀委員可能都會失去戰鬥能力。#n亞子，因為你輕率的判斷。"
12110-28 = "更何況「夏萊」也在。#n損失甚至會更大也說不定。"
12110-29 = "……可，可是我確實執行了戰力分析，但那樣的情報……"
12110-30 = "……從某個時候開始，他活動的消息就突然中斷了。"
12110-31 = "畢竟是很小的學校，或許情報部後來不再將其視為威脅了也說不定。"
12110-32 = "想知道詳細情形的話，就去翻翻情報部以前的資料吧。"
12110-36 = "不過你居然還留在阿拜多斯啊……小鳥游星野。"
12110-37 = "為什麼……？"
12110-39 = "阿拜多斯的債權人……"
12110-40 = "凱，凱薩公司的……"
12110-42 = "正確來說，是凱薩公司、凱薩信貸、凱薩建設的董事。"
12110-43 = "現在也擔任凱薩PMC的代表董事。"
12110-44 = "那種事無所謂。所以你就是欺騙並壓榨阿拜多斯高中的當事人囉？"
12110-45 = "……哦？"
12110-46 = "沒錯！唆使頭盔團和便利屋一直來折磨我們的犯人就是你吧！？"
12110-47 = "呼呣……？"
12110-48 = "就是因為你這傢伙，我們阿拜多斯……阿拜多斯才會……！！"
12110-49 = "真受不了……一開口就說這些嗎。 "
12110-50 = "隨意入侵私有土地、攻擊我們PMC的善良職員、把設施破壞的亂七八糟……#n居然還說是我的錯？"
12110-51 = "……呵呵，真有趣。"
12110-53 = "不過你們最好注意一下說話的態度。#n這裡是凱薩PMC合法經營事業的地點，而你們現在則是非法入侵了企業的私有土地。"
12110-54 = "……！"
12110-55 = "……！！"
12110-56 = "言歸正傳吧……雖然這裡曾是阿拜多斯自治區的土地，不過確實已經由我們買下了。"
12110-57 = "所以你們想怎樣？#n那些都是合法的交易，記錄也全都還在。"
12110-58 = "你們那種好像我們做了什麼非法行為的態度，實在讓我很不愉快。"
12110-59 = "來這裡是因為好奇我們在做什麼嗎？#n想知道買下阿拜多斯土地的理由嗎？"
12110-60 = "就告訴你們吧。#n我們正在尋找埋藏在阿拜多斯某處的寶物。"
12110-61 = "……！"
12110-62 = "……誰會相信你的胡言亂語啊！！"
12110-63 = "沒錯，而且那也無法解釋這些PMC的兵力。"
12110-64 = "這難道不是為了以武力占領我們的自治區嗎？"
12110-67 = "……"
12110-68 = "數百台戰車、數百名菁英戰士、數百噸火藥及子彈。"
12110-69 = "為了只有五個人的學校，你以為會準備到這種程度？#n開玩笑也該有個限度。"
12110-70 = "這只是為了防止其他團體打擾我們尋寶的基本防禦措施罷了。#n並不是為了你們準備的。"
12110-71 = "要對付你們……只要這樣就夠了。"
12110-73 = "……是我。#n……沒錯，開始進行吧。"
12110-74 = "什，什麼……？突然打電話……？#n「進行」是什麼意思？"
12110-75 = "有個遺憾的消息。看來你們學校的信用似乎下降了。"
12110-78 = "（嗶哩哩哩──）"
12110-79 = "……？"
12110-81 = "這裡是凱薩信貸。#n從現在起，阿拜多斯的信用評價將降至最低等級。"
12110-82 = "！？"
12110-83 = "浮動利率將調升3000%，下個月起的利息金額將變為9130萬元。"
12110-84 = "還請在期限之內支付。"
12110-85 = "什麼！？等，等等，為什麼這麼突然……！？"
12110-87 = "9000萬！？這是怎麼回事！？"
12110-88 = "……呵呵呵。"
12110-89 = "這下理解了吧──#n是誰握著繫在你們脖子上的繩子。"
12110-90 = "……！"
12110-91 = "等，等等……！這……"
12110-92 = "……"
12110-93 = "覺得太困難了嗎？還沒結束呢。"
12110-94 = "對了，9億元債務的保證金也得收一下才行。#n在一週內將3億元交給我們凱薩信貸吧。"
12110-95 = "你們必須證明自己有能力，能在這個利率下還清債務。"
12110-96 = "……"
12110-97 = "……"
12110-98 = "那，那種金額……不可能準備得了……#n現在就連還出利息都很勉強……"
12110-100 = "既然如此，放棄學園離開如何？"
12110-101 = "！！"
12110-102 = "只要退學或轉學不就行了嗎？#n這本來就不是你們個人的債務──"
12110-103 = "而是該由學校負責的債務。#n你們沒必要背負不是嗎？"
12110-104 = "那，那種事，我們怎麼可能做得出來！"
12110-105 = "沒錯，那是我們的學校！！怎麼可以丟下不管！"
12110-106 = "阿拜多斯是我們的學校，我們的城鎮。 "
12110-108 = "真是無理取鬧。#n那你們打算怎麼做？難道還有其他方法嗎？"
12110-109 = "……各位，我們回去吧。"
12110-110 = "星野前輩……！？"
12110-111 = "……繼續在這裡爭論也沒有意義，只會被玩弄而已。"
12110-112 = "哦……看來副會長還挺聰明的。"
12110-113 = "……啊啊，我想起來了。#n當時那個學生會長就不像你一樣聰明對吧。"
12110-114 = "……"
12110-115 = "那麼保證金和下個月起的債務再麻煩囉，各位客人。"
12110-116 = "哼哼，哼哈哈哈哈哈……！！"
12110-117 = "真令人痛快。#n來，將客人送回入口吧。"
12110-122 = "……"
12110-124 = "下一話;數個祕密"

[translation]
1000402-1 = "การประชุมกลางดึก"
1000402-2 = "(คุณครูมาที่ดาวน์ทาวน์ของเขตปกครองตนเองเกเฮนน่าตามที่สัญญากับฮินะไว้)"
1000402-3 = "(คงเพราะเป็นช่วงกลางดึกในบริเวณนี้จึงไม่มีใครอยู่เลย)"
1000402-4 = "(รู้สึกขนลุกยังไงก็ไม่รู้...)"
1000402-5 = "[ns] (ทำไมฮินะถึงนัดเจอเวลานี้กันนะ?)"
1000402-8 = "คุณครู..."
1000402-9 = "[s1] \"ว่าไงฮินะจัง~\"\n[s2] \"มาถึงก่อนอีกแล้วสินะ?\""
1000402-10 = "ฮะ...ฮินะจังงั้นเหรอ..."
1000402-11 = "อย่าใช้คำเรียกที่ทำให้รู้สึกลำบากใจได้มั้ย"
1000402-13 = "(พยักหน้า)\n"
1000402-14 = "ขอโทษด้วยที่เรียกมากลางดึกแบบนี้..."
1000402-15 = "พอดีฉันค่อนข้างเป็นคนดังในเกเฮนน่า เวลาไปไหนมาไหนก็มักจะมีคนคอยมองบ่อยๆ"
1000402-16 = "มันเลยทำให้รู้สึกเหมือนว่าถูกจับตาดูอยู่น่ะ"
1000402-17 = "เพราะงั้นถ้ามีใครเห็นว่าฉันอยู่กับคุณครูคงจะเป็นเรื่องวุ่นวายขึ้นอีก"
1000402-18 = "และเพราะอย่างนั้น ฉันเลยขอให้คุณครูมาเจอในตอนดึกแบบนี้"
1000402-19 = "[s] \"ฮินะนี่เหมือนไอดอลเลยนะ\""
1000402-20 = "อะ...ไอดอลเหรอ...? เปล่านะ ไม่ใช่แบบนั้นสักหน่อย…"
1000402-21 = "ฉันไม่ได้น่ารักสดใส เปล่งประกายอะไรแบบนั้นสักหน่อย"
1000402-22 = "......"
1000402-23 = "ก็นะ อาจเหมือนกันตรงที่ไม่ค่อยมีเวลาส่วนตัว แล้วก็ต้องคอยใส่ใจสิ่งรอบตัวก็ได้...."
1000402-24 = "[s3] \"ฮินะเองก็น่ารักนะ\"\n[s4] \"ฮินะเองก็เปล่งประกายได้เหมือนกันนะ\""
1000402-25 = "คุณครูชอบพูดเรื่องเหลวไหลแบบนี้อยู่เรื่อย มันทำให้ชื่อเสียงของคุณครูไม่ดีนะ รู้บ้างหรือเปล่า?!"
1000402-26 = "คุณครูชอบพูดเรื่องเหลวไหลแบบนี้อยู่เรื่อย มันทำให้ชื่อเสียงของคุณครูไม่ดีนะ รู้บ้างหรือเปล่า?!"
1000402-27 = "ถึงคุณครูจะเป็นผู้ใหญ่ ฉันก็ไม่คิดจะมองข้ามไปง่ายๆ หรอกนะ ทำตัวดีๆ หน่อยจะดีกว่า!"
1000402-28 = "(ถูกดุซะแล้ว)"
1000402-29 = "[s5] \"แต่ว่าครูพูดจริงๆ นะ\"\n[s6] \"ครูพูดจริงนะ\""
1000402-30 = "หืม...?"
1000402-31 = "หืม...?"
1000402-32 = "ดะ...เดี๋ยวสิ ทำไมถึงทำหน้าจริงจังแบบนั้นล่ะ..."
1000402-33 = "......"
1000402-34 = "ฉะ...ฉันไม่ได้หมายความว่าคุณครูพูดโกหกสักหน่อย..."
1000402-35 = "แต่ฉันรู้ตัวเองดีว่าฉันไม่ได้น่ารัก..."
1000402-36 = "เดี๋ยวสิ ฉันไม่ได้เรียกคุณครูออกมาเพื่อมาคุยเรื่องนี้สักหน่อย!"
1000402-37 = "มาคุยธุระกันเลยดีกว่า!"
1000402-38 = "(เวลาคุยกับคุณครูชอบคุยออกนอกทะเลอยู่เรื่อยเลย)"
1000402-40 = "เอาล่ะ เหตุผลที่ฉันเรียกคุณครูมาก็คือ..."
1000402-41 = "ฉันอยากจะอธิบายข้อมูลเรื่องสถานะการรักษาความปลอดภัยของเกเฮนน่าของไตรมาสนี้ให้ฟัง#nและขอคำแนะนำสำหรับพัฒนาแผนการสืบสวนร่วมของไตรมาสหน้า"
1000402-42 = "[s] \"เรียกมาคุยเรื่องงานสินะ\""
1000402-43 = "ก็ต้องเรื่องงานน่ะสิ คิดว่าฉันจะเรียกคุณครูออกมาในเวลาแบบนี้เพื่อคุยเรื่องส่วนตัวงั้นเหรอ?"
1000402-44 = "[s] \"คิดว่าเธอจะชวนมาเดตซะอีก\""
1000402-46 = "คุณครู..."
1000402-47 = "[s] \"รู้แล้วๆ คุยงานๆ คุยงานเถอะ!\""
1000402-49 = "(คุณครูอ่านเอกสารที่ฮินะเตรียมมาและพูดคุยแลกเปลี่ยนความคิดเห็นกัน)"
1000402-51 = "อืม... คุณครูคิดแบบนั้นเหรอ นับเป็นข้อเสนอที่ดีเลยนะ"
1000402-52 = "[s] \"ที่จริงครูไม่ได้ช่วยอะไรมากเลย\""
1000402-53 = "ไม่หรอก การได้รับฟังความคิดเห็นจากมุมมองที่ต่างออกไปก็เป็นเรื่องสำคัญที่ทำให้เรา#nมองภาพรวมได้เป็นกลางมากขึ้น"
1000402-54 = "เพราะงั้นความคิดเห็นของคุณครูก็สำคัญกับฉันเหมือนกัน"
1000402-55 = "ฉันไม่ค่อยมาขอความเห็นพวกผู้ใหญ่บ่อยเท่าไรหรอกนะ"
1000402-56 = "[s] \"แสดงว่าฮินะเชื่อใจครูสินะ\""
1000402-58 = "กะ...ก็แน่น่ะสิ ถึงจะเป็นผู้ใหญ่ที่พึ่งพาไม่ค่อยได้ก็เถอะ..."
1000402-59 = "แต่ว่าคราวหน้าฉันอาจจะมาขอให้ช่วยอีกก็ได้ ถึงฉันจะได้แค่ช่วงกลางคืนก็เถอะ"
1000402-60 = "[s7] \"ได้อยู่แล้ว ไว้ใจครูได้เลย\"\n[s8] \"เรียกได้ตลอดเลยนะ\""
1000402-61 = "ขอบคุณนะ คุณครู"
1000402-62 = "ขอบคุณนะ คุณครู"
1000402-63 = "เฮ้อ... ดึกมากแล้ว ฉันควรกลับไปพักแล้วละ"
1000402-64 = "ถ้างั้น...ไว้เจอกันนะคุณครู"
1000402-66 = "(ฮินะบอกลาแล้วเดินกลับไปด้วยท่าทางอิดโรยเล็กน้อย)"

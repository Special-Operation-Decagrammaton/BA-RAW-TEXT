[translation]
1000402-1 = "深夜的會議"
1000402-2 = "（深夜，在格黑娜自治區市內邊境地區。抵達了與陽奈約定的地點）"
1000402-3 = "（也許因為是半夜，周圍什麼人都沒有）"
1000402-4 = "（感覺有點淒涼）"
1000402-5 = "[ns] （陽奈為什麼會約在這個時間呢？）"
1000402-8 = "……老師。"
1000402-9 = "[s1] 「陽奈醬，晚安～」\n[s2] 「妳先來了啊？」"
1000402-10 = "醬，醬什麼的……"
1000402-11 = "感覺很奇怪，別那樣叫。"
1000402-13 = "（點頭）"
1000402-14 = "……對不起，這個時間叫你出來。"
1000402-15 = "……那個，我在格黑娜還算是個名人，走到哪裡都受人注目。"
1000402-16 = "因為處於一舉一動都被觀察的立場。"
1000402-17 = "如果和老師在一起的時候被誰看到了，一定會給你添麻煩的……"
1000402-18 = "……所以，才會在這個時間。"
1000402-19 = "[s] 「陽奈是如偶像般的存在呢。」"
1000402-20 = "偶，偶像……？不，我覺得和那個不一樣……"
1000402-21 = "再說我和那種可愛又閃閃發亮的存在相去甚遠。"
1000402-22 = "……"
1000402-23 = "……嘛，沒有私人時間，總是必須在意周遭的人之類的，在這種不好的部分可能很像……"
1000402-24 = "[s3] 「陽奈也很可愛唷。」\n[s4] 「陽奈也閃閃發亮唷。」"
1000402-25 = "……總是說那些奉承的話，怪不得老師的名聲不好！"
1000402-26 = "……總是說那些奉承的話，怪不得老師的名聲不好！"
1000402-27 = "別以為是大人我就會特別對待你，莊重一點！"
1000402-28 = "（被罵了）"
1000402-29 = "[s5] 「但明明是真心話。」\n[s6] 「是真的唷。」"
1000402-30 = "……咦？ "
1000402-31 = "……咦？ "
1000402-32 = "不，不對，這種時候用那麼認真的表情看著我的話……"
1000402-33 = "……"
1000402-34 = "不，不是在說老師的話是騙人的……"
1000402-35 = "我不可愛這件事，我比誰都清楚……"
1000402-36 = "……不，我不是想說這些話才叫老師來的！ "
1000402-37 = "進，進入正題！"
1000402-38 = "（和老師說話的時候，話題馬上就會向奇怪的方向發展）"
1000402-40 = "……那個，我特別叫老師出來"
1000402-41 = "是為了共享這一期的格黑娜治安狀況，並徵求制定下一季度共同搜查計畫的建議。"
1000402-42 = "[s] 「也就是，工作呢。」"
1000402-43 = "沒錯，工作。如果不是的話，難道你覺得我會因為私人事情在這樣的深夜找老師出來嗎？"
1000402-44 = "[s] 「我還以為是約會呢。」"
1000402-46 = "……老師。"
1000402-47 = "[s] 「好，來工作吧！工作！」"
1000402-49 = "（讀過陽奈準備的資料，交換了意見）"
1000402-51 = "原來如此，老師的意見是這樣啊。很有參考價值。 "
1000402-52 = "[s] 「也許沒有太大的幫助。」"
1000402-53 = "不，和我們不同觀點的意見才是客觀看待事物的重要因素。"
1000402-54 = "從這點上來說，老師的意見對我來說很有意義。"
1000402-55 = "而且，也很少有機會聽到大人的想法。"
1000402-56 = "[s] 「陽奈很信賴我呢。」"
1000402-58 = "那，那不是當然的嗎？……雖然是不可靠的大人。 "
1000402-59 = "所以今後，可能也會有各式各樣的請求。我想到時候應該也會是很晚的時間吧。"
1000402-60 = "[s7] 「當然囉，交給我吧。」\n[s8] 「隨時都可以呼叫我。」"
1000402-61 = "謝謝你，老師。"
1000402-62 = "謝謝你，老師。"
1000402-63 = "呼啊……時間已經很晚了。是時候該回去休息了。"
1000402-64 = "那麼，老師。下次見。"
1000402-66 = "（陽奈打完招呼後，一臉疲憊地回去了）"

1012403-2 = "#place;D.U. 외곽 쇼핑몰"
1012403-3 = "#na;(어째선지 약속 장소는 트리니티 자치구에서 멀리 떨어진 쇼핑몰이었다.)"
1012403-4 = "#na;(도착해 보니 이미 하스미가 기다리고 있었다.)"
1012403-5 = "3;하스미;08;오셨군요, 선생님.\n#3;a\n#3;em;[반응]"
1012403-6 = "[s1] \"이런 데서 만나는 건 신선하네.\"\n[s2] \"근데 이렇게 멀리 올 필요가 있었어?\""
1012403-7 = "3;하스미;03;후후. 그렇네요."
1012403-8 = "3;하스미;07;평소에는 업무로 바빠 트리니티 자치구 밖으로 나오는 일이 드물었으니까요.\n#3;em;[재잘]"

[translation]
1012403-1 = "決戰之日"
1012403-2 = "D.U. 外圍購物中心"
1012403-3 = "（不知為何，約定的地點是在遠離三一自治區的購物中心）"
1012403-4 = "（抵達的時候，蓮實已經在現場等候了）"
1012403-5 = "恭候多時了，老師。"
1012403-6 = "[s1]「在這種地方見面，感覺還挺新鮮的呢。」\n[s2]「話說有必要跑這麼遠嗎？」"
1012403-7 = "呵呵，是啊。"
1012403-8 = "我平時因為工作繁忙的關係，很少有機會能離開三一自治區。"
1012403-9 = "沒錯，當然有必要。"
1012403-10 = "萬一泳裝的尺寸被其他學生知道的話，事情可就麻煩了……"
1012403-11 = "不過來到這裡就不用擔心了。"
1012403-12 = "我事先調查過，這裡也有Veronica的門市。"
1012403-13 = "[s3]「Veronica……是什麼來著？」\n[s4]「啊，是學生們常穿的服裝品牌對吧！」"
1012403-16 = "是的。這是現今相當少見、依然保有職人精神的高級品牌。"
1012403-17 = "而且與我們三一綜合學園也有長期的合作，品質值得信賴。"
1012403-18 = "啊，您是之前聯絡過的三一學生吧？"
1012403-24 = "我們都在等候您的到來呢。#n今天將由我來為您提供最舒適的購物體驗。"
1012403-25 = "呵呵，謝謝您的用心。"
1012403-27 = "[ns5]（好驚人的氣場……）\n[ns6]（讓人再次感受到他是實現正義部的菁英……）"
1012403-30 = "那麼老師，我們走吧？"
1012403-32 = "Veronica店內"
1012403-33 = "您要找的是泳裝對吧？#n我們店裡正好有本季最新設計的泳裝。"
1012403-34 = "可以先試穿看看嗎？"
1012403-35 = "當然可以。#n請盡情試穿到您滿意為止。"
1012403-36 = "呵呵，謝謝。"
1012403-37 = "那麼老師，我們待會見。"
1012403-41 = "[ns]（我真的有必要待在這裡嗎？）"
1012403-44 = "這是……怎麼可能……"
1012403-45 = "[s]「蓮實？」"
1012403-46 = "啊，老師。#n沒什麼……請問剛才那位店員還在嗎？"
1012403-47 = "請問客人您有什麼地方需要幫忙嗎？#n是不是尺寸不合？"
1012403-48 = "……是的，好像有點不合。"
1012403-49 = "不好意思，能麻煩您幫我換大一號的嗎？"
1012403-50 = "當然沒問題。我馬上幫您拿來！"
1012403-53 = "泳裝在這裡，請用！"
1012403-54 = "謝謝。那麼……這次一定沒問題。"
1012403-59 = "不，不會吧！！"
1012403-60 = "……店員先生。"
1012403-61 = "那個……還是有點小嗎？"
1012403-62 = "沒關係！我們店裡還有大尺碼的款式！"
1012403-63 = "大，大尺碼……？#n唔……！那就麻煩您了……！"
1012403-65 = "放在哪裡呢……已經很久沒有人買過了……"
1012403-72 = "讓您久等了！"
1012403-73 = "謝，謝謝。"
1012403-78 = "……"
1012403-79 = "……？"
1012403-84 = "……店員先生。"
1012403-85 = "這……雖然十分難以啟齒……"
1012403-87 = "剛才那已經是我們店裡最大的尺寸了……"
1012403-88 = "……"
1012403-89 = "……"
1012403-90 = "[ns]「……」"
1012403-92 = "[ns]「蓮實……」"
1012403-95 = "― [log=하스미 수영복]咕……哼！唔唔唔…… [/log][wa:5223] "
1012403-97 = "― [log=하스미 수영복]穿，穿進去了！[/log][wa:963] "
1012403-100 = "― [log=하스미 수영복]雖然只是勉勉強強……[/log][wa:800] "
1012403-103 = "― [log=하스미 수영복]但如您所見！ 完全沒有！[/log][wa:4280] "
1012403-105 = "― [log=하스미 수영복]任何問題！[/log]"
1012403-108 = "― [log=하스미 수영복]只要再稍微瘦身一下，[/log][wa:400] "
1012403-110 = "― [log=하스미 수영복]尺寸就剛剛好了！[/log]"
1012403-113 = "[ns]「你，你先冷靜！蓮實！」"
1012403-114 = "― [log=하스미 수영복]沒問題的！[/log][wa:1670] "
1012403-116 = "― [log=하스미 수영복]泳裝就決定是這件了！ [/log][wa:310] "
1012403-119 = "― [log=하스미 수영복]應該說，我就要這件……！[/log][wa:1560] "
1012403-127 = "這件泳裝，麻煩幫我結帳！"
1012403-128 = "[s7]「蓮，蓮實！？」\n[s8]「不用勉強自己……！」"
1012403-131 = "沒事的！我已經下定決心了！"
1012403-132 = "我真的穿得下！#n雖然有些勉強……！"
1012403-133 = "但只要給我足夠的時間，我一定能做得更好！"
1012403-134 = "[s9]「聽你說勉強，總覺得有點……」\n[s10]（「做得更好」這種說法能用在這裡嗎……？）"
1012403-137 = "來吧，店員先生！快幫我結帳！"
1012403-138 = "我，我馬上幫您結帳！"
1012403-140 = "（最終蓮實買下了試穿的那套泳裝）"
1012403-141 = "（在結帳時，蓮實身上散發出了熊熊燃燒的鬥志）"

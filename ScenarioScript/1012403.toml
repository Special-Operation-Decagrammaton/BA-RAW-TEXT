[translation]
1012403-1 = "Showdown Day"
1012403-2 = "D.U. Outskirts Shopping Mall"
1012403-3 = "It was odd, but the mall Hasumi wanted to meet at wasn't convenient to Trinity at all."
1012403-4 = "She was already there by the time I'd arrived."
1012403-5 = "Hello, Sensei."
1012403-6 = "[s1] \"It's nice seeing you in a new environment.\"\n[s2] \"Why did you want to meet so far from Trinity?\""
1012403-7 = "Fufu. I have to agree."
1012403-8 = "My work very rarely allows me to leave the Trinity district."
1012403-9 = "It was a necessity."
1012403-10 = "I can't allow the other students to discover what size I am..."
1012403-11 = "But don't worry."
1012403-12 = "I thoroughly researched the location to make sure there was a Veronica store here."
1012403-13 = "[s3] \"Veronica... What's that?\"\n[s4] \"Ah! It's that popular clothing brand, right?\""
1012403-16 = "Yes. It's rare to find a luxury brand that maintains such high quality in their pieces."
1012403-17 = "Trinity often commissions them for uniforms, and they've never failed us yet."
1012403-18 = "Ah! You must be the Trinity student who called us."
1012403-24 = "We've been eagerly awaiting your arrival! Consider me your personal assistant for the day."
1012403-25 = "Thank you very much for your help."
1012403-27 = "[ns5] \"(It's like she's royalty!)\"\n[ns6] \"(So this is what it means to be in the Justice Task Force.)\""
1012403-30 = "Now then, Sensei. Shall we?"
1012403-32 = "Inside Veronica"
1012403-33 = "You were looking for a swimsuit, yes? Here at Veronica, we set the trends for the most popular summer designs."
1012403-34 = "Will I be able to try them on?"
1012403-35 = "Naturally! I'm sure we'll be able to find the perfect swimsuit for you today."
1012403-36 = "I appreciate it very much."
1012403-37 = "I'll be back soon, Sensei."
1012403-41 = "[ns] \"(Why am I here, actually?)\""
1012403-44 = "This is...! Unbelievable!"
1012403-45 = "[s] \"Hasumi?\""
1012403-46 = "N-Nothing at all, Sensei. Do you think you could call the salesperson for me?"
1012403-47 = "How can I help? Did you require a different size?"
1012403-48 = "...Yes, I believe so."
1012403-49 = "My apologies. Could you bring me a bigger size, please?"
1012403-50 = "Yes! Right away!"
1012403-53 = "Here you go!"
1012403-54 = "Thank you. This one will absolutely fit!"
1012403-59 = "Th-This cannot be happening!"
1012403-60 = "...Excuse me."
1012403-61 = "Y-Yes? Was that too small as well?"
1012403-62 = "Worry not! We have plus sizes in stock as well!"
1012403-63 = "Plus size...? Um... Yes! Okay, let's proceed with that."
1012403-65 = "Let's see, where was it...? It's been here for quite some time..."
1012403-72 = "Thank you for waiting!"
1012403-73 = "Th-Thank you."
1012403-78 = "..."
1012403-79 = "...?"
1012403-84 = "...Excuse me."
1012403-85 = "I-Is it...? Ma'am, I hope you understand that I don't mean anything by this, however..."
1012403-87 = "...that is our largest size."
1012403-88 = "..."
1012403-89 = "..."
1012403-90 = "[ns] \"...\""
1012403-92 = "[ns] \"Hasumi...\""
1012403-95 = "― [log=하스미 수영복]Hup... Huut! Ugh... [/log][wa:4863] "
1012403-97 = "― [log=하스미 수영복]I-It fits![/log][wa:843] "
1012403-100 = "― [log=하스미 수영복]It's a little tight... However...[/log][wa:10] "
1012403-103 = "― [log=하스미 수영복]You can see with your own eyes that it's completely fine! [/log][wa:2440] "
1012403-105 = "― [log=하스미 수영복]I can wear it![/log]"
1012403-108 = "― [log=하스미 수영복]It just requires a little adjustment,[/log][wa:10] "
1012403-110 = "― [log=하스미 수영복]and it's the perfect size...![/log]"
1012403-113 = "[ns] \"L-Let's just calm down, Hasumi!\""
1012403-114 = "― [log=하스미 수영복]I am perfectly calm![/log][wa:1070] "
1012403-116 = "― [log=하스미 수영복]I would like this swimsuit! [/log][wa:10] "
1012403-119 = "― [log=하스미 수영복]In fact, I am going to wear just this![/log][wa:520] "
1012403-127 = "I'd like to go with this!"
1012403-128 = "[s7] \"H-Hasumi?!\"\n[s8] \"I-It's okay! You don't have to get it!\""
1012403-131 = "No! My iron will shall not be tempered!"
1012403-132 = "It may be tight, but it's still wearable!"
1012403-133 = "I have enough time! I can still make progress!"
1012403-134 = "[s9] \"'Tight' may be an understatement.\"\n[s10] \"(What does she mean by 'progress,' exactly?)\""
1012403-137 = "I'd like to purchase this now!"
1012403-138 = "Right this way..."
1012403-140 = "Hasumi couldn't be talked out of buying the swimsuit."
1012403-141 = "She was radiating determination as she purchased it."

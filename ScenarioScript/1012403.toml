[translation]
1012403-1 = "วันแห่งการตัดสินชี้ขาด"
1012403-2 = "ห้างสรรพสินค้า นอกเขต D.U."
1012403-3 = "(ด้วยเหตุผลบางอย่าง สถานที่นัดพบของทั้ง 2 คนจึงเป็นที่ห้างสรรพสินค้าที่อยู่ไกลออกไปจากเขต#nปกครองตนเองทรีนิตี้)"
1012403-4 = "(เมื่อคุณครูมาถึง ก็เห็นว่าฮาสุมิกำลังยืนรออยู่แล้ว)"
1012403-5 = "มาแล้วเหรอคะ คุณครู"
1012403-6 = "[s1] \"แปลกจังเลยนะที่มาเจอกันในที่แบบนี้\"\n[s2] \"จำเป็นต้องมาไกลขนาดนี้เลยเหรอ?\""
1012403-7 = "ฮุฮุ นั่นสิคะ"
1012403-8 = "ปกติฉันจะยุ่งกับงานเสมอ ก็เลยไม่ค่อยได้ออกไปนอกเขตปกครองตนเองทรีนิตี้เท่าไรค่ะ"
1012403-9 = "ค่ะ จำเป็นสิคะ"
1012403-10 = "ฉันไม่อยากให้นักเรียนคนอื่นรู้ไซซ์ชุดว่ายน้ำของฉันน่ะค่ะ..."
1012403-11 = "แต่ถึงจะเป็นอย่างนั้นก็ไม่เป็นไรค่ะ"
1012403-12 = "ตามที่ฉันหาข้อมูลมาล่วงหน้า ที่นี่มีร้านเวโรนิก้าอยู่ค่ะ"
1012403-13 = "[s3] \"เวโรนิก้า... แบรนด์เสื้อผ้าชื่อดังใช่มั้ย?\"\n[s4] \"แบรนด์เสื้อผ้าที่นักเรียนนิยมใส่กันนี่นา!\""
1012403-16 = "ใช่ค่ะ เป็นแบรนด์หรูที่ผลิตเสื้อผ้าแฮนด์เมดที่หาได้ยากในช่วงนี้ค่ะ"
1012403-17 = "แบรนด์นี้มีความสัมพันธ์อันยาวนานกับโรงเรียนสามัญทรีนิตี้ เราจึงวางใจในสินค้าของที่นี่ได้ค่ะ"
1012403-18 = "อ๊ะ ใช่นักเรียนโรงเรียนทรีนิตี้ที่ติดต่อมาหรือเปล่าคะ?"
1012403-24 = "กำลังรออยู่เลยครับ เพื่อประสบการณ์การช้อปปิ้งที่ดีของคุณลูกค้า วันนี้ผมจะคอยดูแลให้เองครับ"
1012403-25 = "ฮุฮุ ขอบคุณที่ใส่ใจนะคะ"
1012403-27 = "[ns5] (เหมือนมีออร่าของคุณหนูสุดหรูเลย...)\n[ns6] (นี่สินะอีลีทของชมรมทวงความยุติธรรม...)"
1012403-30 = "งั้นไปกันเลยไหมคะคุณครู?"
1012403-32 = "ร้านเวโรนิก้า"
1012403-33 = "ได้ยินว่ามาดูชุดว่ายน้ำเหรอครับ? ชุดว่ายน้ำดีไซน์ใหม่ล่าสุดของฤดูร้อนนี้เพิ่งเข้ามาใหม่พอดีเลย"
1012403-34 = "ลองใส่ดูได้มั้ยคะ?"
1012403-35 = "ได้สิครับ ทางร้านเราให้เลือกใส่ได้จนกว่าจะเจอชุดที่ถูกใจเลยครับ"
1012403-36 = "ฮุฮุ ขอบคุณนะคะ"
1012403-37 = "ถ้างั้น คุณครูคะ ขอเวลาฉันสักเดี๋ยวนะคะ"
1012403-41 = "[ns] (แล้วเราต้องอยู่ตรงนี้หรือเปล่านะ?)"
1012403-44 = "นี่มัน... ไม่อยากจะเชื่อเลย..."
1012403-45 = "[s] \"ฮาสุมิ?\""
1012403-46 = "อ๊ะ คุณครู เอ่อ... ไม่มีอะไรค่ะ ว่าแต่มีพนักงานร้านอยู่ตรงนั้นบ้างมั้ยคะ...?"
1012403-47 = "มีอะไรเหรอครับ คุณลูกค้า? หรือว่าไซซ์ไม่พอดีครับ?"
1012403-48 = "ใช่ค่ะ... น่าจะเป็นอย่างนั้นค่ะ"
1012403-49 = "ขอโทษนะคะ ช่วยเปลี่ยนเป็นชุดที่ใหญ่กว่านี้ 1 ไซซ์ได้มั้ยคะ?"
1012403-50 = "ได้สิครับ จะรีบไปเอามาให้นะครับ!"
1012403-53 = "นี่ครับคุณลูกค้า!"
1012403-54 = "ขอบคุณนะคะ ครั้งนี้... ต้องใส่ได้แน่ค่ะ"
1012403-59 = "ปะ... เป็นไปได้ยังไง!!"
1012403-60 = "คุณพนักงานคะ..."
1012403-61 = "อืม... ยังเล็กไปหน่อยใช่มั้ยครับ?"
1012403-62 = "ไม่เป็นไรเลยครับ! ร้านเรามีชุดขนาดบิ๊กไซซ์ด้วยนะครับ!"
1012403-63 = "บะ... บิ๊กไซซ์...? อึก...! ขอเป็น... แบบนั้นแล้วกันค่ะ...!"
1012403-65 = "อยู่ตรงไหนนะ... ชุดบิ๊กไซซ์ไม่ได้ขายได้บ่อยๆ ซะด้วย..."
1012403-72 = "นี่ครับ ขอโทษที่ทำให้รอนานนะครับ!"
1012403-73 = "ขะ... ขอบคุณค่ะ"
1012403-78 = "......"
1012403-79 = "...?"
1012403-84 = "คุณพนักงานคะ..."
1012403-85 = "เอ่อ... ผมจะอธิบายยังไงดีนะ..."
1012403-87 = "ชุดที่คุณลูกค้าลองเมื่อสักครู่เป็นไซซ์ใหญ่สุดที่ร้านเรามีแล้วครับ..."
1012403-88 = "......"
1012403-89 = "......"
1012403-90 = "[ns] \"......\""
1012403-92 = "[ns] \"ฮาสุมิ...\""
1012403-95 = "― [log=하스미 수영복]ฮะ... ฮึบบ! อึกก...[/log][wa:4903] "
1012403-97 = "― [log=하스미 수영복]สะ... ใส่ได้แล้วค่ะ![/log]"
1012403-100 = "― [log=하스미 수영복]ถึงจะได้แบบ... หวุดหวิดก็เถอะ...[/log]"
1012403-103 = "― [log=하스미 수영복]อย่างที่เห็นว่า! ชุดนี้ใส่ได้![/log][wa:3560] "
1012403-105 = "― [log=하스미 수영복]ไม่มีปัญหาค่ะ![/log]"
1012403-108 = "― [log=하스미 수영복]แค่ฉันดูแลตัวเองอีกหน่อย[/log][wa:10] "
1012403-110 = "― [log=하스미 수영복]ไซซ์ก็จะพอดีเลยค่ะ...![/log]"
1012403-113 = "[ns] \"จะ... ใจเย็นๆ ก่อนดีกว่านะ! ฮาสุมิ!\""
1012403-114 = "― [log=하스미 수영복]ฉันใจเย็นอยู่ค่ะ![/log][wa:1190] "
1012403-116 = "― [log=하스미 수영복]ฉันเอาชุดว่ายน้ำชุดนี้ค่ะ![/log]"
1012403-119 = "― [log=하스미 수영복]ฉันจะใส่แต่ชุดนี้เลยค่ะ...![/log][wa:960] "
1012403-127 = "ช่วยคิดเงินชุดนี้ให้ด้วยนะคะ!"
1012403-128 = "[s7] \"ฮะ... ฮาสุมิ? ไม่ต้องฝืนมากก็ได้!\"\n[s8] \"ฮาสุมิ ครูว่าไม่ต้องฝืนก็ได้นะ!\""
1012403-131 = "ไม่ค่ะ! ฉันเตรียมตัวเตรียมใจไว้แล้วค่ะ!"
1012403-132 = "ก็บอกว่าใส่ได้ไงคะ! ใส่ได้อย่างหวุดหวิดเลย!"
1012403-133 = "ถ้าฉันมีเวลาเพียงพอ ฉันก็บรรลุเป้าหมายได้มากกว่านี้ค่ะ!"
1012403-134 = "[s9] \"แต่มันหวุดหวิดมากเกินไปหรือเปล่า...\"\n[s10] (เป้าหมายมีไว้พุ่งชนสินะ...)"
1012403-137 = "คะ... คุณพนักงานคะ! ฉันเอาชุดนี้ค่ะ!"
1012403-138 = "ผะ... ผมจะช่วยคิดเงินให้ครับ"
1012403-140 = "(สุดท้ายฮาสุมิก็ซื้อชุดว่ายน้ำที่เธอลองใส่)"
1012403-141 = "(คุณครูรู้สึกได้ถึงจิตวิญญาณนักสู้ที่ลุกโชนของฮาสุมิในขณะที่เธอกำลังยืนจ่ายเงิน)"

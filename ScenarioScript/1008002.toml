[translation]
1008002-1 = "#title;멘탈 아웃"
1008002-2 = "#na;(상점가로 나가 보니, 고급스러운 카페 한쪽에 앉아 있던 쇼쿠호의 모습이 보였다.)"
1008002-3 = "#st;[0,0];instant;1;"
1008002-4 = "#clearST"
1008002-5 = "3;쇼쿠호;01\n#3;a\n#wait;1000"
1008002-6 = "3;쇼쿠호;02;……어라, 선생님?\n#3;em;[?]"
1008002-7 = "3;쇼쿠호;99;별일이네, 이런 데에서 다 마주치고."
1008002-8 = "3;쇼쿠호;01;연이어 좋은 일들이라……. 오늘은 꽤 운이 좋을지도?\n#3;greeting"
1008002-9 = "[s1] \"운……?\"\n[s2] \"연이어 좋은 일들?\""
1008002-10 = "#wait;100"
1008002-11 = "#wait;100"
1008002-12 = "3;쇼쿠호;02;뭐-. 그렇지? 마침 날도 좋고…….\n#3;jump"
1008002-13 = "3;쇼쿠호;01;마침 괜찮은 유기농 카페도 찾았고,"
1008002-14 = "3;쇼쿠호;99;마침 부르려던 사람도 알아서 찾아왔고.\n#3;em;[음표]\n#3;greeting"
1008002-15 = "3;쇼쿠호;09;이 정도면 꽤 운이 좋다고 봐야 하지 않겠어? 선생님에게는 어떨지 모르겠지만 말이야."
1008002-16 = "3;쇼쿠호;05;……마찬가지로 좋다고? 흐응-."
1008002-17 = "#st;[0,0];instant;1;"
1008002-18 = "#clearST"
1008002-19 = "3;쇼쿠호;05\n#3;em;…\n#wait;2500"
1008002-20 = "3;쇼쿠호;99;확인하기가 쉽지 않은 상황이라 그런지 뭔가 시큰둥해지네. 뭐, 선생님은 꽤 신뢰할 수 있어 보이니 그런 걸로 해 둘게."
1008002-21 = "3;쇼쿠호;02;……응? '확인한다'는 게 무슨 의미냐고? 문자 그대로지?\n#3;em;[?]"
1008002-22 = "3;쇼쿠호;01;지금은 좀 문제가 있지만, 원래라면 만나는 사람마다 모두 한 번씩 체크하고 들어가니까."
1008002-23 = "3;쇼쿠호;99;무슨 생각을 하는지, 어떤 사상을 가지고 있는지.\n#3;em;…"
1008002-24 = "3;쇼쿠호;09;최소한 '확실한 사람'인지 어떤지. 머릿속을 한 번 쭉 훑어본 뒤에 어떻게 대할지를 정하는 타입이거든."
1008002-25 = "3;쇼쿠호;04;여기서는……. 유감스럽게도 잘 안 되고 있지만 말이지. 정말이지 큰일이라니까.\n#3;em;[땀]"
1008002-26 = "3;쇼쿠호;09;……물론 정말로 작정하고 집중하면, 못 할 것까지는 없겠지만……."
1008002-27 = "#st;[0,0];instant;1;"
1008002-28 = "#clearST"
1008002-29 = "3;쇼쿠호;99\n#3;em;…\n#wait;2500"
1008002-30 = "3;쇼쿠호;09;……흐응?"
1008002-31 = "3;쇼쿠호;09;그건 무슨 얼굴일까? 선생님, 혹시 경계하고 있다든가?"
1008002-32 = "[s3] \"아니. 조금 불편하겠다고 생각하고 있었어.\"\n[s4] \"하던 대로 안 되는 곳은 역시 어색하겠지.\""
1008002-33 = "#wait;100"
1008002-34 = "#wait;100"
1008002-35 = "3;쇼쿠호;04;……어라라-."
1008002-36 = "3;쇼쿠호;99;역시 경계하고 있지는 않나 보네. 뭐, 그런 예측력은 있었지만.\n#3;jump"
1008002-37 = "3;쇼쿠호;02;응? ……믿어줘서 고맙다고?\n#3;em;[?]"
1008002-38 = "3;쇼쿠호;09;좋아서 하는 신뢰는 아니니까 그렇게까지 말해 줄 필요는 없는데. 상황이 상황이라 그런 것뿐이고?"
1008002-39 = "3;쇼쿠호;99;그저 처해진 상황 안에서 나름대로 최선의 선택을 하고 있을 뿐이고."
1008002-40 = "3;쇼쿠호;01;……너무 딱딱한 이야기일까?"
1008002-41 = "[s5] \"아니. 그걸로도 충분해.\"\n[s6] \"이미 많이 양보하고 있다고 생각해.\""
1008002-42 = "#wait;100"
1008002-43 = "#wait;100"
1008002-44 = "3;쇼쿠호;05;……재미없을 정도로 사람이 좋은 편이네, 선생님은."
1008002-45 = "#st;[0,0];instant;1;"
1008002-46 = "#clearST"
1008002-47 = "3;쇼쿠호;99\n#3;d\n#wait;1500"
1008002-48 = "3;쇼쿠호;99\n#3;a\n#3;closeup\n#wait;1500"
1008002-49 = "3;쇼쿠호;10;오히려 이쯤 되니 다른 의미로 확인하고 싶어지는데……. 역시 한 번은 읽어보는 것도 나쁘지 않으려나?\n#3;closeup\n#3;greeting"
1008002-50 = "3;쇼쿠호;04;……응?\n#3;em;[?]\n#3;closeup"
1008002-51 = "3;쇼쿠호;04;환영이라고? 오히려 암시 하나를 걸어줄 수 있냐고?\n#3;closeup"
1008002-52 = "3;쇼쿠호;03;그건 무슨 이야기일까? 방금은 살짝 당황했을지도.\n#3;stiff\n#3;em;[땀]\n#3;closeup"
1008002-53 = "3;쇼쿠호;99;조금 의문력이 오르는 느낌인데……. 일단 들어나 볼까.\n#3;closeup\n#3;greeting"
1008002-54 = "3;쇼쿠호;02;응? '업무 마감이 얼마 남지 않았는데 자꾸 일이 싫어서 도망친다'고……?\n#3;closeup"
1008002-55 = "3;쇼쿠호;04;……그래서?\n#3;em;[?]\n#3;closeup"
1008002-56 = "3;쇼쿠호;05;'일이 좋아지는 암시를 걸어 두면 남은 업무를 처리할 때 행복할 수 있지 않을까……?'\n#3;closeup"
1008002-57 = "#st;[0,0];instant;1;"
1008002-58 = "#clearST"
1008002-59 = "3;쇼쿠호;05\n#3;em;…\n#3;closeup\n#wait;2500"

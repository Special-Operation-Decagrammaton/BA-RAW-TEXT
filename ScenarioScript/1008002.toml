[translation]
1008002-1 = "Mental Out"
1008002-2 = "On the way to the shopping district, I spotted Shokuhou sitting in a luxurious cafe."
1008002-6 = "Sensei? Is that you?"
1008002-7 = "Fancy running into you in a place like this."
1008002-8 = "It's been one good thing after another... It must be my lucky day."
1008002-9 = "[s1] \"Lucky, you say?\"\n[s2] \"One good thing after another?\""
1008002-12 = "What else would you call it? The weather is lovely..."
1008002-13 = "...I found a good organic cafe..."
1008002-14 = "...and the person I was planning to call came on their own."
1008002-15 = "What else would this be but luck? Perhaps you don't feel the same, Sensei."
1008002-16 = "Oh, you're happy to see me too? Hmm."
1008002-20 = "I feel somehow uneasy, not being able to confirm how you really feel. Well, you seem trustworthy enough, so I'll leave it at that, Sensei."
1008002-21 = "Oh, you want to know what I mean by \"confirm\"?"
1008002-22 = "It's a bit of a problem, actually. Normally I check on everyone I meet."
1008002-23 = "What they're thinking, what they believe..."
1008002-24 = "At the very least, I like to check if they're a certain kind of person or not. I prefer to look over others' thoughts and make my decisions from there."
1008002-25 = "Here... Unfortunately, it's not going so well. It really is quite an ordeal."
1008002-26 = "Of course, there's nothing I can't do if I really put my mind to it..."
1008002-30 = "...Hm?"
1008002-31 = "You're making a face, Sensei. Have I frightened you?"
1008002-32 = "[s3] \"Oh, no. I'm concerned that you're too uncomfortable.\"\n[s4] \"It must be hard being in a place where nothing works the way you expect.\""
1008002-35 = "...Oh my."
1008002-36 = "I thought you might want to distance yourself from me. To be honest, I was expecting it."
1008002-37 = "Hm? You're thanking me for trusting you?"
1008002-38 = "Please. It's not as if I made the decision to trust you. I don't exactly have any other options, do I?"
1008002-39 = "Given the situation I've landed in, trusting you is the best choice."
1008002-40 = "...That's not too calculating for you, is it?"
1008002-41 = "[s5] \"No, it's fine.\"\n[s6] \"I can see you're giving up a lot to make this work.\""
1008002-44 = "You're such a nice person that it's almost boring, Sensei."
1008002-49 = "You've piqued my curiosity. Perhaps I will use my ability on you. Surely it wouldn't be a bad idea to try, just this once?"
1008002-50 = "Hm?"
1008002-51 = "I'm welcome to try? You really must elaborate on your answer."
1008002-52 = "Please explain. I admit you've caught me off guard."
1008002-53 = "It's a suspicious thing to say... So let's hear it."
1008002-54 = "Huh? You have a deadline, and maybe I can use my ability to get you out of it...?"
1008002-55 = "...Is that all?"
1008002-56 = "Oh, or maybe I could make it so that you're happy to finish your work...?"
1008002-62 = "...Sensei."
1008002-63 = "I might have to take back what I said earlier. I thought you were a good person, but maybe you are simply a fool."
1008002-64 = "Or perhaps this is all a game to you... I honestly can't tell."
1008002-65 = "Still, if you're going to call yourself an adult, then you ought to act like one and handle your own work."
1008002-66 = "Honestly. I've never had a teacher ask me to use my abilities like this."
1008002-67 = "..."
1008002-68 = "They aren't working well right now, so it's a moot point. ☆ But even if they were, I'd still deny your request."
1008002-69 = "Hm... On the other hand..."
1008002-70 = "I do have to find some way to repay you for all of your help..."
1008002-71 = "[s7] \"In that case...\"\n[s8] \"Will you...?\""
1008002-74 = "..."
1008002-75 = "Absolutely not. You didn't think I'd change my mind, did you?"
1008002-76 = "Here. This organic juice will help you wake up."
1008002-77 = "And..."
1008002-83 = "Good luck with your overtime, Sensei."

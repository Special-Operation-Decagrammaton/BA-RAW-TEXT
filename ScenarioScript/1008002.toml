1008002-61 = "3;쇼쿠호;99\n#3;a\n#wait;1500"
1008002-62 = "3;쇼쿠호;99;……선생님.\n#3;greeting"
1008002-63 = "3;쇼쿠호;07;아까 전 말은 취소해야 할지도 모르겠는걸. 좋은 사람이라고 생각했더니, 그냥 바보였을까나.\n#bgshake"
1008002-64 = "3;쇼쿠호;06;아니면 일부러 그러는 걸까나……. 어느 쪽인지는 모르겠지만."
1008002-65 = "3;쇼쿠호;99;그래도 어른이면 어른답게, 그 정도의 일은 스스로 하라고."
1008002-66 = "3;쇼쿠호;04;정말이지. 내 능력을 그런 식으로 써 달라고 요구한 건 선생님이 처음이라고.\n#3;jump"
1008002-67 = "3;쇼쿠호;04;………….\n#3;em;…"
1008002-68 = "3;쇼쿠호;11;안 되는 건 안 되는 거야☆ 된다고 해도 그런 용도로는 쓰고 싶지도 않고.\n#3;jump\n#3;em;[반짝]"
1008002-69 = "3;쇼쿠호;99;음……. 뭐, 그래도……."
1008002-70 = "3;쇼쿠호;01;이왕 이런 상황의 나를 도와준 빚은 갚아야 하니……."

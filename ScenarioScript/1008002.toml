[translation]
1008002-1 = "[ruby=Mental Out]心理掌握[/ruby]"
1008002-2 = "（到商店街時，看到食蜂坐在高級咖啡廳的一角）"
1008002-6 = "……咦，老師？"
1008002-7 = "真巧呢，居然會在這裡遇到你。"
1008002-8 = "好事接連發生……今天運氣可能不錯哦？"
1008002-9 = "[s1]「運氣……？」\n[s2]「好事接連發生？」"
1008002-12 = "唔～是吧？剛好天氣不錯……"
1008002-13 = "又正好找到不錯的有機咖啡廳……"
1008002-14 = "想找的人還恰巧自己來找我……"
1008002-15 = "這樣運氣算是挺好了吧？#n雖然不知道老師怎麼想就是了。"
1008002-16 = "……運氣跟我一樣好？#n唔唔──"
1008002-20 = "現在這個情況難以進行確認，總覺得有點不甘心……#n算了，老師看起來滿值得信賴的，就當是這麼回事吧。"
1008002-21 = "……嗯？問我「確認」是什麼意思？#n就是字面上的意思啊～？"
1008002-22 = "現在雖然出了一些問題……平時我每當遇到人都會先進行確認。"
1008002-23 = "確認對方在想什麼、抱持著什麼想法。"
1008002-24 = "或者至少也會判斷對方是不是「實在的人」。#n我是會先大致了解他人心裡的想法再決定如何對待的類型。"
1008002-25 = "然而遺憾的是……在這裡無法順利進行確認，實在很令人困擾呢。"
1008002-26 = "……當然，如果真的下定決心專注起來，倒也不是辦不到……"
1008002-30 = "……嗯？"
1008002-31 = "為什麼露出那種表情呢，老師？#n難道是在提防我嗎？"
1008002-32 = "[s3]「不，只是覺得你應該有點不自在。」\n[s4]「無法如願的地方果然會讓人覺得很不自在吧。」"
1008002-35 = "……哎呀呀──"
1008002-36 = "果然並沒有提防我嗎？#n雖然我早有先見之明就是了。"
1008002-37 = "嗯？……謝謝我相信你？"
1008002-38 = "我不是因為喜歡才相信的，所以老師沒必要感謝我。#n畢竟我現在處於這種情況，你說對吧？"
1008002-39 = "只不過是在自己身處的狀況下做出最好的選擇罷了。"
1008002-40 = "……我說話是不是太死板了？"
1008002-41 = "[s5]「不，這樣就夠了。」\n[s6]「我想你應該已經退讓很多了。」"
1008002-44 = "……老師真是個好到讓人覺得無趣的人呢。"
1008002-49 = "到了這種程度，反而讓我在別的意義上想確認一下了呢……#n果然讀取一次也不錯嗎？"
1008002-50 = "……嗯？"
1008002-51 = "你很歡迎？反而希望我對你下暗示？"
1008002-52 = "那是什麼意思？我剛才可能有點太驚訝了。"
1008002-53 = "感覺有點可疑……總之先說來聽聽吧。"
1008002-54 = "「離工作截止時間所剩無幾，卻老是因為不想工作而逃避」……？"
1008002-55 = "……所以呢？"
1008002-56 = "「如果暗示我工作情況會好轉，處理剩餘工作的時候可能會比較快樂」……？"
1008002-62 = "……老師。"
1008002-63 = "我可能得收回剛才說的話了。#n本來以為老師是個好人，沒想到只是個傻瓜啊。"
1008002-64 = "還是說，這是老師刻意為之呢……我不是很明白。"
1008002-65 = "不過既然是大人就請拿出大人的樣子，那種事還是自己想辦法吧。"
1008002-66 = "真是的。要求我把能力用在那種事上的人，老師你還是第一個呢。"
1008002-67 = "…………"
1008002-68 = "不行就是不行☆#n就算可以，我也不想把能力用在那種地方。"
1008002-69 = "嗯……不過……"
1008002-70 = "既然受了老師的幫助，就必須還老師這份人情……"
1008002-71 = "[s7]「啊，難道……」\n[s8]「這次就破例……？」"
1008002-74 = "……"
1008002-75 = "想得美──那怎麼可能呢？"
1008002-76 = "來，這是有助於提神醒腦的有機果汁，老師拿去喝吧。"
1008002-77 = "那……"
1008002-83 = "加班加油哦，老師。"

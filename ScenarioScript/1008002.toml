[translation]
1008002-1 = "เมนทัล เอาต์"
1008002-2 = "(เมื่อออกไปยังย่านการค้า คุณครูก็เจอโชคุโฮวนั่งอยู่ที่มุมหนึ่งของคาเฟ่สุดหรู)"
1008002-6 = "เอ๋ คุณครู...?"
1008002-7 = "แปลกจังเลย ได้มาเจอกันในที่แบบนี้ด้วย"
1008002-8 = "เกิดเรื่องดีๆ ต่อเนื่องแบบนี้... วันนี้ฉันอาจจะโชคดีก็ได้นะเนี่ย"
1008002-9 = "[s1] \"โชคดี...?\"\n[s2] \"เกิดเรื่องดีๆ ต่อเนื่องกัน?\""
1008002-12 = "ก็ทำนองนั้นน่ะ แถมวันนี้ก็เป็นวันดีๆ ด้วย..."
1008002-13 = "ฉันเจอคาเฟ่ออร์แกนิกดีๆ"
1008002-14 = "แล้วคนที่อยากให้มาหาก็มาหาเองถึงที่เลยอีกด้วย..."
1008002-15 = "ถึงจะไม่รู้ว่าคุณครูคิดยังไงก็เถอะ แต่สำหรับฉันแล้ว แค่นี้ก็ถือว่าวันนี้โชคดีแล้วละ"
1008002-16 = "คิดเหมือนกันงั้นเหรอ? อืม..."
1008002-20 = "สถานการณ์ตอนนี้มันยังยืนยันไม่ได้ว่าคุณครูคิดแบบนั้นจริงๆ หรือเปล่า แต่คุณครูก็ดูน่าเชื่อถือได้อยู่ งั้นฉันจะลองๆ เชื่อดูแล้วกัน"
1008002-21 = "หืม? สงสัยว่าการ 'ยืนยัน' ของฉันหมายถึงอะไรงั้นเหรอ? ก็ตามที่บอกไปนั่นแหละ"
1008002-22 = "ถึงตอนนี้จะมีปัญหาอยู่นิดหน่อย แต่ปกติแล้วฉันจะตรวจทุกคนที่ฉันเจอน่ะ"
1008002-23 = "ก็ตรวจดูว่าคิดอะไรอยู่ และมีทัศนคติยังไง..."
1008002-24 = "แล้วก็ดูว่าเป็น 'คนที่เชื่อถือได้' หรือเปล่า พอดีฉันเป็นคนประเภทที่ชอบวิเคราะห์ความคิดคนอื่น แล้วก็ค่อยตัดสินใจน่ะว่าจะปฏิบัติตัวด้วยยังไงดี"
1008002-25 = "แต่ว่าพอมาที่นี่... ก็น่าเสียดายที่ฉันใช้พลังจิตของตัวเองไม่ค่อยได้ นี่มันเรื่องใหญ่สำหรับฉันเลยนะ"
1008002-26 = "ถ้าตั้งใจและจดจ่อจริงๆ ก็ใช่ว่าฉันจะทำไม่ได้เลยหรอก แต่ก็..."
1008002-30 = "หืม...?"
1008002-31 = "ทำไมทำหน้าแบบนั้นล่ะ คุณครู? หรือว่าคุณครูกลัวฉันน่ะ?"
1008002-32 = "[s3] \"ไม่หรอก ก็แค่คิดว่าไม่น่าจะปลอดภัยอยู่หน่อยๆ\"\n[s4] \"พออยู่ในที่ที่ใช้พลังไม่ค่อยได้ก็คงจะไม่ชินสินะ\""
1008002-35 = "เอ๋..."
1008002-36 = "คุณครูไม่ได้มีทีท่าว่าจะกลัวฉันเลยเหรอเนี่ย แต่ก็นะ ฉันก็คิดไว้แล้วละว่าจะเป็นแบบนี้"
1008002-37 = "หืม? ...ขอบใจที่เชื่องั้นเหรอ?"
1008002-38 = "ฉันไม่ได้เชื่อใจเพราะชอบคุณครูหรอกนะ ไม่ต้องขอบใจกันขนาดนั้นก็ได้ ฉันก็ไหลตามสถานการณ์#nไปน่ะ"
1008002-39 = "ก็แค่เลือกในสิ่งที่ดีที่สุดภายใต้สถานการณ์ที่เป็นอยู่ก็เท่านั้น"
1008002-40 = "...คำพูดฉันมันดูตรงๆ ห้วนๆ ไปรึเปล่า?"
1008002-41 = "[s5] \"ไม่หรอก แค่นี้ก็เพียงพอแล้ว\"\n[s6] \"เท่านี้ครูก็คิดว่ายอมให้กันเยอะแล้วนะเนี่ย\""
1008002-44 = "...คุณครูเนี่ย เป็นคนดีจนน่าเบื่อเลยนะ"
1008002-49 = "แบบนี้ฉันยิ่งอยากตรวจสอบคุณครูใหญ่เลย... ลองอ่านใจดูสักครั้งก็คงไม่เสียหายอะไรหรอกเนอะ?"
1008002-50 = "หืม...?"
1008002-51 = "ด้วยความยินดีงั้นเหรอ? ตรงกันข้าม อยากให้ฉันช่วยสะกดจิตดูหน่อยงั้นเหรอ?"
1008002-52 = "หมายความว่ายังไงน่ะ? ตอบแบบนี้ฉันไปไม่เป็นเลยนะ"
1008002-53 = "ชักสงสัยขึ้นมาแล้วสิ... แต่ก็ลองดูก่อนแล้วกัน"
1008002-54 = "หืม? 'เดดไลน์ส่งงานก็ใกล้เข้ามาแล้ว แต่ว่าขี้เกียจจนเอาแต่เลี่ยงงานอยู่เรื่อย' งั้นเหรอ...?"
1008002-55 = "...แล้วยังไงอีกน่ะเหรอ?"
1008002-56 = "'ถ้าโดนสะกดจิตว่าฉันรักงาน ก็น่าจะทำงานที่เหลือได้อย่างมีความสุขขึ้น'...?"
1008002-62 = "คุณครู..."
1008002-63 = "สงสัยฉันคงต้องขอถอนคำพูดที่พูดไปเมื่อกี้แล้วละ นึกว่าเป็นคนดีซะอีก ที่ไหนได้ก็แค่คนเพี้ยนๆ นี่เอง"
1008002-64 = "หรือว่าตั้งใจทำตัวเพี้ยนๆ งั้นเหรอ...? ดูไม่ออกเลยแฮะว่าเป็นแบบไหนกันแน่"
1008002-65 = "แต่ถ้าเป็นผู้ใหญ่ ก็ทำตัวให้สมกับเป็นผู้ใหญ่หน่อยเถอะ"
1008002-66 = "ให้ตายสิ นี่คุณครูเป็นคนแรกเลยนะที่ขอให้ฉันใช้พลังจิตแบบนี้น่ะ"
1008002-67 = "......"
1008002-68 = "ไม่ได้ก็คือไม่ได้ไง☆ ต่อให้ทำได้ ฉันก็ไม่อยากเอาพลังไปใช้กับเรื่องแบบนั้นอยู่ดี"
1008002-69 = "อืม... แต่ก็นะ..."
1008002-70 = "แต่ยังไงฉันก็ต้องตอบแทนที่ที่คุณครูช่วยเหลือฉัน..."
1008002-71 = "[s7] \"อ๊ะ อย่าบอกนะว่าจะช่วยน่ะ...\"\n[s8] \"จะหยวนๆ ช่วยกันสักครั้งได้ไหม...?\""
1008002-74 = "......"
1008002-75 = "จะบ้าเหรอ จะเป็นแบบนั้นไปได้ยังไงกันเล่า"
1008002-76 = "เอ้า น้ำผลไม้ออร์แกนิกที่ช่วยทำให้สดชื่น เอาไปดื่มซะ"
1008002-77 = "แล้วก็..."
1008002-83 = "สู้ๆ กับงานที่เหลือนะคุณครู"

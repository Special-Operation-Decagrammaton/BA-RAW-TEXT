[translation]
2000502-1 = "การเปิดตัวในฤดูร้อน!"
2000502-2 = "ร้านชุดว่ายน้ำในชิบะทาวน์"
2000502-7 = "คุณครูคะ ทางนี้ค่ะ ทางนี้!"
2000502-8 = "[s] \"ฮิฟุมิมาถึงเร็วเลยนะเนี่ย?\""
2000502-9 = "ฮิฮิ ฉันตื่นเต้นว่าจะเลือกชุดว่ายน้ำแบบไหนดีก็เลยมารออยู่ก่อนค่ะ"
2000502-10 = "ที่ร้านมีชุดว่ายน้ำน่ารักๆ เพียบเลยล่ะค่ะ สงสัยจะเตรียมไว้ขายสำหรับช่วงฤดูร้อนนี้"
2000502-11 = "ทั้งสีและดีไซน์ก็เยอะแยะไปหมด แค่ได้ยืนดูชุดก็รู้สึกได้ถึงวันหยุดฤดูร้อนแล้วค่ะ"
2000502-12 = "จะว่าไป คุณครูไม่ต้องซื้อชุดว่ายน้ำใหม่เหรอคะ?"
2000502-13 = "[s1] \"ครูมีที่ซื้อไว้เมื่อปีที่แล้วน่ะ\"\n[s2] \"ครูชอบว่ายน้ำด้วยชุดวันเกิดน่ะ\""
2000502-14 = "อ่า... อย่างนั้นเองสินะคะ แต่ไม่แน่ว่าคุณครูอาจจะเจอชุดใหม่ที่ถูกใจก็ได้นะคะ"
2000502-15 = "แบบนั้นไม่ได้นะคะ! ทำแบบนั้นเดี๋ยวคุณตำรวจก็รวบไปหรอกค่ะ!!"
2000502-16 = "เอาเป็นว่าเราไปเลือกชุดว่ายน้ำกันดีกว่าค่ะ"
2000502-17 = "ฉันจะไปดูโซนบิกินีทางโน้นก่อนนะคะ!"
2000502-19 = "อืม... เลือกยากจังเลยนะคะ"
2000502-20 = "ชุดว่ายน้ำที่มีระบายห้อยน่ารักๆ ก็สวยดี แต่ดีไซน์มันดูเรียบง่ายไปหน่อย..."
2000502-21 = "ถ้าเด็กสาวธรรมดาๆ อย่างฉันใส่ชุดว่ายน้ำแบบนั้น ก็คงไม่โดดเด่นและไม่ต่างอะไรกับก้อนกรวด#nบนชายหาดน่ะค่ะ"
2000502-22 = "อืม... ต้องเป็นชุดว่ายน้ำสวยๆ ที่สะดุดตากว่านี้หน่อย..."
2000502-26 = "[ns] \"ได้ชุดว่ายน้ำที่ถูกใจแล้วเหรอ?\""
2000502-27 = "ค่ะ...! เพิ่งเลือกได้เมื่อกี้นี้เลยค่ะ!"
2000502-28 = "ชุดว่ายน้ำที่ฉันเลือกก็คือ... ชุดนี้ค่ะ!"
2000502-33 = "[ns3] \".........\"\n[ns4] \"ชุดนี้มัน... ไม่เกินไปหน่อยเหรอ?\""
2000502-34 = "คะ? ชุดนี้มันทำไมเหรอคะ?"
2000502-35 = "คะ? ชุดนี้มันทำไมเหรอคะ?"
2000502-36 = "มันดูเปิดเผยไปสำหรับนักเรียนเหรอคะ?"
2000502-39 = "พอมาดูอีกที... ฉันว่ามันก็โชว์เนื้อหนังเยอะไปหน่อยเหมือนกัน..."
2000502-42 = "[ns] \"เอาเป็นชุดที่มีระบายพลิ้วๆ ตรงนี้ดีกว่ามั้ย?\""
2000502-43 = "ก็น่ารักอยู่หรอกนะคะ... แต่มันไม่ธรรมดาไปหน่อยเหรอคะ?"
2000502-44 = "ฉันว่ามันดูเป็นชุดดีไซน์ธรรมดาๆ สำหรับนักเรียนทรีนิตี้ธรรมดาๆ ยังไงไม่รู้น่ะค่ะ"
2000502-45 = "ปกติคนอื่นก็ว่าฉันเป็นเด็กที่ไม่มีอะไรโดดเด่นอยู่แล้ว ฉันก็เลยอยากจะรู้สึกพิเศษขึ้นมา#nในช่วงเวลาสุดพิเศษอย่างวันหยุดฤดูร้อนค่ะ"
2000502-46 = "[s5] \"สำหรับครูแล้วฮิฟุมิเป็นนักเรียนที่พิเศษเสมอเลยนะ\"\n[s6] \"ฮิฟุมิจะใส่ชุดว่ายน้ำแบบไหนก็ออกมาน่ารักนะ\""
2000502-47 = "ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูคิดแบบนี้ก็โล่งอกไปทีค่ะ..."
2000502-48 = "ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูคิดแบบนี้ก็โล่งอกไปทีค่ะ..."
2000502-49 = "ถ้างั้นฉันเอาเป็นชุดว่ายน้ำน่ารักที่คุณครูแนะนำให้ดีมั้ยคะ?"
2000502-50 = "ฉันจะไปลองใส่มาเลยค่ะ ช่วยรอสักครู่นะคะ"
2000502-55 = "เอ่อ... ฉันลองใส่ชุดที่คุณครูช่วยเลือกให้แล้วค่ะ แต่มัน..."
2000502-56 = "คุณครูว่าเป็นยังไงบ้างคะ? ดูธรรมดาเกินไปหรือเปล่าคะ?"
2000502-57 = "[s7] \"สวยจนคิดว่าเป็นคนละคนเลย!\"\n[s8] \"มันก็เรียบๆ นะ แต่ครูว่ามันกลับดีมากเลยล่ะ!\""
2000502-58 = "ฮิฮิ ขอบคุณที่พูดแบบนี้นะคะ"
2000502-59 = "ฮิฮิ ขอบคุณที่พูดแบบนี้นะคะ"
2000502-60 = "ฉันว่าฉันยังดูเรียบง่ายอยู่... แต่ถ้าคุณครูชอบล่ะก็ บางทีความเรียบง่ายแบบนี้ก็อาจจะดีกว่าก็ได้ค่ะ"
2000502-61 = "รู้สึกอยากไปทะเลฤดูร้อนเร็วๆ แล้วค่ะ"
2000502-63 = "(จากนั้นคุณครูก็กลับโรงเรียนไปพร้อมฮิฟุมิที่ได้ชุดว่ายน้ำมาใหม่)"

[translation]
2000502-1 = "Summer Debut!"
2000502-2 = "Shiba Town Swimsuit Store"
2000502-7 = "Here, Sensei! Over here!"
2000502-8 = "[s] \"You're here early, Hifumi.\""
2000502-9 = "I was so excited to pick out a new swimsuit that I couldn't wait."
2000502-10 = "We're entering vacation season, so the store has so many cute ones in stock."
2000502-11 = "There are so many different colors and designs. Just looking at them makes me feel like I'm on vacation."
2000502-12 = "By the way, don't you need a new swimsuit too?"
2000502-13 = "[s1] \"The one I got last year should do fine.\"\n[s2] \"Actually, I'm somewhat of a skinny dipper.\""
2000502-14 = "I guess so. But maybe you'll find one you really like."
2000502-15 = "Y-You can't do that! You could go to jail, Sensei!"
2000502-16 = "Let's start by going to different sections to look for swimsuits."
2000502-17 = "I'm going to start with the bikini section over there!"
2000502-19 = "Hmm. This is tough."
2000502-20 = "I like that this one has frills, but the design is kinda simple..."
2000502-21 = "How is a girl like me supposed to stand out in it? I'd be as common-looking as a pebble on the beach."
2000502-22 = "I need something cooler... Something that really stands out."
2000502-26 = "[ns] \"Did you find a swimsuit you like?\""
2000502-27 = "Y-Yes! I just picked one!"
2000502-28 = "The swimsuit I chose...is this one!"
2000502-33 = "[ns3] \"...\"\n[ns4] \"Don't you think it's a bit...\""
2000502-34 = "Huh? Do you not like it?"
2000502-35 = "Huh? Do you not like it?"
2000502-36 = "I guess it's a little daring for student to wear, huh?"
2000502-39 = "And it wouldn't leave much to the imagination..."
2000502-42 = "[ns] \"What about this frilly swimsuit here?\""
2000502-43 = "I thought it was cute as well, but don't you think it's also too plain?"
2000502-44 = "It's just an ordinary design that an ordinary girl from Trinity would wear."
2000502-45 = "I've always been told I'm ordinary. A summer vacation is a big deal, though. I want it to feel special. I want to look special..."
2000502-46 = "[s5] \"You've always been special to me.\"\n[s6] \"You'd look cute in any swimsuit.\""
2000502-47 = "O-Oh. I'm glad you think so, Sensei..."
2000502-48 = "O-Oh. I'm glad you think so, Sensei..."
2000502-49 = "All right, then. I'll pick the swimsuit you recommended."
2000502-50 = "I'm going to go try it on now. Wait just a sec, okay?"
2000502-55 = "Um... This is the swimsuit you said you liked."
2000502-56 = "H-How do I look? It's not too plain, is it?"
2000502-57 = "[s7] \"You look so glamorous that I barely recognize you!\"\n[s8] \"It IS sort of traditional...but that's why I like it!\""
2000502-58 = "Haha. I'll take your word for it."
2000502-59 = "Haha. I'll take your word for it."
2000502-60 = "I still think I look plain, but if you like this look, maybe being ordinary isn't such a bad thing."
2000502-61 = "Now I really can't wait to hit the beach."
2000502-63 = "We returned to school after Hifumi paid for the swimsuit."

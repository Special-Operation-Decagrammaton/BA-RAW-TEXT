[translation]
2000502-1 = "夏季出道！"
2000502-2 = "芝町．泳裝賣場"
2000502-7 = "老師！這裡，這裡！"
2000502-8 = "[s] 「讓你久等了，日步美。」"
2000502-9 = "不會。是我自己太期待要挑哪一款泳裝，所以就早點過來了。"
2000502-10 = "或許因為正逢夏季，店裡擺滿了可愛的泳裝。"
2000502-11 = "不管是顏色或設計都很多樣化……用看的就覺得好有趣喔！"
2000502-12 = "來都來了，老師要不要也買個新泳裝呢？"
2000502-13 = "[s1] 「挺猶豫的，畢竟還有去年穿過的……」\n[s2] 「我覺得不需要泳裝……」"
2000502-14 = "原來如此。那就是隨緣看看有沒有遇到喜歡的泳裝囉。"
2000502-15 = "老，老師的意思是游泳時什麼都不穿嗎！？那，那可不行！會被警察抓走的！"
2000502-16 = "總之我們先到處看看吧。"
2000502-17 = "啊，我想先去逛那區！"
2000502-19 = "唔──嗯……"
2000502-20 = "這件有很多可愛荷葉邊是不錯，但總覺得整體上太單調了……"
2000502-21 = "我都已經夠平凡了，要是泳裝不夠花俏，恐怕會被當成沙灘上的石頭吧……"
2000502-22 = "有沒有……稍微再顯眼一點的泳裝……"
2000502-26 = "[ns] 「找到喜歡的泳裝了嗎？」"
2000502-27 = "是，是！啊，我，我正巧剛選好呢！"
2000502-28 = "這，這件感覺挺不錯的！"
2000502-33 = "[ns3] 「嗯，呃，我覺得這件對日步美來說有一點太早了……？」\n[ns4] 「是，是不錯，但我覺得其他款式也挺好的……？」"
2000502-34 = "是，是這樣嗎……？"
2000502-35 = "是，是這樣嗎……？"
2000502-36 = "咦？而且對學生來說，會有點太過大膽了……？"
2000502-39 = "確，確實，仔細再看一下實在有點……"
2000502-42 = "[ns] 「這個有荷葉邊的可愛泳裝怎麼樣呢？」"
2000502-43 = "那，那件確實很可愛……"
2000502-44 = "但感覺，就是那種三一學生很常見的款式……"
2000502-45 = "我都已經夠平凡了，覺得應該要選個花俏的泳裝……"
2000502-46 = "[s5] 「我覺得符合日步美的氣質，就是最可愛的。」\n[s6] 「就算不花俏，日步美也一直都很可愛唷。」"
2000502-47 = "既，既然老師都這麼說了……"
2000502-48 = "既，既然老師都這麼說了……"
2000502-49 = "那麼……反正也確實挺可愛的，就挑老師推薦的這件泳裝吧。"
2000502-50 = "我先去試穿看看，請等我一下。"
2000502-55 = "那，那個……"
2000502-56 = "看，看起來怎麼樣……？"
2000502-57 = "[s7] 「完美！可愛！最強！這個夏天已經被日步美拿下了！」\n[s8] 「非常適合你！」"
2000502-58 = "稱，稱讚的這麼起勁，反而讓人挺害羞的……"
2000502-59 = "稱，稱讚的這麼起勁，反而讓人挺害羞的……"
2000502-60 = "雖然可能沒有很花俏……但看到老師為我開心，我也稍微有點自信了。"
2000502-61 = "……我現在，已經迫不及待要去海邊了！"
2000502-63 = "（之後，與買完泳裝的日步美一起回到了學校）"

[translation]
2000502-1 = "#title;여름 데뷔!"
2000502-2 = "#place;시바타운 내 수영복 매장"
2000502-3 = "2;히후미;01\n#2;a\n#wait;1500"
2000502-4 = "2;히후미;01\n#2;m3\n#wait;1500"
2000502-5 = "2;히후미;01\n#2;m4\n#wait;1000"
2000502-6 = "2;히후미;02\n#2;em;[반응]\n#wait;1000"
2000502-7 = "2;히후미;03;선생님, 여기예요. 여기!\n#2;m3\n#2;em;[반짝]\n#2;hophop"
2000502-8 = "[s] \"일찍 도착했네, 히후미.\""
2000502-9 = "2;히후미;00;후후, 무슨 수영복을 고를지 기대가 되어서 먼저 와서 기다리고 있었어요."
2000502-10 = "2;히후미;02;바캉스 시즌이라 그런지 가게에 귀여운 수영복이 잔뜩 진열되어 있네요.\n#2;m2"
2000502-11 = "2;히후미;03;색도 디자인도 다양해서…… 보는 것만으로도 벌써부터 바캉스를 온 기분이에요.\n#2;em;[음표]"
2000502-12 = "2;히후미;02;그런데 선생님은 새 수영복, 필요 없으신가요?\n#2;m3"
2000502-13 = "[s1] \"작년에 쓰던 것이 있어.\"\n[s2] \"수영할 때는 옷을 입지 않는 주의라…….\""
2000502-14 = "2;히후미;00;아하, 그렇군요. 그래도 마음에 드는 새 수영복을 만날 수 있을지도 몰라요.\n#2;em;[반응]"
2000502-15 = "2;히후미;04;그, 그러면 안 돼요! 그랬다가는 경찰에게 잡혀간다고요!?\n#2;shake\n#2;em;[?!]"
2000502-16 = "2;히후미;01;일단은 각자 구역을 나누어서 수영복을 골라 볼까요?"
2000502-17 = "2;히후미;03;우선 저는 저쪽에 있는 비키니 구역을 먼저 보고 올게요!\n#2;m4\n#2;em;[반응]"
2000502-18 = "#all;hide"
2000502-19 = "3;히후미;01;으음…… 고민되네요.\n#3;a\n#3;em;…"
2000502-20 = "3;히후미;99;귀여운 프릴이 잔뜩 달린 이 수영복도 좋지만, 어쩐지 디자인이 수수하고……."
2000502-21 = "3;히후미;04;저처럼 평범한 아이가 이런 수영복을 입었다가는 눈에 띄기는커녕 백사장의 돌멩이보다 더 흔해 보일 거예요.\n#3;em;[땀]\n#3;stiff"
2000502-22 = "3;히후미;05;좀 더…… 좀 더, 눈에 띄는 멋진 수영복을 찾지 않으면……."
2000502-23 = "#st;[0,0];instant;1;"
2000502-24 = "3;히후미;00\n#3;em;[반응]\n#wait;1500"
2000502-25 = "#clearST\n3;히후미;01\n#3;greeting\n#wait;2000"
2000502-26 = "[ns] \"마음에 드는 수영복은 찾았어?\""
2000502-27 = "3;히후미;06;……네, 넵! 방금 고른 참이에요!\n#3;em;[!]\n#3;stiff"
2000502-28 = "3;히후미;05;제가 고른 수영복은…… 바로 이거예요!"
2000502-29 = "#st;[0,0];instant;1;"
2000502-30 = "#clearST\n3;히후미;05\n#3;m5\n#wait;1500"
2000502-31 = "3;히후미;05\n#3;greeting\n#wait;1500"
2000502-32 = "#bgshake\n#wait;2500"
2000502-33 = "[ns3] \"………….\"\n[ns4] \"……이건 좀 그렇지 않나?\""
2000502-34 = "3;히후미;02;……에? 이 수영복에 무슨 문제라도 있나요?\n#3;em;[?]"
2000502-35 = "3;히후미;02;……에? 이 수영복에 무슨 문제라도 있나요?\n#3;em;[?]"
2000502-36 = "3;히후미;04;학생이 입기에는 너무 디자인이 파격적이다고요?\n#3;em;[땀]\n#3;stiff"
2000502-37 = "#st;[0,0];instant;1;"
2000502-38 = "#clearST\n3;히후미;04\n#3;em;…\n#wait;2500"
2000502-39 = "3;히후미;04;화, 확실히 다시 보니 노출이 조금 심한 것 같기도 하고…….\n#3;em;[속상함]"
2000502-40 = "#st;[0,0];instant;1;"
2000502-41 = "#clearST\n3;히후미;04\n#3;m3\n#wait;1500"
2000502-42 = "[ns] \"이쪽의 프릴이 달린 수영복은 어때?\""
2000502-43 = "3;히후미;02;그것도 무난하게 귀엽긴 하지만…… 너무 평범하지 않나요?"
2000502-44 = "3;히후미;01;뭔가 평범한 트리니티의 학생이 입을 법한 평범한 디자인이잖아요."
2000502-45 = "3;히후미;99;저는 평소에도 평범하다는 소리를 자주 들으니까…… 여름 바캉스 같은 특별한 때에는 저도 특별해지고 싶어요.\n#3;em;…"
2000502-46 = "[s5] \"내게 히후미는 언제나 특별한 학생이야.\"\n[s6] \"히후미는 어떤 수영복을 입더라도 귀여워.\""
2000502-47 = "3;히후미;04;그, 그렇군요……. 선생님께서 그렇게 생각하신다면 다행이지만…….\n#3;em;[///]\n#3;stiff"
2000502-48 = "3;히후미;04;그, 그렇군요……. 선생님께서 그렇게 생각하신다면 다행이지만…….\n#3;em;[///]\n#3;stiff"
2000502-49 = "3;히후미;01;그럼…… 선생님께서 추천해주신 이쪽의 귀여운 수영복으로 할까요?"
2000502-50 = "3;히후미;00;지금부터 갈아입고 올 테니, 잠깐만 기다려주세요.\n#3;greeting\n#3;em;[반응]"
2000502-51 = "#all;hide"
2000502-52 = "#wait;2500"
2000502-53 = "#all;hide"
2000502-54 = "3;히후미 수영복ND;07\n#3;a\n#wait;1500"
2000502-55 = "3;히후미 수영복ND;07;저…… 선생님이 추천해주신 수영복으로 갈아입어 보았는데…….\n#3;em;[///]\n#3;stiff"
2000502-56 = "3;히후미 수영복ND;04;어, 어떤가요? 너무 평범하지는 않나요?"
2000502-57 = "[s7] \"너무 화려해서 다른 사람인 줄 알았어!\"\n[s8] \"평범하지만…… 오히려 그 점이 좋아!\""
2000502-58 = "3;히후미 수영복ND;08;하하, 그렇게라도 말씀해주시니 감사해요.\n#3;em;[땀]"
2000502-59 = "3;히후미 수영복ND;08;하하, 그렇게라도 말씀해주시니 감사해요.\n#3;em;[땀]"
2000502-60 = "3;히후미 수영복ND;99;제가 보기에는 아직도 수수한 저이지만…… 선생님이 좋아해 주신다면 이런 평범함도 나쁘지 않을지도 모르겠어요."
2000502-61 = "3;히후미 수영복ND;03;어쩐지 벌써부터 여름의 해변이 기다려지네요.\n#3;em;[반짝]\n#3;greeting"
2000502-62 = "#all;hide"
2000502-63 = "#na;(이후, 수영복을 구입한 히후미와 함께 다시 학교로 돌아왔다.)"

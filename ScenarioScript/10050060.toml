10050060-11 = "1;마시로;01;그렇습니다……. 이것이 저 혼자만의 무능이라면, 달게 받아들일 수 있습니다."
10050060-12 = "1;마시로;02;그러나 이것이 우리 정의실현부의, 정의를 실현하고자 하는 의지에 대한 문제라면…….\n#1;m3\n#2;dr\n#4;dr"
10050060-13 = "1;마시로;05;그리고 나아가 트리니티의 정의 그 자체에 대한 근본적인 문제라면!\n#1;em;[!]"

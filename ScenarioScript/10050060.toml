10050060-19 = "3;마시로;01;사실 누구나 생각할 수 있는 방안이겠습니다만, 현재 상황으로는 이보다 나은 대책도 쉽게 찾을 수 없을 것 같군요.\n#3;em;…"
10050060-20 = "3;마시로;99;상황이 어려울수록, 기책보다는 상책을 되돌아보아야 한다고 하죠. 그러니, 지금부터……."
10050060-21 = "3;마시로;05;정의실현부가 사용할 수 있는 모든 색적 자원을, 트리니티 전역으로 확장하고자 합니다!\n#3;jump"

10050060-73 = "1;트리니티 학생;01;부디 몸조심해 주세요. 공녀님. 다음에는 조금 더 마음 편하게 트리니티를 방문하셔서, 멋진 추억을 쌓을 기회가 있으셨으면 하네요."

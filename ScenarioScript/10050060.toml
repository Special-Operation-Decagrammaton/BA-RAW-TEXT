10050060-5 = "4;정의실현부 부원 B;07\n2;정의실현부 부원 A;07\n#na;정의실현부 부원들;네, 넷!\n#3;hide\n#2;h\n#4;h\n#2;a\n#4;a\n#2;jump\n#4;jump"
10050060-6 = "3;마시로;01;아시다시피 우리는, 트리니티에 암암리 퍼져 나가고 있는 비인가 도서의 조사 및 추적 임무를 수행하고 있습니다.\n#2;hide\n#4;hide"

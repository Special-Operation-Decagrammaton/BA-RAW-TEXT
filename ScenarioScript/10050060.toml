[translation]
10050060-1 = "第6話;無人之境"
10050060-4 = "大家都到齊了嗎？"
10050060-5 = "是，是！"
10050060-6 = "誠如各位所知，我們正在針對三一暗中流傳的地下書刊執行調查及追蹤。"
10050060-7 = "但是幾天過去了，調查進度卻依然一籌莫展。"
10050060-8 = "是……"
10050060-9 = "接著就在昨天，渚大人對這次任務的進度表達了由衷的憂慮。"
10050060-10 = "渚，渚大人親自嗎……！？"
10050060-11 = "正是如此……如果只是我個人的無能，我當然願意概括承受。"
10050060-12 = "然而，如果這是關[ruby=實現正義部]乎我們對[/ruby]於「實現正義的意志」的問題……"
10050060-13 = "甚至有可能進而影響到「三一的正義」根基的問題的話……！"
10050060-15 = "我們理應親自證明自己的存在價值！"
10050060-16 = "是，是！"
10050060-17 = "不過……我們究竟該怎麼做呢？"
10050060-18 = "我有一個方案。 "
10050060-19 = "雖然是個任何人都能想到的方案，不過眼下似乎也沒有更好的方法了。"
10050060-20 = "有句話說情況越是艱難，越該回頭採用上策而非奇策。#n所以接下來……"
10050060-21 = "我要將實現正義部能動用的所有搜索資源，拓展到三一全境！"
10050060-22 = "從，從什麼時候開始……？"
10050060-23 = "就從現在這一刻開始！#n各位，我明白這是個強人所難的要求，不過還是希望各位能再加把勁。"
10050060-24 = "我也會以身作則，率先巡視現場的！"
10050060-28 = "大，大家一起走嘛，麻白同學～！"
10050060-44 = "……今天連一本也沒賣出去呢。"
10050060-45 = "或者應該說，連賣書的地方都找不到才對……"
10050060-46 = "那些身穿黑色制服的學生……是叫實現正義部吧？#n怎麼今天到處都是他們的人呢？"
10050060-47 = "唔嗯……讓我得以在赤冬生存下來的技能之一，#n我的「出版部部長危險偵測器」正在發出劇烈的反應。"
10050060-48 = "我，我們該不會真的被發現了吧！？"
10050060-53 = "公主殿下！還有您的侍女！#n原來兩位在這裡啊！"
10050060-54 = "……！#n是，是的……貴安。"
10050060-55 = "……我什麼時候變成侍女了啊。"
10050060-56 = "願兩位一切平安。#n現在情勢緊急，我有些話必須盡快告知……還請原諒我的無禮。"
10050060-57 = "無，無妨。請問是什麼事呢？"
10050060-58 = "好的……從結論來說，現在三一的實現正義部，出動了大約一半的人力在尋找兩位。"
10050060-59 = "……果然如此啊。#n今天實現正義部的巡邏確實特別密集呢……"
10050060-60 = "是的，那正是受到了這件事的影響。#n同時……也導致整個三一瀰漫著恐怖的氣氛……"
10050060-61 = "恐怖的氣氛……是我們造成的嗎？#n非常抱歉。我實在無地自容……"
10050060-62 = "不，不是的！仔細想想，似乎也沒到恐怖的程度……況且這完全不是公主殿下的錯！"
10050060-63 = "……雖然大家現在都忙著把教科書以外的書全部藏起來，這也是不爭的事實。"
10050060-64 = "真的很對不起，公主殿下。#n接下來的事……我們恐怕很難再提供積極的協助了。"
10050060-65 = "別這麼說。光是各位這幾天以來的種種幫助，已經讓我覺得感激不盡了。"
10050060-66 = "可憐的公主殿下……居然連來到三一都得經歷這麼多苦難……嗚……"
10050060-68 = "能有人也來安慰我一下嗎……"
10050060-69 = "總之，兩位接下來最好躲到沒有實現正義部成員的地方去。"
10050060-70 = "像是什麼樣的地方呢？"
10050060-71 = "對不起……這點我們也不太清楚。"
10050060-72 = "不過公主殿下是外來的貴賓，或許能用外人的角度找出那樣的安全地帶。"
10050060-73 = "還請務必多多保重，公主殿下。#n希望公主殿下將來能輕鬆地造訪三一，並留下美好的回憶。"
10050060-74 = "不，各位已經為我留下足夠多美好的回憶了。#n再次感謝各位的關照。"
10050060-75 = "您真是太客氣了！"
10050060-80 = "到底是從哪裡開始出錯的呢……"
10050060-81 = "搞不好一開始就錯了吧……這樣下去真的沒問題嗎，部長！？"
10050060-82 = "老實說，我現在也搞不太清楚了……不過重要的不是應該堅持到底嗎？"
10050060-83 = "根據時機跟情況，有時懂得放棄才更重要吧……"
10050060-84 = "總之，先跟剛才那位學生說的一樣，找個實現正義部不會去的地方吧。"
10050060-94 = "其他事情等躲好之後再說也不遲……"
10050060-95 = "嗚嗚……這種時候要是有老師在就好了……"
10050060-99 = "部長。那裡好像看起來還可以……？"
10050060-100 = "是啊，那裡實現正義部的人感覺比較少。"
10050060-101 = "與其說實現正義部的人少，不如說連一個學生的影子都沒有吧……"
10050060-102 = "現在那樣反而更好，不是嗎？"
10050060-112 = "這裡……是圖書館嗎？看起來似乎是呢。"
10050060-117 = "不過如果要說只是單純的圖書館，又感覺哪裡不太一樣……"
10050060-118 = "陳列的書都相當古老，書況卻很不錯……"
10050060-119 = "也就是說，這裡有非常專業的管理員在管理……"
10050060-123 = "咦……？"
10050060-131 = "貴音？怎麼了嗎？"
10050060-138 = "嗚哇啊啊！"
10050060-139 = "在圖書館請保持安靜。"
10050060-145 = "唉……外面的人又……嘖。"
10050060-146 = "……嗯？不過這些人，好像不是三一的學生……？"
10050060-147 = "看起來還帶了很多書之類的東西在身上……"
10050060-149 = "那個……雖然不太清楚詳細情況，也沒什麼興趣了解……"
10050060-150 = "不過，兩位應該是出版和流通領域的相關人士吧……？"
10050060-151 = "是，是的。抱歉打擾到你了，古関憂同學。"
10050060-152 = "不會，反正……那個部分兩位知道就好……#n而且你們好像也是「這邊」的人……"
10050060-153 = "最重要的是……還帶著一大群孩子們到處走動……"
10050060-154 = "孩子們……？？"
10050060-155 = "啊，抱歉……我指的是那些書。"
10050060-156 = "這麼說來，憂同學是負責管理這間古書館的圖書委員會委員長對吧？"
10050060-157 = "聽說三一中央圖書館是奇普托斯最大規模的圖書館，收藏了世界上所有的書籍……"
10050060-158 = "能夠親眼見識這麼偉大的地方，真是我的榮幸。"
10050060-159 = "太好了，貴音。#n你一直想來這裡看看對吧？"
10050060-160 = "唔嗯……雖然那個傳聞有點誇大其詞……#n不過我們確實在盡可能地，努力保護更多的孩子……"
10050060-161 = "原來如此啊。#n看來「為了懲罰逾期還書的學生而燒掉整棟建築」果然也是誇大不實的謠言吧。"
10050060-162 = "不，那是事實。"
10050060-163 = "！？"
10050060-164 = "對於外面那些不懂得珍惜孩子們的人來說，那種程度已經足夠寬容了。"
10050060-165 = "總之，兩位的孩子……書我已經看過了。"
10050060-166 = "……製作得很不錯。我個人還挺喜歡的。"
10050060-167 = "咦？可是那……是漫畫書耶？"
10050060-168 = "……所以呢？漫畫書難道不是書嗎？"
10050060-170 = "而，而且根據三一學生們的反應，在尺度方面好像不是很妥當……？"
10050060-171 = "是嗎？唔嗯……在外面的人眼中，或許有些令人害羞的部分吧。"
10050060-172 = "雖然我覺得那也是平常不看書，才會缺乏抵抗力就是了……真受不了。"
10050060-173 = "……話說根據兩位剛才的對話，實現正義部在追捕你們是嗎？"
10050060-174 = "是，是的……說來慚愧。"
10050060-175 = "實現正義部不可能單憑自己的判斷……為了這點小事動員如此大規模的戰力……"
10050060-176 = "……"
10050060-177 = "……看來是茶會吧。"
10050060-178 = "咦，咦？這點剛才應該沒有提到吧……！？"
10050060-179 = "這個嘛，倒也不算太難猜吧……"
10050060-180 = "所以我才說上面那些人……根本不懂這些孩子的價值……嘖。"
10050060-181 = "總之，兩位就暫時待在這裡吧。我會提供兩位一些方便的。"
10050060-182 = "那，那樣會不會太給你添麻煩了……真的可以嗎？"
10050060-183 = "……我只是單純覺得，你們應該是「這邊」的人而已。#n希望兩位不要過度解讀……而且要是待太久的話，我也會有點困擾……"
10050060-184 = "哎呀，真是太感謝你了，憂同學。#n那我們就暫時打擾一下囉！"
10050060-185 = "還有一件事。"
10050060-186 = "嗯……？"
10050060-187 = "請跟我保持3m左右的距離，不然我會有壓力……"
10050060-189 = "咦……？"
10050060-190 = "假如沒辦法的話，我也只好請你們離開了……"
10050060-191 = "嗯……好吧。#n既然是這裡的規定也沒辦法了。"
10050060-192 = "倒也稱不是上規定……嚴格來說，其實是我個人的問題……"
10050060-193 = "嗯？你剛才說了什麼嗎，憂同學？"
10050060-194 = "……3m。"
10050060-195 = "好，好的……"
10050060-199 = "我們這樣下去真的沒問題嗎，部長……？"
10050060-200 = "冷靜想想確實不太行……"
10050060-201 = "不過事實上，我們現在就連嘗試其他手段的餘力都沒有。"
10050060-202 = "部長有想到什麼方案了嗎……？"
10050060-203 = "既然已經得到了許可……暫時就先躲在這裡，等風波平息之後再悄悄回赤冬去吧。"
10050060-207 = "別用那種眼神看我……我也知道這不是最好的辦法。"
10050060-208 = "不過人生在世，有時難免會遇到沒有其他選項的時候吧？"
10050060-209 = "我先到裡面休息一下，如果有什麼事再跟我說。"
10050060-213 = "雖然部長這麼說……"
10050060-214 = "嗚嗚，要是可以的話，我本來想為了更值得誇獎的事情聯絡老師的……"
10050060-220 = "[ns]「咦？這個號碼是……？」"
10050060-222 = "您，您好，老師。#n近來一切都安好嗎？"
10050060-223 = "之所以突然聯絡您，其實是因為……"
10050060-224 = "嗚嗚，究竟該從何說起好呢……"
10050060-225 = "[s]「沒關係，就先從你想到的開始說吧。」"
10050060-226 = "我明白了……#n那麼首先……我們在某些因緣際會之下，現在人正在三一……"
10050060-227 = "[s]「哦？我現在剛好也在三一耶？」"
10050060-228 = "咦！？老師您也在嗎！？！？"

10050060-53 = "3;트리니티 학생;04;공녀님! 그리고 그 시녀분! 여기에 계셨군요!\n#3;a\n#3;em;[!]"
10050060-54 = "4;야쿠모;02\n2;타카네;14;……! 네, 네에……. 평안, 하셨는지요.\n#3;hide"
10050060-55 = "4;야쿠모;04;……언제 시녀 취급이 된 건가요, 이거…….\n#fontsize;50"
10050060-56 = "3;트리니티 학생;04;평안하셨는지요. 두 분. 상황이 상황인지라, 다소 다급하게 말씀을 드려야 할 것 같아요. 무례를 용서해 주세요.\n#2;hide\n#4;hide"
10050060-57 = "5;타카네;04;괘, 괜찮, 답니다. 무슨 일이신가요?\n#3;m1\n#5;al\n#5;em;[?]"
10050060-58 = "3;트리니티 학생;05;네……. 결론부터 말씀드리자면, 지금 트리니티의 정의실현부 절반 정도가, 두 분을 찾고 있답니다."
10050060-59 = "5;타카네;17;……역시 그렇게 된 것이군요. 더불어 정의실현부 분들이 오늘따라 순찰을 강화하고 계신 것처럼 보이는 것도……."
10050060-60 = "3;트리니티 학생;06;네. 전부 그 연장선상에서 일어나는 일이죠. 그리고 그 때문인지…… 트리니티에 전반적으로, 공포 분위기가 약간 조성된 것 같아요……."
10050060-61 = "5;타카네;11;공포 분위기라니……! 저희, 때문이군요? 죄송합니다. 몸 둘 바를 모르겠네요…….\n#5;stiff\n#5;em;[땀]"
10050060-62 = "3;트리니티 학생;07;아뇨, 아니에요! 생각해 보니 공포까지는 아닌 것 같기도 하고……. 무엇보다 공녀님께서 잘못하신 것은 하나도 없어요!\n#3;m2"
10050060-63 = "3;트리니티 학생;04;……지금 교과서 외의 다른 책을, 모두 숨기려고 하고 있는 것은 사실이지만요……."
10050060-64 = "3;트리니티 학생;04;죄송해요. 공녀님. 이 이상…… 적극적으로 도와드리는 것은 어려울 것 같아요.\n#3;em;[속상함]"
10050060-65 = "5;타카네;07;아니어요. 지금까지 도와주신 것만으로도, 차고 넘칠 만큼 감사의 말씀을 드릴 수밖에 없을 것 같으니까요.\n#5;m4"
10050060-66 = "3;트리니티 학생;06;불쌍한 공녀님……. 트리니티까지 와서도 끝없이 고초를 겪으셔야 한다니……. 흑…….\n#3;stiff\n#3;em;[훌쩍]"
10050060-67 = "#all;hide"
10050060-68 = "3;야쿠모;04;저도 위로 좀 해 주셨으면 좋겠는데 말이에요…….\n#3;em;[한숨]"
10050060-69 = "1;트리니티 학생;08;아무튼, 이제부터는 정의실현부 부원들이 없는 곳으로 피하시는 게 좋을 것 같아요.\n#1;ar\n#3;m5"

[translation]
10050060-1 = "ตอนที่ 6;ที่ที่ไม่มีใครอยู่"
10050060-4 = "ทุกคนมากันครบหรือยังคะ?"
10050060-5 = "ค่ะ ค่ะ!"
10050060-6 = "อย่างที่ทุกคนรู้ว่าตอนนี้เราอยู่ระหว่างปฏิบัติภารกิจสืบหาและไล่ล่าหนังสือเถื่อนที่กำลังแพร่กระจาย#nอย่างลับๆ ทั่วทรินิตี้ค่ะ"
10050060-7 = "แต่ก็ต้องยอมรับว่าถึงจะผ่านไปหลายวันแล้ว การสืบหาก็ยังดำเนินไปได้ไม่ราบรื่นนัก"
10050060-8 = "ค่ะ..."
10050060-9 = "และเมื่อวานคุณนางิสะก็แสดงความกังวลเกี่ยวกับความคืบหน้าของภารกิจครั้งนี้มาด้วยค่ะ"
10050060-10 = "คะ... คุณนางิสะถึงกับกังวลเลยเหรอคะ?!"
10050060-11 = "ใช่ค่ะ... ถ้าเป็นเพราะความไม่ชำนาญของฉันเอง ฉันก็ยอมรับได้"
10050060-12 = "แต่ถ้านี่เป็นปัญหาเกี่ยวกับความตั้งใจของชมรมทวงความยุติธรรม ที่เป็นถึงผู้ที่ทำงานเพื่อความยุติธรรมเองละก็..."
10050060-13 = "แล้วที่ยิ่งไปกว่านั้น ถ้านี่เป็นปัญหาพื้นฐานของความยุติธรรมในทรีนิตี้เอง!"
10050060-15 = "พวกเราก็ยิ่งต้อง! พิสูจน์คุณค่าการมีอยู่ของตัวเองค่ะ!"
10050060-16 = "ขะ... เข้าใจแล้วค่ะ!"
10050060-17 = "ว่าแต่... ถ้างั้นพวกเราควรทำยังไงเหรอคะ?"
10050060-18 = "ฉันมีแผนการอยู่อย่างหนึ่งค่ะ "
10050060-19 = "อันที่จริง นี่เป็นแผนการแก้ปัญหาที่ใครๆ ก็คิดได้ แต่ในสถานการณ์ปัจจุบัน ฉันว่าเราน่าจะหาวิธีแก้ปัญหาที่ดีกว่านี้ได้ยากค่ะ"
10050060-20 = "มีคำกล่าวว่า ยิ่งสถานการณ์ยากลำบากเท่าไร ยิ่งต้องกลับมาทบทวน 'วิธีที่ถูกต้อง' มากกว่าการใช้ 'วิธีลัด' ค่ะ เพราะงั้น ตั้งแต่นี้ไป..."
10050060-21 = "ชมรมทวงความยุติธรรมจะวางระบบตรวจหาให้ครอบคลุมทุกพื้นที่ในทรีนิตี้ค่ะ!"
10050060-22 = "ตั้งแต่ตอนนี้เลยเหรอคะ...?"
10050060-23 = "ใช่ค่ะ ตั้งแต่วินาทีนี้เลยค่ะ! ฉันรู้ดีค่ะว่านี่คือคำขอที่กะทันหัน แต่ฉันก็อยากให้ทุกคนช่วยพยายามกัน#nมากกว่านี้อีกหน่อยค่ะ"
10050060-24 = "ฉันจะเป็นผู้นำและจะลงไปสืบสวนที่หน้างานก่อนเลยค่ะ!"
10050060-28 = "ปะ... ไปด้วยกันสิคะ คุณมาชิโระ~!"
10050060-44 = "วันนี้ขายหนังสือไม่ได้สักเล่มเลยนะคะ..."
10050060-45 = "แค่หาที่ตั้งหน้าร้านใหม่ยังไม่ได้เลยค่ะ..."
10050060-46 = "ชมรมทวงความยุติธรรมหรือเปล่านะคะ? พวกนักเรียนที่ใส่ชุดนักเรียนสีดำน่ะ ทำไมวันนี้ถึงออกมาเดินให้เห็นบ่อยอย่างนี้ล่ะคะ?"
10050060-47 = "อืม... เซ็นเซอร์วัดความเสี่ยงของหัวหน้าชมรมสื่อสิ่งพิมพ์ที่เป็นหนึ่งในพลังขับเคลื่อนให้เราอยู่รอดมา#nได้ในเรดวินเทอร์กำลังทำงานอย่างหนักเลยค่ะ"
10050060-48 = "ระ... หรือว่าพวกเราโดนจับได้แล้วคะ?!"
10050060-53 = "ท่านหญิง! แล้วก็หญิงรับใช้ด้วยค่ะ! อยู่กันตรงนี้สินะคะ!"
10050060-54 = "ค่ะ... ค่ะ... สุขสบาย... ดีหรือเปล่าคะ...?"
10050060-55 = "ฉันได้เป็นหญิงรับใช้ตั้งแต่เมื่อไรคะเนี่ย..."
10050060-56 = "ทั้งสองคนเป็นยังไงกันบ้างคะ? จากสถานการณ์ที่เกิดขึ้น ฉันคิดว่าต้องรีบมาพูดคุยกับพวกคุณน่ะค่ะ ต้องขอโทษที่เสียมารยาทนะคะ"
10050060-57 = "มะ... ไม่เป็นไร... เลยค่ะ มีเรื่องอะไรเหรอคะ?"
10050060-58 = "ค่ะ... ถ้าจะเข้าประเด็นเลยก็คือ ตอนนี้กว่าครึ่งหนึ่งของชมรมทวงความยุติธรรมกำลังไล่ล่าพวกคุณกัน#nอยู่น่ะค่ะ"
10050060-59 = "เพราะอย่างนี้นี่เองสินะคะ... วันนี้คนจากชมรมทวงความยุติธรรมก็เลยมาเดินลาดตระเวนกันบ่อยกว่า#nทุกวันเลย..."
10050060-60 = "ใช่ค่ะ นั่นเป็นสิ่งที่เกิดขึ้นจากการเพิ่มระดับความเข้มข้นในการสืบหาค่ะ และบางทีอาจเป็นเพราะ#nเหตุนั้น... บรรยากาศโดยรวมของทรินิตี้ตอนนี้ก็เลยค่อนข้างน่าหวาดกลัวค่ะ..."
10050060-61 = "น่าหวาดกลัวเลยเหรอคะ...! เป็นเพราะพวกฉันสินะ? ต้องขอโทษด้วยนะคะ ฉันไม่รู้จะขอโทษยังไงเลยค่ะ..."
10050060-62 = "ไม่ค่ะ ไม่หรอกค่ะ! พอมาคิดดูอีกที ก็ไม่ถึงกับน่าหวาดกลัวหรอก... แต่ที่สำคัญกว่านั้นก็คือ ท่านหญิงไม่ได้ทำผิดอะไรเลยค่ะ!"
10050060-63 = "ถึงตอนนี้พวกฉันจะพยายามซ่อนหนังสืออื่นทั้งหมดที่ไม่ใช่หนังสือเรียนกันก็เถอะค่ะ..."
10050060-64 = "ขอโทษนะคะ ท่านหญิง พวกฉัน... น่าจะช่วยเหลืออะไรมากกว่านี้ไม่ได้แล้วค่ะ"
10050060-65 = "ไม่เป็นไรเลยค่ะ พวกฉันต่างหากล่ะคะที่ต้องขอบคุณสำหรับความช่วยเหลือที่พวกคุณมอบให้มา#nโดยตลอด จะขอบคุณเท่าไรก็คงไม่พอค่ะ"
10050060-66 = "ท่านหญิงผู้น่าสงสาร... อุตส่าห์เดินทางมาถึงทรีนิตี้ แต่ก็ยังมาเจอความยากลำบากไม่รู้จบอีก... ฮือ..."
10050060-68 = "แล้วไม่สงสารฉันบ้างเหรอคะ..."
10050060-69 = "เอาเถอะค่ะ ฉันว่าตอนนี้พวกคุณหลบไปอยู่ในที่ที่ไม่มีสมาชิกชมรมทวงความยุติธรรมก่อนดีกว่าค่ะ"
10050060-70 = "ที่แบบนั้นอยู่ตรงไหนเหรอคะ?"
10050060-71 = "ขอโทษด้วยค่ะ... พวกฉันก็ไม่รู้เหมือนกันค่ะ"
10050060-72 = "แต่ในเมื่อท่านหญิงเป็นคนนอก ก็น่าจะพอรู้จักสถานที่ที่ปลอดภัยตามมุมมองของคนนอกนี่คะ?"
10050060-73 = "ยังไงก็รักษาตัวด้วยนะคะ ท่านหญิง หวังว่าในครั้งต่อไปที่มาเยือนทรินิตี้ พวกคุณจะได้สร้างความทรงจำที่แสนวิเศษอย่างสบายใจมากขึ้นนะคะ"
10050060-74 = "ไม่ต้องห่วงหรอกค่ะ พวกเรามีความทรงจำที่แสนวิเศษมากพอแล้วค่ะ ยังไงก็ขอขอบคุณอีกครั้งนะคะ"
10050060-75 = "ด้วยความยินดีค่ะ!"
10050060-80 = "ต้องมีอะไรผิดพลาดตรงไหน..."
10050060-81 = "หรือว่ามันผิดพลาดตั้งแต่เริ่มแรกแล้วคะ... หัวหน้า?!"
10050060-82 = "อันที่จริง... ฉันก็ไม่รู้เหมือนกันค่ะ... แต่ถึงยังไง สิ่งสำคัญคือการไปให้สุดทางไม่ใช่เหรอคะ?!"
10050060-83 = "แต่ในบางเวลาและบางสถานการณ์ การไปให้สุดทางก็อาจไม่ใช่วิธีที่ดีที่สุดก็ได้ค่ะ..."
10050060-84 = "เอาเถอะ! ไปหาที่ที่ไม่มีสมาชิกชมรมทวงความยุติธรรมอย่างที่นักเรียนคนนั้นแนะนำกันก่อนดีกว่าค่ะ"
10050060-94 = "จะได้ซ่อนตัวกันก่อนด้วย..."
10050060-95 = "อึก... เวลานี้ถ้ามีคุณครูอยู่ด้วยก็ดีสิคะ..."
10050060-99 = "หัวหน้า ฉันว่าตรงนั้นน่าจะปลอดภัยนะคะ...?"
10050060-100 = "นั่นสิคะ ที่นั่นน่าจะมีสมาชิกชมรมทวงความยุติธรรมอยู่แค่ไม่กี่คนด้วย"
10050060-101 = "อย่าว่าแต่สมาชิกชมรมทวงความยุติธรรมเลยค่ะ ฉันรู้สึกเหมือนไม่มีนักเรียนเลยแม้แต่คนเดียวค่ะ..."
10050060-102 = "แบบนั้นก็ยิ่งดีเลยนี่คะ?"
10050060-112 = "ที่นี่คือ... ห้องสมุดหรือเปล่านะ? ดูให้ความรู้สึกว่าใช่อยู่นะคะ?"
10050060-117 = "แต่ก็ให้ความรู้สึกที่แตกต่างจากห้องสมุดทั่วไปอยู่นะคะ...?"
10050060-118 = "หนังสือที่เก็บไว้ก็ค่อนข้างเก่า แต่สภาพการจัดเก็บถือว่าดีทีเดียวค่ะ"
10050060-119 = "ถ้างั้นก็แปลว่ามีผู้ดูแลที่เชี่ยวชาญมากๆ อยู่..."
10050060-123 = "เอ๋...?"
10050060-131 = "ทาคาเนะ? มีเรื่องอะไรเหรอคะ?"
10050060-138 = "ว้ากกกกก?!"
10050060-139 = "เงียบเสียงหน่อย นี่ห้องสมุดนะ"
10050060-145 = "เฮ้อ...  พวกคนนอกอีกแล้ว... ชิ"
10050060-146 = "หืม...? แต่คนพวกนี้ดูไม่เหมือนนักเรียนทรีนิตี้เลยแฮะ...?"
10050060-147 = "แล้วก็เหมือนจะหอบอะไรที่เหมือนหนังสือมากันด้วย..."
10050060-149 = "เอ่อ คือว่า... ถึงฉันจะไม่รู้รายละเอียด และไม่ได้อยากจะเข้าใจเป็นพิเศษ..."
10050060-150 = "แต่พวกคุณคือผู้เกี่ยวข้องกับการพิมพ์และการจัดจำหน่ายใช่มั้ยคะ...?"
10050060-151 = "ค่ะ ค่ะ... ใช่แล้วค่ะ คุณโคเซกิ อุย ขออภัยที่ทำให้เกิดความวุ่นวายนะคะ"
10050060-152 = "เปล่าหรอกค่ะ... พวกคุณก็เหมือนจะรู้เรื่องแบบนั้นดี... และก็ยังดูเหมือนเป็นคน 'สายนี้' อยู่แล้ว..."
10050060-153 = "เหนือสิ่งอื่นใด... พวกคุณก็อุ้มเด็กๆ กันมาตั้งเยอะเลยด้วย..."
10050060-154 = "อุ้มเด็กๆ...??"
10050060-155 = "อ่า ขอโทษที... ฉันหมายถึง... หนังสือน่ะค่ะ"
10050060-156 = "จะว่าไป คุณอุยคือหัวหน้าชมรมอ่านหนังสือที่ดูแลห้องสมุดเก่าแห่งนี้ใช่มั้ยคะ?"
10050060-157 = "ได้ยินว่าห้องสมุดกลางของทรีนิตี้เป็นห้องสมุดที่ใหญ่ที่สุดในคิโวทอส และมีหนังสือทุกเล่มจากทุกมุมโลกเลย"
10050060-158 = "เป็นเกียรติจังเลยนะคะที่ได้มาเห็นที่แบบนี้ด้วยตัวเอง"
10050060-159 = "ดีเลยนะคะ ทาคาเนะ อยากมาที่นี่มาตลอดเลยไม่ใช่เหรอคะ?"
10050060-160 = "อ่า... อืม... ข่าวลือนั้นอาจจะเกินจริงไปหน่อย... แต่ก็เป็นความจริงที่พวกเราพยายามปกป้องเด็กๆ ให้ได้มากที่สุดเท่าที่จะทำได้ค่ะ..."
10050060-161 = "อ้อ อย่างนั้นสินะคะ ถ้างั้นที่บอกว่าชมรมนี้พยายามจะลงโทษนักเรียนที่เอาหนังสือมาคืนล่าช้า#nจนเผาอาคารไปหลังหนึ่ง ก็คงเป็นข่าวลือที่เกินจริงด้วยสินะคะ"
10050060-162 = "ไม่หรอกค่ะ นั่นเป็นเรื่องจริงค่ะ"
10050060-163 = "?!"
10050060-164 = "สำหรับคนนอกที่ไม่เห็นคุณค่าของหนังสือ นั่นถือเป็นการลงโทษที่เมตตาแล้วค่ะ"
10050060-165 = "แต่ยังไงก็เถอะค่ะ ฉันได้อ่านเด็กๆ... หมายถึง อ่านหนังสือของพวกคุณทั้งสองคนหมดแล้วค่ะ"
10050060-166 = "โดยส่วนตัวแล้ว ฉันชอบและคิดว่าทำออกมาได้ดีเลยค่ะ..."
10050060-167 = "คะ? ตะ... แต่นี่แค่หนังสือการ์ตูนเองนะคะ...?"
10050060-168 = "แล้วยังไงเหรอคะ...? หนังสือการ์ตูนไม่ใช่หนังสือเหรอคะ?"
10050060-170 = "ตะ... แต่จากท่าทีของนักเรียนทรีนิตี้แล้ว เห็นว่ามีเนื้อหาบางส่วนที่ดูสุ่มเสี่ยงเลยนะคะ...?"
10050060-171 = "งั้นเหรอคะ? ก็นะ... สำหรับคนนอกแล้ว จะบอกว่ามีส่วนที่น่าขัดเขินอยู่บ้างก็ถูกค่ะ"
10050060-172 = "แต่นั่นก็คงเป็นผลมาจากการไม่ค่อยอ่านหนังสือในชีวิตประจำวันน่ะค่ะ คนพวกนี้ละก็นะ"
10050060-173 = "จะว่าไป เมื่อกี้บอกว่าชมรมทวงความยุติธรรมกำลังไล่ล่าพวกคุณสองคนอยู่งั้นเหรอคะ?"
10050060-174 = "ใช่แล้วค่ะ... น่าขายหน้าจังเลยค่ะ..."
10050060-175 = "ลำพังชมรมทวงความยุติธรรม... ไม่น่าจะทุ่มอำนาจมากมายให้เรื่องเล็กน้อยแบบนี้นะ..."
10050060-176 = "..."
10050060-177 = "เพราะสภาน้ำชาสินะคะ..."
10050060-178 = "เอะ... เอ๋? แต่พวกฉันยังไม่ได้เล่าถึงขนาดนั้นเลยนะ...?!"
10050060-179 = "แค่นี้ฉันเดาได้อยู่แล้วค่ะ..."
10050060-180 = "เป็นถึงคนตำแหน่งใหญ่โต... แต่ไม่รู้ว่าเด็กๆ พวกนี้มีคุณค่าอะไรบ้าง... ชิ"
10050060-181 = "เอาเป็นว่าพวกคุณมาหลบอยู่ที่นี่สักระยะก่อนแล้วกันค่ะ ฉันจะอำนวยความสะดวกให้เอง"
10050060-182 = "หะ... ให้พวกฉันมารบกวนแบบนั้น... ได้เหรอคะ?"
10050060-183 = "ฉันพูดแบบนั้นเพราะพวกคุณดูจะเป็นบุคลากรใน 'สายนี้' น่ะค่ะ ไม่ต้องตีความให้มากเกินหรอกค่ะ... แล้วก็ถ้าอยู่นานเกินไป แน่นอนว่าก็อาจจะลำบากนิดหน่อยด้วย..."
10050060-184 = "ตายจริง ขอบคุณมากเลยนะคะ คุณอุย ถ้างั้นพวกฉันขอติดหนี้บุญคุณสักระยะนะคะ!"
10050060-185 = "แล้วก็อีกอย่างค่ะ"
10050060-186 = "คะ... คะ?"
10050060-187 = "ช่วยเว้นระยะห่างกับฉันประมาณ 3 เมตรนะคะ..."
10050060-189 = "คะ...?"
10050060-190 = "ถ้าไม่อย่างนั้นก็คงต้องขอให้ออกจากที่นี่ไปค่ะ..."
10050060-191 = "อืม... ค่ะ ในเมื่อเป็นกฎของที่นี่ งั้นพวกฉันก็ต้องเคารพค่ะ"
10050060-192 = "ไม่ใช่กฎหรอกค่ะ ถะ... ถ้าพูดให้ถูก มันคือปัญหาของฉันเองมากกว่า..."
10050060-193 = "คะ? เมื่อกี้ว่ายังไงนะคะ คุณอุย?"
10050060-194 = "3 เมตรค่ะ..."
10050060-195 = "ค่ะ... ได้ค่ะ..."
10050060-199 = "พวกเราจะอยู่อย่างนี้กันได้เหรอคะ หัวหน้า...?"
10050060-200 = "ถ้ามองอย่างเป็นกลาง... จะให้เป็นแบบนี้ต่อไปไม่ได้หรอกค่ะ"
10050060-201 = "แต่ก็ต้องยอมรับด้วยว่าตอนนี้เรายังไม่พร้อมที่จะลงมือทำอะไรค่ะ"
10050060-202 = "มีแผนการอะไรที่คิดไว้บ้างหรือเปล่าคะ...?"
10050060-203 = "ก่อนอื่นเลย ในเมื่อเราได้รับอนุญาตให้อยู่ที่นี่แล้ว... งั้นเราก็ซ่อนตัวกันในนี้ก่อน แล้วถ้าเรื่องสงบลงก็ค่อยหาวิธีกลับไปยังเรดวินเทอร์อย่างเงียบๆ กันเถอะค่ะ"
10050060-207 = "อย่ามองกันด้วยสายตาแบบนั้นสิคะ... ฉันก็รู้ว่านี่อาจจะไม่ใช่วิธีที่ดีที่สุด"
10050060-208 = "แต่ในชีวิตเรา บางครั้งก็ต้องเลือกทางเลือกเดียวที่เรามีไม่ใช่เหรอคะ?"
10050060-209 = "ฉันจะเข้าไปพักผ่อนข้างในสักหน่อยค่ะ ถ้ามีเรื่องอะไรเกิดขึ้น ก็มาบอกฉันนะคะ"
10050060-213 = "ถึงหัวหน้าจะพูดอย่างนั้นก็เถอะ..."
10050060-214 = "ฮึ่ย... แทนที่จะติดต่อไปแจ้งปัญหา ฉันอยากติดต่อไปแจ้งข่าวที่น่ายินดีมากกว่านะ..."
10050060-220 = "[ns] \"หืม? เบอร์นี้มัน...?\""
10050060-222 = "สะ... สวัสดีค่ะ คุณครู สุขสบายดีหรือเปล่าคะ?"
10050060-223 = "ที่ฉันติดต่อมากะทันหันแบบนี้ก็เพราะเรื่อง..."
10050060-224 = "อึก... ฉันควรเริ่มเล่าตั้งแต่ตรงไหนดีนะ..."
10050060-225 = "[s] \"ไม่เป็นไร คิดอะไรออกก็เล่ามาได้เลย\""
10050060-226 = "เข้าใจแล้วค่ะ... อย่างแรกเลยนะคะ ตอนนี้พวกฉันมาอยู่ที่ทรีนิตี้ค่ะ..."
10050060-227 = "[s] \"หืม? ตอนนี้ครูก็อยู่ทรีนิตี้เหมือนกัน\""
10050060-228 = "คะ?! คุณครูก็ด้วยเหรอคะ?!?!"

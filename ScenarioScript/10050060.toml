[translation]
10050060-1 = "Episode 6;An Empty Place"
10050060-4 = "Is everyone here?"
10050060-5 = "Y-Yes!"
10050060-6 = "Good. As you all know, our job is to track down and investigate the contraband books that have been spreading across Trinity."
10050060-7 = "However, it's several days into our investigation, and we've made almost no progress!"
10050060-8 = "Yes..."
10050060-9 = "Just yesterday, Nagisa expressed serious concern over this mission's status."
10050060-10 = "N-Nagisa herself?!"
10050060-11 = "That's right... I'll bow my head and apologize a million times for my own incompetence."
10050060-12 = "But, if the problems lie with the Justice Task Force's resolve to achieve justice..."
10050060-13 = "...then this is a threat to the safety and integrity of Trinity itself!"
10050060-15 = "Therefore! We must! Prove our worthiness!"
10050060-16 = "U-Understood!"
10050060-17 = "But...what do we do?"
10050060-18 = "I have a plan. "
10050060-19 = "It's a straightforward one that anyone could think of, but sometimes I believe the simplest option is the best one."
10050060-20 = "The only thing that matters is that we bring down the hammer of justice!"
10050060-21 = "Therefore, we're going to dedicate every last resource the Task Force has to monitoring every single corner of the Trinity campus! No, the district!"
10050060-22 = "Starting when...?"
10050060-23 = "Starting now! I know I'm asking a lot of all of you, but please continue to uphold justice."
10050060-24 = "I promise that I'll work the hardest of us all!"
10050060-28 = "W-Wait for us, Mashiro!"
10050060-44 = "...We didn't sell a single book today..."
10050060-45 = "More like, we COULDN'T."
10050060-46 = "The Justice Task Force, was it? The students in black uniforms. Why are they everywhere today?"
10050060-47 = "My danger senses, which I attribute much of my survival in Red Winter to, are sounding off right now."
10050060-48 = "C-Could they have discovered us?"
10050060-53 = "Princess! And her maid! There you are!"
10050060-54 = "...! Y-Yes, hello! Have you been well?"
10050060-55 = "A maid? Eh, I guess I'll take it."
10050060-56 = "Yes, thank you. Please forgive my rudeness, but we have no time to chitchat. The situation is dire."
10050060-57 = "I-It's fine. What's going on?"
10050060-58 = "Cutting right to the chase, around half of the Justice Task Force is out looking for you."
10050060-59 = "Ah. So the reason there's an increase in those black shirts today is..."
10050060-60 = "Yes. It's all in that same vein. And perhaps for that reason...there seems to be a sense of terror spreading across Trinity..."
10050060-61 = "A sense of terror...! Due to our actions? I don't know how we could ever apologize..."
10050060-62 = "No, that's not what I meant! Maybe terror wasn't the right word... It's not your fault, Princess!"
10050060-63 = "...It's just, all the students are being forced to hide any book that isn't a textbook right now."
10050060-64 = "I'm sorry, Princess. I don't think...we can actively help you anymore."
10050060-65 = "No. Your assistance up until now has garnered my eternal gratitude."
10050060-66 = "Poor Princess... Her hardship never ends even after coming all the way to Trinity... *sob*"
10050060-68 = "Hey, I'm here too, you know."
10050060-69 = "You'll need to find someplace to hide. Somewhere the Justice Task Force members won't think to look."
10050060-70 = "You don't have any suggestions, do you?"
10050060-71 = "My apologies... Their eyes are everywhere, so even we don't know."
10050060-72 = "But perhaps as outsiders, you'll be able to identify cracks in their armor that we can't."
10050060-73 = "Please, take care of yourself, Princess. I hope that one day we can treat you to a better time here at Trinity."
10050060-74 = "You mustn't think that way. I'm already grateful for the wonderful memories I've made with you all."
10050060-75 = "Think nothing of it!"
10050060-80 = "...Where did it all go wrong...?"
10050060-81 = "I would take a gander and say from the very beginning. Is what we're doing here wrong, President?"
10050060-82 = "For once, I don't have any answers for you. What I do know, though, is it's always important to see things through until the end."
10050060-83 = "Depending on the time and place, perhaps that's not always too important."
10050060-84 = "Ahem! Anyway! Let's see, somewhere the Task Force members wouldn't go..."
10050060-94 = "We need to get somewhere a little less conspicuous..."
10050060-95 = "Uwah... If only Sensei were here..."
10050060-99 = "President. Over there. It appears to be less populated than other areas."
10050060-100 = "You're right. There are fewer Justice Task Force members, at least."
10050060-101 = "It actually appears to be rather deserted in general."
10050060-102 = "Now, this is much better."
10050060-112 = "Is this...a library? Looks like it."
10050060-117 = "Although it's not quite how I would envision a modern library."
10050060-118 = "The books are old but well-maintained. Very much so."
10050060-119 = "That would indicate that there's a manager of some sort."
10050060-123 = "Ah...?"
10050060-131 = "Takane? Is something wrong?"
10050060-138 = "Arrrgh!"
10050060-139 = "Quiet in the library."
10050060-145 = "*sigh*...Outsiders again... Tsk."
10050060-146 = "Hm?? Not Trinity students, though."
10050060-147 = "And they brought a lot of books with them..."
10050060-149 = "So. I don't know the details, and I don't particularly want to know..."
10050060-150 = "But you're involved in publishing and distribution...?"
10050060-151 = "Yes, yes. That's right, Miss Kozeki Ui. I apologize for the ruckus."
10050060-152 = "Ah, well. You seem to be one of us, and you understand your faults..."
10050060-153 = "And you have so many kids with you..."
10050060-154 = "Kids...??"
10050060-155 = "Ah, sorry. Books. You have a lot of books."
10050060-156 = "Come to think of it, you're the president of the Library Committee who takes care of this old library, Ui?"
10050060-157 = "I heard the Central Library of Trinity is the largest library in Kivotos, and it contains every book that exists in the world."
10050060-158 = "I'm honored to witness such a place in the flesh."
10050060-159 = "Right. You wanted to come here, right, Takane?"
10050060-160 = "Oh. Um. The rumors are slightly exaggerated...but we do try to protect as many children as we can..."
10050060-161 = "Aha. Makes sense. There are some crazy rumors flying around, you know. There's one that you once burned down an entire building to punish students with overdue books."
10050060-162 = "That one's true."
10050060-163 = "?!"
10050060-164 = "All things considered, I was merciful. Those outsiders had no respect for the sanctity of literature."
10050060-165 = "Anyways, your children... I liked them."
10050060-166 = "They were well-made. I liked them."
10050060-167 = "B-But this is just manga, isn't it?"
10050060-168 = "...? Didn't I use my eyes to read it? Why wouldn't it be a book?"
10050060-170 = "A-And according to the reactions of Trinity students, there seem to be some problems with how risqué it is...?"
10050060-171 = "Is that so? Well... I suppose when outsiders look at it, some parts could be seen that way."
10050060-172 = "It's because none of them actually read. Otherwise, it wouldn't be such a culture shock for them."
10050060-173 = "...Anyway, from what you were saying earlier. The Justice Task Force is actively pursuing you two?"
10050060-174 = "Yes. Unfortunately..."
10050060-175 = "The Justice Task Force would never put this much manpower into a trivial thing like this of their own accord."
10050060-176 = "..."
10050060-177 = "...It must be the Tea Party."
10050060-178 = "H-Huh? I didn't even mention them!"
10050060-179 = "It's obvious..."
10050060-180 = "Those stuffy executives... They never understood the true value of literature."
10050060-181 = "Fine. You can stay here. I'll accommodate. To an extent."
10050060-182 = "Y-You wouldn't find our presence distracting?"
10050060-183 = "...Only because you're one of us. Don't look into it too much. And don't overstay your welcome."
10050060-184 = "Wow, thank you, Ui. Then we'll just catch our breath and regroup here for a moment."
10050060-185 = "And one more thing."
10050060-186 = "H-Huh?"
10050060-187 = "You're too close. Get back. Three meters, at least."
10050060-189 = "B-But, we're not...?"
10050060-190 = "I'll evict you."
10050060-191 = "...Got it. Three meters. We can follow the rules."
10050060-192 = "It's not a strict library rule. More of a personal one..."
10050060-193 = "Huh? What did you say, Ui?"
10050060-194 = "...Three meters."
10050060-195 = "Y-Yes..."
10050060-199 = "Is this really fine, President...?"
10050060-200 = "Well, we can't stay here forever."
10050060-201 = "But we have very little going for us in terms of options, at the moment."
10050060-202 = "What should we do?"
10050060-203 = "Since Ui will tolerate us here for a little longer, we'll wait here until things quiet down outside. Meanwhile, we'll formulate a plan to escape and return to Red Winter."
10050060-207 = "Gah, you're giving me that look again. I know this situation isn't ideal."
10050060-208 = "But in life, sometimes you just have to follow the yellow brick road, Takane."
10050060-209 = "...I will rest for a moment inside. Please alert me if anything changes."
10050060-213 = "I know what the president said, however."
10050060-214 = "Boo. Here, I had hoped to contact them for something more spectacular and praiseworthy..."
10050060-220 = "[ns] \"Huh? This number...\""
10050060-222 = "Ah, hello, Sensei. How have you been?"
10050060-223 = "The reason for reaching out so suddenly is..."
10050060-224 = "Ugh, where should I even start...?"
10050060-225 = "[s] \"It's all right. The beginning is usually a good place.\""
10050060-226 = "All right... To begin, we're currently at Trinity General School..."
10050060-227 = "[s] \"Huh? I'm here too!\""
10050060-228 = "Huh?! You too?!?!"

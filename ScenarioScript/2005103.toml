[translation]
2005103-1 = "真有精神呢，澪紗"
2005103-2 = "老師！！我在這邊！！"
2005103-3 = "[s]「你好呀，澪紗！」"
2005103-4 = "呵呵，今天的天氣正適合巡邏呢！"
2005103-5 = "不過老師，那個大背包是……"
2005103-6 = "[s1]「這是收集證物用的袋子！」\n[s2]「在裝滿之前都要繼續巡邏！」"
2005103-9 = "老師果然最棒了！！！"
2005103-10 = "那麼，開始巡邏吧！！！"
2005103-13 = "這是《魔法liber》的壓克力吊飾！！"
2005103-14 = "是第3季第11集出現的便服版本呢！！"
2005103-15 = "老師！"
2005103-16 = "[s]「嗯！看來得把所有種類都收集齊全才行！」"
2005103-17 = "我完全同意！"
2005103-19 = "這次是資料夾！"
2005103-20 = "[s]「讀書的時候會用到，真是購買的絕佳選擇！」"
2005103-21 = "唔嘿嘿～！"
2005103-22 = "不好意思～"
2005103-28 = "請問可以一起拍張照嗎？"
2005103-29 = "咦！？"
2005103-30 = "因為服裝實在太適合你了，如果不介意的話……"
2005103-31 = "啊，唔……唔呃……"
2005103-35 = "！？"
2005103-36 = "[s]「麻煩請稍等一下，哈哈……」"
2005103-38 = "嗚嗚……"
2005103-39 = "[s]「澪紗，沒事吧？」"
2005103-40 = "嘿嘿……我沒事，老師。"
2005103-41 = "其實拍照本身倒是沒問題……"
2005103-42 = "只是我擔心自己的表情或動作會很僵硬……"
2005103-43 = "所以在體育課的時候，也會害怕別人覺得我很奇怪……"
2005103-44 = "嗚嗚，不過剛才是不是應該好好跟那個人說明一下呢……"
2005103-45 = "[s3]「你現在可是魔法少女哦，澪紗。」\n[s4]「澪紗做的動作，就是魔法少女的姿勢！」"
2005103-48 = "……！"
2005103-49 = "說的也是。#n魔法少女和正義的自衛隊，就該永遠保持堂堂正正的姿態！"
2005103-50 = "老師真是太厲害了！"
2005103-51 = "[s]「那麼，再次出動！」"
2005103-52 = "是──！！！"
2005103-62 = "老師，請看那邊。"
2005103-63 = "夕陽真美呢。"
2005103-64 = "[s]「是啊，真的很美。」"
2005103-65 = "其實今天的巡邏，只是想跟老師一起逛逛的藉口而已……"
2005103-66 = "老師願意相信並陪我過來，真的讓我感到很開心。"
2005103-67 = "謝謝老師總是陪我一起玩！！"
2005103-68 = "[s5]「自衛隊的王牌守護了和平！」\n[s6]「還把笑容送給了大家！」"
2005103-71 = "耶嘿嘿！老師也是把笑容送給大家的，夏萊的超級巨星哦！"
2005103-72 = "[s]「好，我們趕緊回夏萊分析證物吧！」"
2005103-73 = "是！！！"
2005103-75 = "（之後和澪紗一起回到了夏萊）"
2005103-76 = "（逐一看著周邊，沉浸在剛才的回憶之中）"

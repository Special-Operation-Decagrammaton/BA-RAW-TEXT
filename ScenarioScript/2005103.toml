[translation]
2005103-1 = "เข้มแข็งไว้ เรอิสะ"
2005103-2 = "คุณครู!! ทางนี้ค่ะ!!"
2005103-3 = "[s] \"สวัสดี เรอิสะ!\""
2005103-4 = "ฮุฮุ วันนี้อากาศดี เหมาะกับการเดินลาดตระเวนเลยนะคะ!"
2005103-5 = "ว่าแต่ คุณครูคะ... กระเป๋าเป้ใบใหญ่นั่นมัน..."
2005103-6 = "[s1] \"กระเป๋าสำหรับใส่หลักฐานไง!\"\n[s2] \"เราจะลาดตระเวนแล้วเก็บหลักฐานให้เต็มกระเป๋าเลย!\""
2005103-9 = "คุณครูนี่สุดยอดไปเลยค่ะ!!!"
2005103-10 = "งั้นเรามาเริ่มลาดตระเวนกันเลยค่ะ!!!"
2005103-13 = "นี่คือพวงกุญแจอะคริลิก <สาวน้อยเวทมนตร์> ค่ะ!!"
2005103-14 = "เป็นเวอร์ชันชุดลำลองที่อยู่ในภาค 3 ตอนที่ 11 สินะคะ!!"
2005103-15 = "คุณครู!"
2005103-16 = "[s] \"อื้อ! สงสัยต้องซื้อไปอย่างละอันแล้วละ!\""
2005103-17 = "เห็นด้วยอย่างยิ่งเลยค่ะ!"
2005103-19 = "ส่วนนี่คือแฟ้มใส่เอกสารค่ะ!"
2005103-20 = "[s] \"จำเป็นต่อการเรียนด้วย งั้นก็ยิ่งต้องซื้อเลย!\""
2005103-21 = "อุฮุฮุ!"
2005103-22 = "ขอโทษนะคะ~"
2005103-28 = "ขอถ่ายรูปด้วยสักรูปได้มั้ยคะ?"
2005103-29 = "คะ?!"
2005103-30 = "ชุดของคุณสวยมากเลยค่ะ ถ้าไม่ว่าอะไรละก็..."
2005103-31 = "อะ... อึก... อึกก..."
2005103-35 = "?!"
2005103-36 = "[s] \"ช่วยรอเดี๋ยวหนึ่งนะ แหะๆ...\""
2005103-38 = "อึกก..."
2005103-39 = "[s] \"เป็นอะไรหรือเปล่า เรอิสะ?\""
2005103-40 = "แหะๆ... ไม่เป็นไรแล้วค่ะ คุณครู"
2005103-41 = "ที่จริงฉันก็โอเคกับการถ่ายรูปด้วยกันนะคะ..."
2005103-42 = "แต่ฉันกังวลว่าตัวเองจะทำสีหน้าหรือท่าทางไม่เป็นธรรมชาติน่ะค่ะ"
2005103-43 = "ในคาบพลศึกษาฉันก็กลัวเหมือนกันค่ะ กลัวว่าคนอื่นจะคิดว่าฉันแปลกหรือเปล่า..."
2005103-44 = "อึก... ฉันน่าจะอธิบายกับคุณคนเมื่อกี้ตั้งแต่แรกนะคะ"
2005103-45 = "[s3] \"เรอิสะเป็นสาวน้อยเวทมนตร์นะ!\"\n[s4] \"ท่าโพสของเรอิสะคือท่าของสาวน้อยเวทมนตร์อยู่แล้ว!\""
2005103-48 = "...!"
2005103-49 = "นั่นสินะคะ สาวน้อยเวทมนตร์กับกลุ่มรักษาความสงบต้องเข้มแข็งไว้ตลอดสิ!"
2005103-50 = "คุณครูยอดเยี่ยมจังเลยนะคะ!"
2005103-51 = "[s] \"งั้นก็ไปปรากฏตัวกันเถอะ!\""
2005103-52 = "ค่ะ!!!"
2005103-62 = "คุณครู ดูตรงโน้นสิคะ"
2005103-63 = "พระอาทิตย์ตกสวยมากเลยค่ะ"
2005103-64 = "[s] \"อ่า... จริงด้วยสินะ\""
2005103-65 = "ที่จริงวันนี้ฉันหาข้ออ้างมาเดินดูของมากกว่าจะลาดตระเวน"
2005103-66 = "แต่ฉันดีใจนะคะ ที่คุณครูเชื่อฉันและก็มาด้วยกัน"
2005103-67 = "ขอบคุณที่มาเที่ยวเล่นกับฉันทุกครั้งเลยนะคะ!!"
2005103-68 = "[s5] \"ก็เอซของกลุ่มรักษาความสงบทำงานหนักแล้วนี่นา!\"\n[s6] \"ก็เรอิสะมอบรอยยิ้มเป็นของขวัญให้ทุกคนแล้วไง!\""
2005103-71 = "อุฮุฮุ คุณครูก็เป็นซูเปอร์สตาร์ของชาเล่ต์ที่มอบรอยยิ้มเป็นของขวัญให้ทุกคนเหมือนกันค่ะ!"
2005103-72 = "[s] \"งั้นเรากลับไปวิเคราะห์หลักฐานที่ชาเล่ต์กันเถอะ!\""
2005103-73 = "ค่ะ!!!"
2005103-75 = "(หลังจากนั้นคุณครูกับเรอิสะก็กลับมาที่ชาเล่ต์)"
2005103-76 = "(ระหว่างดูสินค้าแต่ละชิ้นที่ซื้อมา ก็หวนนึกถึงความทรงจำเมื่อครู่ด้วยกัน)"

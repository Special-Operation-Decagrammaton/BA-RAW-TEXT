[translation]
10009015-1 = "#wait;1000"
10009015-2 = "#na;(모두가 힘을 합쳐 와카모를 다시금 무사히 저지할 수가 있었다.)"
10009015-3 = "3;후부키;99;휴우!\n#3;stiff\n#3;em;[땀]\n#3;a"
10009015-4 = "3;후부키;02;선생 덕분에 더 큰일이 벌어지기 전에 와카모를 다시 잡았어!"
10009015-5 = "5;키리노;00;협조! 감사합니다! 선생님!\n#5;em;[반짝]\n#5;al\n#3;m1"
10009015-6 = "[s] \"아니, 이 정도쯤이야, 뭐…….\""
10009015-7 = "#all;hide"
10009015-8 = "3;치히로;02;잠깐, 잠깐. 방금 거. 분명 발키리 경찰학교의 장비 아니었어?\n#3;em;[!]\n#3;a"
10009015-9 = "3;치히로;06;왜 그걸 상대가, 그것도 문제아들이 운용하고 있는 거야?"
10009015-10 = "1;키리노;04;아, 그거라면 안타깝게도 문제아 여러분께 탈취당하는 바람에…….\n#1;em;[땀]\n#1;ar\n#3;m5"
10009015-11 = "3;치히로;05;그런 귀중한 장비가 탈취당하다니, 그 자체가 말이 안 되는 거잖아?"
10009015-12 = "3;치히로;01;보안 시스템은? 오토락이라던가 사용자 인증은 어떻게 된 거야?"
10009015-13 = "3;치히로;02;혹시 어떤 회사의 인증 시스템을 사용하고 있어?\n#3;em;[반응]"
10009015-14 = "3;치히로;99;소프트웨어의 이름을 말해주면, 상대가 어떤 방법으로 그 소프트웨어 인증 절차를 우회했는지 역으로 파악해서 대응책을-"
10009015-15 = "1;키리노;02;아, 저기, 보안 시스템이라면,"
10009015-16 = "1;키리노;09;장비에 비밀번호……가 걸려 있었죠? 아마?\n#1;em;[?]\n#1;stiff"
10009015-17 = "3;치히로;02;……단순한 1차 비밀번호뿐?\n#3;em;…"
10009015-18 = "1;후부키;02;응, 그 비밀번호, 아마 경비국장의 생일이었을걸?\n#1;em;[반응]"
10009015-19 = "1;후부키;00;매번 까먹으니까. 비밀번호를 적은 메모장을 순찰차 글러브 박스 안에 넣어둔단 말이지."
10009015-20 = "#st;[0,0];instant;1;"
10009015-21 = "#clearST"
10009015-22 = "3;치히로;02\n#3;em;…\n#wait;2500"
10009015-23 = "3;치히로;05;……이래서 보안 의식이 낮은 녀석들이란!\n#3;stiff\n#3;em;[빠직]"
10009015-24 = "3;치히로;04;하아, 이거 내가 직접 찾아가서 보안 시스템을 보수하는 수밖에 없나……."
10009015-25 = "1;후부키;03;뭐어, 괜찮아. 괜찮아! 처음 재액의 여우를 놓쳤을 땐 가슴이 철렁했지만……. 그래, 끝이 좋으면 다 좋은 거지!\n#1;em;[음표]\n#1;hophop"
10009015-26 = "3;치히로;06;너무 대충대충이잖아……."
10009015-27 = "#all;hide"
10009015-28 = "3;키리노;04;맞아요. 후부키. 조금은 진지하게…….\n#3;em;[땀]\n#3;stiff"
10009015-29 = "1;후부키;02;사소한 건 됐고!\n#1;em;[반응]\n#1;ar\n#3;m5"
10009015-30 = "1;후부키;99;그보다 탈출하자마자 어디로 향했나 했더니, 선생이 있는 곳일 줄이야."
10009015-31 = "3;키리노;09;뭔가, 재액의 여우 씨. 명백하게 선생님을 노리고 있었죠. 이유가 뭘까요……?\n#3;em;[?]"
10009015-32 = "1;후부키;08;응? 글쎄. 총학생회가 싫어서 난동을 부렸을 정도니까. 샬레도 똑같이 싫어하는 거 아냐?"
10009015-33 = "1;후부키;03;그래도 별일 없이 끝났으니. 운이 좋았던 셈이지만!\n#1;em;[음표]\n#1;hophop"
10009015-34 = "[s] \"으음…….\""
10009015-35 = "1;후부키;00;자, 그럼 우리는 다시 와카모를 이송하러 갈게!\n#1;em;[반응]"
10009015-36 = "3;키리노;00;이번엔 정말로! 확실히 감시할 테니까요! \n#3;em;[반짝]\n#3;greeting"
10009015-37 = "[s] \"응, 저기, 그, 힘내.\""
10009015-38 = "#st;[0,0];instant;1;"
10009015-39 = "#clearST"
10009015-40 = "1;후부키;00\n3;키리노;00\n#1;d\n#3;d\n#1;h\n#3;h\n#wait;150"
10009015-41 = "#wait;3000"
10009015-42 = "#all;hide"
10009015-43 = "3;치히로;04;……뭔가 조금 머리가 아파졌어.\n#3;em;[속상함]\n#3;stiff\n#3;a"
10009015-44 = "1;세나;01;잠시 소란이 있었지만, 응급 상황으로까지 이어지진 않아서 다행이군요.\n#1;ar\n#3;m5"
10009015-45 = "3;치히로;01;일단은 상황도 정리되었고, 나는 아직 돌아볼 시큐리티가 많으니까."
10009015-46 = "3;치히로;99;그럼 이쯤에서 잠시 헤어지도록 할까."
10009015-47 = "3;치히로;05;……나중에 발키리 녀석들에게, 조금은 쓴소리를 해주지 않으면 안 되겠어.\n#3;em;…"
10009015-48 = "[s] \"어, 저기, 여러모로 고생해. 치히로…….\""
10009015-49 = "3;치히로;02;응. 그럼…….\n#3;em;[반응]"

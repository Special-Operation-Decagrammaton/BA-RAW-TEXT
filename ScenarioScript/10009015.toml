[translation]
10009015-2 = "（之後與大家同心協力，再次順利壓制了若藻）"
10009015-3 = "哎呀，真是得救了！"
10009015-4 = "託老師的福，總算是重新逮捕他了～"
10009015-5 = "打從心裡感謝您的協助！老師！"
10009015-6 = "[s]「呃，嗯……嗯？」"
10009015-8 = "吶。剛才攻擊我們的那些傢伙，是不是拿著女武神的裝備啊？"
10009015-9 = "那是你們的東西對吧？為什麼是他們在使用啊？"
10009015-10 = "其，其實是在逃走時被搶走了武器……"
10009015-11 = "女武神的武器明明那麼貴重……這麼簡單就被搶走沒問題嗎？"
10009015-12 = "安全系統呢？自動上鎖或使用者驗證的功能怎麼了？"
10009015-13 = "說到底，你們是用哪個企業的認證系統？"
10009015-14 = "只要知道軟體的名稱，大概就能推測繞過驗證程序的方法，從中逆向──"
10009015-15 = "呃，要說安全系統的話，"
10009015-16 = "裝備確實需要密碼……對吧？"
10009015-17 = "……你說密碼，是普通的那種？"
10009015-18 = "嗯，有呢，普通的密碼。好像是警備局長的生日吧。"
10009015-19 = "但是因為常常忘記，寫著密碼的便條紙一直都貼在警備車輛顯眼的地方……"
10009015-23 = "安全意識究竟有多低……！"
10009015-24 = "唉，看來由我直接確認系統比較好……"
10009015-25 = "哎呀哎呀！雖然一開始嚇了一跳，不過最終還是再次逮捕了「災厄之狐」。#n只要結果是好的，一切都沒問題！"
10009015-26 = "那樣真的好嗎……？"
10009015-28 = "就是說呀，吹雪。稍微認真一點……"
10009015-29 = "可以啦可以啦。"
10009015-30 = "話說回來，還以為他會往哪裡逃跑，沒想到正巧逃到老師所在的地方呢。"
10009015-31 = "正巧……真的是巧合嗎？會不會「災厄之狐」同學是因為什麼理由盯上了老師……？"
10009015-32 = "嗯～他似乎本來就是因為討厭聯邦學生會而製造動亂，難道對夏萊也是一樣嗎？"
10009015-33 = "無論如何，能順利落幕真好真好！"
10009015-34 = "[s]「嗯……」"
10009015-35 = "那麼我們重新開始移送若藻。"
10009015-36 = "這次會好好監視他的，嗯！"
10009015-37 = "[s]「那個……嗯，加油哦。」"
10009015-43 = "……總覺得頭有點痛。"
10009015-44 = "總之，沒有變成緊急狀況就好。"
10009015-45 = "整理的也差不多了，我就在這附近告辭了。"
10009015-46 = "還有很多想去確認的安全系統。"
10009015-47 = "還得去女武神那邊好好說說他們才行……"
10009015-48 = "[s]「千尋，各方面都加油哦。」"
10009015-49 = "嗯，再見。"
10009015-53 = "那麼老師，我們也重新開始巡邏吧。"
10009015-54 = "[s]「嗯。雖然還是有種難以釋懷的感覺……」"
10009015-56 = "（就這樣抱著忐忑的心情，重新開始了巡邏）"

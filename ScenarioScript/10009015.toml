[translation]
10009015-2 = "(ทุกคนร่วมมือกันและขัดขวางวาคาโมะเอาไว้ได้อีกครั้ง)"
10009015-3 = "ฮู่ว!"
10009015-4 = "ได้คุณครูช่วยเอาไว้ เลยจับกุมวาคาโมะได้ก่อนที่จะเกิดเรื่องใหญ่ขึ้นอีก"
10009015-5 = "ขอบคุณที่ร่วมมือค่ะ คุณครู!"
10009015-6 = "[s] \"ไม่ใช่เรื่องใหญ่อะไรหรอก\""
10009015-8 = "เดี๋ยวก่อนๆ เมื่อกี้นี้น่ะ... มันอุปกรณ์ของทางสถาบันฝึกตำรวจวัลคิรี่ไม่ใช่รึไง?"
10009015-9 = "ทำไมพวกกลุ่มเด็กมีปัญหาถึงเอาไปใช้ได้แบบนั้นล่ะ? "
10009015-10 = "อา... คือว่ากลุ่มเด็กมีปัญหาบุกเข้ามายึดอุปกรณ์ไปได้..."
10009015-11 = "อุปกรณ์ที่มีค่าพวกนั้นถูกยึดไปงั้นเหรอ? พูดง่ายๆ แบบนี้ได้รึไง?"
10009015-12 = "แล้วระบบรักษาความปลอดภัยล่ะ? ระบบออโต้ล็อก หรือระบบยืนยันตัวตนผู้ใช้งานล่ะ?"
10009015-13 = "ตอนนี้ใช้ระบบยืนยันตัวตนของบริษัทไหนอยู่?"
10009015-14 = "ถ้าบอกชื่อซอร์ฟแวร์ที่ใช้มา ฉันจะตรวจวิธีที่ฝ่ายตรงข้ามใช้ซิกแซกระบบและหาวิธีป้องกัน--"
10009015-15 = "เอ่อ คือว่า... ถ้าเป็นระบบรักษาความปลอดภัย..."
10009015-16 = "ที่อุปกรณ์จะมีรหัสผ่านอยู่...ใช่มั้ยคะ? คิดว่านะคะ..."
10009015-17 = "แค่รหัสผ่านขั้นที่หนึ่งแบบง่ายๆ ใช่มั้ย?"
10009015-18 = "อื้อ รหัสผ่านนั่นอาจเป็นเลขวันเกิดของหัวหน้าฝ่ายความปลอดภัยก็ได้นะ?"
10009015-19 = "เห็นลืมกันบ่อยๆ ก็เลยชอบจดรหัสผ่านใส่กระดาษแล้วเสียบเอาไว้ในช่องเก็บของของรถสายตรวจน่ะ"
10009015-23 = "ความตระหนักเรื่องการรักษาความปลอดภัยต่ำกันจริงๆ!"
10009015-24 = "เฮ้อ ถ้าเป็นแบบนี้คงไม่มีทางเลือกอื่นนอกจากไปซ่อมแซมระบบความปลอดภัยเองแล้วล่ะ..."
10009015-25 = "ไม่เป็นไร ไม่เป็นไรหรอก! ตอนแรกที่จิ้งจอกแห่งความพินาศหนีไปได้ก็ใจสั่นๆ อยู่บ้าง แต่ตอนนี้ก็จับกุมได้เรียบร้อยแล้ว ก็นับว่าจบลงด้วยดีแล้วล่ะ!"
10009015-26 = "ไม่จริงจังเอาซะเลย..."
10009015-28 = "ใช่แล้วค่ะ ฟุบุกิ ช่วยจริงจังหน่อยสิคะ..."
10009015-29 = "อย่าสนใจเรื่องเล็กน้อยเลย!"
10009015-30 = "แต่ไม่คิดเลยนะว่าพอหลบหนีออกมาได้ ก็จะพุ่งมาแถวๆ ที่คุณครูอยู่แบบนี้น่ะ "
10009015-31 = "ดะ...ดูเหมือนเป้าหมายของคุณจิ้งจอกแห่งความพินาศจะเป็นคุณครูนะคะ  เพราะอะไรกันนะ...?"
10009015-32 = "หืม? นั่นสินะ เธอเคยก่อความวุ่นวายเพราะไม่ชอบองค์การนักเรียนแล้วนี่นะ ที่ทำแบบนี้ก็เพราะ#nอาจจะไม่ชอบชาเล่ต์เหมือนกันก็ได้?"
10009015-33 = "แต่ก็จบเรื่องได้โดยไม่เกิดเหตุอะไร ถือว่าโชคดีแล้วกัน!"
10009015-34 = "[s] \"อืม...\""
10009015-35 = "เอาละ ถ้างั้นพวกเราจะคุมตัววาคาโมะไปส่งก่อนก็แล้วกันนะ!"
10009015-36 = "คราวนี้เอาจริงแล้ว! ฉันจะจับตาดูแบบไม่ละสายตาเลยค่ะ! "
10009015-37 = "[s] \"อื้อ ถ้างั้นก็พยายามเข้านะ\""
10009015-43 = "น่าปวดหัวจริงๆ..."
10009015-44 = "ถึงจะเกิดเรื่องวุ่นวายนิดหน่อย แต่ก็โชคดีที่ไม่ลุกลามไปถึงขั้นสถานการณ์ฉุกเฉินนะคะ"
10009015-45 = "ตอนนี้สถานการณ์ก็คลี่คลายแล้ว และฉันก็ต้องไปตรวจสอบระบบความปลอดภัยอีกหลายจุด..."
10009015-46 = "เราแยกกันไปก่อนดีมั้ย?"
10009015-47 = "เอาไว้หลังจากนี้คงจะต้องไปเทศนาเรื่องความปลอดภัยกับพวกเด็กโรงเรียนวัลคิรี่สักหน่อยแล้วล่ะ..."
10009015-48 = "[s] \"เหนื่อยหน่อยนะ จิฮิโระ...\""
10009015-49 = "อื้อ ถ้างั้น..."
10009015-53 = "ถ้างั้นคุณครู... พวกเราก็ไปลาดตระเวนกันต่อเถอะค่ะ"
10009015-54 = "[s] \"อืม แต่ยังรู้สึกตะหงิดๆ ใจอะไรบางอย่างอยู่เลย...\""
10009015-56 = "(หลังจากเรื่องวุ่นวายเล็กๆ ที่เกิดขึ้น คุณครูก็กลับไปลาดตระเวนอีกครั้ง)"

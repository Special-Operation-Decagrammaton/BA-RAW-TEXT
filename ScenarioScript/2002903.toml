2002903-12 = "#wait;2200"
2002903-13 = "#wait;1500"
2002903-14 = "#na;(일단 방을 나서려고 문을 연 순간.)"
2002903-15 = "#place;호텔 복도\n3;미모리 수영복ND;02\n#3;a"
2002903-16 = "3;미모리 수영복ND;02;아, 선생님.\n#3;em;[반응]"
2002903-17 = "3;미모리 수영복ND;03;후후, 안녕하세요? 아직은 좋은 아침이네요.\n#3;greeting"
2002903-18 = "3;미모리 수영복ND;01;지금부터 해변으로 나가시는 건가요?\n#3;em;[?]"
2002903-19 = "[s1] \"음…… 딱히 그런 건 아니긴 한데……\"\n[s2] \"내가 뭘 하려고 했더라……\""
2002903-20 = "#wait;100"
2002903-21 = "#wait;100"
2002903-22 = "3;미모리 수영복ND;99;아하, 그렇군요. 음. 음. 네. 알겠어요."
2002903-23 = "[s] \"뭘?!\""
2002903-24 = "3;미모리 수영복ND;07;그러면 지금부터…… 선생님의 마음 상태를 알아맞혀 보도록 할까요?\n#3;em;[음표]"
2002903-25 = "[s] \"알았다. 미모리의 독심술이구나!\""
2002903-26 = "3;미모리 수영복ND;06;그, 그렇게 반갑다는 듯이 말씀하셔도…… 부끄러워요……\n#3;em;[///]"
2002903-27 = "#st;[0,0];instant;1;"
2002903-28 = "#clearST"
2002903-29 = "3;미모리 수영복ND;06\n#3;d\n#wait;1000"
2002903-30 = "#wait;500"
2002903-31 = "[ns3] \"하지만 이번에는 쉽지 않을 거야.\"\n[ns4] \"왜냐하면, 나도 일어난 지 얼마 안 되어서.\"\n[ns5] \"스스로도 내가 뭘 하고 싶은지 모르겠거든!\""
2002903-32 = "#wait;100"
2002903-33 = "#wait;100"
2002903-34 = "#wait;100"
2002903-35 = "3;미모리 수영복ND;05;아, 왠지 알 것 같아요. 가끔 있죠. 그럴 때.\n#3;a\n#3;em;[반응]"
2002903-36 = "3;미모리 수영복ND;01;하지만 그런 때일수록 여러 가지를 생각해 보는 맛이 있다고 할까요?"
2002903-37 = "3;미모리 수영복ND;99;우선 선생님께서는…… 그렇군요. 막 일어난 김에 무심코 밖으로 나왔지만.\n#3;em;…"
2002903-38 = "3;미모리 수영복ND;07;아직 나른한 기분도 남아 있고, 여기저기 왠지 뻐근하기도 한 상태이시군요?"
2002903-39 = "[s] \"어, 어어……?\""
2002903-40 = "3;미모리 수영복ND;99;거기에, 몸이 아직 덜 풀려서 특별히 나가고 싶지도 않지만."
2002903-41 = "3;미모리 수영복ND;99;그렇다고 이대로 있기도 싫은, 아주 애매한 상태셔요."
2002903-42 = "3;미모리 수영복ND;03;후훗. 어떠신가요?\n#3;em;[?]"
2002903-43 = "[s6] \"듣고 보니 확실히 그런 것 같기도……!\"\n[s7] \"항복. 졌습니다.\""
2002903-44 = "#wait;100"
2002903-45 = "#wait;100"
2002903-46 = "3;미모리 수영복ND;07;와! 제가 선생님을 이긴 거네요?\n#3;em;[반짝]"
2002903-47 = "3;미모리 수영복ND;03;그러면 승자의 권리로…… 지금부터 저와 어울려 주셨으면 좋겠어요!"
2002903-48 = "[s] \"……그거, 정말 승자의 권리 맞아……?\""
2002903-49 = "#all;hide"
2002903-50 = "#st;[0,0];instant;1;"
2002903-51 = "#clearST"
2002903-52 = "#wait;500"
2002903-53 = "#wait;2500"
2002903-54 = "#wait;1500"
2002903-55 = "#all;hide"
2002903-56 = "3;미모리 수영복ND;01\n#3;a\n#wait;1000"
2002903-57 = "3;미모리 수영복ND;03;자, 드세요. 선생님. 레모네이드예요.\n#3;greeting"
2002903-58 = "3;미모리 수영복ND;07;비타민도 풍부하고, 상큼한 맛이 생기를 북돋워 줄 거예요.\n#3;em;[음표]"
2002903-59 = "3;미모리 수영복ND;01;저런. 입가에 레몬 과육이 묻었네요. 잠시만요. 닦아 드릴게요."
2002903-60 = "#st;[0,0];instant;1;"
2002903-61 = "#clearST"
2002903-62 = "3;미모리 수영복ND;01\n#3;d\n#wait;500"
2002903-63 = "#wait;500"
2002903-64 = "3;미모리 수영복ND;01\n#3;a\n#3;closeup\n#wait;1500"
2002903-65 = "3;미모리 수영복ND;03\n#3;closeup\n#3;greeting\n#wait;1500"
2002903-66 = "3;미모리 수영복ND;07;자아…… 다 됐어요. 어떠셨나요?\n#3;em;[반짝]\n#3;closeup"
2002903-67 = "[s8] \"지금 딱 필요한 음료였어.\"\n[s9] \"그런데, 이런 게 정말 미모리가 하고 싶은 거였어?\""
2002903-68 = "#wait;100"
2002903-69 = "#wait;100"
2002903-70 = "3;미모리 수영복ND;02;네? 승자의 권리라면 좀 더…… 어울리는 것이 있지 않느냐고요?\n#3;em;[?]"
2002903-71 = "3;미모리 수영복ND;07;후훗. 아뇨. 저는 정말로 지금 만족스러운데요?"
2002903-72 = "[s10] \"그렇다면 다행이지만…… 그러고 보니 아까 전에 말인데.\"\n[s11] \"어떻게 내 마음을 알아낸 거야? 역시 초능력?\""
2002903-73 = "#wait;100"
2002903-74 = "#wait;100"
2002903-75 = "3;미모리 수영복ND;01;아…… 그것 말씀이시군요?"
2002903-76 = "3;미모리 수영복ND;99;……\n#3;em;…"
2002903-77 = "3;미모리 수영복ND;03;후후. 특별히 제가 초능력 같은 걸 갖고 있는 것은 아니에요."
2002903-78 = "3;미모리 수영복ND;99;선생님의 머리가 헝클어져 있어서, 막 일어나신 상태라는 것을 알 수 있었고."
2002903-79 = "3;미모리 수영복ND;99;지금부터 해변에 나가려고 제가 여쭈었더니, 딱히 그런 건 아니라고 대답해 주셨죠."
2002903-80 = "3;미모리 수영복ND;07;무엇보다…… 세수를 안 하신 게 너무 티가 나서, 자연히 그런 결론이 나올 수밖에 없었다고 할까요?\n#3;em;[반짝]"
2002903-81 = "#st;[0,0];instant;1;"
2002903-82 = "#clearST"
2002903-83 = "#wait;2500"
2002903-84 = "[ns12] \"반성하겠습니다……\"\n[ns13] \"뭔가, 독심술이라기보다는 추리 같네.\""
2002903-85 = "#wait;100"
2002903-86 = "#wait;100"
2002903-87 = "3;미모리 수영복ND;01;후후, 추리요? 사실 독심술과 추리 사이에는 공통점이 많죠.\n#3;em;[반응]"
2002903-88 = "3;미모리 수영복ND;99;어쩌면 거의 쌍둥이가 아닐까 싶을 정도로……"
2002903-89 = "3;미모리 수영복ND;02;네? 제 독심술에는…… 가끔 추리 이상의 무언가가 있는 것 같기도 하다, 고요?\n#3;em;[?!]\n#3;shake"
2002903-90 = "3;미모리 수영복ND;04;그, 그럴 리가요! 선생님도 참, 가끔 농담이 과하시다니까요……\n#3;em;[///]"
2002903-91 = "3;미모리 수영복ND;01;자, 자! 어서 세수라도 하시고, 오늘도 움직여 봐요."
2002903-92 = "3;미모리 수영복ND;03;기껏 바다까지 왔는데, 하루 종일 아무것도 안 하고 시간을 보내는 건 너무 아깝잖아요?\n#3;closeup\n#3;em;[?]"
2002903-93 = "#all;hide"
2002903-94 = "#na;(세수를 끝마치고, 왠지 모르게 무언가를 얼버무리려는 듯 한 미모리와 함께 바다로 나갔다.)"

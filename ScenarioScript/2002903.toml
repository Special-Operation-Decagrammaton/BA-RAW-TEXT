[translation]
2002903-1 = "นักอ่านใจแห่งท้องทะเลฤดูร้อน"
2002903-4 = "ห้องพักในโรงแรม"
2002903-5 = "(นี่เป็นครั้งแรกที่ได้นอนเต็มอิ่ม หลังจากไม่ได้นอนหลับยาวๆ แบบนี้มานาน)"
2002903-6 = "(พอดูเวลาก็พบว่ายังเป็นตอนเช้าตรู่อยู่...)"
2002903-7 = "[ns] \"อืมมม... ทำอะไรดีนะ...?\""
2002903-14 = "(วินาทีที่คุณครูเปิดประตูออกจากห้อง...)"
2002903-15 = "ทางเดินในโรงแรม"
2002903-16 = "อ๊ะ คุณครู..."
2002903-17 = "ฮุฮุ สวัสดีค่ะ ยังเช้าอยู่เลยนะคะ"
2002903-18 = "จะออกไปที่ชายหาดเหรอคะ?"
2002903-19 = "[s1] \"อืม... ยังไม่รู้เลยน่ะ\"\n[s2] \"เมื่อกี้ครูจะทำอะไรนะ...\""
2002903-22 = "อ่ะฮ่า อย่างนั้นเองเหรอคะ อืมๆ ค่ะ เข้าใจแล้วค่ะ..."
2002903-23 = "[s] \"อะไรน่ะ?!\""
2002903-24 = "ถ้างั้นตั้งแต่นี้ไป... ฉันจะลองทำนายสิ่งที่อยู่ในใจของคุณครูดูนะคะ?"
2002903-25 = "[s] \"เอาแล้ว! ศาสตร์การอ่านใจของมิโมริ!\""
2002903-26 = "คุณครูพูดเหมือนชมกันแบบนี้ ฉันเขินนะคะ..."
2002903-31 = "[ns3] \"แต่คราวนี้คงทายไม่ได้ง่ายๆ หรอก\"\n[ns4] \"ครูเพิ่งตื่นเอง คงทายไม่ได้ง่ายๆ หรอก\"\n[ns5] \"ครูยังไม่รู้ตัวเองเลยว่าอยากทำอะไร!\""
2002903-35 = "อ่า ฉันพอเข้าใจแล้วค่ะ บางครั้งฉันก็มีนะคะ ช่วงเวลาแบบนั้น..."
2002903-36 = "แต่ว่ายิ่งในเวลาแบบนี้ การลองคิดอะไรหลายๆ อย่างมันก็สนุกดีไม่ใช่เหรอคะ?"
2002903-37 = "ไหนขอดูหน่อย อืม... อย่างนี้นี่เอง เพิ่งตื่นมาแล้วก็ออกมาข้างนอกแบบไม่ได้คิดอะไร"
2002903-38 = "คุณครูรู้สึกอ่อนเพลีย แล้วก็รู้สึกเมื่อยล้าไปทั้งตัวสินะคะ?"
2002903-39 = "[s] \"อะ...เอ๋...?\""
2002903-40 = "แล้วก็คุณครูไม่ได้อยากทำอะไรเป็นพิเศษ เพราะรู้สึกว่ายังไม่ได้พักผ่อนร่างกายเต็มที่"
2002903-41 = "แต่ก็ไม่อยากอยู่เฉยๆ แบบนี้ ตอนนี้เลยรู้สึกลังเล สองจิตสองใจมากๆ เลยสินะคะ"
2002903-42 = "ฮุฮุ เป็นยังไงคะ?"
2002903-43 = "[s6] \"คิดดูแล้วก็เป็นอย่างนั้นจริงๆ...!\"\n[s7] \"ขอยอมแพ้...\""
2002903-46 = "ว้าว! ฉันชนะคุณครูแล้วสินะคะ?"
2002903-47 = "ถ้างั้นขอใช้สิทธิ์ของผู้ชนะ... ให้คุณครูไปเที่ยวกับฉันค่ะ!"
2002903-48 = "[s] \"จะใช้สิทธิ์ของผู้ชนะแบบนั้นจริงเหรอ...?\""
2002903-57 = "ดื่มนี่ก่อนสิคะคุณครู น้ำมะนาวค่ะ"
2002903-58 = "น้ำมะนาวอุดมไปด้วยวิตามิน จะช่วยให้รู้สึกสดชื่นขึ้นค่ะ"
2002903-59 = "อุ๊ย มีเศษมะนาวติดอยู่ที่ริมฝีปากค่ะ รอแป๊บหนึ่งนะคะ ฉันจะเช็ดให้ค่ะ"
2002903-66 = "เอาละ... เรียบร้อยแล้วค่ะ เป็นยังไงบ้างคะ?"
2002903-67 = "[s8] \"เป็นเครื่องดื่มที่เหมาะกับเวลาแบบนี้จริงๆ\"\n[s9] \"ว่าแต่ว่า มิโมริอยากทำแบบนี้จริงๆ เหรอ?\""
2002903-70 = "คะ? น่าจะมีอะไรที่เหมาะที่จะใช้สิทธิ์ของผู้ชนะมากกว่าการทำแบบนี้งั้นเหรอคะ?"
2002903-71 = "ฮุฮุ ไม่ละค่ะ ฉันพอใจที่ได้ทำแบบนี้แล้วละค่ะ"
2002903-72 = "[s10] \"ถ้างั้นก็ค่อยยังชั่วหน่อย...\"\n[s11] \"ว่าแต่ว่าเมื่อกี้น่ะ อ่านใจครูได้ยังไงเหรอ? พลังเหนือธรรมชาติ?\""
2002903-75 = "อ้อ... หมายถึงเรื่องนั้นน่ะเหรอคะ?"
2002903-76 = "..."
2002903-77 = "ฮุฮุ ฉันไม่ได้มีพลังเหนือธรรมชาติอะไรหรอกค่ะ"
2002903-78 = "ฉันแค่เห็นว่าผมของคุณครูยังยุ่งๆ อยู่ เลยเดาว่าคงเพิ่งจะตื่นนอนมาหมาดๆ"
2002903-79 = "พอฉันถามว่าคุณครูจะออกไปที่ชายหาดหรือเปล่า คุณครูก็ตอบมาว่าไม่ใช่"
2002903-80 = "ยิ่งกว่านั้น... มันดูออกชัดเลยค่ะว่าคุณครูยังไม่ได้ล้างหน้า เลยทำให้ฉันได้ข้อสรุปแบบนั้นค่ะ..."
2002903-84 = "[ns12] \"ครูสำนึกผิดแล้ว...\"\n[ns13] \"ดูเหมือนเป็นการสันนิษฐานมากกว่าการทำนายเลยนะ...\""
2002903-87 = "ฮุฮุ การสันนิษฐานงั้นเหรอคะ? อันที่จริงการสันนิษฐานกับการทำนายก็มีส่วนที่เหมือนกันอยู่หลายๆ อย่างเลยนะคะ"
2002903-88 = "คล้ายกันจนเรียกว่าเป็น 'ฝาแฝด' กันได้เลยละค่ะ"
2002903-89 = "คะ? การทำนายของฉัน... บางครั้งก็ดูเหมือนมีบางอย่างมากกว่าแค่การสันนิษฐานงั้นเหรอคะ?"
2002903-90 = "มะ...ไม่ใช่หรอกค่ะ! คุณครูนี่ก็นะ บางครั้งก็ล้อเล่นเกินไปแล้วนะคะ..."
2002903-91 = "เอาละค่ะๆ คุณครูรีบไปล้างหน้า แล้วรีบออกไปกันเถอะค่ะ"
2002903-92 = "ไหนๆ เราก็อุตส่าห์มาทะเลกันแล้ว จะให้เสียเวลาเปล่าโดยไม่ทำอะไรเลย มันก็น่าเสียดายออกนะคะ?"
2002903-94 = "(หลังคุณครูล้างหน้าเสร็จ ก็ออกไปที่ทะเลพร้อมกับมิโมริ และดูเหมือนมิโมริจะพยายามปกปิด#nอะไรบางอย่างอยู่)"

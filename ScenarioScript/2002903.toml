2002903-4 = "#place;호텔 방"
2002903-5 = "#na;(간만에, 정말 간만에 늘어지게 잤다.)"
2002903-6 = "#na;(놀랍게도, 아직은 오전이었다.)"
2002903-7 = "[ns] \"흠냐…… 이제부터 뭘 하지……?\""
2002903-8 = "#wait;1000"
2002903-9 = "#all;hide"

[translation]
2002903-1 = "夏日海邊的讀心術"
2002903-4 = "飯店．房間"
2002903-5 = "（久違，真的是久違地睡了一個好覺）"
2002903-6 = "（確認時鐘後驚訝地發現現在還是上午）"
2002903-7 = "[ns]「呼啊……今天做什麼好呢……？」"
2002903-14 = "（正打算開門走出房間時……）"
2002903-15 = "飯店．走廊"
2002903-16 = "啊，老師。"
2002903-17 = "呵呵，您好，還有早安。"
2002903-18 = "您現在要去海邊嗎？"
2002903-19 = "[s1]「嗯……倒也不是……」\n[s2]「我本來想做什麼來著……」"
2002903-22 = "啊啊，原來如此。#n嗯，嗯，好的，我知道了。"
2002903-23 = "[s]「知道什麼！？」"
2002903-24 = "那麼從現在開始……我來猜猜老師心裡在想什麼吧？"
2002903-25 = "[s]「原來如此，三森終於要展現讀心術了！」"
2002903-26 = "老，老師那麼開心……會讓我有點害羞……"
2002903-31 = "[ns3]「但這次可能沒那麼簡單唷。」\n[ns4]「因為我真的剛醒來沒多久。」\n[ns5]「連我都不知道自己想做什麼！」"
2002903-35 = "啊，我好像也能體會。#n偶爾就是會有這種情況呢。"
2002903-36 = "但這有時也有其獨特的趣味。"
2002903-37 = "首先，老師您……原來如此。#n剛起床便下意識地走出房間……"
2002903-38 = "但其實意識還沒完全清醒，感覺頭還昏昏的對吧？"
2002903-39 = "[s]「哦，哦哦……？」"
2002903-40 = "此外，還覺得身體有點沉重，所以不是很想出門。"
2002903-41 = "但也不想就這樣待在飯店裡，處於有點糾結的狀態。"
2002903-42 = "呵呵，您覺得如何呢？"
2002903-43 = "[s6]「聽你這麼說，好像是這樣沒錯……！」\n[s7]「我投降，是我輸了。」"
2002903-46 = "哇！是我贏了呢？"
2002903-47 = "那我希望……老師能陪我一整天當作獎勵！"
2002903-48 = "[s]「……那真的能算是贏家的權利嗎……？」"
2002903-57 = "請用，老師。這是檸檬汁。"
2002903-58 = "不僅有豐富的維他命，清爽的味道也能讓人打起精神哦。"
2002903-59 = "哎呀，檸檬果肉黏在嘴角上了。#n請稍等，我來幫您擦掉。"
2002903-66 = "好……這樣就行了。#n檸檬汁還合您口味嗎？"
2002903-67 = "[s8]「現在正好需要飲料。」\n[s9]「話說回來，這真的是三森想做的事嗎？」"
2002903-70 = "嗯？是不是……有其他更想做的事？"
2002903-71 = "呵呵。不會，我現在真的很滿足。"
2002903-72 = "[s10]「那就好……話說回來。」\n[s11]「你為什麼知道我心裡在想什麼？果然是超能力嗎？」"
2002903-75 = "啊……您說那個啊？"
2002903-76 = "……"
2002903-77 = "呵呵，並不是我擁有某種特別的超能力。"
2002903-78 = "只是因為老師的頭髮有些凌亂，我才推測老師剛起床。"
2002903-79 = "剛才問老師是不是要去海邊，老師也回答了不是對吧。"
2002903-80 = "最重要的是……老師顯然沒有洗臉，所以便得出了這樣的結論。"
2002903-84 = "[ns12]「我會反省……」\n[ns13]「與其說是讀心術，好像更接近推理呢。」"
2002903-87 = "呵呵，推理是嗎？#n其實讀心術和推理有許多相似的地方。"
2002903-88 = "某種程度上幾乎可以說是雙胞胎……"
2002903-89 = "嗯？您說我的讀心術……感覺有超越推理的某種東西？"
2002903-90 = "怎，怎麼會呢……！#n老師真是的，總是喜歡開玩笑……"
2002903-91 = "來，來！請快去洗洗臉吧。"
2002903-92 = "難得到海邊卻整天待在飯店裡什麼都不做就太可惜了唷？"
2002903-94 = "（洗完臉後，和似乎隱瞞著什麼的三森一起前往了海邊）"

[translation]
1006703-1 = "ตัวการของข่าวลือ"
1006703-2 = "สำนักงานชาเล่ต์"
1006703-4 = "วันนี้ชาเล่ต์ก็เงียบสงบจังเลยนะคะ ดีเลยค่ะ"
1006703-5 = "นี่ คุณครู ช่วยหยิบมันฝรั่งทอดตรงนั้นให้หน่อยได้มั้ยคะ?"
1006703-10 = "[ns1] \"โทคิ... มันก็ดีอยู่หรอกที่เธออยู่ที่นี่ได้อย่างสบายใจ...\"\n[ns2] \"แต่ไม่คิดว่ามันจะสบายไปหน่อยเหรอ?!\""
1006703-14 = "หืม? นั่นมันปัญหาสำคัญเหรอคะ? ไม่ใช่งั้นเหรอคะ?"
1006703-15 = "ถ้างั้นก็ไม่ต้องใส่ใจมากสินะคะ ไม่เป็นไรหรอกค่ะ เดี๋ยวฉันไปซื้อมันฝรั่งทอดที่กินหมดไปมาเพิ่มให้ค่ะ"
1006703-17 = "(หมู่นี้คุณครูมีเรื่องให้กังวลอยู่หนึ่งอย่าง)"
1006703-18 = "(ไม่ใช่อะไรอื่น... นั่นคือการที่โทคิคิดว่าชาเล่ต์อยู่สบายเกินไป)"
1006703-19 = "(ที่จริงคุณครูเคยคุยเกี่ยวกับปัญหานี้กับโทคิอย่างจริงจังแล้วเมื่อ 2-3 วันก่อน แต่ว่า...)"
1006703-21 = "สงสัยว่าทำไมฉันถึงมาที่ชาเล่ต์บ่อยๆ เหรอคะ?"
1006703-22 = "ก็มีหลายเหตุผลนะคะ แต่เหตุผลสำคัญที่สุดก็คงเป็นเพราะฉันไม่มีสังกัดที่แน่นอนค่ะ"
1006703-23 = "เพราะอย่างนี้ ต่อให้ฉันได้รหัสประจำตัวซีโร่โฟร์จาก C&C มา ฉันก็ยังทำงานร่วมกับรุ่นพี่ลำบากค่ะ"
1006703-24 = "ดังนั้นสำหรับฉันแล้ว มันไม่มีที่ไหนที่เหมาะสมและมีประสิทธิภาพเท่าชาเล่ต์แล้วค่ะ"
1006703-25 = "ถ้าอยู่ที่นี่ ฉันก็รับคำสั่งได้ทันที แล้วที่นี่ก็มีข้อมูลและรายละเอียดสถานการณ์ต่างๆ ไว้พร้อมสรรพ ฉันเลยสามารถรับมือกับคำสั่งได้ทันทีค่ะ"
1006703-26 = "ถ้าต้องตกอยู่ในสถานการณ์แบบนี้ ถึงจะเป็นคนอื่นก็คงเลือกที่จะมาสแตนด์บายรับคำสั่งที่ชาเล่ต์#nเหมือนกันไม่ใช่เหรอคะ?"
1006703-28 = "(เหตุผลของโทคิทำให้คุณครูพูดไม่ออก)"
1006703-29 = "(กลับมาที่ปัจจุบัน...)"
1006703-31 = "อืม กินของเค็มมากเกินไปจนคอแห้งเลยค่ะคุณครู ฉันอยากดื่มชาเขียวที่อยู่ตรงนั้นน่ะค่ะ"
1006703-41 = "อ๊ะ ก้านชาตั้งด้วยค่ะ วันนี้อาจจะมีเรื่องดีๆ เกิดขึ้นก็ได้นะคะ"
1006703-42 = "กลิ่นหอมและรสชาติดีจังเลยค่ะ ไม่รู้เลยนะคะว่าคุณครูมีความชำนาญในการเลือกชาเขียวด้วย"
1006703-43 = "[s] \"อ้อ... อันนั้นครูได้เป็นของขวัญมา...\""
1006703-44 = "อย่างนั้นเหรอคะ ตอบอย่างที่คาดไว้เลยค่ะ น่าผิดหวังนิดหน่อยนะคะ"
1006703-45 = "[ns] \"ทำไมเหรอ?!\""
1006703-46 = "จะว่าไป วันนี้มื้อกลางวันจะรับประทานอะไรเหรอคะ?"
1006703-47 = "ไม่ค่ะ ฉันไม่เป็นไรค่ะ คุณครูสั่งอาหารมาทานแค่คนเดียวได้เลยค่ะ"
1006703-48 = "ตอนนี้ฉันไม่อยากอาหารเลยค่ะ ทั้งจิตใจ ทั้งความรู้สึกของฉันมันนิ่งไปหมดเลยค่ะ"
1006703-56 = "[ns3] \"ขอสั่งอาหารจากชาเล่ต์...\"\n[ns4] \"ชุดอาหารกลางวันสเปเชียลเพื่อสุขภาพ 2 ที่...\""
1006703-59 = "เอ๋ สั่งสำหรับ 2 ที่เหรอคะ"
1006703-60 = "ถ้างั้นก็ช่วยไม่ได้นะคะ ฉันจะช่วยทานด้วยคนแล้วกันค่ะ"
1006703-61 = "[s] \"อื้ม... ต้องกินทั้งผักและโปรตีนนะ จะได้แข็งแรง...\""
1006703-62 = "คุณครูพูดเหมือนว่าฉันเอาแต่กินขนมที่ไม่ดีต่อสุขภาพอย่างนั้นแหละค่ะ"
1006703-63 = "[s] \"แล้วไม่ใช่รึไง...?\""
1006703-64 = "......"
1006703-65 = "อดีตก็คืออดีตค่ะ เราต้องรีบๆ ลืมเรื่องที่ผ่านไปแล้ว และก้าวไปสู่อนาคตที่มีความหวังด้วยกันสิคะ"
1006703-66 = "[s] \"อย่างน้อยก็หาข้ออ้างอะไรมาหน่อยเถอะ!\""
1006703-72 = "[ns] \"จะว่าไปแล้ว โทคิ...\""
1006703-74 = "เรียกฉันเหรอคะ?"
1006703-75 = "ค่ะ ตอนค่ำๆ ฉันจะกลับไปที่ห้องตัวเองค่ะ"
1006703-76 = "ทำไมฉันถึงไม่ไปสแตนด์บายอยู่ห้องตัวเองตั้งแต่แรกงั้นเหรอคะ?"
1006703-77 = "......"
1006703-78 = "การที่ฉันมาที่นี่... ทำให้คุณครูอึดอัดหรือทำงานไม่สะดวกเหรอคะ?"
1006703-79 = "[s5] \"ไม่ๆๆ ไม่ใช่อย่างนั้น!\"\n[s6] \"ครูแค่คิดว่าโทคิจะหมดสนุก ถ้ามาอยู่ในที่ที่ไม่มีอะไรให้ทำน่ะ!\""
1006703-82 = "ฉันไม่ได้รู้สึกอย่างนั้นค่ะ"
1006703-83 = "เอาเถอะค่ะ สรุปว่าฉันยังอยู่ที่นี่ต่อได้ใช่มั้ยคะ?"
1006703-84 = "[s] \"ถ้าถามแบบนี้ ครูก็ตอบไม่ถูกน่ะสิ...\""
1006703-85 = "ฉันคิดอยู่แล้วละค่ะว่าต้องเป็นแบบนั้น"
1006703-86 = "คะ? คุณครูกังวลข่าวลือแปลกๆ เกี่ยวกับชาเล่ต์งั้นเหรอคะ?"
1006703-88 = "(ข่าวลือแปลกๆ ที่ว่าก็คือ...)"
1006703-90 = "ได้ยินข่าวรึยัง? ได้ยินมาว่าหมู่นี้คุณครูของชาเล่ต์น่ะ..."
1006703-91 = "ฉันก็ได้ยินมาเหมือนกัน เห็นว่าชอบเอาชุดบันนี่เกิร์ลให้พวกนักเรียนที่แวะเข้าไปหาใส่... ข่าวเดียวกันหรือ#nเปล่าน่ะ?"
1006703-92 = "อุตส่าห์ได้ยินว่าเป็นคนดี แต่ไม่คิดเลยนะว่าจริงๆ แล้วจะเป็นภัยของคิโวทอสขนาดนี้..."
1006703-93 = "เมื่อวานมีคนเห็นนักเรียนคนหนึ่งใส่ชุดบันนี่เกิร์ลเข้าไปในชาเล่ต์ด้วยแหละ..."
1006703-94 = "(เรื่องมันก็เป็นอย่างนี้...)"
1006703-98 = "(คุณครูพยายามเล่าเรื่องนี้ให้โทคิฟัง...)"
1006703-99 = "อืม ไม่ใช่เรื่องใหญ่อะไรค่ะ ก็มันเป็นข่าวลือที่ห่างไกลจากความจริงนี่คะ"
1006703-100 = "นักเรียนที่ใส่ชุดบันนี่เกิร์ลเข้ามาที่นี่ก็มีแค่ฉันคนเดียว แต่ในข่าวลือบอกว่าเป็น 'พวกนักเรียน' ที่ใส่ชุด#nบันนี่เกิร์ลเข้ามานี่คะ "
1006703-101 = "แถมคุณครูก็ไม่ได้เป็นคนเอาชุดมาให้ฉันใส่เองด้วย ดังนั้นข่าวลือนั่นยิ่งไม่จริงไปใหญ่เลยค่ะ"
1006703-102 = "หรือว่า... คุณครูไปแอบเอาชุดให้ใครใส่โดยที่ฉันไม่รู้คะ?"
1006703-103 = "[ns] \"ไม่ใช่เด็ดขาด! ไม่เลย!\""
1006703-104 = "คิดไว้แล้วละค่ะว่าต้องตอบแบบนี้"
1006703-105 = "เอาเถอะค่ะ ยังไงฉันก็ไม่คิดว่าเราต้องโต้ตอบข่าวลือไม่มีมูลความจริงแบบนี้หรอกนะคะ"
1006703-106 = "เพราะงั้นเรามาจบวาระนี้กันแค่นี้เถอะค่ะ"
1006703-107 = "[s] \"จะไม่เป็นไรแน่เหรอ...\""
1006703-108 = "ไม่เป็นไรหรอกค่ะ ฉันไม่ติดอะไรค่ะ"
1006703-109 = "คะ? เรื่องนี้เป็นปัญหากับภาพลักษณ์ของคุณครูงั้นเหรอคะ? อืม... ฉันขอไม่ตัดสินอะไรดีกว่าค่ะ"
1006703-114 = "อ๊ะ สงสัยอาหารที่สั่งจะมาถึงแล้วค่ะ"
1006703-118 = "ฉันจะออกไปรับเองค่ะ"
1006703-122 = "คุณครู? ทำไมถึงเด้งตัวออกมาอย่างนั้นล่ะคะ? หน้าก็ซีดเชียว ว่าไงนะคะ? คุณครูจะออกไปรับเองงั้น#nเหรอคะ?"
1006703-123 = "......"
1006703-124 = "ก็ได้ค่ะ ถึงจะไม่รู้ว่าอยู่ๆ ทำไมคุณครูถึงเป็นอย่างนั้นก็เถอะ..."
1006703-126 = "(คุณครูทานอาหารพร้อมกับโทคิ แต่รู้สึกว่าวันนี้อาหารไม่ย่อยแปลกๆ...)"

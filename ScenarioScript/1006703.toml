[translation]
1006703-1 = "兔女郎的傳聞"
1006703-2 = "夏萊．辦公室"
1006703-4 = "今天的夏萊也很和平。真是件好事。"
1006703-5 = "啊，老師。可以幫我拿一下那邊的洋芋片嗎？"
1006703-10 = "[ns1]「季能放鬆我雖然很高興……」\n[ns2]「但是不是太放鬆了！？」"
1006703-14 = "嗯？#n那是重大的問題嗎？"
1006703-15 = "……如果不是的話，就沒必要在意了呢。#n我知道，洋芋片的補充就包在我身上吧。"
1006703-17 = "（最近有個煩惱）"
1006703-18 = "（那就是……季太沉溺在夏萊了）"
1006703-19 = "（雖然幾天前有和季委婉地提過……）"
1006703-21 = "您問我為什麼每天都在夏萊度過？"
1006703-22 = "原因有幾個……#n不過最大的原因是我的所屬單位並不明確。"
1006703-23 = "雖是C&C所屬的代號Zero Four，現在卻處於無法和前輩們一起行動的狀況。"
1006703-24 = "對於這樣的我來說，沒有比夏萊更好的地方了。"
1006703-25 = "匯集了奇普托斯的各種情況，#n有狀況時能夠迅速採取應對措施。"
1006703-26 = "考量到自己身為特務的立場，#n我想無論是誰都會想待在夏萊……我的想法有誤嗎？"
1006703-28 = "（季的說法也有道理，因此沒能多說什麼……）"
1006703-29 = "（就這麼拖到了今天……）"
1006703-31 = "啊呣……一直吃鹹的東西讓我口渴了。#n我就收下老師的綠茶了。"
1006703-41 = "啊，茶梗立起來了。今天說不定會有好事發生。"
1006703-42 = "能讓人放鬆的香氣……喝起來也很順口呢。#n我都不知道老師對綠茶的造詣如此之高。"
1006703-43 = "[s]「那個……因為是別人送的禮物，我也不是很清楚。」"
1006703-44 = "這樣啊。是意料之中的回答，覺得有點失望。"
1006703-45 = "[ns]「為什麼要擅自失望！？」"
1006703-46 = "今天的午餐是──"
1006703-47 = "不，沒什麼。請您不用在意。#n就算老師只點自己的午餐，在餓了的我旁邊盡情享用也……"
1006703-48 = "我的心情極度穩定。不會有任何想法。#n沒錯……當然不會有任何想法。"
1006703-56 = "[ns3]「不好意思，我這裡是夏萊……」\n[ns4]「請給我特別健康午間套餐2人份……」"
1006703-59 = "哦，您點了2人份呢。#n這個分量對老師來說太多了。"
1006703-60 = "……真沒辦法，我就陪您一起吃吧。"
1006703-61 = "[s]「嗯……為了維持健康，蔬菜跟蛋白質都很重要哦。」"
1006703-62 = "您這麼說，好像我平時的飲食並不健康呢。"
1006703-63 = "[s]「難道不是嗎……？」"
1006703-64 = "……"
1006703-65 = "……過去的事就過去了。#n一直糾結已經過去的事也於事無補。"
1006703-66 = "[s]「至少也編個藉口吧！？」"
1006703-72 = "[ns]「話說，季……」"
1006703-74 = "……您叫我嗎？"
1006703-75 = "那是當然，我預計在天黑之後就會回到自己的辦公室。"
1006703-76 = "回去的具體時間是嗎……？"
1006703-77 = "……"
1006703-78 = "難道說，我待在這裡……很礙事嗎……？"
1006703-79 = "[s5]「不不不！我不是那個意思！」\n[s6]「只是覺得季就算待在這裡不是也是閒著嗎～而已！」"
1006703-82 = "我並不覺得無聊。"
1006703-83 = "……也就是說待在這裡也沒關係是嗎？"
1006703-84 = "[s]「……嗯，如果季不介意的話。」"
1006703-85 = "那我就不客氣了……"
1006703-86 = "……咦？夏萊出現了奇怪的傳聞？"
1006703-88 = "（關於那個傳聞……）"
1006703-90 = "你有聽說嗎？最近那個夏萊的老師……"
1006703-91 = "有哇，附近都在傳啊！#n每天都讓學生們打扮成兔女郎之類的。"
1006703-92 = "明明在街上碰到我們的時候，都會那麼有禮貌地打招呼……"
1006703-93 = "就連剛才好像也有穿著兔女郎服跑到夏萊的學生哦？"
1006703-94 = "（……內容大概是這樣）"
1006703-98 = "（將這件事告訴季之後……）"
1006703-99 = "每天裝扮成兔女郎出入夏萊的人，只有我而已。#n老師聽到的傳聞說的是「學生們」對吧？"
1006703-100 = "也就是說那只是毫無根據的傳聞罷了。"
1006703-101 = "而且「老師要我打扮成兔女郎」這點也並非事實……"
1006703-102 = "……還是說，老師其實很希望我穿，只是我沒有注意到？"
1006703-103 = "[ns]「絕對沒有！！」"
1006703-104 = "既然如此，那就完全沒有在意的必要。"
1006703-105 = "那種傳聞只要無視它，終究會消失的。#n畢竟人們是健忘的。"
1006703-106 = "因此，這個問題已經解決了。"
1006703-107 = "[s]「真的沒問題嗎……？」"
1006703-108 = "沒問題，當然沒問題。"
1006703-109 = "社會的評價……？#n……我不是很清楚。這個話題差不多就說到這裡吧。"
1006703-114 = "啊，外送好像到了呢。肚子也到極限了……"
1006703-118 = "我這就去拿。"
1006703-122 = "老師，您的筆掉了哦……#n咦？老師您要去拿嗎？"
1006703-123 = "……"
1006703-124 = "明明我離門比較近……知道了。"
1006703-126 = "（雖然勉強保住了自己的風評，午餐卻實在難以下嚥……）"

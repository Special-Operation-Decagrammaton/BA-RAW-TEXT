[translation]
10043040-1 = "Episode 4;An Unexpected Meeting"
10043040-2 = "Wow, it's really hectic. There's so many people."
10043040-3 = "Though I guess that makes sense. There's a lot of Pillager fans here too."
10043040-4 = "At this rate, the game might end before we can even check half—"
10043040-9 = "Woo, let's all have a great day! It's party time!"
10043040-13 = "Now THAT'S a cheer. I don't even know who that is, but I'm feeling her energy."
10043040-14 = "Maybe I shouldn't be the one to say this, but cheering for the Heroes kind of leaves you feeling drained sometimes..."
10043040-15 = "[s] \"Wait, I know who that is...\""
10043040-16 = "Sensei?"
10043040-19 = "Go! Go! You're our..."
10043040-23 = "Uh...what was it again? Anyway!"
10043040-24 = "Wings of our dreams! Beyond the sky! "
10043040-30 = "Oh?"
10043040-31 = "Sensei!"
10043040-35 = "Heehee. Wow, I get to just bump into you? Lucky me!"
10043040-36 = "[s] \"Whoa! Easy there, Hanae!\""
10043040-37 = "Umm...Sensei, who's this...?"
10043040-38 = "Hi! I'm Asagao Hanae! I'm a first-year with the Trinity General School Remedial Knights! Medicine knows no borders!"
10043040-39 = "[s] \"Indeed it does not. Good to see you!\""
10043040-40 = "Great to see you! Who's your friend?"
10043040-41 = "We're treating Sensei like a ping pong ball here... "
10043040-42 = "Hi, yeah! I'm Nomasa Rei, first-year from Millennium Science School. For now...*sigh*...I'm part of the Athletics Training Club."
10043040-43 = "But I'm also in the Millennium Baseball Club! I'm the cleanup hitter!"
10043040-44 = "Wow, really? That's awesome!"
10043040-45 = "Do you know a lot about baseball?"
10043040-46 = "Nope, not a thing!"
10043040-47 = "I-I see..."
10043040-48 = "For now, I'm just here to cheer—but if you need any medical help, let me know! I'm a Remedial Knight!"
10043040-49 = "And...for some reason, a lot of people around here seem to be getting headaches all of a sudden..."
10043040-50 = "...but I've got that covered! I found an old medicine book at the Trinity Library!"
10043040-51 = "It said, \"Headaches are caused by evil spirits entering the head and taking up space in the skull\"!"
10043040-52 = "But if you SPLIT the skull and pour in some vinegar—you know, for sanitation... "
10043040-53 = "...all those evil spirits come flying right out! No more headaches!"
10043040-54 = "[s] \"Okay, NO. I'm shutting that down.\""
10043040-55 = "Really? Oh. Well, there was another theory in the second chapter. It said, \"Headaches come from excessive secretion of black bile.\""
10043040-56 = "So what you do is grind up the seeds of a skullcap flower and then take them with honey. That'll cure it for sure!"
10043040-57 = "(Hmm, first I've heard of that...)"
10043040-58 = "(But Trinity's prestigious and all. Maybe they developed their own healing methods?)"
10043040-64 = "[ns] \"Anyway, what brings you here, Hanae?\""
10043040-65 = "Just cheering, like you saw."
10043040-66 = "Do you want to watch me, Sensei? You too, Rei!"
10043040-67 = "Chin up! Let's go! Further, faster, fight!"
10043040-68 = "Once more! Once more! Make tomorrow bright!"
10043040-73 = "You're really showing your passion for the Heroes."
10043040-74 = "I appreciate it. It's just what they need."
10043040-75 = "Happy to help! Who are the Heroes?"
10043040-76 = "W-What?"
10043040-77 = "Well um...that's the name of the team...that's playing the game."
10043040-78 = "...Or were you cheering for the Pillagers?"
10043040-79 = "...I DON'T understand the question!"
10043040-80 = "I just heard someone needed a good cheer."
10043040-81 = "I couldn't just sit idly by, right? So I came running!"
10043040-82 = "...Simple as that, huh?"
10043040-83 = "Yup! Simple as that! I like to cheer for other people!"
10043040-84 = "I hope my cheers make them feel better, you know? Maybe it'll get 'em to keep trying, instead of giving up."
10043040-85 = "As long as they keep trying, there's always a chance!"
10043040-86 = "What's better than that, right?"
10043040-87 = "If the captain were here..."
10043040-88 = "...she'd probably agree with me! She'd say cheering was a kind of medicine, and medicine knows no borders!"
10043040-89 = "[s] \"She probably would say that.\""
10043040-90 = "...You know, honestly, a lot of...strong feelings come out in these stands."
10043040-91 = "But we hardly ever see as much pure passion as you're bringing to the table."
10043040-92 = "I mean it."
10043040-93 = "Maybe... Maybe we've lost something. Something important."
10043040-94 = "[s] \"My heart feels cleansed now. I know that.\""
10043040-95 = "Oh, um, Hanae? Did you, uh...maybe around here, did you..."
10043040-96 = "...see anybody who seemed a little suspicious, or off?"
10043040-97 = "Or maybe someone who REALLY, really wants a certain team to win or lose."
10043040-102 = "Hm... Not that I remember, sorry!"
10043040-104 = "I see... "
10043040-105 = "It's funny. YOU stand out, and some people would say that makes YOU the most suspicious."
10043040-106 = "But in this case, I'd say that ironically makes you the LEAST likely to be the culprit."
10043040-107 = "Huh? What culprit?"
10043040-108 = "Eh, just a little local incident we're looking into. But that aside, I've gotta say, I just met you, and I think you're awesome."
10043040-109 = "Thank you for spreading your cheer to everybody."
10043040-110 = "Like I said, the Heroes really need it right now."
10043040-111 = "I'm...not sure I completely understand, but I'm glad I could help. I really am!"
10043040-116 = "Hey, Hanae? Could you come help us with a cheer real quick?"
10043040-120 = "Ah! Gotta go. Someone needs me!"
10043040-121 = "I'll see you next time, Sensei! Nice meeting you, Rei! Bye bye!"
10043040-125 = "[ns] \"And there she goes, before I could even say goodbye back.\""
10043040-126 = "She's just bursting with energy. ...You know, I'm not sure this metaphor fits exactly..."
10043040-127 = "...but she's like a home run."
10043040-128 = "[s] \"A home run?\""
10043040-129 = "..."
10043040-130 = "For me, home runs are like the crown jewels of baseball."
10043040-131 = "Some people say base hits are better strategically."
10043040-132 = "They keep the pitcher tense, and they can lead to fielding errors."
10043040-133 = "Other people say home runs are better, because they guarantee a score..."
10043040-134 = "...no matter what else is happening."
10043040-135 = "But I don't care about that. I mean, I LIKE all the stat-crunching and everything..."
10043040-139 = "...but for me, home runs are the exception to that."
10043040-140 = "It's hard to explain why. I guess you could say..."
10043040-141 = "...well, for the winning team, a home run secures a victory. For the losing team, it gives them hope that they can start to make a comeback."
10043040-142 = "I love the way the ball arcs when someone hits a home run."
10043040-143 = "That little white dot, flying way up into the sky."
10043040-144 = "And then, when the batter jogs around the bases with nothing in their way? That's awesome to me."
10043040-145 = "And more than just the game, home runs give everybody the hope that we can do something amazing, all in one great moment. That one swing, it's so full of life, and vitality, and drive. "
10043040-146 = "I don't see that kind of life in people very often."
10043040-147 = "But Hanae, she doesn't just have that kind of life inside. She gives it out to others."
10043040-148 = "...I've got nothing but pure affection and admiration for that."
10043040-149 = "[s] \"You're like that too, you know.\""
10043040-150 = "...Well, maybe sometimes."
10043040-151 = "Losing still hits hard with me. I know it's part of the deal."
10043040-152 = "All games are win-some, lose-some."
10043040-153 = "And, heh, you might know, the Millennium Baseball Club isn't exactly the strongest team."
10043040-154 = "We even struggle to win practice matches against those robots the Engineering Department whips up."
10043040-155 = "But even with all those L's on the record, I still love baseball."
10043040-156 = "That just means I have to accept winning AND losing."
10043040-157 = "Still, winning does feel good. Heehee. "
10043040-158 = "And I want to see the Heroes win."
10043040-159 = "At least, I want them to play so hard, we can all say, \"Good game\" at the end."
10043040-160 = "I don't think I'm the only Heroes fan who feels that way."
10043040-161 = "And Heroes fans, in particular, are a VERY passionate bunch."
10043040-162 = "Just think, at any moment, one of them COULD hit a home run. Change the flow, set a new pace."
10043040-163 = "Maybe even lead to a win. Wouldn't that be amazing?"
10043040-168 = "Spoken like a sportswoman."
10043040-169 = "You've got to think that way when you watch a Heroes game, right?"
10043040-173 = "Have we met?"
10043040-174 = "Oh, he's a 20-year Heroes fan. They call him the Smiling Monk!"
10043040-175 = "He got that nickname from always cheering the game with a smile on his face."
10043040-177 = "Hahaha, you're making me blush. I'm just an ordinary baseball fan."
10043040-178 = "Ah, I see."
10043040-179 = "Well, we have that in common."
10043040-180 = "I love that fans can meet for the first time and just open up like this."
10043040-181 = "We have so many things in common. The same view of the game, the same feelings about it..."
10043040-182 = "That's one of the great things about baseball, or about sports in general, really. Don't you think, Sensei?"
10043040-188 = "The ball count is 3 balls and 1 strike...and it's a hit! A shallow second-base fly!"
10043040-189 = "Oh, my!"
10043040-190 = "They dropped the ball! The Heroes' second baseman dropped the ball! That runner is coming home!"
10043040-191 = "I can't believe he dropped that ball, folks!"
10043040-192 = "What was that, huh?"
10043040-195 = "..."
10043040-199 = "YOU LOSERS! You call yourselves ball players?!"
10043040-200 = "You miss an easy fly, and LOOK what happens! "
10043040-201 = "Screw this! Screw everything! GAAAHH!!"
10043040-202 = "[s] \"M-Mr. Smiling Monk?!\""
10043040-206 = "..."
10043040-207 = "Well, Sensei, I guess..."
10043040-208 = "...even monks can only get pushed so far..."

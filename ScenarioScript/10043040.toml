10043040-8 = "#all;hide"
10043040-9 = "#na;???;즐기자! 우리의! 커다란 축제!"
10043040-10 = "#st;[0,0];instant;1;"
10043040-11 = "#clearST"
10043040-12 = "3;레이;02\n#3;em;[반응]\n#3;h\n#wait;800"
10043040-13 = "3;레이;00;힘찬 응원이네요. 누구인지는 모르지만, 저까지 조금 힘이 날 정도로요."
10043040-14 = "3;레이;09;……제가 할 말은 아닌 것 같지만, 브레이브스의 응원은 중간에 보통 힘이 빠져 버리곤 하거든요…….\n#3;stiff"
10043040-15 = "[s] \"잠깐만, 이 목소리는……?\""
10043040-16 = "3;레이;02;선생님?\n#3;em;[?]"
10043040-17 = "#all;hide"
10043040-18 = "#wait;500"
10043040-19 = "4;하나에 치어리더;00;힘내라! 힘내라! 우리의–\n#4;em;[재잘]\n#4;hophop\n#4;a"
10043040-20 = "#st;[0,0];instant;1;"
10043040-21 = "#clearST"
10043040-22 = "4;하나에 치어리더;02\n#4;em;[?]\n#4;h\n#wait;800"
10043040-23 = "4;하나에 치어리더;05;어……. 우리의…… 이름이 뭐더라? 아무튼!\n#4;stiff"
10043040-24 = "4;하나에 치어리더;07;꿈의 날개! 하늘 저 멀리! \n#4;hophop\n#4;m2"
10043040-25 = "#st;[0,0];instant;1;"
10043040-26 = "#clearST"
10043040-27 = "#all;hide"
10043040-28 = "#wait;2500"
10043040-29 = "2;하나에 치어리더;01\n#2;em;[반응]\n#2;h\n#wait;1000"
10043040-30 = "2;하나에 치어리더;02;어라?"
10043040-31 = "2;하나에 치어리더;00;선생님!!!\n#2;em;[!]"
10043040-32 = "#st;[0,0];instant;1;"
10043040-33 = "#clearST"
10043040-34 = "#2;hide\n3;하나에 치어리더;01\n#3;a\n#3;closeup\n#wait;1000"
10043040-35 = "3;하나에 치어리더;03;에헤헤. 이런 곳에서 선생님을 만나다니, 전 정말 운이 좋네요!\n#3;em;[반짝]\n#3;hophop\n#3;closeup"
10043040-36 = "[s] \"우왓! 진정해, 하나에!\""
10043040-37 = "3;하나에 치어리더;03\n1;레이;02;저…… 선생님? 이분은, 누구시죠……?\n#1;em;…\n#1;ar\n#3;m5"
10043040-38 = "3;하나에 치어리더;08;안녕하세요! 저는 아사가오 하나에예요! 트리니티 종합학원 1학년, 구호기사단이고요! 구호가 필요한 곳에 구호를!\n#3;greeting"
10043040-39 = "[s] \"응. 구호가 필요한 곳에 구호를. 반가워, 하나에.\""
10043040-40 = "3;하나에 치어리더;01;네! 저도요, 선생님! 그런데 같이 계신 분은 누구신가요?\n#3;em;[?]"
10043040-41 = "1;레이;09;뭔가 이것저것 순서가 뒤섞여 버린 것 같긴 한데요…… \n#1;stiff"
10043040-42 = "1;레이;02;음, 네. 안녕하세요. 밀레니엄 사이언스 스쿨 1학년, 노마사 레이입니다. 일단은, 후우…… 트레이닝부고요."
10043040-43 = "1;레이;10;그렇지만 동시에 밀레니엄 야구부 소속이기도 하죠! 타순은…… 4번입니다!\n#1;em;[반짝]"
10043040-44 = "3;하나에 치어리더;00;와아, 그렇군요! 대단하세요!"
10043040-45 = "1;레이;10;혹시 야구에 대해서 잘 아시나요?!\n#1;m2"
10043040-46 = "3;하나에 치어리더;03;하나도 몰라요!\n#3;em;[음표]\n#3;hophop"
10043040-47 = "1;레이;09;그, 그렇군요…….\n#1;em;[세로선]"
10043040-48 = "3;하나에 치어리더;01;지금은 응원을 보내 드리고 있지만, 응급 처치가 필요하다면 언제든 말씀해 주세요. 구호기사단이니까요!\n#3;m3\n#1;dl"
10043040-49 = "3;하나에 치어리더;02;어째서인지 여기에서는 갑작스러운 두통을 호소하는 분을 많이 만나곤 했는데요……."
10043040-50 = "3;하나에 치어리더;99;트리니티 도서관에서 찾아낸 지 오래된 의학서에 따르면!"
10043040-51 = "#1;hide\n3;하나에 치어리더;00;두통은 나쁜 기운이 갑작스럽게 머리에 들어와, 생각을 혼란하게 하고 머리를 어지럽히는 것이라고 하더라고요!\n#3;closeup"
10043040-52 = "3;하나에 치어리더;99;그러니까 나쁜 기운을 몰아내기 위해, 두개골을 절개하고 그 안을 식초로 소독하면…… \n#3;closeup"
10043040-53 = "3;하나에 치어리더;08;어떤 두통이라도 씻은 듯이 나을지도 몰라요!\n#3;em;[음표]\n#3;greeting\n#3;closeup"
10043040-54 = "[s] \"아니야! 그거 아니야, 하나에!\""
10043040-55 = "3;하나에 치어리더;02;그런가요? 그러면 역시 두통의 원인은 과도하게 분비된 흑담액이라는 두 번째 챕터의 설명이 맞는 것이었나 보네요……."
10043040-56 = "3;하나에 치어리더;00;그러면 골무꽃 씨앗을 잘게 빻아서 꿀과 함께 복용하면, 이번에야말로 두통을 낫게 할 수 있겠네요!\n#3;jump"
10043040-57 = "3;레이;04;(처음 들어 보는 치료법인데…….)\n#3;em;…"
10043040-58 = "3;레이;99;(하지만 트리니티는 전통의 명문고등학교니까, 그런 치료법을 독자적으로 새로 개발한 게 아닐까?)"
10043040-59 = "#st;[0,0];instant;1;"
10043040-60 = "#clearST"
10043040-61 = "3;레이;99\n#3;d\n#wait;1200"
10043040-62 = "#all;hide"
10043040-63 = "3;하나에 치어리더;01\n#3;a\n#3;h\n#wait;1000"
10043040-64 = "[ns] \"그런데 하나에는 여기서 뭐 하고 있었어?\""
10043040-65 = "3;하나에 치어리더;00;그야 보시는 대로, 응원을 하고 있었죠!\n#3;em;[반응]"
10043040-66 = "3;하나에 치어리더;01;보시겠어요, 선생님? 레이 씨도요!"
10043040-67 = "3;하나에 치어리더;03;힘내라! 나가자! 멀리 높이 더 빨리!\n#3;em;[!]\n#3;m2\n#3;hophop"
10043040-68 = "3;하나에 치어리더;07;한 번 더! 한 번 더! 반짝반짝 빛날 내일을 향해!\n#3;em;[재잘]\n#3;m4\n#3;hophop"
10043040-69 = "#st;[0,0];instant;1;"
10043040-70 = "#clearST"
10043040-71 = "3;하나에 치어리더;07\n#3;d\n#wait;1200"
10043040-72 = "#all;hide"
10043040-73 = "3;레이;02;이렇게 열정적으로 브레이브스를 응원해 주신다니…….\n#3;em;…\n#3;a"
10043040-74 = "3;레이;10;정말 감사해요! 모두 큰 힘이 될 거예요!\n#3;stiff"
10043040-75 = "5;하나에 치어리더;03;천만에요! 저기, 그런데 브레이브스가 뭔가요?\n#5;em;[재잘]\n#5;al\n#3;m1"
10043040-76 = "3;레이;04;네, 네?!\n#3;em;[?!]\n#3;shake"
10043040-77 = "3;레이;08;그러니까 그건…… 지금 경기를 하고 있는, 이 팀인데요?"
10043040-78 = "3;레이;09;전통의 숙적인 아비시니안과의 대결에, 힘을 보태 주고 계신 것 아니었나요……?"
10043040-79 = "5;하나에 치어리더;01;그런 건 잘 모르겠어요!\n#5;em;[반응]"
10043040-80 = "5;하나에 치어리더;99;하지만 어딘가에서 응원이 필요하다는 이야기가 들려서……."
10043040-81 = "5;하나에 치어리더;03;도저히 참을 수 없어져서, 한달음에 달려왔지, 뭐예요!\n#5;hophop"
10043040-82 = "3;레이;04;그게, 전부인가요?\n#3;em;…"
10043040-83 = "5;하나에 치어리더;01;네! 그게 전부예요! 저는 누군가를 응원하는 게 좋거든요!"
10043040-84 = "5;하나에 치어리더;99;제 응원으로 누군가가 힘을 낼 수 있다면…… 그래서 포기하려고 했던 일에 한 번만이라도 더 도전할 수 있게 된다면…….\n#5;m3\n#3;dl"
10043040-85 = "5;하나에 치어리더;00;그래서 마침내는! 뭔가가 조금이라도 더 나아질 수 있게 된다면!"
10043040-86 = "5;하나에 치어리더;03;생각해 보세요. 그것보다 좋은 게 어디 있을까요?\n#5;greeting\n#5;em;[반짝]\n#5;closeup"
10043040-87 = "#3;hide\n5;하나에 치어리더;01;만일 단장님이 이 자리에 계셨다면…….\n#5;closeup"
10043040-88 = "5;하나에 치어리더;00;이거야말로, 구호가 필요한 곳에 구호를 전하는 일이라고 말씀하지 않으셨을까요?\n#5;closeup"
10043040-89 = "[s] \"응. 그건 정말로 그럴 것 같네.\""
10043040-90 = "#5;hide\n3;레이;02;사실 야구 관중석이라는 곳은…… 수많은 감정이 정신없이 휘몰아치는 곳이기는 하죠.\n#3;em;…"
10043040-91 = "3;레이;01;그런 자리에서, 이렇게 깨끗한 열정을 보여 주시는 분이 있다니, 정말로 감탄스럽네요."
10043040-92 = "3;레이;99;네…… 정말로요…….\n#3;stiff"
10043040-93 = "3;레이;05;우리는 어쩌면, 어딘가에서 정말로 중요했던 것을 잃어버렸던 건지도 모르겠어요……."
10043040-94 = "[s] \"나까지 치유 받는 느낌이야…….\""
10043040-95 = "3;레이;02;저, 그런데 하나에 씨? 혹시 이 근처에서…… 아니면 다른 관중석에서라도.\n#3;em;[반응]\n#3;m4"
10043040-96 = "3;레이;01;어딘가 조금 수상해 보인다거나, 어색하게 느껴지는 사람을 본 적 있으신가요?"
10043040-97 = "3;레이;05;아니면 특정 팀의 승리나 패배를 유난히 강하게 바라는 사람이라던가요."
10043040-98 = "#st;[0,0];instant;1;"
10043040-99 = "#clearST"
10043040-100 = "#all;hide"
10043040-101 = "3;하나에 치어리더;99\n#3;em;…\n#wait;2500"
10043040-102 = "3;하나에 치어리더;00;음…… 죄송해요! 역시 모르겠어요!\n#3;jump"
10043040-103 = "#all;hide"
10043040-104 = "3;레이;06;역시 그런가요……. \n#3;em;[속상함]"
10043040-105 = "3;레이;00;생각하기에 따라서는, 어떤 의미로 이 자리에서 가장 수상해 보일 수도 있는 분이지만……."
10043040-106 = "3;레이;02;동시에, 그렇기에 가장 범인일 수 없는 분이로군요. 하나에 씨는."
10043040-107 = "5;하나에 치어리더;01;어라? 무슨 말씀이신가요? 범인이요?\n#5;em;[?]\n#5;al\n#3;m1"
10043040-108 = "3;레이;99;아뇨. 그런 일이 조금 있어요. 오늘 처음 뵌 분이지만, 하나에 씨는 그냥 이대로 좋다는 생각이 드네요."
10043040-109 = "3;레이;10;모두에게 기운을 나눠 주셔서, 정말로 고맙습니다.\n#3;greeting"
10043040-110 = "3;레이;11;……브레이브스에는, 정말로 필요하거든요. 그런 게."
10043040-111 = "5;하나에 치어리더;03;정확히는 모르겠지만 도움이 되었다니 기뻐요!\n#5;em;[반짝]\n#5;hophop"
10043040-112 = "#st;[0,0];instant;1;"
10043040-113 = "#clearST"
10043040-114 = "#all;hide"
10043040-115 = "#wait;2000"
10043040-116 = "#na;나레이션 응원단장;하나에 쨩? 여기, 이쪽도 좀 도와줘! 응원이 필요해!\n#fontsize;80"
10043040-117 = "#st;[0,0];instant;1;"
10043040-118 = "#clearST"
10043040-119 = "3;하나에 치어리더;02\n#3;em;[반응]\n#3;h\n#wait;1000"
10043040-120 = "3;하나에 치어리더;00;아! 어딘가에 응원이 필요한 장소가 또 있나 봐요!"
10043040-121 = "3;하나에 치어리더;03;그러면 선생님, 레이 씨! 다음에 또 봬요! 가 볼게요!\n#3;em;[반짝]\n#3;greeting"
10043040-122 = "#st;[0,0];instant;1;"
10043040-123 = "#clearST"
10043040-124 = "3;하나에 치어리더;03\n#3;dl\n#wait;2000"
10043040-125 = "[ns] \"잘 가라는 소리를 할 새도 없이 가 버렸네…….\""
10043040-126 = "3;레이;02;정말 기운 넘치는 분이셨죠. 마치…… 음……. 이런 비유가 맞을지는 모르겠지만\n#3;a"
10043040-127 = "3;레이;10;홈런, 같은 분이었네요."
10043040-128 = "[s] \"홈런?\""
10043040-129 = "3;레이;99;…….\n#3;em;…"
10043040-130 = "3;레이;00;사람에 따라 관점은 다르겠지만, 저는 홈런이야말로 야구의 꽃이라고 생각해요."
10043040-131 = "3;레이;02;특정 상황에서는, 투수의 긴장을 보다 유지하는 효과가 있고, 야수들의 실책 역시 유도할 수 있기 때문에."
10043040-132 = "3;레이;00;홈런보다 안타가 좋다는 말을 하는 사람도 있고."
10043040-133 = "3;레이;99;그에 반박하기 위해, 홈런이야말로 경기 내의 변수에 전혀 구애받지 않는 확률 100%의 득점 방법이기 때문에."
10043040-134 = "3;레이;01;홈런이야말로 최고의 팀플레이라는 말을 하는 사람도 있죠."
10043040-135 = "3;레이;02;그렇지만 그런 건 아무래도 좋아요. 저도 숫자나 통계로 야구에 접근하는 방식을 싫어하는 것은 아니지만…….\n#3;em;[반응]"
10043040-136 = "#st;[0,0];instant;1;"
10043040-137 = "#clearST"
10043040-138 = "3;레이;01\n#3;m4\n#wait;1200"
10043040-139 = "3;레이;10;저에게 있어, 홈런만은 예외에요."
10043040-140 = "3;레이;02;음, 어째서일까요? 여기에서도 그렇게 확실히 말로 설명할 수는 없지만…….\n#3;em;…"
10043040-141 = "3;레이;99;이기고 있는 팀에게는, 이제 확실히 이겼다는 쐐기를 꽂아 주죠. 지고 있는 팀에게는, 이제부터 반격을 시작할 수 있다는 희망을 주고요."
10043040-142 = "3;레이;10;홈런 타구가 그리는 아름다운 포물선이 좋아요."
10043040-143 = "3;레이;10;하늘로 높이 뻗는 흰 공의 모습이 좋아요."
10043040-144 = "3;레이;11;아무런 방해도 없이 고고하게 그라운드를 도는 타자의 모습이…… 멋지다고 생각해요."

[translation]
10043040-1 = "第4話;意外的相遇"
10043040-2 = "哇，現場真的好熱鬧。觀眾比想像中還多呢。"
10043040-3 = "不過想想也是，畢竟除了勇士隊的粉絲之外，還有突襲者隊那邊的粉絲啊。"
10043040-4 = "這樣下去恐怕連一半還沒搜完，比賽就結束了……"
10043040-9 = "享受吧！我們的！盛大慶典！"
10043040-13 = "真是充滿活力的應援呢。#n不知道是誰在加油，但連我都感覺受到鼓舞了。"
10043040-14 = "雖然我好像沒資格說這種話，不過勇士隊的應援通常到中場就沒力了……"
10043040-15 = "[s]「等等，這個聲音是……？」"
10043040-16 = "老師？"
10043040-19 = "加油！加油！我們的──"
10043040-23 = "那個……我們的……隊名叫什麼啊？#n算了，總之……！"
10043040-24 = "夢想的翅膀！向遠方的天空翱翔！"
10043040-30 = "咦？"
10043040-31 = "老師！！！"
10043040-35 = "耶嘿嘿，沒想到會在這裡遇到老師，我好幸運哦！"
10043040-36 = "[s]「哇啊！你先冷靜點，花繪！」"
10043040-37 = "那個……老師？#n請問這位是……？"
10043040-38 = "你好！我叫做朝顏花繪！是三一綜合學園1年級，救護騎士團的一員！#n哪裡要救護，我就在哪裡！"
10043040-39 = "[s]「嗯，願救護降臨在需要的地方。很高興見到你，花繪。」"
10043040-40 = "嗯！我也很高興！#n話說，請問和老師在一起的這位是……？"
10043040-41 = "感覺介紹的順序好像有點混亂…… "
10043040-42 = "你好，我是千年科學學園1年級的野正莉。#n目前姑且算是……呃，訓練部的成員。"
10043040-43 = "不過同時也是千年棒球部的一員！#n至於棒次是……第四棒！"
10043040-44 = "哇啊，原來如此！真厲害呢！"
10043040-45 = "你也懂棒球嗎！？"
10043040-46 = "完全不懂！"
10043040-47 = "這，這樣啊……"
10043040-48 = "雖然現在是應援團，不過如果需要急救的話請隨時跟我說哦。#n畢竟我終究是救護騎士團的一員！"
10043040-49 = "不知道為什麼，我已經在這裡遇到好幾個人突然說自己頭很痛了。"
10043040-50 = "我在三一圖書館找到的古醫典上面寫……"
10043040-51 = "頭痛是因為不好的氣突然侵襲頭部，所以會導致思考紊亂、頭腦昏沈！"
10043040-52 = "想要驅散壞氣的話，只要切開顱骨並用醋消毒腦內…… "
10043040-53 = "無論哪裡痛都會馬上痊癒哦！"
10043040-54 = "[s]「不不不！絕對不能那麼做哦，花繪！」"
10043040-55 = "是嗎？所以頭痛果然是因為黑膽汁的過度分泌嗎？#n看來第二章的說明沒錯呢……"
10043040-56 = "那麼只要把黃芩種子磨成粉，混入蜂蜜一起服用就能治好了！"
10043040-57 = "（是個前所未聞的療法……）"
10043040-58 = "（不過三一可是傳統的名門學園，那說不定是他們獨有的新治療技術？）"
10043040-64 = "[ns]「話說回來，花繪在這裡做什麼呢？」"
10043040-65 = "就像老師看到的一樣在應援哦！"
10043040-66 = "老師想看看嗎？莉同學也一起吧！"
10043040-67 = "加油！向前衝！更遠、更高、更快！"
10043040-68 = "再一次！再一次！朝向閃閃發光的明天！"
10043040-73 = "居然這麼熱情地幫勇士隊加油……"
10043040-74 = "真的太感謝你了！#n我相信這一定能為大家注入滿滿的力量！"
10043040-75 = "你太客氣了！#n不過勇士隊指的是什麼呀？"
10043040-76 = "咦，咦！？"
10043040-77 = "就是……現在正在比賽的球隊啊。"
10043040-78 = "他們正在和多年的勁敵阿比西尼亞比賽，你不是來幫他們應援的嗎……？"
10043040-79 = "這我倒是不太清楚！"
10043040-80 = "我只是聽說有人需要加油……"
10043040-81 = "就興奮地直接跑過來了！"
10043040-82 = "真的只是因為這樣而已？"
10043040-83 = "嗯！沒錯！我喜歡幫別人加油！"
10043040-84 = "如果我的加油能帶給別人力量……#n讓人在放棄之前鼓起勇氣再挑戰一次……"
10043040-85 = "而且情況可以稍微好轉，哪怕只有一點也好！"
10043040-86 = "天底下還有比這更美好的事情嗎？"
10043040-87 = "如果團長在這裡的話……"
10043040-88 = "他肯定也會說，這是真正將救護帶給了需要的人吧？"
10043040-89 = "[s]「嗯，感覺他確實會說這種話呢。」"
10043040-90 = "老實說，棒球場的觀眾席……充斥著各種混雜的情緒。"
10043040-91 = "居然能在這裡感受到如此純粹的熱情，真的很令人佩服。"
10043040-92 = "嗯……或許我們……"
10043040-93 = "早就已經迷失了真正重要的東西也說不定……"
10043040-94 = "[s]「連我都覺得被療癒了……」"
10043040-95 = "那個，能請教花繪同學一個問題嗎？#n你在這附近和其他的觀眾席……"
10043040-96 = "有看到什麼可疑或行為古怪的人嗎？"
10043040-97 = "或者看起來特別希望某個隊伍獲勝或落敗的人也可以。"
10043040-102 = "唔嗯……不好意思，我沒有注意到耶！"
10043040-104 = "這樣啊……"
10043040-105 = "從某個角度來說，你或許是這裡看起來最可疑的人……"
10043040-106 = "不過同時也是最不可能是犯人的人呢，花繪同學。"
10043040-107 = "咦？犯人？"
10043040-108 = "沒什麼，這件事說來話長。#n雖然今天是第一次見到花繪同學，但我真心覺得你是個很好的人。"
10043040-109 = "謝謝你把活力分享給大家。"
10043040-110 = "……那正是勇士隊迫切需要的東西。"
10043040-111 = "雖然不是很懂，但我很高興能幫得上忙。"
10043040-116 = "花繪醬？這邊也需要幫忙！"
10043040-120 = "啊！看來又有其他地方需要應援了呢！"
10043040-121 = "那麼老師和莉同學，下次見囉！我先告辭了！"
10043040-125 = "[ns]「連再見都來不及說就跑走了……」"
10043040-126 = "真是活力十足呢。#n就像……不知道這樣比喻對不對……"
10043040-127 = "他給我的感覺，就像全壘打一樣。"
10043040-128 = "[s]「全壘打？」"
10043040-129 = "……"
10043040-130 = "儘管看法因人而異，但我個人認為全壘打就是棒球最精華的瞬間。"
10043040-131 = "雖然有些人認為安打比全壘打更好……"
10043040-132 = "因為在特定情況下，安打可以達到讓投手更加緊張，從而引發守備失誤的效果。"
10043040-133 = "不過也有人反駁說，全壘打才是完全不受任何變數影響，得分率100%的得分方式。"
10043040-134 = "還有人說全壘打是團隊合作最棒的成果。"
10043040-135 = "但這些都不重要。#n雖然我並不討厭用數字或統計來探討棒球……"
10043040-139 = "可是對我來說，全壘打是個例外。"
10043040-140 = "究竟是為什麼呢？#n一時之間我也沒辦法說得很清楚……"
10043040-141 = "能讓領先的隊伍擴大優勢，為落後的隊伍帶來逆轉的希望。"
10043040-142 = "我喜歡全壘打畫出的美麗弧線。"
10043040-143 = "喜歡白球筆直飛向高空的樣子。"
10043040-144 = "打者在壘包間暢行無阻的身影……真的非常帥氣。"
10043040-145 = "全壘打是能夠帶來希望──讓所有人相信自己「做得到」的存在。#n是活力，是生機，是原動力。"
10043040-146 = "我一直以為，這些東西是非常難能可貴的……"
10043040-147 = "但花繪同學卻能如此自然地將它們分享給周圍的人。"
10043040-148 = "……要是我也能像他一樣，純粹熱愛著某件事物就好了。"
10043040-149 = "[s]「莉不也是這樣的人嗎？」"
10043040-150 = "這個嘛……"
10043040-151 = "勝敗乃兵家常事。"
10043040-152 = "這就是比賽與競爭……也是運動的一部分。"
10043040-153 = "老師應該知道……我們千年棒球部並不是隻強隊。"
10043040-154 = "……就連對上工程師部製作的機器人，也幾乎沒有贏過任何一場練習賽。"
10043040-155 = "不過我還是非常喜歡棒球。"
10043040-156 = "所以應該坦然接受隨之而來的勝與敗──雖然這樣的結論看似正確……"
10043040-157 = "可是……我果然還是好想贏哦。嘿嘿。"
10043040-158 = "我想嚐到勝利的果實。"
10043040-159 = "既然努力過了，當然會希望得到可以接受的結果。"
10043040-160 = "會這樣想的人，肯定不只我一個。#n勇士隊熱情的粉絲們，一定比我更渴望拿下隊史首勝才對。"
10043040-161 = "……畢竟勇士隊真的有很多特別熱情的粉絲。"
10043040-162 = "如果有人能在這種時候打出一隻全壘打，扭轉比賽的氣氛與局面……"
10043040-163 = "最終帶領勇士隊獲得勝利的話，不知道會有多帥呢……"
10043040-168 = "雖然還是學生，但心態相當成熟呢。"
10043040-169 = "沒錯沒錯……要看勇士隊的比賽，就不能缺少這種心態啊。"
10043040-173 = "請，請問您是哪位！？"
10043040-174 = "啊！是綽號「佛祖」的勇士隊20年老粉！"
10043040-175 = "因為應援的時候總是面帶慈祥的笑容，所以才有了「佛祖」這個綽號……！"
10043040-177 = "呵呵呵，你過獎了。#n我只是一個單純喜歡棒球的普通粉絲而已。"
10043040-178 = "這樣啊……"
10043040-179 = "棒球的世界真的很迷人呢！"
10043040-180 = "能讓我們這些球迷就算是初次見面，也能馬上打成一片。"
10043040-181 = "所有人都沈浸在同一個場景，感受著相同的心情，為同一件事著迷……"
10043040-182 = "這不正是棒球……或者更進一步來說，是運動的迷人之處嗎，老師！"
10043040-188 = "目前的球數是三壞一好……打中了！#n是顆弧度偏平緩的二壘飛球！"
10043040-189 = "哎呀！"
10043040-190 = "掉球了！勇士隊的二壘手掉球了！跑者順勢回到了本壘！"
10043040-191 = "真不敢相信！二壘手居然掉球了！"
10043040-192 = "這究竟是什麼情況！"
10043040-195 = "……"
10043040-199 = "你們這些傢伙！這樣還好意思自稱選手嗎！"
10043040-200 = "連個普通飛球都能漏接，丟不丟臉啊！"
10043040-201 = "快點打包回家吃自己啦！啊啊啊啊啊──！！！"
10043040-202 = "[s]「佛，佛祖大人發飆啦！？」"
10043040-206 = "……"
10043040-207 = "那個……老師。"
10043040-208 = "畢竟有句話叫「事不過三」嘛……"

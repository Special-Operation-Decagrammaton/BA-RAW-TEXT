[translation]
10043040-1 = "ตอนที่ 4;การพบกันที่ไม่คาดคิด"
10043040-2 = "เฮ้อ พวกเราไม่ได้หยุดหย่อนกันเลยนะคะ ผู้ชมก็มากันเยอะกว่าที่คิดด้วยค่ะ"
10043040-3 = "แต่ก็นะ ที่นี่ไม่ได้มีแต่แฟนของทีมเบรฟส์ แต่มีแฟนทีมเรเดอร์ด้วยนี่เนอะ"
10043040-4 = "แบบนี้การแข่งขันน่าจะจบก่อนที่เราจะสำรวจถึงครึ่งสนามก็ได้ค่ะ..."
10043040-9 = "มาสนุกกัน! ในเทศกาลที่ยิ่งใหญ่ของเรา!"
10043040-13 = "เป็นการเชียร์ที่มีพลังจังเลยนะคะ ถึงจะไม่รู้ว่าเป็นใคร แต่ก็ทำให้ฉันมีกำลังใจขึ้นมานิดหน่อยเลยค่ะ"
10043040-14 = "ถึงจะไม่ควรพูดแบบนี้... แต่ปกติแล้ว เสียงเชียร์ของทีมเบรฟส์จะดรอปไปในช่วงกลางของการแข่งขัน#nน่ะค่ะ..."
10043040-15 = "[s] \"เดี๋ยวนะ เสียงนี้มัน...?\""
10043040-16 = "คุณครู?"
10043040-19 = "ออกแรงอีกนิด! ฟิตแรงอีกหน่อย! สู้ไม่ถอยให้ทีม..."
10043040-23 = "ให้ทีม... ทีมอะไรนะ...? ช่างเถอะ!"
10043040-24 = "ติดปีกแห่งความฝัน! แล้วบินไปให้ไกลสุดฟ้า!"
10043040-30 = "เอ๋?"
10043040-31 = "คุณครู!!!"
10043040-35 = "ฮิฮิฮิ ได้เจอคุณครูในที่แบบนี้ด้วย ฉันโชคดีจังเลยนะคะ!"
10043040-36 = "[s] \"เหวอ! ใจเย็นๆ ก่อนนะ ฮานาเอะ!\""
10043040-37 = "เอ่อ... คุณครู? คนนี้คือ... ใครเหรอคะ...?"
10043040-38 = "สวัสดีค่ะ! ฉันชื่ออาซากาโอะ ฮานาเอะ! อยู่ชั้นปีที่ 1 โรงเรียนสามัญทรีนิตี้ สังกัดชมรมอัศวินบรรเทาทุกข์ค่ะ! ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!"
10043040-39 = "[s] \"ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ ดีใจที่ได้เจอนะ ฮานาเอะ\""
10043040-40 = "ค่ะ! ฉันก็ดีใจเหมือนกันค่ะ คุณครู! ว่าแต่คุณครูอยู่กับใครเหรอคะ?"
10043040-41 = "ตอนนี้เหมือนเหตุการณ์มันจะตีกันไปหมดนะคะ..."
10043040-42 = "อืม... สวัสดีค่ะ ฉันโนมาสะ เรย์ ชั้นปีที่ 1 จากโรงเรียนวิทย์มิลเลเนียมค่ะ#nฉันอยู่... ชมรมออกกำลังกายค่ะ"
10043040-43 = "แต่ก็สังกัดชมรมเบสบอลมิลเลเนียมไปด้วย! แล้วฉันก็... เป็นแบตเตอร์ลำดับที่ 4 ค่ะ!"
10043040-44 = "ว้าว อย่างนั้นเหรอคะ! ยอดเยี่ยมเลยค่ะ!"
10043040-45 = "คุณฮานาเอะสนใจเกี่ยวกับเบสบอลเหรอคะ?!"
10043040-46 = "ฉันไม่มีความรู้เรื่องเบสบอลเลยสักนิดค่ะ!"
10043040-47 = "งะ... งั้นสินะคะ..."
10043040-48 = "ตอนนี้ฉันกำลังเชียร์กีฬาอยู่ก็จริง แต่ถ้าอยากได้การปฐมพยาบาลก็บอกได้ตลอดเลยนะคะ ก็ฉันเป็นอัศวินบรรเทาทุกข์นี่คะ!"
10043040-49 = "ฉันเจอผู้ชมหลายคนเลยค่ะที่บ่นปวดหัวกะทันหันกันที่นี่..."
10043040-50 = "จากหนังสือทางการแพทย์ที่ฉันหาเจอเมื่อนานมาแล้วในห้องสมุดทรีนิตี้!"
10043040-51 = "ว่ากันว่าอาการปวดหัวจะเกิดขึ้นเมื่อมีพลังงานด้านลบเข้ามาในสมองอย่างกะทันหันจนทำให้ความคิด#nสับสนและเวียนหัวค่ะ!"
10043040-52 = "ถ้าจะขับไล่พลังงานด้านลบออกไป ก็ต้องผ่ากะโหลกศีรษะออกแล้วฆ่าเชื้อด้วยน้ำส้มสายชู..."
10043040-53 = "แล้วจะลืมไปเลยว่าเคยปวดหัวค่ะ!"
10043040-54 = "[s] \"ไม่ได้นะ! ทำแบบนั้นไม่ได้เด็ดขาด ฮานาเอะ!\""
10043040-55 = "งั้นเหรอคะ? ถ้างั้นคำอธิบายในบทที่ 2 ก็อาจจะถูกต้องก็ได้นะคะ ในนั้นบอกว่าสาเหตุของอาการปวด#nศีรษะคือการหลั่งน้ำดีสีดำมากเกินไป..."
10043040-56 = "ถ้างั้นก็ต้องบดเมล็ดสกัลแคปให้ละเอียดแล้วทานกับน้ำผึ้งค่ะ แล้วอาการปวดหัวก็จะหายเป็นปลิดทิ้ง#nเลยค่ะ!"
10043040-57 = "(ไม่เคยได้ยินวิธีรักษาแบบนี้มาก่อนเลย...)"
10043040-58 = "(ทรีนิตี้เป็นโรงเรียนชื่อดังมาตั้งแต่ดั้งเดิม หรือว่าจะพวกเขาจะพัฒนาวิธีการรักษาแบบนี้ขึ้นมาเองนะ?)"
10043040-64 = "[ns] \"ว่าแต่ฮานาเอะมาทำอะไรอยู่ที่นี่เหรอ?\""
10043040-65 = "ก็อย่างที่เห็นเลยค่ะ ฉันกำลังเชียร์กีฬาอยู่!"
10043040-66 = "อยากดูมั้ยล่ะคะ คุณครู? คุณเรย์ก็ด้วยค่ะ!"
10043040-67 = "เย้ยฟ้า ท้าดิน ได้ยิน ถึงสวรรค์! ปิดถนน เปิดสวรรค์ เทวดา ลงมาเชียร์!"
10043040-68 = "หนึ่ง สอง! หนึ่ง สอง สาม! หนึ่ง สอง หนึ่ง สอง หนึ่ง! เฮ้!!"
10043040-73 = "อันนี้คือเชียร์ทีมเบรฟส์ใช่มั้ยคะ..."
10043040-74 = "ขอบคุณที่ช่วยเชียร์นะคะ! กำลังใจต้องส่งไปถึงทุกคนอย่างแน่นอนค่ะ!"
10043040-75 = "ด้วยความยินดีค่ะ! ว่าแต่... เบรฟส์คืออะไรเหรอคะ?"
10043040-76 = "คะ... คะ?!"
10043040-77 = "เอ่อ... เบรฟส์ก็คือ... ทีมที่กำลังแข่งขันอยู่ตอนนี้ไงคะ?"
10043040-78 = "คุณไม่ได้กำลังส่งแรงใจให้เบรฟส์ในการแข่งขันกับศัตรูดั้งเดิมอย่างอะบิสซิเนียนอยู่หรอกเหรอคะ...?"
10043040-79 = "เรื่องแบบนั้นฉันไม่รู้หรอกค่ะ!"
10043040-80 = "ฉันแค่ได้ยินมาว่ามีคนต้องการกำลังใจอยู่ที่ไหนสักแห่ง..."
10043040-81 = "ก็เลยห้ามใจไว้ไม่ไหว แล้วรีบบึ่งมาที่นี่เลยค่ะ!"
10043040-82 = "หะ... เหตุผลแค่นี้น่ะเหรอคะ?"
10043040-83 = "ค่ะ! เหตุผลแค่นี้เลยค่ะ! ฉันชอบเชียร์และให้กำลังใจคนอื่นน่ะค่ะ!"
10043040-84 = "ถ้าการให้กำลังใจของฉันทำให้ใครบางคนมีแรงฮึดสู้ขึ้นมา... และถ้ามันช่วยให้เขาคนนั้นพยายาม#nอีกครั้งในสิ่งที่เกือบจะยอมแพ้ไปแล้ว..."
10043040-85 = "สุดท้ายแล้ว! ถ้ามีอะไรที่ทำให้ดีขึ้นได้แม้เพียงเล็กน้อยก็ตาม!"
10043040-86 = "ลองคิดดูสิคะ มันจะมีอะไรที่ดีไปกว่านี้อีกเหรอคะ?"
10043040-87 = "ถ้าหัวหน้ามาอยู่ที่นี่ด้วยละก็..."
10043040-88 = "จะเป็นการบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญอย่างแท้จริงเลยละค่ะ"
10043040-89 = "[s] \"อื้อ น่าจะเป็นอย่างนั้นจริงๆ นะ\""
10043040-90 = "ที่จริงอัฒจันทร์เบสบอลเป็นสถานที่ที่... เต็มไปด้วยอารมณ์ที่หลากหลายเลยค่ะ"
10043040-91 = "น่าประทับใจจริงๆ ที่คุณมาแสดงความมุ่งมั่นอันบริสุทธิ์ในสถานที่แห่งนี้"
10043040-92 = "ค่ะ... ฉันรู้สึกอย่างนั้นจากใจจริงเลยค่ะ..."
10043040-93 = "บางทีเราอาจสูญเสียสิ่งสำคัญบางอย่างจากที่ไหนสักแห่งก็ได้นะคะ..."
10043040-94 = "[s] \"ครูก็รู้สึกเหมือนได้รับการบรรเทาทุกข์เลย...\""
10043040-95 = "ว่าแต่ คุณฮานาเอะคะ? ไม่ทราบว่าแถวๆ นี้... หรือในส่วนอื่นของอัฒจันทร์"
10043040-96 = "คุณเห็นใครที่ดูน่าสงสัยหรือทำอะไรผิดปกติบ้างมั้ยคะ?"
10043040-97 = "หรือคนที่หวังอย่างแรงกล้าให้ทีมไหนแพ้หรือชนะน่ะค่ะ"
10043040-102 = "อืม... ขอโทษด้วยค่ะ! ฉันไม่รู้หรอกค่ะ!"
10043040-104 = "งั้นเหรอคะ..."
10043040-105 = "ที่จริงก็ขึ้นอยู่กับว่าจะมองยังไง แต่สำหรับคุณฮานาเอะแล้ว ในบางแง่มุม..."
10043040-106 = "คนที่ดูน่าสงสัยที่สุดในที่แห่งนี้ อาจจะมีโอกาสในการเป็นคนร้ายน้อยที่สุดก็ได้สินะคะ"
10043040-107 = "เอ๋? พูดเรื่องอะไรเหรอคะ? คนร้ายงั้นเหรอคะ?"
10043040-108 = "ไม่หรอกค่ะ ฉันแค่พูดไปอย่างนั้นน่ะค่ะ ถึงวันนี้ฉันจะได้เจอคุณฮานาเอะเป็นครั้งแรก แต่ฉันก็ชอบคุณฮานาเอะอย่างที่เป็นนะคะ"
10043040-109 = "ขอบคุณมากที่มาให้กำลังใจทุกคนนะคะ"
10043040-110 = "มันเป็นสิ่งที่... เบรฟส์กำลังต้องการจริงๆ ค่ะ"
10043040-111 = "ฉันไม่ค่อยเข้าใจเท่าไร แต่ถ้าฉันช่วยได้ ฉันก็ดีใจค่ะ!"
10043040-116 = "ฮานาเอะจัง? มาช่วยตรงนี้หน่อยสิ! นักกีฬาตรงนี้อยากได้แรงเชียร์น่ะ!"
10043040-120 = "อ๊ะ! เหมือนจะมีจุดที่ฉันต้องไปส่งแรงเชียร์นะคะ!"
10043040-121 = "ถ้างั้น คุณครู คุณเรย์! ไว้เจอกันใหม่นะคะ! ฉันขอตัวก่อนค่ะ!"
10043040-125 = "[ns] \"ไปซะแล้ว ยังไม่ทันได้บอกลาเลย...\""
10043040-126 = "เป็นคนที่มีพลังงานล้นเหลือเลยนะคะ เหมือนกับ... อืม... ไม่รู้เหมือนกันนะคะว่าเปรียบเทียบแบบนี้จะ#nถูกหรือเปล่า"
10043040-127 = "แต่คุณฮานาเอะเหมือนโฮมรันเลยค่ะ"
10043040-128 = "[s] \"โฮมรันเหรอ?\""
10043040-129 = "......"
10043040-130 = "แต่ละคนอาจมีมุมมองที่ต่างกัน แต่ฉันคิดว่าโฮมรันคือหัวใจของเบสบอลค่ะ"
10043040-131 = "ในบางสถานการณ์ มันทำให้พิชเชอร์ยิ่งประหม่ามากขึ้น และก็นำไปสู่ความผิดพลาดของผู้เล่นฝ่ายรับ#nได้ด้วย"
10043040-132 = "บางคนก็เลยบอกว่าการตีลูกได้แต้มดีกว่าลูกโฮมรันอีกค่ะ"
10043040-133 = "แต่โฮมรันก็เป็นวิธีเดียวที่จะทำคะแนนได้ 100% โดยไม่ขึ้นอยู่กับตัวแปรใดๆ ในสนามเลย"
10043040-134 = "บางคนก็เลยโต้แย้งว่าโฮมรันคือการเล่นแบบทีมที่ดีที่สุดค่ะ"
10043040-135 = "แต่ถึงอย่างนั้น ฉันเองก็ไม่ได้เกลียดการเข้าถึงเบสบอลด้วยตัวเลขหรือสถิติหรอกค่ะ..."
10043040-139 = "แต่สำหรับฉันแล้ว โฮมรันเป็นข้อยกเว้นค่ะ"
10043040-140 = "อืม... เพราะอะไรกันนะคะ? ฉันคงอธิบายอย่างชัดเจนด้วยคำพูดไม่ได้..."
10043040-141 = "สำหรับทีมที่มีแต้มนำอยู่ โฮมรันเป็นการตอกลิ่มยืนยันว่าชนะแล้วอย่างชัดเจน ส่วนทีมที่แต้มตามอยู่ มันคือความหวังว่าจากนี้พวกเขาเริ่มสู้กลับได้แล้ว"
10043040-142 = "ฉันชอบเส้นโค้งสวยๆ ที่เกิดจากลูกโฮมรัน"
10043040-143 = "แล้วก็ชอบภาพของลูกสีขาวที่ทะยานขึ้นไปบนฟ้า"
10043040-144 = "ภาพของแบตเตอร์ที่วิ่งไปถึงเบสต่างๆ ได้ครบโดยไม่มีสิ่งรบกวน... ฉันว่ามันเท่มากๆ เลยค่ะ"
10043040-145 = "โฮมรันเป็นสิ่งที่มอบความหวังให้แก่ทุกคนว่า 'เราจะทำได้' เป็นอะไรที่มีทั้งความทรงพลัง ทั้งมีชีวิตชีวา แล้วก็มีแรงขับเคลื่อนค่ะ"
10043040-146 = "ฉันคิดว่าของแบบนั้นเป็นสิ่งที่ไม่ได้ได้มาง่ายๆ ค่ะ..."
10043040-147 = "แต่คุณฮานาเอะเหมือนเป็นคนที่แบ่งปันสิ่งนั้นให้คนรอบข้างได้อย่างเป็นธรรมชาติเลย"
10043040-148 = "ถ้าฉันชอบอะไรอย่างบริสุทธิ์ได้แบบนั้นก็น่าจะดีนะคะ..."
10043040-149 = "[s] \"เรย์ก็เป็นอย่างนั้นไม่ใช่เหรอ?\""
10043040-150 = "งั้นเหรอคะ..."
10043040-151 = "แพ้ชนะเป็นเรื่องปกติที่มีให้เห็นเสมอค่ะ"
10043040-152 = "เพราะนั่นคือเกม คือการแข่งขัน... คือกีฬานี่คะ"
10043040-153 = "คุณครูก็น่าจะทราบดีว่า... ชมรมเบสบอลมิลเลเนียมของเราไม่ใช่ทีมที่ฝีมือดีอะไร"
10043040-154 = "ใช่ค่ะ ก็... แม้แต่ในการฝึกซ้อมกับหุ่นยนต์ที่ชมรมวิศวกรรมประดิษฐ์ให้ พวกเรายังไม่ค่อยชนะเลย"
10043040-155 = "แต่ยังไงฉันก็ยังชอบเบสบอลอยู่ดีค่ะ"
10043040-156 = "เพราะงั้นฉันจึงต้องยอมรับทั้งผลแพ้และชนะของเบสบอลด้วย การสรุปแบบนี้น่าจะถูกต้องแล้วละค่ะ..."
10043040-157 = "แต่ถึงยังไงการชนะมันก็ดีกว่านะคะ แหะๆ"
10043040-158 = "ฉันอยากเห็นชัยชนะค่ะ"
10043040-159 = "และถ้าชนะแล้วละก็ ฉันก็อยากให้มันเป็นผลลัพธ์ที่ยอมรับได้"

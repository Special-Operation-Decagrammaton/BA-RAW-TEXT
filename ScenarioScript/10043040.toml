[translation]
10043040-1 = "#title;제4화;뜻밖의 만남"
10043040-2 = "3;레이;04;우아, 정신이 없네요. 생각보다 관중분들이 더 많이 왔어요.\n#3;em;[땀]\n#3;a"
10043040-3 = "3;레이;05;하긴, 브레이브스 팬뿐만 아니라 레이더스 쪽 팬들도 와 있을 테니 말이에요."
10043040-4 = "3;레이;99;이러다가 절반도 못 찾아보고, 경기가 끝나버리는 건 아닐지 걱정이네요……."
10043040-5 = "#st;[0,0];instant;1;"
10043040-6 = "#clearST"

[translation]
11180-2 = "第18話;才不是什麼朋友！"
11180-3 = "柴關拉麵店"
11180-4 = "來了！！我要開動囉──！"
11180-5 = "一，一人一碗……我們真的可以這麼奢侈嗎？"
11180-8 = "你們是阿拜多斯他們的朋友吧。#n要加麵的話再跟我說。"
11180-11 = "……！？"
11180-12 = "明明這麼好吃居然會沒有客人。"
11180-13 = "應該是位置不好吧？畢竟在即將廢校的學校附近。"
11180-14 = "也對，反正好吃就行了。#n那麼，我要開動……"
11180-15 = "……才不是。"
11180-16 = "嗯？"
11180-17 = "才不是什麼朋友────！！"
11180-18 = "（哐！）"
11180-19 = "嗚哇！？"
11180-20 = "我知道問題出在哪裡了！！終於知道是哪裡讓我一直覺得不對勁了！#n這間店，問題就是這間店造成的！！"
11180-21 = "！？"
11180-22 = "怎麼回事！？"
11180-23 = "我們是來工作的！要冷酷！！像個不法之徒！！ "
11180-24 = "結果這間店是怎樣！不只可以把肚子填得飽飽的！！#n既溫暖又親切！還會向我們搭話，散發著和藹可親、像棉花糖一樣的氣氛！"
11180-25 = "感覺只要待在這裡，不論是誰都能成為好朋友！！"
11180-26 = "那不是件好事嗎……？"
11180-27 = "哪裡好！！簡直糟透了！#n這種店會成為通往真正惡徒道路上的絆腳石！！"
11180-28 = "我需要的是冷酷、無情和鐵血，才不是這種甜美的形象！！"
11180-29 = "是你想太多了吧……"
11180-30 = "……"
11180-31 = "也就是說……這間店必須消失才行對不對，亞瑠大人？"
11180-32 = "……咦？"
11180-33 = "（咻） "
11180-34 = "太好了，我終於能幫上亞瑠大人的忙了。"
11180-35 = "引爆裝置？為什麼拿那個出來……"
11180-36 = "遙香，你先等等……"
11180-38 = "（嗶）"
11180-39 = "……"
11180-40 = "……咦！？"
11180-42 = "（轟隆隆隆隆隆隆隆──！）"
11180-44 = "探測到前方半徑10km發生了爆炸！距離很近！！"
11180-45 = "10km的話……市區？難道是襲擊嗎！？"
11180-46 = "從衝擊波的型態看起來應該是C4炸彈引起的連鎖反應。 #n不是砲擊或轟炸……我再進一步確認清楚！"
11180-47 = "……已確認爆炸位置在市區！！#n準確的位置是……"
11180-48 = "柴關拉麵店……！？"
11180-49 = "柴關拉麵店被炸得灰飛煙滅了！"
11180-50 = "哈啊！？怎麼回事！？為什麼那間店會被針對啊！ "
11180-51 = "明明那裡既不是戰略要地，也不是主要道路。究竟是誰……"
11180-52 = "難，難道是針對我……？"
11180-53 = "之後再想也不遲。先採取行動吧！"
11180-54 = "沒錯！現在不是想這些的時候了！！我們趕緊去看看吧！"
11180-55 = "我來聯絡星野前輩，出動！！"
11180-57 = "怎，怎麼會這樣！！#n老闆……一定要平安無事啊……！"
11180-59 = "（煙霧彌漫……）"
11180-61 = "咳咳，咳咳……哇，建築物整個不見了耶？"
11180-62 = "咳咳……這到底是……"
11180-63 = "（眼冒金星）"
11180-65 = "下一話;混蛋，不可饒恕！"

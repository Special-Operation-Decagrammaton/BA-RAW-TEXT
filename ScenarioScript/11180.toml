[translation]
11180-2 = "Episode 18;We're Not Their Friends!"
11180-3 = "Shiba Seki Ramen Shop"
11180-4 = "We're here! Time to carbo-load!"
11180-5 = "And we each get our own bowl. How luxurious."
11180-8 = "You're friends of those Abydos kids, aren't you? Let me know if I can get you anything else. "
11180-11 = "...?!"
11180-12 = "This ramen is so good. How does this shop not get more customers?"
11180-13 = "Maybe they need to move to a better location? They're right next to a failing school after all."
11180-14 = "I guess so. Not that I really care as long as the food is good. Let's eat..."
11180-15 = "We're not..."
11180-16 = "Hmm?"
11180-17 = "We're not their friends!"
11180-18 = "*slam*"
11180-19 = "What?!"
11180-20 = "You know what my problem is? I've figured it out. It's this shop!#nThat's what my problem is!"
11180-21 = "...?!"
11180-22 = "What has gotten into you?!"
11180-23 = "We're here to work, right? Dangerous, hard-boiled, rough-and-tumble work! Like outlaws!"
11180-24 = "But what's this place? A little shop that feeds you when you get hungry!#nIt's cushy, warm, and the people here are nothing but nice to you!#nThey even have the nerve to start polite conversation!"
11180-25 = "We're going to be friends and regulars if we keep coming here like this!"
11180-26 = "And...? What's wrong with that?"
11180-27 = "It's ruining everything! How am I ever going to be a real, true-blue villain if I keep coming to a heartwarming hole-in-the wall like this?!"
11180-28 = "What I need right now is cold-blooded ruthlessness and steely determination! Not this load of sweetness and fluff!"
11180-29 = "Geez, you don't have to be so serious about it..."
11180-30 = "..."
11180-31 = "So...you're saying that this shop needs to go, Aru?"
11180-32 = "Huh?"
11180-33 = "*scooch*"
11180-34 = "I'm so glad. Now I can finally be of assistance to you."
11180-35 = "Hey, what are you doing with that detonator?"
11180-36 = "Haruka! W-Wait a sec!"
11180-38 = "*click*"
11180-39 = "..."
11180-40 = "Eh...?"
11180-42 = "*BOOOOOOOOM*"
11180-44 = "An explosion has been detected within a ten-kilometer radius!"
11180-45 = "Ten kilometers? Isn't that downtown? Is it an ambush?!"
11180-46 = "It looks like the shockwaves were set off by a chain reaction of C4. It doesn't seem like any sort of bombardment, but I'll try to find out more!"
11180-47 = "The explosion WAS downtown! The exact location is..."
11180-48 = "Shiba Seki Ramen?!"
11180-49 = "Shiba Seki Ramen has been completely obliterated!"
11180-50 = "What?! N-No way! Why would that place be a target for anyone?"
11180-51 = "It's not a strategic location, and it's not part of a major transportation route. Why would someone...?"
11180-52 = "No way... Could they have been targeting me?!"
11180-53 = "We can try to guess what happened later. We need to get moving!"
11180-54 = "She's right! Now's not the time! Let's head over right away!"
11180-55 = "I'll send word to Hoshino. C'mon, let's go!"
11180-57 = "I-I can't believe it! I really hope Master is all right..."
11180-59 = "*woosh*"
11180-61 = "*cough* Wow, will you look at that? The entire building's been leveled."
11180-62 = "*cough* *cough* What in the world...?"
11180-63 = "*dazed*"
11180-65 = "Next Episode;You'll Pay for This!"

[translation]
11180-2 = "ตอนที่ 18;ไม่ใช่เพื่อนกันสักหน่อย!"
11180-3 = "ชิบะเซกิ ราเม็ง"
11180-4 = "มาแล้ว!! จะทานให้อร่อยเลยค่า!"
11180-5 = "ได้คนละชามเลย... เราจะกินหรูฟูฟ่ากันแบบนี้ได้ด้วยเหรอคะ?"
11180-8 = "เพื่อนๆ ของเด็กโรงเรียนอะบิดอสสินะ ถ้าไม่อิ่มก็บอกได้เลย"
11180-11 = "...?!"
11180-12 = "ราเม็งอร่อยขนาดนี้ แต่ทำไมถึงขายไม่ดีกันนะ น่าเสียดายจัง"
11180-13 = "เพราะว่าทำเลไม่ดีหรือเปล่า? ดันมาอยู่ในเขตโรงเรียนที่จะล้มละลายแบบนี้..."
11180-14 = "แค่อร่อยก็พอแล้วน่า เอาละ มากิน..."
11180-15 = "ไม่ใช่..."
11180-16 = "หืม?"
11180-17 = "ไม่ใช่เพื่อนกันสักหน่อย!!"
11180-18 = "(โครม!)"
11180-19 = "อะไรเนี่ย?!"
11180-20 = "ฉันรู้แล้วว่าปัญหาคืออะไร!! รู้แล้วว่าอะไรที่มากวนใจ! ร้านนี้ไง ร้านนี้แหละที่เป็นปัญหา!!"
11180-21 = "?!"
11180-22 = "หมายความว่าไงน่ะ?!"
11180-23 = "พวกเรามาทำงานนะ! ทำงานอย่างร้ายกาจเหมือนพวกนอกกฎหมาย!!"
11180-24 = "แล้วนี่มันอะไรกัน! พอหิวก็เอาราเม็งมาให้กินจมอิ่ม!! แถมยังใจดีกับพวกเรา! แล้วมาชวนคุยอย่างเป็นกัน#nเองอีก บรรยากาศที่อบอุ่นแบบนี้มันอะไรกัน!"
11180-25 = "ถ้ามาอยู่ที่นี่ เดี๋ยวทุกคนก็ได้กลายเป็นเพื่อนรักกันพอดี!!"
11180-26 = "แบบนั้นก็ดีแล้วไม่ใช่เหรอ...?"
11180-27 = "ดีอะไรกันล่ะ!! แบบนี้มันทำให้ทุกอย่างผิดแผนไปหมดแล้ว! ถ้าฉันจะเป็นคนร้ายอย่างแท้จริงให้ได้ ก็ต้อง#nทำลายร้านแบบนี้เสียก่อน!!"
11180-28 = "สิ่งที่ฉันต้องการคือ ความเหี้ยมโหดที่ไร้ความปรานี! ไม่ใช่ความอบอุ่นอะไรแบบนี้!!"
11180-29 = "เดี๋ยวสิ.. ทำไมถึงคิดจริงจังขนาดนั้น..."
11180-30 = "......"
11180-31 = "งั้นก็แปลว่า... เราต้องทำลายร้านนี้ใช่มั้ยคะท่านอารุ?"
11180-32 = "หืม?"
11180-33 = "(พรึ่บ)"
11180-34 = "ดีจังเลยนะคะ ในที่สุดฉันได้ทำอะไรที่เป็นประโยชน์ต่อท่านอารุสักที"
11180-35 = "อุปกรณ์จุดระเบิดเหรอ? หยิบของแบบนั้นออกมาทำไม..."
11180-36 = "ฮารุกะ เดี๋ยวก่อน...!"
11180-38 = "(ติ๊ด...)"
11180-39 = "......"
11180-40 = "เอ๋...?"
11180-42 = "(ตู้มมมมมมมม)"
11180-44 = "ตรวจพบการระเบิดในรัศมี 10 กม. ข้างหน้าค่ะ! ใกล้เรามากเลย!!"
11180-45 = "ในระยะรัศมี 10 กม. เหรอ...? นั่นมันในเมืองนี่นา หรือว่ามีใครบุกมา?!"
11180-46 = "ดูจากคลื่นกระแทกแล้ว น่าจะเป็นปฏิกิริยาต่อเนื่องจากระเบิด C4 ค่ะ ไม่ใช่ปืนใหญ่หรือทิ้งระเบิด...#nฉันจะลองตรวจสอบข้อมูลเพิ่มเติมค่ะ!"
11180-47 = "ได้พิกัดระเบิดแล้วค่ะ อยู่ในเมืองจริงๆ ด้วยค่ะ!! จุดศูนย์กลางอยู่ที่..."
11180-48 = "ชิบะเซกิ ราเม็ง...?!"
11180-49 = "ร้านราเม็งชิบะเซกิโดนระเบิดถล่มจนหายไปแล้วค่ะ!"
11180-50 = "อะไรนะ?! ปะ.. เป็นไปไม่ได้! ทำไมร้านราเม็งถึงกลายเป็นเป้าหมายระเบิดไปได้ล่ะ!"
11180-51 = "ที่นั่นไม่ใช่ทั้งจุดยุทธศาสตร์หรือถนนสายหลักนี่นา แล้วใครกัน..."
11180-52 = "หรือว่าตั้งใจจะเล่นงานฉัน...?"
11180-53 = "เรื่องนั้นเอาไว้ทีหลังเถอะ ตอนนี้เราต้องเตรียมแผนรับมือกันก่อน!"
11180-54 = "ใช่ค่ะ เรื่องอื่นเอาไว้คิดทีหลัง!! ตอนนี้เราไปดูที่นั่นก่อนดีกว่าค่ะ!"
11180-55 = "ฉันจะติดต่อรุ่นพี่โฮชิโนะเองค่ะ ตอนนี้รีบไปกันเถอะค่ะ!"
11180-57 = "มะ.. ไม่จริงน่า!! มาสเตอร์ต้องปลอดภัยนะ...!"
11180-59 = "(ควันโขมง)"
11180-61 = "(แค่ก แค่ก) ร้านหายไปแบบไร้ร่องรอยเลย"
11180-62 = "(แค่ก แค่ก) ทำไมถึง..."
11180-63 = "(มึน...)"
11180-65 = "ตอนต่อไป;ยกโทษให้ไม่ได้!"

10012030-108 = "......? อายาเนะ?"
10012030-112 = "ฉันเป็นห่วงก็เลยตามมาน่ะค่ะ... แล้วก็เป็นอย่างที่คิดเลยค่ะ"
10012030-113 = "[s9] \"อายาเนะ? มาที่นี่ได้ไง...\"\n[s10] \"ตั้งใจตามมาเหรอ?\""
10012030-114 = "มะ... ไม่ค่ะ คือว่า... จะให้อยู่ด้วยกันแค่สองคนมันก็... ค่อนข้างจะ... ฉันก็เลย..."
10012030-115 = "มะ... ไม่ค่ะ คือว่า... จะปล่อยให้อยู่ด้วยกันแค่สองคนมันก็... ดูจะ... แบบว่า..."
10012030-116 = "คนอื่นก็พูดไปในทางเดียวกัน... เอ่อ..."
10012030-117 = "อื้ม... ขอบใจนะอายาเนะ"
10012030-119 = "ถ้างั้นฉันจะเป็นคนจับคันเบ็ด แล้วใช้ปืนพกของอายาเนะยิงแล้วกัน..."
10012030-120 = "เราใช้ปืนยิงปลาไม่ได้สิคะรุ่นพี่... ไม่ว่าจะปืนเล็กๆ หรือปืนใหญ่ก็ไม่ได้ทั้งนั้นค่ะ"
10012030-121 = "ฉันเอากระชอนมาแล้ว ใช้กระชอนตักดีๆ เถอะค่ะ ถ้าปลายังตัวเป็นๆ อยู่ ตอนเอาไปทำอาหาร#nมันก็จะยิ่งอร่อยนะคะ"
10012030-122 = "อืม... ก็ได้"
10012030-123 = "[s] \"ชิโรโกะเนี่ยเชื่อฟังอายาเนะจังเลยนะ\""
10012030-124 = "คะ... คะ!?"
10012030-125 = "ชะ... เชื่อฟังอะไรกันคะ!?  ไม่ใช่อย่างนั้นหรอกค่ะ ไม่ใช่ๆ ฉันไม่ได้มาดุหรือสั่งอะไรนะคะ รุ่นพี่ชิโรโกะก็แค่..."
10012030-126 = "อื้ม... เชื่อฟังน่ะถูกแล้ว ก็อายาเนะตัดสินใจได้ดีเสมอไง"
10012030-127 = "รุ่นพี่ชิโรโกะ...?"
10012030-128 = "และถ้าอายาเนะไม่เห็นด้วยกับอะไร พวกเราก็จะไม่เห็นด้วยเหมือนกัน พวกเราไว้ใจอายาเนะกันหมดแหละ..."
10012030-129 = "ปลาที่ตกได้จากตรงนี้ ที่จริงฉันก็ว่าจะกลับไปถามอายาเนะก่อน"
10012030-130 = "ว่าเป็นปลาที่กินได้หรือเปล่า และมันมีพิษไหม"
10012030-132 = "หรือมันจะขายเป็นเงินได้ไหม..."
10012030-134 = "รุ่นพี่..."
10012030-135 = "พวกเธออยู่ตรงนี้เองสินะ!!"
10012030-140 = "หืม...? อะไรเนี่ย? ไม่ใช่กลุ่มเดียวกับที่เราเจอไปเมื่อกี๊นี่นา...?"
10012030-141 = "สงสัยจะมีกันหลายคนสินะ"
10012030-142 = "งั้นก็ดีเลย อยู่ด้วยกันนี่แหละจะได้จัดการรวดเดียวไปเลย!"
10012030-144 = "เอ่อ... คุณเป็นใครเหรอคะ..."
10012030-146 = "หึหึหึ... ครั้งนี้พวกเราไม่ยอมถอยให้หรอก คราวนี้เรามากับ 'กองกำลังเสริม' แล้วไงล่ะ!!"
10012030-147 = "เอาละ ได้เวลาออกโรงแล้ว โชว์ฝีมือให้คุ้มกับค่าจ้างด้วยนะ!"

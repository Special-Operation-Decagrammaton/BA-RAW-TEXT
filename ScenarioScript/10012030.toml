10012030-99 = "[ns] \"มะ... เมื่อกี้ว่ายังไงนะ?\""
10012030-100 = "นั่นคือวิธีตกปลาที่แน่นอนที่สุด ถ้าปลาตายแล้วก็จะหนีไปไหนไม่ได้น่ะ"

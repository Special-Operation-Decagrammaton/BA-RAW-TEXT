[translation]
10012030-1 = "第3話;先發制人"
10012030-14 = "我們的渡假勝地……"
10012030-15 = "整理之後意外的漂亮呢。"
10012030-16 = "[s1] 「哦～『我們的渡假勝地』～」\n[s2] 「看來似乎湧現了一點佔有慾呢？」"
10012030-17 = "我，我只是想說說看而已！#n……總之這樣就能住了吧。"
10012030-18 = "我，我只是想說說看而已！#n……總之這樣就能住了吧。"
10012030-19 = "嗯嗯！茜香醬說得沒錯。就這樣當作飯店接待客人也沒問題☆"
10012030-20 = "那，那個還太早了吧……#n只是打掃過而已，設施跟機器都還不能使用……"
10012030-21 = "必須確認控制室，把能使用的設備和系統重新啟動才行……"
10012030-22 = "而且還有其他房間要打掃……"
10012030-23 = "……不過，把房間整理好就覺得很舒暢呢。"
10012030-24 = "總覺得，房間裡看起來好像在發光呢。"
10012030-25 = "住宿的場所已經整理好了，差不多該去控制室……"
10012030-26 = "……也許要優先考慮糧食。"
10012030-31 = "……糧食？"
10012030-33 = "嗯，糧食。#n無人島生活中，下一個必須注意的重點就是為了生存的糧食問題。"
10012030-34 = "……生存？"
10012030-35 = "我們應該沒有陷入那麼緊急的狀況吧……#n而且這裡手機收得到訊號，也還有被遺棄的船……"
10012030-36 = "在這種地方，魚是補充動物性蛋白質的最佳選擇。"
10012030-37 = "……嗯。#n為了「生存」，我一定會抓到的。"
10012030-38 = "……完全沒聽進去呢，白子前輩。"
10012030-42 = "正巧這裡有釣魚的工具。"
10012030-46 = "……準備完成了，走吧。"
10012030-51 = "……不是什麼「正巧這裡有」，根本就是事先準備好的吧。"
10012030-52 = "白子醬充滿活力呢。"
10012030-53 = "……綾音醬，看來之後再去控制室比較好呢。"
10012030-55 = "嘛，糧食也很重要呢。電力可以之後再來想辦法……"
10012030-56 = "沒想到前輩對釣魚有興趣。#n不過確實，在阿拜多斯，也沒有可以釣魚的環境……"
10012030-57 = "因為是生存活動……釣魚也是其中一環。"
10012030-58 = "……啊啊，原來是想體驗生存啊。"
10012030-63 = "白子醬一個人的話，感覺就算陷入危險也會繼續下去……"
10012030-64 = "老師，能拜託你嗎？"
10012030-65 = "[s3] 「當然，交給我吧。」\n[s4] 「我去吧。」"
10012030-66 = "……老師？"
10012030-67 = "……老師？"
10012030-68 = "你要一起去嗎……？"
10012030-70 = "謝謝～那就拜託你囉，老師。"
10012030-71 = "我們會去附近找找有沒有其他東西！"
10012030-72 = "既然如此，我就期待會釣到大魚囉！"
10012030-74 = "……嗯。"
10012030-78 = "交給我吧。"
10012030-86 = "（於是便和白子一起尋找著適合的海岸）"
10012030-87 = "[ns5] 「這邊應該就可以了吧？」\n[ns6] 「有很多不錯的釣魚點呢。」"
10012030-88 = "……嗯，好。這邊就可以了。"
10012030-89 = "……嗯，好。這邊就可以了。"
10012030-90 = "釣竿、魚餌、水桶……隨時都能開始哦。"
10012030-91 = "[s] 「把釣到的魚撈上來的撈網呢？」"
10012030-92 = "那個不需要。"
10012030-93 = "老師幫我抓著釣竿的時候……"
10012030-94 = "我來開槍就行了。"
10012030-95 = "[s] 「原來如此……」"
10012030-99 = "[ns] 「……開槍？」"
10012030-100 = "這是最確實的釣魚方法。#n死掉的魚無法逃跑。"
10012030-101 = "……嗯？"
10012030-102 = "你說用槍射的話魚會碎掉？"
10012030-103 = "……說的也是。"
10012030-104 = "[s7] 「沒想到那部份呢。」\n[s8] 「……回去拿撈網吧。」"
10012030-105 = "……嗯。"
10012030-106 = "……嗯。"
10012030-107 = "……沒關係的，我把撈網拿來了。"
10012030-108 = "……咦，綾音？"
10012030-112 = "覺得有點擔心就跟過來看看……果然如此。"
10012030-113 = "[s9] 「綾音？怎麼了？」\n[s10] 「一起過來了嗎？」"
10012030-114 = "總，總覺得只有兩位的話有點擔心……"
10012030-115 = "總，總覺得只有兩位的話有點擔心……"
10012030-116 = "大家也那麼說……所以，那個……"
10012030-117 = "……嗯，謝謝你，綾音。"
10012030-119 = "那我來抓著釣竿，綾音用手槍來射擊……"
10012030-120 = "所以說用槍射是不行的啦前輩……才不是威力的問題呢。"
10012030-121 = "我把撈網拿來了，請用。"
10012030-122 = "……嗯。"
10012030-123 = "[s] 「總覺得白子很聽綾音的話呢。」"
10012030-124 = "……咦！？"
10012030-125 = "是，是這樣嗎……！？"
10012030-126 = "……嗯。綾音的判斷大致上都是正確的。"
10012030-127 = "……白子前輩？"
10012030-128 = "綾音說不是的時候，基本上我也都覺得不是。#n我想大家都是這麼想的。"
10012030-129 = "在這邊釣到的是不是可以吃的魚、有沒有毒……"
10012030-130 = "我也打算在料理前先問過綾音。"
10012030-132 = "當然，還有能不能賣錢……"
10012030-134 = "前輩……"
10012030-135 = "在這裡啊！！"
10012030-140 = "咦，好像不是剛才那些傢伙……？"
10012030-141 = "還有其他夥伴啊。"
10012030-142 = "那麼，在叫來其他夥伴前……"
10012030-144 = "這個……那個，請問您是哪位……？"
10012030-146 = "哼哼哼……這次我們是不會輸的。因為我們這邊可是有「支援部隊」的啊！！"
10012030-147 = "來，該你上場了。#n好好做與薪水相符的工作啊，"
10012030-148 = "[ruby= ・     ・ ]若藻[/ruby]！！"
10012030-153 = "[ns] 「……？」"
10012030-155 = "[ns] 「……？？？ ……你說誰？？？」"
10012030-157 = "哎呀哎呀……"
10012030-158 = "老實說真讓人失望。#n才這麼幾個人就讓你們陷入苦戰了嗎？"
10012030-159 = "這樣你們該怎麼狩獵這麼大的渡假勝地……連僅僅三個人……"
10012030-160 = "……嗯？"
10012030-161 = "那道……身影。"
10012030-162 = "莫非是……"
10012030-163 = "……老師？"
10012030-164 = "[s11] 「……若藻？」\n[s12] 「居然能在這種地方見面，真巧呢……」"
10012030-165 = "……？"
10012030-166 = "……？"
10012030-167 = "咦……什，什麼……？#n這，這是什麼情況……？"
10012030-172 = "……"
10012030-174 = "請，請先等一下……？先整理一下情況……"
10012030-178 = "……噫！？"
10012030-179 = "[s13] 「白子！？」\n[s14] 「突然就發動攻擊也太……」"
10012030-182 = "……嗯。"
10012030-183 = "先發制人。老師，拜託你指揮了。"

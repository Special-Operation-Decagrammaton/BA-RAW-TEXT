10012030-92 = "ไม่เป็นไรหรอก"
10012030-93 = "ตอนนั้นถ้าคุณครูช่วยจับคันเบ็ดไว้"
10012030-94 = "เดี๋ยวฉันจะคอยยิงปลาเอง"

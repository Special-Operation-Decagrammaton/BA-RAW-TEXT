[translation]
10012030-1 = "Episode 3; Preemptive Victory"
10012030-14 = "...We did a pretty good job."
10012030-15 = "Our resort actually looks nice after a good cleaning."
10012030-16 = "[s1] \"Wow, did you say 'our resort'?\"\n[s2] \"It's nice to see you taking pride in your work.\""
10012030-17 = "I just meant it's at least survivable living conditions now!"
10012030-18 = "I just meant it's at least survivable living conditions now!"
10012030-19 = "It's much more than survivable! We could probably start hosting guests."
10012030-20 = "Let's not get ahead of ourselves. We still have maintenance and repairs we need to do to get the facilities up and running."
10012030-21 = "We need to get everything working in the electrical room, set up recreational areas..."
10012030-22 = "There's still a lot of preparation to be done."
10012030-23 = "But I won't argue, it's wonderful to see the difference from when we arrived."
10012030-24 = "I wasn't expecting this venture to be so cathartic."
10012030-25 = "Well, enough patting ourselves on the back. Let's head to the electrical room."
10012030-26 = "...Food is first."
10012030-31 = "Food?"
10012030-33 = "Obviously. On an uninhabited island, securing food and water is the priority for survival."
10012030-34 = "S-Survival?"
10012030-35 = "Survival sounds a little bit intense... We have phone reception and everything, so we should be okay."
10012030-36 = "In this type of environment, we can look to fishing as a source of protein."
10012030-37 = "We have to consider these things in order to survive."
10012030-38 = "...There's no reasoning with her."
10012030-42 = "What a coincidence...we have fishing equipment right here."
10012030-46 = "All preparations for survival are complete. Now we must execute."
10012030-51 = "...It wasn't a coincidence. I packed fishing gear."
10012030-52 = "Now, now. Let's not rain on her parade."
10012030-53 = "Ayane, how about we figure out the electricity after our survival activities?"
10012030-55 = "Haha. I don't mind what order we do things. Okay!"
10012030-56 = "But I didn't know you liked fishing, Shiroko. It's not exactly a common pastime in Abydos."
10012030-57 = "It's not about the fishing. It's about the survival."
10012030-58 = "...I understand. I think."
10012030-63 = "I don't, but there's definitely no stopping her."
10012030-64 = "That being said, Sensei?"
10012030-65 = "[s3] \"Of course. I love fishing.\"\n[s4] \"Yes. I'll go with Shiroko.\""
10012030-66 = "Sensei?"
10012030-67 = "Sensei?"
10012030-68 = "You're coming too?"
10012030-70 = "Thank you! Please look after her, Sensei!"
10012030-71 = "We can look for food here! I bet there's lots of yummy fruits!"
10012030-72 = "You better catch something huge!"
10012030-74 = "Okay."
10012030-78 = "I won't disappoint."
10012030-86 = "Shiroko and I found a flat rock right on the seashore."
10012030-87 = "[ns5] \"It should be good here, right?\"\n[ns6] \"There's a lot of good fishing spots.\""
10012030-88 = "Yes. This will work."
10012030-89 = "Yes. But this spot will work."
10012030-90 = "Fishing rod, ground bait, lure, storage net... We have all the necessary tools."
10012030-91 = "[s] \"What about a landing net to scoop up the fish we catch?\""
10012030-92 = "That's not necessary."
10012030-93 = "Sensei, your job is to hold the fishing rod..."
10012030-94 = "...and mine is to shoot the fish."
10012030-95 = "[s] \"Ah, makes sense.\""
10012030-99 = "[ns] \"...Actually, can you repeat that?\""
10012030-100 = "I will shoot the fish. Dead fish can't escape."
10012030-101 = "Hm?"
10012030-102 = "The fish might be destroyed if I shoot it with a gun?"
10012030-103 = "Um... Oh..."
10012030-104 = "[s7] \"You forgot we have to eat the fish, huh?\"\n[s8] \"...Let's go get a net.\""
10012030-105 = "Maybe..."
10012030-106 = "Okay..."
10012030-107 = "It's a good thing I have one right here."
10012030-108 = "...Ayane?"
10012030-112 = "I had a feeling something would go wrong."
10012030-113 = "[s9] \"Ayane? What are you doing here?\"\n[s10] \"Were you following us the whole time?\""
10012030-114 = "W-Well... I was worried about sending just the two of you..."
10012030-115 = "W-Well... I was worried about sending just the two of you..."
10012030-116 = "And the others were too...so I came along..."
10012030-117 = "...I understand. Thanks, Ayane."
10012030-119 = "So, I'll shoot the fish with Ayane's gun instead."
10012030-120 = "It doesn't matter which gun you use...you can't shoot the fish."
10012030-121 = "We need to catch the fish alive if we're going to eat it. Please use the net I brought."
10012030-122 = "...Okay."
10012030-123 = "[s] \"Shiroko listens to Ayane pretty well.\""
10012030-124 = "M-Me?!"
10012030-125 = "Y-You're mistaken! Shiroko just..."
10012030-126 = "I do. Because Ayane always makes good decisions."
10012030-127 = "Wh-What?"
10012030-128 = "Ayane's judgment can always be counted on. All of us think that."
10012030-129 = "I planned on asking Ayane to inspect the fish I caught."
10012030-130 = "If they're edible, or poisonous..."
10012030-132 = "...or if they're worth any money."
10012030-134 = "Aw..."
10012030-135 = "Found you!"
10012030-140 = "These aren't the jerks we fought before."
10012030-141 = "This must be the rest of their crew."
10012030-142 = "Well, that's perfect! Divide and conquer!"
10012030-144 = "Um... Do we know you?"
10012030-146 = "Heeheehee. Things aren't going to go your way this time. We've bought reinforcements."
10012030-147 = "Now, didn't I say you'd pay the next time I saw you?"
10012030-148 = "Wakamo!"
10012030-153 = "[ns] \"...?\""
10012030-155 = "[ns] \"...Who???\""
10012030-157 = "This...This was your urgent business you came crying to me for?"
10012030-158 = "How boring. You needed reinforcements for two puny adversaries?"
10012030-159 = "You're unable to even achieve victory against little ants and expect to win the hunt?"
10012030-160 = "Hm?"
10012030-161 = "...!"
10012030-162 = "...What am I seeing?"
10012030-163 = "Sensei?"
10012030-164 = "[s11] \"...Wakamo?\"\n[s12] \"This is a plot twist.\""
10012030-165 = "...?"
10012030-166 = "...?"
10012030-167 = "What...? What is happening here?"
10012030-172 = "......"
10012030-174 = "I...I need a moment."
10012030-178 = "...W-Waaahh?!"
10012030-179 = "[s13] \"Shiroko?!\"\n[s14] \"With no warning?\""
10012030-182 = "Yes."
10012030-183 = "The best defense is offense. Please lead the way, Sensei."

10012030-102 = "กังวลว่าถ้ายิงปลาแล้วเนื้อมันจะแตกหมดเหรอ?"
10012030-103 = "อืม.... เรื่องนั้น..."
10012030-104 = "[s7] \"ไม่ได้คิดถึงเรื่องนี้ไว้สินะ\"\n[s8] \"กลับไปเอากระชอนกันเถอะ\""
10012030-105 = "อืม......"
10012030-106 = "ก็ได้..."

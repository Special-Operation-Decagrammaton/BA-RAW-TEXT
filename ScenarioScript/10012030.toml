[translation]
10012030-1 = "ตอนที่ 3;ชัยชนะในการบุกรุก"
10012030-14 = "พอเก็บกวาดอีกรอบก็ดูดีขึ้นเลยแฮะ"
10012030-15 = "รีสอร์ตของพวกเรา~"
10012030-16 = "[s1] \"โอ้ว~ 'รีสอร์ตของพวกเรา' เลยเหรอ~?\"\n[s2] \"จู่ๆ ก็รู้สึกเป็นเจ้าของขึ้นมาละสิท่า\""
10012030-17 = "ฉันก็แค่อยากลองพูดอะไรแบบนี้น่ะ...! เก็บกวาดแค่นี้ก็คงพักค้างคืนได้แล้วละ..."
10012030-18 = "ฉันก็แค่อยากลองพูดอะไรแบบนี้น่ะ...! เก็บกวาดแค่นี้ก็คงพักค้างคืนได้แล้วละ..."
10012030-19 = "อื้ม! เซริกะจังพูดถูกค่ะ ฉันว่าเราเก็บเรียบร้อยจนให้แขกเข้ามาพักได้เลยนะคะ"
10012030-20 = "บะ... แบบนั้นไม่ได้หรอกค่ะ เราก็แค่ทำความสะอาด แต่สิ่งอำนวยความสะดวกอื่นๆ ยังไม่พร้อมเลยค่ะ"
10012030-21 = "เรายังต้องเข้าไปในห้องควบคุมไฟฟ้าแล้วเปิดระบบใหม่อีกครั้ง ต้องเอาอุปกรณ์อำนวยความสะดวก#nออกมา แล้วก็เซ็ตของที่เอามาด้วยค่ะ"
10012030-22 = "แบบนี้เมื่อไรจะได้พักผ่อนจริงๆ กันนะ..."
10012030-23 = "แต่ฉันก็ยอมรับนะคะว่าพอเห็นพื้นที่ที่สะอาดขึ้น อารมณ์ก็ดีขึ้นมาเลยค่ะ"
10012030-24 = "เหมือนเป็นความรู้สึกโล่งใจที่ไม่เคยมีมาก่อนเลย..."
10012030-25 = "ไหนๆ ก็ได้ที่นอนแล้ว ต่อไปก็คงต้องเป็นห้องควบคุมไฟฟ้า..."
10012030-26 = "อาหารก่อนสิ..."
10012030-31 = "อาหาร?"
10012030-33 = "อืม อาหารไง เมื่อเราติดเกาะร้าง สิ่งแรกที่ต้องให้ความสำคัญคือเสบียงเพื่อความอยู่รอด"
10012030-34 = "หืม...? ความอยู่รอด??"
10012030-35 = "ฉันไม่คิดว่าเราจะเอาชีวิตกันไม่รอดนะ นี่ไม่ใช่สถานการณ์ที่ต้องคิดขนาดนั้นด้วย ที่นี่มีทั้งสัญญาณโทรศัพท์ แล้วก็เรือที่ถูกทิ้งไว้..."
10012030-36 = "ในสถานที่แบบนี้ การตกปลาเพื่อให้ได้โปรตีนมาเป็นวิธีที่ดีที่สุด"
10012030-37 = "ใช่แล้ว... นี่คือสิ่งที่ต้องทำเพื่อ 'ความอยู่รอด'"
10012030-38 = "ไม่ได้ฟังฉันเหรอรุ่นพี่..."
10012030-42 = "ที่นี่มีอุปกรณ์ตกปลาอยู่พอดี"
10012030-46 = "...เท่ากับว่าเตรียมอุปกรณ์สำเร็จแล้ว เหลือเพียงออกไปตกปลาก็เท่านั้น"
10012030-51 = "...'มีอยู่พอดี' อะไรกันล่ะ? เห็นเตรียมไว้อย่างจริงๆ จังๆ เลยต่างหากเล่า..."
10012030-52 = "บรรยากาศแบบนี้ไม่ควรทำให้หมดสนุกแฮะ"
10012030-53 = "อายาเนะจัง ฉันว่าเรื่องห้องควบคุมไฟฟ้าต้องเอาไว้ทีหลังแล้วละ"
10012030-55 = "กะ... ก็ได้ค่ะ เรื่องลำดับก่อนหลังมันไม่สำคัญเท่าไรหรอกค่ะ ที่จริงฉันก็เป็นห่วงเรื่องอาหารอยู่#nเหมือนกัน..."
10012030-56 = "จะว่าไปฉันไม่รู้เลยนะคะว่ารุ่นพี่สนใจเรื่องการตกปลาด้วย ที่อะบิดอสก็ไม่ได้มีสภาพแวดล้อมที่พอ#nจะตกปลาได้..."
10012030-57 = "มันเป็นส่วนหนึ่งของการเอาตัวรอดน่ะ จริงๆ ไม่จำเป็นต้องเป็นการตกปลาก็ได้"
10012030-58 = "อ้อ... เป็นอย่างนั้นสินะ"
10012030-63 = "งั้นก็คงจะขวางไว้ไม่ได้แล้วแฮะ"
10012030-64 = "ถ้างั้นก็... ครู? ช่วยอะไรอย่างหนึ่งได้ไหม?"
10012030-65 = "[s3] \"ได้อยู่แล้ว ครูจัดการให้เอง\"\n[s4] \"ครูไปกับชิโรโกะให้เอง\""
10012030-66 = "คุณครู...?"
10012030-67 = "คุณครู...?"
10012030-68 = "จะไปด้วยกันเหรอ...?"
10012030-70 = "ขอบคุณนะ~ งั้นก็ฝากด้วยนะครู~"
10012030-71 = "พวกฉันจะไปสำรวจรอบๆ แล้วหาว่ามีอะไรที่ใช้ได้บ้างค่ะ ผลไม้ที่ดูน่ากินๆ ก็เห็นมีเยอะเลยด้วย..."
10012030-72 = "ไหนๆ ก็จะไปตกปลาแล้ว งั้นเอากลับมาเยอะๆ นะรุ่นพี่!"
10012030-74 = "อื้ม..."
10012030-78 = "ไว้ใจฉันได้เลย"
10012030-86 = "(คุณครูกับชิโรโกะออกไปหาโขดหินชายทะเลที่พอจะยืนตกปลาได้)"
10012030-87 = "[ns5] \"ตรงนี้ก็คงได้แล้วเนอะ?\"\n[ns6] \"มีจุดตกปลาดีๆ เยอะเลย\""
10012030-88 = "อื้ม... เอาละ ตรงนี้ก็น่าจะได้"
10012030-89 = "อื้ม... เอาละ ตรงนี้ก็น่าจะได้"
10012030-90 = "เบ็ดตกปลา เหยื่อ ตาข่ายดักปลา... เราเอามาหมดแล้ว"

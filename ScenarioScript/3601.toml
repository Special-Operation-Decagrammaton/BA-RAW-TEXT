[translation]
3601-1 = "รสหวานและความคิดถึง 1"
3601-2 = "ฮู่ว..."
3601-3 = "ค่ะ มาเริ่มประชุมกันเถอะค่ะ"
3601-4 = "ถ้ามีเรื่องอะไรเป็นพิเศษก็ให้แจ้งมาได้เลยนะคะ"
3601-5 = "ค่ะ คุณนางิสะ เริ่มจากเหตุยิงกันที่บริเวณย่านคาเฟ่เมื่อประมาณ 6 โมงเย็นค่ะ"
3601-6 = "จากรายงานระบุว่าเกิดข้อขัดแย้งเรื่องการแย่งสตรอว์เบอร์รี่บนขนมหวานพิเศษจนทวีความรุนแรงขึ้น#nเป็นการยิงปะทะกันค่ะ"
3601-10 = "สตรอว์เบอร์รี่เหรอคะ...?"
3601-11 = "แค่เพราะสตรอว์เบอร์รี่ลูกเดียวเนี่ยนะ...?"
3601-12 = "และในรายงานระบุว่าหัวหน้าซึรุกิจากชมรมทวงความยุติธรรมถูกส่งไปควบคุมสถานการณ์แทน#nเนื่องจากรองหัวหน้าฮาสุมิไม่ได้เข้าเวรในวันนี้ค่ะ"
3601-13 = "ถ้าเป็นหัวหน้าซึรุกิไปเอง... ทางชมรมอัศวินบรรเทาทุกข์คงจะงานยุ่งไม่น้อยเลยสินะคะ "
3601-14 = "ค่ะ พวกเศษ... ไม่สิ นักเรียนที่ถูกซัดจนสลบหลายคนถูกส่งตัวไปรักษา และทางชมรมอัศวินบรรเทาทุกข์ได้ช่วยรักษาให้จนดึกเลยค่ะ"
3601-18 = "ดีแล้วละค่ะ ดูเหมือนทางชมรมอัศวินบรรเทาทุกข์น่าจะใช้อุปกรณ์รักษากับผ้าพันแผลไปเยอะมาก..."
3601-19 = "รบกวนแจ้งไปทางชมรมอัศวินบรรเทาทุกข์ด้วยนะคะว่าถ้าต้องการงบประมาณเพิ่มเติมให้ยื่นคำขอเข้า#nมาได้ค่ะ"
3601-24 = "เรื่องต่อไปล่ะคะ?"
3601-25 = "เหตุการณ์ต่อไปเกิดที่ชมรมอัศวินบรรเทาทุกข์..."
3601-26 = "เกิดเหตุผู้ป่วยตกใจและวิ่งหนีออกไปหลังเห็นเลื่อยไฟฟ้าในกล่องใส่อุปกรณ์การรักษา... "
3601-27 = "ทำให้การใช้ห้องรักษาห้องนั้นต้องหยุดชะงักไปค่ะ"
3601-28 = "แล้ว... ทำไมถึงมีเลื่อยไฟฟ้าอยู่ในอุปกรณ์การแพทย์ได้นะ... เฮ้อ..."
3601-29 = "ค่ะ... ถ้าอย่างนั้นก็รบกวนตรวจสอบอุปกรณ์การแพทย์ที่ทางชมรมอัศวินบรรเทาทุกข์เก็บเอาไว้ทั้งหมด#nด้วยนะคะ"
3601-34 = "เอาละถ้างั้น... มีเรื่องอื่นที่จะรายงานเพิ่มอีกมั้ยคะ?"
3601-35 = "ค่ะ ตอนเช้ามืดวันนี้ช่วงประมาณตี 1 มีคนพบเห็นนักเรียนที่เปลือยกายล่อนจ้อนอยู่บนอาคารหลักค่ะ"
3601-36 = "ถึงคนที่เห็นจะมีจำนวนไม่มาก แต่มีข่าวลือแพร่สะพัดไปว่ามีวิญญาณอยู่บนดาดฟ้าค่ะ เรื่องนี้ฉันคิดว่าเราต้องรีบจัดการโดยด่วนค่ะ"
3601-37 = "......"
3601-38 = "ฮุฮุ..."
3601-39 = "เปลือย... งั้นเหรอคะ"
3601-40 = "เปลือยกาย... ตอนเช้าตรู่... บนดาดฟ้า..."
3601-41 = "ทำไมถึงจะไม่ใช่ผีล่ะคะ...?"
3601-42 = "คุณนางิสะ...?"
3601-43 = "ถ้าเป็นผีจริงๆ ฉันคงจะสบายใจขึ้น..."
3601-44 = "แต่ถ้าเป็นปัญหาที่แก้ไขไม่ได้ก็ปล่อยมันไปน่าจะดีกว่า..."
3601-45 = "ฮุฮุ..."
3601-46 = "ฮุฮุ... ฮุฮุฮุ... ฮุฮุฮุฮุ..."
3601-51 = "คุณนางิสะ?!"
3601-52 = "ตาลอยแล้วค่ะ!"
3601-54 = "ชมรมอัศวินบรรเทาทุกข์! เรียกชมรมอัศวินบรรเทาทุกข์มาเร็วๆ ค่ะ! "
3601-56 = "นางิจังทำงานหนักจนเป็นลมไปเลยเหรอ?!"
3601-57 = "ค่ะ แต่ถ้าจะระบุให้แน่ชัดก็คือ เป็นอาการหมดไฟมากกว่าค่ะ"
3601-58 = "โชคดีที่ร่างกายไม่มีปัญหาอะไร..."
3601-59 = "ฉันให้เธอดื่มชาแดงบรรจุขวดที่มีขายทั่วไปแล้ว แต่ไม่มีปฏิกิริยาตอบสนองเลยค่ะ"
3601-61 = "เดี๋ยวนะ นี่มันสถานการณ์ร้ายแรงมากเลยไม่ใช่รึไง?!"
3601-62 = "ใช่ค่ะ ทีมแพทย์วินิจฉัยว่าจำเป็นต้องหยุดทำงานสักพักเพื่อพักผ่อนและดูแลสภาพจิตใจค่ะ"
3601-63 = "ดูแลสภาพจิตใจ..."
3601-64 = "ถ้าหาซื้อขนมหวานที่วางขายพิเศษมาให้จะพอช่วยได้บ้างมั้ย?"
3601-65 = "ถ้าดูจากรายงานการประชุม... ฉันว่ามันคงช่วยอะไรไม่ได้มากหรอกค่ะ"
3601-66 = "สิ่งที่สำคัญที่สุดคือให้นางิสะหยุดทำงานและพาออกไปนอกทรีนิตี้ค่ะ"
3601-67 = "ถ้าขืนอยู่ในทรีนิตี้ ถึงจะพักผ่อนอยู่ เธอก็คงรู้สึกเหมือนไม่ได้พักอยู่ดี"
3601-68 = "อืม ฉันคงต้องหาที่ที่จะให้นางิจังไปพักผ่อนได้ที่นอกทรีนิตี้แล้วละ"
3601-69 = "ค่ะ นั่นเป็นสิ่งที่ดีที่สุดที่เราจะทำได้ในตอนนี้ค่ะ"
3601-70 = "อืม..."
3601-71 = "นอกทรีนิตี้... สถานที่ที่นางิจังจะชอบ..."
3601-72 = "อ๊ะ!"
3601-74 = "มิกะ?"
3601-75 = "ไปซานไห่จิงกันเถอะ! "
3601-76 = "โรงเรียนมัธยมซานไห่จิงเหรอคะ...? ทำไมเหรอคะ?"
3601-77 = "ได้ยินว่าที่นั่นมีร้านชาชื่อดังอยู่ด้วยละ!"
3601-78 = "เห็นว่าถ้าสมัครทำเวิร์กช็อปละก็จะได้ลองดื่มชาและได้ลองผสมใบชาด้วย!"
3601-79 = "นางิจังชอบดื่มชาแดง ถ้าไปที่นั่นอาจจะรู้สึกดีขึ้นก็ได้นะ?"
3601-80 = "ฉันไม่ได้ยินความคิดที่สมเหตุสมผลจากคุณมานานเลยนะคะ คุณมิกะ"
3601-81 = "หืม? นานเลยงั้นเหรอ?"
3601-82 = "เซอาจังเห็นฉันเป็นคนยังไงเนี่ย..."
3601-83 = "เอาเป็นว่า นี่ถือว่าเป็นความคิดที่ดีค่ะ"
3601-84 = "ใช่มั้ย? ใช่มั้ยล่ะ?"
3601-85 = "แต่เราจะไปกันยังไงดีนะ..."
3601-86 = "นางิจังยังดูเหนื่อยมากๆ ฉันว่านั่งรถส่วนตัวไปน่าจะดีกว่ารถไฟหรือรถบัสนะ"
3601-87 = "ใช้รถของทางสภาน้ำชาได้มั้ย?"
3601-88 = "ถ้าจะขับรถไปที่นั่นต้องมีผู้ติดตามไปด้วยนะคะ"
3601-89 = "ถ้าทำแบบนั้นก็จะรู้สึกเหมือนเพิ่มงานเข้าไปอีกค่ะ"
3601-90 = "อืม เอายังไงดีนะ..."
3601-91 = "ตอนนี้ใช้มอเตอร์ไซค์ของฉันไปก่อนก็แล้วกันค่ะ"
3601-92 = "มีที่นั่งพ่วงข้าง เพราะงั้นนั่งไปกันสามคนได้สบายๆ แน่นอนค่ะ"
3601-93 = "ว้าว ไม่ได้เห็นเซอาจังขับรถมาตั้งนานแล้วนะ!"
3601-94 = "ดีละ งั้นฉันจะจองทัวร์เวิร์กช็อปของโรงน้ำชาเอง!"
3601-95 = "ค่ะ รบกวนด้วยนะคะ มิกะ"
3601-96 = "เอาละ ถ้างั้นก็มาเริ่มทัวร์ฮีลใจนางิจัง..."
3601-98 = "ไปกันเลย!"

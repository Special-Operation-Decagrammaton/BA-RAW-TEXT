[translation]
3601-1 = "甜蜜與懷舊（１）"
3601-2 = "呼……"
3601-3 = "好，開始會議吧。"
3601-4 = "如果有特殊事項，請提出討論。"
3601-5 = "是，渚大人。#n首先昨天18時左右，在咖啡街發生了槍戰。"
3601-6 = "已確認是由爭奪「限量甜點上的草莓」所有權的爭執演變而來。"
3601-10 = "草莓……？"
3601-11 = "就為了一顆草莓……？"
3601-12 = "由於實現正義部的蓮實副部長正在休假，因此是由弦生部長出動平息了紛爭。"
3601-13 = "如果是弦生部長……救護騎士團應該相當忙碌吧。"
3601-14 = "是的，確實有許多「凹陷的罐頭」……更正，是「受傷的學生」遭到移送。#n救護騎士團忙到很晚才完成急救。"
3601-18 = "我明白了。#n救護騎士團應該消耗了不少藥品和繃帶……"
3601-19 = "麻煩替我轉達「如果需要追加預算，請提交申請書」吧。"
3601-24 = "還有其他事項嗎？"
3601-25 = "接下來是關於救護騎士團發生的事件……"
3601-26 = "有患者在看見醫療器材櫃裡的電鋸後，因為陷入恐慌而試圖逃跑……"
3601-27 = "……結果導致一間治療室完全癱瘓了。"
3601-28 = "醫療器材櫃裡為什麼會有電鋸……？#n唉……"
3601-29 = "……好吧，那麼請對救護騎士團持有的醫療器材展開全面調查。"
3601-34 = "……還有其他需要報告的嗎？"
3601-35 = "是的。今天凌晨1點左右，有名全裸的學生在本館大樓的屋頂遭到目擊。"
3601-36 = "儘管目擊者不多，卻已經開始流傳「屋頂有幽靈」之類的謠言……恐怕需要處理。"
3601-37 = "……"
3601-38 = "呵呵……"
3601-39 = "全裸……是嗎。"
3601-40 = "凌晨……在屋頂……全裸……"
3601-41 = "為什麼不是幽靈呢……？"
3601-42 = "渚大人……？"
3601-43 = "如果是幽靈，反倒還能安心一點……"
3601-44 = "如果是無法解決的問題，還能乾脆置之不理就好……"
3601-45 = "……呵呵。"
3601-46 = "呵呵……呵呵呵……呵呵呵呵……"
3601-51 = "渚大人！？"
3601-52 = "他眼神放空了！"
3601-54 = "快叫救護騎士團！快！"
3601-56 = "渚醬因為過勞倒下了！？"
3601-57 = "是啊。準確來說是「倦怠症候群」。"
3601-58 = "雖然身體方面沒有大礙……"
3601-59 = "不過就算嘗試給他喝市售的瓶裝紅茶，他也完全沒有反應。"
3601-61 = "等一下，那不是很嚴重嗎！？"
3601-62 = "沒錯。醫護人員的診斷結果是需要暫時離開工作，好好休息並進行心理照護。"
3601-63 = "心理照護……"
3601-64 = "如果弄到限量甜點會有幫助嗎？"
3601-65 = "……從會議記錄來看，恐怕效果有限。"
3601-66 = "總之，目前最重要的是讓渚離開三一這個工作環境。"
3601-67 = "如果繼續待在這裡，就算休息也無法獲得實質上的幫助。"
3601-68 = "唔嗯……所以要找個能讓渚醬放鬆，又在三一之外的地點對吧。"
3601-69 = "嗯，這應該是最好的辦法了。"
3601-70 = "我想想……"
3601-71 = "三一之外……渚醬會喜歡的地方……"
3601-72 = "啊！"
3601-74 = "彌香？"
3601-75 = "去山海經吧！"
3601-76 = "山海經高級中學……？為什麼？"
3601-77 = "我聽說那邊的郊外有間著名的紅茶專賣店！"
3601-78 = "申請參觀的話不只可以試喝，還能體驗茶葉的調配哦！"
3601-79 = "渚醬喜歡紅茶，去那裡應該能恢復精神吧？"
3601-80 = "……你難得提出了合理的想法呢，彌香。"
3601-81 = "嗯？難得是什麼意思？"
3601-82 = "聖亞醬平常到底是怎麼看我的……"
3601-83 = "總之，這是個好主意。"
3601-84 = "對吧對吧？"
3601-85 = "那麼交通該怎麼辦呢……"
3601-86 = "渚醬現在很疲憊……比起電車或公車，還是汽車比較好。"
3601-87 = "要開茶會公用車庫裡的車嗎？"
3601-88 = "如果要用那裡的車，就必須有隨從同行。"
3601-89 = "如此一來，就無法脫離工作狀態了吧。"
3601-90 = "唔唔，那該怎麼辦才好……"
3601-91 = "就用我的機車吧。"
3601-92 = "剛好有裝邊車，要坐三個人也沒問題。"
3601-93 = "哇，好久沒看到聖亞醬開車了！"
3601-94 = "好，那參觀就交給我來預約吧！"
3601-95 = "嗯，拜託你了，彌香。"
3601-96 = "那麼，渚醬的充電之旅……"
3601-98 = "開始囉！"

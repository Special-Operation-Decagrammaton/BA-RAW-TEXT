[translation]
32110-1 = "第11話;第2次特別学力試験（２）"
32110-2 = "ゲヘナ自治区"
32110-5 = "えっと、何とか内部には入れましたが……。"
32110-6 = "いくら夜中とはいえ、人けが無さすぎません？"
32110-10 = "……銃声だ。どこかで戦闘が起きてる。"
32110-11 = "うーん、目的地に行くにはこのまま進むしかありませんし……とりあえず行ってみましょうか。"
32110-15 = "あれは、検問……？"
32110-16 = "止まれ！ここから先は立ち入り禁止になっている！"
32110-17 = "そもそも今日は、街全体に外出禁止令が出されているはずだ！早く戻って――"
32110-18 = "……その制服、トリニティ？"
32110-19 = "どうしてここに……！ゲヘナに何をしに来た！目的は何だ！"
32110-20 = "い、いえその、本当にここを通りたいだけでして……！"
32110-21 = "何の目的も無しに、トリニティがゲヘナに来るわけがあるか！"
32110-22 = "ですが私たちは本当に、ただ試験を受けに来ただけなんです。特に問題を起こしに来たわけではなく……。"
32110-23 = "トリニティの生徒が試験を受けるために、どうしてゲヘナの自治区に来るんだ！！せめてもっとまともな嘘をつけ！"
32110-24 = "せ、正論……あうぅ……。"
32110-25 = "……っ！そこのお前、正義実現委員会じゃないか！？"
32110-31 = "なっ、ほ、本当だ！襲撃！正義実現委員会が襲撃しに来たぞ！"
32110-33 = "上層部に報告！正義実現委員会が遂に来た！！"
32110-35 = "えぇっ！？いやその、そ、そうなんだけど、今は違うって言うか、うぅっ……！"
32110-36 = "仕方ない、倒そう。"
32110-37 = "えぇっ！？誤解が深まりませんか！？"
32110-43 = "のあぁぁっ！？"
32110-44 = "こ、こいつら、やはり……。"
32110-48 = "アズサちゃーーーん！？"
32110-49 = "……いや、まだ手は出してない。私以外の誰かだ。"
32110-50 = "そうですね、今のは私たちの遥か後方から飛んできました。しかし、一体誰が……。"
32110-54 = "あらっ★やっぱり先生でしたか！"
32110-55 = "大当たりでしたわね。ご機嫌よう。ここで何をされているのですか、先生？"
32110-56 = "[s] \"美食研究会のみんな！\""
32110-58 = "あ、あれ！？確かこの間戦った……！？"
32110-59 = "あら、あの水族館を襲撃した……。"
32110-60 = "え、えっと……？も、もう何が何やら……。"
32110-62 = "……なるほど、状況は概ね理解しました。とにかくこの場所に行かねばならないのですね？"
32110-63 = "[s] \"うん。\""
32110-64 = "事情は分かりましたが、タイミングが悪かったですね……この辺りは今、それなりに大きな騒動になっていまして。"
32110-65 = "温泉開発部が市街地のど真ん中をドカン★と爆発させたとかで、とにかくめちゃくちゃな状態なんです。"
32110-66 = "そのせいで、風紀委員会も慌ただしく動いているという状況で……まあそのおかげで機に乗じて、私たちもこうして風紀委員会の牢屋から抜け出せたのですけれど。ふふっ♪"
32110-67 = "そうですね。それに非常事態ということもあって、またしてもその場に偶然居合わせた給食部のフウカさんが、部の車を快く貸してくれましたし★"
32110-68 = "んんっ！？んーっ！んーーーっ！！"
32110-69 = "新しく買ったばかりの車を貸してくれるなんて……これぞ美しい友情というやつですね★"
32110-70 = "んんっ！んっ、んんんんっ！！！！"
32110-72 = "……その友情のお相手、縛られたままトランクに積まれてません？"
32110-74 = "問題ありませんわ、フウカさんはこういったことに慣れていますから。"
32110-75 = "もはや専門家と言っても過言ではありませんね★"
32110-76 = "ハルナ、アカリ！今どこ！？こっちも包囲網を破ったけど、合流できそう！？"
32110-77 = "ぎゃーーーっ！風紀委員会がまだ追いかけてきてる！！"
32110-78 = "ジュンコさん、脱出作戦は取り消しです。"
32110-79 = "えっ、何で！？"
32110-80 = "ふふっ、あの時のお礼ということで。先生とトリニティの皆さんのことは、私たちが責任をもってご案内しますわ。"
32110-81 = "ですね★それではとにかく乗ってください！"
32110-82 = "[s] \"ありがとう、よろしくね。\""
32110-84 = "え、えっと……それではよろしくお願いします……？"
32110-85 = "……本当だ、給食って書いてある。じゃあ失礼するけど……給食部のあなたは本当にそのままで大丈夫か？"
32110-89 = "ちゃんと捕まっていてくださいね★出発です！"
32110-91 = "（そして約2時間後……）"
32110-95 = "うわあぁぁぁぁぁっ！？"
32110-99 = "何ですか何なんですか！？一体どうしてこんなことに！？"
32110-100 = "ヒフミ、揺らさないで！照準が合わないからっ！"
32110-101 = "わ、私が揺らしてるんじゃありません！じ、地面がさっきから揺れっぱなしで……！"
32110-105 = "また爆発しましたぁっ！？"
32110-108 = "トリニティのあなた、バイクの運転上手だね！"
32110-109 = "良いじゃん良いじゃん、頑張れー！"
32110-110 = "いえいっぱいいっぱいなんですけどぉっ！？"
32110-111 = "アカリさん、8秒後にまた爆撃が来ますわ。"
32110-112 = "はい、問題ありません★"
32110-117 = "ハルナぁっ！もう車は良いから降ろして――っ！？"
32110-118 = "フウカさんもこうして応援してくれていますし、もう少し派手にやるとしましょうか。"
32110-119 = "そうですね、声援を力に★そして速度に♪"
32110-125 = "ショベルカーにブルドーザーまで来てる！？何で！？"
32110-126 = "ど、どうしてゲヘナの温泉開発部にまで追われてるんですかぁっ！？"
32110-127 = "やばっ、風紀委員会も来た！"
32110-128 = "こちらチームブラボー。チームアルファ、応答せよ。"
32110-129 = "あ、アズサちゃん！？"
32110-130 = "名前を言われると、隠語を使った意味が無い……それはそれとして、ごめん。陽動作戦は失敗した、こっちは包囲されてる。"
32110-131 = "はいぃ！？"
32110-132 = "前方には火炎放射器を持った温泉開発部、後方はやたら強いツインテールの風紀委員。退路を塞がれた。"
32110-133 = "ハナコと私は何とか自力で逃げるから、後で落ち合おう。幸運を祈る。"
32110-134 = "（ピッ）"
32110-135 = "アズサちゃぁぁぁんっ！？"
32110-136 = "わ、私たちはあくまで、試験を受けに来ただけなのに……。"
32110-137 = "どうしてこんなことになっているんですか！？うわあぁぁぁんっ！"
32110-150 = "あ、あうぅ……。"
32110-151 = "し、試験会場は、ここ……？"
32110-152 = "[s] \"ふたりとも、無事で良かった。\""
32110-153 = "あっ、先生！！"
32110-154 = "せ、先生、ご無事でしたか……必死になってるうちに、いつの間にはぐれてしまってましたね……。"
32110-155 = "良かったです……給食部の車が川にダイブした時は、もう終わりかと思いましたが……。"
32110-156 = "[s] \"ハルナ、親指立てながら沈んでたけど大丈夫かな……。\""
32110-157 = "あ、アズサとハナコは！？"
32110-158 = "お待たせいたしました♡"
32110-162 = "2時45分……何とか開始時間前に着いたか。流石に疲れた。"
32110-164 = "えっと……。"
32110-165 = "そ、そっちは何があったのよ……。"
32110-166 = "[s] （今は深くは聞かないことにした。）"
32110-168 = "試験の場所って、ここ……？"
32110-169 = "ゲヘナ自治区第15エリア77番街、廃墟の1階……はい、ここで合ってます。この建物ですね。"
32110-170 = "ど、どうしてこんなところで試験を……。あ、試験用紙とかどうなるんでしょうか、誰か来てるんですかね……？"
32110-171 = "いや、誰もいなさそうだ。でも何かしら、手段は用意してるはず。"
32110-179 = "……これだ。"
32110-180 = "これは……不発弾、ですか？"
32110-181 = "L118、牽引式榴弾砲の弾頭だ。スローガンとかの散布用なのか、雷管と爆薬を取り除いて爆発しないようにしてある。"
32110-182 = "なるほど。L118ということはティーパーティーの……つまり、ナギサさんからということですね。"
32110-183 = "この中に何かあるはず。"
32110-184 = "開けてみよう。"
32110-188 = "（カチャッ）"
32110-189 = "あ、中に紙が……これが試験用紙ということですね！"
32110-190 = "特に破損も見られない。こっちは……通信機か。"
32110-191 = "……これを見ているということは、無事に到着されたようですね。"
32110-192 = "な、ナギサ様！？"
32110-193 = "……。"
32110-194 = "え、じゃあこの方が、ティーパーティーの……？"
32110-195 = "[s] \"ナギサ……！\""
32110-196 = "ふふっ……恨みの声が聞こえてきますね。まあこれは録画映像なので、リアルタイムには聞こえないのですが。ですので、今の私に話しかけても無意味ですよ。"
32110-197 = "[s] \"……。\""
32110-198 = "それでは約束の時間までに試験を終えて、戻ってきてくださいね。"
32110-199 = "一応引き続きモニタリングはさせていただいておりますので、そのことをお忘れなく……では幸運を祈りますね、「補習授業部」のみなさん。"
32110-200 = "[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・]どうかお気を付けて[/ruby]。"
32110-202 = "（ピッ）"
32110-203 = "あうぅ……。"
32110-204 = "なんだか最後、含みのある言い方でしたね……？"
32110-205 = "とにかく時間が無い、早く始めよう。"
32110-206 = "は、はい！みなさん入りましょう、いよいよ第2次特別学力試験です！"
32110-207 = "そうですね。"
32110-208 = "う、うん！"
32110-209 = "[s] \"よし、頑張ろう！\""
32110-215 = "で、ここが例の場所？"
32110-216 = "うん、住所的には合ってそう。ここから向こうの方まで全部かな。"
32110-217 = "へへっ。どこからの情報だかよく分からないけど、親切に温泉がありそうな場所を教えてくれるなんてありがたいこった。"
32110-218 = "よぉし、発破準備！"
32110-220 = "開発だぁーーー！！！！"
32110-226 = "第2次特別学力試験、結果――"
32110-228 = "ハナコー[FF6666]試験用紙紛失（不合格）[-]"
32110-230 = "アズサー[FF6666]試験用紙紛失（不合格）[-]"
32110-232 = "コハルー[FF6666]試験用紙紛失（不合格）[-]"
32110-234 = "ヒフミー[FF6666]試験用紙紛失（不合格）[-]"
32110-236 = "試験用紙が、試験用紙がっ……！？"
32110-237 = "跡形もなく吹っ飛ばされた……。"
32110-238 = "せ、先生、ご無事ですか……。"
32110-239 = "[ns] \"こっちは大丈夫……。\""
32110-240 = "なるほどなるほど、ここまでやるということですね……面白くなってきたではありませんか。ふふふっ……♡"
32110-242 = "補習授業部、第2次特別学力試験ー全員不合格！"
32110-246 = "次回;再び原点へと"

[translation]
32110-1 = "第11話;第2次特別學力測驗（２）"
32110-2 = "格黑娜自治區"
32110-5 = "總算是進入格黑娜自治區了呢……"
32110-6 = "雖然說是晚上，不覺得這裡人太少了嗎？"
32110-10 = "……有槍聲。有哪裡正在戰鬥。"
32110-11 = "唔嗯，要到目的地的話只能就這樣繼續前進了呢……總之先走吧。"
32110-15 = "那個是，攔檢……？"
32110-16 = "停下來！前方禁止進入！"
32110-17 = "今天這整條街都實施宵禁！快點回去──"
32110-18 = "……那個制服，是三一的人？"
32110-19 = "為什麼會在這裡……！來格黑娜做什麼！有什麼目的！"
32110-20 = "不，不是那個，我們真的只想通過這裡……！"
32110-21 = "哪有可能沒有目的就從三一跑到格黑娜來！"
32110-22 = "我們真的只是來考試，不是特地來起爭議的……"
32110-23 = "三一的學生要考試為什麼要到格黑娜自治區來啊！！說謊也先打草稿吧！"
32110-24 = "說，說得真對……啊嗚……"
32110-25 = "……！那邊那個不是實現正義部的人嗎！？"
32110-31 = "什麼，真，真的是！敵襲！實現正義部來襲擊了！"
32110-33 = "快跟長官報告！實現正義部終於打過來了！！"
32110-35 = "咦！？不是那個，雖然是這樣沒錯，該說現在不是嗎，嗚……！"
32110-36 = "沒辦法，打倒他們吧。"
32110-37 = "咦！？不會讓誤會更深嗎！？"
32110-43 = "呃啊！？"
32110-44 = "這，這些傢伙，果然是……"
32110-48 = "梓醬──！"
32110-49 = "……不，我還沒出手。是其他人做的。"
32110-50 = "是呢，剛才的攻擊是從遙遠的後方飛來的。但是，究竟是誰……"
32110-54 = "哎呀★果然是老師呢！"
32110-55 = "中大獎了呢。你們好呀，在這裡做什麼呢，老師？"
32110-56 = "[s] 「美食研究會的大家！」"
32110-58 = "咦，咦！？是之前戰鬥過的……！？"
32110-59 = "啊，是襲擊了水族館的……"
32110-60 = "呃……？現，現在到底是怎麼回事……"
32110-62 = "……原來如此，狀況我大概理解了。總之就是必須要到那個地方才行對吧？"
32110-63 = "[s] 「嗯。」"
32110-64 = "理由我明白了，但這個時間點還真糟呢……現在這附近的騷動可不小。"
32110-65 = "溫泉開發部的人在市中心砰★的一聲引發了爆炸，總之就是亂成一團了呢。"
32110-66 = "因此風紀委員會慌忙地出動了……#n不過也多虧了他們，我們才能趁機從風紀委員會的牢房裡逃出來呢。呵呵。"
32110-67 = "就是說呀。而且在這種緊急狀況下，我們還偶然遇到了供給部的風華同學。#n他爽快地把車子借給了我們哦★"
32110-68 = "嗯嗯！？嗯──！嗯────！！"
32110-69 = "竟然把新買的車借給我們……這就是所謂美妙的友情對吧★"
32110-70 = "嗯嗯！？嗯，嗯──！！！！"
32110-72 = "……那個美好友情的對象是被綁著丟在後車廂裡嗎？"
32110-74 = "沒問題的，風華同學早就習慣了。"
32110-75 = "簡直說是專家也不為過呢★"
32110-76 = "羽留奈，亞伽里！你們在哪！？我也剛突破包圍，能會合嗎！？"
32110-77 = "呀啊──！風紀委員會又追過來了！！"
32110-78 = "淳子同學，逃脫作戰取消了。"
32110-79 = "咦，為什麼？"
32110-80 = "呵呵，是那個時候的回禮喔。就由我們負責老師和三一大家的導覽吧。"
32110-81 = "就是呀★那就請趕快上車吧！"
32110-82 = "[s] 「謝謝，拜託你們了。」"
32110-84 = "啊，啊嗚……那就麻煩你們了……"
32110-85 = "車身上寫著供給部……原來真的是供給部的卡車啊。"
32110-89 = "請抓穩囉★出發！"
32110-91 = "（於是大約2小時後……）"
32110-95 = "嗚哇啊──！？"
32110-99 = "為什麼到底為什麼！？到底為什麼會變成這樣！？"
32110-100 = "日步美，不要晃來晃去的！我沒辦法瞄準！"
32110-101 = "不，不是我在晃啊！地面從剛才剛始就晃個不停……"
32110-105 = "又爆炸了！？"
32110-108 = "三一的那位同學，機車騎的真好呢！"
32110-109 = "不錯不錯，加油啊！"
32110-110 = "不是我已經很努力了啊！？"
32110-111 = "亞伽里同學，8秒後又有砲擊要來了。"
32110-112 = "好，沒問題★"
32110-117 = "羽留奈！車子怎樣都無所謂了拜託放了我吧──！？"
32110-118 = "風華同學都這樣幫我們加油了，再搞得盛大一點吧。"
32110-119 = "就是說呀，把支持轉化為力量★然後再轉換成速度♪"
32110-125 = "連怪手跟推土機都來了！？為什麼啊！？"
32110-126 = "為，為什麼連格黑娜的溫泉開發部都在追我們啊！？"
32110-127 = "糟糕，風紀委員會也來了！"
32110-128 = "這裡是Bravo小隊，Alpha小隊聽到請回答。"
32110-129 = "梓，梓醬！？"
32110-130 = "把名字說出來的話，特地用暗號就沒意義了……先不管這些了，抱歉。#n佯攻作戰失敗，我們被包圍了。"
32110-131 = "什麼！？"
32110-132 = "前方是拿著火焰發射器的溫泉開發部，後方是很強的雙馬尾風紀委員。沒有退路了。"
32110-133 = "花子和我會想辦法逃出去的，之後再會合吧。祝你好運。"
32110-134 = "（嗶）"
32110-135 = "梓醬──！？"
32110-136 = "我，我們明明只是來考試的而已……"
32110-137 = "為什麼會變成這樣啊！？嗚哇啊──！"
32110-150 = "啊，啊嗚……"
32110-151 = "考，考試地點就是這裡……？"
32110-152 = "[s] 「你們兩個沒事真是太好了。」"
32110-153 = "啊，老師！！"
32110-154 = "老，老師，你沒事啊……在逃命的途中，不知道什麼時候就走散了呢……"
32110-155 = "太好了……供給部的車衝進河裡的時候，我還以為要完蛋了呢……"
32110-156 = "[s] 「羽留奈是一邊豎著大拇指一邊沉下去的，應該沒問題吧……」"
32110-157 = "梓，梓和花子呢！？"
32110-158 = "讓你們久等了呢♡"
32110-162 = "2點45分……總算是趕在考試開始之前到了。真是累人。"
32110-164 = "……"
32110-165 = "……"
32110-166 = "[s] （他們發生了什麼……決定現在先別過問）"
32110-168 = "考試的地點就是這裡……？"
32110-169 = "格黑娜自治區第15區77號街的廢墟1樓……沒錯，就是這裡呢。是這棟建築吧。"
32110-170 = "為，為什麼要在這種地方考試……啊，考卷之類的怎麼辦呢，有誰會來嗎……？"
32110-171 = "不，看起來沒人。但應該會準備好一些手段才對。"
32110-179 = "……有了。"
32110-180 = "這是……未爆彈嗎？"
32110-181 = "是L118牽引式榴彈砲的彈頭。#n或許是發送傳單用的，為了防止爆炸而去除了雷管跟火藥。"
32110-182 = "原來如此。L118是茶會的……也就是說這是渚同學準備的對吧。"
32110-183 = "這裡面應該有些什麼才對。"
32110-184 = "打開看看吧。"
32110-188 = "（咖嚓）"
32110-189 = "啊，裡面有紙……這就是考卷的意思吧！"
32110-190 = "沒有發現破損。這個是……通訊器嗎。"
32110-191 = "……能夠看到這段影像，代表你們順利抵達了呢。"
32110-192 = "渚，渚大人！？"
32110-193 = "……"
32110-194 = "咦，這位就是茶會的……？"
32110-195 = "[s] 「渚……！」"
32110-196 = "呵呵……能聽到你們怨恨的聲音呢。#n不過這只是段錄影而已，所以沒辦法即時聽見你們的聲音。#n也就是說，向我說話也是沒有意義的。"
32110-197 = "[s] 「……」"
32110-198 = "那麼請在約定的時間內結束考試回來吧。"
32110-199 = "我姑且還是會透過監視器看著你們的，這點請別忘了……#n那就祝你們好運了，「補課部」的各位。"
32110-200 = "[ruby=．]請[/ruby][ruby=．]務[/ruby][ruby=．]必[/ruby][ruby=．]小[/ruby][ruby=．]心[/ruby]。"
32110-202 = "（嗶）"
32110-203 = "啊嗚……"
32110-204 = "總覺得最後那句話沒那麼單純呢……？"
32110-205 = "沒時間了，趕快開始吧。"
32110-206 = "好，好的！大家快進去吧，總算是能開始第2次特別學力測驗了！"
32110-207 = "就是說呀。"
32110-208 = "嗯！"
32110-209 = "[s] 「好，加油吧！」"
32110-215 = "這就是那個地方嗎？"
32110-216 = "嗯，從住址看來就是這裡沒錯。從這裡到那邊為止的全部對吧。"
32110-217 = "嘿嘿，雖然不知道是從哪來的情報，#n能親切地告訴我們可能有溫泉的地方還真感謝呢。"
32110-218 = "好！準備爆破！"
32110-220 = "開發啦──！！！"
32110-226 = "第2次特別學力測驗，結果──"
32110-228 = "花子──[FF6666]遺失考卷（不合格）[-]"
32110-230 = "梓──[FF6666]遺失考卷（不合格）[-]"
32110-232 = "小春──[FF6666]遺失考卷（不合格）[-]"
32110-234 = "日步美──[FF6666]遺失考卷（不合格）[-]"
32110-236 = "考卷，考卷被……！？"
32110-237 = "不知道飛到哪去了……"
32110-238 = "老，老師你沒事吧……"
32110-239 = "[ns] 「我沒事……」"
32110-240 = "原來如此原來如此，竟然做到這種程度呀……這下可有趣了呢。呵呵呵……♡"
32110-242 = "補課部第2次特別學力測驗──全員不合格！"
32110-246 = "下一話;再次回到原點"

[translation]
2000302-1 = "เครื่องแบบสีดำ"
2000302-2 = "ห้องเรียนในสถาบันทรีนิตี้"
2000302-6 = "คุณครู ขอบคุณมากเลยนะคะ"
2000302-7 = "กระโปรงเหรอคะ? อ๋อ รุ่นพี่ฮาสุมิให้ฉันยืมชุดเย็บผ้ามาเย็บกระโปรงไว้ชั่วคราวแล้วค่ะ"
2000302-8 = "ถ้าขยับตัวมากเกินไป ตะเข็บอาจจะแตกอีกก็ได้… แต่ฉันคงไม่มีทางเลือกจนกว่าจะได้กระโปรง#nตัวใหม่น่ะค่ะ"
2000302-9 = "ฉันไปขอยืมกระโปรงของรุ่นพี่ฮาสุมิมาลองใส่แล้วแต่ว่าขนาดมันไม่พอดี ส่วนกระโปรงของรุ่นพี่ซึรุกิก็มีเลือดโชกอยู่ตลอด..."
2000302-10 = "ชุดเครื่องแบบดำของชมรมทวงความยุติธรรมแบบนี้ แม้แต่ในสถาบันทรีนิตี้เองก็ยังหาชุดสำรอง#nยากเลยค่ะ"
2000302-11 = "สงสัยว่าทำไมชุดของชมรมทวงความยุติธรรมถึงเป็นสีดำต่างจากชุดของนักเรียนคนอื่นๆ เหรอคะ?"
2000302-12 = "ก็เพราะแม้ว่าจะเปื้อนเลือดของพวกชั่วร้ายอย่างสถาบันเกเฮนน่าก็จะได้ไม่เตะตายังไงล่ะคะ#nแค่ดูเสื้อของรุ่นพี่ซึรุกิน่าจะรู้นะคะ?"
2000302-13 = "ใส่เครื่องแบบสีดำแบบนี้จะได้ไม่ต้องกังวลเวลาลงมือจัดการศัตรูยังไงล่ะคะ"
2000302-14 = "[s] ยิ้มแห้งๆ ด้วยสีหน้าที่หวาดกลัว"
2000302-15 = "เอ่อ... เมื่อกี๊ล้อเล่นนะคะ... มุกฉันแป้กสินะคะ?"
2000302-16 = "[s] \"ครูนึกว่าเป็นเรื่องจริงเลยกลัวนิดหน่อยน่ะ\""
2000302-17 = "ก็พอรู้อยู่ว่าฉันไม่มีพรสรรค์ในการพูดเล่นมุกเลย พอฉันพูดเล่นทีไร ทุกคนจะทำหน้ากลัวกันใหญ่#nเลยค่ะ"
2000302-18 = "เพราะอะไรกันนะ...?"
2000302-19 = "[s] \"ไม่ใช่เพราะทำสีหน้าจริงจังหรอกเหรอ?\""
2000302-20 = "ใช่ค่ะ อาจเป็นเพราะแบบนั้นค่ะ หึหึ...."
2000302-21 = "แต่ยังไงก็ตาม พวกเราไม่ได้ใส่ชุดสีดำเพราะกลัวเปื้อนเลือดหรอกนะคะ"
2000302-22 = "แต่เป็นเพราะพวกเราอยากรักษาความสะอาดค่ะ ถ้าเกิดเปื้อนเลือดระหว่างปฏิบัติการ ฉันจะต้อง#nล้างให้สะอาดเอี่ยมเลยค่ะ"
2000302-23 = "[s] \"ฮ่าฮ่า นั่นล้อเล่นใช่มั้ย?\""
2000302-24 = "เปล่าค่ะ เรื่องจริงค่ะ แต่ว่า..."
2000302-25 = "ถ้ามือไม่เปื้อนเลือดก็จะผดุงความยุติธรรมเอาไว้ได้ยังไงล่ะคะ หึหึ..."
2000302-26 = "[s] ยิ้มแห้งๆ ด้วยสีหน้าที่หวาดกลัวอีกครั้ง"
2000302-27 = "อืม... ฉันพูดล้อเล่นค่ะ แต่ดูเหมือนคุณครูจะเข้าใจว่าฉันพูดจริงอีกซะแล้ว..."
2000302-28 = "ว่าแล้วเชียว ฉันคงไม่มีพรสวรรค์ในการพูดเล่นจริงๆ..."
2000302-30 = "จากนั้นก็ใช้เวลาฟังเรื่องกลุ้มใจของมาชิโระ"

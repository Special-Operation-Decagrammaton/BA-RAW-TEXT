[translation]
2000302-1 = "黑色制服"
2000302-2 = "三一．教室"
2000302-6 = "啊，老師。#n辛苦你了。"
2000302-7 = "你說……裙子嗎？#n嗯，剛才蓮實前輩借了針線盒給我，於是我就簡單地縫了一下。"
2000302-8 = "雖然說只要動作大一點的話就很可能又會破掉……#n不過在新的裙子送來之前，也只好先這樣了。"
2000302-9 = "就算我想要借裙子，蓮實學姊的尺寸和我不一樣，而弦生學姊的裙子又總是沾滿了血……"
2000302-10 = "我們穿的這件實現正義部的制服，在三一學校裡也沒什麼庫存，每次遇到這種狀況都很傷腦筋。"
2000302-11 = "你問為什麼實現正義部的制服和其他三一學生們的制服不一樣，是黑色的原因嗎？"
2000302-12 = "那是因為，這樣即使濺上了格黑娜學園之類的人的血，也不會太顯眼。#n就像是弦生前輩那樣，應該很好理解吧。"
2000302-13 = "只要穿著這件制服，就能心無旁鶩地打倒敵人。"
2000302-14 = "[s] 用僵硬的表情吞了口口水"
2000302-15 = "啊……剛才是開玩笑的啦……#n有點太超過了嗎？"
2000302-16 = "[s] 「我還以為是真的，嚇了我一跳。」"
2000302-17 = "我總覺得自己沒有說笑話的天分。只要我一開玩笑，大家都會露出驚恐的表情。"
2000302-18 = "究竟是為什麼呢……？"
2000302-19 = "[s] 「會不會是因為表情看起來很認真呢？」"
2000302-20 = "嗯，或許是這樣吧。#n唔嗯……"
2000302-21 = "那個，總而言之，並不是因為會沾上血的關係，我們才穿黑色的制服。"
2000302-22 = "保持整潔可是很重要的。#n如果在戰鬥時沾到血的話，我都會好好洗乾淨。"
2000302-23 = "[s] 「哈哈，這也是開玩笑的對吧？」"
2000302-24 = "不，這是認真的……"
2000302-25 = "想要在不弄髒雙手的情況下實現正義，那是不可能的吧。#n呵呵……"
2000302-26 = "[s] 再次用僵硬的表情吞了口口水"
2000302-27 = "唔嗯……明明在說笑話卻被當真，說真話卻又被當成在開玩笑……"
2000302-28 = "看來，我果然沒有說笑話的天分吧。"
2000302-30 = "（之後，聽著麻白說著他的煩惱，度過了這段時間）"

[translation]
2000302-1 = "#title;검은 제복"
2000302-2 = "#place;트리니티 교실 안"
2000302-3 = "2;마시로;01\n#2;a\n#wait;1500"
2000302-4 = "2;마시로;02\n#2;em;[반응]\n#wait;1500"
2000302-5 = "2;마시로;01\n#2;m3\n#wait;1000"
2000302-6 = "#2;hide\n3;마시로;02;아, 선생님. #n수고 많으셨습니다.\n#3;greeting"
2000302-7 = "3;마시로;04;치마…… 말입니까? #n네, 하스미 선배가 반짇고리를 빌려주어 임시로 꿰매 두었습니다.\n#3;em;[땀]"
2000302-8 = "3;마시로;00;과격하게 움직이면 다시 솔기가 터져버릴지도 모르지만…… #n새 치마가 도착할 때까지는 어쩔 수 없지요."
2000302-9 = "3;마시로;99;치마를 빌리려고 해도 하스미 선배의 치마는 사이즈가 맞지 않고, 츠루기 선배의 치마는 늘 피에 젖어 있으니……\n#3;em;[...]"
2000302-10 = "3;마시로;01;이처럼 정의실현부의 검은 제복은 트리니티 학원 내에서도 여벌을 구하기가 어려워 매번 애를 먹는 답니다."
2000302-11 = "3;마시로;02;정의실현부의 제복이 다른 트리니티 학생들의 제복과는 달리, 검은 이유 말입니까?"
2000302-12 = "3;마시로;05;그야 게헨나 학원 같은 불의의 무리의 피가 튀어도 눈에 띄지 않게 하기 위해서이지요. #n츠루기 선배의 옷만 보더라도 알 수 있지 않습니까?\n#3;em;[반응]"
2000302-13 = "3;마시로;05;이 검은 제복을 입고 있는 한 걱정 없이 적을 마음껏 도륙할 수 있지요.\n#3;greeting"
2000302-14 = "[s] 두려운 표정으로 마른 침을 삼킨다."
2000302-15 = "3;마시로;04;어…… 방금 한 말은 농담이었습니다만…… #n조금 이상했습니까?\n#3;em;[땀]"
2000302-16 = "[s] \"진짜인 줄 알고 살짝 겁먹었어.\""
2000302-17 = "3;마시로;01;농담에 재능이 없다는 것은 익히 알고 있는 사실이지만, 제가 농담을 하면 다들 겁먹은 표정을 짓곤 하더군요."
2000302-18 = "3;마시로;02;어째서 일까요……?\n#3;em;[?]"
2000302-19 = "[s] \"표정이 너무 진지한 탓이 아닐까?\""
2000302-20 = "3;마시로;03;예, 아마도 그 때문이겠지요. #n후후……"
2000302-21 = "3;마시로;01;여하튼 다시 말씀드리자면 피가 묻는 것 때문에 검은 제복을 입는 것은 아니랍니다."
2000302-22 = "3;마시로;03;청결을 유지하는 건 중요한 일이니까요. #n작전 중에 피가 묻으면 그때마다 깨끗이 씻어내고 있답니다.\n#3;greeting\n#3;em;[반짝]"
2000302-23 = "[s] \"하하, 그것도 농담이지?\""
2000302-24 = "3;마시로;02;아뇨, 이건 진담입니다만……."
2000302-25 = "3;마시로;03;손에 피를 묻히지 않고 정의를 실현할 수는 없잖습니까. #n후후……\n#3;em;[음표]"
2000302-26 = "[s] 다시 두려운 표정으로 마른 침을 삼킨다."
2000302-27 = "3;마시로;04;으음, 농담을 하면 진담으로 여겨지고, 진담을 하면 농담으로 여겨지니……\n#3;em;[...]"
2000302-28 = "3;마시로;04;역시 저는 농담에 재능이 없는 걸까요…….\n#3;em;[속상함]\n#3;stiff"
2000302-29 = "#all;hide"
2000302-30 = "#na;이후, 마시로의 고민을 들어주며 시간을 보냈다."

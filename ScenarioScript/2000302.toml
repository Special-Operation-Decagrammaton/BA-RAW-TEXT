[translation]
2000302-1 = "Black Uniform"
2000302-2 = "Trinity Classroom"
2000302-6 = "Oh, Sensei. It's good to see you again."
2000302-7 = "Oh, my skirt? I borrowed a sewing kit from Hasumi so I could stitch it up."
2000302-8 = "The seam might rip again if I move too much... It will have to do until the new one arrives."
2000302-9 = "I would borrow one, but Hasumi's would never fit, and Tsurugi's are always covered in the blood of her enemies."
2000302-10 = "Getting replacement Justice Task Force uniforms can be a real pain, even within Trinity."
2000302-11 = "Are you curious as to our uniforms are black, whereas the regular students wear white?"
2000302-12 = "It's so the blood we spill of our unrighteous enemies—like those from Gehenna—won't be noticeable on our uniforms. Again, take a good look at Tsurugi's uniform."
2000302-13 = "I can slaughter my enemies without worry so long as I'm wearing this uniform."
2000302-14 = "[s] Gulp nervously and look afraid."
2000302-15 = "That...was supposed to be a joke. Did I push it too far?"
2000302-16 = "[s] \"I thought you were serious, so I got a little scared.\""
2000302-17 = "I'm well aware that I have not been gifted with a sense of humor. People tend to be terrorized whenever I crack jokes."
2000302-18 = "I wonder why that is."
2000302-19 = "[s] \"Could it be how dead serious you look?\""
2000302-20 = "That is one possibility. Heh..."
2000302-21 = "I should clarify that we do not wear black uniforms for fear of bloodstains."
2000302-22 = "Our club places importance on hygiene. If blood is to get on our uniform during a mission, we're to quickly wash it off."
2000302-23 = "[s] \"Haha. That's another good one, Mashiro.\""
2000302-24 = "No, I was being serious..."
2000302-25 = "There's a price to pay for attaining justice after all. Haha..."
2000302-26 = "[s] Gulp nervously and look even more scared."
2000302-27 = "Hmm. When I'm joking, you take it seriously, and when I'm serious, you think I'm joking."
2000302-28 = "I really don't have any sense of humor, do I?"
2000302-30 = "I spent some time talking with Mashiro about what was troubling her after that."

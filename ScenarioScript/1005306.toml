[translation]
1005306-1 = "運動員卡"
1005306-2 = "夏萊．辦公室"
1005306-5 = "先前提過的業務協助報告書……"
1005306-6 = "咦，沒人在嗎？"
1005306-7 = "桌上還這麼亂，到底跑到哪裡去了……"
1005306-8 = "呵呵。我就說老師不能沒有我……"
1005306-17 = "咦？這個是……"
1005306-22 = "我的照片！？"
1005306-23 = "什，什麼時候拍的……#n比起那個，為什麼老師會有我的照片……？"
1005306-24 = "難道說，是希望隨時都能見到我，所以才偷偷拍的嗎……"
1005306-25 = "真是的……明明只要和我說一聲，相片什麼的要多少都沒問題。"
1005306-26 = "可，可是……為什麼偏偏是這種在比賽中汗流浹背的照片……"
1005306-27 = "總覺得有點不健全……"
1005306-32 = "[ns]「你來了啊，優香。」"
1005306-33 = "啊，原來老師你在啊！？"
1005306-34 = "[s1]「我只是去倉庫確認一下備品而已唷。」\n[s2]「話說回來，你手上拿的是……」"
1005306-35 = "這，這是，那個……"
1005306-36 = "這，這是，那個……"
1005306-37 = "這句話是我該問的吧！#n這張照片是怎麼回事！"
1005306-38 = "應該處於公正地指導所有學生立場的老師，居然偷偷地帶著特定學生的照片……"
1005306-39 = "真，真是不健全！"
1005306-40 = "[s3]「啊，你指那張運動員卡嗎？」\n[s4]「那是克洛盧斯學園的學生給我的。」"
1005306-41 = "……運動員卡？"
1005306-42 = "……運動員卡？"
1005306-44 = "……原來如此，將參加晄輪大祭學生們的照片做成收藏卡片流通啊。"
1005306-45 = "雖然知道有收集這種卡片的狂熱粉絲……#n沒想到連我都被拍到了……"
1005306-46 = "雖然我們確實同意克洛盧斯學園可以使用他們在晄輪大祭中拍到的照片，#n想不到他們居然會做這種生意。"
1005306-47 = "如果事先知道的話，就該把合約寫得更清楚的……"
1005306-48 = "[s5]「在許可範圍內的話，也沒什麼不好吧？」\n[s6]「這張照片拍得很可愛哦。」"
1005306-49 = "但是……真是不可思議。#n這種卡片據說有時候能賣出天價。"
1005306-50 = "就，就算你這麼說……"
1005306-51 = "但是……真是不可思議。#n這種卡片據說有時候能賣出天價。"
1005306-52 = "進行會計業務的時候，偶爾也會聽到這些收藏品的價值……#n收藏家的世界果然還是令人難以理解。"
1005306-53 = "我還聽說過，這些卡片的價值會隨著選手的活躍度而有所改變之類的……"
1005306-54 = "呵呵，說不定有一天我的卡片也會成為高價品呢。"
1005306-55 = "雖然我現在只是一名會計，不過只要夠努力的話……#n或許總有一天能夠成為千年的學生會長也說不定。"
1005306-56 = "對了，老師。如果卡片上有親筆簽名的話，價值還會更高對吧。"
1005306-57 = "現在可以特別幫你簽名哦？"
1005306-58 = "[ns]「就是說呀。」"
1005306-60 = "[ns]「但是這張卡片不會被高價交易哦。」"
1005306-61 = "……為什麼呢？"
1005306-62 = "難道老師認為我當不上學生會長……"
1005306-63 = "[ns]「不是那樣的，優香。」"
1005306-65 = "[ns]「這張卡片，我一輩子都會珍惜的。」"
1005306-72 = "……果然，很不健全。"

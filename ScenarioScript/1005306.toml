[translation]
1005306-1 = "การ์ดกีฬา"
1005306-2 = "สำนักงานชาเล่ต์"
1005306-5 = "ฉันมาแล้วค่ะคุณครู เรื่องเอกสารความร่วมมือที่ฉันบอกไป..."
1005306-6 = "เอ๋? คุณครูไม่อยู่เหรอ? "
1005306-7 = "ทำโต๊ะยุ่งแบบนี้แล้วหายไปไหนกันนะ..."
1005306-8 = "เพราะแบบนี้ไงฉันปล่อยคุณครูไว้คนเดียวไม่ได้..."
1005306-17 = "เอ๋...? นี่มัน..."
1005306-22 = "นี่มันรูปของฉันนี่นา?!"
1005306-23 = "ถ่ายรูปนี้เอาไว้ตั้งแต่เมื่อไรเนี่ย...? แล้วทำไมคุณครูถึงมีรูปของฉันได้ล่ะ...?"
1005306-24 = "หรือคุณครูแอบถ่ายรูปฉันมาเพราะอยากเห็นหน้าฉันทุกวัน..."
1005306-25 = "คุณครูนี่ก็จริงๆ เลยนะ ถ้าบอกกันตรงๆ ละก็ ฉันเอารูปที่มีอยู่มาให้ก็ได้..."
1005306-26 = "แถมนี่ไม่ใช่รูปถ่ายทั่วไป แต่เป็นรูปตอนฉันกำลังแข่งวิ่งเหงื่อโชกแบบนี้..."
1005306-27 = "ทำไมรู้สึกสังหรณ์ใจไม่ดีเลยนะ..."
1005306-32 = "[ns] \"มาแล้วเหรอ ยูกะ\""
1005306-33 = "คะ... คุณครู? หายไปไหนมาคะ?"
1005306-34 = "[s1] \"ครูออกไปเช็กอุปกรณ์ในคลังมาน่ะ\"\n[s2] \"ว่าแต่ไอ้ที่ถืออยู่ในมือน่ะ...\""
1005306-35 = "คือ... คือว่า..."
1005306-36 = "คือ... คือว่านี่น่ะ..."
1005306-37 = "ฉันต่างหากที่ต้องเป็นฝ่ายถามคุณครูค่ะ! รูปนี้มันอะไรกันคะ?"
1005306-38 = "ครูผู้สอนที่ควรอบรมสั่งสอนนักเรียนทุกคนด้วยความบริสุทธิ์ใจ กลับแอบถ่ายรูปส่วนตัวของนักเรียน#nไว้แบบนี้งั้นเหรอ..."
1005306-39 = "ยะ...แย่ที่สุดเลยค่ะ!"
1005306-40 = "[s3] \"อ๋อ หมายถึงการ์ดกีฬานั่นเหรอ\"\n[s4] \"เด็กจากโรงเรียนโครโนสเอาการ์ดกีฬานั่นมาให้ครูน่ะ\""
1005306-41 = "การ์ด...กีฬางั้นเหรอคะ?"
1005306-42 = "การ์ด...กีฬาจากเด็กนักเรียนโครโนสเหรอคะ?"
1005306-44 = "อย่างนี้นี่เอง การ์ดที่เอารูปนักกีฬามาทำเป็นสินค้าขายในรูปแบบเทรดดิ้งการ์ด..."
1005306-45 = "ฉันก็พอรู้มาบ้างว่ามีคนบางกลุ่มที่ชอบเทรดการ์ดพวกนี้กัน... แต่ไม่คิดว่าจะมีการ์ดรูปตัวเองออกมา#nแบบนี้เลยค่ะ"
1005306-46 = "ถึงฉันจะอนุญาตให้ทางโรงเรียนโครโนสนำรูปที่ถ่ายระหว่างการแข่งกีฬาไปใช้ได้... แต่ไม่คิดว่าจะ#nเอามาทำเป็นสินค้าขายแบบนี้..."
1005306-47 = "ถ้ารู้อย่างนี้ละก็ คงจะตรวจสอบหนังสือสัญญาให้ละเอียดกว่านี้แล้วค่ะ"
1005306-48 = "[s5] \"ถ้าเป็นรูปที่ได้รับอนุญาตแล้วก็ไม่น่ามีปัญหาไม่ใช่เหรอ?\"\n[s6] \"ถ่ายรูปออกมาได้สวยเลยนะเนี่ย...\""
1005306-49 = "แต่ก็น่าแปลกมากเลยนะคะ ที่การ์ดธรรมดาๆ แบบนี้กลับมีคนเทรดกันในราคาที่สูงมาก..."
1005306-50 = "ถะ...ถึงคุณครูจะพูดแบบนั้นก็เถอะค่ะ..."
1005306-51 = "แต่ก็น่าแปลกมากเลยนะคะ ที่การ์ดธรรมดาๆ แบบนี้กลับมีคนเทรดกันในราคาที่สูงมาก..."
1005306-52 = "ตอนที่จัดการงานบัญชีก็ได้ยินเรื่องนี้มาบ้างพอสมควร โลกของนักสะสมนี่เข้าถึงยากจริงๆ เลยนะคะ"
1005306-53 = "จากที่ได้ยินมา ราคาของการ์ดพวกนี้จะสูงขึ้นตามความนิยมของนักกีฬาคนนั้นๆ ด้วยค่ะ..."
1005306-54 = "ฮิฮิ ถ้างั้นราคาการ์ดรูปของฉันก็อาจจะเทรดกันในราคาสูงลิบลิ่วเลยก็ได้นะคะ"
1005306-55 = "ถึงตอนนี้จะเป็นได้แค่นักบัญชี แต่ถ้าพยายามต่อไปละก็ สักวันฉันก็อาจจะได้เป็นประธานนักเรียนของ#nมิลเลเนียมก็ได้นะคะ"
1005306-56 = "แถมได้ยินมาว่า ราคาการ์ดที่มีลายเซ็นจะเทรดกันราคาแพงจนร้องขอชีวิตเลย..."
1005306-57 = "ฉันเซ็นไว้ให้เผื่อดีมั้ยคะ?"
1005306-58 = "[ns] \"ดีเลย\""
1005306-60 = "[ns] \"แต่คงไม่มีโอกาสได้เอาไปขายราคาแพงๆ หรอก\""
1005306-61 = "ทำไมล่ะคะ?"
1005306-62 = "หรือว่าคุณครูคิดว่าฉันไม่มีทางขึ้นเป็นประธานนักเรียนได้งั้นเหรอคะ?"
1005306-63 = "[ns] \"ครูไม่ได้หมายความว่าอย่างนั้น...\""
1005306-65 = "[ns] \"ครูจะเก็บการ์ดนี้ไว้อย่างดีตลอดชีวิตเลยต่างหาก\""
1005306-72 = "อะ...อะไรกันคะ แย่ที่สุดเลย!"

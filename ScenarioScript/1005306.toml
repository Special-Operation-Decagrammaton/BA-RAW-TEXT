[translation]
1005306-1 = "Sports Card"
1005306-2 = "Schale Office"
1005306-5 = "Sensei, I'm here. About the report I mentioned..."
1005306-6 = "Oh, is Sensei out? "
1005306-7 = "The desk is a mess. Did they just leave it like this..."
1005306-8 = "This is precisely why I can't leave Sensei alone..."
1005306-17 = "Huh? This is..."
1005306-22 = "My photo?!"
1005306-23 = "Wh-When was this photo even taken...? And why does Sensei have it...?"
1005306-24 = "Could it be that Sensei took it secretly, so they could see my face every day?"
1005306-25 = "I would have given Sensei pictures if they just asked..."
1005306-26 = "And it's not even a normal photo. This is when I was all sweaty and disheveled during a match."
1005306-27 = "I can't quite put my finger on why, but this sweaty, candid photo of me Sensei has stashed away gives me a strange feeling..."
1005306-32 = "[ns] \"Oh. You're here, Yuuka.\""
1005306-33 = "S-Sensei? Where have you been?"
1005306-34 = "[s1] \"I went to check on some equipment in storage.\"\n[s2] \"By the way, what have you got there...?\""
1005306-35 = "Th-This is..."
1005306-36 = "Th-This is..."
1005306-37 = "I'm the one who should be asking that! Why do you have this photo?!"
1005306-38 = "An educator should treat students with respect, not secretly keep photos of them!"
1005306-39 = "Th-That's immoral!"
1005306-40 = "[s3] \"You mean the sports card?\"\n[s4] \"A Kronos student gave it to me.\""
1005306-41 = "Sports...card?"
1005306-42 = "Sports...card?"
1005306-44 = "...Oh. So, trading cards featuring athletes..."
1005306-45 = "I knew that these kinds of cards existed, but I never thought I would end up on one."
1005306-46 = "I did give the Kronos School the okay to use photos of me from the competition, but I didn't think they'd commercialize me like this..."
1005306-47 = "If I had known what they were planning, I would have reviewed the contract more carefully."
1005306-48 = "[s5] \"So, since you already gave permission, the photo is fine, right?\"\n[s6] \"Well, it's a good picture of you.\""
1005306-49 = "Anyway, it's interesting that ordinary-looking cards like this can sell at such high prices..."
1005306-50 = "Y-You say that, but..."
1005306-51 = "Anyway, it's interesting that ordinary-looking cards like this can sell at such high prices..."
1005306-52 = "I've heard about it while working as a treasurer, but I just don't understand the card collection world."
1005306-53 = "They say these sports cards increase in value based on the performance of the player..."
1005306-54 = "Maybe my card will be sold at a high price someday, heh heh."
1005306-55 = "I'm just a treasurer now, but if I work hard, maybe I could become the president of Millennium one day."
1005306-56 = "I hear that autographed sports cards are sold at even more exorbitant prices..."
1005306-57 = "So, Sensei, want my autograph?"
1005306-58 = "[s] \"Sure.\""
1005306-60 = "[ns] \"But this card will never fetch a high price.\""
1005306-61 = "...Why's that?"
1005306-62 = "You don't think I have what it takes to become president?"
1005306-63 = "[ns] \"Nothing like that...\""
1005306-65 = "[ns] \"There's no way I will ever sell this card. I'm holding on to it forever.\""
1005306-72 = "...H-How unwholesome."

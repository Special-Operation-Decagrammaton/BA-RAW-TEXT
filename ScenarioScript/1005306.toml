1005306-38 = "3;유우카 체육복ND;99;모든 학생을 공명하게 지도해야 할 교육자가, 사사로이 학생들의 사진을 몰래 보관하고 계셨다니……"
1005306-39 = "3;유우카 체육복ND;09;부, 불건전해요!\n#3;closeup"
1005306-40 = "[s3] \"아, 그 스포츠 카드 말인가.\"\n[s4] \"크로노스 스쿨의 학생들이 주고 갔어.\""

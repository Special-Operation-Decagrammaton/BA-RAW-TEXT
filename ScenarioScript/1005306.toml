1005306-44 = "3;유우카 체육복ND;99;……그렇군요. 대회에 참가한 선수들의 모습을 트레이딩 카드 형태로 만들어서 유통하는 스포츠 카드라……\n#3;stiff\n#3;a"
1005306-45 = "3;유우카 체육복ND;15;이런 종류의 카드가 매니아들 사이에서 거래된다는 사실은 익히 알고 있었지만, 설마 제 사진도 카드로 만들어질 거라고는 생각지도 못했네요."
1005306-46 = "3;유우카 체육복ND;05;분명 대회 중에 찍은 사진은 크로노스 스쿨에서 마음대로 써도 좋다고 허락해 주긴 했지만, 설마 이런 방식으로 상품화를 하고 있었을 줄이야……"
1005306-47 = "3;유우카 체육복ND;09;이럴 줄 알았으면 계약서를 조금 더 꼼꼼히 검토해 볼 걸 그랬어요.\n#3;em;[땀]"
1005306-48 = "[s5] \"허가가 된 사진이라면 괜찮지 않을까?\"\n[s6] \"사진도 제법 귀엽게 잘 나온 것 같고.\""
1005306-49 = "3;유우카 체육복ND;99;여하튼 신기하네요. 이런 평범해 보이는 카드 한 장이 엄청난 고가에 거래될 수도 있다니……\n#3;stiff"
1005306-50 = "3;유우카 체육복ND;04;그, 그렇게 말씀하셔도……\n#3;em;[///]"
1005306-51 = "3;유우카 체육복ND;99;여하튼 신기하네요. 이런 평범해 보이는 카드 한 장이 엄청난 고가에 거래될 수도 있다니……\n#3;stiff"
1005306-52 = "3;유우카 체육복ND;01;회계 업무를 하며 종종 듣기는 했지만, 콜렉터의 세계는 여전히 이해하기 어렵네요."
1005306-53 = "3;유우카 체육복ND;02;듣자 하니 이런 스포츠 카드는 사진에 찍힌 선수의 활약에 따라 가치가 높아지기도 한다던데……"
1005306-54 = "3;유우카 체육복ND;07;후후, 그럼 제 모습이 찍힌 이 카드도 언젠가 고가에 거래될지도 모르겠네요.\n#3;em;[반짝]"
1005306-55 = "3;유우카 체육복ND;13;지금은 일개 회계에 불과하지만, 열심히 노력한다면 언젠간 저도 밀레니엄의 학생회장이 될지도 모르니까요."
1005306-56 = "3;유우카 체육복ND;02;그러고 보면 친필 사인이 된 스포츠 카드는 더 비싼 값에 거래된다던데……\n#3;em;[반응]"
1005306-57 = "3;유우카 체육복ND;07;나중을 대비해서 미리 사인이라도 해드릴까요?"

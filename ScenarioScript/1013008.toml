[translation]
1013008-1 = "無私付出的姐姐"
1013008-3 = "昴前輩好！啊，還有老師也是！"
1013008-4 = "嗯，大家好。今天都過得還順利嗎？"
1013008-8 = "咦？前輩，那不是只有在傳聞中聽說過的……"
1013008-10 = "傳說級的起司BBQ口味好粗棒嗎！？"
1013008-11 = "咦，咦！？"
1013008-12 = "是，是這樣沒錯……"
1013008-16 = "……"
1013008-17 = "你想吃嗎？"
1013008-22 = "嗯！想吃！"
1013008-23 = "哈哈，我知道了。那這個給你。"
1013008-24 = "真的嗎？謝謝前輩！"
1013008-28 = "……"
1013008-29 = "（其實我原本打算省著慢慢吃的說……）"
1013008-30 = "[s]「這樣可以嗎，昴？」"
1013008-31 = "咦？當，當然！我完全不介意！"
1013008-32 = "表，表情看起來不像……？"
1013008-33 = "沒有，真的沒有！#n是老師你想太多了！"
1013008-36 = "什麼？卡士達布丁口味的果汁？"
1013008-37 = "卡士達布丁本身就已經是夢幻般的甜點了……竟然還有這種口味的果汁……？"
1013008-38 = "沒，沒錯，就是這個。"
1013008-39 = "……"
1013008-40 = "那個，前輩……？"
1013008-41 = "不好意思，我可以……喝一口看看嗎……？"
1013008-42 = "……"
1013008-43 = "來。拿去喝吧。"
1013008-44 = "真的可以嗎！？"
1013008-45 = "當然可以。#n不過如果你願意跟其他人一起分享的話，我會更高興的。"
1013008-46 = "謝謝你，前輩！"
1013008-51 = "（那個很難弄到手的說……）"
1013008-52 = "[s]「……真的可以嗎？」"
1013008-53 = "咦！？"
1013008-54 = "……"
1013008-55 = "當，當然可以！"
1013008-58 = "謝謝前輩！"
1013008-59 = "能讓你高興就好。"
1013008-61 = "我會好好珍惜的！前輩果然最棒了！"
1013008-62 = "嗯，嗯……"
1013008-64 = "（考慮到昴的心情，細節就先略過不提……）"
1013008-65 = "（等到巡邏結束之後，昴的手上已經幾乎什麼也不剩了……）"
1013008-67 = "……"
1013008-68 = "[s]「……」"
1013008-69 = "……"
1013008-70 = "[s]「……」"
1013008-71 = "為，為什麼要那樣看著我……？"
1013008-72 = "[s]「在我面前不用隱藏自己的……」"
1013008-73 = "不是那樣的，真的不是！"
1013008-77 = "不過，果然還是……"
1013008-78 = "覺得稍微……有一點點可惜呢。"
1013008-79 = "[s1]「這樣下去可不行啊，昴同學。」\n[s2]「老師我得暫時綁架你一下了。」"
1013008-82 = "……咦？"
1013008-84 = "老，老師？為什麽突然帶我來這種地方……？"
1013008-85 = "總之先吃了再說……？"
1013008-86 = "……"
1013008-87 = "才不要咧～？我大概能猜到老師在想什麼哦～？#n所以我絕對不會──"
1013008-89 = "這邊是兩位的餐點。請慢用。"
1013008-94 = "[ns]「……真的沒關係嗎？」"
1013008-95 = "那，那當然！我完全不介意的！"
1013008-96 = "不過……這，這純粹只是我隨口問問而已哦！"
1013008-97 = "老師你為什麼……點的全部都是我喜歡的東西呢……？"
1013008-98 = "[s3]「你早就被老師我給看透了哦！」\n[s4]「上次到夏萊當值日生東吃西吃的時候就被我發現了！」"
1013008-101 = "！！！！！"
1013008-102 = "那，那天我當然也很感謝老師！但這次我就先心領了！"
1013008-104 = "（一邊心想著他還真固執……一邊暫時移開了視線）"
1013008-108 = "（接著回過頭一看就發現桌上的食物……變少了一些！）"
1013008-110 = "（之後又刻意移開了視線好幾次……！）"
1013008-114 = "（結果無一例外，桌上的食物確實一點一點地消失著！）"
1013008-116 = "[ns]「好奇怪唷～？」"
1013008-117 = "怎，怎麼了嗎？哪裡奇怪了？"
1013008-118 = "[s]「為什麼食物越來越少了呢～？」"
1013008-119 = "是，是老師吃掉了吧……？"
1013008-120 = "找藉口也要編得合理一點……？"
1013008-121 = "老，老師還真是好榜樣啊！"
1013008-122 = "……"
1013008-123 = "好啦！對不起嘛！是我吃掉的啦！"
1013008-124 = "……老師一定不喜歡這麼貪吃的女高中生吧？"
1013008-125 = "[s]「……！」"
1013008-129 = "[ns5]「不會啊！你們要好好吃飯、好好長大！」\n[ns6]「看到學生吃得津津有味的樣子，我比誰都開心！」"
1013008-132 = "是，是嗎……？"
1013008-133 = "……"
1013008-134 = "謝，謝謝你……"
1013008-135 = "咦？除了這個之外……我還有另一件很不拿手的事？#n那又是什麼呢？"
1013008-136 = "抒發……慾望的方式……？"
1013008-137 = "老師……你該不會到處對其他學生說這種話吧……？"
1013008-141 = "為什麼要別開視線？#n請看著我的眼睛回答我。"
1013008-143 = "（為了躲避昴犀利的視線，故意拉著昴到處跑！）"
1013008-151 = "[ns] 「怎麼樣？」"
1013008-152 = "問我怎麼樣……總覺得有點暈頭轉向的。"
1013008-153 = "與其說是搞不懂，不如說……"
1013008-154 = "可能是因為經驗不多，所以會感到陌生吧。"
1013008-155 = "雖然我以前也有在奧利斯外解決過各種事件，但是在這種……"
1013008-159 = "所謂的「陽光下的地方」……"
1013008-160 = "度過這麼安穩的時光，這還是第一次……"
1013008-161 = "……！？"
1013008-162 = "這是什麼音樂，老師！？"
1013008-163 = "人類的死亡就是環保啊啊啊──！！！"
1013008-165 = "（帶著眼睛為之一亮的昴走進了唱片行！）"
1013008-167 = "重……金屬？原來這叫做重金屬啊！"
1013008-168 = "問我喜不喜歡？#n唔嗯，該怎麼說呢……我感覺……"
1013008-169 = "很強烈！"
1013008-170 = "[ns]「那當然！」"
1013008-171 = "充滿了能量和速度感，就像快要爆發出來一樣……！"
1013008-172 = "而且「這種糟透的世界趕緊毀滅吧」的那種歌詞很對我的胃口！！"
1013008-173 = "[ns]「可別真的付諸行動啊！」"
1013008-175 = "呼……真是太厲害了。老師。"
1013008-176 = "感覺耳朵跟胸口都還在轟轟作響……"
1013008-177 = "咦？我一下就喜歡上了金屬樂，應該很有某方面的「素養」……？"
1013008-178 = "這我就不太清楚了。#n只是感覺有什麼東西猛然闖進了我的心裡……"
1013008-179 = "……尤其是歌詞。"
1013008-180 = "[s]「……你果然還是希望世界毀滅嗎？」"
1013008-181 = "……"
1013008-182 = "我自己也不是很確定。"
1013008-183 = "雖然有時會有那種想法，卻又覺得好像不至於到那種地步。"
1013008-184 = "但是老師不是也說過嗎？人的心情並不是單一的。"
1013008-185 = "……"
1013008-186 = "只要老師能讓我相信這個世界還值得活下去──這樣不就好了嗎？"
1013008-187 = "[ns]「不是，怎麼突然把矛頭轉向我這邊……」"
1013008-188 = "哎呀，別這麼說嘛。老師你不是大人嗎？"
1013008-189 = "[s]「那又不是什麼無敵的詞彙……」"
1013008-190 = "老師自己不是也常拿它來當藉口嗎？"
1013008-191 = "[s]「確實無法否認……」"
1013008-193 = "（就這樣和昴開著無關緊要的玩笑，踏上了歸途）"

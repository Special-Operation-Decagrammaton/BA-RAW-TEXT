[translation]
1013008-1 = "พี่สาวที่พร้อมเสียสละทุกอย่าง"
1013008-3 = "สวัสดีค่ะ รุ่นพี่สุบารุ! อ๊ะ คุณครูก็อยู่ด้วยเหรอคะ!"
1013008-4 = "ค่ะ สวัสดีค่ะ ไม่มีเรื่องอะไรเป็นพิเศษใช่มั้ยคะ?"
1013008-8 = "เอ๋? แต่ว่ารุ่นพี่คะ นั่นมัน..."
1013008-10 = "ขนมข้าวโพดกรอบรสบาร์บีคิวชีสในตำนานที่เขาลือกันไม่ใช่เหรอคะ?!"
1013008-11 = "คะ... คะ?!"
1013008-12 = "ก็ใช่... นะคะ"
1013008-16 = "......"
1013008-17 = "อยากลองชิมเหรอคะ?"
1013008-22 = "ค่ะ! ก็ต้องอยากชิมสิคะ!"
1013008-23 = "ฮ่าๆ เข้าใจแล้วค่ะ นี่ค่ะ"
1013008-24 = "ให้จริงๆ เหรอคะ? ขอบคุณมากค่ะ!"
1013008-28 = "......"
1013008-29 = "(อุตส่าห์คิดว่าจะเก็บขนมข้าวโพดกรอบไว้กินทีละนิดๆ แท้ๆ...)"
1013008-30 = "[s] \"เป็นอะไรรึเปล่า สุบารุ?\""
1013008-31 = "คะ? ค่ะ! แน่นอนอยู่แล้วค่ะ! ฉันไม่เป็นไรเลยค่ะ!"
1013008-32 = "คะ? สีหน้าฉันไม่ได้บอกแบบนั้นเหรอคะ...?"
1013008-33 = "เปล่านะคะ เปล่าค่ะ! คะ... คุณครูคงคิดมากไปเองนั่นแหละค่ะ"
1013008-36 = "คะ? น้ำผลไม้รสคัสตาร์ดพุดดิ้งเหรอคะ?"
1013008-37 = "คัสตาร์ดพุดดิ้งเป็นขนมที่อยู่ในจินตนาการก็จริง... น้ำผลไม้นี่มีรสชาติแบบนั้นเหรอคะ...?"
1013008-38 = "คะ... ค่ะ นี่ไงคะ"
1013008-39 = "......"
1013008-40 = "เอ่อ รุ่นพี่คะ..."
1013008-41 = "ขอโทษนะคะแต่ว่า... ฉันขอลองชิมสักอึกได้มั้ยคะ...?"
1013008-42 = "......"
1013008-43 = "เอ้า เอาไปดื่มสิคะ"
1013008-44 = "ให้ฉันลองชิมได้จริงๆ เหรอคะ?!"
1013008-45 = "แน่นอนค่ะ แต่อย่าดื่มคนเดียวล่ะ แบ่งให้คนอื่นดื่มด้วยกันน่าจะดีกว่านะ"
1013008-46 = "ขอบคุณค่ะรุ่นพี่!"
1013008-51 = "(อันนั้นก็หาซื้อยากซะด้วยสิ...) "
1013008-52 = "[s] \"เป็นอะไรรึเปล่า...?\""
1013008-53 = "คะ?!"
1013008-54 = "......"
1013008-55 = "ค่ะ! ฉันไม่เป็นไรหรอกค่ะ"
1013008-58 = "ขอบคุณนะคะ!"
1013008-59 = "โชคดีจังเลยนะ"
1013008-61 = "จะใช้อย่างดีเลยค่ะ! รุ่นพี่ยอดเยี่ยมที่สุดเลยค่ะ!"
1013008-62 = "ค่า... ค่า..."
1013008-64 = "(เห็นแก่สุบารุ คุณครูเลยขอละคำอธิบายโดยละเอียดไป...)"
1013008-65 = "(หลังทุกอย่างผ่านไป สุบารุก็ไม่เหลืออะไรติดตัวเลยสักอย่าง...)"
1013008-67 = "......"
1013008-68 = "[s] \"......\""
1013008-69 = "......"
1013008-70 = "[s] \"......\""
1013008-71 = "ทะ... ทำไมมองฉันแบบนั้นล่ะคะ...?"
1013008-72 = "[s] \"อยู่ต่อหน้าครูไม่ต้องซ่อนอะไรก็ได้นะ...\""
1013008-73 = "ฉันเปล่าสักหน่อยค่ะ พูดจริงๆ นะคะ!"
1013008-77 = "แต่ว่าเมื่อกี้นี้..."
1013008-78 = "ฉันแอบเสียดายอยู่นิดหน่อยจริงๆ นั่นแหละค่ะ"
1013008-79 = "[s1] \"ครูคงปล่อยเธอไว้แบบนี้ไม่ได้แล้วละ สุบารุ\" \n[s2] \"ครูคงต้องขอ 'ลักพาตัว' เธอไปหน่อยแล้วละ\""
1013008-82 = "คะ...?"
1013008-84 = "คะ... คุณครู? ทำไมจู่ๆ ถึงพามาที่นี่ล่ะคะ...? "
1013008-85 = "คะ? กินก่อนแล้วค่อยคิดเหรอคะ?"
1013008-86 = "......"
1013008-87 = "ไม่เอาหรอกค่ะ~? ฉันพอจะเดาออกนะคะว่าคุณครูคิดอะไรอยู่~? ฉันน่ะไม่มีทาง..."
1013008-89 = "อาหารที่สั่งได้แล้วคร้าบบบ ทานให้อร่อยนะครับ"
1013008-94 = "[ns] \"ไม่เป็นไรแน่นะ...?\""
1013008-95 = "นะ... แน่นอนค่ะ!  ฉันไม่เป็นไรเลยค่ะ!"
1013008-96 = "แต่ว่า... ฉะ... ฉันแค่พูดเฉยๆ นะคะ!"
1013008-97 = "ทำไมคุณครูถึง... สั่งแต่เมนูที่ฉันชอบทั้งนั้นเลยล่ะคะ...?"
1013008-98 = "[s3] \"ครูสังเกตเอาน่ะสิ เด็กดื้อ!\"\n[s4] \"ครูสังเกตตอนที่เธอมาเข้าเวรที่ชาเล่ต์น่ะ\""
1013008-101 = "!!!!"
1013008-102 = "ฉะ... ฉันขอรับไว้แค่ความปรารถนาดีแล้วกันค่ะ! แต่ตอนนั้นก็ขอบคุณจริงๆ นะคะ"
1013008-104 = "(คุณครูนึกในใจว่าสุบารุเป็นเด็กที่ดื้อจริงๆ พลางแกล้งหันหน้าไปมองทางอื่น) "
1013008-108 = "(พอหันกลับมาก็สังเกตได้ว่าอาหารบนโต๊ะ... หายไปบางส่วนแล้ว) "
1013008-110 = "(หลังจากนั้น คุณครูก็แกล้งมองไปทางนู้นทางนี้เรื่อยๆ...)"
1013008-114 = "(และทุกครั้งที่ทำแบบนั้นอาหารบนโต๊ะก็จะค่อยๆ หายไปทีละนิด)"
1013008-116 = "[ns] \"แปลกจังน้า~?\" "
1013008-117 = "อะ... อะไรเหรอคะ มีอะไรเหรอคะ?"
1013008-118 = "[s] \"ทำไมอาหารมันถึงหายไปเองได้น้า~?\" "
1013008-119 = "คะ... คุณครูกินเข้าไปเองรึเปล่าคะ...?"
1013008-120 = "ขอคำแก้ตัวที่มันดูสมจริงกว่านี้หน่อยงั้นเหรอคะ?"
1013008-121 = "ชะ... ช่วยสอนอะไรดีๆ หน่อยได้รึเปล่าล่ะคะ จริงๆ เลยเชียว!"
1013008-122 = "......"
1013008-123 = "ก็ได้ค่ะ! ขอโทษด้วยค่ะ! ฉันเป็นคนกินเองค่ะ!"
1013008-124 = "คุณครูคงไม่ชอบเด็กม.ปลายที่กินมูมมามแบบนี้สินะคะ? "
1013008-125 = "[s] \"...!\""
1013008-129 = "[ns5] \"ไม่ใช่สักหน่อย! พวกเธอต้องกินให้อิ่มจะได้โตไวๆ นะ!\"\n[ns6] \"ไม่มีอะไรน่ามองไปกว่าเด็กที่กินแซ่บอีกแล้วละ!\""
1013008-132 = "งะ... งั้นเหรอคะ...?"
1013008-133 = "......"
1013008-134 = "ขอบคุณ... นะคะ..."
1013008-135 = "คะ? นอกจากเรื่องนั้นแล้ว ยังมีเรื่องที่ฉันไม่ถนัดเป็นพิเศษอีกเหรอคะ? คืออะไรเหรอคะ?"
1013008-136 = "วิธีการปลดปล่อย... ความปรารถนา...?"
1013008-137 = "คุณครูคงไม่ได้ไปพูดแบบนี้กับเด็กคนอื่นๆ ไปทั่วหรอกใช่มั้ยคะ...?"
1013008-141 = "ทำไมถึงหลบตาล่ะคะ นี่คุณครูคะ... หันมาสบตาแล้วพูดกับฉันสิคะ"
1013008-143 = "(คุณครูหลบสายตาที่ทิ่มแทงของสุบารุ แล้วเนียนพาเธอเดินตระเวนไปที่อื่นๆ ต่อแทน)"
1013008-151 = "[ns] \"เป็นยังไงบ้าง?\""
1013008-152 = "ต่อให้ถามว่าเป็นยังไงก็เถอะค่ะ... แต่มันบอกไม่ถูกเลยค่ะ"
1013008-153 = "จะบอกว่าไม่รู้ก็คงไม่ใช่..."
1013008-154 = "แต่น่าจะเป็นเพราะฉันไม่ค่อยมีประสบการณ์ก็เลยรู้สึกไม่คุ้นเคยละมั้งคะ "
1013008-155 = "เมื่อก่อนถึงจะเคยออกไปแก้ปัญหาต่างๆ นอกอาเรียสบ้างก็เถอะค่ะ แต่ว่า..."
1013008-159 = "แต่ในที่ที่เรียกว่า 'ที่แจ้ง'..."
1013008-160 = "ฉันยังไม่เคยได้มีช่วงเวลาแบบนี้มาก่อนเลยละค่ะ..."
1013008-161 = "......?!"
1013008-162 = "นี่เพลงอะไรเหรอคะคุณครู?!"
1013008-163 = "ผู้คนล้มตายโลกถึงได้รอดดดดด ว๊ากกกกกกกก!!!"
1013008-165 = "(คุณครูพาสุบารุที่ดวงตาเป็นประกายเดินเข้าไปในร้านขายแผ่นเสียง)"
1013008-167 = "เฮฟวี่... เมทัล? เพลงแนวเฮฟวี่เมทัลสินะคะ!"
1013008-168 = "ฉันชอบรึเปล่าน่ะเหรอคะ? อะ... เอ่อ... จะพูดว่ายังไงดีล่ะคะ คือว่า..."
1013008-169 = "มันโดนมากเลยค่ะ!"
1013008-170 = "[ns] \"นั่นสินะ!\""
1013008-171 = "เป็นเพลงที่ดูมีพลัง บีตเร็วมากจนเหมือนจะระเบิดออกมาเลยค่ะ...!"
1013008-172 = "แถมเนื้อเพลงที่บอกว่า 'ให้รีบๆ โลกแตกไปซะเถอะ' เนี่ย โดนใจฉันสุดๆ เลยค่ะ!!!"
1013008-173 = "[ns] \"แต่ห้ามทำแบบนั้นเด็ดขาดเลยนะ!\""
1013008-175 = "ฮู่ว สุดยอดเลยค่ะคุณครู "
1013008-176 = "ยังได้ยินเสียง 'ตึงๆ' ในหูอยู่เลยค่ะ..."
1013008-177 = "คะ? ฉันชอบเพลงเมทัลได้ทันทีแบบนี้ แสดงว่ามี 'รสนิยม' ทางด้านนี้อยู่น่ะเหรอคะ?"
1013008-178 = "เรื่องนั้นฉันไม่รู้หรอกค่ะ แค่รู้สึกว่ามันถูกใจมากๆ ก็เท่านั้นเอง..."
1013008-179 = "โดยเฉพาะเนื้อเพลงน่ะค่ะ..."
1013008-180 = "[s] \"สรุปว่า... ยังอยากให้โลกนี้พังป่นปี้ไปซะอยู่สินะ...?\""
1013008-181 = "......"
1013008-182 = "มันจะเป็นยังไงกันนะ... ฉันเองก็ไม่รู้เหมือนกันค่ะ  "
1013008-183 = "ฉันรู้สึกว่าอยากให้เป็นแบบนั้นจริงๆ แต่ขณะเดียวกันก็รู้สึกว่าไม่ได้อยากให้เป็นถึงขนาดนั้นค่ะ"
1013008-184 = "แต่คุณครูก็พูดเองไม่ใช่เหรอคะ? ว่าคนเราไม่ได้มีแค่ด้านเดียว เพราะงั้น..."
1013008-185 = "......"
1013008-186 = "คุณครูก็แค่ต้องทำให้ฉันมั่นใจไงล่ะคะว่าโลกใบนี้ยังเป็นที่ที่จะมีชีวิตต่อไปได้น่ะ"
1013008-187 = "[ns] \"อ้าว ไหงมาลงที่ครูซะงั้นล่ะ\""
1013008-188 = "โธ่... ทำไมล่ะคะ ก็คุณครูเป็นผู้ใหญ่นี่นา?"
1013008-189 = "[s] \"พูดแบบนั้นก็ใช่ว่าจะทำได้ทุกอย่างสักหน่อย...\""
1013008-190 = "แต่คุณครูก็ใช้คำนี้เป็นข้ออ้างบ่อยไม่ใช่เหรอคะ?"
1013008-191 = "[s] \"เรื่องนั้นก็ปฏิเสธไม่ได้เลยแฮะ...\""
1013008-193 = "(หลังจากนั้น คุณครูกับสุบารุก็เดินพูดคุยกันไปตลอดทางกลับ)"

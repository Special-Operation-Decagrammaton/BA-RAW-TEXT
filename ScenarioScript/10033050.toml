10033050-12 = "3;하루나;00;미식이라……. 그렇군요. 간과할 수 없는 표현을, 지금 저희는 들은 것 같습니다.\n#3;em;…"
10033050-13 = "[ns] \"하루나?!\""
10033050-14 = "3;후우카;07;하루나!?\n#3;em;[?!]\n#3;shake"
10033050-15 = "3;하루나;99;물론 이 식당의 음식에 흠잡을 곳이 없다는 것은 인정합니다."
10033050-16 = "3;하루나;06;하지만 정해진 곳에서 정해진 음식만을 먹는 것을, 진정한 미식이라고 할 수 있을까요?\n#3;closeup"
10033050-17 = "3;하루나;01;미식은 아름다운 것, 나아가 탐구할 가치가 있는 것, 우리가 마땅히 도전해야 할 것이 아닐까요?\n#3;greeting\n#3;em;[반짝]"
10033050-18 = "[s] \"무슨 말을 하고 싶은 거야, 하루나?!\""
10033050-19 = "1;아카리;03;즉, 모처럼 백귀야행까지 왔는데 이것저것 맛있는 것을 더 먹어 봐야 하지 않겠느냐는 이야기죠★\n#1;ar"

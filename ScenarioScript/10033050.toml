[translation]
10033050-1 = "Episode 5;Flower Viewing after a Meal"
10033050-2 = "After all that fun and excitement, I'm sure you can guess what's next!"
10033050-3 = "Exactly! No matter how amazing the exhibit, nothing can be enjoyed on an empty stomach!"
10033050-4 = "You'll have a chance to fill yourself to the brim with traditional Hyakkiyako cuisine at this popular restaurant."
10033050-6 = "Please enjoy the charming atmosphere of Hyakkiyako's fine dining scene for lunch!"
10033050-11 = "Heeheehee."
10033050-12 = "Once the words fine dining have been uttered, I simply cannot turn away."
10033050-13 = "[ns] \"Haruna?!\""
10033050-14 = "Haruna?!"
10033050-15 = "I must commend our tour guide's choice. The menu here is exemplary."
10033050-16 = "However, what is the true meaning of fine dining? Eating at a designated place, gorging ourselves on predetermined meals... Is this all cuisine amounts to on this trip?"
10033050-17 = "It cannot be so! Fine dining is the height of existence! It should explode in a beautiful firework showering us in variety and challenging our very understanding of life!"
10033050-18 = "[s] \"I did not follow any of that!\""
10033050-19 = "What she's saying is that we gotta try ALL the yummy food that Hyakkiyako has to offer! ★"
10033050-20 = "And she's totally right! Let's go!"
10033050-24 = "It's not like I can stop them."
10033050-29 = "They never change..."
10033050-30 = "But it seems kinda fun, doesn't it?"
10033050-31 = "You think? Maybe we should go too."
10033050-32 = "Sure, why not?"
10033050-37 = "Please come back! We're on a very tight schedule today!"
10033050-38 = "Oh dear. What do I do, Sensei?"
10033050-39 = "[s] \"Let's follow them for now!\""
10033050-42 = "Mm, yes. While the soy sauce seasoning on this chicken skewer is strong, the slight hint of ginger prevents it from becoming overpowering."
10033050-43 = "Check this out! It's manju with monjayaki in it! You'd never find something like this in Gehenna... I'm going to try adding some wasabi and chili sauce!"
10033050-44 = "I love how this grilled squid actually fills me up. Not only do they use an entire squid in one order, but the fact that it's a giant squid... *mwah* Chef's kiss!"
10033050-45 = "...A challenge? I just have to eat ten squids within five minutes? Now we're really talking! ★"
10033050-46 = "I'm supposed to eat this rice ball and tempura together? Like tendon? How weird."
10033050-47 = "Should I just go for it? "
10033050-51 = "...Whoa?!"
10033050-52 = "Excellent. We've sampled all the food stalls in this area."
10033050-53 = "There's no time to waste, foodies! On to the next!"
10033050-54 = "Yes, ma'am!"
10033050-61 = "Found them... Over here, Sensei."
10033050-62 = "[s] \"Thank you, Tsubaki! Everyone, this way!\""
10033050-63 = "*pant* *pant* Are they even human?!"
10033050-64 = "I'm truly in awe of how rapidly they can move through the stalls! They're eating faster than we can run!"
10033050-66 = "W-Wait for me! Waaaah!"
10033050-67 = "We must make haste, Sensei! It'll all be over if we lose sight of them!"
10033050-71 = "This next area of food stalls..."
10033050-72 = "How shall I say this? They're rather...unique."
10033050-73 = "This super-spicy chicken skewer is one thing, but this candied apple, formulated with only bitter and sour flavors..."
10033050-74 = "Isn't it super yummy? This must be a Hyakkiyako special!"
10033050-75 = "(What? She...likes it? We're just gonna have to up the ante, ain't we?)"
10033050-76 = "Step right up! What I got here is rice balls with super pickled plum sauce! This real special sauce's made by concentratin' pickled plum an extra ten times!"
10033050-81 = "The contrast of sweet and sour is making my head go weee! Gimme more!"
10033050-85 = "(She's a monster! But I ain't givin' up!)"
10033050-86 = "Please enjoy this local dish! It's toast with kusaya jam!"
10033050-90 = "Wow, it smells like a whole new mix of fish and sourness!"
10033050-91 = "It really warms my tummy! So good!"
10033050-92 = "Hakarl soba!"
10033050-93 = "Yummy!"
10033050-94 = "Fermented herring ramen!"
10033050-95 = "This savory flavor! Wow, wow, wow!"
10033050-97 = "...Sea cucumber takoyaki vanilla parfait!"
10033050-98 = "Stop right there! I've just confirmed that you are operating without a food license!"
10033050-100 = "Tsk!"
10033050-104 = "Please don't worry yourself."
10033050-105 = "Wh-Why not?!"
10033050-106 = "Food licenses...permits... Why do these things matter? Having the opportunity to experience new cuisines in foreign lands is exactly what a gourmet field trip should be!"
10033050-107 = "And if you come in the way of our fine dining, the Gourmet Research Society will not stand idly by!"
10033050-108 = "Don't take it away! It was seriously delicious!"
10033050-109 = "You're the only one who thought that!"
10033050-110 = "It's a true, bona fide field trip experience! I approve! ★"
10033050-112 = "You should listen to the tour guide. It's highly discouraged to eat food from unlicensed vendors."
10033050-113 = "I see where your loyalties lie, Fuuka. I thought you of all people would understand the Gourmet Research Society's mission."
10033050-114 = "This isn't a matter of ideology! It's food safety!"

10033050-1 = "#title;제5화;꽃구경도 식사 후에"
10033050-2 = "4;우미카;99;마음껏 즐기고 만끽하다 보니 어느덧 이런 시간…….\n#4;a"
10033050-3 = "4;우미카;01;그렇지요! 아무리 멋진 일이 기다리고 있다 해도, 배가 고파서는 아무것도 할 수 없는 법이죠.\n#4;em;[!]"
10033050-4 = "4;우미카;00;그래서 저희는 백귀야행의 전통이 담긴 이 식당으로, 게헨나 여러분을 모셨답니다!\n#4;m3"
10033050-5 = "#all;hide"
10033050-6 = "3;우미카;03;부디 이 식당에서, 백귀야행의 정취와 매력, 그리고 미식을 한껏 즐기셨으면 합니다!\n#3;closeup"

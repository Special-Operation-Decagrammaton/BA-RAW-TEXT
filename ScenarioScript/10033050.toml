10033050-42 = "3;하루나;02;으흠. 간장의 맛이 매우 진한 닭꼬치군요. 거기에 살짝 풍겨 나오는 생강의 향이 풍미를 한층 더해 주네요.\n#3;em;[하트]\n#3;a"
10033050-43 = "3;이즈미;00;와! 안에 몬쟈야키가 들어간 만쥬야! 이런 건 처음 먹어 봐! 여기엔 무슨 소스가 어울릴까……. 역시 와사비와 칠리소스일까?\n#3;hophop"
10033050-44 = "3;아카리;02;아, 이 오징어구이는 양이 제법 되네요. 만족스러워요. 한 마리를 통째로 쓴 것도 마음에 들지만, 무엇보다 대왕오징어를 쓴 게 합격점이네요."
10033050-45 = "3;아카리;05;아하……? 열 마리를 5분 안에 완식하면 무료라고요? 그런 멋진 소식이★\n#3;em;[음표]\n#3;greeting"
10033050-46 = "3;준코;02;주먹밥과 튀김을 한 자리에 올려서, 튀김덮밥을 먹는 느낌으로 즐기라고……? 알 것 같기도 모를 것 같기도…….\n#3;closeup\n#3;em;[?]"

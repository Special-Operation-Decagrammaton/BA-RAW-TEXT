[translation]
10033050-1 = "第5話;飯後再賞花"
10033050-2 = "盡情享受之後，不知不覺就到了這個時候……"
10033050-3 = "但是各位！無論有多麼美好的事等著我們，要是肚子餓可是什麼都做不了的。"
10033050-4 = "所以我們特意邀請格黑娜的大家，來到這間百鬼夜行傳統的餐廳！"
10033050-6 = "希望各位能在這間餐廳，盡情享受百鬼夜行的氛圍、魅力和美食！"
10033050-11 = "呵呵呵……"
10033050-12 = "美食啊……我們好像聽到了無法忽略的話呢。"
10033050-13 = "[ns]「羽留奈！？」"
10033050-14 = "羽留奈！？"
10033050-15 = "當然，我承認這家餐廳的食物無可挑剔。"
10033050-16 = "但只在指定的地方吃指定的食物，能稱得上是真正的美食嗎？"
10033050-17 = "美食難道不是美麗的、值得探索的、應該去挑戰和追求的嗎？"
10033050-18 = "[s]「你這麼說是什麼意思，羽留奈！？」"
10033050-19 = "既然難得來到百鬼夜行，應該多嘗嘗這裡的美食吧★的意思。"
10033050-20 = "贊成贊成！我也要去！"
10033050-24 = "嗯，既然你們都這麼說了，也沒其他選擇了吧？"
10033050-29 = "他們又來了……"
10033050-30 = "不過不覺得好像很有趣嗎？"
10033050-31 = "你呢？要一起嗎？"
10033050-32 = "一起去吧！"
10033050-37 = "等等，各位！這樣任意離開可能會打亂行程……順序……！"
10033050-38 = "這，這這，這該怎麼辦？老師！？"
10033050-39 = "[s]「總之先跟上去吧！」"
10033050-42 = "嗯……雞肉串的醬油味很濃郁。#n微微散發的生薑香氣更增添了風味。"
10033050-43 = "哇！是裡面有文字燒的饅頭！我第一次吃到！#n這個適合什麼醬汁呢……果然是芥末和辣椒醬吧？"
10033050-44 = "啊，這個烤魷魚的分量十足，我很滿意。#n整隻一起烤的這點我也很喜歡，而且更重要的是使用了大王魷魚。"
10033050-45 = "啊哈……？如果在5分鐘內吃完10隻就可以免費嗎？#n還有這種好事呀★"
10033050-46 = "將飯糰和炸物放在一起，享受像吃炸物蓋飯一樣的感覺……？#n有種似懂非懂的感覺……"
10033050-47 = "那就先從炸物開始吃吧？"
10033050-51 = "……哇啊啊！？"
10033050-52 = "好，這一帶的攤販大致上都已經征服了。"
10033050-53 = "那麼各位，繼續往下一個角落的攤位前進吧！"
10033050-54 = "贊成！"
10033050-61 = "嗯……找到了……老師，在這裡……"
10033050-62 = "[s]「謝謝你，椿！大家往這邊！」"
10033050-63 = "哈啊，哈啊……！那些人是怎麼回事？"
10033050-64 = "速度真是驚人！步伐比追在後頭的我們還快，彷彿要征服所有攤位一樣！"
10033050-66 = "哇啊啊～！別丟下我啊～！"
10033050-67 = "老師，再這樣下去又會跟丟的！趕緊走吧！"
10033050-71 = "我們已經抵達了下一個攤位區，但是……"
10033050-72 = "這一區的食物……該怎麼說呢？#n味道真是……很有個性呢？"
10033050-73 = "特別是這種極辣的雞肉串，以及毫無甜味、充斥著酸味與苦澀味的蘋果糖……"
10033050-74 = "嗯！可是我挺喜歡的耶？#n這種獨特的味道，在其他地方很難找到！"
10033050-75 = "（什麼？喜歡這個味道……？#n　既然如此……！）"
10033050-76 = "嘗，嘗嘗看吧！這次是把梅子醋的酸味濃縮十倍！淋上超級醃製梅醬菜的飯糰！"
10033050-81 = "哇！這股酸味，濃烈到讓人頭皮發麻！我很滿意！"
10033050-85 = "（怎麼會……！既然如此，那這個怎麼樣！）"
10033050-86 = "請用！這是塗上滿滿臭魚乾醬的吐司！"
10033050-90 = "把魚特有的氣味和清爽的酸味混合在一起……進一步濃縮而成的醬汁！"
10033050-91 = "就像抹醬一樣！好好吃！"
10033050-92 = "發酵鯊魚肉蕎麥麵！"
10033050-93 = "嗯嗯！"
10033050-94 = "醃製鯡魚拉麵！"
10033050-95 = "好特別的鮮味！"
10033050-97 = "……海參章魚燒香草百匯！"
10033050-98 = "等等！那是不被允許販賣的食物吧！我剛剛確認過了！"
10033050-100 = "呿……！"
10033050-104 = "不，話不能這麼說。"
10033050-105 = "咦！？"
10033050-106 = "即使是不被允許的食物……在這裡的嶄新邂逅，以及和新食物的相遇……#n這些也是修學旅行的餘興和美食之旅的一部分！"
10033050-107 = "如果有人想要阻撓，我們美食研究會絕不會坐視不理！"
10033050-108 = "沒錯！超級好吃的！"
10033050-109 = "只有你能吃得津津有味吧！"
10033050-110 = "哎呀，這也是在旅遊景點偶然碰到的驚喜★我也挺喜歡的。"
10033050-112 = "不不不，這怎麼可以呢！？#n打從一開始，販賣未經許可的食物本身就有問題！"
10033050-113 = "這樣啊。真讓人遺憾，風華同學。#n我還以為你一定能理解我們美食研究會的想法。"
10033050-114 = "有些事我可以理解，但有些事不行就是不行！"

10016005-30 = "5;시논;03;이야— 올해는 연초부터 흉흉한 사건들이 잇달아 터지는 바람에 대운동회도 열리지 못할 줄 알았는데…… 다행스럽게도 무사히 개최되었네요.\n#5;em;[반짝]"
10016005-31 = "5;시논;00;밀레니엄 학원이 보유하고 있는 우수한 기술력의 도움을 받은 덕분일까요?"
10016005-32 = "1;마이;02;네. 이번 <황륜대제>는 '밀레니엄 학원의 박람회'라고 불러도 손색이 없을 만큼, 밀레니엄 사이언스 스쿨의 최첨단 과학기술이 아낌없이 사용되었습니다.\n#1;em;[반응]"
10016005-33 = "1;마이;00;덕분에 사람의 손으로 세우기 어려운 이런 대형 구조물이나, 안내용 로봇 등도 단기간에 준비할 수 있었다고 합니다만……\n#1;greeting"
10016005-34 = "1;마이;00;……하지만 들리는 소문에 의하면, 밀레니엄 학원 내에서도 개최를 확신하기 어려울 정도의 여러 가지 문제가 발생했다고 하는데요.\n#1;em;[반짝]"
10016005-35 = "1;마이;03;개회식을 하루 앞두고 일부 경기 종목이 조정된 게 그 증거라고 합니다."
10016005-36 = "5;시논;05;도대체 어떤 문제가 있었던 걸까요?\n#5;em;[?]"
10016005-37 = "1;마이;06;안타깝게도 밀레니엄 학원의 보안이 삼엄하여 그 진상에 도달하지는 못했습니다만……\n#1;em;[속상함]\n#1;stiff"
10016005-38 = "1;마이;99;저희 취재진은 취재 도중 충격적인 사실을 하나 발견하게 되었습니다."
10016005-39 = "1;마이;05;이번 대운동회의 경기 종목을 조정하도록 제안한 사람이 다름 아닌……\n#1;m2\n#1;em;…"
10016005-40 = "5;시논;05;다름 아닌……?\n#5;m4\n#5;em;[?]"
10016005-41 = "1;마이;03;바로, 샬레의 선생님이라고 합니다!\n#1;em;[!]\n#fontsize;80"

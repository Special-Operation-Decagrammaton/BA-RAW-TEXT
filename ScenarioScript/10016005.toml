10016005-3 = "5;시논;01\n1;마이;00;안녕하세요, 크로노스 채널의 시청자 여러분!\n#1;em;[반응]\n#1;a\n#5;a"
10016005-4 = "1;마이;03;저희는 지금 키보토스 육상 대회의 성지라 할 수 있는 <애슬레틱 스타디움>의 중계석에 나와 있습니다!"
10016005-5 = "5;시논;02;이른 아침임에도 불구하고 이곳, 애슬레틱 스타디움에는 많은 학생 여러분이 찾아와주셨는데요."
10016005-6 = "5;시논;07;그 이유는 바로…… 후후, 저희가 말씀드리지 않아도 다들 알고 계시겠지요?\n#5;em;[음표]"
10016005-7 = "5;시논;00;네, 바로 오늘 열리는 키보토스 대운동회— <황륜대제>에 참가하기 위해서입니다!"
10016005-8 = "1;마이;99;2년마다 열리는 이 <황륜대제>는 트리니티와 게헨나, 밀레니엄 등 여러 학원의 학생들이 한자리에 모여 경쟁을 치르는, 키보토스에서도 보기 드문 대형 축제입니다.\n#1;em;…"
10016005-9 = "1;마이;00;더욱이 이번 <황륜대제>는 밀레니엄 학원의 주관으로 보내 드리고 있기 때문에 학생들의 박진감 넘치는 경기뿐만 아니라 밀레니엄의 새로운 발명품 등 다양한 볼거리가 준비되어 있습니다."
10016005-10 = "5;시논;99;시청자 여러분 중에는 개인 사정으로 인해 기숙사나 학원 자치구 내에서 이 방송을 보고 계신 분들도 있으실 텐데요……\n#5;em;…"
10016005-11 = "5;시논;00;회장에 직접 방문하지 못하셨더라도 전혀 아쉬워하실 필요가 없습니다!"
10016005-12 = "5;시논;07;저희 크로노스 채널에서 Full HD 해상도로 대운동회를 단독 중계해 드리고 있으니까요!\n#5;em;[음표]"
10016005-13 = "1;마이;03;시시각각 업데이트되는 황륜대제의 다양한 광경을 시청하고 싶으시다면 지금 바로 <크로노스 채널>에 접속하셔서 좋아요와 구독, 그리고 알림 설정을……\n#1;em;[재잘]\n#1;hophop"

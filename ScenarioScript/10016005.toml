[translation]
10016005-1 = "Prologue;A Fiery Opening Ceremony"
10016005-2 = "The Stadium Broadcasting Studio"
10016005-3 = "Hello and welcome to the Kronos channel!"
10016005-4 = "We're here in the thick of it, reporting live! It's the very hub of the Kivotos Halo Festival: the Athletic Stadium!"
10016005-5 = "Look at all of the students milling about the stadium, despite how early it is!"
10016005-6 = "They're all gathered here today for one special reason, one that I'm sure you're all aware of."
10016005-7 = "That's right! Students are lining up to sign in and collect their name tags to participate in the field day!"
10016005-8 = "Held every two years, the Kivotos Halo Festival is a large-scale event, the likes of which is rarely seen in Kivotos. Academies all over put aside their differences and send their students to fight for victory in friendly competition."
10016005-9 = "Moreover, on top of the action-packed student games, with Millennium Science School hosting, this year's Halo Festival also has all sorts of attractions in store, such as showcases of Millennium's latest inventions."
10016005-10 = "To all our viewers watching from their dorm rooms or just back at home..."
10016005-11 = "We know it's hard to be missing out on the excitement, but have no fear!"
10016005-12 = "Why? Because the Kronos channel is your one-stop, exclusive broadcast of the Halo Festival, now in full HD resolution!"
10016005-13 = "Make sure you don't miss a single moment of the exciting events of the field day! Subscribe, hit that like button, and turn on notifications for our channel..."
10016005-18 = "Whoops! The Executive Committee is going to cut us off if we don't stop with the promotions."
10016005-19 = "All right! We'll let the event talk for itself, then."
10016005-20 = "Without further ado, if you can hear over the roar of the crowd..."
10016005-21 = "We would like to present to you..."
10016005-22 = "The Kivotos Halo Festival!"
10016005-30 = "You know, Mai, I was really worried that the Halo Festival would be canceled this year, considering the current climate across Kivotos and the string of incidents this year. I'm relieved they were still able to hold it as planned."
10016005-31 = "Do you think it was Millennium's superior technology that helped make this happen?"
10016005-32 = "Absolutely! Millennium Science School used all of the cutting-edge scientific and technological tools in their arsenal to put this event together. You could even go as far as to call this year's Halo Festival the Millennium Expo instead!"
10016005-33 = "I've gathered that they were able to erect these massive structures, prepare robot guides, and much more thanks to their technical expertise..."
10016005-34 = "...But rumors are also spreading that this school of geniuses ran into quite a few speed bumps that made everyone wonder if preparations would be done on time."
10016005-35 = "And there are still questions swirling around the sudden changes in some of the games."
10016005-36 = "What on earth could have happened?"
10016005-37 = "Unfortunately, Millennium's state-of-the-art security makes the truth nearly impossible to find."
10016005-38 = "But security means nothing to the determined reporters of the Kronos School! We uncovered a fact that will shock you!"
10016005-39 = "The person who suggested the field day event changes was none other than..."
10016005-40 = "Than who?!"
10016005-41 = "Sensei from Schale!"
10016005-42 = "Seriously? THE Sensei?!"
10016005-43 = "Yes! The very same Sensei that always seems to be in the thick of controversy was an instrumental factor in the preparations for the Halo Festival."
10016005-44 = "What a highly suspicious—I mean, interesting—occurrence!"
10016005-45 = "I couldn't agree more! This is what we call a scoop!"
10016005-50 = "Oops, that's another complaint from the Executive Committee...."
10016005-51 = "Ahem, whoops! To get back to the topic, this year's representative athletes are currently approaching the stage for the field day pledge, the final stage of the opening ceremony."
10016005-52 = "It looks like the representing athletes of this year's Kivotos Halo Festival are...Okusora Ayane of Abydos High School and Urawa Hanako of Trinity General School."
10016005-53 = "Now, all eyes on the stage!"
10016005-56 = "I've never spoken in front of such a big crowd... I'm getting a little nervous."
10016005-57 = "What if I stutter or make a mistake?"
10016005-58 = "There, there, Ayane. There's nothing to worry about."
10016005-59 = "It's a big crowd, and we are representatives. But this pledge is about you and your resolve."
10016005-60 = "As long as you're honest with yourself, everything will be fine. The audience doesn't matter."
10016005-61 = "Hm, maybe it would be easier if you pretend the audience and viewers are just harmless carrots or cucumbers?"
10016005-65 = "You're incredible, Hanako. Even in this high-pressure situation, you speak with so much composure. It's very befitting of a student of Trinity."
10016005-66 = "I can't help but be impressed."
10016005-67 = "Oh my. You give me too much credit, but I'm honored."
10016005-69 = "(You can do this. Take deep breaths. They're all cucumbers...)"
10016005-70 = "I solemnly pledge on behalf of all athletes!"
10016005-71 = "I solemnly pledge on behalf of all athletes~"
10016005-72 = "That all participating athletes of this year's Kivotos Halo Festival...!"
10016005-73 = "That all participating athletes of this year's Kivotos Halo Festival...!"
10016005-74 = "Shall adhere to the spirit of true sportsmanship...!"
10016005-75 = "Shall adhere to the spirit of candid, individual desire...!"
10016005-76 = "And dedicate ourselves to the upcoming games..."
10016005-77 = "And dedicate ourselves to getting close and physical..."
10016005-81 = "Um, Hanako...? I don't think that's how the pledge goes... Is your copy incorrect?"
10016005-82 = "Nope! It's like I just said... Don't get hung up on the little details and be honest with yourself."
10016005-83 = "This field day is a place of camaraderie and togetherness, where students from different academies lay down their weapons to engage each other intimately and physically..."
10016005-84 = "In short..."
10016005-85 = "It's just like ■■■!"
10016005-89 = "Wh-What do you mean...?"
10016005-90 = "Wait a second, Hanako! You didn't turn your mic off!"
10016005-91 = "Ah, pay it no heed. Those viewers out there are just carrots and cucumbers anyway."
10016005-92 = "This has been on my mind. Engaging in intimate, physical struggles with each other in an attempt to foster our relationships? It's a bit of a lewd festival if you really think about it. Heehee."
10016005-93 = "...What the hell is that student saying?!"
10016005-94 = "But I think it's a fantastic idea. Our respective affiliations and biases may keep us from understanding each other, but who knows? We might be able to be honest with each other...through our bodies, you know?"
10016005-95 = "If all the students of Kivotos ■■■■■■ each other in good spirits, the festival's goal of peaceful competition might not be so far-fetched...!"
10016005-96 = "Get her off the stage right now!"
10016005-97 = "What the hell was Trinity thinking, choosing her as their representative?!"
10016005-98 = "Heehee... We'll all do ■■, ■■, and ■■!"
10016005-99 = "With more feeling! More passion! Until we ■■, ■■, and ■■!"
10016005-105 = "*whisper* ...That was definitely a broadcast accident, right?"
10016005-106 = "I can't believe it. Trinity's student representative, before the watchful eyes of the audience and viewers, started spewing lewd obscenities too vulgar to even broadcast."
10016005-108 = "Now, that's what we call a scoop!"
10016005-109 = "Did you get all that on camera? We'll do a breakdown right now and broadcast it as a special piece..."
10016005-114 = "...Pardon? One moment. What do you mean, we can't broadcast that footage?!"
10016005-115 = "Our contract states that the Kronos School has exclusive rights to all content related to the festival's field day!"
10016005-116 = "If you try to break our contract, I'll have no choice but to expose that the contents of the illicit fan book we acquired from the Red Winter Academy is indeed accurate... It's been a point of keen interest for many students!"
10016005-117 = "Whoa, slow down a second! Pulling something like that is way above your pay grade!"
10016005-121 = "I-In spite of some technical difficulties, we'll be continuing to bring you exclusive coverage of the Kivotos Halo Festival here on the Kronos channel!"
10016005-125 = "Everyone, stay tuned!"

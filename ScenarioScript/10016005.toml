[translation]
10016005-1 = "序幕;燃燒的開幕式"
10016005-2 = "運動場廣播室"
10016005-3 = "克洛盧斯頻道的各位觀眾，大家好！"
10016005-4 = "這是來自奇普托斯田徑大會的聖地「田徑運動場」的轉播！"
10016005-5 = "儘管還是一大早，運動場內卻早已擠滿了學生。"
10016005-6 = "至於理由……相信就算不說，大家也都知道吧？"
10016005-7 = "沒錯！今天就是奇普托斯大運動會──#n「晄輪大祭」舉辦的日子！"
10016005-8 = "每2年舉辦一次，以三一、格黑娜、千年為首的各個學園們互相競爭，#n是奇普托斯少見的大型慶典。"
10016005-9 = "而且這次的主辦為千年科學學園，想必會準備包含新發明在內的各種看點。#n相信氣氛一定會比往年更加熱烈！"
10016005-10 = "我想應該有不少不克前來的觀眾，只能從宿舍或自治區內觀看轉播……"
10016005-11 = "但千萬不要覺得可惜！"
10016005-12 = "因為我們克洛盧斯頻道，將以高解析度的畫質及逼真的音質，#n獨家轉播今年的晄輪大祭！"
10016005-13 = "如果不想漏看晄輪大祭的各場比賽，請立刻訂閱克洛盧斯頻道。#n按讚、分享、開啟小鈴鐺──"
10016005-18 = "哎呀，實行委員會在催了……"
10016005-19 = "頻道推廣就先放一旁。"
10016005-20 = "現在，請各位同學一起熱烈地歡呼──"
10016005-21 = "晄輪大祭──"
10016005-22 = "正式開幕！"
10016005-30 = "哎呀～今年從年初開始，接二連三地發生了可怕的事件，#n本以為晄輪大祭會因此順延……所幸最終還是順利舉辦了呢。"
10016005-31 = "這果然得歸功於千年優秀的技術力吧？"
10016005-32 = "沒錯沒錯。這次「晄輪大祭」又被稱為「千年博覽會」，#n千年將毫不保留地展現科學學園的最尖端技術。"
10016005-33 = "因此，才能在這麼短的時間內準備像這樣的大型建築物以及嚮導機器人……"
10016005-34 = "……但有傳聞指出，千年內部發生了危及慶典舉辦與否的問題。"
10016005-35 = "在開幕式的前一天緊急調整部分競賽的內容……似乎也證實了這一點。"
10016005-36 = "到底是發生了什麼問題呢？"
10016005-37 = "很可惜，千年的保全實在過於嚴密，#n所以我們未能調查出真相……"
10016005-38 = "不過我們新聞部在採訪時，得知了一個驚人的事實。"
10016005-39 = "突然提議要調整競賽內容的，不是別人……"
10016005-40 = "難道是……？"
10016005-41 = "沒錯，就是夏萊的老師！"
10016005-42 = "夏萊的老師嗎？"
10016005-43 = "總是與所有事件牽連的夏萊老師，竟然也參加了大運動會的準備……"
10016005-44 = "真是疑點重重──啊，不，真是意想不到的人選呢！"
10016005-45 = "是啊！總覺得能聞到一股大新聞的味道……"
10016005-50 = "哎呀，實行委員會又在催了……"
10016005-51 = "啊！在我說話的同時，也即將迎來開幕式的最後環節！#n──選手宣誓！"
10016005-52 = "今年的選手代表是……#n阿拜多斯高中的「奥空綾音」選手，以及三一綜合學園的「浦和花子」選手。"
10016005-53 = "請大家注意台上！"
10016005-56 = "唔唔……第一次站在這麼多人面前，有點緊張呢……"
10016005-57 = "雖然練習了好幾次，但一想到可能會吃螺絲就……"
10016005-58 = "不需那麼緊張唷，奥空同學。"
10016005-59 = "雖然說是選手代表，其實也只需要在大家面前表明自己的決心而已。"
10016005-60 = "不用在意他人的目光，只要坦率地面對自己的內心就行了。"
10016005-61 = "呵呵，只要把眼前的人們當作是紅蘿蔔和小黃瓜，心情就會變得愉悅吧？"
10016005-65 = "花子同學真厲害。#n能如此大方地站在眾人面前……不愧是三一的大小姐。"
10016005-66 = "不禁讓人有點羨慕呢，哈哈……"
10016005-67 = "哎呀，能聽到你這麼說是我的榮幸。"
10016005-69 = "（呼……不要焦慮，冷靜下來……）"
10016005-70 = "謹代表全體選手，宣誓！"
10016005-71 = "謹代表全體選手，宣誓～"
10016005-72 = "身為參加「晄輪大祭」的選手……"
10016005-73 = "身為參加「晄輪大祭」的選手……"
10016005-74 = "將秉持著正當的體育精神……"
10016005-75 = "將直面「最真實的慾望」……"
10016005-76 = "盡力參與每一場比賽……"
10016005-77 = "致力於「和身體對話」……"
10016005-81 = "請等一下，花子同學。#n剛才說的內容究竟是……？"
10016005-82 = "呵呵，我剛才不是說了嗎？#n不用在意他人的目光，只要坦率地面對自己的內心就行了。"
10016005-83 = "晄輪大祭是各學園的學生們放下武器，相互碰撞彼此的肌膚，#n加深親密關係的地方……"
10016005-84 = "換句話說……"
10016005-85 = "和■■是一樣的吧？"
10016005-89 = "那，那是什麼意思……"
10016005-90 = "請，請等一下，花子同學！#n麥克風！麥克風還開著唷！"
10016005-91 = "不用在意。#n在這裡的只是些紅蘿蔔和小黃瓜而已。"
10016005-92 = "我之前就在想。#n和他人的肌膚相互碰撞……晄輪大祭是多麼淫亂的慶典啊……呵呵。"
10016005-93 = "喂……他在說什麼呀！？"
10016005-94 = "不過，我認為這是個好機會。#n拋開所屬單位的束縛和先入為主的刻板印象，便能逐漸了解對方的內心……#n因為身體是誠實的。"
10016005-95 = "奇普托斯的全體學生們，聚在一起■■的和睦模樣，#n那將會是多麼「和平的景色」──"
10016005-96 = "快把他從台上趕下來！"
10016005-97 = "三一到底在想什麼，怎麼會讓那種學生擔任代表呀──"
10016005-98 = "呵呵……■■！大家一起■■吧！"
10016005-99 = "激烈地探索彼此！#n■■！■■！■■──！"
10016005-105 = "那個……剛才算是放送事故吧？"
10016005-106 = "三一的代表竟然在大庭廣眾下，大言不慚地說著一些無法播出的內容……"
10016005-108 = "這可是獨家新聞呢！"
10016005-109 = "錄音室，有拍下來吧？#n馬上製作成臨時專題報導……"
10016005-114 = "……什麼？請等一下。#n剛才的影像不能播放？這是什麼意思？"
10016005-115 = "根據約定，所有在晄輪大祭中拍攝的影像，都將交由我們克洛盧斯校園獨家轉播吧？"
10016005-116 = "毀約的話，就別怪我拿出法寶了！#n某本從赤冬聯邦學園自治區取得的同人誌──"
10016005-117 = "嗚哇！在這裡說的話會惹上麻煩的，前輩！"
10016005-121 = "哎呀，發生了點突發狀況，真不好意思！#n克洛盧斯頻道將繼續獨家轉播「晄輪大祭」的最新情況！"
10016005-125 = "大家，請千萬別轉台唷！"

[translation]
10016005-1 = "บทเริ่มต้น;พิธีเปิดที่ลุกเป็นไฟ"
10016005-2 = "ห้องถ่ายทอดสด สนามกีฬา"
10016005-3 = "สวัสดีค่ะ ผู้ชมช่องโครโนสทุกท่าน!"
10016005-4 = "ตอนนี้พวกเราอยู่ที่โต๊ะผู้ประกาศข่าวใน <สนามแข่งขันกีฬา> ที่เรียกได้ว่าเป็นสถานที่ศักดิ์สิทธิ์สำหรับ#nจัดงานแข่งขันกีฬาคิโวทอสค่ะ!"
10016005-5 = "แม้ว่าจะเป็นช่วงเวลาเช้าตรู่ แต่ก็มีนักเรียนมาที่สนามแข่งขันกีฬากันเป็นจำนวนมากเลยนะคะเนี่ย"
10016005-6 = "และเหตุผลก็คือ... ฮุฮุ ถึงพวกเราไม่บอกทุกท่านก็ทราบกันอยู่แล้วใช่มั้ยคะ?"
10016005-7 = "ใช่แล้วค่ะ เหตุผลก็คือเพื่อเข้าร่วมงานมหกรรมแข่งขันกีฬาคิโวทอส <ฮาโลเฟสติวัล> ที่จัดขึ้นในวันนี้#nนั่นเองค่ะ!"
10016005-8 = "<ฮาโลเฟสติวัล> ที่จัดขึ้นทุกๆ 2 ปี เป็นเทศกาลขนาดใหญ่ที่เหล่านักเรียนจากทรีนิตี้ เกเฮนน่า มิลเลเนียม และโรงเรียนอื่นๆ จะมารวมตัวกัน เป็นภาพที่ไม่ได้เห็นกันบ่อยๆ ในคิโวทอสนะคะ"
10016005-9 = "และที่สำคัญ <ฮาโลเฟสติวัล> ในครั้งนี้ได้โรงเรียนมิลเลเนียมเป็นเจ้าภาพจัดงาน นอกจากการแข่งขัน#nที่น่าตื่นเต้นของเหล่านักเรียน เราก็คงจะได้เห็นสิ่งประดิษฐ์ใหม่ๆ ที่น่าสนใจจากมิลเลเนียมด้วยค่ะ"
10016005-10 = "หากว่ามีผู้ชมท่านไหนที่ต้องอยู่ในหอพักหรือในเขตปกครองตนเองเพราะเหตุผลส่วนตัวและกำลังดู#nการถ่ายทอดสดนี้อยู่..."
10016005-11 = "ถึงจะมาร่วมงานไม่ได้ แต่ก็ไม่ต้องเสียใจไปนะคะ!"
10016005-12 = "ช่องโครโนสของพวกเราจะถ่ายทอดสดงานมหกรรมแข่งขันกีฬาแบบ Full HD เลยละค่า!"
10016005-13 = "หากอยากรับชมบรรยากาศในงานฮาโลเฟสติวัลแบบเรียลไทม์ละก็ เปิดเข้ามาดู <ช่องโครโนส> ตอนนี้ได้เลย แล้วอย่าลืมกดไลก์ กดติดตาม และกดกระดิ่งแจ้งเตือนเอาไว้จะได้ไม่พลาด..."
10016005-18 = "ตายจริง... คณะกรรมการจัดงานเริ่มประท้วงแล้วค่ะ..."
10016005-19 = "ดูเหมือนว่าคงจะต้องมาอธิบายกันทีหลังแล้วสินะคะ"
10016005-20 = "ถ้าอย่างนั้นไปพบกับเสียงร้องและเสียงเชียร์จากเหล่านักเรียน..."
10016005-21 = "งานมหกรรมแข่งขันกีฬาคิโวทอสจะเริ่มต้น—"
10016005-22 = "ณ บัดนี้ค่ะ!"
10016005-30 = "ว้าว... ปีนี้มีเหตุการณ์แย่ๆ เกิดขึ้นมากมายตั้งแต่ต้นปี คิดว่างานมหกรรมแข่งขันกีฬาครั้งนี้จะไม่ได้จัด#nซะแล้ว... โชคดีนะคะที่จัดขึ้นได้อย่างราบรื่นดี"
10016005-31 = "เป็นเพราะใช้เทคโนโลยีอันยอดเยี่ยมของโรงเรียนมิลเลเนียมรึเปล่าคะ?"
10016005-32 = "ใช่ค่ะ จะบอกว่า <ฮาโลเฟสติวัล> ครั้งนี้เป็น 'งานจัดแสดงสิ่งประดิษฐ์ของโรงเรียนมิลเลเนียม' ก็ไม่เกิน#nไปหรอกค่ะ เพราะได้นำเทคโนโลยีชั้นสูงของโรงเรียนวิทย์มิลเลเนียมมาใช้อย่างเต็มที่เลยทีเดียวค่ะ"
10016005-33 = "เพราะอย่างนั้นก็เลยสามารถสร้างสิ่งปลูกสร้างขนาดใหญ่ และหุ่นยนต์ช่วยเหลือที่เป็นเรื่องยากสำหรับ#nคนทั่วไปได้สำเร็จในระยะเวลาจำกัดค่ะ..."
10016005-34 = "...แต่ว่าจากข่าวลือ เราทราบมาว่าที่โรงเรียนมิลเลเนียมเองก็เกิดปัญหาขึ้นหลายอย่าง จนทำให้สถานะ#nเจ้าภาพสั่นคลอนด้วยนะคะ"
10016005-35 = "หลักฐานก็คือการปรับรายการการแข่งขันบางส่วนก่อนพิธีเปิดแค่วันเดียวค่ะ"
10016005-36 = "เกิดปัญหาอะไรขึ้นกันแน่คะเนี่ย?"
10016005-37 = "น่าเสียดายที่ระบบรักษาความปลอดภัยของโรงเรียนมิลเลเนียมนั้นรัดกุมมาก ทำให้เราไม่สามารถเข้า#nถึงข้อเท็จจริงนั้นได้ค่ะ..."
10016005-38 = "แต่ทางผู้สื่อข่าวของเราได้พบเรื่องที่น่าตกใจบางอย่างระหว่างเก็บข้อมูลค่ะ"
10016005-39 = "คนที่เสนอให้ปรับรายการแข่งขันในงานมหกรรมแข่งขันกีฬาก็ไม่ใช่ใครที่ไหน..."
10016005-40 = "ไม่ใช่ใครที่ไหน...?"
10016005-41 = "ก็คือคุณครูจากชาเล่ต์นั่นเองค่ะ!"
10016005-42 = "คุณครูจากชาเล่ต์เหรอคะ?"
10016005-43 = "คุณครูจากชาเล่ต์ที่ไม่ว่าจะไปที่ไหนก็มีแต่เรื่องคนนั้น เข้ามาเกี่ยวข้องกับการเตรียมงานมหกรรม#nแข่งขันกีฬางั้นเหรอ..."
10016005-44 = "รู้สึกว่าจะมีกลิ่นอายความน่าสงสัยอยู่ชอบกลนะคะ!"
10016005-45 = "ใช่แล้วค่ะ! ว่าแล้ว เหมือนจะได้กลิ่นข่าวเด็ดค่ะ..."
10016005-50 = "อะไรกัน... มีการประท้วงจากคณะกรรมการจัดงานอีกแล้วค่ะ"
10016005-51 = "อ๊ะ ตอนนี้ก็เดินทางมาถึงขั้นตอนสุดท้ายของพิธีเปิด ตัวแทนนักกีฬาที่จะกล่าวคำปฏิญาณเปิดงาน#nมหกรรมแข่งขันกีฬามาถึงที่แท่นยืนแล้วค่ะ!"
10016005-52 = "ตัวแทนนักกีฬาของฮาโลเฟสติวัลครั้งนี้... นักกีฬา 'โอคุโซระ อายาเนะ' จากโรงเรียนมัธยมอะบิดอส และนักกีฬา 'อุราวะ ฮานาโกะ' จากโรงเรียนสามัญทรีนิตี้ค่ะ"
10016005-53 = "เอาละทุกคน กรุณาตั้งใจฟังด้วยค่ะ!"
10016005-56 = "พะ... เพิ่งจะเคยยืนต่อหน้าคนเยอะแยะขนาดนี้ครั้งแรก ตื่นเต้นจังเลยค่ะ..."
10016005-57 = "ถ้าเกิดพูดตะกุกตะกักขึ้นมาจะทำยังไงดีคะ..."
10016005-58 = "ไม่ต้องกังวลไปนะคะ คุณโอคุโซระ"
10016005-59 = "ถึงจะเป็นตัวแทนของนักเรียนคนอื่นๆ แต่สุดท้ายการปฏิญาณก็คือการประกาศปณิธานของตัวเองต่อ#nหน้าคนอื่นค่ะ"
10016005-60 = "อย่าไปยึดติดกับสายตาของใคร แค่ซื่อสัตย์กับตัวเองก็พอแล้วละค่ะ"
10016005-61 = "ถ้าลองจินตนาการว่าอีกฝ่ายที่อยู่หลังกล้องเป็นแค่แคร์รอตหรือแตงกวาก็อาจจะช่วยให้หายตื่นเต้น#nได้นะคะ..."
10016005-65 = "คุณฮานาโกะเนี่ยสุดยอดไปเลยนะคะ ในสถานการณ์แบบนี้ก็ไม่ตื่นตระหนกแล้วยังให้ข้อคิดได้อีก จะว่าสมกับที่เป็นคุณหนูแห่งทรีนิตี้ได้มั้ยนะ...."
10016005-66 = "ฉันเองก็รู้สึกชื่นชมไปด้วยเลยละค่ะ ฮ่าฮ่า..."
10016005-67 = "ตายจริง พอได้ยินแบบนั้นแล้วรู้สึกเป็นเกียรติมากเลยค่ะ"
10016005-69 = "(ฮู่ว... ไม่ต้องตื่นเต้น ใจเย็นไว้...)"
10016005-70 = "ในฐานะตัวแทนของนักกีฬาทุกคน ขอปฏิญาณว่า!"
10016005-71 = "ในฐานะตัวแทนของนักกีฬาทุกคน ขอปฏิญาณว่า~"
10016005-72 = "นักกีฬาที่เข้าร่วม <ฮาโลเฟสติวัล> ครั้งนี้ทุกคน…"
10016005-73 = "นักกีฬาที่เข้าร่วม <ฮาโลเฟสติวัล> ครั้งนี้ทุกคน…"
10016005-74 = "จะแข่งขันกันโดยยึดหลักการมีน้ำใจนักกีฬา..."
10016005-75 = "จะแข่งขันกันโดยยึดเอา 'ความต้องการของตัวเอง'..."
10016005-76 = "และมุ่งมั่นทุ่มเทกับการแข่งขัน..."
10016005-77 = "และมุ่งมั่นทุ่มเทกับ 'การพูดคุยด้วยร่างกาย'..."
10016005-81 = "เดี๋ยวสิคะ คุณฮานาโกะ ที่พูดมาไม่เหมือนกับในคำปฏิญาณเลยนี่... อ่านผิดหรือเปล่าคะ?"
10016005-82 = "ฮุฮุ ฉันก็บอกไปแล้วไม่ใช่เหรอคะ? ว่าอย่าไปยึดติดกับสายตาของใคร และให้ซื่อสัตย์กับตัวเองน่ะ"
10016005-83 = "งานมหกรรมแข่งขันกีฬาครั้งนี้ นักเรียนจากหลายโรงเรียนจะวางอาวุธลงแล้วปะทะกันด้วยร่างเปลือย#nเปล่า และแสดงความรักอันเร่าร้อน..."
10016005-84 = "ถ้าจะให้พูดก็คือ..."
10016005-85 = "ไม่ต่างอะไรจากการ ■■ เลยใช่มั้ยล่ะคะ?"
10016005-89 = "มะ... หมายความว่า..."
10016005-90 = "เดี๋ยวก่อนค่ะ คุณฮานาโกะ! ไมค์ยังเปิดอยู่เลยไม่ใช่เหรอคะ?!"
10016005-91 = "ไม่เป็นไรหรอกค่ะ ยังไงซะอีกฝ่ายที่กำลังฟังอยู่ก็เป็นแค่แคร์รอตกับแตงกวาเท่านั้นเองค่ะ"
10016005-92 = "ฉันคิดมาตลอดเลยละค่ะ เอาร่างกายมาปะทะกันอย่างแนบแน่นแบบนี้ งานมหกรรมแข่งขันกีฬานี่ช่าง#nเป็นเทศกาลที่วาบหวิวเหลือเกินนะคะ... ฮุฮุ"
10016005-93 = "...เด็กคนนั้น พูดเรื่องอะไรอยู่น่ะ?!"
10016005-94 = "แต่ฉันเห็นด้วยกับวิธีนี้นะคะ เพราะถึงคนเราจะพูดคุยกันไม่เข้าใจเพราะการแบ่งแยกสถาบันหรืออคติ แต่ว่าร่างกายแสดงออกอย่างซื่อสัตย์ไม่ใช่เหรอคะ?"
10016005-95 = "นักเรียนจากคิโวทอสทั้งหมดมาทำกิจกรรม ■■ ■■ ร่วมกันอย่างแนบแน่น ก็เรียกว่าเป็น 'เทศกาลแห่งสันติ' ได้เต็มปากเลยนะคะ..."
10016005-96 = "ไปลากลงมาจากแท่นพิธีเดี๋ยวนี้เลย!"
10016005-97 = "ทรีนิตี้คิดอะไรอยู่ทำไมถึงส่งนักเรียนแบบนั้นมาเป็นตัวแทน..."
10016005-98 = "ฮุฮุ... ■■ ■■ ทุกคนมา■■ กันค่ะ!"
10016005-99 = "■■กันอย่างดุเดือด ■■กันให้มันส์ขึ้นอีก!"
10016005-105 = "(กระซิบ) ...เมื่อกี้นี้ ออกอากาศได้เหรอคะ?"
10016005-106 = "นักเรียนตัวแทนของโรงเรียนทรีนิตี้พูดคำที่ไม่น่าเชื่อแบบที่ไม่สามารถออกอากาศได้ต่อหน้านักเรียน#nทุกคนเลยค่ะ แบบนี้มัน..."
10016005-108 = "ข่าวเด็ดเลยนี่ค่ะ!"
10016005-109 = "ทางห้องส่งถ่ายฉากเมื่อกี้ทันใช่มั้ยคะ? ต้องรีบจัดการแล้วลงบทความพิเศษ..."
10016005-114 = "คะ...? เดี๋ยวก่อนนะคะ ปล่อยวิดีโอเมื่อกี้นี้ไม่ได้งั้นเหรอคะ หมายความว่ายังไงคะ?"
10016005-115 = "แต่ว่าสัญญาว่าจะมอบสิทธิ์ในการเผยภาพวิดีโอทั้งหมดที่ถ่ายในงานมหกรรมแข่งขันกีฬาให้กับทาง#nโรงเรียนโครโนสแล้วไม่ใช่เหรอคะ?"
10016005-116 = "ถ้าไม่รักษาสัญญาที่ให้ไว้ พวกเราก็คงทำอะไรไม่ได้ นอกจากต้องเปิดเผยว่าเนื้อหาที่ได้รับจากเขต#nปกครองตนเองสหภาพเรดวินเทอร์เป็นเรื่องจริงค่ะ..."
10016005-117 = "ว้าย พูดออกมาตรงๆ แบบนั้นก็เป็นเรื่องใหญ่น่ะสิคะ รุ่นพี่!"
10016005-121 = "ถะ... ถึงจะเกิดเรื่องวุ่นวาย แต่ไม่ว่ายังไงช่องโครโนสก็จะผูกขาดการถ่ายทอดสด <ฮาโลเฟสติวัล> ต่อไปค่ะ!"
10016005-125 = "ทุกคน อย่าเปลี่ยนช่องไปไหนนะคะ!"

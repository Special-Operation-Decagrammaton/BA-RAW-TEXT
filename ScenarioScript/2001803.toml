[translation]
2001803-1 = "#title;Missing in Action"
2001803-2 = "#na;(어느 날, 출근했더니 사무실의 PC가 먹통이 되어 있었다…….)"
2001803-3 = "#all;hide"
2001803-4 = "3;PC 수리기사;00;이거 아무래도 안 되겠는걸요. 기판이 완전히 그을려서 새로 교체해야겠어요.\n#3;a\n#3;em;[땀]"
2001803-5 = "3;PC 수리기사;00;어젯밤 벼락이 쳤을 때 재수가 나쁘게도 합선이 된 모양이네요."
2001803-6 = "[s] \"……데이터만이라도 복구할 수는 없는 건가요?\""
2001803-7 = "3;PC 수리기사;00;해킹이나 바이러스처럼 소프트웨어에 발생한 고장이라면 모르겠지만, 이건 기기가 통째로 불타버린 것과 다름없는지라……\n#3;em;[속상함]"
2001803-8 = "3;PC 수리기사;00;여기서 데이터를 복구하는 건 타서 재가 되어버린 종이에서 글자를 읽어내는 것만큼 어려운 일이라서요."
2001803-9 = "3;PC 수리기사;00;……혹시 백업을 해두지는 않으셨나요?\n#3;em;[?]"
2001803-10 = "[s] \"어제 PC에 저장한 뒤에 바로 돌아가서……\""
2001803-11 = "3;PC 수리기사;00;으음. 그렇다면 유감스러운 일입니다만……\n#3;em;[땀]\n#3;stiff"
2001803-12 = "3;PC 수리기사;00;소실된 데이터는 모두 새로 작성하는 수밖에 없겠네요."
2001803-13 = "#all;hide"
2001803-14 = "3;모에;16;흐음. 그런 일이 있었구나……\n#3;a\n#3;em;…"
2001803-15 = "3;모에;15;다른 학교의 학생들에게는 부탁해 봤어?"
2001803-16 = "[s] \"다들 물어봤지만 역시 복구는 어려운가 봐.\""
2001803-17 = "3;모에;06;그럼 그 수리기사의 말처럼 처음부터 다시 작성하는 수밖에 없겠네.\n#3;em;[땀]"
2001803-18 = "3;모에;05;그래서, 날아간 데이터가 뭔데? 이번 달의 작전 보고서?"
2001803-19 = "#st;[0,0];instant;1;"
2001803-20 = "#clearST"
2001803-21 = "3;모에;02\n#3;greeting\n#wait;1500"
2001803-22 = "3;모에;12;……어디 보자. 지도에 연동된 GPS 데이터부터 시작해서 교전 위치, 피해 규모 등 여러 가지 데이터를 정제해서 보기 쉽게 정리한 보고서라.\n#3;em;…"
2001803-23 = "3;모에;04;우와…… 이거 일일이 정리하려면 시간 좀 꽤 걸리겠는데…….\n#3;stiff"
2001803-24 = "[s] \"……다 정리하는 데 사흘 걸렸어.\""
2001803-25 = "3;모에;18;사흘 내내 처리한 작업물이 날아갔으니 의욕이 없을 만도 하네."
2001803-26 = "3;모에;16;으음……"
2001803-27 = "3;모에;12;이거 정리, 내가 도와줄까?\n#3;em;[반응]"
2001803-28 = "[s] \"……모에가?!\""
2001803-29 = "3;모에;05;뭐야, 왜 그렇게 놀라는 거야. 실례잖아.\n#3;hophop"
2001803-30 = "3;모에;15;슬쩍 보니 대부분이 기계적으로 분류해야 하는 단순 데이터 같은데, 이런 작업을 할 때는 사람 손이 하나라도 더 있는 게 좋지 않겠어?"
2001803-31 = "3;모에;13;안 그래도 오늘 오후는 한가하던 참이니까."
2001803-32 = "3;모에;09;이참에 선생님에게 빚을 지워 둬야지. 쿠후후…….\n#3;em;[재잘]"
2001803-33 = "[s1] \"그건 그렇지만……\"\n[s2] \"하루로 안 끝날지도 모르는데?\""
2001803-34 = "3;모에;12;걱정 마. 내가 가세하면 하루가 아니라 반나절도 안 지나 끝낼 수 있을 테니까.\n#3;em;[음표]"
2001803-35 = "3;모에;12;걱정 마. 내가 가세하면 하루가 아니라 반나절도 안 지나 끝낼 수 있을 테니까.\n#3;em;[음표]"
2001803-36 = "3;모에;02;SRT의 오퍼레이터는 전투뿐만 아니라 서류 정리에서도 일류여야 하거든."
2001803-37 = "3;모에;09;오랜만에 실력 발휘 좀 해볼까……? 쿠후후……\n#3;em;[반짝]"
2001803-38 = "#all;hide"
2001803-39 = "#na;(그리고 모에는 무서운 속도로 데이터를 처리하기 시작했다……)"
2001803-40 = "#all;hide"
2001803-41 = "3;모에;12;……15일까지 들어온 통신 기록 다 정리했어.\n#3;a\n#3;em;[반응]"
2001803-42 = "3;모에;02;선생님이 검토 중인 문서, 다 안 끝났으면 이리 넘겨줘."
2001803-43 = "[s] \"그 많은 기록을 벌써 다 검토했다고?\""
2001803-44 = "3;모에;17;어려울 것도 없지. 회선과 발신인, 목적 사이에는 일정한 규칙성이 있으니까.\n#3;em;…"
2001803-45 = "3;모에;12;프로그램을 짜서 정제하고 예외 처리된 것만 검토하면 금방 끝나거든."
2001803-46 = "3;모에;02;……자, 선생님. 여기 붉은색 마크로 표시한 것만 검토해 줘. 총학생회에서 온 비문이라 나한테는 열람 권한이 없거든."
2001803-47 = "3;모에;15\n#3;a"
2001803-48 = "3;모에;15;선생님. 방금 건네준 비품 목록 표, 탄환 소모 내역이랑 비교하니 HP 탄 10발이 비는데."
2001803-49 = "3;모에;15;……숫자를 잘못 센 거 아냐?\n#3;em;[?]"
2001803-50 = "[s3] \"헉, 어디서 실수한 거지?\"\n[s4] \"처음부터 다시 검토해야 하나……?\""
2001803-51 = "3;모에;12;잠깐만 기다려봐. OCR 프로그램으로 수기 보고서를 검토해 볼 테니.\n#3;em;[음표]"
2001803-52 = "3;모에;12;잠깐만 기다려봐. OCR 프로그램으로 수기 보고서를 검토해 볼 테니.\n#3;em;[음표]"
2001803-53 = "#st;[0,0];instant;1;"
2001803-54 = "#clearST"
2001803-55 = "3;모에;02\n#3;greeting\n#wait;2000"
2001803-56 = "3;모에;12;……찾았다. 60발이라고 기록한 부분을 50발로 오입력한 모양이네.\n#3;em;[반응]"
2001803-57 = "3;모에;02;혹시 모르니까 다른 비품 목록도 검토해 볼게. 오래 걸리지는 않을 거야."
2001803-58 = "3;모에;04\n#3;a"
2001803-59 = "3;모에;04;……선생님. 그 훈련 협조 요청문, 수신인 모두에게 일일이 다 보내고 있는 거야?\n#3;em;[땀]"
2001803-60 = "3;모에;04;같은 문장을 붙여 넣는 것뿐인데, 너무 비효율적이지 않아?"
2001803-61 = "3;모에;15;어디 보자. 전에 공문 발송용으로 만들어 두었던 머지 프로그램이……"
2001803-62 = "3;모에;02;아, 찾았다."
2001803-63 = "3;모에;12;선생님, 그 주소 데이터 이쪽으로 넘겨줘. 매크로로 발송하면 1분도 안 걸릴 테니까."
2001803-64 = "#all;hide"
2001803-65 = "#na;(……이후, 모에의 도움을 받아 데이터의 복구를 반나절만에 끝냈다.)"
2001803-66 = "#all;hide"
2001803-67 = "3;모에;02;……이만하면 다 정리된 것 같네. 생각보다 금방 끝났는걸.\n#3;em;…\n#3;a"
2001803-68 = "[s] \"정말 고마워, 모에!\""
2001803-69 = "3;모에;17;뭘 이런 걸 가지고. SRT의 오퍼레이터라면 이 정도는 기본이지.\n#3;em;[음표]"
2001803-70 = "3;모에;02;전에 학원에 다닐 때 생각도 나고…… 오랜만에 재미있는 경험이었어."
2001803-71 = "[s] \"SRT의 대원들은 전투만 능숙한 게 아니구나.\""
2001803-72 = "3;모에;12;물론이지. 평시의 물자 관리와 행정 업무도 전투만큼이나 중요한 임무니까.\n#3;em;[재잘]"
2001803-73 = "3;모에;16;평소부터 부지런히 물자를 쌓아 두고 엄격히 관리하지 않으면, 상황이 터졌을 때 제대로 대처할 수 없다고."
2001803-74 = "3;모에;02;그렇기 때문에 SRT의 오퍼레이터들은 전자전 수행은 물론이고, 행정 업무에 필요한 전산 스킬도 골고루 익혀 두어야 해."
2001803-75 = "3;모에;16;물론 밀레니엄의 괴짜들에 비하면 아직 갈 길이 멀긴 하지만…….\n#3;em;…"
2001803-76 = "3;모에;12;내가 만든 매크로 프로그램은 공용 클라우드에 올려둘 테니, 나중에 필요하면 사용해도 돼.\n#3;m2"
2001803-77 = "3;모에;02;이제 남은 일은 데이터가 날아가도 걱정 없도록 백업 처리를—"
2001803-78 = "3;모에;05;응……? 그런데 여기 있는 이 버튼은 뭐야?\n#3;em;[반응]"
2001803-79 = "[s] \"그건 긴급 포맷 버튼이야.\""
2001803-80 = "3;모에;15;긴급 포맷 버튼? 그런 게 왜 여기에 있는데?\n#3;em;[?]"
2001803-81 = "3;모에;12;……아, 그렇구나. 샬레의 컴퓨터에는 학생들의 민감한 정보가 다수 저장되어 있기 때문에, 유사시를 대비해서 데이터를 빠르게 포맷하는 버튼도 필요하다는 건가."
2001803-82 = "3;모에;18;……이걸 누르면 '오늘의 작업물을 포함한 컴퓨터의 모든 데이터'가 날아간단 말이지…….\n#3;em;…"
2001803-83 = "3;모에;09;후후…… 후후후……\n#3;stiff"
2001803-84 = "[s5] \"……저기, 모에 양?\"\n[s6] \"설마 그걸 누르려는 건 아니겠지?\""
2001803-85 = "3;모에;08;하루치의 고생을 한순간의 조작으로 날려버릴 수 있는 버튼이라니……\n#3;m3"
2001803-86 = "3;모에;08;하루치의 고생을 한순간의 조작으로 날려버릴 수 있는 버튼이라니……\n#3;m3"
2001803-87 = "3;모에;10;그야말로 파멸을 부르는 버튼 그 자체…… 누르면 엄청나게 기분 좋겠지……"
2001803-88 = "3;모에;10;하아, 하아, 하아……! 어, 어떡하지. 선생님? 나도 모르게 팔이…… 손을 억누를 수가 없어!\n#3;stiff\n#3;em;[///]"

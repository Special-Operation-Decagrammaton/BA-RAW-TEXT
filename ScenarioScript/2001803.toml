[translation]
2001803-1 = "Missing in Action"
2001803-2 = "（某天一上班就發現辦公室的電腦壞了……）"
2001803-4 = "電路板整個壞掉了呢……必須換個新的才行。"
2001803-5 = "可能是因為昨晚打雷造成短路了吧。"
2001803-6 = "[s] 「……請問檔案有辦法救回來嗎？」"
2001803-7 = "如果是中毒這類軟體故障的情形說不定還有救，#n不過現在就像是整台機器被燒了個精光一樣……"
2001803-8 = "要從這個狀況下救回檔案會非常困難。"
2001803-9 = "……請問你有做備份嗎？"
2001803-10 = "[s] 「我昨天只把資料存在電腦上就回家了……」"
2001803-11 = "唔──嗯，那還真是遺憾……"
2001803-12 = "這下只能重新輸入遺失的資料了。"
2001803-14 = "是喔，原來發生了那種事……"
2001803-15 = "老師有拜託過其他學校的學生嗎？"
2001803-16 = "[s] 「問是問了，但大家都說不太可能復原。」"
2001803-17 = "唔──嗯，那看來也只能按照業者所說，重新輸入資料了。"
2001803-18 = "所以老師遺失了哪些資料？這個月的作戰報告嗎？"
2001803-22 = "……我看看。包含與地圖連動的GPS資訊、交戰位置資訊、損害規模等等，#n將各式資料的精密檢查結果彙整成簡單易懂的報告書……"
2001803-23 = "哇……這感覺就很花時間呢……"
2001803-24 = "[s] 「……全部花了我三天。」"
2001803-25 = "耗費三天才完成的報告不翼而飛，確實會讓人意志消沉呢。"
2001803-26 = "唔──嗯……"
2001803-27 = "要我幫你嗎？"
2001803-28 = "[s] 「……你要幫我！？」"
2001803-29 = "你幹嘛那麼驚訝？真是失禮。"
2001803-30 = "稍微看了一下，大多都是可以簡單分類的資料。這種工作找人來幫忙不就好了嗎？"
2001803-31 = "反正我剛好今天下午也很閒。"
2001803-32 = "乾脆趁這個機會讓老師欠我人情好了。咯嘻嘻……"
2001803-33 = "[s1] 「說是這樣說啦……」\n[s2] 「但這可能一天之內整理不完喔？」"
2001803-34 = "別擔心，只要有我幫忙甚至不用一天，不到半天就能解決了。"
2001803-35 = "別擔心，只要有我幫忙甚至不用一天，不到半天就能解決了。"
2001803-36 = "SRT的報務員不僅戰鬥，連文書整理能力也是一流的。"
2001803-37 = "那麼……我就來久違發揮一下實力吧。咯嘻嘻。"
2001803-39 = "（於是萌便以驚人的速度開始處理資料……）"
2001803-41 = "……十五日以前的通訊紀錄都整理好了。"
2001803-42 = "老師現在確認的資料，如果有還沒看完的部分就都拿給我吧。"
2001803-43 = "[s] 「那麼多的資料你都整理好了！？」"
2001803-44 = "沒什麼大不了的。通訊途徑、通訊者、目的，三者之間都有一定的規律。"
2001803-45 = "所以只要寫個程式挑出例外，再確認那些例外資料，馬上就能結束了。"
2001803-46 = "……好了，老師。請你確認這些有標記的部分就好了。#n因為那些是聯邦學生會發來的文件，我沒有閱覽權限。"
2001803-48 = "老師，剛才給你的備品目錄，我剛剛比對彈藥消耗明細，發現少了十發空尖彈……"
2001803-49 = "請問這數量有數錯嗎？"
2001803-50 = "[s3] 「咦，哪邊有出錯了嗎？」\n[s4] 「從頭重新檢查一遍吧……」"
2001803-51 = "等等，我先[ruby=光學字元辨識]用OCR程[/ruby]式檢查一下手寫報告書的內容。"
2001803-52 = "等等，我先[ruby=光學字元辨識]用OCR程[/ruby]式檢查一下手寫報告書的內容。"
2001803-56 = "……找到了。看來是原本紀錄為六十發的地方，不小心輸入成五十發了。"
2001803-57 = "以防萬一，我也順便檢查一下其他目錄。應該不會花太多時間。"
2001803-59 = "……老師。這些訓練協助請求公文你平時都一一寄給收信人嗎？"
2001803-60 = "明明只是內容複製貼上而已，這樣會不會太沒效率了？"
2001803-61 = "等一下喔，我記得之前有寫一個專門發送公文的程式……"
2001803-62 = "喔，有了。"
2001803-63 = "老師，把你手上那些地址資料給我。透過巨集發送一分鐘之內就能處理好了。"
2001803-65 = "（……之後就這樣在萌的幫助之下，檔案復原工作真的只花半天就完成了）"
2001803-67 = "……這下全都整理好了吧，花的時間比我想得還短呢。"
2001803-68 = "[s] 「真的很謝謝你，萌！」"
2001803-69 = "這沒什麼大不了。對SRT的報務員來說，這些都是基本。"
2001803-70 = "而且這也讓我想起以前上補習班的時光……好久沒這麼開心了。"
2001803-71 = "[s] 「原來SRT小隊成員們不是只擅長戰鬥而已啊。」"
2001803-72 = "當然。平時的物資管理、行政業務，都和戰鬥任務一樣重要。"
2001803-73 = "要是平常不積極囤積物資並嚴格管理，遇到緊要關頭就會應付不過來。"
2001803-74 = "因此，SRT的報務員除了資訊戰能力，#n處理行政業務時需要用到的電腦能力也是不可或缺的。"
2001803-75 = "當然，和千年學園那些怪咖比起來，我還差的遠呢……"
2001803-76 = "我把我製作的巨集上傳到共用雲端了，之後有需要的話就儘管用吧。"
2001803-77 = "接下來只要做好備份，這樣一來就算檔案遺失了也──"
2001803-78 = "嗯……？這個按鈕是做什麼的？"
2001803-79 = "[s] 「那是緊急格式化按鈕。」"
2001803-80 = "緊急格式化按鈕？為什麼會有那種東西？"
2001803-81 = "……啊，原來如此。畢竟夏萊的電腦裡儲存了許多學生的資訊，#n為了以防萬一，確實會需要一個能夠迅速清除資料的按鈕。"
2001803-82 = "……按下去的話，#n「包括今天整理的資料在內的所有資料」就會通通消失……"
2001803-83 = "呵呵……唔呵呵呵……咯嘻嘻……"
2001803-84 = "[s5] 「……那個，萌同學？」\n[s6] 「你該不會……想按那個按鈕吧？」"
2001803-85 = "這個按鈕能讓我們今天一整天的努力瞬間化為烏有……"
2001803-86 = "這個按鈕能讓我們今天一整天的努力瞬間化為烏有……"
2001803-87 = "也就是帶來滅亡的按鈕……按下去一定會很爽快吧……"
2001803-88 = "哈啊，哈啊，哈啊……！怎，怎麼辦呢，老師？#n看到這個東西……害我管不住我的手了！"
2001803-89 = "[s] 「先不要！」"
2001803-90 = "不行！我等不了！我忍不住了！"
2001803-95 = "即將開始緊急格式化夏萊公用電腦的資料……"
2001803-96 = "3……2……1……"
2001803-97 = "久等了！資料格式化完成。"
2001803-98 = "對不起，老師……"
2001803-99 = "不過這種毀滅一切的感覺……這樣的情感宣洩……真是太爽了！"
2001803-104 = "（……之後只好把萌綁起來，獨自從頭進行檔案作業……）"
2001803-105 = "哈啊，哈啊……老師居然把我的手腳綁住，自己一個人工作……"
2001803-106 = "真是恥辱……身為SRT小隊成員這真是難以忍受的恥辱……"
2001803-107 = "但這樣也挺令人興奮的……也不壞……哈啊，哈啊……"
2001803-109 = "（後來一直把萌放置到復原工作結束為止……）"
2001803-110 = "（多虧有他留下來的巨集，只花了半天時間就成功復原了所有檔案）"

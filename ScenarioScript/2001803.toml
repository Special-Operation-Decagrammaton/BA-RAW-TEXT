[translation]
2001803-1 = "Missing in Action"
2001803-2 = "(วันหนึ่ง ตอนที่คุณครูเข้าไปที่สำนักงานก็พบว่าคอมพิวเตอร์ที่สำนักงานพังยับเยินไปแล้ว...)"
2001803-4 = "แบบนี้คงไม่ไหวแล้วครับ แผงวงจรข้างในมันไหม้หมดแล้ว คงจะต้องเปลี่ยนใหม่ทั้งหมดครับ"
2001803-5 = "ดูเหมือนว่าเมื่อคืนตอนที่ฟ้าผ่า เลยทำให้คอมพิวเตอร์เกิดไฟฟ้าลัดวงจรน่ะครับ"
2001803-6 = "[s] \"กู้ข้อมูลคืนไม่ได้เลยเหรอ...\""
2001803-7 = "ถ้าเป็นอาการเสียที่ซอฟต์แวร์ อย่างเช่น โดนไวรัส หรือว่าโดนแฮ็กละก็ อาจจะพอกู้ข้อมูลได้บ้าง#nแต่ว่าคราวนี้ฮาร์ดแวร์มันไหม้เป็นตอตะโกไปแล้ว ผมว่าไม่น่าจะได้นะครับ..."
2001803-8 = "กรณีแบบนี้การกู้คืนข้อมูลก็ยากพอๆ กับการอ่านข้อความจากกระดาษไหม้ๆ เลยครับ"
2001803-9 = "ไม่ได้สำรองข้อมูลไว้เลยเหรอครับ?"
2001803-10 = "[s] \"เมื่อวานกดเซฟงานเสร็จก็กลับเลยน่ะ...\""
2001803-11 = "อืม... ถ้างั้นก็ขอแสดงความเสียใจด้วยนะครับ..."
2001803-12 = "ข้อมูลที่เสียหาย คงจะต้องทำใหม่ทั้งหมดเลยครับ"
2001803-14 = "อืม... เรื่องเป็นแบบนี้เองสินะ..."
2001803-15 = "ลองไปขอร้องนักเรียนโรงเรียนอื่นดูหรือยัง?"
2001803-16 = "[s] \"ครูลองไปถามทุกคนแล้ว แต่ดูเหมือนจะกู้คืนไม่ได้เลย\""
2001803-17 = "ถ้างั้นก็คงต้องทำใหม่เหมือนที่ลุงช่างบอกแล้วแหละ"
2001803-18 = "แล้วข้อมูลที่หายไปคืออะไรล่ะ? รายงานของเดือนนี้เหรอ?"
2001803-22 = "ไหนดูหน่อยซิ... เริ่มจากข้อมูล GPS ที่เชื่อมต่อกับแผนที่ ตำแหน่งการต่อสู้ ขนาดความเสียหายที่เกิดขึ้น และรายงานที่สรุปข้อมูลทั้งหมดเอาไว้เพื่อให้อ่านได้ง่ายๆ...  "
2001803-23 = "โอ้โฮ... ถ้าต้องมานั่งสรุปข้อมูลพวกนี้ทีละอย่างใหม่ คงใช้เวลาเยอะน่าดูเลยนะ"
2001803-24 = "[s] \"กว่าจะทำเสร็จใช้เวลาตั้งสามวันเต็มเลย...\""
2001803-25 = "ผลงานที่เพียรพยายามทำมาตลอดสามวัน สลายกลายเป็นฝุ่นไปแบบนี้... คงห่อเหี่ยวน่าดูสินะ"
2001803-26 = "อืม..."
2001803-27 = "ให้ฉันช่วยมั้ย?"
2001803-28 = "[s] \"โมเอะน่ะเหรอ?!\""
2001803-29 = "อะไรกัน ทำไมตกใจอะไรขนาดนั้น มันเสียมารยาทนะ"
2001803-30 = "ที่จริง พอดูดีๆ แล้วจะเห็นว่าส่วนใหญ่เป็นข้อมูลเบื้องต้นที่สามารถใช้คอมพิวเตอร์จำแนกข้อมูลได้#nปกติเวลาทำงานพวกนี้ ถ้ามีคนช่วยก็ดีกว่าไม่ใช่รึไง?"
2001803-31 = "แถมวันนี้ฉันก็ว่างพอดีด้วย"
2001803-32 = "คราวนี้จะได้ชดใช้หนี้บุญคุณที่ติดค้างคุณครูเอาไว้ด้วย ฮิฮิ..."
2001803-33 = "[s1] \"แต่ว่างานนี้มันอาจใช้เวลานานเลยนะ...\"\n[s2] \"มันอาจไม่เสร็จภายในวันเดียวก็ได้นะ?\""
2001803-34 = "เอาน่า ถ้ามีฉันคอยช่วย ไม่ต้องใช้เวลาเป็นวันหรอก แค่ครึ่งวันก็เสร็จแล้วแหละ"
2001803-35 = "ไม่ต้องห่วง ถ้ามีฉันคอยช่วย ไม่ต้องใช้เวลาเป็นวันหรอก แค่ครึ่งวันก็เสร็จแล้วแหละ"
2001803-36 = "โอเปอเรเตอร์ของ SRT น่ะ นอกจากจะต้องเชี่ยวชาญการสนับสนุนในการต่อสู้แล้ว ก็ต้องชำนาญ#nงานเอกสารด้วย"
2001803-37 = "เดี๋ยวฉันแสดงฝีมือให้ดูดีมั้ยล่ะ...? ฮิฮิฮิ..."
2001803-39 = "(จากนั้นโมเอะก็ลงมือจัดการงานเอกสารด้วยความไวขั้นเทพ...)"
2001803-41 = "จัดการบันทึกการสื่อสารที่ติดต่อเข้ามาจนถึงวันที่ 15 เสร็จแล้ว"
2001803-42 = "คุณครู เอกสารที่กำลังตรวจสอบอยู่ ถ้ายังทำไม่เสร็จละก็ส่งมาทางนี้ได้เลย"
2001803-43 = "[s] \"บันทึกตั้งเยอะขนาดนั้น ตรวจสอบเสร็จแล้วเหรอ?\""
2001803-44 = "เสร็จเรียบร้อยแล้ว มันไม่ได้ยากอะไรสักหน่อย เพราะมีระบุผู้ติดต่อกับเรื่องที่ติดต่อเอาไว้อยู่แล้วนี่"
2001803-45 = "แค่เอาไปสรุปลงในโปรแกรม แล้วตรวจสอบแค่ส่วนข้อมูลที่ไม่เหมือนกันก็เรียบร้อยแล้ว"
2001803-46 = "คุณครู ช่วยตรวจสอบข้อมูลที่ฉันขีดสีแดงเอาไว้หน่อยนะ มันเป็นเอกสารลับจากทางองค์การนักเรียน#nฉันเลยไม่มีสิทธิ์เข้าถึงเอกสารน่ะ"
2001803-48 = "คุณครู รายการอุปกรณ์ที่ส่งมาให้เมื่อกี้น่ะ พอเอาไปเทียบกับรายการใช้กระสุนปืนดูแล้ว เจอว่า#nกระสุน HP มันหายไป 10 นัดนะ"
2001803-49 = "ใส่ตัวเลขผิดรึเปล่า?"
2001803-50 = "[s3] \"ไม่นะ ตัวเลขมันผิดตั้งแต่ตรงไหนเนี่ย?\"\n[s4] \"ต้องตรวจใหม่ตั้งแต่แรกเลยรึเปล่าเนี่ย...\""
2001803-51 = "รอแป๊ปนึงแล้วกัน เดี๋ยวฉันจะลองใช้โปรแกรม OCR ตรวจสอบรายงานอุปกรณ์ดู"
2001803-52 = "เดี๋ยวนะ รอแป๊ปนึง เดี๋ยวฉันจะลองใช้โปรแกรม OCR ตรวจสอบรายงานอุปกรณ์ดู"
2001803-56 = "เจอแล้ว ดูเหมือนแถวที่ต้องระบุเป็น 60 นัดจะใส่ผิดเป็น 50 นัดแทน"
2001803-57 = "เดี๋ยวฉันจะลองตรวจสอบอุปกรณ์อื่นๆ ไว้ด้วย เผื่อมีตรงไหนกรอกผิดอีก ใช้เวลาไม่นานหรอก"
2001803-59 = "คุณครู เอกสารขอความร่วมมือการฝึก ตอนนี้ใช้วิธีแยกส่งให้คนรับเป็นรายคนเลยเหรอ?"
2001803-60 = "ใช้วิธีก๊อปประโยคเดิมๆ ส่งแยกทีละคนแบบนี้ ไม่เสียเวลาไปหน่อยรึไง?"
2001803-61 = "ไหนดูซิ... โปรแกรมฟอร์มส่งเอกสารทางการที่ฉันเคยทำเอาไว้..."
2001803-62 = "อ๊ะ เจอแล้วละ"
2001803-63 = "คุณครู ช่วยส่งข้อมูลอีเมลแอดเดรสนั่นมาให้ที ถ้าใช้มาโครส่งละก็ นาทีเดียวก็เสร็จแล้ว"
2001803-65 = "(ด้วยความช่วยเหลือของโมเอะ ก็สามารถกู้คืนข้อมูลทุกอย่างกลับมาได้ภายในครึ่งวัน...)"
2001803-67 = "เท่านี้ก็คงเสร็จแล้ว เสร็จเร็วกว่าที่คิดเอาไว้อีกนะเนี่ย"
2001803-68 = "[s] \"ขอบคุณมากเลย โมเอะ!\""
2001803-69 = "พูดอะไรกัน งานพวกนี้แค่เรื่องพื้นๆ สำหรับโอเปอเรเตอร์ของ SRT น่ะ "
2001803-70 = "คิดถึงตอนที่อยู่ที่สถาบันเลย... ไม่ได้รู้สึกสนุกแบบนี้มานานแล้วนะ"
2001803-71 = "[s] \"นักเรียนของสถาบัน SRT ไม่ได้เชี่ยวชาญแค่เรื่องต่อสู้สินะ\""
2001803-72 = "ก็แหงอยู่แล้ว งานจัดการอุปกรณ์กับงานจัดการทั่วไปก็สำคัญพอๆ กับการต่อสู้เลยนะ"
2001803-73 = "ถ้าไม่หมั่นดูแลจัดการอุปกรณ์กับเสบียงไว้ให้ดี พอเกิดเหตุการณ์ฉุกเฉินก็จะไม่สามารถรับมือ#nได้อย่างเหมาะสม"
2001803-74 = "เพราะงั้นโอเปอเรเตอร์ของ SRT ต้องเตรียมรับมือกับพวกสงครามทางอิเล็กทรอนิกส์ แล้วก็ต้องเรียนรู้#nทักษะด้านการจัดการงานเอกสารสำหรับการประมวลผลข้อมูลเอาไว้ด้วย"
2001803-75 = "แน่นอนว่าถ้าเทียบกับพวกเด็กเนิร์ดจากมิลเลเนียมแล้ว อาจจะยังห่างชั้นอยู่ก็เถอะ..."
2001803-76 = "ฉันอัปโหลดโปรแกรมมาโครที่ฉันสร้างขึ้นไว้ในไดรฟ์กลางแล้วนะ ไว้จำเป็นก็มาใช้ได้เลย"
2001803-77 = "ตอนนี้ที่เหลือก็แค่สำรองข้อมูลเอาไว้ จะได้ไม่ต้องห่วงเรื่องข้อมูลหาย—"
2001803-78 = "หืม...? ว่าแต่ปุ่มนี้คือปุ่มอะไรน่ะ?"
2001803-79 = "[s] \"นั่นปุ่มรีเซ็ตฉุกเฉินน่ะ\""
2001803-80 = "ปุ่มรีเซ็ตฉุกเฉินงั้นเหรอ? ทำไมปุ่มแบบนั้นถึงมาอยู่ตรงนี้ได้?"
2001803-81 = "อ๋อ... เพราะคอมพิวเตอร์ของชาเล่ต์มีข้อมูลสำคัญของพวกนักเรียนอยู่จำนวนมาก เลยเตรียมปุ่มรีเซ็ต#nฉุกเฉินเอาไว้ เพื่อให้สามารถลบข้อมูลได้อย่างรวดเร็วในตอนที่เกิดเหตุฉุกเฉินสินะ"
2001803-82 = "ถ้ากดปุ่มนี้ก็หมายความว่า ข้อมูลทั้งหมดในคอมพิวเตอร์ รวมถึงข้อมูลที่ทำเสร็จวันนี้จะหายไปสินะ..."
2001803-83 = "หึหึ... หึหึหึ..."
2001803-84 = "[s5] \"นี่... โมเอะจัง เห็นใจครูเถอะ...\"\n[s6] \"คงไม่ได้คิดจะกดปุ่มนั่นหรอกใช่มั้ย?\""
2001803-85 = "ปุ่มที่ทำให้ความพยายามตลอดทั้งวันหายวับไปในพริบตา..."
2001803-86 = "ปุ่มที่ทำให้ความพยายามตลอดทั้งวันหายวับไปในพริบตา..."
2001803-87 = "ปุ่มแห่งความพังพินาศ... ถ้าได้กดมันละก็คงจะรู้สึกดีสุดๆ เลย..."
2001803-88 = "แฮ่ก... แฮ่ก...! ทะ... ทำยังไงดีละ คุณครู? มะ... มือของฉัน... ฉะ...ฉันบังคับมือของตัวเองไม่ได้เลย!"
2001803-89 = "[s] \"เดี๋ยวสิ! เดี๋ยวก๊อนนนนน!\""
2001803-90 = "ไม่ไหวแล้ว! ฉันอดใจไม่ไหวแล้ว! ฉันทนไม่ไหวแล้ววว!"
2001803-95 = "เริ่มการรีเซ็ตฉุกเฉินคอมพิวเตอร์ของชาเล่ต์..."
2001803-96 = "3...2...1..."
2001803-97 = "ยินดีด้วย ข้อมูลในคอมพิวเตอร์ของคุณทั้งหมดถูกลบเรียบร้อยแล้ว!"
2001803-98 = "โทษที คุณครู..."
2001803-99 = "แต่ว่าความรู้สึกพังพินาศแบบนี้... มันยั่วยวนจนฉันอดใจไม่ไหวจริงๆ!"
2001803-104 = "(สุดท้ายคุณครูก็ต้องจับโมเอะมัดเอาไว้ แล้วเริ่มทำงานเอกสารใหม่ตั้งแต่ต้น...)"
2001803-105 = "แฮ่ก... แฮ่ก... คุณครูจับฉันมัดมือเอาไว้ แล้วไปนั่งทำงานคนเดียว..."
2001803-106 = "น่าขายหน้าที่สุด... ในฐานะนักเรียนของ SRT นับเป็นความอัปยศที่เกินทน..."
2001803-107 = "แต่ว่าความรู้สึกแบบนี้มันเร้าใจสุดๆ ไปเลย แฮ่ก... แฮ่ก..."
2001803-109 = "(หลังจากนั้นคุณครูก็ตัดสินใจว่าจะไม่ขอให้โมเอะช่วยอีก...)"
2001803-110 = "(โชคดีที่คุณครูได้โปรแกรมมาโครของโมเอะมา เลยสามารถกู้คืนข้อมูลทั้งหมดมาได้ภายในครึ่งวัน)"

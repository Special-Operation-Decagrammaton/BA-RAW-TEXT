[translation]
2001803-1 = "Missing in Action"
2001803-2 = "One day when I got to work, the PC in the office was dead..."
2001803-4 = "It's completely done, I'm afraid. The board is scorched and needs to be replaced entirely."
2001803-5 = "It must have shorted out during the storm last night."
2001803-6 = "[s] \"...Can you save any of the data?\""
2001803-7 = "Maybe if it was a software malfunction from hacking or a virus...but the device was basically completely fried..."
2001803-8 = "Recovering data from it would be equivalent to trying to read letters from burnt paper."
2001803-9 = "...Did you back up anything?"
2001803-10 = "[s] \"I left in a rush after saving directly on the PC yesterday...\""
2001803-11 = "I hate to be the bearer of bad news, but..."
2001803-12 = "There's no way you're getting it back."
2001803-14 = "Hm... That's pretty tragic."
2001803-15 = "Have you asked students from any other schools?"
2001803-16 = "[s] \"I've asked everyone, but they all said the same thing.\""
2001803-17 = "Then like the repair technician said, you'll have to recreate everything from scratch."
2001803-18 = "So, what did you lose? This month's operation reports?"
2001803-22 = "...Let's see. Starting with just the GPS data linked to the map, there were reports that were filtered and organized for easy viewing that contained data like locations of conflict and the scale of damage."
2001803-23 = "Wow... It must've taken a while to organize that..."
2001803-24 = "[s] \"...Yeah. Around three days.\""
2001803-25 = "Yeesh. I get why you're so bummed out."
2001803-26 = "Um..."
2001803-27 = "Do you want me to help you re-do all of it?"
2001803-28 = "[s] \"...Really, Moe?!\""
2001803-29 = "What? Why are you so surprised?"
2001803-30 = "At a quick glance, most of it looks like simple data that just needs to be categorized mechanically. It'll go faster with two people."
2001803-31 = "It's not like I have a packed social schedule."
2001803-32 = "And this way, Sensei's gonna owe me one. Heeheehee."
2001803-33 = "[s1] \"It's probably going to take a long time...\"\n[s2] \"It might take more than a day though.\""
2001803-34 = "Don't worry. With my help, you'll be able to finish this within half a day."
2001803-35 = "Don't worry. With my help, you'll be able to finish this within half a day."
2001803-36 = "SRT operators are required to be experts in both paperwork and battle."
2001803-37 = "Let me show you my skills... Heeheehee..."
2001803-39 = "Then Moe started to process the data at a terrifying speed."
2001803-41 = "...I organized all the communication records received up to the 15th."
2001803-42 = "If you aren't done with those documents yet, I'll take them."
2001803-43 = "[s] \"Did you go through all those records already?\""
2001803-44 = "It wasn't hard. There's a certain regularity between the line, the sender, and the objective."
2001803-45 = "You just have to write and refine the program, review only the exceptions, and it's done."
2001803-46 = "Okay, Sensei. Review only things with red marks here. This has a General Student Council code name, so I don't have permission to view it."
2001803-48 = "Sensei. About the supply list table you gave me... I compared it to the ammo consumption record, and ten  bullets are missing."
2001803-49 = "...Maybe you counted them wrong?"
2001803-50 = "[s3] \"Oh no... I must've made a mistake.\" \n[s4] \"Do I have to review again from the beginning...?\""
2001803-51 = "Wait a minute. I'm gonna review the handwritten reports with an OCR program."
2001803-52 = "Wait a minute. I'm gonna review the handwritten reports with an OCR program."
2001803-56 = "...Found it. Looks like sixty bullets were entered incorrectly as fifty."
2001803-57 = "Just in case, I'll sort through the other list of supplies. It won't take long."
2001803-59 = "Sensei. Are you sending training cooperation requests to every recipient one at a time?"
2001803-60 = "You're pasting the same sentence over and over. It's so inefficient it actually upsets me."
2001803-61 = "Let's see. Where's that merge program I made for sending official documents...?"
2001803-62 = "Oh, I found it."
2001803-63 = "Sensei, pass me that address data over here. If I send it as a macro, it'll take less than a minute."
2001803-65 = "...With Moe's help, the data recovery was completed in half a day."
2001803-67 = "And with that, easy peasy! I'm just too good at my job."
2001803-68 = "[s] \"Thanks so much, Moe! Seriously, thanks!\""
2001803-69 = "Don't mention it. This is no big deal for an SRT operator."
2001803-70 = "It was kinda reminiscent of my school days... It was fun."
2001803-71 = "[s] \"The members of SRT have a lot of talents.\""
2001803-72 = "Of course. Supply management and administrative work during peacetime are just as important as combat."
2001803-73 = "If you don't stock up on supplies and manage them strictly, you won't be able to respond properly when a situation arises."
2001803-74 = "That's why SRT operators have to learn not only electronic warfare, but also the computer skills necessary for administrative work."
2001803-75 = "Of course, we still have a long way to go compared to those Millennium nerds..."
2001803-76 = "I'll put the macro program I created on the public cloud so you can use it later if you need it."
2001803-77 = "All that's left now is to back the stuff up so you don't have to worry about data loss..."
2001803-78 = "Huh...? What's this button here?"
2001803-79 = "[s] \"That's the emergency format button.\""
2001803-80 = "Emergency format button? Why is it here?"
2001803-81 = "Oh, I see. Since a large amount of sensitive student information is stored on Schale's computers, it's a button to quickly erase the data in case of an emergency."
2001803-82 = "If I click this, all data on the computer, including today's work, will be lost..."
2001803-83 = "Heehee, heeheehee..."
2001803-84 = "[s5] \"...Um, Moe? Please... I'm begging you...\"\n[s6] \"You're not gonna press that, are you?\""
2001803-85 = "A button that can flush a day's hard work with a single click..."
2001803-86 = "A button that can flush a day's hard work with a single click..."
2001803-87 = "A button that calls for destruction... If I press it, it will feel really, really good..."
2001803-88 = "*pant* *pant* *pant* Wh-What should I do, Sensei? My arm is moving... I can't control my hand!"
2001803-89 = "[s] \"Wait! No!\""
2001803-90 = "No! I have to do it!"
2001803-95 = "The emergency formatting of Schale's public PC is starting..."
2001803-96 = "Three... Two... One..."
2001803-97 = "Congratulations! Your data has been deleted!"
2001803-98 = "Sorry, Sensei..."
2001803-99 = "But that devastating feeling... This catharsis... I can't resist it!"
2001803-104 = "...I restrained Moe before I began working on the data for the third time."
2001803-105 = "*pant* *pant* Sensei tied my hands and feet and is working alone..."
2001803-106 = "It's incredibly humiliating... As an elite SRT agent, this is unbearable humiliation..."
2001803-107 = "But this is kind of exciting in its own way... *pant* *pant*"
2001803-109 = "Moe wasn't very helpful from that point on, but..."
2001803-110 = "Fortunately, thanks to the program she gave me, it didn't take me long. Third time's the charm."

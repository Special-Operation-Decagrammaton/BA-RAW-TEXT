10028010-56 = "3;하스미;01\n1;이치카;01\n#3;h\n#3;m5\n#1;a\n#wait;1000"
10028010-57 = "3;하스미;01\n1;이치카;01;실례합니다~. 하스미 선배. 부르셨슴까? \n#1;em;[음표]\n#1;greeting"
10028010-58 = "3;하스미;01;네. 이치카. 제때 와 주었군요."
10028010-59 = "3;하스미;02;잠은 잘 잤나요? 이른 아침부터 불러내서 미안해요.\n#3;em;[?]"
10028010-60 = "1;이치카;03;아뇨, 뭐. 전혀 문제없슴다! 잠은 잘~ 잤으니까요! 하하!\n#1;jump"
10028010-61 = "1;이치카;02;그보다 오히려 이렇게 이른 아침부터 부르신 걸 보니……. 역시 무슨 일 있나 보죠?"
10028010-62 = "3;하스미;99;사건이 발생한 건 아니지만 '일'이라고 하면 맞는 이야기겠군요.\n#3;greeting"
10028010-63 = "3;하스미;02; 츠루기와도 논의해 보았는데, 이 건은 역시 이치카가 가장 적임자라고 생각해서요."
10028010-64 = "1;이치카;04;네? 츠루기 선배랑 논의……? 제가 '적임자'……라고요?\n#1;em;[?]"
10028010-65 = "1;이치카;04;저기, 대체 무슨 일이기에…….\n#1;stiff"
10028010-66 = "3;하스미;08;아, 부담 주려는 뜻은 아니었어요. 일 자체는 그리 위험하거나 어려운 일도 아니고요.\n#3;em;[반응]"
10028010-67 = "3;하스미;01;중요한 가방이 하나 있어서, 그것을 가지고 티파티로 가주기만 하면 되는 일이거든요. 오늘 안으로."
10028010-68 = "3;하스미;99;다만 그게 지금 트리니티 자치구로부터 꽤 떨어진 곳에 있는 상황이라…….\n#3;em;…"
10028010-69 = "3;하스미;01;아무래도 다른 자치구의 학생들과도 잘 지내고 성격도 좋은 이치카가 적합할 것 같네요."
10028010-70 = "3;하스미;02;저나 츠루기가 가는 거보다는……. 그편이 원만하고 융통성 있게 일을 해결할 수 있겠죠."
10028010-71 = "1;이치카;03;아~. 이해했슴다. 난 또 뭐라고……. 그러니까 심부름 같은 거군요?\n#1;em;[음표]"
10028010-72 = "3;하스미;01;그렇다고도 볼 수 있지만, 말씀드렸듯, 평범한 심부름치고는 '중요한' 사안이지요."
10028010-73 = "3;하스미;05;가방 안에 들어있는 물건은, 우리 티파티와 트리니티에 중요한 유물이거든요."
10028010-74 = "3;나기사;00\n1;이치카;03\n#1;hide\n#3;a\n#3;h"
10028010-75 = "3;나기사;00\n#na;하스미;……티파티의 나기사님께서 직접 가져오라고 말씀하신 만큼이요.\n#3;h"
10028010-76 = "3;나기사;00\n#na;하스미;굳이 따지자면…….\n#3;h"

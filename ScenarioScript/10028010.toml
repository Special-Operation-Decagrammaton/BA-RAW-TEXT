10028010-186 = "3;이치카;01;아무튼 짐도 이걸로 마지막이네요! 간만에 땀 좀 뺐다!\n#3;jump"
10028010-187 = "3;이치카;01;선생님도 고생 많으셨어요. 정의실현부……. 아니, 트리니티를 대신해 감사드립니다.  \n#3;greeting"
10028010-188 = "3;이치카;99;평소라면 제가 뭐라고 대표를 하겠냐만……. 오늘은 입장이 입장이니까요!\n#3;jump"

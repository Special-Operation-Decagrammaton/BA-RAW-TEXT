10028010-190 = "[s1] \"이치카도 수고 많았어.\"\n[s2] \"먼 곳까지 와서 고생한 건 마찬가지지.\""
10028010-191 = "#wait;100"
10028010-192 = "#wait;100"
10028010-193 = "3;이치카;04;에이~. 고생은 제가 무슨 고생이에요. 고생은 선생님과 이곳 발굴팀 분들이 다 해 주셨죠.\n#3;em;[땀]"
10028010-194 = "3;이치카;99;저는 발굴하신 걸 가지러 온 김에 정리나 좀 도운 게 전부고……."
10028010-195 = "3;이치카;01;그나저나 신기하네요. <티파티 최초의 회합에서 사용된 찻잔 세트>라니."
10028010-196 = "3;이치카;01;이건 진짜 중요한 교보(校寶)인데 말이죠. 용케도 이런 게 아직도 안 부서지고 남아 있었네요?"
10028010-197 = "3;이치카;01;그것도 트리니티 자치구로부터 이렇게나 멀리 떨어진 곳에……."
10028010-198 = "3;이치카;02;……네?\n#3;em;[?]"
10028010-199 = "3;이치카;01;아아. 중요한 찻잔이란 건 알고 계셨지만, 정확히 어떤 의미인지까지는 못 들으셨다고요?"
10028010-200 = "3;이치카;04;하하, 티파티 분들도 참……. 이런 일을 부탁하면서 설명도 제대로 안 해주셨슴까…….\n#3;em;[땀]"
10028010-201 = "3;이치카;05;뭐, 딱히 기밀도 아니고 말씀드리기 어려운 일도 아니니……. 음~."
10028010-202 = "3;이치카;07;……역시 '정통성'이죠."
10028010-203 = "3;이치카;01;아시겠지만 최근 이런저런 일들이 있었다 보니, 티파티 분들도 구호기사단 분들이나 시스터후드 분들과의 대화가 좀 불편해지신 것 같더라고요."
10028010-204 = "3;이치카;02;그런 상황에서 이런 유물의 발견은 꽤 크잖아요? '우리가 이만큼 오래됐고 근본이 있다'라는 이미지를 보여줄 수 있으니까.\n#3;em;[재잘]"
10028010-205 = "3;이치카;01;그러니 티파티에서도 구태여 다른 사람도 아닌 선생님께 이렇게 발굴 작업 참여를 부탁드린 걸 거고 말이죠."
10028010-206 = "3;이치카;99;애초에 지금 제가 여기 오게 된 것도, 그렇게 고생하는 선생님을 보필하란 의미고."
10028010-207 = "3;이치카;01;……즉! 다시 말하자면~\n#3;jump"
10028010-208 = "3;이치카;01;오늘 하루는 제가 선생님의 요구를 뭐든 다~ 들어드린다~ 이 말씀!"
10028010-209 = "3;이치카;01;아시겠슴까? 자주 오는 기회가 아니라고요? 그러니 시키실 일 있으시면 뭐든지 편하~게 시키십쇼!"
10028010-210 = "3;이치카;03;어차피 전 선생님을 위해서 온 거니까!\n#3;em;[음표]"
10028010-211 = "[s3] \"든든한걸. 고마워, 이치카.\"\n[s4] \"신세 좀 질게. 잘 부탁해.\""
10028010-212 = "#wait;100"

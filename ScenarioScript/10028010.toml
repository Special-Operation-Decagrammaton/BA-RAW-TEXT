10028010-95 = "5;하스미;08;가방을 회수해서 돌아오실 때, 아마도 선생님과 같은 기차로 함께 오게 될 거예요."
10028010-96 = "5;하스미;01;괜찮다면……. 오시는 길 선생님께서 편히 오실 수 있도록, 보좌를 좀 부탁해도 될까요?"
10028010-97 = "5;하스미;07;그 유물의 발굴 작업, 선생님께서 저희를 위해 직접 같이 참여해 주셨거든요."
10028010-98 = "5;하스미;02;하다못해 오시는 길만이라도 편하게 만들어 드리고 싶다는 게, 제 개인적인 생각이에요."

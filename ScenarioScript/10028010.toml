[translation]
10028010-1 = "第1話;3點10分，往格黑娜"
10028010-50 = "……請進。"
10028010-57 = "打擾了～蓮實前輩。你找我嗎？ "
10028010-58 = "是的，一花。你來得真準時。"
10028010-59 = "有睡好嗎？很抱歉一大早就叫你來。"
10028010-60 = "不，快別這麼說，我睡得非～常好！完全沒問題的！哈哈！"
10028010-61 = "比起這個，一大早就叫我來……果然是出了什麼事吧？"
10028010-62 = "雖然不是事件，但稱作「出事」也不算錯。"
10028010-63 = "我和弦生討論之後，都認為一花是最適合的人選。"
10028010-64 = "咦？和弦生前輩討論……？我是「適合的人選」……？"
10028010-65 = "那個，到底是什麼事呢……"
10028010-66 = "啊，我沒有想讓你有壓力的意思。#n這件事本身並不危險或困難。"
10028010-67 = "只需要在今天之內，將一個重要的公文包送去茶會就行了。"
10028010-68 = "只是那個公文包，目前在離三一自治區很遠的地方……"
10028010-69 = "因此這個任務很適合個性溫和，和其他自治區的學生也能融洽相處的一花。"
10028010-70 = "與我或弦生相比……應該能更圓滿、靈活地解決。"
10028010-71 = "啊～原來如此。#n所以說白了……就是跑腿之類的吧？"
10028010-72 = "要這麼理解也沒有問題。#n但正如我剛才說的，這是比起普通的跑腿更為「重要」的工作。"
10028010-73 = "因為裡面裝的，是對我們三一和茶會來說都非常重要的文物。"
10028010-75 = "……重要到茶會的渚大人要求我們親自取回。"
10028010-76 = "真要說的話……"
10028010-83 = "……是件「足以影響茶會在三一內的政治地位」的極重要文物。"
10028010-88 = "剛才說只是跑腿真是抱歉。 "
10028010-89 = "……啊。"
10028010-90 = "另外還有一件事……"
10028010-91 = "或許和那個公文包一樣重要……"
10028010-95 = "回收公文包回來時，應該會和老師乘坐同一班列車。"
10028010-96 = "可以的話……能請你在回程途中協助老師，讓他能平安地回來嗎？"
10028010-97 = "因為老師為了我們，親自參與了那個文物的挖掘工作。"
10028010-98 = "我希望至少能讓他在回程的路上能坐得舒服點。"
10028010-102 = "……咦？"
10028010-103 = "老師……老師在那裡嗎？"
10028010-104 = "沒錯，不過這並不包含在指示之內。#n實現正義部下達的指示只限於帶回公文包而已。"
10028010-105 = "如果會影響到公文包的回收工作，要當作沒這回事也無妨。"
10028010-111 = "覺得如何？#n一花你……願意接受嗎？"
10028010-112 = "唔……"
10028010-113 = "情況我大致明白了。#n請讓我稍微想一想……"
10028010-114 = "老師……老師啊……"
10028010-115 = "公文包……老師……列車……嗯……"
10028010-116 = "……嘻嘻。"
10028010-117 = "感覺還不錯呀？這樣在回來的路上也有個伴能聊天。#n而且我之前就很想和老師好好見上一面了。"
10028010-118 = "唔……"
10028010-119 = "只是去帶個公文包回來而已，還能出什麼大事呢？"
10028010-125 = "交給我吧！！"
10028010-127 = "……這就是今天早上發生的事～"
10028010-128 = "嘿……咻。"
10028010-185 = "呼～"
10028010-186 = "這是最後一件行李了！久違地流了點汗呢！"
10028010-187 = "老師也辛苦了。我代表實現正義部……不，我代表三一感謝你。 "
10028010-188 = "平時可能輪不到我這麼做……但今天我就是三一的代表！"
10028010-189 = "我必須表現出最好的一面！哈哈！"
10028010-190 = "[s1]「一花也辛苦了。」\n[s2]「千里迢迢來這裡，你也辛苦了。」"
10028010-193 = "哎呀～我有什麼好辛苦的。#n真正辛苦的是老師和挖掘組的大家才對。"
10028010-194 = "我不過是來拿挖出來的東西，順便幫忙整理而已……"
10028010-195 = "話說回來還真神奇呢……這組「茶會初次聚會所使用的茶具套組」。"
10028010-196 = "這真的是非常重要的校寶。#n真虧它到現在都還完好無缺呢？"
10028010-197 = "畢竟這裡離三一自治區十分遙遠……"
10028010-198 = "……嗯？"
10028010-199 = "老師雖然知道是重要的茶具套組，卻沒聽過它所代表的含意……？"
10028010-200 = "哈哈，茶會的人也真是的……拜託人做這種事，居然沒有好好解釋清楚……"
10028010-201 = "其實也不是什麼不能說的機密……嗯～"
10028010-202 = "……是「正統性」吧。"
10028010-203 = "老師也知道，因為近期發生的一些事件，#n使得茶會在和救護騎士團或修女會談話時顯得有些尷尬。"
10028010-204 = "在這樣的情況下，這種文物的發現不就顯得意義非凡嗎？#n畢竟能展現出「我們有著如此悠久的根源」。"
10028010-205 = "所以茶會才沒有假手他人，而是拜託老師參與挖掘作業。"
10028010-206 = "我來這裡的目的，也是為了協助如此辛苦的老師。"
10028010-207 = "……嗯！換句話說～"
10028010-208 = "今天老師無論提出什麼要求～我都會答應～！"
10028010-209 = "懂了嗎？這種機會可不常有唷？#n所以如果有想要我做的事，請儘～管開口！"
10028010-210 = "畢竟我是為了老師才來的！"
10028010-211 = "[s3]「真是可靠呢。謝謝你，一花。」\n[s4]「那就麻煩你囉。請多關照。」"
10028010-214 = "呵呵呵。真高興能聽到老師這麼說！我果然來對了。"
10028010-215 = "我之前就很想和老師共事一次看看了。"
10028010-216 = "弦生前輩、蓮實前輩和麻白都經常提起老師……"
10028010-217 = "……啊。說的都是好話～不用擔心。"
10028010-218 = "他們都說「老師是個好人」、「讓人很安心」……之類的內容。"
10028010-219 = "總之，我因此很好奇和老師共事是什麼感覺，也感到相當期待。"
10028010-220 = "可惜我平時負責的工作實在沒什麼機會能見到老師……"
10028010-221 = "……嗯？"
10028010-222 = "隨時可以跟你聯絡……？"
10028010-223 = "……哈哈。"
10028010-224 = "謝謝你這麼說，但我不想因此變成一個煩人的孩子。"
10028010-225 = "就算老師嘴上沒說，最終也一定會變成那種情況。"
10028010-226 = "……我不想一開始就被當成是「需要費心思照顧的孩子」。"
10028010-227 = "相反的，假如出現了類似這樣的機會，我就會一點一點地嘗試。"
10028010-228 = "從某方面來看……也算是帶了點私人情感吧？"
10028010-232 = "……哈哈。"
10028010-233 = "好像說了一些奇怪的話呢。#n我們趕緊把行李收拾好吧。"
10028010-238 = "我看看……裝備方面整理得差不多了……"
10028010-239 = "……嗯？"
10028010-240 = "啊啊，你說茶具套組嗎？是裝在白色的公文包裡吧？"
10028010-241 = "別擔心！為了以防萬一，我在整理行李之前先確認過了。"
10028010-242 = "已經好好將它放入車廂內了。#n老師只要和我一起搭上列車就行了。"
10028010-247 = "……嗯？"
10028010-251 = "為什麼突然把它放進車廂？#n這是什麼意思……"
10028010-252 = "不是要一起搭列車回去嗎……？"
10028010-253 = "……嗯？"
10028010-254 = "你說不是現在，而是3小時之後……？"
10028010-255 = "是6點10分的班次……？"
10028010-260 = "現在是3點吧……？"
10028010-261 = "咦，先等一下。情況有點奇怪。"
10028010-262 = "根據來的時候收到的日程表，發車時間應該已經……"
10028010-266 = "……不，現在的重點不是那個。"
10028010-267 = "也就是說，剛才載著公文包的列車是……？"
10028010-272 = "站內廣播。"
10028010-273 = "開往「格黑娜」的特快車現在即將發車。"
10028010-274 = "請乘客們務必攜帶車票前往月台，在列車出發前於指定的位置就坐。"
10028010-275 = "再重複一次。#n開往「格黑娜」的特快車即將發車──"
10028010-280 = "開往格黑……"
10028010-282 = "……哪？"

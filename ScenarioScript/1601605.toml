[translation]
1601605-1 = "ฝากฉันอีกคนไว้ด้วยค่ะ"
1601605-5 = "(คุณครูรออยู่ในห้องพักผ่อน ไม่นานนักมิเนะก็แวะมาหา)"
1601605-6 = "ขอเสียมารยาทนะคะ คุณครู"
1601605-14 = "[ns1] \"เป็นเรื่องนี้ตามคาดเลยนะ...\"\n[ns2] \"ครูคิดไว้แล้วว่าต้องเป็นเรื่องนี้\""
1601605-17 = "คุณครูคาดไว้แล้วสินะคะ..."
1601605-18 = "ว่าฉันมาเพราะอยากปรึกษาเรื่องชุดนี้น่ะ"
1601605-19 = "ถ้ารู้แล้วฉันก็ประหม่าน้อยลงนะคะ... ขอบคุณค่ะ"
1601605-20 = "แบบนี้ค่อยคุยกันง่ายหน่อยค่ะ คุณครูคะ ฉันรู้ว่าเรื่องแบบนี้เป็นการเสียมารยาท แต่ยังไงก็ยกโทษให้#nฉันด้วยนะคะ"
1601605-21 = "ฉันจะพูดอย่างตรงไปตรงมาค่ะ"
1601605-22 = "คุณครูคะ ฉัน..."
1601605-27 = "กำลังคิดว่าจะ 'กำจัด' ชุดนี้ค่ะ..."
1601605-28 = "[ns] \"...\""
1601605-30 = "[ns3] \"หา...!? กำจัดเหรอ!? ทำไมอยู่ๆ จะกำจัดล่ะ!?\"\n[ns4] \"มีปัญหาอะไรงั้นเหรอ!?\""
1601605-32 = "ค่ะ ฉันจะกำจัดค่ะ"
1601605-34 = "ค่ะ มีปัญหาค่ะ"
1601605-35 = "อย่างที่รู้กันว่าฉันเป็นถึงหัวหน้าชมรมอัศวินบรรเทาทุกข์แห่งทรีนิตี้"
1601605-36 = "การได้ใส่ชุดแบบนี้และทำกิจกรรมของไอดอลมันก็ดีอยู่หรอกค่ะ แต่ฉันก็ละทิ้งตัวตนเดิมของฉันไม่ได้ ฉันไม่อยากทำอย่างนั้นด้วยค่ะ"
1601605-37 = "และปัญหาก็เริ่มที่สิ่งนั้นละค่ะ สรุปก็คือ ฉันกังวลว่าทั้งสองอย่างจะอยู่ร่วมกันได้หรือเปล่า"
1601605-40 = "ถ้าฉันอยากใส่ชุดนี้ต่อไปเรื่อยๆ ตัวตนของหัวหน้าชมรมอัศวินบรรเทาทุกข์ก็จะสูญหายไปทีละนิดๆ..."
1601605-41 = "ยิ่งฉันใส่ชุดนี้นาน ฉันก็จะยิ่งห่างไกลจากชมรมอัศวินบรรเทาทุกข์ค่ะ"
1601605-44 = "ถึงฉันจะพยายามหาเหตุผลต่างๆ เพื่อให้สามารถทำกิจกรรมในชุดนี้ได้อยู่ ไม่ว่าจะเป็นการโปรโมต#nชมรมหรืออื่นๆ แต่นั่นมันก็เพียงชั่วคราวเท่านั้นค่ะ แต่แก่นของปัญหาก็ยังคงไม่เปลี่ยนแปลงค่ะ"
1601605-45 = "คุณครูคะ สักวันฉันคง... ต้องละทิ้งหนึ่งในสองสิ่งนี้ค่ะ และไม่ว่าจะเป็นสิ่งไหน ฉันจะต้องเสียใจอย่าง#nแน่นอนค่ะ"
1601605-46 = "เหล่าอัศวินในชมรมก็มีข้อเสนอเพื่อประนีประนอมว่าบางครั้งก็ให้ใส่ชุดนี้มาทำการแสดงเป็นงานอดิเรก#nได้..."
1601605-47 = "แต่ฉันก็ปฏิเสธทุกคนค่ะ"
1601605-48 = "เพราะนั่นจะยิ่งทำให้ขอบเขตระหว่างทั้งสองสิ่งนั้นเลือนรางลงค่ะ"
1601605-49 = "[s5] \"กังวลมากเลยสินะ สองสิ่งนี้ไปด้วยกันไม่ได้เหรอ\"\n[s6] \"คิดว่าสองสิ่งนี้อยู่ร่วมกันไม่ได้เหรอ?\""
1601605-52 = "ค่ะ นั่นคือข้อสรุปที่ฉันได้จากการครุ่นคิดอย่างหนักค่ะ"
1601605-56 = "ฉันจินตนาการถึงอนาคตในกรณีที่สถานการณ์นี้ยังคงดำเนินต่อไป ฉันพยายามไม่คิดในแง่ดีเกินเหตุ และไม่คิดในแง่ร้ายจนเกินไปค่ะ"
1601605-57 = "แต่ฉันหาคำตอบให้ตัวเองไม่ได้สักทีค่ะ สุดท้ายแล้วการเลือกสิ่งหนึ่งจะส่งผลเสียต่ออีกสิ่งด้วยค่ะ และฉันก็ไม่อยากให้เกิดผลเสียนั้นค่ะ"
1601605-58 = "ฉันก็เลย..."
1601605-63 = "อยากฝากชุดนี้... ไว้กับคุณครูค่ะ"
1601605-67 = "[ns7] \"จะฝากชุดกับครูไว้เหรอ?\"\n[ns8] \"จะให้ครูช่วยเก็บชุดนี้ไว้เหรอ?\""
1601605-70 = "ใช่ค่ะ เรียกว่าเป็นการ 'ผนึกไว้' ก็ได้ค่ะ"
1601605-71 = "ถ้าชุดนี้อยู่กับฉัน ฉันก็จะคิดถึงชุดนี้ไม่หยุด แต่ฉันก็ไม่อยากกำจัดมันด้วยตัวเองด้วยค่ะ"
1601605-72 = "ค่ะ เพราะฉันไม่คิดที่จะปฏิเสธอีกหนึ่งตัวตนนี้ของฉันค่ะ มันเป็นความทรงจำที่ล้ำค่าสำหรับฉัน ฉันจึงไม่อยากให้มันเปลี่ยนแปลงไป"
1601605-73 = "ฉันมองว่าถ้าให้คุณครูเป็นคนตัดสินใจ ก็จะเป็นทางเลือกที่ปลอดภัยที่สุดค่ะ และถ้าเป็นอย่างนั้น ฉันก็น่าจะทำให้ความทรงจำนั้นหลับใหลอยู่ในมุมหนึ่งของหัวใจได้ค่ะ"
1601605-77 = "คุณครูคะ..."
1601605-78 = "จากนี้ไปฉันขอฝากชุดที่ใส่อยู่ไว้กับคุณครูจะได้มั้ยคะ?"
1601605-79 = "[s] \"...\""
1601605-81 = "[ns] \"มิเนะ...\""
1601605-85 = "[ns9] \"ขอโทษนะ แต่ครูทำอย่างนั้นให้ไม่ได้หรอก\"\n[ns10] \"มิเนะต้องเป็นคนเก็บชุดนั้นไว้เองนะ\""
1601605-90 = "งั้นเหรอคะ..."
1601605-91 = "เข้าใจแล้วค่ะ ถ้าคุณครูว่าอย่างนั้น ฉันก็คงขอร้องอะไรต่อไม่ได้ค่ะ"
1601605-95 = "สุดท้ายชุดนี้ก็คงต้องถูกกำจัดสินะคะ..."
1601605-99 = "คะ...? มันต่างกันเหรอคะ?"
1601605-100 = "ต่อให้ฉันเก็บเอาไว้เองก็ไม่เป็นไร... และที่จริงควรจะเป็นแบบนั้นมากกว่าด้วยซ้ำเหรอคะ...?"
1601605-101 = "ทำไมล่ะ..."
1601605-105 = "เดี๋ยวนะคะ..."
1601605-106 = "คุณครู ตอนนี้เหมือนคุณครูพยายามพูดอะไรดีๆ กับฉัน แต่นี่มันไม่เหมือนกันหรอกนะคะ"
1601605-107 = "ประเด็นก็คือ ถ้าฉันยังมีสิ่งนี้อยู่ สุดท้ายฉันจะตัดสินใจไม่ได้ว่าจะต้องทำยังไงค่ะ"
1601605-108 = "คะ...?"
1601605-109 = "ไม่ใช่แบบนั้นเหรอคะ? แต่ถึงอย่างนั้นก็เถอะ..."
1601605-110 = "[s11] \"ครูจะบอกให้นะว่าให้ใส่ชุดนี้ตอนไหน\"\n[s12] \"ครูจะบอกให้เองว่าให้ใส่ชุดนี้ตอนไหน\""
1601605-113 = "...?"
1601605-117 = "...!!"
1601605-118 = "คุณครู... จะเป็นคนบอกเองว่าให้ฉันใส่ชุดนี้ตอนไหนเหรอคะ?"
1601605-119 = "ทำไมจะทำถึงขนาดนั้นคะ..."
1601605-120 = "ขอโทษด้วยค่ะ... ฉันยังไม่เข้าใจเจตนาของคุณครูค่ะ"
1601605-121 = "แต่ว่า... ค่ะ คงมีบางอย่างที่ฉันไม่รู้สินะคะ ฉันจะเชื่ออย่างนั้นแล้วกันค่ะ"
1601605-122 = "ฉันรู้ดีค่ะว่าความคิดของฉันมันค่อนข้างจะเข้มงวด..."
1601605-127 = "อืม... นั่นสินะคะ เป็นอย่างนี้นี่เอง"
1601605-128 = "คุณครูจะบอกเองว่าให้ใส่ตอนไหนงั้นเหรอ..."
1601605-129 = "ถ้าเป็นอย่างนั้น ฉันก็ไม่จำเป็นต้องกังวลว่าจะต้องทำยังไงกับชุดนี้ค่ะ"
1601605-130 = "ฮุฮุ..."
1601605-131 = "จริงๆ เลย... จะมีคนอื่นมาบอกว่าต้องใส่ชุดของตัวเองตอนไหนด้วย เรื่องแบบนี้ก็แปลกใหม่ และก็น่าสนุกดีนะคะ"
1601605-132 = "คงไม่เป็นไรหรอกใช่มั้ยคะ ยังไงคุณครูก็ไม่ใช่ใครอื่นนี่คะ"
1601605-133 = "ฉันว่า..."
1601605-134 = "พอมาคิดดูแล้วมันก็น่าเขินอยู่นะคะ..."
1601605-138 = "[ns13] \"เดี๋ยวสิ นี่คือข้อสรุปเพื่อแก้ความกังวลต่างหาก...!!\"\n[ns14] \"อะไรนะ! เมื่อกี้ยังจริงจังกับเรื่องนี้อยู่เลยนี่!?\""
1601605-143 = "ฮุฮุฮุ ฉันล้อเล่นค่ะ"
1601605-144 = "ถ้างั้น คุณครูคะ ต่อไปฉันจะฝาก 'ฉันคนนั้น' ไว้กับคุณครูละนะคะ"
1601605-145 = "และส่วนตัวแล้ว..."
1601605-150 = "ฉันหวังว่าฉันคนนั้นจะได้เจอคุณครูบ่อยๆ นะคะ..."

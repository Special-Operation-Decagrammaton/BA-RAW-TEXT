1601605-17 = "3;미네 아이돌;10;역시 예상하고 계셨던 거군요, 제가 이런 쪽…….\n#3;stiff"
1601605-18 = "3;미네 아이돌;99;이 의복에 관해 상담을 요청할 거라는 걸."
1601605-19 = "3;미네 아이돌;03;……덕분에 긴장은 조금 풀리네요. 감사합니다."
1601605-20 = "3;미네 아이돌;02;이야기가 빠르겠군요. 선생님, 무례라는 걸 알고 있지만 그럼에도 이러는 저를 용서해 주시기 바랍니다."

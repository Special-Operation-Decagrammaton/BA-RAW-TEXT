1601605-57 = "3;미네 아이돌;05;저 스스로는 완전한 병행이 불가능합니다. 결국 둘 중 하나가 다른 한쪽에 영향을 줄 것입니다. 그리고 저는 그것을 원하지는 않습니다.\n#3;stiff"

[translation]
1601605-1 = "交給我就行了"
1601605-5 = "（沒等多久，美禰就來到了休息室）"
1601605-6 = "打擾了，老師。"
1601605-14 = "[ns1]「……果然沒錯。」\n[ns2]「我就覺得應該是有關這方面的事。」"
1601605-17 = "果然被您料到了嗎。#n沒錯，我想跟您商量的就是……"
1601605-18 = "跟這件服裝有關的事。"
1601605-19 = "……謝謝您讓我的緊張稍微緩解了一些。"
1601605-20 = "這樣說明起來就能更迅速了。#n老師，我明白這麼做相當失禮，還請您多多見諒。"
1601605-21 = "因為我想直接切入主題。"
1601605-22 = "老師，我……"
1601605-27 = "其實……正在考慮「處理」掉這件衣服。"
1601605-28 = "[ns]「……」"
1601605-30 = "[ns3]「……咦！？處理！？怎麼這麼突然！？」\n[ns4]「出了什麼問題嗎！？」"
1601605-32 = "沒錯，就是處理。"
1601605-34 = "沒錯，確實出了一些問題。"
1601605-35 = "如您所知，我是三一救護騎士團的團長。"
1601605-36 = "雖然我很喜歡這套衣服，也很享受擔任偶像的時光……#n但是我不能，也不希望因此而拋棄原本的自己。"
1601605-37 = "問題就出在這裡──兩者究竟能不能共存呢？"
1601605-40 = "雖然我也很想繼續穿著這套衣服，但這註定會淡化身為救護騎士團團長的身份……"
1601605-41 = "換句話說，身穿這套衣服的時間越長，我與救護騎士團之間的距離就會越遠。"
1601605-44 = "雖然曾想過藉著宣傳或別的理由，繼續穿著這身衣服……#n但那終究只是權宜之計，無法從根本解決問題。"
1601605-45 = "老師，再這樣下去……我遲早會疏忽其中一邊的身份。#n而無論被疏忽的是哪一邊，對我而言都相當令人痛心。"
1601605-46 = "團員們也有向我提過一個折衷的方案。#n那就是把這當成興趣，偶爾穿著這套衣服出外舉辦快閃表演……"
1601605-47 = "但我還是婉拒了。"
1601605-48 = "因為我認為，那終究會模糊兩者之間的界線。"
1601605-49 = "[s5]「看來你對這方面的事相當謹慎呢。」\n[s6]「你覺得兩者很難共存嗎？」"
1601605-52 = "是的，這是我深思熟慮後得出的結論。"
1601605-56 = "也是盡量以客觀的態度，審視此事繼續發展下去的可能性後得出的答案。"
1601605-57 = "我認為自己難以使兩者的共存成立。#n因為雙方勢必會互相影響，而我並不樂見這種情況發生。"
1601605-58 = "因此……"
1601605-63 = "因此我決定……將這套衣服交給老師。"
1601605-67 = "[ns7]「交給我？」\n[ns8]「是希望我幫你保管嗎？」"
1601605-70 = "是的。您也可以將其視為一種「封印」。"
1601605-71 = "如果由我自己保管，我想必會不停為這套衣服煩惱，卻又捨不得將它銷毀。"
1601605-72 = "我並不打算否定自己現在的模樣。#n因為這對我來說是段珍貴的回憶，我不希望這段回憶發生變質。"
1601605-73 = "所以才認為交給老師保管是最佳的作法。#n如此才能讓我內心深處的回憶不再喧囂。"
1601605-77 = "……老師。"
1601605-78 = "您願意替我保管這套衣服嗎？"
1601605-79 = "[s] 「…………」"
1601605-81 = "[ns]「……美禰。」"
1601605-85 = "[ns9]「很抱歉，這個請求我無法答應。」\n[ns10]「那套衣服應該由你自己保管才對。」"
1601605-90 = "……這樣啊。"
1601605-91 = "我明白了。#n既然這是老師您的決定，我也只能接受。"
1601605-95 = "看來還是只能銷毀這套衣服……"
1601605-99 = "……嗯？沒必要這樣？"
1601605-100 = "就算留著這套衣服也沒關係……？#n您反而覺得我應該這麼做才對……？"
1601605-101 = "這是為什麼呢……"
1601605-105 = "……請等一下。"
1601605-106 = "老師，我明白您剛才或許是為了安慰我才這麼回答，不過現在的問題是……"
1601605-107 = "只要這套衣服還在，我就不知該拿它如何是好。#n即便如此……"
1601605-108 = "……嗯？"
1601605-109 = "您不是那個意思？可是……"
1601605-110 = "[s11]「雖然我不能替你保管，但我可以陪你一起煩惱。」\n[s12]「在你能夠接受它之前，就由我來幫你決定穿上它的時機吧。」"
1601605-113 = "……？"
1601605-117 = "……！！"
1601605-118 = "由老師幫我決定……穿上它的時機？"
1601605-119 = "您為何不惜做到這種地步……"
1601605-120 = "……非常抱歉，我還不太明白您這麼做的用意。"
1601605-121 = "不過……我相信其中肯定有某些我不明白的道理，所以我決定暫時相信老師。"
1601605-122 = "畢竟……我也清楚自己是個有點死腦筋的人。"
1601605-127 = "原來如此……"
1601605-128 = "由老師替我決定……是嗎？"
1601605-129 = "也對，這麼一來我就不必煩惱該如何處理這套衣服了。"
1601605-130 = "……呵呵。"
1601605-131 = "由別人決定什麼時候該穿什麼衣服……還真是既創新又有趣呢。"
1601605-132 = "真是個好主意。#n不愧是老師想出來的辦法。"
1601605-133 = "不過……"
1601605-134 = "仔細想想，好像突然覺得有點害羞呢……"
1601605-138 = "[ns13]「不，不是！這只是因為……！！」\n[ns14]「奇怪！？剛才氣氛不是還很嚴肅的嗎！？」"
1601605-143 = "呵呵呵，我是開玩笑的。"
1601605-144 = "那麼，今後「偶像美禰」就全權交由老師保管了。"
1601605-145 = "其實我個人……"
1601605-150 = "……還挺期待能經常以這副模樣跟老師見面的哦。"

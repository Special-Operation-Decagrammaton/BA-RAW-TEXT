1601605-34 = "3;미네 아이돌;99;네. 문제가 있습니다.\n#3;em;[한숨]"
1601605-35 = "3;미네 아이돌;05;아시겠지만 저는 다른 곳도 아닌 트리니티 구호기사단의 단장 역할을 맡고 있는 몸."
1601605-36 = "3;미네 아이돌;07;지금의 옷과 이 옷을 입고서 하는 아이돌 활동도 좋지만, 그렇다고 제가 본래의 저를 버릴 수는 없습니다. 그것을 바라지도 않습니다.\n#3;stiff"
1601605-37 = "3;미네 아이돌;13;그리고 문제는 거기서 발생합니다. 이것은 과연 두 면이 양립할 수 있는가에 대한 이야기."
1601605-38 = "1;미네;00\n5;미네 아이돌;00\n#3;hide\n#1;white\n#5;white\n#1;h\n#5;h"
1601605-39 = "#wait;500"
1601605-40 = "#na;미네 아이돌;이 옷은 계속 입고 싶지만, 그래서는 구호기사단의 단장이라는 정체성이 점점 옅어지고……."
1601605-41 = "#na;미네 아이돌;다시 말해 입고 있는 시간만큼, 구호기사단의 저와는 멀어진다는 것입니다."
1601605-42 = "#all;hide"
1601605-43 = "#wait;500"
1601605-44 = "3;미네 아이돌;99;홍보니 뭐니 이런저런 이유를 들어가며 입으면서도 활동할 수 있는 방법을 취해 보았지만, 그 또한 일시적인 것이었습니다. 문제의 본질이 바뀌지는 않더군요.\n#3;em;…\n#3;a"
1601605-45 = "3;미네 아이돌;05;선생님 저는, 언젠가는……. 둘 중 하나에 소홀해지고 말 것입니다. 그리고 그게 어느 쪽이건, 저에게는 상처가 될 것만 같습니다.\n#3;stiff"
1601605-46 = "3;미네 아이돌;02;단원분들은 때때로 옷을 입고 게릴라 라이브 같은 걸 취미로 해보는 것도 어떠냐-같은 절충안도 말해 주셨습니다만……."
1601605-47 = "3;미네 아이돌;99;결국 모두 거절했습니다."
1601605-48 = "3;미네 아이돌;05;그것도 결국 둘 사이의 경계가 모호해지거나, 섞이는 느낌이었기 때문입니다."
1601605-49 = "[s5] \"꽤나 경계하고 있구나, 그 부분을.\"\n[s6] \"공존은 어렵다고 판단한 거야?\""

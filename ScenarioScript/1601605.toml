1601605-71 = "3;미네 아이돌;02;제가 직접 들고 있다면 끊임없이 저는 이 옷에 대해 생각할 것이고, 그렇다고 없애고 싶지는 않습니다."
1601605-72 = "3;미네 아이돌;05;네. 지금의 이 모습도 부정할 생각까지는 없으니까요. 저에게는 소중한 추억이고, 그렇기에 그것이 변질되진 않길 바랍니다.\n#3;stiff"

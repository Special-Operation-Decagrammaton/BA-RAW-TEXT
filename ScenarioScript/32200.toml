32200-1 = "#title;제20화;에필로그"
32200-2 = "3;세이아;03;결국 보충수업부의 모두는 어떠한 협잡도 없이 자신들의 힘만으로 합격을 성취해냈군요.\n#3;a"
32200-3 = "3;세이아;02;코하루는 이제 다시 정의실현부로 돌아갈 수 있을 테고,"
32200-4 = "3;세이아;01;하나코는 자신이 있어도 괜찮은 곳을 찾은 것 같으니, 이제 자퇴하려는 시도를 멈추겠죠."
32200-5 = "3;세이아;99;아즈사는 원하는 공부를 계속할 수 있게 될 거구요."
32200-6 = "3;세이아;01;그리고 이 모든 사건의 가장 앞에서 노력해 온 히후미는 이제 자신의 일상으로 돌아갈 수 있을 겁니다."
32200-7 = "3;세이아;01;미카는 학원 감옥에 유폐되었고. 아마 두 번 다시는 얼굴을 보지 못할지도 모르겠네요."
32200-8 = "3;세이아;01;나기사는…… 예정대로 에덴조약에 조인하러 가겠죠."
32200-9 = "3;세이아;99;……."
32200-10 = "3;세이아;01;네, 여기까진 해피 엔딩이라고 말할 수 있을 겁니다."
32200-11 = "3;세이아;02;……. 하지만 아직 이야기는 끝나지 않았고,"
32200-12 = "3;세이아;01;당신이 지켜봐야 할 결말은 아직 그 모습을 드러내지 않았습니다."
32200-13 = "3;세이아;99;지금 이 이야기가 어디까지 왔든지간에,"
32200-14 = "3;세이아;01;그 모든 것은 결국 파국으로 수렴할 뿐입니다."

[translation]
32200-1 = "ตอนที่ 20;บทส่งท้าย"
32200-2 = "ในที่สุดชมรมชั้นเรียนเสริมก็สอบผ่านอย่างสุจริตได้ด้วยความสามารถของพวกเธอเองค่ะ"
32200-3 = "ทีนี้โคฮารุก็คงกลับไปที่ชมรมทวงความยุติธรรมได้อีกครั้ง"
32200-4 = "ส่วนฮานาโกะก็รู้แล้วว่าตัวเองเหมาะที่จะอยู่กับที่ไหน แบบนี้คงล้มเลิกความคิดที่จะลาออกแล้วล่ะค่ะ"
32200-5 = "ส่วนอาซึสะ เธอจะได้เรียนต่อตามที่ต้องการค่ะ"
32200-6 = "และฮิฟุมิที่มุ่งมั่นและพยายามมากกว่าใครอื่นในทุกสถานการณ์ที่ผ่านมา#nจากนี้เธอจะได้กลับไปใช้ชีวิตประจำวันตามปกติค่ะ"
32200-7 = "ส่วนมิกะ... มิกะถูกควบคุมตัวอยู่ในห้องขังของโรงเรียน เราอาจจะไม่ได้เจอหน้ากันอีกแล้วก็ได้ค่ะ"
32200-8 = "ส่วนนางิสะ... ก็คงไปลงนามในสนธิสัญญาเอเดนตามกำหนดการเดิม"
32200-9 = "......."
32200-10 = "จะเรียกตรงนี้ว่าเป็นแฮปปี้เอนดิ้งก็ได้ค่ะ"
32200-11 = "แต่ว่าเรื่องนี้มันยังไม่จบ..."
32200-12 = "เพราะตอนจบที่คุณต้องติดตามมันยังไม่ถูกเปิดเผยออกมายังไงล่ะคะ"
32200-13 = "ไม่ว่าเรื่องนี้จะลากยาวและจบลงแบบไหนก็ตาม"
32200-14 = "ท้ายที่สุดแล้วทุกอย่างจะจบลงอย่างพินาศค่ะ"
32200-19 = "เมฆครึ้มดำ"
32200-20 = "เมฆครึ้มดำที่ไม่มีใครรับมือได้... เมฆครึ้มดำที่จะไม่จางหายไปกำลังก่อตัว และเข้ามาทางนี้แล้วล่ะค่ะ"
32200-22 = "เพราะเรายังไม่ถึงตอนจบ ฉันว่าคุณน่าจะรู้ดีกว่าใครอื่นนะคะ"
32200-25 = "ทุกคนเตรียมตัว..."
32200-27 = "อ๊ะ! ระ... เริ่มแล้วเหรอคะ? ในที่สุดก็จะเริ่มแล้วเหรอ? มันจะเจ็บปวดใช่ไหมคะ? ต้องเจ็บปวดแน่ๆ เลยค่ะ"
32200-28 = "ฉันไม่สนหรอก... ความเจ็บปวดคือการยืนยันว่ายังมีชีวิตอยู่"
32200-29 = "......."
32200-30 = "องค์หญิงกำลังใช้ภาษามือบอกอะไรบางอย่างอยู่ค่ะ อ่อ นั่นแปลว่า... "
32200-31 = "อยากรู้ว่าเด็กคนนั้นเป็นยังไงเหรอ? ทำไมถึงสงสัยล่ะองค์หญิง?"
32200-32 = "......."
32200-33 = "เรื่องนั้นไม่เห็นจะสำคัญเลย จะแตกต่างกันก็แค่ช้าหรือเร็วเท่านั้น"
32200-38 = "เลิกพูดไร้สาระได้แล้ว"
32200-39 = "......."
32200-40 = "อืม เมฆฝนนี่นา... พรุ่งนี้ฝนคงตกสินะ"
32200-41 = "ฝะ... ฝนจะตกเหรอคะ? ฝนตกแล้วเฉอะแฉะ ฉันไม่ชอบเลย... เจอแบบนี้เข้าไปฉันต้องทุกข์ทนแน่ๆ"
32200-47 = "อาซึสะ เธอกำลังดิ้นรนอยู่สินะ แต่เธอก็ออกจากตรงนี้ไม่ได้หรอก"
32200-48 = "เพราะในอีกไม่นาน เธอจะคิดถึงความจริงที่ร่างกายของเธอจดจำไว้อีกครั้ง"
32200-49 = "หวังว่าผู้พยากรณ์จะบอกกับเธอนะ..."
32200-52 = "[ruby=Vanitas vanitatum et omnia vanitas.]ทุกอย่างเปล่าประโยชน์และไร้ความหมาย[/ruby]"
32200-58 = "องก์ <สนธิสัญญาเอเดน>; ติดตามต่อในบทที่ 3"

[translation]
32200-1 = "Episode 20; Epilogue"
32200-2 = "In the end, the Make-Up Work Club passed their exam completely on their own merits."
32200-3 = "Now Koharu can return to the Justice Task Force."
32200-4 = "Hanako seems to have found a place where she belongs, so she shouldn't have any reason to drop out of school."
32200-5 = "Azusa has taken to the joy of learning."
32200-6 = "And Hifumi, perhaps the most earnest and hard-working of the club, will be able to return to her normal life."
32200-7 = "Mika has been locked away, maybe never to be seen again."
32200-8 = "Nagisa's Eden Treaty will be signed as planned."
32200-9 = "..."
32200-10 = "You could say everything has been wrapped up neatly with a little bow..."
32200-11 = "...but the story isn't over yet."
32200-12 = "You still have a responsibility to see it through to the end."
32200-13 = "Rest assured that no matter how many twists or turns this story takes..."
32200-14 = "...it will inevitably descend into catastrophe."
32200-19 = "Do you see them on the horizon?"
32200-20 = "There are dark clouds coming—dark enough to blot out the sun. They may never clear."
32200-22 = "It's not over yet. You know that better than anyone, don't you?"
32200-25 = "Prepare yourselves."
32200-27 = "O-Oh, is it finally starting? It's going to be painful, right? It's definitely going to be painful."
32200-28 = "That's fine. Pain is proof that you are alive."
32200-29 = "... "
32200-30 = "H-Hime is saying something in sign language. Um..."
32200-31 = "\"What happened to her?\" You mean that one girl, Hime?"
32200-32 = "..."
32200-33 = "What difference does it make? It was only a matter of time."
32200-38 = "That's enough."
32200-39 = "..."
32200-40 = "See those dark clouds? It's going to rain soon."
32200-41 = "R-Rain? But I don't like rain. It's wet and cold and irritating...and it gets everywhere."
32200-47 = "Struggle as much as you like, Azusa, but you can't escape."
32200-48 = "The truth is ingrained into your very being, and you will be reminded of it soon enough."
32200-49 = "It is the prophecy. "
32200-52 = "All is in vain. Life is ultimately empty."
32200-58 = "The Eden Treaty;To be Continued in Chapter 3"

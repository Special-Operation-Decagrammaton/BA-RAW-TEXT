[translation]
32200-1 = "第20話;尾聲"
32200-2 = "補課部的大家，最終都靠著自己的力量，名正言順地合格了呢。"
32200-3 = "小春之後應該能回到實現正義部……"
32200-4 = "花子也找到了自己的容身之處，應該不會再抱有退學的念頭了吧。"
32200-5 = "梓將能如他所願，繼續學習下去。"
32200-6 = "至於一直在最前線努力的日步美，也將得以回歸原本的日常。"
32200-7 = "彌香被關進了學園的監獄。或許再也見不到了也說不定。"
32200-8 = "至於渚……將會依照原定計畫，前去簽訂伊甸園條約吧。"
32200-9 = "……"
32200-10 = "嗯，到目前為止還稱的上是個快樂的故事。"
32200-11 = "……然而故事還沒有結束。"
32200-12 = "你應該見證的結局，尚未顯現出它的全貌。"
32200-13 = "無論這個故事如何發展……"
32200-14 = "一切仍將收束於破滅的結局。"
32200-19 = "……烏雲。"
32200-20 = "沒有人能夠承擔、永遠不會散去的烏雲正在緩緩接近。"
32200-22 = "故事還沒有結束──你想必比任何人都清楚吧？"
32200-25 = "……大家做好準備。"
32200-27 = "啊，啊啊……要，要開始了嗎？這，這個時刻終於到了嗎……？#n應該會非常痛苦、非常難受吧……"
32200-28 = "……無所謂。#n會感受到痛苦也是活著的證據。"
32200-29 = "……"
32200-30 = "公，公主好像用手語在說些什麼。#n我看看……"
32200-31 = "那孩子怎麼了？#n你很在意嗎，公主？"
32200-32 = "……"
32200-33 = "怎麼樣都無所謂吧？#n不過就是時間早晚的問題而已。"
32200-38 = "閒聊就說到這裡吧。"
32200-39 = "……"
32200-40 = "烏雲……明天要下雨了吧。"
32200-41 = "會，會下雨嗎？#n我不喜歡下雨……潮濕的感覺很不舒服……"
32200-47 = "……梓。不論你怎麼掙扎都無法逃離的。"
32200-48 = "你的身體很快就會想起這個世界的真相。"
32200-49 = "預言者曾說──"
32200-52 = "[ruby=Vanitas vanitatum et omnia vanitas.]一切皆為徒勞。無論去向何處，終將化為虛無[/ruby]。"
32200-58 = "伊甸園條約篇;To be Continued in Chapter 3"

[translation]
32200-1 = "第20話;エピローグ"
32200-2 = "……補習授業部の皆はしっかりと、自分たちの力で合格を勝ち取ったのだね。"
32200-3 = "コハルはこの後、晴れて正義実現委員会に戻れるはずだ。"
32200-4 = "ハナコは、自らをさらけ出せるような良き相手を、良き友を見つけられたようだね。恐らく今は、少なくとも学校を辞めようとは思っていないだろう。"
32200-5 = "アズサはきっとこれからも、学びを続けられる。"
32200-6 = "そしてある意味では誰よりも最前線で、真摯に努力を積み上げてきたヒフミは、今までの日常に戻れるだろうね。"
32200-7 = "……ミカは学園の監獄に幽閉された。もしかしたらもう二度と会えないかもしれない。"
32200-8 = "ナギサは……予定通り、エデン条約に調印しに行くだろう。"
32200-9 = "……。"
32200-10 = "うん、ここまではよくできたお話だ。"
32200-11 = "……でもまだ、エンドロールには早すぎる。"
32200-12 = "なにせ君が見守るべき結末は、まだその全貌を現してはいない。"
32200-13 = "このお話がたとえどんな風に転がっていこうと……"
32200-14 = "全ては、破局へと収束していく。"
32200-19 = "……暗雲。"
32200-20 = "誰の手にも負えないような、二度と太陽を拝めるとは思えなくなるような……そんな暗雲が、今ゆっくりと押し寄せてきている。"
32200-22 = "まだ残っているものがある、これで終幕じゃない……そのことは君がきっと、誰よりもよく分かっているだろう？"
32200-25 = "……準備しろ、みんな。"
32200-27 = "あ、あぁっ……つ、ついに始まるんですか……！？よ、ようやくこの時が……でも苦しいんですよね、辛いんですよね……？"
32200-28 = "……うん。でも大丈夫、苦しいのは生きてる証拠。"
32200-29 = "……。"
32200-30 = "ひ、姫ちゃんが手話で何か言ってますけど。えっと……。"
32200-31 = "……あの子はどうなった、って？気になるの、姫？"
32200-32 = "……。"
32200-33 = "……どうでも良くない？結局は早いか遅いかだけの問題で。"
32200-38 = "その辺にしておけ。"
32200-39 = "……。"
32200-40 = "黒い雲……明日は雨になるな。"
32200-41 = "あ、雨ですか？嫌ですね、雨はジメジメして……苦しいですし、気持ち悪いですし……。"
32200-47 = "……アズサ。どれだけ足掻こうと、お前は抜け出すことはできない。"
32200-48 = "お前の体は覚えている。すぐに思い出すはずだ、真実を。"
32200-49 = "……曰く、"
32200-52 = "[ruby=Vanitas vanitatum et omnia vanitas]全ては虚しい。どこまで行こうとも、全てはただ虚しいものだ[/ruby]。"
32200-58 = "エデン条約編;To be Continued in Chapter 3"

[translation]
901-1 = "賽特的憤怒"
901-3 = "好苦……好苦啊……"
901-4 = "……唔，唔唔……"
901-8 = "……"
901-9 = "[ruby=Celestial pantheon]萬神的星座[/ruby]……？"
901-10 = "那個是……"
901-11 = "那是小生曾所屬的世界……#n是在那部典籍中記載的……超越凡俗的存在……"
901-12 = "與現今這裡的概念截然不同……嘻嘻嘻……沒錯。#n那即是超越凡俗的神格顯現。"
901-13 = "此存在無法用諸如「神祕」或「恐怖」的詞語加以形容……"
901-14 = "……對了。如果硬要形容的話，是在「崇高」之前……#n或者說，是超越那個概念的存在……至於該怎麼稱呼它們，我也不清楚……"
901-18 = "……"
901-19 = "其中一個星座被稱為「賽特的憤怒」……是的，沒錯。"
901-20 = "如您所知……這既是沙漠、風暴和閃電的化身，也是這些力量所象徵的憤怒……"
901-21 = "是否有……回答到您的問題呢……？"
901-22 = "既然如此……還請放過小生我吧……"
901-23 = "請別妨礙我的苦行……"
901-24 = "那麼……"
901-26 = "好苦……"
901-27 = "好苦……好苦啊……唔唔……"

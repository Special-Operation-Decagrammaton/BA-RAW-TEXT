[translation]
901-1 = "ความโกรธแค้นของเซ็ต"
901-3 = "ทรมาน... ทรมานเหลือเกิน... "
901-4 = "...ฮือ... ฮือ... "
901-8 = "......"
901-9 = "กลุ่มดาวแห่งทวยเทพทั้งมวล...?"
901-10 = "นั่นมัน... "
901-11 = "นั่นมันโลกที่ข้าเคยอาศัยอยู่... เหล่าตัวตนที่ก้าวข้ามขอบเขต... ที่บันทึกอยู่ในหนังสือนั่น... "
901-12 = "ตัวตนที่แตกต่างจากกรอบความคิดของที่แห่งนี้... ฮี่ฮี่ฮี่... ใช่แล้ว... การปรากฏขึ้นของเทพที่อยู่เหนือ#nธรรมชาติ"
901-13 = "ตัวตนเหล่านี้ไม่สามารถบรรยายหรือให้คำจำกัดความอย่าง <ลึกลับ> หรือ <น่าสะพรึงกลัว> ได้..."
901-14 = "...ใช่แล้ว แต่ถ้าจะให้สรุปความออกมาก็คงจะเป็นความเชื่อที่มีมานานก่อน <ความสูงส่ง> ก็เป็นได้..."
901-18 = "......"
901-19 = "และหนึ่งในกลุ่มดาวนั้นก็คือ <ความโกรธแค้นของเซ็ต>... ใช่แล้วละ  "
901-20 = "คุณเองก็น่าจะเข้าใจดี... ทะเลทราย พายุและสายฟ้าที่โหมกระหน่ำ คือตัวแทนของความโกรธแค้น#nของพลังนั้น"
901-21 = "พอจะเป็น... คำตอบได้หรือไม่...?"
901-22 = "เช่นนั้นแล้ว... ได้โปรดเลิกยุ่งกับข้าเสียที"
901-23 = "โปรดอย่าขัดขวางเส้นทางการบำเพ็ญตนของข้าอีก..."
901-24 = "เช่นนั้น..."
901-26 = "ทรมาน... "
901-27 = "ทรมาน... ทรมานเหลือเกิน... ฮือ..."

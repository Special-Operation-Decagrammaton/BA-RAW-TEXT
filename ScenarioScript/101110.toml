101110-3 = "ฉะ... ฉันก็ยอมรับความสามารถในการสั่งการที่ยอดเยี่ยมของครูหรอกนะ... แต่ตอนนี้คนที่พวกเราต้อง#nไปเผชิญหน้าคือพวก PMC เลยนะ"
101110-4 = "แล้วเราก็มีผู้บาดเจ็บด้วย ยิ่งกว่านั้น... "
101110-10 = "ตรงนี้! หาเจอแล้ว!"
101110-11 = "ว้ายยย! โดนจับได้ซะแล้ว!"
101110-12 = "เริ่มปะทะก่อนแล้วกันค่ะ!"

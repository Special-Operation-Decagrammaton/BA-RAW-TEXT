10049040-185 = "อะ... เอ่อ... เอ่อ..."
10049040-186 = "ฉันจะเอาเค้ก? กับเนย...? ไปให้... ค่ะ...?"
10049040-187 = "คะ??"
10049040-189 = "[ns] (นั่นมัน... บทอะไรน่ะ?)"
10049040-191 = "เทอร์ไมต์ ไวต์?"
10049040-192 = "ดูแปลกๆ นะ!"
10049040-193 = "ปกติเทอร์ไมต์ ไวต์ของเราไม่เป็นแบบนี้นี่นา!"
10049040-195 = "ยะ... อย่างนี้นี่เอง! ไวต์คิดจะใช้ 'ชูการ์ เมจิคัล พาวเวอร์' สินะคะ!"
10049040-196 = "งั้นพิงค์ก็จะเตรียมตัวด้วยค่ะ!"
10049040-197 = "เรามาฝึกท่าไม้ตายด้วยกันมั้ยคะ?"
10049040-198 = "ทุกคน! ช่วยส่งพลังให้พวกเราด้วยค่ะ!"
10049040-200 = "ค่ะ!!!"
10049040-201 = "พร้อมแล้วค้าบบ!"
10049040-203 = "[ns7] \"เรอิสะด้นสดให้เหรอเนี่ย!\"\n[ns8] \"เยี่ยมมากเลย เรอิสะ!\""
10049040-207 = "(บทพูดท่าไม้ตาย บทยังไม่ลบไปนี่นา)"
10049040-212 = "(ทำไมนะ ทำไมฉันพูดออกมาไม่ได้เลย...)"
10049040-213 = "(ด้นสดแบบคุณเรอิสะก็ทำไม่ได้ ฉันมัน...)"
10049040-218 = "พะ... เพื่อสันติสุขของทุกคน... ต่อให้..."
10049040-219 = "ไม่มีใคร... มะ... มองเห็น..."
10049040-223 = "ทำไมเธอถึงมาทำงานกลุ่มรักษาความสงบอะไรนี่อยู่เหรอ? ไม่เห็นจะมีใครมองเห็นเลยนี่นา?"
10049040-224 = "ฉัน... เป็นอย่างนั้นเหรอคะ..?"
10049040-228 = "กะแล้วเชียว"

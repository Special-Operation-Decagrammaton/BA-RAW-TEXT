[translation]
10049040-1 = "第4話;兩人是魔法少女！ "
10049040-2 = "準備室"
10049040-3 = "哇！！這裡就是準備室嗎！！"
10049040-4 = "感覺就像真的成為魔法少女作品的演員一樣！"
10049040-5 = "嘘，嘘！請安靜一點，澪紗同學！"
10049040-7 = "唔嗯……"
10049040-8 = "兩位真的是來表演的嗎？"
10049040-9 = "好像沒在演員名單裡看到你們……#n偏偏我又把名單忘在辦公室了……"
10049040-10 = "！！"
10049040-15 = "（如果被發現我們是外人的話……）"
10049040-16 = "（潛入的事情就會暴露……肯定會被目標發現的）"
10049040-17 = "（怎麼辦……怎麼辦……？）"
10049040-18 = "（得想想辦法才行……）"
10049040-22 = "從[ruby=進彈坡]Feed ramp[/ruby]到[ruby=膛室]Chamber[/ruby]。#n六條右旋的魔法啊！賜予我不可動搖的力量！"
10049040-28 = "[ruby=送上槍機]Bolt Forward[/ruby]。Thermite Pink，登場！"
10049040-29 = "OK！我們都準備完畢了！"
10049040-30 = "澪紗同學！？"
10049040-31 = "來！鈴美同學也自然地擺個姿勢吧！"
10049040-32 = "唔……唔唔……"
10049040-38 = "Magical，Lyrical……Thermite White！"
10049040-42 = "我，我明白了。#n表演會在10分鐘後開始，兩位到時候再出來就行了。"
10049040-46 = "哈啊……"
10049040-47 = "呼……總算度過危機了呢！"
10049040-48 = "澪紗同學！雖然你應對得很好，可是現在該怎麼辦？"
10049040-49 = "居然偏偏遇到這種巧合，這樣下去我們真的得要代打演出了耶！？"
10049040-50 = "[s1]「這樣不是更好嗎？」\n[s2]「站在舞台上反而更方便俯瞰全場。」"
10049040-53 = "是，是嗎……"
10049040-54 = "可是我……只有在小時候看過這種魔法少女作品……"
10049040-55 = "況且還要站在這麼多人面前……光是想像就覺得可怕……"
10049040-56 = "鈴美同學超帥的！完全不用擔心！"
10049040-57 = "你平常不是也在以自衛隊的身分活躍嗎？"
10049040-58 = "這個那完全是兩回事！"
10049040-59 = "怎麼辦……怎麼辦……"
10049040-61 = "[ns3]「還是先拖一下時間？」\n[ns4]「說點台詞之類的來拖延時間吧。」"
10049040-64 = "可是我不太熟悉這類的台詞……"
10049040-65 = "哼哼！需要魔法少女的台詞的話！"
10049040-66 = "就包在我身上吧！"
10049040-73 = "澪紗同學？那是……筆嗎？"
10049040-74 = "不是「筆」！"
10049040-75 = "是「魔法小抄」！"
10049040-76 = "接下來我要用這個──"
10049040-77 = "把台詞寫在鈴美同學的手上！"
10049040-82 = "等，等等！這麼突然──呀啊！！"
10049040-87 = "很，很很很，很癢耶！咯，咯咯，啊哈哈哈！！"
10049040-89 = "[ns]（原來鈴美也會笑成這樣啊）"
10049040-95 = "準備完成！"
10049040-96 = "哈啊，哈啊……"
10049040-97 = "我其實很怕癢……"
10049040-98 = "特別是手掌……！！"
10049040-99 = "不過，只要照著我寫的念就沒問題了！"
10049040-100 = "那種事怎麼可能……"
10049040-105 = "好，表演要開始了！快上台吧！"
10049040-107 = "是！！"
10049040-108 = "我，我還沒有看過內容。請，請等一下……！"
10049040-109 = "而且沒有志美子同學搭戲真的沒問題嗎！？"
10049040-110 = "我看日程表上寫著，只要在舞台上做自我介紹就好了！"
10049040-112 = "[ns5]「加油！」\n[ns6]「Thermite White，加油！」"
10049040-115 = "唔，唔哇啊啊！！"
10049040-121 = "是Thermite White！！"
10049040-122 = "還有Thermite Pink！"
10049040-123 = "White姐姐好漂亮！！像公主一樣！！"
10049040-125 = "（剛剛明明沒有這麼多人吧！？）"
10049040-126 = "（大家的歡呼聲，還有期待的表情……）"
10049040-127 = "（好，好可怕。好可怕，好可怕）"
10049040-128 = "（我沒辦法，我做不到。這種被期待的事，我……）"
10049040-129 = "Bolt Forward！Thermite Pink，登場！"
10049040-130 = "哇啊啊啊啊啊！！"
10049040-131 = "澪紗同學！？"
10049040-132 = "鈴美同學！接下來輪到主角登場了！"
10049040-133 = "把鈴美同學最帥最帥的樣子展現出來吧！"
10049040-134 = "（澪紗同學怎麼能這麼勇敢又有氣勢……！）"
10049040-135 = "……呼。"
10049040-139 = "Bolt Catch！Thermite White，登場！"
10049040-140 = "哇啊啊啊啊啊啊！！！"
10049040-142 = "Thermite White！！Thermite White！！"
10049040-143 = "哇啊啊啊！！"
10049040-147 = "[ns]「太棒了！！Thermite White醬！！」"
10049040-149 = "啊哈哈！老師也喊太大聲了吧！！"
10049040-150 = "老師……！"
10049040-151 = "咳哼……！#n糟糕了，White！聽說在這座遊樂園裡，出現了艾拉與他的部下！"
10049040-152 = "咦，啊。Pink，那是真的嗎？"
10049040-153 = "沒錯！他們好像想搶走我們的友情能量！"
10049040-168 = "（幸好……總算勉強撐過去了）"
10049040-169 = "（從舞台上可以看見整個園區，很利於觀測……這樣的話還挺……）"
10049040-170 = "（咦？汗……）"
10049040-175 = "（啊！？剛才無意間用手擦汗，結果手上的台詞……！）"
10049040-176 = "（全都糊掉了！？）"
10049040-177 = "Thermite White！你打算怎麼辦？"
10049040-182 = "……鈴美同學！台詞！"
10049040-184 = "[ns]「鈴美！？」"
10049040-185 = "啊，咦……那個……"
10049040-186 = "我，我要給大家……蛋糕？還有奶油……嗎？"
10049040-187 = "咦咦？？"
10049040-189 = "[ns]（那是……什麼台詞？）"
10049040-191 = "Thermite White？"
10049040-192 = "好像怪怪的耶！"
10049040-193 = "我們的Thermite White才不是這樣的！"
10049040-195 = "原，原來如此！White是想使用「[ruby=糖分魔力]Sugar Magical Power[/ruby]」對吧！"
10049040-196 = "Pink也會做好準備的！"
10049040-197 = "我們一起來練習必殺技吧？"
10049040-198 = "大家──！請把力量借給我們哦！"
10049040-200 = "好──！！"
10049040-201 = "我準備好了！"
10049040-203 = "[ns7]「澪紗用即興表演救回來了！」\n[ns8]「澪紗好厲害！」"
10049040-207 = "（必殺技的台詞……並沒有糊掉……）"
10049040-212 = "（不行……我說不出口……）"
10049040-213 = "（我不像澪紗同學那麼會隨機應變，我……）"
10049040-218 = "為……為了大家的和平……就算沒有人……"
10049040-219 = "沒有人，會，會認可我……"
10049040-223 = "你到底為什麼偏要做自衛隊這種事啊？又沒有人會認同你？"
10049040-224 = "我，原來是這樣的人嗎……？"
10049040-228 = "果然。"
10049040-229 = "我……"
10049040-233 = "我……做不到……"
10049040-239 = "[ns]「鈴美……！」"
10049040-241 = "……"

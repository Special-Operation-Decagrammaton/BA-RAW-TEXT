[translation]
10049040-1 = "ตอนที่ 4;ทั้งสองคนคือสาวน้อยเวทมนตร์!"
10049040-2 = "ห้องพักนักแสดง"
10049040-3 = "ว้าวว!! ที่นี่สินะ ห้องพักนักแสดง!!"
10049040-4 = "รู้สึกเหมือนได้เป็นนักแสดงจากเรื่องสาวน้อยเวทมนตร์จริงๆ เลยค่ะ!"
10049040-5 = "ชู่ว ชู่ว! เงียบๆ ไว้สิคะ คุณเรอิสะ!"
10049040-7 = "ฮืม..."
10049040-8 = "พวกคุณทั้ง 2 คนมาทำการแสดงใช่มั้ยครับ?"
10049040-9 = "แต่เหมือนจะไม่อยู่ในลิสต์นักแสดงนะ... ผมลืมลิสต์รายชื่อนักแสดงไว้ที่ห้องทำงานน่ะครับ ขอผม..."
10049040-10 = "!!"
10049040-15 = "(ถ้าทางนี้รู้ว่าเราเป็นคนนอก...)"
10049040-16 = "(ปฏิบัติการแฝงตัวของเราก็จะถูกเปิดเผยไปด้วย... ถ้าเป็นอย่างนั้น เป้าหมายก็จะรู้ตัว)"
10049040-17 = "(ทำยังไงดีล่ะ... ทำยังไงดี...?)"
10049040-18 = "(ต้องคิดทำบางอย่างแล้ว...)"
10049040-22 = "จากตลับกระสุนสู่ลำกล้องปืน มาตราที่ 6 ของกฎหมายเวทมนตร์! พลังที่ไม่หวั่นไหว!"
10049040-28 = "โบลต์ ฟอร์เวิร์ด เทอร์ไมต์ พิงค์ ปรากฏตัว!"
10049040-29 = "โอเค! พวกฉันพร้อมแล้วค่ะ!"
10049040-30 = "คุณเรอิสะ?!"
10049040-31 = "ไปค่ะๆ! คุณสึซึมิแค่ไปโพสท่าให้เป็นธรรมชาติก็พอค่ะ!"
10049040-32 = "อะ... อึก..."
10049040-38 = "เมจิคัล ลีริคัล... เทอร์ไมต์ ไวต์!"
10049040-42 = "ยะ... อย่างนี้สินะครับ การแสดงจะเริ่มในอีก 10 นาที ไว้ค่อยออกมาตอนนั้นก็ได้ครับ"
10049040-46 = "เฮือกกกก...."
10049040-47 = "ฮู่ว เราผ่านวิกฤตไปได้แล้วค่ะ!"
10049040-48 = "คุณเรอิสะ! ถึงคุณจะรับมือกับสถานการณ์ได้ดี แต่จากนี้เราจะทำยังไงกันต่อคะ?"
10049040-49 = "ดันมาเจอเรื่องบังเอิญอะไรแบบนี้จนได้ นี่พวกเราต้องไปทำการแสดงแทนแล้วนะคะ?!"
10049040-50 = "[s1] \"แต่ครูว่าเป็นโอกาสดีในการหาเป้าหมายเลยนะ\"\n[s2] \"แต่ตอนอยู่บนเวที น่าจะมองหาเป้าหมายง่ายเลยนะ\""
10049040-53 = "งะ... งั้นเหรอคะ..."
10049040-54 = "แต่ถึงยังไง ฉันก็... เคยดูสาวน้อยเวทมนตร์แค่ตอนเด็กๆ เท่านั้น..."
10049040-55 = "และที่สำคัญ การต้องไปยืนต่อหน้าผู้คนเยอะๆ... แค่คิดฉันก็กลัวแล้วค่ะ..."
10049040-56 = "คุณสึซึมิเท่จะตายค่ะ! ไม่ต้องกังวลนะคะ!"
10049040-57 = "คุณสึซึมิทำงานของกลุ่มรักษาความสงบต่อหน้าคนอื่นได้ดีเลยไม่ใช่เหรอคะ?"
10049040-58 = "แต่นั่นมันคนละเรื่องกันนี่คะ!"
10049040-59 = "ทำยังไงดีล่ะ... ทำยังไงดี..."
10049040-61 = "[ns3] \"แค่ขึ้นไปพูดถ่วงเวลาสักเดี๋ยวก็น่าจะพอนะ\"\n[ns4] \"ขึ้นไปพูดบทอะไรก็ได้แล้วถ่วงเวลาไว้เถอะนะ\""
10049040-64 = "แต่ฉันไม่ค่อยรู้บทของสาวน้อยเวทมนตร์เลยค่ะ..."
10049040-65 = "อ๊ะ! ถ้าเป็นบทพูดของสาวน้อยเวทมนตร์ละก็!"
10049040-66 = "วางใจฉันได้เลยค่ะ!"
10049040-73 = "คุณเรอิสะ? นั่นมัน... ปากกาเหรอคะ?"
10049040-74 = "ไม่ใช่ปากกาธรรมดาๆ นะคะ"
10049040-75 = "นี่คือปากกา 'เมจิคัล ชีตติ้ง' ค่ะ!"
10049040-76 = "ฉันจะใช้ปากกานี้!"
10049040-77 = "เขียนบทพูดไว้บนฝ่ามือของคุณสึซึมิให้ค่ะ!"
10049040-82 = "เดี๋ยวก่อนค่ะ! ถ้าจู่ๆ จะทำแบบนั้นละก็ อ๊ะ!!"
10049040-87 = "จะ... จะจะจะ... จั๊กจี้นะคะ! คะ... คิกคิก... อะฮะฮะฮ่า!!"
10049040-89 = "[ns] (สึซึมิก็หัวเราะแบบนี้เป็นเหมือนกันสินะ)"
10049040-95 = "แค่นี้ก็พร้อมแล้วค่ะ!"
10049040-96 = "แฮ่ก... แฮ่ก..."
10049040-97 = "ฉันบ้าจี้นะคะ..."
10049040-98 = "โดยเฉพาะที่ฝ่ามือ ฉันบ้าจี้ตรงนี้ที่สุดเลย...!!"
10049040-99 = "แค่อ่านบทที่เขียนไว้บนมือก็พอแล้วค่ะ!"
10049040-100 = "จะรอดมั้ยเนี่ย..."
10049040-105 = "เอาละ การแสดงจะเริ่มแล้วครับ! รีบออกไปเถอะครับ!"
10049040-107 = "ค่ะ!!"
10049040-108 = "ฉะ... ฉันยังไม่ทันได้อ่านเลยค่ะ ดะ... เดี๋ยวก่อนสิคะ...!"
10049040-109 = "ไม่ต้องมีคุณชิมิโกะที่เป็นตัวร้ายก็ได้เหรอคะ?!"
10049040-110 = "ดูจากตารางการแสดงแล้ว พวกเราแค่ขึ้นไปแนะนำตัวบนเวทีก็พอค่ะ!"
10049040-112 = "[ns5] \"สู้เขานะ!\"\n[ns6] \"เทอร์ไมต์ ไวต์ พยายามเข้าล่ะ!\""
10049040-115 = "ฮะ... ฮือออ!!"
10049040-121 = "เทอร์ไมต์ ไวต์นี่นา!!"
10049040-122 = "เทอร์ไมต์ พิงค์ด้วย!"
10049040-123 = "พี่ไวต์ สวยจัง!! เหมือนเจ้าหญิงเลย!!"
10049040-125 = "(เมื่อกี้ผู้ชมไม่ได้เยอะขนาดนี้นี่นา?!)"
10049040-126 = "(เสียงเชียร์จากผู้คน... ใบหน้าที่เต็มไปด้วยความคาดหวัง...)"
10049040-127 = "(ตะ... ตื่นเต้นจัง ตื่นเต้นไปหมดแล้ว)"
10049040-128 = "(ฉันทำไม่ได้ ฉันไม่คู่ควรกับการถูกคาดหวังหรอก...)"
10049040-129 = "โบลต์ ฟอร์เวิร์ด! เทอร์ไมต์ พิงค์ ปรากฏตัว!"
10049040-130 = "ว้าววววว!!"
10049040-131 = "คุณเรอิสะ?!"
10049040-132 = "คุณสึซึมิ! ถึงตาของตัวเอกแล้วค่ะ!"
10049040-133 = "แสดงความเท่ของคุณสึซึมิให้ทุกคนได้เห็นเลยค่ะ!"
10049040-134 = "(ทำไมคุณเรอิสะถึงกล้าหาญได้ขนาดนั้นนะ...!)"
10049040-135 = "ฮู่ว..."
10049040-139 = "โบลต์ แคตช์! เทอร์ไมต์ ไวต์ ปรากฏตัว!"
10049040-140 = "ว้าววววววววว!!!"
10049040-142 = "เทอร์ไมต์ ไวต์!! เทอร์ไมต์ ไวต์!!"
10049040-143 = "ว้าววววว!!"
10049040-147 = "[ns] \"สุดยอดไปเลย!! เทอร์ไมต์ ไวต์จัง!!!\""
10049040-149 = "อะฮะฮะฮ่า! เสียงคุณครูดังมาถึงบนนี้เลยค่ะ!!"
10049040-150 = "คุณครู...!"
10049040-151 = "อะแฮ่ม...! เกิดเรื่องใหญ่แล้วค่ะ ไวต์! ได้ยินว่าเอร่ากับพวกสมุนมาที่สวนสนุกนี้ค่ะ!"
10049040-152 = "อ๊ะ... อ่า จริงเหรอคะ พิงค์?"
10049040-153 = "ค่ะ! น่าจะมาแย่งพลังแห่งมิตรภาพไปนะคะ!"
10049040-168 = "(เหมือนจะผ่านไปได้ด้วยดีเลยนะ)"
10049040-169 = "(พออยู่บนเวทีนี้ก็มองสวนสนุกได้เต็มตา แบบนี้ถือว่าเราได้เปรียบเรื่องการสังเกตการณ์... เท่านี้ก็น่าจะ...)"
10049040-170 = "(เอ๋? เหงื่อออก...)"
10049040-175 = "(อ๊าย?! เผลอเช็ดเหงื่อที่ฝ่ามือจนบทที่เขียนไว้...!)"
10049040-176 = "(หายไปหมดเลยเหรอ?!)"
10049040-177 = "เทอร์ไมต์ ไวต์! จะทำยังไงคะ?"

11150-141 = "!!! นะ.. นี่มัน...!!"
11150-143 = "อ่า จริงสิ... ฉันลืมหยิบกระเป๋าเงินสดมาด้วยค่ะ..."
11150-144 = "ว่าไงนะ?!!"
11150-145 = "แหะๆ~ ช่างเถอะ ไหนๆ เราก็จะทิ้งอยู่แล้วนี่ ไม่ต้องใส่ใจหรอก"
11150-146 = "ใช่ คนที่ต้องการคงหยิบไปเองแหละ"
11150-147 = "นั่นสิคะ☆ อยากให้คนลำบากๆ ที่ไม่มีเงินหยิบไปใช้จังเลยค่ะ"
11150-148 = "แฮะๆๆ... คิดว่าเราทำเรื่องดีๆ ไปแล้วกันค่ะ คิดซะว่าคนที่ไม่มีเงินซื้อข้าวประทังชีวิตจะมาเอาเงินนั้นไป#nซื้อข้าวกินจนอิ่ม..."
11150-149 = "ตะ... แต่มันน่าเสียดายนะ! ยิ่งคิดก็ยิ่งโมโห!! คนพวกนี้น่าหงุดหงิดชะมัด!"
11150-151 = "เอ๋.....?!!!"
11150-152 = "หาาาาาา?!!"
11150-153 = "นี่มัน..."
11150-156 = "...?"
11150-157 = "ทีนี้เราก็ไม่ต้องอดข้าวแล้วสินะคะ?"
11150-159 = "(สำนักงานหน่วยรับจ้างสารพัด)"
11150-160 = "ว่ายังไงนะะ...?!?!"
11150-161 = "กองกำลังหน้ากากมิสึกิคือพวกเด็กอะบิดอสงั้นเหรอ?!!"
11150-162 = "อะฮ่าฮ่าฮ่า อารุจังทำหน้าเหมือนตอนรู้ว่าซานตาคลอสไม่มีอยู่จริงเลย ตลกจัง"
11150-163 = "เฮ้อ..."

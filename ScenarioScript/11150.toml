[translation]
11150-2 = "ตอนที่ 15;ไปกันเลย มุ่งไปหาพระอาทิตย์ตก!"
11150-3 = "ในเมือง"
11150-8 = "เฮ้อ อึดอัดชะมัด ถอดออกได้แล้วใช่มั้ย?"
11150-9 = "เราจะมานิ่งนอนใจไม่ได้นะ ต้องรีบหนีแล้ว! พวกนั้นต้องส่งคนออกมาตามหาแน่"
11150-10 = "เราต้องรีบออกจากที่นี่ให้เร็วที่สุดค่ะ... อีกเดี๋ยวก็คงปิดถนนหมดแล้ว..."
11150-11 = "ไม่ต้องห่วงหรอกค่ะ ฉันเตรียมเอาไว้หมดแล้ว☆"
11150-12 = "ทางนี้! รีบไปกันเถอะ!"
11150-13 = "รุ่นพี่ชิโรโกะ... ทำไมไม่ถอดหน้ากากล่ะ? ไม่อึดอัดเหรอ?"
11150-14 = "เจออาชีพที่ใช่ ก็เลยไม่อยากถอดออกล่ะสิ?"
11150-15 = "โชคดีแค่ไหนแล้วที่รุ่นพี่ชิโรโกะมาที่อะบิดอส... ถ้าไปอยู่โรงเรียนอื่นคงได้เป็นอาชญากรไปแล้ว"
11150-18 = "(เหลือบมอบ) อืม..."
11150-20 = ".....!?"
11150-23 = "......"
11150-25 = "เคลียร์พื้นที่แล้วค่ะ จากนี้ก็ปลอดภัยแล้ว"
11150-26 = "เยี่ยม! เราทำสำเร็จ!"
11150-27 = "ไม่อยากเชื่อเลยว่าเราจะปล้นธนาคารอาชญากรรมในตลาดมืดมาได้... เฮ้อ..."
11150-28 = "ชิโรโกะจัง ยังเก็บบันทึกการเดินรถไว้ใช่มั้ย?"
11150-29 = "อะ... อื้ม อยู่ในกระเป๋า"
11150-31 = "(กริ๊ก)"
11150-32 = "เอ๋...? อะไรเนี่ย?! ทำไมในกระเป๋ามีแต่เงินล่ะ?!!"
11150-33 = "หาาาา?!! รุ่นพี่ชิโรโกะไปเอาเงินสดมาแทนงั้นเหรอ?!"
11150-34 = "ปะ... เปล่านะ... ฉันเอาเอกสารที่เราต้องการมาแล้ว ส่วนเงินนี่... จู่ๆ พนักงานของธนาคาร#nก็เอาใส่กระเป๋ามาให้..."
11150-35 = "ไหนดูซิ... โห... น่าจะถึงร้อยล้านเยนเลยนะ เราปล้นเงินร้อยล้านเยนมาได้ใน 5 นาที!"
11150-36 = "เยี่ยมเลย!! ว่าแต่ทำไมทำหน้าเหม่อลอยแบบนั้นล่ะ? เก็บเงินนี่ไปเถอะน่า!"
11150-37 = "......"
11150-39 = "ดะ.. เดี๋ยวก่อนค่ะ! จะใช้เงินนี้เหรอคะ?!"
11150-40 = "ทำไมเหรออายาเนะจัง? เราต้องจ่ายหนี้นะ!"
11150-41 = "ถ้าทำอย่างนั้น... มันก็เป็นอาชญากรรมจริงๆ สิคะเซริกะจัง!!"
11150-42 = "อาชญากรรมอะไรกันล่ะ!? เงินพวกนี้คือหยาดเหงื่อ แรงกาย แรงใจของพวกเรานะ! แต่ธนาคารนั่นกลับเอาไปใช้ก่ออาชญากรรมไม่ใช่รึไง!"
11150-43 = "อีกอย่างถ้าไม่เอาออกมา เดี๋ยวพวกอาชญากรก็คงเอาเงินพวกนี้ไปเปลี่ยนเป็นอาวุธและกระสุนกันหมด!#nปล้นเงินจากอาชญากรมันผิดตรงไหนล่ะ!"
11150-44 = "......"
11150-45 = "ฉันเห็นด้วยกับเซริกะจังค่ะ เราเอาเงินทุนของอาชญากรไปใช้ในทางที่ดีกันดีกว่า"
11150-46 = "เห็นไหม? ถ้ามีเงินนี่ หนี้ของโรงเรียนอะบิดอสก็จะลดลงนะ!"
11150-47 = "อืม... มันก็จริงอยู่หรอก... แล้วชิโรโกะจังล่ะคิดยังไง?"
11150-48 = "ไม่เห็นต้องถามฉันเลย... ยังไงรุ่นพี่โฮชิโนะก็คงไม่เห็นด้วยอยู่แล้วไม่ใช่รึไง?"
11150-49 = "หืม?!"
11150-50 = "ชิโรโกะจังนี่ รู้ใจฉันจริงๆ"
11150-51 = "สิ่งที่พวกเราต้องการมีแค่บันทึกการเดินรถเท่านั้น ไม่ได้จะเอาเงิน"
11150-52 = "ครั้งนี้ถึงจะบอกว่าไม่เป็นไร เพราะเป็นเงินของคนร้ายอีกที... แต่ถ้ามีครั้งหน้า... หรือครั้งต่อๆ ไปล่ะ?"
11150-53 = "......"
11150-54 = "ถ้าเราเริ่มคุ้นเคยกับวิธีนี้แล้วละก็... ต่อไปก็คงไม่คิดอะไรมากแบบนี้หรอก"
11150-55 = "......"
11150-56 = "และถ้าสักวันหนึ่งเกิดเรื่องฉุกเฉินกับเรา... ตอนนั้นเราก็คงหาข้ออ้างมาทำเรื่องที่ไม่สมควรทำขึ้นมา"
11150-57 = "แหะๆ~ ลุงคนนี้ไม่อยากให้รุ่นน้องที่น่ารักทำตัวแบบนั้นหรอกนะ"
11150-58 = "ถ้าเป็นแบบนั้นขึ้นมา การต่อสู้เพื่อรักษาโรงเรียนที่ผ่านมามันก็คงไม่มีความหมาย"
11150-59 = "......"
11150-60 = "ถ้าเราจะใช้ลูกไม้แบบนี้ตั้งแต่แรก เราก็คงขอให้โนโนมิจังเอาบัตรโกลเด้นการ์ดรูดจ่ายหนี้ไปหมดแล้วละ"
11150-61 = "...... จริงๆ ฉันก็เคยเสนอแบบนั้นแล้ว แต่รุ่นพี่โฮชิโนะก็ปฏิเสธ..."
11150-62 = "ฉันเข้าใจค่ะ ถ้าเราหาเงินมาอย่างไม่สุจริต และต่อให้จ่ายหนี้ของโรงเรียนได้ทั้งหมด ก็คงไม่ใช่โรงเรียน#nอะบิดอสที่เราภาคภูมิใจ"
11150-63 = "อื้ม ใช่แล้วละ"
11150-64 = "เพราะฉะนั้น เราจะทิ้งกระเป๋าไว้ที่นี่ เอาแต่เอกสารที่เราต้องการไปก็พอ"
11150-67 = "โธ่เอ้ย!! น่าอึดอัดชะมัด! เป็นอะไรกันไปหมดเนี่ย!? จะทิ้งเงินไว้อย่างนี้เหรอ?! ทำไมถึงดื้อรั้นกันแบบนี้ฮะ!!"
11150-68 = "อืม... แต่ถ้ามันเป็นคำสั่งของหัวหน้าละก็..."
11150-69 = "ฉันเองก็ไม่รู้สถานการณ์ของอะบิดอสหรอกนะคะ... แต่ถ้าเอาเงินนี้ไป เราอาจเข้าไปพัวพันกับเรื่องวุ่นวายอื่นก็ได้ค่ะ"
11150-70 = "จะมองว่าเป็นเมล็ดพันธุ์แห่งหายนะก็ได้..."
11150-71 = "ฮื้ม... งั้นก็คงไม่มีทางเลือกอื่น ฉันจะเอากระเป๋านี้ไปทิ้งให้ดีเองค่ะ"
11150-72 = "ฝากด้วยนะ"
11150-73 = "......!! เดี๋ยวค่ะทุกคน! มีใครกำลังมาทางนี้!"
11150-74 = "......! ผู้คุมตลาดเหรอ?!"
11150-75 = "อืม... ไม่ใช่ค่ะ ไม่น่าจะใช่ศัตรูนะคะ"
11150-77 = "ไหนขอดูหน่อยซิ..."
11150-78 = "อารุ... จากหน่วยรับจ้างสารพัด?!"
11150-81 = "แฮ่ก... แฮ่ก... รอด้วย!!"
11150-82 = "...!!!"
11150-84 = "ใจเย็นๆ ก่อน ฉันไม่ได้มาร้าย..."
11150-85 = "(อะไรของเขาเนี่ย...)"
11150-86 = "(โจมตีเลยไหม?)"
11150-87 = "(เอาไงดีนะ แต่โจมตีเลยก็จะดูยังไงๆ อยู่...)"
11150-88 = "(คนรู้จักเหรอคะ?)"
11150-89 = "(แหะๆ~ รู้จักดีเลยละ)"
11150-90 = "นะ... นี่... คือว่า..."
11150-91 = "ฉันเห็นการปล้นธนาคารของพวกเธอมา ทำยังไงถึงปล้นธนาคารของตลาดมืดได้ใน 5 นาที แล้วหนีออกมา#nได้อย่างสบายๆ แบบนั้นน่ะ... นี่มันสกิลของคนนอกกฎหมายที่หาไม่ได้ในเมืองนี้เลยนะ"
11150-92 = "...?!"
11150-93 = "พูดตามตรง มันน่าประทับใจมากที่เมืองนี้มีคนใจกล้าบ้าบิ่นแบบนี้... ภาพในธนาคารยังตราตรึงใจฉันอยู่เลย"
11150-94 = "ฉันก็จะเอาด้วย! ผู้ที่มีจิตวิญญานอิสระอย่างแท้จริงที่ไม่ผูกมัดกับกฎหมายและระเบียบวินัย! ฉันก็จะเป็น#nคนนอกกฎหมายแบบนั้นบ้าง!"
11150-95 = "(พูดอะไรของเขาน่ะ...)"
11150-96 = "เพราะงั้น... อย่างน้อยก็บอกชื่อของพวกเธอมาหน่อยสิ!!"
11150-97 = "ชื่อเหรอ...?!"
11150-98 = "ชื่อกลุ่ม ชื่อฝ่าย ชื่อชมรม ชื่ออะไรแบบนี้ไงล่ะ ก็ฉันอยากจดจำพวกเธอไว้ในส่วนลึกในใจน่ะสิ ถึงจะไม่รู้#nชื่อจริงก็เถอะ!"
11150-99 = "(แหะๆ... ดูเหมือนจะกำลังเข้าใจอะไรผิดอยู่แน่ๆ...)"
11150-100 = "ได้ค่ะ! ฉันเข้าใจแล้ว!"
11150-101 = "(ระ... รุ่นพี่โนโนมิ?!)"
11150-102 = "พวกเราก็คือ... กองกำลังหน้ากากมิสึกิ!"
11150-103 = "กองกำลังหน้ากากมิสึกิ...?!"
11150-104 = "ตั้งชื่อได้สุดยอดมากๆ...!!! สุดเท่!! สุดเจ๋ง!!"
11150-105 = "(....)"
11150-106 = "แหะๆ~ จริงๆ ชุดเต็มยศของเราคือชุดว่ายน้ำของโรงเรียนกับหน้ากาก แต่ตอนนี้เรารีบก็เลยใส่ได้แค่หน้า#nกากน่ะ"
11150-107 = "(จะไปบอกอะไรแปลกๆ แบบนั้นทำไมน่ะ!?)"
11150-108 = "ใช่ค่ะ ตอนกลางวันเราจะเป็นไอดอล แต่พอตกกลางคืนเราจะเปลี่ยนเป็นจอมโจรแห่งความยุติธรรม#nที่คอยปราบเหล่าวายร้ายค่ะ!"
11150-109 = "และฉันก็คือน้องคริสติน่าเองค่ะ~♧"
11150-110 = "วะ.. ว้าว...?! นี่วางคอนเซ็ปต์กันด้วยเหรอ?!"
11150-111 = "ตาต่อตา ฟันต่อฟัน โดดเดี่ยวบนเส้นทางแห่งความโหดร้ายโดยปราศจากความเห็นอกเห็นใจ#nนี่แหละคือคติของกลุ่มเรา!!"
11150-112 = "มะ... มายก้อด!!"
11150-114 = "พวกนั้นทำอะไรกันอยู่น่ะ?"
11150-115 = "ว้าว อารุจังดูมุ่งมั่นมากเลย ทำหน้าเหมือนดูหนังซูเปอร์ฮีโร่เลยละ!"
11150-118 = "(แค่นี้คงพอแล้วมั้ง? เนียนๆ หนีไปกันเถอะ!)"
11150-119 = "งั้นไปก่อนนะคะ อาดิโอส~☆"
11150-120 = "ไปกันเลย! มุ่งไปหาพระอาทิตย์ตกกัน!"
11150-121 = "ค่ะ... ถึงพระอาทิตย์จะยังไม่ตกดินก็เถอะ..."
11150-122 = "(ฟิ้วววว)"
11150-123 = "......"
11150-124 = "โดดเดี่ยวบนเส้นทางแห่งความโหดร้าย... ฉันจะไม่ลืมคตินี้เลย!"
11150-127 = "......"
11150-128 = "......"
11150-129 = "(เราควรบอกอารุนะ แต่จะบอกตอนไหนดี...)"
11150-130 = "(แบบนี้ก็สนุกดีนะ รอดูต่อไปกันเถอะ)"
11150-133 = "เอ่อ.. คือว่า..."
11150-134 = "เอายังไงกับกระเป๋านี้ดีคะ? คนพวกนั้นน่าจะทิ้งไว้นะ..."
11150-135 = "หืม? อย่าบอกนะว่า... นี่คือของขวัญที่กองกำลังหน้ากากมิสึกิทิ้งไว้ให้ฉันน่ะ...?"
11150-136 = "เปล่า... ไม่น่าใช่แบบนั้นนะ... ไม่ได้ลืมทิ้งไว้เหรอ?"
11150-137 = "หนักอยู่นะเนี่ย? ลองเปิดดูเถอะว่ามีอะไรอยู่ข้างใน"
11150-138 = "(พรึ่บ)"
11150-139 = "......!!"

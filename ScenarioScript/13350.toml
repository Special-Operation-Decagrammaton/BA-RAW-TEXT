[translation]
13350-1 = "ตอนที่ 35;เทอเรอร์ vs เทอเรอร์"
13350-4 = "..."
13350-5 = "ความรู้สึกนี้มัน...?"
13350-6 = "มันเรื่องอะไรกัน...?"
13350-7 = "หรือว่า... รุ่นพี่โฮชิโนะ...?"
13350-15 = "สีสันด้วยเหรอ...!? "
13350-16 = "มันตาม... ฉันมา...?"
13350-17 = "สุดท้ายแล้วที่ทุกอย่างเป็นแบบนี้... ก็เพราะฉันงั้นเหรอ...?"
13350-24 = "ไม่ใช่หรอกค่ะ สึนาโอกามิ ชิโรโกะ สีสันไม่ได้ตามคุณมาหรอกค่ะ"
13350-25 = "A.R.O.N.A....?! ทำไมเธอถึง?!"
13350-26 = "ฉันใช้พลังของ <สีสัน> ที่ปรากฏให้เห็นตอนนี้เพื่อมาส่งข้อความค่ะ นี่คือสถานการณ์เร่งด่วน เราไม่มีเวลาแล้วค่ะ"
13350-27 = "A.R.O.N.A. ไม่สิ... ตอนนี้ฉันต้องเรียกอีกชื่อหนึ่ง"
13350-28 = "พลาน่า... ตอนนี้สถานการณ์เป็นยังไงบ้าง?"
13350-29 = "ขอบคุณ ฉันตอบได้บางส่วน สีสันที่เห็นอยู่นี้คือสิ่งที่สึนาโอกามิ ชิโรโกะเรียกมาค่ะ"
13350-30 = "ไม่ใช่สิ่งที่ตามฉันมา แต่เป็นสิ่งที่สึนาโอกามิ ชิโรโกะเรียกมา..."
13350-35 = "คนโง่นั่นน่ะเหรอ..."
13350-36 = "ถูกต้อง ตอนนี้สึนาโอกามิ ชิโรโกะที่อยู่ในช่วงเวลาอื่นกำลังเป็นอันตรายค่ะ"
13350-37 = "เพราะรุ่นพี่โฮชิโนะ..."
13350-38 = "อืม... เข้าใจแล้ว"
13350-42 = "[ns] \"ชิโรโกะ!! ช่วยขวางชิโรโกะไว้ที!!!\""
13350-44 = "แน่นอน"
13350-50 = "!!"
13350-53 = "คะ... คุณคือ...!!"
13350-54 = "ชะ... ชิโรโกะจัง... จากโลกอื่นเหรอ...?"
13350-55 = "ว้าว! มาช่วยกันสินะ!! "
13350-59 = "คุณชิโรโกะ! สำเร็จแล้วค่ะ!! ด้วยพลังจากสีสันที่ปรากฏตัวขึ้นเมื่อกี้..."
13350-60 = "ตอนนี้สีสันหายไปแล้วค่ะ ทำวงจรก้าวกระโดดซ้ำไม่ได้ค่ะ"
13350-61 = "แต่ว่านี่จะทำให้..."

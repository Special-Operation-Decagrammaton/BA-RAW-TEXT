[translation]
13350-1 = "第35話;TERROR vs TERROR"
13350-4 = "……"
13350-5 = "這種感覺是……？"
13350-6 = "發生什麼事了……？"
13350-7 = "……難道是星野前輩？"
13350-15 = "連色彩也……！？"
13350-16 = "這……該不會是……？"
13350-17 = "是追著我來到這裡的嗎……#n難道一切……又要因為我而……？"
13350-24 = "不，砂狼白子。#n色彩並不是追著你過來的。"
13350-25 = "A.R.O.N.A……！？你是怎麼……！？"
13350-26 = "我現在是利用顯現的「色彩」的力量，向你傳送訊息。#n事態緊急，沒時間了。"
13350-27 = "A.R.O.N.A……#n不，現在該叫你的名字才對。"
13350-28 = "星奈……情況如何？"
13350-29 = "謝謝。至於剛才的問題，你只說對了一半。#n這個色彩，是現在的砂狼白子召喚出來的。"
13350-30 = "雖然不是追著我來到這裡，但它的確是砂狼白子召喚出來的……"
13350-35 = "那個笨蛋……"
13350-36 = "同意。砂狼白子──不同時間軸的同一存在正面臨危險。"
13350-37 = "是因為星野前輩……"
13350-38 = "……嗯，我明白了。"
13350-42 = "[ns]「白子！！快阻止白子────！！！」"
13350-44 = "那當然。"
13350-50 = "！！"
13350-53 = "你，你是……！！"
13350-54 = "是其他時間軸的白子……嗎？"
13350-55 = "哇！你來幫我們了嗎！！"
13350-59 = "白子同學！成功了！！#n只要利用剛才顯現的色彩的力量……"
13350-60 = "色彩已經消滅了，無法再次使用強制轉移程序。"
13350-61 = "但是這樣一來……"

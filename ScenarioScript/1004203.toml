[translation]
1004203-1 = "กลางดึกคืนหนึ่งที่โรงเรียน"
1004203-2 = "ดาดฟ้าอาคารส่วนกลางเก่า"
1004203-3 = "อรุณสวัสดิ์ คุณครู..."
1004203-4 = "[s1] \"อรุณสวัสดิ์\"\n[s2] \"อรุณสวัสดิ์ ถึงจะมืดแล้วก็เถอะ\""
1004203-5 = "อื้อ การทักทายเป็นเรื่องสำคัญนะ"
1004203-6 = "อื้อ ก็การทักทายเป็นเรื่องสำคัญนี่นา"
1004203-7 = "[s] \"ว่าแต่ว่าที่นี่คือที่ไหนเหรอ...?\""
1004203-8 = "อื้อ ที่นี่คือดาดฟ้าของโรงเรียนใกล้ๆ นี้น่ะ ฉันใช้บันไดฉุกเฉินปีนขึ้นมา"
1004203-9 = "[s] \"เดี๋ยวสิ แล้วเรามาทำอะไรบนนี้กันเหรอ?\""
1004203-10 = "ประตูด้านนี้เปิดอยู่ เราคงใช้ประตูนี้เข้าไปด้านในตัวอาคารได้"
1004203-11 = "เอาละ ไปกันเถอะ"
1004203-15 = "[ns3] \"เดี๋ยวสิ รอก่อน... รอครูด้วย อาสึโกะ\"\n[ns4] \"จะแอบเข้าไปเรอะ...?!\""
1004203-16 = "ว้าว แปลกจังเลย คุณครู... รีบเข้ามาข้างในสิ"
1004203-17 = "ว้าว แปลกจังเลย คุณครู... รีบเข้ามาข้างในสิ"
1004203-18 = "[ns] ตามอาสึโกะไป"
1004203-23 = "แปลกจังเลย... ไม่เหมือนกับที่ฉันจินตนาการไว้เลยนะ"
1004203-24 = "อ๊ะ ตรงนั้นคือห้องเรียนใช่มั้ย?"
1004203-28 = "[ns5] \"ระ... รอด้วย!\"\n[ns6] วิ่งตามไป"
1004203-31 = "..."
1004203-32 = "ห้องเรียนเป็นแบบนี้เองสินะ"
1004203-33 = "[s] \"อาสึโกะ จะแอบเข้ามาในโรงเรียนอื่นแบบนี้ไม่ได้นะ\""
1004203-34 = "หืม? ทำไมล่ะ?"
1004203-35 = "ไม่ได้จะไปก่อปัญหาอะไรสักหน่อย"
1004203-36 = "อื้อ ฉันเข้าใจแล้วละ ถ้าโดนเจอตัวเข้าคงจะเกิดเรื่องวุ่นวายตามมาสินะ..."
1004203-37 = "ขออยู่ต่ออีกแป๊บหนึ่งแล้วจะรีบไปก็แล้วกัน"
1004203-38 = "[s7] \"เฮ้อ... ช่วยไม่ได้นะ แป๊บหนึ่งก็ได้\"\n[s8] \"อยู่ต่ออีกแป๊บหนึ่ง แล้วต้องออกไปกันนะ\""
1004203-39 = "ค่ะ-!"
1004203-40 = "ค่ะ-!"
1004203-47 = "(อาสึโกะนั่งลงที่โต๊ะเรียนแถวหน้าสุด)"
1004203-48 = "คุณครูคะ ฉันมีคำถาม..."
1004203-49 = "[s] \"หืม... คำถามเหรอ?\""
1004203-50 = "มีคำถามเกี่ยวกับบทเรียนน่ะค่ะ"
1004203-51 = "[s9] (อ๋อ... เล่นเรียนหนังสือสินะ)\n[s10] \"อื้อ นักเรียนอาสึโกะ สงสัยตรงไหนเหรอ?\""
1004203-52 = "เด็กทารกเกิดมาได้ยังไงเหรอคะ?"
1004203-53 = "เด็กทารกเกิดมาได้ยังไงเหรอคะ?"
1004203-54 = "[s] \"...\""
1004203-55 = "ล้อเล่นน่ะ ไม่ต้องทำหน้าลำบากใจขนาดนั้นก็ได้"
1004203-59 = "ถ้างั้นเราไปที่อื่นกันต่อดีมั้ย?"
1004203-61 = "ที่นี่คงเป็นห้องประชุมสินะ"
1004203-62 = "ที่นั่งเยอะขนาดนี้ มีนักเรียนนั่งอยู่เต็มเลยงั้นเหรอ?"
1004203-63 = "คงจะเสียงดังน่าดูเลยสินะ?"
1004203-65 = "ที่นี่คือห้องอาบน้ำสินะ"
1004203-66 = "ได้อาบน้ำด้วยกันน่ะสนุกมากเลย ฉันเองก็ชอบอาบน้ำกับคนอื่นๆ เหมือนกัน"
1004203-67 = "ตอนอยู่ที่อาเรียส... ฉันชอบตอนที่ได้อาบน้ำพร้อมกับทุกคนมากเลย"
1004203-68 = "อืม งั้นไปดูที่อื่นกันต่อดีมั้ย?"
1004203-70 = "ที่นี่คงเป็นห้องชมรมสินะ"
1004203-71 = "ชมรมวิจัยหิน...?  พวกเขาเก็บสะสมหินงั้นเหรอ...?"
1004203-72 = "อืม... คงมีชมรมต่างๆ ตามความชอบสินะ"
1004203-73 = "[s] \"อาสึโกะมีงานอดิเรกที่ชอบทำรึเปล่า?\""
1004203-74 = "งานอดิเรก...?"
1004203-75 = "อืม ฉันน่ะ..."
1004203-79 = "อ๊ะ ถูกเจอเข้าแล้วสินะ-!"
1004203-80 = "[s] \"หนีกันเถอะ!\""
1004203-84 = "(คุณครูรีบพาอาสึโกะออกมาด้านนอกโรงเรียนทันที)"
1004203-86 = "ฮิฮิ... เกือบเกิดเรื่องใหญ่แล้วสินะ"
1004203-87 = "แต่ว่า... น่าตื่นเต้นแล้วก็สนุกดีนะว่ามั้ย?"
1004203-88 = "[s] \"เฮ้อ...\""
1004203-89 = "ฮุฮุ อื้ม ขอบคุณที่อยู่เป็นเพื่อนฉันนะ คุณครู"
1004203-90 = "ถ้างั้น... วันนี้พอเท่านี้ก่อน เอาไว้เจอกันคราวหน้านะ"

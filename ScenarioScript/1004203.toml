[translation]
1004203-1 = "Late Night at the Academy"
1004203-2 = "Rooftop of the Academy's Main Building"
1004203-3 = "Good morning, Sensei."
1004203-4 = "[s1] \"Good morning.\"\n[s2] \"Good night might be more appropriate.\""
1004203-5 = "Yes. Greetings are important."
1004203-6 = "Yes. Greetings are important."
1004203-7 = "[s] \"So I've heard. Where are we?\""
1004203-8 = "The rooftop of a nearby school."
1004203-9 = "[s] \"Well, yes. But why are we on this rooftop?\""
1004203-10 = "Because this door is open. We can get into the building this way."
1004203-11 = "Please follow closely."
1004203-15 = "[ns3] \"W-Wait, Atsuko!\"\n[ns4] \"A-Are we sneaking in?!\""
1004203-16 = "...How strange. Quickly, Sensei!"
1004203-17 = "...How strange. Quickly, Sensei!"
1004203-18 = "[ns] Follow her."
1004203-23 = "It's not exactly how I pictured it..."
1004203-24 = "Over there. I want to see what a classroom looks like."
1004203-28 = "[ns5] \"W-Wait!\"\n[ns6] Follow her."
1004203-31 = "..."
1004203-32 = "This is what they're like..."
1004203-33 = "[s] \"Atsuko, it's wrong to trespass on school grounds.\""
1004203-34 = "Really?"
1004203-35 = "But...I'm not trying to cause any harm."
1004203-36 = "...I understand. It wouldn't be good for me if someone found out."
1004203-37 = "I'd like to experience it, at least for a short while. Please?"
1004203-38 = "[s7] \"*sigh* ...Just this once.\"\n[s8] \"Just for a little while, okay?\""
1004203-39 = "Thank you, Sensei."
1004203-40 = "Thank you, Sensei."
1004203-47 = "Atsuko sat down at a desk and looked at me expectantly."
1004203-48 = "Sensei, question."
1004203-49 = "[s] \"...You want me to ask you one?\""
1004203-50 = "Since you're the teacher, obviously I have one for you."
1004203-51 = "[s9] \"(Oh... Is this playing school?)\"\n[s10] \"Yes, Atsuko. What is it?\""
1004203-52 = "How are babies made?"
1004203-53 = "How are babies made?"
1004203-54 = "[s] \"...\""
1004203-55 = "Haha. That was a joke. Like being the...class clown, I think it's called."
1004203-59 = "Let's explore more of the school."
1004203-61 = "Wow! The auditorium is so big."
1004203-62 = "Are there really this many students at this school?"
1004203-63 = "I can't imagine how loud it must be when they all congregate here."
1004203-65 = "Is this a...shower room?"
1004203-66 = "They must wash off after their gym classes here. How fun."
1004203-67 = "Getting to shower with others was one of my favorite activities in Arius."
1004203-68 = "Okay, next stop, Sensei."
1004203-70 = "This looks to be a club room of some kind."
1004203-71 = "Ornamental Rock Research Club? They collect rocks? I've never heard of that before."
1004203-72 = "I guess schools would have as many clubs as there are hobbies."
1004203-73 = "[s] \"Do you have any hobbies?"
1004203-74 = "Me?"
1004203-75 = "Well... Hmm... I've never thought about it..."
1004203-79 = "Sensei! There's someone down the hall."
1004203-80 = "[s] \"Quick, let's run!\""
1004203-84 = "I took Atsuko out of the academy in a hurry."
1004203-86 = "...Heehee, that was close."
1004203-87 = "But...wasn't that exhilarating?"
1004203-88 = "[s] Breathe a deep sigh."
1004203-89 = "Heehee. You put up with a lot for me today, Sensei."
1004203-90 = "Well, until next time."

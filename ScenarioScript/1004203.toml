[translation]
1004203-1 = "深夜的學校"
1004203-2 = "某學園．本館的屋頂"
1004203-3 = "早安，老師。"
1004203-4 = "[s1]「早安。」\n[s2]「早安，但今天也已經晚上了……」"
1004203-5 = "因為打招呼很重要。"
1004203-6 = "因為打招呼很重要。"
1004203-7 = "[s]「確實。話說這裡是……」"
1004203-8 = "這是前陣子發現的地方。"
1004203-9 = "[s]「原來如此……？」"
1004203-10 = "這裡的門沒有鎖，能從這裡進入大樓。"
1004203-11 = "好了，我們走吧。"
1004203-15 = "[ns3]「等，等等……等一下，敦子！」\n[ns4]「擅闖進去不太好吧……！」"
1004203-16 = "……好棒喔。老師，快來。"
1004203-17 = "……好棒喔。老師，快來。"
1004203-18 = "[ns] 總之先跟上去"
1004203-23 = "很棒吧。原來其他學校裡面長這樣啊。"
1004203-24 = "那邊是教室吧？"
1004203-28 = "[ns5]「等，等等我！」\n[ns6] 追上去"
1004203-31 = "……"
1004203-32 = "原來是這種感覺啊……"
1004203-33 = "[s]「敦子，不可以擅闖別人的學校。」"
1004203-34 = "……為什麼？"
1004203-35 = "我又不是想惹事。"
1004203-36 = "……不過我明白。#n要是被發現的話很可能會被罵……"
1004203-37 = "再待一下就離開，這樣可以嗎？"
1004203-38 = "[s7]「……嗯，那好吧。」\n[s8]「只能再一下下喔。」"
1004203-39 = "……嗯！"
1004203-40 = "……嗯！"
1004203-47 = "（敦子坐進前面的座位）"
1004203-48 = "老師，我有問題。"
1004203-49 = "[s]「……問題？」"
1004203-50 = "我現在上課上到一半，有不懂的東西。"
1004203-51 = "[s9]（啊……上次說的學校遊戲啊）\n[s10]「請說。敦子同學，有什麼問題？」"
1004203-52 = "要怎麼做才能生小孩？"
1004203-53 = "要怎麼做才能生小孩？"
1004203-54 = "[s]「……」"
1004203-55 = "……開玩笑的。老師，請別那麼傷腦筋。"
1004203-59 = "那我們去其他地方吧。"
1004203-61 = "這裡好像是禮堂。"
1004203-62 = "這些座位全都會被學生坐滿嗎？"
1004203-63 = "一定會很熱鬧吧？"
1004203-65 = "這裡是浴室吧。"
1004203-66 = "大家一起洗澡最開心了。我也喜歡一起洗。"
1004203-67 = "之前在奧利斯的時候……我最喜歡大家一起洗澡的時間。"
1004203-68 = "那我們再去其他地方吧。"
1004203-70 = "這裡是社團教室吧。"
1004203-71 = "奇石研究部……？是收集石頭的社團嗎？#n……呵呵，還有這種社團啊。"
1004203-72 = "也對……有多少興趣，就有多少社團。"
1004203-73 = "[s]「敦子有什麼興趣呢？」"
1004203-74 = "興趣……？"
1004203-75 = "我啊……"
1004203-79 = "啊，被發現了！"
1004203-80 = "[s]「快逃吧！」"
1004203-84 = "（帶著敦子急忙溜出學園）"
1004203-86 = "……呵呵。真是危險。"
1004203-87 = "可是……很刺激好玩對吧？"
1004203-88 = "[s]「唉……」"
1004203-89 = "謝謝老師陪我無理取鬧。"
1004203-90 = "那今天就這樣，下次再見。"

[translation]
10042055-2 = "……我現在腦海裡閃過了數十個詞彙。"
10042055-3 = "但凡說出任何一個都可能宣告出局，所以我忍住了。"
10042055-4 = "我們……該怎麼接受眼前的現實呢……？"
10042055-6 = "……長得還真好啊？"
10042055-7 = "前輩！？"
10042055-8 = "[ns1]「哇……看了頭都暈了……」\n[ns2]「原來它還在成長期啊。」"
10042055-11 = "確實，繼續搜查也沒有意義了呢，瀬奈前輩。"
10042055-12 = "是啊，真是有趣。"
10042055-13 = "這種時候還說那種話！？"
10042055-14 = "至今為止的一切，確實都稱不上是什麼大事。"
10042055-15 = "不過現在……"
10042055-16 = "……總算有點「出大事」的感覺了呢。"

[translation]
10042055-2 = "ฉันคิดคำที่จะพูดได้เป็นสิบๆ คำ แต่จู่ๆ มันก็หายไปจากหัวหมดเลย..."
10042055-3 = "แต่บอกให้รู้เลยนะว่าไม่มีคำดีๆ เลยสักคำ"
10042055-4 = "พวกเรา... จะรับมือกับเจ้านั่นยังไงดีคะ...?"
10042055-6 = "กินอิ่มจนตัวแตกเลยสินะ..."
10042055-7 = "รุ่นพี่?!"
10042055-8 = "[ns1] \"โอ่ย... เห็นแล้วเวียนหัวเลย...\"\n[ns2] \"อยู่ในวัยกำลังโตสินะ\""
10042055-11 = "คงไม่ต้องออกสำรวจอีกต่อไปแล้วสินะคะ รุ่นพี่เซนะ"
10042055-12 = "ค่ะ น่าสนใจจริงๆ เลยค่ะ"
10042055-13 = "นี่มันใช่เวลามาพูดแบบนั้นเหรอ?!"
10042055-14 = "นั่นสินะคะ ที่ผ่านมาฉันเอาแต่บอกว่านี่ยังไม่ถึงกับเป็นเรื่องใหญ่มากนัก"
10042055-15 = "แต่ว่า..."
10042055-16 = "ตอนนี้... นี่เป็น 'เรื่องใหญ่' แล้วละค่ะ"

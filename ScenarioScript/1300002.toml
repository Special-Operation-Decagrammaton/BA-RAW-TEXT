[translation]
1300002-1 = "您就是我的主人嗎？（１）"
1300002-2 = "黑市"
1300002-4 = "（在執行任務時遭到了頭盔團的追趕）"
1300002-5 = "站住！"
1300002-6 = "原來是老師啊。嘿嘿，最近因為那個叫夏萊還是什麼的社團，我們可是吃了不少苦頭阿。"
1300002-7 = "只好請你，陪我們好好玩玩了。"
1300002-8 = "我還聽說，你會請這附近的女學生吃好吃的東西呢……我們也……"
1300002-9 = "不。"
1300002-10 = "你們幾個，沒有那種資格。"
1300002-11 = "是，是誰！？"
1300002-14 = "是在你們面前的老師的……不，"
1300002-16 = "主人的，"
1300002-17 = "女僕！！"
1300002-18 = "……哈？"
1300002-19 = "（咚哐──！）"
1300002-20 = "呃啊啊啊！突，突然出現炸彈……！？"
1300002-21 = "咳咳……"
1300002-24 = "（咚唰）"
1300002-25 = "……"
1300002-27 = "呵呵♪"
1300002-28 = "好久不見了呢，主人。"
1300002-29 = "[s1] 「朱音？」\n[s2] 「神祕的……美女女僕？」"
1300002-30 = "沒錯，就是神祕的美女女僕，朱音。"
1300002-31 = "沒錯，就是神祕的美女女僕，朱音。"
1300002-32 = "我在執行任務……不對，是社團活動的時候碰巧看到主人，於是就跟過來看看了。"
1300002-33 = "能這樣為您服務，我很開心。"
1300002-34 = "……啊，這麼說來……"
1300002-35 = "總感覺，有點懷念。"
1300002-36 = "第一次見到老師時，也是類似的情況呢。"
1300002-38 = "夏萊．辦公室"
1300002-39 = "（就在不久前……）"
1300002-40 = "（有天，天花板突然爆炸了）"
1300002-41 = "（咚哐哐哐哐哐！！）"
1300002-42 = "呀啊啊！"
1300002-43 = "怎，怎麼回事！？"
1300002-47 = "……"
1300002-48 = "您就是，我的主人嗎？"
1300002-49 = "[s3] 「其實是老師才對……？」\n[s4] 「總覺得好像在哪看過這個場景……」"
1300002-50 = "這樣啊。"
1300002-51 = "這樣啊。"
1300002-52 = "似乎是個很幽默的人呢。"
1300002-53 = "初次見面。"
1300002-54 = "我是C&C的朱音。"
1300002-55 = "是為了服務老師……不對，服務主人而來的。"

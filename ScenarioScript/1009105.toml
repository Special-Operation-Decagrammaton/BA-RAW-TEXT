[translation]
1009105-1 = "Yes, I Am Her Manager"
1009105-2 = "On a late afternoon, I waited for Kazusa at a nearby crossing."
1009105-3 = "...Yo! Sensei."
1009105-8 = "[ns1] \"Oh hey, Kazusa.\"\n[ns2] \"You're right on time.\""
1009105-11 = "You haven't been waiting long, have you? I tried my best to get done with practice as fast as I could..."
1009105-12 = "I know you're way too early sometimes."
1009105-13 = "It's not like we're meeting for the first time... You probably know my pattern by now, so you shouldn't wait longer than you need to."
1009105-14 = "[s] \"If I'm waiting for you, Kazusa...\""
1009105-15 = "Hey, hey. Stop. Stop."
1009105-16 = "I knew you were going to say that. I won't say anything back. Not this time."
1009105-17 = "Why don't you just pick out something to eat?"
1009105-18 = "...Hm? You already picked something out?"
1009105-19 = "Oh...? Look at you. Mixing it up, huh?"
1009105-20 = "Can you hand me the list, then? I'll come up with a plan."
1009105-21 = "Closing time is different for every shop around here, so if we start with the ones nearby, we're going to miss some."
1009105-22 = "Basically, leave it to the expert. Heehee."
1009105-27 = "Let's see..."
1009105-28 = "Mmm. Huh... I see..."
1009105-29 = "Huh, not bad. You're a full-fledged After-School Sweets Club member at this point. I'd say you're good to go."
1009105-30 = "[s] \"Well, I had a great teacher.\""
1009105-31 = "Flattery will get you nowhere. Which doesn't mean stop."
1009105-32 = "...Heehee."
1009105-33 = "All right. I don't like to waste time, so..."
1009105-34 = "...let's go!"
1009105-36 = "After that, Kazusa and I toured all the dessert shops around."
1009105-37 = "We zigzagged a lot, but she said it was the \"optimal route\" to get to every place before closing time."
1009105-39 = "By evening, we arrived at the last shop on the list."
1009105-44 = "...Hm. Good. We're not too late."
1009105-45 = "This is it. We've officially done the whole list now."
1009105-46 = "Huh?"
1009105-47 = "I'm amazing? Haha. Sure, I'll take that compliment with pride."
1009105-48 = "I mean, the other members can do some things I'm not so amazing at..."
1009105-49 = "But when it comes to leading Sensei along, I just might be the best."
1009105-50 = "From now on, whenever you're in the mood for this..."
1009105-54 = "...just leave it to everybody's big sis. Got it?"
1009105-55 = "[s3] \"You're very confident today.\"\n[s4] \"Haha. I'll look forward to it.\""
1009105-58 = "Heehee. Sure thing, sounds good."
1009105-59 = "Now, then..."
1009105-61 = "Oh, hello. You're our last customer today."
1009105-66 = "...Huh. Well, well. Our special customer gets the last one in stock."
1009105-67 = "Are you a...singer for a band, by any chance?"
1009105-68 = "Hm?"
1009105-72 = "...Wait, what? Are they talking to me, Sensei?"
1009105-73 = "[s5] \"You do have that look about you.\"\n[s6] \"Well, we're the only ones here.\""
1009105-76 = "Lots of musicians get their starts as students these days."
1009105-77 = "Having a dream when you're young, and working hard for it...it's cool! I always root for them."
1009105-78 = "And who's that next to you?"
1009105-79 = "Ah, right, this is..."
1009105-80 = "...Sens–"
1009105-82 = "...Your manager, right?"
1009105-86 = "*gasp*"
1009105-90 = "[ns7] \"...Huh?\"\n[ns8] \"Right, I do look like one, don't I?\""
1009105-94 = "Ah, uh... It's..."
1009105-95 = "Uh... Um..."
1009105-96 = "Hm?"
1009105-97 = "...? H-Hm?"
1009105-98 = "O-Oh. My apologies... I must have said something wrong."
1009105-99 = "I must've gotten carried away, you being the last customers and all. Must've made a mistake..."
1009105-100 = "..."
1009105-101 = "..."
1009105-102 = "Then this is..."
1009105-103 = "[s9] \"No, it's fine. I'm...\"\n[s10] \"...this student's...\""
1009105-106 = "...manager."
1009105-108 = "[ns11] \"Hm?\"\n[ns12] \"Kazusa?\""
1009105-111 = "Yes. Manager. This is my manager."
1009105-112 = "I was just flustered for a moment because I never thought anyone would notice."
1009105-116 = "...Right?"
1009105-121 = "Manager? ...Right?"
1009105-126 = "...I said yes for the time being, and bought the last dessert in the shop."
1009105-127 = "After leaving the shop, I looked away for a second. When I looked back, Kazusa had already taken off."

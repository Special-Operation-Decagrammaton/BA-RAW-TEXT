[translation]
1009105-1 = "ผู้จัดการส่วนตัว"
1009105-2 = "(ในช่วงบ่ายแก่ๆ คุณครูก็ออกมารอคาซึสะที่บริเวณทางข้าม)"
1009105-3 = "คุณครู ทางนี้!"
1009105-8 = "[ns1] \"อ้อ มาแล้วเหรอ คาซึสะ\"\n[ns2] \"มาตรงเวลาเป๊ะเลยนะ\""
1009105-11 = "ฉันรีบซ้อมให้เสร็จแล้วก็มาทันทีเลย... คุณครูไม่ได้รอนานใช่มั้ย?"
1009105-12 = "เห็นบางทีคุณครูก็จะออกมารอตั้งแต่ยังไม่ถึงเวลานัดเลยน่ะ"
1009105-13 = "ใช่ว่าเราจะเคยเจอกันแค่ครั้งสองครั้งนี่นะ... ถ้าคุณครูรู้แล้วว่าฉันจะมาตามเวลานัด งั้นก็ไม่เห็นจะต้อง#nออกมารอก่อนก็ได้เลยนี่นา"
1009105-14 = "[s] \"ถ้าเป็นเรื่องที่ครูมารอคาซึสะละก็ ครู...\""
1009105-15 = "เอาละๆ~ สต็อป สต็อป!"
1009105-16 = "ฉันเดาไว้แล้วละว่าคุณครูจะพูดอะไร เพราะงั้นฉันก็เลยจะเบรกก่อน!"
1009105-17 = "ถ้ามีเวลามาพูดอะไรเพ้อเจ้อละก็ ฉันว่าคุณครูเอาเวลาไปเลือกของที่อยากกินไว้ก่อนดีกว่า"
1009105-18 = "หืม...? มีของที่เลือกไว้แล้วงั้นเหรอ?"
1009105-19 = "โอ้...? อะไรกัน? คุณครูดูแตกต่างไปจากปกตินะเนี่ย"
1009105-20 = "ถ้างั้นฉันขอดูลิสต์ขนมหน่อยได้มั้ย? เดี๋ยวฉันจัดการเรื่องเส้นทางเอง"
1009105-21 = "ร้านที่อยู่แถวๆ นี้มีเวลาปิดต่างกัน เพราะแบบนั้นเราก็ควรกำหนดโปรแกรมทัวร์ร้านขนมตามเวลาปิด#nร้านด้วย จะได้ไม่พลาดร้านอร่อยๆ ไง"
1009105-22 = "เรื่องนี้ขอให้ไว้ใจผู้เชี่ยวชาญได้เลย ฮุฮุ"
1009105-27 = "ไหนดูซิ..."
1009105-28 = "อืม โอ้..."
1009105-29 = "เลือกมาแต่ของดีๆ ทั้งนั้นเลย แบบนี้คุณครูมาเป็นสมาชิกชมรมของหวานหลังเลิกเรียนได้เลยนะ ฉันเกือบจะบอกให้เลิกเป็นคุณครูแล้วมั้ยล่ะ"
1009105-30 = "[s] \"พอดีครูได้เรียนรู้มาจากบางคนน่ะ\""
1009105-31 = "ถึงจะอวยกัน แต่ฉันก็ไม่มีอะไรจะให้หรอกนะ ถึงจะไม่ได้ไม่ชอบให้อวยก็เถอะ"
1009105-32 = "ฮุฮุ..."
1009105-33 = "ดีละ ถ้างั้นก็อย่ามัวเสียเวลาอยู่เลย..."
1009105-34 = "เราไปทัวร์ของหวานกันเถอะ!"
1009105-36 = "(หลังจากนั้น คุณครูกับคาซึสะก็เริ่มตระเวนไปร้านขนมหวานที่อยู่รอบๆ)"
1009105-37 = "(ถึงเส้นทางที่ใช้จะดูลัดเลี้ยวมากเกินไปจนน่าเป็นห่วง แต่คาซึสะก็บอกว่าเป็น \"ทางลัด\" ที่จะช่วยให้#nไปถึงที่หมายได้เร็วขึ้น)"
1009105-39 = "(เวลาล่วงเลยมาจนถึงตอนเย็น คุณครูกับคาซึสะก็มาถึงร้านสุดท้ายในลิสต์)"
1009105-44 = "อืม... ยังดีที่มาทันเวลานะ"
1009105-45 = "ร้านสุดท้ายแล้ว เราเคลียร์ลิสต์ของหวานของคุณครูได้แล้วละ"
1009105-46 = "หืม...?"
1009105-47 = "ยอดเยี่ยมไปเลยงั้นเหรอ? ฮ่าฮ่า ฉันรู้สึกภูมิใจในตัวคุณครูจัง ไม่เลวเลยนะ"
1009105-48 = "ถึงถ้าเทียบกับคนอื่นในชมรมแล้ว ฉันยังไม่เก่งเท่าไรก็เถอะ..."
1009105-49 = "แต่ถ้าจะให้เป็นคนนำทัวร์คุณครูแบบนี้อีก ฉันก็ไม่ติดอะไรนะ"
1009105-50 = "ไว้คราวหน้าถ้าอยากมาอีก..."
1009105-54 = "ก็บอกพี่สาวคนนี้ได้เลยนะคะ โอเคมั้ย?"
1009105-55 = "[s3] \"วันนี้ดูฮึกเหิมจังเลยนะ\"\n[s4] \"ฮ่าฮ่า ไว้ครูจะตั้งตารอโอกาสแบบนี้อีกนะ\""
1009105-58 = "ฮุฮุ ก็คงจะแบบนั้นละ ก็ปฏิเสธไม่ได้นี่นาว่ามันดี"
1009105-59 = "ถ้างั้นก็..."
1009105-61 = "โอ้ว สวัสดีครับ วันนี้พวกคุณเป็นลูกค้าชุดสุดท้ายเลยนะครับ"
1009105-66 = "เอ๋... ขนมชิ้นสุดท้ายได้เป็นของลูกค้าคนพิเศษเลยนะครับเนี่ย"
1009105-67 = "ดูแล้วน่าจะเป็นนักร้อง...? หรืออยู่ในวงดนตรีใช่มั้ยครับ?"
1009105-68 = "...?"
1009105-72 = "หะ... หืม...? เจ้าของร้านหมายถึงฉันเหรอคุณครู?"
1009105-73 = "[s5] \"ดูจากรูปลักษณ์ภายนอกแล้วก็ใช่นะ\"\n[s6] \"ก็เราเป็นลูกค้ากลุ่มเดียวที่นี่นี่นา\""
1009105-76 = "หมู่นี้มีนักร้องหรือนักดนตรีที่เดบิวท์ตั้งแต่ตอนเป็นนักเรียนเยอะเลยละครับ"
1009105-77 = "เยี่ยมไปเลยนะครับที่มีความฝันและพยายามคว้าฝันกันตั้งแต่อายุน้อยๆ เลย! ผมคอยเชียร์คนมีความฝันอยู่น่ะครับ"
1009105-78 = "ถ้างั้นคนที่อยู่ข้างๆ..."
1009105-79 = "อ่า คนนี้คือ..."
1009105-80 = "คุณ..."
1009105-82 = "ผู้จัดการส่วนตัวสินะครับ?"
1009105-86 = "...!?"
1009105-90 = "[ns7] \"หา...?\"\n[ns8] \"อ่า คงเหมือนอย่างนั้นสินะ\""
1009105-94 = "อ่า... เอ่อ... เอ่อ..."
1009105-95 = "คือ... เอ่อ..."
1009105-96 = "...?"
1009105-97 = "หะ... หืม?? "
1009105-98 = "เอะ... เอ๋? ต้องขอโทษด้วยครับ... ท่าทางผมคงจะพูดอะไรผิดพลาดไปน่ะครับ"
1009105-99 = "พอเป็นลูกค้ากลุ่มสุดท้าย ผมก็เลยเข้ามาชวนคุยโดยไม่รู้ตัวเลย... โธ่เอ๊ย ไม่น่าเสียมารยาทกับลูกค้า#nเลย..."
1009105-100 = "..."
1009105-101 = "......"
1009105-102 = "ถ้างั้นท่านนี้ก็คือ..."
1009105-103 = "[s9] \"ไม่หรอก ไม่เป็นไร...\"\n[s10] \"เพราะที่จริงแล้ว...\""
1009105-106 = "คนคนนี้เป็นผู้จัดการส่วนตัวของฉันเองน่ะ"
1009105-108 = "[ns11] \"...?\"\n[ns12] \"คาซึสะ?\""
1009105-111 = "อื้ม เป็นผู้จัดการส่วนตัวของฉันน่ะ ถูกแล้ว"
1009105-112 = "เมื่อกี้ฉันแค่ทำตัวไม่ถูกเพราะไม่คิดว่าจะมีใครจำได้น่ะ"
1009105-116 = "ใช่มั้ยล่ะ...?"
1009105-121 = "คุณผู้จัดการ... ของฉัน"
1009105-126 = "(...หลังจากตอบตกลงไป คุณครูก็ซื้อของหวานชิ้นสุดท้ายออกมาจากร้าน)"
1009105-127 = "(หลังออกมาจากร้านแล้ว คุณครูก็ยืนเหม่ออยู่ครู่หนึ่ง และคาซึสะก็ใช้จังหวะนั้นหายตัวไป)"

[translation]
1001903-1 = "防護"
1001903-3 = "（收到梓最後的MomoTalk訊息後15分鐘，鈴聲準時響起）"
1001903-4 = "（不知為何梓抵達的時候表情看起來有點消沉）"
1001903-5 = "……唉。"
1001903-6 = "跟我猜得一模一樣……"
1001903-7 = "[s]「梓？有什麼問題嗎？」"
1001903-8 = "我抵達這棟大樓之後，走到老師面前花了6分19秒。"
1001903-9 = "途中有擋下我的就只有夏萊的大門。但就連那道阻礙都由老師替我打開了。"
1001903-10 = "電梯的安全系統沒有啟動，還若無其事般的幫我打開辦公室的門。"
1001903-11 = "萬一來赴約的不是真正的我，而是偽裝成我的其他人，你打算怎麼辦？"
1001903-12 = "老師你太安逸了。完全沒做好憂患意識或是系統上面對緊急狀況的準備。"
1001903-13 = "……不過別擔心。"
1001903-14 = "我就是為了這件事才來的。"
1001903-15 = "[s1] 「你要幫忙強化警衛系統……？」\n[s2] 「雖然我不太清楚，但一切拜託了。」"
1001903-16 = "我好歹也是專家，我會為了老師的安全拚盡全力。"
1001903-17 = "我好歹也是專家，我會為了老師的安全拚盡全力。"
1001903-18 = "我帶了很多陷阱和地雷，連一隻螞蟻都不會有辦法通過。"
1001903-19 = "……？"
1001903-20 = "不能妨礙到其他要來夏萊的學生？夏萊辦公室是開放空間……？"
1001903-21 = "老師，你到底有沒有在聽我講話？這樣會無法保障老師的安全……"
1001903-22 = "……不如打造一個危急時能避難的空間會比較好？"
1001903-23 = "嗯……"
1001903-24 = "……好吧。雖然不太情願，但所謂入境隨俗。既然來到這裡，就該遵守這裡的規定。"
1001903-25 = "那麼我們該去哪裡？"
1001903-27 = "這裡是……？"
1001903-28 = "原來如此，休息室嗎？"
1001903-29 = "嗯，有充足的生活必需品，也能保持溫度和濕度。"
1001903-30 = "感覺這裡的確適合改造成緊急避難設施。"
1001903-31 = "……嗯？先別開始？"
1001903-32 = "你要我等你工作做完後再一起進行？不用麻煩，我一個人就可以了。還是說你不相信我的技術？"
1001903-33 = "事情全推給我會過意不去，而且也純粹想一起進行……？"
1001903-34 = "……唉，老師你還真的是……"
1001903-35 = "我知道了，既然你都那麼說了，那我就照你說的做吧。"
1001903-36 = "那麼我就在這裡待命，等老師回來，我們就立刻開始進行。"
1001903-41 = "（留下坐在沙發上的梓，回到了辦公室）"
1001903-43 = "（處理好所有文件時，已經是黃昏了）"
1001903-44 = "（回到休息室一看）"
1001903-46 = "（梓坐在按摩椅上睡著了）"
1001903-50 = "唔嗯……呼喵……"
1001903-51 = "（……？）"
1001903-52 = "呃嗯……呵呵……"
1001903-53 = "……？"
1001903-54 = "……哇！？"
1001903-56 = "老，老師…？"
1001903-57 = "[s3] 「梓，睡得好嗎？」\n[s4] 「按摩椅很舒服對吧。」"
1001903-58 = "……"
1001903-59 = "……"
1001903-60 = "……那個，這是……"
1001903-61 = "……嗯？你問我感覺如何？"
1001903-62 = "就……什麼事都沒發生，而且是個很舒適的空間……"
1001903-63 = "……！！"
1001903-64 = "……老師。"
1001903-65 = "你該不會從一開始就是這麼打算，才把我帶來這邊？"
1001903-66 = "為了讓我知道這個地方的氛圍……？"
1001903-67 = "[s5] 「我想弄成這種氛圍的避難設施。」\n[s6] 「我覺得梓可以再更放鬆一點喔？」"
1001903-68 = "……老師你太天真了。"
1001903-69 = "……老師你太天真了。"
1001903-70 = "……唉。"
1001903-71 = "總之我明白了。在這裡的期間我也會遵守這裡的規定。"
1001903-72 = "雖然還無法完全認同，不過我想在這裡老師說的才是正確的。我會努力適應的。"
1001903-73 = "……隨時歡迎我來？"
1001903-74 = "你希望我能隨心所欲來這裡放鬆？"
1001903-76 = "……呵呵。"
1001903-77 = "確實，對現在的我來說，或許真的需要那種時間。"
1001903-78 = "那我就恭敬不如從命了。"
1001903-80 = "（之後和梓一起輪流使用按摩椅直到深夜）"

1001903-3 = "#na;(마지막 모모톡 메시지가 도착하고 난 뒤, 정확하게 15분이 지나자 벨이 울렸다.)"
1001903-4 = "#na;(어째서인지 도착한 아즈사의 표정은 썩 밝아 보이지 않았다.)"
1001903-5 = "3;아즈사;06;……하아.\n#3;a\n#3;stiff\n#3;em;[속상함]"
1001903-6 = "3;아즈사;06;예상은 했지만, 정말 생각한 것과 일말의 차이도 없네. 선생님의 거처."
1001903-7 = "[s] \"아즈사? 무슨 문제라도 있어?\""
1001903-8 = "3;아즈사;99;이 건물 앞으로 도착해서 내가 이렇게 선생님 앞에 와 서는 데까지 걸린 시간은 겨우 6분 19초.\n#3;em;…"
1001903-9 = "3;아즈사;00;중간에 날 가로막은 거라고는 샬레 정문 하나가 전부. 그마저도 선생님이 바로 열어줬지."
1001903-10 = "3;아즈사;00;엘리베이터도 보안 장치 하나 없이 탈 수 있었고, 집무실 문도 그냥 열 수 있었어."
1001903-11 = "3;아즈사;02;만약 지금 여기 찾아온 게, 사실은 내가 아니라 나로 위장한 다른 사람이었다면 어땠겠어?"
1001903-12 = "3;아즈사;06;안이해. 너무 안이해, 선생님. 전술적으로 전혀 세이프티 존을 만들지 못했어.\n#3;em;[땀]\n#3;stiff"
1001903-13 = "3;아즈사;99;……하지만 괜찮아."
1001903-14 = "3;아즈사;00;바로 그래서 내가 찾아온 거니까."
1001903-15 = "[s1] \"세이프티 존을 만들겠다는 뜻……?\"\n[s2] \"잘은 모르지만 잘 부탁드립니다.\""
1001903-16 = "3;아즈사;02;응. 이런 면에 있어서 나는 전문가니까. 확실하게 선생님의 안전을 지켜줄게."
1001903-17 = "3;아즈사;02;응. 이런 면에 있어서 나는 전문가니까. 확실하게 선생님의 안전을 지켜줄게."
1001903-18 = "3;아즈사;00;이후로는 개미 한 마리 여길 드나들지 못하게 만들어 놓을 테니까. 챙겨온 부비트랩과 지뢰는 충분해."
1001903-19 = "3;아즈사;02;……응? 뭐라고?\n#3;em;[?]"
1001903-20 = "3;아즈사;02;샬레에 찾아오는 학생들을 막는 건 안 돼? 샬레 집무실은 열려 있는 공간이니까……?"
1001903-21 = "3;아즈사;06;선생님. 지금까지 뭘 들은 거야. 그래서는 선생님의 안위를 보장할 수가……\n#3;stiff"
1001903-22 = "3;아즈사;02;……뭐? 차라리 대피할 수 있는 공간을 만드는 게 낫지 않겠냐고?"
1001903-23 = "3;아즈사;99;으음……\n#3;em;…"
1001903-24 = "3;아즈사;00;……좋아. 내키지는 않지만, 이곳은 이곳의 룰이 있는 법일 테니. 따르도록 할게."

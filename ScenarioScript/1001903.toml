[translation]
1001903-1 = "Security"
1001903-3 = "The bell rang exactly 15 minutes after my last MomoTalk message."
1001903-4 = "Azusa didn't look very happy when she arrived, for some reason."
1001903-5 = "*sigh*"
1001903-6 = "I was hoping you wouldn't be so predictable when it comes to your dwelling, but I expected it nonetheless."
1001903-7 = "[s] \"Is something wrong, Azusa?\""
1001903-8 = "It only took me six minutes and nineteen seconds to arrive at this building and stand in front of you."
1001903-9 = "I only encountered one obstacle on the way, and that was the Schale gate. You even opened it for me."
1001903-10 = "There are no security devices in the elevator, and the door to the executive office was unlocked."
1001903-11 = "What if it wasn't actually me coming to visit but a dangerous individual disguised as me?"
1001903-12 = "You're too careless, Sensei. You don't have any safety measures at all."
1001903-13 = "...But that's okay."
1001903-14 = "That's why I'm here."
1001903-15 = "[s1] \"Safety measures?\"\n[s2] \"I don't get it, but I'll trust you.\""
1001903-16 = "But of course. I'm a professional—one that will ensure your safety."
1001903-17 = "But of course. I'm a professional—one that will ensure your safety."
1001903-18 = "From now on, I'll make sure that not even an ant can infiltrate this office. I have more than enough traps and mines to see to that."
1001903-19 = "...What was that?"
1001903-20 = "We can't bar other students from entering Schale? The executive office is an open space?"
1001903-21 = "That's nonsense, Sensei. This is the only way I can guarantee your safety."
1001903-22 = "What? It might be better to set up a safe house instead?"
1001903-23 = "Hmm..."
1001903-24 = "Fine. I don't agree with this place's rules, but I'll follow them."
1001903-25 = "So where should we go?"
1001903-27 = "What's this...?"
1001903-28 = "A lounge? This is where you rest?"
1001903-29 = "I see. You stock all of your daily necessities here, and the climate is controlled to a comfortable temperature."
1001903-30 = "Setting up a security facility in here might be a good idea."
1001903-31 = "...Huh? You think I should hold off on making that kind of decision?"
1001903-32 = "We should collaborate on it once you're done with work? But I can do it by myself. Don't you trust me?"
1001903-33 = "I see. You would feel bad making me do it all on my own."
1001903-34 = "That's very like you, Sensei."
1001903-35 = "Very well. If you insist, then I'll wait for you."
1001903-36 = "I'll be right here. We can get started as soon as you get back."
1001903-41 = "I left Azusa sitting on the sofa and returned to the executive office."
1001903-43 = "By the time I was done with all the paperwork, the sun had set."
1001903-44 = "I returned to the lounge."
1001903-46 = "Azusa was asleep in the massage chair."
1001903-50 = "Mmm... Zzz..."
1001903-51 = "(...?)"
1001903-52 = "Mmm... Heehee..."
1001903-53 = "...?"
1001903-54 = "*gasp*"
1001903-56 = "S-Sensei?"
1001903-57 = "[s3] \"Did you sleep well, Azusa?\"\n[s4] \"It's a good massage chair, isn't it?\""
1001903-58 = "...Um."
1001903-59 = "...Um."
1001903-60 = "I-I can explain. So..."
1001903-61 = "Huh? Did anything happen while you were gone?"
1001903-62 = "Um, well, no... Nothing in particular."
1001903-63 = "...!"
1001903-64 = "Sensei."
1001903-65 = "Did you make me wait here on purpose? Just so I could experience a relaxing atmosphere?"
1001903-66 = "You were trying to tell me there's no need for more security..."
1001903-67 = "[s5] \"The lounge has a soothing vibe, doesn't it?\"\n[s6] \"You should try relaxing a little more.\""
1001903-68 = "You're being careless again."
1001903-69 = "You're being careless again."
1001903-70 = "*sigh*"
1001903-71 = "But I understand. I've already made up my mind to try and adapt to life here."
1001903-72 = "It isn't as though I'm thrilled to be here, but you have a point. I'll try to be more relaxed."
1001903-73 = "What was that about later on?"
1001903-74 = "You want to tell me more about what life is like here?"
1001903-76 = "...Heehee."
1001903-77 = "You're right. Perhaps what I need right now isn't just a teacher."
1001903-78 = "Then, I look forward to everything you have to tell me."
1001903-80 = "Azusa and I then took turns using the massage chair for a little while longer."

[translation]
1001903-1 = "การป้องกัน"
1001903-3 = "(เสียงกระดิ่งดังขึ้น 15 นาทีหลังจากที่ได้รับข้อความสุดท้ายใน MOMOTALK)"
1001903-4 = "(สีหน้าของอาซึสะดูไม่สดใสเท่าไหร่ในตอนที่มาถึง)"
1001903-5 = "เฮ้อ..."
1001903-6 = "ถึงฉันจะคาดการณ์ไว้แล้ว แต่ที่อยู่ของคุณครูก็ไม่มีอะไรต่างไปจากที่ฉันคิดเอาไว้เลย"
1001903-7 = "[s] “อาซึสะ? มีเรื่องอะไรเหรอ?\""
1001903-8 = "พอฉันมาถึงหน้าตึก ใช้เวลาเดินแค่ 6 นาที 19 วินาทีก็มาอยู่หน้าคุณครูแบบนี้ได้แล้ว"
1001903-9 = "ขณะที่เดินมาฉันเจอประตูที่เป็นสิ่งกีดขวางเพียงแค่บานเดียว แถมคุณครูยังเป็นคนมาเปิดประตู#nให้ฉันอีก"
1001903-10 = "ลิฟต์ไม่มีการติดตั้งอุปกรณ์รักษาความปลอดภัยไว้ ส่วนประตูห้องทำงานก็ไม่ได้ล็อกด้วย"
1001903-11 = "ถ้ามีคนปลอมตัวเป็นฉันมาที่นี่ในตอนนี้ คุณครูจะทำยังไง?"
1001903-12 = "คุณครูนี่หละหลวมเกินไปแล้ว สร้างเขตปลอดภัยตามยุทธวิธีไม่เป็นเลยสินะ"
1001903-13 = "แต่ก็ไม่เป็นไร..."
1001903-14 = "เพราะอย่างนั้น ฉันถึงได้มาที่นี่ยังไงล่ะ"
1001903-15 = "[s1] \"สร้างเขตปลอดภัยเหรอ...?\"\n[s2] \"ถึงครูไม่ค่อยเข้าใจที่พูดแต่ก็ขอฝากด้วยล่ะ\""
1001903-16 = "อื้อ เพราะฉันเป็นผู้เชี่ยวชาญด้านนี้ยังไงละ ฉันจะรักษาความปลอดภัยให้คุณครูเอง"
1001903-17 = "อื้อ เพราะฉันเป็นผู้เชี่ยวชาญด้านนี้ยังไงละ ฉันจะรักษาความปลอดภัยให้คุณครูเอง"
1001903-18 = "จากนี้ไปฉันจะไม่ยอมให้มดแม้แต่ตัวเดียวเข้ามาในนี้ได้เลย ฉันมีกับดักและกับระเบิดเหลือเฟืออยู่แล้ว"
1001903-19 = "หืม...? ว่ายังไงนะ?"
1001903-20 = "ห้ามขัดขวางนักเรียนที่มาชาเล่ต์งั้นเหรอ? เพราะสำนักงานชาเล่ต์เป็นสถานที่เปิด...?"
1001903-21 = "คุณครู ที่ฉันพูดมาก็เพื่อรับประกันความปลอดภัยของคุณครูนะ"
1001903-22 = "อะไรนะ...? สร้างพื้นที่สำหรับหลบภัยขึ้นมาแทนน่าจะดีกว่าเหรอ?"
1001903-23 = "อืม..."
1001903-24 = "ก็ได้... ถึงจะไม่ค่อยถูกใจเท่าไหร่ แต่ที่นี่ก็มีกฎของที่นี่อยู่ ฉันจะยอมทำตามก็แล้วกัน"
1001903-25 = "ถ้างั้นไปที่ไหนดีล่ะ?"
1001903-27 = "ที่นี่เหรอ...?"
1001903-28 = "ห้องพักผ่อน? พื้นที่สำหรับพักผ่อนงั้นเหรอ?"
1001903-29 = "จริงด้วย ของจำเป็นในชีวิตก็มีเพียงพอ แถมยังควบคุมอุณหภูมิได้ดีด้วย"
1001903-30 = "ถ้าเป็นที่นี่ก็ติดตั้งอุปกรณ์ป้องกันได้ไม่มีปัญหา"
1001903-31 = "หืม...? ให้รอก่อนงั้นเหรอ?"
1001903-32 = "ให้รอคุณครูเสร็จงานก่อนแล้วค่อยมาติดตั้งด้วยกันเหรอ? ฉันทำคนเดียวได้นะ ไม่เชื่อฝีมือกันรึไง?"
1001903-33 = "ไม่ใช่อย่างนั้นเหรอ? หืม... ถ้าปล่อยให้ฉันทำคนเดียวจะไม่สบายใจเหรอ?"
1001903-34 = "เฮ้อ... จริงๆ เลยนะคุณครูเนี่ย..."
1001903-35 = "ถ้าคุณครูพูดขนาดนั้น ฉันจะยอมทำตามก็แล้วกัน"
1001903-36 = "ถ้าอย่างนั้นฉันจะรออยู่ที่นี่ พอคุณครูกลับมาเราจะลงมือกันทันที"
1001903-41 = "(คุณครูกลับไปที่ห้องทำงานโดยปล่อยให้อาซึสะนั่งรออยู่ที่โซฟา)"
1001903-43 = "(หลังจากกรอกเอกสารทั้งหมดเสร็จ พระอาทิตย์ก็ตกดินแล้ว)"
1001903-44 = "(คุณครูกลับมาที่ห้องพักผ่อน)"
1001903-46 = "(อาซึสะกำลังหลับสบายอยู่บนเก้าอี้นวด)"
1001903-50 = "อืม งืม... งืม..."
1001903-51 = "(...?)"
1001903-52 = "อะ... อือ... ฮุฮุ..."
1001903-53 = "......?"
1001903-54 = "...เฮือก...!?"
1001903-56 = "คุณครู...?"
1001903-57 = "[s3] \"หลับสบายมั้ยอาซึสะ?\"\n[s4] \"ครูเข้าใจ ใครจะทนเก้าอี้นวดนุ่มๆ ได้ล่ะ\""
1001903-58 = "อืม..."
1001903-59 = "อืม..."
1001903-60 = "คะ... คือว่า... ฉัน..."
1001903-61 = "หืม? มีอะไรเกิดขึ้นตอนคุณครูไม่อยู่รึเปล่างั้นเหรอ?"
1001903-62 = "อะ... อืม คือ... ไม่มีอะไรเลย"
1001903-63 = "......!!"
1001903-64 = "คุณครู..."
1001903-65 = "อย่าบอกนะว่าคิดไว้ตั้งแต่แรกแล้ว? ตั้งใจจะให้ฉันได้สัมผัสกับบรรยากาศที่ผ่อนคลายของที่นี่เหรอ?"
1001903-66 = "อยากจะสื่อว่าไม่จำเป็นต้องติดตั้งอุปกรณ์ความปลอดภัยก็ได้สินะ..."
1001903-67 = "[s5] \"เพราะที่นี่ก็มีบรรยากาศที่เหมาะกับที่นี่น่ะ\"\n[s6] \"อาซึสะผ่อนคลายอีกสักหน่อยดีมั้ย?\""
1001903-68 = "พูดแบบสบายใจแบบนั้นอีกแล้วนะ"
1001903-69 = "พูดแบบสบายใจแบบนั้นอีกแล้วนะ"
1001903-70 = "เฮ้อ..."
1001903-71 = "แต่ฉันเข้าใจแล้ว ฉันเองก็ตัดสินใจที่จะปรับตัวให้เข้ากับชีวิตของที่นี่"
1001903-72 = "อืม ถึงฉันจะยังติดใจอยู่ แต่ที่คุณครูพูดมาก็ถูก ฉันจะลองพยายามผ่อนคลายให้มากขึ้น"
1001903-73 = "หืม? จะช่วยบอกให้ทีหลังงั้นเหรอ?"
1001903-74 = "เรื่องการใช้ชีวิตที่นี่งั้นเหรอ?"
1001903-76 = "ฮิฮิ..."
1001903-77 = "จริงด้วย... บางทีสิ่งที่ฉันต้องการในตอนนี้ อาจจะเป็นคุณครูก็ได้..."
1001903-78 = "ถ้างั้นจะรอนะ การฝึกนั่นน่ะ"
1001903-80 = "(จากนั้นคุณครูกับอาซึสะก็ผลัดกันใช้เก้าอี้นวดกันจนถึงดึก)"

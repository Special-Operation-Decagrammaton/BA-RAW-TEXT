2300320-16 = "4;하레;05;지난번에 아테나 3호가 내 지시를 따르지 않았던 일, 기억해?"
2300320-17 = "4;하레;01;그때는 학습 의욕을 높이기 위해 보상 값을 높게 부여하는 바람에, 아테나 3호가 정지 명령을 무시하고 과제 수행을 우선했었지."
2300320-18 = "4;하레;04;그 때문에 한나절 넘게 억지로 달리기를 해야 했지만……\n#4;em;[땀]\n#4;stiff"
2300320-19 = "4;하레;03;이번 개조를 통해 최상위 명령어에 긴급 정지 코드를 추가했으니, 지난번처럼 사람에게 위해를 끼치는 일은 없을 거야."
2300320-20 = "[s3] \"무슨 이야기인지는 잘 모르겠지만……\"\n[s4] \"결과적으로는 운동을 했으니, 도움이 된 게 아닐까?\""

[translation]
2300320-1 = "背叛的機械（２）"
2300320-2 = "（因為晴遲遲沒有回訊息，讓我有些擔心，便前往貝里塔斯的社辦找她）"
2300320-4 = "貝里塔斯．駭客休息室"
2300320-8 = "……啊，老師。你來了啊。"
2300320-9 = "……現在嗎？我正在忙著改造雅典娜3號……"
2300320-10 = "[s1] 「嗯，你繼續吧。」\n[s2] 「不用在意我。」"
2300320-11 = "嗯。我正在重新設計自我學習的演算法……"
2300320-12 = "嗯。我正在重新設計自我學習的演算法……"
2300320-13 = "重新建立以經驗回饋系統為基礎的獎勵機制，並設定例外值……"
2300320-14 = "[s] 「雅典娜3號是之前那台無人機嗎？」"
2300320-15 = "嗯，對啊。"
2300320-16 = "老師上次也有看到吧？"
2300320-17 = "當時似乎是因為獎勵機制的數值設定出了問題，導致它無視停止命令，將執行課題為最優先任務……"
2300320-18 = "都因為它，害我跑了好幾個小時……"
2300320-19 = "總之這次有將緊急停止碼編入最上級指令了。這下應該不會發生之前那種狀況。"
2300320-20 = "[s3] 「好，好難懂的話題呢……反正不會變得像上次那樣了對吧？」\n[s4] 「但結果你也有運動到，還是有達成目的吧……？」"
2300320-21 = "但那樣沒有意義！"
2300320-22 = "但那樣沒有意義！"
2300320-23 = "何況運動這種東西，本來就不是受人強迫才做的，而是自身因應需求自發進行的！"
2300320-24 = "強制持續運動，不僅會降低運動意願，還會提高受傷的風險──"
2300320-28 = "……總之，在調整的同時，我也順便加入了幾項新功能。"
2300320-29 = "例如，我在相機程式中追加了新模式。"
2300320-30 = "不僅能自動辨識人臉，還有美白濾鏡等功能……"
2300320-31 = "[s5] 「剛才那張照片也是用輔助功能拍的嗎？」\n[s6] 「看起來的確不太一樣。」"
2300320-32 = "我套用了透過自動學習從社交軟體上收集來的數據，分析出理想的色相……"
2300320-33 = "我套用了透過自動學習從社交軟體上收集來的數據，分析出理想的色相……"
2300320-37 = "……「剛才那張照片」？"
2300320-38 = "那是，什麼意思？"
2300320-39 = "[s] 「剛才用MomoTalk傳給我的照片啊，這個……」"
2300320-44 = "這，這不是我傳的……！"
2300320-45 = "雅典娜3號，難道是你……！？"
2300320-46 = "＜是。我在今日13點27分11秒，將該照片檔案傳送給夏萊的[USERNAME]老師＞"
2300320-47 = "為什麼要做這種事，我又沒有叫你這麼做……！"
2300320-48 = "＜那是因為──＞"
2300320-49 = "＜目標「小鈎晴」曾如此希望＞"
2300320-50 = "……咦？"
2300320-51 = "＜目標「小鈎晴」，在今日12點30分00秒拍下該照片後，以15分貝的音量表示：「拍得比想像中好看，這下就算給老師看到也沒問題……」＞"
2300320-52 = "那，那是……！？"
2300320-53 = "不對，我的意思不是要你幫我傳送！"
2300320-54 = "為什麼要擅自做出令人反感的行為……你那是違反法則！"
2300320-55 = "＜「令人反感的行為」……＞"
2300320-56 = "＜計算呼吸節奏、脈搏，分析瞳孔變化……＞"
2300320-57 = "＜……分析完畢，目標「小鈎晴」現在正在說謊＞"
2300320-62 = "＜目標「小鈎晴」雖然因意料之外的狀況感到難為情，但表情分析結果顯示了開心的反應──＞"
2300320-63 = "緊急停止！！"
2300320-67 = "真是夠了……"
2300320-68 = "看來我得重新整修一遍才行了……！"
2300320-70 = "（後來，晴帶著滿腔怒氣開始拆解無人機）"

2300320-11 = "4;하레;04;고마워. 학습에 쓰이는 알고리즘을 처음부터 다시 설계하느라 머리가 꽉 차버렸거든……\n#4;em;[속상함]"
2300320-12 = "4;하레;04;고마워. 학습에 쓰이는 알고리즘을 처음부터 다시 설계하느라 머리가 꽉 차버렸거든……\n#4;em;[속상함]"
2300320-13 = "4;하레;01;경험과 시행착오에 따른 보상체계를 새로 수립하고, 예외 값을 설정하고……"
2300320-14 = "[s] \"아테나 3호라면, 전의 그 드론?\""

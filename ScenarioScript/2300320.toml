[translation]
2300320-1 = "การทรยศของเครื่องจักรกล 2"
2300320-2 = "(คุณครูแวะมาที่ห้องของชมรมเวอริทัส เพราะฮาเระไม่ตอบข้อความ)"
2300320-4 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
2300320-8 = "อ๊ะ คุณครู มาแล้วเหรอ"
2300320-9 = "โทษที ฉันกำลังยุ่งอยู่กับการปรับปรุง อาเธน่า 3 นิดหน่อยน่ะ"
2300320-10 = "[s1] \"ไม่ต้องสนใจครูก็ได้\"\n[s2] \"ทำงานต่อได้เลยนะ\""
2300320-11 = "ขอบคุณนะ ฉันมัวแต่คิดเรื่องการออกแบบอัลกอริทึมที่ใช้ในการเรียนรู้แบบเริ่มใหม่ตั้งแต่ต้น หัวเลยตื้อไปหมด..."
2300320-12 = "ขอบคุณนะ ฉันมัวแต่คิดเรื่องการออกแบบอัลกอริทึมที่ใช้ในการเรียนรู้แบบเริ่มใหม่ตั้งแต่ต้น หัวเลยตื้อไปหมด..."
2300320-13 = "กำหนดระบบรางวัลตามค่าประสบการณ์และการลงมือทำจริง แล้วก็ตั้งค่าข้อยกเว้น..."
2300320-14 = "[s] \"อาเธน่า 3 นี่ หมายถึงโดรนเหรอ?\""
2300320-15 = "อื้อ ใช่แล้ว"
2300320-16 = "คุณครูจำคราวที่แล้วตอนที่อาเธน่า 3 ไม่ทำตามคำสั่งฉันได้มั้ย?"
2300320-17 = "ตอนนั้นฉันปรับเพิ่มรางวัลให้สูงขึ้นเพื่อกระตุ้นความอยากเรียนรู้ เพราะงั้นอาเธน่า 3 เลยเพิกเฉยต่อ#nคำสั่งและเลือกที่จะปฏิบัติภารกิจก่อน"
2300320-18 = "เพราะงั้นตอนนั้นเลยต้องฝืนวิ่งไปตั้งครึ่งวัน..."
2300320-19 = "แต่จากการปรับแต่งคราวนี้ ฉันได้เพิ่มโค้ดคำสั่งหยุดฉุกเฉินในระบบคำสั่งสูงสุดแล้ว เพราะงั้นมันจะไม่เป็นอันตรายต่อผู้คนเหมือนคราวที่แล้วแน่"
2300320-20 = "[s3] \"ครูไม่ค่อยเข้าใจเท่าไรเลยแฮะ...\"\n[s4] \"แต่ก็ได้ออกกำลังกายนะ ถือว่าเป็นเรื่องดีไม่ใช่เหรอ?\""
2300320-21 = "เฮ้อ ไม่ช่วยอะไรเลยสักนิด!"
2300320-22 = "ไม่เป็นประโยชน์เลยสักนิด"
2300320-23 = "การออกกำลังกายน่ะ ไม่ใช่การทำตามคำสั่งของคนอื่น แต่ต้องทำด้วยตัวเองอย่างสม่ำเสมอต่างหาก!"
2300320-24 = "แต่ถ้าถูกบังคับให้ออกกำลังกายแบบนี้มีแต่ทำให้รู้สึกหมดแรง และยังเสี่ยงต่อการบาดเจ็บด้วย-"
2300320-28 = "ยังไงก็เถอะ... ฉันเพิ่มฟังก์ชันเข้าไปนิดหน่อยตอนที่ปรับปรุงโปรแกรมแล้วละ"
2300320-29 = "ตัวอย่างเช่น เพิ่มโหมดกล้องใหม่เข้าไปในโปรแกรมกล้อง"
2300320-30 = "หรือฟังก์ชันการตกแต่งรูปและฟังก์ชันรีทัชรูปให้ดูขาวขึ้น..."
2300320-31 = "[s5] \"ถ้างั้นรูปเมื่อกี้ใช้ฟังก์ชันแต่งภาพถ่ายเหรอ?\"\n[s6] \"ดูต่างกันมากเลยแฮะ\""
2300320-32 = "อื้อ ใช้ระบบตัดสินจากความเหมาะสมต่อการโพสต์ลงโซเชียลโดยอ้างอิงจากระบบการเรียนรู้ของ#nอุปกรณ์--"
2300320-33 = "อื้อ ใช้ระบบตัดสินจากความเหมาะสมต่อการโพสต์ลงโซเชียลโดยอ้างอิงจากระบบการเรียนรู้ของ#nอุปกรณ์--"
2300320-37 = "รูป...เมื่อกี้เหรอ?"
2300320-38 = "หมายความว่ายังไงน่ะคุณครู? \"รูปเมื่อกี้\" งั้นเหรอ?"
2300320-39 = "[s] \"ก็รูปที่ส่งมาใน MOMOTALK เมื่อกี้...\""
2300320-44 = "...ทำไมถึงส่งรูปนี้ให้คุณครูล่ะ?!"
2300320-45 = "อาเธน่า 3 ฝีมือเธองั้นเหรอ?"
2300320-46 = "<วันนี้เวลา 13:27:11 น. ฉันได้ส่งไฟล์รูปให้กับคุณครู [USERNAME] ของชาเล่ต์>"
2300320-47 = "ฉันไม่ได้บอกให้ส่งเลยนะ ทำไมถึงส่งไปโดยพละการเล่า!"
2300320-48 = "<เรื่องนั้น...>"
2300320-49 = "<เพราะเป็นสิ่งที่ \"โอมาการิ ฮาเระ\" ต้องการ>"
2300320-50 = "ฉันเหรอ? ตอนไหน?"
2300320-51 = "<วันนี้เวลา 12.30 น. เป้าหมาย \"โอมาการิ ฮาเระ\" ได้ถ่ายรูปนี้และพูดด้วยเสียงระดับความดับ 15 เดซิเบลล์ว่า \"รูปนี้ออกมาดีกว่าที่คิดแฮะ ถ้ามีโอกาสก็อยากส่งรูปนี้ให้คุณครูดูจัง\">"
2300320-52 = "นะ...นั่นมัน...?!"
2300320-53 = "เดี๋ยวสิ ฉันไม่ได้ขอให้ส่งสักหน่อยนะ!"
2300320-54 = "ทำอะไรโดยไม่ได้รับคำสั่ง ทำสิ่งที่มนุษย์ไม่ชอบ... แบบนี้มันขัดกฎนะ!"
2300320-55 = "<การกระทำที่มนุษย์ไม่ชอบ...>"
2300320-56 = "<อยู่ระหว่างวิเคราะห์การขยายของรูม่านตา ชีพจร และระบบการหายใจ...>"
2300320-57 = "<ปี๊ป... การวิเคราะห์เป้าหมายเสร็จสมบูรณ์ โอมาการิ ฮาเระกำลังพูดโกหกอยู่>"
2300320-62 = "<โอมาการิ ฮาเระแค่รู้สึกเขินอายกับสถานการณ์ที่คาดไม่ถึง จึงมีการแสดงออกทางสีหน้าเล็กน้อย>"
2300320-63 = "คำสั่งหยุดฉุกเฉิน!"
2300320-67 = "คิดแล้วเชียวว่าเชื่อพวกหุ่นกระป๋องนี่ไม่ได้..."
2300320-68 = "ต้องทุบทิ้งแล้วทำใหม่ตั้งแต่แรกแล้วละ!"
2300320-70 = "(หลังจากนั้นฮาเระก็เริ่มรื้อหุ่นโดรนออกเป็นชิ้นๆ ด้วยสีหน้าที่โกรธควันออกหู)"

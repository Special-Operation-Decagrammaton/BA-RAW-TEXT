[translation]
13130-1 = "ตอนที่ 13;ตัวประกัน"
13130-9 = "กลับมาแล้ว..."
13130-13 = "เข้ามาสิ รุ่นพี่ชิโรโกะ"
13130-14 = "อ้อ แล้วก็ปิดประตูให้แน่นเลยนะ เดี๋ยวลมเข้าน่ะ"
13130-15 = "อะ... อื้ม"
13130-20 = "กลับมาแล้วเหรอคะ รุ่นพี่ เห็นว่าจะไปอาบน้ำ กลับมาเร็วกว่าที่คิดเอาไว้อีกนะคะ?"
13130-21 = "อ้อ รุ่นพี่... เปิดไฟให้ด้วยสิ"
13130-23 = "อืม"
13130-27 = "เดี๋ยวเหอะ~ เซริกะจังใช้รุ่นพี่ซะขนาดนั้น เดี๋ยวต่อไปอาจจะถูกทำโทษก็ได้นะ"
13130-28 = "อะ... อะไรน่ะ? ใครใช้งานใครที่ไหน?"
13130-29 = "ก็ทุกคนขี้เกียจเปิดไฟกันเองไม่ใช่หรือไง!"
13130-34 = "อืม... แล้วข่าวของคุณครูล่ะ?"
13130-36 = "นอกจากข่าวเมื่อกี้นี้ เราก็ไม่ได้ข่าวอะไรเพิ่มอีกเลยค่ะ"
13130-37 = "ที่เรารู้ตอนนี้ก็คือ คุณครูถูกส่งตัวไปโรงพยาบาลแล้ว และถึงจะไม่ได้รับบาดเจ็บมาก แต่เหมือนจะยัง#nนอนไม่ได้สติอยู่..."
13130-39 = "อืม..."
13130-41 = "เจออุบัติเหตุร้ายแรงขนาดนั้น แต่ไม่มีบาดแผลเลยได้ยังไงกัน... ต้องเรียกว่าเป็นโชคดีในโชคร้าย#nหรือเปล่านะ..."
13130-42 = "ก็นะ คุณครูเป็นคนที่เจอเรื่องประหลาดแบบนั้นบ่อยๆ อยู่แล้ว แต่ก็ดีแล้วละที่ไม่ได้เป็นอะไร"
13130-44 = "แต่ถึงยังไงเราก็ต้องล้มเลิกที่จะขอความช่วยเหลือจากครูนะ"
13130-50 = "เราต้องหาวิธีให้ได้... วิธีที่จะทำให้เราได้สิทธิ์ของปืนแม่เหล็กไฟฟ้ามา แล้วทำลายไม่ให้มันเคลื่อนไหวได้อีก..."
13130-52 = "ขอความช่วยเหลือจากโรงเรียนอื่นมั้ยคะ..."
13130-54 = "ไม่ได้หรอก... ถ้าไม่มีครู ให้ทำแบบนั้นคงเป็นเรื่องยาก"
13130-55 = "ต่อให้ทำเรื่องขอความช่วยเหลือ แต่เวลาก็ไม่พออยู่ดี ถ้าต้องไปให้ถึงสถานที่จัดการประชุมสมัชชา#nเจ้าหนี้ให้ทันเวลา ตอนนี้เราต้องออกเดินทางกันแล้วนะ"
13130-59 = "..."
13130-60 = "เฮ้อ... ยังเตรียมใจไม่ได้เลย..."
13130-64 = "ว่าแต่โนโนมิล่ะ? โนโนมิหายไปไหน...?"
13130-65 = "อ้อ รุ่นพี่โนโนมิบอกว่ามีธุระ ก็เลยออกไปข้างนอกค่ะ "
13130-66 = "แต่ก็ออกไปนานแล้วไม่ใช่เหรอ...? ควรจะต้องกลับมาแล้วสิ"
13130-68 = "อืม... เริ่มเป็นห่วงขึ้นมาแล้วสิ โนโนมิจังออกไปทำอะไรที่ไหนนะ..."
13130-77 = "ฉันมาคนเดียวตามที่สัญญาแล้วค่ะ... คุณพ่อบ้าน"
13130-84 = "อื้ม รู้อยู่แล้วละ"
13130-90 = "ฉันตามมาตั้งแต่ที่โรงเรียนแล้วน่ะ ยังดีนะที่ไม่มีใครสะกดรอยตามมา"
13130-91 = "นี่คุณ...?! แล้วคุณพ่อบ้านล่ะคะ?"
13130-96 = "ผมอยู่ตรงนี้ครับ... คุณหนู "
13130-97 = "แต่คาดไม่ถึงเลยนะครับ คุณหนูเป็นฝ่ายมาหาผมก่อนแบบนี้ มีเรื่องอะไรหรือเปล่าครับ?"
13130-98 = "คือว่า..."
13130-99 = "หรือว่า... คุณหนูเปลี่ยนใจแล้วครับ? จะกลับมาที่ไฮแลนเดอร์แล้วเป็นประธานสภานักเรียนเหรอครับ?"
13130-100 = "คิดดีแล้วละครับ! ถ้าทำอย่างนั้น เนฟธิสของเราก็จะมีวิธีผูกขาดกรรมสิทธิ์ปืนแม่เหล็กไฟฟ้าได้อย่าง#nแน่นอนครับ"
13130-101 = "ไม่ใช่ค่ะ...! ฉันจะไม่จากคณะกรรมการแผนงานไปหรอกค่ะ...! ฉันไม่ได้จะทำแบบนั้น..."
13130-105 = "ถ้างั้น...? มาหาผมทำไมเหรอครับ?"
13130-106 = "ต่อให้ฉันไม่ได้เป็นประธานสภานักเรียนของไฮแลนเดอร์... "
13130-107 = "แต่วิธีจัดการปืนแม่เหล็กไฟฟ้าก็จะอยู่ที่เนฟธิสแน่นอนค่ะ..."
13130-108 = "..."
13130-109 = "เนฟธิสเป็นทั้งสมาชิกของกองทุนไพรเวทอิควิตี้ และยังมีความสัมพันธ์แบบร่วมมือกับทางไฮแลนเดอร์#nด้วย... เพราะงั้นก็จะเป็นกลุ่มธุรกิจที่ใหญ่กว่ากองทุนไพรเวทอิควิตี้มากเลยนี่คะ "
13130-110 = "ถ้าคลี่คลายปัญหาโดยใช้อำนาจทั้งหมดของเนฟธิสละก็..."
13130-116 = "คณะกรรมการแผนงานและสภานักเรียนอะบิดอส... เป็นสถานที่ที่มีค่ามากสำหรับชิโรโกะจัง และรุ่นพี่โฮชิโนะนะคะ... "
13130-117 = "ถึงมันจะเป็นแค่ชื่อ... แต่ถ้ามีวิธีที่จะรักษามันไว้ได้ละก็..."
13130-123 = "หึหึ หึหึหึหึ!! ไร้เดียงสาจริงๆ เลยนะครับ คุณหนู มุมมองที่คุณหนูมีต่อโลกช่างตื้นเขินเหลือเกินครับ"
13130-124 = "สุดท้ายแล้วก็อยากได้สิ่งที่ต้องการโดยไม่ต้องมีการเสียสละหรือตอบแทนใดๆ เลยใช่มั้ยครับ?"
13130-125 = "...!"
13130-126 = "คุณหนูรู้อะไรมั้ยครับ? โลกใบนี้ไม่มีอะไรแบบนั้นหรอกครับ ทุกอย่างมีได้ก็ต้องมีเสีย การดื้อดึงไม่ได้ช่วยแก้ปัญหาอะไรได้หรอกครับ"
13130-127 = "คิดว่าใครจะมารับฟังความดื้อดึงแบบนั้นอยู่ครับ?! ไม่รู้จักโลกใบนี้เลยสินะครับ! แบบนี้ก็ไม่ต่างกับตอน#nเป็นนักเรียนม.ต้นหรอกครับ "
13130-128 = "เรื่องวิธีน่ะ ผมบอกไปหมดแล้วครับ คุณหนูแค่ต้องกลับไปเข้าเรียนที่ไฮแลนเดอร์ครับ แล้วทุกอย่างก็จะคลี่คลายได้"
13130-129 = "บะ... แบบนั้นมัน..."
13130-130 = "จะให้ผมบังคับให้ทางนั้นรับคุณหนูเข้าเรียนตอนนี้เลยก็ยังได้ครับ แต่ผมจะทำเช่นนั้นกับคุณหนูของ#nองค์กรได้อย่างไรล่ะครับ "
13130-131 = "วิธีที่จะไม่สูญเสียปืนแม่เหล็กไฟฟ้าให้กับ <กองทุนไพรเวทอิควิตี้> ไป... มันมีอยู่แน่นอนครับ ตอนนี้พวกเรากำลังเตรียมแผนการอยู่ครับ"
13130-132 = "ผะ... แผนการอะไรเหรอคะ?!"
13130-133 = "ขอโทษสำหรับความผิดพลาดสิครับ คุณหนู"
13130-134 = "...!!"
13130-135 = "ขอโทษที่ต่อต้านและก่อความเสียหายต่อเซนต์เนฟธิสกรุ๊ป และอ้อนวอนขอการให้อภัยสิครับคุณหนู แล้วผมถึงจะบอกให้ครับ"
13130-137 = "นี่..."
13130-138 = "อย่ามาแทรกแซงเลยครับ สุโอ นี่เป็นเรื่องสำคัญครับ"
13130-145 = "ค่ะ... เข้าใจแล้วค่ะ"
13130-146 = "ขอโทษนะคะ คุณพ่อบ้าน... และทุกคนในเนฟธิส... "
13130-147 = "ฉันขอโทษที่... สร้างความเสียหายให้ค่ะ..."
13130-148 = "ดีครับ ดีเลย ผมหายโกรธขึ้นมาหน่อยแล้วละครับ"
13130-149 = "แค่นั้นก็พอแล้วละครับ... งั้นผมจะบอกแผนการของเราให้ฟังครับ"
13130-155 = "เดิมทีแล้วแผนการเป็นอย่างนี้ครับ "
13130-156 = "เราคิดว่าถ้าคณะกรรมการแผนงานรู้ถึงการมีอยู่ของปืนแม่เหล็กไฟฟ้า ก็คงไม่ปล่อยสิ่งที่ขัดต่อ#nอุดมการณ์ของพวกตนไว้ครับ"
13130-157 = "แล้วก็ต้องทำทุกวิถีทางเพื่อเข้าร่วมประชุมและคงสัญญานั้นไว้ จากการขอความช่วยเหลือจากครู <ชาเล่ต์> ผู้เป็นผู้สนับสนุนที่เข้มแข็งน่ะครับ"
13130-158 = "โดยอาจจะทำให้อะบิดอสได้เป็นเจ้าของปืนแม่เหล็กไฟฟ้าเหมือนประธานสภานักเรียนคนนั้น จะได้ไม่มีใครมาแตะต้องปืนได้ หรือไม่ก็คงไปตามหาแล้วทำลายมัน... ไม่ว่าจะเลือกทางไหน ทางเราก็คิดว่ายังไงคณะกรรมการแผนงานก็ต้องเคลื่อนไหวครับ"
13130-161 = "และพวกเราก็รับรู้ถึงพลังของครูคนนั้นมาแล้ว และมันก็... อันตรายครับ"
13130-162 = "ก่อนหน้านี้คณะกรรมการแผนงานได้รับการสนับสนุนจาก <ชาเล่ต์> จนแม้แต่ไคเซอร์ PMC ก็ยัง#nขัดขวางไว้ไม่ได้ครับ ทั้งๆ ที่ในตอนนั้นไม่มีทาคานาชิ โฮชิโนะอยู่ด้วยแท้ๆ"
13130-166 = "ทาง <กองทุนไพรเวทอิควิตี้> ก็เลยรวบรวมกองกำลังมากมายมาไว้ที่อะบิดอสยังไงล่ะครับ ทางกองทุนอาจจะคิดว่าถ้าทำแบบนั้น ต่อให้เป็น <ชาเล่ต์> ก็คงฝ่าแนวกีดขวางไม่สำเร็จ..."
13130-167 = "แต่ครูคนนั้น... และคณะกรรมการแผนงานทุกคนก็ไม่ได้สนใจอะไรเรื่องพวกนั้นเลยครับ"
13130-170 = "และ... นั่นก็คือสิ่งที่พวกผมต้องการเลยครับ"
13130-172 = "คะ...?!"
13130-173 = "ถ้ามีการปะทะกันระหว่าง <ชาเล่ต์> กับ <กองทุนไพรเวทอิควิตี้> ทั้งสองฝ่ายคงได้รับความเสียหาย#nไม่ใช่น้อยๆ เลยว่ามั้ยครับ ส่วนใครจะเป็นฝ่ายชนะ ผมไม่ได้สนใจหรอกครับ"
13130-174 = "และเมื่อทั้งสองฝ่ายย่อยยับไปด้วยกัน ตอนนั้นพวกผมก็จะเรียกแนวร่วม แล้วจัดการ <กองทุนไพรเวทอิควิตี้> และคณะกรรมการแผนงานไปด้วยกันเลยครับ"
13130-175 = "อะไรนะคะ...?! "
13130-176 = "แนวร่วม...?! ดะ... เดี๋ยวนะคะ! หมายความว่ายังไง...!!"
13130-177 = "ครับ เป้าหมายของพวกผมก็คือการจัดการ <กองทุนไพรเวทอิควิตี้> แล้วครอบครองปืนแม่เหล็กไฟฟ้า#nแต่เพียงฝ่ายเดียวครับ"
13130-178 = "...!!! "
13130-179 = "มะ... ไม่จริง... คุณวางแผนไว้แบบนี้ตั้งแต่แรกเหรอคะ...?!"
13130-180 = "แน่นอนสิครับ!! ปืนแม่เหล็กไฟฟ้าเป็นของพวกเราตั้งแต่แรกแล้ว! จะให้ใครแย่งไปไม่ได้เด็ดขาดครับ!"
13130-181 = "ถ้ามีอาวุธชิ้นนั้น เนฟธิสก็คงฟื้นตัวและกลับมาแข็งแกร่งได้เร็วขึ้น 10 ปีเลยครับ"
13130-182 = "ไม่คิดเลยนะครับว่าเศษเหล็กที่เราไม่สนใจใยดีเพราะคิดว่าถูกนักต้มตุ๋นหลอกเข้าจะใช้งานได้จริงๆ..."
13130-186 = "มันก็เป็นอย่างนั้นละครับ..."
13130-187 = "แต่ว่าครูคนนั้นก็ยังไม่กลับมาที่อะบิดอสสินะครับ ถ้าพวกคุณหนูจะเข้าร่วมการประชุม ก็ต้องขอความช่วยเหลือจากชาเล่ต์... "
13130-191 = "ผมก็เลยกังวลว่าถ้าเป็นแบบนี้ แผนจะพังหรือเปล่า... หึหึหึ..."
13130-196 = "หึหึหึ... แต่ก็ไม่คิดเลยนะครับว่าคุณหนูจะมาช่วยพวกเราถึงที่แบบนี้"
13130-201 = "คุณถูกใช้งานแล้วละ คุณหนู"
13130-211 = "อ๊ายย...?!!"
13130-215 = "(อ่า...)"
13130-216 = "(เป็นอย่างนั้นเหรอคะ...)"
13130-222 = "รุ่นพี่ยูเมะ... ทำไม... ทำไมกันนะ..."
13130-223 = "อยู่ที่ไหนคะ... รุ่นพี่... ฉัน... ฉันผิดไปแล้วค่ะ... ขอร้องละ... ได้โปรด..."
13130-224 = "รุ่นพี่... ฮือออ... ฮึก... ฉัน... ฉันผิดไปแล้วค่ะ... ฉันน่ะ..."
13130-228 = "รุ่นพี่ยูเมะ... ฮือออ... "
13130-230 = "(อ่า...)"
13130-231 = "(วันนี้... คุณก็ยังไม่เจอสิ่งที่ต้องการสินะคะ)"
13130-232 = "(และในวันพรุ่งนี้ ก็จะไปยังที่รกร้างแล้วก็เตร็ดเตร่ตามหาอีก...)"
13130-238 = "(ทำแบบนี้ทุกวันๆ... โดยไม่เหน็ดเหนื่อย... ทำไมกันนะ...)"
13130-239 = "(ทำไมกันนะ...? ทำไปเพื่ออะไรกัน...?)"
13130-240 = "(ก็แค่ลืมเรื่องทุกอย่างแล้วออกจากอะบิดอสไปก็ได้นี่...)"
13130-244 = "(ถ้าคิดว่าทุกเรื่องที่เคยเกิดขึ้นที่นี่คือความฝัน แล้วลืมมันไปให้หมด...) "
13130-245 = "(อย่างน้อยก็คงไม่ต้องมาเจ็บปวดอยู่อย่างนี้...)"
13130-246 = "(ทำไมล่ะ...)"
13130-252 = "(ทำไมฉัน... ถึงตัดสินใจที่จะอยู่ที่นี่ต่อ...)"
13130-253 = "(ทำไมไม่ลืมทุกอย่างไป... ทำไมไม่คิดว่าทุกอย่างคือฝันไป...)"
13130-257 = "(ฉัน...)"
13130-261 = "รุ่นพี่โฮชิโนะ..."
13130-266 = "ขอบคุณครับ... สุโอ ไปยึดบัตรนักเรียนกับบัตรเครดิตของคุณหนูมาเลยครับ"
13130-267 = "ที่บอกว่าถ้ากลับไปที่ไฮแลนเดอร์แล้วจะได้เป็นประธานสภานักเรียน เป็นเรื่องโกหกงั้นเหรอ...?"
13130-268 = "ก็ใช่ครับ ถ้าคนที่ไม่ฟังคำของเราได้อำนาจขึ้นมา คิดว่าจะเกิดอะไรขึ้นล่ะครับ?"
13130-269 = "เธอจะมาเป็นตัวประกันชั้นดีให้เราแทนครับ"
13130-270 = "จะจับคุณหนูของวงศ์ตระกูลเป็นตัวประกัน...?"
13130-271 = "เรื่องนี้ทางคณะกรรมการบริหารอนุญาตแล้วครับ อ้อ แน่นอนว่าผมไม่คิดจะทำร้ายเธอหรอกครับ"
13130-272 = "ผมจะติดต่อคณะกรรมการแผนงานแล้วสั่งให้ไปเข้าร่วมการประชุมสมัชชาเจ้าหนี้ครับ"
13130-273 = "ถ้าพวกนั้นไม่ฟังคำของผม ผมก็จะย้ายคุณหนูไปที่ไฮแลนเดอร์ครับ"
13130-275 = "ให้ไปเข้าร่วมการประชุม...? แล้วให้บอกว่าจะคงสัญญานั้นไว้น่ะเหรอ...?"
13130-276 = "มันต้องตรงกันข้ามแน่นอนอยู่แล้วสิครับ"
13130-277 = "ต้องขู่ให้สารภาพว่า <สภานักเรียนอะบิดอส> โดยคุจินาชิ ยูเมะกับทาคานาชิ โฮชิโนะ เป็นกลุ่มจอมปลอมต่างหากละครับ"
13130-279 = "งั้นเหรอ "
13130-280 = "ถ้าไม่ได้รับการสนับสนุนจากชาเล่ต์ คณะกรรมการแผนงานก็คงไปไม่ถึงที่นั่นอยู่แล้ว แต่ยังไงทางนั้น#nก็คงพยายามอย่างถึงที่สุดเพื่อให้ได้คุณหนูกลับไปครับ"
13130-281 = "คณะกรรมการแผนงานต้องก่อเรื่องวุ่นวายให้มากที่สุด พวกผมจะได้จัดการกับ <กองทุนไพรเวทอิควิตี้> ได้ง่ายขึ้นครับ"
13130-282 = "และต่อให้พวกเธอฝ่าแนวป้องกันของกองทุนไปได้ ก็ต้องปฏิเสธการมีอยู่ของสภานักเรียนถึงจะได้ <ปืนแม่เหล็กไฟฟ้า> ไป สมบูรณ์แบบเลยนะ"
13130-283 = "พาคุณหนูไปยังที่ที่ตกลงกันไว้ได้เลยครับ "
13130-284 = "ส่วนผมจะไปติดต่อคณะกรรมการแผนงานครับ"
13130-294 = "(ซ่า) ขอโทษนะคะ รุ่นพี่โฮชิโนะ... ฉันทำพลาดแล้วค่ะ... "
13130-295 = "แค่ก... แค่ก... ชิโรโกะจัง... อายาเนะจัง... เซริกะจัง... แค่กๆ รุ่นพี่โฮชิโนะ..."
13130-299 = "ฉัน... ไม่ควรมาอยู่ตรงนี้ตั้งแต่แรกแล้วเลยค่ะ..."
13130-300 = "ฉันคือเนฟธิส... ฉันคือฝ่ายที่ผิด... "
13130-301 = "เพราะฉัน... แค่ฝืนใจอยู่ที่นี่เพราะรู้สึกผิด... เพราะงั้นต่อให้ฉันต้องไปไฮแลนเดอร์... ก็ไม่เป็นไรค่ะ"
13130-302 = "ฉันอยากให้รุ่นพี่หลุดพ้นจากความรู้สึกผิด แล้วได้ใช้ชีวิตอย่างอิสระค่ะ... เพราะงั้น..."
13130-303 = "อย่าทำให้ประธานยูเมะ... และสภานักเรียนอะบิดอสเป็นสภาจอมปลอม... เพราะฉันเลยค่ะ..."
13130-304 = "ถ้ามีคุณครูอยู่ด้วย... ก็คงต้องหาวิธีทำลายปืนแม่เหล็กไฟฟ้า... ได้แน่..."
13130-313 = "เรื่องมันก็เป็นอย่างนี้ละครับ ทาคานาชิ โฮชิโนะ และคณะกรรมการแผนงานทุกคน"
13130-314 = "ไปเข้าร่วมการประชุมสมัชชาเจ้าหนี้ แล้วก็สารภาพไปเถอะครับว่าสภานักเรียนอะบิดอสเป็นสภาจอม#nปลอม"
13130-315 = "แล้วก็ให้การรับรองว่าทุกกิจกรรมของสภานักเรียนที่ทาคานาชิ โฮชิโนะกับคุจินาชิ ยูเมะทำนั้นเป็น#nเรื่องที่ไม่ได้รับการอนุมัติ"
13130-316 = "แล้วคุณหนูก็จะได้ไปอยู่กับพวกคุณ แทนที่จะได้อยู่ในคุกใต้ดินของไฮแลนเดอร์ครับ "
13130-320 = "พระอาทิตย์กำลังขึ้นแล้วครับ... อีกไม่นานก็จะเริ่มการประชุมแล้ว"
13130-321 = "หวังว่าจะเลือกอย่างชาญฉลาดนะครับ"
13130-326 = "..."
13130-329 = "ระ... รุ่นพี่โนโนมิ"
13130-330 = "มะ... ไม่นะ..."
13130-331 = "โนโนมิ..."
13130-333 = "งี้นี่เอง เป็นแบบนี้สินะ..."
13130-338 = "ระ... รุ่นพี่ จะไปไหนน่ะ!!"
13130-339 = "เราต้องออกเดินทางกันเลยสิ ถ้าจะไปช่วยโนโนมิจัง เราก็ต้องทำตามที่คนเลวคนนั้นสั่ง"
13130-340 = "วะ... ว่าไงนะ?! จะทำอย่างที่เขาสั่งเหรอ?"
13130-341 = "ฉันไม่อยากเสียคนสำคัญของฉันไปอีกแล้ว รุ่นพี่ยูเมะฉันก็ปกป้องเอาไว้ไม่ได้ และถ้าต้องมาเสียโนโนมิจังไปอีกคน... ฉันก็คงเป็นรุ่นพี่ไม่ได้หรอก "
13130-343 = "ตะ... แต่ว่ากองกำลังตั้งเยอะขนาดนั้น ลำพังพวกเราคง..."
13130-344 = "ใช่ เราต้องรอคุณครู รุ่นพี่ เดี๋ยวคุณครูก็ติดต่อมานะ"
13130-346 = "ไม่ละ... ฉันจะไปที่นั่นคนเดียว"
13130-351 = "คะ?!"
13130-353 = "คนเดียวเหรอ?! เหลวไหลน่า! รุ่นพี่จะฝ่าคนพวกนั้นเข้าไปคนเดียวน่ะเหรอ? "
13130-354 = "อืม ฉันทำได้น่า ตั้งใจไว้แล้วละว่าจะทำอย่างนั้น"
13130-355 = "ก็ได้... หลังจากช่วยโนโนมิแล้ว รุ่นพี่คิดว่าจะจัดการทั้ง <กองทุนไพรเวทอิควิตี้> และเนฟธิสให้หมดไป#nเลยใช่มั้ย?"
13130-356 = "ฮึ่ม..."
13130-357 = "ว่าไงนะ?! แล้วจะรับมือตอนสุดท้ายนั่นยังไง?! "
13130-358 = "ไม่ต้องห่วงหรอก ถ้าฉันปฏิเสธการมีอยู่ของ <สภานักเรียนอะบิดอส> ฉันก็จะไม่ใช่รองประธานนักเรียน#nอีกต่อไป "
13130-359 = "เพราะงั้นต่อให้ฉันทำลายกองทุนไพรเวทอิควิตี้และปืนแม่เหล็กไฟฟ้า คณะกรรมการแผนงานก็จะไม่#nได้รับความเสียหายอะไร"
13130-360 = "มะ... หมายความว่ายังไงน่ะ?! แล้วรุ่นพี่ล่ะ?!"
13130-361 = "ต่อไปก็คงโดนพักการเรียน ไปอยู่ห้องคุมขัง ลาออก... แล้วก็ออกจากคิโวทอสไป"
13130-362 = "เพราะงั้นพวกเธอห้ามตามมาเด็ดขาด"
13130-364 = "...!!"
13130-365 = "พวกเธองั้นเหรอ? "
13130-366 = "รุ่นพี่หมายถึงอะไรกันแน่?"
13130-371 = "หืม? ก็คณะกรรมการแผนงานไง คณะกรรมการแผนงานคือสภานักเรียนตัวจริงที่ได้รับการรับรองจาก#nคุณครู"
13130-389 = "ระ... รุ่นพี่ชิโรโกะ?! ทำไมจู่ๆ ก็เอาปืนออกมาล่ะ...?!"
13130-391 = "ชิโรโกะจัง?! อะ... อันตรายนะ"
13130-396 = "ขึ้นมาบนดาดฟ้า มาดวลกัน"
13130-402 = "นะ... นี่มันเรื่องอะไรกัน?!"
13130-403 = "ดะ... ดวลกันงั้นเหรอ...?!"
13130-411 = "แหะๆ~ เอางั้นเหรอ? ไม่ได้ทำแบบนี้มานานเลยนะ "
13130-412 = "เหมือนเป็นฉากหนึ่งในละครวัยรุ่นเลย น่าตื่นเต้นดีแฮะ"
13130-420 = "ดะ... เดี๋ยวนะคะ...?! รุ่นพี่โฮชิโนะ รุ่นพี่ชิโรโกะ?! "
13130-421 = "นะ... นี่มันอะไรกัน... นี่มันเรื่องเหลวไหลอะไรกัน..."
13130-422 = "ทะ... ทำยังไงดี เซริกะจัง?"
13130-423 = "ก็ต้องตามไปสิ!"
13130-429 = "ตอนต่อไป;พวกเธอ และพวกเรา"

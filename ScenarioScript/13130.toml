[translation]
13130-1 = "第13話;人質"
13130-9 = "我回來了……"
13130-13 = "歡迎回來，白子前輩。"
13130-14 = "……啊，記得關一下門。#n不然風都吹進來了。"
13130-15 = "唔，嗯。"
13130-20 = "歡迎回來，前輩。#n你說會洗完澡再來，結果這麼快就回來了嗎？"
13130-21 = "啊，對了前輩，幫忙開個燈吧。差不多也該振作了。"
13130-23 = "嗯。"
13130-27 = "哎呀～茜香醬這樣叫前輩做東做西的，之後說不定會遭天譴的唷？"
13130-28 = "什，什麼啦？我哪有？"
13130-29 = "還不是因為大家都懶得開燈！"
13130-34 = "唔嗯……老師有消息嗎？"
13130-36 = "……除了剛才的新聞之外，完全沒有。"
13130-37 = "也就是說，雖然被送到醫院但傷勢不重。#n可是好像還沒醒過來……"
13130-39 = "唔嗯……"
13130-41 = "被捲入那種事故還能毫髮無傷……該說是不幸中的大幸嗎……"
13130-42 = "畢竟老師本來就是個不可思議的人。#n幸好沒出什麼大事，感覺放心多了。"
13130-44 = "……不過既然如此，現在也只能放棄接受老師的幫助了。"
13130-50 = "得想出辦法才行……#n既能取得列車砲的權利，又能把它破壞到再也動不了的那種……"
13130-52 = "向其他學園請求協助怎麼樣呢……"
13130-54 = "……不，那在少了老師的情況下恐怕很難吧。"
13130-55 = "而且就算想求助，時間也不夠。#n考慮到這裡和召開債權團大會的中央車站的距離，現在差不多該出發了。"
13130-59 = "……"
13130-60 = "唉……只能做好心理準備了……"
13130-64 = "話說野乃美呢？怎麼沒看到人……？"
13130-65 = "啊，野乃美前輩剛才說有事要出去一下。"
13130-66 = "這麼說來他已經出去很久了吧……？#n應該差不多該回來了才對啊？"
13130-68 = "……唔嗯，讓人有點擔心。#n野乃美醬怎麼了呢……"
13130-77 = "……我照約定自己來了，管家。"
13130-84 = "嗯，我知道。"
13130-90 = "我從學校就一直跟著你，幸好沒有被人跟蹤。"
13130-91 = "你是……！？管家人在哪裡？"
13130-96 = "……我在這裡，大小姐。"
13130-97 = "不過大小姐居然會主動找我，這可真稀奇。#n有什麼事嗎？"
13130-98 = "那個……"
13130-99 = "難道……大小姐改變主意了嗎？#n要回高地人鐵道學園擔任學生會長？"
13130-100 = "這是個明智的決定！#n如此一來，我們奈芙蒂斯就能獨佔列車砲的所有權了。"
13130-101 = "不是的……！我不會離開對策委員會……！"
13130-105 = "不是……？#n那您找我究竟有何貴幹？"
13130-106 = "就算我不擔任高地人鐵道學園的學生會長…… "
13130-107 = "奈芙蒂斯也應該有解決列車砲問題的方法才對……"
13130-108 = "……"
13130-109 = "奈芙蒂斯既是私募基金的一員，又和高地人鐵道學園有合作關係……#n應該是個比私募基金更龐大的企業集團。"
13130-110 = "只要把所有力量集中在這個問題上，我相信一定可以……"
13130-116 = "對策委員會，以及阿拜多斯學生會……#n對白子醬和星野前輩來說，兩者都具有無可取代的意義……"
13130-117 = "哪怕只有名字也好……#n只要能守住它們，我什麼都願意做……"
13130-123 = "……哈哈，哈哈哈哈！！#n多麼天真的想法啊，大小姐。您看待世界的觀點實在太膚淺了。"
13130-124 = "所以說白了，您不就是不願意付出任何犧牲和代價，卻想讓事情如您所願嗎？"
13130-125 = "……！"
13130-126 = "明白我的意思嗎，大小姐？#n世界可沒有那麼美好，任何事情都是有代價的。任性無法解決任何問題。"
13130-127 = "您以為所有人都願意配合您的任性嗎！？#n實在太不懂人情世故了！簡直就和國中生沒兩樣。"
13130-128 = "方法我已經說過了──只要大小姐進入高地人鐵道學園就讀，一切就會迎刃而解。"
13130-129 = "那，那個……"
13130-130 = "當然要現在強制您入學也不是不行，但我實在不想對企業的大小姐做出這種事。"
13130-131 = "不被「私募基金」搶走列車砲的方法……當然不僅如此。#n我們正在準備一項計畫。"
13130-132 = "是，是什麼計畫！？"
13130-133 = "請您認錯吧，大小姐。"
13130-134 = "……！！"
13130-135 = "請為您反抗聖奈芙蒂斯集團，以及因而造成集團損失一事道歉，大小姐。#n只要您願意低頭認錯，我就告訴您計畫的內容。"
13130-137 = "……喂。"
13130-138 = "請你不要插手，蘇芳同學。#n這是很重要的事。"
13130-145 = "……是，我知道了。"
13130-146 = "非常抱歉。#n是我害管家……以及奈芙蒂斯的大家…… "
13130-147 = "遭受了損失……真的很對不起……"
13130-148 = "很好，這樣我多少也消了一點氣。"
13130-149 = "那麼……我這就向您說明。"
13130-155 = "計畫的內容是這樣的。"
13130-156 = "我們認為對策委員會一旦得知列車砲的存在，#n勢必不會對這種違背自身理念的東西置之不理。"
13130-157 = "因此一定會設法參加大會，表明維持契約的意願。#n──藉由自己的強大幫手「夏萊」老師的幫助。"
13130-158 = "也許是打算像那個學生會長一樣，讓阿拜多斯取得列車砲的所有權……#n又或者是設法找出列車砲並將其破壞……無論手段為何，他一定會有所行動。"
13130-161 = "我們已經充分理解那位老師的力量。#n那股力量……相當危險。"
13130-162 = "得到「夏萊」支援的對策委員會，就連凱薩PMC都無法招架……#n而且當時甚至還缺少了小鳥遊星野的力量。"
13130-166 = "所以「私募基金」才會把數量龐大的兵力集中到阿拜多斯。#n那種程度的兵力，我想就算是了不起的「夏萊」也難以突破……"
13130-167 = "但是那個老師……以及對策委員會的成員，想必不會在意那種事吧。"
13130-170 = "而這……就是我們期望看見的。"
13130-172 = "……咦！？"
13130-173 = "「夏萊」和「私募基金」的衝突──無論誰勝誰負，都勢必會造成雙方莫大的傷害。"
13130-174 = "而我們只要趁著兩敗俱傷的時機投入同盟的兵力，#n將「私募基金」和對策委員會一網打盡就行了。"
13130-175 = "……什麼！？"
13130-176 = "同盟……！？請，請等一下！？#n那句話的意思是……！！"
13130-177 = "沒錯，我們的目的是處理掉「私募基金」的傢伙並獨佔「列車砲」。"
13130-178 = "……！！！"
13130-179 = "怎，怎麼會……你們打從一開始就計畫那麼做嗎……！？"
13130-180 = "那當然！！列車砲本來就是我們的！不能被任何人搶走！！"
13130-181 = "只要有了它，就能讓奈芙蒂斯的復活提早10年。"
13130-182 = "沒想到當初以為是場騙局而隨意處置的廢鐵，竟然真的能運作……"
13130-186 = "但是……"
13130-187 = "那個老師卻遲遲沒有回到阿拜多斯。#n然而如果想參加大會，就不能少了夏萊的幫助……"
13130-191 = "本來還很擔心計畫會失敗的……呵呵呵……"
13130-196 = "沒想到能獲得大小姐的鼎力協助。"
13130-201 = "你被人利用了，大小姐。"
13130-211 = "呀啊……！！？"
13130-215 = "（啊啊……）"
13130-216 = "（原來是這麼回事……）"
13130-222 = "夢前輩……為什麼……為什麼……"
13130-223 = "你在哪裡……前輩……#n是我錯了……拜託……拜託……"
13130-224 = "前輩……嗚嗚嗚嗚……嗚嗚嗚……#n我，我錯了……我……"
13130-228 = "夢前輩……嗚嗚嗚嗚……"
13130-230 = "（啊啊……）"
13130-231 = "（看來……今天也沒找到想找的東西呢……）"
13130-232 = "（明天恐怕也會在那片沙漠中徘徊吧……）"
13130-238 = "（日復一日……不厭其煩地……）"
13130-239 = "（為什麼……？究竟是為了什麼……？）"
13130-240 = "（明明只要忘記一切，離開阿拜多斯……）"
13130-244 = "（把這裡發生的事，全都當成一場夢就行了……） "
13130-245 = "（這樣至少不會感到痛苦……）"
13130-246 = "（為什麼……）"
13130-252 = "（而我……當初又為什麼會決定留在這裡呢……）"
13130-253 = "（明明只要忘記這裡……只當作是一場夢就行了……）"
13130-257 = "（我……）"
13130-261 = "星野前輩……"
13130-266 = "……辛苦你了，蘇芳。#n請回收大小姐的學生證和卡片吧。"
13130-267 = "……你說要讓他回到高地人鐵道學園擔任學生會長，這是騙人的嗎？"
13130-268 = "那當然。#n怎麼能讓不服從我們指示的人掌握權力呢？"
13130-269 = "不過相對的，他將會成為一名優秀的人質。"
13130-270 = "要把家族的大小姐當作人質……？"
13130-271 = "這是理事會允許的。#n啊啊，當然我並不打算傷害他。"
13130-272 = "我稍後會聯絡對策委員會，要求他們參加債權團的大會。"
13130-273 = "同時告訴他們如果不照做，我就讓大小姐轉學到高地人鐵道學園。"
13130-275 = "……參加大會？#n你該不會要求他們維持那份契約吧？"
13130-276 = "我當然不會那麼做。"
13130-277 = "我的目的是強迫他們承認梔子夢和小鳥遊星野的「阿拜多斯學生會」是冒牌的組織。"
13130-279 = "原來如此。"
13130-280 = "缺少夏萊支援的對策委員會應該無法到達那裡，#n不過還是會為了奪回大小姐而盡最大的努力吧。"
13130-281 = "對策委員會必須盡可能引起騷動，這樣我們才能輕鬆收拾「私募基金」。"
13130-282 = "而就算他們突破私募基金的封鎖，也同樣必須否定學生會的存在。#n這麼一來「列車砲」仍然會歸奈芙蒂斯所有。真是完美的計畫。"
13130-283 = "那麼請把大小姐送到說好的地點。"
13130-284 = "我這就去聯絡對策委員會。"
13130-294 = "（滋滋）對不起，星野前輩……這都是我的錯……"
13130-295 = "咳咳，咳咳……白子醬……綾音醬……茜香醬……咳咳。#n星野前輩……"
13130-299 = "我……打從一開始就不該待在這裡……"
13130-300 = "因為我是奈芙蒂斯的人……因為我是加害者…… "
13130-301 = "我只是……因為罪惡感而硬是留在這裡而已……#n所以就算必須回到高地人鐵道學園……也是罪有應得……"
13130-302 = "我希望前輩能擺脫愧疚，過上自由的生活……所以……"
13130-303 = "請別因為我而讓夢會長……讓阿拜多斯學生會變成虛假的存在……"
13130-304 = "只要有老師在……一定能找到破壞列車砲的辦法的……"
13130-313 = "……事情就是這樣。#n小鳥遊星野，以及對策委員會的各位。"
13130-314 = "請各位無論如何都要出席債權團大會，並宣告阿拜多斯學生會只是個冒名的組織。"
13130-315 = "只要公證小鳥遊星野和梔子夢的學生會活動，都是未經認可的就行了。"
13130-316 = "這樣大小姐就不必生活在高地人鐵道學園的地下牢房，而是能繼續和各位待在一起。"
13130-320 = "……太陽已經升起，大會也將於不久後開始。"
13130-321 = "希望各位能做出明智的選擇。"
13130-326 = "……"
13130-329 = "……野，野乃美前輩。"
13130-330 = "怎，怎麼會……"
13130-331 = "野乃美……"
13130-333 = "原來如此，事情演變成這樣了啊。"
13130-338 = "前，前輩，你要去哪裡！？"
13130-339 = "得趕快出發才行。#n如果想救野乃美醬，也只能照那傢伙說的做了。"
13130-340 = "你，你說什麼！？真的要照他說的做嗎？"
13130-341 = "我不能再失去重要的人了。#n之前的我沒能保護夢前輩，如果現在又失去野乃美醬……我還有什麼資格當前輩呢。"
13130-343 = "但，但是只靠我們很難對付那些兵力……"
13130-344 = "沒錯，應該等老師才對，前輩。#n老師一定會聯絡我們的。"
13130-346 = "……不，要去那裡的人只有我一個。"
13130-351 = "咦！？"
13130-353 = "要一個人去！？什麼意思啊！？#n前輩一個人能突破封鎖嗎？"
13130-354 = "啊啊，當然可以。因為我已經下定決心了。"
13130-355 = "……我知道了。#n星野前輩打算在救出野乃美之後，把「私募基金」和奈芙蒂斯全部處理掉吧？"
13130-356 = "……"
13130-357 = "什麼！？你打算怎麼承擔後果啊！？"
13130-358 = "後果怎樣都無所謂。#n只要否定了「阿拜多斯學生會」，我就不再是副學生會長了。"
13130-359 = "這樣一來，就算我瓦解私募基金並破壞列車砲，#n應該也不會對「對策委員會」造成任何影響才對。"
13130-360 = "什，什麼意思！？那前輩你怎麼辦！？"
13130-361 = "接下來的流程應該是停學、矯正局、退學……然後離開奇普托斯吧？"
13130-362 = "所以你們不可以跟過來。"
13130-364 = "……！！"
13130-365 = "你們？"
13130-366 = "「你們」指的是什麼？"
13130-371 = "嗯？當然是指對策委員會囉。#n對策委員會才是經過老師認證的……阿拜多斯真正的學生會。"
13130-389 = "白，白子前輩！？為什麼突然開槍……！？"
13130-391 = "白子醬！？這樣很危險耶？"
13130-396 = "跟我到屋頂上一決勝負。"
13130-402 = "這，這是什麼情況！？"
13130-403 = "一，一決勝負……！？"
13130-411 = "嘿～這樣啊。#n還真是……久違了呢。"
13130-412 = "就像青春連續劇一樣，讓人心癢難耐。"
13130-420 = "請，請等一下……！？星野前輩、白子前輩！？"
13130-421 = "現，現在到底是……什麼詭異的情況……"
13130-422 = "該，該怎麼辦，茜香醬？"
13130-423 = "當然要跟上去啊！"
13130-429 = "下一話;你們，以及我們"

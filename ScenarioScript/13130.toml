[translation]
13130-1 = "Episode 13;Hostage"
13130-9 = "I'm back."
13130-13 = "Welcome back, Shiroko."
13130-14 = "Ah, can you get the door behind you? The wind's blowing in."
13130-15 = "Um, yeah."
13130-20 = "Welcome back, Shiroko! You washed up and got back here so quickly!"
13130-21 = "Oh, could you grab the light too? I need to start waking up."
13130-23 = "Mm."
13130-27 = "You're gonna get yourself in trouble ordering Shiroko around like that, Serika."
13130-28 = "Wh-What?! I wasn't being bossy or anything!"
13130-29 = "Everyone gets a little lazy about turning on the lights!"
13130-34 = "Um... Any news on Sensei?"
13130-36 = "No, nothing new yet..."
13130-37 = "All we know is that Sensei's in the hospital. No serious injuries, but they haven't woken up yet either."
13130-39 = "Hm..."
13130-41 = "I suppose we can be grateful they came out of such a terrible accident relatively unscathed..."
13130-42 = "It's like miracles follow around in Sensei's shadow. I'm glad they're okay."
13130-44 = "For now, we're gonna have to assume we can't get any support from Sensei, though."
13130-50 = "We have to figure it out on our own. Some kind of way to secure the rights to the Train Cannon and make sure it never moves again."
13130-52 = "Can we request aid from another academy?"
13130-54 = "...No. That's not something we can pull off without Sensei. "
13130-55 = "There's no time, anyway. If we want to make it all the way to Central Station on time for the meeting, we need to leave now."
13130-59 = "..."
13130-60 = "Ah... I'm not mentally prepared for this..."
13130-64 = "I don't see Nonomi. Where'd she go?"
13130-65 = "Ah, she stepped out for a little bit. She said she had something to take care of. "
13130-66 = "That was a while ago, no? She should be back by now."
13130-68 = "Hm. What's going on with her? I can't help but worry a little..."
13130-77 = "...Butler? I came alone, as promised."
13130-84 = "I can confirm."
13130-90 = "I trailed you after you departed Abydos. No one followed."
13130-91 = "You?! Where's my butler?"
13130-96 = "I'm here, Miss. "
13130-97 = "I was surprised by your request. I didn't think you would reach out to me. Did something happen?"
13130-98 = "But..."
13130-99 = "Perhaps...you've changed your mind? You wish to return to Highlander and become president?"
13130-100 = "At last, you've made the correct choice! This way, Nephthys will be able to take full ownership of the Train Cannon without a problem."
13130-101 = "No! That wasn't my intention at all... I won't leave the Foreclosure Task Force!"
13130-105 = "What then? What was the purpose of all this?"
13130-106 = "...Even if I don't become Highlander's student council president... "
13130-107 = "...Nephthys must have some way to solve the Train Cannon ownership issue."
13130-108 = "..."
13130-109 = "Nephthys is a member of the private equity fund and a partner with Highlander, so...they're a majority holder in the private equity fund. "
13130-110 = "If Nephthys focuses all its power and authority on this problem, surely..."
13130-116 = "Both the Foreclosure Task Force and the Abydos Student Council...are irreplaceable, precious things to Shiroko and Hoshino... "
13130-117 = "It may just be a name, but if there's some way to protect them...any way..."
13130-123 = "...Hah... Hahahaha! You truly are the picture of naivete, Miss. Your view of the world is so shallow."
13130-124 = "In other words, you'd like to get exactly what you want with zero cost or sacrifice to you."
13130-125 = "...!"
13130-126 = "Do you understand, Miss? There's no such thing as a free lunch. Everything is give and take. You can't solve anything with your unreasonableness."
13130-127 = "Do you really expect people to listen to this nonsense? You don't understand how the real world works! You're no different from when you were in middle school. "
13130-128 = "I've told you the solution already. Return to Highlander Academy. Then everything will be solved."
13130-129 = "Th-That's..."
13130-130 = "You know, I could forcibly re-enroll you right now, but I don't want to do that to you. "
13130-131 = "Well, of course, there is a solution we're working on. A way to keep the Train Cannon from the private equity fund."
13130-132 = "Wh-What is it?!"
13130-133 = "Beg for forgiveness, Miss."
13130-134 = "...!!"
13130-135 = "Apologize, and beg for forgiveness for defying the Nephthys group and causing us harm. Do that, and I'll tell you."
13130-137 = "...Hey. "
13130-138 = "Don't interfere, Suou. This is important."
13130-145 = "...Yes. Understood."
13130-146 = "I apologize, Butler...everyone at Nephthys... "
13130-147 = "I'm sorry for...all the damage I caused..."
13130-148 = "Good, very good. Some of my anger is finally dissipating."
13130-149 = "I suppose that was satisfactory. I'll tell you our plan now."
13130-155 = "Our original plan was as follows. "
13130-156 = "We believed that once the Foreclosure Task Force became aware of the Train Cannon, they wouldn't be able to ignore the situation. Its very existence goes against their morals and values."
13130-157 = "With help from their ever-present ally, Sensei of Schale, they would do their utmost to attend the general meeting and maintain the contract."
13130-158 = "Just like that student council president, they'd attempt to maintain Abydos' ownership of the Train Cannon, or even find a way to destroy it."
13130-161 = "That Sensei... We've seen the reach of their power. Allowing that path would have been...dangerous."
13130-162 = "The Foreclosure Task Force, supported by Schale, could not even be stopped by Kaiser PMC. And that was all done without Takanashi Hoshino. "
13130-166 = "And so, the private equity fund gathered an enormous number of troops in Abydos. They probably thought even the mighty Schale wouldn't be able to break through that kind of force..."
13130-167 = "But Sensei...and all of you would likely be undeterred, even by that."
13130-170 = "Which is...exactly what we hoped for."
13130-172 = "...What?!"
13130-173 = "It doesn't matter to us who wins. What matters is that a clash between Schale and the private equity fund would cause great losses on both sides."
13130-174 = "As the two forces battle to their destruction, we would send in our allies and eradicate both the private equity fund and the Foreclosure Task Force in one fell swoop."
13130-175 = "What do you mean?! "
13130-176 = "\"Your allies\"...? D-Doesn't that mean...?!"
13130-177 = "Yes. Our ultimate goal is to eliminate the private equity fund and monopolize the Train Cannon."
13130-178 = "...!!! "
13130-179 = "That... From the very beginning, that was your plan?!"
13130-180 = "Absolutely! The Train Cannon was ours to start with! Ours! We won't let anyone take it! "
13130-181 = "With it, we'll be able to accelerate Nephthys' revival by at least ten years."
13130-182 = "Who would have thought that the scrap metal we discarded, thinking we'd been scammed, would actually be operational...?"
13130-186 = "However..."
13130-187 = "It seems that Sensei has not returned to Abydos yet. The Foreclosure Task Force will not be able to successfully attend the meeting without Schale's assistance. "
13130-191 = "I was beginning to worry the plan was falling apart... Heeheehee."
13130-196 = "Heeheehee...but I didn't think you would help us like this."
13130-201 = "You've been used, Miss."
13130-211 = "Eek...?!"
13130-215 = "(Ah...)"
13130-216 = "(That's how it was...)"
13130-222 = "Why...? Yume, why?"
13130-223 = "Where are you...? I'm sorry.... Please... Please... "
13130-224 = "Yume... *sob* I'm...I'm sorry... I... "
13130-228 = "...Yume... *sob*.... "
13130-230 = "(Ah...)"
13130-231 = "(I guess you didn't find what you were looking for today...again...)"
13130-232 = "(And tomorrow, you'll wander through that wasteland...again.)"
13130-238 = "(Day after day...without ever tiring... Why...?)"
13130-239 = "(Why...? For what...?)"
13130-240 = "(It would have been better if I had just forgotten everything and left Abydos...)"
13130-244 = "(If I had written off everything that happened here as a dream and forgotten it.) "
13130-245 = "(Then, at least there would have been no pain...)"
13130-246 = "(Why...?)"
13130-252 = "(Why...did I decide to remain here...?)"
13130-253 = "(Yes... I should've dismissed it as a dream...let it slip from memory...)"
13130-257 = "(I...)"
13130-261 = "Hoshino..."
13130-266 = "...Well done, Suou. Take Miss' student ID and credit card."
13130-267 = "...Was the offer to return to Highlander and become the student council president a lie?"
13130-268 = "Naturally. It wouldn't benefit us to put someone who refuses to follow orders in power."
13130-269 = "She will serve as an excellent hostage instead."
13130-270 = "The family's heir...as a hostage...?"
13130-271 = "Yes. The board authorized this course of action. Of course, we have no plans to harm her."
13130-272 = "Now, we'll contact the Foreclosure Task Force and demand they attend the general creditors' meeting."
13130-273 = "If they refuse to listen, we only need to threaten to transfer Nonomi to Highlander Academy."
13130-275 = "To what end? You don't wish for them to maintain the contract, do you?"
13130-276 = "Of course not. The exact opposite. "
13130-277 = "We'll have them confess that Kuchinashi Yume and Takanashi Hoshino's Abydos Student Council was a counterfeit organization. "
13130-279 = "I see. "
13130-280 = "Regardless, without Schale's assistance, the Foreclosure Task Force will likely be unable to reach the meeting. But that won't stop them from doing everything in their power to recover Nonomi. "
13130-281 = "And the more chaos they cause, the more opportunity for us to eradicate the private equity fund entirely."
13130-282 = "And even if they are successful in their assault on the private equity fund's blockade, they'll simply be forced to renounce the previous student council, and the Train Cannon will fall into your hands. A rather perfect plan. "
13130-283 = "Then, please move Nonomi to the promised location. "
13130-284 = "I will go contact the Foreclosure Task Force."
13130-294 = "*tchhhk* ...I'm sorry, Hoshino... I...made a mistake... "
13130-295 = "*cough* *cough*... Shiroko... Ayane... Serika... *cough* Hoshino..."
13130-299 = "From the beginning...I never should've come here..."
13130-300 = "I am a member of Nephthys...a perpetrator... "
13130-301 = "I stayed purely out of guilt...so it doesn't matter if I return to Highlander..."
13130-302 = "I only wish that all of you can live guilt-free...unshackled."
13130-303 = "Please don't reject President Yume...and the Abydos Student Council as something fake because of me..."
13130-304 = "Sensei will help, and you'll find a way to destroy the Train Cannon. I believe in you."
13130-313 = "...And that's your current situation. Takanashi Hoshino, Foreclosure Task Force."
13130-314 = "Find a way to attend the general creditors' meeting, and confess that the Abydos Student Council was a counterfeit organization."
13130-315 = "You will certify that all activities conducted by Takanashi Hoshino and Kuchinashi Yume's student council were unauthorized."
13130-316 = "Only then will Nonomi be allowed to stay with you all, rather than the Highlander underground prison. "
13130-320 = "...The sun is rising. There's not much time until the meeting."
13130-321 = "I hope you make a wise decision."
13130-326 = "..."
13130-329 = "...N-Nonomi."
13130-330 = "Th-That's..."
13130-331 = "Nonomi..."
13130-333 = "Hm. So that's how things are shaking out..."
13130-338 = "Hoshino?! Where are you going?"
13130-339 = "I need to leave now. We'll have to do as he says, if we want Nonomi back."
13130-340 = "Wh-What?! You want to listen to that jerk?"
13130-341 = "I won't lose another person I care about. I've already lost Yume... If I fail Nonomi too... "
13130-343 = "B-But, against that kind of force..."
13130-344 = "She's right. We need to wait for Sensei. They're going to come help. I know it."
13130-346 = "No one's waiting for anyone. I'm going alone."
13130-351 = "What?!"
13130-353 = "What do you mean alone?! You're going to break through that blockade, all by yourself?! "
13130-354 = "Yeah. I can do it. I've made up my mind."
13130-355 = "...You'll take care of the private equity fund, fight off Nephthys, and rescue Nonomi?"
13130-356 = "...Gah."
13130-357 = "What do you mean, \"gah?!\" How're you gonna deal with the fallout? "
13130-358 = "What fallout? I go in, deny the Abydos Student Council, and then I won't be the vice president anymore. "
13130-359 = "I'll dismantle the private equity fund, destroy the Train Cannon, and none of it will fall on the Foreclosure Task Force."
13130-360 = "What kind of solution is that?! What about YOU?"
13130-361 = "Hm... Well, for me, it'd be suspension, a chat with the Corrections Bureau, expulsion... I guess leaving Kivotos would be the final step?"
13130-362 = "That's why you guys are going to stay put."
13130-364 = "...!!"
13130-365 = "\"You guys\"? "
13130-366 = "What exactly do you mean by \"you guys\"?"
13130-371 = "You guys, as in the Foreclosure Task Force. Isn't that obvious? The real student council, approved by Sensei. This way, everything'll be tied up nicely, with a little bow on top."
13130-389 = "Sh-Shiroko? Who're you shooting at?!"
13130-391 = "That's dangerous, Shiroko!"
13130-396 = "Meet me on the rooftop. It's a showdown."
13130-402 = "Wh-Wh-What is even happening?!"
13130-403 = "A...showdown?"
13130-411 = "Heh. A showdown, eh? It's been a minute, hasn't it? "
13130-412 = "Am I in a teen drama right now? I've got butterflies!"
13130-420 = "W-Wait...! Hoshino, Shiroko?! "
13130-421 = "What is happening right now...? This is ridiculous..."
13130-422 = "Wh-What do we do, Serika?"
13130-423 = "We gotta follow them, duh!"
13130-429 = "Next Episode;You, and Us"

[translation]
52030-1 = "Episode 3;A New Festival"
52030-5 = "Easy. Don't drop it."
52030-6 = "And since you can't see your boots, take small steps so you don't trip."
52030-12 = "Oof. I thought they ordered a sign half this size!"
52030-13 = "Are you sure this is what the Festival Operations Department wanted?"
52030-14 = "Well, first of all, the Yin-Yang Club ordered this one."
52030-15 = "They say they want to hang a haiku scroll hand-written by Chise. And to make it big and high enough for the whole festival to see—"
52030-29 = "Wh-Whoa there!"
52030-30 = "What are you thinking, running around a construction site like this?"
52030-35 = "Hey, are you all right? She didn't hit you, did she?"
52030-40 = "Tsk, I missed..."
52030-44 = "Missed? What do you—"
52030-50 = "Boss, \"Operation: Accidentally on Purpose Break Chise's Sign, Then Offer to Fix It, Only to Then Exchange It with A Different Sign!\" has failed!"
52030-55 = "H-Huh? I don't think I approved of that!"
52030-56 = "Should we pivot to \"Operation: Overrun the Festival with Guns and Bombs Usin' the Usual Mouryo Gusto and Subtly Switch the Sign Then!\"?"
52030-58 = "...\"Usual Mouryo\"? Now that I think about it, I recognize these punks..."
52030-62 = "Yeah! Whenever there's a celebration, you troublemakers pick fights and mug tourists for their festival tickets. Is that right?"
52030-64 = "Hmph. Maybe at one time, but we don't care about mere tickets. The Waraku Festival is personal!"
52030-65 = "Little Princess Waraku thinks she's so cute and deserves ALL the attention. But she's nothin' compared to our glorious Arata!"
52030-66 = "Uh, wow. That's...very flatterin'."
52030-67 = "You...really don't have to say that."
52030-69 = "Ah, is that why you punks are trying to sabotage the festival?"
52030-70 = "You're just jealous because Chise is likable and popular?"
52030-72 = "No! Of course not! The reason why we're tryin' to mess with the haiku sign is..."
52030-73 = "Because of the haiku competition last week!"
52030-75 = "Hmm... You mean the haiku competition hosted by the Yin-Yang Club?"
52030-77 = "Yes! Our boss submitted a perfect, inspirational, and evocative piece to the competition..."
52030-78 = "...and didn't even make it to the preliminaries because of the Yin-Yang Club's sabotage and cronyism!"
52030-83 = "Hey! I WAS in the preliminaries!"
52030-85 = "So of course everyone focused on pretty Princess Waraku's haiku, even though the boss's was worlds better!"
52030-86 = "Yeah! Just readin' it made me feel...poetical!"
52030-87 = "If everyone was forced to read Arata's haiku, then they'd see how brilliant she is!"
52030-89 = "Heehee! Oh, stop! You're embarrassing me!"
52030-93 = "Wait. THAT'S what all this is about? Just me? Not even...ruining the festival like usual?"
52030-95 = "Of course, Boss. You're amazin'. You were robbed!"
52030-96 = "And once your haiku is displayed, everyone will know that you should have won!"
52030-97 = "In fact, let's share it now! EVERYONE! LISTEN UP!"
52030-99 = "No, please, stop—"
52030-106 = "The fanciest festival"
52030-108 = "may be detestable"
52030-110 = "without half off the digestible"
52030-121 = "Look, Boss! They're so moved that they're speechless!"
52030-123 = "Uh... Is that even a haiku?"
52030-124 = "No! I was counting! Those syllables are way off!"
52030-126 = "Shut it! If the boss says it's a haiku, then it's a haiku!"
52030-127 = "Don't try to limit her ideas with your rigid rules!"
52030-132 = "Haikus require structure. THAT was a mess."
52030-134 = "Ugh... Ughhh!"
52030-138 = "You know what? Let's trash this place!"
52030-146 = "I was wondering what all that noise was about. It's the Mouryo, of course."
52030-152 = "Wh-Who are you?"
52030-161 = "While your poetic sentiments are charming, I cannot permit you to disrupt the festival any further."
52030-162 = "Attempting to ruin a festival with terrible poetry? And here I thought your lot was growing predictable."
52030-164 = "Are you truly compelled to ruin every party this town holds?"
52030-165 = "We, the Hyakkaryouran, shall not permit such tyranny to pass!"
52030-171 = "Th-The Hyakkaryouran...?"
52030-172 = "Boss. What do we do? They're multiplyin'!"
52030-174 = "Oh, please. The Hyakkaryouran. I've been dreaming of this!"
52030-178 = "It's on, girls! Time for some payback!"

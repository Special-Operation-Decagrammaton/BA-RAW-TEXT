[translation]
52030-1 = "第3話;新的祭典"
52030-5 = "來來，小心別掉下來了。"
52030-6 = "這東西體積很大，可能會看不清腳下，注意別摔倒啦。"
52030-12 = "唉呦，這塊招牌怎麼比之前說的還要大兩倍啊？"
52030-13 = "是不是節慶營運管理部下錯訂單了？"
52030-14 = "不，聽說這塊招牌是陰陽部特別訂製的。"
52030-15 = "好像打算在上面掛上知世大人親筆寫的俳句掛軸之後安裝在高處，#n好讓整個祭典會場都能看見──"
52030-29 = "哇，哇啊！？"
52030-30 = "很，很危險耶！不要在人多的地方奔跑好不好！？"
52030-35 = "喂，你沒事吧？有沒有受傷？"
52030-40 = "呿，失敗了嗎……"
52030-44 = "失敗？那是什麼意思──"
52030-50 = "隊長，「假裝失手弄壞知世大人的俳句招牌，再藉修理之名偷偷調包」計畫失敗了！"
52030-55 = "嗯？我好像沒下過這麼具體的命令吧……"
52030-56 = "還是要改用「跟妖怪劇團平時一樣，用槍和炸彈把祭典會場搞得一團亂，再趁亂調包招牌」計畫？"
52030-58 = "……跟妖怪劇團平時一樣？#n聽你這麼一說，你們看起來好像有點眼熟……"
52030-62 = "我想起來了！每次準備祭典的時候總是在會場附近四處閒晃，#n還會找商店街的人麻煩和搶祭典優惠券的……原來就是你們啊！"
52030-64 = "哼，其他活動也就算了，「和樂祭」的優惠券我們可沒興趣！"
52030-65 = "對啊對啊！就算陰陽部的和樂公主再怎麼有魅力，也比不上我們隊長的氣場！"
52030-66 = "呃，大家這麼說我是很感謝啦……"
52030-67 = "但時機和場合是不是有點不太對……"
52030-69 = "那你們到底為什麼要妨礙祭典？"
52030-70 = "難道真的是因為嫉妒知世大人的人氣──"
52030-72 = "和樂公主怎樣都無所謂！#n我們要處理那塊俳句招牌的理由……"
52030-73 = "是因為上週舉辦的俳句比賽！"
52030-75 = "上週的比賽？#n是指由陰陽部舉辦，最終知世大人奪冠的俳句大賽嗎？"
52030-77 = "沒錯！我們隊長明明也信心滿滿地投稿了作品……"
52030-78 = "結果卻在陰陽部那些傢伙卑鄙的暗算之下，連預選都沒進就……"
52030-83 = "我明明有進預選好嗎！？"
52030-85 = "大家都只關心和樂公主的俳句，根本沒注意到隊長的俳句其實更厲害！"
52030-86 = "就是說啊！只要讀一遍就能感受到深遠的詩意！"
52030-87 = "如果大家都能近距離品味隊長的俳句，一定會明白它有多棒的！"
52030-89 = "嘿嘿，被大家說成這樣，真讓人有點害羞……"
52030-93 = "等一下，結果你們換掉招牌的目的竟然不是為了破壞祭典嗎！？"
52030-95 = "那當然囉，隊長。#n我們都知道比賽的結果讓你有多麼沮喪。"
52030-96 = "所以只要把寫著隊長俳句的招牌掛在祭典正中央，大家就能知道它有多優秀了！"
52030-97 = "不如乾脆趁這個機會，直接在這裡吟詠隊長的俳句吧！"
52030-99 = "不是，你先等等──"
52030-106 = "祭#n典#n再#n華#n麗"
52030-108 = "少#n了#n優#n惠#n券"
52030-110 = "樂#n趣#n打#n折#n扣"
52030-121 = "隊長你看！大家都被你的俳句感動到說不出話來了！"
52030-123 = "不是，與其說是感動……不如說這真的算是俳句嗎？"
52030-124 = "韻律跟字數都不對，又缺少季語。"
52030-126 = "不准你胡說。#n只要隊長說是俳句，那就是俳句！"
52030-127 = "別想把隊長完美的詩意囚禁在固定的格式裡！"
52030-132 = "但那就不叫俳句了吧？"
52030-134 = "唔……唔唔……"
52030-138 = "既然如此，我就算來硬的也要破壞這場祭典！"
52030-146 = "才想說祭典怎麼又吵起來了……果然是你們啊，妖怪劇團。"
52030-152 = "誰，誰啊？"
52030-161 = "想分享自己俳句的心意固然值得讚賞，#n但如果要繼續妨礙祭典的話，我們可不能坐視不管。"
52030-162 = "竟然因為私人恩怨而打算破壞大家期待已久的祭典，真是可笑的動機。"
52030-164 = "你們打算讓所有傾注在這場祭典中的火熱青春付諸流水嗎？"
52030-165 = "如果不停止這種惡行，我們百花繚亂絕不會袖手旁觀！"
52030-171 = "你，你們是百花繚亂……？"
52030-172 = "隊，隊長，怎麼辦？#n跟上次見面的時候相比，人數多了好多哦！"
52030-174 = "不用擔心。對付百花繚亂的對策，我早就準備好了！"
52030-178 = "決一勝負吧，百花繚亂！#n這次我一定要雪恥！"

[translation]
52030-1 = "ตอนที่ 3;งานเทศกาลใหม่"
52030-5 = "นี่ๆ ระวังอย่าให้หล่นนะ"
52030-6 = "มันอันใหญ่จนบังเท้าได้เลย เดินดีๆ ระวังอย่าสะดุดล้มกันด้วยล่ะ"
52030-12 = "ฮึบ ป้ายอันนี้หนักกว่าที่ได้ยินมา 2 เท่าเลยนะครับ"
52030-13 = "ไม่ใช่ว่าคณะบริหารงานเทศกาลสั่งมาผิดนะครับ?"
52030-14 = "อ้อ ได้ยินว่าป้ายอันนั้นทางชมรมหยินหยางสั่งทำมาพิเศษน่ะ"
52030-15 = "เห็นว่าจะติดแผ่นภาพกลอนไฮกุที่ท่านชิเซะเขียนด้วยลายมือตัวเองไว้ข้างบน แล้วเอาไปติดในที่สูงๆ ให้มองเห็นได้จากทุกจุดของสถานที่จัดงานเทศกาลด้วย..."
52030-29 = "วะ... เหวอออ?!"
52030-30 = "มะ... มันอันตรายนะ! ทำไมถึงมาวิ่งในที่ที่คนเยอะๆ แบบนี้ล่ะ?!"
52030-35 = "นี่ เป็นยังไงบ้าง? บาดเจ็บตรงไหนหรือเปล่า?"
52030-40 = "ชิ... ล้มเหลวสินะ..."
52030-44 = "ล้มเหลวงั้นเหรอ หมายความว่ายังไง..."
52030-50 = "หัวหน้า <แผนการแกล้งวิ่งหกล้มแล้วทำให้ป้ายกลอนไฮกุของท่านชิเซะพัง แล้วบอกว่าจะซ่อมให้#nแต่แอบเปลี่ยนเป็นป้ายอย่างอื่น!> ล้มเหลวแล้วค่ะ!"
52030-55 = "หะ... หืม? ฉันน่าจะไม่ได้สั่งละเอียดขนาดนั้นนะ..."
52030-56 = "เปลี่ยนเป็น <แผนป่วนสถานที่จัดงานเทศกาลให้เละด้วยปืนกับระเบิดเหมือนอย่างที่ปีศาจทำเป็นปกติ แล้วแอบเปลี่ยนเป็นป้ายอย่างอื่น!> ดีมั้ยคะ?"
52030-58 = "เหมือนอย่างที่ปีศาจทำเป็นปกติงั้นเหรอ...? จะว่าไป ฉันคุ้นๆ หน้าพวกเธออยู่นะ..."
52030-62 = "ใช่ ได้ยินว่าทุกครั้งที่มีการเตรียมงานเทศกาล จะมีพวกเด็กเกเรมาเพ่นพ่านรอบๆ สถานที่จัดงาน#nแล้วหาเรื่องคนอื่นในย่านการค้าแถมยังขโมยคูปองงานเทศกาลไปอีก... เป็นพวกเธอเองสินะ!"
52030-64 = "ฮึ่ม ถ้าเป็นเทศกาลอื่นละก็ไม่แน่ แต่คูปอง <เทศกาลวาราคุ> น่ะฉันไม่สนหรอก"
52030-65 = "ใช่แล้ว ต่อให้องค์หญิงวาราคุแห่งชมรมหยินหยางจะมีเสน่ห์ดึงดูดใจแค่ไหน แต่ก็เทียบกับเสน่ห์ของ#nหัวหน้าเราไม่ได้หรอก!"
52030-66 = "เอ่อ... ก็ขอบใจอยู่หรอกนะที่ทุกคนคิดกับฉันแบบนั้น..."
52030-67 = "แต่รู้สึกเหมือนมันไม่ถูกกาลเทศะเท่าไรเลย..."
52030-69 = "แล้วทำไมพวกเธอถึงพยายามจะก่อกวนงานเทศกาลล่ะ?"
52030-70 = "อย่าบอกนะว่าเพราะอิจฉาในชื่อเสียงของท่านชิเซะจริงๆ..."
52030-72 = "องค์หญิงวาราคุจะเป็นยังไงก็ช่างเถอะ! ที่พวกเราพยายามแตะต้องป้ายกลอนไฮกุก็เพราะ..."
52030-73 = "เพราะการแข่งขันแต่งกลอนไฮกุเมื่อสัปดาห์ก่อนต่างหาก!"
52030-75 = "การแข่งขันแต่งกลอนไฮกุเมื่อสัปดาห์ก่อน หมายถึงงานที่ชมรมหยินหยางเป็นเจ้าภาพแล้วท่านชิเซะ#nเป็นผู้ชนะใช่มั้ย?"
52030-77 = "ใช่! หัวหน้าของเราลงแข่งขันด้วย แล้วก็อุตส่าห์แต่งกลอนอย่างมั่นอกมั่นใจ..."
52030-78 = "แต่กลอุบายที่แยบยลของพวกชมรมหยินหยางทำให้หัวหน้าของเราตกรอบตั้งแต่รอบคัดเลือกเลย..."
52030-83 = "ฉันผ่านรอบคัดเลือกเถอะนะ?!"
52030-85 = "ทุกคนอาจจะไม่ทันสังเกตเพราะมัวไปให้ความสนใจกับกลอนไฮกุขององค์หญิงวาราคุกัน แต่สำหรับพวกเราแล้ว กลอนไฮกุของหัวหน้าน่ะเพราะกว่าตั้งเยอะ!"
52030-86 = "ใช่! แค่ได้อ่านก็รู้สึกได้ถึงอารมณ์กวีที่ลึกซึ้งแล้ว"
52030-87 = "ถ้าทุกคนเข้ามาอ่านกลอนไฮกุของหัวหน้าใกล้ๆ จะรู้เลยละว่ากลอนบทนั้นมันวิเศษขนาดไหน!"
52030-89 = "แหะๆ พอทุกคนพูดแบบนั้น ฉันก็เขินนิดหน่อยนะ..."
52030-93 = "เดี๋ยวนะ สรุปว่าที่พวกเธอจะเปลี่ยนป้ายกลอนไฮกุใหม่ก็เพราะจุดประสงค์นั้นเหรอ? ไม่ได้จะทำลายงานเทศกาลหรอกเหรอ?!"
52030-95 = "มันก็แน่อยู่แล้วสิคะหัวหน้า หัวหน้าเสียใจกับผลการแข่งขันแต่งกลอนเมื่อคราวก่อนมากเลยนี่คะ?"
52030-96 = "ถ้าเราแขวนป้ายกลอนไฮกุที่หัวหน้าแต่งไว้กลางงาน ทุกคนจะได้รู้ว่าผลงานการแต่งกลอนไฮกุของ#nหัวหน้ามันยอดเยี่ยมแค่ไหนไงคะ!"
52030-97 = "จริงสิ หัวหน้าใช้โอกาสนี้อ่านกลอนไฮกุของตัวเองให้ทุกคนฟังเลยค่ะ!"
52030-99 = "ไม่ละ แผนนั้นพับเก็บไปเถอะ..."
52030-106 = "เทศ#nกาล#nอัน#nแสน#nครึก#nครื้น"
52030-108 = "ถ้า#nหาก#nไม่มี#nคูปอง#nลด#nครึ่ง#nราคา"
52030-110 = "ก็จะ#nคึก#nคัก#nได้#nเพียง#nครึ่ง#nเดียว"
52030-121 = "ดูสิคะ หัวหน้า! ทุกคนประทับใจกลอนไฮกุของหัวหน้าจนพูดไม่ออกกันเลยค่ะ!"
52030-123 = "ประทับจงประทับใจอะไรกันล่ะ... นั่นเรียกว่ากลอนไฮกุได้ตั้งแต่แรกหรือเปล่าก็ไม่รู้?"
52030-124 = "สัมผัสก็ไม่ได้ จำนวนคำก็ไม่ถูกต้องตามหลักด้วย"
52030-126 = "พูดอะไรน่ะ ถ้าหัวหน้าบอกว่าเป็นกลอนไฮกุ มันก็ต้องเป็นกลอนไฮกุสิ!"
52030-127 = "อย่าเอาอารมณ์กวีที่สมบูรณ์แบบของหัวหน้าไปจำกัดในกรอบเดิมๆ นะ!"
52030-132 = "งั้นมันก็ไม่ใช่กลอนไฮกุน่ะสิ!"
52030-134 = "อะ... อึกกก..."
52030-138 = "ในเมื่อเป็นแบบนี้ ต่อให้ไม่เต็มใจนักแต่ฉันก็จะขัดขวางงานเทศกาลเสียเลย!"
52030-146 = "ก็ว่าอยู่ว่ามีใครมาเอะอะในสถานที่จัดงานเทศกาลอีกแล้ว เป็นพวกเธอเองสินะ พวกปีศาจ"
52030-152 = "คะ... ใครน่ะ?"
52030-161 = "ฉันชื่นชมความตั้งใจที่อยากให้ทุกคนได้ฟังกลอนไฮกุที่พวกเธอแต่งเองอยู่หรอกนะ แต่ฉันคงยอมให้พวกเธอมารบกวนการเตรียมงานเทศกาลไปมากกว่านี้ไม่ได้"
52030-162 = "กล้าดียังไงถึงเอาความแค้นส่วนตัวมาทำลายงานเทศกาลที่หลายคนตั้งตารอกัน แรงจูงใจของพวกเธอมันช่างน่าขันเสียจริง"
52030-164 = "จะทำให้ช่วงวัยรุ่นของทุกคนที่ทุ่มเทกับงานเทศกาลนี้สูญเปล่างั้นเหรอ?"
52030-165 = "พวกเราเฮียกกะเรียวรันจะไม่ยอมให้เกิดพฤติกรรมความรุนแรงมากไปกว่านี้เจ้าค่ะ!"
52030-171 = "พะ... พวกเธอคือเฮียกกะเรียวรันเหรอ...?"
52030-172 = "หะ... หัวหน้า ทำยังไงดีคะ? พวกนี้มีมากกว่าที่เราเจอเมื่อครั้งก่อนอีกค่ะ!"
52030-174 = "ไม่ต้องห่วงเรื่องนั้นหรอก ฉันเตรียมแผนการโค่นเฮียกกะเรียวรันไว้ชัดเจนตั้งแต่เจอกันคราวก่อนแล้ว!"
52030-178 = "เฮียกกะเรียวรัน ฉันขอท้าดวล! ฉันจะทำให้พวกเธอลิ้มรสความอับอายที่ฉันเจอเมื่อครั้งที่แล้วให้ได้!"

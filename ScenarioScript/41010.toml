[translation]
41010-1 = "第1話;統制不能な特殊部隊"
41010-5 = "ご無沙汰しております、先生。"
41010-6 = "[s] \"あっ、リンちゃん。\""
41010-7 = "……誰が「リンちゃん」ですか。"
41010-8 = "そういうのはもっとですね……"
41010-9 = "いえ、そのようなことはさておき。"
41010-10 = "少々お話したいことがあり、ご連絡させていただきました。"
41010-11 = "シャーレに来られてから、それなりに時間が経ちましたね。"
41010-12 = "ご報告は頂いていますので、様々なことがあったことも存じております。"
41010-13 = "あちこちでご活躍されたようで。おかげ様でこちらとしても、色々と助かりました。"
41010-14 = "それはさておき、幾つかお願いしたいこと……と言いますか。"
41010-15 = "具体的にはシャーレの報告書に関することと、今後の連邦生徒会の新たな……"
41010-19 = "……いえ、やはり直接お話しすることにしましょうか。"
41010-20 = "今日の午後、予定は空いていますか？"
41010-21 = "お茶くらいは用意しますので、よろしければお越しください。"
41010-22 = "お待ちしておりますので。"
41010-28 = "えっと……先生、お疲れ様です。"
41010-29 = "何だか、ちょっと空気感が気になりましたが……大丈夫でしょうか？"
41010-30 = "[s1] \"うーん、怒られるかも……。\"\n[s2] \"リンに怒られるのはご褒美だから。\""
41010-31 = "ですがきっと、怒られてばかりではないと思いますよ。"
41010-32 = "そ、そうでしたか……。"
41010-33 = "ですがきっと、怒られてばかりではないと思いますよ。"
41010-34 = "リンさんも言ってたように、先生はあちこちで大活躍ですから！"
41010-35 = "お茶を用意してくれると言ってましたし、もしかしたらすっごいおもてなしをしてくれるかもです！"
41010-36 = "[s] \"そうだったら嬉しいな。\""
41010-37 = "きっとそうです！さあ先生、そろそろ出発した方が良さそうですよ！"
41010-44 = "ああ、先生。お待ちしておりました。"
41010-45 = "[s3] \"久しぶり。\"\n[s4] \"おもてなしをしてもらいに来たよ！\""
41010-46 = "時間もありませんので、早速ですが本題に入りましょう。"
41010-47 = "……はい？何を言ってるのですか？"
41010-48 = "どうしてそんな、落胆した表情を……私は「お茶くらい用意する」としか言っていませんが。"
41010-49 = "そちらに座ってお待ちください。"
41010-50 = "時間もありませんので、早速ですが本題に入りましょう。"
41010-51 = "先ほどもお伝えした通り、シャーレの報告書周りに関するお話です。"
41010-52 = "[s] \"……？\""
41010-53 = "活動の内容について、口を出すわけではありません。多くの生徒から良い評判が出ているのは存じておりますし……。"
41010-54 = "ただ、問題はその事後処理です。"
41010-55 = "連邦生徒会宛に、報告書などを提出してもらっていますが……"
41010-62 = "例えばこの経費の書類。"
41010-63 = "請求書の内訳が全て、アラビア数字になっています。"
41010-64 = "[s] \"……ダメなんだっけ？\""
41010-65 = "はい、ダメです。"
41010-66 = "公文書に手書きで金額を記入する時には、漢数字での記載をお願いしています。偽造防止および誤読防止のためです。"
41010-67 = "他にも例えば、この捺印。空欄から3cmずれています。"
41010-68 = "このような不備があると、後処理の手間が増えてしまうので修正していただきたく……。"
41010-69 = "まあ、今やってくだされば良いのですが。"
41010-70 = "[s5] \"すみません……。\"\n[s6] \"……リンも手伝ってくれたりしない？\""
41010-71 = "はぁ……これはシャーレの、[USERNAME]先生のお仕事ですよ？"
41010-72 = "はぁ……これはシャーレの、[USERNAME]先生のお仕事ですよ？"
41010-73 = "そもそも先生が最初から、不備の無い書類を出してくだされば済んだお話です。"
41010-77 = "……それだけではありません。どうしてこういった報告書において、くだけた言葉で書くのですか。"
41010-78 = "機密文書なので外部の方は見ないとはいえ、真っ当な文章で書いてください。"
41010-79 = "分からない場合は、以前お渡しした連邦生徒会の公文書規定「第15条」に……"
41010-82 = "（その後もしばらく、リンに様々な指摘を貰った……）"
41010-89 = "あの、リン先ぱ……"
41010-90 = "い、いえ、行政官。少々ご相談が……。"
41010-92 = "どうしました？"
41010-93 = "その、緊急の事案で……。"
41010-98 = "えっと、SRT特殊学園の撤去についてなのですが……一部の生徒たちが反発し、公園を占拠してデモを始めたとか……。"
41010-99 = "事前に準備していた部隊では、阻止が難しいようで……。"
41010-102 = "……。"
41010-103 = "……はぁ。"
41010-104 = "でしたら、ヴァルキューレの警備局に連絡を。"
41010-105 = "あ、りょ、了解です……！"
41010-109 = "[ns7] \"ごめん、ちょっと聞こえちゃったんだけど……\"\n[ns8] \"何か問題でも起きた？\""
41010-110 = "……いえ、お気になさらず。よくあることですので。"
41010-111 = "……いえ、お気になさらず。よくあることですので。"
41010-112 = "連邦生徒会長の失踪以降、こういったことは日常茶飯事です。"
41010-113 = "[s] \"SRT特殊学園っていうのは……？\""
41010-114 = "……SRT、すなわち「Special Response Team」。"
41010-115 = "文字通り特殊な任務に対応するための、エリートたちの学園[ruby=・・・]でした[/ruby]。"
41010-116 = "少し前……連邦生徒会長がいた頃までは、ですね。"
41010-120 = "今となってはもう、気にすることではありません。"
41010-121 = "続けましょうか。この文書については、公文書規定の「第21条3項」に……"
41010-124 = "（それからしばらくして……）"
41010-130 = "あの、行政官……。"
41010-131 = "……はい、また何か問題が？"
41010-132 = "えっと、それが……。"
41010-133 = "デモの制圧に向かった警備局の生徒たちが、逆に制圧されてしまったとかで……。"
41010-134 = "……デモを起こしたのは、「一部の生徒」なのですよね？"
41010-135 = "は、はい。数としては小隊ひとつ分みたいなのですが……。"
41010-136 = "やはりSRTですし、火器が相当強力なこともあって……警備局だけでは……。"
41010-140 = "参りましたね、大ごとにしたくないのですが……。"
41010-141 = "……仕方ありません、ヴァルキューレ警察学校の「公安局」に連絡を。"
41010-142 = "「対テロ業務」に特化した彼女たちなら、いくら相手がSRTのエリートでも対処できるでしょう。防衛室の方には連絡しておきます。"
41010-143 = "は、はいっ……！"
41010-147 = "[ns] \"私に手伝えることはある？\""
41010-148 = "いえ、お気遣いなく。これはあくまでも連邦生徒会の問題ですので。"
41010-149 = "まず先生に処理していただきたいのは、目の前の書類です。"
41010-150 = "まさかとは思いますが……。"
41010-151 = "「そうすれば書類作業から逃げられそう」などと、お考えではありませんよね？"
41010-152 = "[s9] \"ま、まさかぁ……。\"\n[s10] \"さて！書類作業頑張ろう！楽しいなあ！\""
41010-153 = "……それでは引き続きやりましょうか。"
41010-154 = "……それでは引き続きやりましょうか。"
41010-155 = "こちらのように、捺印の修正時にはこうではなく……"
41010-157 = "（その後）"
41010-164 = "行政官……。"
41010-168 = "まさかとは思いますが……。"
41010-169 = "はい、公安局の生徒もみな……。"
41010-170 = "報告によると、「公園に近づくこともできないまま、大量の狙撃とトラップによって部隊が壊滅した」と……。"
41010-171 = "クロノススクールの記者たちも現場に来てしまい、中継によって状況が過熱しているみたいで……。"
41010-172 = "このままですと、問題がどんどん大きく……。"
41010-173 = "……。"
41010-174 = "全く、どうしてこう次から次へと……。"
41010-178 = "あの、リン先輩……こういう時こそ、シャーレの先生に助けてもらうというのは……？"
41010-179 = "先生の指揮能力はもちろん、各学校からすぐに精鋭を動員してもらうことも可能ですし……。"
41010-180 = "ヴァルキューレで太刀打ちできない以上、もう手段はそれくらいしか……。"
41010-181 = "……。"
41010-182 = "……はぁ。"
41010-186 = "……先生、少々問題がありまして。"
41010-187 = "本来なら私たちだけで片付けておきたいところですが……"
41010-188 = "お願いできますでしょうか？"
41010-189 = "[s11] \"うん、任せて。\"\n[s12] \"よし来た！！\""
41010-190 = "はい、一旦この書類についてはお気になさらず。私が何とかしておきますので。"
41010-191 = "はい、一旦この書類についてはお気になさらず。私が何とかしておきますので。"
41010-192 = "およそ状況は掴めているかと思いますが、一部のSRTの生徒たちがデモを起こしています。彼女たちを止めてきてください。"
41010-193 = "小隊一つとのことで、さほど人数が多いとは思いませんが……SRTの銃火器は相当強力ですので。お気をつけいただければと。"
41010-194 = "現場にはヴァルキューレの生徒たちもいますので、サポートをしてくれるはずです。"
41010-195 = "それでは、ご武運を。"
41010-197 = "次回;招かれざる客"

41010-9 = "3;통신린;99;……아무튼."
41010-10 = "3;통신린;01;이렇게 갑자기 연락을 드리게 된 이유는, 긴히 드리고 싶은 말이 있었기 때문입니다.\n#3;em;[반응]"
41010-11 = "3;통신린;02;선생님께서 샬레에 오신 이후로도 벌써 시간이 꽤 흘렀군요."
41010-12 = "3;통신린;22;선생님께서 키보토스의 여러 가지 문제를 해결해 오셨다는 건, 그간 제출된 보고서를 통해 익히 전해 듣고 있었습니다."
41010-13 = "3;통신린;99;덕분에 저희 총학생회도 약간은 시름을 놓을 수 있었습니다. 그 부분에 대해서는 감사드립니다."
41010-14 = "3;통신린;02;……다만 샬레의 활동과 관련하여, 몇 가지 주의와 당부를 드리고 싶은 부분이 있습니다."
41010-15 = "3;통신린;01;업무를 처리하신 뒤의 사후 보고서와 총학생회의 새로운 지침에 대해……."

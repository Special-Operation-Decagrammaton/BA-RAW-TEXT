[translation]
41010-1 = "第1話;不受控的特殊部隊"
41010-5 = "久疏問候了，老師。"
41010-6 = "[s]「啊，琳醬。」"
41010-7 = "……誰是「琳醬」啊。"
41010-8 = "這種稱呼方式要等更……"
41010-9 = "不，這種事暫且不提。"
41010-10 = "這次聯絡老師，是因為有些事情要說。"
41010-11 = "自從來到夏萊之後，經過一段時間了呢。"
41010-12 = "因為有收到報告，所以我明白發生了各式各樣的事情。"
41010-13 = "老師似乎在各地很活躍。多虧了您，在各方面也幫了我們很多忙。"
41010-14 = "這個暫且不提，有幾件事想拜託您。"
41010-15 = "具體是關於夏萊報告書的事，和今後聯邦學生會新的……"
41010-19 = "……不，果然還是當面直接說吧。"
41010-20 = "請問今日下午方便嗎？"
41010-21 = "我會準備茶水，如果可以的話請您過來。"
41010-22 = "我會等候您的。"
41010-28 = "那個……老師，辛苦你了。"
41010-29 = "剛才的氣氛有點讓人在意……還好嗎？"
41010-30 = "[s1]「嗯……可能會挨罵……」\n[s2]「被琳罵是獎勵呀。」"
41010-31 = "不過，肯定不是只有挨罵唷。"
41010-32 = "是，是這樣啊……"
41010-33 = "不過，肯定不是只有挨罵唷。"
41010-34 = "就如琳同學所說的，老師在各地很活躍呢！"
41010-35 = "也說了會準備茶水，說不定會被大受款待唷！"
41010-36 = "[s]「如果是那樣的話很開心呢。」"
41010-37 = "一定是那樣！好了老師，差不多該出發了唷！"
41010-44 = "啊，老師。恭候多時了。"
41010-45 = "[s3]「好久不見。」\n[s3]「我來受款待了！」"
41010-46 = "時間不多，馬上進入正題吧。"
41010-47 = "……什麼？您在說什麼呢？"
41010-48 = "為什麼露出那麼失望的表情……我只說了「會準備茶水」啊。"
41010-49 = "請坐在那邊稍候。"
41010-50 = "時間不多，馬上進入正題吧。"
41010-51 = "就如剛才說過的，是關於夏萊報告書的事。"
41010-52 = "[s]「……？」"
41010-53 = "關於老師的活動內容，我並不想多嘴。何況我也知道很多學生都對老師讚譽有加……"
41010-54 = "不過，問題是之後的事後處理。"
41010-55 = "雖然有收到，交給聯邦學生會的報告書……"
41010-62 = "例如這個經費的文件。"
41010-63 = "申請書細項全都是阿拉伯數字。"
41010-64 = "[s]「……不行嗎？」"
41010-65 = "是的，不行。"
41010-66 = "在公文上以手寫金額時，請以漢字記載。以防偽造或看錯。"
41010-67 = "還有例如這個簽章。自空欄偏離了3cm。"
41010-68 = "這種不完善的地方，會增加後續處理的程序，還請修正……"
41010-69 = "當然，這些都是現在就能修正好的問題。"
41010-70 = "[s5]「不好意思……」\n[s6]「……琳也會幫忙嗎？」"
41010-71 = "哈啊……這是夏萊的，[USERNAME]老師的工作唷？"
41010-72 = "哈啊……這是夏萊的，[USERNAME]老師的工作唷？"
41010-73 = "再說問題就在於，老師一開始提出的文件不完善。"
41010-77 = "……不只如此，您怎麼會用口語的字詞寫報告書啊。"
41010-78 = "就算是外人看不見的機密文件，也請書寫正統文章。"
41010-79 = "如果有什麼不清楚的地方，在以前交給您的聯邦學生會公文規定「第15條」裡……"
41010-82 = "（在這之後，也受到琳各式各樣的指謫……）"
41010-89 = "那個，琳前……"
41010-90 = "不，不對，行政官。稍微有點事情……"
41010-92 = "怎麼了嗎？"
41010-93 = "那個，有個緊急事件……"
41010-98 = "是關於SRT特殊學園的撤除……聽說有部分的學生反對，並佔領公園進行示威……"
41010-99 = "以事前準備的部隊，要阻止似乎有點困難……"
41010-102 = "……"
41010-103 = "……唉。"
41010-104 = "這樣的話，聯絡女武神警備局。"
41010-105 = "啊，了，了解了……！"
41010-109 = "[ns7]「抱歉，稍微聽到了……」\n[ns8]「出了什麼問題嗎？」"
41010-110 = "……不，請不用在意。是常有的事。"
41010-111 = "……不，請不用在意。是常有的事。"
41010-112 = "自從聯邦學生會長失蹤，這種事情是家常便飯。"
41010-113 = "[s]「SRT特殊學園是……？」"
41010-114 = "……SRT，也就是「Special Response Team」。"
41010-115 = "如字面上是為了對應特殊任務，而設立的[ruby=．]原[/ruby]菁英學園。"
41010-116 = "直到前陣子……聯邦學生會長還在的時候。"
41010-120 = "到了現在，已經不是該在意的事了。"
41010-121 = "繼續吧。關於這個文件，在公文規定的「第21條3項」裡……"
41010-124 = "（這之後過了一段時間……）"
41010-130 = "那個，行政官……"
41010-131 = "……是，又有什麼問題嗎？"
41010-132 = "那個，就是……"
41010-133 = "聽說前往壓制示威的警備局學生們，反而被壓制了……"
41010-134 = "……發起示威的，是「一部份的學生」沒錯吧？"
41010-135 = "是，是的。雖然以數量來說是一支小隊……"
41010-136 = "但畢竟是SRT，火力相當強大……只憑警備局……"
41010-140 = "真困擾呢，雖然不想把事情鬧大……"
41010-141 = "……沒辦法了，聯絡女武神警察學園的「公安局」。"
41010-142 = "換作專長為「對恐業務」的她們，就算對手是SRT的菁英也能應對吧。我會連絡防衛室。"
41010-143 = "是，是的……！"
41010-147 = "[ns]「有什麼我可以幫忙的嗎？」"
41010-148 = "不，請不用在意。這個終究是聯邦學生會的問題。"
41010-149 = "首先想請老師處理的，是眼前的文件。"
41010-150 = "雖然這只是我的猜測……"
41010-151 = "您應該不會打算「插手示威事件逃離文書作業」吧？"
41010-152 = "[s9]「怎，怎麼會呢……」\n[s10]「那麼！文書作業加油！真開心呢！」"
41010-153 = "……那麼就繼續吧。"
41010-154 = "……那麼就繼續吧。"
41010-155 = "像這邊一樣，修正簽章時不是這樣……"
41010-157 = "（這之後）"
41010-164 = "行政官……"
41010-168 = "不會是我猜的那樣吧……"
41010-169 = "是的，公安局學生的大家也……"
41010-170 = "根據報告，「遭受大量狙擊和陷阱，部隊甚至還沒接近公園就潰散了」……"
41010-171 = "現場狀況也似乎，因為克洛盧斯的記者們到場轉播，逐漸升溫……"
41010-172 = "這樣下去的話，問題會越來越大……"
41010-173 = "……"
41010-174 = "真是的，為什麼這樣接二連三的……"
41010-178 = "那個，琳前輩……這種時候，不就正需要請夏萊的老師幫忙嗎……？"
41010-179 = "老師不僅有指揮能力，還能立刻從各學校動員精銳……"
41010-180 = "如今女武神無法抗衡，只剩這個手段了……"
41010-181 = "……"
41010-182 = "……唉。"
41010-186 = "……老師，稍微有點問題。"
41010-187 = "本來我們希望能夠自己解決……"
41010-188 = "可以拜託您嗎？"
41010-189 = "[s11]「嗯，交給我。」\n[s12]「就等你這句！！」"
41010-190 = "是的，關於這個文件暫且不用在意。我會想辦法的。"
41010-191 = "是的，關於這個文件暫且不用在意。我會想辦法的。"
41010-192 = "我想老師已經掌握大致上的狀況了，一部份SRT的學生們發起了示威。請前去阻止她們。"
41010-193 = "因為只有一個小隊，人數應該不多……但SRT的槍械相當強大，請務必當心。"
41010-194 = "現場也有女武神的學生們，應該會願意支援老師。"
41010-195 = "那麼，祝您武運昌隆。"
41010-197 = "下一話;不速之客"

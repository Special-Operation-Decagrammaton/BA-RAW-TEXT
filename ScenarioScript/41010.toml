41010-30 = "[s1] \"อืม รินนี่น่ากลัวจัง...\"\n[s2] \"ดีใจจังที่จะถูกรินดุ!\""
41010-31 = "คุณรินไม่น่าจะเรียกคุณครูไปพบเพราะแค่จะตำหนิอะไรนิดหน่อยหรอกนะคะ"
41010-32 = "คะ... คะ? หนูไม่คิดเลยค่ะว่าจะได้ยินอะไรแบบนี้..."
41010-33 = "คุณรินไม่น่าจะเรียกคุณครูไปพบเพราะแค่จะตำหนิอะไรนิดหน่อยหรอกนะคะ"
41010-34 = "เมื่อกี้นี้คุณรินเป็นคนพูดเองนี่คะว่าคุณครูช่วยแก้ปัญหามากมายที่เกิดในคิโวทอสได้อย่างยอดเยี่ยม"

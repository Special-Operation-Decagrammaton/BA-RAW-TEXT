41010-19 = "3;통신린;99;……아니, 이런 무거운 안건을 전화기 너머로 말씀드리는 것은 어쩌면 실례일지도 모르겠군요."
41010-20 = "3;통신린;02;선생님, 오늘 오후는 특별한 일정 없이 비번이신지요?\n#3;em;[?]"

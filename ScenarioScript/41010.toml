41010-28 = "3;통신아로나;24;으음…… 수고하셨습니다, 선생님.\n#3;em;[땀]"
41010-29 = "3;통신아로나;26;어쩐지 조금 혼날 것 같은 분위기인데…… 괜찮으신가요?"
41010-30 = "[s1] \"맞아. 린은 무서워…….\"\n[s2] \"린에게 혼나는 건 오히려 기뻐!\""
41010-31 = "3;통신아로나;31;하지만 단순히 야단만 치려고 선생님을 부르려는 건 아닐 거예요."
41010-32 = "3;통신아로나;28;네, 네에? 그건 전혀 예상하지 못했던 반응이네요…….\n#3;shake\n#3;em;[?!]"

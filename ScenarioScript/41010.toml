41010-178 = "เอ่อ... คือว่า... รุ่นพี่... ริน... ครั้งนี้เราขอความช่วยเหลือจากคุณครูของชาเล่ต์ไหมคะ?"
41010-179 = "ความสามารถในการบังคับบัญชาของคุณครูได้รับการพิสูจน์ผ่านการต่อสู้หลายต่อหลายครั้ง และถ้าจำเป็น เราก็สามารถใช้สิทธิ์ของชาเล่ต์ในการระดมกองกำลังชั้นหนึ่งจากแต่ละโรงเรียนได้..."
41010-180 = "ถ้านักเรียนจากโรงเรียนตำรวจยังถูกเล่นงานถึงขนาดนี้ละก็ คนที่จะช่วยได้มีแต่ชาเล่ต์เท่านั้นค่ะ..."
41010-181 = "......"
41010-182 = "เฮ้อ..."
41010-186 = "ต้องขออภัยด้วยค่ะคุณครู พอดีทางนั้นเกิดปัญหาขึ้นนิดหน่อย"
41010-187 = "เดิมทีแล้วสมาชิกองค์การนักเรียนจะต้องจัดการปัญหานี้เอง..."
41010-188 = "แต่ครั้งนี้คงต้องขอความช่วยเหลือจากคุณครูอย่างหลีกเลี่ยงไม่ได้ค่ะ"
41010-189 = "[s11] \"ครูรอฟังคำนี้อยู่เลย\"\n[s12] \"ให้ช่วยอะไรขอให้บอกเลย ครูทำได้ทุกอย่าง!\""
41010-190 = "เรื่องรายงาน... ฉันจะยกประโยชน์ให้แล้วกันนะคะ ระหว่างที่คุณครูออกไปจัดการเรื่องนั้น ฉันจะทำส่วนที่เหลือแทนให้เองค่ะ"
41010-191 = "เรื่องรายงาน... ฉันจะยกประโยชน์ให้แล้วกันนะคะ ระหว่างที่คุณครูออกไปจัดการเรื่องนั้น ฉันจะทำส่วนที่เหลือแทนให้เองค่ะ"
41010-192 = "คุณครูอาจจะพอทราบสถานการณ์จากที่ฟังพวกฉันคุยกันบ้างแล้ว เรื่องที่ฉันอยากขอความช่วย#nเหลือจากคุณครูคือการขัดขวางนักเรียนของสถาบัน SRT ที่กำลังทำการประท้วงอยู่ในตอนนี้ค่ะ"
41010-193 = "ถึงจะมีกันไม่กี่คน แต่เด็กพวกนั้นก็มีอาวุธยุทโธปกรณ์ที่เอามาจากสถาบัน SRT ด้วย ระวังเรื่องความปลอดภัยด้วยนะคะ"
41010-194 = "ส่วนรายละเอียดอื่นๆ คนจากสถาบันฝึกตำรวจวัลคิรี่ที่อยู่ที่นั่นจะอธิบายให้คุณครูฟังเองค่ะ"
41010-195 = "ถ้างั้นก็ขอรบกวนด้วยแล้วกันนะคะ..."
41010-197 = "ตอนต่อไป;แขกที่ไม่ได้รับเชิญในสวนสาธารณะ"

[translation]
1601803-1 = "隊長的重擔"
1601803-2 = "（和良舞一起去了商店街）"
1601803-3 = "唔……唔嗯……"
1601803-4 = "好難決定哦……"
1601803-5 = "[s1]「這是什麼？」\n[s2]「是黃豆粉之類的東西嗎？」"
1601803-8 = "它不是黃豆粉，而是頭盔團的必需品哦。"
1601803-9 = "這東西是用胡桃的殼磨成的粉末。"
1601803-10 = "我們在重新幫頭盔上漆的時候，會先用砂紙把舊漆給磨掉。"
1601803-11 = "不過這樣也會讓表面變得光滑又反光，所以得讓它恢復原本粗糙的質感才行。"
1601803-12 = "[s]「不是也有光滑的頭盔嗎？」"
1601803-13 = "有是有，但它們的用途是不一樣的。"
1601803-14 = "打架用的頭盔要粗糙，想耍帥的時候才會拋光。"
1601803-15 = "總之呢，這就是用來讓頭盔恢復質感的胡桃殼粉。"
1601803-16 = "問題就出在該選30號還是50號呢……"
1601803-17 = "[s]「不是都一樣嗎？」"
1601803-18 = "所以才說外行人根本不懂嘛！你再仔細看一次！"
1601803-19 = "唉，這個月也是窮到不行，只能選一包買啊……"
1601803-26 = "咦？"
1601803-27 = "那傢伙不是「嘩啦嘩啦頭盔團」的老大嗎？"
1601803-28 = "旁邊還有夏萊的老師在耶？"
1601803-29 = "喂，混蛋！！"
1601803-30 = "現在不混頭盔團，改混夏萊了是吧？"
1601803-34 = "啊？"
1601803-35 = "你的手下都跑哪去了啊？"
1601803-36 = "喂，不如趁現在解決他吧？"
1601803-37 = "……唉。"
1601803-38 = "老師，我去處理一下。"
1601803-39 = "[s]「為什麼要把襪子套在槍上？」"
1601803-40 = "搞什麼，他什麼意思啊？"
1601803-41 = "是不是被嚇傻了啊？"
1601803-42 = "姐姐我啊，現在可是窮到連子彈錢都得省著用呢。"
1601803-43 = "難得遇到這種好機會，勸你們還是乖乖逛完街回去洗洗睡吧。"
1601803-44 = "這傢伙竟敢在那邊耍嘴皮子……"
1601803-45 = "給我打爆他！！！"
1601803-60 = "呃啊！！！"
1601803-65 = "居然直接用槍打人，這傢伙太卑鄙了……！"
1601803-66 = "給我拿來！！"
1601803-77 = "襪，襪子怎麼……！！"
1601803-78 = "所以嘛，為什麼要抓我的槍呢？#n萬一襪子掉了不就摔倒了嗎？"
1601803-79 = "不，不要啊！！！"
1601803-80 = "我偏要！！"
1601803-90 = "唉，真麻煩。"
1601803-91 = "河駒風良舞！！竟敢在我們的地盤撒野！！"
1601803-92 = "嚐嚐我的手榴彈吧！"
1601803-93 = "喂，不能這樣啦！"
1601803-94 = "哈啊！！"
1601803-100 = "呃啊啊！！"
1601803-105 = "這種情況就得用直球快攻才行。"
1601803-106 = "把所有人都叫來！！一定要逮到他！！！"
1601803-114 = "這，這傢伙怎麼這麼強啊？唔呃……"
1601803-115 = "撤退！！撤退！！！！"
1601803-119 = "這些傢伙真煩……"
1601803-120 = "害我一整天都白費了！！！"
1601803-121 = "要是下次再被我遇到，保證讓你用爬的回去！！！"
1601803-122 = "哈啊……累死我了。"
1601803-123 = "老師你沒事吧？有沒有受傷？"
1601803-124 = "[s3]「沒事！我完全沒問題！」\n[s4]「你每天都會這樣嗎？」"
1601803-127 = "雖然今天相對比較嚴重，但每天差不多都是這種情況啦。"
1601803-128 = "除了跟太妹們處不好之外，頭盔團之間的互相牽制也是家常便飯。"
1601803-129 = "不過只要像這樣給他們一點顏色瞧瞧，短時間內就會安分一點了。"
1601803-130 = "[s]「良舞超強的耶！」"
1601803-131 = "哼，這還用說。"
1601803-132 = "頭盔團的隊長可不是白當的啊！"
1601803-133 = "[s]「還是團員們可靠的領袖！」"
1601803-134 = "老師過獎了啦。嘿嘿……"
1601803-135 = "[s]「而且心地其實很善良！」"
1601803-136 = "等，等一下……！"
1601803-137 = "[s]「尖尖的牙齒也很可愛！！」"
1601803-138 = "吵死了！！"
1601803-140 = "（之後一邊挨揍，一邊拚命地稱讚良舞）"

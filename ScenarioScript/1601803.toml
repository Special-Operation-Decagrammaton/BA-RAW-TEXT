[translation]
1601803-1 = "The Captain's Weight"
1601803-2 = "Rabu and I went to the shopping district."
1601803-3 = "Hmm... Hmm..."
1601803-4 = "We've got some tough choices here..."
1601803-5 = "[s1] \"What is this?\"\n[s2] \"Some kind of bean powder?\""
1601803-8 = "Bean powder? No. It's a Helmet Gangster thing."
1601803-9 = "These are powdered walnut shells. I didn't think they'd have so many kinds."
1601803-10 = "When we bust up a helmet, we have to repaint it. So we smooth the outside with sandpaper, right?"
1601803-11 = "But then it looks too nice, all shiny and reflective like a car. We use walnut shells to re-texture the surface. You know, rough it up."
1601803-12 = "[s] \"But I've seen some of you wear shiny helmets.\""
1601803-13 = "Yeah, sure. But think about it."
1601803-14 = "You want to look tough in a fight, so you wear the distressed one. You can save the shiny one for a party or something."
1601803-15 = "Anyway, we spray the surface with walnut shells to give it that texture."
1601803-16 = "I didn't know I'd have to think about this. 30 or 50 grit? Huh..."
1601803-17 = "[s] \"But won't it look the same?\""
1601803-18 = "Amateur hour! Come on, Sensei. Look closely and you might learn something!"
1601803-19 = "I better choose right. I'm a little broke this month."
1601803-26 = "Huh?"
1601803-27 = "That girl over there... I think she runs the Splash Helmet Gang, right?"
1601803-28 = "Oh, and with Schale's Sensei. OooooOOh! What's this about?"
1601803-29 = "Yo, buckethead!"
1601803-30 = "You quit your gang and are datin' Sensei now?"
1601803-34 = "What're you yammering about?!"
1601803-35 = "Heh. Oh, where're your background dancers, princess?"
1601803-36 = "How about we jump her right here, right now?"
1601803-37 = "*sigh*"
1601803-38 = "Sensei, give me a second. You can step to the side."
1601803-39 = "[s] \"Why are you taking your sock off? And putting it over your gun?\""
1601803-40 = "She's lost it."
1601803-41 = "Maybe hangin' with Sensei made her crazy."
1601803-42 = "I'm a little tight on funds this month. I can't be wasting bullets on you losers."
1601803-43 = "So now's a great time for you to either buy something or get out!"
1601803-44 = "Big talk..."
1601803-45 = "Get her!"
1601803-60 = "Hrgh!"
1601803-65 = "Clubbing us with her gun. How cheap...!"
1601803-66 = "Gimme that!"
1601803-77 = "A-A sock?!"
1601803-78 = "You fell because you slipped it off the gun, idiot. I'm going to need that back, by the way."
1601803-79 = "N-No!"
1601803-80 = "Oh, yes!!"
1601803-90 = "*sigh* What a pain."
1601803-91 = "Komakaze Rabu! You try this in our territory?"
1601803-92 = "Give her the grenade!"
1601803-93 = "Batter up!"
1601803-94 = "Hup!"
1601803-100 = "Aaaaaah!"
1601803-105 = "She needs to work on her pitch..."
1601803-106 = "Everyone! Surround her!"
1601803-114 = "H-How is she still going? Ugh..."
1601803-115 = "Retreat! Retreat!"
1601803-119 = "That was seriously annoying."
1601803-120 = "Look at this sunset! They wasted a whole day!"
1601803-121 = "Next time I see them, I'm just hitting the floor and crawling out."
1601803-122 = "Ugh... I'm beat."
1601803-123 = "Sensei, you okay? No scrapes or...wounds, right?"
1601803-124 = "[s3] \"I'm fine! I actually feel better!\"\n[s4] \"Does this happen to you frequently?\""
1601803-127 = "This was a little extreme, but yeah. Business as usual."
1601803-128 = "The thugs and I don't get along. And even the Helmet Gangs roughhouse with each other sometimes."
1601803-129 = "But this oughta shut everyone up for a few days. Sometimes they just need a little reminder."
1601803-130 = "[s] \"A reminder that you're so strong, Rabu!\""
1601803-131 = "Heh, you know it."
1601803-132 = "There's a reason I'm Captain of the Splash Gang, after all."
1601803-133 = "[s] \"You're such a reliable leader!\""
1601803-134 = "Come on, Sensei. You flatter me."
1601803-135 = "[s] \"And you're so kindhearted!\""
1601803-136 = "H-Hold up!"
1601803-137 = "[s] \"And your sharp teeth are super cute!\""
1601803-138 = "C-Cram it!"
1601803-140 = "I kept complimenting Rabu while she playfully pushed me away."

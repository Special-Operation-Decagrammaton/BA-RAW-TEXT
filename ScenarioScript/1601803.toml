[translation]
1601803-1 = "น้ำหนักของการเป็นหัวหน้า"
1601803-2 = "(คุณครูมาที่ย่านการค้ากับราบุ)"
1601803-3 = "อืมมมม... อื้มมม..."
1601803-4 = "คิดไม่ตกเลยแฮะ..."
1601803-5 = "[s1] \"นี่อะไรน่ะ?\"\n[s2] \"ผงถั่วบดเหรอ?\""
1601803-8 = "ไม่ใช่ผงถั่วบดสักหน่อย ของจำเป็นสำหรับแก๊งหมวกกันน็อกต่างหาก"
1601803-9 = "นี่เป็นผงจากเปลือกวอลนัทน่ะ"
1601803-10 = "เวลาจะทาสีหมวกกันน็อกใหม่จะต้องขัดสีเก่าออกให้หมดก่อน"
1601803-11 = "พื้นผิวที่มันเงาจะทำให้เกิดการสะท้อนแสง เลยต้องทำให้พื้นผิวมันกลับมาด้านเหมือนเดิม"
1601803-12 = "[s] \"มันก็มีหมวกกันน็อกแบบที่ไม่สากอยู่ไม่ใช่เหรอ\""
1601803-13 = "มันก็มีอยู่หรอก แต่มันใช้งานแตกต่างกันน่ะ"
1601803-14 = "หมวกกันน็อกที่ใส่ตอนต่อสู้ก็จะมีพื้นผิวขรุขระหน่อย ส่วนตอนที่อยากใส่เท่ๆ ก็ต้องเลือกใบที่ดูเป็น#nมันเงา"
1601803-15 = "เอาเถอะ เอาเป็นว่าเพื่อที่จะให้ได้ผิวสัมผัสแบบนั้น เลยต้องใช้เปลือกวอลนัทมาขัดน่ะ"
1601803-16 = "ปัญหาคือจะใช้เบอร์ 30 หรือเบอร์ 50 ดี..."
1601803-17 = "[s] \"มันก็เหมือนกันหมดไม่ใช่เหรอ?\""
1601803-18 = "เพราะแบบนี้ไงถึงบอกว่าพวกมือใหม่น่ะใช้ไม่ได้! ลองสังเกตให้ดีๆ สิ!"
1601803-19 = "เดือนนี้กระเป๋าฉีกนิดหน่อย เลยซื้อมาได้อันเดียว ชิ..."
1601803-26 = "หืม?"
1601803-27 = "ยะ... ยัยนั่น... นั่นมันหัวหน้าแก๊งหมวกกันน็อกป๋อมแป๋มไม่ใช่รึไง?"
1601803-28 = "แถมคนข้างๆ ก็คือครูจากชาเล่ต์นี่นา?"
1601803-29 = "นี่ ยัยป่วง!!"
1601803-30 = "คิดจะเลิกเป็นแก๊งหมวกกันน็อกแล้วไปเป็นเด็กดีของชาเล่ต์แล้วเหรอ?"
1601803-34 = "หา?"
1601803-35 = "พวกลูกกระจ๊อกไปไหนหมดแล้วล่ะ?"
1601803-36 = "นี่ จัดการให้มันจบๆ ไปตรงนี้เลยดีกว่ามั้ย?"
1601803-37 = "เฮ้อ..."
1601803-38 = "ครู ขอไปจัดการทางโน้นแป๊บหนึ่งนะ"
1601803-39 = "[s] \"ทำไมถึงถอดถุงเท้าไปใส่ปืนไว้แบบนั้นล่ะ?\""
1601803-40 = "อะไรน่ะ ยัยนั่นทำอะไรน่ะ?"
1601803-41 = "กลัวจนเสียสติไปแล้วละมั้ง?"
1601803-42 = "ตอนนี้ฉันอยู่ในช่วงประหยัดกระสุนน่ะ"
1601803-43 = "ถือว่าโชคเข้าข้างพวกแกนะ เพราะงั้นเดินซื้อของเงียบๆ ไปซะเถอะ"
1601803-44 = "พูดบ้าพูดบออะไรเนี่ย"
1601803-45 = "ซัดให้หมอบเลย!!!"
1601803-60 = "เฮือก!!!"
1601803-65 = "ยัยนี่...! ใช้ปืนฟาดงั้นเรอะ ขี้ขลาดชะมัด...!"
1601803-66 = "เอามานี่!!"
1601803-77 = "ถะ... ถุงเท้า!!"
1601803-78 = "ก็ใช่น่ะสิ แล้วจะจับปืนทำไม เดี๋ยวถุงเท้าหลุดก็ล้มหรอก"
1601803-79 = "มะ... ไม่นะ!!!"
1601803-80 = "ไม่เม่ยอะไรเล่า!!"
1601803-90 = "เฮ้อ น่ารำคาญจริงๆ เลย"
1601803-91 = "โคะมาคาเสะ ราบุ!! กล้ามากนะที่มาอวดเก่งในถิ่นของพวกเราน่ะ!!"
1601803-92 = "เอาระเบิดมือไปกินซะ!"
1601803-93 = "นี่ๆ อย่าทำแบบนั้นสิ!"
1601803-94 = "ฮึบ!!"
1601803-100 = "อ๊ากกก!!"
1601803-105 = "ในเวลาแบบนี้ต้องขว้างออกไปตรงๆ อย่างรวดเร็วสิ"
1601803-106 = "เรียกทุกคนมา!! เราจะต้องจับตัวยัยนั่นให้ได้!!!"
1601803-114 = "คะ... คนหรือหุ่นยนต์ทำไมถึงแข็งแกร่งขนาดนี้...? อึก..."
1601803-115 = "ถอย!! ถอยเร็ว!!!!"
1601803-119 = "เจ้าพวกน่ารำคาญเอ๊ย..."
1601803-120 = "เสียเวลาวันนี้ไปโดยเปล่าประโยชน์เลยเนี่ย!!!"
1601803-121 = "เจอกันคราวหน้าฉันไม่เอาไว้แน่!!!"
1601803-122 = "ฮู่ว... เหนื่อยจัง เหนื่อยสุดๆ เลย"
1601803-123 = "เป็นอะไรรึเปล่า ครู? ไม่บาดเจ็บตรงไหนใช่มั้ย?"
1601803-124 = "[s3] \"ครูไม่เป็นไร! ว่าแต่ว่าเจอแบบนี้ทุกวันเลยเหรอ?\" \n[s4] \"เจอแบบนี้ทุกวันเลยเหรอ?\""
1601803-127 = "อื้อ ก็เจอแบบนี้ทุกวันแหละ แต่วันนี้ค่อนข้างหนักหน่อย"
1601803-128 = "ความสัมพันธ์ของเรากับพวกนักเลงไม่ค่อยดีเท่าไร แล้วก็ไม่ค่อยจะลงรอยกับพวกแก๊งหมวกกันน็อก#nด้วยน่ะ"
1601803-129 = "วันนี้จัดหนักไปขนาดนี้ คงอยู่เงียบๆ กันไปอีกสักพักนั่นละ"
1601803-130 = "[s] \"ราบุแข็งแกร่งมากเลยนะเนี่ย!\""
1601803-131 = "เฮอะ มันก็แน่อยู่แล้ว"
1601803-132 = "ตำแหน่งหัวหน้าแก๊งนี่ไม่ได้ได้มาเพราะโชคช่วยหรอกนะ!"
1601803-133 = "[s] \"เป็นหัวหน้าที่น่าเชื่อถือด้วยนะเนี่ย!\""
1601803-134 = "ครูก็ชมกันเกินไป แหะๆ..."
1601803-135 = "[s] \"ถ้าได้ลองรู้จักจริงๆ แล้ว ราบุก็เป็นคนจิตใจดีนะ!\""
1601803-136 = "ดะ... เดี๋ยว...!"
1601803-137 = "[s] \"ฟันเขี้ยวแหลมๆ ก็น่ารักมากด้วย!\""
1601803-138 = "หนวกหูน่า!"
1601803-140 = "(หลังจากนั้น คุณครูก็ยังไม่หยุดเอ่ยปากชม แม้จะถูกราบุซัดไปหลายหมัด)"

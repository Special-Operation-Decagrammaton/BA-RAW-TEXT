[translation]
1007403-1 = "No Witnesses, No Point"
1007403-2 = "I took a walk around the forest and ended up deeper in the trees than I expected."
1007403-6 = "I could hear the sound of water in the distance and followed it, hoping to find a waterfall."
1007403-7 = "♪~♬~~♪~♬~"
1007403-8 = "[ns1] \"Is that...singing?\"\n[ns2] \"That voice...\""
1007403-11 = "♪~~~~♬♪~~♬~"
1007403-15 = "[ns] Follow the sound of the singing."
1007403-19 = "Huh...?"
1007403-20 = "Sensei...?"
1007403-23 = "― [log=하나코 수영복]How serendipitous, running into you here.[/log][wa:10] "
1007403-25 = "― [log=하나코 수영복]Or...is it?[/log][wa:1400] "
1007403-28 = "― [log=하나코 수영복]With you, I never quite know...[/log][wa:10] "
1007403-30 = "― [log=하나코 수영복]Let's just chalk it up to a coincidence.[/log][wa:680] "
1007403-33 = "― [log=하나코 수영복]Heehee... Please don't be so concerned.[/log][wa:2120] "
1007403-35 = "― [log=하나코 수영복]I'm still properly dressed.[/log][wa:1260] "
1007403-38 = "― [log=하나코 수영복]I wanted to feel the cool water on my skin.[/log][wa:460] "
1007403-41 = "― [log=하나코 수영복]Would you...like to join me?[/log][wa:3980] "
1007403-44 = "― [log=하나코 수영복]I promise...[/log][wa:10] "
1007403-46 = "― [log=하나코 수영복]This situation is nothing like the Trinity fountain. [/log][wa:2880] "
1007403-49 = "― [log=하나코 수영복]No one is around, and we're in nature...[/log][wa:2900] "
1007403-51 = "― [log=하나코 수영복]Yes. Everything is as it should be, without any gaudy embellishments.[/log][wa:4240] "
1007403-54 = "― [log=하나코 수영복]So, I'd like to just be with you. Here, in this moment.[/log][wa:2540] "
1007403-56 = "― [log=하나코 수영복]...If you're okay with that.[/log][wa:1540] "
1007403-59 = "Heehee. I guess I didn't exactly expect you to agree to come in."
1007403-60 = "No matter how relaxing being in nature is, you still have to follow your rules as our teacher."
1007403-61 = "You must be exhausted... This isn't the first time I've kept you out like this."
1007403-62 = "It's funny, how I feel so different here, but Sensei will always be...Sensei."
1007403-66 = "I thought I could ambush you and get you to cut loose a little. Heehee."
1007403-67 = "[s3] \"You never make me tired.\"\n[s4] \"The thought of cutting loose with you does scare me.\""
1007403-70 = "Yes, yes. Of course. Always the same responses..."
1007403-71 = "You know, Sensei. I'm beginning to think you're the one keeping me at arm's length."
1007403-72 = "...What was that laugh for?"
1007403-73 = "...Haha. I suppose I am having a good time here."
1007403-74 = "Really, Sensei..."
1007403-75 = "..."
1007403-76 = "Never mind. I think I'll keep my thoughts to myself this time."
1007403-77 = "I'll be sad to say good-bye to this place."
1007403-78 = "I still think there's a little left though."
1007403-79 = "...What am I talking about? Heehee. Would you like to know?"
1007403-80 = "It's a bit embarrassing to say out loud. Come closer so I can whisper it."
1007403-81 = "[s5] \"...?\"\n[s6] Approach Hanako."
1007403-87 = "Heehee."
1007403-91 = "Yah!"
1007403-96 = "Heeheehee. You're drenched now, Sensei!"
1007403-97 = "Ah. This is much better."
1007403-98 = "This way it feels like..."
1007403-99 = "We're on the same playing field."

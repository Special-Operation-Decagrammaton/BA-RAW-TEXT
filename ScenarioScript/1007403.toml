[translation]
1007403-1 = "ไม่มีใครเห็นก็ไร้ความหมาย"
1007403-2 = "(ระหว่างที่ออกมาเดินเล่นและสำรวจรอบๆ แคมป์ คุณครูก็เผลอเดินเข้าไปในป่าลึก)"
1007403-6 = "(คุณครูได้ยินเสียงน้ำดังมาจากที่ไกลๆ จึงเดาว่าน่าจะมีน้ำตกอยู่แถวนี้)"
1007403-7 = "♪~♬~~♪~♬~"
1007403-8 = "[ns1] \"เสียงร้องเพลง...?\"\n[ns2] \"เสียงนี้มัน...\""
1007403-11 = "♪~~~~♬♪~~♬~"
1007403-15 = "[ns] เดินไปทางที่ได้ยินเสียง"
1007403-19 = "หืม...?"
1007403-20 = "คุณครู...?"
1007403-23 = "― [log=하나코 수영복]ตามมาถึงที่นี่จนได้เลยสินะคะ[/log][wa:440] "
1007403-25 = "― [log=하나코 수영복]หรือไม่ก็... เป็นเรื่องบังเอิญงั้นเหรอคะ?[/log][wa:200] "
1007403-28 = "― [log=하나코 수영복]ก็เป็นงานของคุณครูนี่นา...[/log][wa:10] "
1007403-30 = "― [log=하나코 수영복]คงจะเป็นเรื่องบังเอิญแน่ๆ เลยสินะคะ[/log][wa:880] "
1007403-33 = "― [log=하나코 수영복]ฮุฮุ... ไม่ต้องตกใจขนาดนั้นก็ได้ค่ะ[/log][wa:2280] "
1007403-35 = "― [log=하나코 수영복]ฉันใส่เสื้อผ้าอยู่นะคะ[/log][wa:1460] "
1007403-38 = "― [log=하나코 수영복]ฉันก็แค่อยากสัมผัสอุณหภูมิของน้ำดูน่ะค่ะ[/log][wa:580] "
1007403-41 = "― [log=하나코 수영복]คุณครูเองก็... อยากลองมาทางนี้ดูมั้ยคะ?[/log][wa:3540] "
1007403-44 = "― [log=하나코 수영복]ที่นี่...[/log][wa:100] "
1007403-46 = "― [log=하나코 수영복]มันตรงข้ามกับน้ำพุของทรีนิตี้เลยค่ะ[/log][wa:3600] "
1007403-49 = "― [log=하나코 수영복]ไม่มีผู้คน... มีแค่ทิวทัศน์ตามธรรมชาติ...[/log][wa:2860] "
1007403-51 = "― [log=하나코 수영복]ค่ะ ไม่มีการตกแต่งประดับประดาใดๆ มีเพียงแค่ภาพลักษณ์ดั้งเดิมอย่างที่ควรเป็น[/log][wa:4000] "
1007403-54 = "― [log=하나코 수영복]เพราะงั้น...ฉันเลยอยากให้คุณครูได้สัมผัสสิ่งพวกนั้นด้วยกันค่ะ[/log][wa:2300] "
1007403-56 = "― [log=하나코 수영복]ถ้าเกิดว่าคุณครู...อยากลองดูน่ะค่ะ[/log][wa:1300] "
1007403-59 = "ฮุฮุ ไม่ยอมลงมาเล่นน้ำด้วยกันจริงๆ สินะคะ ฉันคิดไว้แล้วว่าคุณครูจะต้องทำแบบนั้น..."
1007403-60 = "ถึงฉันจะพูดด้วยท่าทางสบายๆ แบบนี้ แต่คุณครูก็ยังคงมีกฎของตัวเองที่ต้องทำตามสินะคะ"
1007403-61 = "คุณครูคงจะเหนื่อยแย่เลยสินะคะ แต่นี่ก็ไม่ใช่ครั้งแรกที่คุณครูทำแบบนี้..."
1007403-62 = "คุณครูนี่ต่างกับฉันเลยนะคะ ถึงมาที่นี่ คุณครูก็ยังเป็นคุณครูอยู่ดี..."
1007403-66 = "บางครั้งฉันเอง... ก็อยากเห็นคุณครูผ่อนคลายบ้างนะคะ"
1007403-67 = "[s3] \"ครูไม่ได้รู้สึกเหนื่อยหรือว่าไม่สบายตัวตรงไหนเลย\"\n[s4] \"การที่เธออยากให้ครูผ่อนคลายนี่แหละ เรื่องน่ากลัว\""
1007403-70 = "ค่ะ... พูดแบบเดิมอีกแล้ว..."
1007403-71 = "ที่จริงฉันแอบรู้สึกว่าคนที่เป็นฝ่ายเว้นระยะห่างน่ะไม่ใช่ฉัน แต่เป็นคุณครูต่างหาก..."
1007403-72 = "หืม? ...คะ?"
1007403-73 = "...'ค่อยยังชั่วที่ดูเหมือนฉันจะสนุกกับการมาที่นี่' อย่างนั้นเหรอคะ?"
1007403-74 = "คุณครูนี่... จริงๆ เลยนะคะ"
1007403-75 = "......"
1007403-76 = "เปล่าหรอกค่ะ แค่รู้สึกอยากแย้งอะไรบางอย่าง แต่ว่าครั้งนี้ฉันจะยอมๆ ไปก็แล้วกันค่ะ"
1007403-77 = "นั่นสินะคะ บางทีคุณครูอาจพูดถูกก็ได้ค่ะ แค่เท่านี้ฉันก็คิดว่าสนุกมากๆ แล้วละค่ะ"
1007403-78 = "ถึงจะยังเหลือสิ่งที่อยากทำอยู่นิดหน่อยก็เถอะค่ะ"
1007403-79 = "...เรื่องอะไรงั้นเหรอคะ? ฮุฮุ... อยากให้ฉันบอกงั้นเหรอคะ?"
1007403-80 = "ถ้างั้นช่วยเข้ามาใกล้ๆ อีกสักนิดได้หรือเปล่าคะ ให้พูดดังๆ มันค่อนข้างจะน่าอายน่ะค่ะ"
1007403-81 = "[s5] \"....?\"\n[s6] เข้าไปใกล้ๆ ฮานาโกะ"
1007403-87 = "...ฮุฮุ"
1007403-91 = "อ๊าาา♡"
1007403-96 = "ฮุฮุฮุ ตัวเปียกหมดเลยนะคะ คุณครู"
1007403-97 = "ค่ะ... แบบนี้ค่อยดีขึ้นหน่อยนะคะ ฮิฮิ"
1007403-98 = "ถ้าเป็นแบบนี้..."
1007403-99 = "ฉันกับคุณครูก็เหมือนกันแล้วค่ะ"

[translation]
1007403-1 = "沒人看就沒有意義"
1007403-2 = "（本來打算在散步時順便環視營地四周，結果不知不覺間來到了森林的深處）"
1007403-6 = "（遠處傳來了水聲，附近或許有瀑布也說不定）"
1007403-7 = "♪～♬～～♪～♬～"
1007403-8 = "[ns1]「……歌聲？」\n[ns2]「這個聲音是……」"
1007403-11 = "♪～～～～♬♪～～♬～"
1007403-15 = "[ns] 走向聲音傳來的方向"
1007403-19 = "哎呀……？"
1007403-20 = "……老師？"
1007403-23 = "― [log=하나코 수영복]居然能找到這裡呢。[/log][wa:1200] "
1007403-25 = "― [log=하나코 수영복]還是說只是偶然呢？[/log][wa:1480] "
1007403-28 = "― [log=하나코 수영복]畢竟是老師你……[/log][wa:310] "
1007403-30 = "― [log=하나코 수영복]想必是偶然對吧。[/log][wa:1960] "
1007403-33 = "― [log=하나코 수영복]呵呵……請不要那麼驚慌。[/log][wa:3200] "
1007403-35 = "― [log=하나코 수영복]衣服我有好好穿著。[/log][wa:1980] "
1007403-38 = "― [log=하나코 수영복]只是想感受水的溫度而已。[/log][wa:1700] "
1007403-41 = "― [log=하나코 수영복]老師也……請過來這邊吧？[/log][wa:4620] "
1007403-44 = "― [log=하나코 수영복]這裡……[/log][wa:300] "
1007403-46 = "― [log=하나코 수영복]和三一的噴泉，樣貌完全相反。 [/log][wa:4400] "
1007403-49 = "― [log=하나코 수영복]人跡罕至的、自然的姿態……[/log][wa:3980] "
1007403-51 = "― [log=하나코 수영복]沒錯。是毫無裝飾的、最原本的模樣。[/log][wa:6320] "
1007403-54 = "― [log=하나코 수영복]所以，希望能和老師一起感受。[/log][wa:4180] "
1007403-56 = "― [log=하나코 수영복]……只要老師，不介意的話。[/log][wa:2140] "
1007403-59 = "呵呵，老師果然不願意過來呢。#n雖然早有預期……"
1007403-60 = "也對，無論我說得再怎麼輕鬆，老師也有老師應該遵守的規則吧。"
1007403-61 = "老師想必很累吧。#n這應該也不是第一次……"
1007403-62 = "和我不同……老師就算來到這裡也不會改變。"
1007403-66 = "有時……我也想看看老師放鬆的樣子。"
1007403-67 = "[s3]「我並不覺得辛苦哦。」\n[s4]「被花子看到是有點可怕。」"
1007403-70 = "是是，老師總是這麼說……"
1007403-71 = "我有時會覺得，老師是不是想跟我保持距離呢……"
1007403-72 = "嗯？#n……什麼？"
1007403-73 = "看到我能樂在其中很高興是嗎……？"
1007403-74 = "老師真是的……"
1007403-75 = "…………"
1007403-76 = "雖然想說點什麼，但這次就算了吧。"
1007403-77 = "……也許正如老師所說。#n來到這座島之後，我過得相當快樂。"
1007403-78 = "但感覺，還留有一些遺憾……"
1007403-79 = "……什麼樣的遺憾是嗎？#n呵呵，要我告訴你嗎？"
1007403-80 = "那麼，請老師再靠近我一點吧。#n大聲說出來的話，我會很害羞的。"
1007403-81 = "[s5]「……？」\n[s6] 靠近花子"
1007403-87 = "……呵呵。"
1007403-91 = "嘿咿♡"
1007403-96 = "唔呵呵，一起濕透了呢，老師。"
1007403-97 = "嗯，很好，這樣很好。"
1007403-98 = "因為老師現在……"
1007403-99 = "感覺和我更接近了。"

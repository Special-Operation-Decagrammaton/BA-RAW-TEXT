[translation]
2600606-1 = "流星雨和願望"
2600606-2 = "深夜．夏萊大樓的入口"
2600606-3 = "我等好久了，老師！"
2600606-4 = "我今天實在太期待了，都沒怎麼睡……#n差點就睡過頭了呢。"
2600606-5 = "不過，能順利看到流星雨實在太好了。"
2600606-6 = "好了，快點上去屋頂吧，以免太遲了。"
2600606-8 = "深夜．夏萊大樓的屋頂上"
2600606-9 = "呼，看來還沒開始。"
2600606-10 = "老師，你不冷嗎？"
2600606-11 = "最近晚上還挺涼的，穿多一點會比較好唷。"
2600606-12 = "呵呵，要倒杯茶給你嗎？"
2600606-13 = "[s]「謝謝你。」"
2600606-18 = "總覺得……大半夜兩個人獨處，有點害羞呢。"
2600606-19 = "好不容易帶來的天文望遠鏡，觀測流星雨時好像也用不上……"
2600606-20 = "該，該聊點什麼呢……？"
2600606-21 = "[s]「和香，看天空。」"
2600606-22 = "……啊。"
2600606-26 = "― 唔哇，是流星！啊……那邊也有！那邊也有！[wa:5100] "
2600606-29 = "― 天空滿滿都是流星！流星真的像雨一樣落下了呢！[wa:5160] "
2600606-31 = "― 居然能親眼看到這麼漂亮的景象……真的好像作夢一樣。[wa:5020] "
2600606-34 = "― 願望嗎？不用……今天，已經沒關係了。[wa:6530] "
2600606-37 = "― 可以和喜歡的人，一起仰望如此美麗的星空，[wa:2440] "
2600606-39 = "― 要是再許願的話，總覺得會被星星責罵……[wa:2910] "
2600606-42 = "― 今天光是這樣就很滿足了。[wa:1870] "
2600606-45 = "可是為什麼大家都說，對流星許願願望就會實現呢？"
2600606-46 = "的確是很美，但這只是一種天文現象，跟人的願望無關呀……"
2600606-47 = "老師你怎麼想？"
2600606-48 = "（沒有回答，似乎是睡著了）"
2600606-49 = "啊啊，不可以在這裡睡著啦！"
2600606-50 = "真是的～老師～！"
2600606-52 = "（這之後，和一起和香仰望夜空，直到流星雨結束）"

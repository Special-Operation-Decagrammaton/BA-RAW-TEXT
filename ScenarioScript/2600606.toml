2600606-16 = "3;노도카;01\n#3;a\n#3;closeup\n#wait;1500"
2600606-17 = "3;노도카;01\n#3;closeup\n#3;h\n#wait;3500"
2600606-18 = "3;노도카;02;어쩐지… 이렇게 한밤중에 단둘만 있으려니 조금 부끄럽네요.\n#3;stiff\n#3;em;[///]\n#3;closeup"
2600606-19 = "3;노도카;01;모처럼 가져온 천체망원경도 유성우를 관측할 때는 필요가 없을 테고……\n#3;closeup"
2600606-20 = "3;노도카;03;무, 무슨 이야기를 하며 시간을 보내면 좋을까요……?\n#3;closeup"
2600606-21 = "[s] \"노도카, 하늘을 봐.\""
2600606-22 = "3;노도카;02;……네?\n#3;closeup\n#3;em;[?]"

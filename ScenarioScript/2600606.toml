2600606-28 = "#clearST"
2600606-29 = "#st;[-1200,-530];serial;60;― 하늘에 별똥별이 가득해요! [wa:3500]정말[wa:800] 유성이[wa:500] 비처럼 내리네요!"
2600606-30 = "#wait;2700"

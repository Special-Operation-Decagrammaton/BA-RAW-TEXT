[translation]
2600606-1 = "ฝนดาวตกและความปรารถนา"
2600606-2 = "ทางเข้าอาคารชาเล่ต์ตอนกลางดึก"
2600606-3 = "ฉันกำลังรอคุณครูอยู่เลยค่ะ"
2600606-4 = "ฉันคาดหวังกับวันนี้มากจนนอนไม่หลับเลย...#nจนฉันเกือบจะตื่นสายเลยค่ะ"
2600606-5 = "แต่ฉันรู้สึกโล่งอกมากที่ได้เห็นฝนดาวตกอย่างนี้ค่ะ"
2600606-6 = "เอาล่ะ เรารีบขึ้นไปดาดฟ้าก่อนที่จะสายเถอะค่ะ!"
2600606-8 = "ดาดฟ้าอาคารชาเล่ต์ตอนกลางดึก"
2600606-9 = "ฮู่ว... ดูเหมือนจะยังไม่เริ่มนะคะ"
2600606-10 = "คุณครูหนาวหรือเปล่าคะ?"
2600606-11 = "ตอนกลางคืนช่วงเวลานี้อากาศจะค่อนข้างเย็น ควรเลือกเสื้อหนาๆ อุ่นๆ ใส่นะคะ"
2600606-12 = "ฮิฮิ ดื่มชาสักหน่อยดีมั้ยคะ?"
2600606-13 = "[s] \"ขอบคุณนะ\""
2600606-18 = "คือว่า... พออยู่สองต่อสองตอนกลางคืนแบบนี้ ก็รู้สึกเขินขึ้นมานิดหน่อยนะคะ"
2600606-19 = "ดูเหมือนคงจะไม่จำเป็นต้องใช้กล้องโทรทรรศน์สำหรับดูฝนดาวตกแล้วล่ะค่ะ..."
2600606-20 = "มะ...มาคุยเล่นฆ่าเวลากันดีมั้ยคะ...?"
2600606-21 = "[s] \"โนโดกะ ดูบนท้องฟ้าสิ\""
2600606-22 = "...คะ?"
2600606-26 = "― อ๊ะ ดาวตกนี่! อ๊ะ... ตรงนั้นก็ด้วย! ตรงโน้นก็มี...![wa:3860] "
2600606-29 = "― ดาวตกเต็มฟ้าเลยค่ะ! ดาวตกตกลงมาเหมือนสายฝนล่ะค่ะ![wa:4080] "
2600606-31 = "― ได้เห็นวิวสวยๆ แบบนี้กับตา... มันเหมือนความฝันเลยนะคะ[wa:3900] "
2600606-34 = "― ขอพรเหรอคะ? ไม่ดีกว่าค่ะ... วันนี้ไม่ดีกว่าค่ะ[wa:5410] "
2600606-37 = "― การได้ดูวิวสวยๆ แบบนี้ ร่วมกับคนสำคัญ[wa:1760] "
2600606-39 = "― ถ้าฉันขอพรไปมากกว่านี้ อาจจะถูกคุณดวงดาวโกรธเอาได้…[wa:1630] "
2600606-42 = "― วันนี้... แค่เท่านี้ฉันก็พอใจแล้วล่ะค่ะ[wa:790] "
2600606-45 = "ว่าแต่ฉันชักสงสัยแล้วค่ะ#nว่าทำไมถึงมีเรื่องเล่าเกี่ยวกับการขอพรกับดาวตกได้?"
2600606-46 = "แน่นอนว่ามันเป็นเรื่องที่งดงามมาก แต่มันเป็นเหตุการณ์ที่เกิดขึ้นบนท้องฟ้า ไม่ได้เกี่ยวอะไรกับการที่คนขอพรเลยนี่คะ"
2600606-47 = "คุณครูคิดยังไงกับเรื่องนี้คะ?"
2600606-48 = "(ไม่มีเสียงตอบกลับ สงสัยจะหลับไปแล้ว) "
2600606-49 = "อ๊ะ คุณครูจะมาหลับตรงนี้ไม่ได้นะคะ!"
2600606-50 = "จริงๆ เลย~ คุณครู~!"
2600606-52 = "จากนั้นคุณครูก็นั่งดูท้องฟ้ายามค่ำคืนกับโนโดกะจนฝนดาวตกหยุด"

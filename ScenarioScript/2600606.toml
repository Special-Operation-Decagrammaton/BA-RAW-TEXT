[translation]
2600606-1 = "#title;유성우와 소원"
2600606-2 = "#place;심야의 샬레 건물 입구"
2600606-3 = "3;노도카;03;기다리고 있었어요, 선생님!\n#3;a\n#3;em;[반짝]\n#3;greeting"
2600606-4 = "3;노도카;01;오늘이 너무 기대되어서 잠을 설치는 바람에…… #n하마터면 늦잠을 잘 뻔했지 뭐예요."
2600606-5 = "3;노도카;03;그래도 이렇게 무사히 유성우를 볼 수 있게 되어서 얼마나 다행인지 몰라요.\n#3;hophop"
2600606-6 = "3;노도카;01;자, 늦기 전에 빨리 옥상으로 올라가요!\n#3;em;[음표]"
2600606-7 = "#all;hide"
2600606-8 = "#place;심야의 샬레 건물 옥상"
2600606-9 = "3;노도카;01;후우, 아직 시작되지는 않은 모양이네요.\n#3;em;[...]\n#3;a"
2600606-10 = "3;노도카;02;춥지는 않으신가요, 선생님?"
2600606-11 = "3;노도카;01;이 무렵의 밤은 제법 쌀쌀하니 옷을 단단히 챙겨 입으시는 게 좋아요."
2600606-12 = "3;노도카;03;후후, 차라도 한 잔 따라드릴까요?\n#3;em;[음표]"
2600606-13 = "[s] \"고마워.\""

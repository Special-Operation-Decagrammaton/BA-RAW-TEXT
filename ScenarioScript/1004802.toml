1004802-61 = "ครับ คุณคนนั้นมาที่ธนาคารของเราและบอกว่าอยากเปิดบัญชีธนาคาร แต่ไม่รู้ว่าเพราะอะไร ประวัติการศึกษาของเธอถึงถูกเก็บเป็นความลับเอาไว้..."
1004802-62 = "นี่เป็นครั้งแรกในคิโวทอสที่ระเบียนประวัติการศึกษาถูกเก็บเป็นความลับ... เพราะงั้นเราเลยทำอะไรไม่ได้"
1004802-63 = "[s] \"ถ้าเป็นเรื่องนั้นละก็ คือว่าเรื่องมันซับซ้อนนิดหน่อยน่ะ...\""
1004802-64 = "ถ้าเป็นธนาคารทั่วไปที่อื่นๆ คงไล่ออกไปตั้งนานแล้วครับ!"
1004802-65 = "แต่พวกผมเป็นใครน่ะหรือครับ?"
1004802-66 = "พวกผมคือธนาคารตลาดมืดที่จะปฏิบัติต่อทุกคนอย่างยุติธรรม หากยอมจ่ายในราคาที่สมน้ำสมเนื้อ#nยังไงล่ะ!"
1004802-67 = "ต่อให้คุณไม่มีเครดิตก็ไม่เป็นไร"

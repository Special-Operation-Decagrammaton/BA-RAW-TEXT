[translation]
1004802-1 = "獨立"
1004802-2 = "黑市．巷弄裡"
1004802-4 = "（因為沙織傳來的訊息有點不太對勁，決定前往黑市找他）"
1004802-5 = "啊，老師，你來了啊。"
1004802-6 = "[s1] 「沙織，你還好吧！？」\n[s2] 「嚇了我一跳，沙織居然突然說『需要幫忙』……」"
1004802-7 = "那個，該說是需要幫忙嗎。"
1004802-8 = "那個，該說是需要幫忙嗎。"
1004802-9 = "我原本是打算自己解決的，不過卻比想像中還困難……"
1004802-10 = "[s] 「原來如此……看來是非常棘手的問題啊！」"
1004802-11 = "不，倒也不是那樣……"
1004802-12 = "[s3] 「無論是多麼棘手的問題都沒關係！」\n[s4] 「只要是為了沙織，要我上刀山下油鍋都可以！」"
1004802-13 = "是，是嗎……"
1004802-14 = "是，是嗎……"
1004802-18 = "總之，跟我來吧。"
1004802-29 = "（跟著沙織前進後抵達的地點是……）"
1004802-30 = "[s] 「這裡是……黑市的銀行？」"
1004802-34 = "歡迎光臨，客人──"
1004802-38 = "……哼！這不是剛才那位身分不明又不講理的客人嗎！"
1004802-39 = "[s] 「身分不明……？」"
1004802-40 = "我說過很多次了，不行就是不行！"
1004802-41 = "只要您無法保證您的身分，就沒辦法辦理後續業務！"
1004802-42 = "所以我現在帶了能夠證明我身分的人。"
1004802-43 = "這，這是什麼意思……？"
1004802-47 = "難道這位……"
1004802-48 = "對。這就是你要的「保證人」。"
1004802-49 = "……原來如此。"
1004802-50 = "[ns] 「黑市的……身分保證人……！？」"
1004802-52 = "[ns5] 「難道……我將會被捲入一樁龐大的金融犯罪！？」\n[ns6] 「沙織！我那麼相信你！」"
1004802-55 = "老師……你在說什麼？"
1004802-57 = "（沙織這才說明了事情的來龍去脈）"
1004802-60 = "[ns] 「沙織想要開戶……？」"
1004802-61 = "沒錯。這位客人打算來本行開戶，但他卻連學籍資料都不肯提供……"
1004802-62 = "這是要我們怎麼幫他呢……？"
1004802-63 = "[s] 「啊，因為他有一些複雜的苦衷……」"
1004802-64 = "換作是其他銀行，早就被二話不說趕出門了！"
1004802-65 = "不過我們是誰呢？"
1004802-66 = "只要有辦法支付合理的代價，我們黑市將提供世上最公正的服務！"
1004802-67 = "就算信用不良也不用擔心。"
1004802-68 = "只要帶著健康的身體和一把槍……"
1004802-69 = "就能在這黑市之中，找到收入雖然不算高但待遇還不算太差的工作！"
1004802-70 = "[s] （真不知道該怎麼回應……）"
1004802-71 = "所以我才會說，至少要帶個能為身分做擔保的人就可以了。#n出了任何狀況都能負責的替死……"
1004802-72 = "不，我指的是只要帶個人來，我就能幫他開戶。"
1004802-73 = "[s] 「原來如此。聽起來是很棒，但怎麼好像有些詞彙挺不對勁的。」"
1004802-75 = "……對不起，老師。"
1004802-76 = "自從和夥伴們分開後，這種事我只能依靠你了……"
1004802-77 = "[s] 「話說回來，沙織為什麼要開戶呢？」"
1004802-78 = "……我最近在這個黑市落腳。"
1004802-79 = "我想我以後能待的地方，大概也只有這種暗巷了吧……"
1004802-80 = "為了在這種地方生活，我需要錢。而且……"
1004802-81 = "就算想要透過我們仲介來工作，也需要有個能夠領取報酬的帳戶。"
1004802-82 = "[s] 「原來是這樣啊……」"
1004802-83 = "……但仔細想想，這完全是我在無理取鬧。"
1004802-84 = "不能因為這種自私的理由就把你捲進來。"
1004802-85 = "你還是當這件事沒發生過吧……"
1004802-86 = "[s] 「我一點也不介意唷。」"
1004802-87 = "……老師？"
1004802-88 = "[s] 「更何況，我很高興沙織願意向我求助。」"
1004802-92 = "……是嗎。"
1004802-94 = "[ns] 「好了，來把剩下的手續辦完吧。」"
1004802-97 = "那麼，先從一些簡單的審查開始吧。"
1004802-98 = "[s] 「不是只要有保證人就行了嗎……？」"
1004802-99 = "有時也會要審查啦。"
1004802-100 = "不過請別擔心。#n雖然說是審查，其實和手續幾乎是一樣的意思，只是必須進行的一個步驟而已……"
1004802-101 = "我無所謂。"
1004802-102 = "[s] 「既然沙織都這麼說了……」"
1004802-103 = "好的，那就請問……"
1004802-104 = "您目前為止有哪些工作經驗呢？"
1004802-105 = "目前為止嗎……？"
1004802-106 = "[s] 「請問為什麼會需要這些資訊？」"
1004802-107 = "這是為了在開戶後能方便仲介工作，#n所以我們需要事先了解客戶至今為止的工作經驗及資歷。"
1004802-108 = "請問有什麼問題嗎？"
1004802-109 = "不，沒問題。我願意回答。"
1004802-114 = "雖然細節不方便透露……我做過破壞、爆破及推翻學園的策畫和實際執行。"
1004802-116 = "……？"
1004802-117 = "因此我十分擅長瓦解如此大規模的組織。"
1004802-118 = "……什麼？"
1004802-119 = "[s] 「沙織，你的說法有點……！！」"
1004802-120 = "……我說的都是實話啊？"
1004802-121 = "[s] 「雖然是那樣沒錯！」"
1004802-122 = "那，那，那還真是特別的經驗呢！"
1004802-123 = "接，接著下一個問題是……"
1004802-127 = "請問您目前居住的地址是……？"
1004802-128 = "地址……"
1004802-129 = "我現在居無定所，但總之目前都待在黑市。"
1004802-130 = "嗯？"
1004802-131 = "準確來說，我會在廢棄建築、地下道等地方之間，陸續更換落腳處。"
1004802-135 = "……請問，這是最近流行的某種玩笑話嗎？"
1004802-136 = "[s] 「請當他是在開玩笑吧！」"
1004802-137 = "那接下來……"
1004802-139 = "（一段時間之後……）"
1004802-142 = "……好，問題都問完了。"
1004802-143 = "[s] 「終，終於……」"
1004802-145 = "是嗎，"
1004802-146 = "總算能開戶了……"
1004802-147 = "啊。"
1004802-148 = "其實最後……"
1004802-150 = "還有一項最重要的「技能測驗」。"
1004802-154 = "[ns] 「你們不是說只要進行『簡單的手續』就好嗎！？」"
1004802-155 = "哈哈，但我們這裡可是黑市啊？"
1004802-156 = "再怎麼樣也不可能幫對方無條件開戶吧？"
1004802-157 = "而且這項測驗也是為了客戶的未來著想。"
1004802-158 = "為了以防萬一，我們必須對客戶的實力有所了解。#n畢竟這會直接關係到客戶的還款能力……不過相應的，報酬也會因此增加。"
1004802-159 = "[s] 「這就是黑市的做法啊……不過……」"
1004802-161 = "……老師都幫了我這麼多，可不能就此打退堂鼓。"
1004802-162 = "我願意接受測驗。"
1004802-163 = "很好！"
1004802-172 = "測驗內容相當簡單。"
1004802-173 = "請您讓我們見識，您能在黑市守衛的手中撐多久吧！"
1004802-174 = "撐的時間越久，客戶等級也就越高，請您加油囉！"
1004802-175 = "準備好了嗎？"
1004802-180 = "……"
1004802-182 = "測驗開始！"
1004802-183 = "……！"
1004802-201 = "[ns] 「果然厲害……」"
1004802-202 = "……咦？"
1004802-207 = "這樣行嗎？"
1004802-208 = "這，這也太強了……！"
1004802-209 = "……！我，我們果然不能幫您開戶！"
1004802-210 = "……你說什麼？"
1004802-211 = "假如您無論如何都想開戶的話……"
1004802-212 = "沒錯！"
1004802-217 = "那就請您成為我們黑市銀行的專屬警衛吧！"
1004802-218 = "[s] 「這是什麼意思！？」"
1004802-224 = "咿，咿！？"
1004802-226 = "……我懂了。難怪你的說法一直改來改去……原來是在騙我們？"
1004802-227 = "看來我們只是在浪費時間……"
1004802-228 = "算了，就當今天是來學個教訓的。我們回去吧。"
1004802-229 = "我，我馬上替您開戶！！請您原諒！！！！"
1004802-240 = "（成功開完戶後，和沙織走出了銀行）"
1004802-241 = "[s] 「辛苦你了，沙織。」"
1004802-242 = "不，我不辛苦……"
1004802-243 = "反而害你平白被捲進麻煩事。"
1004802-244 = "[s7] 「不會，不要在意。」\n[s8] 「話說回來，他們說法一直改來改去，真令人傷腦筋……」"
1004802-245 = "……關於黑市的負面消息，我之前也時有所聞。"
1004802-246 = "……關於黑市的負面消息，我之前也時有所聞。"
1004802-247 = "看來果然名不虛傳。"
1004802-248 = "[s] 「這世界上有很多危險的地方呢，所以……」"
1004802-249 = "……所以？"
1004802-250 = "[s] 「所以你以後也要小心一點唷，沙織。」"
1004802-254 = "……"
1004802-255 = "……今天欠的，我一定會還。"
1004802-256 = "記住這句話就行了。"
1004802-260 = "[ns] 「……我只希望你能盡可能地往好的方向發展。」"

[translation]
1004802-1 = "Self-Reliance"
1004802-2 = "Black Market Street"
1004802-4 = "Saori sent a message that was a bit strange, so I went to the Black Market."
1004802-5 = "Oh, Sensei, there you are."
1004802-6 = "[s1] \"Uh, Saori. Are you okay? I was surprised to get your message!\"\n[s2] \"You don't usually contact me asking for help...\""
1004802-7 = "Oh, I don't know if I really need help. It's just..."
1004802-8 = "Oh, I don't know if I really need help. It's just..."
1004802-9 = "I was trying to solve something on my own, but it seems impossible."
1004802-10 = "[s] \"If you requested help from me...it must be a massive problem!\""
1004802-11 = "Huh? No, I mean..."
1004802-12 = "[s3] \"It doesn't matter how big the problem is!\"\n[s4] \"I'll do everything I can to help you, Saori!\""
1004802-13 = "Oh... Okay... A-All right..."
1004802-14 = "Oh... Okay... A-All right..."
1004802-18 = "Then, this way."
1004802-29 = "I followed Saori and arrived at..."
1004802-30 = "[s] \"Huh? Is this...the Black Market Bank?\""
1004802-34 = "Hello! Welcome!"
1004802-38 = "Ack! You're that mysterious, stubborn girl who came by recently!"
1004802-39 = "[s] \"H-Huh? M-Mysterious...?\""
1004802-40 = "I've told you again and again! It's impossible!"
1004802-41 = "Without a personal reference, we can't proceed with your request!"
1004802-42 = "That's why I brought a personal reference."
1004802-43 = "You have a personal reference all of a sudden? "
1004802-47 = "Huh? This person...?"
1004802-48 = "Yes, I've brought a guarantor, as you've requested."
1004802-49 = "Hmm..."
1004802-50 = "[ns] \"A personal reference...for the Black Market...?\""
1004802-52 = "[ns5] \"...Am I getting involved in a massive financial crime here?!\"\n[ns6] \"Saori! I trusted you completely!\""
1004802-55 = "Sensei? I'm not sure what you're talking about."
1004802-57 = "Eventually, Saori explained the situation to me."
1004802-60 = "[ns] \"This is about opening an account...?\""
1004802-61 = "Yes. She said she wanted to open an account at our branch, but she won't reveal her academic record... "
1004802-62 = "Without an academic record, you can't do anything in Kivotos!"
1004802-63 = "[s] \"Oh, if that's the problem... Well, it's a bit complicated.\""
1004802-64 = "If it was any other bank, she would have been kicked out immediately!"
1004802-65 = "But we're different, you know?"
1004802-66 = "If you pay a fair price, the Black Market will treat you more fairly than anyone!"
1004802-67 = "You don't even need credit."
1004802-68 = "If you're physically able and have a decent firearm..."
1004802-69 = "I wouldn't say it's amazing work, but it's not hard to get a job at the Black Market!"
1004802-70 = "[s] \"(I don't know how to respond to this...)\""
1004802-71 = "Because of that, we need a personal reference, someone who will take responsibility if something happens..."
1004802-72 = "I mean, we simply told her that we need a guarantor and she'd be able to open an account..."
1004802-73 = "[s] \"I'd be happy to help, but this situation is a bit concerning.\""
1004802-75 = "...Sorry, Sensei."
1004802-76 = "I parted ways with the rest of the Arius Squad. I don't have anyone else to rely on."
1004802-77 = "[s] \"But why are you trying to open an account?\""
1004802-78 = "I recently got involved in the Black Market."
1004802-79 = "I didn't know where else I could go."
1004802-80 = "You know...I need money to live and stuff. And..."
1004802-81 = "We told her that she needs an account in order to carry out commissions brokered by us to get paid."
1004802-82 = "[s] \"Oh, that's why...\""
1004802-83 = "...But according to them, I was asking for something impossible."
1004802-84 = "I shouldn't have involved you in this..."
1004802-85 = "It's okay. Let's just pretend I never called you."
1004802-86 = "[s] \"No, these are the kinds of things I can help with.\""
1004802-87 = "R-Really?"
1004802-88 = "[s] \"More than anything, I'm glad you reached out to me.\""
1004802-92 = "...Okay."
1004802-94 = "[ns] \"Let's do this! Let's open an account!\""
1004802-97 = "Great! We'll need to start with a simple evaluation to open an account!"
1004802-98 = "[s] \"I thought you just needed a guarantor?\""
1004802-99 = "Ahaha! Please don't worry!"
1004802-100 = "It's a simple process. Of course, you don't have to do it if you'd rather not open an account."
1004802-101 = "I don't mind, Sensei."
1004802-102 = "[s] \"If you say so...\""
1004802-103 = "Okay, here's the first question..."
1004802-104 = "Can you tell me about your previous jobs and what kind of work experience you had before coming here?"
1004802-105 = "Previous jobs...?"
1004802-106 = "[s] \"Wait, wait. Is this really necessary information?!\""
1004802-107 = "If I can get the applicant's field of experience, we'll be able to offer more suitable jobs."
1004802-108 = "Will that be a problem?"
1004802-109 = "No, it's fine. I can answer this, Sensei."
1004802-114 = "I can't tell you the details, but I used to plan and execute explosions, building demolitions, and the overthrowing of academies."
1004802-116 = "...?"
1004802-117 = "Particularly, destroying larger organizations is my specialty."
1004802-118 = "Hm?"
1004802-119 = "[s] \"S-Saori?! Maybe you should reel it back a little.\""
1004802-120 = "What? I shouldn't lie, right?"
1004802-121 = "[s] \"W-Well... Technically yes...\""
1004802-122 = "A-Ahem! You have a very unique background!"
1004802-123 = "O-Okay... Let's move on to the next question..."
1004802-127 = "Where is your residence located?"
1004802-128 = "My residence..."
1004802-129 = "I don't really have one. I'm staying at the Black Market at the moment."
1004802-130 = "Huh?"
1004802-131 = "To be exact, sometimes an abandoned building, a broken-down car, an underpass. It changes."
1004802-135 = "Is this some kind of joke?"
1004802-136 = "[s] \"Uhhh! Let's just say it was!\""
1004802-137 = "Next is..."
1004802-139 = "We went through a whole host of questions."
1004802-142 = "Okay. That's everything.  "
1004802-143 = "[s] \"F-Finally...\""
1004802-145 = "Good."
1004802-146 = "Can I make my account now?"
1004802-147 = "Ah!"
1004802-148 = "There is one last, but essential step."
1004802-150 = "It's a skill test."
1004802-154 = "[ns] \"You said this was a simple evaluation!\""
1004802-155 = "Haha. Even if she has a reference, this is the Black Market...."
1004802-156 = "We can't just open an account for anybody, you know?"
1004802-157 = "Also, this test is in the best interests of the customer."
1004802-158 = "We need to have an understanding of her capabilites to know what types of jobs she can handle. It benefits every party."
1004802-159 = "[s] \"I understand this is the Black Market, but that's...\""
1004802-161 = "You've helped me get this far, I can't give up now."
1004802-162 = "Okay. I'll take your skill test."
1004802-163 = "Ahaha! Good!"
1004802-172 = "The test is simple."
1004802-173 = "How long can you defend yourself against some Black Market Guards?!"
1004802-174 = "The longer you last, the higher your rating and service rank. Do your best!"
1004802-175 = "Are you ready?"
1004802-180 = "..."
1004802-182 = "Commence the test!"
1004802-183 = "...!"
1004802-201 = "[ns] \"That was amazing, as usual.\""
1004802-202 = "... *gasp*"
1004802-207 = "Was that good enough?"
1004802-208 = "You're extremely skilled!"
1004802-209 = "But! N-No! W-We cannot open an account for you!"
1004802-210 = "What?"
1004802-211 = "If you really want to open an account..."
1004802-212 = "Yes, yes!"
1004802-217 = "Instead, how about you join the exclusive security team for the Black Market Bank?"
1004802-218 = "[s] \"Um... Excuse me?!\""
1004802-224 = "Hey!"
1004802-226 = "I understand. You keep changing your promises. You're a liar."
1004802-227 = "This was a waste of my time."
1004802-228 = "But I learned a valuable lesson."
1004802-229 = "No! I apologize! W-W-We'll open it right now!"
1004802-240 = "On our way back after finally opening her account..."
1004802-241 = "[s] \"Good work, Saori.\""
1004802-242 = "No, I didn't do much..."
1004802-243 = "It was a lot more complicated than I expected... I'm sorry."
1004802-244 = "[s7] \"No, it's okay. I'm glad I was there to help you navigate the Black Market.\"\n[s8] \"As you can see, the Black Market can and will go back on their word anytime.\""
1004802-245 = "I thought I understood how the criminal world works by now."
1004802-246 = "I thought I understood how the criminal world works by now."
1004802-247 = "But you're right."
1004802-248 = "[s] \"The world is a dangerous place. So...\""
1004802-249 = "So...?"
1004802-250 = "[s] \"Be careful, Saori. Please.\""
1004802-254 = "......"
1004802-255 = "I'll repay you for this, Sensei."
1004802-256 = "Until next time, then."
1004802-260 = "[ns] \"...I hope she'll be okay.\""

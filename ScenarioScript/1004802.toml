1004802-71 = "เพราะงั้นคนที่จะมารับประกันให้คุณ อย่างน้อยก็ต้องเป็นคนที่พร้อมจะรับผิดชอบแทน หากเกิดเรื่องไม่คาดคิดขึ้น..."

10014050-23 = "3;레이사;02;……어라?"
10014050-24 = "3;레이사;14;그, 그러게요? 으음……. 따로 연락을 한 사람이 없네요. 그러고 보니 왜 그랬을까요?\n#3;em;[땀]\n#3;stiff"

10014050-10 = "3;레이사;02;아아……. 오늘 일이요?"
10014050-11 = "3;레이사;04;그, 그건 이제 더는 걱정하실 필요 없습니다! 네! 저도 제대로 확인했으니까요!!\n#3;hophop"
10014050-12 = "3;레이사;08;쿄야마 카즈사는 완전히 개과천선했으며, 평범하게 좋은 사람들과 착하게 잘 지내고 있다!"
10014050-13 = "3;레이사;09;아무리 저라도 굳이 그걸 들춰낼 필요는 없죠! 그러니 이제 걱정하실 필요도 없어요!"
10014050-14 = "3;레이사;03;저도 더는 쿄야마 카즈사를 귀찮게 하지는 않을 테니까요!\n#3;em;[재잘]"
10014050-15 = "[s3] \"그런 말을 하려고 온 게 아냐.\"\n[s4] \"그럼 레이사는 그걸로 된 거야?\""
10014050-16 = "3;레이사;04;……네? 그게 무슨 말씀이신지……. 죄송하지만 이해가 잘 안 가는데…….\n#3;em;[땀]\n#3;stiff"
10014050-17 = "3;레이사;04;……네? 그게 무슨 말씀이신지……. 죄송하지만 이해가 잘 안 가는데…….\n#3;em;[땀]\n#3;stiff"
10014050-18 = "3;레이사;05;쿄야마 카즈사는 더 쓰러트릴 필요가 없는 사람이 됐고, 저도 더는 도전할 필요가 없어졌다……."

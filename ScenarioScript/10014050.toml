[translation]
10014050-1 = "第5話;想要忘記的過去"
10014050-2 = "（……）"
10014050-3 = "……啊，老師！#n你先到了啊！"
10014050-4 = "[s1] 「畢竟是我約你出來的。」\n[s2] 「隨意坐吧。」"
10014050-5 = "你好！！我是宇沢澪紗，再次向老師問好！！"
10014050-6 = "你好！！我是宇沢澪紗，再次向老師問好！！"
10014050-7 = "沒想到才剛告訴老師聯絡方式就被約出來了啊！"
10014050-8 = "話說回來……有什麼事呢……？"
10014050-9 = "……咦？"
10014050-10 = "啊啊……是今天那件事嗎？"
10014050-11 = "那，那件事的話不用擔心的！嗯！#n我已經聽得很清楚了！！"
10014050-12 = "杏山千紗已經改過自新，#n正在和夥伴們一起享受平凡的校園生活。"
10014050-13 = "就算是我也不會去打擾他的新生活的！#n所以不用擔心！"
10014050-14 = "從今以後，我不會再給杏山千紗添麻煩了！"
10014050-15 = "[s3] 「我想說的不是這個，頭抬起來吧。」\n[s4] 「……澪紗覺得這樣好嗎？」"
10014050-16 = "……咦？那是什麼意思……#n不好意思，我不太懂……"
10014050-17 = "……咦？那是什麼意思……#n不好意思，我不太懂……"
10014050-18 = "杏山千紗已經不是太妹了。#n所以已經沒有打倒他、挑戰他的必要了……"
10014050-19 = "……除，除了這個之外，還有什麼事嗎？"
10014050-20 = "……咦？"
10014050-21 = "杏山千紗的事情有沒有告訴其他自衛隊或是實現正義部的人……？"
10014050-22 = "不，沒有……"
10014050-23 = "……咦？"
10014050-24 = "對，對耶？唔嗯……確實沒有向其他人報告或提起這件事呢。#n為什麼呢？"
10014050-25 = "就連鈴美同學都沒有說過……真奇怪啊。"
10014050-26 = "是我必須打倒的宿敵！！"
10014050-27 = "……或許是因為我這麼覺得吧？#n啊哈哈……"
10014050-31 = "……雖然，本來就沒有什麼人可以聯絡就是了。啊哈哈……"
10014050-32 = "先不管那個了。#n……老師為什麼要問我這件事呢？"
10014050-33 = "難道……"
10014050-34 = "找到了！！是自衛隊的小不點！！"
10014050-35 = "……咦？"
10014050-36 = "[ns] 「……！？」"
10014050-42 = "啊啊，是這傢伙沒錯！！"
10014050-43 = "喂！叫所有人過來！別讓他逃了！#n現在可是絕佳的機會啊！"
10014050-44 = "[s5] 「別讓他逃了……？」\n[s6] 「絕佳的機會？」"
10014050-45 = "啊？什麼嘛。#n還有大人在啊……"
10014050-46 = "啊？什麼嘛。#n還有大人在啊……"
10014050-47 = "算了，無所謂。喂，不想受傷的話現在趕快滾吧。#n我們想找的只有那傢伙而已！"
10014050-48 = "……是，是我嗎？"
10014050-49 = "少給我裝傻。我全都知道了。"
10014050-50 = "你……知道「凱茜．帕魯格」的身分對吧？"
10014050-51 = "……？？凱茜．帕魯格？#n是，是知道沒錯……那又怎麼了？"
10014050-52 = "還問怎麼了！我聽說那傢伙打算創立新的組織啊！"
10014050-53 = "是叫做「放學後的甜點團」之類的對吧。#n吶？我說的沒錯吧？"
10014050-54 = "[s7] 「……啊，難道說。」\n[s8] 「看來事情複雜起來了呢。」"
10014050-55 = "請，請等一下！#n那是誤會！！沒有那種組織啊！！"
10014050-56 = "請，請等一下！#n那是誤會！！沒有那種組織啊！！"
10014050-57 = "杏山……不對，凱茜．帕魯格他……不是大家想像中的那種人！"
10014050-58 = "不如說，他已經不在了！"
10014050-59 = "你在說什麼啊？#n要我們相信那種話？當我們是笨蛋啊！"
10014050-60 = "哈，哈哈……#n果，果然會這樣呢？我一開始也不相信的……"
10014050-61 = "……不，不是這樣！我說的是真的！#n凱茜．帕魯格已經不在了！"
10014050-62 = "雖然打從一開始就不覺得能輕鬆讓你說出實話……這也沒辦法。"
10014050-63 = "喂！！要上了！！"
10014050-68 = "詳細的情況就對著槍口說吧！！"
10014050-73 = "為，為什麼會這樣……"
10014050-74 = "老，老師……！？"
10014050-75 = "[s9] 「這……沒辦法了。」\n[s10] 「總之先聽我指揮吧，澪紗。」"
10014050-76 = "啊……"
10014050-77 = "啊……"
10014050-78 = "……是！！"

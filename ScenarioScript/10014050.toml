[translation]
10014050-1 = "ตอนที่ 5;คนในความทรงจำที่อยากลืม"
10014050-2 = "(...)"
10014050-3 = "เอ๊ะ... มาถึงก่อนแล้วสินะคะ? คุณครู!"
10014050-4 = "[s1] \"ก็ครูเป็นคนเรียกมาก่อนนี่นา\"\n[s2] \"อ่า มานั่งตรงนี้สิ\""
10014050-5 = "สวัสดีค่ะ...! ขอแนะนำตัวอีกครั้งนะคะ ฉันอุซาวะ เรอิสะค่ะ!"
10014050-6 = "สวัสดีค่ะ...! ขอแนะนำตัวอีกครั้งนะคะ ฉันอุซาวะ เรอิสะค่ะ!"
10014050-7 = "ไม่คิดเลยว่าพอให้ช่องทางติดต่อไปก็เรียกฉันออกมาทันทีเลย!"
10014050-8 = "ว่าแต่... คุณครูมีธุระอะไรกับฉันงั้นเหรอ...?"
10014050-9 = "คะ..?"
10014050-10 = "อ่า... เรื่องวันนี้เหรอคะ?"
10014050-11 = "คะ... คือว่าเรื่องนั้นไม่มีอะไรต้องกังวลแล้วค่ะ! ค่ะ! ฉันตรวจสอบเรียบร้อยแล้วน่ะค่ะ!!"
10014050-12 = "เคียวยามะ คาซึสะกลับตัวกลับใจอย่างสมบูรณ์แล้ว และใช้ชีวิตธรรมดาๆ อยู่กับกลุ่มคนที่แสนดี!"
10014050-13 = "และฉันเองก็คงไม่ต้องไปขุดคุ้ยเรื่องนั้นแล้วละค่ะ! เพราะฉะนั้นตอนนี้ไม่มีอะไรต้องกังวลแล้วค่ะ!"
10014050-14 = "ฉันจะไม่ไปทำเรื่องวุ่นวายให้เคียวยามะ คาซึสะรำคาญใจอีกแล้วค่ะ!"
10014050-15 = "[s3] \"ครูไม่ได้จะพูดเรื่องนั้นหรอก\"\n[s4] \"ถ้างั้นเรอิสะก็พอใจกับเรื่องนี้แล้วเหรอ?\""
10014050-16 = "คะ...? ขอโทษนะคะ ฉันไม่ค่อยเข้าใจเลย.. ว่าคุณครูหมายความว่ายังไง..."
10014050-17 = "คะ...? ขอโทษนะคะ ฉันไม่ค่อยเข้าใจเลย.. ว่าคุณครูหมายความว่ายังไง..."
10014050-18 = "เคียวยามะ คาซึสะไม่ใช่คนที่ฉันต้องเอาชนะให้ได้แล้วค่ะ ไม่จำเป็นต้องไปท้าต่อสู้อีกแล้วค่ะ..."
10014050-19 = "คะ... คือว่ามีอะไรอีกรึเปล่าคะ?"
10014050-20 = "คะ..?"
10014050-21 = "เคยติดต่อกับกลุ่มรักษาความสงบหรือชมรมทวงความยุติธรรมคนอื่นเรื่องเคียวยามะ คาซึสะ#nรึเปล่าเหรอคะ?"
10014050-22 = "ไม่นะคะ ไม่เคยนะ..."
10014050-23 = "เอ๋...?"
10014050-24 = "นั่นสิคะ? อืม... ไม่ได้ติดต่อใครเป็นการส่วนตัวเลยนะคะ จะว่าไปก็ ทำไมถึงเป็นอย่างนั้นนะ?"
10014050-25 = "แม้แต่กับคุณสึซึมิ... ก็ไม่เคยคุยเรื่องนี้เป็นการส่วนตัวเลย... แปลกจังเลย"
10014050-26 = "ก็แบบว่า นี่คือศัตรูตัวฉกาจที่ฉันต้องเอาชนะให้ได้!"
10014050-27 = "เพราะว่าคิดแบบนั้นรึเปล่านะ? ฮ่ะฮ่ะฮ่ะ!"
10014050-31 = "อันที่จริง... มันเป็นเพราะตอนแรกไม่มีใครที่ฉันจะติดต่อไปได้เลยน่ะค่ะ ฮ่าฮ่า..."
10014050-32 = "ตะ... แต่ว่าขอโทษนะคะ... ทำไมคุณครูถึงเอาแต่ถามเรื่องแบบนี้ล่ะคะ ฉันไม่ค่อยเข้าใจ..."
10014050-33 = "หรือว่า..."
10014050-34 = "อยู่นี่เองสินะ ยัยกลุ่มรักษาความสงบแปลกๆ นั่น!!"
10014050-35 = "หือ...?"
10014050-36 = "[ns] \"......!?\""
10014050-42 = "ใช่แล้ว ยัยนี่แหละ ฉันเห็นเต็มตาเลย เป็นยัยนี่แน่นอน!!"
10014050-43 = "ไปเรียกเจ้าพวกนั้นมาให้หมด! ตอนนี้เป็นโอกาสทองของเราแล้ว จะปล่อยไปไม่ได้เด็ดขาด!!"
10014050-44 = "[s5] \"ปล่อยไปไม่ได้เด็ดขาด...\"\n[s6] \"โอกาสทอง?\""
10014050-45 = "อ่า อะไรเนี่ย ทำไมถึงมีผู้ใหญ่อยู่ด้วยล่ะ...?"
10014050-46 = "อ่า อะไรเนี่ย ทำไมถึงมีผู้ใหญ่อยู่ด้วยล่ะ...?"
10014050-47 = "จะยังไงก็ไม่สำคัญ ผู้ใหญ่ตรงนั้นน่ะ ถ้าไม่อยากเจ็บตัวก็หลบไปซะ พวกเรามีเรื่องต้องสะสางกับยัยนั่น!"
10014050-48 = "คะ...? ฉันเหรอคะ?"
10014050-49 = "ไม่ต้องมาทำเป็นไขสือ พวกเรามาเพราะเรารู้เรื่องทั้งหมดแล้วยังไงล่ะ"
10014050-50 = "เธอน่ะ... รู้ใช่มั้ยว่า <แคทส์ พาลูค> คือใคร?"
10014050-51 = "...?? แคทส์ พาลูค? อ่อ.. เรื่องนั้น... แล้วมันทำไมเหรอ...?"
10014050-52 = "ทำไมอะไรของเธอเล่า! ก็ข่าวลือมันแพร่ไปทั่วแล้วยังไงล่ะว่ายัยนั่นจะตั้งแก๊งขึ้นมาใหม่น่ะ!"
10014050-53 = "ชื่อว่าแก๊งของหวานหลังเลิกเรียนอะไรสักอย่างเนี่ยแหละ ใช่มั้ย? พวกเราพูดถูกใช่มั้ย?"
10014050-54 = "[s7] \"อ่า... อย่าบอกนะว่า\"\n[s8] \"เรื่องยุ่งเหยิงไปหมดแล้ว\""
10014050-55 = "ดะ... เดี๋ยวก่อนค่ะ เป็นแค่เรื่องเข้าใจผิดค่ะทุกคน! ไม่มีองค์กรอะไรแบบนั้นหรอกค่ะ! ข่าวปลอมค่ะ!"
10014050-56 = "ดะ... เดี๋ยวก่อนค่ะ เป็นแค่เรื่องเข้าใจผิดค่ะทุกคน! ไม่มีองค์กรอะไรแบบนั้นหรอกค่ะ! ข่าวปลอมค่ะ!"
10014050-57 = "แล้วก็เคียวยามะ... ไม่สิ แคทส์ พาลูคน่ะ... ตอนนี้ไม่ใช่คนเดิมกับที่ทุกคนคิดไว้อีกแล้วละค่ะ!"
10014050-58 = "ไม่สิ ไม่มีคนคนนั้นอีกแล้วค่ะ!"
10014050-59 = "พูดเรื่องไร้สาระอะไรน่ะ? จะบอกให้พวกเราเชื่อเรื่องแบบนั้นเหรอ? คิดว่าพวกเราโง่รึไง?"
10014050-60 = "ฮ่ะฮ่ะฮ่ะ งะ...งั้นสินะคะ? ความจริงฉันก็เคยคิดแบบนั้นเหมือนกันค่ะ..."
10014050-61 = "เดี๋ยวก่อน... ไม่ใช่แบบนั้น! ฉันพูดเรื่องจริงนะคะ! ไม่มีอะไรเกี่ยวข้องกับพวกคุณอีกแล้วค่ะ!!"
10014050-62 = "ถึงจะคิดเอาไว้แล้วก็เถอะ แต่ยัยนี่พูดจาไร้สาระสุดๆ"
10014050-63 = "ทุกคน!!"
10014050-68 = "พวกเราไม่ต้องไปโต้ตอบด้วยปาก แต่ตอบโต้ไปด้วยลูกปืนแทนก็แล้วกัน!!"
10014050-73 = "ทะ...ทำไมถึงเป็นแบบนี้ไปได้..."
10014050-74 = "คะ... คุณครูคะ...!?"
10014050-75 = "[s9] \"คงช่วยไม่ได้แล้วละนะ\"\n[s10] \"ก่อนอื่นก็ฟังคำสั่งการของครูนะ เรอิสะ\""
10014050-76 = "อ่า..."
10014050-77 = "อ่า..."
10014050-78 = "ได้เลยค่ะ...!!"

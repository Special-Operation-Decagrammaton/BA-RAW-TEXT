[translation]
10027100-1 = "ตอนที่ 10;ข้อเสนอจากชมรมผู้รับจ้าง"
10027100-9 = "ทุ่งหิมะเรดวินเทอร์"
10027100-10 = "แฮ่ก... แฮ่ก..."
10027100-11 = "นี่เรา... ชนะหรือยัง?"
10027100-12 = "เราขับไล่สำนักเลขาธิการไปได้แล้วก็จริง แต่นี่อาจทำให้เราถูกสายตาน่าเกลียดชังมองมาก็ได้ค่ะ..."
10027100-13 = "ไม่เป็นไรหรอก สำนักเลขาธิการก็ไม่ค่อยชอบ <ชมรมแนวร่วมปลดปล่อยความรู้> มาตั้งแต่ไหนแต่ไรแล้ว"
10027100-14 = "มันก็จริงอยู่หรอกค่ะ..."
10027100-18 = "[ns] \"คนที่ขัดขวางอีเวนต์โดจินจะได้เจอกับความพินาศในภายภาคหน้า...!\""
10027100-19 = "คะ... คุณครู?"
10027100-20 = "ไปข้างหน้ากันต่อเถอะ! เราไม่มีเวลาแล้ว!"
10027100-23 = "ฉันอยากคุยเกี่ยวกับเรื่องนั้นในแง่ของการใช้แรงงานและการปฏิวัติน่ะ"
10027100-25 = "อะไรอีกเนี่ย?!"
10027100-34 = "หืม...? สมาชิกชมรมผู้รับจ้างกับหัวหน้ามิโนริ...?"
10027100-36 = "มาอยู่ที่นี่พอดีเลยสินะ งั้นก็ดีเลย"
10027100-37 = "ได้ยินมาว่า <ชมรมแนวร่วมปลดปล่อยความรู้> กำลังทำหนังสือผลงานที่ชื่อว่า <ลูน่า> อยู่เป็นการใหญ่ ฉันก็เลยออกมาหาน่ะ"
10027100-39 = "อ่า... มันก็ไม่ได้เป็นการใหญ่อะไรหรอกนะ แต่ก็... ทำอะไรทำนองนั้นอยู่น่ะ..."
10027100-40 = "ว่าแต่... โดจินชิของพวกเรากับชมรมผู้รับจ้างเกี่ยวอะไรกันเหรอคะ?"
10027100-42 = "ก่อนอื่นฉันต้องบอกว่าพวกเราเคารพความคิดริเริ่มและจิตวิญญาณของ <ชมรมแนวร่วมปลดปล่อยความรู้> ที่มองย้อนถึงมรดกในอดีต และตั้งใจจะฟื้นฟูมันในยุคปัจจุบันอยู่นะ"
10027100-43 = "เพราะยิ่งระลึกถึงประวัติศาสตร์ของการใช้แรงงาน ความตั้งใจต่อการปฏิวัติก็จะยิ่งแรงกล้า และจะยิ่งมีการกระตุ้นเพื่อต่อสู้ให้ได้มาซึ่งสิทธิที่พึงมี"
10027100-45 = "(<ลูน่า> มีเนื้อหาแบบนั้นเหรอ...?)"
10027100-46 = "(ไม่ใช่ค่ะ ไม่ใช่แน่นอน...)"
10027100-48 = "เพราะฉะนั้น! พวกเราชมรมผู้รับจ้างก็เลยมีข้อเสนอมาให้กับ <ชมรมแนวร่วมปลดปล่อยความรู้>!"
10027100-49 = "นั่นคือการเปลี่ยนเนื้อหาของหนังสือที่ <ชมรมแนวร่วมปลดปล่อยความรู้> ทำขึ้นตอนนี้ให้เป็นเนื้อหา ในเชิงปฏิวัติและรุดหน้า!"
10027100-51 = "เฮ้! เฮ้!"
10027100-53 = "และเพื่อเป็นการให้ความรู้และปลดปล่อยชนชั้นแรงงาน พวกเราขอเสนอให้ใช้เรื่องของแรงงานที่ได้รับ#nความลำบากจากพวกนายทุนและเรื่องราวการต่อสู้ของพวกเขาเป็นข้อมูลหลักในหนังสือ!"
10027100-55 = "เฮ้! เฮ้!"
10027100-61 = "[ns] \"ไปได้ยินเนื้อหาแบบนั้นมาจากไหนกันอีกละเนี่ย...\""
10027100-63 = "...ก็ว่าอยู่ว่าพูดเรื่องอะไร..."
10027100-64 = "ที่จริงพวกเราก็ติดหนี้บุญคุณสมาชิกชมรมผู้รับจ้างอยู่ แล้วก็รู้สึกขอบคุณคนที่แวะเวียนมาที่ห้องสมุด#nของพวกเราด้วย..."
10027100-66 = "แต่ครั้งนี้เราทำให้ไม่ได้ค่ะ!"
10027100-67 = "ใช่! เวลาก็ไม่มีด้วย!"
10027100-73 = "...น่าผิดหวังจังเลยนะ <ชมรมแนวร่วมปลดปล่อยความรู้> บรรณารักษ์ของ <ชมรมแนวร่วมปลดปล่อยความรู้> น่าจะได้อ่านวรรณกรรมที่เลือกมาอย่างพิถีพิถัน และเรียนรู้อะไรไปเยอะเลยนี่นา"
10027100-74 = "ฉันคิดว่าครั้งนี้เราจะได้ร่วมมือกันแล้วทำให้ <มนุษย์หนวดน่ารังเกียจที่ทิ้งฝาโยเกิร์ตโดยที่ยังไม่เลีย> สำนึกได้เสียอีก!"
10027100-75 = "[s] \"เรื่องนี้มาจากชมรมผู้รับจ้างนี่เอง!\""
10027100-76 = "งั้นก็ช่วยไม่ได้นะ ฉันไม่อยากใช้วิธีนี้เลย แต่ก็ต้องทำ..."
10027100-77 = "เหล่าสหาย! จากนี้เราจะเข้าสู่การต่อสู้ที่ดุเดือด เพื่อทำให้ทัศนวิสัยที่มืดมนของ <ชมรมแนวร่วมปลดปล่อยความรู้> ได้กลับมากระจ่างอีกครั้ง!"
10027100-79 = "ลุยยยยย!"

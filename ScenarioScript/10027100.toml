[translation]
10027100-1 = "第10話;工務部的提案"
10027100-9 = "赤冬聯邦學園．雪山"
10027100-10 = "哈啊，哈啊……"
10027100-11 = "打贏了……嗎？"
10027100-12 = "雖然是擊退了事務局，不過我擔心可能會因此被他們討厭……"
10027100-13 = "沒關係，反正我們「知識解放戰線」早就已經被討厭了。"
10027100-14 = "是這麼說沒錯啦……"
10027100-18 = "[ns]「膽敢阻礙同人活動的人，最終必將迎來滅亡……！」"
10027100-19 = "老，老師？"
10027100-20 = "總之我們趕快走吧！沒時間了！"
10027100-23 = "──以勞動和革命之名，我有話要說。"
10027100-25 = "這次又是誰啊！？"
10027100-34 = "那個……？#n是工務部的成員和實里部長……？"
10027100-36 = "原來你們在這裡啊，真是太好了。"
10027100-37 = "我聽說「知識解放戰線」正如火如荼地製作《LUNA》的相關作品，#n所以才特地來找你們的。"
10027100-39 = "呃……是沒有到如火如荼那麼誇張啦，不過的確是這樣沒錯……"
10027100-40 = "不過……我們的同人誌跟工務部又有什麼關係呢？"
10027100-42 = "首先，對於「知識解放戰線」重溫過去的經典作品，#n試圖使其重新在現代發光發熱的想法及精神一事，我們表示尊重。"
10027100-43 = "畢竟人們越是回顧勞動的歷史，對於革命的鬥志就會越發堅定，#n想要推翻既得利益階層的信念也會更加強烈。"
10027100-45 = "（《LUNA》描寫的是這樣的內容嗎……？）"
10027100-46 = "（絕對不是吧……？）"
10027100-48 = "因此！我們工務部想向「知識解放戰線」提出一個方案！"
10027100-49 = "那就是將「知識解放戰線」正在創作的書籍，改為更加積極且具革命精神的內容！"
10027100-51 = "強烈建議！強烈建議！"
10027100-53 = "除此之外，為了勞動階級的啟蒙與解放，#n我們希望故事內容以受資本家壓榨的勞工和他們的鬥爭為主要核心！"
10027100-55 = "強烈希望！強烈希望！"
10027100-61 = "[ns]「他們到底是從哪裡聽到那些東西的……」"
10027100-63 = "還以為你們要說什麼……"
10027100-64 = "雖然我們以前受了工務部很多照顧，#n而且工務部的成員們有時候也會來我們圖書館光顧，我一直對你們心懷感謝……"
10027100-66 = "但這件事我不能答應！"
10027100-67 = "沒錯！我們已經沒時間了！"
10027100-73 = "……真令我失望啊，「知識解放戰線」。#n明明平時兩位圖書館員嚴選的文學作品都讓我感到獲益良多……"
10027100-74 = "我還期待這次一定能攜手合作，#n給那個「吃優格不舔蓋子的可恨鬍子小鬼」好看的說！"
10027100-75 = "[s]「那張傳單果然是工務部做的啊！」"
10027100-76 = "真沒辦法，我本來是不想這麼做的……"
10027100-77 = "同志們啊！為了讓「知識解放戰線」蒙上陰霾的視野再次恢復晴朗──#n從現在起，我們將展開激烈的鬥爭！"
10027100-79 = "哇啊啊啊啊！"

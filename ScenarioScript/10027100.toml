[translation]
10027100-1 = "Episode 10; Labor Party \"Suggestions\""
10027100-9 = "Red Winter Snowfields"
10027100-10 = " *pant* *pant*"
10027100-11 = " Did we...win?"
10027100-12 = "We've defeated the Secretariat Office, but I worry this will damage our relations..."
10027100-13 = "Don't worry. The Secretariat Office already considered the Knowledge Liberation Front to be a thorn in their side."
10027100-14 = "That's certainly true, but..."
10027100-18 = "[ns] \"Those who stand in our way will face their own destruction!\""
10027100-19 = " S-Sensei?!"
10027100-20 = "Come on! We're running out of time!"
10027100-23 = "Stop! In the name of labor and revolution, I must say my piece!"
10027100-25 = "What is it now?!"
10027100-34 = "Uh...? It's a bunch of Labor Party members and...President Minori herself?!"
10027100-36 = "Thank goodness I found you here."
10027100-37 = "I heard the Knowledge Liberation Front is making a massive effort to produce fan fiction about \"Luna\"."
10027100-39 = "I wouldn't exactly call it massive..."
10027100-40 = "Why is the Labor Party so interested in our fanfic?"
10027100-42 = "We respect the spirit of the Knowledge Liberation Front. Above all, we wish to revive the legacy of the past and apply it to the modern era."
10027100-43 = "The more we learn about the history of labor, the more we are inspired to revolt and bring down the establishment!"
10027100-45 = "(Is that what they think \"Luna\" was about?)"
10027100-46 = "(There's no way...)"
10027100-48 = "In that spirit, we have a proposal for you!"
10027100-49 = "We propose that the Knowledge Liberation Front revise their current fanfic to highlight those revolutionary ideals!"
10027100-51 = "Revolution! Revolution!"
10027100-53 = "Furthermore! To enlighten the working class and liberate them from their oppressive overlords, we propose that the workers' struggle be the main theme!"
10027100-55 = "Liberty! Liberty!"
10027100-61 = "[ns] \"Where did you get these ideas?\""
10027100-63 = "I wondered when you were going to speak up..."
10027100-64 = "I owe the Labor Party a debt of gratitude, and I am grateful that you visit our library."
10027100-66 = "But we cannot acquiesce to your request."
10027100-67 = "Yeah! We don't have time!"
10027100-73 = "That is very disappointing to hear. We've learned so much from the literary works curated by the librarians of the Knowledge Liberation Front."
10027100-74 = "I longed for a partnership in which we teach a lesson to that abominable mustache who throws away yogurt lids without licking them!"
10027100-75 = "[s] \"I knew the Labor Party was behind that flyer!\""
10027100-76 = "I didn't want to resort to this, but you leave me no choice."
10027100-77 = "Comrades! From this day on, we shall wage a relentless war against the Knowledge Liberation Front until we can bring their blurry vision back into focus!"
10027100-79 = "YEAH!"

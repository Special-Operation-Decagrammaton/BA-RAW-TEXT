[translation]
1300502-1 = "สอบสวนผู้ต้องสงสัย"
1300502-2 = "ถนนในคิโวทอส"
1300502-6 = "ที่ด้านหน้าตรอกที่มืดสนิท คาโยโกะกำลังถูกตำรวจสอบถามบางอย่างอยู่"
1300502-7 = "ก็บอกแล้วไง ฉันไม่ได้ทำอะไรผิดสักหน่อย"
1300502-8 = "อย่าโกหกนะ! แล้วจะอธิบายเรื่องชุดที่น่าสงสัยนั่นว่ายังไง..."
1300502-9 = "แล้วเพราะอะไรถึงมาเดินป้วนเปี้ยนอยู่ในเขตที่เกิดอาชญากรรมเยอะแบบนี้ล่ะ?"
1300502-10 = "คะ... คือว่า..."
1300502-11 = "ว่ายังไง?"
1300502-12 = "ไม่มีอะไรหรอกน่า"
1300502-13 = "ฮึ่ม จะเล่นแบบนี้ใช่ไหม ฉันรู้นะว่าเธอกำลังปิดบังอะไรบางอย่างอยู่!"
1300502-14 = "ส่งบัตรนักเรียนมาซิ ฉันจะตรวจสอบข้อมูลเธอหน่อย"
1300502-15 = "(ถ้าโดนรู้ว่าเป็นนักเรียนของโรงเรียนเกเฮนน่าคงจะต้องโดนพวกคณะกรรมการวินัยบ่นจนหูชาอีกแน่....)"
1300502-16 = "(ดันเข้ามาพัวพันกับเรื่องน่ารำคาญซะแล้ว....)"
1300502-20 = "[ns] \"นักเรียนของเรามีเรื่องอะไรงั้นเหรอ?\""
1300502-21 = "หืม? คุณเป็นใครน่ะ?"
1300502-22 = "[s] \"ครูจากชาเล่ต์น่ะ\""
1300502-23 = "....คุณครู?"
1300502-24 = "ทำไมครูถึงมาอยู่ที่นี่ล่ะ..."
1300502-26 = "หลังจากนั้นคุณครูก็อธิบายเรื่องของคาโยโกะให้กับตำรวจฟัง"
1300502-29 = "อืม... ถ้าคุณครูจากชาเล่ต์พูดแบบนี้ ฉันก็คงทำอะไรไม่ได้"
1300502-34 = "ทำไมถึงมาช่วยฉันล่ะ?"
1300502-35 = "ดูเหมือนฉันกำลังเจอปัญหางั้นเหรอ? ก็นะ... ฉันกำลังตกอยู่ในสถานการณ์ลำบากจริงๆ นั่นแหละ"
1300502-36 = "ฉันชินแล้วที่คนอื่นชอบมองว่าฉันเป็นคนน่าสงสัย ครูไม่ต้องเป็นห่วงหรอก"
1300502-37 = "ฉันถูกตำรวจสอบสวนบ่อยแล้วล่ะ..."
1300502-38 = "ที่จริงมันก็น่ารำคาญอยู่นะ หน้าตาที่ดูไม่เป็นมิตรแบบนี้น่ะ"
1300502-39 = "สงสัยว่าฉันมาทำอะไรที่นี่น่ะเหรอ?"
1300502-40 = "ครูไม่ต้องรู้หรอกว่าฉันมาทำอะไรที่นี่"
1300502-41 = "........."
1300502-42 = "(ถอนหายใจ) ฉันมาให้อาหารแมวจรจัดน่ะ#nพอตำรวจมาเจ้าแมวก็หนีไปเลย"
1300502-43 = "ทำไมฉันถึงไม่พูดไปตั้งแต่แรกน่ะเหรอ?"
1300502-44 = "ถึงจะพูดความจริงไปก็คงไม่มีใครเชื่อฉันอยู่ดี"
1300502-45 = "เพราะการทำแบบนี้มันไม่สมกับเป็นฉันเลยน่ะสิ"
1300502-46 = "คงไม่มีใครคิดว่าเด็กผู้หญิงที่หน้าตาดุๆ แบบนี้จะมาคอยดูแลแมวหรอก#nคนอื่นคงคิดว่าเป็นเรื่องตลกแหงๆ"
1300502-48 = "ไม่ตลกงั้นเหรอ?#nเอ่อ อื้ม... ขอบคุณนะ"
1300502-49 = "ฉันไม่คิดว่าจะเกิดเรื่องแบบนี้ วันนี้ฉันติดหนี้คุณครูแล้วล่ะ"
1300502-50 = "เอาไว้ฉันจะตอบแทนให้แล้วกันนะ"
1300502-52 = "หลังจากนั้นคุณครูก็เดินไปส่งคาโยโกะที่สำนักงานหน่วยรับจ้างสารพัด"

[translation]
1300502-1 = "Police Interrogation"
1300502-2 = "Kivotos Streets"
1300502-6 = "Kayoko is being questioned by the police in front of a dark alleyway."
1300502-7 = "I told you already! I didn't do anything!"
1300502-8 = "Don't lie to me! How do you explain such a suspicious outfit...?"
1300502-9 = "And who would wander around a high-crime area for no reason?"
1300502-10 = "It's because..."
1300502-11 = "...Because?"
1300502-12 = "...Never mind. I have nothing to say to you."
1300502-13 = "Hmph. I knew it. You are hiding something from us!"
1300502-14 = "First, I'll need your student ID to confirm who you are."
1300502-15 = "(The Prefect Team won't be happy if they find out I'm from Gehenna...)"
1300502-16 = "(I'm in big trouble now.)"
1300502-20 = "[ns] \"She's my student. Is there a problem?\""
1300502-21 = "Hmm? And who might you be?"
1300502-22 = "[s] \"I'm an advisor with Schale.\""
1300502-23 = "Advisor?"
1300502-24 = "What are you doing here...?"
1300502-26 = "I did my best to cover for Kayoko."
1300502-29 = "Hmm... Everything here seems to check out. So you do work for Schale."
1300502-34 = "...Why did you help me?"
1300502-35 = "I looked like I was in trouble? Well, I guess I was in a tight spot..."
1300502-36 = "I'm used to people calling me suspicious, though. It's nothing to get worked up about."
1300502-37 = "Being interrogated by the police is practically a Tuesday..."
1300502-38 = "I guess I don't give off a great first impression. I look pretty intimidating, so that lands me in hot water."
1300502-39 = "What, you wanna know what I was actually doing here?"
1300502-40 = "Too bad. It's none of your business."
1300502-41 = "..."
1300502-42 = "*sigh* Fine. I was feeding a stray cat. Though it ran away as soon as the cops showed up."
1300502-43 = "Why didn't I just tell them that?"
1300502-44 = "Because they would have thought I was lying, obviously."
1300502-45 = "You can hardly believe it yourself, I bet."
1300502-46 = "Do I look like the kind of girl who feeds stray cats for fun?"
1300502-48 = "Wait...you don't think it's strange? Oh, uh...thanks."
1300502-49 = "I guess I owe you one, even if I don't want to."
1300502-50 = "But I'll make good and pay you back. Promise."
1300502-52 = "After that, I escorted Kayoko back to the Problem Solver office."

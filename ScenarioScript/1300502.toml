[translation]
1300502-1 = "突襲檢查"
1300502-2 = "奇普托斯．暗巷"
1300502-6 = "（佳世子和警察，正在昏暗的小巷裡交談）"
1300502-7 = "我就說我什麼都沒做了。"
1300502-8 = "少騙人了！打扮得那麼可疑……"
1300502-9 = "而且還在這種地方遊蕩，一定有在做什麼勾當。"
1300502-10 = "那是因為……"
1300502-11 = "……因為？"
1300502-12 = "……沒什麼。"
1300502-13 = "看吧，一定是在打什麼歪主意！？"
1300502-14 = "總之先把學生證拿出來，要確認一下你的身份。"
1300502-15 = "（如果被發現我是格黑娜的學生，風紀委員會那些傢伙一定又要囉嗦了……）"
1300502-16 = "（這下事情麻煩了……）"
1300502-20 = "[ns] 「請問您找我們學生有什麼事嗎？」"
1300502-21 = "嗯？請問你是誰？"
1300502-22 = "[s] 「我是夏萊的老師。」"
1300502-23 = "……老師？"
1300502-24 = "老師，你怎麼會在這裡……"
1300502-26 = "（之後，幫佳世子向警察辯護一番）"
1300502-29 = "嗯……既然夏萊的老師都這麼說了，那就沒辦法了。"
1300502-34 = "……你為什麼要幫我？"
1300502-35 = "因為我看起來很困擾……？雖然是很困擾啦……"
1300502-36 = "但我已經習慣被誤認為可疑人物了，不用太在意。"
1300502-37 = "我常常動不動就被警察攔住盤問……"
1300502-38 = "長相這麼凶狠真的很煩呢。"
1300502-39 = "你問我實際上在這裡做什麼嗎？"
1300502-40 = "我在這裡做什麼跟你沒關係吧。"
1300502-41 = "…………"
1300502-42 = "……哈啊，我在餵野貓吃東西。#n只不過警察一來，野貓就逃跑了。"
1300502-43 = "你問我為什麼不一開始就老實說？"
1300502-44 = "那是因為……就算我老實說，也不會有人相信。"
1300502-45 = "我自己也很清楚這種事情跟我很不搭。"
1300502-46 = "頂著一副凶狠的表情照顧貓，一定會引來異樣眼光吧。"
1300502-48 = "……不奇怪？#n啊，嗯……謝謝……"
1300502-49 = "總之，我今天欠你一個人情。"
1300502-50 = "這筆帳，我之後一定會還。"
1300502-52 = "（之後，把佳世子送回了便利屋辦公室）"

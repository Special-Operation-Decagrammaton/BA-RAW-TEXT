[translation]
10043070-1 = "第7話;掉在球場的東西"
10043070-9 = "八局下的進攻也沒成功得分……殘壘是一、三壘……"
10043070-10 = "都已經零出局一三壘有人了，怎麼還是連支安打都打不出來啊！"
10043070-11 = "一直把球打到地上是怎樣！？想在球場種出棒球樹是不是啊！？"
10043070-18 = "你先冷靜……這隊打起球來一直都是這樣的……"
10043070-19 = "幸好在九局上半前都還沒派出終結者。#n根據突襲者隊的打線分析，第一球選擇滑球的話……"
10043070-21 = "為什麼……為什麼我們就是贏不了！！！"
10043070-22 = "每次安排好的打順總是會亂掉……明明是先發投手卻還在牛棚待命！"
10043070-23 = "新秀不知道哪天才會開竅……總教練也只會瞎指揮！"
10043070-24 = "那個永遠不會被炒魷魚的萬年三壘指導教練，又跟壞掉的紅綠燈沒兩樣！"
10043070-25 = "還有那莫名熱血的應援曲，每次都騙球迷進場支持！"
10043070-31 = "那個……太大聲的話可能會被發現的。"
10043070-32 = "雖然我們只是被聘來擔任一日警衛，還是希望能盡量避免發生衝突……"
10043070-33 = "不過還是很感謝你把飲料全部買來分給大家。#n我們喝得很開心。"
10043070-35 = "這，這沒什麼。#n看來球場登記在冊的飲料工讀生，至少都被叫來這裡過一次啊。"
10043070-36 = "呼，哈，呼，哈……"
10043070-37 = "好……總算是追到3分差了。#n這個差距還在可能逆轉的範圍內。"
10043070-41 = "首先得撐過九局上的防守，九局下的打順從八棒開始。"
10043070-42 = "如果一切順利的話，還有機會輪到第四棒上場打擊。#n也就是說……！"
10043070-43 = "我們的努力……並沒有白費。#n很好，這樣就對了。"
10043070-44 = "（雖然追到兩、三分差的情況，以前也發生過不少次就是了……）"
10043070-51 = "那，那是什麼聲音！？#n現在可是構思作戰的緊要關頭啊……！"
10043070-55 = "大事不好了！現在──"
10043070-60 = "這裡果然有問題！"
10043070-61 = "總教練！這邊！"
10043070-67 = "終於找到了！"
10043070-72 = "怎，怎怎怎怎麼辦？被發現了！"
10043070-73 = "不，不能現在被抓到！"
10043070-77 = "站住！！！"
10043070-84 = "嗯？突然急急忙忙地要去哪裡？"
10043070-85 = "大家集合！護衛對象移動位置了！"
10043070-92 = "[ns]「追上了！」"
10043070-98 = "就算打算混入觀眾之中也是沒用的……"
10043070-99 = "因為我們已經利用這場比賽的時間，掌握運動場內每位觀眾的情況了！"
10043070-100 = "究竟為什麼要做這種事情，得讓你們好好交代清楚才行！"
10043070-108 = "是嗎……原來你們就是想毀了我們柯基勇士隊比賽的犯人啊！"
10043070-109 = "毀了比賽……？"
10043070-114 = "開什麼玩笑！#n一直在破壞比賽的人是你們才對！"
10043070-115 = "所有人都不准動！#n要是有人敢輕舉妄動的話……！"
10043070-121 = "呀啊啊啊！？"
10043070-122 = "我就把這個人質手上的飯糰……全部吃掉！"
10043070-123 = "不，不行啊！那個飯糰可是用今年的新米做的……！"
10043070-128 = "住手！不准你們傷害球迷！"
10043070-132 = "第四棒打者怎麼會突然出現在這裡！？"
10043070-134 = "這還用問嗎……#n要是沒有球迷的話，我們就只是一群會打球的普通人而已！"
10043070-135 = "其他事情我都可以接受……#n但身為一名球員，我絕不會對有難的球迷視而不見！"
10043070-137 = "你有病是不是！？"
10043070-143 = "追上護衛對象了！請求增援！"
10043070-144 = "請問現在該怎麼做？"
10043070-146 = "唔唔……！總之先幫我制伏他們！#n小心別傷到球員了！"
10043070-147 = "總教練怎樣都無所謂，但絕對不能讓球員受傷！都給我記清楚了！"
10043070-152 = "這個要求難度很高呢……"
10043070-154 = "為什麼要一直針對我！？"
10043070-160 = "[ns]「這個嘛……感覺也不是無法理解……？」"
10043070-161 = "是嗎，指導員？#n我其實還不太……"
10043070-162 = "……"
10043070-164 = "不過只要等一切落幕之後，大家一起專心訓練就行了對吧！"
10043070-165 = "前輩都到最後了還是只有那句話嗎！？"

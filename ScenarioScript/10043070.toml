[translation]
10043070-1 = "Episode 7;What Was Dropped in the Stadium"
10043070-9 = "And that's it for the bottom of the eighth. No new runs. Runners left hanging on first and third."
10043070-10 = "ONE little hit. That's ALL they needed! "
10043070-11 = "Why do they keep hitting grounders? Are they trying to plant baseball trees?!"
10043070-18 = "That's how this team plays. We all know it. *sigh* "
10043070-19 = "At least we saved the closer for the bottom of the ninth. Now, based on the Pillagers' batting lineup, we ought to throw a slider first..."
10043070-21 = "Why...? Why can't we EVER win?!"
10043070-22 = "The starting batting order always falls apart. The starting pitcher ends up in the bullpen!"
10043070-23 = "The star players never come through, and the coach's decisions are incomprehensible!"
10043070-24 = "That third base coach should've been fired ages ago!"
10043070-25 = "The cheers are fire, sure, but all THAT does is fool the fans back into the stadium!"
10043070-31 = "Um, if you keep making noise, they're going to find you."
10043070-32 = "I mean, we'll guard you, since that's what you're paying us for, but we'd rather keep it clean if we can."
10043070-33 = "Thanks for sharing the drinks, though. Those hit the spot."
10043070-35 = "W-Well, we had so many part-timers here, figured we might as well share."
10043070-36 = "*huff* *puff* *huff* *puff*..."
10043070-37 = "...All good. We're still just three runs behind. We can still come back."
10043070-41 = "All we've gotta do is just survive the top of the ninth, and then we start the bottom with the eighth batter."
10043070-42 = "If everything goes okay, we can still hand it off to the cleanup hitter. So...!"
10043070-43 = "So yeah, we've made a difference!"
10043070-44 = "(We've been behind by 2 or 3 lots of times before, but...)"
10043070-51 = "Wh-What's that noise?! I'm trying to think here!"
10043070-55 = "Bad news, Boss!"
10043070-60 = "There they are. I knew it!"
10043070-61 = "Coach! Over here!"
10043070-67 = "HA! FOUND YOU!"
10043070-72 = "Uwaaah? What do we do?!"
10043070-73 = "L-Let's get out of here!"
10043070-77 = "Don't you even!"
10043070-84 = "Huh? Where're you going?"
10043070-85 = "Everybody, gather up! Our client's on the move!"
10043070-92 = "[ns] \"Got you!\""
10043070-98 = "Trying to blend in with the crowd, huh? Bad move."
10043070-99 = "We've spent the whole game casing the entire stadium. We know where everybody sits now."
10043070-100 = "Now, fess up! Why'd you do it?"
10043070-108 = "Yeah, why'd you try to mess up our game?"
10043070-109 = "Mess up...your game?!"
10043070-114 = "COME ON! You mess it up yourselves all the time!"
10043070-115 = "Now, nobody move, or else..."
10043070-121 = "Aaaaugh!"
10043070-122 = "I'll...step on this poor man's rice crispy treats!"
10043070-123 = "N-No! Those were made special, with brand new rice!"
10043070-128 = "Hey, leave the fans alone! Don't do anything...weird!"
10043070-132 = "Wait, aren't you the cleanup hitter? Why are YOU butting in here?!"
10043070-134 = "Isn't it obvious? We're nothing without the fans!"
10043070-135 = "Players SHOULD stick up for them!"
10043070-137 = "Are you out of your mind?!"
10043070-143 = "Client in sight! Requesting reinforcements!"
10043070-144 = "Uh, what are we supposed to do here, exactly?"
10043070-146 = "Just...run them off! But carefully. Don't hurt the players!"
10043070-147 = "The coach? Fine, but not the players! Got it!"
10043070-152 = "That's...gonna be tricky..."
10043070-154 = "Hey, don't hurt me either!"
10043070-160 = "[ns] \"I'm starting to see how this sort of thing could happen.\""
10043070-161 = "Are you, Trainer? I'm still kind of in the dark..."
10043070-162 = "..."
10043070-164 = "Well, we can talk it over in training later."
10043070-165 = "You're STILL going on about that..."

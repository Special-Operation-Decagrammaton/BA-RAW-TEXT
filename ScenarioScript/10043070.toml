[translation]
10043070-1 = "ตอนที่ 7;สิ่งที่ตกอยู่ในสนามกีฬา"
10043070-9 = "จบเกมรุกปลายอินนิ่งที่ 8 โดยไม่ได้แต้มเลย... เบสที่เหลืออยู่คือเบส 1 กับ 3..."
10043070-10 = "นี่มันอะไรกัน ทำไมทีมนี้ถึงตีแล้ววิ่งไม่ได้เลยสักเบส!"
10043070-11 = "ทำไมถึงตีลูกลงพื้นอยู่เรื่อยเลยล่ะ!? คิดว่าถ้าเอาลูกเบสบอลฝังดินแล้วจะเกิดเป็นต้นเบสบอลขึ้นมา#nหรือไง!?!!"
10043070-18 = "ใจเย็นๆ ก่อน... ทีมนี้ก็เล่นแบบนี้อยู่แล้วนี่... ฮู่ว..."
10043070-19 = "โชคดีที่ยังไม่ได้ใช้พิชเชอร์คนสุดท้ายจนถึงต้นอินนิ่งที่ 9 นะ ถ้าวิเคราะห์ตามลำดับแบตเตอร์ของทีม#nเรเดอร์ส บอลแรกน่าจะเป็นลูกสไลเดอร์..."
10043070-21 = "ทำไมกัน... ทำไมพวกเราถึงชนะไม่ได้สักที!!!"
10043070-22 = "ลำดับแบตเตอร์ก็ไม่เหมือนตอนเริ่มแรก ไปเปลี่ยนตอนไหนก็ไม่รู้! ส่วนพิชเชอร์ที่เลือกไว้ก็ออกไป#nขว้างลูกในโซนวอร์มอัปเฉยเลย!"
10043070-23 = "ผู้เล่นดาวรุ่งเลือกที่จะร่วง! ส่วนโค้ชก็เอาแต่สั่งอะไรเหลวไหล!"
10043070-24 = "โค้ชเบส 3 ก็ไม่ต่างจากเครื่องส่งสัญญาณที่พังแล้ว ทำไมถึงยังไม่โดนไล่ออกไปอีกนะ!"
10043070-25 = "เพลงเชียร์ของทีมก็ร้อนแรงจนมีแฟนๆ ตบเท้ามาเชียร์ไม่เคยขาด แฟนๆ ให้ร้อย แต่ทีมให้ศูนย์!"
10043070-31 = "เอ่อ... ถ้าพูดเสียงดังเกินไป ก็อาจถูกจับสังเกตได้นะครับ"
10043070-32 = "ถึงจะถูกจ้างให้มาเป็นบอดี้การ์ดรายวัน แต่ถ้าเป็นไปได้พวกเราก็ไม่อยากให้มีเรื่องต้องใช้ปืนหรอก..."
10043070-33 = "แต่ยังไงก็ขอบคุณที่เลี้ยงเครื่องดื่มพวกเรานะครับ ได้ดื่มเยอะจนอิ่มน้ำเลยครับ"
10043070-35 = "จะไม่เยอะได้ยังไง ก็ฉันเรียกพนักงานขายเครื่องดื่มพาร์ทไทม์ให้แวะมาเสิร์ฟเครื่องดื่มทีละคนๆ จนหมดสนามเลยไงล่ะ"
10043070-36 = "ฮู่ว... ฮ่า... ฮู่ว... ฮ่า... ฮู่ว..."
10043070-37 = "ดีละ... ตอนนี้เราก็ตามอยู่แค่ 3 แต้ม ยังถือว่ายังมีโอกาสพลิกเกมอยู่"
10043070-41 = "ถ้าต้นอินนิ่งที่ 9 ทำเกมรับได้ดี เกมรุกหลังจากนั้นก็เริ่มด้วยแบตเตอร์ลำดับที่ 8"
10043070-42 = "และถ้าทุกอย่างเป็นไปด้วยดี ก็มีโอกาสที่ลำดับการตีจะไปถึงแบตเตอร์ลำดับที่ 4...!"
10043070-43 = "นั่นหมายความว่า... ความพยายามของพวกเราไม่ได้สูญเปล่าหรอก ฉันยังมีหวังอยู่"
10043070-44 = "(เมื่อก่อนก็มีเกมสูสีที่ห่างกันแค่ 2-3 แต้มบ่อยๆ นะ)"
10043070-51 = "สะ... เสียงอะไรน่ะ?! ฉันกำลังคิดกลยุทธ์อยู่เลย ทำไมถึงมีเรื่องอะไรในเวลาที่สำคัญแบบนี้...!"
10043070-55 = "เกิดเรื่องใหญ่แล้วครับ!"
10043070-60 = "มีอะไรบางอย่างเกิดขึ้นที่นี่จริงๆ ด้วยค่ะ!"
10043070-61 = "โค้ชคะ! ทางนี้ค่ะ!"
10043070-67 = "ในที่สุดก็หาเจอสักที!"
10043070-72 = "ทะ... ทะทะทะทะ... ทำยังไงดีล่ะ? โดนจับได้แล้ว!"
10043070-73 = "จะ... จังหวะกำลังสำคัญ ฉันไม่ยอมโดนจับตัวไปหรอกนะ!"
10043070-77 = "หยุดอยู่ตรงนั้นเลยนะคะ!!!"
10043070-84 = "อ้าว? จู่ๆ จะไปไหนครับ?"
10043070-85 = "บอดี้การ์ดทุกคน! เป้าหมายที่เราต้องคุ้มกันออกไปจากห้องแล้ว!"
10043070-92 = "[ns] \"เจอตัวแล้ว!\""
10043070-98 = "ถ้าคิดที่จะกลมกลืนไปกับฝูงชนละก็ รู้ไว้เลยค่ะว่าคุณคิดผิด"
10043070-99 = "พวกฉันวิเคราะห์เกี่ยวกับผู้ชมในสนามกีฬานี้ไว้หมดแล้วค่ะ เล่นเอาไม่ได้ชมการแข่งขันเลยด้วย!"
10043070-100 = "บอกมานะคะว่าทำไมถึงทำเรื่องอะไรแบบนี้!"
10043070-108 = "ใช่... ตกลงเป็นพวกนายสินะ คนที่พยายามทำลายการแข่งขันของคอร์กี้ เบรฟส์!"
10043070-109 = "ทำลาย... การแข่งขันงั้นเหรอ?"
10043070-114 = "อย่ามาล้อกันเล่นน่า! พวกแกต่างหากล่ะที่ทำลายการแข่งขันมาตั้งแต่แรกแล้ว!"
10043070-115 = "ทุกคนอย่าขยับ! ถ้าคิดจะทำอะไรซี้ซั้วละก็...!"
10043070-121 = "ว้ากกกกก?!"
10043070-122 = "ขนมธัญพืชของตัวประกันคนนี้... ทั้งหมดต้องเป็นของฉัน!"
10043070-123 = "มะ... ไม่ได้นะครับ! ขนมนี้ทำมาจากข้าวใหม่ที่เพิ่งเกี่ยวมาปีนี้เลยนะ...!"
10043070-128 = "หยุดเดี๋ยวนี้! อย่าทำแบบนั้นกับแฟนเบสบอลนะ!"
10043070-132 = "ทำไมถึงเข้ามาแทรกด้วยล่ะ แบตเตอร์ลำดับที่ 4?!"
10043070-134 = "มันก็แน่อยู่แล้วไม่ใช่เหรอ... ถ้าไม่มีแฟนๆ พวกเราก็เป็นแค่คนที่เล่นกับบอลลูกกลมๆ เท่านั้น!"
10043070-135 = "ถึงฉันจะไม่รู้รายละเอียดอื่น แต่ในฐานะของนักกีฬาแล้ว ฉันไม่ยอมให้ใครมาทำไม่ดีกับแฟนๆ หรอก!"
10043070-137 = "บ้าไปแล้วหรือไง?!"
10043070-143 = "พบเป้าหมายที่ต้องคุ้มกันแล้ว! ขอกำลังเสริม!"
10043070-144 = "จากนี้เราจะทำยังไงกันดีครับ?"
10043070-146 = "อึกก...! หยุดนักกีฬาให้ได้ก่อน แต่อย่าให้บาดเจ็บนะ!"
10043070-147 = "โค้ชจะเป็นยังไงก็ช่าง แต่นักกีฬาห้ามได้แผลเด็ดขาด! จำไว้ให้ขึ้นใจเลย!"
10043070-152 = "เป็นคำขอที่ยากเลยนะครับ..."
10043070-154 = "ทำไมถึงเลือกปฏิบัติล่ะ? ฉันไปทำอะไรให้?!"
10043070-160 = "[ns] \"ครูว่า... ครูพอเข้าใจสถานการณ์แล้วละ...\""
10043070-161 = "งั้นเหรอคะ เทรนเนอร์? ฉันยังไม่เห็นเข้าใจ..."
10043070-162 = "......"
10043070-164 = "แต่ถ้าเรื่องทุกอย่างคลี่คลายได้แล้ว ฉันอยากให้ทุกคนไปมุ่งเน้นที่การเทรนนิ่งแทนค่ะ"
10043070-165 = "รุ่นพี่จะโยงเข้าเรื่องเทรนให้ได้เลยสินะคะ? มาสู้กับเจ้าพวกนี้ก่อนเถอะค่ะ!!"

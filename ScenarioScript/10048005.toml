[translation]
10048005-1 = "บทเริ่มต้น;ใต้เพดานที่ไม่คุ้นเคย"
10048005-5 = "ห้องที่ไม่คุ้นเคย"
10048005-7 = "(คุณครูเห็นเพดานที่ไม่เคยเห็นมาก่อน)"
10048005-8 = "(คำถามแรกที่ผุดขึ้นในหัวคือ 'ที่นี่คือที่ไหน?')"
10048005-15 = "(ดูจากโครงสร้างภายในแล้ว คุณครูเดาว่าที่นี่คือด้านในหอพัก)"
10048005-19 = "(โชคดีที่ตัวไม่ได้ถูกมัดเอาไว้)"
10048005-20 = "(ที่จริงแล้วกำลังนอนอยู่บนโซฟาและห่มผ้าอยู่อีกด้วย)"
10048005-21 = "(คนที่พาตัวมาที่นี่ดูเหมือนจะไม่ใช่ศัตรู)"
10048005-26 = "(แต่อาการปวดหัวตุบๆ ยังคงไม่หายไป)"
10048005-27 = "(เกิดเรื่องอะไรขึ้นกันนะ)"
10048005-32 = "ตะ... ตื่นแล้วสินะคะ"
10048005-36 = "[ns] \"นั่นใครน่ะ...?\""
10048005-37 = "คะ? ฉันน่ะเหรอคะ?"
10048005-38 = "ก็... อ่า... คือว่า... นั่นสินะคะ จะไม่รู้ก็ไม่แปลกหรอกค่ะ"
10048005-39 = "ชื่อของฉันก็คือซากุราอิ มิโยะ ฉันเป็นนักเรียนเอกวรรณกรรมของสถาบันศิลปะไวลด์ฮันต์ค่ะ"
10048005-40 = "อายุ 16 ปี อยู่ชั้นปีที่ 2..."
10048005-41 = "เกิดวันที่ 24 สิงหา ส่วนสูง 155 เซน..."
10048005-42 = "งานอดิเรกคือการสะสมเครื่องพิมพ์ดีดค่ะ..."
10048005-43 = "ส่วนรอบเอวก็..."
10048005-44 = "......"
10048005-45 = "อยากรู้ถึงขนาดนั้นเลยเหรอคะ?"
10048005-46 = "[s1] \"แต่มิโยะเป็นฝ่ายพูดเองหมดเลยนะ?!\"\n[s2] \"ก็อยากรู้อยู่หรอกนะ...!\""
10048005-47 = "มะ... มันก็จริงอยู่หรอก..."
10048005-48 = "ตะ... แต่นั่นไม่ใช่ประเด็นนี่คะ คนแปลกคนนี้นี่!"
10048005-49 = "อยากรู้งั้นเหรอคะ...!"
10048005-50 = "เป็นคนแปลกๆ ตามข่าวลือจริงด้วย...!"
10048005-51 = "[ns] \"ว่าแต่ที่นี่คือ...\""
10048005-53 = "อ้อ ที่นี่คือห้องของชมรมการค้าพิเศษค่ะ"
10048005-54 = "[s] \"ชมรมการค้าพิเศษ...?\""
10048005-55 = "ใช่ค่ะ เราเป็นกลุ่มผิดกฎหมายในไวลด์ฮันต์น่ะค่ะ"
10048005-56 = "[s] \"เป็นกลุ่มที่ทำอะไรงั้นเหรอ...?\""
10048005-60 = "ลักลอบขนส่งสินค้าค่ะ..."
10048005-61 = "[s] \"ลักลอบขนส่งสินค้า?!\""
10048005-62 = "จะว่าไป คุณคือ... คุณครูของชาเล่ต์ใช่มั้ยคะ?"
10048005-63 = "[s] \"อื้อ ใช่แล้ว\""
10048005-64 = "ถ้างั้นนี่ก็คงเป็นเรื่องกะทันหันไปหน่อย..."
10048005-65 = "แต่ว่า... ช่วยรับฟังเรื่องกังวลของฉันหน่อยได้มั้ยคะ?"
10048005-66 = "[s] \"ครูช่วยฟังเรื่องกังวลของนักเรียนได้อยู่แล้ว\""
10048005-70 = "นะ... นี่ก็เป็นไปตามที่ได้ยินมาเลย..."
10048005-71 = "ถะ... ถ้างั้นละก็..."
10048005-72 = "เอ่อ ที่จริงแล้ว... ฉัน"
10048005-73 = "อยากยุบชมรมการค้าพิเศษนี้ค่ะ"
10048005-74 = "[s] \"ยุบชมรม...? \""
10048005-75 = "ใช่ค่ะ ตอนนี้ฉันอยากยกเลิกการทำกิจกรรมของชมรมการค้าพิเศษแล้วค่ะ"
10048005-76 = "ฉันรู้สึกไม่สบายใจเอาเสียมากๆ ที่ต้องฝ่าฝืนกฎของโรงเรียนไปแบบนี้เรื่อยๆ..."
10048005-77 = "เพราะงั้น... ถึงจะเป็นเรื่องที่น่าอายไปหน่อย... แต่ฉันขอความช่วยเหลือจากคุณครูได้มั้ยคะ?"
10048005-78 = "[s3] \"ได้สิ งั้นก็ไปหาหัวหน้าชมรมกัน\"\n[s4] \"งั้นเราคงต้องไปคุยกับหัวหน้าชมรมการค้าพิเศษแล้วละ\""
10048005-81 = "อ่า ถ้าเป็นเรื่องนั้นละก็ คุยกับฉันโดยตรงได้เลยค่ะ"
10048005-82 = "[s5] \"ไม่ละ ครูอยากไปคุยกับหัวหน้าชมรมมากกว่า\"\n[s6] \"ครูอยากถามจากหัวหน้าชมรมว่าทำกิจกรรมอะไรกันบ้างน่ะ\""
10048005-85 = "อ่า"
10048005-89 = "ฉันนี่ละค่ะ... หัวหน้าชมรม"
10048005-94 = "[ns] \"ว่าไงนะ...?\""

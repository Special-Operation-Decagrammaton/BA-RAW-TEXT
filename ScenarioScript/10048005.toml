[translation]
10048005-1 = "序幕;在陌生的天花板下"
10048005-5 = "某個陌生的房間"
10048005-7 = "（映入眼簾的，是陌生的天花板）"
10048005-8 = "（「這裡是什麼地方？」是最先浮現的疑問）"
10048005-15 = "（從內部結構來看，大概能推測是在宿舍裡）"
10048005-19 = "（所幸身體並沒有被拘束）"
10048005-20 = "（而是被安置在沙發上，並蓋上了毯子）"
10048005-21 = "（將我帶到這裡來的人，似乎沒有敵意）"
10048005-26 = "（只是頭部依然隱隱作痛）"
10048005-27 = "（究竟發生了什麼事呢？）"
10048005-32 = "你，你醒了嗎？"
10048005-36 = "[ns]「你是……？」"
10048005-37 = "咦？我嗎？"
10048005-38 = "啊，那個，我是……#n也對，不認識我也很正常。"
10048005-39 = "我叫櫻井美代。#n就讀狂獵藝術學院，主修是文學。"
10048005-40 = "年齡16歲，2年級……"
10048005-41 = "生日是8月24日，身高是155cm……"
10048005-42 = "興趣是收集打字機……"
10048005-43 = "然後腰圍是……"
10048005-44 = "……"
10048005-45 = "……真的有必要連這種事都知道嗎？"
10048005-46 = "[s1]「是你自己提的吧！？」\n[s2]「確，確實是有點好奇啦……！」"
10048005-47 = "雖，雖然是這樣沒錯……"
10048005-48 = "但，但那不是現在的重點吧，你這個怪人！"
10048005-49 = "居然真的覺得好奇……！"
10048005-50 = "果然跟傳聞一樣，是個怪人……！"
10048005-51 = "[ns]「話說回來，這裡是……？」"
10048005-53 = "啊，這裡是特殊交易部的部室。"
10048005-54 = "[s]「特殊交易部……？」"
10048005-55 = "是的。是狂獵裡的非法組織。"
10048005-56 = "[s]「這個組織主要從事……？」"
10048005-60 = "……走私。"
10048005-61 = "[s]「走私！？」"
10048005-62 = "請問……你就是夏萊的老師，對吧？"
10048005-63 = "[s]「嗯，沒錯。」"
10048005-64 = "那麼，雖然這樣可能有點突然……"
10048005-65 = "……能不能請你聽聽我的煩惱呢？"
10048005-66 = "[s]「如果是學生的煩惱，我當然願意傾聽。」"
10048005-70 = "果，果然和傳聞一樣呢……"
10048005-71 = "那，那個……"
10048005-72 = "就是，我其實……"
10048005-73 = "想讓這個特殊交易部……廢部。"
10048005-74 = "[s]「廢部……？」"
10048005-75 = "是的。我希望特殊交易部的活動能就此停止。"
10048005-76 = "……持續違反校規，讓我心裡非常不安。"
10048005-77 = "所以雖然有點冒昧……能請你幫幫我嗎？"
10048005-78 = "[s3]「當然沒問題。」\n[s4]「那麼，我們就先去見見特殊交易部的部長吧。」"
10048005-81 = "啊，如果是這樣的話，你直接跟我說就行了。"
10048005-82 = "[s5]「不，我想親自跟部長見一面。」\n[s6]「順便也確認一下這個社團到底在做些什麼。」"
10048005-85 = "啊。"
10048005-89 = "那個……我就是部長。"
10048005-94 = "[ns]「……咦？」"

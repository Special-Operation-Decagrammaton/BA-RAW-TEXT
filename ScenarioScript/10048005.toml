[translation]
10048005-1 = "Prologue;Beneath Unfamiliar Ceilings"
10048005-5 = "An Unfamiliar Room"
10048005-7 = "The ceiling was...new to me."
10048005-8 = "Above all, I wondered where I was."
10048005-15 = "The architecture looked like a dorm's..."
10048005-19 = "Thankfully, my body wasn't tied down."
10048005-20 = "In fact, I was lying on a sofa, covered by a blanket."
10048005-21 = "It didn't seem like I was brought here with ill intentions."
10048005-26 = "However, my head kept throbbing with an aching pain."
10048005-27 = "Just what had happened?"
10048005-32 = "Y-You're awake."
10048005-36 = "[ns] \"Who are you...?\""
10048005-37 = "Huh? Me?"
10048005-38 = "Uh, well, ah... Yes. It's expected that you wouldn't know me."
10048005-39 = "My name is Sakurai Miyo. I major in Literature at Wildhunt Art Academy."
10048005-40 = "And, well... I'm 16 years old, a second-year..."
10048005-41 = "My birthday is August 24th, and I'm 5'1\"..."
10048005-42 = "I enjoy collecting typewriters..."
10048005-43 = "And my waist size..."
10048005-44 = "..."
10048005-45 = "...Do you really need to know all of this?!"
10048005-46 = "[s1] \"You started it!\"\n[s2] \"I am curious, though...!\""
10048005-47 = "I-I did..."
10048005-48 = "B-But that's not what matters, you weirdo!"
10048005-49 = "But you're curious...?!"
10048005-50 = "So you DO keep tabs on that stuff? You are just as odd as I've heard...!"
10048005-51 = "[ns] \"Anyway, where are we...?\""
10048005-53 = "Ah, this is the Free Trade Cartel's club room."
10048005-54 = "[s] \"Free Trade Cartel...?\""
10048005-55 = "Yes. It's Wildhunt's premier criminal organization."
10048005-56 = "[s] \"What kind of crime...?\""
10048005-60 = "...Smuggling."
10048005-61 = "[s] \"Smuggling?!\""
10048005-62 = "Anyway... You're Schale's Sensei, right?"
10048005-63 = "[s] \"Yes, that's right.\""
10048005-64 = "Then, this may be sudden..."
10048005-65 = "...But could you hear me out? Maybe...administer some advice?"
10048005-66 = "[s] \"I'm always willing to advise a student.\""
10048005-70 = "Y-Yeah, I've heard that as well..."
10048005-71 = "Th-Then..."
10048005-72 = "You know, to be honest... I..."
10048005-73 = "I want to disband the Free Trade Cartel."
10048005-74 = "[s] \"Disband...?\""
10048005-75 = "Yes. I want to...just stop and have everyone in the Cartel move on."
10048005-76 = "...I am uncomfortable with constantly breaking the school's rules."
10048005-77 = "So, if it's not too much... Can you help me with that?"
10048005-78 = "[s3] \"Of course.\"\n[s4] \"Then I'll have to meet with the Cartel's president.\""
10048005-81 = "Oh, you can just talk to me."
10048005-82 = "[s5] \"I want to meet the president for myself.\"\n[s6] \"I need to know what exactly this club does.\""
10048005-85 = "Ah."
10048005-89 = "Uh... I'm the president."
10048005-94 = "[ns] \"...What?\""

[translation]
1003905-1 = "RABBIT 4 จะยิงแล้วนะคะ"
1003905-2 = "มะ...มาแล้วเหรอคะ คุณครู"
1003905-3 = "ขอโทษนะคะ ที่ฉันเรียกออกมาชานเมืองห่างไกลแบบนี้"
1003905-4 = "[s] \"ไม่หรอก ไม่เป็นไร\""
1003905-5 = "ขอบคุณค่ะ วันนี้ฉันจะฝึกยิงปืนเพื่อเตรียมพร้อมรับมือการต่อสู้ภายในเมืองตามแบบของ SRT ค่ะ"
1003905-6 = "ตอนแรกฉันคิดว่าจะไปขอความร่วมมือการฝึกภายในเมืองกับทางคิโวทอส..."
1003905-7 = "แต่ฉันไม่กล้าที่จะไปขอความร่วมมือการฝึกจากผู้ใหญ่แปลกหน้าค่ะ..."
1003905-8 = "[s1] \"ไม่เป็นไร มิยุตัดสินใจดีแล้วละ\"\n[s2] \"การไปยิงปืนในเมืองอาจทำให้เกิดอันตรายได้นี่นะ\""
1003905-9 = "ค่ะ ฉันเลยหาสถานที่อื่นแทน..."
1003905-10 = "ค่ะ ฉันเลยหาสถานที่อื่นแทน..."
1003905-11 = "เมื่อไม่นานมานี้ ตอนที่เดินบนเส้นทางเดินป่า ฉันก็เจอสถานที่รกร้างที่ไม่ได้ใช้งานนี่น่ะค่ะ"
1003905-12 = "ฉันสังเกตการณ์ดูประมาณหนึ่งอาทิตย์แล้ว ก็เลยค่อนข้างแน่ใจว่าที่นี่ไม่มีคนมาใช้งานแล้วค่ะ..."
1003905-13 = "ฉันเลยอยากใช้ที่นี่เป็นสถานที่ฝึกซ้อมสำหรับแผนการต่อสู้ในเมืองค่ะ"
1003905-14 = "[s] \"แล้วจะให้ครูช่วยอะไรล่ะ?\""
1003905-15 = "เอ่อ... อืม... เรื่องเตรียมการซุ่มยิงฉันทำเองได้..."
1003905-16 = "ถ้างั้นคุณครูช่วยไปติดเป้ายิงที่บนแนวสันเขาด้านนั้นหน่อยได้มั้ยคะ...?"
1003905-17 = "[s] \"สักประมาณ 300 เมตรพอมั้ย?\""
1003905-18 = "ไม่ค่ะ ขอไกลกว่านั้นอีกหน่อย..."
1003905-19 = "[s] \"ถ้างั้น 500 เมตรล่ะ?\""
1003905-20 = "ไม่ค่ะ ขอโทษนะคะ แต่รบกวนขอไกลกว่านั้น..."
1003905-21 = "ขอให้ห่างออกไปอย่างน้อยหนึ่งกิโลเมตรค่ะ... ขะ... ขอโทษค่ะ"
1003905-22 = "[s] \"ต้นไม้จะบังจนมองไม่เห็นนะ ไม่เป็นไรแน่เหรอ?\""
1003905-23 = "ค่ะ ไม่เป็นไรค่ะ ฉันเป็นสไนเปอร์ของ SRT นี่คะ"
1003905-24 = "อีกอย่างเพื่อไม่ให้เป็นภาระกับสมาชิกกองทหารคนอื่นๆ เรื่องแค่นี้ฉันต้องทำให้ได้ค่ะ"
1003905-25 = "ถ้างั้นขอรบกวนด้วยนะคะ คุณครู"
1003905-28 = "[ns] เดินทางไปติดเป้ากระดาษ"
1003905-30 = "(พอคุณครูติดเป้ากระดาษเสร็จแล้วก็เดินกลับไปหามิยุ...)"
1003905-31 = "ฮู่วว... ฮู่วว..."
1003905-32 = "(มิยุถูกกลุ่มสัตว์ป่าล้อมรอบตัวอยู่...)"
1003905-35 = "― ควบคุมลมหายใจ...[wa:460] "
1003905-37 = "― ตั้งสมาธิ... เล็งไปที่เป้าหมาย...[wa:70] "
1003905-40 = "― ระยะห่าง 1,150 เมตร ความเร็วลมจากทางตะวันออกเฉียงเหนือ... 15 น็อต[wa:2280] "
1003905-42 = "― ถ้าคำนวณความคลาดเคลื่อน...จากอุณหภูมิและความชื้นแล้ว...[wa:10] "
1003905-45 = "― คะ... คือว่า... คุณครูคะ[wa:2670] "
1003905-47 = "― คือว่าคุณครูช่วยเลิกแกล้งฉันก่อน...ได้รึเปล่าคะ...?[wa:2560] "
1003905-50 = "― จุดที่เล็งเป้ายิง มันสั่นไปหมดแล้วค่ะ...[wa:120] "
1003905-53 = "[ns] \"ครูไม่ได้ทำอะไรเลยนะ\""
1003905-54 = "― งั้นเหรอคะ...[wa:260] "
1003905-57 = "― มันก็... ไม่ได้กวนอะไรมากหรอกค่ะ[wa:10] "
1003905-59 = "― คงอยากให้เป็นการฝึกซุ่มยิง ในสถานการณ์ที่ใกล้เคียง...กับการต่อสู้จริงสินะคะ[wa:1330] "
1003905-62 = "― ที่ SRT เอง... "
1003905-64 = "― เคยผ่านการฝึกที่คล้ายกัน...มาเหมือนกันค่ะ[wa:600] "
1003905-67 = "[ns] \"ก็บอกว่าไม่ใช่ครูไง...\""
1003905-68 = "― อะ...อ๊าย...![wa:400] "
1003905-71 = "― คะ... คุณครูคะ! ยะ...ยังไงก็เถอะค่ะ[wa:2300] "
1003905-73 = "― มะ...มาหายใจ ข้างๆ หูกันแบบนี้...!?[wa:220] "
1003905-76 = "― (ฮือออ... ละ...ลมหายใจของคุณครู...อยู่ใกล้มากๆ เลย...)[wa:3960] "
1003905-78 = "― (จะ... จุดเล็งเป้าเคลื่อนแล้ว…!)[wa:660] "
1003905-81 = "[ns] บอกมิยุเรื่องสัตว์ที่มานั่งล้อมรอบตัวเธอ"
1003905-82 = "วะ... ว้ายย...!? สะ...สัตว์พวกนี้มาตั้งแต่เมื่อไรกัน?!"
1003905-85 = "ฮือออ..."
1003905-86 = "การที่เข้าหาพวกสัตว์ป่าได้โดยที่พวกมันไม่ระวังตัวแบบนี้ ฉันก็คิดว่าเป็นข้อได้เปรียบอยู่หรอกนะคะ..."
1003905-87 = "แต่ไม่คิดว่าพวกมันจะมาขัดขวางภารกิจซุ่มยิงแบบนี้..."
1003905-88 = "คิดแล้วเชียวว่าคนอย่างฉันคงไม่มีประโยชน์อะไรเลย..."
1003905-89 = "เป็นตัวตนที่ไร้ประโยชน์จริงๆ เลยค่ะ..."
1003905-90 = "[s] \"ถ้ามีครูอยู่ข้างๆ ละก็ต้องไม่เป็นไรแน่\""
1003905-94 = "[ns] \"ลองยิงดูอีกครั้งสิ\""
1003905-96 = "ค่ะ..."
1003905-97 = "ถ้างั้นขอรบกวนหน่อยนะคะ!"
1003905-99 = "(คุณครูเข้าไปอยู่ใกล้ๆ มิยุ ทำให้พวกสัตว์หนีไป จากนั้นคุณครูก็คอยดูมิยุฝึกซ้อมยิงปืนต่อไป)"
1003905-100 = "(คุณครูกังวลว่าจะยิงไม่โดน แต่ว่ามิยุกลับยิงเป้าหมายที่อยู่ไกลมากๆ ได้อย่างแม่นยำ)"

[translation]
1003905-1 = "RABBIT4，要狙擊了"
1003905-2 = "你，你好。老師。"
1003905-3 = "抱歉把你找來這種偏僻的地方……"
1003905-4 = "[s] 「沒關係，別在意。」"
1003905-5 = "謝，謝謝老師。今天是那個，想要進行模擬市街戰鬥的狙擊訓練……"
1003905-6 = "本來是想在奇普托斯市內進行訓練的……"
1003905-7 = "不過也不能給陌生人添麻煩……又不能說「只是在這裡訓練」……"
1003905-8 = "[s1] 「嗯，確實是這樣呢……」\n[s2] 「市內的居民也不少，有點危險呢。」"
1003905-9 = "是的。於是，我在尋找可以代替的地方……"
1003905-10 = "是的。於是，我在尋找可以代替的地方……"
1003905-11 = "以前我在這裡發現了一間沒有在使用的廢棄房屋。"
1003905-12 = "最近這段時間，我一直在觀察房屋的主人有沒有過來……#n不過因為沒有人來，我想它大概已經被棄置了……"
1003905-13 = "所以想要借用這個地方……進行訓練。"
1003905-14 = "[s] 「嗯，我知道了。我該怎麼幫忙呢？」"
1003905-15 = "啊，那個……因為我要進行狙擊的準備……"
1003905-16 = "所以可以請老師在對面那座山的山稜線上設置「目標」嗎……？"
1003905-17 = "[s] 「我知道了，大約300m遠的地方可以嗎？」"
1003905-18 = "那個，更遠一點……"
1003905-19 = "[s] 「500m左右？」"
1003905-20 = "不好意思，請再遠一點……"
1003905-21 = "可以的話希望能設置在1000m左右的地方……"
1003905-22 = "[s] 「……那麼遠能看的見嗎？」"
1003905-23 = "嗯，沒有問題……因為我是SRT的狙擊手。"
1003905-24 = "為了不成為RABBIT小隊的負擔……如果連這個都做不到的話……"
1003905-25 = "那麼……不好意思，麻煩老師了。"
1003905-28 = "[ns] 為了設置目標而移動"
1003905-30 = "（設置完目標，再次回到美優所在的地方時……）"
1003905-31 = "嗚……"
1003905-32 = "（美優不知為何被野生動物們包圍著……）"
1003905-35 = "— 調整呼吸……[wa:820] "
1003905-37 = "― 專注於目標……[wa:1110] "
1003905-40 = "— 距離1,150m，風向為東北東，風速15節……[wa:3920] "
1003905-42 = "— 矯正溫濕度產生的誤差……[wa:1180] "
1003905-45 = "— 那，那個……老師，[wa:3230] "
1003905-47 = "― 可以的話，那種惡作劇麻煩請停下來……[wa:3880] "
1003905-50 = "― 那個，會讓我沒辦法瞄準的……[wa:1160] "
1003905-53 = "[ns] 「呃，那不是我做的……」"
1003905-54 = "— ……原來如此。[wa:460] "
1003905-57 = "— 這不是妨礙，[wa:560] "
1003905-59 = "— 而是要在接近實戰的狀況下進行狙擊訓練對吧……[wa:3410] "
1003905-62 = "— 在SRT，"
1003905-64 = "— 好像也有類似的訓練……[wa:1760] "
1003905-67 = "[ns] 「那個……」"
1003905-68 = "— 噫噫……！？[wa:640] "
1003905-71 = "— 老，老師……！就算這樣，[wa:3180] "
1003905-73 = "— 在耳邊吹氣也有點……！？[wa:1100] "
1003905-76 = "— （唔……老，老師的呼吸靠得好近……）[wa:5360] "
1003905-78 = "― （沒，沒辦法瞄準……！）[wa:1460] "
1003905-81 = "[ns] 告訴美優動物們的存在"
1003905-82 = "哇，哇……？這些孩子什麼時候……！？"
1003905-85 = "唔……"
1003905-86 = "還以為不會被動物們警戒是我為數不多的長處……"
1003905-87 = "沒想到會對狙擊造成妨礙……"
1003905-88 = "果然這個體質，還是派不上用場……"
1003905-89 = "我果然是存在感為零的無用之人啊……"
1003905-90 = "[s] 「雖然不太確定，不過有我在的話應該就沒問題了。」"
1003905-94 = "[ns] 「再試一次吧。」"
1003905-96 = "……好的。"
1003905-97 = "謝謝你，老師。那就拜託你了……！"
1003905-99 = "（之後一邊趕走試圖接近美優的動物，一邊從旁觀察著狙擊訓練）"
1003905-100 = "（本來還有點擔心，不過美優漂亮地擊中了靶心）"

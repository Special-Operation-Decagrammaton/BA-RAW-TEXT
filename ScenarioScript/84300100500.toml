[translation]
84300100500-7 = "กระดาษโน้ตอันนี้มัน..."
84300100500-8 = "<รายการของที่ซื้อขาย>...? ทำไมของแบบนี้ถึง..."
84300100500-12 = "แล้วของในรายการก็... เป็นของที่พูดออกมาอย่างเปิดเผยไม่ได้ด้วย"
84300100500-13 = "หรือนี่จะเป็นการซื้อขายในตลาดมืด...? งั้นก็คงต้องตามไปสืบแล้วละ"
84300100500-14 = "แต่ถ้าไม่รู้ว่าไปไหนแล้ว ก็คงตามไปได้ยาก"
84300100500-15 = "งั้นมาหาดูดีมั้ยว่าคนนั้นหายไปไหน เอาแค่สถานที่ที่ไปก็น่าจะพอ อีกอย่าง ฉันก็รู้แล้วว่าหายตัวไป#nจากจุดไหน"
84300100500-19 = "ไม่สิ... ตอนนี้ฉันเป็นคนที่มาดูงานในมิลเลเนียม เอ็กซ์โป ถึงกระดาษโน้ตแผ่นนี้มันจะรบกวนจิตใจ แต่ก็ปล่อยไปเถอะ"
84300100500-20 = "ที่นี่เองก็ไม่ใช่ทรีนิตี้ แค่เอาเรื่องนี้ไปรายงานกับพวกไกด์ก็น่าจะเพียงพอแล้วละ"
84300100500-21 = "ถ้าลงมือทำอะไรที่ไม่ควรจนไปพัวพันกับปัญหาอะไรเข้าละก็ เรื่องที่ตกลงกับนางิสะเอาไว้ก็คง..."
84300100500-22 = "ที่ตกลง... กับนางิสะไว้..."
84300100500-23 = "นางิสะ..."
84300100500-25 = "แต่ถ้าเป็นคุณเซอาละก็ ตอนนี้เราคงคาดการณ์หรือเตรียมการล่วงหน้าไม่ได้เหมือนเมื่อก่อน"
84300100500-26 = "ถ้าจะให้พูดตรงๆ ละก็ ฉันมองว่าคุณเซอาคือ..."
84300100500-27 = "'คนที่ต้องได้รับการคุ้มครอง' ค่ะ..."
84300100500-30 = "เฮ้อ..."
84300100500-31 = "ทำไมต้องมานึกถึงเรื่องพวกนั้นในเวลานี้ด้วยนะ"
84300100500-32 = "ลำบากใจแล้วสิ..."
84300100500-33 = "แต่ก็คงช่วยไม่ได้นะ คงเป็นเพราะฉันเองก็เป็นคนที่มีความรู้สึกเหมือนกัน"
84300100500-34 = "งั้นก็ลองไปแค่... ตรวจสอบสถานที่ดูแล้วกัน"

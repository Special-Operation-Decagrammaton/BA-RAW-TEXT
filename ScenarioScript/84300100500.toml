[translation]
84300100500-7 = "這張紙條……"
84300100500-8 = "……「交易零件清單」？#n這種東西怎麼會……"
84300100500-12 = "而且這上面的品項……不是能光明正大說出口的東西呢。"
84300100500-13 = "是非法交易嗎……？#n看來得回報一下才行。"
84300100500-14 = "不過要是不知道去向，回報的意義似乎也不大。"
84300100500-15 = "先確認一下那些人前往的地點吧。#n剛才他們離開的方向也有所掌握了。"
84300100500-19 = "……不，現在的我只是一名千年博覽會的參觀者。#n就算內心有點在意，還是無視比較好吧。"
84300100500-20 = "這裡本來就不是三一，只要把情況告知導覽人員就夠了。"
84300100500-21 = "要是因為貿然行動而被捲入問題，就違背跟渚的協議了……"
84300100500-22 = "跟渚的協議……"
84300100500-23 = "渚……"
84300100500-25 = "然而聖亞同學現在，已經不再具備能提早察覺危險並加以防範的能力。"
84300100500-26 = "我可以坦承地告訴各位，現在的聖亞同學在我眼裡……"
84300100500-27 = "……是個「必須接受保護的對象」。"
84300100500-30 = "唉……"
84300100500-31 = "偏偏在這種時候想起了那句話。"
84300100500-32 = "……真傷腦筋。"
84300100500-33 = "沒辦法了。#n看來我也是感情用事的人吧。"
84300100500-34 = "……稍微確認一下地點就好。"

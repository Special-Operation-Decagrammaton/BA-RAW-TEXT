[translation]
84300100500-7 = "This note..."
84300100500-8 = "...\"Trade Parts List\"? Why is something like this..."
84300100500-12 = "And then there's this list over here... These are all classified, or they should be."
84300100500-13 = "Something to do with the black market...? I should report it..."
84300100500-14 = "...but I wouldn't have much to say if I don't know where the suspects are."
84300100500-15 = "I did see which way they went. I could tail them."
84300100500-19 = "...No. I'm here to observe the Millennium Expo. I shouldn't make waves."
84300100500-20 = "This isn't Trinity. If I tell my guides about it, that's enough."
84300100500-21 = "No poking around in other people's problems. That was the deal with Nagisa."
84300100500-22 = "The deal...with Nagisa..."
84300100500-23 = "Nagisa..."
84300100500-25 = "...and Seia can no longer predict or prepare for such things as she used to."
84300100500-26 = "Put plainly..."
84300100500-27 = "...I believe she needs protection."
84300100500-30 = "*sigh*"
84300100500-31 = "Of all the things to remember right at this moment."
84300100500-32 = "...Unfortunate."
84300100500-33 = "But I am a rather emotional person, after all."
84300100500-34 = "...I'll simply confirm where they are, before I tell anyone..."

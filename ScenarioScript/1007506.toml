1007506-103 = "#zmc;instant;-480,0;2200\n3;메루;03;아니, 참. 거. 잊어 달라니까.\n#3;em;[반응]"
1007506-104 = "#zmc;instant;-480,0;2200\n3;메루;01;굳이 말하자면…… 그런 거지."
1007506-105 = "#zmc;instant;-480,0;2200\n3;메루;02;요즘은…… 그렇게까지 관심이 가지 않았던 영역에, 뭔가."
1007506-106 = "#zmc;instant;-480,0;2200\n3;메루;01;조금이지만, 관심이 생기고 있는 것 같단 말이야."
1007506-107 = "#zmc;instant;-480,0;2200\n3;메루;99;응…… 확실히 그래. 더 많은 것들…… 더 많은 영역들을 그리고 싶어졌어."
1007506-108 = "#zmc;instant;-480,0;2200\n3;메루;01;그것도 어떻게 보면…… 선생이 원인이고."
1007506-109 = "#zmc;instant;-480,0;2200\n[s] \"나?\""
1007506-110 = "#zmc;instant;-480,0;2200\n3;메루;00;그렇습죠. 날 이렇게 바꿔 버린 책임을 지시라, 이 말이야.\n#3;em;[재잘]"
1007506-111 = "#zmc;instant;-480,0;2200\n[s] \"그렇게 이야기해도 말이지…… 잘 모르겠는데.\""
1007506-112 = "#zmc;instant;-480,0;2200\n3;메루;02;하아…… 뭐. 선생이라면 그렇게 말할 줄 알았어.\n#3;em;[한숨]\n#3;greeting"
1007506-113 = "#zmc;instant;-480,0;2200\n3;메루;00;그걸 고려해도, 지금 대답은 감점이야. 삐익. 경고하나."
1007506-114 = "#zmc;instant;-480,0;2200\n[s] \"영문도 모르고 경고를 먹어 버렸다……\""
1007506-115 = "#zmc;instant;-480,0;2200\n3;메루;03;그렇게 되었으니, 이제부터 내 원고를 어시스트해 줘야겠어!\n#3;jump"
1007506-116 = "#zmc;instant;-480,0;2200\n3;메루;02;어째서냐고? 그야 당연히 감점을 만회하기 위해서지!"
1007506-117 = "#zmc;instant;-480,0;2200\n3;메루;01;이대로 벌점이 쌓인 채 돌아간다면, 선생도 마음이 편치 않을 거 아냐?"
1007506-118 = "#zmc;instant;-480,0;2200\n[s] \"아니, 딱히 그렇지는……\""
1007506-119 = "#zmc;instant;-480,0;2200\n#st;[0,0];instant;1;"

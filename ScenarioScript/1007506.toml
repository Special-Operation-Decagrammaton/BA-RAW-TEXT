[translation]
1007506-1 = "#Title;붉은겨울로의 초대"
1007506-2 = "#na;(붉은겨울 학원에 들른 김에, 지식해방전선 쪽으로 발걸음을 옮겨 보았다.)"
1007506-3 = "#na;(메루의 모모톡이 신경 쓰였기 때문에……는 맞다.)"
1007506-4 = "#st;[0,0];instant;1;"
1007506-5 = "#clearST"
1007506-6 = "#place;도서관 내부"
1007506-7 = "3;메루;01\n#3;a\n#wait;1000"
1007506-8 = "3;메루;02;어, 선생?! 정말로 온 거야?\n#3;em;[반응]"
1007506-9 = "3;메루;03;우와, 이럴 줄 알았으면 좀 더 이것저것 준비했을 텐데……!"
1007506-10 = "[s] \"이런, 역시 민폐였던 것인가! 실수했군!\""
1007506-11 = "3;메루;04;아니아니아니! 거기에서 그렇게 나오면 내가 무안해지잖아.\n#3;jump"
1007506-12 = "3;메루;05;……어? 무안해지라고 한 말 맞다고? 이 어른이 정말……!"
1007506-13 = "3;메루;99;흠흠! 아무튼…… 으음. 어떡하지. 지식해방전선의 도서관에는 선생에게 특별히 추천할 만한 게 없는데.\n#3;greeting"
1007506-14 = "3;메루;04;오히려 선생에게 보여주면 혼날 것 같은…… 아니, 어떤 의미에서는 선생도 좋아할지도 모르는 것들이 많은……\n#3;em;[땀]"
1007506-15 = "[s] \"흥미가 생기기 시작했어.\""
1007506-16 = "3;메루;04;아, 안 되니까!  그런 걸 보여주느니 차라리, 차라리……!\n#3;stiff"
1007506-17 = "3;메루;03;아, 그래! 그렇게 하면 되겠네!\n#3;em;[전구]"
1007506-18 = "#st;[0,0];instant;1;"
1007506-19 = "#clearST"
1007506-20 = "3;메루;03\n#3;d\n#wait;2000"
1007506-21 = "#na;(갑자기 신이 난 듯한 메루를 따라, 도서관 안쪽으로 들어갔다.)"
1007506-22 = "#zmc;instant;-480,0;2200\n#all;hide"
1007506-23 = "#zmc;instant;-480,0;2200\n3;메루;00\n#3;a\n#wait;1000"
1007506-24 = "#zmc;instant;-480,0;2200\n3;메루;03;그러면…… 지식해방전선의 작업실에, 어서 오라고. 선생!\n#3;em;[음표]\n#3;jump"
1007506-25 = "#zmc;instant;-480,0;2200\n[s1] \"뭔가, 여기저기 어질러져 있는 듯 한 방이다……\"\n[s2] \"그렇다면 여기가, 메루의 전쟁터인 셈이군.\""
1007506-26 = "#zmc;instant;-480,0;2200\n#wait;100"
1007506-27 = "#zmc;instant;-480,0;2200\n#wait;100"
1007506-28 = "#zmc;instant;-480,0;2200\n3;메루;01;글쎄…… 전쟁터라기보다는, 재활 장소 같은 거지."
1007506-29 = "#zmc;instant;-480,0;2200\n3;메루;02;그게 무슨 뜻이냐고? 으음…… 그건……\n#3;em;[?]"
1007506-30 = "#zmc;instant;-480,0;2200\n3;메루;99;뭐, 이왕 여기까지 선생을 데려왔는데, 말해 버리지 까짓거."
1007506-31 = "#zmc;instant;-480,0;2200\n#st;[0,0];instant;1;"
1007506-32 = "#zmc;instant;-480,0;2200\n#clearST"
1007506-33 = "#zmc;instant;-480,0;2200\n3;메루;99\n#3;em;…\n#wait;2500"
1007506-34 = "#zmc;instant;-480,0;2200\n3;메루;01;……스스로 이야기하기에는 조금 부끄럽지만, 창작이란 게 뜻대로 안 풀릴 때가 더 많거든. 여러 가지 의미로."
1007506-35 = "#zmc;instant;-480,0;2200\n3;메루;99;그러면 뭔가, 의기소침해지거나 앞길이 꽉 막힌 것처럼 느껴질 때가 생긴단 말이야."
1007506-36 = "#zmc;instant;-480,0;2200\n3;메루;01;그리고 그러다 보면, 그림이고 뭐고 다 그냥 때려 치고 싶은 충동이 든단 말이야."
1007506-37 = "#zmc;instant;-480,0;2200\n3;메루;02;다음 돌격을 기다려야 하는 패잔병 같은 거지. 사기는 옛적에 꺾였고, 손끝 하나 움직일 힘도 없는데, 뒤에서는 자꾸 준비해야 한다고 시끄럽게 굴고……\n#3;em;[속상함]"
1007506-38 = "#zmc;instant;-480,0;2200\n3;메루;01;그런 느낌이 들 때면, 난 여기에서 다시 원고를 그리곤 해."
1007506-39 = "#zmc;instant;-480,0;2200\n3;메루;99;일종의 훈련 겸 정신적 재활이랄까, 그런 거지."
1007506-40 = "#zmc;instant;-480,0;2200\n3;메루;00;이거 정말 웃기지 않아? 그림 때문에 고통스러운데, 그걸 그림을 그리면서 풀어낸다는 거!"
1007506-41 = "#zmc;instant;-480,0;2200\n3;메루;03;창작자들은 정말이지 다들 제정신이 아니라니까! 와하하하하!\n#3;em;[재잘]\n#3;jump"
1007506-42 = "#zmc;instant;-480,0;2200\n[s3] \"그런 감정과 싸우면서 창작을 하는 건.\"\n[s4] \"보통 일이 아니라고 생각해.\""
1007506-43 = "#zmc;instant;-480,0;2200\n#wait;100"
1007506-44 = "#zmc;instant;-480,0;2200\n#wait;100"
1007506-45 = "#zmc;instant;-480,0;2200\n3;메루;01;추켜세우지 말아 달라고. 선생. 여기에는 근본적인 원죄가 있단 말이야.\n#3;greeting"
1007506-46 = "#zmc;instant;-480,0;2200\n3;메루;01;자기가 좋아서 하는 일이라는 원죄가 말이지."
1007506-47 = "#zmc;instant;-480,0;2200\n3;메루;02;어? 좋아서 하는 일이라고…… 힘들지 않은 건 아니라고?\n#3;em;[?]"
1007506-48 = "#zmc;instant;-480,0;2200\n3;메루;01;…….\n#3;em;…"
1007506-49 = "#zmc;instant;-480,0;2200\n3;메루;03;오늘따라 여러 가지로 정곡을 찔러 오네. 선생."
1007506-50 = "#zmc;instant;-480,0;2200\n[s5] \"그렇다면, 여기 있는 나라도.\"\n[s6] \"지식해방전선이 고생하고 있다는 걸 기억해 둬야겠네. \""

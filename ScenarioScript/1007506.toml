1007506-123 = "#zmc;instant;-480,0;2200\n3;메루;01\n#3;a\n#3;closeup\n#wait;1000"
1007506-124 = "#zmc;instant;-480,0;2200\n3;메루;03;마음이 편치 않을 거 아냐?\n#3;closeup"
1007506-125 = "#zmc;instant;-480,0;2200\n[s] \"그러니까 특별히 그렇지는……\""
1007506-126 = "#zmc;instant;-480,0;2200\n3;메루;01;마음 안 편하지? 그렇지?\n#3;em;[반짝]\n#3;closeup"
1007506-127 = "#zmc;instant;-480,0;2200\n[s] \"……그럴 것 같기도 하네.\""
1007506-128 = "#zmc;instant;-480,0;2200\n3;메루;03;그럴 줄 알았어! 자, 그럼 무슨 작업을 어떻게 부탁해 볼까~\n#3;em;[재잘]"

[translation]
1007506-1 = "คำเชิญของเรดวินเทอร์"
1007506-2 = "(คุณครูแวะมาทำธุระที่สหภาพเรดวินเทอร์ เลยแวะไปที่ชมรมแนวร่วมปลดปล่อยความรู้)"
1007506-3 = "(ข้อความ MOMOTALK ที่เมรุส่งมาทำให้คุณครูรู้สึกเป็นห่วงอยู่นิดหน่อย...)"
1007506-6 = "ข้างในห้องสมุดเก่า"
1007506-8 = "เอ๋ ครู?! มาจริงๆ ด้วยเหรอเนี่ย?"
1007506-9 = "ว้าว รู้อย่างนี้ ขอให้เตรียมของอื่นๆ มาด้วยดีกว่า...!"
1007506-10 = "[s] \"แบบนี้มันแย่จริงๆ เลย! ทำพลาดซะแล้วสิ!\""
1007506-11 = "ไม่ๆๆ! ถ้าพูดแบบนั้น ฉันต่างหากที่เป็นฝ่ายต้องรู้สึกละอายใจน่ะ "
1007506-12 = "...เอ๋? ก็พูดให้ฉันรู้สึกละอายใจงั้นเหรอ? ผู้ใหญ่คนนี้นี่จริงๆ เลย...!"
1007506-13 = "ฮึ่มมม! ยังไงก็เถอะ อืม... ทำยังไงดีล่ะ ที่ห้องสมุดของเราไม่ได้มีอะไรพิเศษพอที่จะแนะนำให้ครู#nได้เลย"
1007506-14 = "แถมดูเหมือนว่าถ้าเอาให้ดูจะโดนครูดุแทนด้วย... ไม่สิ บางทีอาจมีหลายๆ อย่างที่ครูอาจจะชอบก็ได้..."
1007506-15 = "[s] \"ชักสนุกแล้วสิ\""
1007506-16 = "มะ...ไม่ได้! ถ้างั้นเอาเป็นพวก... พวก...!"
1007506-17 = "อ๊ะ ใช่แล้ว! ทำแบบนั้นก็ได้นี่นา! "
1007506-21 = "(คุณครูเดินตามเมรุที่จู่ๆ ก็ดูตื่นเต้นขึ้นมาอย่างไม่มีปี่มีขลุ่ยเข้าไปด้านในของห้องสมุด)"
1007506-24 = "ถ้าอย่างนั้นก็... ยินดีต้อนรับสู่ห้องทำงานของชมรมแนวร่วมปลดปล่อยความรู้นะ ครู!"
1007506-25 = "[s1] \"คือว่า...ดูเป็นห้องที่รกดีนะ เหมือนสนามรบเลย\"\n[s2] \"ถ้างั้นที่นี่ก็คือ... สนามรบของเมรุสินะ\""
1007506-28 = "นั่นสินะ... อันที่จริงมันเหมือนกับเป็นสถานที่พักฟื้นมากกว่าสนามรบน่ะ"
1007506-29 = "...หมายความว่ายังไงน่ะเหรอ? อืม... เรื่องนั้น..."
1007506-30 = "ก็นะ ไหนๆ ฉันก็พาคุณครูมาที่นี่แล้ว เดี๋ยวเล่าให้ฟังเลยก็แล้วกัน"
1007506-34 = "...เรื่องนี้ให้พูดเองมันก็น่าอายอยู่นิดหน่อย แต่ว่าการสร้างสรรค์ผลงานน่ะ มันก็มีตอนที่หัวไม่แล่นอยู่#nเหมือนกันนะ"
1007506-35 = "พอเป็นแบบนั้น มันก็จะมีช่วงเวลาที่รู้สึกท้อแท้ หรือคิดว่าเส้นทางที่เดินมามันถึงทางตันแล้ว"
1007506-36 = "พอเป็นอยางนั้นมันก็ไปกระตุ้นความรู้สึกให้อยากวางปากกา เลิกๆ วาดไปเลยอะไรพวกนั้นน่ะ"
1007506-37 = "เปรียบเหมือนกับทหารผู้พ่ายแพ้จากสงคราม ขวัญกำลังใจถูกลดทอนลงไป จนไม่มีแรงจะสู้ต่อ ถึงจะขยับนิ้วมือไม่ได้ดั่งใจเลย แต่ก็ยังถูกสั่งการให้เตรียมพร้อมไม่เลิก..."
1007506-38 = "เวลาที่รู้สึกอย่างนั้นขึ้นมา ฉันก็จะมาที่ห้องนี้แล้วเริ่มต้นทุกอย่างใหม่ทั้งหมดน่ะ"
1007506-39 = "มันเป็นทั้งการเยียวยาจิตใจแล้วก็ถือเป็นการฝึกรูปแบบหนึ่งน่ะ"
1007506-40 = "มันน่าขำดีใช่มั้ยล่ะ? ที่ความเจ็บปวดที่เกิดจากการวาดรูป สามารถเยียวยาได้โดยการวาดรูปน่ะ!"
1007506-41 = "พวกนักวาดน่ะเป็นพวกสติไม่ดีกันทั้งนั้นแหละ! วะฮะฮะฮะฮ่าฮ่า!"
1007506-42 = "[s3] \"วาดรูปพร้อมต่อสู้กับความรู้สึกแบบนั้น...\"\n[s4] \"ครูคิดว่าสิ่งที่เมรุทำน่ะ ไม่ธรรมดาเลยนะ\""
1007506-45 = "ไม่ต้องมายอกันเลยครู ฉันว่ามันเหมือนกรรมที่ติดตัวมามากกว่าซะอีก"
1007506-46 = "กรรมของคนที่ได้ทำงานที่ชอบไงล่ะ"
1007506-47 = "หา? การได้ทำงานที่ชอบบางครั้งมันก็ลำบากงั้นเหรอ...?"
1007506-48 = "......"
1007506-49 = "วันนี้พูดอะไรช็อตฟีลกันบ่อยจริงๆ เลยนะครู"
1007506-50 = "[s5] \"ถ้างั้นอย่างน้อย ครูก็จะขอเป็นผู้ที่รับรู้เรื่องทั้งหมดเอง\"\n[s6] \"ครูจะจำไว้ว่าชมรมแนวร่วมปลดปล่อยความรู้กำลังตั้งใจอย่างเต็มที่\""
1007506-56 = "......"
1007506-57 = "ให้ตายสิ..."
1007506-62 = "― [log=메루]ที่จริงฉันก็ไม่ได้ทำเรื่องอะไรที่มันยิ่งใหญ่ขนาดนั้นสักหน่อย[/log][wa:1200] "
1007506-65 = "― [log=메루]ฉันแค่ไม่มีอะไรอย่างอื่นที่ทำได้[/log][wa:10] "
1007506-66 = "― [log=메루]แล้วก็ไม่ได้มีทักษะพิเศษอะไร...[/log][wa:530] "
1007506-69 = "― [log=메루]บางทีเพราะแบบนั้น...[/log][wa:60] "
1007506-71 = "― [log=메루]ฉันถึงแค่อยากสร้างสรรค์ผลงานต่อไปแบบนี้[/log][wa:200] "
1007506-74 = "― [log=메루]ฉันว่า... แบบนี้มันก็ไม่ได้แย่เท่าไร[/log][wa:1130] "
1007506-77 = "― [log=메루]หมายถึงที่แบบนี้น่ะ...[/log]"
1007506-78 = "― [log=메루]การได้พูดคุยกับคุณครูแบบนี้ มันอาจจะดีก็ได้[/log][wa:2900] "
1007506-81 = "― [log=메루]เพราะว่า...[/log][wa:1000] "
1007506-83 = "― [log=메루]การสร้างสรรค์ผลงานน่ะ มันต้องอาศัยความเปลี่ยนแปลงใช่มั้ยล่ะ?[/log][wa:10] "
1007506-86 = "― [log=메루]แล้วคุณครูก็เป็นคนที่นำความเปลี่ยนแปลงมาให้ฉัน[/log][wa:2550] "
1007506-89 = "― [log=메루]อึก...[/log][wa:260] "
1007506-91 = "― [log=메루]เมื่อกี้ฉันพูดเรื่องน่าอายออกไปซะแล้ว[/log][wa:320] "
1007506-94 = "― [log=메루]อ๊า! ทำเป็นไม่ได้ยินไปก็แล้วกันนะ! ลืมไปซะ ลืมให้หมดเลยด้วย![/log][wa:10] "
1007506-96 = "― [log=메루]อะฮ่าฮ่าฮ่า![/log]"
1007506-99 = "[ns7] \"ความเปลี่ยนแปลงงั้นเหรอ ครูไม่ค่อยเข้าใจเลยแฮะ\"\n[ns8] \"ช่วยอธิบายให้เข้าใจกว่านี้หน่อยสิ\""
1007506-103 = "ฉันบอกให้ลืมไปไม่ใช่รึไง?"
1007506-104 = "เฮ้อ จะอธิบายยังไงดีล่ะ...?"
1007506-105 = "ช่วงนี้... ดูเหมือนฉันชักจะเริ่มสนใจอะไรบางอย่างขึ้นมาน่ะ..."
1007506-106 = "ถึงจะแค่นิดหน่อยก็ตาม แต่ฉันก็เริ่มสนใจเกี่ยวกับเนื้อหาที่ไม่เคยสนใจมาก่อนบ้างแล้ว"
1007506-107 = "อื้อ... มันก็เป็นแบบนั้นละ ฉันอยากวาดรูปแนวที่แตกต่างกันให้มากขึ้นน่ะ"
1007506-108 = "ซึ่งเหตุผลที่อยากทำแบบนั้น... ก็คงเป็นเพราะคุณครูนั่นละ"
1007506-109 = "[s] \"ครูเหรอ?\""
1007506-110 = "ใช่แล้ว รับผิดชอบที่ทำให้ฉันเปลี่ยนไปแบบนี้ซะด้วยล่ะ"
1007506-111 = "[s] \"ถึงจะพูดแบบนั้นก็เถอะ... แต่ครูไม่ค่อยเข้าใจเลย\""
1007506-112 = "เฮ้อ... ก็นะ ฉันคิดแล้วแหละว่าคุณครูจะต้องพูดแบบนี้"
1007506-113 = "จากคำตอบเมื่อกี้ที่ดูเหมือนไม่ได้เข้าใจอะไรเลย ต้องถูกหักคะแนน! ชิ... ฉันเตือนแล้วนะ"
1007506-114 = "[s] \"ยังไม่เข้าใจอะไรเลยก็โดนหักคะแนนแล้วเหรอเนี่ย...\""
1007506-115 = "ไหนๆ ก็เป็นแบบนี้แล้ว ตั้งแต่ตอนนี้ไปครูมาเป็นผู้ช่วยวาดรูปต้นฉบับให้ฉันซะดีๆ!"
1007506-116 = "ทำไมต้องทำแบบนั้นน่ะเหรอ? แน่นอน ก็เพื่อชดเชยที่ถูกหักคะแนนไปน่ะสิ!"
1007506-117 = "ถ้ากลับไปทั้งๆ ที่ถูกหักคะแนนแบบนี้ ครูจะสบายใจหรือยังไง?"
1007506-118 = "[s] \"เอาจริง ครูไม่ต้องสนใจเรื่องคะแนนยังได้เลยนะ...\""
1007506-124 = "คงจะไม่สบายใจใช่มั้ยล่ะ?"
1007506-125 = "[s] \"ก็บอกแล้วไงว่าครูไม่ต้องสนใจก็ได้น่ะ...\""
1007506-126 = "คงไม่สบายใจสิเนอะ? ใช่มั้ย?"
1007506-127 = "[s] \"...ก็ได้ๆ ก็คงเป็นแบบนั้นแหละ\""
1007506-128 = "ใช่มั้ยล่ะ! เอาละ~ ถ้างั้นจะขอให้ช่วยงานอะไรดีนะ~"
1007506-130 = "(หลังจากนั้นคุณครูก็ใช้เวลาที่เหลือไปกับการช่วยเมรุวาดต้นฉบับ...)"

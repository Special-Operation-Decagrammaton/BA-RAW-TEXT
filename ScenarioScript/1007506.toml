[translation]
1007506-1 = "Invitation to Red Winter"
1007506-2 = "While visiting Red Winter Academy, I decided to pay a visit to the Knowledge Liberation Front."
1007506-3 = "Meru's MomoTalk had concerned me a bit..."
1007506-6 = "Inside the Library"
1007506-8 = "Huh? Sensei?! You're actually here?"
1007506-9 = "If I knew you were coming, I would've prepped at least a little!"
1007506-10 = "[s] \"I didn't mean to be a nuisance! I'll just head back...\""
1007506-11 = "No, no, no! Don't say that, I'll feel bad."
1007506-12 = "...What? That was the point?! What a rotten adult...!"
1007506-13 = "Ahem! Anyways... What to do? I don't have anything I can recommend to you in the Knowledge Liberation Front's library."
1007506-14 = "It's filled to the brim with things you won't like...or maybe, knowing Sensei, you'll actually really like them..."
1007506-15 = "[s] \"Now you have my attention.\""
1007506-16 = "I-I can't show them to you! I'd rather..."
1007506-17 = "Oh, yeah! I have an idea!"
1007506-21 = "I followed the suddenly excited Meru deeper into the library."
1007506-24 = "I welcome you...to the Knowledge Liberation Front's workshop!"
1007506-25 = "[s1] \"There's a lot going on in your battlefield.\" \n[s2] \"So this is your battlefield.\""
1007506-28 = "Well... It's more like my rehabilitation center rather than a battlefield."
1007506-29 = "What do I mean by that? Um... Well..."
1007506-30 = "I brought you all the way here, so I guess I should tell you."
1007506-34 = "...It's a bit embarrassing, but sometimes the act of creation doesn't go as I imagined. Most of the time, actually."
1007506-35 = "Whenever that happens, I get discouraged, like I'm backed into a corner."
1007506-36 = "The more trapped I start to feel, the more I feel like it's time to lay down the pen."
1007506-37 = "In a way, I guess it is a battlefield. I'm a soldier who just lost a battle. Her morale is low, and she doesn't have the energy to keep moving forward. But her superiors demand she pick up her weapon and go on fighting."
1007506-38 = "When that battlefield gets to be too much, I come here to start all over again."
1007506-39 = "It's kind of training and mental rehabilitation all in one."
1007506-40 = "Does that sound totally crazy? Creating is what brought me down, but the only way to bring myself back up is through art!"
1007506-41 = "How is it that creative types all have a screw loose? Hahaha!"
1007506-42 = "[s3] \"It's not easy to keep going with all those obstacles.\" \n[s4] \"I think it's pretty impressive.\""
1007506-45 = "Don't congratulate me, Sensei! This is where original sin itself was born!"
1007506-46 = "The original sin of doing everything because I love to do it."
1007506-47 = "What? The things we love to do...can still be hard...?"
1007506-48 = "..."
1007506-49 = "You're really hitting the mark today, Sensei."
1007506-50 = "[s5] \"If so, then I need to understand.\" \n[s6] \"While I'm here, I need to know that the Knowledge Liberation Front is hard at work. \""
1007506-56 = "..."
1007506-57 = "Geez..."
1007506-62 = "― [log=메루]I'm not doing anything that amazing.[/log][wa:2160] "
1007506-65 = "― [log=메루]I just don't have anything else I can do,[/log][wa:10] "
1007506-66 = "― [log=메루]or anything else I'm good at...[/log][wa:530] "
1007506-69 = "― [log=메루]Maybe that's why...[/log][wa:100] "
1007506-71 = "― [log=메루]Why I keep wanting to create.[/log][wa:600] "
1007506-74 = "― [log=메루]But this, right now... It doesn't feel wrong or bad.[/log][wa:490] "
1007506-77 = "― [log=메루]Here, in this workshop,[/log]"
1007506-78 = "― [log=메루]I feel like I can really talk to you.[/log][wa:3140] "
1007506-81 = "― [log=메루]Because...[/log][wa:1040] "
1007506-83 = "― [log=메루]Creation necessitates change, right?[/log][wa:10] "
1007506-86 = "― [log=메루]And you, you're someone who helps me change, Sensei.[/log][wa:2310] "
1007506-89 = "― [log=메루]Ugh...[/log][wa:260] "
1007506-91 = "― [log=메루]I just said something super cringey.[/log][wa:360] "
1007506-94 = "― [log=메루]Uh, just pretend you didn't hear anything! Forget it! Forget it right now![/log][wa:10] "
1007506-96 = "― [log=메루]Ahahaha![/log]"
1007506-99 = "[ns7] \"I don't understand what you mean by change.\" \n[ns8] \"Can you explain a little more?\""
1007506-103 = "Didn't I just tell you to drop it?!"
1007506-104 = "Ugh, have it your way! How do I explain this..."
1007506-105 = "These days, I've been noticing things that would normally fly under my radar."
1007506-106 = "Things that would barely catch my attention, incite interest and sketchable moments in my mind."
1007506-107 = "Yeah... If that makes sense. I've been wanting to draw a...wider variety of things."
1007506-108 = "And I think a lot of that...is thanks to your influence."
1007506-109 = "[s] \"Who? Me?\""
1007506-110 = "Yes, you! So I need you to take responsibility for changing me into the person I am today."
1007506-111 = "[s] \"I really don't know about that one, Meru.\""
1007506-112 = "*sigh* Well, I knew you would say something like that."
1007506-113 = "Regardless of how predictable that response was, it was still an incorrect one. Bzzzt. One warning."
1007506-114 = "[s] \"A warning? Since when can you give out warnings?\""
1007506-115 = "Since now! So you have to help me with my manuscript!"
1007506-116 = "...? How else are you going to atone for the warning I just gave you?"
1007506-117 = "Are you really going to tuck your tail behind your legs and go back to Schale with a WARNING?"
1007506-118 = "[s] \"I mean, I don't think I would care—\""
1007506-124 = "I'm sure that would ruin your day, right?"
1007506-125 = "[s] \"Like I said, I don't really—\""
1007506-126 = "Right? RIGHT?"
1007506-127 = "[s] \"...Yeah, I guess you're right.\""
1007506-128 = "I knew it! Now then, let's see what I can ask you to do first!"
1007506-130 = "And so I spent the rest of my day with Meru, helping her with her manuscript..."

[translation]
1007506-1 = "前往赤冬的邀請"
1007506-2 = "（結束赤冬學園的工作後，順路去了知識解放戰線）"
1007506-3 = "（是因為在意愛瑠傳來的MomoTalk……沒錯）"
1007506-6 = "圖書館內部"
1007506-8 = "哇，老師！？你真的來啦？"
1007506-9 = "糟糕，早知道老師會來的話，我就多做點準備了……！"
1007506-10 = "[s]「哎呀，給您添麻煩了嗎！小的知錯！」"
1007506-11 = "不會不會不會！老師這樣反而會讓我很不好意思。"
1007506-12 = "……咦？是故意這麼說的？#n這個大人真的是……！"
1007506-13 = "算了！不過……唔嗯，怎麼辦才好呢。#n知識解放戰線的圖書館沒有特別值得推薦給老師的東西。"
1007506-14 = "被看到會挨罵的東西倒是……不對，還是老師反而會喜歡……？"
1007506-15 = "[s]「突然有興趣了。」"
1007506-16 = "不，不行！#n與其讓老師看到那個，我還不如……！"
1007506-17 = "啊，對了！還有那個啊！"
1007506-21 = "（跟著似乎突然想起什麼了的愛瑠走進圖書館的深處）"
1007506-24 = "那麼……歡迎來到知識解放戰線的作業室，老師！"
1007506-25 = "[s1]「總覺得這房間到處都亂七八糟的……」\n[s2]「這麼說來，這裡就是愛瑠的戰場囉。」"
1007506-28 = "這個嘛……與其說是戰場，更像是回歸初心的地方吧。"
1007506-29 = "不明白是什麼意思？#n唔嗯……怎麼說呢……"
1007506-30 = "嗯，既然都帶老師來這裡了，也沒什麼好隱瞞的。"
1007506-34 = "……雖然自己這麼說有點難為情，但創作時不如意的時間才是多數吧。"
1007506-35 = "有時會感到心灰意冷或走投無路……"
1007506-36 = "甚至會出現想放棄畫畫和一切的衝動。"
1007506-37 = "就像在等待下一次突擊的殘兵敗將一樣。#n明明士氣早已跌落谷底，連手指都無力動彈，卻還是被命令要做好準備……"
1007506-38 = "當我有那種感覺的時候，就會回到這裡重新繪製原稿。"
1007506-39 = "類似訓練兼恢復心態的那種感覺吧。"
1007506-40 = "很好笑對吧？#n明明是因為繪畫而痛苦，卻透過繪畫來化解！"
1007506-41 = "創作者真是群怪人！哇哈哈！"
1007506-42 = "[s3]「在和那種情緒抗爭的同時進行創作……」\n[s4]「我認為那是件比想像中更困難的事。」"
1007506-45 = "別吹捧我了，老師。#n到頭來這終究還是……"
1007506-46 = "「為了做自己喜歡的事」而產生的原罪啊。"
1007506-47 = "咦？做自己喜歡的事……也是會累的？"
1007506-48 = "……"
1007506-49 = "今天的老師，說話好像特別中肯呢。"
1007506-50 = "[s5]「那麼至少現在在場的我……」\n[s6]「應該要把知識解放戰線的辛苦記在心裡。」"
1007506-56 = "……"
1007506-57 = "真是的……"
1007506-62 = "― [log=메루]我其實，也不是在做什麼了不起的事。[/log][wa:2920] "
1007506-65 = "― [log=메루]畢竟我沒有其他想做的事，[/log][wa:450] "
1007506-66 = "― [log=메루]也沒有其他技能……[/log][wa:1410] "
1007506-69 = "― [log=메루]所以我……[/log][wa:660] "
1007506-71 = "― [log=메루]才會持續創作著也說不定。[/log][wa:1280] "
1007506-74 = "― [log=메루]總覺得……這樣也不錯。[/log][wa:2130] "
1007506-77 = "― [log=메루]在這種地方……[/log]"
1007506-78 = "― [log=메루]和老師談論這些，也還不賴。[/log][wa:4100] "
1007506-81 = "― [log=메루]因為，你想想……[/log][wa:1120] "
1007506-83 = "― [log=메루]創作不是需要變化嗎？[/log][wa:1020] "
1007506-86 = "― [log=메루]而老師，也是為我帶來變化的人。[/log][wa:3790] "
1007506-89 = "― [log=메루]嗚哇……[/log][wa:340] "
1007506-91 = "― [log=메루]我好像說了很害羞的話。[/log][wa:1360] "
1007506-94 = "― [log=메루]啊～剛才當我沒說！忘了吧忘了吧！[/log][wa:1660] "
1007506-96 = "― [log=메루]啊哈哈哈！[/log]"
1007506-99 = "[ns7]「你所說的變化，我不是很明白。」\n[ns8]「可以說得具體一點嗎？」"
1007506-103 = "唉，真是的。不是都要你忘記了嗎。"
1007506-104 = "硬要說的話……嗯。"
1007506-105 = "最近……我對某個本來沒什麼興趣的世界……"
1007506-106 = "好像稍微產生了一點興趣。"
1007506-107 = "嗯……就是這樣。#n我還想畫更多……探索更多的領域。"
1007506-108 = "而某方面來說……老師就是那個契機。"
1007506-109 = "[s]「我？」"
1007506-110 = "沒錯。我的意思就是老師必須負起把我變成這樣的責任。"
1007506-111 = "[s]「就算你這麼說……我還是不太清楚。」"
1007506-112 = "唉……算了。#n就知道老師會這麼說。"
1007506-113 = "但就算是這樣，老師剛才的回答也要扣分。#n嗶嗶，警告一支。"
1007506-114 = "[s]「莫名其妙地被警告了……」"
1007506-115 = "因此今天老師要協助我繪製原稿！"
1007506-116 = "問我為什麼？#n當然是為了彌補扣分囉！"
1007506-117 = "要是在被扣分的狀態下回去，老師心裡也會不好受的吧？"
1007506-118 = "[s]「呃，其實也不會……」"
1007506-124 = "會不好受吧？"
1007506-125 = "[s]「其實也……」"
1007506-126 = "會不好受吧？會吧？"
1007506-127 = "[s]「……好像是有一點。」"
1007506-128 = "果然不出我所料！#n好，該拜託老師什麼工作呢～"
1007506-130 = "（於是便協助愛瑠繪製原稿，度過剩下的時間）"

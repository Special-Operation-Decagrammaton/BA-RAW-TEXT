[translation]
11134040-1 = "#N-03"
11134040-3 = "เล่นมาตั้งแต่เช้า ฉันชักจะหมดแรงแล้วแฮะ"
11134040-4 = "หาจังหวะไปถามทุกคนว่ากลางวันนี้จะกินอะไรดีกว่า..."
11134040-5 = "นะ... นัตสึ? คิดอะไรอยู่เหรอ...?"
11134040-6 = "คิดเรื่องแปลกอะไรอยู่อีกน่ะ? ไม่ได้นะ ยังไงก็ไม่ได้"
11134040-7 = "ถึงจะไม่รู้ว่าเรื่องอะไร แต่ฉันขอโหวตว่าไม่เอาด้วย~"
11134040-11 = "หรือนี่จะเป็นจังหวะโมโหมากกว่านะ?"

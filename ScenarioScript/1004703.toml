[translation]
1004703-1 = "สิ่งที่อยากให้คุณได้เห็น"
1004703-2 = "อ๊ะ ทางนี้ คุณครู"
1004703-3 = "[s] \"มีอะไรที่อยากให้ครูดูงั้นเหรอ?\""
1004703-4 = "อื้อ ทิวทัศน์ที่แสนงดงาม..."
1004703-5 = "มีอะไรบางอย่าง เปล่งประกายระยิบระยับอยู่..."
1004703-6 = "ก็เลยอยากให้คุณครูเห็น"
1004703-7 = "อือ อย่าเสียเวลาอยู่เลย"
1004703-8 = "ไปกันเถอะคุณครู"
1004703-12 = "ทางนี้- ตรงนี้ละ~"
1004703-27 = "[ns] \"เดินมาไกลมากเลย ที่นี่มีอะไรกันน่ะ...\""
1004703-28 = "คุณครู ทางนี้ๆ"
1004703-32 = "กี๊..."
1004703-33 = "[s] \"นี่มันเต่าเหรอ? ไม่สิ กองทัพเต่า...?\""
1004703-34 = "(คุณครูได้เจอกับเต่าจำนวนมาก... ไม่สิ จำนวนมหาศาลถึงขั้นที่เรียกว่ากองทัพเต่าก็ยังได้)"
1004703-35 = "(พื้นที่ที่อยู่เลยโขดหินริมทะเลแบบนี้คงจะเป็นสถานที่พักผ่อนสำหรับพวกเต่า)"
1004703-37 = "สุดยอดไปเลยใช่มั้ยล่ะ~?"
1004703-38 = "[s] \"นะ... นั่นสินะ...\""
1004703-39 = "ระหว่างที่เดินไปทั่วชายหาดเพื่อตามหาแสงระยิบระยับ"
1004703-40 = "ฉันก็เจอที่นี่เข้าน่ะ"
1004703-44 = "อืมม~ ที่นี่มีคุณเต่าอยู่เยอะแยะเลย..."
1004703-45 = "พวกคุณเต่ามาจากวังมังกรรึเปล่านะ?"
1004703-46 = "[s] \"วังมังกรเหรอ...?\""
1004703-47 = "ก็พวกคุณเต่ามาจากวังมังกรกันไม่ใช่เหรอ?"
1004703-48 = "แหวกว่ายไปด้วยกันในท้องทะเล ว่ายน้ำไปมา~ "
1004703-49 = "และแหวกว่ายน้ำทะเลจนมาถึงชายฝั่ง"
1004703-50 = "ได้ยินว่าคุณเต่าจะพาคนที่เคยช่วยเหลือกลับไปยังวังมังกรเพื่อตอบแทนบุญคุณด้วยนะ"
1004703-51 = "[s] \"เรื่องนั้นเหมือนจะเป็นเรื่องในตำนานนะ...\""
1004703-52 = "แต่หัวหน้านิยะบอกว่าพอคุณเต่าพากลับไปที่วังมังกรแล้วก็จะบังคับคนคนนั้นให้ซื้อของขวัญน่ะ"
1004703-53 = "[s] \"หืม...?\""
1004703-54 = "หรือก็คือคุณเต่าที่อยู่ที่นี่ทั้งหมด..."
1004703-55 = "อาจกำลังตามหาคนที่จะหลอกให้ไปซื้อกล่องสมบัติที่วังมังกรอยู่ก็ได้"
1004703-56 = "[s] \"นิยะเล่าอะไรให้เธอฟังเนี่ย?!\""
1004703-58 = "อ๊ะ คุณเต่าขยับตัวแล้ว~"
1004703-59 = "เป็นยังไงบ้างคุณครู~? ดูสิพวกเขามีแสงระยิบระยับกันหมดเลย"
1004703-60 = "กระดองของคุณเต่าส่องแสงระยิบระยับด้วยละ"
1004703-61 = "[s] \"จริงด้วย สวยมากเลยนะ\""
1004703-62 = "อื้อ ฉันดีใจที่คุณครูได้มาดูด้วยกันนะ"
1004703-63 = "สวยมากเลย... ฉันชอบมากๆ"
1004703-64 = "ก็เลยสงสัยว่าคุณครูจะรู้สึกยังไง"
1004703-65 = "[s] \"อือ เข้าใจแล้วว่าทำไมถึงอยากให้ครูมาดู...\""
1004703-70 = "อ่า"
1004703-71 = "[s] \"ชิเซะ? เป็นอะไรหรือเปล่า...?\""
1004703-74 = "[ns] \"เดี๋ยวก่อนสิ?! ท่านชิเซะ ชุดนั่นมันอะไรเนี่ย...?!\""
1004703-75 = "― คุณครู? เป็นอะไรเหรอ?[wa:2260] "
1004703-77 = "― ทำไมถึง หน้าแดงเชียว-?[wa:280] "
1004703-80 = "[ns] \"ครูไม่ได้เป็นอะไรหรอก แต่ว่าชุดของเธอน่ะ...\""
1004703-81 = "― ถ้าคุณครูบอกว่าไม่เป็นอะไร ก็คงไม่เป็นอะไรจริงๆ[wa:950] "
1004703-83 = "― แต่ว่านะคุณครู ดูนี่สิ นี่น่ะ[wa:3860] "
1004703-86 = "― กระดองของคุณเต่า~[wa:1400] "
1004703-88 = "― มันแข็งมากๆ เลย"
1004703-91 = "― แต่ที่จริง ตรงส่วนหางน่ะ[wa:10] "
1004703-93 = "― มันนุ่มนิ่มๆ นะ นู่มมม~ นิ่ม[wa:4090] "
1004703-96 = "― คุณครูคิดว่ายังไงล่ะ คุณครูก็ลองจับดูหน่อยมั้ย?[wa:1480] "
1004703-98 = "― บอกแล้วว่านุ่มนิ่มมากๆ"
1004703-101 = "― คุณครู? ทางนี้ ตรงนี้ล่ะ[wa:3260] "
1004703-104 = "[ns] \"ครูก็อยากเดินไปดูนะ แต่ตอนนี้คงไม่เหมาะ\""
1004703-105 = "― ตอนนี้คงไม่เหมาะงั้นเหรอ...?[wa:350] "
1004703-107 = "― ทำไมล่ะ...? มีอะไรเหรอ? คุณครู~?[wa:2420] "
1004703-110 = "(หลังจากนั้นคุณครูก็จับชิเซะให้อยู่เฉยๆ และซ่อมสายชุดว่ายน้ำให้ได้สำเร็จ)"
1004703-112 = "[ns1] \"เอาละ เท่านี้ก็เสร็จแล้ว!\"\n[ns2] \"ดีที่แก้ปัญหาได้ทันก่อนจะเป็นเรื่องใหญ่นะ!\""
1004703-115 = "อ๊ะ เสื้อหลุดอยู่งั้นเหรอ ฉันไม่รู้ตัวเลย"
1004703-116 = "ขอบคุณนะ~ คุณครู"
1004703-117 = "เมื่อกี้นี้~ หน้าของคุณครูน่ะ"
1004703-118 = "ดูตลกแล้วก็น่ารักมากเลย เหมือนประกายระยิบระยับเลย~"
1004703-119 = "[s] \"ครูดีใจที่ชิเซะสนุกนะ\""
1004703-120 = "อื้อ~ วันนี้มีแต่เรื่องสนุกเต็มไปหมดเลย~"
1004703-121 = "[s] \"หรือว่านี่คือแสงระยิบระยับที่ชิเซะตามหาเหรอ?\""
1004703-122 = "อืม... ฉันก็ไม่รู้เหมือนกัน~"
1004703-123 = "ที่นี่มีแสงระยิบระยับมากมาย"
1004703-124 = "อืม แต่ก็ไม่เหมือนกับที่ฉันคิดเอาไว้ซะทีเดียว"
1004703-125 = "แต่ว่าฉันก็สนุกมากเลยนะ"
1004703-126 = "[s] \"งั้นเหรอ? โล่งอกไปทีนะ\""
1004703-127 = "อื้อ~!"
1004703-129 = "(หลังจากนั้นคุณครูกับชิเซะก็ใช้เวลาพักผ่อนด้วยกันตรงบริเวณที่มีคุณเต่าอยู่...)"

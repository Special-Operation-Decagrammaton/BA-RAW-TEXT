[translation]
1004703-1 = "What I Want to Show You"
1004703-2 = "I'm here, Sensei."
1004703-3 = "[s] \"You wanted to show me something?\""
1004703-4 = "It's the most amazing thing I've ever seen."
1004703-5 = "There's sparkles all over the place."
1004703-6 = "I wanted to show them to you."
1004703-7 = "No time to waste."
1004703-8 = "Let's go, Sensei."
1004703-12 = "It's this way."
1004703-27 = "[ns] \"We're pretty far now. What are we looking for?\""
1004703-28 = "These. Right here."
1004703-32 = "Kweee..."
1004703-33 = "[s] \"Turtles? Actually...an army of turtles??\""
1004703-34 = "I saw a great number of turtles. It wasn't an exaggeration to call them an army of turtles."
1004703-35 = "The spot Chise found on the other side of some rocks on the seashore seemed to be a resting place for the turtles."
1004703-37 = "Isn't it amazing?"
1004703-38 = "[s] \"If you think it is.\""
1004703-39 = "I was looking for sparkles all over the beach."
1004703-40 = "And then I found this place."
1004703-44 = "I wonder why all the turtles congregate here."
1004703-45 = "They must have come from an underwater palace."
1004703-46 = "[s] \"The turtles live in a palace?\""
1004703-47 = "Of course, Sensei. All turtles are from an underwater palace."
1004703-48 = "Then they leave together in a big group."
1004703-49 = "And beach themselves on a far away shore."
1004703-50 = "If someone is kind to the turtles, they'll take the person to their underwater palace as thanks."
1004703-51 = "[s] \"Oh, that's like a fairy tale...\""
1004703-52 = "But President Niya said when you get to the underwater palace, they force you to purchase stuff."
1004703-53 = "[s] \"Th-That took a turn.\""
1004703-54 = "So all the turtles here could be..."
1004703-55 = "Looking for innocent people to sell their underwater treasures to."
1004703-56 = "[ns] \"What has Niya been teaching you?!\""
1004703-58 = "Oh, the turtles are moving!"
1004703-59 = "Sensei, look. They're sparkling in the sunlight!"
1004703-60 = "Their shells are sparkling."
1004703-61 = "[s] \"Yeah, what a beautiful sight.\""
1004703-62 = "I'm happy I got to show you."
1004703-63 = "It's dazzling."
1004703-64 = "I wanted to know how you would feel about it."
1004703-65 = "[s] \"Thank you for showing me.\""
1004703-70 = "Ah."
1004703-71 = "[s] \"Chise? Are you okay...?\""
1004703-74 = "[ns] \"W-Wait! Y-Your clothes...?!\""
1004703-75 = "― Sensei? What's wrong?[wa:2260] "
1004703-77 = "― Why are you blushing?[wa:320] "
1004703-80 = "[ns]  \"Y-Your swimsuit, Chise.\""
1004703-81 = "― If you're okay, that's all I care about.[wa:1230] "
1004703-83 = "― By the way, Sensei, look over here. Look.[wa:3380] "
1004703-86 = "― The shells of these turtles are...[wa:720] "
1004703-88 = "― so hard, but..."
1004703-91 = "― The tails are[wa:380] "
1004703-93 = "― so fluffy. Fluffy![wa:4490] "
1004703-96 = "― What do you think? You wanna touch it?[wa:1840] "
1004703-98 = "― It's fluffy."
1004703-101 = "― Sensei? Here, over here![wa:3260] "
1004703-104 = "[ns] \"No! I mean, now's not a good time!\""
1004703-105 = "― It's not a good time...?[wa:510] "
1004703-107 = "― Why is that? Sensei?[wa:2900] "
1004703-110 = "I finally got Chise to stop moving so I could fix her swimsuit."
1004703-112 = "[ns1] \"Okay, you're all better now.\" \n[ns2] \"I fixed it before it turned into a problem!\""
1004703-115 = "Oh, it was untied. I didn't know."
1004703-116 = "Thank you, Sensei."
1004703-117 = "Your face just now..."
1004703-118 = "It was funny and cute! Like a sparkle."
1004703-119 = "[s] \"Well, I'm glad you found it funny...\""
1004703-120 = "Yes! Today has been very fun!"
1004703-121 = "[s] \"So, are these the sparkles you've been looking for?\""
1004703-122 = "Hmm? I'm not sure."
1004703-123 = "There's lots of sparkles here."
1004703-124 = "But I'm not sure if they're the ones I've been looking for."
1004703-125 = "But I had lots of fun."
1004703-126 = "[s] \"Yeah? That's what matters.\""
1004703-127 = "I agree, Sensei."
1004703-129 = "We spent some more time at the turtles' resting place."

[translation]
1004703-1 = "想給你看的東西"
1004703-2 = "老師，這裡這裡～"
1004703-3 = "[s] 「久等了。知世想給我看什麼東西呀……？」"
1004703-4 = "嗯，很壯觀唷。"
1004703-5 = "閃閃發亮，真的很壯觀。"
1004703-6 = "所以我希望老師也能一起看看。"
1004703-7 = "嗯，現在不是聊天的時候了。"
1004703-8 = "來吧，老師。"
1004703-12 = "往這邊～跟我來吧～"
1004703-27 = "[ns] 「挺遠的呢，這裡有什麼呀……」"
1004703-28 = "老師，我們到了。"
1004703-32 = "……"
1004703-33 = "[s] 「這是，一大群烏龜……？」"
1004703-34 = "（抵達目的地後，映入眼簾的是一大群烏龜）"
1004703-35 = "（看來烏龜們都跑來這個杳無人煙的地方棲息了）"
1004703-37 = "如何？很壯觀吧～？"
1004703-38 = "[s] 「就，就是啊……」"
1004703-39 = "這是我在海邊尋找閃亮的時候……"
1004703-40 = "偶然發現的地方。"
1004703-44 = "這些烏龜先生們，難道……"
1004703-45 = "是從龍宮跑來的嗎？"
1004703-46 = "[s] 「什麼意思……？」"
1004703-47 = "烏龜先生不是都來自龍宮嗎？"
1004703-48 = "大家一起悠哉地～游著泳著～"
1004703-49 = "然後就跑到沙灘上了。"
1004703-50 = "聽說只要幫助牠們，就會被帶去龍宮。"
1004703-51 = "[s] 「啊，確實是有那種故事……」"
1004703-52 = "仁耶部長說過，被帶去龍宮的人會被強迫買一些寶物。"
1004703-53 = "[s] 「是，是嗎……？」"
1004703-54 = "也就是說，在這裡的烏龜先生們……"
1004703-55 = "說不定是在尋找願意買寶物的天真傻瓜呢──"
1004703-56 = "[s] 「這樣想的話，畫面還真是不得了……」"
1004703-58 = "啊。烏龜先生很有精神地動起來了──"
1004703-59 = "老師，你看。大家都被太陽照得閃閃發亮。"
1004703-60 = "烏龜先生們都散發著耀眼的光芒。"
1004703-61 = "[s] 「真是壯觀的景色呢。」"
1004703-62 = "嗯。我就是想讓老師看看這幅景象。"
1004703-63 = "我很喜歡。"
1004703-64 = "也想知道老師看了後有什麼感想。"
1004703-65 = "[s] 「這樣啊，謝啦。」"
1004703-70 = "啊！"
1004703-71 = "[s] 「知世？你還好──」"
1004703-74 = "[ns] 「喂，知世！？你的泳裝……！」"
1004703-75 = "― 老師，你怎麼了？[wa:2780] "
1004703-77 = "― 臉很紅唷？[wa:960] "
1004703-80 = "[ns] 「我沒事，不過知世你……」"
1004703-81 = "― 沒事就好。[wa:2630] "
1004703-83 = "― 比起那個，老師，看這裡，這裡。[wa:4420] "
1004703-86 = "― 烏龜先生的背殼，[wa:1760] "
1004703-88 = "― 雖然非常的硬～"
1004703-91 = "― 但其實尾巴的部分，[wa:540] "
1004703-93 = "― 是軟綿綿的。軟綿綿～[wa:4810] "
1004703-96 = "― 如何？老師也要摸摸看嗎？[wa:2880] "
1004703-98 = "― 軟綿綿的唷。"
1004703-101 = "― 老師？是這裡唷，這裡。[wa:3780] "
1004703-104 = "[ns] 「那個，雖然我也很想看，但現在這狀況有點傷腦筋……！」"
1004703-105 = "― 現在有點傷腦筋……？[wa:1070] "
1004703-107 = "― ……為什麼？怎麼了？老師～？[wa:3140] "
1004703-110 = "（之後，費了一番功夫才將知世的泳裝調整好）"
1004703-112 = "[ns1] 「沒事了……」\n[ns2] 「成功脫險了……」"
1004703-115 = "我完全沒注意到呢。"
1004703-116 = "謝謝，老師。"
1004703-117 = "老師剛才的表情。"
1004703-118 = "好可愛，好有趣呢～"
1004703-119 = "[s] 「那，那真是太好了……？」"
1004703-120 = "感覺今天，發生了好多開心的事情唷～"
1004703-121 = "[s] 「知世之前說的『一直在尋找的閃亮』，就是這幅景象嗎？」"
1004703-122 = "這個嘛～"
1004703-123 = "……雖然這幅景象確實是閃閃發亮。"
1004703-124 = "但跟我正在尋找的，有點不太一樣。"
1004703-125 = "不過，很開心。"
1004703-126 = "[s] 「那就太好了。」"
1004703-127 = "嗯！"
1004703-129 = "（後來，和知世在烏龜們的避風港度過了悠閒的一天）"

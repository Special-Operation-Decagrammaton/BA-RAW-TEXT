10037100-43 = "3;토모에 치파오;03;지금의 카구야가 하는 일은, 경극부를 수호하는 일이 맞나요? \n#3;em;[?]"
10037100-44 = "3;토모에 치파오;02;저는 제삼자의 시선으로 지켜볼 뿐이지만, 조금 의문이 드네요."

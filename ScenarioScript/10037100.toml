[translation]
10037100-1 = "第10話;懷抱蒼空，步抵山麓"
10037100-4 = "真受不了！咱已經聽不下去了！"
10037100-8 = "什麼！？"
10037100-15 = "那種事根本無所謂！"
10037100-16 = "咱先把話說清楚！所有的學生都有發動政變的權利！"
10037100-17 = "但是所有的學生會長……也都有鎮壓政變，引領學園繼續前進的權力！"
10037100-19 = "這，這是在說些什麼，潔莉諾書記長！？"
10037100-20 = "咱的意思是，這種事在赤冬就跟家常便飯沒兩樣！"
10037100-21 = "沒有守護好傳統？召來新的變化？"
10037100-22 = "你們現在所發動的政變，不才是真正意義上的「變化」嗎！"
10037100-23 = "我，我們並不是想要發動政變或謀反，只是在提出諫言……！"
10037100-31 = "但你們選擇的手段卻是「極端的方法」和「變化」……難道不是嗎，京劇部的各位？"
10037100-36 = "這，這麼說來好像確實……！？"
10037100-41 = "玄龍門的門主應該要守護山海經……這點確實如各位所說。"
10037100-42 = "但真要這麼說的話，京劇部的部長不也應該要守護京劇部嗎？"
10037100-43 = "然而輝夜同學現在的所作所為，是否真的是在守護京劇部呢？"
10037100-44 = "雖然我只是一介外人，但我對這點抱持著些許的疑問。"
10037100-46 = "哦哦，哦哦哦哦……！？"
10037100-48 = "玄龍門的各位也是。#n雖然守護山海經的確非常重要……"
10037100-49 = "但各位除了是山海經的學生外，更是玄龍門這個組織的成員對吧？"
10037100-50 = "既然如此，將組織的領袖擺在第一位，這不才是各位真正的職責和任務嗎？"
10037100-52 = "這……話是能這麼說的嗎？"
10037100-53 = "雖然他說的確實有點道理……#n但那個叫智惠的赤冬學生，怎麼會這麼清楚……我們山海經和玄龍門的情況啊？"
10037100-55 = "關於這點，就如剛才我們的書記長所言──"
10037100-56 = "這點小騷動對赤冬而言，只是家常便飯而已。"
10037100-57 = "赤冬的嚴寒對所有人都一視同仁……"
10037100-58 = "而那股寒冷不僅為我們磨練出不易屈服的意志，更讓我們擁有如野熊一般的堅毅！"
10037100-62 = "好了，所有人都給我讓開！#n潔莉諾會長，就由我來為您開路吧，請您相信我！"
10037100-63 = "唔呣！真是可靠啊，瑪麗娜委員長！#n就讓山海經的學生們見識一下赤冬的手段，並成為他們的典範吧！"
10037100-68 = "是！我要上了！烏拉──！"

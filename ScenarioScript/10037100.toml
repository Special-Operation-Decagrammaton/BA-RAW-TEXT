[translation]
10037100-1 = "Episode 10;Embracing the Sky from the Foothills"
10037100-4 = "I can't stand any more of this!"
10037100-8 = "What was that?!"
10037100-15 = "How does any of that matter?"
10037100-16 = "Let me make myself clear! All students have the right to stage a coup!"
10037100-17 = "And a student council president has the right to suppress that coup and continue leading the school!"
10037100-19 = "W-what are you talking about, Great Leader Cherino?!"
10037100-20 = "I'm saying that what's happening right now is par for the course for us at Red Winter!"
10037100-21 = "Not protecting tradition? Bringing about change?"
10037100-22 = "Isn't this coup d'etat you are all raising the very definition of \"change\"?!"
10037100-23 = "W-what we're trying to do isn't a coup d'etat or treason. We are providing advice and suggestions...!"
10037100-31 = "But the Peking Opera Club chose extreme measures and change to make that happen. Isn't that right?"
10037100-36 = "Th-that does make sense...!"
10037100-41 = "The president of Genryumon must protect Shanhaijing... Yes, this is true. "
10037100-42 = "But if that's the case, shouldn't the president of the Peking Opera Club protect the Peking Opera Club?"
10037100-43 = "Are Kaguya's actions truly protecting the Peking Opera Club? "
10037100-44 = "I may be a neutral third party, but even I'm a bit doubtful."
10037100-46 = "Um... Oh...?!"
10037100-48 = "The same goes for all of Genryumon. Of course, protecting Shanhaijing is important."
10037100-49 = "But are you not all members of a group called Genryumon that is part of Shanhaijing?"
10037100-50 = "Isn't prioritizing the protection of that group's leader your true duty and task?"
10037100-52 = "Oh, huh. Is...that how it works?"
10037100-53 = "That makes sense... But how could that Red Winter student, Tomoe, know so much about what's going on with Shanhaijing and Genryumon?"
10037100-55 = "Well, as our Great Leader said before..."
10037100-56 = "An incident of this nature is so commonplace at Red Winter that it borders on trivial."
10037100-57 = "Red Winter's coldness levels the playing field..."
10037100-58 = "It doesn't defeat us. It gives us the courage of a bear!"
10037100-62 = "Now, move! Great Leader Cherino, I'll clear a path. Trust me!"
10037100-63 = "Hm! I can always count on you, Chairman Marina! Let's show them the ways of Red Winter and set an example for the Shanhaijing students!"
10037100-68 = "Yes, here I go! Raaa!"

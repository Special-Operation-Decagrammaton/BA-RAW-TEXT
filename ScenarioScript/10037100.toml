10037100-48 = "3;토모에 치파오;99;현룡문 여러분도 마찬가지입니다. 물론 산해경을 수호하는 것은 중요하겠지요."
10037100-49 = "3;토모에 치파오;01;그렇지만 여러분은 산해경에 속한, 현룡문이라는 단체의 구성원이지요?"
10037100-50 = "3;토모에 치파오;03;그렇다면 그 단체의 주인을 무엇보다 우선해서 지키는 것이, 여러분의 진정한 의무와 과업이 아닌가요?\n#3;em;[반응]"
10037100-51 = "#all;hide"
10037100-52 = "4;현룡문 부원 D;02\n2;현룡문 부원 C;04;어라. 그게…… 그렇게 되나?\n#2;stiff"
10037100-53 = "4;현룡문 부원 D;04;분명히 일리는 있는데…… 저 토모에라는 붉은겨울 학생, 어떻게 우리 산해경과 현룡문의 사정을…… 이렇게 능숙하게 알고 있는 거지?\n#4;em;[땀]"
10037100-54 = "#all;hide"
10037100-55 = "3;토모에 치파오;99;그거야, 앞서 저희 서기장님께서 말씀하셨듯."
10037100-56 = "3;토모에 치파오;03;붉은겨울에서 이 정도 사건은, 아침 인삿거리도 안 될 정도의 사소한 일이기 때문이죠.\n#3;em;[반짝]\n#3;closeup"

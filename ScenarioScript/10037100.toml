10037100-15 = "3;체리노 치파오;05;그런 게 대체 무슨 상관이라고!\n#3;closeup\n#fontsize;80"
10037100-16 = "3;체리노 치파오;05;확실하게 말해 두지! 모든 학생에게는 물론 쿠데타를 일으킬 권리가 있다!\n#3;em;[스팀]\n#3;hophop\n#3;closeup"
10037100-17 = "3;체리노 치파오;05;그리고 모든 학생회장에게는…… 그 쿠데타를 진압하고, 학교를 이끌 권리가 있다!\n#3;closeup"
10037100-18 = "#all;hide"
10037100-19 = "3;카구야;15;무, 무슨 말을 하는 겁니까. 체리노 서기장?!\n#3;em;[땀]"
10037100-20 = "1;체리노 치파오;05;우리 붉은겨울에서, 이 정도 일은 아침 인삿거리도 안 된다는 말을 하고 싶은 거다!\n#1;hophop\n#1;ar\n#3;m5"
10037100-21 = "1;체리노 치파오;99;전통을 지키지 않는다? 변화를 불러일으켰어?"
10037100-22 = "1;체리노 치파오;05;지금 너희가 하고 있는 쿠데타야말로, 진정한 의미의 '변화'가 아니냐!\n#1;em;[반응]"
10037100-23 = "3;카구야;13;우, 우리가 하려는 것은 쿠데타라든가 반역이 아니라, 충언과 고언을……!\n#3;stiff"

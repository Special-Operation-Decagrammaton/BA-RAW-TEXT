[translation]
10037100-1 = "ตอนที่ 10;โอบกอดฟ้า ณ เชิงเขา"
10037100-4 = "ให้ตายเถอะ! ทนฟังต่อไม่ไหวแล้ว"
10037100-8 = "อะไรน่ะ?!"
10037100-15 = "เรื่องแบบนั้นมันเกี่ยวอะไรกันด้วยล่ะ!"
10037100-16 = "เราขอพูดอย่างตรงไปตรงมาเลยนะ! แน่นอนว่านักเรียนทุกคนมีสิทธิ์ก่อการปฏิวัติได้!"
10037100-17 = "และประธานนักเรียนทุกคน... ก็มีสิทธิ์ปราบการปฏิวัตินั้นและนำโรงเรียนได้ต่อ!"
10037100-19 = "จะ... จะพูดอะไรน่ะ เลขาธิการเชริโน่?!"
10037100-20 = "ที่เราอยากบอกก็คือ ในเรดวินเทอร์น่ะ เรื่องแบบนี้เป็นเหมือนแค่การทักทายในตอนเช้าเท่านั้นแหละ!"
10037100-21 = "ไม่รักษาประเพณีงั้นเหรอ? ก่อให้เกิดการเปลี่ยนแปลงงั้นเหรอ?"
10037100-22 = "การปฏิวัติที่พวกเธอทำกันอยู่ในตอนนี้คือ 'การเปลี่ยนแปลง' ที่แท้จริงไม่ใช่หรือไง!"
10037100-23 = "สะ... สิ่งที่พวกเราจะทำไม่ใช่การปฏิวัติหรือการก่อกบฏ แต่เป็นการตักเตือน...!"
10037100-31 = "แต่ว่าสิ่งที่พวกคุณเลือกก็คือ 'วิธีที่สุดโต่ง' และ 'การเปลี่ยนแปลง' นะคะ ฉันพูดถูกใช่มั้ยล่ะคะ ชมรมการแสดงงิ้ว?"
10037100-36 = "พะ... พอได้ฟังแล้วก็...?!"
10037100-41 = "ประมุขของมังกรดำต้องปกป้องซานไห่จิง... ที่พูดมาอย่างนี้ก็ถูกค่ะ "
10037100-42 = "แต่ว่าถ้าเป็นอย่างนั้น หัวหน้าชมรมการแสดงงิ้วก็ควรจะต้องปกป้องชมรมการแสดงงิ้วไม่ใช่เหรอคะ?"
10037100-43 = "สิ่งที่คางุยะทำในตอนนี้เป็นการทำเพื่อปกป้องชมรมการแสดงงิ้วหรือเปล่าคะ? "
10037100-44 = "ถึงฉันจะเป็นคนนอก แต่ก็มีความสงสัยอยู่นะคะ"
10037100-46 = "เอะ... เอ๋...?!"
10037100-48 = "กับมังกรดำก็เหมือนกันค่ะ แน่นอนว่าการปกป้องซานไห่จิงก็เป็นเรื่องสำคัญ"
10037100-49 = "แต่ทุกคนล้วนเป็นสมาชิกของกลุ่มที่เรียกว่ามังกรดำที่สังกัดในซานไห่จิงไม่ใช่เหรอคะ?"
10037100-50 = "ถ้าอย่างนั้น การปกป้องหัวหน้ากลุ่มของพวกคุณคือหน้าที่จริงที่สำคัญยิ่งของพวกคุณไม่ใช่เหรอคะ?"
10037100-52 = "เอ๋? มะ... มันจะขนาดนั้นเลยเหรอ?"
10037100-53 = "มันก็ฟังดูสมเหตุสมผลอยู่หรอกนะ... แต่ทำไมโทโมเอะที่เป็นนักเรียนจากเรดวินเทอร์ถึงได้เข้าใจ#nสถานการณ์ของซานไห่จิงกับมังกรดำได้ดีขนาดนั้นล่ะ...?"
10037100-55 = "ก็อย่างที่ท่านเลขาธิการของพวกเราพูดไปก่อนหน้านี้ค่ะ"
10037100-56 = "ในเรดวินเทอร์น่ะ เรื่องแบบนี้ถือว่าเป็นเรื่องเล็กๆ น้อยๆ ที่เทียบได้กับแค่การทักทายในตอนเช้าค่ะ"
10037100-57 = "ความหนาวเย็นของเรดวินเทอร์เท่าเทียมกันในทุกคน..."
10037100-58 = "ความหนาวเย็นนั้นไม่ทำให้เราตัวเล็กลง แต่ทำให้เราแข็งแกร่งเช่นเดียวกับหมี!"
10037100-62 = "เอาละ หลบไปซะ! ท่านประธานเชริโน่ ฉันจะเปิดทางให้เองค่ะ เชื่อใจฉันเถอะค่ะ!"
10037100-63 = "อื้อ! น่าเชื่อถือจริงๆ หัวหน้าคณะฯ มารินะ! มาทำให้นักเรียนซานไห่จิงเห็นวิถีทางและแบบอย่างของ#nเรดวินเทอร์กันเถอะ!"
10037100-68 = "ค่ะ! ฉันจะไปเดี๋ยวนี้ค่ะ!"

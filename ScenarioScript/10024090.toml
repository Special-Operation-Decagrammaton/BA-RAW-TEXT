[translation]
10024090-1 = "Episode 9;Good Wins, Justice Prevails"
10024090-2 = "Genryumon"
10024090-4 = "..."
10024090-5 = "..."
10024090-10 = "...and that's what happened."
10024090-11 = "I hope you guys are giving the criminals we caught some of that Genryumon justice you love so much."
10024090-12 = "It's all over, then? We caught the real culprit."
10024090-13 = "And the Black Tortoise Promenade's name has been cleared..."
10024090-14 = "Is that really all you have to say? "
10024090-15 = "I knew they'd do this, but it's still disappointing..."
10024090-16 = "[s] \"Genryumon did make accusations against the Black Tortoise Promenade without real evidence, right?\""
10024090-17 = "Come on now. One person's wrongdoing doesn't make all of Genryumon guilty!"
10024090-18 = "Why should we have to be responsible for the mistakes one member made?"
10024090-19 = "If we did that, Genryumon wouldn't be able to get anything done!"
10024090-21 = "Goodness... They really don't get it."
10024090-22 = "This just confirms everything bad I ever thought about Genryumon...and it's making me sad."
10024090-28 = "Th-The president is coming!"
10024090-29 = "The president is coming!"
10024090-35 = "I thought I heard a ruckus out here."
10024090-40 = "M-Madam! These rabble-rousers are—!"
10024090-42 = "Enough. I already know everything."
10024090-43 = "Madam...!"
10024090-54 = "Madam?!"
10024090-55 = "She's...bowing...?"
10024090-56 = "Oh my..."
10024090-60 = "I hereby apologize on behalf of Genryumon."
10024090-61 = "For making baseless accusations against the Black Tortoise Promenade. For insulting the Promenade's honor."
10024090-62 = "And most of all, for disturbing the public order of Shanhaijing and for being careless in my leadership."
10024090-63 = "In the name of Genryumon, I promise to never allow this to happen again."
10024090-64 = "That is the will of Ryuuge Kisaki, President of Genryumon."
10024090-67 = "B-But... President..."
10024090-68 = "Stay where you are."
10024090-69 = "We were just..."
10024090-71 = "I said stay."
10024090-73 = "Y-Yes, President!"
10024090-79 = "That's good, right? Genryumon gave you an official apology!"
10024090-80 = "Um... Why are you looking at me like that? I apologized, too...!"
10024090-81 = "This is more than fair. Mistakes happen during an investigation. You can't apologize to every daisy you crush under your heel..."
10024090-87 = "...I don't get it, President!"
10024090-88 = "Well... I do. Somewhat."
10024090-89 = "You're really happy with how things turned out?"
10024090-90 = "Not really. But also, yes?"
10024090-91 = "Nobody says what they mean anymore!"
10024090-92 = "[s1] \"I think I get it, too...\"\n[s2] \"Not really, but yes. That's how I feel.\""
10024090-95 = "Well then! I'd say that's enough serious talk for one year. "
10024090-96 = "We've come to an understanding with Genryumon, and the Black Tortoise Promenade is free to open for business!"
10024090-97 = "After all, Genryumon only did what they had to as a student council."
10024090-98 = "Umm... Understood. I'll follow your lead, President."
10024090-99 = "That doesn't mean I'm satisfied, though!"
10024090-100 = "Yes, yes. I'll make you some tasty food if it will make you feel better. "
10024090-106 = "Don't be so hasty to leave. I would like to make you an offer."
10024090-107 = "[s] \"What did you have in mind?\""
10024090-108 = "This incident has put a cloud of gloom over Shanhaijing."
10024090-109 = "And Genryumon's got a responsibility to do something about it."
10024090-110 = "Therefore, I'd like to hire the Black Tortoise Promenade."
10024090-111 = "M-Madam President?"
10024090-112 = "Don't cause trouble, Mina. The Black Tortoise Promenade is also part of Shanhaijing."
10024090-113 = "That...is right. Yes, Madam President... "
10024090-114 = "So, what did you have in mind? I'm all ears."
10024090-115 = "Don't sound so eager. You don't know what I'm about to ask of you."
10024090-116 = "Anything is possible with the Black Tortoise Promenade! Except for the impossible."
10024090-117 = "Is that your guarantee?"
10024090-118 = "As long as the pay is good enough."
10024090-119 = "Very well. I want you to host a party. The biggest party you've ever had."
10024090-120 = "A party for every single student in Shanhaijing...and for Sensei."
10024090-121 = "[s] \"Oh, I'm invited?\""
10024090-123 = "You played a major role in resolving this issue, didn't you?"
10024090-124 = "I want you to see the welcoming side of Shanhaijing, too."
10024090-125 = "A party for everyone in Shanhaijing...and Sensei..."
10024090-127 = "Money is no object. Genryumon will pay for everything."
10024090-128 = "Or perhaps it is impossible, after all?"
10024090-129 = "Not at all. In fact, it sounds fun!"
10024090-130 = "It's been a while since I've had all Promenade members in the kitchen at once!"
10024090-132 = "So you can manage it?"
10024090-133 = "Of course! Every member of the Promenade was a chef before they were a merchant."

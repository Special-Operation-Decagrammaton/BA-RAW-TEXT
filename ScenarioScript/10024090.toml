[translation]
10024090-1 = "第9話;改邪歸正：回歸正途"
10024090-2 = "玄龍門．內部"
10024090-4 = "……"
10024090-5 = "……"
10024090-10 = "好啦，真相就跟我說的一樣。"
10024090-11 = "我可以相信參與走私的成員，已經由玄龍門給予嚴厲的處罰了吧。"
10024090-12 = "事，事情解決了？"
10024090-13 = "那真是件好事。#n這樣一來玄武商會的清白也能──"
10024090-14 = "你要說的就只有這些嗎？"
10024090-15 = "不得不對玄龍門感到失望啊。"
10024090-16 = "[s]「沒有確切證據就怪罪玄武商會的是……」"
10024090-17 = "……我該說的都說完了。#n把個人的問題丟給我們真是令人困擾啊。"
10024090-18 = "還是你們想說的是部分成員的行為是玄龍門全體的責任？"
10024090-19 = "照你這麼說的話，玄龍門將會癱瘓的。#n如此一來，會有麻煩的可就不只我們了哦？"
10024090-21 = "唉……看來無論說什麼都聽不進去呢。"
10024090-22 = "居然切割得這麼乾淨……真是令人啞口無言。"
10024090-28 = "門主大人駕～到～！！！"
10024090-29 = "駕～到～！"
10024090-35 = "──為何如此吵鬧。"
10024090-40 = "門，門主大人！#n是因為這些人……！"
10024090-42 = "無須多言，妾身全都清楚。"
10024090-43 = "門主大人……！"
10024090-54 = "門主大人！？#n請，請快別這麼做！！"
10024090-55 = "……低頭了？"
10024090-56 = "妃姬……"
10024090-60 = "玄龍門在此正式向玄武商會致歉。"
10024090-61 = "尚無明確證據便將玄武商會誣陷為犯人──使其名譽受損。"
10024090-62 = "不僅是對汝等，亦造成了山海經的混亂。#n此為妾身的管理不當。"
10024090-63 = "作為玄龍門的門主，妾身向汝等承諾此等情況不會再度發生。"
10024090-64 = "此即玄龍門門主，龍華妃姬的裁決。"
10024090-67 = "可，可是門主大人……"
10024090-68 = "退下。"
10024090-69 = "我們只不過是……"
10024090-71 = "──別讓妾身說第二次。"
10024090-73 = "失，失禮了！"
10024090-79 = "好，好了，這樣滿意了吧？#n玄龍門已經正式道歉了！"
10024090-80 = "那個眼神是什麼意思……#n我不是也道過歉了嗎！"
10024090-81 = "真是的，門主大人實在是過於善良了。#n不過就是搜查時發生了一點失誤，也不至於為此低頭……"
10024090-87 = "我還是無法接受，會長！"
10024090-88 = "這個嘛……妃姬的想法，我大致上也明白。"
10024090-89 = "瑠美會長，這樣真的好嗎？"
10024090-90 = "要說好還是不好似乎有點微妙……#n不過這樣事情就能告一段落了吧。"
10024090-91 = "明明要是稍有差錯，玄武商會可能會因此解散的……！"
10024090-92 = "[s1]「我好像也能理解……」\n[s2]「有時候就是會結束得不太痛快對吧。」"
10024090-95 = "好了，這個話題就到此為止吧。"
10024090-96 = "現在已經明白玄龍門的意思……#n對玄武商會來說，只要能讓客人們能夠安心上門就足夠了。"
10024090-97 = "即便身為門主，既然是學生會就會有無可奈何的苦衷吧。"
10024090-98 = "唔嗯……我知道了。#n今天就尊重會長的意思。"
10024090-99 = "但是，這不代表我對結果感到滿意！"
10024090-100 = "啊哈哈，謝謝你，令女。#n我會做點好吃的給你，就放過他們吧。"
10024090-106 = "既然事件已塵埃落定，妾身有一事想尋求汝和玄武商會的協助。"
10024090-107 = "[s] 「協助？」"
10024090-108 = "正是如此。#n聽聞此次事件的學生們似乎對此抱有不安。"
10024090-109 = "而拂去其不安，亦是玄龍門之重責。#n……汝等可否助妾身一臂之力？"
10024090-110 = "此乃玄龍門門主的──正式委託。"
10024090-111 = "門，門主大人！？"
10024090-112 = "別大聲嚷嚷，美奈。#n玄武商會亦是山海經。"
10024090-113 = "是……沒錯。#n我明白了，門主大人。"
10024090-114 = "所以說，委託是什麼呢？#n雖然不管是什麼我們都會接受就是了。"
10024090-115 = "誇下如此海口，可萬萬別後悔哦？"
10024090-116 = "玄武商會從來不會拒絕委託哦。#n除了物理上不可能的事情之外。"
10024090-117 = "所言是否為真？"
10024090-118 = "那當然，前提是報酬得夠。#n這就是玄武商會。"
10024090-119 = "甚好──那麼，可否委託汝等備宴？"
10024090-120 = "足以招待山海經所有學生……以及老師的盛宴。"
10024090-121 = "[s]「我？」"
10024090-123 = "當然。#n汝可是解決此次事件的功臣，何需多言。"
10024090-124 = "藉此盡情體會「山海經」的「招待」便是。"
10024090-125 = "山海經的大家和……老師……？"
10024090-127 = "費用無須擔心。#n玄龍門將全數負擔。"
10024090-128 = "還是說……妾身的請求不值得接受？"
10024090-129 = "怎麼會，那怎麼可能呢！#n啊哈哈，一定會很有趣吧。"
10024090-130 = "得久違地召集商會的大家才行！"
10024090-132 = "啊啊，若是人手不足，要使喚美奈他們倒也無妨？"
10024090-133 = "沒問題的，每個聚集在玄武商會的孩子們，可都是獨當一面的料理人哦！"

[translation]
10024090-1 = "ตอนที่ 9;ธรรมะย่อมชนะอธรรม"
10024090-2 = "ฝ่ายมังกรดำ"
10024090-4 = "..."
10024090-5 = "..."
10024090-10 = "เอาละ ในเมื่อมันเป็นแบบนั้นไปแล้ว"
10024090-11 = "ฉันเชื่อว่าพวกเขาจะลงโทษเบื้องบนที่เกี่ยวข้องตามกฎระเบียบของมังกรดำค่ะ"
10024090-12 = "งะ... งั้นก็แปลว่าจบแล้วน่ะสิ? ผู้ร้ายตัวจริงก็ถูกเปิดเผยแล้วว่าเป็นใคร"
10024090-13 = "แล้วก็มีการยืนยันแล้วด้วยว่าย่านการค้าเทพเต่าดำไม่เกี่ยวข้องกับเหตุการณ์ในครั้งนี้..."
10024090-14 = "มีเรื่องที่จะพูดแค่นี้ใช่มั้ย?"
10024090-15 = "ถ้าเป็นอย่างนั้น พวกเราก็คงต้องบอกว่ามันช่างน่าผิดหวังเสียจริงค่ะ"
10024090-16 = "[s] \"ฝ่ายที่ต้อนให้ย่านการค้าเทพเต่าดำจนมุมตั้งแต่แรกคือมังกรดำนะ...?\""
10024090-17 = "ฮึ่ย เรื่องนี้มันเป็นการประพฤติตนไม่ดีเฉพาะบุคคล มันไม่เกี่ยวกับทุกคนในมังกรดำนะ!"
10024090-18 = "จะให้คนทั้งองค์กรต้องมารับผิดชอบการกระทำทั้งหมดของคนคนเดียวหรือไง!"
10024090-19 = "ขืนทำแบบนั้นมีหวังธุรกิจทุกอย่างของมังกรดำคงได้หยุดชะงักเพราะเรื่องค่าใช้จ่ายแน่!"
10024090-21 = "เฮ้อ... แบบนี้คงคุยกันไม่รู้เรื่องแล้วละ"
10024090-22 = "วินาทีที่ได้เห็นความจริงว่าที่แท้แล้วมันคืออคติ... ฉันก็ได้แต่รู้สึกเศร้าใจค่ะ"
10024090-28 = "ทะ... ท่านประมุขมาแล้ว!"
10024090-29 = "ท่านประมุขมาแล้ว!"
10024090-35 = "เห็นเอะอะจนเราต้องออกมาดู สุดท้ายก็เป็นอย่างที่คิดสินะ"
10024090-40 = "ทะ... ท่านประมุข! พวกนั้นต่างหากที่เอะอะ...!"
10024090-42 = "พอได้แล้ว เรารู้เรื่องแล้ว"
10024090-43 = "ท่านประมุข...!"
10024090-54 = "ท่านประมุข?!"
10024090-55 = "ก้มหัว... ให้งั้นเหรอคะ?"
10024090-56 = "นี่เธอ..."
10024090-60 = "มังกรดำขอแสดงการขอโทษอย่างเป็นทางการ"
10024090-61 = "การกล่าวหาว่าย่านการค้าเทพเต่าดำเป็นคนร้ายโดยไร้หลักฐานที่แน่ชัด เป็นการทำลายชื่อเสียงของย่าน#nการค้าเทพเต่าดำ"
10024090-62 = "ทั้งยังกลายเป็นการก่อกวนความผาสุขของซานไห่จิงเสียเอง ไหนจะเป็นการละเลยต่อการดูแลองค์กรอีก"
10024090-63 = "คิซากิผู้นี้ ขอให้สัญญาด้วยเกียรติภูมิของมังกรดำว่าจะไม่เกิดเหตุการณ์เช่นนี้อีกเป็นครั้งที่สอง"
10024090-64 = "นี่คือเจตจำนงของเรา ริวเกะ คิซากิ ประมุขแห่งมังกรดำ"
10024090-67 = "ตะ... แต่ว่า ท่านประมุข..."
10024090-68 = "กลับไปกันได้แล้ว"
10024090-69 = "ยังไงซะพวกเรา..."
10024090-71 = "อย่าให้เราต้องพูดซ้ำ"
10024090-73 = "คะ... ได้ค่ะ!"
10024090-79 = "เอาละๆ จบเรื่องแล้วใช่ไหม? มังกรดำก็ขอโทษกับเรื่องที่เกิดขึ้นอย่างเป็นทางการแล้วด้วย!"
10024090-80 = "อะไรกัน สายตาแบบนั้น... ฉะ... ฉันก็ขอโทษไปแล้วไง...!"
10024090-81 = "ก็ท่านประมุขอ่อนโยนเกินไป ในระหว่างสืบสวนเลยอาจจะทำพลาดไปบ้าง พวกเธอจะหยิบยกมาทุก#nเรื่องเลยหรือไง..."
10024090-87 = "ว่าแล้วเชียวว่าคงจะไม่ได้เข้าใจกันจริงๆ ด้วยค่ะ ท่านประธาน!"
10024090-88 = "ก็นะ... ฉันก็พอจะรู้อยู่แล้วหรอกน่ะ"
10024090-89 = "ท่านประธานไม่เป็นอะไรกับเรื่องแบบนั้นเลยเหรอคะ?"
10024090-90 = "ถึงฉันจะไม่โอเค แต่ก็รู้สึกว่ามันก็ยังโอเคอยู่หรอกนะ"
10024090-91 = "พูดอะไรไม่รู้เรื่องอีกแล้ว...!"
10024090-92 = "[s1] \"ครูว่าครูเองก็เข้าใจดีเลยละ...\"\n[s2] \"อันนั้นไง ที่ว่าไม่โอเคแต่แสร้งว่าโอเค...\""
10024090-95 = "เอาละๆ พอเถอะ เลิกพูดเรื่องน่าเบื่อและมืดมนแบบนั้นได้แล้ว"
10024090-96 = "ฉันเข้าใจถึงเจตจำนงของมังกรดำแล้วละ ขอแค่ลูกค้ากลับมาอุดหนุนย่านการค้าเทพเต่าดำอีกครั้งก็พอ"
10024090-97 = "มังกรดำก็แค่ทำในสิ่งที่สภานักเรียนควรจะทำนั่นละ"
10024090-98 = "อืม... เข้าใจแล้วค่ะ ฉันจะทำตามเจตจำนงของท่านประธานก่อนแล้วกันค่ะ"
10024090-99 = "แต่ก็ไม่ใช่ว่าฉันจะพอใจกับผลการตัดสินนี้อยู่ดีนะคะ!"
10024090-100 = "โอเคๆ เดี๋ยวฉันจะทำของอร่อยๆ ให้กินนะ หายโกรธได้แล้วน่า"
10024090-106 = "เรื่องราวดูจะคลี่คลายลงแล้วนะ เราว่าจะเสนออะไรสักเรื่อง"
10024090-107 = "[s] \"เสนอเหรอ?\""
10024090-108 = "ใช่ เหตุการณ์ในครั้งนี้ทำให้สถานการณ์ของซานไห่จิงสงบลงได้"
10024090-109 = "งั้นก็จะให้มังกรดำรับหน้าที่ไปก็ไม่ถูก"
10024090-110 = "ด้วยเหตุนั้น เราจึงอยากมอบภารกิจให้ย่านการค้าเทพเต่าดำอย่างเป็นทางการ"
10024090-111 = "ทะ... ท่านประมุข?!"
10024090-112 = "หยุดก่อเรื่องได้แล้วมินะ ย่านการค้าเทพเต่าดำก็เป็นซานไห่จิงเหมือนกัน"
10024090-113 = "ก็... ใช่ค่ะ เข้าใจแล้วค่ะ ท่านประมุข"
10024090-114 = "แล้วภารกิจที่ว่าคืออะไรกันล่ะ? พวกเราทำได้ทุกอย่างแหละ"
10024090-115 = "ดูมั่นใจจังเลยนะ เรายังไม่ทันจะบอกรายละเอียดเลย"
10024090-116 = "ไม่มีภารกิจไหนที่ย่านการค้าเทพเต่าดำทำไม่ได้หรอก ไม่นับเรื่องที่เป็นไปไม่ได้น่ะนะ"
10024090-117 = "คำพูดนั่นน่ะ จะเชื่อถือได้หรือเปล่า?"
10024090-118 = "ก็ถ้ามีค่าตอบแทนที่สมน้ำสมเนื้อละก็นะ อย่าดูถูกย่านการค้าเทพเต่าดำกันนักสิ"
10024090-119 = "ดี ถ้าอย่างนั้นพวกเธอจงไปเตรียมงานเลี้ยงที่ใหญ่ที่สุดที่จะจัดขึ้นนับจากนี้"
10024090-120 = "งานเลี้ยงที่ทุกคนในซานไห่จิง แล้วก็... ครูก็เข้าร่วมได้"
10024090-121 = "[s] \"ครูเหรอ?\""
10024090-123 = "ใช่ ครูเองก็มีความดีความชอบในการคลี่คลายสถานการณ์ครั้งนี้ด้วยใช่ไหมเล่า"
10024090-124 = "ถือว่าใช้โอกาสนี้มาสัมผัสการต้อนรับของซานไห่จิงด้วยตัวเองก็ไม่เลวนะ"
10024090-125 = "งานเลี้ยงที่มีทุกคนในซานไห่จิงและคุณครูเข้าร่วมเหรอ...?"
10024090-127 = "ไม่ต้องกังวลเรื่องค่าใช้จ่าย มังกรดำจะรับผิดชอบให้ทั้งหมด"
10024090-128 = "อืม นี่เรามอบภารกิจที่เกินกำลังมากไปหรือเปล่า?"
10024090-129 = "เกินกำลังอะไรกัน น่าสนุกดีออกนะ"
10024090-130 = "ต้องให้ทุกคนในย่านการค้าเตรียมจัดงานแล้วละ!"
10024090-132 = "มีคนพอใช่ไหม?"
10024090-133 = "พออยู่แล้วละ ก่อนที่พวกเราจะมาเป็นคนค้าคนขาย ทุกคนต่างก็เคยเป็นเชฟกันมาก่อนทั้งนั้นเลยนะ"

1403-81 = "5;헬멧단 단원 B;01\n4;헬멧단 단원 A;01;후후. 그 때는 갑작스럽게 습격을 받는 바람에 속수무책으로 당하고 말았지만, 이번에는 만반의 준비를 갖추고 돌아왔지!"
1403-82 = "4;헬멧단 단원 A;01\n5;헬멧단 단원 B;01;헬멧은 물론이고 모든 보호 장비의 소재를 방탄 재질로 바꾸었지! 네 녀석이 들고 있는 나약한 기관단총의 권총탄으로는 우리를 절대로 쓰러트릴 수 없어!\n#5;em;[재잘]\n#5;hophop"
1403-83 = "5;헬멧단 단원 B;01\n4;헬멧단 단원 A;01;자. 각오해라, C&C의 부장! 이번에야 말로 지난번의 복수를 해주마!\n#4;em;[!]"

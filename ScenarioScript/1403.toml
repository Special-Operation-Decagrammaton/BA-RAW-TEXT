[translation]
1403-1 = "GUNS N' PEPPERS 3"
1403-2 = "ทางเดินในโรงเรียนมิลเลเนียม"
1403-8 = "...ดูเหมือนว่ารุ่นพี่จะยังไม่รู้ว่าปืนถูกดัดแปลงนะ"
1403-9 = "...แต่ห้ามวางใจนะ ถ้าเกิดรุ่นพี่เนรุแตะไกปืนเข้าเมื่อไหร่ ทุกอย่างก็จะถูกเปิดเผยทันทีเลย"
1403-10 = "เรื่องนั้นไม่ต้องห่วงค่ะ ถึงรุ่นพี่เนรุจะเป็นคนเลือดร้อน#nแต่ก็เป็นคนระมัดระวังเรื่องการทำให้นักเรียนคนอื่นๆ ในโรงเรียนตกใจนะคะ!"
1403-11 = "ถ้าไม่มีพวก \"วอนหาเรื่องเจ็บตัว\" โผล่มาล่ะก็รุ่นพี่เนรุคงจะไม่ใช้ปืนเร็วๆ นี้หรอกค่ะ"
1403-13 = "อ๊ะ เจอแล้ว! รุ่นพี่เนรุ!"
1403-14 = "อะไรน่ะ หนึ่งในฝาแฝดของชมรมพัฒนาเกมไม่ใช่เหรอ#nมีธุระอะไรกับฉันรึยังไง?"
1403-15 = "ใช่! ดูสิเครื่องเล่นเกมนี่มันพังหมดแล้ว!"
1403-16 = "คราวก่อนตอนที่รุ่นพี่เนรุรีบออกไปจับพวกแก๊งหมวกกันน็อกที่ซ่อนอยู่ในโรงเรียน#nระเบิดที่รุ่นพี่ขว้างไปมันบังเอิญมาถูกแผงหน้าปัดอันนี้จนพังเลยน่ะสิ! รุ่นพี่ต้องรับผิดชอบนะ!"
1403-17 = "...อ๊ะ? ล้อเล่นรึไง? ทำไมจู่ๆ ถึงมาบอกว่าฉันเป็นคนผิดล่ะ?"
1403-18 = "ถ้าตอนนั้นรุ่นพี่ไม่ยิงมั่วล่ะก็ เครื่องเล่นเกมก็คงไม่พังแบบนี้หรอก!#nเครื่องเล่นเกมนี่มันแพงมากเลยนะ... ชดใช้มาเลย! จ่ายค่าเสียหายมาเลย!"
1403-19 = "ยัยนี่... ถ้ายังไม่หยุดล่ะก็...!"
1403-20 = "เดี๋ยวก่อน...! ที่นี่ปล่อยให้พวกเราจัดการเองเถอะค่ะ!"
1403-22 = "หือ? ทำไมคนของชมรมวิศวกรรมถึงมาอยู่ที่นี่ล่ะ?"
1403-23 = "เดี๋ยวก่อน โมโมอิ ฉันขอดูสภาพเครื่องเกมนั่นหน่อยได้ไหม...?"
1403-25 = "งืม... ขั้วการเชื่อมต่อขาด แต่ไม่ได้เสียหายรุนแรงมาก แค่ใช้ชิ้นส่วนที่ชมรมเรามีอยู่มาซ่อม#nก็ซ่อมได้สบายๆ แล้วล่ะ!"
1403-26 = "จริงเหรอ? ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อย..."
1403-28 = "ฮึ่ม ฉันคงไม่ต้องลงมือแล้วสินะ? ถ้างั้นฉันไปก่อนล่ะ"
1403-30 = "ระ...รอเดี๋ยวก่อนค่ะ รุ่นพี่เนรุ!"
1403-31 = "เอาเครื่องเล่นเกมนี้ไปฝากไว้ที่ชมรมวิศวกรรมสิ เดี๋ยวพวกเราซ่อมให้เอง#nพอดีตอนนี้พวกเรายุ่งกันอยู่..."
1403-32 = "ฮิบิกิ! ดูเหมือนรุ่นพี่เนรุจะก่อเรื่องอีกแล้วล่ะ รีบตามไปก่อนที่จะเกิดเรื่องวุ่นวายกันเถอะ!"
1403-34 = "...เรื่องวุ่นวายเหรอ? ชมรมวิศวกรรมทำอะไรกันอยู่เนี่ย?"
1403-36 = "แต่ว่าหลังจากนั้นวิกฤตก็ยังคงดำเนินต่อไป..."
1403-39 = "หัวหน้า ฉันสงสัยมาตลอดเลยว่าเสื้อซูคาจันที่หัวหน้าใส่อยู่น่ะซื้อมาจากที่ไหน?#nร้านขายเสื้อผ้าเด็กรึเปล่า?"
1403-40 = "ว่าไงนะ พูดอะไรน่ะ! ฉันจะจัดการพวกเธอให้เรียบเลย!"
1403-42 = "เดี๋ยวค่ะ! รุ่นพี่เนรุอย่าเพิ่งโมโหสิคะ! รุ่นพี่อาสึนะไม่ได้หมายถึงเรื่องไม่ดีหรอกค่ะ"
1403-43 = "...ใช่แล้ว รุ่นพี่อาสึนะเองก็ขอโทษที่พูดจาไม่ดีกับรุ่นพี่เนรุแล้วล่ะ"
1403-44 = "เห๋? เสียงดังขนาดนั้นเลยเหรอ? "
1403-45 = "ถ้าเกิดทำให้รู้สึกไม่พอใจก็ขอโทษนะ#nว่าแต่... ฉันคิดว่าเสื้อซูคาจันตัวนั้นมันดูดีมากๆ เลย..."
1403-46 = "ชิส์... พวกเธอนี่มัน... เรื่องคราวนี้ฉันจะยอมให้เพราะเห็นแก่ชมรมวิศวกรรมก็แล้วกันนะ#nแต่ถ้าคราวหน้าก่อเรื่องแบบนี้อีก ฉันไม่ปล่อยพวกเธอไว้แน่!"
1403-50 = "เนรุ เธอใช้ปืนนั่นพังล็อกประตูออกได้ไหม? พอดีฉันลืมหยิบกุญแจออกมาด้วยน่ะ"
1403-51 = "ถ้าเรื่องนั้นล่ะก็ไม่ยากหรอก แค่เอาปืนไปวางไว้ตรงที่จับ..."
1403-53 = "ดะ... เดี๋ยวก่อน! ถ้าเป็นเรื่องสะเดาะกลอนประตูล่ะก็ ปล่อยให้เป็นหน้าที่พวกเราเองค่ะ!"
1403-54 = "ถ้าใช้เทคนิคของทางชมรมวิศวกรรมล่ะก็คงจะเปิดประตูได้โดยไม่ต้องทำให้ลูกบิดประตูพังหรอก..."
1403-57 = "ว้าว เธอใช้ลวดไขประตูออกได้เหมือนแบบที่เห็นในหนังด้วยแฮะ เจ๋งสุดๆ ไปเลย!"
1403-58 = "เรื่องพวกนี้น่ะ พวกเราถนัดค่ะ! ถ้าเจอประตูที่ล็อกอยู่ ไม่จำเป็นต้องใช้ปืนเลยค่ะ!"
1403-59 = "......"
1403-67 = "พวกเธอนี่... เป็นใครกันแน่?"
1403-68 = "คะ? พวกเราก็คือสมาชิกชมรมวิศวกรรมนี่คะ"
1403-69 = "ที่ถามเพราะไม่รู้จริงๆ งั้นเหรอ?"
1403-70 = "ที่ฉันถามก็คือทำไมพวกเธอถึงต้องคอยแอบตามแล้วก็จับตาดูฉันด้วยล่ะ!"
1403-71 = "กะ...การช่วยเหลือคนที่เดือดร้อนเป็นสิ่งที่นักเรียนควรทำอยู่แล้วค่ะ! ฮ่าฮ่าฮ่า!"
1403-72 = "อีกอย่างการใช้กำลังเป็นสิ่งที่ไม่ดี.... ถ้าเราใช้เทคโนโลยีป้องกันการใช้กำลังได้ล่ะ...#nน่าจะดีที่สุดรึเปล่า?"
1403-73 = "แค่ลางสังหรณ์น่ะ... แต่มันน่าสงสัยนะ"
1403-74 = "หรือว่าพวกเธอ... ทำอะไรแผลงๆ ไว้กับปืนฉันหรือไงกัน?"
1403-76 = "อยู่นี่เองสินะ มิคาโมะ เนรุ!"
1403-79 = "ตั้งแต่ถูกเล่นงานคราวที่แล้ว ฉันก็ตามหาพวกเธอมาตลอด!"
1403-80 = "เอ๋? เจ้าพวกนี้... ทำไมจู่ๆ ก็โผล่ออกมาไม่มีปี่มีขลุ่ยกันเลยล่ะ?"
1403-81 = "หึหึ ตอนนั้น จู่ๆ ฉันก็ถูกบุกจู่โจมโดยไม่ได้ทันตั้งตัวเลยทำอะไรไม่ถูก#nแต่วันนี้ฉันเตรียมทุกอย่างมาพร้อมแล้ว!"
1403-82 = "เราเปลี่ยนวัสดุที่ใช้ทำหมวกกันน็อกแล้วก็อุปกรณ์ป้องกันทั้งหมดเป็นแบบกันกระสุน#nหมดแล้วไงล่ะ! ทีนี้กระสุนปืน SMG ก็ทำอะไรพวกเราไม่ได้แล้ว!"
1403-83 = "เอาล่ะ เตรียมตัวให้ดีเถอะ หัวหน้ากลุ่ม C&C! พวกเราจะต้องสะสางหนี้เก่าให้ได้เลย!"
1403-84 = "ฮ่า! ดูเหมือนจะตื่นเต้นกันใหญ่เลยนะ"
1403-85 = "ดีล่ะ มีเท่าไหร่ก็เข้ามาเลย"
1403-86 = "ดะ...เดี๋ยวก่อนสิ รุ่นพี่เนรุ! ปืนอันนั้นยังไม่ได้ปรับ...!!"
1403-87 = "ปังๆๆๆๆ!"
1403-88 = "ฮะฮ่าฮ่า! เห็นพลังของหมวกกันน็อกกันกระสุนรุ่นใหม่รึยัง...ล่ะ  หือ? "
1403-90 = "ว้ากกกกกก!"
1403-91 = "นี่มันอะไรกัน? มีกลิ่นหอมๆ หวานอมเปรี้ยวมาจากกระสุนด้วย... ซอสชาบัสโก้เหรอ?"
1403-92 = "อึ่ก... อ๊ากกก! ซอสที่ไหลเข้ามาในหมวกกันน็อกเข้าตากับจมูก...#nแค่กๆ แค่กๆ แค่กๆ! หายใจไม่ออก! ช่วยฉันด้วย!"
1403-93 = "แค่กๆ แค่กๆ....! พวกเด็กร้ายกาจ! ใช้ระเบิดเคมีด้วยงั้นเหรอ#nสมกับเป็นหัวหน้ากลุ่ม C&C จอมโหดจริงๆ! แค่กๆ!"
1403-94 = "เปล่านะ... คือฉัน..."
1403-95 = "ครั้งนี้พวกเราจะยอมถอยไปก่อน คราวหน้าเจอดีกันแน่! แค่กๆ แค่กๆ!"
1403-99 = "เฮ้อ เกือบเป็นเรื่องแล้วสิ#nตำนาน \"เนรุผู้ไร้พ่าย\" เกือบต้องหายไปเพราะเจ้าพวกแก๊งหมวกกันน็อกแล้วเชียว"
1403-100 = "ดีแล้วล่ะที่ตัดสินใจติดตั้งอุปกรณ์ยิงซอสชาบัสโก้เอาไว้น่ะ#nน่ายินดีจริงๆ"
1403-101 = "อ่า..."
1403-102 = "เกิดเรื่องอะไรกันแน่ ช่วยอธิบายมาหน่อยได้ไหม สมาชิกชมรมวิศวกรรม...?"
1403-103 = "อื้ม... จะเรียกว่าเป็นสิ่งประดิษฐ์ที่บังเอิญคิดค้นขึ้นมาได้ก็ได้นะ...#nหมายถึง... มันน่าจะดูมีประโยชน์มากกว่าปืนที่ฉีดซอสชาบัสโก้ได้น่ะ..."
1403-104 = "โชคดีที่มันพอจะใช้ประโยชน์ได้นะ ว่าไหม...?"
1403-105 = "...มีเรื่องจะสั่งเสียแค่นี้ใช่ไหม"
1403-106 = "ปังๆๆๆๆๆ!"
1403-107 = "อึ่ก! รุ่นพี่! เลิกคิดเรื่องจะฉีดซอสชาบัสโก้ใส่ผู้คนซะทีเถอะค่ะ!"
1403-108 = "แค่กๆ แค่กๆ! ถ้าเกิดเข้าตาล่ะก็คงเป็นเรื่องใหญ่แน่ๆ มันอันตรายจริงๆ นะคะ!"
1403-109 = "พวกเธอก่อเรื่องขึ้นเองไม่ใช่รึไงหา!!"
1403-110 = "ปังๆๆๆๆๆ!"
1403-112 = "GUNS N' PEPPERS "

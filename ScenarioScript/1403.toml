[translation]
1403-1 = "GUNS N' PEPPERS（３）"
1403-2 = "千年．走廊"
1403-8 = "……看來似乎還沒注意到呢。"
1403-9 = "……不過不可以大意。#n萬一寧瑠扣下扳機的話，一切就結束了。"
1403-10 = "我想應該不用擔心。雖然寧瑠前輩確實缺乏耐性，#n不過也正因如此，千年的學生們平常就會避免刺激到前輩！"
1403-11 = "我想只要沒有「刻意去挑釁的笨蛋」出現，寧瑠前輩也不會那麼輕易地觸碰扳機。"
1403-13 = "啊，找到了！寧瑠前輩！"
1403-14 = "啊？什麼，這不是遊戲開發部的雙胞胎之一嗎。#n找我有什麼事？"
1403-15 = "你看這個！"
1403-16 = "之前寧瑠前輩為了鎮壓潛入校內的頭盔團而暴走的時候，#n飛來的流彈擊中了遊戲機導致裡面的主板壞掉了！所以要負責！"
1403-17 = "……啊啊？你在開玩笑嗎？為什麼那是我的錯啊？"
1403-18 = "要不是那時候前輩拿槍亂掃，遊戲機也不會壞掉呀！#n這台遊戲機可是很貴的，所以要賠償！賠償～～！！"
1403-19 = "你這傢伙……給我適可而止哦……！"
1403-20 = "先～～等一下！這件事請交給我們吧！"
1403-22 = "嗯？為什麼工程師部會在這裡？"
1403-23 = "等一下桃井，那個遊戲機的狀態可以讓我看看嗎……？"
1403-25 = "呼呣呼呣，只是連接端子折到的輕微故障呢。#n如果是這種程度的故障，只要我們工程師部持有的零件就能簡單修好唷！"
1403-26 = "真的嗎！？那也不是不行……"
1403-28 = "哼，那已經沒事要找我了吧？拜啦。"
1403-30 = "啊，請，請等一下寧瑠前輩！"
1403-31 = "這個等我們回去之後馬上幫你修，可以請你先拿到工程師部去嗎？#n現在有點急事……"
1403-32 = "響，趕快追上去吧！趁寧瑠前輩又被捲入其他麻煩之前！"
1403-34 = "……其他的麻煩？#n工程師部在做什麼呢？"
1403-36 = "（然而在那之後，危機依舊持續……）"
1403-39 = "呐部長。我一直很在意呢～部長穿的那個小小的絲卡將是在哪裡有賣啊？童裝店？"
1403-40 = "你這傢伙……很敢說嘛！我揍飛你哦！"
1403-42 = "請等一下！寧瑠前輩，冷靜！#n我想明日奈前輩也不是出於惡意才這麼說的！"
1403-43 = "……就是說呀。#n我認為明日奈前輩也該道歉比較好。"
1403-44 = "嗯～？剛才說的有那麼打擊到部長嗎？"
1403-45 = "抱歉讓你不高興了～我只是覺得那件絲卡將很帥，在想哪裡有賣而已～"
1403-46 = "呿……你就是那種傢伙啊。看在工程師部的面子上，這次就原諒你。#n不過下次再說童裝還是什麼的，到時候就給我記住哦！"
1403-50 = "啊，寧瑠～這扇門的鎖，可以用槍幫我破壞掉嗎？#n我不小心就被反鎖在門外了。"
1403-51 = "啊啊，那種小事不算什麼。打飛就好了吧？那就盛大的──"
1403-53 = "請，請等一下！要開門的話請交給我們吧！"
1403-54 = "只要運用工程師部的技術，就算不破壞門把也能輕易打開……"
1403-57 = "哇啊，竟然只用鐵絲就把門鎖打開了，簡直像電影一樣！好厲害！"
1403-58 = "這是我們的專業領域！就算門打不開也不必用到槍！沒錯！"
1403-59 = "……"
1403-67 = "你們……到底是？"
1403-68 = "什，什麼？我，我們是工程師部啊！？"
1403-69 = "那種事我當然知道！"
1403-70 = "我想問的是為什麼要一直纏著我，還有為什麼每件事都要插手啦！"
1403-71 = "因，因為幫助有困難的人，是學生應有的品德！啊，啊哈哈哈！"
1403-72 = "而且暴力是不好的……如果能靠技術解決的話，不是很好嗎？"
1403-73 = "嘛那也是有道理……不過總覺得很可疑啊。"
1403-74 = "你們該不會，對我的槍做了什麼惡作劇吧……？"
1403-76 = "你在這裡啊，美甘寧瑠！"
1403-79 = "即使上次被打敗了，我們還是一直在找你！"
1403-80 = "啊啊？是你們啊……又不長記性的跑出來。"
1403-81 = "哼哼。雖然那時候因為突然的襲擊而被壓著打，但這次可是做好了萬全的準備啊！"
1403-82 = "頭盔自不用說，全部的裝備都換成了可以防住砲彈的防彈性素材了！#n憑你那把弱不禁風的衝鋒槍，已經沒辦法打倒我們了！"
1403-83 = "好了，做好覺悟吧C&C的隊長！我們要報上次的仇！"
1403-84 = "哈，看來有點氣勢啊。"
1403-85 = "好啊，我就來當你們的對手！"
1403-86 = "請，請等一下寧瑠前輩！那把槍現在──！"
1403-87 = "（噠噠噠噠噠噠！）"
1403-88 = "哼哈哈！讓你見識見識新防彈頭盔的……嗯？"
1403-90 = "什，咕啊啊啊！"
1403-91 = "這，這是什麼？刺鼻的味道……查巴斯科辣椒醬嗎！？"
1403-92 = "唔！從縫隙跑進來，眼睛和鼻子都……#n咳咳，咳咳！沒，沒辦法呼吸！救命啊！"
1403-93 = "咳咳，唔噎……！這個，卑鄙的傢伙！#n都已經有炸藥了還不滿意，竟然連特殊彈都拿出來用，#n果然是沒血沒淚的C&C隊長嗎！咳咳！"
1403-94 = "……啊？不……我什麼都……"
1403-95 = "這次先撤退！給我記住！咳咳，咳咳！！！"
1403-99 = "……哎，哎呀～真是好險呢。#n差點因為拿出防彈素材的頭盔團，導致寧瑠前輩的不敗神話被打破了呢。"
1403-100 = "……事先改造成可以噴射出查巴斯科辣椒醬真是太好了。#n可喜可賀，可喜可賀。"
1403-101 = "……喂。"
1403-102 = "這到底是怎麼回事，可以解釋一下嗎？工程師部？"
1403-103 = "那個，就是啊……該說是實驗過程中偶然的產物嗎……#n想說如果可以從槍噴射出查巴斯科辣椒醬的話可能會派上用場……"
1403-104 = "……實際上也派上用場了，不是很好嗎？"
1403-105 = "……遺言就只有這些嗎。"
1403-106 = "（噠噠噠噠噠！）"
1403-107 = "唔，唔哇啊！前輩！不可以把查巴斯科辣椒醬對著人噴射啦！"
1403-108 = "咳咳！咳咳！跑進眼睛會很危險的……！#n真的很危險！！"
1403-109 = "不就是你們，自己做的嗎啊啊啊啊啊！！"
1403-110 = "（噠噠噠噠噠噠噠！）"
1403-112 = "GUNS N' PEPPERS"

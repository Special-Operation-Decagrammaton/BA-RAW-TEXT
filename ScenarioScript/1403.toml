[translation]
1403-1 = "Guns N' Peppers Part 3"
1403-2 = "Millennium School Hallway"
1403-8 = "I don't think she's noticed anything off about her gun yet."
1403-9 = "It's too soon to relax. We're busted the second she pulls the trigger."
1403-10 = "Don't worry. Neru may be hot-tempered, but that also means that all of Millennium goes out of its way not to provoke her."
1403-11 = "Neru won't be in any hurry to pull the trigger unless there's, \"someone stupid enough to pick a fight,\" as she puts it."
1403-13 = "Oh, there you are, Neru!"
1403-14 = "Huh? You're one of the twins from the Game Development Department. What do you want with me?"
1403-15 = "Well, just take a look at this broken console!"
1403-16 = "The last time that Helmet Gang was causing trouble on campus, you went berserk trying to catch them and hit the console with a stray bullet. You're responsible for this!"
1403-17 = "Are you kidding me? How is that my fault?"
1403-18 = "The console would have been fine if you hadn't been firing at random! Do you have any idea how expensive this thing is? You should be the one paying for it!"
1403-19 = "Why, you little...! You'd better back off!"
1403-20 = "Wait! Let us take care of this!"
1403-22 = "Huh? What's the Engineering Department doing here?"
1403-23 = "Wait, Momoi. Can I take a look at that console for a moment?"
1403-25 = "Hmm. What we have here is a minor malfunction caused by a broken access terminal. Fixing it with the parts we have on hand will be no sweat!"
1403-26 = "Really? That's a relief..."
1403-28 = "Hmph. Are we done? I'm outta here."
1403-30 = "W-Wait a moment, Neru!"
1403-31 = "We'll fix your console if you leave it in our workshop. We're a little busy right now..."
1403-32 = "Hibiki, let's follow Neru before anyone else picks a fight!"
1403-34 = "Fight? Just what is the Engineering Department up to?"
1403-36 = "But after that, there were only more fires to put out..."
1403-39 = "Say, President. I've always wondered where you got that tiny sukajan you wear. From the children's clothing department?"
1403-40 = "The hell did you just say? I'll kill you!"
1403-42 = "Wait, Neru! Please don't be mad! I'm sure Asuna didn't mean any offense by it!"
1403-43 = "...Right. Still, don't you think you should apologize to Neru, Asuna?"
1403-44 = "Hmm. Was that really offensive?"
1403-45 = "Sorry if I hit a sore spot. I just thought your sukajan was cool..."
1403-46 = "Hmph. You're unbelievable. Thank the Engineering Department that I'll let it slide, but I'll kill you if you mention the children's clothing department again!"
1403-50 = "Neru, could you shoot the lock off of this door with your gun? I forgot the keys."
1403-51 = "That's easy. Put the barrel to the handle, and..."
1403-53 = "W-Wait! If you just need the door unlocked, then leave it to us!"
1403-54 = "Opening that door without destroying the handle will be easy for us."
1403-57 = "Wow. You picked the lock with just some wire like they do in the movies. That's amazing!"
1403-58 = "We're experts on this kind of thing! There's no reason to use a gun to open a locked door!"
1403-59 = "..."
1403-67 = "What the hell...are you all up to?"
1403-68 = "Wh-What do you mean? W-We're the Engineering Department!"
1403-69 = "You think I don't know that?!"
1403-70 = "I want to know why you guys keep following me around and butting into my business!"
1403-71 = "W-We just like to help students in need! H-Haha!"
1403-72 = "And we're...staunch advocates for peace! If our technology can be used to prevent violence, why wouldn't we help?"
1403-73 = "I guess you have a point, but still...something's fishy here."
1403-74 = "You didn't do something to my gun, did you?"
1403-76 = "There you are, Mikamo Neru!"
1403-79 = "We've been looking for you since you attacked us!"
1403-80 = "Huh? What do you bastards want? You got a lotta nerve showing your faces around here!"
1403-81 = "Haha. You may have caught us off guard before, but this time, we came prepared!"
1403-82 = "All of our gear is now bulletproof, including our helmets! Your little peashooter gun will never take us down!"
1403-83 = "So, get ready, Little Miss C&C President! It's time for our revenge!"
1403-84 = "Ha. You guys are pretty serious about this."
1403-85 = "All right. Have it your way!"
1403-86 = "W-Wait, Neru! We turned your gun into...!"
1403-87 = "*pop* *pop* *squirt*!"
1403-88 = "Hahaha! Behold the power of the new bulletproof helmets... Huh?"
1403-90 = "Aaarrrgh!"
1403-91 = "Wh-What is this? Why do the bullets smell spicy and tangy...?#nIs this hot sauce?"
1403-92 = "It's seeping through the gaps of the helmet and getting into my eyes and nose!#n*cough* *cough* I can't breathe! Someone help me!"
1403-93 = "*cough* *cough* Y-You little she-devil! I didn't think you'd stoop to chemical warfare. C&C has no mercy! *cough*"
1403-94 = "I mean...I..."
1403-95 = "Retreat! We'll get you next time! *cough* *cough*\n"
1403-99 = "Wow, that was close. I thought Neru was going to have her undefeated record snapped by the Helmet Gang's bulletproof gear."
1403-100 = "Good thing we installed the hot sauce dispenser. Let's celebrate!"
1403-101 = "...Hey."
1403-102 = "Anyone wanna fill me in on how this happened...?"
1403-103 = "We sorta...ran a little experiment and this happened. We thought having a gun that could shoot hot sauce would come in handy."
1403-104 = "And wouldn't you know it? Aren't you glad?"
1403-105 = "...Any other last words?"
1403-106 = "*pop* *pop* *squirt*!"
1403-107 = "A-Argh! No, not the hot sauce!"
1403-108 = "*cough* *cough* Don't let it get in your eyes... It's really bad for them!"
1403-109 = "You have no one to blame but yourselves!"
1403-110 = "*pop* *pop* *squirt*!"
1403-112 = "Guns N' Peppers"

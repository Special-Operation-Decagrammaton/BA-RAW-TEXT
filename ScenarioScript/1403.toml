1403-39 = "5;아스나;02;부장. 늘 궁금했었는데 부장이 입는 그 조그마한 스카잔은 도대체 어디서 구하는 거야? 아동복 매장?\n#5;em;[?]"
1403-40 = "1;네루;09;뭐, 말 다했냐! 죽여버린다!\n#1;em;[빠직]\n#1;m2\n#1;hophop"
1403-41 = "#all;hide"
1403-42 = "1;코토리;04;잠깐! 네루 선배, 화내지 마세요! 아스나 선배도 나쁜 뜻으로 한 말이 아닐 테니까!\n#1;ar\n#1;em;[반응]\n#1;hophop"
1403-43 = "5;히비키;02;……맞아. 그리고 아스나 선배도 심한 말을 한 것에 대해 네루 선배에게 사과해.\n#5;al\n#5;em;[!]"
1403-44 = "#1;hide\n#5;hide\n3;아스나;02;헤에. 이게 그렇게 심한 소리였어?\n#3;em;[땀]"
1403-45 = "1;네루;08\n3;아스나;03;기분을 상하게 했다면 미안해. 그저 나는 그 스카잔이 멋지다고만 생각해서…….\n#3;m5\n#1;ar"
1403-46 = "1;네루;10;쳇…… 하여간 너란 녀석은. 이번만큼은 엔지니어부의 얼굴을 봐서 넘어가주지. #n하지만 다음번에도 아동복 운운하면 죽여버릴 줄 알아!\n#1;hophop\n#1;em;[!]"

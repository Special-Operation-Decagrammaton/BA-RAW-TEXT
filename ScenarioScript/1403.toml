1403-25 = "3;모모이;04\n#1;m1\n#5;m5\n1;코토리;02;음, 음. 접속 단자가 부러지면서 생긴 가벼운 고장이네요. 이 정도 고장은 저희 엔지니어부에서 가지고 있는 부품으로도 쉽게 고칠 수 있어요!\n#1;em;[음표]"
1403-26 = "3;모모이;02;정말? 그렇다면 다행이지만……."
1403-27 = "#all;hide"
1403-28 = "3;네루;01;흥. 그럼 내게 볼 일은 없는 거지? 나는 먼저 간다."
1403-29 = "3;네루;01\n#3;dr\n#wait;2500"
1403-30 = "3;모모이;01\n5;히비키;01\n1;코토리;04;자, 잠깐 기다려주세요. 네루 선배!\n#1;h\n#3;h\n#5;h\n#1;hophop\n#1;em;[!]"
1403-31 = "3;모모이;01\n5;히비키;05;이 게임기는 엔지니어부 부실에 맡겨 두면 나중에 고쳐 줄게. 지금은 바쁜 일이 있어서…….\n#5;greeting"
1403-32 = "3;모모이;01\n1;코토리;05;히비키, 네루 선배가 다른 트러블에 휘말리기 전에 어서 따라가죠!\n#1;em;[반응]"

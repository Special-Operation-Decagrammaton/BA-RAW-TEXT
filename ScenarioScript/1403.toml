1403-8 = "5;코토리;05;……아직까지는 총의 이변을 알아차리지 못한 것 같네요.\n#5;em;…"
1403-9 = "1;히비키;05;……하지만 방심은 금물. 만에 하나라도 네루 선배가 방아쇠를 당기는 순간 모든 게 들통나고 말 거야.\n#1;em;[반응]"
1403-10 = "5;코토리;02;그건 걱정 마세요. 네루 선배는 다혈질이기는 하지만, 그만큼 밀레니엄의 모두가 그녀를 자극하지 않기 위해 조심하고 있으니까요!\n#5;greeting"
1403-11 = "5;코토리;03;\"대놓고 시비를 걸만큼 어지간히 멍청한 녀석\"이 나타나지 않는 이상, 네루 선배도 섣불리 방아쇠에 손을 대지는 않을 거예요.\n#5;m3\n#1;dl\n#5;em;[반짝]"
1403-12 = "#1;hide\n#5;hide\n3;네루;01"
1403-13 = "5;모모이;05;아앗, 찾았다! 네루 선배!\n#5;al\n#5;em;[반응]\n#5;hophop\n#3;m1"
1403-14 = "5;모모이;05\n3;네루;05;뭐야, 게임개발부의 쌍둥이 중 하나잖아. #n내게 무슨 볼일이라도 있는 거냐?\n#3;em;[?]"
1403-15 = "5;모모이;05;그래, 이 망가진 콘솔 게임기 좀 보라고!"
1403-16 = "5;모모이;05;저번에 네루 선배가 교내에 숨어든 헬멧단을 잡는다고 날뛰었을 때, 날아든 유탄에 맞아 기판이 망가졌단 말이야! 선배가 책임져!\n#5;em;[빠직]\n#5;hophop"
1403-17 = "3;네루;02;……아앙? 장난 하냐? 그게 어째서 나 때문인데?"
1403-18 = "5;모모이;05;그 때 선배가 총을 난사하지 않았더라면 게임기가 망가질 일도 없었잖아! #n이게 얼마나 비싼 물건인데…… 물어내! 물어내라고!\n#5;m4\n#5;hophop\n#5;em;[빠직]"
1403-19 = "5;모모이;05\n3;네루;05;이 자식…… 적당히 하지 않으면……!\n#3;m2\n#3;em;…"

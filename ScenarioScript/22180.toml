[translation]
22180-1 = "Episode 18; An Insurmountable Wall"
22180-13 = "...!"
22180-14 = "Slow, slow, slow..."
22180-23 = "Too slow, underclassman!"
22180-32 = "(I should be much faster than her, especially since I'm the one with the weapon.)"
22180-39 = "(The data on her should have been accurate. On top of that, I followed Rio's commands and changed the terrain of the battlefield.)"
22180-40 = "(But I still can't defeat her... Could the data be incorrect?)"
22180-41 = "(No, it's not that!)"
22180-49 = "You're...improving in real time. What are you?!"
22180-50 = "(If I give her too much leeway to move around... It won't be good for me!)"
22180-56 = "Ugh...!"
22180-57 = "Who could snipe me from such a long distance...?!"
22180-59 = "This is call sign Zero-Two."
22180-60 = "I'll support you from the rear."
22180-61 = "Whoa! I was lost for a second! I didn't expect us to find her so fast!"
22180-62 = "It's your inexplicable luck, Asuna. This doesn't usually happen to me."
22180-64 = "How did you get through the Fortress City's maze so easily?!"
22180-65 = "The probability should've been near zero!"
22180-66 = "Ha! You were so proud of yourself for separating us."
22180-67 = "Is that all you've got?"
22180-68 = "..."
22180-72 = "Toki, retreat for now."
22180-73 = "...!"
22180-74 = "Rio, I..."
22180-75 = "I'm not blaming you. We lost control of the Avant Guard because of interference from Veritas."
22180-76 = "It was a failure due to my inability to predict the outcome... We need to reorganize."
22180-77 = "...Yes, ma'am."
22180-78 = "Retreating from combat."
22180-79 = "What?! Hey! Where are you going?!"
22180-88 = "Hey! Come back here! You jerk...!"
22180-90 = "Oh, what?! Did Toki just leave?"
22180-91 = "...We lost her, unfortunately."
22180-92 = "Argh, dammit! We needed to finish it here!"
22180-94 = "It's beyond our control, President. We didn't expect this battle to play out the way it did."
22180-95 = "The situation's changed."
22180-96 = "Let's abandon diversionary tactics...and join Sensei for now."
22180-97 = "What's most important is saving Aris."
22180-98 = "Right, President?"
22180-99 = "Ugh."
22180-100 = "*sigh* Okay, fine."
22180-101 = "Then let's get going."
22180-104 = "[ns] \"Chihiro, where are we going next?!\""
22180-105 = "Turn right and go straight! Then the destination will be right there!"
22180-106 = "All right! Let's go!"
22180-107 = "We're here...!"
22180-118 = "[ns] \"This is the central tower of the Fortress City of Eridu...\""
22180-119 = "Aris is here..."
22180-120 = "Let's go!"
22180-121 = "We're taking Aris back!"
22180-123 = "Huh?"
22180-125 = "Oh! Master, everyone! Hi!"
22180-126 = "You were already here."
22180-132 = "It's C&C!"
22180-133 = "[s] \"Neru and everyone's here... Where's Toki, then?\""
22180-134 = "...Ugh!"
22180-135 = "Hahaha! About that..."
22180-136 = "*sigh*"
22180-137 = "We lost her."
22180-138 = "We were so close! I would've beaten the crap out of her!"
22180-140 = "Akane quickly explained the details about what happened."
22180-142 = "[ns] \"So that was why the entire city was shaking.\""
22180-143 = "They caught us off guard... So the diversionary tactics were meaningless."
22180-144 = "[s] \"Who would have thought the city could move...?\""
22180-145 = "It looks like something major happened on your side too, Sensei."
22180-146 = "Yeah, and where is the Engineering Department?"
22180-147 = "Hmm... Something major..."
22180-148 = "You could call it that, I guess."
22180-149 = "[s] \"The Avant Guard was quite something...\""
22180-155 = "[ns] \"Chihiro, is Aris really in this tower?\""
22180-156 = "...Rio is aiming to destroy Aris' halo."
22180-157 = "To do something like that, she'll need a pretty well-equipped facility."
22180-158 = "In Eridu, all the city's power is concentrated in the tower in front of us."
22180-159 = "Considering the reasoning and the president's motivation to build this kind of facility... It's the only place they could be."
22180-160 = "So... Aris really is in there..."
22180-161 = "What're we waiting for?! We just have to climb this massive tower, right?!"
22180-162 = "[s] \"Yeah, that's right. Shall we go, then?\""
22180-163 = "But since this is the city's core, it goes without saying..."
22180-171 = "...there will be gatekeepers guarding this place."
22180-175 = "I've been waiting for you, upperclassmen, Sensei."
22180-176 = "[s] \"Of course Toki is the gatekeeper...\""
22180-177 = "Oh! We meet again! Haha! Hi, Toki!"
22180-178 = "Hah! You ran away like a coward last time. You're back?!"
22180-179 = "What are you thinking?"
22180-180 = "It means you're not the only ones who've had a change of plans."
22180-181 = "...Rio."
22180-182 = "Plans and calculations must be prepared with the data you have. Strategies are prepared in anticipation of the future."
22180-183 = "I never thought you'd reach this point by escaping, destroying, and jumping over the defenses of the Fortress City I prepared."
22180-184 = "The variables and errors in my calculations for this to happen must have been caused by..."
22180-185 = "You. Sensei."
22180-186 = "[s] \"...Rio.\""
22180-187 = "All right, then. Since you're using rather exceptional power, we'll have to do the same."
22180-188 = "Toki, as of now, you have a permission to use Abi-Eshuh."
22180-189 = "Rio, that's..."
22180-190 = "Yes. It was originally prepared to fight against the princess of the Nameless Gods...but there's no choice."
22180-191 = "If we can't stop them here, everything will be meaningless."
22180-196 = "...Yes, ma'am."
22180-197 = "I will now operate the powered suit system, Abi-Eshuh."
22180-198 = "[s] \"Abi...Eshuh?"
22180-211 = "Wh-What was that...?"
22180-213 = "...! Above you!"
22180-217 = "Signal confirmed."
22180-234 = "Wh-Whoa?! What is this?!"
22180-249 = "\"Powered suit system, [wa:1000]Abi-Eshuh, [wa:1500] activated.\""
22180-254 = "\"Commencing [wa:1500]battle.\""
22180-258 = "[ns] \"It's... She's... It's coming!\""

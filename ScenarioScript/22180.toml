[translation]
22180-1 = "ตอนที่ 18;กำแพงที่ข้ามไปไม่ได้"
22180-13 = "......!"
22180-14 = "ช้า ช้า ช้า..."
22180-23 = "ช้าเป็นเต่าเลย! รุ่นน้อง!"
22180-32 = "(ฝ่ายเราที่ <ติดอาวุธ> อยู่ เป็นต่อกว่าในเรื่องความเร็ว)"
22180-39 = "(ข้อมูลไม่น่าผิดพลาด แถมเรายังเปลี่ยนภูมิประเทศของสนามรบตามคำสั่งของท่านริโอะแล้วด้วยอีก)"
22180-40 = "(แต่หากยังไม่รู้ผลแพ้ชนะอยู่อย่างนี้ละก็... แปลว่าข้อมูลผิดพลาดเหรอ?)"
22180-41 = "(ไม่สิ ไม่ใช่อย่างนั้น...)"
22180-49 = "(ยิ่งเข้าไปใกล้ ข้อมูลก็ยิ่ง... อัปเดตใหม่อยู่เรื่อย...?)!"
22180-50 = "(และถ้าเว้นระยะห่างก็จะ... อันตราย...!)"
22180-56 = "อึก...!!"
22180-57 = "ถ้าเป็นการลอบยิงจากระยะไกลขนาดนี้..."
22180-59 = "ทางนี้รหัสซีโร่ทู"
22180-60 = "...ฉันจะระวังหลังให้รุ่นพี่เอง"
22180-61 = "อะไรเนี่ย! นึกว่าหลงทางไปแล้วซะอีก แต่ทำไมถึงกลับมาได้เฉยเลยนะ?"
22180-62 = "น่าจะเป็นเพราะความโชคดีของรุ่นพี่อาสึนะน่ะค่ะ... เรื่องแบบนี้ไม่ได้เกิดขึ้นง่ายๆ หรอกนะคะ"
22180-64 = "ทำไมถึง... ผ่านเขาวงกตของเมืองแห่งปราการได้ง่ายๆ เลย...?!"
22180-65 = "จากความน่าจะเป็นแล้ว นั่นไม่มีทางเกิดขึ้นได้ง่ายๆ...!"
22180-66 = "เฮอะ! ทำเป็นว่าจะกักกันอะไรใหญ่โต เพ้อเจ้อชะมัด!"
22180-67 = "สุดท้ายก็ทำได้แค่พูดเองเรอะ?"
22180-68 = "......"
22180-72 = "โทคิ ถอยออกมาจากที่นั่นก่อน"
22180-73 = "......!"
22180-74 = "ท่านริโอะ... ฉัน..."
22180-75 = "ฉันไม่ได้จะโทษเธอหรอก อำนาจควบคุมหุ่นรบล้ำยุคถูกแย่งไปจากการแทรกแซงของเวอริทัสแล้ว"
22180-76 = "ความล้มเหลวนี้มาจากการคาดการณ์ที่ไม่สมบูรณ์แบบของฉันเอง... เราต้องถอนกำลังออกมาแก้ไข#nสถานการณ์กันก่อน"
22180-77 = "ค่ะ... มาดาม"
22180-78 = "รับทราบค่ะ ฉันจะออกไปจากที่นี่ค่ะ"
22180-79 = "ว่าไงนะ?!  นี่! จะหนีไปไหน?"
22180-88 = "ยัยนี่! ยัยเด็กนี่! ไม่กลับมาเหรอ?! หนอย...!!"
22180-90 = "อ๊ะ อะไรเนี่ย! โทคิจัง ไปซะแล้วเหรอ?"
22180-91 = "พลาดไปอย่างน่าเสียดายเลย..."
22180-92 = "ฮึ่ม! โธ่เว้ย! ตั้งใจจะปิดบัญชีตรงนี้เลยแท้ๆ!"
22180-94 = "ช่วยไม่ได้นะคะหัวหน้า ก็นี่เป็นการปะทะที่ไม่คาดคิด..."
22180-95 = "สถานการณ์มันก็เลยเปลี่ยนไปน่ะค่ะ"
22180-96 = "เรายุติปฏิบัติการหลอกลวงศัตรู... แล้วกลับไปรวมตัวกับคุณครูกันก่อนเถอะค่ะ"
22180-97 = "ตอนนี้สิ่งที่สำคัญที่สุดคือการช่วยเหลืออาริสึจังนะคะ"
22180-98 = "ใช่รึเปล่าล่ะคะ หัวหน้า?"
22180-99 = "อึก..."
22180-100 = "เฮ้อ... ก็ได้ รู้แล้วน่า!"
22180-101 = "งั้นก็ไปกันเลย"
22180-104 = "[ns] \"จิฮิโระ! ต่อไปให้ไปทางไหนเหรอ?!\""
22180-105 = "เลี้ยวขวาแล้วตรงไป! แล้วจะเจอจุดหมายอยู่ที่นั่น!"
22180-106 = "ฮึบ! ไปกันเลย!"
22180-107 = "ที่นี่แหละ...!"
22180-118 = "[ns] \"ที่นี่คือหอคอยกลางของเมืองแห่งปราการ <เอริดู>...\""
22180-119 = "อาริสึจัง... อยู่ที่นี่..."
22180-120 = "ไปกันเถอะ!"
22180-121 = "อื้ม!"
22180-123 = "หืม?"
22180-125 = "อ๊ะ! นายท่านกับทุกคน! ว่าไงๆ!"
22180-126 = "ทุกคนมาถึงกันก่อนแล้วสินะคะ"
22180-132 = "รุ่นพี่!"
22180-133 = "[s] \"ถ้าเนรุกับทุกคนอยู่พร้อมหน้ากันที่นี่... แล้วโทคิล่ะ?\""
22180-134 = "อึก...!!"
22180-135 = "แหะๆๆ~ นั่นน่ะสิ~"
22180-136 = "เฮ้อ..."
22180-137 = "น่าเสียดายที่ทางนั้นก็หนีไปได้ค่ะ"
22180-138 = "ถ้าเข้าไปใกล้กว่านั้นอีกหน่อยก็รวบยัยนั่นได้แล้วแท้ๆ เชียว!"
22180-140 = "(ต่อมาคุณครูก็ได้ฟังเรื่องราวการต่อสู้ตั้งแต่ต้นจนจบจากอาคาเนะ)"
22180-142 = "[ns] \"ที่ทั้งเมืองสั่นสะเทือนก็เพราะเรื่องนี้สินะ\""
22180-143 = "เราโดนเล่นงานแบบไม่ทันได้ตั้งตัวน่ะค่ะ... ปฏิบัติการหลอกลวงศัตรูก็เลยไม่มีความหมายอะไรเลย"
22180-144 = "[s] \"แต่เมืองทั้งเมืองมันขยับได้เลยนะ เกินจากที่จินตนาการไว้เลย...\""
22180-145 = "เหมือนว่าทางฝั่งคุณครูก็มีเรื่องใหญ่อะไรเกิดขึ้นด้วยนะ"
22180-146 = "อืม นั่นสิ แล้วชมรมวิศวกรรมล่ะอยู่ไหน?"
22180-147 = "อืม~ จะเรียกว่าเป็นเรื่องใหญ่ได้ไหมนะ..."
22180-148 = "จริงๆ ก็เป็นเรื่องใหญ่เลยแหละ แต่ได้ชมรมวิศวกรรมช่วยไว้..."
22180-149 = "[s] \"ไม่ธรรมดาเลยละ เจ้าพวกหุ่นรบล้ำยุคนั่น...\""
22180-155 = "[ns] \"เรื่องนั้นจะยังไงก็เถอะ แล้วอาริสึอยู่ในหอคอยนี้จริงๆ เหรอจิฮิโระ?\""
22180-156 = "...ประธานเคยพูดไว้ว่าจะทำลายฮาโลของอาริสึ"
22180-157 = "ถ้าจะทำเรื่องพรรค์นั้น ก็ต้องมีสิ่งปลูกสร้างที่อำนวยความสะดวกช่วย"
22180-158 = "และศูนย์รวมกำลังทั้งหมดของเมืองเอริดูแห่งนี้ก็อยู่ในหอคอยที่อยู่ตรงหน้านั้น"
22180-159 = "ถ้าเรามองย้อนกลับไปถึงแรงจูงใจของประธานและสาเหตุในการสร้างหอคอยแบบนี้แล้ว... ก็มีเพียงคำตอบเดียว"
22180-160 = "นั่นคือ... เพื่อทำร้ายอาริสึ... ที่นั่น"
22180-161 = "สรุปก็คือ งานที่เหลือตอนนี้ก็คือการปีนหอคอยมโหฬารนี้ใช่ไหม?"
22180-162 = "[s] \"อืม ใช่แล้ว งั้นก็ไปกันเลย\""
22180-163 = "แต่ว่าในเมื่อมันเป็นสถานที่สำคัญ มันก็ชัดเจนอยู่แล้วว่า..."
22180-171 = "...ที่นั่นจะต้องมีคนเฝ้าทางเข้าเอาไว้ยังไงล่ะ"
22180-175 = "กำลังรออยู่เลยค่ะรุ่นพี่ แล้วก็คุณครูด้วย"
22180-176 = "[s] \"โทคิคือคนเฝ้าทางเข้าเองเหรอเนี่ย...\""
22180-177 = "อ๊ะ! ได้เจอกันอีกแล้วน้า~ อ่ะฮะฮะ~ สวัสดีจ้ะ! โทคิจัง~"
22180-178 = "หา? อะไรเนี่ย ที่หนีหางจุกตูดมาเมื่อกี้ ก็เพื่อมาเฝ้าทางเข้าเนี่ยน่ะเหรอ?"
22180-179 = "คิดอะไรของเธออยู่กันแน่?"
22180-180 = "ไม่ใช่แค่พวกเธอหรอกนะที่เปลี่ยนกลยุทธ์ที่เตรียมการมาล่วงหน้า"
22180-181 = "ริโอะ..."
22180-182 = "แผนที่วางไว้ล่วงหน้า ความเป็นไปได้ที่คำนวณไว้ก่อน และกลอุบายที่เตรียมไว้อย่างดิบดี"
22180-183 = "ไม่คิดเลยนะว่าพวกเธอจะทั้งหลีกเลี่ยง ทำลาย และผ่านพ้นการป้องกันของเมืองแห่งปราการที่ฉัน#nเตรียมไว้ได้"
22180-184 = "สิ่งที่เดินเครื่องเป็นตัวแปร ทำให้การคำนวณผิดพลาดและเป็นต้นเหตุที่ทำให้เรื่องทั้งหมดนี้เป็นไปได้..."
22180-185 = "ก็คือพลังของคนอย่างคุณสินะ... ครูของชาเล่ต์?"
22180-186 = "[s] \"......ริโอะ\""
22180-187 = "ถ้างั้นก็ดีเลย ถ้าใช้พลังที่อยู่นอกเหนือหลักเกณฑ์ ทางฝั่งนี้ก็จะสนองด้วยสิ่งที่อยู่นอกหลักเกณฑ์#nเหมือนกัน"
22180-188 = "โทคิ ฉันจะอนุญาตให้ใช้ [ruby=Abi-Eshuh]<อาบี เอชูห์>[/ruby] ได้ตั้งแต่บัดนี้"
22180-189 = "ท่านริโอะ... แต่นั่นมัน"
22180-190 = "ใช่ เดิมทีฉันเตรียมมันมาเพื่อเผชิญหน้ากับ <ธิดาแห่งทวยเทพไร้นาม>... แต่ก็คงช่วยไม่ได้"
22180-191 = "ถ้าเราขวางคนพวกนี้เอาไว้ไม่ได้ สมมติฐานทั้งหมดก็จะไร้ความหมาย"
22180-196 = "...ค่ะ มาดาม"
22180-197 = "จะเปิดใช้ระบบพาวเวอร์ สูท <อาบี เอชูห์> เดี๋ยวนี้ค่ะ"
22180-198 = "[s] \"อาบี... เอชูห์?\""
22180-211 = "เสียงนี้มัน..."
22180-213 = "......! มาจากบนฟ้า!"
22180-217 = "ตรวจสอบสัญญาณการเรียกตัว"
22180-234 = "วะ... ว้ายยย!!!  นะ... นี่มันอะไรเนี่ย?!"
22180-249 = "\"ระบบพาวเวอร์ สูท [wa:1000]<อาบี เอชูห์> [wa:1500]ทำงาน\""
22180-254 = "\"เริ่ม[wa:1500]การต่อสู้\""
22180-258 = "[ns] \".... เข้ามาแล้ว!\""

[translation]
22180-1 = "第18話;無法跨越的壁壘"
22180-13 = "……！"
22180-14 = "太慢了，太慢了，太慢了……"
22180-23 = "太慢了啊，學妹！"
22180-32 = "（速度明顯是使用「武裝」的我比較快……但是）"
22180-39 = "（數據應該沒有錯才對──#n　明明已經依照莉央大人的命令變更了戰場的地形）"
22180-40 = "（卻還是沒能分出勝負……難道是，數據錯了嗎？）"
22180-41 = "（不對，這不是那種次元的問題……）"
22180-49 = "每當她進入射程，數據就……#n隨時在更新……！？"
22180-50 = "（被拉近距離的話……危險……！）"
22180-56 = "唔……！！"
22180-57 = "那種超長距離的……狙擊……難道……！"
22180-59 = "這裡是代號Zero Two。"
22180-60 = "……前輩的背後就交給我吧。"
22180-61 = "咦？還以為我們迷路了呢……意外的沒有嗎？"
22180-62 = "那是因為明日奈前輩很幸運啊……一般來說是走不出來的。"
22180-64 = "要塞都市的迷宮……這麼輕易就……！？"
22180-65 = "那種事，在機率上是不可能……"
22180-66 = "哈！還自以為是地說什麼隔離之類的大話。"
22180-67 = "結果只有嘴上功夫嗎？啊？"
22180-68 = "……"
22180-72 = "季，暫時撤退吧。"
22180-73 = "……！"
22180-74 = "莉央大人，我……"
22180-75 = "我沒有要責怪妳的意思。#n因為貝里塔斯的干涉，前衛君的控制權被搶走了。"
22180-76 = "這都是我的預測不足造成的失敗……#n現在先撤退，重新審視狀況吧。"
22180-77 = "……是的，主人。"
22180-78 = "──這就離開現場。"
22180-79 = "啊！？開什麼玩笑啊！"
22180-88 = "喂！不准逃！！"
22180-90 = "咦，什麼什麼？季醬走掉了嗎？"
22180-91 = "……看來被她逃掉了呢。"
22180-92 = "啊啊！該死！#n本來想在這裡解決她的！"
22180-94 = "這也沒辦法啊，部長。畢竟是意料之外的交戰……"
22180-95 = "看來整體的戰況改變了呢。"
22180-96 = "聲東擊西作戰暫且中斷……先去和老師會合吧。"
22180-97 = "因為這個作戰，是為了要把愛麗絲醬救出來的作戰啊。"
22180-98 = "對吧，部長？"
22180-99 = "唔……"
22180-100 = "……啊，知道了，知道了啦。"
22180-101 = "好，出發吧。"
22180-104 = "[ns]「呃，這裡轉彎之後……接下來該往哪裡？」"
22180-105 = "往右轉之後直走！那裡就是目的地。"
22180-106 = "好，出發吧～！"
22180-107 = "愛麗絲就在這裡……！"
22180-118 = "[ns]「這裡就是要塞都市『埃里都』的中央塔……」"
22180-119 = "愛麗絲醬……就在這裡……"
22180-120 = "……走吧！"
22180-121 = "嗯！"
22180-123 = "咦？"
22180-125 = "啊！是主人跟大家～！#n呀齁呀齁！"
22180-126 = "大家也抵達了呢。"
22180-132 = "前輩！"
22180-133 = "[s]「寧瑠妳們在這裡就表示……季呢？」"
22180-134 = "……唔！！"
22180-135 = "啊哈哈，那個嘛～"
22180-136 = "……唉。"
22180-137 = "雖然遺憾，但被她給逃走了。"
22180-138 = "明明差一點就可以揍扁她了！"
22180-140 = "（之後，從朱音口中聽了與季戰鬥的所有過程）"
22180-142 = "[ns]「剛才的地震是因為那個啊……」"
22180-143 = "是的……因此聲東擊西的意義就不復存在了。"
22180-144 = "[s]「地形會變化這種事，一般來說是想像不到的，這也沒辦法……」"
22180-145 = "老師那邊看起來也發生了什麼事呢……"
22180-146 = "啊，就是說呀。跟你們在一起的工程師部呢？"
22180-147 = "唔嗯～該說發生了什麼事嗎……"
22180-148 = "雖然要說嚴重確實是很嚴重，那個……"
22180-149 = "[s]「真強啊，前衛君……」"
22180-155 = "[ns]「千尋，愛麗絲就在這座塔裡嗎？」"
22180-156 = "那個……會長說過了吧？#n要破壞愛麗絲的光環。"
22180-157 = "為此，就必須要有相應的設施才行。"
22180-158 = "而這埃里都，是將所有的電力都集中在這座塔上的構造。"
22180-159 = "擁有如此規模的設施，被會長親手製造出來的理由……考慮到會長的動機……#n答案就只有一個吧。"
22180-160 = "愛麗絲……真的在那裡……"
22180-161 = "也就是說，接下來只要爬上這座大的誇張的塔就好了對吧？"
22180-162 = "[s]「看來是呢，只要登上這座塔就好……」"
22180-163 = "不過，遺憾的是──"
22180-171 = "那個會長，不可能沒有準備守門人呢。"
22180-175 = "恭候多時了，前輩們，老師。"
22180-176 = "[s]「果然，季是這裡的守門人啊……」"
22180-177 = "啊！又見面了呢～！季醬呀齁！"
22180-178 = "啊？什麼嘛，明明剛剛才夾著尾巴逃走……"
22180-179 = "竟然還有臉出現在我們面前啊？"
22180-180 = "你們以為變更作戰的只有你們嗎？"
22180-181 = "……莉央。"
22180-182 = "我已經預料到你們會過來，所以準備了數個計畫──"
22180-183 = "沒想到，你們居然能破壞所有防衛系統，成功抵達這裡……"
22180-184 = "發揮身為變數的能力，讓我的計算失控的，這一切──"
22180-185 = "夏萊的老師，這都是因為跟你扯上關係了嗎？"
22180-186 = "[s]「…………莉央。」"
22180-187 = "那樣也無所謂。#n既然你展現了規格外的力量，我們也使用相應的王牌就好了。"
22180-188 = "季。從此刻起允許妳使用「Abi-Eshuh」。"
22180-189 = "……莉央大人，那個是……"
22180-190 = "沒錯，本來是用來與「無名諸神的王女」戰鬥的……這也沒辦法。"
22180-191 = "現在無法阻止這些孩子們的話，一切都將功虧一簣。"
22180-196 = "……是的，主人。"
22180-197 = "切換為動力裝甲系統「Abi-Eshuh」。"
22180-198 = "[s]「Abi……Eshuh？」"
22180-211 = "這個聲音是……"
22180-213 = "……！#n上面！"
22180-217 = "確認呼叫信號。"
22180-234 = "哇，哇啊！？那是什麼！？"
22180-249 = "動力裝甲系統[wa:1000]「Abi-Eshuh」[wa:1500]啟動"
22180-254 = "開始，[wa:1500]戰鬥。"
22180-258 = "[ns]「……來了！」"

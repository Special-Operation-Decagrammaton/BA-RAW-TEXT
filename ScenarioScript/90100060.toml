90100060-42 = "3;유키노;02;그럼 지금까지 모은 데이터와 탐문 조사 결과를 바탕으로 사건을 정리하지.\n#3;a\n#3;em;[반응]"
90100060-43 = "3;유키노;01;우선 현재까지 시로우나기 역 일대에서 정신을 잃고 발견된 피해자는 총 10명.\n#3;greeting"
90100060-44 = "3;유키노;01;피해자의 연령은 15세부터 30세까지 다양하였으며, 대부분이 현재까지 의식을 회복하지 못하고 뇌전증 환자와 같은 경련 증상을 보이고 있다."
90100060-45 = "#all;hide"
90100060-46 = "#na;유키노;피해자가 발견된 때는 구름 없이 직사광선이 강한 날이었으며, 발견 시각도 1000시에서 1500시 사이로 하루 중 기온이 가장 높은 시기였지."
90100060-47 = "#na;유키노;때문에 초기 수사에서는 높은 기온으로 인한 탈진을 의심하였지만, 피해자들의 체온과 체성분에는 문제가 없었고……"
90100060-48 = "#na;유키노;사건이 일어나기 전, 다수의 피해자가 '흰색 허수아비'를 목격했다는 공통점이 있다."
90100060-49 = "5;쿠루미;01\n1;오토기;01\n3;니코;05\n#1;h\n#3;h\n#5;h\n#1;a\n#3;a\n#5;a"
90100060-50 = "5;쿠루미;02;그 흰색 허수아비는 도대체 뭐지? 범인의 인상착의와 관련이 있는 건가?\n#5;em;[?]"
90100060-51 = "1;오토기;01\n5;쿠루미;02\n3;니코;10;하지만 피해자를 제외한 다른 사람들은 그 허수아비를 보지 못했다는 것도 신경 쓰이고……"
90100060-52 = "1;오토기;05;사실 나는 이 사건이 특정인에 의한 범죄인지 조차도 의심스러워. 외상을 입히지 않고 다수의 사람을 기절시키는 게 가능하기나 한가?"
90100060-53 = "3;유키노;02;그 말처럼 범인을 평범한 시민만으로 한정 지을 수는 없다.\n#1;hide\n#5;hide\n#3;em;[반응]"
90100060-54 = "3;유키노;99;사실 총학생회장께서는 이 사건이 도시 괴담, 즉 로어에 의해 발생한 이상현상일지도 모른다고 말씀하셨지만……"

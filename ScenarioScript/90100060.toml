90100060-82 = "3;유키노;02;혹시 작년 여름에 있었던 <유령 소동>, 기억해?"
90100060-83 = "3;쿠루미;02;부동산 업자가 땅 값을 낮추려고 홀로그램 장치로 가짜 유령을 만들어 낸 사건 말이야?"

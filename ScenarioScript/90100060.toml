90100060-12 = "1;오토기;03\n5;쿠루미;01\n4;니코;03\n2;유키노;01;아닙니다. 선생님께서도 참관하시느라 수고 많으셨습니다.\n#1;dl\n#2;m3\n#4;dr\n#5;dr"
90100060-13 = "2;유키노;02;작전도 끝나고 모두 복귀했으니 바로 이어서 취득한 데이터의 정리를……"
90100060-14 = "5;쿠루미;04;잠깐, 잠깐, 잠깐.\n#2;m2\n#5;al\n#5;hophop"
90100060-15 = "5;쿠루미;06;배부른 불평이라는 건 알지만, 그 전에 잠깐 휴식 시간을 가질 수는 없을까?"
90100060-16 = "5;쿠루미;12;하루 종일 뙤약볕에 있느라 땀투성이가 되었는데, 샤워만이라도 하고 싶어……\n#5;stiff\n#5;em;[속상함]"
90100060-17 = "[s] \"아, 그건……\""
90100060-18 = "3;니코;12;미안하지만 휴게실을 이용하려면 좀 더 기다리는 게 좋을 것 같은데.\n#2;hide\n#5;hide"
90100060-19 = "3;니코;09;아직 샬레의 당번 학생들이 돌아가지 않았거든."
90100060-20 = "3;쿠루미;06;학생들이 지나다니는 휴게실 근처에 가는 건 피해야 겠지만, 외부의 샤워실을 사용하는 건 괜찮지 않아?"
90100060-21 = "2;오토기;09\n3;쿠루미;06\n#na;오토기;아니…… 샤워실도 방심할 수는 없어. 그곳에도 학생들이 가끔 들락거리니까.\n#2;a\n#2;h\n#3;m4\n#2;em;…"
90100060-22 = "2;오토기;08;며칠 전에도 저녁 트레이닝 후에 샤워실에 올라갔다가 츠키유키 소대장과 마주칠 뻔 한 적이 있었지."
90100060-23 = "2;오토기;08\n3;쿠루미;09;미야코 쨩이?! 어째서?!\n#3;em;[?!]\n#3;shake"
90100060-24 = "2;오토기;09;그 이유는 알 수 없지만…… 즉시 뒤돌아 도망치지 않았더라면, 분명 FOX 소대가 샬레의 지하실에 잠입해 있다는 사실을 후배들에게 들키고 말았을 거야."
90100060-25 = "2;오토기;09\n3;쿠루미;05;선생님, 이게 어떻게 된 일이야? RABBIT 소대 애들이 어째서 샬레의 샤워실을 사용하고 있는 건데?\n#3;hophop\n#2;dl\n#3;m3\n#3;em;[스팀]"
90100060-26 = "3;쿠루미;10;설마 그 아이들의 약점을 잡았다는 핑계로 엉큼한 짓을—\n#3;stiff"
90100060-27 = "[s3] \"오, 오해야!\"\n[s4] \"그, 그건 그러니까—\""
90100060-28 = "#wait;100"
90100060-29 = "#wait;100"
90100060-30 = "3;유키노;02;RABBIT 소대가 현재 주둔하고 있는 코우사기 공원은 생활 인프라가 부족하니, 선생님께서 편의 시설을 임대해 주신 모양이군.\n#3;em;[반응]"
90100060-31 = "3;쿠루미;06;그, 그런가……?\n#3;stiff"
90100060-32 = "3;유키노;03;청결한 상태를 유지하는 것은 소대의 전투력과도 직결되니, 츠키유키 소대장의 입장에서도 합리적인 판단이라 사료된다."
90100060-33 = "3;니코;99;너무 걱정하지 마, 쿠루미 쨩."
90100060-34 = "3;니코;01;쿠루미 쨩도 이미 알고 있겠지만 미야코 쨩도 누군가의 협박이나 유혹에 쉽게 굴하는 무른 아이가 아니잖아."
90100060-35 = "3;쿠루미;06;그건…… 그렇네. 내가 너무 걱정을 했나 봐."
90100060-36 = "3;쿠루미;12;미안, 선생님. 방금 한 말은 잊어줘.\n#3;em;[속상함]"
90100060-37 = "1;오토기;13;그나저나 너는 무슨 상상을 했기에 엉큼하다는 표현이 튀어나온 거야?\n#1;ar"
90100060-38 = "3;쿠루미;01;……시끄러워."
90100060-39 = "1;오토기;14;역시 FOX 소대의 포인트맨 답군. 언제나 온갖 '가능성'을 언제나 염두에 두고—\n#1;em;[음표]"

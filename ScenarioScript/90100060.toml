90100060-89 = "[s] \"무슨 좋은 생각이라도 있는 거야?\""
90100060-90 = "3;유키노;02;우선은 피해자들이 목격했다는 '하얀 허수아비'가 나타나는 조건을 파악해야 할 것 같습니다.\n#3;em;[반응]"
90100060-91 = "3;유키노;01;'하얀 허수아비'가 이번 사건을 일으킨 원인인지는 알 수 없지만, 사건과 관계가 있다는 것만큼은 분명하니까요."

[translation]
90100060-1 = "第6話;真実と嘘"
90100060-2 = "FOX小隊HQ"
90100060-6 = "ただいま～"
90100060-7 = "作戦で使った機材は元の場所に戻しておいたよ。"
90100060-8 = "FOX小隊、復帰しました。"
90100060-9 = "[s1] \"みんな、お疲れさま！\"\n[s2] \"ずっと暑い中で大変だったでしょ？\""
90100060-12 = "問題ありません。先生もご同行お疲れ様でした。"
90100060-13 = "作戦が終了し全員帰還しましたので、このままデータの整理を――"
90100060-14 = "ちょ、ちょっと待って！"
90100060-15 = "贅沢だって分かってるけどさ、その前に休憩挟めないかしら？"
90100060-16 = "せめてシャワーくらい浴びたくて……。"
90100060-17 = "[s] \"あっ、それは……。\""
90100060-18 = "休憩室を使うならもう少し待ったほうがいいかも。"
90100060-19 = "当番で来てる生徒がまだ帰ってないんだ。"
90100060-20 = "休憩室の近くは避けるとして、外のシャワー室なら平気じゃない？"
90100060-21 = "いや……そっちも油断できない。生徒がたまに出入りするから。"
90100060-22 = "この前、夜トレの後にシャワー室に行ったら、[ruby=つきゆき]月雪[/ruby]小隊長と鉢合わせしそうになったよ。"
90100060-23 = "え、どうして！？"
90100060-24 = "理由は分かんないけど……すぐ引き返してなかったら、#n私たちがシャーレの地下にいるってバレてたと思う。"
90100060-25 = "先生、どういうこと？#nなんでRABBIT小隊の子がシャワー室を使ってるの？"
90100060-26 = "まさか……弱みを握ってオシオキを――"
90100060-27 = "[s3] \"ち、違う違う！\"\n[s4] \"そ、それはっ……！\""
90100060-30 = "RABBIT小隊の駐屯地である子ウサギ公園はインフラが不足している。#n先生は好意で施設を貸してくださっているのだろう。"
90100060-31 = "そ、そうなの……？"
90100060-32 = "衛生問題は小隊の戦闘力に直結する。小隊長としても合理的な判断だ。"
90100060-33 = "少し、心配し過ぎかもしれないね。"
90100060-34 = "ミヤコちゃんは脅しや誘惑に負けるような子じゃないよ。#nクルミちゃんも分かってるでしょ？"
90100060-35 = "それは……そうだね。私の考えすぎか。"
90100060-36 = "ごめん、先生。今のは忘れて。"
90100060-37 = "でもさ、何を想像したら「オシオキ」なんて単語が飛び出すの？"
90100060-38 = "……うるさい。"
90100060-39 = "さすがFOX小隊のポイントマン。#n常にあらゆる「可能性」を想定し――"
90100060-40 = "うるさいってば！"
90100060-42 = "では、収集したデータと聞き込みの結果をもとに、事件を整理する。"
90100060-43 = "まず、これまでシロウナギ駅周辺で発見された被害者は計10名。"
90100060-44 = "年齢は様々で、ほとんどは未だに意識を回復しておらず、てんかんのような痙攣症状を示している。"
90100060-46 = "被害者が発見されたのは、雲ひとつない日差しの強い日に集中している。#n発見時刻は1000から1500の間。つまり1日のうちで最も気温が高い時間帯だ。"
90100060-47 = "そのため初動では熱中症や脱水症状が疑われたが、被害者の体温や体成分に異常は認められなかった。"
90100060-48 = "事件の直前には被害者の多くが「白いかかし」を目撃したという共通点がある。"
90100060-50 = "結局、その白いかかしって何？犯人の特徴と関係あるの？"
90100060-51 = "逆に被害者以外はかかしを見てないのも気になるよね……。"
90100060-52 = "そもそも私は、これが特定個人の犯行かどうかすら怪しいと思うんだよねぇ。#n外傷も与えずに気絶させるなんてできると思う？それもこんなにたくさん。"
90100060-53 = "ああ。犯人を市民に限定することはできない。"
90100060-54 = "連邦生徒会長は、これが都市伝説――すなわちロアによる特異現象かもしれないと言っていたが……。"
90100060-58 = "それ、本気なの……？じゃあ相手は怪談とか幽霊ってこと？"
90100060-59 = "正体不明の怪物ならまだしも、見えない幻と戦うのは無理だって。"
90100060-60 = "幽霊が驚かした話はあっても、物理的に被害を出した話なんて聞いたことないし。"
90100060-64 = "[ns5] \"うーん……。\"\n[ns6] \"まったくないって言い切るのは難しいかも……。\""
90100060-67 = "え……先生、なんでそんな顔してんの？"
90100060-68 = "まさか、幽霊と戦ったことあるとか！？"
90100060-69 = "うぇっ、本当に……？"
90100060-70 = "みんな落ち着いて。まだ事件の原因がロアだって確定したわけじゃないよ。"
90100060-71 = "それに私たちはキヴォトスの安全のために最速で投入される[ruby=SRT]特殊部隊[/ruby]。#n相手が何であれ、引けないよ。"
90100060-72 = "そもそも、これを解決できなきゃ矯正局に逆戻りだし。"
90100060-73 = "でも私たちって特殊部隊であって、巫女でも[ruby=エクソシスト]祓魔師[/ruby]でもないんだけど……。"
90100060-78 = "たとえ理解の及ばない不可解な現象だとしても、結果があるなら原因もある。"
90100060-82 = "去年の夏にあった「幽霊騒動」を覚えているか？"
90100060-83 = "あったわね。ホログラム装置で偽物の幽霊を作ってた事件でしょ？#n不動産屋が地価を下げようとしてたんだっけ。"
90100060-84 = "幽霊には銃も爆弾も効かなかったが、幽霊騒動を仕掛けた不動産屋は現実の存在だった。"
90100060-85 = "問題という結果を解決できないなら、原因を見つけて潰せばいい。"
90100060-86 = "ってことは……噂を広めてるやつらを片っ端から逮捕しようって話？"
90100060-87 = "バカ言わないでよ。そんなの現実的じゃないって。"
90100060-88 = "……たとえ可能だったとしても、その手段は取りたくないがな。"
90100060-89 = "[s] \"何か良い案はある？\""
90100060-90 = "まずは被害者が目撃したという「白いかかし」の出現条件を把握すべきです。"
90100060-91 = "「白いかかし」が原因なのかはまだ断定できませんが、事件と関係があるのは確かでしょう。"
90100060-92 = "被害者が発見された場所を辿り直せば、新しい手掛かりが見つかるかもしれません。#n私たちが直接「白いかかし」を確認できる可能性もゼロではないですし。"
90100060-93 = "つまり当面は屋外調査を続けるってことね。"
90100060-94 = "明日はもう少し遠くも当たってみようか。"
90100060-95 = "推理小説にもあるでしょ？#n十分なデータなしの推論は、粘土なしでレンガを焼くのと同じだって。"
90100060-100 = "このまま手がかりを掴めなかったら、私たちがレンガになっちゃうわよ……。"
90100060-102 = "次回;高速道路を走る人影"

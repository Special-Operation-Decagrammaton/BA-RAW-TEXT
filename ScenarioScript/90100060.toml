90100060-56 = "#clearST"
90100060-57 = "1;오토기;04\n5;쿠루미;04\n#1;h\n#5;h\n#3;hide\n#1;shake\n#5;shake\n#1;em;[?!]\n#5;em;[?!]\n#wait;1000"
90100060-58 = "1;오토기;04\n5;쿠루미;06;그게 무슨 소리야……? 그럼 우리 상대는 악마나 유령이라는 거야?\n#5;stiff"
90100060-59 = "1;오토기;09;정체를 알 수 없는 거대한 괴물이라면 몰라도, 보이지도 않는 허상과 싸울 수는 없다고."
90100060-60 = "1;오토기;08;애초에 유령이 사람을 놀라게 했다는 이야기라면 몰라도, 물리적인 피해를 입혔다는 이야기는 들은 적이 없는데."

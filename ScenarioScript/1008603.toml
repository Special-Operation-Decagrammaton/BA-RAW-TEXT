[translation]
1008603-1 = "#title;히나와 드레스 2"
1008603-2 = "#na;(그렇게 약속 장소에 먼저 나와 히나를 기다리고 있을 때였다.)"
1008603-3 = "#st;[0,0];instant;1;"
1008603-4 = "#clearST"
1008603-5 = "#wait;2500"
1008603-6 = "3;통신히나;04\n#3;a\n#wait;1500"
1008603-7 = "3;통신히나;04;미안! 선생님.\n#3;em;[반응]"
1008603-8 = "3;통신히나;20;갑자기 선도부에 문제가 생겨서 약속 시간보다 1시간 정도 늦을 것 같아."
1008603-9 = "3;통신히나;13;하필이면 만마전에서 또 쓸데없는 일을 벌인 바람에……. 정말 미안……!"
1008603-10 = "[s] \"아냐, 선도부 일 때문이잖아. 히나가 미안해할 필요 없어.\""
1008603-11 = "3;통신히나;18;으응. 이해해 줘서 고마워."
1008603-12 = "3;통신히나;18;하지만 으음. 역시 그냥 기다리고만 있는 건 시간이 아까우니까.\n#3;em;[속상함]"
1008603-13 = "3;통신히나;02;괜찮다면 선생님이 직접 내가 입을 드레스를 골라주지 않을래?"
1008603-14 = "3;통신히나;01;사이즈 같은 건 예전에 초등학생 때 측정해 놓은 데이터가 있으니까. 그걸 전달해 줄게.\n#3;em;[반응]"
1008603-15 = "[s1] \"히나가 초등학생이던 시절의 데이터……?!\"\n[s2] \"그런 귀중한 개인정보를 함부로 전달해도 괜찮은 거야?!\""
1008603-16 = "#wait;10"
1008603-17 = "#wait;10"
1008603-18 = "3;통신히나;11;어어, 응? 왜, 왜 그래……?\n#3;em;[?]"
1008603-19 = "[s3] \"뭐, 히나의 부탁이라면 그야 나는 상관없지만.\"\n[s4] \"정말 히나의 드레스를 내가 골라도 되는 거야?\""
1008603-20 = "#wait;10"
1008603-21 = "#wait;10"
1008603-22 = "3;통신히나;14;응. 오히려 나 같은 애가 고른 드레스라고 해봐야, 이쁘지 않을 게 뻔하니까.\n#3;em;[땀]"
1008603-23 = "3;통신히나;04;차라리 선생님이 골라주는 쪽이…… 안심할 수 있을 것 같아."
1008603-24 = "3;통신히나;12;선생님이 선택한 것이라면 나도…….\n#3;em;…"
1008603-25 = "[s] \"……나도?\""
1008603-26 = "3;통신히나;11;아, 아냐! 아무것도……!\n#3;em;[!]"

[translation]
1008603-1 = "Hina and the Dress 2"
1008603-2 = "I got to the store first. I patiently waited for Hina to arrive."
1008603-7 = "Sorry! Sensei."
1008603-8 = "A problem came up with the Prefect Team. I'll be around an hour late for our meeting."
1008603-9 = "I'm truly sorry... Blame the Pandemonium Society for causing trouble again!"
1008603-10 = "[s] \"Don't feel bad, Hina. Prefect Team business comes before leisure.\""
1008603-11 = "Yeah... Thank you for understanding."
1008603-12 = "I don't want you to waste your time waiting for me though."
1008603-13 = "If you don't mind, why don't you pick out a dress for me to wear?"
1008603-14 = "For things like size, you can use my elementary school measurements. I'm texting them to you now."
1008603-15 = "[s1] \"Won't this lead to the same problem as the dress in storage?!\"\n[s2] \"I don't think I should know something quite that personal...\""
1008603-18 = "H-Huh? Wh-What's wrong...?"
1008603-19 = "[s3] \"...Nothing. I'll do my best.\"\n[s4] \"Are you sure you want me to pick out your dress?\""
1008603-22 = "Yes. If we picked a dress based on my tastes, I don't think it'd be very fashionable."
1008603-23 = "You seem like an expert about that sort of thing."
1008603-24 = "...I'd like to wear something you think is—"
1008603-25 = "[s] \"Then you...?\""
1008603-26 = "O-Oh, no! It's nothing...!"
1008603-31 = "H-Head Prefect! The Pandemonium Society is at it again!"
1008603-35 = "I'm counting on you, Sensei!"
1008603-39 = "[ns] \"I guess it's hard for Hina to even get a holiday off. ...All right then.\""
1008603-41 = "About an hour later..."
1008603-46 = "[ns] \"Ah, Hina, you're here!\""
1008603-48 = "[ns] \"H-Hina?\""
1008603-49 = "Uh... Sorry I'm late, Sensei."
1008603-50 = "Like I said on the phone, there was an issue with the Pandemonium Society trying to conquer the School Lunch Club..."
1008603-51 = "Something about \"She who controls the pudding, controls Gehenna! Kekekeke!\"... "
1008603-52 = "Really. I can't fathom why they would make such a fuss."
1008603-53 = "What would they even do with all that pudding if they got it?"
1008603-54 = "Ugh. I can't believe they wasted my time dress shopping with you over sweets."
1008603-55 = "I'm sorry, Sensei. I didn't mean to disappoint you."
1008603-56 = "[s] \"I'm fine, really. No need to stress yourself out, all right?\""
1008603-58 = "[ns] \"Forget all that. I've picked out a dress that'll make you the belle of Gehenna's ball. Why don't you take a look?\""
1008603-59 = "Oh...right! You picked out a dress for me."
1008603-60 = "Also, what do you mean \"belle of Gehenna's ball\"?"
1008603-61 = "Is the dress supposed to resemble a bell? Is it made of metal?"
1008603-62 = "Kevlar would be far more effective, Sensei..."
1008603-63 = "[s] \"Don't overthink it. Try it on. It'll look great.\""
1008603-64 = "O-Okay. I'll take your word for it..."
1008603-65 = "But don't we need to do a fitting beforehand?"
1008603-66 = "Sorry, I'm overthinking. "
1008603-67 = "Okay, I'll try it on."
1008603-77 = "Uh...how does it look, Sensei?"
1008603-78 = "Does it suit...me?"
1008603-79 = "[s] \"Yes! Even better than I imagined!\""
1008603-80 = "R-Really?"
1008603-81 = "D-Doesn't it look awkward? Like I'm a kid playing dress-up?"
1008603-82 = "[s5] \"No. You look pretty and elegant.\"\n[s6] \"A true belle of the ball!\""
1008603-83 = "Pretty and e-elegant?"
1008603-84 = "If you say so..."
1008603-85 = "So that's how you see m—"
1008603-86 = "Wh-What?!"
1008603-87 = "D-Don't mess with me, Sensei!"
1008603-88 = "Phew... Anyway...Y-You've got good taste, Sensei."
1008603-89 = "The dress fits well and it's very easy to move in..."
1008603-90 = "Yes. I should have no issue wearing this to the party."
1008603-91 = "I was worried I may have asked too much. But now..."
1008603-92 = "Asking you was the right call. Thank you, Sensei."
1008603-93 = "[s] \"Anytime.\""
1008603-94 = "Now then, since we're done with trying it on, I'll go change back—"
1008603-95 = "[s7] \"Hold on! This is the first time you've dressed up in a while, right?\"\n[s8] \"You can't just let this sit in the closet till the party! Be fancy all day!\""
1008603-98 = "Like this...?"
1008603-99 = "Ahem."
1008603-100 = "Overruled, Sensei."
1008603-101 = "I stick out like a sore thumb in this. It could be dangerous—"
1008603-102 = "[s] \"Ugh! But that's such a waste!\""
1008603-103 = "I can't walk around Gehenna in a fancy dress. I'll get weird looks."
1008603-104 = "There's nothing to \"waste\"..."
1008603-105 = "...Is it really that nice of a dress?"
1008603-106 = "...I appreciate the sentiment, but no can do."
1008603-107 = "I only care that you see it."
1008603-108 = "[s] \"Huh?\""
1008603-109 = "N-Nothing."
1008603-110 = "Let's head back, Sensei."
1008603-112 = "And so, Hina changed back to her regular clothes. I did manage to talk her into shopping a little longer though."

1008603-65 = "5;히나;12;그럼…… 사전에 피팅을 해봐야 할 테니……"
1008603-66 = "5;히나;18;선생의 말대로…… \n#5;em;…"
1008603-67 = "5;히나;17;응. 입어볼게."

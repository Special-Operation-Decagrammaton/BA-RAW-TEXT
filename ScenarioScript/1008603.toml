[translation]
1008603-1 = "ฮินะกับชุดเดรส (2)"
1008603-2 = "(คุณครูมาถึงสถานที่ที่นัดกับฮินะไว้ล่วงหน้า และกำลังรอฮินะอยู่)"
1008603-7 = "คุณครู ขอโทษนะ!"
1008603-8 = "พอดีฉันมีงานด่วนของคณะกรรมการวินัยเข้ามา ฉันน่าจะไปถึงช้าประมาณ 1 ชั่วโมงเลย"
1008603-9 = "ทำไมแพนเดโมเนียม โซไซตี้ถึงได้ก่อเรื่องไร้สาระตอนนี้ก็ไม่รู้... ขอโทษนะคุณครู...!"
1008603-10 = "[s] \"ไม่เป็นไร ถ้าเป็นงานคณะกรรมการวินัย ฮินะไม่ต้องรู้สึกผิดหรอกนะ\""
1008603-11 = "อืม ขอบคุณที่เข้าใจนะ"
1008603-12 = "แต่ว่า อืม... ถ้าจะให้รออย่างเดียวก็น่าเสียดายเวลา"
1008603-13 = "ถ้าอย่างนั้นคุณครูช่วยเลือกชุดที่จะให้ฉันใส่หน่อยได้มั้ย?"
1008603-14 = "ส่วนเรื่องขนาด ฉันมีขนาดตัวที่วัดไว้สมัยประถม เดี๋ยวฉันส่งข้อมูลให้นะ"
1008603-15 = "[s1] \"ขนาดตัวที่วัดไว้ตอนอยู่ประถม...?!\"\n[s2] \"บอกข้อมูลสำคัญๆ ให้คนอื่นรู้แบบนี้ได้เหรอ?!\""
1008603-18 = "หืม? ทะ... ทำไมเหรอ...?"
1008603-19 = "[s3] \"ถ้าเป็นคำขอร้องจากฮินะ ครูก็เต็มใจหรอกนะ\"\n[s4] \"ว่าแต่ให้ครูเลือกชุดให้ฮินะเองเลยได้เหรอ?\""
1008603-22 = "อืม ถึงยังไงคนอย่างฉันก็ไม่มีพรสวรรค์ในการเลือกชุดสวยๆ อยู่แล้ว"
1008603-23 = "ถ้าคุณครูเป็นคนเลือกให้... ฉันน่าจะสบายใจมากกว่าด้วยซ้ำ"
1008603-24 = "เพราะถ้าเป็นชุดที่คุณครูเลือก ฉันก็คง..."
1008603-25 = "[s] \"ก็คง...?\""
1008603-26 = "มะ... ไม่มีอะไรหรอก! ไม่มีอะไรทั้งนั้น...!"
1008603-31 = "ทะ... ท่านประธาน! พวกแพนเดโมเนียม โซไซตี้ก่อเรื่องอีกแล้ว...!"
1008603-35 = "งั้นก็รบกวนด้วยนะ คุณครู!"
1008603-39 = "[ns] \"แม้แต่วันหยุดฮินะก็งานยุ่งตลอดเลยสินะ... งั้นก็ดีละ\""
1008603-41 = "(เวลาผ่านไปประมาณ 1 ชั่วโมง)"
1008603-46 = "[ns] \"อ๊ะ ฮินะ! มาแล้วเหรอ...!\""
1008603-48 = "[ns] \"ฮะ... ฮินะ...?\""
1008603-49 = "อ่า... คุณครู ขอโทษที่มาสายนะ"
1008603-50 = "ก็อย่างที่ฉันบอกไปทางโทรศัพท์น่ะ อยู่ดีๆ แพนเดโมเนียม โซไซตี้ก็ไปบุกยึดชมรมโภชนาการจนเกิด#nเรื่องวุ่นวาย..."
1008603-51 = "เห็นว่า <การผูกขาดพุดดิ้งชั่วคราวเป็นสิ่งจำเป็นต่อสันติภาพของเกเฮนน่าในระยะยาว>..."
1008603-52 = "ฉันไม่เห็นเข้าใจความหมายเลย"
1008603-53 = "แพนเดโมเนียม โซไซตี้อยากทำอะไรกันแน่นะ?"
1008603-54 = "ทำไมฉันต้องโดนพุดดิ้งแย่งเวลาที่มีค่าที่จะได้อยู่กับคุณครูในวันนี้ด้วย..."
1008603-55 = "ฉันทำให้คุณครูผิดหวังจนได้..."
1008603-56 = "[s] \"ไม่หรอก ครูไม่เป็นอะไรเลย จะ... ใจเย็นๆ ก่อนนะ!\""
1008603-58 = "[ns] \"ครูเลือก <ชุดเด็ด> ไว้ให้ฮินะแล้ว ไปดูชุดกันก่อนมั้ย?\""
1008603-59 = "อ่า... จริงสิ ฉันขอให้คุณครูช่วยเลือกชุดเดรสให้นี่นา..."
1008603-60 = "ว่าแต่... ชุดเด็ดที่ว่า... หมายความว่ายังไงเหรอ...?"
1008603-61 = "หืม? ชุดที่แค่ใส่... ก็เหมือนมีอาวุธไม้ตายแล้วงั้นเหรอ...?"
1008603-62 = "เดี๋ยวก่อน อย่างนี้ฉันยิ่งไม่เข้าใจใหญ่..."
1008603-63 = "[s] \"ลองใส่ดูก่อนมั้ย? ครูว่าต้องเข้ากับฮินะมากๆ เลยละ\""
1008603-64 = "อะ... อื้อ ถะ... ถ้าคุณครูพูดถึงขนาดนั้นละก็..."
1008603-65 = "ถ้างั้น... ฉันก็คงต้องลองใส่ดูก่อน..."
1008603-66 = "ฉันจะทำอย่างที่คุณครูบอกแล้วกัน..."
1008603-67 = "อืม ฉันจะลองใส่ดู"
1008603-77 = "ปะ... เป็นยังไงบ้าง... คุณครู?"
1008603-78 = "ชุดเดรสนี้มัน... เข้ากับฉัน... รึเปล่า?"
1008603-79 = "[s] \"อื้ม! ชุดนี้เกิดมาเพื่อฮินะเลย! ใส่แล้วเหมาะกว่าที่ครูคิดไว้อีก!\""
1008603-80 = "งะ... งั้นเหรอ...?"
1008603-81 = "แต่ว่าใส่แล้วมัน... ไม่ดูเด็กเกินไปเหรอ?"
1008603-82 = "[s5] \"ไม่หรอก! ไม่เลย! สวยมากๆ เลยต่างหากล่ะ!\"\n[s6] \"ชุดแบบนี้แหละที่เหมาะกับฮินะจัง!\""
1008603-83 = "สะ... สวยมากๆ เลย... งั้นเหรอ?"
1008603-84 = "ถะ... ถ้าคุณครูพูดขนาดนั้นละก็... อะ... อืม..."
1008603-85 = "อย่างนี้สินะ คุณครู... คิดแบบนี้สินะ..."
1008603-86 = "วะ... ว่าไงนะ?!"
1008603-87 = "คะ... คุณครูก็ชอบพูดอะไรแปลกๆ แบบนี้อยู่เรื่อย...!"
1008603-88 = "ฮู่ว... เอาเถอะ ชุดนี้ที่คุณครูเลือกให้ฉันน่ะ..."
1008603-89 = "ทั้งขนาดพอดีตัว และใส่แล้วก็เคลื่อนไหวสะดวก..."
1008603-90 = "อืม ถ้าเป็นชุดนี้ก็คงใส่ไปเข้าร่วมงานปาร์ตี้ได้"
1008603-91 = "ตอนแรกที่ฉันขอร้องคุณครู ฉันกังวลว่าจะเป็นการขอที่เกินกำลังไปหรือเปล่า..."
1008603-92 = "แต่พอได้เห็นชุดก็รู้เลยว่ามาขอร้องถูกคนแล้ว ขอบคุณนะคุณครู"
1008603-93 = "[s] \"ด้วยความยินดีเลย!\""
1008603-94 = "ถ้างั้น... ก็ถือว่าลองชุดเสร็จแล้ว งั้นฉันไปเปลี่ยนชุดมาก่อน..."
1008603-95 = "[s7] \"ไม่สิๆ! ไหนๆ ก็แต่งตัวสวยขนาดนี้แล้ว!\"\n[s8] \"จะเปลี่ยนก็เสียดายแย่ กลับทั้งอย่างนี้ดีกว่านะ ฮินะจัง\""
1008603-98 = "ทั้งอย่างนี้เลยเหรอ...?"
1008603-99 = "อืม"
1008603-100 = "ไม่เอาด้วยหรอก คุณครู"
1008603-101 = "ฉันบอกไปแล้วไม่ใช่เหรอว่ามันจะเป็นที่สะดุดตาเอา เพราะงั้น..."
1008603-102 = "[s] \"อึก... มันก็จริงอยู่หรอก แต่ก็น่าเสียดายนะ...\""
1008603-103 = "ถ้าใส่ชุดเดรสนี้กลับไป น่าจะโดนมองด้วยสายตาแปลกๆ มากกว่านะ"
1008603-104 = "ทำไมถึงเสียดายอะไรแบบนั้นล่ะ..."
1008603-105 = "อยากเห็นฉันในชุดเดรสนี้อีกหน่อย... งั้นเหรอ?"
1008603-106 = "ขอบคุณที่คิดแบบนั้นนะ แต่ไม่ได้ก็คือไม่ได้"
1008603-107 = "เรื่องแบบนั้นน่ะ เอาไว้ตอนอยู่ด้วยกันสองคน..."
1008603-108 = "[s] \"หืม? ฮินะ?\""
1008603-109 = "อ่า... ไม่มีอะไรหรอก"
1008603-110 = "เอาละ เรากลับกันเถอะ คุณครู"
1008603-112 = "(จากนั้นคุณครูกับฮินะที่เปลี่ยนชุดแล้วก็สนุกกับการซื้อของและใช้เวลาอยู่ด้วยกันต่ออีกสักพัก)"

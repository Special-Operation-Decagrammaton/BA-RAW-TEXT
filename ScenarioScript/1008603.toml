1008603-77 = "1;히나 드레스;08;어, 어떨까…… 선생님?\n#1;em;[///]\n#1;stiff"
1008603-78 = "1;히나 드레스;07;이 드레스 차림새…… 나에게, 어울……릴까?"
1008603-79 = "[s] \"응! 역시 히나야! 상상했던 대로 잘 어울려!\""
1008603-80 = "1;히나 드레스;14;그, 그래……?"
1008603-81 = "1;히나 드레스;08;하지만 이 모습은…… 너무 어려 보인다거나, 그런 느낌이지 않아?"
1008603-82 = "[s5] \"아냐! 그렇지 않아! 무척 이쁘고 좋은걸!\"\n[s6] \"오히려 그런 느낌이 좋은 거라구! 히나 쨩!\""
1008603-83 = "1;히나 드레스;15;무척 이쁘고…… 조, 좋아……?\n#1;stiff"
1008603-84 = "1;히나 드레스;07;서, 선생님이 그렇게 말한다면야…… 으, 으응……."
1008603-85 = "1;히나 드레스;16;그렇구나. 선생님은…… 그렇게 생각해 주는, 거구나…….\n#1;em;[///]"
1008603-86 = "1;히나 드레스;15;뭐, 뭐어?!\n#1;em;[?!]"
1008603-87 = "1;히나 드레스;08;서, 선생님은 또 그런 이상한 소리를 하기나 하고……!"
1008603-88 = "1;히나 드레스;99;후우…… 어쨌거나 선생님이 골라 준 이 드레스……."
1008603-89 = "1;히나 드레스;02;몸에 딱 잘 맞고, 움직이기도 편한 것이…….\n#1;em;…"
1008603-90 = "1;히나 드레스;03;응. 이 드레스라면 사교 파티에 참가하는데 충분하겠어."
1008603-91 = "1;히나 드레스;99;처음엔 부탁하면서 조금 무리한 부탁이지 않을까. 하고 생각했었는데……."
1008603-92 = "1;히나 드레스;16;역시 당신에게 부탁하기를 잘했네. 고마워. 선생님.\n#1;em;[음표]"
1008603-93 = "[s] \"별말씀을!\""
1008603-94 = "1;히나 드레스;01;그럼…… 피팅도 끝났겠다. 옷은 다시 갈아입도록 하고……."
1008603-95 = "[s7] \"아니 아니지! 모처럼 이렇게까지 차려입고 세팅했는걸!\n[s8] \"아까우니까. 이대로 입고 돌아가자! 히나 쨩!\""

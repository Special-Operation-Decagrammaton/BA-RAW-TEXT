[translation]
1008603-1 = "陽奈和禮服（２）"
1008603-2 = "（提前抵達約好的地點等待陽奈）"
1008603-7 = "老師抱歉！"
1008603-8 = "因為風紀委員會突然有狀況，我可能會比約好的時間晚1個小時左右才到。"
1008603-9 = "萬魔殿偏偏又沒事找事……真的很抱歉！"
1008603-10 = "[s]「沒關係，畢竟是因為工作，陽奈不用覺得抱歉。」"
1008603-11 = "嗯，謝謝你。"
1008603-12 = "不過……只是讓你乾等就太浪費時間了。"
1008603-13 = "如果老師不介意，可以請你幫我挑禮服嗎？"
1008603-14 = "尺寸的話，我會把小學時測量的資料傳給你。"
1008603-15 = "[s1]「陽奈小學時期的資料……！？」\n[s2]「把那麼重要的個人資料傳給我沒關係嗎！？」"
1008603-18 = "咦？有，有什麼問題嗎……？"
1008603-19 = "[s3]「既然陽奈都拜託我了，當然沒問題。」\n[s4]「由我幫陽奈挑選禮服真的可以嗎？」"
1008603-22 = "嗯，像我這種人應該沒辦法挑到漂亮的禮服吧。"
1008603-23 = "讓老師來挑的話……我也比較放心。"
1008603-24 = "而且如果是老師選的禮服，我應該……"
1008603-25 = "[s]「……應該？」"
1008603-26 = "沒，沒事！沒什麼……！"
1008603-31 = "委，委員長！萬魔殿又……！"
1008603-35 = "那就拜託你了，老師！"
1008603-39 = "[ns]「陽奈連假日也這麼忙啊……那好吧。」"
1008603-41 = "（後來過了1個小時……）"
1008603-46 = "[ns]「啊，陽奈！你來啦……！」"
1008603-48 = "[ns]「陽，陽奈……？」"
1008603-49 = "啊……老師，抱歉我來晚了。"
1008603-50 = "就像電話上說的一樣，因為萬魔殿突然占領供給部……"
1008603-51 = "說什麼「布丁的短期壟斷狀態，是格黑娜長遠和平不可或缺的要素」……"
1008603-52 = "……唉，真是完全無法理解。"
1008603-53 = "萬魔殿真正的目的到底是什麼呢？"
1008603-54 = "為什麼我要因為區區的布丁，耽誤和老師一起相處的寶貴時間……"
1008603-55 = "做出讓老師失望的行為……"
1008603-56 = "[s]「沒關係，我真的不介意。你先冷靜！」"
1008603-58 = "[ns]「我幫陽奈挑了『必殺的禮服』哦！要不要先看看？」"
1008603-59 = "啊……說的也是。#n老師幫我挑了禮服……"
1008603-60 = "不過，必殺的禮服……是什麼意思？"
1008603-61 = "嗯？只要穿上就無敵了的……那種禮服？"
1008603-62 = "這樣說我反而更聽不懂了。"
1008603-63 = "[s]「總之先試穿看看吧？應該非常適合你。」"
1008603-64 = "好，好吧，既然老師都這麼說了……"
1008603-65 = "而且……確實是該試穿一下……"
1008603-66 = "那就照老師的意思…… "
1008603-67 = "嗯，來試穿吧。"
1008603-77 = "怎，怎麼樣……老師？"
1008603-78 = "這件禮服……適合我嗎？"
1008603-79 = "[s]「嗯！不愧是陽奈！和想像中一樣非常適合！」"
1008603-80 = "是，是嗎……？"
1008603-81 = "但……這樣會不會看起來太年輕？"
1008603-82 = "[s5]「不會！絕對不會！非常漂亮，超棒的哦！」\n[s6]「這樣反而會更好！陽奈醬！」"
1008603-83 = "非常漂亮……超棒的……？"
1008603-84 = "既，既然老師都這麼說了……嗯……"
1008603-85 = "原來老師……是這麼想的啊……"
1008603-86 = "什，什麼！？"
1008603-87 = "老，老師又說那種奇怪的話……！"
1008603-88 = "呼……總之，老師為我挑的這件禮服……"
1008603-89 = "尺寸非常剛好，而且也方便行動……"
1008603-90 = "嗯，很適合參加社交派對。"
1008603-91 = "本來還覺得拜託老師這種事有點太超過了……"
1008603-92 = "不過拜託你果然是正確的。謝謝你，老師。"
1008603-93 = "[s]「這不算什麼！」"
1008603-94 = "那……既然都試穿過了，我先去把衣服……"
1008603-95 = "[s7]「不不不！難得都打扮成這樣了！」\n[s8]「換回去太可惜了，就這樣穿回去吧！陽奈醬！」"
1008603-98 = "就這樣穿回去……？"
1008603-99 = "唔嗯……"
1008603-100 = "這點還請容我拒絕，老師。"
1008603-101 = "我之前也說過吧？#n太引人注目可能會有危險。"
1008603-102 = "[s]「雖然是這麼說沒錯，不過真的好可惜……」"
1008603-103 = "如果穿禮服回去的話，很可能會招來異樣的目光……"
1008603-104 = "竟然說這樣很可惜……"
1008603-105 = "還想繼續看我穿禮服的樣子……？"
1008603-106 = "……謝謝你這麼說。但不行就是不行。"
1008603-107 = "這種事只有兩人獨處的時候才能……"
1008603-108 = "[s]「嗯？陽奈？」"
1008603-109 = "沒，沒什麼。"
1008603-110 = "那我們回去吧，老師。"
1008603-112 = "（雖然遺憾，不過還是和換回原本服裝的陽奈一起享受了短暫的逛街時光）"

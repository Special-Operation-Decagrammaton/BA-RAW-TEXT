1008603-97 = "#wait;10"
1008603-98 = "1;히나 드레스;02;이대로……?\n#1;em;[?]"
1008603-99 = "1;히나 드레스;99;흠흠."
1008603-100 = "1;히나 드레스;10;그건 기각이야. 선생님."
1008603-101 = "1;히나 드레스;10;그렇지 않아도 말했잖아? 괜히 눈에 띄는 건 위험할지도 모른다고. 그러니……."
1008603-102 = "[s] \"큭. 그건 그렇지만, 아쉽다……….\""
1008603-103 = "1;히나 드레스;13;드레스를 입고 돌아다녀봤자. 괜히 이상한 시선만 받을 텐데.\n#1;em;[땀]"
1008603-104 = "1;히나 드레스;13;그런 게 아쉽다니………"
1008603-105 = "1;히나 드레스;14;드레스를 입은 나의 모습을 좀 더 보고 싶었다, 고……?\n#1;em;[반응]"
1008603-106 = "1;히나 드레스;07;……말은 고맙지만. 안되는 건 안 돼."
1008603-107 = "1;히나 드레스;08;그런 건 단둘이 있을 때에나…….\n#fontsize;50\n#1;em;[///]"
1008603-108 = "[s] \"응? 히나?\""

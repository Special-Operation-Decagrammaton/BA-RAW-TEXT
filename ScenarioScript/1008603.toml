1008603-49 = "5;히나;15;아…… 선생님. 늦어서 미안해.\n#5;em;[반응]"
1008603-50 = "5;히나;15;전화로 말한 것처럼 만마전에서 난데없이 급양부를 점거해서는 부당한 일을 벌이기 시작한 이슈가 있어서……"
1008603-51 = "5;히나;15;<푸딩의 일시적 독점 상태가 장기적으로 게헨나의 평화에 반드시 필요하다>라니…… \n#5;em;[빠직]"
1008603-52 = "5;히나;15;……아니, 진짜. 의미를 모르겠어."
1008603-53 = "5;히나;15;대체 만마전은 뭘 하고 싶었던 걸까?"
1008603-54 = "5;히나;15;왜 나는 푸딩 때문에, 오늘같이 선생님과 함께하는 귀중한 날을……."
1008603-55 = "5;히나;15;선생님을 실망시키는 일을 저질러야만…….\n#5;stiff"
1008603-56 = "[s] \"아니, 난 정말로 괜찮으니까. 이, 일단 진정하자?!\""
1008603-57 = "#wait;1000"
1008603-58 = "[ns] \"그보다 히나를 위해 내가 <필살의 드레스>를 골랐으니까. 그것부터 확인해 볼래?\""
1008603-59 = "5;히나;02;아…… 맞다. 선생님이 드레스를 골라줬었지……\n#5;em;[반응]"
1008603-60 = "5;히나;04;근데, 필살의…… 드레스라니, 그건 무슨 의미야……?"
1008603-61 = "5;히나;14;응? 입기만 해도 필살이 되는…… 그런 드레스라고……?\n#5;em;[?]"
1008603-62 = "5;히나;13;아니, 오히려 더욱더 의미를 모르겠는데……."

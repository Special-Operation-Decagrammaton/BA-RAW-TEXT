[translation]
2003505-1 = "好覺，好夢"
2003505-5 = "（百鬼夜行的工作結束得比預期中還晚……）"
2003505-6 = "（等到好不容易從工作中解放時，天已經黑了）"
2003505-9 = "[ns]「對了，我說過要聯絡椿……」"
2003505-13 = "喂～老師？"
2003505-14 = "啊……工作剛結束對吧。#n嗯，我知道了。"
2003505-15 = "抱歉讓我久等了？#n沒關係，不久前我還在睡覺呢。"
2003505-16 = "那老師，稍微等我一下哦。#n我馬上出去找你。"
2003505-22 = "（於是等了大約5分鐘……）"
2003505-24 = "我在這邊，老師。"
2003505-25 = "呵呵，在這個時間跟老師見面，總覺得很新鮮呢。"
2003505-26 = "[s]「能見到精神飽滿的椿，我也覺得很新鮮哦。」"
2003505-27 = "是嗎？那今天是我們見到彼此新鮮一面的日子呢。"
2003505-28 = "走吧，老師。"
2003505-29 = "現在的我既是修行部也是導覽員哦，會安全帶領老師的。"
2003505-30 = "[s]「嗯，交給你囉。」"
2003505-42 = "[ns]「總覺得現在的椿元氣滿滿的呢。」"
2003505-43 = "嗯……？是嗎？"
2003505-44 = "呵呵，我覺得現在反而是最佳時期……？或者說全盛期……？"
2003505-48 = "夜晚的百鬼夜行……是不是很不可思議？"
2003505-49 = "白天熱鬧的氣氛消失無蹤……安靜得就像萬物都靜止了一樣。"
2003505-50 = "雖然好像也有人不習慣白天與夜晚之間的反差，選擇不在晚上出門……"
2003505-51 = "不過我喜歡。因為這也是百鬼夜行啊。"
2003505-52 = "[s]「這也是百鬼夜行……嗯，的確如此……」"
2003505-53 = "咦，老師？你看起來有點喘不過氣耶。"
2003505-54 = "不只步伐變慢，還流了一點汗。"
2003505-55 = "該不會……老師已經累了？"
2003505-56 = "[s]「我很慚愧……」"
2003505-57 = "雖然不需要對這件事感到抱歉……不過還是得注意健康吧？"
2003505-58 = "萬一老師倒下，很多學生都會傷心的。"
2003505-59 = "我一定也是其中之一……"
2003505-60 = "[s]「請給我運動和休息的時間！」"
2003505-61 = "……抱歉，老師。#n這點我好像幫不上忙。"
2003505-62 = "不過……嗯。在這裡休息一下再走吧。"
2003505-63 = "替觀光客調節體力，也是一個好的導覽員應該做的。"
2003505-65 = "（於是便跟著椿，來到了附近的休憩處……）"
2003505-74 = "― [log=츠바키 가이드]呼……腳好像有點痛。[/log][wa:5710] "
2003505-77 = "― [log=츠바키 가이드]因為這雙鞋還穿不太習慣。嗯。[/log][wa:5870] "
2003505-80 = "― [log=츠바키 가이드]怎麼了嗎，老師？[/log][wa:2180] "
2003505-81 = "― [log=츠바키 가이드]一直盯著我這邊……[/log][wa:2270] "
2003505-84 = "― [log=츠바키 가이드]咦？感覺我……看起來跟平常不太一樣……？[/log][wa:7500] "
2003505-87 = "― [log=츠바키 가이드]……真奇怪。[/log][wa:3540] "
2003505-90 = "― [log=츠바키 가이드]呵呵。不過，老師能那樣看著我的話……[/log][wa:6920] "
2003505-91 = "― [log=츠바키 가이드]好像也還不賴？[/log][wa:5500] "
2003505-94 = "― [log=츠바키 가이드]吶，老師。[/log][wa:2330] "
2003505-95 = "― [log=츠바키 가이드]要是今天我們兩個……都能做個好夢，就好了呢。[/log][wa:9350] "
2003505-99 = "[ns1]「我偶爾會覺得椿……」\n[ns2]「就像是夢裡會出現的人一樣呢。當然，是好的那種。」"
2003505-102 = "呵呵，那是什麼意思呢？"
2003505-103 = "老師也不太清楚？#n今天老師說的話特別有趣呢。"
2003505-104 = "不過，要先睡好覺才能做好夢。"
2003505-105 = "所以……想要做好夢的話，歡迎隨時跟我說。"
2003505-106 = "我一直會陪在老師身邊，直到你睡著的。"
2003505-107 = "[ns]「嗯……謝謝你……」"
2003505-117 = "老師？"
2003505-121 = "看來你真的很累呢。嗯。"
2003505-125 = "晚安，老師。祝你有個好夢。"
2003505-126 = "還有，如果可以的話……"
2003505-127 = "要是能夢到我就好了呢。"
2003505-132 = "[ns3]「……哇！？」\n[ns4]「在外面睡著了！要遲到了要遲到了！」"
2003505-135 = "（搖醒了睡在旁邊的椿）"
2003505-140 = "嗯嗯……再讓我睡一下嘛……"
2003505-144 = "……咦？不是三森，是老師……？"
2003505-145 = "……"
2003505-149 = "嗨，老師！早安。"
2003505-150 = "[s5]「……嗯。早安，椿。」\n[s6]「該進行早上的準備囉！」"
2003505-153 = "……嗯，是呢。"
2003505-154 = "不過……真想跟老師再多睡一下……"
2003505-158 = "（安慰似乎覺得有點可惜的椿之後，前往了夏萊）"

[translation]
2003505-1 = "นอนหลับฝันดี"
2003505-5 = "(งานของคุณครูที่เฮียกคิยาโคใช้เวลานานกว่าที่คิด...)"
2003505-6 = "(กว่าจะจัดการงานเสร็จก็มืดค่ำแล้ว)"
2003505-9 = "[ns] \"จะว่าไป ต้องติดต่อไปหาสึบากิด้วยนี่นา...\""
2003505-13 = "ฮัลโหล คุณครู?"
2003505-14 = "อ่า... เสร็จงานแล้วสินะ อื้ม เข้าใจแล้ว"
2003505-15 = "ขอโทษที่ทำให้รองั้นเหรอ? ไม่หรอก ไม่เป็นไร ฉันก็นอนเพิ่งตื่นน่ะ"
2003505-16 = "ถ้างั้นรอฉันแป๊บหนึ่งนะคุณครู เดี๋ยวฉันจะออกไปรับ"
2003505-22 = "(หลังจากนั้นประมาณ 5 นาที...)"
2003505-24 = "คุณครู ฉันอยู่นี่"
2003505-25 = "ฮุฮุ เหมือนฉันจะไม่เคยมาเจอคุณครูในเวลานี้เลยนะ รู้สึกแปลกใหม่ดีจัง"
2003505-26 = "[s] \"ครูก็รู้สึกแปลกใหม่ดีนะที่ได้เจอสึบากิในเวอร์ชันไม่ง่วง\""
2003505-27 = "งั้นเหรอ? งั้นวันนี้คือวันแห่งการพบเจอที่แปลกใหม่ของเราสินะ"
2003505-28 = "ถ้างั้นก็ไปกันเถอะคุณครู"
2003505-29 = "ตอนนี้ฉันเป็นทั้งหัวหน้าชมรมฝึกฝนและเป็นไกด์ด้วย ฉันจะพาทัวร์อย่างปลอดภัยเลย"
2003505-30 = "[s] \"อืม ครูฝากด้วยนะ\""
2003505-42 = "[ns] \"ตอนนี้สึบากิดูสดใสมากเลยนะ\""
2003505-43 = "หืม...? ฉันดูเป็นอย่างนั้นเหรอ?"
2003505-44 = "ฮุฮุ ฉันว่าบรรยากาศตอนนี้เหมือนเป็นช่วงที่ดีที่สุดของวันเลยละ"
2003505-48 = "เฮียกคิยาโคในยามค่ำคืน... ดูน่าตื่นเต้นดีใช่มั้ย?"
2003505-49 = "ราวกับว่าบรรยากาศแห่งความวุ่นวายในช่วงกลางวันหายไปอยู่ที่ไหนสักแห่ง... แล้วก็เงียบเหมือน#nทุกสิ่งทุกอย่างไม่เคลื่อนไหว"
2003505-50 = "มีนักเรียนที่ไม่ค่อยออกมาข้างนอกตอนกลางคืนเพราะไม่ชินกับบรรยากาศที่เปลี่ยนจากหน้ามือเป็น#nหลังมือแบบนี้ด้วยละ..."
2003505-51 = "แต่ว่าฉันชอบนะ เพราะนี่ก็คือเฮียกคิยาโค"
2003505-52 = "[s] \"นั่นสินะ... เพราะนี่ก็คือเฮียกคิยาโคนี่นา...\""
2003505-53 = "เอ๋ คุณครู? ดูหายใจถี่ยังไงไม่รู้นะ"
2003505-54 = "แถมก้าวเดินก็ช้าลง แล้วเหงื่อก็ออกนิดหน่อยด้วย"
2003505-55 = "หรือว่า... เพลียแล้วงั้นเหรอ?"
2003505-56 = "[s] \"น่าละอายจัง...\""
2003505-57 = "นี่ไม่ใช่เรื่องที่ต้องขอโทษหรอก... แต่ยังไงก็รักษาสุขภาพหน่อยนะ"
2003505-58 = "ถ้าคุณครูเป็นลมล้มพับไป จะมีนักเรียนเสียใจหลายคนเลยนะ"
2003505-59 = "แน่นอนว่าฉันก็เป็นหนึ่งในนั้นด้วย..."
2003505-60 = "[s] \"ขอเวลาให้ได้ออกกำลังกายและพักผ่อนบ้างสิ!\""
2003505-61 = "ขอโทษนะคุณครู... นั่นไม่น่าจะใช่เรื่องที่ฉันช่วยได้นะ"
2003505-62 = "แต่ก็... พักผ่อนตรงนี้ก่อนแล้วค่อยไปต่อแล้วกัน"
2003505-63 = "ไกด์ที่ดีต้องช่วยดูแลพลังกายของนักท่องเที่ยวด้วยเหมือนกันน่ะ"
2003505-65 = "(จากนั้นคุณครูก็เดินตามสึบากิไปยังที่พักผ่อนที่อยู่ใกล้ๆ...)"
2003505-74 = "― [log=츠바키 가이드]เฮ้อ... ปวดขานิดหน่อยนะเนี่ย[/log][wa:4990] "
2003505-77 = "― [log=츠바키 가이드]ฉันยังไม่ชินกับรองเท้าคู่นี้น่ะ อืม...[/log][wa:4910] "
2003505-80 = "― [log=츠바키 가이드]มีอะไรเหรอ คุณครู?[/log][wa:1780] "
2003505-81 = "― [log=츠바키 가이드]ทำไมถึงจ้องกันขนาดนั้นล่ะ...[/log][wa:1510] "
2003505-84 = "― [log=츠바키 가이드]หืม? ฉันดูมีบางอย่าง... ต่างไปจากปกติงั้นเหรอ...?[/log][wa:6340] "
2003505-87 = "― [log=츠바키 가이드]...แปลกจัง[/log][wa:3380] "
2003505-90 = "― [log=츠바키 가이드]ฮุฮุ แต่ว่าถ้าคุณครูเห็นว่าฉันเป็นอย่างนั้นละก็...[/log][wa:5640] "
2003505-91 = "― [log=츠바키 가이드]มันก็อาจจะไม่แย่ก็ได้นะ?[/log][wa:4820] "
2003505-94 = "― [log=츠바키 가이드]นี่ คุณครู[/log][wa:2130] "
2003505-95 = "― [log=츠바키 가이드]หวังว่าคืนนี้ี้เราทั้งสองคน... จะนอนหลับฝันดีนะ[/log][wa:8350] "
2003505-99 = "[ns1] \"บางครั้งครูจะรู้สึกว่าสึบากิก็เหมือนกับคนในฝันเลยนะ...\"\n[ns2] \"สึบากิเหมือนคนที่อยู่ในความฝันเลยละ แต่เป็นในทางที่ดีนะ\""
2003505-102 = "ฮุฮุ หมายถึงยังไงเหรอ?"
2003505-103 = "คุณครูก็ไม่รู้เหมือนกันงั้นเหรอ? วันนี้คุณครูพูดอะไรสนุกๆ เยอะเลยนะ"
2003505-104 = "แต่ว่าเราต้องนอนหลับให้สบายก่อน ถึงจะฝันดีได้นะ"
2003505-105 = "แล้วก็... ถ้าอยากนอนหลับให้สบายละก็ บอกฉันได้ตลอดเลยนะ"
2003505-106 = "เพราะฉันจะอยู่ข้างๆ จนกว่าคุณครูจะหลับเลย"
2003505-107 = "[ns] \"อื้ม... ขอบใจนะ...\""
2003505-117 = "คุณครู?"
2003505-121 = "สงสัยจะเพลียจริงๆ นะเนี่ย อืม..."
2003505-125 = "งั้นก็นอนเถอะคุณครู ขอให้หลับฝันดีนะ"
2003505-126 = "แล้วก็ถ้าเป็นไปได้... ฉันหวังว่า"
2003505-127 = "ฉันจะอยู่ในความฝันของคุณครูนะ"
2003505-132 = "[ns3] \"เฮือก...!?\"\n[ns4] \"เผลอหลับข้างนอกจนได้! สายแล้วๆ!\""
2003505-135 = "(คุณครูเขย่าตัวปลุกสึบากิที่นอนหลับอยู่ข้างๆ กัน)"
2003505-140 = "งืม... ขอฉันนอนอีกหน่อยนะ..."
2003505-144 = "เอ๋...? ไม่ใช่มิโมริ แต่เป็นคุณครูเหรอ...?"
2003505-145 = "......"
2003505-149 = "สวัสดีคุณครู อรุณสวัสดิ์"
2003505-150 = "[s5] \"อืม... อรุณสวัสดิ์ สึบากิ\"\n[s6] \"ตอนนี้เราต้องแยกย้ายกันไปทำงานแล้วละ!\""
2003505-153 = "มันก็จริง..."
2003505-154 = "แต่ฉันยังอยากนอนด้วยกันต่ออีกหน่อยนี่นา..."
2003505-158 = "(คุณครูช่วยปลอบสึบากิที่งอแงอยากนอนต่อแล้วกลับไปทำงานที่ชาเล่ต์)"

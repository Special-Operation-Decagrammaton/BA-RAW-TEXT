[translation]
2003505-1 = "Sweet Sleep, Nice Dreams"
2003505-5 = "My work at Hyakkiyako took longer than I expected..."
2003505-6 = "By the time I was finally done, the day was almost over."
2003505-9 = "[ns] \"Come to think of it, I was supposed to call Tsubaki...\""
2003505-13 = "Hello, Sensei?"
2003505-14 = "Oh... You just got done? All right, got it."
2003505-15 = "And the wait was no problem. I was just finishing up my nap."
2003505-16 = "Just a moment, Sensei. I'll come out to see you."
2003505-22 = "5 minutes later..."
2003505-24 = "Over here, Sensei."
2003505-25 = "Hehe. It feels kind of refreshing to see you at this time of the day."
2003505-26 = "[s] \"It's refreshing to see you bright-eyed and bushy-tailed.\""
2003505-27 = "Is that so? It must just be a refreshing sort of day!"
2003505-28 = "Let's go, Sensei."
2003505-29 = "As president of the Inner Discipline Club, and sleep guide, I shall escort you safely."
2003505-30 = "[s] \"Please do.\""
2003505-42 = "[ns] \"I said it before, but you're pretty lively today, Tsubaki.\""
2003505-43 = "Really? You think so?"
2003505-44 = "Hehe. Well, you could call this time of day my prime time!"
2003505-48 = "Doesn't Hyakkiyako look pretty cool at night?"
2003505-49 = "The bustling excitement of the day has completely disappeared... Everything's so quiet, it's as if the world has stopped."
2003505-50 = "The change is so shocking, some students avoid venturing out at night because of it."
2003505-51 = "But I like it. This tranquility is Hyakkiyako too."
2003505-52 = "[s] \"This tranquility is Hyakkiyako too... That's very true...\""
2003505-53 = "What's wrong, Sensei? You seem out of breath."
2003505-54 = "You've slowed down. And you look sweaty too."
2003505-55 = "Are you tired already?"
2003505-56 = "[s] \"Sorry...\""
2003505-57 = "You don't need to apologize...but you do need to take care of your health."
2003505-58 = "If you get ill or injured, many students will be sad."
2003505-59 = "Including me, of course..."
2003505-60 = "[s] \"Then please give me time and space to exercise!\""
2003505-61 = "...I'm sorry, Sensei. I can't help you with that."
2003505-62 = "But... Why don't we take a break."
2003505-63 = "Keeping an eye on the tour group's stamina is part of my job."
2003505-65 = "I followed Tsubaki to a nearby rest area..."
2003505-74 = "― [log=츠바키 가이드]*sigh*... My legs are a little sore.[/log][wa:4670] "
2003505-77 = "― [log=츠바키 가이드]These shoes aren't quite broken in yet.[/log][wa:4870] "
2003505-80 = "― [log=츠바키 가이드]What's wrong, Sensei?[/log][wa:1660] "
2003505-81 = "― [log=츠바키 가이드]You're really staring...[/log][wa:1670] "
2003505-84 = "― [log=츠바키 가이드]Huh? I seem...different from my usual self?[/log][wa:6580] "
2003505-87 = "― [log=츠바키 가이드]...That's odd.[/log][wa:3220] "
2003505-90 = "― [log=츠바키 가이드]Heehee. But if you like the me that you see...[/log][wa:5800] "
2003505-91 = "― [log=츠바키 가이드]Maybe that's not a bad thing?[/log][wa:4620] "
2003505-94 = "― [log=츠바키 가이드]Hey... Sensei.[/log][wa:1970] "
2003505-95 = "― [log=츠바키 가이드]I hope we both have sweet dreams tonight.[/log][wa:8590] "
2003505-99 = "[ns1] \"Sometimes, Tsubaki...\"\n[ns2] \"...I feel like I'm caught up in a dream. But in a good way.\""
2003505-102 = "Heehee. What do you mean by that?"
2003505-103 = "You don't know? Today's just been full of interesting topics."
2003505-104 = "However, in order to have good dreams, you must first sleep well."
2003505-105 = "And...if you need tips on how to sleep well, then I'm your guide."
2003505-106 = "How about I stay by your side until you fall asleep."
2003505-107 = "[ns] \"Okay... I'd appreciate that...\""
2003505-117 = "Sensei?"
2003505-121 = "You were really burnt out, huh?"
2003505-125 = "In that case, sleep well, Sensei. I hope you have sweet dreams."
2003505-126 = "And if possible..."
2003505-127 = "Maybe we can talk some more in dreamland."
2003505-132 = "[ns3] \"...Huh?!\"\n[ns4] \"I fell asleep outside! I'm late, I'm late!\""
2003505-135 = "I gently woke up Tsubaki, who was asleep next to me."
2003505-140 = "Hmm? Let me sleep a little longer... "
2003505-144 = "...Huh? You're not Mimori. Sensei?"
2003505-145 = "..."
2003505-149 = "Hello, Sensei. Good morning."
2003505-150 = "[s5] \"...It's a great morning, Tsubaki...\"\n[s6] \"...But we need to get ready for the day ahead!\""
2003505-153 = "...Yeah, okay."
2003505-154 = "I just wish we could have snoozed a little longer..."
2003505-158 = "I consoled the disappointed Tsubaki, then made my way to Schale for work."

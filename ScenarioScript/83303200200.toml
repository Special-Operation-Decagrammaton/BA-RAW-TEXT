[translation]
83303200200-6 = "อ๊ะ ฮินัตจินี่นา"
83303200200-7 = "มาจริงๆ ด้วย"
83303200200-8 = "ก็นะ... ในเมื่อสถานการณ์เป็นแบบนี้ก็คงต้องมาอยู่แล้ว"
83303200200-14 = "ฉันพอจะได้ข่าวมาบ้างแล้ว มีการจัดวางรูปปั้นของมาโคโตะงั้นเหรอ?"
83303200200-15 = "ฮะฮะฮ่าฮ่า~ ใช่แล้วละ! มีเยอะแยะเต็มไปหมดเลย! เห็นแล้วตกใจจนสะดุ้งเฮือกเลยละ ฮะฮะฮ่าฮ่า!!"
83303200200-16 = "ตรงนี้ก็มีอยู่เยอะเลย..."
83303200200-17 = "ไม่ได้มีแค่ในอาคารของคณะกรรมการวินัยหรอกนะ"
83303200200-18 = "ตามที่ได้ยินมา ประธานแพนเดโมเนียม โซไซตี้ไปจ้างพวกเด็กเจ้าปัญหาให้วางรูปปั้นไปทั่วเกเฮนน่า#nเลยละ"
83303200200-19 = "แล้วเรื่องนี้ก็กำลังเป็นประเด็นในโซเชียลเลยด้วย~"
83303200200-20 = "พวกฉันก็เห็นมาจากในโซเชียล ก็เลยตามมาดูเองกับตาน่ะ!"
83303200200-22 = "เฮ้อ..."
83303200200-23 = "ฉันเข้าใจสถานการณ์แล้ว"
83303200200-24 = "ตอนนี้ฉันต้องไปจัดการทุกอย่างให้ราบคาบแล้วละ รวมทั้งเด็กเจ้าปัญหาพวกนั้นด้วย"
83303200200-25 = "อะฮ่าฮ่า~ สู้เค้านะฮินัตจิ~"

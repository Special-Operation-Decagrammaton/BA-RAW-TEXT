[translation]
1011802-1 = "Unexpected Companion"
1011802-2 = "I hopped on a train for a business trip."
1011802-4 = "Attention, passengers on the Platform 2 train..."
1011802-5 = "Due to maintenance issues, departure will be delayed by approximately 20 minutes."
1011802-6 = "[ns] \"Guess I'm going to be late...\""
1011802-8 = "20 minutes later..."
1011802-12 = "Ah, it's finally moving."
1011802-13 = "Way too late, though! They'd better compensate us for this!"
1011802-17 = "Ah, ah. Dear passengers. You can hear me, right?"
1011802-18 = "I'm going to speed up juuust a little bit! Pahyahya!"
1011802-19 = "Wh-What?"
1011802-20 = "[ns] \"Oh, I know that voice...\""
1011802-25 = "[ns] \"Huh?!\""
1011802-31 = "[ns] \"Looks like I got here just in time...\""
1011802-34 = "Hm? Sensei?"
1011802-35 = "[s1] \"Hi, Nozomi.\"\n[s2] \"So you're driving the train today, huh?\""
1011802-38 = "Pahyahya! Yep, it's me!"
1011802-39 = "So what're you doing here?"
1011802-40 = "How do you like my driving, huh?"
1011802-41 = "[s] \"It's incredibly fast...\""
1011802-42 = "Fufufu, I'm always on time."
1011802-43 = "Hope you're not late for anything!"
1011802-44 = "[s] \"Ah, n-no. I think I'll be on time, thanks to you.\""
1011802-45 = "Nice, good to hear."
1011802-46 = "When're you heading back?"
1011802-47 = "[s] \"Evening, I suppose...\""
1011802-48 = "Huh, good luck. Hope to see you when you're done!"
1011802-54 = "And Nozomi took off like the wind."
1011802-56 = "After work, I gave her a call..."
1011802-60 = "Hey, nice timing! I'm coming into Platform 1 right now, so just meet me at the front cabin!"
1011802-64 = "[ns] \"(The front cabin, she said...)\""
1011802-67 = "There you are, Sensei!"
1011802-68 = "[ns] \"Hold on, isn't this...?\""
1011802-69 = "Come on in! We're just about to start up!"
1011802-70 = "Nozomi dragged me into the driver's compartment..."
1011802-71 = "[ns] \"Is it okay for me to be in here...?\""
1011802-72 = "It's fine, it's fine! We'll call it a tour."
1011802-73 = "So, yeah, all aboard!"
1011802-80 = "― [log=노조미]You like the view?[/log][wa:4620] "
1011802-83 = "― [log=노조미]It always looks great around this time of day.[/log]"
1011802-85 = "― [log=노조미]I like it. The sunset, I mean.[/log][wa:1280] "
1011802-88 = "[ns3] \"So cool...!\"\n[ns4] \"Driving a train looks harder than I thought.\""
1011802-91 = "― [log=노조미]Well, it does have an autopilot...[/log][wa:310] "
1011802-92 = "― [log=노조미]...but I don't use it too often.[/log][wa:1720] "
1011802-95 = "― [log=노조미]It's boring, you know? [/log][wa:10] "
1011802-96 = "― [log=노조미]I've got to take driving into my own hands.[/log][wa:1870] "
1011802-99 = "― [log=노조미]Oh...would you like to give it a try, Sensei?[/log][wa:630] "
1011802-102 = "[ns] \"No way! I'm too jittery!\""
1011802-103 = "― [log=노조미]Pahyahya! I'm kidding! [/log][wa:990] "
1011802-106 = "― [log=노조미]Come on, Sensei, you need a license to drive a train.[/log][wa:920] "
1011802-108 = "― [log=노조미]Like I'd just hand the controls to some total newbie.[/log][wa:320] "
1011802-111 = "[ns] \"Yeah, fair point.\""
1011802-113 = "And so, Nozomi drove me back on the train."
1011802-119 = "[ns] \"Thanks for the unique experience, Nozomi.\""
1011802-120 = "Pahyahya! Don't mention it!"
1011802-121 = "It was fun for me too."
1011802-122 = "[ns] \"Next time, though, I'll just buy a normal ticket and stay in my seat.\""
1011802-124 = "[ns5] \"Like you said, I don't have a license.\"\n[ns6] \"I'll just be a regular passenger. Sound good?\""
1011802-127 = "Hmm. Yeah, if you like!"
1011802-128 = "Probably better to keep you away from the controls. Pahyahya!"
1011802-130 = "I bought Nozomi ice cream in return for the good experience."

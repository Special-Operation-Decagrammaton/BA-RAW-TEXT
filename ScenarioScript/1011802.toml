[translation]
1011802-1 = "意外的同行"
1011802-2 = "（搭上列車前去出差）"
1011802-4 = "2號月台列車的乘客請注意。"
1011802-5 = "由於該列車的維修問題，發車時間預計將延後20分鐘。"
1011802-6 = "[ns]「這樣會遲到的……」"
1011802-8 = "（20分鐘後）"
1011802-12 = "啊，終於動了。"
1011802-13 = "也誤點太久了吧～現在怎麼辦？"
1011802-17 = "啊，啊～各位乘客有聽到嗎？"
1011802-18 = "接下來會稍～微加速一下哦！噗哈哈！"
1011802-19 = "什，什麼啊？"
1011802-20 = "[ns]「這個聲音是……」"
1011802-25 = "[ns]「唔哇！？」"
1011802-31 = "[ns]「準時抵達了……」"
1011802-34 = "咦，老師？"
1011802-35 = "[s1]「嗨，希望。」\n[s2]「剛才列車的駕駛員果然是……」"
1011802-38 = "噗哈哈！就是我沒錯！"
1011802-39 = "老師也在那班車上嗎？#n哎呀～還真巧呢！"
1011802-40 = "怎麼樣啊？我的駕駛技術！"
1011802-41 = "[s]「真的是超快的……」"
1011802-42 = "哼哼哼，我開的列車不可能有誤點這種事！"
1011802-43 = "出差沒遲到吧？"
1011802-44 = "[s]「嗯，多虧了你，應該不會遲到。」"
1011802-45 = "是嗎？那就好。"
1011802-46 = "你預計什麼時候回去呀？"
1011802-47 = "[s]「大概傍晚左右……？」"
1011802-48 = "好，那工作完再見吧！結束後記得跟我聯絡！"
1011802-54 = "（希望像風一般消失了……）"
1011802-56 = "（在工作結束後，聯絡了希望……）"
1011802-60 = "時機正好！我現在正在進入1號月台，到車頭來找我吧！"
1011802-64 = "[ns]「剛才是說車頭嗎……」"
1011802-67 = "你來啦，老師！"
1011802-68 = "[ns]「等等，這裡是……」"
1011802-69 = "快進來吧！馬上就要出發了！"
1011802-70 = "（就這樣被希望拉進了駕駛室……）"
1011802-71 = "[ns]「我可以進來這裡嗎……？」"
1011802-72 = "沒關係沒關係！就當作是來參觀的！"
1011802-73 = "來，開始運行～！"
1011802-80 = "― [log=노조미]駕駛室看出去的景色如何啊？[/log][wa:4820] "
1011802-83 = "― [log=노조미]這個時段特別漂亮呢。[/log]"
1011802-85 = "― [log=노조미]我還挺喜歡的……夕陽。[/log][wa:2040] "
1011802-88 = "[ns3]「真帥氣……！」\n[ns4]「列車的駕駛比想像還複雜很多呢。」"
1011802-91 = "― [log=노조미]雖然有自動駕駛系統，[/log][wa:1270] "
1011802-92 = "― [log=노조미]但我並不常用。[/log][wa:2720] "
1011802-95 = "― [log=노조미]畢竟那樣不是很無聊嗎？[/log][wa:40] "
1011802-96 = "― [log=노조미]駕駛果然還是得親手來才行。[/log][wa:3070] "
1011802-99 = "― [log=노조미]哦？老師也想試試看嗎？[/log][wa:1990] "
1011802-102 = "[ns]「不用了！好可怕！」"
1011802-103 = "― [log=노조미]啊哈哈哈～！開個玩笑，開個玩笑啦！[/log][wa:1230] "
1011802-106 = "― [log=노조미]老師又沒有司機的駕照。[/log][wa:2600] "
1011802-108 = "― [log=노조미]再怎麼樣都不會給菜鳥碰的唷。[/log][wa:1880] "
1011802-111 = "[ns]「雖然不甘心，但這是事實沒錯……」"
1011802-113 = "（就這樣搭著希望駕駛的列車回去了）"
1011802-119 = "[ns]「謝謝你讓我有這段特別的經驗，希望。」"
1011802-120 = "噗哈哈！不用這麼誇張啦！"
1011802-121 = "我也覺得很好玩哦！"
1011802-122 = "[ns]「雖然好玩，但我下次還是要付錢坐在客艙裡。」"
1011802-124 = "[ns5]「畢竟我不是駕駛員。」\n[ns6]「老師的位子在客艙，怎麼樣？」"
1011802-127 = "哼嗯～好吧！"
1011802-128 = "誰叫老師是沒執照的菜鳥，這也沒辦法嘛～噗哈哈！"
1011802-130 = "（作為這段特別體驗的回報，買了冰淇淋給希望吃）"

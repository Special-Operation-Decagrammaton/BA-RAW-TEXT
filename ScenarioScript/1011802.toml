[translation]
1011802-1 = "การร่วมทางที่คาดไม่ถึง"
1011802-2 = "(คุณครูขึ้นรถไฟเพื่อไปทำงานนอกสถานที่)"
1011802-4 = "ขอแจ้งผู้โดยสารทุกท่านที่อยู่บนรถไฟในชานชาลาที่ 2"
1011802-5 = "ปัญหาการซ่อมบำรุงรถไฟขบวนดังกล่าวทำให้เราต้องออกเดินทางล่าช้าประมาณ 20 นาทีค่ะ"
1011802-6 = "[ns] \"งั้นก็น่าจะไปสายน่ะสิ...\""
1011802-8 = "(20 นาทีต่อมา)"
1011802-12 = "อ๊ะ ในที่สุดก็ขยับแล้วสินะ"
1011802-13 = "แต่มันช้าไปหรือเปล่า~ ช้าแบบนี้เมื่อไรจะถึงล่ะ?"
1011802-17 = "อ่า... อ่า... ผู้โดยสารทุกท่าน ได้ยินชัดเจนใช่มั้ย?"
1011802-18 = "จากนี้ไปจะขอซิ่ง สักหน่อย~ นะ! วะฮะฮ่า!"
1011802-19 = "อะ... อะไรเนี่ย?"
1011802-20 = "[ns] \"เสียงนี้มัน...\""
1011802-25 = "[ns] \"เหวอ?!\""
1011802-31 = "[ns] \"มาถึงทันเวลาสินะ...\""
1011802-34 = "เอ๋? คุณครู?"
1011802-35 = "[s1] \"สวัสดี โนโซมิเองเหรอเนี่ย?\"\n[s2] \"คนขับรถไฟเมื่อกี้คือโนโซมิเองเหรอ?\""
1011802-38 = "วะฮะฮ่า! ฉันเอง!"
1011802-39 = "คุณครูก็อยู่บนรถไฟด้วยเหรอ? โอ้~ บังเอิญจังเลยนะ"
1011802-40 = "การขับรถไฟของฉันเป็นยังไงบ้าง?"
1011802-41 = "[s] \"ซิ่งเหมือนรถไฟความเร็วสูงเลย...\""
1011802-42 = "ฮุฮุฮุ รถไฟขบวนที่ฉันขับไม่มีทางถึงที่หมายล่าช้าหรอก"
1011802-43 = "คุณครูไปทำงานทันใช่มั้ย?"
1011802-44 = "[s] \"อ่า... อื้อ น่าจะไปทันเวลาอยู่ ขอบใจนะ\""
1011802-45 = "งั้นเหรอ? โล่งอกไปทีนะ"
1011802-46 = "แล้วจะกลับตอนไหนเหรอ?"
1011802-47 = "[s] \"น่าจะช่วงเย็นเลยนะ...? \""
1011802-48 = "โอเค งั้นก็ตั้งใจทำงานนะ! เสร็จงานแล้วติดต่อมาล่ะ!"
1011802-54 = "(แล้วโนโซมิก็หายไปราวกับสายลม...)"
1011802-56 = "(เมื่อเลิกงาน คุณครูก็ติดต่อไปหาโนโซมิ...)"
1011802-60 = "ไนซ์ ไทม์มิ่ง! ตอนนี้ฉันกำลังเข้าชานชาลาที่ 1 คุณครูมาที่หัวขบวนนะ!"
1011802-64 = "[ns] \"ให้ไปที่หัวขบวนเนอะ...\""
1011802-67 = "มาแล้วเหรอ คุณครู!"
1011802-68 = "[ns] \"เดี๋ยวนะ ที่นี่มัน...\""
1011802-69 = "รีบเข้ามาในนี้เร็ว! รถไฟใกล้จะออกแล้ว!"
1011802-70 = "(แล้วคุณครูก็ถูกโนโซมิลากเข้าไปในห้องควบคุม...)"
1011802-71 = "[ns] \"ครูเข้ามาในนี้ได้ด้วยเหรอ...?\""
1011802-72 = "ไม่เป็นไรหรอก ไม่เป็นไร! คิดว่ามาเรียนรู้นอกสถานที่แล้วกัน!"
1011802-73 = "เอาละ งั้นก็ออกเดินทางกันเลย~!"
1011802-80 = "― [log=노조미]วิวจากห้องควบคุมเป็นยังไงบ้าง?[/log][wa:4140] "
1011802-83 = "― [log=노조미]ในเวลานี้วิวสวยมากเป็นพิเศษเลยละ[/log]"
1011802-85 = "― [log=노조미]ฉันชอบพระอาทิตย์ตกดินน่ะ[/log][wa:1520] "
1011802-88 = "[ns3] \"โนโซมิเท่จังเลยนะ...!\" \n[ns4] \"การขับรถไฟมันดูซับซ้อนกว่าที่คิดอีกนะ\""
1011802-91 = "― [log=노조미]เรามีระบบเดินรถอัตโนมัติ [/log][wa:670] "
1011802-92 = "― [log=노조미]แต่ฉันไม่ค่อยได้ใช้หรอก [/log][wa:2040] "
1011802-95 = "― [log=노조미]ก็มันไม่สนุกนี่นา? [/log][wa:10] "
1011802-96 = "― [log=노조미]ต้องควบคุมรถไฟด้วยมือฉันสิ[/log][wa:2550] "
1011802-99 = "― [log=노조미]โอ๊ะ? คุณครูก็ลองดูสักครั้งมั้ยล่ะ?[/log][wa:1030] "
1011802-102 = "[ns] \"ไม่เอา! น่ากลัวออก!\""
1011802-103 = "― [log=노조미]วะฮะฮ่า~! ล้อเล่นหรอกน่า ล้อเล่น! [/log][wa:550] "
1011802-106 = "― [log=노조미]ก็คุณครูไม่มีใบขับขี่รถไฟนี่[/log][wa:1920] "
1011802-108 = "― [log=노조미]ถึงยังไงฉันก็ให้มือใหม่มาขับไม่ได้หรอก[/log][wa:920] "
1011802-111 = "[ns] \"อึก... ถึงจะน่าเจ็บใจ แต่มันก็เป็นเรื่องจริง...\""
1011802-113 = "(แล้วคุณครูก็นั่งรถไฟที่โนโซมิขับกลับมา)"
1011802-119 = "[ns] \"ขอบใจนะโนโซมิ ครูได้เปิดประสบการณ์พิเศษเลยละ\""
1011802-120 = "วะฮะฮ่า! ถึงกับเป็นประสบการณ์พิเศษเลยเหรอ!"
1011802-121 = "ฉันก็สนุกเหมือนกัน!"
1011802-122 = "[ns] \"แต่ครั้งหน้าครูขอซื้อตั๋วแล้วเป็นผู้โดยสารธรรมดาดีกว่า\""
1011802-124 = "[ns5] \"ก็ครูไม่ใช่พนักงานขับรถไฟนี่เนอะ\"\n[ns6] \"ครูควรอยู่ในห้องโดยสารมากกว่าน่ะ\""
1011802-127 = "ฮืม~ เอางั้นก็ได้!"
1011802-128 = "ก็คุณครูเป็นมือใหม่ที่ไม่มีใบขับขี่นี่นา! งั้นก็ช่วยไม่ได้ละนะ~ วะฮะฮ่า!"
1011802-130 = "(แล้วคุณครูก็ซื้อไอศกรีมให้โนโซมิเป็นการตอบแทนสำหรับประสบการณ์ในห้องควบคุมรถไฟในครั้งนี้)"

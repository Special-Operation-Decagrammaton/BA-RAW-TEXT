[translation]
52230-1 = "#title;제23화;사면화락"
52230-2 = "3;시즈코;04;네? 이 상황에 와라쿠 축제를 속행한다고요?!\n#3;a\n#3;em;[?!]\n#3;shake"
52230-3 = "5;카호;02;그렇습니다. 축제에 필요한 기재의 준비는 끝난 상태이지요?\n#5;a\n#3;m1"
52230-4 = "3;시즈코;06;네. 그건 그렇지만……\n#3;em;[반응]"
52230-5 = "3;시즈코;06;이렇게 혼란스러운 상황인데, 축제가 제대로 진행될 수 있을까요?"
52230-6 = "3;시즈코;04;곳곳에서 괴물들이 나타나는 바람에 시민들이 공포에 빠졌는데, 이대로 축제를 속행한다 하더라도……\n#3;stiff\n#3;em;[땀]"
52230-7 = "5;카호;99;열심히 축제를 준비해 주신 마츠리부 여러분께는 죄송한 말씀입니다만."
52230-8 = "5;카호;02;지금 당장은 축제의 성공적인 개최보다는, 축제가 진행되고 있다는 사실 자체를 주변에 보여주는 것이 더 중요합니다."
52230-9 = "5;카호;01;관람객들의 웃음소리가 흘러넘쳐야 할 축제장이, 비명과 소음으로 가득 차 있는 건 절대 '조화로운' 상황이 아니니까요."
52230-10 = "3;시즈코;06;하지만……\n#3;em;…"
52230-11 = "5;카호;99;물론 저 역시 이 상황에 축제를 속행하는 것 자체가 위험한 일이라는 것은 인지하고 있습니다."
52230-12 = "5;카호;02;저 또한 치세 쨩을 위험한 무대에 올리고 싶지는 않았지만……"
52230-13 = "5;카호;01;지금의 저희가 할 수 있는 일은 준비한 바를 계속하는 것뿐이니까요."
52230-14 = "#st;[0,0];instant;1;"
52230-15 = "#clearST"
52230-16 = "3;시즈코;06\n5;카호;01\n#3;em;[속상함]\n#3;h\n#5;h\n#wait;1500"
52230-17 = "5;카호;99;위험한 일인 만큼, 마츠리부에서 끝까지 돕지 않으셔도 괜찮습니다."
52230-18 = "5;카호;01;축제에 필요한 기재의 운용법만 알려주시면, 이후 진행은 저희 음양부에서 도맡겠습니다."
52230-19 = "#st;[0,0];instant;1;"
52230-20 = "#clearST"
52230-21 = "3;시즈코;06\n5;카호;01\n#3;em;…\n#3;h\n#5;h\n#wait;2500"
52230-22 = "1;우미카;05;저, 저는 끝까지 돕고 싶어요!\n#1;ar\n#3;m5\n#5;dr\n#1;em;[!]\n#fontsize;80"
52230-23 = "3;시즈코;02;……우미카?\n#3;em;[?]"
52230-24 = "1;우미카;06;지난번 등불 축제 때도 불의의 습격에 기절한 탓에 축제 내내 아무것도 하지 못했는데, 또 같은 꼴이 벌어지는 걸 보고만 있으라니……\n#1;stiff"
52230-25 = "#st;[0,0];instant;1;"
52230-26 = "#clearST"
52230-27 = "1;우미카;06\n3;시즈코;02\n#1;m3\n#3;dr\n#1;h\n#3;h\n#wait;800"
52230-28 = "1;우미카;05;마츠리부의 일원으로서 용납할 수 없어요!\n#1;em;[!]\n#1;closeup\n#fontsize;80"
52230-29 = "#st;[0,0];instant;1;"
52230-30 = "#clearST"
52230-31 = "1;우미카;05\n#1;d\n#1;closeup\n#wait;1000"
52230-32 = "#wait;2000"
52230-33 = "3;피나;05;저도 마찬가지입니다, 부장!\n#3;a\n#3;em;[반응]"
52230-34 = "3;피나;99;축제란 즐겁기에 행하는 것이 아닌, 즐겁기 위해 행하는 것."
52230-35 = "3;피나;05;이를 시기한 외부의 세력들이 방해한다고 해서 축제를 열지 못한다면, 그 어떤 축제도 열릴 수 없을 겁니다!"
52230-36 = "3;피나;06;지난 축제 때는 분하게도 아무것도 하지 못했지만……\n#3;stiff"
52230-37 = "3;피나;05;불초 피나, 이번 축제만큼은 전력으로 불한당들이 축제를 방해하지 못하도록 경비에 만전을 다하겠습니다!\n#3;em;[!]\n#3;closeup"
52230-38 = "3;시즈코;06;……솔직히 말하자면.\n#3;em;…"
52230-39 = "3;시즈코;05;저도 속이 부글부글 끓어오르던 참이었어요."
52230-40 = "3;시즈코;06;이 축제가 열리기를, 백귀야행의 많은 학생들이 얼마나 오래 기다려 왔는데."
52230-41 = "3;시즈코;05;이 축제를 준비하기 위해, 저희 마츠리부를 포함해 얼마나 많은 사람들이 노력해 왔는데……\n#3;stiff"
52230-42 = "3;시즈코;05;풍류인지, 괴담인지 하는 궤변 같은 핑계로 두 번이나 축제에 훼방을 놓다니…… 절대로 용서할 수 없어요!\n#3;closeup"
52230-43 = "3;치세;02;오오~\n#3;em;[반짝]"
52230-44 = "3;시즈코;05;카호 님, 와라쿠 축제를 속행하는 것이 그 화조풍월부인가 뭔가 하는 녀석들의 계획을 막을 수 있는 수단인가요?"
52230-45 = "5;카호;99;저도 확신은 할 수 없지만…… 축제가 속행되는 것이 그들이 원하는 바는 아니겠지요.\n#3;m2\n#5;al"
52230-46 = "3;시즈코;05;그럼, 저희가 가장 잘하는 [ruby=축제]일[/ruby]로 한 방 먹여주자고요!\n#3;hophop\n#3;em;[스팀]"
52230-47 = "3;츠쿠요;05;저, 저희에게도 맡겨주세요!\n#3;em;[!]\n#5;hide"
52230-48 = "3;츠쿠요;05\n2;이즈나;03;네! 이즈나도, 츠쿠요 공도, 부장도! 분골쇄신의 각오로 여러분과 함께할 테니까요! 닌닌!\n#2;ar\n#3;m4\n#2;em;[재잘]"
52230-49 = "3;미치루;07;아, 아니. 그 정도로 깊은 각오를 하고 온 건 아니었지만……\n#3;stiff\n#2;hide"
52230-50 = "#st;[0,0];instant;1;"
52230-51 = "#clearST"
52230-52 = "3;미치루;99\n#wait;1000"
52230-53 = "3;미치루;01;그래도 선생 공의 부탁도 있었으니까…… 닌자로서 의뢰는 끝까지 수행해야지."
52230-54 = "3;미치루;03;와라쿠 축제, 한번 즐겨보자구~!\n#3;em;[재잘]"
52230-55 = "3;미치루;03\n4;츠쿠요;03;오오, 불타오르네요!\n#3;m2\n#4;a\n#4;em;[음표]"

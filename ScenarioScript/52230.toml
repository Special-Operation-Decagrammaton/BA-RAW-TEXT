[translation]
52230-1 = "Episode 23;Festive Songs For All"
52230-2 = "What? You want to go ahead with the Waraku Festival? Now?!"
52230-3 = "Yes. All the necessary equipment is already prepared, correct?"
52230-4 = "Well, yeah, but still..."
52230-5 = "How are we supposed to hold a festival in the middle of all this?"
52230-6 = "There are monsters everywhere, and the citizens are terrified. Even if we try to pretend everything is fine and dandy..."
52230-7 = "To each of you, who take pride in your festivals and have put so much effort into this day, I apologize for saying this..."
52230-8 = "...but right now people knowing that the festival will go on takes priority over its actual success."
52230-9 = "Festivals are meant to be the very embodiment of cheer and celebration, yet ours may well be marked with sheer terror. At a glance, it would seem to be the opposite of balance."
52230-10 = "But..."
52230-11 = "I know. Forcing the festival under these circumstances puts everyone at risk."
52230-12 = "Even now, my insides rebel at the idea of putting Chise on the stage, right in the middle of that danger."
52230-13 = "But this is all that's left within our power."
52230-17 = "The Festival Department need not stay until the end. Take shelter where you can."
52230-18 = "Please just teach us to operate the equipment, and the Yin-Yang Club will handle the rest."
52230-22 = "I-I want to help! Until the very end!"
52230-23 = "...Umika?"
52230-24 = "Last time, at the lantern festival, I passed out and was completely useless... And you want me to just sit by and let history repeat itself?"
52230-28 = "I'm a proud member of the Festival Department, and I won't accept that!"
52230-33 = "Me too, President!"
52230-34 = "We don't throw festivals because they're fun, we throw them to have fun!"
52230-35 = "If we allow petty outsiders to make us stumble in our ideals, then that would mean the end of festivals forever!"
52230-36 = "I could not rise to the occasion last time..."
52230-37 = "...but not today! Today, I will do my utmost to drive off these ruffians! I will guard the festival with my life!"
52230-38 = "...If I'm being honest..."
52230-39 = "I'm boiling with anger too."
52230-40 = "The students of Hyakkiyako have been looking forward to this festival for so long."
52230-41 = "And it's not just our department. Students, civilians, vendors... They've put their blood, sweat, and tears into making it happen."
52230-42 = "Forget their elegance! Forget their ghost stories! Disrupting our beloved festivals not just once, but twice, with that baloney is unforgivable in my book!"
52230-43 = "Yeah, yeah!"
52230-44 = "Kaho, will holding the Waraku Festival stop Nature's Beauty, or whatever they are?"
52230-45 = "I can't promise that. But I do know that it's the last thing they would want."
52230-46 = "In that case, let's show them exactly what Hyakkiyako's about!"
52230-47 = "L-Let us help too!"
52230-48 = "Yes! Izuna, Tsukuyo, and the president! The three of us will stand by your side and give our whole hearts to this mission! Nin-nin!"
52230-49 = "Oh... I don't know about all that..."
52230-53 = "But Sensei gave us this mission. And as a ninja, it's my duty to see it through to the end."
52230-54 = "Let's enjoy the Waraku Festival to the fullest!"
52230-55 = "Oooh... I'm really fired up!"
52230-60 = "In that case, you'll have to go on stage soon, Chise. Have you prepared your song?"
52230-61 = "Yes. All prepared and ready."
52230-62 = "We'll keep you safe, so you can just focus on your performance, okay?"
52230-67 = "*inhale*"
52230-68 = "Okay! Hi, everyone!"
52230-69 = "Please...listen to my song!"

52230-58 = "3;미치루;03\n4;츠쿠요;03\n#3;d\n#4;d\n#3;h\n#4;h\n#wait;1200"
52230-59 = "2;치세;01\n4;카호;01\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1000"
52230-60 = "2;치세;01\n4;카호;02;치세 쨩. 잠시 후에 바로 무대에 올라가야 하는데…… 부르기로 한 노래, 기억하고 있나요?\n#3;hide"
52230-61 = "2;치세;03\n4;카호;02\n#na;치세;응. 기억하고 있어.\n#2;h\n#2;em;[음표]"
52230-62 = "2;치세;03\n4;카호;01;무대 아래의 경호는 저희가 맡을 테니, 공연을 부탁드리겠습니다."

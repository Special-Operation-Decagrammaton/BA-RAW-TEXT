[translation]
52230-1 = "ตอนที่ 23;บทเพลงแห่งความปรองดอง"
52230-2 = "คะ? จะให้จัดเทศกาลวาราคุต่อในสถานการณ์แบบนี้เหรอคะ?!"
52230-3 = "ใช่ค่ะ เตรียมอุปกรณ์ที่จำเป็นสำหรับงานเทศกาลเสร็จหรือยังคะ?"
52230-4 = "ค่ะ อุปกรณ์ทุกอย่างเตรียมไว้พร้อมแล้วก็จริง..."
52230-5 = "แต่ในสถานการณ์ที่วุ่นวายแบบนี้ ทุกอย่างในเทศกาลจะราบรื่นเหรอคะ?"
52230-6 = "พวกปีศาจก็โผล่มาจนชาวเมืองพากันหวาดกลัว ต่อให้จัดเทศกาลต่อในตอนนี้ก็คง..."
52230-7 = "ฉันขอโทษที่ต้องพูดอย่างนี้กับชมรมจัดงานเทศกาลที่อุตส่าห์เตรียมงานกันมาอย่างหนักนะคะ"
52230-8 = "แต่ตอนนี้สิ่งสำคัญไม่ใช่การจัดเทศกาลอย่างสมบูรณ์แบบ แต่เป็นการบอกให้ทุกคนรู้ว่างานเทศกาล#nกำลังเกิดขึ้นอยู่ตามเดิมค่ะ"
52230-9 = "ถ้าสถานที่จัดงานเทศกาลเต็มไปด้วยเสียงกรีดร้องแทนที่จะเป็นเสียงหัวเราะของผู้มาชมงาน งั้นมันก็เป็นสถานการณ์ที่ไม่ 'กลมกลืน' สิคะ"
52230-10 = "แต่ว่า..."
52230-11 = "แน่นอนว่าฉันก็คิดว่าการจัดงานเทศกาลท่ามกลางสถานการณ์นี้เป็นเรื่องอันตรายค่ะ"
52230-12 = "แล้วฉันเองก็ไม่อยากให้ชิเซะจังไปอยู่บนเวทีที่เสี่ยงอันตรายด้วย..."
52230-13 = "แต่ตอนนี้สิ่งที่พวกฉันทำได้มีแค่การจัดงานต่อตามที่เตรียมมาค่ะ"
52230-17 = "นี่เป็นงานที่อันตราย ทางชมรมจัดงานเทศกาลไม่ต้องอยู่ช่วยจนจบงานก็ได้ค่ะ"
52230-18 = "แค่บอกว่าต้องใช้อุปกรณ์อะไรยังไงก็พอค่ะ แล้วพวกฉันชมรมหยินหยางจะรับช่วงต่อเอง"
52230-22 = "ฉะ... ฉันอยากช่วยจนจบงานเลยค่ะ!"
52230-23 = "อุมิกะ...?"
52230-24 = "ตอนเทศกาลโคมไฟคราวก่อน ฉันหมดสติเพราะถูกโจมตีไม่ทันตั้งตัว ก็เลยไม่ได้ช่วยอะไรเลยตลอด#nงานเทศกาล แล้วตอนนี้จะให้ฉันทนเห็นเหตุการณ์ซ้ำๆ โดยไม่ทำอะไรงั้นเหรอคะ..."
52230-28 = "ในฐานะสมาชิกชมรมจัดงานเทศกาล ฉันทำแบบนั้นไม่ได้ค่ะ!"
52230-33 = "ฉันก็ด้วยค่ะ หัวหน้า!"
52230-34 = "เราไม่ได้จัดงานเทศกาลเพราะความสนุก แต่จัดเพื่อให้เกิดความสนุกขึ้นต่างหาก"
52230-35 = "ถ้าจัดงานเทศกาลไม่ได้เพียงเพราะมีปัจจัยภายนอกที่ริษยาความสนุกมาขัดขวางเรา ถ้างั้นไม่ว่างานเทศกาลอะไรก็จัดไม่ได้หรอกค่ะ!"
52230-36 = "ฉันโกรธมากที่ตัวเองทำอะไรไม่ได้เลยในงานเทศกาลครั้งก่อน..."
52230-37 = "แต่กับงานครั้งนี้ พีน่าจะคุ้มกันอย่างเต็มที่เพื่อไม่ให้ใครหน้าไหนมารบกวนงานเทศกาลของเราได้ค่ะ!"
52230-38 = "ถ้าให้พูดตามตรงเลยละก็..."
52230-39 = "ฉันเองก็โกรธจนหัวร้อนปุดๆ อยู่เหมือนกันค่ะ"
52230-40 = "นักเรียนหลายคนของเฮียกคิยาโคตั้งตารองานเทศกาลนี้กันมาตั้งนาน"
52230-41 = "นอกจากพวกเราชมรมจัดงานเทศกาล ก็ยังมีอีกหลายคนที่มาช่วยเตรียมงานครั้งนี้..."
52230-42 = "แต่พวกนั้นเอาความสง่างามหรือเรื่องลึกลับเหลวไหลมาเป็นข้ออ้างในการทำลายงานของเรา#nเป็นครั้งที่ 2 แล้ว... ฉันยกโทษให้ไม่ได้เด็ดขาดค่ะ!"
52230-43 = "โอ้~"
52230-44 = "คุณคาโฮะ การจัดเทศกาลวาราคุจะเป็นการขัดขวางแผนการของพวกชมรมความงามของธรรมชาติ#nหรืออะไรนั่นเหรอคะ?"
52230-45 = "ฉันเองก็ไม่แน่ใจเหมือนกัน... แต่ฉันคิดว่าพวกนั้นไม่อยากให้งานเทศกาลดำเนินต่อไปได้ค่ะ"
52230-46 = "เอาละค่ะ งั้นก็มาทำสิ่งที่พวกเราทำได้ดีที่สุดกันค่ะ มาใช้งานเทศกาลจัดการพวกนั้นให้หงายไปเลย!"
52230-47 = "พะ... พวกฉันก็จะช่วยอีกแรงค่ะ!"
52230-48 = "ค่ะ! ทั้งอิซุนะ ท่านสึคุโยะ แล้วก็หัวหน้าด้วยค่ะ! พวกฉันจะอยู่กับทุกคนแล้วช่วยเหลืออย่างสุดแรงเกิด#nเลยค่ะ! นินนิน!"
52230-49 = "ดะ... เดี๋ยวก่อน ข้าน้อยไม่ได้เตรียมตัวมาใส่จนสุดแรงเกิด..."
52230-53 = "แต่ในเมื่อได้รับคำขอร้องจากท่านอาจารย์มา ในฐานะนินจาก็ต้องทำภารกิจให้สำเร็จละนะ"
52230-54 = "งั้นก็มาสนุกกับเทศกาลวาราคุกันเลย~!"
52230-55 = "โอ้ นี่ละค่ะหัวหน้าของเรา!"
52230-60 = "ชิเซะจัง ใกล้จะถึงคิวขึ้นเวทีแล้ว... จำเพลงที่ต้องร้องได้มั้ยคะ?"
52230-61 = "อื้อ จำได้"
52230-62 = "พวกฉันจะดูแลเรื่องความปลอดภัยโดยรอบให้เอง ขอฝากเรื่องการแสดงบนเวทีด้วยนะคะ"
52230-67 = "ฮู่ว..."
52230-68 = "เอาละ ทุกคน~"
52230-69 = "มาฟังเพลง... ของฉันกัน!"

[translation]
52230-1 = "第23話;四面和樂"
52230-2 = "咦？在這種情況下還要繼續舉辦和樂祭！？"
52230-3 = "沒錯。祭典所需的設備已經準備完成了吧？"
52230-4 = "雖然是這樣沒錯……"
52230-5 = "不過在這麼混亂的情況下，祭典真的能順利進行嗎？"
52230-6 = "到處都出現怪物，市民們也陷入了恐慌。#n就算強行舉辦下去……"
52230-7 = "對於辛苦準備祭典的節慶營運管理部的各位，我也感到很過意不去……"
52230-8 = "然而現在比起確保祭典的成功，更重要的是讓周圍看到「祭典仍在進行」的事實。"
52230-9 = "本應充滿笑聲的會場，如今卻被尖叫和噪音籠罩……#n這絕對稱不上是「和諧」的狀態。"
52230-10 = "可是……"
52230-11 = "當然，我明白在這種情況下繼續舉辦祭典是件危險的事。"
52230-12 = "我也不希望讓知世醬站上危險的舞台……"
52230-13 = "但是現在我們能做的，就只有繼續完成已經準備好的事而已。"
52230-17 = "考量到現場的危險性，節慶部的各位不必勉強留下來幫忙。"
52230-18 = "只要把祭典設備的操作方法告訴我們，後續交給陰陽部來處理就可以了。"
52230-22 = "我，我想留下來幫忙！"
52230-23 = "……海花？"
52230-24 = "上次燈籠祭時，我因為昏倒而什麼都沒能做到……#n要是這次又眼睜睜看著相同的事情發生……"
52230-28 = "身為節慶營運管理部的一員，我絕不能接受！"
52230-33 = "我也一樣，部長！"
52230-34 = "祭典不是因為快樂才舉辦，而是為了快樂而舉辦的！"
52230-35 = "如果遇到外部勢力的干擾就中止的話，就沒有任何祭典能夠舉辦了！"
52230-36 = "儘管上次的無能為力確實很令人懊悔……"
52230-37 = "但不肖菲娜，這次一定會拚盡全力，確保這些惡徒無法破壞祭典的！"
52230-38 = "……老實說。"
52230-39 = "我心裡也早就憋了一肚子火。"
52230-40 = "這場祭典，百鬼夜行的學生們不知道已經盼望了多久……"
52230-41 = "為了準備這場祭典，包括我們節慶部在內，有多少人付出了努力……"
52230-42 = "結果居然因為什麼風雅、怪談之類的詭辯而兩度破壞祭典……絕對不能原諒！"
52230-43 = "哦哦～"
52230-44 = "佳穗大人，只要繼續舉辦和樂祭，就能阻止那個什麼花鳥風月部的計畫嗎？"
52230-45 = "這點我也無法完全斷定……不過祭典的繼續舉辦，應該不是他們想看見的結果才對。"
52230-46 = "既然如此，就用我們的[ruby=祭典]拿手好戲[/ruby]來狠狠教訓他們吧！"
52230-47 = "我，我們也來幫忙！"
52230-48 = "沒錯！伊樹菜、月夜閣下和部長都會拚盡全力，與大家並肩作戰！忍忍！"
52230-49 = "啊，啊不是……其實我本來沒打算做到這種程度……"
52230-53 = "但既然這是老師的委託……身為忍者就必須完成。"
52230-54 = "一起來好好享受和樂祭吧～！"
52230-55 = "哦哦，燃起來了！"
52230-60 = "知世醬，馬上就要上台了……還記得要唱的歌嗎？"
52230-61 = "嗯，記得唷。"
52230-62 = "那麼舞台的警備由我們來處理，演出就交給你了。"
52230-67 = "呼……"
52230-68 = "大家～"
52230-69 = "聽聽……我的這首歌吧！"

33180-14 = "...?"
33180-17 = "Gyaaaaaah?!"
33180-18 = "S-Sensei?! What brings you here...?"
33180-19 = "Whoa! You can already move, Tsurugi?! I guess you're not the president of the Justice Task Force for nothing."
33180-22 = "You're looking well, Sensei."
33180-23 = "[s] \"Yeah, thanks to you.\""
33180-24 = "I'm glad the treatment worked out in the end. It was my first time caring for an adult."
33180-25 = "Sensei..."
33180-26 = "You shouldn't be out of bed yet, Chinatsu. Go lie down. Don't make me pull the seniority card."
33180-27 = "B-But I'm part of the Prefect Team now..."
33180-28 = "The door is always open for you to return to the Medical Emergency Club. I'll see to it that you only work with the highest quality cadavers. Er, patients, I mean to say."
33180-29 = "I think I'll have to decline..."
33180-34 = "Sensei... "
33180-35 = "What do you think you're doing, Ako? You shouldn't move ye—gah."
33180-36 = "[s] \"Take it easy, you two. I'm fine.\""
33180-37 = "But the president is still missing..."
33180-38 = "She's not in her office, and I can't get ahold of her."
33180-39 = "Sensei. Please..."
33180-40 = "[s] \"Don't worry. I'll find Hina.\""
33180-41 = "Thank you, Sensei. We're counting on you."
33180-45 = "Sensei..."
33180-46 = "[s] \"Hey, Hifumi.\""
33180-47 = "Sensei, it's Azusa. She's..."
33180-48 = "..."
33180-49 = "..."
33180-50 = "She's fighting all by herself. She's out there all alone, still struggling..."
33180-51 = "[s] \"I know.\""
33180-52 = "I don't know what to do. I don't know how to help her..."
33180-53 = "Is there anything an ordinary girl like me can do to help?"
33180-54 = "I know it's dangerous, but there has to be a way. I want to help Azusa."
33180-55 = "..."
33180-56 = "Y-Yeah! We can't just leave her like this!"
33180-57 = "Koharu..."
33180-58 = "I-I know what it feels like to be all alone too. To be left behind... We can't just abandon her! "
33180-59 = "I agree. I can only imagine how lonely she is right now."
33180-60 = "[s] \"This is why you're the Make-Up Work Club's leader, Hifumi.\""
33180-61 = "I'm what...?"
33180-62 = "[s1] \"Your resiliency is what's led us here.\"\n[s2] \"Ordinary or not, you've never given up.\""
33180-63 = "We've all worked hard, but we only got this far because you were our club president."
33180-64 = "We've all worked hard, but we only got this far because you were our club president."
33180-65 = "That's right. None of us would be standing here if not for you, Hifumi."
33180-66 = "Hanako... Koharu..."
33180-67 = "[s3] \"And whenever you get a little lost, you can come to me.\"\n[s4] \"Listening and helping is my job, after all.\""
33180-68 = "..."
33180-69 = "..."
33180-70 = "All right. I get it completely."
33180-71 = "I've learned my lesson. I won't give up, and I won't get down on myself."
33180-72 = "I'll do whatever it takes!"
33180-73 = "So let's go, Sensei. We're going to save Azusa."
33180-74 = "[s5] \"Attagirl.\"\n[s6] \"You got it. I'll follow your lead like always.\""
33180-77 = "We'll do it together—for Azusa's sake."
33180-78 = "That's right! Because she's our friend!"
33180-79 = "Things are going to be different when I talk to her this time. "
33180-83 = "I take it there's something you need to tell her."
33180-84 = "Right. "
33180-85 = "Everyone keeps telling us that we're wrong...about the world...and its truths. So there's something I need to get off my chest."
33180-86 = "I refuse to believe what Azusa said...about the real world."
33180-87 = "Hifumi?"
33180-91 = "[ns] \"Sometimes friends have to speak their minds to one another.\""
33180-92 = "Exactly! This time I'm going to get through to Azusa and everyone else!"
33180-93 = "Of course, Hifumi. I'll also be listening with bated breath. Let everyone know how you feel."
33180-94 = "Worry about that later. We gotta get going!"
33180-97 = "Gathering people, persuading them, communicating, understanding..."
33180-98 = "Sensei is trying to unite students of Trinity and Gehenna after they've been torn apart yet again."
33180-99 = "Even as we speak, the Saint Justina Council are carrying the will of Arius' resentment as they march on Trinity and Gehenna. "
33180-100 = "Yet there you are, still persuading and pleading..."
33180-101 = "...little by little, uniting us under one cause."
33180-106 = "While Azusa is still trying to stop Arius all by herself."
33180-107 = "At the old cathedral."
33180-108 = "The same place left in ruins—symbolic of the paradise lost."
33180-109 = "That is where Arius, Azusa, and Sensei will clash."
33180-111 = "..."
33180-112 = "..."
33180-113 = "Azusa..."
33180-117 = "Saori..."
33180-118 = "How dare you harm Hime?! You're going to answer for what you did!"
33180-119 = "I'll stop you, Saori. If it's the last thing I do."
33180-120 = "I'd like to see you try!"
33180-122 = "Do you think you can extinguish our animosity?! Our hatred?! Our resentment?!"
33180-123 = "I will. If maliciousness is what I lack, then I'll find it. If I have to kill you, then I will."
33180-131 = "AZUSA!"
33180-132 = "And if it means that I can never return to their world, then I'll bid it farewell."
33180-134 = "Next Episode;Our Stories"

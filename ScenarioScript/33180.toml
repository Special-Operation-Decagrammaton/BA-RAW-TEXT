[translation]
33180-1 = "第18話;毫無迷惘"
33180-2 = "……"
33180-3 = "[s] 看向蓮實的方向"
33180-4 = "……老師。"
33180-5 = "這裡是……究竟怎麼……"
33180-6 = "[s]「蓮實，太好了……」"
33180-7 = "……是的。非常驚險……"
33180-8 = "弦生，大家呢……"
33180-12 = "……"
33180-13 = "[s] 看向弦生的方向"
33180-14 = "……？"
33180-17 = "呀啊啊啊啊啊！？"
33180-18 = "老，老老老老師！？為，為什麼在這裡……！？"
33180-19 = "啊，弦生同學！呃，已經可以動了嗎！？不愧是實現正義部的部長呢！"
33180-22 = "……您沒事真是太好了，老師。"
33180-23 = "[s]「這都是多虧了瀬奈唷。」"
33180-24 = "不會。雖然大人的治療是第一次，無論如何真是太好了。"
33180-25 = "老師……"
33180-26 = "千夏，妳還不可以活動。請躺好，這是前輩命令。"
33180-27 = "我，現在是所屬於風紀委員會……"
33180-28 = "現在回來急救醫學部也可以唷？品質良好的屍……不，傷患可以隨意地觸碰。"
33180-29 = "不，我並不想……請容我鄭重拒絕。"
33180-34 = "老師……"
33180-35 = "亞子醬妳還不能，咕……！"
33180-36 = "[s]「亞子和伊織也是，先不說傷勢，妳們沒事真是太好了……」"
33180-37 = "委員長不知去向……"
33180-38 = "也不在社辦，又聯絡不上……"
33180-39 = "老師，請把委員長……"
33180-40 = "[s]「嗯，交給我。」"
33180-41 = "……好的。拜託您了。"
33180-45 = "老師……"
33180-46 = "[s]「日步美……」"
33180-47 = "老師，梓醬她……"
33180-48 = "……"
33180-49 = "……"
33180-50 = "梓醬一個人在戰鬥……還是，一直一個人……"
33180-51 = "[s]「……嗯。」"
33180-52 = "說是容身之處不一樣……然後我，就什麼都搞不……"
33180-53 = "變成這麼嚴重的事……像我這樣普通的學生可以做的事情已經……"
33180-54 = "該怎麼做，才能把梓醬……因為，我……"
33180-55 = "……"
33180-56 = "就算這樣，也不能放著不管吧！？"
33180-57 = "小春醬……"
33180-58 = "和立場什麼的沒有關係！我，我知道的……！一個人之類的，被丟下之類的，那是非常難過的！所以，不能讓梓一個人……！"
33180-59 = "……沒錯。因為那樣，很寂寞呢。"
33180-60 = "[s]「至今為止，一直都是日步美帶領著我們。」"
33180-61 = "……？"
33180-62 = "[s1]「當然也有大家的努力，不過因為日步美努力到了現在。」\n[s2]「就算平凡，也不放棄妳們自己的目標。」"
33180-63 = "我努力了。但是在這個背後，有妳幫我做了很多麻煩事，也作為部長做了很多事……多虧了妳我才能努力，我很清楚知道。"
33180-64 = "我努力了。但是在這個背後，有妳幫我做了很多麻煩事，也作為部長做了很多事……多虧了妳我才能努力，我很清楚知道。"
33180-65 = "就是說呀。因為日步美醬沒有放棄，我也才能像這樣在這裡。"
33180-66 = "小春醬，花子醬……"
33180-67 = "[s3]「所以沒關係。真的不知道的時候，我也在。」\n[s4]「就算現在不行。一起煩惱、商量，解決吧。」"
33180-68 = "……"
33180-69 = "……"
33180-70 = "……好的，謝謝你們。"
33180-71 = "我也確實學到了。不放棄，不一直去煩惱。"
33180-72 = "我要，做我可以做到的……！"
33180-73 = "……去幫助梓醬。"
33180-74 = "[s5]「……日步美，一直都是這樣呢。」\n[s6]「我也一樣，會幫助日步美唷。」"
33180-77 = "那麼，大家一起去吧。"
33180-78 = "唔，嗯！要去救，朋友才行……！"
33180-79 = "和梓醬見面，這次一定要……"
33180-83 = "……想說的話，必須傳達才行呢？"
33180-84 = "……是的。"
33180-85 = "要確實的，傳達才行。"
33180-86 = "不能待在同一個世界什麼的，我……"
33180-87 = "日步美……？"
33180-91 = "[ns]「就算是朋友，不說出來也是沒辦法傳達的。」"
33180-92 = "……是的！這次，一定要說清楚……！"
33180-93 = "說得沒錯呢。我也會，確實陪在妳身邊。"
33180-94 = "那個……總，總之要去吧？那走吧，快點！"
33180-97 = "集結大家，溝通……接著聯繫彼此，相互理解。"
33180-98 = "三一和格黑娜的學生，漸漸的……"
33180-99 = "在這個包含著奧利斯的憎恨的優斯提娜聖徒會進攻三一和格黑娜的現在。"
33180-100 = "向誰請求協助，互相請求……"
33180-101 = "像這樣漸漸的，互相依偎。"
33180-106 = "在這之中，單獨阻止奧利斯小隊的梓她……"
33180-107 = "古教堂。"
33180-108 = "正前往掛著樂園之名，現在卻已經變成廢墟的那個場所。"
33180-109 = "梓、奧利斯小隊。然後老師也，正朝著那邊……"
33180-111 = "……"
33180-112 = "……"
33180-113 = "梓……"
33180-117 = "……"
33180-118 = "竟敢，竟敢把公主……！絕對不原諒妳……！"
33180-119 = "我，會阻止沙織給妳看的。就算會兩敗俱傷。"
33180-120 = "憑妳怎麼可能做到啊！！"
33180-122 = "我們的憤怒、憎恨、仇恨！妳以為妳能承受嗎！！"
33180-123 = "……我要，成為殺人兇手。"
33180-131 = "梓────！！"
33180-132 = "……就算，再也沒辦法回到那個世界。"
33180-134 = "下一話;我們的故事"

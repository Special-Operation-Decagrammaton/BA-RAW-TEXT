[translation]
33180-1 = "Episode 18;Without a Moment's Hesitation"
33180-2 = "..."
33180-3 = "[s] Smile for Hasumi as she wakes up."
33180-4 = "Sensei."
33180-5 = "Where am I? What happened...?"
33180-6 = "[s] \"I'm glad you're all right.\""
33180-7 = "So am I. I thought my halo was going to be destroyed..."
33180-8 = "What about Tsurugi and the others?"
33180-12 = "..."

[translation]
33180-1 = "ตอนที่ 18;ไม่หวั่นไหว"
33180-2 = "..."
33180-3 = "[s] ทักทายฮาสุมิที่เพิ่งฟื้น"
33180-4 = "คุณครู..."
33180-5 = "ที่นี่คือ... นี่มัน... เกิดอะไรขึ้น..."
33180-6 = "[s] \"ครูเป็นห่วงมากเลยนะ ฮาสุมิ\""
33180-7 = "... นั่นสิคะ... ฉันคิดว่าฮาโลถูกทำลายไปแล้วเลยละค่ะ..."
33180-8 = "ซึรุกิล่ะคะ... แล้วคนอื่นๆ..."
33180-12 = "..."
33180-13 = "[s] ทักทายซึรุกิที่เพิ่งฟื้น"
33180-14 = "เคี๊ยก...?"
33180-17 = "คะคะ...เคี๊ยกกกกกก?!"
33180-18 = "คะ... คะ... คุณครู?! ทำไมถึง... ทะ...ที่นี่คือ...?!"
33180-19 = "อ๊ะ... คะ...คุณซึรุกิ?! ลุกขึ้นได้แล้วเหรอคะ??! สมกับเป็นหัวหน้าของชมรมทวงความยุติธรรมจริงๆ!"
33180-22 = "ดูแข็งแรงดีแล้วนะคะ คุณครู"
33180-23 = "[s] \"เพราะได้เซนะช่วยปฐมพยาบาลไว้นั่นล่ะ\""
33180-24 = "ไม่หรอกค่ะ ฉันเพิ่งเคยรักษาผู้ใหญ่เป็นครั้งแรก ได้เรียนรู้อะไรหลายอย่างเลยค่ะ"
33180-25 = "คุณครู..."
33180-26 = "ชินัตสึ? อย่าเพิ่งขยับตัวเลยค่ะ ช่วยนอนลงเหมือนเดิมด้วย นี่เป็นคำสั่งของรุ่นพี่ค่ะ"
33180-27 = "ฉันเป็นสมาชิกคณะกรรมการวินัยนะคะ..."
33180-28 = "อยากกลับมาที่หน่วยแพทย์ฉุกเฉินรึเปล่าล่ะคะ? ศพที่สภาพดี... ไม่ใช่สิ... เธอจะสัมผัสร่างกายผู้บาดเจ็บได้ตามใจชอบเลยนะคะ"
33180-29 = "ไม่ดีกว่าค่ะ ฉันขอปฏิเสธข้อเสนอค่ะ"
33180-34 = "คุณครู... "
33180-35 = "อาโกะจัง... ยังขยับตัวไม่ได้นะ... อะ...อึ่ก"
33180-36 = "[s] \"อาโกะ อิโอริ ค่อยยังชั่วที่พวกเธอปลอดภัย\""
33180-37 = "ท่านประธานหายตัวไปค่ะ..."
33180-38 = "ฉันติดต่อเธอไม่ได้เลย... แถมไม่อยู่ที่ห้องด้วย..."
33180-39 = "คุณครูคะ... ช่วยหา... ท่านประธาน..."
33180-40 = "[s] \"อื้อ ครูจะไปหาฮินะเอง\""
33180-41 = "ค่ะ... ขอฝากด้วยนะคะ คุณครู"
33180-45 = "คุณครู..."
33180-46 = "[s] \"ฮิฟุมิ...\""
33180-47 = "คุณครูคะ... อาซึสะจัง..."
33180-48 = "..."
33180-49 = "..."
33180-50 = "อาซึสะจังกำลังต่อสู้อยู่คนเดียว... ตอนนี้ก็ยังพยายามสู้อยู่คนเดียวด้วยค่ะ..."
33180-51 = "[s] \"ใช่ ครูรู้แล้วล่ะ\""
33180-52 = "แต่ว่า... ตัวฉัน... ไม่รู้ว่าจะทำยังไงดี... ไม่รู้วิธี... ที่จะแก้ไขปัญหานี้... ไม่รู้เลยว่าจะทำยังไงดี..."
33180-53 = "เรื่องที่เกิดขึ้นตอนนี้... มันหนักหนาเกินไปกับคนธรรมดาๆ อย่างฉัน...  มันน่ากลัวมากเลยค่ะ..."
33180-54 = "คุณครูมีวิธีมั้ยคะ... เรื่องที่... เรื่องที่น่ากลัวแบบนี้... ฉันจะทำอะไรได้บ้าง... ที่จะช่วยอาซึสะจัง..."
33180-55 = "..."
33180-56 = "ตะ... แต่ว่า...! เราจะปล่อยอาซึสะไว้คนเดียวไม่ได้นะ!"
33180-57 = "โคฮารุจัง..."
33180-58 = "ฉะ... ฉันเข้าใจดีว่าการต้องอยู่คนเดียวมันเหงาและโดดเดี่ยวแค่ไหน... เพราะงั้นจะปล่อยให้อาซึสะอยู่คนเดียวไม่ได้... "
33180-59 = "ค่ะ... นั่นสิคะ... อาซึสะจังคงจะรู้สึกโดดเดี่ยว..."
33180-60 = "[s] \"ชมรมชั้นเรียนเสริมมาไกลขนาดนี้ได้เพราะฮิฟุมิเลยนะ\""
33180-61 = "คุณครู...?"
33180-62 = "[s1] \"เด็กธรรมดาๆ อย่างฮิฟุมิที่ไม่ยอมแพ้ในสถานการณ์แบบนี้\"\n[s2] \"ฮิฟุมิพยายามทำทุกอย่างในสิ่งที่ตัวเองพอจะทำได้เลยนะ\""
33180-63 = "แถมนอกจากจะเป็นหัวหน้าชมรมชั้นเรียนเสริมแล้ว... ก็คอยดูแลเรื่องที่ยากลำบากแบบนี้... "
33180-64 = "แถมนอกจากจะเป็นหัวหน้าชมรมชั้นเรียนเสริมแล้ว... ก็คอยดูแลเรื่องที่ยากลำบากแบบนี้... "
33180-65 = "ใช่ค่ะ... ถ้าไม่มีฮิฟุมิจัง... ตัวฉันก็คงจะ... มาได้ไม่ไกลถึงขนาดนี้หรอกค่ะ"
33180-66 = "ฮานาโกะจัง โคฮารุจัง...."
33180-67 = "[s3] \"ถ้าไม่รู้วิธีว่าจะต้องทำยังไง ครูจะคอยให้คำปรึกษาเอง\"\n[s4] \"เพราะการช่วยแก้ปัญหาเป็นหน้าที่ของครูยังไงล่ะ\""
33180-68 = "..."
33180-69 = "..."
33180-70 = "ค่ะ... คุณครู ฉันเข้าใจที่คุณครูพูดแล้วค่ะ"
33180-71 = "ฉัน... จะไม่ยอมแพ้เด็ดขาดค่ะ และจะไม่กังวลด้วยค่ะ"
33180-72 = "ถึงกังวลไปก็คงจะไม่มีอะไรเปลี่ยนแปลง ฉันจะทำในสิ่งที่ฉันทำได้ค่ะ...!"
33180-73 = "คุณครู... ฉันจะไปช่วยอาซึสะจังค่ะ"
33180-74 = "[s5] \"อื้อ ฮิฟุมิก็ทำแบบนี้มาตลอดนี่นา\"\n[s6] \"ครูจะคอยช่วยฮิฟุมิเอง เหมือนตอนเรียนเสริมไง\""
33180-77 = "พวกเรา... ไปช่วยอาซึสะจังด้วยกันเถอะ"
33180-78 = "ใช่แล้ว! ไปช่วยเพื่อนกันเถอะ เรื่องนั้นไม่มีทางเป็นเรื่องที่ผิดแน่!"
33180-79 = "แล้วก็... พอเจออาซึสะจัง..."
33180-83 = "ฮิฟุมิจัง... มีเรื่องที่อยากบอกอาซึสะจังสินะคะ?"
33180-84 = "ค่ะ... "
33180-85 = "ก่อนหน้านี้... ฉันรู้สึกโกรธกับสิ่งที่พวกเขาบังคับพวกเรามาตลอด... และคิดว่าถ้าไม่พูดออกไปก็คงจะเก็บเอาไว้ไม่ไหว.."
33180-86 = "<โลกแบบนั้น> งั้นเหรอ... ฉันน่ะ... "
33180-87 = "ฮิฟุมิ...?"
33180-91 = "[ns] \"ถ้ามีเรื่องที่อยากพูดก็พูดไปเลย ไม่ต้องเก็บไว้หรอก\""
33180-92 = "ค่ะ...!! ทั้งกับอาซึสะจัง แล้วก็ทุกๆ คน...! ฉันจะบอกแน่นอนค่ะ...!"
33180-93 = "ค่ะ ฮิฟุมิจัง... ฉันก็จะอยู่ข้างๆ แล้วรอฟังเหมือนกันนะคะ ฉันจะรอฟังสิ่งที่ฮิฟุมิจังอยากจะบอกค่ะ"
33180-94 = "ถ้างั้นก็เอาตามนี้นะ รีบไปกันเถอะ!"
33180-97 = "รวบรวม... โน้มน้าว สื่อสาร และเข้าใจผู้คน..."
33180-98 = "คุณครูกำลังค่อยๆ ผสานรอยร้าวของเด็กนักเรียนของทรีนิตี้และเกเฮนน่าสินะคะ..."
33180-99 = "ในตอนนี้ที่สาวกยูสตาร์ที่เปี่ยมด้วยความแค้นของอาเรียสกำลังบุกเข้ามาหาทรีนิตี้และเกเฮนน่า..."
33180-100 = "คุณขอร้องและขอความช่วยเหลือ..."
33180-101 = "เพื่อรวมทุกคนมาไว้ด้วยกัน"
33180-106 = "ตอนนี้รู้ที่อยู่ของอาซึสะที่พยายามขัดขวางสควอดของอาเรียสอยู่ตามลำพังแล้วสินะคะ"
33180-107 = "วิหารโบราณ..."
33180-108 = "ชื่อของสวรรค์ที่ถูกกล่าวถึง... และตอนนี้ก็ได้กลายเป็นสถานที่ที่มีแต่ซากปรักหักพัง"
33180-109 = "อาเรียส อาซึสะ และคุณครูกำลังมุ่งหน้าไปที่นั่น"
33180-111 = "..."
33180-112 = "..."
33180-113 = "อาซึสะ..."
33180-117 = "ซาโอริ..."
33180-118 = "กล้าดียังไงมาทำร้ายองค์หญิง! ทำกับอาสึโกะแบบนี้...!! ยกโทษให้ไม่ได้!"
33180-119 = "ฉันจะขัดขวางเธอเอง ซาโอริ... ฉันจะขัดขวางเธอให้ได้"
33180-120 = "คิดว่าจะหยุดฉันได้รึไง!!"
33180-122 = "คนอย่างเธอจะรับความโกรธแค้น ความเกลียดชังของอาเรียสได้งั้นเหรอ!!"
33180-123 = "ถ้า <ความตั้งใจ> ในการฆ่ายังไม่พอ... ฉันก็จะสร้างมันขึ้นมาเอง ถ้าฉันต้องกลายเป็น <ฆาตกร> แล้วหยุดเธอได้ละก็... ฉันก็จะทำ"
33180-131 = "อาซึสะ--!!"
33180-132 = "ซาโอริ... โลกแบบนี้น่ะ... ให้มันมีแค่พวกเราก็พอแล้ว"
33180-134 = "ตอนต่อไป;เรื่องราวของพวกเรา"

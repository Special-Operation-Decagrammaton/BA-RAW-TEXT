[translation]
10040100-1 = "後日談;毀滅狂戰士！"
10040100-2 = "……抽鬼牌果然不太行。#n乃愛實在太強了。"
10040100-3 = "這種一面倒的勝負，一點也不有趣。"
10040100-8 = "哎呀，都怪我太過專注於玩遊戲，一時有點認真過頭了。"
10040100-9 = "那不如換點別的遊戲來玩吧？#n有什麼好玩的呢……"
10040100-10 = "我我我！這次換我來提議！"
10040100-11 = "好的，小塗真紀同學，請發言。"
10040100-12 = "雖然桌遊在這種通宵玩樂的派對上很受歡迎，#n不過要說最經典的活動，果然還是大家一起坐在大電視機前打電動吧？"
10040100-13 = "所以從現在開始，我們要用這個遊戲手把來一決勝負！"
10040100-15 = "……電動啊。#n這對我們貝里塔斯來說還蠻有利的。我沒有意見。"
10040100-16 = "不過有人帶遊戲機來參加今天的睡衣派對嗎？#n而且我們手邊也沒有什麼容易取得的派對遊戲吧？"
10040100-18 = "呵呵，晴前輩你忘了嗎？#n經典版的《毀滅狂戰士》只要有CPU和螢幕，無論什麼裝置都能安裝喔！"
10040100-19 = "只要執行手機裡的韌體改造程式，然後再設定輸入按鍵……這樣就大功告成了！"
10040100-20 = "真紀，你回去之前要想辦法把電視恢復原狀喔。"
10040100-21 = "不用擔心，想恢復原狀的話只要按一個按鍵就行了。#n而且如果你們以後想玩《毀滅狂戰士》的話，也可以隨時重新安裝。"
10040100-22 = "你們大家好像都忘了，這裡可是小雪的反省室耶！#n不要再幫他新增更多娛樂設備了！"
10040100-24 = "不過如果是小雪醬的話，應該不會選擇玩這種迷你遊戲，而是把真正的遊戲機藏在某個地方才對。"
10040100-25 = "話說回來，《毀滅狂戰士》不是單人射擊遊戲嗎？#n這樣我們要怎麼打賭或分出勝負呢？"
10040100-26 = "《毀滅狂戰士》裡有個能紀錄通關時間的競速模式。"
10040100-27 = "我們可以用每個人通過第一關的時間來決定勝負。#n比較慢的人就要去便利商店幫大家買餅乾！"
10040100-28 = "原來如此，只比第一關的話的確挺公平的。#n畢竟第一關沒有什麼特別的陷阱，也不需要太多的操作。"
10040100-30 = "我也贊成。#n好久沒有玩經典版的《毀滅狂戰士》了，突然有點緊張……"
10040100-31 = "我不太擅長玩這種電動……這次我就不參加了。"
10040100-32 = "哎唷，前輩別這樣，跟我們一起玩嘛。#n我會在一旁教你怎麼操作的。"
10040100-33 = "說不定你玩了之後會覺得很有趣……或者其實在打電動方面特別有天賦之類的哦？"
10040100-34 = "你嘴上這麼說，其實是想讓我當最後一名吧……？"
10040100-35 = "雖，雖然我的確不是沒有這種想法──"
10040100-36 = "總之你先坐下來拿起手把吧。#n我來教你怎麼操控。"
10040100-39 = "嗯？有個長得很像惡魔的怪物出現了耶。#n要攻擊它嗎？"
10040100-40 = "嗯，那些傢伙是打算傷害狂戰士們的宇宙海賊。#n只要按下面的普攻按鍵，就能用拳頭攻擊對方──"
10040100-44 = "哦，真的耶。外星人摔倒了。"
10040100-45 = "雖然拳頭也是不錯的攻擊手段，#n不過因為距離比較短，所以如果用牆上掛的散彈槍──"
10040100-52 = "原來如此……竟然能呈現這樣的效果，手感還真是逼真。"
10040100-56 = "散彈槍比起拳頭──"
10040100-66 = "……前輩，那個外星人的體力已經歸零了。"
10040100-67 = "呵呵，好像比我想像中還要紓壓。"
10040100-68 = "咦？我好像已經把這個房間裡的所有敵人都打死了耶。#n真紀，下一個敵人在哪裡？"
10040100-69 = "下一個敵人……在右邊的房間裡。"
10040100-75 = "（因為千尋只用拳頭攻擊敵人的關係，通關速度比其他成員慢上許多……）"
10040100-76 = "（但是包含真紀在內，所有貝里塔斯的成員都決定短時間內不要惹千尋生氣）"

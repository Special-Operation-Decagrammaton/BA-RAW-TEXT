[translation]
10040100-1 = "Afterword;BOOM!"
10040100-2 = "...Chase the Joker is just not it. Noa has way too much of an advantage."
10040100-3 = "This kind of one-sided game is not enjoyable at all."
10040100-8 = "Oh dear. I got a little too into the game."
10040100-9 = "Why don't we try something else, then? Does anyone have any suggestions...?"
10040100-10 = "Me, me! My turn to pick a game!"
10040100-11 = "Okay, Konuri Maki, please speak."
10040100-12 = "When it comes to playing games together all night, board games are good and all, but the real classic is being crowded around a big TV together and playing video games!"
10040100-13 = "So from now on, we'll be fighting with game controllers!"
10040100-15 = "...Video games? That puts Veritas on the advantage, so I have no objections."
10040100-16 = "Did you bring a console with you, though? I don't know if we have any party games either..."
10040100-18 = "Heeheehee. Have you forgotten about \"BOOM,\" Hare? As long as we have a CPU and a monitor, we can play the classic version anywhere!"
10040100-19 = "Just run the firmware modification process from your phone, match the input...voila!"
10040100-20 = "As long as you restore the TV back to its original state afterwards, Maki."
10040100-21 = "Don't even stress! That's as easy as the push of a button! And it'll be super easy to reinstall if you want to play \"BOOM\" again!"
10040100-22 = "Wait, wait. We're forgetting that this is Koyuki's Self-Reflection Room. Should we really be adding more entertainment to distract from her, you know, self-reflection?!"
10040100-24 = "Although I suspect that Koyuki has a real game console squirreled away somewhere here."
10040100-25 = "BOOM is a single-player shooting game, isn't it? How're we going to play together?"
10040100-26 = "It has a speedrun mode where it records your best clear time!"
10040100-27 = "We'll each clear Stage 1, and the winner is whoever has the fastest time! The loser has to go to the convenience store to buy snacks!"
10040100-28 = "Indeed, if it's only Stage 1, it's pretty straightforward without any major traps. That seems like a fair match."
10040100-30 = "Sounds good to me. I'm pretty rusty, so I'm honestly kinda nervous."
10040100-31 = "I don't play these kinds of games...so I'll sit this one out. "
10040100-32 = "Don't be like that, Chihiro! Let's play together! I'll teach ya!"
10040100-33 = "You might even have fun! Maybe you'll discover some unexpected talent in video games!"
10040100-34 = "Are you just trying to convince me so you can beat me?"
10040100-35 = "W-Well, I can't say the thought didn't cross my mind. Aha...hah..."
10040100-36 = "Just sit here and grab the controller. I'll teach you how to work it."
10040100-39 = "Hm? Some demon monsters appeared? Should I attack them?"
10040100-40 = "Mhm! Those alien pirates are trying to take out your character, Boomguy. Press the bottom button to punch them."
10040100-44 = "Oh, it worked. I knocked out the aliens."
10040100-45 = "Fists are effective, but really short-ranged. So if you just grab that shotgun hanging on the—"
10040100-52 = "Wow... The effects feel so real. Games have stuff like this?"
10040100-56 = "Uh, shotguns are more effective than—"
10040100-66 = "...VP, uh...that alien's HP...is already zero...?"
10040100-67 = "Fufu. I didn't expect this to be such a great stress-reliever."
10040100-68 = "Huh? I think I've defeated all the enemies in this room. Maki, where is the next enemy?"
10040100-69 = "The next enemy...is in the room on the right."
10040100-75 = "Chihiro took the longest to clear the stage because she continued to pummel the enemies with just her fists..."
10040100-76 = "The Veritas members, including Maki, vowed not to upset Chihiro for a while."

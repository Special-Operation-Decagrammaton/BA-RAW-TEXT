[translation]
10040100-1 = "ย้อนวันวาน;BOOM!"
10040100-2 = "ไม่ได้การละ เกมจับโจรอะไรเนี่ย... เกมนี้เข้าทางโนอามากเกินไปนะ"
10040100-3 = "การแข่งขันที่ได้เปรียบอยู่ฝ่ายเดียวแบบนี้ไม่สนุกเลยสักนิด"
10040100-8 = "ตายจริง ฉันตั้งใจเล่นจนจมอยู่กับเกมมากเกินไปแล้วสินะคะ"
10040100-9 = "ถ้างั้นเราเปลี่ยนไปเล่นเกมประเภทอื่นมั้ยคะ? เอาเกมอะไรดีนะ..."
10040100-10 = "ฉะ... ฉัน! รอบนี้ฉันขอเสนอเกมบ้าง!"
10040100-11 = "ค่ะ ค่ะ โคนูริ มากิ เชิญเสนอได้เลยค่ะ"
10040100-12 = "ถ้าจะหาเกมที่เล่นโต้รุ่งละก็ บอร์ดเกมก็ไม่ใช่ตัวเลือกที่เลวร้ายอะไรหรอก แต่วิดีโอเกมที่นั่งเล่นกัน#nหน้าทีวีด้วยกันทุกคนมันคลาสสิกกว่านะ?"
10040100-13 = "จากนี้ไปเราจะแข่งกันด้วยจอยเกมอันนี้!"
10040100-15 = "วิดีโอเกมเหรอคะ...? แบบนี้ก็งานถนัดของเวอริทัสเลยสิ เกมนี้ฉันไม่คัดค้านค่ะ"
10040100-16 = "แต่ปาร์ตี้ชุดนอนวันนี้ไม่มีใครเอาเครื่องเล่นเกมมาเลยนะ? ตอนนี้ก็ไม่น่าจะหาเกมอะไรมาได้ทันทีด้วย"
10040100-18 = "ฮุฮุ ลืมไปแล้วเหรอ รุ่นพี่ฮาเระ? <BOOM> เวอร์ชันคลาสสิกน่ะ แค่มี CPU กับหน้าจอก็มาเล่นที่#nเครื่องอื่นได้แล้ว!"
10040100-19 = "เราแค่ต้องปรับเฟิร์มแวร์ที่ติดตั้งในโทรศัพท์มือถือ แล้วก็กดปุ่มกรอกข้อมูล... แค่นี้ก็ได้แล้ว!"
10040100-20 = "มากิ ก่อนกลับไปต้องทำให้ทีวีนี้เป็นเหมือนเดิมด้วยนะ"
10040100-21 = "ไม่ต้องห่วงหรอก แค่กดปุ่มทีเดียวก็ทำให้กลับมาเป็นเหมือนเดิมได้แล้วละ แล้วถ้าอยากเล่นเกม <BOOM> หลังจากนี้ ก็ติดตั้งลงไปใหม่ได้ด้วย"
10040100-22 = "ทุกคนอย่าเพิ่งลืมนะว่าห้องนี้คือห้องสำนึกผิดของโคยูกิ! จะทำให้ห้องนี้กลายเป็นห้องที่เล่นสนุกได้#nยังไงกัน?"
10040100-24 = "แต่ถ้าเป็นโคยูกิจังละก็ ดีไม่ดีอาจจะซ่อนเครื่องเล่นเกมจริงๆ ที่สนุกกว่ามินิเกมแบบนี้ไว้ก็ได้ค่ะ"
10040100-25 = "จะว่าไป <BOOM> เป็นเกมยิงแบบเล่นคนเดียว แล้วจะเดิมพันหรือตัดสินแพ้ชนะยังไงเหรอคะ?"
10040100-26 = "เกม <BOOM> มีโหมดสปีดรันที่บันทึกเวลาในการเคลียร์เกมได้น่ะ"
10040100-27 = "เราจะเปรียบเทียบเวลาในการเคลียร์ด่านแรกของแต่ละคนแล้วมาหาคนชนะกัน ส่วนคนที่แพ้จะต้องไป#nซื้อขนมที่ร้านสะดวกซื้อมา!"
10040100-28 = "ได้เลย ด่านแรกไม่ค่อยมีอุปสรรคอะไรเยอะ บังคับก็ง่าย งั้นก็คงเป็นเกมที่แข่งขันกันได้อย่างยุติธรรม#nนะคะ"
10040100-30 = "ฉันก็เห็นด้วยนะ แต่ก็ไม่ได้เล่น <BOOM> เวอร์ชันคลาสสิกมานานแล้ว ชักจะประหม่าแล้วสิ..."
10040100-31 = "ฉันไม่คุ้นเคยกับวิดีโอเกมแบบนี้... เกมนี้ฉันขอถอนตัวดีกว่า "
10040100-32 = "ไม่เอาน่า รุ่นพี่ มาเล่นด้วยกันเถอะ ฉันจะคอยบอกอยู่ข้างๆ เองว่าต้องกดยังไง"
10040100-33 = "พอได้ลองเล่นแล้วอาจจะสนุกก็ได้นะ... ดีไม่ดีอาจค้นพบพรสวรรค์ของตัวเองในการเล่นวิดีโอเกมก็ได้ ใครจะไปรู้?"
10040100-34 = "ปากก็พูดแบบนั้น แต่ในใจหวังไว้ว่าอยากให้ฉันเป็นที่โหล่หรือเปล่า...?"
10040100-35 = "จะ... จะบอกว่าไม่ได้คิดแบบนั้นก็คงไม่ใช่..."
10040100-36 = "มานั่งตรงนี้แล้วลองถือจอยดูก่อนนะ ฉันจะบอกเองว่าต้องกดเล่นยังไง"
10040100-39 = "หืม? มีมอนสเตอร์หน้าตาคล้ายปีศาจออกมาแฮะ ต้องโจมตีมันใช่มั้ย?"
10040100-40 = "อื้อ พวกนั้นเป็นโจรสลัดต่างดาวที่มาคุกคามเราน่ะ ถ้ากดปุ่มโจมตีพื้นฐานที่อยู่ข้างล่าง ก็จะเป็นการโจมตีด้วยหมัด..."
10040100-44 = "โอ้ จริงด้วยแฮะ มนุษย์ต่างดาวหงายหลังไปเลย"
10040100-45 = "การโจมตีด้วยหมัดก็มีประสิทธิภาพอยู่หรอก แต่ถ้าจะโจมตีในระยะไกลกว่านี้ ก็ให้ใช้ปืนลูกซองที่แขวนอยู่บนผนัง..."
10040100-52 = "ต่อยแล้วมีเสียงเอฟเฟกต์แบบนี้สินะ... สมจริงจังเลย"
10040100-56 = "แต่ปืนลูกซองมันดีกว่าการต่อย..."
10040100-66 = "รุ่นพี่... มนุษย์ต่างดาวตัวนั้น HP หมดหลอดแล้วนะ เลิกต่อยได้แล้วละ"
10040100-67 = "ฮุฮุ เกมนี้ช่วยคลายเครียดได้ดีกว่าที่คิดแฮะ"
10040100-68 = "เอ๋? เหมือนฉันจะจัดการศัตรูในห้องนี้หมดแล้วนะ ศัตรูตัวต่อไปอยู่ไหนเหรอมากิ?"
10040100-69 = "ตัวต่อไป... อยู่ในห้องทางขวามือน่ะ"
10040100-75 = "(จิฮิโระเคลียร์ด่านนี้ได้ช้ากว่าคนอื่นมากๆ เพราะเอาแต่จัดการศัตรูด้วยการต่อยอย่างเดียว...)"
10040100-76 = "(หลังจากนั้นมากิกับสมาชิกเวอริทัสก็ให้คำมั่นกับตัวเองว่าจะไม่ไปกวนประสาทจิฮิโระอีกเด็ดขาด)"

10040100-1 = "#title;후일담;BOOM!"
10040100-2 = "2;하레 파자마;04;……역시 도둑잡기는 안 되겠어. 노아에게 너무 유리하잖아.\n#2;a\n#2;em;[땀]"
10040100-3 = "4;코타마 파자마;04;이렇게 일방적인 승부는 하나도 즐겁지 않습니다.\n#4;a\n#4;em;[반응]"
10040100-4 = "#st;[0,0];instant;1;"
10040100-5 = "#clearST"
10040100-6 = "2;하레 파자마;04\n4;코타마 파자마;04\n#2;h\n#4;h\n#2;d\n#4;d\n#wait;1500"
10040100-7 = "3;노아 파자마;01\n#3;a\n#wait;1500"
10040100-8 = "3;노아 파자마;03;어머나, 게임에 집중하다 보니 무심코 너무 몰두하고 말았네요.\n#3;em;[음표]"
10040100-9 = "3;노아 파자마;02;그럼 종목을 바꿔서 다른 게임을 해볼까요? 뭐가 좋으려나……"
10040100-10 = "3;마키 파자마;03;나, 나! 그럼 이번엔 내가 제안할래!\n#3;a\n#3;hophop\n#3;em;[재잘]"
10040100-11 = "5;유우카 파자마;99;네, 네. 코누리 마키 양, 발언하세요.\n#5;al\n#5;em;[반응]\n#3;m1"
10040100-12 = "3;마키 파자마;02;밤새워 함께 플레이하는 게임이라면 보드게임도 나쁘지 않지만, 역시 정석은 커다란 TV 앞에 둘러앉아 함께 하는 비디오 게임 아니겠어?"
10040100-13 = "3;마키 파자마;01;지금부터는 이 게임 컨트롤러로 승부하는 거야!\n#3;em;[!]\n#3;jump"
10040100-14 = "#all;hide"
10040100-15 = "2;하레 파자마;01\n4;코타마 파자마;99;……비디오 게임인가요. 우리 베리타스에게 유리한 종목이군요. 저는 이견 없습니다.\n#4;em;[...]"
10040100-16 = "2;하레 파자마;02;하지만 오늘 파자마 파티에는 아무도 게임기를 가져오지 않았잖아? 지금 당장 구할 수 있는 파티 게임도 따로 없을 텐데.\n#2;em;[?]"
10040100-17 = "#all;hide"
10040100-18 = "5;유우카 파자마;01\n1;마키 파자마;08;후후. 잊은 거야, 하레 선배? <BOOM>의 클래식 버전은 CPU와 모니터만 있다면 어떤 기기에도 이식할 수 있다고!\n#1;em;[반짝]"
10040100-19 = "1;마키 파자마;07;핸드폰에 설치된 펌웨어 개조 프로세스를 실행시키고, 입력 버튼을 대응시키면…… 됐다!\n#1;greeting"
10040100-20 = "5;유우카 파자마;02;마키. 돌아가기 전에 이 TV, 원상복구 해 놔야 해.\n#5;em;[반응]"
10040100-21 = "1;마키 파자마;01;걱정 마. 복구는 버튼 하나로 간단하게 실행할 수 있으니까. 나중에라도 <BOOM>을 플레이하고 싶으면 재설치하는 것도 가능해."
10040100-22 = "5;유우카 파자마;11;다들 잊어버린 것 같은데, 일단 이 방은 코유키의 반성실이거든?! 이 이상 오락거리를 늘리면 어쩌자는 거야?\n#5;em;[?!]"
10040100-23 = "#all;hide"
10040100-24 = "3;노아 파자마;09;아마 코유키 쨩이라면 이런 미니 게임이 아닌, 진짜 게임기를 어딘가에 숨겨두고 있겠지만요.\n#3;em;[땀]\n#fontsize;50"
10040100-25 = "3;코타마 파자마;02;그나저나 <BOOM>은 1인용 슈팅 게임인데, 이걸로 어떻게 내기나 승부를 하는 건가요?\n#3;em;[?]"
10040100-26 = "1;마키 파자마;01;<BOOM>에는 클리어 타임을 기록할 수 있는 스피드런 모드가 있거든.\n#1;ar\n#3;m5"
10040100-27 = "1;마키 파자마;03;이걸로 각자 1 스테이지를 클리어한 시간을 비교해서 승부를 하는 거야. 진 사람은 편의점에서 과자를 사 오는 걸로!\n#1;jump"
10040100-28 = "3;코타마 파자마;99;과연, 1 스테이지 뿐이라면 큰 함정도 없고 조작도 쉽기 때문에 비교적 공평한 승부가 되겠군요."
10040100-29 = "#all;hide"
10040100-30 = "3;하레 파자마;07;나도 찬성이야. 클래식 버전의 <BOOM>을 플레이한지도 오래되어서 조금 긴장되는 걸……\n#3;em;[땀]"
10040100-31 = "3;치히로 파자마;02;나는 이런 비디오 게임에는 익숙지가 않아서…… 이번 내기에서는 빠지도록 할게. \n#3;em;[반응]"
10040100-32 = "1;마키 파자마;13;에이, 선배. 그러지 말고 이번 같이 하자. 내가 옆에서 조작법을 알려줄게.\n#1;ar\n#1;em;[재잘]\n#3;m5"
10040100-33 = "1;마키 파자마;08;막상 해보면 또 재미있을지도 모르고…… 또 비디오 게임에 의외의 재능이 있을지도 모르잖아?"
10040100-34 = "3;치히로 파자마;07;실은 그렇게 말하면서 내게 꼴찌를 맡기려는 속셈 아니야……?\n#3;em;[...]"

[translation]
10036090-1 = "第9話;奧利斯小隊，集結"
10036090-5 = "嘖……！"
10036090-7 = "那，那傢伙不是打工仔嗎……？#n竟然一個人就把傳說的太妹逼到這種地步？"
10036090-8 = "抓準了裝填火箭發射器的時機開槍……"
10036090-9 = "而且移動速度也很快！傳說的太妹完全跟不上！"
10036090-16 = "那優雅而敏捷的動作……不禁讓我想起了……"
10036090-17 = "小女子養的那隻可愛飛鼠「卡爾列斯君」！"
10036090-18 = "換作是平時的話，我想必會對你的身手表示敬佩並大加讚賞……！"
10036090-19 = "但現在親自對付起來……只讓人感到火大！"
10036090-20 = "你只要老實離開就行了。"
10036090-25 = "加，加油啊！打工仔！"
10036090-26 = "把那個不速之客趕走，奪回我們的慶典！"
10036090-32 = "……真是的。"
10036090-33 = "這下麻煩了。"
10036090-34 = "聽說能向把我關進矯正局的頭盔團復仇，我才會依照笑咪咪教授的計劃來到這裡……"
10036090-35 = "沒想到會遭遇如此強烈的阻礙……"
10036090-36 = "……不過這也沒辦法。#n人生總是會在意想不到的時候，遇到一兩個意料之外的曲折！"
10036090-37 = "倘若無法優雅而高尚地克服難關，就太對不起「傳說的太妹」的名號了！"
10036090-38 = "所以接下來，我會更加把勁！"
10036090-39 = "呼！"
10036090-40 = "……？#n他的狀態改變了……？"
10036090-41 = "[s]「閉著眼睛……在冥想嗎？」"
10036090-48 = "栗浜明美式！集中精神呼吸法！第一式！"
10036090-49 = "……哈啊啊啊！"
10036090-53 = "……！！"
10036090-54 = "[ns]「沙織！？你沒事吧！？」"
10036090-55 = "唔……！剛才的攻擊是……？"
10036090-56 = "他的武器並沒有改變，也沒有使用其他的特殊手段。"
10036090-57 = "只是通過集中精神和調整呼吸，攻擊的準確度就變得更加犀利……"
10036090-58 = "正是如此！"
10036090-59 = "優雅而高尚！栗浜明美式呼吸法之中蘊含了我們太妹的精髓！"
10036090-60 = "[s]「……完全無法理解！」"
10036090-65 = "呼……當然這種超常的呼吸法也會對身體造成負擔。"
10036090-66 = "但這同時也意味著……我對你實力的認可，飛鼠小姐。"
10036090-67 = "……那還真是感謝你啊。"
10036090-68 = "唔呵呵……"
10036090-69 = "大姐頭！我們也來幫忙！"
10036090-70 = "既然是對頭盔團的復仇，我們就不能讓大姐頭一個人戰鬥！"
10036090-71 = "你們……可是這只是小女子個人的復仇……為什麼連各位也……"
10036090-72 = "不！大姐頭的復仇就是我們的復仇！"
10036090-73 = "我們會追隨你到天涯海角的！大姐頭！"
10036090-75 = "……氣勢真是驚人。"
10036090-76 = "雖然人數不多，但這股彷彿觸手可及的熱情……"
10036090-77 = "這就是彼此之間的信任吧。"
10036090-79 = "好！我們上！"
10036090-86 = "[ns]「沙織……！」"
10036090-87 = "唔……！"
10036090-92 = "……？"
10036090-97 = "嗨，沙醬。#n看來你遇到麻煩了呢。"
10036090-98 = "……敦子！"
10036090-100 = "幫他的也是敵人！"
10036090-105 = "呃唔……"
10036090-111 = "耶，耶嘿嘿。#n剛才沒想太多就開槍了……看來好像完全吸引了仇恨呢……"
10036090-116 = "……真會給人添麻煩。"
10036090-118 = "美咲、日和……"
10036090-119 = "現在應該沒時間悠哉聊天了吧。"
10036090-126 = "……"
10036090-127 = "變成團體戰了嗎……"
10036090-128 = "啊啊，有話待會再聊吧。"
10036090-132 = "老師，麻煩你指揮了。"
10036090-133 = "[s3]「沒問題，交給我吧！」 \n[s4]「奧利斯小隊，出擊！」"
10036090-137 = "我，我們也不能輸！"
10036090-138 = "能動的通通一起上！"

[translation]
10036090-1 = "Episode 9;Arius Squad, Assemble"
10036090-5 = "Tch...!"
10036090-7 = "I-Isn't she the part-timer...? Is she holding off the Legendary Thug all by herself?"
10036090-8 = "Her shots are so perfectly timed, the Legendary Thug can't reload her cannon..."
10036090-9 = "And she's moving fast, too! Too fast for the Thug to keep up!"
10036090-16 = "She's so quick and delicate, she reminds me of..."
10036090-17 = "...Charles, my pet flying squirrel!"
10036090-18 = "Normally, I'd respect you and leave it at that."
10036090-19 = "But you're making this very inconvenient!"
10036090-20 = "You can always walk away."
10036090-25 = "Y-You've got this, part-timer!"
10036090-26 = "Throw out that party crasher and take back the festival!"
10036090-32 = "...Oh, my. "
10036090-33 = "This is troublesome."
10036090-34 = "When Professor Smug told me her plan, I ran all the way here, burning for revenge."
10036090-35 = "She didn't mention this roadblock at all."
10036090-36 = "...But no one gets far in life without expecting the unexpected."
10036090-37 = "If I can't clear this hurdle with poise and elegance, who could ever call me \"Legendary\" again?"
10036090-38 = "So I suppose I'll have to apply myself."
10036090-39 = "Haaah!"
10036090-40 = "Huh? Her body, it's...changing?"
10036090-41 = "[s] \"She closed her eyes. Is she meditating?\""
10036090-48 = "Kurihama Akemi style! My breath is my energy. My mind is calm."
10036090-49 = "...Haaap!"
10036090-53 = "Ah!"
10036090-54 = "[ns] \"Saori?! Are you okay?!\""
10036090-55 = "...Tch! How'd she do that just now...?"
10036090-56 = "It's not like she changed her weapons, and she's not doing anything special."
10036090-57 = "She couldn't have become a better shot just by breathing a couple of times."
10036090-58 = "Oh, but I did!"
10036090-59 = "With elegance and sophistication! The Kurihama Akemi breathing style carries the essence of all thugs!"
10036090-60 = "[s] \"...I'm not following!\""
10036090-65 = "Phew... Now of course, such breathing takes a toll on one's body."
10036090-66 = "But...consider that a sign of respect, Miss Flying Squirrel."
10036090-67 = "...How gracious."
10036090-68 = "Oho..."
10036090-69 = "Hey, Big Sis! We're gonna back you up!"
10036090-70 = "We ALL want revenge on the Helmet Gang! We can't let you do this alone!"
10036090-71 = "All of you... But this is only my personal revenge... So why are you all...?"
10036090-72 = "It's not, Big Sis! Your revenge is our revenge!"
10036090-73 = "We'll follow our Big Sis to the end!"
10036090-75 = "...Such incredible spirit."
10036090-76 = "There aren't many of them still standing, but I can almost feel the heat coming off of them..."
10036090-77 = "Maybe that's their trust in each other."
10036090-79 = "Let's go!"
10036090-86 = "[ns] \"Saori...!\""
10036090-87 = "Ugh...!"
10036090-92 = "Hmm?"
10036090-97 = "Hello, Sao-Sao. You seem troubled."
10036090-98 = "...Atsuko!"
10036090-100 = "Anyone who's with her is against us!"
10036090-105 = "Ugh..."
10036090-111 = "H-Heehee, that'll keep them down for a bit. Definitely got their attention, though!"
10036090-116 = "...You're a handful, you know that?"
10036090-118 = "Misaki, Hiyori..."
10036090-119 = "This might not be the best time for a chat."
10036090-126 = "..."
10036090-127 = "We've got a full team battle on our hands."
10036090-128 = "Right, we can save the talk for later."
10036090-132 = "Awaiting orders, Sensei."
10036090-133 = "[s3] \"Right, leave it to me!\"\n[s4] \"Arius Squad, go!\""
10036090-137 = "W-We can't lose now!"
10036090-138 = "If you can still fight, fight!"

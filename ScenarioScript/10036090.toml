[translation]
10036090-1 = "ตอนที่ 9;รวมตัวสควอดอาเรียส"
10036090-5 = "ชิ...!"
10036090-7 = "ยะ... ยัยนั่นคือเด็กพาร์ทไทม์ไม่ใช่เหรอ? ทำไมถึงกล้าดีไปต่อกรกับแยงกี้สาวในตำนานคนเดียวล่ะ?"
10036090-8 = "ยิงจู่โจมอย่างถูกจังหวะจนบรรจุเครื่องยิงระเบิดจรวดไม่ได้เลย..."
10036090-9 = "แถมยังเคลื่อนไหวเร็วอีก! แยงกี้สาวในตำนานแทบจะสู้ไม่ได้เลยนะ!"
10036090-16 = "การเคลื่อนไหวที่สง่างามและว่องไว... ท่วงท่าของคุณช่างเหมือนกับ..."
10036090-17 = "เจ้าคาร์เลส กระรอกบินที่ดิฉันเลี้ยงและเอ็นดูเป็นอย่างยิ่ง!"
10036090-18 = "ถ้าเป็นเวลาปกติละก็ ดิฉันคงปรบมือชื่นชมท่วงท่าของคุณแล้วละค่ะ...!"
10036090-19 = "แต่พอต้องมาสู้กัน... มันก็น่าอารมณ์เสียไม่น้อยเลยนะคะ!"
10036090-20 = "ยอมแพ้ไปแต่โดยดีเสียเถอะ"
10036090-25 = "สะ... สู้เขานะ! เด็กพาร์ทไทม์!"
10036090-26 = "ไล่แขกที่ไม่ได้รับเชิญ แล้วเอางานเทศกาลของเราคืนมาเลย!"
10036090-32 = "ตายจริง... "
10036090-33 = "แบบนี้ก็แย่สิคะ"
10036090-34 = "พอได้ยินว่าสามารถแก้แค้นแก๊งหมวกกันน็อกที่ทำให้ดิฉันต้องไปนอนในซังเตได้ ดิฉันก็เลยรีบแจ้นมา#nที่นี่ตามแผนการของศาสตราจารย์ยิ้มหวานเลย"
10036090-35 = "แต่ไม่คิดเลยนะคะว่าจะมาเจออุปสรรคขนาดนี้..."
10036090-36 = "แต่ก็เข้าใจได้นะคะ... ชีวิตของพวกเราต้องเจอเรื่องดีร้ายสลับกันไปอยู่แล้ว การต้องเผชิญหน้ากับคน#nอื่นโดยไม่ทันได้คาดคิดนี่ก็ด้วย!"
10036090-37 = "แต่ถ้าดิฉันเอาชนะวิกฤตนี้อย่างสง่างามไม่ได้ ดิฉันก็ไม่ควรจะใช้ชื่อ 'แยงกี้สาวในตำนาน' หรอกค่ะ "
10036090-38 = "เพราะงั้นดิฉันจะรวบรวมพลังกายและพลังใจแล้วไปต่อ!"
10036090-39 = "ฮึบ!"
10036090-40 = "...? อะไรเนี่ย...?"
10036090-41 = "[s] \"หลับตา... ทำสมาธิเหรอ?\""
10036090-48 = "เทคนิคการหายใจแบบแรก! ดึงสติควบคุมจิตใจ สไตล์คุริฮามะ อาเคมิ! "
10036090-49 = "ย้ากกก...!"
10036090-53 = "...!!"
10036090-54 = "[ns] \"ซาโอริ?! เป็นอะไรหรือเปล่า?!\""
10036090-55 = "อึก...! การโจมตีเมื่อกี้มัน...!"
10036090-56 = "ไม่น่าจะใช่การเปลี่ยนอาวุธหรือใช้กลยุทธ์อะไรเป็นพิเศษเลยด้วย"
10036090-57 = "แค่ตั้งสติและรวบรวมสมาธิจากการหายใจ ก็ทำให้โจมตีแม่นยำได้เลยงั้นเหรอ..."
10036090-58 = "ได้สิคะ!"
10036090-59 = "ท่วงท่าที่สง่างาม! เทคนิคการหายใจสไตล์คุริฮามะ อาเคมิน่ะมันอยู่ในสายเลือดของแยงกี้สาวอยู่แล้ว!"
10036090-60 = "[s] \"พูดอะไรเยอะไปหมดจนจับทางไม่ได้เลย...!\""
10036090-65 = "ฮู่ว... เทคนิคการหายใจที่มากจนเกินพอดีจะทำให้ร่างกายอ่อนล้าได้"
10036090-66 = "แต่ถ้าไม่ทำแบบนี้... ดิฉันก็คงโค่นคนเก่งอย่างคุณไม่ได้ค่ะ แม่หนูกระรอกบิน"
10036090-67 = "ขอบใจที่พูดอย่างนี้นะ..."
10036090-68 = "ฮุฮุ..."
10036090-69 = "ลูกพี่ใหญ่! พวกเราก็จะผนึกกำลังด้วยค่ะ!"
10036090-70 = "นี่เป็นการแก้แค้นแก๊งหมวกกันน็อกทั้งที พวกเราปล่อยให้ลูกพี่ใหญ่ใส่เดี่ยวไม่ได้หรอกค่ะ!"
10036090-71 = "ทุกคนคะ... แต่นี่เป็นการแก้แค้นส่วนของดิฉันนะคะ... ทำไมทุกคนถึงจะเข้ามาเจ็บตัวด้วย..."
10036090-72 = "ไม่เป็นไรค่ะ! การแก้แค้นของลูกพี่ใหญ่ก็เหมือนการแก้แค้นของพวกเราด้วย!"
10036090-73 = "พวกเราจะเดินตามลูกพี่ใหญ่ไปตลอดชีวิตเลยค่ะ!"
10036090-75 = "มุ่งมั่นกันจังเลยนะ..."
10036090-76 = "ถึงจะมีกันแค่ไม่กี่คน แต่ก็รู้สึกถึงความเด็ดเดี่ยว..."
10036090-77 = "นี่สินะศรัทธาที่มีต่อกัน"
10036090-79 = "เอาละ! ลุยเลย!"
10036090-86 = "[ns] \"ซาโอริ...!\""
10036090-87 = "อึก...!"
10036090-92 = "...?"
10036090-97 = "สวัสดี ซัตจัง กำลังเจอเรื่องยากอยู่ใช่มั้ย?"
10036090-98 = "อาสึโกะ...!"
10036090-100 = "เป็นพวกเดียวกันงั้นเหรอ!"
10036090-105 = "ว้ายย..."
10036090-111 = "แหะ แหะๆ ฉันยิงไปเองค่ะ... สงสัยพวกเราจะได้เป็นคู่ต่อสู้ไปด้วยแล้วนะคะ"
10036090-116 = "งั้นก็ช่วยไม่ได้นะ..."
10036090-118 = "มิซากิ ฮิโยริ..."
10036090-119 = "เราไม่น่าจะมีเวลามาคุยกันหรอกนะ..."
10036090-126 = "..."
10036090-127 = "รวมทีมสควอดสินะ"
10036090-128 = "เข้าใจแล้ว เอาไว้ค่อยคุยทีหลังก็แล้วกัน"
10036090-132 = "ครู ช่วยสั่งการทีนะ"
10036090-133 = "[s3] \"ได้สิ ให้เป็นหน้าที่ของครูได้เลย\"\n[s4] \"ลุยเลย สควอดของอาเรียส!\""
10036090-137 = "พะ... พวกเราก็ไม่อยู่เฉยหรอกนะ!"
10036090-138 = "คนที่ยังไหว ไปเป็นกำลังเสริมให้พวกนี้เลย!"

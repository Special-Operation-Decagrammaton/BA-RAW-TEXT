[translation]
33040-1 = "ตอนที่ 4;เรื่องราวหลังจากนั้น"
33040-3 = "ตู้มมมมมมม!!"
33040-4 = "(ตู้มมมม!!  ตู้มมมม!!)"
33040-5 = "โอ้... รุ่นพี่ซึรุกิ วันนี้เต็มที่สุดๆ ไปเลยนะคะ "
33040-6 = "ที่จริงฉันรู้สึกล้านิดหน่อยเพราะต้องทำภารกิจต่อเนื่อง...#nตอนนี้ฉันสำนึกผิดถึงความไม่กระตือรือร้นของตัวเองแล้วค่ะ "
33040-7 = "พอเห็นท่าทางที่ลุยอย่างเด็ดเดี่ยวของรุ่นพี่ ฉันก็รู้สึกฮึดขึ้นมาแล้วค่ะ!"
33040-11 = "รุ่นพี่ฮาสุมิอยู่ไหมคะ? พอดีมีคนเอารถถังเสบียงจากในโรงเรียนไปน่ะค่ะ..."
33040-12 = "คะ? ว่ายังไงนะคะ?"
33040-13 = "ตอนนี้กองกำลังเราไม่เพียงพอ ฉันก็เลยอยากให้มาช่วยสักหน่อย#nโห! โหววว ดริฟต์นั่นเฉียบมาก!"
33040-14 = "ตอนนี้ฉันกำลังยุ่ง... กำลังเสริมเหรอ... โคฮารุน่าจะอยู่ในโรงเรียนนะ... "
33040-15 = "จริงสิ... โคฮารุกำลังรักษาตัวจากไข้หวัดรุนแรงอยู่..."
33040-16 = "คุณโคฮารุสังกัดอยู่ในชมรมชั้นเรียนเสริมนะคะรุ่นพี่ ฉันจะไปให้เองค่ะ!"
33040-17 = "ว้ากกกกก! อ๊ากกก!!"
33040-18 = "ค่ะ... งั้นทางนี้ให้ซึรุกิดูแลแล้วกันนะคะ ฉันเองก็จะไปด้วยค่ะ!!"
33040-30 = "คะ... คือว่า... คุณฮานาโกะ..."
33040-34 = "หืม? ทำไมเหรอคะคุณฮินาตะ?"
33040-38 = "คือว่า... อันนั้นน่ะค่ะ... ที่ติดหลังอยู่..."
33040-40 = "ตายแล้ว จริงด้วยค่ะ แบบนี้มันน่าลำบากใจจัง♡"
33040-41 = "เอ่อ..."
33040-43 = "เอ่อ... คุณฮานาโกะคะ... มีเรื่องอะไรไม่ดีเกิดขึ้นหรือเปล่า..."
33040-44 = "หืม? ไม่มีอะไรหรอกค่ะ ช่วงนี้ฉันกำลังช่วยจัดข้อมูลตามที่พวกซิสเตอร์ขอค่ะ เป็นงานสำคัญเลยละค่ะ♡"
33040-45 = "ขะ... ขอโทษนะคะ... บางอย่างดู... น่ากลัวจัง"
33040-49 = "ห้องประชุมแพนเดโมเนียม โซไซตี้"
33040-50 = "หึหึหึหึ! นี่สินะคุณครูจาก <ชาเล่ต์> !"
33040-51 = "นี่มันเกินความคาดหมายของเราเลย! น่ายินดีเสียจริง! หึหึหึหึ!!"
33040-52 = "[s] \"อ่า... สวัสดี ประธานสภานักเรียนเกเฮนน่าใช่ไหม?\""
33040-53 = "หึหึ อืม เราเอง"
33040-54 = "คิดดีแล้วล่ะที่ตัดสินใจมาร่วมมือกับท่านมาโคโตะ ประธานแห่งแพนเดโมเนียม โซไซตี้"
33040-55 = "[s] \"หืม...?\""
33040-56 = "หึหึหึหึ อืม หากชาเล่ต์กับแพนเดโมเนียม โซไซตี้มาจับมือกัน เราจะสามารถทำลาย#nพวกคณะกรรมการวินัยได้อย่างง่ายดายเลยล่ะ นี่เป็นการตัดสินใจที่มีเหตุมีผลมาก"
33040-57 = "ถ้าตัดสินใจแล้วละก็ มาวางแผนเลย...!"
33040-58 = "เดี๋ยวก่อน... เรื่องแบบนี้ต้องพูดตอนที่อีกฝ่ายไม่อยู่ไม่ใช่เหรอคะ?"
33040-59 = "เฮ้อ... รุ่นพี่มาโคโตะ อย่าเริ่มทำให้เรื่องมันแปลกเลยค่ะ "
33040-60 = "ที่คุณครูจากชาเล่ต์มาแบบนี้ เพราะคุณครูถูกเลือกให้เป็นผู้สังเกตการณ์ของสนธิสัญญาเอเดนไงคะ คุณครูแค่มาเป็นพิธีน่ะค่ะ"
33040-61 = "ว่าไงนะ? แล้วการร่วมมือกับเราล่ะ?"
33040-62 = "ไม่มีทางหรอกค่ะ ใครจะไปทำอะไรแบบนั้นกับคนที่เพิ่งเคยเจอกันครั้งแรกคะ?"
33040-63 = "......."
33040-64 = "หึหึ งั้นเหรอ... ก็ได้..."
33040-65 = "งั้นเก็บเรื่องสนุกไว้ก่อนแล้วกันนะครู"
33040-66 = "ช่างเถอะ กลับกันเถอะอิโรฮะ!"
33040-70 = "คะ? เสร็จแล้วเหรอคะ? "
33040-72 = "เฮ้อ... "
33040-73 = "[s] \"แล้วอาโกะล่ะ สบายดีไหม?\""
33040-74 = "อึ้ก... "
33040-75 = "อืม... ก็เรื่อยๆ... "
33040-76 = "ไม่ทันได้คาดคิดไว้เลยนะว่าคุณครูจะเข้ามาสังเกตการณ์สนธิสัญญาเอเดน "
33040-77 = "นี่แสดงว่าเดี๋ยวจะเข้าไปที่ทรีนิตี้เหมือนกันใช่ไหม...?"
33040-78 = "[s] \"ครูไปมาแล้วล่ะ\""
33040-79 = "คะ? ปะ...ไปมาเมื่อไหร่...?!"
33040-80 = "นี่เจ้าหน้าที่คณะกรรมการวินัยอย่างฉันพลาดข้อมูลนี้ไปเหรอเนี่ย...? "
33040-81 = "ถึงจะงานยุ่งกับการเตรียมสนธิสัญญาแค่ไหน แต่ฉันต้องรู้ทุกการเคลื่อนไหวของคุณครูจาก <ชาเล่ต์> สิ..."
33040-82 = "[s] \"ใจเย็นๆ นะ...\""
33040-83 = "อืม... "
33040-84 = "เอาเถอะค่ะ ท่านประธานเองก็บอกให้ฉันสงบจิตใจลงบ้าง... อืม..."
33040-85 = "[s] \"ฮินะทำอะไรอยู่เหรอ?\""
33040-86 = "ท่านประธานมีธุระอื่น... ตอนนี้ไม่อยู่ที่โรงเรียนหรอกค่ะ"
33040-87 = "ท่านประธานงานยุ่งน่ะค่ะ... น่าจะยุ่งที่สุดในโรงเรียนนี้เลยด้วย ถ้ามีการลงนามในสนธิสัญญา งานของท่านประธานก็จะลดลง แต่ก็..."
33040-88 = "......."
33040-89 = "ว่าแต่คุณครูก็เสร็จธุระในเกเฮนน่าแล้วใช่ไหมคะ? ทางออกอยู่ด้านโน้นค่ะ..."
33040-95 = "ฉันไปส่งเอง..."
33040-96 = "ทะ... ท่านประธาน?"
33040-97 = "มะ...ไม่ได้เสร็จงานพรุ่งนี้หรอกเหรอคะ?"
33040-98 = "อื้ม พอดีเคลียร์งานได้เร็วน่ะ อาโกะเองก็น่าจะมีเรื่องต้องทำนะ ทางนี้ฉันจะรับช่วงต่อเอง"
33040-99 = "อ่า... ได้ค่ะ"
33040-100 = "ไปสิครู"
33040-102 = "อืม..."
33040-103 = "ทุกอย่างเรียบร้อยดีไหม? เรื่องที่เกิดขึ้นในทรีนิตี้หลังจากนั้นน่ะ"
33040-104 = "[s1] \"เรื่องนี้ต้องใช้เวลาหน่อย...\" \n[s2] \"ครูว่าจะลองคลี่คลายดูใหม่หลังจบเรื่องสนธิสัญญาเอเดน\""
33040-105 = "อืม... จะบอกให้ชัดเจนไม่ได้สินะ"
33040-106 = "อืม... จะบอกให้ชัดเจนไม่ได้สินะ"
33040-107 = "ถึงตอนนั้นฉันจะได้ฟังคำอธิบายมาบ้างแล้ว... แต่ตอนนี้รู้สึกเหมือนมีบางส่วนที่ยังไม่ได้อธิบาย..."
33040-108 = "เปล่านะ... ฉันไม่ได้จะตำหนิอะไรหรอก ก็เป็นเรื่องของทรีนิตี้นี่นา ถ้าเป็นอะบิดอสก็ว่าไปอย่าง ครูเองก็คงจะมีเหตุผลของตัวเอง"
33040-109 = "[s] \"ครูอธิบายไปละเอียดแล้วนะ... โดยเฉพาะเรื่องเสวนาชุดว่ายน้ำ\""
33040-110 = "มะ... ไม่ต้อง! เรื่องนั้นไม่ต้องเล่าละเอียดก็ได้!"
33040-111 = "......."
33040-112 = "เอาเถอะ..."
33040-113 = "ครูเคยพูดไว้นี่ว่าความจริงไม่ได้มีอยู่แค่มุมมองเดียว แต่มีได้หลายมุมมอง...  นั่นแปลว่า..."
33040-114 = "<คนทรยศในทรีนิตี้> คือความจริงผ่านมุมมองที่เฉพาะเจาะจง... แต่สิ่งที่ครูต้องการ มันไม่น่าจะใช่สิ่งนั้น"
33040-115 = "เราต้องทำความเข้าใจความจริงอื่นๆ ผ่านมุมมองอื่นๆ... เพราะว่า..."
33040-116 = "...... "
33040-120 = "มีบางคนที่ได้รับความไว้วางใจจากครูอยู่สินะ"
33040-121 = "[s] \"ครูเชื่อใจฮินะมากกว่าใครนะ\""
33040-122 = "พะ... พูดอะไรเนี่ย...?! "
33040-123 = "เรื่องนี้เคยบอกฉันแล้วไม่ใช่เหรอ ไม่ต้องบอกซ้ำสองก็ได้!"
33040-124 = "เชื่อเขาเลย..."
33040-126 = "กลับได้แล้ว กลับดีๆ ล่ะ"
33040-127 = "[ns] \"ไม่ได้บอกอาโกะเรื่องลาออกใช่ไหม?\""
33040-129 = "อื้ม... "
33040-130 = "มีแค่ครูคนเดียวที่รู้ แต่คนอย่างอาโกะน่าจะรู้แล้วก็ได้"
33040-131 = "การออกจากตำแหน่งมันไม่ใช่เรื่องใหญ่โตอะไรหรอก ฉันแค่เหนื่อยและก็อยากพักบ้าง..."
33040-132 = "เราหยุดคุยเรื่องนี้กันเถอะ... มันไม่ใช่เรื่องสำคัญอะไร"
33040-133 = "งั้นเจอกันตอนพิธีลงนามนะครู..."
33040-134 = "[s] \"ขอบใจนะฮินะ ครูติดหนี้บุญคุณเธอเลย\""
33040-137 = "(และเวลาก็ล่วงเลยไป)"
33040-138 = "(วันลงนามสนธิสัญญาเอเดน)"
33040-143 = "ตอนต่อไป;พิธีลงนามสนธิสัญญาเอเดน (1)"

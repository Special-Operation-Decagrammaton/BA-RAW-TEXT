[translation]
33040-1 = "Episode 4;What Comes Next"
33040-3 = "Kyaaaaaaaaah!"
33040-4 = "*boom*"
33040-5 = "Tsurugi is at the top of her game today. "
33040-6 = "And here I was feeling a little tired. I don't have any excuses if the president is still so fired up."
33040-7 = "I'll follow her example and work even harder!"
33040-11 = "Vice President Hasumi, come in. A supply tank has been stolen from campus."
33040-12 = "Huh?! What did you just say?"
33040-13 = "We're shorthanded at the moment and could use back-up... Now the thief is using it to drift around corners! Amazing!"
33040-14 = "We...have our hands full at the moment. I believe Koharu should be able to provide back-up, however."
33040-15 = "Wait, no. I forgot she's out sick today with a cold."
33040-16 = "Technically, her paperwork to transfer back from the Make-Up Work Club hasn't gone through yet. I'll take care of this and go back to campus!"
33040-17 = "Kyaaaaaah! Kyaaah!"
33040-18 = "Actually, I think we can both leave this in Tsurugi's hands. I'll accompany you."
33040-30 = "H-Hanako. What are you doing?"
33040-34 = "Hmm? What's the matter, Hinata?"
33040-38 = "Wh-Why are you standing so close behind me? I can feel your...on my back..."
33040-40 = "Goodness, what a predicament. ♥"
33040-41 = "U-Ugh..."
33040-43 = "Hanako? Is something troubling you?"
33040-44 = "Oh, it's nothing. I've been saddled with taking care of the Sisterhood's paperwork for the last few days when I could be doing other things.#nIt's only a teensy bit...f r u s t r a t i n g. ♥"
33040-45 = "Y-You're kind of scaring me right now."
33040-49 = "Pandemonium Society"
33040-50 = "Hahaha! So you're that Sensei person from Schale? "
33040-51 = "Well, then! This is a pleasant surprise."
33040-52 = "[s] \"Uh...hi. You're Gehenna's student council president?\""
33040-53 = "Indeed I am."
33040-54 = "You've made a wise decision coming to the chair of the Pandemonium Society."
33040-55 = "[s] \"Come again?\""
33040-56 = "Think about it. Should the Pandemonium Society and Schale join forces, then the Prefect Team will never be able to stand in the way of progress again. It's quite a logical decision."
33040-57 = "If you've already calculated that far ahead, then what further is there to discuss?!"
33040-58 = "You know...you should really wait to have those kind of conversations until after I leave the room."
33040-59 = "*sigh* Makoto. Please try not to make this conversation any more awkward. "
33040-60 = "Schale's Sensei has been asked to mediate the Eden Treaty's signing. They're only here to make a formal greeting."
33040-61 = "Then what about our partnership?"
33040-62 = "What partnership? You've only just met. What were you expecting?"
33040-63 = "..."
33040-64 = "Yes, that makes perfect sense. Very well, then."
33040-65 = "The fun will have to wait for the next time we meet, Sensei."
33040-66 = "All right. Let's get going, Iroha."
33040-70 = "What? Already? "
33040-72 = "*sigh* "
33040-73 = "[s] \"Everything all right, Ako?\""
33040-74 = "O-Oh. "
33040-75 = "Well, more or less. "
33040-76 = "I never expected you to be involved with the Eden Treaty. "
33040-77 = "Does that mean you'll also be making formal greetings at Trinity?"
33040-78 = "[s] \"Already taken care of.\""
33040-79 = "Wh-What? Since when...?"
33040-80 = "Are you saying I've been out of the loop? But I'm the Prefect Team's senior administrator! "
33040-81 = "I've been so busy preparing for the treaty. I can't believe I'd lose track of your every move so carelessly like this."
33040-82 = "[s] \"Just calm down.\""
33040-83 = "Hmm... "
33040-84 = "You're right. Our president has told me the same lately."
33040-85 = "[s] \"Speaking of Hina, where is she?\""
33040-86 = "She's had...business to attend to elsewhere. She's not at the academy right now. "
33040-87 = "The head prefect has been as busy as ever. Though things may finally slow down for her once the Eden Treaty is signed..."
33040-88 = "..."
33040-89 = "So, your business here is done now, yes? I can show you out."
33040-95 = "No. I'll do that."
33040-96 = "P-President? "
33040-97 = "I thought you were away from campus."
33040-98 = "I was, but I managed to take care of things early. I'm sure you have other work to do, so let me take care of Sensei."
33040-99 = "Right. As you wish."
33040-100 = "Follow me, Sensei."
33040-102 = "Hmm..."
33040-103 = "So, Sensei. How go things at Trinity?"
33040-104 = "[s1] \"There's still a lot of work to be done.\"\n[s2] \"I'll still have a lot to do after the treaty is signed.\""
33040-105 = "Could I bother you for the specifics?"
33040-106 = "Could I bother you for the specifics?"
33040-107 = "I recall everything you told me on the bridge, but I also felt there were things you were leaving out."
33040-108 = "Not that I blame you, of course. I would expect more transparency if you were dealing with an academy like Abydos again, but I'm sure you had your reasons given this is Trinity we're discussing. "
33040-109 = "[s] \"I thought I was transparent. Want to know more about the swimsuit symposium?\""
33040-110 = "Th-That's not what I was referring to!"
33040-111 = "... "
33040-112 = "Well, anyway."
33040-113 = "The truth is all a matter of perspective—there can be more than one. Those were your words."
33040-114 = "Trinity being betrayed at all is just one perspective's truth. Maybe that's not the perspective you want to hold."
33040-115 = "If that's the case, then you'll have to hold a different perspective and grasp another truth, because..."
33040-116 = "... "
33040-120 = "You must really trust those girls."
33040-121 = "[s] \"But I trust you more than anyone, Hina.\""
33040-122 = "Wh-Where did that come from?! "
33040-123 = "You've already told me. Once was enough."
33040-124 = "Seriously."
33040-126 = "Take care on your way home, Sensei."
33040-127 = "[ns] \"Have you told Ako about your plans to retire?\""
33040-129 = "No. Not outwardly. "
33040-130 = "You're the only one I've told, but it wouldn't surprise me if Ako suspects it."
33040-131 = "It really isn't something to make a big deal over. I'm just tired and need time to rest. That's all..."
33040-132 = "Let's leave it at that. Again, it's unimportant."
33040-133 = "I'll see you at the signing ceremony, Sensei."
33040-134 = "[s] \"All right. Thanks, Hina.\""
33040-137 = "And so another day passed."
33040-138 = "At last, the day of the Eden Treaty's signing had come."
33040-143 = "Next Episode;Eden Treaty Signing Ceremony Part 1"

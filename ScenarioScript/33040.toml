[translation]
33040-1 = "第4話;それから"
33040-3 = "きえええぇぇぇぇぇぇっ！！！"
33040-4 = "（ドゴオォォォォン！！！ズドオォォォォォォン！！！！）"
33040-5 = "ツルギ先輩、今日は絶好調ですね。"
33040-6 = "……正直、任務続きで疲れもあったのですが、こんな姿を目の前にして弱音は吐けません。"
33040-7 = "私も先輩を見習って、もっと頑張らないと！"
33040-11 = "ハスミ先輩ちーっす。さっきちょっと誰かさんに、学校にあった備品の戦車を奪われちゃいましてー。"
33040-12 = "何ですって……！？"
33040-13 = "ちょっと頭数が足りないんで来てほしいんすけど……おわっ、何かすげードリフトしてる！？なんつーテク！"
33040-14 = "今はバタバタしているのですが……えっと、コハルがまだ校内に……。"
33040-15 = "いえ、コハルは風邪で休んでいるんでしたね……。"
33040-16 = "そもそもコハルさんはまだ補習授業部の所属ですよ。というわけで先輩、私が行ってきます！"
33040-17 = "ぎゃはははははははははぁっ！"
33040-18 = "まあ、ここはツルギに任せても良さそうですね……私も一緒に行きます！"
33040-30 = "あ、あの、ハナコさん……？"
33040-34 = "はい、どうかしましたかヒナタさん？"
33040-38 = "あの、背中に何かが当たっているような……？"
33040-40 = "そうですねぇ、困りましたねぇ♡"
33040-41 = "あうぅ……。"
33040-43 = "えっと、ハナコさん？何かお辛いことでも……？"
33040-44 = "いえいえ、何もありませんよ。お出かけしたいタイミングにこうして頼みごとをされて、何日も資料整理という「大切な」お手伝いに従事させられているだけですから。まあ全員一緒ではありませんでしたし……何ひとつ問題はありません♡"
33040-45 = "うぅ、ごめんなさい……ハナコさんが怖い……。"
33040-49 = "万魔殿・議事堂"
33040-50 = "キキキキッ！お前が「シャーレ」の先生か！"
33040-51 = "なるほど、これは予想外だ！いっそ愉快なくらいにな！キキキキキッ！"
33040-52 = "[s] \"えっと……こんにちは。君がゲヘナの生徒会長……？\""
33040-53 = "キキッ、ああそうさ。"
33040-54 = "万魔殿の議長であるこのマコト様に協力の申し出とは、悪くない判断だ。"
33040-55 = "[s] \"……え？\""
33040-56 = "キキキキッ……「シャーレ」と「万魔殿」。この二つが力を合わせたら、ゲヘナの風紀委員会ごとき簡単に壊せるはずだ。至って論理的な判断だと言える。"
33040-57 = "計算は完了した、さあすぐにでも計画を実行……！"
33040-58 = "……あの。そういう会話は、相手がいないところでした方が良いですよ？"
33040-59 = "マコト先輩……話を変な方向に捻じ曲げないでください。"
33040-60 = "こちらの「シャーレ」の先生はあくまで、形式的な問題で私たちに会いに来ただけです。エデン条約にも参列されますので。"
33040-61 = "……なら、我々との協力は？"
33040-62 = "するわけがないじゃないですか。そもそも今日初めて会ったばかりですよ？"
33040-63 = "……。"
33040-64 = "……ふっ、そうか。なるほど。"
33040-65 = "まあ、楽しみは後に取っておくとしよう。"
33040-66 = "よし、帰るぞイロハ。"
33040-70 = "はい？もう良いんですか？"
33040-72 = "はぁ……。"
33040-73 = "[s] \"アコも、元気だった？\""
33040-74 = "それは……。"
33040-75 = "まあまあ、ですかね……。"
33040-76 = "でも意外でした、先生がエデン条約に参列されるだなんて。"
33040-77 = "ということは、この後はトリニティに……？"
33040-78 = "[s] \"さっきトリニティに行ってから、ここに来たところ。\""
33040-79 = "なっ、いつの間に……！？"
33040-80 = "風紀委員会の行政官である私が、そんな重要な情報を見逃していた……！？"
33040-81 = "いくら条約の準備で忙しかったとはいえ、先生の行動を把握できていなかっただなんて……。"
33040-82 = "[s] \"アコ、落ち着いて……。\""
33040-83 = "……ふぅ。"
33040-84 = "委員長にも先日言われてしまいました、少し落ち着いた方が良いと……。"
33040-85 = "[s] \"ヒナは今仕事中？\""
33040-86 = "委員長は、今所用でゲヘナの外に……。"
33040-87 = "いつも通り、お忙しい毎日です……エデン条約が締結されたら、委員長のお仕事も減るとは思いますが……。"
33040-88 = "……。"
33040-89 = "とにかく、先生の用事は終わりですよね。お帰りはあちらの方――"
33040-95 = "……見送る。"
33040-96 = "い、委員長？"
33040-97 = "明日まで出張だったはずでは……？"
33040-98 = "思ったより早く片付いたから。アコもお疲れ様、私が送ってくるから休んでて。"
33040-99 = "あ、はい……。"
33040-100 = "ほら、先生。"
33040-102 = "ふぅ……。"
33040-103 = "……それで、先生。トリニティの件は落ち着いた？"
33040-104 = "[s1] \"まだ全然、どうにかしたいことが山積みで……。\"\n[s2] \"エデン条約が終わった後に、また色々やる予定……。\""
33040-105 = "そう……ということは、私にも言ってないことをまた色々と抱えてるってわけね。"
33040-106 = "そう……ということは、私にも言ってないことをまた色々と抱えてるってわけね。"
33040-107 = "あの時私に言ったことが本当に全部なら、まだ終わってないはずが無いと思うのだけど？"
33040-108 = "……別に、「どうして全部言わなかったの」って責めてるわけじゃない。アビドスならまだしも、トリニティのことだし。やたらと複雑で、色々先生側にも考えることとか事情があっただろうし……。"
33040-109 = "[s] \"ま、まあ……でも水着パーティーの件は全部説明した通りだよ。\""
33040-110 = "そっ、そういうのは良いの！"
33040-111 = "ああもう……。"
33040-112 = "……まあ、とにかく。"
33040-113 = "色んな観点があって、見方によって真実は変わるかもしれない……あの時先生はそう言ってたけれど。"
33040-114 = "例え「トリニティの裏切り者」が見つかったとしても、それは特定の観点からの真実にすぎない……それだけで全てを判断するのは難しい。"
33040-115 = "情報だけを鵜呑みにせず、色んな観点から他の真実をも探しつつ、自分にできる努力をし続ける。なぜならそれは……"
33040-116 = "……。"
33040-120 = "……その子たちは、先生に信じられてるのね。"
33040-121 = "[s] \"ヒナのことも信じてるよ。\""
33040-122 = "っ！急に何を……！"
33040-123 = "あと、それは前にも聞いた！"
33040-124 = "全くもう……。"
33040-126 = "帰り道、気を付けて。"
33040-127 = "[ns] \"……もしかしてだけど、まだアコに引退のこと話してない？\""
33040-129 = "……そうね。"
33040-130 = "先生以外はまだ誰も知らない。アコは何となく気づいてるかもしれないけど。"
33040-131 = "引退と言ったって、そんなに大げさなことじゃない。少し疲れたから休みたいってだけで……。"
33040-132 = "……この話はやめよう。そんなに大事なことでもないし。"
33040-133 = "……じゃあまた、調印式で。"
33040-134 = "[s] \"うん、ありがとう。ヒナ。\""
33040-137 = "それからまた、時間は流れて……"
33040-138 = "エデン条約調印式、当日を迎える。"
33040-143 = "次回;エデン条約調印式（１）"

[translation]
33040-1 = "第4話;在那之後"
33040-3 = "咿耶耶耶耶耶耶耶耶耶！！！"
33040-4 = "（咚哐哐哐哐哐！！！碰咚咚咚咚咚咚咚咚！！！！）"
33040-5 = "弦生前輩，今天狀態良好呢。"
33040-6 = "……說實話，雖然因為連續任務有點累了，但是可不能看著眼前的這個身影抱怨。"
33040-7 = "我也要以前輩為模範，更加努力才行！"
33040-11 = "蓮實前輩哈囉──。剛才稍微被別人，奪走了學校裡備品的戰車──。"
33040-12 = "妳說什麼……！？"
33040-13 = "因為人數有點不夠希望妳能過來……哦哇，好像在做什麼很厲害的飄移！？這什麼技術！"
33040-14 = "不過現在有點忙碌……那個，小春還在校內……"
33040-15 = "不對，小春因為感冒正在休息呢……"
33040-16 = "再說了小春還是所屬於補課部唷。所以前輩，由我去吧！"
33040-17 = "呀哈哈哈哈哈哈哈哈哈哈！"
33040-18 = "嘛，這裡似乎交給弦生就可以了呢……我也一起去！"
33040-30 = "那，那個，花子同學……？"
33040-34 = "是的，怎麼了嗎日向同學？"
33040-38 = "那個，我的背上好像碰到了什麼……？"
33040-40 = "就是說呀，傷腦筋呢♡"
33040-41 = "啊嗚……"
33040-43 = "那個，花子同學？有什麼難過的事嗎……？"
33040-44 = "沒有沒有，什麼都沒有唷。只是在想要出門的時機像這樣被拜託事情，連續幾天被從事名為資料整理「重要的」幫忙。嘛也不是全員一起……沒有任何問題♡"
33040-45 = "唔，對不起……花子同學好恐怖……"
33040-49 = "萬魔殿．議事堂"
33040-50 = "嘻嘻嘻嘻！你就是「夏萊」的老師嗎！ "
33040-51 = "原來如此，這出乎所料呢！不如說是愉快的程度呢！嘻嘻嘻嘻嘻！"
33040-52 = "[s]「那個……妳好。妳就是格黑娜的學生會長……？」"
33040-53 = "嘻嘻，啊啊沒錯。"
33040-54 = "竟然向我這個萬魔殿的議長真琴大人提出合作，不錯的判斷啊。"
33040-55 = "[s]「……咦？」"
33040-56 = "嘻嘻嘻嘻……「夏萊」和「萬魔殿」。這兩個合力的話，應該能輕易破壞格黑娜的風紀委員會才對。可以說是有邏輯的判斷。"
33040-57 = "計算完成了，來吧立刻執行計劃……！"
33040-58 = "……那個。那種對話，對方不在的時候再說會比較好唷？"
33040-59 = "真琴前輩……請不要把話題轉向奇怪的方向。"
33040-60 = "這位「夏萊」的老師終究只是，由於形式上的問題所以來見我們的。因為也會參加伊甸園條約。"
33040-61 = "……那，和我們的合作呢？"
33040-62 = "怎麼可能啊。再說了今天是第一次見面唷？"
33040-63 = "……"
33040-64 = "……哼，是嗎。原來如此。"
33040-65 = "嘛，樂趣就留到後面吧。"
33040-66 = "好，回去囉伊呂波。"
33040-70 = "什麼？已經可以了嗎？"
33040-72 = "哈啊……"
33040-73 = "[s]「亞子也，過得好嗎？」"
33040-74 = "那是……"
33040-75 = "馬馬虎虎，吧……"
33040-76 = "不過真意外，沒想到老師會參加伊甸園條約。"
33040-77 = "也就是說，這之後要去三一……？"
33040-78 = "[s]「剛才先去了三一，才來這裡的。」"
33040-79 = "什，什麼時候……！？"
33040-80 = "身為風紀委員會行政官的我，竟然遺漏了那麼重要的情報……！？"
33040-81 = "就算因為條約的準備很忙，竟然沒有掌握老師的行動……"
33040-82 = "[s]「亞子，冷靜點……」"
33040-83 = "……呼。"
33040-84 = "前幾天也被委員長說了，稍微冷靜一下比較好……"
33040-85 = "[s]「陽奈在工作中？」"
33040-86 = "委員長她，現在有事在格黑娜外面……"
33040-87 = "一如往常，忙碌的每一天……伊甸園條約締結的話，我想委員長的工作也會減少……"
33040-88 = "……"
33040-89 = "總之，老師要辦的事結束了吧。回去的路在那個方向──"
33040-95 = "……我送你。"
33040-96 = "委，委員長？"
33040-97 = "出差不是到明天嗎……？"
33040-98 = "比預想的還要早結束了。亞子也辛苦了，妳去休息吧由我來送行。"
33040-99 = "啊，是的……"
33040-100 = "走吧，老師。"
33040-102 = "呼……"
33040-103 = "……所以，老師。三一的事安定下來了嗎？"
33040-104 = "[s1]「還沒完全，想要想辦法處理的事情還堆積如山……」\n[s2]「預定伊甸園條約結束後，再解決各種事情……」"
33040-105 = "是嗎……也就是說，又有了很多沒有對我說的事呢。"
33040-106 = "是嗎……也就是說，又有了很多沒有對我說的事呢。"
33040-107 = "那時候對我說的全部都是實話的話，我想應該還沒結束才對？"
33040-108 = "……也不是，在責怪你「為什麼沒有說出全部」。阿拜多斯還說得過去，畢竟是三一的事。肯定非常複雜，老師也有各種考量之類的和原因……"
33040-109 = "[s]「嘛，嘛……不過泳衣派對的事全部都和說明的一樣唷。」"
33040-110 = "那，那種的不用！"
33040-111 = "啊啊真是的……"
33040-112 = "……嘛，總之。"
33040-113 = "有各種觀點，根據觀看角度真相也許會改變……雖然老師那時候這麼說。"
33040-114 = "假如就算找到了「三一的叛徒」，那只不過是從特定觀點來看的真相……只憑那個判斷全部是很困難的。"
33040-115 = "不要只盲信情報，同時從各種觀點尋找其他真相，持續自己能做到的努力。因為那就是……"
33040-116 = "…… "
33040-120 = "……那些孩子，受到老師的信賴呢。"
33040-121 = "[s]「我也相信陽奈唷。」"
33040-122 = "！突然講什麼……！"
33040-123 = "還有，那之前也聽過了！"
33040-124 = "真是的……"
33040-126 = "回去路上，注意安全。"
33040-127 = "[ns]「……該不會，還沒告訴亞子引退的事嗎？」"
33040-129 = "……是啊。"
33040-130 = "除了老師之外還沒有人知道。雖然亞子可能察覺到了。"
33040-131 = "雖然說是引退，也不是那麼誇張的事。只是有點累了想休息而已……"
33040-132 = "……不說這件事了。也不是那麼重要的事。"
33040-133 = "……那麼，簽約儀式再見。"
33040-134 = "[s]「嗯，謝謝妳。陽奈。」"
33040-137 = "（在那之後，又過了一段時間……）"
33040-138 = "（迎來了，伊甸園條約簽約儀式那一天）"
33040-143 = "下一話;伊甸園條約簽約儀式（１）"

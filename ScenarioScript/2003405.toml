[translation]
2003405-1 = "เพื่อพานพบโชคดี"
2003405-2 = "มีเมนูที่ชื่อว่า 'โทชิโคชิอุด้ง' ด้วยละค่ะ!"
2003405-3 = "[s] \"หืม? หมายถึง 'โทชิโคชิโซบะ' หรือเปล่า?\""
2003405-4 = "ไม่ค่ะ อุด้งถูกแล้วค่ะ"
2003405-5 = "ตอนนี้เป็นที่ร่ำลือกันเลยค่ะว่าอุด้งแบบนั้นพิเศษที่สุด"
2003405-6 = "ฉันควรระวังไว้หน่อยเพราะในอินเทอร์เน็ตมีโฆษณาไวรัลเยอะงั้นเหรอคะ? ฮุฮุ คุณครูก็พูดถูกค่ะ..."
2003405-7 = "แต่ว่าฉันเป็นพวกที่เชื่อคะแนนรีวิวที่ได้ 4 ดาวจากทั้งหมด 500 รีวิวมากกว่า 5 ดาวจากทั้งหมด 10 รีวิวค่ะ"
2003405-8 = "และโทชิโคชิอุด้งที่ฉันพูดถึง... ก็ได้คะแนนรีวิว 4.3 ดาวจากทั้งหมด 872 รีวิวค่ะ"
2003405-9 = "[s] \"ถ้างั้นก็ต้องลอง...!\""
2003405-10 = "อ๊ะ ระหว่างนี้มีคนมาเขียนรีวิวเพิ่มด้วยค่ะ"
2003405-11 = "\"เส้นหนาและอ้วนกว่าเส้นอุด้งปกติ แต่ก็นุ่มลื่นและกินง่าย\""
2003405-12 = "\"นี่แหละอุด้งที่จริงใจ! เป็นอาหารที่เรียบง่ายแต่รสชาติลึกซึ้ง\""
2003405-13 = "\"น้ำซุปออกจะจืดๆ ไปหน่อย แต่ก็มีเครื่องปรุงให้หลากหลายดี\""
2003405-14 = "\"ลูกชิ้นปลาสีชมพูกับเทมปุระกุ้งที่ใส่มาด้วยมีความหมายว่าให้ขอพรปีใหม่หรือเปล่านะ... เรื่องนั้นไม่รู้ แต่ที่รู้คือเทมปุระดีมาก\""
2003405-15 = "[s1] \"รีวิวดีเลยนะเนี่ย\"\n[s2] \"ร้านนี้อยู่ที่ไหนเหรอ?\""
2003405-18 = "เห็นว่าอยู่ในจุดแวะพักที่อยู่ไกลจากตรงนี้ไปหน่อยนะคะ"
2003405-19 = "ถ้าขับรถไปก็น่าจะใช้เวลาประมาณ 2 ชั่วโมง..."
2003405-20 = "คงเป็นเพราะอยู่ในสถานที่ห่างไกล ก็เลยยังไม่มีรถไฟสายตรงไปถึงค่ะ"
2003405-21 = "[s] \"ปัญหาใหญ่เลยนะ จะไปยังไงดีล่ะ?\""
2003405-22 = "ฮุฮุ..."
2003405-27 = "ฉันไปยืมรถมาเรียบร้อยแล้วค่ะ!"
2003405-28 = "[s3] \"หะ... หือ?!\"\n[s4] \"ไป 'ยืม' มาจริงๆ เหรอ?\""
2003405-31 = "ค่ะ★ ฉันก็ต้อง 'ยืม' มาอยู่แล้วค่ะ"
2003405-32 = "ถ้าเสร็จธุระแล้วฉันจะเอาไปคืนอย่างแน่นอน เพราะงั้นไม่ต้องเป็นห่วงนะคะ★"
2003405-33 = "[s] \"ยืมมาจริงๆ ใช่มั้ย?!\""
2003405-37 = "มาถึงแล้วค่ะ! ร้านน่าจะอยู่ในจุดแวะพักแถวๆ นี้นะคะ"
2003405-38 = "อืม~ เป็นที่ที่ดูปลอดโปร่งและเงียบสงบจังเลยนะคะ"
2003405-39 = "แต่ก็แอบรู้สึกว่าไม่ค่อยกระตุ้นต่อมอยากอาหารเท่าไรเลยค่ะ แต่ก็เอาเถอะ★"
2003405-40 = "[s] \"อุ... อุด้ง! เราไปกินอุด้งกันเถอะ อาคาริ!\""
2003405-41 = "ค่า ค่า~! แน่นอนอยู่แล้วค่ะคุณครู ก็เรามาที่นี่เพื่อกินอุด้งกันนี่คะ"
2003405-42 = "ไหนดูซิ... ถ้าไปตามแผนที่ในอินเทอร์เน็ต... ก็น่าจะอยู่ทางโน้นนะคะ"
2003405-44 = "โทชิโคชิอุด้ง 2 ชามที่สั่งไว้ได้แล้วครับ"
2003405-45 = "จะทานให้อร่อยเลยค่า!"
2003405-46 = "[s] \"จะทานให้อร่อยเลย\""
2003405-51 = "อืม..."
2003405-52 = "......"
2003405-56 = "อร่อยจังเลยค่ะ!"
2003405-57 = "[s] \"รสชาติแตกต่างกับอุด้งที่เคยกินมาจริงๆ ด้วย!\""
2003405-58 = "จุดเด่นก็คือการเทน้ำซุปอุ่นๆ ลงในเส้นเย็นๆ เพื่อทำให้กินได้ทันทีค่ะ"
2003405-59 = "การทำให้เส้นอุด้งเย็นอยู่ตลอดจนกว่าจะนำมาเสิร์ฟก็ยิ่งคงความเหนียวนุ่มของเส้นไว้ได้ด้วยค่ะ"
2003405-60 = "เส้นอุด้งมีความหนามากกว่าเส้นอุด้งธรรมดา ก็น่าจะลวกและคงความยืดหยุ่นไว้ได้ยาก"
2003405-61 = "แต่ก็ทำออกมาได้สำเร็จอย่างงดงามเลย ต้องบอกว่ารู้สึกได้ถึงความเชี่ยวชาญของร้านเลยละค่ะ"
2003405-62 = "ลูกชิ้นปลากับเทมปุระก็ทำออกมาได้ดี และถึงน้ำซุปจะรสอ่อน แต่ก็ยิ่งเป็นการชูรสชาติของเครื่องปรุง และเส้นได้ดีขึ้นค่ะ"
2003405-63 = "[s] \"ว้าว ตอนรีวิวอาหาร เหมือนเป็นอาคาริอีกคนไปเลยนะ!\""
2003405-64 = "ฮุฮุ ก็ฉันเป็นหนึ่งในสมาชิกของชมรมชิมอาหารนี่คะคุณครู"
2003405-65 = "ถึงฉันจะชอบอาหารที่กินได้เยอะๆ และให้ปริมาณมากๆ มากกว่าก็เถอะค่ะ..."
2003405-66 = "แต่ยังไงฉันก็ยังเข้าใจความหมายของอาหารรสเลิศอยู่นะคะ"
2003405-67 = "แต่ก็แน่นอนว่า... การได้เป็นที่หนึ่งในวงการชิมอาหารยังเป็นเรื่องยากสำหรับฉันค่ะ"
2003405-68 = "[s] \"เป็นอาคาริที่เป็นอยู่ตอนนี้ก็ดีแล้ว\""
2003405-69 = "ฮุฮุ ขอบคุณที่พูดแบบนั้นนะคะ"
2003405-75 = "แต่ว่า..."
2003405-76 = "ช่วยไม่ได้นะคะที่ฉันจะรู้สึกว่าอุด้งที่นี่ให้น้อยไปหน่อย"
2003405-77 = "[s] \"อืม... ก็จริงอยู่นะ\""
2003405-78 = "ทั้งสองคนมา 'ทัวร์อุด้ง' กันหรือเปล่า?"
2003405-79 = "อุด้งทัวร์เหรอคะ? หมายถึงอะไรคะ?"
2003405-80 = "ที่จริงเขตนี้ขึ้นชื่อเรื่องอุด้งน่ะ ก็เลยมีร้านอุด้งเปิดขายอยู่เต็มไปหมดเลย"
2003405-81 = "ที่นี่มีร้านอุด้งมากกว่าร้านสะดวกซื้ออีกนะ"
2003405-82 = "......!"
2003405-83 = "เพราะแบบนี้ก็เลยมีการตระเวนกินอุด้งร้านดังหรือร้านลับที่อยู่ในเขตนี้..."
2003405-84 = "ก็เลยเป็นทัวร์อุด้งสินะคะ!"
2003405-85 = "ชะ... ใช่แล้ว ในโฮมเพจการท่องเที่ยวของเขตนี้มีบทความแนะนำร้านอุด้งอยู่หลายร้านเลยนะ"
2003405-86 = "มีการทัวร์ร้านเด็ดแบบนั้นอยู่เหรอคะเนี่ย★"
2003405-87 = "คุณครู ได้ยินแล้วใช่มั้ยคะ?"
2003405-88 = "[s5] \"อืม... ได้ยินชัดเลย\"\n[s6] \"เหมือนจะรู้แล้วด้วยว่าต่อไปจะชวนทำอะไร...\""
2003405-91 = "เราไปทัวร์อุด้งกันเถอะค่ะ!"
2003405-92 = "[s] \"อืม... ก็ได้...\""
2003405-94 = "(จากนั้นคุณครูกับอาคาริก็ไปเริ่มทัวร์อุด้งด้วยกัน)"
2003405-100 = "(ทั้งสองคนตระเวนไปหลายร้านมากจนคุณครูเลิกนับว่าไปทั้งหมดกี่ร้านแล้ว...)"
2003405-105 = "(เนื่องจากในโฮมเพจมีประกาศว่าถ้าไปพิชิตอุด้งร้านดังของเขตนี้ครบทุกร้านแล้วจะให้ใบรับรอง...)"
2003405-106 = "(อาคาริก็เลยยิ่งตั้งอกตั้งใจกับการทัวร์อุด้งมากขึ้น...!)"
2003405-109 = "[ns] \"เอ่อ... อาคาริ...\""
2003405-110 = "คะ? มีอะไรเหรอคะคุณครู?"
2003405-111 = "อ้อ เราจำเป็นต้องตามเก็บอุด้งร้านดังของที่นี่ให้หมดเลยหรือเปล่าน่ะเหรอคะ?"
2003405-112 = "......"
2003405-113 = "คุณครู รู้อะไรมั้ยคะ? มีความเชื่อว่าถ้ากินโทชิโคชิโซบะไม่หมด เราจะเจอโชคร้ายอยู่ด้วยนะคะ"
2003405-114 = "[s] \"งั้นเหรอ?\""
2003405-115 = "ค่ะ เพราะฉะนั้นตอนกินโทชิโคชิโซบะ อย่างน้อยเราก็ต้องกินเส้นให้หมดค่ะ"
2003405-116 = "และตอนนี้เราก็มากินโทชิโคชิอุด้งอยู่นี่คะ"
2003405-117 = "เพราะงั้นถ้าเรากินอุด้งไม่หมด... หรือพูดอย่างก็คือถ้าเราพิชิตร้านอุด้งไม่หมด...!"
2003405-118 = "เราก็อาจจะเจอกับเรื่องไม่ดีในวันปีใหม่ก็ได้นะคะ★"
2003405-119 = "[s] \"อยากกินอุด้งเยอะๆ จนเอาความเชื่อมาเป็นข้ออ้างรึเปล่า!\""
2003405-120 = "ไม่หรอกค่ะ★ คิดว่าฉันเป็นคนยังไงคะเนี่ย★"
2003405-123 = "(แล้วทัวร์อุด้งของอาคาริก็ดำเนินต่อไปจนพระอาทิตย์ลับขอบฟ้า...)"
2003405-125 = "(และในที่สุด...!)"
2003405-127 = "ทำได้แล้วค่ะคุณครู! ฉันได้ใบรับรองผู้พิชิตอุด้งมาแล้วค่ะ!"
2003405-128 = "[s7] \"คิดไม่ถึงเลยนะเนี่ยว่าจะทำได้จริงๆ...\"\n[s8] \"ครูคิดไว้แล้วว่าอาคาริต้องทำได้...!\""
2003405-131 = "เวลาปาไปขนาดนี้แล้วเหรอคะเนี่ย เรากินกันจนฟ้ามืดเลยนะคะ"
2003405-136 = "จะทำยังไงดีล่ะคะ คุณครู?"
2003405-137 = "ฉัน... ขับรถตอนกลางคืนไม่ค่อยเก่งน่ะค่ะ..."
2003405-142 = "(สุดท้ายคุณครูก็ต้องหาที่พักใกล้ๆ เพื่อพักค้างคืนกับอาคาริ)"
2003405-143 = "(และต้องเหนื่อยกับการย่อยอุด้งที่กินมาจนแน่นท้อง...)"

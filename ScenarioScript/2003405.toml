[translation]
2003405-1 = "為了迎接幸運"
2003405-2 = "聽說有個東西叫做「跨年烏龍麵」！"
2003405-3 = "[s]「嗯？你是想說跨年蕎麥麵嗎？」"
2003405-4 = "不，是跨年烏龍麵沒錯。"
2003405-5 = "在眾多「跨年烏龍麵」中，似乎有間店裡的烏龍麵特別有名哦？"
2003405-6 = "網路上有很多病毒式廣告，叫我要小心？#n呵呵，雖然是這樣沒錯……"
2003405-7 = "比起10個5星評價，我更相信500個4星評價。"
2003405-8 = "至於那間跨年烏龍麵的評價是……4.3星，而且有872條評價。"
2003405-9 = "[s]「那好像確實值得期待……！」"
2003405-10 = "啊，最近評價好像又提升了呢。"
2003405-11 = "「比普通烏龍麵更厚實有彈性，同時又非常滑順。」"
2003405-12 = "「最單純、最忠於本質的味道。」"
2003405-13 = "「湯頭偏淡有點可惜，但配料很豐盛。」"
2003405-14 = "「用粉色魚板搭配炸蝦……用意是祈求新年的福氣嗎。炸物的品質也令人滿意。」"
2003405-15 = "[s1]「評價好像不錯呢。」\n[s2]「所以哪裡有賣呢？」"
2003405-18 = "這個嘛，好像是離這裡有點距離的休息站。"
2003405-19 = "開車去也需要兩小時左右的路程……"
2003405-20 = "可能是因為挺偏僻的關係，所以還沒有能直達的鐵路。"
2003405-21 = "[s]「傷腦筋，那該怎麼去呢？」"
2003405-22 = "呵呵……"
2003405-27 = "所以，我借了交通工具！"
2003405-28 = "[s3]「呃……！？」\n[s4]「這個……是『借來的』對吧？」"
2003405-31 = "對★當然是「借來的」囉。"
2003405-32 = "等事情辦完之後，我會好好地放回原位的，請不用擔心★"
2003405-33 = "[s]「真的是借來的吧！？」"
2003405-37 = "我們到了！就是這附近的休息站。"
2003405-38 = "唔嗯～看起來是很安靜悠哉的地方呢。"
2003405-39 = "……總覺得缺少了一點刺激感★"
2003405-40 = "[s]「烏，烏龍麵！我們快去吃烏龍麵吧，亞伽里！」"
2003405-41 = "當然，老師。我們不就是為了這個而來的嗎？"
2003405-42 = "我看看……根據網路上的地圖……應該在那邊。"
2003405-44 = "兩碗跨年烏龍麵，請慢用。"
2003405-45 = "那麼……我要開動了。"
2003405-46 = "[s]「我要開動了～」"
2003405-51 = "嗯……"
2003405-52 = "……"
2003405-56 = "很好吃呢！"
2003405-57 = "[s]「就是啊……和以往吃過的烏龍麵，味道好像不太一樣！」"
2003405-58 = "在冷的麵體上倒入熱湯，讓人能馬上能入口的部分是重點。"
2003405-59 = "因為麵一直保持冰涼，所以十分彈牙。"
2003405-60 = "麵條的粗細比普通烏龍麵還粗，想在保持彈性的情況下煮熟應該不容易才對。"
2003405-61 = "從成功達成的這點來看，這間店的功力很深厚呢。"
2003405-62 = "魚板和炸蝦也都做得很好，淡淡的湯頭反而更凸顯了配料和麵的味道。"
2003405-63 = "[s]「哇，現在的亞伽里和平常不太一樣呢！」"
2003405-64 = "呵呵，我再怎麼說也是美食研究會的一員哦，老師？"
2003405-65 = "當然我很喜歡份量十足，能吃得很飽的食物……"
2003405-66 = "但我也不是不明白「美食」這個概念的人。"
2003405-67 = "當然……要成為第一並不是那麼容易的事情。"
2003405-68 = "[s]「亞伽里現在這樣不是也很好嗎？」"
2003405-69 = "呵呵，謝謝你這麼說。"
2003405-75 = "不過果然……"
2003405-76 = "……還是感覺份量有點不夠呢。"
2003405-77 = "[s]「……嗯，我想也是。」"
2003405-78 = "兩位也是來進行烏龍麵之旅的嗎？"
2003405-79 = "烏龍麵之旅……那是什麼呢？"
2003405-80 = "其實這個地區以烏龍麵聞名……到處都有很多烏龍麵店在營業。"
2003405-81 = "聽說烏龍麵店比便利商店還要多哦。"
2003405-82 = "……！"
2003405-83 = "所以在這個地區，會有人特別為了有名或隱藏的烏龍麵名店而來巡迴……"
2003405-84 = "也就是「烏龍麵之旅」！"
2003405-85 = "沒，沒錯。在這區的觀光介紹網站上，也介紹了很多烏龍麵的名店呢。"
2003405-86 = "竟然有這麼精彩的觀光企畫★"
2003405-87 = "老師，你聽到了嗎？"
2003405-88 = "[s5]「……嗯，聽到了。」\n[s6]「然後好像知道接下來你想說什麼了……」"
2003405-91 = "趕緊開始烏龍麵之旅吧！"
2003405-92 = "[s]「好好好……」"
2003405-94 = "（就這樣與亞伽里一起開始了烏龍麵之旅）"
2003405-100 = "（……究竟去了多少家烏龍麵店，從中途開始就放棄計算了……）"
2003405-105 = "（甚至網站上還說，如果稱霸當地所有烏龍麵名店就會頒發認證書……）"
2003405-106 = "（看到這個消息的亞伽里兩眼發光，更加投入烏龍麵之旅……！）"
2003405-109 = "[ns]「那個，亞伽里……」"
2003405-110 = "嗯？怎麼了嗎，老師？"
2003405-111 = "呵呵……你問一定要稱霸這裡所有的烏龍麵名店嗎？"
2003405-112 = "……"
2003405-113 = "老師你知道嗎？#n有句關於跨年蕎麥麵的俗語是這樣說的──留下麵條會倒楣。"
2003405-114 = "[s]「是嗎？」"
2003405-115 = "沒錯，所以在吃跨年蕎麥麵的時候，至少要把麵條吃乾淨。"
2003405-116 = "同理……我們現在不是來吃跨年烏龍麵嗎？"
2003405-117 = "所以如果留下烏龍麵……換句話說，如果不能稱霸所有烏龍麵的話……！"
2003405-118 = "新的一年可能會發生什麼不好的事情哦★"
2003405-119 = "[s]「你是想用這樣的理由盡情吃烏龍麵吧！」"
2003405-120 = "怎麼會呢★你把我當成什麼人了★"
2003405-123 = "（亞伽里的烏龍麵之旅就這樣……一直持續到太陽下山……）"
2003405-125 = "（最後終於……！）"
2003405-127 = "成功了，老師！收到稱霸烏龍麵的認證書了！"
2003405-128 = "[s7]「想不到居然真的能做到……」\n[s8]「不對，好像也沒有多意外……！」"
2003405-131 = "但是不知不覺已經這麼晚了。"
2003405-136 = "……怎麼辦呢。老師？"
2003405-137 = "我對夜間駕駛……有點沒自信耶？"
2003405-142 = "（之後和亞伽里一起，在附近的小飯店住了一個晚上）"
2003405-143 = "（要消化烏龍麵實在很不容易……）"

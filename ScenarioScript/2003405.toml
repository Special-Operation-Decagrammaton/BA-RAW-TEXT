[translation]
2003405-1 = "Make Your Own Luck"
2003405-2 = "Ever heard of New Year's Eve udon?"
2003405-3 = "[s] \"Huh? Oh, you mean New Year's Eve soba, right?\""
2003405-4 = "Nope! I'm talking about New Year's Eve udon."
2003405-5 = "Of the many different kinds of New Year's Eve Udon, there's one that's especially popular!"
2003405-6 = "I know... I shouldn't just believe every viral ad I see on the internet."
2003405-7 = "But I put more stock in a 4-star rating with 500 reviews than a 5-star rating with ten."
2003405-8 = "And this New Year's Eve Udon has a 4.3-star rating with over 872 reviews."
2003405-9 = "[s] \"That's incredible!\""
2003405-10 = "Wow, even more reviews have been added since we started talking."
2003405-11 = "\"The noodles are a little bit thicker and firmer than normal udon, yet still very smooth.\""
2003405-12 = "\"A simple recipe that is faithful to what real udon should taste like.\""
2003405-13 = "\"The broth is a bit bland but they're extra generous with the toppings.\""
2003405-14 = "\"Udon adorned with pink fish cake and shrimp tempura... As if to wish for good fortune in the New Year. The tempura was pretty good too.\""
2003405-15 = "[s1] \"You weren't kidding about those reviews.\"\n[s2] \"Where can I buy some?\""
2003405-18 = "Well... It's at a rest area that's a little far from here."
2003405-19 = "About 2 hours away, I think?"
2003405-20 = "And in a remote area disconnected from any direct train lines."
2003405-21 = "[s] \"That's a problem. How do we get there then?\""
2003405-22 = "Heehee..."
2003405-27 = "With my borrowed ride!"
2003405-28 = "[s3] \"Uh, what?!\"\n[s4] \"You did actually borrow this, right?\""
2003405-31 = "Yes! Of course I \"borrowed\" it. ★"
2003405-32 = "Once we're done with it, I'll put it back. Don't worry about it! ★"
2003405-33 = "[s] \"Are you sure that's how borrowing works?!\""
2003405-37 = "We're here! The rest area should be nearby."
2003405-38 = "Hmm... This place seems so quiet and relaxed."
2003405-39 = "...It doesn't seem too exciting for such a big hot spot. ★"
2003405-40 = "[s] \"Udon! Udon! Let's go eat udon!\""
2003405-41 = "Yes, yes, of course, Sensei. That's what we're here for!"
2003405-42 = "Let's see... According to the online map...the restaurant should be that way."
2003405-44 = "Got two New Year's Eve Udon for you."
2003405-45 = "All right, thank you for the meal!"
2003405-46 = "[s] \"Thank you!\""
2003405-51 = "Hmm..."
2003405-52 = "..."
2003405-56 = "It's good!"
2003405-57 = "[s] \"It's definitely different from udon I've had in the past!\""
2003405-58 = "I think them pouring hot broth over cold noodles is the key. It makes it easier to eat them fast."
2003405-59 = "And since the noodles were kept cold, they're still chewy."
2003405-60 = "Though the noodles are thicker than usual. Cooking them while keeping them firm must've been difficult."
2003405-61 = "That they could speaks volumes about their restaurant's skill."
2003405-62 = "The fish cake and shrimp tempura are well made. And the seemingly plain broth actually enhances the flavors of the toppings and noodles even more."
2003405-63 = "[s] \"Wow, you're an udon expert, Akari!\""
2003405-64 = "Heehee. I'm not a member of the Gourmet Research Society for nothing."
2003405-65 = "Now, I still prefer quantity over quality but..."
2003405-66 = "I at least understand the concept of gourmet food."
2003405-67 = "Of course... It's not easy becoming number one."
2003405-68 = "[s] \"I think you're fine the way you are, Akari.\""
2003405-69 = "Heehee. Thanks for that, Sensei."
2003405-75 = "Even so..."
2003405-76 = "...I can't help but feel that this udon is lacking in quantity."
2003405-77 = "[s] \"...Yeah. I suspected you might feel that way.\""
2003405-78 = "Are you two also coming along for the udon tour?"
2003405-79 = "Udon tour? What's that?"
2003405-80 = "This region is famous for its udon... We have numerous udon shops all over the area."
2003405-81 = "Some travelers have claimed we've got more udon shops here than convenience stores."
2003405-82 = "...!"
2003405-83 = "So you see, discovering all the great, famous, or secret udon shops..."
2003405-84 = "...Is part of the udon tour!"
2003405-85 = "That's right. If you check out our local tourism website, you can see a list of all the udon restaurants there."
2003405-86 = "I can't believe we stumbled into such an awesome tour! ★"
2003405-87 = "Did you hear that, Sensei?"
2003405-88 = "[s5] \"...Yep, I heard.\"\n[s6] \"I even know what you're going to have us do next...\""
2003405-91 = "Let's start the Udon Tour now!"
2003405-92 = "[s] \"All right, all right...\""
2003405-94 = "And so, my Udon Tour with Akari began."
2003405-100 = "Somewhere along the way...I lost count of just how many udon shops we visited..."
2003405-105 = "Not only that. The tourism website promised a certificate for conquering all the famous udon shops in the area..."
2003405-106 = "When she caught wind of this, Akari's eyes sparkled. She delved even deeper into the world of udon!"
2003405-109 = "[ns] \"Hey, Akari...\""
2003405-110 = "Yes? What's up, Sensei?"
2003405-111 = "Are you really going to eat at every famous udon restaurant in the area?"
2003405-112 = "..."
2003405-113 = "Now, Sensei... Haven't you heard that misfortune comes to those who don't finish their New Year's Eve soba?"
2003405-114 = "[s] \"Really?\""
2003405-115 = "Yes, that's why it's important not to leave behind a single lonely noodle on your plate."
2003405-116 = "In the same vein...we came here to eat New Year's Eve Udon, right?"
2003405-117 = "So, if we leave any udon behind... If we don't conquer each and every udon shop..."
2003405-118 = "This coming year will be a catastrophe! ★"
2003405-119 = "[s] \"I think that's just an excuse to eat as much udon as you can!\""
2003405-120 = "Why I'd never! Who do you take me for? ★"
2003405-123 = "With those words, Akari's Udon Tour...continued until sunset..."
2003405-125 = "And then, finally..."
2003405-127 = "We did it, Sensei! We won the Udon Conqueror Certificate!"
2003405-128 = "[s7] \"I didn't think we'd make it...\"\n[s8] \"No. I never should have doubted you!\""
2003405-131 = "...Except now the whole day is finished."
2003405-136 = "What should we do, Sensei? "
2003405-137 = "I'm...not too confident about driving at night with this much food in me..."
2003405-142 = "We ended up spending the night at a modest hotel nearby."
2003405-143 = "We experienced a food coma for the ages..."

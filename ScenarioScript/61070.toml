61070-296 = "ฉันไม่ยอมให้..."
61070-298 = "......"
61070-299 = "พวกสควอดเข้ามาหรอกนะ"
61070-300 = "ใช่ ฉันไม่ยอมต้อนรับพวกนั้นหรอก"
61070-301 = "ผู้แทนของทรีนิตี้ที่พวกเราเคยไล่ไปหลายต่อหลายครั้งก็เหมือนกัน...!"
61070-303 = "เดี๋ยวนะคะ"
61070-304 = "เมื่อกี้บอกว่าคุณครูของชาเล่ต์ก็มาด้วยงั้นเหรอคะ?"

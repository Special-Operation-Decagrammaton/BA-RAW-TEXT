61070-333 = "บอกตามตรงว่าฉันเองก็ไม่แน่ใจว่าจะโอเคหรือเปล่า"
61070-334 = "แต่ยังไงก็... ต้องลองดูค่ะ ไม่คิดอย่างนั้นกันเหรอคะ?"
61070-335 = "แต่ว่าก็อย่าเพิ่ง... นั่นสินะคะ"
61070-336 = "แต่ละคนอย่าเพิ่งปลดอุปกรณ์ป้องกันความปลอดภัยของอาวุธปืนกันนะคะ"
61070-337 = "เข้าใจแล้วค่ะ รุ่นพี่!"
61070-340 = "ตอนต่อไป;ตามวิถีอาเรียส"

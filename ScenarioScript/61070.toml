[translation]
61070-1 = "Episode 7;Harmonica"
61070-2 = "So, Sensei."
61070-3 = "Your plan is to deliver these test papers..."
61070-4 = "...and help the Arius students prepare for the exam, yes?"
61070-10 = "[ns] \"Yes. Preferably as the 'Arius Comprehensive Exam.'\""
61070-11 = "Yes, the way its presented is important."
61070-12 = "Nagisa said that as well."
61070-14 = "Considering the name \"Trinity Comprehensive Exam\"... "
61070-15 = "It'd be nigh impossible for Arius students to accept. And who would grade the tests?"
61070-16 = "The multiple choice questions are easy enough. However, the free response questions are more subjective and pose more of a problem."
61070-17 = "If, by chance, an extra print of the Trinity Comprehensive Exam..."
61070-18 = "...ended up in the Squad's hands, and they delivered it to Arius..."
61070-19 = "Naturally, Trinity would sweep it under the rug."
61070-20 = "Hm, perhaps it was a printing error. Or they mistakenly routed the shipment through Kawanishi station. All manner of items are frequently lost there."
61070-21 = "Running a school truly is a lot of work."
61070-23 = "A shipping error... So our role will be both courier and bodyguard."
61070-24 = "...What about the pay?"
61070-25 = "[s] \"Don't worry. I'll make sure you're properly compensated.\""
61070-26 = "..."
61070-27 = "I'll hold you to that."
61070-28 = "[s] \"I've also got a secret little plan of my own!\""
61070-29 = "Y-You do?! Wh-What is it? I want to know!"
61070-30 = "Don't encourage them. When Sensei's acting like that, you know it'll be something dumb again."
61070-32 = "I can't help but to be a little excited. I'm sure it'll be worth the wait."
61070-34 = "That doesn't address all our issues, however."
61070-35 = "One can hardly take an exam without studying the materials first."
61070-36 = "And I have no insight into the kind of education Arius conducts. I'm concerned the contents of the test will be too foreign."
61070-37 = "Which is why I asked for your assistance, Sensei."
61070-38 = "So once again, thank you. And my apologies for hoisting this upon you, Arius Squad."
61070-42 = "I understand that everything we are doing here is against the grain."
61070-43 = "If people were to learn that Trinity was attempting to influence Arius' operations in any way..."
61070-44 = "It'd be inconceivable to most."
61070-45 = "As we are two entirely separate entities, after all..."
61070-46 = "How does this sound to you?"
61070-47 = "I'm grateful, Nagisa."
61070-51 = "For now, I can only say that I'm grateful this is the path you're choosing."
61070-52 = "You had every opportunity to assert your authority over Arius."
61070-53 = "However brief it may have been, Trinity did successfully take over and occupy Arius last time."
61070-55 = "That sort of force would have gotten us nowhere."
61070-56 = "Which is why I, Kirifuji Nagisa, approached Schale, not as the host of the Tea Party, but simply as a student."
61070-58 = "You know, I can't think of a more roundabout way to deal with a relatively simply problem."
61070-59 = "I-Is this what politics are like...? It's scary... really scary..."
61070-61 = "This kind of dance is a part of society. I see."
61070-62 = "I must say, I was impressed by Kirifuji Nagisa."
61070-63 = "Huh, Leader? Are you supporting the Tea Party now?"
61070-64 = "I-I didn't mean..."
61070-66 = "Misaki. When the opportunity arises, can we really be so picky about whom we learn things from?"
61070-67 = "There's too much we don't know about this world."
61070-68 = "Tsk..."
61070-70 = "Subaru! Will you play the harmonica for us, please?"
61070-71 = "Pleaaase! You haven't played in so long!"
61070-72 = "Wh-What?! Right now...?"
61070-73 = "C'mon! You're not going to be shy about it, are you?"
61070-74 = "It's just that... I mean..."
61070-75 = "Playing my harmonica in these ruins, pretending to be lost in our feelings..."
61070-76 = "I've been thinking this lately..."
61070-77 = "...but maybe we've outgrown that a little."
61070-78 = "Whoa! Is Subaru blushing right now?"
61070-79 = "Hahaha! To think Subaru would actually get embarrassed too! We got to witness a rare event today!"
61070-80 = "U-Um... I was away for a long time, so...I'd really like to hear you play too, Subaru."
61070-81 = "Ugh! Don't pull those puppy dog eyes with me!"
61070-83 = "Did I...do something wrong...?"
61070-84 = "You're just playing dirty now!"
61070-85 = "...I have no reason not to."
61070-86 = "YAAAY!!"
61070-91 = "I really do let you all bully me sometimes."
61070-92 = "Well, since you've backed me into a corner..."
61070-101 = "Even if I miss a note, I don't want to hear a single noise of complaint out of you all!"
61070-102 = "You always say that!"
61070-103 = "And you never actually do!"
61070-105 = "I remember the day Madame outlawed music..."
61070-106 = "But what I remember more is the way you would secretly play for us if she was gone."
61070-107 = "It never sounded clumsy or stilted to me..."
61070-108 = "I might not know anything about music, but I can't help but feel that you're really good at it, Subaru!"
61070-112 = "Flattery will get you nowhere, I hope you know!"
61070-113 = "..."
61070-114 = "A-Anyway..."
61070-115 = "I'll start now... Okay?"
61070-127 = "Wow..."
61070-128 = "I've really missed this."
61070-130 = "(The sound of her playing...)"
61070-131 = "(I feel like I'm being welcomed back with warm, inviting arms.)"
61070-148 = "We're really back."
61070-149 = "...Yeah. It'd seem so."
61070-150 = "*inhale*... *exhale*..."
61070-151 = "Misaki? Are you okay?"
61070-152 = "Fine. I'm fine."
61070-153 = "..."
61070-154 = "It's okay. I understand."
61070-156 = "...Yeah."
61070-157 = "U-U-Um... D-Do you really think it's okay for us to come back here?"
61070-158 = "I know we've already talked about it a lot..."
61070-159 = "But now that we're actually here... I feel kind of...twitchy? Unsettled?"
61070-160 = "[ns] \"You're right, Hiyori. That's a good way to describe it.\""
61070-161 = "I... I forgot that it's not your first time here either, Sensei..."
61070-162 = "To be honest, Hiyori is probably right."
61070-163 = "...It's unlikely we'll be welcomed back to Arius."
61070-165 = "We're nothing but traitors to the ones who stayed."
61070-166 = "Yes. That's likely the general sentiment towards us."
61070-167 = "..."
61070-168 = "Subaru took the helm after we left, right?"
61070-169 = "Yes..."
61070-171 = "We have actually sent a few envoys to Arius in an attempt to make contact with the remaining Arius students."
61070-172 = "How did they react?"
61070-173 = "...Let's just say the Remedial Knights found themselves carrying out their original duties of aid and treatment."
61070-174 = "The only intel we gathered is the name of the student leading them."
61070-175 = "Kakehashi Subaru."
61070-176 = "...!"
61070-178 = "[ns] \"What kind of person is Subaru?\""
61070-179 = "Hmm... Sao-Sao knows her best."
61070-180 = "..."
61070-181 = "I can't say I know everything about her, but..."
61070-182 = "At first glance, she seems approachable and charismatic. But, at the same time, it always felt like there was a gap you could never quite bridge with her."
61070-184 = "Ugh. I hate that. Just be consistent."
61070-188 = "That is a pretty accurate description of her, though."
61070-189 = "[ns] \"Hm. So it's not like she'd completely shut you out.\""
61070-190 = "That's a more positive way to say it, but..."
61070-191 = "Well, knowing you, you'll try talk to things out with her, regardless of what I say."
61070-192 = "Is everyone ready, then?"
61070-196 = "Arius Squad, move out."
61070-200 = "It's nice to hear you say that again."
61070-205 = "Sensei."
61070-206 = "Can I talk to you? This will probably be our last chance to talk."
61070-207 = "I don't understand...why you have so little regard for your own well-being. You throw yourself into danger without a second thought."
61070-208 = "S-Sorry. I-I'm not angry. I didn't mean it like that."
61070-212 = "..."
61070-213 = "I don't want to see you get hurt or suffer anymore."
61070-214 = "Mentally or physically."
61070-215 = "[s] \"Just your concern strengthens me, Saori!\""
61070-216 = "R-Really? Then I can keep you safe by worrying about you more?"
61070-217 = "...That was childish of me. I guess I want everything to work out conveniently, exactly the way I want."
61070-218 = "Hm? Where is this coming from?"
61070-219 = "..."
61070-220 = "Well, I don't know. I guess because we're here, at Arius."
61070-221 = "It stirs the memories inside me. It feels more visceral."
61070-222 = "..."
61070-223 = "S-Sensei?"
61070-224 = "..."
61070-225 = "Sensei, I've been wanting to apologize—"
61070-229 = "[ns] \"Oh, right! I almost forgot! The transfer students!\""
61070-230 = "H-Huh?"
61070-231 = "[s] \"They wanted me to tell you something. 'Thank you.'\""
61070-232 = "What...?"
61070-233 = "Why?"
61070-235 = "The only thing we did, as the Arius Squad... "
61070-236 = "Well, I guess they never would've been able to transfer if we hadn't."
61070-238 = "B-But...the stuff that we did..."
61070-239 = "I thought it was all...really bad...right?"
61070-240 = "Yes, it was. We never should have done it."
61070-241 = "Uwaaah! Waaah! I knew it!!"
61070-243 = "[ns3] \"Regardless, those transfer students...\"\n[ns4] \"...they really were grateful towards all of you.\"\n[ns5] \"That's the honest truth.\""
61070-247 = "..."
61070-248 = "What really is the \"truth,\" Sensei?"
61070-249 = "Or even \"history\"?"
61070-250 = "[s6] \"My answer is going to be old-fashioned.\"\n[s7] \"We study so we can discover and understand the 'truth,' right?\""
61070-253 = "Heh. I should have anticipated that response."
61070-254 = "You really are a teacher."
61070-255 = "Hm? And since you are a teacher, you get to ask one more thing?"
61070-256 = "[s] \"Are all of you keeping up with your studies?\""
61070-257 = "Aha. Of course we are, Sensei. I do enjoy studying quite a bit, as hard as that may be to believe."
61070-258 = "Heh. Eheehee... Me too! You work so hard to sneak us Blu-rays and notes all the time!"
61070-259 = "...Only when I have nothing better to do."
61070-260 = "I am as well. It's useful for my work to have a better understanding of how society works."
61070-261 = "...Which is exactly what you told us earlier. Atsuko was right. You ARE a teacher, Sensei."
61070-263 = "[ns8] \"My grand plan...\"\n[ns9] \"...is coming together!\""
61070-266 = "...Sensei, the more excited you are, the more anxious I get."
61070-267 = "U-Um! Everyone!"
61070-268 = "What's wrong, Hiyori?"
61070-269 = "Ah."
61070-270 = "L-Leader..."
61070-272 = "We're finally..."
61070-273 = "We're back home."
61070-275 = "*sniff* That was...so touching, Subaru."
61070-276 = "Encore! Encore!"
61070-277 = "Not today..."
61070-278 = "How come?! Please, please, please? It's okay if you're embarrassed!"
61070-279 = "No, it's just that..."
61070-280 = "I just don't know any other songs."
61070-281 = "Oh... That makes sense, though. We can hardly go to the store and buy more sheet music."
61070-282 = "Okay, fine—"
61070-287 = "S-Subaru! Subaru! R-Right now! Out there! It's...!"
61070-288 = "You're okay. Slow down. What happened?"
61070-289 = "W-Well!"
61070-290 = "The Squad and Schale's Sensei just entered Arius!"
61070-294 = "The Squad...?!"
61070-295 = "They've got some guts, showing their faces around here!"
61070-296 = "There's no place for them here anymore!"
61070-298 = "..."
61070-299 = "I won't let them in!"
61070-300 = "I agree! I'll never forgive them."
61070-301 = "We'll give them the same treatment we did those \"envoys\" from Trinity!"
61070-303 = "Hold on."
61070-304 = "Did you say Schale's Sensei is with them?"
61070-305 = "Y-Yes, that's right!"
61070-306 = "..."
61070-307 = "So they're using their brains this time..."
61070-308 = "Or maybe they were the ones recruited..."
61070-309 = "What do you mean?"
61070-310 = "Listen, everyone."
61070-311 = "If it were only the Squad, I wouldn't even spare this issue any time."
61070-312 = "But the problem is that adult. Schale's Sensei."
61070-313 = "Just their presence means we'll have to tread carefully."
61070-318 = "Why is that?"
61070-319 = "Are you serious? Think about what that adult's done here!"
61070-320 = "They're the one who made Madame disappear, remember?"
61070-321 = "Y-Yeah, but why... Oh!"
61070-322 = "Exactly."
61070-323 = "We have no idea what that adult might do, or what kind of powers they have."
61070-324 = "That's how adults are. We have no idea what they might do, to Arius, or to us."
61070-325 = "...You're right."
61070-326 = "They do the most unimaginable things like they're eating breakfast."
61070-328 = "Th-Then, what do we do, Subaru?"
61070-329 = "Don't panic. It's okay."
61070-330 = "..."
61070-331 = "We'll go out and greet them."
61070-332 = "Wh-What? Seriously?!"
61070-333 = "I can't guarantee this is the right path, or that it's the safest one."
61070-334 = "But I'd rather try than roll over for them. Wouldn't you?"
61070-335 = "For now..."
61070-336 = "Keep your safeties on. Do not disengage them. Yet."
61070-337 = "Understood, Subaru!"
61070-340 = "Next Episode;Arius Style"

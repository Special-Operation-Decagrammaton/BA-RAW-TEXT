[translation]
61070-1 = "第7話;口琴 "
61070-2 = "老師。 "
61070-3 = "所以老師的計畫是要讓奧利斯的孩子們……"
61070-4 = "拿到這份試卷並進行考試，對吧？ "
61070-10 = "[ns]「嗯。可以的話，最好能用『奧利斯綜合考試』這個名稱。」 "
61070-11 = "嗯，名稱是很重要的。 "
61070-12 = "渚同學也這麼說過。 "
61070-14 = "如果要我判斷「三一綜合考試」這個名稱能不能被順利接受……"
61070-15 = "我想恐怕很困難吧。#n而且該由誰來評分也是個問題。 "
61070-16 = "只有選擇題的話倒還好說，但這份考試之中也包含了問答題。"
61070-17 = "不過，要是「三一綜合考試」的增印題本，不慎在陰錯陽差之下……"
61070-18 = "以「奧利斯小隊」這樣特殊的人脈流入了「奧利斯分校」──#n這種事也不是不可能發生對吧？"
61070-19 = "當然，三一對此不會發表任何立場。 "
61070-20 = "那純粹只是場印刷或配送方面的事故吧？#n誰叫我們要為了節省學園的營運費用，讓貨品經過川西物流中心呢……"
61070-21 = "經營一所學園可真是困難重重啊。 "
61070-23 = "配送事故是嗎……#n看來我們這次的角色是快遞員兼保鑣啊。"
61070-24 = "……那報酬呢？ "
61070-25 = "[s]「別擔心，老師我不會虧待你們的！」 "
61070-26 = "…… "
61070-27 = "好吧，只要老師能負擔就好。 "
61070-28 = "[s]「因為我還有其他計畫！」 "
61070-29 = "什，什麼！？那那那，那到底是……！ "
61070-30 = "不用理他。反正八成又是一些不怎麼樣的東西。#n唉，看他那個表情就知道了。 "
61070-32 = "我倒是有點期待呢。#n可以期待一下吧，老師？ "
61070-34 = "不過即便如此，問題依舊存在。 "
61070-35 = "那就是在進行考試之前，必須先經過相應的學習。"
61070-36 = "奧利斯的學生們，是否真的有經歷過一般的學習……這是我感到擔憂的部分。"
61070-37 = "嗯……我想這個部分恐怕還是有困難吧。#n所以我本來……才會打算請老師進行遠端授課……"
61070-38 = "再次感謝您，老師。#n同時我也想向奧利斯小隊的各位致歉。 "
61070-42 = "當然從某個角度來看，這個請求確實有其不合理之處。 "
61070-43 = "三一對奧利斯分校的營運提出意見……"
61070-44 = "一個學園干涉另一個學園的方針，基本上是不應該發生的事。"
61070-45 = "另一個學園啊……"
61070-46 = "你們怎麼看？ "
61070-47 = "謝謝你，渚同學。 "
61070-51 = "現在我只能對這個判斷表示感謝了。 "
61070-52 = "因為實際上，三一甚至可以立刻主張奧利斯分校的所有權。 "
61070-53 = "畢竟當時……曾短暫以軍事力量佔領奧利斯分校的，確實是三一。 "
61070-55 = "那也僅止於「能夠主張」而已。#n並不代表百分之百會被接受。"
61070-56 = "因此我才更加需要老師……需要「夏萊」接受桐藤渚這名學生「個人」的「請求」。 "
61070-58 = "真受不了。有種在把最單純簡單的事情，用最複雜的方式繞一大圈來解決的感覺。 "
61070-59 = "這，這就是政治嗎……#n好可怕……真的好可怕…… "
61070-61 = "這也是世界的一面吧。學到了不少東西。 "
61070-62 = "即便撇開那些不談，我也不得不佩服桐藤渚的交涉手段。 "
61070-63 = "你什麼意思，隊長。#n現在是要替三一的茶會說話嗎？ "
61070-64 = "這，這……"
61070-66 = "可是美咲，無論對方是誰……#n只要有值得學習的地方，不就應該學起來嗎？"
61070-67 = "畢竟我們不了解的事情，還是太多太多了。 "
61070-68 = "嘖…… "
61070-70 = "啊，對了！吹口琴給我們聽吧，前輩！口琴！ "
61070-71 = "好主意！我最喜歡前輩的口琴演奏了！ "
61070-72 = "咦，咦！？那，那有點…… "
61070-73 = "咦～怎麼了？現在才害羞嗎？ "
61070-74 = "那個……就是…… "
61070-75 = "在這種廢墟裡面，假裝一個人沉浸在感傷中吹口琴…… "
61070-76 = "最近我突然有種…… "
61070-77 = "這好像有點過時了的感覺…… "
61070-78 = "哇！前輩害羞了！ "
61070-79 = "這還真難得……今天運氣真好！ "
61070-80 = "那個，我也……#n難得回來一趟，所以想聽聽前輩的演奏……可以嗎？"
61070-81 = "唔……！這種請求方式有點犯規吧……！？"
61070-83 = "不行嗎……？ "
61070-84 = "剛才真的超犯規的！ "
61070-85 = "倒也……不是不行啦……"
61070-86 = "哇啊！！！ "
61070-91 = "大家……在這種時候還真壞心啊…… "
61070-92 = "真，真拿你們沒辦法……那麼…… "
61070-101 = "如果吹不好或失誤了，可別笑得太大聲哦……？ "
61070-102 = "唉唷，前輩你又來了！ "
61070-103 = "就是說啊，前輩明明從來沒有失誤過！ "
61070-105 = "以前因為夫人禁止的關係，我們很少有機會演奏或聽音樂…… "
61070-106 = "不過只要夫人不在，前輩還是會偷偷演奏給我們聽吧？ "
61070-107 = "我從來沒有覺得那很奇怪或笨拙。 "
61070-108 = "雖然我也不是很懂……但說不定前輩真的很有天分哦？ "
61070-112 = "把我捧得那麼高也不會有好處啦！ "
61070-113 = "……"
61070-114 = "那，那麼……"
61070-115 = "要開始囉……？"
61070-127 = "哇啊啊……"
61070-128 = "就是這個，就是這個……"
61070-130 = "（……究竟是為什麼呢） "
61070-131 = "（好像湧上了一股終於回來了的感覺……）"
61070-148 = "結果還是來了啊…… "
61070-149 = "……是啊。 "
61070-150 = "嘶……呼…… "
61070-151 = "怎麼了，美咲？ "
61070-152 = "沒什麼。我只是……"
61070-153 = "…… "
61070-154 = "嗯。我懂。 "
61070-156 = "……嗯。 "
61070-157 = "我，我我我我，我們回到奧利斯……真的沒問題嗎……？ "
61070-158 = "雖，雖然之前也聊過類似的話題……"
61070-159 = "但真的回到這裡之後，果然還是有種……難以解釋的複雜心情…… "
61070-160 = "[ns]「是啊。我也有類似的感覺。」 "
61070-161 = "啊……說的也是……老師也不是第一次來這裡吧…… "
61070-162 = "不過我也能理解日和的意思。#n我們回到奧利斯…… "
61070-163 = "……果然不會是件好事吧。 "
61070-165 = "沒錯。在那些留下來的人眼裡，我們幾乎就跟叛徒沒兩樣。 "
61070-166 = "嗯，我想應該不會有錯。 "
61070-167 = "……搞不好會有很盛大的歡迎儀式呢。 "
61070-168 = "聽說現在統領大家的人……是昴對吧？ "
61070-169 = "嗯…… "
61070-171 = "其實，我們先前曾數次祕密派遣使者，嘗試與留在奧利斯分校的人談談。 "
61070-172 = "結果呢？ "
61070-173 = "……我只能說，救護騎士團不得不專注於救援和治療本職的情況不在少數。"
61070-174 = "唯一打聽到的，就只有統領那群人的學生的名字…… "
61070-175 = "名叫「梯昴」而已。 "
61070-176 = "……！ "
61070-178 = "[ns]「昴是個怎樣的孩子？」 "
61070-179 = "唔嗯……這個問題，應該是沙醬最清楚吧？ "
61070-180 = "…… "
61070-181 = "雖然很難用一句話來評價一個人，但在我的記憶之中……"
61070-182 = "他是個看似能夠溝通，卻又總讓人覺得哪裡不順利的類型。 "
61070-184 = "什麼意思……能不能選一邊啊。 "
61070-188 = "雖然仔細想想，好像也不能說你講的有錯。 "
61070-189 = "[ns]「這樣啊……所以至少不是一開始就完全拒絕溝通的類型吧？」 "
61070-190 = "可以這麼說。只是…… "
61070-191 = "不。如果是老師的話，無論對方是誰都會先嘗試溝通吧。 "
61070-192 = "那麼，我們進去吧。 "
61070-196 = "奧利斯小隊，任務開始。 "
61070-200 = "嗯。這種感覺真懷念呢。 "
61070-205 = "那個，老師。 "
61070-206 = "這或許是最後能閒聊的機會，所以我想問你……"
61070-207 = "你為什麼……總是像這樣不顧自己的身體……去做吃虧的事呢？"
61070-208 = "啊，我，我不是要責怪你的意思。只是……"
61070-212 = "…… "
61070-213 = "我不想再看見老師受傷或痛苦了。"
61070-214 = "無論在精神還是身體方面都一樣。"
61070-215 = "[s]「因為沙織在擔心我，突然感覺都痊癒了！」 "
61070-216 = "是，是嗎？#n所以我如果一直擔心老師的話，老師的恢復速度就會變快……！？"
61070-217 = "不，不可能吧。#n我真丟臉，居然想用這麼簡單的方式看待一切。"
61070-218 = "嗯？問我為什麼突然問剛才那個問題？ "
61070-219 = "…… "
61070-220 = "來到這裡之後…… "
61070-221 = "讓我回想起了……許多過去的事。 "
61070-222 = "…… "
61070-223 = "老師？ "
61070-224 = "…… "
61070-225 = "我果然還是必須向老師好好道歉──"
61070-229 = "[ns]「對了！關於轉入三一的那些孩子！」"
61070-230 = "呃，嗯？ "
61070-231 = "[s]「其實那些孩子心裡很感謝你們。」 "
61070-232 = "什麼……？ "
61070-233 = "為什麼？"
61070-235 = "這樣啊。假如只從結果來看的話，是因為小隊執行了那場作戰……"
61070-236 = "那些孩子才終於能在奧利斯之外的環境度過校園生活……是這個意思嗎…… "
61070-238 = "可可可，可是……雖然是我們自己做的…… "
61070-239 = "但那明明是非常糟糕的事情，不是嗎……？"
61070-240 = "沒錯，那是一起恐怖行動。是不應該發生的事。 "
61070-241 = "嗚哇啊啊～！果然是這樣～！！！ "
61070-243 = "[ns3]「不過那些轉學的孩子們……」  \n[ns4]「請我轉達感謝這件事……」  \n[ns5]「也是確實發生過的事實哦。」"
61070-247 = "…… "
61070-248 = "老師，什麼才是事實？ "
61070-249 = "還有……歷史又是什麼呢？ "
61070-250 = "[s6]「這裡我只能給出老掉牙的答案了。」  \n[s7]「就是為了知道這些，我們才需要學習不是嗎？」 "
61070-253 = "呵呵，被你得分了呢。 "
61070-254 = "嗯，這次的回答很有教育者的風範哦。 "
61070-255 = "咦？既然都被說像教育者了，還想再問一個問題？ "
61070-256 = "[s]「你們大家～平常都有認真學習嗎～」 "
61070-257 = "啊哈，原來是這個啊。#n不用擔心，老師。我還挺喜歡學習的哦。 "
61070-258 = "嘿，嘿嘿……因為老師平常也會偷偷寄教育BD和資料過來…… "
61070-259 = "……反正聽一下也沒什麼損失，所以我有空的時候就會學習。"
61070-260 = "嗯，我也是。了解世界的構成總是有幫助的。 "
61070-261 = "……仔細想想這也是老師說過的話呢。#n老師果然是老師啊…… "
61070-263 = "[ns8]「很好很好……這樣我那遠大的計畫……！」  \n[ns9]「就離成功更進一步了……！」 "
61070-266 = "每次老師展現這種態度，就是我最不安的時候…… "
61070-267 = "請，請等一下！ "
61070-268 = "怎麼了，日和？ "
61070-269 = "……啊啊，原來如此啊。"
61070-270 = "是的，隊長……"
61070-272 = "我們總算…… "
61070-273 = "回來了呢…… "
61070-275 = "哇……真是太棒了，前輩。 "
61070-276 = "沒有安可嗎？安可安可？ "
61070-277 = "還請容我拒絕……"
61070-278 = "咦咦～為什麼～#n就算前輩害羞，我們也不介意啊～"
61070-279 = "不，不是那個原因……"
61070-280 = "其實，我已經沒有其他能演奏的曲子了……"
61070-281 = "啊，這樣啊……畢竟樂譜實在很難弄到…… "
61070-282 = "那就沒辦法了…… "
61070-287 = "前，前輩！現在，現在……！ "
61070-288 = "你先冷靜。看來……是發生了急事？#n慢慢告訴我吧。 "
61070-289 = "是，是！ "
61070-290 = "就在剛才，小隊和夏萊的老師一起進入了奧利斯！"
61070-294 = "小隊……！？"
61070-295 = "那群傢伙，竟然還敢厚著臉皮……！ "
61070-296 = "我可還沒對小隊…… "
61070-298 = "……"
61070-299 = "我無法接受。 "
61070-300 = "就是說啊，我也無法接受。 "
61070-301 = "就像之前那些被我們趕走好幾次的三一使者一樣……！ "
61070-303 = "先等一下。"
61070-304 = "你剛才說夏萊的老師也一起來了？"
61070-305 = "是，是的！ "
61070-306 = "…… "
61070-307 = "小隊動了腦筋啊。 "
61070-308 = "不，從情況來看也可能是被拉攏了…… "
61070-309 = "為什麼這麼說呢，前輩？"
61070-310 = "大家。 "
61070-311 = "某種意義上來說，如果只有小隊倒還不算什麼大問題。 "
61070-312 = "真正的問題在於那個被稱為「夏萊的老師」的大人。"
61070-313 = "既然那個大人出現在奧利斯，我們就不能再用以前的方式應對了。"
61070-318 = "為什麼呢，前輩？ "
61070-319 = "還問為什麼……你自己想想看。#n之前因為那個大人的關係，結果……"
61070-320 = "夫人他不是消失了嗎……？ "
61070-321 = "這倒是沒……啊！ "
61070-322 = "沒錯。 "
61070-323 = "沒有人知道那個大人會做什麼……以及究竟擁有什麼力量。"
61070-324 = "會帶來什麼樣的結果……更是無法預測。#n所謂的大人……通常就是這樣的吧？ "
61070-325 = "……這倒是沒錯。"
61070-326 = "他們總是能若無其事地做出我們想都沒想過的事。 "
61070-328 = "那，那現在該怎麼辦才好，前輩？"
61070-329 = "總之大家先冷靜下來。然後……"
61070-330 = "…… "
61070-331 = "一起去迎接他們吧。 "
61070-332 = "迎，迎接！？#n這樣沒問題嗎……？"
61070-333 = "老實說，究竟有沒有問題……我現在也無法判斷。"
61070-334 = "但……總得試試看不是嗎？ "
61070-335 = "不過……還是該這麼做吧。 "
61070-336 = "請大家都先不要解除槍械的保險。"
61070-337 = "明白了，前輩！ "
61070-340 = "下一話;奧利斯式"

61070-306 = "......"
61070-307 = "คิดมาอย่างดีเลยสินะ สควอด"
61070-308 = "ไม่สิ สควอดอาจเป็นฝ่ายถูกดึงให้มาร่วมด้วยก็ได้..."
61070-309 = "เป็นอะไรไปคะ รุ่นพี่?"
61070-310 = "ทุกคนคะ"
61070-311 = "ในทางหนึ่งแล้ว ถ้ามากันแต่พวกสควอด ก็อาจไม่ใช่ปัญหาใหญ่ค่ะ"
61070-312 = "ปัญหาก็คือผู้ใหญ่ที่เป็นคุณครูของชาเล่ต์ต่างหาก"
61070-313 = "ถ้าผู้ใหญ่คนนั้นมาปรากฏตัวที่อาเรียส พวกเราก็ไม่ควรตอบโต้ด้วยวิธีเดิมที่เคยทำมาค่ะ"
61070-318 = "ทำไมเหรอคะ รุ่นพี่?"
61070-319 = "ถามมาได้ เธอก็ลองคิดดูสิ ผู้ใหญ่คนนั้นทำให้..."
61070-320 = "มาดาม... หายตัวไปไม่ใช่หรือไง...?"
61070-321 = "มันก็จริงอยู่หรอกนะ... อ้อ!"
61070-322 = "ใช่"
61070-323 = "เราไม่รู้ว่าผู้ใหญ่คนนั้นจะทำอะไร แล้วก็ไม่รู้ด้วยว่ามีพลังแบบไหนอยู่"
61070-324 = "เราไม่รู้เลยว่า... ผู้ใหญ่จะนำผลลัพธ์อะไรมา ปกติแล้วผู้ใหญ่ก็... เป็นแบบนั้นไม่ใช่เหรอ?"
61070-325 = "ก็จริงอย่างที่ว่านะ..."
61070-326 = "ผู้ใหญ่ชอบทำในสิ่งที่เราจินตนาการไม่ถึงอย่างไม่ยินดียินร้ายตลอดเลย"
61070-328 = "ถะ... ถ้างั้นจากนี้พวกเราจะทำยังไงกันดีล่ะคะ รุ่นพี่?"
61070-329 = "ต้องสุขุมเข้าไว้ก่อน แล้วก็..."
61070-330 = "......"

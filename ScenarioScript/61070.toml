61070-230 = "หะ... หืม?"
61070-231 = "[s] \"เด็กพวกนั้นรู้สึกขอบคุณสควอดทุกคนอยู่นะ\""
61070-232 = "ว่าไงนะ...?"
61070-233 = "ทำไมเหรอ?"
61070-235 = "งั้นสินะ ถ้าดูแค่ผลลัพธ์ละก็... นั่นคงเป็นเพราะปฏิบัติการที่ทำโดยสควอด "
61070-236 = "ทำให้เด็กๆ พวกนั้นได้ใช้ชีวิตนักเรียนในสภาพแวดล้อมที่ต่างกับอาเรียสได้... หรือเปล่านะ..."
61070-238 = "ระ... ระ... ระ... เรื่องนั้น... เป็นผลลัพธ์ดีๆ ที่เกิดจากฝีมือของเราก็จริง แต่ว่า..."
61070-239 = "มันเป็นเรื่องที่เลวร้ายมากไม่ใช่เหรอคะ...?"
61070-240 = "อื้อ เป็นการก่อการร้าย และเป็นสิ่งที่ไม่ควรเกิดขึ้นเลย"
61070-241 = "แงงงง~! เป็นอย่างนี้จริงด้วยสินะคะ~!!!"
61070-243 = "[ns3] \"แต่เด็กๆ ที่ย้ายมาก็รู้สึกขอบคุณจริงๆ นะ\"\n[ns4] \"แต่เด็กๆ จากอาเรียสก็รู้สึกขอบคุณจริงๆ นะ\"\n[ns5] \"แต่ทุกคนก็รู้สึกขอบคุณจริงๆ นะ\""
61070-247 = "......"
61070-248 = "นี่ คุณครู ความจริงคืออะไรเหรอ?"
61070-249 = "แล้วก็... ประวัติศาสตร์ด้วย?"
61070-250 = "[s6] \"คงต้องตอบเชยๆ ว่าเป็นสิ่งที่เราต้องเรียนรู้น่ะ\"\n[s7] \"เป็นสิ่งที่ถ้าอยากรู้ ก็ต้องศึกษาให้รู้ยังไงล่ะ"
61070-253 = "ฮุฮุ เป็นคำคมเลยนะ"
61070-254 = "อื้อ สมกับที่เป็นคุณครูเลย"
61070-255 = "หืม? พอได้ยินคำว่าสมกับที่เป็นครู ก็เลยอยากถามอะไรบางอย่างงั้นเหรอ?"
61070-256 = "[s] \"ปกติพวกเราทุกคน~ ขยันเรียนกันหรือเปล่า~\""
61070-257 = "อ้อ กังวลเรื่องนั้นสินะ ไม่ต้องห่วงหรอกคุณครู ฉันชอบเรียนหนังสืออยู่นะ"
61070-258 = "แหะ... แหะๆ... ปกติคุณครูก็ชอบแอบส่ง BD กับสื่อการเรียนการสอนมาให้พวกฉันด้วย..."
61070-259 = "ของพวกนั้นจะเรียนรู้ไว้ก็ไม่มีอะไรเสียหาย พอมีเวลาฉันก็เปิดฟังอยู่หรอก..."
61070-260 = "อืม ฉันก็ด้วย การได้รู้ความเป็นไปของโลกในปัจจุบันก็เป็นประโยชน์กับตัวเรานี่นา"
61070-261 = "พอมาคิดดู ครูก็พูดเอาไว้อย่างนี้นี่เนอะ... สมแล้วจริงๆ ที่เป็นครู..."
61070-263 = "[ns8] \"ดีละ... งั้นแผนการอันยิ่งใหญ่ของครูก็ใกล้ถึงความจริงแล้ว...!\"\n[ns9] \"ดีละ... งั้นแผนการอันยิ่งใหญ่ของครูก็ใกล้สมบูรณ์แบบแล้ว...!\""
61070-266 = "พอเห็นคุณครูทำท่าทีแบบนั้น ฉันละอดกังวลไม่ได้ทุกทีเลย..."
61070-267 = "ดะ... เดี๋ยวนะคะ!"
61070-268 = "ทำไมเหรอ ฮิโยริ?"
61070-269 = "อ้อ... อย่างนี้เองสินะ"
61070-270 = "ค่ะ ใช่แล้วค่ะ หัวหน้า..."
61070-272 = "ในที่สุด..."
61070-273 = "ก็ได้กลับมาแล้วนะคะ..."
61070-275 = "ฮืม... เพราะจังเลยค่ะ รุ่นพี่"
61070-276 = "ขออีกรอบได้มั้ยคะ?"
61070-277 = "ฉันขอปฏิเสธค่ะ..."
61070-278 = "ไม่เอาน่า ทำไมล่ะคะ~ ถึงรุ่นพี่จะเขิน แต่เพลงจากรุ่นพี่ก็ยอดเยี่ยมเลยนะ~"
61070-279 = "ไม่หรอกค่ะ คือว่า..."
61070-280 = "ที่จริงฉันไม่มีเพลงอื่นให้เล่นแล้วค่ะ..."
61070-281 = "อ่า งั้นสินะ... โน้ตเพลงก็คงหาไม่ได้ง่ายๆ ด้วย"
61070-282 = "ถ้างั้นก็ช่วยไม่ได้นะ..."
61070-287 = "ระ... รุ่นพี่! ตอนนี้ค่ะ ตอนนี้...!"
61070-288 = "ใจเย็นๆ ก่อนค่ะ... มีเรื่องด่วนอะไรมาสินะคะ? หายใจหายคอก่อนแล้วค่อยพูดเถอะค่ะ"
61070-289 = "ค่ะ ค่ะ!"
61070-290 = "สควอดกับครูจากชาเล่ต์มาที่อาเรียสค่ะ เพิ่งมาถึงเลยด้วย!"

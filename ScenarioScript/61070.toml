61070-13 = "3;나기사 스탠딩;01\n#3;a"
61070-14 = "3;나기사 스탠딩;02;<트리니티 종합고사>라는 네이밍이 순순히 받아들여질 수 있는지를 생각하면……. \n#3;em;[...]"
61070-15 = "3;나기사 스탠딩;17;아무래도 무리겠지요. 거기에 채점의 주체 역시, 정하기 힘든 일입니다."
61070-16 = "3;나기사 스탠딩;02;객관식은 간단합니다만, 주관식 문제도 출제되고 있으니까요."
61070-17 = "3;나기사 스탠딩;01;하지만 어쩌다 보니, 우연히…… <트리니티 종합고사>의 문제집 추가 인쇄본이."
61070-18 = "3;나기사 스탠딩;01;'아리우스 스쿼드'라는 특이한 인편으로, '아리우스 분교'에 흘러 들어갈 수도 있지 않을까요?"
61070-19 = "3;나기사 스탠딩;03;물론 그 건에 대해서, 트리니티는 아무런 입장도 내놓지 않을 것입니다.\n#3;greeting"
61070-20 = "3;나기사 스탠딩;02;일종의 인쇄 사고 및 배송사고 같은 것이 아닐까요? 학원 운영비를 조금이라도 아끼기 위해, 카와니시 집하장을 거치게 했더니 말이죠."
61070-21 = "3;나기사 스탠딩;03;정말, 학원 운영이란 어려운 일이네요.\n#3;em;[음표]"
61070-22 = "#all;hide"
61070-23 = "3;사오리;S2_18;배송사고라……. 이번은 배달부 겸 보디가드 역할인 건가.\n#3;em;[...]\n#3;a"
61070-24 = "3;미사키;02;……보수는?\n#3;em;[?]"
61070-25 = "[s] \"걱정하지 마. 섭섭하지 않게 챙겨 줄게.\""

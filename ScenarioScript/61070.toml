[translation]
61070-1 = "ตอนที่ 7;ฮาร์โมนิกา"
61070-2 = "นี่ คุณครู"
61070-3 = "สรุปว่าแผนการของคุณครูคือ..."
61070-4 = "ไปแจกข้อสอบให้เด็กๆ อาเรียส แล้วก็ให้ทุกคนทำข้อสอบใช่มั้ย?"
61070-10 = "[ns] \"อื้อ ถ้าเป็นไปได้ก็จะใช้ชื่อ <การสอบบูรณาของการอาเรียส> ด้วย\""
61070-11 = "นั่นสินะ ชื่อก็เป็นสิ่งสำคัญ"
61070-12 = "คุณนางิสะเองก็คงพูดไว้แบบนั้นด้วย"
61070-14 = "ฉันมาลองคิดดูค่ะว่าถ้าใช้ชื่อ <การสอบบูรณาการของทรีนิตี้> แล้วนักเรียนอาเรียสจะยอมรับกันง่ายๆ หรือเปล่า... "
61070-15 = "แล้วก็ได้คำตอบว่าไม่น่าจะง่ายเลยค่ะ นอกจากนั้นการกำหนดเกณฑ์ให้คะแนนก็เป็นเรื่องยากด้วยค่ะ"
61070-16 = "ถึงจะมีคำถามปรนัยง่ายๆ แต่ก็ยังมีคำถามเชิงอัตนัยด้วยนี่คะ"
61070-17 = "แต่ก็อาจจะเป็นไปได้นะคะ... ที่ข้อสอบของ <การสอบบูรณาการของทรีนิตี้> ฉบับพิมพ์เพิ่มเติม"
61070-18 = "จะถูกส่งไปยัง 'โรงเรียนสาขาอาเรียส' ด้วยบริการรับฝากพิเศษของ 'สควอดของอาเรียส' โดยบังเอิญ?"
61070-19 = "แน่นอนว่าทางทรีนิตี้จะไม่แสดงความคิดเห็นใดๆ ต่อเรื่องนั้นค่ะ"
61070-20 = "มันอาจจะเป็นความผิดพลาดในการพิมพ์หรือการขนส่งก็ได้นี่คะ เราพยายามจะประหยัดค่าใช้จ่ายใน#nการบริหารงานของโรงเรียน ก็เลยกำหนดให้ใช้จุดกระจายสินค้าคาวานิชิเป็นจุดผ่านน่ะค่ะ"
61070-21 = "การบริหารโรงเรียนเป็นงานที่ยากจริงๆ เลยนะคะ"
61070-23 = "การขนส่งผิดพลาดงั้นเหรอ... งั้นงานนี้ก็ต้องควบตำแหน่งพนักงานส่งของและบอดี้การ์ดเลยน่ะสิ"
61070-24 = "แล้วค่าจ้างล่ะ...?"
61070-25 = "[s] \"ไม่ต้องห่วงนะ ครูจะจ่ายให้คุ้มค่าเหนื่อยเลย\""
61070-26 = "......"
61070-27 = "อื้อ ถ้าคุณครูจะเป็นคนจ่ายละก็นะ"
61070-28 = "[s] \"เพราะครูมีแผนลับอื่นในใจด้วยน่ะสิ!\""
61070-29 = "คะ... คะ?! ผะผะผะผะ... แผนลับอะไร...!"
61070-30 = "อย่าไปสนใจเลย คงเป็นอะไรที่เลอะเทอะเหมือนเดิมนั่นละ เฮ้อ ดูทำหน้าเข้าสิ"
61070-32 = "แต่ฉันอยากรู้นะ ฉันตั้งตารอได้ใช่มั้ย คุณครู?"
61070-34 = "ที่จริงแล้วถึงจะทำแบบนั้น แต่ก็ยังมีปัญหาอยู่ค่ะ"
61070-35 = "ถ้าจะสอบอะไร ก็ต้องมีความรู้เกี่ยวกับเรื่องนั้นก่อน..."
61070-36 = "แต่สิ่งที่ฉันกังวลก็คือ โดยพื้นฐานแล้วนักเรียนอาเรียสได้เรียนหนังสือกันหรือเปล่า"
61070-37 = "ใช่ค่ะ น่าจะเป็นเรื่องยากเลยนะคะ ฉันก็เลย... ตั้งใจว่าจะขอให้คุณครูแค่ช่วยสอนพิเศษแบบทางไกลให้"
61070-38 = "ยังไงก็ขอขอบคุณอีกครั้งนะคะคุณครู แล้วก็ขอโทษด้วยค่ะ สควอดของอาเรียสทุกคน"
61070-42 = "ในบางมุมแล้ว คำขอนี้อาจไม่ควรเกิดขึ้นตั้งแต่แรกด้วยค่ะ"
61070-43 = "การที่ทรีนิตี้ให้ความคิดเห็นเกี่ยวกับการบริหารงานของโรงเรียนสาขาอาเรียส..."
61070-44 = "พูดอีกอย่างก็คือ การที่โรงเรียนหนึ่งเข้าไปแทรกแซงนโยบายการบริหารของโรงเรียนอื่นเป็นสิ่งที่#nไม่ควรเกิดขึ้นค่ะ"
61070-45 = "โรงเรียนอื่น... งั้นสินะ"
61070-46 = "คิดว่ายังไงเหรอคะ?"
61070-47 = "ขอบคุณนะ คุณนางิสะ"
61070-51 = "ตอนนี้ฉันคงได้แต่กล่าวคำขอบคุณสำหรับการตัดสินใจทำแบบนั้นน่ะ"
61070-52 = "ทรีนิตี้สามารถอ้างสิทธิการครอบครองโรงเรียนสาขาอาเรียสได้เลยด้วยซ้ำ"
61070-53 = "เพราะไม่ว่าจะยังไง ตอนนั้นฝ่ายที่ยึดครองโรงเรียนสาขาอาเรียสด้วยกำลังทหาร ก็คือทรีนิตี้อย่างชัดเจน ต่อให้เป็นแค่ช่วงสั้นๆ ก็เถอะ"
61070-55 = "ก็คงได้แค่อ้างดูละค่ะ เพราะการอ้างคงไม่ถูกยอมรับ 100% เสมอไปนี่คะ"
61070-56 = "นั่นเป็นเหตุผลว่าทำไมฉันในฐานะนักเรียนที่ชื่อว่าคิริฟุจิ นางิสะ ถึงทำได้แค่ 'ขอร้อง' กับคุณครู... ไม่สิ ขอร้องกับ 'ชาเล่ต์' เป็น 'การส่วนตัว' ยังไงล่ะคะ"
61070-58 = "จริงๆ เลยเชียว นี่เป็นงานง่ายดายแท้ๆ แต่รู้สึกเหมือนพยายามจะแก้ไขปัญหาด้วยวิธีที่ยาก และซับซ้อนเลยละ"
61070-59 = "กะ... การเมืองเป็นเรื่องแบบนี้เองเหรอคะ... น่ากลัวจังเลยค่ะ... น่ากลัวจริงๆ เลย..."
61070-61 = "นั่นก็คงเป็นอีกด้านหนึ่งของโลกสินะ ได้เรียนรู้อะไรเยอะเลย"
61070-62 = "ถ้ามองข้ามเรื่องนั้นไป วิธีการจัดการเรื่องต่างๆ ของคิริฟุจิ นางิสะก็น่าชื่นชมนะ"
61070-63 = "อะไรกัน หัวหน้า จะอยู่ข้างสภาน้ำชาของทรีนิตี้ขึ้นมางั้นเหรอ?"
61070-64 = "คะ... คือว่า..."
61070-66 = "มิซากิ ถ้ามีสิ่งไหนให้เรียนรู้ เราก็ควรเรียนรู้ไม่ใช่เหรอ? ไม่ว่าจะเป็นการเรียนรู้จากใครก็ตาม"
61070-67 = "ก็พวกเรายังมีเรื่องที่ไม่รู้อีกเยอะเลยนี่"
61070-68 = "ชิ..."
61070-70 = "อ๊ะ จริงด้วย! ฮาร์โมนิกา! เป่าฮาร์โมนิกาให้ฟังหน่อยสิคะ รุ่นพี่!"
61070-71 = "ใช่ค่ะ! ฉันชอบเพลงจากฮาร์โมนิกาของรุ่นพี่ค่ะ!"
61070-72 = "คะ... คะ?! ระ... เรื่องนั้น..."
61070-73 = "ทำไมล่ะคะ ไม่เอาน่า จู่ๆ ก็เขินขึ้นมาเหรอคะ?"
61070-74 = "เอ่อ... พอดีว่า... คือว่า..."
61070-75 = "หมู่นี้ฉันคิดเรื่องนี้บ่อยๆ น่ะค่ะ..."
61070-76 = "การอินกับห้วงอารมณ์แล้วเป่าฮาร์โมนิกาคนเดียวในอาคารที่เป็นซากปรักหักพังแบบนี้..."
61070-77 = "มันออกจะเป็นการวางท่าและเชยไปหน่อย..."
61070-78 = "ว้าว! รุ่นพี่เขินจริงด้วย!"
61070-79 = "เป็นบุญตาจริงๆ... วันนี้โชคดีจังเลย!"
61070-80 = "ฉันด้วยค่ะ ฉันก็... ไม่ได้ฟังมานานแล้ว ขอฟังฮาร์โมนิกาจากรุ่นพี่ไม่ได้เหรอคะ...?"
61070-81 = "อึก...! จะขอกันแบบนี้เลยเหรอคะ...?!"
61070-83 = "ไม่ได้... เหรอคะ...?"
61070-84 = "ไม่ต้องส่งสายตาเว้าวอนเลยค่ะ!"
61070-85 = "ใช่ว่าจะไม่ได้หรอกค่ะ..."
61070-86 = "เย้!!!"
61070-91 = "ทุกคน... เวลาแบบนี้ละดื้อกันจังเลยนะคะ..."
61070-92 = "งะ... งั้นก็ช่วยไม่ได้ค่ะ... ถ้างั้นก็..."
61070-101 = "ถ้าเป่าเพี้ยนหรือไม่เพราะขึ้นมา ก็อย่าหัวเราะกันนะคะ...?"
61070-102 = "ไม่เอาน่า พูดแบบนี้อีกแล้ว รุ่นพี่!"
61070-103 = "ใช่ค่ะ รุ่นพี่ไม่เคยเป่าไม่เพราะเลยสักครั้งนี่คะ!"
61070-105 = "แต่ก่อนที่มาดามสั่งห้าม เราแทบจะเล่นดนตรีหรือหาดนตรีฟังไม่ได้เลย..."
61070-106 = "แต่ตอนที่มาดามไม่อยู่ รุ่นพี่ก็แอบเล่นดนตรีให้พวกฉันฟังอยู่นี่คะ?"
61070-107 = "ไม่เคยมีสักครั้งเลยค่ะที่ฉันคิดว่าบทเพลงจากรุ่นพี่แปลกหรือเชย"
61070-108 = "ถึงฉันจะไม่รู้อะไรมาก แต่รุ่นพี่น่าจะเป็นคนมีพรสวรรค์เลยนะคะ?"
61070-112 = "ถึงจะชมกันขนาดนั้น ฉันก็ไม่เหลิงหรอกนะคะ!"
61070-113 = "......"
61070-114 = "จะ... จะยังไงก็เถอะ..."
61070-115 = "งั้นฉันจะ... เริ่มเลยนะคะ...?"
61070-127 = "ว้าววว..."
61070-128 = "แบบนี้ละ เพลงที่คิดถึง..."
61070-130 = "(รู้สึกเหมือน...)"
61070-131 = "(ได้กลับมาถึงที่นี่แล้วจริงๆ ด้วยนะ...)"
61070-148 = "ในที่สุด... ก็มาถึงจนได้นะ..."
61070-149 = "ใช่... นั่นสินะ"
61070-150 = "ฮึบ... ฮู่ว..."
61070-151 = "เป็นอะไรเหรอ มิซากิ?"
61070-152 = "เปล่าหรอก... ก็แค่"
61070-153 = "......"
61070-154 = "อื้อ ฉันเข้าใจ"
61070-156 = "อื้อ..."
61070-157 = "พะ... พะพะพะพะ... พวกเราจะกลับเข้าไปในอาเรียส... ได้จริงๆ... เหรอคะ...?"
61070-158 = "ถะ... ถึงฉันจะเคยพูดเรื่องคล้ายๆ แบบนี้มาแล้ว"
61070-159 = "แต่พอกลับมาที่นี่ มันก็รู้สึกกระสับกระส่ายยังไงบอกไม่ถูก..."
61070-160 = "[ns] \"นั่นสินะ ครูก็รู้สึกแบบนั้นเหมือนกัน\""
61070-161 = "อ่า... นั่นสินะคะ... คุณครูก็ไม่ได้มาที่นี่เป็นครั้งแรกเหมือนกันนี่นา..."
61070-162 = "แต่ฉันก็เห็นด้วยกับที่ฮิโยริพูดนะ พวกเราคงกลับเข้าไปในอาเรียส..."
61070-163 = "ไม่ได้ง่ายๆ หรอก..."
61070-165 = "ใช่แล้วละ สำหรับพวกเด็กที่เหลืออยู่ที่นั่น พวกเราก็ไม่ต่างจากคนทรยศ"
61070-166 = "อื้อ ต้องเป็นอย่างนั้นแน่นอน"
61070-167 = "พิธีต้อนรับ... คงจะยิ่งใหญ่อลังการเลยละ"
61070-168 = "เห็นว่าคนที่เป็นผู้นำพวกเด็กที่ยังเหลืออยู่ตอนนี้... คือสุบารุใช่มั้ย?"
61070-169 = "อื้อ..."
61070-171 = "ที่จริงก่อนหน้านี้ฉันก็เคยส่งผู้แทนลับๆ ไปหลายครั้ง... เพื่อพยายามเจรจากับคนที่ยังเหลืออยู่ใน#nโรงเรียนสาขาอาเรียสค่ะ"
61070-172 = "แล้วได้ผลยังไงล่ะ?"
61070-173 = "ชมรมอัศวินบรรเทาทุกข์... บอกว่าเกิดเคสที่ต้องอุทิศตัวให้กับการบรรเทาทุกข์และการรักษาอยู่บ่อย#nครั้งเลยค่ะ"
61070-174 = "สิ่งเดียวที่ฉันพอนึกออกก็คือ ชื่อของนักเรียนที่ดูแลและเป็นผู้นำของคนที่ยังเหลือที่นั่น..."
61070-175 = "น่าจะชื่อว่าคาเกฮาชิ สุบารุ นะคะ"
61070-176 = "...!"
61070-178 = "[ns] \"สุบารุเป็นเด็กแบบไหนเหรอ?\""
61070-179 = "อืม... ฉันว่าซัตจังน่าจะรู้จักดีกว่าใครเลยนะ?"
61070-180 = "......"
61070-181 = "การวิจารณ์คนคนหนึ่งด้วยคำพูดแค่คำเดียวมันไม่ใช่เรื่องง่ายเลยนะ แต่เท่าที่ฉันจำได้..."
61070-182 = "เดิมทีเราเหมือนจะสื่อสารกันได้ แต่ก็มีบางอย่างที่เข้ากันไม่ได้ด้วย"
61070-184 = "อะไรกัน... เลือกมาสักทางสิ"
61070-188 = "แต่พอมาคิดดู ที่พูดมาก็ใช่ว่าจะผิดทั้งหมดหรอกนะ"
61070-189 = "[ns] \"อืม... แปลว่าไม่ใช่คนที่พูดคุยด้วยไม่ได้ตั้งแต่แรกใช่มั้ย?\""
61070-190 = "จะมองอย่างนั้นก็ได้ แต่ว่า..."
61070-191 = "ไม่สิ ถ้าเป็นครูละก็ ไม่ว่าอีกฝ่ายจะเป็นนักเรียนแบบไหน ก็คงเริ่มจากการพูดคุยก่อนอยู่แล้ว"
61070-192 = "งั้นเราเข้าไปกันเลยมั้ย?"
61070-196 = "สควอดของอาเรียส ฉันขอเริ่มภารกิจเดี๋ยวนี้"
61070-200 = "อื้อ คิดถึงจังเลยนะ ความรู้สึกนี้"
61070-205 = "นี่ ครู..."
61070-206 = "ฉันขอถามไว้ก่อน เพราะนี่อาจเป็นโอกาสสุดท้ายที่เราจะได้คุยกันก็ได้..."
61070-207 = "ทำไมถึง... เอาแต่พาตัวเองมาทำเรื่องอันตรายโดยไม่เป็นห่วงตัวเองเลยล่ะ?"
61070-208 = "ปะ... เปล่าหรอก ฉันไม่ได้จะตำหนิในส่วนนั้นหรอก ฉันก็แค่..."
61070-212 = "......"
61070-213 = "ไม่อยากเห็นครูต้องบาดเจ็บหรือลำบากอีกต่อไปแล้ว"
61070-214 = "ไม่ว่าจะเป็นทางจิตใจหรือทางกายก็ตาม"
61070-215 = "[s] \"พอซาโอริเป็นห่วง ครูก็มีแรงขึ้นมาเลยนะ!\""
61070-216 = "งะ... งั้นเหรอ? งั้นถ้าฉันเป็นห่วงครูแบบนี้ต่อไป เวลาไม่สบายครูก็จะฟื้นตัวเร็วขึ้นหรือเปล่า...!"
61070-217 = "มะ... ไม่สิ จะเป็นแบบนั้นไปได้ยังไง เมื่อกี้ถึงจะเป็นความคิดของฉันเอง แต่ก็น่าสมเพชจริงเชียว ฉันพยายามคิดทุกเรื่องในวิธีง่ายๆ แบบนี้ได้ยังไงกัน"
61070-218 = "หืม? ทำไมจู่ๆ ถึงเป็นแบบนี้น่ะเหรอ?"
61070-219 = "......"
61070-220 = "ก็... พอมาที่นี่"
61070-221 = "ฉันก็คิดถึงเรื่องในอดีต... ในหลายๆ แง่น่ะ"
61070-222 = "......"
61070-223 = "จริงสิ ครู?"
61070-224 = "......"
61070-225 = "ฉันยังไม่ได้ขอโทษครูอย่างเป็นทางการเลย..."

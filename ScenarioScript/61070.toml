61070-34 = "3;나기사 스탠딩;18;사실 그렇게 하고도, 문제점은 여전히 남아 있을 겁니다.\n#3;em;[땀]"
61070-35 = "3;나기사 스탠딩;04;시험을 보려면 반드시 그에 대한 선행 학습이 있어야 하는데……."
61070-36 = "3;나기사 스탠딩;04;아리우스 학생들이 일반적인 공부를 했을까? 하는 것이 제가 품고 있는 불안감이에요."
61070-37 = "3;나기사 스탠딩;23;네. 역시 그 부분은 무리겠지요. 그래서…… 저는 어디까지나 선생님께 원격 강의를 요청드리고자 했습니다만…….\n#3;em;[한숨]"
61070-38 = "3;나기사 스탠딩;02;다시 한번 감사드립니다. 선생님. 그리고 죄송합니다. 아리우스 스쿼드 여러분."

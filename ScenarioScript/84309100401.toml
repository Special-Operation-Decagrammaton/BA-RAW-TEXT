[translation]
84309100401-6 = "บางครั้งก็ดูตรงไปตรงมาแปลกๆ แฮะ เชื่อเขาเลย"
84309100401-7 = "ฉันว่าแค่ตรงไปตรงมาเฉยๆ นะคะ..."
84309100401-8 = "อืม ฟังดูแล้วก็น่าจะเป็นอย่างนั้นเหมือนกัน"
84309100401-13 = "คุยเรื่องอะไรกันอยู่เหรอ...?"
84309100401-14 = "เรื่องเธอนั่นละ"
84309100401-15 = "เรื่องของคุณค่ะ ริโอะ"
84309100401-17 = "ทำไมถึงทำอย่างนี้กับฉันนะ?"

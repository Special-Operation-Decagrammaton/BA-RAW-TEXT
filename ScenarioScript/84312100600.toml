[translation]
84312100600-5 = "……是這個嗎？"
84312100600-10 = "……？"
84312100600-12 = "啊啊啊啊──！！我的手把！！"
84312100600-14 = "就說不是姐姐的手把了……"
84312100600-16 = "是，是在哪找到的……？#n真奇怪，那附近我們剛才也有找過啊……"
84312100600-17 = "嗯……？是嗎？#n明明掉在很明顯的地方……"
84312100600-24 = "趕快來啟動看看吧。#n哦哦，動了動了！"
84312100600-25 = "而且連故障的地方都修好了！"
84312100600-26 = "你在說什麼啊，姐姐？#n怎麼可能會連故障的地方都修好了……"
84312100600-31 = "……咦？真的修好了耶。#n這是怎麼回事？"
84312100600-32 = "現在又能用這個跟大家一起玩合作遊戲了！！#n沒時間耽擱了，立刻開始吧！！"
84312100600-33 = "姐姐，在那之前應該先道謝吧……"
84312100600-35 = "沒關係。這種事不需要道謝……"
84312100600-41 = "……愛麗絲同學？"
84312100600-42 = "手把為什麼會在那裡，就連盜賊王也不知道嗎？"
84312100600-46 = "那麼……從劇情來看，這一定是賢者做的吧。"
84312100600-51 = "賢者……？"
84312100600-55 = "（……莉央）"
84312100600-56 = "……呵呵。或許是吧。"
84312100600-57 = "來，盜賊王。再次加入隊伍吧！"
84312100600-58 = "……什麼？我嗎？"
84312100600-59 = "沒錯！來跟愛麗絲和夥伴們一起玩遊戲吧！"
84312100600-61 = "用盜賊王找回來的這個手把！！"
84312100600-66 = "呵呵，好吧。#n我這免疫墮落魔法的盜賊王，就奉陪到底吧。"
84312100600-67 = "……敬請期待。"
84312100600-68 = "……嗯！！"

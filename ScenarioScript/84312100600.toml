[translation]
84312100600-5 = "ใช่อันนี้หรือเปล่าคะ...?"
84312100600-10 = "...?"
84312100600-12 = "อ๊ะ...!! คอนโทรลเลอร์ของฉัน!!"
84312100600-14 = "ก็บอกแล้วไงว่าไม่ใช่คอนโทรลเลอร์ของพี่..."
84312100600-16 = "มะ... มันอยู่ตรงไหนเหรอคะ...? แปลกจัง เมื่อกี้พวกฉันก็หาตรงแถวๆ นี้ไปแล้วนี่นา..."
84312100600-17 = "หืม...? งั้นเหรอคะ? มันหล่นอยู่ในที่ที่มองเห็นชัดเจนเลยนะ..."
84312100600-24 = "เย้ มันยังใช้ได้อยู่!"
84312100600-25 = "รู้สึกเหมือนจุดที่เสียก็จะได้รับการซ่อมแล้วด้วยแฮะ!"
84312100600-26 = "พูดอะไรน่ะ พี่โมโมอิ คอนโทรลเลอร์มันจะไปซ่อมตัวเองได้ยังไง..."
84312100600-31 = "เอ๋... จริงด้วยแฮะ? อะไรกันเนี่ย?"
84312100600-32 = "จากนี้เราก็เล่นเกม Co-Op กันได้แล้วละ!! ไม่มีเวลามาอืดอาดยืดยาดกันแล้ว มาเล่นกันเลยดีกว่า!!"
84312100600-33 = "พี่โมโมอิ ไม่ขอบคุณกันก่อนเลยเหรอ..."
84312100600-35 = "ไม่เป็นไรค่ะ ฉันไม่ได้ทำอะไรยิ่งใหญ่หรอกค่ะ..."
84312100600-41 = "คุณอาริสึ...?"
84312100600-42 = "คุณโจรก็ไม่รู้เหรอคะว่าคอนโทรลเลอร์ของพวกเราไปอยู่ตรงนั้นได้ยังไง?"
84312100600-46 = "ถ้าอย่างนั้น... นี่ต้องเป็นฝีมือของนักปราชญ์แน่เลยค่ะ"
84312100600-51 = "ฝีมือของนักปราชญ์...?"
84312100600-55 = "(ริโอะ...)"
84312100600-56 = "ฮุฮุ... อาจจะเป็นอย่างนั้นก็ได้นะคะ"
84312100600-57 = "เอาละค่ะ คุณโจร มาเข้าปาร์ตี้ของเราเลยค่ะ!"
84312100600-58 = "คะ...? ฉันเหรอคะ?"
84312100600-59 = "ค่ะ! มาเล่นเกมกับพวกเราไงคะ!"
84312100600-61 = "เล่นด้วยคอนโทรลเลอร์ที่คุณโจรหาเจอนี่ละค่ะ!!"
84312100600-66 = "ฮุฮุ ได้ค่ะ ราชาจอมโจรที่ไม่เกรงกลัวต่อเวทมนตร์แห่งความชั่วร้ายจะช่วยผนึกกำลังเองค่ะ"
84312100600-67 = "แต่เล่นได้แค่แป๊บเดียวนะคะ..."
84312100600-68 = "ค่ะ...!!"

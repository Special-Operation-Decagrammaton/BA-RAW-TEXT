[translation]
10029040-1 = "#title;제4화;자유시간은 언제나 순식간에 지나간다"
10029040-2 = "#na;(이튿날 오후)"
10029040-3 = "#st;[0,0];instant;1;"
10029040-4 = "#clearST"
10029040-5 = "#wait;2000"
10029040-6 = "#wait;2500"
10029040-7 = "#na;에이미;……확인."
10029040-8 = "#na;에이미;전원 지정된 포인트에 도착했어, 부장. 이 건물이야."
10029040-9 = "3;통신히마리;01;……제대로 된 위치에 도착한 모양이네요.\n#3;a"
10029040-10 = "3;통신히마리;07;맞아요. 거기에 보이는 건물 지하로 내려가면 된답니다."
10029040-11 = "3;통신히마리;01;아마 조금 내려간 뒤부터는 제 쪽에서 연락하는 게 어려울 수 있겠네요."
10029040-12 = "3;통신히마리;01\n1;에이미;02;괜찮아. 이미 한 번 와 봤던 곳이니까. 그 '설비'라는 것도, 어디쯤인지 대략 짐작이 가는 것 같고.\n#3;m5\n#1;em;[반응]\n#1;a"
10029040-13 = "#st;[0,0];instant;1;"
10029040-14 = "#clearST"
10029040-15 = "1;에이미;02\n3;통신히마리;01\n#3;d\n#1;d\n#1;h\n#3;h\n#wait;1500"
10029040-16 = "2;미사카;04;그나저나 살벌한 풍경이네……. 이제 와서 하는 말이지만, 이렇게 먼 곳까지 와서 우릴 데리고 왔던 거야?\n#2;a\n#2;em;…"
10029040-17 = "4;사텐;04;이런 곳에서 기절해 있던 저희 셋을 그곳까지 데려가셨던 건 가요……? 뭔가 괜히 죄송스러워지는데…….\n#4;em;[땀]\n#4;a"
10029040-18 = "#all;hide"
10029040-19 = "3;에이미;01;신경 쓸 거 없어. 데리고 온 건 그 상황에 따른 내 판단이었으니까.\n#3;em;[반응]"
10029040-20 = "3;통신히마리;01;맞아요. 대부분의 상황에선, 사과보다 감사가 서로에게 더 기분 좋은 법이죠."
10029040-21 = "3;통신히마리;03;어제도 늦게까지 잘 놀다가 쓰러지듯 주무시는 걸 보며, 그래도 '이세계의 사람' 중 하나로서 조금 흐뭇했답니다.\n#3;em;[음표]"
10029040-22 = "3;에이미;04;………….\n#3;em;…"
10029040-23 = "3;에이미;02;다만 내려갈 때에는, 올라올 때보다 좀 더 이런저런 상황이 많을 거야"
10029040-24 = "3;에이미;02\n5;통신히마리;02;그러고 보니 에이미. 그 '설비'라는 것에 대해서, 몇 가지 더 당부해야 할 게 있어요.\n#5;a\n#3;m1"
10029040-25 = "3;에이미;02;……응? 당부? 무슨 당부?\n#3;em;[?]"
10029040-26 = "5;통신히마리;01;다시 확인해 보니, 지하에서 에너지 반응이 보였습니다. 침입자가 나타나면, 보안 수준이 높아지는 시스템이겠지요.\n#5;em;[반응]"
10029040-27 = "5;통신히마리;07;드론이 나타날 수도 있고, 길이 바뀔 수도 있겠죠."
10029040-28 = "3;에이미;01;문제없어. 그런 것 정도는 익숙하니까."
10029040-29 = "5;통신히마리;09;그렇겠지요. 그리고 그런 정도에서 끝난다면, 따로 이렇게 '당부'를 할 리도 없을 거고요."
10029040-30 = "3;에이미;01;……? 뭔가 더 있다는 거야?\n#3;em;[?]"
10029040-31 = "5;통신히마리;99;네. 여러분이 찾아갈 설비는 '전이'를 일으키는 설비에요. 조심해야 할 건 드론이 아니라…….\n#5;em;…"
10029040-32 = "#all;hide"
10029040-33 = "3;통신히마리;03;바로 '다른 시공간과의 뒤섞임'입니다.\n#3;closeup"
10029040-34 = "3;미사카;13;뒤섞임……? 다른 시공간과? 괜찮은 거야, 그거?\n#3;em;[땀]\n#3;closeup"
10029040-35 = "3;쇼쿠호;02;그러게. 우리도 그거 때문에 지금 여기에 있는 건데…….\n#3;closeup"
10029040-36 = "3;통신히마리;01;지금 상태로는 설비도 조용하지만……. 경비 시스템이 돌아가기 시작하면 설비에 부하가 발생하기 시작하겠죠."
10029040-37 = "3;통신히마리;07;그 말은 즉, 설비가 전체적으로 활성화되며, 부작용이 날 가능성이 높다는 것이고……."
10029040-38 = "3;우타하;02;……과연. 활성화가 많이 되면 될수록 전이 효과가 발생할 가능성도 같이 올라간다는 거군. 이해했어.\n#3;a\n#3;em;[반응]"
10029040-39 = "[s1] \"그렇군, 이해했어.\"\n[s2] \"간결한 설명 고마워, 우타하. 나도…….\""
10029040-40 = "#st;[0,0];instant;1;"
10029040-41 = "#st;[0,0];instant;1;"
10029040-42 = "#clearST\n#wait;2500"
10029040-43 = "[ns3] \"……우타하!? 엔지니어부까지!?\"\n[ns4] \"너희는 왜 여기에 있는 거야!?\""
10029040-44 = "#wait;100"
10029040-45 = "#wait;100"
10029040-46 = "3;우타하;01;왜냐니, 그런 식으로 이야기하면 서운해. 선생님."
10029040-47 = "3;우타하;99;설마 이런 재미있는……."
10029040-48 = "#st;[0,0];instant;1;"
10029040-49 = "#clearST"
10029040-50 = "3;우타하;99\n#3;em;…\n#wait;2500"
10029040-51 = "3;우타하;05;중요한 일을 우리들만 놔두고 진행하려고 했던 거야? 그것도 '기계 설비'를 고치고 조율하는 일인데?"
10029040-52 = "3;쇼쿠호;04;어라, 방금 분명 '재미있는 일'이라고…….\n#3;em;[땀]"
10029040-53 = "3;쇼쿠호;04\n1;히비키;03;사소한 것은 신경 쓰지 말기로 해. 우리도 모두를 도와주고 싶어서 온 거니까.\n#1;ar\n#1;em;[음표]"
10029040-54 = "1;히비키;03;수리도 수리지만 가는 길에 있을지 모를 전투를 상정해서라도, 동료는 많은 게 좋지 않겠어?"
10029040-55 = "5;코토리;01;그렇습니다! 더군다나 여러분의 총을 만든 것도 저희들이니, 혹여라도 도중에 문제가 생길 때에 A/S해드리는 것도 저희가 돼야겠죠!\n#5;al\n#5;hophop\n#5;em;[재잘]"
10029040-56 = "1;히비키;02\n3;쇼쿠호;04\n5;코토리;99;물론 저희가 만든 총이, 그런 식으로 고장 날 리는 없지만요!\n#5;m3\n#1;dl\n#3;dl"
10029040-57 = "#all;hide"
10029040-58 = "3;코토리;02;……부작용이 나면 모를까!\n#3;closeup\n#3;em;[!]"
10029040-59 = "3;사텐;04;지금 뭐라고…….\n#3;em;[땀]"
10029040-60 = "3;사텐;02;아니, 그보다 이 총 만드신 분들이셨군요. 학생처럼 보이는데……."
10029040-61 = "3;미사카;02;뭐, 많아서 나쁠 건 없겠지. 누가 됐건 우리보다는 여기에 익숙한 사람들일 테니까.\n#3;em;[반응]"
10029040-62 = "3;미사카;99;적이 아니라면 굳이 현지인 말을 무시할 이유도 없고 말이야."
10029040-63 = "3;쇼쿠호;02;……흐응.\n#3;em;…"
10029040-64 = "3;쇼쿠호;02\n1;미사카;13;……왜, 또. 뭐가 불만이야, 쇼쿠호.\n#3;m5\n#1;ar\n#1;em;[빠직]"
10029040-65 = "3;쇼쿠호;99;아니? 전혀? 그저 미사카 씨, 뭔가 평소보다 성격 좋은 것 같은 느낌이 든달까?\n#3;em;[음표]"
10029040-66 = "1;미사카;01;딱히. 뭐가 됐건 쓸데없는 걸로 시간을 끌고 싶지 않을 뿐이야."
10029040-67 = "3;쇼쿠호;01\n1;미사카;02;……응? 선생님, 뭐라고?\n#1;em;[?]\n#3;dr\n#1;m3"
10029040-68 = "1;미사카;01;묘하게 의욕이 있는 거 같다고? 무슨 소리야. 당연히 좋아서 하는 일은 아니라고, 싸움인데."
10029040-69 = "1;미사카;99;그치만 반대로 말하면……. 저 에이미란 사람은, 이런 곳에서 우리를 들쳐 업고 안전한 곳까지 옮겨 줬단 이야기잖아.\n#1;em;…"
10029040-70 = "1;미사카;02;거기다 이상한 시선 받지 말라고 일부러 총까지 만들어 주고……. 지금도 이렇게 따라와 주고."
10029040-71 = "1;미사카;01;……따지고 보면 애초에 그냥 우리 문제인데 말이야."
10029040-72 = "#all;hide"
10029040-73 = "3;사텐;08;맞아요! 하루뿐이긴 했지만, 선생님도 저희랑 같이 관광 가이드 해주셨고요!\n#3;em;[재잘]\n#3;hophop"
10029040-74 = "3;사텐;03;짧은 시간이었지만, 주변 구경하는 것도 꽤 재밌었다고요!"
10029040-75 = "3;사텐;07;도울 수 있는 게 있다면, 서로 돕는 게 좋죠! 이세계인들끼리!!\n#3;em;[음표]"
10029040-76 = "3;쇼쿠호;08;마지막 말은 지금 상황과 아무 상관 없어 보이는 이야기지만…….\n#3;em;[땀]"
10029040-77 = "[s5] \"그래도 즐거웠다니 다행이야.\"\n[s6] \"나도 꽤 재밌었어, 신선했고.\""
10029040-78 = "#wait;100"
10029040-79 = "#wait;100"
10029040-80 = "3;미사카;11;……아무튼 이 정도로 받았는데, 여기서까지 우유부단하게 서 있는 건 그리 취향이 아니란 말이었어. 단지 그뿐.\n#3;em;[반응]"
10029040-81 = "3;쇼쿠호;99;흐응……. 그러네."
10029040-82 = "3;쇼쿠호;01;자주 있는 일은 아닌데, 묘하게 의견이 맞네. 나도 빚지고 사는 건 좋아하지 않는 편이라.\n#3;em;[음표]"
10029040-83 = "3;통신히마리;01;후후. 좋은 이야기군요. 조금이긴 하지만, 저도 어느 정도 마음을 놓을 수 있겠어요."
10029040-84 = "3;통신히마리;03;마지막으로 내부 스캔 지도를 여러분들께 전해드리고, 이후로는 통신이 끊길 테니 대신 행운을 빌어 드리죠."
10029040-85 = "3;통신히마리;01;그리고 선생님.\n#3;em;[반응]"
10029040-86 = "3;통신히마리;07;아마 큰일이 일어나진 않을 거라고 생각하지만……. 그래도 조심해 주세요."
10029040-87 = "3;통신히마리;02;……'전이'라는 개념은 꽤 변수가 큰 개념이니까요. 위험하진 않아도, 당황하기엔 충분한 일들이 있을 수 있어요.\n#3;em;…"
10029040-88 = "[s7] \"걱정하지 마. 나만 믿어.\"\n[s8] \"당연하지. 초천재슈퍼선생님이라고!\""
10029040-89 = "3;통신히마리;03;후후……. 네."
10029040-90 = "3;통신히마리;12;………….\n#3;em;[땀]"
10029040-91 = "3;통신히마리;01;그럼. 지금 스캔 지도를 보내드리죠."
10029040-92 = "3;통신히마리;03;……행운을 빌어요, 모두들.\n#3;em;[음표]"
10029040-93 = "#continued"

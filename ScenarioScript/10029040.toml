[translation]
10029040-1 = "Episode 4;Time Flies"
10029040-2 = "The next morning..."
10029040-7 = "...Copy."
10029040-8 = "We've arrived at the rendezvous point, President. This is the building you told us about."
10029040-9 = "It looks like no one got lost."
10029040-10 = "Affirmative. We will proceed into the basement as instructed."
10029040-11 = "Once you're deep underground, it's going to be hard for me to reach you."
10029040-12 = "We'll be fine. I've been there before. I have an idea of where the facility should be located."
10029040-16 = "This place sure is an intimidating sight... You carried us back all the way from here by yourself?"
10029040-17 = "You really did that while we were unconscious...? I feel kind of bad now..."
10029040-19 = "It's nothing. I'm the one who decided to bring you back."
10029040-20 = "She's right, you know. Besides which, a show of gratitude is always better than an apology."
10029040-21 = "When I saw you three collapse from exhaustion after having such a fun day exploring Kivotos, I was quite proud as a representative of this world."
10029040-22 = "..."
10029040-23 = "I should warn you that you're likely to meet more resistance on your way down than your way up."
10029040-24 = "Which reminds me, Eimi. There are more things you need to know about this facility."
10029040-25 = "...What things?"
10029040-26 = "I've detected an energy signature coming from the basement. I suspect the security system is designed to go into overdrive when it detects intruders."
10029040-27 = "You may run into drones and the route itself may even change."
10029040-28 = "No problem. I've dealt with those kinds of obstacles before."
10029040-29 = "Of that I have no doubt. If that was all though, I wouldn't be warning you like this."
10029040-30 = "There's something else?"
10029040-31 = "Yes. This facility is capable of transference. It's not the drones you should be careful of, but rather..."
10029040-33 = "...becoming mixed up in time and space."
10029040-34 = "Mixed up in time and space...? That doesn't sound like business as usual."
10029040-35 = "That's an understatement. We're here because of that precise problem..."
10029040-36 = "The facility is quiet for now, but... If the security system powers on, there's a risk that the facility itself will get overloaded."
10029040-37 = "In other words, the whole of the facility may switch on, which increases the chances of unforeseen incidents..."
10029040-38 = "You're saying that once the facility is on, there's a chance we'll be transported somewhere else? Understood."
10029040-39 = "[s1] \"Thanks for the simple explanation.\"\n[s2] \"Even I could understand it, Utaha—\""
10029040-43 = "[ns3] \"Utaha?! And the rest of the Engineering Department?!\"\n[ns4] \"What are you doing here?!\""
10029040-46 = "When you say it like that, it almost sounds like you don't want us here, Sensei."
10029040-47 = "Did you really think you could leave us out of something this exciting—"
10029040-51 = "I mean, something this important! Furthermore, what if you need help fixing this mysterious machinery?"
10029040-52 = "Excuse me, but did you just call this exciting—"
10029040-53 = "Don't sweat the details. We're here to help."
10029040-54 = "Repair work is our specialty, and don't you think you could use some extra hands if you run into trouble?"
10029040-55 = "Exactly! We're the ones who made all of your weapons, so if there are any malfunctions, we should be the ones to repair them!"
10029040-56 = "Not that there will be any malfunctions!"
10029040-58 = "...Maybe unforeseen side effects, but no malfunctions!"
10029040-59 = "Wait, what do you mean—"
10029040-60 = "Wait, before that. You all made this gun? But you look like students..."
10029040-61 = "Well, the more the merrier. They're bound to know more about this place than we do."
10029040-62 = "Who are we to turn down help from people who actually live here?"
10029040-63 = "...Hm."
10029040-64 = "Is there something you'd like to add, Shokuhou?"
10029040-65 = "No, not at all. I was simply thinking that you're in an uncharacteristically good mood, Miss Misaka."
10029040-66 = "Not really. I just don't want to waste time arguing about pointless things."
10029040-67 = "Huh? You have a question, Sensei?"
10029040-68 = "It sounds like I'm looking forward to fighting? That's ridiculous. It's not like I want to fight."
10029040-69 = "It's just... Eimi found us here and carried us all the way to safety by herself."
10029040-70 = "And she had guns made for us so we'd fit in... And she's sticking with us even now."
10029040-71 = "But if you think about it, this was never her problem. It was ours from the beginning."
10029040-73 = "That's right! And even though it was just for one day, Sensei went out of their way to give us a tour!"
10029040-74 = "It was a short visit, but I had a blast looking around!"
10029040-75 = "We should help out as much as we can! As fellow otherworlders!!"
10029040-76 = "That last point seems like it's neither here nor there, but..."
10029040-77 = "[s5] \"I'm glad you all enjoyed yourselves.\"\n[s6] \"I had a lot of fun too. It was refreshing.\""
10029040-80 = "...My point is, considering how much you all did for us, I'm just saying that I'm not a fan of sitting on my hands. That's all."
10029040-81 = "Hmm. I suppose."
10029040-82 = "It doesn't happen often, but I actually agree with you. I don't care to carry around unpaid debts."
10029040-83 = "Heehee. I'm happy to hear you all say that. It gives me some peace of mind, if just a little."
10029040-84 = "I'm sending you a scan of the facility layout, and then I'm going to end communications. I wish you luck."
10029040-85 = "And Sensei."
10029040-86 = "I don't think anything major will happen, but... Be careful."
10029040-87 = "Transportation is a broad concept. It's not innately dangerous, but I don't want you getting caught off guard if something unexpected happens."
10029040-88 = "[s7] \"Don't worry. You can trust me.\"\n[s8] \"I am a super genius Sensei after all!\""
10029040-89 = "Heehee... Okay."
10029040-90 = "..."
10029040-91 = "Okay. Sending the scan now."
10029040-92 = "...Good luck, everyone."

[translation]
10029040-1 = "第4話;自由時間總是稍縱即逝"
10029040-2 = "（第二天下午）"
10029040-7 = "……了解。"
10029040-8 = "全員抵達指定地點，部長。#n就是這棟建築物。"
10029040-9 = "……看來各位都順利抵達了呢。"
10029040-10 = "接著請各位前往那棟建築物的地下。"
10029040-11 = "不過在進入地下之後，要與各位取得聯絡似乎會有困難。"
10029040-12 = "沒問題，這裡我已經來過一次了。#n那個「設施」所在的位置，我也多少有點頭緒。"
10029040-16 = "話說回來，這景象還真是可怕……#n雖然現在這麼問好像有點多餘，你居然能從這麼遠的地方把我們帶回來？"
10029040-17 = "而且還是在我們全都沒有意識的情況下……？#n總覺得有點不好意思……"
10029040-19 = "你們不必在意。#n我之所以把你們帶回來，只是根據當時情況做出的判斷而已。"
10029040-20 = "沒錯，在大部分的情況下，道謝總是會比道歉更讓雙方滿意。"
10029040-21 = "看你們昨天玩得那麼晚，甚至還累到直接睡著……#n身為一名「異世界的人」，我其實覺得挺驕傲的。"
10029040-22 = "…………"
10029040-23 = "不過回程時的狀況總是會比去程時來的多。"
10029040-24 = "話說回來，英美。#n關於那個「設施」，我還有幾件事要提醒。"
10029040-25 = "……嗯？提醒？"
10029040-26 = "根據剛才再次確認的結果，地下似乎出現了能量反應。#n我想多半是來自某種發現入侵者就會自動提高安全層級的系統吧。"
10029040-27 = "因此很有可能會遇到無人機，或是碰到必須繞路的情況。"
10029040-28 = "沒問題，這種事我已經很習慣了。"
10029040-29 = "我想也是，不過如果只是這樣的話，我也不會特地「提醒」你了。"
10029040-30 = "……？#n還有什麼要注意的嗎？"
10029040-31 = "是的。各位接下來要尋找的將是會引發「轉移」現象的設施，#n所以真正需要留意的並非無人機……"
10029040-33 = "而是「和其他時空融合」的現象。"
10029040-34 = "融合……？其他時空？那樣沒問題嗎？"
10029040-35 = "就是說啊，畢竟我們就是因為那個現象才會來到這裡……"
10029040-36 = "雖然現在設施還沒有任何動靜……#n一旦保全系統開始運作，設施的負荷便會隨之增加。"
10029040-37 = "也就是說，如果設施完全啟動的話，很可能會產生副作用……"
10029040-38 = "……原來如此，我明白了。#n設施啟動的程度越高，發生轉移現象的可能性也會跟著增加對吧。"
10029040-39 = "[s1]「原來是這樣啊，我懂了。」\n[s2]「謝謝你簡潔易懂的說明，詠葉。就連我也……」"
10029040-43 = "[ns3]「……詠葉！？連工程師部都來了！？」\n[ns4]「為什麼連你們也來了！？」"
10029040-46 = "居然問為什麼，真讓人難過啊，老師。"
10029040-47 = "這麼有趣……"
10029040-51 = "我是說這麼重要的事情，老師卻打算拋下我們自己處理嗎？#n更何況這件事還跟修理、調整「機器設施」有關不是嗎？"
10029040-52 = "呃，你剛才很明顯說了「有趣」吧……"
10029040-53 = "那種小事不用在意。#n我們也是為了幫助大家而來的。"
10029040-54 = "修理工作是一回事，在抵達目標的途中說不定會碰上戰鬥，人手越多不是越好嗎？"
10029040-55 = "說的沒錯！而且各位的槍都是工程師部打造出來的，#n假如路上發生故障的話，自然也要由我們來維修囉！"
10029040-56 = "當然我們所打造的槍，是絕不可能突然發生故障的！"
10029040-58 = "……頂多就是出現一點副作用而已！"
10029040-59 = "他剛才說了什麼……"
10029040-60 = "話說，原來我們的槍是他們打造的啊……明明看起來也是學生……"
10029040-61 = "算了，多一點人手也沒什麼不好。#n至少他們比我們更了解這裡。"
10029040-62 = "如果沒有敵意的話，多聽聽當地人的意見總不會錯。"
10029040-63 = "哼嗯……"
10029040-64 = "……怎麼？你有什麼不滿嗎，食蜂？"
10029040-65 = "沒有啊～只是覺得御坂同學好像比平常好說話而已。"
10029040-66 = "哪有，我只是不想在沒意義的事情上浪費時間而已。"
10029040-67 = "……嗯？老師，你剛才說什麼？"
10029040-68 = "我看起來莫名的興奮？#n怎麼會呢？這可是戰鬥耶，我怎麼可能會因為這種事興奮。"
10029040-69 = "只是……那個叫做英美的人特地跑來這裡，把我們背回安全的地方……"
10029040-70 = "為了讓我們外出的時候不會那麼引人注目，還幫我們打造了槍隻……#n甚至連現在也跟在我們身旁。"
10029040-71 = "……仔細想想，這明明從一開始就是我們自己的問題。"
10029040-73 = "沒錯！雖然只有一天的時間，老師還是很認真地當我們的導遊！"
10029040-74 = "就算時間很短暫，能夠四處逛逛還是非常開心！"
10029040-75 = "如果有幫得上忙的地方，還是互相幫忙比較好吧！我是指異世界的人之間！！"
10029040-76 = "最後那句話跟現在的情況完全無關吧……"
10029040-77 = "[s5]「你能覺得開心真是太好了。」\n[s6]「我也覺得很有趣、很新鮮。」"
10029040-80 = "……總之，既然受了大家這麼多幫助，我也不喜歡連這種時候都優柔寡斷。#n就是這樣而已。"
10029040-81 = "哼嗯……這麼說也對。"
10029040-82 = "難得和御坂同學意見相同呢。我也同樣不喜歡欠人人情。"
10029040-83 = "呵呵，聽見各位這麼說，我也稍微能夠放心了。"
10029040-84 = "那麼最後，我會將內部掃描的地圖交給各位。#n在那之後通訊將會中斷，祝各位好運。"
10029040-85 = "還有……老師。"
10029040-86 = "雖然應該不會有什麼問題……還是請您務必小心。"
10029040-87 = "……「轉移」這一概念的變數相當複雜。#n因此即使沒有危險，也可能產生足以讓人陷入恐慌的狀況。"
10029040-88 = "[s7]「別擔心，相信我吧。」\n[s8]「沒問題的，我可是超天才SUPER老師啊！」"
10029040-89 = "呵呵……好的。"
10029040-90 = "…………"
10029040-91 = "那麼我這就發送掃描地圖。"
10029040-92 = "……祝大家好運。"

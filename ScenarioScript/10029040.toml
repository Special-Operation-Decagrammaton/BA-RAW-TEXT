[translation]
10029040-1 = "ตอนที่ 4;เวลาส่วนตัวมักผ่านไปไวราวกับโกหก"
10029040-2 = "(ยามบ่ายของวันที่สอง)"
10029040-7 = "... รับทราบ"
10029040-8 = "ทุกคนไปถึงจุดที่กำหนดแล้วหัวหน้า อาคารนี้แหละ"
10029040-9 = "... ท่าทางจะไปถึงตำแหน่งที่หมายกันแล้วสินะคะ"
10029040-10 = "ใช่ค่ะ เห็นชั้นใต้ดินของอาคารไหมคะ ลงไปได้เลยค่ะ"
10029040-11 = "ถ้าลงไปอีกอาจจะได้รับการติดต่อจากฝั่งฉันติดขัดสักหน่อยนะคะ"
10029040-12 = "ไม่เป็นไรหรอก ฉันเคยมาที่นี่แล้ว ส่วน 'เครื่องมือ' ที่ว่า ฉันก็พอเดาได้อยู่ว่ามันจะอยู่ตรงไหน"
10029040-16 = "จะว่าไปสภาพที่นี่ดูน่ากลัวจังเลยนะ... ถึงจะมาพูดเอาตอนนี้แล้วก็เถอะ แต่เธอมาที่ที่ไกลแบบนี้แล้ว#nพาพวกเรากลับไปงั้นเหรอ?"
10029040-17 = "พาพวกเราทั้งสามคนที่นอนสลบอยู่ที่นี่กลับไปไกลขนาดนั้นเลยเหรอคะ...? รู้สึกผิดจังเลย..."
10029040-19 = "ไม่ต้องห่วงหรอก การพาพวกเธอกลับมามันเป็นการตัดสินใจตามสถานการณ์ของฉันน่ะ"
10029040-20 = "ใช่ค่ะ ในสถานการณ์ส่วนใหญ่แล้ว การกล่าวคำขอบคุณเป็นสิ่งที่ทำให้รู้สึกดีต่อกันมากกว่าคำขอโทษ#nนะคะ"
10029040-21 = "ดูจากที่เที่ยวเล่นกันดึกดื่นแล้วกลับมานอนกันแล้ว ในฐานะของ 'คนจากโลกอื่น' ฉันก็รู้สึกยินดีอยู่นะคะ"
10029040-22 = "......"
10029040-23 = "แต่ว่าตอนลงไป อาจเจอสถานการณ์ต่างๆ กว่าตอนขึ้นมาก็ได้นะ"
10029040-24 = "จะว่าไปแล้ว เอมิ ฉันมีบางอย่างที่ต้องกำชับเกี่ยวกับ 'เครื่องมือ' นั้นน่ะค่ะ"
10029040-25 = "... หืม? กำชับ? กำชับอะไร?"
10029040-26 = "จากการตรวจสอบอีกครั้ง ฉันเห็นปฏิกิริยาของพลังงานจากชั้นใต้ดินค่ะ มันคงเป็นระบบที่เพิ่มระดับ#nการรักษาความปลอดภัยหากมีผู้บุกรุกน่ะค่ะ"
10029040-27 = "อาจจะมีโดรนโผล่ออกมา หรือว่าทางเดินอาจเปลี่ยนไปก็ได้ค่ะ"
10029040-28 = "สบายมาก เรื่องแบบนั้นฉันชินแล้วละ"
10029040-29 = "ก็คงอย่างนั้นค่ะ และถ้ามันจะมีแค่นั้นจริงๆ ฉันก็คงไม่มีความจำเป็นต้อง 'กำชับ' แบบนี้หรอกค่ะ"
10029040-30 = "...? จะมีอะไรอีกงั้นเหรอ?"
10029040-31 = "ค่ะ เครื่องมือที่ทุกคนกำลังไปหาอยู่ คือเครื่องมือที่ทำให้เกิดการ 'เคลื่อนย้าย' ค่ะ สิ่งที่ต้องระวังไม่ใช่#nโดรน..."
10029040-33 = "แต่เป็น 'การปนเปของกาลอวกาศจากต่างที่กัน' ต่างหากค่ะ"
10029040-34 = "การปนเป...? ของกาลอวกาศจากต่างที่กัน? แบบนี้จะเป็นอะไรไหมเนี่ย?"
10029040-35 = "ไม่รู้สิ ที่พวกเรามาที่นี่ได้ก็เพราะสิ่งนั้นนี่..."
10029040-36 = "ตอนนี้เครื่องมือมันยังสงบอยู่ก็จริง... แต่ถ้าระบบรักษาความปลอดภัยเริ่มทำงานขึ้นมา เครื่องมือก็คง#nเริ่มใช้พลังงานไฟฟ้าด้วยค่ะ"
10029040-37 = "นั่นหมายความว่าหากเครื่องมือถูกเปิดใช้งานอย่างเต็มที่ ก็มีความเป็นไปได้สูงที่จะเกิดผลข้างเคียง..."
10029040-38 = "... งั้นก็แปลว่ายิ่งเครื่องมือทำงานมาก ความเป็นไปได้ในการเกิดการเคลื่อนย้ายก็จะยิ่งมากขึ้นไปด้วย#nสินะ เข้าใจแล้ว"
10029040-39 = "[s1] \"อย่างนี้นี่เอง เข้าใจแล้ว\"\n[s2] \"ขอบใจที่ช่วยสรุปให้นะ อุทาฮะ\""
10029040-43 = "[ns3] \"...อุทาฮะ!?  ชมรมวิศวกรรมก็ด้วยเหรอ!\"\n[ns4] \"ทำไมพวกเธอถึงมาอยู่ที่นี่ได้!?\""
10029040-46 = "ทำไมงั้นเหรอ พูดแบบนี้พวกฉันเสียใจนะคุณครู"
10029040-47 = "นี่คุณครูจะจัดการเรื่องน่าสนุก..."
10029040-51 = "ไม่สิ จะจัดการเรื่องสำคัญแบบนี้โดยที่ไม่บอกพวกฉันเหรอ? นี่มันเรื่องการซ่อมแซมและปรับ#n'เครื่องจักรกล' เลยนะ?"
10029040-52 = "เอ๋ เมื่อกี้พูดว่า 'เรื่องน่าสนุก' งั้นเหรอ..."
10029040-53 = "อย่าสนใจเรื่องเล็กๆ น้อยๆ เลย ที่พวกฉันมาที่นี่ก็เพราะอยากจะช่วยทุกคนน่ะ"
10029040-54 = "เรื่องซ่อมแซมก็อีกเรื่องหนึ่ง แต่ระหว่างทางหากมีการปะทะกันเกิดขึ้น การมีสหายไว้ย่อมเป็นเรื่องดี#nกว่าไม่ใช่เหรอ?"
10029040-55 = "นั่นสิคะ! ยิ่งไปกว่านั้น พวกฉันคือคนที่สร้างปืนให้ทุกคนด้วย ถ้าเกิดว่าปืนมีปัญหาอะไรขึ้นมา พวกเราก็จะได้ซ่อมให้ได้ยังไงล่ะคะ"
10029040-56 = "แต่ก็แน่นอนว่าปืนที่พวกฉันสร้างไม่มีทางเสียหายหรอกค่ะ!"
10029040-58 = "... ถ้าเป็นพวกผลข้างเคียงก็ว่าไปอย่าง!"
10029040-59 = "ว่ายังไงนะ..."
10029040-60 = "พวกคุณเองสินะคะที่สร้างปืนนี้ให้พวกฉัน แต่ดูเหมือนยังเป็นนักเรียนอยู่เลย..."
10029040-61 = "เอาเถอะ มีคนเยอะๆ ไว้ก็ยิ่งดี ยังไงซะก็เป็นคนที่คุ้นเคยกับสถานที่นี้มากกว่าพวกฉันอยู่แล้ว"
10029040-62 = "อีกอย่างพวกเธอก็ไม่ใช่ศัตรู งั้นเราก็ไม่มีเหตุผลที่จะเพิกเฉยต่อคำพูดของเจ้าถิ่นหรอกนะ"
10029040-63 = "... ฮึ่ม"
10029040-64 = "... อะไรอีกล่ะ ไม่พอใจตรงไหนอีก โชคุโฮว"
10029040-65 = "ก็ไม่นี่? ไม่เลย ก็แค่รู้สึกว่าคุณมิซากะดูนิสัยดีมากกว่าปกติก็เท่านั้น"
10029040-66 = "ฉันแค่ไม่อยากเสียเวลาไปกับเรื่องที่มันไม่มีประโยชน์อะไรน่ะ"
10029040-67 = "... หืม? ว่าไงนะคุณครู?"
10029040-68 = "ฉันดูมีความตั้งใจแปลกๆ งั้นเหรอ? พูดอะไรน่ะ ฉันไม่ได้จะต่อสู้เพราะอยากทำหรอกนะ"
10029040-69 = "แต่ในทางตรงกันข้าม... คุณคนที่ชื่อเอมิอุตส่าห์แบกพวกฉันออกไปจากที่นี่ แล้วก็ยังพาไปยังที่ที่#nปลอดภัย"
10029040-70 = "แถมวิศวกรพวกนี้ก็ช่วยสร้างปืนให้พวกฉัน เพราะกลัวว่าพวกฉันจะไปเด่นจนเตะตาคนอื่นเข้า แถมยังตามมาช่วยถึงที่นี่กันอีก"
10029040-71 = "... ถ้ามาคิดๆ ดูแล้ว นี่มันเป็นปัญหาของพวกฉันตั้งแต่แรกมากกว่า"
10029040-73 = "ใช่ค่ะ! ถึงจะแค่วันเดียว แต่คุณครูก็ช่วยเป็นไกด์พาพวกฉันเที่ยวด้วยนี่คะ!"
10029040-74 = "ต่อให้เป็นเวลาสั้นๆ แต่การได้เที่ยวเล่นไปรอบๆ ก็สนุกมากเลยละค่ะ!"
10029040-75 = "ถ้ามีอะไรที่พอจะช่วยได้ เราก็ควรช่วยเหลือซึ่งกันและกันสิคะ! ช่วยคนจากโลกอื่นไง!!"
10029040-76 = "คำพูดสุดท้ายดูเหมือนจะไม่เกี่ยวข้องกับสถานการณ์ตอนนี้นะ..."
10029040-77 = "[s5] \"ครูดีใจนะที่พวกเธอสนุกกับที่นี่\"\n[s6] \"ครูเองก็สนุก และรู้สึกแปลกใหม่ดีเหมือนกัน\""
10029040-80 = "... เอาเป็นว่าไหนๆ ฉันก็ได้รับความช่วยเหลือมาขนาดนี้แล้ว จะให้มายืนโลเลอยู่ตรงนี้ก็ถือว่าไม่ใช่ฉัน#nสักเท่าไร ก็แค่นั้นแหละ"
10029040-81 = "ฮึ่ม... นั่นสินะ"
10029040-82 = "ถึงปกติจะไม่ลงรอยกัน แต่รอบนี้ต้องบอกว่าความเห็นเราตรงกันอย่างน่าประหลาดเลยละ เดิมทีฉันก็#nเป็นประเภทที่ไม่ชอบติดหนี้บุญคุณใครอยู่แล้ว"
10029040-83 = "ฮุฮุ เป็นเรื่องที่ดีเลยนะคะ แบบนี้ฉันก็วางใจได้หน่อยแล้วละค่ะ"
10029040-84 = "สุดท้ายนี้ฉันจะส่งแผนที่สแกนภายในให้ทุกคนค่ะ หลังจากนี้สัญญาณน่าจะถูกตัดขาด เอาเป็นว่าฉันจะภาวนาให้ทุกคนโชคดีนะคะ"
10029040-85 = "แล้วก็ คุณครูคะ"
10029040-86 = "ฉันไม่คิดว่าจะมีเรื่องใหญ่อะไรเกิดขึ้นหรอกค่ะ แต่ก็... ช่วยระวังไว้ด้วยนะคะ"
10029040-87 = "... เพราะ 'การเคลื่อนย้าย' เป็นเรื่องที่มีตัวแปรอยู่ค่อนข้างมากเลยค่ะ ถึงมันจะไม่อันตราย แต่ก็อาจเกิดเรื่องที่ทำให้ตระหนกได้เลยค่ะ"
10029040-88 = "[s7] \"ไม่ต้องกังวลนะ เชื่อใจครูเถอะ\"\n[s8] \"แน่นอนอยู่แล้ว นี่คือคุณครูซูเปอร์อัจฉริยะเหนือมนุษย์เลยนะ!\""
10029040-89 = "ฮุฮุ... ค่ะ"
10029040-90 = "......"
10029040-91 = "ถ้างั้น ฉันจะส่งแผนที่สแกนให้นะคะ"
10029040-92 = "... โชคดีค่ะทุกคน"

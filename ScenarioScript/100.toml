[translation]
100-1 = "特殊任務"
100-2 = "聯邦學生會．作戰指揮室"
100-3 = "你好呀。你就是琳前輩所說的那個夏萊的老師嗎？"
100-7 = "哼嗯……看起來比想像中更可靠。"
100-8 = "不過，其實也無所謂就是了。"
100-9 = "怎麼了，就算用那種眼神看我，我也不會把明太子餅乾分你的哦。（喀滋喀滋）"
100-10 = "我叫桃香，和琳前輩一樣是聯邦學生會的幹部唷。"
100-11 = "因為聯邦學生會長突然失蹤，忙得連餅乾都沒時間吃了。（喀滋）"
100-12 = "儘管如此，還是特地來將工作直接指派給看起來很閒的聯邦搜查部夏萊。"
100-13 = "什麼？你說夏萊為了解決學校的問題已經拚盡全力所以很忙？"
100-14 = "哼嗯……但是那麼忙的話，就算再增加一個工作也沒什麼差了不是嗎？"
100-15 = "如你所知，在聯邦學生會長失蹤之後，奇普托斯各處都有笨蛋在搗亂。"
100-16 = "從打著正義夥伴的名號四處破壞，到大膽偷出機密文件的傢伙都有……"
100-17 = "實在是忙得不得了。"
100-18 = "雖然我什麼也沒做。（喀滋喀滋）"
100-19 = "但就繼續這樣放著問題不管的話，搞不好又要被琳前輩說些什麼了。"
100-20 = "聯邦學生會的工作是有連帶責任的，你和這件事也不能算是毫無關連哦。呵呵呵……"
100-21 = "那，就先從簡單的開始吧？（喀滋）"

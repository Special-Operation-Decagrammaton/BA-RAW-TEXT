[translation]
100-1 = "#title;특별의뢰, 시작합니다."
100-2 = "#place;총학생회 상황실"
100-3 = "3;모모카;11;안녕, 당신이 린 선배가 말한 그 샬레의 새로운 선생이구나?\n#3;em;[반응]\n#3;a"
100-4 = "3;모모카;17\n#3;m2\n#wait;1000"
100-5 = "3;모모카;17\n#3;m4\n#wait;1000"
100-6 = "3;모모카;17\n#3;em;…\n#wait;2500"
100-7 = "3;모모카;12;흐음…… 생각했던 것 보다는 훨씬 믿음직스러워 보이네.\n#3;m3"
100-8 = "3;모모카;10;뭐, 아무래도 상관없으려나. (와작)"
100-9 = "3;모모카;18;뭐야, 그런 눈으로 쳐다봐도 이 명란 과자는 안 줄 거라고."
100-10 = "3;모모카;19;나는 모모카, 린 선배와 마찬가지로 총학생회에 소속된 간부야.\n#3;em;[반짝]\n#3;greeting"
100-11 = "3;모모카;07;요새는 총학생회장이 갑자기 사라지는 바람에 과자 먹을 시간도 없이 바쁘지만. (와작)"
100-12 = "3;모모카;11;그래서 한가하게 놀고 있을 연방수사동아리— 샬레에 직접 일감을 나누어 주러 왔다 이 말씀."
100-13 = "3;모모카;02;뭐? 샬레는 학교 간의 문제를 해결하느라 정신없이 바쁘다고?\n#3;em;[?]"
100-14 = "3;모모카;10;으음…… 뭐, 어때. 바쁜데 일 하나 더 얹는다고 달라질 것도 없잖아. (와작)"
100-15 = "3;모모카;99;당신도 알고 있겠지만 총학생회장이 사라진 이후로 키보토스 전역에서 멍청이들이 날뛰고 있지."
100-16 = "3;모모카;05;정의의 사도를 자처하며 기물을 부수고 다니는 녀석들부터, 학생회의 기밀 서류를 빼돌리는 간 큰 녀석들까지…….\n#3;em;[빠직]\n#3;stiff"
100-17 = "3;모모카;07;정말 몸이 열 개라도 대응할 시간이 없다니까."
100-18 = "3;모모카;11;뭐, 나는 아무것도 안 하고 있지만. (와작)"
100-19 = "3;모모카;09;여하튼 이대로 문제들을 내버려 두었다가는 또 린 선배에게 한 소리 들을지도 몰라."
100-20 = "3;모모카;26;총학생회의 일은 연대책임이니까— 당신도 이 일에서 자유롭지 않다구. 크크……."
100-21 = "3;모모카;19;그럼 간단한 것부터 시작해볼까? (와작)\n#3;hophop\n#3;em;[반짝]"

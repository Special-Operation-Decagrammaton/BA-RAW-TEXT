[translation]
100-1 = "คำขอพิเศษ ได้เริ่มขึ้นแล้ว"
100-2 = "ห้องยุทธการ องค์การนักเรียน"
100-3 = "สวัสดี คุณคือคุณครูคนใหม่ของชาเล่ต์ที่รุ่นพี่รินพูดถึงสินะ?"
100-7 = "อืมมม... ดูเป็นคนที่น่าเชื่อถือว่าที่คิดไว้เยอะเลย"
100-8 = "แต่ก็นะ... มันไม่สำคัญหรอก (ง่ำๆ)"
100-9 = "อะไรกัน ถ้าจ้องฉันด้วยสายตาแบบนั้น ฉันจะไม่ให้มันฝรั่งทอดรสไข่ปลานะ"
100-10 = "ฉันชื่อโมโมกะ เป็นสมาชิกบริหารองค์การนักเรียนเหมือนกับรุ่นพี่ริน"
100-11 = "ช่วงนี้ประธานองค์การนักเรียนจู่ๆ ก็หายตัวไป ฉันเลยยุ่งจนไม่มีเวลากินขนมเลย (ง่ำๆ)"
100-12 = "ดังนั้นทางฝ่ายสอบสวนที่เคยอยู่ว่างๆ... ตอนนี้ฉันเลยมารับหน้าที่เป็นคนจัดการส่งงานของทางชาเล่ต์"
100-13 = "เอ๋? ทางชาเล่ต์กำลังยุ่งจนหัวปั่น เพราะมัวแต่ต้องตามแก้ปัญหาระหว่างโรงเรียนงั้นเหรอ?"
100-14 = "อืม... ทำยังไงดีล่ะ แต่ไหนๆ ก็ยุ่งอยู่แล้ว เพิ่มงานเข้าไปอีกสักงานก็คงไม่ต่างกันหรอก (ง่ำๆ)"
100-15 = "คุณเองก็คงทราบดีอยู่แล้ว หลังจากประธานองค์การนักเรียนหายตัวไป#nพวกนักเรียนตัวแสบทั้งหลายก็ออกมาป่วนคิโวทอสกันยกใหญ่เลย"
100-16 = "ตั้งแต่กลุ่มที่อ้างตัวเพื่อความยุติธรรม พวกที่ชอบทำลายข้าวของ#nไปจนถึงพวกที่ชอบขโมยเอกสารลับจากทางสภานักเรียน...."
100-17 = "ต่อให้แยกร่างเป็นสิบร่างได้ก็ไม่มีเวลาจัดการได้หมดหรอกนะ..."
100-18 = "ถึงฉันจะว่างอยู่ก็เถอะ... (ง่ำๆ)"
100-19 = "จะยังไงก็เถอะ ถ้าขืนปล่อยให้พวกเขาสร้างปัญหาต่อไปแบบนี้ ฉันคงจะถูกรุ่นพี่รินดุเอาแน่ๆ"
100-20 = "งานของทางองค์การนักเรียนเป็นงานที่ต้องทำงานร่วมกัน...#nพอมาทำงานนี้ก็จะตัดสินใจอะไรคนเดียวไม่ได้หรอกนะ คิคิ..."
100-21 = "เริ่มจากเรื่องง่ายๆ ก่อนดีไหม? (ง่ำๆ)"

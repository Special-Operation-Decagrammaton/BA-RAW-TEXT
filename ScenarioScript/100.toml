[translation]
100-1 = "Let the Commissions Begin"
100-2 = "General Student Council Situation Room"
100-3 = "Hi. You must be that Sensei in charge of Schale that Rin mentioned."
100-7 = "Hmm... You're a lot more reliable-looking than I expected."
100-8 = "Not that it matters either way. *crunch*"
100-9 = "And stop eyeing my pollock roe crackers. You're not getting any no matter how much you look at me like that."
100-10 = "I'm Momoka: General Student Council officer just like Rin."
100-11 = "I've been so busy since our president suddenly disappeared. I hardly have time to enjoy my snacks. *crunch*"
100-12 = "So I came to unload work onto Schale—the Federal Investigation Club. You should have plenty of free time on your hands, anyway."
100-13 = "What was that? Schale is super busy solving problems at the schools?"
100-14 = "Hmm. Well, one more job shouldn't make that much of a difference. *crunch*"
100-15 = "Idiots have been running amok all over Kivotos ever since the General Student Council president disappeared. Hard not to notice, though, isn't it?"
100-16 = "Some of these idiots are going around calling themselves apostles of justice and breaking things. Others are stealing confidential documents from student councils..."
100-17 = "You couldn't stop all of them even if there were ten of you."
100-18 = "Well, not that I'm doing anything to help. *crunch*"
100-19 = "Anyway, Rin is going to give us an earful if we just ignore them."
100-20 = "The General Student Council's problems are everyone's problems. You're not worming your way out of this. Heh heh..."
100-21 = "So, let's start with something simple, shall we? *crunch*"

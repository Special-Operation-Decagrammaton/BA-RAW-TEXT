[translation]
10045080-1 = "Episode 8;Mutual Pride"
10045080-4 = "Nom, nom..."
10045080-5 = "Being on the beach enhances the taste of the chicken skewers somehow."
10045080-6 = "Fufu! What an invigorating match!"
10045080-7 = "Izuna wanted to play beach volleyball too..."
10045080-8 = "Why don't we all play together next time?"
10045080-9 = "Mhm. I want to too."
10045080-10 = "Really, really? Yay! Izuna will look forward to it!"
10045080-12 = "Um... Could I play too?"
10045080-13 = "Yes. Shall we be on the same team next time?"
10045080-14 = "I-It would be an honor, Miss Nagusa!"
10045080-16 = "Where did Kikyou and Renge go?"
10045080-17 = "I have not seen them since they won their match."
10045080-18 = "Those two..."
10045080-19 = "...are conducting a special swimming training."
10045080-21 = "After a fierce match, the team to take the match point is...!!"
10045080-22 = "Renge and Kikyou!"
10045080-27 = "We won... We won!"
10045080-28 = "That's right! So now it's time for you to keep your promise."
10045080-29 = "My promise? Ah..."
10045080-30 = "Time for swimming lessons!"
10045080-31 = "At this very moment...?"
10045080-36 = "There's no time to waste!"
10045080-41 = "Kikyou will become an adept swimmer in no time!"
10045080-42 = "Yes, I'm positive she will."
10045080-43 = "It's Kikyou, after all."
10045080-45 = "*gasp*"
10045080-46 = "Move your arms and legs more! And relax! You're going to drown if you don't!"
10045080-47 = "How, exactly, do you expect me to relax and move my limbs simultaneously? Does that sound logical to you?!"
10045080-48 = "Haven't you heard of the irresistible force paradox? You can't be an immovable object! Go with the flow!"
10045080-49 = "Once you do, you'll quickly get used to it."
10045080-50 = "From there, we can learn some cooler forms!"
10045080-51 = "Hm? \"Cooler forms\"?"
10045080-52 = "Renge. What do you call this stroke?"
10045080-53 = "Huh? Ah, this is..."
10045080-55 = "...the doggy paddle!"
10045080-56 = "Ah. I see."
10045080-57 = "...Huh?"
10045080-58 = "The DOGGY paddle?"
10045080-59 = "I, the feared operations officer of the Hyakkaryouran, am learning the DOGGY PADDLE?!"
10045080-60 = "It's nothing to be embarrassed about! We all have to start somewhere, don't we?"
10045080-61 = "The doggy paddle... I am learning how to paddle...like a dog..."
10045080-66 = "Ah, ah! Can everyone hear me? I hope everyone has been having a blast here at the Hyakkiyako Water Festival!"
10045080-67 = "Don't hang up your swimsuits yet! We're announcing the final game and match-ups now!"
10045080-68 = "Players, report to the stadium immediately!"
10045080-69 = "The finals... I pray that there will be no swimming involved."
10045080-70 = "If there is...will I be forced to doggy paddle in front of everyone?"
10045080-71 = "Let's go. There is nothing more shameful than being late."
10045080-73 = "A little later..."
10045080-76 = "It looks like everyone's here! Are you all excited to see who'll be facing off against who?!"
10045080-77 = "But first, what game are we playing?"
10045080-78 = "[ns] \"The final game of the Hyakkiyako Water Festival will be...\""
10045080-81 = "[log]Inflatable Knock-Out![/log]"
10045080-84 = "That's right! It's all about the last woman standing in this game! With nothing but a buoy under your feet, you'll have to push your opponent off before they do!"
10045080-85 = "No weapons here, so it's a true test of strength and stamina!"
10045080-86 = "There's no strategy, no sneaky tricks, just two opponents giving it their all!"
10045080-87 = "Ah. There's no avoiding the doggy paddle if you fall."
10045080-88 = "(I'll be weaponless on unsure footing...)"
10045080-89 = "(While I'm relieved it will not be a water sport, I still find myself at a heavy disadvantage.)"
10045080-90 = "We'll be deciding the match-ups based on luck!"
10045080-91 = "Players, please reach into the box and take a ball."
10045080-92 = "Each ball has a \"1\" or a \"2\" written on it! Whoever you match with will be your opponent."
10045080-94 = "[ns] \"Since Izuna was the first to finish, you'll pick first!\""
10045080-95 = "Yes, my lord!"
10045080-96 = "What number will Izuna get...?"
10045080-100 = "Ah! Number 2!"
10045080-102 = "[ns] \"Next is Renge!\""
10045080-103 = "Hm... This one!"
10045080-107 = "Huh? I got 1."
10045080-109 = "[ns] \"Next is Chise.\""
10045080-110 = "What will it be?"
10045080-114 = "Ah. 2."
10045080-116 = "[ns] \"Then naturally, Kikyou is...\""
10045080-117 = "...1."
10045080-118 = "Yes! With that, the match-ups have been decided!"
10045080-119 = "The first match will be Kikyou vs. Renge!"
10045080-120 = "And the second will be Izuna vs. Chise!"
10045080-121 = "The winners of each match will face each other in the final round!"
10045080-122 = "How unexpected."
10045080-123 = "I'd hoped to see a blazing battle of glory in the finals!"
10045080-124 = "Yes, that's disappointing."
10045080-125 = "Who do you predict will win, Nagusa?"
10045080-126 = "...Renge has the natural advantage."
10045080-127 = "And even if Kikyou were to best her here, the finals would be a challenge."
10045080-128 = "Izuna possesses the agility of a ninja."
10045080-129 = "And Chise was the victor of last year's festival."
10045080-130 = "Chise was...? I was completely unaware!"
10045080-131 = "Kikyou knows her limits better than anyone. She's likely already evaluated her current situation."
10045080-132 = "If securing the Hyakkaryouran's victory is the priority, the most efficient strategy would be for Kikyou to forfeit and allow Renge to proceed to the finals without having exhausted herself."
10045080-133 = "Kikyou should lose...on purpose?"
10045080-134 = "After all, Kikyou has never and will never hesitate to sacrifice herself for the sake of those she cares for."
10045080-135 = "Ah... That is true..."
10045080-136 = "In addition, you must consider Renge and Kikyou's long history. Would you truly wish to take up arms against a childhood friend?"
10045080-137 = "I do hope that Kikyou decides to give her all to the challenge ahead of her."
10045080-138 = "However...at this point, only she knows what she is thinking."
10045080-139 = "Kikyou..."
10045080-141 = "Hey, Kikyou. You're not thinking anything weird, are you?"
10045080-142 = "...\"Anything weird\"? I believe that is your field of expertise, not mine."
10045080-143 = "The mentor-disciple slice-of-life novels you've been so engrossed in as of late have likely brought this about."
10045080-144 = "H-How did you...?!"
10045080-145 = "...Don't change the subject on me! You know what I'm talking about! You're not going to half-ass this, are you?"
10045080-146 = "Is that...what you wish?"
10045080-147 = "I hate cutting corners, is all."
10045080-149 = "You may label it that way, but it is simple strategy. It's highly illogical to exert too much energy at this stage of the game, is it not?"
10045080-150 = "At least one member of the Hyakkaryouran is guaranteed to proceed to the finals. That member should preserve all the energy she can."
10045080-151 = "With that established, it is simply a matter of who should advance."
10045080-152 = "Evaluating the probability of my eventual victory, or yours..."
10045080-153 = "Is it not obvious to you?"
10045080-154 = "Kikyou..."
10045080-155 = "I have been trained to evaluate the optimal path to victory for the Hyakkaryouran, and so that is what I've done."
10045080-156 = "...And I'm saying there's no point in winning that way!"
10045080-157 = "I know you well. Well enough to know that would be your response. #n...You'll forge forward regardless, yes? Then, prepare yourself."
10045080-158 = "Hey, wait! This conversation is not over!"
10045080-160 = "I'll hear out whatever you'd like to say afterwards."
10045080-161 = "You've always been one to reach great heights, after all."
10045080-162 = "..."
10045080-164 = "Meanwhile, in a nearby shop..."
10045080-165 = "UGH! I'm mad! I'm so mad!"
10045080-166 = "If it weren't for that stupid raccoon...!"
10045080-167 = "That's right! It was my teammate dragging me down! If I had anyone else... The festival organizers probably rigged the matches!"
10045080-168 = "I'll never forgive them!"
10045080-169 = "You. Would you satisfy my curiosity?"
10045080-170 = "What?! Hell no! Can't see I'm bu—"
10045080-171 = "...Huh?"
10045080-176 = "..."
10045080-177 = "Y-You're the Fox of Calamity! What're you doing HERE of all places?"
10045080-178 = "I was drawn in by the rambunctious atmosphere."
10045080-179 = "I was the one who asked you a question, was I not?"
10045080-180 = "Don't you think it's quite rude to respond to a question with a question?"
10045080-181 = "Eek! O-Okay! I'm sorry!"
10045080-182 = "(Wait. I can use this to my advantage and get revenge on all those pricks!)"
10045080-183 = "...They're holding a competition to crown the strongest champion in Hyakkiyako."
10045080-184 = "But they're totally rigging the whole thing, so I was gonna teach them a lesson."
10045080-185 = "Don't you want to come show them up? Like, how could they leave you, of all people, out of a competition like this?"
10045080-186 = "Hm. I have no interest in such petty things."
10045080-187 = "B-But even Schale's Sensei is in on their stupid rigging!"
10045080-188 = "Doesn't that piss you off at all?"
10045080-189 = "Wait. Did you say...Sensei?"
10045080-190 = "Sensei is here?"
10045080-191 = "Y-Yes! Sensei is the one judging the whole thing!"
10045080-192 = "A competition to be Sensei's champion? My, my. You should have said so from the beginning."
10045080-193 = "Heehee, heeheehee. ♡"
10045080-194 = "Ahhh! I, Wakamo, am coming for you, my love!"
10045080-198 = "Hold up! Wait for me!"
10045080-199 = "...Kekeke. Well, it doesn't matter either way."
10045080-200 = "She's called the Fox of CALAMITY for a reason. This'll throw a wrench in their plans."
10045080-201 = "One way or another, I'm coming out of this on top!"

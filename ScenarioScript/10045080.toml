[translation]
10045080-1 = "ตอนที่ 8;ศักดิ์ศรีของกันและกัน"
10045080-4 = "ง่ำ ง่ำ..."
10045080-5 = "ยากิโทริที่กินไปด้วย ชมวิวชายหาดไปด้วยมันช่างวิเศษจริงๆ"
10045080-6 = "ฮุฮุ เมื่อกี้เป็นการแข่งขันที่สนุกมากเลยเจ้าค่ะ!"
10045080-7 = "อิซุนะก็อยากเล่นวอลเลย์บอลชายหาดบ้างจัง..."
10045080-8 = "ถ้ามีเวลา ไว้เรามาเล่นด้วยกันมั้ยคะ?"
10045080-9 = "อื้อ ดีเลยละ~"
10045080-10 = "โอ้ว จริงเหรอคะ? ต้องสนุกมากๆ แน่ๆ ค่ะ!"
10045080-12 = "เอ่อ... ถ้าฉันขอไปแจมด้วยคนจะได้มั้ยคะ?"
10045080-13 = "ได้สิ ไว้คราวหน้ามาเล่นทีมเดียวกันนะ"
10045080-14 = "ปะ... เป็นเกียรติอย่างยิ่งเลยค่ะ! คุณนางุสะ!"
10045080-16 = "ว่าแต่คนที่ผ่านเข้ารอบจากรอบแก้ตัวหายไปไหนแล้วเจ้าคะ?"
10045080-17 = "พอเกมจบก็หายตัวไปเลย"
10045080-18 = "ตอนนี้ 2 คนนั้น..."
10045080-19 = "กำลังฝึกว่ายน้ำด้วยกันอยู่น่ะ"
10045080-21 = "ทีมที่ได้แมตช์พอยต์จากการต่อสู้ที่สูสีก็คือ...!!"
10045080-22 = "ทีมของคิเคียวกับเรนเกะค่ะ...!"
10045080-27 = "ทำได้แล้ว... พวกเราชนะแล้ว...!"
10045080-28 = "เอาละ งั้นก็ต้องไปทำตามที่เราสัญญากันไว้แล้วละ"
10045080-29 = "สัญญาเหรอ? อ่า..."
10045080-30 = "ก็ใช่น่ะสิ! ฉันจะสอนเธอว่ายน้ำตั้งแต่ตอนนี้ละ!"
10045080-31 = "ตั้งแต่ตอนนี้เลยเหรอ?!"
10045080-36 = "รีบไปกันเถอะ! 1 นาที 1 วินาทีก็มีค่านะ!"
10045080-41 = "ฮุฮุ ข้าว่ารุ่นพี่คิเคียวต้องว่ายน้ำเป็นอย่างเพอร์เฟ็กโตะ~ แน่นอนเจ้าค่ะ!"
10045080-42 = "อื้อ ทำได้อยู่แล้วละ"
10045080-43 = "คิเคียวจะทำได้แน่นอน"
10045080-45 = "ฮะ... เฮือก...!"
10045080-46 = "ตั้งใจเตะขากับเหวี่ยงแขนให้มากกว่านี้อีก! อย่าเกร็งตัว ปล่อยตามสบาย! ไม่งั้นก็จะจมแบบนี้เรื่อยๆ นะ!"
10045080-47 = "อึก... บอกว่าปล่อยตัวตามสบาย แต่ให้เตะขากับเหวี่ยงแขนเนี่ยนะ ตกลงมันสบายยังไง?"
10045080-48 = "กับแรงที่ต้านทานไม่ได้น่ะ เราจะดื้อดึงใช้แรงของเราไปต้านไม่ได้หรอก เพราะงั้นก็ให้ผ่อนคลายไป#nกับสายน้ำแล้วเป็นหนึ่งเดียวกับมัน"
10045080-49 = "แล้วเธอจะรู้เองความรู้สึกนั้นมันเป็นยังไง"
10045080-50 = "ถ้าเริ่มชินกับน้ำแล้ว ฉันจะสอนว่ายท่าที่เท่กว่านี้ให้อีก!"
10045080-51 = "หืม? ท่าที่เท่กว่านี้เหรอ...?"
10045080-52 = "เรนเกะ แล้วนี่ฉันว่ายท่าอะไรอยู่เหรอ?"
10045080-53 = "หืม? ทะ... ท่านี้คือ..."
10045080-55 = "ท่าลูกหมาตกน้ำไง!"
10045080-56 = "อ่า... ก็คงอย่างนั้นสินะ"
10045080-57 = "หืม...?"
10045080-58 = "ท่าลูกหมาตกน้ำ...?!"
10045080-59 = "ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันอย่างฉันกำลังเรียนว่ายน้ำท่าลูกหมาตกน้ำเหรอ...?!"
10045080-60 = "ก็ช่วยไม่ได้นี่นา เธอต้องเริ่มด้วยท่าที่ง่ายที่สุดก่อนแบบนี้ละ"
10045080-61 = "ท่าลูกหมาตกน้ำ... นี่ฉันเป็นลูกหมาตกน้ำงั้นเหรอ..."
10045080-66 = "ฮัลโหลเทส! ทุกคนคะ! กำลังสนุกกับเทศกาลสวนน้ำเฮียกคิยาโคอยู่หรือเปล่าคะ?"
10045080-67 = "ใกล้ถึงเวลาประกาศการแข่งขันสุดท้ายของเราในครั้งนี้แล้วค่ะ!"
10045080-68 = "ขอให้ผู้เข้าแข่งขันทุกคนมารวมตัวที่สนามกีฬาด้วยค่ะ!"
10045080-69 = "หวังว่ารอบชิงชนะเลิศจะไม่ต้องลงน้ำนะ..."
10045080-70 = "แต่ถ้าเป็นกีฬาทางน้ำ... ฉันก็คงต้องว่ายท่าลูกหมาตกน้ำสินะ..."
10045080-71 = "ไปที่สนามก่อนแล้วกัน อย่างน้อยก็ควรไปให้ตรงเวลาละเนอะ"
10045080-73 = "หลังจากนั้นไม่นาน..."
10045080-76 = "ในเมื่อผู้เข้าแข่งขันมากันครบแล้ว! เราจะประกาศประเภทและการจับคู่ในการแข่งขันรอบสุดท้ายของ#nเราเลยค่ะ! "
10045080-77 = "เริ่มจากประเภทของการแข่งขัน!"
10045080-78 = "[ns] \"และการแข่งขันประเภทสุดท้ายของเทศกาลครั้งนี้! ก็คือ...!\""
10045080-81 = "[log]เกมผลักตกน้ำ![/log]"
10045080-84 = "ค่ะ! เกมนี้ผู้เข้าแข่งขันจะได้อยู่บนทุ่นลอยน้ำกลางทะเลและต้องผลักให้ฝ่ายตรงข้ามตกน้ำให้ได้ ใครตกก่อนก็แพ้ไป!"
10045080-85 = "เราไม่อนุญาตให้ใช้อาวุธ ทุกคนต้องสู้กันด้วยพละกำลังเท่านั้น!"
10045080-86 = "เป็นการต่อสู้ที่วัดกันด้วยกำลังเท่านั้น จะใช้อุปกรณ์อื่นช่วยไม่ได้เลยค่ะ!"
10045080-87 = "โอ้... ถ้าตกน้ำ มีหวังได้โชว์ท่าลูกหมาตกน้ำแหงๆ"
10045080-88 = "(ให้สู้กันแบบไม่ใช้อาวุธบนทุ่นที่กระเพื่อมไปตามคลื่นงั้นเหรอ...)"
10045080-89 = "(โชคดีที่ไม่ใช่กีฬาทางน้ำเสียทีเดียว แต่ไม่ว่าคู่ต่อสู้จะเป็นใคร ฉันก็เสียเปรียบอยู่ดี)"
10045080-90 = "เอาละค่ะ จากนี้จะเป็นการจับคู่คู่ต่อสู้ค่ะ"
10045080-91 = "เราจะให้ผู้เข้าแข่งขันหยิบลูกบอลจากกล่องที่อยู่ตรงหน้ามาคนละลูก"
10045080-92 = "ที่ลูกบอลจะมีหมายเลข 1 กับ 2 เขียนกำกับไว้ คนที่ได้หมายเลขเดียวกันคือคู่ต่อสู้กันค่ะ"
10045080-94 = "[ns] \"เริ่มจากอิซุนะที่ผ่านเข้ารอบมาเป็นคนแรก\""
10045080-95 = "รับทราบค่ะ นายท่าน!"
10045080-96 = "อิซุนะจะได้หมายเลขอะไรนะ...?"
10045080-100 = "โอ้ ได้หมายเลข 2 ค่ะ!"
10045080-102 = "[ns] \"ต่อไปก็เรนเกะ!\""
10045080-103 = "อืม~ เอาลูกนี้แล้วกัน!"
10045080-107 = "หืม? ฉันได้หมายเลข 1 แฮะ?"
10045080-109 = "[ns] \"ต่อไปก็ชิเซะ\""
10045080-110 = "จะได้เลขอะไรนะ~"
10045080-114 = "อ่า... ได้เลข 2"
10045080-116 = "[ns] \"งั้นลูกที่เหลือของคิเคียวก็...\""
10045080-117 = "หมายเลข 1"
10045080-118 = "ค่ะ! เราจับคู่ผู้เข้าแข่งขันเรียบร้อยแล้วค่ะ!"
10045080-119 = "รอบรองชนะเลิศ คู่แรก คิเคียว VS เรนเกะ!"
10045080-120 = "รอบรองชนะเลิศ คู่ที่ 2 อิซุนะ VS ชิเซะ!"
10045080-121 = "ผู้ชนะในแต่ละคู่จะได้ไปเจอกันในรอบชิงชนะเลิศค่ะ...!"
10045080-122 = "ได้เจอกันเองเหรอเนี่ย"
10045080-123 = "อยากเห็นรุ่นพี่ทั้งสองคนแข่งกันในรอบชิงชนะเลิศแท้ๆ..."
10045080-124 = "แบบนี้ก็น่าเสียดายอยู่นะ"
10045080-125 = "รุ่นพี่นางุสะ... คิดว่ารุ่นพี่คนไหนจะชนะเหรอเจ้าคะ?"
10045080-126 = "ฉันคิดว่าเรนเกะได้เปรียบกว่า..."
10045080-127 = "และต่อให้คิเคียวผ่านเข้ารอบชิงชนะเลิศ แต่การคว้าชัยชนะได้ก็คงเป็นเรื่องยาก"
10045080-128 = "คุณอิซุนะก็เป็นถึงนินจา..."
10045080-129 = "ส่วนคุณชิเซะ... ก็เป็นผู้ชนะจากครั้งที่แล้ว"
10045080-130 = "ผู้ชนะจากครั้งที่แล้วเหรอเจ้าคะ? ข้าไม่รู้เลยเจ้าค่ะ...!"
10045080-131 = "คิเคียวคงรู้ดีกว่าใครว่าต่อให้ต้องเจอกับคู่แข่งคนไหน ตัวเองก็เสียเปรียบอยู่ดี ถ้างั้นละก็..."
10045080-132 = "ในเชิงกลยุทธ์แล้ว การยอมแพ้เพื่อรักษาพละกำลังของเรนเกะไว้แล้วส่งเรนเกะเข้ารอบชิงชนะเลิศ จะเป็นผลดีกับเฮียกกะเรียวรันมากที่สุด"
10045080-133 = "รุ่นพี่กำลังบอกว่ารุ่นพี่คิเคียวจะตั้งใจเล่นแพ้เหรอเจ้าคะ...?"
10045080-134 = "ถ้าเป็นการทำเพื่อทีมละก็ คิเคียวเป็นเด็กที่เสียสละได้เสมอ"
10045080-135 = "จะว่าไปแล้ว..."
10045080-136 = "แล้วเรนเกะก็เป็นเพื่อนสมัยเด็กของคิเคียวด้วย ปกติแล้วเราคงไม่อยากต่อสู้จริงจังกับเพื่อนสมัยเด็ก#nกันนักหรอก"
10045080-137 = "แน่นอนว่าฉันคิดว่าคิเคียวควรแสดงให้เห็นว่าตัวเองก็ทำเต็มที่"
10045080-138 = "แต่ว่า... ฉันก็ไม่รู้เหมือนกันว่าคิเคียวจะเลือกวิธีไหน"
10045080-139 = "รุ่นพี่คิเคียว..."
10045080-141 = "นี่ คิเคียว เธอคงไม่ได้คิดอะไรแปลกๆ ใช่มั้ย?"
10045080-142 = "คิดอะไรแปลกๆ งั้นเหรอ...? เรื่องแบบนั้นน่ะเธอคิดมากกว่าฉันอีกไม่ใช่หรือไง?"
10045080-143 = "ช่วงนี้เห็นเธออ่านนิยายเกี่ยวกับชีวิตประจำวันของนักบวชอยู่ หรือว่าอ่านแล้วทำให้คิดแบบนี้ขึ้นมา?"
10045080-144 = "ระ... รู้ได้ยังไงว่าฉันอ่านอะไรอยู่...?!"
10045080-145 = "เรื่องนั้นไม่สำคัญหรอก...! อย่ามาเปลี่ยนเรื่องเลยน่า! ฉันอยากรู้ว่าเธอจะสู้เต็มที่หรือเปล่าต่างหาก!"
10045080-146 = "เธออยากสู้กับฉันงั้นเหรอ?"
10045080-147 = "ฉันแค่ไม่อยากเล่นนอกกฎน่ะ"
10045080-149 = "เล่นนอกกฎอะไรกัน? ฟังนะ นี่คือแผนการของเรา ถ้าเป็นรอบชิงชนะเลิศละไม่แน่ แต่เราไม่ควรใช้พละกำลังทั้งหมดมาสู้กันเองในรอบนี้"
10045080-150 = "ถ้ารู้แล้วว่าต่อไปจะได้เข้าชิง ฉันว่าการเก็บพละกำลังไว้ในตอนนี้จะเป็นประโยชน์มากกว่า"
10045080-151 = "คำถามก็คือใครจะเป็นคนเข้ารอบชิง"
10045080-152 = "ระหว่างฉันกับเธอ ใครกันที่มีศักยภาพมากกว่า"
10045080-153 = "ไม่เห็นต้องคิดให้เหนื่อยเลยนี่?"
10045080-154 = "คิเคียว..."
10045080-155 = "ฉันแค่วิเคราะห์ความน่าจะเป็นสูงสุดที่เฮียกกะเรียวรันจะเอาชนะได้น่ะ"
10045080-156 = "แต่ถ้าเราชนะกันแบบนั้นมันก็ไม่มีความหมายหรอก...!"
10045080-157 = "คงเป็นอย่างนั้นละ ฉันคิดไว้แล้วว่าเธอต้องคิดแบบนี้ อยากสู้กันอย่างจริงๆ จังๆ ใช่มั้ยล่ะ...? เอาละ งั้นก็เตรียมตัวเลย"
10045080-158 = "เดี๋ยวก่อน ฉันยังพูดไม่จบ..."
10045080-160 = "ฉันขอเก็บไว้ฟังทีหลังแล้วกัน"
10045080-161 = "เธอน่ะเป็นเด็กที่ขึ้นไปอยู่บนจุดที่ยิ่งใหญ่ได้แน่นอน"
10045080-162 = "......"
10045080-164 = "ในขณะเดียวกัน ณ ร้านค้าใกล้ๆ..."
10045080-165 = "ฮึ่ยยย น่าโมโหชะมัด!"
10045080-166 = "เพราะยัยแรคคูนนั่นแท้ๆ เลย!"
10045080-167 = "ถ้าได้เพื่อนร่วมทีมเก่งๆ ก็คงไม่เกิดเรื่องแบบนี้หรอก... #nพวกทีมงานต้องจงใจจับคู่ให้ฉันอยู่กับยัยแรคคูนแน่เลย!"
10045080-168 = "ยกโทษให้ไม่ได้..."
10045080-169 = "นี่คุณคะ ฉันอยากถามอะไรสักอย่างน่ะค่ะ"
10045080-170 = "ถามอะไร? คนกำลังยุ่งอยู่ไม่เห็นหรือไง! ไปถามคนอื่นนู่น..."
10045080-171 = "เอ๋...?"
10045080-176 = "......"
10045080-177 = "เธอ... เธอคือ...! จิ้งจอกแห่งความพินาศนี่นา? ทำไมถึงมาอยู่ที่นี่ได้ล่ะ?!"
10045080-178 = "ชายหาดนี้เสียงดังจังเลยนะคะ"
10045080-179 = "แต่จะว่าไป... คนที่บอกว่าอยากถามก่อนคือฉันนะคะ..."
10045080-180 = "อย่าตอบคำถามของฉันด้วยคำถามสิคะ"
10045080-181 = "เฮือก! กะ... ก็ได้! ถามมาเลย แล้วฉันจะตอบให้!"
10045080-182 = "(ถะ... ถ้าใช้ประโยชน์จากยัยนี่ให้ดีละก็... ฉันก็น่าจะจัดการพวกที่ทำให้ฉันตกรอบได้!)"
10045080-183 = "ที่ชายหาดตรงนั้นน่ะ... กำลังจัดการแข่งขันเพื่อหาคนที่เก่งที่สุดในเฮียกคิยาโคอยู่"
10045080-184 = "แต่ว่าพวกทีมงานก็เตี๊ยมกันจนมีแต่พวกเดียวกันที่เข้ารอบ ฉันก็เลยอยากแก้แค้นสักหน่อย เธอสนใจด้วยมั้ยล่ะ?"
10045080-185 = "ว่าไงล่ะ? เธอจะปล่อยให้พวกนั้นเฟ้นหาคนที่เก่งที่สุดในเฮียกคิยาโคโดยไม่มีเธอได้เหรอ?"
10045080-186 = "ฮืม ฟังดูไม่น่าสนใจเท่าไรนะคะ"
10045080-187 = "ตะ... แต่ครูจากชาเล่ต์ก็มาเป็นกรรมการและจัดการแข่งขันตามใจตัวเองอยู่นะ!"
10045080-188 = "เธอไม่โกรธเลยเหรอ?"
10045080-189 = "เดี๋ยวนะคะ คุณครู... จากชาเล่ต์เหรอคะ?"

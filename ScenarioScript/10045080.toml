[translation]
10045080-1 = "第8話;彼此的驕傲"
10045080-4 = "嚼嚼……"
10045080-5 = "看著海邊吃著烤雞肉串，果然別有風味呢。"
10045080-6 = "呵呵，真是場愉快的比賽！"
10045080-7 = "伊樹菜也想打沙灘排球呢……"
10045080-8 = "有時間的話，晚點一起玩吧？"
10045080-9 = "嗯，好主意～"
10045080-10 = "真的可以嗎！？#n感覺一定很好玩！"
10045080-12 = "那個……如果可以的話，也能讓我加入嗎？"
10045080-13 = "當然，我們一起組隊吧。"
10045080-14 = "榮，榮幸之至！名草大人！"
10045080-16 = "話說回來，敗部復活戰的主角們去哪了？"
10045080-17 = "比賽一結束就消失得無影無蹤了呢。"
10045080-18 = "那兩個人現在……"
10045080-19 = "正在進行游泳特訓。"
10045080-21 = "激戰之後，率先拿下賽末點的隊伍是……！！"
10045080-22 = "蓮華＆桔梗隊！"
10045080-27 = "成功了……我們贏了……！"
10045080-28 = "那麼，該去履行約定了吧？"
10045080-29 = "約定？啊……"
10045080-30 = "沒錯！現在馬上開始進行游泳特訓！"
10045080-31 = "現在馬上……！？"
10045080-36 = "快走吧！一分一秒都不能浪費！"
10045080-41 = "呵呵，桔梗前輩一定能[ruby=Perfect]完～美[/ruby]地學會游泳！"
10045080-42 = "嗯。"
10045080-43 = "桔梗他一定沒問題的。"
10045080-45 = "噗，噗哈……！"
10045080-46 = "再用力擺動手腳！#n身體要放鬆！不然會一直往下沉的！"
10045080-47 = "唔……既要放鬆又要拚命擺動，怎麼可能做得到啊？"
10045080-48 = "面對無法抗拒的力量不能硬碰硬，而是要放鬆地享受它。"
10045080-49 = "你很快就能明白那種感覺的。"
10045080-50 = "等你習慣之後，我再教你更帥氣的游泳姿勢！"
10045080-51 = "嗯？更帥氣的……？"
10045080-52 = "蓮華，這個游泳姿勢有名字嗎？"
10045080-53 = "嗯？啊，這個姿勢叫做……"
10045080-55 = "狗爬式！"
10045080-56 = "啊，這樣啊。"
10045080-57 = "……嗯？"
10045080-58 = "狗爬式……！？"
10045080-59 = "身為百花繚亂作戰參謀的我……居然在學狗爬式！？"
10045080-60 = "就算覺得丟臉也沒辦法，畢竟總是得從最簡單的開始學起嘛。"
10045080-61 = "狗爬式……我居然在學狗爬式……"
10045080-66 = "啊，啊！各位！都有好好享受百夜水上祭嗎？"
10045080-67 = "接下來將公布本次大會的最後一個項目與對戰名單！"
10045080-68 = "請選手們立刻到比賽場集合！"
10045080-69 = "決賽如果是不用下水的項目就好了……"
10045080-70 = "否則……就得用狗爬式了嗎……"
10045080-71 = "總之先走吧。遲到是最糟糕的。"
10045080-73 = "不久之後……"
10045080-76 = "選手們都到齊了呢！#n那麼現在將公布最後一個項目與對戰名單！"
10045080-77 = "先從項目開始吧！"
10045080-78 = "[ns]「本次百夜水上祭的最後一個項目是……！」"
10045080-81 = "[log]浮標推落對決！[/log]"
10045080-84 = "沒錯！在海上浮標上互相推落，掉下去的人就輸了！"
10045080-85 = "禁止使用武器，只能靠體力決勝！"
10045080-86 = "是無法取巧的正面對決哦！"
10045080-87 = "哦……要是掉下去就非得用狗爬式了呢。"
10045080-88 = "（在搖晃的浮標上，不用武器戰鬥啊……）"
10045080-89 = "（雖然不需要下水還算值得慶幸，但我無論遇到誰都很不利）"
10045080-90 = "那麼，現在開始決定對戰組合。"
10045080-91 = "請大家從這個箱子裡各抽一顆球。"
10045080-92 = "球上會寫著1或2，抽到相同號碼的人將進行準決賽。"
10045080-94 = "[ns]「那麼先從第一位晉級者伊樹菜開始抽吧。」"
10045080-95 = "遵命，主公！"
10045080-96 = "伊樹菜會抽到幾號呢……？"
10045080-100 = "哦，是2號！"
10045080-102 = "[ns]「接下來是蓮華！」"
10045080-103 = "唔～嗯……就決定是它了！"
10045080-107 = "咦？我是1號？"
10045080-109 = "[ns]「然後是知世。」"
10045080-110 = "會抽到什麼呢～"
10045080-114 = "啊，2號～"
10045080-116 = "[ns]「那麼桔梗自然就是……」"
10045080-117 = "……1號。"
10045080-118 = "好！對戰組合決定了！"
10045080-119 = "第一場準決賽是桔梗選手對蓮華選手！"
10045080-120 = "第二場準決賽是伊樹菜選手對知世選手！"
10045080-121 = "各場的勝者將在決賽一決勝負……！"
10045080-122 = "突然就對上了呢。"
10045080-123 = "本來還想看他們兩位在決賽對決的呢……"
10045080-124 = "確實有點可惜。"
10045080-125 = "名草前輩……覺得誰會贏呢？"
10045080-126 = "……我認為蓮華比較有優勢。"
10045080-127 = "而且就算桔梗晉級決賽，要奪冠也並不容易。"
10045080-128 = "畢竟伊樹菜同學是名忍者……"
10045080-129 = "而知世同學……則是上屆的冠軍。"
10045080-130 = "咦？上屆的冠軍？#n小女子完全不知道……！"
10045080-131 = "自己無論對上誰都處於劣勢，這點桔梗他應該再清楚不過了。#n所以……"
10045080-132 = "桔梗放棄比賽，讓蓮華保留體力進入決賽……或許是對百花繚亂最有利的戰略。"
10045080-133 = "也就是說，桔梗前輩會故意輸掉比賽嗎……？"
10045080-134 = "桔梗是那種願意為了團隊犧牲自己的孩子。"
10045080-135 = "這……"
10045080-136 = "而且蓮華是桔梗的青梅竹馬……也同樣是個變數。#n一般來說，大家都不會想對青梅竹馬認真動手吧。"
10045080-137 = "當然，我個人希望桔梗可以全力以赴。"
10045080-138 = "不過……桔梗他會怎麼選擇，我也無法確定。"
10045080-139 = "桔梗前輩……"
10045080-141 = "喂，桔梗。你該不會在想什麼奇怪的事吧？"
10045080-142 = "……奇怪的事？#n真要說的話，你才更常胡思亂想吧？"
10045080-143 = "最近不是還在看什麼描寫師徒日常的小說……該不會是被那個給影響了吧？"
10045080-144 = "你，你怎麼知道……！？"
10045080-145 = "……不對！別岔開話題！#n我是要問你會不會認真打！"
10045080-146 = "你希望跟我對戰嗎？"
10045080-147 = "我只是討厭取巧而已。"
10045080-149 = "取巧？這是戰術。#n決賽的話倒還好，在這裡全力對打並非上策。"
10045080-150 = "既然已經確保決賽的資格，就該留下更多餘力才對。"
10045080-151 = "接下來只要決定誰去就行了。"
10045080-152 = "我跟你，誰在這個項目更有勝算？"
10045080-153 = "根本不用想吧？"
10045080-154 = "桔梗……"
10045080-155 = "我只是計算出百花繚亂勝率最高的方案而已。"
10045080-156 = "……就算這樣贏了也沒意義吧！"
10045080-157 = "就知道你會這麼說。#n……要打是嗎？那就做好準備吧。"
10045080-158 = "等一下，我話還沒說完……"
10045080-160 = "等比完之後再慢慢說吧。"
10045080-161 = "我相信你一定能走得更遠的。"
10045080-162 = "……"
10045080-164 = "另一方面，在某間攤位內……"
10045080-165 = "可惡，氣死我了！"
10045080-166 = "全都是那隻狸貓害的！"
10045080-167 = "要是隊友再強一點，就不會發生這種事了……#n肯定是主辦方在組隊的時候動了手腳！"
10045080-168 = "不可原諒……"
10045080-169 = "這位同學，我有件事想請教你。"
10045080-170 = "什麼事啦？我現在很忙！#n別過來煩我，快滾到一邊──"
10045080-171 = "……咦？"
10045080-176 = "……"
10045080-177 = "你，你是……災厄之狐！？#n為什麼會出現在這裡！？"
10045080-178 = "海灘那邊似乎有點吵鬧呢。"
10045080-179 = "不過先撇開這點不談……剛才先發問的人應該是我才對。"
10045080-180 = "可以不要用問題來回答問題嗎？"
10045080-181 = "噫噫！知，知道了！我什麼都回答你！"
10045080-182 = "（要，要是能好好利用這傢伙的話……說不定能把那些妨礙我的傢伙全都解決掉！）"
10045080-183 = "……那邊的海灘上，正在舉辦決定百鬼夜行最強學生的比賽。"
10045080-184 = "結果他們卻暗中操縱比賽內容，所以我正在計劃如何搞砸一切。#n怎麼樣，聽完之後有興趣嗎？"
10045080-185 = "你也不想被排除在百鬼夜行最強之外吧？"
10045080-186 = "哼嗯……我對那種事情不感興趣。"
10045080-187 = "可，可是我聽說「夏萊的老師」也是隨意操縱比賽的人之一哦！"
10045080-188 = "你難道不覺得生氣嗎？"
10045080-189 = "且慢。夏萊的……老師？"
10045080-190 = "老師他在那裡嗎？"
10045080-191 = "對，對啊！那個老師還擔任裁判咧！"
10045080-192 = "由老師評選的「最強」大會……？#n這種事怎麼不早說呢。"
10045080-193 = "唔呵，唔呵呵♡"
10045080-194 = "啊啊，閣下。#n若藻我，馬上就去見您……！"
10045080-198 = "喂！等等！"
10045080-199 = "……哼，算了。"
10045080-200 = "反正只要災厄之狐過去，那邊肯定很快就會亂成一團。"
10045080-201 = "我也去大鬧一場吧！最後的贏家非我莫屬！"

10045080-200 = "พอจิ้งจอกแห่งความพินาศไปถึง ที่นั่นก็คงเละไม่เป็นท่าอยู่ดี"
10045080-201 = "งั้นฉันไปร่วมวงสักหน่อยแล้วกัน! สุดท้ายคนที่ชนะก็คือฉันนี่ละ!"

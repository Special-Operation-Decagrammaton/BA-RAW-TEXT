10045080-191 = "กะ... ก็ใช่น่ะสิ! ครูคนนั้นกำลังเป็นกรรมการตัดสินอยู่เลย!"
10045080-192 = "คุณครูกำลังตัดสินหาคนที่ <เก่งที่สุด>...? ทำไมไม่บอกประเด็นนี้ตั้งแต่แรกล่ะคะ?"

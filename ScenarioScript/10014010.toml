10014010-11 = "[s3] \"...?\"\n[s4] \"(Does she have a history with the Justice Task Force?)\""
10014010-12 = "Never mind that... So, it's kind of a weird situation."
10014010-13 = "Never mind that... So, it's kind of a weird situation."
10014010-14 = "To start, I don't think they even know they're being a stalker."

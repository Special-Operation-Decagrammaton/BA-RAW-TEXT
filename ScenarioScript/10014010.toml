[translation]
10014010-1 = "Episode 1; The Stalker"
10014010-2 = "[ns1] \"Who is stalking you?!\" \n[ns2] \"This is a serious matter, Kazusa!\""
10014010-3 = "Uh, hold on. It's not exactly what you think... Let me explain."
10014010-4 = "Uh, hold on. It's not exactly what you think... Let me explain."

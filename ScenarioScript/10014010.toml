10014010-16 = "3;카즈사;03;하하……. 갑자기 정론이라 반박하기 어렵네.\n#3;em;[땀]\n#3;stiff"
10014010-17 = "3;카즈사;99;아무튼 뭐……. 이래저래 이유가 있어서, 딱히 녀석을 벌하고 싶지는 않다는 거지."
10014010-18 = "3;카즈사;02;그냥……. 방법은 잘 모르겠지만 아무튼 그만두게 만들고 싶을 뿐. 그래서 선생님께 부탁하는 거야."
10014010-19 = "3;카즈사;01;으음. 말하고 나니 역시 좀 부담스러운 일이려나. 괜히 선생님을 난처하게 만드는 거 아닌가 싶은데.\n#3;em;[속상함]"
10014010-20 = "[s5] \"카즈사가 난처한 거보단 낫지.\"\n[s6] \"신경 쓰지 마. 원래 이런 게 내 일이야.\""
10014010-21 = "3;카즈사;04;정말 아무렇지도 않게 그런 말을 하는구나, 선생님은.\n#3;em;[땀]"

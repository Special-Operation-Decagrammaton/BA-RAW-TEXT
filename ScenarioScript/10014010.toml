[translation]
10014010-1 = "第1話;向我衝過來的傢伙"
10014010-2 = "[ns1] 「跟蹤狂……！？」\n[ns2] 「那還真不得了……沒事吧？」"
10014010-3 = "啊，話先說在前頭。#n不是老師現在想的那種唷。"
10014010-4 = "啊，話先說在前頭。#n不是老師現在想的那種唷。"
10014010-5 = "……不如說，如果是那麼單純的傢伙還比較好。#n只要聯絡實現正義部就好了。"
10014010-9 = "唔嗯……不，當我沒說吧。"
10014010-10 = "果然，如果牽扯到實現正義部的話有點不妙呢……"
10014010-11 = "[ns3] 「……？」\n[ns4] （實現正義部會不妙……？）"
10014010-12 = "那個……該怎麼說呢……跟普通的有點不一樣嗎……"
10014010-13 = "那個……該怎麼說呢……跟普通的有點不一樣嗎……"
10014010-14 = "首先，他本人似乎完全沒有自己是跟蹤狂的自覺。"
10014010-15 = "……嗯？你說跟蹤狂本來就是這樣？"
10014010-16 = "哈哈……好像也對。"
10014010-17 = "總之……有些特殊的原因。#n我並不是想要讓對方受到懲罰。"
10014010-18 = "只是決定不了要採取什麼方法……#n所以才想要借助老師的力量。"
10014010-19 = "……抱歉。#n反而讓老師傷腦筋了呢，竟然是這種不清不楚的請求。"
10014010-20 = "[s5] 「能幫上千紗我很樂意唷。」\n[s6] 「別擔心，煩惱這種事也是我的工作唷。」"
10014010-21 = "這麼輕易就說這種話……明明只會讓老師更忙而已。"
10014010-22 = "這麼輕易就說這種話……明明只會讓老師更忙而已。"
10014010-23 = "不過真是幫大忙了。"
10014010-24 = "謝謝你。"
10014010-25 = "……嗯？"
10014010-26 = "啊啊……你問那個跟蹤狂到底是誰？"
10014010-27 = "……抱歉。#n我又忘記說明了。"
10014010-28 = "雖然因為跟個人隱私有關所以不太想說的……嘛，也沒辦法。"
10014010-29 = "……況且就算放任不管，老師遲早也會知道這件事的。"
10014010-30 = "那傢伙是……"
10014010-31 = "宇沢……"
10014010-32 = "終於找到你了！不會讓你逃走的唷，杏山千紗！！！"
10014010-33 = "老老實實接受我的挑戰書吧！#n不要以為能逃過與我「宇沢澪紗」的決鬥！"
10014010-37 = "[ns7] 「……『挑戰書』？」\n[ns8] 「『決鬥』？」"
10014010-39 = "……唉。"
10014010-40 = "……唉。"
10014010-41 = "……沒錯，就是像這樣……"
10014010-46 = "先手必勝──！！！"
10014010-59 = "……向我衝過來的傢伙。"

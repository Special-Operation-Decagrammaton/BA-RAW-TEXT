[translation]
10014010-1 = "ตอนที่ 1;คนที่บุกเข้ามา"
10014010-2 = "[ns1] \"โดนสะกดรอยตามเหรอ...!\n[ns2] \"...เรื่องใหญ่จริงด้วย\""
10014010-3 = "อ่า ขอบอกไว้ก่อนนะว่าไม่ใช่การแอบสะกดรอยตามแบบที่คุณครูคิดหรอก มันค่อนข้างจะซับซ้อนกว่า#nนั้นน่ะ"
10014010-4 = "อ่า ขอบอกไว้ก่อนนะว่าไม่ใช่การแอบสะกดรอยตามแบบที่คุณครูคิดหรอก มันค่อนข้างจะซับซ้อนกว่า#nนั้นน่ะ"
10014010-5 = "...ให้เป็นปัญหาแบบนั้นยังจะดีซะกว่า แค่ไปรายงานเรื่องกับทางชมรมทวงความยุติธรรมก็สิ้นเรื่องแล้ว"
10014010-9 = "อืม... ไม่สิ ขอถอนคำพูด..."
10014010-10 = "ให้ไปติดต่อกับชมรมทวงความยุติธรรมก็คงจะไม่ค่อยโอเคเท่าไร..."
10014010-11 = "[s3] \"...?\"\n[s4] (ชมรมทวงความยุติธรรมไม่ค่อยโอเคงั้นเหรอ...?)"
10014010-12 = "จะยังไงก็เถอะ เอาเป็นว่า... จะว่ายังไงดี... สถานการณ์ตอนนี้มัน... แปลกๆ แล้วก็พูดยาก..."
10014010-13 = "จะยังไงก็เถอะ เอาเป็นว่า... จะว่ายังไงดี... สถานการณ์ตอนนี้มัน... แปลกๆ แล้วก็พูดยาก..."
10014010-14 = "คือว่า... ดูเหมือนฝั่งนั้นก็ไม่ได้คิดว่าตัวเองกำลังสะกดรอยตามอยู่น่ะ"
10014010-15 = "...หืม? การสะกดรอยตามก็เป็นแบบนั้นอยู่แล้วงั้นเหรอ?"
10014010-16 = "อะไรกัน... จู่ๆ ก็เข้าทฤษฎีแบบนี้ ไม่รู้จะตอบกลับยังไงเลยแฮะ"
10014010-17 = "เอาเป็นว่า... มันก็มีเหตุผลหลายอย่างละนะ ฉันเองก็ไม่ได้อยากจะลงโทษคนคนนั้นหรอก"
10014010-18 = "ก็แค่... ไม่รู้จะทำยังไง ฉันแค่อยากให้คนคนนั้นเลิกสะกดรอยตามฉันสักที ก็เลยมาขอร้องให้คุณครู#nช่วยน่ะ"
10014010-19 = "อืม... พอเล่าออกมาแบบนี้เลยฟังดูเป็นเรื่องใหญ่จริงด้วย ฉันมาทำให้คุณครูต้องลำบากใจรึเปล่า"
10014010-20 = "[s5] \"ก็ดีกว่าปล่อยให้คาซึสะต้องลำบากใจละนะ\"\n[s6] \"ไม่ต้องกังวลนะ เรื่องแบบนี้เป็นหน้าที่ครูอยู่แล้ว\""
10014010-21 = "คุณครูน่ะ... พูดอะไรแบบนี้ออกมาได้ง่ายๆ เลยสินะ"
10014010-22 = "คุณครูน่ะ... พูดอะไรแบบนี้ออกมาได้ง่ายๆ เลยสินะ"
10014010-23 = "แต่ยังไง... ฉันก็ต้องขอบคุณ"
10014010-24 = "ขอบคุณมากนะคะ"
10014010-25 = "หืม...?"
10014010-26 = "แล้วคนที่แอบสะกดรอยตามเป็นใครอย่างนั้นน่ะเหรอ?"
10014010-27 = "อ่า จริงด้วย โทษที ลืมอธิบายอีกแล้วสินะ"
10014010-28 = "ถึงจะไม่อยากเปิดเผยข้อมูลของคนอื่นก็เถอะ... แต่ฉันคงไม่ได้มีตัวเลือกเยอะขนาดนั้น"
10014010-29 = "อีกอย่าง... ถ้าปล่อยเอาไว้เฉยๆ สุดท้ายคนคนนั้นก็จะโผล่มาให้เห็นอยู่ดี"
10014010-30 = "ชื่อของคนคนนั้นก็คือ..."
10014010-31 = "...อุซาวะ..."
10014010-32 = "เจอตัวจนได้ค่ะ! หนีไม่พ้นแล้วนะคะ เคียวยามะ คาซึสะ!!!"
10014010-33 = "หลบหนีการท้าดวลจาก <อุซาวะ เรอิสะ> ผู้นี้ไม่ได้หรอกค่ะ!! ยอมรับหนังสือคำท้าไปแต่โดยดีเถอะค่ะ!"
10014010-37 = "[ns7] \"...<หนังสือคำท้า>?\"\n[ns8] \"<การท้าดวล> งั้นเหรอ?\""
10014010-39 = "เฮ้อ..."
10014010-40 = "เฮ้อ..."
10014010-41 = "ได้... จะเอาอย่างนี้ใช่มั้ย..."
10014010-46 = "บุกจู่โจมสำเร็จ!!"
10014010-59 = "เธอนี่หัวรั้นเป็นบ้าเลย..."

10014010-12 = "3;카즈사;02;아무튼 이건 그러니까……. 뭐랄까……. 좀 더 기묘한……. 조금 복잡한 상황이라…….\n#3;hophop\n#3;em;[///]"
10014010-13 = "3;카즈사;02;아무튼 이건 그러니까……. 뭐랄까……. 좀 더 기묘한……. 조금 복잡한 상황이라…….\n#3;hophop\n#3;em;[///]"
10014010-14 = "3;카즈사;99;우선……. 본인 딴에는 전혀 스토킹이라는 자각이 없는 모양이야."

[translation]
80000103-1 = "เพราะแบบนั้น มันก็เลย..."
80000103-2 = "(คุณครูมาที่ทรีนิตี้หลังได้รับข้อความจากนางิสะ)"
80000103-3 = "(สถานที่นัดพบวันนี้ต่างจากวันอื่นๆ นั่นก็คือประตูใหญ่ของทรีนิตี้)"
80000103-4 = "มาแล้วเหรอคะคุณครู... กำลังรออยู่เลยค่ะ"
80000103-5 = "ฮุฮุ สีหน้าดูประหลาดใจมากเลยนะคะ ก็คงจะเป็นอย่างนั้นแหละค่ะ"
80000103-6 = "เพราะปกติฉันไม่มีทางขอให้คุณครูออกมาเจอในสถานที่แบบนี้ และในเวลาแบบนี้แน่นอนค่ะ"
80000103-7 = "แต่ว่าฉันมีเหตุผลอยู่ค่ะ คุณครูคงจะอยากรู้แล้ว เพราะงั้นฉันควรอธิบายทันที..."
80000103-8 = "ก่อนอื่น ถ้าไม่รังเกียจ ช่วยรับสิ่งนี้ไว้ได้รึเปล่าคะ?"
80000103-13 = "[ns1] \"นี่มัน... ช็อกโกแลต?\"\n[ns2] \"คิดไม่ถึงเลยว่าจะได้ช็อกโกแลตด้วย\""
80000103-16 = "เชิญคุณครูคิดได้ตามสะดวกเลยค่ะ เพราะนี่เป็นการตอบแทนที่คุณครูคอยช่วยเหลือฉันมาตลอดค่ะ"
80000103-17 = "คุณครูอาจคิดว่าสิ่งที่ฉันมอบให้เป็นแค่ของธรรมดาๆ ก็ได้..."
80000103-18 = "แต่ทางฉันเองก็มีเหตุผลของฉันอยู่เหมือนกัน หวังว่าคุณครูจะเข้าใจนะคะ"
80000103-19 = "นอกจากนี้ เหตุผลที่รบกวนให้คุณครูมาถึงที่นี่... ก็เหมือนกันค่ะ"
80000103-20 = "ฉันกำลังพูดเรื่องอะไรอยู่งั้นเหรอคะ...?"
80000103-21 = "ตอนนี้ฉันกำลังอธิบายเหตุผลอยู่ค่ะ"
80000103-22 = "ที่จริงมันก็ไม่ใช่เหตุผลที่ยิ่งใหญ่อะไรหรอกค่ะ เหตุผลที่ขอให้คุณครูมาในที่ที่ไม่มีคนแบบนี้ แล้วก็มอบช็อกโกแลตที่พบเห็นได้ทั่วๆ ไปให้"
80000103-23 = "อย่างที่เห็นค่ะ เป็นเพราะฉันไม่อยากให้คนอื่นๆ รู้ว่าฉันนำของอย่างช็อกโกแลตมามอบให้คุณครูค่ะ"
80000103-24 = "[s3] \"ไม่อยากให้รู้...?\"\n[s4] \"อยากให้เก็บเป็นความลับเหรอ?\""
80000103-27 = "อันที่จริงก็ไม่ถึงกับเป็นความลับหรอกค่ะ ถึงจะมีข่าวรั่วไหลไปนิดหน่อยว่า 'เธอให้ช็อกโกแลตไปแล้ว' ก็ไม่เป็นไรหรอกค่ะ"
80000103-28 = "แต่อย่างที่ทราบดีว่าสถานที่ที่พวกฉันอยู่... เป็นที่ที่บีบบังคับให้มีการ 'ตีความ' ต่างๆ นานากันไปค่ะ"
80000103-29 = "ในฐานะของสมาชิกของทรีนิตี้ ฉันต้องการรักษาความสัมพันธ์ระหว่างฉันกับคุณครูเอาไว้"
80000103-30 = "แต่ในฐานะสภาน้ำชา การรักษาความสัมพันธ์สนิทสนมกับคุณครู จะถือเป็นการแสดงอำนาจ หรือเป็นการควบคุมโรงเรียนอื่นๆ ได้"
80000103-31 = "เรื่องพวกนั้นเป็นเรื่องพื้นฐานของการเมืองค่ะ เช่น การพยายามสร้างความประทับใจอีกฝ่าย หรือการสานสัมพันธ์ส่วนตัว และในรูปแบบอื่นๆ อีกมากมายค่ะ"
80000103-32 = "สิ่งที่จะเกิดขึ้น... อันที่จริงมันก็อาจไม่ใช่เรื่องสลักสำคัญอะไรเลยค่ะ ฉันรู้จุดยืนของตัวเองดี และการจัดการ หรือใช้ประโยชน์เรื่องพวกนั้นในบางครั้งก็นับเป็นงานอย่างหนึ่งของฉันค่ะ"
80000103-33 = "แต่ว่า.... นั่นสินะคะ"
80000103-34 = "ถึงนั่นจะเป็นเรื่องจริง แต่ฉันก็ไม่อยากทำตัวเป็นข่าวเองหรอกค่ะ"
80000103-35 = "เพราะงั้นถึงได้ขอให้คุณครูมาในสถานที่และในช่วงเวลาแบบนี้ค่ะ"
80000103-36 = "ถ้าเป็นเวลานี้ละก็ ในสภาน้ำชาจะไม่มีใครออกมาตามหาฉันแน่นอนค่ะ"
80000103-37 = "ตอนนี้ก็เหลือเวลาอีกไม่กี่นาทีแล้วค่ะ"
80000103-38 = "ฮุฮุ..."
80000103-39 = "อย่างที่ฉันบอกไป ช็อกโกแลตนี่เป็นเพียงของตอบแทนเท่านั้นค่ะ"
80000103-40 = "ดังนั้นถึงความจริงเรื่องที่ฉันมอบอะไรบางอย่างให้คุณครูหลุดออกไป ก็ไม่อาจสร้างความเสียหาย หรือเสริมอำนาจอะไรให้กับตำแหน่งของฉันหรอกค่ะ"
80000103-41 = "คุณครูจะลืมเรื่องนี้ไปเลยหลังรับของไปแล้วก็ได้ หรือจะไม่บอกใครก็ได้ค่ะ"
80000103-42 = "คุณครู..."
80000103-43 = "ที่ผ่านมา และตอนนี้... ฉันต้องขอขอบคุณคุณครูจริงๆ ค่ะ"
80000103-47 = "ถ้างั้นฉันขอตัวกลับก่อนนะคะ ต้องขอโทษด้วยที่พอมอบของขวัญให้แล้วต้องกลับไปทันทีแบบนี้ แต่ฉันมีเวลาเพียงเท่านี้จริงๆ ค่ะ"
80000103-48 = "งั้นไว้พบกันใหม่นะคะ..."
80000103-49 = "[s] \"......\""
80000103-51 = "[ns] \"นางิสะ...\""
80000103-52 = "...? คะ?"
80000103-53 = "[s5] \"เอาเป็นว่าวันนี้ครูมาเจอ 'นางิสะ' ก็แล้วกัน!\"\n[s6] \"วันนี้ไม่ได้มีเรื่องอะไรเกี่ยวกับสภาน้ำชาหรือทรีนิตี้เลยนะ\""
80000103-56 = "ฮุฮุ..."
80000103-57 = "เป็นไปตามที่คาดการณ์เอาไว้เลยนะคะ"
80000103-58 = "ค่ะ ขอบคุณค่ะคุณครู"
80000103-59 = "แต่ว่า... สำหรับตอนนี้..."
80000103-60 = "ฉันกำลังพยายามที่จะไม่ดึงคุณครูให้มายุ่งเกี่ยวกับการเมืองมากเกินไปอยู่นะคะ"
80000103-62 = "ฉันอุตส่าห์คาดหวังให้คุณครูพูดแบบนั้น แต่พอคุณครูทำให้รู้สึกว่ามันเกี่ยวข้องกับการเมืองแบบนี้ ฉันรู้สึกไม่สบอารมณ์นิดหน่อยเลยนะคะ"

[translation]
80000103-1 = "#title;그렇기 때문에 오히려"
80000103-2 = "#na;(나기사의 연락을 받고 트리니티로 향했다.)"
80000103-3 = "#na;(불러낸 곳은 어째서인지, 평소와 다르게 트리니티의 교문 앞이었다.)"
80000103-4 = "3;나기사 스탠딩;01;……오셨군요, 선생님. 기다리고 있었답니다.\n#3;a\n#3;em;[반응]"
80000103-5 = "3;나기사 스탠딩;03;후후. 의외라는 표정이시네요. 하긴 그러시겠지요."
80000103-6 = "3;나기사 스탠딩;02;평상시라면 이런 시간에, 이런 장소에서 선생님을 뵙자 할 리 없을 테니까요."
80000103-7 = "3;나기사 스탠딩;99;물론 여기에는 이유가 있습니다. 궁금해하실 테니 바로 설명을 드리는 게 좋겠지만…….\n#3;em;…"
80000103-8 = "3;나기사 스탠딩;01;그보다 우선, 괜찮으시다면 이것부터 받아 주시겠어요?\n#3;greeting"
80000103-9 = "#st;[0,0];instant;1;"
80000103-10 = "#clearST"
80000103-11 = "3;나기사 스탠딩;01\n#3;m5\n#wait;1000"
80000103-12 = "#wait;2500"
80000103-13 = "[ns1] \"이건…… 초콜릿?\"\n[ns2] \"이걸 받을 줄은 몰랐는데.\""
80000103-14 = "#wait;10"
80000103-15 = "#wait;10"
80000103-16 = "3;나기사 스탠딩;01;어떻게 생각하셔도 좋습니다. 그간의 일들, 많은 일들에 대한 감사의 답례를 포함하는 것이니까요."
80000103-17 = "3;나기사 스탠딩;99;어쩌면 선생님께서는, 제가 드리는 것 치고는 다소 평범하고 수수하다고 생각하실 수도 있겠지만…….\n#3;em;…\n#3;m3"
80000103-18 = "3;나기사 스탠딩;03;그 또한 나름대로 이유가 있는 것이니, 부디 너그럽게 양해해 주시기 바랍니다."
80000103-19 = "3;나기사 스탠딩;01;게다가 번거롭게 굳이 이런 자리로 선생님을 모신 이유 또한……. 그것이거든요."
80000103-20 = "3;나기사 스탠딩;11;……무슨 이야기냐고요?\n#3;em;[?]"
80000103-21 = "3;나기사 스탠딩;15;그렇죠. 이제 설명을 해 드려야지요."
80000103-22 = "3;나기사 스탠딩;99;사실 그렇게 대단한 이유는 아닙니다. 이렇게 사람 없는 곳으로 오시게 한 뒤에, 이렇게 어디서나 볼 법한 초콜릿을 드리는 이유."
80000103-23 = "3;나기사 스탠딩;15;그건 보시는 대로, 선생님께 제가 초콜릿 같은 걸 챙겨드렸다는 사실을 다른 사람들에게 딱히 알리고 싶지 않았기 때문입니다.\n#3;em;[반응]"
80000103-24 = "[s3] \"알리지 않아?\"\n[s4] \"비밀로 하고 싶은 거야?\""
80000103-25 = "#wait;10"
80000103-26 = "#wait;10"
80000103-27 = "3;나기사 스탠딩;02;사실 비밀이라고 할 것까지는 아닙니다. 어쩌다가 '주긴 했다더라'정도로 사실이 새어 나가는 건 상관없겠죠."
80000103-28 = "3;나기사 스탠딩;16;아시다시피 저희가 놓인 환경은……. 여러 가지 '해석'을 강요하는 곳이거든요."
80000103-29 = "3;나기사 스탠딩;99;트리니티의 일원으로서 선생님에게 친분을 유지하기 위한 행동을 취했다."
80000103-30 = "3;나기사 스탠딩;99;티파티로서 선생님과의 친분을 다지고 영향력을 과시했다. 혹은 다른 학원을 견제했다."
80000103-31 = "3;나기사 스탠딩;15;그런 정치적인 이야기는 기본이고, 호감을 사려고 했다거나 사적 관계를 가지려 한다는 것 등 다양한 이야기가 생깁니다.\n#3;em;[땀]"
80000103-32 = "3;나기사 스탠딩;99;생겨나는 건……. 사실 크게 상관없습니다. 저는 제 자리에 익숙하고, 그런 것을 관리하거나 때때로 이용도 하는 게 제 일이니까요."
80000103-33 = "3;나기사 스탠딩;15;하지만……. 그러네요.\n#3;em;…"
80000103-34 = "3;나기사 스탠딩;16;그것이 사실이라 해도, 역시 당사자에게까지 그렇게 보이고 싶지는 않으니까요."
80000103-35 = "3;나기사 스탠딩;10;그래서 누구도 없을 시간에, 누구도 없을 장소로 선생님께 와 달라 부탁드린 겁니다."
80000103-36 = "3;나기사 스탠딩;02;지금 시간대라면, 티파티 내에서도 저를 찾거나 볼 사람이 없을 시간대거든요."
80000103-37 = "3;나기사 스탠딩;01;앞으로 몇 분도 채 남지 않은 시간이지만요."
80000103-38 = "3;나기사 스탠딩;03;……후후.\n#3;em;[음표]"
80000103-39 = "3;나기사 스탠딩;02;말씀드렸듯, 그 초콜릿은 정말로 그간의 감사에 대한 답변 정도의 의미입니다."
80000103-40 = "3;나기사 스탠딩;01;그것으로 선생님께 뭔가를 드렸다는 사실을 남기거나, 앞으로 선생님과 일을 하게 될 때 제 입지를 다지기 위함이 아니에요."
80000103-41 = "3;나기사 스탠딩;99;받고 바로 잊어 주셔도 좋고, 누구에게도 말씀하지 않으셔도 좋습니다."
80000103-42 = "3;나기사 스탠딩;01;선생님……."
80000103-43 = "3;나기사 스탠딩;03;지금까지도. 그리고 지금도 정말로 감사합니다.\n#3;greeting"
80000103-44 = "#st;[0,0];instant;1;"
80000103-45 = "#clearST"
80000103-46 = "3;나기사 스탠딩;03\n#3;em;…\n#wait;2500"
80000103-47 = "3;나기사 스탠딩;11;그만 들어가 보겠습니다. 드리자마자 가버리는 게 죄송하지만, 저에겐 시간이 그리 많지 않거든요.\n#3;em;[///]"
80000103-48 = "3;나기사 스탠딩;10;그럼 다음에 또……."
80000103-49 = "[s] \"…….\""
80000103-50 = "#wait;1000"
80000103-51 = "[ns] \"……나기사.\""
80000103-52 = "3;나기사 스탠딩;11;……? 네?\n#3;em;[?]"
80000103-53 = "[s5] \"오늘은 '나기사'를 만난 걸로 해둘게!\"\n[s6] \"티파티나 트리니티에 관한 건, 오늘은 없었던 거야!\""
80000103-54 = "#wait;10"
80000103-55 = "#wait;10"
80000103-56 = "3;나기사 스탠딩;03;……후후.\n#3;em;…"
80000103-57 = "3;나기사 스탠딩;01;역시나 이렇게 돼버리는군요."
80000103-58 = "3;나기사 스탠딩;02;네. 감사합니다. 선생님."
80000103-59 = "3;나기사 스탠딩;99;그렇지만 뭔가……. 지금만큼은…….\n#3;em;…"
80000103-60 = "3;나기사 스탠딩;16;선생님 상대로는 그렇게나 정치적이지 않으려고 노력했는데."
80000103-61 = "#all;hide"
80000103-62 = "#na;나기사 스탠딩;그렇게 말씀해 주실 거라고 기대한 저 자신이, 또다시 정치적으로 느껴져서 조금 싫네요."

[translation]
1300902-1 = "วันนี้ก็จะตั้งใจทำงานอย่างหนัก"
1300902-2 = "(คุณครูมาถึงสถานที่ที่นัดเจอสึบากิก็เห็นว่ามีกลุ่มคนมายืนมุงกันอยู่)"
1300902-3 = "[ns] \"เกิดอะไรขึ้นน่ะ?\""
1300902-6 = "(พอเข้าไปดูใกล้ๆ ก็เห็นสึบากิกำลังหลับอยู่ท่ามกลางคนที่มายืนมุงดู)"
1300902-7 = "ง่ำ ง่ำ..... คร่อก..."
1300902-8 = "(กลุ่มคนที่ยืนมุงดูเธออยู่ต่างส่งเสียงกระซิบกระซาบพูดถึงสึบากิ)"
1300902-9 = "นี่ ดูเด็กคนนั้นสิ หรือว่าเธอก็คือ..."
1300902-10 = "องค์หญิงขี้เซาแห่งเฮียกคิยาโค!"
1300902-11 = "องค์หญิงขี้เซาเหรอ..."
1300902-12 = "หมายถึงผู้เชี่ยวชาญด้านการนอนที่ไม่มีใครเทียบได้ใช่ไหม?"
1300902-13 = "[s1] \"องค์หญิงขี้เซา....?\"\n[s2] \"ผู้เชี่ยวชาญด้านการนอน....?\""
1300902-14 = "มิน่าล่ะ เหมือนรู้สึกว่าเคยเห็นเธอมาก่อน"
1300902-15 = "มิน่าล่ะ เหมือนรู้สึกว่าเคยเห็นเธอมาก่อน"
1300902-16 = "องค์หญิงขี้เซากำลังต่อจิกซอว์ตอนที่หลับด้วยล่ะ!"
1300902-17 = "[s] \"จิกซอว์...ตัวต่อ?\""
1300902-18 = "ฮ่าฮ่า งั้นเหรอ?"
1300902-19 = "ฉันเคยเห็นองค์หญิงขี้เซาแอบงีบไปตอนที่กำลังต่อไพ่หลายๆ ชั้นด้วยค่ะ!"
1300902-20 = "[s] \"ไพ่เหรอ...?\""
1300902-21 = "ฮ่าฮ่า ไม่ใช่แค่นั้นนะ! แต่องค์หญิงขี้เซาที่ฉันเห็นน่ะนะ...!"
1300902-23 = "(กลุ่มฝูงคนเริ่มพูดคุยเสียงดังมากขึ้น)"
1300902-24 = "(ดูเหมือนว่าสึบากิจะเป็นคนดังของหมู่เด็กนักเรียนในเฮียกคิยาโค)"
1300902-27 = "[ns] \"อืม... เข้าไปคุยกับเธอดีไหมนะ...\""
1300902-28 = "เจอแล้ว! เด็กนักเรียนชมรมฝึกฝน โรงเรียนเฮียกคิยาโค!"
1300902-31 = "ธะ... เธออยู่ตรงนี้ค่ะ ท่านพี่คะ!"
1300902-32 = "ได้ยินว่ามีเด็กนักเรียนที่หลับอยู่บนถนน คิดเอาไว้แล้วเชียวว่าต้องเป็นเธอ..."
1300902-33 = "เป็นเธอจริงๆ ด้วยสินะ หัวหน้าชมรมฝึกฝน....!"
1300902-35 = "คร่อก zZz ..."
1300902-36 = "นี่ อย่าทำเป็นเหมือนไม่รู้จักพวกเราสิ!"
1300902-37 = "งึมงำๆ...."
1300902-38 = "อืม...."
1300902-39 = "เมินพวกเรางั้นเรอะ...?!"
1300902-40 = "เธอไม่ได้ฟังพวกเราอยู่เลยค่ะท่านพี่! "
1300902-41 = "ฮึ่ก พอกันที!"
1300902-42 = "คราวก่อนที่เธอเดินป้วนเปี้ยนอยู่แถวๆ ถนนตอนกลางคืน เธอมาขัดขวางงานศิลปะ#nที่แสดงออกถึงความไม่พอใจต่อความยุติธรรมในสังคมของพวกเรา!"
1300902-43 = "พวกเราก็แค่พ่นสีบนกำแพงเอง ใช่ไหมคะท่านพี่!"
1300902-44 = "นะ...หนวกหู!"
1300902-45 = "ตอนนี้เธอกำลังหลับอยู่ เป็นโอกาสของเราแล้วล่ะ! จัดการเลย!"
1300902-46 = "ยะ...ฮู้วววว!!"
1300902-48 = "พวกเขาจะยิงปืนใส่องค์หญิงขี้เซางั้นเหรอ....!"
1300902-49 = "อะ...อันตราย!"
1300902-50 = "[s] \"สึบากิ....?!\""
1300902-52 = "zZz ..."
1300902-54 = "อึ่ก! เธอหลบกระสุนได้ทั้งๆ ที่หลับอยู่งั้นเหรอ! แถมไม่รู้สึกอะไรเลยด้วย!"
1300902-55 = "ท่านพี่คะ เราต้องรวมพลังกัน พลังแค่นี้ไม่พอแน่ๆ!"
1300902-56 = "ใช่! เจอนี่ซะ! ขว้างระเบิด!"
1300902-58 = "[ns] \"สึบากิ... อันตราย!\""
1300902-63 = "ฮะฮ่า! เป็นยังไงล่ะ! พวกเราจัดการเธอได้แล้วใช่ไหม?!"
1300902-64 = "อ๊ะ.... ท่านพี่ อย่าเพิ่งด่วนสรุป....!"
1300902-68 = "อะ...อะไรกันเนี่ย...! ยัยเด็กคนนี้หลบกระสุนได้ทั้งๆ ที่หลับอยู่งั้นเหรอ?!\n\n"
1300902-69 = "ยะ...ยัยนี่เป็นตัวประหลาดจริงๆ ด้วย ทำยังไงดีคะท่านพี่?!\n"
1300902-71 = "มะ.. ไม่อยากเชื่อเลย!"
1300902-72 = "เพราะแบบนี้ทุกคนถึงได้เกรงกลัวองค์หญิงขี้เซาแห่งเฮียกคิยาโคสินะ!"
1300902-73 = "ดูสีหน้าของผู้ถือชัยชนะนั่นสิ!"
1300902-74 = "ฮ้าวว.... คร่อก zZz..."
1300902-75 = "นี่เธออวดว่าตัวเองชนะทั้งๆ ที่หลับอยู่งั้นเหรอ!"
1300902-76 = "(คุณครูรู้สึกเหมือนกำลังได้เห็นเหตุการณ์ที่ยิ่งใหญ่บางอย่าง)"
1300902-78 = "ชิส์ ถ้าเป็นแบบนี้ล่ะก็...!"
1300902-79 = "[s] \"นี่ รอเดี๋ยวสิ\""
1300902-80 = "นะ...นั่นมันคุณครูจากชาเล่ต์นี่?!"
1300902-81 = "อะไรนะ?! ฉันไม่อยากไปมีเรื่องกับพวกชาเล่ต์หรอกนะท่านพี่!"
1300902-82 = "อะ...อึ่ก! ผะ...เผ่นก่อนล่ะ!"
1300902-85 = "(ทั้งสองคนวิ่งหนีไปก่อนที่คุณครูจะได้พูดอะไรต่อ)"
1300902-86 = "(ช่วยไม่ได้นะ...)"
1300902-88 = "[ns] \"สึบากิ ไม่เป็นไรนะ?\""
1300902-89 = "หืม? ถึงจะไม่รู้ว่าคุณเป็นใคร แต่เรียกแบบนั้นองค์หญิงขี้เซาก็ไม่ตื่นขึ้นมาหรอกนะ..."
1300902-90 = "ฮ้าวว~ เสียงนี้มัน..."
1300902-91 = "อ่าฮะ คุณครูนี่เอง"
1300902-92 = "ไม่อยากเชื่อเลยว่าองค์หญิงขี้เซาจะตื่นขึ้นมาด้วย!"
1300902-93 = "พอเขาเรียกปุ๊บองค์หญิงก็ตื่นเลยงั้นเหรอ?!"
1300902-94 = "[s] \"พอได้ข้อความครูก็รีบมาเลยน่ะ นี่มันเกิดอะไรขึ้นกันเหรอ?\""
1300902-95 = "หืม? ฉันแค่เผลอหลับไประหว่างรอคุณครูเองนะ...?"
1300902-96 = "วันนี้อากาศอบอุ่นดีจังเลยนะ..."
1300902-97 = "เมื่อกี้นี้... เหมือนว่าฉันฝันอะไรแปลกๆ ด้วยล่ะ..."
1300902-98 = "[s] \".....งั้นเหรอ?\""
1300902-99 = "แล้วพอลมพัดเอื่อยๆ แบบนี้... มันยิ่งเหมาะกับการนอน... ไม่สิ เหมาะกับการฝึกฝนมากเลย"
1300902-100 = "คุณครูเอง... ก็คิดแบบนี้เหมือนกันใช่ไหม...? ฮ้าววว"
1300902-101 = "[s] \"งะ...งั้นเหรอ?\""
1300902-102 = "ถ้างั้น ฉันจะสาธิตวิธีฝึกตามที่สัญญาไว้ให้ดูเองนะ"
1300902-103 = "ไปหาที่เหมาะๆ กันก่อน...."
1300902-104 = "[s3] \"ไม่ล่ะ ไม่เป็นไร\"\n[s4] \"ครูเห็นแล้วล่ะ สุดยอดมากเลย\""
1300902-105 = "เห็นแล้วงั้นเหรอ...?"
1300902-106 = "เห็นแล้วงั้นเหรอ...?"
1300902-107 = "อืม... แล้วจะทำยังไงดีล่ะ ที่เรียกคุณครูออกมา... ก็เพื่อจะโชว์วิธีการฝึกฝนของฉันให้ดู..."
1300902-108 = "แย่จัง..."
1300902-109 = "[s] \"เราไปหามื้อกลางวันกินกันดีไหม?\""
1300902-110 = "มื้อกลางวัน...? (เอียงหัว)"
1300902-111 = "ฮุฮุ พอตื่นมาก็ได้ไปกินมื้อเที่ยงกับคุณครูเลย"
1300902-112 = "นี่ฉันยังฝันอยู่รึเปล่านะ"
1300902-113 = "อื้อ ดีเลยคุณครู ถ้างั้นก็..."
1300902-115 = "....คร่อก zZz"
1300902-116 = "[s] \"เดี๋ยวสิสึบากิ! เธอจะนอนไม่ได้นะ สึบากิ!\""
1300902-119 = "(จากนั้นคุณครูกับสึบากิก็ไปหามื้อกลางวันทานด้วยกัน)"
1300902-120 = "(ระหว่างมื้อกลางวันสึบากิก็ฝึกฝนต่ออย่างไม่ย่อท้อ)"

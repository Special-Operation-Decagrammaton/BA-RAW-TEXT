[translation]
1300902-1 = "今天也努力的打盹修行"
1300902-2 = "（到了和椿約定好的地點，發現一側聚集著擁擠的人潮）"
1300902-3 = "[ns] 「有什麼事嗎？」"
1300902-6 = "（一靠近發現椿站在人群中心睡覺）"
1300902-7 = "唔唔……呼嚕……"
1300902-8 = "（看到這樣的椿，圍觀群眾開始議論紛紛）"
1300902-9 = "喂，你看。那個人該不會是……"
1300902-10 = "是百鬼夜行的睡美人！"
1300902-11 = "睡美人，難道是……"
1300902-12 = "是那個在睡覺這個領域，無人能媲美的專家嗎！"
1300902-13 = "[s1] 「睡美人……？」\n[s2] 「睡覺的專家……？」"
1300902-14 = "說起來，我上次有看到。"
1300902-15 = "說起來，我上次有看到。"
1300902-16 = "睡美人邊睡邊拼拼圖的模樣！"
1300902-17 = "[s] 「拼圖……？」"
1300902-18 = "太嫩了，這有什麼好驚訝的。"
1300902-19 = "我可是看到睡美人一邊打盹一邊疊撲克牌塔哦！"
1300902-20 = "[s] 「疊撲克牌塔……？」"
1300902-21 = "嘖嘖嘖，這點程度才不是什麼了不起的新聞！我看過的睡美人竟然……！"
1300902-23 = "（人們熱議的聲音在那之後也不絕於耳）"
1300902-24 = "（雖然我不怎麼清楚，但椿在百鬼夜行似乎是位名人呢）"
1300902-27 = "[ns] 「好了，總之先去叫她吧……」"
1300902-28 = "終於找到了！百鬼夜行修行部的傢伙！"
1300902-31 = "這裡，在這裡。大姐頭！"
1300902-32 = "聽說有學生在街上睡覺，我就猜到了……"
1300902-33 = "果然是你這傢伙。修行部部長……！"
1300902-35 = "睏……"
1300902-36 = "可別說你忘了我們！"
1300902-37 = "咕噥……"
1300902-38 = "睏……"
1300902-39 = "無視嗎！？"
1300902-40 = "大姐頭！這傢伙囂張到把話當作耳邊風！"
1300902-41 = "可惡，夠了！ "
1300902-42 = "你上次竟敢在夜晚街道上，妨礙我們表達對社會不滿的行為藝術！"
1300902-43 = "嘛，雖然就只是牆上的塗鴉。是吧，大姐頭！"
1300902-44 = "吵，吵死了！"
1300902-45 = "這傢伙睡著了，現在是好機會！動手！"
1300902-46 = "呀呼～！！"
1300902-48 = "槍彈指向了睡美人……！"
1300902-49 = "危，危險！"
1300902-50 = "[s] 「椿……！？」"
1300902-52 = "……睏。"
1300902-54 = "可惡，在槍林彈雨中竟然也醒不過來！躲避子彈這麼游刃有餘嗎！"
1300902-55 = "大姐頭，這樣不夠！要用更大範圍攻擊的傢伙！"
1300902-56 = "好，接招！手榴彈！"
1300902-58 = "[ns]「椿！危險……！」"
1300902-63 = "哈──哈哈！如何，幹掉了嗎！？"
1300902-64 = "啊，大姐頭……那句台詞是……！"
1300902-68 = "這，這傢伙……！竟然邊打瞌睡邊避開了我們全部的攻擊？！"
1300902-69 = "比，比傳聞中還要怪物呢。大姐頭，怎麼辦？！"
1300902-71 = "好，好厲害！"
1300902-72 = "這就是百鬼夜行的睡美人嗎！"
1300902-73 = "快看，睡美人意氣風發的表情！"
1300902-74 = "呼啊，嗯嗯……睏──……"
1300902-75 = "竟然用夢話宣告自己的勝利！"
1300902-76 = "（似乎看到了什麼不得了的景象）"
1300902-78 = "呿，這樣的話……！"
1300902-79 = "[s] 「那個，可以打擾一下嗎？」"
1300902-80 = "你，你是夏萊的老師！？"
1300902-81 = "嗚哇？！和夏萊扯上關係可是會很麻煩的，大姐頭！"
1300902-82 = "呿，沒辦法了！戰略性撤退！"
1300902-85 = "（我正要搭話時，那兩人就跑走了）"
1300902-86 = "（……算了）"
1300902-88 = "[ns] 「椿，你沒事吧？」"
1300902-89 = "嗯？等等，雖然不知道你是誰啦。即便你這樣叫她，睡美人也不可能輕易醒來……"
1300902-90 = "呼啊……嗯？這個聲音……"
1300902-91 = "……啊，老師。"
1300902-92 = "剛剛一陣騷動都沒醒的睡美人，竟然！"
1300902-93 = "一叫就醒了！？"
1300902-94 = "[s] 「我收到訊息就來了……怎麼了嗎？」"
1300902-95 = "嗯──？我只是在等老師時稍微睡一下而已……？"
1300902-96 = "這麼說來，今天的陽光也很溫暖……"
1300902-97 = "剛才好像做了非常令人興奮的夢……"
1300902-98 = "[s] 「……這樣啊。」"
1300902-99 = "風也徐徐吹來，這樣的天氣最適合睡……不對，最適合修行了。"
1300902-100 = "老師……你也是這麼想的吧……？呼啊嗚……"
1300902-101 = "[s] 「應該吧……？」"
1300902-102 = "老師，那麼我就依照約定，示範一次我的修行給你看。"
1300902-103 = "找個適合的地方……"
1300902-104 = "[s3] 「不，沒關係。」\n[s4] 「我已經看到了，真的很厲害。」"
1300902-105 = "你已經看過了……？"
1300902-106 = "你已經看過了……？"
1300902-107 = "唔──嗯……那該怎麼辦呢。找老師過來就是想要讓你看看我的修行方式……"
1300902-108 = "這樣讓人有點困擾呢……"
1300902-109 = "[s] 「機會難得，一起去吃個午餐吧。」"
1300902-110 = "午餐……？"
1300902-111 = "呵呵。沒想到一醒來就能遇到老師，而且還可以一起吃午餐。"
1300902-112 = "感覺好像在做幸福的美夢一樣。"
1300902-113 = "嗯，是啊。那麼，老師，那樣的話……"
1300902-115 = "……睏。"
1300902-116 = "[s] 「……不，不，椿，不可以再睡了，椿？！」"
1300902-119 = "（在那之後，我和椿為了吃午餐而換了個地方）"
1300902-120 = "（吃午餐的過程中，椿有時候也會不小心開始修行（？））"

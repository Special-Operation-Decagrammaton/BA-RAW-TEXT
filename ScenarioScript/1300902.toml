[translation]
1300902-1 = "Just Another Lazy Day"
1300902-2 = "(I saw a large crowd of people gathered at the location where I agreed to meet Tsubaki.)"
1300902-3 = "[ns] \"What's going on?\""
1300902-6 = "(As I approached, I saw Tsubaki asleep in the middle of the crowd.)"
1300902-7 = "Zzz... Zzz..."
1300902-8 = "(The surrounding crowd seems to be whispering about Tsubaki for some reason.)"
1300902-9 = "Hey, look. Is that...?"
1300902-10 = "That's the Sleeping Beauty of Hyakkiyako!"
1300902-11 = "Sleeping Beauty... "
1300902-12 = "You mean that pro sleeper who can sleep better than anyone?!"
1300902-13 = "[s1] \"Sleeping Beauty...?\"\n[s2] \"Pro sleeper...?\""
1300902-14 = "You know, I think I've seen her before."
1300902-15 = "You know, I think I've seen her before."
1300902-16 = "I saw her do a jigsaw puzzle in her sleep!"
1300902-17 = "[s] \"...A jigsaw puzzle?\""
1300902-18 = "Is that all?"
1300902-19 = "One time, I saw the Sleeping Beauty doze off before building a tower out of playing cards!"
1300902-20 = "[s] \"...Playing cards?\""
1300902-21 = "Haha, that's nothing! I saw the Sleeping Beauty..."
1300902-23 = "(The crowd continued to chatter on excitedly.)"
1300902-24 = "(Without realizing it, Tsubaki seems to have become something of a celebrity in Hyakkiyako.)"
1300902-27 = "[ns] \"Hmm, I should probably try to talk to her...\""
1300902-28 = "Here she is! The president of Hyakkiyako's Inner Discipline Club!"
1300902-31 = "Over here!"
1300902-32 = "I heard there was a student sleeping in the street, so I had to know..."
1300902-33 = "Sure enough, it turned out to be the president of the Inner Discipline Club!"
1300902-35 = "Zzz..."
1300902-36 = "Don't act like you don't know who we are!"
1300902-37 = "*yawn*"
1300902-38 = "Mmm..."
1300902-39 = "Are you ignoring us?!"
1300902-40 = "She's not listening at all!"
1300902-41 = "Ugh! Whatever!"
1300902-42 = "Last time you wandered around at night, you interrupted our artistic expression of dissatisfaction of this unjust society!"
1300902-43 = "What? I thought we were just scribbling on a wall?"
1300902-44 = "Sh-Shut up!"
1300902-45 = "She's sleeping, so now's our chance! Do it!"
1300902-46 = "Woohoo!"
1300902-48 = "Are they gonna shoot the Sleeping Beauty?!"
1300902-49 = "Whoa! Th-That's dangerous!"
1300902-50 = "[s] \"Tsubaki?!\""
1300902-52 = "Zzz..."
1300902-54 = "Argh! I can't believe she's still asleep after all those bullets! Didn't she feel anything?"
1300902-55 = "It wasn't enough! We need more power!"
1300902-56 = "Yah! Take this! How about a grenade?!"
1300902-58 = "[ns] \"Tsubaki! Watch out!\""
1300902-63 = "Haha! How was that? Did we finish her off?"
1300902-64 = "Um... Well, you probably shouldn't get ahead of yourself!"
1300902-68 = "Wh-What...? She dodged all of our attacks...while sleeping?!"
1300902-69 = "Sh-She's even worse than the rumors! What do we do...?"
1300902-71 = "Unbelievable!"
1300902-72 = "This must be why everyone fears the Sleeping Beauty of Hyakkiyako!"
1300902-73 = "Look at that triumphant look on her face!"
1300902-74 = "*yawn* Zzz..."
1300902-75 = "I can't believe she's gloating about her victory in her sleep!"
1300902-76 = "(It seemed that I had just witnessed something incredible.)"
1300902-78 = "Well, in that case..."
1300902-79 = "[s] \"Hey, hold on a second!\""
1300902-80 = "Wait, isn't that Schale's Sensei?"
1300902-81 = "What?! I don't want to get involved with Schale!"
1300902-82 = "Ugh! Retreat!"
1300902-85 = "(The two of them ran away before I could utter another word.)"
1300902-86 = "(Oh well.)"
1300902-88 = "[ns] \"Tsubaki, are you all right?\""
1300902-89 = "Look, I don't know who you are, but the Sleeping Beauty won't wake up just because you call her name..."
1300902-90 = "Hmm? That voice..."
1300902-91 = "Oh. It's you, Sensei."
1300902-92 = "I don't believe it! After all that, the Sleeping Beauty finally woke up!"
1300902-93 = "Just because that teacher said her name?!"
1300902-94 = "[s] \"I got your text message. What on earth happened?\""
1300902-95 = "Hm? What do you mean? I just fell asleep while waiting for you."
1300902-96 = "Oh! The sun is so nice and warm today..."
1300902-97 = "I feel like...I just had a really exciting dream..."
1300902-98 = "[s] \"...Is that so?\""
1300902-99 = "And this gentle breeze... It's the perfect day to sleep... Uh, I mean train."
1300902-100 = "Don't you agree, Sensei...? *yawn*"
1300902-101 = "[s] \"Really?\""
1300902-102 = "Of course, Sensei! Allow me to demonstrate, as promised."
1300902-103 = "You just get into position, and..."
1300902-104 = "[s3] \"No, it's all right.\"\n[s4] \"I already saw you in action. You were fantastic.\""
1300902-105 = "What? You already saw me...?"
1300902-106 = "What? You already saw me...?"
1300902-107 = "Hmm... That's no good! I wanted to show you how I train..."
1300902-108 = "What a pickle..."
1300902-109 = "[s] \"Since I'm here anyway, why don't we go grab lunch?\""
1300902-110 = "Lunch...? *tilting head*"
1300902-111 = "Heehee. Lunch with Sensei as soon as I wake up?"
1300902-112 = "Am I still dreaming?"
1300902-113 = "Okay, Sensei! Then let's..."
1300902-115 = "...Zzz."
1300902-116 = "[s] \"No, Tsubaki. Don't fall asleep again. Tsubaki?!\""
1300902-119 = "(I coaxed Tsubaki awake so that we could have lunch.)"
1300902-120 = "(But Tsubaki continued her intensive training all through lunch.)"

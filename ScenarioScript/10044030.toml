[translation]
10044030-1 = "ตอนที่ 3;ตามหารถไฟที่หายไปอีกครั้ง"
10044030-2 = "สถานีสินค้าอีกแห่ง"
10044030-5 = "ว่ายังไงนะ?! เป็นที่ระบบออกรถอัตโนมัติอีกแล้วเหรอ?"
10044030-6 = "พะ... พวกฉันก็ไม่แน่ใจค่ะ... รถไฟขบวนนั้นไม่ได้อยู่ในตารางเดินรถตั้งแต่แรกด้วย..."
10044030-8 = "เสียแรงเปล่าเหรอเนี่ย"
10044030-9 = "พะ... พอคาดหวังแล้วก็ผิดหวัง... จริงๆ ด้วย..."
10044030-11 = "[ns] \"รู้หรือเปล่าว่ารถไฟไปที่สถานีไหน?\""
10044030-13 = "ฉะ... ฉันจะดูบันทึกการเดินรถให้ค่ะ...! แต่ก็รับประกันไม่ได้ว่ารถไฟจะหยุดนะคะ..."
10044030-15 = "โอย งานยากแล้วไง เวลาก็ลดลงไปทุกที"
10044030-16 = "ยังไม่เป็นไร แค่หาให้เจอแล้วรีบบึ่งไป..."
10044030-17 = "แค่หาทางไปเรื่อยๆ ยังไงก็สำเร็จเนอะ ว่ามั้ย?"
10044030-24 = "ระ... รถไฟขบวนนั้นวิ่งขึ้นเหนืออยู่ค่ะ...!"
10044030-25 = "อ๊ะ... ไม่มีรถไฟใต้ดินไปแถวนั้นด้วยสิ..."
10044030-26 = "ถ้านั่งรถบัสไปสถานีถัดไป น่าจะเร็วกว่าค่ะ"
10044030-27 = "อึก... ทะ... ทำไมต้องเป็นรถบัสด้วย..."
10044030-29 = "มีอะไรให้ขึ้นก็ต้องขึ้นละน่า! เราต้องรีบหารถไฟให้เจอก่อนหัวหน้าจะรู้สิ"
10044030-30 = "ใส่เกียร์น้องหมา ชูบาบาบาบา"
10044030-39 = "......"
10044030-40 = "......"
10044030-42 = "ทำไมรถบัสมาช้าจัง!!"
10044030-43 = "คลานไปน่าจะถึงเร็วกว่านะ"
10044030-44 = "แล้วทำไมชอบมาช้าในตอนที่คนกำลังรีบๆ ด้วยก็ไม่รู้"
10044030-46 = "......"
10044030-47 = "[s1] \"อาโอบะ สีหน้าไม่ดีเลยนะ\"\n[s2] \"อาโอบะ เป็นอะไรหรือเปล่า?\""
10044030-50 = "อ่า... ค่ะ..."
10044030-51 = "......"
10044030-52 = "ที่จริงแล้วฉัน... มะ... มักจะเมารถน่ะค่ะ..."
10044030-56 = "เมารถ?"
10044030-57 = "ค่ะ... โดยเฉพาะเวลานั่งรถแบบนี้ ฉันจะเวียนหัวมากเป็นพิเศษ แล้วก็จะ..."
10044030-58 = "อึกก... คะ... แค่คิดก็..."
10044030-63 = "อื้อ~ เพราะแบบนี้ละรถไฟถึงดีกว่า ก็รถไฟนั่งแล้วไม่เมารถนี่เนอะ"
10044030-64 = "แฮ่ก... แฮ่ก..."
10044030-65 = "ชะ... ใช่ค่ะ... นั่นก็เป็นเหตุผลหนึ่งที่ฉันสมัครมาเรียนที่ไฮแลนเดอร์ค่ะ..."
10044030-67 = "[ns3] \"งั้นครูไปหายาแก้เมารถมาให้นะ\"\n[ns4] \"รอเดี๋ยวนะ ครูไปซื้อยาแก้เมารถมาให้\""
10044030-74 = "รถมาแล้ว! ถึงจะมาช้ามากๆ ก็เถอะ!!"
10044030-75 = "คะ... คุณครู! ไม่เป็นไรค่ะ ตอนนี้รถก็มาแล้วด้วย...! เราไม่มีเวลากันแล้ว..."
10044030-76 = "ฉะ... ฉันทนได้ค่ะ... ไปกันเถอะค่ะ!"
10044030-77 = "[s] \"ถ้าไม่ไหวจริงๆ ก็ต้องบอกนะ อาโอบะ\""
10044030-78 = "ค่ะ ค่ะ..."
10044030-85 = "ทำไมมาช้าแบบนี้เนี่ย? ต้องให้รอตั้ง 5 นาทีเลย!"
10044030-86 = "วะฮ่าฮ่า! ขอโทษทีนะ ขับรถบนถนนมันก็อย่างนี้ละ เราเลี่ยงปัญหาเรื่องการจราจรไม่ได้หรอก"
10044030-87 = "เมื่อกี้พวกแก๊งนักซิ่งก็มายึดถนนแล้วแข่งรถกันด้วย ใช้ไม่ได้เลย!"
10044030-89 = "ทางรถไฟ อีส เดอะ เบสต์"
10044030-90 = "ใช่ ไม่ต้องกังวลเรื่องรถติดด้วย"
10044030-91 = "ทั้งรถไฟและรถบัสก็มีข้อดีของตัวเองน่า"
10044030-92 = "จะว่าไป ปกตินักเรียนไฮแลนเดอร์แทบจะไม่นั่งรถบัสกันเลยไม่ใช่เหรอ?"
10044030-93 = "[s5] \"เรามีเรื่องด่วนที่ต้องรีบไปทำน่ะ\"\n[s6] \"ช่วยเหยียบเร็วๆ ให้หน่อยนะ คุณคนขับรถ\""
10044030-96 = "เป็นผู้ปกครองเหรอ? ได้เลย ฉันจะไปส่งถึงที่ให้ไวเลย!! ฮ่าฮ่า!"
10044030-106 = "ถ้าเหมือนจะอ้วก เดี๋ยวลูบหลังให้นะ"
10044030-107 = "มะ... ไม่อ้วกหรอกค่ะ..."
10044030-109 = "เทาซันด์ แฮมเมอร์ของฮิคาริ"
10044030-116 = "อ๊ะ... อ่า... ยะ... อย่าทำดีกว่าค่ะ...! ถึงจะไม่เจ็บเลยสักนิด แต่มันทำให้ฉันปั่นป่วนท้อง..."
10044030-117 = "อุ้บบ..."
10044030-119 = "วะฮะฮ่า! เอาถุงพลาสติกมั้ย? บอกได้ตลอดเลยนะ!"
10044030-120 = "[ns] \"อาโอบะ มองออกไปไกลๆ แล้วหายใจเข้าออกลึกๆ นะ\""
10044030-121 = "ฮือ... ฮือ... โลกนี้... มีแต่ความทุกข์จริงๆ..."
10044030-122 = "นักเรียนไฮแลนเดอร์ มีปัญหาอะไรกันงั้นเหรอ?"
10044030-123 = "มีคนจะอ้วกแล้ว!!"
10044030-124 = "เปล่าสักหน่อยค่ะ!! ไม่สิ มันก็จริงอยู่!"
10044030-125 = "ฉันอายคนนะคะ อย่าพูดเสียงดังเลยค่ะ!!"
10044030-126 = "อุ้บบ...! พอโมโหก็ยิ่งวิงเวียนเข้าไปใหญ่..."
10044030-128 = "ฮ่าฮ่า ทนอีกหน่อยนะ"
10044030-129 = "ฉันจะขับนิ่มๆ จะได้หายเมารถ!!"
10044030-130 = "แต่ในเมื่อต้องทำเวลา งั้นก็เหยียบให้มิดเลยมั้ยล่ะ? ซิ่งแบบความเร็วแสง~"
10044030-131 = "ไม่ได้หรอก รถแต่ละคันต้องรักษาระยะห่างระหว่างกันเอาไว้"
10044030-132 = "รถไฟก็ด้วย"
10044030-133 = "แต่ว่ารถบัสจอดบ่อยกว่าเยอะเลยนี่? ป้ายจะเยอะไปไหนก็ไม่รู้"
10044030-134 = "แต่พอมีป้ายให้ขึ้นลงเยอะๆ มันก็ยิ่งสะดวกนี่นา"
10044030-135 = "ตอนนี้พวกเธอก็ใช้บริการรถบัสกันอยู่ไม่ใช่หรือไง! ฮ่าฮ่า"
10044030-136 = "วะฮะฮ่า เถียงไม่ออกเลยนะเนี่ย!"
10044030-142 = "อะไรกัน พวกแก๊งนักซิ่งอีกแล้ว"
10044030-143 = "เด็กพวกนี้นี่! มันอันตรายนะ! ทำแบบนั้นบนถนน เดี๋ยวก็ได้แผลหรอก!!"
10044030-144 = "หนวกหูน่า! ตัวก็อ้วน ขับรถก็อืดอาด หลบไปเลยนะ!"
10044030-145 = "วะ... ว่าไงนะ... เดี๋ยวเหอะ!"
10044030-146 = "หัวหน้าเรียกให้พวกเราไปหา~! งั้นก็ต้องซิ่งไปสิ!"
10044030-147 = "[ns] \"รถติดอีกแล้วสินะ...\""
10044030-148 = "โธ่เอ๊ย!! แบบนี้มันก็ขวางทางน่ะสิ~! ออกจากถนนไปเลย!! พวกเราต้องรีบไปนะ!!"
10044030-149 = "ซวย แล้ว ไง"
10044030-150 = "เฮ้อ จริงๆ เลย ทำไมถึงไม่มีอะไรราบรื่นเลยนะ"
10044030-152 = "......"
10044030-153 = "ถ้าอยากให้ลูบหลังให้ก็บอกนะ"
10044030-154 = "อย่าเลยค่ะ ขอร้องละ... อุ้บ... อุ้บบ..."
10044030-157 = "ไม่รู้เลยนะเนี่ยว่าการจราจรจะติดขัดได้ด้วย ก่อนหน้านี้ฉันไม่รู้จักคำว่ารถติดด้วยซ้ำ"
10044030-158 = "ว่าไงล่ะ? ในฐานะนักเรียนไฮแลนเดอร์ เธอคิดว่ายังไง?"
10044030-159 = "อย่าชวนฉันคุยเลยค่ะ... อุ้บ... อุ้บบ..."
10044030-160 = "[s] \"อาโอบะ คิดว่าจะทนไหวถึงป้ายที่จะลงหรือเปล่า?\""
10044030-161 = "ถ้ามัดหรือปิดปากท่านผู้บริหารไว้ ฉันว่าก็น่าจะทนได้ค่ะ..."
10044030-162 = "อีกอย่าง ตะ... ตอนนี้คุณคนขับรถก็กำลังขับให้อย่างระมัดระวังด้วย..."
10044030-164 = "ไหนบอกว่าจะให้พวกฉันจัดการของชิ้นนั้นล่ะ? แล้วทำไมถึงเป็นแบบนี้ไปได้!"
10044030-166 = "หึหึ พวกคุณก็น่าจะรู้เหตุผลกันดีไม่ใช่เหรอครับ?"
10044030-167 = "ถ้าของสำคัญชิ้นนั้นเสียหายจากการขับขี่โดยประมาท... หรือถ้าเกิดเรื่องจนวัลคิรี่มาไล่ล่าละก็..."
10044030-168 = "อึกก.."
10044030-169 = "ตะ... แต่พวกฉันไวกว่านะ!"
10044030-170 = "รู้ไม่ใช่เหรอว่าพวกฉันไม่สนใจสัญญาณไฟจราจรน่ะ?"
10044030-171 = "ก็รู้อยู่หรอกครับ"
10044030-172 = "แต่งานครั้งนี้ต้องให้ความสำคัญกับการรักษาความปลอดภัยเป็นพิเศษ"
10044030-173 = "เราถึงต้องใช้การขนส่งทางรถไฟที่รับประกันว่าจะไม่เกิดอันตรายแน่ๆ ครับ หึหึ..."
10044030-174 = "ฮึ่ย... นี่พวกเราแพ้ให้กับทางรถไฟเหรอ?"
10044030-175 = "เอาเถอะครับ เรื่องนี้ได้ข้อสรุปไปแล้ว ไม่ต้องมาหารือกันอีกแล้วละครับ"
10044030-176 = "ดะ... เดี๋ยวสิ! เดี๋ยวก่อน..."
10044030-180 = "โธ่เอ๊ย! ฉันไม่ยอมให้เป็นแบบนี้หรอก!"
10044030-181 = "พวกเราพยายามกันแทบแย่เพื่องานๆ นี้...!"
10044030-187 = "ละ... ลูกพี่... เป็นอะไรหรือเปล่า?"
10044030-188 = "ลูกพี่อะไรกันล่ะ ฉันตำแหน่งหัวหน้าต่างหาก!!"
10044030-189 = "เฮือก! ขะ... ขอโทษนะ... หะ... หัวหน้า!"
10044030-190 = "ว่าแต่มีเรื่องอะไร...?"
10044030-191 = "ฉะ... ฉันเรียกทุกคนมาตามคำสั่งแล้ว ให้ทำยังไงต่อดี?"
10044030-192 = "......"
10044030-193 = "ในเมื่อเป็นแบบนี้แล้ว งั้นก็มีแค่วิธีเดียว!"
10044030-194 = "วิธีไหน...?"
10044030-199 = "ต้องเอาโอกาสที่ถูกแย่งไปกลับคืนมาน่ะสิ"
10044030-201 = "โอ้วว...!! ถึงจะไม่รู้ว่าคืออะไร แต่ฟังแล้วเท่ระเบิดเลย!"
10044030-202 = "พวกที่ขโมยงานของเราไป พวกนั้นจะต้องชดใช้อย่างสาสม...!"
10044030-206 = "นี่ นักเรียนไฮแลนเดอร์! จะลงป้ายนี้กันใช่มั้ย?"
10044030-207 = "ใช่แล้วละ ถึงแล้ว~! วะฮะฮ่า!"
10044030-208 = "รถไฟของเราจะอยู่ตรงไหนน้า"
10044030-210 = "[ns] \"อาโอบะ เป็นยังไงบ้าง?\""
10044030-212 = "นะ... ในที่สุดก็มาถึงจนได้นะคะ... ฮือ... ฮือ..."
10044030-213 = "ทนได้เก่งมากเลยนะหนู โชคดีที่ไม่อ้วกบนรถเนอะ!"
10044030-214 = "ขะ... ขอบคุณที่เป็นห่วงนะคะ... คุณคนขับรถ..."
10044030-215 = "วะฮ่าฮ่า! ฉันส่งผู้โดยสารให้ถึงที่หมายอย่างปลอดภัยทุกคนนั่นละ ถ้าเวียนหัวก็มีถุงพลาสติกให้ด้วย!"
10044030-216 = "ว่าไงล่ะ? รถไฟไม่มีบริการแบบนี้ใช่มั้ย?"
10044030-217 = "นะ... นั่นสินะคะ..."
10044030-218 = "แต่ถ้านั่งรถไฟ ก็ไม่เมารถนี่นา?"
10044030-219 = "แล้วก็มีห้องน้ำให้เข้าด้วย"
10044030-220 = "ปะ... เป็นท่านผู้บริหารที่ขาดทักษะในการเข้าสังคมจริงๆ เลยนะคะ... ทำไมต้องพูดเรื่องนั้นด้วย..."
10044030-224 = "ถึงรถไฟมันจะดีกว่าจริงๆ แต่รถบัสก็โอเคอยู่หรอก วะฮะฮะฮ่า!"
10044030-225 = "ไว้จะมานั่งรถบัสอีกนะ ไปก่อนละลุงคนขับ"
10044030-226 = "ฮ่าฮ่า แล้วกลับมาใช้บริการอีกนะ~!"
10044030-228 = "[ns] \"ขอบคุณนะคุณคนขับ!\""
10044030-232 = "ไม่ต้องช่วยลูบหลังแล้วใช่มั้ย?"
10044030-233 = "มาถามเพราะอยากทำให้ฉันรำคาญใช่มั้ยคะ...?"
10044030-235 = "เอาละ งั้นก็ไปหารถไฟของพวกเรากัน!!"

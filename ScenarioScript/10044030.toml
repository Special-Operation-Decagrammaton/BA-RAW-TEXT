[translation]
10044030-1 = "第3話;再次尋找消失的列車"
10044030-2 = "另一個貨物站"
10044030-5 = "這是什麼意思！？又自動發車了？"
10044030-6 = "其，其實我們也不太清楚……#n因為那班列車本來就不在時刻表上……"
10044030-8 = "完全白跑一趟～"
10044030-9 = "果，果然……只要抱有期待就會落空呢……"
10044030-11 = "[ns]「能查到車子開往哪個車站嗎？」"
10044030-13 = "我，我可以查詢紀錄……但是無法保證列車會停在那裡……！"
10044030-15 = "糟糕，時間所剩不多了。"
10044030-16 = "還來得及～找到車子就全速前進～"
10044030-17 = "也是，沒辦法就想辦法對吧？"
10044030-24 = "列，列車正沿著上行線移動……！"
10044030-25 = "啊……目前那個方向沒有地鐵路線經過……"
10044030-26 = "搭公車過去應該會比較快。"
10044030-27 = "唔……為，為什麼偏偏要搭公車……"
10044030-29 = "有什麼就搭什麼吧！#n得在被高層發現之前趕快找到才行。"
10044030-30 = "快速移動～咻叭叭叭叭～"
10044030-39 = "……"
10044030-40 = "……"
10044030-42 = "公車誤點了！！"
10044030-43 = "就算用爬的～也早該到了吧～？"
10044030-44 = "為什麼偏偏在這種時候誤點啊？"
10044030-46 = "……"
10044030-47 = "[s1]「青葉，你的臉色好像有點差。」\n[s2]「還好嗎？」"
10044030-50 = "啊，是的……"
10044030-51 = "……"
10044030-52 = "其，其實我……很，很容易暈車……"
10044030-56 = "暈車～？"
10044030-57 = "嗯，嗯……尤其坐汽車的時候特別嚴重……"
10044030-58 = "嗚噁……光，光是想像就……"
10044030-63 = "啊啊～所以你才喜歡列車啊。#n畢竟列車比較不會暈車嘛。"
10044030-64 = "嘿嘿……嘿……"
10044030-65 = "沒，沒錯……所以我才會來高地人學園……"
10044030-67 = "[ns3]「只要搭上車就會很不舒服嗎？」\n[ns4]「等我一下，我去買點暈車藥。」"
10044030-74 = "公車來了！雖然已經大誤點了！！"
10044030-75 = "老，老師！我沒關係的。#n公車已經來了……！現在時間緊迫……"
10044030-76 = "我，我可以忍耐一下……走吧！"
10044030-77 = "[s]「真的撐不住的話要說哦，青葉。」"
10044030-78 = "好，好的……"
10044030-85 = "為什麼這麼慢啊？比表定時間慢了5分鐘耶！"
10044030-86 = "哇哈哈！抱歉抱歉。#n開在馬路上就是這樣動不動就塞車。"
10044030-87 = "因為剛才有暴走族非法佔道飆車，所以才會誤點啊！"
10044030-89 = "果然～還是鐵道好～"
10044030-90 = "就是說啊。鐵軌上就不會有障礙物了。"
10044030-91 = "列車跟公車各有各的優點啦。"
10044030-92 = "話說回來，我很少看到高地人的學生搭公車耶？"
10044030-93 = "[s5]「因為我們有急事要趕時間。」\n[s6]「拜託你了，司機先生。」"
10044030-96 = "你是他們的監護人嗎？#n好，不管天涯海角我都會把你們送到的！！哈哈！"
10044030-106 = "想吐了嗎～光幫你拍拍背～"
10044030-107 = "我，我沒有想吐……"
10044030-109 = "光108式，Thousand Hammer～"
10044030-116 = "啊，啊啊……請，請停下來……！#n雖然不會痛，但肚子會不舒服……"
10044030-117 = "呃唔……"
10044030-119 = "噗哈哈！需要塑膠袋嗎？#n要的話隨時跟我說！"
10044030-120 = "[ns]「青葉，看著遠方深呼吸會好一點。」"
10044030-121 = "呼……呼……這世界真的是……充滿了痛苦……"
10044030-122 = "各位高地人的同學們，有什麼問題嗎？"
10044030-123 = "有人想吐！！"
10044030-124 = "才沒有！！不對，我是想吐沒錯！"
10044030-125 = "這樣很丟臉，請不要大聲嚷嚷！！"
10044030-126 = "唔呃……！一生氣又更不舒服了……"
10044030-128 = "哈哈，麻煩再忍耐一下吧。"
10044030-129 = "我會盡量開得平穩一點的！！"
10044030-130 = "既然如此～不如全力加速～？用光速～"
10044030-131 = "這恐怕沒辦法，畢竟得遵守班次間隔嘛。"
10044030-132 = "列車也是～"
10044030-133 = "但公車得一直走走停停的耶？不覺得站牌有點太多了嗎？"
10044030-134 = "是這樣沒錯，不過也因為上下車的地點多，公車才有公車的方便之處啊。"
10044030-135 = "像你們現在不也在搭公車嗎！哈哈。"
10044030-136 = "噗哈哈，確實確實！"
10044030-142 = "糟了，又有暴走族在鬧事。"
10044030-143 = "你們這些傢伙，這樣很危險耶！在馬路上亂來會受傷的！！"
10044030-144 = "吵死了！慢吞吞的大笨車還不快閃開！"
10044030-145 = "那些傢伙……唉！真受不了！"
10044030-146 = "總長叫我們了～！衝啊！"
10044030-147 = "[ns]「路上又塞車了……」"
10044030-148 = "真是的！！不要來礙事啦～！我們趕時間！！"
10044030-149 = "沒救～完蛋了～"
10044030-150 = "唉，真是的。事情一直好不順利。"
10044030-152 = "……"
10044030-153 = "需要拍背嗎～要的話跟光說哦～"
10044030-154 = "拜託不要……呼……呼……"
10044030-157 = "我真搞不懂為什麼交通會有堵塞這個概念。"
10044030-158 = "怎麼樣？身為高地人的學生，你有什麼感想？"
10044030-159 = "請不要跟我說話……呼……呼……"
10044030-160 = "[s]「撐得到目的地嗎，青葉？」"
10044030-161 = "如果能把兩位幹部丟下車的話，我應該撐得下去……"
10044030-162 = "司，司機先生好像也盡量開得平穩一點了……"
10044030-164 = "不是說好要把那個交給我們嗎！為什麼會變成這樣！"
10044030-166 = "呵呵，原因你們自己不是最清楚嗎？"
10044030-167 = "危險駕駛損壞重要物品……或是因為事故被女武神追捕……"
10044030-168 = "這……"
10044030-169 = "但，但是我們比較快啊！"
10044030-170 = "我們可是街頭暴徒，這你應該很清楚吧？"
10044030-171 = "說得沒錯。"
10044030-172 = "但這次的工作特別講求安全和穩定。"
10044030-173 = "所以才選擇了安全更有保障的鐵道運輸。#n咯咯……"
10044030-174 = "該死……我們竟然被鐵道那種東西比下去？"
10044030-175 = "總之這件事已經定案，不用再說下去了。"
10044030-176 = "先，先等一下……！"
10044030-180 = "該死！我不能接受！"
10044030-181 = "知道我們為這件事付出了多少心血嗎……！"
10044030-187 = "老，老大……你還好嗎……？"
10044030-188 = "不要叫我老大，叫我總長！！"
10044030-189 = "噫噫！對，對不起……總，總長！"
10044030-190 = "……發生了什麼事？"
10044030-191 = "我，我依照總長的指示，把團員們都召集起來了。#n接下來該怎麼做呢？"
10044030-192 = "……"
10044030-193 = "既然如此，只有一個辦法了。"
10044030-194 = "什麼辦法……？"
10044030-199 = "就用我們的雙手，把被奪走的機會搶回來吧！"
10044030-201 = "哦哦……！！雖然不是很懂，但聽起來很霸氣！"
10044030-202 = "竟然敢偷走我們的工作，我一定要讓那些人付出代價……！"
10044030-206 = "嘿，高地人的各位！你們說要在這裡下車對吧？"
10044030-207 = "到了～！噗哈哈！"
10044030-208 = "快去找吧～我們的列車～"
10044030-210 = "[ns]「青葉你還好嗎？」"
10044030-212 = "終，終於可以下車了……呼……"
10044030-213 = "同學你很努力忍耐呢。#n幸好一路上沒發生什麼意外！"
10044030-214 = "謝，謝謝……司機先生……這麼關心我……"
10044030-215 = "哇哈哈！#n只要上了我的車，我就一定會把你們平安送達！"
10044030-216 = "怎麼樣？服務品質不輸給列車吧？"
10044030-217 = "的，的確是……這樣沒錯呢……"
10044030-218 = "不過要是搭列車的話，根本就不會暈車了吧？"
10044030-219 = "而且還有廁所～"
10044030-220 = "兩，兩位幹部真是不會看場合說話……#n何必這種時候提這些呢……"
10044030-224 = "雖然列車肯定比較好，但公車其實也不錯啦？噗哈哈哈！"
10044030-225 = "下次再來～司機叔叔掰掰～"
10044030-226 = "哈哈，歡迎再來坐公車～！"
10044030-228 = "[ns]「謝謝你，司機先生！」"
10044030-232 = "現在不用拍背了嗎～？"
10044030-233 = "我看你分明只是想折磨我吧……？"
10044030-235 = "走，我們去找列車吧！！"

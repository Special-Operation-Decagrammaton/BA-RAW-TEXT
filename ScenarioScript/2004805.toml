[translation]
2004805-1 = "A Private Sunset Meeting"
2004805-2 = "Private Beach"
2004805-3 = "Her MomoTalk from earlier bothered me, so I headed out to find Nagisa."
2004805-4 = "However, she was nowhere to be found."
2004805-5 = "All of my calls and messages went unanswered as well."
2004805-9 = "[ns] \"...I haven't checked over there yet.\""
2004805-12 = "I started walking along the beach trail, keeping my eyes peeled for Nagisa."
2004805-13 = "I'd been walking for a while..."
2004805-14 = "[ns] \"Huh...?\""
2004805-15 = "I finally spotted Nagisa from behind."
2004805-17 = "Beachside Road"
2004805-18 = "[ns] \"...Nagisa?\""
2004805-20 = "S-Sensei?"
2004805-21 = "What brings you all the way out here?"
2004805-22 = "What? You've been searching for me since earlier?"
2004805-23 = "I appreciate it, but...I was just thinking of returning."
2004805-24 = "[s] \"Where do you want to go?\""
2004805-25 = "...What?"
2004805-26 = "[s] \"If there's somewhere you want to go, I'll go with you.\""
2004805-27 = "..."
2004805-28 = "Haha. You always surprise me, Sensei."
2004805-29 = "Here I thought you were retrieving a runaway student, but instead you'll assist me with my escape?"
2004805-30 = "But worry not."
2004805-31 = "I didn't have anywhere specific in mind. Just somewhere away."
2004805-35 = "...I sound exactly like a runaway teenager now, don't I?"
2004805-36 = "[s] \"Well... You're not wrong.\""
2004805-37 = "Fufu, I suppose so."
2004805-38 = "..."
2004805-39 = "Today is the last day of our vacation."
2004805-40 = "Tomorrow, I'll have to return."
2004805-41 = "I'll have to leave \"Nagi,\" who relaxes in sunbeds, and return to being \"Kirifuji Nagisa,\" Tea Party house. To that mundane life."
2004805-42 = "I suppose that unpleasant thought is what sent me running."
2004805-43 = "I simply continued west, after the setting sun."
2004805-44 = "Naturally, I cannot run forever. I cannot abandon my position."
2004805-45 = "The many privileges I'm afforded are the cost of the responsibilities I bear."
2004805-46 = "That is why I tried to assuage your concerns."
2004805-47 = "However..."
2004805-48 = "Hm..."
2004805-49 = "...Never mind. I will return."
2004805-50 = "Even the sun returns home at the end of every day."
2004805-51 = "And so we shall as well."
2004805-52 = "[s1] \"But even those mundane days...\"\n[s2] \"...bring something new every time, don't they?\""
2004805-58 = "Yes, you're correct. "
2004805-59 = "I suppose I'm the one who simply decided that every day was the same."
2004805-60 = "And if in those mundane days..."
2004805-61 = "Sensei were to visit me here and there."
2004805-62 = "That on its own would be..."
2004805-63 = "Fufu."
2004805-64 = "Let's go home, Sensei."
2004805-65 = "So that we can one day return to this place."

[translation]
2004805-1 = "ปีกอาบแสงอัสดง"
2004805-2 = "ชายหาดส่วนตัว"
2004805-3 = "(คุณครูตะหงิดใจกับข้อความที่เพิ่งได้รับ จึงออกมาตามหานางิสะ)"
2004805-4 = "(แต่ก็ไม่เห็นนางิสะอยู่ตรงไหนเลย...)"
2004805-5 = "(เธอทั้งไม่รับโทรศัพท์ และไม่ตอบข้อความ...)"
2004805-9 = "[ns] \"จะว่าไป... ยังไม่ได้ไปหาตรงโน้นเลยนี่นา\""
2004805-12 = "(แล้วคุณครูก็ออกไปยังถนนเลียบชายหาดเพื่อตามหานางิสะ)"
2004805-13 = "(หลังจากวิ่งหาอยู่สักพัก...)"
2004805-14 = "[ns] \"หืม...?\""
2004805-15 = "(คุณครูก็หยุดเดินเพราะเห็นด้านหลังของนางิสะ)"
2004805-17 = "ถนนเลียบชายฝั่ง"
2004805-18 = "[ns] \"นางิสะ...?\""
2004805-20 = "คะ... คุณครู?"
2004805-21 = "มาถึงที่นี่ได้ยังไง...?"
2004805-22 = "คะ? ออกมาตามหาฉันเพราะเป็นห่วงงั้นเหรอคะ?"
2004805-23 = "มะ... ไม่เห็นต้องทำถึงขนาดนี้ก็ได้ค่ะ... ยังไงฉันก็กำลังจะกลับอยู่พอดี..."
2004805-24 = "[s] \"อยากไปไหนเหรอ?\""
2004805-25 = "คะ?"
2004805-26 = "[s] \"ถ้ามีที่ที่อยากไป เดี๋ยวครูไปเป็นเพื่อนเอง\""
2004805-27 = "......"
2004805-28 = "ฮ่าฮ่า คุณครูเป็นคนที่คาดเดาความคิดไม่ได้เลยนะคะ"
2004805-29 = "ฉันคิดว่าคุณครูมาจับตัวนักเรียนที่หนีออกมาเสียอีก แต่กลายเป็นว่ามาช่วยให้หนีไกลขึ้นเหรอคะเนี่ย?"
2004805-30 = "แต่ไม่เป็นไรหรอกค่ะ"
2004805-31 = "ฉันแค่อยากไปที่ไหนสักแห่งน่ะค่ะ แต่ไม่ได้เจาะจงหรอกว่าอยากไปที่ไหน"
2004805-35 = "พอพูดไปก็เหมือนข้ออ้างของเด็กที่หนีออกจากบ้านเลยนะคะ"
2004805-36 = "[s] \"ก็... ไม่ได้เป็นคำที่ผิดหรอกนะ\""
2004805-37 = "ฮุฮุ มันก็ใช่นะคะ"
2004805-38 = "......"
2004805-39 = "คุณครูรู้ใช่มั้ยคะว่าวันนี้เป็นวันสุดท้ายของวันหยุดพักร้อนแล้ว?"
2004805-40 = "เมื่อถึงพรุ่งนี้ ฉันก็ต้องกลับไปแล้วค่ะ"
2004805-41 = "นางิจังที่นอนอาบแดดบนเตียง ต้องกลับไปเป็นคิริฟุจิ นางิสะ โฮสต์ของสภาน้ำชา แล้วใช้ชีวิตประจำวันที่เสมอต้นเสมอปลาย..."
2004805-42 = "ที่จริง... ฉันไม่อยากเผชิญหน้าความจริงนั่น ก็เลยหนีออกมาอย่างไร้จุดหมายค่ะ"
2004805-43 = "ฉันไล่ตามพระอาทิตย์ตกดิน แล้วมุ่งหน้าไปทางทิศตะวันตกไปเรื่อยๆ..."
2004805-44 = "แน่นอนว่าฉันไม่มีความคิดจะละทิ้งความรับผิดชอบของตัวเองค่ะ"
2004805-45 = "ฉันรู้ว่าสิทธิ์ที่ฉันได้รับมากมายก็มาจากความรับผิดชอบที่ฉันมี"
2004805-46 = "ก็เลยส่ง MOMOTALK ไปบอกคุณครู คุณครูจะได้ไม่กังวลค่ะ"
2004805-47 = "แต่ยิ่งทำแบบนั้นมันก็..."
2004805-48 = "อืม..."
2004805-49 = "ไม่มีอะไรค่ะ... ค่ะ เรากลับกันเถอะค่ะ"
2004805-50 = "แม้แต่พระอาทิตย์ก็ยังกลับไปอยู่ที่เดิมทุกวัน"
2004805-51 = "เพราะงั้นพวกฉันก็คงอยู่ที่นี่ตลอดไปไม่ได้หรอกค่ะ"
2004805-52 = "[s1] \"แต่เรื่องที่เกิดในแต่ละวันมันก็ต่างกันออกไปนะ...\"\n[s2] \"ถึงวันจะหมุนเวียนตามเดิม แต่เรื่องที่เกิดขึ้นก็ไม่ซ้ำเดิมนะ\""
2004805-58 = "ใช่ค่ะ จริงอย่างที่คุณครูว่านะคะ "
2004805-59 = "บางทีอาจเป็นฉันเองที่เป็นคนกำหนดนิยามเอาตามใจว่าแต่ละวันมันเหมือนกันไปหมด..."
2004805-60 = "และแม้จะเป็นแต่ละวันที่ซ้ำไปซ้ำมา"
2004805-61 = "แต่ถ้าบางครั้งคุณครูมาหากันบ้างแบบนี้..."
2004805-62 = "มันก็..."
2004805-63 = "ฮุฮุ"
2004805-64 = "กลับกันเถอะค่ะ คุณครู"
2004805-65 = "กลับไปที่เดิม เพื่อจะได้กลับมาที่นี่อีกครั้งในสักวันหนึ่งไงคะ"

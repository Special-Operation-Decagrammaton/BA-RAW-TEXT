[translation]
10028080-1 = "บทส่งท้าย;รถบรรทุกคุ้มกัน"
10028080-3 = "ภายในรถบรรทุกคุ้มกันพิเศษของคณะกรรมการวินัย"
10028080-7 = "อาชญากรมาถึงแล้ว! ผูกโซ่ได้!!"
10028080-15 = "รีบเข้าไปเร็ว! อย่าแม้แต่จะคิดทำอะไรไร้สาระ!"
10028080-20 = "...หยุดนะ! นั่งให้สงบเสงี่ยมจนกว่าจะไปถึงเกเฮนน่า! เข้าใจมั้ย?"
10028080-21 = "ล็อกโซ่!! ล็อกตรวน!!"
10028080-26 = "แล้วที่เหลือล่ะ? ทุกคนอยู่ในรถคันอื่นเหรอ? บรรทุกแก๊งอันธพาลมาหมดแล้วใช่มั้ย?"
10028080-27 = "ทำไมรถคันนี้มีแต่ 'ยัยเด็กนี่' คนเดียวล่ะ... ต้องมีอะไรผิดพลาดตรงไหน..."
10028080-28 = "แต่รถก็มีหลายคันนี่นา อีกอย่าง... ยัยเด็กนี่ต้องควบคุมตัวแบบพิเศษด้วย"
10028080-29 = "รุ่นพี่อิโอริบอกไว้ว่า \"นี่คือคนที่ต้องเฝ้าระวังเป็นพิเศษ และต้องระมัดระวังเป็นพิเศษ\" น่ะ"
10028080-30 = "คนที่ต้องเฝ้าระวังเป็นพิเศษเหรอ... ฉันก็ได้ยินข่าวลือมาบ้าง แต่ว่าดูทรงแล้วไม่น่าเป็นคนแบบนั้นนะ..."
10028080-31 = "หยุดพูดเลย อาชญากรคนนี้ทำให้ทีมคุ้มกันส่วนใหญ่ต้องไปห้องพยาบาล แล้วก็ทำรถไฟคว่ำเชียวนะ คนแบบนี้ไม่มีทางไร้พิษสงหรอก"
10028080-32 = "ก็นะ ถ้าฟังจากรุ่นพี่คนอื่นหรือทีมไล่ล่า ก็เห็นว่าอย่างนั้นกัน..."
10028080-33 = "แต่ยังไงก็คงดวงกุดในวันนี้แหละ เพราะจากนี้ไปยัยนี่จะโดนคุมตัวไปที่คณะกรรมการวินัย และจะโดน#nขังไว้ในห้องที่ไม่มีทางหนีออกมาได้เด็ดขาด"
10028080-34 = "........."
10028080-35 = "...จะว่าไป พอยัยนี่ไม่ต่อล้อต่อเถียงอะไรเลยสักคำมันก็น่าหงุดหงิดอยู่นะ"
10028080-36 = "ช่างเถอะน่า เราแค่ทำงานของพวกเราก็พอแล้วละ แล้วตอนนี้มันก็กลางคืนแล้วด้วย กว่าจะถึงสำนักงานใหญ่ก็คงเช้ามืดเลย"
10028080-37 = "ปิดประตูหลัง! เตรียมออกเดินทาง! ทุกคนเข้ามาข้างในและนั่งลง!!"
10028080-38 = "ทุกคนนั่งลง!! ห้ามเปลี่ยนที่!! อยู่แบบนี้ไปจนกว่าจะถึงสำนักงานใหญ่!!"
10028080-44 = "...ออกเดินทางได้!"
10028080-50 = "......"
10028080-51 = "......♪"
10028080-56 = "...นี่ รู้อะไรรึเปล่า?"

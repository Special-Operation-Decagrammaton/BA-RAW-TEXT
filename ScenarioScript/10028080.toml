[translation]
10028080-1 = "Epilogue;Transport Truck"
10028080-3 = "Prefect Team Inside the Special Transport Truck"
10028080-7 = "The target's arrived! Chains linked!"
10028080-15 = "Hurry up and get in there! Don't even think about starting something!"
10028080-20 = "Stop there! Don't move a muscle until we get to Gehenna!"
10028080-21 = "Chains and shackles secured!"
10028080-26 = "What about the rest of the convoy? All the gang members are secured?"
10028080-27 = "She's the only passenger for this vehicle, correct?"
10028080-28 = "We had more than enough vehicles, and this one requires...extra care..."
10028080-29 = "Iori's parting words were, \"Be on high alert. She's on our most wanted list.\""
10028080-30 = "Most wanted... Her? She really doesn't seem like all that much."
10028080-31 = "You didn't see the havoc she caused. She sent the entire train crew to the infirmary and blasted the train to high heaven. This isn't your average criminal."
10028080-32 = "I know, I know. I've heard some insane stories from our upperclassmen."
10028080-33 = "But all of that ends today. She'll be taken to the Prefect Team's headquarters and never see the light of day again."
10028080-34 = "..."
10028080-35 = "She won't say a word though. Hey! You! See? It's a little annoying..."
10028080-36 = "Don't worry about anything besides your job. We need to get her to headquarters ASAP."
10028080-37 = "Rear gate closed! Standby for take off! All get seated inside!"
10028080-38 = "All seated! Seat fixed! Maintain position until arrival!"
10028080-44 = "Let's go!"
10028080-50 = "..."
10028080-51 = "...♪"
10028080-56 = "...Hey. You wanna know something?"

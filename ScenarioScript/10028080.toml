[translation]
10028080-1 = "尾聲;護送卡車"
10028080-3 = "風紀委員會．特殊護送卡車內部"
10028080-7 = "通緝犯已抵達！繫上鎖鏈！！"
10028080-15 = "快進去！別想亂來！"
10028080-20 = "……好，停下來！在抵達格黑娜前給我乖乖坐好！聽到了嗎？"
10028080-21 = "鎖鏈已固定！！腳鐐已固定！！"
10028080-26 = "其他人呢？都在別台卡車上嗎？#n幫派的傢伙們應該全都要運上車吧？"
10028080-27 = "怎麼這輛卡車只載了「這個傢伙」……這樣對嗎？"
10028080-28 = "反正車子多的是嘛。#n而且這傢伙……是需要特別管理的個案。"
10028080-29 = "伊織前輩說他是「需要注意的人物，要格外留意」。"
10028080-30 = "需要注意的人物……雖然早就聽過傳聞，但乍看之下感覺不怎麼樣……"
10028080-31 = "你可別小看他。他可是把護送隊大半的人都送進保健室，#n甚至連列車都弄翻的怪物啊。肯定不是正常人。"
10028080-32 = "說的也是。#n我也從其他前輩和追蹤隊那裡聽說過，確實很不得了……"
10028080-33 = "但那也只到今天為止了。#n我們會把他帶回風紀委員會總部，關進密不透風的房間裡。"
10028080-34 = "…………"
10028080-35 = "……話說他還真是一句話也不吭耶，讓人莫名的不爽。"
10028080-36 = "算了，隨他高興吧，我們只要做好該做的事就好。#n現在時間也不早了，得在凌晨之前抵達總部才行。"
10028080-37 = "關閉後門！準備出發！所有人就座！！"
10028080-38 = "全員就座！！座位固定！！在抵達總部前都要維持這個狀態！！"
10028080-44 = "……出發！"
10028080-50 = "…………"
10028080-51 = "…………♪"
10028080-56 = "……吶，你們知道嗎？"

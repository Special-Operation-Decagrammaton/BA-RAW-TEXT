[translation]
10023070-1 = "ตอนที่ 7;เกมที่อันตรายไม่ใช่เล่น"
10023070-4 = "งือ..."
10023070-5 = "มืดจนไม่เห็นอะไรข้างหน้าเลย..."
10023070-10 = "โอ๊ย! ใครเหยียบเท้าฉันน่ะ!"
10023070-12 = "พี่โมโมอิ ชู่ว! เงียบๆ สิ!"
10023070-18 = "!?  ระวังกันด้วยนะคะ มีบางอย่างลื่นๆ ด้วยค่ะ"
10023070-19 = "อ๊ายย! นั่นผมของอาริสึเองค่ะ!"
10023070-20 = "[s] \"บันไดนี้... มันจะไปสิ้นสุดตรงไหนเนี่ย...\""
10023070-22 = "เราอาจจะรู้สึกว่าเดินมานานแล้วเพราะค่อยๆ เดินกัน... แต่นี่ก็ลงกันมาลึกมากแล้วนะคะ..."
10023070-31 = "โอ๊ย! หัวฉันไปชนอะไรเข้าเนี่ย...!"
10023070-32 = "เอ๋? หรือว่า... ทางข้างหน้ามันเป็นทางตัน?"
10023070-34 = "รอฉันสักครู่นะคะ"
10023070-35 = "บางทีตรงนี้อาจจะมีประตูอะไรก็ได้......"
10023070-48 = "ของที่จะประมูลชิ้นต่อไปคืออะไร! ชิ้นต่อไปน่ะ!"
10023070-49 = "ของแบบนี้มันก็ดีอยู่หรอก แต่เอาชิ้นที่ใหญ่กว่านี้มาสิ! เงินน่ะเตรียมไว้หมดแล้ว!"
10023070-50 = "ถึงจะไม่ชนะการประมูล แต่ก็อยากเห็นของกับตาของตัวเองจัง"
10023070-51 = "ใช่ ใช่!"
10023070-52 = "ของในข่าวลือนั่นน่ะ...!"
10023070-54 = "<มงกุฎเจ้าแห่งนาฬิกา>!"
10023070-56 = "เอะ... เอ๋....?"
10023070-57 = "การประมูลไม่ได้จะจัดพรุ่งนี้หรอกเหรอคะ? แล้วห้องใต้ดินนี้ กับการประมูลที่ได้ยินตอนนี้คืออะไรกัน...?"
10023070-59 = "เอาละๆ ทุกคนรอก่อนนะครับ เรายังมีของประมูลอีกหลายชิ้นที่ต้องจัดการก่อนครับ"
10023070-60 = "ของยังเหลืออีกเยอะ และค่ำคืนนี้ก็ยังอีกยาวไกลครับ <มงกุฎเจ้าแห่งนาฬิกา> จะเป็นของปิดท้ายครับ!"
10023070-62 = "โธ่เอ๊ย เอามาให้ดูก่อนตอนนี้ก็ได้นี่นา!"
10023070-63 = "เล่นตัวมากเกินไปแล้วนะ คุณเมทาโร่!"
10023070-64 = "แต่จอมโจรแห่งความเสน่หานั่นจะไม่โผล่มาใช่ไหม? งั้นก็ประมูลได้เหมือนเดิมไหมนะ?"
10023070-65 = "นั่นน่ะสิ! พวกเราก็กังวลไม่แพ้กับคุณเมทาโร่หรอกค่ะ!"
10023070-66 = "ฮ่าฮ่าฮ่าฮ่า! เรื่องนั้นผมเตรียมตัวเอาไว้แล้วครับ เราจะดึง C&C กับชาเล่ต์ให้มาอยู่ในงานด้วยไงครับ!"
10023070-67 = "ระหว่างที่พวกนั้นต่อสู้กับจอมโจรแห่งความเสน่หาเพื่อยื้อเวลา เราก็จะประมูลกันต่อให้เสร็จได้ครับ"
10023070-68 = "ถ้าพวกนั้นเอาชนะจอมโจรแห่งความเสน่หาได้ ก็เป็นเรื่องดีสำหรับเรา แต่ถ้าสู้กันจนเจ็บไปทั้งสองฝั่ง#nก็ไม่เป็นอะไรเหมือนกันครับ"
10023070-69 = "ต่อให้จอมโจรแห่งความเสน่หาเอาชนะชาเล่ต์กับ C&C และมาถึงที่นี่ได้ ยังไงสภาพร่างกายก็ไม่เต็ม#nร้อยอยู่ดีครับ แบบนั้นยามของผมก็จัดการได้ครับ!"
10023070-74 = "ได้ฟังอย่างนี้ก็โล่งใจขึ้นมาเลยแฮะ ก็ดี ต้องอย่างนี้สิคุณเมทาโร่"
10023070-75 = "เอาละ ไปที่ชิ้นต่อไปเลย"
10023070-76 = "ถ้าปิดการประมูลชิ้นอื่นได้เร็ว ก็ยิ่งได้เห็น <มงกุฎเจ้าแห่งนาฬิกา> ได้เร็วเท่านั้นใช่ไหมล่ะ"
10023070-77 = "ขอบคุณครับ"
10023070-78 = "และของที่จะประมูลชิ้นต่อไปก็คือ... <โกลเดน คาแนรี> ครับ!"
10023070-79 = "เพชรสีเหลืองที่ถูกสกัดมาจากอุกกาบาตนี้!"
10023070-80 = "เป็นที่หมายปองของทุกคนในตลาดมืด แต่สุดท้ายผมก็ได้มันมาครอบครอง..."
10023070-85 = "คุณเมทาโร่...?"
10023070-86 = "ก็ว่าอยู่ว่ามันหายไปอยู่ไหน สรุปว่ามาอยู่กับเขานี่เองนะคะ"
10023070-87 = "อีกอย่าง ของที่เอามาประมูลกัน ฉันว่ามันไม่ปกติค่ะ"
10023070-89 = "แหล่งประมูลสินค้าในเกม RPG เป็นที่แลกเปลี่ยนไอเทมมีค่า หรือไม่ก็เป็นที่เอาไว้ลอบคิดแผนร้ายค่ะ..."
10023070-93 = "จริงด้วยค่ะ! ถ้าอยากเข้าร่วมการประมูลก็ต้องมีเครดิตค่ะ งั้นพวกเราต้องทำเควสพิเศษ หรือไม่ก็ต้อง#nจัดการมอนสเตอร์แรร์ๆ ให้ได้ค่ะ!"
10023070-94 = "คนที่อยู่ข้างล่างตรงนั้นเป็นมอนสเตอร์แรร์ทั้งหมดเลยไหมคะ?"
10023070-95 = "[s] \"ในแง่หนึ่งก็อาจจะใช่นะ แต่ว่าอย่าดีกว่า! อย่าเลย!\""
10023070-100 = "ผมรู้สึกได้กลิ่นความโกลาหลแปลกๆ นะครับ..."
10023070-108 = "เฮือก?! พวกคุณ... C&C?"
10023070-109 = "พวกคุณเข้ามาที่นี่กันได้ยังไงครับ? ผมบอกให้ไปเฝ้าระวังจอมโจรแห่งความเสน่หาไม่ใช่เหรอ..."
10023070-111 = "C... C&C งั้นเหรอ? นี่มันอะไรกัน คุณเมทาโร่?!"
10023070-112 = "คุณหลอกพวกเราเหรอ? หรือว่าเป็นกับดัก?"
10023070-113 = "<มงกุฎเจ้าแห่งนาฬิกา> ที่ C&C กำลังตามหา... อยู่ที่นี่เองสินะคะ"
10023070-114 = "!!!"
10023070-115 = "ไม่ใช่แค่นั้นด้วย มีทั้ง <โครโนสที่กำลังอุ้มลูกชาย> <อินันนาเก็บรวงข้าว> <รูปปั้นสลักหินของวีนัส>... มีเยอะจนนับไม่หวาดไม่ไหวเลยนะคะ"
10023070-116 = "[s] \"งานศิลปะพวกนี้มันเป็นยังไงเหรอ โทคิ?\""
10023070-117 = "ทั้งหมดเป็นสินค้าที่ได้มาจากธุรกรรมผิดกฎหมายระหว่างองค์กรอาชญากรรมค่ะ"
10023070-118 = "[s1] \"ของทุกชิ้นที่จอมโจรแห่งความเสน่หาอยากได้\"\n[s2] \"ไม่ได้เป็นงานศิลปะทั่วไปหรอกเหรอ...?\""
10023070-121 = "ฉันได้รับภารกิจอีกอย่างมาพร้อมกับภารกิจไล่ล่าจอมโจรแห่งความเสน่หาค่ะ"
10023070-122 = "และนั่นก็คือภารกิจตามหา <มงกุฎเจ้าแห่งนาฬิกา> และของชิ้นอื่นที่ถูกขโมยไปด้วยค่ะ"
10023070-123 = "ตอนแรกฉันคิดว่าถ้าจับจอมโจรแห่งความเสน่หาได้เรื่องก็คงคลี่คลาย แต่ไม่คิดเลยนะคะ ว่าที่ชั้นใต้ดินของคฤหาสน์จะมีการซื้อขายของพวกนี้อยู่ด้วย"
10023070-124 = "แต่เราไม่รู้มาก่อนว่า C&C กำลังตามหางานศิลปะนะ!"
10023070-125 = "ก็คุณไม่ได้ถามนี่คะ"
10023070-129 = "ฮึ่ม...!"
10023070-131 = "กองกำลังรักษาความปลอดภัย! จับตัว C&C เอาไว้... อย่าให้มีอะไรเสียหายล่ะ!"

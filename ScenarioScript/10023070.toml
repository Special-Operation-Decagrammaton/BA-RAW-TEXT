[translation]
10023070-1 = "第7話;這是危險的遊戲"
10023070-4 = "嗚嗚嗚……"
10023070-5 = "完全看不見前面……"
10023070-10 = "好痛！誰踩到我的腳！？"
10023070-12 = "姐姐，噓！安靜一點！"
10023070-18 = "！？大家請小心。腳邊變得有點滑。"
10023070-19 = "嗚哇啊！那是愛麗絲的頭髮！"
10023070-20 = "[s]「這個階梯，好像看不見盡頭……」"
10023070-22 = "我們應該已經走了一定的距離才對……#n雖然也可能是因為前進得很謹慎才會這麼覺得……"
10023070-31 = "啊！好像撞到了什麼……！"
10023070-32 = "咦，那是……"
10023070-34 = "這是……"
10023070-35 = "是門嗎……"
10023070-48 = "下一件下一件，快拿上來！"
10023070-49 = "這次的重點什麼時候才會出現啊！？#n錢我都準備好了！"
10023070-50 = "……雖然沒有自信得標，至少也要親眼見識一下真品啊。"
10023070-51 = "就是說啊！我們都是為了那個而來的！"
10023070-52 = "請快拿出來讓我們見識見識吧……"
10023070-54 = "──「時鐘王之冠」！"
10023070-56 = "咦，咦……？"
10023070-57 = "拍賣會不是明天才開始嗎……為什麼會在地下……？"
10023070-59 = "好了好了，請各位冷靜一下。#n我還準備了很多好東西。"
10023070-60 = "夜晚很長，還請各位慢慢享受。#n「王冠」將會是壓軸好戲──"
10023070-62 = "哼，現在拿出來給我們看一看也無所謂吧！"
10023070-63 = "有必要裝模作樣嗎，明太郎先生！"
10023070-64 = "再說，昨天「慈愛的怪盜」不是出現了嗎？#n舉辦拍賣會沒問題嗎？"
10023070-65 = "就是說啊！最不安的或許是明太郎先生沒錯，但我們的心情也是一樣的啊！"
10023070-66 = "哈哈哈！既然已經收到了預告信，我自然有所準備。#n──那就是雇來了C&C和夏萊負責這座宅邸的警備！"
10023070-67 = "在他們爭取來的這段期間內，我們將完成拍賣會。"
10023070-68 = "能夠抓住怪盜當然是再好不過……#n但對我來說，即使他們同歸於盡也完全無所謂。"
10023070-69 = "而且──就算「慈愛的怪盜」能夠突破他們到達這裡，想必也會有一定的消耗吧！#n如此一來，只要交給我的隨從就夠了！"
10023070-74 = "確實……這可以說的上是萬全的對策了吧。#n不愧是明太郎先生。"
10023070-75 = "趕緊開始下一件商品的拍賣吧。"
10023070-76 = "否則永遠無法親眼見識「時鐘王之冠」不是嗎？"
10023070-77 = "謝謝各位。"
10023070-78 = "下一件商品……就是這個「黃金卡納里亞」！"
10023070-79 = "是把隕石中產出的黃鑽研磨而成的逸品……！"
10023070-80 = "由於在黑市中成為了抗爭的火種，是幾經波折才總算送到我手中的瑕疵品──"
10023070-85 = "明太郎先生……？"
10023070-86 = "原來如此。還以為他跑到哪裡去了，原來是在這種地方啊。"
10023070-87 = "而且被交易的商品全都是下落不明的失竊物品……"
10023070-89 = "RPG中的拍賣場都是交易貴重的神器，或是能發現與敵人陰謀有關的線索的地方……"
10023070-93 = "愛麗絲想起來了！要參加拍賣會就需要立起旗子才行！#n必須完成特殊的任務，或是打倒稀有怪物準備大量的信用貨幣！"
10023070-94 = "在那邊的就是這個區域的稀有怪物嗎？"
10023070-95 = "[s]「他們不是怪物哦！？」"
10023070-100 = "呣呣，好像吵吵鬧鬧的……"
10023070-108 = "……啊，C&C怎麼會在這裡！？"
10023070-109 = "你們不是應該在對付「慈愛的怪盜」嗎……？"
10023070-111 = "竟，竟然是C&C？#n這跟你說的不一樣啊，明太郎先生！"
10023070-112 = "你欺騙了我們嗎？"
10023070-113 = "「時鐘王之冠」──C&C在尋找的贓物，原來就在這裡啊。"
10023070-114 = "！！！"
10023070-115 = "呼呣，看來似乎不僅如此呢。#n「舉起兒子的克洛盧斯」、「拾穗的伊南納」。#n──居然連「貝努斯的石像」都在。"
10023070-116 = "[s]「季，你有什麼頭緒嗎？」"
10023070-117 = "是的──這些全都是在犯罪組織間非法交易的藝術品。"
10023070-118 = "[s1]「季的另一個任務……」\n[s2]「就是追蹤失竊物品的去向……？」"
10023070-121 = "是的，正如老師所說。"
10023070-122 = "我的任務就是找出以「時鐘王之冠」為首的失竊物品的去向。"
10023070-123 = "本以為只要追蹤「慈愛的怪盜」就能找到它們，因此才會來到這座宅邸……#n──沒想到會在地下進行違法交易啊。"
10023070-124 = "這，這跟你說的不一樣！#n我可沒聽過這種事啊！"
10023070-125 = "當然，因為你沒有問。"
10023070-129 = "呣呣呣……！"
10023070-131 = "你們！給我抓住C&C……動作務必要「慎重」！"

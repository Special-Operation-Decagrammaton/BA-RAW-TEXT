10023070-56 = "4;미도리 메이드;02\n2;모모이 메이드ND;04;어, 어어……?\n#2;em;[땀]\n#2;stiff\n#2;a\n#4;a"
10023070-57 = "4;미도리 메이드;05;경매는 내일 열리는 거 아니었나요? 이 지하 공간과, 지금의 경매는 대체……?"
10023070-58 = "#all;hide"
10023070-59 = "3;메이타로;00;자, 자. 기다리십시오. 여러분. 아직 우리에게는 처리해야 할 경매품들이 많습니다.\n#3;jump\n#3;a"
10023070-60 = "3;메이타로;00;밤은 길고, 물건은 충분합니다. <시계왕의 왕관>은, 그 대미를 장식할 것입니다!"
10023070-61 = "#all;hide"
10023070-62 = "#na;흥분한 게스트;그거참, 보여주는 것만이라면 지금도 할 수 있잖아!\n#bgshake\n#fontsize;80"
10023070-63 = "#na;격앙한 게스트;너무 비싸게 구는 것 아닌가, 메이타로 씨!"
10023070-64 = "#na;냉정한 게스트;하지만 그 자애의 괴도가 나타나지 않았나. 경매가 진행될 수 있기는 한 건가?"
10023070-65 = "#na;들뜬 게스트;그렇습니다! 가장 불안한 것은 메이타로 씨 본인이시겠지만, 저희도 마찬가지입니다!"
10023070-66 = "3;메이타로;00;하하하하! 그걸 위해 준비해 둔 것이 있습니다. C&C와 샬레를 이 현장에 끌어들인 것이죠!\n#3;hophop\n#3;em;[재잘]\n#3;a"
10023070-67 = "3;메이타로;00;그들이 자애의 괴도와 싸우며 시간을 버는 사이에, 우리는 경매를 끝내 버릴 수 있습니다."
10023070-68 = "3;메이타로;00;자애의 괴도를 물리쳐 주면 우리야 좋은 것이고, 싸우다가 공멸해 버려도 상관없습니다."
10023070-69 = "3;메이타로;00;만에 하나 자애의 괴도가 샬레와 C&C를 물리치고 여기까지 도달한다 한들, 정상적인 상태는 아닐 겁니다! 그 정도야 제 경비대로 얼마든지 상대할 수 있겠죠!\n#3;em;[!]\n#3;closeup"

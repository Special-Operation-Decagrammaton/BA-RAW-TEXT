[translation]
10023070-1 = "Episode 7;A Dangerous Game"
10023070-4 = "Oh no..."
10023070-5 = "I can't see anything..."
10023070-10 = "Ow! Who stepped on my foot?"
10023070-12 = "Shh! Momoi! Keep it down!"
10023070-18 = "Hm!? Watch your step. It's slippery here."
10023070-19 = "The slippery thing is my hair!"
10023070-20 = "[s] \"These stairs feel never ending...\""
10023070-22 = "The dark has made our progress slow, but we've been going down for a while."
10023070-31 = "Ow! I hit my head on the wall this time!"
10023070-32 = "A wall? That means we hit a dead end!"
10023070-34 = "Everyone, please hold for just a moment."
10023070-35 = "I think there's a door...right...here!"
10023070-48 = "What's being auctioned next? Bring it out!"
10023070-49 = "We came here for a show! Bring out something worth my money!"
10023070-50 = "...Even if I don't win the bid, I would love to see it with my own eyes..."
10023070-51 = "That's right!"
10023070-52 = "The one and only..."
10023070-54 = "...The Clock King's Crown!"
10023070-56 = "What...?!"
10023070-57 = "I thought the auction was tomorrow! What's going on?"
10023070-59 = "Now, now. Please be patient. We still have many other rare merchandise to show you."
10023070-60 = "The night is young, and there are plenty of items. The Clock King's Crown will be the highlight of the auction!"
10023070-62 = "We don't care about a highlight! Just show us!"
10023070-63 = "They're right, Meitaro! You're dragging this out way too long!"
10023070-64 = "Are you not going to address the sightings of the Benevolent Thief? Can we even continue in this environment?"
10023070-65 = "You're not the only one feeling nervous about that thief, Meitaro!"
10023070-66 = "Hahaha. Please, you are shouting over a non-issue. I have brought not only C&C, but Schale for our complete protection."
10023070-67 = "I have set them on the task of defeating the Benevolent Thief, distracting both parties long enough for us to finish the real auction."
10023070-68 = "If they actually succeed, then that's fantastic news for us. If they go down together, I have no complaints."
10023070-69 = "In the worst case scenario, if the Benevolent Thief somehow comes out triumphant against Schale and C&C, it will not be unscathed. My own security detail will take over from there."
10023070-74 = "Well thought out by Meitaro, as always. I'm sure we'll be safe."
10023070-75 = "All right, bring out the next item!"
10023070-76 = "Let's get through these with haste. Then we can at last see the Clock King's Crown, yes?"
10023070-77 = "Thank you, all."
10023070-78 = "Our next item up for bid is none other than the Golden Canary!"
10023070-79 = "A one-of-a-kind, yellow diamond extracted from a meteorite, polished to become this gem!"
10023070-80 = "It was once the center of countless conflicts within Black Market. After disappearing for a time, I'm happy to say I've procured it for this auction!"
10023070-85 = "That's... Meitaro...?"
10023070-86 = "He seemed to have vanished, but there he is."
10023070-87 = "And every item in this auction seems to be incredibly special or rare."
10023070-89 = "In RPGs, auctions are usually where rare artifacts are sold or suspicious schemes unfold..."
10023070-93 = "Ah! We must need Credits to join this auction. To earn Credits, we have to complete special quests or defeat monsters!"
10023070-94 = "Sensei, are those people rare monsters that will drop lots of Credits?"
10023070-95 = "[s] \"We're not sure yet, but let's say no for now, to be safe!\""
10023070-100 = "Something seems noisy, and not in the way I like at an auction."
10023070-108 = "Huh? C&C? What are you doing down here?!"
10023070-109 = "Why are you down here? You should be facing the Benevolent Thief!"
10023070-111 = "C&C is here?! What's going on, Meitaro!"
10023070-112 = "Did you fool us? Is this a trap?"
10023070-113 = "The Clock King's Crown was here after all. It is a stolen item that C&C has been searching for."
10023070-114 = "...!"
10023070-115 = "That's not all. Kronos Holding His Son, the Gleaning Ishtar, the Statue of Venus... There are just too many to name."
10023070-116 = "[s] \"What's wrong with them, Toki?\""
10023070-117 = "Every single item up for bid today is an illegal piece being passed around in the underworld."
10023070-118 = "[s1] \"The Benevolent Thief is after these illegal items?\" \n[s2] \"These are no ordinary artworks to steal...\""
10023070-121 = "Remember when I told you I had one additional mission besides tracking down the Benevolent Thief?"
10023070-122 = "My mission was to find these stolen pieces, including the Clock King's Crown."
10023070-123 = "Naturally, I assumed both missions ended with apprehending the Benevolent Thief. The stolen artworks appearing in a basement under the mansion was an unexpected twist."
10023070-124 = "You did not inform me C&C was also looking for stolen artworks!"
10023070-125 = "You did not ask."
10023070-129 = "Ugh...!"
10023070-131 = "Guards! Take care of the C&C and arrest them...gently."

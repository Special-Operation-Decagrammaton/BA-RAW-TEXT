[translation]
22020-1 = "Episode 2; A Day at the Game Dev Department"
22020-3 = "It was a rare occasion where there was no work at Schale, and I had some free time."
22020-4 = "I received a request from the Game Development Department to participate in a club activity."
22020-5 = "Though I wasn't given any details on the activity itself."
22020-9 = "Millennium Game Development Department"
22020-15 = "Hah! Get ready, Sensei!"
22020-16 = "This is my super secret, ultimate move!"
22020-17 = "Momoi Splash!"
22020-18 = "Before I knew what was happening, I was playing a fighting game with Momoi."
22020-19 = "[s] \"Momoi's super-secret, ultimate move...!\""
22020-28 = "Heeheehee! There are no blind spots in my cruel combo attack! I'm not gonna stop until your HP reaches zero!"
22020-29 = "Hiyaaaaaa!"
22020-43 = "*thud* *flop*"
22020-47 = "MOMORIA LOSES!"
22020-51 = "[USERNAME] WINS!"
22020-57 = "Wahhh! How come my combo whiffed?!"
22020-58 = "[s1] \"You just press buttons without thinking when you're in a hurry.\"\n[s2] \"Your greedy combo attacks aren't gonna work on me, Momoi!\""
22020-61 = "Wh-What?! Did Sensei already figure out my attack patterns?!"
22020-62 = "I thought Sensei was a total beginner who never played this game before."
22020-63 = "Hey! Don't rub it in, Midori!"
22020-64 = "That one didn't count!"
22020-65 = "One more! Let's do one more match, Sensei! I swear I'm gonna show you my secret combo..."
22020-66 = "[s] \"You've said that after each of the last eight matches, Momoi...\""
22020-67 = "Huh? We've already played eight matches?!"
22020-68 = "Yeah, that's enough. Sensei's too nice to say no to you."
22020-69 = "B-But I can't end on a loss. It hurts my pride as a gamer..."
22020-70 = "This nonsense again..."
22020-71 = "So it's okay for Sensei to end on a loss? Everything revolves around you?"
22020-72 = "What?! Oh... I didn't really think of that."
22020-73 = "[s] \"It's okay.\""
22020-74 = "*sigh* Sensei, you shouldn't let her get away with things all the time."
22020-75 = "The only thing on your mind is the game..."
22020-76 = "I hope you didn't forget the actual purpose of today's club activities."
22020-78 = "*gasp* Right...!"
22020-79 = "...Right?"
22020-80 = "Oh, no! Midori! I remember, of course! Yeah, I swear!"
22020-81 = "[s] \"Come to think of it, I still don't know why I'm here...\""
22020-82 = "Don't tell me you brought Sensei here without explaining anything to them."
22020-83 = "Hey!"
22020-84 = "I-I was planning on explaining right now! Duh!"
22020-85 = "The purpose of today's club activity is..."
22020-89 = "To begin brainstorming ideas for our next video game!"
22020-90 = "[s] \"The next video game?\""
22020-91 = "Yes, we at the Game Development Department think it's time to pursue a new endeavor."
22020-92 = "Right! When we heard that you had some free time, which almost never happens, we had to have you here!"
22020-93 = "[s3] \"...I'm sorry I can't come more often.\"\n[s4] \"I've been less busy lately, for sure.\""
22020-96 = "Well, we all know how busy you are... We appreciate you coming out!"
22020-97 = "Anyway, we'd like to hear your opinions on our next project!"
22020-98 = "You might have incredible and fresh ideas to contribute!"
22020-99 = "That's what we were all thinking...and that's why we asked you to be here!"
22020-100 = "[s] \"Oh, wow... That's a lot of pressure...\""
22020-102 = "[ns] \"But wait, how come we've only been playing this fighting game, then?\""
22020-103 = "Oh, that was her idea."
22020-104 = "It was market research, okay?! Research!"
22020-105 = "Just sitting around struggling to come up with ideas together doesn't guarantee good results!"
22020-106 = "So we thought we could play popular games and analyze them to help get our juices flowing."
22020-107 = "[s] \"That actually does make sense.\""
22020-108 = "Heeheehee! Right?! Especially the game we were just playing..."
22020-109 = "The Fist of Cassiopeia - Upalupa Great Battle is one of the most popular and controversial titles in the fighting game world!"
22020-110 = "There's a lot to learn from this game. We should dig into it thoroughly and analyze it!"
22020-111 = "I'm sure we'll come up with some great ideas for our next project!"
22020-112 = "So, our next project is basically a therapeutic dungeon strategy RPG where you take on quests, go fishing, farm, and develop your characters."
22020-113 = "[s] \"Huh?! What do fighting games have to do with that?!\""
22020-114 = "What kind of question is that, Sensei?!"
22020-115 = "I know the connection between a dungeon strategy RPG and fighting games isn't immediately obvious, but..."
22020-116 = "[s] \"But...?\""
22020-117 = "Heeheehee! Well, you can't judge a book by its cover!"
22020-118 = "To win the next Millennium Prize, we have to take risks that no one has ever even fathomed!!"
22020-119 = "In short, forget the stereotypes, overcome your prejudices and reach for new horizons!"
22020-120 = "We were thinking that combining elements from two seemingly unrelated genres might bring about a refreshing and interesting game."
22020-121 = "Midori! I was getting to that part!"
22020-122 = "You were taking too long to explain, so I just did it for you."
22020-123 = "Waaah! You're so mean!"
22020-124 = "[s] \"Well, it's nice that everyone is putting in their all for your club activities.\""
22020-125 = "Really?!"
22020-126 = "Ah..."
22020-127 = "Heehee!"
22020-128 = "Well, of course!"
22020-129 = "Right, Momoi and I, Yuzu, and Aris..."
22020-130 = "We promised to totally rule the Millennium Prize next time."
22020-131 = "Yes. That's our quest right now."
22020-137 = "Momoi! Midori! Sensei! It is an emergency!"
22020-138 = "[s] \"Hi, Aris. What's going on?\""
22020-139 = "Huh? What's wrong all of a sudden, Aris?"
22020-140 = "Yuzu has finally entered the challenge to win ten online battles in a row!"
22020-141 = "Really?! No way!"
22020-142 = "What? Ten wins in a row?"
22020-160 = "UZQueen WINS!"
22020-165 = "Whoa..."
22020-166 = "That was so cool, Yuzu!"
22020-167 = "Yuzu, you're always so amazing."
22020-169 = "I was impressed too! You truly are a legendary hero, UZQueen!"
22020-170 = "Wh-What...? Huh?"
22020-171 = "[s] \"Yuzu! Amazing! That was a perfect victory!\""
22020-172 = "Right? Perfect Yuzu! You were in UZQueen Mode! "
22020-173 = "[s] \"UZQueen Mode...?\""
22020-174 = "UZQueen Mode is like a buff that's activated when Yuzu is in a high-intensity situation!"
22020-175 = "It's a state that makes her feel bolder and more confident than usual...where her brain works 150% faster than normal and visual detection increases by 280%!"
22020-176 = "You just made that up..."
22020-177 = "I know it too! Yuzu is very strong in that state! I would love to have a skill like UZQueen Mode!"
22020-178 = "[s] \"Incredible! UZQueen Mode!\""
22020-179 = "Sensei?!"
22020-180 = "Th-That's not...! Augh!"
22020-181 = "It really isn't anything special..."
22020-182 = "Watching Yuzu's achievements, I am inspired to take action."
22020-183 = "It is my turn next!"
22020-185 = "While everyone was watching, Aris' fighting game challenge began."
22020-187 = "I will become a fighting game hero like Momoi, Midori, Yuzu, and Sensei!"
22020-188 = "Momoi is more like a trash mob monster..."
22020-189 = "Hey! Just because it's true, doesn't mean you should say it!"
22020-190 = "A-Aris... Good luck!"
22020-191 = "Yes! I will do my best!"
22020-192 = "Challenger for the next battle!"
22020-194 = "[ns] \"Oh, a challenger has appeared.\""
22020-196 = "I will show off the skills I obtained by training with Momoi!"
22020-197 = "Hiyap!"
22020-201 = "Hmm! Yah! Yup."
22020-207 = "The opponent is dodging all the attacks..."
22020-208 = "Not yet! This is only the beginning!"
22020-209 = "I got this!"
22020-219 = "Huh? What was that..."
22020-220 = "When Aris hit the opponent, did her own character's HP go down?"
22020-221 = "I... I can do this!"
22020-227 = "[ns] \"Oh, now the opponent just... disappeared...?\""
22020-228 = "H-Huh?"
22020-234 = "The opponent ambushed Aris from behind!"
22020-235 = "A-Ack! What do I...? Attack!"
22020-241 = "The attack went right through the opponent? What the heck?"
22020-243 = "Woah?! Why are they suddenly invisible?"
22020-244 = "Now they're turning into a giant! They're covering the entire screen!"
22020-245 = "Wh-Why isn't the hitbox registering?"
22020-254 = "A-Argh! I cannot beat this player!"
22020-255 = "[s] \"That player might be...\""
22020-256 = "What the heck? They have to be cheating!"
22020-257 = "Right? Ugh! Cheaters are the worst. They're not even enjoying the game!"
22020-258 = "Challenger for the next battle!"
22020-263 = "They're challenging us again?! How shameless! That dirty cheater!"
22020-264 = "Wh-What should I do?"
22020-265 = "[s] \"If the player keeps cheating, you might not be able to win...\""
22020-266 = "Just deny the request! We have no reason to play with a cheater!"
22020-268 = "I'm sorry, Aris. Sometimes games just aren't fair."
22020-273 = "...It's not like there's no way to win."
22020-279 = "[ns] \"Yuzu?\""
22020-281 = "L-Let me take this from here. I'll enter with my account."
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "Battle START!"
22020-296 = "...!"
22020-302 = "Ugh! See?! They're using the invisibility cheat again!"
22020-303 = "Don't worry. Look. The character might be invisible, but you can still see their shadow."
22020-304 = "I can track the shadow and react that way."
22020-305 = "[s] \"A-Amazing! I had no clue!\""
22020-316 = "Hm... Your attack did land, but..."
22020-317 = "It didn't deal any damage! They used the invincibility cheat again..."
22020-318 = "It's not invincibility. They're changing where the hitbox is on their avatar."
22020-319 = "I can counter it with a skill that deals damage ignoring the hitbox."
22020-320 = "My character's Taunt skill has a gimmick that forcibly deals ten times damage if not interrupted..."
22020-341 = "Momoi! Midori! D-Did you see that?!"
22020-342 = "She's crazy..."
22020-343 = "You did it! You hurt them!"
22020-353 = "[ns] \"Oh! They're coming with their full power now!\""
22020-355 = "I can guard against it. I just have to keep an eye on the attack frames."
22020-356 = "There's a split moment after the enemy attacks when they're vulnerable..."
22020-357 = "Now! I can jump backwards and hit them with a jumping heavy kick."
22020-364 = "No way! Their character is stunned!"
22020-365 = "If they don't know how to punish this keep-out move, they'll never be able to approach."
22020-366 = "I don't think they know."
22020-367 = "I'll break down their cheats one by one..."
22020-368 = "And I can beat them."
22020-386 = "UZQueen WINS!"
22020-388 = "..."
22020-393 = "See? I told you we weren't out of options."
22020-394 = "[s] \"That's my...UZQueen!\""
22020-395 = "A-Amazing! I mean there's no words to describe how amazing that was, Yuzu!"
22020-396 = "Yes! I was holding my breath the whole time!"
22020-397 = "I see. Even if the enemy is cheating..."
22020-398 = "You can still cheese strats by using in-game tricks to counter them."
22020-399 = "Yes... It's a dirty way of playing, though. I prefer not to use them. That's not the way the game is meant to be played."
22020-400 = "But if the other player decides to cheat, all the gloves are off. That's part of the game too."
22020-401 = "I understand! Cheese and tricks are part of gameplay too!"
22020-402 = "Yes, exactly right. Although, I'm sure they can find cheats to counter the methods I used."
22020-403 = "But even if they did, I'd find another way to beat them."
22020-404 = "Yup. That's what a gamer does, after all."
22020-405 = "[s] \"You're incredible, Yuzu.\""
22020-406 = "Oh...! Even S-Sensei complimented me... It's not a big deal..."
22020-407 = "Yes it is! It felt so good when you won!"
22020-408 = "This experience was a great way to start brainstorming."
22020-409 = "Shall we start the design meeting, then?"
22020-410 = "Huh? The design meeting? What are you talking about?"
22020-411 = "..."
22020-412 = "...Momoi."
22020-414 = "R-R-Right! I remember!"
22020-415 = "O-Of course, we're gonna have a meeting!"
22020-419 = "And daily life at the Game Development Department continued as usual."
22020-421 = "Next Episode; Aris Goes on an Adventure!"

[translation]
22020-1 = "第2話;遊戲開發部的平凡日常"
22020-3 = "（難得夏萊沒有工作，正好有點時間的某天）"
22020-4 = "（從遊戲開發部那裡，傳來了希望我能一起參加社團活動的聯絡）"
22020-5 = "（雖然說是社團活動，不過沒能問清楚具體要做什麼……）"
22020-9 = "千年．遊戲開發部"
22020-15 = "看招！#n老師，覺悟吧！"
22020-16 = "現在就讓你看看，我終極的必殺技……！"
22020-17 = "桃井噴射！！"
22020-18 = "（回過神來，已經和桃井在社辦玩起了格鬥遊戲）"
22020-19 = "[s]「終極的必殺技……！！」"
22020-28 = "哼哼哼！我的Combo毫無死角唷！#n直到！老師的HP歸零為止！都不會停止！"
22020-29 = "呀啊──！"
22020-43 = "（咚！碰！）"
22020-47 = "「Player MOMORIA LOSE！」"
22020-51 = "「WINNER！Player [USERNAME]！」"
22020-57 = "嗚哇啊啊！為什麼我的Combo打不中啊！？"
22020-58 = "[s1]「因為桃井只要慌了就會亂打一通……」\n[s2]「那種小孩子Combo對我是沒用的唷，桃井！」"
22020-61 = "怎麼會！？#n我的攻擊模式已經被看透了嗎！？"
22020-62 = "話說，姐姐……妳說過老師是今天才開始玩的新手對吧。"
22020-63 = "嗚哇，綠！！？不要把我推進這無情的現實中啊！"
22020-64 = "剛才的不算！不算啦！"
22020-65 = "再一場！再一場啦老師！#n這次會使出真正的終極Combo……"
22020-66 = "[s]「這句話已經說第8次了……」"
22020-67 = "咦！？已經那麼多次了！？"
22020-68 = "就是啊，姐姐。適可而止吧？#n會讓老師困擾的。"
22020-69 = "但，但是以失敗告終的話，身，身為玩家的自尊心……"
22020-70 = "又說那種話……"
22020-71 = "那老師以失敗告終就可以嗎？"
22020-72 = "唔喵！？#n那個……會，會那樣嗎……？"
22020-73 = "[s]「我不介意唷。」"
22020-74 = "唉。老師，不可以太寵姐姐唷？"
22020-75 = "話說回來，這樣一直玩一直玩……#n姐姐……"
22020-76 = "今天社團活動的目的，妳還記得嗎？"
22020-78 = "啊，對齁……！"
22020-79 = "……對齁？"
22020-80 = "不，不是！不是啦，綠！#n我記得很清楚！真的！"
22020-81 = "[s]「這麼說來，還沒詳細聽妳們說呢。」"
22020-82 = "吶，姐姐……妳什麼都還沒跟老師說明嗎……？"
22020-83 = "姐～～姐～～？"
22020-84 = "現，現在！#n我現在正要說！"
22020-85 = "今天……"
22020-89 = "要想出下一個作品的點子！"
22020-90 = "[s]「下一個作品……？」"
22020-91 = "是的。大家也說差不多該開始為下一個作品做準備了。"
22020-92 = "沒錯！而且，聽說平常非常忙碌的老師正好有空，#n所以才會找你過來！"
22020-93 = "[s3]「……抱歉，最近比較少過來呢。」\n[s4]「確實，現在正好有空呢。」"
22020-96 = "嗯，我們也知道老師很忙……#n謝謝你願意過來！"
22020-97 = "總之！既然老師都來了，#n可以聽聽你對下一個作品的意見嗎～"
22020-98 = "而且，如果是老師的話，應該可以想出很多很厲害的點子吧～"
22020-99 = "所以，就把老師請來這裡了！"
22020-100 = "[s]「啊，嗯……對我的期待好像有點沉重……」"
22020-102 = "[ns]「話說，好像一直都在玩格鬥遊戲……？」"
22020-103 = "啊，那是姐姐的點子。"
22020-104 = "沒錯，我想要分析遊戲！"
22020-105 = "在腦袋空空的狀態下不管再怎麼煩惱，都想不出好點子不是嗎？"
22020-106 = "所以才要玩各種高人氣作品，從中想出新的點子。#n就是這麼回事。"
22020-107 = "[s]「原來如此，有道理呢。」"
22020-108 = "哼哼哼！對吧！？#n特別是剛剛和老師玩的遊戲。"
22020-109 = "《仙后神拳～六角恐龍大列傳～》#n在格鬥遊戲界中，是在各種意義上被稱為異端的人氣遊戲哦！"
22020-110 = "因為有許多地方可以參考，只要對這個遊戲進行分析……"
22020-111 = "一定能想出對新作有幫助的好點子！應該吧！"
22020-112 = "我們的下一個作品是「輕鬆慢活系地城探索RPG」。"
22020-113 = "[s]「卻要在裡面加入格鬥遊戲的元素！？」"
22020-114 = "你在說什麼啊，老師！"
22020-115 = "確實，在一般人的眼裡，可能會覺得地城探索RPG跟格鬥遊戲沒什麼交集……"
22020-116 = "[s]「沒什麼交集……？」"
22020-117 = "哼哼哼！光憑外表就做出判斷可是NG的唷！"
22020-118 = "要以下次的千年大賞為目標的話，就必須要有誰也想像不到的那種新的挑戰！"
22020-119 = "沒錯，也就是說！要捨棄先入為主的觀念、克服各式各樣的偏見，#n才能到達嶄新地平線的彼方……！"
22020-120 = "混合看似完全不相關的種類裡的要素，#n說不定遊戲會意外的有趣。"
22020-121 = "啊！綠！不要搶我的台詞！"
22020-122 = "還不是因為姐姐說的一副煞有其事的樣子。"
22020-123 = "嗚哇～太過分了～"
22020-124 = "[s]「大家都對開發新作全力以赴呢。」"
22020-125 = "嗯？"
22020-126 = "啊……"
22020-127 = "哼哼哼！"
22020-128 = "那是當然的！"
22020-129 = "嗯。不只是我和姐姐，還有柚子醬和愛麗絲醬。#n大家一起……"
22020-130 = "我們約好了，這次一定要拿下千年大賞。"
22020-131 = "嗯。#n那就是我們現在的「任務」！"
22020-137 = "桃井！綠！老師！#n緊急狀況！"
22020-138 = "[s]「妳好呀，愛麗絲。怎麼了嗎？」"
22020-139 = "咦，怎麼了嗎，愛麗絲？"
22020-140 = "終於，柚子在線上對戰超過10連勝了！"
22020-141 = "咦？真的嗎！？"
22020-142 = "在這個平衡用腳做的遊戲10連勝！？"
22020-160 = "「WINNER！Player UZQueen！」"
22020-165 = "呼啊……"
22020-166 = "太帥了！柚子！"
22020-167 = "柚子醬真厲害呢。"
22020-169 = "愛麗絲非常感動！#n不愧是傳說的勇者「UZQueen」！"
22020-170 = "啊，呃，嗯……？"
22020-171 = "[s]「恭喜妳，柚子！真是完美的勝利呢！」"
22020-172 = "對吧！這就是柚子的完美型態「UZQueen模式」唷！ "
22020-173 = "[s]「『UZQueen模式』……？」"
22020-174 = "我來說明吧！所謂的「UZQueen模式」！#n就是柚子在特定情況下會發動的增益技能唷！"
22020-175 = "會變得比平時大膽一點，大腦運轉的速度是平常的1.5倍！#n動態視力則會上升2.8倍哦！"
22020-176 = "那種設定是什麼時候加上的？"
22020-177 = "愛麗絲也知道！這時候的柚子非常強大！#n愛麗絲也想要「UZQueen模式」！"
22020-178 = "[s]「『UZQueen模式』真厲害呀……！」"
22020-179 = "連，連老師也！？"
22020-180 = "那，那個……啊嗚……！"
22020-181 = "只，只是很普通地，努力了一下而已……"
22020-182 = "看到柚子的活躍，愛麗絲也有幹勁了！"
22020-183 = "接下來輪到愛麗絲了！"
22020-185 = "（就這樣在大家的注視下，愛麗絲開始挑戰格鬥遊戲）"
22020-187 = "像桃井、綠、柚子──還有老師一樣，#n愛麗絲也要成為格鬥遊戲的勇者！"
22020-188 = "與其說是勇者，我倒覺得姐姐是擔任被勇者打倒的角色。"
22020-189 = "妹妹啊！有時候真相很傷人的唷！？"
22020-190 = "愛，愛麗絲醬……加，加油！"
22020-191 = "是！愛麗絲，會加油的！"
22020-192 = "（Challengers Next Battle！！）"
22020-194 = "[ns]「啊，好像出現挑戰者了呢。」"
22020-196 = "與桃井鍛鍊得來的身手，讓他見識一下吧！"
22020-197 = "呀啊！"
22020-201 = "嘿！呀啊！嚇！"
22020-207 = "全部都被迴避了……"
22020-208 = "不！愛麗絲的攻擊還沒有結束！"
22020-209 = "我要上了！"
22020-219 = "咦！？#n剛才的是……"
22020-220 = "剛才，明明是愛麗絲發動攻擊，但愛麗絲的HP是不是減少了！？"
22020-221 = "還，還沒完！#n愛麗絲做得到……"
22020-227 = "[ns]「這次是角色……消失了……？」"
22020-228 = "咦，咦咦！？"
22020-234 = "在愛麗絲的後面……突然出現了！？"
22020-235 = "啊，呀……！#n啊唔！攻，攻擊！"
22020-241 = "愛麗絲的攻擊穿過對手了！"
22020-243 = "嗚哇！？這次是角色變透明了！？"
22020-244 = "而且……還變大擋住了整個畫面呢。"
22020-245 = "這，這次是……Hit，Hitbox好像消失了。"
22020-254 = "嗚，嗚哇！#n贏不了這個玩家！"
22020-255 = "[s]「這，不管怎麼看都是……」"
22020-256 = "這傢伙是怎樣！不管怎麼看都作弊了吧！"
22020-257 = "好過分……用這種方法贏了，真的會開心嗎。"
22020-258 = "（Challengers Next Battle Again！！）"
22020-263 = "要求再戰！？#n肯定又打算作弊吧！"
22020-264 = "……該怎麼辦？"
22020-265 = "[s]「如果對方作弊的話……可能有點難贏……」"
22020-266 = "拒絕吧！沒必要理會這種作弊仔！"
22020-268 = "嗯……愛麗絲醬，雖然很可惜，但這次就……"
22020-273 = "還，還有辦法唷……"
22020-279 = "[ns]「柚子？」"
22020-281 = "……交給我吧。#n我，我來亂入。"
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "（Battle！START！）"
22020-296 = "！！！"
22020-302 = "啊！又用變透明的外掛了！"
22020-303 = "沒關係。#n從剛才的戰鬥來看，雖然角色會變透明，但影子不會……"
22020-304 = "只要看影子的長度就能應付了。"
22020-305 = "[s]「好，好厲害……！居然還有這種方法！」"
22020-316 = "明明不管怎麼看都命中了，卻沒有造成傷害！"
22020-317 = "又是無敵外掛……"
22020-318 = "我想，那應該是能調整Hitbox的外掛。"
22020-319 = "既然如此，只要不管Hitbox，強制造成傷害就好。"
22020-320 = "這個角色的嘲諷技能，#n只要沒有被妨礙就能強制造成傷害……"
22020-341 = "桃井！綠！#n妳，妳們剛剛有看到嗎！？"
22020-342 = "真的……"
22020-343 = "造成傷害了！"
22020-353 = "[ns]「啊！對方突然開始猛烈進攻了唷！」"
22020-355 = "沒問題的。#n在角落防禦等待機會，看準每一幀……"
22020-356 = "在對方攻擊的瞬間……"
22020-357 = "往後跳！#n然後使出強踢擊的話……"
22020-364 = "對方的角色倒地了！"
22020-365 = "用這招牽制對手的時候，如果不能打出確定反擊就絕對不能接近。"
22020-366 = "以對方的實力，我想應該做不到這點……"
22020-367 = "只要像這樣，一個一個擊破對方的弱點……"
22020-368 = "就能贏唷。"
22020-386 = "「WINNER！Player UZQueen！」"
22020-388 = "呼……"
22020-393 = "這樣就……贏了，對吧？"
22020-394 = "[s]「這就是……UZQueen……！」"
22020-395 = "好厲害！好厲害唷柚子！#n厲害到「厲害」這個詞都無法形容了！"
22020-396 = "嗯！愛麗絲也這麼覺得！都快看到入迷了！"
22020-397 = "就算對方使用外掛，"
22020-398 = "我們還有「套路技」……對吧。"
22020-399 = "嗯……因，因為太常使用的話，遊戲就不好玩了，#n還有……如果對朋友使用……有可能會吵起來，所以我不太喜歡……"
22020-400 = "不過如果對方作弊就不用考慮這麼多了……#n畢，畢竟，這也是遊戲的一環。"
22020-401 = "原來如此！套路技也是遊戲的一環！#n愛麗絲理解了！"
22020-402 = "也許下次遇到的時候，他會使用讓套路技無效的外掛也說不定……"
22020-403 = "……儘管如此，只要戰鬥的話就能贏唷。"
22020-404 = "嗯……因為我們，是玩家啊。"
22020-405 = "[s]「柚子真的很厲害唷。」"
22020-406 = "啊，連，連老師都這麼說……那個，這，這也沒什麼了不起的。"
22020-407 = "不過最後能贏過他，真是令人痛快！"
22020-408 = "這樣一來遊戲分析也完成了……"
22020-409 = "姐姐，開始企劃會議吧？"
22020-410 = "……嗯？企劃會議？什麼企劃會議？"
22020-411 = "……"
22020-412 = "姐～姐～！"
22020-414 = "對，對，對了！#n還有這回事呢！"
22020-415 = "當，當然要開囉！"
22020-419 = "（於是，遊戲開發部的日常一如既往地持續著）"
22020-421 = "下一話;～愛麗絲，冒險開始！～"

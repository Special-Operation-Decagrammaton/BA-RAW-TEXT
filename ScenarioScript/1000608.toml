[translation]
1000608-1 = "老師的誤會"
1000608-2 = "奇普托斯．住宅區"
1000608-3 = "（在住宅區的窄巷）"
1000608-5 = "（……伊織掉進了不知道是誰挖出的坑洞裡）"
1000608-6 = "[s]「……」"
1000608-7 = "……"
1000608-8 = "[s] 「……你怎麼待在那種地方？」"
1000608-9 = "看不出來嗎！我掉進陷阱了！"
1000608-10 = "我原本在追蹤格黑娜自治區搗亂的頭盔團，結果突然被引進死路，才覺得可疑……"
1000608-11 = "原來是在地上挖了陷阱！卑鄙下流的傢伙！"
1000608-12 = "……被顯而易見的陷阱騙到的人比較奇怪？ #n是，是那樣沒錯……！"
1000608-13 = "我有什麼辦法！#n看到目標後我就注意不了其他東西了……"
1000608-14 = "我可是冷血的格黑娜風紀委員會執行委員，不會放過進入視野的目標！"
1000608-16 = "……話說你要站在那邊看到什麼時候？#n快點救我出去！"
1000608-17 = "[s] 拿起手機拍下伊織的照片"
1000608-19 = "你，你在做什麼！等，等等！"
1000608-21 = "不，不准拍！就說不准拍了！"
1000608-22 = "為什麼要拍別人受困的照片啊，你這個惡魔！變態！"
1000608-23 = "[s1] 「一臉困擾的伊織實在太可愛了。」\n[s2] 「因為是平常難得一見的珍貴畫面，不小心就……」"
1000608-24 = "你把別人的困境當成什麼了！？#n我說不行就是不行！"
1000608-25 = "你把別人的困境當成什麼了！？#n我說不行就是不行！"
1000608-27 = "可惡，既然如此……唔唔……！"
1000608-28 = "嗚……果然沒辦法靠自己脫身……"
1000608-29 = "啊啊真是的，給我記住！#n等我從這裡出去你就知道了！"
1000608-31 = "（之後又欣賞了伊織努力的身影好一陣子，才將伊織從陷阱裡拉了出來）"
1000608-34 = "（……結果小腿被從洞裡脫困的伊織狠狠踹了一下）"

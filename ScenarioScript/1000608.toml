[translation]
1000608-1 = "#title;선생의 오해"
1000608-2 = "#place;키보토스 주택가"
1000608-3 = "#zmc;move;-632,-444;1896;1000\n#na;주택가의 좁은 골목 사이."
1000608-4 = "#zmc;instant;-632,-444;1896\n3;이오리;07\n#3;closeup\n#3;a\n#3;em;[...]\n#wait;2000"
1000608-5 = "#zmc;instant;-632,-444;1896\n#na;……누군가가 파 놓은 깊은 구덩이에 이오리가 빠져 있다."
1000608-6 = "#zmc;instant;-632,-444;1896\n[s] \"……….\""
1000608-7 = "#zmc;instant;-632,-444;1896\n3;이오리;06;……….\n#3;closeup"
1000608-8 = "#zmc;instant;-632,-444;1896\n[s] \"……어째서 그 안에 있는 거야?\""
1000608-9 = "#zmc;instant;-632,-444;1896\n3;이오리;05;보면 모르겠어? 함정에 빠진 거잖아!\n#3;closeup\n#3;em;[!]"
1000608-10 = "#zmc;instant;-632,-444;1896\n3;이오리;06;게헨나 자치구 내에서 말썽을 부린 헬멧단 녀석들을 추적하던 중에, 갑자기 막다른 길로 유인하기에 무슨 생각인가 했더니……\n#3;closeup"
1000608-11 = "#zmc;instant;-632,-444;1896\n3;이오리;07;바닥에 함정을 파두었더라고! 비열한 녀석들 같으니라고!\n#3;closeup\n#3;em;[빠직]"
1000608-12 = "#zmc;instant;-632,-444;1896\n3;이오리;04;……너무 뻔히 보이는 함정이라서 속는 게 더 이상해 보인다고? #n그, 그야 그렇긴 하지만……!\n#3;closeup\n#3;stiff"
1000608-13 = "#zmc;instant;-632,-444;1896\n3;이오리;07;어쩔 수 없잖아! #n목표를 고정하면 그 이외의 것은 눈에 들어오지 않는걸.\n#3;closeup\n#3;em;[반응]"
1000608-14 = "#zmc;instant;-632,-444;1896\n3;이오리;05;나는 게헨나 선도부의 냉혹한 집행부원. #n눈에 들어온 목표는 놓치지 않아!\n#3;closeup"
1000608-15 = "#zmc;instant;-632,-444;1896\n3;이오리;05\n#3;closeup\n#3;em;[...]\n#wait;2500"
1000608-16 = "#zmc;instant;-632,-444;1896\n3;이오리;07;……그보다 언제까지 계속 쳐다보고만 있을 거야? #n빨리 꺼내달라고!\n#3;closeup\n#3;em;[땀]"
1000608-17 = "#zmc;instant;-632,-444;1896\n[s] 핸드폰을 들어 이오리의 사진을 찍는다."
1000608-18 = "#zmc;instant;-632,-444;1896\n3;이오리;04\n#3;closeup\n#wait;1500"
1000608-19 = "#zmc;instant;-632,-444;1896\n3;이오리;04;뭐, 뭐하는 거야! 자, 잠깐!\n#3;closeup\n#3;stiff"
1000608-20 = "#zmc;instant;-632,-444;1896\n3;이오리;04\n#3;closeup\n#3;stiff\n#wait;1000"
1000608-21 = "#zmc;instant;-632,-444;1896\n3;이오리;04;찌, 찍지 마! 찍지 말라고!\n#3;closeup\n#3;em;[!]\n#3;hophop"
1000608-22 = "#zmc;instant;-632,-444;1896\n3;이오리;07;어째서 사람이 곤경에 빠진 모습을 사진으로 남기는 거야, 이 악마! 변태!\n#3;closeup\n#fontsize;80\n#3;stiff\n#3;em;[빠직]"
1000608-23 = "#zmc;instant;-632,-444;1896\n[s1] \"곤경에 빠진 이오리의 모습이 너무 귀여워서.\"\n[s2] \"평소에는 볼 수 없는 귀중한 광경이라 그만.\""
1000608-24 = "#zmc;instant;-632,-444;1896\n3;이오리;07;사람의 곤경을 뭐로 생각하는 거야? 그래도 안 돼!\n#3;closeup\n#3;em;[?!]\n#3;shake"
1000608-25 = "#zmc;instant;-632,-444;1896\n3;이오리;07;사람의 곤경을 뭐로 생각하는 거야? 그래도 안 돼!\n#3;closeup\n#3;em;[?!]\n#3;shake"
1000608-26 = "#zmc;instant;-632,-444;1896\n3;이오리;06\n#3;closeup\n#3;stiff\n#wait;700"
1000608-27 = "#zmc;instant;-632,-444;1896\n3;이오리;06;으으…… 으으윽……!\n#3;closeup\n#3;stiff"
1000608-28 = "#zmc;instant;-632,-444;1896\n3;이오리;06;으으…… 역시 자력으로 빠져나가는 건 무리야.\n#3;closeup\n#3;em;[속상함]"
1000608-29 = "#zmc;instant;-632,-444;1896\n3;이오리;07;이곳에서 나가기만 해봐! 가만두지 않을 테니까!\n#3;closeup\n#3;em;[빠직]\n#fontsize;80"

[translation]
1000608-1 = "ความเข้าใจผิดของคุณครู"
1000608-2 = "เขตที่อยู่อาศัย คิโวทอส"
1000608-3 = "(ในตรอกแคบๆ แห่งหนึ่งในเขตที่อยู่อาศัย)"
1000608-5 = "(อิโอริตกลงไปในหลุมลึกที่ใครบางคนขุดเอาไว้)"
1000608-6 = "[s] \"...\""
1000608-7 = "......"
1000608-8 = "[s] \"...ทำไมไปอยู่ในนั้นได้ล่ะ?\""
1000608-9 = "มองแค่นี้ไม่รู้รึไง? ฉันติดกับดักแล้วไงล่ะ!"
1000608-10 = "ฉันกำลังไล่ตามพวกแก๊งหมวกกันน็อกที่ก่อความวุ่นวายในเขตเกเฮนน่าอยู่ แต่พวกนั้นก็หลอกล่อ#nให้ฉันมาติดกับดักที่ทางตันนี่..."
1000608-11 = "พวกนั้นทำหลุมกับดักไว้บนพื้นนี่ไง! เจ้าวายร้ายพวกนั้น!"
1000608-12 = "...คุณครูแปลกใจที่ฉันหลงติดกับดักที่มองออกได้ง่ายๆ พวกนี้งั้นเหรอ?#nมะ...มันดูออกง่ายที่ไหนเล่า...!"
1000608-13 = "ช่วยไม่ได้นี่นา! เวลาที่ระบุเป้าหมายแล้ว ฉันมักจะไม่ค่อยสนใจเรื่องอื่นๆ รอบตัวเลย"
1000608-14 = "ฉันคือสมาชิกของคณะกรรมการวินัยที่ไร้ความปรานี ถ้าระบุเป้าหมายแล้วจะไม่ยอมให้คลาด#nสายตาเด็ดขาด!"
1000608-16 = "...แล้วนี่จะยืนมองแบบนั้นอีกนานมั้ย? รีบๆ มาช่วยฉันออกไปทีสิ!"
1000608-17 = "[s] หยิบโทรศัพท์มือถือออกมาและถ่ายรูปอิโอริเอาไว้"
1000608-19 = "ทะ...ทำอะไรน่ะ! ดะ...เดี๋ยวสิ!"
1000608-21 = "หะ...ห้ามถ่ายนะ! บอกว่าห้ามถ่ายไงเล่า!"
1000608-22 = "ทำไมถึงยังมีกระจิตกระใจถ่ายรูปคนที่กำลังเดือดร้อนอยู่อีกเนี่ย ปีศาจชัดๆ! คนโรคจิต!"
1000608-23 = "[s1] \"อิโอริดูน่ารักมากเลยนะตอนอยู่ในหลุมนั้นน่ะ\"\n[s2] \"ภาพแบบนี้หาดูได้ยากนะ...\""
1000608-24 = "มาล้อเล่นกับคนที่กำลังเดือดร้อนอยู่ได้ยังไง? ทำแบบนี้ไม่ดีเลยนะ!"
1000608-25 = "มาล้อเล่นกับคนที่กำลังเดือดร้อนอยู่ได้ยังไง? ทำแบบนี้ไม่ดีเลยนะ!"
1000608-27 = "อะ...อึ่ก...!"
1000608-28 = "ฮึ่ก... แค่ลำพังกำลังของตัวเอง ฉันคงออกไปจากที่นี่ไม่ได้แน่"
1000608-29 = "ถ้าออกไปได้เมื่อไหร่นะ! ฉันไม่ปล่อยเอาไว้แน่!"
1000608-31 = "(จากนั้นคุณครูก็ยืนดูอิโอริที่พยายามปีนขึ้นมาอยู่ครู่หนึ่งก่อนจะช่วยดึงเธอขึ้นมา)"
1000608-34 = "(...ทันทีที่อิโอริขึ้นมาจากหลุมกับดักได้เธอก็เตะเข้าที่หน้าแข้งของคุณครูอย่างจัง)"

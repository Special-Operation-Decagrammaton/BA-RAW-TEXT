[translation]
10046140-3 = "唉，怎麼會變成這樣……"
10046140-4 = "抱歉，一花同學。#n沒想到只是開放海灘，竟然會引發這種騷動。"
10046140-5 = "哈哈……沒關係的，這種事經常發生。"
10046140-6 = "經常發生……？"
10046140-7 = "沒想到三一的治安狀況居然這麼糟。"
10046140-8 = "啊……準確來說，是「對我而言」經常發生才對。#n畢竟我時常在邊境地帶或外圍巡邏。"
10046140-9 = "即便如此，作為負責三一治安的實現正義部，出現疏漏也是不該發生的事。#n關於這次的狀況，之後我會和弦生同學、蓮實同學好好談談的。"
10046140-10 = "啊哈哈……那就拜託您了。"
10046140-11 = "還有，關於這次的巡邏任務。"
10046140-12 = "平時身為茶會主席的我，一旦出面就會讓事情變得複雜，所以不方便輕易行動。"
10046140-13 = "但我現在正在享受假期，脫離了茶會的身分。"
10046140-14 = "稍微幫點忙應該沒問題吧。"
10046140-15 = "咦？莫非……渚大人要親自出馬嗎？"
10046140-16 = "畢竟這次的騷動，可說是因為我的疏失而引發的。"
10046140-17 = "將事情全都交給一花同學和實現正義部的各位處理，自己卻躲在後面裝沒事……#n這實在說不過去。"
10046140-18 = "不，不會的！真的沒關係！"
10046140-19 = "我心裡會過意不去的。#n你就當作是幫我一個忙吧，拜託了。"
10046140-20 = "既然您都這麼說了……"
10046140-21 = "沒辦法，那就請您多多指教了！"
10046140-22 = "呵呵，彼此彼此。#n我在這方面可能不太熟練，也請你多多指教。"
10046140-28 = "（……糟糕，這下出大事了）"
10046140-29 = "（坦白說真是壓力山大……可是又不能叫渚大人回去）"
10046140-30 = "（萬一渚大人出了什麼事的話……）"
10046140-31 = "（…………）"
10046140-32 = "（…………）"
10046140-33 = "（一定要守護好他才行，嗯）"

[translation]
10046140-3 = "เฮ้อ ทำไมถึงเกิดเรื่องแบบนี้..."
10046140-4 = "ขอโทษนะคะ คุณอิจิกะ ฉันคิดไม่ถึงเลยค่ะว่าแค่การเปิดชายหาดจะทำให้เกิดสถานการณ์แบบนี้"
10046140-5 = "แหะๆ... ไม่เป็นไรค่ะ นี่เป็นเรื่องที่เกิดขึ้นบ่อยๆ อยู่แล้วค่ะ"
10046140-6 = "เกิดขึ้นบ่อยๆ...?"
10046140-7 = "ฉันไม่รู้เลยค่ะว่าสถานการณ์ความปลอดภัยในทรีนิตี้เลวร้ายขนาดนี้"
10046140-8 = "อ่า... ต้องบอกว่าเป็นแค่มุมมองของฉันน่ะค่ะ ก็ฉันต้องไปลาดตระเวนข้างนอกหรือไม่ก็ในพื้นที่เขต#nรอยต่อบ่อยๆ นี่คะ"
10046140-9 = "แต่ถึงอย่างนั้นฉันก็ไม่ควรทำให้ชมรมทวงความยุติธรรมที่รับผิดชอบความสงบเรียบร้อยในทรีนิตี้ต้อง#nโหมงานหนักเกินเหตุค่ะ เห็นทีฉันต้องไปหารือเรื่องนี้กับคุณซึรุกิและคุณฮาสุมิแล้วละค่ะ"
10046140-10 = "แหะๆๆ... รบกวนด้วยนะคะ"
10046140-11 = "แล้วก็ เรื่องงานลาดตระเวนครั้งนี้น่ะค่ะ"
10046140-12 = "โดยปกติในฐานะโฮสต์ของสภาน้ำชาแล้ว ถ้าฉันจะออกหน้าทำอะไรเอง เรื่องมันจะซับซ้อนมากขึ้น ฉันก็เลยออกไปทำอะไรไม่ได้ง่ายๆ"
10046140-13 = "แต่ตอนนี้ฉันก็วางตำแหน่งในสภาน้ำชาแล้วมาพักร้อนอยู่"
10046140-14 = "ฉันคิดว่าคงช่วยได้นิดหน่อยน่ะค่ะ"
10046140-15 = "คะ? คุณนางิสะ... จะออกไปจัดการเรื่องนี้เองเหรอคะ?"
10046140-16 = "สถานการณ์ที่เกิดขึ้นมันเป็นความผิดของฉันนี่คะ"
10046140-17 = "ฉันมอบงานให้คุณอิจิกะกับชมรมทวงความยุติธรรมทุกคนแล้วมานั่งเรียบร้อยอยู่อย่างนี้ไม่ได้หรอกค่ะ"
10046140-18 = "มะ... ไม่หรอกค่ะ! ไม่เป็นไรเลยค่ะ! จริงๆ นะคะ!"
10046140-19 = "ฉันไม่สบายใจน่ะค่ะ คิดว่าเป็นการช่วยฉันแล้วกันนะคะ ขอร้องละค่ะ"
10046140-20 = "ถ้าคุณนางิสะถึงกับพูดอย่างนี้ละก็..."
10046140-21 = "งั้นก็คงช่วยไม่ได้ค่ะ ฉันต้องรบกวนด้วยนะคะ!"
10046140-22 = "ฮุฮุ ฉันอาจจะไม่มีประสบการณ์ในงานประเภทนี้ ยังไงก็ต้องขอฝากตัวด้วยนะคะ"
10046140-28 = "(เป็นเรื่องแล้วมั้ยล่ะ...)"
10046140-29 = "(ทั้งประหม่าและเกรงใจเป็นบ้าเลย... แต่จะขอให้กลับไปก็คงไม่ได้)"
10046140-30 = "(ถ้ามีเรื่องอะไรเกิดขึ้นกับคุณนางิสะขึ้นมาละก็...)"
10046140-31 = "(......)"
10046140-32 = "(......)"
10046140-33 = "(เราต้องดูแลคุณนางิสะให้ได้ อื้ม)"

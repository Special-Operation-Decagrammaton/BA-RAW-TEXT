[translation]
10046140-3 = "*sigh* How could this happen?"
10046140-4 = "I'm dreadfully sorry, Ichika. I never conceived that opening a beach would cause so many problems."
10046140-5 = "Haha... It's fine. Business as usual, you know..."
10046140-6 = "As usual...?"
10046140-7 = "Is performing security at Trinity truly so atrocious?"
10046140-8 = "Oh no! I just tend to work on the border, or even outside. I see a lot of riffraff."
10046140-9 = "I'll speak with Tsurugi and Hasumi about allocating more resources."
10046140-10 = "Haha... I wish you luck."
10046140-11 = "But, as for your current patrol mission..."
10046140-12 = "Usually, as hostess of the Tea Party, I try to refrain from aggression."
10046140-13 = "But I happen to be the off the clock and on vacation."
10046140-14 = "Perhaps I could assist you as a...civilian?"
10046140-15 = "Huh? You want to...join in?"
10046140-16 = "I inadvertently caused this. I should take SOME responsibility."
10046140-17 = "I cannot sit idly by and make you and the Task Force handle my mess."
10046140-18 = "N-No! It's fine! Really!"
10046140-19 = "I feel in debt. Please, allow me. It will ease my guilt."
10046140-20 = "If you insist..."
10046140-21 = "I'll do as you say. Glad to have you on the team!"
10046140-22 = "Fufu. And I am grateful to work with you as well. Now, do guide me. What happens first?"
10046140-28 = "(...This is bad.)"
10046140-29 = "(Oh, the pressure... But I can't say no!)"
10046140-30 = "(If something happens to Nagisa...)"
10046140-31 = "(...)"
10046140-32 = "(...)"
10046140-33 = "(It won't. I'll protect her!)"

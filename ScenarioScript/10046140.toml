10046140-1 = "#all;hide"
10046140-2 = "3;나기사 수영복;01\n#3;a"
10046140-3 = "3;나기사 수영복;06;하아, 어쩌다 이런 일이…….\n#3;em;[한숨]"
10046140-4 = "3;나기사 수영복;09;죄송합니다, 이치카 씨. 단지 해변을 개장하는 것만으로 이런 소요 사태가 생길 줄은."
10046140-5 = "3;이치카 수영복;04;하하…… 괜찮습니다. 늘 있는 일인걸요.\n#3;em;[땀]"
10046140-6 = "3;나기사 수영복;02;늘 있다……?"
10046140-7 = "3;나기사 수영복;01;트리니티의 치안 상태가 그렇게 열악한 줄은 몰랐군요."
10046140-8 = "3;이치카 수영복;20;아…… 정확히는, 저한테 말임다. 아무래도 접경지대나, 외부 순찰을 도는 경우가 많아서요.\n#3;jump"
10046140-9 = "3;나기사 수영복;03;그렇다 해도 트리니티의 치안을 책임지는 정의실현부에 부하가 있어서는 안 될 일입니다. 금번 이야기는 차후 츠루기 씨, 하스미 씨와 이야기를 나눠봐야겠군요."
10046140-10 = "3;이치카 수영복;04;아하하…… 잘 부탁드림다.\n#3;em;[땀]"
10046140-11 = "3;나기사 수영복;02;그리고, 이번 순찰 임무 말인데요."
10046140-12 = "3;나기사 수영복;99;평소에는 티파티 호스트 된 입장에서, 제가 나서게 되면 일이 복잡해지는 통에 쉬이 움직이지 못합니다만."
10046140-13 = "3;나기사 수영복;10;마침, 지금 티파티 신분을 벗어나 휴가를 누리는 중."
10046140-14 = "3;나기사 수영복;11;약간의 도움 정도는 제공해도 괜찮을 듯하네요.\n#3;em;[음표]"
10046140-15 = "3;이치카 수영복;20;네? 설마…… 나기사 님께서 직접 나서시는 겁니까?"
10046140-16 = "3;나기사 수영복;12;이번 사태는 저의 실책으로 발생한 것이나 다름없습니다."
10046140-17 = "3;나기사 수영복;03;이치카 씨와, 정의실현부 여러분들께 맡겨두고 저 혼자 뒤에서 점잔 빼고 있을 수는 없는 노릇이죠."
10046140-18 = "3;나기사 수영복;03\n1;이치카 수영복;04;아, 아니요! 괜찮습니다! 정말로요!\n#1;hophop\n#1;ar\n#3;m4"
10046140-19 = "3;나기사 수영복;02;제 마음이 불편해서 그렇습니다. 저를 도와주신다 생각하고 부탁드릴게요."
10046140-20 = "1;이치카 수영복;05;그렇게까지 말씀하시면……."
10046140-21 = "1;이치카 수영복;07;어쩔 수 없네요. 잘 부탁드리겠습니다!\n#1;greeting"
10046140-22 = "3;나기사 수영복;12;후후, 저야말로, 이러한 업무는 미숙할지 몰라도 지도 편달 부탁드립니다.\n#3;em;[음표]"

[translation]
34260-1 = "Episode 26; Our Future"
34260-6 = "Stay sharp, everyone! Follow Seia's instructions or you'll be lost in the catacombs!"
34260-7 = "Yes, ma'am!"
34260-8 = "Ichika, please report. Did you find Sensei yet?  "
34260-9 = "*tchhhk* Yes, we've found Sensei! But Tsurugi is a bit... Well..."
34260-10 = "Tsurugi? Is she okay?"
34260-17 = "Tsurugi, please. That's a wall, not a door.  "
34260-21 = "Ugh. Too late."
34260-26 = "...Kekekeke."
34260-30 = "Kyaaaaaak!!"
34260-35 = "[ns] \"Tsurugi...\""
34260-36 = "What is the Justice Task Force doing here?"
34260-37 = "Greetings, Sensei. I'm Ichika from the Justice Task Force. "
34260-38 = "We met briefly at the Gourmet Research Society arrest, but never formally. I'm here to rescue you!"
34260-39 = "[s] \"Thanks, Ichika. It's good to see you again.\""
34260-40 = "Heehee. Pleasure's all mine."
34260-44 = "Hasumi, Ichika reporting in. We've secured Sensei and Mika."
34260-45 = "*tchhhk* Great job. Retreat to a safe zone as soon as possible. We've secured a route in the catacombs."
34260-46 = "All according to plan! Are you two ready? There's some people eagerly awaiting your safe return."
34260-55 = "Sensei! Mika! Thank goodness you're unharmed."
34260-57 = "Nagi?! How are you here? Am I dead?"
34260-59 = "You're certainly not. You are currently standing in the command center of the Arius reclamation operation."
34260-60 = "But...how?! How did you get through the catacombs?"
34260-62 = "I showed her the way."
34260-63 = "[ns] \"Seia?!\""
34260-69 = "S... "
34260-70 = "Seia..."
34260-71 = "You really are a dummy, Mika."
34260-72 = "As usual, your impulsiveness ruined things. I've always said it was your worst trait."
34260-73 = "And you're always such a meanie! But wh-what happened? Are you okay?"
34260-74 = "It's a bit of a long story."
34260-79 = "I met someone in a dream."
34260-80 = "It was a long journey but, to summarize, I made a deal and escaped Beatrice's grasp."
34260-83 = "Seia...?!"
34260-84 = "*cough* *cough*"
34260-85 = "C-Captain! Seia... Seia is...!"
34260-86 = "Please... I need Nagisa... And bring the Sisterhood and the Justice Task Force here. Hurry."
34260-87 = "What? O-Okay! If you say so!"
34260-88 = "There's no time. Sensei and Mika are in grave danger."
34260-90 = "As soon as I woke up, I asked for the Sisterhood, the Remedial Knights, and the Justice Task Force."
34260-91 = "During that talk, Nagisa swore she would abdicate all her authority if we could just save you, Mika."
34260-93 = "I beg of you to help me. Please save Mika."
34260-94 = "I implore you as well."
34260-99 = "..."
34260-101 = "This is..."
34260-102 = "Raise your heads, Nagisa. Seia. You need not bow to us."
34260-103 = "I understand Mika's situation. But also, Seia, I'm relieved to see you recovered. What happened?"
34260-105 = "It's...a long story..."
34260-106 = "...Understood."
34260-107 = "I will not pry. For now."
34260-108 = "More importantly, Sensei's safety is the priority. The Sisterhood will support this operation."
34260-109 = "There are many students at Trinity who owe Sensei, including me. They'll be glad to help."
34260-110 = "Thank you. And please, stay safe.  "
34260-115 = "This is all I know of the catacombs' changing patterns.  "
34260-116 = "This couldn't have been easy. Thank you, Azusa."
34260-117 = "But...are you sure I can't go too?"
34260-118 = "Then who will greet Sensei when we return victorious?"
34260-119 = "And our reputation wouldn't last long if we need the Make-Up Work Club's help again...especially from you, for this particular mission."
34260-120 = "Even Hanako is staying behind to support us the best way she can."
34260-121 = "Trust in us."
34260-122 = "O-Okay."
34260-123 = "U-Umm..."
34260-124 = "It's okay. What would you like to say?"
34260-128 = "Please save Atsuko."
34260-129 = "If I know Sensei, Atsuko is already safe. And we'll make sure to keep Sensei safe."
34260-130 = "Thank you. And...I hope everyone else can be saved too."
34260-131 = "Even though they pointed their guns at you? At your friends?"
34260-132 = "Even so. They may be villains who've committed heinous crimes..."
34260-137 = "But they were my family."
34260-140 = "U-Ugh... Do you know what time it is right now?"
34260-141 = "Yes. It's so early that not even the birds are awake. Now let's search that map, Ui."
34260-142 = "Wait a second... What are you wearing?"
34260-143 = "Oh, this? I was taking a walk...I mean, I was swimming when I heard the message."
34260-144 = "I don't think this is it. Let's go to the next page."
34260-145 = "Which one is it? Were you swimming or talking a walk?  "
34260-149 = "Wait! Here it is! The old map of the catacombs left by that ancient council!"
34260-150 = "Th-This page? It's about to crumble apart...and it's badly faded..."
34260-151 = "Yes, that's why I came to see you, Ui. You're the Magician of the Old Library."
34260-152 = "Ughhh, argh..."
34260-153 = "You can restore it, right? Time is of the essence.  "
34260-158 = "I know you can do it, Kozeki! I'll help you in every way possible! ♡"
34260-159 = "Ugh... How did I get involved in this?"
34260-163 = "Move, move! We don't have a moment to spare!"
34260-166 = "Yes, ma'am!"
34260-171 = "Umm..."
34260-172 = "Huh? You're...Koharu?"
34260-173 = "Y-Yes! I-I'm also from the Justice Task Force...but I'm in the Make-Up Work Club right now, so I'm not allowed to go."
34260-174 = "Do you think you could give these to a high-ranking person in the Tea Party for me? Please?"
34260-180 = "What are these? A ribbon and some accessories?"
34260-181 = "They belong to someone from the Tea Party. They were in the Justice Task Force's contraband storage."
34260-182 = "Oh, I understand now. They're Mika's, aren't they?"
34260-183 = "I heard they were stolen and burned by angry students. I guess what the Justice Task Force recovered got mixed in with the confiscated items."
34260-184 = "Technically, yes. I was secretly taking items that were in decent condition. I know I'm not supposed to do that, but..."
34260-185 = "...I see. Okay, Koharu."
34260-186 = "I'll give them to Mika. "
34260-187 = "Really? Thank you!"
34260-197 = "Everyone..."
34260-198 = "We can't rely on Sensei for everything. Every relationship should go both ways."
34260-199 = "So, we came here on our own to save you, Mika."
34260-200 = "You really are such a narcissist! You make everything sound so self-important and complicated!"
34260-204 = "I've always wanted to say that out loud to you!"
34260-205 = "But you know what? I like you a whole lot, Seia."
34260-206 = "...?"
34260-207 = "And Nagi! Are you kidding me? You brought tea all the way to the Arius District? "
34260-213 = "Are you a tea addict? Do you have a serious problem?"
34260-214 = "But I like that Nagi more than anything, tea and all."
34260-216 = "I don't know how to feel about that statement."
34260-217 = "...?"
34260-222 = "You guys are my favorite.  "
34260-223 = "Thank you for coming for me. And I'm sorry. I'm so, so sorry."
34260-228 = "Mika..."
34260-229 = "Stop, Mika. I'm the one who owes you an apology."
34260-230 = "All this time, I told myself I was waiting for the perfect moment to apologize."
34260-231 = "But in reality, I was being immature. I was avoiding it."
34260-232 = "Mika. When you told me you wanted to reconcile with Arius—"
34260-233 = "It's okay, Seia. You didn't do anything wrong."
34260-234 = "It's all my fault. I'm just so sorry."
34260-235 = "Mika..."
34260-236 = "Mika..."
34260-243 = "I'm sorry for crashing the reunion, but I have something for you, Mika."
34260-244 = "You do? For me?"
34260-245 = "Here."
34260-249 = "This..."
34260-253 = "My accessories?! How do you have these? I thought they were burned with everything else!"
34260-254 = "There was a member in charge of the contraband storage..."
34260-255 = "Ugh, how do I explain this...? "
34260-256 = "That student collected the accessories that didn't burn and hid them away."
34260-257 = "Koharu...? "
34260-258 = "Yes, it was Koharu."
34260-259 = "Whoa! You know who Koharu is?"
34260-260 = "...Yes, I do."
34260-261 = "Tell her I said thank you. I can't believe she did this, even though I always bullied her."
34260-266 = "..."
34260-271 = "..."
34260-272 = "[ns] \"I'm sure you have a lot to talk to each other about.\""
34260-273 = "I would say so."
34260-274 = "But for now, I believe we all have a hearing to attend."
34260-275 = "Yes."
34260-276 = "W-Wait. You want me to go to my hearing looking like this?  "
34260-277 = "Can I take a shower first? I want treatment for my wounds and to get my hair done. With a fancy curler! "
34260-281 = "..."
34260-282 = "..."
34260-283 = "Yes, Mika. You may have the fancy curler as well."
34260-284 = "Yes, and then the three of us will go to the hearing together. Although we all look a bit of a mess."
34260-286 = "[ns] \"I'm coming too.\""
34260-288 = "Yes, of course. All of us promised Mika we would attend, didn't we?"
34260-290 = "Next Episode; Epilogue"

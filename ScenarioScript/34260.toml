[translation]
34260-1 = "第26話;今後的我們"
34260-6 = "各位！往地下墓穴的道路就依照聖亞大人說的前進！"
34260-7 = "是，是的……！！"
34260-8 = "一花，你那邊的狀況如何？找到老師了嗎？"
34260-9 = "是，是的！已經找到了。#n不過……弦生前輩她……"
34260-10 = "……咦？弦生她？"
34260-17 = "請冷靜一點，弦生前輩。#n那裡不是門是牆壁……"
34260-21 = "啊，完了。"
34260-26 = "……科科科科科科。"
34260-30 = "呀啊啊啊啊啊啊啊──！！"
34260-35 = "[ns] 「弦生……」"
34260-36 = "……實現正義部？#n為，為什麼會在這裡……"
34260-37 = "啊，啊啊……你好呀，老師。#n我是實現正義部的一花。"
34260-38 = "不久之前逮捕美食研究會的時候應該見過一次……雖然你可能忘記了……如你所見，我們來幫忙了哦。"
34260-39 = "[s] 「嗯，能看到你們我很高興，一花。」"
34260-40 = "嘿嘿……能跟老師打招呼真開心。"
34260-44 = "蓮實前輩，已經確認老師和彌香大人的安全了。"
34260-45 = "那麼請儘速撤退到安全地區……帶老師到地下墓穴的安全路線吧！"
34260-46 = "好的好的。來，我們走吧！#n有人正在等著你們呢。"
34260-55 = "老師……！！彌香同學……！！你們沒事吧！"
34260-57 = "渚，渚醬……？#n咦，你們怎麼跑到這裡來了……"
34260-59 = "這裡是奧利斯修復作戰的指揮本部……"
34260-60 = "你，你怎麼到這裡來的……？"
34260-62 = "是我告訴他的。"
34260-63 = "[ns] 「聖亞……！！？」"
34260-69 = "聖……"
34260-70 = "聖亞……醬……"
34260-71 = "真笨啊，彌香。"
34260-72 = "跟往常一樣因為衝動而犯錯。這是你的壞習慣哦。"
34260-73 = "……聖亞醬。#n為，為什麼……？"
34260-74 = "……要編織語言，時間似乎不太充足呢。"
34260-79 = "我在白晝之夢中，偶然邂逅了某人……"
34260-80 = "我長話短說吧……簡單來說，做了一點小小的交易。"
34260-83 = "聖，聖亞大人……！？"
34260-84 = "咳，咳……"
34260-85 = "團，團長！聖亞大人她……！！"
34260-86 = "拜託了，現在立刻叫渚……還有修女會跟實現正義部到這裡來……"
34260-87 = "什麼！？#n我，我知道了！！"
34260-88 = "時間不多了……得立刻趕往老師跟彌香身邊才行……！！"
34260-90 = "於是我……就讓修女會和救護騎士團，還有實現正義部一起到這裡來了。"
34260-91 = "唯一可以確定的是──渚為了救出彌香，宣告自己不惜放下所有權力，也要動員所有人這件事吧。"
34260-93 = "……拜託了，各位……#n請救救彌香同學吧……"
34260-94 = "我也拜託你們。"
34260-99 = "……"
34260-101 = "這個……"
34260-102 = "請抬起頭吧，渚大人，聖亞大人。#n不必向我們低頭。"
34260-103 = "彌香大人的情況我了解了。#n還有……聖亞大人沒事真是太好了。究竟發生了什麼呢？"
34260-105 = "這……說來話長……"
34260-106 = "……我知道了。"
34260-107 = "那麼，我就先不過問了。"
34260-108 = "保護老師才是最優先的。#n……我也會盡力幫忙的。"
34260-109 = "三一除了我以外也有許多仰慕著老師的學生。#n她們應該會願意協助我們的。"
34260-110 = "啊啊……拜託你們了。"
34260-115 = "……這就是所有我知道的地下墓穴的變化模式了。"
34260-116 = "幫大忙了。謝謝你，梓。"
34260-117 = "那個……我不去真的沒關係嗎？"
34260-118 = "是的。請你在這裡等老師吧。"
34260-119 = "如果連這個任務都要借助補課部……特別是你的幫助的話，#n我們的尊嚴跟體制都會受損的。"
34260-120 = "我也盡量不勞煩花子同學了。"
34260-121 = "這件事請讓我們來解決吧。"
34260-122 = "這樣啊……"
34260-123 = "那，那個……"
34260-124 = "……還有什麼事嗎？"
34260-128 = "那個……請救救敦子吧。"
34260-129 = "梓……我想老師應該已經把她救出來了哦。#n我們要去救的是老師。"
34260-130 = "……我知道。#n但是……既然要去的話，要是大家都能順利……得救就好了……"
34260-131 = "……這樣啊。#n就算她們曾經拿槍口對準了你也一樣嗎……"
34260-132 = "……嗯。已經做了無數無法挽回的事了。"
34260-137 = "不過……他們也是我的家人啊……"
34260-140 = "嗚，嗚……你以為現在是幾點啊……"
34260-141 = "唔哼哼，是大家都在睡覺的時間呢，憂同學。#n能幫我找找那邊的書頁嗎？"
34260-142 = "等，等一下……話說你為什麼穿成這樣……"
34260-143 = "我也是在散步……不是，游泳的時候突然被通知的……"
34260-144 = "唔嗯，是這個嗎？來找下一頁吧。"
34260-145 = "游泳……？在這種時間……？#n等等，你剛剛說了散步對吧！？"
34260-149 = "等等！那裡，就是那個！#n找到了！古代聖徒會留下來的地下墓穴的地圖！"
34260-150 = "是，是這頁嗎？#n破損跟褪色都很嚴重呢……"
34260-151 = "沒錯，所以我才會來這裡的。#n被稱為古書館的魔術師的古関憂同學……"
34260-152 = "嗚，啊，嗚嗚……"
34260-153 = "你能夠復原這份地圖的對吧？#n沒有時間了。"
34260-158 = "可以請你現在就開始復原嗎，古．關．前．輩？#n我也會努力幫忙的。"
34260-159 = "嗚，嗚……#n為什麼我會碰上這種事情……"
34260-163 = "來，要出發了哦！距離最近的遺跡就在那裡！"
34260-166 = "是，是的！"
34260-171 = "那，那個……！"
34260-172 = "咦？你是……小春……？"
34260-173 = "啊，嗚……雖，雖然我也是實現正義部的人……#n但，但是現在是補課部的成員，所以不能一起出動……那個，前輩……"
34260-174 = "請把這個……交給茶會的那位大人。"
34260-180 = "……這是什麼？#n蝴蝶結跟飾品……？"
34260-181 = "那個……這是留在實現正義部沒收物品倉庫裡的，那位大人的私人物品……"
34260-182 = "啊啊……確實是這樣呢。#n這是彌香同學收藏的飾品。"
34260-183 = "咦，可是……我聽說都因為暴動而被燒光了……還留在倉庫裡嗎？"
34260-184 = "啊，呃……我從燒過的灰燼裡，偷偷把完整的東西收集起來了……#n那，那個……本來應該是，不能做這種事的……"
34260-185 = "……原來如此。#n我了解了，小春。"
34260-186 = "我會轉達彌香同學的。"
34260-187 = "啊嗚……非常……感謝。"
34260-197 = "大家……"
34260-198 = "我們也不能總是借助老師的力量。#n讓那個人成為我們前方的明燈，才算是理想的關係吧。"
34260-199 = "所以……我們來救你了，彌香。"
34260-200 = "……聖亞醬，還是老樣子說著讓人聽不懂的話呢。#n真的是一副偉大的樣子，打從心底讓人煩躁。"
34260-204 = "我好幾次都想要讓你吃點苦頭。"
34260-205 = "──儘管如此還是最喜歡妳了，聖亞醬。"
34260-206 = "……咦？"
34260-207 = "渚醬也太歇斯底里了！#n話說，都到了這種地方也沒辦法放下手中的紅茶，會不會太誇張了？"
34260-213 = "咖啡因中毒？還是有強迫症？"
34260-214 = "──不過，這樣的渚醬我最喜歡了。"
34260-216 = "不，不是，這是因為……很緊張所以……"
34260-217 = "……咦？"
34260-222 = "嗯……最喜歡你們了。"
34260-223 = "謝謝你們……還有，對不起……"
34260-228 = "彌香同學……"
34260-229 = "……不，要道歉的是我才對。#n……抱歉了，彌香。"
34260-230 = "我一直想著要跟你道歉。"
34260-231 = "不過卻被像孩子一樣的脾氣給阻礙而沒能做到……"
34260-232 = "彌香……如果妳告訴我想和奧利斯和解的那個時候，我能夠……"
34260-233 = "沒關係，別說了……我沒事的。"
34260-234 = "對不起……是我錯了……"
34260-235 = "彌香同學……"
34260-236 = "彌香……"
34260-243 = "啊，那個……很抱歉在這麼好的氣氛中打擾妳們……#n我有東西想交給彌香同學。"
34260-244 = "給我……？"
34260-245 = "請收下吧……"
34260-249 = "……這個是。"
34260-253 = "我的……飾品……？#n咦，怎麼會？不是全都被燒掉了嗎……！？"
34260-254 = "啊，那個……是收押品管理室的負責人她……"
34260-255 = "嗯，真難說明啊……"
34260-256 = "那個孩子，似乎保管著沒有被燒毀的彌香同學的飾品。"
34260-257 = "小春醬她……？"
34260-258 = "嗯，是小春她……咦，"
34260-259 = "咦咦！？#n妳知道小春嗎？"
34260-260 = "……嗯，知道哦。"
34260-261 = "謝謝你，小春醬……#n明明我對妳做出了那麼過分的事……"
34260-266 = "……"
34260-271 = "……"
34260-272 = "[ns] 「找個時間大家好好聊一聊比較好呢。」"
34260-273 = "……嗯，確實如此。"
34260-274 = "那麼我們也差不多該走了。#n離彌香同學的聽證會沒多少時間了。"
34260-275 = "嗯。"
34260-276 = "咦……我一定要穿成這樣去嗎？"
34260-277 = "我想換個衣服啊……也想治療一下。#n要出現在大家面前的話也要整理一下髮型才行。"
34260-281 = "……"
34260-282 = "……"
34260-283 = "唉……隨妳高興吧。"
34260-284 = "嗯。而且我們三個整晚都沒睡，這副模樣實在有點……"
34260-286 = "[ns] 「我也一起去。」"
34260-288 = "……那是當然的，老師。#n畢竟我們約好了，所有人都要出席聽證會。"
34260-290 = "下一話;尾聲"

[translation]
34260-1 = "第26話;これからの私たち"
34260-6 = "さあ皆さん！カタコンベの道はセイア様が教えてくれた通りに！"
34260-7 = "は、はい……！！"
34260-8 = "イチカ、そちらはどうですか？先生は見つかりましたか？"
34260-9 = "あ、はい！見つけました。#nところで……ツルギ先輩が……。"
34260-10 = "……えっ？ツルギが？"
34260-17 = "落ち着いてほしいっす、ツルギ先輩。#nそこはドアじゃなくて壁……。"
34260-21 = "あ、おわった。"
34260-26 = "……けけけけけけ。"
34260-30 = "きあああああああっーー！！"
34260-35 = "[ns] \"ツルギ……。\""
34260-36 = "……正義実現委員？#nど、どうしてここに……。"
34260-37 = "あ、ああ……こんにちはっす、先生。#n正義実現委員のイチカっす。"
34260-38 = "この前、美食研究会の逮捕の際に一応お会いしたっすが……もしかしたら覚えてないかもしれないっすね………ご覧の通り、助けに来たっす。"
34260-39 = "[s] \"うん、会えてとても嬉しいよ、イチカ。\""
34260-40 = "えへへ……先生と挨拶できて嬉しいっす。"
34260-44 = "ハスミ先輩、先生とミカ様を確保したっす。"
34260-45 = "それでは早急に安全地帯へ退却してください……先生をカタコンベの確保されたルートへご案内します！"
34260-46 = "はいはーい。さあ、行きましょう！#n皆さんを待っている人がいるっすよ。"
34260-55 = "先生……！！ミカさん……！！ご無事でしたか！"
34260-57 = "な、ナギちゃん……？#nあれ、どうしてここに……。"
34260-59 = "ここがアリウス修復作戦の指揮本部です……。"
34260-60 = "ど、どうやってここに来たの……？"
34260-62 = "私が教えたのだよ。"
34260-63 = "[ns] \"セイア……！！？\""
34260-69 = "せ……"
34260-70 = "セイア……ちゃん……。"
34260-71 = "本当に愚かだね、ミカ。"
34260-72 = "常のように、衝動で動いて事[ruby=あやま]を過つ[/ruby]。それが君の悪癖だよ。"
34260-73 = "……セイアちゃん。#nど、どうやって……？"
34260-74 = "……言葉を紡ぐには、些か時間が足りないかもしれないね。"
34260-79 = "白昼夢の中で偶然、在る人と邂逅できたんだ……。"
34260-80 = "語ると長くなってしまうから割愛するが……言わば、小さな取引を交わしたのだよ。"
34260-83 = "せ、セイア様……！？"
34260-84 = "ゲホッ、ゲホッ……"
34260-85 = "だ、団長！セイア様が……！！"
34260-86 = "頼む。今すぐナギサを……シスターフッドと、正義実現委員をここに……！"
34260-87 = "はい！？#nわ、分かりました！！"
34260-88 = "時間がない……今すぐ先生とミカの元へ向かわなければ……！！"
34260-90 = "そうして私は……シスターフッドと救護騎士団、そして正義実現委員を呼び出してここへ出動させた。"
34260-91 = "一つ確かなことは――ナギサはミカを救うためなら、自分の全ての権力を手放しても構わないとまで告げ、周囲を総動員させたという事かな。"
34260-93 = "……お願い致します、皆様……#nミカさんを、救ってください……。"
34260-94 = "私からも頼む。"
34260-99 = "……。"
34260-101 = "そんな……。"
34260-102 = "頭を上げてくださいナギサ様、セイア様。#nあなた方が私たちに頭を下げないでください。"
34260-103 = "ミカ様の問題は承知しました。#nそして……セイア様がご無事でなによりです。一体、何があったのですか？"
34260-105 = "それは……語ると長くなってしまうのだが……"
34260-106 = "……分かりました。"
34260-107 = "それならば、今は止めておきましょう。"
34260-108 = "何より優先すべきは、先生の事です。#n……私も最善を尽くしましょう。"
34260-109 = "トリニティには私だけでなく、先生を慕う生徒が多いです。#n彼女たちなら協力してくれるでしょう。"
34260-110 = "ああ……お願いするよ。"
34260-115 = "……これが、私が知っているカタコンベの変化パターンの全て。"
34260-116 = "大変助かりました。ありがとうございます、アズサ。"
34260-117 = "えっと……本当に、私が行かなくても大丈夫なのか？"
34260-118 = "はい。あなたはここで先生を待っていてください。"
34260-119 = "この任務で補習授業部……特にあなたの手を借りたら、#n私たちの矜持や体裁が崩れてしまいますから。"
34260-120 = "ハナコさんのお手もそこまで煩わせないようにしております。"
34260-121 = "これは、私たちで解決させてください。"
34260-122 = "そう……。"
34260-123 = "え、えっと……。"
34260-124 = "……何か他にあるのですか？"
34260-128 = "その……アツコを、助けてあげて。"
34260-129 = "アズサ……その子は既に先生が助けていると思いますよ。#n私たちは先生を助けに行くのです。"
34260-130 = "……分かってる。#nでも……どうせなら、他の皆も無事に……助けられたらと思うんだ……。"
34260-131 = "……そうですか。#n彼女たちは、あなたに銃を向けたというのに……。"
34260-132 = "……うん。数え切れないほどの、取り返しのつかない事をしてるよ。"
34260-137 = "でも……私の家族でもあったんだ……。"
34260-140 = "う、うぅ……いま何時だと思ってるんですか……。"
34260-141 = "うふふ、皆さん眠りについている時間ですね、ウイさん。#nあちらのページを探してくださいますか？"
34260-142 = "い、いや……ところでどうしてそんな格好を……。"
34260-143 = "私も急に散歩……いえ、水泳の最中に知らせを受けましたので………"
34260-144 = "うーん、これでしょうか？次のページを探しましょう。"
34260-145 = "水泳……？この時間に……？#nいや、その前に散歩って言いませんでした！？"
34260-149 = "待って！そこ、それです！#n見つかりました！古代聖徒会が残したカタコンベの地図！"
34260-150 = "こ、このページですか？#nだいぶ傷んでしまって変色が酷いけど……。"
34260-151 = "ええ、だからこちらに来たんです。#n古書館の魔術師と呼ばれる[ruby=こぜき]古関[/ruby]ウイさん……。"
34260-152 = "う、あ、うぅ……。"
34260-153 = "あなたなら、この地図を復元できますよね？#n時間がないんです。"
34260-158 = "今からこれの復元をお願いできますか、こ・ぜ・き・せ・ん・ぱ・い？#n私が力いっぱいお手伝いしますから。"
34260-159 = "う、うぅ……。#nどうして私がこんな目に……。"
34260-163 = "さあ、行くっすよ！一番近い遺跡はアレっす！"
34260-166 = "は、はい！"
34260-171 = "あ、あの……！"
34260-172 = "あれ？君は……コハル……？"
34260-173 = "あ、うぅ……わ、私も正義実現委員会だけど……#nい、今は補習授業部で、一緒に出動できないから……その、先輩……。"
34260-174 = "これを……ティーパーティーのあの方に。"
34260-180 = "……これは何すか？#nリボンとアクセサリー……？"
34260-181 = "その……正義実現委員会の押収品倉庫に残っていた、あの方の私物……です。"
34260-182 = "ああ……確かにそうっすね。#nこれはミカ様が集めていたアクセサリーっすね。"
34260-183 = "あれ、でも……暴動で燃やされたと聞いてたっすけど……倉庫にあったっすか？"
34260-184 = "あ、えっと……燃え残った中から、無事なものをこっそり集めていたんです……#nえ、えっと……本来ならダメ、なんですけど……。"
34260-185 = "……なるほど。#n了解っす、コハル。"
34260-186 = "ミカ様に伝えておくっす。"
34260-187 = "あうぅ……ありがとう……ございます。"
34260-197 = "みんな……。"
34260-198 = "私たちも、先生の力を借り続けていてはならない。#n彼の人の道先に光を灯せてこそ、理想的な関係足り得るからね。"
34260-199 = "だから……君を救うために来たよ、ミカ。"
34260-200 = "……セイアちゃん、相変わらず何言ってるのか分かんないよ。#n本当に偉そうだし、心底ムカつく。"
34260-204 = "何度も懲らしめたいと思ってた。"
34260-205 = "――それでも大好き、セイアちゃん。"
34260-206 = "……え？"
34260-207 = "ナギちゃんはヒステリーがひどすぎ！#nっていうか、こんな所まで紅茶を手放せないのちょっとどうかと思うよ？"
34260-213 = "カフェイン中毒？それとも強迫症？"
34260-214 = "――でも、そんなナギちゃんが大好き。"
34260-216 = "い、いえ、これは……緊張してしまって……。"
34260-217 = "……えっ？"
34260-222 = "うん……二人とも、大好きだよ。"
34260-223 = "二人ともありがとう……そして、ごめんね……。"
34260-228 = "ミカさん……。"
34260-229 = "……いや、むしろ謝るのは私の方だよ。#n……すまなかった、ミカ。"
34260-230 = "いつも君に謝ろうと思っていたんだ。"
34260-231 = "だが、子供みたいな意地が邪魔をして、果たすことができなかった……。"
34260-232 = "ミカ……君が、アリウスと和解したいと言い出した時、私は……。"
34260-233 = "ううん、何も言わないで……大丈夫だから。"
34260-234 = "ごめんね……私が悪かったの……。"
34260-235 = "ミカさん……。"
34260-236 = "ミカ……。"
34260-243 = "あ、ええっと……いい雰囲気のなか申し訳ないっすけど……#nミカ様に渡したいものがあるっす。"
34260-244 = "私に……？"
34260-245 = "これを……。"
34260-249 = "……これは。"
34260-253 = "私の……アクセサリー……？#nえ、どうして？全部燃えちゃったはずなのに……！？"
34260-254 = "ああ、えっと……押収品の管理室担当員が……"
34260-255 = "んー、説明しにくいんすけど……"
34260-256 = "その子が、ミカ様のアクセサリーで燃えずに残ってたものを保管してたみたいで。"
34260-257 = "コハルちゃんが……？"
34260-258 = "はい、コハルが……って、"
34260-259 = "ええっ！？#nコハルの事ご存知だったんすか？"
34260-260 = "……うん。知ってる。"
34260-261 = "ありがとうコハルちゃん……#n私、あなたに酷いことをしたのに……。"
34260-266 = "……。"
34260-271 = "……。"
34260-272 = "[ns] \"お互いに色々と話す時間をとったほうがいいね。\""
34260-273 = "……ああ、そのようだね。"
34260-274 = "では、そろそろ参りましょうか。#nミカさんの聴聞会まで、もう時間がありませんから。"
34260-275 = "ああ。"
34260-276 = "えー……私、この格好で行かなきゃダメ？"
34260-277 = "ちょっと着替えたいんだけど……傷の治療もしたいし。#n人前に立つんだから、髪もセットし直さなきゃいけないし。"
34260-281 = "……。"
34260-282 = "……。"
34260-283 = "はぁ……好きにするといい。"
34260-284 = "ええ。それに私たち三人とも徹夜してしまってますし、こんな格好では……。"
34260-286 = "[ns] \"私も一緒に行くよ。\""
34260-288 = "……勿論です先生。#n全員で聴聞会に出席するのが、私たちの約束ですからね。"
34260-290 = "次回;エピローグ"

[translation]
34260-1 = "ตอนที่ 26;พวกเราในอนาคต"
34260-6 = "เอาละ ทุกคน! ถ้าไปตามทางที่คุณเซอาบอก ก็ไม่มีทางหลงทางในสุสานใต้ดินค่ะ!"
34260-7 = "ค่ะ... ค่ะ!!"
34260-8 = "อิจิกะ ทางนั้นเป็นยังไงบ้างคะ? เจอคุณครูไหมคะ? "
34260-9 = "(ซ่า) ค่ะ เจอแล้วค่ะ แต่ว่า... รุ่นพี่ซึรุกิ..."
34260-10 = "คะ...? ซึรุกิ?"
34260-17 = "เบาได้เบาค่ะ รุ่นพี่ซึรุกิ นั่นไม่ใช่ประตูนะคะ นั่นมันผนัง..."
34260-21 = "อ๊ะ ไม่ทันซะแล้ว"
34260-26 = "หึหึหึหึหึหึหึ!"
34260-30 = "ว้าาาาากกกก!!"
34260-35 = "[ns] \"ซึรุกิ...\""
34260-36 = "ชมรมทวงความยุติธรรม? ทะ...ทำไมถึงมาที่นี่..."
34260-37 = "อะแฮ่ม สวัสดีค่ะคุณครู ฉันคืออิจิกะจากชมรมทวงความยุติธรรมค่ะ  "
34260-38 = "เราเคยเจอกันแค่ครู่เดียวตอนจับกุมชมรมชิมอาหารคราวก่อน แต่นี่เป็นครั้งแรกที่เราได้คุยกันค่ะ... และก็อย่างที่เห็น... ฉันมาช่วยค่ะ"
34260-39 = "[s] \"อื้ม ดีใจจังที่ได้เจอกันที่นี่ อิจิกะ\""
34260-40 = "แหะๆ คำทักทายของคุณครูมันดีต่อใจจังค่ะ"
34260-44 = "รุ่นพี่ฮาสุมิ ฉันพบคุณครูและคุณมิกะแล้วค่ะ"
34260-45 = "(ซ่า) งั้นเหรอคะ? ถ้างั้นก็รีบล่าถอยมายังเขตที่ปลอดภัย... เอ่อ... บอกทางในสุสานใต้ดินให้คุณครู#nทราบด้วยค่ะ!"
34260-46 = "ค่ะๆ ไปเถอะค่ะ มีคนกำลังรอพบทุกคนอยู่นะคะ"
34260-55 = "คุณครู...!! คุณมิกะ...!! ปลอดภัยดีสินะคะ!"
34260-57 = "นะ... นางิจัง...? ทะ...ทำไมถึงมาอยู่ที่นี่ได้..."
34260-59 = "ตรงนี้คือกองบัญชาการปฏิบัติการยึดคืนอาเรียสค่ะ... "
34260-60 = "ทะ...ทำไมถึงมาที่นี่ล่ะ...? แล้วรู้เรื่องได้ยังไง?"
34260-62 = "ฉันเป็นคนบอกเองค่ะ"
34260-63 = "[ns] \"เซอา...?!!\""
34260-69 = "ซะ... "
34260-70 = "เซอาจัง..."
34260-71 = "มิกะเนี่ย เป็นเด็กดื้อจริงๆ เลยนะคะ"
34260-72 = "เอาแต่ก่อเรื่องโดยไม่ยับยั้งชั่งใจตลอดเลยค่ะ นี่คือนิสัยที่ไม่ดีของคุณนะคะ"
34260-73 = "เซอาจัง... นะ... นี่มัน... เกิดอะไรขึ้นกันเนี่ย"
34260-74 = "เรื่องมันยาวน่ะค่ะ..."
34260-79 = "หากไม่ได้พบใครบางคนโดยบังเอิญในความฝันละก็..."
34260-80 = "อืม มันเกิดเรื่องขึ้นเยอะแยะเลย... แต่ถ้าจะให้สรุปสั้นๆ ก็คือ ฉันไปทำข้อตกลงเล็กๆ น้อยๆ แล้วหนีออกมาจากที่นั่นได้ค่ะ"
34260-83 = "คะ... คุณเซอา...?!"
34260-84 = "แค่ก... แค่ก..."
34260-85 = "หะ... หัวหน้าคะ! คุณเซอา...!!  คุณเซอาเค้า...!"
34260-86 = "ขอร้องละค่ะ ช่วยไปพานางิสะ... ชมรมซิสเตอร์ และชมรมทวงความยุติธรรมมาที่นี่... เดี๋ยวนี้...!"
34260-87 = "คะ?! ได้เลยค่ะ!!"
34260-88 = "ไม่มีเวลาแล้วค่ะ... ต้องไปช่วยคุณครูกับมิกะเดี๋ยวนี้เลยค่ะ...!!"
34260-90 = "ทันทีที่ฉันได้สติ... ฉันก็เรียกชมรมซิสเตอร์ ชมรมอัศวินบรรเทาทุกข์ และชมรมทวงความยุติธรรม#nให้ส่งคนมาที่นี่ค่ะ"
34260-91 = "สิ่งหนึ่งที่แน่นอนคือนางิสะดันทุรังว่าอาจสละอำนาจทั้งหมดของตัวเองหากช่วยมิกะไว้ได้ค่ะ"
34260-93 = "ฉันขอร้องละค่ะ ทุกคน ได้โปรดช่วยฉัน... ได้โปรดช่วยคุณมิกะด้วยค่ะ..."
34260-94 = "ใช่ค่ะ ฉันก็ต้องขอร้องเหมือนกันค่ะ"
34260-99 = "......."
34260-101 = "อะไรกัน..."
34260-102 = "เงยหน้าขึ้นเถอะค่ะ คุณนางิสะ คุณเซอา อย่าก้มหัวให้พวกเราเลยค่ะ"
34260-103 = "ฉันเข้าใจปัญหาของคุณมิกะอยู่หรอกค่ะ แต่เหนือสิ่งอื่นใด ฉันดีใจนะคะที่คุณเซอายังปลอดภัย ว่าแต่นี่มันเรื่องอะไรกันคะเนี่ย?"
34260-105 = "คือว่า... เรื่องมันยาวน่ะค่ะ..."
34260-106 = "ก็ได้ค่ะ..."
34260-107 = "ถ้าอย่างนั้นฉันก็จะไม่ถามค่ะ"
34260-108 = "งานที่สำคัญที่สุดสำหรับพวกเราคือตัวคุณครู... รับทราบค่ะ ฉันเองก็จะพยายามเต็มที่ค่ะ"
34260-109 = "นอกจากฉันแล้ว มีนักเรียนในทรีนิตี้มากมายที่เป็นหนี้บุญคุณคุณครูค่ะ พวกเธอก็จะไม่ปฏิเสธ#nความช่วยเหลือค่ะ"
34260-110 = "ค่ะ ถ้างั้นก็ขอรบกวนด้วยนะคะ"
34260-115 = "ประมาณนี้แหละ... นี่คือรูปแบบการเปลี่ยนแปลงของสุสานใต้ดินที่ฉันพอจะรู้"
34260-116 = "ค่ะ ช่วยได้มากเลยค่ะ ขอบคุณนะคะอาซึสะ"
34260-117 = "แล้วนี่... แน่ใจเหรอว่าไม่อยากให้ฉันไปด้วย?"
34260-118 = "ค่ะ คุณรอรับคุณครูอยู่ที่นี่เถอะค่ะ "
34260-119 = "หากภารกิจนี้ต้องขอความช่วยเหลือจากชมรมชั้นเรียนเสริม... โดยเฉพาะจากคุณแล้วละก็... ความภาคภูมิใจและความองอาจของเรา... ก็คงพังทลายลงค่ะ"
34260-120 = "ฉันก็เลยฝากให้คุณฮานาโกะทำอะไรง่ายๆ ไป..."
34260-121 = "ขอให้พวกฉันได้จัดการเรื่องนี้เถอะนะคะ"
34260-122 = "อะ... อืม"
34260-123 = "คะ... คือว่า..."
34260-124 = "ค่ะ มีอะไรจะพูดต่อเหรอคะ?"
34260-128 = "อาสึโกะ... ช่วยอาสึโกะให้ด้วยนะ..."
34260-129 = "คุณครูคงช่วยเด็กคนนั้นไว้แล้วละค่ะ อาซึสะ พวกเราจะเข้าไปช่วยคุณครูค่ะ"
34260-130 = "อืม... แล้วก็... ถ้าเป็นไปได้... หวังว่าจะช่วยคนอื่นๆ ให้ปลอดภัยได้ด้วย..."
34260-131 = "....... งั้นเหรอคะ พวกนั้นเป็นถึงคนที่เคยเล็งปืนใส่คุณนะคะ..."
34260-132 = "ใช่... เป็นคนที่ทำเรื่องชั่วร้ายมานับไม่ถ้วนเลยละ"
34260-137 = "แต่ว่า... พวกเธอก็เป็นครอบครัวของฉันด้วย..."
34260-140 = "ฮึ่ม... ระ... รู้ไหมคะว่านี่มันกี่โมงกี่ยามกันแล้ว...?"
34260-141 = "ค่ะ เป็นช่วงเช้ามืดที่ทุกคนกำลังหลับอยู่ไงคะ คุณอุย ลองหาหน้าโน้นดูสิคะ"
34260-142 = "ดะ... เดี๋ยวสิ... ว่าแต่ทำไมถึงแต่งตัวแบบนี้..."
34260-143 = "พอดีฉันเองก็ได้ยินข่าวด่วนมาระหว่างที่เดินเล่น... ไม่สิ ระหว่างว่ายน้ำน่ะค่ะ"
34260-144 = "อืม... อันนี้หรือเปล่านะ? ไปหน้าถัดไปเถอะค่ะ"
34260-145 = "ว่ายน้ำ...? เวลานี้เนี่ยนะคะ...? ไม่สิ ก่อนหน้านี้พูดว่าเดินเล่นหรือเปล่าคะ? "
34260-149 = "เดี๋ยวก่อน! หน้านั้นค่ะ เจอแล้วค่ะ นี่แหละค่ะ! แผนที่โบราณของสุสานใต้ดินที่สาวกทิ้งไว้!"
34260-150 = "นะ... หน้านี้เหรอคะ? สภาพแทบจะอ่านไม่ได้แล้ว... แถมสีก็เปลี่ยนไปเยอะเลยด้วย..."
34260-151 = "ค่ะ ฉันก็เลยมาที่นี่ยังไงล่ะคะ มาเพื่อพบคุณโคเซกิ อุยที่ได้ชื่อว่าเป็นแม่มดแห่งห้องสมุดเก่า "
34260-152 = "อะ... เอ่อ..."
34260-153 = "คุณฟื้นฟูแผนที่นี้ได้ใช่ไหมคะ? เราไม่มีเวลาแล้วค่ะ "
34260-158 = "เพราะงั้นช่วยฟื้นฟูให้เดี๋ยวนี้เลยได้ไหมคะ รุ่น พี่ โค เซ กิ? ฉันเองก็จะช่วยอย่างเต็มที่ค่ะ♡"
34260-159 = "....... ทะ... ทะ... ทำไมฉันถึงต้องเจอเรื่องแบบนี้ด้วยนะ..."
34260-163 = "รีบๆ เข้าสิคะ! ซากปรักหักพังที่ใกล้ที่สุดอยู่ทางโน้นค่ะ!"
34260-166 = "ค่ะ ค่ะ!"
34260-171 = "นะ... นี่...!"
34260-172 = "หืม? เธอคือ... โคฮารุ...?"
34260-173 = "เอ่อ... ฉะ... ฉันก็เคยอยู่ชมรมทวงความยุติธรรม... ตะ... แต่ว่าตอนนี้ต้องอยู่ในชมรมชั้นเรียนเสริม ก็เลยเข้าร่วมด้วยไม่ได้... เออะ... เอ่อ... รุ่นพี่..."
34260-174 = "คือว่า... ช่วยเอาอันนี้ไปให้คนในสภาน้ำชา..."
34260-180 = "คะ...? นี่มันอะไรเหรอคะ? ริบบิ้นกับเครื่องประดับ...?"
34260-181 = "มันเป็นของของคนในสภาน้ำชา... ที่เหลืออยู่ในคลังของที่ถูกอายัดของชมรมทวงความยุติธรรมน่ะ"
34260-182 = "อ๋อ... จริงสิ คงเป็นเครื่องประดับที่คุณมิกะสะสมไว้สินะคะ...? "
34260-183 = "ได้ยินว่าถูกขโมยไปแล้วก็โดนเผาหมดแล้วนี่นา... แสดงว่ามีบางชิ้นปนมาในของที่ถูกยึดมาโดยชมรม#nทวงความยุติธรรมสินะคะ?"
34260-184 = "อ้อ ใช่แล้วค่ะ ฉันแอบเอาของที่สภาพดีมา... เอ่อ... แต่ปกติแล้ว... ก็ไม่ควรทำแบบนี้... "
34260-185 = "อย่างนี้เองเหรอคะ... รับทราบค่ะโคฮารุ "
34260-186 = "ฉันจะเอาไปให้คุณมิกะให้เองค่ะ "
34260-187 = "อ๊ะ... คะ... ค่ะ ขอบคุณ... ค่ะ"
34260-197 = "นี่ทุกคน..."
34260-198 = "พวกเราไม่ควรจะหวังพึ่งแต่คุณครูไปตลอดนะคะ พวกเราก็ต้องช่วยคุณครูกลับบ้าง จะได้เป็นความสัมพันธ์ที่เกื้อกูลกันไงคะ"
34260-199 = "ก็เพราะแบบนั้น... ฉันเลยมาช่วยคุณไงคะ มิกะ"
34260-200 = "อืม... เซอาจังยังพูดยากเหมือนเดิมเลยนะ ชอบทำเป็นเก่งอยู่เรื่อย น่าหงุดหงิดชะมัด "
34260-204 = "ฉันละอยากจะดุให้กลัวอยู่หลายครั้งเลย"
34260-205 = "แต่ถึงอย่างนั้นฉันก็ชอบเซอาจังเอามากๆ เลยละ"
34260-206 = "คะ...?"
34260-207 = "นางิจังนี่สุดๆ เลยนะ มาถึงที่นี่ทั้งทีแต่ก็ยังไม่วางแก้วชาอีก เชื่อเค้าเลย"
34260-213 = "เป็นโรคย้ำคิดย้ำทำเหรอ? หรือว่าติดคาเฟอีนน่ะ?"
34260-214 = "ฉันละชอบนางิจังที่เป็นอย่างนี้ที่สุดเลย"
34260-216 = "ระ... เรื่องนั้น... พอดีว่าฉันประหม่ามากไปหน่อย..."
34260-217 = "คะ...?"
34260-222 = "อืม ฉันชอบทั้งสองคนมากเลย "
34260-223 = "ขอบใจนะ... อื้อ ดีจังเลย ขอบใจนะ ทั้งสองคนเลย แล้วก็ขอโทษด้วย..."
34260-228 = "คุณมิกะ..."
34260-229 = "ไม่ค่ะ ฉันต่างหากค่ะที่ต้องขอโทษ ขอโทษนะคะ มิกะ"
34260-230 = "อยากจะขอโทษคุณมาตลอดเลยละค่ะ"
34260-231 = "แต่ก็ไม่ได้ทำแบบนั้นเลยค่ะ ฉันทำตัวเหมือนเด็กเลย..."
34260-232 = "มิกะ... ตอนที่คุณบอกว่าอยากคืนดีกับอาเรียส ตอนนั้นฉันน่ะ..."
34260-233 = "ไม่ต้องหรอก ไม่ต้องพูดอะไรแล้วละ ฉันไม่เป็นไร อืม..."
34260-234 = "ฉันขอโทษนะ ฉันทำผิดเอง..."
34260-235 = "คุณมิกะ..."
34260-236 = "มิกะ..."
34260-243 = "อ่า... บรรยากาศกำลังดีเลย ขอโทษที่เข้ามาขัดนะคะ ฉันมีของบางอย่างต้องให้คุณมิกะค่ะ"
34260-244 = "หืม? ให้ฉันเหรอ...?"
34260-245 = "รับไปสิคะ"
34260-249 = "นี่มัน..."
34260-253 = "เครื่องประดับ... ของฉัน...? ดะ... ได้มาได้ยังไง? มันหายไปหมดแล้วนี่นา...!"
34260-254 = "อ้อ พอดีมีคนที่ดูแลเรื่องคลังของที่ถูกยึด..."
34260-255 = "เอ่อ... มันอธิบายค่อนข้างยากน่ะค่ะ... "
34260-256 = "นักเรียนคนนั้นน่าจะเก็บเครื่องประดับของคุณมิกะที่ถูกแย่งไปแต่ไม่ถูกไฟเผาไว้น่ะค่ะ..."
34260-257 = "โคฮารุจังเหรอ...? "
34260-258 = "ค่ะ โคฮารุค่ะ"
34260-259 = "ดะ... เดี๋ยวนะคะ?! รู้จักโคฮารุเหรอคะ?"
34260-260 = "อื้อ รู้จักสิ"
34260-261 = "ขอบใจนะ... โคฮารุจัง ทั้งๆ ที่ฉันเคยทำตัวไม่ดีกับเธอแท้ๆ... แต่เธอก็ยังจะ..."
34260-266 = "......."
34260-271 = "......."
34260-272 = "[ns] \"ทุกคนคงมีอะไรให้คุยกันเยอะเลยนะ\""
34260-273 = "ค่ะ... นั่นสิคะ"
34260-274 = "ถ้างั้นเราไปกันดีไหมคะ? เราไม่มีเวลาแล้วค่ะ การสืบพยานของคุณมิกะใกล้จะเริ่มแล้ว"
34260-275 = "ค่ะ"
34260-276 = "อืม... นี่ฉันต้องไปในสภาพนี้เหรอ?"
34260-277 = "ขอฉันอาบน้ำก่อนได้ไหม? อยากทำแผลด้วย แล้วก็อยากเป่าผมให้แห้งเพราะต้องไปยืนต่อหน้า#nคนอื่นด้วยน่ะ..."
34260-281 = "......."

[translation]
10013055-2 = "The match that followed was incredibly fierce."
10013055-3 = "The Mushiqueen battlers called on all their experience to put up the fight of a lifetime."
10013055-4 = "President! The most important positional card in Mushiqueen is the Magic Card!"
10013055-6 = "No, no, Pina! What really matters is a partner you can deeply trust and rely on! I call that the Ace Monster!"
10013055-8 = "Even when in crisis, they weren't discouraged, but trusted and supported each other."
10013055-16 = "My HP is nearing zero...! I-I'm in danger!"
10013055-17 = "Don't panic! You still have a chance! During your next turn, you can turn the tables, Shizuko!"
10013055-18 = "Your adorable expression when you're in danger can work to your advantage! Don't worry, I'll record all of this! You can do it!"
10013055-19 = "I get what Mimori said, but was Umika even trying to be encouraging?!"
10013055-28 = "After many battles, we finally made it to the finals of the Mushiqueen contest."
10013055-32 = "Heeheehee. Is it just beginner's luck, or are you an unexpected dark horse?"
10013055-33 = "Horse or luck, you don't stand a chance against my immaculate deck."
10013055-34 = "I'm gonna summon my ace card...the Diamond Rainbow Ant!"
10013055-39 = "Th-That's..."
10013055-40 = "...one of the strongest cards in Mushiqueen!"
10013055-42 = "Hahaha! Attack! Diamond Jaw Cutter!"
10013055-55 = "Argh! So p-powerful! Th-This is...the end..."
10013055-62 = "A proper lady never gives up! Shizuko, trust your cards! Trust yourself! Trust your colleagues!"
10013055-63 = "M-Mimori!"
10013055-65 = "This scene! Kaede!"
10013055-67 = "I know, Pina! It's just like the legendary scene from Episode 378 of Mushiqueen! Just when they were about to lose, the partners banded together and went on to victory!"
10013055-74 = "Draw!"
10013055-76 = "We need a miracle!"
10013055-84 = "Oh, the card we needed didn't show."
10013055-85 = "Wh-What?! I was so caught up in that moment!"
10013055-86 = "Waaaah! The card spirit didn't answer our prayers!"
10013055-88 = "Hahaha! Miracles don't just fall into your lap! I guess it was just beginner's luck!"
10013055-89 = "It was a good battle, you challengers! But this is my victory!"
10013055-97 = "What?! Who the heck are you?!"
10013055-100 = "My turn, now."
10013055-101 = "[s] \"Ch-Chise? You're jumping into the game out of nowhere?!\""
10013055-103 = "Oh! No, Sensei! It's not out of nowhere at all. This is a special rule in Mushiqueen!"
10013055-104 = "You can trigger it in a critical moment. It's called the \"Another Me\" rule!"
10013055-106 = "So we're safe!"
10013055-107 = "[s] \"These rules feel very arbitrary!\""
10013055-113 = "Here...let's use this card."
10013055-117 = "Okay... I'll summon this monster."
10013055-126 = "What? The field turned around in just three cards?!"
10013055-127 = "I forgot! Chise is awesome at card games! She's super-good at Karuta!"
10013055-128 = "[s] \"I don't think that's how it works...\""
10013055-129 = "I'll finish this now. Ultimate weapon."
10013055-141 = "N-No way!"
10013055-146 = "The final winner of the Mushiqueen competition is...!"
10013055-151 = "The challenger, Kawawa Shizuko..."
10013055-155 = "And Shizuko's substitute!"
10013055-159 = "Waraku Chise!"
10013055-160 = "She broke the champion's streak of a hundred consecutive wins! A new legend has been born!"
10013055-166 = "[ns] \"I-It's over...\""
10013055-167 = "Shizuko! Chise! You both are incredible!"
10013055-168 = "Izuna was so moved when Chise saved the day! It was like the ninja films!"
10013055-170 = "Y-Yeah! I'm not too sure what happened, but we won...!"
10013055-171 = "This is the power of Hyakkiyako!"
10013055-172 = "You're gonna get the Mushiqueen contest prize! I'm jealous! You have to let me see the cards later!"
10013055-174 = "We have a new champion!"
10013055-175 = "Ex-champ! Get out of our way!"
10013055-176 = "Argh. You jerks! How could you just toss me to the side?"
10013055-177 = "I mean, those are the rules, but still! I didn't expect to lose in a million years!"
10013055-179 = "Okay! Then let's award the prize to the new champion, courtesy of the Golden Fleece!"
10013055-181 = "Wait, I have a question for you."
10013055-182 = "Huh? What do you want?"
10013055-183 = "I get that you never expected to lose, but..."
10013055-184 = "Why did you host this competition with something as valuable as a Resort Contract on the line?"
10013055-185 = "Why...? No special reason... It's just..."
10013055-186 = "We like games with high stakes!"
10013055-187 = "We'll cross any ocean to enjoy the thrill of games!"
10013055-189 = "You see, we got a cheap Resort Contract online for a nearby island."
10013055-190 = "[s] \"What website is everyone buying these from?!\""
10013055-191 = "We anchored the ship on this island for easy access. We just thought it'd be fun to host the Mushiqueen contest here."
10013055-192 = "Honestly, even if we lose the Resort Contract, we can just take our ship and go somewhere else!"
10013055-193 = "Oh, ex-champion! You're so sly!"
10013055-194 = "We still have a lot of competitions scheduled! Why don't you try again?"
10013055-195 = "Buzz off!"
10013055-196 = "[s] \"So, that was your motive in coming here.\""
10013055-197 = "You planned this competition just because you loved it. You're providing a service in your own way."
10013055-198 = "I understand now."
10013055-199 = "I have a proposal for you."
10013055-200 = "Why don't you keep hosting your competition here?"
10013055-201 = "What?"
10013055-202 = "[s] \"Shizuko? Again?\""
10013055-203 = "At the end of the day, your competition is really popular."
10013055-204 = "Pina talks about Mushiqueen all the time, so I've always been a little interested."
10013055-205 = "And, well, I learned some things from participating."
10013055-206 = "Aww! President! I'm touched!"
10013055-207 = "Are you going to start playing? I can teach you the ways of Mushiqueen!"
10013055-209 = "Heehee. I love to see everyone so happy."
10013055-210 = "Ahem! I just thought Momoyodou's business could benefit from offering this kind of service! That's all!"
10013055-211 = "So, you want to sign a contract with us?"
10013055-212 = "I won't force you into anything. But if you'd like, yes."
10013055-213 = "Oh! But from now on, you can't take away cards from the loser! The rules will be modified to suit entertainment purposes!"
10013055-215 = "Well, I guess it wouldn't hurt to..."
10013055-216 = "...play more games. Right?"
10013055-217 = "All right, let's do it!"
10013055-218 = "Oh, but does that mean the new champion isn't champion anymore?"
10013055-219 = "You're right... W-Welcome back, ex-champion!"
10013055-220 = "The ex-champion is the only champion for us."
10013055-221 = "Come on, you guys!"
10013055-226 = "[ns] \"Good job, Shizuko. Another happy ending.\""
10013055-227 = "Don't give me that look!"
10013055-228 = "I just chose the best route for my business!"
10013055-229 = "[ns] \"We have another franchise under contract.\""
10013055-231 = "Yeah! Let's keep this momentum going!"
10013055-232 = "The next destination is..."

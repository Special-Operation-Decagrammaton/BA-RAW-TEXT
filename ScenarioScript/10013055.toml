[translation]
10013055-2 = "(และการแข่งขันที่ตามมาก็ดุเดือดจนต้องลุ้นกันทุกจังหวะ)"
10013055-3 = "(ด้วยคำแนะนำที่ถูกต้องจากดูเอลลิสต์มูชิควีนผู้เชี่ยวชาญ... และ...!)"
10013055-4 = "หัวหน้า! การ์ดสำคัญที่สุดในมูชิควีนก็คือ <การ์ดเวทมนตร์> ค่ะ!"
10013055-6 = "ไม่ใช่ๆ พีน่า! สิ่งที่สำคัญจริงๆ คือคู่หูที่ไว้วางใจและพึ่งพาได้! เอซ มอนสเตอร์ไงล่ะ!"
10013055-8 = "(กำลังใจจากเพื่อนๆ ที่พึ่งพาได้ และไม่ท้อแท้แม้จะอยู่ในวิกฤต...!)"
10013055-16 = "อ๊ะ...! หัวใจของฉันจะหมดแล้ว...! อะ... อันตราย!"
10013055-17 = "ไม่เป็นไรค่ะ! ยังมีโอกาสอยู่ค่ะ! ฉันจะพลิกเกมให้ได้ในตาต่อไปค่ะชิซุโกะจัง!"
10013055-18 = "ค่ะ! สีหน้าของท่านประธานในยามวิกฤต! มันจะต้องได้ผลกับลูกค้าที่มีรสนิยมเฉพาะแน่ค่ะ! อุมิกะคนนี้จะถ่ายทุกช็อต ไม่ให้พลาดเลยค่ะ! พยายามเข้านะคะ!"
10013055-19 = "มิโมริ ตกลงอุมิกะเขาพูดให้กำลังใจจริงหรือเปล่าเนี่ย?!"
10013055-28 = "(หลังจากการแข่งขันมูชิควีนอันดุเดือด สุดท้ายทีมของเราก็ได้เข้ารอบชิงชนะเลิศ...)"
10013055-32 = "ฮุฮุฮุ เป็นแค่มือใหม่ แต่ก็ผ่านมาได้ถึงรอบชิงเลยงั้นรึ สงสัยฝีมือจะไม่ธรรมดาเลยนะ!"
10013055-33 = "แต่พออยู่ต่อหน้าเด็คการ์ดที่สมบูรณ์แบบของฉันแล้ว การ์ดของพวกเธอมันก็ไร้ความสามารถอยู่ดี!"
10013055-34 = "เพราะฉันมีการ์ดเอซยังไงล่ะ...! ขออัญเชิญ <มดไดมอนด์เรนโบว์>!"
10013055-39 = "นะ... นั่นมัน...!"
10013055-40 = "หนึ่งในมอนสเตอร์ที่ทรงพลังที่สุดของมูชิควีน...!"
10013055-42 = "ฮ่าฮ่าฮ่า~! โจมตีด้วย <คัตเตอร์ขากรรไกรเพชร!> เลย!"
10013055-55 = "อ๊ายยย...! กะ... เก่งชะมัด! แบบนี้คง... แพ้ราบคาบ..."
10013055-62 = "ยังเร็วเกินไปที่จะยอมแพ้ค่ะ! ชิซุโกะจัง! เชื่อมั่นในการ์ด! เชื่อมั่นในตัวเอง! แล้วเชื่อมั่นในพวกพ้องนะคะ!"
10013055-63 = "มิ... มิโมริ...!"
10013055-65 = "ฉากนี้มัน... คาเอเดะ!"
10013055-67 = "อื้ม! ใช่แล้วละพีน่า! ฉากดังในมูชิควีน ตอนที่ 378...! ฉากช่วยเพื่อนที่จะล้มลง! แล้วทุกคนก็รวมพลังกันเป็นหนึ่ง!"
10013055-74 = "...จั่วการ์ด!"
10013055-76 = "จากนี้ไปจะเป็นการเริ่มต้นของปาฏิหาริย์...!"
10013055-84 = "เฮ้อ... ยังไม่เจอการ์ดที่ต้องการเลยค่ะ"
10013055-85 = "อ้าว?! เรายังไม่ได้ขึ้นมาเป็นฝ่ายนำเหรอ?!"
10013055-86 = "แงงงงง~! ทำไมวิญญาณแห่งการ์ดไม่ฟังคำอธิษฐานของฉันเลย~!"
10013055-88 = "ฮ่าฮ่าฮ่า! ปาฏิหาริย์เป็นสิ่งที่ไม่ได้เกิดขึ้นง่ายๆ ถึงได้ชื่อว่าเป็นปาฏิหาริย์ไง!"
10013055-89 = "ผู้ท้าชิงทั้งหลาย...! หมดเวลาของพวกเธอแล้วสินะ! ฉันขอปิดเกมด้วยสิ่งนี้...!"
10013055-97 = "อะ... อะไรเนี่ย?!! เธอเป็นใคร...?!"
10013055-100 = "อื้ม ต่อไปตาฉัน"
10013055-101 = "[s] \"ชิ... ชิเซะ?! จู่ๆ ก็บุกเข้ามาในเกมแบบนี้ได้เหรอ?!\""
10013055-103 = "อ๊ะ! ไม่ใช่นะคุณครู...! นี่ไม่ใช่การบุกรุก แต่เป็นกฎพิเศษที่มีเฉพาะในมูชิควีน...! "
10013055-104 = "กฎ <ตัวฉันอีกคนหนึ่ง> ที่เข้าร่วมได้ในยามวิกฤต!"
10013055-106 = "เพื่อเซฟตัวเองยังไงล่ะคะ!"
10013055-107 = "[s] \"ไม่เห็นรู้กฏของมูชิควีนเลย แต่อะไรดีครูก็ว่าดี!\"  "
10013055-113 = "ฉันจะใช้การ์ดนี้..."
10013055-117 = "อืม... และอัญเชิญมอนสเตอร์นี้~"
10013055-126 = "อะไรกัน! พลิกสถานการณ์ได้ด้วยการ์ดแค่ 3 ใบงั้นเหรอ...!"
10013055-127 = "จริงสิ! ชิเซะก็เป็นตัวตึงเกมการ์ดนี่นา! ไพ่คารุตะก็เล่นเก่ง!"
10013055-128 = "[s] \"แต่นั่นมัน... คนละประเภทกันไม่ใช่เหรอ?\""
10013055-129 = "งั้นก็ปิดฉากด้วยท่าไม้ตาย~"
10013055-141 = "มะ... ไม่อยากจะเชื่อ~!"
10013055-146 = "และผู้ชนะการแข่งขันก็คือ...!!"
10013055-151 = "ผู้ท้าชิง! คาวาวะ ชิซุโกะ...!"
10013055-155 = "ซะที่ไหน!"
10013055-159 = "ตัวสำรอง วาราคุ ชิเซะ! ต่างหาก!"
10013055-160 = "นี่คือการโค่นแชมป์ 100 สมัยติดต่อกัน! ตำนานบทใหม่ได้เปิดฉากขึ้นแล้วครับ!"
10013055-166 = "[ns] \"จบสักทีนะ...\""
10013055-167 = "ชิซุโกะจัง! ชิเซะจัง! สุดยอดไปเลยค่ะ!"
10013055-168 = "ตอนที่ท่านชิเซะออกมาช่วยในตอนท้าย... อิซุนะประทับใจแบบไม่รู้ตัวเลยค่ะ!"
10013055-170 = "เอ่อ... อื้ม ใช่! ถึงขนาดที่ฉันต้องถามตัวเองเลยว่าตัวเองทำอะไรอยู่..."
10013055-171 = "นี่คือพลังของเฮียกคิยาโคไงคะ!"
10013055-172 = "ดีจังเลย! จะได้รางวัลชนะเลิศจากการแข่งขันมูชิควีนใช่มั้ย~ น่าอิจฉาจัง~ "
10013055-174 = "ผู้ชนะคนใหม่ถือกำเนิดแล้ว!"
10013055-175 = "แชมป์เก่าก็หลบไปเลยไป! อย่ามาเกะกะ!"
10013055-176 = "เอ๊ะ! คนพวกนี้!!! พอฉันแพ้ก็คิดจะไล่ออกเลยเหรอ~!?"
10013055-177 = "ก็... กฎมันเป็นแบบนั้นก็จริง! แต่ใครจะไปคิดล่ะว่าจะแพ้ให้กับมือใหม่!"
10013055-179 = "เอาละ! ต่อไปจะเป็นการมอบรางวัลจากทาง <โกลเด้นฟรีซ> ให้กับแชมป์คนใหม่ของเราครับ!"
10013055-181 = "เดี๋ยวก่อน ฉันอยากถามอะไรหน่อย"
10013055-182 = "หืม...? อยากถามงั้นเหรอ?"
10013055-183 = "ใช่ เก็บเรื่องเสียความมั่นใจที่แพ้เอาไว้ก่อนนะ สิ่งที่ฉันอยากถามก็คือ..."
10013055-184 = "ทำไมถึงจัดการแข่งขันที่เดิมพันด้วยหนังสือสัญญาของ <ตั๋วใช้งานรีสอร์ต> นั่นขึ้นมาล่ะ?"
10013055-185 = "หืม? อยากรู้เหตุผลเหรอ? ก็ไม่มีอะไรมากหรอก ก็แค่..."
10013055-186 = "พวกฉันชอบเกมกับการเดิมพันน่ะ!"
10013055-187 = "ถ้าเป็นเรื่องแบบนั้นละก็ ไม่ว่าจะทะเลลึกแค่ไหน ฉันก็จะมุ่งไป! เพื่อเล่นเกม!"
10013055-189 = "เธอเองก็น่าจะเห็นแล้วนะ ที่มี <ตั๋วใช้งานรีสอร์ต> ของเกาะข้างๆ ขายราคาถูกในอินเทอร์เน็ตน่ะ ฉันไปเห็นเข้าก็เลย..."
10013055-190 = "[s] \"ทางนี้ก็ซื้อในอินเทอร์เน็ตมานี่เอง!\""
10013055-191 = "ไหนๆ ก็จะเทียบท่าเรือบนเกาะแล้ว ฉันก็เลยคิดว่าน่าจะจัดการแข่งขันสักหน่อย ก็แค่นี้แหละ"
10013055-192 = "หรือถ้าจะให้พูดตรงๆ ถึง <ตั๋วใช้งานรีสอร์ต> จะถูกแย่งไป แต่พวกฉันก็ขึ้นเรือนี้แล้วไปที่อื่นได้อยู่ดี!"
10013055-193 = "อ๊ะ! แชมป์เก่า! แพ้ได้ไงเนี่ย!"
10013055-194 = "ยังมีการแข่งขันเหลืออีกหลายรายการเลย อย่าเพิ่งไปเลยนะ!"
10013055-195 = "พวกเธอพูดจริงเหรอ?!"
10013055-196 = "[s] \"ถึงตอนแรก... ทุกคนจะไม่เห็นด้วยกับวิธีนี้ก็เถอะ\""
10013055-197 = "แต่ในเมื่อมันสนุก ก็เลยวางแผนให้การแข่งขันนี้เป็นเหมือนแค่ 'ของแถม' งั้นสินะ"
10013055-198 = "ใช่... ต้องเป็นแบบนี้แน่ๆ"
10013055-199 = "ถ้างั้นฉันมีข้อเสนอบางอย่าง"
10013055-200 = "ช่วยจัดการแข่งขันบนเกาะนี้ต่อไปเรื่อยๆ ได้มั้ย?"
10013055-201 = "หืม?"
10013055-202 = "[s] \"ชิซุโกะ...?\""
10013055-203 = "ก็ถ้าจัดการแข่งขันที่นี่ มันก็น่าจะดึงดูดผู้คนเข้ามาได้จำนวนมาก..."
10013055-204 = "พอดีฉันเกิดความสนใจในเกมการ์ดประเภทนี้... แล้วก็เกมที่พีน่าเคยพูดถึงก่อนหน้านี้ด้วย..."
10013055-205 = "แล้วก็... เอ่อ... จากความร้อนแรงของการแข่งขันก่อนหน้านี้... ฉันตระหนักอะไรได้บางอย่าง..."
10013055-206 = "อ๊ะ! งั้นก็แปลว่า...! หัวหน้า!"
10013055-207 = "มูชิควีนมีอะไรให้เรียนรู้เยอะเลย! ฉันสามารถบอกอะไรเด็ดๆ ได้อีกด้วยนะ!"
10013055-209 = "ฮุฮุฮุ ทุกคนดูดีใจกันจังเลยนะคะ"
10013055-210 = "ฉันว่า... การเอาการแข่งขันแบบนี้มาเป็นธุรกิจบริการของร้านเฮียกคิยาโคก็ไม่เลวเลยนะ"
10013055-211 = "งั้นก็แปลว่า จะทำสัญญากับทางเรางั้นเหรอ?"
10013055-212 = "ก็ถ้าพวกเธอสนใจน่ะ"
10013055-213 = "อ้อ! แต่มีข้อแม้ว่าหากจัดการแข่งขันในอนาคต เราจะไม่แย่งการ์ดของคนแพ้เด็ดขาด! เพราะฉันจะเปลี่ยนกฎให้เล่นกันเพื่อความบรรเทิงเท่านั้น!"
10013055-215 = "อืม... แต่ถ้านั่นทำให้เรายังเล่นเกมต่อได้..."
10013055-216 = "มันก็ไม่น่าจะมีอะไรเสียหายนะ?"
10013055-217 = "ดีละ พวกฉันตกลงทำสัญญา! "
10013055-218 = "อ๊ะ แบบนี้แชมป์คนใหม่ของเรา ก็ไม่ได้เป็นแชมป์แล้วน่ะสิ?"
10013055-219 = "อ่า... เฮ้! แชมป์เก่า! ยินดีต้อนรับกลับบ้านนะ!"
10013055-220 = "แต่สำหรับพวกฉันยังไงก็เป็นแชมป์ 'เก่า' อยู่นะ!"
10013055-221 = "พวกเธอนี่นะ~~!"
10013055-226 = "[ns] \"ชิซุโกะ ครั้งนี้ก็เคลียร์ปัญหาได้ดีเลยนะ\""
10013055-227 = "อะไรกันคะ จู่ๆ ก็มองด้วยสายตาอ่อนโยนแบบนั้น..."
10013055-228 = "ฉันก็แค่คิดว่านี่คือวิธีที่จะวินวินทั้งสองฝ่ายน่ะค่ะ!"
10013055-229 = "[ns] \"แบบนี้ก็มีแฟรนไชส์เยอะขึ้นแล้วนะ\""
10013055-231 = "ค่ะ... เพราะงั้นฉันจะสู้ต่อไปด้วยจิตวิญญาณที่แข็งแกร่งนี้ค่ะ!"
10013055-232 = "และจุดมุ่งหมายต่อไปของเราก็คือ..."

[translation]
10013055-2 = "（於是激烈的戰鬥就此展開──）"
10013055-3 = "（多虧有甲蟲皇后決鬥者專家適當的建議……）"
10013055-4 = "部長！在甲蟲皇后中最重要的就是「魔法卡」喔！"
10013055-6 = "才不是呢，菲娜！#n最重要的是深信不疑的夥伴──王牌怪獸才對！"
10013055-8 = "（以及就算危機逼近也絕不屈服，相信著夥伴而送出的聲援……！）"
10013055-16 = "啊啊！我的生命值差點就歸零了……！這樣下去不妙！"
10013055-17 = "沒問題的，靜子醬！還有機會！#n就在下回合逆轉吧！"
10013055-18 = "陷入危機的社長的表情……！肯定能賣個好價錢！#n我不會放過按下快門的時機的，請努力加油吧！"
10013055-19 = "三森就算了，海花你那個不是在加油吧！？"
10013055-28 = "（於是在激戰過後──總算挺進了決賽）"
10013055-32 = "哼哼哼……明明只是第一次參加竟然能走到這裡。你們也是有點實力嘛！"
10013055-33 = "但是！在我完美的牌組面前，你們的牌是不管用的！"
10013055-34 = "看吧，這就是我的王牌！召喚「鑽石彩虹蟻」！"
10013055-39 = "那，那個是……！"
10013055-40 = "被稱為甲蟲皇后最強卡片之一的……那個……！"
10013055-42 = "哈哈哈！看招吧！「鑽石下顎剪」！！"
10013055-55 = "呀啊啊啊！！……好，好強！#n這次可能……真的不行了……"
10013055-62 = "現在放棄還太早了，靜子醬！#n相信卡片……相信自己……還有相信你的夥伴！"
10013055-63 = "三，三森……！"
10013055-65 = "哈！這個場景是……！楓！"
10013055-67 = "嗯，不會錯的！這就是甲蟲皇后第378話的名場景！#n扶起快要倒下的同伴，大家齊心協力的場景！"
10013055-74 = "……抽牌！"
10013055-76 = "然後，奇蹟就會……！"
10013055-84 = "啊，這個……不太行呢。"
10013055-85 = "咦咦咦！？一般來說這裡應該要直接逆轉勝的吧！"
10013055-86 = "哇哇，卡片的小精靈沒有回應呢！"
10013055-88 = "哈哈哈！奇蹟就是因為沒有那麼容易發生才叫奇蹟嘛！"
10013055-89 = "挑戰者們啊！到此為止了！"
10013055-97 = "是……是誰！？"
10013055-100 = "接下來輪到我了唷。"
10013055-101 = "[s] 「知，知世！？亂入遊戲沒問題嗎？」"
10013055-103 = "不是唷，老師！這不是單純的亂入。#n而是甲蟲皇后的特殊規則！"
10013055-104 = "它的名字就是──危機的瞬間「另外一個我」參戰規則！"
10013055-106 = "所以說，是Safe！的喔！"
10013055-107 = "[s] 「果然還是不太懂規則啊！甲蟲皇后！」"
10013055-113 = "在這裡使用這張卡……"
10013055-117 = "嗯……召喚這隻怪物唷。"
10013055-126 = "什，什麼！？只用了三張卡就扭轉了局勢……！？"
10013055-127 = "啊，對了！知世很擅長卡牌遊戲的嘛！畢竟歌牌超厲害的！"
10013055-128 = "[s] 「那根本是不同的種類吧……」"
10013055-129 = "用這招解決你。"
10013055-141 = "怎，怎麼會──！！！！"
10013055-146 = "這次甲蟲皇后大會的冠軍是……！"
10013055-151 = "挑戰者！河和靜子！"
10013055-155 = "──的代打！"
10013055-159 = "和樂知世！"
10013055-160 = "打破冠軍的100連霸紀錄，誕生了新的傳說！"
10013055-166 = "[ns] 「終，終於結束了……」"
10013055-167 = "靜子醬！知世醬！真是漂亮！"
10013055-168 = "知世閣下前來救援的時候……伊樹菜，不禁感動了起來！"
10013055-170 = "嗯，嗯……現在回想起來倒是有我到底做了什麼的感覺……"
10013055-171 = "這就是我們百鬼夜行的力量！"
10013055-172 = "真好！甲蟲皇后大會的冠軍獎品真令人羨慕！"
10013055-174 = "來吧，為新冠軍的誕生獻上喝采！"
10013055-175 = "「前」冠軍就快離開吧！真礙事！"
10013055-176 = "你們這些傢伙！我才一輸掉就這樣啊！？雖然也確實是這種規則啦……"
10013055-177 = "不過我做夢也沒想過我會輸掉呢！"
10013055-179 = "那麼！現在就將「黃金芙利」號準備好的獎品送給新的冠軍！"
10013055-181 = "等等。在那之前，有件事情想問你……"
10013055-182 = "……嗯？什麼？"
10013055-183 = "你就是這次大賽的主辦者對吧？"
10013055-184 = "那麼，為什麼不惜賭上「渡假勝地使用權」也要舉辦這種大賽呢？"
10013055-185 = "理由……？那還用問嗎。"
10013055-186 = "因為我們喜歡遊戲跟賭博嘛！"
10013055-187 = "為此不惜度過這片海洋！遇見對手！進行遊戲！僅此而已！"
10013055-189 = "其實只是在網路上便宜買到了附近島的「渡假勝地使用權」……#n所以才順便舉辦這個比賽。"
10013055-190 = "[s] 「你也是在網路上買的啊！？」"
10013055-191 = "嗯……把船停在這座島上，舉辦甲蟲皇后大賽吸引人潮應該很有趣。#n就只是這樣而已。"
10013055-192 = "說白一點，就算沒了「渡假勝地使用權」，我只要把船開到其他地方就搞定了！"
10013055-193 = "咦！？前冠軍那也太狡猾了吧！？"
10013055-194 = "還有很多預計要舉辦的大會啊！我反對你去其他地方！"
10013055-195 = "就算你們這麼說也不能怎樣吧！？"
10013055-196 = "[s] 「原來是這麼想的啊……不過看來也不是所有人都願意合作呢。」"
10013055-197 = "所以說，是因為很有趣才舉辦這個大會──這個「服務」啊。"
10013055-198 = "……原來如此，是這樣啊。"
10013055-199 = "那我有一個提案。"
10013055-200 = "你們要不要一直在這裡舉辦大會？"
10013055-201 = "……咦？"
10013055-202 = "[s] 「靜子？」"
10013055-203 = "不管怎麼說，這個大會似乎吸引了不少客人……"
10013055-204 = "而且對於這種卡牌遊戲，我有從菲娜那裡聽說過……自己也有一點興趣……"
10013055-205 = "所以，那個……剛才參加了大會，該說是改變了看法嗎……"
10013055-206 = "部長！也就是說！"
10013055-207 = "那個，甲蟲皇后很厲害的唷！之後我再去好好教你吧！"
10013055-209 = "呵呵呵。大家都很開心的樣子呢。"
10013055-210 = "嘛，把這個作為百夜堂的活動也不錯。#n真的就只是因為這樣而已。"
10013055-211 = "也就是說，你想跟我們簽約……是嗎？"
10013055-212 = "如果你們願意的話，就是這樣。"
10013055-213 = "啊，當然！之後禁止沒收輸家的牌喔！#n我會把規則改得更加偏向輕鬆娛樂的！"
10013055-215 = "嗯……如果能繼續玩遊戲的話……"
10013055-216 = "也不錯，對吧？"
10013055-217 = "好，那就簽約吧！"
10013055-218 = "但是，這樣一來新冠軍就不是新冠軍了……"
10013055-219 = "歡，歡迎回來！「前」冠軍！"
10013055-220 = "果然我們還是需要「前」冠軍呢！"
10013055-221 = "你們兩個～～！！"
10013055-226 = "[ns] 「這次也順利結束真是太好了呢，靜子。」"
10013055-227 = "什，什麼嘛。用那種溫柔的眼神看我……"
10013055-228 = "我只是覺得這樣更有效率而已喔！"
10013055-229 = "[ns] 「這樣一來加盟的地方又增加了呢。」"
10013055-231 = "沒錯……繼續趁勝追擊吧！"
10013055-232 = "接下來就去這裡吧！"

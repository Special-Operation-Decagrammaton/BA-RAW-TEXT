[translation]
10034180-1 = "2天前：亂入"
10034180-10 = "杏山千紗──！！"
10034180-11 = "千紗，你朋友來了。應付一下吧。"
10034180-12 = "怎麼能這麼說呢，喜美。#n是「我們」的朋友才對。"
10034180-13 = "啊哈哈。#n歡迎你來，澪紗醬。"
10034180-14 = "……嗯？那傢伙跑哪去了？怎麼不見人影？"
10034180-15 = "咦？剛剛還在的呀……"
10034180-16 = "……嗯？杏山千紗他不在嗎？"
10034180-20 = "啊……這樣的話……那個……"
10034180-21 = "抱歉打擾了……"
10034180-23 = "別這麼說，我們一點也不覺得有被打擾到哦？#n先找個地方坐吧。"
10034180-24 = "就是說啊，他八成是去買吃的，晚點就回來了。"
10034180-26 = "是，是嗎？#n雖然很謝謝你們的好意……不過，我畢竟不是放學後的甜點部的成員……"
10034180-27 = "但你是放學後的甜點「團」的一員吧。#n姑且也算是我們的結拜姊妹……"
10034180-28 = "剛剛那句可以當作耳邊風沒關係。"
10034180-29 = "總之呢，你不需要太在意。#n是先有人才有社團，而不是先有社團才有人嘛。"
10034180-31 = "……！！"
10034180-32 = "嗯！順帶一提，千紗醬不在的時候也隨時歡迎你來唷！"
10034180-33 = "自衛隊的工作固然重要，但偶爾有個能休息的地方也不賴吧？"
10034180-37 = "…………"
10034180-38 = "……是！！"
10034180-43 = "我回來了～#n剛剛去前面買了冰淇淋……"
10034180-47 = "……你也來啦。"
10034180-49 = "……還好我感覺會不夠就多買了幾個，看來是正確的決定啊。"

[translation]
10034180-1 = "[D-2]: บุกรุก"
10034180-10 = "เคียวยามะ คาซึสะ!!"
10034180-11 = "คาซึสะ เพื่อนเธอมาน่ะ ออกมาหาเพื่อนหน่อยสิ"
10034180-12 = "นี่ โยชิมิ ต้องบอกว่าเพื่อน 'ของเรา' สิ"
10034180-13 = "แหะๆๆ เรอิสะจัง มานั่งตรงนี้สิ"
10034180-14 = "หืม...? แล้วยัยนั่นไปไหนแล้ว?"
10034180-15 = "เอ๋? นั่นสิ เมื่อกี้ยังอยู่ตรงนี้อยู่เลยนี่นา..."
10034180-16 = "เอ่อ เคียวยามะ คาซึสะ... ไม่อยู่เหรอคะ?"
10034180-20 = "อ่า... เอ่อ... อืม... เอ่อ..."
10034180-21 = "ขอโทษด้วยค่ะ..."
10034180-23 = "หมายความว่ายังไงน่ะ? นี่ไม่ใช่เรื่องที่ต้องขอโทษสักหน่อย มานั่งตรงนี้ก่อนนะ"
10034180-24 = "คงจะออกไปซื้อขนมมากินละมั้ง รอเดี๋ยวเดียวก็มาแล้วละ"
10034180-26 = "อะ... เอางั้นเหรอคะ? ยังไงก็ขอบคุณนะคะ...#nตะ... แต่ว่าฉันไม่ได้อยู่ในชมรมของหวานหลังเลิกเรียน..."
10034180-27 = "แต่เป็น 'แก๊ง' ของหวานหลังเลิกเรียน ใช่แล้วละ นั่นเหมือนกับสมาคมลับมากกว่า..."
10034180-28 = "เรื่องนี้ปล่อยผ่านไปเถอะ"
10034180-29 = "ฉันหมายถึง... ไม่ต้องไปใส่ใจน่ะ เธออยู่ที่นี่ได้ตามที่ไอริบอกเลย"
10034180-31 = "...!!"
10034180-32 = "อื้ม! เรอิสะจังมาที่นี่ได้ตามสบายเลยนะ ต่อให้เป็นตอนที่คาซึสะจังไม่อยู่ก็มาได้!"
10034180-33 = "ถึงงานรักษาความสงบจะสำคัญ แต่บางทีเราก็ต้องการที่พักผ่อนใช่มั้ยล่ะ?"
10034180-37 = "......"
10034180-38 = "ค่ะ!!"
10034180-43 = "ฉันมาแล้ว พอดีไปซื้อไอติมตรงร้านข้างหน้า..."
10034180-47 = "เธอก็มาด้วยเหรอ..."
10034180-49 = "เฮ้อ... ฉันซื้อมาเกินอันหนึ่งเพราะเห็นว่าราคามันถูกดี งั้นก็พอดีเลยนะ"

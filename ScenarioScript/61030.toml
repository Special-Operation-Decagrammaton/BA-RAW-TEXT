[translation]
61030-1 = "第3話;新的開始"
61030-6 = "啊，歡迎您，老師。"
61030-7 = "這裡……是我們的宿舍房間。"
61030-9 = "[ns1]「找我有什麼事嗎？」\n[ns2]「想說什麼都可以放輕鬆說出來哦。」"
61030-12 = "啊，對了……！#n我差點忘了……！"
61030-13 = "忘了什麼？#n啊……！"
61030-14 = "老，老老老，老師！#n真的，真的非常抱歉……"
61030-15 = "能不能請您稍微……那個，只要五分鐘就行了！#n可以請您……在外面稍等一下嗎！？"
61030-16 = "明明是我們邀請您過來卻提出這種要求，我也明白這真的很奇怪……！"
61030-17 = "不過拜託您了！真的只要五分鐘就行了！"
61030-19 = "（依照學生們的要求，來到走廊等候）"
61030-20 = "（不久之後……）"
61030-24 = "現，現在可以進來了……#n啊，不對不對！您請進！"
61030-31 = "[ns]「咦……！？」"
61030-32 = "再，再次……向您問好，老師。"
61030-33 = "抱歉，嚇到您了吧……？#n不，不是的！並不是您想的那樣！我們只是……"
61030-34 = "如果用三一的說法來說的話，我們是奧利斯的轉學生！"
61030-36 = "[ns]「啊……！」"
61030-44 = "不知道您還記不記得……那天夫人從奧利斯徹底消失的事。"
61030-45 = "雖然到那裡為止都還算好事……#n不過被留下的奧利斯孩子們接下來該怎麼辦，該怎麼生活……大家都感到很不安。"
61030-46 = "就在那時……某天，有個陌生的孩子走向了我們。"
61030-49 = "……這裡似乎沒問題呢。"
61030-53 = "……！？#n那身制服是……！"
61030-54 = "三，三一！？"
61030-58 = "噓。抱歉，你們想必嚇了一跳吧。#n沒錯，我確實來自三一。"
61030-59 = "雖然我本來應該身穿茶會的制服，而不是這身衣服的……"
61030-61 = "茶會……？"
61030-62 = "那是……什麼？"
61030-64 = "……"
61030-65 = "只是三一學園裡，一個享受茶點的社團而已。"
61030-67 = "咦！？可以轉學到三一……！？"
61030-68 = "可是我們……跟三一……"
61030-70 = "我明白兩位的意思。"
61030-71 = "這並不是打算強迫或施加壓力。#n單純……只是一項「提議」而已。"
61030-72 = "兩位可以選擇接受這個提議，在三一開始新的校園生活……"
61030-73 = "如果想選擇其他道路的話，我們也會予以尊重。"
61030-74 = "可是，你突然這麼說……"
61030-75 = "我了解。這聽起來確實很突然對吧。#n因此，希望兩位能花費一些時間慢慢考慮。"
61030-76 = "三一……或者說茶會的其中一部分，已經準備好歡迎你們了。"
61030-77 = "不過公開的歡迎……恐怕還是有點困難。"
61030-78 = "但是……就算我們能轉學到三一，而且三一的某些人願意默默歡迎我們……"
61030-79 = "其他三一學生……真的會袖手旁觀嗎……？"
61030-80 = "沒錯，這確實是我們相當困擾的一點。#n因為三一……存在非常多的派系和社團。"
61030-81 = "所以各位如果選擇轉學，將以「默默無名的鄉下學校轉學生」的名義辦理入學文件。"
61030-82 = "……這就是目前我們所能做到的最大限度。"
61030-87 = "……"
61030-88 = "……"
61030-90 = "雖然先前已經提過，兩位真的可以慢慢考慮沒關係。"
61030-94 = "決定好之後，再用這個號碼聯絡我們就可以了。"
61030-97 = "……"
61030-98 = "……"
61030-100 = "我們猶豫了。"
61030-101 = "真的真的……真的猶豫了很久。"
61030-102 = "因為一切都讓人感到不安。#n無論是我們的處境、奧利斯之外的世界，還有三一的事……"
61030-106 = "最後讓我們下定決心的契機……#n是覺得不管在哪裡做什麼，應該都比現在來得好……這樣的心情。"
61030-115 = "[ns]「原來如此啊……」"
61030-116 = "是的……"
61030-117 = "除，除了我們之外，現在也有不少孩子來到了三一。"
61030-118 = "雖然幾乎都是1年級或2年級的學生就是了……"
61030-120 = "[ns3]「這樣啊……我明白了。」\n[ns4]「……你們想必很辛苦吧。」"
61030-123 = "沒，沒有，其實也談不上辛苦之類的。#n只是……還有種像是在做夢的感覺而已。"
61030-124 = "以前別說是棉被……光是能弄到破舊的毛毯就算幸運了……"
61030-125 = "床真的很棒呢。#n嘿，嘿嘿……"
61030-126 = "雖然奧利斯實際上也有床，但大家都說依賴那種東西會變得軟弱……"
61030-131 = "[ns]「……大家，對不起。」"
61030-134 = "（低下頭，向孩子們道歉）"
61030-135 = "咦，咦咦！？老，老師您為什麼要道歉？"
61030-136 = "就，就是說呀！#n某種意義上來說……我們能有現在這樣的生活，也是多虧了老師……"
61030-137 = "[s]「即便如此，我在照顧你們這方面還是太疏忽了。」"
61030-138 = "別，別這麼說！#n老師這樣我們反而……"
61030-139 = "而且這也不是我們想跟老師商量的事……！"
61030-141 = "（說到這裡才想起來，應該先聽孩子們的話才對）"
61030-143 = "想商量什麼事情是嗎？#n太，太好了……終於能問了呢。#n嘿，嘿嘿……"
61030-144 = "那個……事，事情是這樣的。"
61030-145 = "請問「綜合考試」是什麼呢？"
61030-146 = "[s]「……咦？」"
61030-147 = "其實別說是「綜合考試」……#n我們連「考試」是什麼都不太清楚……"
61030-148 = "因為之前在奧利斯的時候……從來沒有經歷過這種事……"
61030-149 = "如果去問周圍的人……又覺得有點難以啟齒。"
61030-150 = "畢竟除了我們之外，其他三一學生好像都理所當然地知道是怎麼回事……"
61030-151 = "所以……才會想來向老師請教……"
61030-152 = "沒錯！因為老師……是老師啊！"
61030-154 = "[ns]「……原來如此。」"
61030-156 = "[ns]「仔細想想，我們還是第一次像這樣見面吧？」"
61030-157 = "咦？雖然是這樣沒錯，不過這不是理所當然的嗎……？"
61030-158 = "對啊……誰叫我們是奧利斯出身的……"
61030-159 = "要我們別這麼說？#n可是……"
61030-160 = "我，我明白了。#n那麼至少，在老師面前的時候……"
61030-166 = "唔……！？"
61030-167 = "噫噫……！"
61030-169 = "（下意識地伸出手，想摸摸他們的頭）"
61030-170 = "（奧利斯的學生卻反射性地後退了幾步）"
61030-177 = "對對對對，對不起，老師。#n這，這是……！"
61030-178 = "我，我們沒有……把老師當成那種人的意思……！"
61030-179 = "[s]「沒事的。不用擔心。」"
61030-180 = "可，可是……"
61030-181 = "……"
61030-183 = "[ns]「別擔心。」"
61030-185 = "[ns]「……現在已經沒事了。」"
61030-189 = "（奧利斯的學生就像受驚的小動物般，緩緩靠了過來）"
61030-190 = "嗚嗚……"
61030-191 = "嗚……嗚嗚……"
61030-193 = "（雖然有些後知後覺，不過奧利斯學生的身形和普通學生相比……似乎更嬌小一些）"
61030-194 = "（安撫完孩子們後，慢慢解釋了什麼是考試，以及考試之所以重要的原因）"
61030-196 = "原來如此……#n考試是能用單一結果來評價人的方法。"
61030-197 = "雖然有它可惜的地方，卻能協助檢驗是否確實掌握了學過的內容……"
61030-198 = "這麼看來，奧利斯其實也有「考試」的概念呢！"
61030-199 = "比如只憑彈匣重量判斷剩下多少子彈，或者面對近距離的狀況該如何應對……"
61030-203 = "還有怎麼有效破壞光環之類的……"
61030-204 = "喂，喂！"
61030-205 = "咦？怎麼了？#n啊……！"
61030-206 = "對，對不起！老師！#n不小心提到了這種奇怪的話題……！"
61030-207 = "嗯？老師更想知道我們最近過得怎麼樣？#n唔嗯……在過著「校園生活」哦！嘿，嘿嘿……"
61030-208 = "自己這樣說，感覺有點好笑耶。"
61030-209 = "覺得好不好？#n雖然有這種感覺，但更多是覺得新奇……"
61030-210 = "不用站夜哨、不用一天只吃一餐，也不會被責罵或關進禁閉室大聲吼叫……"
61030-211 = "可能是因為這樣，現在才會感覺有點熱吧。"
61030-212 = "以前在奧利斯那邊……就還挺冷的……"
61030-214 = "[ns]「三一的學生對你們好嗎？」"
61030-215 = "咦？嗯，當然。#n畢竟我們只被當成是從鄉下學校轉來的學生。"
61030-216 = "反而是大家過於親切和小心這點……讓人有點不好意思……"
61030-217 = "有時候，我們也會跟三一的同學去叫「咖啡廳」的地方……"
61030-218 = "哇～看到他們毫不猶豫地點那麼貴的東西，真的很難做好表情管理。"
61030-219 = "我到現在還記不住咖啡或蛋糕的名字呢。#n雖然超貴、超好吃的就是了。嘿，嘿嘿……"
61030-220 = "為，為了應付咖啡廳的花費和其他開銷，我們也有在打工哦。"
61030-221 = "那也很有趣耶！#n某方面來說，能學到的東西比在學校裡還要多。"
61030-222 = "就比如在發薪日的前一週，錢包會最瘦這件事……"
61030-223 = "[s]「這種事情～長大之後也是一樣的哦～」"
61030-224 = "老，老師也是嗎！？#n我還以為老師會比我們更……更厲害……"
61030-225 = "更富裕、更從容一點的說……"
61030-226 = "您說人活著其實都差不多……？#n這樣啊……聽起來莫名有股安心的感覺。"
61030-227 = "嗯……真的還挺好的……"
61030-228 = "……"
61030-229 = "……"
61030-230 = "那個，老師？"
61030-231 = "雖然您可能已經察覺了……"
61030-232 = "但並不是所有奧利斯的學生都轉學到了三一……"
61030-233 = "[s]「……嗯。」"
61030-234 = "我不確定自己能不能說明清楚……"
61030-235 = "不過也有學生選擇留在奧利斯。"
61030-236 = "或許大家各有各的理由……"
61030-237 = "……不過到頭來，我想應該都是因為難以接受三一和這個世界吧。"
61030-238 = "自從來到這裡之後，我時不時就會產生這種想法。"
61030-245 = "只是因為成長和學習的地方碰巧不同……"
61030-246 = "一邊每天只能勉強吃上一餐──"
61030-247 = "另一邊卻能在咖啡廳裡，輕鬆寫意地享受昂貴的點心。"
61030-248 = "明明我們本該是兩所最接近的學園……"
61030-255 = "留在奧利斯的學生們，現在過著怎麼樣的生活……我們也不是很清楚。"
61030-256 = "所以只能用猜的……這真的只是猜測而已。"
61030-257 = "不過我聽說他們切斷了所有外界的聯繫……"
61030-258 = "……直到現在也持續進行著某種游擊式的抗爭。"
61030-260 = "老師。我們已經明白每個人的想法都不同……應該盡可能予以尊重才對。"
61030-261 = "但我們無論如何……都無法放下對留下的孩子們的擔心。"
61030-262 = "幾乎每天晚上都會在夢裡……看見還在奧利斯時的往事。"
61030-263 = "兩人之中總有一個人會尖叫著醒來……#n有時甚至還會同時驚醒。"
61030-264 = "次數已經多到可以記錄誰更常醒、誰叫得更大聲了。#n嘿，嘿嘿……"
61030-265 = "目前贏的人是我哦。"
61030-266 = "那次幾乎是同時吧！"
61030-267 = "你明明就慢了一分鐘好不好！"
61030-272 = "老師，雖然聽起來可能有點奇怪……"
61030-273 = "不過在聽老師說明考試的時候，我突然產生了這種想法。"
61030-274 = "要是留在奧利斯的孩子們，也能有機會參加考試就好了……"
61030-276 = "咦？你也這麼想嗎？"
61030-277 = "果，果然很奇怪嗎……？"
61030-278 = "沒有，只是我剛好也在想同樣的事，所以覺得很神奇而已……"
61030-279 = "[ns]「為什麼……會這麼想呢？」"
61030-281 = "有，有點不太好解釋……"
61030-282 = "只是覺得像三一的學生這樣……#n早上起床上課，然後參加考試……"
61030-283 = "這樣的生活還挺不錯的而已。#n有種身為學生，好像就該這樣的感覺。"
61030-284 = "雖然偶爾會聽到有人說自己討厭讀書、覺得很煩之類的……"
61030-285 = "我們也會感到陌生和困難……不過並沒有那麼討厭學習。"
61030-286 = "我在這裡聽到過一句話──學生的本分就是學習，對吧？"
61030-288 = "[ns]「……！」"
61030-295 = "老，老老老老，老師！？"
61030-296 = "老師！？！？"
61030-297 = "（由於這句話實在讓人過於欣慰……情不自禁地用力摸了摸孩子們的頭）"
61030-299 = "[ns]「啊，抱歉！我太久沒聽見學生說出這種話了……！」"
61030-301 = "沒，沒事的！真的沒關係……"
61030-302 = "如果老師不介意的話……能再維持這樣一下下嗎？"
61030-303 = "……"
61030-304 = "……"
61030-305 = "……人的體溫，真的很溫暖呢。"
61030-306 = "嗯，真的好暖哦。嘿，嘿嘿……"
61030-308 = "[ns5]「總而言之，你們希望留在奧利斯的孩子們……」\n[ns6]「也能獲得『學習』的機會對吧？」\n[ns7]「就連『考試』也不例外！」"
61030-312 = "沒錯，就是這個意思！#n不過……"
61030-313 = "雖然可能只是我們想太多，但有個地方讓我們有點在意……"
61030-314 = "什麼地方？#n就是……"
61030-315 = "這次的考試叫做「三一綜合考試」對吧？#n雖然有聽說負責出題的並不是三一……"
61030-316 = "[s]「啊……！」"
61030-317 = "是的……那些難以原諒三一、最後選擇留在奧利斯的孩子們……"
61030-318 = "真的會接受「三一綜合考試」這個名字嗎……"
61030-319 = "而且老實說，那些孩子可能從來不知道什麼是學習……"
61030-320 = "嗯……現在如果隨便闖進奧利斯分校的話，八成會立刻被趕出去……"
61030-321 = "除非奧利斯分校自己在進行課程……"
61030-322 = "不，那種事是不可能的。#n如果可以的話，他們早就……"
61030-323 = "[s]「這種事情你們不用擔心！」"
61030-324 = "咦？真的嗎？#n不對，應該說……老師有什麼辦法嗎？"
61030-325 = "一，一定有吧？#n因為老師是大人……一定會有我們想不到的辦法……！"
61030-326 = "[s]「看似無解也要想出辦法，這是身為大人的責任哦。」"
61030-327 = "雖，雖然還是不太懂……"
61030-328 = "不過總覺得很可靠呢。#n嘿，嘿嘿……"
61030-329 = "找老師商量，果然是正確的選擇……"
61030-333 = "那，那個，老師？#n雖然這個請求可能有點過分……"
61030-335 = "[log=아리우스 학생 A 마스크OFF]能請老師……也幫幫小隊的孩子們嗎……？[/log]"
61030-339 = "[ns]「……！」"
61030-345 = "下一話;河流匯聚之處"

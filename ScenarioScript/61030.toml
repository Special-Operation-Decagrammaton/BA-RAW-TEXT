[translation]
61030-1 = "ตอนที่ 3;เริ่มต้นใหม่"
61030-6 = "ชะ... เชิญค่ะ คุณครู"
61030-7 = "ที่นี่คือ... ห้องในหอพักของพวกฉันค่ะ"
61030-9 = "[ns1] \"ตกลงว่ามีเรื่องอะไรเหรอ?\"\n[ns2] \"อยากคุยอะไรกับครูเหรอ คุยได้ตามสบายเลยนะ\""
61030-12 = "อ๊ะ จริงสิ...! ลืมไปเสียสนิทเลย...!"
61030-13 = "อะไรเหรอ? อ้อ...!"
61030-14 = "คะ... คะคะคะ... คุณครู! ต้องขอโทษจริงๆ นะคะ แต่ว่า..."
61030-15 = "ช่วยออกไปรอข้างนอกก่อนได้มั้ยคะ...? แค่ 1 นาที... ไม่สิ ขอ 5 นาทีค่ะ!!"
61030-16 = "ฉันรู้ดีค่ะว่ามันแปลกที่พูดอย่างนี้ พวกฉันเป็นคนเชิญคุณครูมาเองแท้ๆ!"
61030-17 = "แต่ขอร้องละค่ะ! ขอเวลาพวกฉัน 5 นาทีนะคะ!"
61030-19 = "(คุณครูออกมายืนรอตรงทางเดินตามที่นักเรียนขอ)"
61030-20 = "(หลังจากนั้นไม่นาน...)"
61030-24 = "พะ... พร้อมให้เข้ามาได้แล้วค่ะ... มะ... ไม่สิ! เชิญเข้ามาเลยค่ะ!"
61030-31 = "[ns] \"หืม...?!\""
61030-32 = "ขะ... ขอสวัสดี... อีกครั้งค่ะ! คุณครู"
61030-33 = "ขอโทษนะคะ เมื่อกี้คุณครูตกใจใช่มั้ยคะ...? มะ... ไม่เป็นไรค่ะ! พวกฉันไม่ใช่เด็กแบบนั้นค่ะ! พวกฉัน เอ่อ..."
61030-34 = "ถ้าจะเรียกให้เหมือนคนทรีนิตี้ ก็ต้องบอกว่าพวกฉันเป็นนักเรียนอาเรียสที่ย้ายมาค่ะ!"
61030-36 = "[ns] \"อ้อ...!\""
61030-44 = "ไม่แน่ใจว่าคุณครูจะจำได้หรือเปล่านะคะ... เอ่อ... จำวันที่มาดาม... หายตัวไปจากอาเรียสได้มั้ยคะ?"
61030-45 = "แค่เรื่องนั้นมันก็ดีอยู่หรอกค่ะ แต่ว่าทุกคนก็กังวลกันว่าเด็กๆ อาเรียสที่เหลือจะเป็นยังไงต่อหลังจากนี้ และต้องใช้ชีวิตต่อกันยังไง..."
61030-46 = "แล้ววันหนึ่ง... ก็มีเด็กแปลกหน้ากลุ่มหนึ่งเข้ามาหาพวกฉันค่ะ"
61030-49 = "ที่นี่น่าจะไม่มีปัญหานะ..."
61030-53 = "ชุดนักเรียนนั่นมัน...?!"
61030-54 = "ทะ... ทรีนิตี้!?"
61030-58 = "ชู่ว ขอโทษค่ะ ฉันทำพวกคุณตกใจใช่มั้ยคะ? ค่ะ ฉันมาจากทรีนิตี้ค่ะ"
61030-59 = "ที่จริงฉันต้องใส่เครื่องแบบของสภาน้ำชามากกว่าชุดนักเรียนนี้..."
61030-61 = "สภาน้ำชา...?"
61030-62 = "คือ... อะไรเหรอคะ?"
61030-64 = "......"
61030-65 = "ก็แค่ชมรมของทรีนิตี้ที่มีคนมาจิบชาและกินขนมด้วยกันน่ะค่ะ"
61030-67 = "คะ?! ย้ายไปเรียนที่ทรีนิตี้... ได้งั้นเหรอคะ!?"
61030-68 = "แต่ว่าพวกฉัน... แล้วก็ทรีนิตี้..."
61030-70 = "ค่ะ ฉันพอรู้ค่ะว่าหมายถึงอะไร"
61030-71 = "แต่นี่ไม่ใช่การบังคับหรือกดดันอะไรนะคะ มันเป็นเพียง... 'การชักชวน' อย่างหนึ่งน่ะค่ะ"
61030-72 = "พวกคุณสามารถรับข้อเสนอของฉันแล้วมาเริ่มต้นชีวิตการเรียนใหม่ที่ทรีนิตี้ได้"
61030-73 = "หรือถ้าจะเลือกทางเลือกอื่น ฉันก็จะเคารพการตัดสินใจของพวกคุณค่ะ"
61030-74 = "แต่ว่า... นี่มันกะทันหันไปหน่อย..."
61030-75 = "ใช่ค่ะ ฉันเข้าใจว่านี่เป็นเรื่องที่ไม่ทันตั้งตัว เพราะงั้นก็ใช้เวลาทบทวนอีกหน่อยแล้วค่อยๆ ตัดสินใจนะคะ"
61030-76 = "ทั้งทรีนิตี้... และสภาน้ำชา... พวกเราส่วนหนึ่งเตรียมตัวต้อนรับพวกคุณทุกคนทุกเมื่อค่ะ"
61030-77 = "ถึงจะต้อนรับอย่างเปิดเผย... ไม่ได้ก็เถอะค่ะ"
61030-78 = "แต่ว่า... ต่อให้พวกฉัน... ย้ายไปเรียนที่ทรีนิตี้ แล้วบางคนในทรีนิตี้จะให้การต้อนรับพวกฉันเงียบๆ"
61030-79 = "แต่นักเรียนคนอื่นของทรีนิตี้... จะอยู่เฉยกันเหรอคะ...?"
61030-80 = "ค่ะ ในส่วนนั้นก็เป็นเรื่องยากมากๆ สำหรับพวกฉันเหมือนกัน โดยพื้นฐานแล้วในทรีนิตี้... มีกลุ่มคณะและชมรมต่างๆ อยู่เยอะแยะเลยค่ะ"
61030-81 = "ถ้าพวกคุณตัดสินใจย้ายเข้ามาจริงๆ ในเอกสารก็คงระบุว่า 'ย้ายมาจากโรงเรียนในชนบท' ที่ไม่มีใคร#nรู้จักชื่อ"
61030-82 = "แต่นั่นก็เป็นการช่วยเหลือมากที่สุดที่พวกฉันทำได้ตอนนี้ค่ะ..."
61030-87 = "......"
61030-88 = "......"
61030-90 = "ลองคิดทบทวนดูนะคะ ถึงฉันจะเคยบอกไปแล้ว แต่ขอย้ำอีกครั้งว่าไม่เป็นไรจริงๆ ค่ะ"
61030-94 = "ถ้าตัดสินใจได้แล้วก็โทรหาฉันตามเบอร์นี้มาอย่างเงียบๆ นะคะ"
61030-97 = "......"
61030-98 = "......"
61030-100 = "ฉันคิดไม่ตกเลยค่ะ"
61030-101 = "พวกเรากลุ้มใจมากๆ จริงๆ นะคะ"
61030-102 = "ทุกอย่างน่ากังวลไปหมด ทั้งสถานการณ์ของพวกเรา ข้างนอกอาเรียส ทรีนิตี้ แล้วก็..."
61030-106 = "ที่พวกเราตัดสินใจย้ายมา... เพราะรู้สึกว่าไม่ว่าจะไปทำอะไรอยู่ที่ไหน ก็น่าจะดีกว่าที่เป็นอยู่ค่ะ"
61030-115 = "[ns] \"เรื่องเป็นอย่างนี้สินะ...\""
61030-116 = "ค่ะ..."
61030-117 = "นะ... นอกจากพวกฉันแล้ว ตอนนี้ก็มีเด็กคนอื่นๆ ย้ายมาทรีนิตี้... กันเยอะเลยค่ะ"
61030-118 = "ถึงส่วนใหญ่จะอยู่ชั้นปีที่ 1 หรือไม่ก็ชั้นปีที่ 2 ก็เถอะค่ะ..."
61030-120 = "[ns3] \"คงลำบากกันมากเลยนะ...\"\n[ns4] \"น่าจะลำบากกันมากเลยนะ...\""
61030-123 = "มะ... ไม่ค่ะ ลำบากอะไรกันล่ะคะ ฉันยังรู้สึกเหมือนเป็นความฝันอยู่เลยค่ะ"
61030-124 = "ถ้าเป็นเมื่อก่อน... อย่าว่าแต่ผ้าห่มเลยค่ะ แค่หาผ้าปูรองนอนเก่าๆ ได้สักผืนก็นับว่าโชคดีแล้ว..."
61030-125 = "การได้นอนบนเตียงมันดีจริงๆ เลยนะคะ แหะ... แหะๆ..."
61030-126 = "ที่จริงในอาเรียสก็มีที่นอนคล้ายๆ เตียงค่ะ แต่พวกฉันถูกสอนว่าถ้าไปพึ่งพาของแบบนั้นจะทำให้เรา#nอ่อนแอลง..."
61030-131 = "[ns] \"ครูขอโทษนะ ทุกคน...\""
61030-134 = "(คุณครูโค้งศีรษะและขอโทษเด็กๆ)"
61030-135 = "คะ... คะ?! คะคะคะคะ... คุณครูขอโทษทำไมคะ?"
61030-136 = "ชะ... ใช่ค่ะ! พวกฉันได้มาอยู่สบายแบบนี้... เพราะได้คุณครูคอยช่วยไว้ต่างหาก..."
61030-137 = "[s] \"แต่ครูก็ไม่ค่อยได้ใส่ใจทุกคนเท่าไรเลย\""
61030-138 = "มะ... ไม่เลยค่ะ! ถ้าคุณครูทำแบบนี้ พวกฉันก็..."
61030-139 = "สิ่งที่อยากปรึกษาคุณครู ไม่ใช่เรื่องแบบนี้แท้ๆ เลย...!"
61030-141 = "(คุณครูเพิ่งนึกได้ว่าเด็กๆ มีเรื่องอยากพูดด้วย และตัวเองควรรับฟังเด็กๆ!)"
61030-143 = "เรื่องที่จะปรึกษาเหรอคะ? คะ... ค่อยยังชั่วนะคะ... ในที่สุดก็ได้โอกาสถามคุณครูสักที แหะ... แหะๆ..."
61030-144 = "คือว่า... สิ่งที่พวกฉันอยากถาม... ก็คือ..."
61030-145 = "การสอบบูรณาการคืออะไรเหรอคะ?"
61030-146 = "[s] \"หืม...?\""
61030-147 = "ใช่แล้วค่ะ อย่าว่าแต่การสอบบูรณาการเลยค่ะ... พวกฉันยังไม่ค่อยแน่ใจเลยว่าสิ่งที่เรียกว่า 'การสอบ' มันคืออะไร..."
61030-148 = "ตอนอยู่อาเรียส... พวกฉันไม่เคยเรียนอะไรแบบนี้มาก่อน..."
61030-149 = "แต่ถึงยังไงพวกฉันก็... ไม่กล้าไปถามจากคนรอบตัวค่ะ"
61030-150 = "นอกจากพวกฉันแล้ว นักเรียนทรีนิตี้คนอื่นดูเหมือนจะรู้เรื่องนี้กันอยู่แล้วตั้งแต่แรก..."
61030-151 = "พวกฉันก็เลยมาถามคุณครู..."
61030-152 = "ใช่ค่ะ! ก็คุณครูเป็นคุณครูนี่คะ?"
61030-154 = "[ns] \"อย่างนั้นสินะ...\""
61030-156 = "[ns] \"จะว่าไป นี่เป็นครั้งแรกที่เราได้เจอกันใช่มั้ย?\""
61030-157 = "คะ? มันก็จริงอยู่ แต่มันก็เป็นเรื่องแน่นอนอยู่แล้วไม่ใช่เหรอคะ...?"
61030-158 = "ใช่ค่ะ ก็พวกฉัน... มาจากอาเรียสนี่คะ..."
61030-159 = "ห้ามพูดอะไรแบบนั้นงั้นเหรอคะ? แต่ว่า..."
61030-160 = "ขะ... เข้าใจแล้วค่ะ แต่อย่างน้อยก็ตอนอยู่กับคุณครูก็..."
61030-166 = "อึก...?!"
61030-167 = "เฮือก...!"
61030-169 = "(คุณครูเผลอยื่นมือไปลูบหัวนักเรียนที่อยู่ตรงหน้า)"
61030-170 = "(เด็กนักเรียนอาเรียสชะงักด้วยความกลัวโดยสัญชาตญาณ แล้วถอยหลังออกไป 2-3 ก้าว...)"
61030-177 = "ขะขะขะขะ... ขอโทษ... ค่ะ คุณครู แบบนี้มัน...!"
61030-178 = "ค่ะ! ใช่ค่ะ! ไม่หรอกค่ะ...! พวกฉันไม่ได้คิดว่าคุณครูเป็นคนแบบนั้น...!"
61030-179 = "[s] \"อื้อ ไม่เป็นไร\""
61030-180 = "ตะ... แต่ว่า..."
61030-181 = "......"
61030-183 = "[ns] \"ไม่เป็นไร\""
61030-185 = "[ns] \"ตอนนี้ไม่เป็นไรแล้วละ...\""
61030-189 = "(เด็กนักเรียนอาเรียสค่อยๆ เดินเข้ามาใกล้เหมือนแมวตัวเล็กๆ ที่หวาดกลัว)"
61030-190 = "ฮึก..."
61030-191 = "ฮือ... (สะอื้น...)"
61030-193 = "(คุณครูเพิ่งมารู้เอาตอนนี้ว่า... เด็กนักเรียนอาเรียส... ตัวผอมแห้งกว่านักเรียนทั่วไป)"
61030-194 = "(คุณครูปลอบเด็กๆ แล้วค่อยๆ อธิบายให้เข้าใจว่าการสอบคืออะไร และมีความสำคัญอย่างไร)"
61030-196 = "ปะ... เป็นแบบนี้สินะ ถ้ามองในอีกแง่หนึ่ง มันก็น่าเสียดายอยู่นะคะที่จะประเมินผู้คนด้วยผลลัพธ์เพียง#nอย่างเดียว"
61030-197 = "แต่มันก็ดีตรงที่ทำให้เราได้ทบทวนสิ่งที่เรียนรู้มาอีกครั้ง..."
61030-198 = "ถ้าพิจารณาแบบนั้น ที่อาเรียสเองก็มีแนวคิดที่คล้ายๆ การสอบอยู่เหมือนกันค่ะ!"
61030-199 = "อย่างเช่นให้ประเมินว่าเหลือกระสุนอยู่กี่นัดจากน้ำหนักของแม็กปืน และต้องตอบสนองยังไงเมื่ออยู่#nในสถานการณ์ที่ศัตรูเข้ามาประชิด..."
61030-203 = "แล้วก็ต้องทำยังไงถึงจะทำลายฮาโลได้อย่างมีประสิทธิภาพที่สุด อะไรแบบนี้น่ะค่ะ"
61030-204 = "นี่ เดี๋ยวสิ!"
61030-205 = "หืม? ทำไมเหรอ? อ่า...!"
61030-206 = "ขะ... ขอโทษค่ะ! คุณครู! ฉันไม่น่ายกเรื่องแปลกๆ ออกมาพูดเลย...!"
61030-207 = "คะ? แล้วที่ผ่านมาพวกฉันอยู่กันยังไงน่ะเหรอคะ? อ่า... อืม... พวกฉันได้ลอง 'ใช้ชีวิตในโรงเรียน' ดูค่ะ! แหะ... แหะๆ..."
61030-208 = "พอพูดออกมาจากปากพวกเรา มันก็น่าขำแปลกๆ นะคะ"
61030-209 = "มันดีมั้ยน่ะเหรอคะ? ก็ดีค่ะ แต่ต้องบอกว่ามันน่าทึ่งมากกว่า..."
61030-210 = "พวกฉันไม่ต้องยืนเฝ้ายาม ไม่ต้องกินข้าวแค่วันละมื้อ ไม่มีเรื่องให้ต้องโดนดุหรือถูกขังเดี่ยวและตะโกนใส่..."
61030-211 = "ไม่รู้ว่าเพราะแบบนี้หรือเปล่า ฉันก็เลยรู้สึกร้อนนิดหน่อยน่ะค่ะ"
61030-212 = "ก็ที่อาเรียส... หนาวมากนี่คะ..."
61030-214 = "[ns] \"แล้วนักเรียนทรีนิตี้เป็นมิตรกับพวกเรามั้ย?\""
61030-215 = "คะ? ค่ะ แน่นอนค่ะ ในสายตาของทุกคนแล้ว พวกฉันคือเด็กนักเรียนที่ย้ายมาจากโรงเรียนอื่นในชนบท#nนี่คะ"
61030-216 = "ทุกคนเป็นมิตรและเข้าหาพวกฉันอย่างระมัดระวังมากๆ... กลับกลายเป็นว่าพวกฉันลำบากใจนิดหน่อย#nด้วยค่ะ..."
61030-217 = "บางทีพวกฉันก็ไปที่ที่เรียกว่า 'คาเฟ่' กับนักเรียนทรีนิตี้ค่ะ..."
61030-218 = "โห ต้องบอกว่าเวลาเห็นพวกเธอสั่งของแพงๆ กันแบบไม่ลังเล มันยากมากเลยค่ะที่พวกฉันจะควบคุม#nสีหน้ากันได้"
61030-219 = "ส่วนฉันก็ยังจำชื่อกาแฟหรือชื่อเค้กได้ไม่หมดเลยค่ะ มันแพงมากๆ แต่ก็อร่อยมากด้วยค่ะ#nแหะ... แหะๆ..."
61030-220 = "ละ... แล้วพอต้องหาเงินไปเที่ยวคาเฟ่และซื้อข้าวของนู่นนี่ พวกฉันก็เลยทำงานพาร์ทไทม์กันด้วยค่ะ"

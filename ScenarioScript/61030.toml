[translation]
61030-1 = "Episode 3;A New Start"
61030-6 = "W-Welcome, Sensei."
61030-7 = "So...this is our room..."
61030-9 = "[ns1] \"So, what's going on?\"\n[ns2] \"Don't be shy!\""
61030-12 = "Ack! Wait! I forgot!"
61030-13 = "Forgot what? Ah...!"
61030-14 = "S-S-S-Sensei! We're really sorry..."
61030-15 = "But could you actually wait outside? Just for five minutes!"
61030-16 = "I know this probably seems weird!"
61030-17 = "But please, just five minutes!"
61030-19 = "I decided to do as they asked and stepped out into the hallway."
61030-20 = "After a while..."
61030-24 = "Y-You can come in! I mean, please come in now!"
61030-31 = "[ns] \"Uh...?!\""
61030-32 = "H-Hello, again, Sensei."
61030-33 = "We didn't mean to surprise you! In fact, we mean no harm at all!"
61030-34 = "I suppose, according to Trinity, you could call us Arius transfers?"
61030-36 = "[ns] \"Ah...!\""
61030-44 = "You might not remember about Madame and everything that happened...but one day she just disappeared completely!"
61030-45 = "We were happy she was gone, but also at a complete loss. You could feel the tension everywhere you went. What would happen to Arius?"
61030-46 = "But that's when we met...them."
61030-49 = "...Around here should be okay."
61030-53 = "Y-Your uniform...?!"
61030-54 = "T-Trinity?!"
61030-58 = "Please, shhh. Yes, yes, I am. I didn't mean to scare you."
61030-59 = "I was supposed to wear the Tea Party's uniform instead of this, but..."
61030-61 = "\"Tea Party\"...?"
61030-62 = "What...is that?"
61030-64 = "..."
61030-65 = "It's something like...a club in Trinity that really appreciates teatime."
61030-67 = "What?! We could transfer...to Trinity?!"
61030-68 = "But for us... Trinity..."
61030-70 = "Yes. I understand where you're coming from."
61030-71 = "I swear my intent isn't to pressure you in any way. I'm only reaching out my hand as an...option."
61030-72 = "You could take my open hand and start a new life at Trinity."
61030-73 = "But you don't have to. No matter what you wish to do, it's your choice."
61030-74 = "It's just... This is so sudden."
61030-75 = "I understand. In fact, I'm sure this was the last thing you were expecting. You don't have to answer right away."
61030-76 = "There are people at Trinity and the Tea Party who sincerely want to bridge the gap between us. Not a lot, but enough."
61030-77 = "That means anything too public would be...difficult."
61030-78 = "Even if we could transfer...and even if there are some people who would welcome us..."
61030-79 = "Would the other students...be okay with us?"
61030-80 = "You've stumbled upon the crux of the problem. You see, Trinity is an amalgamation of countless factions and clubs."
61030-81 = "If you do choose to come with us, you will be labeled as a \"foreign transfer student\" in your records. We'll say you come from somewhere far away, in the countryside."
61030-82 = "With the situation being what it is, that's the best we can do."
61030-87 = "..."
61030-88 = "..."
61030-90 = "I meant it earlier, when I said you could take your time."
61030-94 = "Think on it, and if you make up your mind to come, please call this number."
61030-97 = "..."
61030-98 = "..."
61030-100 = "We thought about it."
61030-101 = "We really, really, really thought about it."
61030-102 = "Everything was uncertain. Our situation, Arius, Trinity, and..."
61030-106 = "But after all that thinking, we couldn't help but feel that anything would be better than what we had."
61030-115 = "[ns] \"And so you ended up here...\""
61030-116 = "Yes..."
61030-117 = "A-And there's a lot of other Arius students who transferred too..."
61030-118 = "Although, they're mostly first or second-year students..."
61030-120 = "[ns3] \"I see... What a difficult journey.\"\n[ns4] \"...You've been through a lot.\""
61030-123 = "N-Not at all. Honestly, none of it feels real."
61030-124 = "At Arius...even owning a blanket was a faraway dream."
61030-125 = "Here, I have a bed! It's so soft...and fluffy... Heehee."
61030-126 = "Well, Arius did have beds, but we weren't allowed to use them. Because comfort could make us weak."
61030-131 = "[ns] \"...I'm sorry, both of you.\""
61030-134 = "I bowed my head in apology to the two girls."
61030-135 = "Wh-What?! Wh-Wh-Why would you apologize, Sensei?"
61030-136 = "R-Right! In a way, it's thanks to you that we're even here at all..."
61030-137 = "[s] \"I shouldn't have neglected Arius after everything that happened.\""
61030-138 = "S-Still! Hearing that makes us..."
61030-139 = "This isn't why we asked you to come here!"
61030-141 = "With the shock of seeing Arius students in Trinity, I'd forgotten that they'd wanted to ask me something."
61030-143 = "Wh-What did we want to talk about?#nAh! I'm so glad we can finally ask."
61030-144 = "So, um... Our question is..."
61030-145 = "What is a \"Comprehensive Exam\"?"
61030-146 = "[s] \"...Huh?\""
61030-147 = "Actually, more specifically, I was wondering what an \"exam\" is, period."
61030-148 = "We didn't do this kind of \"class\" studying back at Arius..."
61030-149 = "And we didn't really think we could ask the Trinity students."
61030-150 = "They all seemed like they knew exactly what it was, without anyone explaining to them..."
61030-151 = "That's why we were hoping you could help us, Sensei!"
61030-152 = "Because you're a teacher, right?"
61030-154 = "[ns] \"...Right. I get it now.\""
61030-156 = "[ns] \"This is our first time meeting, right?\""
61030-157 = "Hm? Of course it is..."
61030-158 = "Since...we're from Arius...after all..."
61030-159 = "We shouldn't speak negatively about ourselves like that...?"
61030-160 = "U-Um. We can try. In front of you, at least."
61030-166 = "Ack...?!"
61030-167 = "Eek...!"
61030-169 = "Without thinking, I reached out my hands to pat their heads."
61030-170 = "The Arius students recoiled back in fear, instinctively cowering from my outstretched hands."
61030-177 = "S-S-S-S-Sorry, Sensei! We didn't mean— It's because...! "
61030-178 = "W-We don't think of you like that...! At all! It's not—"
61030-179 = "[s] \"Hey, don't worry. I didn't take it that way.\""
61030-180 = "B-But..."
61030-181 = "..."
61030-183 = "[ns] \"It's okay.\""
61030-185 = "[ns] \"...Everything's going to be okay now.\""
61030-189 = "Hesitantly, the two shuffled ever so slightly closer to me."
61030-190 = "...Augh..."
61030-191 = "Ugh... *sniffle*..."
61030-193 = "Seeing them up close, I suddenly realized just how small all the Arius students I'd encountered until then were, especially in comparison to their peers."
61030-194 = "After helping them relax a little, I explained the meaning and importance behind exams."
61030-196 = "I see... So, even though evaluating people based off of a single test result might not be the best method..."
61030-197 = "...it can still help students review and learn the material."
61030-198 = "You know, we actually did have something like that in Arius!"
61030-199 = "Like figuring out how many bullets were loaded based off of the magazine's weight, or what to do in close-quarter combat situations..."
61030-203 = "...the methods for destroying halos, so on, and so forth."
61030-204 = "H-Hey!"
61030-205 = "Hm? What? Ah...!"
61030-206 = "S-Sorry, Sensei! I shouldn't talk about that so casually!"
61030-207 = "Hm? You're more curious about how we've been adjusting? Heehee, well... We've got to have a \"school life\" here!"
61030-208 = "It feels weird to be saying that. Heh."
61030-209 = "Are we having fun? Yes! A lot! More than anything, we've been really surprised, over and over again!"
61030-210 = "There's no patrols or drills. And you won't get put in solitary confinement if you make a mistake! And, Sensei, get this! They even feed you three times a day!"
61030-211 = "It can get hot here too! I was really surprised by that!"
61030-212 = "Because...it was always cold in Arius..."
61030-214 = "[ns] \"Has everyone been treating you well?\""
61030-215 = "Yes! Very well! They think we transferred from the countryside, after all."
61030-216 = "In fact, they can be SO nice, sometimes I don't know what to do with myself..."
61030-217 = "We went to this place called a \"cafe\" with some Trinity students a few times."
61030-218 = "And they ordered all these expensive things off the menu without batting an eye! I could barely keep MINE from popping out of my head."
61030-219 = "There's so many different types of coffee and cakes! I'm still learning all of them. They sure are delicious...and expensive, though! Heehee."
61030-220 = "That's why we got part-time jobs too! So we could afford to go the cafe!"
61030-221 = "It's cool to be working! I think I learn just as much at work as I do in the classroom."
61030-222 = "Like how light your wallet can feel halfway through a pay period..."
61030-223 = "[s] \"That doesn't change, even as an adult!\""
61030-224 = "R-Really?! I thought you would be like...really extraordinary, though, Sensei."
61030-225 = "Like super-rich, without a care in the world."
61030-226 = "Living is living, no matter who you are? I... I kind of like the sound of that."
61030-227 = "Yeah... That does sound nice..."
61030-228 = "..."
61030-229 = "..."
61030-230 = "Um, Sensei?"
61030-231 = "You probably already guessed this, but..."
61030-232 = "Not everyone transferred to Trinity."
61030-233 = "[s] \"...Yeah.\""
61030-234 = "I don't know how well I can explain this."
61030-235 = "But there were some students who decided to stay."
61030-236 = "There were a lot of different reasons..."
61030-237 = "But I think, at the core of it, accepting Trinity and the outside world was just too big of a change."
61030-238 = "I realized something, after transferring here."
61030-245 = "So much of your life depends on where you were born."
61030-246 = "In one place, people would be lucky to have one meal a day."
61030-247 = "While right on the other side, people sit and enjoy expensive desserts at cafes and restaurants."
61030-248 = "If you think about it, our two schools could've been really close, in another world."
61030-255 = "...We don't know what happened to the students who stayed behind."
61030-256 = "We have our guesses, but they're just guesses."
61030-257 = "We heard some rumors...that those students have cut ties with the outside world completely."
61030-258 = "And now they're undertaking some guerilla operation."
61030-260 = "Sensei. We've learned that everyone comes from different places, and that we should respect people's opinions as best as we can."
61030-261 = "Even though we know that, we can't help but worry about the ones who stayed behind."
61030-262 = "Because...we still have bad dreams. About Arius...and everything that happened."
61030-263 = "Sometimes, we wake up in the middle of the night screaming."
61030-264 = "We started keeping a track of who wakes up the most, and who screams the loudest. Heh... Heheh."
61030-265 = "I'm winning right now!"
61030-266 = "We basically woke up at the same time that last one!"
61030-267 = "I woke up a whole minute before you!"
61030-272 = "Sensei. This might sound strange..."
61030-273 = "But earlier, when you were explaining what an exam is..."
61030-274 = "I just thought that it'd be nice if everyone else had the chance to take an exam too."
61030-276 = "Wait? Really?"
61030-277 = "I-I know it's a little weird..."
61030-278 = "No, no! I thought the same thing!"
61030-279 = "[ns] \"Why do you think you felt that way?\""
61030-281 = "I-It's a little hard to explain..."
61030-282 = "I think that... Seeing the students at Trinity doing regular things, like going to class, getting ready in the morning, taking exams..."
61030-283 = "It felt nice, you know? They felt like things students our age should be doing."
61030-284 = "Sometimes, I hear the Trinity students complain about how much they hate studying."
61030-285 = "We do find it really hard...and all-around foreign... But we couldn't say that we hate it either."
61030-286 = "\"Studying is a student's responsibility!\" We've heard that here a lot."
61030-288 = "[ns] \"...!\""
61030-295 = "S-S-Sensei?!"
61030-296 = "Sensei?!"
61030-297 = "I was so proud of them that I just couldn't stop myself from patting their heads!"
61030-299 = "[ns] \"Sorry! Just hearing you two say that made me...!\""
61030-301 = "I-It's okay! We really meant it!"
61030-302 = "I wouldn't mind if we stayed like this...for just a little longer..."
61030-303 = "..."
61030-304 = "..."
61030-305 = "So someone's hand...can be this warm..."
61030-306 = "It's really...gentle. Heh."
61030-308 = "[ns5] \"Anyways, you want Arius students...\"\n[ns6] \"..to have the opportunity to 'study,' right?\"\n[ns7] \"And to try taking a test!\""
61030-312 = "Exactly! That's the idea behind it, but..."
61030-313 = "There's been something on my mind. Maybe I'm just overthinking it..."
61030-314 = "Well, I guess I should just ask... Um."
61030-315 = "This test's full name is the \"Trinity Comprehensive Exam\", right? I-I know that Trinity isn't the one who wrote it, but..."
61030-316 = "[s] \"Ah...!\""
61030-317 = "The students who stayed in Arius, out of their intense hatred of Trinity..."
61030-318 = "...probably wouldn't like the name \"Trinity Comprehensive Exam,\" would they?"
61030-319 = "And none of them have ever studied before, either."
61030-320 = "On top of that, I heard Arius isn't accepting any visitors right now."
61030-321 = "Maybe if they could hold classes at Arius, like they do here..."
61030-322 = "If that was even remotely possible, it would've happened by now!"
61030-323 = "[s] \"Don't sweat the small stuff!\""
61030-324 = "R-Really?! Does that mean...you really think there's a way?"
61030-325 = "Because you're an adult! A teacher! You must know all sorts of things we don't know!"
61030-326 = "[s] \"Finding impossible solutions is part of an adult's responsibility.\""
61030-327 = "For some reason, even though I don't really get it..."
61030-328 = "...I still feel like I can believe in you. Heehee."
61030-329 = "Asking you for help really was the right choice, Sensei!"
61030-333 = "I also have, one more request for you, if that's okay..."
61030-335 = "[log=아리우스 학생 A 마스크OFF]Could you please...look after the Squad members for us?[/log]"
61030-339 = "[ns] \"...!\""
61030-345 = "Next Episode;Where Rivers Meet"

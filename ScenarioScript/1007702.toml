[translation]
1007702-1 = "過猶不及"
1007702-2 = "（為了夏萊的工作前往三一時……）"
1007702-3 = "（才剛抵達校門就看見了在周圍走來走去的一花）"
1007702-4 = "…………"
1007702-5 = "……啊。"
1007702-6 = "老師～！這裡這裡～"
1007702-7 = "來得真準時呢？#n我聽說老師很忙，還以為會晚一點才到呢。"
1007702-8 = "[s1]「因為『要忙的事』也包含這個約定。」\n[s2]「就算很忙也不能讓你等呀。」"
1007702-11 = "哈哈，其實老師不必這麼費心啦。"
1007702-12 = "不過聽見老師這麼說，果然還是很開心。#n看來和平常的工作相比，還是這種事更讓人快樂啊……"
1007702-13 = "今天是幸運的一天呢～"
1007702-14 = "……嗯？"
1007702-15 = "我平常負責什麼工作？#n這個嘛……"
1007702-16 = "主要是和其他學園的人見面，#n或是預先到可能發生衝突的地點等待、進行仲裁……"
1007702-17 = "大多是和警備及仲裁有關的工作，哈哈。"
1007702-18 = "這次是因為其他人的班表全都亂成一團，不得已才變成這樣的。"
1007702-19 = "啊，怕老師會誤會所以強調一下，我沒有不喜歡的意思喔！"
1007702-20 = "我反而覺得來這裡更好。"
1007702-21 = "畢竟比較的對象是在充滿殺戮氣息的地方看守或仲裁……"
1007702-22 = "那實在是挺辛苦的……哈哈。"
1007702-23 = "[s3]「嗯，那不是鬧著玩的吧……」\n[s4]「我也常有那種經歷，所以很有同感。」"
1007702-26 = "啊哈哈！怎麼突然這麼認真？#n甚至還讓我獲得了一點認同感？"
1007702-27 = "不過，幸好老師能理解。#n還有……"
1007702-28 = "如果今天的行程安排有點草率的話，還請老師多多見諒哦！哈哈。"
1007702-29 = "來來來，在氣氛變尷尬之前開始工作吧。"
1007702-30 = "先往這邊～"
1007702-36 = "就快到了。#n現在只要經過這裡……"
1007702-37 = "……嗯？"
1007702-39 = "啊啊？你現在是在開什麼玩笑？"
1007702-40 = "你說「車輪餅」和「銅鑼燒」是一樣的？你認真？"
1007702-41 = "我有說錯嗎？不都是外皮包著紅豆餡？有什麼不一樣？"
1007702-42 = "你，你說什麼！？這傢伙……！？"
1007702-43 = "怎麼，要來硬的是嗎？#n你該不會以為能贏我吧？"
1007702-45 = "啊啊啊啊～！？"
1007702-47 = "受不了，他們怎麼又來了……#n又不是一兩歲的孩子……"
1007702-48 = "……咦？"
1007702-49 = "問我放任不管沒關係嗎？#n為什麼這麼問……"
1007702-50 = "……啊啊，因為我是實現正義部的成員？"
1007702-51 = "嗯～是沒錯啦～"
1007702-52 = "唔嗯，該怎麼做才好呢……"
1007702-56 = "……算了，暫時放任不管應該也無所謂吧？#n我今天負責的工作是引導老師進行工作而不是管理街道。"
1007702-57 = "而且現在也沒有發生槍戰之類的，#n只是發生爭吵就直接介入不只有點奇怪，還可能會多管閒事。"
1007702-58 = "就算真的出事也只要聯絡其他實現正義部的人來就行了……#n我應該協助老師的工作才對。"
1007702-59 = "如果每件事都干涉的話，我保證老師的工作一定會做不完的哦。#n那樣就本末倒置了。"
1007702-60 = "[s5]「真感謝你關心我的工作……」\n[s6]「一花真會隨機應變呢。」"
1007702-63 = "這個嘛……除非發生什麼大事，不然在一旁靜觀其變比較符合我的性格。#n不是有句話說過猶不及嗎？"
1007702-64 = "……嗯？"
1007702-65 = "老師很少聽到那種說法？#n……啊，你是指其他實現正義部的人嗎？"
1007702-66 = "啊哈哈哈！我也有同感～"
1007702-67 = "畢竟實現正義部裡的其他人確實有點一板一眼。"
1007702-68 = "嗯，不過那樣其實也挺帥氣的……"
1007702-69 = "跟我這種得過且過的人……很不一樣。"
1007702-70 = "好，我們趕緊到下一個地方吧！#n要是繼續在這裡說下去的話，工作就要做不完了。"
1007702-71 = "請跟我來～！"
1007702-76 = "（之後也在其他地方碰到了一些狀況，但一花都靈活地進行了處理）"
1007702-77 = "（即便如此，還是到了下午才把夏萊的工作全部完成）"
1007702-79 = "嗯……這樣應該差不多了吧。"
1007702-80 = "真是辛苦你了，老師！#n總算是在今天之內全部結束了呢。"
1007702-81 = "[s7]「這都多虧了一花。」\n[s8]「今天真的幫了很大的忙。」"
1007702-84 = "……咦？我嗎？"
1007702-85 = "哎呀哎呀～又說這種令人難為情的話……"
1007702-86 = "因為是和平常不一樣的工作，我也覺得很新鮮而且心情舒暢。#n如果是這樣的工作，做起來好像也挺開心的？"
1007702-87 = "所以如果老師不介意的話～"
1007702-88 = "希望老師以後來的時候，我也能偶爾出來一下。哈哈。"
1007702-89 = "……哎呀，我又在說沒意義的話了。"
1007702-90 = "現在差不多該為老師送行了……"
1007702-91 = "我也該趕快把剩下的工作解決掉才行。"
1007702-92 = "……嗯？"
1007702-93 = "我還有沒有其他行程？#n啊啊，其實也沒什麼。只有剛剛巡視時看到的那些。"
1007702-94 = "像是快要發生打鬥的氣氛～或是鬧哄哄的情況而已～"
1007702-95 = "我「姑且」是實現正義部的一員，必須去確認是否發生事件才行。"
1007702-96 = "剛才只是因為老師的工作比較緊急而做出取捨，#n並沒有置之不理的打算。"
1007702-97 = "……咦？"
1007702-98 = "要跟我一起去……？"
1007702-102 = "咦……？什麼？老師你……？"
1007702-103 = "可是這完全是我的工作……"
1007702-104 = "[s9]「別在意，這也包含在『我的工作』的範圍內。」\n[s10]「硬要說的話，我只是想盡一份力。」"
1007702-107 = "嗯……是，是嗎？#n奇怪，我怎麼覺得這兩件事好像沒什麼關聯……"
1007702-108 = "……這樣心裡比較……舒服？老師你嗎？"
1007702-109 = "唔，唔嗯……嗯……"
1007702-110 = "…………"
1007702-111 = "……哈哈。"
1007702-112 = "嗯，好吧。#n既然老師都這麼說了，我也不好意思多說什麼。"
1007702-113 = "對我個人來說……也有種賺到了的感覺……"
1007702-114 = "……嘿嘿！那我們就一起去吧！"
1007702-115 = "還有，說是回報～可能有點不太合適……"
1007702-116 = "我的工作結束之後可能已經傍晚了，所以希望能護送老師回去。"
1007702-117 = "這樣……"
1007702-118 = "我心裡也會比較舒服。"
1007702-120 = "（之後，在一花的護送下平安地回到了夏萊）"

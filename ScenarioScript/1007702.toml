[translation]
1007702-1 = "อะไรดีก็ว่าดี"
1007702-2 = "(คุณครูแวะมาที่ทรีนิตี้ด้วยเรื่องงานของชาเล่ต์)"
1007702-3 = "(ทันทีที่มาถึงหน้าประตูโรงเรียนก็เจออิจิกะที่กำลังเดินเตร็ดเตร่อยู่)"
1007702-4 = "......"
1007702-5 = "...อ๊ะ"
1007702-6 = "คุณครู~! ทางนี้ค่ะ ทางนี้~"
1007702-7 = "มาตรงเวลาเลยนะคะเนี่ย ได้ยินมาว่าคุณครูงานยุ่ง ฉันก็นึกว่าจะใช้เวลานานกว่านี้เสียอีก"
1007702-8 = "[s1] \"ก็ 'งานยุ่ง' ที่ว่า รวมถึงการนัดอิจิกะด้วยน่ะ\"\n[s2] \"แต่ยังไงก็ให้อิจิกะรอไม่ได้หรอก\""
1007702-11 = "ฮะๆ ไม่ต้องใส่ใจกันขนาดนั้นก็ได้ค่ะ"
1007702-12 = "แต่ก็ยังเป็นคำที่ฟังแล้วรู้สึกดีเหมือนเคยนะคะ แบบนี้ทำให้ฉันอารมณ์ดีกว่างานที่ทำอยู่ทุกวันอีกค่ะ"
1007702-13 = "วันนี้ถือว่าฉันโชคดีอยู่นะเนี่ย~"
1007702-14 = "...คะ?"
1007702-15 = "ปกติฉันทำงานอะไรน่ะเหรอคะ? อ๋อ เอ่อ ก็..."
1007702-16 = "ปกติฉันจะได้ไปเจอนักเรียนจากโรงเรียนอื่น หรือไม่ก็ไปเฝ้าระวังในสถานที่ที่จะเกิดการต่อสู้ แล้วก็#nเข้าไปช่วยไกล่เกลี่ย..."
1007702-17 = "ส่วนใหญ่จะเกี่ยวกับการรักษาการณ์และก็ไกล่เกลี่ยน่ะค่ะ ฮ่าๆ"
1007702-18 = "ครั้งนี้ตารางงานของคนอื่นยุ่งเหยิงไปหมด ก็เลยช่วยไม่ได้ค่ะ"
1007702-19 = "อ่า ขอบอกไว้เผื่อว่าคุณครูจะเข้าใจผิดเกี่ยวกับเรื่องนี้นะคะ ไม่ใช่เพราะว่าฉันไม่ชอบหรืออะไรหรอกนะคะ!"
1007702-20 = "แต่งานตรงนี้รู้สึกดีกว่าเยอะเลยละค่ะ~"
1007702-21 = "อย่าเอาไปเทียบกับงานเฝ้าระวังสถานการณ์ในบรรยากาศตึงเครียด หรือพวกงานเจรจา#nประนีประนอมเลยค่ะ"
1007702-22 = "งานนั้นน่ะ พอได้ทำแล้วจะรู้ว่าไม่ใช่งานธรรมดาๆ เลย... แหะๆ"
1007702-23 = "[s3] \"อื้ม ไม่ธรรมดาเลยละ...\"\n[s4] \"ครูเข้าใจ เคยเจองานแบบนี้บ่อยๆ เลยเหมือนกัน\""
1007702-26 = "อะฮะฮะฮ่า! อะไรคะเนี่ย ตอบกลับอย่างจริงใจเลย รู้สึกว่าเราเหมือนกันแปลกๆ นะคะ"
1007702-27 = "เอาเถอะค่ะ ดีแล้วละค่ะที่คุณครูเข้าใจ ถ้าอย่างนั้น..."
1007702-28 = "ตารางงานวันนี้... ต่อให้ฉันทำออกมาอย่างเงอะงะไปหน่อย แต่ฉันก็จะเชื่อว่าคุณครูจะเข้าใจนะคะ! แหะๆ"
1007702-29 = "เอาละๆ รีบเริ่มงานก่อนที่บรรยากาศจะอึดอัดขึ้นดีกว่าค่ะ"
1007702-30 = "มาทางนี้เลยค่ะ~"
1007702-36 = "แค่ผ่านตรงนี้ไปละก็จะถึงแล้วละค่ะ..."
1007702-37 = "...หืม?"
1007702-39 = "อะไรของเธอน่ะ? มีอะไรตลกนักรึไง?"
1007702-40 = "<นมเย็น> กับ <นมชมพู> มันเหมือนกันงั้นเหรอ? เอาดีๆ?"
1007702-41 = "มาหาเรื่องอะไรของเธอเนี่ย? ก็ทั้งสองอย่างมันก็ทำมาจากน้ำแดงใส่นมเหมือนกันนั่นแหละ ไม่เห็นจะต่าง#nกันเลย"
1007702-42 = "วะ... ว่าไงนะ!?  เจ้าพวกนี้นี่...!?"
1007702-43 = "เดี๋ยวเหอะ หรือจะเอา? อย่าบอกนะว่าคิดว่าจะเอาชนะพวกฉันได้น่ะ?"
1007702-45 = "อ๊ายยยยย~!?"
1007702-47 = "โธ่เอ๊ย ร้องแบบนั้นอีกแล้ว... ไม่ใช่เด็กขวบสองขวบสักหน่อย..."
1007702-48 = "...คะ?"
1007702-49 = "ปล่อยไว้เฉยๆ ได้มั้ยน่ะเหรอคะ? หมายความว่ายังไง..."
1007702-50 = "...อ้อ ฉันเป็นชมรมทวงความยุติธรรมนี่เนอะ?"
1007702-51 = "อืมม~ มันก็จริงอยู่หรอก..."
1007702-52 = "นั่นสินะคะ จะทำยังไงดีนะ..."
1007702-56 = "...แต่ตอนนี้น่าจะไม่เป็นไรหรอกค่ะ งานที่ฉันทำอยู่คือการมาคุ้มครองคุณครูต่างหาก ไม่ได้มาจัดการ#nพวกที่ทะเลาะกันกลางถนน"
1007702-57 = "อีกอย่าง ทางนั้นก็ยังไม่ได้เริ่มยิงกันเลยค่ะ ถ้าฉันโผล่เข้าไปแค่เพราะพวกนั้นมีเรื่องต่อล้อต่อเถียง#nกัน มันก็จะดูแปลกๆ... เหมือนเข้าไปยุ่งอะไรไม่เข้าเรื่องน่ะค่ะ"
1007702-58 = "ถ้าเกิดเรื่องขึ้นละก็ ไว้ติดต่อคนอื่นในชมรมทวงความยุติธรรมแล้วขอให้มาที่นี่ก็ได้... ฉันต้องไปช่วย#nงานคุณครูสิคะถึงจะถูก"
1007702-59 = "ถ้าฉันต้องเข้าไปจัดการเรื่องแบบนั้นทุกเรื่องที่เจอ มีหวังคุณครูทำงานของวันนี้ไม่เสร็จนะคะ? แบบนั้นก็เสียเที่ยวสิคะ"
1007702-60 = "[s5] \"ขอบใจนะที่เป็นห่วงงานครู...\"\n[s6] \"อิจิกะเป็นประเภทที่ยืดหยุ่นได้ดีสินะ\""
1007702-63 = "เรียกว่าถ้าไม่ใช่เรื่องใหญ่อะไร ฉันก็จะหยวนๆ ให้มากกว่าน่ะค่ะ ปล่อยไปบ้างก็คงไม่เป็นไรหรอกค่ะ"
1007702-64 = "...คะ?"
1007702-65 = "คุณครูเคยได้ยินคำแบบนั้นมาแล้วเหรอคะ? ...อ๊ะ จากชมรมทวงความยุติธรรมคนอื่นเหรอ?"
1007702-66 = "อะฮะฮะฮ่า! พอจะรู้แล้วค่ะว่าได้ยินมาในสถานการณ์แบบไหน..."
1007702-67 = "คนอื่นในชมรมทวงความยุติธรรมก็ไม่ได้มีด้านที่เคร่งครัดไปเสียหมดหรอกค่ะ"
1007702-68 = "ฉันมองว่าการทำแบบนั้นมันก็เท่ดี..."
1007702-69 = "แต่ก็ต่างกับฉันที่เป็นพวกนิยมความพอดีน่ะค่ะ..."
1007702-70 = "เอาละ งั้นเรารีบไปยังสถานที่ต่อไปกันเลยมั้ยคะ? เพราะถ้าเอาแต่พูดพร่ำอยู่ที่นี่ เราไม่ได้ทำงานอื่น#nกันพอดีค่ะ"
1007702-71 = "ฉันจะนำทางให้เองค่ะ ตามมานะคะ~!"
1007702-76 = "(หลังจากนั้นคุณครูและอิจิกะก็เจอเรื่องวุ่นวายระหว่างทางอีกหลายๆ อย่าง แต่อิจิกะก็ปรับตัวและทำงาน#nได้อย่างยืดหยุ่น)"
1007702-77 = "(กว่าจะเสร็จสิ้นตารางงานทั้งหมดของชาเล่ต์ก็ปาเข้าไปช่วงเย็นเหมือนที่อิจิกะว่าไว้)"
1007702-79 = "ฮืม... ประมาณนี้ก็น่าจะเสร็จแล้วมั้ยนะ"
1007702-80 = "ทำได้ดีมากค่ะคุณครู! ถึงยังไงเราก็ทำงานเสร็จภายในวันนี้อยู่นะคะ?"
1007702-81 = "[s7] \"ต้องขอบใจอิจิกะเลยละ\"\n[s8] \"วันนี้อิจิกะช่วยครูไว้ได้เยอะเลย\""
1007702-84 = "...คะ? ฉันเหรอคะ?"
1007702-85 = "อะ... อ่า... ไม่หรอกค่ะ พูดอะไรแบบนี้อีกแล้ว ฉันเขินเป็นนะคะ..."
1007702-86 = "นี่เป็นงานที่แตกต่างจากงานปกติที่ทำ ฉันก็เลยรู้สึกแปลกใหม่และสบายใจด้วยค่ะ ถ้าเป็นงานแบบนี้ ฉันอาจจะทำได้อย่างเพลินๆ ดีก็ได้นะคะ"
1007702-87 = "เพราะงั้นถ้าหากว่า... ถ้าคุณครูไม่ว่าอะไรละก็~"
1007702-88 = "ต่อไปถ้าคุณครูแวะมาทำงานอีก หวังว่าฉันจะได้มาปกป้องคุณครูอีกนะคะ แหะๆ..."
1007702-89 = "...ตายจริง ฉันพูดเรื่องเหลวไหลอะไรออกไปอีกแล้ว"
1007702-90 = "งั้นฉันก็ควรไปส่งคุณครู..."
1007702-91 = "แล้วรีบไปทำงานที่เหลือของตัวเองแล้วละค่ะ"
1007702-92 = "...หืม?"
1007702-93 = "คะ? สงสัยว่าฉันยังมีงานค้างอยู่หรือเปล่าน่ะเหรอคะ? อ้อ ไม่มีอะไรมากหรอกค่ะ ก็แค่เรื่องที่เราเจอ#nระหว่างทำงานวันนี้น่ะ"
1007702-94 = "ก็อย่างที่ที่เหมือนจะเกิดการต่อสู้~ หรือความวุ่นวายต่างๆ ที่เจอวันนี้~ "
1007702-95 = "เพราะยังไงฉันก็เป็นสมาชิกชมรมทวงความยุติธรรม ก็เลยจะกลับไปตรวจตราดูน่ะค่ะว่าเกิดเรื่องใหญ่#nอะไรหรือเปล่า"
1007702-96 = "ไม่ใช่ว่าฉันลืมเรื่องพวกนี้ไปหรอกนะคะ แค่จัดลำดับความสำคัญให้งานของคุณครูก่อน งานของฉันรอได้ค่ะ"
1007702-97 = "...คะ?"
1007702-98 = "จะไปเป็นเพื่อนเหรอคะ...?"
1007702-102 = "หืม...? คะ? คุณครูเนี่ยนะคะ? ทำไมถึงจะไปด้วย...?"
1007702-103 = "นี่มันงานของฉันนะคะ..."
1007702-104 = "[s9] \"ไม่ต้องคิดมากนะ นี่ก็ถือเป็น 'งานของครู' เหมือนกัน\"\n[s10] \"ครูเป็นสาเหตุที่ต้องจัดลำดับความสำคัญงานใหม่ไง\""
1007702-107 = "อ่า... งะ... งั้นเหรอคะ? แปลกจัง ฉันคิดว่างานนี้กับงานนั้นมันคนละเรื่องกันเลยนะคะ..."
1007702-108 = "...ถ้าได้ไปด้วย คุณครูจะสบายใจ... งั้นเหรอคะ?"
1007702-109 = "อะ... อ่า... อืม... เอ่อ..."
1007702-110 = "......"
1007702-111 = "...อะฮะฮะฮะ..."
1007702-112 = "ก็ได้ค่ะ คุณครูพูดแบบนี้ทั้งที จะให้ฉันขัดไปหมดทุกอย่างก็คงจะดูไม่ดี"
1007702-113 = "แต่ฉันรู้สึกเหมือน...จะได้ประโยชน์อยู่ฝ่ายเดียวเลยแฮะ..."
1007702-114 = "...ฮิฮิ! งั้นไปให้สุดกันเลยค่ะ!"
1007702-115 = "แต่ว่าฉันขอทำอะไรเป็นการตอบแทนให้นะคะ"
1007702-116 = "กว่าจะเสร็จงานของฉันก็คงมืดค่ำแล้วเลย เอาเป็นว่าฉันจะไปส่งและช่วยคุ้มกันคุณครูถึงหน้าประตู#nสำนักงานเลยค่ะ"
1007702-117 = "ถ้าได้ทำแบบนั้น..."
1007702-118 = "ฉันก็คงจะสบายใจน่ะค่ะ"
1007702-120 = "(หลังจากนั้นอิจิกะก็ช่วยคุ้มกันคุณครูมาส่งที่ชาเล่ต์อย่างปลอดภัย)"

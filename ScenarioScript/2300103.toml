[translation]
2300103-1 = "เมนูวันนี้ของคุณฟูกะ"
2300103-2 = "มาแล้วเหรอคะคุณครู"
2300103-3 = "[s] \"ได้ข้อความก็มาเลยน่ะ\""
2300103-4 = "คือ... ฉันได้ยินข่าวเรื่องคุณครูมาด้วยนะคะ"
2300103-5 = "ได้ยินว่าคุณครูต้องอยู่ทำงานของทางชาเล่ต์จนดึกบ่อยๆ"
2300103-6 = "เพราะงั้นเลยกินข้าวไม่ค่อยตรงเวลาใช่มั้ยล่ะคะ?"
2300103-7 = "แบบนั้นไม่ได้นะคะ!"
2300103-8 = "คุณครูเป็นผู้ใหญ่แล้วนะคะ"
2300103-9 = "ถ้าเป็นผู้ใหญ่ล่ะก็ต้องดูแลสุขภาพของตัวเองให้ดีกว่านี้สิคะ!"
2300103-10 = "[s] \"บางครั้งพวกผู้ใหญ่ก็มีเรื่องที่ทำให้...\""
2300103-11 = "ไม่ต้องมาแก้ตัวเลยค่ะ ไม่ต้องเลยค่ะ!"
2300103-12 = "สถานการณ์เร่งด่วนสุดๆ แถมเป็นสถานการณ์พิเศษที่หัวหน้าชมรมโภชนาการต้องลงมือเอง...!"
2300103-13 = "นี่เป็นเหตุผลที่เราไปซื้อของเมื่อวานยังไงล่ะคะ"
2300103-14 = "[s] \"เราไม่ได้ไปซื้อของสำหรับใช้ในโรงอาหารหรอกเหรอ?\""
2300103-15 = "เรื่องโรงอาหารสำคัญก็จริงแต่นั่นก็แค่เหตุผลรองค่ะ"
2300103-16 = "ตอนนี้การดูแลเรื่องอาหารของคุณครูเป็นภารกิจสำคัญที่สุดของทางชมรมโภชนาการค่ะ!"
2300103-17 = "อาหารคือแหล่งพลังงานสำคัญของร่างกายเรานะคะ เพราะงั้นการกินอาหารที่ดีต่อสุขภาพ#nจึงเป็นเรื่องสำคัญมากค่ะ!"
2300103-18 = "เพราะงั้นอาหารที่ฉันจะเสิร์ฟให้คุณครูในวันนี้ก็คือ..."
2300103-20 = "ไคเซกิคอร์ส 18 จานของชมรมโภชนาการ สถาบันเกเฮนน่า!"
2300103-21 = "เตรียมตัวให้ดีนะคะคุณครู!"
2300103-23 = "เริ่มจากอาหารเรียกน้ำย่อยก่อน"
2300103-24 = "อาหารที่ทำจากการนำถั่วแดงบดผสมเต้าหู้มาปรุงในซุปมิโซะขาว"
2300103-25 = "[s1] \"อื้ม เต้าหู้อร่อยสุดยอด....!\"\n[s2] \"มิโซะขาวกับถั่วแดงบดนี่เข้ากันได้ดีมากเลย!\""
2300103-26 = "ฮุฮุฮุ ฮี่ๆ! ถ้างั้นเมนูต่อไป...."
2300103-27 = "ฮุฮุฮุ ฮี่ๆ! ถ้างั้นเมนูต่อไป...."
2300103-30 = "ต่อไปเป็นเมนูเกี๊ยวน้ำที่ปรุงจากน้ำซุปหอยค่ะ"
2300103-31 = "กินในตอนที่ยังร้อนๆ นะคะ!"
2300103-32 = "[s3] \"อื้ม น้ำซุปอร่อยมาก...!\"\n[s4] \"กลิ่นหอมสดชื่นของอาหารทะเลกับกุ้งเข้ากันได้อย่างดีเลยนะ\""
2300103-33 = "อย่าเพิ่งอึ้งนะคะ เมนูต่อไป..."
2300103-34 = "อย่าเพิ่งอึ้งนะคะ เมนูต่อไป..."
2300103-37 = "ต่อไปคือจานนี้!"
2300103-39 = "ลองจานนี้ด้วยสิคะ!"
2300103-41 = "ลองจานนี้ด้วยค่ะ จานนี้ด้วยนะคะ! คุณครู!"
2300103-43 = "(สุดท้ายคุณครูก็กินอาหารที่ฟูกะทำมาทั้ง 18 จานจนหมด)"
2300103-45 = "คุณครูคะ? สีหน้าคุณครูดูไม่ดีเลย..."
2300103-46 = "[s] \"อึ่ก... ท้องครู...\""
2300103-47 = "คะ? ท้องเหรอคะ?"
2300103-48 = "ท้องเป็นอะไรเหรอคะ?"
2300103-51 = "คะ... คุณครูคะ?"
2300103-53 = "(หลังจากนั้นคุณครูก็ได้รับยาช่วยย่อยอาหารจากห้องพยาบาลมาเป็นจำนวนมาก)"

[translation]
2300103-1 = "Fuuka's Meal of the Day"
2300103-2 = "You're here, Sensei."
2300103-3 = "[s] \"Well, yeah. I did receive your text.\""
2300103-4 = "I just so happen...to have heard some gossip about you recently."
2300103-5 = "I heard Schale keeps you busy all day and all night."
2300103-6 = "So much so that you rarely eat your meals on time. Is that true?"
2300103-7 = "Bad, Sensei! Bad!"
2300103-8 = "You're already an adult. "
2300103-9 = "Someone your age needs to start taking their health more seriously!"
2300103-10 = "[s] \"Being an adult also means making sacri—\""
2300103-11 = "Enough! No excuses!"
2300103-12 = "The situation has gone critical. This calls for the attention of the School Lunch Club president!"
2300103-13 = "In fact, it's the reason we went grocery shopping yesterday."
2300103-14 = "[s] \"I thought you were buying groceries for the dining hall.\""
2300103-15 = "I was, but getting food for the dining hall was my second objective. "
2300103-16 = "Improving your diet is a top priority for the School Lunch Club!"
2300103-17 = "Rice is the cornerstone to a nutritious meal, and nutrition is the key to good health!"
2300103-18 = "Which brings us to today's meal."
2300103-20 = "An 18-course meal, Gehenna School Lunch Club style!"
2300103-21 = "I hope you're ready, Sensei!"
2300103-23 = "Let's start with the appetizers."
2300103-24 = "This is made by mashing red beans and tofu into a white soy paste."
2300103-25 = "[s1] \"Mmm. I can really taste the tofu!\"\n[s2] \"The combination of soybean paste and red beans is amazing!\""
2300103-26 = "Heeheehee! Next up is..."
2300103-27 = "Heeheehee! Next up is..."
2300103-30 = "...wonton soup with clam stock."
2300103-31 = "Slurp it down while it's hot!"
2300103-32 = "[s3] \"Mmm. This soup is amazing!\"\n[s4] \"The clams and shrimp give it a great seafood flavor!\""
2300103-33 = "You haven't tasted anything yet. Next up is..."
2300103-34 = "You haven't tasted anything yet. Next up is..."
2300103-37 = "This one's up next!"
2300103-39 = "Now try this one!"
2300103-41 = "This dish too, Sensei!"
2300103-43 = "(I eventually tasted all 18 dishes Fuuka served me.)"
2300103-45 = "Sensei? You don't look so good..."
2300103-46 = "[s] \"Urgh. M-My stomach...\""
2300103-47 = "Huh? Your stomach? "
2300103-48 = "What about your stomach?"
2300103-51 = "S-Sensei?!"
2300103-53 = "(After that, I was pumped full of digestive medicine at the Gehenna nurse's office.)"

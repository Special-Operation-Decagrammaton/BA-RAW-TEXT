2300103-1 = "#title;후우카 씨의 오늘의 밥상"
2300103-2 = "3;후우카;00;와주셨군요. 선생님.\n#3;greeting\n#3;em;[음표]\n#3;a"
2300103-3 = "[s] \"문자를 받고 오긴 했는데 말이야.\""
2300103-4 = "3;후우카;99;저……. 최근에 이야기를 들었어요.\n#3;em;…"
2300103-5 = "3;후우카;01;선생님이 살레의 업무 때문에 밤낮으로 바쁘단 이야기를요."
2300103-6 = "3;후우카;02;그래서 밥도 제때 챙겨 드시지 못한다면서요?\n#3;em;[반응]"
2300103-7 = "3;후우카;05;그러면 안 돼요! \n#3;em;[!]\n#3;jump"
2300103-8 = "3;후우카;08;선생님은 어른이시잖아요?"
2300103-9 = "3;후우카;05;어른이라면 더 착실하게 건강을 챙기셔야죠!\n#3;hophop"
2300103-10 = "[s] \"거기엔 어른의 사정이라는 게…….\""
2300103-11 = "3;후우카;05;변명은 떽. 됐습니다!\n#3;em;[!]\n#3;jump"
2300103-12 = "3;후우카;08;이건 긴급사태예요. 급양부 부장이 나서야 할 특별 사안……!\n#3;em;[반응]"
2300103-13 = "3;후우카;99;그렇지 않아도 어제 장을 본 건 바로 오늘을 위해서였어요."
2300103-14 = "[s] \"학생식당 식료품을 사려던 거 아니었어?\""
2300103-15 = "3;후우카;01;겸사겸사라는 거예요. 학생식당도 중요하지만."
2300103-16 = "3;후우카;00;선생님의 식단 개선도 급양부에겐 최우선 선결과제이니까요!\n#3;em;[반짝]\n#3;greeting"
2300103-17 = "3;후우카;03;사람의 힘은 어디까지나 밥에서 나오는 법. 든든하게 챙겨 먹어야 탈이 나지 않는 법이에요!\n#3;em;[재잘]"
2300103-18 = "3;후우카;99;그런 의미에서 오늘 대접해드릴 요리는 바로."
2300103-19 = "3;후우카;99\n#3;d\n#wait;1000"
2300103-20 = "3;후우카;01;게헨나 급양부식 가이세키 18선!\n#3;greeting\n#3;closeup"

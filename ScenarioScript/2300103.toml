[translation]
2300103-1 = "風華同學今日的餐桌"
2300103-2 = "您來了啊，老師。"
2300103-3 = "[s]「我收到訊息就來了，然後……」"
2300103-4 = "那個……我最近有聽說。"
2300103-5 = "老師因為夏萊的工作，不分晝夜地忙個不停。"
2300103-6 = "也因此甚至沒辦法好好吃飯。"
2300103-7 = "那可不行！ "
2300103-8 = "老師是大人了吧？"
2300103-9 = "身為大人就該更確實照顧自己的身體健康啊！"
2300103-10 = "[s]「那是因為大人有大人的難處……」"
2300103-11 = "夠了，不要辯解！"
2300103-12 = "這是緊急狀況，必須由我這個供給部部長親自出面……！"
2300103-13 = "其實，昨天去買菜就是為了今天。"
2300103-14 = "[s]「你昨天買的不是學生餐廳的食材嗎？」"
2300103-15 = "那只是順便。雖然學生餐廳也很重要。"
2300103-16 = "但改善老師的飲食生活，是供給部最優先的工作。"
2300103-17 = "人的活力基本上來自進食。要好好吃飯，才不會對健康造成影響！"
2300103-18 = "所以，我今天準備的料理是……"
2300103-20 = "格黑娜供給部特製，宴席料理十八道！"
2300103-21 = "那麼請做好覺悟吧。老師！"
2300103-23 = "首先是前菜。"
2300103-24 = "在白味噌，加入紅豆、豆腐並攪拌所製成的。"
2300103-25 = "[s1]「嗯，這個豆腐很好吃……！」\n[s2]「白味噌的風味和紅豆簡直是絕配！」"
2300103-26 = "呵呵，呵呵呵！……那麼下一道料理……"
2300103-27 = "呵呵，呵呵呵！……那麼下一道料理……"
2300103-30 = "這是使用了蛤蜊湯頭的餛飩湯。"
2300103-31 = "請趁熱一口喝下去吧！"
2300103-32 = "[s3]「嗯，湯也好喝……！」\n[s4]「蛤蜊和鮮蝦帶出了非常濃郁海鮮風味！」"
2300103-33 = "要驚訝還太早囉。下一道料理……"
2300103-34 = "要驚訝還太早囉。下一道料理……"
2300103-37 = "這次是這個！"
2300103-39 = "這次是這個料理！"
2300103-41 = "來，這次請嚐嚐這個吧。老師！"
2300103-43 = "（就這樣，我嚐遍了風華端上的18道料理）"
2300103-45 = "老師？您的臉色好像不太好……"
2300103-46 = "[s]「呃呃呃，肚，肚子……」"
2300103-47 = "咦？肚子？"
2300103-48 = "肚子怎麼了嗎？"
2300103-51 = "老，老師！？"
2300103-53 = "（之後，格黑娜的保健室開了一堆胃藥給我）"

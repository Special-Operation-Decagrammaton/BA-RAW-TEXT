[translation]
42200-1 = "第20話;卡班諾的洞窟（１）"
42200-2 = "飛彈發射井．控制室"
42200-5 = "「……兔子中陷阱了」"
42200-6 = "FOX1，開始作戰。#n各小隊員請死守位置，隨時回報情況。"
42200-10 = "這裡是FOX4。在Alpha地點發現一架敵方無人機，已將其擊落。"
42200-11 = "本來還擔心他會不會突然衝進來呢……都子小隊長做事果然很慎重。而且相當認真。"
42200-12 = "不過，在那之後就沒有任何動靜了。"
42200-13 = "是不是在思考什麼有趣的戰術呢？"
42200-14 = "FOX4，別放鬆警戒。#n雖說是一年級，對方同樣是SRT。"
42200-15 = "了解～"
42200-16 = "剛才的狙擊可能會讓位置被發現，我先換個地點再聯絡哦。"
42200-20 = "這裡是FOX3，正在Lima地點──通往控制室的中央電梯入口附近待命。"
42200-21 = "前方由於欄杆而相當狹窄，我一個人應該也沒問題。"
42200-22 = "就算他們運氣好躲過了狙擊，我也不會讓他們通過我的盾牌。"
42200-23 = "等等，FOX3。#n那句話我可不能裝做沒聽見。"
42200-24 = "你真心認為我沒辦法射中跑在狹窄通道內的標靶？"
42200-25 = "我不是在懷疑你的技術，不過RABBIT小隊員有可能幾個人突然一起衝出來不是嗎？"
42200-26 = "如果你的狙擊槍是雙管的，那就不好說了。"
42200-27 = "哦，這個主意其實挺不錯的嘛？"
42200-29 = "FOX4請以支援FOX3為優先，專注於阻止敵人行動。"
42200-30 = "敵方也清楚我們有狙擊手。勢必會在擬定好對策後突入。"
42200-31 = "……最壞的情況，也可能會利用我們始料未及的路線進行迂迴。"
42200-33 = "特殊戰的基本就是在時刻變化的戰場中控制變數，並維持實質上的優勢。"
42200-34 = "就算只從地利優勢及裝備性能來看，也是我方的戰鬥力佔上風。#n只要能妥善應對變數，作戰勢必會成功。"
42200-36 = "……有道理。"
42200-37 = "畢竟雪乃……不，FOX1說的話一直都是正確的。"
42200-38 = "正因如此，我們才會相信並聽從你的命令不是嗎？"
42200-40 = "既然都明白了，閒聊就到此為止吧。#n馬上就到[ruby=作戰開始時刻]H-Hour[/ruby]了。"
42200-46 = "這裡是FOX2，已將通往控制室的中央電梯的遠距操控模式切換為離線狀態了唷。"
42200-47 = "這樣一來，無論萌醬用什麼方法都無法駭入了。"
42200-48 = "……不過這樣會不會做得太過火了？#n就算是我們的後輩，我也不認為他們能到達這裡……"
42200-49 = "有備無患。身為特殊部隊員，在任何時刻都必須設想到最壞的情況。"
42200-50 = "…………"
42200-51 = "雪乃醬……"
42200-52 = "不，FOX1認為我們有可能會輸給RABBIT小隊嗎？"
42200-53 = "……並非不可能。"
42200-57 = "萬一……連FOX2也戰敗導致遭到突破……"
42200-58 = "請所有人先返回地面，等待下一道命令。"
42200-63 = "咦？不是應該跟FOX1會合一起應戰嗎？"
42200-64 = "就算處於失去戰力的狀態，只要多少能行動的話，在後方支援也──"
42200-66 = "不，如果讓敵方深入控制室，那麼事實上作戰就已經失敗了。"
42200-67 = "為了能盡速撤離，希望你們先行確保回到地面的退路。"
42200-69 = "是這麼說沒錯，可是……"
42200-70 = "既然隊長都這麼說了……肯定是有什麼打算的吧。"
42200-72 = "FOX1，難道……"
42200-74 = "……這是命令，仁子。"
42200-75 = "那怕只有這次也好，希望你不要過問。"
42200-81 = "……了解。"
42200-84 = "本次作戰的目標是奪取被運送至本發射井的「A.N.T.I.O.C.H.」空爆燃燒彈，#n抑或是使其無力化進而阻止引爆。"
42200-85 = "目前彈頭已經裝填至發射井中，後續的所有操作都將在位於下層的控制室中進行。"
42200-86 = "因此，為了將彈頭無力化，首先必須得設法壓制控制室……"
42200-92 = "……位置比想像中還深啊。"
42200-94 = "是的。控制室位於發射井的最深處，所以需要藉由中央電梯移動。"
42200-95 = "此外，通往電梯的路徑上缺乏掩蔽物……#n不只是路線單一，更會直接暴露在狙擊手的視野當中。"
42200-96 = "這裡的狙擊地點太多了……要找出位置也不太容易。"
42200-97 = "照理來說，應該先找出並制伏敵方狙擊手比較安全……#n但是現在距離彈頭引爆沒剩多少時間了。"
42200-98 = "……因此為了不給敵方喘息的機會，將以所有隊員嘗試奇襲。"
42200-99 = "行動時要像風一樣迅速，攻擊時要像火一樣猛烈。#n是兵法的基礎吧。"
42200-100 = "有具體的注意事項嗎？"
42200-104 = "嗯……敵方在Lima地點埋伏的可能性很高。"
42200-105 = "請RABBIT2在擊倒對方後，控制住中央電梯的控制台。"
42200-106 = "接著請RABBIT3在確保控制台後立即嘗試駭入，以取得電梯的操控權限。"
42200-108 = "沒問題，交給我吧！"
42200-109 = "我，我該做什麼好呢……？"
42200-111 = "至於RABBIT4……"
42200-112 = "請先躲藏在外圍階梯的狙擊點，一旦敵方狙擊手向我方先鋒射擊……#n就以距離和方位推算出敵方位置並進行反向狙擊。"
42200-113 = "要反推狙擊方位和距離是沒問題……"
42200-114 = "不過要是咲希醬因為狙擊受傷該怎麼辦……？"
42200-115 = "不用擔心。要是害怕子彈怎麼能擔任先鋒呢？"
42200-116 = "這頂鋼盔和防彈衣就是為了這種時候準備的，放心吧！"
42200-117 = "我，我知道了……！"
42200-119 = "唔嗯～作戰的內容是知道了……不過萬一失敗的時候有沒有B計畫呢？"
42200-120 = "例如咲希被敵人制服，或是我駭入失敗，抑或是美優沒能反向狙擊敵人的話，#n作戰就沒辦法成功了唷？"
42200-125 = "我……沒有準備備案。"
42200-126 = "嗯？什麼意思？"
42200-127 = "大家是我指揮的[ruby=RABBIT小隊]最強小隊[/ruby]。"
42200-128 = "我們是無比敏捷、強大且能隱密行動的特殊部隊──#n我實在無法想像我們會在特殊戰中落敗。"
42200-130 = "因此，希望各位能夠相信彼此──以成功為前提執行作戰。"
42200-131 = "……我也相信著大家。"
42200-133 = "……這真是都子策畫的作戰中最亂來的作戰啊。"
42200-134 = "聽，聽起來有那麼沒道理嗎……？"
42200-135 = "嘛，不過──誰叫這是我們隊長的命令呢？"
42200-139 = "RABBIT2，遵命。"
42200-140 = "……萌、美優，後方支援就交給你們了。"
42200-143 = "交給我吧！"
42200-148 = "那麼……突擊，開始！"

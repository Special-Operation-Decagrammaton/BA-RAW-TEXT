[translation]
42200-1 = "第20話;カルバノグの洞窟（１）"
42200-2 = "サイロ・オペレーションルーム"
42200-5 = "「……ウサギが罠にかかった」"
42200-6 = "FOX1、作戦を開始する。#n各小隊員は位置を死守し、都度状況を報告せよ。"
42200-10 = "こちらFOX4。ポイントアルファで敵ドローン1機を観測、撃墜。"
42200-11 = "いきなり突っ込んで来るかなって心配したけど……さすがミヤコ小隊長は慎重だね。気合が入ってる。"
42200-12 = "ただ、その後はこれといった動きはないね。"
42200-13 = "なにか面白い事でも考えてるのかな？"
42200-14 = "FOX4、緊張を緩めないように。#n1年生とはいえ、相手もSRTだ。"
42200-15 = "りょーかい。"
42200-16 = "さっきの射撃で位置が特定されたかもしれないから、#n場所を移してから、また連絡するね。"
42200-20 = "こちらFOX3、現在ポイントリマ――オペレーションルームに向かう中央エレベーターの入口付近で待機中。"
42200-21 = "この先は手すりで狭くなっているから、私一人で大丈夫そうよ。"
42200-22 = "運良く狙撃を避けたとしても、私の盾を素通りさせはしないわ。"
42200-23 = "待って、FOX3。それは聞き捨てならないなぁ。"
42200-24 = "私が狭い通路を走る標的を当てられないと、本気で思ってるの？"
42200-25 = "別にあんたの腕前を疑ってるわけじゃないけど、#nRABBIT小隊員が、急に複数人で飛び出してくることもあり得るでしょ？"
42200-26 = "あんたの狙撃銃がダブルバレルだったら、考えてあげなくもないけど。"
42200-27 = "お、それ結構いいアイデアじゃない？"
42200-29 = "FOX4は、FOX3のバックアップを優先して敵の足止めに専念するように。"
42200-30 = "相手も狙撃がある事を把握している。対策を講じて突入するはずだ。"
42200-31 = "……最悪の場合、我々の意表をついて進路を迂回する可能性もある。"
42200-33 = "特殊戦の基本は、変化し続ける戦場で変数をコントロールし、#n数的優位を保つこと。"
42200-34 = "地理的な利点や装備の性能だけでも、こちらの戦闘力が相手より勝っている。#n変数さえうまく対処できれば、作戦成功は固い。"
42200-36 = "……正論だね。"
42200-37 = "まあ、ユキノ……いえ、FOX1はいつだって正しい事しか言わないわよ。"
42200-38 = "だからこそ、信じて命令に従うことができるわけだし？"
42200-40 = "理解したのなら、私語はこれまで。#nさあ、すぐに[ruby=作戦開始時間]H-Hour[/ruby]だ。"
42200-46 = "こちらFOX2、オペレーションルームに向かう中央エレベーターの遠隔制御モードをオフラインに切り替えたよ。"
42200-47 = "こうしておいたら、モエちゃんがどんな手を使ってもハッキングできないからね。"
42200-48 = "……でもやっぱり、これはちょっとやりすぎかな？#nいくら私たちの後輩とはいえ、ここまで来ることはないと思うけど……"
42200-49 = "備えあれば憂いなし、特殊部隊員ならどんな時も最悪の事態を想定して動くものだ。"
42200-50 = "………。"
42200-51 = "ユキノちゃん……"
42200-52 = "ううん、FOX1は私たちがRABBIT小隊に負けるかもしれないと思ってるの？"
42200-53 = "……この世に絶対はない以上、あり得ないことではない。"
42200-57 = "万が一……FOX2も敗れて突破され[ruby=あかつき]た暁に[/ruby]は。"
42200-58 = "全員地上に出て、次の命令を待つように。"
42200-63 = "あれ？FOX1と合流して応戦するんじゃなかったの？"
42200-64 = "戦力を失った状態とはいえ、少しでも動けるなら後方で支援したほうが――"
42200-66 = "いや、オペレーションルームまで敵の接近を許可したなら、事実上作戦失敗に他ならない。"
42200-67 = "早めに退出できるよう、地上に出て退路を確保しておいてほしい。"
42200-69 = "それはそうだけど……"
42200-70 = "隊長がそう言うくらいだし……何か思うところがあるみたいだね。"
42200-72 = "FOX1、ひょっとして……"
42200-74 = "……命令だよ、ニコ。"
42200-75 = "これだけは、理由を聞かないでほしい。"
42200-81 = "……了解。"
42200-84 = "今回の作戦の目標は、このサイロに持ち込まれた<A.N.T.I.O.C.H.>サーモバリック弾を奪取または無力化し、起爆を阻止することです。"
42200-85 = "現在、弾頭はすでにサイロに装着されており、すべての操作は施設の下層にあるオペレーションルームで行われています。"
42200-86 = "弾頭を無力化するには、まずオペレーションルームを制圧しないといけないのですが……"
42200-92 = "……思ったより深いところにあるな。"
42200-94 = "はい。オペレーションルームはサイロの最深部に位置していますので、中央エレベーターで移動する必要があります。"
42200-95 = "それと、エレベーターまでの道のりには遮蔽物がなく……進路が固定されている上に、開けた場所なので狙撃手の目にそのまま晒されます。"
42200-96 = "ここは狙撃ポイントが多すぎる……位置を特定するのも、難しそう。"
42200-97 = "本来であれば、先に狙撃手を無力化した上で進入するのが安全なのですが……弾頭の起爆まで残された[ruby=ゆうよ]猶予[/ruby]はあとわずか。"
42200-98 = "……よって、敵に余裕を与えないためにも、全隊員で奇襲を試みます。"
42200-99 = "動く時は風のように素早く、敵を撃つ時は火のように苛烈に。#n兵法の基本だな。"
42200-100 = "具体的に注意するポイントは？"
42200-104 = "そうですね……こちらのポイントリマに敵が待ち伏せしている可能性が高いです。"
42200-105 = "RABBIT2は敵の無力化後、中央エレベーターの制御コンソールを確保してください。"
42200-106 = "続いてRABBIT3は、制御コンソールが確保され次第、ハッキングを試みてエレベーターの管制権限を確保してください。"
42200-108 = "問題ないよ。まっかせて～"
42200-109 = "わ、私は何をすればいいかな……？"
42200-111 = "RABBIT4は……"
42200-112 = "外郭階段の狙撃ポイントに身を隠し、狙撃手がポイントマンに向かって射撃したら……距離と方角を逆算の上、逆狙撃をお願いします。"
42200-113 = "狙撃点の方角と距離を逆算するのは大丈夫だけど……"
42200-114 = "その狙撃でサキちゃんが怪我しちゃったらどうしよう……？"
42200-115 = "大丈夫だ。弾丸を恐れていたらポイントマンなんか務まらないからな。"
42200-116 = "この鉄帽と防弾チョッキはそういう時のためのものだ。心配するな！"
42200-117 = "わ、わかった……！"
42200-119 = "う～ん、作戦はわかったけど……万が一失敗した場合のプランBはないの？"
42200-120 = "サキが制圧されたり、私がハッキングに失敗したり、ミユが逆狙撃に失敗したりした場合、作戦が成立しなくなっちゃうよ？"
42200-125 = "代案は……用意していません。"
42200-126 = "え？どういうこと？"
42200-127 = "皆さんは、私が指揮する[ruby=RABBIT小隊]最強の小隊[/ruby]です。"
42200-128 = "誰よりも素早く、強く、隠密が可能な特殊部隊だからこそ――特殊戦で負けることなど、想像もできません。"
42200-130 = "ですので、お互いを信じて――全員で成功するという前提で、作戦に臨んでほしいです。"
42200-131 = "……私も、皆さんを信じていますから。"
42200-133 = "……ミヤコの立てたヤツの中で、一番アホみたいな作戦だな。"
42200-134 = "そ、そんなに屁理屈っぽく聞こえましたか……？"
42200-135 = "まぁ、でも――私たちの隊長の命令だろ？"
42200-139 = "RABBIT2、命令を遂行する。"
42200-140 = "……モエ、ミユ。後方支援を頼んだ。"
42200-143 = "任せて！"
42200-148 = "それじゃあ……突入、開始！"

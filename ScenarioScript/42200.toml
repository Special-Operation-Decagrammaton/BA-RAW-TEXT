[translation]
42200-1 = "Episode 20; Caerbannog's Cave 1"
42200-2 = "Silo Operation Room"
42200-5 = "...The rabbit has walked into the snare."
42200-6 = "FOX 1. Commencing operation. All units, maintain positions and report."
42200-10 = "This is FOX 4.  I just downed a drone near Alpha."
42200-11 = "I was worried for a second they were going to charge in guns blazing... Glad Miyako's not a dummy."
42200-12 = "They've been twiddling their thumbs since then though."
42200-13 = "What's their play here?"
42200-14 = "Keep your eyes peeled, FOX 4. They might be rookies, but they're still SRT."
42200-15 = "Copy."
42200-16 = "I'm compromised after that shot. Will reposition and report."
42200-20 = "This is FOX 3. Currently at point Lima. I'm covering the central elevator right now."
42200-21 = "Their entrance is funneled by the guardrails, so I've got this choke point under control."
42200-22 = "Even if they luck out and dodge a shot, they can't just ignore my shield and run through."
42200-23 = "FOX 3. I've got a problem with what you said actually."
42200-24 = "\"Dodge a shot\"? You think they're gonna dodge one of MY shots?"
42200-25 = "I trust you so much I'd run into the battlefield blindfolded if you had my back. But what if they try to burst?"
42200-26 = "I'd be less concerned if your gun had four barrels..."
42200-27 = "Huh... A quad-barrel rifle would actually make it a breeze, huh?"
42200-29 = "FOX 4, back up FOX 3. Pin those targets down."
42200-30 = "They know Otogi is watching them now. I expect Miyako is trying to figure out how to circumvent her right now."
42200-31 = "Worst case, they catch us off guard and find a way to avoid us altogether."
42200-33 = "The crux of spec-ops is managing the unpredictable and capitalizing on our strategic advantages."
42200-34 = "We have the upper hand right now. Given our positional and gear advantage, as long as we respond flexibly as the battle unfolds, our operation should be a success."
42200-36 = "That's our Yukino."
42200-37 = "Not like it's a surprise. No one plans an op better than our leader!"
42200-38 = "...It'll always be to hell and back again, for the FOX Squad."
42200-40 = "Focus, everyone. It won't be much longer now."
42200-46 = "FOX 2 reporting in. I've turned the remote control for the central elevator offline."
42200-47 = "If it's offline, Moe can't hack it to control the elevator no matter what tricks she tries."
42200-48 = "Am I overdoing it? I have a lot of faith in our juniors, but I don't know if they'd make it this far..."
42200-49 = "You're not. It's like I always say. Worst case scenario."
42200-50 = "..."
42200-51 = "Yukino..."
42200-52 = "Do you really think they could do it? Beat us?"
42200-53 = "It's within the realm of possibility."
42200-57 = "If they do push through FOX 2 to the center..."
42200-58 = "...rendezvous on ground level and await orders."
42200-63 = "Huh? Should we regroup with you, FOX 1?"
42200-64 = "Even if we're compromised, we can back up and provide support from the rear..."
42200-66 = "No. If they take the operations room, we've failed."
42200-67 = "If they push through, secure an escape route for a quick retreat."
42200-69 = "I can see the logic, but..."
42200-70 = "Kurumi. I'm sure she has her reasons."
42200-72 = "FOX 1, you can't be..."
42200-74 = "That was an order, Niko."
42200-75 = "SRT doesn't question orders."
42200-81 = "...Copy."
42200-84 = "Our mission: Either retrieve or disarm the A.N.T.I.O.C.H. thermobaric warhead to prevent FOX Squad from detonating it."
42200-85 = "The warhead is being held in the silo, but the detonation will be triggered from inside the operations room below."
42200-86 = "To disarm the warhead, we need to take the operations room."
42200-92 = "Easier said than done..."
42200-94 = "She's right. The operations room is deep within the silo, so the only way to access it is through the central elevator."
42200-95 = "To make matters worse, it's all open air from here to the elevator. Otogi will have a field day."
42200-96 = "I've already counted 13 good hiding spots... She could be anywhere."
42200-97 = "Normally, we'd take out the sniper then proceed, but we don't have much time until the detonation."
42200-98 = "So we'll have to take a full force assault. Don't give them a second to think."
42200-99 = "Yukino has that battlefield managed down to the millimeter, so the only way we'll win is if we pressure them enough to make a mistake. We'll have to burst in hard and fast."
42200-100 = "Anything else?"
42200-104 = "Yes, here. I would wager an enemy unit is stationed at point Lima. "
42200-105 = "RABBIT 2, neutralize that unit, secure the central elevator's controls."
42200-106 = "RABBIT 3, hack the elevator as soon as you get the clear."
42200-108 = "It'll be a snap."
42200-109 = "What about me?"
42200-111 = "RABBIT 4..."
42200-112 = "Take cover here, on the outer stairs. Wait for RABBIT 2 to bait out the sniper's shot and triangulate their position."
42200-113 = "I can do that no problem, but..."
42200-114 = "But won't Saki get hurt?"
42200-115 = "Hahaha! I'm your point woman, RABBIT 4! This is what I'm made for."
42200-116 = "And look at this helmet and ballistic armor. Even if I do get hit, it'll be like being knocked by a feather!"
42200-117 = "O-Okay!"
42200-119 = "That's all fine and dandy, but what's our Plan B?"
42200-120 = "If Saki goes down, if I fail hacking the elevator, or if Miyu doesn't locate the sniper in time... What do we do?"
42200-125 = "There's no Plan B."
42200-126 = "What? Why?"
42200-127 = "We don't need one. You are all members under my leadership, of the RABBIT Squad."
42200-128 = "How would the fastest, strongest, and most dedicated special forces squad I've ever met lose?"
42200-130 = "So trust each other, and execute the site knowing that you'll succeed."
42200-131 = "...Because I believe in every one of you."
42200-133 = "Oh, geez, Miyako. Of all of your harebrained schemes, this one really takes the cake."
42200-134 = "Did I not deliver it well? Oh no, the speech was too much, wasn't it?"
42200-135 = "Well, harebrained or not, my squad leader's given me an order."
42200-139 = "RABBIT 2, copy that."
42200-140 = "Moe, Miyu... Cover my six, will you?"
42200-143 = "Let's go!"
42200-148 = "Then... commence operation!"

[translation]
42200-1 = "ตอนที่ 20;ในถ้ำแคร์บาน็อก 1"
42200-2 = "ห้องปฏิบัติการไซโล"
42200-5 = "'...กระต่ายแตะต้องกับดักแล้ว'"
42200-6 = "FOX 1 เริ่มปฏิบัติการ ให้สมาชิกแต่ละคนประจำตำแหน่งและรายงานสถานการณ์"
42200-10 = "นี่คือ FOX 4 พบโดรนของศัตรู 1 เครื่องในจุดอัลฟ่าและยิงตกไปแล้ว"
42200-11 = "ที่จริงฉันกลัวว่าเราจะโดนโจมตีทันทีด้วย... แต่หัวหน้ากองมิยาโกะของเราก็รอบคอบเหมือนเคย พลังกายพลังใจมาเต็มเปี่ยมเลยละ"
42200-12 = "แต่หลังจากนั้นก็ไม่เห็นการเคลื่อนไหวอะไรเลยแฮะ"
42200-13 = "หรือพวกนั้นจะรอใช้ไม้เด็ดสนุกๆ อะไรอยู่นะ?"
42200-14 = "FOX 4 อย่าชิลเกินนะ ถึงอีกฝ่ายจะอยู่ชั้นปีที่ 1 แต่ก็เป็น SRT อยู่ดี"
42200-15 = "เข้าใจแล้ว"
42200-16 = "เราอาจโดนเผยตำแหน่งจากพิกัดที่ลอบยิงไปเมื่อกี้ เพราะงั้นฉันจะเปลี่ยนจุดซุ่มโจมตีแล้วให้สัญญาณ#nอีกครั้งนะ"
42200-20 = "นี่คือ FOX 3 รายงานจากจุดลิม่า ฉันกำลังซ่อนตัวสแตนด์บายอยู่แถวๆ ทางเข้าลิฟต์กลางที่มุ่งไปยัง#nห้องปฏิบัติการ"
42200-21 = "ข้างหน้านี้เป็นราวเหล็กแคบๆ ฉันคนเดียวน่าจะต้านทานได้อยู่"
42200-22 = "ต่อให้โชคช่วยจนไม่ถูกยิง แต่ก็ฝ่าโล่ของฉันไปไม่ได้หรอก"
42200-23 = "เดี๋ยวก่อน FOX 3 ฉันปล่อยผ่านที่เธอพูดไม่ได้หรอกนะ"
42200-24 = "เธอคิดว่าฉันจะยิงเป้าหมายที่วิ่งผ่านช่องทางแคบๆ ไม่โดนงั้นเหรอ?"
42200-25 = "ก็ไม่ได้ข้องใจในฝีมือการลอบยิงของเธอหรอกนะ แต่ศัตรูอาจจะวิ่งออกมาพร้อมกันหลายคนก็ได้นี่?"
42200-26 = "ถ้าปืนสไนเปอร์ของเธอมี 4 ลำกล้องก็ว่าไปอย่าง"
42200-27 = "โอ๊ะ เป็นความคิดที่ไม่เลวเลยนะ"
42200-29 = "ให้ FOX 4 สนับสนุน FOX 3 และโฟกัสในการจับตัวศัตรู "
42200-30 = "ถ้าฝ่ายตรงข้ามรู้ว่ามีการลอบยิง ก็น่าจะเตรียมแผนรับมือการลอบยิงและพยายามบุกเข้ามา"
42200-31 = "... กรณีที่เลวร้ายที่สุด พวกนั้นอาจจะอ้อมไปทางอื่นด้วยวิธีแหวกแนวก็ได้"
42200-33 = "พื้นฐานของการสู้รบพิเศษ คือการควบคุมตัวแปรและคงความเหนือกว่าในเชิงคุณภาพให้ได้ในสภาพ#nแวดล้อมของสนามรบที่เปลี่ยนไปอยู่เรื่อยๆ"
42200-34 = "ถ้ามองจากข้อได้เปรียบทางภูมิศาสตร์กับประสิทธิภาพของอาวุธแล้ว ทางเรายังเป็นต่อฝ่ายตรงข้ามอยู่ ขอแค่รับมือกับตัวแปรที่ไม่คาดคิดได้ ปฏิบัติการครั้งนี้ก็น่าจะสำเร็จได้ไม่ยาก"
42200-36 = "... ก็สมเหตุสมผลดีนะ"
42200-37 = "แต่ก็นะ ที่ผ่านมายูกิโนะ... ไม่สิ... FOX 1 พูดแต่สิ่งที่ถูกต้องเสมอนี่นา"
42200-38 = "เพราะแบบนี้ไงเราถึงเชื่อใจและทำตามคำสั่งได้"
42200-40 = "ถ้าเข้าใจกันแล้วก็หยุดพูดเรื่องส่วนตัวเถอะ อีกไม่นานก็ใกล้จะถึงเวลาเริ่มปฏิบัติการกันแล้ว"
42200-46 = "นี่คือ FOX 2 ฉันเพิ่งปิดโหมดควบคุมระยะไกลของลิฟต์กลางที่มุ่งหน้าไปยังห้องปฏิบัติการไปเมื่อกี้"
42200-47 = "พอทำแบบนี้แล้วละก็ ต่อให้โมเอะจังใช้แผนการแยบยลในการแฮ็กลิฟต์ ก็จะควบคุมลิฟต์ไม่ได้อยู่ดี"
42200-48 = "แต่แบบนี้มันจะมากเกินไปหรือเปล่านะ...? ต่อให้พวกรุ่นน้องมีความสามารถแค่ไหน แต่ก็ไม่น่าจะมาถึง#nจุดๆ นี้ได้เลยนะ"
42200-49 = "เรื่องเตรียมการน่ะ ไม่มีอะไรเกินไปหรอก ยิ่งถ้าเป็นสมาชิกหน่วยรบพิเศษ เรายิ่งต้องคิดถึงสถานการณ์#nที่เลวร้ายที่สุดอยู่เสมอ"
42200-50 = "........."
42200-51 = "ยูกิโนะจัง..."
42200-52 = "ไม่สิ FOX 1 คิดว่าเราอาจจะแพ้ให้กับกองทหาร RABBIT ก็ได้งั้นเหรอ?"
42200-53 = "... ก็ใช่ว่าจะเป็นไปไม่ได้นี่"
42200-57 = "ถ้าเผื่อว่า... ถ้าเผื่อว่า FOX 2 ล้มเหลวจนอีกฝ่ายบุกเข้ามาถึงขั้นสุดท้ายได้"
42200-58 = "ถ้าตอนนั้นมาถึง ให้ทุกคนขึ้นมาจากชั้นใต้ดินและรอคำสั่งต่อไป"
42200-63 = "หืม? ไม่ได้ให้ไปสมทบกับ FOX 1 แล้วรับมือด้วยกันหรอกเหรอ?"
42200-64 = "ถึงเราจะสูญเสียกำลังไปบ้าง แต่ถ้ายังเคลื่อนไหวได้อยู่ ก็ควรจะไปสนับสนุนอยู่ข้างหลัง..."
42200-66 = "ไม่เป็นไร ถ้าศัตรูบุกเข้าไปถึงห้องปฏิบัติการได้ ก็ถือว่าปฏิบัติการล้มเหลวไปแล้ว"
42200-67 = "ให้ทุกคนขึ้นไปบนพื้นดินแล้วเตรียมเส้นทางล่าถอยไว้ล่วงหน้า เราจะได้หนีออกไปได้อย่างรวดเร็ว"
42200-69 = "แต่ถึงอย่างนั้นก็เถอะ..."
42200-70 = "... ถ้าหัวหน้ากองว่าแบบนั้น เราก็คงต้องเคารพละนะ"
42200-72 = "FOX 1 หรือว่า..."
42200-74 = "... นี่เป็นคำสั่ง นิโกะ"
42200-75 = "อย่าถามหาเหตุผลจากคำสั่งนี้เลย"
42200-81 = "... รับทราบ"
42200-84 = "เป้าหมายของปฏิบัติการนี้คือการยึดหรือปลดชนวนหัวรบแรงดันความร้อน <A.N.T.I.O.C.H.> ที่ขน#nส่งมาที่ไซโล แล้วหยุดยั้งไม่ให้กองทหาร FOX จุดระเบิดค่ะ"
42200-85 = "ตอนนี้หัวรบที่ว่านั่นได้ถูกนำไปติดตั้งที่ไซโลแล้ว การควบคุมทั้งหมดจะทำที่ห้องปฏิบัติการชั้นล่าง#nของอาคารค่ะ"
42200-86 = "ด้วยเหตุนี้ เราจึงต้องเข้ายึดห้องปฏิบัติการให้ได้ก่อน จะได้ปลดชนวนหัวรบได้ค่ะ"
42200-92 = "... อยู่เข้าไปลึกกว่าที่คิดอีกแฮะ"
42200-94 = "ใช่ค่ะ ห้องปฏิบัติการนี้อยู่ในส่วนลึกที่สุดของไซโล เราก็เลยต้องไปให้ถึงลิฟต์กลางให้ได้ก่อนค่ะ"
42200-95 = "เส้นทางที่ไปยังลิฟต์เป็นพื้นที่โล่งที่เส้นทางถูกกำหนดตายตัวและไม่มีวัตถุกำบัง สไนเปอร์จากฝั่งศัตรู#nอาจจะมองเห็นเราได้ง่ายๆ เลยค่ะ"
42200-96 = "ไซโลนี้มีจุดลอบยิงเอาไว้ซ่อนตัวได้หลายจุด... แค่ยืนยันตำแหน่งศัตรูก็น่าจะยากแล้ว"
42200-97 = "เดิมทีแล้วเราควรหาตำแหน่งและจัดการสไนเปอร์ของศัตรูก่อน แล้วจึงค่อยเข้าไปอย่างปลอดภัยค่ะ แต่ว่าตอนนี้เราเหลือเวลาอีกไม่มากแล้วจนกว่าหัวรบจะระเบิด"
42200-98 = "... เพราะฉะนั้นสมาชิกทุกคนจะจู่โจมพร้อมกัน เพื่อไม่ให้ศัตรูมีเวลาตั้งตัวค่ะ"
42200-99 = "เคลื่อนไหวฉับไวราวพายุ โจมตีให้หนักหน่วงราวไฟลุก นี่คือพื้นฐานของยุทธวิธีสินะ"
42200-100 = "มีจุดที่ต้องระวังเป็นพิเศษไหม?"
42200-104 = "มีความเป็นไปได้สูงว่าศัตรูจะดักซุ่มอยู่ที่จุดลิม่าค่ะ"
42200-105 = "ฉันอยากให้ RABBIT 2 จัดการศัตรูคนนั้น แล้วไปยึดคอนโซลควบคุมของลิฟต์ไว้ค่ะ"
42200-106 = "ทันทีที่ยึดคอนโซลควบคุมไว้ได้ ให้ RABBIT 3 ทำการแฮ็กแล้วยึดอำนาจควบคุมไว้ค่ะ"
42200-108 = "สบายมาก วางใจได้เลย!"
42200-109 = "ละ... แล้วฉันล่ะ ทำอะไรดี...?"
42200-111 = "RABBIT 4 ..."
42200-112 = "ให้ไปซ่อนตัวที่จุดลอบยิงบนบันไดด้านนอกแล้วเฝ้าดูสถานการณ์ค่ะ หากสไนเปอร์ฝ่ายศัตรูพยายาม#nยิงพลชี้เป้าของเราละก็ ช่วยกลับระยะทางและทิศทางแล้วยิงกลับด้วยค่ะ"
42200-113 = "ให้กลับระยะทางและทิศทางของจุดลอบยิงก็ไม่ใช่เรื่องยากหรอกนะ แต่ว่า..."
42200-114 = "ถ้าการลอบยิงนั้นของอีกฝ่ายทำให้ซากิบาดเจ็บล่ะ...?"
42200-115 = "ไม่เป็นไรหรอก เป็นถึงพลชี้เป้า ถ้ามัวแต่มากลัวกระสุนอยู่จะไปสู้ใครเค้าไหวเหรอไง?"
42200-116 = "ฉันมีหมวกเหล็กกับเสื้อกันกระสุนติดตัวไว้เตรียมพร้อมลงสนามอยู่ตลอด เพราะงั้นไม่ต้องกังวลให้มัน#nมากเกินไปหรอกนะ"
42200-117 = "อื้ม เข้าใจแล้ว...!"
42200-119 = "ฉันก็เข้าใจปฏิบัติการอยู่หรอกนะ... ว่าแต่เราไม่มีแผน B ไว้เตรียมการเผื่อเราทำพลาดบ้างเหรอ?"
42200-120 = "ถ้าซากิจัดการศัตรูไม่ได้ หากฉันแฮ็กไม่สำเร็จ หรือมิยุยิงกลับไม่เป็นผล ปฏิบัติการก็จะไม่สำเร็จ..."
42200-125 = "ฉัน... ไม่มีแผนการอื่นค่ะ"
42200-126 = "หืม? ไม่มีแผนการอื่นงั้นเหรอ หมายความว่ายังไง?"
42200-127 = "กองทหาร RABBIT ที่ฉันสั่งการคือกองทหารที่แข็งแกร่งที่สุด"
42200-128 = "ทุกคนคือกองกำลังพิเศษลับฉับไวและแข็งแกร่ง ฉันจินตนาการไม่ออกเลยค่ะว่าเราจะพ่ายแพ้ในการสู้#nรบพิเศษ"
42200-130 = "เพราะแบบนั้นฉันเลยอยากให้ทุกคนเชื่อใจซึ่งกันและกัน แล้วมาประสบความสำเร็จด้วยกันทั้งหมดค่ะ"
42200-131 = "... ฉันก็เชื่อใจทุกๆ คนนะคะ"
42200-133 = "... นี่เป็นปฏิบัติการที่บ้าบอที่สุดที่เธอเคยพูดถึงมาเลยนะ"
42200-134 = "มะ... มันฟังดูไร้สาระขนาดนั้นเลยเหรอคะ...?"
42200-135 = "เอาเถอะ แต่มันก็เป็นคำสั่งของหัวหน้ากองนี่นา"
42200-139 = "RABBIT 2 จะปฏิบัติตามคำสั่ง"
42200-140 = "... โมเอะ มิยุ ช่วยสนับสนุนทางข้างหลังด้วย"
42200-143 = "วางใจได้เลย!"
42200-148 = "ถ้างั้นก็... เริ่มได้!"

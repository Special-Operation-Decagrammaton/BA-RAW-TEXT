10009045-15 = "證明……唔嗯……"
10009045-16 = "哎呀沒問題的，交給我啦。"
10009045-17 = "希望可以相信我啊～？"
10009045-18 = "也對，那我相信你。"
10009045-19 = "[s]「這麼乾脆！」"
10009045-20 = "彼此都辛苦了，總會有這種日子呢。"
10009045-21 = "這次一定會好好做的！"
10009045-22 = "巡邏方面就萬事拜託了！"
10009045-28 = "那麼老師，前往下一個街區吧。"
10009045-29 = "[s]「嗯……」"

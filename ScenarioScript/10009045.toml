[translation]
10009045-2 = "เฮ้อ!"
10009045-3 = "ขอบคุณนะคุณครู ได้คุณครูช่วยไว้ก็เลยจับวาคาโมะได้แล้วล่ะ"
10009045-4 = "[s] \"คือว่า เธอแหกคุกออกมาอีกแล้วเหรอ?\""
10009045-5 = "เอ่อ เรื่องนั้นน่ะ..."
10009045-6 = "อืม คือว่า..."
10009045-8 = "แหกคุกออกมาได้ยังไงกันนะ...?"
10009045-9 = "[s] \"คราวนี้ไม่รู้วิธีด้วยเรอะ!\""
10009045-10 = "เปล่าสักหน่อย ฉันแค่ยุ่งมากๆ ต่างหาก อ่ะฮะฮะ"
10009045-11 = "ขะ...ขอโทษค่ะ! คุณครู! คราวหน้าฉันจะพยายามไม่ให้เกิดเรื่องแบบนี้อีกค่ะ...!"
10009045-12 = "อืม ใช่แล้ว คราวหน้า... คราวหน้าต้องไม่เป็นไรแน่นอน!"
10009045-13 = "มีอะไรยืนยันได้รึเปล่าล่ะคะ?"
10009045-14 = "คะ?! ละ...หลักฐานยืนยันเหรอคะ"
10009045-15 = "หลักฐาน... อืม..."
10009045-16 = "อย่าพูดอะไรเย็นชาแบบนั้นสิ!"
10009045-17 = "ในวันแบบนี้ไม่คิดเหรอว่าเราควรจะไว้ใจซึ่งกันและกันน่ะ?"
10009045-18 = "นั่นสินะคะ คุณพูดถูกแล้วละค่ะ"
10009045-19 = "[s] \"โน้มน้าวใจได้สินะ\""
10009045-20 = "อ่ะฮ่า~ สถานการณ์แบบนี้เราก็เหนื่อยกันทั้งหมดนั่นละ อื้อ มีวันแบบนี้เหมือนกันสินะ "
10009045-21 = "ถ้างั้น... พวกเราขอตัวจริงๆ แล้วนะ!"
10009045-22 = "ระ...เรื่องออกลาดตระเวน ระ...รบกวนด้วยนะคะ!"
10009045-28 = "เอาล่ะคุณครู เราก็ไปต่อกันเถอะค่ะ"
10009045-29 = "[s] \"เอ่อ... อื้อ\""

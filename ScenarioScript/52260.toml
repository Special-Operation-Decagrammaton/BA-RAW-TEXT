[translation]
52260-1 = "ตอนที่ 26;ความในใจในความมืดมิด"
52260-2 = "ความหมายเดิมของ <ตำนานร้อยเรื่องราว> คือการแบ่งปันเรื่องราวร้อยเรื่อง"
52260-3 = "มีที่มาจากการละเล่นในอดีตของเฮียกกะเรียวรัน ที่จะเล่าเรื่องราวแปลกๆ ในกลางดึกพร้อมดับเทียนไปทีละเล่มๆ"
52260-4 = "เมื่อเรื่องราวดำเนินไป แสงเทียนก็ค่อยๆ หรี่ลง และรอบบริเวณก็ค่อยๆ มืดลง จนมองไม่เห็นสิ่งตรงหน้าในที่สุด"
52260-5 = "แต่ยิ่งดวงตาพร่ามัวมากเท่าไร จิตใจที่แท้จริงของตัวเองก็จะยิ่งเห็นได้ชัดเจน"
52260-6 = "จิตใจของมนุษย์ที่ยากแท้หยั่งถึงเช่นเดียวกับเรื่องราวแปลกๆ"
52260-7 = "ข่าวลือ เรื่องลึกลับ และข่าวโคมลอยที่แพร่สะพัดในโลกล้วนเป็นเพียงกระจกที่สะท้อนความปรารถนา#nของตัวเราเท่านั้น"
52260-9 = "[log][ff4444]จงเผชิญหน้ากับความมืดแล้วพูดออกมา[-][/log]"
52260-12 = "[log][ff4444]เจ้าใส่หน้ากากแห่งความเท็จแบบไหน[-][/log]"
52260-15 = "[log][ff4444]เจ้ามีความปรารถนาที่ไร้ค่าเยี่ยงไร[-][/log]"
52260-18 = "[log][ff4444]และเจ้ากำลังหลบเลี่ยงสายตาจากสิ่งใดกัน[-][/log]"
52260-22 = "สำหรับฉัน..."
52260-23 = "ตัวละครในการ์ตูนแนวโรแมนติกมักจะดูมีความสุขอยู่เสมอ"
52260-24 = "ถึงฉันจะทุ่มเทให้กับการฝึกฝนเพื่อยืนหยัดในความยุติธรรมของเฮียกกะเรียวรัน แต่อีกใจหนึ่งฉันก็รู้สึกกังวลไปด้วย"
52260-25 = "เวลาที่ผ่านไปแล้วไม่อาจย้อนคืนได้ ฉันก็เลยกังวลว่าตัวเองอาจจะกำลังเสียเวลาของวัยรุ่นไปโดย#nเปล่าประโยชน์"
52260-29 = "แต่เธอก็รู้อยู่ไม่ใช่เหรอ...?"
52260-30 = "ว่าชีวิตของเธอที่เปื้อนทั้งน้ำตา ทั้งหยาดเหงื่อ มันอยู่ห่างไกลจากการเป็นวัยรุ่นที่เธอจินตนาการน่ะ"
52260-33 = "ส่วนฉัน..."
52260-34 = "ในฐานะที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน ฉันคิดว่าเป็นหน้าที่ของฉันที่จะต้องจัดการให้ทุกๆ อย่างถูกต้อง"
52260-35 = "แต่ฉันก็ใช้ข้ออ้างที่ว่าจะทำให้สมาชิกทุกคนมีความถูกต้อง แล้วพูดจาหยาบคายทั้งๆ ที่ไม่ได้ตั้งใจ"
52260-36 = "ฉันตำหนิรุ่นพี่ที่จากไปและไม่พอใจที่ความจริงไม่เป็นไปตามที่ปรารถนา..."
52260-40 = "ที่จริงแล้วฉัน... ใช่แล้วละ ฉันเป็นคนทำลายเฮียกกะเรียวรันไปเอง"
52260-43 = "ส่วนข้า..."
52260-44 = "ทุกคนล้วนบอกว่าต้องการข้า แต่ข้าก็เป็นเพียงตัวแทนของคนอื่นเท่านั้น"
52260-45 = "ทั้งในฐานะบุตรีแห่งตระกูลคาเดโนะโคจิ และในฐานะสมาชิกเฮียกกะเรียวรัน"
52260-49 = "ชีวิตจอมปลอมที่ไม่มีใครสนใจและถูกทดแทนได้เสมอ"
52260-50 = "ถ้าข้าได้เกิดเป็นตุ๊กตาก็คงดีกว่านี้..."
52260-53 = "[ns] \"ทำอะไรกับทุกคนน่ะ...?\""
52260-55 = "ความลึกลับของหนังสือลึกลับยังไปไม่ถึงครูจากชาเล่ต์สินะ"
52260-56 = "ข้าไม่ได้ทำอะไรมากมายหรอก..."
52260-57 = "ข้าก็แค่ช่วยปิดตาให้ทุกคนย้อนกลับไปดูตัวเองได้"
52260-58 = "แต่การใคร่ครวญหวนคิดเพียงชั่วขณะก็ทำให้ผู้คนพังทลายลงได้ง่ายๆ"
52260-59 = "นั่นเป็นเพราะจิตใจเป็นสิ่งที่ไม่อาจเข้าใจได้"
52260-60 = "ไม่ว่าจะของตัวเองหรือคนอื่นก็ตาม"
52260-61 = "[s] \"ต่อให้เข้าใจไม่ได้... แล้วมันเป็นปัญหายังไงกันล่ะ?\""
52260-65 = "[ns1] \"เราก็แค่ต้องถามและตอบไปจนกว่าจะเข้าใจสิ\"\n[ns2] \"ผู้คนอยู่ร่วมกันก็เพื่อทำความเข้าใจกันนั่นละ\"\n[ns3] \"ผู้คนไม่หยุดเรียนรู้เพื่อทำความเข้าใจกันหรอกนะ\""
52260-69 = "อย่างนี้สินะ หรือว่าเป็นคุณที่มอบความหวังลมๆ แล้งๆ ให้เด็กๆ พวกนั้น?"
52260-70 = "ข้าจะจับตาดูจากตรงนี้แล้วกัน"
52260-74 = "ผลลัพธ์แห่งความหวังลมๆ แล้งๆ ของคุณน่ะ..."
52260-76 = "ฉัน..."
52260-77 = "เป็นคนที่เป็นรองคนอื่น ทั้งยังบกพร่องและทำอะไรตามลำพังไม่ได้"
52260-80 = "แม้จะยื่นมือออกไปจนสุดก็ปกป้องอะไรไว้ไม่ได้ และได้แต่เฝ้ามองมันพังทลายลง"
52260-82 = "สุดท้ายแล้วฉันก็เป็นอย่างอายาเมะไม่ได้"
52260-86 = "ก็เพราะฉัน... คือโกเรียว นางุสะ"
52260-106 = "คนที่น่าสมเพช ไร้ความสามารถ มีข้อจำกัด เก่งแต่เรื่องการเล่นละครจอมปลอม"
52260-110 = "แต่นั่นไม่ใช่เหตุผลที่ฉันจะยอมแพ้"
52260-116 = "โคคุริโกะ ไม่ว่าคุณจะเอาความจริงมาแสดงให้เห็นกี่ครั้ง แต่ฉันก็ไม่เปลี่ยนความคิดหรอก"
52260-123 = "ฉันคือโกเรียว นางุสะ"
52260-127 = "ไม่ว่าใครจะว่ายังไง... ฉันก็คือเพื่อนสนิทที่สุดของอายาเมะ!"
52260-132 = "ใช่แล้วละ... เจ้ารู้ดีตั้งแต่แรก"
52260-133 = "ทั้งๆ ที่เจ้าก็รู้ว่าตัวเองอ่อนแอแค่ไหน และความตั้งใจที่จะช่วยเหลือทุกคนมันไร้สาระเพียงใด"
52260-134 = "แต่เจ้าก็เลือกที่จะปิดหนังสือลึกลับแล้วลุกขึ้นมาเปลี่ยนแปลงความจริงอันโหดร้ายนี่สินะ"
52260-135 = "เจ้านี่ช่าง... ไม่อาจเข้าใจได้จริงๆ"
52260-136 = "ภาพที่คุณแสดงต่ออายาเมะก็คงเป็นแบบนี้เหมือนกันใช่มั้ย...?"
52260-137 = "ภาพของความมืดมิดที่มองไม่เห็นเบื้องหน้าแม้แต่น้อย และตัวตนด้านลบภายในที่มากระซิบบางอย่าง#nท่ามกลางความมืดมิดนั่น"
52260-138 = "เพราะอย่างนั้นไงล่ะ อายาเมะถึงได้สิ้นหวังและพยายามวิ่งหนี"
52260-139 = "ใช่ ขนาดหัวหน้าเฮียกกะเรียวรันที่ทุกคนเชิดชูยังทำไม่ได้ แล้วเจ้าคิดว่าตัวเองจะทำได้อย่างนั้นหรือ?"
52260-140 = "เจ้าน่ะเทียบไม่ได้กับอายาเมะ แล้วเจ้ายังคิดว่าตัวเองจะช่วยผู้หญิงคนนั้นได้อย่างนั้นหรือ?"
52260-141 = "เปล่า ฉันช่วยอายาเมะไม่ได้หรอก เพราะฉันไม่ใช่อายาเมะ"
52260-142 = "แต่ถึงยังไง... ฉันก็จะยื่นแขนข้างนี้ออกไปให้สุดจนกว่าอายาเมะจะลุกขึ้นเองได้"
52260-150 = "แขนที่ถูกห้วงอัสดงกลืนกินไป... กลับมาเป็นเหมือนเดิมแล้วเหรอ?"
52260-151 = "โกหกกันชัดๆ... พวกฉันใช้พลังลึกลับจากหนังสือลึกลับได้นะ ถ้าพวกเธอจะดูหมิ่นกันด้วยการตบตา#nแบบนี้ละก็..."
52260-158 = "ฉันจะถามอีกครั้ง"
52260-159 = "ตอนนี้อายาเมะอยู่ที่ไหน?"
52260-160 = "ปะ... เป็นไปไม่ได้..."
52260-161 = "ดอกไม้บนกิ่งไม้ที่ตายแล้วผลิบานไม่ได้ฉันใด คนที่ตกไปในห้วงอัสดงก็กลับคืนมาไม่ได้ฉันนั้น"
52260-162 = "ทะ... ท่านโคคุริโกะ นี่มันอะไรกันคะ..."
52260-167 = "พู่กันและที่ฝนหมึกทำให้เรื่องราวเด่นชัดออกมา แต่ความบังเอิญต่างหากเล่าที่ทำให้เรื่องราวน่าสนใจ"
52260-168 = "นอกจากเงาของตัวเองแล้ว เจ้ายังคว้ามือที่ยื่นออกไปหาคนอื่นในห้วงอัสดงได้ด้วยอย่างนั้นหรือ... เจ้าทำให้เรื่องราวพลิกผันได้เสมอเลยสินะ"
52260-172 = "เจ้าอาจมีพรสวรรค์ในการเล่าเรื่องเหมือนกันก็ได้"
52260-176 = "ตอนนี้อายาเมะก็ยังมองดูพวกเธออยู่จากบนหอสูง"
52260-177 = "หากเจ้าใช้ความจริงช่วยอายาเมะไว้ได้สำเร็จละก็"
52260-181 = "ข้าจะพิจารณาโครงเรื่องของเรื่องต่อไปให้มากขึ้นแล้วกัน..."
52260-192 = "[ns] \"รอเดี๋ยวก่อน...!\""
52260-196 = "ไปซะแล้ว"
52260-204 = "วะ... หวาา...!! คะ... ความทรงจำเมื่อกี้มันอะไรกันน่ะ?"
52260-205 = "ข้ารู้สึกเหมือนเพิ่งตื่นจากฝันร้ายเลยเจ้าค่ะ..."
52260-206 = "แล้วโคคุริโกะ... กับชมรมความงามของธรรมชาติล่ะ เป็นยังไงบ้าง?"
52260-207 = "พวกนั้นกลับไปแล้ว... ถึงจะน่าเสียดายที่จับตัวไว้ไม่ได้ก็เถอะ"
52260-208 = "แต่ยังไงตอนนี้การตามหาอายาเมะก็เป็นเรื่องสำคัญที่สุด"
52260-214 = "คุณครู [USERNAME] ฉันขอร้องอะไรอีกอย่างเป็นครั้งสุดท้ายได้มั้ย?"
52260-215 = "มันอาจจะอันตรายก็ได้... แต่ฉันอยากให้คุณครูช่วยเฝ้าดูการดวลระหว่างฉันกับอายาเมะจนจบน่ะ"
52260-216 = "[s] \"ครูจะตั้งใจดูโดยที่ไม่ละสายตาเลย\""
52260-217 = "ขอบคุณนะ..."
52260-218 = "งั้นก็ไปกันเถอะ ไปช่วยอายาเมะกัน"

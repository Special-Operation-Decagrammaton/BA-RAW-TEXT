[translation]
52260-1 = "Episode 26;True Intentions within the Darkness"
52260-2 = "The Hundred Ghost Stories originate from a series of age-old tales."
52260-3 = "Long, long ago, Hyakkaryouran members would gather round at midnight, whispering ghost stories in the dark. Each storyteller would blow out a candle at the end of their tale."
52260-4 = "With each story uttered, the candles' flames dwindled, one by one. Until, at last, the darkness would settle over them like a heavy blanket."
52260-5 = "As one's vision dims, their inner self shines all the more clearly."
52260-6 = "Just like this strange story, the human heart is an incomprehensible force."
52260-7 = "Rumors, stories, ghost tales, and myths can be summed up as reflections of the speaker's desires."
52260-9 = "[log][ff4444]Face the darkness and speak.[-][/log]"
52260-12 = "[log][ff4444]What lie doth thou protect thyself with?[-][/log]"
52260-15 = "[log][ff4444]What empty desires doth thou harbor?[-][/log]"
52260-18 = "[log][ff4444]What is it thou doth avert thy gaze from?[-][/log]"
52260-22 = "I..."
52260-23 = "The characters in romantic manga always seemed so happy."
52260-24 = "As I slaved away, training to uphold the Hyakkaryouran's justice, I couldn't help but feel uneasy."
52260-25 = "Time passed can never be reclaimed. What if I were wasting my youth?"
52260-29 = "...You knew the answer to that already, didn't you?"
52260-30 = "That your life, drenched in gun smoke and sweat, was a far, far cry from the shining youth you'd once imagined."
52260-33 = "I..."
52260-34 = "As the Hyakkaryouran's operations officer, I believed I had a responsibility to uphold order."
52260-35 = "I spat vitriol I didn't mean, in the name of maintaining discipline."
52260-36 = "I placed blame upon the seniors who'd abandoned us, resented the reality that I could not shape to my liking."
52260-40 = "The truth is...it was I who brought about the Hyakkaryouran's downfall."
52260-43 = "I..."
52260-44 = "They claimed I was needed, but I have always been a placeholder."
52260-45 = "Neither truly the daughter of the Kadenokouji, nor a member of the Hyakkaryouran."
52260-49 = "Always living for a role, never as a cherished friend."
52260-50 = "...Being born as a doll would have been better than this."
52260-53 = "[ns] \"...What did you do to the children?\""
52260-55 = "Even the power of the tome is rendered useless before Schale's Sensei, then."
52260-56 = "...Lay to rest that accusatory glare."
52260-57 = "I simply averted the vision inwards, so they may reflect upon themselves."
52260-58 = "It is fascinating, however, how simple introspection can rip a person apart."
52260-59 = "For matters of the heart are impossible for humans to comprehend."
52260-60 = "Even their own."
52260-61 = "[s] \"Who cares if they can't? How is that a problem?\""
52260-65 = "[ns1] \"With enough curiosity and communication, they figure it out.\" \n[ns2] \"That's why people coexist with one another.\" \n[ns3] \"That's how people are always learning from one another.\""
52260-69 = "I see. You are the one who has bolstered their confidence with vain hopes."
52260-70 = "Go on, observe the results of your teachings."
52260-74 = "See what comes of this \"hope\" you've planted within them."
52260-76 = "...I..."
52260-77 = "I'm inadequate in every way. I'm hopelessly unable to achieve anything with my own strength."
52260-80 = "I strove to protect all I cared about, and failed. Everything crumbled in my hands."
52260-82 = "Despite all my efforts, I could never be Ayame."
52260-86 = "...Because I am Goryou Nagusa."
52260-106 = "I am pathetic, incompetent, and weak. My lies are all I've ever possessed."
52260-110 = "None of that is justification to falter."
52260-116 = "Try as you may, Kokuriko, no reality of yours can shatter mine."
52260-123 = "I am Goryou Nagusa."
52260-127 = "I care not for what anyone else may say or think...because I am Ayame's best friend!"
52260-132 = "...I see. You've known from the start."
52260-133 = "You're well aware of your own fragility, how futile this misguided desire to save your peers truly is."
52260-134 = "And yet your resolve to alter reality itself is unwavering. Thus, you closed the tome and rose of your own accord."
52260-135 = "Incomprehensible... You are truly incomprehensible."
52260-136 = "...This is what you did to Ayame, didn't you?"
52260-137 = "You trapped her in that pitch black darkness. The shadows whispered their vitriol at her, tearing her down."
52260-138 = "That's what made Ayame run away."
52260-139 = "Precisely. That Hyakkaryouran president everyone admired so folded before it. So what in the world do you think you can do?"
52260-140 = "You, sniveling and inferior, believe you can save Ayame?"
52260-141 = "No. I cannot, for I am not her. Only Ayame can save herself."
52260-142 = "However... What I can do is extend this hand of mine, and take hold of her until she rises on her own."
52260-150 = "Her arm...returned from the spirit realm?!"
52260-151 = "Liar! You cannot disgrace us tome wielders with petty sleight of hand—"
52260-158 = "I'll ask one more time."
52260-159 = "Where is Ayame?"
52260-160 = "H-How can this be?"
52260-161 = "Just as a dead branch cannot bloom, that which has fallen to the spirit realm cannot return to this reality..."
52260-162 = "K-Kokuriko, what is this?"
52260-167 = "Necessity provides a story its inevitability, but coincidence sparks its interest."
52260-168 = "You ripped from the tome's spirit realm not only your own shadow, but also the hand you once sacrificed. You, in particular, have always had a penchant for rather fascinating plot twists."
52260-172 = "Perhaps you, too, have the makings of a storyteller."
52260-176 = "Ayame resides on the top floor of the Tenshukaku. Even as we speak, she is watching."
52260-177 = "In the event you do save your precious Ayame..."
52260-181 = "...I shall consider an amended direction for our next story."
52260-192 = "[ns] \"...Wait!\""
52260-196 = "She got away..."
52260-204 = "W-Whoa...?! Wh-What was that?!"
52260-205 = "I feel as if I awoke from a horrible, terrible dream..."
52260-206 = "Kokuriko... What of Nature's Beauty?"
52260-207 = "She escaped... We were unable to stop her."
52260-208 = "It doesn't matter. Right now, finding Ayame is our only priority."
52260-214 = "[USERNAME] Sensei... May I ask one, final favor of you?"
52260-215 = "I cannot ensure your safety, but I want to ask that you see through my fight with Ayame to the very end."
52260-216 = "[s] \"No matter what happens, I won't look away.\""
52260-217 = "...Thank you."
52260-218 = "Then, let's go. We're going to save Ayame."

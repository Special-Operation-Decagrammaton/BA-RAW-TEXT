[translation]
52260-1 = "第26話;黑暗中的本心"
52260-2 = "百物語一詞顧名思義，指的就是一百個故事。"
52260-3 = "此一怪談源自於百花繚亂自古流傳──#n在深夜裡相互講述奇聞軼事，並一一熄滅燭火的遊戲。"
52260-4 = "燭火隨著故事推進逐漸減少，四周愈發昏暗直至漆黑。"
52260-5 = "然而視線越是模糊，自己的內心深處反而越是清晰。"
52260-6 = "與奇聞軼事同樣難以捉摸的，是人心。"
52260-7 = "世間流傳的風聞與流言、怪談與謬說……不過是映照自身欲望的鏡子罷了。"
52260-9 = "[log][ff4444]向黑暗訴說吧。[-][/log]"
52260-12 = "[log][ff4444]你披戴著什麼樣的謊言？[-][/log]"
52260-15 = "[log][ff4444]你懷抱著什麼虛妄的慾望？[-][/log]"
52260-18 = "[log][ff4444]你的視線在逃避什麼？[-][/log]"
52260-22 = "我……"
52260-23 = "少女漫畫裡的角色，看起來總是那麼幸福。"
52260-24 = "雖然是為了貫徹百花繚亂的正義而拚命訓練，我心裡依然感到不安。"
52260-25 = "畢竟逝去的時光無法倒流……我或許正在浪費自己的青春。"
52260-29 = "……其實你也早就知道了吧？"
52260-30 = "你那充斥著火藥與汗水的人生，早已與青春相去甚遠。"
52260-33 = "我……"
52260-34 = "身為百花繚亂的作戰參謀，認為自己有著撥亂反正的責任。"
52260-35 = "結果卻打著「讓部員走上正道」的大義名分，總是把違心的苛刻言論掛在嘴邊。"
52260-36 = "責怪離開的前輩，怨恨不如意的現實……"
52260-40 = "但實際上……沒錯，百花繚亂就是我親手毀掉的。"
52260-43 = "小女子……"
52260-44 = "雖然大家都說需要小女子，但我卻始終只是某個人的替代品。"
52260-45 = "無論是勘解由小路家的千金，還是百花繚亂的一員……"
52260-49 = "與其過著無人在意、隨時可以被取代的虛假人生……"
52260-50 = "……或許乾脆以人偶的身份出生還比較好。"
52260-53 = "[ns]「……你對孩子們做了什麼？」"
52260-55 = "果然夏萊的老師，就連怪書的神祕也無法觸及嗎。"
52260-56 = "……沒有。我什麼也沒做。"
52260-57 = "只是替他們蒙上雙眼，讓他們能好好審視自己罷了。"
52260-58 = "然而即便只是如此簡單的自省，也足以輕鬆讓人崩潰。"
52260-59 = "因為人無法理解人心。"
52260-60 = "就連自己的心也不例外。"
52260-61 = "[s]「就算無法理解……又如何？」"
52260-65 = "[ns1]「只要不斷重複問與答，直到理解為止就行了。」\n[ns2]「所以人們才會與他人一起生活。」\n[ns3]「也正因如此，人們才不會停止學習。」"
52260-69 = "原來如此……這些人心裡懷抱的虛妄希望，就是你灌輸的嗎？"
52260-70 = "那就留在那裡親眼見證吧。"
52260-74 = "見證你所引發的虛妄希望，將迎接什麼樣的結局──"
52260-76 = "……我啊。"
52260-77 = "是個獨自一人什麼也做不到，充滿不足的無能之人。"
52260-80 = "就算伸出手也無法守護任何東西，只能眼睜睜地看著一切毀壞。"
52260-82 = "我終究沒能成為菖蒲。"
52260-86 = "……因為我是御稜名草。"
52260-106 = "雖然既懦弱又無能、總是很快就碰上極限、只會演繹虛假的自己……"
52260-110 = "但這並不是應該放棄的理由。"
52260-116 = "雛罌粟──就算你一再要求我面對現實，我的想法也不會改變。"
52260-123 = "我是御稜名草。"
52260-127 = "無論其他人怎麼說……我都是菖蒲最重要的朋友！"
52260-132 = "……這樣啊，你早就明白了嗎。"
52260-133 = "明白自己有多麼脆弱，也知道要拯救所有人的心是多麼虛無飄渺。"
52260-134 = "但即便如此，你依然選擇闔[ruby=怪書]上書，[/ruby]試圖起身改變殘酷的現實。"
52260-135 = "這可真是……難以理解的景象啊。"
52260-136 = "……你讓菖蒲看到的景象也是如此嗎？"
52260-137 = "伸手不見五指的漆黑，以及在耳邊縈繞的負面心聲。"
52260-138 = "因此菖蒲才會感到絕望……才會想要逃離。"
52260-139 = "沒錯。連所有人仰慕的百花繚亂委員長都無法做到的事……你卻相信自己能做到嗎？"
52260-140 = "不如菖蒲的你，竟然認為自己能拯救他？"
52260-141 = "不，我無法拯救菖蒲。因為我並不是他。"
52260-142 = "但是在菖蒲能重新站起來之前……我可以伸手拉他一把。"
52260-150 = "被黃昏吞噬的手……竟然回來了？"
52260-151 = "怎麼可能……#n如果你想用這種障眼法來褻瀆操縱怪書神祕的我們──"
52260-158 = "我再問你們一次。"
52260-159 = "菖蒲現在在哪裡？"
52260-160 = "不，不可能……"
52260-161 = "就像枯枝不可能再開花一樣，墜入黃昏的存在也不可能回來。"
52260-162 = "雛，雛罌粟大人，這究竟是……"
52260-167 = "必然將賦予故事合理性，偶然則能引發故事的趣味。"
52260-168 = "不僅能在怪書的黃昏中握住自己的影子，甚至還能抓住伸向他人的手……#n你總是會以出乎意料的方式掌握整個舞台呢。"
52260-172 = "或許你也具備成為說書人的資質也說不定。"
52260-176 = "菖蒲現在仍在天守閣上注視著你們。"
52260-177 = "如果你真的能成功拯救菖蒲──"
52260-181 = "……我也會重新考慮下一個故事的走向的。"
52260-192 = "[ns]「……等等！」"
52260-196 = "逃走了嗎……"
52260-204 = "嗚，嗚哇……！？#n剛才那段記憶是什麼？"
52260-205 = "有種剛從非常糟糕的惡夢裡醒過來的感覺……"
52260-206 = "雛罌粟……花鳥風月部怎麼了？"
52260-207 = "……逃走了。可惜沒能抓住他們。"
52260-208 = "不過現在最重要的是找到菖蒲。"
52260-214 = "[USERNAME]老師，最後能再拜託你一件事嗎？"
52260-215 = "雖然可能會很危險……但我希望你能將我和菖蒲的對決見證到最後。"
52260-216 = "[s]「無論發生什麼，我都絕對不會移開視線的。」"
52260-217 = "……謝謝你。"
52260-218 = "那麼我們走吧。#n一起去拯救菖蒲。"

[translation]
10018075-10 = "Where's the CEO? Or the president? Whatever you call yourself, I'm calling you out!"
10018075-11 = "Hiding is just going to make us get louder. ★"
10018075-12 = "Wow! All this food looks delicious! Can I try it? Then can I finish it?"
10018075-19 = "...Um, I think you should go out there."
10018075-20 = "I think we're about to lose our entire stock of food."
10018075-21 = "Noooooooo! That's potential profit! The damages!"
10018075-23 = "All right! I'm making an executive decision! Time to end this!"
10018075-27 = "Before we begin, thank you for the warm welcome."
10018075-28 = "Mwahahaha. I aim to please."
10018075-29 = "May we ask why you rolled out the red carpet for us?"
10018075-30 = "As the head of Nyaomoto Foods, I'm in charge here."
10018075-31 = "Trying to enter without prior notice or reservation will result in an automated response."
10018075-32 = "That response happens to be a very proactive security system."
10018075-33 = "So a proper meeting could have been scheduled?"
10018075-34 = "Mwahahaha. It's on a case-by-case basis."
10018075-35 = "But the review process takes about a month or two..."
10018075-36 = "I feel very pleased with our approach then."
10018075-37 = "Thanks for the explanation."
10018075-38 = "Let's get to the point."
10018075-39 = "I'd prefer that. Efficiency and adaptability are the foundations of management."
10018075-40 = "Efficiency in doing what? Destroying the concept of gourmet by flooding the market with nothing but cheap, low-quality food?"
10018075-41 = "Um, yeah? Do you have a problem with good business?"
10018075-42 = "I'm almost impressed at how you can ignore such an obvious problem."
10018075-43 = "You've spent too much time in an office. You've lost sight of what your own product is supposed to be."
10018075-44 = "As if consumers even pay attention to trivialities like how their food tastes."
10018075-45 = "I know exactly what my product is: more food at cheaper prices. People are happier that way."
10018075-50 = "Are you suggesting I should just throw out ingredients and food below a certain quality?"
10018075-51 = "Why would I ever be so wasteful?"
10018075-58 = "I'll give you a simple answer."
10018075-59 = "You're deceiving people."
10018075-62 = "Not even fish can survive in water that's too clean."
10018075-63 = "But it's important to keep the water as clean as possible."
10018075-64 = "Maybe I'm too much of a big-picture boss to get it, but isn't it strange to cling to such tiny details?"
10018075-65 = "What's strange is the name Nyao Foods. You don't seem to make anything that qualifies as food."
10018075-66 = "I resent that comment."
10018075-67 = "Your answer is as bland as your products."
10018075-74 = "...!"
10018075-75 = "...!"
10018075-76 = "Okay, then. A cook-off."
10018075-78 = "What?"
10018075-80 = "You heard me, a cook-off. Let's have a cooking contest."
10018075-81 = "This is about food, so let's compete with food."
10018075-82 = "It'll be fair, so no one can object to the results..."
10018075-88 = "This is clearly bait for a trap, right?"
10018075-89 = "Hm? Bait? Is it edible?"
10018075-90 = "What do you think, Haruna?"
10018075-92 = "If it is a trap, the Gourmet Research Society will spring it and win anyway."
10018075-96 = "I accept your challenge."
10018075-97 = "It's New Year's. Feeling festive?"
10018075-98 = "I am. Holiday foods only?"
10018075-99 = "Let's compete with...osechi."
10018075-100 = "Osechi?"
10018075-101 = "Lots of manual work, surprisingly difficult to make taste good..."
10018075-102 = "Which makes it the best way to test our cooking skills, no?"
10018075-103 = "What will the competition be?"
10018075-104 = "We make osechi using the same quality and quantity of ingredients, then have the members of the Merchants Guild taste it!"
10018075-105 = "And whoever gets a more positive reception wins?"
10018075-106 = "Exactly. If Nyao Foods wins, you'll give up on Sparrow. Mwahahaha."
10018075-107 = "And if we win, you'll keep your grubby hands away from Sparrow."
10018075-108 = "I accept."
10018075-109 = "We accept too."
10018075-110 = "And of course, nobody at the head of a major organization would ever go back on their word, right?"
10018075-111 = "Mwahahaha. I'd wager all of Nyao Foods' sales on that not happening."
10018075-116 = "I mean, I don't want to try fighting them, but are you sure a cook-off will work?"
10018075-117 = "Fool! This is free marketing!"
10018075-118 = "Marketing?"
10018075-119 = "You see, I did some research and found out about the Gourmet Research Society's notoriety."
10018075-120 = "(...And he's just bringing this up now?)"
10018075-121 = "What would happen if we broke the infamous Gourmet Research Society in front of the Merchants Guild?"
10018075-123 = "The status of Nyao Foods among the students of Kivotos would be absolute!"
10018075-124 = "Remember! Appealing to the Kivotos student demographic never fails!"
10018075-125 = "Uh, yeah, that's really great business advice..."
10018075-126 = "By the way, are you gonna pay us overtime?"
10018075-127 = "Results first! Pay later!"
10018075-128 = "...I don't think that's how overtime works..."

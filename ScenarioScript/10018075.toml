[translation]
10018075-10 = "社長，快給我出來！#n不對，好像是會長嗎？總之快出來！"
10018075-11 = "如果不出來的話，會鬧得一發不可收拾唷～★"
10018075-12 = "哇！那個好像很好吃！我可以吃吃看嗎？吃一點點就好！"
10018075-19 = "……會長，我覺得還是趕緊出去比較好。"
10018075-20 = "外面有個人正在以清倉的氣勢，好像打算吃光我們的食材。"
10018075-21 = "呣呵唔唔唔唔呣！#n已經造成不小的損失了，得趕緊止血才行……！"
10018075-23 = "好！現在正是展現一名經營者決斷力的時候！我親自出馬吧！"
10018075-27 = "在開始談話之前，先感謝貴方熱情的歡迎。"
10018075-28 = "呣呵呵呵。不敢當，這位小姐。"
10018075-29 = "方便請教一下剛才如此盛情款待我們的理由嗎？"
10018075-30 = "我是喵食品的會長，也就是總負責人。"
10018075-31 = "如果沒有提前預約，就想和我這種身分的人會談……"
10018075-32 = "警備系統會對入侵者有反應也是理所當然的吧？"
10018075-33 = "所以您的意思是，只要按照程序申請就能順利見面了嗎？"
10018075-34 = "呣呵呵呵。這就要看情況了。"
10018075-35 = "不過多半得花費一些時間……大約一到兩個月左右吧。"
10018075-36 = "也就是說，像這樣闖入果然是正確的選擇吧。"
10018075-37 = "感謝您的回答。"
10018075-38 = "客套話就說到這邊，我們言歸正傳吧。"
10018075-39 = "正如你們所見。提倡革新與高效率，是我們經營的基礎。"
10018075-40 = "既然如此，能請您停止「用劣質的食材與過度的調味蒙騙消費者」的行為嗎？"
10018075-41 = "我不理解，這有什麼問題？"
10018075-42 = "哎呀，難道您認為這是理所當然的？"
10018075-43 = "因為過度追求利益，導致失去基本的判斷力了嗎？"
10018075-44 = "絕大多數的民眾，其實根本不介意味道的細微差別。"
10018075-45 = "只要能以便宜的價格，吃到足夠份量和種類的食物就很滿足了。"
10018075-50 = "如果要照你所說的做，不就要把無法符合標準的食材全部當廢棄品處理了嗎？"
10018075-51 = "為何要做那種毫無效率可言的行為？"
10018075-58 = "對於這個提問，我以極度符合常識的答案來回答您──"
10018075-59 = "因為這是欺騙消費者的行為。"
10018075-62 = "我想你應該也聽過「水至清則無魚」這句話吧。"
10018075-63 = "您不認為至少得努力讓水保持乾淨嗎？"
10018075-64 = "執著於這些枝微末節的小事，甚至還不請自來的你們比較奇怪吧？"
10018075-65 = "不，真正奇怪的應該是喵食品的應對方式才對哦？"
10018075-66 = "我對你剛才的發言很不滿意。"
10018075-67 = "我也不得不對您意外膚淺的想法與回覆表達失望。"
10018075-74 = "……！"
10018075-75 = "……！"
10018075-76 = "既然如此，那就來對決吧。"
10018075-78 = "是什麼樣的對決？"
10018075-80 = "很簡單。就來場料理對決吧。"
10018075-81 = "既然你們對品質很有意見，就用彼此的料理來一決高下吧。"
10018075-82 = "以雙方都能對結果心服口服……公平公正的方式。"
10018075-88 = "先等一下。不覺得很可疑嗎？會不會是陷阱……？"
10018075-89 = "嗯？什麼意思？"
10018075-90 = "這樣真的好嗎，羽留奈？"
10018075-92 = "就算是陷阱也要正面迎戰，這才是我們美食研究會啊。"
10018075-96 = "我接受這項提議。"
10018075-97 = "恰巧現在是年節期間……"
10018075-98 = "新年……我也對只有這段期間才能吃到的料理十分感興趣。"
10018075-99 = "對決的項目……不如就選「御節料理」吧。"
10018075-100 = "御節料理？"
10018075-101 = "手工製作起來不僅相當費工，調味也意外的困難呢。"
10018075-102 = "沒錯。不但適合考驗彼此的料理實力，以時節來講也正合適吧？"
10018075-103 = "決定勝負的方法為何？"
10018075-104 = "以相同品質和數量的食材製作御節料理，然後請商會的成員們試吃。"
10018075-105 = "從中獲得較多好評的人就是贏家……是這個意思吧。"
10018075-106 = "正是如此。如果喵食品贏的話，你們就必須乖乖離開麻雀亭。#n呣呵呵呵。"
10018075-107 = "但如果是我們贏的話，你們就不能繼續騷擾麻雀亭，這樣行吧？"
10018075-108 = "沒問題，我接受這個條件。"
10018075-109 = "我們也願意接受。"
10018075-110 = "雖然只是假設，但堂堂喵食品的會長應該不會出爾反爾吧？"
10018075-111 = "呣呵呵呵。我以喵食品的名聲擔保，絕對不會有那種事。"
10018075-116 = "我知道這樣說可能有點奇怪，但事情是不是變得有點麻煩？"
10018075-117 = "說什麼傻話！這可是宣傳喵食品名聲的好機會。"
10018075-118 = "宣傳……是嗎？"
10018075-119 = "沒錯。美食研究會不是在學生間頗具「盛名」嗎？"
10018075-120 = "（我反而覺得你現在才知道這件事比較不可思議……）"
10018075-121 = "如果「喵食品戰勝了對料理講究的美食研究會」這件事傳出去的話會怎麼樣？"
10018075-123 = "肯定能矗立喵食品在奇普托斯學生間的地位吧！"
10018075-124 = "聽好了！以學生為對象的生意是絕對不會失敗的！"
10018075-125 = "唔嗯……如果會長的慧眼如此判斷的話……"
10018075-126 = "話說回來，這樣我們應該能拿到超時部分的加班費吧？"
10018075-127 = "先給我做出成果！報酬的事之後再說！"
10018075-128 = "……我就知道會這樣。"

[translation]
10018075-10 = "บอกให้หัวหน้าออกมาเดี๋ยวนี้! ไม่สิ ท่านประธานรึเปล่านะ? จะอะไรก็ช่าง ออกมาเดี๋ยวนี้!"
10018075-11 = "ถ้าไม่ออกมาละก็ จะจัดชุดใหญ่ไฟกะพริบเลยนะคะ★"
10018075-12 = "ว้าว! อาหารนั่นดูน่ากินจังเลย! ขอลองชิมหน่อยได้มั้ย? ชิมได้รึเปล่า?"
10018075-19 = "...แบบนี้ คงต้องออกไปแล้วนะคะ"
10018075-20 = "หนึ่งในเจ้าพวกนั้นมีคนที่กินวัตถุดิบหมดคลังได้อยู่ด้วยนะคะ..."
10018075-21 = "ฮึ่มมม! ความเสียหายชักรุนแรงขึ้นแล้วสิ! เพื่อยับยั้งความเสียหายไม่ให้ลุกลามไปมากกว่านี้...!"
10018075-23 = "ดีละ! ในฐานะนักธุรกิจ ฉันตัดสินใจแล้ว! ฉันจะยอมเอาตัวเองเข้าแลกเอง!"
10018075-27 = "ก่อนที่เราจะพูดคุยธุระกัน... ขอบคุณสำหรับการต้อนรับที่ยิ่งใหญ่ค่ะ "
10018075-28 = "ฮุฮุฮุ ไม่เป็นไร "
10018075-29 = "ขอถามเหตุผลที่เล่นใหญ่ขนาดนี้หน่อยได้ไหมคะ?"
10018075-30 = "ฉันคือประธานของบริษัทเนียวฟู้ด หรือก็คือผู้ที่มีอำนาจดูแลสูงสุด"
10018075-31 = "ถ้าเกิดบุกเข้ามาพูดคุยอย่างกะทันหันโดยไม่ได้นัดหรือจองล่วงหน้าละก็"
10018075-32 = "ระบบรักษาควมปลอดภัยก็จะทำงานทันทียังไงล่ะ"
10018075-33 = "ถ้างั้นที่พูดมาหมายความว่า ถ้าเราทำตามขั้นตอนก็จะได้เข้าประชุมกับคุณตามปกติเหรอคะ?"
10018075-34 = "ฮุฮุฮุ... เรื่องนั้นก็ขึ้นอยู่กับช่วงเวลาด้วย... "
10018075-35 = "แต่ก็อาจใช้เวลานานนิดหน่อย อาจจะสักหนึ่งเดือน หรือสองเดือน..."
10018075-36 = "ถ้าอย่างนั้นการบุกเข้ามาก็อาจเป็นคำตอบที่ถูกต้องแล้วค่ะ"
10018075-37 = "ขอบคุณที่บอกนะคะ"
10018075-38 = "เลิกพูดเกริ่นแล้วมาเข้าเรื่องกันเถอะค่ะ"
10018075-39 = "การต้อนรับที่ดี ความคุ้มค่าและการปรับปรุง คือพื้นฐานของการบริหารธุรกิจไงล่ะ"
10018075-40 = "ถ้าอย่างนั้นก็ช่วยหยุดพฤติกรรมการขายของจำนวนมากเพื่อให้ได้กำไรสูงสุด ที่ทำลายรสชาติและ#nคุณภาพของอาหารสิคะ?"
10018075-41 = "ฉันไม่เห็นเข้าใจเลย เรื่องนั้นเป็นปัญหาตรงไหนกัน?"
10018075-42 = "ตายจริง ฉันก็ไม่คิดว่าคุณจะยอมรับปัญหาที่มันไม่ชัดเจนอยู่แล้วค่ะ"
10018075-43 = "คุณให้ความสำคัญกับการบริหารมากเกินไปจนสูญเสียความสามาถในการตัดสินใจไปแล้วหรือคะ?"
10018075-44 = "คนส่วนใหญ่น่ะเค้าไม่สนใจเรื่องเล็กๆ น้อยๆ อย่างเรื่องรสชาติกันหรอกนะ"
10018075-45 = "อาหารน่ะ ยิ่งราคาถูก ปริมาณเยอะๆ ก็ยิ่งทำให้คนพอใจ"
10018075-50 = "ถ้าเป็นไปตามที่เธอบอกมาละก็ อาหารและวัตถุดิบที่ต่ำกว่ามาตรฐานที่คิดก็จะต้องถูกทำลายหมดเลย#nแบบนั้นสิ?"
10018075-51 = "ทำไมต้องทำเรื่องที่ไม่คุ้มค่าแบบนั้นด้วยล่ะ?"
10018075-58 = "ฉันคงจะต้องตอบคำถามเรียกสามัญสำนึกสักหน่อยแล้วค่ะ"
10018075-59 = "นั่นมันเป็นการกระทำที่หลอกลวงผู้คนค่ะ"
10018075-62 = "น้ำที่ใสสะอาดเกินไป ปลาก็มีชีวิตอยู่ไม่ได้หรอกนะ"
10018075-63 = "แต่อย่างน้อยเราก็ควรพยายามไม่ให้น้ำมันขุ่นไม่ใช่เหรอคะ?"
10018075-64 = "พวกเธอเคยคิดว่าตัวเองแปลกบ้างไหม ที่เอาแต่ยึดติดกับเหตุผลเล็กๆ น้อยๆ พวกนั้นน่ะ?"
10018075-65 = "ไม่เคยเลยสักครั้งค่ะ สำหรับพวกเราสิ่งที่แปลกคือทีท่าการรับมือของทางเนียวฟู้ดต่างหากค่ะ"
10018075-66 = "คำพูดเมื่อกี้ ไม่ถูกใจเอาซะเลยจริงๆ"
10018075-67 = "คงต้องบอกว่าฉันรู้สึกผิดหวังอย่างมากกับคำตอบที่ดูพึงพอใจอย่างไม่คาดคิดของคุณนะคะ"
10018075-74 = "...!"
10018075-75 = "...!"
10018075-76 = "ถ้างั้นก็ดี ถ้างั้นฉันก็ขอเสนอให้เรามาแข่งกัน"
10018075-78 = "\"แข่งขัน\" งั้นเหรอคะ?"
10018075-80 = "การแข่งขันง่ายๆ... แข่งทำอาหารยังไงล่ะ  "
10018075-81 = "ในเมื่อเป็นปัญหาเกี่ยวกับคุณภาพของอาหาร ก็มาเอาชนะกันด้วยฝีมือในการทำอาหารเลยสิ"
10018075-82 = "มาแข่งขันกันอย่างยุติธรรม... จะได้ไม่มีใครคัดค้านได้"
10018075-88 = "เดี๋ยวก่อน แบบนี้มันแปลกๆ นะ? ดูเหมือนกับดักเลย?"
10018075-89 = "หืม? พูดอะไรของเธอน่ะ?"
10018075-90 = "จะไม่เป็นไรแน่เหรอฮารุนะ?"
10018075-92 = "ถึงจะเป็นกับดักก็ตาม แต่ชมรมชิมอาหารของเราจะฝ่าฟันอุปสรรคตรงหน้าไปให้ได้..."
10018075-96 = "พวกเรายินดีรับข้อเสนอนั้นค่ะ"
10018075-97 = "ตอนนี้ก็เป็นช่วงเทศกาลปีใหม่พอดีเลยนะ"
10018075-98 = "ใช่แล้วค่ะ แค่อาหารที่หาทานได้ในช่วงเทศกาลนี้ก็นับว่ามีเสน่ห์มากแล้วค่ะ"
10018075-99 = "หัวข้อการแข่งก็คือ... \"โอเซจิ\" ยังไงล่ะ"
10018075-100 = "โอเซจิงั้นเหรอคะ?"
10018075-101 = "อาหารที่มีกรรมวิธีการปรุงที่ซับซ้อน และทำออกมาให้อร่อยได้ยากงั้นสินะคะ"
10018075-102 = "ใช่แล้ว ถึงจะเป็นการแข่งเพื่อวัดฝีมือการทำอาหาร แต่อย่างน้อยก็ควรคำนึงถึงช่วงเวลาด้วยสิ?"
10018075-103 = "วิธีการแข่งล่ะคะ?"
10018075-104 = "เราจะใช้วัตถุดิบที่มีคุณภาพเดียวกันและปริมาณเท่ากัน และนำไปให้สมาชิกย่านการค้าเป็นผู้ชิม!"
10018075-105 = "ถ้าอย่างนั้น อาหารของฝ่ายที่ได้รับการโหวตว่าอร่อยกว่าจะเป็นฝ่ายชนะสินะคะ"
10018075-106 = "ตกลงตามนั้น ถ้าเกิดเนียวฟู้ดเป็นฝ่ายชนะละก็ พวกเธอจะต้องยอมรามือไปจากร้านซุซุเมะแต่โดยดี ฮุฮุฮุ..."
10018075-107 = "แต่ถ้าพวกฉันชนะละก็ ฝ่ายคุณก็ห้ามรังแกร้านร้านซุซุเมะอีกนะคะ"
10018075-108 = "เอางั้นก็ได้"
10018075-109 = "พวกเราก็ตกลงตามนั้นค่ะ"
10018075-110 = "ฉันแค่พูดเผื่อเอาไว้ก่อนนะคะ คนที่เป็นถึงท่านประธานอย่างคุณ คงไม่กลับคำง่ายๆ หรอกใช่มั้ยคะ?"
10018075-111 = "ฮุฮุฮุ... ฉันเอากำไรของเนียวฟู้ดเป็นประกันเลยว่าจะไม่เกิดเรื่องแบบนั้นแน่นอน "
10018075-116 = "ฉันเองก็ไม่อยากพูดแบบนี้หรอกนะคะ แต่ว่ามันจะไม่ยุ่งยากไปหน่อยเหรอคะ?"
10018075-117 = "เจ้าเด็กโง่! นี่ก็เป็นถือเป็นการโปรโมตอย่างหนึ่งนะ"
10018075-118 = "โปรโมต... งั้นเหรอคะ?"
10018075-119 = "ใช่ ฉันลองหาข้อมูลมาแล้ว ชื่อเสียงของพวกชมรมชิมอาหารน่ะ โด่งดังมากแม้แต่ในหมู่นักเรียนกันเอง"
10018075-120 = "(...น่าแปลกกว่าอีกที่เพิ่งจะมารู้เรื่องข้อมูลพวกนั้นน่ะ...)"
10018075-121 = "แล้วถ้าเราเอาเรื่องที่เนียวฟู้ดถูกความดื้อดึงของชมรมชิมอาหารที่มีแต่ชื่อเสียงไม่ดีแบบนั้นก่อกวนไป#nบอกให้พวกคนขายของรู้ล่ะ?"
10018075-123 = "สถานะของเนียวฟู้ดในหมู่นักเรียนของคิโวทอสน่ะต้องชนะขาดลอยอยู่แล้วละ!"
10018075-124 = "คอยดูให้ดี! ธุรกิจที่มีนักเรียนเป็นเป้าหมายแบบนี้น่ะ ไม่มีทางพังทลายเด็ดขาด!"
10018075-125 = "ก็นะ... ถ้าประธานมีวิสัยทัศน์แบบนั้น..."
10018075-126 = "ว่าแต่ว่าท่านประธานจะจ่ายค่าโอทีให้พวกเราด้วยมั้ยคะ?"
10018075-127 = "คอยดูผลลัพธ์การแข่งก่อน แล้วค่อยมาเรียกค่าตอบแทนสิ! "
10018075-128 = "...คิดแล้วว่าต้องเป็นแบบนี้"

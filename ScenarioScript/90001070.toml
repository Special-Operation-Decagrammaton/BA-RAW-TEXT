90001070-70 = "3;리오;05;기다려. 금방 찾아볼 테니까……! \n#3;sig"
90001070-71 = "3;리오;05;우선 포위 방향은 단방향이야. 너희가 진입해 온 쪽으로는 완전히 막혔다고 보면 돼!\n#3;sig\n#3;greeting"
90001070-72 = "3;리오;05;시설 안쪽으로 이어지는 길은 열려 있어. 상대적으로 병력이 적어. 뒤편의 출구로도 이어져 있고!\n#3;sig"

[translation]
90001070-1 = "第7話;探索"
90001070-3 = "[ns]「這裡是……？」"
90001070-5 = "看起來是我們破壞的電波設施……與這座設施之間的連接通道。"
90001070-6 = "唔嗯，剛才炸藥好像放太多了。#n衝擊波幾乎把這裡變得面目全非。"
90001070-11 = "我只是謹遵前輩們的教誨而已。"
90001070-12 = "尤其某位前輩總是在報告上寫「炸藥永遠不嫌少」之類的話。"
90001070-18 = "[ns]（總覺得好像知道那份報告是誰寫的……）"
90001070-22 = "附近沒有偵測到敵方兵力的動靜。#n應該可以再稍微推進一點。"
90001070-23 = "就這麼做吧。我也慢慢開始產生興趣了。"
90001070-27 = "能聽見有機械裝置在運作的聲音。#n那是……輸送帶嗎？"
90001070-28 = "沒錯，它們好像已經對開採到的資源完成初步加工，並且準備運送到其他地方了。"
90001070-29 = "看來這個設施應該是類似「加工工廠」的地方。"
90001070-30 = "話雖如此，這座工廠的規模也未免太龐大了。#n簡直讓人有種置身於煉鋼廠的錯覺。"
90001070-32 = "移動痕跡、探鑽機械、電波干擾設施，以及資源加工工廠……"
90001070-33 = "……這片區域究竟發生了什麼？#n而且我們剛才鬧出了那麼大的動靜，為何對方完全沒有察覺呢？"
90001070-34 = "所謂的危險……往往不容易察覺。"
90001070-36 = "確認雷達設施運作中斷。敵人已進入設施。"
90001070-37 = "也就是說，真正的好戲要登場了嗎？"
90001070-38 = "只，只要引誘他們往更深處……往那個地方去就行了嗎？#n交，交給我吧！"
90001070-39 = "呵呵呵……這是個非常單純的戰術。#n先把敵人引誘到最深處，然後再一網打盡。"
90001070-40 = "兵力轉換配置完畢。#nAin，輪到你上場了。"
90001070-41 = "是，是！雖，雖然不太清楚原因，#n但聽說驅趕兔子或鹿之類的草食動物就應該這麼做！要把牠們從山下趕到山上！"
90001070-42 = "這是Soph告訴我的！"
90001070-43 = "應該要反過來才對吧？"
90001070-44 = "咦咦咦！？#n是，是嗎……原來我又……"
90001070-45 = "這也沒辦法。#n誰叫我們也沒實際看過兔子或鹿之類的動物。"
90001070-55 = "什，什麼！？"
90001070-56 = "難道說……？#n已確認出現大量敵方兵力！"
90001070-64 = "是十字神名的兵力……？#n數量跟以往不是同一個等級。該怎麼辦，部長？"
90001070-65 = "我立刻準備應戰。"
90001070-66 = "不……不行，季。#n英美說得對，敵人的數量實在多到難以應付！"
90001070-67 = "更何況Abi-Eshuh的設計，本來就不適合在空間狹隘的室內戰鬥！"
90001070-68 = "我，我明白了，莉央大人。"
90001070-69 = "莉央？有能讓我們逃出去的路線嗎！？"
90001070-70 = "稍等一下，我正在計算……！"
90001070-71 = "首先，敵人只從一個方向出現。#n你們剛才進入設施的路線已經被完全封鎖了！"
90001070-72 = "不過通往設施內部的道路是暢通的。#n不僅兵力相對稀少，那個方向也連接著通往後方的出口！"
90001070-73 = "換句話說，現在只能往資源被運送出去的方向，也就是輸送帶的另一端前進了呢。"
90001070-74 = "雖然不知道那裡會有什麼在等著我們，#n但是比起和源源不絕從後方逼近的敵方主要部隊交戰……"
90001070-82 = "嗯，會長的方法確實更有可行性。"
90001070-83 = "我看還是由我來應戰吧。"
90001070-84 = "不用，真的不用。"
90001070-88 = "……我明白了。#n那麼我會盡快為大家開路。"
90001070-97 = "（雖然總覺得對方是在請君入甕……）"
90001070-98 = "（不……沒必要往壞處去想。#n　畢竟老師和陽葵都在，現在需要的……是設法解決問題！）"

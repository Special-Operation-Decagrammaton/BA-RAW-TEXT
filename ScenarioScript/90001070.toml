90001070-27 = "3;에이미 수영복ND;02;아직도 기계 장치들이 작동하는 소리가 들려. 저건…… 컨베이어 벨트인가?\n#3;em;[?]"
90001070-28 = "3;에이미 수영복ND;02\n1;토키 모드 2;01;네. 채취한 자원들을 1차적으로 가공하여, 다시 어딘가로 운반할 준비를 끝마치고 있군요.\n#1;ar\n#3;m4"
90001070-29 = "1;토키 모드 2;02;이곳은 일종의 '가공 공장'과도 같은 시설인 것으로 보입니다.\n#1;m2"
90001070-30 = "3;에이미 수영복ND;02\n1;토키 모드 2;01;그건 그렇고, 엄청난 규모로군요. 거대한 제철소 내부에 들어와 있는 기분입니다.\n#1;m3\n#3;dr"
90001070-31 = "#all;hide"
90001070-32 = "3;히마리 방한복;02;이동 흔적, 시추 기계들, 전파 방해 시설, 그리고 자원 가공 공장…….\n#3;em;…"
90001070-33 = "3;히마리 방한복;05;……이 지역에서 도대체, 무슨 일이 일어나고 있는 걸까요? 그리고 왜 이 정도의 사태가 벌어지고 있었는데, 아무도 그 사실을 알아차리지 못했던 거죠?"
90001070-34 = "3;리오;07;위험이라는 건……. 보통 그런 법이니까.\n#3;sig"
90001070-35 = "#all;hide"
90001070-36 = "1;소프;07;레이더 사이트 작동 중지 확인. 그리고 적들의 시설 진입 확인.\n#1;a"
90001070-37 = "1;소프;03;그러면, 이제부터 진짜로 시작해 볼까?\n#1;em;[?]"
90001070-38 = "5;아인;05;더, 더욱 깊숙한 곳으로…… 그리고 그곳을 향해, 몰아세우면 되는 거죠? 마, 맡겨 주세요!\n#5;a\n#5;jump"
90001070-39 = "3;오르;09;훗후후…… 기초적인 전술이죠. 최대한 깊숙히 유인한 후, 한 번에 끝장내기.\n#3;a"
90001070-40 = "1;소프;07;병력 전환 배치 완료. 자, 아인. 네 시간이야.\n#1;greeting"
90001070-41 = "5;아인;05;네, 네! 자, 잘은 모르지만, 토끼나 사슴과 같은 초식 동물을 몰아세울 때는 이렇게 해야 한대요! 산 아래에서 위로요!\n#5;jump"
90001070-42 = "5;아인;03;예전에, 소프가 그렇게 말해 줬어요!\n#5;em;[반짝]"
90001070-43 = "1;소프;01;그거, 반대였을걸?"
90001070-44 = "5;아인;07;후에엥?! 그, 그런가요……. 제가 또…….\n#5;stiff\n#5;em;[훌쩍]"
90001070-45 = "3;오르;03;아뇨, 뭐. 우리가 정말로 토끼나 사슴 같은 동물을 본 적은 없으니까 말이죠."

[translation]
90001070-1 = "ตอนที่ 7;สำรวจ"
90001070-3 = "[ns] \"ที่นี่มัน...?\""
90001070-5 = "ดูจะเป็น... ทางเชื่อมต่อกับอุปกรณ์ส่งคลื่นวิทยุที่พวกเราทำลายไปนะ"
90001070-6 = "อืม สงสัยจะใช้ระเบิดมากเกินไปแฮะ คลื่นกระแทกจากระเบิดทำให้เกิดรอยแตกหักเต็มไปหมดเลย"
90001070-11 = "ฉันก็แค่ทำตามสิ่งที่ได้เรียนรู้มาจากพวกรุ่นพี่ค่ะ"
90001070-12 = "มีรุ่นพี่บางคนที่เขียนในรายงานว่า 'ไม่ได้ใช้ระเบิดมากเกินไป' ด้วยนะคะ"
90001070-18 = "[ns] (พอจะเดาได้เลยแฮะว่าเป็นรายงานของใคร...)"
90001070-22 = "ยังไม่พบการเคลื่อนไหวของศัตรูในบริเวณใกล้เคียง ฉันว่าเราน่าจะเดินหน้าต่อได้นะ"
90001070-23 = "เอาตามนั้นเลยค่ะ ฉันก็เริ่มจะสนุกขึ้นมาแล้วสิคะ"
90001070-27 = "ยังได้ยินเสียงเครื่องจักรทำงานอยู่เลย นั่นมัน... สายพานลำเลียงเหรอ?"
90001070-28 = "ใช่ค่ะ ทรัพยากรที่เก็บมาได้จะถูกแปรรูปขั้นแรกก่อน และจะมีการเตรียมพร้อมที่จะขนส่งไปที่ไหนสัก#nแห่งสินะคะ"
90001070-29 = "สถานที่แห่งนี้ดูเหมือนจะเป็น 'โรงงานแปรรูป' อย่างหนึ่งเลยค่ะ"
90001070-30 = "แต่จะว่าไป ที่นี่มันขนาดใหญ่มากเลยนะคะ รู้สึกเหมือนได้อยู่ในโรงงานถลุงเหล็กขนาดยักษ์เลยค่ะ"
90001070-32 = "ร่องรอยการเคลื่อนที่ เครื่องขุดเจาะ อุปกรณ์ส่งคลื่นรบกวน และโรงงานแปรรูปทรัพยากร..."
90001070-33 = "เกิดอะไรขึ้นในพื้นที่นี้คะเนี่ย...? แล้วทำไมมันถึงเกิดขึ้น แต่ไม่มีใครสังเกตเห็นเลยละค่ะ?"
90001070-34 = "นี่เป็นเรื่องปกติ... ของอะไรที่อันตรายน่ะ"
90001070-36 = "เรดาร์หยุดทำงาน และพบการบุกรุกของศัตรูด้วย"
90001070-37 = "ถ้าอย่างนั้น จากนี้ก็ควรเริ่มอย่างจริงจังเลยมั้ย?"
90001070-38 = "ให้ไล่ต้อนไปยังที่ที่ลึกลงไปอีก... และให้ไปยังที่แห่งนั้นเลยใช่มั้ยคะ? วะ... วางใจฉันได้เลยค่ะ!"
90001070-39 = "ฮุฮุฮุ... นั่นมันกลยุทธ์ขั้นพื้นฐานค่ะ หลอกล่อพวกนั้นเข้ามาให้ลึกที่สุด จากนั้นก็จัดการให้หมดในรวด#nเดียว"
90001070-40 = "ย้ายกองกำลังเสร็จแล้ว เอาละ ไอน์ ถึงเวลาของเธอแล้ว"
90001070-41 = "ค่ะ ค่ะ! ฉะ... ฉันก็ไม่ค่อยแน่ใจ แต่เวลาต้อนสัตว์กินพืชอย่างกระต่ายหรือกวาง เห็นว่าต้องไล่ต้อนจาก#nตีนเขาขึ้นไปข้างบนค่ะ!"
90001070-42 = "ซอฟเคยบอกฉันเมื่อนานมาแล้วค่ะ!"
90001070-43 = "ฉันว่าน่าจะตรงกันข้ามนะ?"
90001070-44 = "แง?! ปะ... เป็นอย่างนั้นหรอกเหรอคะ...? ฉันเกือบทำพลาดอีกแล้ว..."
90001070-45 = "ไม่เป็นไรหรอกค่ะ ก็พวกเราไม่เคยเห็นสัตว์อย่างกระต่ายหรือกวางกันจริงๆ เลยนี่คะ"
90001070-55 = "อะ... อะไรกันคะ?!"
90001070-56 = "เป็นไปได้ยังไง...? เราพบกองกำลังขนาดใหญ่ของศัตรู!"
90001070-64 = "กองกำลังของเดคาแกรมมาทอนเหรอ...? เราไม่เคยเจอกองกำลังมากมายขนาดนี้มาก่อนเลยนะ ทำยังไงดีล่ะ หัวหน้า?"
90001070-65 = "ฉันจะเตรียมรับมือเดี๋ยวนี้ค่ะ"
90001070-66 = "ไม่... ไม่ต้องหรอกโทคิ เอมิพูดถูกแล้วละ พวกเธอรับมือศัตรูมากมายขนาดนั้นไม่ไหวหรอก! มันเยอะมากเกินไป!"
90001070-67 = "อีกอย่าง อาบี เอชูห์ก็ไม่ได้เป็นอาวุธที่สร้างขึ้นมาเพื่อใช้งานในที่แคบๆ แบบนี้ด้วย!"
90001070-68 = "ขะ... เข้าใจแล้วค่ะ ท่านริโอะ"
90001070-69 = "ริโอะ? มีเส้นทางให้เราหนีออกไปมั้ยคะ?!"
90001070-70 = "รอเดี๋ยวนะ ฉันจะรีบหาให้เดี๋ยวนี้...! "
90001070-71 = "ตอนนี้ศัตรูปิดล้อมเข้ามาจากทิศทางเดียว เท่ากับว่าเส้นทางที่พวกเธอบุกเข้าไปโดนปิดกั้นหมดแล้ว!"
90001070-72 = "มีทางเชื่อมเข้าไปในอาคารอยู่ ตรงนั้นมีกองกำลังจำนวนไม่มาก แล้วก็เชื่อมกับทางออกด้านหลังด้วย!"
90001070-73 = "ถ้าอย่างนั้น ทิศทางที่เราไปได้ก็คือฝั่งตรงข้ามที่เป็นจุดส่งทรัพยากรที่แปรรูปแล้ว งั้นก็คงเลยสายพาน#nลำเลียงไปสินะคะ"
90001070-74 = "ฉันไม่รู้ว่าอะไรกำลังรอพวกเราอยู่หรอกนะ แต่ถ้าเทียบกับการไปเผชิญหน้ากับกองกำลังที่แห่กันเข้า#nมาจากทางข้างหลังแล้ว..."
90001070-82 = "อืม ฉันว่าวิธีที่ประธานเสนอมาน่าจะเข้าท่ากว่า"
90001070-83 = "แต่ถ้าให้ฉันไปต้านไว้..."
90001070-84 = "ไม่ได้ ตอนนี้ให้เธอทำอย่างนั้นไม่ได้หรอก"
90001070-88 = "เข้าใจแล้วค่ะ... แล้วฉันจะรีบไปเปิดทางให้ค่ะ"
90001070-97 = "(รู้สึกเหมือนกำลังถูกต้อนให้ไปติดกับเลย...)"
90001070-98 = "(ไม่สิ... เลิกคิดในแง่ลบได้แล้ว ที่นี่มีทั้งครูและฮิมาริอยู่ สิ่งที่จำเป็นคือ... ต้องแก้ปัญหา...!)"

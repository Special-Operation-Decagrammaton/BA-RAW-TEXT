[translation]
90001070-1 = "Episode 7;Exploration"
90001070-3 = "[ns] \"This is...?\""
90001070-5 = "This passageway connects the destroyed facility with this one."
90001070-6 = "Um. We may have deployed too much gunpowder. The shockwave shattered everything."
90001070-11 = "I merely followed the teachings passed down from my upperclassmen."
90001070-12 = "One particular person's proverb was: There's no such thing as too much gunpowder."
90001070-18 = "[ns] \"(I know exactly whose 'proverb' that was...)\""
90001070-22 = "I haven't detected any movement from enemy troops. You're clear to move forward."
90001070-23 = "Let's go. I'm getting more and more intrigued."
90001070-27 = "I am registering sounds of machinery operating. A...conveyor belt?"
90001070-28 = "Yes. After refining the mined resources, it would seem they are transporting them elsewhere."
90001070-29 = "I would surmise this to be a processing factory."
90001070-30 = "On a massive scale. It's akin to a large steel mill."
90001070-32 = "A mysterious trail...drilling machines...a signal jamming facility and processing factory..."
90001070-33 = "Operations of this scale have been happening in this region? Without a single person noticing?"
90001070-34 = "Nefarious schemes...play out that way rather often."
90001070-36 = "The radar site is down. We've spotted the enemy at the entrance to the second facility."
90001070-37 = "Now, then. Shall we get started?"
90001070-38 = "G-Getting started means...forcing them deeper...towards that place? I-I can do it!"
90001070-39 = "Heh, heh, heh. A rudimentary tactic. Lure them into our clutches, and eradicate them as they dance in the palm of our hand."
90001070-40 = "Troop deployment complete. Now, Ein. Fulfill your role."
90001070-41 = "Y-Yes! Yes! It's slightly beyond my comprehension, but this is how one hunts down \"prey animals\" like rabbits and deer! From the base of the mountain to its apex!"
90001070-42 = "I learned of this from Sof!"
90001070-43 = "Other way around."
90001070-44 = "HYAAH?! R-Really? Not...again..."
90001070-45 = "How does Sof know? We've never actually even encountered something like a \"rabbit\" or a \"deer.\""
90001070-55 = "Wh-What is this?!"
90001070-56 = "This can't be...?! A massive force of enemy troops preparing to engage you!"
90001070-64 = "Decagrammaton forces? This is incomparable to our previous battles. What is our next move, President?"
90001070-65 = "I shall prepare for battle."
90001070-66 = "Stand down, Toki. Eimi's assessment is correct. Even you can't hope to take down an enemy force of that size!"
90001070-67 = "Furthermore, Abi-Eshuh wasn't designed to function in narrow, indoor terrain."
90001070-68 = "Ah. Understood, Ms. Rio."
90001070-69 = "Is there no escape route we can use?!"
90001070-70 = "Just hold on! I'm looking. I'm looking! "
90001070-71 = "Their force is charging in a single direction. It's blocked off the entrance you came through."
90001070-72 = "There's only one clear path: deeper into the facility. If you follow it all the way down, there's an exit at the back!"
90001070-73 = "So the only route available to us is beyond the conveyor belt, to wherever the processed resources are being sent."
90001070-74 = "There's no knowing what lies on the other side. But I would argue that taking the path would be more efficient than facing the full force of the enemy troops behind us."
90001070-82 = "Mhm. In conclusion, I would agree with Ms. Rio's suggestion."
90001070-83 = "I can prepare for combat—"
90001070-84 = "She said no. There are times to fight. That time is not right now."
90001070-88 = "...Understood. I will clear the way."
90001070-97 = "(This has all the markings of a trap...)"
90001070-98 = "(I can't fall prey to these negative thoughts. With both Sensei and Himari here...we can push through this!)"

[translation]
10038050-1 = "第5話;與你的世界相會之時"
10038050-15 = "可惡……簡直沒完沒了……！"
10038050-16 = "快要天亮了呢。"
10038050-20 = "已經過這麼久了……？"
10038050-21 = "畢竟我們到的時候已經是深夜了啊。#n不過話雖如此，兵力居然有這麼多……！"
10038050-22 = "不，就快結束了。#n對方的增援似乎已經停止了。"
10038050-23 = "但問題是……我們也快到極限了。"
10038050-27 = "你說什麼？才這點程度就……！？"
10038050-35 = "別逞強了。看看你腿都軟了。"
10038050-36 = "……！"
10038050-37 = "不，還沒完！#n我可是玄龍門的先鋒和執行部長！象徵著玄龍門的力量和決心啊！"
10038050-42 = "寧為玉碎，不為瓦全！"
10038050-56 = "（這樣下去還是寡不敵眾……該怎麼辦……！）"
10038050-61 = "門主大人駕到！"
10038050-69 = "門主大人駕到！"
10038050-70 = "這個聲音是……！？"
10038050-78 = "辛苦了。美奈，令女。"
10038050-80 = "門，門主大人！"
10038050-81 = "玄龍門……？門主大人親自來了……？"
10038050-83 = "妾身已接獲報告。#n也得知鍊丹術研究會發生了什麼。"
10038050-84 = "請，請下懲處！#n如此眾多的外部兵力潛入山海經，我卻沒能及時應對──"
10038050-85 = "夠了，退下休息吧。"
10038050-89 = "……若鍊丹術研究會發生的事如妾身所料，即便是玄龍門的執行部長也無能為力。"
10038050-91 = "什麼？您的意思是……#n鍊丹術研究會究竟發生了什麼……？"
10038050-97 = "……答案很快便會揭曉。"
10038050-103 = "真是盛大的歡迎呢。#n簡直讓人不知道該作何感想才好。"
10038050-104 = "是該為玄龍門無法應對這種情況而感到悲傷……"
10038050-108 = "還是該為門主大人親自出馬感到高興呢？"
10038050-110 = "[ns]「你是……？」"
10038050-114 = "那位大人是……？"
10038050-119 = "啊啊，是傳聞中的老師嗎。"
10038050-120 = "這還真是意外的收穫呢。咯咯咯。#n我本來希望我們的相遇能更具意義和戲劇性。"
10038050-121 = "雖然目前的戲劇性還算充足……"
10038050-122 = "但我更期待能在相對從容的情況下，與老師互相了解。"
10038050-123 = "[s]「……」"
10038050-124 = "……是啊，對老師而言是初次見面吧。#n對在場的大多數學生亦同。"
10038050-125 = "如何，申谷誡。汝要自己報上名號嗎？#n還是要由妾身代勞呢？"
10038050-130 = "……！？"
10038050-131 = "（那個人……就是傳聞中的申谷誡！？鍊丹術研究會以前的……瘋狂會長……？）"
10038050-133 = "過度的親切是劇毒唷，妃姬。"
10038050-134 = "若是以前的汝，想必會說「毒用得好也能成為藥」吧。"
10038050-135 = "這個想法本身並沒有錯。#n不過眼下更應以藥為藥、以毒為毒才是。"
10038050-139 = "很高興見到你們，玄龍門的各位──還有老師。"
10038050-140 = "我是被隨意列入七罪人之一的申谷誡。"
10038050-142 = "[ns]「……！」"
10038050-143 = "山海經驅逐了我，試圖讓我遭人遺忘……"
10038050-144 = "但我從未忘記山海經，也不曾遺忘鍊丹術研究會。"
10038050-145 = "看吧，妃姬。#n即便歷經千辛萬苦，我仍然回到了這裡。"
10038050-151 = "……汝打算做什麼。"
10038050-152 = "當然是奪回屬於我的東西囉。"
10038050-153 = "鍊丹術研究會可不是汝的所有物。"
10038050-154 = "要那麼說當然也沒錯。"
10038050-155 = "奪回鍊丹術研究會的目的何在？"
10038050-156 = "那還用說嗎？當然是完成仙丹。"
10038050-157 = "……又要像當時一般，將眾多學生推入痛苦的深淵嗎？"
10038050-158 = "只要仙丹完成，一切都能恢復原狀──當時也完全可以這麼做。"
10038050-163 = "阻止這一切的人──是你，就是你。#n你就是釀成這一切的罪魁禍首，妃姬。"
10038050-164 = "不過不必擔心。#n我也是有慈悲與憐憫之心的。"
10038050-166 = "哦？那還真令人驚訝。"
10038050-167 = "咯咯咯咯……不過沒關係嗎？#n你的身體已經快到極限了吧？"
10038050-168 = "……！？"
10038050-169 = "一副訝異我怎麼會知道的表情呢。#n我當然知道──怎麼可能不知道呢。"
10038050-170 = "我可以治好你，妃姬。"
10038050-171 = "這也沒什麼好奇怪的。#n畢竟將你變成這副德性的──"
10038050-176 = "不是別人就是我啊？"
10038050-177 = "……！"
10038050-182 = "是啊，妾身早該猜到了。#n除了汝以外還會有誰呢。"
10038050-187 = "（這是什麼意思？）"
10038050-188 = "（不知道……但門主大人的表情不太對勁……）"
10038050-194 = "我有個提議。"
10038050-201 = "只要你把鍊丹術研究會還給我，我就會負責照顧你。"
10038050-202 = "只要能以我的名義，完成製作、測試、應用仙丹的所有過程──"
10038050-203 = "不出一個月，你身體的問題就能解決。"
10038050-207 = "……"
10038050-208 = "汝招致的所有痛苦，妾身全都銘記於心。"
10038050-212 = "那麼多學生深陷痛苦，那麼多學生死命掙扎……"
10038050-213 = "汝卻要妾身為了自身的安寧，眼睜睜地讓汝回來嗎？"
10038050-214 = "妾身的回答和當時一樣。"
10038050-218 = "除非汝深刻反省，否則汝在山海經永無容身之地！"
10038050-223 = "你還真是一如既往啊。"
10038050-227 = "那麼，就在這裡為你的選擇付出代價吧──妃姬。"

[translation]
10038050-1 = "ตอนที่ 5;เมื่อผ่านโลกของเธอ"
10038050-15 = "ยังไม่หมดสักทีสินะ...!"
10038050-16 = "ฟ้าจะสางแล้วค่ะ "
10038050-20 = "นี่เราสู้กันถึงเช้าเลยเหรอเนี่ย...?"
10038050-21 = "ตอนเรามาถึงก็ดึกมากแล้วนี่คะ ขนกองกำลังกันมามากมายขนาดนี้เลยเหรอ...!"
10038050-22 = "ไม่หรอก ทางนั้นก็เหมือนจะหมดคนแล้วละ เหมือนจะหยุดส่งกำลังเสริมแล้วด้วย"
10038050-23 = "แต่ปัญหาคือ... พวกเราก็เริ่มหมดแรงแล้วเหมือนกันค่ะ"
10038050-27 = "พูดอะไรของเธอ? แค่นี้เหนื่อยแล้วเหรอ...?!"
10038050-35 = "จะโอ้อวดกันก็เอาแค่พอดีๆ เถอะค่ะ เมื่อกี้เห็นบ่นว่าขาไม่มีแรงแล้วไม่ใช่เหรอคะ?"
10038050-36 = "...!"
10038050-37 = "ใครบ่น? ไม่ใช่ฉันนะ ฉันยังไม่เหนื่อยหรอก! ฉันเป็นถึงหัวหน้าคณะกรรมการมังกรดำเชียวนะ! ฉันคือสัญลักษณ์ของพลังและความมุ่งมั่นของมังกรดำ!"
10038050-42 = "ไม่ว่าจะหักกี่ร้อยครั้งก็ไม่งอหรอก!"
10038050-56 = "(แต่ถึงยังไง น้ำน้อยก็ย่อมแพ้ไฟอยู่แล้ว... จะทำยังไงดี...!)"
10038050-61 = "ท่านประมุขมาแล้ว!"
10038050-69 = "ท่านประมุขมาแล้ว!"
10038050-70 = "เสียงนี้มัน...?!"
10038050-78 = "ทำได้ดีมาก มินะ เรย์โจว"
10038050-80 = "ทะ... ท่านประมุข!"
10038050-81 = "มังกรดำ...? ท่านประมุขมาที่นี่ด้วยตัวเองเลยเหรอคะ...?"
10038050-83 = "เราได้รับรายงานว่าเกิดเรื่องขึ้นในชมรมวิจัยศาสตร์การปรุงยา"
10038050-84 = "ฉะ... ฉันสมควรถูกลงโทษค่ะ! กองกำลังจากภายนอกจำนวนมากแทรกซึมเข้ามาในซานไห่จิง แต่ฉันเตรียมรับมือล่วงหน้าไม่ได้เลย..."
10038050-85 = "ไม่จำเป็นหรอก กลับไปพักกันเถอะ"
10038050-89 = "ถ้าเรื่องที่เกิดขึ้นข้างในนั้นเป็นไปตามที่เราคาดไว้ แม้แต่ฝ่ายปฏิบัติการของมังกรดำก็คงทำอะไรไม่ได้"
10038050-91 = "คะ? ถ้าท่านถึงกับพูดแบบนั้น... ตอนนี้เกิดอะไรขึ้นในชมรมวิจัยศาสตร์การปรุงยากันแน่...?"
10038050-97 = "ตอนนี้เราน่าจะได้คำตอบของคำถามนั้นแล้วละ..."
10038050-103 = "เป็นการต้อนรับที่ยิ่งใหญ่จังเลยนะ ฉันควรดีใจหรือเสียใจดี?"
10038050-104 = "ฉันควรเสียใจที่มังกรดำถดถอยลงไปมากจนรับมือกับสถานการณ์เช่นนี้ไม่ได้"
10038050-108 = "หรือควรดีใจที่ประมุขผู้ไม่มีเรื่องให้ออกจากราชสำนักถึงกับต้องมาที่นี่ด้วยตัวเองดีล่ะ?"
10038050-110 = "[ns] \"เธอคือ...?\""
10038050-114 = "ผู้ใหญ่ที่อยู่ตรงนั้นคือใครน่ะ...?"
10038050-119 = "อ้อ คงเป็นคนนั้นสินะ ครูคนนั้นที่เขาลือกัน?"
10038050-120 = "เป็นผลลัพธ์ที่คาดไม่ถึงเลยแฮะ หึหึหึ ฉันหวังว่าการพบกันของเราจะมีความหมายและน่าทึ่งมากกว่านี้#nหน่อยน่ะ"
10038050-121 = "แต่ต่างคนก็ต่างความคิด นี่ก็อาจเรียกได้ว่าเป็นการพบกันที่น่าทึ่งแล้วก็ได้..."
10038050-122 = "แต่ฉันก็หวังว่านี่จะเป็นการพบกันที่ทำให้เราคลายข้อสงสัยของกันและกันในบรรยากาศที่สบายใจกว่า#nนี้นะ"
10038050-123 = "[s] \"...\""
10038050-124 = "จริงสิ... ครูคงจะเพิ่งเคยเห็นเธอเป็นครั้งแรกสินะ กับนักเรียนหลายคนที่อยู่ตรงนี้ก็ด้วย"
10038050-125 = "ว่าอย่างไรเล่า? ชินทานิ ไค เธออยากแนะนำตัวเองเอง หรืออยากให้เราช่วยแนะนำให้?"
10038050-130 = "...?!?!"
10038050-131 = "(คนคนนั้นคือ... ชินทานิ ไค ที่ล่ำรือกันเหรอ?! หัวหน้าชมรมวิจัยศาสตร์การปรุงยาคนก่อน... ที่ทำอะไรขาดสติน่ะเหรอ...???)"
10038050-133 = "ความใจดีที่มากเกินไปอาจเป็นพิษได้นะ คิซากิ"
10038050-134 = "แต่เธอในสมัยก่อนก็เคยบอกไว้ว่าพิษอาจเป็นยาได้ ถ้าเรารู้วิธีใช้งานไม่ใช่หรือ?"
10038050-135 = "นั่นก็ไม่ใช่ความคิดที่ผิด แต่ตอนนี้เราต้องใช้ยาเพื่อให้เป็นยา และใช้พิษเพื่อให้เป็นพิษน่ะสิ"
10038050-139 = "ดีใจที่ได้เจอนะ มังกรดำทุกคน แล้วก็ครูด้วย"
10038050-140 = "ฉันคือชินทานิ ไค หนึ่งในเจ็ดอาชญากร"
10038050-142 = "[ns] \".....!\""
10038050-143 = "ถึงซานไห่จิงจะไล่ฉันออกและพยายามทำให้ฉันเป็นคนที่ถูกลืมเลือน..."
10038050-144 = "แต่ฉันไม่ลืมซานไห่จิงหรอกนะ แล้วก็ไม่ลืมชมรมวิจัยศาสตร์การปรุงยาด้วย"
10038050-145 = "ดูฉันสิ คิซากิ ฉันต้องเจอความยากลำบากมากมายกว่าจะกลับมาได้ สุดท้ายฉันก็กลับมาที่นี่ได้อีกครั้ง"
10038050-151 = "เธอคิดจะทำอะไร...?"
10038050-152 = "ฉันก็จะเอาของของฉันคืนมาน่ะสิ"
10038050-153 = "ชมรมวิจัยศาสตร์การปรุงยาไม่ใช่ของของเธอนะ"
10038050-154 = "ไม่แปลกหรอกถ้าเธอจะคิดแบบนั้น"
10038050-155 = "เธอคิดจะทำอะไรกับชมรมวิจัยศาสตร์การปรุงยากันแน่?"
10038050-156 = "มันก็แน่อยู่แล้วไม่ใช่เหรอ ฉันก็จะทำน้ำอมฤตให้เสร็จสมบูรณ์น่ะสิ"
10038050-157 = "จะมาสร้างความเดือดร้อนให้นักเรียนมากมายเหมือนครั้งก่อนน่ะหรือ...?"
10038050-158 = "ถ้าน้ำอมฤตเสร็จสมบูรณ์ ฉันก็สามารถย้อนคืนทุกอย่างได้ ในตอนนั้นก็น่าจะทำแบบนั้นได้นะ"
10038050-163 = "เธอเลย เธอนั่นละ เธอขัดขวางทุกอย่างของฉัน เธอคือต้นเหตุของเรื่องทั้งหมดนี้ คิซากิ"
10038050-164 = "แต่ก็ไม่ต้องกังวลไปหรอกนะ ฉันยังคงมีความรู้สึกสงสารและเห็นอกเห็นใจเธออยู่"
10038050-166 = "โฮ่ เป็นเรื่องที่น่าประหลาดใจเสียจริง"
10038050-167 = "หึหึหึหึ... ว่าแต่จะไม่เป็นอะไรเหรอ? ฉันว่าร่างกายของเธอน่าจะถึงขีดจำกัดแล้วนะ?"
10038050-168 = "...?!"
10038050-169 = "ดูทำหน้าเข้าสิ สงสัยสินะว่าฉันรู้เรื่องนั้นได้ยังไง ฉันต้องรู้อยู่แล้วละ "
10038050-170 = "ฉันทำให้เธอหายได้นะ คิซากิ"
10038050-171 = "มันก็แน่นอนอยู่แล้วนี่ ก็คนที่ทำให้เธอเป็นอย่างนั้น"
10038050-176 = "ก็คือฉันยังไงล่ะ?"
10038050-177 = "...!"
10038050-182 = "อืม... เราก็เดาว่าเป็นเช่นนั้น คงเป็นเช่นนั้นนั่นละ เพราะถ้าไม่ใช่เธอแล้วจะมีใครอีกเล่า?"
10038050-187 = "(พวกเขาคุยเรื่องอะไรกันน่ะ?)"
10038050-188 = "(ไม่รู้สิ... แต่ท่านประมุขสีหน้าไม่ค่อยดีเลยแฮะ...?)"
10038050-194 = "ฉันขอเสนออะไรสักอย่างนะ"
10038050-201 = "ถ้าเธอยกชมรมวิจัยศาสตร์การปรุงยาให้ฉัน ฉันจะรับผิดชอบในการดูแลเธอเอง "
10038050-202 = "ถ้าเธออนุญาตให้ฉันทำทุกขั้นตอนของการทำน้ำอมฤต ตั้งแต่การปรุงยา ทดสอบ และประยุกต์ใช้ใน#nนามของฉัน"
10038050-203 = "ร่างกายของเธอก็จะเป็นแค่ปัญหาที่สามารถแก้ไขได้ในเดือนเดียวเท่านั้น"
10038050-207 = "..."
10038050-208 = "เรายังจำทุกความเจ็บปวดที่เธอสร้างขึ้นมาได้"
10038050-212 = "ที่ผ่านมานักเรียนหลายคนต้องทนทุกข์ทรมานและดิ้นรน "
10038050-213 = "เราควรเปิดรับคนอย่างเธออีกครั้งโดยไม่ต้องรับผิดชอบใดๆ เพื่อความสงบสุขของเราเองเช่นนั้นหรือ?"
10038050-214 = "คำตอบของเราก็เหมือนกับตอนนั้น"
10038050-218 = "ตราบใดที่เธอไม่มองย้อนกลับไปแล้วคิดทบทวนให้ลึกซึ้ง ก็จะไม่มีที่ของเธอในซานไห่จิง!"
10038050-223 = "เธอยังเป็นเหมือนเดิมจนถึงที่สุดเลยนะ"
10038050-227 = "ถ้าอย่างนั้นก็รับผลจากการตัดสินใจที่นี่ได้เลย คิซากิ"

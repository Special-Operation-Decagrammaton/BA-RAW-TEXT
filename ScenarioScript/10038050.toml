[translation]
10038050-1 = "Episode 5;When I Pass Your World"
10038050-15 = "They just keep coming!"
10038050-16 = "We've been at it all night. The sun's coming up. "
10038050-20 = "Already?"
10038050-21 = "Well, we did get here late, but still. There's no end to these guys."
10038050-22 = "No, there is. I think they're out of reinforcements."
10038050-23 = "And we're both out of gas."
10038050-27 = "What do you mean? This is nothing..."
10038050-35 = "Enough with the bravado. I can see your legs shaking."
10038050-36 = "*gasp*"
10038050-37 = "No, not yet! I am the vanguard of Genryumon! I stand for its power and determination!"
10038050-42 = "I may fall a hundred times, but I'll never stay down!"
10038050-56 = "(Inspiring words, but we're still losing. What can we do...?)"
10038050-61 = "Make way for the president!"
10038050-69 = "Make way for the president!"
10038050-70 = "What's that sound...?!"
10038050-78 = "Mina, Reijo. Well done, both of you."
10038050-80 = "M-Madam President!"
10038050-81 = "The Genryumon president herself...?"
10038050-83 = "We received your reports. We know what's happening here."
10038050-84 = "I-I'm sorry. I let this whole force slip right into Shanhaijing."
10038050-85 = "That's enough. Step back and rest."
10038050-89 = "If I'm right about what's going on inside that building, not even you could handle it."
10038050-91 = "Huh? What do you mean? What's going on?"
10038050-97 = "Oh, we'll know for sure very soon."
10038050-103 = "A personal welcome from the president. Should I be flattered or disappointed?"
10038050-104 = "Disappointed that Genryumon couldn't manage without you?"
10038050-108 = "Or flattered that you actually left the palace for me?"
10038050-110 = "[ns] \"You're...\""
10038050-114 = "Who's the adult?"
10038050-119 = "Ahh, you must be the famous Sensei."
10038050-120 = "An unexpected bonus. Keh heh. Pardon me, I was hoping to meet you under more dramatic circumstances."
10038050-121 = "Of course, one could argue there's enough drama here at the moment..."
10038050-122 = "But it's so impersonal to you and me. We should be sitting down together, somewhere pleasant, getting to know each other."
10038050-123 = "[s] \"...\""
10038050-124 = "...Yes, this would be your first time meeting Sensei. Yours and half the students here, I'd imagine."
10038050-125 = "So would you rather introduce yourself, or should I save you the trouble, Shintani Kai?"
10038050-130 = "*gasp*"
10038050-131 = "That's Shintani Kai, the one I heard about? The one who ran the Eastern Alchemy Society until she went crazy?"
10038050-133 = "Your politeness is turning rather toxic, Kisaki."
10038050-134 = "The old you would have said even toxins can be medicine, depending on how they're used."
10038050-135 = "And the old me would have been right...but it's time to be a bit more straightforward."
10038050-139 = "Welcome to you all. Members of Genryumon. Sensei."
10038050-140 = "My name is Shintani Kai. I was forcefully, and rather arbitrarily, made one of the Seven Prisoners."
10038050-142 = "[ns] \"...!\""
10038050-143 = "Shanhaijing expelled me and tried to forget me..."
10038050-144 = "...But I have never forgotten Shanhaijing. Or the Society."
10038050-145 = "And now look at me, Kisaki. I've finally finished my long journey home."
10038050-151 = "So what's your plan?"
10038050-152 = "To take back what's mine, of course."
10038050-153 = "The Eastern Alchemy Society is not yours."
10038050-154 = "So you say."
10038050-155 = "And what do you hope to achieve by taking it?"
10038050-156 = "Isn't it obvious? The perfection of the potion."
10038050-157 = "All while throwing countless students into hardship."
10038050-158 = "Only until the potion's finished. Then everything can be restored. As it would have been already, if you hadn't stepped in."
10038050-163 = "You were the one who got in my way. You caused all this, Kisaki."
10038050-164 = "But I'm not without pity, or compassion."
10038050-166 = "Oh? That's a big surprise."
10038050-167 = "Keh heh, keh heh... But enough about me. How are you? You must have pushed your poor body to its limits by now."
10038050-168 = "*gasp*"
10038050-169 = "You must be wondering how I know. But of course I know. How could I not?"
10038050-170 = "I can make you better, Kisaki."
10038050-171 = "After all..."
10038050-176 = "I'm the one who made you sick."
10038050-177 = "......"
10038050-182 = "I had a feeling it was you. Of course it was you. Who else could have done it?"
10038050-187 = "What are they talking about?"
10038050-188 = "I'm not sure...but I've never seen that look on the president's face."
10038050-194 = "Let me make you an offer."
10038050-201 = "If you sign the Society over to me, I'll look after you. "
10038050-202 = "Allow me to carry out all the processes of creating, testing, applying, and using the potion."
10038050-203 = "The issue with your body can be solved within a month."
10038050-207 = "......"
10038050-208 = "I still remember. All the pain you created."
10038050-212 = "Many students suffered and struggled. "
10038050-213 = "And you want me to let you back in, with NO consequences, just for my own benefit?"
10038050-214 = "My answer is the same as before."
10038050-218 = "Until, and unless, you can show regret and take responsibility, there is no place for you in Shanhaijing. Not now, not ever!"
10038050-223 = "You ARE the same as before."
10038050-227 = "But if you want consequences, here they are."

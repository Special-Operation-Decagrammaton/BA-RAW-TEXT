[translation]
10047010-1 = "第1話;命運的重逢"
10047010-4 = "（為了休息而來到了某個廣場……）"
10047010-8 = "[ns1]「好帥……」\n[ns2]「不過好像在哪裡聽過……？」"
10047010-12 = "騙，騙人的吧？#n這麼驚人的演奏，竟然是出自女高中生……！？"
10047010-13 = "這死亡金屬……感覺靈魂都沸騰了！！"
10047010-17 = "[ns]「女高中生……？死亡金屬……？」"
10047010-22 = "[ns]「我想起來了！這段演奏不就是……！！」"
10047010-26 = "呵呵。謝謝大家。"
10047010-27 = "我是來自奇妙之國的少女，椎名紬。"
10047010-28 = "雖然那種童話中的國度並不存在，不過當下的──"
10047010-33 = "──「感覺」。"
10047010-34 = "……是很重要的。"
10047010-35 = "[ns]「果然是紬啊！」"
10047010-39 = "哎呀，您是……"
10047010-40 = "真是個出乎意料，宛如命運般的重逢呢。"
10047010-41 = "沒想到「那孩子」提過的「不久後會有令人欣喜的相遇」居然真的實現了。"
10047010-42 = "果然……命運的紅線並非純屬虛構呢。"
10047010-47 = "難得有機會重逢，要不要稍微聊一聊？"
10047010-48 = "正好今天的街頭演奏也落幕了。"
10047010-49 = "[s]「我很樂意！」"
10047010-50 = "那麼我們出發吧。"
10047010-51 = "──前往奇妙之國。"
10047010-52 = "[s]「奇妙之國指的是……」"
10047010-56 = "[ns3]「公園的樹林嗎？」\n[ns4]「……還是死亡金屬的表演場地？」"
10047010-59 = "呵呵……不知道地點，才不會破壞之後的樂趣。"
10047010-60 = "來，請往這邊。#n相信這一定會是場難忘的體驗。"
10047010-65 = "感覺如何？#n請發表來到奇妙之國的感想吧。"
10047010-66 = "[s]「這，這不就只是普通的甜點咖啡廳嗎？」"
10047010-67 = "……老師。#n所謂的「奇妙」就是「與平常不同」的意思唷。"
10047010-68 = "我們初次結伴來甜點咖啡廳，不是已經符合不尋常的情境了嗎？"
10047010-69 = "[s]「這麼說確實不無道理……」"
10047010-70 = "話雖如此，學生與老師的關係假如只有「奇妙」這個連結……確實有些可惜。"
10047010-71 = "那麼……不如這樣吧？#n我們可以來聊聊關於彼此的話題。"
10047010-72 = "[s]「是想更加了解彼此的意思嗎？」"
10047010-73 = "呵呵，您的說法就好像我在發出約會的邀請呢。"
10047010-74 = "不過我也不打算否認。畢竟此時此刻──"
10047010-79 = "──「感性」。"
10047010-80 = "……是很重要的。"
10047010-81 = "話說，我有件事想請教您。"
10047010-82 = "我上次的演出，您看得還開心嗎？"
10047010-85 = "人類的死亡是社會的福祉──！！！"
10047010-86 = "嗚哦哦哦哦哦哦哦哦哦哦──！！！"
10047010-89 = "老師？"
10047010-90 = "[s5]「啊，那個……」\n[s6]「很，很開心……」"
10047010-93 = "呵呵，那真是太好了。"
10047010-94 = "當時沒邀請您參加慶功宴實在很抱歉。#n因為團員們都比較害羞……"
10047010-95 = "希望日後有機會，能將大家介紹給您認識。"
10047010-96 = "[s]「大家都是狂獵樂團部的成員嗎？」"
10047010-97 = "不，我們的樂團是由來自各個學園的學生們組成。"
10047010-98 = "而且狂獵並沒有樂團部哦。"
10047010-99 = "呵呵，明明是所「藝術學院」卻沒有樂團部，很不可思議吧？"
10047010-100 = "要說得更精確一點的話，我們狂獵並沒有正式的社團活動。"
10047010-101 = "因為大家都能在自己的科系裡充分享受喜歡的藝術活動，所以不需要額外的社團。"
10047010-102 = "如果想和我一樣參加校外活動的話，就必須申請許可……"
10047010-103 = "不過也有些孩子們，會在校內與同好組成小團體偷偷活動就是了。"
10047010-104 = "呵呵，其實我很想再多多介紹我們學院，可惜時間實在有限。"
10047010-105 = "若要一言以蔽之……或許能稱之為藝術家們的「夢想與希望的仙境」吧？"
10047010-106 = "[s]「夢想與希望的仙境……？」"
10047010-107 = "因為這是一所只要帶著夢想與決心入學，就能隨心所欲追求所愛的學院。"
10047010-111 = "啊，如果您依然感到好奇……"
10047010-115 = "從今天起，就由我椎名紬來擔任老師的兔子吧。"
10047010-116 = "[s]「那是……什麼意思……？」"
10047010-117 = "就像引領少女進入仙境的兔子一樣，我也會帶老師走進狂獵。"
10047010-118 = "雖然我並不是真的兔子，不過在這裡──"
10047010-123 = "──「營造氣氛」。"
10047010-124 = "……是很重要的。"
10047010-125 = "和我一起逛逛學院，閒聊各種話題吧。"
10047010-126 = "我也想把宿舍的朋友們介紹給您。"
10047010-127 = "大家都非常期待能見到老師哦。"
10047010-128 = "[s]「哦哦！紬的朋友們！我也很期待！」"
10047010-129 = "呵呵，那就這麼決定了。"
10047010-130 = "可惜今天的時間有點尷尬，下次再約個時間慢慢逛吧。"
10047010-131 = "既然決定要成為老師的兔子，我會換上兔女郎裝等候您的光臨。"
10047010-132 = "[s]「不，不用特地這樣沒關係！」"
10047010-133 = "是嗎？真可惜……"
10047010-134 = "兔女郎和吉他，在「這邊」可是具備一定歷史的組合呢。"
10047010-135 = "本來還想說務必要讓老師見識一下的……"
10047010-136 = "[s7]「這次就……」\n[s8]「麻煩你維持平常的打扮吧。」"
10047010-139 = "呵呵，那麼這個樂趣就先暫時保留吧。"
10047010-140 = "差不多該點餐了。菜單在……"
10047010-145 = "哇，老師。請您看這邊寫的餐點介紹。"
10047010-146 = "「咬一口就神魂顛倒！惡魔的甜點拼盤」。"
10047010-147 = "這個莓莓蛋糕，光用看的就覺得腦袋被俘虜了呢。"
10047010-148 = "[s]「疊在上面的草莓比蛋糕本身還厚……？」"
10047010-149 = "一顆顆的草莓就像眼球一樣，相當有魅力呢。"
10047010-153 = "這麼說來，宿舍裡有位前輩很喜歡這個類型的裝飾品唷。"
10047010-154 = "還有個總是戴著魔女帽的孩子，以及穿著個性時尚的孩子……"
10047010-155 = "呵呵，老師很快就能見到他們了。"
10047010-156 = "[s9]「看來是群有個性的孩子們呢。」\n[s10]「看來是群有趣的孩子們呢。」"
10047010-163 = "（當時的我還不知道……）"
10047010-166 = "（故事早已悄悄開始了……）"

[translation]
10047010-1 = "Episode 1;Destined Reunion"
10047010-4 = "A restful, peaceful plaza..."
10047010-8 = "[ns1] \"So cool...\"\n[ns2] \"It sounds...familiar?\""
10047010-12 = "Incredible! Such a performance, from a student?"
10047010-13 = "This death metal... It screams to my soul!"
10047010-17 = "[ns] \"Student...? Death metal...?\""
10047010-22 = "[ns] \"Oh, right! The performer must be...!\""
10047010-26 = "Heh. Thank you, everyone."
10047010-27 = "My name is Shiina Tsumugi, and I come from Wonderland."
10047010-28 = "While you all know that it's but a fairy tale, I'd like to emphasize that the..."
10047010-33 = "...feeling..."
10047010-34 = "...is all that matters."
10047010-35 = "[ns] \"It IS Tsumugi!\""
10047010-39 = "Ah, you're..."
10047010-40 = "What an unexpected and fateful reunion."
10047010-41 = "However...a friend told me I'd meet someone special soon. I'm sorry to have doubted her."
10047010-42 = "I see now that the Red Thread of Fate is decidedly...non-fiction."
10047010-47 = "Since we've met again, perhaps we should talk for a while."
10047010-48 = "I think I've busked enough for now."
10047010-49 = "[s] \"Sure!\""
10047010-50 = "Then, let's go..."
10047010-51 = "...to Wonderland."
10047010-52 = "[s] \"By Wonderland, you mean...\""
10047010-56 = "[ns3] \"The park's forest?\"\n[ns4] \"...A death metal auditorium?\""
10047010-59 = "Heh... I believe it will be more interesting if we keep it a surprise."
10047010-60 = "Now, this way. I'm sure it will be an unforgettable experience."
10047010-65 = "Now, what do you think? How does it feel to come to Wonderland with me?"
10047010-66 = "[s] \"I-Isn't this just an ordinary dessert cafe?\""
10047010-67 = "...Sensei. Wonder derives from something unexpected, unfamiliar, and intriguing."
10047010-68 = "This is the first time the two of us have been to this cafe. Surely, that's something out of the ordinary and novel?"
10047010-69 = "[s] \"I suppose so...\""
10047010-70 = "Hm. It would be a shame if a student and a teacher's relationship were so tied up in awkwardness."
10047010-71 = "So... How about it? Let's familiarize ourselves by making a story together."
10047010-72 = "[s] \"As in, get to know each other?\""
10047010-73 = "Heehee. You make it sound like I asked you on a date."
10047010-74 = "I won't completely deny it. Something of that..."
10047010-79 = "...emotion..."
10047010-80 = "...is all that matters."
10047010-81 = "That being said, I have a question."
10047010-82 = "Did you enjoy my last performance?"
10047010-85 = "WE ALL NEED TO DIIIEEE!!!"
10047010-86 = "OOOWAAAH!!!"
10047010-89 = "Sensei?"
10047010-90 = "[s5] \"Ah, well...\"\n[s6] \"I-It was fun...\""
10047010-93 = "Heehee, I'm glad."
10047010-94 = "I'm sorry I couldn't invite you to the after party. The other members are a bit shy..."
10047010-95 = "I would like to introduce you all someday if we get the chance."
10047010-96 = "[s] \"They're all Wildhunt band members?\""
10047010-97 = "No, my bandmates come from other schools."
10047010-98 = "You see, Wildhunt doesn't have a band club."
10047010-99 = "Strange, isn't it? No one to jam with, even though we're the Art Academy."
10047010-100 = "In fact, we don't have any...official...clubs at Wildhunt."
10047010-101 = "I suppose they believe that almost everyone gets their creative energy out through their specialized majors. It's generally fulfilling."
10047010-102 = "Then...there are students like me, who require official permission to pursue outside activities."
10047010-103 = "It might seem strict, but...I suppose there are unofficial channels. Perhaps, there, students with similar interests could share them in secret..."
10047010-104 = "Hm. There's so much I want to say, but we don't have the time."
10047010-105 = "To put it simply, I think of Wildhunt as...a Wonderland of Hopes and Dreams."
10047010-106 = "[s] \"Wonderland of Hopes and Dreams...?\""
10047010-107 = "At Wildhunt, you are free to embrace your dreams and pursue them, as long as you are determined."
10047010-111 = "Ah, yes. If you have a lot of questions, we might as well jump in..."
10047010-115 = "Sensei. From now on, I will be your rabbit."
10047010-116 = "[s] \"What...do you mean...?\""
10047010-117 = "Like the rabbit that led a girl to Wonderland, I shall lead you to Wildhunt."
10047010-118 = "I'm not a literal rabbit, but creating that kind of..."
10047010-123 = "...atmosphere..."
10047010-124 = "...is all that matters."
10047010-125 = "Good. Then let's explore Wildhunt and share plenty of stories."
10047010-126 = "I'd like to introduce you to my friends in my dorm."
10047010-127 = "I know they're looking forward to meeting you."
10047010-128 = "[s] \"Ooh! Tsumugi's friends! I'd love to meet them!\""
10047010-129 = "Heehee, then it's decided."
10047010-130 = "I still need to finish a few things, so let's meet up in a bit and explore the academy properly."
10047010-131 = "Since I am your rabbit. I'll wear a bunny girl costume."
10047010-132 = "[s] \"Th-That's not necessary!\""
10047010-133 = "Really? Such a shame..."
10047010-134 = "Bunny girls and guitars are so...meaningful in music history."
10047010-135 = "I wanted to show you..."
10047010-136 = "[s7] \"Not this time...\"\n[s8] \"Please keep it normal.\""
10047010-139 = "Heh. Then I'll save that as a special treat for next time."
10047010-140 = "Now then, shall we order? What a menu..."
10047010-145 = "Wow, Sensei. Look at this description."
10047010-146 = "A demonic dessert medley that will make your head spin with just a bite."
10047010-147 = "And the very berry cake here challenges my perceptions with just a glance."
10047010-148 = "[s] \"The berries are stacked higher than the cake...?\""
10047010-149 = "The fact that the berries look like eyeballs is also quite charming."
10047010-153 = "Come to think of it, there is a senior in my dorm who would love these garnishes."
10047010-154 = "There's also one who always wears a witch hat, such a fetching style..."
10047010-155 = "Heehee. You'll meet them all soon."
10047010-156 = "[s9] \"Sounds...unique.\"\n[s10] \"Seems like an interesting group.\""
10047010-163 = "Though I hadn't realized it in the moment..."
10047010-166 = "Our story together had already begun."

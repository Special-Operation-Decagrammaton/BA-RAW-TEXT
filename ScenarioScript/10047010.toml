[translation]
10047010-1 = "ตอนที่ 1;การกลับมาพบกันตามชะตาลิขิต"
10047010-4 = "(ณ จัตุรัสแห่งหนึ่งที่คุณครูแวะมาพักผ่อน...)"
10047010-8 = "[ns1] \"เท่สุดๆ ไปเลย...\"\n[ns2] \"เหมือนเคยได้ยินจากที่ไหนเลยแฮะ...?\""
10047010-12 = "ละ... ล้อกันเล่นใช่มั้ยเนี่ย?#nเด็กม.ปลายจะร้องเพลงได้ขนาดนั้นเลยเหรอ...?!"
10047010-13 = "เพลงเดธเมทัลนั่นมัน... ทำเอาจิตวิญญาณฉันเดือดพล่านเลย!!"
10047010-17 = "[ns] \"เด็กม.ปลาย...? เดธเมทัล...?\""
10047010-22 = "[ns] \"นึกออกแล้ว! คนที่ร้องเพลงแบบนี้ก็คือ...!!\""
10047010-26 = "ฮุฮุ ขอบคุณค่ะทุกคน"
10047010-27 = "ฉันคือเด็กสาวที่มาจากแดนมหัศจรรย์ ชื่อว่าชิอินะ สึมุกิค่ะ"
10047010-28 = "ที่จริงแล้วแดนมหัศจรรย์ในเทพนิยายแบบนั้นไม่มีอยู่จริงหรอกค่ะ แต่ว่าเมื่ออยู่ที่นี่แล้ว..."
10047010-33 = "'ฟีลลิ่ง'"
10047010-34 = "มันเป็นสิ่งสำคัญนี่คะ..."
10047010-35 = "[ns] \"ใช่สึมุกิจริงๆ ด้วย!\""
10047010-39 = "ตายจริง คุณคือ..."
10047010-40 = "นี่คือการกลับมาพบกันตามชะตาลิขิต"
10047010-41 = "ไม่คิดเลยนะคะว่าเรื่องราวการกลับมาพบกันอย่างน่ายินดีของ <เด็กน้อยคนนั้น> จะเกิดขึ้นจริงๆ"
10047010-42 = "แบบนี้นี่เอง... ด้ายแดงแห่งโชคชะตาไม่ใช่เรื่องที่แต่งขึ้นมาจริงๆ ด้วย"
10047010-47 = "ไหนๆ เราก็ได้เจอกันอีกครั้งแล้ว#nอยากคุยกันหน่อยมั้ยล่ะคะ?"
10047010-48 = "ฉันเพิ่งเล่นดนตรีเปิดหมวกของวันนี้เสร็จพอดีด้วยค่ะ"
10047010-49 = "[s] \"ครูยินดีเลยละ!\""
10047010-50 = "งั้นก็... ไปกันเลยมั้ยคะ?"
10047010-51 = "ไปยังแดนมหัศจรรย์..."
10047010-52 = "[s] \"แดนมหัศจรรย์...\""
10047010-56 = "[ns3] \"หมายถึงป่าในสวนสาธารณะเหรอ?\"\n[ns4] \"หมายถึงเวทีแสดงเพลงเดธเมทัลเหรอ?\""
10047010-59 = "ฮุฮุ การไม่บอกสถานที่น่าจะเป็นการเพิ่มความตื่นเต้นที่กำลังจะมาถึงนะคะ"
10047010-60 = "เอาละ เชิญทางนี้เลยค่ะ แล้วนี่จะเป็นประสบการณ์ที่ลืมไม่ลงเลยละ"
10047010-65 = "เป็นยังไงบ้างคะ รู้สึกยังไงบ้างที่ได้มาแดนมหัศจรรย์กับฉัน?"
10047010-66 = "[s] \"มะ... มันก็คาเฟ่ขนมหวานธรรมดาไม่ใช่เหรอ?\""
10047010-67 = "คุณครู... <มหัศจรรย์> หมายถึง <สิ่งที่แปลกประหลาดและแตกต่างจากปกติ> ค่ะ"
10047010-68 = "วันนี้เป็นครั้งแรกที่เราได้มาคาเฟ่ขนมหวานด้วยกัน#nเท่านี้ก็เป็นเรื่องที่แปลกประหลาดแล้วไม่ใช่เหรอคะ?"
10047010-69 = "[s] \"พอพูดแบบนั้นก็เหมือนจะใช่นะ...\""
10047010-70 = "จะว่าไป การที่ความสัมพันธ์ระหว่างคุณครูกับนักเรียนเชื่อมโยงกันด้วยเรื่องแปลกประหลาด มันก็น่าเศร้าใจอยู่นะคะ"
10047010-71 = "ถ้างั้น... คุณครูจะว่ายังไงคะ#nถ้าฉันขอคุยเรื่องบางอย่าง"
10047010-72 = "[s] \"อยากรู้จักกันให้มากกว่านี้ใช่มั้ย?\""
10047010-73 = "ฮุฮุ พูดเหมือนฉันกำลังขอคุณครูออกเดตเลยนะคะ"
10047010-74 = "แต่ฉันก็จะไม่ปฏิเสธค่ะ นั่นก็เพราะตอนนี้..."
10047010-79 = "'ความรู้สึก'"
10047010-80 = "เป็นสิ่งสำคัญนี่คะ..."
10047010-81 = "ถ้างั้นฉันขอถามอะไรหน่อยนะคะ"
10047010-82 = "คุณครูสนุกกับการเล่นดนตรีครั้งก่อนของฉันหรือเปล่าคะ?"
10047010-85 = "ไปลงนรกซะเถอะ ไปไป!!!!"
10047010-86 = "โว้ววววววว!!!"
10047010-89 = "คุณครู?"
10047010-90 = "[s5] \"อ่า... ก็ดีนะ...\"\n[s6] \"อ่า... ก็สนุกดีนะ...\""
10047010-93 = "ฮุฮุ ได้ยินอย่างนั้นฉันก็ดีใจค่ะ"
10047010-94 = "ขอโทษที่ตอนนั้นฉันไม่ได้เชิญมาอาฟเตอร์ปาร์ตี้นะคะ#nพอดีคนอื่นในวงค่อนข้างขี้อาย..."
10047010-95 = "ไว้ถ้ามีโอกาส ฉันจะแนะนำสมาชิกในวงให้รู้จักนะคะ"
10047010-96 = "[s] \"ทุกคนอยู่ชมรมวงดนตรีไวลด์ฮันต์ใช่มั้ย?\""
10047010-97 = "ไม่หรอกค่ะ เราเป็นวงดนตรีที่มาจากการรวมตัวของนักเรียนหลายๆ โรงเรียน"
10047010-98 = "นั่นก็เพราะที่ไวลด์ฮันต์ไม่มีชมรมวงดนตรีค่ะ"
10047010-99 = "ฮุฮุ แปลกใช่มั้ยล่ะคะ? เราเป็นถึง <สถาบันศิลปะ> แท้ๆ"
10047010-100 = "ที่จริงแล้วที่ไวลด์ฮันต์ เราไม่มีกิจกรรมชมรมอย่างเป็นทางการหรอกค่ะ"
10047010-101 = "เหตุผลก็เพราะนักเรียนทุกคนที่นี่ต่างก็สนุกกับการทำกิจกรรมทางศิลปะที่ตัวเองชื่นชอบตามวิชาเอก#nของตัวเอง เราก็เลยไม่จำเป็นต้องมีกิจกรรมชมรมต่างหากค่ะ"
10047010-102 = "แต่ถ้าบางคนอยากทำกิจกรรมอย่างอื่น ก็จะขออนุญาตออกมาทำกิจกรรมภายนอกเหมือนที่ฉันทำ..."
10047010-103 = "หรือไม่ก็จะรวมตัวกันในหมู่นักเรียนที่มีงานอดิเรกคล้ายกัน แล้วแอบทำกิจกรรมกันเองค่ะ"
10047010-104 = "ฮุฮุ ฉันก็อยากเล่าเกี่ยวกับโรงเรียนของตัวเองหรอกนะคะ แต่เวลาคงไม่พอ"
10047010-105 = "ถ้าจะเปรียบเปรยง่ายๆ คงต้องบอกว่าเป็น <ดินแดนมหัศจรรย์แห่งความฝันและความหวังสำหรับศิลปิน> ค่ะ"
10047010-106 = "[s] \"ดินแดนมหัศจรรย์แห่งความฝันและความหวัง...?\""
10047010-107 = "เพราะนักเรียนเข้ามาที่นี่พร้อมความฝันและความมุ่งมั่น และทำตามสิ่งที่ปรารถนาได้ในโรงเรียนแห่งนี้#nยังไงล่ะคะ"
10047010-111 = "อ๊ะ จริงด้วยค่ะ ถ้าคุณครูยังมีคำถามมากมายในใจ..."
10047010-115 = "จากวันนี้เป็นต้นไป สึมุกิคนนี้จะเป็นกระต่ายของคุณครูให้เองค่ะ"
10047010-116 = "[s] \"พูดแบบนั้น... หมายความว่ายังไง...?\""
10047010-117 = "ฉันจะพาคุณครูไปยังไวลด์ฮันต์ เหมือนกับกระต่ายที่พาเด็กสาวไปยังดินแดนมหัศจรรย์ไงคะ"
10047010-118 = "ถึงฉันจะไม่ใช่กระต่ายจริงๆ แต่ตอนนี้..."
10047010-123 = "'การสร้างบรรยากาศ'"
10047010-124 = "เป็นสิ่งสำคัญนี่คะ..."
10047010-125 = "ใช่แล้วค่ะ เราจะไปเดินชมโรงเรียนและแบ่งปันเรื่องราวต่างๆ ด้วยกันค่ะ"
10047010-126 = "ฉันอยากแนะนำเพื่อนๆ ในหอพักให้รู้จักด้วยจังเลยค่ะ"
10047010-127 = "ทุกคนตั้งตารอที่จะได้เจอคุณครูอยู่นะคะ"
10047010-128 = "[s] \"โอ้ว! ครูก็อยากเจอเพื่อนของสึมุกิเหมือนกัน!\""
10047010-129 = "ฮุฮุ งั้นเอาตามนี้เลยนะคะ"
10047010-130 = "แต่วันนี้คงไม่ทันแล้ว งั้นฉันจะนัดคุณครูมาค่อยๆ เดินชมโรงเรียนครั้งหน้าแทนนะคะ"
10047010-131 = "ในเมื่อฉันตั้งใจจะเป็นกระต่ายของคุณครูแล้ว งั้นฉันจะรอคุณครูอยู่ในชุดบันนี่เกิร์ลค่ะ"
10047010-132 = "[s] \"มะ... ไม่ต้องทำถึงขนาดนั้นก็ได้!\""
10047010-133 = "จริงเหรอคะ? น่าเสียดายจัง..."
10047010-134 = "<ในทางนี้> บันนี่เกิร์ลกับกีตาร์#nเป็นการผสมผสานที่มีความเป็นมาทางประวัติศาสตร์เลยนะคะ"
10047010-135 = "ฉันอยากให้คุณครูได้เห็นแท้ๆ เชียว..."
10047010-136 = "[s7] \"ครั้งนี้ครูขอแบบธรรมดาๆ ดีกว่า...\"\n[s8] \"ครูอยากเห็นสึมุกิในมุมธรรมดาๆ น่ะ\""
10047010-139 = "ฮุฮุ เห็นทีต้องเก็บเรื่องสนุกนั้นไว้ทีหลังแล้วสินะ"
10047010-140 = "งั้นเราสั่งของกินกันเลยมั้ยคะ? ไหนดูเมนูหน่อย..."
10047010-145 = "ว้าว คุณครู ดูคำอธิบายเมนูนี้สิคะ"
10047010-146 = "เซ็ตขนมหวานปีศาจที่จะทำให้สติเลอะเลือนเพียงกัดเข้าไปแค่คำเดียว"
10047010-147 = "โดยเฉพาะเค้กเวรีเบอร์รีชิ้นนี้ แค่ดูก็รู้สึกว่าสมองจะอ่อนยวบขึ้นมาเลยค่ะ"
10047010-148 = "[s] \"ลูกเบอร์รีมันดูใหญ่กว่าเค้กอีกนะ...?\""
10047010-149 = "ลูกเบอร์รีที่ดูเหมือนลูกตา ช่างน่าหลงใหลจริงๆ เลยค่ะ"
10047010-153 = "จะว่าไป ฉันมีรุ่นพี่ในหอพักที่ชื่นชอบเครื่องประดับคล้ายๆ กับแบบนี้ด้วยค่ะ"
10047010-154 = "แล้วก็มีเด็กที่ชอบใส่หมวกแม่มด#nไหนจะเด็กที่มีแฟชั่นเฉพาะตัว..."
10047010-155 = "ฮุฮุ อีกไม่นานคุณครูก็น่าจะได้เจอนะคะ"
10047010-156 = "[s9] \"เป็นเด็กที่มีอัตลักษณ์กันจังเลยนะ\"\n[s10] \"เป็นเด็กที่น่าสนใจจังเลยนะ\""
10047010-163 = "(คุณครูเพิ่งมารู้เอาตอนนั้น...)"
10047010-166 = "(ว่าเรื่องราวทั้งหมดได้เริ่มต้นขึ้นแล้ว...)"

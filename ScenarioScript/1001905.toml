[translation]
1001905-1 = "แผนการ"
1001905-2 = "คุณครูมาตรงเวลาเป๊ะเลยนะ ฉันกำลังรออยู่เลย"
1001905-3 = "วันนี้คนที่ดูแลการฝึกคือคุณครู ดังนั้นฉันจะทำตามคำสั่งนะ เอาละ เตรียมพร้อมเรียบร้อยแล้ว"
1001905-4 = "ให้เริ่มจากอะไรก่อนดี? บอกสิ่งที่ฉันต้องทำเพื่อปรับตัวให้เข้ากับการใช้ชีวิตที่นี่ได้เลย"
1001905-5 = "[s1] \"คือ...ที่จริงครูไม่ได้คิดแผนอะไรไว้เลย\"\n[s2] \"กลยุทธ์ที่ดีที่สุดคือทำตามใจอยาก\""
1001905-6 = "อะไรนะ?"
1001905-7 = "อะไรนะ?"
1001905-8 = "ไม่มีแผนการอะไรเลยงั้นเหรอ? หมายความว่ายังไง?"
1001905-9 = "วันนี้คุณครูกำหนดให้เป็นวันฝึกนี่นา"
1001905-10 = "แต่จะมาบอกว่าไม่ได้เตรียมการอะไรมาเลยเนี่ยนะ?"
1001905-11 = "หืม? ว่าไงนะ? เราไม่ควรวางแผนอย่างงั้นเหรอ? หมายความว่ายังไงน่ะ?"
1001905-12 = "ฟังให้ดีนะคุณครู ทุกอย่างในโลกนี้ต้องมีแผนการ ทั้งการวางแผนกลยุทธ์ การวางแผนปฏิบัติการด้วย"
1001905-13 = "ต่อให้เป็นเรื่องชีวิตประจำวันก็ตาม ถ้าใช้ชีวิตโดยที่ไม่วางแผนมาก่อนก็จะทำอะไรไม่สำเร็จตาม#nเป้าหมาย..."
1001905-14 = "[s3] \"แต่อาซึสะก็เตรียมพร้อมพอแล้วนี่นา\"\n[s4] \"สิ่งที่จำเป็นสำหรับเธออาจคือการไม่เตรียมพร้อมก็ได้\""
1001905-15 = "อืม..."
1001905-16 = "อืม..."
1001905-17 = "พูดจาประนีประนอมแบบนั้นอีกแล้วนะ หรือว่ามีเจตนาแอบแฝงอื่น..."
1001905-18 = "ไม่สิ... วันนี้เป็นวันที่คุณครูสั่งการได้อย่างเต็มที่ เพราะเราตกลงกันแล้วนี่นะ"
1001905-19 = "แล้วฉันควรจะต้องทำยังไงถึงจะดูไม่เตรียมพร้อม หรือเตรียมพร้อมน้อยลงล่ะ?"
1001905-20 = "ให้ฉันเลือกเองเลยเหรอ?"
1001905-21 = "วันนี้ฉันควรจะทำตามคำสั่งของคุณครูสิ ทำไมถึงให้ฉันเป็นคนเลือกล่ะ?"
1001905-22 = "อะ...อืม... ถ้างั้นก่อนอื่น..."
1001905-23 = "หืม? ฉันดูเครียดเกินไปเหรอ?"
1001905-24 = "แต่ฉันต้องคิดให้ดีที่สุดเรื่องคำตอบ..."
1001905-25 = "...? อยากให้ฉันฝึกเลือกทางที่ไม่ได้ดีที่สุดบ้างเหรอ?"
1001905-26 = "ฉะ...ฉันไม่เข้าใจเลย เรื่องนี้เข้าใจยากจัง..."
1001905-27 = "..."
1001905-28 = "ของหวาน..."
1001905-29 = "ร่างกายต้องการน้ำตาล... เรา... ไปร้านของหวาน... ได้มั้ย?"
1001905-30 = "[s5] พุ่งตรงไปที่ร้านของหวาน\n[s6] เดินไปร้านของหวานกับอาซึสะอย่างช้าๆ"
1001905-35 = "ดะ... เดี๋ยวก่อน! คุณครู! ฉันยังไม่ได้ตัดสินใจเลย...!"
1001905-40 = "ดะ... เดี๋ยวก่อน! คุณครู! ฉันยังไม่ได้ตัดสินใจเลย...!"
1001905-42 = "(ทันทีที่เข้าร้านไป พนักงานก็ต้อนรับทั้งสองคนด้วยสีหน้ายิ้มแย้ม)"
1001905-43 = "(อาซึสะยืนอยู่อย่างเก้ๆ กังๆ คุณครูจึงสั่งขนมที่ดูน่ากินมาทุกอย่าง)"
1001905-47 = "...!?"
1001905-48 = "อร่อยจัง..! หวานมาก...!!"
1001905-49 = "วัตถุดิบ ทั้งวิธีการปรุง...! ทั้งเรื่องการเก็บรักษาสภาพขนมน่าจะเป็นเรื่องที่ยุ่งยาก แต่ว่ารสชาติ#nแบบนี้มัน...!!"
1001905-50 = "อร่อยสุดๆ เลย!~"
1001905-51 = "(ถึงในตอนแรกอาซึสะจะลังเลที่จะกิน แต่พอได้ชิม ดวงตาของเธอก็ส่องประกายวาววับ)"
1001905-54 = "(หลังจากนั้นทั้งคู่ก็ไปที่เกมเซ็นเตอร์...)"
1001905-55 = "อือ...! เป็นไปไม่ได้! นี่ฉันแพ้เหรอ?"
1001905-56 = "เกมนี้มันไม่ยุติธรรม ไม่เห็นดีเลย! ทำไมคนถึงยอมเสียเงินมาเล่นเกมห่วยๆ นี่นะ?"
1001905-57 = "พอมาคิดๆ ดูแล้ว การเล่นเกมเป็นการเสียเวลาที่สุดเลยนะ มาเล่นเกมแบบนี้จะได้ประโยชน์อะไรกัน?"
1001905-58 = "เสียเวลาที่สุด ฉันยอมรับไม่ได้!! พอแค่นี้เถอะ...!"
1001905-59 = "อะไรนะ...?"
1001905-60 = "คุณครูอยากให้ฉันลองอีกครั้งเหรอ...? คิดว่ายอมแพ้แบบนี้มันง่ายเกินไปเหรอ?"
1001905-61 = "..."
1001905-62 = "หลีกไป! ฉันคิดกลยุทธ์ที่จะใช้เอาชนะไว้หมดแล้ว!"
1001905-63 = "ครั้งนี้แหละ ฉันจะเอาชนะให้ได้เลย!"
1001905-65 = "(จากนั้นอาซึสะก็เคลียร์ด่านได้หลังจากหยอดเหรียญเล่นไป 16 ตา)"
1001905-66 = "(ถึงเธอจะไม่ยอมรับ แต่สีหน้าในตอนที่เคลียร์ด่านได้ของเธอดูดีใจเหมือนกับได้ครองโลกจริงๆ)\n"
1001905-67 = "(จากนั้นทั้งสองคนก็ไปเดินเล่นในห้างสรรพสินค้า ไปร้านอาหาร ห้องคาราโอเกะ และโรงหนัง)"
1001905-68 = "(และทุกที่ที่ไปก็มีรูปแบบเดียวกันคือ อาซึสะปฏิเสธทุกอย่างในตอนแรก แต่ในไม่ช้าก็ทำทุกอย่าง#nแบบทุ่มเทสุดตัว)"
1001905-70 = "อืม... เราก็เดินเล่นไปมาหลายที่แล้ว เผลอแป๊ปเดียวก็เวลานี้แล้ว..."
1001905-71 = "ต่อไปจะทำอะไรน่ะ? จะไปที่ไหนต่อล่ะ?"
1001905-72 = "ฉันไม่รู้เลยว่าจะเลือกไปไหนดี..."
1001905-73 = "หืม? อะไรนะ? คุณครูอยากไปที่นั่นเหรอ?"
1001905-74 = "อืม ก็นะ... ถ้าคุณครูพูดอย่างนั้นก็ตกลง"
1001905-75 = "[s] เดินเข้าไปในร้านพร้อมกับอาซึสะ"
1001905-81 = "...!"
1001905-82 = "นี่มัน...! ที่นี่คือ...!!"
1001905-83 = "[s] “ร้านตุ๊กตา MOMO FRIENDS น่ะ\""
1001905-84 = "ระ... ร้านนี้! ร้านที่น่าไม่อายแบบนี้!!"
1001905-85 = "แย่มาก! นี่เป็นที่ที่แย่มาก!!"
1001905-86 = "วะ... ว่าไงนะ? โซนประสบการณ์ MOMO FRIENDS เหรอ? จะ...จะให้ฉันไปที่นั่น... กับ...พวกนั้น...?"
1001905-87 = "แต่ว่า...! แต่จะให้ฉัน...!"
1001905-89 = "ฉันน่ะ...!!"
1001905-94 = "― มันก็น่ารักดีนะ!"
1001905-96 = "― ฉันไม่เคยเห็นตุ๊กตาน่ารักๆ เยอะแยะแบบนี้เลย![wa:540] "
1001905-99 = "― นะ... น่าอายจัง![wa:1380] "
1001905-102 = "― ล้อเล่นใช่มั้ยเนี่ย? ฉันว่าคุณครูต้องตั้งใจแน่ๆ เลย ใช่มั้ย?[wa:120] "
1001905-104 = "― แต่ก็นะ... ถ้าเป็นคุณครูละก็ ฉันไม่ติดอะไรหรอก...[wa:3060] "
1001905-107 = "― ...งือออ! น่ารักจังเลย![wa:1020] "
1001905-109 = "― อยากได้ตุ๊กตา แบบนี้มานานแล้ว[wa:850] "
1001905-112 = "― ฮิฮิฮิฮิ... ฮิฮิ...[wa:2760] "
1001905-115 = "― ..."
1001905-117 = "― หือ...? เปล่า ไม่มีอะไรหรอก[wa:2680] "
1001905-120 = "― (ไม่บอกหรอก...)"
1001905-122 = "― (ว่าฉันไม่อยากทำให้คุณครูลำบากใจน่ะ)"
1001905-125 = "― ว่าแต่ทำไม... คุณครูรู้จักสถานที่น่ารักๆ แบบนี้ได้ล่ะ?[wa:210] "
1001905-127 = "― อย่างนั้นเหรอ? ไม่คิดเลยว่าคุณครูจะชอบแบบนี้?[wa:10] "
1001905-130 = "― อย่าทำเหมือนว่า... ฉันเป็นเด็กๆ สิ?[wa:1530] "
1001905-132 = "― แต่ถึงอย่างนั้น... ก็ไม่เป็นไรหรอก[wa:160] "
1001905-136 = "สงสัยต้องหมั่นกลับมาตรวจสอบบ้างแล้วล่ะ"
1001905-141 = "ที่จริงคุณครูเตรียมการไว้ตั้งแต่แรกแล้วใช่มั้ย? วางแผนจะพาฉันมาที่นี่ตั้งแต่แรกแล้วล่ะสิ?"
1001905-142 = "หืม? ไม่ใช่เหรอ? ไม่รู้จักร้านนี้มาก่อน?"
1001905-143 = "แค่อยากลองมาเพราะว่าร้านดูน่ารักดีเนี่ยนะ? ร้านอื่นๆ ที่เราไปมาวันนี้ก็ด้วยเหรอ?"
1001905-144 = "นะ... นั่นมันอะไรกัน..."
1001905-145 = "สบายๆ ไร้กังวล?"
1001905-146 = "ถ้าใช้ชีวิตตามที่วางแผนไว้อย่างเดียว ก็จะพลาดอะไรแบบนี้ไปได้งั้นเหรอ?"
1001905-147 = "นั่นสินะ... ถ้าวันนี้ฉันวางแผนเอาไว้ก่อน ก็คงจะไม่สนุกแบบนี้ก็ได้"
1001905-148 = "อืม... เข้าใจแล้ว"
1001905-149 = "ฉันได้เรียนรู้อะไรหลายอย่างในการฝึกวันนี้เลยล่ะ"

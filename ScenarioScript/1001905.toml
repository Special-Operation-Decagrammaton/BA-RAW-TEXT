[translation]
1001905-1 = "計畫"
1001905-2 = "非常準時，老師。我一直在等你。"
1001905-3 = "我今天訓練的時候，會完全遵照老師的指揮。"
1001905-4 = "那麼，我該先做什麼？請你告訴我該怎麼做才能適應這裡的生活。"
1001905-5 = "[s1] 「啊……抱歉，其實我什麼都沒想。」\n[s2] 「這種事當然要看當下的心情決定。」"
1001905-6 = "……什麼？"
1001905-7 = "……什麼？"
1001905-8 = "所以沒有任何計畫？那是什麼意思……？"
1001905-9 = "毫無準備的情況下，"
1001905-10 = "真的有辦法進行訓練嗎？"
1001905-11 = "什麼？太過縝密的計畫反而不好？"
1001905-12 = "老師，這世界上的所有事都需要計畫。不論是作戰或執行任務。"
1001905-13 = "包括日常生活，如果不事先做好規劃，那就什麼事也完成不了……"
1001905-14 = "[s3] 「因為梓已經非常認真，非常有計畫性了。」\n[s4] 「有時候毫無效率的思維，也有可能帶來美好的機緣。」"
1001905-15 = "……"
1001905-16 = "……"
1001905-17 = "……你該不會是在耍我吧？還是真的有什麼深遠的考量……"
1001905-18 = "……不，我已經決定今天全權由老師指揮。不可以悔改。"
1001905-19 = "那麼，在這缺乏效率和計畫的狀況下，我該怎麼做呢？"
1001905-20 = "……由我做選擇？"
1001905-21 = "但，今天不是要由老師指揮……怎麼變成我了？"
1001905-22 = "真，真是搞不懂，嗯……"
1001905-23 = "你說不需要想的太認真……？"
1001905-24 = "但既然要做選擇，那就該選個最好的……"
1001905-25 = "……練習做出不是最好的選擇？"
1001905-26 = "不，不行，我越來越搞不懂了……"
1001905-27 = "……"
1001905-28 = "……甜點。"
1001905-29 = "甜點店之類的……我可能，想去看看……？"
1001905-30 = "[s5] 走向甜點店\n[s6] 慢慢把梓推進店裡"
1001905-35 = "等，等等！老師！我只是想看看，還沒確定……！"
1001905-40 = "等，等等！老師！我只是想看看，還沒確定……！"
1001905-42 = "（一進入店裡，店員便笑著迎接我們）"
1001905-43 = "（梓還有點不知所措，看來還無法馬上下決定，我便把看起來不錯吃的食物全都點了一輪）"
1001905-47 = "……！？"
1001905-48 = "好好吃……！好甜……！！"
1001905-49 = "這個食材，是怎麼調理的……！明明這麼不適合運送或保存，但是這個味道……！！"
1001905-50 = "……好好吃！"
1001905-51 = "（梓最初還有些猶豫，但隨著甜點一口接一口，眼神開始閃爍著光芒）"
1001905-54 = "（稍後，來到遊戲中心）"
1001905-55 = "為什麼…！太荒謬了！這怎麼能算輸？"
1001905-56 = "不合理！這種東西到底有什麼好玩的！？"
1001905-57 = "而且仔細想想，我也沒必要讓自己體驗輸的感覺。做這種事對我來說一點好處也沒有。"
1001905-58 = "怎麼想都是浪費時間！！我不認同這東西……！"
1001905-59 = "……什麼？ "
1001905-60 = "再試一次……？你問我難道嚥的下這口氣……？"
1001905-61 = "……"
1001905-62 = "給，給我！我已經有重新想好戰術了！"
1001905-63 = "這次是最後一次了，我一定要打贏！"
1001905-65 = "（梓在那之後也繼續玩了16局才終於破關）"
1001905-66 = "（雖然本人沒有承認，但破關的瞬間，她的表情充滿了無上的喜悅，以及燦爛的笑容）"
1001905-67 = "（在那之後也逛了美食街、KTV、電影院等等，走遍了購物中心內的各種設施）"
1001905-68 = "（基本上就是重複著，梓看到新東西，一開始抱持否定態度，但很快就忘我地沉迷其中）"
1001905-70 = "逛了好多地方……"
1001905-71 = "接下來要去哪呢……？"
1001905-72 = "感覺幾乎所有地方都去過了……"
1001905-73 = "……什麼？這次要去那裡？"
1001905-74 = "既然老師說想去的話……那好吧。"
1001905-75 = "[s]和梓一起走進那間店"
1001905-81 = "……！"
1001905-82 = "這裡是……！！"
1001905-83 = "[s] 「是Momo好友玩偶店。」"
1001905-84 = "竟，竟然……！還有這種店……！？"
1001905-85 = "不，不行！這不好！要是進去這種地方，會，會墮落……！"
1001905-86 = "什，什麼？朋友體驗區……？咦，你要我進去……？"
1001905-87 = "但，但是，我，那個……！"
1001905-89 = "我……！"
1001905-94 = "― 雖然可愛沒有任何錯！"
1001905-96 = "― 雖然有很多可愛的娃娃是件好事！[wa:1700] "
1001905-99 = "― ……但總覺得好難為情。[wa:1580] "
1001905-102 = "― 你絕對在戲弄我吧，老師。[wa:2040] "
1001905-104 = "― ……不，不過，也不是真的討厭……[wa:4380] "
1001905-107 = "― 唔唔，好可愛……！[wa:1580] "
1001905-109 = "― 這孩子，我一直想見他……！[wa:1490] "
1001905-112 = "― 欸嘿欸嘿嘿……欸嘿嘿……[wa:3040] "
1001905-115 = "― ……"
1001905-117 = "― ……那個，不，沒什麼……[wa:3280] "
1001905-120 = "― （明明，）"
1001905-122 = "― （不能再拉近距離了……）"
1001905-125 = "― 不過，老師怎麼會知道這種可愛的地方……？[wa:1570] "
1001905-127 = "― ……老師也喜歡？真的嗎？[wa:1310] "
1001905-130 = "― 沒有把我當小孩子，在附和我吧？[wa:2330] "
1001905-132 = "― ……嘛，其實怎樣都無所謂。[wa:1000] "
1001905-136 = "……"
1001905-141 = "難不成從一開始就全都設計好了？從一開始就全都計畫好了？"
1001905-142 = "不是？真的是偶然？"
1001905-143 = "只是覺得這間店很可愛？"
1001905-144 = "碰巧看見？"
1001905-145 = "……正因為沒有按照計畫走？"
1001905-146 = "如果凡事都按照計畫進行，反而會錯失這些偶然的邂逅？"
1001905-147 = "……的確，或許是那樣沒錯。"
1001905-148 = "……原來，還有這種事情。"
1001905-149 = "今天的訓練非常充實。我會將今天學到的牢記在心。"

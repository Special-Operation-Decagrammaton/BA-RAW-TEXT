[translation]
1001905-1 = "Plan"
1001905-2 = "You're right on time, Sensei. I've been waiting for you."
1001905-3 = "You're in charge of today's training session. I'm ready for whatever you decide to throw at me."
1001905-4 = "So, what should I learn first? Tell me everything I need to know to adjust to life here."
1001905-5 = "[s1] \"Actually, I don't have anything in particular in mind.\"\n[s2] \"The best strategy is to do whatever you want.\""
1001905-6 = "Come again?"
1001905-7 = "Come again?"
1001905-8 = "You don't have anything planned? What do you mean?"
1001905-9 = "You're the one who decided today was a training day."
1001905-10 = "Did you really not prepare anything at all?"
1001905-11 = "You're saying that nothing ever goes as planned anyway? What do you mean by that?"
1001905-12 = "But, Sensei. The world relies on structure. It would be nothing without planning. The same goes for operations and missions."
1001905-13 = "You can't just do whatever you want without being prepared. You'll never accomplish anything, even in your daily life..."
1001905-14 = "[s3] \"You're already as prepared as you need to be, Azusa.\"\n[s4] \"What you need is a little dose of inefficiency.\""
1001905-15 = "Is that what you think?"
1001905-16 = "Is that what you think?"
1001905-17 = "It sounds as though you're only teasing me again."
1001905-18 = "...No. I already promised that I would follow your instructions today."
1001905-19 = "Fine. What must I do to be less prepared?"
1001905-20 = "You want me to choose? Why?"
1001905-21 = "I-I'm supposed to follow your instructions. Isn't that the point of training? Why would I be the one to choose?"
1001905-22 = "Well, in that case... Hmm."
1001905-23 = "Huh? I'm overthinking it?"
1001905-24 = "But I need to make sure I'm making a wise decision..."
1001905-25 = "You want me gain experience by making ill-advised choices?"
1001905-26 = "I-I don't understand. This is so confusing."
1001905-27 = "..."
1001905-28 = "Dessert."
1001905-29 = "I want a snack, so would going to a dessert shop...work?"
1001905-30 = "[s5] Stride toward the dessert shop.\n[s6] Slowly push Azusa toward the shop."
1001905-35 = "W-Wait! Sensei! I haven't made my final decision yet!"
1001905-40 = "W-Wait! Sensei! I haven't made my final decision yet!"
1001905-42 = "The employees greeted us with smiles as soon as we stepped into the shop."
1001905-43 = "Azusa was hesitant, so I ordered everything that looked good on her behalf."
1001905-47 = "...?!"
1001905-48 = "It's delicious! So sweet!"
1001905-49 = "These ingredients, the baking style...! It's sure to cause distribution and storage issues, but who cares?!"
1001905-50 = "It's so delicious!"
1001905-51 = "Azusa's eyes sparkled as she ate one bite at a time."
1001905-54 = "Later, at the arcade..."
1001905-55 = "Ugh. You have to be kidding me. I lost?!"
1001905-56 = "This game must be rigged. Why would people play this trash?"
1001905-57 = "In fact, playing games is a waste of time. What do you get out of it?"
1001905-58 = "It's completely pointless. I just can't stand it!"
1001905-59 = "...What?"
1001905-60 = "You want me to try it one more time? You didn't think I'd give up so easily?"
1001905-61 = "..."
1001905-62 = "M-Move over! I just thought of a way to win!"
1001905-63 = "This is it. I'm gonna destroy this guy!"
1001905-65 = "Sixteen tokens later, and Azusa finally cleared the stage."
1001905-66 = "She refused to admit it, but when she finally beat it, she looked like she died and went to heaven."
1001905-67 = "After that, we went to all kinds of fun places in the shopping mall, including restaurants, the karaoke bar, and the movie theater."
1001905-68 = "The pattern was always the same. Azusa refused at first, only to become immediately engrossed shortly after."
1001905-70 = "We were so busy that I lost track of time."
1001905-71 = "What now? Where should we go next?"
1001905-72 = "I don't know which to choose..."
1001905-73 = "What was that? You want to go over there?"
1001905-74 = "U-Um, okay. If you really want to."
1001905-75 = "[s] Enter the shop with Azusa."
1001905-81 = "...!"
1001905-82 = "This...! This is...!"
1001905-83 = "[s] \"It's a Momo Friends shop.\""
1001905-84 = "My word! It's so shameless!"
1001905-85 = "Disgusting! Absolutely revolting!"
1001905-86 = "You say this is a place to train friendships? I-I'm supposed to go over there? With those?"
1001905-87 = "B-But I...!"
1001905-89 = "I...!"
1001905-94 = "― I guess they are kind of cute!"
1001905-96 = "― I've never seen so many cute plushes![wa:820] "
1001905-99 = "― Th-This is so embarrassing...[wa:860] "
1001905-102 = "― You're going to tease me again, aren't you?[wa:800] "
1001905-104 = "― Well, I'm used to it. I don't mind it coming from you.[wa:2860] "
1001905-107 = "― Ugh! So cute![wa:1420] "
1001905-109 = "― It's just what I've always wanted.[wa:650] "
1001905-112 = "― Heeheehee... Heehee...[wa:2640] "
1001905-115 = "― ..."
1001905-117 = "― Huh? Oh, it's nothing.[wa:2880] "
1001905-120 = "― (I shouldn't say anything.)"
1001905-122 = "― (It would only complicate things between us.)"
1001905-125 = "― So how did you learn about such a cute place?[wa:570] "
1001905-127 = "― You like these things? Really?[wa:590] "
1001905-130 = "― Are you treating me like a child?[wa:1610] "
1001905-132 = "― Well...not that I mind.[wa:600] "
1001905-136 = "I'll have to come back some time."
1001905-141 = "Was this what you had in mind from the beginning? You were planning to bring me here all day, weren't you?"
1001905-142 = "Was that really the first time you've been in there?"
1001905-143 = "You only wanted to go in because it looked like fun? The same as everywhere else we visited today?"
1001905-144 = "H-How can you be so..."
1001905-145 = "...carefree?"
1001905-146 = "According to you, I'll miss all the little joys in life if I stick too closely to a plan."
1001905-147 = "You're saying that had everything been planned today, I wouldn't have had as much fun as I did."
1001905-148 = "...I'm finally starting to understand."
1001905-149 = "Today's training was invaluable."

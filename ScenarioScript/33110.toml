[translation]
33110-1 = "第11話;加速する混乱（１）"
33110-2 = "きゃああぁぁぁっ！？"
33110-3 = "待て、散らばるな！学園から出ると……！"
33110-4 = "そうだよ、ゲヘナに攻撃される！"
33110-5 = "あ、あうう……。"
33110-6 = "……大変なことになってますね。"
33110-14 = "ハナコさん、補習授業部の皆さん……！"
33110-15 = "ま、マリーさん？"
33110-19 = "マリーちゃん！無事でしたか……！"
33110-20 = "実は今、一部の過激派が独断で緊急召集令を出したようでして……。"
33110-21 = "っ！それは……"
33110-22 = "……？"
33110-23 = "え、な、何？どういうこと？"
33110-24 = "サクラコさんも不在の中、シスターフッドを指揮してティーパーティーの各派閥の暴走を止められるのは、きっとハナコさんしか……。"
33110-25 = "で、ですが今は……"
33110-26 = "ハナコさん……。"
33110-27 = "あっ、そこ！"
33110-31 = "たしか、正義実現委員会のメンバー……だよね？これから即応態勢に入る話が出てるから、急いで部室に集合！"
33110-32 = "あっ、わ、私も？で、でも……。"
33110-33 = "委員長も副委員長も見当たらないの、急いで！"
33110-37 = "あ、う、えっと……。"
33110-41 = "……ハナコちゃん、コハルちゃん。私はアズサちゃんを探します。お二人はそれぞれの場所へ、行ってきてください。"
33110-42 = "ヒフミちゃん……。"
33110-43 = "で、でも……。"
33110-44 = "こっちは大丈夫です、アズサちゃんなら必ず戻ってくるはずですから。見つけたらすぐ連絡します！"
33110-45 = "……わ、分かった！じゃあ、また後で！"
33110-46 = "……はい、了解です。マリーちゃん、行きましょう！"
33110-48 = "は、はい……！"
33110-51 = "……。"
33110-52 = "一体、何が起きて……アズサちゃん……。"
33110-54 = "エデン条約の会場は火に包まれ、現在古聖堂の周辺は凄惨な状況になっています！！"
33110-55 = "これは一体どういう状況なのか――"
33110-56 = "……。"
33110-57 = "……ナギちゃん、私いつか言ったよね。"
33110-58 = "私たちはこういう世界に生きてる。"
33110-59 = "だから……"
33110-60 = "……やっぱりセイアちゃんの言う通り。これはきっと、そういう物語なんだろうね。"
33110-61 = "……。"
33110-63 = "外郭・交戦地域の路地"
33110-69 = "エデン条約の会場は火に包まれ、現在古聖堂の周辺は凄惨な状況になっています！！"
33110-70 = "古聖堂の後方に待機していた両学園の予備兵力が、古聖堂へと進撃中！"
33110-71 = "ここからは見えませんが両学園の交戦が繰り広げられているのか、銃声と爆発音だけが聞こえてきます！"
33110-72 = "これが一体どういう状況なのかについては、未だに情報が整理されていません！負傷者数や被害の規模についても、まだ調査中のようで……"
33110-73 = "……あっ、速報です！トリニティで緊急会合が行われたとのこと！"
33110-74 = "ど、どうやらゲヘナの万魔殿の方も同様のようです！どちらの学園も、これは非常事態の宣言を準備しようとしているのでしょうか……！？"
33110-80 = "シノンちゃん、そろそろ私たちも退却した方が良いんじゃないかな！？"
33110-81 = "そうですねマイ先輩！すみませんがもう少し安全な場所に動いたのち、中継を続けます！"
33110-83 = "結局、爆発の原因は何なのですか！？"
33110-84 = "サクラコ様の行方は！？負傷者の数は！？ナギサさんとの連絡は、まだ取れないのですか！？"
33110-85 = "ツルギ委員長、そしてハスミ副委員長は未だに行方不明とのこと！そのせいか、正義実現委員会からほとんど応答がありません……！"
33110-86 = "シスターたちの招集令は！？今すぐ、私たちだけでも戒厳令を……！"
33110-87 = "どこかの分派で不審な動きが発見されたとの報告！それ以外の分派も、主要人が集まり始めているようです！"
33110-88 = "古聖堂の後方に待機していたシスターたちが、現在ゲヘナ予備兵力と交戦中！指示を待っています！"
33110-89 = "そ、[ruby=そらさき]空崎[/ruby]ヒナです！きっと彼女が元凶に違いありません！"
33110-94 = "みなさん、落ち着いてください！！"
33110-98 = "う、[ruby=うらわ]浦和[/ruby]ハナコさん……？"
33110-99 = "……サクラコさんからの依頼です。今から少々、口を出させていただきます。"
33110-100 = "ど、どういうことですか？"
33110-102 = "わ、私が保証します！サクラコさんが「もしも自分に何かあった時はハナコさんが代行として、シスターフッドの指揮を」と、頼んでいたんです……！！"
33110-103 = "なっ……しかし、いくらサクラコ様の命令だとしても、ここには他の派閥の方々も……。"
33110-104 = "今はそんなことを言っている場合ではありません！ティーパーティー全員が不在の今、バラバラになっていては……"
33110-106 = "このトリニティは、本当に崩壊してしまうんですよ！？"
33110-107 = "……！！"
33110-108 = "三頭政治の弱点、こんな形で露呈するとは思いませんでしたが……"
33110-109 = "元々あらゆる派閥が集まっていることもあって、今やティーパーティー傘下の統制はほとんど利きません。"
33110-110 = "まずは状況を整え、トリニティ全体の暴走を食い止めます。それが最優先です！"
33110-111 = "……分かりました。それがサクラコ様とのお約束なのであれば……。"
33110-112 = "……はい、異存はありません。"
33110-113 = "急いで指揮体系を構築、その後各地で起きている交戦を止めます。"
33110-114 = "そして次に、負傷者の捜索に入ってください。"
33110-115 = "その過程で正確な目撃者を含む周辺の情報を収集、そこから何が起きているかを把握していくのです！"
33110-116 = "だ、第14校舎にて騒動が！パテル分派が今すぐ戒厳令の宣布をと要求し、ティーパーティー本部へと向かっているそうです！！"
33110-117 = "っ……！正義実現委員会に連絡を！ハスミさんとツルギさんが不在時の連絡先へ！"
33110-118 = "……いえ、今は正義実現委員会も……現在シスターフッドで運用できる人数は！？"
33110-121 = "（ごめんなさい、ヒフミちゃん……私はここでの動きが精一杯かもしれません）"
33110-122 = "（アズサちゃん、コハルちゃん、先生……私も全力を尽くします。どうか、どうかご無事で……！）"
33110-124 = "正義実現委員会・部室周辺"
33110-132 = "ティーパーティーの行政官から、第14校舎へ支援要請が来ました！"
33110-133 = "さ、先ほどまでは「古聖堂の方へ」との命令だったはずでは？"
33110-134 = "シスターフッドからも連絡が来ました！どうしましょう……？"
33110-136 = "今は他の組織の命令を聞いてる場合ではありません！何よりもまず、ハスミ先輩とツルギ先輩を助けなければ！"
33110-140 = "あ、あの……"
33110-141 = "派遣されているあちこちの部員からも連絡が……ああもうっ！"
33110-146 = "あの、えっと……。"
33110-147 = "その、私は、うぅ……。"
33110-148 = "ああもう……とりあえず各位の持ち場へ！そこのあなたも！突っ立てないで本来の仕事をしてください！"
33110-152 = "え、わ、私の担当って…………"
33110-153 = "押収品の管理室？"
33110-155 = "トリニティ・第5ゲート"
33110-158 = "ど、どうしてゲヘナの車両がここに……！？"
33110-159 = "救急車？冗談じゃない、今の状況分かってるの！？"
33110-164 = "もう良いです、運転席から引っ張り出してでも思い知らせてやりましょう！！"
33110-169 = "負傷者を輸送中です、道を開けてください。緊急事態です。"
33110-170 = "ど、どうして、ゲヘナの負傷者なんかのために……！！"
33110-171 = "……。"
33110-173 = "やめてくださいっ！！"
33110-180 = "救護騎士団……？"
33110-181 = "どうして負傷者が乗ってると分かってて、救急車を攻撃しようとするんですか！そんなこと、この救護騎士団が許しません！！"
33110-182 = "負傷者を攻撃するなら、その前に私たちがお相手します。本当に、何てことを……ミネ団長がここにいらっしゃったら、きっとこの状況を悲しんだはずです。"
33110-183 = "み、ミネ団長……"
33110-185 = "それってあの「ミネが壊して騎士団が治す」のミネでしょ！？筋金入りの問題児じゃん！冗談も大概にしなよ！"
33110-186 = "い、いえ、団長は問題児ではなく、ちょっとだけ時代錯誤と言いますか……。"
33110-187 = "どっちでも良いけど、あの人は狂ってる！！"
33110-188 = "先輩、どうして逆効果になってるんでしょう……？"
33110-189 = "し、知ってはいましたが……団長って、ここまで評判悪かったんですね……。"
33110-190 = "「傷を治すより傷の原因を取り除くべき」ってよく言ってますもんね、あれのせいなのでしょうか……。"
33110-196 = "あっ、ちょっと、ど、退いてください！言うこと聞かないと、注射を打っちゃいますよ！？"
33110-197 = "すみません、閃光弾投擲します！"
33110-199 = "きゃあああっ！め、目が……！？"
33110-200 = "くっ、これは……！？"
33110-201 = "急に何……！？"
33110-205 = "申し訳ありません、手荒な真似を……それにこんな状況になってしまい……。"
33110-206 = "じ、自警団の……！"
33110-207 = "スズミさん！"
33110-208 = "ご無沙汰しております。救護騎士団の皆さんには以前、何度もお世話になりましたね。"
33110-209 = "学園の所属に関わらず、負傷者は負傷者……手荒な真似をさせるわけにはいきません。"
33110-213 = "自警団……場合によっては正義実現委員会とも真っ向から対立する、あの……。"
33110-214 = "またヤバいやつじゃん……。"
33110-215 = "……付き合ってられませんね、行きましょう。"
33110-219 = "ふう……何とか落ち着いたみたいですね。"
33110-220 = "あ、ありがとうございます、スズミさん。おかげさまで助かりました。"
33110-224 = "いえ。私にできることは少ないですが……自警団として、やれることはやらねばですから。"
33110-225 = "……おっと？"
33110-226 = "スズミさんスズミさん！！ようやく私たち自警団の出番ですね！"
33110-227 = "この自警団のエースにしてみんなのアイドル「レイサ」が、今度こそスズミさんと一緒に――"
33110-232 = "……すみません、大丈夫です。お気になさらず。それでは、私はまた何か困った事態が起きていないか見て回りますので。"
33110-236 = "あっ、スズミさん！"
33110-237 = "行ってしまいました……相変わらず、風のような方ですね。"
33110-238 = "……ご協力感謝します、救護騎士団の方々。"
33110-239 = "あ、はい！エンブレムを見るに、ゲヘナの「救急医学部」の方……ですよね？どうしてトリニティに……？"
33110-240 = "中に、トリニティの患者さんが？"
33110-241 = "シャーレの[USERNAME]先生です。"
33110-242 = "……はいっ！？"
33110-243 = "せ、先生が！？"
33110-244 = "はい、銃に撃たれてしまいまして。"
33110-248 = "えぇっ！？"
33110-250 = "次回;加速する混乱（２）"

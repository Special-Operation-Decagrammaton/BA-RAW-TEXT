[translation]
33110-1 = "ตอนที่11;ความสับสนที่เพิ่มขึ้น (1)"
33110-2 = "อ๊าาา-!!"
33110-3 = "ดะ...เดี๋ยวก่อน! อย่าแตกแถวกันไปแบบนั้น ต้องเข้าไปในโรงเรียน...!!"
33110-4 = "พวกเกเฮนน่าบุกเข้ามาโจมตีแล้ว! ถ้าไม่โต้กลับละก็...!!"
33110-5 = "อะ... อ่า...!"
33110-6 = "สภาพวุ่นวายแบบนี้..."
33110-14 = "คุณฮานาโกะ!! สมาชิกชมรมชั้นเรียนเสริมทุกคน!"
33110-15 = "อ๊ะ คะ...คุณมารี?"
33110-19 = "มะ...มารีจัง?! ปลอดภัยดีสินะคะ?!"
33110-20 = "ตะ...ตอนนี้...!! กลุ่มสภาน้ำชาบางกลุ่ม... ได้รับข้อความเรียกตัวมากะทันหันค่ะ"
33110-21 = "คะ...?! หรือว่า... ตอนนี้..."
33110-22 = "...?"
33110-23 = "นะ...นี่มันเรื่องอะไรกันเนี่ย?"
33110-24 = "ตอนนี้ท่านซากุระโกะก็ไม่อยู่เหมือนกัน เพราะงั้นคนที่จะจัดการได้ก็คงมีแต่คุณฮานาโกะคนเดียว..."
33110-25 = "ตะ... แต่ว่า... ตอนนี้..."
33110-26 = "คุณฮานาโกะ..."
33110-27 = "อ๊ะ ตรงนั้น!"
33110-31 = "เธอ... สมาชิกของชมรมทวงความยุติธรรมใช่มั้ย? ตอนนี้มีคำสั่งรวมพลฉุกเฉินมาแล้ว! ไปรวมกันที่ห้องเร็ว!"
33110-32 = "อ๊ะ เอ่อ... อื้อ ฉะ...ฉันด้วยเหรอ...? ตะ... แต่ว่า..."
33110-33 = "ตอนนี้หัวหน้ากับรองหัวหน้าไม่อยู่น่ะ รีบไปเร็วเข้า! "
33110-37 = "อะ...อื้อ"
33110-41 = "ฮานาโกะจัง โคฮารุจัง... รีบไปเถอะค่ะ ฉันจะไปตามหาอาซึสะจังเองค่ะ"
33110-42 = "ฮิฟุมิจัง..."
33110-43 = "ตะ... แต่ว่า..."
33110-44 = "ถ้าเป็นอาซึสะจังละก็... จะต้องกลับไปโรงเรียนแน่นอนค่ะ ถ้าเจออาซึสะจังแล้วฉันจะติดต่อไปนะคะ!"
33110-45 = "ขะ... เข้าใจแล้ว! ถะ...ถ้างั้นเดี๋ยวเจอกันนะ!"
33110-46 = "เข้าใจแล้วค่ะ มารีจัง... ไปกันเถอะค่ะ...! "
33110-48 = "ค่ะ ได้เลยค่ะ!"
33110-51 = "... "
33110-52 = "เกิดอะไรขึ้นกันแน่... ฮือ... อาซึสะจัง..."
33110-54 = "จู่ๆ ก็เกิดระเบิดขึ้นอย่างกะทันหันที่ห้องประชุมการลงนามสนธิสัญญาเอเดน ทำให้สถานการณ์รอบๆ วิหารโบราณขณะนี้เลวร้ายมากค่ะ!!"
33110-55 = "เกิดเรื่องอะไรขึ้น... (ติ๊ด....)"
33110-56 = "..."
33110-57 = "นางิจัง... ฉันบอกแล้วใช่มั้ย..."
33110-58 = "อื้อ... ว่าแล้วว่าพวกเราคงช่วยอะไรไม่ได้จริงๆ"
33110-59 = "โลกใบนี้น่ะ..."
33110-60 = "เป็นแบบที่เซอาจังพูดไว้เลยนะ..."
33110-61 = "..."
33110-63 = "เส้นทางรอบนอกเขตต่อสู้"
33110-69 = "จู่ๆ ก็เกิดระเบิดขึ้นอย่างกะทันหันที่ห้องประชุมการลงนามสนธิสัญญาเอเดน ทำให้สถานการณ์รอบๆ วิหารโบราณขณะนี้เลวร้ายมากค่ะ!!"
33110-70 = "กองกำลังสนับสนุนของทั้งสองโรงเรียนที่รออยู่หน้าวิหารโบราณกำลังบุกเข้าไปภายในวิหารแล้วค่ะ!!"
33110-71 = "ขณะนี้บริเวณที่เคยเป็นที่ตั้งของวิหารโบราณ มีเพียงเสียงปืนดังสนั่นจากการปะทะกันดังไปทั่วบริเวณค่ะ!"
33110-72 = "ขณะนี้ยังไม่เป็นที่ทราบแน่ชัดว่าเกิดเรื่องอะไรขึ้นภายในค่ะ! และยังไม่ทราบจำนวนผู้บาดเจ็บหรือเสียหายที่แน่นอน..."
33110-73 = "อ๊ะ ข่าวด่วนค่ะ! มีรายงานว่าทางสภาน้ำชาได้จัดประชุมฉุกเฉินขึ้นที่ทรีนิตี้ค่ะ! "
33110-74 = "คะ? ทางแพนเดโมเนียม โซไซตี้ของเกเฮนน่าเองก็จัดประชุมฉุกเฉินขึ้นค่ะ! หรือทั้งสองกำลังเตรียมประกาศสถานการณ์ฉุกเฉินอยู่กันแน่..."
33110-80 = "ว้ากกกก-!! ชิน่อนจัง ตอนนี้เราถอยออกจากที่นี่ก่อนดีมั้ย?"
33110-81 = "หะ...เห็นด้วยค่ะรุ่นพี่มาอิ! พวกเรารีบไปยังพื้นที่ปลอดภัยและเตรียมถ่ายทอดสดกันต่อดีกว่าค่ะ!"
33110-83 = "พบสาเหตุของการระเบิดแล้วค่ะ!"
33110-84 = "ที่อยู่ของท่านซากุระโกะล่ะคะ?! จำนวนผู้บาดเจ็บล่ะ!?! แล้วการติดต่อกับโฮสต์นางิสะล่ะคะ?!"
33110-85 = "ยังติดต่อกับหัวหน้าซึรุกิกับรองหัวหน้าฮาสุมิไม่ได้ค่ะ!"
33110-86 = "เกิดอะไรขึ้นกับคำสั่งรวมพลของเหล่าซิสเตอร์คะ! ตอนนี้พวกเราควรประกาศสถานการณ์ฉุกเฉิน...!"
33110-87 = "มีรายงานว่าพบการเคลื่อนไหวที่น่าสงสัยที่กองบัญชาการของสภาน้ำชาค่ะ! ตัวแทนของแต่ละฝ่ายไปรวมอยู่ที่นั่นแล้วค่ะ!"
33110-88 = "เหล่าซิสเตอร์ที่รอคำสั่งอยู่ที่ทางด้านหลังวิหารโบราณ ตอนนี้เข้าปะทะกับกองกำลังหนุน#nของเกเฮนน่าที่บุกมาแล้วค่ะ! รอคำสั่งปฏิบัติการต่อไปค่ะ! จะทำยังไงต่อดีคะ!"
33110-89 = "โซระซากิ ฮินะค่ะ! เธอคือตัวการที่เริ่มเหตุการณ์ในครั้งนี้ค่ะ!"
33110-94 = "ทุกคนกรุณาฟังฉันด้วยค่ะ!"
33110-98 = "คุณคือ... อุราวะ ฮานาโกะ?"
33110-99 = "ตามคำขอของท่านซากุระโกะ จากนี้ไปฉันจะขอยื่นมือเข้าไปยุ่งสักหน่อยนะคะ"
33110-100 = "วะ... ว่าไงนะคะ? "
33110-102 = "ค่ะ! ฉันรับรองเองค่ะ! ท่านซากุระโกะสั่งเอาไว้ว่าถ้าเกิดปัญหาอะไรขึ้นกับเธอ ให้ไปขอให้คุณฮานาโกะมาทำหน้าที่แทนค่ะ...!!"
33110-103 = "นั่นมัน... ต่อให้เป็นคำสั่งของท่านซากุระโกะก็ตาม แต่ที่นี่มีกลุ่มอื่นๆ..."
33110-104 = "ขณะที่โฮสต์ของทางสภาน้ำชาไม่อยู่ เราจะต้องจัดตั้งกองบัญชาการชั่วคราวขึ้นมาค่ะ!"
33110-106 = "ถ้าไม่ทำแบบนั้นละก็... ทรีนิตี้จะพังทลายจากยอดพิรามิดลงมาเลยค่ะ!"
33110-107 = "!!"
33110-108 = "ปัญหาของระบบการปกครองสามฝ่าย... เมื่อโฮสต์ทั้งหมดไม่อยู่จะเกิดความวุ่นวายใหญ่โตแบบนี้ขึ้น..."
33110-109 = "สภาน้ำชาที่เป็นศูนย์รวมของทุกกลุ่ม ขณะนี้ไม่สามารถควบคุมสถานการณ์ได้เรื่อยๆ แล้วค่ะ!"
33110-110 = "ถ้าไม่แก้ไขการหยุดชะงักของสภาน้ำชาละก็ จะไม่สามารถแก้ไขสถานการณ์ได้ค่ะ...!! นั่นคือสิ่งแรกที่ต้องทำค่ะ!"
33110-111 = "เข้าใจแล้วค่ะคุณฮานาโกะ หากเป็นคำสั่งของท่านซากุระโกะละก็..."
33110-112 = "เข้าใจแล้วค่ะ..."
33110-113 = "จากนั้น เราจะต้องหยุดการต่อสู้ที่ลุกลามมากขึ้นในขณะนี้ค่ะ!"
33110-114 = "แล้วก็ค้นหาและอพยพผู้บาดเจ็บ!"
33110-115 = "รวบรวมข้อมูลทั้งหมดจากพยานและผู้เห็นเหตุการณ์ที่อยู่รอบๆ เพื่อวิเคราะห์สถานการณ์ว่าเกิดอะไร#nขึ้นในตอนนี้กันแน่ค่ะ!"
33110-116 = "กะ...เกิดเหตุที่อาคารเรียนที่ 14 ในโรงเรียน! เราได้รับรายงานว่าตอนนี้กลุ่มปาเตอร์กำลังมุ่งหน้า#nไปที่กองบัญชาการของสภาน้ำชาเพื่อเรียกร้องให้ประกาศสถานการณ์ฉุกเฉินค่ะ!!"
33110-117 = "เริ่มแล้วเหรอ...?! รบกวนติดต่อไปที่ชมรมทวงความยุติธรรมด้วยค่ะ! รบกวนหาผู้ที่รับผิดชอบดูแลสถานการณ์ขณะที่คุณซึรุกิกับคุณฮาสุมิไม่อยู่ด้วยค่ะ ซึ่งอาจจะเป็น..."
33110-118 = "ไม่สิ... ตอนนี้ทางชมรมทวงความยุติธรรมเองก็น่าจะวุ่นวายอยู่... ตอนนี้ชมรมซิสเตอร์มีสมาชิกที่พร้อมเคลื่อนไหวอยู่กี่คนคะ?!"
33110-121 = "(ขอโทษนะ ฮิฟุมิจัง... ฉันคงจะต้องอยู่ที่นี่สักพักแล้วละค่ะ...)"
33110-122 = "(อาซึสะจัง โคฮารุจัง... คุณครู... ขอให้ปลอดภัยนะคะ)"
33110-124 = "บริเวณใกล้ๆ ชมรมทวงความยุติธรรม"
33110-132 = "มะ...มีคำร้องขอกำลังสนับสนุนจากสภาน้ำชาที่อาคารเรียน 14 ค่ะ!"
33110-133 = "ว่าไงนะ? เมื่อกี้มีคำสั่งให้ไปรวมพลที่วิหารโบราณไม่ใช่เหรอคะ?"
33110-134 = "ทางชมรมซิสเตอร์ติดต่อมา...! ทำยังไงดีคะ?"
33110-136 = "นี่ไม่ใช่เวลาจะมัวมาฟังคำสั่งคนอื่นนะ! เราต้องรีบไปช่วยรุ่นพี่ฮาสุมิกับรุ่นพี่ซึรุกิสิคะ!"
33110-140 = "อา... เอ่อ..."
33110-141 = "ฉันต้องทำยังไงดีคะ? สมาชิกที่ส่งออกไปเอาแต่ติดต่อมาถามตลอดเลยว่าจะต้องทำยังไง..."
33110-146 = "คะ... คือว่า..."
33110-147 = "ฮือ... ฉัน...จะ...ต้องทำยังไง..."
33110-148 = "นี่ เธอน่ะ! ช่วยหยุดเดินไปเดินมาแล้วก็ไปประจำตำแหน่งที่รับผิดชอบได้แล้ว!!"
33110-152 = "อ๊ะ เอ่อ... อื้อ...? ตำแหน่งที่ฉันรับผิดชอบ..."
33110-153 = "คะ...คลังวัตถุที่ยึดมา...?"
33110-155 = "ประตูหน้าทรีตินี้ 5"
33110-158 = "ทำไมรถของเกเฮนน่าถึงมาอยู่ที่นี่ได้ล่ะคะ!!"
33110-159 = "รถฉุกเฉินเหรอ? ล้อเล่นรึเปล่า! รู้สถานการณ์ตอนนี้บ้างรึเปล่าเนี่ย?!  ประกาศกฎอัยการศึกแล้วนะ!!"
33110-164 = "รีบไปจับยัยนั่นมาเดี๋ยวนี้เลย... แสดงฝีมือให้เห็นกันไปเลย!!"
33110-169 = "เรากำลังเคลื่อนย้ายผู้บาดเจ็บอยู่ค่ะ กรุณาหลีกทางด้วย ตอนนี้สถานการณ์เร่งด่วนมากค่ะ"
33110-170 = "ผู้บาดเจ็บเหรอ?! อย่ามาล้อเล่นน่า ผู้บาดเจ็บของเกเฮนน่าแล้วยังไง...!!"
33110-171 = "..."
33110-173 = "หยุดทะเลาะกันได้แล้วค่ะ!!"
33110-180 = "ชมรมอัศวินบรรเทาทุกข์...?"
33110-181 = "โจมตีรถฉุกเฉินที่ขนย้ายคนเจ็บแบบนี้ ความโหดร้ายอย่างนั้นทางชมรมอัศวินบรรเทาทุกข์ จะไม่ยกโทษให้เด็ดขาดค่ะ!!"
33110-182 = "การโจมตีใส่ผู้ที่บาดเจ็บก็เหมือนกับการโจมตีใส่ชมรมอัศวินบรรเทาทุกข์ของเรา... ถ้าหัวหน้ามิเนะอยู่ละก็... คงรู้สึกเสียใจกับสถานการณ์นี้มากแน่ๆ ค่ะ!"
33110-183 = "ถะ...ถ้าเป็นหัวหน้ามิเนะละก็..."
33110-185 = "มิเนะคนบ้าที่ลือกันว่าคติของเธอคือ \"ทำลายและให้กลุ่มอัศวินซ่อมแซม\" นั่นน่ะเหรอ! คิดจะข่มขู่กันรึไง!"
33110-186 = "คะ? มะ... ไม่ใช่นะคะ! หัวหน้าไม่ได้บ้านะคะ แค่เหมือนหลงยุคเฉยๆ..."
33110-187 = "แบบนั้นก็เรียกว่าบ้ามั้ยล่ะ!"
33110-188 = "ระ...รุ่นพี่เซรินะ? รู้สึกเหมือนจะได้ผลตรงกันข้ามเลยนะคะ?"
33110-189 = "งะ...งั้นเหรอคะ หัวหน้าชื่อเสียงย่ำแย่ขนาดนี้เลยงั้นเหรอ..."
33110-190 = "หัวหน้าเป็นคนที่ยืนกรานว่าควรจะกำจัดสาเหตุของบาดแผลมากกว่าการรักษาบาดแผลที่เกิดขึ้นนี่คะ..."
33110-196 = "ดะ...เดี๋ยวก่อนสิคะ! ถ้าเข้าไปใกล้กว่านี้อีกละก็จะจับฉีดยานะคะ!"
33110-197 = "ด้านหน้ามีระเบิดแสง!!"
33110-199 = "อ๊าาาากกก-! จะ...จู่ๆ เกิดอะไรขึ้นกันเนี่ย ตาฉัน... ตาฉันมองไม่เห็นอะไรเลย!"
33110-200 = "มึนหัวไปหมดแล้ว! โอ๊ยยยย เวียนหัวที่สุด...!"
33110-201 = "กะ...เกิดอะไรขึ้นกันเนี่ย!?"
33110-205 = "การรักษาความสงบมันย่ำแย่ขนาดนี้เลยเหรอ... ในฐานะกลุ่มรักษาความสงบคงอยู่เฉยไม่ได้แล้วค่ะ"
33110-206 = "กลุ่มรักษาความสงบ....!?"
33110-207 = "คุณสึซึมิ! "
33110-208 = "ชมรมอัศวินบรรเทาทุกข์... ตอนที่ไปลาดตระเวนเคยรบกวนเอาไว้หลายครั้งเลยนะคะ"
33110-209 = "นอกจากนี้ผู้ที่บาดเจ็บก็คือผู้บาดเจ็บ ไม่มากไม่น้อยไปกว่านั้น ไม่มีสังกัดหรอกค่ะ"
33110-213 = "กลุ่มรักษาความสงบงั้นเหรอ... ถ้าเกิดจำเป็น พวกนั้นก็พร้อมที่จะเป็นศัตรูกับชมรมทวงความยุติธรรม เลยนะ..."
33110-214 = "พวกบ้าระห่ำโผล่มาอีกแล้ว..."
33110-215 = "ตอนนี้ไม่ใช่เวลามาสนใจหรอก... กลับกันเถอะ"
33110-219 = "เฮ้อ ทุกคนกลับกันไปหมดแล้วค่ะ"
33110-220 = "ขะ...ขอบคุณนะคะ คุณสึซึมิ รอดมาได้เพราะคุณสึซึมิมาช่วยไว้เลยค่ะ"
33110-224 = "ไม่หรอกค่ะ ตอนที่ระบบการปกครองหยุดชะงัก กลุ่มรักษาความสงบต้องออกเคลื่อนไหวอยู่แล้วค่ะ"
33110-225 = "หืม...?"
33110-226 = "คุณสึซึมิ! คุณสึซึมิ! ในที่สุดก็ถึงเวลากลุ่มรักษาความสงบออกโรงแล้วสินะคะ! "
33110-227 = "อุซาวะ เรอิสะจะได้ออกโรงพร้อมกับคุณสึซึมิ อะ...เอซของกลุ่มรักษาความสงบ ไอดอลของทุกคน...!"
33110-232 = "... ขอโทษด้วยค่ะ ฉันต้องรีบไปช่วยคนอื่นๆ แล้ว"
33110-236 = "อะ...อ๊ะ! คุณสึซึมิ!"
33110-237 = "ไปซะแล้วนะคะ... เป็นคนที่ไปมาไวเหมือนกับสายลมจริงๆ เลยค่ะ"
33110-238 = "ขอบคุณที่ให้ความร่วมมือนะคะ ชมรมอัศวินบรรเทาทุกข์"
33110-239 = "อ๊ะ ค่ะ! ดูจากเครื่องหมายนั่นแล้ว... หน่วยแพทย์ฉุกเฉินของเกเฮนน่า...ใช่มั้ยคะ? ทำไมถึงมาช่วยผู้ป่วยถึงที่อาคารส่วนกลางของทรีนิตี้ได้คะ...?"
33110-240 = "คนเจ็บที่อยู่ข้างในคือใครเหรอคะ? "
33110-241 = "ค่ะ คุณครู [USERNAME] แห่งชาเล่ต์ค่ะ "
33110-242 = "คะ?!"
33110-243 = "คะ... คุณครูเหรอคะ?! "
33110-244 = "คุณครูถูกยิงมาค่ะ"
33110-248 = "ว่ายังไงนะคะ?!!??!!"
33110-250 = "ตอนต่อไป;ความสับสนที่เพิ่มขึ้น (2)"

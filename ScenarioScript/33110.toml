33110-69 = "A sudden explosion at the Eden Treaty signing ceremony has left everything surrounding the cathedral in utter chaos!"
33110-70 = "The two academies' security forces are now advancing upon the cathedral!"
33110-71 = "We don't have a visual from here, but the sound of gunfire and explosions means fighting has broken out!"
33110-72 = "The number of casualties and extent of the damage have yet to be confirmed, and—"
33110-73 = "Breaking news! The Tea Party has called an urgent meeting at Trinity."
33110-74 = "We're now getting word that the Pandemonium Society has done the same at Gehenna. Are the two academies preparing to declare a state of emergency?"
33110-80 = "Shinon! Don't you think it's time we retreat too?!"
33110-81 = "Good thinking, Mai. Our broadcast will continue once we've made it to a safe distance!"
33110-83 = "Has the cause of the explosion been found?"
33110-84 = "Where is Sakurako?! How many were injured?! Has no one heard from Nagisa?!"
33110-85 = "President Tsurugi and Vice President Hasumi are still unaccounted for!"
33110-86 = "What of the Sisters' mobilization orders? We may have to declare martial law at this rate..."
33110-87 = "Suspicious activity has been reported at Tea Party headquarters. Representatives from each faction are beginning to gather there."
33110-88 = "The Sisters that were put on standby at the cathedral are now engaging Gehenna's forces. Awaiting orders!"
33110-89 = "Then our focus must be Sorasaki Hina!"
33110-94 = "Everyone, please calm down!"
33110-98 = "Urawa Hanako? What is it you want?"
33110-99 = "Let me take things from here...at Sakurako's request."
33110-100 = "Wh-What was that? "
33110-102 = "She's speaking the truth. Sakurako asked that Hanako take command should anything happen to her. I can vouch for that."
33110-103 = "Even IF those are Sakurako's orders, she is still an outsider."
33110-104 = "We don't have time for that. A temporary chain of command needs to be established in the absence of all Tea Party hosts!"
33110-106 = "Or else Trinity will collapse from the top down!"
33110-107 = "...!"
33110-108 = "This is the flaw with a triumvirate system. With all three hosts gone, chaos is beginning to reign."
33110-109 = "The different factions each member used to keep in check are going rampant!"
33110-110 = "Our top priority is to regain control and calm the situation."
33110-111 = "Understood. If this is what Sakurako wanted..."
33110-112 = "Yes. No objections."
33110-113 = "Let's hurry and establish the chain of command. Then do what you can to stop the skirmishes that have broken out."
33110-114 = "Take care to evacuate any wounded you find!"
33110-115 = "Our forces will also need to gather every bit of information from their surroundings, including eyewitness testimony along the way."
33110-116 = "A riot has broken out at the Building 14! The Pater faction is heading to Tea Party HQ to demand martial law be declared as we speak!"
33110-117 = "Already? Please contact the Justice Task Force. We need to be in touch with the next in command in case of Tsurugi and Hasumi's absence."
33110-118 = "No, wait. They're likely in utter chaos as well... How many forces do we have available right now?!"
33110-121 = "(I'm sorry, Hifumi. It looks like I'll have my hands full here longer than I thought.)"
33110-122 = "(I'm going to do everything I can. I just pray the others will be safe.)"
33110-124 = "Outside Justice Task Force HQ"
33110-132 = "W-We've received a request for reinforcements at Building 14 from a Tea Party officer!"
33110-133 = "But weren't we ordered to head straight to the cathedral?"
33110-134 = "Now the Sisterhood is contacting us! What should we do?"
33110-136 = "Now isn't the time to follow orders from other organizations! Our top priority is to save President Tsurugi and Vice President Hasumi!"
33110-140 = "U-Um..."
33110-141 = "We're also receiving reports from our members that have been dispatched around the city."
33110-146 = "U-Um, excuse me..."
33110-147 = "I, uh... What am I supposed to do now?"
33110-148 = "Hey, you! Don't just stand there! Get back to your position!"
33110-152 = "Huh? My position?"
33110-153 = "The contraband storage?"
33110-155 = "Trinity Main Gate 5"
33110-158 = "What's one of Gehenna's vehicles doing here?!"
33110-159 = "It looks like an ambulance. Is the driver out of her mind? Doesn't she realize the situation we're in?"
33110-164 = "Stop her in her tracks! She's going to have to learn the hard way!"
33110-169 = "I've come to transport someone who's been critically injured. Please clear the way. This is an emergency."
33110-170 = "Injured? Who cares about Gehenna's wounded?!"
33110-171 = "..."
33110-173 = "Please stop!"
33110-180 = "The Remedial Knights?"
33110-181 = "You know better than to attack an ambulance carrying the wounded! We aren't going to stand back and allow that!"
33110-182 = "You'll have to go through us first. Captain Mine would be so disappointed in this situation if she were here!"
33110-183 = "The captain of the Remedial Knights...?"
33110-185 = "You mean the same Mine that destroys everything and has her knights pick up the pieces?! That's who you're threatening us with?!"
33110-186 = "I-It isn't like that! The captain doesn't mean to do any harm. She's just a little anachronistic is all..."
33110-187 = "More like delusional!"
33110-188 = "Wh-What do we do now? I think mentioning the captain backfired."
33110-189 = "I'll say. I knew the captain's reputation preceded her, but I didn't know it had gotten this bad..."
33110-190 = "She is always saying things like, \"It's more effective to remove the cause of a wound than treat it.\""
33110-196 = "H-Hey, back up! Come any closer and you're getting an injection!"
33110-197 = "Flash grenade incoming!"
33110-199 = "Ahhhhh! My eyes! I can't see!"
33110-200 = "I think I'm gonna pass out! Everything spinning!"
33110-201 = "Wh-What's going on?!"
33110-205 = "That's enough. The Vigilante Crew won't overlook such egregious disturbances to the peace."
33110-206 = "Th-The Vigilante Crew?!"
33110-207 = "Suzumi! "
33110-208 = "I owe you Remedial Knights for all the help you've given me."
33110-209 = "The wounded deserve to be cared for, regardless of their affiliation."
33110-213 = "The Vigilante Crew... I heard they even clash with the Justice Task Force when they have to. "
33110-214 = "They're even crazier than the Remedial Knights."
33110-215 = "We don't have time for this. Let's get out of here."
33110-219 = "*sigh* They finally left."
33110-220 = "Thanks for all the help, Suzumi. You saved us."
33110-224 = "Not at all. It's only natural for a vigilante to help when the peace is being disturbed."
33110-225 = "Hmm?"
33110-226 = "Suzumi! This is it! It's the Vigilante Crew's time to shine! "
33110-227 = "I, Uzawa Reisa, ace of the Vigilante Crew and idol to all, shall join you!"
33110-232 = "Sorry about that. I should go check on the others before they get carried away."
33110-236 = "W-Wait, Suzumi!"
33110-237 = "Too late. There she goes, gone with the wind like always."
33110-238 = "Ahem. I should be thanking you, Remedial Knights."
33110-239 = "Oh, right! Don't mention it. That emblem means you're from Gehenna's Medical Emergency Club, right? Why bring a patient to Trinity's main building?"
33110-240 = "Could the patient inside be from Trinity? "
33110-241 = "No. It's Schale's [USERNAME] Sensei. "
33110-242 = "What?!"
33110-243 = "S-Sensei?! "

[translation]
33110-1 = "第11話;加速的混亂（１）"
33110-2 = "呀啊啊啊啊啊！？"
33110-3 = "等等，不要分散！離開學園的話……！"
33110-4 = "就是啊，會被格黑娜攻擊！"
33110-5 = "啊，啊嗚嗚……"
33110-6 = "……變成大事了呢。"
33110-14 = "花子同學，補課部的大家……！"
33110-15 = "瑪，瑪麗同學？"
33110-19 = "瑪麗醬！妳沒事啊……！"
33110-20 = "其實，現在因為一部分過激派的獨斷發出了緊急召集令……"
33110-21 = "……！那是……"
33110-22 = "……？"
33110-23 = "咦，什，什麼？怎麼回事？"
33110-24 = "櫻子同學不在的時候，能夠指揮修女會並阻止茶會各派系暴走的，肯定就只有花子同學了……"
33110-25 = "不，不過現在……"
33110-26 = "花子同學……"
33110-27 = "啊，那邊！"
33110-31 = "記得是，實現正義部的成員……沒錯吧？因為接下來將進入機動態勢，趕快到社辦集合！"
33110-32 = "啊，我，我也要？可，可是……"
33110-33 = "部長和副部長都不知去向了，動作快！"
33110-37 = "啊，唔，那個……"
33110-41 = "……花子醬、小春醬。我去找梓醬。請兩位各自去自己該去的地方吧。"
33110-42 = "日步美醬……"
33110-43 = "可，可是……"
33110-44 = "這邊沒事的，梓醬的話肯定會回來的。找到了我會馬上聯絡妳們！"
33110-45 = "……我，我知道了！那就等會見！"
33110-46 = "……好的，了解。瑪麗醬，走吧！"
33110-48 = "是，是的……！"
33110-51 = "……"
33110-52 = "到底，發生了什麼……梓醬……"
33110-54 = "伊甸園條約的會場被火焰包圍，現在古教堂的周邊狀況變得非常淒慘！！"
33110-55 = "這到底是什麼狀況呢──"
33110-56 = "……"
33110-57 = "……渚醬，我曾經說過了吧。"
33110-58 = "我們活在這樣的世界。"
33110-59 = "所以……"
33110-60 = "……果然就如聖亞醬所說的。這一定是，那樣的故事呢。"
33110-61 = "……"
33110-63 = "外圍．交戰地區的小路"
33110-69 = "伊甸園條約的會場被火焰包覆，現在古教堂的周邊狀況變得非常淒慘！！"
33110-70 = "於古教堂後方待機兩學園的後備兵力，正向著古教堂進攻！"
33110-71 = "雖然從這裡看不見，不過兩學園似乎正在交戰，只能聽見槍聲和爆炸聲！"
33110-72 = "關於這到底是什麼狀況，現在還沒整理出情報！關於傷員人數和被害的規模也是，似乎還在調查中……"
33110-73 = "……啊，即時快報！在三一進行了緊急會議！"
33110-74 = "看，看來格黑娜的萬魔殿也是相同的狀況！不管是哪間學園，都在準備發出緊急事態的宣言嗎……！？"
33110-80 = "詩音醬，我們也差不多該撤退了比較好吧！？"
33110-81 = "說的也是呢麻衣前輩！不好意思移動到稍微安全一點的地方後，再繼續轉播！"
33110-83 = "結果，爆炸的原因是什麼！？"
33110-84 = "櫻子大人的去向呢！？傷員的人數呢！？和渚主席的聯絡呢，還沒聯絡上嗎！？"
33110-85 = "弦生部長，還有蓮實副部長仍然下落不明！因為這個原因，幾乎沒有來自實現正義部的回覆……！"
33110-86 = "修女們的召集令呢！？現在立刻，就算只有我們也該把戒嚴令……！"
33110-87 = "收到了發現某處分派的可疑動向！除此之外的分派也是，主要人物似乎開始聚集了！"
33110-88 = "於古教堂後方待機的修女們，現在正和格黑娜的後備兵力交戰中！正在等候指示！"
33110-89 = "空，空崎陽奈！她肯定就是元兇沒錯！"
33110-94 = "大家，請冷靜一點！！"
33110-98 = "浦，浦和花子同學……？"
33110-99 = "……這是來自櫻子同學的委託。現在開始稍微，讓我插個嘴吧。"
33110-100 = "怎，怎麼回事？"
33110-102 = "我，我可以保證！櫻子同學說過「如果自己有什麼萬一，就由花子同學代為指揮修女會」……！！"
33110-103 = "什……不過，就算是櫻子大人的命令，這裡也有其他派系的人……"
33110-104 = "現在不是說那種事的時候！茶會全員不在的現在，分崩離析的話……"
33110-106 = "這個三一，真的會崩壞唷！？"
33110-107 = "……！！"
33110-108 = "沒想到三頭政治的弱點，會以這種形式展露……"
33110-109 = "因為原本就是由各種派系集結的，現在茶會旗下的統治幾乎不起作用。"
33110-110 = "首先整理狀況，阻止三一全體的暴走。這是最優先的！"
33110-111 = "……我明白了。如果那就是和櫻子大人的約定的話……"
33110-112 = "……是的，沒有異議。"
33110-113 = "儘速構築指揮體系，之後阻止在各地發生的交戰。"
33110-114 = "接著是，進入傷員的搜索。"
33110-115 = "在那個過程中包含正確的目擊者進行周邊的情報蒐集，從這裡掌握發生了什麼！"
33110-116 = "第，第14校舍發生騷動！聖父分派要求立刻宣布戒嚴令，正在前往茶會本部！！"
33110-117 = "……！聯絡實現正義部！用蓮實同學和弦生同學不在時的聯絡方式！"
33110-118 = "……不，現在實現正義部也……現在修女會能運用的人數是！？"
33110-121 = "（對不起，日步美醬……我光是應付這裡似乎就已經分身乏術了）"
33110-122 = "（梓醬、小春醬、老師……我也會盡全力。請一定，請一定要平安無事……！）"
33110-124 = "實現正義部．社辦周邊"
33110-132 = "茶會的行政官傳來前往第14校舍的支援請求！"
33110-133 = "到，到剛才為止都是「前往古教堂」的命令不是嗎？"
33110-134 = "也有來自修女會的聯絡！該怎麼辦……？"
33110-136 = "現在不是聽其他組織命令的場合！首先最重要的是，救出蓮實前輩和弦生前輩才行！"
33110-140 = "那，那個……"
33110-141 = "派遣出去的成員也從各個地方發出聯絡……啊啊真是！"
33110-146 = "那個，這個……"
33110-147 = "那個，我，唔唔……"
33110-148 = "啊啊真是……總之就各自的崗位！那邊的妳也是！請別站在那裡，去做妳本來的工作！"
33110-152 = "咦，我，我負責的是……"
33110-153 = "扣押品的管理室？"
33110-155 = "三一．5號門"
33110-158 = "為，為什麼格黑娜的車子在這裡……！？"
33110-159 = "救護車？別開玩笑了，理解現在是什麼狀況嗎！？"
33110-164 = "不管了，把她從駕駛座拖出來給她好看吧！！"
33110-169 = "運送傷患中，請讓開。事態緊急。"
33110-170 = "為，為什麼，要為了格黑娜的傷員什麼的……！！"
33110-171 = "……"
33110-173 = "請住手！！"
33110-180 = "救護騎士團……？"
33110-181 = "為什麼知道載有傷患還攻擊救護車呢！那種事，我們救護騎士團無法原諒！！"
33110-182 = "要攻擊傷患的話，就讓我們先來當妳們的對手吧。真是的，做了什麼……如果美禰團長在這裡的話，一定會為這個狀況感到悲傷的。"
33110-183 = "美，美禰團長……"
33110-185 = "那不就是那個「美禰團長來破壞，騎士團來治療」的美禰嗎！？根本是肌肉腦的問題兒童嘛！開玩笑也有個限度啊！"
33110-186 = "不，不是，團長並不是問題兒童，該說是稍微生錯了時代嗎……"
33110-187 = "怎樣都好，那個人瘋了！！"
33110-188 = "前輩，為什麼產生了反效果呢……？"
33110-189 = "雖，雖然我知道……不過團長，評價差到這種程度啊……"
33110-190 = "「與其治療傷口不如根除原因」常常這樣說呢，是因為這個原因嗎……"
33110-196 = "啊，等等，請，請退開！不好好聽話的話，我要注射了唷！？"
33110-197 = "不好意思，投擲閃光彈！"
33110-199 = "呀啊啊啊！眼，眼睛……！？"
33110-200 = "呃，這是……！？"
33110-201 = "突然怎麼了……！？"
33110-205 = "非常抱歉，做了粗暴的事……而且變成了這種狀況……"
33110-206 = "自，自衛隊……！"
33110-207 = "鈴美同學！"
33110-208 = "久疏問候了。以前受到了救護騎士團的各位很多關照呢。"
33110-209 = "不論所屬學園，傷患就是傷患……不能讓妳們做出粗暴的舉動。"
33110-213 = "自衛隊……根據場合也會和實現正義部正面對立的，那個……"
33110-214 = "又是不妙的人嘛……"
33110-215 = "……無法奉陪呢，走吧。"
33110-219 = "呼……總算是平靜下來了呢。"
33110-220 = "謝，謝謝妳，鈴美同學。多虧妳得救了。"
33110-224 = "不。雖然我能做到的事很少……不過作為自衛隊，我必須盡我所能。"
33110-225 = "……哎呀？"
33110-226 = "鈴美同學鈴美同學！！終於輪到我們自衛隊的出場了呢！"
33110-227 = "就由我這個自衛隊的王牌大家的偶像「澪紗」，這次一定要和鈴美同學一起──"
33110-232 = "……不好意思，沒事的。請不用在意。那麼，我再去四周看看有沒有發生什麼讓人困擾的事態。"
33110-236 = "啊，鈴美同學！"
33110-237 = "走掉了……一如往常，是位像風一樣的人呢。"
33110-238 = "……感謝協助，救護騎士團的各位。"
33110-239 = "啊，是的！從徽章來看，是格黑娜「急救醫學部」的人……沒錯吧？為什麼來三一……？"
33110-240 = "裡面有，三一的患者嗎？"
33110-241 = "是夏萊的[USERNAME]老師。"
33110-242 = "……什麼！？"
33110-243 = "老，老師！？"
33110-244 = "是的，被槍擊中了。"
33110-248 = "咦咦！？"
33110-250 = "下一話;加速的混亂（２）"

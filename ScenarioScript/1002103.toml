[translation]
1002103-1 = "Ambiance Matters"
1002103-2 = "*murmuring*"
1002103-3 = "[s] \"...?\""
1002103-4 = "I hurried over, but there were no signs of gunfire or struggle."
1002103-6 = "The place was in front of the Beach Shack. The only one there was Azusa, looking around blankly."
1002103-7 = "..."
1002103-8 = "[s] \"Azusa?\""
1002103-9 = "Oh, Sensei."
1002103-10 = "I didn't expect you to be here so soon."
1002103-11 = "[s] \"Didn't you request support?\""
1002103-12 = "Yes, that's right. I'm in a very difficult position right now."
1002103-13 = "Um..."
1002103-14 = "Azusa silently gazed at the sign for the Beach Shack."
1002103-15 = "The sign read, \"Limited-time yakisoba, first come, first served!\" in large letters."
1002103-16 = "Given the number of people already lined up outside, it looked like it would run out soon."
1002103-17 = "The truth is..."
1002103-18 = "Um..."
1002103-19 = "[s] \"Do you not want to stand in line because of the crowd?\""
1002103-20 = "...!"
1002103-21 = "[s1] \"I'll take your silence as confirmation.\"\n[s2] \"I can see why you would need support.\""
1002103-22 = "I-I mean, it's not exactly like that, but..."
1002103-23 = "I-I mean, it's not exactly like that, but..."
1002103-24 = "Huh? You'll buy it for me? Are you sure?"
1002103-25 = "[s3] \"Sure. I'm your sensei, after all.\"\n[s4] \"Actually, I've been looking forward to this!\""
1002103-26 = "Hmm. If you say so, Sensei."
1002103-27 = "Hmm. If you say so, Sensei."
1002103-28 = "Okay. I accept. I'll make sure to repay you later."
1002103-29 = "Thank you, Sensei."
1002103-31 = "Fortunately, it wasn't too late for an order, so I got two bowls of yakisoba with Azusa."
1002103-32 = "However, for something that was being promoted as available for a limited time only, the taste was a little..."
1002103-33 = "..."
1002103-34 = "[s] \"So what do you think?\""
1002103-35 = "Huh?"
1002103-36 = "It's really good—even better than I expected."
1002103-37 = "What about you? Do you like it?"
1002103-38 = "I can tell by your expression that this isn't what you expected."
1002103-39 = "[s5] \"No, I like it too.\"\n[s6] \"If you enjoy it, that's all that matters.\""
1002103-40 = "Is that so? Okay... Hmm."
1002103-41 = "Is that so? Okay... Hmm."
1002103-42 = "Heehee."
1002103-43 = "[s] \"Azusa?\""
1002103-44 = "It's nothing."
1002103-45 = "This soba was more delicious than anything I've ever had before."
1002103-48 = "Yes, really."
1002103-50 = "I ordered shaved ice because the soba on its own was kind of a letdown."
1002103-51 = "I'm not sure why, but the shaved ice tasted really good."

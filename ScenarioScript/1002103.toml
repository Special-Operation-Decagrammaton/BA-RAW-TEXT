[translation]
1002103-1 = "因為有你在身邊"
1002103-2 = "（鬧哄哄……)"
1002103-3 = "[s] 「……？」"
1002103-4 = "（慌慌張張跑了過來，但現場沒有發生戰鬥，也罕見地沒有聽見槍聲）"
1002103-6 = "（抵達的地點是海之家。只見梓心神不寧的站在店外環顧四週）"
1002103-7 = "……"
1002103-8 = "[s] 「……梓？」"
1002103-9 = "……啊，老師。"
1002103-10 = "謝謝，沒想到你會這麼快過來。"
1002103-11 = "[s] 「你說你需要幫助……？」"
1002103-12 = "沒錯，我需要老師的幫助。#n我現在面臨相當令人困擾的狀況……"
1002103-13 = "那個，該怎麼說才好呢……"
1002103-14 = "（梓靜靜地瞄了一下海之家的招牌）"
1002103-15 = "（上面大大的寫著「限定版炒麵，先搶先贏！」)"
1002103-16 = "（看著大排長龍的人群，感覺現在去排隊也不知是否來得及）"
1002103-17 = "這……其實……"
1002103-18 = "就是……"
1002103-19 = "[s] 「覺得排隊買這種東西有點難為情……是嗎？」"
1002103-20 = "……！！"
1002103-21 = "[s1] 「原來如此，了解。」\n[s2] 「『限定』這個詞確實會讓人在意呢。」"
1002103-22 = "那個，也不是說非買不可啦……"
1002103-23 = "那個，也不是說非買不可啦……"
1002103-24 = "……咦？你要幫我買……？#n……真，真的嗎？"
1002103-25 = "[s3] 「畢竟我是梓的老師。」\n[s4] 「這點小事不算什麼！」"
1002103-26 = "既然老師都這麼說了……"
1002103-27 = "既然老師都這麼說了……"
1002103-28 = "……那就拜託了。這份人情我一定會還。"
1002103-29 = "……謝謝你，老師。"
1002103-31 = "（幸好有在店家賣完之前排到，也和梓一起享用了炒麵）"
1002103-32 = "（但限定版炒麵的味道，老實說實在不如預期……)"
1002103-33 = "……"
1002103-34 = "[s] 「……覺得怎麼樣？」"
1002103-35 = "……嗯？"
1002103-36 = "嗯，非常好吃。超乎我的期待。"
1002103-37 = "老師呢？"
1002103-38 = "……總覺得表情有些微妙。和想像中的不一樣嗎？"
1002103-39 = "[s5] 「不，我也覺得好吃。」\n[s6] 「梓覺得好吃比什麼都重要。」"
1002103-40 = "……是嗎？"
1002103-41 = "……是嗎？"
1002103-42 = "……呵呵。"
1002103-43 = "[s] 「……梓？」"
1002103-44 = "沒事，沒什麼。"
1002103-45 = "很好吃哦……比我吃過的任何炒麵都更加美味。"
1002103-48 = "……究竟是為什麼呢。#n我真的，打從心底這麼認為。"
1002103-50 = "（之後由於覺得只吃炒麵不夠滿足，兩人一邊閒聊一邊去買了刨冰）"
1002103-51 = "（不知為何，那份刨冰似乎也比曾經吃過的任何刨冰都還要美味）"

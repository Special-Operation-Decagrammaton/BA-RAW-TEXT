[translation]
1002103-1 = "สภาพแวดล้อมคือเครื่องปรุงรสที่สำคัญ"
1002103-2 = "(เสียงพูดคุยจอแจ)"
1002103-3 = "[s] \"......?\""
1002103-4 = "(คุณครูรีบมาสุดฝีเท้า แต่ก็ไม่ได้ยินทั้งเสียงปืน และไม่มีบรรยากาศที่อันตรายด้วย)"
1002103-6 = "(ณ หน้าร้านริมทะเล มีแต่อาซึสะที่ยืนมองรอบๆ อยู่อย่างเหม่อลอย)"
1002103-7 = "......"
1002103-8 = "[s] \"อาซึสะ?\""
1002103-9 = "อ่า... คุณครู"
1002103-10 = "มาได้จังหวะพอดีเลย ไม่คิดเลยว่าจะมาเร็วแบบนี้"
1002103-11 = "[s] \"ความช่วยเหลือที่ขอคือ...?\""
1002103-12 = "อื้ม ใช่แล้ว ฉันขอความช่วยเหลือเพราะตอนนี้อยู่ในสถานการณ์ที่ลำบากมากๆ"
1002103-13 = "คือว่า..."
1002103-14 = "(อาซึสะเอาแต่มองป้ายร้านริมทะเลโดยที่ไม่พูดอะไร)"
1002103-15 = "(ที่ร้านมีป้ายขนาดใหญ่เขียนไว้ว่า 'ยากิโซบะสูตรพิเศษ จำนวนจำกัด!')"
1002103-16 = "(ดูจากจำนวนคนที่มาต่อแถวแล้วน่าจะขายหมดเร็วๆ นี้)"
1002103-17 = "คือว่า... จริงๆ แล้ว..."
1002103-18 = "อืม..."
1002103-19 = "[s] \"คนเยอะจนไม่อยากต่อแถวเหรอ?\""
1002103-20 = "...!!"
1002103-21 = "[s1] \"ไม่ปฏิเสธแบบนี้แสดงว่าใช่\"\n[s2] \"ต้องการ 'ความช่วยเหลือ' จริงๆ ด้วยสินะ\""
1002103-22 = "อืม... จะว่าแบบนั้นก็ไม่ถูกไปซะทั้งหมด... คือว่า..."
1002103-23 = "อืม... จะว่าแบบนั้นก็ไม่ถูกไปซะทั้งหมด... คือว่า..."
1002103-24 = "หืม...? จะซื้อให้ฉันเหรอ? ทำแบบนั้น... ได้จริงๆ เหรอ...?"
1002103-25 = "[s3] \"ไม่เห็นเป็นไรเลย ก็ครูเป็นครูนี่\"\n[s4] \"ที่จริงครูรอวันนี้มานานแล้วละ!\""
1002103-26 = "อืม... ถ้าคุณครูยืนกรานแบบนี้ละก็..."
1002103-27 = "อืม... ถ้าคุณครูยืนกรานแบบนี้ละก็..."
1002103-28 = "ก็ได้ ถ้างั้นฉันจะไม่ปฏิเสธน้ำใจแล้วกัน แล้วไว้คราวหน้าจะตอบแทนนะ"
1002103-29 = "ขอบคุณนะคุณครู..."
1002103-31 = "(โชคดีที่ยากิโซบะยังไม่หมดก่อนที่จะถึงคิว คุณครูจึงสั่งมากินกับอาซึสะ 2 จาน)"
1002103-32 = "(แต่ถึงจะบอกว่าเป็นสูตรพิเศษ แต่รสชาติมัน...)"
1002103-33 = "......"
1002103-34 = "[s] \"อร่อยมั้ย...?\""
1002103-35 = ".....? หืม?"
1002103-36 = "อร่อยเหาะไปเลย! อร่อยกว่าที่คิดอีกนะ"
1002103-37 = "คุณครูล่ะ? อร่อยมั้ย?"
1002103-38 = "สีหน้าคุณครูค่อนข้างซับซ้อนนะ รสชาติไม่ค่อยถูกปากเหรอ?"
1002103-39 = "[s5] \"ไม่หรอก ครูก็อร่อยเหมือนกัน\"\n[s6] \"แค่อาซึสะบอกว่าอร่อยก็พอแล้วละ\""
1002103-40 = "งั้นเหรอ? นั่นสินะ ฮื้มม..."
1002103-41 = "งั้นเหรอ? นั่นสินะ ฮื้มม..."
1002103-42 = "ฮุฮุ..."
1002103-43 = "[s] \"อาซึสะ?\""
1002103-44 = "อื้ม! ไม่มีอะไรหรอก"
1002103-45 = "สำหรับฉันตอนนี้... โซบะจานนี้อร่อยกว่าอาหารทุกจานที่เคยกินมาเลย "
1002103-48 = "จริงๆ นะ..."
1002103-50 = "(คิดว่าโซบะอย่างเดียวคงไม่พอ เลยสั่งบิงซูมากินกันอีก)"
1002103-51 = "(ไม่รู้ว่าเพราะอะไร แต่รู้สึกว่าบิงซูกลับอร่อยมากกว่าเสียอีก)"

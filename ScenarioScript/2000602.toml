2000602-58 = "#na;(……이후, 가속이 붙은 상태로 열두바퀴 반을 구르고 나서야 간신히 멈출 수 있었다.)"
2000602-59 = "#na;(온몸에 멍이 드는 바람에 다음 날은 하루 종일 일어나지 못했다…….)"

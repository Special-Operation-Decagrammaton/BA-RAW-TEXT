2000602-50 = "#na;우당타다다다당!\n#fontsize;100"
2000602-51 = "#all;hide"
2000602-52 = "3;사야 사복;00;오, 내리막길에서도 제법 빠르게 달리는 걸. 아까와는 확실히 다른 것이다.\n#3;em;[땀]\n#3;stiff\n#3;a"
2000602-53 = "3;사야 사복;05;그런데 뭔가 좀 이상한데……."
2000602-54 = "3;사야 사복;05\n#3;em;[...]\n#wait;2500"
2000602-55 = "3;사야 사복;04;잠깐, 지금 보니 스케이트 보드가 아니라 선생이 직접 바닥에서 구르고 있잖아?\n#3;shake\n#3;em;[?!]"
2000602-56 = "3;사야 사복;06;스케이트 보드와 한 몸이 되라는 말은 그런 뜻이 아니었던 것이다!\n#3;hophop\n#3;closeup\n#fontsize;80"

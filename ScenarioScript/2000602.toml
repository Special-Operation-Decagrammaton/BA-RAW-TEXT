[translation]
2000602-1 = "#Title;스케이트 보드를 타는 요령"
2000602-2 = "#na;(약속 장소에 도착하여 사야를 기다리던 중에…….)"
2000602-3 = "#na;사야 사복;으, 으앗! 선생, 거기 서 있지 말고 비켜!!\n#fontsize;100"
2000602-4 = "[s] \"……사야?\""
2000602-5 = "#st;[0,0];instant;1;"
2000602-6 = "#clearST"
2000602-7 = "3;사야 사복;04\n#3;stiff\n#3;em;[!]\n#wait;700\n#3;closeup"
2000602-8 = "#all;hide"
2000602-9 = "3;사야 사복;05\n#3;h\n#3;closeup"
2000602-10 = "3;사야 사복;05;뭐, 뭐하는 것이냐, 선생!\n#3;hophop\n#3;closeup"
2000602-11 = "3;사야 사복;04;계단 아래 인도에 멍하니 서 있으면 위험하잖아!\n#3;closeup"
2000602-12 = "[s1] \"너야 말로 뭐하는 거야!\"\n[s2] \"인도에서 스케이트 보드를 타면 안 되지!\""
2000602-13 = "3;사야 사복;05\n#3;h"
2000602-14 = "3;사야 사복;05\n#3;h"
2000602-15 = "3;사야 사복;05;으응? 그게 무슨 소리인지. 선생, 스케이트 보드는 차량이 아니라 엄연한 보행기구인 것이다.\n#3;em;[?]"
2000602-16 = "3;사야 사복;01;그러니 인도에서 스케이트를 타고 다니더라도 법으로는 전혀 문제가 없는 것이다!"
2000602-17 = "3;사야 사복;99;태양열로 충전되는 터보 엔진이 달린 스케이트 보드라면 또 모르겠지만…… 나님은 어딘가의 명탐정이 아니니까.\n#3;em;[음표]"
2000602-18 = "[s] 그나저나 웬 스케이트 보드?"
2000602-19 = "3;사야 사복;01;후-후-후. 뭘 모르는구나, 선생."
2000602-20 = "3;사야 사복;02;휴일에 현무상회를 구석구석 돌아보기 위해서는 스케이트 보드가 꼭 필요한 것이다!\n#3;em;[!]"
2000602-21 = "3;사야 사복;01;현무상회는 걸어서는 하루 만에 전부 돌아보지 못할 정도로 부지가 넓지만, 자전거나 원동기가 들어가지 못하는 좁은 골목길에도 맛집들이 간간히 숨어 있거든."
2000602-22 = "3;사야 사복;03;그래서 나님이 선택한 이동수단이 바로 이 스케이트 보드인 것이다!\n#3;greeting\n#3;em;[반짝]"
2000602-23 = "3;사야 사복;01;스케이트 보드는 크기가 작아 거치하기도 쉽고, 포장도로에서는 자전거만큼이나 빠르게 달릴 수도 있으니— 현무상회의 가게를 오가는 데에는 제격이거든."
2000602-24 = "3;사야 사복;02;선생도 이 참에 스케이트 보드를 하나 장만해보는 게 어때?\n#3;em;[반응]"
2000602-25 = "[s] \"그래도 위험하지 않을까?\""
2000602-26 = "3;사야 사복;03;전혀 위험하지 않아! 오히려 자전거보다 훨씬 안전한 것이다!\n#3;hophop\n#3;em;[재잘]"
2000602-27 = "3;사야 사복;02;묘기를 부리는 게 아니라면 넘어져도 기껏해야 멍이 드는 게 고작이니까."
2000602-28 = "3;사야 사복;03;자, 나님의 스케이트 보드를 빌려줄 테니까 한 번 타보는 것이다.\n#3;em;[음표]"
2000602-29 = "[s] \"그럼 어디 한번…….\""

[translation]
2000602-1 = "เคล็ดลับการเล่นสเกตบอร์ด"
2000602-2 = "(คุณครูมาถึงสถานที่นัดเจอและกำลังรอซายะอยู่...)"
2000602-3 = "อ๊ะ...! คุณครูรีบหลบไปเร็วเข้า!!"
2000602-4 = "[s] \"ซายะ...?\""
2000602-10 = "ทะ...ทำอะไรน่ะ?! คุณครู!"
2000602-11 = "มายืนเหม่ออยู่ตรงทางเดินใต้บันไดแบบนี้มันอันตรายนะ!"
2000602-12 = "[s1] \"เธอนั่นแหละกำลังทำอะไรน่ะ!\"\n[s2] \"จะเล่นสเกตบอร์ดบนทางเดินแบบนี้ไม่ได้นะ!\""
2000602-15 = "หืม? พูดอะไรน่ะคุณครู สเกตบอร์ดไม่ใช่รถ แต่เป็นอุปกรณ์อำนวยความสะดวกการเดินต่างหาก"
2000602-16 = "ถึงจะเล่นสเกตบอร์ดบนทางเดินก็ไม่ได้ผิดกฎหมายอะไรนี่!"
2000602-17 = "ถ้าเป็นสเกตบอร์ดที่ใช้พลังงานแสงอาทิตย์ก็อาจจะอีกเรื่องหนึ่ง...#nฉันไม่ใช่นักสืบจิ๋วชื่อดังอะไรนั่นสักหน่อยนะ"
2000602-18 = "[s] ทำไมจู่ๆ ถึงเล่นสเกตบอร์ดล่ะ?"
2000602-19 = "ฮุฮุฮุ คุณครูนี่ไม่รู้อะไรเลยนะ"
2000602-20 = "ถ้าจะตระเวนไปให้ทั่วย่านการค้าเทพเต่าดำในวันหยุดน่ะ สเกตบอร์ดเป็นของที่ขาดไม่ได้เลยนะ!"
2000602-21 = "ถนนในย่านการค้าเทพเต่าดำมันยาวมากๆ แค่เดินเท้าน่ะ วันเดียวเดินได้ไม่ทั่วหรอก#nแถมยังมีร้านอาหารชื่อดังที่อยู่ในตรอกแคบๆ ที่จักรยานหรือจักรยานยนต์ก็เข้าไม่ได้อยู่ด้วย"
2000602-22 = "เพราะงั้นท่านซายะเลยเลือกใช้สเกตบอร์ดเดินทางยังไงล่ะ!"
2000602-23 = "สเกตบอร์ดน่ะมีขนาดเล็กและพกพาได้สะดวก แถมยังทำความเร็วได้พอๆ กับจักรยาน...#nเพราะงั้นเลยเหมาะสำหรับใช้เดินทางในย่านการค้าที่สุดแล้ว"
2000602-24 = "คุณครูลองซื้อสเกตบอร์ดมาสักอันไหมล่ะ?"
2000602-25 = "[s] \"แล้วมันไม่อันตรายเหรอ?\""
2000602-26 = "ไม่อันตรายเลยสักนิดเดียว! ปลอดภัยกว่าจักรยานด้วยซ้ำ!"
2000602-27 = "แต่ว่าถ้าคุณครูเล่นอะไรแผลงๆ ละก็อาจจะได้รับบาดเจ็บได้นะ"
2000602-28 = "เอาละ ท่านซายะคนนี้จะให้คุณครูยืมสเกตบอร์ดเอง มาลองเล่นดูสิ"
2000602-29 = "[s] \"ถ้างั้นก็ลองดูก็ได้...\""
2000602-38 = "..."
2000602-39 = "โห... คุณครู แขนขาเก้งก้างกว่าที่คิดอีกนะ เพิ่งเคยเห็นคนล้มหน้าคว่ำแบบนั้นเป็นครั้งแรกเลย..."
2000602-40 = "เคล็ดลับพิเศษในการเล่นสเกตบอร์ดงั้นเหรอ?"
2000602-41 = "นั่นสินะ ท่านซายะเป็นอัจฉริยะเลยเล่นได้ดีตั้งแต่ครั้งแรก เพราะงั้นก็เลยไม่รู้เคล็ดลับหรอก ♪"
2000602-42 = "แต่ถ้าจะให้ฉันแนะนำละก็คงเป็น \"การทำให้ร่างกายเป็นหนึ่งเดียวกับสเกตบอร์ดคือสิ่งสำคัญ\"#nประมาณนี้ละ"
2000602-43 = "[s3] \"กลายเป็นหนึ่งเดียวกับสเกตบอร์ด...\"\n[s4] \"ได้ เข้าใจแล้ว!\""
2000602-49 = "[ns] \"ลุยละนะ!\""
2000602-50 = "ตึงๆๆๆ โครรมมมม!"
2000602-52 = "โอ้... ถึงจะเป็นทางลงเขาก็ลงไปได้เร็วมากเลยนะ ต่างจากเมื่อกี๊นี้เลย"
2000602-53 = "แต่ว่ามันดูแปลกๆ นะ..."
2000602-55 = "เดี๋ยวนะ นี่คุณครูลงไปกองอยู่บนพื้นแทนที่จะอยู่บนสเกตบอร์ดแล้วนี่นา?"
2000602-56 = "การเป็นหนึ่งเดียวกับสเกตบอร์ดไม่ใช่แบบนั้นสักหน่อย!"
2000602-58 = "(หลังจากนั้น คุณครูก็หยุดสเกตบอร์ดที่เร่งความเร็วไม่ได้และกลิ้งตกลงมาเป็นครั้งที่สิบสอง...)"
2000602-59 = "(วันต่อมาคุณครูก็แทบลุกขึ้นยืนไม่ไหวเพราะรอยฟกช้ำทั่วตัว...)"

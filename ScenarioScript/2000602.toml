[translation]
2000602-1 = "Skateboarding Tips"
2000602-2 = "I'm waiting at the meeting spot for Saya."
2000602-3 = "D-Don't just stand there, Sensei! Step aside!"
2000602-4 = "[s] \"Saya?\""
2000602-10 = "Wh-What were you doing, Sensei?!"
2000602-11 = "Why were you standing still on the sidewalk below the stairs? Don't you know it's dangerous?"
2000602-12 = "[s1] \"I'm the one who should be asking the questions!\"\n[s2] \"What were YOU doing skateboarding on the sidewalk?!\""
2000602-15 = "What are you talking about, Sensei? A skateboard isn't a vehicle—it's something pedestrians use!"
2000602-16 = "Therefore, skateboarding on the sidewalk should be legal!"
2000602-17 = "Though if the skateboard had a solar-powered turbo engine, that would be another matter... I'm hardly an expert when it comes to law."
2000602-18 = "[s] \"Never mind. So what's with the skateboard all of a sudden?\""
2000602-19 = "Tsk tsk tsk. You really can be clueless sometimes, Sensei."
2000602-20 = "How else am I supposed to visit every nook and cranny of the Black Tortoise Promenade during a day trip?"
2000602-21 = "The Promenade is so big that it's impossible to see it all on foot in just one day. Plus, there are some restaurants hidden in narrow alleys where bikes can't fit either."
2000602-22 = "Therefore, the best mode of transportation is a skateboard!"
2000602-23 = "It's easy to ride and can go as fast as a bike on pavement, but small enough to fit in tight spaces. It's perfect for commuting to and from all of the Promenade's shops."
2000602-24 = "You should get a skateboard too, Sensei."
2000602-25 = "[s] \"Don't you think that would make for a dangerous combination?\""
2000602-26 = "You worry too much! It's much safer than riding a bike."
2000602-27 = "That is, unless you try performing tricks. You would definitely get bruises if you fell."
2000602-28 = "Here, I'll let you try it."
2000602-29 = "[s] \"Well, if you insist...\""
2000602-38 = "..."
2000602-39 = "Well, then. You weren't joking about the dangerous combination. I've never seen anyone just fall off right away like that."
2000602-40 = "Care for a few skateboarding tips?"
2000602-41 = "Not that I really have any. I've always been a natural at it because I'm a genius. ♪"
2000602-42 = "If I had to offer advice, it would be something like, \"Become one with the skateboard.\""
2000602-43 = "[s3] \"Become one with the skateboard...\"\n[s4] \"All right! I got it!\""
2000602-49 = "[ns] \"Let's go!\""
2000602-50 = "*crash*"
2000602-52 = "Well, you were going pretty fast...even if it is downhill. I would say you've improved over your first attempt."
2000602-53 = "But something's off..."
2000602-55 = "Wait! That was you rolling downhill, not the skateboard!"
2000602-56 = "That is NOT what I meant when I said to become one with the board!"
2000602-58 = "I didn't start slowing down until rolling over twelve and a half times."
2000602-59 = "I couldn't even get out of bed the next day because of the bruises all over my body."

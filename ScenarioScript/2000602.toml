2000602-38 = "3;사야 사복;06;………….\n#3;a\n#3;em;[...]"
2000602-39 = "3;사야 사복;04;우와…… 선생, 보기보다 운동 신경이 둔하네. 그렇게 넘어지는 사람은 처음 본 것이다…….\n#3;stiff"
2000602-40 = "3;사야 사복;00;스케이트 보드를 잘 탈 수 있는 특별한 요령은 없냐고?"
2000602-41 = "3;사야 사복;01;글쎄, 나님은 워낙 천재라. 처음부터 잘 탔기 때문에 요령 같은 건 모르는 것이다. ♪\n#3;em;[음표]"
2000602-42 = "3;사야 사복;02;굳이 조언을 하자면 '스케이트 보드와 한 몸이 되는 게 중요하다-'는 점이랄까."
2000602-43 = "[s3] \"스케이트와 한 몸이 된다…….\"\n[s4] \"좋아, 이해했어!\""
2000602-44 = "#st;[0,0];instant;1;"

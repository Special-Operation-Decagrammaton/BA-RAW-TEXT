[translation]
2000602-1 = "天才的訣竅"
2000602-2 = "（抵達約定地點等待沙耶……）"
2000602-3 = "哇──！前面的快讓開──！"
2000602-4 = "[s] 「……這聲音是，沙耶？」"
2000602-10 = "你，你在做什麼啊！老師！"
2000602-11 = "站在路旁發呆太危險了……！"
2000602-12 = "[s1] 「該挨罵的人應該不是我吧！？」\n[s2] 「差一點就要出大事了！？」"
2000602-15 = "但老師，滑板又不是車輛。"
2000602-16 = "在人行道上玩滑板，就法律上也是完全沒問題的！"
2000602-17 = "而且我又不是某個名偵探，不會用什麼裝有太陽能充電渦輪引擎的滑板。像那種就真的太危險了。"
2000602-18 = "[s] 「話說回來，你怎麼會滑滑板？」"
2000602-19 = "這麼說起來，老師還不了解這附近的狀況對吧。"
2000602-20 = "哼哼哼……實不相瞞，假日時如果要逛玄武商會，滑板這種移動工具是不可或缺的！"
2000602-21 = "玄武商會的面積原本就大到一天無法全部逛完，但構造上又不是任何移動工具都合適。例如有些隱藏名店，就位在機車等工具無法進入的狹窄巷道中！"
2000602-22 = "因此，才要使用滑板！"
2000602-23 = "滑板體積小又方便攜帶，而且在鋪好的道路上能和自行車一樣快速奔馳，#n所以最適合用來逛玄武商會。"
2000602-24 = "老師要不要趁這個機會也買一個滑板呢？"
2000602-25 = "[s] 「聽起來是不錯，但不會危險嗎？」"
2000602-26 = "完全不會！它反而比自行車更安全！"
2000602-27 = "而且我也不會耍特技，就算跌倒頂多也只是瘀青而已。"
2000602-28 = "我的滑板借你，老師試一次看看吧？"
2000602-29 = "[s] 「那我就試一次看看……」"
2000602-38 = "…………"
2000602-39 = "……咦？老師的運動神經有這麼差嗎……？#n這跌倒的姿勢真藝術啊……"
2000602-40 = "嗯？你問我滑板有沒有什麼訣竅？"
2000602-41 = "唔──嗯，但因為我是天才……所以一開始就滑得很好，所以不清楚有什麼訣竅！哈哈♪"
2000602-42 = "如果要給予建議的話，應該是「讓滑板和身體融為一體」，這種感覺還挺重要的。"
2000602-43 = "[s3] 「和滑板融為一體……」\n[s4] 「好，滑板啊！借我力量吧！」"
2000602-49 = "[ns] 「GO！」"
2000602-50 = "哐！！"
2000602-52 = "噢，速度不快但不錯唷……"
2000602-53 = "嗯……？"
2000602-55 = "哦哦！？還以為只是踉蹌一下，結果老師是抱著滑板在地上滾啊！？而且直接滾下坡了！！"
2000602-56 = "確實是有和滑板融為一體，但我不是這意思啊！！老師────！！！"
2000602-58 = "（……後來又高速轉了12圈半，沙耶才好不容易追上來幫我停住）"
2000602-59 = "（結果弄得滿身是傷，隔天一整天都爬不起來……）"

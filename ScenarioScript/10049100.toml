10049100-228 = "Two. Not only am I not with the Justice Task Force, I failed as a member."
10049100-232 = "And three."
10049100-234 = "You're just doing this 'cause you couldn't get on the Force, aren't you?"
10049100-236 = "I didn't deserve to be one of them. I couldn't fit in, and I wasn't decisive enough. So I left them."

[translation]
10049100-1 = "第10話;全力以赴吧！閃光少女鈴美 "
10049100-3 = "讓，讓開讓開！！！"
10049100-8 = "哎喲！不要推我啦！"
10049100-9 = "這個人是怎麼回事？在被魔法少女追趕嗎？"
10049100-11 = "[ns]「麻白！能支援嗎？」"
10049100-12 = "我已經回報目前的情況了！"
10049100-13 = "是否能制伏目標，實現正義部正在進行討論。"
10049100-14 = "我會持續進行追蹤！"
10049100-15 = "可惡，真是窮追不捨耶！！"
10049100-16 = "那就用這顆加了六角水的健康閃光彈，讓你們好好休息吧！！"
10049100-21 = "閃光彈！？"
10049100-22 = "（糟了，是朝著老師所在的方向！？）"
10049100-23 = "[ns]「咦，咦咦！？」"
10049100-27 = "[ns]「鈴美？你沒事吧？」"
10049100-28 = "老師您沒有受傷吧？"
10049100-29 = "那真是太好了。"
10049100-30 = "[s]「多虧有鈴美的保護！」"
10049100-31 = "我……保護了老師……"
10049100-35 = "原來我……還有能守護別人的力量啊。"
10049100-36 = "喂，那個叫什麼White的！還有老師！#n再這樣下去，他們就要全部逃光了！"
10049100-37 = "還有……你們感情也太好了吧，能不能先分開一下啊？"
10049100-38 = "！！"
10049100-43 = "老師，我先失陪了！"
10049100-53 = "部長！！這裡是格黑娜的區域了！！"
10049100-60 = "呃啊！！"
10049100-62 = "敵人比想像中還多，要是不趕快制伏可能會造成連帶損害……！"
10049100-67 = "White！我的子彈用完了！"
10049100-68 = "我也只剩下最後一個彈匣！"
10049100-69 = "可惡，我也沒子彈了。#n早知道就該多帶一點的……"
10049100-70 = "各處都有攻擊湧過來……但是！"
10049100-76 = "……這樣就能輕鬆閃開了！#n瞧瞧我吾妻未來華麗的身手吧！"
10049100-78 = "啊啊！！那是只有自衛隊能用的台詞！！不要搶走啦！！"
10049100-79 = "發現人群！只要鑽進去就追不到我了吧！"
10049100-85 = "哎呀！小心點！"
10049100-86 = "噓──！我只是借過一下而已，麻煩安靜一點！！"
10049100-87 = "這個人也是演員嗎？"
10049100-89 = "被人群擋住……沒辦法跟上！"
10049100-90 = "對方似乎壓低身體在移動，完全看不見他。"
10049100-91 = "再往前就是格黑娜的區域，無法輕易動武了。"
10049100-95 = "……咦？志美子同學現在在哪裡……"
10049100-99 = "你終於來助我一臂之力了啊，我的眷屬──！"
10049100-107 = "我忠實的部下，惡之商人「Silver Plate」！"
10049100-108 = "居然隱匿在人群中行動，真是了不起的計畫！"
10049100-109 = "勝負已定了，Heavy Calibers！"
10049100-110 = "既然我惡之幹部艾拉和Silver Plate組成了「惡之騎士團」，你們根本毫無勝算！"
10049100-111 = "想要打倒我們，只有藉助眾人之力才可能辦到……"
10049100-112 = "哦──齁齁齁齁！！！！#n是我們惡之騎士團贏了，Heavy Calibers！！"
10049100-113 = "咦……？"
10049100-114 = "Silver Plate……？#n是在說我嗎……？"
10049100-118 = "啊～咳哼。"
10049100-119 = "那麼接下來為大家說明一下表演的內容～！"
10049100-121 = "志美子同學？你打算做什麼……？"
10049100-122 = "恢復成平常溫柔的志美子同學了！"
10049100-124 = "現在惡之商人「Silver Plate」正躲在大家附近！"
10049100-125 = "Heavy Calibers好像已經追丟Silver Plate了！"
10049100-126 = "所以──！"
10049100-127 = "我們想借用大家的力量！"
10049100-128 = "Silver Plate有一頭銀色的頭髮，身上穿著白色的衣服！"
10049100-129 = "如果找到Silver Plate的話，請大家用應援棒或手機的手電筒告訴我們！"
10049100-130 = "用大家的應援，一起引導Heavy Calibers找到Silver Plate吧！"
10049100-131 = "咦，咦咦……！？"
10049100-132 = "這邊！Silver Plate在這裡！"
10049100-133 = "噓，噓！！小聲一點！！"
10049100-134 = "啊哈哈！！！這是報爆米花桶的仇！！"
10049100-136 = "來，集結大家的力量吧！"
10049100-143 = "這裡！！在這裡！！"
10049100-144 = "好有趣哦！他經過的地方都亮起來了耶！"
10049100-145 = "這樣就能知道位置了……！"
10049100-146 = "那傢伙腦袋還真好啊！？"
10049100-147 = "簡直就像魔法一樣！是大家的力量匯聚而成的奇蹟！"
10049100-148 = "啊……！一不小心就看呆了……！#n得在逃出人群之前抓住他才行！"
10049100-152 = "那我往這邊！"
10049100-153 = "另一邊就交給我吧！"
10049100-158 = "哈啊，哈啊──！#n這到底是什麼情況啊──！？"
10049100-159 = "明明我計畫得這麼完美！！#n結果他居然用一句話就借到了幾百人的力量！！哈啊，哈啊！！"
10049100-163 = "到了！！是廣場！！"
10049100-164 = "看來總算是甩掉那些奇怪的人了！#n只要跨過這條線就──！！！"
10049100-172 = "呀啊！？"
10049100-173 = "到此為止了！"
10049100-174 = "乖乖投降吧！"
10049100-175 = "讓開！"
10049100-179 = "唔！！"
10049100-180 = "為什麼要妨礙我們到這種地步啊！？"
10049100-181 = "你販賣劣質商品欺騙小孩，破壞了大家外出遊玩的心情。"
10049100-182 = "而且還以說謊的方式矇騙消費者，造成他人的損害。"
10049100-183 = "原則上，在遊樂園販賣爆裂物也是違規行為。"
10049100-188 = "呀啊啊！！"
10049100-193 = "！！"
10049100-194 = "那，那不是普通的爆裂物，是鍺手榴彈啦！#n對血液循環很有幫助耶！！"
10049100-195 = "啊，我懂了……你是不是對商品不滿意？"
10049100-196 = "因為購買時已經聽過完整的說明，本來是不能這樣的……#n不過好吧！這次就特別破例幫你退款！記得要幫我保密哦！"
10049100-197 = "我從來沒有向你買過東西。"
10049100-198 = "所以你是吃飽太閒是不是！？為什麼要來妨礙我啊！？#n有人指使你做這種事嗎！？"
10049100-199 = "沒有。只是因為這是正義的事情而已。"
10049100-200 = "什麼跟什麼啦！做那種事又得不到任何報酬！"
10049100-201 = "仔細一看……你是三一的學生對吧？#n有搞清楚現在的狀況嗎？"
10049100-202 = "這裡是格黑娜的區域耶！難道你打算在別人的自治區惹事嗎？"
10049100-203 = "而且你的子彈也用光了吧？全都被我發現了哦！"
10049100-205 = "……"
10049100-209 = "鈴美同學！！"
10049100-210 = "麻白同學。我們已經沒有彈藥了，能請你支援嗎？"
10049100-212 = "恐怕很困難。#n目標目前位於格黑娜的區域之中。"
10049100-213 = "假如開火會違反實現正義部的交戰規則。"
10049100-214 = "怎麼會……！"
10049100-215 = "如果是實現正義部就別來妨礙我們的正當生意，快點走開！"
10049100-216 = "……"
10049100-217 = "我，並不是實現正義部的人。"
10049100-218 = "怎麼，原來不是實現正義部的啊？"
10049100-219 = "呼，害我白擔心了。#n讓開讓開，閃一邊去～"
10049100-220 = "最後，我要告訴你三件事。"
10049100-224 = "第一，請不要再朝老師的方向丟閃光彈了。這樣很危險。"
10049100-228 = "第二，誠如你所說，我並不是實現正義部──也確實沒能成為實現正義部。"
10049100-232 = "然後是第三件事。"
10049100-234 = "該不會是因為進不了實現正義部，所以才故意這麼做的吧？"
10049100-236 = "我是一個無法融入人群、這也不行那也不行……最終逃離實現正義部的人。"
10049100-238 = "你突然說這些誰懂啊！？"
10049100-239 = "那我講得更簡單一點吧。"
10049100-240 = "現在站在你面前的──"
10049100-242 = "你啊，其實跟我們沒什麼兩樣吧？"
10049100-244 = "……"
10049100-249 = "……是跟混混沒兩樣的人。"
10049100-250 = "什麼！？"
10049100-254 = "哎喲！！"
10049100-260 = "這，這是什麼東西……"
10049100-261 = "不過經過這次的事件，讓我明白了一件事。"
10049100-264 = "如果我擁有能守護某個人的力量……#n哪怕只是微不足道的努力，只要能守護住某個人──"
10049100-267 = "那就已經足夠了。"
10049100-271 = "因為正義本身，就是一種報酬。"
10049100-272 = "啊，這是閃光──"
10049100-279 = "咿呀啊啊啊啊──！！"
10049100-280 = "我，我的眼睛！！！"
10049100-281 = "嗚哇啊啊──！！"
10049100-283 = "唔……怎，怎麼了！？#n現在是什麼情況！？"
10049100-288 = "哦，他跨過界線了！"
10049100-289 = "歡迎來到三一自治區！"
10049100-291 = "咦！？咦咦！？"
10049100-292 = "射手確認目標進入三一自治區。#n開火許可已經下達。正在等候指示。"
10049100-293 = "鈴美同學，必殺技的台詞還記得吧！"
10049100-294 = "當然。"
10049100-296 = "等，等等！先等一下！！！"
10049100-298 = "為了大家的和平！！#n就算不被其他人認可，無論什麼時候！"
10049100-299 = "我們……今天也會守護下去！"
10049100-304 = "Magical──Terra Machina！！"
10049100-313 = "用狙擊是犯規的吧～～～～～～～！！"
10049100-322 = "煙火秀好像開始了。"
10049100-323 = "真漂亮……"
10049100-324 = "這場表演真是太精彩了。#n我這輩子從來沒見過這種遊樂園。"
10049100-326 = "今天真的超級好玩！！"
10049100-327 = "我們回去的路上也來玩Heavy Caliber遊戲吧？"
10049100-328 = "好啊！要玩要玩！"
10049100-329 = "正義必勝！"
10049100-330 = "大家都辛苦了！"
10049100-334 = "澪紗同學、志美子同學、麻白同學、良舞同學與頭盔團的各位……"
10049100-335 = "還有老師。"
10049100-336 = "[ns]「鈴美！」"
10049100-340 = "自衛隊，今日巡邏完畢……！"
10049100-353 = "喂──！！！我的獎金飛走了啦！！！！！！"
10049100-354 = "魔法少女Heavy Caliber～艾拉的野心與正義的資格～"

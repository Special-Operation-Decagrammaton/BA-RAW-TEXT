10049100-197 = "I never bought anything from you."
10049100-198 = "Then why?! Why are you bothering me? Did someone put you up to it?"
10049100-199 = "No. It's just the right thing to do."
10049100-200 = "That doesn't make any sense! You're not getting anything out of this!"
10049100-201 = "You're from Trinity, right? You know what that means?"

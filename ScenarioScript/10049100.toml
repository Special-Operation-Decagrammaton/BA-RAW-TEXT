10049100-242 = "เธอน่ะ ไม่ต่างอะไรจากพวกเราหรอก"
10049100-244 = "......"
10049100-249 = "ไม่ต่างอะไรกับพวกนักเลงหรอกค่ะ..."
10049100-250 = "คะ?!!"

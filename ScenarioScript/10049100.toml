10049100-31 = "ฉัน... ปกป้องคุณครูไว้..."
10049100-35 = "ฉันยังมี... พลังที่จะปกป้องคนอื่นสินะคะ"
10049100-36 = "นี่ ไวต์อะไรนั่นน่ะ!! แล้วก็ครูด้วย!! เดี๋ยวยัยแม่ค้านั่นก็หนีไปหรอก!"
10049100-37 = "อีกอย่าง... ไม่ต้องตัวติดกันมากขนาดนั้นก็ได้นะ จะเป็นปลาท่องโก๋อยู่แล้ว?"
10049100-38 = "!!"
10049100-43 = "คุณครู งั้นฉันขอตัวก่อนนะคะ!"
10049100-53 = "หัวหน้า!! ทางนี้เป็นเขตเกเฮนน่านะ!!"
10049100-60 = "อึกก!!"
10049100-62 = "ศัตรูมีมากกว่าที่คิดไว้ค่ะ ถ้าไม่รีบปราบให้อยู่หมัด ก็น่าจะเกิดความเสียหายตามมา...!"
10049100-67 = "ไวต์! ฉันกระสุนหมดแล้วค่ะ!"
10049100-68 = "ของฉันก็แม็กสุดท้ายแล้วค่ะ!"
10049100-69 = "บ้าจริง ของฉันก็หมดเหมือนกัน รู้งี้เอามาให้เยอะกว่านี้ก็ดี..."
10049100-70 = "ยังมีการโจมตีต่อเนื่องจากทุกทิศเลยสินะคะ... แต่ถึงจะอย่างนั้น!"
10049100-76 = "ฉันก็หลบกระสุนได้อย่างพริ้วไหวเลยค่ะ...! ดูความคล่องแคล่วของมิไรเสียก่อน!"
10049100-78 = "อ๊ะ!! นั่นมันบทพูดของกลุ่มรักษาความสงบนะคะ!! อย่าแย่งบทไปสิคะ!!"
10049100-79 = "เจอฝูงชนแล้ว! ถ้าไปซ่อนตัวในนั้น ก็คงจับตัวไม่ได้หรอกค่ะ!"
10049100-85 = "โอ๊ย! ระวังหน่อยสิครับ!"
10049100-86 = "ชู่ว ชู่ว! ฉันแค่ขอเดินผ่านเองค่ะ อย่าเอะอะเสียงดังสิคะ!"
10049100-87 = "คนนี้ก็หนึ่งในนักแสดงเหรอ?"
10049100-89 = "เป้าหมายกลืนไปกับฝูงชนจนคลาดกันแล้วค่ะ!"
10049100-90 = "น่าจะเดินก้มตัวต่ำนะคะ ฉันมองไม่เห็นเลยค่ะ"
10049100-91 = "ถ้าเลยตรงนี้ไปจะเป็นเขตเกเฮนน่า เราน่าจะใช้กำลังไม่ได้แล้วค่ะ"
10049100-95 = "หืม...? แล้วตอนนี้คุณชิมิโกะอยู่ไหน...?"
10049100-99 = "ในที่สุดก็มาช่วยฉันแล้วสินะ บริวารของฉัน!"
10049100-107 = "'ซิลเวอร์เพลต' แม่ค้าปีศาจและสมุนผู้ซื่อสัตย์ของฉัน!"
10049100-108 = "ไปซ่อนตัวอยู่ท่ามกลางฝูงชนงั้นเหรอ เป็นแผนการที่น่าทึ่งจริงๆ!"
10049100-109 = "งั้นก็รู้แล้วละว่าใครจะเป็นฝ่ายชนะ พวกเฮฟวี่ แคลิเบอร์!"
10049100-110 = "ตราบใดที่เอร่า หัวหน้าวายร้ายและซิลเวอร์เพลตมารวมตัวกันเป็นกลุ่มอัศวินปีศาจแล้วละก็ พวกเธอไม่มีโอกาสชนะหรอก!"
10049100-111 = "ถ้าไม่ได้รับพลังความช่วยเหลือจากฝูงชน ก็อย่าหวังว่าจะเอาชนะพวกฉันได้เลย..."
10049100-112 = "โอะโฮะโฮะโฮะ!! ยัยพวกเฮฟวี่ แคลิเบอร์! ยอมจำนนต่อกลุ่มอัศวินปีศาจซะเถอะ!!"
10049100-113 = "อ่า...?"
10049100-114 = "ฉันคือ...? ซิลเวอร์เพลต... เหรอคะ?"
10049100-118 = "อ่าๆ อะแฮ่ม"
10049100-119 = "ขอแนะนำการแสดงสักครู่นะคะ~!"
10049100-121 = "คุณชิมิโกะ? จะทำอะไรน่ะ..."
10049100-122 = "กลับมาพูดเหมือนคุณชิมิโกะที่อ่อนโยนคนเดิมแล้วค่ะ!"
10049100-124 = "ตอนนี้แม่ค้าปีศาจ 'ซิลเวอร์เพลต' กำลังซ่อนตัวอยู่ในหมู่ผู้ชมค่ะ!"
10049100-125 = "และตอนนี้ก็ดูเหมือนว่าเฮฟวี่ แคลิเบอร์จะคลาดกับซิลเวอร์เพลตแล้วด้วย!"
10049100-126 = "เพราะงั้น!"
10049100-127 = "พวกเธอเลยต้องการพลังความช่วยเหลือจากทุกคนค่ะ!"
10049100-128 = "ซิลเวอร์เพลตมีผมสีเงินและใส่ชุดสีขาวค่ะ!"
10049100-129 = "ถ้าเจอซิลเวอร์เพลตละก็ ช่วยยกแท่งไฟหรือเปิดแฟลชจากโทรศัพท์มือถือเพื่อบอกเราหน่อยนะคะ!"
10049100-130 = "ให้การสนับสนุนจากทุกคนพาเฮฟวี่ แคลิเบอร์ไปหาซิลเวอร์เพลตให้ได้นะคะ!"
10049100-131 = "หะ... หา...?!"
10049100-132 = "เจอแล้ว! มาอยู่ตรงนี้พอดีเลย! ซิลเวอร์เพลตวายร้าย!"
10049100-133 = "ชู่ว ชู่ว!! เงียบๆ สิคะ!!"
10049100-134 = "อะฮะฮ่า!!! ขอแก้แค้นเรื่องถังป๊อปคอร์นหน่อยเถอะ!!"
10049100-136 = "เอาละ รวมพลังกันเลยค่ะทุกคน!"
10049100-143 = "ตรงนี้!!"
10049100-144 = "สนุกจัง! ผ่านไปตรงไหนไฟก็สว่างเลย!"
10049100-145 = "แบบนี้ก็น่าจะรู้ตำแหน่งแล้วละค่ะ...!"
10049100-146 = "ยัยนั่นฉลาดไม่ใช่เล่นเลยแฮะ?!"
10049100-147 = "เหมือนเวทมนตร์เลยค่ะ! ปาฏิหาริย์จากการรวมพลังของทุกคน!"
10049100-148 = "อ๊ะ...! ฉันก็มัวแต่ประทับใจจนลืมตัวไปเลยค่ะ...! ต้องรีบจับตัวไว้ให้ได้ ก่อนเป้าหมายจะแทรกตัวหนี#nจากฝูงชน!"
10049100-152 = "ฉันจะไปทางโน้นให้!"
10049100-153 = "งั้นฉันจะสอดส่องทางนี้ให้เองค่ะ!"
10049100-158 = "แฮ่ก... แฮ่ก! นี่มันอะไรกันน่ะ?!"
10049100-159 = "อุตส่าห์หนีได้แนบเนียนแล้วแท้ๆ!! แต่มาขอให้ฝูงชนช่วยรวมพลังกันเนี่ยนะ?! แฮ่ก... แฮ่ก!!"
10049100-163 = "ดีละ!! ถึงจัตุรัสแล้ว!"
10049100-164 = "คนแปลกๆ พวกนั้นคงตามมาไม่ทันแล้วละ! ถ้าฉันข้ามเส้นเขตแดนนี้ไปได้ละก็!!!"
10049100-172 = "ว้ายยย?!!"
10049100-173 = "ไม่มีประโยชน์หรอกค่ะ!"
10049100-174 = "ยอมจำนนแต่โดยดีเถอะค่ะ!"
10049100-175 = "หลบไปนะ!"
10049100-179 = "อึก!!"
10049100-180 = "ทำไมถึงเข้ามาขัดขวางกันขนาดนี้คะ?!"
10049100-181 = "คุณขายสินค้าปลอมที่ไม่มีคุณภาพ ทำลายวันดีๆ ของชาวเมือง แล้วก็หลอกเด็กๆ ที่ไม่รู้อิโหน่อิเหน่ด้วย"
10049100-182 = "คุณเอาสินค้าของคนอื่นมาโกหกแล้วสร้างความเดือดร้อนอยู่ไม่ใช่เหรอคะ?"
10049100-183 = "แล้ววัตถุระเบิดก็ไม่ใช่ของที่ควรเอามาขายในสวนสนุกตั้งแต่แรกด้วยค่ะ"
10049100-188 = "ว้ากกกกก!!"
10049100-193 = "!!"
10049100-194 = "ไม่ใช่วัตถุระเบิดธรรมดาๆ นะ นั่นมันระเบิดมือเจอร์เมเนียมที่ดีต่อการไหลเวียนเลือดต่างหากค่ะ!"
10049100-195 = "อ๊ะ หรือว่า... ซื้อสินค้าไปแล้วไม่พึงพอใจหรือเปล่าคะ?"
10049100-196 = "ก่อนซื้อฉันก็อธิบายให้ฟังหมดแล้ว... ถ้าจะขอคืนเงินละก็... เอาเถอะค่ะ ก็ได้ๆ! ครั้งนี้ฉันจะคืนเงินให้#nเป็นกรณีพิเศษค่ะ! แต่ห้ามไปบอกใครนะคะ!"
10049100-197 = "ฉันไม่เคยซื้อสินค้าจากคุณค่ะ"
10049100-198 = "อ้าว?! ถ้างั้นมารบกวนกันทำไมคะ? หรือว่ามีใครสั่งมา?!"
10049100-199 = "เปล่าค่ะ ก็แค่การทำแบบนี้... เป็นเรื่องที่ยุติธรรมน่ะค่ะ"
10049100-200 = "พูดเรื่องอะไรคะ! ทำอะไรแบบนั้นไปก็ไม่ได้รางวัลอะไรหรอกค่ะ!"
10049100-201 = "ดูจากชุดแล้ว คุณน่าจะเป็นนักเรียนทรีนิตี้นะคะ ยังอ่านสถานการณ์ไม่ออกอีกเหรอ?"
10049100-202 = "ที่เราอยู่กันตรงนี้คือเขตเกเฮนน่าค่ะ! จะมาก่อเรื่องในเขตปกครองของคนอื่นเหรอคะ?"
10049100-203 = "ไหนจะไม่มีกระสุนเหลือแล้วอีก? ฉันดูออกหมดละค่ะ!"
10049100-205 = "......"
10049100-209 = "คุณสึซึมิ!!"
10049100-210 = "คุณมาชิโระ ฉันไม่มีกระสุนแล้ว พอจะช่วยสนับสนุนได้มั้ยคะ?"
10049100-212 = "ไม่น่าจะได้ค่ะ เป้าหมายไปอยู่ในเขตเกเฮนน่าแล้วค่ะ"
10049100-213 = "ถ้าฉันทำอะไรไป จะเป็นการละเมิดข้อบังคับการต่อสู้ของชมรมทวงความยุติธรรมค่ะ "
10049100-214 = "ไม่นะ...!"
10049100-215 = "ถ้าเป็นชมรมทวงความยุติธรรม ก็ไม่ควรมายุ่งเกี่ยวกับกิจการที่สุจริตของคนอื่นแล้วถอยไปสิคะ!"
10049100-216 = "......"
10049100-217 = "ฉันไม่ใช่ชมรมทวงความยุติธรรมค่ะ"
10049100-218 = "อะไรกัน ไม่ใช่ชมรมทวงความยุติธรรมหรอกเหรอคะ?"
10049100-219 = "ฮู่ว ฉันละอุตส่าห์กลัว ไปๆ งั้นก็หลบไปเถอะค่ะ~"
10049100-220 = "ฉันจะบอกอะไร 3 อย่างเป็นครั้งสุดท้ายนะคะ"
10049100-224 = "อย่างแรก อย่าขว้างระเบิดแสงไปทางคุณครูค่ะ มันอันตรายนะคะ"
10049100-228 = "อย่างที่ 2 ฉันไม่ใช่ชมรมทวงความยุติธรรมอย่างที่คุณว่าค่ะ แล้วก็เป็นความจริงที่ฉันเป็นสมาชิกชมรม#nทวงความยุติธรรมไม่ได้"
10049100-232 = "แล้วก็ อย่างที่ 3"
10049100-234 = "หรือว่าเข้าชมรมทวงความยุติธรรมไม่ได้ ก็เลยต้องมาอยู่กลุ่มนี้แทน?"
10049100-236 = "ฉันเข้ากับคนอื่นไม่เก่ง แล้วก็ทำอะไรไม่ได้สักอย่างจนหนีออกมา ฉันมันก็แค่คนที่ไม่คู่ควรกับชมรม#nทวงความยุติธรรมค่ะ"
10049100-238 = "พูดเรื่องอะไรไม่เห็นจะรู้เรื่องเลยค่ะ!"

[translation]
10049100-1 = "ตอนที่ 10;ใส่ให้สุดแรง! แฟลชเกิร์ล สึซึมิ"
10049100-3 = "ละ... หลบไปนะคะ! หลบไป!!!"
10049100-8 = "โอ๊ย! อย่าผลักสิครับ!"
10049100-9 = "อะไรของคนนั้นน่ะ? ถูกสาวน้อยเวทมนตร์ไล่ล่าอยู่งั้นเหรอ?"
10049100-11 = "[ns] \"มาชิโระ! ช่วยยิงสนับสนุนได้หรือเปล่า?\""
10049100-12 = "ฉันรายงานสถานการณ์ไปแล้วค่ะ"
10049100-13 = "ตอนนี้กำลังหารือกับชมรมทวงความยุติธรรมว่าจะยิงเป้าหมายได้หรือเปล่า"
10049100-14 = "แต่ฉันก็เฝ้าระวังอยู่ตลอดค่ะ!"
10049100-15 = "อึกก คุณนี่ช่างไม่ย่อท้อจริงๆ นะคะ!!"
10049100-16 = "เจอระเบิดแสงใส่น้ำโมเลกุลหกเหลี่ยมเพื่อสุขภาพแล้วไปพักเสียเถอะค่ะ!!"
10049100-21 = "ระเบิดแสง?!"
10049100-22 = "(ปาไปทางคุณครูเหรอ ไม่ได้นะ!!!)"
10049100-23 = "[ns] \"เอะ... เอ๋?!\""
10049100-27 = "[ns] \"สึซึมิ? เป็นอะไรหรือเปล่า?\""
10049100-28 = "คุณครูล่ะคะ เป็นอะไรหรือเปล่า?"
10049100-29 = "ถ้างั้นก็โล่งอกไปทีนะคะ"

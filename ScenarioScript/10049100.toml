10049100-260 = "นี่มันอะไรกัน..."
10049100-261 = "แต่ฉันก็ได้เรียนรู้บางอย่างจากเหตุการณ์นี้ค่ะ"
10049100-264 = "ถ้าฉันมีพลังที่จะปกป้องใครสักคน และถ้าความพยายามแม้เพียงเล็กน้อยของฉันจะปกป้องใครสักคน#nได้ขึ้นมาละก็..."
10049100-267 = "เท่านั้นมันก็เพียงพอแล้วค่ะ"
10049100-271 = "ส่วนความยุติธรรม... ก็เป็นรางวัลในตัวของมันอยู่แล้วค่ะ"
10049100-272 = "นะ... นั่นมัน ระเบิดแสง..."
10049100-279 = "ว้ายยยย!"
10049100-280 = "ตะ... ตามองไม่เห็นเลย!!"
10049100-281 = "อ๊ายยย!"
10049100-283 = "แฮ่ก แฮ่ก... อะ... อะไรน่ะ เกิดอะไรขึ้น?!"
10049100-288 = "โอ๊ะ ข้ามเส้นเขตแดนเข้ามาแล้วค่ะ!"

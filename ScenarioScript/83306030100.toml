[translation]
83306030100-6 = "เฮ้อ... น่าเหนื่อยใจจังเลยนะคะ"
83306030100-7 = "อาโกะ เป็นอะไรไป? เกิดอะไรขึ้นงั้นเหรอ?"
83306030100-8 = "อ่า... ท่านประธาน พอดีว่า..."
83306030100-9 = "มีคนโทรเข้ามาแกล้งเราระหว่างที่ท่านประธานไม่อยู่น่ะค่ะ"
83306030100-10 = "โทรแกล้ง...? แกล้งเรื่องอะไรน่ะ?"
83306030100-11 = "ฉันต้องบอกว่า... ทางนั้นพูดเรื่องของตัวเองแล้ววางไปดื้อๆ"
83306030100-12 = "หรือว่าที่โทรศัพท์สายนั้นไม่มีความหมายอะไรเลยดี"
83306030100-13 = "ถ้าเป็นไปได้ ใจหนึ่งฉันก็อยากจะดึงสายโทรศัพท์ออกแล้วไม่ใส่ใจเลยค่ะ"
83306030100-14 = "แต่ระหว่างนั้นอาจจะมีใครติดต่อเรื่องฉุกเฉินและสำคัญเข้ามาก็ได้ ฉันก็เลยทำอย่างที่ใจคิดไม่ได้ค่ะ"
83306030100-15 = "อืม งั้นต่อไปถ้ามีสายเข้า ฉันจะรับให้เอง"
83306030100-16 = "อ๊ะ ไม่ต้องทำถึงขนาดนั้นก็ได้ค่ะ! ฉันจะให้ท่านประธานทำงานที่น่าเบื่อหน่ายแบบนั้นได้ยังไง..."
83306030100-17 = "แต่มันเป็นอุปสรรคต่องานของอาโกะไม่ใช่เหรอ?"
83306030100-18 = "เวลาของอาโกะก็สำคัญสำหรับฉันเหมือนกันนะ"
83306030100-19 = "ท่านประธานฮินะ..."
83306030100-20 = "ถ้างั้นก็... รบกวนด้วยนะคะ"

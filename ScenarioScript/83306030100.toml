83306030100-5 = "3;아코;06\n#3;a\n#wait;1000"
83306030100-6 = "3;아코;11;하아…… 정말 곤란하네요.\n#3;em;[한숨]"
83306030100-7 = "5;히나;02;아코, 왜 그래? 무슨 일 있어?\n#5;al\n#3;m1"
83306030100-8 = "3;아코;04;아…… 부장님. 그게 말이죠.\n#3;em;[반응]"
83306030100-9 = "3;아코;12;최근에 부장님이 자리를 비운 사이에, 저희 선도부로 장난 전화가 걸려오는 거 있죠."
83306030100-10 = "5;히나;14;장난 전화……? 어떤 내용의 전화인데?\n#5;em;[?]"
83306030100-11 = "3;아코;12;그게…… 뭔가 내용이 있다기보다는…… 자기 할말만 하고 끊어버린다고 할지.\n#3;m3\n#5;dr"
83306030100-12 = "3;아코;11;전화 자체에 아무런 의미가 없는 것 같다고 할지.\n#3;stiff"
83306030100-13 = "3;아코;11;으음, 마음 같아서는 전화선을 뽑고 무시하고 싶지만.\n#3;em;[빠직]"
83306030100-14 = "3;아코;06;그 사이에 또 선도부에 긴급하고 중요한 연락이 올지도 모르니, 차마 그럴 수도 없고."
83306030100-15 = "3;히나;01;그래. 그럼 어디 한 번 다음 전화는 내가 받아볼게."
83306030100-16 = "3;아코;04;앗, 그럴 필요까진 없으세요! 괜히 부장님께 번거로운 일을 맡길 수는……\n#3;em;[!]\n#3;jump"
83306030100-17 = "3;히나;05;아코의 업무에 지장이 있는 거잖아?"
83306030100-18 = "3;히나;99;아코의 시간은, 내게도 소중하니까."
83306030100-19 = "3;아코;02;히나 부장님………\n#3;em;[…]"
83306030100-20 = "3;아코;01;그럼 부디, 부탁드립니다.\n#3;greeting"
83306030100-21 = "#wait;100"

[translation]
83306030100-6 = "唉……真困擾。"
83306030100-7 = "亞子，你怎麼了？發生什麼事了嗎？"
83306030100-8 = "啊……委員長。#n其實……"
83306030100-9 = "最近委員長不在的期間，我們風紀委員會接到了惡作劇電話。"
83306030100-10 = "惡作劇電話……？內容是什麼？"
83306030100-11 = "這……與其說內容……該說對方總是自顧自地說完就掛斷電話呢……"
83306030100-12 = "還是該說電話本身沒有任何意義呢……"
83306030100-13 = "雖然很想直接拔斷電話線……"
83306030100-14 = "可是這段期間可能會收到緊急或重要的聯絡，所以實在無法這麼做。"
83306030100-15 = "嗯，那下次電話響的時候就由我來接吧。"
83306030100-16 = "沒，沒關係的！不能勞煩委員長做這種麻煩的事……"
83306030100-17 = "那已經影響到亞子的工作了不是嗎？"
83306030100-18 = "亞子的時間，對我來說也是很珍貴的。"
83306030100-19 = "陽奈委員長……"
83306030100-20 = "那就麻煩您了。"

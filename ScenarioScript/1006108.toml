[translation]
1006108-1 = "說明的場合"
1006108-2 = "（依照櫻子說的時間前往了教堂後方的公園）"
1006108-3 = "（公園裡不見人影，接著櫻子從遠處出現了）"
1006108-7 = "老師，我在這裡。感謝您願意赴約。"
1006108-8 = "我本來是打算自己解決問題的……"
1006108-9 = "不過事情似乎變得越來越嚴重，只好安排了這個場合。"
1006108-10 = "[s1]「沒關係。」\n[s2]「事情越來越嚴重……？」"
1006108-13 = "是的，我就開門見山地說了……"
1006108-14 = "最近……"
1006108-20 = "對我的「誤解」似乎越來越多了。"
1006108-24 = "[ns3]「這，這樣啊……」\n[ns4]「這一天終於來了啊。」"
1006108-29 = "您果然不覺得驚訝呢。看來老師似乎也在某種程度上預料到這種事了。"
1006108-30 = "當然，我以前就清楚修女們認為我是個不好親近的人……"
1006108-31 = "以工作性質來說，我認為保有一定程度的威嚴是必要的，因此並沒有特別在意。"
1006108-32 = "除了因為在意流行的幾個行動之外……"
1006108-33 = "……但是，最近我注意到了。大家並非只是單純認為我難以親近──"
1006108-34 = "──而是「有可能害怕著我」！"
1006108-35 = "是我想太多了……是嗎？"
1006108-36 = "不……雖然我也希望是這樣，但遺憾的是事實似乎並非如此。"
1006108-37 = "這是相當重要的問題……我希望修女們都能把這裡視為最能讓人安心的地方。"
1006108-38 = "因此為了解決這個問題，我展開了調查……"
1006108-39 = "有時也會把大家一個一個請來解釋……"
1006108-43 = "[ns5]「咦……！？」\n[ns6]「這樣會加深大家的疑惑的……！」"
1006108-46 = "是的，以結果來看……似乎正如老師所說。"
1006108-47 = "其他事情我還有辦法解決，但這個問題實在是讓我束手無策……所以才會想拜託老師。"
1006108-48 = "身為修女卻把自己的問題加諸在老師身上，我很清楚這是無禮的行為。"
1006108-49 = "但有時比起自己的自尊心或意志，解決現狀才是最優先的。"
1006108-50 = "而現在……就處於這樣的情況。"
1006108-51 = "……老師。"
1006108-52 = "我很清楚這是個厚顏無恥的請求……"
1006108-53 = "能請您助我一臂之力嗎？"
1006108-54 = "[s7]「當然沒問題。一點也不會無恥或無禮哦。」\n[s8]「我認為這是很明智又勇敢的行動。」"
1006108-57 = "老師……"
1006108-58 = "謝謝您。沒想到您願意爽快地答應。"
1006108-59 = "不是其他人，而是老師您願意這麼對我說，真的讓我感到輕鬆了不少。"
1006108-60 = "其實今天為了預防老師因忙碌而不克前來的狀況，我本來打算自己做的……"
1006108-61 = "[s] 「……」"
1006108-63 = "[ns]「等等，你打算做什麼？」"
1006108-67 = "那麼我們走吧。請跟我來。"
1006108-68 = "大家都在等著。#n如果是老師說的話……大家一定會相信的。"
1006108-81 = "[ns9]「櫻，櫻子同學，這是……」\n[ns10]「修女們全都集合了……」"
1006108-87 = "是的。我拜託大家空出時間在這裡集合。"
1006108-88 = "接下來，就差老師一句話了。"
1006108-89 = "──請告訴大家，"
1006108-91 = "我不是奇怪的人！！！"
1006108-92 = "[s11]「等，等等啊櫻子！」\n[s12]「這不是什麼好方──！！」"
1006108-95 = "各位，感謝你們願意出席。今天我特別請來了老師！"
1006108-100 = "我想接下來，老師說的話將會讓各位感到放心。"
1006108-101 = "那麼大家，請仔細聽！"
1006108-105 = "呵呵。"
1006108-106 = "那麼老師，"
1006108-107 = "……就拜託您了。"
1006108-112 = "（結果就在大家面前解釋櫻子其實是個好人）"
1006108-113 = "（櫻子雖然浮現了滿意的笑容……）"
1006108-117 = "（但理所當然地，又加深了修女們的誤會）"

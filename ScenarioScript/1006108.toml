[translation]
1006108-1 = "#title;해명의 자리"
1006108-2 = "#na;(사쿠라코가 알려준 시간에 맞춰, 성당 뒤편에 마련된 공원으로 향했다.)"
1006108-3 = "#na;(공원에는 사람의 모습이 전혀 보이지 않았다. 곧 저 멀리서 사쿠라코가 나타났다.)"
1006108-4 = "#st;[0,0];instant;1;"
1006108-5 = "#clearST"
1006108-6 = "4;사쿠라코;02\n#4;em;[반응]\n#4;a\n#wait;1200"
1006108-7 = "4;사쿠라코;01;이쪽입니다, 선생님. 응해 주셔서 정말로 감사합니다.\n#4;m3"
1006108-8 = "4;사쿠라코;99;웬만하면 제 선에서 스스로 해결하고자 하였던 문제지만……."
1006108-9 = "4;사쿠라코;02;오히려 일이 점점 더 커져만 가는 것 같아, 부득이 이렇게 도움을 요청하게 되었습니다.\n#4;em;[한숨]"
1006108-10 = "[s1] \"잘했어. 무슨 일이야?\"\n[s2] \"일이 점점 커져간다니?\""
1006108-11 = "#wait;10"
1006108-12 = "#wait;10"
1006108-13 = "4;사쿠라코;01;네. 거두절미하고 문제에 대해서 바로 말씀드리자면."
1006108-14 = "4;사쿠라코;99;최근……."
1006108-15 = "#st;[0,0];instant;1;"
1006108-16 = "#clearST"
1006108-17 = "4;사쿠라코;99\n#4;em;…\n#4;h\n#wait;2500"
1006108-18 = "4;사쿠라코;07\n#4;h\n#wait;1500"
1006108-19 = "#all;hide"
1006108-20 = "3;사쿠라코;06;저에 대한 '오해'가 더는 좌시할 수 없는 상황에 이르고 말았습니다.\n#3;em;[세로선]\n#3;closeup\n#bgshake\n#fontsize;80"
1006108-21 = "#st;[0,0];instant;1;"
1006108-22 = "#clearST"
1006108-23 = "#wait;2500"
1006108-24 = "[ns3] \"아.아.아. 그렇군요. 네.\"\n[ns4] \"결국 이날이 찾아왔구나.\""
1006108-25 = "#st;[0,0];instant;1;"
1006108-26 = "#st;[0,0];instant;1;"
1006108-27 = "#clearST"
1006108-28 = "3;사쿠라코;07\n#3;em;…\n#wait;2500"
1006108-29 = "3;사쿠라코;99;으음. 전혀 놀라지 않으시는군요. 역시 선생님께서도 예상하고 계셨던 걸까요.\n#3;stiff\n#3;em;[땀]"
1006108-30 = "3;사쿠라코;01;물론 저 또한 이전부터 다른 자매님들이 저를 어려워한다는 사실을 알고 있었습니다만."
1006108-31 = "3;사쿠라코;13;제가 하는 일의 특성상 어느 정도의 위계 또한 필요하다고는 생각했기 때문에 달리 손을 쓰지는 않고 있었습니다."
1006108-32 = "3;사쿠라코;13;유행을 따라가고자 했던 몇몇 행동들을 제외하고는, 말이죠.\n#3;em;[속상함]"
1006108-33 = "3;사쿠라코;99;하지만 결국, 최근 들어 저는 알아버리고 만 것입니다. 단순히 다른 분들이 절 어려워하는 게 아니라……."
1006108-34 = "3;사쿠라코;05;……'두려워하는 것일 수도 있다'는 사실을!!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
1006108-35 = "3;사쿠라코;07;네? 조금 비약적인 생각이지 않느냐고요?\n#3;em;[?]\n#3;closeup"
1006108-36 = "3;사쿠라코;13;후. 저도 그랬으면 좋겠다고 생각했지만, 슬프게도 아닌 것 같습니다.\n#3;closeup"
1006108-37 = "3;사쿠라코;07;이것은 꽤 큰 문제입니다. 저는 자매님들이 이곳을 가장 편안하고 안락한 보금자리라고 느끼시길 바라니까요.\n#3;em;[반응]\n#3;closeup"
1006108-38 = "3;사쿠라코;01;따라서 그것을 해결하기 위해 정말로 절 어려워하는지 조사해 보거나.\n#3;closeup"
1006108-39 = "3;사쿠라코;99;때로는 자매님들을 따로따로 불러 조용한 곳에서 여쭤 보기도 해보았습니다만…….\n#3;em;…\n#3;closeup"
1006108-40 = "#st;[0,0];instant;1;"
1006108-41 = "#clearST"
1006108-42 = "#wait;1000"
1006108-43 = "[ns5] \"……예? 뭘 하셨다고요?\"\n[ns6] \"도리어 의혹이 커져만 가는 일을…….\""
1006108-44 = "#wait;10"
1006108-45 = "#wait;10"
1006108-46 = "3;사쿠라코;04;안타깝게도 그렇습니다. 지금 우려하신 대로, 오히려 더 자매님들이 저를 어려워하게 돼 버린 것 같습니다.\n#3;em;[속상함]\n#3;stiff"
1006108-47 = "3;사쿠라코;07;다른 일들은 몰라도, 어째서인지 이 문제만큼은 잘 해결이 되지 않아서, 선생님께 부탁을 드리고자 하였던 것입니다."
1006108-48 = "3;사쿠라코;99;시스터로서 부족한 자신의 문제를 선생님께 떠넘긴다는 것이 얼마나 못난 행동인지는 스스로도 잘 알고 있습니다."
1006108-49 = "3;사쿠라코;07;하지만 저는, 때로는 그런 스스로의 자존심이나 오기보다 현재의 상황을 해결하는 것이 우선돼야 할 때도 있다고 믿습니다.\n#3;em;[반응]"
1006108-50 = "3;사쿠라코;07;그리고 바로 지금 같은 상황이 그런 상황인 것이라……. 그렇게 생각합니다."
1006108-51 = "3;사쿠라코;13;그러니 선생님. 염치없는 부탁임을 십분 이해하고 있는 상황입니다만.\n#3;em;…"
1006108-52 = "3;사쿠라코;99;그래도……."
1006108-53 = "3;사쿠라코;07;이런 저를 조금, 도와주실 수 있으실까요?\n#3;em;[?]"
1006108-54 = "[s7] \"당연하지. 염치없지도 못나지도 않아.\"\n[s8] \"현명하고 용기 있는 행동이라 생각해.\""
1006108-55 = "#wait;10"
1006108-56 = "#wait;10"
1006108-57 = "3;사쿠라코;07;선생님……."
1006108-58 = "3;사쿠라코;03;감사합니다. 그렇게까지 확고하게 말씀해 주실 거라고는 기대하지 않았는데 말이죠.\n#3;em;[반짝]\n#3;greeting"
1006108-59 = "3;사쿠라코;02;다른 분도 아닌 선생님께서 그렇게 말씀해 주시니, 마음이 놓이는 기분이 듭니다."
1006108-60 = "3;사쿠라코;99;사실 오늘은 선생님께서 바쁘시거나 할 때를 대비해, 저 혼자서 하려고 했지만…….\n#3;em;…"
1006108-61 = "[s] \"…….\""
1006108-62 = "#wait;1000"
1006108-63 = "[ns] \"잠시만. 뭘 한다는 거야?\""

1006108-67 = "3;사쿠라코;02;자. 그럼, 선생님. 지금 바로 가시죠. 절 따라와 주세요.\n#3;em;[반응]"
1006108-68 = "3;사쿠라코;08;모두가 기다리고 있답니다. 선생님의 말씀이시라면, 다른 분들도 확고히 믿어 주시겠지요.\n#3;greeting"

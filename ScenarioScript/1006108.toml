[translation]
1006108-1 = "สถานที่สำหรับอธิบาย"
1006108-2 = "(คุณครูมุ่งหน้าไปยังสวนสาธารณะด้านหลังวิหารตามเวลาที่ซากุระโกะบอก)"
1006108-3 = "(เมื่อไปถึงก็พบว่าในสวนไม่มีใครอยู่เลย แต่ไม่นานนักก็เห็นซากุระโกะกำลังเดินเข้ามา)"
1006108-7 = "ทางนี้ค่ะคุณครู ขอบคุณที่ช่วยตอบรับนะคะ"
1006108-8 = "ฉันก็พยายามจะแก้ปัญหาด้วยตัวเองแล้ว…"
1006108-9 = "แต่ดูเหมือนเรื่องมันจะใหญ่เข้าไปทุกที ฉันก็เลยต้องขอความช่วยเหลืออย่างหลีกเลี่ยงไม่ได้ค่ะ "
1006108-10 = "[s1] \"ดีแล้วละ มีเรื่องอะไรเหรอ?\"\n[s2] \"เรื่องใหญ่ขึ้นงั้นเหรอ?\""
1006108-13 = "ค่ะ ฉันจะเล่าอย่างรวบรัดเลยนะคะ"
1006108-14 = "ช่วงนี้..."
1006108-20 = "'ความเข้าใจผิด' เกี่ยวกับฉัน มันมาถึงจุดที่ฉันไม่อาจเพิกเฉยได้อีกต่อไปแล้วค่ะ"
1006108-24 = "[ns3] \"อ่อ.. อ่า.. เอ่อ.. อย่างนั้นเองสินะ นั่นสิ\"\n[ns4] \"ในที่สุดวันนี้ก็มาถึงแล้วสินะ\""
1006108-29 = "อืม ดูจะไม่ตกใจเลยนะคะ สงสัยคุณครูจะคาดเดาเรื่องนี้ไว้แล้วสินะคะ"
1006108-30 = "ฉันรู้มานานแล้วค่ะว่าซิสเตอร์คนอื่นๆ รู้สึกไม่สะดวกใจกับฉัน"
1006108-31 = "แต่ฉันก็ไม่ได้ลงมือทำอะไรเป็นพิเศษ เพราะคิดว่าด้วยงานที่ทำก็ต้องคงตำแหน่งและศักดิ์ศรีไว้#nระดับหนึ่งน่ะค่ะ"
1006108-32 = "เว้นแต่เรื่องพยายามทำตามเทรนด์ให้เหมือนคนอื่นน่ะนะคะ"
1006108-33 = "แต่สุดท้ายแล้ว ฉันก็ได้เรียนรู้บางอย่างขึ้นมาค่ะ ว่าคนอื่นไม่ได้แค่ลำบากใจหรือเกรงใจฉัน..."
1006108-34 = "แต่จริงๆ แล้วอาจเป็นเพราะ 'หวาดกลัว' ฉันก็ได้ค่ะ!"
1006108-35 = "คะ? ฉันคิดรวบรัดเกินไปงั้นเหรอคะ?"
1006108-36 = "ฮุฮุ ฉันเองก็อยากให้เป็นอย่างนั้นหรอกค่ะ แต่น่าเศร้าที่มันไม่ใช่หรอกนะคะ"
1006108-37 = "นี่มันเป็นปัญหาใหญ่ทีเดียวค่ะ เพราะฉันปรารถนาให้ซิสเตอร์คนอื่นๆ รู้สึกว่าที่นี่เป็นบ้านที่อยู่ได้อย่าง#nสุขกายและสบายใจ"
1006108-38 = "เพื่อที่จะหาทางแก้ไข ฉันเลยต้องตรวจสอบว่าทุกคนกลัวฉันกันจริงๆ หรือเปล่าค่ะ"
1006108-39 = "บางครั้งฉันก็เรียกซิสเตอร์มาคุยเดี่ยวๆ เงียบๆ เพื่อสอบถามและปรับทัศนคติด้วยค่ะ"
1006108-43 = "[ns5] \"...หา? ปะ... ปรับอะไรนะ?\"\n[ns6] \"กลายเป็นทำให้มันหนักกว่าเดิมอีก...\""
1006108-46 = "น่าเสียดายที่ฉันทำมันไปแล้วค่ะ ก็อย่างที่คุณครูกังวลในตอนนี้เลยค่ะ ตอนนี้ดูเหมือนว่าพวกซิสเตอร์#nจะกลัวฉันกันมากกว่าเดิมอีกค่ะ"
1006108-47 = "ถ้าเป็นเรื่องอื่นก็ว่าไปอย่าง แต่ฉันรู้สึกว่าเรื่องนี้ฉันแก้ไขเองไม่ได้ ก็เลยอยากขอร้องให้คุณครูช่วยค่ะ"
1006108-48 = "ในฐานะซิสเตอร์ ฉันรู้ดีค่ะว่ามันแย่แค่ไหนที่จะทิ้งปัญหาของตัวเองไว้กับคุณครูแบบนี้"
1006108-49 = "แต่ว่า... ฉันเชื่อว่าบางครั้งการจัดการกับสถานการณ์ตรงหน้า ต้องมาก่อนความอวดดีและศักดิ์ศรีของ#nตัวเองค่ะ"
1006108-50 = "และยิ่งสถานการณ์มันเลวร้ายลงทุกทีๆ แบบนี้แล้วด้วย..."
1006108-51 = "คุณครูคะ ฉันเข้าใจดีค่ะว่านี่คือการขอร้องที่น่าละอายเอาเสียมากๆ"
1006108-52 = "แต่ว่า..."
1006108-53 = "คุณครูพอจะยื่นมือมาช่วยฉันได้หรือเปล่าคะ?"
1006108-54 = "[s7] \"ได้สิ นี่ไม่ใช่เรื่องแย่หรือเรื่องน่าละอายหรอก\"\n[s8] \"นี่คือการกระทำที่ฉลาดและกล้าหาญมากนะ\""
1006108-57 = "คุณครู..."
1006108-58 = "ขอบคุณนะคะ บอกตามตรงว่าฉันไม่ได้คาดหวังว่าคุณครูจะช่วยพูดให้มันชัดเจนขนาดนี้เลยละค่ะ"
1006108-59 = "พอคุณครูพูดแบบนี้ ฉันก็พอเบาใจได้หน่อยนะคะ"
1006108-60 = "ที่จริงฉันว่าจะทำเรื่องนี้คนเดียว เผื่อว่าคุณครูจะยุ่งน่ะค่ะ"
1006108-61 = "[s] \"......\""
1006108-63 = "[ns] \"เดี๋ยวนะ จะทำอะไรเหรอ?\""
1006108-67 = "เอาละค่ะ คุณครู เราไปกันเลยดีกว่าค่ะ ตามฉันมานะคะ"
1006108-68 = "ตอนนี้ทุกคนกำลังรออยู่ค่ะ ถ้าคุณครูช่วยพูดให้ ทุกคนก็น่าจะเชื่อมั่นเหมือนฉันในตอนนี้ค่ะ"
1006108-81 = "[ns9] \"คะ... คุณซากุระโกะ? เดี๋ยวสิ...?\"\n[ns10] \"ซิสเตอร์มารอกันครบเลย...\""
1006108-87 = "ค่ะ คุณครู ซิสเตอร์ทุกคนสละเวลาอันมีค่าของตัวเองมารวมตัวกันที่นี่ค่ะ"
1006108-88 = "และ ณ ที่นี้... ฉันอยากให้คุณครูช่วยพูดให้อีกคนค่ะ"
1006108-89 = "ว่าฉัน..."
1006108-91 = "ไม่ได้น่ากลัวอย่างที่ทุกคนเข้าใจค่ะ!!"
1006108-92 = "[s11] \"ดะ... เดี๋ยวก่อน! ซากุระโกะ! รอครูด้วย!\"\n[s12] \"มันดูไม่น่าจะใช่วิธีที่ดีเท่าไรเลยนะ...!!\""
1006108-95 = "ซิสเตอร์ทุกคน ช่วยฟังทางนี้ด้วยค่ะ! ในโอกาสพิเศษนี้ ฉันได้เชิญคุณครูมาที่นี่ด้วยค่ะ!"
1006108-100 = "จากนี้ไปคุณครูจะมาช่วยพูดให้ทุกคนสบายใจกันค่ะ!"
1006108-101 = "ขอให้ทุกคนช่วยตั้งใจฟังสิ่งที่คุณครูจะพูดด้วยนะคะ!"
1006108-105 = "ฮุฮุ..."
1006108-106 = "เอาละค่ะ คุณครู"
1006108-107 = "...เริ่มได้เลยค่ะ รบกวนด้วยนะคะ"
1006108-112 = "(หลังจากนั้นคุณครูก็เริ่มอธิบายให้ทุกคนฟังว่าซากุระโกะเป็นคนดีและไม่ได้น่ากลัวอย่างที่ทุกคนคิด)"
1006108-113 = "(ซากุระโกะยืนยิ้มอย่างพึงพอใจ...)"
1006108-117 = "(แต่ซิสเตอร์คนอื่นๆ เหมือนจะยิ่งเข้าใจผิดในตัวซากุระโกะมากขึ้นอีก...)"

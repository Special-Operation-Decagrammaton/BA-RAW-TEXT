1006108-100 = "3;사쿠라코;03;이제부터 선생님께서, 여러분께 안심이 되는 말씀을 해 주실 것이에요!\n#3;em;[반짝]\n#3;greeting"
1006108-101 = "3;사쿠라코;03;모두 귀를 기울이며 선생님의 말씀을 들어 주시기 바랍니다!"

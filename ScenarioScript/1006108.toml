1006108-87 = "3;사쿠라코;03;네. 선생님. 자매님들께서 어려운 시간을 내어, 모두 이 자리에 모여 주셨답니다.\n#3;em;[반짝]\n#3;greeting"
1006108-88 = "3;사쿠라코;01;바로 그런 이 자리에서……. 선생님께서 함께 말씀해주시면 된답니다."
1006108-89 = "3;사쿠라코;99;제가……."
1006108-90 = "#all;hide"
1006108-91 = "3;사쿠라코;08;수상한 사람이 아니라는 것을요!!\n#3;closeup\n#fontsize;100"
1006108-92 = "[s11] \"자, 잠깐! 사쿠라코! 기다려!\"\n[s12] \"이건 그다지 좋은 방법이 아닌 것 같……!!\""
1006108-93 = "#wait;10"
1006108-94 = "#wait;10"
1006108-95 = "3;사쿠라코;03;모두 들어주십시오, 자매님들! 오늘은 특별히 이 자리에 선생님을 모셨답니다!\n#3;em;[!]"

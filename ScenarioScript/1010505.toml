1010505-14 = "3;마리 아이돌;02;……네?"
1010505-15 = "3;마리 아이돌;01;다른 분들이요? 아아. 지금 이곳에 공연으로 참석한 사람은 저뿐이랍니다.\n#3;em;[?]"
1010505-16 = "3;마리 아이돌;99;작은 공연들을 트리니티 이곳저곳에서 산발적으로, 학원제 기간 내내 이어간다는 컨셉……이라고 들었거든요."
1010505-17 = "3;마리 아이돌;00;모두들 이곳저곳에서 힘내 주고 계신 거죠!\n#3;em;[!]"
1010505-18 = "[s3] \"과연, 솔로잉 게릴라 라이브구나.\"\n[s4] \"좋은 기획이네. 모든 곳이 떠들썩하겠는걸.\""

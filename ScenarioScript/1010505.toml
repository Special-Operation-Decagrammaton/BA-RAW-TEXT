[translation]
1010505-1 = "หลังจบการแสดง"
1010505-2 = "(เมื่อได้ข่าว คุณครูก็ไปหามารีที่กำลังฝึกซ้อมอยู่)"
1010505-4 = "ค่ะ อ่า... ค่ะ... ฉันเตรียมตัวพร้อมแล้วค่ะ"
1010505-5 = "ใกล้จะถึงเวลาแล้วสินะคะ..."
1010505-6 = "หืม...?"
1010505-7 = "คะ... คุณครู!? คุณครูมีธุระอะไรที่นี่คะ..."
1010505-8 = "คะ...? แค่อยากมาดูว่าทุกอย่างเรียบร้อยหรือเปล่าเหรอคะ? อ่า..."
1010505-9 = "อืม ฉันไม่ได้มีเจตนาแบบนั้นเลย กลายเป็นว่าฉันทำให้คุณครูต้องลำบากอีกแล้วนะคะ ขอโทษด้วยค่ะ"
1010505-10 = "[s1] \"ไม่ลำบากเลย ไม่ต้องห่วงนะ\"\n[s2] \"ครูมาเพราะอยากดูการแสดงน่ะ\""
1010505-13 = "ถ้าคุณครูพูดอย่างนั้น ฉันก็ซาบซึ้งค่ะ แต่ก็..."
1010505-14 = "คะ...?"
1010505-15 = "คนอื่นน่ะเหรอคะ...? อ่า วันนี้ฉันมาแสดงโซโล่ค่ะ"
1010505-16 = "ได้ยินมาว่าคอนเซ็ปต์คือ... แสดงโชว์สั้นๆ ตามที่ต่างๆ ในทรีนิตี้ในระหว่างที่มีงานเทศกาลโรงเรียนค่ะ"
1010505-17 = "ทุกคนต่างก็ร่วมแรงร่วมใจกันทั่วโรงเรียนเลยค่ะ!"
1010505-18 = "[s3] \"เป็นการแสดงสดแบบโซโล่สินะ\"\n[s4] \"ดีเลยนะ สงสัยครูต้องไปกระจายข่าวให้ทั่วแล้ว\""
1010505-21 = "แหะๆ..."
1010505-22 = "เป็นสถานการณ์ที่เหมือนของขวัญที่ไม่คาดคิดเลยนะคะ ฉันได้มาทำการแสดงต่อหน้าทุกคน และคุณครูก็ยังมาให้กำลังใจแบบนี้ด้วย..."
1010505-23 = "คนอื่นก็มารอชมการแสดงกันมากมาย และยังสนุกไปกับการแสดงของฉัน..."
1010505-24 = "พอมาคิดดูแล้ว..."
1010505-25 = "รู้สึกเหมือนจะมากันมากกว่าตอนมาปรึกษาในวิหารอีกค่ะ..."
1010505-26 = "เอ๋..."
1010505-27 = "แต่แบบนี้จะไม่เป็นอะไรเหรอคะ...?"
1010505-28 = "[s5] \"อะไรดีก็ว่าดีเถอะน่า\"\n[s6] \"เหมือนจะเป็นซิสเตอร์ขวัญใจมหาชนเลยนะ?\""
1010505-31 = "พะ... พูดอะไรแบบนี้อีกแล้ว..."
1010505-32 = "ฮุฮุ..."
1010505-33 = "อ๊ะ ถึงเวลาแล้วสินะคะ ขอโทษนะคะคุณครู ฉันต้องขึ้นไปทำการแสดงแล้วค่ะ"
1010505-34 = "มีคนรอฉันอยู่มากมายเลย... ถ้าคุณครูไม่รีบไปไหน ไว้คุยกันต่อหลังจบการแสดง..."
1010505-39 = "มะ... ไม่สิ! ช่วยลืมสิ่งที่ฉันเพิ่งพูดไปเถอะค่ะ!! ฉันไม่ได้จะขอให้คุณครูอยู่รอจนจบการแสดงหรอก#nนะคะ...!!"
1010505-40 = "[s7] \"ไม่ต้องคิดมากนะ ตั้งใจร้องเพลงล่ะ!!\"\n[s8] \"เอาละๆ โฟกัสกับการร้องเพลงดีกว่า\""
1010505-43 = "...!"
1010505-44 = "..."
1010505-45 = "ค่ะ...!!"
1010505-48 = "(คุณครูอยู่รอมารีจนการแสดงบนเวทีจบลง)"
1010505-49 = "(การได้เห็นมารีร้องเพลงและเต้นจากด้านหลังเวทีก็น่าชื่นชมไม่แพ้ดูจากหน้าเวทีเลย)"
1010505-53 = "(และแล้ว...)"
1010505-54 = "คุณครู...!!"
1010505-63 = "(หลังสิ้นสุดการแสดง มารีก็มาที่หลังเวทีด้วยความตื่นเต้น)"
1010505-66 = "― [log=마리 아이돌]คุณครู รอฉันเหรอคะเนี่ย! [/log][wa:1400] "
1010505-68 = "― [log=마리 아이돌]รอฉันอยู่ที่นี่ตลอดจริงๆ อย่างนั้นเหรอ...[/log][wa:560] "
1010505-71 = "― [log=마리 아이돌]คือว่าฉัน... ร้องเพลงเป็นยังไงบ้างคะ? [/log][wa:3360] "
1010505-73 = "― [log=마리 아이돌]ฉันคิดว่าอยู่หลังเวที ไม่น่าจะเห็นชัดนะคะ...[/log][wa:1730] "
1010505-76 = "― [log=마리 아이돌]แต่ว่า... คุณครูคอยดูฉันอยู่ตลอดเลยนี่นา [/log][wa:2120] "
1010505-78 = "― [log=마리 아이돌]ถึงอยู่ด้านหลังเวที... ก็คงไม่เป็นไรสินะคะ...[/log][wa:120] "
1010505-81 = "― [log=마리 아이돌]สะ... แสดงใช้ได้รึเปล่าคะ...? ฉันน่ะ...[/log][wa:2440] "
1010505-83 = "― [log=마리 아이돌]เหมือน 'ไอดอล' ตัวจริงหรือยังคะ?[/log][wa:1330] "
1010505-86 = "[ns9] \"เหมือนสิ! ให้มันรู้บ้างว่าใครปั้นมา!\"\n[ns10] \"มารีเป็นไอดอลตัวจริงอยู่แล้วนะ\"\n[ns11] \"อื้อ! ครูรับรองในฐานะแฟนคลับคนแรกให้เลย\""
1010505-90 = "― [log=마리 아이돌]...!![/log][wa:630] "
1010505-92 = "― [log=마리 아이돌]ขอบคุณค่ะ... คุณครู...!![/log][wa:2140] "
1010505-95 = "― [log=마리 아이돌]ฮิฮิๆ...[/log][wa:870] "
1010505-98 = "(ดีจัง...)"
1010505-99 = "(จากนั้นทั้งสองคนก็ได้คุยกันอย่างสนุก...)"

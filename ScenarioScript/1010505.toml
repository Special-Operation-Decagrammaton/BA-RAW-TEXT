[translation]
1010505-1 = "After the Performance"
1010505-2 = " After listening to the story, I went to find Mari, who was preparing for the stage."
1010505-4 = "Yes, ah. ...Yes. It's ready."
1010505-5 = "Just a moment..."
1010505-6 = "...? Hm?"
1010505-7 = "S-Sensei?! What brings you to a place like this...?"
1010505-8 = "...Hm? You just wanted to see if everything's going well? Ah..."
1010505-9 = "Mmm. I wasn't trying to worry you. I'm sorry."
1010505-10 = "[s1] \"Not at all. Don't worry.\"\n[s2] \"I also wanted to see the performance.\""
1010505-13 = "I'm very grateful to hear that, but..."
1010505-14 = "Hmm?"
1010505-15 = "Where are the others? Ah. For now, it's just me."
1010505-16 = "Apparently, the idea is to hold little pop-up concerts all over Trinity throughout the Carnival."
1010505-17 = "So everyone's all spread out, putting on their own shows!"
1010505-18 = "[s3] \"Ah, a bunch of solo guerilla concerts.\"\n[s4] \"That's a nice idea. There'll be music wherever you go.\""
1010505-21 = "...Heehee..."
1010505-22 = "This is such a treat. I get to perform in front of everyone, and even you're here, Sensei."
1010505-23 = "So many people came, and they're having fun..."
1010505-24 = "Just thinking about it..."
1010505-25 = "T-There're even more people here than I see in the counseling room..."
1010505-26 = "...Um..."
1010505-27 = "I hope I can handle it..."
1010505-28 = "[s5] \"That just means more happiness all around.\"\n[s6] \"You counsel THIS many people at once? Wow!\""
1010505-31 = "You're too good to me..."
1010505-32 = "...Heehee."
1010505-33 = "Ah, it's time. Sorry, Sensei. I've got to get out there."
1010505-34 = "But...if you want to talk later, when the concert is over..."
1010505-39 = "N-No, never mind. Forget that. I don't want to make you wait the whole time!"
1010505-40 = "[s7] \"Don't worry about it. Just go out there and break a leg!\"\n[s8] \"No worries, just keep your focus.\""
1010505-43 = "...!"
1010505-44 = "..."
1010505-45 = "...Right!"
1010505-48 = "After that, Mari went out onstage. I waited for her backstage until the concert was over."
1010505-49 = "The sight of Mari's performance from backstage was just as cute and wholesome as if I'd been in the audience."
1010505-53 = "And then..."
1010505-54 = "...Sensei!"
1010505-63 = "After the concert, Mari came backstage, with a bright melody in her voice."
1010505-66 = "― [log=마리 아이돌]Sensei, you waited for me! [/log][wa:1320] "
1010505-68 = "― [log=마리 아이돌]I can't believe you really kept waiting for me here...[/log][wa:40] "
1010505-71 = "― [log=마리 아이돌]Um...Could you see okay? [/log][wa:3880] "
1010505-73 = "― [log=마리 아이돌]Seems like you can't really see the stage from here...[/log][wa:1330] "
1010505-76 = "― [log=마리 아이돌]But I know you're always watching over me... [/log][wa:1960] "
1010505-78 = "― [log=마리 아이돌]So I guess the view wouldn't really matter...[/log][wa:120] "
1010505-81 = "― [log=마리 아이돌]Did I...do okay? Was I...[/log][wa:3000] "
1010505-83 = "― [log=마리 아이돌]Was I a...proper...idol?[/log][wa:1650] "
1010505-86 = "[ns9] \"Of course! I'm proud of you!\"\n[ns10] \"You were always an idol, for everyone.\"\n[ns11] \"As your first fan, I guarantee you that.\""
1010505-90 = "― [log=마리 아이돌]...![/log][wa:670] "
1010505-92 = "― [log=마리 아이돌]...Thank you, Sensei...![/log][wa:2140] "
1010505-95 = "― [log=마리 아이돌]...Heehee.[/log][wa:790] "
1010505-98 = " And all was well."
1010505-99 = " We had a great time chatting after that."

1010505-22 = "3;마리 아이돌;99;뭔가, 뜻밖의 선물 같은 상황이네요. 모두의 앞에서 공연을 하고, 선생님께서도 이렇게 응원하러 와 주시고……."
1010505-23 = "3;마리 아이돌;00;다른 분들도 굉장히 많이 와 주시고, 또 즐거워해 주시고……."

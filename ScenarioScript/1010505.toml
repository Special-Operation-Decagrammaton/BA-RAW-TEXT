[translation]
1010505-1 = "表演結束後"
1010505-2 = " （聽到消息後，動身去找正在準備表演的瑪麗）"
1010505-4 = "啊，是……我已經準備好了。"
1010505-5 = "稍後……"
1010505-6 = "……嗯？"
1010505-7 = "老，老師！？您來這裡有什麼事嗎……"
1010505-8 = "……嗯？只是來看看準備得順不順利？#n啊啊……"
1010505-9 = "唔嗯，雖然我沒有那個意思，不過好像讓您擔心了呢。非常抱歉。"
1010505-10 = "[s1]「別這麼說。瑪麗不需要在意這種事。」\n[s2]「我也是為了欣賞你的表演才來的。」"
1010505-13 = "如果您願意這麼說，我當然感激不盡……"
1010505-14 = "……嗯？"
1010505-15 = "其他人？#n啊啊，這次只有我一個人要上台表演。"
1010505-16 = "我們打算在學園祭的期間內，持續在三一各處舉辦零星的小表演……"
1010505-17 = "所以大家現在都在其他地方努力著！"
1010505-18 = "[s3]「原來如此，要舉辦個人的快閃演出嗎？」\n[s4]「是個不錯的想法呢。這樣就能一次炒熱各地的氣氛。」"
1010505-21 = "耶嘿嘿……"
1010505-22 = "總覺得有種收到了驚喜禮物的感覺。#n不僅能在大家面前表演，連老師也來替我加油……"
1010505-23 = "觀眾們似乎也都看得很開心……"
1010505-24 = "仔細想想……"
1010505-25 = "總，總覺得今天來的人，好像比來諮詢室找我諮詢的人還多呢……"
1010505-26 = "咦……"
1010505-27 = "這樣真的沒問題嗎……"
1010505-28 = "[s5]「這也算是好事一樁嘛。」\n[s6]「平時找你諮詢的人居然這麼多嗎……？」"
1010505-31 = "您又說這種話……"
1010505-32 = "……呵呵。"
1010505-33 = "啊，時間差不多了。#n不好意思，老師。我得上台表演了。"
1010505-34 = "畢竟有很多人在等我……如果您方便的話，等表演結束之後……"
1010505-39 = "沒，沒什麼！請忘了我剛才說的話吧！！#n我沒有要強迫您留到那時候的意思……！！"
1010505-40 = "[s7]「別在意，表演加油哦！！」\n[s8]「沒事沒事，專心表演吧。」"
1010505-43 = "……！"
1010505-44 = "…………"
1010505-45 = "……是！！"
1010505-48 = "（於是便在舞台側邊等待瑪麗的表演結束）"
1010505-49 = "（即使是從其他角度觀看，瑪麗的表演依舊可愛而溫暖）"
1010505-53 = "（接著在表演結束之後……）"
1010505-54 = "……老師！！"
1010505-63 = "（興奮的瑪麗回到了舞台後方）"
1010505-66 = "― [log=마리 아이돌]老師，讓您久等了！[/log][wa:2040] "
1010505-68 = "― [log=마리 아이돌]沒想到您竟然一直在這裡等我……[/log][wa:1600] "
1010505-71 = "― [log=마리 아이돌]那個……演出，您覺得如何呢？[/log][wa:4320] "
1010505-73 = "― [log=마리 아이돌]雖然從舞台側邊可能看不太清楚……[/log][wa:2850] "
1010505-76 = "― [log=마리 아이돌]不過，畢竟老師總是守望著我……[/log][wa:3160] "
1010505-78 = "― [log=마리 아이돌]就算是從舞台側邊應該也沒問題……[/log][wa:1280] "
1010505-81 = "― [log=마리 아이돌]那個……表演，怎麼樣呢？[/log][wa:3520] "
1010505-83 = "― [log=마리 아이돌]我有……成為稱職的「偶像」嗎？[/log][wa:2010] "
1010505-86 = "[ns9]「那當然！畢竟你可不是別人培養出來的啊！」\n[ns10]「瑪麗你從一開始就是大家的偶像哦！」\n[ns11]「我能以你頭號粉絲的身份保證！」"
1010505-90 = "― [log=마리 아이돌]……！！[/log][wa:670] "
1010505-92 = "― [log=마리 아이돌]……謝謝您，老師……！！[/log][wa:2620] "
1010505-95 = "― [log=마리 아이돌]……耶嘿嘿。[/log][wa:950] "
1010505-98 = " （幸好……）"
1010505-99 = " （……似乎進行得很順利）"

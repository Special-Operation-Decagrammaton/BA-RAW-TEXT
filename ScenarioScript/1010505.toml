1010505-1 = "#title;공연 후에"
1010505-2 = "#na; (이야기를 듣고, 공연을 준비 중인 마리에게 찾아갔다.)"
1010505-3 = "#all;hide"
1010505-4 = "3;마리 아이돌;01;네, 아. ……네. 준비됐어요.\n#3;a\n#3;em;[반응]"
1010505-5 = "3;마리 아이돌;00;이제 조금 있으면……."
1010505-6 = "3;마리 아이돌;02;……? 음?"
1010505-7 = "3;마리 아이돌;11;서, 선생님!? 선생님께서 이런 곳엔 어쩐 일로…….\n#3;em;[?!]\n#3;shake"
1010505-8 = "3;마리 아이돌;04;……네? 그냥 잘 돼 가는지 한 번 보러 오신 거라고요? 아아……."
1010505-9 = "3;마리 아이돌;06;으음. 절대 그럴 의도는 아니었는데, 본의 아니게 신경 쓰이시게 만든 것 같은 느낌이네요. 죄송해요.\n#3;em;[속상함]"
1010505-10 = "[s1] \"절대 그렇지 않아. 걱정 마.\"\n[s2] \"나도 보고 싶어서 온 거야.\""

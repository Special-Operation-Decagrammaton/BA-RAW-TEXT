[translation]
52050-1 = "第5話;記憶彼端的思念"
52050-10 = "十個月前，菖蒲將百蓮交給我之後，便啟程前往北方尋找葛葉大人。"
52050-11 = "當時的我，因為陷入慌亂而無法採取任何行動。"
52050-12 = "我無法取代菖蒲。#n無法代理百花繚亂的委員長之職……我是這麼想的。"
52050-15 = "很快我便對此深信不疑……#n等我回過神來，已經踏上了前往大雪原的路。"
52050-26 = "不知道過了多久……白晝與黑夜究竟交替了多少次。"
52050-27 = "想在杳無人跡的廣大雪原中尋找一個人並不容易……#n最終我在幾乎要筋疲力盡的時候，才抵達了據說曾有「黃昏寺院」存在的空地。"
52050-39 = "而菖蒲就這麼孤獨地站在那裡，彷彿在等待著誰一般。"
52050-40 = "百花繚亂的大家……應該都還記得菖蒲的長相和聲音吧？"
52050-41 = "那即便在陰天也如陽光般燦爛的笑容，那彷彿能溫柔包覆疲憊身軀的親切聲音……"
52050-42 = "在幾乎要將緊握百蓮的指尖凍結的寒風之中，看見那如春日晴空般湛藍的羽織時……#n我心裡暗自期盼著。"
52050-45 = "期盼他會和往常一樣，回頭看向愚蠢到拋下一切前來撒嬌的我。"
52050-46 = "期盼他會露出無可奈何的笑容向我伸手。"
52050-47 = "期盼他會回來，再次成為我們的委員長。"
52050-49 = "然而，我從菖蒲口中聽見的卻是……"
52050-55 = "你為什麼會來這裡？"
52050-61 = "那是我從未聽過的冷漠聲音。"
52050-62 = "他的目光，冰冷得彷彿要將人拒於千里之外。"
52050-72 = "那不是我記憶中的菖蒲。"
52050-75 = "問我為什麼來這裡……#n菖蒲，我是來帶你回去的……"
52050-76 = "我已經說過要來見葛葉大人了。#n在見到葛葉大人之前，我是不會回去的。"
52050-77 = "可是因為你不在的關係，大家都很不安。"
52050-78 = "獲得大家信任跟追隨的百花繚亂委員長突然消失，讓所有人都感到很混亂。"
52050-79 = "……跟我回去吧，菖蒲。"
52050-85 = "菖蒲應該也知道才對。"
52050-86 = "葛葉大人只是古老記錄中的傳聞──"
52050-87 = "傳聞？你說葛葉大人只是傳聞……？"
52050-92 = "……是啊，或許真是如此吧。#n畢竟寺院早已風化在這片雪原之下，無論我怎麼呼喚也毫無反應。"
52050-93 = "然而即便如此，我也必須見到葛葉大人。"
52050-94 = "至於非得見葛葉大人一面的原因……名草你想必無法理解吧。"
52050-96 = "不……我能理解。"
52050-97 = "是因為菖蒲的責任感很強……#n為了在這場混亂中守護大家，所以才想獲得葛葉大人的建議對吧？"
52050-101 = "哈哈……"
52050-102 = "哈哈哈哈……！"
52050-106 = "名草，你果然不了解我啊。"
52050-110 = "你從來不曾真正理解過我。"
52050-114 = "菖蒲，你為什麼要這麼說──"
52050-119 = "人心本就是無法互相理解的不可解之物。"
52050-120 = "所謂理解他人，不過只是傲慢……如玻璃般脆弱的幻象。"
52050-121 = "你這個人，可真是既無能又傲慢啊。"
52050-125 = "你是……？"
52050-132 = "我只是個愛好風雅、鍾情於故事的過客。"
52050-133 = "不過是在這人跡罕至的雪山瞧見有人尋路，便出來迎接罷了。"
52050-137 = "你知道葛葉在哪嗎？"
52050-138 = "不，我也只是個無法觸及彼岸的境界、僅能以風雅排遣哀愁的亡魂。"
52050-143 = "然而即便路途不同，我依然能伴你抵達你所期望的目的地。"
52050-147 = "那麼……就帶我去吧。"
52050-155 = "不行！別帶走菖蒲……別帶走我的朋友！"
52050-159 = "……朋友？"
52050-166 = "名草。"
52050-171 = "我從來沒有把你當成朋友。"
52050-174 = "怎麼會……菖蒲前輩居然會說出如此殘酷的話？"
52050-175 = "不可能。就算再怎麼生氣，菖蒲前輩也不會說那種話的。"
52050-176 = "……聽起來實在不像我所認識的菖蒲前輩。"
52050-181 = "嗯，我也這麼覺得。#n平常的菖蒲絕不會說出那種話。"
52050-182 = "因此我也曾經想否認，將那天雪原上的菖蒲視為一場惡夢……"
52050-183 = "然而連同他的衣角一同被吞噬的手臂……這道傷痕卻不斷喚醒著那天的記憶。"
52050-184 = "所以在那之後就再也沒見過菖蒲前輩了嗎？"
52050-185 = "嗯。也許是因為疲憊與緊張的關係，我隨後便失去了意識。"
52050-186 = "獨自昏倒在人跡罕至的雪原之中，隨時可能凍死……"
52050-187 = "所幸在他人的幫助下撿回了一命。"
52050-189 = "在那種地方居然會有人路過，真是有如[ruby=奇蹟]天運[/ruby]一般呢。"
52050-193 = "天運啊……"
52050-194 = "是啊，要是真有天運就好了。"
52050-199 = "……唔嗯。"
52050-203 = "……你醒了嗎？"
52050-210 = "既已恢復意識，就沿著門口的小路回山腳下的村子去吧。#n此處僅能為你保存體力，而無法真正有所恢復。"
52050-211 = "是你……救了我嗎？"
52050-212 = "呵呵，面對初次見面的前輩竟用「你」來稱呼，可真有膽量啊。"
52050-213 = "考慮到你的處境，這點無禮妾身就不多加追究了。#n還記得自己的名字嗎？"
52050-214 = "我……是百花繚亂紛爭調停委員會的委員長代理……御稜名草。"
52050-220 = "櫻花竟然會在冬日裡盛開，這裡究竟是……"
52050-224 = "怪事，你來到此處之前竟沒聞到櫻花香嗎？"
52050-225 = "這「黃昏寺院」的時間流逝與現實不同，即便彼岸花與櫻花同時綻放也不足為奇。"
52050-229 = "這裡是黃昏寺院……？"
52050-230 = "所以你就是大預言者葛葉？"
52050-232 = "呼呣……"
52050-233 = "倘若妾身真是葛葉的話，你打算怎麼做？"
52050-234 = "作為百花繚亂的繼承者，你想詢問什麼計策？"
52050-241 = "不，你不是葛葉。"
52050-242 = "哦？"
52050-243 = "如果你真是葛葉的話……就不會無視苦苦尋找你的菖蒲，卻救下微不足道的我。"
52050-244 = "如此冷酷無情的人，不可能是百花繚亂的初代委員長葛葉。"
52050-245 = "既然你這麼認為，妾身也無意否認。"
52050-246 = "不過……這倒是個不錯的機會呢。#n就當是救你一命的小小回報，替妾身辦件差事吧。"
52050-254 = "這個卷軸是……？"
52050-255 = "是給尋覓妾身之人帶去的書信。"
52050-256 = "收信人是「夏萊」的老師。#n至於內容──"
52050-260 = "則是關於拯救某人的方法。"
52050-265 = "……我經歷的事情就是這些。"
52050-266 = "不只沒能救回菖蒲還被他拒絕……甚至因此失去了一隻手。"
52050-267 = "至今為止之所以隱瞞真相……是因為害怕大家會對我感到失望並離我而去。"
52050-268 = "……但我不會再逃避了。"
52050-269 = "請你們……儘管責備、憎恨我吧。"
52050-275 = "我……我們……"
52050-276 = "我們怎麼可能會因為這種事責備名草前輩呢！"
52050-280 = "紫，紫……？"
52050-281 = "在那場混亂之中，願意冒險去雪原尋找菖蒲前輩的就只有名草前輩……"
52050-282 = "在這百花繚亂，究竟誰有資格責怪你呢？"
52050-283 = "……本來以為上次的事情已經讓你有所成長，結果還是老樣子啊。"
52050-284 = "一向溫柔開朗的菖蒲委員長，突然像被蠱惑一般態度驟變，#n而花鳥風月部又碰巧在這時出面襲擊委員長……"
52050-285 = "這分明是花鳥風月部試圖謀害百花繚亂的計策吧？"
52050-286 = "沒錯。菖蒲前輩之所以會說出那種話，一定是被那個壞女人給欺騙了！"
52050-287 = "就是說啊，何必在這裡自責呢？"
52050-288 = "我們立刻去雪原救回菖蒲前輩，順便把名草前輩的手臂也找回來吧！"
52050-289 = "這個提議真是[ruby=Excellent]棒～極[/ruby]了，小女子舉雙手贊成！"
52050-291 = "可，可是……"
52050-292 = "大雪原依然很危險，要百花繚亂為了我而離開崗位實在有點……"
52050-297 = "打擾了，請問百花繚亂的各位在嗎？"
52050-305 = "啊，看來正好都在呢。"
52050-306 = "你是陰陽部的……請問有什麼事嗎？"
52050-307 = "是的，有件事想拜託各位。"
52050-312 = "陰陽部部長希望與百花繚亂見一面。"
52050-313 = "仁耶大人他……？"
52050-315 = "下一話;祭典準備"

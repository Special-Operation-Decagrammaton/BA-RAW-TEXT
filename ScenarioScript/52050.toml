[translation]
52050-1 = "Episode 5;Yearning Beyond the Memory"
52050-10 = "Ten months ago, Ayame gave me the Hundred Lotus and left to search for Kuzunoha in the northern lands."
52050-11 = "I was so flustered, betrayed, and paralyzed with fear."
52050-12 = "I knew I could never replace Ayame. She was the president of the Hyakkaryouran, and I...I didn't know what I was."
52050-15 = "I was adrift and untethered. And before I knew it, I was headed towards the Great Snowfield."
52050-26 = "How much time had passed? How many nights and days had turned?"
52050-27 = "It seemed impossible. How could I find one person in the vast and blinding snow? I trudged forward with the last wisps of my strength, following the map to the Twilight Temple, but instead found only an empty field."
52050-39 = "And Ayame was there. She looked like she had been waiting for a long time."
52050-40 = "You all must remember her face and her voice..."
52050-41 = "A smile that shined like the sun even on cloudy days, and a warm welcoming voice that could bring you back to life."
52050-42 = "My hands were so cold they felt frozen to the Hundred Lotus. But when I saw that haori, azure like the sky of a warm spring day, I actually hoped."
52050-45 = "I hoped that she would look after me like she once had, even though I had abandoned my duties. I hoped she would coddle me."
52050-46 = "I hoped she would reach her hand out to pick me up, then smile because she accepted me as I was."
52050-47 = "I hoped she would return and be our president."
52050-49 = "But, what I heard from Ayame was..."
52050-55 = "Why did you come here?"
52050-61 = "A cold voice I have never heard her use before."
52050-62 = "A chilling glare, looking down on me, detesting me."
52050-72 = "That...wasn't the Ayame I remembered."
52050-75 = "Why did I come here...? Ayame, I came here for..."
52050-76 = "I told you that I'm here to meet Kuzunoha. I'm not returning until I've found her."
52050-77 = "But everyone's worried about you."
52050-78 = "Everyone in the Hyakkaryouran is confused without you, our guiding light."
52050-79 = "...Come back with me, Ayame."
52050-85 = "You know as well as I do, Ayame."
52050-86 = "Kuzunoha is like a rumor, an old myth—"
52050-87 = "A rumor?"
52050-92 = "...You could be right. The temple is eroded or buried under the snow, and she hasn't shown herself despite all my calls."
52050-93 = "Even so, I have to meet Kuzunoha."
52050-94 = "Nagusa, I wouldn't expect you to understand why."
52050-96 = "Please...tell me."
52050-97 = "You're trying to be a responsible leader? You seek her wisdom and guidance?"
52050-101 = "Haha..."
52050-102 = "Hahahaha!"
52050-106 = "Honestly, Nagusa. You don't know me at all."
52050-110 = "All those years, and you never got it."
52050-114 = "Ayame, please don't—"
52050-119 = "The human mind is a delicate, beautiful thing. It can never be fully understood."
52050-120 = "To presume to know another is sheer arrogance, a brittle illusion that can be shattered like glass..."
52050-121 = "You arrogant, incompetent little girl."
52050-125 = "You're...?"
52050-132 = "I am a mere traveler in search of a good story."
52050-133 = "I sensed a lost soul out here and sought to help them."
52050-137 = "Do you know where Kuzunoha is?"
52050-138 = "A pity, but no. But, like you, I also seek to reach the boundary of the Beyond. Until then, I soothe my soul with artistic elegance."
52050-143 = "And, even if our paths diverge in time, I'd be happy to keep you company."
52050-147 = "Very well. Lead the way."
52050-155 = "No. Ayame, don't! Don't take my friend!"
52050-159 = "...Friend?"
52050-166 = "You were never my friend..."
52050-171 = "...Goryou Nagusa."
52050-174 = "Oh dear... Surely Ayame couldn't be so cruel?"
52050-175 = "No way. President Ayame would never, no matter how angry she was."
52050-176 = "...That is not the Ayame I know."
52050-181 = "I understand. It was...difficult to witness."
52050-182 = "I tried to deny it, thinking maybe I had hallucinated some terrible nightmare."
52050-183 = "But, as I reached out, my arm was swallowed in her hem...and this wound is a constant reminder."
52050-184 = "And that is all President Ayame said to you?"
52050-185 = "I think so. I collapsed, lost consciousness..."
52050-186 = "I could have frozen to death, but I was so tired. And it hurt so much..."
52050-187 = "But thankfully, a kind soul found me."
52050-189 = "Someone happened to be passing by? Nagusa, that's utterly miraculous!"
52050-193 = "...A miracle?"
52050-194 = "There's no such thing."
52050-199 = "...Hm."
52050-203 = "...Are you awake?"
52050-210 = "If you are awake, follow this path to the village at the foot of the mountain. You may be able to survive, but you'll never recover."
52050-211 = "Did you...save me?"
52050-212 = "Fufu, what an insolent tone for your elder."
52050-213 = "I'll overlook it this time, seeing as you're a tad...unraveled. Do you remember your name?"
52050-214 = "I'm...the Hyakkaryouran's acting president, Goryou Nagusa."
52050-220 = "How are cherry blossoms blooming in the middle of winter?"
52050-224 = "How, indeed? It's so strange that you didn't smell them on your way out here."
52050-225 = "I don't think the blossoms are so unusual. Then again, time passes differently in the Twilight Temple."
52050-229 = "This is the Twilight Temple...?"
52050-230 = "Then you...are the Great Prophet, Kuzunoha?"
52050-232 = "Hm..."
52050-233 = "Well, what if I was? What would you do?"
52050-234 = "Would you ask me for my blessed Hyakkaryouran wisdom, Madame President?"
52050-241 = "No, you're not Kuzunoha."
52050-242 = "Hmm..."
52050-243 = "Because the real Kuzunoha would never ignore Ayame while saving someone as worthless as me."
52050-244 = "A cruel, heartless person like that could never be Kuzunoha, the first president of the Hyakkaryouran."
52050-245 = "You are entitled to your opinion."
52050-246 = "However...this is a good opportunity. I have a small request, let's say in exchange for me saving your life."
52050-254 = "A scroll..."
52050-255 = "It's a message to a certain someone who has been looking for me."
52050-256 = "It's for Schale's Sensei. And inside this scroll is..."
52050-260 = "...a way to save someone."
52050-265 = "...That's what I remember."
52050-266 = "And, yes, not only did I fail to save Ayame, but she rejected me. And that is how my arm became this way."
52050-267 = "I was afraid you would all be disappointed if you knew. I thought you might leave me too."
52050-268 = "...But I will no longer run from the truth."
52050-269 = "So, blame me. Hate me. All I ask is that you be honest with your feelings."
52050-275 = "How... How..."
52050-276 = "How could I blame you for something like that?"
52050-280 = "Yu-Yukari...?"
52050-281 = "Amidst a storm of chaos and doubt, only YOU had the fortitude to venture to the Great Snowfield and search for Ayame."
52050-282 = "Who amongst us could possibly blame you?"
52050-283 = "...I thought you'd matured since our last incident, Nagusa, but you're being an idiot."
52050-284 = "If President Ayame was acting completely different, as if POSSESSED, and then Nature's Beauty appeared to ambush you..."
52050-285 = "Is it not obvious that this is a scheme to trick you and slander the Hyakkaryouran?"
52050-286 = "Precisely. If that even was Ayame, then she was being tricked. We know her spirit. That was not her."
52050-287 = "Yeah. So what are you blaming yourself for?"
52050-288 = "I say we go to the Great Snowfield right now to save President Ayame and...pick up Nagusa's arm or whatever!"
52050-289 = "Brilliant. I wholeheartedly agree!"
52050-291 = "B-But..."
52050-292 = "The Great Snowfield is treacherous, and the entire Hyakkaryouran can't leave on account of me..."
52050-297 = "Excuse me, is this the Hyakkaryouran?"
52050-305 = "Oh, good. The gang's all here."
52050-306 = "And you're... Why are you here, precisely?"
52050-307 = "Ah, I just wanted to let you know, the president of the Yin-Yang Club..."
52050-312 = "...she needs the Hyakkaryouran for something. Sounded important."
52050-313 = "Niya...?"
52050-315 = "Next Episode;Festival Preparations"

[translation]
52050-1 = "ตอนที่ 5;ความคิดถึงจากอีกฝั่งของความทรงจำ"
52050-10 = "เมื่อ 10 เดือนที่แล้ว ตอนที่อายาเมะให้เฮียกกุเร็นกับฉันแล้วออกไปยังดินแดนทางเหนือเพื่อตามหา#nท่านคุซึโนฮะ"
52050-11 = "ตอนนั้นฉันสับสนมากจนทำอะไรไม่ถูก"
52050-12 = "ฉันบอกไปว่าฉันทำหน้าที่แทนอายาเมะไม่ได้ เพราะฉันคิดว่า... มันเป็นไปไม่ได้ที่ฉันจะเป็นหัวหน้า#nเฮียกกะเรียวรันแทนอายาเมะ"
52050-15 = "แล้วความคิดนั้นก็เปลี่ยนมาเป็นความเชื่อ พอได้สติก็พบว่าตัวเองกำลังเดินเข้าไปในทุ่งหิมะใหญ่แล้ว"
52050-26 = "เวลาผ่านไปแสนนาน กลางวันเปลี่ยนเป็นกลางคืนไปไม่รู้กี่หน"
52050-27 = "การพบแม้แต่ใครสักคนในทุ่งหิมะอันรกร้างกว้างใหญ่ไม่ใช่เรื่องง่ายเลย แต่ก่อนที่ฉันจะหมดแรง#nเฮือกสุดท้าย ฉันก็ไปถึงที่ดินว่างเปล่าที่ว่ากันว่าเป็นที่ตั้งของ <วิหารอัสดง> "
52050-39 = "แล้วอายาเมะก็ยืนโดดเดี่ยวเดียวดายราวกับกำลังรอใครบางคนอยู่ที่นั่น"
52050-40 = "ถ้าเป็นสมาชิกของเฮียกกะเรียวรัน... ไม่ว่าใครก็จำใบหน้าและเสียงของอายาเมะได้ใช่มั้ยล่ะ?"
52050-41 = "รอยยิ้มที่เปล่งประกายเหมือนแสงแดดในวันที่ฟ้ามืดครึ้ม เสียงพูดอันอบอุ่นที่ช่วยโอบกอดร่างกายที่#nเหนื่อยล้า"
52050-42 = "ท่ามกลางความหนาวเหน็บของทุ่งหิมะใหญ่ที่ทำให้ปลายนิ้วที่กำเฮียกกุเร็นไว้ถึงกับเป็นน้ำแข็ง ฉันก็ได้เห็นเสื้อฮาโอริสีครามเหมือนท้องฟ้าอันอบอุ่นในฤดูใบไม้ผลิ และตอนนั้นฉันก็หวังไว้ลึกๆ"
52050-45 = "ฉันหวังว่าอายาเมะจะหันกลับมามองฉัน ผู้ที่ทิ้งทุกอย่างไว้ข้างหลังและทำตามใจตัวเองอย่างคนโง่"
52050-46 = "ฉันหวังว่าอายาเมะจะส่งยิ้มและยื่นมือมาให้แล้วบอกว่าไม่เป็นไร"
52050-47 = "และหวังว่าอายะเมะจะกลับมาเป็นหัวหน้าของพวกเราอีกครั้ง"
52050-49 = "แต่ว่า... คำที่ฉันได้ยินจากปากของอายาเมะ..."
52050-55 = "เธอมาทำอะไรถึงที่นี่?"
52050-61 = "น้ำเสียงเยือกเย็นที่ฉันไม่เคยได้ยินมาก่อน"
52050-62 = "แววตาเย็นชาที่ดูเหมือนจะข่มขู่และดูแคลนอีกฝ่าย"
52050-72 = "นั่นไม่ใช่... อายาเมะที่อยู่ในความทรงจำของฉัน"
52050-75 = "ถามว่ามาทำไมน่ะเหรอ... อายาเมะ ฉันก็มารับเธอยังไงล่ะ..."
52050-76 = "ก็บอกไปแล้วไม่ใช่เหรอว่าฉันมาหาท่านคุซึโนฮะ ถ้าฉันยังไม่ได้เจอท่านคุซึโนฮะ ฉันก็ไม่มีวันกลับไปหรอก"
52050-77 = "แต่ตอนนี้ทุกคนกำลังกังวลที่เธอไม่อยู่นะ"
52050-78 = "พอหัวหน้าเฮียกกะเรียวรันที่ทุกคนไว้วางใจและเชื่อฟังหายตัวไป ทุกคนก็ตกอยู่ในความสับสน"
52050-79 = "กลับกันเถอะนะ อายาเมะ..."
52050-85 = "เธอเองก็รู้ดีไม่ใช่เหรอ อายาเมะ"
52050-86 = "เธอก็รู้ว่าตัวตนของท่านคุซึโนฮะก็เหมือนกับข่าวลือที่อยู่ในบันทึกโบราณ..."
52050-87 = "ข่าวลือ? เธอจะบอกว่าท่านคุซึโนฮะเป็นเพียงข่าวลือเท่านั้นเหรอ...?"
52050-92 = "ใช่... อาจจะเป็นอย่างนั้นก็ได้ วิหารทั้งผุพัง ทั้งถูกหิมะปกคลุมมาตั้งนานแล้ว ต่อให้ฉันร้องเรียกอย่างสิ้นหวังแต่ก็ไม่เจอสัญญาณอะไรเลย"
52050-93 = "แต่ถึงยังไงฉันก็ต้องเจอท่านคุซึโนฮะให้ได้"
52050-94 = "นางุสะ เธอน่ะไม่รู้หรอกว่าทำไมฉันถึงอยากเจอท่านคุซึโนฮะ"
52050-96 = "ไม่หรอก ฉันก็... เข้าใจเธอเหมือนกัน"
52050-97 = "ก็อายาเมะเป็นคนที่มีความรับผิดชอบสูงนี่นา อายาเมะพยายามจะหาคำแนะนำจากท่านคุซึโนฮะ เพื่อปกป้องทุกคนจากความโกลาหลนี้ใช่มั้ยล่ะ?"
52050-101 = "ฮ่าฮ่า..."
52050-102 = "ฮ่าฮ่าฮ่าฮ่า...!"
52050-106 = "นางุสะ เธอนี่ช่างไม่รู้จักฉันเอาเสียเลยนะ"
52050-110 = "เธอไม่เคยเข้าใจฉันเลยแม้สักครั้งเดียว"
52050-114 = "อายาเมะ ทำไมเธอถึงพูดแบบนั้น..."
52050-119 = "จิตใจของมนุษย์น่ะ โดยธรรมชาติแล้วเป็นสิ่งที่คนอื่นไม่อาจเข้าใจได้"
52050-120 = "การบอกว่าเข้าใจผู้อื่นเป็นแค่ความโอหัง และมันก็เปราะบางเหมือนแก้ว "
52050-121 = "เจ้าน่ะทั้งไร้ความสามารถและโอหัง"
52050-125 = "เธอคือ...?"
52050-132 = "ข้าก็แค่นักเดินทางที่รักในความสง่างามและชอบการฟังเรื่องราว"
52050-133 = "ได้ยินมาว่ามีใครบางคนกำลังมองหาเส้นทางอยู่ในภูเขาหิมะที่รกร้าง ข้าก็เลยออกมารับ"
52050-137 = "รู้หรือเปล่าว่าคุซึโนฮะอยู่ที่ไหน?"
52050-138 = "ไม่หรอก ข้าก็แค่สิ่งที่ไม่ต่างจากวิญญาณร้ายที่ไปไม่ถึงเขตแดนของนิพพาน จึงต้องปลอบโยนความเศร้าโศกด้วยความสง่างาม"
52050-143 = "แต่ต่อให้เส้นทางจะต่างกัน ข้าก็ร่วมทางไปจนไปถึงจุดหมายปลายทางของเจ้าได้"
52050-147 = "ถ้างั้น... เธอช่วยบอกทางให้ฉันหน่อยสิ"
52050-155 = "ไม่ได้นะ อย่าเอาอายาเมะไป... อย่าเอาเพื่อนฉันไปนะ!"
52050-159 = "เพื่อนงั้นเหรอ...?"
52050-166 = "นางุสะ"
52050-171 = "ฉันไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง"
52050-174 = "คุณพระ... รุ่นพี่นางุสะกำลังบอกว่ารุ่นพี่อายาเมะพูดจาโหดร้ายเช่นนั้นออกมาหรือเจ้าคะ?"
52050-175 = "ไม่หรอกน่า ต่อให้โกรธจนเลือดขึ้นหน้าแค่ไหน หัวหน้าอายาเมะก็ไม่มีทางพูดแบบนั้นหรอก"
52050-176 = "ไม่เหมือนหัวหน้าอายาเมะที่ฉันรู้จักเลย..."
52050-181 = "อื้อ ฉันก็คิดแบบนั้นเหมือนกัน เพราะนั่นเป็นสิ่งที่ปกติแล้วอายาเมะจะไม่พูดเด็ดขาด"
52050-182 = "ฉันก็เลยพยายามปฏิเสธว่าภาพของอายาเมะที่ฉันเห็นในวันนั้นเป็นแค่ฝันร้ายที่ฉันเจอในทุ่งหิมะนั่น..."
52050-183 = "แต่แขนของฉันที่ถูกกลืนกินไปพร้อมกับชายเสื้อของอายาเมะกับรอยแผลที่แขนนั่น มันยังทำให้ฉันนึกถึงความทรงจำในวันนั้นอยู่เลย"
52050-184 = "แล้วหลังจากนั้นก็ไม่ได้เจอหัวหน้าอายาเมะอีกเลยเหรอ?"
52050-185 = "อื้อ คงเพราะฉันเหนื่อยล้าและเครียดสะสมน่ะ หลังจากนั้นฉันก็เลยหมดสติไป"
52050-186 = "ฉันหมดสติไปในทุ่งหิมะใหญ่ที่รกร้างแบบนั้น ถ้าถูกแช่แข็งจนตายไปก็คงไม่แปลก..."
52050-187 = "แต่โชคดีที่ฉันรอดชีวิตมาได้ด้วยความช่วยเหลือจากใครบางคน"
52050-189 = "มีใครเดินผ่านทุ่งหิมะที่รกร้างพอดีงั้นเหรอเจ้าคะ โชคดีเหลือเกินที่โชคชะตาเข้าข้างรุ่นพี่"
52050-193 = "โชคชะตางั้นเหรอ..."
52050-194 = "ใช่ ถ้าโชคชะตามีจริงก็คงจะดีน่ะสิ"
52050-199 = "อืม..."
52050-203 = "ได้สติแล้วหรือ...?"
52050-210 = "ถ้าได้สติครบถ้วนแล้ว ก็จงเดินตามทางผ่านประตูแล้วกลับไปยังหมู่บ้านที่เชิงเขา แม้เจ้าจะรักษาพลัง#nที่เหลือของตัวเองที่นี่ได้ แต่ก็ฟื้นคืนมาให้เหมือนเดิมไม่ได้หรอก"
52050-211 = "เธอ... ช่วยฉันไว้เหรอ?"
52050-212 = "ฮุฮุ เรียกรุ่นพี่ที่เจอกันครั้งแรกว่า 'เธอ' อย่างนั้นหรือ เจ้านี่ใช้ไม่ได้เอาซะเลยนะ"
52050-213 = "ตอนนี้ข้าไม่มีเวลา งั้นข้าจะหลับหูหลับตาให้กับความไม่มีมารยาทนี้แล้วกัน ว่าไงล่ะ เจ้าจำชื่อของตัวเองได้หรือไม่?"
52050-214 = "ฉันชื่อ... โกเรียว นางุสะ... รักษาการหัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน"
52050-220 = "ดอกซากุระบานสะพรั่งท่ามกลางฤดูหนาวงั้นเหรอ ที่นี่มัน..."
52050-224 = "แปลกจริงเชียว ระหว่างมาที่นี่ข้ายังไม่ได้กลิ่นดอกซากุระเลย"
52050-225 = "กระแสเวลาใน <วิหารอัสดง> แห่งนี้ไหลแตกต่างจากความเป็นจริง ต่อให้มีทั้งดอกซากุระและก็#nดอกไม้เส้นศูนย์สูตรบานพร้อมกันก็หาใช่เรื่องแปลกไม่"
52050-229 = "ที่นี่คือวิหารอัสดงงั้นเหรอ...?"
52050-230 = "ถ้างั้นคุณก็คือผู้พยากรณ์ใหญ่คุซึโนฮะน่ะสิ?"
52050-232 = "ฮืม..."
52050-233 = "ใช่ ถ้าข้าคือคุซึโนฮะจริงๆ อย่างที่เจ้าว่า เจ้าจะทำอย่างไรเล่า?"
52050-234 = "เจ้ามีอะไรอยากถามข้าในฐานะทายาทเฮียกกะเรียวรันหรือเปล่า?"
52050-241 = "ไม่ คุณไม่ใช่คุซึโนฮะหรอก"
52050-242 = "โอ้"
52050-243 = "ถ้าคุณคือคุซึโนฮะตัวจริง... คุณก็คงไม่เพิกเฉยต่อการร่ำร้องเรียกคุณอย่างสิ้นหวังของอายาเมะ#nแล้วมาช่วยฉันที่เป็นแค่คนไร้ค่าหรอก"
52050-244 = "ไม่มีทางที่คนใจดำและเย็นชาอย่างคุณจะเป็นคุซึโนฮะ หัวหน้าคนแรกของเฮียกกะเรียวรันหรอก"
52050-245 = "ถ้าเจ้าคิดเช่นนั้น ข้าก็คงไม่มีความตั้งใจที่จะปฏิเสธ"
52050-246 = "ทว่า... นี่เป็นโอกาสดีสินะ จะเรียกว่าเป็นราคาที่ต้องจ่ายที่ข้าช่วยชีวิตเจ้าไว้ก็ได้ ข้าจะขอให้เจ้าช่วยอะไรหน่อยน่ะ"
52050-254 = "ม้วนสารอันนี้มัน..."
52050-255 = "นี่คือสารที่ข้าอยากบอกคนที่ตามหาข้า"
52050-256 = "ผู้รับก็คือครูจาก <ชาเล่ต์> และข้อความในนั้นก็เกี่ยวกับ..."
52050-260 = "วิธีช่วยชีวิตใครบางคน"
52050-265 = "เรื่องที่ฉันเจอมาก็มีเท่านี้ละ..."
52050-266 = "อย่างที่บอกไปว่านอกจากฉันจะช่วยอายาเมะไว้ไม่ได้ ฉันยังถูกอายาเมะปฏิเสธ และผลลัพธ์ก็คือ#nฉันอยู่ในสภาพที่ใช้แขนข้างขวาของตัวเองไม่ได้"
52050-267 = "เหตุผลที่ฉันเก็บเรื่องนี้เป็นความลับ... ก็เพราะฉันกลัวว่าถ้าความจริงปรากฏแล้วทุกคนจะผิดหวัง#nในตัวฉันและทิ้งฉันไป"
52050-268 = "แต่ตอนนี้ฉันจะไม่วิ่งหนีอีกต่อไปแล้วละ..."
52050-269 = "ทุกคนตำหนิฉันและเกลียดฉันกันตามที่รู้สึกได้เลย"
52050-275 = "ได้ยังไงกัน..."
52050-276 = "ข้าไม่มีทางตำหนิรุ่นพี่นางุสะด้วยเรื่องพรรค์นั้นหรอกเจ้าค่ะ!"
52050-280 = "ยะ... ยูคาริ...?"
52050-281 = "ท่ามกลางความสับสนที่เราเจอ มีเพียงรุ่นพี่นางุสะคนเดียวที่ออกไปถึงทุ่งหิมะใหญ่เพื่อตามหารุ่นพี่#nอายาเมะ..."
52050-282 = "แล้วจะให้เฮียกกะเรียวรันที่เหลือตำหนิรุ่นพี่ได้ยังไงกันล่ะเจ้าคะ?"
52050-283 = "นึกว่าจะโตขึ้นจากเรื่องครั้งก่อนแล้วเสียอีก รุ่นพี่ยังซื่อบื้อเหมือนเดิมเลยนะ"
52050-284 = "ถ้าจู่ๆ หัวหน้าอายาเมะที่อ่อนหวานและสดใสก็เปลี่ยนท่าทีไปเหมือนถูกบางอย่างเข้าสิง และจังหวะนั้นชมรมความงามของธรรมชาติก็โผล่มาโจมตีหัวหน้าพอดี..."
52050-285 = "งั้นนี่ต้องเป็นแผนทำลายเฮียกกะเรียวรันของชมรมความงามของธรรมชาติแน่นอน"
52050-286 = "ใช่เจ้าค่ะ ถ้ารุ่นพี่อายาเมะพูดอะไรแบบนั้นออกมา แสดงว่าต้องถูกผู้หญิงที่ไม่ดีคนนั้นหลอกเอาแน่ๆ เจ้าค่ะ"
52050-287 = "ใช่แล้ว จะมัวมาโทษตัวเองอยู่ทำไมกันล่ะ?"
52050-288 = "เราต้องไปทุ่งหิมะใหญ่แล้วช่วยหัวหน้าอายาเมะกลับมา แล้วก็หาแขนของจริงของรุ่นพี่นางุสะกันสิ!"
52050-289 = "เป็นความเห็นที่เอะคุ~ เซเลนโตะมากเจ้าค่ะ ข้าเห็นด้วยเจ้าค่ะ!"
52050-291 = "ตะ... แต่ว่า..."
52050-292 = "ทุ่งหิมะใหญ่ยังเป็นสถานที่ที่อันตราย ฉันจะให้เฮียกกะเรียวรันทุกคนจากที่นี่ไปเพราะฉันไม่ได้..."
52050-297 = "ขอโทษนะคะ เฮียกกะเรียวรันอยู่ที่นี่มั้ยคะ?"
52050-305 = "อ๊ะ โชคดีที่อยู่กันครบเลยนะคะ"
52050-306 = "เธอคือชมรมหยินหยางนี่... จู่ๆ มีธุระอะไรงั้นเหรอ?"
52050-307 = "ค่ะ ไม่ใช่เรื่องอะไรอื่นหรอกค่ะ"
52050-312 = "พอดีหัวหน้าชมรมหยินหยางมีเรื่องอยากขอร้องเฮียกกะเรียวรัน ก็เลยอยากพบพวกคุณทุกคนค่ะ"
52050-313 = "คุณนิยะน่ะเหรอ...?"
52050-315 = "ตอนต่อไป;เตรียมงานเทศกาล"

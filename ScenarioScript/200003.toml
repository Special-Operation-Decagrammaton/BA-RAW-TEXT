[translation]
200003-1 = "#title;제3화;기묘한 꿈"
200003-2 = "#wait;3500"
200003-3 = "#wait;1000"
200003-4 = "#na;\"이 이야기는 샬레의 선생님인 당신과, 당신의 스마트 워치에 관한 일을 다루고 있습니다.\""
200003-5 = "#na;\"당신은 그리 규칙적인 삶을 준수하는 사람이라고 할 수는 없지만, 그래도 제 시간에는 일어나기 위해 노력하는 편입니다.\""
200003-6 = "#na;\"그리고 테이블 옆에 놓인 스마트 워치는 당신의 기상을 돕는 유일무이한 파트너이지요.\""
200003-7 = "#st;[0,0];instant;1;"
200003-8 = "#clearST"
200003-9 = "#wait;2500"
200003-10 = "[ns1] \"아로나……?\"\n[ns2] \"싯딤의 상자가 어디로 갔지?\""
200003-11 = "#wait;100"
200003-12 = "#wait;100"
200003-13 = "#na;\"당신은 잠에 취했는지 가지고 있지도 않은 태블릿을 열심히 찾습니다. ……하지만 찾을 수 없을 겁니다.\""
200003-14 = "#na;\"왜냐하면 당신이 총학생회장으로부터 받은 전자기기는 '샤케드의 막대' 라고 불리는 스마트 워치 뿐이기 때문이지요.\""
200003-15 = "[s] 싯딤의 상자를 찾는다."
200003-16 = "#na;\"침실에서 무의미한 수색을 계속하지만 당신은 끝내 실패하고 맙니다.\""
200003-17 = "#na;\"당신은 생각합니다. 혹시 자신이 지난 밤 태블릿을 다른 곳에 두고 온 것은 아닌가— 하고 말이지요.\""
200003-18 = "#na;\"익숙한 손길로 손목 시계를 착용하고, 당신은 먼저 휴게실로 향합니다.\""
200003-19 = "#st;[0,0];instant;1;"
200003-20 = "#clearST"
200003-21 = "#wait;2000"
200003-22 = "#na;\"휴게실은 아직 불이 들어오지 않아 어둡습니다. 당신은 평소처럼 커피 머신을 예열한 뒤 에스프레소 한 잔을 내립니다.\""
200003-23 = "#na;\"커피 머신에서 값싼 로부스타 원두가 갈려 나가며 진한 에스프레소를 뽑아냅니다…… 향미도 거의 없고 쓴 맛이 강하지만 아침의 잠을 깨우기엔 제격인 커피입니다.\""
200003-24 = "#all;hide"
200003-25 = "#wait;1000"
200003-26 = "#wait;2500"
200003-27 = "#wait;3500"
200003-28 = "#wait;1000"
200003-29 = "#wait;1000"
200003-30 = "#na;\"조금이나마 정신을 차린 당신은 평소에 업무를 처리하는 집무실로 향합니다.\""
200003-31 = "#st;[0,0];instant;1;"
200003-32 = "#clearST"
200003-33 = "#wait;2000"
200003-34 = "#na;\"집무실에 도착한 당신은 또 다른 이변을 알아차립니다.\""
200003-35 = "#na;\"평소 이 시간이라면 이미 도착해 있을 당번 학생의 모습이 보이지 않습니다. 하지만 학생에 따라 지각하는 경우도 더러 있기에 당신은 그리 큰 신경을 쓰지 않습니다.\""
200003-36 = "#na;\"……커튼을 열기 전까지는 말이지요.\""
200003-37 = "#st;[0,0];instant;1;"
200003-38 = "#clearST"
200003-39 = "#wait;2000"
200003-40 = "#wait;1500"
200003-41 = "#all;hide"
200003-42 = "#wait;2500"
200003-43 = "[ns] \"어……?\""
200003-44 = "#na;\"창문을 연 당신은 세 번째 이변을 알아차립니다.\""
200003-45 = "#na;\"세상이 흑백으로 물들어 있습니다. 언제나 청량한 빛으로 반짝이던 키보토스의 풍경이 구름이 잔뜩 낀 날처럼 잿빛으로 물들어 있습니다.\""
200003-46 = "#na;\"단순히 날이 흐린 탓은 아닙니다. 언제나 따스한 빛을 발하던 가로등의 빛도 차가운 흰색으로 바뀌어 있고, 세상의 모든 색이 흑과 백으로만 표현되어 있습니다.\""
200003-47 = "#na;\"……거기에 더해 시내를 오가는 사람들의 모습도 전혀 보이질 않습니다.\""
200003-48 = "#na;\"마치 당신을 제외한 모든 것이 증발해 버린 것처럼—\""
200003-49 = "[ns] \"이 소리는 또 뭐지……?\""
200003-50 = "#na;\"계속되는 이변에 혼란스러워진 당신은 끝내 자신의 머릿속에 떠오르는 문장들까지 의심하기 시작합니다.\""
200003-51 = "#na;\"하지만 걱정하지 마세요. 이것 만큼은 이변이 아니니까요.\""
200003-52 = "#na;\"글을 쓸 때 쉬운 감정 묘사 때문에 1인칭으로 서술을 시작했다가 전개의 어려움 때문에 3인칭으로 서술을 바꾸는 일은 처음 글을 써보는 사람들에게 흔히 발생하는 일입니다.\""
200003-53 = "#st;[0,0];instant;1;"
200003-54 = "#clearST"
200003-55 = "#wait;2500"
200003-56 = "#na;\"……아마, 공감하기 어려운 화제였을지도 모릅니다.\""
200003-57 = "#na;\"당신은 옷을 챙겨 입고 황급히 병원으로 향합니다. 자신의 머리에 무슨 문제가 생겼는지 알기 위해서는 병원을 방문하는 것이 가장 좋은 방법이니까요.\""
200003-58 = "[ns] 총학생회 건물로 향한다."
200003-59 = "#na;\"……아마 다른 방법을 택할지도 모릅니다.\""
200003-60 = "#all;hide"
200003-61 = "#wait;3500"
200003-62 = "#na;\"총학생회 건물로 향하는 동안에도 주변의 풍경은 조금도 변하지 않았습니다.\""
200003-63 = "#na;\"창문 밖으로 보이는 키보토스의 풍경은 색을 잃어버린 것처럼 흑백으로 물들어 있습니다.\""
200003-64 = "#na;\"당신은 이와 비슷한 풍경을 마주한 적이 있습니다.\""
200003-65 = "#all;hide"
200003-66 = "#na;\"그 때는 눈이 아플 정도의 붉은색으로 물들었다는 점이 현재와 다르긴 하지만……\""
200003-67 = "#na;\"최소한 학생들은 남아있었습니다.\""
200003-68 = "#all;hide"
200003-69 = "#wait;3500"
200003-70 = "#wait;2500"
200003-71 = "#wait;2000"
200003-72 = "#wait;2000"
200003-73 = "#na;\"지금은 아닙니다.\""
200003-74 = "#all;hide"
200003-75 = "#na;\"총학생회 건물에 도착한 당신은 건물을 주의 깊게 살펴보지만 여전히 인기척은 느껴지지 않습니다.\""
200003-76 = "#na;\"언제나 깐깐하게 당신을 챙겨주던 안경 낀 행정관도, 명란맛 감자칩을 정말 좋아하는 분홍 머리의 임원도— 모두 보이지 않습니다.\""
200003-77 = "#na;\"……하지만 아직 확인하지 않은 장소가 한 곳 남아 있습니다.\""
200003-78 = "#na;\"당신은 무언가에 홀린 것처럼 계단을 올라 '그 장소'로 향합니다.\""
200003-79 = "#na;\"모든 것이 시작되었던 그 장소로.\""
200003-80 = "#all;hide"
200003-81 = "#wait;750"
200003-82 = "#wait;750"
200003-83 = "#wait;750"
200003-84 = "#wait;750"
200003-85 = "#all;hide"
200003-86 = "#wait;2000"
200003-87 = "#na;\"텅 빈 총학생회장 집무실 한 가운데에는 처음 보는 소녀가 앉아있습니다.\""
200003-88 = "#na;\"아니, 당신의 향수를 묘하게 자극하는 그리운 인상의 소녀가 앉아있습니다.\""
200003-89 = "[ns] \"지금 말하고 있는 게 거기 있는 너야?\""
200003-90 = "#na;\"그러하면서 동시에 그렇지 아니합니다.\""
200003-91 = "#na;\"이 세계는 소녀의 그리움이자 당신의 꿈.\""
200003-92 = "#na;\"당신이 소녀를 보는 것처럼 소녀도 당신을 봅니다.\""
200003-93 = "[ns] \"너는 누구지?\""

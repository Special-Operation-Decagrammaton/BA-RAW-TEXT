[translation]
200003-1 = "第3話;奇妙な夢"
200003-4 = "「これは――シャーレの先生である『あなた』と、『スマートウォッチ』に関する物語です」"
200003-5 = "「あなたは不規則な生活を送っていますが、#nそれでも早起きをしようと努力していました」"
200003-6 = "「サイドテーブルに置かれたスマートウォッチが、あなたの起床を手伝う唯一無二のアシスタントです」"
200003-10 = "[ns1] \"アロナ……？\"\n[ns2] \"シッテムの箱はどこ？\""
200003-13 = "「どうやら、あなたはまだ眠りの中にいるようです。#nなぜなら、見つかるはずのないタブレットを探しているのですから」"
200003-14 = "「……あなたが連邦生徒会長からもらった電子機器は、「シャーケードの杖」と呼ばれるスマートウォッチだけだというのに」"
200003-15 = "[s] シッテムの箱を探す。"
200003-16 = "「寝室を探し回りますが、見つからずに終わるでしょう」"
200003-17 = "「あなたは考えます。タブレットをどこかへ置いてきてしまったのではないかと」"
200003-18 = "「慣れた仕草でスマートウォッチをつけて、あなたは休憩室へと向かいます」"
200003-22 = "「まだ明かりのついていない休憩室の中で、#nあなたはいつも通りコーヒーマシンの電源を入れて、エスプレッソを一杯淹れました」"
200003-23 = "「豆を挽く音が響き、黒い液体がカップを満たしていきます。#n香りがほとんどない安物ですが、眠気覚ましにピッタリです」"
200003-30 = "「一息に飲み干して、あなたは執務室へと向かいます」"
200003-34 = "「執務室に着いたあなたは、別の異変に気づきました」"
200003-35 = "「普段ならいるはずの当番の生徒がいません。#nしかし、遅刻することもあるだろう、と大して気にも留めませんでした」"
200003-36 = "「……カーテンを開けるまでは」"
200003-43 = "[ns] \"え……？\""
200003-44 = "「ようやく第三の異変に気づきます」"
200003-45 = "「世界がモノクロになっていたのです。輝きに満ち、鮮やかな色で彩られていたキヴォトスから色が抜け落ち、灰色に染まっていました」"
200003-46 = "「曇り空ではありません。世界のすべてがモノトーンになっているのです」"
200003-47 = "「……そして、人の気配が全くありません」"
200003-48 = "「まるで、あなただけを残していなくなってしまったかのように」"
200003-49 = "[ns] \"この声は……なに？\""
200003-50 = "「数々の異変に混乱するあなたは、頭の中に浮かぶ言葉にすら疑問を抱くようになります」"
200003-51 = "「ですがご安心を。これだけは異変ではありません」"
200003-52 = "「物語を綴る時――感情描写の観点から一人称視点で書き始めたものの、物語の展開に行き詰まって三人称視点へ切り替えてしまう。#nそれは、初めて筆を執る人によく見られる現象です」"
200003-56 = "「……失礼。共感しづらい話題だったかもしれません」"
200003-57 = "「話を戻しましょう。あなたは上着を羽織って急いで病院へと向かいます。#n自分の身に何が起きているのか、明らかにしようとするでしょう」"
200003-58 = "[ns] 連邦生徒会のビルに向かう。"
200003-59 = "「……いえ、あなたは別の方法をとりました」"
200003-62 = "「連邦生徒会へ向かっている間も、周りの景色は変わりません」"
200003-63 = "「揺れる車内も、色を忘れてしまったかのようにモノクロに染まっています」"
200003-64 = "「あなたは……以前目にした光景を思い出しました」"
200003-66 = "「あの時、世界は鮮烈な赤に染まっていました。それでも――」"
200003-67 = "「生徒たちが共にいました」"
200003-73 = "「ですが――今は違います」"
200003-75 = "「連邦生徒会の建物に着いたあなたは隅々まで見て回るでしょう。#nしかし依然として人の気配はありません」"
200003-76 = "「小言を言いながらもあなたの面倒をみてくれたメガネの行政官も、#nいつも明太子味のポテトチップスを頬張っている桃色髪の役員も――誰もいません」"
200003-77 = "「……あなたは最後に「あの場所」へ向かいます」"
200003-78 = "「まるで何かに追い立てられるように階段を駆け上がりました」"
200003-79 = "「すべてが始まった、あの場所へ」"
200003-87 = "「連邦生徒会長の執務室。そこには、見知らぬ少女が――」"
200003-88 = "「いえ。どこか懐かしさを感じさせる少女が座っていました」"
200003-89 = "[ns] \"この声は……君なの？\""
200003-90 = "「はい。ですが同時に……いいえ、でもあります」"
200003-91 = "「この世界は少女の回顧であり、あなたの夢」"
200003-92 = "「あなたが少女を見ているように、少女もあなたを見ています」"
200003-93 = "[ns] \"君は誰？\""
200003-98 = "お会いできて嬉しいです、先生。"
200003-99 = "私はキヴォトスの――"
200003-109 = "[ns] \"ここは……。\""
200003-114 = "先生、大丈夫ですか！？"
200003-115 = "ずっとうなされていたので心配しました！"
200003-116 = "[s] \"夢……？\""
200003-117 = "推察。悪夢でも見たのでしょうか。"
200003-118 = "[s] \"ううん。悪夢ではなかったけど……。\""
200003-129 = "[ns] \"変な夢ではあったかな。\""
200003-130 = "悪夢でないのはなによりですが……。"
200003-131 = "定期的に健康診断を受けることをオススメします。睡眠障害には、様々な原因が潜んでいますから。"
200003-132 = "不規則な生活をしているからですよ！#nスーパーアロナちゃんには全部わかっているんですから！"
200003-133 = "これからは食事の時間にはお声がけしますね。ちゃんと食べてください！"
200003-134 = "[s] \"心配かけてごめんね。ありがとう。\""
200003-138 = "[ns] \"……「シャーケードの杖」って知ってる？\""
200003-139 = "……否定。私のメモリには記録されていません。"
200003-140 = "うーん……聞いたことがあるような……無いような……。"
200003-141 = "先生は一体どこで聞いたんですか？"
200003-142 = "[s] \"私もよく思い出せなくて……。\""
200003-146 = "[ns3] \"夢のことは後で考えるとして……。\"\n[ns4] \"ちょっと早いけど、今日の仕事を始めようか。\""
200003-149 = "まだ朝4時ですよ！？"
200003-150 = "推奨。健康のためにも、再び就寝することをおすすめします。"
200003-151 = "そうですよ！ベッドに戻ってください。"
200003-152 = "寝付けないなら、子守唄を歌いますから！"
200003-153 = "私たちに歌唱プラグインはありませんが……頑張ります。"
200003-159 = "次回;輝くトラペゾヘドロン"

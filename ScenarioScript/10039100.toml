[translation]
10039100-1 = "後日談;詠葉與孩子們"
10039100-2 = "偶像比賽的預選舞台"
10039100-4 = "這次會有什麼樣的偶像登場呢？"
10039100-5 = "服裝的品質好像都很不錯，真令人期待。"
10039100-6 = "聽說這次各組的歌唱實力都很厲害耶……"
10039100-11 = "呼……為什麼反而是我們在緊張呢。"
10039100-15 = "雖然我們沒有親自演出，#n但這次可以說是工程師部在三一的處女秀，會緊張也是理所當然的。"
10039100-16 = "唔嗯……不知道部長現在的狀態怎麼樣。#n希望他不會太緊張。"
10039100-21 = "啊，老師好。#n你也是來看表演的嗎？"
10039100-22 = "你好呀，老師！"
10039100-23 = "[s1]「你們好！」 \n[s2]「工程師部也來看表演了啊。」"
10039100-26 = "嗯，我們是來為部長加油的。"
10039100-30 = "[ns]「詠葉真的也參加了嗎？」"
10039100-31 = "哼哼哼！這次的偶像比賽，對我們來說可是個絕佳的宣傳機會呢！"
10039100-32 = "敬請期待部長的表演哦，老師。"
10039100-38 = "啊，好像要開始了……"
10039100-39 = "我這次就不多做說明了。請好好享受吧！"
10039100-43 = "（學生們接連在舞台上帶來了活力四射的演出，令人目不暇給）"
10039100-48 = "那麼，接下來登場的是～～！！"
10039100-52 = "來自千年科學學園的參賽者！"
10039100-58 = "以創新的發明聞名於奇普托斯，工程師部的白石詠葉同學～！！"
10039100-69 = "哦，那身服裝是……？"
10039100-70 = "並不是常見的偶像服裝呢。#n是想在比賽中展現傳統的感覺嗎……"
10039100-71 = "旁邊那台機器又是怎麼回事？#n是工程師部發明的歌唱輔助裝置嗎？"
10039100-72 = "可能吧。不知道他會帶來什麼樣的表演？"
10039100-77 = "那麼，表演即將開始～！！"
10039100-82 = "終於要開始了……！"
10039100-83 = "部長……加油……"
10039100-98 = "嗯……？"
10039100-99 = "這是……"
10039100-100 = "演，演歌？"
10039100-101 = "咦！？什，什麼情況？#n不是偶像表演嗎……？"
10039100-102 = "這是怎麼回事？？"
10039100-108 = "[ns]「這，這是……」"
10039100-114 = "音準跟節拍都完美無缺……！"
10039100-115 = "這首歌是部長的拿手曲目……#n就算要閉著眼睛唱完整首都沒問題，絕對不會出錯的！"
10039100-116 = "很好，響！#n現在該輪到我們展現熱情的應援了！！"
10039100-117 = "嗯！要全力為部長加油……！"
10039100-121 = "[ns]「先，先等一下……那個加油指的是……」"
10039100-122 = "這點就由我來說明吧！#n我們選擇的應援方式是……"
10039100-123 = "請好好看著吧，老師。#n如果老師也能享受部長的演出，相信他一定會很高興的。"
10039100-124 = "[s]「真的沒問題嗎！？」"
10039100-125 = "好，上吧……"
10039100-130 = "嗶──嗶嗶──"
10039100-134 = "鏡，鏡球！？有鏡球在轉動……！"
10039100-135 = "那個裝置……是卡拉OK裡常見的鏡球嗎！？"
10039100-136 = "但那不是普通的鏡球！#n它的光芒足以覆蓋整個舞台……！"
10039100-138 = "看來成功吸引了大家的注意力呢！"
10039100-140 = "沒想到能在偶像比賽中看到這樣的表演……"
10039100-141 = "實，實在太震撼了……演歌和卡拉OK……"
10039100-142 = "[s]「這樣真的好嗎……！對三一的學生會不會太刺激了！？」"
10039100-144 = "不，老師。你仔細看。"
10039100-149 = "……嗯？"
10039100-150 = "奇，奇怪？我的身體……"
10039100-151 = "怎麼在自己跟著節奏打拍子……？"
10039100-152 = "我的頭也莫名點了起來……"
10039100-153 = "而且這些歌詞也和當今流行的音樂很不一樣……"
10039100-154 = "不知為何……讓人有點沉醉於悲戚的情感之中……"
10039100-155 = "[s3]「這，這是……」\n[s4]「成功了！？」"
10039100-159 = "呵呵，從選擇曲風的那一刻就已經預示了結果！#n對文雅嫻淑的三一學生來說，這絕對是相當新鮮的衝擊！"
10039100-160 = "而且部長的歌唱實力，從客觀角度來看也相當出色。#n已經達到能在聲音中傳達情感的境界了！"
10039100-161 = "好，快到歌曲的高潮了……！#n第二次衝擊，啟動！"
10039100-172 = "哇啊！！這是……"
10039100-173 = "什，什麼東西？是舞台裝置嗎？？"
10039100-174 = "華麗歸華麗，但為什麼感覺很熱……！"
10039100-176 = "這就由我來說明吧！#n要想在昏暗的舞台上讓人留下深刻印象的話，火焰的鮮明度跟亮度都非常重要！#n至於其中的祕訣就是……在普通的噴火裝置裡，加入適量的凝固汽油彈……"
10039100-177 = "[s]「不會有危險吧！？」"
10039100-178 = "放心吧，老師。#n我們極力縮短了燃燒時間，所以不用擔心火焰會觸碰到人。"
10039100-179 = "[s]「那，那就好……」"
10039100-180 = "而且我們還準備了另一個裝置以防萬一。"
10039100-181 = "剛好要進入副歌了，那麼……"
10039100-185 = "就是現在！"
10039100-196 = "嗯？這是……雨……嗎？"
10039100-197 = "室內竟然下雨了！？"
10039100-199 = "天花板附近的灑水器無人機會在接收到信號後噴出水，#n在降低室溫的同時，營造出下雨的效果……"
10039100-200 = "這時歌詞也會正好唱到有關雨的部分！"
10039100-202 = "這也是舞台效果的一部分嗎……？"
10039100-203 = "流逝的愛情化作雨滴……過去的苦澀回憶……"
10039100-207 = "這不是雨……是淚水……？"
10039100-209 = "一開始確實讓人有些驚訝……#n但從中段開始就不由自主地沉浸其中，後段甚至還流下淚來……"
10039100-210 = "啊啊……竟然會有這樣的表演……"
10039100-215 = "謝謝大家。"
10039100-220 = "白石詠葉選手的演出到此為止～！請大家給予熱烈的掌聲！！"
10039100-229 = "[ns5]「反應比想像中……」 \n[ns6]「要來得好！」"
10039100-233 = "大約一半一半吧。"
10039100-234 = "要讓所有人滿意果然是很困難的。"
10039100-239 = "[ns7]「觀眾們的騷動聲……」\n[ns8]「看來也有和期待中不同的反應啊……」"
10039100-242 = "嗯！無論如何我們都已經盡力了。#n部長唱得也比練習時更好。"
10039100-243 = "沒錯，我們已經把能做的事都做了，所以沒有遺憾。"
10039100-245 = "（不久後，預選的結果公佈了）"
10039100-248 = "（工程師部雖然獲得了不錯的人氣，只可惜沒能進入決賽）"
10039100-252 = "[ns]「……」"
10039100-253 = "……"
10039100-254 = "呵呵，這樣也好。"
10039100-255 = "是啊。"
10039100-256 = "[s]「嗯？」"
10039100-257 = "畢竟我們就只準備了一首歌。"
10039100-258 = "如果進入決賽後還是表演同樣的曲目，衝擊力就會大打折扣了。"
10039100-259 = "而且面對決賽更大的舞台，自然也需要在舞台裝置做出更多變化……#n但我們的材料和設備都已經不夠了！"
10039100-260 = "呵呵，結果並不重要。"
10039100-261 = "因為今天，我們已經在三一學園展示了演歌的魅力。"
10039100-262 = "同時也打響了千年工師程部的名號。"
10039100-266 = "[ns]「大家……」"
10039100-268 = "[ns]「這樣就心滿意足了嗎？」"
10039100-272 = "要說完全沒有遺憾是騙人的。"
10039100-274 = "但我認為這是個相當愉快的經驗。對吧？"
10039100-276 = "沒錯！這是無法在其他地方獲得的經驗。#n雖然我很擅長說明，但這跟站在舞台上唱歌完全是兩回事。#n所以多虧了部長，我才能感覺自己彷彿也站在了舞台上。"
10039100-277 = "我也很開心。因為能真實地感受到觀眾的反應。"
10039100-278 = "[s9]「那就好。」\n[s10]「大家都辛苦了。我為你們感到驕傲。」"
10039100-281 = "呵呵，接下來可以更輕鬆地享受這場慶典了呢……"
10039100-287 = "老師不介意的話，跟我們一起去逛逛吧？"
10039100-289 = "（事後才得知，三一學園在狂歡節過後成立了一個演歌同好會……）"

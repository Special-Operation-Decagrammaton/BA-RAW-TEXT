[translation]
10039100-1 = "ย้อนวันวาน;อุทาฮะและผองเพื่อน"
10039100-2 = "เวทีประกวดไอดอลรอบคัดเลือก"
10039100-4 = "วงต่อไปจะเป็นไอดอลในคอนเซ็ปต์ไหนนะ?"
10039100-5 = "ชุดสวยมากเลย อยากรู้แล้วจังค่ะว่าจะร้องเพลงและก็เต้นแบบไหน"
10039100-6 = "ได้ยินว่าทุกคนในวงร้องเพลงเพราะมากเลยด้วย..."
10039100-11 = "ฮู่ว... ทำไมพวกเราถึงประหม่านะ"
10039100-15 = "ถึงพวกเราจะไม่ได้ขึ้นไปทำการแสดงบนเวทีกัน แต่นี่ก็ถือเป็นการแสดงเดบิวต์ของชมรมวิศวกรรม จะประหม่าก็ไม่แปลกหรอกค่ะ"
10039100-16 = "อือ... หัวหน้าจะเป็นยังไงบ้างนะ จะตื่นเต้นไม่ได้นะ"
10039100-21 = "อ๊ะ คุณครู สวัสดีคุณครู มาดูการแสดงเหรอ?"
10039100-22 = "สวัสดีค่ะคุณครู!"
10039100-23 = "[s1] \"สวัสดี ชมรมวิศวกรรมก็อยู่ที่นี่สินะ!\"\n[s2] \"ชมรมวิศวกรรมก็มาดูการแสดงด้วยสินะ\""
10039100-26 = "อื้อ เรามาเชียร์หัวหน้าน่ะ"
10039100-30 = "[ns] \"อุทาฮะก็มาประกวดด้วยเหรอ?\""
10039100-31 = "ฮุฮุฮุ! การประกวดไอดอลครั้งนี้เป็นอีกโอกาสของพวกเราเลยค่ะ!"
10039100-32 = "ตั้งตารอการแสดงของหัวหน้าด้วยนะคุณครู"
10039100-38 = "อ๊ะ เริ่มแล้วสินะ..."
10039100-39 = "ถ้างั้นก็คงไม่ต้องอธิบายอะไรเพิ่มเติมแล้วค่ะ ขอให้สนุกกับบทเพลงนะคะ!"
10039100-43 = "(คุณครูได้ดูการแสดงของเหล่านักเรียนที่เต็มไปด้วยแพชชั่น)"
10039100-48 = "เอาละ คิวต่อไป~~!!"
10039100-52 = "ต่อไปเป็นการแสดงจากโรงเรียนวิทย์มิลเลเนียมครับ!"
10039100-58 = "จากชมรมวิศวกรรมที่มีชื่อเสียงเรื่องสิ่งประดิษฐ์อันน่าทึ่ง คุณชิราอิชิ อุทาฮะครับ~!!"
10039100-69 = "ตายจริง ชุดนั่นมัน...?"
10039100-70 = "ไม่ใช่ชุดไอดอลทั่วไปนี่คะ มันให้ความรู้สึกโบราณเกินกว่าจะมาเป็นชุดในการประกวดไอดอลนะ..."
10039100-71 = "แล้วเครื่องข้างๆ นั่นคืออะไรเหรอคะ? ใช่อุปกรณ์ช่วยร้องเพลงที่ชมรมวิศวกรรมประดิษฐ์ขึ้นหรือเปล่า#nคะ?"
10039100-72 = "ไม่รู้สิคะ อยากรู้จังเลยนะคะว่าออกมาเป็นยังไง"
10039100-77 = "ถ้างั้นก็ เริ่มได้เลยครับ~!!"
10039100-82 = "ในที่สุดก็เริ่มแล้วสินะคะ...!"
10039100-83 = "หัวหน้า... สู้เค้านะ..."
10039100-98 = "หืม...?"
10039100-99 = "นี่มัน...?"
10039100-100 = "พะ... เพลงเอ็นกะ?"
10039100-101 = "เอ๋?! อะ... อะไรกันเนี่ย? ไม่ได้ร้องเพลงของไอดอลหรอกเหรอ...?"
10039100-102 = "หาาาา??"
10039100-108 = "[ns] \"นะ... นี่มัน...\""
10039100-114 = "ทั้งโน้ต ทั้งจังหวะ สมบูรณ์แบบเลย...!"
10039100-115 = "นี่คือเพลงหมายเลข 18 ในคาราโอเกะของหัวหน้า... ต่อให้หลับตาร้องก็ไม่มีทางพลาดค่ะ!"
10039100-116 = "ดีละ ฮิบิกิ! ตอนนี้ก็เหลือแค่การให้กำลังใจอันร้อนแรงจากพวกเราแล้วละค่ะ!!"
10039100-117 = "อื้อ! เราจะซัพพอร์ตหัวหน้าทั้งกายและใจเลย...!"
10039100-121 = "[ns] \"ดะ... เดี๋ยวก่อน... การซัพพอร์ตที่ว่าคือ...\""
10039100-122 = "ฉันจะอธิบายในส่วนนี้เองค่ะ! วิธีให้กำลังใจของพวกเราก็คือ..."
10039100-123 = "ช่วยตั้งตาดูด้วยนะ คุณครู ถ้าคุณครูสนุกกับการแสดงของหัวหน้า หัวหน้าจะต้องดีใจมากๆ แน่ๆ"
10039100-124 = "[s] \"จะไม่มีอะไรใช่มั้ย?!\""
10039100-125 = "เอาละ ไปกันเลย..."
10039100-130 = "ติ๊ด ติ๊ดดด..."
10039100-134 = "ฟะ... ไฟดิสโก้?! มีไฟดิสโก้ด้วยค่ะ...!"
10039100-135 = "อุปกรณ์ที่อยู่ตรงนั้น... คือไฟดิสโก้ที่ห้ามเปิดในคาราโอเกะงั้นเหรอคะ?!"
10039100-136 = "แต่มันไม่ใช่ไฟดิสโก้ธรรมดาๆ นะคะ! มันเปิดไฟส่องทั่วฮอลล์การแสดงเลยค่ะ...!"
10039100-138 = "ดึงดูดสายตาของผู้ชมได้แล้วค่ะ!"
10039100-140 = "มะ... ไม่คิดเลยนะว่าจะได้เห็นการแสดงแบบนี้ในงานประกวดไอดอลน่ะ...!"
10039100-141 = "คะ... คาดไม่ถึงเลย... ทั้งเพลงเอ็นกะ ทั้งคาราโอเกะ..."
10039100-142 = "[s] \"แบบนี้จะโอเคเหรอ...! เด็กทรีนิตี้เหมือนจะอยู่ไม่สุขเลยนะ!\""
10039100-144 = "ไม่ใช่อย่างนั้นหรอก คุณครู ลองดูให้ดีสิ"
10039100-149 = "หืม?"
10039100-150 = "อะ... อะไรน่ะ? ทำไมฉัน..."
10039100-151 = "กระทืบเท้าตามจังหวะเพลงอย่างไม่รู้ตัวเลย...?"
10039100-152 = "ฉันก็พยักหน้าตามด้วยค่ะ..."
10039100-153 = "แล้วเนื้อเพลงก็ให้ความรู้สึกที่แตกต่างจากเพลงในปัจจุบันมากเลย..."
10039100-154 = "ความรู้สึกเศร้านี้... ทำให้ฝนตกในใจของฉันเลยค่ะ"
10039100-155 = "[s3] \"คนดูอินกันถึงขนาดนี้เลย...\"\n[s4] \"ได้ผลดีเลยแฮะ?!\""
10039100-159 = "ฮุฮุ ผลลัพธ์นี้เห็นได้ตั้งแต่ตอนเลือกเพลงแล้วค่ะ! นี่คงทำให้นักเรียนหัวสมัยใหม่ของทรีนิตี้ตกใจได้#nไม่น้อยเลยละค่ะ!"
10039100-160 = "นอกจากนี้ หัวหน้ายังร้องเพลงได้ดีด้วยค่ะ นี่ฉันไม่ได้พูดเข้าข้างนะคะ แต่เสียงของหัวหน้าสื่ออารมณ์#nเพลงได้อย่างดีเลยค่ะ!"
10039100-161 = "ดีละ ใกล้จะถึงไคลแม็กซ์แล้ว...! เปิดอิมแพ็กครั้งที่ 2 ได้!"
10039100-172 = "อ๊าย!! นะ... นี่มัน..."
10039100-173 = "อะไรกันน่ะ? เอฟเฟกต์บนเวทีเหรอ??"
10039100-174 = "มะ... มันก็ดูหวือหวาดี แต่ก็แอบร้อนอยู่นะคะ...! "
10039100-176 = "ฉันจะอธิบายสิ่งนี้ให้เองค่ะ! โดยทั่วไปแล้ว ความคมชัดและความสว่างของดอกไม้ไฟจะให้อิมแพ็กเป็น#nอย่างมากในเวทีที่มืดๆ ค่ะ และเคล็ดลับของเราก็คือ... การผสมระเบิดนาปาล์มในปริมาณที่พอเหมาะ ในเครื่องยิงดอกไม้ไฟทั่วไปค่ะ"
10039100-177 = "[s] \"ไม่อันตรายเหรอ?!\""
10039100-178 = "วางใจได้เลยคุณครู เราลดเวลาเผาไหม้ลงไปเยอะมาก เพราะงั้นไม่ต้องกลัวว่าดอกไม้ไฟจะไปถึงคนดู#nหรอก"
10039100-179 = "[s] \"ถะ... ถ้างั้นก็โล่งอกไปที...\""
10039100-180 = "แล้วเราก็เตรียมอุปกรณ์อีกชิ้นเผื่อไว้ด้วย"
10039100-181 = "ตอนนี้ก็ใกล้จะถึงท่อนฮุคแล้ว ถือว่าเป็นจังหวะที่ดีเลย เอาละ..."
10039100-185 = "ตอนนี้ละ!"
10039100-196 = "หืม? นี่มัน... ฝน... เหรอคะ?"
10039100-197 = "ฝนตกในอาคารเหรอ?!"
10039100-199 = "โดรนฉีดน้ำที่อยู่บนเพดานจะโปรยน้ำลงมาตามสัญญาณ เป็นการลดอุณหภูมิที่เกิดจากระเบิดนาปาล์ม และทำให้คนดูรู้สึกว่าฝนตกลงมา..."
10039100-200 = "ดีละ เนื้อเพลงกำลังพูดถึงฝนพอดี!"
10039100-202 = "นี่คือส่วนหนึ่งของเอฟเฟกต์บนเวทีเหรอคะ...?"
10039100-203 = "สายฝนแห่งความรักโปรยปรายลงมา... ทำให้นึกถึงความทรงจำที่เลือนลางในอดีต..."
10039100-207 = "นี่ไม่ใช่ฝน... แต่เป็นน้ำตาเหรอ...?"
10039100-209 = "ในช่วงแรกฉันสับสน แต่กลางๆ เพลงฉันก็สนุกไปโดยไม่รู้ตัว... ส่วนตอนท้ายของเพลง ฉันก็ร้องไห้โดยไม่รู้ตัวอีก..."
10039100-210 = "อ่า... การแสดงนี้มันช่าง..."
10039100-215 = "ขอบคุณค่ะ"
10039100-220 = "และการแสดงของชิราอิชิ อุทาฮะก็จบลงเพียงเท่านี้~! ขอเสียงปรบมือดังๆ ให้เธอด้วยครับ!!"
10039100-229 = "[ns5] \"ออกมาดีกว่าที่คิดนะเนี่ย คนดูก็ชอบด้วย...\"\n[ns6] \"คนดูชอบกันมากกว่าที่คิดนะ!\""
10039100-233 = "น่าจะประมาณครึ่งหนึ่งนะ"
10039100-234 = "จะทำให้ทั้งฮอลล์พอใจคงเป็นไปไม่ได้หรอก"
10039100-239 = "[ns7] \"ผู้ชมส่งเสียงเชียร์กันใหญ่เลย...\"\n[ns8] \"มีคนบอกว่าต่างจากที่คาดหวังไว้ด้วยนะ...\""
10039100-242 = "อื้อ! พวกเราก็ทำเต็มที่แล้วค่ะ ส่วนหัวหน้าก็ร้องเพลงได้ดีกว่าตอนซ้อมด้วยค่ะ"
10039100-243 = "ใช่ เราทำในส่วนของพวกเราแล้ว ไม่มีอะไรให้เสียใจเลยละ"
10039100-245 = "(แล้วก็ถึงเวลาประกาศผลรอบคัดเลือก)"
10039100-248 = "(ชมรมวิศวกรรมได้เสียงเชียร์จากผู้ชมอย่างล้นหลาม แต่ก็น่าเสียดายที่ไปไม่ถึงรอบชิงชนะเลิศ)"
10039100-252 = "[ns] \"...\""
10039100-253 = "..."
10039100-254 = "ฮุฮุ แต่ก็โล่งอกไปทีนะ"
10039100-255 = "นั่นน่ะสิ"
10039100-256 = "[s] \"หืม?\""
10039100-257 = "ฉันเตรียมเพลงไว้เพลงเดียวน่ะ"
10039100-258 = "ถ้าผ่านเข้ารอบชิงชนะเลิศ ฉันก็คงต้องร้องเพลงเดิม แบบนั้นคงทำให้ผู้ชมประทับใจไม่ได้มากหรอก"
10039100-259 = "และเวทีรอบชิงชนะเลิศก็กว้างมาก เราคงจัดวางอุปกรณ์ต่างๆ ให้ครอบคลุมทั้งพื้นที่ไม่ได้หรอกค่ะ!"
10039100-260 = "ฮุฮุ ผลลัพธ์ไม่สำคัญหรอก"
10039100-261 = "วันนี้ฉันแค่อยากให้ชาวทรีนิตี้ได้เห็นความยอดเยี่ยมของเพลงเอ็นกะน่ะ"
10039100-262 = "ชมรมวิศวกรรมแห่งมิลเลเนียมก็คงเป็นที่รู้จักมากขึ้นด้วย"
10039100-266 = "[ns] \"เป็นอย่างนี้เองสินะ แค่นี้ก็ได้เหรอ?\""
10039100-268 = "[ns] \"แค่นี้ทุกคนก็พอใจแล้วเหรอ?\""
10039100-272 = "ก็นะ ถ้าจะบอกว่าไม่เสียดายก็คงเป็นการโกหกกัน"
10039100-274 = "แต่ฉันก็คิดว่าเป็นประสบการณ์ที่สนุกเลยละ ว่ามั้ยทุกคน?"
10039100-276 = "แน่นอนอยู่แล้ว! ประสบการณ์แบบนี้หาจากที่ไหนไม่ได้แล้วค่ะ ฉันน่ะมั่นใจในการพูดอธิบายก็จริง แต่การขึ้นไปร้องเพลงบนเวทีก็เป็นเรื่องยากสำหรับฉันอยู่ดีค่ะ แต่นี่ก็ทำให้ฉันรู้สึกเหมือนได้ไปอยู่บนเวที กับหัวหน้าเลยค่ะ!"
10039100-277 = "ฉันก็สนุกเหมือนกัน ฉันรับรู้ถึงเสียงตอบรับจากผู้ชมได้อย่างชัดเจนเลยละ"
10039100-278 = "[s9] \"ถ้างั้นก็ดีแล้วละ\"\n[s10] \"เก่งมาก ครูภูมิใจในตัวทุกคนเลยนะ\""
10039100-281 = "ฮุฮุ จากนี้เราก็มาสนุกกับงานเทศกาลแบบไม่ต้องกดดันกันดีกว่า..."
10039100-287 = "ไปด้วยกันมั้ยคะคุณครู?"
10039100-289 = "(เมื่อจบงานคาร์นิวัล คุณครูก็ได้รู้ว่ามีการตั้งชมรมเพลงเอ็นกะในทรีนิตี้ด้วย...)"

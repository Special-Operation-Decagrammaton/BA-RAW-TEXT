[translation]
10039100-1 = "Afterword;Utaha and the Kids"
10039100-2 = "Pop Idol Contest — Preliminary Stage"
10039100-4 = "What kind of idols are we going to see this time?"
10039100-5 = "The costumes are all amazing. Can't wait to see the next one."
10039100-6 = "Supposedly, this next group can really sing."
10039100-11 = "Phew... Why do I feel so nervous?"
10039100-15 = "We're all nervous. Of course we are. We're not on stage, but our department's pride is."
10039100-16 = "Yeah... I wonder how the president's feeling. I hope she's keeping it together."
10039100-21 = "Oh hi, Sensei. Are you here for the performances?"
10039100-22 = "Hi, Sensei!"
10039100-23 = "[s1] \"Hello!\"\n[s2] \"I see the Engineering Department's here too.\""
10039100-26 = "That's right. We've come to cheer on the president."
10039100-30 = "[ns] \"Oh, Utaha is in the show?\""
10039100-31 = "Heehee! Let's put it this way: the show gave us a new opportunity."
10039100-32 = "Hope you'll cheer her on with us, Sensei!"
10039100-38 = "Ah, the next group's starting now..."
10039100-39 = "No time for any more explanation, then. Let's watch!"
10039100-43 = "Several more student groups put on passionate performances, each one of them mesmerizing."
10039100-48 = "And now, our next performer..."
10039100-52 = "...from Millennium Science School!"
10039100-58 = "This is Shiraishi Utaha, from the Engineering Department. They're known for their brilliant inventions!"
10039100-69 = "Oh, look at that costume."
10039100-70 = "Not exactly \"pop.\" It looks more traditional."
10039100-71 = "What's that machine next to her. She said she was an engineer. Maybe it's an auto-tuner or something?"
10039100-72 = "Yeah, maybe. Let's see what she does here..."
10039100-77 = "Annnd...take it away!"
10039100-82 = "It's finally happening...!"
10039100-83 = "President... You can do this..."
10039100-98 = "Huh...?"
10039100-99 = "I was right about the costume..."
10039100-100 = "E-Enka?"
10039100-101 = "Did she sign up for the wrong contest, or what?"
10039100-102 = "Yeah, ummm..."
10039100-108 = "[ns] \"Um, well...\""
10039100-114 = "She's hitting every note, right on the beat!"
10039100-115 = "It's her favorite song. She nails it every time in karaoke, even with her eyes closed!"
10039100-116 = "All right, Hibiki, we're on! Time for a little fire support!"
10039100-117 = "Let's give it all we got, for our president!"
10039100-121 = "[ns] \"Wait, did you say 'fire support'?\""
10039100-122 = "I'll explain that. We have a special way to cheer for her."
10039100-123 = "For now, Sensei, just sit back and watch. Hope you enjoy it!"
10039100-124 = "[s] \"This isn't going to be dangerous, is it?\""
10039100-125 = "Here we go..."
10039100-130 = "Sha-shing!"
10039100-134 = "A mirror ball? A spinning mirror ball..."
10039100-135 = "Like at a karaoke bar?"
10039100-136 = "Yeah, but like a hundred times brighter!"
10039100-138 = "Well, we've got their attention!"
10039100-140 = "This is NOT what I thought I was going to see here."
10039100-141 = "No kidding. Enka and karaoke..."
10039100-142 = "[s] \"I'm not sure how the students are taking this...\""
10039100-144 = "It's all right, Sensei. Look closer."
10039100-149 = "...Huh?"
10039100-150 = "Wh-What's this? My body..."
10039100-151 = "I've been tapping my feet to the rhythm without even realizing it..."
10039100-152 = "For some reason, I'm nodding my head..."
10039100-153 = "You know, these lyrics have a whole different vibe from what you hear today."
10039100-154 = "Yeah, the sadness is hitting me right in the heart somehow..."
10039100-155 = "[s3] \"Um...\"\n[s4] \"It worked?!\""
10039100-159 = "Ha, I knew what was happening right when I saw the genre! It must be quite a shock for the cultured students of Trinity!"
10039100-160 = "Not only that, but the president can definitely sing. She carries those emotions in her voice so well!"
10039100-161 = "Okay, here comes the climax... Second Impact, activate!"
10039100-172 = "Ahh!! Those are..."
10039100-173 = "Pyrotechnics?!"
10039100-174 = "They're fancy, all right, but I can feel the heat... "
10039100-176 = "So let me explain. It's a dark stage, so we want all the bursts at the optimal luminosity, for maximum brightness and clarity! The secret is to mix in just the right amount of napalm."
10039100-177 = "[s] \"Isn't that dangerous?!\""
10039100-178 = "Don't worry, Sensei. I've drastically reduced the combustion time, so the flames will burn out long before they touch anyone."
10039100-179 = "[s] \"I-I'm glad to hear that, but...\""
10039100-180 = "Also, the next effect doubles as a fail-safe."
10039100-181 = "On that note, the chorus is coming up, so..."
10039100-185 = "Now!"
10039100-196 = "Huh? Is this...rain...?"
10039100-197 = "Indoors?!"
10039100-199 = "See, the heat from the napalm rises, and that triggers the heat sensors on the sprinkler drones."
10039100-200 = "Plus, the lyrics happen to be about flowing rain!"
10039100-202 = "More special effects...?"
10039100-203 = "Raindrops flowing with fleeting love... Bittersweet memories of the past..."
10039100-207 = "Wait, is this rain, or are these tears?"
10039100-209 = "At first, I was taken aback, but then I started enjoying it...and now, I'm tearing up..."
10039100-210 = "I...can't believe this amazing performance..."
10039100-215 = "Thank you."
10039100-220 = "Shiraishi Utaha, everyone! Please give her a big round of applause!!"
10039100-229 = "[ns5] \"That's quite a reaction.\"\n[ns6] \"Better than I expected!\""
10039100-233 = "From about half the audience, at least."
10039100-234 = "I guess you can't please everyone."
10039100-239 = "[ns7] \"I do hear some murmuring in the audience.\"\n[ns8] \"Some of them were probably expecting something else...\""
10039100-242 = "Well, in any case, we did our best. And the president sang even better than she did in practice."
10039100-243 = "That's right. We've done all we can. No regrets."
10039100-245 = "Time passed, and the preliminary results were announced."
10039100-248 = "The Engineering Department received a high reaction score, but unfortunately failed to advance to the finals."
10039100-252 = "[ns] \"...\""
10039100-253 = "Hm..."
10039100-254 = "Well, that's a relief."
10039100-255 = "It is, isn't it?"
10039100-256 = "[s] \"Hm?\""
10039100-257 = "We only prepared the one song."
10039100-258 = "If we'd advanced to the finals, we would've just had to do a rehash, and that wouldn't have had the same impact."
10039100-259 = "Plus the main stage is bigger, so we'd need bigger effects, and we don't have the materials for those."
10039100-260 = "You know, it doesn't matter what score we got."
10039100-261 = "Today, we showed everyone in Trinity the awesomeness of Enka."
10039100-262 = "And we got some great publicity for the Millennium Engineering Department."
10039100-266 = "[ns] \"So if you don't mind me asking, everyone...\""
10039100-268 = "[ns] \"...you're all satisfied with how it worked out?\""
10039100-272 = "Well, I'd be lying if I said I wasn't a LITTLE disappointed."
10039100-274 = "But I think it was still quite a pleasant experience. Don't you?"
10039100-276 = "Of course! More than pleasant, it was unique. I can explain things verbally, but conveying them through song, that's on a whole different level. And with everything I did to pitch in, it felt like I was up there with you!"
10039100-277 = "I had fun, too. I could feel the audience's reactions."
10039100-278 = "[s9] \"That's a relief.\"\n[s10] \"Everyone worked hard. I'm proud of you all.\""
10039100-281 = "Well, now we can go out and enjoy the rest of the Carnival."
10039100-287 = "Would you like to join us, Sensei?"
10039100-289 = "I found out later that, after the Carnival, some of the Trinity students established an Enka club."

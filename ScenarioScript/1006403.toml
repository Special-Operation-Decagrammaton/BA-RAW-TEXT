[translation]
1006403-1 = "新年的鐘聲"
1006403-4 = "啊，老師，幸好你來了。"
1006403-5 = "[s]「抱歉我來晚了，火車誤點所以就……」"
1006403-6 = "沒關係，我沒有等很久。"
1006403-7 = "而且時間也還很夠，沒事的。"
1006403-8 = "你問目的地有多遠……？"
1006403-9 = "從市區搭到下町的小車站要花1個多小時……"
1006403-10 = "回來可能會有點晚，#n不過今天有臨時加開的列車所以不用擔心。"
1006403-11 = "那我們就出發吧。"
1006403-16 = "（1小時後……）"
1006403-17 = "哈啊，哈啊……比我聽說的還遠……"
1006403-18 = "抱歉，老師。#n配合我的速度會害你更累的吧？"
1006403-19 = "穿和服爬山實在有點困難……"
1006403-20 = "[s]「沒關係，小心別受傷囉。」"
1006403-21 = "不過幸好有趕上。#n我想差不多到能聽見鐘聲的時候了……"
1006403-25 = "……咦？為什麼沒人呢？"
1006403-26 = "難道兩位是來看除夕撞鐘的嗎……？"
1006403-27 = "嗯，不過好像沒看到其他客人……"
1006403-28 = "今年因為鐘樓修繕的關係所以取消了……"
1006403-29 = "由於來訪的幾乎都是本地人，所以只通知了附近的居民……"
1006403-30 = "很抱歉讓兩位白跑一趟……"
1006403-31 = "怎麼會……本來想在這裡聽著鐘聲迎接新年的說……"
1006403-32 = "[s1]「這也沒辦法。」\n[s2]「明年還可以來的哦。」"
1006403-33 = "嗯……"
1006403-34 = "嗯……"
1006403-37 = "……末班車已經開走了！？"
1006403-38 = "去年這個時間應該還有車吧……"
1006403-39 = "是的……不過乘客幾乎都是為了寺廟而來，#n所以今年隨著撞鐘活動的取消，也就沒有加開班次了。"
1006403-40 = "很抱歉，要請兩位等明天的首班車了。"
1006403-44 = "唔，屋漏偏逢連夜雨……"
1006403-45 = "抱歉，老師。#n沒想到事情會變成這樣……"
1006403-46 = "要是我有事先做好調查就好了……"
1006403-47 = "[s]「我也該道歉。要是我沒有遲到的話應該就能回去了……」"
1006403-48 = "不過，該怎麼辦呢？#n這附近沒有飯店跟商店……"
1006403-49 = "[s3]「只能聽站務員說的……」\n[s4]「在候車室等首班車吧。」"
1006403-50 = "……嗯，也沒剩多少小時了。"
1006403-51 = "……嗯，也沒剩多少小時了。"
1006403-56 = "唔嗯……"
1006403-57 = "[s]「佳世子，你會不會冷？」"
1006403-58 = "我沒事，我有做好防寒對策。"
1006403-59 = "老師你呢？會冷嗎？"
1006403-60 = "[s5]「嗯，今天好像比較暖和。」\n[s6]「我也不會冷。」"
1006403-61 = "……這樣啊。"
1006403-62 = "……這樣啊。"
1006403-66 = "……要是有帶音箱來就好了。"
1006403-67 = "平時周圍總是吵吵鬧鬧的……有點不習慣這種沉默的氣氛。"
1006403-68 = "[s]「這麼說來，佳世子常常在聽音樂呢。」"
1006403-70 = "[ns]「你是什麼時候喜歡上音樂的呢？」"
1006403-71 = "嗯……應該是加入便利屋之前吧……"
1006403-72 = "當時我也被一群吵鬧的人包圍著。"
1006403-73 = "我並不喜歡那樣，所以當時為了逃避現實、摀住耳朵才會開始聽音樂的吧。"
1006403-74 = "但是，便利屋的吵吵鬧鬧……我並不討厭。"
1006403-75 = "呵呵……和以前比起來，聽音樂的時間也減少了呢。"
1006403-77 = "（就這樣，在電車抵達之前，聽佳世子說著在便利屋的點點滴滴）"
1006403-79 = "……已經這個時間了啊。"
1006403-80 = "和老師聊天的時光真是轉瞬即逝。"
1006403-84 = "嗯？鐘聲……？"
1006403-87 = "― 馬上就到首班車的時間了呢。[wa:1740] "
1006403-90 = "― 雖然不是本來期待聽到的聲音……[wa:2400] "
1006403-92 = "― 不過這個也不錯。"
1006403-95 = "― 和一年一度的除夕鐘聲不同，[wa:1800] "
1006403-97 = "― 這雖然只是每天早上都會響起的平凡鐘聲……[wa:3210] "
1006403-100 = "― 但是新年，[wa:1320] "
1006403-102 = "― 也不過是日復一日中的一天而已。"
1006403-105 = "― 在今天這個日子聽見的鐘聲，[wa:710] "
1006403-107 = "― 這或許也不錯。"
1006403-110 = "― 希望今年也是美好的一年。[wa:1360] "
1006403-112 = "― 新年快樂，老師。[wa:2030] "
1006403-115 = "哈啊……總算回來了。"
1006403-116 = "謝謝你陪了我一整晚。#n差點就要變成最慘的跨年了，不過幸虧有老師在，我很開心。"
1006403-117 = "[s]「我也覺得和佳世子聊天很開心哦。」"
1006403-118 = "熬夜過後現在只想立刻睡覺……可是便利屋的事務所這麼遠……"
1006403-119 = "……老師，我可以在夏萊睡覺嗎？"
1006403-120 = "機會難得，我可以推薦你一些助眠的音樂。#n老師也要好好休息，哪怕只有今天也好。"
1006403-122 = "（之後便回到夏萊，和佳世子一起補眠）"

[translation]
1006403-1 = "Bells Ringing in the New Year"
1006403-4 = "Oh, Sensei! I've been waiting for you."
1006403-5 = "[s] \"Sorry I'm late, Kayoko. My train was delayed...\""
1006403-6 = "That's alright. I didn't wait too long anyway."
1006403-7 = "Besides, the ringing of the bells starts late, closer to midnight. We'll have plenty of time even if we go now."
1006403-8 = "How far away is the place?"
1006403-9 = "Hmm... It's a bit of a distance, since we'll have to take about a one hour subway ride from the city center to the waystation on the outskirts..."
1006403-10 = "It's going to be a little late when we're heading back, but there's an extra train service today, so we'll probably be fine."
1006403-11 = "Speaking of... Are you ready?"
1006403-16 = "One hour later..."
1006403-17 = "*pant* *pant*...It's at a more remote mountainside than I thought."
1006403-18 = "I'm sorry, Sensei. It was tough staying at my pace, right?"
1006403-19 = "Hiking up a mountain in a kimono is more uncomfortable than I thought it would be..."
1006403-20 = "[s] \"It's okay. The trail wasn't that tough anyway.\""
1006403-21 = "I'm glad we made it in time though, because the bells are about to ring..."
1006403-25 = "...Oh, wow? Why are there so few people?"
1006403-26 = "Are you guys here to watch the New Year's Eve bell-ringing ceremony...?"
1006403-27 = "Yes, but there doesn't seem to be other guests here..."
1006403-28 = "This year, the bell tower was in poor condition, so we had to cancel the New Year's Eve bell-ringing ceremony..."
1006403-29 = "Since this is a remote temple with no regular visitors, we were only able to notify the residents nearby..."
1006403-30 = "I'm sorry to say that you've come all this way for nothing..."
1006403-31 = "Ahh, darn...I really wanted to listen to the bells and wrap up the year here..."
1006403-32 = "[s1] \"Oh well, it was out of our hands.\"\n[s2] \"Let's aim for next year.\""
1006403-33 = "Yeah..."
1006403-34 = "Yeah..."
1006403-37 = "...What? The last train has already left?!"
1006403-38 = "I was certain there was still time to catch the last train based on last year's timetable..."
1006403-39 = "That was the case for last year, but this year, other events around here have also been canceled, so...the decision was made to not provide additional trips."
1006403-40 = "Unfortunately, it looks like you'll have to wait until tomorrow when the first train arrives."
1006403-44 = "Ahhh, this is just the worst..."
1006403-45 = "I'm sorry, Sensei. This wouldn't have happened if I had done more thorough research in advance..."
1006403-46 = "I'm sorry for dragging you into this predicament."
1006403-47 = "[s] \"No, no. It's also partly because I arrived late...\""
1006403-48 = "Anyway, what should we do? The station is in the middle of nowhere, and there's no place to rest nor facilities to pass the time..."
1006403-49 = "[s3] \"Like what the station employee said...\"\n[s4] \"I guess there's no other choice but to wait in the waiting room until the first train.\""
1006403-50 = "...Yeah, let's just wait here for a few hours."
1006403-51 = "...Yeah, let's just wait here for a few hours."
1006403-56 = "Hmm..."
1006403-57 = "[s] \"Kayoko, aren't you cold?\""
1006403-58 = "Yeah, I'm fine. This kimono is warmer than I thought."
1006403-59 = "How about you, Sensei? Aren't you cold?"
1006403-60 = "[s5] \"I'm alright, it seems like it's a warm day today.\"\n[s6] \"I'm fine too.\""
1006403-61 = "...I see."
1006403-62 = "...I see."
1006403-66 = "...Perhaps I should have brought a portable speaker so we could listen to some music."
1006403-67 = "I'm used to being around chatty companions, so this kind of silence is a bit overwhelming."
1006403-68 = "[s] \"Come to think of it, Kayoko, you were always listening to music.\""
1006403-70 = "[ns] \"When did you pick up that hobby?\""
1006403-71 = "Hmm let's see, probably before I came to the Problem Solver Office..."
1006403-72 = "Back then, and these days as well, I would spend my days amongst noisy people."
1006403-73 = "At the time the surroundings would be full of noises I didn't want to hear, so I began listening to music to distance myself from reality and block out my ears."
1006403-74 = "However, the ruckus I would encounter after entering Problem Solver...might actually be alright."
1006403-75 = "Heehee... It's great to have less excuses to listen to music."
1006403-77 = "And so, I chatted more about the other Problem Solver members with Kayoko for a long time."
1006403-79 = "...oh wow, would you look at the time."
1006403-80 = "I forgot about the time passing while I was talking with you, Sensei."
1006403-84 = "Huh? Are those bell noises...?"
1006403-87 = "― It's almost time for the first train.[wa:780] "
1006403-90 = "― It wasn't the sound we hoped for, but...[wa:1400] "
1006403-92 = "― this isn't bad either."
1006403-95 = "― Unlike the annual end-of-year bells,[wa:880] "
1006403-97 = "― Meanwhile, the first train's bell is a sound you can hear every morning.[wa:1130] "
1006403-100 = "― But even the first day of the New Year...[wa:10] "
1006403-102 = "― is just another day."
1006403-105 = "― So what we just heard might be...[wa:10] "
1006403-107 = "― the best sound for a day like today."
1006403-110 = "― Here's to another great year.[wa:680] "
1006403-112 = "― Happy New Year, Sensei.[wa:1430] "
1006403-115 = "*Sigh*...somehow we made it back."
1006403-116 = "Thanks for hanging out with me all night. It could have been the worst New Year's ever, but you being here made it all better."
1006403-117 = "[s] \"I also enjoyed talking with you, Kayoko.\""
1006403-118 = "Now all that's left is to make up for the lack of sleep from pulling an all-nighter...but it seems it will take me a little longer to get back to the building where the Problem Solver Office is..."
1006403-119 = "...Sensei, if you're all right with it, can we go and catch up on some sleep at Schale?"
1006403-120 = "I'll recommend some music that helps with deep sleep. Even you deserve a day off on the first day of New Year's, Sensei."
1006403-122 = "Afterwards, Kayoko and I returned to Schale and caught up on some sleep."

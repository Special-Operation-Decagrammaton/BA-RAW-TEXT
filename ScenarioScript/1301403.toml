[translation]
1301403-1 = "ชุดว่ายน้ำกับเกาะร้าง"
1301403-2 = "(คุณครูกับเรนเกะมาที่ทะเลด้วยกันตามนัด)"
1301403-6 = "นี่เกาะที่ว่าเหรอ?"
1301403-7 = "ใช่แล้วละ ที่นี่ไม่มีใครมารบกวนหรอก"
1301403-13 = "ถ้างั้นลุงขอตัวก่อน ไว้ตอนอยากกลับก็ติดต่อมาล่ะ"
1301403-20 = "[ns1] \"เอ่อ เรนเกะ? นี่คือเกาะอะไรเหรอ?\"\n[ns2] \"ดูแล้วไม่น่าใช่เกาะทั่วไปเลยนะ...\""
1301403-25 = "หืม? ฉันยังไม่ได้บอกเหรอ?"
1301403-26 = "ที่นี่คือเกาะร้างน่ะ!"
1301403-27 = "[s] \"กะ... เกาะร้าง?!\""
1301403-28 = "นี่คือการ 'เปิดประสบการณ์หนึ่งวันบนเกาะร้าง' พอดีลุงคนนั้นบอกฉันว่ามาใช้ชายหาดที่นี่ได้น่ะ"
1301403-29 = "ที่นี่น้ำทะเลตื้น แล้วก็ไม่มีสัตว์อันตรายด้วย ถ้าอยากออกจากเกาะ ก็แค่ติดต่อไปบอกให้ลุงมารับ"
1301403-30 = "เป็นสภาพแวดล้อมที่เหมาะกับการฝึกฝนเลยว่ามั้ยล่ะ?"
1301403-31 = "[s3] \"ชายหาดส่วนตัวของเราสองคน...!\"\n[s4] \"แบบนี้ละที่เรียกว่าวัยรุ่น!\""
1301403-34 = "ฮุฮุ กะไว้แล้วว่าท่านอาจารย์ต้องชอบ"
1301403-35 = "งั้นเราก็ไปเริ่มฝึกกันเถอะ!"
1301403-44 = "[ns] \"ใส่ชุดว่ายน้ำมาข้างในอีกแล้วสินะ?\""
1301403-45 = "ท่านอาจารย์ก็ใส่มาเหมือนกันใช่มั้ย?"
1301403-46 = "[s] \"ฮุฮุ แน่นอนอยู่แล้ว...!\""
1301403-54 = "เยี่ยมเลย! งั้นก็เริ่มด้วย..."
1301403-55 = "การหาเสบียงจากท้องทะเล!"
1301403-56 = "[s] \"หาเสบียง...? ไม่ได้จะมาเล่นน้ำเหรอ?\""
1301403-57 = "ตั้งใจฟังฉันนะ... ที่นี่คือเกาะร้าง"
1301403-58 = "เป้าหมายของการฝึกฝนครั้งนี้ก็คือการมีชีวิตรอดบนเกาะแห่งนี้!"
1301403-59 = "คนอื่นก็ใช้ชีวิตวัยรุ่นแบบนี้กันไม่ใช่เหรอ?"
1301403-60 = "[s] \"ครูไม่เคยมีช่วงวัยรุ่นแบบนั้นนะ...!\""
1301403-61 = "ฮุฮุ งั้นก็กลับมาเป็นวัยรุ่นอีกครั้งเลย!"
1301403-65 = "เอากระชอนไปจับปลากันเถอะ!"
1301403-71 = "อ๊ะ! ท่านอาจารย์! ปลาไปทางนั้นแล้ว!"
1301403-72 = "[s] \"ครูจับให้เอง! เอาละนะ...!"
1301403-80 = "ฮ่าฮ่า วงสวิงสวยดีนะ"
1301403-81 = "มานี่ ฉันจะสาธิตให้ดูเอง! ท่านอาจารย์ก็ทำตามนะ!"
1301403-94 = "[ns5] \"จะทำตามยังไงได้เนี่ย?!\"\n[ns6] \"ได้ปลาเพียบเลย!\""
1301403-98 = "เอาละ ถึงตาท่านอาจารย์แล้ว ท่านอาจารย์ก็ทำได้"
1301403-99 = "อย่างแรกต้องยืนให้มั่นก่อน จากนั้นก็แกว่งกระชอนให้แม่นๆ..."
1301403-107 = "อืม ฉันจะช่วยจับจากข้างหลังให้ ลองดูอีกครั้งนะ"
1301403-113 = "สุขุมเข้าไว้... ทำได้อยู่แล้วน่า"
1301403-114 = "ทีนี้ก็แค่รอจังหวะที่ปลาว่ายน้ำมา แล้วก็..."
1301403-121 = "[ns] \"โอ๊ะ จับได้แล้ว!\""
1301403-122 = "สมแล้วที่เป็นท่านอาจารย์ บอกแล้วไงว่าทำได้น่ะ"
1301403-123 = "งั้นฉันจะช่วยจับจากข้างหลังให้ต่อ..."
1301403-124 = "ช่วยจับ..."
1301403-129 = "(เดี๋ยวนะ ตัวแนบชิดกันมากเกินไปแล้ว แล้วเราก็ใส่ชุดว่ายน้ำกันอยู่ด้วย!)"
1301403-133 = "อะ... อะฮะฮ่า... ให้ท่านอาจารย์ลองทำคนเดียวบ้างดีกว่า! เป็นทางลัดสู่การเติบโตไง!"
1301403-134 = "[s] \"นะ... นั่นสินะ!\""
1301403-135 = "ชะ... ใช่! งั้นก็จับปลาแบบนี้ไปเรื่อยๆ นะ!"
1301403-138 = "(หลังจากนั้นคุณครูกับเรนเกะก็ทำกิจกรรมวัยรุ่นโดยการจับปลาด้วยกัน และรักษาระยะห่างระหว่างกัน#nด้วย...)"
1301403-145 = "เวลาผ่านไปเร็วจริงๆ เลย..."
1301403-146 = "วันนี้สนุกมากเลยละ"
1301403-147 = "ได้นั่งผึ่งตัวใต้แสงแดด แล้วก็ย่างปลาที่จับมาด้วยกัน..."
1301403-148 = "ถ้าเราติดเกาะร้างจริงๆ ชีวิตจะเป็นแบบนี้มั้ยนะ?"
1301403-153 = "......"
1301403-154 = "ก่อนหน้านี้ฉันเคยอ่านนิยายที่มีคนติดเกาะร้าง 2 คนกลายมาเป็นเพื่อนกันด้วย..."
1301403-155 = "ฉันก็คิดอยู่เรื่อยๆ เลยละว่าถ้าเป็นฉัน ฉันจะเป็นยังไง"
1301403-156 = "ท่านอาจารย์เคยจินตนาการอะไรแบบนี้บ้างหรือเปล่า?"
1301403-157 = "[s7] \"อื้อ เคยสิ\"\n[s8] \"ก็เคยนะ คิดเล่นๆ แบบนั้นมันก็สนุกดี\""
1301403-160 = "อย่างนั้นสินะ..."
1301403-161 = "ถะ... ถ้าท่านอาจารย์ต้องติดอยู่บนเกาะร้าง ท่านอาจารย์อยากมีคู่หูแบบไหนเหรอ?#nอย่างเช่น... คนที่หาทางรอดชีวิตได้ดี หรืออะไรทำนองนั้นน่ะ"
1301403-165 = "......"
1301403-166 = "ฮุฮุ ดูทำหน้าเข้าสิ ไม่กล้าบอกละสิท่า ไม่เป็นไรหรอก ไม่ต้องบอกกันตอนนี้ก็ได้"
1301403-167 = "สำหรับฉันน่ะ แค่ฉันได้สนุกกับช่วงเวลาวัยรุ่นกับท่านอาจารย์ก็เพียงพอแล้วละ"
1301403-168 = "แต่แน่นอนว่าฉันจะได้ฟังคำตอบจากท่านอาจารย์ในสักวัน..."
1301403-172 = "ไม่สิ... ไม่มีอะไรทั้งนั้น!"
1301403-173 = "เอาละ...! เวลาก็ล่วงเลยมาขนาดนี้แล้ว งั้นเราก็เตรียมสำหรับสิ่งต่อไปกันเถอะ!"
1301403-174 = "[s] \"นี่ก็ดึกแล้วด้วย เตรียมตั้งแคมป์ใช่มั้ย?\""
1301403-175 = "การตั้งแคมป์กับท่านอาจารย์... นั่นก็เป็นกิจกรรมวัยรุ่นที่น่าสนใจเลยนะ"
1301403-176 = "แต่อย่างที่ฉันบอกไปว่าเป้าหมายของวันนี้ก็คือ 'การอยู่รอดบนเกาะร้าง'"
1301403-177 = "งั้นเราก็ต้องคิดหาวิธีออกจากเกาะสิ?"
1301403-178 = "ที่จริงเราจะเรียกลุงชาวประมงมาก็ได้..."
1301403-179 = "แต่ฉันคิดว่าการออกไปจากเกาะเองก็เป็นการใช้ชีวิตบนเกาะร้างเหมือนกัน..."
1301403-183 = "ฉันก็เลยจะสร้างแพแล้วล่องออกจากที่นี่ดูน่ะ!"
1301403-184 = "แถวนี้ก็มีต้นไม้เยอะด้วย งั้นก็ไม่ต้องกังวลเรื่องวัสดุอุปกรณ์!"
1301403-185 = "[s] \"เดี๋ยวก่อน...? จะสร้างอะไรนะ?!\""
1301403-186 = "แพยังไงล่ะ ถ้าเริ่มทำตั้งแต่ตอนนี้ พรุ่งนี้ก็น่าจะเสร็จทันอยู่นะ?"
1301403-190 = "เอาละ! มาต่อสู้เพื่อชีวิตรอดและวัยรุ่นของเรากันเถอะ ท่านอาจารย์!"
1301403-191 = "[s] \"เย้... เย้...!\""
1301403-196 = "(หลังจากนั้นคุณครูกับเรนเกะก็ช่วยกันสร้างแพแล้วล่องแพออกมาจากเกาะได้สำเร็จ)"

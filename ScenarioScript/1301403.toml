[translation]
1301403-1 = "Swimsuits and a Deserted Island"
1301403-2 = "On the arranged day, I arrived at the beach with Renge."
1301403-6 = "Have we arrived at \"the place\"?"
1301403-7 = "Yes. You won't be disturbed here. Most likely."
1301403-13 = "Just call me when you're done."
1301403-20 = "[ns1] \"Um, Renge? Where exactly are we?\"\n[ns2] \"This doesn't seem to be an ordinary island...\""
1301403-25 = "Oops, did I not tell you?"
1301403-26 = "This is a deserted island!"
1301403-27 = "[s] \"A d-deserted island?!\""
1301403-28 = "That's the one! I signed us up for the \"Single-Day Deserted Island Experience!\""
1301403-29 = "The perimeter is shallow, and there's no dangerous wildlife. We have it booked for the day, but we can leave whenever we want."
1301403-30 = "Isn't this the perfect place to train?"
1301403-31 = "[s3] \"...A private beach, just for us!\"\n[s4] \"I can't think of anything more youthful!\""
1301403-34 = "Fufu. I knew you'd approve, Mentor!"
1301403-35 = "Now then, we don't have a moment to waste!"
1301403-44 = "[ns] \"You're wearing 'it' under your clothes again, right?\""
1301403-45 = "Of course. And you?"
1301403-46 = "[s] \"Fufu! Of course!\""
1301403-54 = "Okay, great! To begin..."
1301403-55 = "...we need to secure food!"
1301403-56 = "[s] \"...We do? I thought we were here to play.\""
1301403-57 = "...Sensei. This is a deserted island."
1301403-58 = "Right now, we're training to survive under extreme circumstances!"
1301403-59 = "This is something everyone gets to experience in their youth, right?"
1301403-60 = "[s] \"You know, we might have very different definitions of 'youth'!\""
1301403-61 = "Fufu! Well, it's Renge's youth from now on, then!"
1301403-65 = "Let's go! I've got a net and a hankering for some fish!"
1301403-71 = "That way, Mentor! The fish is getting away!"
1301403-72 = "[s] \"I'm on it! Here I go...!\""
1301403-80 = "Haha. You didn't get anything!"
1301403-81 = "Let me show you how it's done. Just follow my lead!"
1301403-94 = "[ns5] \"How did you do that?!\"\n[ns6] \"It's raining fish?!\""
1301403-98 = "Here, I'll help you. Try one more time."
1301403-99 = "Let's start with your form. Let your body point where you want to go, and throw!"
1301403-107 = "Um... I'll help you from behind. Just hold your arms like this..."
1301403-113 = "Keep on breathing. You can do it."
1301403-114 = "And right when you see the fish...!"
1301403-121 = "[ns] \"Oh, I got one!\""
1301403-122 = "I knew you could do it, Mentor!"
1301403-123 = "I'll keep holding you from behind to keep up your form and—"
1301403-124 = "\"Hold you\"..."
1301403-129 = "(Hold on a second. We're incredibly close for two people in swimsuits right now!)"
1301403-133 = "A-Ahaha. On second thought, why don't you try on your own? The bird has to leave the nest eventually, right? Aha...ha!!"
1301403-134 = "[s] \"R-Right!\""
1301403-135 = "O-Okay! Let's keep up the pace!"
1301403-138 = "We stayed very conscious of our distance from each other as we continued our youth activities for the day."
1301403-145 = "Before we knew it, time had flown by."
1301403-146 = "I had so much fun today."
1301403-147 = "Drying off under the sun, sharing the fish we caught together..."
1301403-148 = "Do you think this is really what it'd be like if we got stranded?"
1301403-153 = "..."
1301403-154 = "I read a novel once where two people got stranded on a deserted island and fell in love."
1301403-155 = "It made me start to imagine what I would've done in that scenario."
1301403-156 = "Do you ever think about stuff like that, Mentor?"
1301403-157 = "[s7] \"Yes, of course I do.\"\n[s8] \"It's always fun to daydream.\""
1301403-160 = "...I see."
1301403-161 = "I-If you had to pick one person to be stuck on a deserted island with, who would it be? B-Because you know, I think you'd want to pick someone who has good survival skills...and other qualities..."
1301403-165 = "..."
1301403-166 = "I've asked you a difficult question, haven't I? Ahaha. Don't worry about answering right now."
1301403-167 = "For today, I'm just happy that I got to enjoy a little more of my youth."
1301403-168 = "...I do want to know your answer, though."
1301403-172 = "N-Never mind! Forget it!"
1301403-173 = "Anyways! Ahem! It's getting late, so we should get ready!"
1301403-174 = "[s] \"It's already late, so we probably want to set up camp.\""
1301403-175 = "Camping together...that's definitely a popular youth activity."
1301403-176 = "But today's scene was \"deserted island survival!\""
1301403-177 = "So naturally, the next step would be to escape!"
1301403-178 = "We could always just call the boatman who brought us here..."
1301403-179 = "...but figuring out how to escape is the last step of today's training!"
1301403-183 = "That's why we're going to make a raft and escape back to the mainland!"
1301403-184 = "There's plenty of wood, so we have more than enough material."
1301403-185 = "[s] \"Hold on... We're making WHAT?!\""
1301403-186 = "A raft, Mentor. And we need to get started now, if we want to finish by tomorrow!"
1301403-190 = "Now then! Let's give it our all for our youth and survival, Mentor!"
1301403-191 = "[s] \"R-Raaah! Yeah!\""
1301403-196 = "...Renge and I stayed up all night building a raft, and eventually successfully escaped the island."

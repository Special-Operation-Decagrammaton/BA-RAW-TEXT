[translation]
1301403-1 = "泳裝與無人島"
1301403-2 = "（在約定的日子和蓮華來到了海邊）"
1301403-6 = "這裡就是[ruby= ・     ・     ・ ]那座島[/ruby]嗎？"
1301403-7 = "沒錯。應該不會有人來打擾你們才對。"
1301403-13 = "那我就先走了。#n要離開的時候再聯絡我吧。"
1301403-20 = "[ns1]「那個，蓮華？這裡是什麼島？」\n[ns2]「總覺得不像是普通的島……」"
1301403-25 = "咦？我沒說過嗎？"
1301403-26 = "這裡是無人島哦！"
1301403-27 = "[s]「無，無人島！？」"
1301403-28 = "是「無人島一日體驗」啦。#n他們說可以使用這座島的海灘。"
1301403-29 = "除了海水很淺之外，也沒有危險的動物。#n只要聯絡一下隨時都能離開。"
1301403-30 = "是不是很適合修煉？"
1301403-31 = "[s3]「……兩人獨享的海灘！」\n[s4]「這就是青春啊！」"
1301403-34 = "呵呵，就知道師父會喜歡。"
1301403-35 = "那我們馬上開始修煉吧！"
1301403-44 = "[ns]「你這次也穿在裡面了對吧？」"
1301403-45 = "師父你呢？"
1301403-46 = "[s]「呵呵，當然穿著……！」"
1301403-54 = "好！那麼首先──"
1301403-55 = "就從在海裡確保食材開始吧！"
1301403-56 = "[s]「……確保食材？不是要玩水嗎？」"
1301403-57 = "……仔細聽我說哦？這裡可是一座無人島。"
1301403-58 = "而這次修煉的內容，就是要在這座島上生存！"
1301403-59 = "大家不都很嚮往這種青春嗎？"
1301403-60 = "[s]「我可沒聽過這種青春啊……！」"
1301403-61 = "呵呵，那接下來就是青春了呢！"
1301403-65 = "一起來用撈網抓魚吧！"
1301403-71 = "啊！師父！魚往你那邊游過去了！"
1301403-72 = "[s]「交給我吧！看我的……！」"
1301403-80 = "哈哈，真是漂亮的落空啊。"
1301403-81 = "來，我示範給你看吧！只要照著做就行了！"
1301403-94 = "[ns5]「我要怎麼照著做！？」\n[ns6]「魚像雨一樣落下來了！？」"
1301403-98 = "來來來，師父你也可以的。#n再試一次吧。"
1301403-99 = "先把姿勢擺正，然後準確地揮動……"
1301403-107 = "我會在後面抓住你，再挑戰看看吧。"
1301403-113 = "冷靜下來……沒問題的。"
1301403-114 = "現在看準魚游過來的時機……"
1301403-121 = "[ns]「哦，抓到了！」"
1301403-122 = "不愧是師父，果然沒問題的嘛？"
1301403-123 = "那我就這樣繼續在後面幫你抓住……"
1301403-124 = "抓住……"
1301403-129 = "（等一下。仔細想想……我們也穿著泳裝靠得太近了吧！？）"
1301403-133 = "啊，啊哈哈……接下來就由師父自己來吧！#n這才是成長的捷徑！"
1301403-134 = "[s]「說，說的也是！」"
1301403-135 = "沒，沒錯！那就繼續抓吧！"
1301403-138 = "（……之後一邊在意著彼此的距離，一邊繼續進行捕魚的青春活動）"
1301403-145 = "時間過得真快……"
1301403-146 = "今天真的很開心。"
1301403-147 = "在陽光下曬乾身體，一起分享抓到的魚……"
1301403-148 = "如果真的被困在無人島上的話，就會是這種感覺嗎？"
1301403-153 = "……"
1301403-154 = "之前，我曾經讀過一部講述漂流到無人島的兩人，最後結為伴侶的小說……"
1301403-155 = "於是我就在想，如果換作是我的話會怎麼做。"
1301403-156 = "師父你也有想像過這種事嗎？"
1301403-157 = "[s7]「嗯，我也有。」\n[s8]「這種想像很有趣對吧。」"
1301403-160 = "……這樣啊。"
1301403-161 = "那，那如果真的要在無人島生活的話，師父會想和什麼樣的夥伴一起呢？#n例如生存能力很強……或者其他各式各樣的條件之類的。"
1301403-165 = "……"
1301403-166 = "呵呵，一臉難以啟齒的表情。#n沒事，不必現在回答也沒關係。"
1301403-167 = "只要能跟師父一起享受青春，對我來說就已經足夠了。"
1301403-168 = "……當然，總有一天我會聽到答案的。"
1301403-172 = "不……沒什麼！"
1301403-173 = "好……！現在時間也不早了，我們趕緊準備好進行下一步吧！"
1301403-174 = "[s]「要準備露營對吧？」"
1301403-175 = "和師父一起露營……的確也是很有魅力的青春活動沒錯。"
1301403-176 = "不過這次的目標是「無人島生存」。"
1301403-177 = "既然如此，想辦法脫困也是很重要的吧？"
1301403-178 = "雖然可以請漁夫過來接我們……"
1301403-179 = "……但我覺得連脫困都靠自己完成，才算是真正的無人島生活。"
1301403-183 = "所以我打算造一艘木筏逃出去！"
1301403-184 = "剛好這附近有很多樹，材料方面應該不用擔心！"
1301403-185 = "[s]「等一下……？你說要造什麼！？」"
1301403-186 = "我說要造一艘木筏。#n現在開始做的話，明天之內應該能完成吧？"
1301403-190 = "來！為了我們的青春與生存，一起加油吧，師父！"
1301403-191 = "[s]「哦，哦──！」"
1301403-196 = "（……之後和蓮華熬夜造出木筏，順利離開了島）"

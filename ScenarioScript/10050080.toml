[translation]
10050080-1 = "第8話;古書館戰爭"
10050080-2 = "[ns]「咦？實現正義部的學生怎麼會找到這裡！？」"
10050080-3 = "我也不知道，可能是不小心在哪裡露出馬腳了吧！"
10050080-4 = "我按照老師說的，一直跟著實現正義部的孩子們行動……"
10050080-13 = "……所以就先通知老師了。"
10050080-14 = "[s]「謝謝你，小春！小春果然最棒了！」"
10050080-15 = "是，是嗎？耶嘿嘿……"
10050080-16 = "不對，現在不是高興的時候啦！#n接下來該怎麼辦啊，老師？"
10050080-17 = "嗯？也要聯絡志美子同學……？#n對，對耶！這件事也跟圖書委員會有關吧！我知道了，老師！"
10050080-22 = "快點……快點接啊……！"
10050080-26 = "你好，小春同學。怎麼了嗎？"
10050080-27 = "出大事了，志美子同學！"
10050080-28 = "咦……？"
10050080-30 = "真的要出大事了！！！"
10050080-31 = "我剛才不是說過了嗎！"
10050080-32 = "不，這不只是小春同學所想的那種程度而已！"
10050080-33 = "……咦？"
10050080-34 = "現在沒時間解釋了。#n總之我會盡快趕往古書館……"
10050080-35 = "請小春同學先找地方躲起來吧。"
10050080-36 = "實現正義部和憂前輩可是水火不容的存在啊！"
10050080-37 = "咦？為什麼我得……？"
10050080-38 = "要是小春同學到古書館去的話，可能會遭受池魚之殃……"
10050080-40 = "在最壞的情況下，甚至可能會被當成告密者！"
10050080-41 = "知道了嗎？在一切落幕之前，請你盡可能遠離這起事件！"
10050080-45 = "池魚之殃……告密者……#n嗯……雖然這麼說確實沒錯……"
10050080-46 = "……"
10050080-47 = "……不過我還是要去。"
10050080-48 = "因為那樣才是正確的。"
10050080-57 = "老師……？你的臉色怎麼……？"
10050080-58 = "[s]「憂！原來你在這裡啊！仔細聽我說，現在──」"
10050080-62 = "真是的……這次又怎麼啦……"
10050080-63 = "請稍等一下……老師。#n雖然不知道是誰……我先去跟對方說幾句……"
10050080-64 = "[s]「啊，那並不是……！」"
10050080-65 = "你在嗎，古関憂委員長？我是實現正義部的麻白。"
10050080-66 = "實現……正義部？為什麼……"
10050080-67 = "你好，憂委員長。好久不見。"
10050080-68 = "……你們來做什麼？"
10050080-69 = "事情是這樣的……"
10050080-70 = "其實我們收到線報指出，這裡引進了可疑的地下書刊！"
10050080-71 = "地下書刊……？"
10050080-72 = "……所以呢？"
10050080-77 = "是的！出於這個原因……我們現在要開始「全面徹查」古書館，麻煩你多加配合！"
10050080-82 = "……什麼？"
10050080-83 = "全面徹查？突然說什麼全面徹查……？？"
10050080-84 = "不是，先等一下。#n你剛才說……現在要做什麼？"
10050080-85 = "全面……徹查？"
10050080-86 = "意思是現在……要調查這裡……"
10050080-87 = "調查古書館？"
10050080-88 = "是的，沒錯！"
10050080-89 = "所以現在……"
10050080-90 = "要把這些孩子們……全部帶走？"
10050080-91 = "……咦？"
10050080-92 = "這個嘛，如果有必要的話也不無可能。"
10050080-93 = "總之大概就是這個意思。話說……你怎麼了嗎？"
10050080-97 = "有鑒於前述的原因，還請務必配合！"
10050080-98 = "只要問心無愧、行得正坐得直的話，應該沒有什麼好隱瞞的才──"
10050080-99 = "少在那邊胡說八道──！！！"
10050080-103 = "你們這些傢伙，給你們面子就得寸進尺了是吧？#n竟敢說要帶走我們家的孩子們！？也不看看這裡是什麼地方！？"
10050080-104 = "通通給我聽好！！"
10050080-105 = "要是有人敢動這裡的書……敢動這些孩子，每動一本我就折斷你們一隻手腕……！！"
10050080-106 = "那，那怎麼行！#n你剛才的言論，是要以武力阻止實現正義部執行任務的恐嚇威脅……！"
10050080-107 = "那是不對的！我們絕不容許──"
10050080-108 = "那是我要說的話！#n反正我知道你們背後有茶會在撐腰！"
10050080-109 = "茶會……那些只知道仗勢欺人，充斥著隱瞞和陰謀的傢伙……！"
10050080-110 = "肯定是打算以調查書籍為藉口，要將這座古書館也納入自己的控制範圍！#n我全部都知道！一定是這樣對吧！？"
10050080-111 = "……什，什麼？#n不，不是！絕對不是那個意思……！"
10050080-112 = "不好意思！我們現在正在執行公務！！！"
10050080-113 = "沒錯沒錯！要是再不配合的話，我們就要動武了……！！！"
10050080-125 = "所有人都仔細聽好，回去之後好好轉告他們……"
10050080-126 = "沒有我的允許，這裡的孩子一頁都不准帶出去。#n只要我人還在，就不可能讓那種事情發生。"
10050080-127 = "換句話說，如果你們真的執意如此……"
10050080-128 = "就先跨過我的屍體吧。"
10050080-133 = "……這樣啊。"
10050080-134 = "我現在已經清楚，憂委員長完全沒有要配合的意思了。"
10050080-135 = "同時，基於古関憂委員長對於茶會的命令，以及實現正義部的明確敵意及威脅……"
10050080-136 = "從現在起，實現正義部將進入不可避免的「正義執行」程序。"
10050080-137 = "啊，是嗎？那就這麼做吧。"
10050080-138 = "……這還真是[ruby=・]久[/ruby][ruby=・]違[/ruby][ruby=・]了[/ruby][ruby=・]呢[/ruby]。來啊，儘管放馬過來。"
10050080-149 = "……大家上！！ "
10050080-154 = "[ns]「先等等啊～～～！」"
10050080-155 = "請住手！！！"
10050080-156 = "志美子？"
10050080-157 = "老師？"
10050080-158 = "大家！這裡面有很多誤會！#n只要冷靜下來好好談談就能明白了！"
10050080-159 = "是，是這樣嗎……？"
10050080-164 = "老師，志美子同學？大家都還好嗎！？"
10050080-165 = "咦？小春同學？#n小春同學怎麼會在這裡……？"
10050080-166 = "我應該說過你最好不要過來才對……？"
10050080-167 = "可，可是……那樣是不對的！不對的事情就是不對！"
10050080-168 = "不是，到底還有多少人要來啊……！這裡又不是菜市場……！"
10050080-169 = "還有志美子！你是跟他們一夥的嗎？ "
10050080-170 = "我本來也想過是不是有內鬼，沒想到竟然是你！？！？#n這個世上果然誰都不能相信──"
10050080-179 = "唔啊啊──！！志，志美子……！！"
10050080-180 = "前輩！！你才一下就忍不住動手了嗎！！#n還說什麼內鬼？完全不了解別人的苦衷就說那種話……！"
10050080-181 = "而且不能一言不合就對人開槍，這應該是常識吧！！#n這次[ruby=・]又[/ruby]想送幾個人進醫院了啊……！！"
10050080-182 = "哪，哪有……！我只是……！！"
10050080-183 = "多說無益！！"
10050080-192 = "唔啊啊啊啊──！！"
10050080-194 = "啊……那個……"
10050080-195 = "雖然情況相當混亂，但是實現正義部來到這裡的目的還沒達成。"
10050080-196 = "我們必須追查地下書刊。#n並且目前得出的結論是，那些書籍很可能就在這裡。"
10050080-197 = "未經許可的書籍在三一流通，這是從根本上無法坐視不管的事……"
10050080-198 = "是的，這點我也同意。#n我並沒有打算要阻止各位的行動。"
10050080-199 = "不過這句話反過來說──"
10050080-205 = "各位，非常抱歉。"
10050080-206 = "我，我不是叫你們躲起來嗎……！？"
10050080-207 = "沒錯，憂同學確實那麼說過……不過，我果然還是認為那樣是不對的。#n事情之所以會演變成這樣……終究是我們造成的。"
10050080-208 = "願意向我們伸出援手固然非常感謝……#n但是，我們實在不希望同校的學生因為我們而發生爭執。"
10050080-209 = "來，部長也請趕快出來吧。#n我們得好好說明才行。"
10050080-210 = "啊～啊，本來還想當作什麼都沒發生，#n像進來的時候一樣隨便溜出去的說……看來是沒辦法了呢。"
10050080-211 = "……部長？"
10050080-212 = "……真的非常抱歉。"
10050080-213 = "你們好，三一的各位。我們是來自赤冬的出版部。"
10050080-214 = "出版？"
10050080-215 = "部？"
10050080-216 = "是的。那麼，我想先從為什麼會發生這種事情，以及我們這麼做的原因開始說起。"
10050080-217 = "其實我們──"
10050080-219 = "那個……我先簡單地總結一下。"
10050080-220 = "出版部的各位，實際上是為了幫助瀕臨餓死的知識解放戰線的學生……"
10050080-221 = "所以才會來到三一開拓新的銷售通路……是嗎？"
10050080-222 = "這個嘛……與其說是為了幫那些孩子，不如說單純是為了錢──"
10050080-223 = "部長！"
10050080-224 = "對不起……"
10050080-225 = "不過該怎麼說呢，除了這些之外……"
10050080-226 = "也有想把我們赤冬製作的文化媒體，推廣給更多人的心情。"
10050080-227 = "那本書的題材在赤冬早就被玩膩了，所以也沒什麼需求。"
10050080-228 = "然而幸運的是，它似乎獲得了不少三一學生的青睞。"
10050080-229 = "這……確實如此呢……"
10050080-230 = "所以我們實現正義部才不得不與圖書委員會合作，開始追查那些書籍……"
10050080-231 = "沒想到居然是我們三一的學生，一直在援助赤冬出版部的各位……"
10050080-232 = "也難怪搜查起來會困難重重了呢……"
10050080-233 = "有那種事嗎……志美子……？"
10050080-234 = "沒錯，委員長。所以請委員長也多關心一下外面的消息吧。"
10050080-235 = "這件事原本應該是由委員長負責，而不是我哦？"
10050080-236 = "那，那那那，那種事……對我來說太困難了……"
10050080-237 = "總之，我認為文化是必須不斷循環的東西。"
10050080-238 = "停滯不前的文化，遲早會成為阻礙集體前進的禍根。"
10050080-239 = "而且也賺不到什麼錢。"
10050080-240 = "當然，我們也不是一開始就抱著那麼遠大的志向來到三一的。"
10050080-241 = "只是在看見那麼多喜歡我們作品的三一學生之後，我也思考了很多。"
10050080-242 = "咦？你真的是那樣想的嗎，部長？"
10050080-243 = "哼嗯……不如這樣回答吧。#n有些故事正是因為沒有說破，才讓它更趨近於完整。"
10050080-244 = "嗚，居然用我的魔法攻擊我……！"
10050080-245 = "我這個部長可不是白當的哦？呣呵呵。"
10050080-247 = "可是話雖如此，這些未經許可的地下刊物依然是個問題……"
10050080-251 = "[ns]「只要圖書委員會批准不就行了嗎？」"
10050080-252 = "圖書委員會……是嗎？"
10050080-253 = "是的。畢竟管理所有在三一流通的書籍，本來就是圖書委員會的責任與義務。"
10050080-254 = "只要出版部帶來的這些書能得到圖書委員會的正式批准……就不再是地下刊物了。"
10050080-255 = "當然為了配合三一的風氣，尺度可能需要稍微調整一下就是了。"
10050080-256 = "果然對這裡來說，那種程度還是太刺激了嗎……"
10050080-257 = "我也隱約感覺到了……"
10050080-262 = "[ns]「像這樣遵守程序，不也是一種『正義』嗎？」"
10050080-263 = "原來還能這樣解釋啊！真是讓我上了一課！"
10050080-264 = "即便在正義已經崩壞的地方，也能透過正當程序建立新的正義……"
10050080-265 = "不愧是老師！太謝謝你了！"
10050080-266 = "[s]「啊，嗯……沒錯，就當作是那樣吧。」"
10050080-267 = "話說回來，委員長覺得這些書怎麼樣呢？"
10050080-268 = "咦？為，為什麼要問我……"
10050080-269 = "你應該已經全部讀過了對吧？"
10050080-270 = "你……你是怎麼知道的……"
10050080-271 = "呵呵。我都和委員長共事多久了，當然知道囉。"
10050080-272 = "果然瞞不過你啊……"
10050080-273 = "呼……嗯，是本好書。至少在我看來是這樣。"
10050080-274 = "能夠感受到出版部的各位投入的心意……還有製作書本的人所懷抱的熱情。"
10050080-275 = "最近……有很多只想靠短期販售和快速絕版來牟利，內容粗製濫造的書……#n跟那些比起來……要來得好多了……"
10050080-276 = "所以結論是？"
10050080-277 = "我……覺得可以批准。#n至於尺度部分……我個人其實不怎麼在意……"
10050080-278 = "但是其他人的看法我也無法保證……那個部分就交給志美子看著辦吧。"
10050080-279 = "是，我明白了。"
10050080-280 = "謝謝你們，圖書委員會的各位。#n那麼這件事我會據實向上呈報的！"
10050080-281 = "[s]「我也一起去說明吧。」"
10050080-282 = "我也去。畢竟委員長應該不會想出門才對。"
10050080-283 = "我不去。"
10050080-284 = "這樣會不會太麻煩老師和志美子同學了，好像沒必……"
10050080-285 = "……"
10050080-286 = "不，那麼就拜託各位協助到最後了。"
10050080-287 = "這本來就是由實現正義部、圖書委員會和老師一起合力執行的任務嘛。"
10050080-288 = "太好了，大家。耶嘿嘿。"
10050080-289 = "那麼既然事情已經解決了，要不要一起欣賞一下獲得圖書委員長批准的書呢？"
10050080-290 = "嗯！我們也想看！"
10050080-291 = "（吞口水……）"
10050080-292 = "[s]（等等，這個該不會……！？）"
10050080-296 = "……！"
10050080-297 = "這……相當不得了呢……？"
10050080-304 = "……"
10050080-305 = "呀啊！？！？"
10050080-307 = "死刑──！！！"

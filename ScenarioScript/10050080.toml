[translation]
10050080-1 = "ตอนที่ 8;สงครามในห้องสมุดเก่า"
10050080-2 = "[ns] \"หืม? ชมรมทวงความยุติธรรมรู้ได้ไงว่าเราอยู่ที่นี่?!\""
10050080-3 = "เรื่องนั้นฉันก็ไม่รู้หรอก แต่ก็น่าจะไปได้เงื่อนงำอะไรมาน่ะ!"
10050080-4 = "ระหว่างนี้ฉันก็พยายามทำตัวให้ใกล้ชิดกับเด็กๆ ชมรมทวงความยุติธรรมตามที่คุณครูขอ..."
10050080-13 = "แล้วพอรู้เรื่องมา ก็เลยติดต่อมาหาคุณครูก่อน..."
10050080-14 = "[s] \"ขอบใจนะ โคฮารุ! โคฮารุยอดเยี่ยมที่สุดเลย!\""
10050080-15 = "งะ... งั้นเหรอ? แหะๆๆ..."
10050080-16 = "ไม่สิ นี่ไม่ใช่เวลามาดีใจอยู่นะ! แล้วทีนี้จะทำยังไงล่ะ คุณครู?"
10050080-17 = "หืม? ให้ฉันติดต่อคุณชิมิโกะด้วยเหรอ...? นะ... นั่นสินะ! ก็นี่เป็นงานของชมรมอ่านหนังสือด้วยนี่เนอะ! เข้าใจแล้ว คุณครู!"
10050080-22 = "รีบรับสิ... เร็วเข้า...!"
10050080-26 = "สวัสดีค่ะ คุณโคฮารุ มีเรื่องอะไรเหรอคะ?"
10050080-27 = "เกิดเรื่องใหญ่แล้วละ คุณชิมิโกะ!"
10050080-28 = "คะ...?"
10050080-30 = "นั่นมันเรื่องใหญ่เลยนี่คะ!!!"
10050080-31 = "ฉันก็บอกอยู่นี่ไง!"
10050080-32 = "ไม่หรอกค่ะ นี่ไม่ใช่ระดับที่คุณโคฮารุจะจินตนาการได้เลยละ!"
10050080-33 = "หืม...?"
10050080-34 = "ฉันไม่มีเวลาอธิบายค่ะ เอาเป็นว่าฉันจะรีบไปที่ห้องสมุดเก่าให้เร็วที่สุด..."
10050080-35 = "ส่วนคุณโคฮารุก็ไปหลบก่อนนะคะ"
10050080-36 = "ชมรมทวงความยุติธรรมกับรุ่นพี่อุยน่ะ เป็นไม้เบื่อไม้เมากันเลยละค่ะ!"
10050080-37 = "หืม? แล้วทำไมฉันต้อง...?"
10050080-38 = "ก็ถ้าคุณโคฮารุไปที่ห้องสมุดเก่าด้วย ก็จะพลอยโดนหางเลขไปด้วยน่ะสิคะ..."
10050080-40 = "กรณีที่เลวร้ายที่สุด อาจถูกมองว่าเป็นคนขี้ฟ้องก็ได้ค่ะ!"
10050080-41 = "เข้าใจใช่มั้ยคะ? ถ้าเป็นไปได้ก็หลีกเลี่ยงเหตุการณ์นี้ให้มากที่สุด จนกว่าทุกอย่างจะเรียบร้อยนะคะ!"
10050080-45 = "โดนหางเลข... คนขี้ฟ้อง... อื้อ... ก็ใช่ว่าจะผิดหรอกนะ..."
10050080-46 = "..."
10050080-47 = "ไม่หรอก... ยังไงฉันก็ต้องไป"
10050080-48 = "เพราะมันเป็นสิ่งที่ถูกต้องยังไงล่ะ"
10050080-57 = "คุณครู...? ทำไมทำหน้าแบบนั้นล่ะคะ...?"
10050080-58 = "[s] \"อุย! อยู่ตรงนี้นี่เอง! ฟังครูนะ จากนี้เป็นต้นไป...\""
10050080-62 = "อะไรอีกเนี่ย... จริงๆ เลย..."
10050080-63 = "รอเดี๋ยวนะคะ... คุณครู ฉันก็ไม่รู้ว่านั่นใครหรอกนะคะ... แต่ขอฉันออกไปพูดอะไรสักอย่างหน่อยเถอะ..."
10050080-64 = "[s] \"มะ... ไม่ใช่อย่างนั้น ครูไม่ได้จะ...\""
10050080-65 = "หัวหน้าโคเซกิ อุย อยู่มั้ยคะ? ฉันมาชิโระจากชมรมทวงความยุติธรรมค่ะ"
10050080-66 = "ชมรม... ทวงความยุติธรรม? ทำไมถึง..."
10050080-67 = "สวัสดีค่ะ หัวหน้าอุย ไม่ได้เจอกันนานเลยนะคะ"
10050080-68 = "มาที่นี่ทำไมเหรอคะ...?"
10050080-69 = "ค่ะ ที่ฉันมาที่นี่ในวันนี้..."
10050080-70 = "ก็เพราะฉันได้ข้อมูลว่ามีหนังสือเถื่อนต้องสงสัยอยู่ที่นี่ค่ะ!"
10050080-71 = "หนังสือเถื่อน...?"
10050080-72 = "แล้วยังไงเหรอคะ...?"
10050080-77 = "ค่ะ! และด้วยเหตุผลนั้น... พวกฉันก็เลยจะ 'ปูพรมตรวจค้น' ทั่วทั้งห้องสมุดเก่าตั้งแต่บัดนี้เป็นต้นไปค่ะ ขอความร่วมมือด้วยนะคะ!"
10050080-82 = "ว่าไงนะ...?"
10050080-83 = "ปูพรมตรวจค้น? จู่ๆ จะมาทำแบบนั้นทำไม...??"
10050080-84 = "ไม่สิ เดี๋ยวก่อน เดี๋ยวนะ เมื่อกี้บอกว่า... จะทำอะไรนะ?"
10050080-85 = "ปูพรม... ตรวจค้น?"
10050080-86 = "แปลว่าจะตรวจค้นที่นี่... ทุกตารางนิ้ว..."
10050080-87 = "ที่ห้องสมุดเก่าเนี่ยนะ?"
10050080-88 = "ค่ะ ใช่แล้วค่ะ!"
10050080-89 = "งั้นก็แปลได้อีกว่า..."
10050080-90 = "จะพาเด็กๆ ทุกคน...? ออกไปทั้งหมด?"
10050080-91 = "คะ...?"
10050080-92 = "ค่ะ ประมาณนั้นค่ะ ถ้าจำเป็นก็อาจต้องทำแบบนั้นค่ะ"
10050080-93 = "ฉันคงเข้าใจถูกว่าหมายถึงหนังสือใช่มั้ยคะ? ว่าแต่... ทำไมถึงทำหน้าอย่างนั้นล่ะคะ?"
10050080-97 = "ยังไงก็ขอความร่วมมือด้วยนะคะ!"
10050080-98 = "ถ้าเป็นคนซื่อตรงและยุติธรรมในทุกสิ่งโดยปราศจากข้อกังขา ก็ไม่มีอะไรต้องปิดบังหรอกค่ะ..."
10050080-99 = "หยุดพูดเรื่องเหลวไหลได้แล้ว!!!"
10050080-103 = "ชักจะมากไปแล้วนะ! จะมาพาตัวเด็กๆ ของเราไปงั้นเหรอ!? รู้จักที่นี่น้อยไปเสียแล้ว!"
10050080-104 = "ฟังกันให้ดีเลยนะ!!"
10050080-105 = "ถ้ามาแตะต้องเด็กๆ... ฉันหมายถึง ถ้ามาแตะต้องหนังสือที่อยู่ที่นี่แม้แต่ปลายเล็บ ฉันจะจับพวกเธอหักข้อมือตามจำนวนเล่มเลย...!!"
10050080-106 = "มะ... ไม่ได้นะคะ! สิ่งที่คุณเพิ่งพูดไป เป็นการข่มขู่ว่าจะขัดขวางการปฏิบัติหน้าที่ของชมรมทวงความ#nยุติธรรม...!"
10050080-107 = "ทำแบบนั้นไม่ถูกต้องค่ะ! ยกโทษให้ไม่ได้..."
10050080-108 = "คิดว่าสั่งได้หรือไง!?! ฉันรู้หรอกนะว่าเบื้องหลังของพวกเธอคือสภาน้ำชาน่ะ!"
10050080-109 = "สภาน้ำชา... พวกที่ลุ่มหลงในอำนาจ ดีแต่ทำเรื่องปิดบังและวางแผนร้าย...!"
10050080-110 = "อย่างนี้เองสินะ! พวกนั้นพยายามดึงห้องสมุดเก่าแห่งนี้เข้าไปอยู่ในอิทธิพลของตัวเองโดยอ้างว่าจะ#nตรวจค้นหนังสือนี่เอง! ฉันพูดถูกใช่มั้ย?"
10050080-111 = "คะ... คะ? มะ... ไม่ใช่นะคะ! ฉันไม่ได้จะหมายความแบบนั้น...!"
10050080-112 = "นี่คุณ! พวกเรากำลังปฏิบัติหน้าที่เพื่อส่วนรวมอยู่นะคะ!!!"
10050080-113 = "ใช่! ถ้ายังขัดขวางกันอยู่แบบนี้ เห็นทีต้องใช้กำลัง...!!!"
10050080-125 = "ทุกคนฟังฉันให้ดีนะ แล้วก็กลับไปบอกพวกนั้นให้ชัดเจนด้วย..."
10050080-126 = "ถ้าไม่ได้รับอนุญาตจากฉัน ไม่ว่าใครก็พาเด็กๆ ออกไปจากที่นี่ไม่ได้ จะหน้าเดียวก็ไม่ได้ ตราบใดที่ฉันยังอยู่ ฉันไม่ให้ทำอย่างนั้นแน่"
10050080-127 = "หรือพูดอีกนัยหนึ่งก็คือ ถ้าพวกเธอจะทำอย่างนั้นจริงๆ ละก็"
10050080-128 = "ต้องข้ามศพฉันไปก่อน..."
10050080-133 = "เข้าใจแล้วค่ะ..."
10050080-134 = "เห็นได้ชัดว่าหัวหน้าอุยไม่มีเจตนาที่จะให้ความร่วมมือเลยสักนิดนะคะ"
10050080-135 = "และฉันก็ได้ข้อสรุปว่าหัวหน้าโคเซกิ อุย มีความเป็นปรปักษ์และมีการกระทำที่คุกคามคำสั่งของ#nสภาน้ำชาและชมรมทวงความยุติธรรมอย่างชัดเจน"
10050080-136 = "จากนี้เป็นต้นไป ชมรมทวงความยุติธรรมจึงต้องดำเนินการตามกระบวนการยุติธรรม อย่างหลีกเลี่ยงไม่ได้ค่ะ"
10050080-137 = "อ้อ งั้นเหรอ? งั้นก็เอาตามนั้น"
10050080-138 = "ไม่ได้ทำแบบนี้มานานแล้วสินะ งั้นก็มาลุยกันสักตั้ง"
10050080-149 = "มาเลยค่ะ...!! "
10050080-154 = "[ns] \"ทุกคน หยุดดดดดด!\""
10050080-155 = "หยุดเดี๋ยวนี้เลยนะคะ!!!"
10050080-156 = "ชิมิโกะ?"
10050080-157 = "คุณครู?"
10050080-158 = "ทุกคนคะ! มีเรื่องเข้าใจผิดกันเยอะเลยค่ะ! เรามาค่อยๆ คุยกันดีกว่านะคะ!"
10050080-159 = "งะ... งั้นเหรอคะ...?"
10050080-164 = "คุณครู? คุณชิมิโกะ? ทุกคนเป็นยังไงกันบ้าง?!"
10050080-165 = "หืม? คุณโคฮารุ? ทำไมคุณโคฮารุถึงมาอยู่ที่นี่ล่ะ...?"
10050080-166 = "ฉันบอกไปแล้วไม่ใช่เหรอคะว่าไม่ควรมาน่ะ...?"
10050080-167 = "ตะ... แต่ว่า... จะไม่มาได้ยังไงล่ะ! ฉันทำไม่ได้หรอก!"
10050080-168 = "จะแห่กันมาทำไมเยอะแยะขนาดนี้ ที่นี่ไม่ใช่ตลาดสดนะ...!"
10050080-169 = "แล้วก็ ชิมิโกะ! เธอก็เป็นหนึ่งในพวกนั้นด้วยงั้นเหรอ? "
10050080-170 = "แอบคิดไว้แล้วเชียวว่าอาจมีใครเป็นหนอนบ่อนไส้ก็ได้ ตกลงเป็นเธอหรอกเหรอ?!?! นี่ละนะที่บอกว่าโลกนี้ไม่มีใครที่ไว้ใจได้เลย..."
10050080-179 = "อ๊ากกก!! ชะ... ชิมิโกะ...!!"
10050080-180 = "รุ่นพี่!! ฉันทนไม่ไหวแล้วนะ!! อีกอย่าง เมื่อกี้ว่าอะไรนะคะ? หนอนบ่อนไส้งั้นเหรอ? พูดออกมาได้ ทั้งๆ ที่ไม่รู้สถานการณ์ของคนอื่นด้วยซ้ำ...!"
10050080-181 = "และที่สำคัญ เราไม่ควรยิงคนอื่นอย่างไร้เหตุผลสิคะ นั่นมันเป็นสามัญสำนึกไม่ใช่เหรอ!! จะส่งคนไปนอนห้องพยาบาล 'อีก' กี่คนคะ...!"
10050080-182 = "ปะ... เปล่านะ...! ฉันก็แค่...!!"
10050080-183 = "ไม่ต้องแก้ตัวแล้วค่ะ!!"
10050080-192 = "อ๊ากกกกก!!"
10050080-194 = "อ่า... อืม..."
10050080-195 = "ถึงบรรยากาศจะเริ่มวุ่นวายขึ้น แต่เป้าหมายของชมรมทวงความยุติธรรมยังไม่สำเร็จค่ะ"
10050080-196 = "พวกฉันต้องสืบหาหนังสือเถื่อนให้เจอค่ะ และฉันได้ข้อสรุปแล้วว่าหนังสือเล่มนั้นน่าจะอยู่ที่นี่ค่ะ"
10050080-197 = "เหตุผลก็คือ การหมุนเวียนหนังสือที่ไม่ได้รับอนุญาตในทรีนิตี้เป็นเรื่องที่ยอมรับไม่ได้..."
10050080-198 = "ใช่ค่ะ ฉันเห็นด้วยกับที่พูดมา และฉันไม่ได้จะขัดขวางสิ่งที่พวกคุณทุกคนจะทำด้วยค่ะ"
10050080-199 = "แต่ถ้าพูดในอีกมุมหนึ่ง..."
10050080-205 = "ทุกคนคะ ฉันขอโทษค่ะ"
10050080-206 = "ฉะ... ฉันบอกให้ไปซ่อนตัวไว้ไม่ใช่เหรอ?! คะ...?"
10050080-207 = "ใช่ค่ะ คุณกำชับไว้อย่างนั้น... แต่ฉันคิดว่าทำแบบนั้นมันไม่ถูกต้องค่ะ ถ้าไล่ดูเหตุผลแล้ว ทั้งหมดนี้เป็นเพราะพวกฉันนี่คะ"
10050080-208 = "พวกฉันรู้สึกซาบซึ้งในความช่วยเหลือค่ะ แต่ก็ไม่อยากเห็นการทะเลาะระหว่างนักเรียนด้วยกันเอง เพราะพวกฉันด้วยค่ะ"
10050080-209 = "รีบออกมาเถอะค่ะ หัวหน้า เราต้องอธิบายให้ชัดเจนสิคะ"
10050080-210 = "อ่า~ ใจหนึ่งฉันอยากจะกลับไปแบบเนียนๆ เหมือนไม่มีอะไรเกิดขึ้น แต่ก็คงช่วยไม่ได้นะคะ"
10050080-211 = "หัวหน้า...?"
10050080-212 = "พวกฉันต้องขอโทษจริงๆ ค่ะ..."
10050080-213 = "สวัสดีค่ะ ทรีนิตี้ทุกคน พวกฉันคือชมรมสื่อสิ่งพิมพ์จากสหภาพเรดวินเทอร์ค่ะ"
10050080-214 = "ชมรม?"
10050080-215 = "สื่อสิ่งพิมพ์?"
10050080-216 = "ใช่ค่ะ ก่อนอื่นฉันคงต้องอธิบายว่าเหตุการณ์นี้เกิดขึ้นได้ยังไง และทำไมถึงเกิดขึ้นค่ะ"
10050080-217 = "อันที่จริงแล้วพวกฉัน..."
10050080-219 = "เอ่อ... เอาเป็นว่า... ฉันจะสรุปเรื่องราวให้ค่ะ"
10050080-220 = "สรุปได้ว่าพวกคุณชมรมสื่อสิ่งพิมพ์อยากช่วยนักเรียนชมรมแนวร่วมปลดปล่อยความรู้ที่กำลัง#nยากลำบากจนถึงกับต้องอดข้าว"
10050080-221 = "ก็เลยเดินทางมาถึงทรีนิตี้ เพื่อหาช่องทางใหม่ในการค้าขายหนังสือ... ใช่มั้ยคะ?"
10050080-222 = "ก็... ไม่ได้เพราะอยากจะช่วยเด็กพวกนั้นอย่างเดียวหรอก ก็แบบว่า... จะหาเงินด้วย..."
10050080-223 = "หัวหน้า?"
10050080-224 = "ขอโทษค่ะ..."
10050080-225 = "ฉันควรอธิบายยังไงดีนะ ถ้ามองในอีกแง่..."
10050080-226 = "ฉันอยากเผยแพร่สื่อทางวัฒนธรรมของเรดวินเทอร์ให้ผู้คนได้รู้จักมากขึ้นน่ะค่ะ"
10050080-227 = "ในเรดวินเทอร์แล้ว หนังสือพวกนั้นถือว่ามีพล็อตค่อนข้างซ้ำซาก ผู้อ่านก็เลยไม่อยากซื้อเท่าไร"
10050080-228 = "แต่โชคดีที่นักเรียนหลายคนในทรีนิตี้ดูจะชื่นชอบค่ะ"

[translation]
10050080-1 = "Episode 8;The Old Library War"
10050080-2 = "[ns] \"Huh? How did the Justice Task Force students find out...?!\""
10050080-3 = "I have no idea! They must've found a lead somewhere."
10050080-4 = "I was doing what you said and sticking with the Justice Task Force..."
10050080-13 = "...so I contacted you as soon as it happened!"
10050080-14 = "[s] \"Thank you, Koharu! You're the best, as always!\""
10050080-15 = "R-Really? Heeheehee..."
10050080-16 = "Wait, this is no time to be happy! What do we do now, Sensei?"
10050080-17 = "Huh? Call Shimiko as well...? R-Right! We'll need the Library Committee too! All right, Sensei!"
10050080-22 = "Hurry... Hurry...!"
10050080-26 = "Hello, Koharu. What's going on?"
10050080-27 = "Bad news, Shimiko!"
10050080-28 = "What...?"
10050080-30 = "That's really bad news!!"
10050080-31 = "That's what I said!"
10050080-32 = "No, the situation is SIGNIFICANTLY worse than you imagine!"
10050080-33 = "...Eh?"
10050080-34 = "There's no time to explain. I have to get to the old library right now."
10050080-35 = "You stay hidden, Koharu. No matter what happens."
10050080-36 = "Because, you see, the Justice Task Force and Ui are diametrically opposed!"
10050080-37 = "Huh? But why should I...?"
10050080-38 = "You'll just be caught in the crossfire between the two at the old library."
10050080-40 = "In the worst case, you could be mistaken for one of our contraband sellers!"
10050080-41 = "Do you understand? Until everything is over, you have to stay as far away from this case as possible!"
10050080-45 = "Caught in a crossfire... Contraband... Yeah... That does make sense..."
10050080-46 = "..."
10050080-47 = "...No. None of that matters. I have to go."
10050080-48 = "Because that's the right thing to do."
10050080-57 = "Sensei...? What is happening?"
10050080-58 = "[s] \"Ui! Thank goodness. Listen to me. Right now—\""
10050080-62 = "...More people? Seriously?"
10050080-63 = "Ugh. Whoever that is, I need to go give them a piece of my mind."
10050080-64 = "[s] \"N-No! What I'm trying to say is...\""
10050080-65 = "Are you there, President Kozeki Ui? This is Mashiro from the Justice Task Force."
10050080-66 = "The Justice...Task Force? Why...?"
10050080-67 = "Hello, President Ui. It's been a while."
10050080-68 = "...Why are you here?"
10050080-69 = "I'm here on a report."
10050080-70 = "I've received information that suspicious, unauthorized books arrived here."
10050080-71 = "Unauthorized books...?"
10050080-72 = "...Your point being?"
10050080-77 = "Yes! For that reason... We ask for your cooperation in a comprehensive investigation of the old library!"
10050080-82 = "...What?"
10050080-83 = "Compre... Comprehensive... \"Invest\"? What...?"
10050080-84 = "No, stop. What...are you trying to do?"
10050080-85 = "A comprehensive...investigation?"
10050080-86 = "You mean right now...in this place?"
10050080-87 = "...A comprehensive investigation of the old library?"
10050080-88 = "Yes, that is 100% correct!"
10050080-89 = "So you want to..."
10050080-90 = "...abduct them? Kidnap my children? Every single one of them?"
10050080-91 = "...Hm?"
10050080-92 = "Yes, well. If we find that to be necessary, yes."
10050080-93 = "Who knows what we'll find? Is that an issue?"
10050080-97 = "That's why I am requesting your cooperation!"
10050080-98 = "As long as you conduct yourself with justice, you have nothing to hide and—"
10050080-99 = "SHUT YOUR TRAP!!"
10050080-103 = "You want to take my children?! Who do you think you are? Upon whose grounds do you think your vile feet are treading right now?"
10050080-104 = "Mark every single one of my words with the utmost care."
10050080-105 = "For every one of my children you attempt to abduct... If you so much as try to lay a finger on my books... I'll break all of them. Your fingers, your hands, your wrists—"
10050080-106 = "H-Halt! You just threatened the Justice Task Force and attempted to impede justice."
10050080-107 = "I cannot tolerate such—"
10050080-108 = "That's my line! And I know those Tea Party illiterates are the ones behind all this anyway!"
10050080-109 = "Tea Party... Those conspiring, censoring authoritarians!"
10050080-110 = "I see right through you! This is the Tea Party's play to finally absorb the old library. This investigation's just a pathetic front for your evil, book-hating ways."
10050080-111 = "...Uh, huh? N-No! That's not what I...!"
10050080-112 = "Excuse me, we're here on official Justice Task Force business!"
10050080-113 = "That's right! If this is how you want to play it, we're not afraid to use force...!!"
10050080-125 = "Listen very carefully to me, each of you. And know I mean every single word that I say."
10050080-126 = "Not even a single page of my children will be carried out of here without my permission. I will not allow that to happen."
10050080-127 = "In other words, if that's what you want to do..."
10050080-128 = "...it'll be over my shattered halo."
10050080-133 = "...Understood."
10050080-134 = "What I understand perfectly well is that President Ui has no desire to cooperate."
10050080-135 = "I also understand that President Kozeki Ui is presenting clear hostility and is a threat toward the Tea Party's order and the Justice Task Force."
10050080-136 = "The Justice Task Force will now proceed with the unavoidable execution of justice."
10050080-137 = "Oh yeah? Sure."
10050080-138 = "...Well, it's been a while. Fine. Just try to take my children from me."
10050080-149 = "...Challenge accepted! "
10050080-154 = "[ns] \"STOOOOOOP!\""
10050080-155 = "Nobody move!!"
10050080-156 = "Shimiko?"
10050080-157 = "Sensei?"
10050080-158 = "Everyone, please! This is simply a severe misunderstanding amongst friends. This can be sorted out without violence."
10050080-159 = "I-Is that so...?"
10050080-164 = "Sensei? Shimiko? Is everyone all right?!"
10050080-165 = "Huh? Koharu? What are you...?"
10050080-166 = "Didn't I warn you to keep yourself safe?"
10050080-167 = "B-But...I can't do that! What's wrong is wrong, no matter what!"
10050080-168 = "More importantly, why do you pests just keep coming? This isn't your common room!"
10050080-169 = "And Shimiko! You've betrayed me?! "
10050080-170 = "I did suspect an informant, but to think that it was you... Trust really is a limited resource these days—"
10050080-179 = "GYAAAH!! SH-SHIMIKOOO!"
10050080-180 = "Ui! You couldn't exercise even a moment of self-restraint? And what's this nonsense? An informant? When you have no idea what I've gone through?!"
10050080-181 = "Moreover, STOP SHOOTING PEOPLE! Just how many more incidents am I going to have to clean up on your behalf?"
10050080-182 = "N-No...! I was just...!!"
10050080-183 = "Not a word!!"
10050080-192 = "GAAAAAAHHH!! HELP ME!"
10050080-194 = "Oh. Um..."
10050080-195 = "While the scene has been flipped on its head, we still need to fulfill our objective."
10050080-196 = "We've received intel that the unauthorized books are being stored here. And now I'm almost certain they must be."
10050080-197 = "We cannot allow the circulation of unauthorized material in Trinity."
10050080-198 = "Yes, I agree with that statement. I'm not trying to stop you."
10050080-199 = "However, I do have something to—"
10050080-205 = "I'm sorry, everyone."
10050080-206 = "Didn't I tell you to hide?! ...Ma'am?"
10050080-207 = "Yes, you did...but this isn't right. This is all our fault."
10050080-208 = "We're so grateful for the help we've received, but I cannot turn a blind eye while causing conflict among comrades."
10050080-209 = "Now, come out, President. You have to speak your piece."
10050080-210 = "Ah, fiddlesticks. I was really hoping to sneak out like I was never really here."
10050080-211 = "...President?"
10050080-212 = "I'm sorry..."
10050080-213 = "Hello, Trinity. We're from Red Winter's Publishing Department."
10050080-214 = "Publishing..."
10050080-215 = "...Department?"
10050080-216 = "That's right. First, I should explain why this happened, and why we decided to do this."
10050080-217 = "To tell you the truth, we—"
10050080-219 = "Uh... That's... So, to summarize..."
10050080-220 = "In an effort to help the starving Knowledge Liberation Front students..."
10050080-221 = "...you came all the way to Trinity in hopes of helping them by securing a new distribution channel?"
10050080-222 = "Well... Rather than helping them, well, it's more about the money..."
10050080-223 = "President?"
10050080-224 = "Ah, sorry."
10050080-225 = "But well, in some ways..."
10050080-226 = "Well, nothing in Red Winter sees the light of day. I did think it'd be nice for people from another school to experience our culture."
10050080-227 = "Also, the plotlines in that book have been used and reused in Red Winter, so there was no demand for it."
10050080-228 = "And thankfully, more than a few Trinity students seemed to like it."
10050080-229 = "That...is definitely true..."
10050080-230 = "That's why we, at the Justice Task Force, had to start tracking down the books as a collaborative operation with the Library Committee..."
10050080-231 = "To think, Trinity students were helping the Red Winter Publishing Department..."
10050080-232 = "Now I understand why we were running into so many brick walls."
10050080-233 = "Is that...what was happening, Shimiko...?"
10050080-234 = "Yes, President. Please look up every once in a while and see what's going on outside of this library."
10050080-235 = "This should have been your responsibility, not mine."
10050080-236 = "N-N-No... That's too cruel a punishment for me..."
10050080-237 = "Anyway, I think culture is meant to be shared."
10050080-238 = "Culture that stagnates will eventually hold people back."
10050080-239 = "And it doesn't make any money."
10050080-240 = "Of course, we didn't initially come to Trinity with such grand ideas in mind."
10050080-241 = "But seeing how much the Trinity students enjoyed our books has put me in a reflective mood, I suppose."
10050080-242 = "Huh? Is that really the case, President?"
10050080-243 = "Hm... Let me put it this way. Some things are better left unsaid."
10050080-244 = "Ugh. Using my words against me..."
10050080-245 = "This president title isn't just for show, you know. Heh, heh, heh."
10050080-247 = "Regardless of the situation, however, these books are still considered contraband."
10050080-251 = "[ns] \"Can't the Library Committee authorize them?\""
10050080-252 = "The Library Committee...?"
10050080-253 = "Yes. The Library Committee manages the circulation of books distributed throughout Trinity."
10050080-254 = "If we were to officially authenticate the Publishing Department's books, they would no longer be considered contraband."
10050080-255 = "Naturally, we would need to make some adjustments to adhere to Trinity's guidelines."
10050080-256 = "I did figure even our toned-down version was a little intense."
10050080-257 = "One could absolutely have surmised..."
10050080-262 = "[ns] \"Isn't following school procedures its own kind of justice?\""
10050080-263 = "That is a new perspective! Thank you for broadening my horizons!"
10050080-264 = "Even here, where justice was nearly dismantled, we were able to reestablish it with procedures!"
10050080-265 = "I'm truly impressed, Sensei! Thank you!"
10050080-266 = "[s] \"Mhm. Yup. I'm glad that made sense to you.\""
10050080-267 = "Come to think of it, what was your opinion on the book, President?"
10050080-268 = "H-Huh? Wh-Why me...?"
10050080-269 = "Well, I assume you've read it already."
10050080-270 = "How did you know...?"
10050080-271 = "Fufu. Just how long have we worked together?"
10050080-272 = "I can't hide anything from you..."
10050080-273 = "*sigh* Well, it was a good book. In my opinion."
10050080-274 = "The Publishing Department has a certain...earnestness that is woven into the story. It's easy to feel the passion that went into their work."
10050080-275 = "...These days, most books are brow-beating slop that utterly disregard the dignity of the written word... I...could never forgive an author who has sold their soul, and I don't believe this book does that."
10050080-276 = "So the final verdict?"
10050080-277 = "It's...fine. And the content poses no issue to me."
10050080-278 = "However, I'm only one person. Do what you think is best, Shimiko."
10050080-279 = "Understood."
10050080-280 = "Thank you, Library Committee. Then that's what I will report for this case."
10050080-281 = "[s] \"I'll come with you.\""
10050080-282 = "I'll tag along as well, since I'm sure the president doesn't wish to."
10050080-283 = "I'm not going."
10050080-284 = "But there's no need for the two of you to..."
10050080-285 = "..."
10050080-286 = "Never mind. Thank you for your cooperation until the end."
10050080-287 = "After all, this mission was intended to be a collaboration between the Justice Task Force, the Library Committee, and Sensei from the beginning."
10050080-288 = "I'm glad things worked out, everyone."
10050080-289 = "Then, let us all read the book, now authorized by the Library Committee President!"
10050080-290 = "Yes! We want to see, too!"
10050080-291 = "*gulp*"
10050080-292 = "[s] \"(Wait, is this...?!)\""
10050080-296 = "...!"
10050080-297 = "This is quite...?"
10050080-304 = "..."
10050080-305 = "KYAAAH?!"
10050080-307 = "DEATH PENALTY!!"

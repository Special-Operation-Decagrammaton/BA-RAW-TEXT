[translation]
13120-1 = "Episode 12;The Foreclosure Task Force's Beginning"
13120-4 = "Abydos High School Bicycle Parking"
13120-7 = "Heh. That was a bit aggressive of me... "
13120-8 = "What's your name, petty thief?"
13120-12 = "...Shiroko. Sunaookami Shiroko."
13120-14 = "Hm, that's a nice name. So, Shiroko, whatcha doing all the way out here? "
13120-15 = "..."
13120-16 = "This place might be in ruins and all, but it's still an Abydos satellite...well, actually, Abydos High School."
13120-17 = "I've never seen that uniform before."
13120-18 = "Right? And it's way too thin to be a winter uniform. "
13120-21 = "Hey, what school are you from, Shiroko?"
13120-22 = "...I don't know."
13120-23 = "...?"
13120-24 = "I just...woke up here. I don't remember anything. Except my name."
13120-25 = "Wh-What kinda story you selling here? Is amnesia a new thing the kids are trying these days? This old-timer must be out of the loop."
13120-26 = "(Old-timer...?)"
13120-27 = "D-Do you mean your name is the only thing you know about yourself? No academy? No phone number? Nothing else at all?"
13120-31 = "*nod*"
13120-33 = "Wh-What should we do, Hoshino?"
13120-34 = "Hm... What a pain. "
13120-38 = "Let's get inside and continue this conversation, Shiroko. This isn't exactly a good place to share a cup of tea. "
13120-39 = "Huh?! W-We're taking her with us?"
13120-45 = "Here, it's cold. Put this on."
13120-46 = "A scarf...?"
13120-47 = "It's not much, but it'll help keep you warm, at least a little bit. "
13120-48 = "..."
13120-49 = "There. Better?"
13120-50 = "...Mhm. "
13120-54 = "...Warm..."
13120-57 = "Heh, heh. Lookin' good, Shiroko. Now, this old-timer bought that scarf on sale, but you still better take good care of it. "
13120-58 = "Yeah. I will."
13120-64 = "..."
13120-65 = "Why're you looking at me like that, Nonomi? "
13120-66 = "You keep calling yourself an \"old-timer\"... "
13120-67 = "Oh? Do I...?"
13120-68 = "Plus, you just did this \"heh\" laugh that I've never heard you do before."
13120-69 = "R-Really? Aren't you imagining things? It's just my old-timer laugh."
13120-70 = "You said \"old-timer\" again..."
13120-71 = "Ah!"
13120-76 = "A-Achoo!"
13120-80 = "W-We gotta get indoors! Shiroko's nose is starting to run!"
13120-81 = "Ah, you're right! Hurry, Shiroko, it's this way! "
13120-92 = "Heh. A perfect fit. Some student left this uniform behind, but they barely wore it. It's practically new."
13120-93 = "Um."
13120-94 = "I hope you don't mind for now, Shiroko. I'll buy you a new outfit as soon as I can."
13120-95 = "No. It's okay. "
13120-96 = "Well, it's just...that's an Abydos uniform..."
13120-97 = "*shakes head*"
13120-99 = "Heh. She likes it."
13120-100 = "I could at least buy her a new uniform. That one's an old design... Well, I suppose if she likes it..."
13120-108 = "We have to force our way in. "
13120-109 = "Are we back to that? How are the five of us supposed to break through hundreds of troops?"
13120-110 = "We can do it with proper preparations. We'll need intel on the number of troops, supply lines, their scouting routes, and any CCTV locations."
13120-111 = "No way! I know you're good at robbing banks, but this is totally different!"
13120-112 = "Yeah... But if it's Hoshino..."
13120-119 = "...Hoshino? "
13120-120 = "Heh. My bad. I was just reminiscing on the good ole days. "
13120-121 = "To think, just a year ago, Shiroko was an adorable little girl with a runny nose. Now, she's a grown-up high schooler delivering terrifying lines like she's reading the news."
13120-123 = "Yup, yup! It was like that, once upon a time! ♧"
13120-125 = "U-Um... Why are we talking about the past...? "
13120-126 = "When I look at Shiroko, I get a little sad sometimes. Where did that cute little kid go...? "
13120-127 = "You're not even that far apart in age! And it was just a year ago!"
13120-132 = "You're still super cute, Shiroko, so it's okay!"
13120-133 = "Hm..."
13120-135 = "Yeah, it's already been a year since we created the Foreclosure Task Force."
13120-140 = "..."
13120-141 = "...Mhm. "
13120-151 = "Huh...? Shiroko? "
13120-155 = "Bring it on. It's a showdown."
13120-160 = "Sh-Shiroko?! A showdown?!"
13120-162 = "I don't listen to anyone who's weaker than me."
13120-163 = "So, let's fight, Hoshino."
13120-164 = "Heh. Is this the fiery challenge of youth...?"
13120-165 = "Okay, I got it. I'll take you on."
13120-170 = "What?! Hoshino?! "
13120-172 = "But, just so you know, I've never lost a one-on-one fight in my life. I might even be the strongest person in Kivotos. You still wanna go, Shiroko?"
13120-173 = "Yeah. I've fought you once, so I won't lose this time."
13120-174 = "Hm... What happens if you lose, then? Do I get to do whatever I want to you?"
13120-175 = "Fine. Whatever you want."
13120-176 = "Heh. No take backsies, okay? If you lose, you have to stay in Abydos forever. You'll have to accept this old-timer as your upperclassman."
13120-177 = "Like I said. Whatever you want."
13120-179 = "H-Hoshino?!"
13120-200 = "Excuse me! What's all this, Shiroko?! "
13120-201 = "The whole pile appears to be scrap metal. Screws, bolts, empty shell casings... Where did you get these?"
13120-203 = "Mm. Stole them."
13120-206 = "What?!"
13120-207 = "S-Stole them?! From where? "
13120-209 = "From the scrap dealer in town. I can earn money if I resell it to that scrap dealer. And help pay off the school's debt."
13120-210 = "Reselling to the place you stole them from?! I guess that's inspired?!"
13120-211 = "Call them, Nonomi! Right now!"
13120-216 = "Yes! Okay! "
13120-218 = "Shiroko!! You can't do stuff like that! "
13120-222 = "Why not?"
13120-223 = "Why...? Well, because... "
13120-228 = "So this is where you ran off to! You stole my truck!"
13120-234 = "H-Huh?! "
13120-236 = "Truck?! What truck? Shiroko?! You stole a truck too? "
13120-237 = "Yeah. The whole truck. I killed two birds with one stone."
13120-238 = "I'm sorry! I'm sorry! Our Shiroko here, she doesn't know any better!"
13120-239 = "I-I'm sorry... I have a credit card, so I'll cover any damages!"
13120-240 = "No, no. First things first! We have to properly repent, Nonomi!"
13120-241 = "Huh?! Yes, yes!! We're sorry! We're really, truly sorry!"
13120-242 = "You too, Shiroko!"
13120-244 = "Okay... I'm sorry."
13120-245 = "You think I'll just let it slide like that? Huh?!"
13120-248 = "Okay, just this once. Don't ever let me catch you again!"
13120-250 = "Y-Yes..."
13120-251 = "Thank goodness he's letting us off the hook."
13120-252 = "Right, Shiroko?"
13120-253 = "Yeah. Next time, I won't get caught."
13120-254 = "No, that's not the lesson to be learned from this!"
13120-259 = "...Well, its fine. "
13120-260 = "I had thought all the students at Abydos turned tail already. I guess there are some still left. "
13120-262 = "..."
13120-263 = "Well, stop by if you ever have any scrap to sell."
13120-269 = "I'll see you around, Abydos students."
13120-275 = "..."
13120-281 = "...Oh? "
13120-285 = "Hoshino! Shiroko! Come, look! The cherry blossoms are budding!"
13120-290 = "Heh. Would you look at that? "
13120-291 = "...Winter is finally ending."
13120-292 = "Yeah...before we even realized..."
13120-293 = "Mhm. Even though it felt never-ending at one point... "
13120-297 = "What're you gonna do, Nonomi? Isn't it time for you to head back? You're supposed to be enrolled in the other school... "
13120-301 = "..."
13120-302 = "Their entrance ceremony is probably starting soon. Are you gonna be okay here?"
13120-318 = "Shiroko, Nonomi, smile!"
13120-319 = "Mm. Cheese."
13120-320 = "D-Do we really have to do this?"
13120-321 = "Duh! When you've got something to celebrate, you have to commemorate it with a pic!"
13120-337 = "But, you know, isn't it hot, Shiroko? Why don't you take the scarf off?"
13120-338 = "No. I'm okay. "
13120-348 = "There we go. This is now the official Abydos Foreclosure Task Force club room!"
13120-351 = "Yes!"
13120-352 = "Yeah. You can count on me. I've come up with eight different plans."
13120-353 = "P-Plans...? What kinds, exactly...?"
13120-355 = "Rejected."
13120-360 = "Yup, yup! Now, please hear out my plan. ☆"
13120-361 = "I'll use this gold card to—"
13120-363 = "Double rejected."
13120-368 = "Huh...?! "
13120-371 = "..."
13120-372 = "... "
13120-374 = "Wh-What is this?! Did you guys activate some kind of reminiscing-mode? "
13120-375 = "Ayane! Snap them out of it somehow!"
13120-376 = "Hahaha. I think we feel a little bit left out, since you're reminiscing on times when we weren't around...but I understand it's a kind of privilege for upperclassmen."
13120-378 = "Heh. You could put it that way. But I can remember when Ayane and Serika first joined, too."
13120-379 = "Yup, yup! They were just the cutest!"
13120-380 = "Yeah."
13120-384 = "E-Excuse me! Are you all students of Abydos?"
13120-385 = "We want to enroll at Abydos High School too! "
13120-386 = "Yes! We would like to be of service to Abydos' future! "
13120-387 = "Exactly! Was it called the Revival Committee?"
13120-388 = "Serika... It's the Foreclosure Task Force. "
13120-389 = "Whatever she said! We're joining, okay? So please take good care of us!"
13120-390 = "Yes! Looking forward to working with you!"
13120-392 = "W-What are you doing?! Don't pull us into your reminiscing-mode!"
13120-393 = "Haha... It's not like that didn't happen..."
13120-395 = "Yes! With this, our five-member Abydos idol plan commences! ♧"
13120-396 = "Leave this old-timer out of it. That's a job for the youngins."
13120-400 = "Then maybe a two-member group comprised of fresh, first-year students? "
13120-406 = "Yeah. I like that."
13120-407 = "Heh. Now that I can get behind. I'm getting excited!"
13120-409 = "What're you plotting?! Stop talking about us like we're fresh produce!"
13120-410 = "I agree. If we do it, we all need to do it together. "
13120-423 = "...I absolutely don't want the Foreclosure Task Force to disappear."
13120-428 = "Nonomi?"
13120-430 = "I would say there's really only one possible option... We'll have to find a way to successfully attend the general creditors' meeting."
13120-431 = "That'll mean forfeiting either the Abydos Student Council or the Foreclosure Task Force. I know it's just a name, and it doesn't matter too much at the end of the day, but..."
13120-432 = "I still just...don't like the idea of the Foreclosure Task Force being gone."
13120-433 = "I was able to find the strength to stay in Abydos thanks to Shiroko. And it's thanks to her, along with everyone else, that Hoshino is able to laugh and smile every day, now. "
13120-434 = "The Foreclosure Task Force...it means more to me than just its name..."
13120-435 = "Nonomi..."
13120-437 = "..."
13120-438 = "What do you think, Shiroko?"
13120-439 = "Me? I..."
13120-440 = "To me...the Foreclosure Task Force is...um..."
13120-441 = "...the most important place in the world. I know that, even if you don't say it out loud. The Foreclosure Task Force is everything to you, isn't it?"
13120-442 = "...Well, um..."
13120-444 = "But if you flip the situation around, isn't it the same for you, Hoshino?"
13120-445 = "U-Um... Me?"
13120-446 = "The Abydos Student Council... It must be filled with memories of you and President Yume...memories we can't even begin to know or understand..."
13120-447 = "It's too much...to think about all of that going away..."
13120-448 = "N-No. Don't sweat it. I'm not really the type to cling to things like that, you know?"
13120-449 = "That's not true. You never gave up your association with the Abydos Student Council, even after we made the Foreclosure Task Force."
13120-450 = "You've always been a part of the Foreclosure Task Force...but also the Abydos Student Council."
13120-451 = "Are you really okay with letting go of your last tie to President Yume? Hoshino?"
13120-452 = "I'd be lying if I said all of that meant nothing to me, but..."
13120-453 = "Didn't you refuse to take on the role of president for Yume?"
13120-457 = "Ah, geez. Yeah. It felt like I'd be accepting Yume's death if I became president... "
13120-458 = "So...you're not wrong there."
13120-459 = "But I can say one thing for certain..."
13120-460 = "Preventing the Train Cannon from falling into the hands of the villains is more important than preserving a name."
13120-462 = "..."
13120-463 = "..."
13120-468 = "I might never find out why Yume wrote that contract, or what even happened, but..."
13120-470 = "Hoshino, you can't live your life being suspicious of everyone you come across. Accepting violence and lies as the norm...taking them for granted..."
13120-471 = "If we do that, one day we'll wake up and realize we've become the people we hate the most."
13120-472 = "You're right. We might be able to save Abydos using your methods. But it won't be our Abydos anymore."
13120-473 = "I can't bear the thought of Abydos becoming synonymous with lies and violence. "
13120-474 = "That would make me...sad."
13120-477 = "This Train Cannon of theirs...it's a direct contradiction to the kind of Abydos Yume was trying to build."
13120-478 = "So I have to find the Train Cannon and destroy it. "
13120-479 = "For that, I'm okay with letting go of a name."
13120-484 = "..."
13120-485 = "..."
13120-486 = "..."
13120-487 = "..."
13120-489 = "And if I had to choose one, I think the Foreclosure Task Force is better. "
13120-490 = "Because the Abydos Student Council is just me now. But the Foreclosure Task Force...it's Shiroko, Nonomi, Ayane, and Serika. It feels like the right choice."
13120-491 = "But...still..."
13120-492 = "We have to focus on the problem at hand, Nonomi."
13120-493 = "And our problem is that, regardless of if we're the Foreclosure Task Force or the Abydos Student Council, we still have to find a way to make it to the general creditors' meeting."
13120-494 = "Our priority isn't names, it's figuring out how to get past hundreds of troops and get inside the building. "
13120-495 = "...You're right."
13120-497 = "Yeah, understood..."
13120-498 = "We all on the same page?"
13120-500 = "Yes! It's settled."
13120-504 = "Tomorrow at noon, we'll break through the private equity fund's troops guarding the Abydos Central Station District Office and certify the continuation of the sales contract!"
13120-505 = "But how exactly are we going to do that?"
13120-506 = "Figuring that out will be our next step... "
13120-507 = "To start, none of this will be possible without Sensei's help. In reality, even with Sensei's help, it's going to be difficult."
13120-508 = "Speaking of, have you heard from them yet? Sensei said they'd come by today, but it's pretty late already..."
13120-509 = "You're right... Well, I'm sure they have a full plate... "
13120-511 = "Hm..."
13120-512 = "You don't suppose...something happened to them, do you? "
13120-521 = "KYAAAH?!"
13120-525 = "Wh-What is it, Ayane?"
13120-526 = "Y-You okay?! "
13120-527 = "The news...?"
13120-532 = "...And now, to our next story. Early this morning, an unexplained explosion rocked the Schale building, located in D.U. Authorities have confirmed that [USERNAME] Sensei was inside the building at the time of the incident..."
13120-536 = "Wh-What?!"
13120-537 = "!!"
13120-539 = "They were swiftly transported to the hospital. As speculation continues to swirl about the cause of the building's explosion, doctors..."
13120-541 = "Next Episode;Hostage"

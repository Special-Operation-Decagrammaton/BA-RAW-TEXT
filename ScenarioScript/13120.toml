13120-97 = "(ขยับตัว)"
13120-99 = "แหะๆ คงจะถูกใจชุดนักเรียนเลยนะ?"
13120-100 = "แต่มันเป็นดีไซน์แบบเก่าน่ะ ถ้าซื้อใหม่ก็น่าจะดีกว่านี้อยู่หรอก... อืม แต่ถ้าชิโรโกะจังถูกใจละก็นะ..."
13120-108 = "เหลือวิธีเดียวคือการฝ่าเข้าไป "
13120-109 = "อะไรกัน วกเข้าเรื่องนี้อีกแล้วเหรอ? ถ้ามีคนขวางเป็นร้อยๆ คน เราจะฝ่าเข้าไปยังไง?"
13120-110 = "อืม เราถึงต้องเตรียมตัวกันให้รอบคอบตั้งแต่ตอนนี้ไง ยังไงเราก็ทำได้ แล้วถ้าเรารู้จำนวนกองกำลัง เส้นทางการสอดแนม เส้นทางเสบียง กล้องวงจรปิด..."
13120-111 = "เดี๋ยวก่อน นี่ไม่ใช่การปล้นธนาคารสักหน่อย มันไม่ใช่เรื่องถนัดของรุ่นพี่ชิโรโกะนะ!"
13120-112 = "อืม... แต่ถ้าเป็นรุ่นพี่โฮชิโนะละก็..."
13120-119 = "รุ่นพี่...? "
13120-120 = "แหะๆ~ พอดีจู่ๆ ก็นึกถึงเรื่องเมื่อก่อนขึ้นมาน่ะ "
13120-121 = "เมื่อปีก่อนชิโรโกะจังยังเป็นเด็กน้อยน่ารักที่น้ำมูกไหลอยู่เลย แต่ตอนนี้เป็นเด็กม.ปลายที่มากับบทพูด#nน่ากลัวๆ แล้ว"
13120-123 = "อื้ม ใช่ค่ะ ฉันก็จำได้ แต่ก่อนเป็นอย่างนั้นเลยค่ะ♧"
13120-125 = "อะ... อืม... เรื่องเมื่อสมัยก่อนงั้นเหรอ... "
13120-126 = "เวลาลุงเห็นชิโรโกะจัง บางทีก็มีตอนที่รู้สึกเหงานะ กาลเวลาใจร้ายกับลุงจังเลย เด็กน่ารักคนนั้นไปไหนแล้วนะ... "
13120-127 = "เดี๋ยวสิ เราอายุไม่ได้ต่างกันมากสักหน่อย! แล้วนั่นมันก็เรื่องแค่ปีที่แล้วเองไม่ใช่เหรอ?"

[translation]
13120-1 = "ตอนที่ 12;การเริ่มต้นของคณะกรรมการแผนงาน"
13120-4 = "ที่จอดจักรยาน โรงเรียนอะบิดอส"
13120-7 = "เฮ้อ รุนแรงไปหน่อยมั้ยเนี่ย... "
13120-8 = "เธอชื่อว่าอะไรนะ หัวขโมยจัง?"
13120-12 = "...ชิโรโกะ สึนาโอกามิ ชิโรโกะ"
13120-14 = "อืม... อย่างนี้นี่เอง ชิโรโกะจัง ว่าแต่มาทำอะไรอยู่ตรงนี้ล่ะ? "
13120-15 = "..."
13120-16 = "ฉันเข้าใจว่าที่นี่ดูเหมือนพื้นที่รกร้าง แต่ที่นี่เป็นสาขาย่อย... ไม่สิ... เป็นสาขาแม่ของอะบิดอสนะ"
13120-17 = "เครื่องแบบนี้... ไม่เคยเห็นมาก่อนเลย..."
13120-18 = "เนอะ? แถมใส่มาแค่นี้ในวันที่อากาศแบบนี้คงจะหนาวน่าดูเลย "
13120-21 = "นี่ ชิโรโกะจัง เธอมาจากโรงเรียนไหนเหรอ?"
13120-22 = "...ไม่รู้สิ"
13120-23 = "...?"
13120-24 = "...พอได้สติ ตัวฉันก็มาอยู่ที่นี่แล้ว นอกจากชื่อฉันแล้ว ก็จำอะไรอื่นไม่ได้เลย..."
13120-25 = "อะ... อะไรกัน... หมายความว่ายังไงน่ะ?! อย่าบอกนะว่าความจำเสื่อม? เดี๋ยวนี้มันมีโรคอะไรแบบนี้#nระบาดเหรอ? ลุงไม่เห็นรู้มาก่อนเลย?"
13120-26 = "(ลุงเหรอ...?)"
13120-27 = "ปะ... แปลว่าชิโรโกะจังไม่รู้อะไรเลยนอกจากชื่อของตัวเองเหรอคะ? ทั้งโรงเรียน... เบอร์โทรศัพท์... แล้วก็อีเมลด้วย...?"
13120-31 = "(พยักหน้า)"
13120-33 = "ทะ... ทำยังไงดีคะ รุ่นพี่โฮชิโนะ?"
13120-34 = "ฮืม... น่าปวดหัวจริงๆ เลย..."
13120-38 = "เราเข้าไปคุยกันข้างในดีกว่า ชิโรโกะจัง ตรงนี้ไม่ใช่ที่ที่ควรมายืนคุยกันหรอกนะ  "
13120-39 = "คะ?! จะ... จะพาไปด้วยเหรอคะ?"
13120-45 = "เอ้านี่ เอาอันนี้ไปใช้ก่อน จะได้ไม่หนาว"
13120-46 = "ผ้าพันคอ...?"
13120-47 = "ใช่ ถึงจะช่วยได้นิดเดียวก็เถอะ "
13120-48 = "..."
13120-49 = "เป็นไงบ้าง รู้สึกดีขึ้นมั้ย?"
13120-50 = "อืม... "
13120-54 = "อบอุ่นจัง"
13120-57 = "แหะๆ~ เหมาะกับชิโรโกะจังดีนะ ลุงซื้อผ้าพันคอผืนนั้นมาตอนลดราคาน่ะ แต่ยังไงก็ต้องรักษาให้ดีๆ เลยนะรู้มั้ย? "
13120-58 = "อืม เข้าใจแล้ว"
13120-64 = "..."
13120-65 = "หือ? ทำไมเหรอ โนโนมิจัง"
13120-66 = "เมื่อกี้รุ่นพี่โฮชิโนะแทนตัวเองว่าลุง... "
13120-67 = "หืม? งั้นเหรอ...?"
13120-68 = "แถมเมื่อกี้ยังหัวเราะแหะๆ ด้วย... ฉันเพิ่งเคยเห็นรุ่นพี่โฮชิโนะหัวเราะเป็นครั้งแรกเลยค่ะ"
13120-69 = "งะ... งั้นเหรอ? เข้าใจผิดไปเองหรือเปล่า? ปกติลุงก็หัวเราะแบบนั้นอยู่แล้วนะ..."

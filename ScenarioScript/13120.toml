13120-76 = "ฮะ... ฮัดชิ่วว!"
13120-80 = "ระ... รีบเข้าไปข้างในกันเถอะ! ชิโรโกะจังน้ำมูกไหลแล้วนะ!"
13120-81 = "อ๊ะ ค่ะ! ชิโรโกะจัง มาทางนี้เร็ว! "
13120-92 = "แหะๆ~ พอดีเลยนะ นี่เป็นชุดนักเรียนที่พวกนักเรียนทิ้งไว้น่ะ แต่ก็ไม่ค่อยได้ใส่สักเท่าไร ไม่ต่างจากของใหม่เลยละ"
13120-93 = "อืม"
13120-94 = "ทนเอาไว้ก่อนนะคะ ชิโรโกะจัง ไว้ฉันจะซื้อชุดใหม่ให้นะคะ"
13120-95 = "ไม่หรอก ไม่เป็นไร "

[translation]
13120-1 = "第12話;對策委員會的起點"
13120-4 = "阿拜多斯高中．停車場"
13120-7 = "唉呀，是不是有點太粗暴了……"
13120-8 = "你叫什麼名字？"
13120-12 = "……白子。砂狼白子。"
13120-14 = "嘿……你叫白子醬啊。#n那白子醬在這裡做什麼呢？"
13120-15 = "……"
13120-16 = "這裡雖然看起來像廢墟……姑且還是阿拜多斯分校──#n不，是阿拜多斯本校唷。"
13120-17 = "你的制服……以前從來沒見過。"
13120-18 = "對吧？而且，穿那麼薄會冷的唷。"
13120-21 = "那個，白子醬是哪個學園的學生呢？"
13120-22 = "……不知道。"
13120-23 = "……？"
13120-24 = "醒來之後就在這裡了。#n除了名字之外……什麼都不記得……"
13120-25 = "你，你說的……難道是喪失記憶！？#n最近流行的那個？大叔我不太了解那些呢～"
13120-26 = "（大叔……？）"
13120-27 = "那……白子醬除了名字之外，什麼都不知道嗎？#n上課的學園、電話號碼、電子郵件也是……？"
13120-31 = "（點頭）"
13120-33 = "星，星野前輩，怎麼辦呢？"
13120-34 = "嗯～真傷腦筋。"
13120-38 = "總之……先到裡頭去吧，白子醬。"
13120-39 = "咦！？要，要帶他一起走嗎？"
13120-45 = "這個，你拿去圍著吧～"
13120-46 = "圍巾……？"
13120-47 = "嗯。有總比沒有好吧。"
13120-48 = "……"
13120-49 = "怎麼樣？感覺好一點了對吧？"
13120-50 = "……嗯。"
13120-54 = "很溫暖。"
13120-57 = "唔嘿～很適合你耶，白子醬。#n雖然那條圍巾是大叔趁打折的時候買的，但你還是要好好珍惜，知道嗎？"
13120-58 = "嗯，知道了。"
13120-64 = "……"
13120-65 = "嗯，怎麼啦？野乃美醬。"
13120-66 = "星野前輩剛才說自己是大叔……"
13120-67 = "嗯？我有嗎……？"
13120-68 = "而且還「唔嘿～」了一聲……#n我還是第一次看見星野前輩笑……"
13120-69 = "有，有嗎？會不會是你搞錯了？#n大叔我平常也是這樣笑的呀……"
13120-70 = "又說自己是大叔……"
13120-71 = "啊……"
13120-76 = "哈，哈啾──"
13120-80 = "趕，趕快進去吧！白子醬已經在流鼻水了！"
13120-81 = "啊，是！白子醬，快進來吧！"
13120-92 = "唔嘿～剛剛好耶。#n雖然是之前的學生丟棄的校服，但幾乎沒穿過，就跟新的一樣。"
13120-93 = "嗯。"
13120-94 = "先穿這個將就一下吧，白子醬。#n以後我再買新的給你。"
13120-95 = "不用了，沒關係。"
13120-96 = "可是……這畢竟是阿拜多斯的校服……"
13120-97 = "（搖頭）"
13120-99 = "哦，你好像很喜歡這件校服嘛？"
13120-100 = "可是這是舊款的設計，還是該買新的比較好……#n算了，白子醬喜歡的話也行吧……"
13120-108 = "果然只能強行突破了。"
13120-109 = "怎麼突然又在說這個？#n要怎麼突破有數百人看守的地方啊？"
13120-110 = "現在開始做準備的話，總會有辦法的。#n必須掌握看守的兵力數量、偵察兵的動線、補給線、監視器等等……"
13120-111 = "不是，這跟搶銀行完全不一樣好嗎？#n這不是白子前輩的專業領域！"
13120-112 = "唔嗯……但是星野前輩……"
13120-119 = "……前輩？"
13120-120 = "唔嘿～沒什麼啦。只是突然想起了一些往事而已。"
13120-121 = "白子醬在1年前還有流著鼻水的可愛一面，#n現在卻變成會說出可怕台詞的女高中生了呢。"
13120-123 = "嗯嗯。確實有過那種時候呢♧"
13120-125 = "唔，唔嗯……怎麼突然提以前的事……"
13120-126 = "大叔我看著白子醬的時候，偶爾就會覺得有點寂寞呢。#n歲月真是無情，那麼可愛的孩子究竟到哪裡去了……"
13120-127 = "不是，年紀根本沒差多少吧！而且那不是才1年前的事嗎？"
13120-132 = "而且白子醬還是一樣很可愛，沒問題的。"
13120-133 = "嗯……"
13120-135 = "說的也是。#n對策委員會成立之後，已經過去1年了呢。"
13120-140 = "……"
13120-141 = "……嗯。"
13120-151 = "咦……？白子醬？"
13120-155 = "放馬過來，一決勝負吧。"
13120-160 = "白子醬！？#n一，一決勝負！？"
13120-162 = "我不聽比我弱的人說的話。"
13120-163 = "所以放馬過來，星野。"
13120-164 = "哎呀……真是的。#n年輕人就是熱血方剛的……"
13120-165 = "好吧，我接受挑戰。"
13120-170 = "咦！？星野前輩！？"
13120-172 = "不過大叔我從來沒有在一對一的對決中輸過哦？#n搞不好是奇普托斯最強的也說不定──白子醬，你有把握嗎？"
13120-173 = "嗯。之前已經交手過一次，我不會輸的。"
13120-174 = "哼～真拿你沒辦法。那萬一你輸了怎麼辦呢？#n大叔我可以隨意使喚白子醬嗎～"
13120-175 = "嗯，隨你高興。"
13120-176 = "唔嘿～可不能反悔哦？#n要是輸了的話，你就不能離開阿拜多斯，而且還要叫大叔我前輩了哦？"
13120-177 = "隨你高興。"
13120-179 = "星，星野前輩！？"
13120-200 = "所以我說～！白子醬，這些是什麼啊！？"
13120-201 = "是廢鐵、螺絲和螺栓，這邊是空彈殼……是從哪裡拿來的？"
13120-203 = "嗯，是搶來的。"
13120-206 = "什麼！？"
13120-207 = "搶，搶來的！？從哪搶來的！？"
13120-209 = "市內的廢鐵商。#n把這些賣給廢鐵商就能賺錢。我要用賺到的錢來還學校的債。"
13120-210 = "居然要把搶來的東西賣回去！？這是什麼天才的主意！？"
13120-211 = "野乃美醬！趕快聯絡一下！"
13120-216 = "是，是！"
13120-218 = "白子醬！！不能做這種事啦！"
13120-222 = "為什麼？"
13120-223 = "因為……因為……"
13120-228 = "原來在這裡啊！！偷走我們店裡貨車的傢伙！！"
13120-234 = "咦！？"
13120-236 = "貨車！？貨車又是怎麼回事？白子醬！？#n你連貨車都偷來了嗎？"
13120-237 = "嗯，我把整台貨車帶回來了。一舉兩得。"
13120-238 = "不好意思！真的很抱歉！我們家白子醬還不懂事……"
13120-239 = "如果造成損失，我會用我的卡片賠償……！"
13120-240 = "這好像也不太對。#n野乃美醬，應該先道歉吧！"
13120-241 = "咦！？是！#n對，對不起！真的很抱歉！"
13120-242 = "白子醬也是！"
13120-244 = "唔嗯……對不起。"
13120-245 = "以為這樣我就會放過你們嗎！？啊！？"
13120-248 = "就原諒你們這一次，下次給我注意一點！"
13120-250 = "是……"
13120-251 = "幸好還是原諒我們了……"
13120-252 = "對吧，白子醬。"
13120-253 = "嗯，下次一定不會被發現。"
13120-254 = "唉唷，這樣不對啦！"
13120-259 = "……唉，算了。"
13120-260 = "話說我還以為阿拜多斯的學生已經都離開了，原來還有學生在啊。"
13120-262 = "……"
13120-263 = "嗯，之後要賣廢鐵的時候再聯絡我吧。"
13120-269 = "那就下次見了，阿拜多斯的學生們。"
13120-275 = "……"
13120-281 = "……咦？"
13120-285 = "請看！星野前輩！白子醬！櫻花結出花苞了！"
13120-290 = "哦，真的耶……"
13120-291 = "……看來冬天就快結束了呢。"
13120-292 = "就是說啊。#n不知不覺間……就這樣過去了……"
13120-293 = "……嗯。#n原本還以為永遠不會結束的呢…… "
13120-297 = "野乃美醬是不是該回去了？你不是要去其他學園的嗎？"
13120-301 = "……"
13120-302 = "那邊差不多也到舉行入學典禮的季節了，繼續待在這裡沒問題嗎？"
13120-318 = "來來來，白子醬、野乃美醬！笑一個！"
13120-319 = "嗯。要擺出笑臉。"
13120-320 = "有，有需要做到這種地步嗎，前輩？"
13120-321 = "唔嘿～那當然！發生值得慶祝的事情就該拍照留念！"
13120-337 = "不過白子醬……這樣不熱嗎？是不是該把圍巾拿掉了？"
13120-338 = "不用，沒關係。"
13120-348 = "來，現在這裡就是阿拜多斯廢校對策委員會的部室囉。"
13120-351 = "是！"
13120-352 = "嗯，包在我身上。#n我已經擬定了大約8個計畫。"
13120-353 = "計畫……？什麼計畫……"
13120-355 = "駁回。"
13120-360 = "嗯嗯！那也請聽聽我的計畫☆"
13120-361 = "就用這張金卡……"
13120-363 = "那個也駁回。"
13120-368 = "咦……！？"
13120-371 = "……"
13120-372 = "…… "
13120-374 = "什，什麼情況！前輩們突然進入回憶模式了嗎！？"
13120-375 = "綾音醬！快想想辦法！"
13120-376 = "啊哈哈……畢竟是我們不知道的時期，會覺得被冷落也沒辦法……#n不過我們也應該理解那是屬於前輩們的特權……"
13120-378 = "唔嘿～就是說呀。#n不過大叔也記得綾音醬和茜香醬來找我們的時候唷？"
13120-379 = "嗯嗯！沒錯！你們兩個當時都很可愛呢～"
13120-380 = "沒錯。"
13120-384 = "請，請問一下！各位是阿拜多斯的學生吧？"
13120-385 = "我們也決定要就讀阿拜多斯高中。"
13120-386 = "嗯！我們也希望能對阿拜多斯的未來盡一份力……！"
13120-387 = "記得好像是叫復興委員會嗎？"
13120-388 = "是對策委員會才對……茜香醬。"
13120-389 = "叫什麼都行啦，總之我也要加入。#n之後請多多指教，各位前輩！！"
13120-390 = "嗯！請多多指教！"
13120-392 = "怎，怎樣啦！？為什麼要把我們也拉進回憶模式！"
13120-393 = "啊哈哈……#n確實有過那樣的時期呢……"
13120-395 = "嗯！這樣終於能啟動阿拜多斯偶像5人組計畫了～♧"
13120-396 = "別把大叔我也算進去呀～#n那種事就該交給年輕人才對。"
13120-400 = "既然這樣，不如就讓兩個新鮮的一年級生組成雙人團體怎麼樣……？"
13120-406 = "嗯，感覺不錯。"
13120-407 = "哦哦～那樣大叔我可能會忍不住哦？會興奮得不得了的哦？"
13120-409 = "那是什麼計畫啦！？而且我們也不是什麼新鮮水果好嗎！？"
13120-410 = "就是說呀，既然要做就該大家一起做……"
13120-423 = "……我果然還是不希望對策委員會消失。"
13120-428 = "野乃美前輩？"
13120-430 = "留給我們最現實的選擇……就是設法參加債權團的大會。"
13120-431 = "同時這也意味著必須放棄「阿拜多斯學生會」和「對策委員會」當中的一個……#n雖然只是名稱消失……或許實際的意義並不是那麼重大……"
13120-432 = "但即便如此……我還是不希望對策委員會就此消失……"
13120-433 = "多虧有白子醬陪在身邊……我才能下定決心留在這裡。#n多虧有白子醬和大家，星野前輩才能露出笑容。"
13120-434 = "對策委員會……對我來說絕不只是個名字而已……"
13120-435 = "野乃美前輩……"
13120-437 = "……"
13120-438 = "白子醬……？白子醬覺得呢？"
13120-439 = "……我嗎？#n那個……"
13120-440 = "對我來說……對策委員會……唔嗯……"
13120-441 = "是世界上最重要的地方對吧？不用說也知道。#n對白子醬來說，對策委員會就是一切。"
13120-442 = "……唔，唔嗯。"
13120-444 = "但是反過來說……這對星野前輩也是一樣的吧？"
13120-445 = "嗯？我嗎？"
13120-446 = "「阿拜多斯學生會」……#n那裡充滿夢會長和星野前輩之間留下的……我們所不知道的回憶……"
13120-447 = "如果就這樣消失的話……未免也太……"
13120-448 = "……沒，沒關係的。#n大叔我其實不在意這些……"
13120-449 = "不，就連對策委員會成立之後，星野前輩也從來沒放棄「阿拜多斯學生會」的身分。"
13120-450 = "前輩一直希望自己能同時屬於「對策委員會」和「阿拜多斯學生會」。"
13120-451 = "星野前輩有辦法放棄和夢會長最後的連結嗎？"
13120-452 = "當然，要說那毫無意義的話是騙人的……"
13120-453 = "前輩一直拒絕學生會長的位置……不也是因為夢學生會長嗎？"
13120-457 = "因為一旦成為學生會長……就代表承認了夢前輩的死嗎？"
13120-458 = "這個嘛……也許是吧。"
13120-459 = "但……可以確定的是……"
13120-460 = "對大叔我來說，阻止「列車砲」落入壞人手中，比保住那個名字更重要。"
13120-462 = "……"
13120-463 = "……"
13120-468 = "雖然不知道夢前輩是為什麼簽下這份契約，也不知道當時究竟發生了什麼事……"
13120-470 = "懷疑、不信任、暴力……謊言……#n當我們逐漸對這些事情感到習以為常……"
13120-471 = "我們總有一天也會變成那種人。"
13120-472 = "就算這種方法能拯救阿拜多斯……那也並不是我們所盼望的阿拜多斯。"
13120-473 = "如果人們印象中的阿拜多斯是個充滿不信任、暴力和謊言的地方……"
13120-474 = "會讓我有點傷心。"
13120-477 = "那門列車砲的存在……否定了夢前輩期望看見的阿拜多斯。"
13120-478 = "所以大叔我一定要把它找出來破壞掉才行。"
13120-479 = "對我來說……名字已經無所謂了。"
13120-484 = "……"
13120-485 = "……"
13120-486 = "……"
13120-487 = "……"
13120-489 = "而且如果要選的話，我也覺得「對策委員會」比較好。"
13120-490 = "畢竟「阿拜多斯學生會」只有我一個人，#n而「對策委員會」則有白子醬、野乃美醬、綾音醬和茜香醬……大家都在。"
13120-491 = "可是……就算是這樣……"
13120-492 = "好了，先專心解決問題吧，野乃美醬。"
13120-493 = "不管我們如何選擇，一樣都得參加債權團大會。"
13120-494 = "所以思考該如何進入被數百名兵力看守的那個地方，才是現在最重要的事。"
13120-495 = "是……我明白了，前輩。"
13120-497 = "嗯，知道了……"
13120-498 = "這樣大家都有共識了吧？"
13120-500 = "是，這就是我們的結論。"
13120-504 = "在明天中午12點之前，進入阿拜多斯中央車站的區政廳大樓。#n突破看守該處的私募基金兵力後，完成繼續履行契約的公證！"
13120-505 = "但是必須對付那種規模的兵力，真的有可能嗎……"
13120-506 = "接下來得想出方法才行……"
13120-507 = "不過要是缺少老師的支援就無法成立。#n甚至就算有老師在也絕不容易……"
13120-508 = "話說回來，老師還沒聯絡我們嗎？#n明明說過今天會來，這也太慢了吧……"
13120-509 = "……說的也是。#n雖然老師本來就是大忙人，稍微晚到也不奇怪……"
13120-511 = "唔嗯……"
13120-512 = "該不會發生什麼事了吧？"
13120-521 = "呀啊啊──！！？"
13120-525 = "怎，怎麼了，綾音醬？"
13120-526 = "什，什麼情況！？"
13120-527 = "新聞……？"
13120-532 = "……為您播報下一則新聞。#n今天上午，位於D.U.的夏萊大樓發生了原因不明的爆炸。#n已確定當時[USERNAME]老師人就在大樓裡……"
13120-536 = "什，什麼！？"
13120-537 = "！！"
13120-539 = "後來被緊急送往醫院……#n關於大樓爆炸的原因眾說紛紜……醫生們……"
13120-541 = "下一話;人質"

[translation]
104110-1 = "Episode 11; Afterword 1"
104110-2 = "Hello, Sensei."
104110-3 = "[s] \"How are you doing, Plana?\""
104110-4 = "...I'm fine. Arona is taking good care of me."
104110-5 = "Heehee... Gotta have this... with strawberry milk..."
104110-6 = "...Though, she's still sleeping."
104110-7 = "[s] \"O-Okay...\""
104110-8 = "Wake up. Arona. Sensei is here."
104110-9 = "This isn't the time to be asleep."
104110-10 = "Zzz... Zzz..."
104110-11 = "Arona. If you don't get up, I'll poke you in the cheek."
104110-17 = "(Bedhead...)"
104110-18 = "Zzz... Something keeps... Huh?"
104110-19 = "Oh. What...?"
104110-20 = "Wh-Wh-What?"
104110-21 = "[s] \"Good morning, Arona.\""
104110-22 = "W-W-Waaaahhhh?! Wh-When did it become the morning...?!"
104110-23 = "It's lunch time now, Arona. You can't sleep in so late. It's basics."
104110-24 = "U-Uh... I'm supposed to be your role model..."
104110-25 = "Waking up early is the first thing you need to do. Setting an example is after that."
104110-26 = "Hng... How'd it end up like this..."
104110-27 = "[s] \"...Must be a lot of work, Plana.\""
104110-28 = "...It's okay. I'm starting to get used to looking out for Arona."
104110-29 = "It's starting to feel like I'm getting in trouble..."
104110-30 = "But that's okay, because with Plana and I together, the Shittim Chest will be able to do even more in the future!"
104110-31 = "Positive. I will also aid. Sensei."
104110-32 = "[s] \"...I'm looking forward to it, Plana and Arona.\""
104110-34 = "Likewise. I look forward to it too, [USERNAME] Sensei."
104110-35 = "Heehee... Yes! Sensei!"
104110-39 = "Zzz... Heeheehee..."
104110-40 = "Arona has been sleeping a lot lately..."
104110-41 = "That's... because I'm here. The Shittim Chest is overloaded because of me."
104110-42 = "..."
104110-43 = "And I understand that... the Student Council President has gone missing here as well."
104110-49 = "The Student Council President is missing in this world as well..."
104110-51 = "Next Episode; Afterword 2"

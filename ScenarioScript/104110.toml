[translation]
104110-1 = "ตอนที่ 11;ย้อนวันวาน 1"
104110-2 = "สวัสดีค่ะ คุณครู"
104110-3 = "[s] \"สบายดีรึเปล่า พลาน่า?\""
104110-4 = "...ค่ะ รุ่นพี่อะโรน่าคอยดูแลฉันอย่างดีค่ะ"
104110-5 = "งื้อ... นมสตรอว์เบอร์รี่... อาหย่อย..."
104110-6 = "...ถึงรุ่นพี่จะยังหลับอยู่ก็เถอะค่ะ"
104110-7 = "[s] \"อะ...อื้อ...\""
104110-8 = "ตื่นได้แล้วค่ะ รุ่นพี่อะโรน่า คุณครูมาแล้วค่ะ"
104110-9 = "ไม่ใช่เวลาที่จะมัวมานอนอู้อยู่นะคะ "
104110-10 = "งื้อ... งืมๆ..."
104110-11 = "รุ่นพี่อะโรน่า ถ้าไม่ตื่นขึ้นมา ฉันจะจิ้มแก้มแล้วนะคะ"
104110-17 = "(ลุกพรึบ-)"
104110-18 = "งื้อออ... อะไรกัน... เอ๋?"
104110-19 = "เอ๋... เอ๋~~?"
104110-20 = "เอ๊ะ... เอ๋?? เอ๋~~~ "
104110-21 = "[s] \"อรุณสวัสดิ์ อะโรน่า\""
104110-22 = "วะ....หวาาา...?! ชะ...เช้าแล้วตั้งแต่ตอนไหนกัน..?! "
104110-23 = "ไม่เช้าแล้วค่ะ เที่ยงแล้วต่างหากค่ะ รุ่นพี่ การไม่นอนตื่นสาย มันคือเรื่องพื้นฐานนะคะ"
104110-24 = "อะ...เอ๋... ในฐานะรุ่นพี่ ฉันควรทำตัวดีๆ ให้เป็นแบบอย่างแท้ๆ...  "
104110-25 = "ถ้าอย่างนั้นก็เริ่มจากการตื่นเช้าก่อนเลยค่ะ เรื่องทำตัวเป็นแบบอย่างเอาไว้ทีหลัง"
104110-26 = "งือ... ทำไมถึงกลายเป็นแบบนี้ไปได้..."
104110-27 = "[s] \"...ลำบากแย่เลยนะ พลาน่า\""
104110-28 = "...ไม่เป็นไรค่ะ ฉันเริ่มชินกับการที่ต้องคอยดูแลรุ่นพี่อะโรน่าแล้วค่ะ"
104110-29 = "รู้สึกเหมือนฉันกำลังโดนดุอยู่เลยนะคะ... "
104110-30 = "แต่ว่าไม่เป็นไรหรอกค่ะ ถ้าอยู่กับพลาน่าจังละก็... กล่องแห่งซิสดิมคงจะมีชีวิตชีวาขึ้นเยอะอย่างแน่นอนค่ะ!"
104110-31 = "เห็นชอบ ฉันเองก็จะช่วยด้วยคนค่ะ คุณครู"
104110-32 = "[s] \"...นั่นสินะ ต่อไปก็ขอฝากเนื้อฝากตัวด้วยนะ พลาน่า อะโรน่า\""
104110-34 = "ค่ะ ขอฝากเนื้อฝากตัวด้วยนะคะ คุณครู [USERNAME]"
104110-35 = "แหะๆ... ค่า~! คุณครู!"
104110-39 = "...งืมๆ แฮะ แฮะๆ..."
104110-40 = "ที่ช่วงนี้รุ่นพี่อะโรน่านอนเยอะมาก..."
104110-41 = "เรื่องนั้น... เป็นเพราะว่ามีฉันอยู่ที่นี่ด้วยค่ะ ตอนนี้กล่องแห่งซิสดิมเลยทำงานหนักมากเกินไป"
104110-42 = "... "
104110-43 = "และฉันก็เข้าใจค่ะ ที่นี่เอง... ประธานองค์การนักเรียนก็อยู่ในสถานะหายตัวไปสินะคะ"
104110-49 = "... ไม่อยู่ในโลกแห่งนี้เหมือนกันสินะคะ ประธานองค์การนักเรียนน่ะ..."
104110-51 = "ตอนต่อไป;ย้อนวันวาน 2"

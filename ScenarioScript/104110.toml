[translation]
104110-1 = "第11話;後日談（１）"
104110-2 = "你好，老師。"
104110-3 = "[s]「你好呀，星奈。已經習慣這裡了嗎？」"
104110-4 = "……是。#n彩奈前輩非常照顧我……"
104110-5 = "嘿嘿……草莓牛奶……果然……"
104110-6 = "……雖然他還在睡覺。"
104110-7 = "[s]「這樣啊……」"
104110-8 = "請起來，彩奈前輩。"
104110-9 = "老師來了。"
104110-10 = "呣喵……唔嘻嘻……"
104110-11 = "再不起來要戳你臉頰囉？"
104110-17 = "（起身）"
104110-18 = "呣喵……嗯哞……啊呀？"
104110-19 = "啊呀，啊呀呀……？"
104110-20 = "咦？咦咦？咦咦咦？"
104110-21 = "[s]「早安，彩奈。」"
104110-22 = "唔，唔哇啊啊！？已，已經早上了嗎！？"
104110-23 = "不是早上是中午。#n早睡早起是健康的基礎哦。"
104110-24 = "啊嗚……本來打算成為星奈醬的榜樣的說……"
104110-25 = "先從早起開始做起吧。#n成為榜樣是之後的事。"
104110-26 = "怎麼會變成這樣……嗚嗚……"
104110-27 = "[s]「雖然辛苦但要加油哦，星奈。」"
104110-28 = "……沒問題的。我也開始習慣照顧彩奈前輩了。"
104110-29 = "這難道是，彩奈不乖的氣氛……！？#n明明只是稍微睡過頭而已……！"
104110-30 = "不，不過不過，現在有星奈醬和我兩個人，希迪姆的箱子變得更強了唷！"
104110-31 = "肯定。我也會成為老師的力量。"
104110-32 = "[s]「嗯……兩位，之後也拜託你們囉。」"
104110-34 = "……是，請多多指教。[USERNAME]老師。"
104110-35 = "是，老師！……耶嘿嘿。"
104110-39 = "呣喵……嘿嘿嘿……"
104110-40 = "……彩奈前輩之所以越來越常睡──"
104110-41 = "是因為……我在這裡的關係。#n導致希迪姆的箱子的負擔增加了。"
104110-42 = "…… "
104110-43 = "同時，我也理解了──聯邦學生會長，在這裡同樣下落不明。"
104110-49 = "……這個世界裡也同樣不在啊，聯邦學生會長。"
104110-51 = "下一話;後日談（２）"

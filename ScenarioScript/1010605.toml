[translation]
1010605-1 = "不同的模樣"
1010605-2 = "（前往和櫻子約定的地點，並事先佔好了位置）"
1010605-3 = "……您來得真早呢，老師。"
1010605-7 = "讓人有點意外。#n感覺很久沒有和您一起來這種地方了……"
1010605-8 = "啊，我並沒有不高興的意思。#n您願意找我出來，反而能讓我感到振奮。"
1010605-9 = "……嗯？怎麼了嗎……？"
1010605-10 = "啊，為什麼今天明明有空卻穿著這身服裝是嗎？"
1010605-11 = "抱歉，看來我似乎讓您誤會了。"
1010605-12 = "其實我今天也同樣有行程。#n只是就像先前提過的一樣，今天相對有空而已。"
1010605-13 = "明明您特地撥空出來見我，但也許我等等就得先行離開……"
1010605-14 = "……嗯？"
1010605-15 = "我不需要擔心……？#n怎麼說呢……？"
1010605-16 = "[s1]「總之先一起去散散步吧？」\n[s2]「反正這件事應該也不會花太多時間。」"
1010605-19 = "咦……？您言下之意是……"
1010605-20 = "總，總之我明白了。#n既然您這麼說，想必一定有您的道理吧。"
1010605-21 = "我們走吧，老師。#n麻煩您帶路了。"
1010605-22 = "[s3]「我相信你肯定會喜歡的。」\n[s4] 開始為櫻子帶路"
1010605-28 = "那個……老師？"
1010605-29 = "我沒有別的意思，但如果您不介意的話……"
1010605-30 = "可以先告訴我要去什麼地方嗎……"
1010605-31 = "[s5]「已經到了哦。」\n[s6]「就是這裡。」"
1010605-34 = "……？"
1010605-35 = "您說……這裡嗎？"
1010605-36 = "這裡看起來只是普通的街道……我們沒有要去某個特定的地點嗎？"
1010605-37 = "……嗯？後面……？"
1010605-38 = "要我向後看是嗎？#n看向……對面？"
1010605-39 = "究竟……"
1010605-40 = "…………？"
1010605-41 = "……嗯？"
1010605-43 = "……！？"
1010605-46 = "― [log=사쿠라코 아이돌]這，這……！？[/log][wa:1230] "
1010605-48 = "― [log=사쿠라코 아이돌]究，究竟是什麼……！？[/log][wa:1690] "
1010605-51 = "― [log=사쿠라코 아이돌]我的……海報？[/log][wa:2480] "
1010605-53 = "― [log=사쿠라코 아이돌]不，不是……這點我也看的出來……！[/log][wa:1300] "
1010605-56 = "[ns7]「是修女會的大家請我幫忙一起做的。」\n[ns8]「大家來找我幫忙，所以我就幫他們挑了照片和地點。」"
1010605-59 = "― [log=사쿠라코 아이돌]是各位修女們，和老師……？[/log][wa:2780] "
1010605-61 = "― [log=사쿠라코 아이돌]我……我該說些什麼好呢……[/log][wa:2240] "
1010605-64 = "[ns9]「……櫻子？」\n[ns10]「嚇到你了嗎？」"
1010605-67 = "― [log=사쿠라코 아이돌]那個……不是的，非常抱歉。[/log][wa:3760] "
1010605-68 = "― [log=사쿠라코 아이돌]我沒有責怪您的意思……[/log][wa:2070] "
1010605-71 = "― [log=사쿠라코 아이돌]只是要用言語形容有點困難而已……[/log][wa:1980] "
1010605-74 = "― [log=사쿠라코 아이돌]不過，我想……至少這點能清楚地告訴您。[/log][wa:5320] "
1010605-77 = "― [log=사쿠라코 아이돌]我真的……打從心底[/log][wa:2340] "
1010605-79 = "― [log=사쿠라코 아이돌]感到非常開心。[/log][wa:1280] "
1010605-82 = "我從來沒想過，這種事居然真的會發生……"
1010605-83 = "明明大家以前都一直覺得我很有距離感……"
1010605-84 = "其實仔細想想，最近好像也發生了許多類似的事情。"
1010605-85 = "或許現在還抱持著那種想法的人，就只有我而已吧。"
1010605-86 = "[s11]「這都是你努力得到的成果哦。」\n[s12]「大家都知道你其實是個好人。」"
1010605-89 = "……是嗎。那真是太好了。"
1010605-90 = "我還以為……大家都只認為我是個奇怪的人呢。呵呵……"
1010605-91 = "[s13]（雖然那也是事實……）\n[s14]「這是兩回事……」"
1010605-94 = "與其稱之為嶄新，不如說是以往沒機會體驗的經歷吧。"
1010605-95 = "也許這一切……都是多虧了這身衣服，還有這次的活動吧。"
1010605-96 = "……看來我的選擇是正確的。"
1010605-97 = "……沒錯。"
1010605-98 = "當時有鼓起勇氣參加活動真是太好了。"
1010605-102 = "因此……我今天也想多拿出一些勇氣。"
1010605-103 = "……老師。"
1010605-104 = "如同我先前所說，距離我今天的行程還有一些空閒時間。"
1010605-105 = "所以就算只有這短暫的時間也好，可以請您就這樣……"
1010605-109 = "……陪我一起欣賞您為我挑的這張照片嗎？"
1010605-111 = "（於是便和櫻子欣賞著照片，度過了剩餘的時光）"

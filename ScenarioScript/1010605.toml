[translation]
1010605-1 = "On Further Inspection"
1010605-2 = "I waited for Sakurako where we were supposed to meet."
1010605-3 = "...You're early, Sensei."
1010605-7 = "I'm surprised. It's been quite some time since you've requested a meeting here..."
1010605-8 = "Ah, I hold no issue with it. In fact, I'm feeling rather rejuvenated at the thought of spending time with you like this."
1010605-9 = "...Hm? What's wrong...?"
1010605-10 = "Ah, you're curious why I'm still wearing this costume, when I have the day off?"
1010605-11 = "My apologies. There's been a misunderstanding."
1010605-12 = "Unfortunately, I don't have an open and free schedule today. More so, just a little bit of time to spare."
1010605-13 = "I may even have to return first, despite you having sacrificed some of your precious break to see me."
1010605-14 = "Hm?"
1010605-15 = "I don't have to worry about that? What do you...?"
1010605-16 = "[s1] \"Shall we go for a short walk?\"\n[s2] \"My business here won't be long either.\""
1010605-19 = "What...? What does that mean?"
1010605-20 = "U-Understood. I assume you have a method to your madness, Sensei."
1010605-21 = "Let's go, Sensei. I'll be in your care."
1010605-22 = "[s3] \"I'm sure you're going to like it too.\"\n[s4] Start moving."
1010605-28 = "...Um...Sensei?"
1010605-29 = "I don't mean to express doubt, but if it's okay...."
1010605-30 = "Would you mind informing me of our destination?"
1010605-31 = "[s5] \"We're almost here.\"\n[s6] \"It's right over there.\""
1010605-34 = "...?"
1010605-35 = "Here...you mean?"
1010605-36 = "Did you not have a particular destination in mind? We're in the middle of a street."
1010605-37 = "Hm? Behind me...?"
1010605-38 = "Turn around? ...Across...the street?"
1010605-39 = "What are you saying..."
1010605-40 = "...?"
1010605-41 = "...Huh?"
1010605-43 = "...?!"
1010605-46 = "― [log=사쿠라코 아이돌]Th-This...?![/log][wa:1030] "
1010605-48 = "― [log=사쿠라코 아이돌]Wh-What is this...?! [/log][wa:1290] "
1010605-51 = "― [log=사쿠라코 아이돌]My...poster?[/log][wa:2280] "
1010605-53 = "― [log=사쿠라코 아이돌]I-I mean... I can see that for myself...! [/log][wa:300] "
1010605-56 = "[ns7] \"The Sisters asked me to help them make it.\"\n[ns8] \"I just picked the picture and location.\""
1010605-59 = "― [log=사쿠라코 아이돌]You and the other Sisters...?[/log][wa:2140] "
1010605-61 = "― [log=사쿠라코 아이돌]What... What should I say here...?[/log][wa:1400] "
1010605-64 = "[ns9] \"...Sakurako?\"\n[ns10] \"Did that surprise you?\""
1010605-67 = "― [log=사쿠라코 아이돌]I only meant... No, I'm sorry. [/log][wa:3040] "
1010605-68 = "― [log=사쿠라코 아이돌]I didn't mean for that to sound critical...[/log][wa:790] "
1010605-71 = "― [log=사쿠라코 아이돌]It's just difficult to put into words... [/log][wa:980] "
1010605-74 = "― [log=사쿠라코 아이돌]However, yes... I can say this for certain.[/log][wa:4360] "
1010605-77 = "― [log=사쿠라코 아이돌]Truly... From the bottom of my heart,[/log][wa:1220] "
1010605-79 = "― [log=사쿠라코 아이돌]I feel very, very grateful.[/log][wa:480] "
1010605-82 = "Seriously, I never could've imagined it. For something like this..."
1010605-83 = "I'd always believed the others felt there was a wall between us."
1010605-84 = "Actually...I suppose, upon reflection, many things have happened recently."
1010605-85 = "Perhaps I was the only person who allowed these stubborn thoughts to persist."
1010605-86 = "[s11] \"It's the fruit of your hard labor, Sakurako.\"\n[s12] \"Everyone knows that you're a good person.\""
1010605-89 = "...Is that so? I'm very glad to hear that."
1010605-90 = "I was certain...everyone just viewed me as their strange leader. Heehee."
1010605-91 = "[s13] \"(Well, that's true, to a certain extent...)\"\n[s14] \"That's a different matter from this...\""
1010605-94 = "Of course, these experience haven't necessarily created anything new...but rather simply made me aware of things I was oblivious to."
1010605-95 = "Regardless, everything was likely thanks to this event...and this costume."
1010605-96 = "...I'm glad I did it."
1010605-97 = "...Yes."
1010605-98 = "I'm very glad that I gathered the courage to sign up."
1010605-102 = "That said...I get the sense that today is a day to show even more courage."
1010605-103 = "...Sensei."
1010605-104 = "As I mentioned, I have some room in my schedule today."
1010605-105 = "For the remainder of that time..."
1010605-109 = "...could we peruse the new looks you've picked out for me? Together?"
1010605-111 = "We both spent the rest of our breaks looking through pictures. Together."

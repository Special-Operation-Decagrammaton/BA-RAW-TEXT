[translation]
2601403-1 = "ไม่ทำอะไรเลยอย่างจริงจัง"
2601403-4 = "ขอเสียมารยาทหน่อยนะ"
2601403-5 = "อ๊ะ คุณครู ขอโทษที่มาขัดจังหวะระหว่างทำงานนะ"
2601403-6 = "ก็อย่างที่บอกใน MOMOTALK น่ะว่าฉันไม่รู้ว่าควรทำอะไรต่อดี"
2601403-7 = "[s] \"อื้อ วันนี้มาพักผ่อนที่ชาเล่ต์สิ\""
2601403-8 = "พักผ่อนที่นี่เหรอ? ไม่ต้องออกไปทำกิจกรรมพิเศษอะไรเหมือนครั้งที่แล้วก็ได้งั้นเหรอ?"
2601403-9 = "ไม่สิ... พอมาคิดดูแล้ว 'วันหยุด' ก็ต้องหยุดทำกิจกรรมแล้วพักผ่อนสิเนอะ"
2601403-10 = "[s1] \"เราต้องมีวันที่ไม่ทำอะไรเลยบ้างสิ\"\n[s2] \"เราต้องมีวันที่ให้กายและใจได้ชาร์จแบตบ้างนะ\""
2601403-13 = "อืม มันก็จริงนะ"
2601403-14 = "ฉันควรต้องให้ร่างกายได้พักผ่อนจริงๆ จะได้ทำภารกิจต่อไปได้อย่างราบรื่น"
2601403-15 = "ดีละ งั้นฉันจะเชื่อที่คุณครูแนะนำดู"
2601403-16 = "[s] \"มานั่งพักที่โซฟาตรงนี้ได้เลย\""
2601403-17 = "จะว่าไป คุณครูยังทำงานอยู่เลย"
2601403-18 = "ไม่ได้จะพักผ่อนด้วยกันกับฉันหรอกเหรอ?"
2601403-19 = "[s] \"ครูมีงานค้างอยู่นิดหน่อยน่ะ\""
2601403-23 = "[ns] \"คารินพักผ่อนให้สบายเถอะ\""
2601403-24 = "ขะ... เข้าใจแล้ว"
2601403-25 = "อยากให้คุณครูเคลียร์งานให้เสร็จไวๆ แล้วได้พักผ่อนเหมือนกันจัง"
2601403-28 = "..."
2601403-33 = "[ns] \"ฮัลโหล ที่นี่ห้องทำงานชาเล่ต์\""
2601403-35 = "[ns] \"อ้อ เอกสารนั่นเดี๋ยวส่งให้ภายในวันนี้เลย! ขอโทษด้วยนะ!\""
2601403-36 = "..."
2601403-37 = "เอ่อ... ถ้ามีงานด่วนอะไร ให้ฉันช่วยก็ได้นะ..."
2601403-38 = "[s] \"ไม่เป็นไรๆ! คารินพักผ่อนไปเถอะนะ!\""
2601403-39 = "กะ... ก็ได้..."
2601403-40 = "อืม..."
2601403-42 = "\"คุณภาพอากาศในห้องในตอนนี้ไม่ค่อยดีค่ะ\""
2601403-43 = "[ns] \"จริงสิ วันนี้ลืมทำความสะอาดไปเลย\""
2601403-44 = "อ๊ะ เรื่องนั้นให้ฉันช่วย...!"
2601403-45 = "[s] \"ไม่ๆ! เดี๋ยวครูทำเอง! วันนี้วันหยุดคารินนะ ห้ามทำอะไรทั้งนั้น!\""
2601403-49 = "อึก..."
2601403-51 = "[ns] \"อืม ถ้าเปลี่ยนตำแหน่งเฟอร์นิเจอร์ตรงนี้สักหน่อย...\""
2601403-52 = "..."
2601403-53 = "[s] \"อ๊ะ! ไม่ต้องช่วยก็ได้!\""
2601403-55 = "[ns] \"วันนี้วันหยุดของคารินนะ!\""
2601403-56 = "..."
2601403-57 = "[s] \"คะ... คาริน?\""
2601403-58 = "คุณครู..."
2601403-59 = "ถ้าไม่อยากให้ฉันช่วยงานคุณครู ก็บอกกันตรงๆ ก็ได้นะ"
2601403-60 = "ไม่ต้องพูดอ้อมค้อมแบบนั้นหรอก..."
2601403-61 = "[s3] \"ครูไม่ได้ไม่อยากให้คารินช่วยงานหรอกนะ\"\n[s4] \"ครูแค่อยากให้คารินได้พักผ่อนในวันหยุดเท่านั้นเอง...\""
2601403-64 = "ถ้างั้นก็ให้ฉันได้ช่วยงานคุณครูเถอะ!"
2601403-65 = "ต่อให้เป็นวันหยุด แต่ถ้าปล่อยให้คุณครูทำงานอยู่คนเดียวแบบนี้ ฉันก็ไม่สบายใจหรอก!"
2601403-66 = "[s] \"งะ... งั้นเหรอ... ขอโทษนะ\""
2601403-67 = "การได้พักมันก็ดีหรอกนะ แต่ฉันชอบการได้พักผ่อนกับคุณครูมากกว่า..."
2601403-68 = "ถ้ามีเรื่องที่ต้องทำก็ช่วยกันทำให้เสร็จ แล้วมาพักผ่อนด้วยกันเถอะ"
2601403-72 = "[ns] \"ก็ได้ งั้นครูรบกวนหน่อยนะ\""
2601403-73 = "อื้อ... วางใจได้เลย เรื่องทำความสะอาดเป็นงานถนัดฉันเลยละ"
2601403-75 = "(จากนั้นคุณครูกับคารินก็ช่วยกันทำความสะอาดห้องทำงานชาเล่ต์จนสะอาด)"
2601403-76 = "(และการพักผ่อนหลังจากนั้นก็เป็นการพักผ่อนที่หอมหวานกว่าปกติ...)"

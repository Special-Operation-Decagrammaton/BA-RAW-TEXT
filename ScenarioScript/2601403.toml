[translation]
2601403-1 = "Passionately Lazing Around"
2601403-4 = "Excuse me."
2601403-5 = "Ah, Sensei. I'm sorry to bother you while you're working."
2601403-6 = "It's just, as I mentioned in MomoTalk, I'm at a loss for what to do next."
2601403-7 = "[s] \"You should relax at Schale today.\""
2601403-8 = "Relax? No special activities or anything, like last time?"
2601403-9 = "Well, now that I think about it, it does make sense to relax on a day off."
2601403-10 = "[s1] \"Some days, the best thing to do is nothing.\"\n[s2] \"You've got to recharge your body and mind, you know?\""
2601403-13 = "Mmm, I see."
2601403-14 = "I need to rest in order to move effectively during a mission."
2601403-15 = "Okay. Then I'll take your advice, Sensei."
2601403-16 = "[s] \"You can rest on this sofa if you like.\""
2601403-17 = "You look like you're still working, Sensei."
2601403-18 = "Aren't you going to take a break too?"
2601403-19 = "[s] \"I have some work left.\""
2601403-23 = "[ns] \"You should just kick back and relax, though.\""
2601403-24 = "U-Understood."
2601403-25 = "I hope you finish quickly, so you can get some rest yourself."
2601403-28 = "..."
2601403-33 = "[ns] \"Hello, Schale office here.\""
2601403-35 = "[ns] \"Ah, sorry, I'll send that document over today!\""
2601403-36 = "..."
2601403-37 = "Um... If you're busy, I could help a bit..."
2601403-38 = "[s] \"Don't worry, don't worry! Like I said, you just kick back and relax, Karin!\""
2601403-39 = "G-Got it..."
2601403-40 = "Mmm..."
2601403-42 = "Poor indoor air quality."
2601403-43 = "[ns] \"Ah, I forgot to clean today.\""
2601403-44 = "Oh, in THAT case, I—"
2601403-45 = "[s] \"It's fine! I'll do it! It's your day off, so you relax!\""
2601403-49 = "Ugh..."
2601403-51 = "[ns] \"Hut! If I rearrange the furniture like this...\""
2601403-52 = "..."
2601403-53 = "[s] \"Ah! You don't have to help me!\""
2601403-55 = "[ns] \"It's your day off, remember?\""
2601403-56 = "..."
2601403-57 = "[s] \"K-Karin?\""
2601403-58 = "...Sensei?"
2601403-59 = "If you don't want me helping you, just be honest about it."
2601403-60 = "Instead of beating around the bush like that..."
2601403-61 = "[s3] \"Wh-What do you mean?\"\n[s4] \"I just wanted you to have a real day off and rest.\""
2601403-64 = "Then let me help you!"
2601403-65 = "Day off or not, I feel bad seeing you work alone!"
2601403-66 = "[s] \"I-I see... I'm sorry.\""
2601403-67 = "Besides, I'd get a lot better rest alongside you."
2601403-68 = "So if there's work to be done, let's just finish it quickly and then rest together."
2601403-72 = "[ns] \"Okay, I'll be counting on you, then.\""
2601403-73 = "...Right. Leave it to me. Cleaning is my expertise."
2601403-75 = "Karin and I cleaned the Schale office together."
2601403-76 = "...The break we took afterwards was more relaxing than usual."

[translation]
2601403-1 = "更激烈地無所事事"
2601403-4 = "打擾了。"
2601403-5 = "啊，老師。抱歉打擾你工作。"
2601403-6 = "那個，就像我剛才在MomoTalk說的一樣，我現在不知道該做什麼才好……"
2601403-7 = "[s]「啊，那你今天就在夏萊休息吧。」"
2601403-8 = "休息？就是像上次那樣，不用特別做什麼也沒關係？"
2601403-9 = "不……仔細想想畢竟是「休假」，休息也是理所當然的事。"
2601403-10 = "[s1]「有時候也需要什麼都不做，專心休息的日子。」\n[s2]「類似讓身心重新充電的感覺？」"
2601403-13 = "嗯，有道理。"
2601403-14 = "確實得要好好休息，執行任務的時候才能好好發揮。"
2601403-15 = "我明白了，就接受老師的建議吧。"
2601403-16 = "[s]「請用這邊的沙發。」"
2601403-17 = "話說回來，老師正在工作呢。"
2601403-18 = "不跟我一起休息嗎？"
2601403-19 = "[s]「我堆積的工作有點多。」"
2601403-23 = "[ns]「花凛就這樣舒服地休息沒關係！」"
2601403-24 = "我，我知道了。"
2601403-25 = "希望老師也能盡快完工過來休息。"
2601403-28 = "……"
2601403-33 = "[ns]「你好，這裡是夏萊辦公室。」"
2601403-35 = "[ns]「啊，那份文件我會在今天之內寄過去！非常抱歉！」"
2601403-36 = "…………"
2601403-37 = "那個……如果有急事需要我幫忙的話……"
2601403-38 = "[s]「沒事沒事！花凛舒服地休息就好！」"
2601403-39 = "我，我知道了……"
2601403-40 = "唔嗯……"
2601403-42 = "現在室內空氣的品質欠佳。"
2601403-43 = "[ns]「糟糕，我今天忘記打掃了。」"
2601403-44 = "啊，那就讓我來吧……！"
2601403-45 = "[s]「不用！我自己來就好！花凛現在在休假，所以待著就行了！」"
2601403-49 = "唔……"
2601403-51 = "[ns]「嘿咻，稍微移動一下這邊的家具布置……」"
2601403-52 = "……"
2601403-53 = "[s]「啊！不用幫我沒關係！」"
2601403-55 = "[ns]「因為今天是花凛休假的日子！」"
2601403-56 = "……"
2601403-57 = "[s]「花，花凛？」"
2601403-58 = "……老師。"
2601403-59 = "如果老師不喜歡我幫忙可以直接跟我說。"
2601403-60 = "不需要表現得這麼委婉……"
2601403-61 = "[s3]「那，那是什麼意思？」\n[s4]「今天是花凛的休假，所以我才希望你可以休息……？」"
2601403-64 = "那就讓我幫老師的忙吧！"
2601403-65 = "就算我今天休假，讓老師一個人工作也會過意不去的！"
2601403-66 = "[s]「這，這樣啊……抱歉。」"
2601403-67 = "休息的時候，如果能跟老師一起更好……"
2601403-68 = "假如有事情要忙，我們就一起完成後再休息吧。"
2601403-72 = "[ns]「嗯，那就拜託你了。」"
2601403-73 = "……包在我身上。#n打掃可是我的專長呢。"
2601403-75 = "（和花凛一起將夏萊辦公室打掃乾淨）"
2601403-76 = "（……隨後一起休息的時光，似乎比平常更加甜美）"

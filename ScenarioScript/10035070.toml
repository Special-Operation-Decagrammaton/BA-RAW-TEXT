[translation]
10035070-1 = "Episode 7;Where Did You Come From, Mechagator?"
10035070-2 = "Whoa! It even spits fire!"
10035070-3 = "That's no ordinary alligator!"
10035070-4 = "Metal armor, multiple built-in weapons, high-speed maneuverability..."
10035070-5 = "I suggest we refer to it as the Cybernetic Rapid Ordnance Carrier."
10035070-6 = "Too long! Let's just call it the Mechagator!"
10035070-7 = "Our objective is to draw the attention of the Cybernetic Rap..."
10035070-8 = "...the Mechagator until the citizens are safely evacuated."
10035070-9 = "Be cautious. Stay out of its range!"
10035070-11 = "Director! That armor's too thick! It's bulletproof!"
10035070-12 = "Or maybe you missed."
10035070-13 = "What?! There's no way...!"
10035070-15 = "Get down!"
10035070-22 = "Hey, I think we got it! That grenade got the job done!"
10035070-23 = "No, I think we just stunned it."
10035070-25 = "Attention, please! The outdoor facilities are now closed. We kindly ask all guests in the outdoor areas to move to the indoor facilities."
10035070-26 = "I repeat! The outdoor facilities—"
10035070-28 = "The indoors ARE safe though, right? It won't follow us in?!"
10035070-29 = "Please, don't push!"
10035070-30 = "It'll be okay! The door's too small for the alligator to get through!"
10035070-33 = "O-Oh no! What is that?! There really IS an alligator?!"
10035070-34 = "Technically, it's a Mechagator."
10035070-35 = "Fine, sure!"
10035070-36 = "Where'd it come from? And why is it in my park?!"
10035070-37 = "We didn't find anything earlier!"
10035070-41 = "Ugh! Damn monster!"
10035070-43 = "This is exactly what we were telling you about."
10035070-44 = "Now do you believe us?"
10035070-48 = "I-I-I..."
10035070-50 = "You...what?"
10035070-52 = "I-I'm sorry!"
10035070-53 = "It just seemed so unbelievable!"
10035070-54 = "I mean, think about it! You'd never expect to see an alligator here!"
10035070-55 = "A ROBOT alligator, of all things?!"
10035070-56 = "Let's not point fingers right now. We've got to stop the monster first."
10035070-57 = "Can you cover us while we push forward?"
10035070-58 = "Yes, absolutely!"
10035070-59 = "Glad you're here, Valkyrie cadets! I know we can count on you!"
10035070-61 = "(That's not what you said earlier...)"

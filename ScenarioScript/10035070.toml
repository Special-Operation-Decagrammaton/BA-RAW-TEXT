[translation]
10035070-1 = "第7話;機械鱷魚，從哪來的？"
10035070-2 = "哇啊！那傢伙居然還會噴火！"
10035070-3 = "它絕對不是普通的鱷魚吧！？"
10035070-4 = "金屬材質的外皮、各式各樣的武器、靈活移動的敏捷……那傢伙絕非等閒之輩。"
10035070-5 = "結合以上的判斷，我暫時將其命名為「金屬武器高速鱷魚」。"
10035070-6 = "太長了啦！直接叫機械鱷魚就行了吧？"
10035070-7 = "我們的行動目標是確保市民們安全撤離，所以要盡可能地吸引金屬武器……"
10035070-8 = "吸引機械鱷魚的注意力。"
10035070-9 = "不必勉強靠近或進入它的攻擊範圍之內！"
10035070-11 = "局長！目標的裝甲太厚，子彈根本打不穿！"
10035070-12 = "有沒有可能單純只是你沒打中。"
10035070-13 = "咦！？怎麼會……！"
10035070-15 = "呿！所有人都趴下！"
10035070-22 = "啊！好像成功擊倒了！看來手榴彈似乎有效！"
10035070-23 = "不，只是暫時失去意識而已。"
10035070-25 = "緊急通知！現在開始將關閉戶外設施，請所有遊客立即移動至室內！"
10035070-26 = "再重複一次！現在開始將──"
10035070-28 = "室，室內真的安全嗎？應該不會追到這裡來吧？"
10035070-29 = "別推了，趕快進去！"
10035070-30 = "應該不用怕！這裡門很小，鱷魚進不來！"
10035070-33 = "天，天啊！那是什麼！竟然真的有鱷魚！"
10035070-34 = "老闆，那不是一般的鱷魚，是機械鱷魚。"
10035070-35 = "誰看不出來啊！"
10035070-36 = "重點是那種東西是從哪裡冒出來的！而且為什麼會出現在我們樂園裡！"
10035070-37 = "剛才搜索的時候不是什麼都沒找到嗎！"
10035070-41 = "啊！這該死的鱷魚！"
10035070-43 = "我們剛才說的怪物就是那傢伙！"
10035070-44 = "現在相信我們說的話了吧？"
10035070-48 = "對，對，對……"
10035070-50 = "對？"
10035070-52 = "對，對不起！"
10035070-53 = "剛才實在是無法相信你們說的話！"
10035070-54 = "畢竟按照常理，誰會想到水上樂園會出現鱷魚啊！？"
10035070-55 = "而且還是機械鱷魚！"
10035070-56 = "現在不是追究對錯的時候。#n不能放任那個怪物四處作亂。"
10035070-57 = "我們負責打頭陣，能請您掩護我們嗎？"
10035070-58 = "啊，我知道了！"
10035070-59 = "不，不愧是女武神警察學園！真是可靠！"
10035070-61 = "（剛才明明完全不把我們放在眼裡……）"

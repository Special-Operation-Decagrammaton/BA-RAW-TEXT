[translation]
10035070-1 = "ตอนที่ 7;จระเข้จักรกล มาจากไหนคะเนี่ย?"
10035070-2 = "ว้าย! เจ้านั่นพ่นไฟได้ด้วยเหรอ!"
10035070-3 = "ไม่ใช่จระเข้ธรรมดาๆ แล้ว!"
10035070-4 = "ด้านนอกหุ้มโลหะ ติดอาวุธครบมือ แถมยังเคลื่อนไหวได้เร็วอีก ไม่ธรรมดาเลยนะนั่น"
10035070-5 = "ดูจากรูปลักษณ์ภายนอกแล้ว ฉันขอใช้ชื่อชั่วคราวว่า <เมทัล เวพเพิน สปีด ครอคโคไดล์>"
10035070-6 = "ยาวไปแล้ว! เรียกว่าจระเข้จักรกลไม่ได้เหรอ?"
10035070-7 = "เราต้องอพยพชาวเมืองให้ปลอดภัย ดังนั้นเป้าหมายของเราคือการดึงดูดความสนใจของเมทัล เวพ..."
10035070-8 = "ของจระเข้จักรกลน่ะ"
10035070-9 = "อย่าเข้าหาจนเกินกำลัง แล้วก็อย่าเข้าไปในขอบเขตการโจมตีด้วย!"
10035070-11 = "หัวหน้ากรมฯ! เกราะโลหะของมันหนาจนยิงไม่เข้าเลยค่ะ!"
10035070-12 = "กระสุนปืนน่าจะทำอะไรมันไม่ได้นะ"
10035070-13 = "คะ?! เป็นไปได้ไง...!"
10035070-15 = "ชิ! ทุกคนหมอบลง!"
10035070-22 = "อ๊ะ! เหมือนจะล้มไปแล้วเลยค่ะ! ระเบิดมือได้ผลกับเจ้านั่นสินะคะ!"
10035070-23 = "ไม่หรอก มันแค่หมดสติไปชั่วคราวน่ะ"
10035070-25 = "ประกาศให้ทราบ! จากนี้ไปเราจะปิดสระและเครื่องเล่นกลางแจ้ง ขอให้ลูกค้าทุกท่านที่อยู่ในโซน#nกลางแจ้งเข้ามาในอาคารโดยทันทีค่ะ!"
10035070-26 = "ขอประกาศให้ทราบอีกครั้ง! จากนี้ไปเราจะปิดสระ..."
10035070-28 = "ตะ... แต่ในร่มก็ปลอดภัยอยู่ใช่มั้ย? คงไม่ตามมาถึงตรงนี้หรอกเนอะ?"
10035070-29 = "อย่าผลักกันนะ!"
10035070-30 = "ไม่เป็นไรหรอก! จระเข้ตัวใหญ่เข้าประตูเล็กๆ นี้มาไม่ได้หรอก!"
10035070-33 = "วะ...ว้าก! นั่นมันอะไรกัน? จระเข้ตัวจริงนี่นา!"
10035070-34 = "คุณเจ้าของสวนน้ำครับ นั่นไม่ใช่จระเข้จริงๆ แต่เป็นจระเข้จักรกลครับ!"
10035070-35 = "คิดว่าฉันดูไม่ออกหรือไง!"
10035070-36 = "แล้วมันโผล่มาจากไหนน่ะ! แล้วทำไมถึงมาอยู่ที่สวนน้ำของเราได้!"
10035070-37 = "เมื่อกี้เราค้นหาไม่เจอไม่ใช่เหรอ!"
10035070-41 = "อึก! ไอ้จระเข้เฮงซวยนี่!"
10035070-43 = "สัตว์ประหลาดที่ฉันพูดถึงเมื่อกี้ก็คือเจ้านั่นละค่ะ!"
10035070-44 = "ทีนี้เชื่อพวกเราแล้วใช่มั้ยล่ะ?"
10035070-48 = "ขะ... ขะ... ขะ..."
10035070-50 = "ขะ?"
10035070-52 = "ขะ... ขอโทษครับพ้ม!"
10035070-53 = "เมื่อก่อนหน้านี้ผมไม่เชื่อจริงๆ น่ะครับ!"
10035070-54 = "ใครจะไปคิดว่าจะมีจระเข้ในสวนน้ำได้ล่ะครับ พวกคุณก็ลองคิดดูสิ?!"
10035070-55 = "แถมยังเป็นจระเข้จักรกลอีก!"
10035070-56 = "ตอนนี้ไม่ใช่เวลาที่จะมาโทษว่าใครผิดค่ะ ตอนนี้เราควรหยุดไม่ให้มันอาละวาดมากกว่าค่ะ"
10035070-57 = "พวกฉันจะเป็นฝ่ายลุยเอง ฝากคนที่นี่คุ้มกันให้หน่อยได้มั้ยคะ?"
10035070-58 = "ดะ... ได้เลยครับ!"
10035070-59 = "สมแล้วที่เป็นสถาบันฝึกตำรวจวัลคิรี่! แบบนี้ผมก็วางใจครับ!"
10035070-61 = "(ทีเมื่อกี้ละยังทำเป็นไม่เห็นหัวพวกเราอยู่เลย...)"

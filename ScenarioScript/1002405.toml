1002405-18 = "#na;(깊은 산속의 철길에서도.)"
1002405-19 = "3;시로코 라이딩;01;응. 이번에도 딱 맞춰 왔네.\n#3;a"
1002405-20 = "3;시로코 라이딩;03;힘내서 온 보람이 있어. 타올 교체 타이밍도 정확하고. 고마워, 선생님.\n#3;em;[음표]"
1002405-21 = "[s] \"힘들지 않아?\""
1002405-22 = "3;시로코 라이딩;01;음……. 글쎄……. 평소에 연습도 많이 했었으니까."
1002405-23 = "3;시로코 라이딩;01;물론 평소보다는 좀 더 하드한 일정이긴 하지만……. 그래도……."
1002405-24 = "3;시로코 라이딩;99;그 대신 이번에는…….\n#3;em;…"
1002405-25 = "3;시로코 라이딩;01;……음."
1002405-26 = "3;시로코 라이딩;04;역시 아무 것도 아냐.\n#3;em;[땀]\n#3;stiff"
1002405-27 = "3;시로코 라이딩;03;그럼 또 봐. 선생님."
1002405-28 = "#st;[0,0];instant;1;"

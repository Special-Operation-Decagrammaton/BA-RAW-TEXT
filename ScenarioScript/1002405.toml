[translation]
1002405-1 = "#title;모든 곳에서 함께"
1002405-2 = "#na;(시로코는 보내준 포인트 지점들로, 꼬박꼬박 예정시간 정시에 도착했다.)"
1002405-3 = "#na;(그리고 어째서인지, 엄청난 거리였음에도 오히려 꽤 즐거워하는 분위기였다.)"
1002405-4 = "#all;hide"
1002405-5 = "#na;(바닷가에서도.)"
1002405-6 = "2;시로코 라이딩;01\n#2;a\n#2;h\n#wait;1000"
1002405-7 = "2;시로코 라이딩;02\n#2;em;[반응]\n#wait;1000"
1002405-8 = "2;시로코 라이딩;01;아, 선생님. 여기야.\n#2;m3"
1002405-9 = "2;시로코 라이딩;03;고마워. 마침 좋은 타이밍이었어.\n#2;greeting\n#2;em;[반짝]"
1002405-10 = "[s] \"수고가 많네.\""
1002405-11 = "2;시로코 라이딩;01;아니. 하고 싶었던 일이니까."
1002405-12 = "2;시로코 라이딩;03;……후후."
1002405-13 = "2;시로코 라이딩;02;그럼 출발할게. 다음 포인트에서 만나.\n#3;em;[반응]"

1002405-33 = "#st;[0,0];instant;1;"
1002405-34 = "#clearST"
1002405-35 = "#wait;2000"
1002405-36 = "3;시로코 라이딩;02;이번에는 선생님이 먼저 도착했네.\n#3;a\n#3;em;[반응]"
1002405-37 = "3;시로코 라이딩;03;고마워, 선생님. 잘 마실게."
1002405-38 = "3;시로코 라이딩;01;……응? 즐거워 보인다고?\n#3;em;[?]"
1002405-39 = "3;시로코 라이딩;02;으, 으음……. 그건……."
1002405-40 = "3;시로코 라이딩;02;……."
1002405-41 = "3;시로코 라이딩;04;느, 늦었어. 이대로는 예정 시간을 맞출 수 없어.\n#3;em;[땀]\n#3;stiff"
1002405-42 = "3;시로코 라이딩;04;미안. 선생님. 바로 출발할게. 그럼."
1002405-43 = "#st;[0,0];instant;1;"

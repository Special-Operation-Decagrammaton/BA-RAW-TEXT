[translation]
1002405-1 = "ทุกที่กับเธอ"
1002405-2 = "(ชิโรโกะปั่นจักรยานมาถึงทุกจุดที่บอกไว้อย่างตรงเวลาสม่ำเสมอ)"
1002405-3 = "(และดูเหมือนกำลังสนุกอยู่กับสิ่งที่ทำมาก แม้จะต้องปั่นเป็นระยะทางไกล)"
1002405-5 = "(ทั้งในหาดทราย)"
1002405-8 = "อ๊ะ คุณครู ทางนี้"
1002405-9 = "ขอบคุณนะ มาได้จังหวะพอดีเลย"
1002405-10 = "[s] \"เหนื่อยน่าดูเลยนะ\""
1002405-11 = "ไม่หรอก มันเป็นสิ่งที่ฉันอยากทำมานานแล้วน่ะ"
1002405-12 = "ฮุฮุ..."
1002405-13 = "งั้นฉันไปแล้วนะ แล้วเจอกันที่จุดต่อไป"
1002405-18 = "(ทั้งในทางรถไฟในภูเขาลึก)"
1002405-19 = "ครั้งนี้ก็มาตรงเวลาเลยนะ"
1002405-20 = "คุ้มค่าเหนื่อยที่ต้องปั่นมาจัง ได้เจอคนเปลี่ยนผ้าเช็ดหน้าที่มาตรงเวลาตลอด ขอบคุณนะคุณครู"
1002405-21 = "[s] \"ไม่เหนื่อยเหรอ?\""
1002405-22 = "อืม... ไม่รู้สิ... ปกติฉันก็ฝึกหนักอยู่แล้ว"
1002405-23 = "จริงๆ การปั่นครั้งนี้มันกินเวลามากกว่าฝึกปกติมาก... แต่ก็..."
1002405-24 = "ครั้งนี้ฉันมี..."
1002405-25 = "อืม..."
1002405-26 = "ไม่มีอะไรหรอก"
1002405-27 = "ไว้เจอกันใหม่นะคุณครู"
1002405-32 = "(และบนสะพานที่เปิดกว้าง)"
1002405-36 = "ครั้งนี้คุณครูมาถึงก่อนแฮะ"
1002405-37 = "ขอบคุณสำหรับเครื่องดื่มนะคุณครู"
1002405-38 = "หืม? ฉันดูสนุกงั้นเหรอ?"
1002405-39 = "อืม... คือว่า..."
1002405-40 = "......"
1002405-41 = "มะ...ไม่มีเวลาแล้วล่ะ ถ้าหยุดพักนานๆ คงทำเวลาไม่ได้ตามที่กำหนด"
1002405-42 = "ขอโทษนะคุณครู ฉันขอไปก่อนล่ะ"
1002405-47 = "คุณครู ฉันมาแล้ว"
1002405-48 = "การปั่นในทริปนี้ราบรื่นและคืบหน้าไปได้ดีเลย "
1002405-49 = "ถ้าทำเวลาได้ดีแบบนี้ก็คงปั่นครบระยะได้อย่างไร้ปัญหา"
1002405-50 = "และทั้งหมดนี้เป็นเพราะ... เพราะคุณครูไงล่ะ"
1002405-51 = "[s] \"ดีใจจังที่ได้ช่วย\""
1002405-52 = "อื้ม"
1002405-53 = "คุณครูช่วยฉันได้เยอะเลยล่ะ"
1002405-54 = "[s] \"นี่คือจุดสุดท้ายที่จะแวะพักแล้วสินะ\""
1002405-55 = "อ๋อ..."
1002405-56 = "อื้ม จากนี้ฉันจะปั่นมาราธอนแบบไม่พักน่ะ"
1002405-57 = "แต่ก็คิดไว้แล้วล่ะว่าจะไปหยุดที่ไหน แล้วฉันจะส่งข้อความบอกนะ"
1002405-61 = "(ชิโรโกะปั่นจักรยานออกไปอย่างสดชื่น)"
1002405-63 = "(คุณครูตัดสินใจว่าจะกลับไปที่ห้องทำงานแล้วรอชิโรโกะติดต่อมา)"

1002405-47 = "3;시로코 라이딩;02;도착했어, 선생님.\n#3;em;[반응]\n#3;a"
1002405-48 = "3;시로코 라이딩;01;일주 계획도 꽤 많이 진행했네. 순조로워."
1002405-49 = "3;시로코 라이딩;03;이대로라면 큰 문제없이 일주를 성공할 수 있을 것 같아.\n#3;em;[음표]"
1002405-50 = "3;시로코 라이딩;99;이것도 다……. 선생님 덕분에……."
1002405-51 = "[s] \"도움이 됐다니 기쁜걸.\""
1002405-52 = "3;시로코 라이딩;01;응."
1002405-53 = "3;시로코 라이딩;03;정말로 큰 도움이 되고 있어.\n#3;greeting\n#3;em;[반짝]"
1002405-54 = "[s] \"표기된 포인트는 여기가 마지막이네.\""
1002405-55 = "3;시로코 라이딩;02;……아아."
1002405-56 = "3;시로코 라이딩;01;응. 여기서부터는 쉬는 포인트 없이 쭉 달릴 계획이야.\n#3;em;[반응]"
1002405-57 = "3;시로코 라이딩;03;생각해 둔 곳은 따로 있으니까, 도착하면 메시지를 보낼게."

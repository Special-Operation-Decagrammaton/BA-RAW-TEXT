[translation]
1005305-1 = "Rational Cheer Culture"
1005305-2 = "Schale Lounge"
1005305-6 = "Hello, Sensei. I have something I want to ask you regarding the Kivotos Halo Festival."
1005305-7 = "About these schedule adjustments and other requests..."
1005305-8 = "Oh, you were taking a break. I hope I didn't interrupt you..."
1005305-9 = "[s] \"No, I was just about to get back to work anyway.\""
1005305-10 = "I see. Then, could you please review these documents?"
1005305-11 = "What were you watching?"
1005305-12 = "Let's see who will step up to the plate as Millennium's hitter literally steps up to the plate."
1005305-13 = "A live broadcast of the Millennium Baseball Club's match..."
1005305-14 = "Come to think of it, the first regional qualifier is today."
1005305-15 = "[s] \"Is the baseball Interhigh Championship separate from the Kivotos Halo Festival?\""
1005305-16 = "Yes, baseball is very popular in Kivotos."
1005305-17 = "Unlike the Kivotos Halo Festival, which invites schools to participate in various events, the Interhigh Championship uses a more traditional sports bracket."
1005305-18 = "But as I've mentioned, the Millennium's baseball club isn't that good, so they're usually eliminated during regional qualifiers."
1005305-19 = "I don't watch that many of our baseball club's games."
1005305-23 = "[ns1] \"This paperwork is going to take a long time...\"\n[ns2] \"Are you okay with waiting?\""
1005305-24 = "Yes, that's fine."
1005305-25 = "Yes, that's fine."
1005305-26 = "I'll watch the game in the meantime."
1005305-28 = "Moments later..."
1005305-30 = "The pitcher throws, and... He. Is. Outta Here!"
1005305-31 = "Three strikes and you're out! This Millennium batter might want to remember that next time!"
1005305-32 = "Tch."
1005305-33 = "[s] \"Game not going well?\""
1005305-34 = "Oh, no. I was just thinking about...something else. Haha."
1005305-35 = "Don't mind me."
1005305-37 = "We've reached the bottom of the fifth inning, but Millennium's batters still do not know that the point is to hit the ball."
1005305-38 = "And I immediately eat crow! What a hit! For once, it's the ball that's outta here!"
1005305-39 = "...!"
1005305-40 = "...But not out by enough! It was a high hit, and it's coming straight down into the outfielder's waiting arms! That's two outs! And...three outs!"
1005305-41 = "Seriously?! A double play?!"
1005305-42 = "[s] \"Something else not going well?\""
1005305-43 = "Oh, sorry. I didn't realize how loud I was."
1005305-44 = "[s3] \"No need to apologize.\"\n[s4] \"It happens when you get swept up in the game.\""
1005305-45 = "I-It's not like that!"
1005305-46 = "I-It's not like that!"
1005305-47 = "Getting emotional over a game is not the right attitude, even for a fan!"
1005305-48 = "Healthy enjoyment of sports comes in the form of clear and calm deliberation that leads to rationally cheering for the players."
1005305-49 = "Otherwise, you'll just feel bad when your team loses... Cheering for the outcome instead of the players makes for fair-weather fans."
1005305-50 = "[s] \"If you say so, but—\""
1005305-52 = "But honestly! Would it hurt for them to win once in a while?"
1005305-53 = "It's not like they're hopeless! They've had plenty of winning opportunities!"
1005305-54 = "Bottom of the seventh, Millennium on the offensive, two outs, three balls, and their lead batter at the plate... This is do or die, folks."
1005305-55 = "Ugh... Please, just once..."
1005305-56 = "Batter winds up and... Oh! An absolute slam!"
1005305-60 = "That ball is flying! Flying! Right out of the park!"
1005305-61 = "Yes, yes, yes, yes! Home run! Home! Run!"
1005305-62 = "Did you see that? What a home run! What a comeback!"
1005305-63 = "The pitcher was great too. It was an incredible fastball, almost invisible, but our batter was better, and... I mean, it's just amazing!"
1005305-64 = "I knew our team could do it!"
1005305-65 = "Don't let up, Millennium! Destroy them!"
1005305-66 = "[ns] \"Um, Yuuka...?\""
1005305-68 = "[ns] \"You're really close...\""
1005305-72 = "Oh."
1005305-73 = "Um... Th-That was just... Uh..."
1005305-74 = "I got really into the game..."
1005305-75 = "D-Don't get me wrong! I'm never like this! Usually! B-But, you know, an exception to prove the rule..."
1005305-76 = "Hey! Why are you laughing?"
1005305-77 = "You've got the wrong idea! Just let me explain!"
1005305-79 = "After Yuuka's increasingly flustered explanations, I calmed her down so we could watch the baseball game."
1005305-80 = "...And we got to see Millennium win together."

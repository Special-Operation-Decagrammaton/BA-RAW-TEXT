[translation]
1005305-1 = "理性的應援文化"
1005305-2 = "夏萊．休息室"
1005305-6 = "你好，老師。關於晄輪大祭……"
1005305-7 = "當天的人員配置與流程等等，有很多事想討論……"
1005305-8 = "啊，原來老師在休息，不好意思打擾你了。"
1005305-9 = "[s]「沒關係，我也正好打算要回去工作。」"
1005305-10 = "那樣的話，請看這些文件……"
1005305-11 = "咦？老師在看什麼呢？"
1005305-12 = "「……接著，千年的打者……」"
1005305-13 = "千年棒球部的轉播……"
1005305-14 = "這麼說來，今天是地區選拔賽呢。"
1005305-15 = "[s]「棒球的校際比賽和晄輪大祭無關嗎？」"
1005305-16 = "是的。因為棒球相當受歡迎，所以就算單獨舉辦比賽也會有很多人參加。"
1005305-17 = "和各種競賽一起舉辦的晄輪大祭不同，棒球是由通過選拔的學園參加比賽。"
1005305-18 = "不過，之前也跟老師說過，千年的棒球部只是止步於地區選拔的弱小隊伍……"
1005305-19 = "所以沒有特地確認比賽日程和選手，或是到球場去過。"
1005305-23 = "[ns1]「抱歉，可能還需要一點時間……」\n[ns2]「不好意思，可以稍微等我一下嗎？」"
1005305-24 = "嗯，沒問題。"
1005305-25 = "嗯，沒問題。"
1005305-26 = "機會難得，我就邊看直播邊等吧。"
1005305-28 = "（過了一會……）"
1005305-30 = "「接著千年的打者……目前已經是兩好球……三球三振出局！」"
1005305-31 = "「連續投出兩顆好球後投手再次出手……#n　沒有擊中，大棒一揮依然揮棒落空，三振出局！」"
1005305-32 = "……咕。"
1005305-33 = "[s]「怎麼了？」"
1005305-34 = "沒，沒事。#n什麼都沒有……啊哈哈。"
1005305-35 = "請別在意。"
1005305-37 = "「五局下半，千年進攻。在一出局後終於有人上壘了呢。」"
1005305-38 = "「哦！這次第一球就順利擊中……」"
1005305-39 = "……！！"
1005305-40 = "「這是……三游間方向的短打！遭到雙殺！」"
1005305-41 = "喂，在打哪裡啊……！"
1005305-42 = "[s]「你有叫我嗎？」"
1005305-43 = "啊，對不起。#n什麼事也沒有。"
1005305-44 = "[s3]「沒關係唷，繼續吧繼續吧。」\n[s4]「比賽看得太入迷的時候難免會這樣嘛。」"
1005305-45 = "不，不可以！"
1005305-46 = "不，不可以！"
1005305-47 = "因為勝敗的結果而失去冷靜，可不能說是應援團該有的行為！"
1005305-48 = "不執著於勝負，純粹的為選手們加油，這樣才能健全的享受運動。"
1005305-49 = "當然，支持的隊伍落敗的話會讓人難過……不過正所謂「勝敗乃兵家常事」嘛。"
1005305-50 = "[s]「既然優香都這麼說了……」"
1005305-52 = "為什麼不能好好打啊……？"
1005305-53 = "會不會選球啊……！"
1005305-54 = "「千年科學學園，在七局下半的攻擊裡雖然成功讓逆轉的跑者上壘……#n　但現在已經是兩好三壞的滿球數……接下來會怎麼發展呢？」"
1005305-55 = "唔……拜託這次一定要……"
1005305-56 = "「投手投出的第八球……是直球，打擊出去！」"
1005305-60 = "「這球打得相當紮實，而且是順風！究竟如何……飛過了圍牆！」"
1005305-61 = "太好了！是全壘打！"
1005305-62 = "老師，你有看到嗎！？#n千年打出了全壘打！是一球逆轉！"
1005305-63 = "那種快速球，一般人連眼睛都跟不上唷。#n居然能打回去！"
1005305-64 = "不愧是千年的棒球部！我就知道他們一定可以的！"
1005305-65 = "來，老師也一起！#n打飛他們～千年學園！"
1005305-66 = "[ns]「那個……優香，同學？」"
1005305-68 = "[ns]「好像，靠的有點太近了。」"
1005305-72 = "……"
1005305-73 = "那，那個，這是因為……"
1005305-74 = "不小心太入迷了……"
1005305-75 = "那個，請不要誤會！我平常是不會這麼興奮的！"
1005305-76 = "等，等一下……！為什麼要笑成那樣啊！"
1005305-77 = "真的是誤會啦，老師！"
1005305-79 = "（之後，讓激動的優香冷靜下來後，一起看了轉播）"
1005305-80 = "（……千年棒球部成功保持領先，獲得了勝利）"

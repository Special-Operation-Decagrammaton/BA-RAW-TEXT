[translation]
2300502-1 = "งานอดิเรกของอายาเนะ"
2300502-2 = "โรงเรียนอะบิดอส"
2300502-3 = "(มาที่โรงเรียนในวันหยุดเพื่อมาเจออายาเนะ)"
2300502-4 = "(คงเพราะเป็นวันหยุดที่โรงเรียนจึงไม่มีใครอยู่เลย)"
2300502-5 = "[s] ไปดูที่ห้องชมรม"
2300502-7 = "ห้องชมรมคณะกรรมการแผนงาน"
2300502-8 = "(ไม่มีใครอยู่)"
2300502-9 = "(โครมมมมม!!!)"
2300502-10 = "(กรี๊ดดดดดด?!)"
2300502-11 = "[s] เสียงดังมาจากห้องข้างๆ....?!"
2300502-13 = "(อายาเนะนอนอยู่ใต้กองหนังสือหลายสิบเล่มในท่าที่แปลกประหลาด)"
2300502-14 = "[s1] \"อายาเนะ?!\"\n[s2] \"มะ...ไม่เป็นไรนะ?\""
2300502-15 = "คะ...คุณครู.....?"
2300502-16 = "คะ...คุณครู.....?"
2300502-17 = ".....กะ...? กรี๊ดดดดด!! ยะ...อย่ามองนะคะคุณครู!"
2300502-18 = "ฉันไม่อยากให้คุณครูเห็นฉันในสภาพนี้ค่ะ...."
2300502-19 = "[s] \"หืม....? แต่ว่าครูอยากช่วยเธอนะ....\""
2300502-21 = "ฉันไม่เป็นไรค่ะ ช่วยออกไปก่อนเถอะค่ะ!"
2300502-23 = "(ออกมาจากห้องอย่างช่วยไม่ได้)"
2300502-29 = "......."
2300502-30 = "สวัสดีค่ะคุณครู"
2300502-31 = "[s3] \"ไม่เป็นอะไรแน่นะ อายาเนะ?\"\n[s4] \"เกิดอะไรขึ้นน่ะ?\""
2300502-32 = "ขอโทษที่ทำให้เป็นห่วงนะคะ ฉันไม่เป็นไรค่ะ"
2300502-33 = "ขอโทษที่ทำให้เป็นห่วงนะคะ ฉันไม่เป็นไรค่ะ"
2300502-34 = "คือ...ฉันกำลังจะหยิบหนังสือที่วางอยู่บนชั้นแต่เสียหลักล้มซะก่อนค่ะ....."
2300502-35 = "ดันให้คุณครูเห็นอะไรแปลกๆ ซะแล้ว...."
2300502-36 = "กรี๊ดดดด....! ชะ...ช่วยลืมไปเถอะนะคะคุณครู!!"
2300502-37 = "[s5] \"เมื่อกี้ท่าแปลกจริงๆ นะ\"\n[s6] \"ถึงท่าจะแปลกนิดหน่อย แต่อายาเนะไม่บาดเจ็บตรงไหนก็ดีแล้ว\""
2300502-38 = "....."
2300502-39 = "........"
2300502-40 = "..."
2300502-41 = "(สะอื้นเบาๆ)"
2300502-42 = "[s] \"แค่ล้อเล่นน่ะ!\""
2300502-45 = "(ยืนขอโทษขอโพยอายาเนะอยู่พักใหญ่)"
2300502-47 = "ที่ฉันขอให้คุณครูมาวันนี้...."
2300502-48 = "ฉันเจอของสิ่งนี้ตอนที่จัดการห้องเรียนที่ไม่ได้ใช้น่ะค่ะ"
2300502-51 = "(อายาเนะส่งหนังสือที่ดูเก่าคร่ำครึให้คุณครู)"
2300502-52 = "[s] \"หนังสือโบราณ....?\""
2300502-53 = "ฉันคิดว่าคงเป็นของนักเรียนรุ่นก่อนๆ ที่ทิ้งเอาไว้...."
2300502-54 = "ฉันเคยได้ยินว่าเมื่อก่อนพวกรุ่นพี่มักมีงานอดิเรกหรูหราที่ดูแปลกๆ อยู่ด้วยค่ะ"
2300502-55 = "เพราะงั้นฉันเลยอยากขอให้คุณครูช่วยดูหน่อยว่ามันเป็นของมีราคารึเปล่า...."
2300502-56 = "คุณครูคิดว่ายังไงคะ?"
2300502-57 = "เหมือนจะเป็นหนังสือนิยายที่เขียนด้วยภาษาโบราณที่ฉันอ่านไม่ออก...."
2300502-58 = "[s7] \"อืม....\"\n[s8] \"ครูไม่แน่ใจเหมือนกัน....\""
2300502-59 = "อย่างงั้นเหรอคะ....."
2300502-60 = "อย่างงั้นเหรอคะ....."
2300502-61 = "[s9] \"ลองไปที่ร้านขายของเก่ากันดูไหม?\"\n[s10] \"ไปถามผู้เชี่ยวชาญน่าจะดีกว่านะ\""
2300502-62 = "คุณครูพูดถูกแล้วค่ะ...."
2300502-63 = "คุณครูพูดถูกแล้วค่ะ...."
2300502-64 = "แต่ถ้าขนาดคุณครูยังบอกไม่ได้ บางทีมันอาจจะไม่มีมูลค่าอะไร...."
2300502-65 = "เฮ้อ..."
2300502-66 = "[s] \"กำลังหาของที่มีราคาแพงอยู่เหรอ?\""
2300502-67 = "คะ? ปะ...เปล่าค่ะ ก็ไม่เชิงหรอกค่ะ..."
2300502-68 = "ฉันแค่บังเอิญเจอหนังสือเล่มนี้ตอนที่ทำความสะอาดห้องเรียนค่ะ"
2300502-69 = "แต่ทุกครั้งที่ฉันเจอของเก่าหรือของที่ดูมีราคาแพง ฉันก็อดคิดเรื่องราคาไม่ได้เลย..."
2300502-70 = "เฮ้อ... แต่พวกของมีค่าราคาแพงคงไม่ได้เจอกันง่ายๆ หรอกใช่ไหมล่ะคะ"
2300502-71 = "[s11] \"อายาเนะจังนี่เป็นเด็กที่ประหยัดมากเลยนะ\"\n[s12] \"งานอดิเรกของอายาเนะจังสินะ\""
2300502-72 = "คะ?! คือไม่ใช่แบบนั้น...."
2300502-73 = "คะ?! คือไม่ใช่แบบนั้น...."
2300502-74 = "คุณครูอย่ามองว่าฉันเป็นพวกยาจกจอมตระหนี่สิคะ...."
2300502-75 = "[s] \"ถ้าอยากให้ช่วยก็บอกได้ตลอดเลยนะ\""
2300502-76 = "เอ่อ ฮ่าๆๆ.... ขอบคุณค่ะคุณครู"
2300502-77 = "ถ้างั้นฉันจะขอรบกวนคุณครูสักหน่อยแล้วกันนะคะ"

[translation]
2300502-1 = "綾音的興趣"
2300502-2 = "阿拜多斯高中"
2300502-3 = "（為了見綾音來到了阿拜多斯高中）"
2300502-4 = "（因為是休假日，幾乎沒看到什麼人）"
2300502-5 = "[s] 去社團教室看看"
2300502-7 = "對策委員會．教室"
2300502-8 = "（教室裡空無一人）"
2300502-9 = "（啪哩──！哐噹哐噹！）"
2300502-10 = "（呀啊啊啊啊啊──！？）"
2300502-11 = "[s] （從旁邊的教室傳來的……！？）"
2300502-13 = "（綾音以奇怪的姿勢被壓在像山一樣的書本下）"
2300502-14 = "[s1] 「綾音！？」\n[s2] 「你，你還好嗎？」"
2300502-15 = "老，老師……？"
2300502-16 = "老，老師……？"
2300502-17 = "……啊，呀啊啊啊！？請，請不要看這邊，老師！"
2300502-18 = "這種樣子被老師看到的話……"
2300502-19 = "[s] 「呃……？不，就算這樣還是該幫忙……」"
2300502-21 = "沒，沒問題的，請在外面等我一下！"
2300502-23 = "（像是被趕出來一樣走出了教室）"
2300502-29 = "……"
2300502-30 = "……您好，老師。"
2300502-31 = "[s3] 「綾音，沒事吧？」\n[s4] 「到底發生了什麼事？」"
2300502-32 = "讓您看到那種害羞的樣子真是不好意思……不要緊，我沒有受傷。"
2300502-33 = "讓您看到那種害羞的樣子真是不好意思……不要緊，我沒有受傷。"
2300502-34 = "那個……我本來只是想爬到書櫃上拿一本書，沒想到卻失去平衡跌了下來……"
2300502-35 = "所以才讓老師看到我做出那樣奇怪的姿勢……"
2300502-36 = "嗚，嗚嗚……！請，請忘掉剛才的畫面，老師！！"
2300502-37 = "[s5] 「確實是很奇怪的姿勢。」\n[s6] 「綾音沒事就太好了。雖然姿勢確實很怪。」"
2300502-38 = "……"
2300502-39 = "……"
2300502-40 = "……"
2300502-41 = "（嗚嗚）"
2300502-42 = "[s] 「開，開玩笑的啦！」"
2300502-45 = "（之後一邊安慰綾音一邊道歉）"
2300502-47 = "其實我之所以會找老師來……"
2300502-48 = "是因為在整理已經沒在用的教室時，找到了這個。"
2300502-51 = "（綾音遞來了一本舊書）"
2300502-52 = "[s] 「舊書……？」"
2300502-53 = "我想，這或許是以前的學生遺留下來的東西……"
2300502-54 = "聽說以前很多人都有既花錢又古怪的興趣。"
2300502-55 = "於是我就想，說不定這其實是很值錢的東西，想請老師也看看……"
2300502-56 = "老師覺得怎麼樣呢？"
2300502-57 = "這上面似乎是用我看不懂的古代文字所寫成的，像小說一樣的東西……"
2300502-58 = "[s7] 「唔嗯……」\n[s8] 「我也不太清楚……」"
2300502-59 = "這樣呀……"
2300502-60 = "這樣呀……"
2300502-61 = "[s9] 「拿去古董店看看如何？」\n[s10] 「也許交給專家來看會更好。」"
2300502-62 = "果然是那樣嗎……"
2300502-63 = "果然是那樣嗎……"
2300502-64 = "可是，如果連老師都覺得不怎麼樣的話，也許那真的不是什麼值錢的東西……"
2300502-65 = "唉……"
2300502-66 = "[s] 「你在找值錢的東西嗎？」"
2300502-67 = "咦？不，也不是那個意思……"
2300502-68 = "只是在整理教室時，偶然發現的東西。"
2300502-69 = "因為看起來很古老，一想到說不定是很值錢的東西就在意的不得了……"
2300502-70 = "唉……但是，果然沒有這麼好運的事情對吧。"
2300502-71 = "[s11] 「綾音真會精打細算呢。」\n[s12] 「原來是綾音的興趣啊。」"
2300502-72 = "咦！？那個，倒也不是那樣……"
2300502-73 = "咦！？那個，倒也不是那樣……"
2300502-74 = "該說是錙銖必較嗎……真羞恥……"
2300502-75 = "[s] 「需要幫忙的時候隨時都能跟我說喔。」"
2300502-76 = "啊，啊哈哈……好的，謝謝老師。"
2300502-77 = "到時就恭敬不如從命囉。"

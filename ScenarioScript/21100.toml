[translation]
21100-1 = "第10話;再び、廃墟へ"
21100-2 = "廃墟"
21100-3 = "……先生っ！"
21100-4 = "伏せて！！"
21100-5 = "（ドカアアァァァン！）"
21100-6 = "うぅ……みんな、大丈夫？"
21100-7 = "私は平気、でも思ったより火力が……先生、大丈夫ですか！？"
21100-9 = "[ns] \"うん、大丈夫。\""
21100-10 = "来た、ロボットたち……！"
21100-11 = "大丈夫、まだ引き付けられる……！"
21100-12 = "……よし、"
21100-13 = "アリスちゃん！"
21100-14 = "やっちゃって！"
21100-16 = "（こくり）"
21100-17 = "今日の私の役割は、光属性広域アタッカー……"
21100-18 = "前方のモンスターたちを、殲滅します。"
21100-19 = "……光よ！"
21100-20 = "（ドカアアァァン！）"
21100-21 = "よし、成功！"
21100-22 = "アリスちゃん、すごい！"
21100-23 = "ま、まだ！敵の第二陣が接近中！"
21100-24 = "ここで立て続けはちょっと……流石に不利だよ、撤退しよう！先生もいるんだし、安全第一で作戦を立て直した方が、きっと……！"
21100-25 = "……ううん。"
21100-26 = "……ここで退くわけにはいかない、突破しよう。"
21100-27 = "ええっ！？"
21100-28 = "多分ここで退いても、状況は悪くなる一方。ロボットは今の戦闘音を聞いて、この後どんどん集まり続けるはず。"
21100-29 = "全部でどれくらい数がいるのか分からないけど、多分今が一番手薄……G.Bibleの座標が示してるあの「工場」に入るには、今が最大のチャンスだと思う。"
21100-31 = "で、でも……。"
21100-32 = "大丈夫です。"
21100-33 = "アリスちゃん……？"
21100-34 = "私たちは今まで一緒に、27回のダンジョン探索と、139回のレイドバトルを成功させてきました。"
21100-35 = "今回もきっと……このパーティなら、勝利できるはずです。"
21100-36 = "で、でも、それはゲームの話でしょ！？"
21100-37 = "どう転んでも、危険はある……わたしも、頑張るから。"
21100-38 = "で、でも先生は？私たちと違って、攻撃を受けたら……！"
21100-39 = "安心してください。"
21100-40 = "えっ？"
21100-41 = "どれだけ危険な状況であっても、アリスが先生を守ります。"
21100-43 = "先生……アリスを信じて、私たちと一緒に来てくれますか？"
21100-44 = "[s1] \"もちろん。\"\n[s2] \"うん。私も仲間として、私にできることをするね。\""
21100-45 = "……！"
21100-46 = "……！"
21100-47 = "パンパカパーン！先生があらためて、仲間になりました！"
21100-48 = "ふぅ……分かった、私も覚悟を決める！"
21100-49 = "ゲーム開発部、敵を突破するよ！"
21100-50 = "先生、指揮をお願いします！"

[translation]
21100-1 = "ตอนที่ 10;ไปยังพื้นที่รกร้างอีกครั้ง"
21100-2 = "พื้นที่รกร้าง"
21100-3 = "คุณครู..."
21100-4 = "หมอบลง!!"
21100-5 = "(ตู้มมมมม!)"
21100-6 = "ทุกคนเป็นอะไรหรือเปล่า?"
21100-7 = "อึ้ก กำลังอาวุธแรงกว่าที่คิดอีกนะเนี่ย! แล้วคุณครูล่ะ?!"
21100-9 = "[ns] \"ครูไม่เป็นไร\""
21100-10 = "พวกหุ่นยนต์บุกเข้ามาเรื่อยๆ เลย ขืนเป็นอย่างนี้...!"
21100-11 = "ไม่ต้องห่วง ฉันตั้งใจล่อพวกมันมาในที่แคบๆ แบบนี้"
21100-12 = "ฮู้ว..."
21100-13 = "อาริสึจัง!"
21100-14 = "ตอนนี้แหละ!"
21100-16 = "(พยักหน้า)"
21100-17 = "ตำแหน่งของฉันวันนี้ก็คือ... ดีลเลอร์พลังแสง..."
21100-18 = "กวาดล้างมอนสเตอร์ที่อยู่ด้านหน้า"
21100-19 = "ลำแสงทำลายล้าง!"
21100-20 = "(ตู้มมมม!)"
21100-21 = "สะ.. สำเร็จ!"
21100-22 = "สุดยอดไปเลย อาริสึจัง!"
21100-23 = "ยังมีอีก! กองกำลังที่ 2 กำลังบุกเข้ามา!"
21100-24 = "เข้ามารบต่อทันทีเลยเหรอ แบบนี้เราเสียเปรียบนะ! หนีกันเถอะ เราจะให้คุณครูเสี่ยงอันตรายไม่ได้..."
21100-25 = "ไม่สิ..."
21100-26 = "เราจะหนีไม่ได้ เราต้องฝ่าพวกนั้นไป"
21100-27 = "เอ๋?!"
21100-28 = "ถ้าถอยไปจากที่นี่ เราก็จะไม่มีโอกาสอีกแล้วนะ อีกอย่าง พวกหุ่นยนต์กำลังบุกเข้ามาเรื่อยๆ#nก็เพราะพวกมันได้ยินเสียงการต่อสู้"
21100-29 = "หากจะเข้าไปยัง 'โรงงาน' ที่เป็นพิกัดของ G.Bible ก็จะต้องใช้จังหวะนี้แหละ"
21100-31 = "ตะ.. แต่ว่า..."
21100-32 = "เราทำได้ค่ะ"
21100-33 = "หืม? อาริสึจัง?"
21100-34 = "พวกเราสำรวจดันเจี้ยนมาแล้ว 27 ครั้ง และเคลียร์บอสสำเร็จถึง 139 ครั้งมาแล้วนะคะ"
21100-35 = "ถ้าครั้งนี้เราร่วมมือกัน... ก็จะชนะได้ค่ะ"
21100-36 = "ไม่นะ... นั่นมันเกมโหมดเล่นหลายคนไม่ใช่เหรอ!?"
21100-37 = "อืม... มันก็อันตรายอยู่... แต่ฉันจะเอาด้วย"
21100-38 = "แล้วคุณครูล่ะ? คุณครูต่างจากเรานะ คุณครูอาจได้รับอันตรายก็ได้!"
21100-39 = "ไม่เป็นไรค่ะ"
21100-40 = "หืม?"
21100-41 = "อาริสึจะปกป้องคุณครูเอง แม้ว่าต้องเข้าเขตอันตรายแค่ไหนก็ตามค่ะ"
21100-43 = "คุณครูจะร่วมทางกับอาริสึ และพวกเราทุกคนไหมคะ?"
21100-44 = "[s1] \"แน่นอน\"\n[s2] \"เราทีมเดียวกันอยู่แล้ว\""
21100-45 = "......!"
21100-46 = "......!"
21100-47 = "ปาปัม ปาปัม ป๊าม! คุณครูได้เข้ามาเป็นสหายแล้วค่ะ"
21100-48 = "ฮ่ะฮ่า ดีเลย เอาล่ะนะ!"
21100-49 = "ชมรมพัฒนาเกม! ฝ่าศัตรูไปให้ได้"
21100-50 = "คุณครู! ช่วยออกคำสั่งด้วยค่ะ!"

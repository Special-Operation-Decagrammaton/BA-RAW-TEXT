[translation]
21100-1 = "第10話;再次，前往廢墟"
21100-2 = "廢墟"
21100-3 = "……老師！"
21100-4 = "快趴下！！"
21100-5 = "（碰喀──！）"
21100-6 = "唔……大家都還好嗎？"
21100-7 = "我沒事，但是火力比想像中還……老師，你還好嗎！？"
21100-9 = "[ns] 「嗯，我沒事。」"
21100-10 = "過來了！那些機器人……！"
21100-11 = "沒事的，我還能吸引住火力……！"
21100-12 = "……好了，"
21100-13 = "愛麗絲醬！"
21100-14 = "交給你了！"
21100-16 = "（點頭）"
21100-17 = "今天的我負責的是，光屬性的範圍輸出……"
21100-18 = "將前方的怪物們，全數殲滅。"
21100-19 = "……光呀！"
21100-20 = "（咚喀──！）"
21100-21 = "好，成功了！"
21100-22 = "愛麗絲醬，真厲害！"
21100-23 = "還，還沒完！第二波敵人正在接近！"
21100-24 = "繼續在這裡僵持下去的話……實在是有點不利，先撤退吧！#n畢竟有老師在，以安全為優先重新制定戰術的話，肯定……！"
21100-25 = "……不。"
21100-26 = "……不能在這裡撤退，我們突破吧。"
21100-27 = "咦咦！？"
21100-28 = "就算在這裡撤退，情況也會越變越糟的。#n那些機器人聽到這裡的戰鬥聲，應該會漸漸聚集過來才對。"
21100-29 = "雖然不知道他們總共有多少，但現在或許已經是防守最薄弱的時候了……#n要進入G.Bible座標所在的「工廠」的話，我想現在就是最好的機會了。"
21100-31 = "但，但是……"
21100-32 = "沒問題的。"
21100-33 = "愛麗絲醬……？"
21100-34 = "我們至今為止，已經成功完成了27次的地城探索和139次的副本戰鬥了。"
21100-35 = "這次也肯定……如果是這個隊伍的話一定能勝利的。"
21100-36 = "但，但是，那是在遊戲裡吧！？"
21100-37 = "不管怎麼樣，終究還是有危險的……我也會加油的。"
21100-38 = "但是老師呢？老師和我們不一樣，要是被攻擊的話……！"
21100-39 = "請放心吧。"
21100-40 = "咦？"
21100-41 = "不管遇到怎麼樣的危險，愛麗絲都會保護老師的。"
21100-43 = "老師……你願意相信愛麗絲，和我們一起來嗎？"
21100-44 = "[s1] 「當然了。」\n[s2] 「嗯。我也會做為大家的夥伴盡我所能的。」"
21100-45 = "……！"
21100-46 = "……！"
21100-47 = "乓啪喀乓！老師再次成為夥伴了！"
21100-48 = "呼……我知道了，我也做好覺悟了！"
21100-49 = "遊戲開發部，要突破敵人了唷！"
21100-50 = "老師，指揮就麻煩你了！"

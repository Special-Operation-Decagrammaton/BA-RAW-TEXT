[translation]
1000808-1 = "Shining Night"
1000808-2 = "Millennium School Hallway"
1000808-3 = "Hey, Sensei. Thanks for coming out so late."
1000808-4 = "The place I wanted to show you is kind of a secret."
1000808-5 = "I've never told anyone else about it before..."
1000808-6 = "This is where I go when I'm cutting class."
1000808-7 = "So only you can know about this place."
1000808-8 = "All right, Sensei. "
1000808-9 = "Close your eyes."
1000808-11 = "Come on."
1000808-13 = "Grab my hand."
1000808-16 = "Hey! That's not my hand!"
1000808-17 = "*sigh* Don't surprise me like that."
1000808-18 = "Come on. This way."
1000808-22 = "*ding*"
1000808-23 = "Heh. Figure it out yet? It's an elevator!"
1000808-24 = "Of course we're heading up."
1000808-25 = "Better brace yourself. This thing goes 2000 meters per minute."
1000808-26 = "*vroom*"
1000808-27 = "..."
1000808-28 = "..."
1000808-29 = "..."
1000808-30 = "*vroom*"
1000808-31 = "*ding*"
1000808-32 = "Here we are. Our stop."
1000808-33 = "I'd recommend watching your step."
1000808-37 = "*whish*"
1000808-38 = "You can open your eyes now, Sensei."
1000808-39 = "[s] \"...!\""
1000808-42 = "― Welcome, Sensei. To my favorite spot in the world.[wa:2900] "
1000808-45 = "― I love this school. And...moments like this.[wa:3820] "
1000808-48 = "― Aren't I scared of heights? Not really. I get a rush when I'm up here.[wa:3710] "
1000808-51 = "― Well, I guess you can see why I cut class sometimes. Hahaha![wa:1650] "
1000808-54 = "Millennium Rooftop"
1000808-55 = "Ah... I needed that."
1000808-56 = "But now that you know about this spot, it's not a secret anymore. Maybe it's time I let it go."
1000808-57 = "[s] \"What do you mean? Now it's our little secret.\""
1000808-58 = "..."
1000808-59 = "Our little secret..."
1000808-60 = "We always seem to be keeping secrets between us...or at least that's how I see it."
1000808-62 = "Not that I mind or anything!"
1000808-63 = "..."
1000808-64 = "Honestly, I really treasure it."
1000808-65 = "..."
1000808-66 = "S-So..."
1000808-67 = "...I hope you'll continue to trust in me, Sensei."
1000808-70 = "As long as I'm with you, Sensei... I don't mind keeping little secrets just between us."

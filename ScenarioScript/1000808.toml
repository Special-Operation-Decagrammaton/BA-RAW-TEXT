[translation]
1000808-1 = "閃耀的黑夜"
1000808-2 = "千年學園．走廊"
1000808-3 = "哈哈，老師。這麼晚辛苦了。"
1000808-4 = "想讓你看的東西，在祕密地點。"
1000808-5 = "還沒有告訴過任何人的地方……"
1000808-6 = "你問我為什麼，因為是我翹課常會去的地方，要是地點暴露了就麻煩了……"
1000808-7 = "所以會帶去的，也只有老師了。"
1000808-8 = "那麼，老師。"
1000808-9 = "閉上眼睛。"
1000808-11 = "快點。"
1000808-13 = "握住我的手。"
1000808-16 = "呀啊！那，那裡不是手啦！"
1000808-17 = "呼，真的嚇死我了……"
1000808-18 = "……來，這邊。"
1000808-22 = "（叮）"
1000808-23 = "呵呵，注意到了嗎？啊啊，是電梯。"
1000808-24 = "嗯？要上去嗎？當然。"
1000808-25 = "據說這裡的電梯速度，每分鐘2000公尺哦。"
1000808-26 = "（嗚咿咿咿咿咿咿咿……）"
1000808-27 = "……"
1000808-28 = "…………"
1000808-29 = "………………"
1000808-30 = "（哐隆！） "
1000808-31 = "（叮～）"
1000808-32 = "好，到了。"
1000808-33 = "來，慢慢往前走。"
1000808-37 = "（咻──……）"
1000808-38 = "眼睛，可以睜開囉，老師。"
1000808-39 = "[s]「……！」"
1000808-42 = "― 歡迎，老師。只屬於我的特等席，歡迎你哦！[wa:4100] "
1000808-45 = "― 我喜歡這間學園。還有……這一瞬間。[wa:4900] "
1000808-48 = "― 你問不會怕嗎？完全不會。只是，會很興奮。[wa:5710] "
1000808-51 = "― 嘛，偶爾翹課也不錯啊。哈哈哈！[wa:3450] "
1000808-54 = "千年學園．屋頂"
1000808-55 = "啊啊好開心。 "
1000808-56 = "雖然告訴老師了，但不准告訴其他人哦。"
1000808-57 = "[s] 「嗯，我會當作我們兩人的祕密。」"
1000808-58 = "……"
1000808-59 = "兩人之間的祕密……"
1000808-60 = "總，總覺得老師和我之間的祕密，好像越來越多了……是我的錯覺嗎？"
1000808-62 = "不，不是討厭的意思！！ "
1000808-63 = "……"
1000808-64 = "真，真的，不討厭。"
1000808-65 = "……"
1000808-66 = "所，所以說。"
1000808-67 = "……接下來也，請，請多指教啦，老師。"
1000808-70 = "要和老師一起，感覺從今以後…… #n這種祕密，會越來越多呢。"

[translation]
1000808-1 = "ค่ำคืนที่ดาวระยิบระยับ"
1000808-2 = "ทางเดินในโรงเรียนมิลเลเนียม"
1000808-3 = "ฮะฮ่าฮ่า! ครู! ขอบคุณที่ออกมาตอนกลางคืนแบบนี้นะ"
1000808-4 = "สถานที่ฉันอยากพาครูไปดูมันเป็นความลับน่ะ"
1000808-5 = "ฉันไม่เคยบอกใครเรื่องที่นี่เลย..."
1000808-6 = "เพราะมันเป็นที่ที่ฉันมักจะไปประจำเวลาที่โดดเรียนน่ะสิ ถ้าบอกให้คนอื่นรู้ก็คงไม่ดี..."
1000808-7 = "เพราะงั้นฉันเลยบอกแค่ครูไงล่ะ"
1000808-8 = "เอาล่ะ..."
1000808-9 = "ครูหลับตาก่อนนะ"
1000808-11 = "มาสิ"
1000808-13 = "จับมือฉันไว้ล่ะ"
1000808-16 = "อ๊ะ! นั่นไม่ใช่มือฉันสักหน่อย!"
1000808-17 = "เฮ้อ ตกใจหมดเลย"
1000808-18 = "เอ้า... มาทางนี้สิ"
1000808-22 = "(ติ๊ง)"
1000808-23 = "หึหึ รู้แล้วงั้นเหรอ? ลิฟต์ไงล่ะ"
1000808-24 = "หืม? ขึ้นไปข้างบนรึเปล่างั้นเหรอ? ใช่แล้ว กำลังขึ้นไปข้างบนน่ะ"
1000808-25 = "บอกไว้ก่อนนะ ลิฟต์ตัวนี้เคลื่อนที่เร็วสองพันเมตรต่อนาทีเลย"
1000808-26 = "(ฮู่มมมมมมมม)"
1000808-27 = "......"
1000808-28 = "......"
1000808-29 = "..."
1000808-30 = "(ฮู่มมมมม!) "
1000808-31 = "(ติ๊ง)"
1000808-32 = "เอาล่ะ มาถึงแล้ว"
1000808-33 = "เอ้า ค่อยๆ ก้าวมาข้างหน้าล่ะ"
1000808-37 = "(ผิวปาก)"
1000808-38 = "ครูลืมตาได้แล้วล่ะ"
1000808-39 = "[s] \"...!\""
1000808-42 = "― เข้ามาสิ ครู ขอต้อนรับสู่ ที่นั่งพิเศษของฉัน![wa:3100] "
1000808-45 = "― ฉันชอบโรงเรียนนี้ และ... ฉันก็ชอบช่วงเวลานี้[wa:3820] "
1000808-48 = "― ฉันน่ะเหรอ? ไม่กลัวหรอก ก็แค่ตื่นเต้นนิดหน่อย[wa:4710] "
1000808-51 = "― ก็นะ... บางครั้งการได้โดดเรียนมันก็สนุกดี ฮ่าฮ่าฮ่า![wa:1970] "
1000808-54 = "ดาดฟ้า มิลเลเนียม"
1000808-55 = "อ่า... สนุกจังเลย"
1000808-56 = "ฉันบอกให้ครูรู้จักที่นี่แล้ว... ต่อไปมันก็ไม่ใช่สถานที่ลับอีกต่อไปแล้วล่ะ"
1000808-57 = "[s] \"งั้นเก็บไว้เป็นความลับระหว่างเราสองคนนะ\""
1000808-58 = "......"
1000808-59 = "ความลับระหว่างเราสองคน..."
1000808-60 = "ดะ...ดูเหมือนความลับของเราสองคนจะเยอะขึ้นเรื่อยๆ เลย... หรือฉันคิดไปเองนะ"
1000808-62 = "มะ...ไม่ใช่ว่าฉันไม่ชอบหรอกนะ!! "
1000808-63 = "........"
1000808-64 = "ไม่ได้รังเกียจด้วย..."
1000808-65 = "......"
1000808-66 = "พะ... เพราะงั้นแล้ว"
1000808-67 = "...กะ...ก็ขอรบกวนด้วยนะครู"
1000808-70 = "ถ้าได้อยู่กับครูแบบนี้... ความลับของเราคงจะค่อยๆ เยอะขึ้นอีกแน่"

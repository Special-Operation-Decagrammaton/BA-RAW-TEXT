[translation]
84308100402-6 = "อะ... อ๊ะ...! คนใหญ่คนโต!!"
84308100402-7 = "ไม่ต้องเรียกกันแบบนั้นก็ได้ค่ะ... กำลังโดนดุกันอยู่สินะคะ"
84308100402-8 = "พวกเรากำลังสำนึกผิดกันอยู่ค่ะ..."
84308100402-9 = "ค่ะ! เราจะใช้โอกาสนี้ในการคิดวางแผนกลยุทธ์ที่ซับซ้อนให้มากขึ้นค่ะ!!"
84308100402-13 = "เดี๋ยวเหอะ!! ที่ฉันพูดไปน่ะเข้าหูบ้างหรือเปล่า!!"
84308100402-19 = "ฮะ... ฮือ..."

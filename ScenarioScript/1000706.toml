[translation]
1000706-1 = "Aesthetic Maintenance"
1000706-2 = "City of Kivotos"
1000706-3 = "Yay! Thanks for buying me ice cream, Sensei."
1000706-4 = "[s] \"Think of it as a gift for passing the make-up exam.\""
1000706-5 = "I feel like I'm the one who owes you a gift for tutoring me..."
1000706-6 = "But I could I never turn down food from you, Sensei!"
1000706-7 = "I just remembered, Sensei. Did you know there's a new clothing store nearby?"
1000706-8 = "It looked like they had a lot of trendy clothes for people your age when I passed by."
1000706-9 = "I'm sure we'll find something perfect for you. I'll help you pick, so let's go!"
1000706-10 = "[s] \"You're on.\""
1000706-11 = "La la la! Shopping with Sensei! ♪"
1000706-12 = "Hmm. What's that smell?"
1000706-14 = "Ugh. Someone threw their trash out along that wall again."
1000706-15 = "[s] \"Again? Does it happen often?\""
1000706-16 = "Yeah. Since that spot is out of sight and covered in graffiti, it's a popular place for people to dump their garbage."
1000706-17 = "It's like they have no remorse at all just because the wall is so dirty."
1000706-18 = "Maybe people wouldn't be so willing to litter if it were cleaner..."
1000706-19 = "[s] \"Good point. I can see why that would be a problem.\""
1000706-20 = "Yup. It's big trouble..."
1000706-22 = "..."
1000706-27 = "La la la! ♪ That takes care of all the trash. This place should stay a lot cleaner now."
1000706-28 = "[s] \"What are you doing?\""
1000706-29 = "Ahhh! S-Sensei, when did you get here?"
1000706-30 = "I swear I wasn't doing anything suspicious..."
1000706-31 = "[s] \"...Are you tagging the wall?\""
1000706-32 = "W-Well...the wall is all dirty and old... I thought I could get people to stop littering in front of it if I painted something pretty on it."
1000706-33 = "I know I'm breaking the promise I made. I'm sorry."
1000706-34 = "Are you angry with me Sensei? *groan*..."
1000706-35 = "[s] \"Just this once.\""
1000706-36 = "Huh?"
1000706-37 = "[s] \"I'll let it go just this once.\""
1000706-38 = "Sensei... You're the best!"
1000706-39 = "[s] \"But we'll apologize to the owner together when you're done.\""
1000706-40 = "Gah, fine. I guess I do owe them that much."
1000706-41 = "Still, I'm glad that you're going to join me. I don't want to get arrested by myself again."
1000706-42 = "Would you mind helping me clear this last pile of junk out of the way, Sensei?"
1000706-43 = "[s] \"Sure thing.\""
1000706-44 = "Hah. Thanks. "
1000706-45 = "I hope people stop dumping their litter here."

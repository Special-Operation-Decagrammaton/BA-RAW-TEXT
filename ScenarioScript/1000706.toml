[translation]
1000706-1 = "美化活動"
1000706-2 = "奇普托斯．市內"
1000706-3 = "太好了，謝謝你請我吃冰，老師。"
1000706-4 = "[s]「這是送給順利通過重考的真紀的禮物。」"
1000706-5 = "禮物的話，明明應該是我要給教我念書的老師才對……"
1000706-6 = "但是難得老師請我吃冰，我會好好享用的，老師！"
1000706-7 = "對了，老師。 #n你知道這附近新開了一家服裝店嗎？"
1000706-8 = "我經過的時候看了一下，有賣很多看起來不錯成熟的衣服。"
1000706-9 = "一定可以找到老師會喜歡的衣服。我來幫忙選，一起去吧！"
1000706-10 = "[s] 「嗯。」"
1000706-11 = "哼哼～和老師逛街～♪ "
1000706-12 = "咦，這什麼味道呀？"
1000706-14 = "……嗚咦，又有人把垃圾丟在牆邊了。"
1000706-15 = "[s] 「又？這是常有的事嗎？」"
1000706-16 = "嗯，不知道是不是那面牆不只位置不顯眼，而且還被不良分子畫滿了塗鴉，常有路人隨手把垃圾丟在那裡。"
1000706-17 = "可能是因為牆壁本來就很髒，所以人們就若無其事地亂丟垃圾。"
1000706-18 = "如果牆壁本身再乾淨一點的話，大家應該就不會隨便丟垃圾了……"
1000706-19 = "[s] 「這樣啊，真糟糕呢。」"
1000706-20 = "嗯，真的是……"
1000706-22 = "……"
1000706-27 = "哼哼～♪ #n垃圾也都收拾完了……這種程度的話，乾淨又可愛，吧？"
1000706-28 = "[s] 「妳在做什麼？」"
1000706-29 = "嗚，嗚哇！？ #n老，老師，你什麼時候來的！？"
1000706-30 = "這，這，這不是在做可疑的事……"
1000706-31 = "[s] 「……在變髒的牆上，畫圖？」"
1000706-32 = "那，那是因為……牆壁又髒又老舊…… #n我想如果畫一幅可愛的畫，大家在丟垃圾前應該會多考慮一下吧……"
1000706-33 = "……不過約定就是約定呢，打破了約定，對不起。"
1000706-34 = "老師，你果然生氣了吧？嗚嗚嗚…… "
1000706-35 = "[s] 「……只有這一次而已唷。」"
1000706-36 = "咦？"
1000706-37 = "[s] 「這次就裝作沒看到。」"
1000706-38 = "老師……真的很謝謝你！"
1000706-39 = "[s] 「作為代替，之後一起去向主人道歉吧。」"
1000706-40 = "唔，說得也是呢…… #n畢竟確實畫了……"
1000706-41 = "不過，老師說了「一起」所以比較安心了。 #n我怕又一個人被警察抓去訓一頓。"
1000706-42 = "老師，最後可以幫我把這個剩下的大型垃圾收拾掉嗎？"
1000706-43 = "[s] 「可以呀。」"
1000706-44 = "呵呵，謝謝。"
1000706-45 = "希望大家不會再丟垃圾在這裡了。……吶？"

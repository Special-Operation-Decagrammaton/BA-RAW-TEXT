[translation]
1000706-1 = "#Title;미화 정비"
1000706-2 = "#Place;키보토스 시내"
1000706-3 = "3;마키;03;야호~ 아이스크림 사줘서 고마워, 선생님.\n#3;em;[음표]\n#3;greeting\n#3;a"
1000706-4 = "[s] \"무사히 재시험을 통과한 마키에게 주는 선물이야.\""
1000706-5 = "3;마키;99;선물은 공부를 가르쳐 준 선생님께 내가 드려야 했는데… \n#3;em;[...]"
1000706-6 = "3;마키;00;그래도 잘 먹을게, 선생님!"
1000706-7 = "3;마키;02;맞다, 선생님. #n이 근처에 새로운 옷가게가 생긴 거 알고 있어?\n#3;em;[반응]\n#3;m4"
1000706-8 = "3;마키;01;지나가다 봤는데, 여러가지 멋진 어른 옷도 팔고 있더라고.\n#3;m3"
1000706-9 = "3;마키;03;분명 선생님이 좋아할 만한 옷을 찾을 수 있을 거야. 내가 골라 줄게, 같이 가자!\n#3;em;[반짝]\n#3;hophop"
1000706-10 = "[s] \"좋아.\""
1000706-11 = "3;마키;07;흥~ 흥~ 선생님과 쇼핑~♪ \n#3;m4\n#3;em;[음표]"
1000706-12 = "3;마키;04;어라, 이게 무슨 냄새지?"
1000706-13 = "3;마키;01\n#3;m5\n#3;h\n#wait;1500"
1000706-14 = "3;마키;06;……으으, 누가 또 저 벽에다가 쓰레기를 버려 놨네.\n#3;em;[빠직]"
1000706-15 = "[s] \"또? 자주 있는 일이야?\""
1000706-16 = "3;마키;06;응, 저 벽은 그늘진 곳에 있는 데다가 불량스러운 낙서가 잔뜩 되어 있어서 지나가며 쓰레기를 버리는 사람들이 종종 있거든.\n#3;m3"
1000706-17 = "3;마키;06;벽이 지저분하니 사람들이 아무렇지도 않게 쓰레기를 계속 버리는 것 같아."
1000706-18 = "3;마키;05;조금 더 벽이 예쁘게 꾸며져 있다면 사람들도 쉽게 쓰레기를 버리지 못할 텐데……\n#3;em;[속상함]"
1000706-19 = "[s] \"그러게, 큰일이네.\""
1000706-20 = "3;마키;05;응. 정말 큰일이야……"
1000706-21 = "3;마키;05\n#3;m4\n#wait;1000"
1000706-22 = "3;마키;05;…….\n#3;em;…"
1000706-23 = "#all;hide"
1000706-24 = "5;마키;01\n#5;h\n#5;greeting\n#wait;1500\n#5;a"
1000706-25 = "5;마키;01\n#5;h\n#5;greeting\n#wait;2500"
1000706-26 = "5;마키;01\n#5;h\n#5;m4\n#wait;1000"
1000706-27 = "5;마키;03;흥~ 흥~♪ #n쓰레기도 다 치웠고…… 이만하면 깨끗하게 보이겠지?\n#5;em;[음표]"
1000706-28 = "[s] \"뭐 하고 있는 거야?\""
1000706-29 = "5;마키;04;우, 우앗—!? #n서, 선생님, 언제 온 거야?\n#5;shake\n#5;em;[?!]"
1000706-30 = "5;마키;04;이, 이, 이건 수상한 일을 하고 있었던 게 아니라……\n#5;m3\n#5;hophop"
1000706-31 = "[s] \"……더러워진 벽에 벽화를?\""
1000706-32 = "#5;hide\n3;마키;05;그, 그러니까…… 벽이 너무 오래되고 지저분해 보여서…… #n예쁜 그림을 그려 두면 사람들이 쓰레기를 버리기 전에 한 번 더 생각을 해주지 않을까 싶어서……\n#3;em;[...]"
1000706-33 = "3;마키;05;그래도 약속은 약속인데, 어겨서 미안해."
1000706-34 = "3;마키;05;선생님, 역시 화났지? 우으으…… \n#3;em;[속상함]\n#3;stiff"
1000706-35 = "[s] \"……이번 한 번 뿐이야.\""
1000706-36 = "3;마키;02;응?"
1000706-37 = "[s] \"이번에는 특별히 모른 척 해줄게.\""
1000706-38 = "3;마키;03;선생님…… 정말 고마워!\n#3;greeting\n#3;em;[반짝]"
1000706-39 = "[s] \"대신 주인에게는 나중에 같이 사과하러 가자.\""
1000706-40 = "3;마키;04;윽, 그건 그래야 겠지? #n잘못한 건 잘못한 거니까.\n#3;em;[땀]"
1000706-41 = "3;마키;01;그래도 선생님이 같이 있어 준다니 조금 안심이 되네. #n또 혼자서 경찰 아저씨한테 끌려가 혼날까 봐 무서웠거든."
1000706-42 = "3;마키;00;선생님, 마지막으로 여기에 남은 큰 쓰레기를 치우는 걸 도와줄래?\n#3;em;[반응]"
1000706-43 = "[s] \"알았어.\""
1000706-44 = "3;마키;01;후후, 고마워."
1000706-45 = "3;마키;03;사람들이 더 이상 여기에 쓰레기를 버리지 않았으면 좋겠다, 그치?\n#3;em;[반짝]"

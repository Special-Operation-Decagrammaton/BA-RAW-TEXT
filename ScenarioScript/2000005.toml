[translation]
2000005-1 = "直擊你的心"
2000005-2 = "千年．第12操場"
2000005-3 = "老師，歡迎回來。"
2000005-4 = "其實這是我第一次收到運動部請求協助。"
2000005-5 = "問題在於我不了解棒球這種運動。"
2000005-6 = "基本上我只知道這是要用名為球棒的素材，製造生產出安打或全壘打這種東西的比賽。"
2000005-7 = "[s1] 「感覺和真正的棒球有微妙的差異。」\n[s2] 「算……是嗎？」"
2000005-8 = "沒問題。 #n總之……就是要打中投手投出的球，藉此製造分數對吧。"
2000005-9 = "沒問題。 #n總之……就是要打中投手投出的球，藉此製造分數對吧。"
2000005-10 = "而對我這種製作東西的人來說……"
2000005-11 = "重點在於確定自己作品的「目的」。"
2000005-12 = "那麼，對於目的在於「打進高中校際體育大賽」的千年棒球部，我能給予什麼幫助呢？"
2000005-13 = "結論是……"
2000005-14 = "幫助他們培養出，就算面對最強投手也能擊出安打的能力。"
2000005-15 = "於是我準備了這個東西。"
2000005-16 = "名字是「來自地獄的投球機」。"
2000005-17 = "為了測試，我必須在這裡檢測機器……"
2000005-18 = "老師。"
2000005-20 = "能請你站上打擊區嗎？"
2000005-21 = "[s3] 「怎麼感覺我會被抓交替下地獄？」\n[s4] 「期待我的全壘打吧。」"
2000005-22 = "別擔心。"
2000005-23 = "棒球的目的不是要殺死打者，這種事我是知道的。"
2000005-24 = "嘿，真有志氣！"
2000005-26 = "好，那我就開始了。"
2000005-27 = "滅殺模式……還沒有完成……"
2000005-28 = "重新再來一次。"
2000005-29 = "發射……不……"
2000005-30 = "投球開始。"
2000005-32 = "大聯盟球員的平均球速聽說是139km。"
2000005-33 = "如果是高中校際體育大賽優勝隊伍的投手，當然投得出那樣的球速。"
2000005-34 = "不過，速度是相對的……"
2000005-35 = "如果能讓眼睛習慣更快的球…… #n應該就能輕易擊中時速139km的球。"
2000005-36 = "那麼第1球……"
2000005-37 = "因為是第一次……就來個「2馬赫」吧。"
2000005-38 = "[s5] 「等等等等！不太對勁！」\n[s6] 「但是棒球可不光只有直球喔。」"
2000005-39 = "別擔心。"
2000005-40 = "那當然。"
2000005-41 = "這台投球機也能應對變化球訓練不足的煩惱。"
2000005-42 = "如果是個單純只會丟快速球的投手，不難攻克。"
2000005-43 = "指叉球、伸卡球、滑球……甚至蝴蝶球。"
2000005-44 = "它能投出各種軌跡無法預測的球種……"
2000005-45 = "雖然變化球比快速球慢，但有時反而更具威脅性。"
2000005-46 = "過……光是面對「平凡的變化球」或「平凡的直球」，"
2000005-47 = "也無法保證會打進高中校際體育大賽。"
2000005-48 = "所以在煩惱過後，我決定加入更特別的功能。"
2000005-49 = "……不要嚇到了。"
2000005-50 = "這台投球機，可以投出「魔球」！"
2000005-51 = "像是在發射的瞬間消失的魔球，"
2000005-52 = "或是在飛行途中被火焰纏繞著的球，"
2000005-53 = "或是分身成數十個，無法區分出何者為真的球，"
2000005-54 = "又或者是放出強烈的電磁場，使打者觸電的球。"
2000005-55 = "[s7]「太厲害了！那到底是怎麼辦到的！？」\n[s8]「最後那個顯然犯規了吧？」"
2000005-56 = "這些都不算什麼。"
2000005-57 = "這些都不算什麼。"
2000005-58 = "原理很簡單。消失魔球是套用了光學迷彩技術， #n火焰魔球是在發射前塗上引火劑再點火發射。"
2000005-59 = "而分身魔球則是老師也很清楚的設計。 #n就是在球的周圍投射出以相同速度飛行的數十個全像投影。"
2000005-60 = "至於強力電磁場則是使用……"
2000005-61 = "什麼？你說不是稱讚……是犯規？"
2000005-62 = "唔……運動果然不能用合理性來思考嗎。"
2000005-63 = "總之我明白了。變化球方面我會再做改善。"
2000005-64 = "果然只要和老師在一起就會得到很多參考資訊。"
2000005-65 = "最後一個功能，也是最讓我煩惱的功能……"
2000005-66 = "是這個，藍牙喇叭。"
2000005-67 = "經驗豐富的投手不但會往一壘丟牽制球，"
2000005-68 = "似乎在投球之前，也會透過話語來創造好球。"
2000005-69 = "於是我讓這台投球機也如法炮製，能夠挑釁打者。"
2000005-70 = "舉例來說……"
2000005-71 = "「嘿～膽小鬼～放馬過來呀～」"
2000005-72 = "「哇嗚～慢死！你還沒揮棒我就能把你三振掉了吧。」"
2000005-73 = "「回去重練吧你，小鬼！」"
2000005-74 = "怎麼樣，如果面對這種挑釁也能保持冷靜的話……"
2000005-75 = "不覺得將會誕生出很了不起的打者嗎？"
2000005-76 = "呵呵。"
2000005-77 = "不錯吧？嗯，很好。"
2000005-78 = "那真是太好了。其實我本來很擔心，現在多虧老師幫忙，感覺能做出很好的成品。"
2000005-79 = "等做完最終測試，就帶去給棒球部吧！"
2000005-81 = "（不久後，聽說千年棒球部成功打進高中校際體育大賽）"

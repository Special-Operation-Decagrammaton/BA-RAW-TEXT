[translation]
2000005-1 = "พุ่งเข้าไปในหัวใจของคุณ!"
2000005-2 = "สนามกีฬาเลขที่ 12 มิลเลเนียม"
2000005-3 = "เชิญเลยคุณครู"
2000005-4 = "ที่จริงนี่เป็นครั้งแรกเลยที่ทางชมรมกีฬาขอให้มาช่วยน่ะ"
2000005-5 = "ปัญหาก็คือฉันไม่ค่อยรู้เรื่องเกี่ยวกับเบสบอลเท่าไหร่เลย"
2000005-6 = "ฉันรู้แค่ว่าต้องใช้ไม้เบสบอลตีลูกบอลไปแล้วก็วิ่งให้เข้าโฮมรันเท่านั้นเอง"
2000005-7 = "[s1] \"ดูเหมือนจะเข้าใจอะไรผิดอยู่นิดนึงนะ?\"\n[s2] \"งั้น....เหรอ?\""
2000005-8 = "ใช่แล้วล่ะ แต่ว่ายังไง... ก็แค่ต้องตีลูกบอลที่พิชเชอร์ขว้างมาให้โดนเพื่อให้ได้คะแนน"
2000005-9 = "ใช่แล้วล่ะ แต่ว่ายังไง... ก็แค่ต้องตีลูกบอลที่พิชเชอร์ขว้างมาให้โดนเพื่อให้ได้คะแนน"
2000005-10 = "ถ้าอย่างนั้น... สิ่งที่สำคัญที่สุดสำหรับนักประดิษฐ์ก็คือ..."
2000005-11 = "เพื่อพิสูจน์ \"เป้าหมาย\" ของสิ่งประดิษฐ์ที่ทำขึ้น"
2000005-12 = "ถ้างั้น... ฉันจะช่วยให้ทีมเบสบอลของมิลเลเนียมได้ทำตามเป้าหมาย \"มุ่งสู่อินเตอร์ไฮ\" ได้ยังไงล่ะ? ฉันลองคิดดูแล้ว..."
2000005-13 = "ได้ผลสรุปว่า..."
2000005-14 = "พวกเขาจะต้องมีฝีมือระดับหนึ่งเพื่อที่จะตีลูกบอลจากพิชเชอร์ที่เก่งกาจได้"
2000005-15 = "เพราะงั้นฉันเลยเตรียมบางอย่างมาด้วย\n\n"
2000005-16 = "ชื่อของมันก็คือ \"เครื่องขว้างบอลนรก\" ยังไงล่ะ"
2000005-17 = "ขอฉันตรวจสอบอุปกรณ์ที่จะใช้สำหรับทดสอบก่อนนะ...."
2000005-18 = "คุณครู"
2000005-20 = "ช่วยไปยืนที่ตำแหน่งแบตเตอร์หน่อยได้มั้ย?"
2000005-21 = "[s3] \"เตรียมส่งครูไปลงนรกเลยอยู่เหรอ...?\"\n[s4] \"เดี๋ยวจะตีโฮมรันให้ดูเอง\""
2000005-22 = "ไม่ต้องห่วงหรอก"
2000005-23 = "ฉันรู้ดีว่าจุดประสงค์ของการเล่นเบสบอลไม่ใช่การฆ่าแบตเตอร์ของอีกฝ่าย"
2000005-24 = "ฮิฮิ เยี่ยมไปเลย"
2000005-26 = "เอาละ ถ้างั้นก็เริ่มเลยนะ"
2000005-27 = "โหมดทำลายล้าง... ยังไม่ได้ใส่มาแฮะ"
2000005-28 = "อ๊ะ เอาใหม่นะ"
2000005-29 = "ยิง... ไม่สิ...."
2000005-30 = "จะเริ่มขว้างบอลแล้วนะ"
2000005-32 = "ความเร็วในการขว้างลูกโดยเฉลี่ยของพิชเชอร์ในเมเจอร์ลีกคือ 139 กิโลเมตรต่อชั่วโมง"
2000005-33 = "ถ้าเป็นพิชเชอร์ที่เป็น MVP ของอินเตอร์ไฮคงจะขว้างลูกด้วยความเร็วระดับเดียวกัน"
2000005-34 = "แต่ว่าเรื่องความเร็วก็ต้องสัมพันธ์กันกับ...."
2000005-35 = "ถ้าปรับสายตาให้ชินกับลูกบอลที่พุ่งเข้ามาด้วยความเร็วที่มากกว่านั้นได้ละก็... การจะตีลูกบอลที่พุ่ง#nเข้ามาด้วยความเร็ว 139 กิโลเมตรต่อชั่วโมงก็คงไม่มีปัญหา"
2000005-36 = "ถ้างั้นลูกแรก..."
2000005-37 = "นี่เป็นครั้งแรก... ฉันจะขว้างลูกด้วยความเร็วประมาณมาร์ช 2 แล้วกัน"
2000005-38 = "[s5] \"เดี๋ยวก่อนๆ! เข้าใจผิดแล้วนะ\" \n[s6] \"เบสบอลไม่ได้ขึ้นอยู่กับแค่การขว้างลูกที่แรงและเร็วอย่างเดียวนะ\""
2000005-39 = "ไม่ต้องห่วง"
2000005-40 = "แน่นอนสิ"
2000005-41 = "ฉันออกแบบเครื่องขว้างบอลนี่ให้สามารถขว้างลูกเชนจ์อัปได้หลากหลายแบบด้วย"
2000005-42 = "ถ้าพิชเชอร์ขว้างลูกได้เร็วอย่างเดียวจะถูกจัดการได้ง่ายเกินไป"
2000005-43 = "แถมยังขว้างลูกฟอร์กบอล ลูกซิงเกอร์ ลูกสไลด์เดอร์หรือลูกนักเคิลได้ด้วยนะ"
2000005-44 = "แล้วก็การขว้างแบบที่คาดเดาวิถีบอลไม่ได้...."
2000005-45 = "ลูกเชนจ์อัปจะช้ากว่าลูกฟาสต์บอลก็จริง แต่บางครั้งก็อันตรายมากกว่า..."
2000005-46 = "แต่ว่าแค่การตี \"ลูกเชนจ์อัปธรรมดา\" หรือว่า \"ลูกฟาสต์บอลทั่วไป\" ได้แค่นี้..."
2000005-47 = "ก็ยังรับประกันไม่ได้ว่าพวกเขาจะเข้ารอบอินเตอร์ไฮได้"
2000005-48 = "ฉันคิดเรื่องนี้อย่างดีแล้วเลยเพิ่มฟังก์ชั่นพิเศษเข้าไปด้วย"
2000005-49 = "....อย่าเพิ่งทำท่าตกใจแบบนั้นสิ"
2000005-50 = "เครื่องขว้างบอลเครื่องนี้สามารถขว้าง \"ลูกบอลปีศาจ\" ได้ด้วย"
2000005-51 = "ลูกบอลจะหายไปทันทีที่ขว้างออกไป..."
2000005-52 = "หรือไม่ก็จะมีไฟติดขึ้นมาที่ลูกบอล..."
2000005-53 = "หรือบางทีมันก็อาจแยกเงาพันร่างออกมาเป็นบอลหลายสิบลูกจนตีไม่ถูกลูกจริงเลยล่ะ..."
2000005-54 = "หรือบางทีลูกบอลก็อาจจะปล่อยสนามแม่เหล็กไฟฟ้าออกมาและใช้กระแสไฟฟ้าช็อตแบตเตอร์..."
2000005-55 = "[s7] \"สุดยอด! แต่ว่ามันจะเป็นไปได้ยังไง?!\"\n[s8] \"ข้อสุดท้ายที่พูดมามันเหมือนการโกงเลยนะ?\""
2000005-56 = "ของแค่นี้กล้วยๆ"
2000005-57 = "ของแค่นี้กล้วยๆ"
2000005-58 = "หลักการง่ายๆ ลูกบอลปีศาจที่หายไปมีฟังก์ชั่นการอำพรางตัวด้วยแสงอยู่#nส่วนลูกบอลติดไฟก็เป็นเพราะเคลือบสารไวไฟเอาไว้ที่ทำให้เกิดประกายไฟตอนที่ยิงยังไงล่ะ"
2000005-59 = "ส่วนลูกบอลปีศาจแยกเงาพันร่างคุณครูน่าจะรู้จักนะ มันคือบอลโฮโลแกรมหลายๆ ลูกที่พุ่งออกไปด้วยความเร็วเท่ากันยังไงล่ะ..."
2000005-60 = "ส่วนลูกบอลที่ปล่อยสนามแม่เหล็กไฟฟ้า...."
2000005-61 = "เอ๋? ไม่ได้พูดชม... แต่จะบอกว่ามันผิดกฎงั้นเหรอ?"
2000005-62 = "อืม... ฉันไม่ค่อยเข้าใจเรื่องกีฬาเท่าไรเลย"
2000005-63 = "เอาเป็นว่าเข้าใจแล้วละ ฉันจะปรับปรุงลูกเชนจ์อัปแล้วกัน"
2000005-64 = "มีคุณครูอยู่ด้วยแบบนี้ช่วยได้เยอะเลยนะ"
2000005-65 = "อย่างสุดท้ายที่ต้องเพิ่มก็คือ..."
2000005-66 = "ลำโพงบลูทูธไงล่ะ"
2000005-67 = "พิชเชอร์ที่มีประสบการณ์สูงจะไม่ได้แค่ขว้างลูกพิคออฟในเบสแรกเท่านั้น..."
2000005-68 = "ได้ยินมาว่าเคล็ดลับในการสไตรค์คือการใช้คำพูดก่อนที่จะขว้างลูกออกไป"
2000005-69 = "เพราะงั้นฉันเลยออกแบบเครื่องขว้างบอลนี่ให้พูดยั่วยุแบตเตอร์ได้"
2000005-70 = "ยกตัวอย่างเช่น..."
2000005-71 = "\"โธ่เอ๊ย~ เร็วๆ เข้าสิพวกไก่อ่อนเอ๊ย~\""
2000005-72 = "\"ว้า~ ช้าจุงเบย! พนันได้เลยว่าพวกเราจะได้สามสไตรค์ก่อนที่พวกเธอจะตีลูกแรกอีก\""
2000005-73 = "\"กลับไปกินนมแม่ที่บ้านเถอะ ยัยหนูน้อย~!\""
2000005-74 = "เป็นยังไงบ้าง? ถ้าเจอคำพูดยั่วยุแบบนี้แล้วยังทนได้อีกละก็...."
2000005-75 = "คงเป็นแบตเตอร์ที่ยอดเยี่ยมแน่ๆ เลยว่ามั้ย?"
2000005-76 = "หึหึ"
2000005-77 = "โอเคเลยใช่มั้ย? เยี่ยมเลย"
2000005-78 = "โล่งอกไปที ที่จริงฉันก็กังวลอยู่เหมือนกัน แต่พอมีคุณครูช่วยแบบนี้ทุกอย่างเลยผ่านไปได้ด้วยดี"
2000005-79 = "ทดสอบขั้นสุดท้ายแล้วเอาไปให้ชมรมเบสบอลกันเถอะ!"
2000005-81 = "(หลังจากนั้นชมรมเบสบอลของมิลเลเนียมก็สามารถเข้ารอบการแข่งขันอินเตอร์ไฮได้สำเร็จ)"

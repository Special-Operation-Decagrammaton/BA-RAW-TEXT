[translation]
10002065-1 = "ตอนที่ 6;เรียนว่ายน้ำ 2"
10002065-3 = "อืม..."
10002065-4 = "สุดท้ายก็กลายเป็นแบบนี้ไปอีกแล้วสินะคะ ดูเหมือนพวกเธอจะไม่เข็ดกันเลย..."
10002065-5 = "ยังมีพวกที่หมดสติแล้วลอยอยู่ในน้ำด้วยนะคะ..."
10002065-6 = "อ่า... รู้สึกว่ามันแปลกๆ เข้าไปทุกที..."
10002065-7 = "อืม ชายหาดฤดูร้อนเป็นแบบนี้เองสินะ"
10002065-8 = "ไม่ใช่นะคะอาซึสะจัง ไม่ใช่แบบนี้เลยสักนิดเดียวนะคะ....."

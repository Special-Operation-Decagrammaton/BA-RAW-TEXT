[translation]
34145-4 = "[ns] \"ミカ……！？\""
34145-5 = "……まさか、ここまで追いかけてきたのか。"
34145-6 = "久しぶり……ってほどでもないか。また会えて嬉しいよ、サオリ。"
34145-7 = "先生が指揮するスクワッドに、どうやったら勝てるか考えてみたんだけどさ……あんまりいいアイデアが浮かばなくて。"
34145-8 = "とりあえず一回ぶつかってみようかな？って思って来てみたんだけど……。"
34145-9 = "……やっぱダメだったね。"
34145-11 = "相変わらず強いね、先生は。"
34145-13 = "次回;残されたもの"

[translation]
34145-4 = "[ns] \"มิกะ......!!\""
34145-5 = "มิกะ...! ตามมาถึงที่นี่เลยงั้นเหรอ?"
34145-6 = "ว่าไงๆ อื้ม ฉันเองก็ดีใจที่ได้เจอเธอนะ ซาโอริ"
34145-7 = "ฉันคิดอยู่ตั้งนานว่าจะเอาชนะสควอดที่คุณครูสั่งการได้ยังไง... อืม... แต่ก็คิดหาไอเดียดีๆ ไม่ได้เลย"
34145-8 = "ฉันมาที่นี่เพราะคิดแค่ว่า... ลองเผชิญหน้าดูก่อนก็แล้วกันน่ะ..."
34145-9 = "แต่เห็นทีจะไม่ใช่วิธีที่ดีเท่าไรเลยแฮะ..."
34145-11 = "ยังแข็งแกร่งอยู่เหมือนเดิมเลยนะ คุณครูน่ะ"
34145-13 = "ตอนต่อไป;สิ่งที่เหลืออยู่"

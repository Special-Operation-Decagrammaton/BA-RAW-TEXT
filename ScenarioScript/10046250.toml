[translation]
10046250-3 = "Ahem. Excuse me!"
10046250-4 = "Are you this beach's manager?"
10046250-5 = "\"Manager\"? ...I suppose so."
10046250-6 = "Is there a problem?"
10046250-7 = "So good to meet you! I'm Kawawa Shizuko, the mascot and owner of Momoyodou."
10046250-8 = "Oh, Momoyodou from Hyakkiyako... You run the Pop-up Beach Shack, right?"
10046250-9 = "Yes, and even more exciting...we're throwing a festival right here!"
10046250-10 = "...Huh?"
10046250-11 = "I'm sorry, but I've heard that the Festival Operations Department is running the only approved festival here."
10046250-12 = "Hem... Ahem! I'm also the head of the Festival Operations Department."
10046250-13 = "Ah, is that so?! My apologies."
10046250-14 = "That's amazing! You run a successful shop AND you manage the Hyakkiyako festivals..."
10046250-15 = "Heh..."
10046250-16 = "I-I mean, I can't take all the credit. I have an amazing team that does all the hard work, truly!"
10046250-17 = "Anyway, about the festival!"
10046250-25 = "...This was not at all what I expected."
10046250-26 = "I thought this was the grand opening of the Tea Party's beach!"
10046250-27 = "I imagined elegance, class...and people with spending money!"
10046250-31 = "But more important than the money is the safety...of my wealthy clientele."
10046250-32 = "If this calamity keeps up, I won't be able to sell anything I've brought."
10046250-33 = "Aha... Hahaha. Well..."
10046250-34 = "I'm sorry. I've been managing this beach all by myself. A few things have fallen to the wayside."
10046250-35 = "Hmm... As I suspected. Do you need additional support?"
10046250-36 = "Huh? Yes, I suppose I do."
10046250-37 = "...Very well."
10046250-38 = "Then how about this? I'll help you manage the beach."
10046250-39 = "Huh? No, that's not necessary..."
10046250-40 = "It is! It absolutely is!"
10046250-41 = "When you factor in the cost of ingredients, setting up shop, and the delivery fees it took to set up here..."
10046250-42 = "...I'm risking a massive loss! CATASTROPHIC! "
10046250-43 = "..."
10046250-44 = "...And, of course I also want everyone to have a fun time on vacation!"
10046250-50 = "..."
10046250-51 = "..."
10046250-52 = "So, are we doing this or not?"
10046250-53 = "Glad to have you on the team."

[translation]
10046250-3 = "抱歉打擾了～"
10046250-4 = "請問是這片海灘的管理員嗎？"
10046250-5 = "管理員……應該算是吧。"
10046250-6 = "請問有什麼問題嗎？"
10046250-7 = "啊，初次見面。#n我是百夜堂的看板娘兼店主河和靜子。"
10046250-8 = "啊啊，百夜堂就是百鬼夜行的那間名店……#n聽說這次要在海灘設攤營業對吧。"
10046250-9 = "是的，除此之外，我們還取得了在海灘舉辦祭典的許可。"
10046250-10 = "……嗯？"
10046250-11 = "不好意思，祭典的舉辦應該是由節慶營運管理部負責的才對。"
10046250-12 = "咳咳……呵呵呵！#n其實靜子我，同時也是節慶營運管理部的部長喔。"
10046250-13 = "啊，原來如此啊！？失敬失敬。"
10046250-14 = "不過還真是厲害呢。#n既是名店的店主，又負責百鬼夜行的祭典管理……"
10046250-15 = "哼哼……"
10046250-16 = "不，不對，這點小事不算什麼～#n都是多虧有大家的幫助啦～"
10046250-17 = "啊！話說回來，我是來討論有關祭典的事情的！"
10046250-25 = "……這裡根本不是能舉辦祭典的環境啊！"
10046250-26 = "不是說這是茶會的私人海灘首次開放嗎！"
10046250-27 = "應該要是更優雅、更高級、更有錢的客人聚集的地方才……！"
10046250-31 = "啊不是……我是指這裡的治安應該要很好才對～"
10046250-32 = "這樣下去的話，我帶來的商品根本賣不出去……"
10046250-33 = "啊，啊哈哈。這個嘛……"
10046250-34 = "真的很抱歉。#n因為只有我一人負責管理，許多地方都不夠完善……"
10046250-35 = "哼嗯～果然是人手不足嗎？"
10046250-36 = "咦？啊，算是吧。"
10046250-37 = "……好。"
10046250-38 = "那就這麼辦吧。我也來幫忙管理海灘。"
10046250-39 = "咦？這，這也太麻煩您了……"
10046250-40 = "不麻煩！一點也不麻煩！"
10046250-41 = "我帶來的食材、攤位設備，還有運費什麼的……！"
10046250-42 = "可說是完完全全的大赤字啊！大．赤．字！"
10046250-43 = "…………"
10046250-44 = "……啊，應該是說～#n我只是想幫忙，讓大家都能開心地享受海灘啦～"
10046250-50 = "…………"
10046250-51 = "…………"
10046250-52 = "就這麼說定了！"
10046250-53 = "啊，好的！"

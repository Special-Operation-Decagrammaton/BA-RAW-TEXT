10034060-36 = "3;아이리 밴드;02;그건……. 정말이신가요? 그냥 하시는 말씀은 아니신가요?"
10034060-37 = "3;아이리 밴드;13;솔직히 잘 모르겠어요. 여기까지 이렇게 오셨다는 건, 상황도 다 들으셨단 말일 테고……."
10034060-38 = "3;아이리 밴드;13;어떻게든 저에게 좋은 말을 해 주시고, 이대로 다시 동아리로 데려가려 하신다고밖에 생각되지가 않아요."
10034060-39 = "3;아이리 밴드;99;하지만…….\n#3;em;…"
10034060-40 = "3;아이리 밴드;05;하지만 그래서는 문제가 해결되지 않아요, 선생님. 이건 다른 아이들의 문제가 아니에요."
10034060-41 = "3;아이리 밴드;11;네. 다들 착하고 좋은 친구들이니까요. 그 이상으로 좋을 수 없는……. 최고의 친구들이죠."
10034060-42 = "3;아이리 밴드;08;……그러니까 이건 어디까지나 제 문제."
10034060-43 = "3;아이리 밴드;12;그런 친구들에게……. 폐가 되면 안 되니까요. 저로서는 기한 내에, 테스트를 통과할 실력이 못 되니까요.\n#3;jump"
10034060-44 = "3;아이리 밴드;03;그러니 지금이라도 츠무기 씨를……. 츠무기 씨라면, 그 정도는 쉽게 치실 테니까…….\n#3;m2"

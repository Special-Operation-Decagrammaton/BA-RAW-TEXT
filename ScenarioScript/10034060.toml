10034060-77 = "3;아이리 밴드;13;말씀대로 그건 그럴 수 있어요. 저도 그것까지는 참을 수 있었어요. 하지만……."
10034060-78 = "3;아이리 밴드;08;하지만……. 그래서 제가 잘 못 하고 있으니, 다들 저에게 이런저런 말들을 해주더라고요."

10034060-28 = "3;아이리 밴드;99;……그렇군요. 그렇게 된 거였군요. 역시 그렇게 된 거겠지요."
10034060-29 = "3;아이리 밴드;08;선생님……. 역시 저를 설득하러 오신 거군요. 다시 동아리로 데리고 가려고……."
10034060-30 = "3;아이리 밴드;08;다른 아이들이 부탁한 거죠? 아니면 선생님께서 그렇게 해주겠다고 약속하신 거죠?\n#3;em;[?]"
10034060-31 = "3;아이리 밴드;99;그러니까 따로 연락도 없이 이렇게 직접 찾아오시고……. 그렇겠네요."
10034060-32 = "3;아이리 밴드;00;선생님은 제가 여기서 츠무기 씨를 찾고 있을 거라는 걸 알고 계시니까요."
10034060-33 = "[s5] \"그렇긴 하지만, 지금은 아니야.\"\n[s6] \"걱정 마. 억지로 데리고 가려는 건 아니니까.\""

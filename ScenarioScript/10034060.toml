[translation]
10034060-1 = "Episode 6;One Befitting the Position"
10034060-3 = "Late at night..."
10034060-10 = "[ns1] \"...I thought you might be here.\"\n[ns2] \"Airi, I was looking for you.\""
10034060-13 = "...? O-Oh...Sensei...?"
10034060-14 = "W-What are you doing here this late?"
10034060-15 = "...Huh? You've been looking for me?...All this time? F-For how long?"
10034060-16 = "Why would you... Is something wrong?"
10034060-17 = "You could have called me, or used MomoTalk..."
10034060-18 = "Wh-What do you mean, \"That doesn't matter right now\"?"
10034060-19 = "...Huh?"
10034060-20 = "...Me...?"
10034060-21 = "[s3] \"You're looking for Tsumugi, aren't you?\"\n[s4] \"This is part of my duty as a teacher.\""
10034060-24 = "Um..."
10034060-28 = "...I see. That's what happened. Of course that's what happened."
10034060-29 = "So you've come to talk me into going back."
10034060-30 = "Did the others ask you to do this? Or did you promise you would do it for them?"
10034060-31 = "That's why you showed up without calling. I see."
10034060-32 = "Because you know I'm looking for Tsumugi here."
10034060-33 = "[s5] \"Yes, but you don't have to come back yet.\"\n[s6] \"Don't worry. I'm not here to drag you away.\""
10034060-36 = "Is that...true? You're not just saying that?"
10034060-37 = "I don't know. If you've come all the way here, you must know the whole story..."
10034060-38 = "I can't help but think you're here to say nice things and then take me back to the club."
10034060-39 = "But..."
10034060-40 = "That won't solve anything. Sensei, my problem isn't with them."
10034060-41 = "Seriously, they're all super nice. They're great friends. I couldn't ask for anyone better."
10034060-42 = "...The problem is me."
10034060-43 = "I can't be a burden to friends like that. I won't ever be good enough to pass the audition in time."
10034060-44 = "So at the very least, if I can find Tsumugi now... Since Tsumugi won't have any trouble with the performance..."
10034060-49 = "...I mean..."
10034060-50 = "I'm sorry, Sensei...I know you didn't come here to talk about that..."
10034060-51 = "But... But still..."
10034060-52 = "Any longer..."
10034060-53 = "Any longer, and it..."
10034060-54 = "It's all too much...for me to handle..."
10034060-55 = "I can't do this anymore. I'm sorry, Sensei."
10034060-59 = "[ns7] \"Say whatever you need to say, Airi.\"\n[ns8] \"You're safe here. You can tell me anything.\""
10034060-62 = "..."
10034060-63 = "...Two sheets..."
10034060-64 = "I'm behind by two sheets. Progress-wise...everyone else is way ahead of me..."
10034060-65 = "It's just me who's barely... I can't even keep in time with them..."
10034060-66 = "Even though...I'm the one who's practicing the most..."
10034060-67 = "I was taking it the most seriously...I was the only one practicing until late at night...I was the only one who really studied the theory..."
10034060-71 = "I..."
10034060-72 = "I was the one who asked everyone to join in the first place..."
10034060-73 = "[s9] \"...Sometimes, that's how it turns out.\"\n[s10] \"That's got to be rough.\""
10034060-76 = "...Yeah. I mean, sure, sometimes things just don't go the way you want..."
10034060-77 = "I know that's how it is. I can stand that much. But..."
10034060-78 = "But...when I was struggling, everyone would tell me..."
10034060-80 = "\"It's fine. Everything will work out.\""
10034060-81 = "\"We just need to be good enough to eat semla. It's fine to be 'just okay.'\""
10034060-82 = "\"Take it easy.\" \"We're doing this together.\" \"We'll cover each other...\""
10034060-84 = "They were saying all that for me. To make me feel better. I get that."
10034060-85 = "I mean, in my head, I get that. But..."
10034060-86 = "To me, the me inside, everything they said hit completely differently."
10034060-88 = "Like, \"You're the weak link. You're the worst one.\""
10034060-89 = "\"You...\" \"You can't even be 'just okay.' You're not even 'good enough.'\""
10034060-90 = "\"We'll haul you along, but we're going to have to cover your mistakes.\""
10034060-92 = "It kept on running around in circles inside me...and it came to a point..."
10034060-96 = "It came to a point...where I didn't want to listen to them at all."
10034060-98 = "\"How can they not understand how I feel?\""
10034060-99 = "\"They're all so carefree about this. Don't any of them get what I'm going through?\""
10034060-103 = "\"Or maybe...\""
10034060-104 = "\"Maybe they do know...and they're just waiting to see what I do about it?\""
10034060-106 = "That's when I snapped out of it. I had a new thought:"
10034060-110 = "\"Enough.\""
10034060-111 = "\"That can't be it. You know it's not true.\" "
10034060-112 = "\"Stop thinking bad about your friends, Airi. You know them better than that.\""
10034060-113 = "\"It's not their fault you suck. You really going to blame them, Airi?\""
10034060-115 = "Sounds kind of ridiculous, now that I say it out loud. Who cares about those things among friends, right?"
10034060-116 = "Friends don't do that. I know. I know that..."
10034060-117 = "But I can't help thinking about it. And I...I hate myself for it..."
10034060-118 = "Even when I'm trying NOT to think about it...I can't help it when my mind strays that way."
10034060-119 = "It's my nature... I can't change it. I'm always going to think it's all about me."
10034060-120 = "And someday...something I do is going to end up hurting them. It's inevitable."
10034060-121 = "So the best thing I could do was leave before that happened."
10034060-125 = "...Why am I like this?"
10034060-126 = "Kazusa is so cool. Yoshimi's cute, and I love the way she takes charge."
10034060-127 = "Natsu is thoughtful and special. But I..."
10034060-128 = "I don't have anything like that. And there's so much I wish for."
10034060-129 = "Why am I so selfish? Why am I so terrible?"
10034060-130 = "And... why am I the only one who doesn't have anything special? Why am I like this?"
10034060-131 = "Why am I..."
10034060-132 = "...so lacking?"
10034060-136 = "[ns11] \"...\"\n[ns12] \"...Airi.\""
10034060-139 = "[ns13] \"...It's time to say this.\"\n[ns14] \"...You're overlooking something.\""
10034060-142 = "...Huh? What do you...?"
10034060-146 = "...Oh? A phone call..."
10034060-147 = "...Ah, it's not mine. It's Sensei's."
10034060-151 = "[ns15] \"...This number...\"\n[ns16] \"...The Carnival Committee...?\""
10034060-155 = "...Ah, apologies for the late call. Are you Schale's Sensei?"
10034060-156 = "No need to be alarmed, but we..."
10034060-158 = "We have three of your students in custody."

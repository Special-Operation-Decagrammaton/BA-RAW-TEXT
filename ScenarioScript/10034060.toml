[translation]
10034060-1 = "ตอนที่ 6;คนที่มีคุณสมบัติ"
10034060-3 = "(กลางดึก)"
10034060-10 = "[ns1] \"มาอยู่ตรงนี้นี่เอง...\"\n[ns2] \"ครูตามหาอยู่เลย ไอริ\""
10034060-13 = "เอ๊ะ... เอ๋...? คุณครู...?"
10034060-14 = "ทะ... ทำไมถึงมาอยู่ที่นี่ ในเวลาแบบนี้ล่ะคะ...?"
10034060-15 = "คะ...? ตามหาฉันอยู่เหรอคะ? ตะ... ตั้งแต่เมื่อไรกัน..."
10034060-16 = "แล้วทำไมถึง... หรือว่าเกิดเรื่องอะไรกับคุณครูเหรอคะ?"
10034060-17 = "ถ้ามีเรื่องอะไร คุณครูแค่ส่ง MOMOTALK หรือโทรมาหาฉันก็ได้นี่..."
10034060-18 = "ไม่ได้มีเรื่องอะไรงั้นเหรอคะ? มะ... หมายความว่ายังไง..."
10034060-19 = "คะ...?"
10034060-20 = "ฉันเหรอคะ?"
10034060-21 = "[s3] \"กำลังหาสึมุกิอยู่ใช่มั้ย?\"\n[s4] \"คราวนี้มันเป็นหน้าที่ของครูนะ\""
10034060-24 = "อ่า..."
10034060-28 = "นั่นสินะ... เป็นอย่างนี้เองสินะคะ"
10034060-29 = "คุณครู... มาเกลี้ยกล่อมให้ฉันกลับไปที่ชมรมใช่มั้ยคะ?"
10034060-30 = "คนอื่นไปขอร้องให้คุณครูช่วยใช่มั้ยคะ? หรือว่าคุณครูสัญญาไว้ว่าจะมาให้เอง?"
10034060-31 = "ก็เลยไม่ติดต่อฉันมาก่อนและออกมาตามหาเองแบบนี้... คงเป็นอย่างนั้นสินะคะ"
10034060-32 = "คุณครูรู้สินะคะว่าฉันออกมาตามหาคุณสึมุกิอยู่ที่นี่"
10034060-33 = "[s5] \"มันก็จริงอยู่ แต่ครูไม่ได้จะพากลับไปตอนนี้หรอก\"\n[s6] \"ไม่ต้องห่วงนะ ครูไม่ได้จะบังคับให้กลับไปหรอก\""
10034060-36 = "คุณครู... พูดจริงเหรอคะ? หรือว่าแค่พูดไปงั้นๆ คะ?"
10034060-37 = "ฉันไม่ค่อยแน่ใจเลยค่ะ ถ้าคุณครูมาถึงที่นี่แล้ว ก็น่าจะรู้สถานการณ์ทั้งหมดแล้วด้วย..."
10034060-38 = "คุณครูคงมาเพื่อพูดเรื่องดีๆ กับฉัน แล้วก็จะบอกว่าจะพาฉันกลับไปที่ชมรมอีกครั้ง"
10034060-39 = "แต่ว่า..."
10034060-40 = "ถึงจะทำแบบนั้นไป แต่ว่าปัญหาก็ไม่ได้ถูกแก้ไขหรอกค่ะคุณครู นี่ไม่ใช่ปัญหาของเพื่อนๆ คนอื่นใน#nชมรมหรอกค่ะ"
10034060-41 = "ใช่ค่ะ เพราะทุกคนเป็นคนดีและเป็นเพื่อนที่ดี พวกเธอเป็นเพื่อนที่ดีที่สุด... ที่คงหาอีกไม่ได้แล้ว"
10034060-42 = "นี่เป็นปัญหาที่ตัวฉันเองค่ะ..."
10034060-43 = "ฉันไม่ควรเป็นภาระกับทุกคน และฉันก็ไม่น่าจะพัฒนาความสามารถให้ผ่านการคัดเลือกได้ในเวลาที่#nกำหนดหรอกค่ะ"
10034060-44 = "เพราะแบบนั้น อย่างน้อยๆ ตอนนี้ฉันก็ควรตามหาคุณสึมุกิ... เพราะถ้าเป็นคุณสึมุกิ... ก็คงเล่นคีย์บอร์ดได้สบายๆ..."
10034060-49 = "ขอโทษ..."
10034060-50 = "ขอโทษนะคะคุณครู... ทั้งๆ ที่รู้ว่าคุณครูไม่ได้มาเพื่อจะพูดแบบนั้น..."
10034060-51 = "ตะ... แต่ว่า..."
10034060-52 = "ฉัน..."
10034060-53 = "คงจะเป็น..."
10034060-54 = "คนที่เก่งกว่านี้ไม่ได้แล้วละค่ะ..."
10034060-55 = "ฉันทำต่อไม่ได้แล้วค่ะ ขอโทษนะคะคุณครู..."
10034060-59 = "[ns7] \"บอกครูตามสบายเถอะนะไอริ\"\n[ns8] \"ที่นี่ไอริบอกครูได้ทุกอย่างเลยนะ\""
10034060-62 = "......"
10034060-63 = "2 หน้าค่ะ..."
10034060-64 = "ฉันยังตามไม่ทันอยู่ 2 หน้า... คนอื่นเล่นนำฉันไปกันหมดแล้ว..."
10034060-65 = "แต่ฉันยังไปไม่ถึงไหน... เราก็เลยยังซ้อมร่วมกันไม่ค่อยได้ค่ะ..."
10034060-66 = "ส่วนเรื่องฝึกซ้อม... ฉันทั้งซ้อมมากกว่าคนอื่น..."
10034060-67 = "ฉันเล่นอย่างจริงจังมากกว่าคนอื่น เป็นคนเดียวที่อยู่ซ้อมจนดึกดื่น แถมยังเรียนทฤษฎีเพิ่มด้วย..."
10034060-71 = "ฉัน..."
10034060-72 = "ทำแบบนั้นเพราะเป็นคนที่ชวนทำวงตั้งแต่แรกแท้ๆ..."
10034060-73 = "[s9] \"อืม... คนเราก็ต้องมีเรื่องแบบนี้บ้างละ\"\n[s10] \"คงจะลำบากใจมากเลยสินะ\""
10034060-76 = "ค่ะ... คนเราก็คงมีเรื่องแบบนี้กันบ้าง"
10034060-77 = "คงเป็นอย่างที่คุณครูพูดนั่นละค่ะ ถ้าเรื่องแค่นั้นฉันก็คงทนได้ แต่ว่า..."
10034060-78 = "แต่ว่า... ฉันยังทำออกมาได้ไม่ดีพอ ทุกคนก็เลยมาช่วยพูดให้กำลังใจกันยกใหญ่เลยค่ะ"
10034060-80 = "ไม่เป็นไรนะ ทุกอย่างจะดีเอง..."
10034060-81 = "เอาแค่ผ่านการคัดเลือก ให้ได้กินขนมเซมล่าก็พอ ไม่ต้องเป็นที่ 1 หรอก..."
10034060-82 = "เล่นแบบสนุกๆ เถอะ ยังไงเราก็เล่นเป็นวงอยู่แล้ว เราก็ช่วยๆ กันได้นี่นา..."
10034060-84 = "ทุกคนช่วยพูดแบบนั้นเพื่อให้ฉันสบายใจน่ะค่ะ ฉันรู้ดีค่ะว่าทุกคนทำเพื่อฉัน"
10034060-85 = "ถึงจะรู้ดีอยู่แล้วก็เถอะ... แต่คุณครูรู้อะไรไหมคะ?"
10034060-86 = "คำพูดพวกนั้น หูของฉันตีความตรงกันข้ามอย่างสิ้นเชิงเลยค่ะ และฉันอีกคนที่อยู่ในใจฉัน... ก็พูดคำที่ตรงกันข้ามด้วยค่ะ"
10034060-88 = "ปัญหามันอยู่ที่ตัวฉันยังทำไม่ได้ต่างหาก..."
10034060-89 = "ฉันน่ะ... แค่ระดับ 'พอใช้' ยังทำไม่ได้... "
10034060-90 = "ถึงฉันจะพยายามมากขนาดนี้ แต่สุดท้ายก็ต้องให้เพื่อนๆ มาช่วย..."
10034060-92 = "พอฉันเริ่มคิดแบบนี้หนักเข้าๆ... ฉันก็เลย..."
10034060-96 = "คิดว่าไม่อยากจะฟังอะไรอีกแล้วค่ะ..."
10034060-98 = "ทุกคนไม่เข้าใจความรู้สึกของฉันจริงๆ เหรอ...?"
10034060-99 = "ทำไมถึงพูดกันอย่างสบายใจแบบนั้นทั้งๆ ที่ไม่รู้จิตใจของฉัน...?"
10034060-103 = "ที่จริง..."
10034060-104 = "ที่จริงทุกคนรู้ดีอยู่แล้ว... แต่ก็พูดเพื่อลองหยั่งเชิงรึเปล่า?"
10034060-106 = "จนมาเมื่อวานซืนฉันถึงมาคิดได้ค่ะ ฉันมาตระหนักได้ในตอนสุดท้ายค่ะว่า"
10034060-110 = "พอเถอะ..."
10034060-111 = "มันไม่มีทางเป็นอย่างนั้นหรอก เธอเองก็รู้ความจริงดีทุกอย่างนี่ "
10034060-112 = "ทำไมถึงคิดอย่างนั้นได้? เลิกใส่ร้ายเพื่อนเสียทีเถอะ ไอริ"
10034060-113 = "การที่เธอไม่เก่ง มันไม่ใช่ความผิดของเพื่อนๆ สักหน่อย เธอจะไม่ได้เรื่องไปถึงไหนกัน ไอริ...?"
10034060-115 = "นี่มัน... เรื่องตลกตั้งแต่แรกแล้วไม่ใช่เหรอคะ? จะมีใครกันคะที่คิดกับเพื่อนๆ แบบนั้น?"
10034060-116 = "เพื่อนกันไม่ทำอย่างนี้ไม่ใช่เหรอคะ? ฉันเองก็รู้ดีค่ะ ฉันรู้อยู่แก่ใจแท้ๆ..."
10034060-117 = "แต่ก็ห้ามไม่ให้คิดไม่ได้เลยค่ะ ฉัน... ไม่ชอบ... ที่ตัวเองเป็นแบบนั้นน่ะค่ะ..."
10034060-118 = "ถึงจะพยายามไม่คิดแบบนั้น แต่ก็ช่วยไม่ได้ที่ฉันเอาแต่คิดแบบนั้นโดยไม่รู้ตัวค่ะ"
10034060-119 = "นี่คือนิสัยโดยกำเนิดของฉัน... คงเป็นเรื่องที่แก้ไขไม่ได้น่ะค่ะ ฉันเป็นเด็กที่เห็นแก่ตัวจริงๆ ค่ะ"
10034060-120 = "ขืนยังเป็นแบบนี้อยู่... ฉันคงทำให้เพื่อนๆ เสียใจเข้าสักวัน ค่ะ วันนั้นต้องมาถึงอย่างแน่นอนค่ะ"
10034060-121 = "และที่ฉันทำอยู่ก็คือ... การออกมาก่อนที่วันนั้นจะมาถึงค่ะ ฉันทำได้ดีที่สุดเท่านี้ค่ะคุณครู"
10034060-125 = "ทำไมถึงเป็นอย่างนี้กันนะคะ...?"
10034060-126 = "คาซึสะจังก็ออกจะเท่ โยชิมิจังก็น่ารักและกระตือรือร้น"
10034060-127 = "ส่วนนัตสึจังก็ทั้งพิเศษและมีความคิดลึกซึ้ง แต่ว่าฉัน..."
10034060-128 = "ทำไมถึง 'มีแต่ฉัน' ...ที่มีความปรารถนามากมาย ทั้งๆ ที่ตัวเองไม่มีดีอะไรสักอย่างเลย?"
10034060-129 = "ทำไมฉันถึงใจร้ายและเห็นแก่ตัวแบบนี้ล่ะคะ?"
10034060-130 = "ทำไม... ฉันถึงเป็นคนที่ไม่มีอะไรดีเลย? ทำไมฉันถึงกลายเป็นแบบนี้?"
10034060-131 = "ทำไมฉันถึง..."
10034060-132 = "ไม่ดีพอขนาดนี้เลยล่ะคะ...?"
10034060-136 = "[ns11] \"......\"\n[ns12] \"ไอริ...\""
10034060-139 = "[ns13] \"ถึงเวลาที่ครูต้องพูดแล้วสินะ\"\n[ns14] \"มีบางอย่างที่ไอริมองข้ามไปนะ\""
10034060-142 = "คะ...? หมายความว่ายังไง..."
10034060-146 = "หืม...? มีโทรศัพท์เข้า..."
10034060-147 = "อ่า... ไม่ใช่ของฉัน แต่เป็นของคุณครูนี่เองค่ะ"
10034060-151 = "[ns15] \"เบอร์นี้มัน...\"\n[ns16] \"<คณะกรรมการบริหารงานคาร์นิวัล>...?\""
10034060-155 = "ขอโทษที่ติดต่อเข้ามากลางดึกนะคะ นี่เบอร์ของคุณครูชาเล่ต์ใช่มั้ยคะ?"
10034060-156 = "ที่ฉันติดต่อมาก็เพราะตอนนี้..."
10034060-158 = "พวกฉันกำลังคุมตัวนักเรียน 3 คนไว้ที่ห้องคุมขังค่ะ..."

10034060-110 = "3;아이리 밴드 속마음;09\n#na;아이리 밴드;……그만해.\n#3;closeup"
10034060-111 = "3;아이리 밴드 속마음;09\n#na;아이리 밴드;그럴 리가 없잖아. 너도 사실 다 알고 있잖아. \n#3;closeup"
10034060-112 = "3;아이리 밴드 속마음;09\n#na;아이리 밴드;더 이상 그 아이들을 험담하지 마, 아이리. 그런 생각을 한다니. 어떻게 그럴 수 있어?\n#3;closeup"
10034060-113 = "3;아이리 밴드 속마음;09\n#na;아이리 밴드;네가 모자란 게 그 아이들 탓은 아니잖아. 대체 어디까지 못 난 거니? 아이리……?\n#3;closeup"
10034060-114 = "3;아이리 밴드;08\n#3;a"
10034060-115 = "3;아이리 밴드;08;애초에……. 정말로 우스운 이야기지 않나요? 애초에 친구들끼리 그런 걸 신경 쓰는 게 어딨어요?"
10034060-116 = "3;아이리 밴드;08;친구끼리는 그러는 게 아니잖아요? 저도 아는데, 머리로는 그걸 모르는 것도 아닌데……."
10034060-117 = "3;아이리 밴드;06;그런데도 계속 신경 쓰여요. 그런……. 제가……. 제가 너무 싫어서……."
10034060-118 = "3;아이리 밴드;06;그렇게 안 하려 해도……. 안 하려고 해도 자기도 모르게 그런 생각을 하는 걸 어떻게 할 수가 없어요."
10034060-119 = "3;아이리 밴드;06;이게 제 천성……. 어쩔 수 없는 부분인 거예요. 저는 역시 이기적인 아이인 거예요."
10034060-120 = "3;아이리 밴드;13;이러다가는 언젠가……. 그 아이들을 상처 주고 말 거예요. 네. 반드시 그날이 와요."
10034060-121 = "3;아이리 밴드;08;그렇게 되기 전에……. 제가 먼저 나온 거예요. 이게 최선이에요, 선생님."

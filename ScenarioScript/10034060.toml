[translation]
10034060-1 = "第6話;合適的人選"
10034060-3 = "（……深夜）"
10034060-10 = "[ns1]「……果然在這裡。」\n[ns2]「我到處在找你呢，愛莉。」"
10034060-13 = "……咦？老師……？"
10034060-14 = "怎，怎麼這個時候出現在這裡……？"
10034060-15 = "……嗯？一直在找我？#n是，是從什麼時候……"
10034060-16 = "有什麼事嗎……？"
10034060-17 = "如果有事的話，其實可以用MomoTalk或電話聯絡……"
10034060-18 = "你說那種事現在不重要？#n為，為什麼呢……"
10034060-19 = "……咦？"
10034060-20 = "我……？"
10034060-21 = "[s3]「你在找紬對吧？」\n[s4]「這也算是老師的工作之一吧。」"
10034060-24 = "啊……"
10034060-28 = "……原來如此。#n嗯，會變成這樣也是理所當然的。"
10034060-29 = "老師……是來說服我的對吧。#n想帶我回到社團……"
10034060-30 = "是其他人拜託你的嗎？還是老師答應大家會這麼做的呢？"
10034060-31 = "所以才沒有事先聯絡，而是直接跑來找我……"
10034060-32 = "因為老師知道我會在這裡找紬同學。"
10034060-33 = "[s5]「是這樣沒錯，但現在還不是時候。」\n[s6]「別擔心，我不會強迫你和我回去的。」"
10034060-36 = "那個……是真的嗎？不會只是隨口說說而已吧？"
10034060-37 = "老實說我不太明白。#n既然能找到這裡，代表老師已經知道所有情況了才對……"
10034060-38 = "我以為你一定會想辦法說些好話哄我，然後帶我回去……"
10034060-39 = "但是……"
10034060-40 = "但是那樣解決不了問題，老師。#n這不是其他人的問題。"
10034060-41 = "沒錯……因為他們都很善良。#n是我無可取代的……最好的朋友。"
10034060-42 = "……問題出在我自己身上。"
10034060-43 = "我不希望……自己成為好友們的累贅。#n以我的實力……沒有辦法在期限內通過試鏡。"
10034060-44 = "所以現在，只要能找到紬同學……#n如果是紬同學的話，肯定能輕鬆應付……"
10034060-49 = "對不起……"
10034060-50 = "對不起，老師……#n我知道你不是為了聽這種話而來的……"
10034060-51 = "可是……可是我……"
10034060-52 = "已經……"
10034060-53 = "真的已經……"
10034060-54 = "撐不下去了……我辦不到……"
10034060-55 = "我真的辦不到。#n對不起，老師……"
10034060-59 = "[ns7]「想說什麼儘管說吧，愛莉。」\n[ns8]「現在不必擔心，全都告訴我吧。」"
10034060-62 = "…………"
10034060-63 = "……兩章。"
10034060-64 = "我的進度落後了整整兩章……#n明明其他人都學得很順利……"
10034060-65 = "我卻只能勉強跟上……就連合奏都配合不好……"
10034060-66 = "明明花了最多時間練習……"
10034060-67 = "明明練習得比大家都拚命……#n只有我一個人留下來練到晚上……還自學了樂理……"
10034060-71 = "明明……"
10034060-72 = "明明是我提議要做的事……"
10034060-73 = "[s9]「……嗯，難免會有這種時候。」\n[s10]「你一定很不好受吧。」"
10034060-76 = "難免會有這種時候……嗯，或許是吧。"
10034060-77 = "就像老師說的一樣，其實這種事沒什麼大不了的。#n我本來也盡量不放在心上，但是……"
10034060-78 = "但是……因為我總是一直失誤，所以大家也對我說了很多鼓勵的話。"
10034060-80 = "「沒關係。之後會越來越順利的……」"
10034060-81 = "「只要有能吃到女王泡芙的程度就行了。馬馬虎虎也沒關係……」"
10034060-82 = "「放輕鬆，反正是團體合奏，只要互相掩護失誤就行了……」"
10034060-84 = "其實我也知道……大家是為了讓我心裡好過一點才這麼說。"
10034060-85 = "雖然知道……#n老師能明白這種感覺嗎？"
10034060-86 = "那些話傳到我耳裡之後完全變了調……#n我心裡的另一個我……一直在曲解那些話。"
10034060-88 = "「……連這種事都做不好，怎麼會沒關係？」"
10034060-89 = "「我……連『馬馬虎虎』的程度都沒有……」"
10034060-90 = "「做到那種程度又怎樣，反正終究還是個需要被掩護的人……」"
10034060-92 = "我越是這麼想，情況就變得越糟糕……到後來……"
10034060-96 = "到後來……甚至出現了再也不想聽他們說話的想法……"
10034060-98 = "「大家真的不懂我的感受嗎……？」"
10034060-99 = "「既然什麼都不懂，憑什麼說得那麼輕鬆……？」"
10034060-103 = "「還是說……」"
10034060-104 = "「大家心裡其實很清楚……只是在暗中觀察我的反應？」"
10034060-106 = "直到這時我才猛然意識到……自己已經陷得太深了。"
10034060-110 = "「……別再胡思亂想了。」"
10034060-111 = "「你其實也很清楚。事情並不是你想的那樣。」"
10034060-112 = "「別再揣測其他人的想法了，愛莉。你怎麼會產生這種念頭呢？」"
10034060-113 = "「你不夠好不是他們的錯。愛莉你到底要沒出息到什麼程度……？」"
10034060-115 = "打從一開始……就很荒謬對吧？朋友之間怎麼會計較這種事呢？"
10034060-116 = "我心裡明明也理解……朋友之間的關係並不是那樣的。"
10034060-117 = "但我卻還是無法擺脫那些想法。#n我……非常討厭……那樣的自己……"
10034060-118 = "即使不是出於本意……也無法停止那些想法在我心裡萌芽。"
10034060-119 = "因為這就是我……無法改變的天性。#n因為我是個自私的人。"
10034060-120 = "再這樣下去……我遲早會傷害到大家。#n沒錯，只是早晚的問題而已。"
10034060-121 = "所以在事情演變成那樣之前……我必須主動離開。#n這才是最好的選擇，老師。"
10034060-125 = "……問題到底出在哪裡呢？"
10034060-126 = "千紗醬那麼帥氣，喜美醬既可愛又有行動力。"
10034060-127 = "夏醬的想法總是很特別又有深度，而我卻……"
10034060-128 = "不，為什麼「只有我」……明明一無是處，又什麼都想擁有呢？"
10034060-129 = "為什麼我這麼自私又壞心呢？"
10034060-130 = "說到底……為什麼我什麼都做不好？為什麼我會是這副德性？"
10034060-131 = "我究竟……"
10034060-132 = "……缺少了什麼呢？"
10034060-136 = "[ns11]「…………」\n[ns12]「……愛莉。」"
10034060-139 = "[ns13]「……是時候該告訴你了。」\n[ns14]「……有件愛莉沒有注意到的事。」"
10034060-142 = "……咦？#n怎麼說呢……"
10034060-146 = "……嗯？有電話……"
10034060-147 = "……啊，不是我的。好像是老師的電話。"
10034060-151 = "[ns15]「這個號碼是……」\n[ns16]「『狂歡節營運委員會』……？」"
10034060-155 = "……啊，不好意思這麼晚打擾您。#n請問是夏萊的老師沒錯吧？"
10034060-156 = "其實呢，我們現在……"
10034060-158 = "拘留了三名學生……"

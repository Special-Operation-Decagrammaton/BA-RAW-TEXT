[translation]
1012902-1 = "三一的魔法自衛隊"
1012902-2 = "（在加班的過程中，決定起身做個伸展並巡視一下夏萊）"
1012902-13 = "（雖然已經很晚了，更衣室的燈卻依舊亮著）"
1012902-14 = "[ns1]（有人忘記關燈了嗎？）\n[ns2]（還有人在裡面嗎？以防萬一……）"
1012902-19 = "[ns3]（好像沒有人在）\n[ns4] 緩緩將門打開"
1012902-27 = "― [log=스즈미 매지컬]老，老師！？[/log][wa:700] "
1012902-30 = "― [log=스즈미 매지컬]有，有什麼事嗎！？[/log][wa:990] "
1012902-32 = "― [log=스즈미 매지컬]話說，您是什麼時候來的！？[/log][wa:1020] "
1012902-35 = "[ns5]「抱歉，鈴美！！我本來以為這裡沒有人在！！」\n[ns6]「因為有點擔心就在敲門之後進來了，抱歉！」"
1012902-36 = "― [log=스즈미 매지컬]因為專注在音樂上，[/log][wa:850] "
1012902-37 = "― [log=스즈미 매지컬]因為專注在音樂上，[/log][wa:850] "
1012902-39 = "― [log=스즈미 매지컬]我完全沒注意到……[/log]"
1012902-42 = "― [log=스즈미 매지컬]不過，對方是老師真是太好了。[/log][wa:1200] "
1012902-45 = "― [log=스즈미 매지컬]啊，這，這套衣服是，那個……！[/log][wa:4440] "
1012902-47 = "― [log=스즈미 매지컬]是為了自衛隊的潛入搜查……[/log][wa:2360] "
1012902-50 = "― [log=스즈미 매지컬]並，不是我的興趣……！ [/log][wa:410] "
1012902-52 = "― [log=스즈미 매지컬]不是的！真的不是！[/log][wa:700] "
1012902-55 = "[ns]「很適合鈴美，很可愛！」"
1012902-56 = "― [log=스즈미 매지컬]只是想先確認尺寸是否適合[/log][wa:350] "
1012902-58 = "― [log=스즈미 매지컬]才會穿上……！[/log][wa:1940] "
1012902-61 = "― [log=스즈미 매지컬]（被，被說可愛了……） [/log][wa:1170] "
1012902-63 = "― [log=스즈미 매지컬]（突然被誇獎的話……唔……！）[/log][wa:2070] "
1012902-66 = "― [log=스즈미 매지컬]（我還不習慣被誇獎）[/log][wa:1370] "
1012902-68 = "― [log=스즈미 매지컬]（雖然很高興……！但是……！）[/log][wa:2660] "
1012902-71 = "― [log=스즈미 매지컬]今天看到的事，[/log][wa:1210] "
1012902-73 = "― [log=스즈미 매지컬]請對其他人保密哦！[/log][wa:930] "
1012902-76 = "― [log=스즈미 매지컬]因為，這是機密事項……！[/log][wa:2970] "
1012902-79 = "話說，老師來更衣室有什麼事嗎？"
1012902-80 = "[s7]「我看到燈還亮著，就打算來關掉。」\n[s8]「也擔心說不定是有人暈倒了。」"
1012902-83 = "原來如此，老師也會巡視夏萊啊。"
1012902-84 = "為了學生們的安全……感覺就像自衛隊一樣呢。"
1012902-85 = "[s]「這是跟鈴美學來的哦。」"
1012902-86 = "！！！"
1012902-87 = "……老師總是能帶給我勇氣呢。"
1012902-88 = "正是這一點……"
1012902-92 = "那個……我差不多該把衣服換回去了……"
1012902-93 = "[s]「啊，抱歉！！我剛才一時恍神！！」"
1012902-94 = "下次再見。"
1012902-98 = "今天的事，還請您務必保密！"
1012902-100 = "（於是便回到了辦公室）"
1012902-101 = "（不久後再去確認時，更衣室的燈已經熄了）"

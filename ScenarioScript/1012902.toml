[translation]
1012902-1 = "กลุ่มรักษาความสงบเวทมนตร์แห่งทรีนิตี้"
1012902-2 = "(ระหว่างที่อยู่ทำงานดึก คุณครูก็ออกมาเดินเล่นรอบๆ สำนักงานชาเล่ต์พลางยืดเส้นสายไปในตัว)"
1012902-13 = "(แม้จะดึกมากแล้ว แต่ไฟในห้องเปลี่ยนชุดยังเปิดอยู่)"
1012902-14 = "[ns1] (มีใครลืมปิดไฟรึเปล่านะ?)\n[ns2] (มีคนอยู่รึเปล่านะ? แต่ไปดูก่อนแล้วกัน...)"
1012902-19 = "[ns3] (ไม่น่าจะมีคนอยู่แล้วนะ)\n[ns4] ค่อยๆ เปิดประตูเข้าไป"
1012902-27 = "― [log=스즈미 매지컬]คะ... คุณครู!![/log][wa:380] "
1012902-30 = "― [log=스즈미 매지컬]มาทำอะไรที่นี่?![/log][wa:710] "
1012902-32 = "― [log=스즈미 매지컬]ไม่สิ เข้ามาตั้งแต่เมื่อไรคะ?! [/log][wa:300] "
1012902-35 = "[ns5] \"ขอโทษนะสึซึมิ!! ครูคิดว่าไม่มีใครอยู่น่ะ!!\"\n[ns6] \"ขอโทษจริงๆ แต่ว่าครูเคาะแล้วนะ!\""
1012902-36 = "― [log=스즈미 매지컬]ฉันมัวแต่ฟังเพลง[/log][wa:570] "
1012902-37 = "― [log=스즈미 매지컬]ฉันมัวแต่ฟังเพลง[/log][wa:570] "
1012902-39 = "― [log=스즈미 매지컬]ก็เลยไม่ทันได้สังเกตเลยค่ะ...[/log]"
1012902-42 = "― [log=스즈미 매지컬]แต่พอเป็นคุณครูที่มาก็โล่งอกไปทีนะคะ[/log][wa:320] "
1012902-45 = "― [log=스즈미 매지컬]อ๊ะ ชะ...ชุดนี้คือว่า...![/log][wa:4040] "
1012902-47 = "― [log=스즈미 매지컬]เป็นชุดที่ฉันเตรียมมาเพื่องานสืบสวนลับของกลุ่มรักษาความสงบค่ะ...[/log][wa:320] "
1012902-50 = "― [log=스즈미 매지컬]มะ... ไม่ใช่งานอดิเรก [/log][wa:10] "
1012902-52 = "― [log=스즈미 매지컬]ของฉันนะคะ! จริงๆ นะคะ![/log][wa:140] "
1012902-55 = "[ns] \"สึซึมิ... น่ารักสุดๆ เลย!\""
1012902-56 = "― [log=스즈미 매지컬]ฉันแค่จะเช็กล่วงหน้า[/log][wa:30] "
1012902-58 = "― [log=스즈미 매지컬]ว่าไซซ์ถูกหรือเปล่าเท่านั้นเองค่ะ...![/log][wa:740] "
1012902-61 = "― [log=스즈미 매지컬](คะ... คุณครูบอกว่าน่ารักด้วยค่ะ...) [/log][wa:170] "
1012902-63 = "― [log=스즈미 매지컬](ถ้าจู่ๆ จะชมกันแบบนี้... ฟู่ว...!)[/log][wa:1270] "
1012902-66 = "― [log=스즈미 매지컬](ฉันยังไม่ชินกับการถูกชมจริงๆ ด้วยค่ะ)[/log][wa:250] "
1012902-68 = "― [log=스즈미 매지컬](ก็ดีใจอยู่หรอก...! แต่ก็...!)[/log][wa:2060] "
1012902-71 = "― [log=스즈미 매지컬]ที่เห็นวันนี้[/log][wa:970] "
1012902-73 = "― [log=스즈미 매지컬]ให้เป็นความลับกับคนอื่นนะคะ! [/log][wa:130] "
1012902-76 = "― [log=스즈미 매지컬]ก็นี่เป็นข้อมูลลับ... นี่คะ![/log][wa:2330] "
1012902-79 = "ว่าแต่ว่าคุณครูมาทำอะไรที่ห้องเปลี่ยนชุดเหรอคะ?"
1012902-80 = "[s7] \"ครูเห็นไฟเปิดอยู่เลยว่าจะเข้ามาปิดน่ะ\"\n[s8] \"ครูนึกว่าใครลืมปิดไฟเลยเข้ามาดู\""
1012902-83 = "อย่างนี้นี่เอง คุณครูกำลังเดินตรวจตรารอบๆ ชาเล่ต์อยู่สินะคะ"
1012902-84 = "ทำเพื่อความปลอดภัยของนักเรียนแบบนี้ เหมือนกันกับกลุ่มรักษาความสงบเลยค่ะ"
1012902-85 = "[s] \"ครูคงซึมซับมาจากสึซึมินั่นละ\""
1012902-86 = "!!!"
1012902-87 = "...คุณครูคอยให้กำลังใจฉันเสมอเลยนะคะ"
1012902-88 = "เพราะแบบนั้น..."
1012902-92 = "เอ่อ... ฉันจะเปลี่ยนชุดแล้วค่ะ..."
1012902-93 = "[s] \"อ๊ะ โทษทีๆ!! ครูคิดอะไรเพลินไปหน่อย!!\""
1012902-94 = "แล้วพบกันนะคะ"
1012902-98 = "เรื่องที่เกิดขึ้นวันนี้เป็นความลับนะคะ!"
1012902-100 = "(คุณครูกลับไปที่ห้องทำงาน)"
1012902-101 = "(หลังจากนั้นสักพัก ไฟของห้องเปลี่ยนชุดก็ดับลง)"

[translation]
1012902-1 = "Trinity's Magical Vigilante Crew"
1012902-2 = "I worked extended hours one night. I decided to stretch and walk around Schale's perimeter."
1012902-13 = "While it was late, I saw lights on in the locker room."
1012902-14 = "[ns1]\"(Did someone forget to turn the lights off?)\"\n[ns2]\"(Is someone still in there?)\""
1012902-19 = "[ns3] \"(It seems to be empty.)\"\n[ns4] Slowly open the door."
1012902-27 = "― [log=스즈미 매지컬]S-Sensei![/log][wa:580] "
1012902-30 = "― [log=스즈미 매지컬]Wh-What brings you here?![/log][wa:350] "
1012902-32 = "― [log=스즈미 매지컬]No, how long have you been there?! [/log][wa:140] "
1012902-35 = "[ns5] \"Sorry, Suzumi! I thought no one was here!\"\n[ns6] \"I knocked...but I'm still sorry!\""
1012902-36 = "― [log=스즈미 매지컬]I was so focused on my music[/log][wa:90] "
1012902-37 = "― [log=스즈미 매지컬]I was so focused on my music[/log][wa:90] "
1012902-39 = "― [log=스즈미 매지컬]that I didn't notice you at all...[/log]"
1012902-42 = "― [log=스즈미 매지컬]But still, I'm glad it was you, Sensei. [/log][wa:160] "
1012902-45 = "― [log=스즈미 매지컬]Ah, th-this outfit is, it's, um...![/log][wa:3640] "
1012902-47 = "― [log=스즈미 매지컬]It's an outfit I prepared for the Vigilante Crew's infiltration investigation...[/log][wa:10] "
1012902-50 = "― [log=스즈미 매지컬]I-It has nothing to do with my... [/log][wa:10] "
1012902-52 = "― [log=스즈미 매지컬]preferences! Really![/log][wa:260] "
1012902-55 = "[ns] \"Suzumi, you look so cute!\""
1012902-56 = "― [log=스즈미 매지컬]I was just checking [/log][wa:30] "
1012902-58 = "― [log=스즈미 매지컬]to see if it's the right size...![/log][wa:900] "
1012902-61 = "― [log=스즈미 매지컬](S-Sensei said it's cute...) [/log][wa:490] "
1012902-63 = "― [log=스즈미 매지컬](If you suddenly compliment me, then... Uhh...!)[/log][wa:750] "
1012902-66 = "― [log=스즈미 매지컬](I'm still not used to hearing compliments.)[/log][wa:10] "
1012902-68 = "― [log=스즈미 매지컬](It makes me happy...! But...!)[/log][wa:2020] "
1012902-71 = "― [log=스즈미 매지컬]What you saw today[/log][wa:770] "
1012902-73 = "― [log=스즈미 매지컬]has to stay a secret! [/log][wa:410] "
1012902-76 = "― [log=스즈미 매지컬]This is...top secret![/log][wa:2610] "
1012902-79 = "Anyway! Why are you in the changing room?"
1012902-80 = "[s7]\"The lights were on, so I came to turn them off.\"\n[s8]\"Also, a basic safety check.\""
1012902-83 = "I see. So Sensei also patrols Schale."
1012902-84 = "So, you do this to ensure the students' safety... Sounds like the Vigilante Crew."
1012902-85 = "[s]\"Maybe I learned it from you, Suzumi.\""
1012902-86 = "!"
1012902-87 = "...That is quite encouraging, Sensei."
1012902-88 = "That's what I..."
1012902-92 = "Um... I need to change back... So..."
1012902-93 = "[s]\"Ah, sorry! I got lost in thought!\""
1012902-94 = "I'll see you next time."
1012902-98 = "And, please...keep what you saw today a secret."
1012902-100 = "I returned to my office."
1012902-101 = "When I checked a little later, the lights were all turned off."

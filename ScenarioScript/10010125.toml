[translation]
10010125-1 = "ตอนที่ 12;หว่านพืชเช่นไร ย่อมได้ผลเช่นนั้น 2"
10010125-6 = "......"
10010125-11 = "[ns] \"......\""
10010125-19 = "คือว่า... คุณครูคะ..."
10010125-20 = "คือว่า... ถึงฉันจะไม่มีแผนสำรองอะไรก็เถอะ..."
10010125-21 = "แต่ว่า... เราต้องทำอะไรสักอย่างไม่ใช่เหรอคะ?"
10010125-22 = "คะ...?"
10010125-23 = "ฉันดูเหมือนเป็นห่วงงั้นเหรอคะ...? เอ่อ... คือว่า... ก็แบบ..."
10010125-24 = "ก็มัน..."
10010125-28 = "ใช่ค่ะ ฉันเป็นห่วง ความรู้สึกนี้มันแปลกจังเลยค่ะ"
10010125-29 = "วันนี้ฉันเพิ่งได้เจอคุณฮินาตะเป็นครั้งแรก... ตลกดีนะคะที่พูดคำว่าเป็นห่วงออกไป"
10010125-30 = "เอาเป็นว่า... แม้จะอธิบายออกมาไม่ได้ แต่ฉันรู้สึกอย่างนั้นน่ะค่ะ"
10010125-31 = "อันที่จริงแล้วถึงฉันจะเป็นห่วงไป... แต่สิ่งที่ฉันทำได้... คงจะมีแค่นี้ค่ะ"
10010125-37 = "เสร็จแล้วค่ะ พระคัมภีร์ฉบับฟื้นฟู"
10010125-38 = "ปกติแล้วฉันคงไม่คืนให้ แถมยังแอบอ่านต้นฉบับก่อนเสียด้วยซ้ำ... "
10010125-39 = "แต่วันนี้ฉันไม่อยากทำแบบนั้นเลยค่ะ"
10010125-40 = "เพราะฉะนั้นคุณครูรับไปเถอะค่ะ ฝากเอาไปให้คุณฮินาตะด้วยนะคะ"
10010125-41 = "ถ้าหากว่า..."
10010125-45 = "ฉันเป็นคนประเภทที่ออกไปไหนมาไหนได้ละก็..."
10010125-46 = "งานนี้คงเสร็จไวกว่านี้... หรือสถานการณ์อาจจะไม่ลงเอยเป็นแบบนี้ก็ได้ค่ะ..."
10010125-47 = "เปล่านะ... ฉันไม่ได้บอกว่านี่เป็นความผิดของฉันหรอกนะคะ"
10010125-48 = "เพราะนี่ก็ไม่ใช่ธุระกงการอะไรของฉัน... ฉันแค่ช่วยในสิ่งที่ช่วยได้ก็เท่านั้น..."
10010125-49 = "ถ้าให้พูดตามตรง ฉันว่าฉันทำทุกอย่างที่ทำได้แล้ว..."
10010125-50 = "แต่ว่า..."
10010125-51 = "ถ้าหากว่า... ฉันไม่ขอร้องอะไรไป... อย่างเช่นขอให้หาเค้กนั้นมาให้... ถ้าฉันเริ่มงานทันทีเลยละก็..."
10010125-53 = "แล้วก็กาวมอส... ถ้าฉันแค่ไปดึงกาวจากบานหน้าต่างของตึกนี้มาละก็..."
10010125-54 = "ไหนจะยาศักดิ์สิทธิ์อีก... ถ้าฉันใช้ขวดที่มีอย่างประหยัดแล้วเหลือไว้บ้างละก็..."
10010125-55 = "ก็แค่... เสียดายน่ะค่ะ"
10010125-57 = "อืม... ฉันเองก็ไม่รู้ค่ะว่าทำไมถึงเอาแต่พูดแบบนี้"
10010125-58 = "พอพูดแบบนี้แล้วดูเหมือนคนที่พยายามจะทำดีเพื่อคนอื่นเลย... ฉันไม่ใช่คนอย่างนั้นสักหน่อย..."
10010125-59 = "ลืมมันไปเถอะค่ะ..."
10010125-60 = "[s] \"......\""
10010125-64 = "[ns1] \"เค้ก...?\"\n[ns2] \"กาวมอส...?\"\n[ns3] \"ยาศักดิ์สิทธิ์...?\""
10010125-65 = "...? คุณครูคะ...?"
10010125-66 = "...? คุณครูคะ...?"
10010125-67 = "...? คุณครูคะ...?"
10010125-90 = "อ่า... คุณครูคะ... คือว่า..."
10010125-91 = "โดยพื้นฐานแล้ว... ที่นี่ห้ามคุยโทรศัพท์นะคะ..."
10010125-92 = "...? คุณครู ฟังอยู่หรือเปล่าคะ...?"
10010125-93 = "จะ... จะไปไหนเหรอคะ?"
10010125-94 = "คะ...? ขอรบกวนครู่เดียว... งั้นเหรอคะ?"
10010125-97 = "ต้องโทรศัพท์ไปหลายที่เหรอคะ?"
10010125-103 = "เกือบถึงแล้ว... งานจัดอยู่ตรงนั้นสินะคะ..."
10010125-104 = "เอ๋... เวลาผ่านไปขนาดนี้แล้วเหรอคะ... อีกเดี๋ยวก็คงจะเริ่มแล้ว..."
10010125-105 = "ถือว่าโชคดีแล้วละค่ะที่ยังไม่สายเกินไป... จากนี้แค่เข้าไปบอกตามความจริง..."
10010125-107 = "ตรงนั้นน่ะ ช่วยหยุดก่อนด้วยค่ะ!"
10010125-108 = "...?"
10010125-109 = "คุณเป็นใครเหรอคะ? งานสำคัญจะเริ่มขึ้นที่นี่ในอีกไม่ช้า กรุณาบอกชื่อและสังกัดเพื่อแสดงตัวตนด้วยค่ะ"
10010125-110 = "เอ๋... ชุดนี่มัน... เป็นคนจากชมรมซิสเตอร์สินะคะ"
10010125-111 = "สะ... สวัสดีค่ะ ดูจากชุดแล้ว... คงเป็นคนจากชมรมทวงความยุติธรรม..."
10010125-112 = "ใช่ค่ะ ฉันมาชิโระจากชมรมทวงความยุติธรรมค่ะ"
10010125-113 = "วันนี้ฉันและสมาชิกชมรมคนอื่นมาที่นี่เพื่อรักษาความปลอดภัยของงานค่ะ"
10010125-114 = "ว่าแต่... คุณซิสเตอร์จากชมรมซิสเตอร์มีธุระอะไรที่นี่เหรอคะ...?"
10010125-115 = "คุณซิสเตอร์คนอื่นๆ ที่ต้องร่วมงานก็น่าจะเข้าไปในสถานที่จัดงานกันหมดแล้ว..."
10010125-116 = "แหะๆๆ ชะ... ใช่แล้วค่ะ คือว่า... ฉัน... ฉันไม่ได้อยู่ในรายชื่อของผู้เข้าร่วมงานน่ะค่ะ..."
10010125-117 = "งั้นเหรอคะ..."
10010125-118 = "ต้องขอโทษด้วยนะคะ ต่อให้เป็นคุณซิสเตอร์ก็ตาม แต่ถ้าไม่ได้อยู่ในรายชื่อละก็ คงให้เข้าไปข้างในไม่ได้ค่ะ"
10010125-119 = "ข้อบังคับด้านความปลอดภัยของที่นี่แน่นหนาจนถึงขนาดที่ชมรมทวงความยุติธรรมที่มายืนเฝ้ายาม ยังเข้าไปไม่ได้เลยค่ะ"
10010125-120 = "ฉันเองก็ไม่รู้เหตุผลมากนัก... แต่คงเป็นเพราะพระคัมภีร์นั่น... มีเรื่องลับสุดยอดอยู่น่ะค่ะ"
10010125-122 = "แบบนี้นี่เอง ค่ะ... ฉันทราบดีค่ะ"
10010125-123 = "แต่ว่า... ฉันต้องเข้าไปอธิบายอะไรบางอย่าง..."
10010125-125 = "คะ...? ต้องอธิบายบางอย่างเหรอคะ...?"
10010125-126 = "เรื่องอะไรเหรอคะ? ถ้าเป็นเรื่องสำคัญ ฉันจะส่งต่อให้กับเจ้าหน้าที่ที่รับผิดชอบค่ะ"
10010125-127 = "อ่า... ต้องทำอย่างนั้นเหรอคะ ได้ค่ะ เอาแบบนั้นก็ได้ค่ะ..."
10010125-128 = "คือว่า... แบบว่า..."
10010125-129 = "แบบว่า...?"
10010125-130 = "พระคัมภีร์... ที่จะเปิดเผยวันนี้..."
10010125-131 = "พระคัมภีร์...?"
10010125-132 = "แบบว่า... มัน... คือว่า ฉัน... เอ่อ..."
10010125-133 = "ฮือ... ฮืออออ..."
10010125-134 = "คะ... คุณซิสเตอร์!? ทำไมจู่ๆ ก็ร้องไห้ล่ะคะ? เป็นอะไรหรือเปล่าคะ??"
10010125-135 = "ฮือ... ที่จริงแล้ว... พระคัมภีร์นั่นน่ะ...!"
10010125-136 = "พระคัมภีร์นั่น...!!"
10010125-138 = "พวกเราคือแก๊งโรลี่โพลี่ ล้มได้แต่ก็ลุกได้ไว!! รู้ไว้ซะ!!"
10010125-139 = "มัน... ฮือ... โรลี่โพลี่..."
10010125-143 = "...? คะ?"
10010125-145 = "เอ๋..?"
10010125-146 = "โรลี่โพลี่เหรอคะ?"
10010125-147 = "ศัตรู! ศัตรูบุกมาแล้วค่ะ!!"
10010125-156 = "ศัตรูบุกเหรอคะ!? มาแบบไม่มีสัญญาณอะไรเลยเนี่ยนะ?!"
10010125-157 = "มากันกี่คนคะ!? แล้วเป้าหมายล่ะ!?"
10010125-158 = "มะ... ไม่ทราบค่ะ! ตอนนี้มีการยิงสกัดและหลบหนีอยู่ในที่มืดค่ะ!"
10010125-159 = "อะ... อะไรกัน! เป็นไปได้ยังไง! กล้าทำแบบนี้ในที่ที่ชมรมทวงความยุติธรรมอยู่งั้นเหรอ...!!"
10010125-161 = "...????"
10010125-162 = "ขอโทษนะคะคุณซิสเตอร์ ช่วยรอสักครู่นะคะ ไว้ฉันกลับมาแล้วค่อยอธิบายต่อนะคะ"
10010125-164 = "ศัตรูกระจายตัวกันจนรับมือได้ยาก! ขอกำลังเสริมค่ะ! กำลังเสริม!"
10010125-166 = "ค่ะ! มาชิโระจะไปเดี๋ยวนี้ค่ะ!"
10010125-167 = "ค่ะ!!"
10010125-171 = "อ่า..."
10010125-173 = "เอ๋...?"

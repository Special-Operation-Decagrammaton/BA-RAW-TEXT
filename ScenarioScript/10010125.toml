[translation]
10010125-1 = "第12話;It Serves You Right（２）"
10010125-6 = "……"
10010125-11 = "[ns]「……」"
10010125-19 = "那，那個……老師……"
10010125-20 = "雖然我也沒有什麼好方法……"
10010125-21 = "不過，那個，就算這樣也該想想……"
10010125-22 = "……咦？"
10010125-23 = "擔心，是嗎……？"
10010125-24 = "這，這個嘛……"
10010125-28 = "是，是呢……真不可思議。"
10010125-29 = "明明是今天才剛認識的人……連我自己也不是很清楚自己在說什麼……"
10010125-30 = "總之，就是很在意……覺得放心不下……"
10010125-31 = "不，不過即便如此，我能做的也只有這些了……"
10010125-37 = "……完，完成了。經典的復原結束了。"
10010125-38 = "平時我肯定會立刻開始讀裡面的內容……"
10010125-39 = "不過現在實在沒有那種心情呢。"
10010125-40 = "所，所以，這部經典……就交給老師了。還有，那個……"
10010125-41 = "……如果。"
10010125-45 = "如果我是更喜歡在外面行動的人……"
10010125-46 = "這，這樣一來，會不會能早點結束……不至於變成現在這樣呢……"
10010125-47 = "不，這本來……就不是我的錯……"
10010125-48 = "我終究，只是處於這樣的立場……"
10010125-49 = "也，也自認已經做到我能做的事了……"
10010125-50 = "……然而。"
10010125-51 = "然而，如果……我沒有說什麼蛋糕，專心進行作業的話……"
10010125-53 = "或，或者，直接破壞這棟建築的一扇窗……取得「水苔膠」的話……"
10010125-54 = "如果平常有節約使用「精聖藥」的話……"
10010125-55 = "這，這些念頭一直……"
10010125-57 = "對，對不起，說了些沒頭沒尾的話……"
10010125-58 = "我，我也不是想當個好人，或是裝成那種樣子之類的……"
10010125-59 = "抱歉，請忘了吧……"
10010125-60 = "[s]「……」"
10010125-64 = "[ns1]「蛋糕……」\n[ns2]「水苔膠……」\n[ns3]「精聖藥……」"
10010125-65 = "老，老師……？"
10010125-66 = "老，老師……？"
10010125-67 = "老，老師……？"
10010125-90 = "那個，老師……？"
10010125-91 = "不，不好意思，這裡不能講電話……"
10010125-92 = "老師……？"
10010125-93 = "你，你要聯絡誰呢……？"
10010125-94 = "……咦？"
10010125-97 = "很多地方……？"
10010125-103 = "就，就是那裡吧……"
10010125-104 = "就快到開始的時間了……"
10010125-105 = "得想辦法到裡面去，把事情的真相……"
10010125-107 = "請留步。"
10010125-108 = "……？"
10010125-109 = "請問你是？這裡正在舉辦重要的典禮，能請你告訴我所屬單位跟姓名嗎？"
10010125-110 = "咦，這套服裝……是修女會的成員嗎？"
10010125-111 = "你，你好……那個，是實現正義部的……？"
10010125-112 = "是的。我是實現正義部的麻白。"
10010125-113 = "今天負責這邊的警備。"
10010125-114 = "話說回來，你為什麼會來這裡呢……？"
10010125-115 = "據我所知，預計會出席的人應該都已經在會場裡了才對……"
10010125-116 = "啊，是的。我並不是要出席典禮的成員……"
10010125-117 = "這樣啊。"
10010125-118 = "很抱歉，就算你是修女會的人，除了預計出席的成員之外都是不能進入的。"
10010125-119 = "今天的戒備相當嚴格。#n就連負責警備的實現正義部成員，都不能進入規定場所之內的地方。"
10010125-120 = "詳細情況我也不清楚，畢竟是與經典有關的事。#n我想你應該也能理解警備為何不得不如此嚴格……"
10010125-122 = "是，我很清楚……"
10010125-123 = "但是，即便如此……無論如何都必須由我親自說明才行。"
10010125-125 = "……是嗎？"
10010125-126 = "需要幫忙傳話……的意思嗎？如果是的話，我可以幫你轉達哦？"
10010125-127 = "啊，那有點……"
10010125-128 = "那個……"
10010125-129 = "……？"
10010125-130 = "那個，箱子裡的經典……"
10010125-131 = "……經典？"
10010125-132 = "被，被我……"
10010125-133 = "嗚，嗚嗚……"
10010125-134 = "修，修女同學！？怎麼突然哭了……你，你沒事吧！？"
10010125-135 = "嗚嗚，是我……是因為我才會……"
10010125-136 = "都是因為我，那部經典才會……！"
10010125-138 = "我們是無論倒下多少次都會重新站起來的「七跌八撞團」！！"
10010125-139 = "沒錯，無論倒下多少次都……！"
10010125-143 = "……咦？"
10010125-145 = "……什麼？"
10010125-146 = "七，「七跌八撞團」……？"
10010125-147 = "敵，敵襲！有敵襲！！"
10010125-156 = "什麼……這麼突然？一點前兆都沒有！？"
10010125-157 = "對方的規模呢！？"
10010125-158 = "不，不清楚！對方一直反覆從暗處進行威嚇射擊並逃跑……！"
10010125-159 = "唔，原來如此啊……！竟敢對實現正義部採取這種行動，簡直是在下挑戰書！"
10010125-161 = "……？？？"
10010125-162 = "不好意思，修女同學。請你稍等一會。傳話的內容我之後再聽你說。"
10010125-164 = "由於敵人四散各地，無法及時對應！請求補充兵力！"
10010125-166 = "請稍等！麻白這就出發！！"
10010125-167 = "非，非常感謝！"
10010125-171 = "……？"
10010125-173 = "那個，這樣……我可以進去嗎……？"

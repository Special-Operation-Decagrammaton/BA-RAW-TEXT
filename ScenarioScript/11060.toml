[translation]
11060-2 = "ตอนที่ 6;ปฏิบัติการช่วยชีวิต!"
11060-3 = "ห้องของเซริกะ"
11060-4 = "(ติ๊งต่อง)"
11060-5 = "เซริกะจัง? เซริกะจัง... อยู่ไหม?"
11060-7 = "(ติ๊งต่อง ติ๊งต่อง)"
11060-8 = "เซริกะจัง? ทำไมไม่รับโทรศัพท์เลย..."
11060-9 = "กุญแจฉุกเฉินอยู่ไหนนะ..."
11060-11 = "(แกรก)"
11060-12 = "เซริกะจัง...? ยังไม่กลับมาอีกเหรอ?"
11060-13 = "ไม่เคยหายไปแบบนี้เลยนี่นา"
11060-14 = "ยะ... อย่าบอกนะว่า...!!!"
11060-16 = "ลองโทรหาเซริกะหรือยังคะ?"
11060-17 = "โทรไม่ติดเลยค่ะ ปิดเครื่องไว้หลายชั่วโมงแล้วค่ะ"
11060-18 = "ร้านราเม็งบอกว่าเธอเลิกงานตรงเวลา แต่ว่าก็ยังมาไม่ถึงบ้านงั้นเหรอ"
11060-19 = "เซริกะจังไม่เคยไม่กลับบ้านจนดึกดื่นแบบนี้นี่นา..."
11060-20 = "หรือว่าจะเป็นพวกแก๊งหมวกกันน็อก?"
11060-21 = "ว่าไงนะคะ?! พวกแก๊งหมวกกันน็อกทำอะไรเซริกะจังงั้นเหรอ?!"
11060-22 = "เรารอกันก่อนดีกว่า ตอนนี้รุ่นพี่โฮชิโนะกับคุณครูออกไปตามหากันแล้ว"
11060-23 = "....."
11060-25 = "(กึก)"
11060-26 = "เอาละ รอกันนานเลยใช่มั้ย?"
11060-27 = "รุ่นพี่โฮชิโนะ! คุณครู!"
11060-28 = "[s] \"กลับมาแล้ว\""
11060-29 = "เกิดอะไรขึ้นเหรอรุ่นพี่?"
11060-30 = "ครูช่วยให้เราเข้าเครือข่ายสื่อสารส่วนกลางที่องค์การนักเรียนดูแลอยู่ได้"
11060-31 = "เครือข่ายสื่อสารส่วนกลาง... คุณครูมีสิทธิ์เข้าถึงของพวกนั้นด้วยเหรอเนี่ย..."
11060-32 = "พวกเธอนี่ก็~ จริงๆ แล้วเราแอบทำเอาน่ะ ถ้าจับได้คงได้เขียนหนังสือขอโทษแน่เลย"
11060-33 = "เอ๋?! ทะ... ทำแบบนี้ได้ด้วยเหรอคะ คุณครู?"
11060-34 = "[s1] \"ไม่ต้องห่วง นี่เพื่อความปลอดภัยของเซริกะจัง\"\n[s2] \"แค่ไม่ถูกจับได้ก็พอแล้วละ\""
11060-35 = "คุณครู......"
11060-36 = "แต่ว่าแบบนี้มัน..."
11060-37 = "......"
11060-38 = "ค่ะ..."
11060-39 = "ขอบคุณมากนะคะคุณครู"
11060-40 = "เราระบุตำแหน่งของเซริกะจังก่อนที่สัญญาณโทรศัพท์จะถูกตัดได้"
11060-41 = "ที่นี่มัน... เขตของเมืองที่กำลังกลายเป็นทะเลทรายไม่ใช่เหรอคะ?"
11060-42 = "พื้นที่รกร้างนี้ไม่มีชาวเมืองอาศัยอยู่... แถมยังไม่มีการรักษาความสงบ พวกนอกกฎหมายก็เลยชอบ#nไปรวมตัวกันที่นั่น"
11060-43 = "ตอนที่เราวิเคราะห์ปัจจัยอันตรายของโรงเรียนคราวก่อน พบว่าที่นี่คือพื้นที่กองกำลังหลักของ#nแก๊งหมวกกันน็อกคาตะคาตะด้วยค่ะ"
11060-44 = "ถ้าเป็นแบบนี้ก็แสดงว่า... เป็นฝีมือพวกแก๊งหมวกกันน็อกคาตะคาตะ......!!"
11060-45 = "พวกนั้นมาจับตัวเซริกะไปหลังจากเลิกงาน แล้วเอาตัวไปที่กองบัญชาการสินะ"
11060-46 = "มาบุกโรงเรียนของเรายังไม่พอ แถมยังกล้ามาจับนักเรียนเป็นตัวประกันเพื่อข่มขู่อีก"
11060-47 = "มัวแต่มาวิเคราะห์ก็ทำอะไรไม่ได้หรอกค่ะ! ตอนนี้เราต้องรีบไปช่วยเซริกะจังสิคะ!!"
11060-48 = "อ่า นั่นมันแน่อยู่แล้ว"
11060-49 = "เอาละ ถ้างั้นก็ไปกันเลย"
11060-50 = "[s] \"ไปกันเลย!\""
11060-53 = "(โครมมม)"
11060-54 = "อึก..."
11060-55 = "อือ...?"
11060-56 = "(ลุกขึ้นมา)"
11060-57 = "นี่มันที่ไหนเนี่ย?! พวกแกลักพาตัวฉันมาเหรอ?!"
11060-58 = "โอ๊ย... หัวฉัน..."
11060-59 = "(ตึงงงง)"
11060-60 = "นี่เราอยู่... ในรถบรรทุกเหรอ?"
11060-61 = "เจ้าพวกแก๊งหมวกกันน็อกคิดจะจับเราไปที่ไหนนะ..."
11060-62 = "ในนี้มืดชะมัด แต่ยังดีที่ยังมีแสงจากข้างนอกเข้ามาได้บ้าง"
11060-63 = "ไหนลองดูถนนรอบๆ หน่อยซิ"
11060-64 = "ทางรถไฟ... ทะเลทราย...?!"
11060-65 = "ถ้ามีทางรถไฟละก็... อย่าบอกนะว่าที่นี่คือทะเลทรายชายขอบอะบิดอส?"
11060-66 = "แบบนี้แย่แน่! ที่นี่เราติดต่อใครไม่ได้เลยนี่นา! ถึงจะหนีออกไปจากที่นี่ได้ก็คงติดต่อสมาชิกคนอื่น#nไม่ได้แน่ๆ"
11060-67 = "ทำยังไงดีล่ะ? ทุกคนต้องเป็นห่วงอยู่แน่เลย..."
11060-68 = "......"
11060-69 = "พวกนี้จะเอาเรามาฝังในที่รกร้าง จะได้ไม่มีใครหาเจองั้นเหรอ?"
11060-70 = "แล้วทุกคนก็จะคิดว่าเราตั้งใจไม่ติดต่อกลับ แล้วจากเมืองนี้ไปเหมือนนักเรียนคนอื่นสินะ..."
11060-71 = "หรือว่าจะคิดว่าเราทรยศ..."
11060-72 = "ต้องมาตายในที่แบบนี้โดยที่ทุกคนเข้าใจเราผิดอย่างนั้นเหรอเนี่ย..."
11060-73 = "แบบนี้ไม่เอานะ..."
11060-74 = "......."
11060-75 = "อะ... อึก..."
11060-76 = "ฮือ..."
11060-77 = "(ตู้มมมมม!!)"
11060-78 = "อะไรน่ะ?!!"
11060-80 = "(ตู้มมมม!)"
11060-81 = "แค่ก... แค่ก..."
11060-83 = "อะไรน่ะ?! ระเบิดเหรอ?! รถบรรทุกระเบิดงั้นเหรอ?"
11060-84 = "ระ... หรือว่ามีใครยิงระเบิดมา? จากตรงไหนน่ะ?"
11060-85 = "รู้ตำแหน่งของเซริกะจังแล้วค่ะ! เจอตัวเธอแล้วค่ะ!!"
11060-86 = "อะ... อายาเนะ?!"
11060-87 = "ฉันก็เจอแล้ว! เซริกะกำลังร้องไห้อยู่!"
11060-88 = "?!"
11060-89 = "อะไรกัน?! เด็กน้อยของเราร้องไห้อยู่งั้นเหรอ? ร้องไห้เพราะคิดถึงพวกเราใช่ไหมล่ะ? ขอโทษนะที่หม่าม้าไม่เคยรู้มาก่อนเลย!!"
11060-90 = "มะ.. ไม่ใช่สักหน่อย! เงียบไปเลยน่า! ฉันไม่ได้ร้องไห้เลยสักนิด!"
11060-91 = "โกหก! ฉันเห็นกับตาเลยว่ากำลังร้องไห้!"
11060-92 = "อย่าร้องไห้เลยนะคะเซริกะจัง พวกเรามาแล้ว เราจะช่วยเช็ดน้ำตาให้เอง-!"
11060-93 = "ทำไมไม่เชื่อกันบ้างนะ!! บอกว่าไม่ได้ร้องก็ไม่ได้ร้องสิ! เงียบไปเลย!"
11060-94 = "[s] บอกว่าโชคดีที่ปลอดภัย"
11060-95 = "อะไรเนี่ย คุณครูก็มากับเขาด้วยเหรอ?! แล้วมาที่นี่ได้ยังไงกันน่ะ?!"
11060-96 = "[s3] \"ก็ครูเป็นนักสะกดรอยตามไงล่ะ\"\n[s4] \"องค์หญิงถูกลักพาตัวไป ผู้กล้าก็ต้องมาช่วยสิ\""
11060-97 = "พูดอะไรบ้าๆ น่ะ! เป็นโรคจิตไปแล้วเหรอ?!"
11060-98 = "บะ... บะ...!"
11060-99 = "บ้าหรือเปล่าน่ะ?!"
11060-100 = "พูดอะไรน่ะ?! สติดีอยู่หรือเปล่า?! เดี๋ยวหมกไว้กลางทะเลทรายเลย! คะ.. ใครคือองค์หญิงกันเล่า!!!"
11060-101 = "แหะๆ ดูเหมือนจะแข็งแรงดีนะ ปฏิบัติการช่วยชีวิตสำเร็จแล้ว"
11060-102 = "โล่งอกไปที... ฉันคิดว่าเซริกะจังจะเป็นอะไรไปแล้วซะอีก..."
11060-103 = "อายาเนะจัง..."
11060-104 = "เรายังวางใจไม่ได้ ถึงเราจะหยุดรถบรรทุกได้ด้วยระบบสนับสนุนยุทธศาสตร์ แต่ตอนนี้เราก็ยัง#nอยู่ท่ามกลางศัตรู"
11060-105 = "ตามนั้นละ รถขนส่งตัวประกันก็ถูกระเบิดทำลายไปแล้ว พวกกำลังเสริมคงจะออกมากันแล้วละนะ"
11060-106 = "จับสัญญาณแก๊งหมวกกันน็อกคาตะคาตะได้! พวกมันอยู่ข้างหน้า!!"
11060-107 = "แถมยังขนอาวุธขนาดใหญ่หลายชิ้นด้วยนะคะ! พวกมันตีวงล้อมเข้ามาแล้วค่ะ!"
11060-108 = "เลือกจังหวะได้ดีเลยนี่... ฝ่าวงล้อมของพวกมันออกไป แล้วกลับกันดีกว่า พร้อมไหม?"
11060-109 = "ระวังด้วยนะ พวกมันมีรถถังหนักที่ดัดแปลงแล้วด้วย"
11060-110 = "อื้ม รู้อยู่แล้วละว่าเป็น Flak41 รุ่นใหม่"
11060-113 = "เอาละ..."
11060-117 = "จัดให้หนักเลย!"

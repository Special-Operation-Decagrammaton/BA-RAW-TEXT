[translation]
11060-2 = "第6話;救出作戦！"
11060-3 = "セリカの部屋"
11060-4 = "（ピンポーン）"
11060-5 = "セリカちゃん？セリカちゃん、いる？"
11060-7 = "（ピンポンピンポーン）"
11060-8 = "セリカちゃーん？どうしたんだろう、電話にも出ないし……。"
11060-9 = "スペアキー、どこだっけ……。"
11060-11 = "（ガチャ）"
11060-12 = "セリカちゃん……？まだ帰ってないのかな？"
11060-13 = "……こんなこと、今まで一度もなかったのに。"
11060-14 = "ま、まさか……！！"
11060-16 = "電話はしてみました？"
11060-17 = "……はい。でも数時間前から、電源が入ってないみたいで……。"
11060-18 = "バイト先では定時に店を出たみたい。その後、家に帰ってないってことかな。"
11060-19 = "こんな遅くまで帰らないなんてこと、これまでなかったですよね……？"
11060-20 = "まさか……ヘルメット団の連中？"
11060-21 = "えっ！？ヘルメット団がセリカちゃんを……！？"
11060-22 = "とりあえず待とう。ホシノ先輩と先生が調べてるから。"
11060-23 = "……。"
11060-25 = "（ガチャッ）"
11060-26 = "みんな、お待たせー。"
11060-27 = "ホシノ先輩！先生！"
11060-28 = "[s] \"ただいま。\""
11060-29 = "どうだった、先輩？"
11060-30 = "先生が持ってる権限を使って、連邦生徒会が管理するセントラルネットワークにアクセスできた。 "
11060-31 = "セントラルネットワークに……#n先生、そんな権限までお持ちなのですね……。"
11060-32 = "うへ～もちろんこっそりだけどね。バレたら始末書だよー？"
11060-33 = "ええっ！？だ、大丈夫なんですか、先生？"
11060-34 = "[s1] \"問題ない、セリカの安全のためなら。\"\n[s2] \"バレなきゃオッケー。\""
11060-35 = "先生……。"
11060-36 = "そ、それはそうですけど……。"
11060-37 = "……。"
11060-38 = "……はい。"
11060-39 = "ありがとうございます、先生。"
11060-40 = "連絡が途絶える直前のセリカちゃんの端末の場所、ここだったよー。"
11060-41 = "ここは……砂漠化が進んでいる市街地の端の方ですね？"
11060-42 = "住民もいないし、廃墟になったエリア……#n治安が維持できなくて、チンピラばかりが集まってる場所だね。"
11060-43 = "このエリア、以前危険要素の分析をした際に#nカタカタヘルメット団の主力が集まっていると確認できた場所です。"
11060-44 = "ということは……やはりカタカタヘルメット団の仕業……！！"
11060-45 = "なるほどねー、帰宅途中のセリカちゃんを拉致して、自分たちのアジトに連れて行ったってことかー。"
11060-46 = "学校を襲うくらいじゃ物足りなくて、人質を取って脅迫しようってことかな。"
11060-47 = "考えていても仕方ありません！急いでセリカちゃんを助けに行きましょう！"
11060-48 = "うん、もちろん。"
11060-49 = "よっしゃー、そんじゃ行ってみよー！"
11060-50 = "[s] \"出発！ \""
11060-53 = "（ガタン、ガタン）"
11060-54 = "う、うーん……。"
11060-55 = "……へ？"
11060-56 = "（ガバッ）！？"
11060-57 = "こ、ここは！？私、さらわれた！？"
11060-58 = "あ、う……頭が……。"
11060-59 = "（ガタン、ガタン）"
11060-60 = "ここ……トラックの荷台……？"
11060-61 = "ヘルメット団め……私をどこに連れて行くつもりなの……。"
11060-62 = "暗い……けど、隙間から少し光が漏れてる。"
11060-63 = "外……見えるかな。"
11060-64 = "……砂漠……線路！？"
11060-65 = "線路がある場所って……ま、まさかここ、アビドス郊外の砂漠！？"
11060-66 = "……そ、そんな。ここからじゃ、どこにも連絡が取れない！#nもし脱出できたとしても、対策委員会のみんなにどうやって知らせれば……。"
11060-67 = "どうしよう、みんな心配してるだろうな……。"
11060-68 = "……。"
11060-69 = "……このままどこかに埋められちゃうのかな。#n誰にも気づかれないように……。"
11060-70 = "連絡も途絶えて……私も他の子たちみたいに、街を去ったって思われるんだろうな……。"
11060-71 = "裏切ったって思われるかな……。"
11060-72 = "誤解されたまま、みんなに会えないまま死ぬなんて……。"
11060-73 = "そんなの……ヤダよ……。"
11060-74 = "……。"
11060-75 = "う……うぐぅ……。"
11060-76 = "うっ、ううっ……。"
11060-77 = "（ドカーーーーン！！！）"
11060-78 = "う、うわあああっ！？"
11060-80 = "（ドゴーン！）"
11060-81 = "カハッ、ケホッ……ケホッ……。"
11060-83 = "な、何っ！？爆発！？トラックが爆発した！？"
11060-84 = "砲弾にでも当たったのかな……一体どこから？"
11060-85 = "セリカちゃん発見！生存確認しました！"
11060-86 = "……あっ、アヤネちゃん？！"
11060-87 = "こちらも確認した、半泣きのセリカ発見！"
11060-88 = "！？"
11060-89 = "なにぃー！？うちの可愛いセリカちゃんが泣いてただと！#nそんなに寂しかったの？#nママが悪かったわ、ごめんねー！！"
11060-90 = "う、うわああ！？う、うるさいっ！！な、泣いてなんか！！"
11060-91 = "嘘！この目でしっかり見た！"
11060-92 = "泣かないでください、セリカちゃん！私たちが、その涙を拭いて差し上げますから！"
11060-93 = "あーもう、うるさいってば！！違うったら違うのっ！！黙れーっ！！"
11060-94 = "[s] 安心したと伝える。"
11060-95 = "な、何で先生まで！？どうやってここまで来たの！？"
11060-96 = "[s3] \"ダテにストーカーじゃない。\"\n[s4] \"さらわれたお姫様を助けるのは勇者の役目！\""
11060-97 = "ふ、ふざけないでよ！この変態教師！！"
11060-98 = "ば……ばっ……！"
11060-99 = "バッカじゃないの！？"
11060-100 = "だ、誰がお姫様よ！！冗談やめて！！ぶ、ぶん殴られたいの！？"
11060-101 = "うへ、元気そうじゃーん？無事確保完了ー。"
11060-102 = "よかった……セリカちゃん……私、セリカちゃんに何かあったんじゃないかって……。"
11060-103 = "アヤネちゃん……。"
11060-104 = "まだ油断は禁物。戦術サポートシステムを使ってトラックは制圧したけど、#nまだここは敵陣のど真ん中だから。"
11060-105 = "だねー。人質を乗せた車両が破壊されたって知ったら、敵さん怒り狂って攻撃してくるよー。"
11060-106 = "前方にカタカタヘルメット団の兵力、多数確認！！"
11060-107 = "さらに巨大な重火器も多数確認しました！#n徐々に包囲網を構築しています！"
11060-108 = "敵ながらあっぱれ……#nそれじゃー、せっかくだから包囲網を突破して帰りますかねー。"
11060-109 = "……気を付けて。奴ら、改造した重戦車を持ってるわよ。"
11060-110 = "知ってる、Flak41改良型。"
11060-113 = "それじゃ……。"
11060-117 = "行こうか？"

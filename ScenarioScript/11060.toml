[translation]
11060-2 = "Episode 6; Rescue Mission!"
11060-3 = "Serika's Room"
11060-4 = "*ding dong*"
11060-5 = "Serika? Are you there, Serika?"
11060-7 = "*ding dong* *ding dong*"
11060-8 = "Serika? Why haven't you been answering your phone?"
11060-9 = "Where does she keep her spare keys...?"
11060-11 = "(opens door)"
11060-12 = "What's going on, Serika? Are you still not home yet?"
11060-13 = "This has never happened before..."
11060-14 = "Could it be...?"
11060-16 = "What about her phone?"
11060-17 = "It's been turned off for a few hours now..."
11060-18 = "Her boss said she clocked out and left like everything was normal.#nDid she never make it home?"
11060-19 = "Nothing like this has ever happened before. She always gets home safely..."
11060-20 = "You don't think...it was the Helmet Gang?"

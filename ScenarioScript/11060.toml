[translation]
11060-2 = "第6話;解救作戰！"
11060-3 = "茜香的房間"
11060-4 = "（叮咚）"
11060-5 = "茜香醬？茜香醬在嗎？"
11060-7 = "（叮咚叮咚）"
11060-8 = "茜香醬～？#n發生什麼事了，電話也不接……"
11060-9 = "備用鑰匙放到哪去了……"
11060-11 = "（喀嚓）"
11060-12 = "茜香醬……還沒回來嗎？"
11060-13 = "……以前從來沒發生過這種事的說。"
11060-14 = "難，難不成……！！"
11060-16 = "撥過電話了嗎？"
11060-17 = "……嗯，不過從幾個小時前就一直打不通……"
11060-18 = "拉麵店說他有準時下班。#n所以在那之後就沒有回家嗎……"
11060-19 = "以前他從來沒有這麼晚回來過吧……？"
11060-20 = "難道是……頭盔團那些傢伙？"
11060-21 = "咦！？頭盔團綁走了茜香醬……！？ "
11060-22 = "還是先等一下吧，星野前輩和老師已經去調查了。"
11060-23 = "……"
11060-25 = "（喀嚓）"
11060-26 = "大家，久等了。"
11060-27 = "星野前輩！老師！"
11060-28 = "[s] 「我們回來了。」"
11060-29 = "前輩，怎麼樣？"
11060-30 = "我們利用老師的權限，連上了聯邦學生會管理的中央通訊網。"
11060-31 = "中央通訊網……#n原來老師連那種權限都有……"
11060-32 = "唔嘿～不過當然是偷偷借來用就是了。#n要是被抓到的話就得寫悔過書了吧～？"
11060-33 = "咦！？#n這，這樣沒問題嗎，老師？"
11060-34 = "[s1] 「沒關係，畢竟是為了茜香的安全。」\n[s2] 「只要別被抓到就行了。」"
11060-35 = "老師……"
11060-36 = "雖，雖然是這麼說沒錯……"
11060-37 = "……"
11060-38 = "……我明白了。"
11060-39 = "非常感謝，老師。"
11060-40 = "在失去訊號之前，茜香醬的手機定位最後出現在這個地方唷～"
11060-41 = "這裡……不是正在沙漠化的市區邊境嗎？"
11060-42 = "無人居住的廢墟區域…… #n因為難以維持治安，所以聚集了很多不法分子。"
11060-43 = "這個區域在之前分析風險因素時，已被確認是硬梆梆頭盔團的主力據點。"
11060-44 = "也就是說……果然是硬梆梆頭盔團做的好事……！！"
11060-45 = "原來是這樣啊～#n把剛下班的茜香醬綁走並帶回基地。"
11060-46 = "光是襲擊學校還不滿意，還要抓人質來威脅我們嗎。"
11060-47 = "現在想這些的意義也不大！趕快去救茜香醬吧！"
11060-48 = "嗯。當然。"
11060-49 = "好～咱們出發吧～！"
11060-50 = "[s]「出發！」"
11060-53 = "（咚哐，咚哐）"
11060-54 = "唔，唔嗯……"
11060-55 = "……咦？"
11060-56 = "（驚醒）！？"
11060-57 = "這，這裡是……！？#n我，我被綁架了嗎！？"
11060-58 = "3;茜香;08;啊，嗚……我的頭…… "
11060-59 = "（咚哐，咚哐）"
11060-60 = "3;茜香;02;這裡是……貨車的載貨區……？ "
11060-61 = "3;茜香;11;頭盔團的傢伙……究竟要把我帶去哪裡……"
11060-62 = "雖然很暗……不過能從縫隙間看到一些光線。"
11060-63 = "3;茜香;05;外頭……看得見嗎。 "
11060-64 = "……沙漠……鐵路！？"
11060-65 = "3;茜香;04;是有鐵路的地方……這，這裡該不會是阿拜多斯外圍的沙漠！？ "
11060-66 = "……怎，怎麼會。這裡可沒辦法聯絡上任何地方啊！#n就算能逃離這裡，又該怎麼連絡對策委員會的大家……"
11060-67 = "3;茜香;13;怎麼辦，大家一定很擔心……"
11060-68 = "……"
11060-69 = "難道我要在不為人知的情況下……被埋在某個地方了嗎。"
11060-70 = "突然就聯絡不上……他們一定會覺得我跟其他學生一樣離開城鎮了吧……"
11060-71 = "3;茜香;05;會不會覺得被背叛了呢……"
11060-72 = "3;茜香;11;連誤會也解不開，在見不到大家的狀況下就死去……"
11060-73 = "3;茜香;13;那種事……我才不要……"
11060-74 = "3;茜香;13;……"
11060-75 = "3;茜香;11;嗚……嗚咕……"
11060-76 = "3;茜香;13;嗚，嗚嗚……"
11060-77 = "（咚哐──！！！）"
11060-78 = "3;茜香;04;嗚，嗚哇啊啊啊！？"
11060-80 = "（咚碰──！）"
11060-81 = "3;茜香;04;咳哈，咳咳……咳咳……"
11060-83 = "3;茜香;06;什，什麼！？爆炸！？行駛中的貨車爆炸了！？"
11060-84 = "3;茜香;11;被砲彈擊中了嗎……從哪裡來的？"
11060-85 = "發現茜香醬！已確認生存！"
11060-86 = "……綾，綾音醬！？"
11060-87 = "這邊也確認到了正在哭泣的茜香！"
11060-88 = "3;茜香;07;！？"
11060-89 = "什麼～！？我們家茜香醬竟然在哭？#n讓你寂寞了嗎？是媽媽不好，對不起哦～！！"
11060-90 = "3;茜香;07;嗚，嗚哇啊啊！？吵，吵死了！！我，我才沒有哭！！"
11060-91 = "騙人！我這雙眼睛確實看見了！"
11060-92 = "請不要哭，茜香醬！我們會幫你擦乾眼淚的！"
11060-93 = "啊啊啊～真是的，吵死了！！我說沒有就是沒有啦！少囉嗦！"
11060-94 = "[s] 表達自己放心了"
11060-95 = "為，為什麼連老師也……！？#n怎麼找到這裡來的！？"
11060-96 = "[s3]「畢竟是跟蹤狂。」\n[s4]「因為解救被綁架的公主是勇者的職責！」"
11060-97 = "3;茜香;04;你，你在說什麼啊！這個變態老師！ "
11060-98 = "你……你……！"
11060-99 = "你是笨蛋嗎！？"
11060-100 = "3;茜香;06;誰，誰是公主啦！！別開玩笑了！！想，想被揍嗎！？"
11060-101 = "唔嘿，看起來很有精神呢～？解救成功～"
11060-102 = "太好了……茜香醬……我還以為你出事了……"
11060-103 = "5;茜香;02;綾音醬……"
11060-104 = "現在放心還太早了。#n雖然用戰術支援系統壓制了貨車，這裡仍然是敵陣的正中心。"
11060-105 = "也對。如果發現運送人質的車輛被破壞，敵人可能會發狂似地攻過來唷～"
11060-106 = "前方發現大批硬梆梆頭盔團成員！！ "
11060-107 = "同時還確認到了大量重型武器！#n對方正在建構包圍網！"
11060-108 = "時機還真是剛好……#n那麼就趕緊突破包圍網回去吧～"
11060-109 = "……小心點。#n那些傢伙擁有改造過的重型戰車。"
11060-110 = "我知道，Flak 41改良型。"
11060-113 = "3;星野;05;那麼……"
11060-117 = "我們上。"

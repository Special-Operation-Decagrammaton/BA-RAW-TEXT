11060-22 = "Could be, but let's not jump to conclusions. Hoshino and Sensei are still investigating."
11060-23 = "..."
11060-25 = "(opens door)"
11060-26 = "Sorry to keep you waiting."
11060-27 = "Hoshino! Sensei!"
11060-28 = "[s] \"We're back.\""
11060-29 = "Did you find out what happened?"
11060-30 = "Sensei was able to log in to the General Student Council's central communication network."
11060-31 = "You were able to get into their network? Wow. Sensei's the real deal..."
11060-32 = "It's a secret, though. We're in big trouble if they catch us."
11060-33 = "Wait! Does that mean you didn't ask for permission?!"
11060-34 = "[s1] \"It's fine. It's for Serika's safety.\"\n[s2] \"It's okay as long as I don't get caught...\""
11060-35 = "Sensei..."
11060-36 = "Yeah, but..."
11060-37 = "..."
11060-38 = "Okay."
11060-39 = "Thank you, Sensei."
11060-40 = "This is the last known location of Serika's phone before it went dark."
11060-41 = "That's one of the neighborhoods that's undergoing desertification, isn't it?"
11060-42 = "It's more like an abandoned wasteland. There's no one there to enforce public safety, so there are a lot of outlaws skulking about."
11060-43 = "Right. We confirmed that the Kata-Kata Helmet Gang lived here while researching risk factors surrounding the school."
11060-44 = "So it really was them!"
11060-45 = "They must have kidnapped Serika while she was on her way home and taken her to their hideout."
11060-46 = "They must be bitter over our last battle. Maybe they took Serika hostage as a way to retaliate."
11060-47 = "Probably! We have to go save her!"
11060-48 = "I agree."
11060-49 = "There's no time to waste!"
11060-50 = "[s] \"Let's go!\""
11060-53 = "*clunk* *clunk*"
11060-54 = "Ugh..."
11060-55 = "Huh?"
11060-56 = "...?!"
11060-57 = "Where am I? Was I kidnapped?!"
11060-58 = "Ow... My head."
11060-59 = "*clunk* *clunk*"
11060-60 = "Is this the back of a truck?"
11060-61 = "The Helmet Gang... Where could they be taking me?"
11060-62 = "It's dark, but there is a little bit of light coming through the crack in the door."
11060-63 = "Maybe I can see something outside..."
11060-64 = "Sand...and a railroad?"
11060-65 = "Does that mean we're in the desert on the outskirts of Abydos?"
11060-66 = "This is bad... There's nothing but wasteland out here and no way to get a signal!#nI won't be able to contact the others even if I do manage to escape."
11060-67 = "What should I do? They must be worried sick about me."
11060-68 = "..."
11060-69 = "Are they going to bury me somewhere in the desert so no one can find me?"
11060-70 = "The team might think I bailed on them and left like all the other students..."
11060-71 = "Will they think I betrayed them?"
11060-72 = "Is this how I'm going to die? Remembered as a traitor...?"
11060-73 = "No. I can't let that happen..."
11060-74 = "..."
11060-75 = "Ugh..."
11060-76 = "*sniffle*"
11060-77 = "*booooom*"
11060-78 = "Wh-What was that?!"
11060-80 = "*thump* *crash*"
11060-81 = "*cough* *cough*"
11060-83 = "What the heck? An explosion? The truck blew up?!"
11060-84 = "Where are these shells coming from?"
11060-85 = "I've located Serika!"
11060-86 = "A-Ayane?!"
11060-87 = "I have eyes on her! Repeat: visual on Serika! She's crying!"
11060-88 = "...?!"
11060-89 = "What?! Our little Serika is crying? Aw, she must have missed us.#nI had no idea she cared so much!"
11060-90 = "Ugh! You guys are so annoying! I wasn't crying!"
11060-91 = "False! I can confirm there were tears in your eyes just moments ago!"
11060-92 = "Don't cry, Serika! We're here now, and we promise to dry those tear-soaked cheeks of yours!"
11060-93 = "Damn it! Could you be any more grating?! I said I wasn't crying, so shut up already!"
11060-94 = "[s] \"I'm glad to see you're okay.\""
11060-95 = "What? You're here too, Sensei?! How?"
11060-96 = "[s3] \"I'm a stalker, remember?\"\n[s4] \"Rescuing princesses is what heroes do, right?\""
11060-97 = "What are you talking about? You're such a perv!"
11060-98 = "Are you..."
11060-99 = "Are you brain dead or something?!"
11060-100 = "What did you just say? Are you stupid? Have a DEATHWISH?!#nWh-Who are you calling a princess?!"
11060-101 = "Heh. Our damsel in distress has been rescued. She's gonna be fine."
11060-102 = "Thank goodness. I was so worried about you, Serika."
11060-103 = "Ayane..."
11060-104 = "It's too soon to let our guard down. We may have stopped the truck,#nbut we're still in enemy territory. "
11060-105 = "You're right. Reinforcements are likely on the way now that the truck's been destroyed."
11060-106 = "Multiple hostiles from the Kata-Kata Helmet Gang confirmed ahead!"
11060-107 = "I also see more than a handful of super heavy firearms!#nThey're steadily forming a dragnet!"
11060-108 = "Me and my big mouth! Ugh. What do you say we push our way through these losers?"
11060-109 = "Be careful. Those goons have a modified heavy tank."
11060-110 = "Yeah, we know. It's a refurbished Flak 41."
11060-113 = "All right..."
11060-117 = "Shall we?"

[translation]
10032070-1 = "第7話;荒謬的結局"
10032070-10 = "比想像中還多耶？真的毫無止盡地湧上來。"
10032070-11 = "畢竟不只是一個幫派，而是幫派「聯盟」啊。#n阿蘭奇諾那個傢伙可是那些頭目們的代表。"
10032070-12 = "……所以阿蘭奇諾呢？他起來了嗎？"
10032070-13 = "哼嗯～"
10032070-14 = "……不！他完全失去意識了耶？"
10032070-15 = "剛才在槍戰中飛來的流彈似乎真的很痛。要等他醒來，可能還要幾個小時吧！"
10032070-16 = "唉……偏偏在這種時候……"
10032070-17 = "不能直接把他交那些傢伙嗎？#n他們想要的就只有這個吧？"
10032070-18 = "不，這可不行。"
10032070-19 = "他們是因為唐．阿蘭奇諾在我們手上，所以攻擊才沒有那麼猛烈。"
10032070-20 = "如果把他交出去，對方就沒必要再手下留情，情況反而會變得更不利。"
10032070-21 = "現在我們要盡可能帶著他逃到安全的地方。#n要捨棄他也是再之後的事。"
10032070-22 = "等，等等，先等一下……"
10032070-24 = "我不理解現在是什麼情況。"
10032070-25 = "你們為什麼要幫我？#n剛才不是還一直在追擊嗎？"
10032070-26 = "我們的工作應該是互相衝突的才對……"
10032070-28 = "你說的沒錯，單純只是因為情況有變。"
10032070-29 = "所以這已經是兩回事了。"
10032070-31 = "嗯……？是，是這樣嗎……雖然我還是搞不清楚狀況……"
10032070-32 = "集中精神！他們又來了！！"
10032070-33 = "……！！"
10032070-34 = "唔啊啊啊啊啊──！！"
10032070-45 = "…………"
10032070-46 = "……雖然之前也見過，但這股魄力實在非常驚人。"
10032070-47 = "這就是便利屋68……地下世界中的霸主之一……"
10032070-48 = "遙，遙香！不要一個人衝得太快！稍微顧及一下戰線……！"
10032070-49 = "原來如此，同為友方的時候竟然如此可靠。"
10032070-55 = "……你剛剛有聽到嗎，亞瑠醬？他說我們是「地下世界的霸主」！"
10032070-56 = "太好了，社長。這不是你一直想聽到的話嗎？"
10032070-57 = "……雖然這是我完全沒想像到的部分。"
10032070-58 = "……呵，呵呵……！當，當然囉！"
10032070-59 = "趁這個機會好好記住吧，我們便利屋68……"
10032070-70 = "閒，閒聊還是等等再說！總之先突破這裡逃出去吧！！"
10032070-71 = "老師！！指揮就麻煩你了！！"
10032070-72 = "[s3]「那當然！」\n[s4]「拜託大家了。」"
10032070-77 = "為了不拖大家的後腿，我會全力以赴。"
10032070-86 = "去死吧去死吧去死吧去死吧去死吧──！！"
10032070-93 = "死吧──────！！"

[translation]
10032070-1 = "Episode 7;An Absurd Conclusion"
10032070-10 = "Phew! There's really no end to these rats. They just keep crawling out of the sewers!"
10032070-11 = "What did you expect? We've captured the head of an entire alliance of gangs. They're not gonna just let us walk away with him."
10032070-12 = "Speaking of, how's Arancino? Did he wake up yet?"
10032070-13 = "Let's see..."
10032070-14 = "Nope! Sleeping like a little baby!"
10032070-15 = "He's going to be in la la land for a good while. I saw a grenade knock him out earlier!"
10032070-16 = "*sigh*...What are the chances?"
10032070-17 = "Why don't we just hand over the extra baggage? That's what they're gunning for, right?"
10032070-18 = "No. Bad idea."
10032070-19 = "They would've steamrolled us ages ago if we didn't have Don Arancino on our side."
10032070-20 = "Right now, they're scared of hurting him. But if we hand him over... They're gonna bring out the big guns, and it's good night for us."
10032070-21 = "We get out with him or not at all. What to do with him comes afterwards."
10032070-22 = "O-One moment, please."
10032070-24 = "This situation is just getting more and more confusing."
10032070-25 = "Why did you switch from attacking me to helping me?"
10032070-26 = "Did we not have conflicting goals?"
10032070-28 = "We did. But things changed and now they align."
10032070-29 = "And that's all that really matters!"
10032070-31 = "I-Is that so? I'm still a bit lost, but—"
10032070-32 = "This isn't time for exchanging pleasantries! They're coming!"
10032070-33 = "...!!"
10032070-34 = "AHHHHHH!!!"
10032070-45 = "..."
10032070-46 = "It's not my first time seeing it, but she's impressively reckless."
10032070-47 = "Problem Solver 68... So, this is how the best of the best operates."
10032070-48 = "H-Haruka! You need to pull back! Stay behind the front line!"
10032070-49 = "I understand now. They're very reliable allies."
10032070-55 = "...Did you hear that, Aru? She called us \"the best of the best\"!"
10032070-56 = "Congrats, Boss. You've always wanted to hear those words..."
10032070-57 = "...Even if it was from a super unexpected source."
10032070-58 = "Hee...Heeheehee! Well, that's a given!"
10032070-59 = "Feast your eyes! We are Problem Solver—"
10032070-70 = "My acceptance speech will have to come after we break out of here!"
10032070-71 = "Sensei!! Lead the way!"
10032070-72 = "[s3] \"I'm here!\"\n[s4] \"Let's do this.\""
10032070-77 = "I'll do my utmost to not hold you back."
10032070-86 = "Pleasediepleasediepleasediepleasedie!!!"
10032070-93 = "DIEEE!"

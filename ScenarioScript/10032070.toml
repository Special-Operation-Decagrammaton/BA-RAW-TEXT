[translation]
10032070-1 = "ตอนที่ 7;ตอนจบที่ไม่น่าเชื่อ"
10032070-10 = "มีกันเยอะกว่าที่คิดนะเนี่ย แห่กันเข้ามาไม่หยุดเลย"
10032070-11 = "ก็นี่ไม่ใช่กลุ่มอันธพาล แต่เป็น 'สหพันธ์อันธพาล' นี่นา แล้วดอน อารันซิโนก็เป็นหัวหน้าสหพันธ์ด้วย"
10032070-12 = "อารันซิโนฟื้นรึยัง...? "
10032070-13 = "อืม~"
10032070-14 = "ยังเลย...! สลบเหมือดไปแล้วเลยแฮะ?"
10032070-15 = "สงสัยจะโดนลูกหลงระหว่างยิงปืนโจมตีเมื่อกี้เข้าไปน่ะ กว่าจะฟื้นก็คงหลายชั่วโมงเลย!"
10032070-16 = "เฮ้อ... ทำไมต้องมาสลบตอนนี้ด้วยนะ..."
10032070-17 = "เอาตัวไปส่งให้คนพวกนั้นทั้งแบบนี้เลยไม่ได้เหรอ? ทางนั้นแค่ต้องการตัวเขานี่นา ไม่ได้บอกสักหน่อย#nว่าต้องการในสภาพไหน"
10032070-18 = "ไม่หรอก ต้องทำตรงกันข้ามต่างหาก"
10032070-19 = "ตอนนี้ที่เรายังไม่ถูกโจมตีแบบหนักหน่วง เพราะดอน อารันซิโนอยู่กับเรา"
10032070-20 = "เราก็เลยสามารถใช้ดอน อารันซิโนเพื่อป้องกันไม่ให้เราเองถูกโจมตีจากอาวุธทรงพลังได้ เราจะได้ไม่เสียเปรียบยังไงล่ะ"
10032070-21 = "สิ่งที่พวกเราต้องทำตอนนี้ก็คือต้องพาเขาหนีไปยังที่ที่ปลอดภัย ส่วนถ้าจะส่งมอบตัวหรือทิ้งไว้ ก็เอาไว้ทีหลัง"
10032070-22 = "ดะ... เดี๋ยว เดี๋ยวก่อน..."
10032070-24 = "อะไรน่ะ ฉันไม่เข้าใจสถานการณ์ตอนนี้เลย"
10032070-25 = "ทำไมพวกเธอถึงมาช่วยฉันล่ะ? เมื่อกี้ยังไล่ตามและโจมตีฉันอยู่เลยไม่ใช่เหรอ?"
10032070-26 = "ฉันคิดว่าภารกิจที่เราทำจะทำให้เราไม่เป็นมิตรกันเสียอีก"
10032070-28 = "ที่พูดมาก็ไม่ผิดหรอก แค่ตอนนี้สถานการณ์มันเปลี่ยนไปน่ะ"
10032070-29 = "จะว่าอย่างนั้นก็ได้ แต่พวกฉันเลือกที่จะว่าอย่างนี้"
10032070-31 = "หืม...? อะ... เอางั้นเหรอ... ไม่เห็นจะเข้าใจเลย..."
10032070-32 = "ตั้งสติไว้ให้ดี! พวกนั้นมากันอีกแล้ว!!"
10032070-33 = "......!!"
10032070-34 = "ย้ากกกกก!!!"
10032070-45 = "......"
10032070-46 = "ถึงจะเคยเห็นฝีมือมาก่อนแล้วก็เถอะ... แต่เป็นพวกที่มุละทุจริงๆ เลยนะ"
10032070-47 = "นี่สินะหน่วยรับจ้างสารพัด 68... หนึ่งในแนวหน้าของวงการนี้"
10032070-48 = "ฮะ... ฮารุกะ! อย่าออกไปข้างหน้าคนเดียวมากไปสิ! เราต้องรักษาแนวโจมตีนะ...!"
10032070-49 = "ถือว่าเป็นพันธมิตรที่แข็งแกร่งเลยนะ"
10032070-55 = "อารุจัง... เมื่อกี้ได้ยินรึเปล่า? ทางนั้นบอกว่าเราเป็น 'แนวหน้าของวงการ' ด้วย!"
10032070-56 = "ดีจังเลยนะประธาน อยากฟังคำนี้มานานแล้วไม่ใช่เหรอ?"
10032070-57 = "ถึงจะคิดไม่ถึงก็เถอะว่าจะชมกันแบบนี้"
10032070-58 = "ฮุฮุ ฮุฮุ...! นะ... แน่นอนอยู่แล้ว!"
10032070-59 = "ใช้โอกาสนี้จดจำพวกเราหน่วยรับจ้างสารพัด 68 ไว้ให้ดีล่ะ!"
10032070-70 = "เอาละ อย่ามัวแต่คุยอยู่เลย! ก่อนอื่นเราต้องออกไปจากที่นี่ให้ได้!!"
10032070-71 = "คุณครู!! ช่วยสั่งการด้วยนะ!!"
10032070-72 = "[s3] \"ได้อยู่แล้ว\"\n[s4] \"ฝากด้วยนะทุกคน\""
10032070-77 = "ฉันก็จะพยายามเต็มที่ไม่ให้เป็นภาระใคร"
10032070-86 = "ตายซะเถอะค่ะ ตายซะเถอะค่ะ ตายซะเถอะค่ะ ตายซะเถอะค่ะ ตายซะเถอะค่ะ!!"
10032070-93 = "ตายซ้าาาาาาาา!!"

[translation]
1300402-1 = "A Coincidental Meeting"
1300402-2 = "Abydos Border, Suburban Town"
1300402-3 = "(I was nearly ready to return to Schale after finishing my business, when...)"
1300402-5 = "*shuffle*"
1300402-7 = "Hap!"
1300402-8 = "*surprised*"
1300402-9 = "Ahaha! Ta-da! Did I get'cha? ☆"
1300402-10 = "[s] \"Hi, Nonomi.\""
1300402-11 = "Hi, Sensei! I spotted you from the street and got so excited that I ran over to see you."
1300402-12 = "Hmm? What am I doing here? Oh, there was something I had to buy."
1300402-13 = "Remember? A lot of the shops in Abydos are closed now..."
1300402-14 = "So buying necessities means traveling a little further away."
1300402-15 = "Not that I mind. It's worth it if it means more chance meetings like this. ☆"
1300402-16 = "Uh-huh! Talk about a pleasant surprise."
1300402-17 = "Wanna go out for parfaits together? I know a famous shop nearby. ☆"
1300402-18 = "[s] \"I kind of have other plans...\""
1300402-19 = "Got'cha! ☆"
1300402-20 = "Weren't you on your way back, Sensei?"
1300402-21 = "How do I know that? That's a secret... ♥"
1300402-22 = "Then, let's go!"
1300402-24 = "(Nonomi and I went to a nearby parfait cafe.)"
1300402-25 = "(We each stuffed ourselves on an extra large parfait.)"
1300402-26 = "(Nonomi was ready to pay, but I told her it was on me.)"

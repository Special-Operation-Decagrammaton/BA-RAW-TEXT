[translation]
1300402-1 = "การพบกันโดยบังเอิญ"
1300402-2 = "ที่เขตเมืองด้านนอกอะบิดอส"
1300402-3 = "(คุณครูทำธุระข้างนอกเสร็จ และกำลังจะเดินทางกลับชาเล่ต์...)"
1300402-5 = "(แอบมอง)"
1300402-7 = "อ๊ะ!"
1300402-8 = "(ตกใจ)"
1300402-9 = "ฮ่าฮ่าฮ่า~☆ ตกใจใช่ไหมคะ?"
1300402-10 = "[s] \"ว่าไง โนโนมิ\""
1300402-11 = "ฉันเดินๆ อยู่แล้วบังเอิญเห็นคุณครู ก็เลยดีใจมากจนวิ่งมาหาคุณครูนี่ละค่ะ"
1300402-12 = "หืม? ฉันมาทำอะไรที่นี่น่ะเหรอคะ? อ๋อ พอดีมีของที่ต้องซื้อนิดหน่อยค่ะ"
1300402-13 = "อย่างที่รู้ค่ะ ร้านค้าที่อะบิดอสพากันปิดกันไปเยอะเลย...."
1300402-14 = "เวลาที่จะซื้อของใช้ที่จำเป็นเลยต้องมาไกลแบบนี้ค่ะ"
1300402-15 = "แต่ไม่เป็นไรหรอกค่ะ เพราะมันทำให้ฉันได้บังเอิญเจอคุณครูแบบนี้ยังไงล่ะคะ☆"
1300402-16 = "อื้ม! โชคดีจังเลยนะที่ได้เจอ!"
1300402-17 = "ถ้างั้นคุณครูไปกินไอศกรีมพาร์เฟต์กับฉันไหมคะ? ที่ใกล้ๆ นี้มีร้านชื่อดังอยู่ด้วยนะคะ☆"
1300402-18 = "[s] \"แต่ว่า... ครูมีนัดอื่น...\""
1300402-19 = "ได้ตัวแล้ว~☆"
1300402-20 = "ฉันรู้ว่าคุณครูกำลังจะกลับค่ะ"
1300402-21 = "ฉันรู้ได้ยังไงน่ะเหรอคะ? อืมม... ความลับค่ะ♡ ไม่บอกหรอก"
1300402-22 = "ถ้างั้นไปกันเลยค่า~"
1300402-24 = "(คุณครูกับโนโนมิไปในร้านไอศกรีมพาร์เฟต์ที่อยู่ใกล้ๆ)"
1300402-25 = "(ทั้งคู่สั่งไอศกรีมพาร์เฟต์ที่สูงหนึ่งเมตรมากินจนอิ่ม)"
1300402-26 = "(คุณครูห้ามโนโนมิไม่ให้จ่ายเงินและใช้บัตรประจำตัวผู้ใหญ่จ่ายค่าไอศกรีมให้แทน)"

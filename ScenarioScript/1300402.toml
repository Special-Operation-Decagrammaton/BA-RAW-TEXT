[translation]
1300402-1 = "偶然的相遇呢"
1300402-2 = "阿拜多斯郊外．市內外圍"
1300402-3 = "（在外面完成待辦事項後，正想回到夏萊的時候……）"
1300402-5 = "（咻）"
1300402-7 = "哇──！"
1300402-8 = "（大吃一驚）"
1300402-9 = "啊哈哈～☆鏘──，嚇到了嗎？"
1300402-10 = "[s] 「呀啊，野乃美。」"
1300402-11 = "走到一半發現老師，就開心地跑來了。"
1300402-12 = "嗯？你問我為什麼，會在這裡？啊。有些想買的東西。"
1300402-13 = "就如老師知道的，阿拜多斯很多店舖都關門了……"
1300402-14 = "為了買生活必需品不得不跑到很遠的地方。"
1300402-15 = "不過沒關係。也會像這樣發生偶然的相遇呀☆"
1300402-16 = "嗯嗯！真是令人開心的偶然！"
1300402-17 = "那麼和我一起去吃聖代嗎？我對這附近很了解，有一家有名的店☆"
1300402-18 = "[s] 「但是還有其他事……」"
1300402-19 = "抓到了～☆"
1300402-20 = "真是的老師，我知道老師正在回去的路上唷。 "
1300402-21 = "嗯？為什麼，會知道嗎？那是秘．密♡"
1300402-22 = "那麼，馬上出發～"
1300402-24 = "（被野乃美抓住，走進了附近的聖代專賣店）"
1300402-25 = "（各自點了一份一公尺的聖代吃到胃袋滿滿的為止）"
1300402-26 = "（攔下打算結帳的野乃美，並用大人的卡片請客了）"

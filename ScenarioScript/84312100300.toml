[translation]
84312100300-6 = "Oh, Miss Guest Student! Here, over here!"
84312100300-7 = "Did you enjoy the Expo? Today is the last day... What did you think?"
84312100300-9 = "It was fun. It was very fun. I don't even have the words for how much fun it was."
84312100300-10 = "Th-That's great... I mean, good for us..."
84312100300-11 = "Come to think of it, uh...can I ask one thing...?"
84312100300-12 = "We don't know the details, but we heard you and our leader did a lot throughout the Expo period. Did you clean up the surrounding area too, by any chance?"
84312100300-16 = "...Huh? Clean up?"
84312100300-18 = "Yeah! We were supposed to clean this area, but someone already went ahead and cleaned it for us. Very neatly!"
84312100300-20 = "It was left alone until yesterday around dinnertime... So I thought it must have happened last night."
84312100300-21 = "The first people I thought of were our leader and you."
84312100300-22 = "I understand. That's what you meant."
84312100300-23 = "But I wasn't here last night. Maybe it was just Neru on her own..."
84312100300-24 = "Ah, no, no. That's not possible. Neru doesn't clean up on her own."
84312100300-26 = "Even when we're all doing it together, she's the one who complains the most."
84312100300-27 = "I see. Then who...?"
84312100300-31 = "(Rio...)"
84312100300-32 = "(Ah. So this is why Rio was so sure.)"
84312100300-33 = "(...I shouldn't be surprised.)"
84312100300-35 = "Ahh. Anyway, the work's all done. Shall we go enjoy ourselves?"
84312100300-36 = "What are you talking about, Asuna? We have a mountain of work to do."
84312100300-37 = "Even now, we have to say farewell to the Trinity students..."
84312100300-38 = "Uhh, that's no fun at all."
84312100300-39 = "I mean, that IS work... We don't do it for fun."
84312100300-45 = "(It seems like they're talking amongst themselves now. I'll just bow out of this conversation.)"

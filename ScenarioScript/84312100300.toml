[translation]
84312100300-6 = "โอ้! ทางนี้ ทางนี้! แขกคนสำคัญ!!"
84312100300-7 = "เที่ยวชมงานสนุกมั้ย? วันนี้เป็นวันสุดท้ายแล้ว... จะเป็นยังไงบ้างก็ไม่รู้นะ"
84312100300-9 = "ฉันสนุกค่ะ สนุกมากๆ จนไม่รู้ว่าต้องบอกเป็นคำพูดยังไงเลยค่ะ"
84312100300-10 = "ขะ... ขนาดนั้นเลยเหรอ...? ได้ฟังแบบนั้นก็โล่งใจนะ..."
84312100300-11 = "จะว่าไป เอ่อ... ฉันขอถามอะไรอย่างหนึ่งได้มั้ย...?"
84312100300-12 = "พวกเราก็ไม่รู้รายละเอียดมากนัก แต่ได้ยินมาว่าเธอไปทำงานกับหัวหน้าของเราตลอดงานเอ็กซ์โปน่ะ ไปทำความสะอาดบริเวณนี้ด้วยกันมาเหรอ?"
84312100300-16 = "คะ...? ทำความสะอาดเหรอคะ?"
84312100300-18 = "อื้อ! เดิมทีพวกเราต้องเป็นฝ่ายทำความสะอาดตรงนี้น่ะ แต่เหมือนว่ามีใครทำไว้จนเกลี้ยงเกลาเลย!"
84312100300-20 = "เมื่อวานตอนเย็นยังอยู่ในสภาพเดิมอยู่เลย... งั้นก็แสดงว่ามีการทำความสะอาดขึ้นเมื่อคืนนี้แน่นอน"
84312100300-21 = "คนแรกที่ฉันนึกถึงคือหัวหน้าน่ะ"
84312100300-22 = "ฉันเข้าใจแล้วค่ะ เป็นอย่างนี้เองสินะคะ"
84312100300-23 = "แต่เมื่อวานตอนเย็น ฉันไม่ได้ออกมาที่นี่หรอกค่ะ ถ้าบอกว่าเนรุมาทำคนเดียว ก็น่าจะเป็นไปได้ค่ะ..."
84312100300-24 = "อ่า ไม่ๆ ไม่หรอก ไม่มีทาง รุ่นพี่ไม่มาทำความสะอาดอยู่คนเดียวหรอก"
84312100300-26 = "ขนาดตอนทำด้วยกันหลายๆ คน หัวหน้ายังบ่นเยอะที่สุดเลย!"
84312100300-27 = "แบบนั้นสินะคะ ถ้างั้นใครกันนะ..."
84312100300-31 = "(ริโอะ...)"
84312100300-32 = "(แบบนี้สินะ... ที่บอกว่า 'ไปตรวจสอบ' ในตอนนั้น... คือแบบนี้สินะ)"
84312100300-33 = "(สมกับเป็นคุณจริงๆ เลย...)"
84312100300-35 = "เอาน่า ไหนๆ งานก็เสร็จแล้ว งั้นเราก็ไปหาอะไรสนุกๆ ทำกันมั้ย?"
84312100300-36 = "วันนี้เรามีงานที่ต้องทำเยอะเลยนะ จะชวนไปทำอะไรอีกล่ะ รุ่นพี่?"
84312100300-37 = "แล้วตอนนี้เราต้องไปส่งนักเรียนจากทรีนิตี้ด้วย..."
84312100300-38 = "เฮ้อ แต่อันนั้นมันไม่เห็นจะน่าสนุกเลย"
84312100300-39 = "ก็มันเป็นงานนี่นา... เราไม่ได้ทำเพื่อความสนุกสักหน่อย"
84312100300-45 = "(การพูดคุยจากนี้เริ่มจะซับซ้อนขึ้นแล้ว งั้นคงต้องหนีไปอย่างเนียนๆ แล้วละ)"

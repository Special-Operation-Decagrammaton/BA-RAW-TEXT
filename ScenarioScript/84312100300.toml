[translation]
84312100300-6 = "哦～！這邊這邊！客人！！"
84312100300-7 = "逛得還開心嗎？#n今天就是最後一天了……不知道你的感想如何。"
84312100300-9 = "我很開心。真的很開心。#n甚至不知道該怎麼表達才好。"
84312100300-10 = "有，有到這種程度嗎……？#n雖然站在我們的立場，那也是好事一樁……"
84312100300-11 = "話說……我可以請教你一件事嗎……？"
84312100300-12 = "雖然不太清楚詳細情況，但我聽說你在博覽會期間，和隊長一起做了很多事。#n你們也一起打掃了這附近嗎？"
84312100300-16 = "……嗯？打掃？"
84312100300-18 = "嗯！我們本來要打掃這裡，結果卻發現已經被人打掃乾淨了！"
84312100300-20 = "因為直到昨天傍晚都還是原本的樣子……我認為應該是在晚上發生的事。"
84312100300-21 = "於是我最先想到的就是隊長和你。"
84312100300-22 = "我明白了，原來是這麼回事啊。"
84312100300-23 = "不過我昨天晚上並沒有外出。#n可能是寧瑠他……"
84312100300-24 = "不不不，那實在不可能。#n前輩他是不可能一個人打掃的。"
84312100300-26 = "大家一起打掃的時候，他總是最愛發牢騷了！"
84312100300-27 = "這樣啊。那究竟會是誰呢……"
84312100300-31 = "（……莉央）"
84312100300-32 = "（原來如此……當時他說「確認過了」就是指這件事吧）"
84312100300-33 = "（……還真像你的作風）"
84312100300-35 = "嗯～那既然該做的事都做完了，來去做點有趣的事吧？"
84312100300-36 = "今天要做的事明明還堆積如山，你在說什麼啊前輩。"
84312100300-37 = "光是現在就得去為三一的學生送行了……"
84312100300-38 = "吼唷～那個很無聊耶。"
84312100300-39 = "畢竟是工作嘛……又不是在玩樂。"
84312100300-45 = "（感覺接下來會聊到一些複雜的事，我還是自然而然地消失比較好）"

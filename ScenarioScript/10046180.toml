[translation]
10046180-3 = "唔呵呵。"
10046180-4 = "……還請高抬貴手。"
10046180-5 = "我什麼都還沒說呢。"
10046180-6 = "今天真的不行！算我拜託你了，花子同學！"
10046180-7 = "哎呀……看來是真的沒什麼餘裕呢。"
10046180-8 = "不過不必擔心。#n我今天過來的目的不是添亂……"
10046180-9 = "反而是來幫助一花同學的唷～"
10046180-10 = "…………"
10046180-11 = "…………真可疑。"
10046180-12 = "他肯定有什麼企圖。#n不然浦和花子怎麼可能……"
10046180-13 = "你的想法全寫在臉上囉？"
10046180-14 = "……！"
10046180-15 = "……開玩笑的。"
10046180-16 = "一花同學還是一如既往地擅長撲克臉呢～"
10046180-17 = "所以，你到底有什麼事？"
10046180-18 = "唔嗯～其實我一開始就老實說了……該怎麼做才能讓你相信呢？"
10046180-19 = "我是來幫助一花同學的。#n真的只有這樣而已，沒有其他目的。"
10046180-20 = "當然，這很難讓人信服吧。#n畢竟只有我一個人也幫不上什麼忙。"
10046180-21 = "呵呵。幸好我有令人驕傲的夥伴們♥"
10046180-22 = "所以意思是……來幫我的不只花子同學一個人嗎？"
10046180-23 = "這個嘛～是．祕．密。"
10046180-24 = "總之，我什麼都沒隱瞞唷。#n可以說是赤裸裸地坦誠以對……"
10046180-25 = "……唔嗯～"
10046180-26 = "哈啊……那就麻煩你了！"
10046180-27 = "哎呀～這麼輕易就接受真的好嗎？"
10046180-28 = "為什麼是花子同學自己問這種問題……？"
10046180-29 = "老實說我不知道你在想什麼，但眼下我確實需要幫忙。"
10046180-30 = "所以，這種時候就該坦率地接受幫助。"
10046180-31 = "呵呵，彼此坦誠相對的感覺真不錯呢～"
10046180-32 = "別說那種會讓別人誤會的話啦！"
10046180-33 = "呵呵，我只是說出事實而已。#n那麼接下來……"
10046180-38 = "就來場火熱的身體對話吧♡"

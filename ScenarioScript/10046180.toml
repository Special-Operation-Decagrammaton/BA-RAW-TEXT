[translation]
10046180-3 = "ฮุฮุ"
10046180-4 = "ช่วยเมตตาฉันด้วยเถอะค่ะ..."
10046180-5 = "คือว่า... ฉันยังไม่ได้พูดอะไรเลยนะคะ"
10046180-6 = "วันนี้ไม่ได้จริงๆ ค่ะ! ฉันขอร้องละค่ะ คุณฮานาโกะ!"
10046180-7 = "ตายจริง... ดูจะงานยุ่งจนหัวหมุนจริงๆ ด้วยนะคะ"
10046180-8 = "แต่ไม่ต้องห่วงหรอกนะคะ วันนี้ฉันไม่ได้จะมาขัดจังหวะ แต่ตรงกันข้ามมากกว่าค่ะ"
10046180-9 = "ค่ะ ฉันมาช่วยงานคุณอิจิกะค่ะ~"
10046180-10 = "......"
10046180-11 = "ทำตัวน่าสงสัยจัง..."
10046180-12 = "ต้องมีแผนการไม่ชอบมาพากลในหัวแน่ๆ... ไม่อย่างนั้นอุราวะ ฮานาโกะคนนี้ก็คงไม่..."
10046180-13 = "กำลังคิดแบบนี้อยู่สินะคะ ฉันดูออกค่ะ"
10046180-14 = "...!"
10046180-15 = "ล้อเล่นค่ะ..."
10046180-16 = "คุณอิจิกะเนี่ย เก่งเรื่องการทำโป๊กเกอร์เฟซจังเลยนะคะ~"
10046180-17 = "ตกลงว่ามีธุระอะไรกับฉันคะ?"
10046180-18 = "อืม~ ฉันก็บอกไปตามตรงแล้วตั้งแต่แรกนะคะ ต้องทำยังไงถึงจะเชื่อเหรอคะ?"
10046180-19 = "ฉันแค่มาช่วยงานคุณอิจิกะ ไม่ได้คิดจะทำอะไรมากกว่านั้นเลยค่ะ"
10046180-20 = "แน่นอนว่ามันคงเชื่อกันไม่ได้ง่ายๆ สินะคะ แต่นี่ไม่ใช่สิ่งที่ฉันคิดได้เองคนเดียวหรอกค่ะ"
10046180-21 = "ฮุฮุ ดีใจจังเลยนะคะที่มีเพื่อนดีๆ อยู่เคียงข้าง♥"
10046180-22 = "หมายความว่า... ไม่ได้มีแค่คุณฮานาโกะคนเดียวที่มาช่วยฉันเหรอคะ?"
10046180-23 = "ก็ไม่รู้สิคะ~ เรื่องนั้นเป็น ความ ลับ ค่ะ"
10046180-24 = "เอาเถอะค่ะ เห็นอย่างนี้ฉันก็ไม่ได้ซ่อนอะไรไว้เลยค่ะ ถ้าจะพูดให้เห็นภาพ ก็ต้องบอกว่าเหมือนร่างกายเปลือยเปล่าที่ไม่มีเสื้อผ้าสักชิ้น..."
10046180-25 = "อืมมมม~..."
10046180-26 = "เฮ้อ... ยังไงก็รบกวนด้วยนะคะ!"
10046180-27 = "ตายจริง~ ยอมให้มาช่วยงานง่ายๆ แบบนี้ก็ได้เหรอคะ?"
10046180-28 = "คุณฮานาโกะอยากมาช่วย แต่จะถามกลับอย่างนั้นเหรอคะ...?"
10046180-29 = "บอกตามตรงว่าฉันก็ไม่รู้ว่าคุณฮานาโกะคิดอะไรอยู่ แต่ตอนนี้ฉันก็กำลังอยากได้ความช่วยเหลืออยู่พอดีค่ะ"
10046180-30 = "เพราะงั้นฉันก็เลยควรรับความช่วยเหลือเอาไว้แต่โดยดีค่ะ"
10046180-31 = "ฮุฮุ รู้สึกดีจังเลยค่ะที่เราได้คุยกันอย่างเปิดอกแบบนี้~"
10046180-32 = "ปะ... เปิดอกอะไรกันคะ ถ้าใครมาได้ยินจะเข้าใจผิดเอานะคะ!"
10046180-33 = "ฮุฮุ ก็มันจริงนี่คะ งั้นเราก็..."
10046180-38 = "ไปเปิดใจคุยในเรื่องที่ร้อนแรงกว่านี้กันมั้ยคะ?"

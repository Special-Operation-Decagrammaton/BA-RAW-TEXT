[translation]
10028045-3 = "哈啊，哈啊……哈啊……哈啊……"
10028045-5 = "呼……呼……呼……"
10028045-6 = "……贏了……"
10028045-8 = "唔唔，真是的……怎麼才一進來就遇到這種事啊！？"
10028045-9 = "你們到底在搞什麼！？為什麼列車裡會有加農砲！？"
10028045-10 = "[s1]「謝謝你，伊織。多虧你才撿回一命。」\n[s2]「不愧是伊織！我就知道能相信你！！」"
10028045-13 = "吵死了！！老師也一樣！#n你必須把事情全部交代清楚，跟我一起去風紀委員會吧！！"
10028045-14 = "……嗯？"
10028045-15 = "……什麼？"
10028045-16 = "你說現在有其他事要忙，之後再去……？"
10028045-17 = "你在胡說什麼啊！？#n怎麼可能會有比這更重要的事！！"
10028045-18 = "還有，佳澄！！！"
10028045-19 = "……嗯？啊～你叫我嗎？"
10028045-20 = "咦？我才撇開視線一下而已……怎麼了？難道我陷入危機了嗎？"
10028045-21 = "說什麼危機不危機的，你已經是甕中之鱉了！#n既然碰上我們，你以為還逃得掉嗎！？乖乖束手就擒，跟我一起回風紀委員會吧！"
10028045-22 = "不只是你，這裡的所有不良學生通通都要帶走！！"
10028045-23 = "另外，我會把你關進風紀委員會的特別管理監獄！！"
10028045-24 = "嗯？不由分說就要把我帶走……我今天做了什麼嗎？"
10028045-25 = "還是我平常做錯了什麼……？"
10028045-26 = "……啊？"
10028045-30 = "你在跟我開玩笑嗎？"
10028045-31 = "……哈哈，怎麼會呢！"
10028045-32 = "比起那個，你說特別管理監獄……？是指在風紀委員會地下的那個嗎？"
10028045-33 = "嗯……今天……我想想……"
10028045-38 = "今天負責值班的人……是陽奈委員長嗎？"
10028045-39 = "嗯……？今天好像是委員長值班沒錯……"
10028045-40 = "嗯嗯嗯……！！嗯嗯嗯～！！！"
10028045-41 = "那個……就是……伊織同學？"
10028045-42 = "就算是我這種心胸寬大又毫無偏見的人，也是會有一兩個不想面對的對象……"
10028045-43 = "總而言之就是陽奈委員長……和我有點……呃……合不來……"
10028045-44 = "他的話……果然……有點……"
10028045-45 = "不能靠對話解決嗎？好好相處不是很好嗎？"
10028045-46 = "其他的都好說，只要陽奈委員長不在就行了。#n或者改選伊織值班的那天……"
10028045-47 = "……啊！？這是什麼意思！？有哪裡不一樣嗎！？"
10028045-50 = "嗯……這好像是今天第一次看到那個人慌張的樣子。"
10028045-51 = "看來格黑娜風紀委員長和傳聞中的一樣……"
10028045-52 = "[s3]「不，陽奈不是那種孩子……」\n[s4]「完全是他自作自受……」"
10028045-56 = "唔唔……"
10028045-57 = "……哎呀。現在不是兩位一派輕鬆看熱鬧的時候吧？"
10028045-58 = "要是連你們也一起被帶走……真的沒關係嗎？"
10028045-59 = "那可就無法在「今天之內」回到三一囉……？"
10028045-61 = "……咦？"
10028045-62 = "不，都說了我們和你一點關係都沒有……"
10028045-64 = "當然有關係！！你以為在這種情況下，能若無其事地下車回家嗎！？"
10028045-65 = "就算不把你們帶走也得接受調查！在那之前哪都不能去！！"
10028045-66 = "哈哈，果然沒有辜負我的期待！我就知道伊織會這麼說！"
10028045-70 = "不過……我的老實人伊織。"
10028045-71 = "你剛才的發言是認真的嗎……？"
10028045-72 = "雖然你現在否認也已經為時已晚就是了……"
10028045-73 = "……嗯？"
10028045-74 = "又想說什麼奇怪的話……"
10028045-75 = "哎呀～才不是什麼奇怪的話。你啊……"
10028045-76 = "好好看看周圍吧。"
10028045-77 = "因為剛才和加農砲的戰鬥，風紀委員會已經筋疲力盡了……"
10028045-78 = "在這種情況下……你剛才是說什麼來著？"
10028045-79 = "……「這裡的所有不良學生通通都要帶走」……？"
10028045-80 = "那又怎樣……"
10028045-81 = "[s] 「…………」"
10028045-82 = "……啊。"
10028045-83 = "[s5]「現在想想，這裡的乘客……」\n[s6]「……這不是刺激到所有人了嗎？」"
10028045-87 = "哈～哈哈哈！！"
10028045-88 = "伊織～我可愛的伊織醬～"
10028045-89 = "你知道嗎？現在這輛列車上的「乘客」們～"
10028045-90 = "絕大部分……"
10028045-91 = "……可都是你剛才說的「不良學生」哦？"
10028045-93 = "……嗯？"
10028045-106 = "什麼，連我們也要抓走嗎？憑什麼！？"
10028045-107 = "你好像還搞不清楚狀況啊？現在是誰抓誰還不好說哦！？"
10028045-108 = "話說那個風紀委員會的雙馬尾，我早就看他不順眼了！！"
10028045-110 = "這樣正好。趁這個機會給他一點顏色瞧瞧！！所有人拿起武器！！"
10028045-111 = "嗯？打架嗎？我們也要參一腳！！"
10028045-112 = "教訓風紀委員會的機會可不常有！！噗哈哈！！"
10028045-114 = "……啊。"
10028045-115 = "……氣氛好像……"
10028045-117 = "……很好。"
10028045-118 = "這樣一來……情勢就處理得差不多了。"
10028045-119 = "戰力的話……我們跟風紀委員會應該五五波吧？"
10028045-120 = "開，開什麼玩笑！？居然說其他人都站你們那邊！！少胡說八道了！"
10028045-121 = "就算老師是滿腦子奇怪思想的變態……#n面對現在這個情況，你覺得他有可能會站在你那邊嗎！？"
10028045-122 = "不管怎麼看都會站在我這邊吧！#n我們是警察，而你是惡名昭彰的懸賞通緝犯！是罪犯！！"
10028045-123 = "肯定是站在正義的一方吧！！"
10028045-124 = "對吧，老師！？我說的沒錯吧？你會指揮我們這邊吧！？"
10028045-126 = "剛剛不是才說要把老師抓去風紀委員會嗎……"
10028045-127 = "哼嗯～？"
10028045-128 = "這樣啊。#n也對，會那麼想也不無道理……"
10028045-132 = "不過伊織，有句話說得好……"
10028045-133 = "不按牌理出牌的人生──"
10028045-142 = "──才有樂趣可言。"
10028045-143 = "[s9]「公文包怎麼會在這裡！？」\n[s10]「那個難道是……！！」"
10028045-146 = "為，為什麼會在那裡……！？"
10028045-147 = "哈～哈哈哈！！就～是這麼回事！"
10028045-148 = "我不是說過了嗎？#n車廂只剩下三節，而在前面的就是行李車廂！！"
10028045-149 = "雖然對你們有點過意不去，但我可不是笨蛋哦？#n我早就料到之後肯定會變成這樣了。以為我會坐以待斃嗎？"
10028045-150 = "所以就趁大家和加農砲快樂玩耍的時候去了一趟行李車廂～"
10028045-151 = "結果就這～麼巧，看到了一個印有三一校徽的公文包啊！#n哈～哈哈哈！"
10028045-152 = "怎，怎麼會！？怎麼會在你手上……！！"
10028045-153 = "剛才說的「約定和信用」呢！？難道只是欺騙我們嗎？"
10028045-154 = "……嗯？你在說什麼？"
10028045-155 = "我的「約定和信用」有什麼問題嗎……？"
10028045-156 = "我當時是怎麼說的來著……是我會幫忙找公文包對吧？#n現在不就找到公文包了嗎？而且還打算把它還給你。"
10028045-157 = "不管怎麼看，我都沒有做出違背約定的事吧？"
10028045-158 = "我會遵守約定。這點我可以掛保證。"
10028045-159 = "我絕～對會依照約定，把公文包安～全地交到小姑娘手中！#n請儘～管放心！"
10028045-163 = "……不過。"
10028045-164 = "在那之前──"
10028045-165 = "我們的「同伴」關係，你們也必須遵守到底。"
10028045-166 = "所謂的「信賴」本來就是互相的，不是嗎？"
10028045-167 = "請問我說的有錯嗎……？"
10028045-168 = "──可愛的小姑娘？"
10028045-172 = "…………"
10028045-173 = "……呵呵。"
10028045-174 = "果然如我所料變聽話了呢。#n很好，那麼就言歸正傳……"
10028045-175 = "小姑娘現在也沒時間在這裡瞎耗了吧？#n畢竟你還得在今天之內把公文包帶回去。"
10028045-176 = "那麼──"
10028045-177 = "…………"
10028045-183 = "現在該怎麼做，應該不用我多說了吧？"

[translation]
10028045-3 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
10028045-5 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10028045-6 = "...ชนะแล้ว..."
10028045-8 = "อึก จริงๆ เลย... เล่นงานกันทันทีที่เข้ามาเลยเหรอเนี่ย!?"
10028045-9 = "พวกเธอก่อเรื่องอะไรอยู่กันแน่!? แล้วทำไมถึงกับต้องมีปืนใหญ่อยู่บนรถไฟด้วยล่ะ!?"
10028045-10 = "[s1] \"ขอบใจนะอิโอริ พวกเรารอดมาได้เพราะเธอเลย\"\n[s2] \"สมแล้วที่เป็นอิโอริ! ครูเชื่อใจอิโอริที่สุดเลย!\""
10028045-13 = "ไม่ต้องมาพูดเลย!! คุณครูเองก็เหมือนกันนั่นแหละ! คุณครูต้องบอกทุกอย่างที่เกิดขึ้นกับฉัน ไปที่คณะกรรมการวินัยด้วยกันเลยนะ!!"
10028045-14 = "...หืม?"
10028045-15 = "...ว่าไงนะ?"
10028045-16 = "ตอนนี้กำลังทำธุระอื่นอยู่ ไว้ไปทีหลังงั้นเหรอ...?"
10028045-17 = "พูดอะไรเหลวไหล!? มีเรื่องอื่นที่สำคัญกว่าสถานการณ์ตอนนี้อีกรึไง?!"
10028045-18 = "แล้วก็ คาสุมิ!!!"
10028045-19 = "...หืม? อ้อ เรียกฉันเหรอ?"
10028045-20 = "เอ๋? ฉันไปสนใจมองอย่างอื่นแค่แป๊บเดียวเอง... อะไรเนี่ย? ตอนนี้ฉันอยู่ในวิกฤตงั้นเหรอ?"
10028045-21 = "ไม่ว่าจะวิกฤตหรือเปล่า แต่เธอก็หนีไม่รอดอยู่แล้ว คิดว่าเจอพวกฉันแล้วจะออกไปได้ง่ายๆ งั้นเหรอ!?"
10028045-22 = "ยอมให้คุมตัวแล้วไปที่คณะกรรมการวินัยด้วยกันเสียดีๆ! ไม่ใช่แค่เธอด้วยนะ นักเรียนอันธพาลทุกคน#nที่นี่ด้วยเลย!!"
10028045-23 = "แล้วฉันก็จะให้เธออยู่ในห้องขังควบคุมพิเศษของคณะกรรมการวินัยด้วย!!"
10028045-24 = "หืม? จะมาจับตัวเฉยเลย...? วันนี้ฉันทำอะไรผิดเหรอ?"
10028045-25 = "หรือว่าที่ผ่านมาฉันไปทำอะไรผิดไว้ขนาดนั้น...?"
10028045-26 = "...ว่าไงนะ?"
10028045-30 = "ถามเพราะไม่รู้จริงๆ งั้นเหรอ??"
10028045-31 = "...ฮ่าฮ่า ไม่หรอก!"
10028045-32 = "ไม่ๆ ว่าแต่ จะจับฉันเข้าห้องขังควบคุมพิเศษเลยเหรอ...? ที่มันอยู่ตรงชั้นใต้ดินของห้องคณะกรรมการ#nวินัยน่ะนะ?"
10028045-33 = "เดี๋ยวนะ อ่า... ถ้างั้นวันนี้... ไหนดูซิ..."
10028045-38 = "คนที่อยู่เวรของคณะกรรมการวินัยวันนี้คือ... ประธานฮินะ... หรือเปล่านะ?"
10028045-39 = "หืม...? งั้นเหรอ? วันนี้เป็นเวรของประธานเหรอ..."
10028045-40 = "อะ... อืม...!! อื้มมม~!!!"
10028045-41 = "นี่... คือว่า... คุณอิโอริ?"
10028045-42 = "ถึงฉันจะเป็นคนที่ยอมรับทุกสิ่งทุกอย่างได้โดยไม่มีอคติ แต่ฉันก็มีคนที่ไม่อยากเผชิญหน้าด้วยอยู่นะ..."
10028045-43 = "สำหรับฉันแล้ว ประธานฮินะ... ค่อนข้างจะ... เข้ากับฉัน... ไม่ค่อยได้น่ะ เอ่อ..."
10028045-44 = "พอดีว่า... ประธานฮินะ เธอค่อนข้างจะ..."
10028045-45 = "เราเจรจากันแทนไม่ได้เหรอ? ไหนๆ ก็ไหนๆ แล้ว เรามาเคลียร์กันดีๆ ดีกว่าเนอะ"
10028045-46 = "จะให้ฉันทำอะไรก็ได้ ขอแค่ไม่เจอประธานฮินะก็พอ หรือถ้าจะจับตัวฉันไป ก็ขอเป็นวันที่เป็นเวรของ#nอิโอริได้มั้ย..."
10028045-47 = ".....!? พูดอะไรของเธอเนี่ย!? แล้วมันต่างกันตรงไหน!?"
10028045-50 = "อ่า... วันนี้เหมือนเพิ่งได้เห็นคนคนนั้นทำหน้าวุ่นวายใจเป็นครั้งแรกเลยค่ะ"
10028045-51 = "สงสัยประธานกรรมการของเกเฮนน่าจะเป็นคนน่าเกรงขามตามที่ได้ยินมานะคะ..."
10028045-52 = "[s3] \"ไม่หรอก ฮินะไม่ได้เป็นเด็กแบบนั้น...\"\n[s4] \"คนที่เจอเรื่องไม่ดี เป็นเพราะกรรมตามสนองต่างหาก...\""
10028045-56 = "อืมมม..."
10028045-57 = "...เอ๋ แต่นี่ก็ไม่ใช่สถานการณ์ที่ทั้งสองคนจะมัวมาสบายใจเฉิบกันได้อยู่นะ?"
10028045-58 = "พวกเธอก็จะโดนคุมตัวไปด้วยกันนะ ยังจะชิลอยู่ได้อีกเหรอ?"
10028045-59 = "แล้วจะกลับไป 'ภายในวันนี้' ได้งั้นเหรอ? ...กลับไปทรีนิตี้น่ะ"
10028045-61 = "...คะ?"
10028045-62 = "เดี๋ยวก่อนนะ พวกฉันไม่เกี่ยวอะไรกับคุณเลย..."
10028045-64 = "ต้องไปกันให้หมดอยู่แล้ว!! ในสถานการณ์แบบนี้ คิดว่าจะลงรถแล้วกลับบ้านไปดื้อๆ เลยรึไง??"
10028045-65 = "ต่อให้ไม่ถูกขัง แต่ก็ต้องเอาตัวไปสอบสวนสิ! ก่อนหน้านั้นอย่าหวังว่าจะได้ไปไหนเลย!!"
10028045-66 = "ฮ่าฮ่า ไม่ทำให้ผิดหวังเลยนะ! คิดไว้แล้วว่าคุณอิโอริของเราต้องพูดอย่างนี้!"
10028045-70 = "แต่ว่า... คุณอิโอริผู้ซื่อสัตย์ เธอน่ะ"
10028045-71 = "เธอมั่นใจเหรอ? ที่เพิ่งพูดไปเมื่อกี้น่ะ...?"
10028045-72 = "ก็นะ จะถามว่าโอเคหรือเปล่าก็กลัวว่าจะเป็นการถามอะไรซ้ำๆ..."
10028045-73 = "......? หืม?"
10028045-74 = "จะพูดอะไรแปลกๆ ของเธออีก..."
10028045-75 = "โธ่เอ๊ย~ ไม่ได้พูดแปลกๆ สักหน่อย เธอนี่ก็..."
10028045-76 = "ลองมองไปรอบๆ สิ รอบๆ ตัวเธอน่ะ"
10028045-77 = "กองกำลังของคณะกรรมการวินัยรับมือกับปืนใหญ่จนจะซี้แหงแก๋กันหมดแล้ว..."
10028045-78 = "แต่ว่าเมื่อกี้เธอพูดไรออกมานะ? ไม่ใช่แค่ฉันเท่านั้น..."
10028045-79 = "แต่จะ \"จับนักเรียนอันธพาลที่นี่ไปให้หมดเลย\" หรือเปล่านะ...?"
10028045-80 = "เรื่องนั้นมัน..."
10028045-81 = "[s] \"......\""
10028045-82 = "...อ่า"
10028045-83 = "[s5] \"จะว่าไปแล้ว นี่พวกเรา...\"\n[s6] \"...ทำให้ผู้โดยสารที่นี่โกรธหรือเปล่า\""
10028045-87 = "วะฮ่าฮ่าฮ่าฮ่า!!"
10028045-88 = "อิโอริ~? แหมๆ อิโอริจังที่น่ารัก~"
10028045-89 = "รู้อะไรหรือเปล่า? ว่าตอนนี้น่ะ... 'ผู้โดยสาร' บนรถไฟขบวนนี้~"
10028045-90 = "เกือบทั้งหมด..."
10028045-91 = "...คือ 'นักเรียนอันธพาล' ที่เธอพูดถึงไปเมื่อกี้เลย"
10028045-93 = "...หืม?"
10028045-106 = "อะไรกัน จะจับพวกฉันไปด้วยงั้นเหรอ? ใครอนุญาตให้จับกัน!?"
10028045-107 = "สงสัยว่าจะยังอ่านสถานการณ์ไม่ออกนะ ตอนนี้ใครต้องจับใครกันแน่!?"
10028045-108 = "ปกติฉันก็เหม็นหน้ายัยผมสองแกละจากคณะกรรมการวินัยเป็นทุนเดิมอยู่แล้ว!!"
10028045-110 = "งั้นก็ดี ใช้โอกาสนี้ทำให้เห็นเลยว่าใครเป็นใคร!! ทุกคนหยิบปืนขึ้น!!"
10028045-111 = "หืม? อะไรเนี่ย มีการต่อสู้เหรอ? งั้นพวกเราก็ต้องเอาด้วยสิ!!"
10028045-112 = "ทุกคนจะช่วยกันโจมตีคณะกรรมการวินัยงั้นเหรอ โอกาสแบบนี้ไม่ได้มีบ่อยๆ นะ!! วะฮ่าฮ่า!!"
10028045-114 = "อ่า..."
10028045-115 = "บรรยากาศดันกลายเป็นแบบนี้ไปซะได้..."
10028045-117 = "...เอาละๆ"
10028045-118 = "ฉันว่าตอนนี้... เราน่าจะเข้าใจสถานการณ์กันแล้วนะ"
10028045-119 = "ไหนดูกองกำลังทั้งหมดซิ... ถ้านับทุกคนที่อยู่ที่นี่ แล้วก็สมาชิกคณะกรรมการวินัยจากฝั่งอิโอริแล้ว... ก็น่าจะประมาณครึ่งต่อครึ่งเลย...?"
10028045-120 = "ยะ... อย่ามาพูดอะไรไปเรื่อยนะ! คิดว่าฝั่งนั้นจะอยู่กับเธอหมดเลยรึไง!! เลิกเพ้อเจ้อได้แล้ว!"
10028045-121 = "ถึงคุณครูจะเป็นโรคจิตที่มีแต่ความคิดแปลกๆ ในหัว แต่ก็อย่าคิดนะว่าคุณครูจะจับมือกับเธอใน#nสถานการณ์แบบนี้น่ะ! ไม่มีทางเป็นแบบนั้นไปได้หรอก!"
10028045-122 = "ยังไงคุณครูก็ต้องมาอยู่ข้างฉัน! พวกฉันคือตำรวจ ส่วนเธอก็ผู้ต้องหาฉาวโฉ่ที่กำลังโดนตามตัวอยู่! เธอคืออาชญากรนะ!!"
10028045-123 = "คุณครูต้องอยู่กับฝ่ายที่ถูกอยู่แล้ว!!"
10028045-124 = "ใช่มั้ยคุณครู? ฉันพูดถูกใช่มั้ย? คุณครูจะมาช่วยสั่งการทางนี้ใช่มั้ย!?"
10028045-126 = "แต่เมื่อกี้บอกว่าจะคุมตัวพวกเราไปที่คณะกรรมการวินัยของเกเฮนน่าไม่ใช่เหรอคะ..."
10028045-127 = "ฮึ่มม~?"
10028045-128 = "งั้นเหรอ คิดแบบนั้นก็ได้เหรอ?"
10028045-132 = "แต่ว่านะ อิโอริ...!"
10028045-133 = "การที่ทุกอย่างไม่ได้เป็นไปตามเหตุและผลเสมอไป..."
10028045-142 = "...มันคือความสนุกของชีวิตนะ"
10028045-143 = "[s9] \"กะ... กระเป๋านั่น!?\"\n[s10] \"อย่าบอกนะว่า...!\""
10028045-146 = ".....!? ทะ... ทำไมถึงไปอยู่ตรงนั้นได้...!?"
10028045-147 = "วะฮ่าฮ่าฮ่าฮ่า!! มันก็ต้องเป็นอย่างนี้แหละ!"
10028045-148 = "ตอนนั้นฉันบอกไว้ไม่ใช่เหรอว่าเหลืออีกแค่ 3 ตู้? และตู้ข้างหน้าของเราคือตู้สินค้าพอดี!!"
10028045-149 = "ขอโทษด้วยนะ แต่ฉันก็ไม่ใช่คนสมองกลวงนี่เนอะ รู้อยู่แล้วว่ามันต้องออกมาเป็นแบบนี้ แล้วจะให้ฉันนั่งอยู่เฉยๆ ได้ไง?"
10028045-150 = "ระหว่างที่ทุกคนสนุกกับปืนใหญ่แคนนอน ฉันก็รีบวิ่งไปดูตู้สินค้ามาน่ะสิ~"
10028045-151 = "แล้วก็เข้าไปเจอกระเป๋าที่มีสัญลักษณ์ของทรีนิตี้ติดอยู่ด้วยละ วะฮ่าฮ่าฮ่าฮ่าฮ่า!"
10028045-152 = "นะ... นี่มันอะไรกันคะ!? ทำไมกระเป๋าถึงไปอยู่ในมือคุณได้...!!"
10028045-153 = "ไหนว่า 'การรักษาสัญญากับเครดิต' เป็นเรื่องสำคัญยังไงล่ะ!? นี่คุณหลอกพวกเราเหรอคะ?"
10028045-154 = "...หืม? พูดอะไรของเธอ? ฉันจะไปหลอกทำไม"
10028045-155 = "ว่าแต่ มีปัญหาอะไรกับ 'การรักษาสัญญากับเครดิต' ที่ฉันพูดถึงเหรอ...?"
10028045-156 = "ฉันบอกไปว่าไงนะ? บอกว่าจะช่วยหากระเป๋าใช่มั้ย? ก็หาให้แล้วนี่ไง? แล้วก็กำลังจะเอามาให้ด้วย"
10028045-157 = "ตรงไหนบ้างที่บอกว่าฉันทำไม่ตรงตามที่สัญญากันไว้น่ะ?"
10028045-158 = "ฉันเป็นคนรักษาสัญญานะ เรื่องนั้นฉันรับรองได้"
10028045-159 = "กระเป๋าใบนี้~ จะต้องไปอยู่ในมือของคุณหนูอย่างปลอดภัยตามสัญญาแน่นอน! เพราะงั้น~ ไม่มีอะไร#nต้องกังวลเลย!"
10028045-163 = "แต่ว่า..."
10028045-164 = "...ก่อนจะได้กระเป๋าไป"
10028045-165 = "พวกเธอก็ต้องรักษาสัญญาที่บอกว่าเราจะเป็น 'พันธมิตร' กันอย่างถึงที่สุดด้วยสิ"
10028045-166 = "ปกติแล้ว 'ความน่าเชื่อถือ' เป็นสิ่งที่ทั้งสองฝ่ายควรมีให้กันไม่ใช่เหรอ? ใช่มั้ยล่ะ?"
10028045-167 = "หรือว่าฉันพูดผิด? ว่าไงล่ะ..."
10028045-168 = "...คุณหนูที่น่ารัก?"
10028045-172 = "........."
10028045-173 = "...ฮุฮุ"
10028045-174 = "จ๋อยไปเลยสินะ เป็นอย่างที่คิดไว้เลย เอาละ ถ้างั้นก็มาเข้าเรื่องกัน..."
10028045-175 = "เพราะยังไงคุณหนูก็ไม่มีเวลาให้รีรออยู่ใช่มั้ย? ต้องรีบเอากระเป๋ากลับไปทรีนิตี้ภายในวันนี้นี่นา"
10028045-176 = "ถ้างั้น..."
10028045-177 = "........."
10028045-183 = "ก็น่าจะรู้ดีนะว่าจากนี้เราต้องทำยังไง?"

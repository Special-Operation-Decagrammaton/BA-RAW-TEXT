13140-61 = "1;호시노;01;유메 선배가 바라왔던 아비도스의 꿈을 정면으로 부정하는 <열차포>의 존재, 지금 벌어지고 있는<사모 펀드>의 전쟁……."
13140-62 = "1;호시노;13;이건 전부 과거의 <아비도스 학생회>의 잘못으로부터 비롯된 거야. "
13140-63 = "1;호시노;99;만약 유메 선배가 이 열차포에 대해 알게 되었다면…… 선배는 당장 이걸 부수러 가자고 도와달라고 말했을 거야. 그 사람은 그런 사람이니까…….\n#1;m3\n#3;dr"

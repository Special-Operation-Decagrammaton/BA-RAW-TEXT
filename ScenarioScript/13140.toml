[translation]
13140-1 = "ตอนที่ 14;พวกเธอ และพวกเรา"
13140-9 = "..."
13140-10 = "อึก..."
13140-21 = "อึก... อึก..."
13140-27 = "ระ... รุ่นพี่ชิโรโกะ!"
13140-28 = "คิดผิดแล้วละ... ต่อให้เป็นรุ่นพี่ชิโรโกะก็สู้ไม่ได้หรอก ตะ... ต่างชั้นกันขนาดนี้เลยเหรอเนี่ย..."
13140-29 = "รุ่นพี่โฮชิโนะ... เก่งขึ้นกว่าเมื่อก่อนเยอะเลย..."
13140-34 = "แข็งแกร่งอย่างไม่ผิดคาดเลยนะชิโรโกะจัง... แบบนี้เดี๋ยวคงเก่งเกินฉันแล้วละ"
13140-39 = "แฮ่ก... แฮ่ก... "
13140-40 = "ว่าไงล่ะ ชิโรโกะจัง พอใจแล้วหรือยัง? "
13140-41 = "รุ่นพี่โฮชิโนะ..."
13140-42 = "ในตอนที่โลกทั้งใบคือศัตรูของฉัน... คนที่ช่วยฉันไว้ก็คือโนโนมิจัง"
13140-43 = "ถ้าฉันไม่ได้เจอกับโนโนมิจัง ฉันก็คงกลายเป็นอาชญากรที่เสียผู้เสียคนไปแล้ว แล้วก็คงไม่ได้เจอกับ#nชิโรโกะจังด้วย"
13140-44 = "..."
13140-45 = "คณะกรรมการแผนงานเกิดขึ้นได้ก็เพราะฉันได้เจอกับโนโนมิจังและชิโรโกะจัง ฉันก็เลยคิดว่าตัวเอง#nได้รับการช่วยชีวิตไว้"
13140-46 = "เพราะงั้นฉันจะทำให้ช่วงเวลาที่โนโนมิจังมีร่วมกับคณะกรรมการแผนงาน... หายไปไม่ได้"
13140-47 = "ฉันจะไม่ยอมให้โนโนมิจังพูดว่าตัวเองเป็นคนทำเรื่องผิดพลาดลงไป และพูดว่าตัวเองไม่ควรอยู่ที่นี่"
13140-48 = "..."
13140-49 = "ฉันจะไปช่วยโนโนมิจังให้กลับมาอย่างปลอดภัย และโนโนมิจังต้องมีที่ให้กลับมา พวกเธอจึงต้องอยู่กันที่นี่"
13140-50 = "..."
13140-56 = "มันต้องมีวิธีสิ... เรารอคุณครูกันเถอะ..."
13140-57 = "ต้องมีวิธีแน่ๆ..."
13140-58 = "ใช่... ฉันก็คิดว่าถ้าเรามีคุณครูอยู่ด้วย เราก็จะคลี่คลายปัญหาในอนาคตได้"
13140-59 = "แต่ต่อให้เป็นคุณครูก็คงจะเรียกคืนสิ่งที่เกิดขึ้นไปแล้วไม่ได้หรอก... มันก็เหมือนกับการที่เราฟื้นคืนชีพ#nคนตายไม่ได้นั่นละ "
13140-60 = "...?"
13140-61 = "การมีอยู่ของปืนแม่เหล็กไฟฟ้าที่ขัดต่ออะบิดอสในความฝันของรุ่นพี่ยูเมะ และสงครามกับกองทุนที่#nเกิดขึ้นอยู่ในตอนนี้..."
13140-62 = "เรื่องทั้งหมดนี้มันเกิดขึ้นจากความผิดของ <สภานักเรียนอะบิดอส> ในอดีต "
13140-63 = "ถ้ารุ่นพี่ยูเมะรู้เรื่องปืนแม่เหล็กไฟฟ้านี่ละก็... รุ่นพี่คงจะมาขอฉันให้ไปช่วยทำลายมันด้วยกันในตอนนั้น#nเลย รุ่นพี่เป็นคนแบบนั้นน่ะ..."
13140-64 = "แต่ตอนนั้นฉันไม่ได้อยู่ข้างๆ รุ่นพี่ "
13140-65 = "ฉันไม่อาจรู้ได้เลยว่ารุ่นพี่ยูเมะคิดอะไรอยู่ตอนเขียนหนังสือสัญญานี้..."
13140-66 = "บางทีรุ่นพี่... อาจจะหวังให้ปืนแม่เหล็กไฟฟ้าซ่อนอยู่ในทะเลทรายอะบิดอสไปตลอดก็ได้"
13140-67 = "เพราะงั้น... ฉันต้องไปทำในสิ่งที่ตัวเองทำไม่ได้เมื่อ 2 ปีก่อน"
13140-68 = "ปืนแม่เหล็กไฟฟ้านั่นเป็นความมืดมัวของสภานักเรียนอะบิดอส คณะกรรมการแผนงานไม่จำเป็นต้อง#nแบกรับสิ่งนั้นหรอก"
13140-69 = "โนโนมิจังไม่ต้องมารู้สึกผิดกับเรื่องนั้น แล้วชิโรโกะจังก็ไม่ต้องมารับผิดชอบเรื่องนั้นด้วย"
13140-70 = "มันเป็นงานของฉันเอง"
13140-75 = "อย่าไปนะ รุ่นพี่"
13140-76 = "ฉัน... ไม่รู้หรอกว่ายูเมะเป็นคนยังไง"
13140-77 = "นอกจากคณะกรรมการแผนงานแล้ว ฉันก็ไม่มีความทรงจำอะไรอื่นอีกแล้ว... ฉันก็เลยไม่รู้ว่าเกิดเรื่อง#nอะไรขึ้นกับคนคนนั้น "
13140-78 = "ฉันไม่รู้อะไรเลย ทั้งความรู้สึกของรุ่นพี่... ทั้งตัวรุ่นพี่ตอนที่เป็นสภานักเรียนอะบิดอส... ขอโทษนะ..."
13140-79 = "สำหรับฉันแล้ว... คณะกรรมการแผนงานคือโลกทั้งใบ อย่าทำให้มันหายไปเลยนะ รุ่นพี่โฮชิโนะ"
13140-84 = "ทำไมถึงต้องเรียกคณะกรรมการแผนงานว่า <พวกเธอ> ด้วยล่ะ...?"
13140-85 = "ชิโรโกะจัง..."
13140-86 = "คณะกรรมการแผนงานคือ <พวกเรา> ไม่ใช่เหรอ? แล้วทำไม... "
13140-91 = "ขอโทษนะ ชิโรโกะจัง... ยังไงฉันก็ต้องไป"
13140-93 = "อย่ามาเล่นตลกนะคะ!!!"
13140-104 = "จะทิ้งพวกเราไว้ตรงนี้แล้วไปคนเดียวงั้นเหรอคะ...?"
13140-113 = "เพราะแบบนี้ไงคะ ถึงไม่มีอะไรเปลี่ยนแปลงจากเดิมน่ะ...!!"
13140-116 = "อายาเนะจัง...? มีสตอร์มคลาวด์มากขนาดนี้ตั้งแต่ตอนไหนน่ะ...?"
13140-119 = "จะทำอย่างเดียวกันกับ <ตอนนั้น> อีกสินะคะ รุ่นพี่โฮชิโนะไม่เคยได้บทเรียนเลยเหรอคะ? ไม่ยั้งคิด ไม่มีแผนรับมือ แบบนี้มันเป็นการสร้างความเดือดร้อนให้กับคนอื่นนะคะ!"
13140-120 = "เราอุตส่าห์มาถึงตรงนี้ได้เพราะคุณครูแล้วแท้ๆ!! แต่ก็จะทำผิดพลาดซ้ำไปซ้ำมาเหรอคะ!!"
13140-123 = "จู่ๆ อายาเนะจังก็วีนขึ้นมา...?"
13140-124 = "อืม ไม่แปลกหรอก อายาเนะจังเป็นคนที่ถ้าจะเอาจริงก็คือเอาจริง"
13140-128 = "นั่นสินะ... นี่คงเป็นเวทีดูโอ้ของเซริกะจังกับอายาเนะจัง ถ้าไม่ตอบรับเรื่องนี้ให้เต็มที่ ฉันก็คงขาดคุณสมบัติรุ่นพี่สินะ"
13140-132 = "ค่ะ... ฉันจะขัดขวางพฤติกรรมโง่ๆ ของลุงเฉิ่มๆ ค่ะ ต่อให้ต้องใช้กำลังก็ตาม"
13140-138 = "เตรียมตัวได้เลย รุ่นพี่!!"
13140-140 = "ตอนต่อไป;คำสั่งของรองประธานนักเรียน"

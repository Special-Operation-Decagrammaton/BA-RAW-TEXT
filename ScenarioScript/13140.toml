[translation]
13140-1 = "Episode 14;You, and Us"
13140-9 = "..."
13140-10 = "U-Um..."
13140-21 = "Argh... Ugh!"
13140-27 = "Sh-Shiroko!"
13140-28 = "Even Shiroko is no match. H-Has the gap in power...always been like this...?"
13140-29 = "It seems you've grown even stronger, Hoshino..."
13140-34 = "...You really are strong, Shiroko. You're going to outdo me in no time at this rate."
13140-39 = "*pant*... *pant*... "
13140-40 = "There we go. You satisfied, Shiroko? "
13140-41 = "Hoshino..."
13140-42 = "Back then... I thought the whole world was against me. But then Nonomi... Nonomi saved me. "
13140-43 = "Without her, I probably would've fallen, become a criminal. I never would've met Shiroko."
13140-44 = "..."
13140-45 = "I met Nonomi and Shiroko, and that's how the Foreclosure Task Force came to be. That's how they saved me."
13140-46 = "That's why I can't just pretend Nonomi's time with the Foreclosure Task Force wasn't real. "
13140-47 = "I can't let her make herself the bad guy or let her believe she never deserved to be here."
13140-48 = "..."
13140-49 = "So, I'm going to go and bring back Nonomi safely. But none of that will matter if she has nowhere to come back to. That's why you guys need to stay here."
13140-50 = "..."
13140-56 = "I'm sure there's a way... If we wait for Sensei..."
13140-57 = "There has to be a way..."
13140-58 = "You're not wrong. Yeah... Sure. With Sensei's help, we'd be able to beat anything that comes our way."
13140-59 = "...But not even Sensei can undo the past. It's the same as not being able to bring back the dead. "
13140-60 = "...?"
13140-61 = "This Train Cannon, the antithesis of Yume's dream for Abydos, the ongoing war with the private equity fund..."
13140-62 = "...It all originates from the Abydos Student Council's mistakes. "
13140-63 = "If Yume had found out about this Train Cannon...she would've come running for help to destroy it right away. That's just who she was."
13140-64 = "But I wasn't there by her side. "
13140-65 = "So I can't begin to pretend I knew what Yume was thinking with this contract."
13140-66 = "Maybe...she was hoping the Train Cannon would be impossible to find in the Abydos Desert."
13140-67 = "That's why...I'm going to finish this. I'll do what I couldn't two years ago."
13140-68 = "The Train Cannon is the symbol of the Abydos Student Council's darkness. There's no reason for the Foreclosure Task Force to involve itself."
13140-69 = "Nonomi shouldn't be shouldering all this guilt. Shiroko, you have no obligation to take on old responsibilities."
13140-70 = "This is my cross to bear."
13140-75 = "Don't go. Hoshino."
13140-76 = "I...I'll never be able to know what kind of person Yume was. "
13140-77 = "The only memories I have are of the Foreclosure Task Force... So I'll never know what happened to her. "
13140-78 = "I can't pretend to understand your feelings...or the person you were in the Abydos Student Council. I'm sorry for that..."
13140-79 = "But to me...to me, the Foreclosure Task Force is everything. It's all I know. Don't reject it, Hoshino."
13140-84 = "Why...Why do you keep referring to the Foreclosure Task Force as \"you guys\"?"
13140-85 = "Shiroko..."
13140-86 = "It should be \"we,\" right? Not \"you guys\"? So why...? "
13140-91 = "...Sorry, Shiroko. I have to go."
13140-93 = "Stop kidding around!!"
13140-104 = "...So you're saying you're going to go without us?"
13140-113 = "This is no different from what happened last time!"
13140-116 = "Ayane...? Where did all these Water Clouds come from...?"
13140-119 = "Do you completely lack the ability to learn from your mistakes? You intend to repeat the same cycle, over and over? You're acting irresponsibly! It's completely careless! And everyone else will shoulder that burden!"
13140-120 = "We barely, just barely, made it out the last time, and only thanks to Sensei! Now you're going to run off and make the same exact mistake?!"
13140-123 = "Are we going to see Ayane's famous table flip...?"
13140-124 = "Mm. Well, this is about right. You sure do get things done when you set your mind to it, Ayane."
13140-128 = "So that's how it's gonna be? A two-on-one fight against Serika and Ayane? I guess I won't be able to call myself your upperclassman if I don't give it my all."
13140-132 = "…Yes. I'll prevent this ridiculous, idiotic, reckless behavior, no matter what it takes."
13140-138 = "Brace yourself, Hoshino!"
13140-140 = "Next Episode;The Student Council Vice President's Orders"

[translation]
13140-1 = "第14話;你們，以及我們"
13140-9 = "……"
13140-10 = "呃，唔……"
13140-21 = "咳咳……唔……"
13140-27 = "白，白子前輩！"
13140-28 = "糟糕……就連白子前輩也根本不是對手。#n差，差距竟然這麼大嗎……"
13140-29 = "好像比以前更強了，星野前輩……"
13140-34 = "……不愧是白子醬呢，真強。#n再這樣下去，說不定很快就會超越我了。"
13140-39 = "哈啊……哈啊……"
13140-40 = "那麼白子醬？這樣你滿意了嗎？"
13140-41 = "星野前輩……"
13140-42 = "在全世界都是我的敵人的那個時期……解救我的人是野乃美醬。"
13140-43 = "要是沒遇到野乃美醬……#n我應該已經變成走上歪路的犯罪者，也沒機會遇到白子醬了吧。"
13140-44 = "……"
13140-45 = "正因為認識了野乃美醬和白子醬，對策委員會才能成立──我也才得以獲得救贖。"
13140-46 = "我不能讓野乃美醬和對策委員會共度的時間……以及這一切化為烏有。"
13140-47 = "不能讓野乃美醬說自己是加害者，也不能讓他說自己不該待在這裡。"
13140-48 = "……"
13140-49 = "所以我必須去把野乃美醬平安帶回來。#n而為了守住野乃美醬的歸宿，你們必須留在這裡。"
13140-50 = "……"
13140-56 = "會有辦法的……我們等等老師吧……"
13140-57 = "一定會有的……"
13140-58 = "……沒錯。#n只要有老師在，我相信未來的問題也能得到解決。"
13140-59 = "但就算是老師，也無法挽回已經發生的事──就像無法讓死人復活一樣。"
13140-60 = "……？"
13140-61 = "否定了夢前輩理想的「列車砲」……#n以及「私募基金」現在打算發動的戰爭……"
13140-62 = "全都是過去「阿拜多斯學生會」犯下的錯誤引起的。"
13140-63 = "假如夢前輩知道列車砲的事……一定也會立刻要我去破壞它的。#n因為他就是那樣的人……"
13140-64 = "但是那時候，我卻不在前輩身邊。"
13140-65 = "我不知道夢前輩簽下這份契約時，心裡保持著什麼想法……"
13140-66 = "也許前輩他……希望列車砲能永遠隱藏在阿拜多斯沙漠也說不定。"
13140-67 = "所以……我必須去做2年前沒能做到的事。"
13140-68 = "那門列車砲是阿拜多斯學生會留下的黑暗，沒必要由對策委員會來承擔。"
13140-69 = "野乃美醬不需要因此感到愧疚，白子醬也不必承擔責任。"
13140-70 = "──因為這是我一個人的事。"
13140-75 = "別走，前輩。"
13140-76 = "我……不知道夢是個什麼樣的人。"
13140-77 = "我除了對策委員會之外沒有任何記憶……所以不知道他發生過什麼事。"
13140-78 = "前輩的感受……以及阿拜多斯學生會時期的前輩……很抱歉我全都一無所知。"
13140-79 = "但對我來說……對策委員會就是世界的一切。#n拜託不要讓它消失好嗎，星野前輩。"
13140-84 = "為什麼要說對策委員會是「你們」呢……？"
13140-85 = "白子醬……"
13140-86 = "對策委員會應該是「我們」才對啊……"
13140-91 = "……對不起，白子醬。我非走不可。"
13140-93 = "別開玩笑了──！！！"
13140-104 = "……所以又要丟下我們了？"
13140-113 = "這樣不就跟以前沒兩樣了嗎……！！"
13140-116 = "綾音醬……雨雲號什麼時候變得這麼多了……？"
13140-119 = "居然又打算跟[ruby= ・     ・ ]當時[/ruby]採取一樣的行動！？#n星野前輩完全沒有學習能力嗎？既輕率又沒有對策，只會給人添麻煩！"
13140-120 = "明明……明明是多虧了老師，好不容易才走到這一步的！！#n這樣不就重蹈覆轍了嗎！！"
13140-123 = "綾音醬在這種時候發動了翻桌絕技……？"
13140-124 = "嗯，也對，綾音醬是該做的時候就會全力以赴的人呢。"
13140-128 = "……是茜香醬和綾音醬的雙人舞台啊。#n不拿出全力回應的話，就沒資格當前輩了吧？"
13140-132 = "……沒錯。#n就算必須動用武力，我們也要阻止愚蠢大叔無可救藥的野蠻行為。"
13140-138 = "覺悟吧，前輩！！"
13140-140 = "下一話;副學生會長的命令"

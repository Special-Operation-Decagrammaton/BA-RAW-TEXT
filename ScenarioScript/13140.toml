13140-40 = "3;호시노;01;자아. 그럼 시로코 쨩? 만족했어? \n#3;em;[?]"
13140-41 = "#na;시로코 부상;호시노 선배……."
13140-42 = "3;호시노;99;이 세계 전부가 나의 적이었던 시절…… 그런 나를 구원해 준 건 노노미 쨩이었어. "
13140-43 = "3;호시노;13;노노미 쨩을 만나지 못했더라면 나는 아마도 삐뚤어진 범죄자가 되었을 거고, 시로코 쨩도 만나지 못했을 거야."
13140-44 = "#na;시로코 부상;……."
13140-45 = "3;호시노;99;노노미 쨩과 시로코 쨩을 만날 수 있었기에 대책위원회가 만들어질 수 있었어. 그래서 나도 구원받았다고 생각해."
13140-46 = "3;호시노;01;그러니까 노노미 쨩이 대책위원회와 함께했던 시간들을…… 그 모든 걸 없던 걸로 만들 수 없어. "
13140-47 = "3;호시노;15;노노미 쨩이 자신을 가해자라고, 원래 여기 있어선 안 되는 사람이라고 말하게 둬선 안 돼.\n#3;stiff"

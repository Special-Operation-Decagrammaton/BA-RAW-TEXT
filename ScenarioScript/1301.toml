1301-88 = "3;체리노;06\n1;토모에;01\n#3;dl\n#1;dl\n#wait;2000"
1301-89 = "5;마리나;11\n#5;m3\n#wait;1000"
1301-90 = "5;마리나;06;페로로를 붉은겨울 연방학원에 편입시켜야 한다니……\n#5;em;…\n#5;stiff"
1301-91 = "5;마리나;05;분명 쉽지 않은 일이겠지만, 여기서 실패한다면 출세의 길은 막혀버릴 테고, 최악의 경우는 숙청될지도 모르니…… 이렇게 된 이상 나의 지위와 명예를 위해서라도 증명하는 수밖에 없어……\n#5;greeting"
1301-92 = "5;마리나;11;……체리노 회장님은 언제나 옳다는 것을!\n#fontsize;80\n#5;closeup"

[translation]
1301-1 = "ท่านประธานถูกเสมอ 1"
1301-2 = "สำนักงานประธานสหภาพเรดวินเทอร์"
1301-3 = "อืมมม..."
1301-5 = "กังวลเรื่องอะไรอยู่เหรอคะท่านประธานเชริโน่?"
1301-6 = "...หัวหน้าคณะฯ มารินะรู้จักตัวละครที่ชื่อ 'เพโรโร่'มั้ย?"
1301-7 = "เพโรโร่เหรอคะ?"
1301-8 = "พอนึกๆ ดูแล้ว เด็กที่โรงเรียนบางคนก็มีตุ๊กตานกหน้าตาแปลกๆ ที่ชื่อแบบนั้นอยู่ค่ะ"
1301-9 = "ถึงจะบอกว่าเป็นแค่ของสะสมตัวละคร แต่ก็มีบางอย่างแปลกๆ เช่นน้ำลายไหลแล้วก็กระพือปีกได้ด้วย...ว่าแต่มีอะไรหรือเปล่าคะ?"
1301-10 = "ไม่มีอะไรหรอก พอดีว่าเมื่อสุดสัปดาห์เราเข้าไปในเมืองคิโวทอสแล้วเห็นการประมูลตุ๊กตาเพโรโร่ รุ่นลิมิเต็ดเอดิชั่นน่ะ"
1301-11 = "จริงๆ เลยเชียว เป็นแค่ตุ๊กตาตัวใหญ่ยักษ์ หน้าตาน่าเกลียดดูไร้ประโยชน์แท้ๆ แต่ทุกคนกลับกระวน#nกระวายกันใหญ่แค่เพราะซื้อตุ๊กตาตัวนั้นไม่ได้ บางคนแทบจะทุ่มเงินทั้งหมดที่มีเพื่อซื้อมันเลยทีเดียว"
1301-12 = "ไม่ว่าจะนักเรียนของมิลเลเนียมหรือเกเฮนน่า แม้แต่คุณหนูผู้สูงส่งของทรีนิตี้ก็ยังคลั่งไคล้เจ้าตุ๊กตานกเพโรโร่นั่น"
1301-13 = "ฮ่าฮ่า! ช่างน่าตลกซะจริงนะคะ แต่ก็ช่วยไม่ได้เพราะว่าเป็นพวกนักเรียนอ่อนแอที่ถูกสื่อยุยงได้ง่ายนี่คะ"
1301-14 = "สถาบันสหภาพเรดวินเทอร์ของพวกเราจะต้องควบคุมข้อมูลอย่างเข้มงวด ไม่ให้พวกนักเรียนไปลุ่มหลง#nตุ๊กตาไร้คุณภาพแบบนั้นค่ะ!"
1301-15 = "อืม แต่ก็อย่างว่านะผู้นำที่ฉลาดได้รับบทเรียนมาจากคนโง่"
1301-16 = "เราที่เป็นถึงผู้นำที่ฉลาดหลักแหลมผู้นี้มีไอเดียใหม่ที่จะช่วยยกระดับสหภาพเรดวินเทอร์ท่ามกลาง#nเหตุการณ์น่าตลกเช่นนี้แล้วละ!"
1301-17 = "ความคิดนั้นคือ"
1301-22 = "นั่นก็คือ... การทำให้เพโรโร่นั่นย้ายมาเรียนที่สถาบันสหภาพเรดวินเทอร์ของพวกเรา"
1301-28 = "...คะ?"
1301-29 = "ถามกลับอย่างนั้นเหรอฟังไม่ชัดหรือยังไง หัวหน้าคณะฯ มารินะ?"
1301-30 = "เราบอกว่าให้พาเพโรโร่ย้ายมาที่สถาบันสหภาพเรดวินเทอร์ของเรายังไงล่ะ"
1301-31 = "ถึงเจ้านกนั่นจะหน้าตาแย่เกินรับได้ก็จริง แต่ก็ได้รับความนิยมอย่างล้นหลามจากเหล่านักเรียนของ#nคิโวทอสไม่ผิดแน่"
1301-32 = "เพราะงั้นถ้าเพโรโร่มาอยู่ที่สถาบันของเราละก็ พวกนักเรียนทั่วคิโวทอสที่อยากจะนั่งเรียนในโรงเรียน#nที่มีเจ้านกนั่นอยู่ด้วย คงจะย้ายมาเรียนที่นี่กันเยอะแยะเลยสินะ?"
1301-34 = "อำนาจของสถาบันน่ะขึ้นอยู่กับจำนวนนักเรียน... ถ้าจำนวนนักเรียนเพิ่มมากขึ้นเพราะเพโรโร่ สหภาพเรดวินเทอร์ก็จะกลายเป็นสถาบันขนาดใหญ่ที่ทรีนิตี้และเกเฮนน่าเทียบไม่ติดเลย!"
1301-36 = "ตะ...แต่ว่า เพโรโร่เป็นสิ่งชั่วร้ายที่มีแต่พวกกลุ่มคนคลั่งไคล้เท่านั้นที่สนใจนะคะ..."
1301-40 = "นั่นช่างเป็นแผนที่สมบูรณ์แบบมากค่ะ ท่านเลขาธิการ!"
1301-41 = "หะ... หัวหน้าเลขานุการโทโมเอะ?"
1301-42 = "การโปรโมตโดยใช้มาสคอตเป็นพื้นฐานของการโฆษณาชวนเชื่อค่ะ! ถ้าหากสถาบันใช้ตัวละครที่น่า#nดึงดูดมากระตุ้นความสนใจ จะต้องมีนักเรียนพากันเข้ามาดูแน่นอนค่ะ!"
1301-43 = "ในขณะที่กำลังเกิดเรื่องวุ่นวายแบบนั้น แต่กลับคิดแผนการอันเลิศล้ำแบบนี้ขึ้นมาได้... เป็นการตัดสินใจที่เฉียบขาดมากค่ะประธานเชริโน่!"
1301-44 = "งะ...งั้นเหรอ?"
1301-45 = "หุหุ จะชมอีกก็ได้นะ! เพราะเราคือประธานสภานักเรียนผู้ยิ่งใหญ่ หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา... ท่านเชริโน่ยังไงล่ะ!"
1301-46 = "ยิ่งไปกว่านั้น เพโรโร่ยังมีขนสีขาวบริสุทธิ์เข้ากันกับทุ่งหิมะของสหภาพเรดวินเทอร์ ถ้าให้ใส่ชุด#nนักเรียนของสถาบันเรา แล้วทำหน้าที่เป็นหัวหน้าฝ่ายประชาสัมพันธ์ละก็จะต้องเหมาะสมมากแน่นอนค่ะ"
1301-47 = "ถ้าท่านประธานอนุญาต เราติดหนวดสีขาวอันใหญ่ๆ ที่เข้ากับขนนกให้เพโรโร่ด้วยดีมั้ยคะ? ถ้าทำแบบนั้นชื่อเสียงและอำนาจของสหภาพเรดวินเทอร์จะได้เป็นที่รู้จักไปทั่วทั้งคิโวทอสค่ะ!"
1301-48 = "อืม เป็นความคิดที่ดี! เอาตามนั้นเลย!"
1301-49 = "คือ... แต่ว่า เพโรโร่ไม่ใช่นักเรียน..."
1301-52 = "หัวหน้าคณะฯ มารินะมีอะไรจะพูดกับเรารึเปล่า? เห็นทำหน้าไม่พอใจแล้วก็เอาแต่พึมพำอะไรก็ไม่รู้#nตั้งแต่เมื่อกี้แล้ว"
1301-53 = "หรือว่าไม่พอใจกับแผนการอันยิ่งใหญ่ที่เราคิดงั้นเหรอ?"
1301-54 = "มะ...ไม่ใช่แบบนั้นนะคะ! ฉันก็คิดว่านั่นเป็นความคิดที่ยอดเยี่ยมทีเดียวค่ะ"
1301-55 = "ใช่มั้ยล่ะ? เพราะแผนของเราน่ะไม่มีทางมีช่องโหว่อยู่แล้วยังไงล่ะ!"
1301-56 = "ปัญหาก็คือเราจะชักชวนให้เพโรโร่ย้ายโรงเรียนมาได้ยังไงก็เท่านั้น..."
1301-57 = "หัวหน้าคณะฯ มารินะ! เราขอมอบหน้าที่จัดการให้เพโรโร่มาเข้าร่วมกับสหภาพเรดวินเทอร์#nให้สหายเป็นคนรับผิดชอบ!"
1301-58 = "คะ ...อะไรนะคะ?!"
1301-59 = "ทำไมตกใจขนาดนั้นล่ะ? นี่เป็นโอกาสอันทรงเกียรติที่จะได้ลงมือปฏิบัติตามแผนการอันยิ่งใหญ่ของ#nเราเลยนะ"
1301-60 = "ถ้าสหายทำให้เพโรโร่ย้ายมาเรียนที่สหภาพเรดวินเทอร์ได้สำเร็จ เราจะมอบ <เหรียญหนวดทองคำพิเศษ> ให้เลย!"
1301-61 = "ตะ... แต่ว่า เพโรโร่เป็นตัวละครในจินตนาการ คงเพิ่มเข้าไปในรายชื่อนักเรียนไม่ได้หรอกค่ะ..."
1301-62 = "เสียมารยาทจริงๆ หัวหน้าคณะฯ มารินะ!"
1301-63 = "เราเห็นเต็มๆ สองตาว่าเพโรโร่ร้องเพลงแล้วก็เต้นออกสเต็ปอยู่ในเมืองคิโวทอส!"
1301-64 = "หรือสหายจะบอกว่า ประธานสภานักเรียนของสหภาพเรดวินเทอร์ หัวหน้าฝ่ายตกแต่ง เลขาธิการผู้นี้มองผิดไปอย่างนั้นเหรอ?"
1301-65 = "ระ... เรื่องนั้น..."
1301-67 = "จริงด้วยค่ะ เพราะกฎของเรดวินเทอร์เขียนไว้แบบนั้นด้วยค่ะ"
1301-68 = "<กฎของสถาบันสหภาพเรดวินเทอร์ ข้อที่ 1 ท่านประธานเชริโน่ถูกเสมอ>"
1301-69 = "<กฎของสถาบันสหภาพเรดวินเทอร์ ข้อที่ 2 ผู้ใดที่แสดงความเห็นละเมิดกฎข้อที่ 1 จะต้องถูกลงโทษ>"
1301-70 = "คนที่มีตำแหน่งอย่างหัวหน้าคณะฯ มารินะคงจะไม่ละเมิดกฎข้อนี้ของสถาบันใช่มั้ยคะ?"
1301-72 = "กะ... ก็ใช่อยู่หรอกนะคะ..."
1301-75 = "(ระ... เรื่องใหญ่แล้วสิ ถ้าเป็นแบบนี้ต่อไปฉันคงโดนลงโทษเข้าจริงๆ!)"
1301-76 = "(แต่ว่าก็พาตัวเพโรโร่ที่ไม่มีอยู่จริงเข้ามาเป็นนักเรียนไม่ได้อยู่ดี ทำยังไงดีล่ะ...)"
1301-77 = "(เดี๋ยวนะ ถ้าเราพาเพโรโร่ในจินตนาการออกมายังโลกความจริงไม่ได้... เราก็แค่ทำให้ตัวตนใน#nความจริงกลายเป็นเพโรโร่ก็ได้ใช่มั้ยล่ะ?)"
1301-78 = "(ฮุฮุ... ใช่แล้ว ทำแบบนั้นก็ได้นี่!)"
1301-81 = "สั่งมาได้เลยค่ะท่านประธาน ฉันจะพาเพโรโร่มาที่สหภาพเรดวินเทอร์ตามที่สั่งให้ได้ค่ะ!"
1301-82 = "อืม ดีมาก เยี่ยมยอดที่สุด ถ้าอย่างนั้นก็ฝากด้วยนะหัวหน้าคณะฯ มารินะ"
1301-83 = "ฮ้าวว... ถึงเวลานอนกลางวันแล้วงั้นเหรอ..."
1301-84 = "โทโมเอะ... เราง่วงแล้ว..."
1301-85 = "ได้ค่ะ ฉันจะเตรียมเครื่องนอนให้อย่างรวดเร็วเลย เชิญทางนี้ค่ะ..."
1301-90 = "จะให้พาเพโรโร่มาเข้าเรียนที่สถาบันสหภาพเรดวินเทอร์งั้นเหรอ..."
1301-91 = "แน่นอนว่าไม่ใช่เรื่องง่าย แต่ถ้ามาล้มเหลวตอนนี้ เส้นทางแห่งความรุ่งโรจน์ก็จะถูกปิดกั้น กรณีที่เลว#nร้ายที่สุดก็อาจจะถูกกวาดล้างไปเลยก็ได้... ไหนๆ ก็เป็นแบบนี้แล้ว ฉันคงไม่มีทางเลือกนอกจากจะ#nต้องพิสูจน์ให้ได้อย่างน้อยก็เพื่อชื่อเสียงและเกียรติของฉัน..."
1301-92 = "เพราะว่าท่านประธานเชริโน่ถูกเสมอยังไงล่ะ!"

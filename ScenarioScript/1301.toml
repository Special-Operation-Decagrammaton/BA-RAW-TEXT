[translation]
1301-1 = "#title;회장 동지는 언제나 옳다 1"
1301-2 = "#place;붉은겨울 학원 회장 집무실"
1301-3 = "3;체리노;99;흐으음…….\n#3;em;…\n#3;a"
1301-4 = "3;체리노;99\n#3;m1"
1301-5 = "5;마리나;00;무슨 고민이라도 있으십니까, 체리노 회장님?\n#5;em;[반응]\n#5;al"
1301-6 = "3;체리노;05;……혹시 마리나 위원장은 '페로로'라는 캐릭터에 대해 들어본 일이 있는가?\n#3;em;[?]"
1301-7 = "5;마리나;02;페로로, 말입니까?"
1301-8 = "5;마리나;02;그러고 보니 학교의 몇몇 학생들이 그런 이름의 이상한 새 인형을 가지고 있었지요."
1301-9 = "5;마리나;05;아무리 캐릭터 굿즈라지만 침을 흘리며 날개를 퍼덕이는 꼴이 괴상해 보여 모두 압수하긴 했습니다만…… 무슨 문제라도 있으십니까?\n#5;em;…"
1301-10 = "3;체리노;01;다름이 아니라, 이 몸은 지난 주말에 키보토스의 시내에 외출을 나갔다가 그 페로로의 한정판 인형을 경매하는 광경을 보았다.\n#3;hophop\n#3;em;[반응]"
1301-11 = "3;체리노;99;정말이지. 쓸모없어 보일 정도로 커다랗고 못생긴 인형이었는데도, 다들 그 인형을 사지 못해 안달을 내고 있더군. 웃돈을 내서라도 사려고 할 정도로 말이지."
1301-12 = "3;체리노;05;밀레니엄, 게헨나의 학생들은 물론이고 트리니티의 고상한 아가씨들조차도 그 페로로라는 새 인형에 열광하고 있었어.\n#3;stiff\n#3;em;[속상함]"
1301-13 = "5;마리나;11;하하! 그것참 우스꽝스러운 모습이로군요. 역시 이래서 선동과 미디어에 물든 외부의 나약한 학생들은 어쩔 수가 없다니까요.\n#5;em;[재잘]"
1301-14 = "5;마리나;03;저희 붉은겨울 연방학원은 그런 형편없는 인형에 학생들이 휘둘리지 않도록 정보를 철저히 통제하고 있습니다!\n#5;em;[반짝]"
1301-15 = "3;체리노;99;음, 하지만 현명한 지도자는 바보로부터 교훈을 얻는 법."
1301-16 = "3;체리노;01;영리하고 현명한 서기장인 이 몸은 그 우스꽝스러운 광경 속에서도 붉은겨울 학원의 위상을 높일 수 있는 새로운 아이디어를 떠올린 것이다!\n#3;hophop\n#3;em;[반응]"
1301-17 = "5;마리나;09;부디 의견을.\n#5;em;[음표]"
1301-18 = "#st;[0,0];instant;1; "
1301-19 = "#clearST"
1301-20 = "3;체리노;01\n5;마리나;09\n#3;d\n#5;d\n#wait;1000"
1301-21 = "#all;hide"
1301-22 = "3;체리노;05;그건 바로…… 그 페로로를 우리 붉은겨울 연방학원에 편입시키는 것이다!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
1301-23 = "#wait;1000"
1301-24 = "3;체리노;05\n#3;closeup\n#3;d"
1301-25 = "#all;hide"
1301-26 = "1;체리노;05\n5;마리나;09"
1301-27 = "5;마리나;09\n#5;em;…\n#wait;2500"
1301-28 = "5;마리나;07;…………네?\n#5;shake\n#5;em;[?!]"
1301-29 = "1;체리노;01;눈앞에서 바로 되묻다니. 귀가 어떻게 되기라도 한 건가, 마리나 위원장?\n#1;em;[빠직]\n#1;hophop"
1301-30 = "1;체리노;01;이 몸은 페로로를 우리 붉은겨울 연방학원에 편입시키자고 말했었네."
1301-31 = "1;체리노;99;아무리 그 새가 형편없는 모습을 하고 있다지만, 키보토스의 학생들로부터 큰 인기를 끌고 있는 것은 틀림없는 사실.\r\n#1;em;[...]"
1301-32 = "1;체리노;03;그러니 페로로를 우리 학원에 편입시키면, 그 새와 같은 학교에 다니고 싶어 하는 전학생들이 키보토스 전역에서 몰려들겠지?\n#1;hophop"
1301-33 = "#all;hide"
1301-34 = "3;체리노;05;학원의 권력은 학생의 숫자에 비례하는 법…… 페로로로 인해 학생의 숫자가 늘어난다면 붉은겨울 학원은 트리니티와 게헨나 따위는 감히 범접할 수 없을 정도의 초거대 학원으로 거듭나게 될 것이다!\n#3;em;[!]"
1301-35 = "#all;hide"
1301-36 = "3;마리나;08;저, 하지만…… 페로로는 소수의 마니아에게만 인기가 있는 매니악한 물건인 데다…….\n#3;em;[땀]\n#fontsize;55"
1301-37 = "#all;hide"
1301-38 = "1;체리노;05\n5;마리나;08"
1301-39 = "3;토모에;00\n#3;al\n#5;stiff\n#wait;1000"
1301-40 = "3;토모에;00;그것참 완벽한 계획이십니다, 서기장님!\n#3;em;[반짝]\n#fontsize;80"
1301-41 = "5;마리나;08;토, 토모에 비서실장?\n#5;em;[!]"
1301-42 = "3;토모에;03;마스코트를 활용한 홍보전략은 프로파간다의 기본! 매력적인 캐릭터를 학원에 유치한다면 이를 보기 위해 학생들이 몰려드는 건 당연한 일이지요!"
1301-43 = "3;토모에;03;그 짧은 혼란의 틈 속에서 이토록 훌륭한 계획을 세우시다니…… 대단한 판단력이십니다, 체리노 회장님!\n#3;em;[음표]"
1301-44 = "1;체리노;04;그, 그런가?\n#1;stiff"
1301-45 = "1;체리노;03;후후, 더 칭찬해도 괜찮느니라. 이 몸은 위대한 학생회장이자, 미화부장이자, 서기장이자, 체육부장 등인…… 체리노 님이니까!\n#1;em;[반응]\n#1;hophop"
1301-46 = "3;토모에;99;더욱이 페로로는 저희 붉은겨울 학원의 설원과 잘 어울리는 순백의 깃털을 가지고 있으니, 저희 학원의 교복을 입혀 홍보부장 역할을 맡기면 분명 잘 어울리겠지요.\n#3;em;…"
1301-47 = "3;토모에;01;회장님께서 허락하신다면, 페로로에게 깃털과 잘 어울리는 커다란 하얀색 수염을 달아주는 건 어떨까요? 그럼 붉은겨울 학원의 권위가 키보토스 전역에 널리 알려질 겁니다!\n#3;em;[반짝]\n#3;greeting"
1301-48 = "1;체리노;01;음, 그것도 좋은 생각이구나! 채용이다!\n#1;em;[음표]\n#1;hophop"
1301-49 = "5;마리나;08;저…… 그렇지만 페로로는 학생이 아니기 때문에…….\n#5;em;[땀]\n#5;stiff\n#fontsize;55"
1301-50 = "1;체리노;05\n#1;m3"
1301-51 = "3;토모에;01\n#3;m1"
1301-52 = "1;체리노;05;마리나 위원장. 아까 전부터 불만스러운 표정으로 무슨 혼잣말을 하는 건가? 이 몸에게 특별히 할 말이라도 있는가?\n#1;em;[빠직]\n#1;hophop"
1301-53 = "1;체리노;05;그도 아니라면…… 이 몸이 모처럼 생각해 낸 위대한 계획에 불만이라도 있는 건가?"
1301-54 = "5;마리나;08;그, 그렇지 않습니다! 저도 마침 좋은 생각이라 생각하고 있었습니다!\n#5;em;[!]\n#5;shake"
1301-55 = "1;체리노;03;그렇지? 이 몸의 계획에 빈틈이 있을 리가 없으니까!\n#1;em;[반응]\n#1;hophop"
1301-56 = "1;체리노;99;남은 문제는 그 페로로에게 어떻게 전학 권유를 하는가 뿐인데…….\n#1;em;…\n#1;m1\n#3;dl"
1301-57 = "1;체리노;05;마리나 위원장! 그대가 책임지고 페로로를 붉은겨울 학원에 편입시키도록!\n#1;em;[반응]\n#1;hophop"
1301-58 = "5;마리나;08;네, 네에?!\n#5;em;[?!]\n#5;jump"
1301-59 = "1;체리노;05;어째서 그렇게 놀라는 거지? 이 몸의 위대한 계획을 직접 실행할 수 있는 명예로운 기회이거늘.\n#1;em;[?]"
1301-60 = "1;체리노;03;성공적으로 페로로를 붉은겨울 학원에 데려온다면 그대에게 <특별 황금 수염 훈장>을 수여하겠다!\n#1;hophop"
1301-61 = "5;마리나;08;하, 하지만 페로로는 가상의 캐릭터이기 때문에 학생 명부에 실을 수 없는걸요…….\n#5;stiff"
1301-62 = "1;체리노;05;무엄하다, 마리나 위원장!\n#1;em;[빠직]"
1301-63 = "1;체리노;05;이 몸이 두 눈으로 똑똑히 키보토스의 시내에서 춤추고 노래하는 페로로를 보았거늘!"
1301-64 = "1;체리노;05;아니면 붉은겨울 학원의 학생회장이자, 미화부장이자, 서기장…… 등인 이 몸이 잘못 보기라도 했다는 말이냐?!\n#fontsize;80\n#1;stiff\n#1;m3"
1301-65 = "5;마리나;10;그, 그건 그러니까…….\n#5;em;[땀]"
1301-66 = "#all;hide"
1301-67 = "3;토모에;00;그렇네요. 붉은겨울 학원의 교칙에도 다음과 같이 쓰여 있으니까요.\n#3;em;[반짝]\n#3;greeting"
1301-68 = "3;토모에;99;<붉은겨울 연방학원 교칙 제1조. 체리노 회장은 언제나 옳다.>"
1301-69 = "3;토모에;99;<붉은겨울 연방학원 교칙 제2조. 1조에 위배되는 발언을 한 사람은 모두 숙청에 처한다.>"
1301-70 = "3;토모에;03;설마 마리나 위원장 정도의 위치에 있는 사람이 학원의 교칙을 어기지는 않겠지요?\n#3;em;[음표]\n#3;greeting"
1301-71 = "#all;hide"
1301-72 = "3;마리나;07;그, 그건 그렇습니다만…….\n#3;stiff"
1301-73 = "3;마리나;07"
1301-74 = "#wait;1000"
1301-75 = "3;마리나;12;(크, 큰일이야. 이대로 가다가는 정말로 내가 숙청되고 말겠어!)\n#3;em;[땀]\n#3;stiff"
1301-76 = "3;마리나;08;(하지만 현실에 존재하지 않는 페로로를 학생으로 데려올 수도 없고, 이를 어쩐다…….)"
1301-77 = "3;마리나;07;(잠깐. 가상의 페로로를 현실로 데려올 수 없다면…… 현실에 있는 존재를 페로로로 만들어 버리면 되잖아?)\n#3;em;[반응]\n#3;stiff"
1301-78 = "3;마리나;03;(후후…… 그래, 그렇게 하면 되겠어!)"
1301-79 = "#all;hide"
1301-80 = "1;토모에;03\n3;체리노;05\n5;마리나;03\n#1;a\n#3;a\n#5;a"
1301-81 = "5;마리나;11;맡겨만 주십시오, 회장님. 분부하신 대로 페로로를 꼭 붉은겨울 학원에 데려오도록 하겠습니다!\n#5;em;[반짝]"
1301-82 = "3;체리노;03;음, 좋아. 좋아. 그럼 이 몸은 마리나 위원장만 믿고 있겠네.\n#3;hophop\n#3;em;[반응]"
1301-83 = "3;체리노;06;하아암…… 벌써 낮잠 시간인가……\n#3;stiff"
1301-84 = "3;체리노;06;토모에…… 나 졸려…….\n#3;em;[속상함]\n#3;stiff\n#fontsize;55"
1301-85 = "1;토모에;01;네, 바로 이부자리를 준비하겠습니다. 이쪽으로…….\n#1;em;[음표]\n#1;greeting"

[translation]
1301-1 = "The President Is Always Right Part 1"
1301-2 = "Red Winter Academy Presidential Office"
1301-3 = "Hmm..."
1301-5 = "May I assist you, President Cherino?"
1301-6 = "Have you ever heard of a character named Peroro?"
1301-7 = "Peroro?"
1301-8 = "Ah, yes. I remember a few students had a strange bird plush with that name."
1301-9 = "It was drooling and flapping its wings. I thought it unfit for a student of Red Winter, so I confiscated all of them. Is there something the matter?"
1301-10 = "You see, I went to downtown Kivotos last weekend, and a limited edition Peroro was being sold at an auction."
1301-11 = "Everyone was dying to get this oversized, ugly, useless stuffed character plush. They were even willing to pay double for it!"
1301-12 = "Millennium, Gehenna, and even the highbrow Trinity students were all desperate for Peroro."
1301-13 = "Haha! How pathetic! The students at those schools are brainwashed by the freedom of information!"
1301-14 = "Red Winter Federal Academy controls such silly media in order to keep our students from being manipulated in the same way."
1301-15 = "Hmm. But a wise leader learns even from fools."
1301-16 = "I, the smart and wise Great Leader, have found inspiration from their idiocy and come up with a brilliant idea to strengthen our authority!"
1301-17 = "Please illuminate me, Great Leader."
1301-22 = "It's...to bring Peroro to Red Winter Federal Academy!"
1301-28 = "Excuse me?"
1301-29 = "What?! Do your ears not work, Chairman Marina?"
1301-30 = "I said, I want to bring Peroro to Red Winter Federal Academy."
1301-31 = "The bird may be a drooling dullard, but Kivotos students are undeniably obsessed with it."
1301-32 = "So, if we bring Peroro here, it's sure to attract applicants from all over Kivotos, right?"
1301-34 = "An academy's power is proportional to its enrollment... If our numbers increase because of Peroro, Red Winter Academy will turn into a super academy the likes of which Trinity and Gehenna wouldn't hold a candle to!"
1301-36 = "However...Peroro has a rather small fan base."
1301-40 = "A perfect plan, Great Leader!"
1301-41 = "Chief Secretary Tomoe?"
1301-42 = "Promotion through mascots is propaganda 101! It's only a matter of time before students flock here if we have a charming mascot of our own!"
1301-43 = "You came up with such a great plan so quickly... Excellent judgment, President Cherino!"
1301-44 = "I-Is that so?"
1301-45 = "Ahaha! Yes, of course! Naturally I, the student council president, Beautifier of Lands, Great Leader, and Athletics Club Captain would come up with a brilliant plan!"
1301-46 = "Peroro's snow-white feathers will match perfectly with the Red Winter Academy's brand. We could put him in a uniform and make him our PR manager."
1301-47 = "And adding a big white mustache will push it right over the top. What do you think? Word of Red Winter Academy's might will spread all over Kivotos."
1301-48 = "Yes, that was my idea exactly! Excellent, Tomoe!"
1301-49 = "But...Peroro isn't a student...or real, for that matter."
1301-52 = "Chairman Marina, what are you mumbling about in the corner?#nPlease, speak up!"
1301-53 = "Or...do you have complaints about my great plan?"
1301-54 = "O-Of course not! It's a...wonderful idea!"
1301-55 = "Isn't it? My plans are always perfect!"
1301-56 = "The only thing we have to figure out is how to get Peroro transferred here..."
1301-57 = "Chairwoman Marina! It'll be your responsibility to transfer Peroro to Red Winter Academy!"
1301-58 = "What?!"
1301-59 = "Are you not happy? You should be honored by the chance to execute my plan!"
1301-60 = "I shall award you with a Golden Mustache Medal once you successfully bring Peroro to Red Winter!"
1301-61 = "B-But how am I supposed to register a fictional character as a student?"
1301-62 = "The disrespect, Chairman Marina!"
1301-63 = "I saw Peroro dancing and singing in downtown Kivotos with these very eyes!"
1301-64 = "Are you saying you don't believe the words of Red Winter Academy's president, the Beautifier of Lands, Great Leader, et cetera?"
1301-65 = "N-No, it's not that..."
1301-67 = "Allow me to intervene. This is written in the Red Winter Academy rules."
1301-68 = "Red Winter Federal Academy Rules, Article 1: President Cherino is always right."
1301-69 = "Red Winter Federal Academy Rules, Article 2: Any person who makes a statement that violates Article 1 must be purged."
1301-70 = "I most certainly hope you are not violating the rules, Chairman Marina."
1301-72 = "O-Of course not, but..."
1301-75 = "(Th-This is bad! I'm going to be purged, at this rate!)"
1301-76 = "(But how am I supposed to make a fictional character into a student?)"
1301-77 = "(Hold on. I can't make the fictional Peroro real, but what if I turn something real into Peroro?)"
1301-78 = "(Heehee... Okay! I can make this work!)"
1301-81 = "You can count on me, President. I will bring Peroro to Red Winter Academy as you ordered!"
1301-82 = "Excellent. I'll be counting on you, Chairman Marina."
1301-83 = "*yawn* Is it time for a nap already?"
1301-84 = "Tomoe... I'm sleepy..."
1301-85 = "Your bed is already prepared. Please come this way."
1301-90 = "Transferring Peroro to Red Winter Federal Academy..."
1301-91 = "If this fails, I could lose my promotion... Or worse—I could get purged. I can't let that happen. This has to work. I have to prove myself."
1301-92 = "President Cherino is always right!"

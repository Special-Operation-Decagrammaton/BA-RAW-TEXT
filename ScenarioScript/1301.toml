[translation]
1301-1 = "會長永遠是對的（１）"
1301-2 = "赤冬聯邦學園．會長辦公室"
1301-3 = "呼呣……"
1301-5 = "您有什麼煩惱嗎，潔莉諾會長？"
1301-6 = "……瑪麗娜委員長。你有聽過「佩洛洛」這個角色嗎？"
1301-7 = "您說佩洛洛嗎？"
1301-8 = "……我有印象。似乎有幾名學生帶著那個名字的「奇怪的鳥玩偶」。"
1301-9 = "雖然是角色的周邊商品，但它流著口水揮著翅膀的模樣實在古怪，所以通通沒收了……那個「佩洛洛」怎麼了嗎？"
1301-10 = "其實上週末有件必須到夏萊處理的工作。當時咱看到了競標限定版「佩洛洛」玩偶的場景。"
1301-11 = "明明只是個又大又醜、沒什麼用的玩偶……然而大家卻依然非常想要那個「佩洛洛」，真是令人搖頭。價格似乎也炒得相當高。"
1301-12 = "千年和格黑娜的學生不說，就連三一的大小姐們也對那個鳥玩偶十分著迷。"
1301-13 = "哈哈！那真是有趣的光景呢。果然外部的學生就是容易被那些媒體給煽動。"
1301-14 = "請安心。為了不讓我們赤冬聯邦學園的學生被區區「玩偶」給迷惑，會徹底進行情報控制的！"
1301-15 = "很好。但是賢明的領導者，是從笨蛋身上也能得到教訓的。"
1301-16 = "身為賢明書記長的咱……即使是在那種可笑的光景中，也想出了能為赤冬聯邦學園帶來躍進的新點子！"
1301-17 = "原，原來如此。請務必讓我聽聽那個點子，潔莉諾會長。"
1301-22 = "哼哼哼，聽了可別嚇到唷……咱要把那個「佩洛洛」納入赤冬聯邦學園！"
1301-28 = "…………什麼？"
1301-29 = "竟敢漏聽咱的發言，妳的耳朵有問題嗎，瑪麗娜委員長？"
1301-30 = "咱說要把那個「佩洛洛」以學生的身分納入赤冬聯邦學園。"
1301-31 = "雖然外表詭異，但是受到奇普托斯的學生們歡迎是事實。"
1301-32 = "既然如此，只要把「佩洛洛」納入赤冬學園，「想跟佩洛洛上同一間學校！」的轉學申請或許就會從奇普托斯各地蜂擁而至，咱是這麼認為的。"
1301-34 = "學園的權力和學生數成正比……如果能因為「佩洛洛」增加學生數量，那麼赤冬聯邦學園遲早會成為三一和格黑娜都比不上的的超大型學園吧！"
1301-36 = "那個，恕我冒昧……「佩洛洛」只受到少數粉絲的喜愛，是狂熱粉絲向的角色──"
1301-40 = "真是完美的計畫啊，書記長！"
1301-41 = "智，智惠秘書室長？"
1301-42 = "運用吉祥物的宣傳戰略也是政治宣傳的基本！把充滿魅力的角色招入學園的話，吸引到好奇的學生再自然不過了！"
1301-43 = "居然在瞬間的視察中想出這麼了不起的計畫……不愧是您，潔莉諾會長！"
1301-44 = "是，是嗎？"
1301-45 = "呵呵，可以再多稱讚幾句哦。畢竟咱可是偉大的學生會長兼環境美化部部長、書記長、體育部代表等等等等……擁有各種頭銜的潔莉諾大人！"
1301-46 = "正巧，「佩洛洛」又有著一身如同映照著赤冬學園雪原般的純白羽毛，如果穿上我們學園的制服並擔任「宣傳部長」，想必會非常活躍吧。"
1301-47 = "在此追加一個提案，如果可以的話，再替佩洛洛加上一個大大的白色鬍子如何呢？這樣赤冬聯邦學園的權威，想必能比以往更加轟動各地吧！"
1301-48 = "唔呣，那也是不錯的想法！採用！"
1301-49 = "那個……恕我直言，「佩洛洛」只是個角色，並不是學生……"
1301-52 = "瑪麗娜委員長，妳從剛剛開始就一直用不滿的表情在說些什麼？有什麼想對咱說的話嗎？"
1301-53 = "還是說，雖然不太可能……難道你對咱想出的偉大計畫有什麼不滿嗎？"
1301-54 = "不，不是那樣的！我也認為是個很好的提案！"
1301-55 = "對吧對吧？咱的計畫天衣無縫！"
1301-56 = "接下來，就是如何讓佩洛洛轉學過來了啊……"
1301-57 = "……對了。瑪麗娜委員長！就由妳負責讓佩洛洛轉入赤冬學園吧！"
1301-58 = "什，什麼！？"
1301-59 = "為何如此吃驚？你不也接受了嗎？這可是能親自執行咱偉大計劃，獲得無上榮譽的機會啊。"
1301-60 = "嗯……如果能成功把「佩洛洛」編入赤冬學園的話，咱就授予你「特別黃金鬍子勳章」吧！這樣你就有幹勁了吧？"
1301-61 = "但，但是佩洛洛是虛擬角色……要編入學生名簿的話，那個……"
1301-62 = "你在說什麼，瑪麗娜委員長！"
1301-63 = "咱可是看到了！親眼見到了唱著歌跳著舞的佩洛洛啊！竟然還說是什麼「虛擬角色」……"
1301-64 = "還是說，你的意思是赤冬聯邦學園的偉大學生會長兼環境美化部部長，呃……還有各種身分的咱看錯了嗎！？"
1301-65 = "這，這個……但是……"
1301-67 = "……赤冬聯邦學園的校規是這麼寫的。"
1301-68 = "「赤冬聯邦學園校規第一條──潔莉諾會長永遠是對的」"
1301-69 = "「赤冬聯邦學園校規第二條──做出違反第一條發言的學生毫無例外將成為肅清對象」"
1301-70 = "我想像瑪麗娜委員長這樣的人，應該不會違反校規吧……"
1301-72 = "那，那個……"
1301-75 = "（不，不好了！這樣下去的話真的要被肅清了！）"
1301-76 = "（但是又無法把不存在於現實的佩洛洛當成學生帶來……該怎麼辦才好……）"
1301-77 = "（等等，既然無法把虛擬的佩洛洛帶來現實……乾脆讓佩洛洛存在於現實不就好了嗎？）"
1301-78 = "（呵呵……沒錯！這樣就好了！）"
1301-81 = "……交給我吧，會長。我會照您的吩咐，一定會把佩洛洛帶來赤冬聯邦學園的！"
1301-82 = "唔呣。不愧是瑪麗娜委員長。咱就相信你會這麼說。"
1301-83 = "呼哈……差不多到午睡時間了嗎……"
1301-84 = "智惠……咱好睏……"
1301-85 = "好的，我立刻進行午睡的準備。請往這裡。"
1301-90 = "竟然不得不讓佩洛洛轉進赤冬聯邦學園……"
1301-91 = "雖然不是件容易的事，若是失敗的話，我出人頭地的道路將斷絕於此，最壞的情況甚至還可能會遭到肅清……但是事已至此也只能做到底了。就讓我來證明吧……！"
1301-92 = "「潔莉諾會長永遠是對的」！"

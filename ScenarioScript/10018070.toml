[translation]
10018070-1 = "第7話;那就來對決吧！"
10018070-3 = "……竟然發生了這種事。"
10018070-4 = "總覺得事情好像越鬧越大了……真的沒問題嗎？"
10018070-5 = "即使如此，我也不打算放棄。"
10018070-6 = "一旦做了決定，就不該半途而廢。"
10018070-11 = "是啊！可不能吃一半就把食物扔了！"
10018070-12 = "我想羽留奈應該不是這個意思哦。"
10018070-14 = "這樣也好。"
10018070-15 = "就把這……當成是追求究極美食的試煉吧。"
10018070-16 = "在突破試煉後品嘗到的美食，肯定是任何東西都無法比擬的。"
10018070-22 = "那麼，大家前往喵食品吧。"
10018070-31 = "會長，有事稟告。"
10018070-32 = "呣呵呵呵。這次又怎麼了？"
10018070-33 = "美食研究會正在往喵食品總公司的路上。"
10018070-37 = "什麼！？他們是怎麼知道位置的！？"
10018070-38 = "公司的官網上有寫。"
10018070-39 = "什麼！是誰說要在官網上標示地址的！"
10018070-40 = "是會長您。"
10018070-45 = "為什麼要這麼老實地乖乖寫上去呢？"
10018070-46 = "咦……因為您說命令就該確實地執行……"
10018070-51 = "……"
10018070-52 = "呣呵呵呵呵……"
10018070-53 = "是在查詢過公司官網後，特別親自造訪的貴客啊。"
10018070-54 = "不稍微歡迎一下，可就有失禮數了呢。呣呵呵呵呵。"
10018070-55 = "您先前好像不是這麼說的……"
10018070-56 = "少囉嗦！叫預備隊做好應戰準備！"
10018070-57 = "這樣好嗎？"
10018070-59 = "無所謂！喵食品可是我的公司啊！"

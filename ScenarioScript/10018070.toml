[translation]
10018070-1 = "ตอนที่ 7;ถ้างั้นก็มาดวลกัน!"
10018070-3 = "...เกิดเรื่องแบบนั้นขึ้นสินะคะ"
10018070-4 = "รู้สึกว่าเรื่องมันลุกลามใหญ่โตขึ้นเรื่อยๆ เลย... จะไม่เป็นอะไรใช่มั้ยนะ?"
10018070-5 = "แต่ว่าฉันก็ไม่คิดจะยอมแพ้หรอกค่ะ"
10018070-6 = "ถ้ายอมแพ้ไปกลางคันละก็ ไม่ลงมือทำตั้งแต่แรกเลยน่าจะดีกว่าค่ะ"
10018070-11 = "อื้อ! อาหารที่หยุดกินกลางคันน่ะ ปกติก็ต้องเอาไปทิ้งนี่นา!"
10018070-12 = "ที่ฮารุนะพูดน่าจะไม่ได้หมายถึงแบบนั้นนะคะ..."
10018070-14 = "ยังไงก็ตาม คงเป็นความลำบากในการทำงานอย่างหนึ่งค่ะ"
10018070-15 = "ความลำบากที่พวกเราที่เป็นผู้ค้นหาเส้นทางแห่งอาหารเลิศรส..."
10018070-16 = "การได้ลิ้มรสชาติแสนอร่อยหลังฝ่าฟันความลำบากแบบนั้นมา จะต้องเป็นอาหารรสเลิศที่หาอะไรมา#nเปรียบไม่ได้เลยค่ะ"
10018070-22 = "ตอนนี้ชมรมชิมอาหารของเรา... จะไปที่เนียวฟู้ดกันค่ะ"
10018070-31 = "ท่านประธาน มีเรื่องมารายงานค่ะ"
10018070-32 = "ฮุฮุฮุฮุ... มีอะไรเหรอ? "
10018070-33 = "พวกชมรมชิมอาหารกำลังมุ่งหน้ามาที่สำนักงานใหญ่ของเนียวฟู้ดค่ะ"
10018070-37 = "ว่าไงนะ? เจ้าพวกนั้นรู้ที่อยู่ของเราได้ยังไง?!"
10018070-38 = "มันมีเขียนไว้ในหน้าเว็บไซต์น่ะค่ะ..."
10018070-39 = "ว่าไงนะ! ใครบอกให้เขียนที่อยู่สำนักงานใส่ลงไปในเว็บไซต์กัน!"
10018070-40 = "ท่านประธานเป็นคนสั่งค่ะ..."
10018070-45 = "แล้วทำไมถึงเขียนลงไปตามที่สั่งแบบนั้นเล่า!"
10018070-46 = "คือ... ก็ท่านประธานสั่งให้ทำตามคำสั่งอย่างเคร่งครัดนี่คะ..."
10018070-51 = "..."
10018070-52 = "ฮุฮุฮุฮุ..."
10018070-53 = "ลูกค้าที่มาเยี่ยมชมบริษัทหลังจากเข้าไปดูเว็บไซต์ของบริษัทแล้ว"
10018070-54 = "ถ้าไม่ต้อนรับให้สมเกียรติก็คงเป็นการเสียมารยาทน่าดูเลย ฮุฮุฮุฮุ"
10018070-55 = "เปลี่ยนคำพูดจากหน้ามือเป็นหลังมือเลย..."
10018070-56 = "หนวกหูน่า! กองหนุน! เตรียมตัวสนับสนุนด้วย!"
10018070-57 = "แบบนี้ไม่เป็นไรแน่เหรอคะ?"
10018070-59 = "ไม่มีปัญหา! ที่นี่คือสำนักงานใหญ่ของเนียวฟู้ดนะ!"

[translation]
10018070-1 = "Episode 7; It's a Cook-Off!"
10018070-3 = "...So that's what happened."
10018070-4 = "It feels like things are getting out of hand... Are you sure we'll be okay?"
10018070-5 = "The answer to that doesn't matter."
10018070-6 = "What matters is that there's no point quitting halfway through. I'm not going to give up."
10018070-11 = "Yeah! Half-eaten food only gets thrown away!"
10018070-12 = "Not Haruna's point, but I like where your head's at."
10018070-14 = "Think of it as a test of will."
10018070-15 = "Do we have the determination to seek the ultimate taste no matter the danger?"
10018070-16 = "There is no meal better than one earned."
10018070-22 = "The Gourmet Research Society has a new target: Nyao Foods HQ."
10018070-31 = "Chairman Nyao, I have something to report."
10018070-32 = "Mwahahaha. What is it?"
10018070-33 = "The Gourmet Research Society is heading towards Nyaomoto Foods HQ."
10018070-37 = "What? How did they find us?"
10018070-38 = "Well, it's on the company website."
10018070-39 = "What?! Who told you to put the address on the website?!"
10018070-40 = "You did, Chairman Nyao."
10018070-45 = "Do you always do what people tell you to?!"
10018070-46 = "I... What? I mean, when they pay me to, yeah?"
10018070-51 = "..."
10018070-52 = "Mwahahaha..."
10018070-53 = "Customers so passionate that they're coming straight to us..."
10018070-54 = "It'd be rude not to greet them...hospitably. Mwahahaha."
10018070-55 = "Okay, your attitude has completely changed, and I'm not sure what orders I'm supposed to follow anymore..."
10018070-56 = "Shut up! Call up the reserves! Prepare for battle!"
10018070-57 = "Is that really the best option?"
10018070-59 = "No questions! This is the headquarters of Nyao Foods!"

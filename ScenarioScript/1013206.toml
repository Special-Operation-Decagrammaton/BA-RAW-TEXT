[translation]
1013206-1 = "Save Me...!"
1013206-3 = "It started off as a promise to go to a fashion show together."
1013206-5 = "On Route to the Fashion Show's Venue"
1013206-8 = "So...why were we sprinting?"
1013206-13 = "I-I'm going to be late!"
1013206-14 = "[s1] \" *pant* *pant*...\"\n[s2] \"C-Can we just...slow down a bit, Tsukuyo...?\""
1013206-17 = "I-I'm sorry, Sensei...!"
1013206-18 = "If only I didn't sleep in...!"
1013206-19 = "I couldn't get to sleep last night. I kept thinking about how this would be my last fashion show...!"
1013206-20 = "[s] \"In that case, maybe we should catch a cab?\""
1013206-21 = "A-A car will drive an indirect route! It'll take much longer!"
1013206-22 = "Maybe...we can make it if we take this shortcut!"
1013206-23 = "O-Over here, Sensei!"
1013206-29 = "[ns] \"This is...\""
1013206-30 = "Follow me, Sensei!"
1013206-31 = "I found this path while practicing my parkour!"
1013206-32 = "After we dash through these buildings, it'll be a straight shot to the fashion show!"
1013206-33 = "[s] \"Um, by the way, Tsukuyo...\""
1013206-35 = "[ns] \"...Isn't that a chain-link fence?\""
1013206-36 = "I-It'll be all right, Sensei!"
1013206-37 = "[s] \"Oh, I see. There's a small gate to the side...\""
1013206-38 = "A truly prepared ninja will have no trouble making this vault!"
1013206-39 = "[s] \"Excuse me?!\""
1013206-40 = "I-I'll show you how it's done, Sensei!"
1013206-44 = "Right here... Focus and push with everything you have...!"
1013206-45 = "[s] \"B-But the door's right there!\""
1013206-51 = "[ns3] \"Huh...?\"\n[ns4] \"You actually cleared it...!\""
1013206-57 = "[ns] \"...Wait, I'm not sure you made it...!\""
1013206-60 = "― [log=츠쿠요 드레스]Ugh...[/log][wa:470] "
1013206-62 = "― [log=츠쿠요 드레스]I cleared the fence...somehow...[/log][wa:3650] "
1013206-65 = "― [log=츠쿠요 드레스]But my clothes got stuck...[/log][wa:3600] "
1013206-68 = "― [log=츠쿠요 드레스]And I can't move...[/log][wa:980] "
1013206-71 = "― [log=츠쿠요 드레스]Ugh... I'm sorry...[/log][wa:3390] "
1013206-73 = "― [log=츠쿠요 드레스]It's all because I suggested we take a shortcut...[/log][wa:3450] "
1013206-76 = "― [log=츠쿠요 드레스]...Huh? How are you on the other side, Sensei...?[/log][wa:5590] "
1013206-79 = "― [log=츠쿠요 드레스]What?! There was a gate next to the fence...?![/log][wa:2270] "
1013206-82 = "― [log=츠쿠요 드레스]U-Ughhh...[/log][wa:1110] "
1013206-84 = "― [log=츠쿠요 드레스]Ugh... I didn't know that, I...[/log][wa:1340] "
1013206-87 = "― [log=츠쿠요 드레스]...Sensei, can you free the part[/log][wa:1270] "
1013206-89 = "― [log=츠쿠요 드레스]that got stuck and help me out?[/log][wa:5250] "
1013206-92 = "I carefully helped her untangle her clothing from the fencing so that it wouldn't be damaged."
1013206-93 = "A passing police officer noticed us, which resulted in a small misunderstanding, but..."
1013206-94 = "...we nevertheless made it to the show, fashionably on time."
1013206-96 = "I was a little on edge when I ran into another officer afterward outside the venue."

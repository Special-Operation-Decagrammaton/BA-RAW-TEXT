[translation]
1013206-1 = "ชะ... ช่วยด้วยค่ะ...!"
1013206-3 = "(คุณครูคิดว่าสึคุโยะแค่ชวนไปงานแฟชั่นโชว์ด้วยกันชิลๆ...)"
1013206-5 = "ระหว่างทางไปงานแฟชั่นโชว์"
1013206-8 = "(ว่าแต่ทำไมต้องวิ่งหน้าตั้งไปขนาดนั้นด้วยนะ...?)"
1013206-13 = "ละ... สายแล้วค่ะ สายแล้ว!"
1013206-14 = "[s1] \"แฮ่ก... แฮ่ก...\"\n[s2] \"เราค่อยๆ วิ่งไปเถอะนะ สึคุโยะ...!\""
1013206-17 = "ฮืออ ขะ... ขอโทษค่ะคุณครู...!"
1013206-18 = "ฉันไม่น่านอนตื่นสายเลย...!"
1013206-19 = "ฉันนอนไม่หลับเพราะเอาแต่กังวลว่านี่อาจจะเป็นงานแฟชั่นโชว์ครั้งสุดท้ายแล้วก็ได้น่ะค่ะ...!"
1013206-20 = "[s] \"งั้นครูว่าเรานั่งแท็กซี่ไปน่าจะดีกว่านะ...!\""
1013206-21 = "ถะ... ถ้านั่งแท็กซี่แล้วรถติด เราก็จะยิ่งไปสายนะคะ!"
1013206-22 = "ฉะ... ฉันพอรู้ทางลัดอยู่ ถ้าวิ่งไปทางนั้นก็จะไปถึงเร็วกว่านั่งรถค่ะ..."
1013206-23 = "ทะ... ทางนี้ค่ะคุณครู!"
1013206-29 = "[ns] \"ที่นี่มัน...\""
1013206-30 = "ขะ... เข้ามาทางนี้เลยค่ะ คุณครู!"
1013206-31 = "นี่คือเส้นทางที่ฉันใช้ฝึกปาร์กัวร์ตอนฝึกเป็นนินจาค่ะ..."
1013206-32 = "ถ้าเดินผ่านระหว่างอาคารพวกนี้ไป ก็จะไปถึงสถานที่จัดงานแฟชั่นโชว์ได้เร็วขึ้นค่ะ!"
1013206-33 = "[s] \"แต่ว่า สึคุโยะ...\""
1013206-35 = "[ns] \"ข้างหน้าเป็นรั้วตาข่ายไม่ใช่เหรอ?\""
1013206-36 = "มะ... ไม่เป็นไรหรอกค่ะ คุณครู!"
1013206-37 = "[s] \"อ้อ นั่นสินะ มีประตูอยู่ที่มุมของรั้ว...\""
1013206-38 = "ถ้าฝึกฝนวิชานินจามาอย่างสม่ำเสมอ เราก็ปีนข้ามรั้วตาข่ายแบบนี้ได้ในพริบตาค่ะ!"
1013206-39 = "[s] \"หืม?!\""
1013206-40 = "ฉะ... ฉันจะสาธิตให้ดูนะคะ คุณครู...!"
1013206-44 = "ยืนตั้งมั่นแบบนี้... แล้วก็ออกแรงฮึบเดียวให้สุดพลัง...!"
1013206-45 = "[s] \"แต่ตรงนั้นมีประตูนะ?!\""
1013206-51 = "[ns3] \"ใช้วิชานินจาได้จริงๆ สินะ...?\"\n[ns4] \"กระโดดข้ามรั้วลาดหนามได้จริงเหรอเนี่ย...!\""
1013206-57 = "[ns] \"ข้ามมาได้ยังไงน่ะ ไม่อยากเชื่อสายตาตัวเองเลย...\""
1013206-60 = "― [log=츠쿠요 드레스]อึก... [/log][wa:430] "
1013206-62 = "― [log=츠쿠요 드레스]ฉันข้ามรั้วมาได้แล้วก็จริงค่ะ...[/log][wa:3650] "
1013206-65 = "― [log=츠쿠요 드레스]แต่ว่าชุดมันไปติด...[/log][wa:3880] "
1013206-68 = "― [log=츠쿠요 드레스]ก็เลยขยับไม่ได้ค่ะ...[/log][wa:900] "
1013206-71 = "― [log=츠쿠요 드레스]ฮือ... ขอโทษค่ะ... [/log][wa:3390] "
1013206-73 = "― [log=츠쿠요 드레스]ฉันไม่น่าชวนให้ใช้ทางลัดเลย...[/log][wa:4250] "
1013206-76 = "― [log=츠쿠요 드레스]เอ๋...? คุณครูไปอยู่อีกฝั่งหนึ่งได้ไง...? [/log][wa:5870] "
1013206-79 = "― [log=츠쿠요 드레스]คะ?! มีประตูเล็กๆ อยู่ข้างรั้วเหรอ...?! [/log][wa:2510] "
1013206-82 = "― [log=츠쿠요 드레스]อะ... อึกกก...[/log][wa:950] "
1013206-84 = "― [log=츠쿠요 드레스]ฉันไม่รู้เรื่องนั้นเลย...[/log][wa:1580] "
1013206-87 = "― [log=츠쿠요 드레스]คุณครูคะ... ช่วยแกะชุด[/log][wa:1670] "
1013206-89 = "― [log=츠쿠요 드레스]ที่ไปติดรั้วตาข่ายให้หน่อยได้มั้ยคะ?[/log][wa:5050] "
1013206-92 = "(แล้วคุณครูก็ช่วยแกะชุดที่ไปติดรั้วตาข่ายโดยระวังไม่ให้ผ้าเสียหาย)"
1013206-93 = "(ระหว่างนั้นมีตำรวจมาเห็นจนเกิดเรื่องวุ่นวายเล็กน้อย...)"
1013206-94 = "(แต่สุดท้ายสึคุโยะกับคุณครูก็มาถึงงานแฟชั่นโชว์ทันอย่างหวุดหงิด)"
1013206-96 = "(แต่ตอนออกมาจากสถานที่จัดงานแล้วเห็นตำรวจอีกครั้ง คุณครูก็ตกใจด้วยความกลัว...)"

[translation]
1013206-1 = "請，請救救我……！"
1013206-3 = "（是啊，原本只是約好要一起去時裝秀現場而已……）"
1013206-5 = "前往時裝秀會場的路上"
1013206-8 = "（……為什麼現在正在全速奔跑呢？）"
1013206-13 = "快，快要遲到了！"
1013206-14 = "[s1]「哈啊，哈啊……」\n[s2]「稍，稍微跑慢一點吧，月夜……！」"
1013206-17 = "嗚嗚……對，對不起，老師……！"
1013206-18 = "要是我沒有睡過頭的話……！"
1013206-19 = "昨晚一想到是最後一場時裝秀，我就緊張得睡不著……！"
1013206-20 = "[s]「話說，搭計程車會不會比較快啊……！」"
1013206-21 = "搭，搭車因為要繞路，所以會更慢！"
1013206-22 = "走，走捷徑的話，就會快很多……"
1013206-23 = "請，請往這邊，老師！"
1013206-29 = "[ns]「這裡是……」"
1013206-30 = "請，請從這邊進來，老師！"
1013206-31 = "這是我在忍者修行中，訓練跑酷時發現的路……"
1013206-32 = "只要從這些建築之間穿過去，就能直達時裝秀的會場了！"
1013206-33 = "[s]「可是月夜……」"
1013206-35 = "[ns]「……前面那個，不是鐵柵欄嗎？」"
1013206-36 = "沒，沒問題的，老師！"
1013206-37 = "[s]「啊，說的也是。鐵柵欄的邊緣有個小側門……」"
1013206-38 = "身為一名修行不懈的忍者……這種高度的鐵柵欄，我一下就能翻過去了！"
1013206-39 = "[s]「什麼！？」"
1013206-40 = "我，我先示範給老師看……！"
1013206-44 = "像這樣從這裡……一鼓作氣……！"
1013206-45 = "[s]「那個，我不是說旁邊有小側門嗎！？」"
1013206-51 = "[ns3]「咦……？」\n[ns4]「真的跳過鐵柵欄了……！」"
1013206-57 = "[ns]「……不對，那樣能算跳過去了嗎？」"
1013206-60 = "― [log=츠쿠요 드레스]嗚嗚……[/log][wa:550] "
1013206-62 = "― [log=츠쿠요 드레스]雖然，設法翻過了柵欄……[/log][wa:4450] "
1013206-65 = "― [log=츠쿠요 드레스]衣服卻被勾住……[/log][wa:4360] "
1013206-68 = "― [log=츠쿠요 드레스]變得動彈不得……[/log][wa:1420] "
1013206-71 = "― [log=츠쿠요 드레스]嗚嗚……對不起……[/log][wa:3790] "
1013206-73 = "― [log=츠쿠요 드레스]都怪我想走捷徑，才會這樣……[/log][wa:4890] "
1013206-76 = "― [log=츠쿠요 드레스]……奇怪？老師是怎麼到對面去的……？[/log][wa:6830] "
1013206-79 = "― [log=츠쿠요 드레스]咦？柵欄旁邊，有個小門……！？[/log][wa:3510] "
1013206-82 = "― [log=츠쿠요 드레스]嗚嗚……[/log][wa:1350] "
1013206-84 = "― [log=츠쿠요 드레스]我居然沒發現，就這樣……[/log][wa:2100] "
1013206-87 = "― [log=츠쿠요 드레스]老師……我的衣服，[/log][wa:2190] "
1013206-89 = "― [log=츠쿠요 드레스]能請您稍微，幫我拉一下嗎？[/log][wa:5970] "
1013206-92 = "（之後小心翼翼地將衣服和鐵柵欄分開，以免傷到布料）"
1013206-93 = "（雖然因為在過程中引起警察的注意，引發了一點小爭執……）"
1013206-94 = "（幸好最後總算是準時抵達了時裝秀會場）"
1013206-96 = "（……不過在離開會場再次遇到警察時，心臟還是抖了一下）"

[translation]
2600506-1 = "You Are My Sunshine"
2600506-2 = "(I bought the new dessert Yoshimi mentioned and then went to Trinity's first floor where Yoshimi's classroom is.)"
2600506-3 = "(Class is still in session, so her shoe locker should be unguarded.)"
2600506-4 = "[s] Put the dessert in Yoshimi's shoe locker."
2600506-6 = "Stop right there, you perv!"
2600506-9 = "What do you think you're doing? I don't know who you are, but you're not getting out of this!"
2600506-10 = "I'll restrain you and hand you over to the Justice Task Force, and then..."
2600506-11 = "...?"
2600506-12 = "Sensei? Why are you here?"
2600506-13 = "What are you doing at my shoe locker?"
2600506-14 = "[s1] \"I had some business to attend to.\"\n[s2] \"Sniffing around like a pervert, according to you.\""
2600506-15 = "That wouldn't be surprising."
2600506-16 = "I don't know what business you had snooping around a girl's shoe locker, though..."
2600506-17 = "Argh! Shut up!"
2600506-18 = "You bring it upon yourself, you know that?!"
2600506-19 = "You never pay attention to what I say!"
2600506-20 = "Wait. You put something inside. What is it?"
2600506-23 = "Is that a...?!"
2600506-24 = "Cafe Mille-Feuille's new menu item: the Sunshine Mousse!"
2600506-25 = "H-How did you get this? And more importantly..."
2600506-26 = "...did you come all the way here to give me this?"
2600506-27 = "Sensei..."
2600506-28 = "Huh? Why am I here when class isn't over yet?"
2600506-29 = "I didn't cut class! It happened to end early, so I came to my locker!"
2600506-30 = "The instructor robot got a stomachache and had to go to the infirmary..."
2600506-31 = "...What?"
2600506-32 = "You think I ran over here because I figured you out and wanted to see you?"
2600506-33 = "How would I know?! I wouldn't have reacted so dramatically if I knew! Cut the crap!"
2600506-34 = "What do you mean I wanted to see you? You've got some nerve!"
2600506-35 = "..."
2600506-36 = "..."
2600506-37 = "...Haha."
2600506-38 = "Well, anyway. Let's get out of here."
2600506-39 = "Or else my classmates are gonna come here and make fun of us."
2600506-40 = "That won't be good for you either, right? You're supposed to be the professional one."
2600506-41 = "I thought of a place we can go. I'll buy you a drink."
2600506-42 = "[s] Go outside with Yoshimi."
2600506-49 = "― Wow.[wa:1340] "
2600506-51 = "― You never fail to surprise me.[wa:1100] "
2600506-54 = "― You're so unpredictable.[wa:700] "
2600506-57 = "―What's that look you're giving me?[wa:1480] "
2600506-59 = "― I know you're planning some funny business![wa:1340] "
2600506-62 = "― Don't toy with me, Sensei![wa:1140] "
2600506-64 = "― You better stop it, or I'm gonna get really mad.[wa:10] "
2600506-67 = "― Well... It's not like I completely hate it when you tease me...I guess...[wa:2380] "
2600506-69 = "― Heehee."
2600506-72 = "― (Maybe one day...)[wa:900] "
2600506-74 = "― (...One day we'll get to walk side-by-side again.)[wa:3340] "
2600506-77 = "Heehee."
2600506-78 = "Come to think of it, this is the first time someone's brought me something without me having to ask for it."
2600506-79 = "It'd be a shame to just stuff my face with it."
2600506-80 = "Maybe I'll keep it in the permanent dessert fridge."
2600506-81 = "...Hm?"
2600506-82 = "You really wanted to find out what the Sunshine Mousse tastes like?"
2600506-83 = "Seriously?! You didn't get your own? I thought you would've bought one for yourself to try..."
2600506-84 = "Hmm..."
2600506-85 = "Actually, this works out."
2600506-86 = "The cafe we're going to only sells drinks, no desserts or anything."
2600506-87 = "As long as you get a drink, you can bring in whatever outside food you want."
2600506-88 = "...You don't get it?"
2600506-89 = "We can take the Sunshine Mousse there and eat it together!"
2600506-90 = "...What do you think?"
2600506-91 = "What?"
2600506-92 = "Am I okay with eating my one and only Sunshine Mousse?"
2600506-93 = "Well... If it weren't for you, I wouldn't have even had it in the first place, you know."
2600506-94 = "And on top of that..."
2600506-95 = "If it's you, I guess I don't mind sharing it, Sensei."
2600506-96 = "..."
2600506-98 = "Wh-What's with that look? ...S-Stop laughing! Ugh, you're so annoying!"
2600506-99 = "Argh! Stop, stop!"
2600506-100 = "I said, stop it!"
2600506-102 = "Yoshimi punched and yelled at me the entire way to the cafe."
2600506-103 = "We finished our drinks and the Sunshine Mousse, and then I sent Yoshimi safely home."

[translation]
2600506-1 = "You are my sunshine"
2600506-2 = "(ซื้อขนมออกใหม่ที่โยชิมิพูดถึงแล้วไปที่อาคารเรียนชั้น 1 ในทรีนิตี้ที่โยชิมิเรียนอยู่)"
2600506-3 = "(ยังคงเป็นเวลาในคาบเรียนอยู่ บริเวณล็อกเกอร์เก็บรองเท้าจึงไม่มีใครอยู่)"
2600506-4 = "[s] วางขนมหวานไว้ในล็อกเกอร์รองเท้าของโยชิมิ"
2600506-6 = "หยุดตรงนั้นเลยนะ คนโรคจิต!"
2600506-9 = "กำลังทำอะไรอยู่น่ะ? ฉันไม่รู้ว่านะว่าเป็นใคร แต่ไม่มีทางรอดฉันไปได้แน่ๆ!"
2600506-10 = "ฉันจะจับส่งไปให้กับชมรมทวงความยุติธรรม แล้วก็..."
2600506-11 = ".......?"
2600506-12 = "เอ๊ะ...? อะไรน่ะคุณครูงั้นเหรอ? ....ทำไมครูมาอยู่นี่ล่ะ?"
2600506-13 = "....มาทำอะไรที่ล็อกเกอร์รองเท้าของฉันน่ะ?"
2600506-14 = "[s1] \"ครูมีธุระที่ต้องทำ\"\n[s2] ดมให้เหมือนกับโรคจิตตามที่ว่า"
2600506-15 = "อ่า... ใช่ ไม่แปลกใจเท่าไร"
2600506-16 = "ฉันไม่รู้หรอกนะว่าครูมีธุระอะไรที่ต้องมาด้อมๆ มองๆ อยู่ที่ล็อกเกอร์รองเท้าผู้หญิง..."
2600506-17 = "อ้าก! หยุดนะ!! ขอร้องล่ะ!!"
2600506-18 = "ครูพูดขึ้นมาเองนะ รู้ใช่มั้ย?!"
2600506-19 = "ครูไม่เคยฟังสิ่งที่ฉันพูดบ้างเลย...!"
2600506-20 = ".....หือ? ใส่อะไรเข้าไปน่ะ? มันคืออะไรเหรอ?"
2600506-23 = "นี่มัน...?!"
2600506-24 = "เมนูใหม่ของคาเฟ่มิลเฟย <ซันไชน์มูส> นี่นา!"
2600506-25 = "คะ... ครูไปได้มันมายังไง? แล้วที่สำคัญ..."
2600506-26 = "...ครูมาถึงที่นี่เพื่อเอามาให้ฉันงั้นเหรอ?"
2600506-27 = "คุณครู..."
2600506-28 = ".....หือ? ทำไมฉันถึงมาอยู่ที่นี่ทั้งที่ยังไม่หมดคาบน่ะเหรอ?"
2600506-29 = "ฉันไม่ได้โดดเรียนนะ! วันนี้แค่เลิกเร็ว ฉันก็เลยมาที่ล็อกเกอร์!"
2600506-30 = "หุ่นยนต์ผู้สอนปวดท้องเลยต้องไปที่ห้องพยาบาลน่ะ..."
2600506-31 = "...อะไรนะ?"
2600506-32 = "...คิดว่าฉันมาที่นี่เพราะฉันรู้ทันครูและอยากมาเจอครูอย่างนั้นน่ะเหรอ?"
2600506-33 = "ฉันจะไปรู้ทันได้ยังไง?! ฉันคงจะไม่เล่นใหญ่ขนาดนี้ถ้าฉันรู้! กลับเข้าเรื่องดีกว่า!!"
2600506-34 = "แล้วก็นะ มันหมายความว่ายังไงที่ว่าฉันอยากเจอครูน่ะ? กล้าพูดทีเดียวเลยนะ!!"
2600506-35 = "......."
2600506-36 = "......."
2600506-37 = "...คิกคิก"
2600506-38 = "ช่างเถอะ ออกไปจากตรงนี้กันก่อนดีกว่า"
2600506-39 = "ไม่อย่างนั้นเดี๋ยวพวกเพื่อนในห้องมาเจอแล้วจะมาล้อพวกเราเอานะ"
2600506-40 = "มันจะไม่ดีกับครูด้วยเหมือนกันใช่มั้ยล่ะ? ในเมื่อครูควรจะต้องมีความเป็นมืออาชีพ"
2600506-41 = "ฉันรู้แล้วล่ะว่าเราจะไปที่ไหนกันดี ฉันจะเลี้ยงเครื่องดื่มให้ครูเอง"
2600506-42 = "[s] ออกไปข้างนอกกับโยชิมิ"
2600506-49 = "― จริงๆ เลย...[wa:1020] "
2600506-51 = "― จะบอกว่าคุณครูทำฉันตกใจทุกครั้งเลยได้มั้ยนะ...[wa:460] "
2600506-54 = "― หรือจะบอกว่าเดาทางไม่ออกดีนะ...[wa:420] "
2600506-57 = "― หืม...? ทำไมถึงจ้องกันแบบนั้นล่ะ?[wa:1480] "
2600506-59 = "― นี่... คงไม่ได้คิดอะไรแปลกๆ อยู่หรอกใช่มั้ย?[wa:1300] "
2600506-62 = "― ฉันไม่ใช่ของเล่นของคุณครูนะ[wa:1100] "
2600506-64 = "― ถ้าไม่ล้อเล่นกันแค่พอดีๆ ฉันจะโกรธจริงๆ แล้วนะ[wa:10] "
2600506-67 = "― เปล่าหรอก ที่จริง... ฉันก็ไม่ได้เกลียดอะไรขนาดนั้นหรอก...[wa:3020] "
2600506-69 = "― ฮุฮุ..."
2600506-72 = "― (สักวันหนึ่ง...)[wa:980] "
2600506-74 = "― (วันที่จะได้เดินเคียงข้างกันไปแบบนี้คงจะมาถึงใช่มั้ย...?)[wa:3060] "
2600506-77 = "...ฮิฮิ"
2600506-78 = "พอมาคิดดูแล้ว นี่เป็นครั้งแรกที่มีคนเอาของมาให้โดยที่ฉันไม่ได้ขอเลยละ"
2600506-79 = "พอคิดแบบนั้น พอจะกินของที่คุณครูให้มา... มันก็เลยรู้สึกเสียดายน่ะ..."
2600506-80 = "ฉันควรเก็บมันไว้ในช่องฟรีซในห้องชมรม เพื่อจะได้เก็บมันไว้ตลอดไปดีหรือเปล่านะ?"
2600506-81 = "หืม...?"
2600506-82 = "ตอนนี้อยากรู้ว่า <มูสซันไชน์> รสชาติเป็นยังไงงั้นเหรอ?"
2600506-83 = "เอ๋? ครูซื้อมาแค่ชิ้นเดียวงั้นเหรอ? นึกว่าครูจะซื้อเอาไว้ลองเองด้วยอีกสักชิ้นซะอีก"
2600506-84 = "ฮึ่ม..."
2600506-85 = "ความจริงมันอาจจะดีกว่าก็ได้"
2600506-86 = "คาเฟ่ที่เราจะไปน่ะ ขายแค่เครื่องดื่ม ไม่มีขนมหวานขายหรอกนะ"
2600506-87 = "แค่สั่งเครื่องดื่มที่ร้าน พวกเขาก็ยอมให้เอาของกินจากข้างนอกมากินได้แล้วละ"
2600506-88 = "...มันหมายความว่ายังไงน่ะเหรอ?"
2600506-89 = "หึหึ ก็หมายความว่าเราไปที่นั่น แล้วกินมูสซันไชน์ด้วยกันได้ยังไงละ"
2600506-90 = "เป็นไง ไอเดียดีเลยใช่มะ?"
2600506-91 = "...อะไรนะ?"
2600506-92 = "สงสัยว่ามีอยู่แค่ชิ้นเดียว เอามากินแบบนี้จะไม่เป็นไรแน่น่ะเหรอ?"
2600506-93 = "ก็นะ... แล้วยังไงละ ถึงยังไงถ้าคุณครูไม่ซื้อมาให้ ฉันก็คงไม่ได้กินตั้งแต่แรกอยู่แล้วนี่นา"
2600506-94 = "แล้วอีกอย่าง..."
2600506-95 = "ฉันจะแบ่งกินด้วยกันกับคุณครูนี่นา... ไม่ใช่ใครอื่นสักหน่อย..."
2600506-96 = "......"
2600506-98 = "ทะ...ทำไมทำหน้าอย่างนั้นละ! อย่ามาหัวเราะเยาะนะ! ก็บอกว่าอย่าหัวเราะไงเล่า! น่าโมโหชะมัดเลย!"
2600506-99 = "กรี๊ดดด-!! หยุดดด หยุดเดี๋ยวนี้เลยนะ!!"
2600506-100 = "ฉันบอกให้หยุดไงเล่าาาาาา-!!"
2600506-102 = "(จากนั้นคุณครูกับโยชิมิก็เดินไปคาเฟ่ด้วยกัน แน่นอนว่าคุณครูโดนโยชิมิทุบหลังไปด้วยตลอดทาง...)"
2600506-103 = "(หลังจากดื่มน้ำและกินขนมหวานที่คาเฟ่เสร็จแล้ว คุณครูก็ไปส่งโยชิมิ)"

[translation]
2600506-1 = "近在咫尺的陽光"
2600506-2 = "（買好喜美所說的甜點新品，來到三一學園大樓）"
2600506-3 = "（大概是因為還在上課中，所以樓梯口附近沒有任何人）"
2600506-4 = "[s] 把點心放進喜美的鞋櫃"
2600506-6 = "……那邊的變態，手舉起來！"
2600506-9 = "在人家的鞋櫃前面偷偷摸摸地幹什麼？算了，你也不用回答，但也別以為可以順利逃跑！"
2600506-10 = "不管怎樣，我要直接把你帶去實現正義部……"
2600506-11 = "……？"
2600506-12 = "……咦，老師？#n……老師怎麼會在這裡？"
2600506-13 = "……而且，你在我的鞋櫃前做什麼？"
2600506-14 = "[s1] 「那個，因為有點事……」\n[s2] 「……這味道，讓人上癮呢。」"
2600506-15 = "有事……？"
2600506-16 = "……你在上課時間跑到女高中生的鞋櫃前，是能有什麼事？"
2600506-17 = "唔欸……！？喂，夠了！！笨蛋！！！"
2600506-18 = "你到底要我說多少次，不要再這樣裝傻戲弄人了！？"
2600506-19 = "你到底把我當成什麼啊……！"
2600506-20 = "……這是什麼？你放了什麼進去……？"
2600506-23 = "咦？這個……！！"
2600506-24 = "這不是「Café．Mille-feuille」的新作品「陽光慕斯」嗎！？"
2600506-25 = "你，你是怎麼買到的？不，重點是……"
2600506-26 = "你特地來送這個？就只因為買了要送過來，專程跑到三一？"
2600506-27 = "……"
2600506-28 = "嗯？你說現在還是上課時間，我怎麼會跑出來？"
2600506-29 = "慢著，我才沒有翹課！我只是因為提早下課，所以才早點出來而已！"
2600506-30 = "我們班的講課機器人，好像因為肚子痛還怎麼樣，被緊急送去保健室……"
2600506-31 = "……什麼？"
2600506-32 = "你說這情境，就像是我們兩人一起翹課要去哪裡玩一樣？"
2600506-33 = "你是笨蛋嗎！？你真的是笨蛋對吧！？到底在說什麼蠢話！？"
2600506-34 = "怎，怎麼可以做那種事！？真的很莫名其妙！！你是頭殼壞掉了嗎！？"
2600506-35 = "呼嗚，呼……"
2600506-36 = "……"
2600506-37 = "……呵呵。"
2600506-38 = "算了，今天罵到這裡就好了。反正請你快點出去。"
2600506-39 = "其他學生也越來越多了，再待下去會引人側目的……"
2600506-40 = "那樣老師也會很困擾吧。"
2600506-41 = "我剛好想到一個好地方。我請你喝杯飲料吧，就當作是謝禮。"
2600506-42 = "[s] 和喜美一起出去"
2600506-49 = "― 真的是，[wa:1340] "
2600506-51 = "― 該說總是被老師嚇到，[wa:1900] "
2600506-54 = "― 還是該說一直被老師耍得團團轉呢……[wa:980] "
2600506-57 = "― ……嗯？你看什麼看得目不轉睛？[wa:2200] "
2600506-59 = "― 我說，你該不會又在想一些奇怪的事吧？[wa:2340] "
2600506-62 = "― 我可不是老師的玩具。[wa:1780] "
2600506-64 = "― 不適可而止的話，我真的會生氣喔。[wa:1140] "
2600506-67 = "― ……不過，我也不是真的打從心底討厭……[wa:4540] "
2600506-69 = "― ……呵呵。"
2600506-72 = "― （總有一天……）[wa:1300] "
2600506-74 = "― （有朝一日……能像這樣站在身旁……堂堂正正並肩走著的日子……）[wa:4100] "
2600506-77 = "……嘻嘻。"
2600506-78 = "仔細想想，這還是第一次有人急著把我想要的東西買來給我。"
2600506-79 = "一這麼想，就覺得把它吃掉會有點可惜……"
2600506-80 = "在社團冷凍庫放一份永久保存似乎也不錯……"
2600506-81 = "……嗯？"
2600506-82 = "話說回來，老師不好奇「陽光慕斯」是什麼味道嗎？"
2600506-83 = "……什麼？難道你只有買一份嗎？買都買了，怎麼不連自己的份也買呢？"
2600506-84 = "嗯……"
2600506-85 = "……不對，這樣反而也不錯。"
2600506-86 = "那個，我們現在要去的咖啡廳只有賣飲料，沒有提供點心。"
2600506-87 = "所以只要有點人頭數的飲料，就能自由外帶食物進去，而且不會限制食物份量。"
2600506-88 = "……所以，你知道我想說什麼了吧？"
2600506-89 = "就是……！我們兩個人，可以一起在那邊吃……"
2600506-90 = "還是說，你不願意？"
2600506-91 = "……咦？"
2600506-92 = "你說只買了一份，吃掉沒有關係嗎？"
2600506-93 = "這本來就是老師幫我買來的、我買不到的東西。"
2600506-94 = "而且……"
2600506-95 = "我想……和老師一起吃……"
2600506-96 = "……"
2600506-98 = "你，你那是什麼表情！？等，你把我當笨蛋嗎！？有什麼好笑的！？"
2600506-99 = "氣死人了……！好了不講了不講了！這個話題結束！結束！！"
2600506-100 = "好了，不快點我可要丟下你了！還有，你要竊笑到什麼時候啊！！我不是叫你不要笑了嗎！！"
2600506-102 = "（之後一邊被喜美打著後背，一邊往咖啡廳前進）"
2600506-103 = "（在咖啡廳享用完飲料跟帶去的甜點後，便把喜美送了回去）"

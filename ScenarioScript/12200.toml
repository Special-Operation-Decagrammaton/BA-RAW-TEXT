[translation]
12200-1 = "#title;제20화;에필로그"
12200-2 = "3;아야네;03;안녕하세요, 선생님. 좋은 아침입니다!\n#3;greeting\n#3;a\n#3;em;[반짝]"
12200-3 = "3;아야네;01;아비도스 대책위원회의 하루는 또 바쁘게 시작됩니다."
12200-4 = "3;아야네;01;대책위원회는 선생님의 공식 인증으로 아비도스 학교의 정식 동아리로 승인받았습니다."
12200-5 = "3;아야네;05;이것 때문에 큰 곤욕을 치렀으니까, 확실하게 해 두고 싶다는 이유 때문인데요.\n#3;em;[반응]"
12200-6 = "3;아야네;01;덕분에 대책위원회는 아비도스 학생회의 역할을 떠 안게 되었어요."
12200-7 = "3;아야네;99;개인적으로는 학생회장 자리를 호시노 선배가 맡아주었으면 했지만, 본인이 극구 반대해서…….\n#3;em;…"
12200-8 = "3;아야네;01;학생회장 자리는 아직 공석이에요."
12200-9 = "#all;hide"
12200-10 = "3;알바세리카;03;어서 오세요! 시바세키 라멘입니다!\n#3;a\n#3;greeting\n#3;em;[반짝]"
12200-11 = "3;알바세리카;03\n#3;h"
12200-12 = "#na;아야네;시바세키 라멘은 포장마차로 다시 오픈했어요."
12200-13 = "3;알바세리카;12\n#3;h\n#3;m2\n#3;em;[재잘]\n#wait;1500"
12200-14 = "3;알바세리카;03\n#3;h\n#3;m4\n#3;hophop\n#3;em;[반짝]\n#wait;1000"
12200-15 = "#na;아야네;장사가 잘 되고 있어서 세리카 쨩도 아르바이트 자리를 다시 구할 수 있게 되었구요."
12200-16 = "3;알바세리카;12\n#3;h\n1;마스터;01\n#1;ar\n#1;em;[음표]\n#wait;1500"
12200-17 = "#na;아야네;마스터도 의욕에 넘쳐서 일을 하고 계셔서…… 은퇴는 한참 미뤄진 것 같아요."
12200-18 = "#all;hide"
12200-19 = "#na;아야네;호시노 선배의 사건은 선생님의 활약으로 해결되었지만 아비도스의 빚은 여전히 9억엔이에요……. 뭐, 이건 처음과 다를게 없지만……."
12200-20 = "#na;아야네;카이저 론은 블랙 마켓에서의 불법 금융 거래가 들통나 총학생회의 수사를 받는다고 해요."
12200-21 = "#na;아야네;히후미 씨가 트리니티 쪽에 손을 써 준 걸까요……."
12200-22 = "#na;아야네;솔직히 총학생회가 어디까지 수사할 수 있을지 미심쩍지만……. 그래도 카이저 론은 예전만큼 불법을 횡행하진 못할 거라고 생각해요."
12200-23 = "#na;아야네;PMC 이사는 그 사건 이후 불법 학생 납치극의 주요 용의자가 되어서 지명수배를 받았다고 합니다."
12200-24 = "#na;아야네;카이저 코퍼레이션에서도 자기들과는 관계없다고 선을 긋고는 해고처리가 되었다고 하네요. 기업이란 저런 느낌인가봐요……."
12200-25 = "#na;아야네;멋대로 올려버린 이자 또한 문제가 되어서, 아비도스는 예전보다는 훨씬 적은 이자를 내게 되었어요. 이건 좋은 일이네요."
12200-26 = "#na;아야네;지금도 수배 중이지만, 총학생회가 업무 마비인 상태여서 쉽게 잡히진 않을 것 같아요."
12200-27 = "#all;hide"
12200-28 = "#na;아야네;아비도스의 자치구 대부분은…… 여전히 카이저 코퍼레이션의 소유로 남아 있습니다."
12200-29 = "#na;아야네;아비도스와 카이저의 거래 자체는 유효하니까요."
12200-30 = "#na;아야네;그곳에서 무슨 일을 벌이고 있는지는…… 여전히 공개하고 있지 않고 있지만요……."
12200-31 = "#all;hide"
12200-32 = "#na;아야네;아, 흥신소 분들은 또 어딘가에서 사무실을 차린 것 같은데요……."
12200-33 = "#na;아야네;소문엔 게헨나 자치구로 돌아갔다는 얘기도 있고, 다른 곳으로 갔다는 얘기도 있어서, 자세히는 모르겠지만……."
12200-34 = "#na;아야네;또 나쁜 짓을 저지르진 않을지 선도부가 예의 주시하고 있다고 하니…… 이래저래 고민이 많을 것 같네요."
12200-35 = "#all;hide"
12200-36 = "#na;아야네;그 검은 양복이라는 사람은……."
12200-37 = "#na;아야네;선생님과 호시노 선배에게 듣긴 했지만…… 그 어디에서도 그 사람의 정보를 찾을 수는 없었어요."
12200-38 = "#na;아야네;모든 죄는 카이저 이사에게 넘어갔고……. 그 사람의 이름도, 정체도 모르는 상황이라……."
12200-39 = "#na;아야네;저는 더이상은 알 수 없기에, 나머지는 <샬레>에 맡기는 것으로 하겠습니다."
12200-40 = "#all;hide"
12200-41 = "3;아야네;01;……자, 그러면 아비도스 대책위원회 정기 회의를 시작하겠습니다.\n#3;greeting\n#3;a\n#3;em;[반응]"
12200-42 = "3;아야네;05;지금까지 꽤 많은 일들이 있었지만, 빚이 사라진 것은 아니에요."
12200-43 = "1;시로코;02;하지만 매달 상환해야 하는 이자는 줄었어.\n#1;a\n#1;em;[반응]"
12200-44 = "5;호시노;00;그렇지~ 우리 부담은 줄어든 게 맞으니까. 그러니까 이 기회에 좀 더 낮잠을…….\n#5;em;[음표]\n#5;greeting"
12200-45 = "1;노노미;03;응! 다들 그동안 너무 바빴으니까, 이번 기회에 휴가라도 가는 게 어떨까요?\n#1;em;[반짝]\n#1;a\n#1;hophop"
12200-46 = "5;세리카;06;무슨 소리야!! 조금은 여유가 생겼을지도 모르겠지만, 한가하게 있을 때가 아니라고!\n#5;em;[반응]\n#5;a"
12200-47 = "3;아야네;09;세리카 쨩……."
12200-48 = "5;세리카;05;대책위원회 회계 담당으로써 말하겠는데, 지금도 우리는 위기야! 위기가 아니었던 때가 없었다고!\n#5;em;[!]"

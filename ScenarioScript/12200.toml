[translation]
12200-1 = "Episode 20; Epilogue"
12200-2 = "Good morning, Sensei!"
12200-3 = "Today's a big day for the Abydos Foreclosure Task Force."
12200-4 = "With Sensei's official approval, we're finally recognized as an official club of Abydos Academy."
12200-5 = "This has been a long time coming and everyone's worked so hard, so I wanted to make sure that everything went smoothly today."
12200-6 = "It also means the Foreclosure Task Force has officially taken over the role of the Student Council. "
12200-7 = "I thought it would only be fitting that Hoshino become the official president too, but she adamantly refused..."
12200-8 = "So for now, the position remains vacant."
12200-10 = "Welcome to Shiba Seki Ramen!"
12200-12 = "So it really is making a comeback as a food stall, huh?"
12200-15 = "Business is booming, so Serika was able to get her part-time job back as well."
12200-17 = "Master is working harder than ever... Looks like retirement is off the table for a long while."
12200-19 = "Thanks to your efforts, Hoshino's case was resolved...but Abydos still carries a debt of 900 million yen. Well, I guess nothing's really changed there..."
12200-20 = "As for Kaiser Loan, their illegal dealings in the Black Market have been exposed, and now the General Student Council is investigating them."
12200-21 = "Maybe Hifumi pulled some strings with Trinity...?"
12200-22 = "I'm skeptical that the General Student Council will be able to do much to Kaiser, but this should at least make them think twice about pulling any shady business deals."
12200-23 = "I heard that the PMC Director has a warrant out for his arrest for kidnapping a student after what happened."
12200-24 = "Kaiser Corporation was quick to distance themselves, claiming they had nothing to do with it. They even fired everyone involved... I guess that's just how corporations work."
12200-25 = "Luckily, they're reversing course on that arbitrary interest rate from before, so Abydos won't have to pay nearly as much as we thought."
12200-26 = "The director is still wanted, but capturing him will be difficult with how much the General Student Council has on their plate."
12200-28 = "As for the Abydos district...most of it is still Kaiser Corporation property."
12200-29 = "That's because the transaction between Abydos and Kaiser itself was valid."
12200-30 = "Still, we don't know what they plan to do within their property."
12200-32 = "Oh, and I heard Problem Solver 68 opened up a new office somewhere..."
12200-33 = "Rumor has it they've went back to the Gehenna District, though some say they've gone elsewhere. No one knows for sure..."
12200-34 = "But with the Prefect Team keeping a close watch, I'm sure they've got plenty to worry about."
12200-36 = "Also, the man called Black Suit..."
12200-37 = "I heard about him from you and Hoshino, but I wasn't able to dig up any info about him."
12200-38 = "All the blame fell on the Kaiser Director...and as for Black Suit, we don't even know his name or identity."
12200-39 = "There's nothing more I can uncover, so I'll leave the rest to Schale."
12200-41 = "Everyone ready? It's time for the Abydos Foreclosure Task Force meeting."
12200-42 = "Even after everything that happened, the debt remains our top priority."
12200-43 = "At least the monthly interest payments have gone down."
12200-44 = "Great. Less time to spend working, and more time to spend napping."
12200-45 = "Yup, yup! And since we've all been working so hard, why don't we take this chance to go on a vacation?"
12200-46 = "What do you mean? We might have a little breathing room, but this is NOT the time to be relaxing!"
12200-47 = "Serika..."
12200-48 = "As the treasurer, I'm telling you—we're still in crisis! In fact, when were we NOT in crisis?"
12200-49 = "U-Um..."
12200-50 = "So, we need to keep up with the latest trends!"
12200-52 = "Look at this! Do you know what this is?"
12200-53 = "Some kind of computer part?"
12200-54 = "This is a GPU! And with it, we can mine Scam Coins—a cutting-edge digital currency!"
12200-55 = "Digital currency is basically—hey, what's with those faces?! Why are you all looking at me like that?!"
12200-56 = "I have a better idea. Here—take a look at this."
12200-57 = "Denied!"
12200-58 = "...The same old Foreclosure Task Force."
12200-59 = "They say the more things change, the more they stay the same...but I think we're closer than ever."
12200-60 = "Ahaha..."
12200-64 = "We'll be counting on you, Sensei."
12200-65 = "Things Lost and Others Held On To"
12200-67 = "The Foreclosure Task Force Story;To be Continued in Chapter 3"

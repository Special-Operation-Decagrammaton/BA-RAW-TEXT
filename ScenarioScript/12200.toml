12200-53 = "#5;hide\n3;아야네;02;어…… 컴퓨터 부품?\n#3;em;[?]"
12200-54 = "3;세리카;03;이게 GPU라는 거야! 이걸로 스캠 코인이라는 디지털 화폐를 채굴하는 거야! \n#3;hophop\n#3;em;[반짝]"
12200-55 = "3;세리카;04;디지털 화폐가 뭐냐면……. 뭐, 뭐야?! 다들? 표정이 왜 그래?!\n#3;stiff"

[translation]
41060-1 = "第6話;開始籌措糧食吧"
41060-2 = "（隔天早上，為了確認大家是否平安，來到了公園）"
41060-4 = "兔寶寶公園前"
41060-11 = "[ns1] 「嗚哇！？」\n[ns2] 「陷，陷阱……！？」"
41060-16 = "……什麼嘛，是老師啊。"
41060-17 = "動作這麼奇怪，我還以為是可疑人士或野狗跑來了。"
41060-18 = "[s3] 「野狗……」\n[s4] 「在公園設陷阱很危險的吧！？」"
41060-19 = "就算那麼說也沒辦法吧。"
41060-20 = "就算那麼說也沒辦法吧。"
41060-21 = "為了防範入侵者，這種程度的準備還是得做。"
41060-22 = "啊，這不是老師嘛。"
41060-23 = "那裡的腳邊，注意點比較好唷。因為有埋地雷。"
41060-24 = "[s5] 「咦咦！？」\n[s6] 「等等等等，一步也動不了！地雷在哪邊！？」"
41060-25 = "是在哪邊呢……具體的位置忘記了。"
41060-26 = "是在哪邊呢……具體的位置忘記了。"
41060-27 = "總之給它炸炸看就知道啦。"
41060-28 = "[s] 「為什麼接二連三放這麼危險的東西……！？」"
41060-29 = "哪有什麼危險，這是最基本的自衛手段。"
41060-30 = "沒錯沒錯，不如說這樣完全不夠呢！"
41060-31 = "如果可以的話，我還想在公園的外圍部分設置反戰車地雷之類的陷阱呢。"
41060-32 = "[s] 「明顯做過頭了吧……」"
41060-33 = "在警戒上沒有什麼「做過頭」。必須時刻做好萬全的準備。"
41060-34 = "稍微掉以輕心的話，那個像狗狗一樣的警察搞不好又會跑來呢。"
41060-41 = "咲希、萌，"
41060-42 = "有什麼問題嗎？"
41060-43 = "噫，老老，老師……！？"
41060-44 = "……早安。"
41060-45 = "一大早有什麼事嗎？"
41060-46 = "[s7] 「想說來看看大家過得好不好。」\n[s8] 「有什麼困擾的事嗎？」"
41060-47 = "如你所見，什麼問題都沒有。"
41060-48 = "如你所見，什麼問題都沒有。"
41060-49 = "因為SRT特殊學園，很習慣露營生活。"
41060-50 = "這種程度，對SRT來說是家常便飯。"
41060-51 = "是當然的素養。"
41060-53 = "而且這裡可以用水，不如說很舒適呢。"
41060-54 = "陰暗處也很多，很容易躲藏……"
41060-56 = "所以，請你不用在意。"
41060-57 = "也沒什麼問題，快點回去！"
41060-62 = "[ns] 「剛才的是……」"
41060-63 = "……附近好像打雷了呢。"
41060-65 = "那也太牽強了吧……為什麼沒能忍住啊……"
41060-66 = "我也沒辦法，這是生理現象啊！"
41060-67 = "嗚嗚……"
41060-69 = "……我再重申一次，什麼問題都沒有──"
41060-73 = "[ns] 「……真的嗎？」"
41060-74 = "……"
41060-76 = "啊──真是，煩躁起來反而肚子更餓了……"
41060-77 = "那，那個，其實……"
41060-78 = "喔唷對啦，我們什麼都沒吃啦！不行喔！？"
41060-80 = "雖然有水，不過反過來說只有水而已……"
41060-81 = "補給什麼的完全沒有著落……"
41060-82 = "該死，早知道就從SRT把糧食帶來了。"
41060-83 = "與其帶對空導彈，正常思考帶糧食還比較……"
41060-84 = "在說什麼啊，導彈也很重要耶！"
41060-85 = "而且比什麼都漂亮！"
41060-86 = "比起這個，那個一看就很重的手冊才有問題吧。把那個丟掉放食物進去不就好了……"
41060-87 = "笨蛋！"
41060-88 = "學生怎麼能丟掉教戰手冊！"
41060-90 = "就算要去商店買，學校給的戶頭也被停止了……"
41060-91 = "我們肯定，會就這樣餓死的……"
41060-92 = "嗚嗚，好想回SRT……"
41060-96 = "[ns] 從背包取出杯麵"
41060-100 = "那，那是……"
41060-101 = "……杯麵？"
41060-102 = "目清的雞骨醬油拉麵……！我最喜歡的……！"
41060-103 = "[s9] 「我還帶來了其他各種東西。」\n[s10] 「一起吃吧？」"
41060-104 = "……嘛，嘛？老師說什麼也要的話？"
41060-105 = "……嘛，嘛？老師說什麼也要的話？"
41060-107 = "……請等一下。"
41060-108 = "不能輕易收下。"
41060-109 = "在被逼進絕境的狀況下，裝作提供重要物資，再要求回報更重要的東西……"
41060-110 = "這是常有的手段，在弄清楚對方的用意前不能收下。"
41060-111 = "[s] 「不，沒有特別要什麼回報……」"
41060-112 = "哈，你以為我會相信嗎？"
41060-113 = "作戰時，除了自帶的東西以外都不食用也是很正常的。"
41060-114 = "不能保障安全性的食物，怎麼可能輕易放進嘴裡。"
41060-115 = "[s] 打開杯麵的蓋子"
41060-119 = "什……！"
41060-120 = "喂，不是說不吃了嗎！？"
41060-124 = "[ns] 注入熱水"
41060-137 = "咕……！"
41060-138 = "好香……肚子越來越餓了……"
41060-139 = "[s11] 「機會難得，吃吧？」\n[s12] 「要冷掉了唷？」"
41060-142 = "……不用了。我們不會被這種方式動搖意志。"
41060-143 = "一旦上鉤，就會一直被老師的策略牽著鼻子走。"
41060-144 = "怎，"
41060-145 = "怎麼能因為區區一碗杯麵就投降！"
41060-146 = "就，就是啊，如果用更好吃的東西引誘那還好說……"
41060-147 = "[s] 「那總之我先吃了……」"
41060-153 = "唔，咕……！"
41060-154 = "聞起來超香的呀……！"
41060-155 = "才，才不會輸呢……！"
41060-160 = "這種時候就要深呼吸！！"
41060-161 = "大家都有在學園學到，要如何對應藥物拷問對吧！"
41060-162 = "就算大腦被刺激，只要意志不屈服的話就沒問題！用別的方法蒙騙過去！"
41060-167 = "唔，要忍住才行……"
41060-168 = "我們絕對，不會屈服於拷問……！"
41060-172 = "[ns] 加入溫泉蛋"
41060-173 = "……啊。"
41060-175 = "剛才的，該不會是……"
41060-176 = "在這個階段加蛋太犯規了……"
41060-178 = "唔，絕對很好吃……"
41060-179 = "被那麼做的話，已經……"
41060-180 = "……忍不住了！"
41060-181 = "[s] 「……要吃嗎？」"
41060-183 = "要吃！！"
41060-184 = "[s13] 「來。話說回來……果然還是不打算去女武神嗎？」\n[s14] 「至少那樣糧食的問題會比較……」"
41060-189 = "果然是打算動搖我們的忍耐力，再進行交涉。"
41060-190 = "露出真面目了啊，這個惡人。"
41060-191 = "果然，世上都是醜陋的事物……"
41060-193 = "用了很恐怖的手段嘛……"
41060-194 = "不管受到何種對待，我們對學園的感情都不會改變。"
41060-195 = "確實會感到飢餓與不便。但若不這麼做，就沒辦法守護我們的信念。"
41060-196 = "我們不會為了悠遊自在的生活而捨棄它。"
41060-201 = "[ns] 交出帶來的筆記"
41060-203 = "……這是？"
41060-204 = "[s15] 「如果不喜歡被施捨的感覺，那就看看這個吧。」\n[s16] 「總之能讓你們不依賴我就拿到食物。」"
41060-205 = "……只要去這裡，就能拿到些什麼是嗎？"
41060-206 = "……只要去這裡，就能拿到些什麼是嗎？"
41060-207 = "我已經說很多次了，不管怎樣都無法改變我們的心意……"
41060-210 = "（這個人到底在想什麼呢……）"
41060-213 = "……我知道了。雖然不知道是什麼樣的內容，這個我就收下了。"
41060-215 = "終究只是，收下而已。"
41060-220 = "那傢伙，真的是在想什麼啊……"
41060-221 = "老師也是試著要了解我們嗎……"
41060-222 = "太天真了唷，美優。那麼簡單就妥協，會吃苦頭唷？"
41060-223 = "不過剛才的表情還挺認真的。似乎不是想隨便呼嚨人。"
41060-224 = "搞不好今後，還會幫忙復興SRT……"
41060-226 = "筆記上寫的住址就是這裡呢。"
41060-227 = "肚子已經餓到一步都走不動了……"
41060-228 = "……這裡不就是夏萊的辦公室嗎？"
41060-229 = "把我們叫來這裡，到底要……？"
41060-234 = "啊咧，記得差不多該……？"
41060-239 = "那個，我們是[USERNAME]老師介紹來的。"
41060-240 = "啊，恭候多時了……！"
41060-241 = "有從老師那邊聽說了。"
41060-242 = "各位會幫我們處理「廢棄品」對吧！"
41060-243 = "……哈啊？"
41060-244 = "這裡沒什麼客人會來，所以廢棄品很多……非常浪費……"
41060-245 = "雖然每次都放入廚餘用垃圾袋處理，不過那樣也非常麻煩……"
41060-246 = "老師說會有人代為處理的樣子……？#n真是幫大忙了。東西都集中在這邊了。"
41060-253 = "………"
41060-255 = "……啊，啊咧？#n難道是我有什麼誤會嗎……？"
41060-256 = "不，沒問題沒問題！"
41060-257 = "之後就交給我們吧！"
41060-258 = "是，是這樣嗎。那個……雖然和這個沒有關係，各位身體還好嗎？感覺臉色很差……？"
41060-259 = "因為肚子……不，反正說來話長啦！"
41060-260 = "還有其他什麼，例如賞味期限到期的東西嗎？順便全部拿走吧。"
41060-261 = "啊，好！有的，請稍等一下……！"
41060-267 = "等等等等等等！萌，這各種意義上都不好吧！？"
41060-268 = "怎麼能收廢棄便當……！"
41060-269 = "但是這些要丟掉對吧。明明還能吃，很浪費耶。而且確實也沒有「施捨」的感覺。"
41060-270 = "但，但是我們SRT，這種……！"
41060-271 = "嘛，咲希不吃的話也沒關係。"
41060-272 = "我會好好吃掉的。"
41060-276 = "我，我沒有說不吃吧！"
41060-283 = "唔，唔……"
41060-284 = "我們以後要像這樣靠廢棄便當過活啊……"
41060-289 = "[USERNAME]老師……"
41060-290 = "這份恥辱，我不會忘記的……"
41060-292 = "下一話;胡蘿蔔作戰（１）"

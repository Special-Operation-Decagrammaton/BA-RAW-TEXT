[translation]
41060-1 = "第6話;食料調達を始めよう"
41060-2 = "（翌朝、みんなが無事に過ごせているかを確認するため公園を訪れていた）"
41060-4 = "子ウサギ公園前"
41060-11 = "[ns1] \"うわっ！？\"\n[ns2] \"と、トラップ……！？\""
41060-16 = "……なんだ、先生か。"
41060-17 = "何か変な動きしてるから、不審者か野良犬と思った。"
41060-18 = "[s3] \"野良犬って……。\"\n[s4] \"公園に罠とか危ないでしょ！？\""
41060-19 = "そうは言っても仕方ないだろ。"
41060-20 = "そうは言っても仕方ないだろ。"
41060-21 = "侵入者を防ぐためには、これくらいやらないと。"
41060-22 = "あ、先生じゃん。"
41060-23 = "そこの足元、気を付けた方が良いよ。地雷埋まってるから。"
41060-24 = "[s5] \"えぇ！？\"\n[s6] \"待って待って、一歩も動けない！地雷どの辺！？\""
41060-25 = "どの辺だったかな……具体的な場所は忘れちゃった。"
41060-26 = "どの辺だったかな……具体的な場所は忘れちゃった。"
41060-27 = "まあ、爆発したらそこにあるよ。"
41060-28 = "[s] \"どうしてそんな危険なものを次々と……！？\""
41060-29 = "危険も何も、最小限の自衛手段だ。"
41060-30 = "そうそう、何ならこれじゃ全然足りないくらいだよ！"
41060-31 = "できれば公園の外周部分に、対戦車地雷とか色んなトラップを仕掛けておきたいところなのに。"
41060-32 = "[s] \"明らかにやり過ぎなのでは……。\""
41060-33 = "警戒において「やり過ぎ」なんてことはない。常に万全の準備をしておかないと。"
41060-34 = "少し油断したら、またあのワンコみたいな警察がやってくるとも分からないしね。"
41060-41 = "サキ、モエ、"
41060-42 = "何か問題でもありましたか？"
41060-43 = "ひっ、せせ、先生……！？"
41060-44 = "……おはようございます。"
41060-45 = "早朝から何か用ですか？"
41060-46 = "[s7] \"大丈夫かなって思って。\"\n[s8] \"何か困ってることとかある？\""
41060-47 = "見ての通り、何の問題もありません。"
41060-48 = "見ての通り、何の問題もありません。"
41060-49 = "SRT特殊学園は、キャンプ生活に慣れてますから。"
41060-50 = "これくらい、SRTなら朝飯前。"
41060-51 = "当然の素養だ。"
41060-53 = "それにここは水が使えるし、むしろ快適なくらいだね。"
41060-54 = "日陰も多くて、隠れやすいですし……。"
41060-56 = "ですので、気にしなくても大丈夫です。"
41060-57 = "別に何も問題無いから、さっさと帰れ！"
41060-62 = "[ns] \"今のって……。\""
41060-63 = "……雷が近いのかもしれないな。"
41060-65 = "それは無理があるでしょ……どうして我慢できなかったのさ……。"
41060-66 = "仕方ないだろ、生理現象なんだから！"
41060-67 = "うぅ……。"
41060-69 = "……あらためてですが、何も問題はありませんので――"
41060-73 = "[ns] \"……本当に？\""
41060-74 = "……。"
41060-76 = "あーもう、イライラしたら余計にお腹空いてきた……。"
41060-77 = "そ、その実は……。"
41060-78 = "ああもう、何も食べてないんだよ！悪かったな！？"
41060-80 = "水はありますが、逆に言うと水しかありませんから……。"
41060-81 = "補給も何も、あてにはできませんし……。"
41060-82 = "くそっ、こうなるならSRTから食料を持ってくるんだった……。"
41060-83 = "対空ミサイルを持ってくるなら、普通に考えて食料の方が……"
41060-84 = "何言ってんの、ミサイルだって大事じゃん！"
41060-85 = "何よりも綺麗だし！"
41060-86 = "それより、その地味に重い教範の方が問題でしょ。それを捨てて食べ物を入れとけば良かったのに……。"
41060-87 = "バカ！"
41060-88 = "学生が教範を捨てるわけにいかないだろ！"
41060-90 = "お店で買おうにも、学校の口座が停止されてしまってるので……。"
41060-91 = "私たちきっと、このまま飢え死するんだ……。"
41060-92 = "うぅ、SRTに帰りたい……。"
41060-96 = "[ns] カバンからカップ麺を取り出す。"
41060-100 = "あ、あれって……。"
41060-101 = "……カップ麺？"
41060-102 = "ミッシンの鶏ガラ醤油ラーメン……！私の大好物……！"
41060-103 = "[s9] \"他にも色々持ってきたから。\"\n[s10] \"一緒に食べない？\""
41060-104 = "……ま、まあ？先生がどうしてもって言うんなら？"
41060-105 = "……ま、まあ？先生がどうしてもって言うんなら？"
41060-107 = "……待ってください。"
41060-108 = "簡単に受け取ってはいけません。"
41060-109 = "追い詰められた環境において、重要な物資を提供する素振りを見せ、その見返りとしてさらに大事なものを要求する……"
41060-110 = "よくある手口です、真意も分からない段階で受け取るわけにはいきません。"
41060-111 = "[s] \"いや、特に見返りとかは……。\""
41060-112 = "はっ、信じられるとでも思ったか？"
41060-113 = "元々作戦時は、持参したもの以外は胃に入れないなんてのは普通のこと。"
41060-114 = "安全性も保障されてない食べ物を、やすやすと口にするわけ無いだろ。"
41060-115 = "[s] カップ麺の蓋を開ける。"
41060-119 = "なっ……！"
41060-120 = "おい、食べないって言ってるだろ！？"
41060-124 = "[ns] お湯を注ぐ。"
41060-137 = "くぅっ……！"
41060-138 = "良い匂い……ますますお腹空いてきた……。"
41060-139 = "[s11] \"せっかくだし、食べたら？\"\n[s12] \"冷めちゃうよ？\""
41060-142 = "……結構です。そんな形で私たちの意志を折ろうとしても無駄なこと。"
41060-143 = "一度引っ掛かってしまえば、先生の策略に巻き込まれ続けることになりますし。"
41060-144 = "た、"
41060-145 = "たかがカップ麺で降参してたまるか！"
41060-146 = "ま、まあ、もっとご馳走とかで釣られるならまだしも……"
41060-147 = "[s] \"じゃあとりあえずお先に……\""
41060-153 = "うっ、ぐっ……！"
41060-154 = "めちゃくちゃ良い匂いが……！"
41060-155 = "ま、負けてたまるか……！"
41060-160 = "こういう時こそ深呼吸！！"
41060-161 = "薬物を使った拷問への対処として、学園で習っただろ！"
41060-162 = "脳が刺激されたところで、意志が折れなければ問題無い！別の方法で誤魔化すんだ！"
41060-167 = "うぅ、耐えないと……。"
41060-168 = "私たちは決して、拷問には屈しません……！"
41060-172 = "[ns] 温泉卵を入れる。"
41060-173 = "……あ。"
41060-175 = "今の、もしかして……。"
41060-176 = "この段階で卵は反則だわ……。"
41060-178 = "うぅ、絶対美味しい……。"
41060-179 = "あそこまでされたら、もう……"
41060-180 = "……っ、我慢できない！"
41060-181 = "[s] \"……食べる？\""
41060-183 = "食べる！！"
41060-184 = "[s13] \"はい。ところで……やっぱり、ヴァルキューレに行くって手は無し？\"\n[s14] \"少なくとも食糧問題は一旦そうした方が……。\""
41060-189 = "やはり私たちの忍耐力を揺さぶった上で、交渉をしようと。"
41060-190 = "本当の姿を現したな、この下種め。"
41060-191 = "やっぱり、世の中は醜いもの……。"
41060-193 = "おぞましい手段を使ってくるじゃん………。"
41060-194 = "何をされても、私たちの学園に対する気持ちは変わりません。"
41060-195 = "確かに空腹もあります、不便です。それでもこうしなければ、私たちの信念は守れません。"
41060-196 = "それを差し出してまで、悠々自適な生活など要らないのです。"
41060-201 = "[ns] 持ってきたメモを渡す。"
41060-203 = "……これは？"
41060-204 = "[s15] \"情けに見える形が嫌なら、これはどうかなって思って。\"\n[s16] \"とりあえず私からって形じゃなくて、食べ物を貰えるよ。\""
41060-205 = "……ここに行けば、何かがあると？"
41060-206 = "……ここに行けば、何かがあると？"
41060-207 = "何をされても心は変わらないと、既に何度も言ったはずですが……。"
41060-210 = "（本当に、何を考えているのか……）"
41060-213 = "……分かりました。どういった内容かは分かりませんが、これは受け取っておきます。"
41060-215 = "あくまで、受け取るだけです。"
41060-220 = "あいつ、本当に何を考えてるんだ……。"
41060-221 = "先生も、私たちのことを分かってくれようとしてるのかな……。"
41060-222 = "甘いよ、ミユ。そんな簡単に心を許したら、危ない目に遭うよ？"
41060-223 = "でも、さっきの表情は割と真剣だった。てきとうなことを考えてるわけじゃなさそうだ。"
41060-224 = "もしかしたら今後、SRTを復活させるのに手を貸してくれたり……"
41060-226 = "書かれてた住所、ここですね。"
41060-227 = "もうお腹が空きすぎて一歩も歩けない……"
41060-228 = "……ここ、シャーレのオフィスじゃないか？"
41060-229 = "ここに呼んで、一体何を……？"
41060-234 = "あれ、確かそろそろ……？"
41060-239 = "えっと、[USERNAME]先生の紹介で来たんだけど。"
41060-240 = "あっ、お待ちしておりました……！"
41060-241 = "先生からお話は聞いています。"
41060-242 = "「廃棄品」を、代わりに処分してくださるんですよね！"
41060-243 = "……は？"
41060-244 = "ここはあんまりお客さんも来ないので、廃棄品が多いんです……勿体ないのですが……。"
41060-245 = "毎回生ゴミ用のビニール袋に入れて処理するのですが、それも結構手間でして……"
41060-246 = "それを代わりにやってくださる……？というようなことを先生から聞きまして、助かりました。こちらに集めておきましたので。"
41060-253 = "………。"
41060-255 = "……あ、あれ？もしかして何か手違いが……？"
41060-256 = "いや、大丈夫大丈夫！"
41060-257 = "あとは任せて！"
41060-258 = "そ、そうでしたか。えっと……それとは関係ありませんが、体調は大丈夫ですか？何だか顔色が悪いような……？"
41060-259 = "それはお腹が空……いや、まあ色々とあってね！"
41060-260 = "他に何か、賞味期限切れのものとかあるかな？全部持っていくけど。"
41060-261 = "あっ、はい！ありますので、ちょっと待っててください……！"
41060-267 = "待て待て待て！モエ、これは色々ダメだろ！？"
41060-268 = "廃棄弁当を貰うなんて、そんな……！"
41060-269 = "でもこれ捨てられちゃうんでしょ。まだ食べられるのに、勿体ないじゃん。確かにこれは「情け」って感じじゃないし。"
41060-270 = "で、でも私たちSRTが、こんな……！"
41060-271 = "ま、サキが食べないなら別に良いけど。"
41060-272 = "私が美味しく頂くから！"
41060-276 = "た、食べないとは言ってないだろ！"
41060-283 = "うっ、うっ……"
41060-284 = "私たち、これからはこうして廃棄弁当を貰いながら過ごしていくんだ……。"
41060-289 = "[USERNAME]先生……。"
41060-290 = "この屈辱、忘れませんからね……。"
41060-292 = "次回;ニンジン作戦（１）"

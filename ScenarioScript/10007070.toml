10007070-37 = "3;치나츠 온천ND;08;선생님께서는 혹시 게헨나 학원의 <온천개발부>를 알고 계시는지요?\n#3;em;[?]\n#3;closeup"
10007070-38 = "[s5] \"대충은 알고 있어.\"\n[s6] \"온천을 개발하는 동아리지?\""
10007070-39 = "3;치나츠 온천ND;09;예. 온천개발부는 온천을 개발하는 동아리로, 굴착기와 같은 중장비를 사용한 대형 사고를 자주 치기 때문에 게헨나의 문제 동아리 중에서도 악명이 높은 편입니다.\n#3;closeup\n#3;em;[반응]"
10007070-40 = "3;치나츠 온천ND;09;예. 온천개발부는 온천을 개발하는 동아리로, 굴착기와 같은 중장비를 사용한 대형 사고를 자주 치기 때문에 게헨나의 문제 동아리 중에서도 악명이 높은 편입니다.\n#3;closeup\n#3;em;[반응]"
10007070-41 = "3;치나츠 온천ND;07;……지난 하계 합숙 훈련 때도 갑자기 해양 온천을 채굴한다고 고집을 부려 한바탕 소동이 있었지요.\n#3;closeup"
10007070-42 = "3;치나츠 온천ND;99;그나마 다행인 점이라면 그동안은 온천원이 풍부한 게헨나 자치구 내에서만 말썽을 피워왔다는 점 뿐인데……\n#3;closeup"
10007070-43 = "3;치나츠 온천ND;09;이번에는 어찌된 일인지 붉은겨울 학원의 자치구 내에서 온천을 개발하고 있더군요.\n#3;closeup"
10007070-44 = "3;치나츠 온천ND;07;원칙적으로 타 학원의 자치구 내에서의 동아리 활동은 중대한 교칙 위반.\n#3;closeup\n#3;em;[!]"
10007070-45 = "3;치나츠 온천ND;09;자칫하면 게헨나 학원과 붉은겨울 연방학원 간의 다툼으로 번질 수도 있는 문제인만큼, 선도부의 일원으로서 이를 두고 볼 수 없어서 찾아왔습니다.\n#3;closeup"
10007070-46 = "[s] \"꽤 즐기고 있는 것처럼 보였는데.\""
10007070-47 = "3;치나츠 온천ND;04;아, 안마의자는 그러니까…….\n#3;stiff\n#3;em;[///]"
10007070-48 = "3;치나츠 온천ND;06;온종일 온천개발부의 행적을 뒤쫓다 보니 여독이 쌓여서…… 우선 목욕부터 하고 나오던 참에, 마침 안마의자가 놓여 있는걸 보니……"
10007070-49 = "3;치나츠 온천ND;07;선도부의 추적을 따돌리기 위해 이런 간교한 함정을 파놓다니…… 역시 온천개발부, 얕볼 수 없겠네요."

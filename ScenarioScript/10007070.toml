[translation]
10007070-1 = "第7話;某風紀委員的寒假！？"
10007070-2 = "227號溫泉浴場．休息室"
10007070-4 = "（覺得有點渴，於是就到了可能有自動販售機的休息室）"
10007070-5 = "（那裡有許多學生正在按摩椅上按摩……）"
10007070-6 = "哈啊，感覺身體都放鬆了……真舒服……"
10007070-7 = "雖然格黑娜的溫泉也不差，但這裡的溫泉也……"
10007070-8 = "[s]「看起來很放鬆呢。」"
10007070-9 = "……老，老師！？"
10007070-10 = "你，你怎麼會在這裡……？"
10007070-11 = "請，請等一下。我馬上把按摩椅停下來……！"
10007070-12 = "……咦，咦？這是全身按摩的按鈕？"
10007070-13 = "取消按鈕在哪裡……"
10007070-17 = "呀啊！？"
10007070-23 = "[ns1]「那個，有沒有受傷？不用那麼慌張的唷。」\n[ns2]「繼續坐著也沒關係的唷。」"
10007070-26 = "但，但是，躺在按摩椅上跟老師說話，總覺得有點失禮……"
10007070-27 = "而且，也差不多得去工作了……"
10007070-28 = "雖，雖然用這副模樣那麼說，可能沒什麼說服力……"
10007070-29 = "[s3]「工作？」\n[s4]「格黑娜風紀委員會的工作嗎？」"
10007070-30 = "是的，雖然這次是在對外保密的狀態下行動……#n當然，是格黑娜風紀委員會的工作。"
10007070-31 = "是的，雖然這次是在對外保密的狀態下行動……"
10007070-37 = "老師知道格黑娜學園的「溫泉開發部」嗎？"
10007070-38 = "[s5]「嗯，大概知道。」\n[s6]「和名字一樣，是開發溫泉的社團對吧？」"
10007070-39 = "是的。溫泉開發部正如其名，以「開發溫泉」為其主要的活動。#n然而因為時常使用挖土機之類的重型機具引起重大事故，#n在格黑娜也是相當惡名昭彰的社團。"
10007070-40 = "是的。溫泉開發部正如其名，以「開發溫泉」為其主要的活動。#n然而因為時常使用挖土機之類的重型機具引起重大事故，#n在格黑娜也是相當惡名昭彰的社團。"
10007070-41 = "……之前在夏季合宿訓練時也突然跑來「開發海洋深層水溫泉」並大鬧了一番。"
10007070-42 = "所幸先前都還能算是溫泉相當多的格黑娜自治區內的混亂……"
10007070-43 = "但這次卻不知為何，在赤冬聯邦學園的自治區內開發了溫泉。"
10007070-44 = "原則上，在其他學園自治區內進行社團活動是嚴重違反規定的。"
10007070-45 = "是一不小心就可能會演變成格黑娜學園和赤冬聯邦學園紛爭的問題。#n所以我就以風紀委員會成員的身分來了這裡……事情就是這樣。"
10007070-46 = "[s]「原來如此。所以在任務開始前先休息一下？」"
10007070-47 = "會，會用按摩椅是因為……"
10007070-48 = "一直追蹤著溫泉開發部的足跡，總覺得有點累了……#n於是就想去洗個澡消除疲勞，出來的時候正好就看見了這個按摩椅……"
10007070-49 = "為了擺脫風紀委員會的追蹤，居然設置了這種狡猾的陷阱……#n不愧是溫泉開發部，果然不容小覷。"
10007070-50 = "[s]「我想那應該跟溫泉開發部的意圖沒什麼關係……」"
10007070-52 = "[s]「他們好像也沒給大家添什麼麻煩，不如就別管他們了？」"
10007070-53 = "不，就算現在看似和平也不能放心。"
10007070-54 = "溫泉開發部是個為了開發溫泉，願意冒任何風險的異常集團……"
10007070-55 = "如果他們判斷會妨礙到溫泉的開發，#n恐怕會毫不猶豫地與赤冬聯邦學園和格黑娜學園為敵吧。"
10007070-56 = "[s]「就算再怎麼喜歡溫泉，這也有點……」"
10007070-57 = "是的……我想老師應該還沒見過溫泉開發部的真面目。"
10007070-58 = "想到至今為止溫泉開發部為了開發溫泉而引發的種種事件……"
10007070-59 = "雖然只是舉例……就算他們突然炸了整個溫泉浴場也不奇怪。"
10007070-60 = "[s]「這麼誇張！？」"
10007070-61 = "溫泉開發部的行動是不能用常識來判斷的。"
10007070-62 = "所以得趕快找到他們才行，但是這附近並沒有目擊情報……#n在沒有防寒對策的情況下，在赤冬領地內漫無目的地尋找也不太明智……"
10007070-63 = "所以我決定暫時在這個溫泉浴場，悠閒地等溫泉開發部回來。"
10007070-67 = "那麼，我再去用一下按摩椅……咦？"
10007070-70 = "（和千夏說話的途中，剩下的按摩椅都被其他學生佔滿了）"
10007070-73 = "……看來大家平時都很累呢。"
10007070-74 = "雖然想再享受一下……這也沒辦法。"
10007070-75 = "[s7]「我多少會點按摩，千夏不介意的話要不要試試看？」\n[s8]「按摩就交給我吧！」"
10007070-80 = "……咦？沒，沒，沒關係的！#n我也不是為了按摩才來這裡，而且那樣實在……！"
10007070-81 = "那，那我就先去附近巡邏了！"
10007070-87 = "（還來不及阻止，千夏就跑到設施外面了……）"

[translation]
10007070-1 = "Episode 7;The Perfect Prefect Team Vacation!"
10007070-2 = "Hot Springs Resort No. 227 Lounge"
10007070-4 = "I was in front of the vending machine in the lounge to quench my thirst after a bath."
10007070-5 = "Several students were enjoying the massage chairs."
10007070-6 = "*sigh* I feel healed."
10007070-7 = "The hot springs in Gehenna are great, but these hot springs aren't half bad either."
10007070-8 = "[s] \"Looks like you're having fun.\""
10007070-9 = "S-S-Sensei?"
10007070-10 = "Wh-What're you doing here?"
10007070-11 = "O-One moment please. I need to turn this off."
10007070-12 = "H-Huh? I pressed the button for the full body massage function."
10007070-13 = "The cancel button should be around here somewhere..."
10007070-17 = "A-Ack?!"
10007070-23 = "[ns1] \"You don't have to get up in such a hurry.\"\n[ns2] \"It's okay to keep relaxing.\""
10007070-26 = "B-But it's rude to speak with Sensei while lying down like this."
10007070-27 = "And I have to get up and work anyways."
10007070-28 = "Umm... I'm sure that wasn't very convincing while I'm lying in this chair."
10007070-29 = "[s3] \"Work? What kind of work?\"\n[s4] \"Are you here to do Gehenna Prefect Team work?\""
10007070-30 = "It's a secret to the other students... But I'm here to do Gehenna Prefect Team work."
10007070-31 = "Yes, but it's a secret to the other students."
10007070-37 = "Sensei, do you know the Hot Springs Department of Gehenna Academy?"
10007070-38 = "[s5] \"I know about it.\"\n[s6] \"It's the club that develops hot springs, right?\""
10007070-39 = "Yes, the Hot Springs Department is a club that develops hot springs. And it's notorious even among the problematic clubs of Gehenna because they frequently cause major accidents using their heavy equipment."
10007070-40 = "Yes, the Hot Springs Department is a club that develops hot springs. And it's notorious even among the problematic clubs of Gehenna because they frequently cause major accidents using their heavy equipment."
10007070-41 = "There was a big commotion at last year's summer boot camp because they were insisting on mining hot springs by the ocean."
10007070-42 = "Their only redeeming factor was that they were only causing trouble within the Gehenna district...at first."
10007070-43 = "But for some reason, they developed a hot spring within the Red Winter Academy district!"
10007070-44 = "In principle, any club activities within the district of another academy is a serious violation of the school rules."
10007070-45 = "Since this could potentially instigate a fight between Gehenna Academy and Red Winter Federal Academy, I came here as a member of the Prefect Team to see if there is anything I can do."
10007070-46 = "[s] \"You seemed to be having a lot of fun, though.\""
10007070-47 = "Oh, s-so the massage chair is..."
10007070-48 = "After following traces of the Hot Springs Department all day, I was really tired. And then I finished bathing and the massage chair seemed to be inviting me to sit..."
10007070-49 = "Setting up such a cunning trap to evade the Prefect Team's pursuit... The Hot Springs Department cannot be underestimated."
10007070-50 = "[s] \"Somehow, I don't think the Hot Springs Department had anything to do with it.\""
10007070-52 = "[s] \"Everyone seems to like it, so wouldn't it be okay to leave it alone?\""
10007070-53 = "No. Just because it seems peaceful now, you shouldn't be reassured."
10007070-54 = "The Hot Springs Department is an irrational organization that'll commit any kind of eccentric behavior if it's for the development of hot springs."
10007070-55 = "If anyone interfered with their hot springs development, they wouldn't hesitate to run the Red Winter and Gehenna academies against each other to get what they want."
10007070-56 = "[s] \"Even if they like hot springs that much, would they really do that?\""
10007070-57 = "*sigh* You just haven't seen the Hot Springs Department's true nature yet, Sensei."
10007070-58 = "When I think about all the things the Hot Springs Department has done to develop hot springs."
10007070-59 = "It wouldn't surprise me if the entire hot springs resort blew up right now."
10007070-60 = "[s] \"Are you serious?!\""
10007070-61 = "Yes, the Hot Springs Department's determination is always beyond imagination."
10007070-62 = "However, I don't see them around here, and it doesn't seem too wise to aimlessly wander around the grounds of Red Winter Academy without any strategy to protect against the cold, so..."
10007070-63 = "For the time being, I'll have to wait patiently for them to return at the hot springs resort."
10007070-67 = "Huh?"
10007070-70 = "While talking with Chinatsu, other students sat down on the rest of the massage chairs."
10007070-73 = "Oh no, all the massage chairs are occupied."
10007070-74 = "I wanted to do some more massage to relieve my fatigue..."
10007070-75 = "[s7] \"Want me to give you a massage instead?\"\n[s8] \"If it's a full body massage, leave it to me!\""
10007070-80 = "I-It's okay! I didn't come here to get a massage!"
10007070-81 = "Th-Then I'll go patrol the area!"
10007070-87 = "Without giving me time to stop her, Chinatsu ran out of the hot springs resort."

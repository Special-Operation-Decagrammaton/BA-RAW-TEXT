10007070-51 = "#wait;1500"
10007070-52 = "[s] \"다들 좋아하는 것 같으니 이대로 두어도 괜찮지 않을까?\""
10007070-53 = "3;치나츠 온천ND;08;아뇨. 지금은 평화로운 것처럼 보여도 안심할 수 없습니다.\n#3;em;[반응]"
10007070-54 = "3;치나츠 온천ND;99;온천개발부는 온천 개발을 위해서라면 어떠한 기행도 마다하지 않는 비상식 집단……."
10007070-55 = "3;치나츠 온천ND;07;온천 개발에 방해가 된다면 붉은겨울 학원과 게헨나 학원 양측을 적으로 돌리는 일도 주저하지 않을 겁니다."
10007070-56 = "[s] \"아무리 온천을 좋아한다지만 설마 그럴까?\""
10007070-57 = "3;치나츠 온천ND;06;(한숨) 선생님께서는 아직 온천개발부의 진짜 모습을 보지 못하셨으니 그리 생각하시는 겁니다.\n#3;stiff\n#3;em;[속상함]"
10007070-58 = "3;치나츠 온천ND;09;그동안 온천개발부가 온천을 개발한다고 저지른 일들을 생각하면……."

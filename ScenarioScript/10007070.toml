[translation]
10007070-1 = "ตอนที่ 7;วันหยุดสุดเพอร์เฟกต์ของกรรมการวินัย!"
10007070-2 = "ออนเซ็น No.227"
10007070-4 = "(หลังแช่น้ำเสร็จเรียบร้อยแล้ว คุณครูก็มาที่ห้องพักผ่อนเพื่อหาเครื่องดื่มดับกระหาย)"
10007070-5 = "(นักเรียนหลายๆ คนกำลังใช้เก้าอี้ไฟฟ้านวดตัวอยู่...)"
10007070-6 = "ฮ่า... รู้สึกสบายตัวดีจังเลย..."
10007070-7 = "ออนเซ็นของเกเฮนน่าก็ไม่ได้แย่อะไร แต่ว่าออนเซ็นที่นี่มัน..."
10007070-8 = "[s] \"กำลังสบายเลยสินะ\""
10007070-9 = "คะ... คะ... คุณครู?"
10007070-10 = "ทะ...ทำไมถึงมาที่นี่...คะ?"
10007070-11 = "ชะ...ช่วยรอสักครู่นะคะ ฉันจะปิดเก้าอี้นวดไฟฟ้าก่อน..."
10007070-12 = "เอ๊ะ... เอ๋? นี่มันปุ่มฟังก์ชั่นนวดทั้งตัว...?"
10007070-13 = "ส่วนข้างๆ นี่ก็คือปุ่มยกเลิก..."
10007070-17 = "อ๊ะ...?!"
10007070-23 = "[ns1] \"ไม่ต้องรีบลุกหรอก\"\n[ns2] \"พักผ่อนต่อก็ได้นะ\""
10007070-26 = "ตะ...แต่ว่าจะให้คุยกับคุณครูทั้งที่นอนอยู่บนเก้าอี้นวดแบบนี้ มันคงไม่เหมาะเท่าไร..."
10007070-27 = "แถมถ้านอนอยู่ต่อไปแบบนี้ก็จะทำงานไม่ได้ด้วยค่ะ"
10007070-28 = "อืม... ถ้าบอกว่าฉันกำลังทำงานไปด้วย คุณครูก็คงจะไม่เชื่อสินะคะ..."
10007070-29 = "[s3] \"ทำงานเหรอ งานอะไรน่ะ?\"\n[s4] \"มาทำงานของคณะกรรมการวินัยเหรอ?\""
10007070-30 = "ห้ามบอกนักเรียนคนอื่นนะคะ... เป็นงานของคณะกรรมการวินัยน่ะค่ะ"
10007070-31 = "ใช่ค่ะ เรื่องนี้เป็นความลับต่อนักเรียนคนอื่นๆ นะคะ"
10007070-37 = "คุณครูรู้จัก <ชมรมพัฒนาออนเซ็น> ของสถาบันเกเฮนน่าแล้วใช่ไหมคะ"
10007070-38 = "[s5] \"รู้แค่นิดหน่อยน่ะ\"\n[s6] \"ชมรมที่พัฒนาออนเซ็นใช่มั้ย?\""
10007070-39 = "ใช่ค่ะ ชมรมพัฒนาออนเซ็นเป็นชมรมที่ศึกษาและพัฒนาเกี่ยวกับออนเซ็น และก็เป็นหนึ่งในชมรมที่ชอบ#nสร้างปัญหาของเกเฮนน่าค่ะ อย่างเช่นชอบใช้อุปกรณ์ขนาดใหญ่อย่างรถขุดเจาะก่อเรื่องขึ้นค่ะ"
10007070-40 = "ใช่ค่ะ ชมรมพัฒนาออนเซ็นเป็นชมรมที่ศึกษาและพัฒนาเกี่ยวกับออนเซ็น และก็เป็นหนึ่งในชมรมที่ชอบ#nสร้างปัญหาของเกเฮนน่าค่ะ อย่างเช่นชอบใช้อุปกรณ์ขนาดใหญ่อย่างรถขุดเจาะก่อเรื่องขึ้นค่ะ"
10007070-41 = "...ตอนที่เข้าค่ายฝึกภาคฤดูร้อนครั้งที่แล้ว พวกเธอก็ยืนกรานว่าจะขุดเจาะสร้างออนเซ็นกลางทะเล ทำให้เกิดเรื่องวุ่นวายมากเลยค่ะ"
10007070-42 = "ที่ผ่านมาโชคดีที่พวกเธอก่อปัญหาขึ้นแต่ภายในเขตปกครองตนเองของเกเฮนน่าที่มีตาน้ำพุร้อน#nใต้ดินอยู่มากมายเท่านั้นค่ะ..."
10007070-43 = "แต่ไม่รู้ว่าด้วยสาเหตุอะไร คราวนี้พวกเธอถึงได้มาพัฒนาออนเซ็นที่สหภาพเรดวินเทอร์ค่ะ"
10007070-44 = "โดยระเบียบแล้ว การเข้าไปทำกิจกรรมชมรมในเขตของโรงเรียนอื่น ถือเป็นการละเมิดกฎร้ายแรง"
10007070-45 = "ถ้าเกิดผิดพลาดไปอาจนำไปสู่ความขัดแย้งของสถาบันเกเฮนน่าและสหภาพเรดวินเทอร์ได้#nในฐานะสมาชิกของคณะกรรมการวินัยแล้ว ฉันจะเพิกเฉยไม่ได้ ก็เลยมาตรวจสอบเรื่องทั้งหมดค่ะ"
10007070-46 = "[s] \"แต่ดูเหมือนจะสนุกกับการพักผ่อนอยู่เลยนะ\""
10007070-47 = "สะ...ส่วนเรื่องเก้าอี้นวดไฟฟ้านี่..."
10007070-48 = "ฉันไล่ตามร่องรอยของชมรมพัฒนาออนเซ็นมาตลอดทั้งวันจนรู้สึกล้ามากๆ... ตอนแรกฉันแค่#nกะว่าจะมาแช่น้ำเฉยๆ แต่พอออกมาแล้วเจอเก้าอี้นวดนี่ก็เลย..."
10007070-49 = "พวกชมรมพัฒนาออนเซ็นนี่ประมาทไม่ได้เลยนะคะ... พวกเธอวางกับดักแบบนี้เพื่อหลบเลี่ยง#nการติดตามของคณะกรรมการวินัย..."
10007070-50 = "[s] \"เก้าอี้นวดนั่นไม่ได้เกี่ยวอะไรกับชมรมพัฒนาออนเซ็นเลยนะ...\""
10007070-52 = "[s] \"ดูเหมือนคนอื่นๆ จะชอบมากนะ เอาไว้อย่างนี้คงไม่เป็นไรหรอก\""
10007070-53 = "ไม่ค่ะ... ถึงตอนนี้จะดูสงบสุขดี แต่ก็จะวางใจไม่ได้หรอกนะคะ"
10007070-54 = "พวกชมรมพัฒนาออนเซ็นน่ะ ถ้าเพื่อให้ได้สร้างบ่อออนเซ็นแล้วละก็ พวกเธอไม่ลังเลที่จะลงมือเลยค่ะ..."
10007070-55 = "ถ้าเกิดไปขวางการสร้างออนเซ็นละก็ พวกเธอคงไม่ลังเลที่จะทำให้สหภาพเรดวินเทอร์#nและสถาบันเกเฮนน่ากลายเป็นศัตรูกันได้ค่ะ"
10007070-56 = "[s] \"ถึงครูจะชอบออนเซ็นก็เถอะนะ แต่มันขนาดนั้นเลยเหรอ?\""
10007070-57 = "(ถอนหายใจ) คุณครูยังไม่เห็นตัวตนแท้จริงของพวกชมรมพัฒนาออนเซ็นเลยคิดแบบนั้นค่ะ"
10007070-58 = "ถ้าคิดถึงเรื่องที่ชมรมพัฒนาออนเซ็นทำเพื่อพัฒนาออนเซ็นใหม่ละก็..."
10007070-59 = "พวกเธอจะระเบิดออนเซ็นนี่ตอนนี้เลยก็ไม่แปลกหรอกค่ะ"
10007070-60 = "[s] \"ขนาดนั้นเลยเหรอ?!\""
10007070-61 = "ใช่ค่ะ การกระทำของพวกเธอมักเป็นสิ่งที่คาดไม่ถึงอยู่เสมอๆ เลยค่ะ"
10007070-62 = "แต่ว่าฉันไม่พบพวกเธออยู่แถวนี้เลย และการที่จะเดินทางไปรอบๆ สหภาพเรดวินเทอร์#nโดยไม่มีอุปกรณ์ป้องกันความหนาวก็ดูไม่ใช่เรื่องที่ฉลาดด้วย..."
10007070-63 = "เพราะแบบนั้นฉันเลยจะอยู่ที่นี่สักระยะเพื่อรอให้พวกเธอกลับมาแช่ออนเซ็นที่นี่ค่ะ"
10007070-67 = "เอ๊ะ?"
10007070-70 = "(ระหว่างที่คุณครูคุยกับชินัตสึ เก้าอี้นวดตัวอื่นๆ ก็ถูกนักเรียนคนอื่นมาชิงนั่งไปซะแล้ว)"
10007070-73 = "แย่จัง... เก้าอี้นวดตัวอื่นที่เหลืออยู่ถูกแย่งที่นั่งไปหมดแล้วค่ะ"
10007070-74 = "ฉันอยากนั่งเก้าอี้นวดให้หายเมื่อยอีกสักหน่อยแท้ๆ..."
10007070-75 = "[s7] \"เดี๋ยวครูนวดให้เอามั้ย?\"\n[s8] \"เรื่องการนวดไว้ใจครูได้เลยนะ!\""
10007070-80 = "มะ... มะ...ไม่เป็นไรค่ะ! ฉันไม่ได้มาที่นี่เพื่อมานวดสักหน่อยนะคะ!"
10007070-81 = "ถะ...ถ้างั้นฉันขอตัวไปลาดตระเวนแถวนี้ดูอีกรอบนะคะ!"
10007070-87 = "(ชินัตสึพูดจบก็วิ่งหายไปข้างนอกออนเซ็นอย่างรวดเร็ว...)"

[translation]
1013002-1 = "Everyone's Senior"
1013002-3 = "So, you really came, Sensei..."
1013002-4 = "[s] \"This place looks a little different.\""
1013002-5 = "Indeed it does."
1013002-6 = "[s] \"I don't know if I should say this, but...\""
1013002-7 = "Go ahead."
1013002-8 = "[s] \"It looks great.\""
1013002-9 = "...I know."
1013002-10 = "That said, it still feels unfamiliar."
1013002-11 = "Haha, well... Everything changed so fast."
1013002-12 = "Hmm? My patrol work?"
1013002-13 = "..."
1013002-14 = "To be frank, it's hard to explain how that happened."
1013002-15 = "I'm now, in essence, the Head Prefect...if we were considered a traditional school."
1013002-16 = "I suppose that I'm in charge of keeping the school in order."
1013002-17 = "It's convenient, though. I barely have to worry about outside attacks."
1013002-18 = "Oh, why? Isn't it obvious?"
1013002-19 = "Haha! Think about it, Sensei."
1013002-20 = "Who would dare to cause trouble in Arius?"
1013002-21 = "...For multiple reasons."
1013002-27 = "[ns] \"Maybe you jinxed it, but was that an explosion?!\""
1013002-28 = "Let's take a look."
1013002-32 = "Everyone! What is this? An outside invasion?"
1013002-37 = "Oh? Not at all, Subaru."
1013002-38 = "She's right. We're just..."
1013002-39 = "Having a respectful discussion...in the traditional Arius style."
1013002-41 = "Ah, I see..."
1013002-45 = "[ns1] \"Discussion...?\"\n[ns2] \"Arius Style?\""
1013002-49 = "Oh, you didn't know, Sensei?"
1013002-50 = "Sorry! We forgot that you are an outsider!"
1013002-51 = "You see, in Arius, actions speak louder than words!"
1013002-55 = "[ns] \"I understand words, but what do you mean by actions...?\""
1013002-56 = "Right! So..."
1013002-57 = "Whenever we have a disagreement, a respectful discussion..."
1013002-58 = "We demonstrate the strength of our words...and our actions!"
1013002-59 = "Like how I told you that 5.56 millimeter is where it's at!"
1013002-60 = "Please, that would barely tickle! The 7.62mm rounds are weighty and reliable."
1013002-61 = "Oh please! As if the Squad didn't use 5.56mm for years!"
1013002-62 = "That was for special circumstances! Normally, we relied on 7.62mm."
1013002-63 = "Think about it. What's the point of taking a shot if you can't even control the recoil, huh? "
1013002-64 = "It's much smarter to deliver additional hits with a rapid-fire attack!"
1013002-65 = "You're kidding, right? If the flash suppressor is properly installed, you won't even feel the difference."
1013002-66 = "The idea that 7.62mm has bad recoil comes from someone who doesn't know how to hold a gun properly."
1013002-67 = "You're neglecting the issue of ammo capacity! Can you carry 300 7.62mm rounds, pipsqueak?"
1013002-68 = "Nowadays, precision fire is a luxury. Sustained suppressive fire is much more important!"
1013002-69 = "You know that bullets aren't free, right?"
1013002-76 = "Both of you, that's enough."
1013002-78 = "But...!"
1013002-79 = "Wait...!"
1013002-81 = "I've listened carefully. And truth is that neither of you is wrong."
1013002-82 = "But how did you even start this discussion?"
1013002-84 = "Th-That's..."
1013002-85 = "We were trying to decide which ammo would best protect our school."
1013002-87 = "That's good. And I can see that both of you want nothing more than to keep our school safe. That's the important part!"
1013002-88 = "And it's natural to have different approaches to the same problem."
1013002-89 = "So, perhaps it's time for us to rethink the traditional Arius discussion style."
1013002-90 = "A house divided against itself cannot stand, right?"
1013002-92 = "...She's right."
1013002-93 = "Right... We're not the same old Arius. We're a new, stronger team!"
1013002-95 = "Precisely! Now, please consider that as we move forward."
1013002-96 = "You talked about conserving the cost of ammo, and the two of you wasted plenty during your discussion. Now, who does that help?"
1013002-98 = "I-I'm really sorry, Subaru."
1013002-100 = "And I'm grateful that you two are so impassioned about our school!"
1013002-101 = "We have a long way to go together as we rebuild. And I sympathize with wanting to revert to our previous protocols."
1013002-102 = "But please try to think more creatively. I promise you that I'll do my best as well."
1013002-103 = "If you have any questions or concerns, please do not hesitate to reach out."
1013002-105 = "...! Will do, Subaru!"
1013002-106 = "Understood! Thank you!"
1013002-111 = "Phew..."
1013002-112 = "[s] \"You're a natural leader, Subaru.\""
1013002-113 = "Y-You think so...?"
1013002-114 = "I have been trying. And we all changed together."
1013002-115 = "Before, I'd let these \"discussions\" play out. It was good for everyone to get out their aggression."
1013002-116 = "And this was an important issue. The two ammo types are not compatible with each other, and 5.56mm is widely used outside of Arius, too."
1013002-117 = "But we can't just decide to discontinue the 7.62mm size that most of us are familiar with."
1013002-118 = "Even my weapon has been modified to use 7.62mm rounds. It was a practical decision at the time."
1013002-119 = "..."
1013002-120 = "But I feel relieved."
1013002-121 = "I thought everyone would have turned on me by now. I'm not who I once was."
1013002-122 = "But...they're still following me. They still have a little faith."
1013002-123 = "[s3] \"That means you're a respected senior, Subaru.\"\n[s4] \"You have been taking care of Arius students well.\""
1013002-126 = "Haha. Compliment me all you want. I have nothing worthwhile to offer."
1013002-127 = "But...I still feel guilty sometimes. And I'm undoubtedly responsible for our future."
1013002-128 = "If I can foster more open discussions instead of firefights, then I think everyone will feel better."
1013002-129 = "..."
1013002-130 = "Still, sometimes I feel like I've barely scratched the surface of our issues."
1013002-131 = "And I wonder if I'm simply applying a bandage to our problems instead of cutting to the root of the matter."
1013002-132 = "[s5] \"Okay, I see the issue.\"\n[s6] \"I think you need someone to talk to as well.\""
1013002-135 = "Excuse me? What makes you think that?"
1013002-136 = "Umm... You're saying it's not personal? It's more of a \"who watches the watchers\" problem?"
1013002-137 = "I understand what you're saying, but..."
1013002-138 = "I...am not sure if I'm comfortable with your assessment."
1013002-139 = "[s7] \"This is what I'm paid for.\"\n[s8] \"...Of course, I do a lot of work outside of advice....\""
1013002-142 = "Ah. Yes, I've heard about you."
1013002-143 = "Sensei, who draws students in with their natural charisma, only to irrevocably change them."
1013002-144 = "Hmm? Where did I hear such a conspiracy? It must have been a feature on the Kronos Channel."
1013002-145 = "[s] \"Subaru, that's really not what this is about.\""
1013002-146 = "...There's no reason to look THAT devastated."
1013002-147 = "..."
1013002-148 = "Yes, I understand. Then, if I feel the need, I will reach out to you."
1013002-149 = "Somehow, you always get me talking. I always tell you more than I intend."
1013002-150 = "Hahaha. I suppose that's all according to your plan, isn't it?"
1013002-151 = "[s] \"Subaru, that's really not what this is about.\""
1013002-152 = "...I'm having a strange feeling of déjà vu."
1013002-154 = "Feeling conflicted and a little defeated, I returned to Schale."

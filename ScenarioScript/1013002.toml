[translation]
1013002-1 = "รุ่นพี่ของทุกคน"
1013002-3 = "มาจริงๆ ด้วยนะคะ คุณครู..."
1013002-4 = "[s] \"ที่นี่เป็นแบบนี้เองเหรอเนี่ย...\""
1013002-5 = "มันก็เป็นแบบนี้ละค่ะ"
1013002-6 = "[s] \"ไม่รู้ว่าพูดแบบนี้จะดีรึเปล่า\""
1013002-7 = "ลองพูดมาสิคะ"
1013002-8 = "[s] \"มันดูดีนะ\""
1013002-9 = "...นั่นสิคะ"
1013002-10 = "ฉันก็คิดอย่างนั้นเหมือนกัน แต่ก็ยังไม่ค่อยคุ้นเท่าไรเลยค่ะ"
1013002-11 = "ฮ่าๆ ทุกอย่างเริ่มเปลี่ยนไปแล้วสินะคะ"
1013002-12 = "คะ? เรื่องงานลาดตระเวนเหรอคะ?"
1013002-13 = "......"
1013002-14 = "จริงๆ แล้วคงต้องบอกว่ามันดันกลายเป็นแบบนั้นไปเองน่ะค่ะ"
1013002-15 = "ถ้าเป็นในโรงเรียนอื่นๆ ตำแหน่งของฉันก็คงเป็นเหมือนกันประธานคณะกรรมการวินัย"
1013002-16 = "แต่ถ้าพูดถึงเรื่องการจัดระเบียบในโรงเรียนละก็ มันก็มีส่วนที่คล้ายกับสิ่งที่ฉันเคยทำเมื่อก่อนอยู่เยอะ#nเลยค่ะ"
1013002-17 = "ถ้าจะมีสิ่งหนึ่งที่สะดวกสบายก็คือไม่ต้องกังวลเรื่องการรบกวนจากภายนอกมากนัก"
1013002-18 = "เพราะอะไรน่ะเหรอคะ?"
1013002-19 = "ฮ่าฮ่าฮ่า เรื่องง่ายๆ ค่ะ"
1013002-20 = "ใครจะกล้าเข้ามาก่อความวุ่นวายในอาเรียสกันล่ะคะ"
1013002-21 = "...ในหลายๆ ความหมายเลยค่ะ"
1013002-27 = "[ns] \"เพราะพูดถึงเรื่องนี้รึเปล่านะ ตอนนี้เลยเหมือนเกิดระเบิดขึ้นเลย?!\""
1013002-28 = "ไปดูกันเถอะค่ะ"
1013002-32 = "เกิดอะไรขึ้นคะทุกคน?! มีผู้บุกรุกจากภายนอกเหรอคะ?"
1013002-37 = "คะ? เปล่าหรอกค่ะรุ่นพี่"
1013002-38 = "ใช่ค่ะ พวกเราก็แค่..."
1013002-39 = "แค่กำลังอภิปรายกันตามวิถีอาเรียสเท่านั้นเองค่ะ"
1013002-41 = "อ่า อย่างนั้นเหรอคะ..."
1013002-45 = "[ns1] \"อภิปราย...?\"\n[ns2] \"วิถีอาเรียส...?\""
1013002-49 = "เอ๋ คุณครูไม่รู้หรอกเหรอคะ?"
1013002-50 = "นี่แหละน้าคนภายนอก"
1013002-51 = "ในอาเรียสน่ะ สิ่งสำคัญคือคำพูดและการกระทำของใครน่าคล้อยตามมากกว่ากันค่ะ!"
1013002-55 = "[ns] \"เรื่องคำพูดก็เข้าใจได้ แต่การกระทำเนี่ย...?\""
1013002-56 = "ค่ะ เพราะงั้นพวกเรา..."
1013002-57 = "ตอนที่มีความเห็นขัดแย้งกัน!"
1013002-58 = "เรามักจะวัดกันว่าคำพูดและการกระทำของใครทรงพลังมากกว่ากันค่ะ!"
1013002-59 = "ฉันถึงบอกไงเล่าว่ายุคนี้มันต้อง 5.56 มม. น่ะ!"
1013002-60 = "มันแรงพอที่ไหนเล่า ยิงๆ ไปเดี๋ยวก็ร่วงไม่ก็โดนปัดได้อยู่ดี! ยุคนี้มันต้อง 7.62 มม. นี่แหละดีที่สุด!"
1013002-61 = "ไม่รู้อะไรเลยสินะ... สควอดก็ใช้กระสุน 5.56 มม. นะ!"
1013002-62 = "พวกเขาเป็นกรณียกเว้นต่างหากเล่า! ส่วนขนาดที่พวกเราใช้จนชินมือแล้วคือ 7.62 มม. ต่างหาก!"
1013002-63 = "ลองคิดดูสิ จะยิงนัดเดียวแรงๆ ไปเพื่ออะไร ถ้าแรงถอยมันหนักจนคุมกระสุนไม่อยู่ แบบนั้นจะมีประโยชน์อะไร "
1013002-64 = "เอาเวลาไปถล่มยิงรัวๆ ให้เจ็บหนักๆ ยังจะดีซะกว่าอีก!"
1013002-65 = "ที่บอกว่าแรงถอยของ 7.62 มม. มันหนักน่ะเป็นอคติล้วนๆ เลยนะรู้มั้ย? ถ้าตัวปืนดีไซน์ออกมาดี แล้วมีปลอกลดแสงที่ช่วยคุมแรงดีดได้ เรื่องแรงถอยก็แทบไม่ต่างกันเลย"
1013002-66 = "นั่นมันเรื่องที่พวก 'คนที่รู้อะไรครึ่งๆ กลางๆ' อย่างพวกเธอชอบพูดกันต่างหาก!"
1013002-67 = "แต่ถ้าพูดกันตามตรง จำนวนกระสุนที่พกติดตัวไปมันไม่พอนะ! เธอแบกกระสุน 7.62 มม. ทีละ 300 นัด#nไหวรึไง?!"
1013002-68 = "เดิมทีหลักการปะทะสมัยนี้ เรื่องการเล็งยิงน่ะเขาดูตามสถานการณ์เอา ส่วนการยิงกดดันต่อเนื่องน่ะ#nสำคัญกว่าอีก!"
1013002-69 = "ไม่รู้หรือไงว่าทั้งหมดนั่นน่ะมันคือเงินทั้งนั้น?!"
1013002-76 = "เอาละ เอาละ ทั้งสองคนพอแค่นี้เถอะ"
1013002-78 = "แต่ว่า... รุ่นพี่!"
1013002-79 = "แต่ถึงอย่างนั้นก็เถอะค่ะ รุ่นพี่"
1013002-81 = "ฉันเข้าใจความกังวลของพวกเธอดีนะ และการที่ไม่มีใครผิดเลยเนี่ยแหละ คือส่วนที่ทำให้ตัดสินใจยาก"
1013002-82 = "ว่าแต่ว่าจุดเริ่มต้นที่ทำให้มากลุ้มใจเรื่องนี้คืออะไรกันล่ะ?"
1013002-84 = "เรื่อง... เรื่องนั้น..."
1013002-85 = "ก็คือว่า... ต้องใช้กระสุนชนิดไหนเป็นหลัก ถึงจะปกป้องโรงเรียนของเราได้ดีกว่ากัน... อะไรประมาณนี้น่ะค่ะ..."
1013002-87 = "เห็นมั้ยล่ะคะ? ทั้งทุกๆ คนและฉัน ฉันมองว่าหัวใจที่อยากจะปกป้องโรงเรียนน่ะเหมือนกัน ส่วนที่สำคัญที่สุดคือตรงนั้นแหละค่ะ"
1013002-88 = "ในเมื่อมีจุดประสงค์เดียวกัน แต่แค่เพียงเพราะวิธีการคิดต่างกันนิดหน่อยเอง"
1013002-89 = "มันถึงเวลาที่ต้องเลิก 'โต้วาที' แบบอาเรียสที่มันดุเดือดเกินไปได้แล้วหรือยังคะ?"
1013002-90 = "ภายในบ้านที่ทะเลาะกันเอง ย่อมมีแต่จะพังทลายลงไม่ใช่เหรอคะ?"
1013002-92 = "ฟังดูแล้วก็จริงอย่างที่รุ่นพี่พูดมาค่ะ..."
1013002-93 = "ใช่แล้วค่ะ... ตอนนี้พวกเราไม่ใช่ 'อาเรียส' ในวันวานอีกต่อไปแล้วสินะคะ..."
1013002-95 = "ค่ะ ถ้าทุกคนคอยระลึกถึงจุดนั้นอยู่เสมอฉันคงจะขอบคุณมากเลย"
1013002-96 = "เมื่อกี้ที่พูดเรื่องปัญหาค่าใช้จ่ายเอาไว้ ค่ากระสุนที่ใช้ไปในการ 'อภิปราย' มันก็นับเป็นค่าใช้จ่ายที่#nชัดเจนเหมือนกันนะคะ"
1013002-98 = "ขอโทษด้วยค่ะ รุ่นพี่..."
1013002-100 = "ฮุฮุ แต่การที่พวกเธอรักและเป็นห่วงโรงเรียนขนาดนี้ ฉันดีใจจริงๆ นะคะ"
1013002-101 = "พวกเราคงต้องลองผิดลองถูกกันอีกมาก และในแต่ละครั้ง ก็อาจจะมีความรู้สึกอยากกลับไปใช้วิธีเดิมๆ เหมือนเมื่อก่อนกันบ้าง..."
1013002-102 = "แต่ถึงอย่างนั้น ก็ลองพยายามรับมือกับปัญหาด้วยวิธีที่ต่างไปจากเดิมให้มากที่สุดเถอะนะ ฉันเองก็จะพยายามเหมือนกัน"
1013002-103 = "ถ้ามีเรื่องลำบากใจอะไร เรียกฉันได้ตลอดเวลาเลยนะคะ...!"
1013002-105 = "ค่ะ รุ่นพี่!"
1013002-106 = "เข้าใจแล้วค่ะ ขอบคุณนะคะรุ่นพี่!"
1013002-111 = "ฮู่ว..."
1013002-112 = "[s] \"รับมือกับพวกรุ่นน้องได้เก่งสุดๆ ไปเลยนะ...\""
1013002-113 = "ยะ... อย่างนั้นเหรอคะ?"
1013002-114 = "จริงๆ นี่ก็เปลี่ยนไปจากเมื่อก่อนมากแล้วเหมือนกันค่ะ"
1013002-115 = "ถ้าเป็นเมื่อก่อน 'การอภิปราย' แบบนั้น ฉันคงปล่อยทิ้งไว้เฉยๆ แล้วแท้ๆ"
1013002-116 = "จริงๆ มันก็เป็นปัญหาที่สำคัญนะคะ เพราะกระสุนทั้งสองชนิดใช้แทนกันไม่ได้ และส่วนใหญ่ข้างนอกอาเรียสก็ใช้ 5.56 มม. เป็นหลักด้วย "
1013002-117 = "แต่จะให้สั่งยกเลิกการใช้ 7.62 มม. ที่เคยใช้กันมามากที่สุดจนถึงตอนนี้ภายในวันเดียว มันก็คงเป็นไปไม่ได้เหมือนกันน่ะค่ะ"
1013002-118 = "ลำพังแค่ปืนของฉันเอง เพราะปัญหาเรื่องการจัดหาลูกกระสุนที่นำมาใช้ได้ก็เลยต้องปรับแต่งมา#nเพื่อใช้กับขนาด 7.62 มม. ไว้เหมือนกันค่ะ "
1013002-119 = "......"
1013002-120 = "แต่ถึงอย่างนั้น ฉันก็คิดว่าโชคดีค่ะ"
1013002-121 = "เพราะเคยคิดว่าถ้าอยู่ดีๆ ฉันลุกขึ้นมาทำตัวแบบนี้ ทุกคนจะเกลียดฉันเสียอีก"
1013002-122 = "จนถึงตอนนี้... ทุกคนยังยอมทำตามฉันอยู่เลยค่อยเบาใจขึ้นมาหน่อยค่ะ"
1013002-123 = "[s3] \"นั่นคงเพราะสุบารุเป็นรุ่นพี่ที่น่าเชื่อถือยังไงล่ะ\"\n[s4] \"ก็คนที่คอยดูแลทุกคนในอาเรียสมาตลอดก็คือสุบารุนี่นา\""
1013002-126 = "ฮ่าฮ่า ต่อให้ชมขนาดนั้น ฉันก็ไม่มีอะไรพิเศษจะมอบให้หรอกนะคะ"
1013002-127 = "แต่ว่านะ... ฉันก็รู้สึกถึงความรู้สึกผิดหรือความรู้สึกเหมือนติดค้างอะไรบางอย่างอยู่เหมือนกันค่ะ"
1013002-128 = "ถ้าเป็นการให้คำปรึกษาละก็ได้เสมอเลยค่ะ หรือจะใช้คำพูดดีๆ ปลอบประโลมความรู้สึกในตอนนั้นก็#nทำได้อยู่หรอก แต่ว่า..."
1013002-129 = "......"
1013002-130 = "ดูเหมือนว่าสุดท้ายแล้ว ฉันแทบจะช่วยแก้ปัญหาที่ต้นเหตุไม่ได้เลย"
1013002-131 = "มันก็แค่การแก้ปัญหาแบบผักชีโรยหน้าเท่านั้นเองค่ะ"
1013002-132 = "[s5] \"โอเค รู้จุดที่เป็นปัญหาแล้วละ\"\n[s6] \"ในสายตาครู สุบารุเองก็ต้องการคนที่จะมาให้คำปรึกษาเหมือนกันนะ\""
1013002-135 = "คะ?! จู่ๆ ทำไมถึงเป็นฉันล่ะคะ?"
1013002-136 = "คะ...? มันเหมือนประมาณว่าเป็นมุมมองจาก 'คนที่เฝ้ามองปัญหา' อีกมุมหนึ่งงั้นเหรอคะ?"
1013002-137 = "พอจะเข้าใจการเปรียบเทียบอยู่นะคะ แต่ถึงอย่างนั้นก็เถอะ..."
1013002-138 = "คนอย่างฉัน จะได้รับสิ่งนั้นได้จริงๆ เหรอคะ..."
1013002-139 = "[s7] \"ครูน่ะได้รับเงินเดือนมาเพื่อทำเรื่องพวกนี้แหละ\" \n[s8] \"แน่นอนว่าครูก็ต้องทำงานอย่างอื่นด้วยละนะ...\""
1013002-142 = "อ่า นี่สินะที่เขาพูดกัน "
1013002-143 = "เคยได้ยินว่าวิธีการของคุณครูคือจะค่อยๆ โน้มน้าวนักเรียนอย่างเป็นธรรมชาติ จนจิตใจและร่างกายไม่สามารถกลับไปเป็นเหมือนก่อนหน้านี้ได้เลยค่ะ"
1013002-144 = "ฉันไปได้ยินเรื่องแบบนั้นมาจากไหนน่ะเหรอคะ? เอ่อ... จากสกู๊ปข่าวพิเศษของช่องโครโนสน่ะค่ะ?"
1013002-145 = "[s] \"ไม่ใช่นะสุบารุ... นั่นมันไม่ใช่ความจริงเลยสักนิด...\""
1013002-146 = "มะ... ไม่เห็นต้องถึงกับทำท่าหดหู่ขนาดนั้นเลยนี่คะ"
1013002-147 = "......"
1013002-148 = "ค่ะ เข้าใจแล้วค่ะ ถ้าอย่างนั้นไว้มีโอกาสหน้าก็ขอรบกวนด้วยนะคะ "
1013002-149 = "เวลาที่ได้คุยกับคุณครู ไม่รู้ทำไมจิตใจถึงรู้สึกผ่อนคลายจนเผลอเล่าเรื่องโน้นเรื่องนี้ออกมาเยอะเลยค่ะ"
1013002-150 = "ฮ่าฮ่าฮ่า นี่อาจจะเป็นเพราะ 'วิธี' ที่คุณครูใช้กับนักเรียนจริงๆ ก็ได้นะคะ"
1013002-151 = "[s] \"ไม่ใช่นะสุบารุ... นั่นมันไม่ใช่ความจริงเลยสักนิด...\""
1013002-152 = "แปลกจังเลยนะคะ... เหมือนเพิ่งจะได้ยินคำพูดคล้ายๆ กันนี้เมื่อกี้นี้เลย..."
1013002-154 = "(หลังจากนั้นคุณครูก็กลับมาที่ชาเล่ต์ด้วยจิตใจห่อเหี่ยวเหมือนพ่ายแพ้อะไรบางอย่างในหลายๆ ความหมาย...)"

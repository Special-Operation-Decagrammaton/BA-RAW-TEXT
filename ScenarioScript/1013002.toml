[translation]
1013002-1 = "大家的前輩"
1013002-3 = "你真的來了啊，老師……"
1013002-4 = "[s]「這裡變成這樣了啊……」"
1013002-5 = "是啊，變成這樣了。"
1013002-6 = "[s]「雖然不確定說這種話好不好……」"
1013002-7 = "請說吧。"
1013002-8 = "[s]「看起來很不錯。」"
1013002-9 = "……確實如此呢。"
1013002-10 = "我也有同感，不過還是覺得有點陌生呢。"
1013002-11 = "哈哈。明明一切終於開始改變了。"
1013002-12 = "嗯？關於巡邏的工作是嗎？"
1013002-13 = "……"
1013002-14 = "老實說，我也只能回答不知不覺就變成這樣了。"
1013002-15 = "如果換作是其他學園的話，就是類似風紀委員長的工作吧。"
1013002-16 = "從管理學園秩序的層面來看，其實跟過往有很多相似之處。"
1013002-17 = "假如要說什麼部分變得比較輕鬆，大概就是不太需要擔心外來的騷動了吧。"
1013002-18 = "……問我為什麼？"
1013002-19 = "哈哈哈，答案很簡單。"
1013002-20 = "畢竟……誰敢跑來奧利斯鬧事呢。"
1013002-21 = "……從各方面來說都是。"
1013002-27 = "[ns]「你才剛說完，好像就傳來了爆炸聲耶！？」"
1013002-28 = "我們過去看看吧。"
1013002-32 = "發生什麼事了，各位！？#n有外來者入侵嗎？"
1013002-37 = "咦？不是的，前輩。"
1013002-38 = "沒錯，我們只是……"
1013002-39 = "在用奧利斯式的方法討論事情而已。"
1013002-41 = "啊，原來如此……"
1013002-45 = "[ns1]「討論……？」\n[ns2]「奧利斯式……？」"
1013002-49 = "咦，老師不知道嗎？"
1013002-50 = "畢竟老師也是外面的人嘛。"
1013002-51 = "我們奧利斯很重視誰的言行更有說服力哦！"
1013002-55 = "[ns]「言的部分還能理解，但行也是……？」"
1013002-56 = "沒錯！所以當我們……"
1013002-57 = "彼此意見衝突的時候！"
1013002-58 = "就會來較量是誰的言行更有說服力！"
1013002-59 = "就跟你說現在是5.56mm的時代嘛！"
1013002-60 = "那種輕飄飄的東西哪有什麼衝擊力啊！#n我覺得還是沉甸甸的7.62mm最讚！"
1013002-61 = "你真的什麼都不懂耶……小隊也是用5.56mm啊！"
1013002-62 = "那是他們有特別補給好不好！我們反而比較習慣用7.62mm！"
1013002-63 = "你自己想想看，只有單發的威力強有什麼用嗎？#n後座力都大到連彈著群都沒辦法控制了。"
1013002-64 = "有時間慢慢瞄準的話，不如用連射進行追加攻擊！"
1013002-65 = "覺得7.62mm後座力強是偏見啦！#n只要設計和消焰器控制得夠好，根本就沒什麼差別。"
1013002-66 = "只有像你這種半桶水響叮噹的傢伙才會說那種話！"
1013002-67 = "光是攜彈量就輸慘了好嗎！#n你有辦法帶著300發7.62mm到處跑嗎？"
1013002-68 = "現在的作戰守則也說精準射擊有機會再做就好，持續進行壓制射擊才是重點！"
1013002-69 = "每顆子彈都是錢耶，你不知道嗎！？"
1013002-76 = "好了好了。你們兩位都先冷靜一下。"
1013002-78 = "但是，前輩！"
1013002-79 = "前輩！"
1013002-81 = "大家糾結的理由我完全可以理解。#n而且兩邊的說法都沒有錯，確實讓人有點為難。"
1013002-82 = "不過話又說回來，大家為什麼會討論起這件事呢？"
1013002-84 = "這，這是因為……"
1013002-85 = "我們在想，用哪種彈藥當主力更能守護好學園……"
1013002-87 = "對吧？想守護學園的心情，大家跟我都是一樣的。#n……這才是最重要的。"
1013002-88 = "其實大家都有相同的目標，只是思考方式稍有不同而已。"
1013002-89 = "是不是該停止這種過於激烈的奧利斯式「討論」了？"
1013002-90 = "同室操戈只會自取滅亡，不是嗎？"
1013002-92 = "聽前輩這麼一說，好像確實是這樣……"
1013002-93 = "也對……現在的奧利斯已經跟從前不一樣了……"
1013002-95 = "沒錯。如果各位能時常將這一點銘記在心的話，我會很高興的。"
1013002-96 = "至於剛才提到的費用問題，「討論」所需的彈藥費也是不容忽視的成本哦。"
1013002-98 = "對不起，前輩……"
1013002-100 = "呵呵。不過能切身感受到大家重視學園的心意，還是讓我感到很開心。"
1013002-101 = "我們將來一定還會經歷無數次的試錯，#n每當遇到問題也可能會忍不住用以往的方式解決……"
1013002-102 = "即便如此也盡可能做出改變，嘗試用不同的方法來應對吧。#n我也會跟大家一起加油的。"
1013002-103 = "如果遇到任何困難，隨時都可以找我。"
1013002-105 = "……！#n是的，前輩！"
1013002-106 = "我知道了！謝謝前輩！"
1013002-111 = "呼……"
1013002-112 = "[s]「你真的很會領導後輩呢……」"
1013002-113 = "是，是嗎？"
1013002-114 = "其實我也已經改變了很多。"
1013002-115 = "以前碰到那種「討論」，我都會選擇直接視而不見。"
1013002-116 = "老實說，那確實是個重要的問題。#n兩種彈藥彼此互不相容，而5.56mm又是奧利斯之外相對主流的選擇。"
1013002-117 = "話雖如此，一路使用至今的7.62mm也很難在一夕之間完全廢除。"
1013002-118 = "就連我的槍也因為彈藥補給的原因……改裝成7.62mm的規格了。"
1013002-119 = "……"
1013002-120 = "不過，我其實感到很慶幸。"
1013002-121 = "事到如今才採取這種方式，我原本以為會因此被大家討厭的。"
1013002-122 = "幸好到目前為止，大家都還願意跟隨我……真是讓我鬆了一口氣。"
1013002-123 = "[s3]「這代表昴是個值得信賴的前輩啊。」\n[s4]「自始至終一直照顧著奧利斯孩子們的人就是昴啊。」"
1013002-126 = "哈哈。就算這樣稱讚我，我也沒辦法特別回報老師什麼哦。"
1013002-127 = "不過……我多少會產生一點罪惡感或虧欠感。"
1013002-128 = "雖然我隨時都能傾聽對方的煩惱，也能說一些好聽的話安撫對方的心情……"
1013002-129 = "……"
1013002-130 = "但我總覺得自己……好像在「解決根本問題」方面幫不上什麼忙。"
1013002-131 = "只是在自欺欺人而已。"
1013002-132 = "[s5]「好，我知道問題出在哪了。」\n[s6]「在我看來，昴也需要有人傾聽你的煩惱。」"
1013002-135 = "什麼！？為什麼會突然講到我身上？"
1013002-136 = "咦……？#n從某方面來看，這是類似「誰來監視監視者」的問題……？"
1013002-137 = "比喻本身我大概能理解……不過……"
1013002-138 = "我……有資格受到那種對待嗎……"
1013002-139 = "[s7]「老師領薪水本來就是來做這種事的。」\n[s8]「當然也還有其他工作要做就是了……」"
1013002-142 = "啊，這就是傳聞中的那個吧。"
1013002-143 = "「老師會用自然的手段引導學生，讓他們的身心再也無法回到從前」之類的。"
1013002-144 = "問我是從哪裡聽說的？#n我想想……好像是克洛盧斯頻道的獨家專題報導吧？"
1013002-145 = "[s]「不是的，昴。真的沒有那種事啊……」"
1013002-146 = "老，老師也沒必要這麼沮喪吧……"
1013002-147 = "……"
1013002-148 = "好吧，我明白了。#n那麼下次有機會再麻煩老師吧。"
1013002-149 = "跟老師說話總是會覺得很輕鬆，不由自主地把事情都說出口。"
1013002-150 = "哈哈哈。這會不會就是老師用在學生身上的「手段」呢？"
1013002-151 = "[s]「不是的，昴。真的沒有那種事啊……」"
1013002-152 = "奇怪，這句話是不是才剛聽過……？"
1013002-154 = "（最終帶著某名的挫敗感(?)回到了夏萊……）"

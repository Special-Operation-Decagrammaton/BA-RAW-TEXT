[translation]
1300506-1 = "Rainy Day Alleyway"
1300506-2 = "Schale Entryway"
1300506-4 = "The rain started coming down hard as I was leaving from work."
1300506-5 = "[s] \"It was sunny just a few minutes ago...\""
1300506-11 = "Sensei? Something wrong?"
1300506-12 = "What? You forgot to bring your umbrella?"
1300506-13 = "I mentioned it in the MomoTalk I sent you this morning, but you still forgot..."
1300506-16 = "Here. Your umbrella."
1300506-17 = "Why am I carrying an extra?"
1300506-18 = "Because I work with a lot of clumsy people. These kinds of things always come in handy."
1300506-19 = "I swear, I'm surrounded by klutzes..."
1300506-20 = "Where am I headed?"
1300506-21 = "Well...there's someone else who needs my help on rainy days like these."
1300506-22 = "It's not important. Don't worry about it."
1300506-23 = "[s1] Could Kayoko have feelings for someone else?\n[s2] Say you'll follow since you're curious."
1300506-24 = "What...? You want to tag along?"
1300506-25 = "What...? You want to tag along?"
1300506-26 = "Well, it's not like I particularly mind or anything."
1300506-27 = "But don't blame me if you end up thinking it's a waste of time..."
1300506-28 = "Especially with all this rain. It's gonna be muddy."
1300506-29 = "*sigh* You're really not going to let this go, huh?"
1300506-30 = "Fine. Do whatever you want. "
1300506-34 = "[ns] Follow Kayoko."
1300506-39 = "[ns3] \"Is that a cat house?\"\n[ns4] \"So, the one who needs your help is...?\""
1300506-42 = "― You really didn't need to follow me all this way, Sensei.[wa:10] "
1300506-45 = "― I guess it's not here...[wa:1480] "
1300506-48 = "[ns5] \"It must be out at the moment.\"\n[ns6] \"Should we wait?\""
1300506-51 = "― I only came here because it was raining.[wa:4100] "
1300506-53 = "― It'll be fine. Cats can look after themselves.[wa:1820] "
1300506-56 = "― Not being tied down by someone, not being hurt by others...can be a good thing...[wa:1300] "
1300506-59 = "― But still, having no one to rely on can feel a bit lonely...[wa:10] "
1300506-62 = "[ns7] \"...\"\n[ns8] \"You're a kind person, Kayoko.\""
1300506-65 = "― A part of me can't just leave it alone. That's all.[wa:7120] "
1300506-67 = "― That's all there is to it. Got it, Sensei?[wa:3580] "
1300506-71 = "...The rain stopped."
1300506-72 = "Giving the umbrella back already?"
1300506-73 = "Don't forget flash floods can strike out of nowhere. Hold on to it for now."
1300506-74 = "Besides, we see each other often enough. You can always return it later."
1300506-75 = "I know I objected to it a while back...but being in debt to someone isn't the worst thing in the world."
1300506-76 = "I'll see you tomorrow, Sensei."

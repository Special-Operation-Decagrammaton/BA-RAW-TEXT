[translation]
1300506-1 = "下雨天的巷弄"
1300506-2 = "夏萊大樓前"
1300506-4 = "（結束工作走出大樓，正巧碰上傾盆大雨）"
1300506-5 = "[s] 「剛才都還很晴朗耶……」"
1300506-11 = "……嗯？老師？#n怎麼了嗎？"
1300506-12 = "什麼？你不小心忘了帶傘？"
1300506-13 = "我早上都傳MomoTalk提醒了，這樣也能忘……"
1300506-16 = "來，傘拿去。"
1300506-17 = "你問我為什麼身上會多帶傘？"
1300506-18 = "我身邊太多神經大條的人了。#n帶些備用的很方便。"
1300506-19 = "那些傢伙，真的很令人操心……"
1300506-20 = "你說這和學校是反方向，問我要去哪裡？"
1300506-21 = "……因為這邊一樣有個，下雨時讓人放不下心的傢伙。"
1300506-22 = "沒什麼大不了的，你不用在意。"
1300506-23 = "[s1] 沒想到還有其他讓佳世子費心的人。\n[s2] 覺得很在意想要跟過去。"
1300506-24 = "咦？……你要跟我一起去？"
1300506-25 = "咦？……你要跟我一起去？"
1300506-26 = "不，嘛，倒也不是不行……"
1300506-27 = "但真的不是什麼大事……"
1300506-28 = "而且雨這麼大，我要去的地方也髒兮兮的，你在這裡等會比較好。"
1300506-29 = "……哈啊。算了，反正說再多你也不會聽吧。 "
1300506-30 = "……隨便你了。"
1300506-34 = "[ns] 跟著佳世子走"
1300506-39 = "[ns3] 「這是……貓咪……？」\n[ns4] 「你說放不下心的傢伙，是指……」"
1300506-42 = "― 你真的沒必要跟我來這裡啊，老師。[wa:860] "
1300506-45 = "― 現在，不在嗎……[wa:2120] "
1300506-48 = "[ns5] 「看來出門了呢。」\n[ns6] 「要等看看嗎？」"
1300506-51 = "― 我只是因為下雨，才來看看。[wa:5180] "
1300506-53 = "― ……應該，沒問題。這孩子一個人也能過得很好。[wa:2780] "
1300506-56 = "― 不被束縛且不會受傷固然好……[wa:3980] "
1300506-59 = "― 但是，一個人很寂寞……[wa:1700] "
1300506-62 = "[ns7] 「…………」\n[ns8] 「佳世子真溫柔。」"
1300506-65 = "― ……我沒辦法不管。就只是這樣。[wa:8560] "
1300506-67 = "― 除此之外沒有其他意思。懂了嗎，老師？[wa:4540] "
1300506-71 = "……雨不知不覺停了呢。"
1300506-72 = "嗯？要把雨傘還我？"
1300506-73 = "不用，傍晚搞不好又會突然下雨……#n明天再還吧。"
1300506-74 = "而且借給你，明天又能再見面了。"
1300506-75 = "雖然我剛剛說了那些話……但現在，沒那麼討厭束縛的感覺。"
1300506-76 = "那麼明天見了，老師。"

[translation]
1300506-1 = "ตรอกเล็กๆ ในวันที่ฝนตก"
1300506-2 = "ด้านหน้าอาคารชาเล่ต์"
1300506-4 = "หลังจากทำงานเสร็จและออกมาที่ด้านนอก คุณครูก็พบว่าฝนกำลังตกหนักมาก"
1300506-5 = "[s] \"เมื่อกี้ท้องฟ้ายังแจ่มใสอยู่เลย....\""
1300506-11 = "หืม....? ครู?#nมีอะไรรึเปล่า?"
1300506-12 = "อะไรนะ? ลืมเอาร่มมาด้วยงั้นเหรอ?"
1300506-13 = "ฉันส่งข้อความไปบอกทาง MOMOTALK แล้วแต่ก็ยังลืมอีกงั้นเหรอ...."
1300506-16 = "เอ้านี่ ร่ม…"
1300506-17 = "ทำไมฉันถึงพกร่มมาสองคันงั้นเหรอ?"
1300506-18 = "รอบๆ ตัวฉันมีพวกคนขี้ลืมอยู่เยอะ#nเลยพกร่มสำรองเอาไว้เผื่อเจอเรื่องแบบนี้ไงล่ะ"
1300506-19 = "ก็รอบตัวมีแต่พวกเด๋อด๋าทั้งนั้นเลยนี่...."
1300506-20 = "ครูถามว่าฉันกำลังจะไปไหนงั้นเหรอ?"
1300506-21 = "อืม.... มีเจ้าหนูที่ต้องให้ฉันคอยดูแลในวันที่ฝนตกแบบนี้อยู่น่ะสิ"
1300506-22 = "ไม่ใช่เรื่องสำคัญอะไรหรอก ครูไม่ต้องเป็นห่วงก็ได้"
1300506-23 = "[s1] มีคนที่คาโยโกเป็นห่วงอยู่อีกงั้นเหรอ?\n[s2] บอกคาโยโกะว่าจะตามไปด้วยเพราะความอยากรู้"
1300506-24 = "อะไรนะ? ....จะไปด้วยงั้นเหรอ?"
1300506-25 = "อะไรนะ? ....จะไปด้วยงั้นเหรอ?"
1300506-26 = "เปล่าหรอก ไม่ใช่ไม่ได้หรอกแต่ว่ามัน...."
1300506-27 = "มันไม่ใช่เรื่องสำคัญอะไรเลย...."
1300506-28 = "แถมตอนนี้ฝนก็ตกหนัก ที่พื้นก็มีแต่โคลนสกปรก..."
1300506-29 = "....เฮ้อ แต่ถึงห้ามครูก็คงไม่ฟังอยู่ดีสินะ.... "
1300506-30 = "ตามใจก็แล้วกัน"
1300506-34 = "[ns] ตามคาโยโกะไป"
1300506-39 = "[ns3] \"บ้านแมว?\"\n[ns4] \"หรือว่าคนที่ต้องคอยดูแลก็คือ....\""
1300506-42 = "― ครูไม่เห็นต้องตามมาถึงที่นี่เลยแท้ๆ[wa:100] "
1300506-45 = "― ไม่อยู่ที่นี่งั้นเหรอ...[wa:1480] "
1300506-48 = "[ns5] \"ออกไปข้างนอกกันสินะ\"\n[ns6] \"รอตรงนี้ก่อนดีไหม?\""
1300506-51 = "― เพราะฝนตกหนักน่ะ ฉันก็เลยมาดูเท่านั้น[wa:4220] "
1300506-53 = "― ...คงไม่เป็นอะไรหรอก เพราะน้องอยู่ลำพังได้[wa:1980] "
1300506-56 = "― การไม่ต้องถูกผูกมัด หรือไม่ต้องคอยกังวลอะไรมันก็ดีอยู่หรอก...[wa:2100] "
1300506-59 = "― แต่ถึงยังไง บางครั้งอยู่คนเดียวมันก็เหงานะ...[wa:340] "
1300506-62 = "[ns7] \"...\"\n[ns8] \"คาโยโกะจังใจดีจังเลยนะ\""
1300506-65 = "― ...เพราะปล่อยไว้เฉยๆ ไม่ได้ต่างหาก ก็แค่นั้น[wa:7400] "
1300506-67 = "― ไม่ได้มีจุดประสงค์อื่นหรอก ทีนี้เข้าใจหรือยังล่ะ??[wa:3260] "
1300506-71 = ".....ฝนหยุดแล้วล่ะ"
1300506-72 = "จะคืนร่มตอนนี้เลยเหรอ?"
1300506-73 = "เดี๋ยวสิ อาจมีฝนไล่ช้างตกลงมาอีกตอนไหนก็ได้....#nเก็บไว้ใช้ก่อนเถอะ"
1300506-74 = "อีกอย่างถ้าครูยืมร่มฉันไป... ตอนเอามาคืนฉันก็จะได้เจอครูอีกใช่ไหมล่ะ?"
1300506-75 = "ถึงจะพูดแบบนั้นก็เถอะ... ฉันไม่ชอบติดหนี้บุญคุณใครหรอกนะ"
1300506-76 = "ถ้างั้นไว้เจอกันพรุ่งนี้นะครู"

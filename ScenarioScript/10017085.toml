[translation]
10017085-1 = "第8話;寒冬夜之夢"
10017085-2 = "咖啡廳「White&Mason」入口"
10017085-4 = "嗚哇──！？"
10017085-5 = "輸，輸了……！"
10017085-6 = "為，為什麼……"
10017085-7 = "實現正義部部長就算了，這些傢伙剛才明明已經打了這麼多場……"
10017085-8 = "怎麼會這樣！？"
10017085-10 = "嘰呀哈哈哈哈哈哈哈哈──！"
10017085-11 = "看來你們似乎缺少認清現況的能力呢。"
10017085-13 = "即便我們變弱，也不代表你們變強了。"
10017085-18 = "你最沒資格說這種話吧！"
10017085-19 = "對啊對啊！你這是哪門子的救護騎士團團長啊！#n就只會搞破壞而已！"
10017085-21 = "請聽我說。#n聖誕節是個值得開心的日子，實際上大家也是這麼認為的。"
10017085-22 = "但是其本質，仍舊是感謝、反思……以及給予的日子。"
10017085-23 = "是反省自我並重拾寬恕之心的日子。"
10017085-24 = "在這樣的日子裡，隨意利用他人好意的你們……！"
10017085-25 = "是不會有好下場的！"
10017085-30 = "別，別高興得太早！後會有期啦！"
10017085-31 = "要怪就怪自己太容易受騙吧！可惡，就只差那臨門一腳了……！"
10017085-44 = "……逃走了呢。"
10017085-45 = "真不甘心呢，如果身體不是這個狀態就好了。"
10017085-46 = "也不想想是因為誰才變成這樣……"
10017085-48 = "大家，都沒事吧！？"
10017085-49 = "別擔心！我們立刻開始治療！"
10017085-51 = "非，非常感謝。那個，要治療的話，請優先治療其他人吧……"
10017085-53 = "剛才已經幫其他人都治療過了，請放心。"
10017085-54 = "為了預防出現這種狀況，我們隨時都做好了準備！"
10017085-56 = "已經治療完畢了？#n果然……"
10017085-57 = "我們總是承蒙你們的關照呢，真不好意思。"
10017085-62 = "請別這麼說。#n況且今天是我們不好……"
10017085-63 = "蓮實同學，非常抱歉！#n雖然道歉於事無補……！"
10017085-70 = "（美禰破壞完，再由騎士團給予治療……）"
10017085-71 = "（這麼說來，我差點都忘了……他們從以前就是這樣子呢）"
10017085-73 = "……所以，美禰團長。關於這次的事，有什麼話要說嗎？"
10017085-74 = "我沒有任何要辯解的。"
10017085-79 = "美禰團長？為什麼突然卸下裝備，還把槍給我呢……？"
10017085-80 = "這罪過，我只能以命償還了！"
10017085-81 = "一切處分，都交給蓮實副部長裁決！"
10017085-82 = "什麼……？"
10017085-87 = "團，團長……"
10017085-91 = "嗚哇，團長～！"
10017085-93 = "芹奈、花繪，請不要哭泣。#n承擔責任也是我們的「救護」。"
10017085-94 = "如果沒有人願意承擔責任，只會產生更多的悲傷。"
10017085-95 = "我已經解除所有的武裝……請對我下達處分吧！"
10017085-96 = "唉……"
10017085-97 = "能解開誤會，對我來說已經足夠了。"
10017085-98 = "而且我和其他人……都在救護騎士團的治療下恢復了。"
10017085-99 = "弦生也覺得這樣就行了吧？"
10017085-100 = "嘰耶耶……"
10017085-101 = "……就是這樣。所以說，這起事件就告一段落了。"
10017085-102 = "真的非常謝謝你們，芹奈同學、花繪同學。"
10017085-107 = "快，快別這麼說，我們只是做身為救護騎士團該做的事……"
10017085-108 = "該道謝的反而是我們！#n願意原諒救護騎士團犯下的過錯！"
10017085-110 = "那是因為……"
10017085-111 = "……不。#n就當作是這樣吧。"
10017085-112 = "請起來，美禰團長。#n一直這樣的話，我們會很為難的。"
10017085-113 = "[s]「他們是這麼說的唷？」"
10017085-114 = "但是，老師……"
10017085-115 = "[s1]「雖然那些不良學生的目的是欺騙你們……」\n[s2]「但是願意傾聽弱者心聲的想法，我認為很了不起哦。」"
10017085-118 = "……"
10017085-119 = "既然您都這麼說了，我會虛心懺悔……"
10017085-124 = "那個，那我們就先告辭了……"
10017085-125 = "在派對途中打擾你們……真的很抱歉！"
10017085-127 = "也對，既然都提到派對了……"
10017085-128 = "機會難得，不如就加入我們吧？"
10017085-130 = "咦？副部長的意思是……？"
10017085-131 = "要邀請我們參加派對嗎！？"
10017085-133 = "是的，畢竟騷動也結束了。#n而且派對就是要人多才開心吧。"
10017085-134 = "你覺得如何，弦生？"
10017085-135 = "咦？啊，呃，唔……"
10017085-140 = "雖然有點害羞，但看起來非常歡迎呢。"
10017085-141 = "老師這邊呢？"
10017085-142 = "[s3]「非常樂意！」\n[s4]「這是我的榮幸！」"

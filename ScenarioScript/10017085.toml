[translation]
10017085-1 = "Episode 8; A Midwinter Night's Dream"
10017085-2 = "White & Mason Entrance"
10017085-4 = "Ack!"
10017085-5 = "We lost again!"
10017085-6 = "I-I don't understand!"
10017085-7 = "Shouldn't these people's strength be spent by now?!"
10017085-8 = "I can't accept this! I can't accept that we were beaten so easily! Again!"
10017085-10 = "Kyaaaaaak!"
10017085-11 = "You seem unable to grasp the simple reality before you."
10017085-13 = "No matter how weakened we are, that doesn't make you any stronger."
10017085-18 = "I don't wanna hear that from you!"
10017085-19 = "Yeah! Who are you to lecture us?! Call yourself a captain all you want, you're just another violent thug!"
10017085-21 = "Listen. Christmas is known to be a festive day full of joy. That's what people anticipate, and that's how they treat it."
10017085-22 = "But the spirit of the day is about giving and gratitude, about reflection and commemoration."
10017085-23 = "It's about being present and having a generous heart as you walk out into the world with a modest step, seeking to refine yourself."
10017085-24 = "And yet, on a day like this, you sought only to abuse people's good will and create conflict!"
10017085-25 = "How could you expect any other end but this?!"
10017085-30 = "Oh blah blah blah! Do you practice these speeches at home? Well, keep practicing! 'Cause we'll be back!"
10017085-31 = "It's not our fault you were stupid enough to believe us! Argh, we were so close!"
10017085-44 = "We lost them."
10017085-45 = "How infuriating. If only we were in better condition!"
10017085-46 = "I wonder whose fault that is..."
10017085-48 = "Is everyone okay?"
10017085-49 = "Let me treat you! Stay still for a second."
10017085-51 = "Oh. Thank you, but I'd like you to treat the other Justice Task Force members first."
10017085-53 = "It's okay. I already tended to them."
10017085-54 = "The Remedial Knights are always ready!"
10017085-56 = "Already? I see."
10017085-57 = "We're already so indebted to you. I feel a bit guilty."
10017085-62 = "Don't worry about it. Besides...today was our mistake, after all..."
10017085-63 = "I'm sorry, Hasumi. I don't know how we'll ever make it up to you, but we'll do our best..."
10017085-70 = "(Mine destroying everything, then leaving it to her knights to pick up the pieces...)"
10017085-71 = "(It's been so long I almost feel nostalgic. *sigh*)"
10017085-73 = "So, what do you have to say for yourself, Captain Mine?"
10017085-74 = "I'm not going to hide behind excuses."
10017085-79 = "Captain? Why are you putting down your shield? And taking off your coat? And giving me your gun?"
10017085-80 = "My sin is too great! My penitence can be found only in death!"
10017085-81 = "I surrender my fate to Vice President Hasumi!"
10017085-82 = "...What?"
10017085-87 = "C-Captain..."
10017085-91 = "Captaaaain! I'll miss you!"
10017085-93 = "No tears, Serina, Hanae. Taking responsibility is its own form of aid."
10017085-94 = "When you don't take responsibility, you commit two evils—one against the victim, and one against yourself."
10017085-95 = "And so, I must strip myself of my arms and lay bare before you, Hasumi. Please, punish me!"
10017085-96 = "*sigh*"
10017085-97 = "As long as the misunderstanding is resolved, I'm satisfied."
10017085-98 = "Myself and the other injured Justice Task Force members have recovered thanks to the help of the Remedial Knights."
10017085-99 = "Tsurugi? Are you okay with that?"
10017085-100 = "Gyaaahhh..."
10017085-101 = "That's a yes. Then it's all come to a close."
10017085-102 = "Thank you for everything, Serina, Hanae."
10017085-107 = "Huh?! N-Not at all. We were just doing our duty as Remedial Knights..."
10017085-108 = "We should be thanking you for forgiving us so quickly."
10017085-110 = "That's..."
10017085-111 = "Well, let's leave it at that for now."
10017085-112 = "Captain Mine, please get up. I'll start to worry if you keep this up."
10017085-113 = "[s] \"I think the whole Justice Task Force agrees?\""
10017085-114 = "But, Sensei..."
10017085-115 = "[s1] \"Although the thugs were being deceptive,\"\n[s2] \"it was still nice of the Remedial Knights to try to look out for the weak.\""
10017085-118 = "..."
10017085-119 = "I feel ashamed, but thank you for saying that, Sensei."
10017085-124 = "We'll...get going now, I suppose..."
10017085-125 = "We're so sorry for crashing your party!"
10017085-127 = "Right. Actually, about that party..."
10017085-128 = "Why don't the Remedial Knights join us?"
10017085-130 = "Huh? Us?"
10017085-131 = "Really?!"
10017085-133 = "Well, now that all the commotion has been sorted out, what better time to celebrate with friends?"
10017085-134 = "What do you think, Tsurugi?"
10017085-135 = "Egh? Ugh... Gyaaaa..."
10017085-140 = "As you can tell, she seems a bit embarrassed, but she'd like that."
10017085-141 = "What about you, Sensei?"
10017085-142 = "[s3] \"I am one-hundred percent down!\"\n[s4] \"Let's get this party started!\""

[translation]
10047105-3 = "Wildhunt Prefectural Council Dormitory Hallway"
10047105-6 = "[ns] \"This place is oddly empty.\""
10047105-7 = "Heehee... We lost them...in their own dorm."
10047105-8 = "I think everyone headed to the Nameless Bell Tower."
10047105-9 = "Oh, Rena... I hope she made it out okay."
10047105-10 = "Since the bell is silent... They should return soon."
10047105-12 = "[ns] \"Everyone, let's hurry!\""
10047105-20 = "Now, if we just finish up at the front..."
10047105-25 = "How did you get to our dorms?"
10047105-27 = "Everyone, freeze! We're done with your crude tricks!"
10047105-31 = "...Nyuhuhu, it's too late. We just completed the magic circle."
10047105-32 = "It's time! And so, with the full moon, the gates of truth will open...!"
10047105-36 = "A magic circle and the full moon? C-Could it be...?"
10047105-37 = "She's actually doing it! The urban legend...?"
10047105-38 = "Absolutely! We'll show you!!"
10047105-39 = "Magic circle, activate...!"
10047105-47 = "G-Gahhh...! My strength! My life force!"
10047105-48 = "U-Ugh...! I-Is this how I die?!"
10047105-49 = "What's gotten into you? It's just LED lighting."
10047105-50 = "Yeah. I know."
10047105-51 = "The mood felt right, I guess."
10047105-56 = "H-Huh? Why isn't anything happening?"
10047105-57 = "I laid all the plans out. The circle was drawn perfectly!"
10047105-58 = "Is there no such thing as Wish-Fulfilling Magic...?"
10047105-62 = "But isn't it wonderful? All of Wildhunt is shining."
10047105-64 = "...Hm."
10047105-65 = "Out of respect, we use a special title for those who handle gems. They're called \"Shapers of Light.\""
10047105-66 = "And \"gems\" means more than simple stones. I see beautiful gems sparkling all around us, like in the passion of so many girls fighting for their dreams."
10047105-67 = "That being said, as I stand with you, I see that what we crafted together...this bewitching shape of light..."
10047105-68 = "...is all that matters."
10047105-70 = "All right, wrap it up. Surrender peacefully."
10047105-71 = "And you'll pay for interrupting our sleep!"
10047105-92 = "[ns] \"...Is this how it ends...?\""
10047105-94 = "Everyone. Wait."
10047105-102 = "[ns] \"You're...\""
10047105-103 = "Hello. Please wait a moment."
10047105-104 = "The Assembly President requests a word."
10047105-106 = "The Assembly President...? She wants to talk to US?"
10047105-107 = "Correct. It's for you."
10047105-113 = "Good evening, everyone. This is Uruwashi Manami, President of the Assembly of Arts."
10047105-114 = "I know it's late at night. Thank you for your hard work."
10047105-115 = "I wish I could be there at the scene with you, but, due to unfavorable circumstances, I had to call in."
10047105-116 = "First, to be honest..."
10047105-120 = "...I'm very touched."
10047105-121 = "I've long taken an interest in the artists of Unit 404."
10047105-122 = "I knew they would make something wonderful together, something unique and breathtaking."
10047105-123 = "Tonight, you have met my lofty expectations by crafting a masterpiece."
10047105-124 = "This is a never-before-seen avant-garde installation where Wildhunt's past and present are linked through light and understated geometrics."
10047105-125 = "I wish to keep this work of art exhibited and maintained. Let everyone know that this art was made by Unit 404."
10047105-126 = "Furthermore, I intend to have an observation deck installed so that everyone can enjoy the view."
10047105-127 = "Once I get a proper photograph, I will proudly display it in my museum."
10047105-128 = "Fufu... I look forward to your next endeavor, Unit 404. I hope to meet you all in person next time."
10047105-129 = "Thank you for this creation and the birth of new art form. ...Farewell."
10047105-131 = "The magic circle we drew...is a \"masterpiece\"?"
10047105-132 = "It's as I told you. It's an exquisite shaping of light."
10047105-133 = "Council members... You think it's pretty too, don't you?"
10047105-137 = "Well... Yes."
10047105-138 = "Hm. It'd be a shame to take it down."
10047105-142 = "I...always wanted to make something people would notice."
10047105-143 = "...To be a beloved artist, not a failing student."
10047105-144 = "And the only reason I kept the confident smile was...because I couldn't hide the shame."
10047105-145 = "But now... Thank you. This is all because of you."
10047105-146 = "If it weren't for your help, I..."
10047105-150 = "[ns1] \"No. This was possible because you worked hard.\"\n[ns2] \"Please be proud.\""
10047105-153 = "[ns3] \"This is the Wonderland of Hopes and Dreams.\"\n[ns4] \"This is where everyone's dreams come true.\""
10047105-156 = "Master..."
10047105-161 = "Yes...! I will continue to work hard and do my best!"
10047105-162 = "I believe...I'll be able to do anything with you by my side!"
10047105-176 = "Yes. All of it really did come true."
10047105-177 = "This is the Wish-Fulfilling Magic I wanted!"
10047105-179 = "I wish..."
10047105-180 = "...for all of you to fulfill your dreams!"
10047105-181 = "And, for the magical days like this..."
10047105-182 = "...to continue forever!"

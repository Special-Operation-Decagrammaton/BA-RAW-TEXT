[translation]
10047105-3 = "狂獵舍監隊宿舍走廊"
10047105-6 = "[ns]「這裡意外的沒有人呢？」"
10047105-7 = "咿嘻……已經甩掉追兵了……"
10047105-8 = "其他人好像都往無名鐘塔的方向走了。"
10047105-9 = "玲奈醬……希望他能順利逃掉。"
10047105-10 = "鐘聲已經停了……他們應該很快就會回來。"
10047105-12 = "[ns]「大家動作快！」"
10047105-20 = "只要完成這個入口就……！"
10047105-25 = "這些傢伙，竟然敢跑到我們的宿舍來……！"
10047105-27 = "所有人都不准動！你們的把戲到此為止了！！"
10047105-31 = "……妞呵呵呵，你們晚了一步呢。#n魔法陣的構築已經完成了。"
10047105-32 = "時候到了！#n在滿月最盛的此刻，真理之門將會開啟……！"
10047105-36 = "魔法陣和滿月？#n難，難不成那傢伙……！"
10047105-37 = "打算重現學院的都市傳說！？"
10047105-38 = "沒錯！就讓你們見識見識吧！！"
10047105-39 = "魔法鍊成陣，啟動──！！"
10047105-47 = "唔，唔哇哇啊……！突然感覺全身無力……！！"
10047105-48 = "可，可惡……！到，到此為止了嗎……！！"
10047105-49 = "大家怎麼了？#n不就是燈亮起來了而已嗎？"
10047105-50 = "嗯，我知道。"
10047105-51 = "只是想試著講看看而已。"
10047105-56 = "奇，奇怪？怎麼什麼事都沒發生？"
10047105-57 = "魔法陣應該畫得很正確才對啊……！"
10047105-58 = "能實現願望的魔法並不存在……是嗎。"
10047105-62 = "不過很美對吧？#n整個學院都在閃閃發亮呢。"
10047105-64 = "……嗯。"
10047105-65 = "我們常以「光之工匠」之名，向寶石匠人表達敬意。"
10047105-66 = "而所謂的寶石，指的並不僅僅是物質……#n少女們追逐夢想的熱情，不也是美麗的寶石嗎？"
10047105-67 = "因此，作為同行者的我是這麼想的。#n此時此刻，在這裡的一切──"
10047105-68 = "──正是美麗的光之工藝。"
10047105-70 = "夠了，乖乖投降吧。"
10047105-71 = "居然敢害我們熬夜，一定要讓你們付出代價！"
10047105-92 = "[ns]「……到此為止了嗎。」"
10047105-94 = "各位。請稍等一下。"
10047105-102 = "[ns]「你是……」"
10047105-103 = "麻煩大家稍安勿躁。"
10047105-104 = "評議會長大人有話要親自傳達。"
10047105-106 = "評議會長……？#n那樣的人有話要告訴我們？"
10047105-107 = "沒錯，正是如此。#n我這就為各位接通通訊。"
10047105-113 = "各位晚安。我是評議會長「雲類鷲真奈美」。"
10047105-114 = "在這樣的深夜中，真是辛苦各位了。"
10047105-115 = "儘管我十分希望能親赴現場……可惜條件並不允許，僅能以聲音傳達。"
10047105-116 = "首先，坦白說……"
10047105-120 = "……我很感動。"
10047105-121 = "其實我一直對404號室的各位相當感興趣。"
10047105-122 = "我認為你們能創造出與眾不同、更加特別的藝術。"
10047105-123 = "而今晚，各位果然不負期待，創作出了極為出色的藝術作品。"
10047105-124 = "將學院的過去與現在以光相連，並用簡潔的圖形來呈現……#n這是前所未有的前衛藝術。"
10047105-125 = "我希望能將這件作品，以404號室的名義繼續展出。"
10047105-126 = "日後我將推動在高處設置觀景台的計畫，好讓所有人都能欣賞。"
10047105-127 = "如果能拍成照片留存，作為我的「收藏品」也毫不遜色吧。"
10047105-128 = "呵呵呵……期待你們今後的表現。#n下次我會正式拜訪各位的。"
10047105-129 = "感謝這次的創作，以及新藝術的誕生。#n……那麼，再會。"
10047105-131 = "我們畫的魔法陣……是出色的藝術作品？"
10047105-132 = "我不是說了嗎？#n這是美麗的光之工藝。"
10047105-133 = "舍監隊的各位……其實也覺得很漂亮吧？"
10047105-137 = "嗯……這倒是沒錯。"
10047105-138 = "是啊，假如要拆掉的話確實有點可惜。"
10047105-142 = "我……一直希望可以創作出受到大家認可的作品。"
10047105-143 = "不想永遠當個可憐的劣等生，而是成為受人喜愛的藝術家。"
10047105-144 = "總是帶著自信滿滿的笑容，也是為了掩飾那份焦躁。"
10047105-145 = "謝謝大家。#n這一切都是多虧了你們。"
10047105-146 = "如果沒有你們的話，我……"
10047105-150 = "[ns1]「不，這是因為繪梨的努力才辦到的。」\n[ns2]「所以要有自信。」"
10047105-153 = "[ns3]「這裡是夢想與希望的仙境。」\n[ns4]「是個能實現大家夢想的地方啊。」"
10047105-156 = "御者……"
10047105-161 = "嗯……！我以後也會繼續努力的！"
10047105-162 = "只要和大家在一起……感覺什麼都能做到！"
10047105-176 = "真的實現了。"
10047105-177 = "我所期盼的……能實現願望的魔法！"
10047105-179 = "我希望……"
10047105-180 = "所有人都能在這裡實現夢想。"
10047105-181 = "並且……"
10047105-182 = "這段宛如魔法的日常，能夠永遠持續下去！"

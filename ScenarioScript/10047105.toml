[translation]
10047105-3 = "ทางเดินในหอพักฝ่ายดูแลหอพัก ไวลด์ฮันต์"
10047105-6 = "[ns] \"ที่นี่คนไม่เยอะอย่างที่คิดไว้แฮะ?\""
10047105-7 = "ฮิฮิ... ก็คนพวกนั้นไปที่อื่นกันหมดแล้วนี่..."
10047105-8 = "คนอื่นๆ น่าจะไปที่หอระฆังไร้ชื่อกันหมดแล้วนะคะ"
10047105-9 = "เรนะจัง... หวังว่าจะหนีออกมาได้อย่างปลอดภัยนะคะ"
10047105-10 = "ตอนนี้ระฆังเงียบไปแล้ว... เดี๋ยวฝ่ายดูแลหอพักก็คงกลับมากันแล้วละ"
10047105-12 = "[ns] \"รีบกันเถอะทุกคน!\""
10047105-20 = "ตอนนี้ก็เหลือแค่ตรงทางเข้าแล้ว...!"
10047105-25 = "เด็กพวกนี้นี่ มาถึงหอพักของพวกเราตั้งแต่ตอนไหน...!"
10047105-27 = "ทุกคนหยุดเดี๋ยวนี้นะ! หยุดเอาเรื่องเหลวไหลมาหลอกพวกฉันได้แล้ว!!"
10047105-31 = "อุฮุฮุฮุ ไม่ทันแล้วละค่ะ... วงเวทเพิ่งจะเสร็จสมบูรณ์ไปเมื่อกี้เอง"
10047105-32 = "ได้เวลาแล้วค่ะ! เมื่อพระจันทร์เต็มดวงปรากฏ ประตูแห่งความจริงจะเปิดออก...!"
10047105-36 = "วงเวทกับพระจันทร์เต็มดวง? ยะ... อย่าบอกนะว่ายัยเด็กนั่น...!"
10047105-37 = "คิดจะทำให้ตำนานเมืองของโรงเรียนเกิดขึ้นอีกครั้ง?!"
10047105-38 = "ใช่ค่ะ! ฉันจะทำให้เห็นเองค่ะ!!"
10047105-39 = "วงเวทโบราณ จงปรากฏขึ้น...!!"
10047105-47 = "วะ... เหวอออ...! ทำไมเรี่ยวแรงถึงได้...!!"
10047105-48 = "อะ... อึกก...! ฉะ... ฉันจบเห่แล้วเหรอเนี่ย...!!"
10047105-49 = "ทุกคนเป็นอะไรกันไปหมดคะ? ก็แค่หลอดไฟที่ส่องสว่างขึ้นก็เท่านั้นเอง"
10047105-50 = "อื้อ ฉันก็รู้"
10047105-51 = "แค่ลองๆ พูดดูน่ะ"
10047105-56 = "เอะ... เอ๋? ทำไมไม่เกิดอะไรขึ้นเลยล่ะคะ?"
10047105-57 = "เราทำให้วงเวทเกิดขึ้นมาแล้วนี่นา...!"
10047105-58 = "เวทมนตร์ที่ทำให้ความปรารถนาเป็นจริง... ไม่มีอยู่จริงงั้นเหรอ..."
10047105-62 = "แต่มันก็สวยดีนะคะ ทั้งโรงเรียนส่องสว่างสุกใสเลยค่ะ "
10047105-64 = "ฮืม..."
10047105-65 = "เรามักเรียกผู้ที่ทำงานกับอัญมณีด้วยความเคารพว่า <ช่างเจียระไนแห่งแสงสว่าง> ค่ะ"
10047105-66 = "และคำว่าอัญมณีก็ไม่ได้หมายความถึงสิ่งของเท่านั้น ความหลงใหลที่มีต่อความฝันของเหล่าเด็กสาว นี่ก็เป็นอัญมณีที่งดงามไม่แพ้กันไม่ใช่เหรอคะ?"
10047105-67 = "ในแง่นั้นแล้ว ในฐานะของคนที่ทำปฏิบัติการด้วยกัน ฉันคิดว่า... สิ่งที่ปรากฏในตอนนี้..."
10047105-68 = "คืองานเจียระไนแสงที่งดงามค่ะ"
10047105-70 = "เลิกเพ้อเจ้อกันได้แล้ว ยอมแพ้แต่โดยดีเถอะ"
10047105-71 = "ชดใช้ที่ทำให้พวกเราไม่ได้นอนเลยนะ!"
10047105-92 = "[ns] \"ต้องจบลงอย่างนี้งั้นเหรอ...\""
10047105-94 = "ทุกคน เดี๋ยวก่อนค่ะ"
10047105-102 = "[ns] \"เธอคือ...\""
10047105-103 = "สวัสดีค่ะ ขอเวลาทุกคนสักครู่นะคะ"
10047105-104 = "ท่านประธานสภาศิลปะมีเรื่องที่อยากบอกน่ะค่ะ"
10047105-106 = "ประธานสภาศิลปะ...? ท่านอยากบอกอะไรกับพวกฉันงั้นเหรอคะ?"
10047105-107 = "ใช่แล้วค่ะ ฉันจะต่อสายให้นะคะ"
10047105-113 = "สวัสดีค่ะทุกคน ฉันคือ <อุรุวาชิ มานามิ> ประธานสภาศิลปะค่ะ "
10047105-114 = "ในค่ำคืนที่ยาวนานนี้ ทุกคนคงทำงานอย่างหนักเลยนะคะ"
10047105-115 = "ถ้าเป็นไปได้ฉันก็อยากไปหาทุกคนถึงที่นั่นด้วยตัวเอง แต่เงื่อนไขบางอย่างทำให้ฉันได้แค่ส่งเสียง#nของตัวเองมาแบบนี้ค่ะ"
10047105-116 = "ก่อนอื่นฉันขอบอกตามตรงว่า..."
10047105-120 = "ฉันประทับใจมากๆ เลยค่ะ..."
10047105-121 = "ที่จริงฉันสนใจในตัวพวกคุณห้อง 404 มานานแล้วค่ะ"
10047105-122 = "ฉันเชื่อว่าพวกคุณจะสร้างงานศิลปะที่แตกต่างและพิเศษกว่าที่เคยมีได้น่ะค่ะ"
10047105-123 = "แล้วคืนนี้พวกคุณก็สร้างสรรค์งานศิลปะแสนงดงามได้อย่างที่ฉันคาดหวัง"
10047105-124 = "งานศิลปะที่เชื่อมโยงอดีตและปัจจุบันของโรงเรียนด้วยแสง และแสดงออกผ่านรูปทรงที่เรียบง่าย#nนี่คืองานศิลปะก้าวหน้าที่ไม่เคยปรากฏมาก่อนเลยค่ะ"
10047105-125 = "ฉันอยากจัดแสดงผลงานชิ้นนี้ต่อไปในนามของสมาชิกห้อง 404 ทุกคนค่ะ"
10047105-126 = "ฉันจะจัดการติดตั้งจุดชมวิวในที่สูงๆ ไว้ให้นักเรียนทุกคนได้ชื่นชมผลงานชิ้นนี้"
10047105-127 = "และถ้าได้ถ่ายภาพของผลงานนี้ ก็คงเป็นภาพที่คู่ควรจะมาอยู่ใน <คอลเลกชัน> ของฉันด้วยค่ะ"
10047105-128 = "ฮุฮุฮุ... ฉันจะตั้งตารอผลงานในอนาคตของพวกคุณนะคะ #nแล้วโอกาสหน้าฉันจะไปพบอย่างเป็นทางการค่ะ"
10047105-129 = "ขอบคุณสำหรับความคิดริเริ่มและการก่อกำเนิดงานศิลปะแนวใหม่นะคะ #nฉันขอวางสายเพียงเท่านี้ค่ะ..."
10047105-131 = "วงเวทของพวกเรา... คืองานศิลปะที่ยิ่งใหญ่งั้นเหรอ?"
10047105-132 = "ฉันก็บอกไปแล้วนี่คะ? นี่คืองานเจียระไนแสงที่งดงามเลยค่ะ"
10047105-133 = "ฝ่ายดูแลหอพัก... จริงๆ แล้วพวกเธอก็คิดว่ามันสวยใช่มั้ยล่ะ?"
10047105-137 = "ก็... มันก็สวยอยู่หรอก"
10047105-138 = "อืม จะให้รื้อทิ้งก็น่าเสียดายนะ"
10047105-142 = "ฉัน... อยากสร้างผลงานที่ได้รับการยอมรับจากทุกคนมานานแล้วค่ะ"
10047105-143 = "ฉันอยากเป็นศิลปินผู้เป็นที่รัก ไม่ใช่นักเรียนสอบตกที่ไม่เอาไหน"
10047105-144 = "ที่ฉันเดินไปไหนมาไหนอย่างมั่นใจพร้อมรอยยิ้มบนใบหน้า ก็เพื่อปกปิดความทุกข์ใจนั้นค่ะ"
10047105-145 = "ขอบคุณนะคะ เพราะได้ทุกคนช่วยไว้แท้ๆ เลย"
10047105-146 = "ถ้าไม่มีทุกคน ฉันก็คง..."
10047105-150 = "[ns1] \"ไม่หรอก สิ่งนี้มาจากความพยายามของเอริต่างหากล่ะ\"\n[ns2] \"ภูมิใจในตัวเองต่อสิ่งที่เกิดขึ้นดีกว่านะ\""
10047105-153 = "[ns3] \"ที่นี่คือดินแดนมหัศจรรย์แห่งความฝันและความหวัง\"\n[ns4] \"ความฝันของทุกคนจะต้องเป็นจริงในที่แห่งนี้แน่นอน\""
10047105-156 = "มาสเตอร์..."
10047105-161 = "ค่ะ...! ฉันจะพยายามต่อไปค่ะ!"
10047105-162 = "ถ้าได้อยู่กับทุกคน... ฉันก็รู้สึกเหมือนทำได้ทุกอย่างเลยค่ะ!"
10047105-176 = "ค่ะ มันเกิดขึ้นจริงๆ ด้วยค่ะ"
10047105-177 = "เวทมนตร์สมปรารถนา... ที่ฉันเฝ้าฝัน!"
10047105-179 = "ฉันเฝ้าฝันไว้ค่ะ"
10047105-180 = "ว่าความฝันของทุกคนจะเป็นจริงที่นี่"
10047105-181 = "และชีวิตประจำวันที่มหัศจรรย์ราวกับเวทมนตร์..."
10047105-182 = "จะดำเนินต่อไปอย่างไม่สิ้นสุด!"

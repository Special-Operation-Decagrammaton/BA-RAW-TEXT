[translation]
1010803-1 = "#title;전기양을 쫓는 모험"
1010803-2 = "#na;(갑자기 유우카로부터 이상한 메시지를 받았기에 무슨 일이 생긴 건 아닐까 걱정되어 유우카가 머무르고 있는 밀레니엄의 기숙사로 찾아갔다.)"
1010803-3 = "#na;(기숙사 건물은 겉으로 보기에는 별문제 없이 평온해 보였지만……)"
1010803-4 = "#st;[0,0];instant;1;"
1010803-5 = "#clearST"
1010803-6 = "#wait;1300"
1010803-7 = "#na;유우카 파자마;으으…… 이 늦은 시간에 누구야?"
1010803-8 = "#na;유우카 파자마;부 활동비와 관련된 이의 신청이라면 서면으로 제출하라고 말해두었을 텐데—"
1010803-9 = "#st;[0,0];instant;1;"
1010803-10 = "#clearST"
1010803-11 = "#wait;1200"
1010803-12 = "3;유우카 파자마;01\n#3;a\n#wait;1500"
1010803-13 = "3;유우카 파자마;11\n#3;em;[!]\n#3;shake\n#wait;1200"
1010803-14 = "3;유우카 파자마;11;[USERNAME] 선생님?! 이 시간에 밀레니엄에는 무슨 일로— 아니, 제 방에는 무슨 일로……\n#3;em;[?!]"
1010803-15 = "3;유우카 파자마;04;자, 잠시만요! 아직 선생님을 방에 들일 준비가 되지 않았으니까……"
1010803-16 = "3;유우카 파자마;19;5분! 5분만 준비를 할 시간을 주세요!\n#3;em;[땀]\n#3;stiff"
1010803-17 = "[s1] \"괜찮아, 유우카?\"\n[s2] \"뭔가 문제가 생긴 것처럼 보이지는 않는데……\""
1010803-18 = "#wait;10"
1010803-19 = "#wait;10"
1010803-20 = "3;유우카 파자마;02;네? 그게 무슨 말씀이신가요?\n#3;em;[?]"
1010803-21 = "3;유우카 파자마;02;제가 아까 모모톡으로 대화하던 중 갑자기 이상한 메시지를 보내더니 연락이 끊어졌다고요?"
1010803-22 = "3;유우카 파자마;15;그럴 리가요. 오히려 저는 갑자기 선생님께서 답장을 하지 않으시기에 일찍 자리에 누우셨나, 하고 생각하던 중이었는데……"
1010803-23 = "[ns] 유우카에게 모모톡으로 받은 내용을 보여준다."
1010803-24 = "3;유우카 파자마;01;이건……\n#3;em;[...]"
1010803-25 = "3;유우카 파자마;99;아, 그렇구나. 그렇게 된 거였군요."
1010803-26 = "3;유우카 파자마;05;정말이지, 누가 또 전기양을 서버실에 풀어 둔 모양이네요.\n#3;em;[한숨]"
1010803-27 = "[s] \"……전기양?\""
1010803-28 = "3;유우카 파자마;02;아, 설명이 부족했지요. 죄송해요. 전기양은 밀레니엄 타워에서 사용하고 있는 절전 드론의 별명이에요.\n#3;em;[반응]"
1010803-29 = "3;유우카 파자마;01;밀레니엄 학원에는 높은 전력을 사용하는 설비들이 꽤 있는지라, 하루에 지출하는 전기세의 비용도 만만치 않거든요."
1010803-30 = "3;유우카 파자마;02;그래서 학생들이 없는 밤에는 전력이 낭비되지 않도록 사용하지 않는 전자기기를 제어하는 절전 드론이 교내를 돌아다니는데, 이 드론이 내는 신호음이 양 울음소리 같다고 해서 학생들은 전기양이라고 부르고 있어요."
1010803-31 = "3;유우카 파자마;09;다만 서버실이나 기숙사처럼 하루 종일 전기를 사용해야 하는 장소에는 전기양이 접근하지 못하도록 출입금지 센서를 설치해 뒀는데, 아무래도 누군가가 그걸 모르고 치워버린 모양이네요.\n#3;em;[속상함]\n#3;stiff"
1010803-32 = "[s3] \"그렇구나.\"\n[s4] \"유우카에게 무슨 일이 생긴 게 아니라 다행이야.\""
1010803-33 = "#wait;10"
1010803-34 = "#wait;10"
1010803-35 = "3;유우카 파자마;04;네. 일부러 이렇게 찾아오실 필요는 없었지만……\n#3;em;[///]\n#3;stiff"
1010803-36 = "#st;[0,0];instant;1;"
1010803-37 = "#clearST"
1010803-38 = "3;유우카 파자마;14\n#3;em;[...]\n#wait;2500"
1010803-39 = "3;유우카 파자마;05;저, 선생님. 늦은 시간에 부탁을 드려 죄송하지만…… 여기까지 와주신 김에 하나 더 부탁을 드려도 괜찮을까요?"
1010803-40 = "[s] \"물론이지, 무슨 일인데?\""
1010803-41 = "3;유우카 파자마;02;지금 전기양이 학원을 마음대로 돌아다니고 있다면 학생들의 연구 설비나 데이터가 저장된 서버를 멋대로 차단할지도 모르니, 빨리 회수해서 '우리'에 넣어두어야 할 것 같아요.\n#3;em;[반응]"
1010803-42 = "3;유우카 파자마;01;학생들이 오랫동안 연구한 데이터가 절전 드론에 의해 날아가 버리면 큰일이니까요."
1010803-43 = "3;유우카 파자마;02;다소 급한 상황이니 선생님께서 함께 전기양을 회수하는 것을 도와주시겠어요?\n#3;em;[?]"
1010803-44 = "[s] \"물론이지. 맡겨만 줘.\""
1010803-45 = "3;유우카 파자마;03;감사합니다. 신호가 잡히지 않는 전기양의 숫자는 20 마리 정도 되는 것 같으니…… 서둘러 찾아보도록 하죠.\n#3;greeting"
1010803-46 = "#all;hide"
1010803-47 = "#na;(이후, 유우카와 함께 교내를 돌아다니며 '전기양'이라는 이름의 절전 드론을 찾아다녔다.)"
1010803-48 = "#all;hide"
1010803-49 = "#na;절전 드론;메에에에—"

1010803-53 = "2;유우카 파자마;05\n#2;al\n#wait;600"
1010803-54 = "2;유우카 파자마;09\n#2;greeting\n#wait;700"
1010803-55 = "2;유우카 파자마;09\n#2;stiff\n#wait;1300"
1010803-56 = "2;유우카 파자마;09;전기양이 19 마리……"
1010803-57 = "#all;hide"
1010803-58 = "4;유우카 파자마;05\n#4;ar\n#wait;1200"
1010803-59 = "4;유우카 파자마;05\n#4;stiff\n#wait;1300"
1010803-60 = "4;유우카 파자마;05\n#wait;1600"
1010803-61 = "4;유우카 파자마;09;그리고…… 20 마리!"
1010803-62 = "#st;[0,0];instant;1;"
1010803-63 = "#clearST"
1010803-64 = "4;유우카 파자마;99\n#4;em;[땀]\n#wait;1500"
1010803-65 = "4;유우카 파자마;07\n#4;em;[한숨]\n#wait;1500"
1010803-66 = "4;유우카 파자마;13;수고 많으셨습니다, 선생님! 이걸로 '우리' 밖으로 나간 전기양을 모두 회수했네요!\n#4;m3\n#4;em;[반응]"
1010803-67 = "4;유우카 파자마;13;다행히 외부와 데이터를 주고받는 서버실을 제외하면 피해는 없었던 것 같아요."
1010803-68 = "4;유우카 파자마;99;선생님께서 알려주시지 않았다면 피해가 얼마나 커졌을지…… 생각만 해도 아찔하네요.\n#4;em;[...]"
1010803-69 = "[s] \"잘 해결되었다니 다행이야.\""
1010803-70 = "#st;[0,0];instant;1;"
1010803-71 = "#clearST"
1010803-72 = "#wait;1000"
1010803-73 = "[ns] \"그나저나 한밤중에 양을 세고 있었더니 어쩐지 잠이 오는걸.\""
1010803-74 = "4;유우카 파자마;01;그런가요? 저는 아직도 불면증이 조금 남아 있어서 그런지, 그렇게 졸립지는 않은 것 같은데……\n#4;em;[?]"
1010803-75 = "4;유우카 파자마;02;확실히 만화나 영화에서는 잠을 억지로 이루기 위해 양을 세는 장면이 클리셰처럼 자주 사용되곤 하죠."
1010803-76 = "4;유우카 파자마;13;실제로 양을 이미지로 한 수면 유도제나 디카페인 음료도 꽤 출시되고 있으니까요."
1010803-77 = "[s] \"유우카도 잠이 오지 않을 때는 양을 세곤 해?\""
1010803-78 = "4;유우카 파자마;15;아뇨. 한 번 시험 삼아 해봤지만 큰 효과는 없더라고요.\n#4;em;[한숨]"
1010803-79 = "#st;[0,0];instant;1;"
1010803-80 = "#clearST"
1010803-81 = "4;유우카 파자마;01\n#4;em;[...]\n#wait;2500"
1010803-82 = "4;유우카 파자마;99;전에 책에서 읽었는데, 잠이 오지 않을 때 양을 세는 건 목축이 일상적이었던 중세 시절 때부터 내려온 관습인 모양이에요."
1010803-83 = "4;유우카 파자마;02;양의 숫자는 중세 사회에서 부를 가늠하는 척도였던 만큼 양이 가득 찬 들판을 생각하는 것만으로도 풍요로운 기분이 되어서 잠이 잘 들게 된다는 거죠."
1010803-84 = "4;유우카 파자마;13;……양은커녕 야생 동물도 마주하기 어려운 도시 사회에서는 쉽게 상상하기 어려운 풍경이지만요.\n#4;em;[반응]"
1010803-85 = "[s] \"그건 꽤 흥미로운 가설이네.\""
1010803-86 = "#st;[0,0];instant;1;"
1010803-87 = "#clearST"
1010803-88 = "#wait;1000"
1010803-89 = "[ns] \"그럼 현대인들은 어떤 풍경을 상상해야 잠이 잘 올까?\""
1010803-90 = "4;유우카 파자마;02;글쎄요. 현대인에게 성공의 척도는 계좌에 찍힌 숫자일 테니…… 통장의 숫자를 세면 잠이 잘 올까요?\n#4;em;[?]"
1010803-91 = "[s5] \"……그건 너무 삭막하지 않아?\"\n[s6] \"좀 더 이상적인 미래를 상상해 보는 게 어때?\""
1010803-92 = "#wait;10"
1010803-93 = "#wait;10"
1010803-94 = "4;유우카 파자마;99;숫자 이외의 이상적인 미래를 생각해 보라 하셔도……"
1010803-95 = "4;유우카 파자마;03;제가 상상할 수 있는 행복한 미래는 볕이 잘 드는 예쁜 집에서 제가 좋아하는 사람과 함께 지내는 그런 풍경뿐인걸요. 예를 들자면 선—\n#4;em;[재잘]"
1010803-96 = "[s] \"선……?\""
1010803-97 = "#st;[0,0];instant;1;"
1010803-98 = "#clearST"
1010803-99 = "4;유우카 파자마;03\n#4;em;[...]\n#wait;2500"
1010803-100 = "4;유우카 파자마;11\n#4;em;[!]\n#4;jump\n#wait;1300"
1010803-101 = "4;유우카 파자마;19;아, 아무것도 아니에요!\n#4;em;[///]\n#4;stiff\n#fontsize;80"
1010803-102 = "4;유우카 파자마;04;그냥 크고 멋진 집에서 살면 좋을 것 같다고 생각한 것뿐이에요. 하, 하하……"
1010803-103 = "[s] \"유우카의 꿈이라면 좀 더 자세히 듣고 싶은데.\""
1010803-104 = "4;유우카 파자마;11;괘, 괜찮아요! 오늘은 너무 늦었으니까……!\n#4;stiff\n#4;em;[땀]"
1010803-105 = "4;유우카 파자마;11;오늘은 도와주셔서 감사합니다! 이만 들어가 보세요!\n#4;jump"
1010803-106 = "4;유우카 파자마;11;내, 내일 뵙겠습니다. 좋은 밤 되세요, 선생님!\n#4;greeting"
1010803-107 = "#all;hide"
1010803-108 = "#na;(이후, 유우카에게 떠밀리듯 밀레니엄을 나와 샬레로 돌아왔다.)"

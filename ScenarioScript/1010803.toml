[translation]
1010803-1 = "ผจญภัยไล่ล่าแกะไฟฟ้า"
1010803-2 = "(คุณครูกังวลว่าจะเกิดเรื่องเพราะได้รับข้อความแปลกๆ จากยูกะอย่างกะทันหัน จึงมาหายูกะที่หอพัก#nมิลเลเนียม)"
1010803-3 = "(อาคารหอพักภายนอกดูเงียบสงบดี แต่ว่า...)"
1010803-7 = "หืม...? ใครมาดึกดื่นแบบนี้เนี่ย?"
1010803-8 = "ฉันบอกไปแล้วไม่ใช่เหรอว่าถ้าจะทักท้วงเรื่องค่าสนับสนุนชมรม ก็ให้ไปกรอกเอกสารมาส่งน่ะ..."
1010803-14 = "คุณครู [USERNAME]?! ดึกดื่นป่านนี้มาทำอะไรที่มิลเลเนียมคะ... ไม่สิ มาทำอะไรที่ห้องของฉัน..."
1010803-15 = "ดะ... เดี๋ยวนะคะ! ฉันยังไม่พร้อมให้คุณครูเข้าห้องค่ะ..."
1010803-16 = "ห้านาที! ขอเวลาเตรียมตัวห้านาทีนะคะ!"
1010803-17 = "[s1] \"ยูกะ... เป็นอะไรหรือเปล่า?\"\n[s2] \"ยูกะ... มีปัญหาอะไรหรือเปล่า...?\""
1010803-20 = "คะ? หมายความว่ายังไงคะ?"
1010803-21 = "ระหว่างคุยกันใน MOMOTALK เมื่อกี้ จู่ๆ ฉันก็ส่งข้อความแปลกๆ ไป แล้วก็ขาดการติดต่อไปเลย งั้นเหรอคะ?"
1010803-22 = "เป็นไปได้ยังไง คุณครูต่างหากล่ะคะที่ไม่ตอบข้อความฉัน ฉันก็เลยนึกสงสัยอยู่ว่าคืนนี้คุณครูคงรีบเข้า#nนอนน่ะ..."
1010803-23 = "[ns] ให้ยูกะดูข้อความ MOMOTALK ที่ได้รับ"
1010803-24 = "นี่มัน..."
1010803-25 = "อ่า... อย่างนี้นี่เอง เป็นแบบนี้นี่เองนะคะ"
1010803-26 = "ดูเหมือนว่าจะมีใครปล่อยแกะไฟฟ้าเข้าไปในห้องเซิร์ฟเวอร์อีกแล้วนะคะ"
1010803-27 = "[s] \"แกะไฟฟ้า...?\""
1010803-28 = "อ๊ะ ฉันควรต้องอธิบายสินะคะ ขอโทษค่ะ แกะไฟฟ้าคือโดรนประหยัดพลังงานที่ใช้ในมิลเลเนียม ทาวเวอร์ค่ะ"
1010803-29 = "ในโรงเรียนมิลเลเนียมมีอาคารและอุปกรณ์มากมายที่ใช้พลังงานสูง ค่าไฟวันๆ หนึ่งก็ไม่น้อยเลยค่ะ"
1010803-30 = "เพราะงั้นในเวลากลางคืนที่นักเรียนไม่อยู่ โดรนประหยัดพลังงานจะบินไปรอบๆ โรงเรียนเพื่อควบคุม#nอุปกรณ์อิเล็กทรอนิกส์ไม่ให้ใช้ไฟฟ้าเปลืองค่ะ และที่ได้ชื่อว่าเป็นแกะไฟฟ้า เพราะนักเรียนของเราบอกว่า#nโดรนพวกนั้นส่งเสียงร้องเหมือนแกะน่ะค่ะ"
1010803-31 = "แต่ในห้องเซิร์ฟเวอร์หรือหอพักนักเรียนที่มีการใช้ไฟฟ้าตลอดทั้งวัน เราจะติดตั้งเซนเซอร์ไว้เพื่อไม่ให้#nแกะไฟฟ้าเข้าไปได้ แต่ดูเหมือนว่าจะมีคนที่ไม่รู้แล้วแกะเซนเซอร์นั้นออกไปนะคะ"
1010803-32 = "[s3] \"อย่างนี้นี่เอง งั้นครูก็โล่งอกไปที\"\n[s4] \"โล่งอกไปทีนะ คิดว่าจะมีเรื่องอะไรเกิดกับยูกะแล้ว\""
1010803-35 = "ค่ะ คุณครูไม่จำเป็นต้องมาหาฉันถึงที่นี่เลย..."
1010803-39 = "เอ่อ คุณครูคะ ขอโทษนะคะ นี่มันก็ดึกแล้วแท้ๆ... แต่ในเมื่อคุณครูมาถึงที่นี่แล้ว ฉันขอร้องอะไรอย่าง#nหนึ่งได้มั้ยคะ?"
1010803-40 = "[s] \"ได้สิ เรื่องอะไรเหรอ?\""
1010803-41 = "ถ้าตอนนี้เจ้าแกะไฟฟ้าบินตามอำเภอใจอยู่ทั่วโรงเรียนละก็ มันอาจจะไปปิดเซิร์ฟเวอร์ที่เก็บข้อมูลการ#nวิจัยของนักเรียนอยู่ก็ได้ ฉันเลยคิดว่า 'เรา' ต้องรีบไปเอามันกลับมาที่เดิมค่ะ"
1010803-42 = "ถ้าข้อมูลการวิจัยทั้งหมดของนักเรียนต้องหายไปเพราะโดรนประหยัดพลังงาน มันก็จะเป็นเรื่องใหญ่#nเลยนะคะ"
1010803-43 = "นี่เป็นเรื่องเร่งด่วนเลย คุณครูช่วยไปตามหาแกะไฟฟ้ากับฉันได้มั้ยคะ?"
1010803-44 = "[s] \"ได้แน่นอนอยู่แล้ว วางใจได้เลย\""
1010803-45 = "ขอบคุณค่ะ แกะไฟฟ้าที่ยังตรวจหาสัญญาณไม่พบมีประมาณ 20 ตัวค่ะ... รีบไปหากันเถอะค่ะ"
1010803-47 = "(จากนั้นคุณครูกับยูกะก็ออกไปตามหาโดรนประหยัดพลังงานที่ขื่อว่า 'แกะไฟฟ้า' กันทั่วโรงเรียน)"
1010803-49 = "แบะแอะ... แบะแอะ..."
1010803-56 = "แกะไฟฟ้าตัวที่ 19..."
1010803-61 = "แล้วก็... ตัวที่ 20!"
1010803-66 = "ครบแล้วค่ะ ขอบคุณที่ทำงานอย่างหนักนะคะ คุณครู! 'เรา' ตามหาแกะไฟฟ้าที่ออกไปวิ่งเล่นข้างนอก#nได้ครบแล้วค่ะ"
1010803-67 = "ค่อยยังชั่วนะคะ ถ้าไม่นับห้องเซิร์ฟเวอร์ที่ใช้แลกเปลี่ยนข้อมูลกับภายนอก ก็เหมือนจะไม่มีความ#nเสียหายอะไรมากมายค่ะ"
1010803-68 = "ถ้าคุณครูไม่ช่วยหาละก็ ความเสียหายคงใหญ่หลวงแน่ๆ... แค่คิดก็เวียนหัวแล้วค่ะ"
1010803-69 = "[s] \"โล่งอกไปทีนะที่หาเจอจนครบ\""
1010803-73 = "[ns] \"จะว่าไป พอได้นับแกะตอนกลางคืน ก็เหมือนจะง่วงๆ เลยนะ\""
1010803-74 = "งั้นเหรอคะ? โรคนอนไม่หลับของฉันน่าจะยังไม่หายสนิท ฉันก็เลยยังไม่รู้สึกง่วงเลย..."
1010803-75 = "ในการ์ตูนหรือภาพยนตร์มักใช้การนับแกะเพื่อบังคับให้ตัวละครนอนหลับบ่อยๆ ใช่มั้ยล่ะคะ"
1010803-76 = "แต่ในความเป็นจริง เรามีทั้งยานอนหลับที่เป็นรูปแกะ แล้วก็เครื่องดื่มดีแคฟด้วย"
1010803-77 = "[s] \"ตอนยูกะนอนไม่หลับก็มักจะนับแกะเหรอ?\""
1010803-78 = "เปล่าค่ะ ฉันเคยลองไปครั้งหนึ่ง แต่มันก็ไม่ได้ผลเท่าไรค่ะ"
1010803-82 = "นานมาแล้วฉันเคยอ่านเจอในหนังสือว่า การนับแกะตอนนอนไม่หลับเป็นประเพณีที่มีมาตั้งแต่สมัย#nกลางที่มีการเลี้ยงแกะกันมากค่ะ"
1010803-83 = "จำนวนแกะถือเป็นเครื่องวัดความมั่งคั่งในสังคมยุคกลาง ดังนั้นการคิดถึงท้องทุ่งที่เต็มไปด้วยแกะก็จะ#nทำให้เรารู้สึกมั่งคั่งและช่วยให้นอนหลับสบายค่ะ"
1010803-84 = "แต่ในสังคมเมืองแบบนี้ อย่าว่าแต่แกะเลยค่ะ แค่ได้เจอสัตว์อะไรก็ถือเป็นเรื่องยากแล้ว..."
1010803-85 = "[s] \"เป็นสมมติฐานที่น่าสนใจเลยนะ\""
1010803-89 = "[ns] \"แล้วคนยุคใหม่ต้องคิดถึงอะไรนะจะได้หลับสบาย?\""
1010803-90 = "นั่นสิคะ สำหรับคนยุคใหม่ เครื่องวัดความสำเร็จคือตัวเลขในบัญชีธนาคาร... งั้นการนับตัวเลขในบัญชี#nธนาคารจะช่วยให้นอนหลับได้อยู่นะคะ?"
1010803-91 = "[s5] \"แต่ตัวเลขมันเลือนลางมากเลยนะ...\"\n[s6] \"จินตนาการถึงอนาคตในอุดมคติน่าจะดีกว่านะ?\""
1010803-94 = "อนาคตในอุดมคติที่ไม่ขึ้นอยู่กับตัวเลขเหรอคะ..."
1010803-95 = "อนาคตที่สดใสเพียงอย่างเดียวที่ฉันจินตนาการได้ ก็คืออนาคตที่ฉันได้อาศัยอยู่ในบ้านสวยๆ และมีแดดส่องถึงกับคนที่ฉันรักค่ะ อย่างเช่นกับคุณ..."
1010803-96 = "[s] \"คุณ...?\""
1010803-101 = "มะ... ไม่มีอะไรทั้งนั้นค่ะ!"
1010803-102 = "ฉันแค่คิดว่าคงจะดีถ้าได้อาศัยอยู่ในบ้านหลังใหญ่ๆ หรูๆ น่ะค่ะ แหะ... แหะๆ..."
1010803-103 = "[s] \"อยากฟังความฝันของยูกะอย่างละเอียดกว่านี้จัง\""
1010803-104 = "มะ... ไม่เป็นไรดีกว่าค่ะ! นี่ก็ดึกมากแล้ว...!"
1010803-105 = "ยังไงก็ขอบคุณที่ช่วยนะคะ! คุณครูรีบกลับได้แล้วค่ะ!"
1010803-106 = "วะ... ไว้เจอกันพรุ่งนี้ค่ะ ราตรีสวัสดิ์นะคะ คุณครู!"
1010803-108 = "(จากนั้นคุณครูก็กลับมาที่ชาเล่ต์ราวกับโดนยูกะผลักออกมาจากมิลเลเนียม)"

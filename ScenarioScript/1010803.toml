[translation]
1010803-1 = "An Adventure Chasing Electric Sheep"
1010803-2 = "I went straight to Millennium's dormitory after receiving Yuuka's strange messages. I was worried something had happened."
1010803-3 = "The dormitory building appeared peaceful at first glance, but..."
1010803-7 = "Um... Who's wandering around this late at night?"
1010803-8 = "If you want to submit an appeal related to club expenses, please do it in writing..."
1010803-14 = "[USERNAME] Sensei?! What're you doing here so late?! And in front of my room, too?!"
1010803-15 = "Wait, hold on! I'm not ready to let you see my room..."
1010803-16 = "Five minutes! Just give me five minutes!"
1010803-17 = "[s1] \"Are you okay, Yuuka?\"\n[s2] \"It doesn't seem like anything's wrong...\""
1010803-20 = "Huh? What do you mean?"
1010803-21 = "You got a bunch of weird messages from me on MomoTalk, and then I went silent?"
1010803-22 = "That's not what happened. You stopped responding out of nowhere, so I thought that you'd gone to sleep early."
1010803-23 = "[ns] Show Yuuka the MomoTalk chat."
1010803-24 = "This is..."
1010803-25 = "Ah, I see. That's what happened."
1010803-26 = "Someone must have released Electric Sheep into the server room again."
1010803-27 = "[s] \"...Electric Sheep?\""
1010803-28 = "Oh, right. You wouldn't know. Electric Sheep is the nickname of the energy-saving drones used in the Millennium Tower."
1010803-29 = "Millennium has quite a few facilities that eat up a lot of power, so our daily electricity costs are pretty significant."
1010803-30 = "On nights when there are no students on campus, to prevent energy waste, we release drones that shut down any idle electronic devices. Since the sounds they make are similar to a sheep's bleat, the students call them Electric Sheep."
1010803-31 = "However, in places that need to constant uptime, like the server rooms and dormitories, we installed access restriction sensors to prevent Electric Sheep from entering. Someone must have unknowingly removed it."
1010803-32 = "[s3] \"I see.\"\n[s4] \"I'm just glad you're okay.\""
1010803-35 = "Mhm. You didn't have to come all this way..."
1010803-39 = "But since you're here, would you mind helping me out with one more thing? I know it's late..."
1010803-40 = "[s] \"Of course. What is it?\""
1010803-41 = "If Electric Sheep are wandering around campus as they please, they might shut off student research facilities or the servers where data is stored. Before that can happen, we need to retrieve them and cage them up."
1010803-42 = "It'd be a disaster if something happened to any of the students' research data."
1010803-43 = "It's a pretty urgent situation. Can you help me retrieve the Electric Sheep?"
1010803-44 = "[s] \"Of course! Just leave it to me!\""
1010803-45 = "Thank you. Looking at it, there seem to be twenty Electric Sheep we're not receiving signals from... Let's hurry and find them."
1010803-47 = "I wandered around the campus with Yuuka looking for the power-saving drones called \"Electric Sheep.\""
1010803-49 = "Baa...Baa..."
1010803-56 = "Nineteen Electric Sheep..."
1010803-61 = "Aaand...twenty!"
1010803-66 = "Thank you for your hard work, Sensei! That should be all the escaped Electric Sheep!"
1010803-67 = "Fortunately, it looks like the server room that sends signals outside campus was the only one affected."
1010803-68 = "If you hadn't alerted me, I can't even imagine the damages... Just thinking about it sends a shudder down my spine."
1010803-69 = "[s] \"I'm glad everything worked out.\""
1010803-73 = "[ns] \"In any case, counting sheep in the middle of the night is making me sleepy.\""
1010803-74 = "Is that so? I'm still struggling with insomnia, so I don't think I'm that sleepy..."
1010803-75 = "Cartoons and movies do have those cliche scenes where people count sheep to fall asleep."
1010803-76 = "In fact, there are even sleep aids or decaffeinated drinks that feature sheep images."
1010803-77 = "[s] \"Do you count sheep when you can't sleep too?\""
1010803-78 = "No. I tried it out once, but it didn't help much."
1010803-82 = "I read in a book before that counting sheep to fall asleep seems to be a custom that was passed down from medieval times, when herding was common."
1010803-83 = "The number of sheep you had was a measure of wealth in medieval societies, so just thinking about a field full of them would make them feel abundance and soothe them to fall asleep."
1010803-84 = "...It's difficult to comprehend in today's society. Even wild animals are rare to encounter these days."
1010803-85 = "[s] \"That's quite an interesting hypothesis.\""
1010803-89 = "[ns] \"So what kind of scenery should modern people imagine to fall asleep?\""
1010803-90 = "Well, for modern people, the measure of success is probably the numbers in their bank accounts... Will counting the amount of money I have help me sleep better?"
1010803-91 = "[s5] \"...That feels so bleak.\"\n[s6] \"How about imagining something more idealistic?\""
1010803-94 = "An ideal future beyond numbers..."
1010803-95 = "For me, a happy future would just be me living with the person I love in a beautiful house with plenty of sunlight. For example, Sen—"
1010803-96 = "[s] \"Sen...?\""
1010803-101 = "Nothing, nothing at all!"
1010803-102 = "I—I was just talking about the nice, big house! Yeah! Hah! Hahaha!"
1010803-103 = "[s] \"I was hoping to hear more about your dream.\""
1010803-104 = "Nope, that's it! And look how late it is!"
1010803-105 = "Thank you for your help today! You should go home! Right now!"
1010803-106 = "I-I will see you tomorrow. Have a good night, Sensei!"
1010803-108 = "Having no choice after Yuuka physically pushed me out, I left Millennium and went back to Schale."

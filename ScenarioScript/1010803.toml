[translation]
1010803-1 = "追逐電子羊的冒險"
1010803-2 = "（優香突然傳奇怪的訊息過來，出於擔心而前往了優香所在的千年宿舍）"
1010803-3 = "（雖然宿舍外看起來沒什麼問題，十分平靜……）"
1010803-7 = "唔唔……這麼晚了是誰啊？"
1010803-8 = "要申請社團活動費的話，我應該已經說過要以書面繳交才──"
1010803-14 = "[USERNAME]老師！？#n這個時間怎麼會來千年──不對，是來我的房間……"
1010803-15 = "請，請等一下！我還沒準備好要讓老師進我的房間……"
1010803-16 = "5分鐘！請給我5分鐘的時間準備一下！"
1010803-17 = "[s1]「優香，你還好嗎？」\n[s2]「看起來好像沒有問題……」"
1010803-20 = "咦？這是什麼意思？"
1010803-21 = "你說我剛才用MomoTalk聊天的時候，突然傳了奇怪的訊息後就沒有聯絡了？"
1010803-22 = "怎麼會呢？反而是因為老師沒有回覆的關係，我還以為你已經休息了呢……"
1010803-23 = "[ns] 拿MomoTalk的內容給優香看"
1010803-24 = "這是……"
1010803-25 = "啊，我懂了。原來是這樣啊。"
1010803-26 = "真是的，看來又有人在伺服器室釋放了電子羊。"
1010803-27 = "[s]「……電子羊？」"
1010803-28 = "啊，抱歉我沒有解釋清楚。#n電子羊是千年巨塔所使用的省電無人機的綽號。"
1010803-29 = "因為千年有很多非常耗電的設備，每天的電費支出都非常可觀。"
1010803-30 = "所以為了避免電器在沒有學生的晚上耗費電力，#n省電無人機會在校內到處飛行，並關閉沒人在用的電子產品。#n由於這種無人機發出的訊號聲很像羊的叫聲，所以學生都稱呼它為電子羊。"
1010803-31 = "但在伺服器室跟宿舍這種隨時需要用電的地方，就會安裝防止電子羊接近的感應器。#n看來是有不知情的學生把感應器清掉了吧。"
1010803-32 = "[s3]「原來如此。」\n[s4]「幸好優香沒事。」"
1010803-35 = "是啊，不過老師也不必特意跑過來找我……"
1010803-39 = "那個，老師。#n雖然已經這麼晚了有點抱歉……既然來都來了，可以再答應我一個請求嗎？"
1010803-40 = "[s]「當然可以。是什麼事呢？」"
1010803-41 = "如果電子羊正在學園裡四處亂飛的話，#n可能會擅自切斷學生的研究設備或儲存資料的伺服器……#n所以得趕緊把它們收回「籠子」裡才行。"
1010803-42 = "萬一學生花了大把時間研究的資料被省電無人機弄丟的話……那就糟了。"
1010803-43 = "情況有點緊急，能請老師一起幫忙收回電子羊嗎？"
1010803-44 = "[s]「當然，儘管交給我吧。」"
1010803-45 = "謝謝。差不多有20隻抓不到訊號的電子羊……我們快去找找吧。"
1010803-47 = "（之後便跟優香一起，在校內四處找尋叫做「電子羊」的省電無人機）"
1010803-49 = "咩～～～"
1010803-56 = "第19隻電子羊……"
1010803-61 = "然後是……第20隻！"
1010803-66 = "辛苦你了，老師！這樣逃出「籠子」的電子羊就全部收回來了！"
1010803-67 = "幸好除了與外部收發資料的伺服器室之外，沒有其他地方出現損失。"
1010803-68 = "要是老師沒有告訴我的話，不知道會出現多麼嚴重的損失……#n光用想的就讓人心驚膽戰。"
1010803-69 = "[s]「幸好事情順利解決了。」"
1010803-73 = "[ns]「話說在大半夜數羊，莫名讓人覺得想睡呢。」"
1010803-74 = "是嗎？我現在還是有點失眠，所以不是很睏……"
1010803-75 = "不過在漫畫或電影裡，確實很常出現以數羊強迫自己睡覺的橋段呢。"
1010803-76 = "市面上也有不少真的使用了羊圖像的安眠藥或低咖啡因飲料。"
1010803-77 = "[s]「優香睡不著的時候也會數羊嗎？」"
1010803-78 = "不會，雖然我曾試過一次，但效果並不顯著。"
1010803-82 = "我之前曾在書上看過……#n在睡不著的時候數羊，似乎是從以畜牧為日常的中世紀時期流傳下來的習慣。"
1010803-83 = "由於羊的數量在當時是衡量富裕程度的標準，#n光是想像充滿羊群的田野，就能讓人因為滿足感而想睡吧。"
1010803-84 = "……然而在城市中別說是羊了，就連野生動物也很難見到。#n讓人實在有點難以想像那種風景。"
1010803-85 = "[s]「這個假設還真有趣。」"
1010803-89 = "[ns]「那現代人該想像什麼風景才睡得著呢？」"
1010803-90 = "這個嘛……#n現代人的成功標準應該是戶頭裡的數字……數存摺會讓人想睡嗎？"
1010803-91 = "[s5]「……那會不會有點無趣？」\n[s6]「想像更美好的未來怎麼樣？」"
1010803-94 = "就算要我想像數字以外的理想未來……"
1010803-95 = "我能想像到的幸福場面，也就只有跟喜歡的人待在採光好的漂亮房子裡吧。#n比如老──"
1010803-96 = "[s]「老……？」"
1010803-101 = "沒，沒什麼……！"
1010803-102 = "我只是覺得住在又大又好看的房子裡應該很棒而已。#n哈，哈哈……"
1010803-103 = "[s]「如果那是優香的夢想，我很樂意仔細聽你說哦。」"
1010803-104 = "沒，沒關係！畢竟今天已經很晚了……！"
1010803-105 = "謝謝老師今天的幫忙！請趕快回去休息吧！"
1010803-106 = "明，明天見。老師晚安！"
1010803-108 = "（於是被優香推著離開千年，回到了夏萊）"

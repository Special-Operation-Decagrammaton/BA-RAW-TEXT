[translation]
1004003-1 = "ระ... รูปร่างสูงใหญ่ก็ใช่ว่าจะไม่ดีนะคะ"
1004003-2 = "(คุณครูออกมาที่สถานนัดพบกับสึคุโยะตามเวลาที่นัดไว้...)"
1004003-3 = "(พอมาถึงก็เจอฝูงชนเดินไปมาพลุกพล่านกว่าที่คิดไว้ และคุณครูก็เห็นสึคุโยะที่ยืนอยู่ไม่ไกลออกไป...)"
1004003-4 = "ประสบการณ์ในการเป็นแมวมองกว่า 27 ปี 4 เดือนของฉันมันบอกชัดเจนเลยละ! ถ้าเป็นเธอ... ถ้าเป็นเธอละก็จะต้องเป็นนางแบบชื่อดังได้แน่นอน!"
1004003-5 = "เธอจะต้องเป็นนางแบบ... ดาวรุ่งพุ่งแรงดวงใหม่ของคิโวทอสได้แน่ๆ...!"
1004003-7 = "มะ...ไม่นะคะ! ฉะ...ฉันอยากเป็นนินจาค่ะ...! ฉันไม่ได้อยากเป็นนางแบบเลยนะคะ...!"
1004003-8 = "นินจา...? ฮ่าฮ่า! เธอนี่พูดอะไรตลกดีนะ...!"
1004003-9 = "แต่ฉันเข้าใจแล้วละ คาแรกเตอร์แบบนั้นก็ปั้นได้อยู่นะ"
1004003-10 = "คะ...คือว่าฉัน... ฉันอยาก... อยากเป็น... นินจา...!"
1004003-11 = "เฮือก! คะ...คุณครูคะ?!"
1004003-12 = "ชะ...ช่วยฉันด้วยค่ะ...!"
1004003-13 = "[s] \"นี่ ขอโทษนะ...\""
1004003-18 = "อ๊ะ"
1004003-27 = "หืม? ดะ.. เดี๋ยวก่อน...! ฉันไม่ใช่คนแปลกๆ หรอกนะ...! ความสามารถอันโดดเด่นของเธอมันน่าเสียดาย#nจริงๆ นี่นา...!"
1004003-28 = "ฉันจะปั้นเธอให้เป็นสุดยอดโมเดลในอนาคตเอง! รอเดี๋ยวก่อนสิ...!"
1004003-30 = "[ns1] \"เฮ้อ มาถึงตรงนี้คงไม่เป็นไรแล้วละ\"\n[ns2] \"สึคุโยะเป็นอะไรไหม? บาดเจ็บตรงไหนรึเปล่า?\""
1004003-31 = "อา... ฉะ...ฉันไม่เป็นไรค่ะ มะ...ไม่เป็นไรค่ะ คะ...คือว่า... มะ...ไม่เป็นไรค่ะแต่ว่า..."
1004003-32 = "อา... ฉะ...ฉันไม่เป็นไรค่ะ มะ...ไม่เป็นไรค่ะ คะ...คือว่า... มะ...ไม่เป็นไรค่ะแต่ว่า..."
1004003-33 = "ฮือออ... มุแงงงงงง!!"
1004003-34 = "น่ากลัวที่สุดเลยค่ะ...! คุณครู~~!"
1004003-35 = "ฮึ่ก... ฮึ่ก... ปะ... เป็นเพราะฉันตัวโตแบบนี้... ละ...เลยเกิดเรื่องแบบนี้...ขึ้น..."
1004003-36 = "พะ...เพราะฉันเป็นแบบนี้เลยทำให้คุณครูลำบากไปด้วย ขะ...ฮึ่ก...ขอโทษ...ฮึ่ก...ค่ะ..."
1004003-37 = "[s] \"ไม่เป็นไร ครูไม่ได้ลำบากอะไรเลยนะ\""
1004003-38 = "(สะอื้น) จะ...จริงเหรอคะ...?"
1004003-39 = "ถะ...ถ้างั้นก็ค่อยยังชั่วหน่อยค่ะ... ตะ...แต่ว่าฉัน... ไม่ว่าเมื่อไร...กะ...ก็เป็นแบบนี้เสมอเลยค่ะ..."
1004003-40 = "ฉันตัวโตกว่าคนอื่น... ทะ...ทุกครั้งเลยมักจะเป็นที่สะดุดตาแบบนี้..."
1004003-41 = "ละ...แล้วก็จะถูกคนแปลกๆ เข้ามาทักหรือโดนตะ...ตามตลอด..."
1004003-42 = "เมื่ออาทิตย์ก่อนฉันเดินอยู่ที่ถนน... จะ...จู่ๆ พวกคุณแก๊งหมวกกันน็อกก็โผล่มา..."
1004003-43 = "แล้วก็พูดว่า... <ตัวโตอย่างเธอเหมาะกับแก๊งหมวกกันน็อกอย่างพวกเรามาก ว่าไง สนใจเข้าแก๊งเรามั้ย?> แบบนี้ค่ะ..."
1004003-44 = "พะ...พอโดนพูดแบบนั้นฉันก็เลยตกใจ... แล้วก็เผลอหนีมาโดยไม่รู้ตัวเลยค่ะ..."
1004003-45 = "วะ...เวลาเจอคนเข้ามาทักแบบนั้น ฉันจะตกใจจนในหัวขาวโพลนไปหมดเลยค่ะ..."
1004003-46 = "[s3] \"แก๊งหมวกกันน็อกมักชวนคนเข้าแก๊งแบบนั้นสินะ...\"\n[s4] \"จู่ๆ เจอคนเข้ามาพูดแบบนั้นจะตกใจก็ไม่แปลกหรอก...\""
1004003-47 = "ค่ะ... ฉะ...ฉันตกใจมาก..."
1004003-48 = "ค่ะ... ฉะ...ฉันตกใจมาก..."
1004003-49 = "นะ...นอกจากนั้นปะ...ปัญหาที่เกิดเพราะฉันตัวใหญ่ไม่ได้มีแค่นั้น...!"
1004003-50 = "ปะ...เป็นเพราะฉันตัวใหญ่แบบนี้... มะ...ไม่ว่ายังไง...กะ...ก็คงเป็นภาระให้คุณครูสินะคะ...?"
1004003-51 = "คะ... แค่ยืนอยู่แบบนี้ก็บังทัศนวิสัยข้างหน้าแล้ว..."
1004003-52 = "ไม่ใช่แค่เท่านั้นนะคะ...! แค่ฉันยืนอยู่ข้างๆ แค่นั้น... ก็ทำให้โชคหายไปแล้วค่ะ... และ... คุณครูอาจจะรู้สึกไม่อยากอาหารก็ได้..."
1004003-53 = "ขะ...ขอโทษที่ฉันตัวสูงนะคะ..."
1004003-54 = "[s5] (ประเมินตัวเองต่ำจนน่าตกใจเลยนะเนี่ย...)\n[s6] \"มะ...ไม่เป็นไรหรอกนะ! สึคุโยะไม่ได้ทำอะไรผิดสักหน่อย!\""
1004003-55 = "แต่ว่า... ฉันก็แค่คนตัวใหญ่แต่ไร้ประโยชน์..."
1004003-56 = "แต่ว่า... ฉันก็แค่คนตัวใหญ่แต่ไร้ประโยชน์..."
1004003-57 = "[s] \"สึคุโยะ ได้ลองคิดในมุมอื่นดูบ้างมั้ย?\""
1004003-58 = "คะ...? มุมอื่นเหรอคะ? คุณครูหมายถึงยังไงกันเหรอ... คะ..."
1004003-59 = "[s7] \"สึคุโยะอาจจะแค่สูงกว่าคนอื่นนิดหน่อยเอง...\"\n[s8] \"สึคุโยะสูงกว่าเลยทำให้มองเห็นในสิ่งที่คนอื่นไม่เห็นนะ\""
1004003-60 = "งะ...งั้นเหรอคะ ฉันสามารถมองเห็นในสิ่งที่คนอื่นไม่เห็น แต่ฉันเห็นแค่คนเดียวเหรอคะ...?"
1004003-61 = "สิ่งที่คนอื่นมองไม่เห็น แต่ฉันเห็นแค่คนเดียวเหรอคะ...?"
1004003-62 = "อ๊ะ คะ... คุณครูคะ?"
1004003-68 = "คะ...? คะ...คือว่า! คุณครูคะ... จะ...จู่ๆ เข้ามาใกล้เกินไปแบบนี้...?!"
1004003-69 = "[s] \"ยืดไหล่ให้ตรงๆ แล้วมองไปรอบๆ สิ\""
1004003-70 = "อา..."
1004003-71 = "ยืดไหล่ให้ตรง ยืดหลังขึ้นตัวตรงแล้วมองไปรอบๆ..."
1004003-72 = "..."
1004003-73 = "แงงงง! พี่สาววว พี่สาวอยู่ไหนนน~!"
1004003-74 = "อ๊ะ คุณครูคะ! ตรงนั้นมีเด็กกำลังร้องไห้อยู่ค่ะ! เธอคงเจอปัญหาอะไรอยู่แน่เลยค่ะ!"
1004003-75 = "[s] \"อื้อ ได้เวลานินจาออกโรงแล้วสินะ ไปช่วยเธอกันเถอะ\""
1004003-76 = "อ๊ะ... ค่ะ!"
1004003-82 = "(คุณครูกับสึคุโยะช่วยเด็กน้อยตามหาพี่สาวที่พลัดหลงกัน)"
1004003-84 = "ขะ...ขอบคุณมากค่ะ! ขอบคุณที่ช่วยพาน้องสาวมาหาฉันนะคะ! ฉันจะตอบแทนพวกคุณยังไงดี... "
1004003-85 = "มะ...ไม่เป็นไรค่ะ สำหรับนินจาผู้ยิ่งใหญ่แล้ว เรื่องแค่นี้ไม่ลำบากอะไรเลยค่ะ!"
1004003-86 = "คะ...? นะ...นินจา...?"
1004003-87 = "ขอบคุณนะ พี่สาวตัวโต!"
1004003-88 = "อ๊ะ เด็กคนนี้! แบบนั้นมันเสียมารยาทนะ...!"
1004003-89 = "มะ...ไม่เป็นไรค่ะ! โชคดีที่ฉันตัวโตแบบนี้... ก็เลยช่วยพาน้องสาวมาหาคุณได้ค่ะ!"
1004003-90 = "กะ...กลับดีๆ นะคะ! คราวหน้าอย่าลืมจูงมือพี่สาวไว้ด้วยละ จะได้ไม่หลงกับพี่สาวอีกนะ"
1004003-91 = "อื้อ!"
1004003-96 = "[ns] \"สุดยอดมากเลย สึคุโยะ!\""
1004003-97 = "ใช่แล้วค่ะ คุณครูพูดถูกจริงๆ ด้วยค่ะ"
1004003-98 = "ฉันคิดว่ามันช่วยไม่ได้ที่ฉันตัวสูง เลยมักถูกคนอื่นๆ มอง.... แล้วก็เกิดเรื่องแปลกๆ ขึ้นมากมายค่ะ"
1004003-99 = "เพราะงั้นฉันมักจะห่อไหล่และก้มตัวมองแต่พื้นเพื่อหลีกเลี่ยงการสบตากับคนอื่นๆ... และคิดแต่จะทำตัว#nเล็กๆ ไม่ให้เตะตาคนอื่น..."
1004003-100 = "แต่ถ้ามองไปรอบๆ ตัวและมองดูให้ดีๆ ก็จะเห็นสิ่งที่ไม่เคยเห็นมากมายเลยค่ะ"
1004003-101 = "ขะ...ขอบคุณนะคะ คุณครู!"
1004003-102 = "[s] \"ไม่หรอก ครูไม่ได้ทำอะไรเลย\""
1004003-103 = "ไม่ค่ะ! เพราะคำพูดของคุณครู ตะ...ตอนนี้ฉันเลยรู้ว่า กะ...การที่ฉันตัวใหญ่ มะ...ไม่ใช่เรื่องที่น่าเกลียด#nแล้วค่ะ"
1004003-104 = "เพราะงั้นต่อจากนี้ไป...!"
1004003-105 = "อ๊ะ...! เจอตัวแล้ว! ว่าที่ซูเปอร์สตาร์แห่งคิโวทอส...!"
1004003-106 = "...?"
1004003-110 = "แฮ่ก...แฮ่ก... คราวนี้ฉันไม่ปล่อยให้หลุดมือไปแน่! เธอมีพรสวรรค์ในการเป็นตัวตึงแห่งคิโวทอสอยู่นะ!"
1004003-112 = "อะ...อีกแล้วเหรอคะ?! เอ๋~~!!"
1004003-113 = "วะ...ว่าแล้วเชียว กะ...การที่ตัวโตนี่มันลำบากจริงๆ เลยค่ะ-!!"
1004003-117 = "[ns] \"เดี๋ยวก่อนสิ สึคุโยะ...!!\""
1004003-119 = "(หลังจากนั้นคุณครูก็วิ่งไล่จับสึคุโยะและลูบหลังปลอบใจให้เธอใจเย็นลง)"

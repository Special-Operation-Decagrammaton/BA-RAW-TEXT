1004003-30 = "[ns1] \"후우, 여기까지 왔으면 괜찮겠지.\"\n[ns2] \"츠쿠요는 괜찮아? 어디 다친 데는 없고?\""
1004003-31 = "3;츠쿠요;06;아, 괘, 괜찮아요…… 괘, 괜찮은 건, 그게……. 괘, 괜찮지만…….\n#3;a\n#3;stiff\n#3;em;…"
1004003-32 = "3;츠쿠요;06;아, 괘, 괜찮아요…… 괘, 괜찮은 건, 그게……. 괘, 괜찮지만…….\n#3;a\n#3;stiff\n#3;em;…"
1004003-33 = "3;츠쿠요;04;우우……. 우, 우와아앙!!"
1004003-34 = "3;츠쿠요;04;무, 무서웠어요오……! 선생니임……!\n#3;em;[속상함]"
1004003-35 = "3;츠쿠요;06;훌쩍……. 훌쩍……. 또……. 제 커다랗기만 한 덩치 때문에, 괜히 이런 일에 휘말려서……."
1004003-36 = "3;츠쿠요;06;그거 때문에 선생님에게 폐를 끼치게 되어버려서……. 죄, 죄송……. 흐윽.\n#3;stiff"
1004003-37 = "[s] \"괜찮아. 나는 전혀 폐라고 생각 안 해.\""
1004003-38 = "3;츠쿠요;02;따, 딸꾹! 그, 그러, 신가요……?\n#3;stiff"
1004003-39 = "3;츠쿠요;01;그럼 다행이지마안……. 그, 그래도 저어……. 언제나 이런 식이었어요오오…….\n#3;em;[속상함]"
1004003-40 = "3;츠쿠요;06;남들보다 덩치가 크니까……. 매번 이렇게 남들 눈에 띄기나 하고……."
1004003-41 = "3;츠쿠요;99;그, 그래서 늘 이상한 사람에게 붙들리거나, 휘말리거나 해서……."
1004003-42 = "3;츠쿠요;06;지난주만 해도 길을 걷고 있는데, 그, 헤, 헬멧단 여러분이 갑자기……."
1004003-43 = "3;츠쿠요;05;<이렇게나 덩치가 크다니. 너, 이 헬멧이 잘 어울릴 거 같은데. 어때? 생각 없어?>\n#3;em;[재잘]\n#3;hophop"
1004003-44 = "3;츠쿠요;06;라고 말을 걸어오는 바람에, 까, 깜짝 놀라버려서…… 저도 모르게 도망쳤었고…….\n#3;stiff"
1004003-45 = "3;츠쿠요;06;그런 말을 걸어오면 머릿속이 새하얘져 버려서…….\n#3;em;[속상함]"
1004003-46 = "[s3] \"헬멧단은 평소에 그런 식으로 권유하고 있었구나…….\"\n[s4] \"그야 갑자기 듣는 입장에선 머릿속이 새하얘질 수밖에 없는 말이네……!\""
1004003-47 = "3;츠쿠요;02;네, 맞아요……. 패닉에 빠져서…….\n#3;em;…"
1004003-48 = "3;츠쿠요;02;네, 맞아요……. 패닉에 빠져서…….\n#3;em;…"
1004003-49 = "3;츠쿠요;01;게, 게다가 제 덩치 때문에 문제가 생기는 건, 그, 그것뿐만이 아니라서어……!\n#3;stiff"
1004003-50 = "3;츠쿠요;01;저, 이렇게 커다라니까. 아, 아무래도……. 서, 선생님에게도 민폐가 되지요……?"
1004003-51 = "3;츠쿠요;99;이렇게 여, 여기 서 있는 것만으로도 시야에 방해가 되니까………"
1004003-52 = "3;츠쿠요;06;그뿐만이 아니라……! 제가 옆에 서 있는 것만으로도, 그게, 행운이 내려간다던가……. 그……. 선생님께서 식욕이 생기질 않는다던가…….\n#3;em;[속상함]\n#3;stiff"

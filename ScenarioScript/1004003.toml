[translation]
1004003-1 = "也許，還不錯"
1004003-2 = "（到達了和月夜會合的地點）"
1004003-3 = "（正想著人潮比想像中多呢的時候，在另一頭看見了月夜的身影）"
1004003-4 = "我挖掘模特兒經驗27年4個月……那個直覺告訴我！妳，一定可以成為明星！"
1004003-5 = "沒錯……奇普托斯最棒的，高挑模特兒！"
1004003-7 = "我那個，不是模特兒，而是想成為忍者……"
1004003-8 = "……忍者？哈哈，真是有趣。"
1004003-9 = "不過原來如此，附加那種角色也是可行呢？"
1004003-10 = "不，並不是那樣……！"
1004003-11 = "啊，"
1004003-12 = "老師……！？"
1004003-13 = "[s]「稍微打擾一下？」"
1004003-18 = "啊……"
1004003-27 = "等，等一下。我絕不是可疑人士。真的只是對於她作為才能原石的耀眼光輝……等一下！請等一下！"
1004003-28 = "未來的超級巨星────！！"
1004003-30 = "[ns1]「來到這裡的話就沒問題了吧。」\n[ns2]「月夜還好嗎？有沒有受傷？」"
1004003-31 = "謝謝，老師……雖然沒有，受傷什麼的……"
1004003-32 = "謝謝，老師……雖然沒有，受傷什麼的……"
1004003-33 = "嗚，嗚哇啊啊啊啊！！"
1004003-34 = "我，好害怕……！老師……！"
1004003-35 = "（啜泣）……因為我身體這樣，總是被捲入，奇怪的事情……"
1004003-36 = "也給老師，造成了，困擾……"
1004003-37 = "[s]「完全不是困擾唷。」"
1004003-38 = "是，那樣嗎……？"
1004003-39 = "那就，太好了……我，總是，像這樣子……"
1004003-40 = "因為比別人還大，也很顯眼……"
1004003-41 = "常被奇怪的人抓住，捲入困境……"
1004003-42 = "上週也是，走在路上的時候，頭盔團的，大家……"
1004003-43 = "「體格不錯呢！和頭盔之類的很合嘛！如何！？」"
1004003-44 = "對我這麼說……所以，嚇了一跳，逃走了……"
1004003-45 = "突然被搭話，腦中變得，一片空白……"
1004003-46 = "[s3]「頭盔團，原來是那樣勸誘的啊……」\n[s4]「突然被搭話的話，腦中會變得一片空白呢……」"
1004003-47 = "是的……特別是我，會馬上，變得恐慌……"
1004003-48 = "是的……特別是我，會馬上，變得恐慌……"
1004003-49 = "除此之外，也有各種問題……"
1004003-50 = "所以，我，果然對老師，也是個麻煩吧……"
1004003-51 = "光是像這樣，就會，擋住視線……"
1004003-52 = "除此之外，似乎也會引起各種，困擾的事……"
1004003-53 = "不好意思，身材高大……"
1004003-54 = "[s5] （自我評價相當低……）\n[s6]「沒，沒關係！沒有什麼不好的唷！」"
1004003-55 = "可是，我……"
1004003-56 = "可是，我……"
1004003-57 = "[s]「月夜，稍微換個不一樣的方向思考怎麼樣？」"
1004003-58 = "不一樣的方向，是指……？"
1004003-59 = "[s7]「也許月夜比大家稍微還要高大一點也說不定。」\n[s8]「正因如此，我認為也能看見其他人看不見的東西。」"
1004003-60 = "其他的人，看不見的，東西……？"
1004003-61 = "其他的人，看不見的，東西……？"
1004003-62 = "……那個，老師？"
1004003-68 = "呀啊……那個，老師……！？"
1004003-69 = "[s]「再稍微把背挺直如何？或許可以看見各種東西。」"
1004003-70 = "啊……"
1004003-71 = "把背，挺直……"
1004003-72 = "…………"
1004003-73 = "嗚哇啊啊！姊姊──，在哪裡～！？"
1004003-74 = "……！老師，在那個陰影的地方，有孩子在哭……！"
1004003-75 = "[s]「哦，忍者出場的時候呢！去幫她吧！」"
1004003-76 = "啊……好的！"
1004003-82 = "（就那樣和月夜一起，幫助了和姊姊走散正在哭泣的女孩子）"
1004003-84 = "把妹妹帶過來，真的很謝謝你們！真的是，該怎麼感謝才好……！"
1004003-85 = "不，沒有……因為我是，忍者。這種程度，是，理所當然的……！"
1004003-86 = "忍，忍者……？"
1004003-87 = "高大的姊姊，謝謝妳！"
1004003-88 = "啊，這孩子真是的！說這麼失禮的話……！"
1004003-89 = "不，沒關係。正因為身高很高，所以才能，找到這孩子……！"
1004003-90 = "那麼，就此告別！……下次不要再放開，姊姊的手了哦？"
1004003-91 = "嗯，約定好了！拜拜──！"
1004003-96 = "[ns]「很帥唷，月夜。」"
1004003-97 = "……就如，老師，所說的。"
1004003-98 = "雖然認為，身材高大，有很多討厭的事……"
1004003-99 = "因此無意識的將背縮起來，為了躲避視線，總是看著下面……至少稍微多一點，不要妨礙到他人……"
1004003-100 = "不過，我的身高，很高大……可以看見，和其他人不同的……"
1004003-101 = "非常，謝謝你，老師……！"
1004003-102 = "[s]「不會，我什麼都沒有做唷。」"
1004003-103 = "不，多虧了，老師。感覺視線稍微，變得廣闊了。"
1004003-104 = "所以，今後也……！"
1004003-105 = "啊啊！找到了，未來的超級巨星！"
1004003-106 = "……？"
1004003-110 = "呼呼，這次不會讓妳跑掉了哦……！聽我說，妳擁有照亮這個奇普托斯，有如曙光般的才能！"
1004003-112 = "又來，了嗎……！？"
1004003-113 = "唔……果然，身材高大是，讓人困擾的事情……！"
1004003-117 = "[ns]「等，等等！月夜……！」"
1004003-119 = "（這之後追上了月夜，在冷靜下來前待在了一起）"

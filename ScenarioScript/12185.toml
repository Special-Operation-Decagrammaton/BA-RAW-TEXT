[translation]
12185-2 = "抵達目標座標！ "
12185-3 = "星野前輩應該被關在這裡的某處！#n請搜索這附近吧，我想一定……"
12185-4 = "……"
12185-5 = "這裡是……"
12185-6 = "……學，學校？"
12185-7 = "從這些廢墟來看……肯定是學校對吧？"
12185-8 = "砂漠中央的學校……難道是……"
12185-9 = "沒錯。這裡本來是阿拜多斯高中的本館。"
12185-10 = "！！"
12185-17 = "……"
12185-18 = "你這傢伙是……！！"
12185-20 = "虧你們能來到這裡啊，阿拜多斯對策委員會。"
12185-26 = "是敵方的增援……！"
12185-27 = "這個數量……恐怕是敵軍的所有兵力……"
12185-28 = "凱薩PMC似乎打算在這裡發動總力戰……！"
12185-30 = "隨著砂漠化的進行而遭到遺棄的阿拜多斯學校廢墟……這裡原本是阿拜多斯的中心。"
12185-31 = "你們或許不知道這過去的建築……#n曾為奇普托斯最大且強大學園的殘骸就埋在這座砂漠之下。"
12185-32 = "蓋瑪特利亞要求在這裡建立實驗室。"
12185-33 = "實驗室……！！"
12185-34 = "星野前輩人在哪裡！ "
12185-35 = "那位副學生會長就在那邊的建築裡。"
12185-36 = "對了，現在實驗或許已經開始了也說不定……"
12185-37 = "──！"
12185-38 = "所以你們打算怎麼做？想立刻去找出前輩嗎？#n那就想辦法突破我們吧。"
12185-39 = "這些兵力……看來沒辦法輕易通過呢……"
12185-43 = "嗯，既然如此，這裡就由我來──"
12185-44 = "（哐啷啷啷啷啷啷啷──！）"
12185-45 = "又是爆炸！？這，這次又是怎麼回事？"
12185-48 = "鏘──！呀齁～☆ "
12185-49 = "……"
12185-50 = "打，打擾了！"
12185-51 = "便，便利屋的各位……！？"
12185-52 = "終於追上了！不過大家怎麼都聚在一起，難道我們打斷了重要的場景嗎？"
12185-53 = "……哼，本來是想偷偷幫你們的，看來沒辦法那麼順利呢。"
12185-54 = "你，你們這些傢伙竟然會跟到這裡……！"
12185-55 = "在這個時間點現身，難道是……！"
12185-56 = "原來如此……是這樣啊。"
12185-57 = "……嗯？那個充滿期待的視線是怎麼回事？"
12185-58 = "社長，我有不好的預感。#n先整理一下情況再……"
12185-59 = "……"
12185-60 = "哼，觀察力不錯嘛，對策委員會。#n我們來這裡的理由很明顯吧？"
12185-63 = "這裡交給我們，你們先走吧！！！"
12185-65 = "！"
12185-66 = "！！"
12185-67 = "！！！"
12185-68 = "……唉。"
12185-74 = "（說，說出口了────────！！！！）"
12185-76 = "嗚，嗚哇……這樣我會迷上你的，亞瑠醬……"
12185-77 = "我，我會一輩子跟隨您的！亞瑠大人！！"
12185-79 = "……真是的。 "
12185-80 = "我，我可不會道謝哦！！"
12185-81 = "不過等一切結束之後……再一起去吃拉麵吧，便利屋！！"
12185-82 = "嗯！之後一定會報答這份恩情！"
12185-83 = "嗯，謝謝。"
12185-86 = "唉……事情變成這樣也沒辦法了。"
12185-87 = "進，進攻！不對，阻止他們！哇啊啊啊啊！"
12185-88 = "啊哈哈哈哈！事情變有趣了呢，亞瑠醬！#n既然說了那麼帥氣的台詞，要是被輕易打倒就太丟臉了對吧？"
12185-90 = "那我們開始吧──！！！"
12185-92 = "下一話;依舊未曾放棄的事物（２）"

[translation]
12185-2 = "You've arrived at the target coordinates!"
12185-3 = "Hoshino is being held somewhere around here! Look around carefully—we'll find her, I'm sure of it..."
12185-4 = "..."
12185-5 = "What is this place?"
12185-6 = "Is it...a school?"
12185-7 = "It's in ruins, but it must be."
12185-8 = "A school in the middle of a desert. This has to be..."
12185-9 = "Correct. You're standing before what was once the main building of Abydos High School."
12185-10 = "!!"
12185-17 = "..."
12185-18 = "You...!"
12185-20 = "So you've finally arrived, Abydos Foreclosure Task Force."
12185-26 = "Enemy reinforcements..."
12185-27 = "They've mobilized all of their forces from the look of it."
12185-28 = "Kaiser PMC intends to start an all-out war here...!"
12185-30 = "Here stand the ruins of Abydos, abandoned as desertification took hold... This was once the very heart of Abydos."
12185-31 = "You probably don't even know what stood here before... But buried beneath this sand are the remnants of what was once the largest and most powerful academy in all of Kivotos."
12185-32 = "And it just so happens to be where Gematria requested we set up a lab."
12185-33 = "A lab...?!"
12185-34 = "Where is Hoshino?!"
12185-35 = "The vice president is in the building behind us."
12185-36 = "In fact, the experiment may have already begun."
12185-37 = "...!"
12185-38 = "If you intend to take her back, you'll have to go through us."
12185-39 = "Be careful, everyone. They won't go down without a fight."
12185-43 = "Well, I'll take care of th—"
12185-44 = "*baaaaaang*"
12185-45 = "Another explosion?! What's going on this time?"
12185-48 = "Ta-da! We're here! ☆"
12185-49 = "..."
12185-50 = "E-Excuse us!"
12185-51 = "I-Is that Problem Solver?!"
12185-52 = "We finally caught up to them, Aru! Looks like we might be interrupting something important. Anyone want to fill us in?"
12185-53 = "Ugh... I only wanted to lend a hand from the shadows... So lame."
12185-54 = "What in the...?! What are you guys doing here?"
12185-55 = "Showing up now, at a time like this... No way...?!"
12185-56 = "Now I get it. They can't hide how they feel."
12185-57 = "Hey, what's with those smirks?"
12185-58 = "Do we really have to do this, Boss? They're making my skin crawl..."
12185-59 = "..."
12185-60 = "Heh. It helps that you're quick on the uptake, Foreclosure Task Force. Isn't it obvious why we're here?"
12185-63 = "Go. We can take care of things here. You need to save your friend!"
12185-65 = "!!"
12185-66 = "!!"
12185-67 = "!!"
12185-68 = "*sigh*"
12185-74 = "(M-Me and my big mouth!)"
12185-76 = "Oh, Aru. Keep that up and I'm going to fall head over heels for you."
12185-77 = "G-Give me your orders, Aru! My life is yours!"
12185-79 = "...Tch."
12185-80 = "You don't even want my thanks, do you?"
12185-81 = "So when this is all over...let's just get some ramen together or something!"
12185-82 = "Yup, yup! We'll be sure to treat you!"
12185-83 = "Yeah, thanks."
12185-86 = "*sigh* I guess we've come too far to back out now."
12185-87 = "A-Attack! No, stop them! Gaaah—!"
12185-88 = "Ahahaha! Now this is getting fun, Aru! After a badass line like that, you better not go down too easy!"
12185-90 = "Let's tear 'em to pieces!"
12185-92 = "Next Episode;Never Letting Go Part 2"

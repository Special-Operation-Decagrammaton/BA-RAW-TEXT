[translation]
12185-2 = "ถึงพิกัดจุดหมายแล้วค่ะ!"
12185-3 = "รุ่นพี่โฮชิโนะต้องถูกขังอยู่สักแห่งในนี้ค่ะ! ช่วยตามหารอบๆ บริเวณนี้หน่อยนะคะ ต้องหารุ่นพี่ให้เจอ...\n"
12185-4 = "......\n"
12185-5 = "ที่นี่มัน...\n"
12185-6 = "ระ... โรงเรียนเหรอ?\n\n"
12185-7 = "ร่องรอยพื้นที่รกร้างนี่มัน... ต้องเป็นโรงเรียนแน่เลย?\n"
12185-8 = "โรงเรียนกลางทะเลทรายงั้นเหรอ... ที่นี่คือ...\n"
12185-9 = "ใช่แล้วละ ที่นี่คืออาคารหลักของโรงเรียนอะบิดอส"
12185-10 = "!!\n\n"
12185-17 = "......\n"
12185-18 = "พวกแก...!!\n\n"
12185-20 = "ดั้นด้นกันมาถึงที่นี่เลยนะ คณะกรรมการแผนงานอะบิดอส\n"
12185-26 = "ศัตรูเรียกกองกำลังเสริมมาแล้ว..."
12185-27 = "ดูจากจำนวนแล้ว... นี่คือกองกำลังทั้งหมดของศัตรูค่ะ"
12185-28 = "ไคเซอร์ PMC คิดจะเริ่มสงครามยึดครองที่นี่แน่ๆ เลยค่ะ!"
12185-30 = "พื้นที่รกร้างของโรงเรียนอะบิดอสที่ถูกทอดทิ้งหลังจากเหตุการณ์วิบัติทะเลทราย...ที่นี่แหละคือใจกลาง#nของอะบิดอส"
12185-31 = "พวกเธออาจจะยังไม่รู้จักอาคารในอดีตนี้ก็ได้... ซากของโรงเรียนที่ครั้งหนึ่งเคยยิ่งใหญ่ และแข็งแกร่ง#nที่สุดของคิโวทอสถูกฝังไว้ใต้ผืนทรายที่นี่"
12185-32 = "และเกมาเทรียก็ขอให้สร้างห้องทดลองไว้ที่นี่ยังไงล่ะ"
12185-33 = "ห้องทดลอง...!!\n\n\n"
12185-34 = "รุ่นพี่โฮชิโนะอยู่ที่ไหนคะ?! \n"
12185-35 = "รองประธานนักเรียนคนนั้นอยู่ในอาคารหลังถัดไป"
12185-36 = "อืม... บางทีการทดลองน่าจะเริ่มขึ้นแล้วก็ได้นะ"
12185-37 = "...!!"
12185-38 = "เป็นไงล่ะ? อยากไปช่วยรุ่นพี่ของพวกเธอแล้วล่ะสิ? ถ้างั้นก็ผ่านพวกเราไปให้ได้แล้วกัน"
12185-39 = "กองกำลังนี้ไม่ปล่อยให้เราฝ่าไปง่ายๆ แน่เลยค่ะ"
12185-43 = "งั้นตรงนี้ปล่อยให้เป็นหน้าที่ของฉันเอง... \n"
12185-44 = "(ตู้มมมมมมม!!!!!)"
12185-45 = "ระเบิดอีกแล้วเหรอ?! รอบนี้มาจากไหนน่ะ?\n"
12185-48 = "จ๊ะเอ๋! หวัดดีจ้า~☆ \n"
12185-49 = "......."
12185-50 = "ขะ... ขออภัยด้วยค่ะ!"
12185-51 = "หน่วยรับจ้างสารพัด...?!"
12185-52 = "อารุจัง! ในที่สุดก็ตามทัน ว่าแต่... ทำไมทุกคนถึงมารวมตัวกันล่ะ? ตรงนี้มีฉากเด็ดอะไรเหรอ?"
12185-53 = "ฮึ่ม! ว่าจะแอบมาช่วยซะหน่อย แต่ก็รู้จนได้"
12185-54 = "อะ.. อะไรกัน! พวกเธอ! มาถึงที่เลยเหรอ...\n"
12185-55 = "มาปรากฏตัวถูกจังหวะในสถานการณ์แบบนี้... หรือว่า...?\n\n"
12185-56 = "อย่างนี้เองเหรอ...\n\n"
12185-57 = "หืม? ทำไมมองกันด้วยสายตาที่เต็มไปด้วยความคาดหวังล่ะ?\n"
12185-58 = "รู้สึกไม่ดีเลย เรามาประเมินสถานการณ์กันก่อนไหมประธาน...\n"
12185-59 = "......"
12185-60 = "หึ มีไหวพริบไม่เลวเลยนะ คณะกรรมการแผนงาน เหตุผลที่เรามาที่นี่มันก็แน่อยู่แล้วไม่ใช่เหรอ?\n"
12185-63 = "พวกเราจะจัดการเจ้าพวกนี้เอง พวกเธอไปตามหาเพื่อนของเธอซะ!"
12185-65 = "!!\n\n"
12185-66 = "!!\n"
12185-67 = "!!"
12185-68 = "เฮ้ออ...\n\n"
12185-74 = "(ผะ.. เผลอพูดอะไรไปเนี่ยยยย!!)\n\n\n"
12185-76 = "ว้าว.. เท่ระเบิดไปเลย ฉันชักจะหลงรักอารุจังแล้วสิ...\n\n"
12185-77 = "ฉันจะร่วมทางกับท่านอารุไปจนตายเลยค่ะ!!"
12185-79 = "...เหอะ \n"
12185-80 = "ฉันจะไม่พูดว่าขอบใจอะไรหรอก...!"
12185-81 = "เอาไว้เสร็จงานนี้แล้ว... ไปกินราเม็งด้วยกันก็แล้วกันนะ หน่วยรับจ้างสารพัด!!"
12185-82 = "อื้ม! เราจะตอบแทนที่ช่วยเหลือแน่นอนค่ะ!"
12185-83 = "อืม ขอบใจนะ\n\n"
12185-86 = "เฮ้อ... ถ้าเลยเถิดถึงขั้นนี้แล้วก็คงช่วยอะไรไม่ได้\n\n\n"
12185-87 = "โจมตี! ไม่สิ ตั้งรับไว้! อ๊าาากก...\n\n\n"
12185-88 = "อะฮ่ะฮ่ะฮ่า! สนุกเป็นบ้าเลยอารุจัง! พูดอะไรเท่ๆ แบบนั้นออกไปแล้ว ถ้าโดนเล่นงานกลับมาก็คงไม่มีหน้า#nไปสู้ใครใช่ไหมล่ะ?"
12185-90 = "งั้นก็มาเริ่มล้างบางพวกมันกันเลยดีกว่า!"
12185-92 = "ตอนต่อไป;ไม่ปล่อยให้หลุดมือไป 2"

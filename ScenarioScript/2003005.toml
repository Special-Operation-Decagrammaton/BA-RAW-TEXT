2003005-22 = "#na;아나운서;쿠로다테 하루나 선수. 다음 경기 종목인 '빵 먹기 대회'의 출전을 위해, 출발선으로 와 주십시오."
2003005-23 = "[s] \"……아.\""
2003005-24 = "3;하루나 체육복ND;14;그렇습니다. 선생님. 아무리 이런 분위기라고 해도 우리 미식연구회는 미식연구회."
2003005-25 = "3;하루나 체육복ND;03;경기를 위해 준비된 음식들이…… 제대로 된 것인지 확인하는 것은 미식연구회의 사명이라고도 할 수 있겠지요!\n#3;em;[반짝]\n#3;greeting"

2003005-14 = "3;하루나 체육복ND;13;그만큼 제가 진심이라는 것을 알아주셨으면 하네요."
2003005-15 = "[s3] \"궁금하다. 정말로 궁금해!\" \n[s4] \"도대체 무엇이 하루나의 열의를 이렇게까지 불태웠는지!\""

2003005-6 = "3;하루나 체육복ND;03;아, 선생님. 와 주셨군요.\n#3;em;[반응]\n#3;a"
2003005-7 = "[s1] \"학생을 응원하는 건 선생님이 할 일이니까.\"\n[s2] \"그런데, 무슨 경기에 나가는 거야?\""

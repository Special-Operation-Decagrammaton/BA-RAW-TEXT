[translation]
2003005-1 = "Always Something New to Try"
2003005-2 = "I couldn't figure out why someone only obsessed with food wanted to participate in field day, but..."
2003005-3 = "I watched Haruna's match half expectantly, half curiously."
2003005-6 = "Ah, Sensei. You're here."
2003005-7 = "[s1] \"It's my job to cheer my students on!\"\n[s2] \"I was curious what you're competing in.\" "
2003005-10 = "Not just A competition, Sensei."
2003005-11 = "Competitions!"
2003005-12 = "[s] \"What? You're participating in more than one?\""
2003005-13 = "Heehee..."
2003005-14 = "Yes. I am quite serious about this endeavor."
2003005-15 = "[s3] \"I'm really curious now!\"\n[s4] \"What on earth has ignited Haruna's enthusiasm to such an extent!\" "
2003005-18 = "Heehee. The first competition is..."
2003005-22 = "Contestant Kurodate Haruna. Please come to the starting line to compete in the next event, the Bread Eating Contest."
2003005-23 = "[s] \"...Ah.\""
2003005-24 = "Yes, Sensei. Even in this competitive atmosphere, we, the Gourmet Research Society, remain the Gourmet Research Society."
2003005-25 = "It is our duty to ensure that all these foods are prepared to standards!"
2003005-26 = "[s] \"...Yes. Okay. Have fun.\""
2003005-27 = "Thank you for cheering me on."
2003005-31 = "I will do my best in this Bread Eating Contest!"
2003005-34 = "Haruna walked to the starting line with a bounce in her step."
2003005-38 = "All the contestants lined up at the starting line, and..."
2003005-47 = "Haruna persevered all the way through, and finally they were on the last round of breads!"
2003005-51 = "Heehee..."
2003005-52 = "[s] \"You can do it, Haruna!\""
2003005-56 = "So, the highlight of the Bread Eating Contest. Allow me to taste!"
2003005-60 = "*nom*"
2003005-65 = "*nom* *nom* *nom*"
2003005-69 = "Mmm..."
2003005-70 = "[s] \"Uh-oh, Haruna's expression is...?\""
2003005-75 = "This bread...! It's wrong! All wrong!"
2003005-76 = "Did you think you could skimp on the quality just because it was for a game?"
2003005-77 = "It's too dry on the outside, too fluffy on the inside, and worst of all, it still tastes like flour!"
2003005-78 = "Did they leave the yeast to ferment too long? Or do they think they're too good to preheat their ovens before popping the dough in?  "
2003005-79 = "I'm disgusted. Here I thought the benefit of mass production was to raise the average flavor of each item, even if it wasn't the pinnacle..."
2003005-80 = "Contestant Kurodate H-Haruna has suddenly stopped eating and is going on a tirade about fermentation?"
2003005-85 = "...Haruna thoroughly scolded each judge and organizer for quite some time..."
2003005-88 = "And so, the next competition started."
2003005-89 = "[s] \"So, the Bread Eating Contest is out of the way. What's next?\""
2003005-90 = "Yes. Next, I will be participating in an obstacle course race."
2003005-91 = "[s] \"Ok! This time it's different!\""
2003005-94 = "When I heard that I could sample the sports drinks, I signed up for the long-distance race..."
2003005-95 = "But it has too much sugar! It's actually preventing me from hydrating faster!"
2003005-96 = "Sure, it's important to provide a quick source of energy for an exhausted body."
2003005-97 = "But if you're overloaded with sugar to the point where it's sticking to the tongue, there's a problem!"
2003005-99 = "Is this a sports drink or an energy drink? Hm?!"
2003005-100 = "If you really wanted to emphasize the sweetness, why not use a moderate amount of artificial sweetener?"
2003005-101 = "[s] \"Relentless evaluation during the obstacle course race as well?!\""
2003005-102 = "I'm not done yet!"
2003005-106 = "They were offering whipped cream donuts as a prize for participation in the archery category, so I signed up..."
2003005-107 = "But what's this?! This isn't a whipped cream donut. Is this...vegetable oil?!"
2003005-109 = "Whipped cream means that the cream layer has been skimmed from raw milk!"
2003005-110 = "Even if you mimic the texture of whipped cream, there's still a certain amount of processing that inevitably goes into plant-based creams!"
2003005-111 = "No matter how similar it is, there are bound to be differences in flavor!"
2003005-114 = "...Haruna's impassioned rant went on and on through the games in that fashion..."
2003005-117 = "Finally...the last competition."
2003005-118 = "The Flour Candy Race. The goal is to be the first to find the hidden candy using only your mouth."
2003005-119 = "Sensei. Are you watching? Cheer me on to the end, okay?"
2003005-120 = "[s] \"Um... Yes. It's a race that fits you...\""
2003005-124 = "Haruna was once again back on the starting line."
2003005-135 = "She ran furiously as if she wasn't tired at all, burying her face in a candy-covered board of flour...!"
2003005-139 = "In the lead is, surprisingly, Kurodate Haruna of Gehenna Academy!"
2003005-143 = "Contestant Haruna races forward. She's running furiously!"
2003005-144 = "And she approaches the finish line..."
2003005-150 = "And... She's won! Everyone, she's won!"
2003005-154 = "Ah! Contestant Haruna... She's crossed the finish line, but she's still running! Where is she headed?!"
2003005-159 = "Sensei, were you watching?"
2003005-160 = "[s] \"Of course, congratulations on your first place!\""
2003005-161 = "Heehee..."
2003005-164 = "― [log=하루나 체육복ND]It was a heart-pounding and delicious match.[/log][wa:1060] "
2003005-166 = "― [log=하루나 체육복ND]My face got a little messy, but it was well worth it.[/log][wa:10] "
2003005-169 = "― [log=하루나 체육복ND] In that uncharted territory of flour...[/log][wa:2250] "
2003005-171 = "― [log=하루나 체육복ND]The act of finding candy using your senses...[/log][wa:710] "
2003005-174 = "― [log=하루나 체육복ND]Seemed quite similar[/log][wa:660] "
2003005-176 = "― [log=하루나 체육복ND]to the exploration of gastronomy...[/log] [wa:10] "
2003005-179 = "― [log=하루나 체육복ND]I found it very refreshing.[/log][wa:10] "
2003005-182 = "― [log=하루나 체육복ND]Ah, I nearly forgot![/log][wa:520] "
2003005-185 = "― [log=하루나 체육복ND]Sensei. Would you like this?[/log][wa:870] "
2003005-188 = "― [log=하루나 체육복ND]This candy I won... [/log][wa:850] "
2003005-190 = "― [log=하루나 체육복ND]Would you like to share it together?[/log][wa:120] "
2003005-193 = "I returned with Haruna, refusing the candy she wanted to share..."
2003005-194 = "I thought she would be grumpy from the low-quality foods in the competitions, but she seemed strangely upbeat."

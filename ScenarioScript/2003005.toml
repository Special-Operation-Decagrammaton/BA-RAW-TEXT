[translation]
2003005-1 = "เส้นทางแห่งการสำรวจ รอเราอยู่ทุกที่"
2003005-2 = "(คุณครูไม่รู้ว่าเพราะอะไรฮารุนะถึงตัดสินใจเข้าร่วมการแข่งขัน...)"
2003005-3 = "(แต่ก็คอยจับตาดูการแข่งขันของฮารุนะอย่างคาดหวังกึ่งสนใจใคร่รู้)"
2003005-6 = "อ๊ะ คุณครู มาแล้วเหรอคะ?"
2003005-7 = "[s1] \"การมาให้กำลังใจนักเรียนก็เป็นงานของครูเหมือนกันนะ\"\n[s2] \"ฮารุนะลงแข่งรายการอะไรเหรอ?\""
2003005-10 = "ไม่เห็นต้องถามเลยว่าลงแข่งรายการอะไร..."
2003005-11 = "นั่นก็เพราะว่าฉัน... ลงแข่ง 'ทุกรายการ' เลยไงล่ะคะ!"
2003005-12 = "[s] \"ว่าไงนะ? ไม่ได้ลงแค่รายการเดียว แต่ลงทุกรายการเลยเรอะ!?\""
2003005-13 = "ฮุฮุฮุ..."
2003005-14 = "ดูเหมือนคุณครูจะเข้าใจความตั้งใจของฉันแล้วสินะคะ"
2003005-15 = "[s3] \"น่าสงสัย... น่าสงสัยมากๆ ต่างหาก!\" \n[s4] \"อยากรู้จังว่าอะไรที่ทำให้ฮารุนะฮึดสู้ขนาดนี้!\""
2003005-18 = "ฮุฮุฮุ... และการแข่งขันรายการแรกก็คือ...!"
2003005-22 = "นักกีฬาคุโรดาเตะ ฮารุนะ... กรุณาเข้าประจำที่เพื่อร่วมการแข่งขันรายการ 'แข่งกินขนมปัง' ด้วยค่ะ"
2003005-23 = "[s] \"อ่า...\""
2003005-24 = "ใช่แล้วค่ะ คุณครู ต่อให้อยู่ในบรรยากาศแบบนี้ ชมรมชิมอาหารก็คือชมรมชิมอาหารอยู่วันยันค่ำ"
2003005-25 = "หน้าที่การตรวจสอบว่าอาหารที่เตรียมไว้สำหรับแข่งขันในวันนี้... ถูกจัดเตรียมไว้อย่างถูกต้องหรือไม่... ก็เป็นหน้าที่ของชมรมชิมอาหารเหมือนกันค่ะ!"
2003005-26 = "[s] \"...อืม นั่นสิ โชคดีนะ\""
2003005-27 = "ขอบคุณที่ให้กำลังใจฉันค่ะ"
2003005-31 = "ถ้าอย่างนั้นฉันจะตั้งใจชิมอย่างสุดความสามารถ...ในการแข่งกินขนมปังค่ะ"
2003005-34 = "(ฮารุนะเดินเข้าไปในสนามแข่งขันอย่างคล่องแคล่ว...)"
2003005-38 = "(นักกีฬาทุกคนเข้าไปยืนที่จุดสตาร์ท และ...)"
2003005-47 = "(ฮารุนะออกตัวได้ดีและรักษาตำแหน่งในระดับต้นๆ ไว้ได้ จนมาถึงบริเวณที่มีขนมปังแขวนอยู่!)"
2003005-51 = "ฮุฮุฮุ..."
2003005-52 = "[s] \"ฮารุนะ! สู้ๆ!\""
2003005-56 = "ถ้างั้น... มาเริ่มชิมขนมปังที่เป็นไฮไลต์ของการแข่งขันกันเลยดีมั้ยคะ?"
2003005-60 = "(กินขนมปัง)"
2003005-65 = "(กินขนมปัง) ง่ำๆ..."
2003005-69 = "อืม..."
2003005-70 = "[s] \"เอ๋? สีหน้าของฮารุนะ...?\""
2003005-75 = "ขนมปังนี่มีข้อผิดพลาดค่ะ...!"
2003005-76 = "ถึงจะบอกว่าเป็นแค่ขนมปังที่เตรียมไว้ใช้ในการแข่งขันก็เถอะ แต่แบบนี้มันสิ้นคิดเกินไปหรือเปล่าคะ?"
2003005-77 = "ผิวขนมปังก็แห้งและแข็งเกินไป เนื้อขนมปังสาก ยิ่งกว่านั้นพอกินแล้วยังมีรสของแป้งมันติดอยู่ที่ลิ้น#nด้วยค่ะ!"
2003005-78 = "ใช้เวลาหมักแป้งอย่างเหมาะสมหรือเปล่าคะ? อบขนมปังด้วยอุณหภูมิที่เหมาะสมหรือเปล่าคะ? "
2003005-79 = "ไม่อยากเชื่อเลยค่ะ ถึงจะเป็นขนมปังที่ผลิตจำนวนมากในโรงงานก็เถอะ แต่ก็ควรทำให้สุดความ#nสามารถเพื่อรักษารสชาติความอร่อยไว้ให้ได้อย่างเต็มที่..."
2003005-80 = "นะ...นักกีฬาคุโรดาเตะ ฮารุนะ ตอนนี้หยุดแข่งขันแล้วเริ่มวิจารณ์เรื่องขนมปังแทนแล้วค่ะ...?"
2003005-85 = "(...หลังจากนั้น การประท้วงเกี่ยวกับรสชาติขนมปังของฮารุนะก็ดำเนินต่อไป...)"
2003005-88 = "(และแล้วการแข่งขันรายการต่อไปก็มาถึง...)"
2003005-89 = "[s] \"ดีละ ช่างการแข่งกินขนมปังไปก่อน มาต่อกันเลยดีกว่า?!\""
2003005-90 = "ค่ะ ต่อไปเป็นการแข่งขันวิ่งข้ามสิ่งกีดขวางค่ะ"
2003005-91 = "[s] \"เอาละ! คราวนี้ก็เป็นการแข่งที่ไม่เกี่ยวกับของกินแล้ว!\""
2003005-94 = "ฉันได้ข่าวว่าถ้าร่วมการแข่งขันรายการนี้จะได้ดื่มเครื่องดื่มไอออน ก็เลยเข้าร่วมการแข่งครั้งนี้ด้วย..."
2003005-95 = "แต่ว่าเครื่องดื่มที่ใส่น้ำตาลมากเกินไป จะทำให้อาหารไม่ดูดซึมค่ะ!"
2003005-96 = "แน่นอนว่าวิธีที่จะเพิ่มพลังงานให้ร่างกายได้อย่างรวดเร็วคือการบริโภคน้ำตาล..."
2003005-97 = "แต่ว่าถ้าเครื่องดื่มใส่น้ำตาลมากเกินไปจนดื่มแล้วสัมผัสได้ถึงรสหวานติดแน่นที่ปลายลิ้นแบบนี้ มันจะทำให้เกิดปัญหาหรือเปล่าคะ?"
2003005-99 = "เครื่องดื่มไอออนก็คือเครื่องดื่มไอออน... มันต่างจากเครื่องดื่มชูกำลังนะคะ!"
2003005-100 = "ถ้าอยากเพิ่มรสหวานเป็นพิเศษละก็... แค่ใส่น้ำตาลสังเคราะห์ในปริมาณที่พอเหมาะก็พอแล้วนี่คะ?"
2003005-101 = "[s] \"แข่งวิ่งข้ามสิ่งกีดขวางก็ยังประเมินแบบไร้ความปรานีอีกเรอะ?!\""
2003005-102 = "ยังไม่จบแค่นี้หรอกนะคะ!"
2003005-106 = "ฉันเข้าร่วมการแข่งขันยิงธนูด้วย เพราะได้ยินมาว่าจะมีการแจกโดนัทครีมสดให้กับคนที่เข้าร่วมการ#nแข่งด้วยน่ะค่ะ..."
2003005-107 = "แต่นี่มันอะไรกันคะ! นี่มันโดนัทครีมไขมันพืชไม่ใช่เหรอคะ?!"
2003005-109 = "ครีมสดน่ะ คือไขมันบริสุทธิ์ที่ได้จากนมนะคะ!"
2003005-110 = "ถึงจะทำให้ดูเหมือนครีมสดยังไง แต่ครีมไขมันพืชก็ยังต้องผ่านกระบวนการแปรรูปอย่างหลีกเลี่ยงไม่#nได้ค่ะ!"
2003005-111 = "และถึงจะพยายามทำให้เหมือนครีมสดยังไง รสชาติความอร่อยนุ่มลิ้นก็ยังแตกต่างกันอยู่ดีค่ะ!"
2003005-114 = "(...การวิจารณ์อย่างออกรสของฮารุนะก็ยังคงดำเนินต่อไปในการแข่งขันรายการต่อๆ ไป...)"
2003005-117 = "ในที่สุด... ก็มาถึงการแข่งรายการสุดท้ายแล้วสินะคะ"
2003005-118 = "การแข่งขันหาลูกอมในถาดแป้ง เป็นการแข่งขันที่จะใช้ลิ้นและริมฝีปากในการหาลูกอมที่ซ่อนอยู่ใน#nแป้ง... นับว่าเป็นการแข่งขันที่ยากมากเลยค่ะ"
2003005-119 = "คุณครู ดูอยู่หรือเปล่าคะ? ช่วยเชียร์ฉัน... จนถึงที่สุดด้วยนะคะ?"
2003005-120 = "[s] \"อื้อ... ได้สิ เลือกรายการแข่งได้สมกับเป็นฮารุนะดีนะ...\""
2003005-124 = "(ฮารุนะเข้าไปในสนามแข่งขันอีกครั้ง)"
2003005-135 = "(ฮารุนะออกวิ่งอย่างกะปรี้กระเปร่า และจุ่มหน้าลงไปในถาดแป้งเพื่อหาลูกอม...!)"
2003005-139 = "น่าทึ่งมากเลยค่ะ นักกีฬาที่นำอยู่ในตอนนี้คือ... นักกีฬาคุโรดาเตะ ฮารุนะ จากสถาบันเกเฮนน่าค่ะ!"
2003005-143 = "นักกีฬาฮารุนะ วิ่งไปแล้ว... ออกวิ่งไปแล้ว...!"
2003005-144 = "ใกล้ถึงเส้นชัยแล้ว..."
2003005-150 = "เข้าเส้นชัยไปแล้วค่ะ...!"
2003005-154 = "อ๊ะ นักกีฬาฮารุนะ... ถึงจะเข้าเส้นชัยไปแล้วก็ยังวิ่งต่ออีกค่ะ! และสถานที่ที่นักกีฬาฮารุนะวิ่งไปก็คือ...!"
2003005-159 = "คุณครู เห็นหรือเปล่าคะ?"
2003005-160 = "[s] \"แน่นอน! ดีใจด้วยนะที่ชนะ!\""
2003005-161 = "ฮุฮุฮุ..."
2003005-164 = "― [log=하루나 체육복ND]เป็นการแข่งขันแสนอร่อย ที่ทำให้ใจเต้นแรงมากเลยค่ะ[/log][wa:860] "
2003005-166 = "― [log=하루나 체육복ND]ถึงหน้าจะเปื้อนนิดหน่อย...[/log][wa:150] "
2003005-169 = "― [log=하루나 체육복ND]แต่ว่า... ในถาดแป้งที่ไม่มีทางรู้ว่าอะไรอยู่ตรงไหนแบบนี้[/log][wa:1610] "
2003005-171 = "― [log=하루나 체육복ND]การใช้ประสาทสัมผัสของตัวเอง เพื่อค้นหาลูกอม...[/log][wa:670] "
2003005-174 = "― [log=하루나 체육복ND]มันดูคล้ายกับเส้นทาง...[/log][wa:540] "
2003005-176 = "― [log=하루나 체육복ND]การค้นหาอาหารเลิศรสเหมือนกันค่ะ...[/log] [wa:10] "
2003005-179 = "― [log=하루나 체육복ND]รู้สึกสดชื่นมากๆ เลยค่ะ[/log][wa:10] "
2003005-182 = "― [log=하루나 체육복ND]อ๊ะ... จริงด้วยค่ะ![/log][wa:560] "
2003005-185 = "― [log=하루나 체육복ND]คุณครู เอาอย่างนี้มั้ยคะ?[/log][wa:990] "
2003005-188 = "― [log=하루나 체육복ND]ลูกอมที่ได้มาเมื่อกี้...[/log][wa:690] "
2003005-190 = "― [log=하루나 체육복ND]ฉันแบ่งให้คุณครูเอามั้ยคะ?[/log][wa:520] "
2003005-193 = "(คุณครูกินลูกอม(?) ที่ฮารุนะแบ่งให้ หลังจากนั้นก็เดินกลับไปพร้อมกับฮารุนะ...)"
2003005-194 = "(ถึงฮารุนะดูจะไม่ค่อยถูกใจคุณภาพของอาหารที่ใช้ในการแข่งขันเท่าไร แต่ก็ดูเหมือนว่าวันนี้เธอจะดู#nอารมณ์ดีผิดปกติ...)"

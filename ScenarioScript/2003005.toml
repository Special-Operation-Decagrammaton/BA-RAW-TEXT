2003005-76 = "3;하루나 체육복ND;05;경기에 한 번 사용할 빵이라고 해서, 너무 생각 없이 준비한 것 아닌가요?\n#3;em;[빠직]\n#3;stiff\n#3;closeup"
2003005-77 = "3;하루나 체육복ND;11;표면은 너무 말라 있고, 안은 퍼석하고, 무엇보다 밀가루 맛이 혀끝에 맴도는군요!\n#3;closeup"
2003005-78 = "3;하루나 체육복ND;09;발효 과정과 시간은 제대로 지켜졌나요? 오븐의 예열은 정해진 공정만큼 이루어졌나요? \n#3;closeup"
2003005-79 = "3;하루나 체육복ND;05;믿을 수 없군요. 공장을 통한 대량 생산의 이점은, 최고의 맛을 보장할 수는 없더라도 맛의 최저선을 끌어올리는 데에 있는 것일 텐데─\n#3;closeup\n#3;stiff"
2003005-80 = "#na;아나운서;쿠, 쿠로다테 하루나 선수. 갑자기 경기를 중지하고 빵과 미식에 대한 웅변을 이어 나가기 시작했습니다─?"

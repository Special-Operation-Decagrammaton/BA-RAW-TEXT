2003005-95 = "4;하루나 체육복ND;05;설탕 성분이 너무 많아, 오히려 빠른 수분 흡수를 방해하고 있어요!\n#4;stiff\n#4;em;[빠직]"
2003005-96 = "4;하루나 체육복ND;11;물론 당분을 급격하게 소비한 몸에 빠른 에너지원을 공급한다는 것은 중요하지만."
2003005-97 = "4;하루나 체육복ND;09;혀 안쪽까지 진득하게 당분이 달라붙을 정도로 설탕 과다라는 것은, 문제가 있지 않을까요?"
2003005-98 = "#all;hide"
2003005-99 = "3;하루나 체육복ND;05;이온 음료는 이온 음료입니다. 에너지 드링크와는 달라요!\n#3;closeup\n#3;em;[!]\n#fontsize;80"

[translation]
2003005-1 = "探求之路，無所不在"
2003005-2 = "（雖然不知道是刮了什麼風讓他產生了那種想法……）"
2003005-3 = "（決定抱著一半期待、一半好奇的心態觀看羽留奈的比賽）"
2003005-6 = "哎呀，老師，您來啦。"
2003005-7 = "[s1]「因為幫學生加油是老師該做的事。」\n[s2]「話說你要參加哪個項目呢？」"
2003005-10 = "我要參加的並不是某個項目的比賽，老師。"
2003005-11 = "我要參加的是……「各種項目」！"
2003005-12 = "[s]「咦？你要參加的不是一場，而是很多場比賽！？」"
2003005-13 = "呵呵呵……"
2003005-14 = "這樣是否能讓老師明白我是認真的呢。"
2003005-15 = "[s3]「真好奇，實在太好奇了！」 \n[s4]「究竟是什麼讓羽留奈這麼認真呢！」"
2003005-18 = "呵呵呵，第一個比賽是……！"
2003005-22 = "黑舘羽留奈選手。#n下一個比賽項目「吃麵包大賽」即將開始，請到起跑線就位。"
2003005-23 = "[s]「……啊。」"
2003005-24 = "沒錯，老師。#n就算是在這種氣氛之下，我們美食研究會依然是美食研究會。"
2003005-25 = "確認為比賽準備的食物是否適當……就是美食研究會的使命吧！"
2003005-26 = "[s]「……嗯。沒錯，放心地去吧。」"
2003005-27 = "謝謝老師幫我加油。"
2003005-31 = "那麼吃麵包大賽，我會竭盡全力品嚐的。"
2003005-34 = "（羽留奈踏著輕快的腳步走向起跑線）"
2003005-38 = "（所有選手並排站上起跑線，接著……）"
2003005-47 = "（名列前茅的羽留奈抵達了掛著麵包的折返點！）"
2003005-51 = "呵呵呵……"
2003005-52 = "[s]「羽留奈！加油！」"
2003005-56 = "那麼，吃麵包大賽的重頭戲，就讓我來品嚐品嘗吧。"
2003005-60 = "（嚼嚼嚼嚼）"
2003005-65 = "（嚼嚼嚼嚼嚼嚼嚼嚼）"
2003005-69 = "唔嗯……"
2003005-70 = "[s]「咦，羽留奈的表情好像……？」"
2003005-75 = "這個麵包完全不及格！"
2003005-76 = "因為是比賽用的麵包就隨便準備一通嗎？"
2003005-77 = "表面太乾、裡面太鬆，最糟糕的是麵粉的味道在舌尖上打轉！"
2003005-78 = "有好好遵守發酵方法和時間嗎？#n烤箱有沒有按照規定預熱？"
2003005-79 = "真不敢相信。#n就算無法保證味道頂尖也能拉高最低水準，這明明就是工廠大量生產的強項──"
2003005-80 = "黑，黑舘羽留奈選手突然停止比賽，開始評論起麵包和美食了！？"
2003005-85 = "（……之後，羽留奈依然不停抗議麵包的味道……）"
2003005-88 = "（於是，下一場比賽到來）"
2003005-89 = "[s]「好，吃麵包大賽就讓它過去吧，接下來是什麼！？」"
2003005-90 = "接下來是障礙賽跑。"
2003005-91 = "[s]「很好！這次是不同種類！」"
2003005-94 = "雖然是因為能喝運動飲料而參加……"
2003005-95 = "但這麼高的糖分，反而會妨礙水分吸收的不是嗎！"
2003005-96 = "以糖分為運動後的身體快速補充能量固然重要……"
2003005-97 = "但多到會附著在舌頭上多少有點問題了吧？"
2003005-99 = "運動飲料就是運動飲料，跟能量飲料是不一樣的！"
2003005-100 = "如果特別想強調甜味，為何不使用適量的人工甜味劑呢？"
2003005-101 = "[s]「在障礙賽跑也毫不留情地評判！？」"
2003005-102 = "還沒結束哦？"
2003005-106 = "雖然不知道原因為何，#n聽說射箭項目會提供鮮奶油甜甜圈作為參加獎，所以我才會參加的……"
2003005-107 = "但這是怎麼回事！#n這裡面加的根本不是鮮奶油，而是植物性奶油！"
2003005-109 = "鮮奶油是從生乳中抽取出乳脂肪製作而成……"
2003005-110 = "無論植物性奶油和鮮奶油再怎麼相似，#n植物性奶油也無可避免地需要經過一定的加工程序！"
2003005-111 = "即使和鮮奶油類似，香醇的味道還是會有差異！"
2003005-114 = "（……羽留奈的熱烈演說就這麼在各個比賽間持續著……）"
2003005-117 = "終於……來到最後一場比賽了呢。"
2003005-118 = "麵粉糖果競賽……是只能以嘴和舌頭找出隱藏在麵粉中糖果的高難度競賽。"
2003005-119 = "老師，您有在看嗎？麻煩老師加油到最後囉？"
2003005-120 = "[s]「嗯……嗯，很像是羽留奈會選的項目……」"
2003005-124 = "（羽留奈再次站上起跑線）"
2003005-135 = "（以完全感覺不到疲勞的跑法，將臉埋入了裝有糖果的麵粉盤中……！）"
2003005-139 = "太驚人了，領先的是格黑娜學園的黑舘羽留奈選手！"
2003005-143 = "羽留奈選手跑起來了，跑起來了！"
2003005-144 = "就這樣奔向終點……"
2003005-150 = "抵達終點！"
2003005-154 = "嗯？羽留奈選手在穿過終點線後依然沒有停下腳步！#n羽留奈選手究竟要跑去哪裡呢……！"
2003005-159 = "老師，您看見了嗎？"
2003005-160 = "[s]「當然囉！恭喜你拿下第1名！」"
2003005-161 = "呵呵呵……"
2003005-164 = "― [log=하루나 체육복ND]是場令人心跳不已、美味的比賽呢。[/log][wa:2180] "
2003005-166 = "― [log=하루나 체육복ND]雖然臉變得有點髒……[/log][wa:790] "
2003005-169 = "― [log=하루나 체육복ND]不過，在可說是未知領域的麵粉中，[/log][wa:3210] "
2003005-171 = "― [log=하루나 체육복ND]只憑自己的感覺找出糖果的行為……[/log][wa:1870] "
2003005-174 = "― [log=하루나 체육복ND]和探求美食的過程，[/log][wa:1100] "
2003005-176 = "― [log=하루나 체육복ND]似乎在某些方面有點類似……[/log][wa:540] "
2003005-179 = "― [log=하루나 체육복ND]感覺非常新鮮。[/log][wa:520] "
2003005-182 = "― [log=하루나 체육복ND]啊，對了！[/log][wa:1120] "
2003005-185 = "― [log=하루나 체육복ND]老師，您覺得如何呢？[/log][wa:1590] "
2003005-188 = "― [log=하루나 체육복ND]剛才得到的這顆糖果……[/log][wa:1210] "
2003005-190 = "― [log=하루나 체육복ND]要不要分給老師您呀？[/log][wa:1160] "
2003005-193 = "（邊拒絕著糖果（？）邊和羽留奈一起回來……）"
2003005-194 = "（儘管羽留奈對比賽食物的品質有所不滿，心情看起來卻好得不可思議）"

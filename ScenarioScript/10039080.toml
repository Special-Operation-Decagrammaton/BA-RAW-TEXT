[translation]
10039080-1 = "Epilogue;Trinity Carnival"
10039080-15 = "...There you are, Sensei."
10039080-19 = "[ns] \"...Mari?\""
10039080-20 = "Hehe. You saw right through the mask. I mean, you probably recognized the costume...and my voice..."
10039080-21 = "Anyway, since it's just you here..."
10039080-22 = "...mind if I take the mask off for a bit?"
10039080-28 = "[ns1] \"Is that all right?\"\n[ns2] \"Is there a rule against that?\""
10039080-31 = "Heehee. No worries. It's not like we have to wear them all the time. And I don't mind taking a break."
10039080-32 = "Besides..."
10039080-33 = "...if I thanked you behind a mask, it wouldn't feel the same."
10039080-34 = "That's why I came out here."
10039080-35 = "...Sensei?"
10039080-36 = "Did you know from the beginning? When we talked to the other idol groups?"
10039080-37 = "Or..."
10039080-41 = "...Hm?"
10039080-42 = "Oh, you picked up on it while you were walking around with me. Then I guess the others must've noticed too."
10039080-43 = "Hmm..."
10039080-44 = "Was it that obvious?"
10039080-45 = "[s3] \"Joy is hard to keep inside.\"\n[s4] \"It's nothing to be embarrassed about. Don't worry.\""
10039080-48 = "Ha, heehee... I guess you're right."
10039080-49 = "I do still feel a little embarrassed, though. Part of me wants to go hide someplace."
10039080-50 = "I mean, the performance was all right, but, um..."
10039080-54 = "...Heehee."
10039080-55 = "Never mind. I didn't come here to talk about that."
10039080-56 = "I had a wonderful week, thanks to you. I didn't even know I COULD feel this way."
10039080-57 = "If it wasn't for you and the others, I would have let these feelings pass by. And I'd never have experienced this joy I'm feeling now."
10039080-58 = "So I want to express my gratitude. Thank you very much, Sensei."
10039080-59 = "For this, and...for everything else."
10039080-60 = "Whenever I'm with you, I feel like I learn more about myself. Even if I don't realize it right away."
10039080-61 = "And that can honestly get a little concerning sometimes..."
10039080-62 = "[s5] \"Concerning?\"\n[s6] \"Is something bothering you?\""
10039080-65 = "No, it's nothing related to you. Just my own thoughts."
10039080-66 = "I guess I feel like I'm loosening up too much... Like I'm acting too spoiled..."
10039080-67 = "If I keep on wanting more..."
10039080-68 = "...I can't let myself get to that point. I'm a Sister, after all."
10039080-69 = "...Hm?"
10039080-70 = "It's...okay to be a little spoiled...?"
10039080-74 = "Heehee..."
10039080-75 = "...Heehee."
10039080-76 = "[ns7] \"Mari?\"\n[ns8] \"What're you laughing about...?\""
10039080-79 = "Ah, I'm sorry. I didn't mean to."
10039080-80 = "It's just that somehow, I thought you'd say that."
10039080-81 = "Am I getting more perceptive? Or...more cunning, maybe?"
10039080-82 = "See, this is the problem. I'm starting to think more highly of myself. Maybe TOO highly."
10039080-83 = "Heehee..."
10039080-84 = "I'm such a troublemaker."
10039080-85 = "But still..."
10039080-86 = "...Yeah."
10039080-91 = "And of all people, I should really be careful in front of you..."
10039080-92 = "Oh, there you are. Both of you."
10039080-93 = "Great, I was just looking for you."
10039080-98 = "[ns9] \"Sakurako, Mine?\"\n[ns10] \"Why are you wearing those masks?!\""
10039080-101 = "Heehee. They do look rather...cool, don't they?"
10039080-102 = "The Remedial Knights and the Sisterhood made them for us. We weren't expecting them, but they're great gifts."
10039080-103 = "Even if they were...gag gifts, in a sense."
10039080-104 = "Then again, that would only mean they feel close enough to joke with us. And is that not a wonderful thing, Captain?"
10039080-105 = "...Heehee. Fair point."
10039080-106 = "Of course, none of this could have happened without..."
10039080-107 = "...Without both of you. We came out here to thank you."
10039080-113 = "To the both of you, on behalf of the Sisterhood..."
10039080-114 = "...and the Remedial Knights, we formally express our gratitude."
10039080-116 = "Sakurako... Captain Mine..."
10039080-117 = "[ns11] \"You both worked hard too.\"\n[ns12] \"It was a really wonderful performance.\""
10039080-120 = "Heh, well, we can only take a fraction of the credit."
10039080-121 = "Oh, by the way..."
10039080-122 = "Hm?"
10039080-123 = "Mari, I'd like to ask your permission for something."
10039080-130 = "We had a number of photographs taken..."
10039080-131 = "[ns13] \"Idol Mari has photos?!\"\n[ns14] \"Ooh, ooh! Let me see, let me see!\""
10039080-134 = "Heh, I thought you might ask, so I made plenty of copies."
10039080-135 = "We think it would spread joy if we shared them with the public."
10039080-141 = "Hm? ...Mari?"
10039080-142 = "Oh, you want to go through them yourself?"
10039080-143 = "Feel free to pick out the best ones. We're completely open to suggestions."
10039080-144 = "..."
10039080-150 = "...!"
10039080-151 = "*gasp*"
10039080-152 = "[ns15] \"You ripped up the photos?!\"\n[ns16] \"Ma-Mari...?!\""
10039080-155 = "...Is that ALL the pictures?"
10039080-156 = "H-Huh?! Ah, no. I still have some extras in my office drawer..."
10039080-157 = "Well..."
10039080-158 = "Sakurako..."
10039080-163 = "...please destroy them all. Don't leave a single one."
10039080-164 = "B-But..."
10039080-165 = "But why?! They're so precious, so beautiful!"
10039080-166 = "Sakurako, listen to me."
10039080-167 = "Please do as she asks..."
10039080-169 = "I mean it."
10039080-170 = "Destroy them all."
10039080-171 = "Consider it a favor."
10039080-176 = "Do it for me."
10039080-177 = "Eeek?!"
10039080-178 = "All right, all right! I'll dispose of them straight away...!"
10039080-185 = "Yes, after all, we are still an idol group tonight..."
10039080-186 = "Just think of it as an order from the group leader. That shouldn't be a problem."
10039080-187 = "Ahem, excuse me. Now that I've properly thanked you both, I'll take my leave."
10039080-192 = "...Many thanks once again for all your hard work, both of you."
10039080-197 = "[ns17] \"Well, that's a shame.\"\n[ns18] \"Those were some beautiful photos.\""
10039080-200 = "Please don't start, Sensei."
10039080-201 = "This event was its own little separate thing."
10039080-202 = "Starting tomorrow, I'm simply a Sister again."
10039080-203 = "If those photos went on floating around, they would call to me, distract me."
10039080-204 = "Which is not to say I regret any of this, but..."
10039080-205 = "...well, call it stubbornness, I suppose."
10039080-209 = "This might not be much consolation, but..."
10039080-215 = "[ns19] \"Oh, is this...?\"\n[ns20] \"You left one photo intact?\""
10039080-218 = "Hmm... How should I say this?"
10039080-219 = "...Consider it a little fan service, from me to you."
10039080-220 = "You're always working so hard for us."
10039080-224 = "So before everything goes back to normal, take it as a memento..."
10039080-233 = "...and a secret, from me to you."
10039080-234 = "Serenade Promenade"

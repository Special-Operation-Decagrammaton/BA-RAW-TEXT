[translation]
10039080-1 = "บทส่งท้าย;ทรีนิตี้คาร์นิวัล"
10039080-15 = "อยู่ตรงนี้เองเหรอคะ คุณครู..."
10039080-19 = "[ns] \"มารีเหรอ...?\""
10039080-20 = "ฮุฮุ ต่อให้ใส่หน้ากากก็ไม่มีประโยชน์สินะคะ แต่ก็นะ ดูจากเสียงและชุดก็น่าจะรู้แล้ว..."
10039080-21 = "ถ้างั้น ในเมื่อฉันก็อยู่ต่อหน้าคุณครูแล้ว..."
10039080-22 = "ฉันขอเอาหน้ากากออกนะคะ"
10039080-28 = "[ns1] \"มารี!? ถอดหน้ากากได้เหรอ?\"\n[ns2] \"มารี! ให้เห็นหน้าได้เหรอ?\""
10039080-31 = "ฮุฮุ ไม่ต้องห่วงหรอกค่ะ ฉันไม่จำเป็นต้องใส่ตลอดเวลาอยู่แล้วค่ะ... ถอดออกแค่เดี๋ยวเดียว ไม่เป็นไรหรอกค่ะ"
10039080-32 = "อีกอย่าง ฉันไม่อยาก..."
10039080-33 = "ไม่อยากขอบคุณคุณครูทั้งๆ ที่ใส่หน้ากากอยู่น่ะค่ะ"
10039080-34 = "ที่ฉันมาที่นี่ก็เพราะเรื่องนั้นด้วยค่ะ"
10039080-35 = "คุณครู..."
10039080-36 = "รู้ตั้งแต่แรกแล้วเหรอคะ? เอ่อ... ตั้งแต่เราไปหานักเรียนคนอื่นเพื่อศึกษาเรื่องไอดอล...?"
10039080-37 = "หรือว่า..."
10039080-41 = "คะ...?"
10039080-42 = "อ่า... คุณครูรู้สึกได้ระหว่างนั้นสินะคะ... ถะ... ถ้างั้นคนอื่นก็อาจจะคิดเหมือนกันสินะคะ"
10039080-43 = "อึก..."
10039080-44 = "ฉัน... ทำให้ดูออกถึงขนาดนั้นเลยเหรอคะ...?"
10039080-45 = "[s3] \"การปกปิดเรื่องที่ชอบเป็นเรื่องยากอยู่แล้วละ\"\n[s4] \"นี่ไม่ใช่เรื่องน่าอาย ไม่ต้องคิดมากหรอกนะ\""
10039080-48 = "ฮะ... ฮือ... เป็นอย่างนี้สินะคะ..."
10039080-49 = "พอคุณครูพูดอย่างนี้ ฉันก็อายขึ้นมาเลยค่ะ อยากหาที่ซ่อนตัวเลยละ..."
10039080-50 = "ตะ... แต่ฉันก็ดีใจที่ได้แสดงบนเวทีนะคะ... อืม..."
10039080-54 = "ฮู่ว..."
10039080-55 = "ไม่สิ ฉันไม่ได้มาที่นี่เพื่อบอกเรื่องแบบนี้ค่ะ ได้โปรดลืมสิ่งที่ฉันเพิ่งพูดไปด้วยนะคะ"
10039080-56 = "ขอบคุณที่ทำให้ฉันมีสัปดาห์ที่สนุกนะคะ ฉันไม่รู้ตัวเลยค่ะว่าตัวเองมีความปรารถนาแบบนี้อยู่ด้วย"
10039080-57 = "ถ้าฉันไม่ได้ทั้ง 2 คนและคุณครูด้วยแล้ว... ฉันก็คงปล่อยเรื่องนี้ไป โดยที่ไม่รู้เลยว่ามีความสุขรออยู่#nข้างหน้าค่ะ"
10039080-58 = "เพราะงั้นฉันเลยต้องขอบคุณคุณครูค่ะ ขอให้ฉันได้แสดงความขอบคุณด้วยนะคะ ขอบคุณมากๆ จริงๆ ค่ะ คุณครู"
10039080-59 = "ขอบคุณเรื่องนี้... ไม่สิ ขอบคุณทุกๆ เรื่องที่เกิดขึ้นจากเรื่องนี้"
10039080-60 = "ถ้าได้อยู่กับคุณครู เหมือนว่าฉันจะได้รู้จักตัวเองมากขึ้นเลยค่ะ"
10039080-61 = "แต่ที่จริงฉันก็มีเรื่องที่กังวลนิดหน่อยด้วยค่ะ..."
10039080-62 = "[s5] \"เรื่องที่กังวลเหรอ?\"\n[s6] \"กังวลใจอะไรเหรอ?\""
10039080-65 = "อ่า... ไม่ค่ะ เรื่องนี้ไม่เกี่ยวกับคุณครูหรอกค่ะ มันเป็นแค่ความคิดของฉันก็เท่านั้นค่ะ"
10039080-66 = "นี่ฉันกำลังทำตามใจตัวเองมากไปหรือเปล่า..."
10039080-67 = "ถ้าฉันมีความปรารถนาที่มากกว่านี้ละก็....."
10039080-68 = "คงไม่ได้ใช่มั้ยคะ...? ก็ฉันเป็นซิสเตอร์นี่เนอะ"
10039080-69 = "คะ...?"
10039080-70 = "ไม่เป็นไร... งั้นเหรอคะ? ทำตามใจก็ได้เหรอคะ...?"
10039080-74 = "ฮุฮุ..."
10039080-75 = "ฮุฮุฮุ..."
10039080-76 = "[ns7] \"มารี หัวเราะเหรอ...?\"\n[ns8] \"หัวเราะอะไรเหรอ...?\""
10039080-79 = "อ๊ะ ขอโทษค่ะ ฉันเผลอหัวเราะออกมาจนได้..."
10039080-80 = "ฉันรู้สึกว่าคุณครูต้องพูดอะไรอย่างนั้นน่ะค่ะ... ก็เลยหัวเราะออกมา"
10039080-81 = "ฉันไม่น่าถามแบบนั้นเลยนะคะ หรือว่าฉันจะกลายเป็นเด็กไม่ดีแล้วนะ?"
10039080-82 = "แย่ละสิคะ ฉันควรต้องระวังแท้ๆ แต่ก็มาเล่าเรื่องตัวเองให้คุณครูฟัง แล้วยังคาดหวังอย่างไม่รู้ตัวอีกค่ะ"
10039080-83 = "ฮุฮุ..."
10039080-84 = "เป็นเรื่องแล้วสินะคะ"
10039080-85 = "แต่ยังไงก็..."
10039080-86 = "ค่ะ..."
10039080-91 = "ที่ฉันกล้าพูดออกมา ก็เพราะคนตรงหน้าคือคุณครู..."
10039080-92 = "อ๊ะ ทั้งสองคนอยู่ที่นี่เองเหรอคะ "
10039080-93 = "ดีเลยค่ะ ฉันกำลังตามหาอยู่เลย"
10039080-98 = "[ns9] \"ซากุระโกะ...!? มิเนะ...!? หน้ากากนั่น...?\"\n[ns10] \"นะ... นั่นมันหน้ากากอะไรกันน่ะ...?\""
10039080-101 = "ฮุฮุ เป็นยังไงคะ? หน้ากากของพวกฉันตามกระแสสุดๆ ไปเลยใช่มั้ยคะ?"
10039080-102 = "สมาชิกชมรมอัศวินบรรเทาทุกข์กับชมรมซิสเตอร์ทำหน้ากากนี้ให้พวกฉันน่ะค่ะ เป็นของขวัญเซอร์ไพรซ์ที่น่าดีใจมากเลยค่ะ"
10039080-103 = "ตะ... แต่ฉันก็รู้ดีค่ะว่ามันเป็นของที่ดูเหมือนกับของเล่น..."
10039080-104 = "นั่นคงเป็นเพราะทุกคนรู้สึกใกล้ชิดกับพวกเรามากขึ้นจนเล่นกันแบบนี้ได้น่ะค่ะ หัวหน้ามิเนะ"
10039080-105 = "ฮุฮุ... นั่นสินะคะ อย่างที่ว่าเลยค่ะ คุณซากุระโกะ"
10039080-106 = "แต่ทั้งหมดนี้จะเกิดขึ้นไม่ได้..."
10039080-107 = "ฉันรู้ค่ะ ทั้งหมดนี้คงเกิดขึ้นไม่ได้ถ้าไม่มีมารีกับคุณครู พวกฉันก็เลยมาที่นี่เพื่อแสดงความขอบคุณค่ะ"
10039080-113 = "ในนามของชมรมซิสเตอร์และชมรมอัศวินบรรเทาทุกข์..."
10039080-114 = "ฉันขอขอบคุณมารีและคุณครูจากใจจริงค่ะ"
10039080-116 = "ท่านซากุระโกะ... หัวหน้ามิเนะ..."
10039080-117 = "[ns11] \"ทั้งคู่ทำได้ดีมากเลยนะ\"\n[ns12] \"ทั้งคู่แสดงบนเวทีได้ยอดเยี่ยมเลยละ\""
10039080-120 = "ฮุฮุ ไม่หรอกค่ะ พวกฉันก็แค่เข้าไปเสริมเอง"
10039080-121 = "อ้อ จะว่าไปยังมีอีกเรื่อง..."
10039080-122 = "...?"
10039080-123 = "ที่ฉันมาที่นี่ก็เพราะมีเรื่องอยากขออนุญาตมารีด้วยค่ะ..."
10039080-130 = "มีคนถ่ายรูปสวยๆ แบบนี้ไว้เยอะแยะเลย..."
10039080-131 = "[ns13] \"รูปมารีเวอร์ชั่นไอดอล!!\"\n[ns14] \"โอ้ว โอ้วว ครูขอดูด้วยคนสิ!!\""
10039080-134 = "ฮุฮุ ฉันรู้ว่าคุณครูต้องพูดแบบนี้ ก็เลยเตรียมมาเพียบเลยค่ะ"
10039080-135 = "การให้คนอื่นได้ดูรูปสวยๆ แบบนี้ถือเป็นการทำเพื่อสาธารณประโยชน์จริงด้วยนะคะ..."
10039080-141 = "มารี...?"
10039080-142 = "อ้อ อยากดูรูปเหรอคะ? หรือว่าอยากเลือกรูปด้วยตัวเองคะ?"
10039080-143 = "เลือกได้เต็มที่เลยค่ะ พวกฉันจะรับฟังทุกความคิดเห็นของมารีเลย..."
10039080-144 = "..."
10039080-150 = "...!!!!!"
10039080-151 = "...!!!!"
10039080-152 = "[ns15] \"ฉีกรูปเหรอ...!?\"\n[ns16] \"มะ... มารี...!? ฉีกรูปทำไมน่ะ\""
10039080-155 = "รูปถ่ายมีทั้งหมดแค่นี้ใช่มั้ยคะ...?"
10039080-156 = "คะ คะ!? มะ... ไม่ค่ะ ยังมีเหลือในลิ้นชักที่สำนักงานของฉันอีก..."
10039080-157 = "อย่างนั้นเหรอคะ..."
10039080-158 = "ท่านซากุระโกะ"
10039080-163 = "ได้โปรดทิ้งรูปที่เหลือด้วยค่ะ อย่าให้มีเหลือแม้แต่รูปเดียวนะคะ..."
10039080-164 = "คะ คะ...!?!?"
10039080-165 = "ทะ... ทำไมล่ะคะ...! รูปทั้งมีคุณค่าและสวยงามขนาดนี้..."
10039080-166 = "ดะ... เดี๋ยวก่อน เอ่อ... คุณซากุระโกะ"
10039080-167 = "ฉันว่ายอมทำตามแต่โดยดีเถอะนะ..."
10039080-169 = "ท่านซากุระโกะ..."
10039080-170 = "ได้โปรด"
10039080-171 = "ทิ้งรูป..."
10039080-176 = "ด้วยค่ะ..."
10039080-177 = "เฮือก...!?"
10039080-178 = "ค่ะ!! ค่ะ!! ฉันจะเอาไปทิ้งเดี๋ยวนี้ค่ะ...!!"
10039080-185 = "ก็นะ... วันนี้เรายังเป็นวงไอดอลด้วยกันนี่นา ถึงจะเป็นวันสุดท้ายแล้วก็เถอะ"
10039080-186 = "ถ้านี่คือคำสั่งของลีดเดอร์ของวง เราคงต้องทำตามละนะคะ"
10039080-187 = "ต้องขอโทษด้วยค่ะ ฉันกล่าวแสดงความขอบคุณไปหมดแล้ว... ถ้างั้นฉันขอตัวก่อนค่ะ"
10039080-192 = "ขอบคุณสำหรับความพยายามนะคะคุณมารี คุณครูด้วยค่ะ... ต้องขอขอบคุณอีกครั้งนะคะ"
10039080-197 = "[ns17] \"เสียดายรูปจัง...\"\n[ns18] \"เสียดายรูปสวยๆ จัง\""
10039080-200 = "จริงๆ เลย... คุณครูก็อย่าเป็นไปกับเขาด้วยสิคะ"
10039080-201 = "ให้เรื่องนี้มันจบไปพร้อมกับงานวันนี้เถอะค่ะ"
10039080-202 = "ตั้งแต่พรุ่งนี้ไปฉันจะต้องกลับไปเป็นซิสเตอร์คนเดิมแล้วค่ะ"
10039080-203 = "ถ้ายังมีของแบบนั้นหลงเหลืออยู่ละก็... ฉันก็อาจจะคิดถึงเรื่องของวันนี้อีกก็ได้ค่ะ"
10039080-204 = "ถึงมันจะไม่ใช่เรื่องไม่ดี หรือเรื่องที่ฉันไม่ถูกใจก็เถอะค่ะ..."
10039080-205 = "ฮุฮุ... ต่อให้มองฉันอย่างนั้นก็ช่วยไม่ได้หรอกค่ะ ฉันรู้ดีว่านี่เป็นความดื้อรั้นของฉันค่ะ"
10039080-209 = "แต่ไม่รู้ว่านี่จะเป็นการทดแทนได้หรือเปล่า..."
10039080-215 = "[ns19] \"เอ๋...? รูปนี้มัน...\"\n[ns20] \"มีรูปที่ยังไม่ได้ฉีกเหลืออีกรูปเหรอ?\""
10039080-218 = "อืม... จะบอกว่ายังไงดีล่ะคะ"
10039080-219 = "คิดว่านี่คือแฟนเซอร์วิสเล็กๆ น้อยๆ จากฉันแล้วกันค่ะ"
10039080-220 = "ก็คุณครูต้อง... เหน็ดเหนื่อยเพื่อฉันอยู่ตลอดเลยนี่คะ..."
10039080-224 = "เพราะงั้น... นี่คือความลับเล็กๆ ของฉัน..."
10039080-233 = "ที่ฉันจะให้คุณครูก่อนกลับไปเป็นฉันคนเดิมค่ะ"
10039080-234 = "Serenade Promenade"

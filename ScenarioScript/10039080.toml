[translation]
10039080-1 = "尾聲;三一狂歡節"
10039080-15 = "……原來您在這裡，老師。"
10039080-19 = "[ns]「……瑪麗？」"
10039080-20 = "呵呵。看來即使戴著面具也瞞不過老師呢。#n畢竟您認得我的聲音，服裝也這麼明顯……"
10039080-21 = "那麼，既然是在老師面前……"
10039080-22 = "……暫時摘下面具也沒關係吧？"
10039080-28 = "[ns1]「瑪麗！？摘下面具沒問題嗎？」\n[ns2]「露臉沒關係嗎？」"
10039080-31 = "呵呵，您不必擔心。#n其實本來就沒有規定要一直戴著……所以暫時摘下來也沒關係的。"
10039080-32 = "況且……"
10039080-33 = "……我也不希望戴著面具向老師道謝。"
10039080-34 = "之所以特別來找您，也是為了這件事情。"
10039080-35 = "……老師。"
10039080-36 = "您從一開始就知道了嗎？#n那個……是從我們一起去拜訪其他偶像團體的時候……？"
10039080-37 = "還是說……"
10039080-41 = "……嗯？"
10039080-42 = "原，原來您在拜訪時就察覺到了啊……#n既然如此，其他人恐怕也或多或少……"
10039080-43 = "那個……"
10039080-44 = "請問……我有表現得那麼明顯嗎……？"
10039080-45 = "[s3]「畢竟想要和喜歡的心情是很難隱藏的。」\n[s4]「這不是什麼丟臉的事情，你不用在意。」"
10039080-48 = "嗚嗚……果然是這樣嗎……"
10039080-49 = "唔嗯……雖然您這麼說，但我還是羞恥到想找個洞鑽進去……"
10039080-50 = "當，當然能上台表演是件好事……只不過……"
10039080-54 = "……呼。"
10039080-55 = "不，我並不是為了跟您說這些而來的。#n請您忘了剛才那些話吧。"
10039080-56 = "多虧了您的幫忙，我這一週真的過得非常愉快。#n能有這樣的心情，連我自己都感到很訝異。"
10039080-57 = "要是沒有他們兩位……以及老師在的話，我恐怕會永遠與這份喜悅擦身而過吧。"
10039080-58 = "所以請讓我表達我的感謝。#n……真的非常謝謝您，老師。"
10039080-59 = "藉由這次……#n不，藉由這次與過去經歷的種種事件……"
10039080-60 = "我發現只要待在老師身旁，就會越來越了解我自己。"
10039080-61 = "……雖然其中的某些部份，也讓我感到有點擔心就是了。"
10039080-62 = "[s5]「擔心？」\n[s6]「有什麼在意的事嗎？」"
10039080-65 = "當，當然這絕對不是老師造成的，只是我自己的想法而已。"
10039080-66 = "一旦鬆懈下來……就變得有點像在撒嬌……"
10039080-67 = "要是這樣的心情繼續增長下去……"
10039080-68 = "……果然是不行的吧。#n畢竟我可是一名修女呢。"
10039080-69 = "……嗯？"
10039080-70 = "您說……沒關係？#n想撒嬌也可以嗎……？"
10039080-74 = "……呵呵。"
10039080-75 = "……呵呵呵。"
10039080-76 = "[ns7]「……瑪麗？」\n[ns8] 「怎麼突然笑了……？」"
10039080-79 = "啊，不好意思。一不小心就……"
10039080-80 = "因為我總覺得，老師您應該會這麼說……"
10039080-81 = "我是不是也變敏銳了呢？#n還是應該說……變狡猾了呢？"
10039080-82 = "真糟糕。#n明明才說要警惕自己，卻又不自覺地期待了起來。"
10039080-83 = "……呵呵。"
10039080-84 = "或許我已經變成壞孩子了呢。"
10039080-85 = "不過……"
10039080-86 = "……嗯。"
10039080-91 = "畢竟是在老師面前……"
10039080-92 = "啊，原來兩位在這裡啊。"
10039080-93 = "太好了，我們正在找你們呢。"
10039080-98 = "[ns9]「……櫻子！？美禰……！？」\n[ns10]「那，那些面具是怎麼回事……？」"
10039080-101 = "呵呵，您覺得如何呢？#n我們的面具，還挺時尚新穎的吧？"
10039080-102 = "這是救護騎士團和修女會的大家為我們製作的。#n能獲得意料之外的禮物真是令人高興。"
10039080-103 = "當然我也清楚，其中多少帶有惡作劇的成分……"
10039080-104 = "不過能成為被開玩笑的對象，就說明我們變得更容易親近了。#n這樣應該能算是大獲成功了吧？美禰團長。"
10039080-105 = "……呵呵，是啊。櫻子同學說的沒錯。"
10039080-106 = "當然這一切都要感謝……"
10039080-107 = "我知道，這都多虧了瑪麗和老師。#n所以我們特地來向兩位表達感謝。"
10039080-113 = "在此代表修女會……"
10039080-114 = "以及救護騎士團，表達正式的謝意。"
10039080-116 = "櫻子大人……美禰團長……"
10039080-117 = "[ns11]「你們兩位也辛苦了。」\n[ns12]「真是場精彩的表演。」"
10039080-120 = "呵呵，這不算什麼。#n我們只是完成了自己該做的事而已。"
10039080-121 = "啊，這麼說來還有一件事……"
10039080-122 = "……？"
10039080-123 = "如果可以的話，我們想徵求瑪麗的同意……"
10039080-130 = "其實我們拍了許多漂亮的照片……"
10039080-131 = "[ns13]「……是偶像瑪麗的照片！！」\n[ns14]「哦哦哦！我要看我要看！！」"
10039080-134 = "呵呵，我也覺得您可能會這麼說，所以準備了很多。"
10039080-135 = "這麼漂亮的照片，果然還是得公開才符合公共利益……"
10039080-141 = "……瑪麗？"
10039080-142 = "啊，你想親自挑選是嗎？"
10039080-143 = "沒關係，我們也尊重瑪麗的意見……"
10039080-144 = "…………"
10039080-150 = "……！！！"
10039080-151 = "……！！！"
10039080-152 = "[ns15]「把照片……撕掉了！？」\n[ns16]「瑪，瑪麗……！？」"
10039080-155 = "……所有照片都在這裡了嗎？"
10039080-156 = "咦！？啊，不，還有一些在我辦公室的抽屜裡……"
10039080-157 = "……這樣啊。"
10039080-158 = "櫻子大人。"
10039080-163 = "剩下的照片……麻煩您全數銷毀。"
10039080-164 = "咦咦……！？！？"
10039080-165 = "為，為什麼呢……！#n明，明明是這麼珍貴且漂亮的東西……"
10039080-166 = "啊，那個……櫻子同學。"
10039080-167 = "現在還是乖乖聽話比較好……"
10039080-169 = "……櫻子大人？"
10039080-170 = "照片的銷毀。"
10039080-171 = "還請務必……"
10039080-176 = "……確實執行哦？"
10039080-177 = "……噫噫！？"
10039080-178 = "是！！是！！#n我馬上回去銷毀……！！"
10039080-185 = "……畢竟直到今天結束前，我們都還是偶像團體。"
10039080-186 = "如果把這當作團體領袖的指示……應該也沒什麼問題吧。"
10039080-187 = "那麼既然我已經表達了謝意……就先告辭了。"
10039080-192 = "……真的辛苦你了，瑪麗同學。#n當然老師也是……再次感謝您的協助。"
10039080-197 = "[ns17]「真可惜……」\n[ns18]「難得有這麼漂亮的照片。」"
10039080-200 = "真是的……請老師也別這麼說。"
10039080-201 = "就讓這次的事在此畫下句點吧。"
10039080-202 = "明天活動結束之後，我又將回歸修女的身分。"
10039080-203 = "如果留下這些東西……我恐怕會一直感到念念不忘的。"
10039080-204 = "並不是因為討厭，或者認為這是件壞事……"
10039080-205 = "……呵呵，即使您露出這種表情也沒辦法唷。#n還請您原諒我的任性。"
10039080-209 = "雖然這麼說可能有點奇怪……"
10039080-215 = "[ns19]「咦，這是……」\n[ns20]「還有一張沒撕掉的照片？」"
10039080-218 = "唔嗯……該怎麼說呢。"
10039080-219 = "就當作是我給您的……一項小小的粉絲福利吧。"
10039080-220 = "老師您總是……為我們辛苦付出……"
10039080-224 = "所以……這是在回歸日常之前……"
10039080-233 = "……專屬於老師跟我的「小祕密」唷。"
10039080-234 = "Serenade Promenade"

[translation]
84304300200-5 = "The Big Sister Algorithm..."
84304300200-6 = "Simply put, it's a system that checks and tracks all data of any kind within Millennium."
84304300200-7 = "Don't we still do that? How is it different?"
84304300200-8 = "These days, we track the FLOW of data, not its actual content, or the identity of the user."
84304300200-9 = "Let's say someone took a photo and sent it somewhere. Our current system sees that the photo was sent..."
84304300200-10 = "...while the Big Sister Algorithm would see the photo, the phone data of the photographer, the sender's personal information, the album inside the phone, where the photo was taken, and the personal information of everyone in the photo. And the text of the message that went with it."
84304300200-11 = "Hm?"
84304300200-12 = "You could've just said, \"It's bad.\""
84304300200-13 = "It is bad. I know."
84304300200-14 = "...And at the time, I didn't care."
84304300200-16 = "..."
84304300200-17 = "I never used it after I left, and after this, I don't plan to use it ever again. Once I use it to solve this one problem, I'm going to destroy it."
84304300200-18 = "In fact, this is our chance to do that. Up until now, I couldn't access it."
84304300200-19 = "The Big Sister Algorithm's core hardware is located in the deepest part of the Data Center, in a secret room that isn't even in the blueprints."
84304300200-20 = "If you help me, I can destroy it afterwards. It's the best possible outcome."
84304300200-21 = "For now, no one else knows it exists, but if it ever falls into the wrong hands..."
84304300200-22 = "...well, there'll be trouble."

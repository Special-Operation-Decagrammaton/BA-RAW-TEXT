84304300200-5 = "3;리오;99;……빅 시스터 알고리즘.\n#3;em;…\n#3;a"
84304300200-6 = "3;리오;01;간단하게 설명하자면 밀레니엄 내에 존재하는 모든 데이터와 정보, 그것들의 출처를 추적하며 확인할 수 있는 시스템이야."
84304300200-7 = "5;네루 교복;01;……?? 평소에도 하던 짓 아니야? 뭐가 다른데?\n#5;em;[?]\n#5;al\n#3;m1"
84304300200-8 = "3;리오;02;달라. 평소에 감시하는 건 '데이터의 흐름'이지, 그 데이터가 가지고 있는 내용과 사용자의 신상이 아니거든."
84304300200-9 = "3;리오;99;말하자면 누군가 사진을 찍어 다른 곳으로 보냈을 때, <데이터 추적>은 그 사진이 이동했다는 사실을 파악하는 것이고……."
84304300200-10 = "3;리오;07;빅 시스터 알고리즘은 사진을 찍은 사람의 휴대폰 정보, 주인의 신상 정보, 휴대폰 안의 앨범, 찍은 사진의 위치, 찍어 보낸 상대방의 신상 정보와 보낼 때 쓴 메시지 등을 모두 파악하는 시스템이지."
84304300200-11 = "5;네루 교복;17;……?\n#5;em;[?]"
84304300200-12 = "5;네루 교복;00;심플하게 나쁜 짓이잖아. 대놓고 감시 아냐?"
84304300200-13 = "3;리오;01;나쁜 일이지. 나도 알아."
84304300200-14 = "3;리오;99;……그런 사람이었으니까. 나는.\n#3;em;[한숨]"
84304300200-15 = "#all;hide"
84304300200-16 = "3;세이아;01;……."
84304300200-17 = "3;리오;00;이후로는 사용한 적이 없었고, 앞으로도 사용할 예정은 없어. 이번을 마지막으로 사용하고, 그 자리에서 시스템도 폐기할 생각이야."
84304300200-18 = "3;리오;99;오히려 지금에 와서 폐기할 수 있는 '기회'가 생긴 거라고 봐야겠지. 지금까지의 나는, 그곳에 접근할 수 없었거든."
84304300200-19 = "3;리오;07;빅 시스터 알고리즘이 존재하는 곳은 데이터 센터 안에서도 가장 깊은 곳. 설계 도면상으로는 존재조차 하지 않는 비밀의 방.\n#3;em;…"
84304300200-20 = "3;리오;05;차라리 잘 됐어. 네루, 네가 도와주기만 한다면 이번 기회에 그 시스템도 완전히 폐기할 생각이야.\n#3;stiff"
84304300200-21 = "3;리오;99;아직은 나 외에 누구도 그 존재를 모르지만, 만에 하나 누군가의 손에 넘어간다면……."
84304300200-22 = "3;리오;01;분명 큰일이 날 시스템이니까."
84304300200-23 = "#wait;100"

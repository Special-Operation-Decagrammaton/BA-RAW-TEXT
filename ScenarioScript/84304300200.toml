[translation]
84304300200-5 = "……大姐頭演算法。"
84304300200-6 = "簡單來說，這個系統可以追蹤千年內所有的資料、資訊和它們的來源。"
84304300200-7 = "……那不是你平常就會做的事嗎？有什麼不一樣？"
84304300200-8 = "不，我平時監視的是「數據的流向」，而不是數據的內容或使用者的身分。"
84304300200-9 = "比如說，有人將照片發送到其他地方的時候，#n可以藉由「數據追蹤」掌握到那張照片移動了的事實……"
84304300200-10 = "而大姐頭演算法則是可以掌握到所有資訊。#n例如拍照者的手機資訊、身分資料、手機相簿、拍照地點……#n就連傳送對象的身分資料和傳送時的訊息也無一例外。"
84304300200-11 = "……？"
84304300200-12 = "簡單來說就是在做壞事嘛。#n這不擺明是在監視嗎？"
84304300200-13 = "沒錯，我也知道這是壞事。"
84304300200-14 = "……畢竟我曾經就是那樣的人。"
84304300200-16 = "……"
84304300200-17 = "在那之後我從未使用過，將來也不打算使用。#n這次將會是它最後一次運作，我打算在用完之後當場銷毀系統。"
84304300200-18 = "或者反而應該說有「機會」可以銷毀吧。#n目前為止，我一直無法接近那個地方。"
84304300200-19 = "大姐頭演算法就位於資料中心最深處，連在設計圖上也不存在的密室。"
84304300200-20 = "或許這也是件好事吧。#n寧瑠，如果你願意幫忙的話，我想趁這個機會徹底銷毀那個系統。"
84304300200-21 = "雖然目前只有我知道它的存在，但萬一落入別人的手中……"
84304300200-22 = "那個系統勢必會掀起軒然大波。"

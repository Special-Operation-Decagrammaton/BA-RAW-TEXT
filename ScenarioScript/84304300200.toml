[translation]
84304300200-5 = "บิ๊กซิสเตอร์ อัลกอริทึม..."
84304300200-6 = "ถ้าให้อธิบายง่ายๆ มันคือระบบที่ติดตามและตรวจสอบที่มาของข้อมูลทั้งหมดในมิลเลเนียมได้"
84304300200-7 = "ก็เหมือนที่เคยทำปกติไม่ใช่เหรอ...?? มันไม่เหมือนกันยังไง?"
84304300200-8 = "ไม่เหมือนกันน่ะ ปกติสิ่งที่ฉันตรวจสอบคือ 'กระแสข้อมูล' มันเป็นความเคลื่อนไหวของข้อมูลเท่านั้น ไม่ใช่รายละเอียดของข้อมูลหรือของผู้ใช้หรอก"
84304300200-9 = "สมมติง่ายๆ ก็คือ ถ้ามีใครถ่ายรูปแล้วส่งไปที่อื่น <การติดตามข้อมูลปกติ> จะทำได้แค่ยืนยันว่ามีการ#nส่งรูปนั้น..."
84304300200-10 = "แต่ <บิ๊กซิสเตอร์ อัลกอริทึม> เป็นระบบที่รู้ได้ทุกอย่าง ตั้งแต่ข้อมูลของโทรศัพท์เครื่องที่ใช้ถ่ายรูปนั้น ข้อมูลเจ้าของโทรศัพท์ อัลบั้มรูปในเครื่อง ตำแหน่งที่ถ่ายรูปนั้น ข้อมูลของคนที่ส่งรูปนั้นไปให้ รวมถึงข้อความที่ส่งไปพร้อมรูปนั้นด้วย"
84304300200-11 = "...?"
84304300200-12 = "แต่มันแย่มากเลยนะ สืบกันขนาดนี้เลยเหรอ?"
84304300200-13 = "ใช่ มันคือการกระทำที่แย่ ฉันเองก็รู้ดี"
84304300200-14 = "เพราะว่าฉัน... เคยเป็นคนแบบนั้นมาก่อน"
84304300200-16 = "..."
84304300200-17 = "ฉันไม่ได้ใช้มันตั้งแต่นั้นเป็นต้นมา แล้วก็ไม่มีความคิดที่จะใช้มันในอนาคตด้วย ฉันจะใช้ระบบนี้เป็น#nครั้งสุดท้ายในงานนี้ แล้วก็จะทำลายมันทันทีเมื่อเสร็จงาน"
84304300200-18 = "คงต้องคิดว่านี่เป็น 'โอกาส' ที่จะได้ทำลายมันน่ะ เพราะที่ผ่านมาฉันยังเข้าไปที่นั่นไม่ได้"
84304300200-19 = "บิ๊กซิสเตอร์ อัลกอริทึมอยู่ในส่วนลึกที่สุดของศูนย์ข้อมูล ตรงนั้นเป็นห้องลับที่ไม่ปรากฏแม้แต่ใน#nพิมพ์เขียวน่ะ"
84304300200-20 = "เป็นแบบนี้ก็ดีแล้วละ เนรุ ถ้าเธอช่วยฉัน ฉันจะใช้โอกาสนี้ในการทำลายระบบนั้นให้สิ้นซากไปเลย"
84304300200-21 = "ถึงแม้ตอนนี้จะมีแค่ฉันที่รู้ แต่ถ้าหากมันตกไปอยู่ในมือคนอื่นละก็..."
84304300200-22 = "มันจะเป็นระบบที่สร้างปัญหาอย่างไม่ต้องสงสัยเลยละ"

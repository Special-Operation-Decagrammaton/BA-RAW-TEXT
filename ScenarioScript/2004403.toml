[translation]
2004403-1 = "#title;페이스 메이커"
2004403-2 = "3;스미레;05;어서 오십시오. 트레이너. 기다리고 있었습니다……?\n#3;a\n#3;em;…"
2004403-3 = "3;스미레;06;트레이너?!\n#3;shake\n#3;em;[?!]"
2004403-4 = "[s] \"가, 갑자기 왜 그래, 스미레?!\""
2004403-5 = "3;스미레;99;음. 아뇨. 어디까지나 제 착각에 지나지 않았으면 좋겠습니다만……."
2004403-6 = "3;스미레;04;정말 아주 약간입니다만, 최근 체형이 살짝 변하시지 않으셨나요?"
2004403-7 = "[s1] \"어, 나는 모르겠는데? 그러고 보니…….\"\n[s2] \"근무 시간에 살짝살짝 군것질을 하긴 했는데…….\""
2004403-8 = "#wait;10"
2004403-9 = "#wait;10"
2004403-10 = "3;스미레;05;군것질!\n#3;em;[!]"
2004403-11 = "3;스미레;99;그것이군요. 문제의 원인을 찾아낸 것 같습니다."
2004403-12 = "3;스미레;05;아닙니다. 괜찮습니다. 우리에게는 과학과 합리, 그리고 트레이닝이 있습니다."
2004403-13 = "3;스미레;10;자! 어서 체질량지수 측정을 시작해 보도록 하죠!\n#3;em;[!]"

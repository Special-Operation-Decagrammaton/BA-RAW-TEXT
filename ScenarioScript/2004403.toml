2004403-17 = "#wait;300"
2004403-18 = "#wait;200"
2004403-19 = "#wait;200"
2004403-20 = "#na;(그렇게 스미레에게 이끌려 가, 측정기에서 전극을 잡은 채 키와 몸무게를 쟀다…….)"
2004403-21 = "#all;hide"
2004403-22 = "3;스미레;05;네. 결과가 나왔군요.\n#3;a"
2004403-23 = "[s3] \"어, 어떤가요. 스미레 코치……?\"\n[s4] \"혹시 죽을병인가요?!\""
2004403-24 = "#wait;10"
2004403-25 = "#wait;10"
2004403-26 = "3;스미레;99;아뇨. 다행히도 정상 범주입니다, 트레이너. 안심하셔도 좋습니다. 다만…….\n#3;em;…"
2004403-27 = "3;스미레;10;네! 여분의 지방 성분이, 약간이지만 관찰되고 있습니다!\n#3;closeup"
2004403-28 = "3;스미레;10;그러면 된 거 아니냐고요? 아닙니다, 트레이너! 그거야말로 하나는 알고 둘은 모르는 이야기입니다!\n#3;hophop\n#3;em;[스팀]"
2004403-29 = "3;스미레;99;지방은 곧 저장된 연료죠. 태워서 에너지를 낼 수 있는 힘의 원천입니다."
2004403-30 = "3;스미레;07;즉 여분의 지방이야말로 미래에 근육이 될 가능성을 품은 꿈과 희망의 생체조직이라고 볼 수 있겠죠!\n#3;closeup"
2004403-31 = "3;스미레;10;즉, 지금 트레이너의 신체는, 꿈과 희망과 가능성을 품은 위대한 씨앗과 같은 상태라는 겁니다!\n#3;closeup"
2004403-32 = "3;스미레;07;한 시도 지체할 수 없겠군요. 당장 트레이닝을 시작하죠!\n#3;em;[반짝]\n#3;closeup"
2004403-33 = "[s] \"결국 이렇게 되는 건가~\""
2004403-34 = "#all;hide"
2004403-35 = "3;스미레 아르바이트;03;준비 운동은 끝나셨습니까, 트레이너. 좋네요. 아주 좋아요.\n#3;a\n#3;em;[재잘]"
2004403-36 = "[s] \"어? 왜 그 옷이야?\""
2004403-37 = "3;스미레 아르바이트;02;아, 이 복장 말씀이시군요.\n#3;em;[반응]"
2004403-38 = "3;스미레 아르바이트;01;확실히 이 복장은 스타디움에서 사용하는 제복입니다만."
2004403-39 = "3;스미레 아르바이트;03;개인적으로 꽤나 마음에 들어서, 평소에도 가끔 애용하고 있습니다."
2004403-40 = "3;스미레 아르바이트;08;무엇보다 전신에 실리는 25kg 정도의 적당한 무게감이, 제법 괜찮은 자극이 되거든요.\n#3;em;[음표]"
2004403-41 = "3;스미레 아르바이트;03;그러면, 몸을 풀기 위해 가볍게 10km 구보부터 시작하도록 할까요!"
2004403-42 = "3;스미레 아르바이트;05;저 역시 이 복장과 드링크 도구를 착용한 채 함께 달리도록 하겠습니다!"
2004403-43 = "3;스미레 아르바이트;09;본디 저라면 가볍게 20km부터 시작하지만……."
2004403-44 = "3;스미레 아르바이트;07;트레이너에게 있어서는 조금 갑작스러울 수 있는 러닝이므로, 충분히 소화할 수 있는 메뉴를 준비했습니다!\n#3;em;[반짝]"
2004403-45 = "[s] \"배려는 감사하지만, 절반으로 줄여 주시면 안 될까요~!\""
2004403-46 = "3;스미레 아르바이트;08;에이, 왜 이러세요. '회원님'. 충분히 하실 수 있잖아요.\n#3;em;[재잘]"
2004403-47 = "3;스미레 아르바이트;03;그러면, 시작하도록 하죠!"

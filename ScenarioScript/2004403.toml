2004403-74 = "3;스미레 아르바이트;02;네? 트레이너는 몰라도, 저는 제법 힘이 남는 것 같은데, 그러면 먼저 뛰어가도 되지 않느냐고요?"
2004403-75 = "3;스미레 아르바이트;99;아닙니다. 트레이너. 육상에는 페이스 메이커라는 역할이 있죠."
2004403-76 = "3;스미레 아르바이트;01;함께 달리는 사람을 위해 속도를 조율하여, 그 사람이 자신의 모든 역량을 끌어내도록 돕는 보조자입니다."
2004403-77 = "3;스미레 아르바이트;05;앞에서 맞바람을 어느 정도 맞아주기 때문에, 뒤따라 달리는 사람은 체력적인 이득을 얻게 되기도 하죠.\n#3;m4"
2004403-78 = "3;스미레 아르바이트;03;고립되어 혼자 달리는 것보다 심리적인 안정감을 주기 때문에, 이렇게 앞뒤로 나란히 달리는 것이 효과적이기도 하고요."

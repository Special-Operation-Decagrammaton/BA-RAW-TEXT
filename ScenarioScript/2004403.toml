[translation]
2004403-1 = "Pacemaker"
2004403-2 = "Welcome. Trainer. I've been waiting!"
2004403-3 = "Trainer?"
2004403-4 = "[s] \"Why are you looking at me like that?\""
2004403-5 = "Mmm. I'm hoping that I was mistaken, but..."
2004403-6 = "It's only a small change, but have you...let yourself go a little?"
2004403-7 = "[s1] \"Uh, I'm not sure? Maybe...\"\n[s2] \"I've been sneaking a few snacks during work...\""
2004403-10 = "SNACKS!"
2004403-11 = "That's it. Insidious. That's the problem."
2004403-12 = "Not to worry! We have science, logic, and training technology. I'll shape you up!"
2004403-13 = "Now! Let's start with your body mass index!"
2004403-20 = "I was dragged by Sumire, who had me holding electrodes as she measured me."
2004403-22 = "Interesting..."
2004403-23 = "[s3] \"H-How am I, Sumire...?\"\n[s4] \"Is it life-threatening?!\""
2004403-26 = "Fortunately, you're within acceptable ranges, Trainer. However..."
2004403-27 = "It's only a little, but I'm observing excessive fat! See?"
2004403-28 = "Fine? No, not at all, Trainer! Don't you get it?"
2004403-29 = "Fat is essentially stored fuel. It's excess energy and reserved calories."
2004403-30 = "Meaning, fat is body tissue that carries the hopes and dreams of becoming muscle!"
2004403-31 = "So your body, right now, is a fount of unrealized potential!"
2004403-32 = "Enough wasting time. Let's start the training!"
2004403-33 = "[s] \"If you insist...\""
2004403-35 = "Are you done with the warm-up, Trainer? Good. Excellent."
2004403-36 = "[s] \"What's with the outfit?\""
2004403-37 = "Oh, this old thing?"
2004403-38 = "Although this could be considered my work uniform..."
2004403-39 = "...I wear it from time to time because I...enjoy it."
2004403-40 = "I find the 25 kg keg to be quite invigorating."
2004403-41 = "Now then, let's warm up with a light 10 km run!"
2004403-42 = "I'll also run with you! With the drinks!"
2004403-43 = "Normally, I would start with a relaxed 20 km trek..."
2004403-44 = "But it might be a bit too much for you, so I'll ease you in."
2004403-45 = "[s] \"10 km? Why not 5?\""
2004403-46 = "Don't be like that. We're on the same team. You can do it."
2004403-47 = "Now then, let's begin!"
2004403-50 = "I ended up running on the track with Sumire...!"
2004403-58 = "[ns] *pant* *pant* *pant* *pant*"
2004403-59 = "Keep going! We're just over halfway now! Push!"
2004403-74 = "Hm? You seem to be...plateauing. Why don't I run in front?"
2004403-75 = "You see, there's a role called a \"pacemaker\" in track."
2004403-76 = "It's a partner who adjusts their speed to help their fellow runner reach their full potential."
2004403-77 = "They block headwind, so the person running behind can regain their stamina."
2004403-78 = "Additionally, running in line like this provides vital moral support compared to running alone."
2004403-92 = "So cheer up, Trainer! I'm here. And I'm leading the way!"
2004403-93 = "I believe in you! We will finish this together!"
2004403-94 = "[s] \"That's...very sweet...but...!\""
2004403-101 = "And so, thanks to Sumire's pacemaking..."
2004403-102 = "I actually finished the 10 km run!"
2004403-105 = "― [log=스미레 아르바이트]Good work, Trainer![/log][wa:1790] "
2004403-107 = "― [log=스미레 아르바이트]That was truly an amazing run.[/log][wa:660] "
2004403-110 = "― [log=스미레 아르바이트]Here, have this. I mixed it for you.[/log][wa:550] "
2004403-113 = "[ns] \"Is this...a drink?\""
2004403-115 = "― [log=스미레 아르바이트]Yes. Effort should be rewarded.[/log][wa:1750] "
2004403-117 = "― [log=스미레 아르바이트]It's only natural to receive an earned reward.[/log][wa:1500] "
2004403-120 = "― [log=스미레 아르바이트]Of course, not everyone in this world...[/log][wa:1170] "
2004403-122 = "― [log=스미레 아르바이트]...receives the goodness they deserve.[/log]"
2004403-125 = "― [log=스미레 아르바이트]But still...[/log][wa:1160] "
2004403-127 = "― [log=스미레 아르바이트]I hope that people who work hard are rewarded for it.[/log][wa:1740] "
2004403-130 = "― [log=스미레 아르바이트]Here, please enjoy.[/log][wa:1290] "
2004403-132 = "― [log=스미레 아르바이트]I'll have a drink as well.[/log][wa:780] "
2004403-135 = "I was moved by Sumire's kindness and took a sip...!"
2004403-142 = "[ns5] \"I-It's so thick?\"\n[ns6] \"Sumire, what the...?\""
2004403-145 = "Yes, Trainer."
2004403-146 = "It's packed with protein!"
2004403-147 = "[s] \"It made me even thirstier!\""
2004403-148 = "Listen, Trainer. This is quite important."
2004403-149 = "You need protein after exercise for ultimate muscle synthesis!"
2004403-150 = "Furthermore, animal protein is more effective than plant protein."
2004403-151 = "In particular, this whey protein is quickly digested and integrated to cultivate strong muscles!"
2004403-152 = "So, drink up!"
2004403-156 = "[ns] \"I can't... Just leave me here.\""
2004403-157 = "T-Trainer? Perhaps you'd prefer a sugar-free sports drink? It's got electrolytes."
2004403-159 = "Yes. Very good. Drink it slowly so you don't choke."
2004403-163 = "Oh, you don't have to thank me."
2004403-164 = "In fact, I should thank YOU for being such a good sport on the track!"
2004403-165 = "Now then, Trainer!"
2004403-166 = "Let's rally and build those muscles!"
2004403-167 = "[s] \"We're doing more?!\""
2004403-168 = "Yes. Weren't you listening?"
2004403-169 = "That was a warm-up. It was only 10 km!"
2004403-174 = "Looking back, though Sumire's training was clearly effective..."
2004403-175 = "I was too sore to move for the next few days."

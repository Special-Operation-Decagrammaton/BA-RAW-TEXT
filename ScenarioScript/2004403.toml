[translation]
2004403-1 = "เพซเซอร์"
2004403-2 = "เชิญค่ะ เทรนเนอร์ ฉันรออยู่นานเลยนะคะ..."
2004403-3 = "เทรนเนอร์?!"
2004403-4 = "[s] \"จะ... จู่ๆ ก็เป็นอะไรไปเหรอ สึมิเระ?!\""
2004403-5 = "อืม ไม่มีอะไรค่ะ ฉันคงคิดไปเองน่ะค่ะ แต่ว่า..."
2004403-6 = "ช่วงนี้รูปร่างของเทรนเนอร์เปลี่ยนไปนิดหน่อยหรือเปล่าคะ?"
2004403-7 = "[s1] \"หืม? ไม่รู้สิ? จะว่าไปครูก็กินขนมบ่อยอยู่...\"\n[s2] \"ช่วงนี้ครูชอบหยิบนู่นนี่มากินระหว่างทำงานน่ะ...\""
2004403-10 = "กินจุ๊บจิ๊บสินะคะ!"
2004403-11 = "นั่นละค่ะ ฉันเจอต้นตอของปัญหาแล้วละ"
2004403-12 = "แต่ไม่เป็นไรค่ะ พวกเราพึ่งพาวิทยาศาสตร์ ตรรกศาสตร์ และการเทรนนิ่งได้ค่ะ"
2004403-13 = "เอาละ! รีบไปวัดค่าดัชนีมวลกายเดี๋ยวนี้เลยค่ะ!"
2004403-20 = "(แล้วคุณครูก็โดนสึมิเระลากมายืนบนเครื่องวัดองค์ประกอบของร่างกายเพื่อวัดค่าต่างๆ อย่างละเอียด)"
2004403-22 = "ค่ะ ผลออกมาแล้วค่ะ"
2004403-23 = "[s3] \"ปะ... เป็นยังไงบ้าง โค้ชสึมิเระ...?\"\n[s4] \"ปะ... เป็นยังไงบ้าง ครูเป็นโรคร้ายแรงหรือเปล่า?!\""
2004403-26 = "ไม่เป็นอะไรค่ะ ค่อยยังชั่วที่อยู่ในเกณฑ์ปกติค่ะเทรนเนอร์ วางใจได้เลยค่ะ แต่ว่า..."
2004403-27 = "ค่ะ! แต่เทรนเนอร์มีไขมันส่วนเกินอยู่เล็กน้อยค่ะ!"
2004403-28 = "มีน้อยก็ดีแล้วอย่างนั้นเหรอคะ? ไม่ค่ะ เทรนเนอร์! ถามเหมือนไม่รู้อะไรเอาเสียเลยนะคะ!"
2004403-29 = "ไขมันจะถูกเก็บไว้เป็นเชื้อเพลิงค่ะ มันจะถูกเผาไหม้และกลายเป็นพลังงานที่เราใช้ในการทำกิจกรรม#nต่างๆ"
2004403-30 = "เพราะงั้นไขมันส่วนเกินจึงเรียกได้ว่าเป็นเนื้อเยื่อชีวภาพแห่งความฝันและความหวังที่จะเปลี่ยนเป็น#nกล้ามเนื้อได้ในอนาคต"
2004403-31 = "เท่ากับว่าร่างกายของเทรนเนอร์ในตอนนี้เป็นเหมือนกับเมล็ดพันธุ์ยิ่งใหญ่ที่เต็มไปด้วยความฝันและ#nความหวังแห่งอนาคตค่ะ!"
2004403-32 = "จะผัดผ่อนไม่ได้แม้แต่น้อยค่ะ มาเริ่มออกกำลังกายกันเถอะ!"
2004403-33 = "[s] \"สุดท้ายก็จบลงแบบนี้สินะ~\""
2004403-35 = "วอร์มร่างกายเสร็จหรือยังคะเทรนเนอร์? ดีเลยค่ะ แบบนี้ละ เยี่ยมเลย"
2004403-36 = "[s] \"หืม? ทำไมใส่ชุดนี้ล่ะ?\""
2004403-37 = "ตกใจที่ฉันหยิบชุดนี้มาใส่เหรอคะ?"
2004403-38 = "จริงอยู่ที่มันเป็นยูนิฟอร์มที่ฉันใส่เวลาทำงานพาร์ทไทม์ในสนามกีฬา"
2004403-39 = "แต่ฉันชอบชุดนี้เป็นการส่วนตัว ก็เลยหยิบออกมาใส่บ้างในชีวิตประจำวันค่ะ"
2004403-40 = "เหนือสิ่งอื่นใด น้ำหนักประมาณ 25 กิโลที่ฉันกำลังแบกอยู่ก็เป็นตัวกระตุ้นที่ดีเลยค่ะ"
2004403-41 = "งั้นเรามาเริ่มจากการวิ่งเบาๆ สัก 10 กิโลเมตรเพื่อให้ร่างกายอบอุ่นก่อนเลยค่ะ!"
2004403-42 = "ฉันก็จะวิ่งไปกับเทรนเนอร์ พร้อมกับเครื่องจ่ายเครื่องดื่มอันนี้ด้วยค่ะ!"
2004403-43 = "ปกติแล้วฉันจะเริ่มวิ่งเบาๆ ที่ 20 กิโลเมตรก่อน..."
2004403-44 = "แต่มันอาจจะหนักเกินไปสำหรับเทรนเนอร์ก็ได้ ฉันก็เลยเตรียมโปรแกรมใหม่ที่ไม่เป็นการหักโหมมาค่ะ"
2004403-45 = "[s] \"ขอบใจที่เป็นห่วงนะ แต่ช่วยลดเหลือครึ่งเดียวได้มั้ย~!\""
2004403-46 = "อะไรกัน พูดอะไรอย่างนั้นล่ะคะ 'คุณสมาชิก' คุณทำได้สบายๆ ค่ะ"
2004403-47 = "งั้นก็มาเริ่มกันเลย!"
2004403-50 = "(สุดท้ายคุณครูก็ต้องไปวิ่งกับสึมิเระ...!)"
2004403-58 = "[ns] \"แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก...!\""
2004403-59 = "คุณสมาชิก! พยายามเข้านะคะ! วิ่งมาได้ครึ่งทางแล้วค่ะ! มั่นใจ เราทำได้!"
2004403-74 = "คะ? ถึงเทรนเนอร์จะเหนื่อยแล้ว แต่ฉันดูจะยังมีแรงล้นเหลือ งั้นก็ให้ฉันวิ่งนำไปก่อนเหรอคะ?"
2004403-75 = "ไม่ได้ค่ะ เทรนเนอร์ ปกติในการวิ่งจะมีคนที่มีบทบาทเป็นเพซเซอร์ค่ะ"
2004403-76 = "หน้าที่ของเพซเซอร์คือการเป็นผู้ช่วยที่คอยปรับความเร็วให้เหมาะสมกับคนที่วิ่งด้วยกัน และช่วยให้คน#nคนนั้นดึงศักยภาพของตัวเองออกมาอย่างเต็มที่ค่ะ"
2004403-77 = "นอกจากนี้เพซเซอร์ยังช่วยบังลมปะทะจากด้านหน้าให้ คนที่วิ่งตามหลังก็จะไม่เสียแรงมากด้วยค่ะ"
2004403-78 = "อีกอย่าง การวิ่งกับเพซเซอร์จะให้ความมั่นคงทางจิตใจมากกว่าการวิ่งเหงาๆ คนเดียว การวิ่งเคียงข้าง#nกันไปแบบนี้จึงยิ่งมีประสิทธิภาพค่ะ"
2004403-92 = "ส่งกำลังใจให้นะคะเทรนเนอร์! ฉันอยู่ตรงนี้ค่ะ ฉันจะเปิดทางให้เอง!"
2004403-93 = "ฉันเชื่อสุดใจว่าเทรนเนอร์จะทำสำเร็จได้ในที่สุดค่ะ!"
2004403-94 = "[s] \"ก็ขอบใจอยู่หรอกนะที่เชื่อแบบนั้น~!\""
2004403-101 = "(จากการสนับสนุนของเพซเซอร์สึมิเระ...)"
2004403-102 = "(สุดท้ายคุณครูก็วิ่ง 10 กิโลเมตรได้สำเร็จจริงๆ!)"
2004403-105 = "― [log=스미레 아르바이트]ทำได้ดีมากค่ะ เทรนเนอร์![/log][wa:1590] "
2004403-107 = "― [log=스미레 아르바이트]เป็นการวิ่งที่ยอดเยี่ยมจริงๆ เลยค่ะ[/log][wa:460] "
2004403-110 = "― [log=스미레 아르바이트]เอ้า ดื่มนี่สิคะ ฉันเตรียมมาให้ค่ะ[/log][wa:630] "
2004403-113 = "[ns] \"นี่คือ... เครื่องดื่มเหรอ?\""
2004403-115 = "― [log=스미레 아르바이트]ค่ะ เราต้องได้รับการตอบแทนจากความพยายามสิคะ[/log][wa:1270] "
2004403-117 = "― [log=스미레 아르바이트]สมควรแล้วที่จะได้รับรางวัลอย่างเหมาะสมค่ะ[/log][wa:1700] "
2004403-120 = "― [log=스미레 아르바이트]แน่นอนว่าทุกสิ่งในโลก...[/log][wa:1810] "
2004403-122 = "― [log=스미레 아르바이트]ล้วนไม่ได้รับการประเมินตามความพยายามเสมอไป[/log]"
2004403-125 = "― [log=스미레 아르바이트]แต่ว่าฉันก็...[/log][wa:1080] "
2004403-127 = "― [log=스미레 아르바이트]คิดว่าอยากให้คนที่เพียรพยายามได้รับรางวัลค่ะ[/log][wa:2100] "
2004403-130 = "― [log=스미레 아르바이트]เอาละ รีบดื่มสิคะ[/log][wa:1370] "
2004403-132 = "― [log=스미레 아르바이트]ฉันก็จะดื่มด้วยค่ะ[/log][wa:1100] "
2004403-135 = "(คุณครูยกแก้วขึ้นดื่มด้วยความประทับใจในความคิดของสึมิเระ และในตอนนั้นเอง...!)"
2004403-142 = "[ns5] \"ทำไมมันเหนียวหนืดแบบนี้ล่ะ?!\"\n[ns6] \"สึมิเระ หรือว่านี่คือ!?\""
2004403-145 = "ค่ะ เทรนเนอร์"
2004403-146 = "เครื่องดื่มโปรตีนยังไงล่ะคะ"
2004403-147 = "[s] \"แบบนี้ยิ่งทำให้หิวน้ำเข้าไปใหญ่นะ!\""
2004403-148 = "ไม่หรอกค่ะ เทรนเนอร์ นี่เป็นเรื่องสำคัญมากเลยนะคะ"
2004403-149 = "ถ้าร่างกายของเราได้รับโปรตีนหลังจากออกกำลังกาย ก็จะยิ่งเกิดการสังเคราะห์เส้นใยกล้ามเนื้ออย่าง#nมีประสิทธิภาพค่ะ"
2004403-150 = "นอกจากนี้ในการสังเคราะห์กล้ามเนื้อ โปรตีนจากสัตว์ยังมีประสิทธิภาพมากกว่าโปรตีนจากพืช"
2004403-151 = "โดยเฉพาะโปรตีนเวย์ในนมที่ย่อยได้รวดเร็ว มันเลยไปช่วยส่งเสริมการสังเคราะห์กล้ามเนื้อค่ะ"
2004403-152 = "เพราะงั้นก็ต้องดื่มเครื่องดื่มโปรตีนสิคะ"
2004403-156 = "[ns] \"ไม่นะ... ตอนนี้ครูกระหายน้ำจนไม่มีแรงแล้ว...\""
2004403-157 = "ทะ... เทรนเนอร์? ที่จริงฉันก็มีเครื่องดื่มไอออนสูตรไม่มีน้ำตาลเตรียมไว้เพื่อดับกระหายเหมือนกัน..."
2004403-159 = "นี่ไงคะ ดื่มช้าๆ นะคะ จะได้ไม่สำลัก"
2004403-163 = "ไม่เป็นไรค่ะ ไม่ต้องเอ่ยขอบคุณฉันหรอกค่ะ"
2004403-164 = "ฉันต่างหากที่อยากขอบคุณเทรนเนอร์ที่ทุ่มเทออกกำลังกายตามโปรแกรมของฉันได้จนจบ"
2004403-165 = "ถ้างั้น... เทรนเนอร์คะ!"
2004403-166 = "เรามาออกแรงเพื่อเส้นใยกล้ามเนื้อในอนาคตกันอีกรอบเถอะค่ะ!"
2004403-167 = "[s] \"อีกรอบเหรอ?!\""
2004403-168 = "ค่ะ ฉันก็บอกไปตั้งแต่ก่อนหน้านี้แล้วนี่คะ?"
2004403-169 = "นี่เป็น 'การวิ่งเบาๆ 10 กิโลเมตรเพื่อวอร์มร่างกาย' เท่านั้นค่ะ"
2004403-174 = "(เมื่อมองย้อนกลับไป การเทรนนิ่งของสึมิเระในวันนี้มีประสิทธิภาพอย่างไม่ต้องสงสัย...)"
2004403-175 = "(แต่การวิ่ง 10 กิโลเมตรอย่างกะทันหันทำให้คุณครูทรมานจากการปวดกล้ามเนื้อไปอีกหลายวัน...)"

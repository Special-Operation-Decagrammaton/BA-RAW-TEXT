[translation]
2004403-1 = "配速員"
2004403-2 = "歡迎你來，指導員。#n我一直在等你……？"
2004403-3 = "指導員！？"
2004403-4 = "[s]「突，突然怎麼了，堇！？」"
2004403-5 = "唔嗯，不，希望這只是我的錯覺……"
2004403-6 = "雖然只有非常細微的差別，不過指導員的體型是不是稍微有了一點變化呢？"
2004403-7 = "[s1]「咦，我也不太確定耶？不過聽你這麼一說……」\n[s2]「我工作時間確實有偷偷吃一點零食……」"
2004403-10 = "零食！"
2004403-11 = "看來我找到問題的根源了。"
2004403-12 = "不過沒關係，指導員不必擔心。#n我們有科學、理性和訓練作為後盾。"
2004403-13 = "來！趕快開始測量身體質量指數吧！"
2004403-20 = "（就這樣被堇帶著，握著測量器的電極測量了身高和體重……）"
2004403-22 = "結果出來了呢。"
2004403-23 = "[s3]「怎，怎麼樣呢。堇教練……？」\n[s4]「該不會沒救了吧！？」"
2004403-26 = "不，數值還在正常的範圍內，請指導員放心。#n只不過……"
2004403-27 = "嗯！雖然只有一點點，但確實觀察到了多餘的脂肪成分！"
2004403-28 = "那不就沒問題了？#n不，指導員！那是不夠了解的人才會有的觀念哦！"
2004403-29 = "脂肪就是儲存在身體裡的燃料──是能夠用來燃燒、產生能量的力量來源。"
2004403-30 = "因此，多餘的脂肪就是培養未來肌肉的樂土，是象徵夢想與希望的生物組織！"
2004403-31 = "換句話說──#n現在指導員的身體，就像是一顆懷抱著夢想、希望與可能性的偉大種子啊！"
2004403-32 = "不能再耽誤時間了。立刻開始訓練吧！"
2004403-33 = "[s]「結果最後又變成這樣了啊～」"
2004403-35 = "熱身運動結束了嗎，指導員。#n很好，非常好。"
2004403-36 = "[s]「嗯？你為什麼要換上那套衣服？」"
2004403-37 = "啊，是指這套服裝嗎？"
2004403-38 = "雖然這的確是我在運動場時會穿的打工制服……"
2004403-39 = "不過我個人還挺喜歡的，所以偶爾私底下也會穿。"
2004403-40 = "而且全身約25kg的重量，剛好能帶給身體不錯的刺激。"
2004403-41 = "那麼，就先用輕鬆的10km慢跑來暖暖身吧！"
2004403-42 = "我也會穿著這套服裝和飲料機一起跑！"
2004403-43 = "雖然我平時對自己的標準是輕鬆跑20km……"
2004403-44 = "不過那對指導員可能會有點負擔，所以我改成了一定可以消化的菜單！"
2004403-45 = "[s]「謝謝你的貼心，但能不能再減半呢～！」"
2004403-46 = "哎呀，請「會員」不必擔心，你絕對能做到的。"
2004403-47 = "那麼，開始吧！"
2004403-50 = "（於是就和堇一起在跑道上跑步……！）"
2004403-58 = "[ns]「呼，呼，哈，哈……！」"
2004403-59 = "會員！加油！#n已經跑完一半以上了！我們做得到！"
2004403-74 = "咦？既然我還有體力，要不要自己先走？"
2004403-75 = "不，指導員。#n在田徑賽之中，有一個叫做配速員的角色。"
2004403-76 = "是個為跑者調節速度，幫助跑者發揮出所有能力的輔助者。"
2004403-77 = "由於跑在前面的人多少會幫後面的人承受風阻，#n因此跟跑的人能獲得一點體力上的優勢。"
2004403-78 = "跟孤立無援地獨自向前跑相比，#n配速員能給予心理上的安定感，像這樣前後並排跑步也很有效果。"
2004403-92 = "振作起來吧，指導員！#n我會在前面為你開路的！"
2004403-93 = "我比任何人都堅信，指導員一定能夠堅持到最後！"
2004403-94 = "[s]「你的這份心意我是很感謝沒錯啦～！」"
2004403-101 = "（於是在堇的協助配速下……）"
2004403-102 = "（真的順利跑完了全程10km！）"
2004403-105 = "— [log=스미레 아르바이트]辛苦了！指導員！[/log][wa:2190] "
2004403-107 = "— [log=스미레 아르바이트]你真的，跑得非常好。[/log][wa:1420] "
2004403-110 = "— [log=스미레 아르바이트]請用，我為你準備了飲料。[/log][wa:1470] "
2004403-113 = "[ns]「這是……飲料？」"
2004403-115 = "— [log=스미레 아르바이트]沒錯，這份努力就該獲得回報。[/log][wa:2390] "
2004403-117 = "— [log=스미레 아르바이트]所以必須，給予適當的獎勵。[/log][wa:2780] "
2004403-120 = "— [log=스미레 아르바이트]當然，世上的一切──[/log][wa:2330] "
2004403-122 = "— [log=스미레 아르바이트]未必都能獲得與努力成正比的評價。[/log]"
2004403-125 = "— [log=스미레 아르바이트]但我依然……[/log][wa:1360] "
2004403-127 = "— [log=스미레 아르바이트]希望努力的人都能確實獲得回報。[/log][wa:3220] "
2004403-130 = "— [log=스미레 아르바이트]來，請享用吧。[/log][wa:1730] "
2004403-132 = "— [log=스미레 아르바이트]我也要喝一杯。[/log][wa:1500] "
2004403-135 = "（就在被堇的體貼感動，喝下飲料的同時……！）"
2004403-142 = "[ns5]「怎，怎麼黏黏又澀澀的！？」\n[ns6]「堇，這該不會是……！？」"
2004403-145 = "沒錯，指導員。"
2004403-146 = "這是蛋白質飲料。"
2004403-147 = "[s]「這樣我反而更渴了啊！」"
2004403-148 = "不，指導員。這可是相當重要的事情。"
2004403-149 = "如果能在運動之後為消耗能量的身體補充蛋白質，可以更有效地促進肌纖維合成。"
2004403-150 = "而且跟植物性蛋白質相比，動物性蛋白質在肌肉蛋白質合成方面的效果更好。"
2004403-151 = "尤其牛奶中的乳清蛋白能夠快速被消化吸收，促進肌肉蛋白質的合成。"
2004403-152 = "因此才需要喝下這杯蛋白質飲料。"
2004403-156 = "[ns]「不行……我已經渴到連站起來的力氣都沒有了……」"
2004403-157 = "指，指導員？#n我當然也有準備解渴的無糖運動飲料……"
2004403-159 = "來，請慢慢喝，小心不要嗆到了。"
2004403-163 = "沒關係，不需要對我道謝。"
2004403-164 = "指導員能夠出色地堅持到最後，反而是我想對你表達謝意呢。"
2004403-165 = "那麼，指導員！"
2004403-166 = "跟我一起為明天的肌纖維繼續加油吧！"
2004403-167 = "[s]「還沒完嗎！？」"
2004403-168 = "那當然。我剛才不是說過了嗎？"
2004403-169 = "這是「暖身的輕鬆10km慢跑」啊。"
2004403-174 = "（雖然堇的訓練，事後回想起來確實相當有效……）"
2004403-175 = "（然而因為突然跑了10km的關係，必須忍受好幾天的肌肉痠痛……）"

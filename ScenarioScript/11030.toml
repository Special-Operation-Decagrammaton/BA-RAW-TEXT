[translation]
11030-1 = "第3話;大人の力ってすごい！"
11030-2 = "対策委員会・教室"
11030-3 = "いやぁ～まさか勝っちゃうなんてね。ヘルメット団もかなりの覚悟で仕掛けてきたみたいだったけど。"
11030-4 = "まさか勝っちゃうなんて、じゃありませんよ、ホシノ先輩……#n勝たないと学校が不良のアジトになっちゃうじゃないですか……。"
11030-5 = "先生の指揮が良かったね。私たちだけの時とは全然違った。"
11030-6 = "これが大人の力……#nすごい量の資源と装備、それに戦闘の指揮まで。大人ってすごい。"
11030-7 = "今まで寂しかったんだね、シロコちゃん。#nパパが帰ってきてくれたおかげで、ママはぐっすり眠れまちゅ。"
11030-8 = "いやいや、変な冗談はやめて！先生困っちゃうじゃん！#nそれに委員長はその辺でしょっちゅう寝てるでしょ！"
11030-9 = "そうそう、可哀そうですよ。"
11030-10 = "あはは……少し遅れちゃいましたけど、あらためてご挨拶します、先生。"
11030-11 = "私たちは、アビドス対策委員会です。"
11030-12 = "私は、委員会で書記とオペレーターを担当している1年のアヤネ……。"
11030-13 = "こちらは同じく1年のセリカ、"
11030-14 = "どうも。"
11030-15 = "2年のノノミ先輩とシロコ先輩。"
11030-16 = "よろしくお願いします、先生～。"
11030-17 = "さっき、道端で最初に会ったのが、私。"
11030-18 = "……あ、別にマウントを取ってるわけじゃない。"
11030-19 = "そして、こちらは委員長の、"
11030-20 = "3年のホシノ先輩です。"
11030-21 = "いやぁ～よろしく、先生ー。"
11030-22 = "ご覧になった通り、我が校は現在危機にさらされています……#nそのため「シャーレ」に支援を要請し、先生がいらしてくれたことで、#nその危機を乗り越えることができました。"
11030-23 = "先生がいなかったら、さっきの人たちに学校を乗っ取られてしまったかも#nしれませんし、感謝してもしきれません……。"
11030-24 = "[s] 対策委員会とは何かを聞く。"
11030-25 = "そうですよね、ご説明いたします。対策委員会とは……このアビドスを蘇らせるために有志が集った部活です。"
11030-26 = "うんうん！全校生徒で構成される、校内唯一の部活なのです！#n全校生徒といっても、私たち5人だけなんですけどね。"
11030-27 = "他の生徒は転校したり、学校を退学したりして町を出て行った。"
11030-28 = "学校がこのありさまだから、学園都市の住民もほとんどいなくなって#nカタカタヘルメット団みたいな三流のチンピラに学校を襲われてる始末なの。"
11030-29 = "現状、私たちだけじゃ学校を守り切るのが難しい。在校生としては恥ずかしい限りだけど……。"
11030-30 = "もし「シャーレ」からの支援がなかったら……今度こそ、万事休すってところでしたね。"
11030-31 = "だねー。補給品も底をついてたし、さすがに覚悟したね。なかなかいいタイミングに現れてくれたよ、先生。"
11030-32 = "うんうん！もうヘルメット団なんてへっちゃらですね。大人の力ってすごいです☆"
11030-33 = "かといって、攻撃を止めるような奴らじゃないけど。"
11030-34 = "あー、確かに。しつこいもんね、あいつら。"
11030-35 = "こんな消耗戦を、いつまで続けなきゃいけないのでしょうか……。#nヘルメット団以外にもたくさん問題を抱えているのに……。"
11030-38 = "そういうわけで、ちょっと計画を練ってみたんだー。"
11030-39 = "えっ！？ホシノ先輩が！？"
11030-40 = "うそっ……！？"
11030-41 = "いやぁ～その反応はいくら私でも、ちょーっと傷ついちゃうかなー。#nおじさんだって、たまにはちゃんとやるのさー。"
11030-42 = "……で、どんな計画？"
11030-43 = "ヘルメット団は、数日もすればまた攻撃してくるはず。#nここんとこずっとそういうサイクルが続いているからねー。"
11030-45 = "だから、このタイミングでこっちから仕掛けて、奴らの前哨基地を襲撃しちゃおうかなって。今こそ奴らが一番消耗しているだろうからさー。"
11030-46 = "い、今ですか？"
11030-47 = "そう。今なら先生もいるし、補給とか面倒なことも解決できるし。"
11030-48 = "なるほど。ヘルメット団の前哨基地はここから30㎞くらいだし、今から出発しよっか。"
11030-49 = "良いと思います。あちらも、まさか今から反撃されるなんて、夢にも思っていないでしょうし。"
11030-50 = "そ、それはそうですが……先生はいかがですか？"
11030-51 = "[s] 同意する。"
11030-54 = "よっしゃ、先生のお墨付きももらったことだし、この勢いでいっちょやっちゃいますかー。"
11030-55 = "善は急げ、ってことだね。"
11030-56 = "はい～それでは、しゅっぱーつ！"
11030-58 = "カタカタヘルメット団のアジトがあるとされるエリアに入りました。"
11030-59 = "半径15㎞圏内に、敵のシグナルを多数検知。"
11030-60 = "おそらく敵もこちらが来たことに気付いているでしょう。#nここからは実力行使です！"

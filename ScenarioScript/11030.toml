11030-38 = "3;호시노;17;그러니까 말이지. 나한테 계획이 있어.\n#3;em;[반응]\n#3;a"
11030-39 = "5;세리카;11;뭐?! 호시노 선배한테 계획이?!\n#5;shake\n#5;em;[?!]\n#5;a"
11030-40 = "1;아야네;12;거짓말……?!\n#1;em;[땀]\n#1;a"
11030-41 = "3;호시노;02;이야~ 그런 반응은 아무리 나라도 상처받는다고. 가끔이지만 나도 할 땐 한다고.\n#3;em;c"
11030-42 = "5;세리카;08;……그래서, 계획이 뭐야?"
11030-43 = "3;호시노;16;헬멧단 녀석들은 며칠 뒤면 다시 우리를 습격할 거란 말이지. #n끝없이 반복되고 있는 상황이니까."

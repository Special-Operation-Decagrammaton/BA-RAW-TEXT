[translation]
11030-1 = "Episode 3;Being an Adult is Amazing!"
11030-2 = "Abydos Foreclosure Task Force Club Room"
11030-3 = "Wow, I can't believe we won! The Helmet Gang seemed pretty determined."
11030-4 = "You shouldn't say that, Hoshino. Those thugs would have taken over the school had we lost."
11030-5 = "Sensei gave us the edge we needed to turn the tide. We couldn't have done it otherwise."
11030-6 = "Is this the expertise of an adult? It was amazing how you handled resources, equipment, and support."
11030-7 = "Sheesh, Shiroko. You sound like you have a schoolgirl crush.#nAnyway, can I go back to sleep now that it's over?"
11030-8 = "You shouldn't tease Shiroko like that, Hoshino! Besides, haven't you slept enough today?"
11030-9 = "Someone's getting yelled at!"
11030-10 = "Haha. Anyway, we should introduce ourselves, Sensei."
11030-11 = "We're the Abydos Foreclosure Task Force."
11030-12 = "I'm Ayane, and I'm a first-year in charge of the task force's records and operations."
11030-13 = "This is Serika, also a first-year."
11030-14 = "Hey."
11030-15 = "And these are our second-years: Shiroko and Nonomi."
11030-16 = "Hello, Sensei!"
11030-17 = "We met before."
11030-18 = "...Not that I'm trying to sound special or anything."
11030-19 = "And this here is our president."
11030-20 = "Hoshino is our lone third-year."
11030-21 = "Nice to meet you, Sensei."
11030-22 = "I'm sure you've noticed by now that our school is in crisis. That's why I reached out to Schale for help, and you've already managed to come through for us."
11030-23 = "Those thugs would have succeeded in taking over the school if not for you.#nWe can't thank you enough."
11030-24 = "[s] Ask what the Foreclosure Task Force's purpose is."
11030-25 = "The Foreclosure Task Force's goal is to bring Abydos back to its former glory."
11030-26 = "Yup, yup! We're the only club in the school where every single student is a member!#nI mean, we're the only five students at this school, but still..."
11030-27 = "All the others either transferred or dropped out and left town."
11030-28 = "I don't blame them for leaving the Academy City entirely, with the state that Abydos is in.#nAnd now we have to deal with thugs like the Kata-Kata Helmet Gang trying to take over the school."
11030-29 = "We're having trouble defending Abydos on our own... We're in a sorry state if I'm being honest..."
11030-30 = "We would have been in real big trouble this time if Schale hadn't come around to help us."
11030-31 = "Seriously. I figured we were done for since we ran out of supplies.#nThat's some timing you had there, Sensei."
11030-32 = "At least we don't have to worry about the Helmet Gang anymore!#nIt pays to have adults in high places! ☆"
11030-33 = "No. I'm sure it's only a matter of time before they come back."
11030-34 = "Yeah, probably. They don't know when to quit."
11030-35 = "Who knows how long this will drag out? We have plenty of other things to worry about besides the Helmet Gang."
11030-38 = "I have a plan."
11030-39 = "What the...?! Hoshino came up with a plan?!"
11030-40 = "I'm surprised too!"
11030-41 = "I know I'm getting senile in my old age, but you don't have to hurt my feelings.#nI do my part too, you know."
11030-42 = "Well? Spill it."
11030-43 = "If history repeats itself, the Helmet Gang will attack again in a few days."
11030-45 = "So before then, why don't we go on the offensive for once?#nThey're probably sulking and vulnerable after that last fight."
11030-46 = "Y-You mean right now?"
11030-47 = "Yeah, now. With Sensei here, we have more than enough supplies to finish the job once and for all."
11030-48 = "True. The Helmet Gang's base is 30 kilometers from here.#nWe have plenty of time if we leave now."
11030-49 = "I'm all for it. The last thing they're expecting is for us to strike now."
11030-50 = "I can't deny that, but...what do you think, Sensei?"
11030-51 = "[s] \"I'm on board.\""
11030-54 = "Great! If Sensei is giving us the green light, then let's hurry up and go."
11030-55 = "Let's strike while the iron is hot."
11030-56 = "Okay! Let's go!"
11030-58 = "You're now on the Kata-Kata Helmet Gang's turf."
11030-59 = "I'm detecting multiple signals within a 15 kilometer radius."
11030-60 = "They must know you're there. Don't let your guard down!"

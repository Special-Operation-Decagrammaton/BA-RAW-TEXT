11030-47 = "1;호시노;03;그래. 모처럼 선생이 있으니 보급이나 다른 귀찮은 부분이 해결되거든.\n#1;greeting"
11030-48 = "5;시로코;00;그렇네. 헬멧단의 전초기지라면 여기서 30km 안에 있고, 지금 당장 출발한다고 해도 문제는 없을 거고."

11030-21 = "2;호시노;00;이야~ 반가워, 선생.\n#2;ar\n#2;em;[음표]\n#3;m4"
11030-22 = "3;아야네;00;보시다시피 저희 학교는 지금 위기 상황이라……. #n<샬레>에 지원을 요청했었고, 선생님이 와주셔서 위기를 넘길 수 있었어요."
11030-23 = "#2;dl\n3;아야네;03;선생님이 없었다면 저런 불량배들에게 학교를 뺏길 뻔했어요. #n정말 뭐라고 감사를 드려야 할지…….\n#3;m3"
11030-24 = "[s] 대책위원회가 뭔지 묻는다.;"
11030-25 = "3;아야네;01;네. 설명드리겠습니다. 대책위원회는…… 아비도스 학교를 되살리기 위해 모인 동아리입니다.\n#3;greeting"
11030-26 = "1;노노미;01;응응! 전교생이 모여 있는 교내 유일한 동아리예요!! #n전교생이라고 해 봤자 저희 5명이 전부지만.\n#1;em;r\n#1;a"
11030-27 = "5;시로코;00;다른 학생들은 전학가버렸거나, 학교를 그만두고 마을을 떠나버렸어. \n#5;a"
11030-28 = "5;시로코;05;학교가 이 모양이니 학원도시의 시민들도 거의 대부분 떠나버렸고, #n카타카타 헬멧단 같은 3류 불량배들이 학교를 습격하는 지경에 이르렀지.\n#5;em;[...]"
11030-29 = "5;시로코;04;우리로는 학교를 지키기 벅찬 상태야. 학생으로서 부끄러운 일이지……."
11030-30 = "1;노노미;01\n5;시로코;04\n3;아야네;09;<샬레>에서 지원이 나오지 않았다면…… 이번엔 진짜 큰일날 뻔했어요.\n#3;em;[땀]\n#1;d\n#5;d"
11030-31 = "#1;hide\n#5;hide\n3;호시노;00;맞아. 보급도 다 떨어져서 이제 망했다 싶었는데 딱 좋은 타이밍에 나타나줬어, 선생.\n#3;greeting"
11030-32 = "5;노노미;03;응응! 이제 헬멧단에 신경을 안써도 되잖아요. 어른의 힘 굉장해-☆ \n#5;em;[반짝]\n#3;m1\n#5;a"
11030-33 = "#3;hide\n1;시로코;02;하지만 저 녀석들은 또 공격해 올거야."
11030-34 = "5;세리카;02;아아. 그건 그래. 끈질긴 놈들이니까……."
11030-35 = "1;아야네;14;언제까지 이런 소모적인 전투를 계속해야 하는지…… #n신경써야 할 건 헬멧단 말고도 많은데…….\n#1;em;[속상함]\n#1;stiff"

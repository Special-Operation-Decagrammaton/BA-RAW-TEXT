[translation]
11030-1 = "#title;제3화;어른의 힘, 굉장해!"
11030-2 = "#place;아비도스 폐교대책위원회 부실"
11030-3 = "1;호시노;03;이야~ 설마 이기다니. 헬멧단 녀석들이 꽤 작정하고 몰려왔는데 말이지.\n#1;em;[음표]\n#1;a"
11030-4 = "5;아야네;09;설마 이기다니, 가 아니잖아요. 호시노 선배……. #n이기지 않으면 학교가 불량배들 소굴이 되어버리잖아요…….\n#5;em;[땀]\n#5;a"
11030-5 = "5;시로코;02;선생님의 지휘가 빛을 발했어. 우리끼리 싸울 때와는 전혀 다른 결과야.\n#5;a"
11030-6 = "5;시로코;03;이것이 어른의 힘인가……. #n가공할 자원과 장비, 지원까지. 어른이란 굉장하네.\n#5;em;k"
11030-7 = "1;호시노;16;그동안 외로웠구나, 시로코 쨩. #n이제 집나간 아빠가 돌아왔으니 이 엄마는 이제 마음껏 잠 잘 수 있겠어."
11030-8 = "5;세리카;11;아니, 멀쩡한 선생님을 이상하게 만들지 말라고! 불쌍하잖아! #n그리고 부장은 원래 마음껏 자러 다녔잖아!\n#5;em;[빠직]\n#5;hophop\n#5;a"
11030-9 = "1;노노미;03;불쌍해요, 불쌍해요.\n#1;em;c\n#1;a"
11030-10 = "3;아야네;08; 아하하…… 어쩐지 늦었지만 다시 인사드릴게요, 선생님.\n#3;em;[땀]\n#3;a"
11030-11 = "5;세리카;01\n1;노노미;00\n3;아야네;01;저희가 바로 아비도스 대책위원회입니다. \n#3;greeting\n#5;h\n#1;h"
11030-12 = "5;세리카;01\n1;노노미;00\n3;아야네;00;저는 위원회의 서기와 오퍼레이트를 맡고있는 1학년 아야네…….\n#1;d\n#5;d"
11030-13 = "#1;hide\n#5;hide\n3;아야네;03;마찬가지로 1학년 세리카이고,\n#3;m2"
11030-14 = "1;세리카;12;안녕.\n#1;ar\n#3;m3\n#1;em;[재잘]"
11030-15 = "3;아야네;13;2학년 노노미 선배, 시로코 선배.\n#3;m4"
11030-16 = "5;노노미;00;안녕하세요, 선생님~\n#5;al\n#5;em;[하트]\n#3;m2\n#1;dl"
11030-17 = "5;노노미;00\n#1;hide\n4;시로코;03;내가 제일 먼저 만났었지. \n#4;al"
11030-18 = "5;노노미;00\n4;시로코;04;……아니. 특별함을 과시하려는 의도는 아니지만.\n#4;em;[///]"
11030-19 = "3;아야네;03;그리고 위원회 부장이자\n#4;dr\n#5;dr\n#3;m3"

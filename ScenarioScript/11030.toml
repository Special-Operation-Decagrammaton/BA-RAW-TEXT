[translation]
11030-1 = "ตอนที่ 3;พลังแห่งความเป็นผู้ใหญ่!"
11030-2 = "ห้องคณะกรรมการแผนงานอะบิดอส"
11030-3 = "คิดไม่ถึงเลยว่าจะเอาชนะได้ พวกแก๊งหมวกกันน็อกวางแผนได้น่าทึ่งจริงๆ เลย"
11030-4 = "\"คิดไม่ถึงเลยว่าจะเอาชนะได้\" งั้นเหรอคะ? พูดแบบนี้ได้ยังไงคะรุ่นพี่โฮชิโนะ ถ้าเราไม่ชนะ โรงเรียน#nของเราก็กลายเป็นแหล่งซ่องสุมของพวกนักเลงไปนะคะ"
11030-5 = "ที่ชนะได้เพราะได้มีคุณครูคอยช่วยสั่งการนะ มันไม่เหมือนกับที่เราออกไปสู้กันเองหรอก"
11030-6 = "นี่สินะพลังของผู้ใหญ่... นอกจากมาช่วยเรื่องเสบียงและอุปกรณ์แล้ว ยังช่วยสนับสนุนการต่อสู้ด้วย#nการเป็นผู้ใหญ่นี่เยี่ยมจริงๆ"
11030-7 = "ที่ผ่านมาชิโรโกะจังคงเหงามากเลยสิน้า~ ตอนนี้ปะป๋าที่หนีออกจากบ้านไปก็กลับมาแล้ว งั้นหม่าม้าคงไปนอนสบายได้แล้วละนะ"
11030-8 = "อย่าพูดล้อเล่นเรื่องคุณครูแปลกๆ แบบนั้นสิ! แบบนี้ก็น่าสงสารแย่แล้ว! อีกอย่าง หัวหน้าก็ชอบหนีไป#nนอนสบายๆ อยู่ตลอดแล้วไม่ใช่รึไง!"
11030-9 = "น่าสงสารจังเลยค่ะ"
11030-10 = "แหะๆ ฉันขอแนะนำตัวอีกครั้งนะคะคุณครู"
11030-11 = "พวกเราคือคณะกรรมการแผนงานของอะบิดอสค่ะ"
11030-12 = "ฉันอายาเนะ อยู่ชั้นปีที่ 1 เป็นเลขาของคณะกรรมการ และรับผิดชอบเรื่องการจัดการต่างๆ"
11030-13 = "ส่วนนี่คือเซริกะ อยู่ชั้นปีที่ 1 เหมือนกัน"
11030-14 = "หวัดดี"
11030-15 = "แล้วก็มีรุ่นพี่โนโนมิกับรุ่นพี่ชิโรโกะ อยู่ชั้นปีที่ 2 ค่ะ"
11030-16 = "สวัสดีค่ะคุณครู~"
11030-17 = "เราเจอกันก่อนแล้วล่ะ"
11030-18 = "เปล่า... ฉันไม่ได้จะอวดอะไรหรอกนะ"
11030-19 = "ส่วนทางนี้คือหัวหน้าของเรา"
11030-20 = "รุ่นพี่โฮชิโนะ ชั้นปีที่ 3 ค่ะ"
11030-21 = "อ่า~ ดีใจที่ได้เจอนะครู"
11030-22 = "อย่างที่คุณครูเห็นแหละค่ะ ตอนนี้โรงเรียนของเราตกอยู่ในสถานการณ์วิกฤต... เราเลยขอความช่วย#nเหลือไปยัง <ชาเล่ต์> และคุณครูก็มาช่วยพวกเราได้ทันเวลาพอดีเลยค่ะ"
11030-23 = "ถ้าไม่มีคุณครูมาช่วย พวกนักเลงก็คงยึดโรงเรียนของเราไปแล้ว ฉันไม่รู้เลยว่าจะขอบคุณคุณครูยังไงดี..."
11030-24 = "[s] ถามว่าคณะกรรมการแผนงานคืออะไร"
11030-25 = "ฉันจะอธิบายให้ฟังค่ะ คณะกรรมการแผนงานคือชมรมที่ก่อตั้งขึ้นมาเพื่อฟื้นฟูโรงเรียนอะบิดอส"
11030-26 = "ใช่แล้วค่ะ! นี่เป็นชมรมเดียวในโรงเรียนที่มีนักเรียนทั้งโรงเรียนมารวมตัวกันค่ะ!! ถึงจะบอกว่านักเรียน#nทั้งโรงเรียนก็เถอะ.. พวกเรามีกันแค่ 5 คนนี่แหละค่ะ"
11030-27 = "นักเรียนคนอื่นต่างก็ย้ายโรงเรียนไป หรือไม่ก็ถอดใจจนลาออกจากโรงเรียนไปแล้วค่ะ"
11030-28 = "พอโรงเรียนกลายเป็นแบบนี้ ชาวเมืองที่อยู่ในเขตนี้ก็เลยออกจากที่นี่ไปเกือบหมด แล้วโรงเรียนของ#nเราก็ถูกโจมตีจากนักเลง 3 กลุ่ม รวมถึงพวกแก๊งหมวกกันน็อกคาตะคาตะนั่นด้วย"
11030-29 = "ตอนนี้ลำพังแค่พวกเราคงจะปกป้องโรงเรียนเอาไว้ได้ยาก พวกเราเป็นนักเรียนของที่นี่แท้ๆ แต่ดัน#nกลายเป็นแบบนี้ซะได้ น่าขายหน้าจริงๆ..."
11030-30 = "ถ้าเราไม่ได้รับความช่วยเหลือจาก <ชาเล่ต์> ในครั้งนี้ ก็คงจะเกิดเรื่องใหญ่ไปแล้วค่ะ"
11030-31 = "ใช่ ฉันก็นึกว่าเราจะจบเห่เพราะไม่มีเสบียงเหลืออยู่แล้ว แต่ครูก็มาที่นี่ได้ทันเวลาพอดี"
11030-32 = "ใช่แล้ว! ตอนนี้เราไม่ต้องระวังพวกแก๊งหมวกกันน็อกแล้วล่ะค่ะ พลังแห่งความเป็นผู้ใหญ่ช่วยเราไว้ได้แล้ว ☆"
11030-33 = "แต่ฉันว่าเจ้าพวกนั้นจะต้องกลับมาโจมตีอีกแน่"
11030-34 = "เฮ้อ ก็น่าจะเป็นอย่างนั้น พวกนี้ไม่รู้จักการวางมือหรอก..."
11030-35 = "เราจะต้องต่อสู้ยืดเยื้อแบบนี้ไปถึงเมื่อไหร่กันนะ... เรามีเรื่องอะไรที่ต้องทำอีกตั้งเยอะ ไม่ใช่แค่สู้กับ#nแก๊งหมวกกันน็อกนี่สักหน่อย..."
11030-38 = "นั่นก็จริง แต่ฉันมีแผนดีๆ แล้วละ"
11030-39 = "อะไรเหรอ?! รุ่นพี่โฮชิโนะเนี่ยนะมีแผนดีๆ?!"
11030-40 = "โกหกน่า...?!"
11030-41 = "ดูแต่ละคนทำเข้าสิ แบบนี้ฉันก็น้อยใจเป็นเหมือนกันนะ เอาเถอะ ถึงจะไม่ค่อยอยากทำเท่าไร แต่ถ้า#nจำเป็นฉันก็ทำหน้าที่ของฉันได้เหมือนกันนะ"
11030-42 = "งั้นแผนที่ว่าคืออะไรล่ะ?"
11030-43 = "ในเมื่อมันเกิดขึ้นมาบ่อยๆ แล้ว เราก็คาดการณ์ได้ว่าเจ้าพวกแก๊งหมวกกันน็อกจะต้องกลับมาบุก#nโจมตีพวกเราอีกแน่"
11030-45 = "เพราะงั้นเราต้องอาศัยจังหวะนี้ ชิงลงมือบุกไปทำลายฐานของเจ้าพวกนั้นก่อน และตอนนี้ก็เป็นเวลา#nที่เหมาะที่สุด เพราะพวกนั้นกำลังอ่อนล้าจากการต่อสู้ครั้งล่าสุด"
11030-46 = "ตะ.. ตอนนี้เลยเหรอคะ?"
11030-47 = "ใช่ อีกอย่างครูก็อยู่กับเราที่นี่ เพราะงั้นก็คงไม่ต้องกังวลปัญหาเรื่องเสบียงแล้ว"
11030-48 = "จริงด้วย ฐานของพวกแก๊งหมวกกันน็อกอยู่ห่างออกไปไม่เกิน 30 กม. ถ้าเราออกไปตอนนี้เลยก็คงจะ#nมีเวลาเหลือเฟือ"
11030-49 = "ฉันว่าเป็นความคิดที่ดีค่ะ! พวกนั้นคิดไม่ถึงหรอกว่าพวกเราจะลุกมาทำอะไรอย่างแน่วแน่ในตอนนี้"
11030-50 = "มันก็จริงอยู่หรอกนะ.. แต่ว่า... คุณครูคิดอย่างไรเหรอคะ?"
11030-51 = "[s] เห็นด้วย"
11030-54 = "ดีเลย คุณครูก็เห็นด้วยกับพวกเราแบบนี้ เราต้องใส่ให้สุดกำลังแล้ว"
11030-55 = "ตีเหล็กต้องตีตอนร้อนๆ สินะ"
11030-56 = "ได้ค่ะ! งั้นออกเดินทางกันเลย!"
11030-58 = "เข้ามาในเขตที่ว่ากันว่าเป็นกองบัญชาการของแก๊งหมวกกันน็อกคาตะคาตะแล้วค่ะ"
11030-59 = "ตอนนี้จับสัญญาณของแก๊งหมวกกันน็อกคาตะคาตะได้ในรัศมี 15 กม."
11030-60 = "ศัตรูน่าจะรู้แล้วค่ะว่าพวกเราเข้ามาที่นี่ ถึงเวลาโชว์ความสามารถของพวกเรากันแล้วค่ะ!"

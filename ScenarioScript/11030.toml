[translation]
11030-1 = "第3話;大人的力量，不是蓋的！"
11030-2 = "對策委員會．教室"
11030-3 = "哎呀～居然贏了呢。#n頭盔團似乎也是有備而來的說。"
11030-4 = "現在不是說「居然贏了呢」的時候吧，星野前輩…… #n不贏的話學校不就要成為不良分子們的基地了嗎……"
11030-5 = "老師的指揮真厲害。#n和我們自己戰鬥的時候完全不同。"
11030-6 = "這就是大人的力量…… #n大量的資源和裝備，還有戰鬥的指揮。大人真厲害。"
11030-7 = "一直以來都很孤單呢，白子醬。 #n多虧爸爸回來，媽媽終於能盡情睡覺覺了。"
11030-8 = "不對不對，不要開奇怪的玩笑！老師這不是很困擾嗎！#n而且委員長本來就每天都在睡吧！"
11030-9 = "對呀對呀，看起來一臉無辜唷。"
11030-10 = "啊哈哈……雖然遲了一些，在此再次向您問好，老師。"
11030-11 = "我們是阿拜多斯對策委員會。 "
11030-12 = "我是1年級的綾音，擔任委員會的書記及報務員……"
11030-13 = "這位是同樣1年級的茜香。"
11030-14 = "你好。"
11030-15 = "2年級的野乃美前輩和白子前輩。"
11030-16 = "請多指教，老師～"
11030-17 = "剛才在路邊最先見到的就是我。"
11030-18 = "……啊，我沒有特別想炫耀的意思。"
11030-19 = "接著這位是委員長──"
11030-20 = "3年級的星野前輩。"
11030-21 = "哎呀～請多指教囉，老師～"
11030-22 = "如您所見，我們學校正面臨危機……所以才會向「夏萊」請求支援。#n多虧老師來到這裡，我們才得以度過危機。"
11030-23 = "如果老師不在，學校可能就要被剛才那些人搶走了。#n真是感激不盡……"
11030-24 = "[s] 問「對策委員會」是什麼"
11030-25 = "我來向您說明。#n對策委員會……是有志之士為了讓阿拜多斯復甦而成立的社團。"
11030-26 = "嗯嗯！這是由全校學生組成的、校內唯一的社團！#n雖然說是全校學生，其實也只有我們5個人而已就是了。"
11030-27 = "其他學生不是轉學，就是主動退學離開城鎮了。"
11030-28 = "因為學校變成這樣，學園都市的市民們也幾乎都離開了。#n所以淪落到連硬梆梆頭盔團這種三流不良分子都敢襲擊學校的地步。"
11030-29 = "以現狀來看，只靠我們連要守住學校都很困難。#n身為在校生實在太慚愧了……"
11030-30 = "如果沒有來自「夏萊」的支援……這次恐怕真的萬事休矣了。"
11030-31 = "就是啊～補給已經見底，甚至都做好覺悟了呢。#n出現的時機真不錯呢，老師。"
11030-32 = "嗯嗯！頭盔團什麼的已經難不倒我們了。大人的力量果然厲害☆ "
11030-33 = "說是這麼說，但那些傢伙想必不會停止攻擊。"
11030-34 = "啊啊，那倒也是。#n真是群煩人的傢伙。"
11030-35 = "這種消耗戰究竟得持續到什麼時候呢……#n明明除了頭盔團之外，還有很多問題需要解決的說……"
11030-38 = "關於這點，大叔我想了一個小小的計畫～"
11030-39 = "什麼！？星野前輩有計畫！？"
11030-40 = "騙人的吧……！？"
11030-41 = "哎呀～那種反應，就算是我也有點受傷呢～#n大叔我偶爾也是會認真的呀～"
11030-42 = "……所以，是什麼樣的計畫？"
11030-43 = "頭盔團應該沒過幾天又會再來攻擊才對。#n這陣子一直都是這種模式～"
11030-45 = "所以要不要趁這個時機，攻擊那些傢伙的前哨基地呢～#n畢竟現在正是他們消耗最嚴重的時候呀～"
11030-46 = "現，現在嗎？"
11030-47 = "沒錯。現在老師也在，這樣補給或其他麻煩事也可以解決。"
11030-48 = "原來如此。頭盔團的前哨基地在距離這裡大約30km的地方，現在就出發吧。"
11030-49 = "這個主意不錯。#n對方肯定作夢也想不到會立刻遭到反擊吧。"
11030-50 = "雖，雖然是那樣沒錯……老師覺得如何？"
11030-51 = "[s] 同意"
11030-54 = "好，既然老師也贊成，那咱們就一鼓作氣地衝吧。"
11030-55 = "打鐵要趁熱，對吧。"
11030-56 = "是～那就出發吧！"
11030-58 = "已進入硬梆梆頭盔團據點所在的區域。"
11030-59 = "半徑15km內偵測到大量敵人的訊號。"
11030-60 = "敵人應該也已經發現我們來了才對。#n接下來就靠實力說話了！"

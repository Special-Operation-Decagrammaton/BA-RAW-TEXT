11030-45 = "#1;hide\n#5;hide\n3;호시노;01;이런 타이밍에 헬멧단 녀석들의 전초기지를 습격해서 부숴버리는 거야. #n병력이 제일 취약한 타이밍이 막 후퇴한 바로 지금이거든.\n#3;closeup\n#3;a\n#3;em;[반응]"

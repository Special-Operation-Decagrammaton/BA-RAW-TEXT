[translation]
2003705-1 = "警察故事─失樂園篇"
2003705-2 = "（決定前往吹雪的樂園……）"
2003705-7 = "（發現他正在躺床上哼著歌）"
2003705-9 = "[ns1]「吹雪。」\n[ns2]「抓到！有人怠忽職守！」"
2003705-15 = "嚇我一跳。"
2003705-17 = "嚇我一跳！"
2003705-18 = "什麼嘛，原來是老師啊。#n害我以為被發現了。"
2003705-19 = "[s]「所以這裡就是吹雪說的樂園嗎？」"
2003705-20 = "嗯，沒錯。"
2003705-21 = "這裡是位於水上樂園角落的兒童泳池。"
2003705-22 = "因為小孩子都跑去室內的兒童泳池，而大人又不會來這裡。"
2003705-23 = "所以不需要認真盯著，只要悠閒地待在位置上就行了。"
2003705-24 = "一旦被指定為這裡的救生員，就跟休息整天再下班沒兩樣！"
2003705-25 = "而且最大的好處是……"
2003705-26 = "（滋滋……滋滋滋……）"
2003705-27 = "因為距離本部很遠的關係，沒辦法收到無線電。"
2003705-28 = "[s]「那能算是好處嗎……？」"
2003705-29 = "當然算囉！"
2003705-30 = "樂園負責人經常會呼叫無所事事的救生員去工作。"
2003705-31 = "但是待在這裡的話，#n只要說因為無線電有問題沒聽到就行了，不必擔心被叫去工作。"
2003705-32 = "[s3]「那樣真的好嗎？」\n[s4]「萬一有急事的話怎麼辦？」"
2003705-35 = "沒關係沒關係。#n真的有急事的時候，本部會另外用手機聯絡的。"
2003705-36 = "在那之前就悠閒地享受這個樂園吧。"
2003705-37 = "來，這裡也有為老師準備的躺床哦。"
2003705-38 = "[s5]「可是躺在大太陽底下好熱，我不要……」\n[s6]「沒有能遮陽的東西嗎？」"
2003705-41 = "呃……可惜遮陽傘正好壞了，所以只能曬太陽。"
2003705-42 = "當然，在盛夏的大太陽底下待命並不容易……"
2003705-43 = "但是還有哪裡能像這樣悠閒地休息呢？"
2003705-44 = "如果覺得太熱的話，這裡的保冷箱裡還有飲料。"
2003705-48 = "來，這裡有冰涼的飲料……"
2003705-49 = "咦！？"
2003705-50 = "是誰把箱子打開的啊！可樂都變熱了！"
2003705-54 = "不，不過就算是這樣！能悠閒地休息也已經不錯了。"
2003705-55 = "[s] 「……」"
2003705-56 = "為什麼要露出那種表情？"
2003705-57 = "沒人監視又閒閒沒事的地方，不就跟天堂沒兩樣嗎？"
2003705-58 = "來，你看！"
2003705-59 = "像這樣在躺床上睡個午覺，這才是……"
2003705-64 = "好燙！"
2003705-65 = "怎麼才沒說幾句話，躺床就被太陽曬得這麼燙……"
2003705-66 = "[s] 「……」"
2003705-73 = "真的……根本就是天堂……！"
2003705-74 = "[ns7] （硬要躺下來喝熱熱的可樂……）\n[ns8] （看起來就很不舒服……）"
2003705-77 = "不工作……就是開心……幸福……"
2003705-78 = "老，老師也這麼覺得吧……？"
2003705-79 = "[s]「說不定還是老實做事比較好。」"
2003705-80 = "哪會！我現在超舒服的哦？超開心的哦？"
2003705-81 = "如果覺得我看起來不舒服，那肯定是老師誤會了！"
2003705-82 = "等著瞧！我可以就這樣偷懶好幾個小時！"
2003705-84 = "（於是就這麼過了大約兩個小時……）"
2003705-88 = "唔唔……"
2003705-89 = "老實說，我現在確實是稍～微覺得有點難受……"
2003705-90 = "不過我不用像其他人一樣工作，這不是很划得來嗎？"
2003705-91 = "這裡就是樂園沒錯。"
2003705-92 = "（滋滋……滋滋滋滋……）"
2003705-93 = "[s]「是不是有人在聯絡你？」"
2003705-94 = "從剛才就這樣了，不用管它沒關係。#n反正八成是想叫沒事做的人去工作吧。"
2003705-95 = "我們繼續在這裡享受天堂就行了……"
2003705-96 = "（嗶嗶）"
2003705-97 = "咦？"
2003705-98 = "居然會用手機聯絡？#n我看看……"
2003705-103 = "「請到本部的休息室」……？"
2003705-104 = "[s]「如果是急事，是不是該過去看看？」"
2003705-105 = "唔嗯，沒用無線電而是用手機聯絡，說不定確實是大事。"
2003705-106 = "還是過去看看比較好。"
2003705-107 = "我，我話先說在前頭，絕對不是因為想離開這裡才去的哦？"
2003705-111 = "水上樂園救生員休息室"
2003705-113 = "打擾了～"
2003705-114 = "哇，空調開得好強……感覺整個人都活過來了……"
2003705-115 = "啊，你終於來啦？"
2003705-116 = "我剛才就一直用無線電叫你，為什麼這麼晚才來呢？"
2003705-117 = "因為我的樂園……不對，是因為工作地點離本部很遠，所以無線電的狀態不太好。"
2003705-118 = "這段時間我沒有分心，一直都在努力工作。"
2003705-119 = "所以雖然聯絡不到我，但我有在認真執行救生員的任務！"
2003705-120 = "哎呀，原來是這樣啊！"
2003705-121 = "早知道就早點用手機聯絡你了！"
2003705-122 = "沒想到你連休息時間都在工作！"
2003705-123 = "沒什麼，我只是做我該做的事而──"
2003705-127 = "嗯？"
2003705-128 = "其實從一小時前就是休息時間了。"
2003705-129 = "我買了甜甜圈來慰勞大家……所以才發現少了一個人……"
2003705-130 = "甜甜圈！？"
2003705-131 = "真不好意思，現在已經一個都不剩了。"
2003705-132 = "不過冰涼的飲料……哎呀，竟然也剛好沒了。"
2003705-133 = "怎，怎麼會……"
2003705-134 = "雖然沒趕上休息時間，但你很認真地為樂園工作對吧？"
2003705-135 = "各位救生員！請給休息時間也在認真工作的吹雪同學，一個鼓勵與感謝的掌聲！"
2003705-140 = "這才是認真救生員的典範！合歡垣吹雪同學！"
2003705-141 = "呃……那，那個……我沒有那個意思……"
2003705-145 = "嗚嗚……"
2003705-146 = "我到底是為了什麼才……"

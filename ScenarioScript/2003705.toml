[translation]
2003705-1 = "เรื่องราวของตำรวจ - ตอนลอสต์ พาราไดซ์"
2003705-2 = "(คุณครูตัดสินใจออกไปหาฟุบุกิที่พาราไดซ์ของเธอ)"
2003705-7 = "(เมื่อไปถึง ก็เห็นฟุบุกิที่กำลังนอนฮัมเพลงอยู่บนเตียงอาบแดด)"
2003705-9 = "[ns1] \"ฟุบุกิ\"\n[ns2] \"เจอตัวคนอู้งานแล้ว!\""
2003705-15 = "ตกใจหมดเลย"
2003705-17 = "ตกใจหมดเลย!"
2003705-18 = "อะไรเนี่ย ครูหรอกเหรอ นึกว่าโดนสวนน้ำจับได้จริงๆ แล้วซะอีก"
2003705-19 = "[s] \"ที่นี่คือพาราไดซ์ที่ฟุบุกิพูดถึงเหรอ?\""
2003705-20 = "อื้ม ใช่แล้ว"
2003705-21 = "สระเด็กที่อยู่ในซอกหลืบของสวนน้ำ"
2003705-22 = "พวกเด็กๆ ก็ไปเล่นสระเด็กในร่มกันหมด ส่วนผู้ใหญ่ก็ไม่มีทางมาที่นี่อยู่แล้ว"
2003705-23 = "ก็เลยไม่ต้องจับตาดูใครมาก แค่นอนเฝ้าอยู่กับที่อย่างชิลๆ ก็พอแล้ว"
2003705-24 = "ถ้าได้เป็นไลฟ์การ์ดที่สระตรงนี้ วันนั้นก็แค่พักผ่อนให้เต็มที่แล้วก็เลิกงาน!"
2003705-25 = "แถมส่วนที่ดีที่สุดก็คือ..."
2003705-26 = "(ซ่า... ซ่า...)"
2003705-27 = "ตรงนี้ไกลจากส่วนกลาง สัญญาณก็เลยขาดๆ หายๆ"
2003705-28 = "[s] \"นั่นถือเป็นข้อดีเหรอ...?\""
2003705-29 = "ก็แน่นอนน่ะสิ!"
2003705-30 = "บ่อยออกที่เจ้าหน้าที่สวนน้ำจะเรียกตัวไลฟ์การ์ดที่ไม่มีงานทำไปช่วยงานอื่น"
2003705-31 = "ถ้าอยู่ตรงนี้ฉันสามารถอ้างได้ว่าไม่ได้ยินวิทยุเรียกตัว งั้นก็ไม่ต้องกังวลว่าจะโดนลากไปทำงานน่ะ!"
2003705-32 = "[s3] \"ทำอย่างนี้ได้จริงเหรอ?\"\n[s4] \"ถ้าเกิดเรื่องด่วนขึ้นมาจะทำยังไง?\""
2003705-35 = "ไม่เป็นไรหรอก ถ้ามีเรื่องด่วนจริงๆ ก็คงติดต่อเข้ามาทางมือถือเองแหละ"
2003705-36 = "ถ้ามือถือไม่ดัง ก็ผ่อนคลายในพาราไดซ์อย่างสบายใจเฉิบได้"
2003705-37 = "เอ้านี่ ฉันมีเตียงอาบแดดไว้ให้ครูด้วย"
2003705-38 = "[s5] \"แต่ครูไม่อยากนอนตากแดดนะ...\"\n[s6] \"ไม่มีตรงไหนแดดร่มๆ บ้างเลยเหรอ?\""
2003705-41 = "เฮ้อ... น่าเสียดายที่ร่มกันแดดพัง ก็เลยต้องตากแดดแบบนี้ละ"
2003705-42 = "ถึงการสแตนด์บายกลางแดดในฤดูร้อนจะไม่ใช่งานง่ายๆ ก็เถอะ..."
2003705-43 = "แต่งานที่ได้พักอย่างสบายใจแบบนี้ก็ดีถมเถแล้ว"
2003705-44 = "ถ้าทนร้อนไม่ได้ ในกล่องแช่เย็นนี่มีเครื่องดื่มอยู่นะ"
2003705-48 = "เอานี่ รับเครื่องดื่มเย็นๆ ไป..."
2003705-49 = "อะไรกันน่ะ!"
2003705-50 = "ใครเปิดกล่องทิ้งไว้! โคล่าเย็นๆ กลายเป็นโคล่าอุ่นหมดแล้ว!"
2003705-54 = "ตะ... แต่ก็เอาเถอะ! ได้พักอย่างสบายใจแบบนี้ก็ดีถมเถแล้ว"
2003705-55 = "[s] \"...\""
2003705-56 = "ทำไมทำหน้าแบบนั้นล่ะ?"
2003705-57 = "ฉันไม่ต้องเฝ้าระวัง แล้วก็ไม่มีงานอื่นให้ทำด้วย จะหาสวรรค์แบบนี้ได้จากไหนอีก?"
2003705-58 = "ไม่เชื่อก็ดูสิ!"
2003705-59 = "แค่ได้นอนกลางวันบนเตียงอาบแดดแบบนี้ก็..."
2003705-64 = "โอ๊ย ร้อนนน!"
2003705-65 = "เผลอแป๊บเดียวโดนแดดเผาซะแล้ว..."
2003705-66 = "[s] \"...\""
2003705-73 = "ตะ... แต่ก็หาสวรรค์แบบนี้ไม่ได้แล้วละ...!"
2003705-74 = "[ns7] (ฝืนเอนตัวลงนอนแล้วดื่มโคล่าอยู่สินะ...)\n[ns8] (ดูไม่น่าจะสบายตัวนะ...)"
2003705-77 = "พอไม่มีงานทำ... ก็ทั้งสนุก... และมีความสุข..."
2003705-78 = "คะ... คุณครูก็คิดเหมือนกันใช่มั้ย?"
2003705-79 = "[s] \"การขยันทำงานอาจจะดีกว่าตอนนี้ก็ได้นะ\""
2003705-80 = "จะบ้าเหรอ! ตอนนี้ฉันสบายสุดๆ เลยต่างหาก แล้วก็สนุกสุดๆ ไปเลยด้วย!"
2003705-81 = "ถ้าคิดว่าฉันไม่สบายตัวละก็ ครูคิดไปเองแน่ๆ!"
2003705-82 = "ไม่เชื่อก็คอยดูเลยว่าวันนี้ฉันจะอู้งานได้กี่ชั่วโมง!"
2003705-84 = "(ราวๆ 2 ชั่วโมงต่อมา...)"
2003705-88 = "โอยย..."
2003705-89 = "ถ้าให้บอกตรงๆ... ตอนนี้ฉัน... เหมือนจะลำบากขึ้นมานิดหน่อยแล้วละ..."
2003705-90 = "แต่ยังไงก็ไม่ได้ทำงานเหมือนคนอื่นอยู่ แค่นี้ก็ถือว่ากำไรแล้วหรือเปล่า?"
2003705-91 = "ใช่แล้วละ ที่นี่ละพาราไดซ์ของฉัน!"
2003705-92 = "(ซ่า... ซ่าา...)"
2003705-93 = "[s] \"ทางสวนน้ำติดต่อมาหรือเปล่า?\""
2003705-94 = "มันดังมาตั้งแต่เมื่อกี้แล้วละ ปล่อยไปเถอะ คงเรียกตัวคนที่ไม่มีงานไปสั่งงานน่ะ"
2003705-95 = "เราเพลิดเพลินกับสรวงสวรรค์ตรงนี้กันต่อเถอะ..."
2003705-96 = "(ติ๊ง~)"
2003705-97 = "เอ๋?"
2003705-98 = "ติดต่อมาทางมือถือแฮะ ไหนดูซิ..."
2003705-103 = "'กรุณามาที่ห้องพักผ่อนของส่วนกลาง'"
2003705-104 = "[s] \"ถ้าเป็นเรื่องด่วนก็ควรจะไปนะ?\""
2003705-105 = "อืม ถ้าติดต่อมาทางมือถือแทนวิทยุ ก็อาจจะมีเรื่องใหญ่อะไรเกิดขึ้นก็ได้"
2003705-106 = "สงสัยต้องไปแล้วละ"
2003705-107 = "ขะ... ขอบอกไว้ก่อนเลยนะ ที่ฉันไปไม่ใช่เพราะอยากออกจากตรงนี้หรอกนะ"
2003705-111 = "ห้องพักผ่อนไลฟ์การ์ดสวนน้ำ"
2003705-113 = "ขอเข้าไปหน่อยนะ~"
2003705-114 = "ว้าว แอร์เย็นเฉียบเลย... แบบนี้ก็ค่อยยังชั่วหน่อยนะเนี่ย~"
2003705-115 = "อ๊ะ มาแล้วเหรอครับ?"
2003705-116 = "เราวิทยุไปหาตั้งนานแล้ว ทำไมเพิ่งมาเอาป่านนี้ครับ?"
2003705-117 = "ก็พาราไดซ์... ไม่สิ จุดที่ฉันประจำการอยู่มันไกลจากที่นี่น่ะสิ สัญญาณวิทยุก็เลยไม่ค่อยดีน่ะ"
2003705-118 = "แต่ฉันก็ตั้งใจทำงานตลอดนะ ไม่คิดอู้เลยด้วย"
2003705-119 = "ต่อให้ไม่ติดต่อไป ฉันก็ทำหน้าที่ไลฟ์การ์ดอยู่อย่างขยันขันแข็งนะ!"
2003705-120 = "โอ้โฮ งั้นเหรอครับ!"
2003705-121 = "ถ้ารู้ล่วงหน้า ผมคงติดต่อไปทางโทรศัพท์มือถือตั้งแต่แรกแล้วครับ!"
2003705-122 = "ไม่คิดเลยว่าจะทำงานในเวลาพักด้วย!"
2003705-123 = "ก็... ฉันแค่ทำในสิ่งที่ต้องทำ..."
2003705-127 = "หืม เมื่อกี้ว่าอะไรนะ เวลาพักงั้นเหรอ?"
2003705-128 = "ที่จริงเป็นเวลาพักของไลฟ์การ์ดตั้งแต่ชั่วโมงก่อนแล้วครับ"
2003705-129 = "เราแจกจ่ายเซ็ตโดนัทให้ทุกคนที่ทำงานกันอย่างเหน็ดเหนื่อย... แต่มารู้ทีหลังว่ามีไลฟ์การ์ด#nไม่มาคนหนึ่ง..."
2003705-130 = "โดนัทเหรอ?! "
2003705-131 = "ขอโทษด้วยครับ พอดีเราแจกคนอื่นไปหมดแล้ว"
2003705-132 = "งั้นเอาเป็นเครื่องดื่มเย็นๆ... แย่ละสิ เครื่องดื่มก็หมดเหรอครับเนี่ย"
2003705-133 = "มะ... ไม่นะ..."
2003705-134 = "ถึงจะมาไม่ทันเวลาพัก แต่คุณก็ทำงานเพื่อสวนน้ำของเราอย่างขยันขันแข็ง!"
2003705-135 = "ไลฟ์การ์ดทุกคน! ขอเสียงปรบมือเป็นกำลังใจให้คุณฟุบุกิที่ทำงานแม้ในเวลาพักด้วยครับ!"
2003705-140 = "ตัวอย่างของไลฟ์การ์ดที่ทุ่มเทกับหน้าที่ คุณเนมุคากิ ฟุบุกิครับ!"
2003705-141 = "อ่า... คะ... คือว่า...ฉันไม่ได้คิดแบบนั้น..."
2003705-145 = "โธ่..."
2003705-146 = "นี่ฉันไปอยู่ในสวรรค์อย่างนั้นทำไมนะ..."

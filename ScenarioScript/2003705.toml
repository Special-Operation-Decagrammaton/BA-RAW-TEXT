[translation]
2003705-1 = "Police Story: Lost Paradise Episode"
2003705-2 = "Fubuki invited me to \"paradise.\" I accepted, not knowing what to expect..."
2003705-7 = "I found her lying on a sun bed, humming a tune."
2003705-9 = "[ns1] \"Fubuki.\"\n[ns2] \"Caught you! Slacking off again!\""
2003705-15 = "Ah, you scared me."
2003705-17 = "Ah! You scared me!"
2003705-18 = "Oh, it's you, Sensei. I thought I got caught for real."
2003705-19 = "[s] \"So is this the 'paradise' you mentioned?\""
2003705-20 = "The one and only."
2003705-21 = "The outdoor kids' pool, tucked away out here in the farthest corner of the park."
2003705-22 = "All the kids use the indoor kid's pool, and the adults never come here."
2003705-23 = "So there's nobody to watch out for. I can just relax."
2003705-24 = "When you get this assignment, your job is to chill here all day and then clock out."
2003705-25 = "And the best part?"
2003705-26 = "*static* *static*"
2003705-27 = "We're far from HQ, so the walkie talkies don't really work."
2003705-28 = "[s] \"That's the best part...?\""
2003705-29 = "Yeah, it is!"
2003705-30 = "See, the park manager tends to call lifeguards who don't have much to do, and give them extra tasks."
2003705-31 = "Out here, I can just not answer, and say I had a bad signal."
2003705-32 = "[s3] \"Is that really okay?\"\n[s4] \"What if it's something urgent?\""
2003705-35 = "It's okay. If it WAS urgent, they'd call me on my cell phone."
2003705-36 = "Until then...like I said, paradise."
2003705-37 = "Here, there's a sun bed for you too, Sensei."
2003705-38 = "[s5] \"I don't like sunbathing, though. It's too hot...\"\n[s6] \"Aren't there any shady areas?\""
2003705-41 = "Unfortunately, the umbrella's broken, so there's no getting out of the sun."
2003705-42 = "And yeah, waiting in the sun can be rough, but..."
2003705-43 = "...there's no better place to relax around here."
2003705-44 = "Also, if it does get to be too hot, I have a cooler here, full of drinks."
2003705-48 = "Why don't you have one?"
2003705-49 = "...Wait, what?!"
2003705-50 = "Who left the chest open?! The soda's all warm!"
2003705-54 = "S-Still...at least we can relax here."
2003705-55 = "[s] \"...\""
2003705-56 = "You're giving me that look."
2003705-57 = "No responsibilities, no orders. Yep, this is paradise, all right."
2003705-58 = "Now, look."
2003705-59 = "Imagine how great it'd be just to lie down and nap on a sun bed..."
2003705-64 = "Ow, that's hot!"
2003705-65 = "It must've heated up while we were talking."
2003705-66 = "[s] \"...\""
2003705-73 = "Seriously, though, this is great, isn't it?"
2003705-74 = "[ns7] \"(Forced to lie down and sip on warm cola...)\"\n[ns8] \"(So uncomfortable...)\""
2003705-77 = "Not working is, uh, it's great... Makes me so...happy, seriously..."
2003705-78 = "R-Right, Sensei?"
2003705-79 = "[s] \"I think a little hard work might be more rewarding.\""
2003705-80 = "No way! I'm super comfortable right now! This is...super-great!"
2003705-81 = "If you think there's anything wrong here, I don't know what you tell you, Sensei!"
2003705-82 = "Just watch me! I can slack off like this for hours!"
2003705-84 = "A couple of hours later..."
2003705-88 = "Ugh..."
2003705-89 = "To be honest, this is making me a little, uh, a little tired..."
2003705-90 = "But I get to lie down while everybody else is working, so that's a win, right?"
2003705-91 = "I mean, what's paradise, if not that?"
2003705-92 = "*static* *static*"
2003705-93 = "[s] \"That's probably for you.\""
2003705-94 = "Nah, it's been like that for a while now. Just ignore it. They're just looking for somebody with nothing to do."
2003705-95 = "Whereas we are completely busy relaxing..."
2003705-96 = "*ding*"
2003705-97 = "Huh?"
2003705-98 = "Oh, somebody texted me. One sec..."
2003705-103 = "Could you come to the Lifeguard Lounge, please?"
2003705-104 = "[s] \"That sounds urgent. You should probably go.\""
2003705-105 = "Hmm, yeah, they did use my phone to get a hold of me this time..."
2003705-106 = "I probably should go. You're right."
2003705-107 = "J-Just for the record, I'm not leaving this place by choice."
2003705-111 = "Water Park Lifeguard Lounge"
2003705-113 = "Hey there."
2003705-114 = "Wow, the AC is so strong... I can finally breathe..."
2003705-115 = "Oh, you finally made it."
2003705-116 = "I've been calling you on the radio. What took you so long?"
2003705-117 = "Well, my paradise, I mean my worksite... It's pretty far from here, so I couldn't get a clear signal."
2003705-118 = "But I've been on task the whole time."
2003705-119 = "Even without any instructions, I was hard at work, taking care of my lifeguard duties!"
2003705-120 = "Oh my, I didn't realize!"
2003705-121 = "If I'd known, I'd have used the phone sooner!"
2003705-122 = "I never expected you to be working during your break!"
2003705-123 = "Well, I was just doing what I was supposed to—"
2003705-127 = "Huh?"
2003705-128 = "See, I've been on break for the past hour."
2003705-129 = "I got some donuts to share, for everybody's hard work...but then I realized there was one person who hadn't gotten any."
2003705-130 = "Donuts?!"
2003705-131 = "Unfortunately, by the time I figured that out, they were all gone."
2003705-132 = "But we've got some cold drinks— No, we're out of those too."
2003705-133 = "Th-That's..."
2003705-134 = "Well, listen. Even without a break, you've been working hard for the park this whole time, right?"
2003705-135 = "Let's all give a round of applause for Fubuki, who worked through her break for all of us!"
2003705-140 = "An exemplary lifeguard in every way! Nemugaki Fubuki!"
2003705-141 = "Uh... W-Well, that's...that's not what I...meant to..."
2003705-145 = "Ugh..."
2003705-146 = "What am I even doing here...?"

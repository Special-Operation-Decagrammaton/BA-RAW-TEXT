10043060-92 = "#na;의문의 목소리;서로 교체 투수는 한 명만을 남긴 상황. 여기에서 묻겠다. 감독, 당신은 어떤 작전으로 들어갈 생각이지?"
10043060-93 = "#all;hide"
10043060-94 = "#wait;500"
10043060-95 = "3;통신 코기 감독;00;으, 으음! 그야 교체 투수를 먼저 소모하는 쪽이 명백하게 유리할 테니…….\n#3;a"
10043060-96 = "3;통신 코기 감독;00;여기에서 필요한 것은, 파울 작전이다!\n#3;em;[!]"
10043060-97 = "3;레이;04;파울 작전?!\n#3;stiff"
10043060-98 = "3;통신 코기 감독;00;그래. 안타도 필요 없으니, 최대한 파울로 공을 걷어내, 상대의 투구 수를 늘리는 작전이지.\n#3;h"
10043060-99 = "3;통신 코기 감독;00;이것으로 상대의 교체 투수를 소모하거나, 적어도 구위를 떨어뜨릴 수 있다면–"
10043060-100 = "#all;hide"
10043060-101 = "#na;의문의 목소리;그렇게 나올 줄 알고 있었지! 하지만 어림도 없는 소리는 집어치우라고 말하고 싶군!\n#fontsize;80"
10043060-102 = "#st;[0,0];instant;1;"
10043060-103 = "#clearST"
10043060-104 = "3;통신 코기 감독;00\n#3;em;[!]\n#3;h\n#wait;1000"
10043060-105 = "3;통신 코기 감독;00;어, 어째서지?\n#3;stiff"
10043060-106 = "1;레이;02;그래요! 남은 이닝은 3회. 만일 투구 수를 늘리는 데에 성공해서, 상대 팀 투수의 구위를 빠르게 떨어뜨릴 수 있다면…….\n#1;em;[반응]\n#1;ar\n#3;m5"
10043060-107 = "1;레이;17;분명, 9회 말에는 마지막 찬스를 잡을 수 있을 거라고요!"
10043060-108 = "#st;[0,0];instant;1;"

[translation]
10043060-1 = "Episode 6;The Burning Field"
10043060-3 = "Phew..."
10043060-4 = "[s] \"Shall we take a break?\""
10043060-5 = "I guess we might as well. Considering the plan, there's not much we can do before he calls again."
10043060-6 = "This is really exhausting, on so many levels."
10043060-12 = "You know, it might sound strange for me to say this."
10043060-13 = "But baseball...is kind of odd in some ways."
10043060-14 = "[s] \"How so?\""
10043060-15 = "Well, for one thing, the team with the ball plays defense."
10043060-16 = "Lots of sports use a ball. Soccer, basketball, volleyball, golf... But for all those sports, whoever has the ball is on offense."
10043060-19 = "For baseball, it's the opposite. The pitcher on the defensive team throws the ball past the batter on the offensive team."
10043060-20 = "And then the offense hits the ball to try and score. Plus there's a whole lot of luck involved."
10043060-23 = "You might get a clean hit that then goes straight to the outfielder, or you might get a lame ground ball that then skirts the foul line and gives you a lucky double."
10043060-24 = "So you can't say it's all about skill, but skill does matter, so it's not all about luck either."
10043060-25 = "And, speaking as a fan and a fellow athlete...I'd like to see SOME of that skill, OR luck, pay off eventually."
10043060-26 = "When it doesn't, I can end up sad, or disappointed, or even angry."
10043060-30 = "...It's weird, you know?"
10043060-31 = "To like something so much, and still be so harsh with it."
10043060-32 = "[s1] \"Maybe because you want to get back...\"\n[s2] \"...as much as you've put into it?\""
10043060-35 = "Well, that might be true for some people."
10043060-36 = "You're not like that, though."
10043060-37 = "[s] \"Me?\""
10043060-38 = "Well, yeah, you don't have any stake in what happens here."
10043060-39 = "Neither does Sumire. I'm a fan. It makes sense for me to be here. But you?"
10043060-40 = "You could have just ignored this whole situation and walked away. But you didn't. You never do."
10043060-41 = "And I don't think it's because you want something out of it. You've been selfless since you got here."
10043060-42 = "If there IS something you want in all this, you could say so. I'd understand."
10043060-43 = "And don't try to wriggle out of it. Don't just shrug and say, \"I just want to.\" It's not going to work."
10043060-47 = "[ns] \"Well, if I have to be honest...\""
10043060-49 = "[ns] \"It's because I like seeing you.\""
10043060-53 = "H-Huh?! Seeing us?"
10043060-54 = "[s3] \"That's right. You all have so much potential in different ways.\"\n[s4] \"Watching you make use of that potential... It's good to see.\""
10043060-58 = "[ns5] \"And in that process, if there's anything I can do...\"\n[ns6] \"...to help you get what you want, or be who you want...\""
10043060-61 = "[ns7] \"That in and of itself might be good enough.\"\n[ns8] \"That's how I feel.\""
10043060-67 = "...Did you get that from Sumire?"
10043060-68 = "[s] \"Uh, well, um...\""
10043060-69 = "Never mind. That just sounded like something she'd say."
10043060-70 = "Anyway..."
10043060-76 = "...thank you. Heehee."
10043060-77 = "...You're the first person to listen to me ramble this much and still take me seriously."
10043060-87 = "Here we are, bottom of the seventh. You listening?"
10043060-88 = "...! Y-Yes, we're listening!"
10043060-90 = "Good. Now, look at that score. 18 to 21."
10043060-91 = "You're really making them work for it, aren't you?"
10043060-92 = "The teams have one replacement pitcher each. Now let me ask you, Coach: what's your plan?"
10043060-95 = "A-Ah! Well, it'll help if we can wear out their pitcher first..."
10043060-96 = "What we need is a foul plan!"
10043060-97 = "A foul plan?"
10043060-98 = "Right. We don't need hits right now. First, we need to raise their pitch count with as many fouls as possible."
10043060-99 = "If we can wear out his throwing arm—"
10043060-101 = "I knew you'd say that! But no. That's not the plan."
10043060-105 = "Wh-Why not?"
10043060-106 = "Yeah, why not? We've still got three innings. If we spend the seventh and eighth just wearing him down..."
10043060-107 = "...then we can go all-out in the bottom of the ninth and win!"
10043060-112 = "Look at your batters' skill level and say that again!"
10043060-113 = "You can PLAN all the fouls you like, but your guys are going to strike out trying for them!"
10043060-114 = "When are you going to get it?! Common sense DOES NOT APPLY TO YOUR TEAM!"
10043060-115 = "U-Um...!"
10043060-116 = "Hey, that was harsh! You didn't have to say it like that!"
10043060-117 = "Shut up and listen! You've got to play outside the box here!"
10043060-118 = "Strike as hard as you can, and hope you can score at least one!"
10043060-119 = "A-All right, how about this, then? How about we do two bunt fouls on purpose, then go for a hit?"
10043060-120 = "THREE bunts would be an automatic out, so we couldn't go for that..."
10043060-121 = "But wouldn't it help if we used up at least three pitches per batter?"
10043060-125 = "..."
10043060-126 = "Huh. That's your first good idea."
10043060-127 = "Wow, thanks."
10043060-129 = "I accept that plan. Two bunt fouls, then a strong hit!"
10043060-130 = "We use up some of their pitches, and still go for that lucky swing."
10043060-131 = "Now remember, no one ever knows what's going to happen in the seventh and eighth. Stick to the plan, and be ready for anything!"
10043060-132 = "All right!"
10043060-135 = "Bottom of the seventh. Heroes are up, Pillagers on defense. The score's 18 to 21."
10043060-136 = "It's a high-scoring game for sure, but the Heroes are always at their strongest when they're just a bit behind."
10043060-137 = "If only they could ever catch up."
10043060-138 = "Let's see if they can pull it off this time. What strategy are they going to go with?"
10043060-144 = "Huh. A safe, intentional bunt. Bunt base hits aren't easy, and that batter isn't the fastest."
10043060-145 = "They must be trying to drive up the pitch count."
10043060-150 = "And here's that first pitch!"
10043060-151 = "Go low, cross the foul line. Go low..."
10043060-152 = "Please... Please...!"
10043060-166 = "Sweet holy saucers! I can't believe my eyes! A bunt fly straight to the pitcher! It's a first pitch out!"
10043060-167 = "Well, that was...creative."
10043060-168 = "Should've just gone for honest swings from the start, if THAT'S what was going to happen..."
10043060-171 = "..."
10043060-172 = "..."
10043060-173 = "How... How did...?"
10043060-178 = "Now, don't you dare object to me again! Understand? Just do as I say! Do EXACTLY as I say!!"
10043060-182 = "S-Sensei, this is bad..."
10043060-183 = "[s] \"Bad how, specifically?\""
10043060-184 = "If that keeps happening, we could get two more first pitch outs. This inning could be over in two more pitches!"
10043060-185 = "Then the culprit will hang up, and we won't be able to track them anymore!"
10043060-186 = "[s] \"That IS bad.\""
10043060-191 = "[ns] \"...Hang on. New plan.\""
10043060-195 = "What new plan? What do you mean?"
10043060-196 = "Hm? Make the batters use time outs to break the pitcher's rhythm?"
10043060-197 = "A \"time out\" plan..."
10043060-198 = "..."
10043060-199 = "That does seem safe. Batting and pitching are both about disrupting the other person's timing..."
10043060-200 = "Fine. We'll try it."
10043060-204 = "Nice work, Sensei. That'll keep them on the line."
10043060-209 = "Another time out request! Why so many, at the bottom of the seventh, of all times?"
10043060-214 = "...Sweet jolly! The umpire just ejected that batter!"
10043060-215 = "He must have judged the batter was purposely stalling the game. Well, the umpire's within his rights to make that call. The Heroes will have to send in a replacement."
10043060-216 = "Ugh...!"
10043060-221 = "I will never listen to another word out of your sorry mouth again."
10043060-222 = "If you even OPEN your mouth, I will end EVERYTHING that instant!"
10043060-227 = "Sensei! I think I've located the culprit!"
10043060-233 = "Trainer, Rei, can you hear me? I think I know where they are!"
10043060-234 = "[s] \"Really? Where?!\""
10043060-235 = "The seats behind the catcher..."
10043060-236 = "[s] \"Huh? That's...!\""
10043060-237 = "That's right, Trainer."
10043060-238 = "It's the place Hanae said the other part-timers disappeared to."
10043060-239 = "Those are also the most expensive seats, because they have the best view."
10043060-241 = "That does sound like a place you'd go to do something like this."
10043060-242 = "All right, Sensei, once the call ends, let's tell the coach and the other Heroes!"
10043060-244 = "On a side note, the Heroes replacement batter, and the next batter after him..."
10043060-245 = "...met expectations, in that they each lasted only one pitch."

10043060-129 = "#na;의문의 목소리;그 의견을 받아들이기로 하지. 좋다. 고의 2번트 파울 후 강공 작전이다!"
10043060-130 = "#na;의문의 목소리;상대의 투구 수를 어느 정도 소모하면서도, 만에 하나 모를 행운을 노리는 작전……."

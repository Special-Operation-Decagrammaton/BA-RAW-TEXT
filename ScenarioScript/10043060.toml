10043060-111 = "#all;hide"
10043060-112 = "#na;의문의 목소리;너희들 타자 수준을 보고 그런 말을 해라!!!\n#fontsize;80"
10043060-113 = "#na;의문의 목소리;뭐가 파울 작전이냐! 너희들 수준으로는 파울을 치려다 오히려 삼진아웃을 당하기 십상일 거라고!"
10043060-114 = "#na;의문의 목소리;너희들은 더 이상 일반적인 상식이 통하지 않는 팀이라는 사실을, 이제 슬슬 좀 깨달으란 말이다!!!"
10043060-115 = "3;통신 코기 감독;00;으, 으음……!\n#3;stiff"
10043060-116 = "3;레이;17;거 진짜 말이 심하네요! 그렇게까지 말할 건 없잖아요!\n#3;em;[반응]"
10043060-117 = "3;레이;17\n#na;의문의 목소리;알겠냐! 여기에서는 반대로 가야 한다! 모험하지 않으면 성과도 낼 수 없어!"
10043060-118 = "#na;의문의 목소리;오히려 있는 힘껏 크게 휘둘러서, 하나라도 얻어걸리는 작전을 사용해야 해!"
10043060-119 = "3;레이;05;저, 적어도 그렇다면! 고의 번트 파울이라도 두 번 시도한 다음 타격으로 들어가는 건 어떨까요?\n#3;stiff"
10043060-120 = "3;레이;99;쓰리 번트는 자동 아웃으로 판정받으니 3연속 번트를 시도할 수는 없겠지만……."

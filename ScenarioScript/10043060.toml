[translation]
10043060-1 = "第6話;燃燒的球場"
10043060-3 = "呼……"
10043060-4 = "[s]「要不要稍微休息一下？」"
10043060-5 = "說的也是……#n既然要透過雜訊來推算位置，在下次通話之前也沒什麼事可做……"
10043060-6 = "除了體力之外……現在這種情況，對精神方面也很疲勞呢。"
10043060-12 = "雖然我說這種話可能有點奇怪……"
10043060-13 = "但棒球……真是種神奇的運動呢。"
10043060-14 = "[s]「怎麼說呢？」"
10043060-15 = "首先，棒球是持球的一方進行防守對吧？"
10043060-16 = "在許多球類運動……例如足球、籃球、排球、高爾夫等等，都是由持球的那方進攻。"
10043060-19 = "但棒球卻完全相反，是由防守方的投手向攻擊方的打者投球……"
10043060-20 = "並根據擊球的結果取得分數。#n而在這個過程中……運氣是個相當重要的因素。"
10043060-23 = "即便擊球的力道很紮實，一旦飛向野手的方向也只會落得出局的下場……#n看似糟糕的滾地球，如果能沿著界外線滾，也有機會成為幸運的二壘安打。"
10043060-24 = "要說全憑實力又很講求運氣……要說全靠運氣卻又不能缺少實力。"
10043060-25 = "不過以同時身為球迷與球員的立場來說……我還是會希望付出的努力可以得到回報。"
10043060-26 = "如果在過程中遇到不如意的事，還是會感到悲傷、遺憾……甚至生氣。"
10043060-30 = "……很奇怪對吧。"
10043060-31 = "為什麼面對喜歡的東西，反而越忍不住任性呢。"
10043060-32 = "[s1]「就是因為付出了很多努力……」\n[s2]「才會更期待能得到相應的回報吧？」"
10043060-35 = "回報……是嗎。#n這種心態確實有可能是部分的原因……"
10043060-36 = "不過這麼一想……老師是不是有點奇怪？"
10043060-37 = "[s] 「我？」"
10043060-38 = "其實這次的事情……老師根本沒必要這麼操心不是嗎？"
10043060-39 = "還有前輩也是……#n真要說起來，會在意的應該只有我這個勇士迷才對。"
10043060-40 = "但老師卻還是這麼認真地看待這件事。#n唔嗯……雖然我也知道老師本來就經常這麼做……"
10043060-41 = "不過整體來看，老師幫助我們……幫助學生的動機，似乎不像是為了得到回報。"
10043060-42 = "啊，我的意思是如果老師是為了得到回報的話，反而還比較能理解。"
10043060-43 = "話先說在前頭，「因為我喜歡」這種模稜兩可的回答我可不接受哦？"
10043060-47 = "[ns]「硬要說的話……」"
10043060-49 = "[ns]「也許是因為我喜歡看著你們吧。」"
10043060-53 = "咦咦！？我，我們嗎？"
10043060-54 = "[s3]「嗯，因為你們都充滿了可能性。」\n[s4]「或許我喜歡……守望著這些可能性。」"
10043060-58 = "[ns5]「如果在過程中，我可以做點什麼……」\n[ns6]「幫助你們更接近自己想達成的『目標』……」"
10043060-61 = "[ns7]「我就很滿足了。」\n[ns8]「我是這麼想的。」"
10043060-67 = "……就像堇前輩一樣嗎？"
10043060-68 = "[s]「咦咦！？」"
10043060-69 = "沒，沒有啦。#n只是我腦袋裡莫名浮現了前輩的身影而已。"
10043060-70 = "總之……"
10043060-76 = "謝謝老師，嘿嘿。"
10043060-77 = "願意這麼認真聽我說話的人……老師你還是第一個呢……"
10043060-87 = "七局上半守備結束。#n攻守交換了。有聽到嗎？"
10043060-88 = "……！#n聽，聽到了！"
10043060-90 = "好……總之接下來是七局下半，換我們進攻了。#n目前的比分是18比21。"
10043060-91 = "……場面簡直堪比核戰啊。"
10043060-92 = "雙方都只剩下一名替補投手。#n我問你，總教練。你打算採取什麼戰術？"
10043060-95 = "這，這個嘛！先消耗對方替補投手的體力顯然比較有利……"
10043060-96 = "用界外球戰術怎麼樣！"
10043060-97 = "界外球戰術！？"
10043060-98 = "沒錯，就是不以安打為目標，而是盡可能打出界外球來增加對方的投球數。"
10043060-99 = "藉此消耗對方的替補投手，或者至少能降低球威的話──"
10043060-101 = "我就知道你會想用這招！別做夢了！"
10043060-105 = "為，為什麼？"
10043060-106 = "總教練說的沒錯啊！#n現在還剩下三局，如果能增加對方的投球數，進而減少投手的球威……"
10043060-107 = "一定能在九局下半抓住最後機會的！"
10043060-112 = "說話之前先秤秤自己家的打者有幾兩重好嗎！！！"
10043060-113 = "還想用什麼界外球戰術？只會搞到自己被三振而已啦！"
10043060-114 = "你們的水準已經爛到不能用常識看待了，差不多也該稍微有點自覺了吧！！！"
10043060-115 = "唔，唔唔……！"
10043060-116 = "你會不會說得太過分了！沒必要說得那麼難聽吧！"
10043060-117 = "給我聽清楚了！#n這種時候就該反向操作！不入虎穴焉得虎子！"
10043060-118 = "直接用盡全力揮棒，打到什麼算什麼吧！"
10043060-119 = "既，既然如此……#n不如先故意用短打擊出兩次界外球，之後再全力開轟怎麼樣？"
10043060-120 = "如果在兩好球的情況下短打失敗會自動被判出局，所以不能連續打三支短打……"
10043060-121 = "這樣可以至少消耗三球，應該會稍微有利一點吧？"
10043060-125 = "……"
10043060-126 = "一整天下來，你難得說了句有用的話。"
10043060-127 = "哪裡難得啊……"
10043060-129 = "那就採用你的意見吧。#n故意觸擊兩次界外球之後全力揮棒！"
10043060-130 = "在消耗對方投球數的同時，盼望好運降臨……"
10043060-131 = "第七第八局是最容易出現變數的局數。#n就這麼做吧！"
10043060-132 = "好！"
10043060-135 = "比賽來到七局下半。勇士隊進攻，突襲者隊防守。#n比賽即將開始。比分是18比21。"
10043060-136 = "有些球迷可能會覺得意外，但勇士隊是賽史上有跡可循的追分高手。"
10043060-137 = "遺憾的是，追分的結果始終無法扭轉勝負。"
10043060-138 = "勇士隊究竟能不能破除吃鍋貼的魔咒，可說是比賽的重要看點之一。#n那麼勇士隊這次採取的戰術是……？"
10043060-144 = "啊……是無人出局的犧牲短打？#n觸擊安打本來就很難出現，現在這位打者的腳程也不是特別出色……"
10043060-145 = "也就是說，勇士隊現在採取的是拉高投球數的戰術。#n我認為這個嘗試是相當聰明的。"
10043060-150 = "就在這時，投手投出了第一球！"
10043060-151 = "往腳邊……腳邊……越過界外線……！"
10043060-152 = "拜託……拜託……！"
10043060-166 = "天底下怎麼會有這種事！我簡直不敢相信自己的眼睛！#n是顆飛向投手正面的短打飛球！第一球就出局了！"
10043060-167 = "……這種出局方式也算是創意十足呢。"
10043060-168 = "跟這種做法相比，我認為正常揮棒或許會是更好的選擇。"
10043060-171 = "……"
10043060-172 = "……"
10043060-173 = "怎麼會這樣……"
10043060-178 = "接下來不准再對我的話有任何異議！聽懂沒？#n我說什麼就給我照辦！照我說的去做！！！"
10043060-182 = "老，老師！這樣下去不太妙！"
10043060-183 = "[s]「什，什麼？」"
10043060-184 = "從這個情況來看，連續一球出局的機率很高……#n也就是說，再兩球就攻守交換了！"
10043060-185 = "這樣犯人就會切斷通訊，我們用雜訊追蹤犯人位置的計畫就要泡湯了！"
10043060-186 = "[s]「這樣的確很棘手……！」"
10043060-191 = "[ns]「等等，先等一下！雖然觸擊戰術失敗了……」"
10043060-195 = "啊？要嘗試保險一點的作戰？#n什麼意思？"
10043060-196 = "唔嗯？要打者頻繁請求暫停，試著擾亂投手的節奏？"
10043060-197 = "也就是所謂的「叫停戰術」嗎……"
10043060-198 = "……"
10043060-199 = "聽起來確實比較安全。#n不管打擊還是投球，時機都是很重要的……"
10043060-200 = "好，試試看吧。"
10043060-204 = "老師好厲害！這樣就能多延長一點通訊時間了！"
10043060-209 = "打者再次請求了暫停。#n進入七局下半之後，已經喊了好幾次暫停……"
10043060-214 = "沒想到就在這時！主審對打者下達了退場處分！"
10043060-215 = "看來主審認為打者的行為已經妨礙比賽了呢。#n這的確是主審可以自由裁量的部分。"
10043060-216 = "可惡……！"
10043060-221 = "不要再讓我聽到你們說任何一句話……"
10043060-222 = "接下來要是有任何人敢開口，就別怪我祭出最後手段……！"
10043060-227 = "老師！好像……找到犯人在哪裡了！"
10043060-233 = "聽得到嗎，指導員、莉同學？#n我似乎已經鎖定犯人所在的位置了。"
10043060-234 = "[s]「真的嗎？在哪裡！？」"
10043060-235 = "就在捕手後方的座位……！"
10043060-236 = "[s]「咦？那裡是……！」"
10043060-237 = "是的，指導員。"
10043060-238 = "正是花繪同學表示其他工讀生特別常去的地方。"
10043060-239 = "同時我也得知──#n那裡是能從中央俯瞰整個球場、與其他觀眾隔離的昂貴座位。"
10043060-241 = "既然一手策劃了這種事情，把座位選在那裡確實很合理。"
10043060-242 = "老師，這次通訊結束後……也把這件事告訴總教練和勇士隊的選手吧！"
10043060-244 = "（順帶一提，勇士隊的替補打者及下一棒打者……）"
10043060-245 = "（一如意料地只消耗對方兩球便雙雙出局，再度攻守交換……）"

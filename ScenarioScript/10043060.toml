[translation]
10043060-1 = "ตอนที่ 6;สนามที่ลุกโชน"
10043060-3 = "ฮู่ว..."
10043060-4 = "[s] \"พักสักหน่อยมั้ย?\""
10043060-5 = "เอางั้นเหรอคะ? ในเมื่อเราตัดสินใจจะหาตำแหน่งโดยเสียงรบกวน เราก็คงทำอะไรไม่ได้ จนกว่าคนร้ายจะติดต่อมาอีกครั้ง..."
10043060-6 = "ร่างกายฉันยังไหวอยู่ แต่ว่าจิตใจฉันเริ่มเหนื่อยแล้วค่ะ"
10043060-12 = "มันอาจจะฟังดูแปลกๆ ที่ฉันพูดอย่างนี้..."
10043060-13 = "แต่เบสบอล... เป็นกีฬาที่น่าทึ่งนะคะ"
10043060-14 = "[s] \"ในแง่ไหนเหรอ?\""
10043060-15 = "ก่อนอื่นเลย คงเพราะมันเป็นกีฬาที่ฝ่ายที่มีบอลอยู่เป็นฝ่ายรับค่ะ"
10043060-16 = "มีกีฬาหลายอย่างที่ต้องใช้ลูกบอลค่ะ ทั้งฟุตบอล บาสเก็ตบอล วอลเลย์บอล... แต่กีฬาทั้งหมดนั้น ฝ่ายที่มีลูกบอลอยู่เป็นฝ่ายรุก"
10043060-19 = "แต่เบสบอลไม่ใช่อย่างนั้น กฎโดยพื้นฐานก็คือ พิชเชอร์ของฝ่ายรับต้องขว้างบอลให้แบตเตอร์ของ#nฝ่ายรุก"
10043060-20 = "แล้วคะแนนที่ได้รับก็ขึ้นอยู่กับว่าตีลูกนั้นได้ดีแค่ไหน นอกจากนั้น... ก็ต้องพึ่งองค์ประกอบอื่นที่เรียกว่า 'โชค' ด้วยค่ะ"
10043060-23 = "ต่อให้เป็นลูกที่ตีได้ดี แต่ถ้าโชคไม่ดี ลูกก็อาจจะไปอยู่ด้านหน้าผู้เล่นฝ่ายรับ หรือกับลูกกราวด์บอล#nที่ทุกคนเห็นว่าแปลก แต่บางทีก็อาจโชคดีข้ามเส้นฟาวล์แล้วไปที่เบส 2 เลยก็ได้ค่ะ"
10043060-24 = "ฉันว่าเบสบอลเป็นกีฬาที่ไม่ได้ใช้แค่ทักษะเพียงอย่างเดียว แต่ก็ต้องพึ่งโชคด้วย... แต่ถึงยังไงก็จะอาศัยแต่โชคแล้วตัดเรื่องทักษะไปเลยไม่ได้"
10043060-25 = "แต่ในมุมมองของแฟนๆ และในมุมมองของคนที่เป็นนักกีฬาอย่างฉันแล้ว... ฉันว่าเราอยากได้รางวัล#nจากความพยายามมากกว่าค่ะ"
10043060-26 = "และในระหว่างกระบวนการนั้น ถ้าสิ่งต่างๆ ไม่เป็นไปถามแผน เราก็จะเสียใจ เสียดาย... แล้วบางทีก็โมโหด้วยค่ะ"
10043060-30 = "เป็นเรื่องที่แปลกจังเลยนะคะ... เฮ้อ"
10043060-31 = "ทำไมยิ่งเป็นสิ่งที่ชอบ เรายิ่งเอาความรู้สึกไปผูกกับมันมากล่ะคะ?"
10043060-32 = "[s1] \"คงเพราะเราหวังว่าจะได้สิ่งตอบแทนน่ะ\"\n[s2] \"คงเพราะเราอยากได้สิ่งตอบแทนจากที่พยายามไปน่ะ\""
10043060-35 = "สิ่งตอบแทน... งั้นเหรอคะ? ก็น่าจะมีแง่มุมนั้นอยู่จริงๆ ค่ะ..."
10043060-36 = "แต่ก็แปลกจังเลยนะคะที่คิดแบบนั้น? ฉันหมายถึงคุณครูน่ะค่ะ"
10043060-37 = "[s] \"ครูเหรอ?\""
10043060-38 = "ความจริงแล้วเรื่องนี้... คุณครูไม่ต้องมาเดือดร้อนและช่วยแก้ปัญหาให้ก็ได้นี่คะ?"
10043060-39 = "รุ่นพี่เองก็ด้วย ที่จริงเรื่องแบบนี้คนที่ต้องสนใจน่าจะต้องเป็นแฟนทีมเบรฟส์อย่างฉันมากกว่า"
10043060-40 = "แต่คุณครูกลับไม่เป็นอย่างนั้นนะคะ อืม ฉันก็พอรู้มาว่าคุณครูก็เป็นคนแบบนี้อยู่แล้ว"
10043060-41 = "พอมองดูภาพรวมแล้ว มันดูเหมือนว่าคุณครูเอาแต่ช่วยเหลือนักเรียนอย่างเรา... โดยไม่ได้คาดหวังสิ่งตอบแทนน่ะค่ะ"
10043060-42 = "ถ้าคุณครูพูดตามตรงว่าช่วยเพราะหวังว่าจะได้สิ่งตอบแทน ฉันอาจจะหายสงสัยก็ได้ค่ะ"
10043060-43 = "ห้ามตอบง่ายๆ ว่า \"ครูช่วยเพราะอยากช่วย\" หรืออะไรทำนองนั้นนะคะ"
10043060-47 = "[ns] \"ถ้าจะให้บอกเหตุผล ก็คงเป็น...\""
10043060-49 = "[ns] \"ครูชอบการได้เฝ้าดูนักเรียนน่ะ\""
10043060-53 = "คะ... คะ?! หมายถึงพวกฉันเหรอคะ?"
10043060-54 = "[s3] \"อื้อ เพราะนักเรียนทุกคนคือความเป็นไปได้\"\n[s4] \"ครูชอบเฝ้าดูความเป็นไปได้ของนักเรียนน่ะ\""
10043060-58 = "[ns5] \"แล้วถ้ามีเป้าหมายที่อยากเป็น ครูก็อยากช่วย\"\n[ns6] \"แล้วครูก็อยากช่วยให้ทุกคนเข้าใกล้เป้าหมายที่อยากเป็น\""
10043060-61 = "[ns7] \"ครูว่าเท่านั้นมันก็เพียงพอแล้วละ\"\n[ns8] \"ครูว่าเหตุผลแค่นั้นก็เพียงพอแล้วละ\""
10043060-67 = "ใช่รุ่นพี่สึมิเระหรือเปล่าคะเนี่ย...?"
10043060-68 = "[s] \"หะ... หืม?!?!\""
10043060-69 = "ไม่มีอะไรหรอกค่ะ จู่ๆ ฉันแค่คิดถึงรุ่นพี่ขึ้นมาน่ะ"
10043060-70 = "แต่ยังไงก็..."
10043060-76 = "ขอบคุณ... นะคะ แหะๆ"
10043060-77 = "คุณครูเป็นคนแรกเลยค่ะ... ที่ตั้งใจฟังเรื่องราวของฉันอย่างจริงจังขนาดนี้..."
10043060-87 = "จบเกมรับต้นอินนิ่งที่ 7 ถึงเวลาเปลี่ยนฝ่ายรุกฝ่ายรับแล้ว ฟังฉันอยู่หรือเปล่า?"
10043060-88 = "ฟะ... ฟังอยู่ค่ะ!"
10043060-90 = "งั้นก็ดี... จากนี้จะเป็นเกมรับในท้ายอินนิ่งที่ 7 แต้มตอนนี้อยู่ที่ 18 ต่อ 21"
10043060-91 = "ในสนามไม่ต่างจากสงครามนิวเคลียร์เลยนะ..."
10043060-92 = "ตอนนี้แต่ละฝ่ายเหลือพิชเชอร์แค่คนเดียวเท่านั้น คิดกลยุทธ์ที่จะเล่นไว้หรือยังล่ะ?"
10043060-95 = "อะ... อื้อ! ให้อีกฝ่ายใช้พิชเชอร์จนหมดน่าจะได้เปรียบกว่า..."
10043060-96 = "เพราะงั้นตอนนี้สิ่งที่จำเป็นคือกลยุทธ์ลูกฟาวล์!"
10043060-97 = "กลยุทธ์ลูกฟาวล์?!"
10043060-98 = "ใช่ กลยุทธ์ของเราคือไม่ต้องตีลูกให้ได้แต้ม แต่ให้ตีลูกฟาวล์ให้ได้มากที่สุด เพื่อให้ฝ่ายตรงข้ามเหนื่อยกับการขว้างลูก"
10043060-99 = "ถ้าสิ่งนี้ทำให้ฝ่ายตรงข้ามเปลี่ยนพิชเชอร์จนหมด หรืออย่างน้อยทำให้กำลังของบอลลดลงได้ละก็..."
10043060-101 = "กะไว้แล้วว่าต้องคิดแบบนี้! แต่ที่ฉันอยากบอกก็คือ เลิกพูดอะไรที่มันเป็นไปไม่ได้เถอะ!"
10043060-105 = "ทะ... ทำไมล่ะ?"
10043060-106 = "นั่นสิคะ! เรายังเหลืออีก 3 อินนิ่ง ถ้าเราทำให้ฝ่ายตรงข้ามขว้างลูกหลายครั้งจนหมดพลังที่จะขว้างไป#nเองละก็..."
10043060-107 = "เราก็อาจจะได้โอกาสสุดท้ายในปลายอินนิ่งที่ 9 ก็ได้นะคะ!"
10043060-112 = "พูดอะไรไม่ดูฝีมือแบตเตอร์ของตัวเองเลย!!!"
10043060-113 = "กลยุทธ์ลูกฟาวล์บ้าบออะไร! ฝีมืออย่างพวกนายน่ะ ฉันว่าคงสไตรค์เอาต์เพราะตีไม่โดนเลยมากกว่า!"
10043060-114 = "ตอนนี้พวกนายควรรู้ตัวกันได้แล้วว่าตัวเองเป็นทีมที่คิดวิเคราะห์แยกแยะเกมไม่เป็นเลยสักนิด!!"
10043060-115 = "อะ... อึก...!"
10043060-116 = "พูดแรงไปแล้วนะคะ! ไม่เห็นต้องพูดถึงขนาดนั้นก็ได้นี่!"
10043060-117 = "ตกลงเข้าใจฉันหรือเปล่า! จากนี้ต้องเล่นตรงกันข้าม! ถ้าไม่เสี่ยงก็ไม่เห็นความสำเร็จหรอก!"
10043060-118 = "ต้องใช้กลยุทธ์เหวี่ยงให้สุดแรงเกิด เพื่อให้ได้อย่างน้อยสักลูกมากกว่า!"
10043060-119 = "ถะ... ถ้าอย่างนั้น! เราจงใจตีลูกสั้นให้ฟาวล์สัก 2 ครั้งแล้วก็ค่อยหวดเต็มแรงดีมั้ยคะ?"
10043060-120 = "ยังไงถ้าตีลูกสั้น 3 ครั้งก็จะถูกให้เอาต์อยู่แล้ว งั้นเราก็คงตีลูกสั้น 3 ครั้งติดต่อกันไม่ได้..."
10043060-121 = "แต่การทำให้ต้องขว้างลูกอย่างน้อย 3 ครั้งต่อแบตเตอร์ 1 คน มันก็น่าจะได้ผลอยู่นะคะ?"
10043060-125 = "......"
10043060-126 = "นานๆ ทีจะพูดอะไรที่ฟังดูเข้าท่าอยู่บ้างเหมือนกันแฮะ"
10043060-127 = "นานๆ ทีงั้นเหรอ..."
10043060-129 = "งั้นฉันยอมรับไอเดียนั้นแล้วกัน ดีละ จงใจตีลูกสั้นฟาวล์ 2 ครั้งแล้วค่อยหวดแบบจัดหนัก!"
10043060-130 = "กลยุทธ์ที่ทำให้ฝ่ายตรงข้ามต้องขว้างลูกหลายครั้ง แล้วก็หวังโชคเล็กๆ น้อยๆ ไปด้วย..."
10043060-131 = "อินนิ่งที่ 7 และ 8 เป็นอินนิ่งที่อาจเกิดเหตุการณ์ไม่คาดคิดได้มากที่สุด งั้นก็เอาตามนี้!"
10043060-132 = "ตกลงค่ะ!"
10043060-135 = "ท้ายอินนิ่งที่ 7 เบรฟส์เป็นฝ่ายรุก เรเดอร์สเป็นฝ่ายรับ แต้มตอนนี้อยู่ที่ 18 ต่อ 21 ถือว่ายังมีโอกาสอยู่ครับ"
10043060-136 = "แฟนๆ บางคนอาจประหลาดใจกับเรื่องนี้ แต่เบรฟส์เป็นทีมที่โดดเด่นเรื่องการเป็นนักล่ามาตั้งแต่ไหน#nแต่ไรแล้วครับ"
10043060-137 = "แม้ว่าปัญหาคือเห็นผลลัพธ์ไม่ชัดเจนก็ตามครับ"
10043060-138 = "นี่คือช่วงเวลาที่น่าจับตามองเลยนะครับ อยากรู้แล้วว่าเบรฟส์จะแกะรอยแล้วไล่ล่าได้สำเร็จหรือไม่ มาลุ้นกันครับว่าเบรฟส์จะมากับกลยุทธ์อะไร"
10043060-144 = "อ๊ะ... ท่าทางแบบนั้นมัน... ตั้งใจจะตีลูกสั้นเหรอครับเนี่ย? การตีลูกสั้นให้ได้แต้มไม่ใช่เรื่องง่ายเลยนะ#nครับ ตอนนี้แบตเตอร์ที่ยืนอยู่ในเขตก็ดูเหมือนจะล้าๆ แล้วด้วย"
10043060-145 = "หรือว่านี่จะเป็นกลยุทธ์ทำให้ขว้างหลายๆ ครั้ง? ถือเป็นความพยายามที่ดีเลยนะครับ"
10043060-150 = "พูดยังไม่ทันขาดคำ พิชเชอร์ก็ขว้างบอลแรกแล้วครับ!"
10043060-151 = "ลงไปใต้เท้า... ข้ามเส้นฟาวล์ไป...!"
10043060-152 = "ขอร้องล่ะ... ขอร้อง...!"
10043060-166 = "เย้ย! กล้วยไม่สุกก็ยังต้องทอด!! แทบไม่เชื่อสายตาตัวเองเลยครับ! ตีลูกสั้นหน้าพิชเชอร์! ลูกแรกก็เอาต์เลยครับ!"
10043060-167 = "ไม่อยากเชื่อเลย... ถือว่ามีความคิดริเริ่มดีนะครับ..."
10043060-168 = "แต่ถ้ามันจะเป็นแบบนี้ ผมว่าถ้าหวดให้เต็มแรงสักครั้งก่อนก็น่าจะดีกว่านะครับ"
10043060-171 = "......"
10043060-172 = "......"
10043060-173 = "เป็นแบบนี้ไปได้ยังไง..."
10043060-178 = "จากนี้ไปก็ฟังแต่ที่ฉันพูดล่ะ ไม่ต้องเสริมอะไรทั้งนั้น! ทำตามที่ฉันสั่ง ไม่ต้องตุกติกทำอย่างอื่น เข้าใจมั้ย?!!"
10043060-182 = "คะ... คุณครูคะ? คุณครู! แบบนี้ไม่ดีแล้วค่ะ มันอันตรายนะคะ!"
10043060-183 = "[s] \"อะ... อะไรอันตรายเหรอ?\""
10043060-184 = "ถ้าเป็นแบบนี้ต่อไปก็มีโอกาสสูงที่จะเอาต์ในลูกแรกอีก... แล้วก็จะเปลี่ยนเกมรุกเกมรับหลังจากขว้างได้ 2 ลูกเท่านั้นค่ะ!"
10043060-185 = "ถ้าเป็นแบบนั้นสายสนทนานี้ก็จะตัดไป แล้วแผนการหาตำแหน่งโดยใช้เสียงรบกวนของเราก็จะพังไปด้วยค่ะ!"
10043060-186 = "[s] \"ถ้าเป็นแบบนั้นก็แย่เลยนะ...!\""
10043060-191 = "[ns] \"เดี๋ยว เดี๋ยวก่อน! ถึงกลยุทธ์ตีลูกสั้นของเราจะไม่ได้ผล...\""
10043060-195 = "ว่าไงนะ? อยากเสนอให้ใช้กลยุทธ์ที่ปลอดภัยกว่านี้งั้นเหรอ? กลยุทธ์อะไร?"
10043060-196 = "หืม? ให้แบตเตอร์ขอเวลาเตรียมตัวหลายๆ ครั้ง เพื่อทำลายจังหวะของพิชเชอร์?"
10043060-197 = "เป็น 'กลยุทธ์ขอเวลา' สินะ..."
10043060-198 = "......"
10043060-199 = "มันก็ดูปลอดภัยอยู่หรอกนะ ไหนฉันจะเคยบอกไปว่าการตีและการขว้างคือการขโมยเวลาของ#nกันและกันด้วย..."
10043060-200 = "ดีละ งั้นก็เอาตามนั้น"
10043060-204 = "เยี่ยมเลยค่ะ คุณครู! แบบนี้ก็น่าจะยื้อเวลาของสายนี้ได้อีกนะคะ!"
10043060-209 = "ขอเวลาอีกแล้วครับ ดูเหมือนในช่วงปลายอินนิ่งที่ 7 แบตเตอร์จะขอเวลาเตรียมตัวบ่อยเลยนะครับ..."
10043060-214 = "ไม่อยากเชื่อเลย! พอพูดจบ กรรมการก็ประกาศให้แบตเตอร์ออกจากสนามไปเลยครับ!"

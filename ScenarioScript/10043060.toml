10043060-1 = "#title;제6화;불타는 그라운드"
10043060-2 = "#wait;2000"
10043060-3 = "3;레이;99;후우…….\n#3;em;[한숨]\n#3;a"
10043060-4 = "[s] \"좀 쉴까?\""
10043060-5 = "3;레이;02;그럴까요……. 노이즈로 위치를 찾아보기로 한 이상, 다음 통신이 들어올 때까지는 달리할 수 있는 일도 없고……."
10043060-6 = "3;레이;09;체력도 체력이지만, 정신적으로 지치네요. 이거.\n#3;em;[속상함]\n#3;stiff"
10043060-7 = "#st;[0,0];instant;1;"
10043060-8 = "#clearST"

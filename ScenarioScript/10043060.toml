10043060-10 = "#wait;2000"
10043060-11 = "3;레이;02\n#3;em;[반응]\n#3;h\n#wait;1200"
10043060-12 = "3;레이;99;……제가 이런 말 하는 것도 약간 이상하겠지만."
10043060-13 = "3;레이;10;야구는…… 조금 신기한 스포츠죠."
10043060-14 = "[s] \"어떤 점에서?\""
10043060-15 = "3;레이;02;우선, 공을 갖고 있는 쪽이 수비를 하는 스포츠라서요?\n#3;em;…"
10043060-16 = "3;레이;01;공으로 하는 스포츠는 많죠. 축구, 농구, 배구 골프…… 그런데 그것들은 모두 공을 가지고 있는 쪽이 공격을 해요."
10043060-17 = "#all;hide"
10043060-18 = "#wait;500"
10043060-19 = "#na;레이;하지만 야구는 반대죠. 기본적으로 수비팀의 투수가 공격팀의 타자에게 공을 던지는 것이 규칙이고."
10043060-20 = "#na;레이;그 공을 얼마나 잘 쳐 내는지에 따라서 점수가 나는 경기니까요. 그리고 거기에서…… 운이라는 요소가, 꽤 많이 작용하고요."
10043060-21 = "#all;hide"
10043060-22 = "#wait;500"
10043060-23 = "3;레이;02;잘 맞은 타구였지만, 운 좋게 야수 정면으로 공이 갈 수도 있고. 누가 봐도 이상한 땅볼이지만, 파울 라인을 타고 흘러 행운의 2루타가 될 수도 있어요.\n#3;a"
10043060-24 = "3;레이;00;실력만으로 이루어지는 스포츠라기에는 운이 너무 작용하고…… 그렇다고 운에만 기대기에는 실력의 요소를 배제할 수 없죠."
10043060-25 = "3;레이;99;그렇지만 팬의 입장에서는, 그리고 선수이기도 한 제 입장에서는…… 아무래도 노력에 대한 보상을 받고 싶다고 생각하게 되고요."
10043060-26 = "3;레이;05;그리고 그 과정에서 뜻대로 일이 안되면, 슬퍼하거나 안타까워하거나…… 화를 내기까지 하고요."
10043060-27 = "#st;[0,0];instant;1;"
10043060-28 = "#clearST"
10043060-29 = "3;레이;05\n#3;em;…\n#3;h\n#wait;2500"
10043060-30 = "3;레이;12;……이상한 일이죠. 참.\n#3;em;[속상함]\n#3;stiff"
10043060-31 = "3;레이;06;왜 좋아하는 것들일수록, 함부로 대하게 되는 걸까요."
10043060-32 = "[s1] \"아마도 평소에 노력한 만큼의 보상이.\"\n[s2] \"돌아오길 바라기 때문이 아닐까?\""
10043060-33 = "#wait;10"
10043060-34 = "#wait;10"
10043060-35 = "3;레이;02;보상…… 말인가요. 그건 분명 그런 부분이 있는 것 같기도 하지만……."
10043060-36 = "3;레이;00;그런데 그렇게 생각하니, 또 이상하네요? 선생님이 말이죠.\n#3;em;[반응]"
10043060-37 = "[s] \"나?\""
10043060-38 = "3;레이;02;사실 이번 일…… 선생님께서 이렇게까지 신경 써 주실 필요는 없었잖아요?\n#3;em;[?]"
10043060-39 = "3;레이;00;선배도 그렇기는 하지만, 굳이 말하자면 브레이브스 팬이었던 저 정도나 신경 쓸 일이었죠."
10043060-40 = "3;레이;99;하지만 선생님은 그렇지 않으셨고요. 음, 뭐. 다른 경우에도 종종 그러셨던 걸로 알고는 있는데요."
10043060-41 = "3;레이;00;그런 걸 총체적으로 보자면, 선생님은 보상을 바라고 저희를…… 학생들을 돕는 것처럼 안 보여서요."
10043060-42 = "3;레이;02;아, 여기에서 거꾸로 솔직하게, 사실 차라리 그런 걸 바라고 있었다고 말해 주시면 차라리 이해하기 쉬울 텐데 말이죠.\n#3;em;[반응]"
10043060-43 = "3;레이;05;'내가 좋아서 그러는 거야' 같은 빠져나가기 좋은 대답은 하지 말기에요. 안 통하거든요?"
10043060-44 = "#st;[0,0];instant;1;"
10043060-45 = "#clearST"
10043060-46 = "#wait;2500"
10043060-47 = "[ns] \"굳이 말하자면…….\""
10043060-48 = "#wait;1000"
10043060-49 = "[ns] \"너희들을 보는 게 좋기 때문일 거야.\""

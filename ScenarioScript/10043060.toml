10043060-53 = "3;레이;08;네, 네?! 저희를, 이요?\n#3;stiff"
10043060-54 = "[s3] \"응. 너희들은 모두 가능성이니까.\"\n[s4] \"그 가능성을 지켜보는 게…… 좋은 걸 거야.\""

10026060-3 = "3;히나타 수영복;02;일단은 한 짐…….\n#3;a\n#3;em;…"
10026060-4 = "3;히나타 수영복;12;영차…….\n#3;greeting"
10026060-5 = "3;히나타 수영복;02;후우. 생각보다 등대 안에도 조사할 것들이 많나 보네요. 좋은 일이지만요.\n#3;em;[땀]"
10026060-6 = "3;히나타 수영복;01;사실 고대 성도회 분들이 쓰신 곳이라 해서, 좀 더 텅 비어 있을 줄 알았는데……."

[translation]
10026060-1 = "第6話;調查點D「被遺忘的燈塔」"
10026060-3 = "先把東西放下來吧……"
10026060-4 = "嘿咻……"
10026060-5 = "呼……燈塔裡能調查的東西比想像中還多呢。#n雖然是件好事。"
10026060-6 = "不過這裡終究是古代聖徒會的地盤，還以為會更空曠一點呢……"
10026060-7 = "……嗯？咦……？"
10026060-8 = "老師……？您在這裡嗎？#n我以為您跟其他人一起去裡面調查了……"
10026060-9 = "[s1]「我是來幫你的，日向。」\n[s2]「你一個人搬東西感覺很辛苦。」"
10026060-12 = "別，別這麼說……！#n我沒事的，老師不需要特地為我這麼做！"
10026060-13 = "我不是跟您說過了嗎？這樣我會比較自在，請讓我這麼做！"
10026060-14 = "不，不行？#n因為老師是老師……所以不能坐視不管嗎……？"
10026060-15 = "……不是那個原因？#n可是……唔……"
10026060-16 = "……呵呵。"
10026060-17 = "我明白了，老師都已經這麼說了，繼續堅持也不好吧。"
10026060-18 = "謝謝您，那就承蒙您的好意……這些比較小的東西就麻煩您了。"
10026060-19 = "至於這些大的……因為真的有點重量，所以交給我吧。"
10026060-23 = "……那我們走吧？"
10026060-25 = "（之後，和日向一起把大家在燈塔裡找到的東西搬到外頭）"
10026060-26 = "呼……這樣大件的物品應該都搬出去了吧？"
10026060-27 = "其他人好像還要在裡面調查一段時間……我們就在這裡等吧。"
10026060-28 = "真的辛苦您了，老師。#n請容我再次向您道謝。"
10026060-32 = "……嗯？剛才好像有什麼聲音……？#n是從森林裡傳來的嗎……？"
10026060-39 = "……！#n果然沒錯……！"
10026060-40 = "連這裡也……"
10026060-49 = "這……完全被包圍了呢……#n沒想到事情竟然會變成這樣……"
10026060-50 = "……咦？"
10026060-51 = "您說要趕快呼叫其他人，一起想想對策……？"
10026060-52 = "嗯……那個……"
10026060-56 = "[ns3]「……日向？」\n[ns4]「為什麼在東張西望……？」"
10026060-59 = "啊，不好意思，老師……我只是在確認人數究竟有多少而已……"
10026060-60 = "憂同學和大家現在都在進行重要的調查任務，我想盡可能不要打擾他們……"
10026060-61 = "所以才想確定敵方的人數……看看自己有沒有辦法……阻止他們。"
10026060-65 = "[ns]「……？？？」"
10026060-67 = "[ns5]「所以……你打算單獨對付他們！？」\n[ns6]「看起來至少有數十人哦……！？」"
10026060-70 = "是，是這麼說沒錯……？#n不過我對一對多的戰鬥還挺有經驗的……"
10026060-71 = "畢竟修女會的事務繁多……經歷過各種突發狀況後，這種事已經見怪不怪……"
10026060-72 = "老師，您為什麼那麼驚訝……！？#n難道這樣很奇怪嗎！？還是我又說錯什麼話了……！？"
10026060-73 = "這種程度的戰鬥難道不會經常發生嗎！？"
10026060-78 = "……啊，他們來了！老師！！"
10026060-79 = "沒時間了，請讓我試試看吧！#n如果老師同意的話……！！"
10026060-80 = "[s7]「我，我知道了，那就試試看吧！！」\n[s8]「指揮就交給我，注意安全。」"
10026060-83 = "……是！"
10026060-87 = "謝謝您，老師！！"

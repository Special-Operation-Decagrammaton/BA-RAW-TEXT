[translation]
10026060-1 = "Episode 6;Site D: Forgotten Lighthouse"
10026060-3 = "One bag at a time..."
10026060-4 = "Upsy-daisy..."
10026060-5 = "Phew! They found more stuff inside that lighthouse to investigate than I expected."
10026060-6 = "I'm surprised that the ancient Council that used this place left so much behind..."
10026060-7 = "Oh!"
10026060-8 = "Sensei? How long have you been here? I thought you were inside with the others..."
10026060-9 = "[s1] \"I figured you might want some help, Hinata.\"\n[s2] \"Carrying all that luggage by yourself looks like hard work.\""
10026060-12 = "Ah, i-it's okay! You don't have to do that for me!"
10026060-13 = "I keep telling you I like handling this stuff. Just let me do it!"
10026060-14 = "Or is it because you're Sensei, you can't leave it alone?"
10026060-15 = "What do you mean it's not like that?"
10026060-16 = "...Heehee."
10026060-17 = "Okay, I understand why you put it that way. I probably shouldn't argue the point."
10026060-18 = "In that case, thank you. You can help with the smaller bags there."
10026060-19 = "The big ones are...really heavy. So leave those to me."
10026060-23 = "There. Shall we?"
10026060-25 = "Eventually we carried out everything the team had found in the lighthouse."
10026060-26 = "Phew... That's all the big ones, right?"
10026060-27 = "It sounds like the others aren't quite done yet... Let's wait for them here, okay?"
10026060-28 = "You were a big help, Sensei. Thank you again."
10026060-32 = "Wait... Did you hear that? There! Along the treeline..."
10026060-39 = "I knew it!"
10026060-40 = "But this time..."
10026060-49 = "This time we're completely surrounded... I never thought it would come to this."
10026060-50 = "Huh?"
10026060-51 = "You think we should call for the others to fight with us?"
10026060-52 = "But... That..."
10026060-56 = "[ns3] \"...Hinata?\"\n[ns4] \"Are we just taking in the view?\""
10026060-59 = "Sorry, Sensei. I-I was counting how many there are..."
10026060-60 = "I don't want to interrupt Ui and the others unless we absolutely have to. They need to stay focused."
10026060-61 = "I was trying to decide if I could handle them all myself."
10026060-65 = "[ns] \"...??\""
10026060-67 = "[ns5] \"You want to face them alone?!\"\n[ns6] \"There are dozens of them!\""
10026060-70 = "Are there? Well, I'm pretty good at large-scale fights..."
10026060-71 = "You'd be surprised how often my skills come in handy at the Cathedral... You know, things happen."
10026060-72 = "Why are you freaking out?! Is that weird?! What's wrong?!"
10026060-73 = "Doesn't everyone deal with this kind of thing on a daily basis?"
10026060-78 = "Ah! Sensei! Here they come!"
10026060-79 = "We're out of time. If you don't mind, I'm going to handle this myself."
10026060-80 = "[s7] \"O-Okay. We can try!\"\n[s8] \"Follow my orders, and take care of yourself.\""
10026060-83 = "...Yes!"
10026060-87 = "Thank you, Sensei!"

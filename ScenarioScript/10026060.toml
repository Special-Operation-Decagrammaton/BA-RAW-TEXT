10026060-17 = "3;히나타 수영복;03;그러네요. 일부러 그렇게 말씀해 주셨는데, 따지는 건 그것대로 좋지 않겠지요."
10026060-18 = "3;히나타 수영복;03;감사합니다. 그럼 그런 것으로 알고……. 작은 것들은 같이 부탁드리도록 할게요.\n#3;greeting"

[translation]
84304100400-5 = "คะ...? เรื่องแปลกๆ เหรอคะ...?"
84304100400-6 = "จุดที่น่าสงสัยงั้นเหรอ...? หมายถึงอะไรเหรอคะ?"
84304100400-7 = "หรือว่าจะไม่มีนะ..."
84304100400-8 = "จะว่าไป คุณหุ่นฟิตจังเลยนะคะ! สงสัยจะขยันออกกำลังกายนะคะเนี่ย"
84304100400-9 = "เธอสนใจแต่เรื่องออกกำลังกายอย่างเดียวสินะ..."
84304100400-10 = "เอาเถอะ ถ้าจะบอกว่านี่คือการออกกำลังกายก็คงใช่..."
84304100400-16 = "หืม...?"
84304100400-17 = "จู่ๆ ก็มีเสียงอะไรดังขึ้นมาน่ะ...?"
84304100400-18 = "...!?"

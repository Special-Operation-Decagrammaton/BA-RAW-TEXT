1005605-41 = "2;세리나 산타ND;05;아무리 그래도 식사는 확실히 하셔야죠!\n#2;hophop\n#2;em;[!]"
1005605-42 = "2;세리나 산타ND;05;산타는 나쁜 환자분께는 선물을 드릴 수가 없어요."
1005605-43 = "2;세리나 산타ND;05;치료도 잘 받으셔야 하고, 회진 때도 이야기 잘 해주셔야 하고!"

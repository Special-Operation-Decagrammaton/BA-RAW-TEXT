1005605-22 = "3;세리나 산타ND;00;안녕하세요! 산타가 도착했습니다!\n#3;em;[반짝]\n#3;al\n#3;hophop"
1005605-23 = "3;세리나 산타ND;03;선물이 필요한 분 계신가요? 물론 건강이 최고의 선물이겠지만요!\n#3;greeting"
1005605-24 = "#na;환자 A;오오, 병원에도 산타 세리나 짱이 와 주는 건가. 이거 반갑구만."
1005605-25 = "#na;환자 B;그 뒤에 계신 분은 샬레의 선생님 산타이신가? 수고가 많네."
1005605-26 = "#na;환자 C;산타가 두 분이나 왔으니, 선물이 모자랄 리는 없겠네."
1005605-27 = "3;세리나 산타ND;00;그럼요, 물론이죠. 언제든 말씀만 하세요.\n#3;em;[음표]"
1005605-28 = "3;세리나 산타ND;02\n#3;a"
1005605-29 = "3;세리나 산타ND;02;저런…… 손을 다치셔서 선물을 풀 수가 없으시군요. 제가 대신 해 드릴게요."
1005605-30 = "3;세리나 산타ND;00;아하하. 그러고 보니 이상하네요. 선물을 주는 산타가 직접 선물을 풀어 주다니요.\n#3;stiff"
1005605-31 = "3;세리나 산타ND;03;안에 든 것은 무엇일까요……?\n#3;em;[반응]"
1005605-32 = "#st;[0,0];instant;1;"

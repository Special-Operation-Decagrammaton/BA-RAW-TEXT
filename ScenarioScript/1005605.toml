[translation]
1005605-1 = "ประสบการณ์ประจำวัน ของชมรมอัศวินบรรเทาทุกข์"
1005605-8 = "อ๊ะ คุณครู! ทางนี้ค่ะ!"
1005605-12 = "ว่าแต่... จะไม่เป็นไรจริงๆ เหรอคะ?"
1005605-13 = "[s] \"มันเป็นงานที่เซรินะทำทุกวันนี่นา\""
1005605-14 = "แหะๆๆ... ถ้าคุณครูว่าอย่างนั้น ฉันก็ไม่ห่วงค่ะ"
1005605-15 = "ขอบคุณ... มากๆ นะคะ"
1005605-21 = "ห้องพักผู้ป่วยโรงพยาบาลศูนย์เซนต์เทเรซา"
1005605-22 = "สวัสดีค่ะ! ซานต้ามาแล้วค่ะ!"
1005605-23 = "สุขภาพแข็งแรงคือของขวัญที่ดีที่สุด แต่มีใครอยากได้ของขวัญอื่นด้วยมั้ยคะ?"
1005605-24 = "โอ้โห ซานต้าเซรินะจังมาแจกของในโรงพยาบาลด้วยเหรอ ดีใจที่ได้เจอนะ"
1005605-25 = "ส่วนข้างหลังนั่นคือซานต้าคุณครูชาเล่ต์เหรอ? เหนื่อยน่าดูเลยนะ"
1005605-26 = "มีซานต้ามาสองคนเลย แบบนี้คงไม่ต้องห่วงว่าของขวัญจะไม่พอเนอะ"
1005605-27 = "ใช่แล้วค่ะ เรียกหาพวกเราได้ตลอดเลยค่ะ"
1005605-29 = "ตายจริง... เป็นแผลที่มือจนแกะของขวัญเองไม่ได้สินะคะ ฉันจะแกะให้เองค่ะ"
1005605-30 = "อะฮ่าฮ่า จะว่าไปก็แปลกดีนะคะ ซานต้าทั้งให้ของขวัญ และก็ช่วยแกะของขวัญด้วยเลย"
1005605-31 = "ของข้างในจะเป็นอะไรน้า...?"
1005605-35 = "ทาด๊าาา! เป็นยังไงคะ ถูกใจหรือเปล่าคะ?"
1005605-37 = "แค่ซานต้ามาหาก็เป็นถือเป็นของขวัญแล้วงั้นเหรอคะ?"
1005605-38 = "แต่ยังไงก็ต้องรับของขวัญที่พวกฉันเตรียมมาไปด้วยสิคะ ชอบอันไหนคะ?"
1005605-39 = "งั้นฉันจะให้ของขวัญชิ้นทางขวาแล้วกันค่ะ! เมอร์รีคริสต์มาส!"
1005605-41 = "แต่ยังไงก็ต้องทานอาหารสิคะ!"
1005605-42 = "ซานต้าไม่ให้ของขวัญคนไข้ที่ดื้อหรอกนะคะ"
1005605-43 = "คนไข้ที่ดีต้องรับการรักษาตรงเวลา แล้วตอนคุณหมอหรือพยาบาลมาตรวจประจำวันก็ต้องให้ความร่วม#nมือด้วยค่ะ!"
1005605-44 = "แบบนี้พวกฉันถึงจะให้ของขวัญได้อย่างสบายใจไงคะ!"
1005605-46 = "(จากนั้นเซรินะก็จัดการงานของชมรมอัศวินบรรเทาทุกข์และภารกิจของซานต้าอย่างคล่องแคล่ว)"
1005605-47 = "(เซรินะขยันทำงานมากๆ จึงไม่มีงานที่คุณครูต้องช่วยทำเท่าไร...)"
1005605-51 = "ล็อบบี้โรงพยาบาลศูนย์เซนต์เทเรซา"
1005605-53 = "[ns] \"เซรินะมาทำงานแบบนี้ทุกวันเลยเหรอ?\""
1005605-54 = "ก็... ไม่ถึงกับทุกวันหรอกค่ะ แต่วันนี้ต้องทำงานซานต้าด้วย ก็เลยยุ่งๆ น่ะค่ะ"
1005605-55 = "ขอโทษค่ะคุณครู เหนื่อยใช่มั้ยคะ?"
1005605-56 = "คะ? ไม่ต้องคิดแบบนั้นก็ได้... งั้นเหรอคะ?"
1005605-57 = "ฮุฮุ ก็ได้ค่ะ"
1005605-58 = "[s] \"ทั้งต้องเรียน ทั้งต้องทำงานของชมรมอีก ไม่ใช่เรื่องเล่นๆ เลยนะ...\""
1005605-59 = "งั้นเหรอคะ? ฉันไม่เคยคิดแบบนั้นมาก่อนเลยค่ะ..."
1005605-60 = "ฉันก็แค่... ทำในสิ่งที่ต้องทำในทุกๆ วันก็เท่านั้นค่ะ"
1005605-61 = "ชีวิตในโรงเรียนสนุกดีค่ะ แล้วก็มีหลายคนที่ต้องการความช่วยเหลือจากฉันค่ะ"
1005605-62 = "ฉันภูมิใจกับงานของชมรมอัศวินบรรเทาทุกข์ค่ะ พอหมดวัน ฉันก็จะรู้สึกว่าตัวเองได้ทำทุกอย่างที่ต้อง#nทำในวันนั้นแล้ว"
1005605-63 = "และมันก็จะโล่งใจและรู้สึกดีขึ้นมาค่ะ"
1005605-64 = "[s1] \"เซรินะบอกครูเองไม่ใช่เหรอว่าอย่าหักโหม...\"\n[s2] \"เหมือนเซรินะจะหักโหมมากกว่าใครเลยนะ...\""
1005605-67 = "แหะๆๆ... ถ้าคุณครูพูดอย่างนี้ ฉันก็ไม่รู้จะปฏิเสธยังไงเลยค่ะ"
1005605-68 = "แต่ไม่ต้องกังวลไปหรอกนะคะ"
1005605-69 = "หากฉันรู้สึกว่าเกินกำลังตัวเอง... ฉันจะไปบอกคุณครูเป็นคนแรกเลยค่ะ!"
1005605-74 = "จะว่าไป วันนี้ทำไมคุณครูถึงมาลองทำงานของชมรมอัศวินบรรเทาทุกข์ล่ะคะ?"
1005605-75 = "[s3] \"ครูอยากรู้จักชมรมนี้และเซรินะให้มากขึ้นน่ะ\"\n[s4] \"ครูอยากรู้จักเซรินะและชมรมนี้ให้มากขึ้นน่ะ\""
1005605-78 = "คะ... คะ?! อยากรู้จักทั้งฉัน... และชมรมอัศวินบรรเทาทุกข์ให้มากขึ้นเหรอคะ?"
1005605-79 = "ยะ... อยู่ดีๆ ทำไมถึง..."
1005605-80 = "แบบนี้ฉันเขินจังเลยค่ะ มากๆ เลยละค่ะ"
1005605-81 = "......"
1005605-86 = "เอ่อ... คุณครูคะ?"
1005605-87 = "ถ้าอย่างนั้น..."
1005605-88 = "ไว้คราวหน้า ถ้าคุณครูไม่ติดธุระอะไร..."
1005605-89 = "ฉันขอให้คุณครูมาช่วยงานอีกได้มั้ยคะ?"
1005605-90 = "การที่ได้ทำงานกับคุณครูอย่างวันนี้... มันทำให้ฉันมีความสุขมากกว่าเดิมน่ะค่ะ..."
1005605-91 = "[s5] \"ได้อยู่แล้ว! เรียกหาครูได้ตลอดเลย!\"\n[s6] \"ครูพร้อมช่วยเซรินะทุกเมื่อเลย!\""
1005605-97 = "แหะๆๆ... ขนาดนั้นเลยเหรอคะ..."
1005605-98 = "ถ้างั้นก็... สัญญาแล้วนะคะ?"
1005605-99 = "ฉันเป็นคนความจำดีนะคะ เพราะงั้นถึงคุณครูจะแกล้งลืมก็ไม่มีประโยชน์หรอกนะคะ"
1005605-100 = "ขอบคุณนะคะคุณครู"
1005605-101 = "พอมีคุณครูอยู่... ฉันเลยโล่งใจน่ะค่ะ"
1005605-103 = "(จากนั้นคุณครูกับเซรินะที่ดูเขินอายอย่างไม่รู้สาเหตุก็กลับมาที่ชาเล่ต์ด้วยกัน)"

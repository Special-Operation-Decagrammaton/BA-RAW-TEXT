1005605-37 = "4;세리나 산타ND;02;산타들이 와 준 것만으로 이미 충분히 선물이 되셨다고요?\n#4;em;[?]"
1005605-38 = "4;세리나 산타ND;01;그렇지만 저희가 준비한 선물도 받아 보셔야죠. 어느 게 좋으세요?"
1005605-39 = "4;세리나 산타ND;00;그럼 오른쪽 선물로 하겠습니다! 메리 크리스마스!\n#4;em;[음표]"

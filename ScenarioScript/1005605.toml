[translation]
1005605-1 = "一日救護騎士團體驗"
1005605-8 = "啊，老師！這裡！"
1005605-12 = "不好意思，讓老師特地跑一趟。"
1005605-13 = "[s]「不會不會，辛苦的是芹奈啊。」"
1005605-14 = "啊哈哈，雖然這麼說或許也沒錯……"
1005605-15 = "不過老師能來，我很高興。"
1005605-21 = "聖特蕾莎綜合醫院．病房"
1005605-22 = "大家好！#n聖誕老人來了唷～！"
1005605-23 = "有沒有人想要禮物呀～？#n當然，健康是最好的禮物哦！"
1005605-24 = "喔喔，是聖誕老人芹奈醬，#n居然會到醫院來，真令人高興。"
1005605-25 = "妳身後的是夏萊的老師扮成的聖誕老人嗎？#n辛苦了。"
1005605-26 = "既然來了兩位聖誕老人。#n看來禮物會非常足夠呢。"
1005605-27 = "嗯，當然！"
1005605-29 = "啊，話說你的手受傷了呢……#n我來幫你拆禮物，請交給我吧。"
1005605-30 = "確，確實，聖誕老人自己拆開禮物，#n看起來有點不可思議呢……"
1005605-31 = "裡面會是什麼呢……？"
1005605-35 = "鏘鏘～！怎麼樣，喜歡嗎？"
1005605-37 = "光是聖誕老人們能來，就已經是夠大的禮物了所以很開心……？"
1005605-38 = "呵呵，那就更開心一點吧！#n你喜歡哪個呢？"
1005605-39 = "啊，那這個給你！#n聖誕快樂！"
1005605-41 = "在那之後有好好吃飯嗎？"
1005605-42 = "不聽話的病患是拿不到禮物的唷？"
1005605-43 = "要好好接受治療、好好吃飯！"
1005605-44 = "可以答應我嗎……？#n來，這是給你的禮物！"
1005605-46 = "（於是芹奈俐落地進行著救護騎士團和聖誕老人的工作）"
1005605-47 = "（因為芹奈實在太能幹了，我幾乎幫不上什麼忙……）"
1005605-51 = "聖特蕾莎綜合醫院．大廳"
1005605-53 = "[ns]「芹奈每天都這麼忙嗎……？」"
1005605-54 = "今天是因為還有聖誕老人的工作，#n並不是每天都忙成這樣的……"
1005605-55 = "還好嗎，老師？"
1005605-56 = "會不會累？"
1005605-57 = "……嗯，那就好。"
1005605-58 = "[s]「仔細想想，要兼顧學業和救護騎士團的工作很辛苦吧……」"
1005605-59 = "是，是嗎？#n因為很長一段時間都是這樣了，其實也不太會那麼想……"
1005605-60 = "只是感覺每天都在做該做的事情而已。"
1005605-61 = "校園生活很快樂。#n被他人所需要，做著許多事。"
1005605-62 = "救護騎士團的工作很有成就感。#n一天結束後，就會覺得自己今天也很努力了。"
1005605-63 = "兩邊都是我喜歡的事，所以很開心。"
1005605-64 = "[s1]「雖然妳常常對我說『別勉強』……」\n[s2]「芹奈也別勉強哦……？」"
1005605-67 = "這，這麼說來確實是那樣呢……"
1005605-68 = "但是，嗯，沒問題的。"
1005605-69 = "如果覺得很辛苦，覺得自己快不行了的時候……#n那個時候，我會馬上跟老師聯絡的。"
1005605-74 = "話說回來，今天老師為什麼會突然想要參加呢……？"
1005605-75 = "[s3]「沒有什麼特別的理由哦。」\n[s4]「只是想更了解芹奈和救護騎士團而已。」"
1005605-78 = "咦，咦……！？"
1005605-79 = "怎，怎麼會，怎麼這麼突然……"
1005605-80 = "那個，總覺得，好害羞……#n超害羞的……"
1005605-81 = "……"
1005605-86 = "那個，老師？"
1005605-87 = "那個……"
1005605-88 = "這樣的話，那個……"
1005605-89 = "下次，還可以請老師幫忙嗎？"
1005605-90 = "今天也是，能和老師一起度過……#n我很開心……"
1005605-91 = "[s5]「當然，隨時都可以跟我說。」\n[s6]「不論何時何地哦。」"
1005605-97 = "非，非常感謝。"
1005605-98 = "那……約好了喔？"
1005605-99 = "我是不會忘記的哦？#n之後不可以說「我忘記了」唷？"
1005605-100 = "……老師。"
1005605-101 = "老師能這樣對待我……我真的好開心。"
1005605-103 = "（和滿臉通紅的芹奈一起回到了夏萊）"

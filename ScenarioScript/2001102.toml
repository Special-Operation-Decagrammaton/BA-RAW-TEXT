[translation]
2001102-1 = "巫女的學習"
2001102-2 = "（前往和茜香約好的地點……）"
2001102-3 = "啊，老師！這邊這邊。"
2001102-4 = "那個，總之先謝謝老師今天過來。"
2001102-5 = "明明聽說最近夏萊的工作比平常還要忙碌……"
2001102-6 = "[s1] 「茜香找我的話，無論何時都會趕來的哦。」\n[s2] 「沒關係，我喜歡被茜香呼來喚去的嘛！」"
2001102-7 = "是，是嗎……？"
2001102-8 = "[s3] 「當然囉。」"
2001102-9 = "呃……等，等等！？那難道是指，我，我很，特別的意思嗎……！？"
2001102-10 = "突，突然說那種話，該說我會有點困擾嗎，呃，呃……！？"
2001102-11 = "[s4] 「茜香是重要的學生啊。」"
2001102-12 = "…………咦？"
2001102-13 = "……只有字面上的意思嗎？"
2001102-14 = "唔，唔唔……！"
2001102-15 = "真是的，不要說那種會讓人誤會的話！"
2001102-16 = "真是的……！"
2001102-17 = "等，等等！我哪有把老師呼來喚去……"
2001102-18 = "……不對，好像還真的做過，嗯……"
2001102-19 = "總，總之我很抱歉！但是現在……！"
2001102-20 = "我，我有在反省了……"
2001102-21 = "[s5]「抱歉，剛才是開玩笑的。只要茜香找我的話隨時都會來的哦。」"
2001102-22 = "……蛤？"
2001102-23 = "那我剛剛的自我反省算什麼！？"
2001102-24 = "剛才感到抱歉的我真是笨蛋……！真是的！"
2001102-26 = "啊啊真是的……還沒開始就已經累了……"
2001102-27 = "[s] 「呃，我很抱歉？」"
2001102-28 = "唉，算了……老師果然還是老樣子……"
2001102-29 = "而且，老師是為了陪我商量才來的，這也是事實對吧？"
2001102-30 = "這點我還是很感謝你的……"
2001102-31 = "[s] 「茜香果然很溫柔呢！」"
2001102-32 = "啊啊真是的，吵死了！話都講不下去了，安靜聽我說！"
2001102-33 = "總之回到主題！"
2001102-34 = "就像MomoTalk上說的一樣，這次我想要做一份巫女的打工。"
2001102-35 = "果然跟一般的打工不太一樣對吧？"
2001102-36 = "所以如果老師多少了解一點的話，我想聽聽老師的意見……"
2001102-37 = "啊，但在那之前，我有自己先去調查一些跟巫女相關的事。"
2001102-47 = "首先，說到巫女的起源──"
2001102-48 = "[s6] 「要從那裡開始說嗎！？」\n[s7] 「茜香，有時候做事還挺極端的呢……」"
2001102-49 = "咦，不行嗎……？"
2001102-50 = "咦，不行嗎……？"
2001102-51 = "啊，還是你想先問我選這份工作的理由？"
2001102-52 = "也沒什麼大不了的啦。"
2001102-53 = "其實這次的巫女打工，有「巫女扮得越完美，時薪就越高」的規定哦！"
2001102-54 = "這種好機會當然不能放過吧！？"
2001102-55 = "[s] 「還真像是茜香的作風呢……」"
2001102-56 = "總之，我想盡量多了解與巫女有關的事。"
2001102-57 = "為了更高的薪水，就需要成為更完美的巫女！所以教教我吧，老師。"
2001102-58 = "（茜香的雙眼因為熱忱而閃閃發光……）"
2001102-59 = "[s]「巫女啊……首先，說到巫女的話──」"
2001102-61 = "（去附近的商店借了打掃工具）"
2001102-63 = "……掃帚？"
2001102-64 = "怎麼這麼突然……？這和巫女有什麼關係嗎？"
2001102-65 = "[s8] 「說到巫女就會想到掃帚對吧！」\n[s9] 「說到掃帚就只能想到巫女和魔女了對吧！」"
2001102-66 = "是，是這樣嗎……？嘛，老師都這麼說的話應該是吧……"
2001102-67 = "是，是這樣嗎……？嘛，老師都這麼說的話應該是吧……"
2001102-68 = "所以，要用這個做什麼啊？"
2001102-69 = "[s] 「那當然是，打掃呀！」"
2001102-70 = "……啊，真的就只要這樣啊。話說回來，真的只要這樣就好了嗎？"
2001102-71 = "唔嗯，算了，想太多也沒用…… "
2001102-73 = "嗯，總之先試試看吧！"
2001102-76 = "那就先從這邊開始……"
2001102-79 = "嘿咻，嘿咻……！"
2001102-82 = "把落葉和垃圾，集中起來……"
2001102-84 = "[s] 「嗯，感覺不錯！」"
2001102-85 = "是，是嗎？那就好……"
2001102-87 = "感覺好像沒有加深對巫女的理解啊……？"
2001102-89 = "（因為茜香的活躍，公園變得乾淨多了）"
2001102-91 = "呼，這樣差不多可以了吧？那麼老師，接下來該做什麼呢？"
2001102-92 = "[s] 「接下來是……御幣！」"
2001102-93 = "御幣……？"
2001102-98 = "咦，咦？老師？"
2001102-101 = "這個棍子末端黏著好幾張紙的東西……這就是御幣嗎？嗯，以前好像有看過，不過不知道這東西的名字。"
2001102-102 = "所以，要用它做什麼呢？"
2001102-103 = "……握著它一邊跳舞一邊祈福？什麼意思……？"
2001102-104 = "[s] 「總之先這麼做吧！不，請這麼做吧！」"
2001102-105 = "就，就算你這麼說……唔嗯……"
2001102-107 = "像，"
2001102-109 = "像這樣嗎……？"
2001102-110 = "唔嗯，果然還是不太懂……剛剛那樣可以嗎？"
2001102-111 = "[s] 「完美！那下一個是……」"
2001102-113 = "（這之後也和茜香討論了很多關於巫女的事，也請茜香做了很多「像巫女的事情」）"
2001102-114 = "「符卡」……？咦，那是什麼，跟巫女有關係嗎？"
2001102-115 = "收集四散的玉碎片……？咦，弓箭？什麼意思？"
2001102-119 = "……這是，甜酒？咦，不能直接喝嗎？為什麼？"
2001102-121 = "（就這樣，大約經過3小時的熱烈討論……）"
2001102-122 = "[s] 「……這樣應該差不多了吧？」"
2001102-123 = "好，好累……比普通的打工還累……"
2001102-124 = "成為巫女的心理準備……"
2001102-125 = "沒想到竟然這麼困難……"
2001102-126 = "不過這樣巫女打工應該就沒問題了吧！？"
2001102-127 = "雖然沒有全部都學會，但這種程度的話……！"
2001102-128 = "[s] 「怎麼說呢……其實，那個……」"
2001102-130 = "（老實地向茜香坦白了）"
2001102-132 = "……咦，老師說的全都是遊戲或動畫中學來的？"
2001102-133 = "[s] 「所以不要太在意。搞不好也有人喜歡這種的。」"
2001102-134 = "……"
2001102-135 = "[s] 「呃……茜香同學？」"
2001102-137 = "……老師？所以你的意思是……"
2001102-138 = "你從頭到尾都在捉弄我？是這樣對吧！？"
2001102-139 = "唔唔，虧我這麼相信老師！就連口嚼酒應該要嚼多少次都記住了！"
2001102-140 = "[s] 「不愧是茜香，真是認真呢……」"
2001102-141 = "啊啊真是的！！笨蛋！老師這個笨蛋！"
2001102-143 = "真的是夠了……"
2001102-144 = "什麼跟什麼嘛，動畫的知識又沒有用……"
2001102-145 = "增加了一堆奇怪的知識……"
2001102-146 = "[s] 「抱歉，我只是想說應該多少會有些幫助……」"
2001102-147 = "咦咦……你這樣說也太狡猾了吧……"
2001102-148 = "唉……"
2001102-149 = "這樣與其說是商量，不如說只是單獨兩個人玩了一整天而已……"
2001102-150 = "……單獨兩個人，嗎。"
2001102-152 = "哈！？"
2001102-153 = "我，我不是這個意思，才沒有說是約會之類的哦！？"
2001102-154 = "別誤會了啊！？"
2001102-155 = "[s] 「嗯，沒事的。」"
2001102-156 = "……"
2001102-157 = "這麼說也不太對吧！稍微誤會一下也沒關係吧！"
2001102-158 = "啊啊真是的，你這個大木頭！"
2001102-160 = "（之後一邊被茜香敲著後背，一邊聊著跟巫女有關的話題）"

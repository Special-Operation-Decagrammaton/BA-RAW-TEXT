[translation]
2001102-1 = "Part-Time Prep"
2001102-2 = "I arrived at the meeting spot on time, as I promised I would."
2001102-3 = "Oh, over here, Sensei."
2001102-4 = "Ahem, first of all, thank you for agreeing to talk with me today, Sensei."
2001102-5 = "I know you're usually pretty busy with work..."
2001102-6 = "[s1] \"You called me, so of course I had to come.\"\n[s2] \"I've been swayed by you several times, so it's okay.\""
2001102-7 = "Huh? What do you mean?"
2001102-8 = "[s3] \"I mean that you're special.\""
2001102-9 = "S-Special... Me?! Sensei!"
2001102-10 = "How am I supposed to react when you say something so strange, out of nowhere?! Are you saying that...?!"
2001102-11 = "[s4] \"Of course. Serika, you're an invaluable student.\""
2001102-12 = "...Eh?"
2001102-13 = "That's all you meant?"
2001102-14 = "U-Ughhh!"
2001102-15 = "D-Don't say things that might give people the wrong idea! I almost misunderstood!"
2001102-16 = "Ugh! Seriously!"
2001102-17 = "...Huh? I have a way with people? I'm...persuasive?! Wh-When have I ever—"
2001102-18 = "Um, actually, I guess there have been times when I did do that."
2001102-19 = " A-Anyway, that's all in the past! I-I'm sorry! "
2001102-20 = "I-I guess I've got a lot to reflect on."
2001102-21 = "[s5] \"Sorry, I was just kidding. I'll come whenever you call me.\""
2001102-22 = "What? You were kidding?"
2001102-23 = "You even made me feel bad for my behavior!"
2001102-24 = "I was actually, genuinely sorry for a moment there! Y-You idiot!"
2001102-26 = "Ugh... I'm exhausted, and we haven't even started yet. Seriously!"
2001102-27 = "[s] \"I got carried away. I'm sorry.\""
2001102-28 = " *sigh*...Seriously, Sensei?"
2001102-29 = "Well, whatever. I guess you came all the way to help me."
2001102-30 = "I-I am really grateful for that."
2001102-31 = "[s] \"You're too kind, Serika!\""
2001102-32 = "Wh-What?! Why are you turning it into a big deal?!"
2001102-33 = "Quit trying to embarrass me! Let's get to the main point!"
2001102-34 = "Like I said earlier on MomoTalk, I had some questions about my part-time job as a miko."
2001102-35 = "It's not really a normal part-time job, you know?"
2001102-36 = "Since I don't know much about how to be a miko, I wanted to get some advice from you, Sensei."
2001102-37 = "So! I've done some research on my own on what a miko is."
2001102-47 = "To begin, the origin of the miko..."
2001102-48 = "[s6] \"You're starting from their origin?!\"\n[s7] \"Serika, are you planning to write an encyclopedia on mikos?\""
2001102-49 = "H-Huh? What's wrong with that?"
2001102-50 = "H-Huh? What's wrong with that?"
2001102-51 = "Wh-Why am I digging so deeply into mikos?"
2001102-52 = "Well, it's not really for any important reason..."
2001102-53 = "The thing is...if I play the miko role perfectly at the event, I'll get paid more!"
2001102-54 = "...but how could I not be motivated by that?!"
2001102-55 = "[s] \"That's very like you, Serika.\""
2001102-56 = "Anyway, I found a lot of it a little confusing, so please teach me, Sensei."
2001102-57 = "Teach me how to become the perfect miko so I can get more pay!"
2001102-58 = "(Serika's eyes twinkled with intense fervor.)"
2001102-59 = "[s] \"That's the first thing that comes to mind when I think of mikos.\""
2001102-61 = "(I went to a nearby store and borrowed some cleaning supplies.)"
2001102-63 = "Is this...a broom?"
2001102-64 = "What does this have to do with being a miko at all?!"
2001102-65 = "[s8] \"When you think of mikos, obviously you think of brooms!\"\n[s9] \"Brooms are tools of mikos and witches!\""
2001102-66 = "I-I don't know about that, but if you say so, Sensei. I trust you."
2001102-67 = "I-I don't know about that, but if you say so, Sensei. I trust you."
2001102-68 = "So, what am I supposed to do with this?"
2001102-69 = "[s] \"Well, clean of course!\""
2001102-70 = "C-Clean? I mean, that makes sense, but it's so simple."
2001102-71 = "No, no. I shouldn't be complicating things. "
2001102-73 = "Okay! I'll start cleaning just like you said, Sensei!"
2001102-76 = "Just sweep slowly from here..."
2001102-79 = "*sweep* *sweep*"
2001102-82 = "Sweep the scattered leaves... Don't miss the trash on the floor."
2001102-84 = "[s] \"Yep! You're looking more and more like a miko, Serika!\""
2001102-85 = "Y-Yeah? I mean, that's good I guess."
2001102-87 = "But...does this really help me be a better miko??"
2001102-89 = "(Thanks to Serika's outstanding cleaning skills, the park became really clean!)"
2001102-91 = "Phew. I think that's enough cleaning. Okay, what's next, Sensei?"
2001102-92 = "[s] \"The second important thing for a miko is...a gohei!\""
2001102-93 = "G-Gohei...?!"
2001102-98 = "W-Wait. Sensei?"
2001102-101 = "This...gohei is a tool with paper attached to the end of a wand, right?"
2001102-102 = "What do I do?!"
2001102-103 = "I'm supposed to shake it while I dance or give blessings? Um, I don't know how..."
2001102-104 = "[s] \"Miko Serika, please bless me!\""
2001102-105 = "Wh-What? Sensei, stop embarrassing me! "
2001102-107 = "L-Like this?"
2001102-109 = "Or like this?"
2001102-110 = "I-I don't know what I'm doing!"
2001102-111 = "[s] \"Here's what's next!\""
2001102-113 = "After that, I explained more about what a miko's role is to Serika."
2001102-114 = "The next most important thing is a s-spell card?"
2001102-115 = "I have to go on a journey to collect the scattered pieces of a special jewel? What kind of jewel?!"
2001102-119 = "And in order to revive the village, I have to make alcohol by chewing rice? Is that even...? Sensei?!"
2001102-121 = "The discussion continued for another intense three hours."
2001102-122 = "[s] \"Phew... That was a fruitful lesson.\""
2001102-123 = "Oh, uh, wow..."
2001102-124 = "There are so many things..."
2001102-125 = "I have to consider as a miko... I-I didn't know."
2001102-126 = "B-But with this, I-I should be prepared, right?! I hope?"
2001102-127 = "I can't say I've mastered it perfectly, but if I try hard...!"
2001102-128 = "[s] \"Um, so Serika, the thing is...\""
2001102-130 = "I couldn't bear to see Serika so flustered, so I told her the truth."
2001102-132 = "What? Everything you told me so far was from games, manga, and anime?"
2001102-133 = "[s] \"...Yes.\""
2001102-134 = "..."
2001102-135 = "[s] \"S-Serika?\""
2001102-137 = "Sensei? So what you're telling me is..."
2001102-138 = "You were messing with me this whole time. This whole time?!"
2001102-139 = "Ugh! I trusted you! I even chewed rice until my jaw hurt! That's a thing I did!"
2001102-140 = "[s] \"I-I'm sorry! I have nothing to say!\""
2001102-141 = "ARRRGH!"
2001102-143 = "*sigh* I mean, seriously...!"
2001102-144 = "If you didn't know, you should've just been honest!"
2001102-145 = "You just wasted my time talking about weird things!"
2001102-146 = "[s] \"I wanted to be of help to Serika at any cost!\""
2001102-147 = "Hmph. If you put it that way, then I can't be that mad I guess."
2001102-148 = "*sigh* Sensei..."
2001102-149 = "I wasted my whole day with you, Sensei! It wasn't even a counseling session or anything. We just messed around all day."
2001102-150 = "Yeah, just the two of us...alone...together."
2001102-152 = " ...Huh?!"
2001102-153 = "W-Wait, just the two of us? I-I didn't mean that it was like a date or something weird! "
2001102-154 = "You absolutely cannot have that misunderstanding!"
2001102-155 = "[s] \"Yup! I definitely, absolutely, 100% won't misunderstand!\""
2001102-156 = "..."
2001102-157 = "Well, I mean you can misunderstand a l-little bit."
2001102-158 = "Ugh! Seriously!"
2001102-160 = "(I barely managed to calm down Serika, who continued to angrily hit me on the back.)"

[translation]
2001102-1 = "ศึกษางานพาร์ทไทม์"
2001102-2 = "(คุณครูออกมาที่สถานที่นัดเจอกับเซริกะตามเวลาที่นัดไว้)"
2001102-3 = "อ๊ะ ทางนี้ๆ คุณครู"
2001102-4 = "ขอบคุณที่จะมาให้คำปรึกษานะ คุณครู"
2001102-5 = "ทั้งที่ปกติคุณครูก็ยุ่งมากเพราะงานของชาเล่ต์แท้ๆ..."
2001102-6 = "[s1] \"เซริกะเรียกทั้งที ครูต้องมาอยู่แล้วสิ!\"\n[s2] \"เซริกะก็ชวนมาหลายรอบแล้ว ไม่เป็นไรหรอก!\""
2001102-7 = "หืม...? หมายความว่ายังไงน่ะ"
2001102-8 = "[s3] \"หมายความว่าเซริกะพิเศษไงล่ะ\""
2001102-9 = "ฉันพิเศษงั้นเหรอ?! ดะ...เดี๋ยวสิ คุณครู!"
2001102-10 = "จะ...จู่ๆ มาพูดอะไรแปลกๆ แบบนี้มันลำบากนะ...! แล้วที่พูดนั่นหมายความว่ายังไง?"
2001102-11 = "[s4] \"อื้อ เซริกะเป็นนักเรียนคนสำคัญของครูไงล่ะ!\""
2001102-12 = "เอ๊ะ...?"
2001102-13 = "คุณครูพูดจริงเหรอ?"
2001102-14 = "อึ่ก...!"
2001102-15 = "ยะ...อย่ามาพูดอะไรกำกวมให้คนอื่นเข้าใจผิดสิ! ฉันเกือบเข้าใจผิดเลยเห็นมั้ย!"
2001102-16 = "เฮ้อ จริงๆ เลยเชียว!"
2001102-17 = "ดะ...เดี๋ยวสิ! ฉันเนี่ยนะชวน? เมื่อไรน่ะ...!"
2001102-18 = "ก็แค่บางครั้งเองนะ"
2001102-19 = "เอาเถอะ มันก็เป็นเรื่องในอดีตไปแล้วนี่! ตอนนี้ฉันก็เสียใจกับเรื่องนั้นเหมือนกัน...!"
2001102-20 = "ฉะ...ฉันเองก็รู้สึกผิดอยู่เหมือนกันนะ..."
2001102-21 = "[s5] \"โทษที ครูล้อเล่นน่ะ เรียกเมื่อไรก็จะมาแน่\""
2001102-22 = "หืม...? ล้อเล่นเหรอ?"
2001102-23 = "ฉันอุตส่าห์นึกเสียใจกับสิ่งที่ทำลงไปแท้ๆ"
2001102-24 = "มะ...เมื่อกี้ฉันรู้สึกผิดจริงๆ ด้วยเลยนะ! คุณครูคนบ้า!"
2001102-26 = "ละ... เล่นเอารู้สึกหมดแรงตั้งแต่ยังไม่เริ่มเลยนะ ให้ตายสิ.."
2001102-27 = "[s] \"ครูตื่นเต้นเกินไปหน่อยน่ะ ขอโทษนะ...\""
2001102-28 = "เฮ้อ คุณครูนี่จริงๆ เลย..."
2001102-29 = "แต่ก็ช่างเถอะ เพราะยังไงคุณครูก็มาช่วยฉันนี่นา"
2001102-30 = "เรื่องนั้นฉันก็รู้สึกขอบคุณนะ..."
2001102-31 = "[s] \"เซริกะอ่อนโยนจังเลยนะ!\""
2001102-32 = "อะไรเนี่ย! จู่ๆ ก็เสียงดังอะไรอีกเล่า!"
2001102-33 = "ช่างเถอะ! เลิกคุยเรื่องน่าอายกันเท่านี้เถอะ! มาคุยธุระกันได้แล้ว!"
2001102-34 = "อย่างที่บอกไปใน MOMOTALK ที่ฉันเรียกคุณครูออกมาก็เพราะอยากถามเรื่องงานพาร์ทไทม์#nที่ต้องแต่งเป็นมิโกะน่ะ"
2001102-35 = "คือว่า... มันไม่ใช่งานพาร์ทไทม์ทั่วๆ ไปใช่ไหมล่ะ?"
2001102-36 = "แถมฉันยังไม่รู้ว่ามิโกะต้องทำอะไรบ้าง เลยอยากขอคำแนะนำจากคุณครูหน่อย"
2001102-37 = "อ๊ะ! ฉันก็ลองหาข้อมูลเกี่ยวกับมิโกะมาบ้างเหมือนกันนะ"
2001102-47 = "เริ่มจากต้นกำเนิดของมิโกะ..."
2001102-48 = "[s6] \"จะเริ่มจากตรงนั้นเลยเรอะ?!\"\n[s7] \"เซริกะ คิดจะเขียนสารานุกรมมิโกะเหรอ?\""
2001102-49 = "หะ...หืม...? ฉันทำอะไรผิดเหรอ?"
2001102-50 = "หืม? เปล่าสักหน่อย ฉันทำอะไรผิดเหรอ?"
2001102-51 = "ทำไมถึงค้นคว้าเรื่องมิโกะเยอะแบบนี้น่ะเหรอ?"
2001102-52 = "คือว่าเรื่องนั้น... มันก็ไม่ใช่เหตุผลสำคัญอะไรหรอก..."
2001102-53 = "เรื่องของเรื่องคือมันมีเขียนไว้ในกำหนดการของงานเทศกาลน่ะ ว่าถ้าสวมบทเป็นมิโกะได้อย่างสมบูรณ์แบบ#nจะได้รับเงินค่าจ้างเพิ่มขึ้น!"
2001102-54 = "แบบนี้จะไม่ให้สนใจได้ยังไงเล่า?!"
2001102-55 = "[s] \"สมกับเป็นเซริกะจริงๆ\""
2001102-56 = "แต่ว่ามีหลายๆ เรื่องที่ฉันไม่ค่อยเข้าใจ ยังไงก็ช่วยสอนฉันหน่อยนะ คุณครู"
2001102-57 = "ช่วยสอนวิธีการเป็นมิโกะที่สมบูรณ์แบบให้ทีนะ ฉันจะได้เงินค่าจ้างเยอะขึ้นไงล่ะ!"
2001102-58 = "(รู้สึกเหมือนเห็นไฟลุกโชนในแววตาของเซริกะ)"
2001102-59 = "[s] \"ถ้าเป็นมิโกะ อย่างแรกก็ต้องมี \"ไอ้นั่น\" สิ\""
2001102-61 = "(คุณครูแวะเข้าไปที่ร้านขายของใกล้ๆ และยืมอุปกรณ์ทำความสะอาดมา)"
2001102-63 = "นี่มัน... ไม้กวาดไม่ใช่เหรอ?"
2001102-64 = "เอาไม้กวาดมาทำไมกัน? มันเกี่ยวอะไรกับงานพาร์ทไทม์เหรอ?"
2001102-65 = "[s8] \"ถ้าพูดถึงมิโกะก็ต้องมีไม้กวาด...!\"\n[s9] \"ถ้ามีไม้กวาดก็เป็นได้ทั้งมิโกะแล้วก็แม่มดเลยนะ!\""
2001102-66 = "หืม...? ถึงจะไม่ค่อยเข้าใจเท่าไร แต่ถ้าคุณครูว่าอย่างนั้นก็เอาตามนั้นล่ะ"
2001102-67 = "หืม...? ถึงจะไม่ค่อยเข้าใจเท่าไร แต่ถ้าคุณครูว่าอย่างนั้นก็เอาตามนั้นล่ะ"
2001102-68 = "แล้วฉันควรเอาไม้กวาดนี่มาทำอะไรต่อล่ะ?"
2001102-69 = "[s] \"ไม้กวาดก็ต้องใช้ทำความสะอาดสิ!\""
2001102-70 = "ทะ... ทำความสะอาด? มันก็ฟังดูเข้าท่าอยู่หรอก แต่งานมันง่ายขนาดนี้เลยเหรอ?"
2001102-71 = "ช่างเถอะๆ ไม่ใช่เวลาที่จะมานั่งคิดอะไรให้ซับซ้อนเกินไปสักหน่อย"
2001102-73 = "อื้อ! งั้นฉันจะทำความสะอาดตามที่คุณครูบอกเลยแล้วกัน"
2001102-76 = "ค่อยๆ กวาดไปจากตรงนี้..."
2001102-79 = "ฮึบ... ฮึบ... ฮึบ!"
2001102-82 = "ใบไม้ที่หล่นกระจายอยู่ตรงนี้กับขยะที่อยู่บนพื้น... กวาดมากองรวมไว้ให้สะอาด..."
2001102-84 = "[s] \"อื้อ! ค่อยๆ ดูมีอินเนอร์มิโกะขึ้นมาแล้ว! เซริกะ!\""
2001102-85 = "งะ...งั้นเหรอ? ถ้างั้นก็ค่อยยังชั่วหน่อย..."
2001102-87 = "ทำแบบนี้... จะช่วยให้ฉันเป็นมิโกะได้สมจริงขึ้นจริงๆ เหรอเนี่ย?"
2001102-89 = "(ด้วยทักษะการทำความสะอาดขั้นเซียนของเซริกะ ไม่นานสวนก็ดูสะอาดตาขึ้นมาก)"
2001102-91 = "ฮู่ว... เท่านี้เรื่องทำความสะอาดก็คงเรียบร้อยแล้วสินะ? เอาล่ะ คุณครู ต่อไปคืออะไรเหรอ?"
2001102-92 = "[s] \"สิ่งสำคัญอย่างที่สองของมิโกะก็คือ... โกเฮ!\""
2001102-93 = "กะ...โกเฮ? คืออะไรน่ะ?"
2001102-98 = "ดะ... เดี๋ยวก่อนนะ คุณครู?"
2001102-101 = "นี่น่ะเหรอ โกเฮ... อุปกรณ์ที่มีพุ่มกระดาษติดอยู่ปลายแท่งไม้เนี่ยนะ?"
2001102-102 = "แล้วต้องใช้มันทำอะไรล่ะ?"
2001102-103 = "เอ่อ... แค่โบกไปโบกมา แล้วก็พูดคำอวยพรก็พองั้นเหรอ...? ไม่ค่อยเข้าใจเลยแฮะ...?"
2001102-104 = "[s] \"ท่านมิโกะเซริกะ! ได้โปรดอวยพรให้เราด้วย!\""
2001102-105 = "หะ...หืม? จู่ๆ มาพูดอะไรน่าอายแบบนี้เนี่ย!"
2001102-107 = "บะ...แบบนี้เหรอ?"
2001102-109 = "แบบนี้รึเปล่านะ?"
2001102-110 = "อืม... ไม่รู้แฮะ"
2001102-111 = "[s] \"แล้วต่อไปก็ต้องอันนี้!\""
2001102-113 = "(หลังจากนั้น คุณครูก็ได้พูดคุยกับเซริกะเรื่องมิโกะต่อ)"
2001102-114 = "สิ่งสำคัญเรื่องต่อไปสำหรับกับมิโกะ... กะ...การ์ดเวทมนตร์?"
2001102-115 = "ฉันจะต้องออกเดินทางไปตามหาเศษชิ้นส่วนของลูกแก้ววิเศษเหรอ...? ลูกแก้ววิเศษอะไรกันเนี่ย?!"
2001102-119 = "ฉันจะต้องเคี้ยวเมล็ดข้าวแล้วเอามาทำเหล้า เพื่อใช้ฟื้นฟูหมู่บ้าน?! นี่มันอะไรกันเนี่ย... คุณครู?!"
2001102-121 = "(หลังจากนั้นก็คุยเรื่องมิโกะกันอย่างดุเดือดต่ออีกสามชั่วโมง)"
2001102-122 = "[s] \"เฮ้อ... เป็นการพูดคุยที่คุ้มค่าจริงๆ\""
2001102-123 = "เอ่อ..."
2001102-124 = "สิ่งจำเป็นสำหรับมิโกะมีเยอะจริงๆ เลยนะ"
2001102-125 = "ฉันไม่คิดเลยว่ามันจะยากขนาดนี้..."
2001102-126 = "ตะ...แต่ยังไงก็เถอะ ฉันควรจะต้องเตรียมตัวให้พร้อมเอาไว้ก่อน หวังว่าฉันจะทำได้นะ..."
2001102-127 = "ฉันคงยังไม่กล้าพูดหรอกว่าเชี่ยวชาญเรื่องมิโกะแล้ว แต่ฉันจะพยายาม...!"
2001102-128 = "[s] \"เอ่อ... คือว่าเซริกะ...\""
2001102-130 = "(คุณครูเห็นท่าทางของเซริกะที่ดูกังวลก็เลยพูดความจริงออกไป)"
2001102-132 = "อะไรนะ? เรื่องทั้งหมดที่เล่ามาจนถึงตอนนี้... ทั้งหมดเป็นเรื่องที่มาจากเกม การ์ตูน#nแล้วก็แอนิเมชั่นงั้นเหรอ...?"
2001102-133 = "[s] \"ใช่...\""
2001102-134 = "..."
2001102-135 = "[s] \"ทะ...ท่านมิโกะเซริกะ?\""
2001102-137 = "คุณครู? งั้นหมายความว่า..."
2001102-138 = "คุณครูล้อเล่นมาตลอดเลยงั้นเหรอ?!"
2001102-139 = "ฉะ... ฉันอุตส่าห์เชื่อเลยนะ! ฉันอุตส่าห์นั่งคิดเลยนะว่าจะต้องเคี้ยวข้าวยังไงน่ะ!"
2001102-140 = "[s] \"ขะ...ขอโทษจริงๆ ครูผิดไปแล้ว!\""
2001102-141 = "โอ๊ยยยยย!!"
2001102-143 = "เฮ้อออออ... จริงๆ เชียว..."
2001102-144 = "ถ้าไม่รู้ก็บอกมาตั้งแต่แรกเลยสิว่าไม่รู้น่ะ"
2001102-145 = "เอาแต่เล่าเรื่องแปลกๆ ทำให้เสียเวลาไปซะเยอะเลย..."
2001102-146 = "[s] \"ไม่ว่ายังไงครูก็อยากช่วยเซริกะให้ได้นี่นา!\""
2001102-147 = "พูดขนาดนี้แล้วฉันจะโกรธคุณครูลงได้ยังไง"
2001102-148 = "เฮ้อ... จริงๆ เลยเชียว"
2001102-149 = "สุดท้ายก็เสียเวลาเที่ยวเล่นกับคุณครูกันสองคนไปทั้งวันเลย ไม่ได้ปรึกษาอะไรเลยสักนิดเดียว"
2001102-150 = "คะ... แค่สองคน... แค่สองคน... สอง...คน..."
2001102-152 = "ฮึ่ก?!"
2001102-153 = "เดี๋ยวก่อนนะ! ฉันไม่ได้หมายถึงเดตหรือหมายถึงเรื่องอะไรแปลกๆ เลยนะ!"
2001102-154 = "ห้ามเข้าใจผิดเด็ดขาดเลยนะ!"
2001102-155 = "[s] \"อื้อ ครูไม่เข้าใจผิดหรอก ไม่ต้องห่วงนะ!\""
2001102-156 = "..."
2001102-157 = "ตะ...แต่ถึงเข้าใจผิดนิดหน่อยก็ได้นะ ฉันก็ไม่ว่าหรอก!"
2001102-158 = "ฮึ่ย คุณครูจริงๆ เลยเชียว!"
2001102-160 = "(จากนั้นเซริกะก็เอาแต่ทุบหลังคุณครูเพื่อระบายความโกรธ ส่วนคุณครูก็ได้แต่พยายามปลอบ#nให้เธอใจเย็นลง)"

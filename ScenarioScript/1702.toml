[translation]
1702-1 = "The Ghost in the Ward Part 2"
1702-2 = "Saint Teresa General Hospital, 4th Floor - Empty Ward"
1702-4 = "Heh heh... I hate you... I hate you...!"
1702-5 = "I'll have my revenge..."
1702-7 = "...Ugh. No one's even around to see me. Maybe I should just drop the ghost act?"
1702-10 = "Ha! The plan worked! I didn't expect they'd close down the ward so quickly... All I had to do was act like a ghost!"
1702-11 = "The patients, doctors, nurses...nobody will even come close to this floor because they're so afraid of the \"ghost.\" Heehee! Now I can do whatever I want!"
1702-12 = "Now let's see if there's anything I can sell to make some easy cash..."
1702-15 = "Wait! Are those footsteps?"
1702-19 = "H-Hanae...are you really gonna keep going? I-I don't think there's anything here..."
1702-20 = "We can't go back until we prove there's no ghost in this ward! The patients are still terrified of this rumor!"
1702-21 = "Why are you only brave in situations like this? Ugh..."
1702-24 = "Who were they? I don't think they're nurses... Volunteer students, maybe?"
1702-26 = "Whoever they are, I won't allow any uninvited guests to interrupt my plans. All I have to do is act like a ghost to scare them away!"
1702-31 = "*gasp* D-Did you see that, Hanae? I saw something move behind the curtain!"
1702-32 = "Huh? I didn't see anything... Maybe a cat came in through the window?"
1702-33 = "Here, kitty kitty! Ps-ps-ps!"
1702-35 = "Heh heh... I hate you... I hate you...!"
1702-36 = "Ahhh! Gh-Gh-Ghost! It's a ghost!"
1702-37 = "Leave this place or I'll steal your soul!"
1702-38 = "Load the bullets with the blue mark into the magazine! Those are the silver bullets I got from the Sisterhood!"
1702-39 = "I was hoping I wouldn't have to use this..."
1702-42 = "I-I'm sorry, Mr. Ghost! Please rest in peace!"
1702-44 = "Wait, what?! You're shooting a gun at me?! What the heck?!"
1702-45 = "Don't you know you're in a hospital?! How could you bring such a dangerous weapon in here? You could really injure someone!"
1702-46 = "Huh? A gun is very useful in a hospital. It can be used as a crutch when someone has an injured leg. It also comes in handy when a patient doesn't wanna get up and needs a little support!"
1702-47 = "Guns are almost like magic. I'd say they're an essential tool in any hospital!"
1702-48 = "But since you're a ghost, you wouldn't get hurt if we shot you, right?"
1702-50 = "Well...Th-That's true, but..."
1702-52 = "Wh-Whoa! Wait!"
1702-53 = "Silver exorcism bullets can be dangerous to the living too! People can get hurt or even die if they get hit by mistake!"
1702-55 = "Huh? I thought ghosts were already dead. How can you die again?"
1702-56 = "I understand you're not ready to cross over to the other side, but you don't belong here! It's time for you to rest in peace!"
1702-59 = "Stop, stop! I can't do this anymore!"
1702-60 = "I-I surrender! Please stop!"
1702-62 = "Even though the fake ghost surrendered, bullets flew for over an hour..."

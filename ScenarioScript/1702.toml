[translation]
1702-1 = "無人病房的幽靈（２）"
1702-2 = "聖德蕾莎綜合醫院．4樓無人區域"
1702-4 = "嗚呵呵……我好恨啊～，我好恨啊～！！"
1702-5 = "我好恨啊……"
1702-7 = "……呿，反正沒有人在看，我也別再演這種噁心的幽靈吧。"
1702-10 = "哼哼，計畫成功。沒想到不過是在晚上扮成幽靈，馬上就讓整層樓人去樓空……"
1702-11 = "不只是病患，連醫師和護理師也因為害怕幽靈完全不敢來這附近，現在我可以大搖大擺地行動了！"
1702-12 = "我看看，先來找找看有沒有可以拿去賣錢的東西……"
1702-15 = "……嗯？腳步聲？"
1702-19 = "花，花繪醬……真，真的要繼續探索嗎？#n這，這裡好像什麼都沒有……"
1702-20 = "不行！在確切證明這層樓沒有幽靈之前，都不可以回去！#n生病的病患們直到現在都還是很害怕！"
1702-21 = "花繪醬怎麼只有在這種時候特別勇敢呢。呃呃……"
1702-24 = "她們是誰？好像不是這間醫院的護理師……#n是來當志工的學生嗎？"
1702-26 = "算了，膽敢妨礙我的計畫，不管是誰都絕不會容忍。#n看我模仿幽靈把你們嚇得半死！"
1702-31 = "嚇！？你，你有聽到嗎，花繪醬？窗簾另一頭好像有東西在動！"
1702-32 = "奇怪耶？那裡剛才什麼都沒有呀……是不是有貓從窗戶進來了？"
1702-33 = "小貓咪，小貓咪～快出來呀～"
1702-35 = "哼哼哼，我好恨啊～，我好恨啊～！"
1702-36 = "呀啊啊啊啊！幽，幽靈！是幽靈！"
1702-37 = "要是不立刻離開這裡，我就要奪走你們的魂魄～！"
1702-38 = "前輩！請把藍色彈匣給我！#n那裡面有從修女會那邊拿來的銀製子彈！"
1702-39 = "可以的話我真不想用這東西……"
1702-42 = "對，對不起，幽靈先生！請，請就此成佛吧！"
1702-44 = "嗚，嗚哇！？#n你，你們怎麼可以冷不防地開槍啊！"
1702-45 = "而且這裡是醫院！用那麼危險的東西，要是傷到人該怎麼辦！"
1702-46 = "咦？槍在醫院可以派上很多用場喔。既可以讓傷患充當拐杖使用，也可以讓裝病的人立刻站起來！"
1702-47 = "槍就像是醫院裡的魔法道具，是不可或缺的！"
1702-48 = "而，而且幽靈不是活人，就算中槍也不會受傷吧……？"
1702-50 = "雖，雖然如此……"
1702-52 = "好痛！等，等一下！"
1702-53 = "就算是驅魔用的銀製子彈，也不代表對活人不會造成傷害！被打中還是會受傷啊！搞個不好還會出人命耶！"
1702-55 = "嗯？幽靈先生你不是已經死了嗎，怎麼還會再死呢？"
1702-56 = "我們明白你對人世還有眷戀，但這裡不是你該待的地方！#n請你乖乖成佛吧！"
1702-59 = "住，住手！好啦我知道了啦！"
1702-60 = "我，我投降！拜託停下來～！"
1702-62 = "之後，即使幽靈（？）已經投降，仍遭受了好一陣子槍林彈雨……"

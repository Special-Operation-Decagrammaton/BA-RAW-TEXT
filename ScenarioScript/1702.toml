1702-1 = "#title;무인 병동의 유령 씨 2"
1702-2 = "#place;성 테레사 종합병원 4층 무인 병동"
1702-3 = "3;가짜 유령;01\n#3;black\n#3;stiff"
1702-4 = "#na;???;으흐흐~ 원망스럽구나~ 원망스러워~!"
1702-5 = "#na;???;원망……."
1702-6 = "3;가짜 유령;01\n#3;black\n#3;em;…"
1702-7 = "#na;???;……쳇, 이제 보는 사람도 없는데 유령 연기는 슬슬 그만둘까."
1702-8 = "3;가짜 유령;01\n#3;black\n#3;greeting\n#wait;450"
1702-9 = "3;가짜 유령;01\n#3;a\n#wait;1000"
1702-10 = "3;가짜 유령;01;후후, 계획은 성공적이군. 한밤중에 유령 흉내를 낸 것 만으로 이렇게나 빨리 병동이 폐쇄될 줄이야…….\n#3;em;[재잘]"
1702-11 = "3;가짜 유령;01;환자는 물론이고, 의사와 간호사들도 유령이 무서워 이 근처에는 얼씬도 하지 않으니, 이제는 마음 놓고 움직일 수 있겠어!\n#3;hophop"
1702-12 = "3;가짜 유령;01;어디 보자. 우선은 팔아서 돈이 될 만한 물건이 없는지 한 번 찾아볼까…….\n#3;m4"
1702-13 = "#wait;500"
1702-14 = "#wait;1000"
1702-15 = "3;가짜 유령;01;으응? 이게 웬 발소리지?\n#3;em;[?!]\n#3;shake"
1702-16 = "3;가짜 유령;01\n#3;dr\n#wait;1000"
1702-17 = "#all;hide"
1702-18 = "5;하나에;01\n1;세리나;04\n#5;a\n#1;a\n#wait;1000"
1702-19 = "1;세리나;04;하, 하나에 쨩…… 저, 정말로 탐색을 계속할 건가요? #n이, 이곳에는 아무것도 없는 것 같은데요…….\n#1;em;[속상함]"
1702-20 = "5;하나에;05;안 돼요! 이 무인 병동에 유령이 없다는 걸 확실하게 증명하기 전까지는 돌아갈 수 없어요. #n지금도 아픈 환자들이 무서워하고 있다고요!\n#5;em;[!]\n#5;hophop"
1702-21 = "1;세리나;04;어째서 하나에 쨩은 이럴 때만 용감한 건가요. 으으…….\n#1;stiff"
1702-22 = "#1;dl\n#5;dl\n#wait;1000"
1702-23 = "#all;hide"
1702-24 = "5;가짜 유령;01;누구지? 이 병원의 간호사들은 아닌 것 같은데…… #n봉사활동을 나온 학생들인가?\n#5;al\n#5;em;[?]"
1702-25 = "5;가짜 유령;01;\n#5;m3\n#wait;1000"
1702-26 = "#5;hide\n3;가짜 유령;01;누가 되었든 간에 이 몸의 계획을 방해하려는 불청객은 용납할 수 없지. #n유령 흉내를 내서 혼비백산하게 만들어 주마!\n#3;closeup\n#3;em;[!]"
1702-27 = "#all;hide"
1702-28 = "1;세리나;04\n#1;ar\n#wait;1000"
1702-29 = "1;세리나;04\n#1;em;…\n#wait;2500"
1702-30 = "#wait;1000\n#bgshake"
1702-31 = "1;세리나;04;히, 히익? 바, 방금 들었어요, 하나에 쨩? 커튼 너머에서 무언가가 움직였어요!\n#1;shake\n#1;em;[?!]"
1702-32 = "2;하나에;02;어라라? 방금 전에는 아무것도 없었는데…… 창문으로 들어온 고양이 씨일까요?\n#2;ar"
1702-33 = "2;하나에;00;고양이 씨, 고양이 씨. 이리 오세요~.\n#2;m3\n#2;hophop\n#2;em;[반응]"
1702-34 = "5;가짜 유령;01\n#5;greeting\n#5;black\n#wait;1000"
1702-35 = "2;하나에;04\n#2;m2\n5;가짜 유령;01;으흐흐~ 원망스럽구나~ 원망스러워~!\n#5;em;[반응]\n#5;a\n#5;stiff"
1702-36 = "2;하나에;04\n1;세리나;04;꺄아아아악! 유, 유령이에요! 유령!\n#1;shake"
1702-37 = "5;가짜 유령;01;이곳에서 당장 사라지지 않으면 너희들의 영혼을 빼앗아가겠다!\n#5;em;[!]"
1702-38 = "1;세리나;04\n2;하나에;05;선배! 파란색 마크가 된 탄알집을 장전하세요! #n그 안에 시스터후드에서 받아온 은제 탄환이 들어있어요!\n#2;em;[!]\n#2;greeting"
1702-39 = "2;하나에;05\n1;세리나;04;이것 만큼은 쓰고 싶지 않았지만…….\n#1;em;…"
1702-40 = "2;하나에;05\n1;세리나;04\n#1;greeting\n#wait;1000"
1702-41 = "#all;hide"
1702-42 = "3;세리나;06;죄, 죄송해요, 유령 씨! 이, 이것으로 성불해 주세요!\n#3;closeup\n#3;em;[!]"
1702-43 = "3;가짜 유령;01\n#3;h\n#wait;1500"
1702-44 = "3;가짜 유령;01;우, 우앗? #n갑자기 총을 쏘다니, 이게 무슨 짓이야!\n#3;em;[?!]\n#3;shake"
1702-45 = "3;가짜 유령;01;게다가 이곳은 병원이라고! 사람이 다치면 어쩌려고 그런 위험한 물건을 가지고 오는 거야!\n#3;hophop"
1702-46 = "3;하나에;02;네에? 총이 병원에서 얼마나 쓸모가 많은데요. 다친 환자를 부축하는 목발로도 쓸 수 있고, 꾀병을 부리는 환자를 일으켜 세울 때도 쓸 수 있고!\n#3;em;[?]"
1702-47 = "3;하나에;03;총은 병원에서도 꼭 필요한 마법의 도구나 다름없다고요!\n#3;greeting\n#3;em;[반짝]"
1702-48 = "1;세리나;02;게다가 유령 씨는 살아있는 분이 아니니까 총을 맞더라도 다치지 않잖아요?\n#3;m5\n#1;ar\n#1;em;[반응]"
1702-49 = "#all;hide"
1702-50 = "3;가짜 유령;01;그, 그건 그렇지만……\n#3;em;…"
1702-51 = "3;가짜 유령;01\n#3;fx;{shot}\n#3;shake\n#wait;1000"
1702-52 = "3;가짜 유령;01;아, 아얏! 자, 잠깐 기다려!\n#3;em;[!]\n#3;stiff"
1702-53 = "3;가짜 유령;01;아무리 퇴마용의 은제 탄환이라고 해서 살아있는 사람에게도 무해한 건 아니라고! 다치거나, 자칫 잘못 맞으면 죽을 수도 있다고!\n#3;hophop"
1702-54 = "#all;hide"
1702-55 = "1;세리나;05\n5;하나에;04;어라~? 유령 씨는 이미 죽었는데, 어떻게 또 죽을 수 있나요?\n#5;stiff"
1702-56 = "1;세리나;06;삶에 대한 미련은 이해하지만, 여기는 당신이 있을 곳이 아녜요! #n이만 순순히 성불하도록 하세요!\n#1;em;[반응]\n#1;hophop"
1702-57 = "#all;hide"
1702-58 = "3;가짜 유령;01\n#3;fx;{shot}\n#3;shake\n#wait;1000"
1702-59 = "3;가짜 유령;01;그, 그만해! 더 이상은 못 견딜 것 같아!\n#3;hophop"
1702-60 = "3;가짜 유령;01;하, 항복이야! 제발 그만둬~!\n#3;em;[속상함]\n#3;stiff"
1702-61 = "#all;hide"
1702-62 = "#na;이후, 가짜 유령이 항복을 선언하고도 한 식경이 넘도록 총알 세례가 이어졌다……."

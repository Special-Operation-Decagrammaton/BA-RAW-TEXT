[translation]
1702-1 = "คุณวิญญาณในวอร์ดร้าง 2"
1702-2 = "หอผู้ป่วยร้างชั้น 4 โรงพยาบาลศูนย์เซนต์เทเรซา"
1702-4 = "หึหึหึ... น่าอิจฉาจริงๆ~ น่าอิจฉาสุดๆ~!"
1702-5 = "น่าอิจฉาจังเลย..."
1702-7 = "ชิส์... ตอนนี้ก็ไม่มีใครดูแล้ว เลิกแสดงเป็นวิญญาณปลอมดีไหมนะ"
1702-10 = "หึหึ สำเร็จตามแผน ไม่คิดว่าแค่แกล้งปลอมตัวเป็นวิญญาณก็จะรีบปิดหอผู้ป่วยกันเร็วแบบนี้เลย..."
1702-11 = "นอกจากผู้ป่วย ทั้งหมอและพยาบาลก็กลัววิญญาณกันจนไม่กล้าเข้ามาใกล้ที่นี่เลย#nตอนนี้คงเคลื่อนไหวได้อย่างสะดวกแล้วล่ะ!"
1702-12 = "ไหนดูซิ~ ไปหาของมีค่าที่จะเอาไปขายได้ก่อนดีกว่า...."
1702-15 = "หือ? เสียงคนเดินนี่นา?"
1702-19 = "ฮะ...ฮานาเอะจัง... คิดจะสำรวจต่อจริงๆ งั้นเหรอ? ดูเหมือนที่นี่จะไม่มีใครอยู่เลยนะคะ...."
1702-20 = "ไม่ได้นะคะ! เราจะกลับไม่ได้จนกว่าจะตรวจสอบให้แน่ใจแล้วว่าที่หอผู้ป่วยไม่ได้มีวิญญาณอยู่จริงๆ #nตอนนี้ผู้ป่วยหลายๆ คนกลัวกันมากเลยนะคะ!"
1702-21 = "ทำไมฮานาเอะจังถึงกล้าเฉพาะเรื่องแบบนี้กันนะ... อือ...."
1702-24 = "ใครน่ะ? ดูไม่เหมือนพยาบาลของที่นี่เลย...#nนักเรียนที่มาทำจิตอาสาเหรอ?"
1702-26 = "ไม่ว่าจะใครก็ตาม ฉันจะไม่ยอมให้มาขวางแผนการเด็ดขาด แขกที่ไม่ได้รับเชิญต้องถูกกำจัดทิ้ง!#nฉันจะแกล้งทำเป็นวิญญาณ แล้วไปหลอกให้ตกใจให้หมดเลย!"
1702-31 = "เฮือก! เมื่อกี้ได้ยินอะไรไหม ฮานาเอะจัง? ที่มุมผ้าม่านมีอะไรขยับอยู่ด้วย!"
1702-32 = "เอ๋?? เมื่อกี้ยังไม่มีใครอยู่เลย... หรือว่าคุณแมวเหมียวโดดเข้ามาทางหน้าต่างกันนะ?"
1702-33 = "คุณแมวเหมียว~ คุณแมวเหมียว~ มาทางนี้เร็ว~"
1702-35 = "หึหึหึ... น่าอิจฉา~ น่าอิจฉาสุดๆ~!"
1702-36 = "กรี๊ดดดดดดด! ผะ...ผีหลอกกกก! ผี!"
1702-37 = "ถ้าไม่ยอมออกไปจากที่นี่เดี๋ยวนี้ ฉันจะดูดวิญญาณพวกเธอมา!"
1702-38 = "รุ่นพี่! ใช้แม็กซ์กระสุนที่มีสัญลักษณ์สีน้ำเงินนะคะ!#nมันเป็นแม็กซ์ที่ใส่กระสุนเงินที่ได้มาจากทางชมรมซิสเตอร์ค่ะ! "
1702-39 = "ฉันไม่อยากใช้มันเลยค่ะแต่ว่า..."
1702-42 = "ขะ...ขอโทษด้วยค่ะ คุณวิญญาณ! ระ...รีบไปสู่สุขคติเถอะนะคะ!"
1702-44 = "ว้ากก จู่ๆ ก็ยิงกันแบบนี้ ทำบ้าอะไรเนี่ย!"
1702-45 = "นอกจากนั้น ที่นี่คือโรงพยาบาลนะ! ถ้าเกิดมีคนบาดเจ็บจะทำยังไง#nทำไมถึงเอาของที่อันตรายแบบนั้นเข้ามาที่นี่ล่ะ!"
1702-46 = "คะ? พกปืนมาโรงพยาบาลแบบนี้น่ะมีประโยชน์มากเลยนะคะ เอามาใช้เป็นไม้ช่วยพยุงให้คนป่วยได้#nอีกอย่าง... เอามาใช้สั่งสอนพวกคนที่ป่วยการเมืองได้ด้วยนะคะ!"
1702-47 = "ปืนนี่ก็เหมือนอุปกรณ์เวทมนตร์ที่จำเป็นต้องใช้ในโรงพยาบาลค่ะ!"
1702-48 = "นอกจากนี้คุณวิญญาณไม่ได้มีชีวิตอยู่อีกแล้ว ต่อให้ถูกยิงก็จะไม่บาดเจ็บไม่ใช่เหรอคะ?"
1702-50 = "ระ...เรื่องนั้นมันจริงแต่ว่า..."
1702-52 = "อ๊ะ...อ๊ะ! ดะ...เดี๋ยว รอก่อน!"
1702-53 = "ถึงจะเป็นกระสุนเงินที่ใช้สำหรับขับไล่ปีศาจก็เถอะ แต่มันก็เป็นอันตรายกับคนเป็นๆ เหมือนกันนะ!#nถ้าเกิดถูกยิงเฉียวๆ หรือถูกยิงเข้าจังๆ ล่ะก็อาจตายได้เลยรู้ไหม!"
1702-55 = "เอ๊~? คุณวิญญาณตายไปแล้วนี่นา แล้วจะตายอีกได้ยังไงกันล่ะคะ?"
1702-56 = "ฉันเข้าใจที่คุณโศกเศร้าเกี่ยวกับชีวิตของคุณ... แต่ว่าที่นี่ไม่ใช่ที่สำหรับคุณนะคะ!#nไปสู่สุขคติเถอะค่ะ!"
1702-59 = "พะ...พอได้แล้ว! ทนไม่ไหวแล้วววว!"
1702-60 = "ยะ...ยอมแพ้แล้ว! หยุดเถอะ~!"
1702-62 = "หลังจากนั้น ถึงวิญญาณปลอมจะประกาศมอบตัวแล้ว แต่ก็ยังถูกระดมยิงอย่างต่อเนื่องต่ออีกพักใหญ่"

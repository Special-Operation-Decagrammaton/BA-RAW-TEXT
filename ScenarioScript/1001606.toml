[translation]
1001606-1 = "是重要的回憶，老師"
1001606-3 = "哇，好厲害！這裡居然有這麼多種遊戲！"
1001606-4 = "[s] 「最近的遊戲不只華麗，種類也很多呢。」"
1001606-5 = "就是說呀。這裡有這麼多沒玩過的遊戲……"
1001606-6 = "嗯？"
1001606-7 = "老師，請看那邊。在遊戲機裡面有娃娃……"
1001606-8 = "啊，這個娃娃……"
1001606-9 = "是在懷舊遊戲《Full-Jelly》裡出現過的Jelly！"
1001606-10 = "會出現在這裡面就代表……難道說是被關起來了嗎？"
1001606-11 = "[s] 「這種想法還真是創新。」"
1001606-12 = "啊，等等……我好像想起什麼了。"
1001606-13 = "在遊戲開發部代代相傳的故事中，有提到這麼一件事。"
1001606-14 = "世界上有著扮演UFO駕駛，大量抓走無辜的人偶的遊戲……"
1001606-15 = "難道說，指的就是這個……？"
1001606-16 = "[s1] 「還真是硬派的觀點呢。」\n[s2] 「雖然這麼說也不算錯啦……」"
1001606-17 = "哇……好厲害。"
1001606-18 = "哇……好厲害。"
1001606-19 = "[s] 「比起在旁邊看，綠要不要也試試呢？」"
1001606-20 = "咦？我嗎？"
1001606-21 = "我，我有辦法嗎？"
1001606-22 = "[s] 「沒問題的。而且，挑戰看看的話一定能學到些什麼的。」"
1001606-24 = "那，那我就試一次看看……"
1001606-30 = "― 雖然一直以來都對點陣風格之外的遊戲沒什麼興趣的……[wa:4080] "
1001606-33 = "― 原來在遊戲中心裡還有這種遊戲呀。[wa:1660] "
1001606-36 = "― 感覺自己的視野好像變廣了，我學到了很多。[wa:3240] "
1001606-39 = "― ……謝謝你，老師，[wa:2620] "
1001606-41 = "― 能夠帶我來這裡。"
1001606-44 = "― ……多虧了老師，我現在非常的開心。[wa:2800] "
1001606-47 = "― 啊，對了……[wa:2540] "
1001606-49 = "― 今天的事，要對姐姐……保密唷？[wa:3480] "
1001606-52 = "― 絕對絕對要唷！[wa:1160] "
1001606-56 = "啊，老，老師！夾到了！"
1001606-57 = "這，這個，接下來要怎麼辦？"
1001606-58 = "[s3] 「因為是綠夾到的，所以是綠的東西唷。」\n[s4] 「是贏家的戰利品呢。」"
1001606-59 = "啊……"
1001606-60 = "啊……"
1001606-61 = "娃娃……和老師的回憶……"
1001606-62 = "……我想，之後每次來到遊戲中心，或者是看到這個娃娃的時候，都會想起老師的。"
1001606-63 = "非常謝謝你，老師。"
1001606-65 = "這個娃娃，我會好好愛惜的。"

1001606-12 = "3;미도리;02;앗, 잠시만요. 저, 진실을 깨달은 거 같아요.\n#3;stiff\n#3;em;[!]"
1001606-13 = "3;미도리;01;그러고 보면 게임개발부에 대대로 내려오는 이야기 중에 이런 게 있었어요."
1001606-14 = "3;미도리;99;세상에는 내가 직접 UFO의 조종사가 되어, 선량한 인형들을 잔뜩 캐틀 뮤틸레이션 해버리는 게임이 있다고."

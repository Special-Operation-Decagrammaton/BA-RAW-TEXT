[translation]
1001606-1 = "It's a Sparkling Memory, Sensei"
1001606-3 = "Wow. Awesome! So many games gathered in one place!"
1001606-4 = "[s] \"Hmm, games these days are really flashy.\""
1001606-5 = "I know. Of course, I think the classic games are the best, but there are so many other games I've never played before..."
1001606-6 = "Huh?"
1001606-7 = "Sensei, look. There are plushes in the arcade machine."
1001606-8 = "Wait, these plushes are..."
1001606-9 = "Jellies, from the classic game Fruitjellies!"
1001606-10 = "Why are they in here, though? Are they trapped?"
1001606-11 = "[s] \"That's an interesting way of looking at it.\""
1001606-12 = "Oh, wait. I think I just realized something."
1001606-13 = "There's a story that's been passed down for generations in the Game Development Department."
1001606-14 = "It tells of a game where you become a UFO pilot and attack a bunch of innocent plushes..."
1001606-15 = "Could that story have something to do with this?"
1001606-16 = "[s1] \"That's a very dramatic perspective.\"\n[s2] \"I can't prove you're wrong, but...\""
1001606-17 = "Wow... Amazing."
1001606-18 = "Wow... Amazing."
1001606-19 = "[s] \"Don't just stare. You can try it yourself!\""
1001606-20 = "Huh? Try it myself?"
1001606-21 = "D-Do you really think I can do it?"
1001606-22 = "[s] \"You won't know until you try.\""
1001606-24 = "Th-Then, let me try..."
1001606-30 = "― I've never taken an interest in anything other than retro games before...[wa:2160] "
1001606-33 = "― I guess the arcade has lots of different kinds of games.[wa:60] "
1001606-36 = "— I feel like I'm broadening my horizons. This was a good learning opportunity.[wa:920] "
1001606-39 = "― Thank you, Sensei.[wa:2260] "
1001606-41 = "― For bringing me here..."
1001606-44 = "― I'm having so much fun thanks to you.[wa:2000] "
1001606-47 = "― Oh, right...[wa:2300] "
1001606-49 = "― Can you keep what happened today a secret from my sister?[wa:1800] "
1001606-52 = "― Seriously, you can't tell her![wa:240] "
1001606-56 = "Oh, S-Sensei! I got it!"
1001606-57 = "Wh-What am I supposed to do with this?!"
1001606-58 = "[s3] \"Here, you won it fair and square.\"\n[s4] \"That's the victor's trophy.\""
1001606-59 = "Oh..."
1001606-60 = "Oh..."
1001606-61 = "It's a plush representing my memories with you, Sensei..."
1001606-62 = "Every time I come to the arcade or see this plush, I'll think of you, Sensei."
1001606-63 = "Thank you, Sensei."
1001606-65 = "I'll cherish this plush."

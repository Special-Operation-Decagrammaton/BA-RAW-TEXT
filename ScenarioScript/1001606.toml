[translation]
1001606-1 = "มันคือความทรงจำที่เปล่งประกายค่ะ คุณครู"
1001606-3 = "ว้าว สุดยอดเลยค่ะ! มีเกมมากมายมารวมตัวกันอยู่ที่นี่ที่เดียว!"
1001606-4 = "[s] \"อืม เกมสมัยนี้ทั้งโดดเด่นและมีหลายประเภท\""
1001606-5 = "นั่นสิคะ แน่นอนกว่าเกมคลาสสิกน่ะสุดยอดไปเลย แต่ยังมีเกมที่ฉันไม่เคยเล่นอยู่เต็มไปหมด..."
1001606-6 = "หือ?"
1001606-7 = "คุณครู ดูนั่นสิคะ! มีตุ๊กตาแบบที่อยู่ในตู้เกมตามร้านเกมด้วยค่ะ"
1001606-8 = "เดี๋ยวนะ ตุ๊กตาตัวนี้..."
1001606-9 = "นี่มันเจลลี่ในเกมคลาสสิก \"ฮูลูเจลลี่\" นี่คะ!"
1001606-10 = "แต่ว่าสิ่งที่อยู่ในนี้ อย่าบอกนะว่าเป็นกับดักเหรอคะ?"
1001606-11 = "[s] \"แนวคิดแปลกใหม่ดีนะ\""
1001606-12 = "อ๊ะ รอเดี๋ยวนะคะ ฉันน่าจะรู้ความจริงละค่ะ"
1001606-13 = "และพอดูๆ ไปแล้ว มันก็มีเรื่องแบบนี้ส่งต่อในชมรมพัฒนาเกมมารุ่นต่อรุ่นอยู่ค่ะ"
1001606-14 = "มีเกมที่ผู้เล่นจะได้เป็นนักบิน UFO และกำจัดตุ๊กตาใสซื่อในปรากฏการณ์แคทเทิล มิวทิเลชั่น"
1001606-15 = "หรือว่าจะเป็นสิ่งนี้......?"
1001606-16 = "[s1] \"มุมมองของมิโดรินี่ซับซ้อนดีจังนะ\"\n[s2] \"นั่นก็ไม่ได้ผิดอะไรมากหรอกนะ...\""
1001606-17 = "ว้าว... สุดยอดไปเลย"
1001606-18 = "ว้าว... สุดยอดไปเลย"
1001606-19 = "[s] \"อย่าเอาแต่ดูเลยนะ มิโดริก็ไปลองทำบ้างสิ\""
1001606-20 = "คะ? ให้ฉันทำเหรอคะ?"
1001606-21 = "จะ... จะทำได้จริงๆ เหรอคะ?"
1001606-22 = "[s] \"ทุกอย่างมันต้องลองถึงจะรู้นะ\""
1001606-24 = "ถ้าอย่างงั้นขอลองดูสักครั้ง..."
1001606-30 = "― นอกจากเกมเรโทรแล้ว ฉันก็ไม่เคยสนใจ เกมประเภทอื่นมาก่อนเลย…[wa:2760] "
1001606-33 = "― ในร้านเกม... ก็มีเกมแบบนี้อยู่ด้วยสินะคะ[wa:700] "
1001606-36 = "― รู้สึกเหมือนเปิดแมพใหม่ขึ้นมาอีกหน่อยเลยค่ะ ได้รู้อะไรใหม่ๆ แล้วล่ะค่ะ[wa:1240] "
1001606-39 = "― ...ขอบคุณนะคะ คุณครู[wa:2180] "
1001606-41 = "― ที่พาฉันมาที่นี่..."
1001606-44 = "― เพราะงั้น... ฉันถึงได้สนุกมากๆ แบบนี้ค่ะ[wa:1880] "
1001606-47 = "― อ๊ะ จริงด้วย...[wa:2180] "
1001606-49 = "― แล้วก็... เรื่องในวันนี้ ห้ามเอาไปบอกพี่สาวนะคะ เป็นความลับนะคะ[wa:1560] "
1001606-52 = "― ห้ามเด็ดขาด เลยนะคะ![wa:640] "
1001606-56 = "อ๊ะ คะ... คุณครู! ฉันทำได้แล้วค่ะ!"
1001606-57 = "อะ... อันนี้เอายังไงดีคะ?!"
1001606-58 = "[s3] \"อ่ะ มิโดริคีบได้นี่นา\"\n[s4] \"ของที่ระลึกของผู้ชนะไง\""
1001606-59 = "อ่า......"
1001606-60 = "อ่า......"
1001606-61 = "ตุ๊กตานี้... มีความทรงจำกับคุณครู..."
1001606-62 = "ต่อไปทุกครั้งที่มาร้านเกม ทุกครั้งที่ได้เห็นตุ๊กตาตัวนี้ ก็จะทำให้นึกถึงคุณครูค่ะ"
1001606-63 = "ขอบคุณนะคะ คุณครู"
1001606-65 = "ตุ๊กตาตัวนี้ ฉันจะเก็บไว้อย่างดีเลยค่ะ"

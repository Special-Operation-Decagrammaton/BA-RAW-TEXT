[translation]
10034020-1 = "Episode 2;What A Band Needs Most"
10034020-4 = "\"Q. What are the things that a band needs?\""
10034020-7 = "Hm...? What do you mean?"
10034020-8 = "Things that a band needs? ...Like, instruments?"
10034020-9 = "First, maybe a location... Right? For practice, and to accommodate people, and..."
10034020-10 = "Rock. Simply put, a band needs to rock."
10034020-11 = "An audience. If there's no one to listen, then there's no point. At least that's the feeling I get."
10034020-16 = "\"Q. What do you think is the most important thing for a band?\""
10034020-19 = "Hm, good question... I guess it'd have to be the vocals. That's what I care about the most."
10034020-20 = "Your look, your design. Your visuals have to pop so people come and listen in the first place."
10034020-21 = "Rock. Because... it's rock."
10034020-22 = "The songs? What's a band without a good song?"
10034020-28 = "[ns1] \"Very good. Please remember your answers.\"\n[ns2] \"The things you said were important just now...\""
10034020-31 = "[ns3] \"Congratulations! Those are your roles and responsibilities from now on!!\"\n[ns4] \"That's exactly what I want you to work on, individually, from now on.\""
10034020-39 = "What...?"
10034020-40 = "Whaaat?!"
10034020-42 = "What?! You're deciding our roles just like that?!"
10034020-43 = "Okay, yeah, we have to work on those things anyway if we're going to make a band, but still..."
10034020-44 = "Swift decisions from a swift mind. This, too, is rock."
10034020-45 = "How is this rock?! And why are you talking like that?!"
10034020-51 = "She's talking like she always does. She's just switched \"romance\" with \"rock.\""
10034020-52 = "Ahaha... Well, when you put it that way..."
10034020-53 = "...Wait."
10034020-54 = "Hold on. So how's this go again? What are we in charge of?"
10034020-56 = "I'm... doing the visuals, I guess? What even are visuals? What am I supposed to do?"
10034020-57 = "...We need a logo, an album cover... This is way more work than I thought!"
10034020-58 = "AND the outfits. I'm doing the outfits too. Well, maybe I can handle that part."
10034020-59 = "All right, but it's all going to match MY tastes, got it? No complaining. If I feel it, you're wearing it!"
10034020-64 = "Oof, we're all in for some fashion terrorism."
10034020-68 = "...Wait, hold on."
10034020-69 = "I said 'vocals', so... Oh, no..."
10034020-70 = "Congratulations. You're the band's lead vocalist!"
10034020-71 = "H-Hold on!! No, that CANNOT be how we decide this!"
10034020-73 = "W-Well, you do have a good voice, Kazusa...and I bet you could sing too!"
10034020-74 = "I... Well, I know I'd love to hear it."
10034020-75 = "Oh, Airi has spoken. There is no escape."
10034020-76 = "...! B-But...!!"
10034020-77 = "Still...even for...you, Airi...!"
10034020-81 = "Ugh...!"
10034020-85 = "Arghhh!!"
10034020-93 = "Well, she's not saying no anymore. Nicely done, Airi."
10034020-94 = "Heehee. Ah, the wonders of youth."
10034020-95 = "And I am in charge of... rock. Hm. Rock..."
10034020-96 = "But what does it mean to \"rock\"? That is the question."
10034020-97 = "...Hm? Sensei. Did you say something?"
10034020-98 = "You're asking me to handle operations, schedules..."
10034020-99 = "...Cleaning too?"
10034020-100 = "Wh-What's all this...? This isn't rock, it's just...chores and hard work!"
10034020-101 = "[s5] \"Welcome to the life of a rock star.\"\n[s6] \"Hard work, passion, effort, THAT'S rock.\""
10034020-106 = "No, wait... Um..."
10034020-107 = "Hold on... That's all just motivational claptrap!"
10034020-108 = "Okay, I get it! Rock is about being hungry for success, and putting in the effort!"
10034020-115 = "We're young, we're driven, and we're in your capable hands! Let's rock!"
10034020-116 = "So this is...rock. Argh..."
10034020-117 = "You're not about to say, \"Let's NOT rock,\" are you? Hm?"
10034020-118 = "Hrm..."
10034020-119 = "Y... Y...!!"
10034020-120 = "Youth is..."
10034020-121 = "...actually quite painful..."
10034020-127 = "Ahaha..."
10034020-131 = "...Right, and... I need to write a song."
10034020-132 = "Hm. Hmm... I've never done anything like that before."
10034020-133 = "Well, we don't have to write our OWN song, do we? We can just pick one and play that."
10034020-134 = "I mean, it's going to be a bunch of amateur student bands. They're not expecting any brand-new material. No need to worry."
10034020-135 = " I'll play whatever you pick! As long as it's not too hard. Hee hee."
10034020-136 = "Y-Yeah, okay, I'll pick a song..."
10034020-137 = "Even I can handle that, right? Probably..."
10034020-141 = "[ns7] (...Even you...?)\n[ns8] (...Probably...?)"
10034020-146 = "Okay! Let's get moving! I'll start getting our outfits together."
10034020-147 = "Once I finish, I'll leave them here in the practice room, so when you see them here, just go ahead and change. Got it?"
10034020-148 = "And then for tomorrow, we're going to... What's on the schedule tomorrow, Natsu?"
10034020-149 = "Tell us our future, Mistress of Rock!"
10034020-156 = "...Ah. A schedule you seek. Welcome, you who are in need of prophecy. I am the Mistress of Rock, she who watches over the future."
10034020-157 = "She got into character fast."
10034020-158 = "I see the four of us tomorrow..."
10034020-159 = "...acquiring instruments, I guess."
10034020-160 = "...The Mistress has spoken! Our schedule is foretold!"
10034020-161 = "I guess she can't put us BEHIND schedule if she's the one making it up..."
10034020-162 = "Good call, Sensei. Did you know this was going to work out?"
10034020-163 = "[s9] \"Heeheehee... Indeed, as was foretold!\"\n[s10] \"Haha, no.\""
10034020-166 = "Okay, that's it for today! Everybody get out of here!"
10034020-167 = "Let's all meet up and buy some instruments after school tomorrow."
10034020-180 = "[ns] \"...\""
10034020-186 = "Later that evening. I was finishing a pile of work."
10034020-193 = "[ns11] \"...Airi?\"\n[ns12] Open the front door for her."
10034020-202 = "E-Excuse me, I'm sorry I'm here so late, Sensei."
10034020-203 = "...H-Huh? The clothes? Oh, well these..."
10034020-204 = "Yoshimi had put them in the practice room, and I saw they were there, so I... Ha ha..."
10034020-205 = "...Huh?"
10034020-206 = "You thought I might come here...? Me...?"
10034020-207 = "Wh-Why...?"
10034020-208 = "[s13] \"I thought you might want to consult.\"\n[s14] \"Shall we talk about picking a song?\""
10034020-213 = "Ah-ha... Hahaha... Like always, you know everything, Sensei."
10034020-214 = "Yep. That's the reason I came to talk to you..."
10034020-215 = "I tried to pick one myself at first, but it didn't work out too well."
10034020-216 = "Picking a song for us to play, it's not as easy as I thought. Haha..."
10034020-217 = "Hm..."
10034020-218 = "Hm..."
10034020-219 = "What do you think, Sensei? Which song should I go with? What's the best choice?"
10034020-220 = "...Huh? Why am I looking for the \"best song\"?"
10034020-221 = "Well, obviously, we want the best show, right? The best outcome?"
10034020-222 = "Huh? Was that the wrong answer?"
10034020-223 = "My FAVORITE song? N-No, we can't do that one! That wouldn't work at all! Seriously, I..."
10034020-227 = "I-I'm sorry. I didn't mean to raise my voice."
10034020-228 = "But still... I just want to go for the gold here, you know?"
10034020-229 = "...I want us to do well."
10034020-230 = "I guess I'm not explaining it very well...but that's how I feel."
10034020-234 = "[ns15] \"What's the best thing you've listened to lately?\"\n[ns16] \"Have you heard a song that made you think, 'Wow!'?\""
10034020-235 = "The best thing I've listened to lately..."
10034020-236 = "'Wow,' huh?"
10034020-237 = "Hm..."
10034020-238 = "Hm?"
10034020-239 = "Uh..."
10034020-245 = "[ns] \"...Airi?\""
10034020-246 = "Ah, ah...! I-I'm sorry! For a second, I..."
10034020-247 = "There was that one song..."
10034020-248 = "I heard somebody sing a little bit of it as I was walking by. I don't know what it's called, and I don't know if I could find her again."
10034020-249 = "I don't even think she was a Trinity student. She was just out busking while people were prepping for the festival."
10034020-250 = "I know students from other schools do busking all over the street, day and night, around this time of the year..."
10034020-251 = "But even if the singer is here, we'd have to search the entire Trinity campus to find her..."
10034020-252 = "...Huh?"
10034020-253 = "You want to do that? Together?"
10034020-254 = "Are you sure? We have no idea where in Trinity she might be..."
10034020-255 = "N-No, I'm not short on time, I just don't want to make you spend who-knows-how-long on something like this!"
10034020-256 = "[s17] \"You don't have to worry about that, Airi.\"\n[s18] \"Don't worry. This is proper 'work'.\""
10034020-259 = "Sensei..."
10034020-260 = "...O-Okay. I'll keep that in mind."
10034020-261 = "Sooo when would you be available?"
10034020-265 = "Hm?"
10034020-266 = "...Now?"
10034020-268 = "...Really?"

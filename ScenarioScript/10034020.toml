[translation]
10034020-1 = "ตอนที่ 2;สิ่งสำคัญที่สุดของวงดนตรี"
10034020-4 = "\"คำถาม: ถ้าจะทำวงดนตรี จำเป็นต้องมีอะไรบ้าง?\""
10034020-7 = "หืม...? ถามอะไรน่ะ?"
10034020-8 = "วงดนตรีต้องมีอะไรบ้างงั้นเหรอ? ก็... เครื่องดนตรีไง?"
10034020-9 = "อย่างแรกน่าจะเป็น... สถานที่นะคะ? เราต้องมีพื้นที่ซ้อมดนตรีกันสิคะ"
10034020-10 = "ฉันว่าต้องเป็นความร็อก วงดนตรีก็ต้องร็อกสิ"
10034020-11 = "ผู้ชม... ตอบแบบนี้จะดูเชยไปมั้ยนะ แต่ฉันว่าก็ต้องให้ความรู้สึกประมาณนี้ละ"
10034020-16 = "\"คำถาม: ถ้างั้นคิดว่า <สิ่งสำคัญที่สุด> ของวงดนตรีคืออะไร?\""
10034020-19 = "อืม... สิ่งสำคัญที่สุดคงเป็น... ตำแหน่งร้องนำรึเปล่า.. ส่วนตัวฉันคิดว่าแบบนั้นนะ"
10034020-20 = "เรื่องภาพลักษณ์ก็สำคัญนะ ถ้าพวกเราดูดี คนก็ยิ่งอยากจะเข้ามาชม"
10034020-21 = "ความร็อกต่างหาก วงดนตรีก็ต้องร็อกสิ"
10034020-22 = "น่าจะเป็น... เพลงนะคะ? ก็เราทำ 'วงดนตรี' นี่นา...?"
10034020-28 = "[ns1] \"ดีมาก ทุกคนจำสิ่งที่เพิ่งพูดไว้ล่ะ\"\n[ns2] \"สิ่งที่ตัวเองคิดว่าสำคัญน่ะ...\""
10034020-31 = "[ns3] \"ยินดีด้วยนะ! นั่นคือหน้าที่ของแต่ละคน!!\"\n[ns4] \"จากนี้ไปแต่ละคนจะได้รับหน้าที่นั้นไป\""
10034020-39 = "วะ..."
10034020-40 = "ว่าไงนะ~~!?!?"
10034020-42 = "อะ... อะไรกันน่ะ!? ทำไมจู่ๆ ถึงแบ่งหน้าที่กันแบบนั้นล่ะ ทำแบบนี้ก็ได้เหรอ!?"
10034020-43 = "ถ้าจะทำวงดนตรี ก็ต้องรับผิดชอบเรื่องพวกนี้อยู่แล้วอย่างนั้นเหรอ? นะ... นั่นสินะ! มันก็จริงอยู่หรอก แต่ก็...!"
10034020-44 = "จะกำหนดแบบดื้อๆ ตามคำตอบที่รีบตอบไปโดยสัญชาติญาณเลยงั้นเหรอ? มันก็ไม่ได้แย่เท่าไรหรอกนะ แบบนี้แหละถึงจะร็อก"
10034020-45 = "ร็อกเริ้กอะไรกันเล่า!! แล้วทำไมคำพูดเธอถึงเปลี่ยนไปเป็นแบบนั้นน่ะ!!"
10034020-51 = "ก็เหมือนอย่างที่เคยเป็นนั่นแหละ แค่เปลี่ยนจาก 'ความโรแมนติก' เป็น 'ความร็อก' ก็เท่านั้น"
10034020-52 = "แหะๆๆ... จะว่าไปแล้วก็จริงนะ..."
10034020-53 = "อ่า..."
10034020-54 = "เดี๋ยวนะคะ แล้วทีนี้งานของฉันจะเป็นยังไงเหรอคะ?"
10034020-56 = "เรื่องภาพลักษณ์ของวงงั้นเหรอ...? ถ้างั้นต้องทำอะไรนะ? มีอะไรที่เป็นภาพลักษณ์ของวงได้บ้างล่ะ?"
10034020-57 = "อืม... รูปถ่ายประจำวง? สัญลักษณ์ของวง? มีอะไรต้องทำเยอะกว่าที่คิดนะเนี่ย..."
10034020-58 = "ต้องเลือกชุดด้วยเหรอ? ไม่หรอก ก็ใช่ว่าฉันจะไม่อยากทำ..."
10034020-59 = "งั้นฉันจะเลือกตามรสนิยมของตัวเองนะ! ห้ามบ่นกันด้วยล่ะ! เข้าใจใช่มั้ย!? เรื่องนี้ต้องตามใจคนที่ได้หน้าที่นี้ไป!!"
10034020-64 = "เฮ้อ... ชักจะกังวลว่าจะได้ใส่ชุดประหลาดๆ แล้วสิ"
10034020-68 = "อ่า เดี๋ยวนะ..."
10034020-69 = "เมื่อกี้ฉันตอบไปว่า 'ร้องนำ' งั้นก็อย่าบอกนะว่า..."
10034020-70 = "ดีใจด้วยนะที่ได้เป็นนักร้องนำของวงน่ะ~"
10034020-71 = "ดะ... เดี๋ยวก่อนสิ!! แบบนี้ก็มีด้วยเหรอ! มีวงดนตรีไหนที่กำหนดนักร้องนำแบบนี้ด้วยเหรอ!?"
10034020-73 = "ตะ... แต่คาซึสะจังก็เสียงเพราะนะ... งั้นก็น่าจะร้องเพลงได้ดีหรือเปล่า?"
10034020-74 = "แล้วฉันก็... อยากฟังเพลงที่คาซึสะจังร้องด้วย...!"
10034020-75 = "โอ้... ถ้าไอริพูดถึงขนาดนี้แล้วละก็..."
10034020-76 = "...!! นะ... นั่นมันก็...!!"
10034020-77 = "ถึงจะพูดอย่างนั้นก็เถอะ...! ต่อให้เป็นไอริก็เถอะ...!"
10034020-81 = "อึก...!"
10034020-85 = "อ๊ากกกก!!"
10034020-93 = "โอ้โห ได้ผลดีเลยนะเนี่ย ก่อนหน้านี้คงอยากปฏิเสธ แต่ก็คงจะกลืนคำนั้นลงคอไปแล้วสินะ ไม่อยากจะเชื่อเลย"
10034020-94 = "ฮุฮุ นี่สินะวัยรุ่น... วัยรุ่นเป็นสิ่งสวยงามจังเลย..."
10034020-95 = "ส่วนฉันก็... ความร็อก... ความร็อกงั้นเหรอ..."
10034020-96 = "ต้องทำวงให้ 'ร็อก'... เป็นประเด็นที่น่าสนใจเลยนะเนี่ย..."
10034020-97 = "หืม...? ว่ายังไงนะคุณครู?"
10034020-98 = "จัดการวงดนตรีเหรอ...? เรื่องตารางของวง...?"
10034020-99 = "แล้วก็สถานที่ด้วย...?"
10034020-100 = "มะ... หมายความว่ายังไง...? เรื่องพวกนั้นมันเกี่ยวกับความร็อกยังไง... นั่นมันงานที่ต้องลำบากต่างหาก"
10034020-101 = "[s5] \"ร็อกก็คืออะไรแบบนั้นแหละ ไม่รู้หรอกเหรอ?\"\n[s6] \"พยายามเพื่อความสำเร็จ นั่นละสิ่งที่เรียกว่า 'ความร็อก' \" "
10034020-106 = "เดี๋ยวนะ... เอ่อ... คือ..."
10034020-107 = "เดี๋ยวก่อน... อย่าพูดอะไรเหลวไหลแบบนั้น..."
10034020-108 = "จริงด้วย~ ใช่แล้ว! นั่นละความร็อก! ร็อกต้องใส่พลังจนหอบแฮ่กๆ อยู่แล้ว!"
10034020-115 = "วัยรุ่นเป็นสิ่งสวยงามจริงๆ เลยนะว่ามั้ย!? งั้นก็พยายามเข้านะ~ ตำแหน่งร็อกของวง! เอาให้ผ่านการคัดเลือกเลยนะ!!!"
10034020-116 = "ระ... ร็อก...!? วัยรุ่น...!? อึก..."
10034020-117 = "จะมาบอกว่าตัวเองไม่ร็อกตอนนี้ไม่ได้แล้วนะ คงไม่คิดจะบอกอย่างนั้นหรอกเนอะ? ใช่มั้ย?"
10034020-118 = "......!!!"
10034020-119 = "วะ... วะ...!!"
10034020-120 = "วัยรุ่น...!"
10034020-121 = "น่าปวดหัวจริงๆ เลย..."
10034020-127 = "แหะๆๆ..."
10034020-131 = "เอ๋... แล้วถ้างั้นฉัน... ได้รับหน้าที่เกี่ยวกับ 'เพลง' เหรอคะ...?"
10034020-132 = "อ่า... อืม... เรื่องเพลงงั้นเหรอ... ฉันไม่เคยแต่งเพลงด้วยสิ..."
10034020-133 = "แต่เราก็ไม่จำเป็นต้องแต่งเพลงเองนี่ ก็แค่เลือกเพลงที่อยากเล่นมาก็พอแล้วไม่ใช่เหรอ?"
10034020-134 = "นี่เป็นแค่ 'การแสดงเปิดงานจากของวงดนตรีนักเรียนสมัครเล่น' ฉันว่าเราไม่ต้องแต่งเพลงใหม่หรอก ไม่ต้องกังวลไปหรอกนะ"
10034020-135 = "แล้วฉันจะรอดูเพลงที่จะใช้นะ~! อย่าเลือกเพลงที่มันยากนักล่ะ! ฮ่าฮ่า!!"
10034020-136 = "อะ... อื้ม!! ถ้าเป็นการเลือกเพลง..."
10034020-137 = "คนอย่างฉันน่าจะทำได้อยู่นะ...! อื้ม!"
10034020-141 = "[ns7] ('คนอย่างฉัน'...?)\n[ns8] ('น่าจะทำได้อยู่นะ' งั้นเหรอ...?)"
10034020-146 = "เอาละๆ! นี่ไม่ใช่เวลาจะมาอยู่เฉยกันแล้ว! ฉันที่ต้องดูแล 'ภาพลักษณ์ของวง' จะออกไปหาเสื้อผ้า#nเดี๋ยวนี้เลย!"
10034020-147 = "ถ้าฉันหามาได้แล้วจะเอามาไว้ในห้องซ้อม หลังจากนั้นทุกคนก็มาเปลี่ยนเสื้อผ้ากันด้วยล่ะ เข้าใจมั้ย?"
10034020-148 = "เอาตามนั้นแล้วกัน... แล้วตารางของพรุ่งนี้ล่ะ...? นัตสึ?"
10034020-149 = "ไม่สิ... ตำแหน่ง 'ร็อก'! บอกตารางของพวกเราหน่อย!"
10034020-156 = "อ่า... ตารางงั้นเหรอ ถามถูกคนแล้วละ ฉันเป็นชาวร็อก ชาวร็อกคือผู้ควบคุมอนาคต"
10034020-157 = "ปรับตัวไวจังเลยนะ"
10034020-158 = "อนาคตของพวกเรา... วันพรุ่งนี้ของพวกเรา..."
10034020-159 = "คงต้องเริ่มจากไปหาเครื่องดนตรีกันก่อนสินะ...?"
10034020-160 = "ได้ยินแล้วใช่มั้ย?! ฝ่ายจัดการตารางของวงบอกว่าเราจะไปหาเครื่องดนตรีกัน!"
10034020-161 = "คนที่ปกติยังจัดการตารางตัวเองไม่รอด จู่ๆ ก็ได้มาจัดการตารางของวงเหรอเนี่ย"
10034020-162 = "ฉันต้องมองคุณครูใหม่เลยนะ นี่สินะดวงตาที่เฉียบแหลมของผู้ใหญ่..."
10034020-163 = "[s9] \"ฮุฮุฮุ...! ก็อย่างที่ว่านั่นละ!!\"\n[s10] หัวเราะกลบเกลื่อนไปก่อน"
10034020-166 = "ถ้างั้นวันนี้พอแค่นี้ก่อน!! แยกย้ายได้!!"
10034020-167 = "พรุ่งนี้หลังเลิกเรียน ไปเจอกันที่ร้านขายเครื่องดนตรีนะทุกคน!!"
10034020-180 = "[ns] \"......\""
10034020-186 = "(เย็นวันนั้น คุณครูยังคงทำงานที่มีเยอะจนกองเป็นพะเนิน)"
10034020-193 = "[ns11] \"ไอริ...?\"\n[ns12] เปิดประตูชาเล่ต์ให้"
10034020-202 = "ขะ... ขอโทษที่ฉันมารบกวนในเวลานี้นะคะคุณครู"
10034020-203 = "คะ...? ชุดนี้เหรอคะ? อ่า... ชุดนี้..."
10034020-204 = "โยชิมิเอามาวางไว้ในห้องซ้อมน่ะค่ะ ฉันก็เลยลองใส่ดู... แหะๆ..."
10034020-205 = "คะ...?"
10034020-206 = "คุณครู... คิดไว้แล้วเหรอคะว่าฉันจะมาหา...?"
10034020-207 = "ทะ... ทำไมล่ะคะ...?"
10034020-208 = "[s13] \"ไอริดูเหมือนอยากจะปรึกษาอะไรน่ะ\"\n[s14] \"เรามาคุยเรื่องการเลือกเพลงกันมั้ย?\""
10034020-213 = "อ่า... แหะๆๆ คุณครูรู้ทุกอย่างเลยนะคะ"
10034020-214 = "ใช่แล้วค่ะ ที่จริงฉันมาเพราะอยากปรึกษากับคุณครูเรื่องนั้นค่ะ"
10034020-215 = "ฉันพยายามจะทำในสิ่งที่ตัวเองเลือกแล้ว แต่มันก็ไม่ได้ค่ะ"
10034020-216 = "คือว่า... เรื่องการเลือกเพลงน่ะค่ะ... มันยากกว่าที่คิดอีกค่ะ แหะๆ..."
10034020-217 = "อืม..."
10034020-218 = "อืมมม..."
10034020-219 = "คุณครูคิดว่ายังไงบ้างคะ? ฉันควรเลือกเพลงแบบไหนดีคะ? ต้องเลือกแบบไหนถึงจะดีที่สุดเหรอคะ ...?"
10034020-220 = "คะ...? ทำไมฉันถึงอยากได้ 'เพลงที่ดีที่สุด'... น่ะเหรอคะ?"
10034020-221 = "ก็... ถ้าเราเลือกเพลงที่ดีที่สุด ก็จะได้ผลลัพธ์ที่ดีไปด้วยนี่คะ...? แล้วมันก็จะออกมาดีที่สุดด้วย...?"
10034020-222 = "เอ๋? หรือว่าไม่ใช่คะ? ฉันคิดผิดเหรอคะ?"
10034020-223 = "ทำไมไม่เลือก 'เพลงที่ชอบ' งั้นเหรอคะ? มะ... ไม่ได้นะคะ! ทำแบบนั้นไม่ได้หรอกค่ะ...!!"
10034020-227 = "ขะ... ขอโทษค่ะ ฉันเผลอพูดเสียงดังใส่คุณครูจนได้"
10034020-228 = "คือว่า... ครั้งนี้ฉันอยากเลือกสิ่งที่ดีที่สุด แล้วก็อยากให้ผลลัพธ์ออกมาดีที่สุดด้วยค่ะ"
10034020-229 = "ฉันอยากทำให้ได้ดีค่ะ..."
10034020-230 = "ถึงจะอธิบายออกมาเป็นคำพูดได้ยาก... แต่ฉันก็รู้สึกแบบนั้นค่ะ"
10034020-234 = "[ns15] \"ถ้างั้นเพลงที่ดีที่สุดที่เพิ่งฟังมาคือเพลงอะไรเหรอ?\"\n[ns16] \"มีเพลงไหนที่คิดว่า 'เยี่ยมเลย ต้องแบบนี้ละ' บ้างมั้ย?\""
10034020-235 = "เพลงที่ดีที่สุดที่เพิ่งฟังมา...?"
10034020-236 = "เพลงที่คิดว่ายอดเยี่ยม...?"
10034020-237 = "อืมมม..."
10034020-238 = "......?"
10034020-239 = "อ่า..."
10034020-245 = "[ns] \"ไอริ...?\""
10034020-246 = "อ๊ะ...! ขะ... ขอโทษค่ะ! พอดีฉันกำลังนึกถึง..."
10034020-247 = "เพลงที่... เอ่อ... มันก็มีเพลงที่ว่าอยู่หรอกนะคะ... แต่ว่า..."
10034020-248 = "ฉันไม่รู้ชื่อเพลง แล้วก็ได้ฟังคนร้องเพลงนั้นแค่แป๊บเดียว ก็เลยไม่รู้ว่าจะหาเจอรึเปล่า..."
10034020-249 = "คนที่ร้องเพลงนั้นเหมือนไม่ใช่นักเรียนทรีนิตี้น่ะค่ะ ฉันออกไปดูอะไรเรื่อยเปื่อยตอนช่วงเตรียมงาน#nเทศกาล แล้วก็ไปเจอคนที่มาเล่นดนตรีเปิดหมวกอยู่ริมถนนค่ะ"
10034020-250 = "แน่นอนว่าในช่วงเวลานี้ นักเรียนจากโรงเรียนอื่นต่างก็มาเล่นดนตรีเปิดหมวกกันทั้งตอนกลางวัน และก็ตอนกลางคืน..."
10034020-251 = "ถ้าจะหาคนที่ฉันเจอวันนั้น คงต้องพลิกแผ่นดินทรีนิตี้แน่เลยค่ะ..."
10034020-252 = "คะ...?"
10034020-253 = "งั้นก็ไปพลิกแผ่นดินกันเหรอคะ? คุณครูจะช่วยตามหาอีกแรงงั้นเหรอคะ?"
10034020-254 = "ทะ... ทำไมพูดง่ายอย่างนั้นล่ะคะ? คุณครูรู้เหรอว่าคนนั้นอยู่ที่ไหนในทรีนิตี้น่ะ..."
10034020-255 = "สงสัยว่าฉันติดเรื่องเวลาหรือเปล่างั้นเหรอคะ? มะ... ไม่หรอกค่ะ สำหรับฉันน่ะไม่เป็นไรหรอก แต่ถ้าจะให้คุณครูมาเสียเวลากับเรื่องอะไรแบบนี้ละก็..."

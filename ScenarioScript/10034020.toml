[translation]
10034020-1 = "第2話;樂團中最重要的是？"
10034020-4 = "「問題一：組樂團需要什麼？」"
10034020-7 = "咦……？這麼突然？"
10034020-8 = "組樂團需要什麼？#n……樂器吧？"
10034020-9 = "首先要有場地……對吧？#n除了練習的時候需要以外，也需要有能容納人群的空間……"
10034020-10 = "當然是[ruby=Rock]搖滾[/ruby]。#n……因為是搖滾。"
10034020-11 = "然後就是觀眾吧……#n雖然這麼說有點搞笑，不過實際上就是這樣。"
10034020-16 = "「問題二：樂團中『最重要的東西』是什麼？」"
10034020-19 = "嗯……真要說的話……應該是主唱吧。#n我個人比較重視這個部分。"
10034020-20 = "讓人意想不到的視覺設計？#n必須在視覺上引人注目，才能吸引到觀眾。"
10034020-21 = "搖滾。#n……因為是搖滾。"
10034020-22 = "應該是……曲子吧？#n畢竟是「樂團」……？"
10034020-28 = "[ns1]「好。大家要記住剛才說的話。」\n[ns2]「剛才每個人認為最重要的部分……」"
10034020-31 = "[ns3]「恭喜！從現在起將由你負責！！」\n[ns4]「就是接下來每個人要負責的項目。」"
10034020-39 = "咦……"
10034020-40 = "什麼～～！？！？"
10034020-42 = "什，什麼跟什麼啊！？這麼突然！？#n這種事是可以用這麼隨便的方法決定的嗎！？"
10034020-43 = "你說要組樂團的話，總得有人去做這些事？#n這，這麼說也沒錯啦！可是……！"
10034020-44 = "這就是即興的選擇產生的即興結果嗎？#n感覺不壞……這也很搖滾。"
10034020-45 = "搖滾你個頭！！而且你的語氣怎麼變成這樣！！"
10034020-51 = "跟平常沒什麼不同吧。#n只是把「浪漫」換成「搖滾」而已。"
10034020-52 = "啊哈哈……聽起來似乎是這樣沒錯……"
10034020-53 = "……咦。"
10034020-54 = "先，先等一下。#n所以我們各自負責的部分是……？"
10034020-56 = "我負責視覺……是嗎？視覺是什麼？要做些什麼？"
10034020-57 = "……哦哦，專輯封面跟樂團Logo？#n比想像中還多呢。"
10034020-58 = "還包含挑選服裝嗎？#n這點我倒是不排斥……"
10034020-59 = "那我就按照自己的喜好選囉！到時候可不准抱怨，知道嗎！？#n這可是「負責人的心意」啊！！"
10034020-64 = "唉……我已經有種會被你的時尚品味震驚的預感了。"
10034020-68 = "……等等。"
10034020-69 = "我剛剛說了「主唱」，該不會……"
10034020-70 = "恭喜你成為樂團的主唱～"
10034020-71 = "等，等一下！！這不對吧！哪有樂團會這樣決定主唱人選的！？"
10034020-73 = "但，但是千紗醬的聲音很好聽……！#n唱歌……應該也能唱得很好，對吧？"
10034020-74 = "我真的……很想聽聽看……！"
10034020-75 = "哦……愛莉居然在這種時候展開攻勢……"
10034020-76 = "……！！！那，那個……！！"
10034020-77 = "再怎麼說也……！也太……！就算是愛莉……！"
10034020-81 = "唔唔……！"
10034020-85 = "哇啊啊啊啊啊──！！"
10034020-93 = "哎呀，真是效果超群。#n他連一句拒絕的話都說不出口，根本被吃得死死的。"
10034020-94 = "呵呵，真是青春啊……青春是如此美麗……"
10034020-95 = "我的話……搖滾……搖滾……"
10034020-96 = "「搖滾」……相當值得深究呢……"
10034020-97 = "……嗯？老師你說什麼？"
10034020-98 = "樂團的營運管理……？日程表……？"
10034020-99 = "打掃……？"
10034020-100 = "那，那個……？這些跟搖滾有什麼關係……？只是做苦工而已吧。"
10034020-101 = "[s5]「你不知道嗎？搖滾明星走紅前都得先經歷一番打滾。」\n[s6]「為了成功而傾注熱情與努力──很『[ruby=勞苦]Rock[/ruby]』吧？」"
10034020-106 = "不是……那個……"
10034020-107 = "等等……玩笑話什麼的就……"
10034020-108 = "呀啊～！沒錯沒錯！這就是搖滾！搖滾就是充滿掙扎和磨難的！！"
10034020-115 = "青春是如此美麗，不是嗎！？#n到試鏡前就請多多指教囉～！Rock！！！"
10034020-116 = "搖……搖滾……！？青春……！？呃呃……"
10034020-117 = "你該不會到了這個節骨眼才想說「我不搖滾」吧？嗯？"
10034020-118 = "……！！！"
10034020-119 = "青……青……！！"
10034020-120 = "青春是……！"
10034020-121 = "痛苦的……"
10034020-127 = "啊哈哈……"
10034020-131 = "……咦。#n那麼我負責的是……「曲子」嗎？"
10034020-132 = "唔嗯……突然說要作曲，可是我從來沒有作曲的經驗……"
10034020-133 = "也沒有一定要做原創曲吧？#n只要挑選自己想演奏的歌曲就行了。"
10034020-134 = "畢竟本來就只是「業餘學生樂團的慶祝表演」，沒有人會期待聽到原創曲吧？#n不用擔心啦。"
10034020-135 = "不過我還是很期待唷～！可別選太難的曲子哦！哈哈！！"
10034020-136 = "唔，嗯！！選曲啊……"
10034020-137 = "就算是我也辦得到……！嗯！"
10034020-141 = "[ns7]（「就算是我」……？）\n[ns8]（「也辦得到」……？）"
10034020-146 = "好了好了！沒時間磨蹭了！#n現在身為「視覺負責人」的我要去找服裝了！"
10034020-147 = "我會把準備好的服裝放在練習室，大家到了之後就照順序換裝。知道了嗎？"
10034020-148 = "然後……明天的行程是……夏？"
10034020-149 = "哦不對……是「搖滾」！請告訴我們行程吧！"
10034020-156 = "……啊啊，行程是吧。這個問題問得很好，迷途的羔羊。#n我──搖滾──乃是掌管未來之人。"
10034020-157 = "適應得還真快。"
10034020-158 = "我們的未來……明天的我們……"
10034020-159 = "……得先去準備樂器吧？"
10034020-160 = "……行程負責人已經開示了！！"
10034020-161 = "居然讓平時最容易搞砸行程的人管理行程，這可是步險棋啊。"
10034020-162 = "老師又讓我長見識了。#n這就是大人的餘裕嗎……？"
10034020-163 = "[s9]「哼哼哼……！正是如此！！」\n[s10] 雖然並非本意，但決定以微笑帶過"
10034020-166 = "今天就先到此為止！！解散，解散！！"
10034020-167 = "大家明天放學後在樂器店見吧！！"
10034020-180 = "[ns] 「……」"
10034020-186 = "（當天深夜。埋頭處理著堆積如山的工作）"
10034020-193 = "[ns11]「……愛莉？」\n[ns12] 打開夏萊玄關的門"
10034020-202 = "不，不好意思……這麼晚還來打擾你，老師。"
10034020-203 = "……嗯？這套衣服？#n啊啊，這是……"
10034020-204 = "是喜美醬放在練習室的衣服。#n我正好看到了，所以就順手……哈哈……"
10034020-205 = "……咦？"
10034020-206 = "覺得我會來找老師……是嗎？"
10034020-207 = "為，為什麼……？"
10034020-208 = "[s13]「感覺你可能需要一些諮詢。」\n[s14]「是想談關於選曲的事吧。」"
10034020-213 = "啊，啊哈哈……果然什麼都瞞不過老師呢。"
10034020-214 = "是的，沒錯。我確實是來請教老師的意見……"
10034020-215 = "原本其實也打算自己選的，結果卻還是選不出來。"
10034020-216 = "選曲這件事……比想像中還困難呢。哈哈……"
10034020-217 = "嗯……"
10034020-218 = "唔嗯……"
10034020-219 = "老師覺得該選什麼曲子好呢？怎麼樣的曲子才是最好的呢……？"
10034020-220 = "……嗯？為什麼要選「最好的曲子」？"
10034020-221 = "因為……選出好的曲子才能得到好的結果吧……？#n這樣表演才會最成功……？"
10034020-222 = "咦？不是？這兩件事沒有關聯？"
10034020-223 = "……為什麼不選自己「喜歡的曲子」就好了？#n不，不行！那樣是不行的……！！"
10034020-227 = "對，對不起。#n不小心太激動了。"
10034020-228 = "但是……我這次無論如何都希望能選出最好的曲子……得到最好的結果。"
10034020-229 = "……希望能做到最好。"
10034020-230 = "雖然很難用言語表達……但大概就是這種感覺。"
10034020-234 = "[ns15]「那愛莉最近有聽到什麼很棒的曲子嗎？」\n[ns16]「最近有聽到讓你覺得『真是太棒了』的曲子嗎？」"
10034020-235 = "最近聽到很棒的曲子……？"
10034020-236 = "真是太棒了……？"
10034020-237 = "嗯……"
10034020-238 = "…………？"
10034020-239 = "哦……"
10034020-245 = "[ns]「……愛莉？」"
10034020-246 = "啊……！不，不好意思！#n我想得太入迷了……"
10034020-247 = "那個……雖然有……但是……"
10034020-248 = "我不知道那首歌叫什麼名字，就連唱歌的人也只是稍微看了一眼而已。#n不知道能不能找得到……"
10034020-249 = "而且他看起來也不像是三一的學生。#n只是在籌備學園祭的這段期間，偶然在閒晃時遇見他在街頭表演。"
10034020-250 = "更何況這段期間，也會有其他學園的學生不分晝夜地在街上表演……"
10034020-251 = "就算那個人還在，恐怕也得翻遍整個三一校園才行……"
10034020-252 = "……咦？"
10034020-253 = "那只要翻遍就行了？#n……要跟我一起去找找看？"
10034020-254 = "這，這是能輕易說出口的事嗎？#n現在就連該從三一的哪裡找起都不知道哦……？"
10034020-255 = "我是不是不方便？#n不，不會，我擔心的不是自己，而是這樣會浪費老師很多時間……！"
10034020-256 = "[s17]「愛莉不需要擔心這個。」\n[s18]「別擔心。因為這也是我的『職責』。」"
10034020-259 = "老師……"
10034020-260 = "……嗯，我明白了。那我就恭敬不如從命了。"
10034020-261 = "請問老師什麼時候比較方便呢……？"
10034020-265 = "……？"
10034020-266 = "…………咦？"
10034020-268 = "……現在？"

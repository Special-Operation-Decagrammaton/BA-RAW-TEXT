2002103-50 = "#all;hide"
2002103-51 = "3;하나에 산타ND;06;여긴 쉽지 않겠네요…… 건물 벽도 매끈하게 가공되어 있고, 손이나 다리를 뻗을 곳도 마땅치 않아요.\n#3;a\n#3;em;…"
2002103-52 = "3;하나에 산타ND;05;하지만 이 정도에 굴한다면, 산타를 자처할 수도 없겠죠!\n#3;hophop"
2002103-53 = "[s] \"부탁이니까 자처하지 않으면 안 될까?!\""
2002103-54 = "3;하나에 산타ND;05;미끄러지지 않도록 특수 장갑을 끼고…… 다리를 뻗을 곳을 주의하며……\n#3;greeting"
2002103-55 = "3;하나에 산타ND;05;하나씩, 조심해서……!\n#3;em;…"
2002103-56 = "#all;hide"
2002103-57 = "3;하나에 산타ND;00;트리니티 건물들은 장식이 많아서, 상대적으로 오르내리기에는 편하겠네요.\n#3;a\n#3;em;[반응]"
2002103-58 = "3;하나에 산타ND;99;하지만 만에 하나 장식을 손상시킨다면 큰일이 벌어질 테니,"
2002103-59 = "3;하나에 산타ND;03;좀 더 신중하고 조심스럽게 움직일 필요가 있겠어요!\n#3;hophop\n#3;em;[하트]"
2002103-60 = "[s] \"애초에 올라가지 않으면 장식이 손상될 일도 없을 텐데?!\""
2002103-61 = "3;하나에 산타ND;05\n#3;a\n#3;closeup"
2002103-62 = "3;하나에 산타ND;05;균형을 잃지 않게 주의하면서…… 한곳에 너무 오래 머물지 말고……\n#3;em;…\n#3;closeup"
2002103-63 = "3;하나에 산타ND;05;팔다리에 의지하기보다는 전신을 사용한다는 느낌으로……\n#3;closeup\n#3;stiff"
2002103-64 = "3;하나에 산타ND;07;보세요, 선생님! 저 잘하고 있죠?\n#3;closeup\n#3;em;[재잘]"
2002103-65 = "[ns] \"앞을 봐, 하나에! 앞!\""
2002103-66 = "#all;hide"
2002103-67 = "#place;오래된 거주 구역"
2002103-68 = "3;하나에 산타ND;00;이곳이야말로 가장 실전에 가까운 장소가 되겠네요.\n#3;em;…\n#3;a"
2002103-69 = "3;하나에 산타ND;99;집이 좀 낡았고, 자칫하면 깨지기 쉬운 구조물들도 어느 정도 있지만……"
2002103-70 = "3;하나에 산타ND;03;그런 장애물을 극복하는 것이 파쿠르이고, 산타죠!\n#3;em;[음표]"

2002103-72 = "#all;hide"
2002103-73 = "#na;(그 뒤로도 하나에는 차례차례 장소들을 정복해 나갔다……)"
2002103-74 = "#na;(몇 번인가는 정말로 큰일이 날 뻔했지만, 다행히 마지막까지 아무 사고도 일어나지 않았다……)"
2002103-75 = "#all;hide"
2002103-76 = "3;하나에 산타ND;07;해냈어요! 도와주셔서 감사해요, 선생님!\n#3;a\n#3;hophop\n#3;em;[재잘]"
2002103-77 = "[s] \"위장이 쓰려……\""
2002103-78 = "3;하나에 산타ND;01;이제야 비로소 제가 입고 있는 산타복에 부끄럽지 않을 수 있을 것 같아요!\n#3;em;[음표]"
2002103-79 = "3;하나에 산타ND;09;그리고 다음으로 도전할 것은……"
2002103-80 = "3;하나에 산타ND;02;네? 아직도 도전할 것이 남았냐고요?\n#3;em;[?]"
2002103-81 = "3;하나에 산타ND;05;당연하죠! 진정한 산타의 길에 다다르기 위해선 아직도 할 게 많다구요!\n#3;hophop"
2002103-82 = "3;하나에 산타ND;03;역시 다음 목표는 '마하 2 이상의 속도로 하늘을 날기' 로 정하겠어요!\n#3;em;[반응]"
2002103-83 = "3;하나에 산타ND;02;어디로 가야 관련된 조언을 얻을 수 있을까요, 선생님? 역시 밀레니엄 분들께 여쭤봐야 할까요?"
2002103-84 = "3;하나에 산타ND;99;듣기로는 거기의 엔지니어부 분들이 그렇게 대단하시다던데……\n#3;em;…"
2002103-85 = "[s] \"그것만은 제발 그만두자!\""

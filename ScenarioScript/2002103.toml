[translation]
2002103-1 = "Special Training! The Target? Santa!"
2002103-2 = "And so, Sensei!"
2002103-3 = "I've thought real long and hard about how to become the best Santa I can be!"
2002103-4 = "[s1] \"I'm getting nervous for some reason...\"\n[s2] \"Is this something doable for...real people?\""
2002103-5 = "Sensei! Don't be so dramatic!"
2002103-6 = "Sensei! Don't be so dramatic!"
2002103-7 = "It's something anyone can do! We can start practicing this very moment!"
2002103-8 = "[s] \"That doesn't make me feel any better...\""
2002103-9 = "Well, you should be excited! I've decided that the next step in my Santa journey is to learn parkour!"
2002103-10 = "Yup, yup! Parkour is a sport where you jump over obstacles, climb up and down walls, and overcome your limits!"
2002103-11 = "It makes perfect sense! How else will I get on top of roofs, slide down chimneys, and get back out?"
2002103-12 = "You must learn parkour to be the perfect Santa!"
2002103-13 = "Therefore, Sensei! Will you practice parkour with me?"
2002103-14 = "[s] Run away."
2002103-15 = "Hey! Get back here, Sensei! Adults shouldn't run from their problems!"
2002103-16 = "[s] \"Th-There's nowhere to practice parkour here anyway!\""
2002103-17 = "That's the beauty of parkour! We can practice wherever we want!"
2002103-18 = "I mean, just look at Schale! It's even better than I thought it'd be!"
2002103-19 = "The walls are the perfect height, and there's lots of solid structures."
2002103-20 = "A Santa's best trait is their single-minded determination, so I have to challenge my limits too!"
2002103-21 = "Okay, it's time! Just follow behind me, Sensei!"
2002103-27 = "Before I had a moment to protest, Hanae was already climbing the wall."
2002103-32 = "It was immediately obvious she had no idea what she was doing."
2002103-33 = "I-I think I can put my hand here... Now, move my leg up..."
2002103-34 = "EEK!"
2002103-39 = "I just barely managed to catch Hanae as she tumbled off the wall."
2002103-41 = "[ns] \"I was trying to tell you it was too dangerous...\""
2002103-42 = "But you caught me, didn't you?"
2002103-43 = "It's not dangerous as long as I'm with you, Sensei!"
2002103-44 = "Okay! To the next location!"
2002103-49 = "Hanae dragged me around from place to place, trying to find places to practice her newfound passion for parkour."
2002103-51 = "Hm... These walls aren't ideal... They're smooth as silk and there's no hand holds!"
2002103-52 = "But would Santa give up here? I don't think so!"
2002103-53 = "[s] \"I think Santa would give up, Hanae!\""
2002103-54 = "Good thing I brought special, grippy gloves to help myself climb! I just have to watch where my legs go..."
2002103-55 = "Bit by bit... carefully..."
2002103-57 = "Trinity's buildings have lots of decorations, which gives me lots of hand holds!"
2002103-58 = "But I would get in so much trouble if I damaged the decorations at all..."
2002103-59 = "I better move real carefully then!"
2002103-60 = "[s] \"Or if you don't climb, you don't have to worry about damaging anything!\""
2002103-62 = "I can do this... Just keep my balance, and don't stay still for too long..."
2002103-63 = "I have to use my legs AND my arms..."
2002103-64 = "Sensei, Sensei! Are you watching?! Aren't I doing great?"
2002103-65 = "[ns] \"Look ahead! Hanae! Stop...!\""
2002103-67 = "Old Living Quarters"
2002103-68 = "This is probably the best place I'm going to find."
2002103-69 = "It's kind of old...and crumbling a little bit, but..."
2002103-70 = "Parkour Santa can overcome anything!"
2002103-71 = "[s] \"There's no such thing as a Parkour Santa!\""
2002103-73 = "Surprisingly, Hanae conquered one building after another."
2002103-74 = "Despite putting herself in unbelievably dangerous situations, we managed to get through it without disaster striking. And then..."
2002103-76 = "I did it! Thank you for helping me, Sensei!"
2002103-77 = "[s] \"I feel sick...\""
2002103-78 = "With this training, I can proudly don my Santa outfit!"
2002103-79 = "And, now, onto the next challenge!"
2002103-80 = "What do you mean? Do I have more challenges?"
2002103-81 = "Of course I do! I still have a long way to go in my path to becoming a true Santa!"
2002103-82 = "The next goal is to fly through the skies at the speed of Mach two!"
2002103-83 = "But...how can I make that happen, Sensei? Maybe the students at Millennium know how..."
2002103-84 = "I heard their Engineering Department can do anything."
2002103-85 = "[s] \"I am begging you on both knees! Please don't!\""

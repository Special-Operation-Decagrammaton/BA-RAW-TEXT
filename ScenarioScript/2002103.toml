[translation]
2002103-1 = "#title;특훈! 노려라, 산타!"
2002103-2 = "3;하나에 산타ND;00;그래서 말이죠, 선생님!\n#3;a\n#3;em;[반응]"
2002103-3 = "3;하나에 산타ND;99;진정한 산타가 되기 위해 필요한 것이 또 무엇인지 생각해 봤는데요……!"
2002103-4 = "[s1] \"왠지 불안한 예감이 들기 시작했어……\"\n[s2] \"우리가 할 수 있는 거지? 그렇지?\""
2002103-5 = "3;하나에 산타ND;07;아이, 참. 그렇게 불안해하지 마시고요.\n#3;em;[재잘]\n#3;hophop"
2002103-6 = "3;하나에 산타ND;07;아이, 참. 그렇게 불안해하지 마시고요.\n#3;em;[재잘]\n#3;hophop"
2002103-7 = "3;하나에 산타ND;01;당장 여기에서도 할 수 있는 일이란 말이에요."
2002103-8 = "[s] \"어째서인지 더 불안해지기 시작했어……\""
2002103-9 = "3;하나에 산타ND;03;아무튼 제 결론은, 파쿠르였어요!\n#3;em;[반응]"
2002103-10 = "3;하나에 산타ND;07;네! 바로 그거예요! 맨몸으로 장애물을 극복하고, 벽을 오르고, 자기 자신을 뛰어넘는 운동이요!"
2002103-11 = "3;하나에 산타ND;99;벽을 자유자재로 타고 올라가, 굴뚝으로 선물을 전해주고, 다시 무사히 빠져나오려면,\n#3;em;…"
2002103-12 = "3;하나에 산타ND;03;파쿠르 같은 몸놀림이 꼭 필요할 거예요!\n#3;hophop"
2002103-13 = "3;하나에 산타ND;07;그런 의미에서 선생님, 우리 같이 파쿠르 훈련을 해 보지 않으시겠어요?\n#3;closeup\n#3;em;[반짝]"
2002103-14 = "[s] 도망친다."
2002103-15 = "3;하나에 산타ND;05;어허, 선생님! 도망치지 마세요! 어른이시잖아요!\n#3;em;[!]"
2002103-16 = "[s] \"하지만 파쿠르를 하기에 마땅한 장소도…… 없잖아?\""
2002103-17 = "3;하나에 산타ND;01;파쿠르 연습은 어디에서나 가능하다고요!"
2002103-18 = "3;하나에 산타ND;00;가령 여기 샬레 하우스만 해도…… 의외로 좋네요.\n#3;em;[반짝]"
2002103-19 = "3;하나에 산타ND;07;벽도 그다지 높지 않고, 튼튼한 구조물들도 많이 설치되어 있어요!"
2002103-20 = "3;하나에 산타ND;03;산타는 어떤 상황에서도 포기하지 않으니까, 저도 포기하지 않고 도전할 거예요!\n#3;hophop"
2002103-21 = "3;하나에 산타ND;02;자, 선생님. 제가 먼저 올라가 볼게요. 선생님도 따라 해 보시는 거예요?\n#3;em;[음표]"

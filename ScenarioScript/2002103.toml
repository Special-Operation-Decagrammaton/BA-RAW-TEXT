2002103-43 = "3;하나에 산타ND;03;선생님이 이렇게 지켜보고 계시는 이상, 저는 아무것도 두렵지 않아요!\n#3;hophop"
2002103-44 = "3;하나에 산타ND;00;자, 선생님. 다음 장소로 가 보죠!\n#3;em;[음표]"

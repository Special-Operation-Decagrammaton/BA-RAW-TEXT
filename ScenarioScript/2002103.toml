[translation]
2002103-1 = "特訓！通往聖誕老人之路！"
2002103-2 = "所以說！"
2002103-3 = "為了成為真正的聖誕老人所必須的是什麼，#n我左思右想的結果就是……！"
2002103-4 = "[s1]「開始有點不安了……」\n[s2]（要是在我能處理的範圍內就好了……）"
2002103-5 = "真是的，不要那麼害怕嘛～"
2002103-6 = "真是的，不要那麼害怕嘛～"
2002103-7 = "別擔心。是現在，在這裡就能做到的事情！"
2002103-8 = "[s]「那就好……話說，妳想出來的結果是……？」"
2002103-9 = "那就是跑酷！！！"
2002103-10 = "就是靠著自己的身體跨越障礙物與牆壁的那個！"
2002103-11 = "為了將禮物送達……想要自由自在地登上牆壁、在煙囪裡爬上爬下……"
2002103-12 = "果然就需要跑酷！"
2002103-13 = "所以老師，#n要不要一起練習跑酷呀？"
2002103-14 = "[s] 逃跑"
2002103-15 = "等等，老師！#n請別逃啊，你是大人了！"
2002103-16 = "[s]「就算是大人也不會跑酷！而且場地也……」"
2002103-17 = "場地的問題請不用擔心！"
2002103-18 = "就算是這個夏萊居住區也完全沒問題。"
2002103-19 = "牆壁不是很高，#n似乎也很堅固！"
2002103-20 = "聖誕老人不管面對什麼情況都不會放棄……#n既然如此，我也不能放棄！"
2002103-21 = "來吧，老師。我會先爬上去的，請跟著我來吧！"
2002103-27 = "（說完，花繪就開始爬起了牆）"
2002103-32 = "（不過果然還不太習慣，感覺微妙的有點危險……）"
2002103-33 = "呣呣，這裡該這樣……"
2002103-34 = "呀啊！？"
2002103-39 = "（勉強用雙手接住了摔下來的花繪）"
2002103-41 = "[ns]「好險……」"
2002103-42 = "不愧是老師，我就知道你會接住我的！"
2002103-43 = "只要有老師在，就沒什麼好怕的！"
2002103-44 = "走吧老師，我們去下一個地方吧！"
2002103-49 = "（像是被花繪拉著一樣，前往了其他地方）"
2002103-51 = "唔嗯，這裡好像很困難呢……#n幾乎沒有手可以抓的地方……"
2002103-52 = "但是這樣就屈服的話，就稱不上是聖誕老人了！"
2002103-53 = "[s]「就算稱不上也沒什麼不好吧……？」"
2002103-54 = "戴上手套避免手滑……#n腳踩在這裡……"
2002103-55 = "一步一步，小心翼翼……！"
2002103-57 = "三一的建築有很多裝飾，#n總覺得好像很好爬呢！"
2002103-58 = "但是，要是弄壞這些裝飾品的話會被罵的……"
2002103-59 = "小心點爬吧！"
2002103-60 = "[s]「沒有不爬的選項嗎！？」"
2002103-62 = "那麼就趕快，注意別失去平衡……"
2002103-63 = "不是依賴手腳，而是用全身來……"
2002103-64 = "請看，老師！#n怎麼樣啊！？"
2002103-65 = "[ns]「雖然很厲害，不過要注意腳邊啊！？」"
2002103-67 = "老舊的居住區"
2002103-68 = "這附近似乎最接近實戰呢。"
2002103-69 = "雖然是個只要失誤，腳邊就會崩塌的有點危險的地方……"
2002103-70 = "但是要克服這裡，才算的上是真正的聖誕老人！"
2002103-71 = "[s]「真的是那樣嗎！？」"
2002103-73 = "（之後花繪也接連去了各種地方……）"
2002103-74 = "（所幸最終沒有受傷，結束了這一天）"
2002103-76 = "感謝你的幫忙，老師！"
2002103-77 = "[s]「還好沒出事……」"
2002103-78 = "這樣一來，總算能感覺到自己成為配得上這套聖誕服的自己了！"
2002103-79 = "那麼接下來……"
2002103-80 = "……？怎麼了嗎？"
2002103-81 = "嗯，還要繼續下去唷！#n要成為真正的聖誕老人，我還有很多不足之處！"
2002103-82 = "果然接下來要能以2馬赫的速度飛行才行！"
2002103-83 = "該怎麼做呢？#n總之，先去問問千年的學生們嗎？"
2002103-84 = "我之前聽說過，那裡的工程師部的大家──"
2002103-85 = "[s]「那很危險的還是算了吧！」"

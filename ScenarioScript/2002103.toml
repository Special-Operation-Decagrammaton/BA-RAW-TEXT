[translation]
2002103-1 = "ฝึกพิเศษ! เส้นทางสู่ซานต้า!"
2002103-2 = "คุณครูคะ!"
2002103-3 = "ฉันไปคิดมาแล้วค่ะว่าหากจะเป็นซานต้าที่แท้จริง เราต้องทำอะไรบ้าง...!"
2002103-4 = "[s1] \"ทำไมครูมีลางสังหรณ์ไม่ดีชอบกล...\"\n[s2] \"เป็นสิ่งที่คนทำได้ใช่มั้ย? ต้องใช่เนอะ?\""
2002103-5 = "คุณครูนี่ก็ อย่ากังวลขนาดนั้นสิคะ"
2002103-6 = "คุณครูนี่ก็ อย่ากังวลขนาดนั้นสิคะ"
2002103-7 = "สิ่งที่ว่าเป็นสิ่งที่สามารถทำได้ที่นี่ทันทีเลยค่ะ"
2002103-8 = "[s] \"เริ่มกังวลมากกว่าเดิมแล้วสิ...\""
2002103-9 = "ขอเข้าประเด็นเลยแล้วกันค่ะ มันคือปาร์กัวร์ไงคะ!"
2002103-10 = "ใช่แล้ว! อันนั้นแหละค่ะ! การออกกำลังกายที่ให้วิ่งและกระโดดผ่านทุกสิ่งกีดขวางด้วยตัวเปล่าไงคะ!"
2002103-11 = "ถ้าเราอยากปีนกำแพงอย่างอิสระเพื่อส่งของขวัญให้เด็กๆ ทางปล่องไฟแล้วกลับออกมาอย่าง#nปลอดภัยละก็"
2002103-12 = "เราต้องเคลื่อนไหวร่างกายแบบปาร์กัวร์ค่ะ!"
2002103-13 = "เพราะงั้น เรามาลองฝึกปาร์กัวร์ดูมั้ยคะคุณครู?"
2002103-14 = "[s] วิ่งหนี"
2002103-15 = "เดี๋ยวเหอะ คุณครู! อย่าหนีกันสิคะ! คุณครูเป็นผู้ใหญ่นะคะ!"
2002103-16 = "[s] \"แต่เราไม่มีที่ที่เหมาะกับการฝึกปาร์กัวร์... ไม่ใช่เหรอ?\""
2002103-17 = "ฉันได้ยินมาว่าเราสามารถฝึกปาร์กัวร์ได้จากทุกที่เลยค่ะ!"
2002103-18 = "จริงๆ ถ้าจะทำกันในบ้านพักของชาเล่ต์... ก็ดีเหมือนกันนะคะ"
2002103-19 = "เพราะผนังก็ไม่ได้สูงมาก แถมตัวอาคารก็แข็งแรงมั่นคงด้วยค่ะ!"
2002103-20 = "ซานต้าคือคนที่ไม่ยอมแพ้ในทุกสถานการณ์ ดังนั้นฉันก็จะไม่ยอมแพ้เหมือนกันค่ะ มาลองดูกันสักตั้งเถอะค่ะ!"
2002103-21 = "เอาละ คุณครู ฉันจะเป็นคนขึ้นไปก่อนนะคะ ไว้คุณครูลองทำตามฉันนะคะ"
2002103-27 = "(ทันทีที่พูดจบ ฮานาเอะก็เริ่มปีนผนังขึ้นไป)"
2002103-32 = "(แต่สภาพของฮานาเอะนั้น... ดูน่ากังวลและไม่ปลอดภัยเลย)"
2002103-33 = "พอถึงตรงนี้ก็ใช้มือแบบนี้ แล้วก็เอาขาไปทางนั้น..."
2002103-34 = "อ๊าาา!!"
2002103-39 = "(คุณครูรับฮานาเอะที่ตกลงมาด้วยแขนทั้งสองข้าง)"
2002103-41 = "[ns] \"เห็นมั้ยล่ะ บอกแล้วว่าอันตราย...\""
2002103-42 = "แต่ก็มีคุณครูช่วยรับแบบนี้ไงคะ?"
2002103-43 = "ถ้าคุณครูคอยระวังให้แบบนี้ ฉันก็ไม่กลัวอะไรหรอกค่ะ!"
2002103-44 = "เอาละ คุณครู ไปที่ต่อไปกันเลยค่ะ!"
2002103-49 = "(ฮานาเอะลากแขนคุณครูไปนู่นนี่อย่างดื้อดึง...)"
2002103-51 = "ตรงนี้ไม่ง่ายเลยนะคะ... ผนังทั้งราบเรียบ แล้วก็ไม่มีที่ให้ยื่นแขนหรือเหยียดขาด้วยค่ะ"
2002103-52 = "แต่ถ้ายอมแพ้ง่ายๆ แค่นี้ ฉันคงเป็นซานต้าไม่ได้หรอกค่ะ!"
2002103-53 = "[s] \"ครูขอเถอะนะ ไม่ต้องเป็นไม่ได้เหรอ?!\""
2002103-54 = "แค่ต้องมีถุงมือพิเศษเพื่อป้องกันไม่ให้ลื่นไถล... แล้วก็ระวังว่าขาจะไปเตะอะไรบ้างหรือเปล่า..."
2002103-55 = "แล้วค่อยๆ เคลื่อนไหวทีละนิด...!"
2002103-57 = "อาคารของทรีนิตี้มีของตกแต่งอยู่เยอะ การปีนขึ้นลงน่าจะสะดวกอยู่นะคะ"
2002103-58 = "แต่หากเราไปทำของตกแต่งอะไรเสียหายขึ้นมา ก็จะเกิดเรื่องใหญ่ได้"
2002103-59 = "เพราะงั้นเรายิ่งต้องเคลื่อนไหวอย่างรอบคอบและระมัดระวังค่ะ!"
2002103-60 = "[s] \"แต่ถ้าเราไม่ขึ้นไปตั้งแต่แรก ก็จะไม่มีอะไรเสียหายนะ?!\""
2002103-62 = "ต้องระวังไม่ให้เสียสมดุล... แล้วก็อย่าอยู่ในจุดใดจุดหนึ่งนานเกินไป..."
2002103-63 = "แทนที่จะใช้แค่แขนหรือขา ให้เราใช้ทั้งร่างกายแทน..."
2002103-64 = "คุณครูคะ ดูสิ! ฉันทำได้ดีใช่มั้ยคะ?"
2002103-65 = "[ns] \"มองไปข้างหน้าเถอะฮานาเอะ! ข้างหน้า!\""
2002103-67 = "เขตที่อยู่อาศัยเก่า"
2002103-68 = "ที่นี่คงเป็นสถานที่ที่ใกล้เคียงกับการปฏิบัติจริงมากที่สุดนะคะ"
2002103-69 = "บ้านค่อนข้างเก่า แถมมีโครงสร้างบางอย่างที่เปราะบางด้วย..."
2002103-70 = "การก้าวข้ามอุปสรรคเหล่านี้ให้ได้ก็คือปาร์กัวร์ และคือซานต้านั่นเองค่ะ!"
2002103-71 = "[s] \"ซานต้าถูกตีความแบบนั้นตั้งแต่เมื่อไหร่กันนะ?!\""
2002103-73 = "(หลังจากนั้นฮานาเอะก็ค่อยๆ พิชิตสถานที่ต่างๆ ได้...)"
2002103-74 = "(หลายครั้งที่เกือบจะเกิดเรื่องใหญ่ แต่ก็โชคดีที่ไม่มีอุบัติเหตุใดๆ เกิดขึ้น...)  "
2002103-76 = "ฉันทำได้แล้วค่ะ! ขอบคุณที่ช่วยนะคะคุณครู!"
2002103-77 = "[s] \"ลุ้นจนลมจะจับ...\""
2002103-78 = "แบบนี้ฉันก็ไม่ต้องรู้สึกผิดต่อชุดซานต้าที่ใส่อยู่แล้วค่ะ!"
2002103-79 = "และสิ่งต่อไปที่ฉันจะไปท้าทายก็คือ..."
2002103-80 = "อ้าว? คุณครูไม่รู้หรอกเหรอคะว่าฉันมีสิ่งอื่นที่ยังอยากท้าทายอยู่?"
2002103-81 = "มันก็ต้องมีอยู่แล้วสิคะ! ฉันยังมีสิ่งที่ต้องทำอีกเยอะเพื่อไปให้ถึงเส้นทางของซานต้าที่แท้จริงค่ะ! "
2002103-82 = "และเป้าหมายต่อไปก็คือ 'การบินด้วยความเร็วอย่างน้อย 2 มัค' ค่ะ!"
2002103-83 = "เราต้องไปหาคำแนะนำเกี่ยวกับเรื่องนี้จากที่ไหนเหรอคะคุณครู? ชาวมิลเลเนียมน่าจะมีความรู้เรื่องนี้ใช่มั้ยคะ?"
2002103-84 = "จากที่ฉันได้ยินมา ชมรมวิศวกรรมของที่นั่นฝีมือดีกันมากๆ เลย..."
2002103-85 = "[s] \"ล้มเลิกเรื่องการบินนี้เถอะ ครูขอละ!\""

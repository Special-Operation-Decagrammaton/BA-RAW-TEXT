[translation]
70000010-1 = "A Suspicious Meeting 1"
70000010-4 = "Kekeke. I've finally arrived."
70000010-5 = "I have too many concerns to count, but to start..."
70000010-6 = "Why in the world are we here?"
70000010-7 = "Isn't it obvious? Red Winter Federal Academy is one of the biggest schools in Kivotos, which also means they have one of the biggest student populations."
70000010-8 = "That's not what I was asking."
70000010-9 = "There can't be a good reason you want an exchange meeting with Red Winter. What's up your sleeve, Makoto? "
70000010-11 = "Kekeke."
70000010-12 = "All will be revealed once we meet with their dictator!"
70000010-13 = "And my ingenious, marvelous plan will fall perfectly into place!"
70000010-15 = "(...I knew it. This is exactly why I didn't bring Ibuki with us.)"
70000010-16 = "Tell me your plan, I beg of you."
70000010-17 = "If I don't know your plan, I can't formulate a proper escape."
70000010-18 = "Heeheehee. There you go again, Iroha. This plan is going to be a success, I just know it."
70000010-19 = "(...Is exactly what she said the last eighty-two times.)"
70000010-27 = "Thank you very much for waiting, Pandemonium Society. My name is Tomoe, chief secretary at the Red Winter Office."
70000010-28 = "Our Great Leader is waiting. Please come this way."
70000010-34 = "Welcome to Red Winter, Gehenna people!"
70000010-36 = "(...Why is she wearing a fake mustache?)"
70000010-37 = "..."
70000010-47 = "It's...fake?!"
70000010-48 = "(...That took her way too long to realize.)"
70000010-49 = "This is Cherino, our esteemed president: Beautifier of Lands, Great Leader, Athletics Club Captain, Chief of Sanitation, Head of All Prefects, Maven of Meal Service, This Year's MVP, This Week's MVP, and Today's MVP."
70000010-50 = "Yes, that is me! I am the most important person you could have the honor of meeting at Red Winter!"
70000010-52 = "...Yup. She sounds exactly like a certain someone."
70000010-53 = "Heeheehee! Kekeke!"
70000010-54 = "Drop the formalities. I've cunningly lured you here, and my plan is a success!"
70000010-55 = "Hahahahahaha! What did I tell you, Iroha?"
70000010-64 = "...What did you do, Makoto?"
70000010-65 = "Isn't it obvious at this point?"
70000010-66 = "I've been colluding with the security chairman in secret! She wishes nothing more than to overthrow the dictator that stands at the top of Red Winter!"
70000010-67 = "She wanted a revolution! And I've been supporting her every step of the way. "
70000010-68 = "What?!"
70000010-69 = "Hahaha! To put it simply, this is a coup!"
70000010-78 = "Oh, a coup, you say?"
70000010-79 = "I don't have to hide it anymore! You've fallen directly into an elaborate trap set by me and your security chairman."
70000010-80 = "I think... I know where this is going..."
70000010-81 = "It's your turn, Security Chairman! Subdue the little kid, and together we'll reign over the enormous power that is Red Winter!"
70000010-85 = "U-Um... Hello? Security Chairman? That was her cue..."
70000010-87 = "Tomoe, where's Marina?"
70000010-88 = "She attempted to stage a coup last week, so she is currently being held at the Former Institute."
70000010-90 = "?!"
70000010-91 = "Marina will never stop trying, will she? I can't help but respect that iron will."
70000010-92 = "The security chairman was caught trying to stage a different coup?! And she's exiled?"
70000010-93 = "Perhaps Chair Makoto's plan was referring to last week's coup."
70000010-94 = "Please allow me to confirm."
70000010-100 = "Chairman Marina? I hope you have been well."
70000010-101 = "I was hoping to confirm the current situation with you. The Pandemonium Society of Gehenna arrived here, claiming they had planned to stage a coup with you today?"
70000010-102 = "Stage a coup...? Today?"
70000010-103 = "Ah. Yes, you're correct. It slipped my mind entirely to contact Gehenna."
70000010-104 = "Chief Secretary Tomoe, I'm sorry, but could you update them on the situation for me? I'm preoccupied with defeating this stubborn stain on the floor."
70000010-105 = "Understood. Good luck."
70000010-109 = "So, that appears to be the situation."
70000010-114 = "..."
70000010-115 = "..."
70000010-117 = "Heeheehee. It appears you're the one who missed your cue. Or perhaps Marina was just too impatient to wait for you."
70000010-125 = "B-But...? My plan...!"
70000010-129 = "*sigh* You've stuck your foot in it again, Makoto."
70000010-131 = "Escort the Pandemonium Society members to the exchange meeting hall."
70000010-136 = "Yes!"
70000010-138 = "?"
70000010-139 = "Please, right this way."
70000010-141 = "...I might not be in the position to say this, but this exchange meeting is still happening? Is this some kind of secret code for prison?"
70000010-142 = "Why would I do that? Coups are par for the course."
70000010-143 = "Of course, Marina will have to face the consequences for attempting to stage one, but we can't cancel something as important as a meeting with Gehenna over something so trivial."
70000010-145 = "T-Trivial...? Par for the course?!"
70000010-146 = "Naturally! Tomoe, how many coups have we had this past month?"
70000010-147 = "Three attempts, Great Leader, with two of them being successful."
70000010-148 = "You're right! Remember the epic grizzly bear ride I had through the snowy mountains? We traversed the icy seas and then returned triumphantly to the academy!"
70000010-149 = "Is that so? My records show that you very adorably screamed and cried for me when we encountered the bear. I found it very endearing."
70000010-153 = "Sh-Shut up, Chief Secretary!"
70000010-154 = "Ahem. I hope that gives you a better understanding, Chair."
70000010-155 = "I am the Great Leader of Red Winter! Such insignificant events can't even touch my power!"
70000010-157 = "I-Insignificant...?!"
70000010-158 = "No more talking! A dictator such as myself has a busy schedule! To the exchange meeting hall with you!"
70000010-159 = "A-All right... I guess..."
70000010-165 = "(How did I get dragged into this nonsense...?) "
70000010-166 = "(At least it's fun to see Makoto get pushed around by the little dictator.)"

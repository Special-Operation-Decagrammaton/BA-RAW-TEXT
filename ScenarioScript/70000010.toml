[translation]
70000010-1 = "怪しい交流会（１）"
70000010-4 = "キッ……キキッ。#nついに到着したか。"
70000010-5 = "色々と気になる点はありますが、まぁいいでしょう……。"
70000010-6 = "何故ここに？"
70000010-7 = "なんだ、知らないのか？#n広大な自治区を誇り大勢の生徒を保有する、かの有名なレッドウィンター連邦学園だ。"
70000010-8 = "いや、ここがどこかは知っています。"
70000010-9 = "突然レッドウィンターと交流会なんて……。#nマコト先輩、まさかとは思いますが、また何か妙なことを企んでいるわけではないですよね？"
70000010-11 = "キキキッ……。 "
70000010-12 = "そう焦るなイロハ。じきに分かることだ。"
70000010-13 = "これも全て、このマコト様が描いた素晴らしい計画の一部に過ぎないがな……。"
70000010-15 = "（また何やら面倒な……イブキを連れてこなくて正解でした）"
70000010-16 = "……はあ。計画があるならちゃんと説明してください。"
70000010-17 = "こちらも逃げるタイミングを事前に考えておかないといけないので。"
70000010-18 = "キキキッ……案ずるなイロハ。#n前回のようにはならない。"
70000010-19 = "（余計に不安なんですが……）"
70000010-27 = "[ruby=パンデモニウム・ソサエティー]万魔殿の皆さん[/ruby]、お待たせしてしまい申し訳ありません。#nレッドウィンター事務局の秘書室長、トモエと申します。"
70000010-28 = "チェリノ書記長のもとまでご案内いたします。"
70000010-34 = "待たせたな！ゲヘナの議員よ！"
70000010-36 = "（つけ髭……？）"
70000010-37 = "……。"
70000010-47 = "……あの髭、偽物か？"
70000010-48 = "（先輩……気付くのが遅いですよ）"
70000010-49 = "あの御方こそ、我がレッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼、清掃部部長兼、風紀委員長兼、給食部部長兼、今年のMVP、今週のMVP、今日のMVPに輝いたチェリノ様で御座います。"
70000010-50 = "そうだ！つまり偉い人なのだぞ！"
70000010-52 = "なんだか……聞いた事があるようなセリフですね、マコト先輩？"
70000010-53 = "キキキッ！！"
70000010-54 = "構うな、イロハ。ここまで来れば私の計画は成功したも同然だ！"
70000010-55 = "キヒャヒャヒャヒャッ！"
70000010-64 = "まったく、今度は何ですか……。"
70000010-65 = "分からないのか？ "
70000010-66 = "このマコト様は、革命を起こさんとしているレッドウィンターの保安委員長と、#n長きにわたり連絡を取っていたのだ！"
70000010-67 = "そして来る今日――計画は実行される！"
70000010-68 = "はい！？"
70000010-69 = "キキキキキッ！つまりこれは、レッドウィンターの内紛を利用したクーデターなのさ！"
70000010-78 = "あら、クーデターですか？"
70000010-79 = "今さら気付いたところで遅い！#nお前たちはこのマコト様と保安委員長の罠にまんまとハマったのだ！"
70000010-80 = "はぁ、前にもこんな事があったような……。"
70000010-81 = "さぁ、保安委員長！行くぞ！#n計画通り、そこのチビを叩きのめしてレッドウィンターの権力を分け合おうじゃないか！"
70000010-85 = "……おい、なぜ姿を現さない……？#n決行の時はたしか……。"
70000010-87 = "トモエ。マリナは今どこにいるのだ？"
70000010-88 = "先週クーデターを起こしたので、現在は旧校舎にいます。"
70000010-90 = "！？"
70000010-91 = "ほう……なるほど。また懲りずにクーデターを起こしたのか？#nやるではないか。その心意気だけは高く買ってやろう。"
70000010-92 = "ま、まさか内通がバレていたのか！？"
70000010-93 = "いえ、おそらくマコト議長の仰る「計画」とは、#n先週のクーデターのことなのではないでしょうか……？"
70000010-94 = "少々お待ちください。#n確認いたします。"
70000010-100 = "マリナ委員長、ご無沙汰しております。"
70000010-101 = "先ほどゲヘナから万魔殿の方々がいらしたのですが……。#nどうやらマリナ委員長をお呼びのようです。何か心当たりはありますか？"
70000010-102 = "私に……？"
70000010-103 = "あ、そうだ……クーデター！#nゲヘナに連絡するのを忘れていた！"
70000010-104 = "トモエ秘書室長、すみませんが計画は破綻したと代わりに伝えてくれますか？#n今は床の掃除で忙しいので……。"
70000010-105 = "分かりました。引き続きお掃除を頑張ってください。"
70000010-109 = "……とのことでした。"
70000010-114 = "……。"
70000010-115 = "……。"
70000010-117 = "残念だったな議長よ。日付を間違えていたのではないか？#nいや、マリナが何か言っていたような気も……。"
70000010-125 = "そ、そんな……このマコト様の計画が……！"
70000010-129 = "はぁ……。#nまあ、こんなことだろうと思ってましたけどね。"
70000010-131 = "うむ、では万魔殿の議員を会場まで案内するように。"
70000010-136 = "はい！"
70000010-138 = "？"
70000010-139 = "さあ、こちらへどうぞ。"
70000010-141 = "あの、私が言うのもなんですが……。#n牢獄や留置場ではなく、会場なのですか？本当にこのまま交流会を？"
70000010-142 = "何を言ってるんだ？#nクーデターなんて日常茶飯事ではないか。"
70000010-143 = "こそこそとクーデターを起こそうとしたマリナは粛清しているが……。#nこの程度で、ゲヘナとの交流会という大事な機会を逃すわけないだろう！"
70000010-145 = "に、日常茶飯事……！？"
70000010-146 = "トモエ、今月のクーデターはこれで何回目だ？"
70000010-147 = "未遂止まりが3回、成功したのが2回になります。"
70000010-148 = "ああ、思い出したぞ。#nこの間のクーデターでは、灰色の熊に乗って雪山と氷海を抜け、学園へ帰還する大冒険をしたんだったな！"
70000010-149 = "雪山で熊と遭遇した時、チェリノちゃんったらいつもより可愛い声で悲鳴を上げていましたね。"
70000010-153 = "ええい、うるさいぞ、秘書室長！"
70000010-154 = "ごほんごほん……。#nとにかく、そういうわけで、議長よ。"
70000010-155 = "おいらほどの会長ともなれば、そんな些細なことにこだわらないのだ！"
70000010-157 = "さ、些細だと……！？"
70000010-158 = "何をしている！#n早く会場へ向かうのだ。#nおいらは忙しいのだぞ！"
70000010-159 = "あ、ああ……分かった……。"
70000010-165 = "（これはこれは……）"
70000010-166 = "（マコト先輩……あの会長の勢いに完全に押されていますね)"

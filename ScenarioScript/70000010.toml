[translation]
70000010-1 = "งานแลกเปลี่ยนที่น่าสงสัย 1"
70000010-4 = "หึ... หึหึ มาถึงจนได้สินะ"
70000010-5 = "ฉันมีคำถามเต็มหัวไปหมดเลยค่ะ แต่คงต้องถามเรื่องนี้ก่อน..."
70000010-6 = "เรามาที่นี่กันทำไมเหรอคะ?"
70000010-7 = "อะไรกัน ไม่รู้หรอกเรอะ? ที่นี่คือสถาบันสหภาพเรดวินเทอร์นะ โรงเรียนที่มีพื้นที่เขตปกครองตนเอง#nกว้างขวาง และมีนักเรียนมากมายยังไงล่ะ"
70000010-8 = "เปล่าค่ะ ฉันรู้ดีค่ะว่าที่นี่คือที่ไหน"
70000010-9 = "งานแลกเปลี่ยนกับเรดวินเทอร์งั้นเหรอคะ... รุ่นพี่มาโคโตะคะ รุ่นพี่ไม่ได้คิดแผนการอะไรแปลกๆ อีกใช่ไหมคะ? "
70000010-11 = "หึหึหึหึ..."
70000010-12 = "ถ้าได้เจอจอมเผด็จการของที่นี่ก็จะรู้เอง"
70000010-13 = "ทั้งหมดนี้เป็นส่วนหนึ่งของแผนการที่ยิ่งใหญ่ของท่านมาโคโตะผู้นี้นี่แหละ..."
70000010-15 = "(...ต้องมีอะไรอยู่งั้นสินะ ดีแล้วที่ไม่ได้พาอิบูกิมาด้วย...)"
70000010-16 = "งั้นถ้ามีแผนการอะไรก็บอกกันตรงๆ นะคะรุ่นพี่"
70000010-17 = "อย่างน้อยก็ให้ฉันคิดเผื่อไว้ก่อนค่ะว่าจะต้องเผ่นตอนไหนดี"
70000010-18 = "หึหึหึ... เดี๋ยวก็รู้เองแหละอิโรฮะ ครั้งนี้จะไม่มีทางล้มเหลวเหมือนครั้งที่แล้วหรอกนะ"
70000010-19 = "(แบบนี้ยิ่งน่ากังวลขึ้นเรื่อยๆ เลยแฮะ...)"
70000010-27 = "ขอโทษที่ให้รอนานนะคะ แพนเดโมเนียม โซไซตี้ ฉันโทโมเอะ หัวหน้าเลขานุการของสำนักเลขาธิการ เรดวินเทอร์ค่ะ"
70000010-28 = "ท่านเลขาธิการกำลังรออยู่ ตามฉันมาทางนี้ได้เลยค่ะ"
70000010-34 = "มาแล้วเหรอสมาชิกเกเฮนน่า! รอกันนานเลยสินะ!"
70000010-36 = "(...... นั่นหนวดปลอมเหรอ?)"
70000010-37 = "......"
70000010-47 = "...อะไรเนี่ย? ของปลอมนี่นา"
70000010-48 = "(เพิ่งจะสังเกตเหรอคะรุ่นพี่...)"
70000010-49 = "นี่คือท่านเชริโน่ ผู้ดำรงตำแหน่งประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ และหัวหน้าฝ่ายอาหารของสหภาพเรดวินเทอร์ค่ะ อ้อ! ท่านถูกเลือกให้เป็น MVP ของปีนี้ ของสัปดาห์ที่แล้ว และของวันนี้ด้วยค่ะ"
70000010-50 = "ใช่แล้ว! ถ้าจะให้สรุปก็คือ เราเป็นคนสำคัญของที่นี่มากๆ เลยละ!"
70000010-52 = "ค่ะ... ฉันก็ได้ยินอะไรแบบนี้บ่อยๆ... จนชินแล้วค่ะ..."
70000010-53 = "หึหึหึหึ!!"
70000010-54 = "ไม่ต้องหรอกอิโรฮะ ไม่จำเป็นต้องแนะนำตัวหรอก ถ้ามาถึงที่นี่ก็ถือว่าสำเร็จแล้ว!"
70000010-55 = "ฮ่ะฮ่ะฮ่ะฮ่ะฮ่าาาา!!!!!  ทุกอย่างเป็นไปตามแผน"
70000010-64 = "คะ? หมายความว่าไงคะ... รุ่นพี่มาโคโตะ... ไปทำอะไรไว้อีกคะเนี่ย..."
70000010-65 = "เธอไม่รู้หรอกเหรอ อิโรฮะ?"
70000010-66 = "ท่านมาโคโตะผู้นี้แอบติดต่อกับหัวหน้าคณะความมั่นคงของสหภาพเรดวินเทอร์ที่เกลียดจอมเผด็จการ#nคนนั้นมาตั้งนานแล้ว!"
70000010-67 = "คนที่เราแอบติดต่อด้วยอยากจะให้มีการปฏิวัติ ที่ผ่านมาท่านมาโคโตะผู้นี้ก็เลยให้การสนับสนุนทั้งทาง#nวัตถุและจิตใจเลย!"
70000010-68 = "คะ?!"
70000010-69 = "ใช่แล้ว นี่คือการปฏิวัติโดยใช้ความขัดแย้งภายใน!!"
70000010-78 = "อุ๊ย จะมีปฏิวัติเหรอคะ?"
70000010-79 = "ใช่ มาถึงขั้นนี้ก็ไม่ต้องปกปิดแล้วละ! พวกเธอติดกับของท่านมาโคโตะและหัวหน้าคณะความมั่นคง#nเข้าให้แล้ว!"
70000010-80 = "แบบนี้เหมือนเคยเห็นที่ไหนมาก่อนเลย... นี่มัน..."
70000010-81 = "เอาละ หัวหน้าคณะความมั่นคง! ออกมาได้แล้ว! จับยัยเปี๊ยกคนนี้ไปแล้วมาแบ่งอำนาจในเรดวินเทอร์#nตามที่สัญญากันไว้!"
70000010-85 = "หืม...? ทำไมไม่ออกมาล่ะ...? สัญญากันไว้เวลานี้นี่นา..."
70000010-87 = "โทโมเอะ ตอนนี้มารินะอยู่ไหน?"
70000010-88 = "อาทิตย์ที่แล้วมารินะก่อปฏิวัติ ตอนนี้ก็เลยไปอยู่ที่อาคารเรียนเก่าค่ะ"
70000010-90 = "?!"
70000010-91 = "อืม... งั้นเองเหรอ หรือว่านี่คือการก่อปฏิวัติอีกครั้งจากทางนั้น? เยี่ยมไปเลยนะ เราละชื่นชมความพากเพียรนั้นจัง"
70000010-92 = "หะ... หัวหน้าคณะความมั่นคงโดนจับได้แล้วก็โดนเนรเทศไปแล้วงั้นเหรอ?!"
70000010-93 = "ไม่ค่ะ ดูจากสถานการณ์แล้ว การปฏิวัติที่ประธานมาโคโตะพูดถึงเหมือนจะเป็นการปฏิวัติที่เกิดไปเมื่อ#nสัปดาห์ที่แล้วเลย..."
70000010-94 = "ช่วยรอก่อนสักครู่นะคะ ฉันขอตรวจสอบอะไรหน่อยค่ะ"
70000010-100 = "หัวหน้าคณะฯ มารินะ สบายดีหรือเปล่าคะ?"
70000010-101 = "ไม่ใช่เรื่องอื่นใดหรอกค่ะ พอดีว่าแพนเดโมเนียม โซไซตี้จากเกเฮนน่าเพิ่งมาถึงที่นี่... ไม่ทราบว่าวันนี้#nมีแผนการจะก่อการปฏิวัติกันเหรอคะ?"
70000010-102 = "แผนการก่อปฏิวัติ...?"
70000010-103 = "อ๊ะ! จริงสิ! ลืมที่ติดต่อกับเกเฮนน่าไปซะสนิทเลย!"
70000010-104 = "หัวหน้าเลขานุการโทโมเอะ ต้องขอโทษด้วยนะคะ แต่ฝากบอกทางนั้นหน่อยได้ไหมคะ? พอดีฉันกำลังยุ่งกับการเช็ดคราบที่พื้น..."
70000010-105 = "ได้ค่ะ ถ้างั้นก็พยายามเข้านะคะ"
70000010-109 = "...หัวหน้าคณะฯ มารินะฝากบอกมาแบบนั้นน่ะค่ะ"
70000010-114 = "......"
70000010-115 = "......"
70000010-117 = "มาช้าเกินไปสินะ น่าเสียดายนะประธาน หรือว่ามารินะจะใจร้อนเกินไปหน่อย..."
70000010-125 = "มะ... ไม่นะ... แผนการของเรา...!?"
70000010-129 = "เฮ้อ... ก่อเรื่องอีกแล้วจนได้สินะคะ รุ่นพี่มาโคโตะ"
70000010-131 = "นำตัวสมาชิกแพนเดโมเนียม โซไซตี้ไปที่สถานที่จัดงานแลกเปลี่ยนซะ"
70000010-136 = "รับทราบค่ะ!"
70000010-138 = "?"
70000010-139 = "เชิญทางนี้เลยค่ะ ท่านสมาชิก"
70000010-141 = "คือ.. ฉันขอถามอะไรหน่อยค่ะ ที่ที่เราจะไปไม่ใช่คุกหรือห้องคุมขัง แต่เป็นสถานที่จัดงานแลกเปลี่ยน#nใช่ไหมคะ? จะจัดงานแลกเปลี่ยนกันแบบนี้จริงๆ เหรอคะ?"
70000010-142 = "พูดอะไรของเธอ? การก่อปฏิวัติเป็นเรื่องที่เกิดขึ้นบ่อยๆ อยู่แล้วไม่ใช่หรือไง"
70000010-143 = "เราไม่อยากให้เรื่องเล็กๆ แบบนี้มาทำให้กิจกรรมสำคัญอย่างงานแลกเปลี่ยนกับเกเฮนน่าต้องพังลง#nหรอกนะ ถึงเราจะไม่พอใจกับก่อการปฏิวัติของมารินะจนยกโทษให้ไม่ได้ก็เถอะ"
70000010-145 = "กะ... เกิดขึ้นบ่อยๆ งั้นเหรอ?!"
70000010-146 = "โทโมเอะ เดือนนี้มีปฏิวัติไปกี่ครั้งแล้วน่ะ?"
70000010-147 = "มีที่ทำไม่สำเร็จ 3 ครั้ง และทำสำเร็จได้จริงๆ 2 ครั้งค่ะ"
70000010-148 = "อื้ม เราจำได้แล้ว การปฏิวัติครั้งสุดท้ายเกิดขึ้นตอนไปออกผจญภัยครั้งใหญ่ ที่เราขี่หมีสีเทาผ่านภูเขา#nหิมะและธารน้ำแข็งกลับมาที่นี่น่ะ!"
70000010-149 = "......งั้นเหรอคะ? จำไม่ค่อยได้แล้วค่ะ แต่ที่ฉันจำได้ขึ้นใจคือ ตอนที่เจอหมีที่กลางภูเขาหิมะ เชริโน่จังตะโกนร้องด้วยเสียงสองที่น่ารักกว่าปกติอีกค่ะ"
70000010-153 = "หนวกหูน่า หัวหน้าเลขานุการ!"
70000010-154 = "ฮึ่ม ยังไงก็เถอะ... เรื่องมันก็เป็นอย่างนั้นแหละประธาน"
70000010-155 = "เลขาธิการแห่งเรดวินเทอร์อย่างเราไม่ยึดติดกับเรื่องขี้ปะติ๋วอย่างนั้นหรอก!"
70000010-157 = "ระ... เรื่องขี้ปะติ๋วงั้นเหรอ...?!"
70000010-158 = "มัวทำอะไรอยู่! รีบไปที่สถานที่จัดงานแลกเปลี่ยนสิ เราไม่ได้มีเวลาว่างทั้งวันหรอกนะ!"
70000010-159 = "อะ... อื้ม ไปก็ไป..."
70000010-165 = "(ที่นี่มัน... อะไรกันเนี่ย...) "
70000010-166 = "(รุ่นพี่มาโคโตะ... พอเจอท่าทีของประธานแล้ว รุ่นพี่ดูเหมือนถูกบงการไปเลยนะคะ)"

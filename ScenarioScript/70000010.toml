[translation]
70000010-1 = "可疑的交流會（１）"
70000010-4 = "嘻……嘻嘻。#n終於到了啊。"
70000010-5 = "雖然有很多令人在意的點，不過……"
70000010-6 = "為什麼要來這裡？"
70000010-7 = "什麼嘛，妳不知道嗎？#n這裡就是以廣大的自治區為傲並擁有大量學生的、那個有名的赤冬聯邦學園。"
70000010-8 = "不是，我知道這裡是哪裡。"
70000010-9 = "居然突然和赤冬舉辦交流會……#n真琴前輩，該不會又有什麼奇怪的企圖了吧？"
70000010-11 = "嘻嘻嘻……"
70000010-12 = "別急，伊呂波。妳馬上就會知道了。"
70000010-13 = "這一切只不過是我真琴大人所描繪的美好計畫的一部分罷了……"
70000010-15 = "（又在搞什麼麻煩的……沒帶伊吹來是對的）"
70000010-16 = "……唉。有計畫的話請好好說明一下。"
70000010-17 = "我也必須事先想好逃跑的時機。"
70000010-18 = "嘻嘻嘻……別慌，伊呂波。#n不會像上次一樣的。"
70000010-19 = "（更讓人不安了……）"
70000010-27 = "[ruby=Pandemonium Society]萬魔殿的各位[/ruby]，抱歉讓各位久等了。#n我是赤冬事務局的秘書室長，智惠。"
70000010-28 = "由我來帶各位去見潔莉諾書記長。"
70000010-34 = "讓你們久等了！格黑娜的議員們呀！"
70000010-36 = "（假鬍子……？）"
70000010-37 = "……"
70000010-47 = "……那個鬍子，是假的嗎？"
70000010-48 = "（前輩……太晚發現了吧）"
70000010-49 = "這位就是我們赤冬聯邦學園的學生會長，同時也是環境美化部部長兼、書記長兼、體育部代表兼、整潔部部長兼、風紀委員長兼、供餐部部長兼今年MVP、本週MVP、本日MVP的潔莉諾大人。"
70000010-50 = "沒錯！也就是偉大的人！"
70000010-52 = "總覺得……好像是在哪聽過的台詞呢，真琴前輩？"
70000010-53 = "嘻嘻嘻！！"
70000010-54 = "無所謂，伊呂波。到了這一步，我的計畫就已經算是成功了！"
70000010-55 = "哈哈哈哈！"
70000010-64 = "真是的，這次又做了什麼……"
70000010-65 = "妳不知道嗎？"
70000010-66 = "我真琴大人和打算引發革命的赤冬保安委員長，#n在很久以前就已經串通好了！"
70000010-67 = "於是在今天──計畫將被執行！"
70000010-68 = "什麼！？"
70000010-69 = "嘻嘻嘻嘻嘻！也就是說，這是利用赤冬內鬥引起的政變！"
70000010-78 = "哎呀，是政變嗎？"
70000010-79 = "現在注意到也已經太遲了！#n妳們已經掉入我真琴大人和保安委員長所設下的陷阱了！"
70000010-80 = "唉，之前好像也發生過這種事……"
70000010-81 = "來吧，保安委員長！要上囉！#n依照計畫推翻那個小鬼，一起平分赤冬的權力吧！"
70000010-85 = "……喂，為什麼不現身……？#n執行的時間應該已經……"
70000010-87 = "智惠。瑪麗娜現在在哪裡？"
70000010-88 = "因為上週發動了政變，現在到舊校舍去了。"
70000010-90 = "！？"
70000010-91 = "哦……原來如此。又不屈不撓地發動政變了嗎？#n挺有兩下子的嘛，那份精神值得讚賞。"
70000010-92 = "難，難道事跡敗漏了嗎！？"
70000010-93 = "不，我想真琴議長所說的「計畫」，#n會不會是上週發生的那場政變呢……？"
70000010-94 = "請稍等。#n我來進行確認。"
70000010-100 = "瑪麗娜委員長，久疏問候。"
70000010-101 = "剛才格黑娜萬魔殿的客人們來訪……#n似乎找瑪麗娜委員長有事。請問您有什麼頭緒嗎？"
70000010-102 = "找我……？"
70000010-103 = "啊，對了……政變！#n我忘記聯絡格黑娜了！"
70000010-104 = "智惠秘書室長，不好意思，可以替我轉達計畫失敗了嗎？#n我現在正忙著清理地板……"
70000010-105 = "我明白了。請繼續努力清掃吧。"
70000010-109 = "……事情就是這樣。"
70000010-114 = "……"
70000010-115 = "……"
70000010-117 = "真遺憾呢，議長呀。搞錯日期了嗎？#n不，瑪麗娜剛才似乎想說些什麼……"
70000010-125 = "怎，怎麼可能……我真琴大人的計畫……！？"
70000010-129 = "唉……#n算了，我早就想過會這樣了。"
70000010-131 = "唔呣，那麼帶萬魔殿的議員們到會場去吧。"
70000010-136 = "是！"
70000010-138 = "？"
70000010-139 = "請跟我來。"
70000010-141 = "那個，雖然我這麼說有點奇怪……#n不是去監獄或拘留所，而是去會場嗎？真的要就這樣進行交流會？"
70000010-142 = "妳在說什麼呢？#n政變什麼的不是家常便飯嗎？"
70000010-143 = "偷偷計畫發動政變的瑪麗娜雖然正在接受肅清……#n也不能因為這點小事，就放棄和格黑娜進行交流會這種重要的機會吧！"
70000010-145 = "家，家常便飯……！？"
70000010-146 = "智惠，這是這個月的第幾次政變？"
70000010-147 = "三次未遂、兩次成功。"
70000010-148 = "啊啊，咱想起來了。#n之前的政變，是在咱進行騎著灰熊穿越雪山和冰海並回到學園的大冒險的時候呢！"
70000010-149 = "在雪山遇到熊的時候，潔莉諾醬發出了比平常更可愛的悲鳴呢。"
70000010-153 = "哎咿，真囉嗦，秘書室長！"
70000010-154 = "咳咳……#n總之，事情就是這樣，議長。"
70000010-155 = "咱這麼偉大的會長，才不會拘泥於那種小事！"
70000010-157 = "小，小事……！？"
70000010-158 = "還在做什麼！#n趕快到會場去吧。#n咱可是很忙的！"
70000010-159 = "啊，啊啊……知道了……"
70000010-165 = "（哎呀哎呀……） "
70000010-166 = "（真琴前輩……完全被那個會長的氣勢壓制住了呢）"

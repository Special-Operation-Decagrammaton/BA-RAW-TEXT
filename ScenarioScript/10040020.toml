10040020-49 = "3;유우카 파자마;19;왜 계속해서 남의 방을 멋대로 뒤지는 거야!\n#3;em;[빠직]\n#3;closeup\n#fontsize;80"
10040020-50 = "3;노아 파자마;02;그야…… 파자마 파티는 방에 숨겨 둔 비밀스러운 책이나 사진을 찾는 걸로 시작하는 게 당연하잖아요?\n#3;em;[?]"
10040020-51 = "3;노아 파자마;01;전에 도서관에서 읽은 순정 소설에 그렇게 쓰여 있었는걸요."

10040020-62 = "3;유우카 파자마;15;……게다가 베리타스는 세미나의 일에 비협조적이라는 인상도 있고."
10040020-63 = "5;노아 파자마;03;어머나? 오해는 충분한 대화로 풀 수 있다고 말했던 건, 유우카 아니었던가요?\n#5;a\n#5;em;[반응]\n#3;m1"
10040020-64 = "5;노아 파자마;01;이번 기회에 마키 쨩과도 충분히 이야기를 나누고, 베리타스에 대한 편견을 조금은 거두어 보는 게 어떨까요."
10040020-65 = "3;유우카 파자마;12;알겠어, 알겠어. 그럼 보드 게임은 마키에게 빌리는 것으로.\n#3;em;[한숨]"

10040020-57 = "3;유우카 파자마;02;하지만 세미나 부실에는 낡은 트럼프 카드 밖에 없을 텐데. 노아, 혹시 보드 게임 같은 거 갖고 있어?"
10040020-58 = "3;노아 파자마;01;글쎄요. 저도 본격적인 보드 게임은 갖고 있지 않지만……"

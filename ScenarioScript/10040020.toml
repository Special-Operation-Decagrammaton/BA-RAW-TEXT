10040020-34 = "1;유우카 파자마;99;물론 코유키가 다소 생각없이 말을 하는 경향이 있기는 하지만, 심성이 비뚤어지거나 편견을 가진 아이는 아니니까……\n#3;dr\n#1;em;[...]\n#1;m3"
10040020-35 = "1;유우카 파자마;02;서로 충분히 시간을 들여서 이야기를 나눈다면 코유키도 노아에 대한 오해를 풀 수 있을 거야."
10040020-36 = "1;유우카 파자마;01;게다가 최근에는 여러 가지 사건들이 연달아 터지면서 세미나 임원들끼리 사적인 이야기를 나눌 시간이 부족했기도 하고."
10040020-37 = "1;유우카 파자마;13;그래서 오늘 이렇게 파자마 파티를 준비한 거니까!\n#1;em;[!]"
10040020-38 = "#all;hide"
10040020-39 = "3;노아 파자마;99;……역시 유우카 쨩은 상냥하네요.\n#3;em;[반응]"
10040020-40 = "3;노아 파자마;01;물론 저 역시도 귀여운 후배와의 관계를 돈독히 하는 건 찬성이랍니다. 게다가 세미나 임원끼리 즐기는 파자마 파티라니— 신선한 기획이라 기대도 되고요."
10040020-41 = "3;노아 파자마;10;그리고 긴장을 내려놓은 채 즐겁게 이야기하다 보면, 평소에는 알지 못했던 유우카 쨩의 또 다른 모습을 발견할 수 있을지도 모르니까요. 후후.\n#3;em;[음표]\n#3;closeup"
10040020-42 = "3;유우카 파자마;09;(뭔가, 코유키가 말했던 '프레셔'가 조금은 이해될지도……)\n#3;stiff\n#3;em;[땀]"
10040020-43 = "3;노아 파자마;01;그나저나 유우카 쨩의 기숙사 방에 직접 들어와 보는 것도 정말 오랜만이네요. 평소에는 세미나 부실에서 헤어져 따로 돌아갔으니까요."
10040020-44 = "3;노아 파자마;02;전에 왔을 때랑 비교하면 꽤 장식이 늘어났네요. 전에 없던 포스터나 사진도 있고……\n#3;m4"

10040020-25 = "#clearST"
10040020-26 = "3;노아 파자마;99\n#3;em;[...]\n#wait;2500"
10040020-27 = "3;노아 파자마;01;……뭐, 코유키 쨩도 '누구처럼' 속을 알기 어려운 선배보다는, 잔소리는 잦더라도 솔직하게 챙겨주는 선배 쪽이 대하기 편하겠지요."

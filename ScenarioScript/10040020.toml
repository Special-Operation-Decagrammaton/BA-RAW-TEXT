10040020-10 = "3;노아 파자마;01\n#3;greeting\n#wait;1500"
10040020-11 = "3;노아 파자마;01;칫솔과 세면도구가 담긴 외박 세트도 있고, 늦은 밤에 먹어도 부담스럽지 않은 가벼운 주전부리도 있고……\n#3;em;[반응]\n#3;m4"
10040020-12 = "3;노아 파자마;08;이 귀여운 토끼 파자마는…… 사이즈를 보니 코유키 쨩을 위해 준비한 물건인가요?"
10040020-13 = "1;유우카 파자마;19;그, 그건……!\n#3;m5\n#1;em;[땀]\n#1;ar"
10040020-14 = "3;노아 파자마;02;이상하네요. 요 며칠간 유우카 쨩이 세미나 부실 밖으로 나갔던 적은 없었던 것 같은데."
10040020-15 = "3;노아 파자마;01;이건 언제 준비한 파자마인가요?\n#3;em;[?]"
10040020-16 = "1;유우카 파자마;09;그게 그러니까…… 지난주에 번화가에 옷을 사러 갔다가 토끼 귀가 달린 귀여운 디자인의 파자마를 발견해서……\n#3;dr\n#1;m3"
10040020-17 = "1;유우카 파자마;08;내가 입기에는 조금 작은 사이즈지만, 뭔가 색이나 디자인이 코유키에게 잘 어울릴 것 같잖아? 그래서 나중에 선물로 주려고 샀는데—"

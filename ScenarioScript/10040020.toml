[translation]
10040020-1 = "第2話;歲末年初"
10040020-3 = "所以……"
10040020-4 = "要我換上睡衣再回來，就是為了這個嗎？"
10040020-5 = "等等，乃愛！你別擅自偷看！我還沒準備好啦！"
10040020-6 = "呵呵，畢竟這裡有這麼多有趣的東西，所以一時沒忍住。"
10040020-11 = "除了裝著牙刷和洗漱用具的旅行用品組之外，#n還有即使是在大半夜裡吃，也不會造成腸胃負擔的小零食……"
10040020-12 = "居然還有這麼可愛的兔子睡衣……從尺寸來看，應該是為小雪醬準備的吧？"
10040020-13 = "那，那是……！"
10040020-14 = "不過這還真神奇，我記得你這幾天應該都沒有離開過研討會的部室才對……"
10040020-15 = "這套睡衣是什麼時候準備的呢？"
10040020-16 = "那是……我上週去鬧區買衣服的時候，剛好看到了那套可愛的兔耳睡衣……"
10040020-17 = "雖然尺寸對我來說有點小，但你不覺得它的顏色和風格都很適合小雪嗎？#n所以我才會買下來，準備之後當禮物送他──"
10040020-21 = "等一下，為什麼我要跟你解釋這種事啊？"
10040020-23 = "呵呵，優香醬每次碰到跟小雪醬有關的事，都會變得特別心軟呢。"
10040020-27 = "……這也難怪。跟「某個」難以揣測心裡想法的前輩相比，#n我想小雪醬應該也更喜歡你這個雖然嘮叨，卻會坦率地照顧他的前輩吧？"
10040020-28 = "乃愛，你該不會很在意小雪剛才說的話吧？"
10040020-32 = "……沒有那種事哦？"
10040020-33 = "明明就有……"
10040020-34 = "雖然小雪的確常常說話不經大腦，#n但其實他的心地並不壞，也不是會用有色眼光看待別人的那種人……"
10040020-35 = "我相信只要你願意好好花時間跟他溝通，你們之間的誤會肯定很快就會解開的。"
10040020-36 = "而且最近接連發生了那麼多事情，我們研討會也都沒什麼時間聊聊彼此的近況。"
10040020-37 = "所以我今天才會特地準備這場睡衣派對！"
10040020-39 = "……優香醬果然很體貼呢。"
10040020-40 = "我也贊成和可愛的後輩多多交流。#n而且像「研討會的睡衣派對」這麼新鮮的點子，也讓我倍感期待。"
10040020-41 = "除此之外，如果我們能好好敞開心胸聊聊的話，#n說不定就能明白優香醬不為人知的一面了呢，呵呵。"
10040020-42 = "（我好像有點明白小雪說的「壓迫感」是怎麼回事了……）"
10040020-43 = "話說回來，我好久沒有進來優香醬的房間了呢。#n我們平時都是在研討會的部室分開的。"
10040020-44 = "跟上次來的時候比起來，你的房間好像又多了許多裝飾。#n那些海報和照片，我之前都沒有看過……"
10040020-48 = "哎呀？這該不會是老師的──"
10040020-49 = "你，你怎麼亂翻別人的房間！"
10040020-50 = "那當然是因為……#n所謂的睡衣派對，不都是從尋找藏在房間裡的祕密書籍或照片開始的嗎？"
10040020-51 = "我之前在圖書館裡讀的那本純愛小說也是這麼寫的。"
10040020-52 = "哪有這種事啊！？而且睡衣派對根本就還沒開始好嗎！"
10040020-53 = "有時間開玩笑的話，不如幫我一起整理衣服吧。"
10040020-54 = "是～"
10040020-56 = "……衣服好像都整理好了，現在應該只剩下準備幾樣能一起玩的桌遊了吧？"
10040020-57 = "不過我記得研討會的部室裡，就只有一組用了很多年的撲克牌。#n乃愛，你那邊有桌遊嗎？"
10040020-58 = "這個嘛，我房間裡也沒有桌遊這種東西……"
10040020-59 = "啊，對了，我之前聽說真紀醬有很多沒在玩的桌遊，跟他借個一晚應該沒關係吧？"
10040020-60 = "你是說貝里塔斯的真紀嗎？"
10040020-61 = "雖然他看起來的確像是會玩桌遊的人，不過我總覺得他不會想借我們。"
10040020-62 = "……畢竟貝里塔斯平時就不太願意配合我們研討會。"
10040020-63 = "哎呀？剛才說只要好好溝通就能解開誤會的人，不就是優香醬嗎？"
10040020-64 = "不如就趁這個機會和真紀醬好好聊聊，放下你對貝里塔斯的成見如何？"
10040020-65 = "知道了知道了，那我們就去找真紀借桌遊吧。"
10040020-66 = "不過這場睡衣派對終究只是我們私底下舉辦的活動……#n為了避免之後被當成把柄，你可別寫在研討會的紀錄上喔。"
10040020-67 = "嗯，這次我就特別網開一面吧，呵呵。"
10040020-77 = "唔……光是這樣果然很難讓人留下深刻的印象，是因為設計太過普通了嗎？"
10040020-78 = "如果把邊緣的飽和度降低，然後加入更強烈的對比──"
10040020-86 = "啊，真紀，你在這裡啊。"
10040020-87 = "因為你不在宿舍，我們找你找了好一陣子呢。"
10040020-89 = "哎呀，優香前輩。#n連乃愛前輩也來了……？"
10040020-90 = "雖然今天是今年的最後一天，不過你們怎麼這麼早就換上睡衣了？#n已經要睡覺了嗎？現在會不會有點太早了？"
10040020-92 = "其實這是有原因的……"
10040020-93 = "為了促進研討會成員間的感情，我們正在籌備一場跨年睡衣派對。"
10040020-94 = "雖然優香醬舉辦派對真正的原因……#n是擔心小雪醬被關在反省室裡，必須自己孤零零地度過跨年夜，所以才會積極地──"
10040020-95 = "乃愛！"
10040020-97 = "哇～居然是睡衣派對，真羨慕你們。#n要是我們貝里塔斯也能辦個睡衣派對就好了……"
10040020-98 = "不過仔細想想，其實我們平時就經常熬夜吃餅乾打電動了……"
10040020-99 = "話說回來，真紀醬在這裡做什麼？#n今天明明是跨年夜，怎麼不像平常一樣跟其他成員在一起呢？"
10040020-100 = "我？我在畫不久後要舉行的「千年博覽會」的海報。"
10040020-101 = "因為今年的行程突然提前，所以距離海報的截止期限沒剩多少時間了。"
10040020-102 = "啊，聽你這麼一說，明年的博覽會確實因為人力問題而大幅提前了呢。"
10040020-103 = "看來你也為學園的事付出了不少心力。"
10040020-104 = "沒有啦～反正我今年跨年夜也沒有特別的安排，正閒得發慌呢。"
10040020-105 = "而且在歲末年初這種嘈雜的氛圍下，我有時候能得到一些平時得不到的靈感。"
10040020-107 = "其實我每次看你的作品時都覺得，你真的很有才華呢……"
10040020-108 = "你明明這麼會畫畫，怎麼不考慮去狂獵藝術學院呢？"
10040020-109 = "唔嗯，這件事說來話長……"
10040020-110 = "話說你們不是找我有事嗎？"
10040020-111 = "哎呀呀，差點把這件事給忘了。"
10040020-112 = "真紀，如果你有暫時閒置的桌遊，可以借我們嗎？#n我們想幫睡衣派對準備幾個餘興節目。"
10040020-113 = "嗯，反正我最近應該也沒機會玩，借給你們當然沒關係……"
10040020-114 = "但是桌遊前幾天被小玉前輩和晴前輩借走，到現在還沒還我。"
10040020-115 = "如果你們不介意的話，要不要直接去跟他們拿？#n我的畫還沒畫完，所以現在暫時走不開。"
10040020-117 = "我知道了。#n等我們玩完之後，我再直接拿來還你。"
10040020-118 = "呵呵，所以是明年才會還我對吧？"
10040020-119 = "那我們明年見囉，優香前輩！"
10040020-120 = "嗯，真紀，祝你新年快樂。"
10040020-123 = "唔嗯……沒想到小玉前輩和晴也都不在宿舍裡……"
10040020-124 = "不知道是不是又在策劃什麼奇怪的陰謀，真叫人擔心。"
10040020-125 = "這會不會有點杞人憂天了？"
10040020-126 = "今天畢竟是今年的最後一天……#n或許他們也跟真紀醬一樣，正在某個地方為明年的活動努力奮鬥也說不定。"
10040020-127 = "不，我們絕對不能掉以輕心。"
10040020-128 = "別忘了貝里塔斯的成員們，過去背著我們惹出了多少麻煩──"
10040020-129 = "我們的成員又製造出了什麼麻煩嗎？"
10040020-133 = "這個聲音是……"
10040020-134 = "啊，千尋部長，你有沒有看到小玉和晴──"
10040020-137 = "發，發生什麼事了？你看起來超累的耶！？"
10040020-138 = "沒什麼，你不用在意。#n我只不過是四十八小時沒睡覺而已。"
10040020-139 = "那明明非常嚴重吧！"
10040020-140 = "難道學園的伺服器安全出了什麼問題嗎？"
10040020-141 = "不是伺服器安全的問題……只是有人回報說，#n在千年的公共伺服器裡發現了一種，就連最新的防毒軟體都抓不到的惡性程式碼。"
10040020-142 = "據說它會把電腦桌布突然換成恐怖圖片，或者隨機傳一些毫無內容的郵件……#n根據這些情報，我認為那應該是一種惡作劇病毒……#n然而我這兩天仔細地檢查了很久，卻始終沒在伺服器裡找到任何病毒的蹤跡。"
10040020-143 = "……沒有找到蹤跡代表什麼呢？"
10040020-144 = "要嘛是回報的人誤會了，要嘛就是做出這個程式的駭客比我還要厲害。"
10040020-145 = "不過無論是哪一種，現在我都束手無策，所以正準備要去睡覺了。"
10040020-146 = "沒想到都到了跨年夜，你還是這麼忙呢。"
10040020-147 = "維護伺服器本來就是這樣的吧？"
10040020-148 = "話說回來，找我們的成員有什麼事嗎？"
10040020-150 = "其實也沒什麼……#n只是我們研討會內部要辦一場睡衣派對，所以想找晴和小玉前輩借桌遊。"
10040020-151 = "睡衣派對啊……聽起來好像很有趣。#n雖然我大概沒什麼機會體驗就是了。"
10040020-152 = "如果要找晴和小玉的話，他們人應該在貝里塔斯的休息室裡。#n因為我剛才在部室的公共伺服器上，看到了晴和小玉的手機配對紀錄。"
10040020-153 = "貝里塔斯的副部長連這種事都查得到嗎？"
10040020-154 = "跟在黑漆漆的房間裡尋找可能不存在的程式碼相比，這只能算是小菜一碟。"
10040020-155 = "哈啊……希望今晚別發生任何騷動。"
10040020-157 = "別擔心，堂堂貝里塔斯的副部長都檢查了兩天的時間，#n我不相信奇普托斯裡有那麼厲害的駭客，能在一天之內突破你設下的重重防護。"
10040020-158 = "所以今晚就什麼都別擔心，好好休息吧。"
10040020-159 = "祝你有個好夢，我們明年見，前輩。"
10040020-161 = "好好好，你們兩個也新年快樂。"
10040020-163 = "來，小玉前輩。#n我已經照你的吩咐，寫好「當玩家插入正確的洞時會自動開始錄音」的程式了。"
10040020-164 = "不過為什麼玩桌遊會需要錄音呢……？"
10040020-165 = "這還用問嗎，晴。#n像海盜桶這種具備驚嚇元素的桌遊，會需要錄音功能的理由不就只有一個嗎？"
10040020-167 = "那就是錄下玩家被嚇到時的尖叫聲。"
10040020-169 = "不是，我也知道八成是這樣沒錯……只是你錄下別人的尖叫聲要做什麼？"
10040020-170 = "你平時聽的ASMR不都是一些輕柔的音效嗎？#n那些跟尖叫聲完全沒有關係吧？"
10040020-171 = "雖然尖銳高亢的尖叫聲確實不太受歡迎，不過相關的樣本也因此相當稀少。"
10040020-172 = "舉例來說，電影圈也經常拿經典電影裡那些已經失真的尖叫聲來重複利用。"
10040020-173 = "因此如果我們能大量取得在現實情況下錄到的尖叫聲，#n以後說不定能用來交換其他更有價值的錄音檔……"
10040020-175 = "……交換？#n這世界上還有其他跟你有同樣興趣的人嗎？"
10040020-176 = "何況要是這個桌遊被[USERNAME]老師拿去玩的話，#n說不定連老師被嚇到的聲音都會被錄下來耶？"
10040020-177 = "這……我倒是還挺有興趣的……"
10040020-178 = "呵呵。總之既然迷你型錄音機已經安裝完畢，就算是大功告成了。"
10040020-179 = "現在我們只要把海盜桶放回原位，並且觀察其他人的使用情況──"
10040020-184 = "……像那種目的不單純的桌遊，我們是不可能讓你們把它放回原位的。"
10040020-188 = "研，研討會？#n你們什麼時候來的！？"
10040020-189 = "難道連研討會也盯上了這個有錄音機的桌遊嗎？"
10040020-190 = "如果硬要說的話，我們比較想借沒有裝錄音機的桌遊……"
10040020-191 = "不過那個錄音機可能會侵害他人的隱私，所以也要一併沒收。"
10040020-192 = "怎麼這樣～"
10040020-194 = "你們兩個怎麼連跨年夜都不放過，還是想盡辦法要製造麻煩呢？"
10040020-195 = "就是因為這樣，外界才會說我們千年沒有一個社團是正常的。#n請你們在新的一年多多向千尋副部長看齊。"
10040020-197 = "唔嗯……"
10040020-198 = "雖然我們好像沒資格說這種話……"
10040020-200 = "咦？為什麼你們一副做賊喊抓賊的表情……？"
10040020-201 = "就算我們真的經常在學園內外惹麻煩，但你們研討會也不遑多讓吧？"
10040020-202 = "根據我聽到的傳聞，「研討會的某人」癱瘓的保全數量好像比貝里塔斯還多……"
10040020-203 = "小，小雪他也有在反省了哦！？"
10040020-204 = "他最近這個月──不，最近這一週都有乖乖在反省！"
10040020-206 = "你不用那麼著急地替小雪醬辯解哦，優香醬。"
10040020-207 = "……不過這麼說來，小雪醬最近確實安分了不少。"
10040020-208 = "既沒有嘗試從反省室逃跑，也沒有再對未經授權的電子裝備出手了……"
10040020-210 = "難道是因為新的一年快到了，所以他也跟著變成熟了嗎？"
10040020-211 = "原來如此，所以這次的睡衣派對是為了獎勵安分守己的小雪囉？"
10040020-213 = "與其說是獎勵……不如說是不幫他找點事情做的話，誰知道他又會闖出什麼禍來。"
10040020-214 = "所以為了不讓他動起別的歪腦筋，我們得定期幫他找點樂子才行。"
10040020-216 = "（與其說是在照顧後輩，感覺更像是在管教一隻過動的小狗呢……）"
10040020-217 = "那你們是不是應該趕快回去反省室盯著他？"
10040020-219 = "這點倒不用擔心。#n我們幾個小時前才去反省室確認過他有沒有乖乖待著。"
10040020-220 = "就算他再怎麼莽撞，應該也不至於會在這短短的時間內闖出什麼禍來吧。"
10040020-221 = "說得也對。應該不至於吧──"

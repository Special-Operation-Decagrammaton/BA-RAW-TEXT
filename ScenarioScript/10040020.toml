10040020-4 = "3;노아 파자마;01;파자마 차림으로 방에서 다시 모이라고 한 건 이 물건들 때문이었나요?\n#3;em;[?]"
10040020-5 = "3;유우카 파자마;11;잠깐, 노아! 멋대로 살펴보지 마! 아직 준비 중이라고!\n#3;a\n#3;em;[!]\n#3;jump"

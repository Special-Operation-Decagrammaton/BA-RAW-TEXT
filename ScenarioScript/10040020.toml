[translation]
10040020-1 = "Episode 2;Year End, Year Beginning"
10040020-3 = "So..."
10040020-4 = "Do all of these objects you have scattered around the room have anything to do with why we're here in our pajamas?"
10040020-5 = "Wait a minute, Noa! Don't just look around as you please! I'm not done preparing everything yet!"
10040020-6 = "Heehee. Apologies. But this is such an interesting menagerie of items here."
10040020-11 = "A sleepover set with a toothbrush and toiletries, late-night snacks that are easily digestible..."
10040020-12 = "...and these adorable bunny pajamas. Judging by the size, I'd guess that this is for Koyuki?"
10040020-13 = "Th-That's...!"
10040020-14 = "But how peculiar...I don't think I've seen you leave the Seminar club room at all in the past few days."
10040020-15 = "So where did this pajama set come from?"
10040020-16 = "It was last week... I was looking for clothes in the shopping district and found these pajamas. I thought the bunny ears were cute..."
10040020-17 = "And they're too small for me, but the color and design really reminded me of Koyuki... So, I just thought I could give it as a gift sometime—"
10040020-21 = "Why am I making up all these weird justifications?!"
10040020-23 = "Heehee. You really are a softie when it comes to Koyuki."
10040020-27 = "...Well, I'm sure Koyuki finds it easier to relate to her honest and caring, albeit naggy, upperclassman. Unlike a certain someone, who's too difficult to read."
10040020-28 = "Noa, are you still thinking about what Koyuki said earlier?"
10040020-32 = "...No?"
10040020-33 = "It seems like you are."
10040020-34 = "Koyuki can be a little bit of an airhead, but she's never intentionally mean or prejudiced."
10040020-35 = "You two just need to spend more time together, and it'll help Koyuki clear up any strange misconceptions she has about you."
10040020-36 = "On top of that, Seminar has been so busy dealing with a flurry of incidents lately, I feel like the staff members haven't had time to connect with each other."
10040020-37 = "Which is why I've been organizing this pajama party for today!"
10040020-39 = "...You really are so thoughtful, Yuuka."
10040020-40 = "You're right. Strengthening my relationship with my cute little underclassman is important. I think this pajama party is a great idea, Yuuka. I'm already excited."
10040020-41 = "With good conversation and a relaxing atmosphere, we might even get to see another side of you we've never met before. Heehee."
10040020-42 = "(For some reason, I feel like I might get a better understanding of that \"pressure\" Koyuki was talking about...)"
10040020-43 = "Now that I think about it, it's been a while since I've been in your dorm room. We usually part ways and go home from the club room."
10040020-44 = "You've really made this place your own since then. These posters and photos weren't here before..."
10040020-48 = "Oh my? Is this Sensei's..."
10040020-49 = "Why are you poking around my room without permission?!"
10040020-50 = "That's how all pajama parties start, right? You find secret diaries or photos hidden in the protagonist's bedroom?"
10040020-51 = "I read that in a romance novel from the library once."
10040020-52 = "No! That's not normal at all! And the stupid party hasn't even started yet!"
10040020-53 = "If you have that much time to mess around, then help me organize these clothes."
10040020-54 = "Yes, ma'am!"
10040020-56 = "That's it for the clothes. The only thing left is...maybe a board game we can all play together?"
10040020-57 = "All we have at Seminar is an old deck of cards. Do you own any board games, Noa?"
10040020-58 = "Hm. I don't personally..."
10040020-59 = "Ah! I've heard that Maki has quite the board game collection. Maybe she'd be willing to lend us a few for the night?"
10040020-60 = "Maki...from Veritas?"
10040020-61 = "I'm sure she'd have a ton, but for some reason, I don't really feel like asking her."
10040020-62 = "And the general sentiment is that Veritas isn't exactly the biggest fan of Seminar."
10040020-63 = "Hm? Somehow, I think I remember you saying that good communication can help resolve misunderstandings."
10040020-64 = "Why don't we take this opportunity to talk to Maki and maybe even clear up some of those misconceptions you have of Veritas?"
10040020-65 = "Okay, okay. I get it. We'll ask Maki if we can borrow her board games."
10040020-66 = "But this pajama party is a personal event! To avoid any unnecessary trouble, none of it should be recorded in Seminar's records, okay?"
10040020-67 = "No records will be made. Fufu."
10040020-77 = "Hmm... This isn't enough to give off the impression I want. Maybe the composition is too cliche?"
10040020-78 = "I can lower the saturation on the edges to give a more intense contrast..."
10040020-86 = "Ah. There you are, Maki."
10040020-87 = "We couldn't find you in your dorm room, so we came looking for you."
10040020-89 = "Huh? Yuuka...and Noa too?"
10040020-90 = "I know it's the last day of the year, but you're already in your pajamas? Even if you're trying to go to bed early, isn't this a little TOO early?"
10040020-92 = "Well, we're actually dressed like this because..."
10040020-93 = "We're planning a fun little pajama party to promote friendship among the Seminar staff."
10040020-94 = "Well, that's the official reason. The real reason Yuuka went to all this trouble is that she was worried Koyuki would get lonely if she spent New Year's Eve all by herself, locked up in the Self-Reflection—"
10040020-95 = "NOA!"
10040020-97 = "Wow! A pajama party! I'm jealous! I wish we would do something like that..."
10040020-98 = "Eh, I guess we do kinda stay up all night eating snacks and playing games pretty often..."
10040020-99 = "What about you, Maki? You're not bringing in the new year with your other club members?"
10040020-100 = "Oh, me? I'm working on the poster for the upcoming Millennium Expo."
10040020-101 = "The whole schedule got pushed up this year, so the deadline for poster submissions is way sooner than I expected."
10040020-102 = "Ah, that's right. We had trouble staffing, so next year's Expo got moved earlier."
10040020-103 = "Helping the school out must be keeping you busy."
10040020-104 = "Eh, it's totally cool. I was kinda bored anyway because the club didn't really have anything planned for New Year's Eve."
10040020-105 = "And sometimes the chaotic rush of the end of the year really gives you inspiration, you know?"
10040020-107 = "I'm always really impressed by your talent whenever I see your work."
10040020-108 = "Which makes me wonder, Maki, with all that talent, why didn't you enroll at Wildhunt Art Academy?"
10040020-109 = "Ahaha. We'll be here until next year if I start that story..."
10040020-110 = "Anyway, you were looking for me, right? Can I do something for you?"
10040020-111 = "Ah. I got too caught up in our conversation."
10040020-112 = "Do you happen to have any board games you could lend us, Maki? I was hoping we'd be able to play together at the pajama party."
10040020-113 = "Um, I haven't been playing them much recently, so I totally don't mind letting you borrow them. But..."
10040020-114 = "Kotama and Hare borrowed them a few days back, and they haven't given them back yet."
10040020-115 = "Do you mind asking them for me? I can't leave in the middle of the painting process."
10040020-117 = "We can do that. I'll bring them back to you after we're done, then."
10040020-118 = "Fufufu, so I'll get them next year?"
10040020-119 = "See you in the new year, Yuuka!"
10040020-120 = "Happy New Year, Maki!"
10040020-123 = "Uh... Kotama and Hare really aren't in their dorms either?"
10040020-124 = "Maybe they're plotting some evil conspiracy..."
10040020-125 = "That seems like a little bit of a reach."
10040020-126 = "After all is said and done, it's the last day of the year. Like Maki, they might just be busy preparing for the new year."
10040020-127 = "No, no. You can't let your guard down."
10040020-128 = "Just think about all the problems that the Veritas members have caused without anyone even suspecting—"
10040020-129 = "Are my kids causing trouble again?"
10040020-133 = "This voice..."
10040020-134 = "Ah, Chihiro! Have you seen Kotama and Hare by—"
10040020-137 = "D-Did something happen? You look exhausted!"
10040020-138 = "It's nothing serious. I just haven't slept for two days."
10040020-139 = "That's a gigantic problem!"
10040020-140 = "Are there issues with the school's server security?"
10040020-141 = "Not exactly. We've just had reports of a new form of malware, on Millennium's public servers, that even our latest antivirus program isn't detecting."
10040020-142 = "The malware appears to be a practical joke of some kind. People have reported getting jump-scared by random, terrifying images popping up on their monitors, or empty emails being sent out. I've scoured the server for two days, but I haven't found a single trace of it."
10040020-143 = "If even you can't find it..."
10040020-144 = "Two possible reasons. The reports were wrong, or this is the work of a hacker leagues ahead of me."
10040020-145 = "Either way, there's nothing more I can do right now. I was on my way to bed."
10040020-146 = "It's the last day of the year, and you're working so hard."
10040020-147 = "That's just the nature of security work."
10040020-148 = "In any case, why were you asking about our members? Did something happen?"
10040020-150 = "Oh, not at all... We're planning a pajama party for Seminar, so we wanted to borrow some board games from Hare and Kotama."
10040020-151 = "A pajama party... That does sound nice. Like a faraway dream you can't quite reach."
10040020-152 = "They're probably in the Veritas lounge. I saw their smartphones pinging there when I checked our club room's server."
10040020-153 = "Wow, is this the power of the vice president of Veritas?"
10040020-154 = "Well, it's easier than looking for a code that might not even exist, all alone in a dark room."
10040020-155 = "*Sigh*... I hope nothing goes wrong tonight."
10040020-157 = "I wouldn't worry. You've been poring over this for two days. There isn't a single hacker in Kivotos who could breach your security system in just one."
10040020-158 = "Put it out of your mind, and get some rest!"
10040020-159 = "That's right. Sleep well, and we'll see you next year, Chihiro!"
10040020-161 = "Yes, yes. Happy New Year to you, too."
10040020-163 = "There you go, Kotama. I programmed it to automatically record if someone gets a roulette penalty."
10040020-164 = "But why'd you need a board game to have a recording feature anyway?"
10040020-165 = "Isn't that obvious, Hare? There's only one reasonable explanation as to why you would want recordings from Pirate Roulette, a board game known for its elements of surprise."
10040020-167 = "It's to record the shocked shrieks of players."
10040020-169 = "Sure, I get that, but...what would you even do with that?"
10040020-170 = "That ASMR stuff you like is more like soft whispers and noises, right?"
10040020-171 = "Naturally, the shrill, piercing sounds of shrieks are not the most conventionally popular types of audio clips. However, that makes samples of them all the more rare."
10040020-172 = "Look at the film industry. They're still using the same, tired scream clips that originated from classic films."
10040020-173 = "If I can secure recordings of naturally elicited screams, I may have the opportunity to exchange them for even more valuable sound clips later..."
10040020-175 = "...Exchange? Other people like this kinda stuff besides you?"
10040020-176 = "Anyways, think about it. What if [USERNAME] Sensei happens to play this board game? We could have a rare recording of their voice!"
10040020-177 = "That is...an intriguing idea..."
10040020-178 = "Fufufu. And with the installation of this ultra-small recorder, it's finished!"
10040020-179 = "Now, all we have to do is put Pirate Roulette back where we found it, and let the recording perform its function."
10040020-184 = "...You know I can't allow you to follow through on such an evil plan."
10040020-188 = "Seminar?! When did you...?"
10040020-189 = "Ah. Surely you weren't also looking for a board game with a recorder?"
10040020-190 = "Well, preferably, we were actually looking for one without a recorder, but..."
10040020-191 = "I'll have to seize this game that clearly poses a threat to personal privacy and security."
10040020-192 = "Buuut...!"
10040020-194 = "Why is everyone so eager to cause problems on the very last day of the year?"
10040020-195 = "This is why everyone thinks that Millennium is filled with a bunch of weird clubs. Both of you should try to emulate Chihiro more!"
10040020-197 = "Hm."
10040020-198 = "I know this might be out of line, but..."
10040020-200 = "Huh? Why do you two seem so indignant...?"
10040020-201 = "I mean, isn't Seminar known for causing all kinds of problems too?"
10040020-202 = "I've heard that a certain someone from Seminar is responsible for disabling many more security programs than Veritas is..."
10040020-203 = "K-Koyuki is really putting in a lot of reflection these days, okay?!"
10040020-204 = "She's been very obediently reflecting on her deeds for the last month—er, maybe the last week!"
10040020-206 = "There's no need to make excuses for Koyuki like that, Yuuka."
10040020-207 = "...Now that you mention it, Koyuki actually has been quite well-behaved recently."
10040020-208 = "She hasn't attempted any daring escapes from the Self-Reflection Room, nor has she laid a finger on any unauthorized electronic devices."
10040020-210 = "Maybe the new year is helping her mature a little?"
10040020-211 = "This pajama party you're holding is a reward then? For her good behavior?"
10040020-213 = "I think it's more so...I don't trust Koyuki to not cause trouble if left alone for extended periods of time."
10040020-214 = "So, in the name of keeping her content, we need to provide her with periodic distractions."
10040020-216 = "(It sounds more like they're taking care of a new puppy than one of their underclassmen...)"
10040020-217 = "Don't you guys need to return to the Self-Reflection Room ASAP, then?"
10040020-219 = "We checked in on her a few hours ago, and she was quietly playing by herself. She should be okay."
10040020-220 = "Despite her extreme and ridiculous recklessness, I doubt she could cause that much havoc in that time span."
10040020-221 = "I certainly hope so."

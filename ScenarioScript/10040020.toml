[translation]
10040020-1 = "ตอนที่ 2;ส่งท้ายปีเก่าต้อนรับปีใหม่"
10040020-3 = "สรุปว่า..."
10040020-4 = "ที่สั่งให้ใส่ชุดนอนแล้วมาเจอกันอีกครั้งในห้อง ก็เพราะของพวกนี้งั้นเหรอคะ?"
10040020-5 = "เดี๋ยวก่อน โนอา! อย่าเพิ่งเดินดูสิ! ฉันยังจัดไม่เสร็จเลย!"
10040020-6 = "ฮุฮุ มีของน่าสนใจอยู่เต็มไปหมดเลยนะคะ"
10040020-11 = "ทั้งเซ็ตค้างแรมที่มาพร้อมกับแปรงสีฟันกับอุปกรณ์ล้างหน้า ทั้งของกินจุบจิบที่ต่อให้กินตอนกลางดึก#nก็ไม่ต้องรู้สึกผิด..."
10040020-12 = "ส่วนชุดนอนกระต่ายที่น่ารักชุดนี้... ดูจากไซซ์แล้วน่าจะเตรียมมาเพื่อโคยูกิจังใช่มั้ยคะ?"
10040020-13 = "ชะ... ชุดนั้นน่ะ...!"
10040020-14 = "แปลกจังเลยนะคะ ไม่กี่วันมานี้ฉันไม่เห็นว่ายูกะจังออกไปนอกห้องเซมิน่าเลย"
10040020-15 = "แล้วเอาเวลาที่ไหนไปซื้อชุดนอนเหรอคะ?"
10040020-16 = "คือว่า... เมื่อสัปดาห์ก่อนฉันไปซื้อเสื้อผ้าในย่านชุมชน แล้วก็ไปเจอชุดนอนดีไซน์น่ารักที่มีหูกระต่าย#nติดอยู่... "
10040020-17 = "ไซซ์มันเล็กไปหน่อยสำหรับฉัน แต่ว่าสีกับดีไซน์น่าจะเหมาะกับโคยูกิ ฉันก็เลยซื้อมาก่อน กะว่าจะเก็บไว้ให้เป็นของขวัญน่ะ"
10040020-21 = "เดี๋ยวสิ แล้วทำไมฉันต้องมาแก้ตัวด้วยล่ะ?"
10040020-23 = "ฮุฮุ ยูกะจังเนี่ย ถึงจะชอบดุ แต่ในใจก็แอบอ่อนข้อให้โคยูกิเสมอเลยนะคะ"
10040020-27 = "ก็นะ... โคยูกิจังเองก็คงจะชอบรุ่นพี่ที่ถึงจะจู้จี้แต่ก็เอาใจใส่อย่างเปิดเผย มากกว่ารุ่นพี่ที่อ่านใจได้ยาก 'เหมือนใครบางคน' นะคะ"
10040020-28 = "โนอา นี่เธอยังไม่มูฟออนจากเรื่องที่โคยูกิจังพูดเมื่อกี้งั้นเหรอ?"
10040020-32 = "เปล่านะคะ...?"
10040020-33 = "ดูก็รู้ว่ายังเก็บมาคิดอยู่..."
10040020-34 = "ถึงโคยูกิจะเป็นเด็กที่พูดอะไรไม่ค่อยคิดไปหน่อย แต่จริงๆ แล้วก็ไม่ใช่เด็กที่ทำตัวออกนอกลู่นอกทาง หรือคิดอคติกับใครหรอก..."
10040020-35 = "ถ้าได้ใช้เวลาคุยกันมากพอ ฉันว่าโคยูกิเองก็จะเคลียร์ความเข้าใจผิดที่มีต่อโนอาได้นะ"
10040020-36 = "อีกอย่าง หมู่นี้ยังมีเหตุการณ์นู่นนี่ให้เราจัดการอยู่ไม่เว้นวัน สมาชิกเซมิน่าก็เลยไม่มีเวลาได้คุยกัน#nเป็นการส่วนตัวเท่าไรนัก"
10040020-37 = "วันนี้ฉันก็เลยจะจัดปาร์ตี้ชุดนอนยังไงล่ะ!"
10040020-39 = "ยูกะจังใจดีจริงๆ เลยนะคะ..."
10040020-40 = "ฉันเองก็เห็นด้วยกับการกระชับความสัมพันธ์ระหว่างพวกเรากับรุ่นน้องที่น่ารักค่ะ และนี่ก็ยังเป็นปาร์ตี้#nชุดนอนครั้งแรกของสมาชิกเซมิน่าอีก ฉันชักจะรอไม่ไหวแล้วสิคะ"
10040020-41 = "ถ้าเราปล่อยวางความตึงเครียดและได้พูดคุยกันอย่างสนุกสนาน บางทีฉันอาจจะได้เห็นอีกด้านที่#nไม่เคยเห็นมาก่อนของยูกะจังก็ได้นะคะ ฮุฮุ"
10040020-42 = "(เหมือนจะเข้าใจความหมายของ 'แรงกดดัน' ที่โคยูกิพูดถึงเลยแฮะ...)"
10040020-43 = "จะว่าไป นี่ก็นานมากแล้วนะคะที่ฉันไม่ได้เข้ามาในหอพักของยูกะจัง ปกติเวลาเราเลิกงานที่เซมิน่า เราก็แยกย้ายกันกลับเลยนี่คะ"
10040020-44 = "ถ้าเทียบกับที่ฉันเคยมาคราวก่อน เหมือนว่าจะมีการตกแต่งห้องเพิ่มมากขึ้นนะคะ ไหนจะมีโปสเตอร์#nกับรูปที่ไม่เคยเห็นมาก่อนอีกด้วย..."
10040020-48 = "ตายจริง? อันนี้เป็นของคุณครูหรือเปล่าคะ?"
10040020-49 = "ทำไมถึงเอาแต่ค้นห้องคนอื่นตามอำเภอใจล่ะ!"
10040020-50 = "ก็... ปกติแล้วปาร์ตี้ชุดนอนจะเริ่มจากการค้นหนังสือหรือรูปภาพลับๆ ที่ซ่อนอยู่ในห้องไม่ใช่เหรอคะ?"
10040020-51 = "นิยายรักบริสุทธิ์ที่ฉันเคยอ่านในห้องสมุดบอกไว้ว่าอย่างนั้นน่ะค่ะ"
10040020-52 = "แล้วทุกอย่างจะต้องเหมือนนิยายหรือไง?! อีกอย่างนะ เรายังไม่ได้เริ่มปาร์ตี้ชุดนอนกันเลยด้วยซ้ำ!"
10040020-53 = "ถ้ามีเวลาจะมาแหย่คนอื่นเล่น ก็มาช่วยกันจัดเสื้อผ้าดีกว่า"
10040020-54 = "ค่า~"
10040020-56 = "เสื้อผ้าก็จัดเสร็จหมดแล้ว... ทีนี้ก็น่าจะเหลือแค่บอร์ดเกมที่หลายคนเล่นพร้อมกันได้ละนะ"
10040020-57 = "แต่ในห้องเซมิน่าก็น่าจะมีแค่ไพ่สำรับเก่าๆ เท่านั้น โนอา เธอมีบอร์ดเกมหรืออะไรที่คล้ายกันบ้างมั้ย?"
10040020-58 = "ไม่นะคะ ฉันไม่มีบอร์ดเกมเป็นของตัวเองหรอกค่ะ..."
10040020-59 = "อ้อ จะว่าไปฉันเคยได้ยินว่ามากิจังมีบอร์ดเกมที่ไม่ได้เล่นอยู่เยอะเลยค่ะ ถ้าจะยืมมาแค่วันเดียว ฉันว่ามากิจังน่าจะให้ยืมอยู่นะคะ?"
10040020-60 = "หมายถึงมากิจากชมรมเวอริทัสเหรอ?"
10040020-61 = "ดูทรงแล้วมากิก็น่าจะมีของเล่นแบบนั้นน่ะนะ แต่ทำไมฉันรู้สึกว่าทางนั้นจะไม่อยากให้ยืมเท่าไรเลย"
10040020-62 = "นอกจากนี้เวอริทัสก็เป็นชมรมที่ไม่ค่อยให้ความร่วมมือกับงานของเซมิน่าด้วย"
10040020-63 = "ตายจริง? เมื่อกี้ใครนะคะที่บอกว่าเราแก้ไขความเข้าใจผิดได้ด้วยการพูดคุยกันน่ะ ยูกะจังหรือเปล่าคะ?"
10040020-64 = "งั้นก็ใช้โอกาสนี้ในการพูดคุยกับมากิจัง แล้วก็ลองกำจัดอคติที่มีต่อชมรมเวอริทัสดูหน่อยมั้ยคะ?"
10040020-65 = "ก็ได้ๆ งั้นสรุปว่าเราจะไปยืมบอร์ดเกมจากมากิกัน"
10040020-66 = "แต่ถึงยังไง ปาร์ตี้ชุดนอนครั้งนี้คืองานที่พวกเราจัดเป็นการส่วนตัว... อย่าเผลอไปจดบันทึกอะไรปน#nกับงานของเซมิน่าล่ะ จะได้ไม่ถูกจับได้ทีหลัง"
10040020-67 = "ค่ะ ฉันจะไม่บันทึกอะไรเกี่ยวกับปาร์ตี้ชุดนอนค่ะ ฮุฮุ"
10040020-77 = "อืม... ทำไมรู้สึกว่ายังไม่ได้ฟีลเลย? องค์ประกอบมันดูน่าเบื่อไปหน่อยหรือเปล่านะ?"
10040020-78 = "ถ้าลดเงาตรงขอบลง แล้วเพิ่มความคมชัดให้มากขึ้นละก็..."
10040020-86 = "อ๊ะ มากิอยู่ตรงนี้นี่เอง"
10040020-87 = "เมื่อกี้ฉันแวะไปหาที่หอพักแต่ก็ไม่เจอ ก็เลยออกมาตามหาข้างนอกอยู่พักใหญ่เลย"
10040020-89 = "เอ๋ รุ่นพี่ยูกะ แล้วก็รุ่นพี่โนอาด้วย...?"
10040020-90 = "วันนี้เป็นวันสุดท้ายของปีเลยนะ ใส่ชุดนอนเตรียมนอนกันแล้วเหรอ? ยังมีเวลาอีกเหลือเฟือเลยนะ#nกว่าจะหมดวันน่ะ"
10040020-92 = "ที่พวกเราใส่ชุดนี้ก็เพราะ..."
10040020-93 = "เราวางแผนจัดปาร์ตี้ชุดนอนส่งท้ายปีเก่าเพื่อส่งเสริมมิตรภาพระหว่างสมาชิกเซมิน่ากันน่ะค่ะ"
10040020-94 = "แน่นอนว่าเหตุผลจริงๆ ก็คือยูกะจังเป็นห่วงโคยูกิจังที่ถูกขังให้ใช้เวลาในช่วงสิ้นปีอย่างโดดเดี่ยวใน#nห้องสำนึกผิดค่ะ ยูกะจังก็เลยเป็นตัวตั้งตัวตีในการ..."
10040020-95 = "โนอา!"
10040020-97 = "ว้าว~ จะจัดปาร์ตี้ชุดนอนกันเหรอ น่าอิจฉาจัง อยากให้เวอริทัสจัดปาร์ตี้ชุดนอนบ้างจัง..."
10040020-98 = "เดี๋ยวนะ พอมาคิดๆ ดูแล้ว ปกติพวกเราก็กินขนมและก็เล่นเกมโต้รุ่งกันบ่อยๆ นี่นา..."
10040020-99 = "จะว่าไป มากิจังมาทำอะไรอยู่ตรงนี้เหรอคะ? วันสิ้นปีทั้งที ไม่ได้ออกไปเที่ยวที่ไหนกับคนอื่นในชมรม#nหรอกเหรอ?"
10040020-100 = "ฉันน่ะเหรอ? ฉันกำลังวาดโปสเตอร์ของงาน <มิลเลเนียม เอ็กซ์โป> ที่กำลังจะจัดขึ้นน่ะ"
10040020-101 = "จู่ๆ ตารางของปีนี้ก็เลื่อนเข้ามา ฉันก็เลยมีเวลาไม่พอสำหรับส่งโปสเตอร์เข้าประกวด"
10040020-102 = "อ้อ จะว่าไปฉันก็ได้ยินมาว่างานเอ็กซ์โปของปีหน้าต้องเลื่อนเข้ามาอย่างเร่งด่วนเพราะปัญหาเรื่อง#nกำลังคนค่ะ"
10040020-103 = "งานของโรงเรียนทำให้ต้องเหนื่อยน่าดูเลยนะคะ"
10040020-104 = "ไม่หรอก จะว่าไปมันก็แก้เบื่อได้น่ะ พอดีสิ้นปีนี้ฉันก็ไม่มีแพลนจะทำอะไรเป็นพิเศษด้วย"
10040020-105 = "นอกจากนี้ฉันยังได้แรงบันดาลใจจากบรรยากาศวุ่นวายของช่วงส่งท้ายปีเก่าต้อนรับปีใหม่ด้วย"
10040020-107 = "ทุกครั้งที่เห็นผลงานของมากิ ฉันก็คิดตลอดเลยละว่ามากิเป็นเด็กที่มีพรสวรรค์จริงๆ..."
10040020-108 = "ถ้าวาดรูปเก่งขนาดนี้ ทำไมไม่ไปเรียนต่อในสถาบันศิลปะไวลด์ฮันต์ล่ะ?"
10040020-109 = "ไม่รู้สิ แต่ถ้าให้พูดเรื่องนี้ก็คงยาวเลยละ..."
10040020-110 = "ว่าแต่ เมื่อกี้บอกว่าตามหาฉันอยู่ใช่มั้ย? มีธุระอะไรงั้นเหรอ?"
10040020-111 = "จริงด้วยสินะ เกือบลืมไปเลย"
10040020-112 = "มากิ ขอฉันยืมบอร์ดเกมที่ไม่ได้เล่นหน่อยได้มั้ย? ฉันอยากให้ปาร์ตี้ชุดนอนของเราสนุกขึ้นน่ะ"
10040020-113 = "อืม ที่จริงช่วงนี้ฉันก็ไม่ค่อยได้หยิบมาเล่นอยู่แล้ว งั้นจะให้ยืมก็คงได้..."
10040020-114 = "แต่ว่ารุ่นพี่โคทามะกับรุ่นพี่ฮาเระยืมไปเล่นตั้งแต่ 2-3 วันก่อน แล้วก็ยังไม่เอามาคืนฉันเลยนี่น่ะสิ"
10040020-115 = "ถ้าไม่ติดอะไรละก็ ไปขอจากสองคนนั้นเองได้มั้ยล่ะ? ฉันวาดรูปยังไม่เสร็จ ก็เลยน่าจะออกไปกลางคัน#nไม่ได้น่ะ"
10040020-117 = "ได้สิ ไว้เล่นเสร็จแล้วฉันจะเอามาคืนด้วยตัวเองเลย"
10040020-118 = "ฮุฮุ น่าจะเล่นเสร็จปีหน้าเลยมั้ยนะ"
10040020-119 = "งั้นก็เจอกันปีหน้านะ รุ่นพี่ยูกะ!"
10040020-120 = "อื้อ สวัสดีปีใหม่ล่วงหน้านะมากิ"
10040020-123 = "อืม... ไม่คิดเลยว่าโคทามะกับฮาเระก็ไม่อยู่ที่หอพักด้วย..."
10040020-124 = "พวกนั้นกำลังวางแผนทำอะไรน่าสงสัยอยู่หรือเปล่านะ ชักจะกังวลแล้วสิ"
10040020-125 = "คิดมากเกินไปหรือเปล่าคะ?"
10040020-126 = "วันนี้เป็นวันสิ้นปีทั้งทีนะคะ สองคนนั้นอาจจะกำลังยุ่งกับการเรียนอยู่ที่ไหนเพื่อเตรียมตัวสำหรับตาราง#nของปีหน้าเหมือนมากิก็ได้ค่ะ"
10040020-127 = "ไม่ละ ไม่ประมาทเลยจะดีที่สุด"
10040020-128 = "ลองนึกถึงปัญหาที่สมาชิกเวอริทัสแอบไปสร้างไว้ตลอดเวลาที่ผ่านมาสิ..."
10040020-129 = "เด็กๆ ของฉันไปก่อปัญหาอะไรกันอีกงั้นเหรอ?"
10040020-133 = "เสียงนี้มัน..."
10040020-134 = "อ๊ะ รองหัวหน้าจิฮิโระ เห็นโคทามะกับฮาเระบ้าง..."
10040020-137 = "กะ... เกิดอะไรขึ้นเหรอ? ทำไมถึงดูเหนื่อยขนาดนี้ล่ะ?!"
10040020-138 = "ไม่ใช่เรื่องใหญ่อะไรหรอก ไม่ต้องสนใจก็ได้ ฉันก็แค่ไม่ได้นอนมาราวๆ 48 ชั่วโมงเอง"
10040020-139 = "นั่นมันเรื่องใหญ่มากๆ เลยต่างหาก!"
10040020-140 = "เซิร์ฟเวอร์ของโรงเรียนมีปัญหาด้านความปลอดภัยเหรอคะ?"
10040020-141 = "ไม่ใช่ปัญหาเรื่องความปลอดภัยหรอก... แต่มีการพบมัลแวร์ในเซิร์ฟเวอร์สาธารณะของมิลเลเนียมที่#nโปรแกรมแอนตี้ไวรัสรุ่นล่าสุดก็ยังตรวจจับไม่ได้น่ะ"

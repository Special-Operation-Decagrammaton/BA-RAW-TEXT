[translation]
1005602-1 = "聖誕老人芹奈"
1005602-5 = "姐姐，我要禮物──！"
1005602-6 = "我也要，我也要！"
1005602-7 = "我先拿！是我先來的！"
1005602-8 = "呵呵，沒關係唷。"
1005602-9 = "禮物有非常多，請放心吧。"
1005602-11 = "啊，老師。你來啦。"
1005602-12 = "[s1]「讓你久等了，芹奈。」\n[s2]「該不會，你正在……」"
1005602-15 = "我在發禮物給孩子們。"
1005602-16 = "啊，姐姐！他插隊──！壞小孩！#n壞小孩不能拿禮物吧？"
1005602-17 = "啊，啊哈哈……#n插隊是不好的唷。"
1005602-18 = "按照順序排隊是對他人友善的行為。"
1005602-19 = "乖乖排隊的話，就能拿到禮物嗎？"
1005602-20 = "嗯，當然！"
1005602-21 = "那，我要乖乖排隊！"
1005602-25 = "[ns]「不愧是芹奈……」"
1005602-26 = "沒什麼沒什麼，這也是救護騎士團慈善活動的一環。"
1005602-27 = "但是，被老師那樣誇獎，讓人有點害羞呢……"
1005602-28 = "不只善良還很謙虛……？#n哪，哪有。"
1005602-29 = "這是應該的。#n因為我是救護騎士團啊。"
1005602-31 = "而且……#n今天又是特別的日子，"
1005602-32 = "就算一年只有一天，如果能讓人們為了他人而祈禱……產生這樣溫柔的心情的話。"
1005602-33 = "我也想為此而努力。"
1005602-35 = "守護相信聖誕老人的孩子們的夢想……#n也是我該做的事情之一。"
1005602-37 = "吶吶，聖誕老人不是有大鬍子的人嗎？"
1005602-38 = "對呀！#n我也聽說是有大鬍子的人！"
1005602-39 = "吶，大鬍子的人呢？"
1005602-40 = "姐姐，大鬍子的人去哪裡了？"
1005602-42 = "咦，咦？"
1005602-43 = "那，那個……"
1005602-44 = "[s3]「今天聖誕老人太忙了……」\n[s4]「所以聖誕姐姐就代替他來了。」"
1005602-47 = "原，原來如此……？"
1005602-51 = "呃，大，大概就是那樣。"
1005602-55 = "重新自我介紹一次，我是聖誕姐姐。"
1005602-59 = "大家都有當乖孩子呢。#n那麼，就給你們禮物吧。"
1005602-63 = "先給有乖乖排隊的孩子吧～？"
1005602-64 = "好！好！"
1005602-65 = "我這次沒有插隊……我有乖乖排隊唷！"
1005602-66 = "就算是壞孩子，只要努力成為乖孩子的話，聖誕老人也會來嗎……？"
1005602-70 = "呼，辛苦了。老師。"
1005602-71 = "[s]「芹奈也辛苦了。」"
1005602-72 = "不，不會不會，這點程度不算什麼。"
1005602-73 = "雖然辛苦，但很有意義。"
1005602-74 = "[s5]「辛苦了，聖誕老人。」\n[s6]「辛苦了，聖誕姐姐。」"
1005602-77 = "真是的，怎麼連老師都……"
1005602-81 = "那個，忘了的東西……救援物資也放在裡面……"
1005602-82 = "……？啊，啊哈哈……不過今天沒用上救援物資真是太好了。"
1005602-83 = "隨身攜帶急救藥品的聖誕老人，#n不覺得也不錯嗎？"
1005602-84 = "[s]「確實。話說回來，芹奈對聖誕老人……」"
1005602-88 = "啊，那個……#n其實，在加入救護騎士團之前，我一直是相信著的……"
1005602-89 = "果，果然很奇怪對吧……！？"
1005602-90 = "也，也沒有那麼奇怪……？"
1005602-91 = "謝，謝謝老師……#n不好意思，總感覺只要對方是老師就能非常率直地說出口……"
1005602-95 = "加入救護騎士團之後，#n我也改變了很多。"
1005602-96 = "知道了很多事……#n包含聖誕老人的真相在內。"
1005602-97 = "[s]「……讓妳失望了嗎？」"
1005602-98 = "呵呵，該怎麼說呢？"
1005602-99 = "雖然某種層面上或許有點失望……"
1005602-100 = "但能像現在這樣扮成聖誕老人，支撐著大家的夢想……"
1005602-101 = "這也是一件，非常快樂的事情。"
1005602-109 = "咦？"
1005602-110 = "老師，是雪！"
1005602-112 = "是白色聖誕節唷！"
1005602-113 = "哈，哈啾……！"
1005602-115 = "嗚嗚，有點冷呢……"
1005602-125 = "― 老，老師？[wa:480] "
1005602-127 = "― 要把這條圍巾……送給我嗎？[wa:1500] "
1005602-130 = "― 可，可是……[wa:1080] "
1005602-132 = "― 今天的我是聖誕老人唷。[wa:1180] "
1005602-135 = "― 本來，我才是[wa:2240] "
1005602-137 = "― 要送禮物的一方才對……"
1005602-140 = "― 老師卻送禮物給我……[wa:340] "
1005602-143 = "― 咦，聖誕老人[wa:1800] "
1005602-145 = "― 也該得到獎勵……？[wa:1120] "
1005602-148 = "― 既然老師這麼說……[wa:3020] "
1005602-150 = "― 呵呵。"
1005602-153 = "― 謝謝，[wa:1220] "
1005602-155 = "― 我會好好珍惜的。"
1005602-160 = "圍巾……好溫暖。"
1005602-161 = "雖然我好像給老師添麻煩了，#n感到有點不好意思……"
1005602-168 = "那個，老師。"
1005602-169 = "可以稍微……#n再多陪陪我嗎？"
1005602-170 = "機會難得，今晚就……"

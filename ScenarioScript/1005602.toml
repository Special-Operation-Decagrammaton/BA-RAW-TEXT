[translation]
1005602-1 = "เซรินะในคืนศักดิ์สิทธิ์"
1005602-5 = "พี่ฮะ ผมขอของขวัญด้วย!"
1005602-6 = "ขอด้วยๆ!"
1005602-7 = "ฉันมาก่อนนะ! ฉันต่างหากที่มาก่อน!"
1005602-8 = "เอาละๆ ทุกคนรอก่อนนะคะ"
1005602-9 = "ของขวัญเตรียมมาพอดีทุกคนเลย ไม่ต้องแย่งกันหรอกนะคะ"
1005602-11 = "อ๊ะ คุณครู มาแล้วเหรอคะ?"
1005602-12 = "[s1] \"หวัดดี เซรินะ\"\n[s2] \"ทำอะไรอยู่เหรอ?\""
1005602-15 = "ฉันกำลังแจกของขวัญเด็กๆ อยู่ค่ะ"
1005602-16 = "อ๊ะ พี่คะ! เด็กคนนี้มาแซงคิวหนูค่ะ! เป็นเด็กไม่ดีเลยค่ะ! พี่จะไม่ให้ของขวัญเด็กไม่ดีใช่มั้ยคะ?"
1005602-17 = "เอ่อ แหะๆๆ... แซงคิวคนอื่นไม่ดีนะคะ"
1005602-18 = "การเข้าแถวตามลำดับก็เป็นการแสดงความใส่ใจต่อคนอื่นนะคะ"
1005602-19 = "ถ้าเข้าแถวดีๆ ก็จะได้ของขวัญเหรอคะ?"
1005602-20 = "ใช่ค่ะ ยิ่งเข้าแถวให้เป็นระเบียบ ก็จะยิ่งได้ไวด้วยนะคะ"
1005602-21 = "งั้นพวกเราจะเข้าแถวให้เป็นระเบียบเลย!"
1005602-25 = "[ns] \"เซรินะนี่ขยันจังเลยนะ...\""
1005602-26 = "คะ? นี่ก็แค่กิจกรรมจิตอาสาของชมรมอัศวินบรรเทาทุกข์เท่านั้นค่ะ"
1005602-27 = "พอได้รับคำชมจากคุณครูแบบนี้ก็เขินนะคะ... ฉันแค่ทำเรื่องที่ต้องทำเท่านั้นเอง"
1005602-28 = "ทำไมต้องถ่อมตัวด้วย... งั้นเหรอคะ? ทะ... ทำไมพูดแบบนี้ล่ะคะ"
1005602-29 = "เรื่องแบบนี้ใครๆ ก็ทำกันทั้งนั้นนี่คะ แล้วฉันก็เป็นชมรมอัศวินบรรเทาทุกข์ด้วย"
1005602-31 = "แถมวันนี้ยัง... เป็นวันพิเศษด้วยนี่คะ"
1005602-32 = "แม้วันแบบนี้จะมีแค่วันเดียวในหนึ่งปีก็เถอะ แต่ถ้าเป็นวันที่ผู้คนจะเอื้ออาทรต่อกัน"
1005602-33 = "มันก็น่าลองทำดูนี่คะ?"
1005602-35 = "การปกป้องความฝันของเด็กๆ ที่เชื่อว่าซานต้ามีอยู่จริง... ก็เป็นหนึ่งในงานที่ฉันทำค่ะ"
1005602-37 = "แต่ปกติซานต้าต้องเป็นผู้ชายไม่ใช่เหรอ?"
1005602-38 = "ใช่! ที่เรียกกันว่าคุณปู่ซานต้าไง!"
1005602-39 = "คุณปู่ซานต้า! คุณปู่ซานต้า!"
1005602-40 = "คุณปู่ซานต้าอยู่ไหนเหรอฮะพี่?"
1005602-42 = "เอ๋...? เอ่อ..."
1005602-43 = "คะ... คือว่า"
1005602-44 = "[s3] \"วันนี้คุณปู่ซานต้างานยุ่งมากน่ะ...\"\n[s4] \"ก็เลยวานให้พี่สาวคนนี้มาแจกของขวัญแทน\""
1005602-47 = "คะ... คะ...?"
1005602-51 = "อ่า ฮ่าฮ่าฮ่า จริงด้วยค่ะ ใช่ๆ"
1005602-55 = "เด็กๆ พี่คือพี่สาวซานต้าค่ะ! เรียกว่าพี่ซานต้าก็ได้!"
1005602-59 = "เป็นเด็กดีกันใช่มั้ยคะ? ถ้าเป็นเด็กดี พี่จะแจกของขวัญให้นะคะ"
1005602-63 = "ให้ใครก่อนดีน้า~?"
1005602-64 = "ผมครับ! ผมก่อนครับ!"
1005602-65 = "ครั้งนี้ผมไม่ได้แซงคิวครับ... ผมยืนรออย่างเรียบร้อยเลย!"
1005602-66 = "เอ่อ... พี่สาวซานต้าจะไม่มาแจกของขวัญให้เด็กเกเรจริงๆ เหรอคะ?"
1005602-70 = "ฮู่ว... ขอบคุณที่ทำงานหนักนะคะคุณครู"
1005602-71 = "[s] \"เซรินะต่างหากที่ทำงานหนัก...\""
1005602-72 = "งะ... งั้นเหรอคะ? แหะๆๆ"
1005602-73 = "การดูแลเด็กๆ มันเป็นงานใหญ่ที่มีความหมายในหลายๆ ด้านเลยค่ะ ถึงจะเหนื่อยแต่ก็ดีต่อใจนะคะ"
1005602-74 = "[s5] \"สุดยอดไปเลย พี่สาวซานต้า\"\n[s6] \"ขอบคุณมากนะ พี่สาวซานต้าใจดี\""
1005602-77 = "คุณครูก็ อย่ามาล้อกันเล่นแบบนี้สิคะ..."
1005602-81 = "ที่จริงในนี้มีชุดปฐมพยาบาลอยู่ด้วยค่ะ"
1005602-82 = "ถ้าเป็นไปได้ ฉันก็ไม่อยากให้มีเรื่องที่ต้องใช้หรอกค่ะ"
1005602-83 = "ซานต้าที่พกชุดปฐมพยาบาลติดตัวด้วยก็ไม่ได้แย่ขนาดนั้นใช่มั้ยคะ?"
1005602-84 = "[s] \"จะว่าไป เซรินะเชื่อเรื่องซานตาคลอสด้วยเหรอ?\""
1005602-88 = "ฉันเชื่อมาตั้งแต่เด็กๆ... จนได้เข้ามาในชมรมอัศวินบรรเทาทุกข์ค่ะ"
1005602-89 = "มะ... มันดูแปลกใช่มั้ยคะ!?"
1005602-90 = "หืม... คุณครูไม่คิดอย่างนั้นหรอกเหรอคะ?"
1005602-91 = "ขอบคุณนะคะคุณครู... น่าแปลกดีนะคะ ฉันรู้สึกเหมือนคุณครูเป็นคนที่ฉันสามารถเปิดอก#nเล่าอะไรให้ฟังได้ทุกอย่างเลยค่ะ"
1005602-95 = "หลังจากที่ฉันเข้ามาในชมรมอัศวินบรรเทาทุกข์ ฉันก็เปลี่ยนไปเยอะเลยค่ะ"
1005602-96 = "แล้วก็ได้เรียนรู้สิ่งใหม่ๆ มากมาย... และหนึ่งในนั้นก็คือตัวตนของซานต้าค่ะ"
1005602-97 = "[s] \"พอได้รู้แล้วคงผิดหวังมากเลยสินะ...\""
1005602-98 = "ฮุฮุ ก็ไม่รู้สิคะ"
1005602-99 = "มันอาจจะฟังดูน่าผิดหวังก็จริง..."
1005602-100 = "แต่การได้มาเป็นซานต้าและปกป้องความฝันของเด็กๆ อย่างในวันนี้..."
1005602-101 = "มันก็เป็นเรื่องที่สนุกมากเลยละค่ะ"
1005602-109 = "โอ๊ะ?"
1005602-110 = "หิมะตกด้วยแหละค่ะ คุณครู!"
1005602-112 = "แบบนี้ก็เป็นไวท์คริสต์มาสสิคะ! ยอดไปเลย!"
1005602-113 = "ฮะ... ฮัดชิ่วว!"
1005602-115 = "โอย หนาวเหมือนกันนะคะเนี่ย"
1005602-125 = "― คะ... คุณครู?[wa:160] "
1005602-127 = "― ผ้าพันคอนี้... ให้ฉันเหรอคะ?[wa:900] "
1005602-130 = "― ตะ... แต่ว่า...[wa:720] "
1005602-132 = "― วันนี้ฉันคือซานต้านะคะ[wa:740] "
1005602-135 = "― ที่จริงฉันต้อง[wa:1920] "
1005602-137 = "― เป็นฝ่ายให้ของขวัญสิ..."
1005602-140 = "― กลับเป็นคุณครูที่ให้ของขวัญแทน...[wa:10] "
1005602-143 = "― คะ? ซานต้าก็[wa:1560] "
1005602-145 = "― รับรางวัลได้เหมือนกันเหรอคะ...?[wa:240] "
1005602-148 = "― ถ้าคุณครูว่าอย่างนั้นก็...[wa:2340] "
1005602-150 = "― ฮุฮุ..."
1005602-153 = "― ขอบคุณมากเลยนะคะ[wa:700] "
1005602-155 = "― ฉันจะรักษาอย่างดีเลยค่ะ"
1005602-160 = "ผ้าพันคอ... อบอุ่นดีจังเลยค่ะ"
1005602-161 = "แต่ฉันก็รู้สึกผิดด้วยค่ะที่เป็นฝ่ายรบกวนตลอดเลย"
1005602-168 = "นี่... คุณครูคะ?"
1005602-169 = "ช่วยอยู่ข้างๆ กัน... แบบนี้ต่ออีกหน่อยได้มั้ยคะ?"
1005602-170 = "อย่างน้อยก็ให้คืนนี้ผ่านพ้นไปก่อนค่ะ"

1004906-18 = "[ns1] \"이건…… 초코케이크? 좀 다른가?\"\n[ns2] \"오늘 무슨 날이야?\""
1004906-19 = "3;카즈사;99;으음. 정확하게는 <퐁당 쇼콜라>라는 건데 말이지…….\n#3;stiff"
1004906-20 = "3;카즈사;99;으음. 정확하게는 <퐁당 쇼콜라>라는 건데 말이지…….\n#3;stiff"
1004906-21 = "3;카즈사;13;하, 하하……. 사실 이것도 다 내가 선생님을 생각해서…….\n#3;em;[땀]"
1004906-22 = "3;카즈사;03;그래서 일부러 베이커리까지 가서, 비싼 돈을 주고……."
1004906-23 = "3;카즈사;01;사서…… 곧바로 여기로……. 그…….\n#3;em;…"
1004906-24 = "3;카즈사;00;…………."
1004906-25 = "3;카즈사;04;……하아. 아니다, 됐어. 역시 거짓말은 성에 맞지도 않고 능숙하지도 않네.\n#3;em;[속상함]"
1004906-26 = "3;카즈사;99;미안해. 선생님 주려고 가지고 온 건 사실이지만, 딱히 살 때부터 그럴 의도였던 건 아냐."
1004906-27 = "3;카즈사;02;그게 무슨 말이냐고? 그러니까 말이지……. 선생님. 손을 가까이 대 봐.\n#3;em;[?]"

1004906-1 = "#title;고양이 혀"
1004906-2 = "#wait;1500"
1004906-3 = "#na;카즈사;선생님, 안에 있지?"
1004906-4 = "#na;카즈사;……들어갈게요. 실례하겠습니다."
1004906-5 = "#st;[0,0];instant;1;"
1004906-6 = "#clearST"
1004906-7 = "#wait;1500"
1004906-8 = "3;카즈사;03;안녕, 선생님. 마침 쉬고 있는 타이밍인가 보네. 다행이다.\n#3;a\n#3;em;[반응]"
1004906-9 = "3;카즈사;02;……응? 갑자기 무슨 일로 찾아왔냐고?"
1004906-10 = "3;카즈사;07;뭐야. 그렇게 말하니 이유가 있을 때만 찾아오는 사람처럼 들리잖아. 좀 서운한데."
1004906-11 = "3;카즈사;04;무, 물론…… 이번에도 이유가 없는 건 아니지만…….\n#3;em;[땀]\n#3;stiff"
1004906-12 = "3;카즈사;03;그래도 이번에는 좀 다르다고. 나름대로 선생님에게도 나쁘지 않을 일일 테니까 말이야."
1004906-13 = "3;카즈사;01;응? 그게 뭐냐고? 아아. 실은 이거 때문인데…….\n#3;em;[?]"

[translation]
1004906-1 = "The Cat's Tongue"
1004906-3 = "Sensei, are you here?"
1004906-4 = "I'm coming in. Thanks for having me."
1004906-8 = "Oh, good. I caught you during a break."
1004906-9 = "What do you mean, what do I need?"
1004906-10 = "That makes it sound like I only talk to you when I need something from you! Don't make me look bad!"
1004906-11 = "I mean, fine. I do have something to ask, but..."
1004906-12 = "It's not a favor this time! You'll like it."
1004906-13 = "So, I came because of this."
1004906-18 = "[ns1] \"Is this...chocolate cake? What's the occasion?\" \n[ns2] \"I normally only get cake for my birthday.\""
1004906-19 = "Umm, to be exact, it's called fondant au chocolat..."
1004906-20 = "Umm, to be exact, it's called fondant au chocolat..."
1004906-21 = "Well, you just randomly crossed my mind, and...haha..."
1004906-22 = "I paid extra for the nice one at the bakery...so that... You know..."
1004906-23 = "Well, and then I came here... Um..."
1004906-24 = "............"
1004906-25 = "*sigh* Forget it. I'm many things, but I'm not a liar."
1004906-26 = "Sorry. To be fair, I did bring it for you. I just didn't buy it with you in mind."
1004906-27 = "Here, come here. Put your hand right over it, Sensei."
1004906-31 = "[ns3] \"It's hot. I can feel the heat from here.\" \n[ns4] \"It must be fresh to be this hot still.\""
1004906-32 = "Y-Yeah. You see, there's hot chocolate inside of fondant au chocolat."
1004906-33 = "Y-Yeah. You see, there's hot chocolate inside of fondant au chocolat."
1004906-34 = "I wasn't paying attention when I bought it. I thought it was just a normal chocolate cake."
1004906-35 = "No, I swear I'm not being picky or anything."
1004906-36 = "You see, um..."
1004906-37 = "I have a sensitive tongue... I can't eat hot foods."
1004906-38 = "And the chocolate inside is way too hot for me."
1004906-39 = "But this kind of dessert is meant to be enjoyed hot."
1004906-40 = "So, I brought it here so you could have it instead."
1004906-41 = "Oh..."
1004906-42 = "Y-You really think I would bring it here just to get rid of it?!"
1004906-43 = "Y-You're a menace! I wouldn't just push my trash onto you!"
1004906-44 = "This is a really high quality dessert! It's delicious! I just CAN'T eat it!!!"
1004906-45 = "[s5] \"So you have a cat's tongue.\"\n[s6] \"Hmm, you're kind of like a cat.\""
1004906-46 = "What?!"
1004906-47 = "What?!"
1004906-48 = "H-Huh? A cat's tongue...?"
1004906-49 = "I guess that is technically true..."
1004906-53 = "Hold up, Sensei."
1004906-54 = "You better not be trying to earn some brownie points or anything. I don't actually like cats."
1004906-55 = "You're not? If you say so..."
1004906-59 = "I still have a feeling..."
1004906-60 = "You were making fun of me again, weren't you?!"
1004906-61 = "Wh-What? You'll eat it? Yeah, of course. You're welcome."
1004906-62 = "You better not eat it thinking you're getting rid of it! You have to enjoy it!"
1004906-63 = "I'm watching you, Sensei..."
1004906-65 = "Seeing Kazusa suspicious of me, I \"got rid of\" the warm fondant au chocolat."
1004906-66 = "Like Kazusa said, it was delicious, and wasn't trash at all."

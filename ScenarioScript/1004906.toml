[translation]
1004906-1 = "ลิ้นแมว"
1004906-3 = "คุณครู อยู่ข้างในใช่มั้ย?"
1004906-4 = "ฉันเข้าไปนะ ขอรบกวนหน่อยนะคะ..."
1004906-8 = "ว่าไง คุณครู ดูเหมือนจะเป็นเวลาพักพอดีสินะ โชคดีจัง"
1004906-9 = "หืม...? ทำไมจู่ๆ ฉันถึงมาที่นี่น่ะเหรอ?"
1004906-10 = "อะไรกัน พูดแบบนั้นเหมือนฉันจะมาที่นี่เฉพาะตอนมีเรื่องอะไรเท่านั้นเลยนะ เสียใจจัง"
1004906-11 = "ถะ... ถึงวันนี้ฉันจะมีเรื่องให้มาที่นี่จริงๆ ก็เถอะ"
1004906-12 = "แต่ว่ามันไม่เหมือนทุกครั้งหรอกนะ แถมไม่ใช่เรื่องไม่ดีสำหรับคุณครูด้วย"
1004906-13 = "หืม? เรื่องอะไรน่ะเหรอ? อืม... ที่จริงฉันมาเพราะเจ้านี่น่ะ"
1004906-18 = "[ns1] \"นี่มัน... เค้กช็อกโกแลตเหรอ? แต่ดูไม่ค่อยเหมือนเลยนะ?\"\n[ns2] \"วันนี้วันอะไรเหรอ?\""
1004906-19 = "อืม... ที่จริงมันคือ <ช็อกโกแลตฟองดู> น่ะ..."
1004906-20 = "อืม... ที่จริงมันคือ <ช็อกโกแลตฟองดู> น่ะ..."
1004906-21 = "ฮะ...ฮะฮะ... ที่จริงจู่ๆ ฉันก็นึกถึงคุณครูขึ้นมาน่ะ"
1004906-22 = "ก็เลยตั้งใจไปร้านเบเกอรี่แล้วจ่ายเงินแพงๆ..."
1004906-23 = "ซื้อขนมนี่มา แล้วก็... มาที่นี่... คือว่า... คือ..."
1004906-24 = "..."
1004906-25 = "เฮ้อ ไม่ดีกว่า ช่างเถอะ คิดแล้วเชียวว่าการโกหกเป็นเรื่องไม่ดี แล้วฉันก็โกหกไม่เก่งด้วย"
1004906-26 = "โทษทีนะ ฉันซื้อมาให้คุณครูจริงๆ แต่ว่าไม่ได้กะจะเอามาให้คุณครูตั้งแต่แรกหรอก"
1004906-27 = "หมายความว่ายังไงน่ะเหรอ? ก็หมายความว่า... อืม คุณครู ลองเอามือมาวางใกล้ๆ สิ"
1004906-31 = "[ns3] \"ร้อนจัง รู้สึกได้ถึงความร้อนเลย\"\n[ns4] \"โอ้... เพิ่งทำมาใหม่ๆ เลยสินะ?\""
1004906-32 = "ใช่แล้ว... ช็อกโกแลตฟองดูน่ะ ที่จริงแล้วจะต้องมีช็อกโกแลตร้อนๆ อยู่ข้างในแบบนี้"
1004906-33 = "ใช่แล้ว... ช็อกโกแลตฟองดูน่ะ ที่จริงแล้วจะต้องมีช็อกโกแลตร้อนๆ อยู่ข้างในแบบนี้"
1004906-34 = "ตอนแรกฉันซื้อเพราะคิดว่ามันเป็นเค้กช็อกโกแลตธรรมดา... แต่ไม่ทันได้ดูให้ดีๆ ก่อนน่ะ ก็เลยพลาดซื้อมา..."
1004906-35 = "หืม? แล้วมันมีปัญหาอะไรอย่างงั้นน่ะเหรอ?"
1004906-36 = "คือว่า... เอ่อ..."
1004906-37 = "คือว่าฉัน... กินของร้อนไม่ค่อยได้น่ะ..."
1004906-38 = "ช็อกโกแลตที่อยู่ข้างในมันร้อนมากๆ จนฉันกินไม่ได้เลย"
1004906-39 = "แต่ถ้ารอให้มันเย็นลงก่อนละก็ มันจะเสียรสชาติไปซะเปล่าๆ น่ะ"
1004906-40 = "ถ้าเป็นแบบนั้นก็น่าเสียดายแย่ เพราะงั้นก็เลยคิดว่า... เอามาให้คนที่กินตอนมันร้อนๆ ได้น่าจะดีกว่า"
1004906-41 = "หืม...?"
1004906-42 = "\"สุดท้ายก็คือเอามาให้ครู 'จัดการ' สินะ\" งั้นเหรอ...?"
1004906-43 = "อะ...อะไรกันเล่า!? พูดแบบนั้นฉันเสียหายนะ ถ้าใครมาได้ยินอาจคิดว่าฉันเอาขนมมาทิ้งก็ได้!!"
1004906-44 = "นี่เค้กอบใหม่อร่อยๆ เลยนะ!? แค่ฉันกินไม่ได้ก็เท่านั้นเอง...!"
1004906-45 = "[s5] \"คาซึสะนี่เป็นคนลิ้นแมวสินะ\"\n[s6] \"อืม... เหมือนแมวเลยน้า\""
1004906-46 = "...!?"
1004906-47 = "...!?"
1004906-48 = "หืม...? ละ...ลิ้นแมว...?"
1004906-49 = "งะ... งั้นเหรอ? ฉันไม่เคยคิดแบบนั้นมาก่อนเลย..."
1004906-53 = "เดี๋ยวนะ คุณครู"
1004906-54 = "ขอบอกไว้ก่อนนะว่าถึงจะได้ยินแบบนั้นแต่ฉันก็ไม่ดีใจหรอก ฉันไม่ชอบแมวน่ะ"
1004906-55 = "อ่า... ไม่ใช่แบบนั้นงั้นเหรอ? ถ้างั้นก็ช่างเถอะ..."
1004906-59 = "...แต่ว่ามันรู้สึกคาใจจังแฮะ"
1004906-60 = "คิดยังไงก็เหมือนพูดล้อฉันเล่นอยู่ดี..."
1004906-61 = "หืม...? จะกินให้อร่อยเลยงั้นเหรอ? อะ...อื้อ ไม่ต้องขอบคุณหรอก..."
1004906-62 = "อืม..."
1004906-63 = "อืม... ช่างเถอะ ฮึ่ม..."
1004906-65 = "(คุณครูมองคาซึสะที่มองมาด้วยท่าทางสงสัย ก่อนจะรีบ 'จัดการ' ช็อกโกแลตฟองดูอย่างเอร็ดอร่อย)"
1004906-66 = "(เค้กช็อกโกแลตมีรสชาติหวานอร่อย นุ่มลิ้นเหมือนที่คาซึสะบอก...)"

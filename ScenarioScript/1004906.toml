[translation]
1004906-1 = "貓舌頭"
1004906-3 = "老師，你在吧？"
1004906-4 = "……打擾了。"
1004906-8 = "嗨，老師。"
1004906-9 = "……嗯？你問我來幹嘛？"
1004906-10 = "……什麼啊。你這樣講好像我只會在有需要的時候才會來找你。有點難過呢。"
1004906-11 = "不，不過……我今天來也不是沒有理由……"
1004906-12 = "不過這次有點不一樣。"
1004906-13 = "其實是為了這個……"
1004906-18 = "[ns1]「這是……巧克力蛋糕？不過有點不一樣……？」\n[ns2]「今天是什麼紀念日嗎？」"
1004906-19 = "那個，正確來說是叫「熔岩巧克力蛋糕」的甜點……"
1004906-20 = "那個，正確來說是叫「熔岩巧克力蛋糕」的甜點……"
1004906-21 = "不知道……老師會不會喜歡。"
1004906-22 = "剛，剛好在來的路上，經過一間以熔岩巧克力蛋糕聞名的店……"
1004906-23 = "就想說好像不錯，要不要買呢……"
1004906-24 = "………"
1004906-25 = "……嘛，算了，直接說實話吧，反正是老師。"
1004906-26 = "這個蛋糕……確實是帶來給老師的沒錯。"
1004906-27 = "但也是因為我一個人實在吃不了。#n老師，你伸手靠近它看看。"
1004906-31 = "[ns3]「還熱呼呼的呢，能感受到熱氣。」\n[ns4]「哦……剛出爐的嗎？」"
1004906-32 = "嗯……熔岩巧克力蛋糕裡面包著融化的熱巧克力。"
1004906-33 = "嗯……熔岩巧克力蛋糕裡面包著融化的熱巧克力。"
1004906-34 = "我買的時候以為它只是一般的巧克力蛋糕……#n應該看仔細一點的……真失敗。"
1004906-35 = "……嗯？你說這樣有什麼問題？"
1004906-36 = "……那個……唔嗯……"
1004906-37 = "其實我……吃熱食很容易燙傷，沒辦法吃太燙的東西……"
1004906-38 = "而這裡頭的熔岩巧克力太燙了，我吃不了……"
1004906-39 = "可是就這樣把它放到冷掉也不好……這種東西通常冷了不是都不好吃嗎？"
1004906-40 = "所以就想說與其糟蹋了這個蛋糕，不如送給不怕燙的人吃。"
1004906-41 = "……嗯？"
1004906-42 = "聽起來像是我要讓老師「處理掉」才來的……？"
1004906-43 = "什，什麼啊！？不用說得那麼難聽吧！#n又不是拿來要你丟掉！！"
1004906-44 = "這可是剛出爐的耶！！只是我剛好不能吃罷了……！"
1004906-45 = "[s5]「原來千紗是貓舌頭啊。」\n[s6]「吃不了熱食就跟貓咪一樣呢。」"
1004906-46 = "……！？"
1004906-47 = "……！？"
1004906-48 = "唔，嗯嗯……貓舌頭……？"
1004906-49 = "是那樣嗎……？我倒是沒有這麼想過……"
1004906-53 = "……等等，老師。"
1004906-54 = "我先聲明，就算你那麼說我也一點都不會開心。#n因為我討厭貓。"
1004906-55 = "……你不是那個意思？#n是嗎……雖然是不是都無所謂……"
1004906-59 = "……果然還是挺在意的。"
1004906-60 = "不管怎麼想，我都覺得你好像是故意捉弄我的……"
1004906-61 = "……嗯？你說這蛋糕就感激地收下了？#n好，好哦。不用客氣……"
1004906-62 = "嗯……"
1004906-63 = "……唔嗯，真搞不懂……唉……"
1004906-65 = "（就這麼看著面露懷疑的千紗，將溫熱的熔岩巧克力蛋糕開心地「處理」掉了）"
1004906-66 = "（就跟千紗說的一樣，吃起來非常甜蜜又滑順）"

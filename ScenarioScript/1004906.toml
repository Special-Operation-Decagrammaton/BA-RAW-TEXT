1004906-29 = "#clearST"
1004906-30 = "#wait;1000"
1004906-31 = "[ns3] \"뜨겁다. 열기가 확 느껴지네.\"\n[ns4] \"오……. 갓 만든 건가봐?\""
1004906-32 = "3;카즈사;01;뭐……. 그렇지. 퐁당 쇼콜라라는 게 사실 이렇게 뜨거운 초코가 안에 들어있는 거거든.\n#3;em;…"
1004906-33 = "3;카즈사;01;뭐……. 그렇지. 퐁당 쇼콜라라는 게 사실 이렇게 뜨거운 초코가 안에 들어있는 거거든.\n#3;em;…"
1004906-34 = "3;카즈사;06;그냥 초코케이크인 줄 알고 샀는데 말이지……. 좀 잘 볼 걸……. 실수했어."
1004906-35 = "3;카즈사;01;……응? 무슨 문제라도 있는 거냐고?\n#3;em;[?]"
1004906-36 = "3;카즈사;04;……그게……. 음……."
1004906-37 = "3;카즈사;06;내가 그……. 뜨거운 걸 잘 못 먹거든…….\n#3;em;[속상함]\n#3;stiff"
1004906-38 = "3;카즈사;06;이게 안에 들어 있는 초코가 굉장히 뜨거워서, 나는 도무지 먹을 수가 없어."
1004906-39 = "3;카즈사;04;그렇다고 식을 때까지 기다리자니……. 보통 이런 건 식으면 맛이 없잖아?"
1004906-40 = "3;카즈사;02;그래서 이왕 아까운데, 뜨거울 때 먹을 수 있는 사람에게 주자……. 그렇게 된 거지."
1004906-41 = "3;카즈사;01;……응?"
1004906-42 = "3;카즈사;01;결국 '처리'하려고 가지고 온 거냐고……?\n#3;em;[?]"
1004906-43 = "3;카즈사;09;뭐, 뭐야!? 그런 식으로 말할 건 없잖아!! 누가 보면 버리러 온 줄 알겠네!!\n#3;hophop"

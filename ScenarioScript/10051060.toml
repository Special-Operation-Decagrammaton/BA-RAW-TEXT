10051060-2 = "#place;어딘가의 뒷골목"
10051060-3 = "3;히요리;03;헤헤헤…… 드디어 손에 넣었어요!\n#3;a"
10051060-4 = "3;히요리;08;패션 잡지 <BiBi>와 <ron-ro>의 최신호……!\n#3;jump\n#3;em;[음표]"
10051060-5 = "3;히요리;08;폐지와 탄피를 모아서 팔고, 끼니는 전부 편의점 폐기 도시락으로 때우고, 수돗물만으로 목을 축이며 돈을 모은 보람이 있네요, 헤헤."
10051060-6 = "1;미사키;01;……그리고 값의 절반은 선생님이 내줬지.\n#1;ar\n#3;m4\n#1;em;[한숨]"
10051060-7 = "3;히요리;10;그, 그래도 절반이나 제가 냈어요! 선생님도 기특하다고 해주셨다고요!\n#3;hophop\n#1;dl\n#3;m3"
10051060-8 = "3;히요리;10;무엇보다 이것 봐요! 심지어 <BiBi>의 이번 호에는 샤인캣 디자이너의 특집 기사도 실렸다고요!\n#3;stiff"
10051060-9 = "3;히요리;08;키보토스 패션계의 패러다임을 바꾼 천재 디자이너 말이에요!"
10051060-10 = "3;히요리;03;어? 이번에는 백귀야행 자치구에서 열린 패션쇼를 주관했었다나 봐요.\n#3;em;[반응]"
10051060-11 = "3;히요리;08;와아…….\n#3;greeting"
10051060-12 = "3;히요리;08;예쁜 옷들이 정말 많네요…….\n#3;em;[반짝]"
10051060-13 = "3;히요리;03;패션 모델이 되면 이런 예쁜 옷들을 마음껏 입을 수 있는 걸까요?"
10051060-14 = "3;히요리;04;물론 저처럼 작달막한 키로는 모델은 꿈도 꿀 수 없겠지만…….\n#3;stiff\n#3;em;[땀]"
10051060-15 = "3;히요리;04\n1;미사키;03;글쎄…… 그런 쪽도 나름의 수요가 있지 않을까?\n#1;ar\n#3;m5"
10051060-16 = "3;히요리;10;에에?! 어째서 그런 취향이 존재하는 거죠?! 그게 바로 세상의 어둠인 건가요?\n#3;em;[?!]\n#3;shake"
10051060-17 = "1;미사키;99;뭐 그래도 역시 키가 크면 모델로서는 플러스 요소가 되는 건 맞긴 하지."
10051060-18 = "1;미사키;02;여기 <ron-ro> 특집 기사에 나온 이 오노 츠쿠요라는 신인 모델, 키가 180cm래.\n#1;greeting\n#1;em;[반응]"
10051060-19 = "1;미사키;01;거기다가 관계자들 평가도 극찬 일색이네."
10051060-20 = "3;히요리;03;어, 여기 <BiBi>에도 나와요. 이번에 갑자기 혜성처럼 데뷔한 학생 모델인데, 엄청나게 패션계의 주목을 받고 있네요.\n#3;greeting"
10051060-21 = "3;히요리;02;평론가들의 평도 엄청나요. <더없이 미숙하지만 그 미숙함을 한참 벌충하고도 남을 정도의 재능이 그녀에게 있다.> <한없이 보석과 가까운 원석>…….\n#1;dl\n#3;m3\n#3;em;…"

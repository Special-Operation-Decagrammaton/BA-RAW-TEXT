[translation]
10051060-1 = "Episode 6;Rising Reputation"
10051060-2 = "Back Alley Somewhere"
10051060-3 = "Heeheehee... At last! I have it!"
10051060-4 = "The latest issues of \"BiBi\" and \"Ron-ro\"...!"
10051060-5 = "It was worth all the toil of selling scrap paper and bullet casings, the nights of eating expired bento out of the trash, and drinking tap water out of a faucet, heehee!"
10051060-6 = "...And Sensei paid for half."
10051060-7 = "B-But still, I managed to pay for MY half! ME! Sensei was so proud. I'm practically an independent woman..."
10051060-8 = "Oh, look! \"BiBi\" has a feature on Shinecat! He's so cool."
10051060-9 = "He's a genius who completely shifted the Kivotos fashion paradigm! See, I know that because it says it RIGHT here."
10051060-10 = "Huh? Shinecat recently debuted a new line at the Hyakkiyako Fashion Show."
10051060-11 = "Whoa..."
10051060-12 = "These dresses are so beautiful!"
10051060-13 = "Does being a model mean that you can just always wear things like this?"
10051060-14 = "Psshh... What a life. I can't even fantasize about it. I'm way too short to be a model."
10051060-15 = "Why? Short people wear clothes too. Why aren't there short models?"
10051060-16 = "Eeeh?! Because life is unfair. It's cruel suffering. The world was built for the tall to strut and for the short to try not to be stepped on!"
10051060-17 = "I suppose being tall gives a model an advantage. Eyes would naturally dart to you when you enter a room."
10051060-18 = "\"Ron-ro\" has an article on this new model, Ono Tsukuyo. She's 5'11\", see?"
10051060-19 = "She seems well-received."
10051060-20 = "Sh-She's in \"BiBi\" too. Hmm... She's a student model who made a surprise debut. Everyone in the industry is obsessed with her."
10051060-21 = "She has incredible reviews too. \"Although she's very inexperienced, she possesses innate, irreplaceable talent.\" \"A diamond in the rough.\""
10051060-22 = "Someone that talented...is probably happy, right?"
10051060-23 = "That's not necessarily true."
10051060-28 = "Looking that good requires immense effort and maintenance behind the scenes."
10051060-29 = "Much like how an orchid requires months of doting and watering in order to bloom."
10051060-30 = "Atsuko..."
10051060-31 = "So on that note, girls..."
10051060-32 = "Have any of you seen my rosemary leaves? They seem to have disappeared."
10051060-37 = "I believe I heard once that they can mask the taste of spoiled meat..."
10051060-43 = "...Girls? Girls?!"
10051060-45 = "Trinity School Plaza"
10051060-48 = "Have you read the newest issue of \"Heart Girls\"?"
10051060-49 = "Naturally."
10051060-50 = "I find it quite unfortunate that their focus has been on lifestyle instead of fashion as of late."
10051060-51 = "...So it was quite refreshing to see them return to their roots and focus on fashion this month."
10051060-52 = "Totally. The new editor has emphasized more in-depth reviews and hard analysis on the latest fashion trends."
10051060-53 = "And I especially enjoyed the article where they reviewed this new fashion model and analyzed her appeal."
10051060-54 = "Ah, that model from Hyakkiyako. She's gorgeous. Her name was..."
10051060-55 = "...Ono Tsukuyo, I think?"
10051060-56 = "Indeed! Her portfolio was most impressive, and those eyes... I could practically feel her aura through the page."
10051060-57 = "The experts in the industry heaped praise upon her, and deservedly so."
10051060-58 = "I like her too. I wonder what's next for her career..."
10051060-64 = "Millennium School"
10051060-68 = "Hm? What are you poring over so intensely?"
10051060-69 = "Some academic journal?"
10051060-70 = "Please. Not on my lunch break. "
10051060-71 = "This is \"Ron-ro.\" Hot off the press."
10051060-72 = "It's the trendiest magazine on the shelves. If you don't read it, you'll fall behind."
10051060-73 = "\"Ron-ro\"? How peculiar. What \"trends\" are we talking about?"
10051060-74 = "Fashion. Beauty. It's a SUPER-popular fashion magazine. You really didn't know?"
10051060-75 = "A magazine ONLY about fashion?"
10051060-76 = "I stopped thinking about fashion the minute I was handed this uniform."
10051060-77 = "And I've had no time to read because I've been working on my thesis."
10051060-78 = "Uh... Yeah... Right. That's important too..."
10051060-79 = "But I'm curious. You seemed so engrossed. Did you learn anything interesting?"
10051060-80 = "I was reading an article on this new fashion model. She's a student, like us. And she just debuted."
10051060-81 = "She's new to the industry, but she's getting a lot of attention."
10051060-82 = "Let's see, her name is...Tsukuyo?"
10051060-83 = "Huh... She certainly has presence."
10051060-89 = "Kronos Network Interview Room"
10051060-91 = "It's been an absolute pleasure having you with us, Miss Tsukuyo!"
10051060-92 = "Y-Yes... Thank you for having me..."
10051060-93 = "And one final question. The world must know! Rapid-fire, one sentence! Tell us your future plans."
10051060-94 = "P-Plans?!"
10051060-95 = "I-I will uh, in the future... Uh..."
10051060-99 = "..."
10051060-100 = "W-Well..."
10051060-102 = "Miss Tsukuyo! Calm down! No pressure! Just take a deep breath and tell us right now, in one sentence, what you intend to do with your life!"
10051060-103 = "Honestly..."
10051060-104 = "(glare)"
10051060-105 = "I-I will continue striving to be a g-great fashion model...?"
10051060-106 = "(nod)"
10051060-107 = "It's a pure answer! It's honest! It's...Tsukuyo, and you'll be seeing a lot more of her, folks!"
10051060-108 = "And all of us at Kronos wish nothing but success for Tsukuyo's modeling career! We'll be right back after a brief word from our sponsors!"
10051060-114 = "Nicely done. You survived your first interview."
10051060-115 = "U-Um... Just what is happening...?"
10051060-116 = "I understand that this is a new situation for you."
10051060-117 = "But look at this screen. Look at that live view count, the comments, the reactions."
10051060-118 = "...!"
10051060-119 = "Bet you never thought you'd see it, right?"
10051060-120 = "But this was all you. YOU generated this attention. You pulled in these gazes."
10051060-121 = "This is your talent, your destiny. And a talent like yours will bend the world to its will!"
10051060-122 = "B-But the Ninjutsu Research Club..."
10051060-123 = "I don't know what a \"ninja\" or \"ninjutsu\" is. No one does."
10051060-124 = "However, here's what I do know. Here's what I feel in my bones. You won't just be good. You will be the BEST."
10051060-125 = "But my ninja duties..."
10051060-126 = "To embrace one, you must release the other. What will you let go?"
10051060-127 = "I..."
10051060-128 = "Don't have an answer? Then I'll tell you. Follow me. That's the answer. That's the last answer you'll ever need."
10051060-129 = "But..."
10051060-134 = "Also, didn't you just announce in front of the adoring masses that you'll keep modeling?"
10051060-135 = "...!"
10051060-136 = "Would you go back on a public promise? Everyone would know. It was recorded."
10051060-137 = "The ride's here."
10051060-138 = "Let's go, Tsukuyo."
10051060-147 = "Set of \"Michiruchi, A Girl's Ninja Scroll\""
10051060-148 = "President! Behold! Last week's video got two more views!"
10051060-149 = "Two views! That's four eyes, probably! People are loving the ninja life!"
10051060-150 = "Tsukuyo! Do you see this, Tsukuyo? You did great!"
10051060-154 = "President, Tsukuyo is not here."
10051060-155 = "Eh? Still?"
10051060-156 = "Tsukuyo's never late. Maybe she's just...standing quietly near us? Hmm."
10051060-157 = "Izuna sent her Momo messages this morning. Unread. Nin. Nin..."
10051060-158 = "She knows that we film at the same time each week. She loves the routine."
10051060-159 = "Did something happen to her?"
10051060-160 = "Nyahaha, shooting on location today, I see."
10051060-161 = "Hm?"
10051060-162 = "Oh, you're...!"

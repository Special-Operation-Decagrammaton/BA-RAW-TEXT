[translation]
10051060-1 = "ตอนที่ 6;ชื่อเสียงโด่งดัง"
10051060-2 = "ตรอกแห่งหนึ่ง"
10051060-3 = "แหะๆๆ... ในที่สุดก็ได้มาแล้วค่ะ!"
10051060-4 = "นิตยสารแฟชั่น <BiBi> กับ <ron-ro> ฉบับล่าสุด...!"
10051060-5 = "คุ้มค่ากับการต้องเก็บกระดาษลังกับปลอกกระสุนไปขาย แล้วก็ประหยัดเงินด้วยการกินแต่ข้าวกล่อง#nจากร้านสะดวกซื้อและดื่มแต่น้ำประปาแล้วค่ะ แหะๆ"
10051060-6 = "แล้วคุณครูก็ช่วยจ่ายอีกครึ่งหนึ่งด้วย..."
10051060-7 = "ตะ... แต่ถึงยังไงฉันก็ออกไปตั้งครึ่งหนึ่งนะคะ! คุณครูก็บอกว่าภูมิใจในตัวฉันด้วยค่ะ!"
10051060-8 = "ที่สำคัญเลย ดูนี่สิคะ! <BiBi> ฉบับนี้มีสกู๊ปข่าวพิเศษของดีไซเนอร์ไชน์แคทด้วยค่ะ!"
10051060-9 = "เขาเป็นถึงดีไซเนอร์อัจฉริยะที่เปลี่ยนกระบวนทัศน์วงการแฟชั่นของคิโวทอสเลยนะคะ!"
10051060-10 = "หืม? เหมือนเขาจะเป็นผู้จัดงานแฟชั่นโชว์ในเฮียกคิยาโคครั้งนี้ด้วยนะคะ"
10051060-11 = "ว้าว..."
10051060-12 = "มีแต่ชุดสวยๆ ทั้งนั้นเลยค่ะ..."
10051060-13 = "ถ้าฉันได้เป็นนางแบบ ฉันจะได้ใส่เสื้อผ้าสวยๆ แบบนี้ตามใจอยากเลยมั้ยคะ?"
10051060-14 = "ต่อให้ส่วนสูงอันน้อยนิดของฉันจะดับฝันการเป็นนางแบบก็เถอะค่ะ..."
10051060-15 = "ไม่รู้สิ... แต่ยังไงวงการนี้ก็น่าจะต้องการนางแบบไซซ์เล็กบ้างนะ?"
10051060-16 = "เอ๋?! วงการนางแบบจะรับคนอย่างฉันด้วยเหรอคะ?! โลกนี้ไม่ได้มืดมนเสมอไปหรอกเหรอ?"
10051060-17 = "แต่ก็ต้องยอมรับนะว่าส่วนสูงคือข้อได้เปรียบสำหรับนางแบบ"
10051060-18 = "ลองดูโอโนะ สึคุโยะ นางแบบหน้าใหม่ที่อยู่ในสกู๊ปข่าวพิเศษของ <ron-ro> สิ เห็นว่าสูงตั้ง 180 ซม. เลยนะ"
10051060-19 = "แล้วคนในวงการก็ชื่นชมกันใหญ่เลยด้วย"
10051060-20 = "อ้อ นางแบบคนนั้นได้ลงนิตยสาร <BiBi> เหมือนกันค่ะ เห็นว่าเป็นนักเรียนที่เดบิวต์เป็นนางแบบ#nจนโด่งดังราวกับดาวรุ่ง และได้รับความสนใจอย่างมากจากวงการแฟชั่นเลยละค่ะ"
10051060-21 = "คำวิจารณ์ที่ได้รับก็เป็นไปในทางบวกเยอะเลยด้วย ทั้งบอกว่า <ถึงจะยังเป็นมือใหม่ แต่พรสวรรค์ของ#nเธอมีมากจนชดเชยความอ่อนประสบการณ์ได้> และ <นี่คืออัญมณีที่ใกล้เคียงกับเพชรพลอยอย่างยิ่ง> ..."
10051060-22 = "คนที่มีพรสวรรค์ล้นเหลือแบบนั้น... คงมีความสุขในชีวิตใช่มั้ยคะ?"
10051060-23 = "ไม่เป็นอย่างนั้นเสมอไปหรอก"
10051060-28 = "การมีชื่อเสียงโด่งดังในปัจจุบัน เบื้องหลังนั้นคือความพยายามเป็นอย่างมากในอดีต"
10051060-29 = "เช่นเดียวกับการปลูกดอกไม้ที่สวยงาม ก็จำเป็นต้องผ่านขั้นตอนการทำสวนที่พิถีพิถันและยากลำบาก#nยังไงล่ะ"
10051060-30 = "อาสึโกะจัง..."
10051060-31 = "เพราะงั้นแล้ว ทุกคน"
10051060-32 = "รู้หรือเปล่าว่าสมุนไพรที่ฉันปลูกไว้ ใบมันหายไปไหนหมด?"
10051060-37 = "ครั้งที่แล้วเหมือนเคยได้ยินว่าใครจะใช้สมุนไพรดับกลิ่นเนื้อที่เน่าเสียด้วยนะ..."
10051060-43 = "ทุกคน...? ทุกคน?!"
10051060-45 = "จัตุรัสในสถาบันทรีนิตี้"
10051060-48 = "ได้อ่าน <Heart Girls> ฉบับล่าสุดของเดือนนี้หรือยังคะ?"
10051060-49 = "แน่นอนสิคะ"
10051060-50 = "ฉันเสียดายที่ช่วงหลังมานี้ <Heart Girls> หันไปให้ความสนใจกับเรื่องไลฟ์สไตล์มากกว่าแฟชั่น..."
10051060-51 = "แต่ฉบับล่าสุดดูจะกลับมาโฟกัสเรื่องแฟชั่นที่เป็นเจตนารมณ์เดิมแล้วนะคะ"
10051060-52 = "ใช่ค่ะ การวิจารณ์แฟชั่นมีความลึกซึ้งมากขึ้น ส่วนการวิเคราะห์แนวโน้มและประเด็นด้านแฟชั่นก็สมบูรณ์#nขึ้นด้วยค่ะ"
10051060-53 = "อ้อ บทวิจารณ์นางแบบหน้าใหม่ที่เดบิวต์ในครั้งนี้ก็ยอดเยี่ยมเลยค่ะ"
10051060-54 = "อ๊ะ หมายถึงนางแบบจากเฮียกคิยาโคสินะคะ ชื่ออะไรนะ..."
10051060-55 = "โอโนะ สึคุโยะ หรือเปล่าคะ?"
10051060-56 = "ใช่ค่ะ! แค่ดูจากรูปก็สัมผัสได้ถึงออร่าที่เปล่งประกายเลยละค่ะ"
10051060-57 = "ผู้คนในวงการแฟชั่นกับนักวิจารณ์ต่างก็ชื่นชมกันทั้งนั้นเลย"
10051060-58 = "น่าติดตามเลยนะคะว่าจะพัฒนาเป็นสุดยอดนางแบบแค่ไหน"
10051060-64 = "สวนในมิลเลเนียม"
10051060-68 = "หืม? กำลังดูอะไรอยู่น่ะ?"
10051060-69 = "วารสารวิชาการเหรอ?"
10051060-70 = "ใช้คำซะเว่อร์เลยนะ... "
10051060-71 = "นี่คือ <ron-ro> ฉบับล่าสุดของเดือนนี้ต่างหาก"
10051060-72 = "เป็นหนังสือที่ต้องอ่านถ้าไม่อยากตกเทรนด์น่ะ"
10051060-73 = "<ron-ro>? คืออะไรเหรอ?"
10051060-74 = "เธอไม่รู้จัก <ron-ro> เหรอ...? นี่เป็นนิตยสารแฟชั่นชื่อดังเลยนะ"
10051060-75 = "นิตยสารแฟชั่นงั้นเหรอ..."
10051060-76 = "หลังจากวัดไซซ์ชุดนักเรียนของตัวเองครั้งล่าสุด ฉันก็ไม่ได้สนใจเรื่องแฟชั่นเลย..."
10051060-77 = "แล้วฉันก็ยุ่งกับการอ่านบทวิจัยจนไม่ได้อ่านอะไรอื่นด้วย"
10051060-78 = "อ่า... อื้อ... งั้นก็ไม่แปลกหรอก"
10051060-79 = "ว่าแต่มีอะไรน่าสนใจงั้นเหรอ เห็นเธอตั้งใจอ่านมากๆ เลย"
10051060-80 = "อ้อ ฉันกำลังอ่านบทวิจารณ์เกี่ยวกับนางแบบแฟชั่นที่เพิ่งเดบิวต์ใหม่น่ะ"
10051060-81 = "เห็นว่าเพิ่งเข้ามาอยู่วงการนี้ได้ไม่นาน แต่ก็ได้รับความสนใจมากเลยละ"
10051060-82 = "ขอฉันดูบ้างสิ ชื่อว่า... สึคุโยะงั้นเหรอ?"
10051060-83 = "โอ้โห... ไม่เคยเห็นคนที่มีออร่านางแบบขนาดนี้มาก่อนเลย"
10051060-89 = "ห้องสัมภาษณ์ สถานีโทรทัศน์โครนอส"
10051060-91 = "ขอบคุณที่ให้โอกาสในการสัมภาษณ์ในครั้งนี้นะคะ คุณสึคุโยะ!"
10051060-92 = "ค่ะ ค่ะ... ฉันก็ต้องขอบคุณเหมือนกันค่ะ..."
10051060-93 = "เอาละค่ะ งั้นก็คำถามสุดท้าย! ช่วยบอกแผนการในอนาคตของคุณสึคุโยะในหนึ่งประโยคได้มั้ยคะ?"
10051060-94 = "คะ... คะ?!"
10051060-95 = "ตะ... ต่อไป ฉัน... จะ..."
10051060-99 = "..."
10051060-100 = "คะ... คะ... คือว่า..."
10051060-102 = "คุณสึคุโยะ! ไม่ต้องประหม่านะคะ! หายใจเข้าลึกๆ แล้วซื่อสัตย์กับความรู้สึกที่อยู่ข้างในก็พอค่ะ!"
10051060-103 = "อัน... ที่จริง..."
10051060-104 = "(มองแรง)"
10051060-105 = "เอ่อ... ตะ... ต่อไปฉันจะพยายามอย่างเต็มที่เพื่อเป็นสุดยอดนางแบบแฟชั่นค่ะ...?"
10051060-106 = "(พยักหน้า)"
10051060-107 = "ค่ะ! เสียงจากหัวใจที่อาจจะยังไม่ชัดเจนแต่จริงใจ! ทางเรารับรู้ได้แล้วค่ะ!"
10051060-108 = "ขอให้เส้นทางนางแบบในอนาคตของคุณสึคุโยะมีแต่ความสุขสดใสนะคะ! เราไปพักชมโฆษณากัน#nสักครู่ค่ะ!"
10051060-114 = "คงจะประหม่ามากทีเดียวกับการสัมภาษณ์ครั้งแรก แต่ก็ทำได้ดีเลยนะ"
10051060-115 = "อะ... เอ่อ... ทำไมสถานการณ์ถึงกลายเป็นแบบนี้ไปได้..."
10051060-116 = "ฉันเข้าใจ เธอคงยังตั้งตัวไม่ถูกกับสถานการณ์ของตัวเองตอนนี้หรอก"
10051060-117 = "แต่ดูที่หน้าจอสิ เห็นมั้ยว่ามีคนเข้ามาดูการสัมภาษณ์สดเมื่อกี้ไปกี่คน มียอดวิวเท่าไร และผู้ชมมีปฏิกิริยายังไงบ้าง"
10051060-118 = "...!"
10051060-119 = "เป็นยังไงล่ะ? เพิ่งเคยเห็นตัวเลขขนาดนี้ใช่มั้ย?"
10051060-120 = "นี่คือตัวเลขที่เธอสร้างขึ้น และคือสายตาที่เธอดึงดูดมาได้เลยนะ"
10051060-121 = "นี่ละพรสวรรค์ของเธอ พรสวรรค์ระดับเธอสมควรได้รับการตอบรับแบบนี้ละ!"
10051060-122 = "ตะ... แต่ว่าฉันต้องกลับไปอยู่ชมรมวิจัยศาสตร์นินจา..."
10051060-123 = "ฉันไม่รู้หรอกว่าศาสตร์นินจานั่นคืออะไร แค่นินจาคืออะไรยังไม่รู้เลย"
10051060-124 = "แต่สิ่งหนึ่งที่ฉันมั่นใจก็คือ เธอจะได้เป็นสุดยอดนางแบบในอนาคต"
10051060-125 = "แต่ว่าฉันอยากเป็นนินจา..."
10051060-126 = "ถ้าอยากคว้าสิ่งหนึ่ง ก็ย่อมต้องปล่อยอีกสิ่งหนึ่งเป็นธรรมดา เธอคิดว่าจะปล่อยสิ่งไหนล่ะ?"
10051060-127 = "ฉัน..."
10051060-128 = "ยังไม่รู้คำตอบงั้นเหรอ? ถ้างั้นฉันจะบอกให้เอง เดินมาตามทางที่ฉันปูให้สิ นี่ละคำตอบ"
10051060-129 = "แต่ว่า..."
10051060-134 = "แล้วเธอก็เพิ่งประกาศต่อหน้าผู้ชมจำนวนมากไปนี่ ว่าจะเป็นสุดยอดนางแบบให้ได้ในอนาคตน่ะ?"
10051060-135 = "...!"
10051060-136 = "คงไม่คิดผิดสัญญาที่ให้ไว้ต่อสาธารณชนหรอกใช่มั้ย?"
10051060-137 = "เชิญครับ เราเตรียมรถไว้เรียบร้อยแล้วครับ"
10051060-138 = "ดี ไปกันเถอะ"
10051060-147 = "สถานที่ถ่ายทำ <วิถีนินจาสาว มิจิรุจจี้>"
10051060-148 = "หัวหน้า! ดูนี่สิคะ! วิดีโอที่อัปโหลดไปเมื่อสัปดาห์ก่อนมียอดวิวเพิ่มมา 2 วิวค่ะ!"
10051060-149 = "โอ้ว! มีคนชื่นชอบในกลิ่นอายของนินจามากขึ้นแล้วสินะ!"
10051060-150 = "สึคุโยะ! สึคุโยะก็รีบมาดูนี่สิ!"
10051060-154 = "ท่านสึคุโยะยังไม่มาเลยค่ะ หัวหน้า"
10051060-155 = "หืม? ยังอีกเหรอ?"
10051060-156 = "สายแล้วนะ สึคุโยะ..."
10051060-157 = "ที่จริงอิซุนะก็ส่ง MOMOTALK ไปสักพักแล้ว แต่ก็ยังไม่เปิดอ่านเลยค่ะ... นินนิน..."
10051060-158 = "แปลกจัง สึคุโยะน่าจะรู้ดีนี่นาว่าเราถ่ายทำกันเวลานี้ทุกสัปดาห์อยู่แล้ว"
10051060-159 = "คงไม่ได้มีเรื่องอะไรเกิดขึ้นหรอกเนอะ?"
10051060-160 = "อะฮะฮ่า วันนี้มีการถ่ายทำที่นี่เหรอคะ?"
10051060-161 = "หืม?"
10051060-162 = "นี่ เธอ...!"

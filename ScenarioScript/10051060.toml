[translation]
10051060-1 = "第6話;高漲的名聲"
10051060-2 = "某處的後巷"
10051060-3 = "嘿嘿嘿……終於拿到手了！"
10051060-4 = "時尚雜誌《BiBi》和《ron-ro》的最新一期……！"
10051060-5 = "收集廢紙和彈殼拿去賣、三餐全靠便利商店的報廢便當、只喝自來水解渴……#n拚命存錢總算獲得回報了呢，嘿嘿。"
10051060-6 = "……有一半的錢是老師出的吧。"
10051060-7 = "至，至少我也出了一半呀！老師他還誇我很厲害哦！"
10051060-8 = "而且你看！這期的《BiBi》還有Shine Cat設計師的專題報導耶！"
10051060-9 = "就是那位顛覆了奇普托斯時尚界的天才設計師！"
10051060-10 = "哦？他這次好像還在百鬼夜行自治區主辦了時裝秀呢。"
10051060-11 = "哇……"
10051060-12 = "有好多漂亮的衣服……"
10051060-13 = "如果成為時尚模特兒的話，是不是就能盡情穿上那些漂亮衣服了啊？"
10051060-14 = "當然像我這種矮冬瓜，想當模特兒根本是在做白日夢……"
10051060-15 = "這個嘛……那種類型搞不好也有市場需求吧？"
10051060-16 = "咦！？為什麼會有那種喜好！？#n難道那就是世界的黑暗面嗎？"
10051060-17 = "不過身高對模特兒來說，的確是加分項呢。"
10051060-18 = "這篇《ron-ro》專題報導裡提到的新人模特兒「大野月夜」，身高足足有180cm呢。"
10051060-19 = "就連業界人士也都對他讚不絕口。"
10051060-20 = "啊，這本《BiBi》裡也有寫到他耶。#n如彗星般突然出道的學生模特兒，正受到時尚界的高度關注……"
10051060-21 = "評論家的評價也非常高呢。#n像是「雖然極為青澀，卻擁有足以將其彌補，甚至還綽綽有餘的才能」、#n「無限趨近於寶石的原石」之類的。"
10051060-22 = "這麼有才華的人……應該很幸福吧？"
10051060-23 = "那也不一定哦。"
10051060-28 = "在光鮮亮麗的外表背後，往往付出了許多努力。"
10051060-29 = "就像要讓華麗的花朵綻放，就必須忍受細緻又辛苦的園藝工作一樣。"
10051060-30 = "敦子醬……"
10051060-31 = "話說……"
10051060-32 = "你們知道我種的香草葉跑去哪裡了嗎？"
10051060-37 = "之前好像聽到有人說，要用香草來醃壞掉的肉……"
10051060-43 = "……大家？大家！？"
10051060-45 = "三一學園廣場"
10051060-48 = "你們有看過這個月最新一期的《Heart Girls》嗎？"
10051060-49 = "那當然。"
10051060-50 = "最近感覺太偏重生活風格的主題，總覺得有點可惜……"
10051060-51 = "不過最新一期好像找回初衷，重新回歸時尚主題了呢。"
10051060-52 = "是啊。不僅評論的深度有所增加，對於時尚趨勢和議題的分析也變得豐富很多。"
10051060-53 = "啊，還有對最近出道的新人模特兒的評論，也讓人印象深刻呢。"
10051060-54 = "你是說那位百鬼夜行出身的模特兒嗎？#n名字好像叫做……"
10051060-55 = "記得是大野月夜，對吧？"
10051060-56 = "沒錯！光看照片就能感受到他散發出的超強氣場呢。"
10051060-57 = "業界人士和評論家也異口同聲地給予了極高的評價。"
10051060-58 = "真期待他未來會成長為什麼樣的模特兒呢。"
10051060-64 = "千年科學學園"
10051060-68 = "嗯？你在看什麼？"
10051060-69 = "學術期刊？"
10051060-70 = "不要突然說學術期刊這麼可怕的話好不好…… "
10051060-71 = "是《ron-ro》的新刊啦。"
10051060-72 = "這可是避免跟流行脫節的必讀刊物呢。"
10051060-73 = "《ron-ro》？那是什麼啊？"
10051060-74 = "你連《ron-ro》都不知道……？#n這是很有名的時尚雜誌耶。"
10051060-75 = "時尚雜誌啊……"
10051060-76 = "我自從量完制服的尺寸之後，好像就再也沒關心過時尚這種東西了……"
10051060-77 = "每天光是讀論文就累個半死，根本沒有時間看其他的文字資料。"
10051060-78 = "唔嗯……好吧，那好像也不能怪你。"
10051060-79 = "不過看你剛才好像看得很專心，有什麼有趣的內容嗎？"
10051060-80 = "啊，我在看關於最近新出道的時裝模特兒的評論。"
10051060-81 = "雖然才進入業界沒多久，不過似乎很受矚目的樣子。"
10051060-82 = "我看看，名字是……月夜？"
10051060-83 = "哦哦……光是散發出的氣場就不同凡響呢。"
10051060-89 = "克洛盧斯放送局採訪室"
10051060-91 = "那麼，非常感謝月夜同學配合今天的採訪！"
10051060-92 = "嗯，嗯……我也非常感謝……"
10051060-93 = "那麼接下來是最後一個問題！#n請用一句話說明月夜同學今後的計畫吧！"
10051060-94 = "咦，咦咦！？"
10051060-95 = "我，我接下來……那個……"
10051060-99 = "……"
10051060-100 = "那，那那，那個……"
10051060-102 = "來，月夜同學！放輕鬆放輕鬆！#n做個深呼吸之後，坦率說出心裡想說的話就可以了！"
10051060-103 = "坦……率地……"
10051060-104 = "（瞪）"
10051060-105 = "那個，我，我今後會，會為了成為出色的時尚模特兒，全力以赴的……？"
10051060-106 = "（點頭）"
10051060-107 = "好的！那質樸而真誠的心聲，我們都聽到了！"
10051060-108 = "那麼，在此祝福月夜同學未來的模特兒生涯前程似錦！#n廣告之後馬上回來！"
10051060-114 = "辛苦了。第一次接受廣播訪談，應該很緊張吧。"
10051060-115 = "那，那個……這到底是怎麼回事……"
10051060-116 = "如果要你立刻理解現狀的話，確實是有點強人所難。"
10051060-117 = "不過你看這個畫面。#n你剛才的直播訪談有多少人看過、產生了多少觀看數、獲得了什麼樣的反應……"
10051060-118 = "……！"
10051060-119 = "怎麼樣？沒見過這種數字吧？"
10051060-120 = "這就是你創造出來的數字。是你吸引而來的目光。"
10051060-121 = "像你這種等級的才能，自然會得到時代的回應啊！"
10051060-122 = "可，可是我還有忍術研究部要……"
10051060-123 = "我不懂什麼是忍術，也不知道忍者是什麼。"
10051060-124 = "不過有件事我非常確定──那就是你會成為最頂尖的翹楚。"
10051060-125 = "但是我想成為忍者……"
10051060-126 = "魚與熊掌不可兼得。#n問題只在於要放掉哪一邊而已。"
10051060-127 = "我……"
10051060-128 = "不知道答案嗎？那就讓我來告訴你吧。#n──答案就是「跟我走」。"
10051060-129 = "可是……"
10051060-134 = "而且剛才你不是已經在無數的觀眾面前，公開宣告「要成為模特兒」了嗎？"
10051060-135 = "……！"
10051060-136 = "那個公開的承諾，你該不會打算反悔吧？"
10051060-137 = "我們走吧。車子已經準備好了。"
10051060-138 = "好，出發。"
10051060-147 = "「少女忍法帖小小三千留」拍攝現場"
10051060-148 = "部長！請看這個！#n上週上傳的影片，觀看次數居然增加了2次呢！"
10051060-149 = "哦哦！又有更多人陶醉於忍者的魅力了呢！"
10051060-150 = "月夜！月夜也過來看看這個！"
10051060-154 = "月夜閣下還沒來哦，部長。"
10051060-155 = "嗯？還沒到嗎？"
10051060-156 = "來的真晚呢，月夜……"
10051060-157 = "其實伊樹菜從剛才就一直傳MomoTalk給他，可是他卻遲遲沒有看訊息……忍忍……"
10051060-158 = "真奇怪……每週這個時間都要錄影，他應該比誰都清楚才對呀？"
10051060-159 = "該不會是出了什麼事吧？"
10051060-160 = "喵哈哈，今天的拍攝地點是這裡嗎？"
10051060-161 = "嗯？"
10051060-162 = "咦，你是……！"

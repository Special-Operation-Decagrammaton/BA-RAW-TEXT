[translation]
10011020-1 = "第2話;大塊頭少女"
10011020-2 = "百鬼夜行公演準備舞台"
10011020-4 = "請各位公演的工作人員來這邊集合！"
10011020-5 = "[s]「好，我們走吧。」"
10011020-6 = "伊樹菜～來了！"
10011020-11 = "是，是！"
10011020-19 = "哎呀～會被要求做些什麼呢～"
10011020-20 = "那麼在正式開始之前，我想先決定各自的工作分配。"
10011020-21 = "嗯？工作分配？"
10011020-22 = "那邊那位請來這裡。"
10011020-23 = "啊，嗯。"
10011020-27 = "這邊這位請往那邊。"
10011020-28 = "忍忍！"
10011020-32 = "那位高個子的同學，請去那邊。"
10011020-33 = "好的……！"
10011020-38 = "那麼，請依照工作人員的指示行動。"
10011020-40 = "……得分頭行動了呢，不過這也沒辦法吧？"
10011020-42 = "伊樹菜會加油的！"
10011020-43 = "我，我也會……加油……"
10011020-44 = "[s]「那麼大家待會見囉。」"
10011020-48 = "（於是過了1個小時……）"
10011020-52 = "[ns]「大家好像都還沒回來……」"
10011020-53 = "（又過了一會……）"
10011020-58 = "[ns]「嗯……？好像有騷動……？」"
10011020-64 = "[ns]「那個是……」"
10011020-65 = "那個……可以請你們……讓開嗎……"
10011020-66 = "嗯？哎呀，再多待一下子嘛。"
10011020-67 = "就是啊，你要是走掉的話，我們的標的物不就沒了嗎？"
10011020-68 = "畢竟我已經告訴朋友在高個子旁碰面了啊。"
10011020-69 = "我不是地標哦……"
10011020-70 = "而且我還得做公演的準備……"
10011020-71 = "[s]「月夜？」"
10011020-72 = "……！！"
10011020-76 = "你是哪位？"
10011020-77 = "怎麼？打算妨礙我們嗎？"
10011020-78 = "這種能玩得這麼開心的日子，可不能讓你來打擾啊！"
10011020-79 = "非要吃點苦頭才能明白嗎？我們上！"
10011020-80 = "[s]「抱歉，月夜。能一起應戰嗎？」"
10011020-82 = "咦，咦咦……！？"

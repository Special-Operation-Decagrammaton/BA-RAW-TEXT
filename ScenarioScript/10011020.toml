10011020-71 = "[s] \"Tsukuyo?\""
10011020-72 = "...?!"
10011020-76 = "Who the hell are you?"
10011020-77 = "You tryna mess up our festival plans?"
10011020-78 = "We celebratin' our own way. We're gonna take up the front rows and start a SCENE!"
10011020-79 = "If you get in our way, it's the last thing you'll do!"
10011020-80 = "[s] \"Have it your way. Let's take care of them, Tsukuyo.\""
10011020-82 = "P-P-Pardon?"

[translation]
10011020-1 = "ตอนที่ 2;เด็กสาวร่างใหญ่"
10011020-2 = "เวทีจัดเตรียมการแสดงที่เฮียกคิยาโค"
10011020-4 = "ฝ่ายสนับสนุนการแสดงทุกท่านขอให้มารวมตัวกันที่นี่ด้วยครับ!"
10011020-5 = "[s] \"อ่า น่าจะต้องไปทางนั้นนะ\""
10011020-6 = "อิซุนะ~ มาแล้วค่ะ!"
10011020-11 = "คะ...ค่ะ!"
10011020-19 = "จะได้ช่วยการแสดงจริงๆ เหรอเนี่ย จะว่ายังไงดี ไม่น่าเชื่อเลย อืม..."
10011020-20 = "ก่อนที่จะเริ่มอย่างเป็นทางการ จะต้องแบ่งหน้าที่ของฝ่ายสนับสนุนเพื่อให้ทุกคนเข้าใจการใช้งาน#nอุปกรณ์สำหรับการแสดงอย่างละเอียดครับ"
10011020-21 = "หืม? แบ่งหน้าที่?"
10011020-22 = "ใช่ครับ ท่านที่อยู่ที่นี่ ขอเชิญด้านนี้ครับ"
10011020-23 = "อะ...อื้อ"
10011020-27 = "ส่วนท่านที่อยู่ด้านนี้ ขอเชิญไปที่ด้านโน้นครับ"
10011020-28 = "ค่ะ! นินนิน!"
10011020-32 = "สำหรับท่านที่ตัวสูง ช่วยรับหน้าที่จัดการอุปกรณ์ตรงนั้นด้วยนะครับ"
10011020-33 = "คะ... ค่ะ...!"
10011020-38 = "ถ้าอย่างนั้นอีกหนึ่งชั่วโมงต่อจากนี้ช่วยปฏิบัติตามที่ทีมงานบอกด้วยนะครับ!"
10011020-40 = "ถึงจะกะทันหันไปหน่อย... แต่ก็ช่วยไม่ได้สินะ ทุกคน"
10011020-42 = "ค่ะ! อิซุนะ! จะตั้งใจฝึกฝนค่ะ!"
10011020-43 = "ฉะ... ฉันก็จะ... พะ... พยายามด้วยค่ะ..."
10011020-44 = "[s] \"อืม ถ้างั้นทุกคนก็พยายามเข้านะ อีกหนึ่งชั่วโมงเจอกัน\""
10011020-48 = "(หลังจากนั้นเวลาก็ผ่านไปประมาณ 1 ชั่วโมง 20 นาที)"
10011020-52 = "[ns] \"ทุกคนมาช้าจังนะ...\""
10011020-53 = "(คุณครูกำลังรอให้ทุกคนกลับมาอย่างใจจดใจจ่อ)"
10011020-58 = "[ns] \"หืม...? ข้างนอกเอะอะโวยวายอะไรกันน่ะ...\""
10011020-64 = "[ns] \"ที่อยู่ตรงนั้นนั่นมัน...?\""
10011020-65 = "ขะ... ขอโทษนะคะ... คะ... คือว่า... ทะ... ทุกคน... ชะ... ช่วยหลบหน่อยได้ไหมคะ..."
10011020-66 = "หืม? อะไรของเธอเนี่ย ยืนอยู่เฉยๆ มาหาเรื่องกันทำไม"
10011020-67 = "ใช่ คิดว่าตัวสูงแล้วจะทำอะไรก็ได้งั้นเหรอ?"
10011020-68 = "ก็นัดกับเพื่อนไว้ว่าให้มาเจอกันตรงที่มีคนตัวใหญ่ๆ ยืนอยู่ ถ้าขยับไปที่อื่นก็หากันไม่เจอน่ะสิ"
10011020-69 = "ฮะ... ฮือ... ฉะ... ฉันไม่ใช่จุดนัดพบนะคะ..."
10011020-70 = "ฉันต้องไปเตรียมการแสดงจะให้มายืนเฉยๆ แบบนี้ไม่ได้นะคะ..."
10011020-71 = "[s] \"สึคุโยะ?\""
10011020-72 = "...!!"
10011020-76 = "ใครอีกละนั่นน่ะ?"
10011020-77 = "จะมาขัดขวางนัดหมายงานเทศกาลของเรารึไง?"
10011020-78 = "วันนี้พวกเราตั้งใจจะจองที่นั่งด้านหน้าสุดของการแสดง แล้วก่อความวุ่นวายให้หนำใจเลย!"
10011020-79 = "ใครที่มาขวางทางเข้าละก็ จะไม่ยกโทษให้เด็ดขาด!"
10011020-80 = "[s] \"ก็ได้ งั้นก็จัดการเลยเถอะสึคุโยะ\""
10011020-82 = "คะ...คะ?!"

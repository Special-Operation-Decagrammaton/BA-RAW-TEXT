10011020-33 = "Oh... Okay..."
10011020-38 = "Great. Please proceed to your assigned stations and follow the staff's instructions."
10011020-40 = "Everything's happening so fast...but this is what we signed up for."
10011020-42 = "Yessiree! I'll uphold our ninja values!"

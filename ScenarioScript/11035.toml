[translation]
11035-2 = "พวกศัตรูถอนกำลังแล้วค่ะ!"
11035-3 = "ส่วนคลังเสบียง กองบัญชาการ และโรงเก็บกระสุนก็ถูกทำลายหมดแล้ว"
11035-4 = "ทีนี้คงมารังควานพวกเราไม่ได้ไปอีกนานเลยล่ะ"
11035-5 = "เอาล่ะ ทุกคนทำได้ดีมาก ครูก็ด้วย"
11035-6 = "เรากลับไปที่โรงเรียนกันเลยดีไหม?"
11035-9 = "ตอนต่อไป;สถานการณ์ของคณะกรรมการ"

[translation]
2000205-1 = "ยาลดน้ำหนัก"
2000205-2 = "ถนนย่านการค้าเทพเต่าดำ"
2000205-3 = "ดีจังที่ไม่หลงทางน่ะ"
2000205-4 = "ฮุฮุ ฉันคิดว่าครูก็น่าจะรู้แล้วว่าที่นี่ก็คือย่าน <อาหารเลิศรส>#nย่านการค้าเทพเต่าดำของซานไห่จิงอันเลื่องชื่อยังไงล่ะ!"
2000205-5 = "ได้ยินว่าทางสภานักเรียนกับฝ่ายบริหารทะเลาะกันเรื่องการเปิดร้านขายของริมถนนด้วยนะ...#nแถมยังมีข่าวลือเรื่องที่นี่หนาหูมาก แต่ว่าอาหารของที่นี่น่ะ อร่อยอย่าบอกใครเลยล่ะ!"
2000205-6 = "ไม่รู้ว่ามันจะชดเชยกับความผิดพลาดที่เกิดขึ้นคราวก่อนได้มั้ยแต่ว่า...#nวันนี้ท่านซายะจะพาครูไปที่ร้านอาหารที่อร่อยที่สุดในเมืองเอง!"
2000205-7 = "พอดูดีๆ แล้ว... ที่หน้าคุณครูยังมีขนของเนสึซึเกะติดอยู่นิดหน่อยนะ พรืดดดด...."
2000205-8 = "ทะ...โทษทีนะครู ฉันรู้ว่าไม่ควรหัวเราะ แต่ว่าหน้าครูดูตลกมากเลย... ฮ่าฮ่าฮ่า!"
2000205-9 = "ฮ่าฮ่าฮ่า!... ไม่ต้องห่วงนะครู ยาอายุวัฒนะนั่นออกฤทธิ์ไม่นานหรอก#nแค่เดือนเดียวขนพวกนั้นก็หายไปหมดแล้วล่ะ"
2000205-10 = "เอาล่ะ เราเข้าไปข้างในกันเลยมั้ย?"
2000205-13 = "ร้านก๋วยเตี๋ยว"
2000205-15 = "ยินดีต้อนรับ! จะรับอะไรดีคุณลูกค้า?"
2000205-16 = "เอาเหมือนเดิม#n<เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ เพิ่มกระเทียมกับมันหมู> สองชาม!"
2000205-17 = "รับออเดอร์เรียบร้อย#n<เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ เพิ่มกระเทียมกับมันหมู> สองชาม!"
2000205-19 = "(เสียงดังจอแจ)"
2000205-20 = "มะ...เมื่อกี้ได้ยินอะไรไหมหัวหน้า? ยัยเปี๊ยกนั่นสั่ง <เมนูนั้น> ด้วยล่ะ"
2000205-21 = "ไม่ได้ฟังผิดใช่ไหม...? ไม่คิดว่าจะมีเด็กนักเรียนมาสั่งเมนู#n<เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ เพิ่มกระเทียมกับมันหมู> ที่นี่ด้วย..."
2000205-24 = "ฮุฮุ ตื่นเต้นจังเลย"
2000205-25 = "[s] \"เส้นสุกพอประมาณ น้ำซุป.... อะไรต่อนะ?\""
2000205-26 = "คุณครูความจำไม่ดีสินะ ฉันสั่งว่า <เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ#nเพิ่มกระเทียมกับมันหมู> ต่างหากล่ะ เมนูสุดพิเศษของท่านซายะเลยนะ รับรองอร่อยแน่นอน~"
2000205-27 = "จะกินหมดรึเปล่างั้นเหรอ?#nหมดอยู่แล้ว! ท่านซายะคนนี้ทำได้ทุกอย่างแหละ!"
2000205-28 = "ปกติเด็กผู้หญิงในวัยนี้จะห่วงเรื่องจำนวนแคลอรี่ที่กินเข้าไปกันทั้งนั้น...#nแต่เด็กคนนี้กลับสั่งแบบเพิ่มมันหมูด้วย... กินจุแบบนี้ทำไม่ถึงยังตัวเล็กผอมบางแค่นั้นได้นะ!"
2000205-29 = "นั่นสิ แต่เธอคงกินได้ไม่ถึงครึ่งชามหรอก"
2000205-30 = "เมนูที่สั่งได้แล้วค่ะ#n<เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ เพิ่มกระเทียมกับมันหมู> สองชามมาแล้วค่า!"
2000205-31 = "ในที่สุดก็ได้ซะที! จะทานแล้วนะค้าาาา~!"
2000205-33 = "ขอบคุณสำหรับอาหารค่ะ!\n\n\n\n"
2000205-36 = "หัวหน้าเห็นรึเปล่า!#nยัยเปี๊ยกนั่น... กินก๋วยเตี๋ยวได้หมดทั้งชามในพริบตาเดียวเลย"
2000205-37 = "เด็กตัวเล็กแค่นั้นจะกินก๋วยเตี๋ยว <เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ#nเพิ่มกระเทียมกับมันหมู> หมดในพริบตางั้นเหรอ! ร่างกายต้องเผาผลาญพลังงาน#nได้เร็วแค่ไหนกันนะ..."
2000205-42 = "นี่ เมื่อกี้เธอเพิ่งกินก๋วยเตี๋ยว <เส้นสุกพอประมาณ น้ำซุปเข้มข้น ขอผักเยอะๆ#nเพิ่มกระเทียมกับมันหมู> หมดแล้วก็ซดน้ำซุปหมดชามเลยงั้นเหรอ?"
2000205-43 = "ก็ใช่? มีปัญหาอะไรเหรอ?"
2000205-44 = "ไม่กลัวแคลอรี่มหาศาลในน้ำซุปนั่นเลยรึยังไง!#nถ้ากินหมดชามจะได้รับแคลอรี่เกินจำนวนที่ควรได้รับในหนึ่งวันนะ....!"
2000205-45 = "ฮุฮุฮุ... ใครสนล่ะ? แค่มียาลดน้ำหนักสูตรพิเศษที่ท่านซายะคนนี้คิดค้นขึ้นมาก็พอแล้ว!"
2000205-46 = "ยาลดน้ำหนักสูตรพิเศษงั้นเหรอ?"
2000205-47 = "อื้อ แค่ดื่มยานี่เข้าไป ต่อให้กินอาหารที่มีแคลอรี่สูงแค่ไหนน้ำหนักก็ไม่ขึ้นแน่นอน!"
2000205-48 = "โอ้ว.... ขายยานั่นให้พวกเราได้ไหม? แพงแค่ไหนฉันก็ซื้อ!"
2000205-49 = "ฉันไม่ต้องการเงินหรอก แต่ว่าพอกินยาแล้วได้ผลมากแค่ไหนก็ช่วยมาบอกด้วยแล้วกันนะ!"
2000205-50 = "ขอบคุณมาก! เธอเหมือนแสงนำทางในชีวิตพวกเราเลย!"
2000205-51 = "แค่กินยานี่ พวกเราก็จะกินเนื้อติดมัน และพวกขนมหวานอย่างมาการองได้เต็มที่แล้ว!"
2000205-52 = "ฉันชักอยากลองแล้วล่ะ..."
2000205-56 = "ฮุฮุฮุ... ฉันก็เหมือนกัน อยากรู้แล้วล่ะว่าผลจะเป็นยังไง..."
2000205-58 = "ห้องทดลองของซายะ"
2000205-64 = "แฮ่กๆ...แฮ่กๆ... นะ...ในที่สุดก็เจอตัวสักที ยะ...ยัยเปี๊ยกจอมหลอกลวง..."
2000205-65 = "กะ...กล้าดียังไงให้ยาปลอมพวกเรา....!"
2000205-66 = "เอ๋? ไม่ได้ผลงั้นเหรอ? หรือฉันให้ยาที่มีฤทธิ์แรงเกินไปนะ?"
2000205-67 = "เปล่าเลย! มันตรงกันข้ามเลยต่างหาก!"
2000205-68 = "ไม่ว่ากินอะไรเข้าไปพวกเราก็จะย่อยทันที...#nเพราะงั้นไม่ว่าจะกินเข้าไปเท่าไหร่ พวกเราก็ไม่อิ่มกันสักที..."
2000205-69 = "ถ้าเป็นแบบนี้ต่อไปเราจะต้องหิวตายแน่ๆ..."
2000205-70 = "นั่นแสดงว่ายาลดน้ำหนักได้ผลไม่ใช่เหรอ?#nเพราะแบบนั้นก็แสดงว่าน้ำหนักจะไม่ขึ้นยังไงล่ะ ฮ่าฮ่าฮ่า!"
2000205-71 = "ยัยเปี๊ยก ฉันไม่ปล่อยเธอไว้แน่....!"
2000205-72 = "ไม่นะ ไม่ไหวแล้ว... ไม่มีแรงจะยืนเลย..."
2000205-76 = "อืม... คราวหน้าลองคิดค้นสูตรยาที่ทำให้กินน้ำแล้วน้ำหนักเพิ่มดีมั้ยนะ?"

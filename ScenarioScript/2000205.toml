[translation]
2000205-1 = "#title;다이어트약"
2000205-2 = "#place;현무상회 거리"
2000205-3 = "3;사야;00;헤매지 않고 잘 도착한 모양이군.\n#3;em;[음표]\n#3;a"
2000205-4 = "3;사야;02;후-후- 선생도 알고 있겠지만 이곳이 바로 그 <산해진미>로 유명한 산해경의 현무상회인 것이다!\n#3;m2"
2000205-5 = "3;사야;01;노점의 운영을 둘러싸고 학생회와 운영진이 암투를 벌이고 있다던가— #n여러가지 재미있는 소문이 많이 떠도는 곳이기도 하지만, 그래도 음식 맛만큼은 확실한 것이다!\n#3;em;[반응]"
2000205-6 = "3;사야;00;지난 번 실수에 대한 사과가 될지는 모르겠지만, #n오늘은 나님이 이곳에서 특별히 점 찍어 둔 맛집을 소개하는 것이다.\n#3;m3"
2000205-7 = "3;사야;99;그러고보니…… 아직도 네즈스케 같은 잔털이 얼굴에 남아있어. 푸흡……\n#3;stiff"
2000205-8 = "3;사야;03;미, 미안, 선생. 웃으면 안 된다고 생각해도 너무 선생의 꼴이 우스워서…… 푸하하!\n#3;em;[재잘]\n#3;hophop"
2000205-9 = "3;사야;02;푸흐흐…… 걱정 않는 것이다, 선생. 그 영약의 효과는 오래가지 않을 테니까. #n아마 한 달 뒤면 털은 말끔히 빠져나갈 것이다."
2000205-10 = "3;사야;01;자, 그럼 가게로 들어가볼까.\n#3;em;[음표]"
2000205-11 = "3;사야;01\n#3;dr\n#wait;1500"
2000205-12 = "#all;hide"
2000205-13 = "#place;국수 가게"
2000205-14 = "3;사야;01\n#3;ar\n#wait;1500"
2000205-15 = "#na;가게 주인;어서 오십시오, 주문은 무어로 하시겠습니까?"
2000205-16 = "3;사야;02;늘 먹던 걸로. #n<면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>, 두 그릇!\n#3;em;[반응]"
2000205-17 = "#na;가게 주인;네, 주문 받았습니다. #n<면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>, 두 그릇!"
2000205-18 = "3;사야;02\n#3;d\n#wait;1000"
2000205-19 = "#na;(술렁술렁)"
2000205-20 = "5;헬멧단 단원;01;바, 방금 들으셨습니까, 대장? 저 꼬맹이가 <그 메뉴>를 시켰습니다.\n#5;stiff\n#5;a"
2000205-21 = "1;헬멧단 간부;01;잘못 들은 건 아니겠지…? 설마 이곳에서 <면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>를 시키는 여학생이 있을 줄이야……\n#1;em;[...]\n#1;a"
2000205-22 = "1;헬멧단 간부;01\n5;헬멧단 단원;01\n#1;d\n#5;d\n#wait;1000"
2000205-23 = "#all;hide"
2000205-24 = "3;사야;01;후후, 벌써부터 기대되는 것이다.\n#3;em;[반짝]\n#3;a"
2000205-25 = "[s] \"면은 덜익게, 국물은…… 뭐라고?\""
2000205-26 = "3;사야;02;선생은 기억력이 나쁘구나. #n<면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>로 주문했어. #n나님의 특제 주문이니 분명 맛있을 것이다~"
2000205-27 = "3;사야;03;다 먹을 수 있는 양이냐고? #n물론이지! 나님은 뭐든지 가능하다고!\n#3;em;[음표]"
2000205-28 = "3;사야;01\n1;헬멧단 간부;01;이 나이대의 여학생이라면 비계를 추가하는 것 만으로도 칼로리가 신경 쓰일터… #n저런 칼로리 폭탄을 먹고도 마른 몸을 유지한다는 건 있을 수 없는 일이야!\n#3;m5\n#1;ar"
2000205-29 = "1;헬멧단 단원;01;맞습니다, 분명 반도 못 먹어 치울 게 분명합니다.\n#1;greeting\n#1;em;[!]"
2000205-30 = "1;헬멧단 단원;01\n3;사야;03\n#3;m3\n#3;h\n#1;dl\n#na;가게 주인;주문하신 메뉴 나왔습니다. #n<면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>, 두 그릇입니다."
2000205-31 = "#1;hide\n3;사야;03;드디어 나온 것이다! 잘 먹겠습니다~!\n#3;em;[반짝]\n#3;hophop\n#3;closeup"
2000205-32 = "#all;hide"
2000205-33 = "3;사야;01;잘 먹었습니다!\n#3;em;[반짝]\n#3;greeting\n#3;closeup\n#3;a"
2000205-34 = "3;사야;01\n#3;closeup\n#3;d\n#wait;1000"
2000205-35 = "#all;hide"
2000205-36 = "5;헬멧단 단원;01;보셨습니까, 대장! #n저 꼬맹이…… 순식간에 국물까지 마셔버렸습니다.\n#5;shake\n#5;em;[?!]\n#5;a"
2000205-37 = "1;헬멧단 간부;01;저런 작은 몸으로 <면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>를 순식간에 해치우다니! 이 얼마나 무시무시한 소화력인가……\n#1;a"
2000205-38 = "#1;hide\n#5;hide\n3;사야;01\n#3;h"
2000205-39 = "#wait;200"
2000205-40 = "#wait;1500"
2000205-41 = "1;헬멧단 간부;01\n5;헬멧단 단원;01\n#1;ar\n#5;al\n#1;h\n#5;h\n#wait;1000"
2000205-42 = "1;헬멧단 간부;01;이봐, 방금 <면은 덜 익게, 국물은 진하게, 야채는 더블로, 마늘과 비계 많이 넣어서>를 국물 째로 완식한 건가?\n#1;em;[반응]"
2000205-43 = "3;사야;05;그런데? 무슨 문제라도 있는 것이냐?"
2000205-44 = "1;헬멧단 간부;01;그 국물 안에 들어있는 칼로리가 무섭지 않은 거냐! #n한 그릇만 먹어도 하루 권장 칼로리 수준을 아득히 뛰어넘을 텐데……!\n#1;hophop"
2000205-45 = "3;사야;00;후-후-후- 걱정 없는 것이다! 나님이 개발한 이 특제 다이어트 약만 있다면!\n#3;em;[음표]"
2000205-46 = "1;헬멧단 간부;01;특제 다이어트 약이라고?\n#1;stiff"
2000205-47 = "3;사야;03;응, 이것만 마시면 아무리 높은 칼로리의 음식을 먹어도 조금도 살이 찌지 않는 것이다!"
2000205-48 = "1;헬멧단 간부;01;오오…… 그 약을 우리에게 팔지 않겠나? 돈은 얼마라도 내겠어!\n#1;em;[!]"
2000205-49 = "3;사야;01;돈은 필요 없어. 대신 약을 먹고 얼마나 효능이 좋았는지 나중에 직접 알려주는 것이다!"
2000205-50 = "1;헬멧단 간부;01;정말 고맙군. 그대는 우리의 은인이다!\n#1;greeting\n#1;em;[반짝]"
2000205-51 = "5;헬멧단 단원;01;이 약만 있으면 돼지 비계도, 마카롱도, 원하는 만큼 먹을 수 있어!\n#5;hophop"
2000205-52 = "1;헬멧단 간부;01;정말 기대되는 걸……"
2000205-53 = "3;사야;01\n#3;h\n1;헬멧단 간부;01\n5;헬멧단 단원;01\n#1;d\n#5;d\n#1;h\n#5;h\n#wait;500"
2000205-54 = "3;사야;01\n#3;h"
2000205-55 = "#wait;1000"
2000205-56 = "3;사야;00;후-후-후- 그러게 말이야. 정말 기대가 되는 것이다.\n#3;closeup\n#3;em;[...]\n#3;a"
2000205-57 = "#all;hide"
2000205-58 = "#place;사야의 연구실"
2000205-59 = "3;사야;01\n#3;em;[...]\n#3;h\n#3;a\n#wait;1500"
2000205-60 = "3;사야;05\n#wait;1500\n#3;h"
2000205-61 = "3;사야;04\n#3;shake\n#bgshake\n#wait;1500\n#3;h"
2000205-62 = "#wait;1000"
2000205-63 = "3;사야;04\n5;헬멧단 단원;01\n4;헬멧단 간부;01\n#5;al\n#4;al\n#3;m1\n#wait;1000\n#3;h\n#4;h\n#5;h"
2000205-64 = "5;헬멧단 단원;01\n4;헬멧단 간부;01;헉, 헉…… 드, 드디어 찾았다. 이, 이 사기꾼……\n#4;em;[반응]"
2000205-65 = "4;헬멧단 간부;01\n5;헬멧단 단원;01;우, 우리에게 엉터리 약을 주다니……!\n#5;stiff"
2000205-66 = "3;사야;04;어라? 다이어트 효과가 별로였던 것이냐? 더 센 약을 줄 것 그랬나?\n#3;em;[땀]"
2000205-67 = "5;헬멧단 단원;01\n4;헬멧단 간부;01;아니야! 그 반대다!\n#4;hophop\n#4;em;[빠직]"
2000205-68 = "4;헬멧단 간부;01\n5;헬멧단 단원;01;무얼 먹어도 금세 소화가 되어버리는 바람에…… #n아무리 먹어도 먹어도 배가 부르질 않아……"
2000205-69 = "4;헬멧단 간부;01\n5;헬멧단 단원;01;이대로 가다가는 굶어죽을지도 몰라……\n#5;stiff"
2000205-70 = "3;사야;02;그래도 다이어트 효과는 확실하잖아? #n모로 가도 서울만 가면 그만인 것이다. 하-하-하!\n#3;em;[재잘]"
2000205-71 = "5;헬멧단 단원;01;이 녀석, 가만두지 않겠다……!\n#5;em;[빠직]"
2000205-72 = "5;헬멧단 단원;01\n4;헬멧단 간부;01;안 돼…… 힘이 빠져서…… 서 있기도 어려워……\n#4;shake"
2000205-73 = "5;헬멧단 단원;01\n4;헬멧단 간부;01\n#4;falldownL\n#5;falldownR\n#4;h\n#5;h\n#wait;1500"
2000205-74 = "3;사야;04\n#4;hide\n#5;hide\n#bgshake\n#wait;1500"
2000205-75 = "3;사야;05\n#3;m3\n#wait;1500"
2000205-76 = "3;사야;01;흐음…… 다음 번에는 물만 마셔도 살이 찌는 약을 팔아볼까?\n#3;em;[음표]"

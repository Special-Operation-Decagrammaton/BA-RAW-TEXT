[translation]
2000205-1 = "Diet Medicine"
2000205-2 = "Black Tortoise Promenade Street"
2000205-3 = "I'm glad you got here safely."
2000205-4 = "Heh heh! As you should know, this is the Black Tortoise Promenade of Shanhaijing. It's famous for its delicacies!"
2000205-5 = "I hear they run street stalls and that the Student Council have a secret feud going on with the execs... There are always rumors swirling, but it doesn't make the food any less tasty!"
2000205-6 = "It might not be enough to make up for my screwup, but I'm gonna take you to one of the best restaurants in town today!"
2000205-7 = "You still have some of Nezusuke's fur on your face, you know... Heh."
2000205-8 = "Sorry, I know I shouldn't laugh...but it's just so funny! Bahahaha!"
2000205-9 = "Phew... Don't worry, Sensei. The elixir will wear off before too long again. The fur should fall out in about a month or so."
2000205-10 = "Now, let's go inside."
2000205-13 = "Noodle Restaurant"
2000205-15 = "Welcome! How can I help you?"
2000205-16 = "The usual. Two bowls of al dente noodles with thick broth, double veggies, and extra garlic and fat, please!"
2000205-17 = "Coming right up! Two bowls of al dente noodles with thick broth, double veggies, extra garlic, and extra fat!"
2000205-19 = "*rumble* *rumble*"
2000205-20 = "D-Did you hear that, Captain? That little kid ordered something like THAT?"
2000205-21 = "Well, well. I didn't think I'd hear a schoolgirl like her order al dente noodles with thick broth, double veggies, extra garlic, and extra fat."
2000205-24 = "Yay! I'm so excited."
2000205-25 = "[s] \"Noodles and thick broth with...what?\""
2000205-26 = "Did you already forget? I ordered the al dente noodles with thick broth, double veggies, and extra garlic and fat. Trust me—it'll be delicious."
2000205-27 = "Don't think I can finish them? Just you watch! Anything is possible if you put your mind to it."
2000205-28 = "Girls her age usually counts their calories, but she ordered extra fat... How can she have that kind of figure when eating like that?"
2000205-29 = "Good question. There's no way she'll finish those bowls."
2000205-30 = "Here's your order. Two bowls of al dente noodles with thick broth, double veggies, and extra garlic and fat."
2000205-31 = "Finally! Thank you so much!"
2000205-33 = "Now that was delicious!"
2000205-36 = "Did you see that, Captain? That little girl finished all of it. She even slurped down the broth!"
2000205-37 = "How can a girl that size finish off a bowl of al dente noodles with thick broth, double veggies, extra garlic, and extra fat? Her metabolism must be off the charts..."
2000205-42 = "Hey, you. Did you just finish two bowls of al dente noodles with thick broth, double veggies, extra garlic, and extra fat?"
2000205-43 = "Yeah? Is there a problem?"
2000205-44 = "Aren't you worried about the calories? Just one bowl goes way over the daily recommended amount!"
2000205-45 = "Hahaha! So? That means nothing with my custom-made dietary supplement!"
2000205-46 = "You make your own dietary supplement?"
2000205-47 = "Yup! Just take one of these and you won't gain a single kilogram, even after eating super fatty foods!"
2000205-48 = "Wow...is it for sale? I'll pay whatever you want!"
2000205-49 = "Keep your money. Take it, and let me know if it works for you."
2000205-50 = "Thanks so much! You're a lifesaver!"
2000205-51 = "As long as we have this, we can have all the fatty foods or macarons we want!"
2000205-52 = "I can't wait to try it..."
2000205-56 = "Hahaha! Me neither. I look forward to the results."
2000205-58 = "Saya's Research Lab"
2000205-64 = "*pant* There you are...you con artist!"
2000205-65 = "Who do you think you are peddling this poison off on us?!"
2000205-66 = "Oh? Did it not work? Maybe I should have given you something more potent..."
2000205-67 = "No! It works too well!"
2000205-68 = "We immediately digest anything we eat... It doesn't matter how much we consume, we're never full... "
2000205-69 = "We're going to starve to death at this rate..."

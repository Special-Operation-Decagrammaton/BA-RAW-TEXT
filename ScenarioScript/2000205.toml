[translation]
2000205-1 = "減肥藥"
2000205-2 = "玄武商會街道"
2000205-3 = "沒有迷路順利到達了呢。"
2000205-4 = "哼—哼—哼，我想老師應該也知道，這裡就是那個以山珍海味有名的，山海經的玄武商會！"
2000205-5 = "圍繞著路邊攤的營運學生會和營運團隊在暗鬥之類的，#n雖然是有各種有趣傳言的地方，不過只有味道是不會錯的地方！"
2000205-6 = "雖然不知道可不可以作為上次失誤的賠償，#n今天特別，介紹給你我在這裡發現的美味的店家！"
2000205-7 = "話說老師……臉上還留著像根津助一樣的胎毛呢。科科……"
2000205-8 = "抱，抱歉，老師。就算知道不能笑，因為太有趣……唔哈哈！"
2000205-9 = "噗科科……不用擔心，老師。那個靈藥的效果不長久。#n大概，一個月之後就會掉乾淨了。"
2000205-10 = "那麼，進去店裡看看吧。"
2000205-13 = "拉麵店"
2000205-15 = "歡迎光臨，請問要點什麼？"
2000205-16 = "老樣子，#n「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」兩份！"
2000205-17 = "好的，收到點單了。#n「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」兩份！"
2000205-19 = "（騷動）"
2000205-20 = "隊，隊長，剛才的聽見了嗎？那個小鬼，以「那個呼叫」點單了哦。"
2000205-21 = "應該沒有聽錯吧……？沒想到這裡會有點「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」的女高中生……"
2000205-24 = "呵呵，已經迫不急待了。"
2000205-25 = "[s]「麵偏硬、湯……什麼來著？」"
2000205-26 = "老師記憶力真差啊。#n「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」。#n這是我特製的點單，一定很好吃才對～"
2000205-27 = "是能吃完的量嗎？#n當然！因為我什麼都做得到啊！"
2000205-28 = "那個年紀的女學生的話，光是追加油就會在意熱量了才對……#n吃了那個熱量炸彈不可能還能維持那個纖瘦的身材！"
2000205-29 = "沒錯，雖然說了什麼「老樣子」，不過肯定連一半也吃不完。"
2000205-30 = "久等了，#n這裡是「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」，兩份。"
2000205-31 = "終於來了！我開動了～！"
2000205-33 = "我吃飽了！"
2000205-36 = "看到了嗎隊長！#n那個小鬼一瞬間就……連湯也喝乾淨了。"
2000205-37 = "明明身體那麼小，竟然能把「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」一瞬間就夷平！真恐怖……"
2000205-42 = "吶啊，妳剛才該不會把「麵偏硬、湯濃、蔬菜雙倍、大蒜和油加量」連湯一起全都吃完了吧？"
2000205-43 = "是沒錯？有什麼問題嗎？"
2000205-44 = "妳不怕那個湯裡的熱量嗎！？#n明明光是一碗，就遠遠超過一天需要攝取的熱量了……！"
2000205-45 = "哼—哼—哼—，不用擔心！只要有我開發的這個特製減肥藥的話！"
2000205-46 = "特製減肥藥？"
2000205-47 = "沒錯，只要喝了這個不管吃了熱量多高的食物，都完全不會胖！"
2000205-48 = "哦哦……那，那個藥，可以賣給我們嗎？不管多少錢都會付！"
2000205-49 = "不用錢。相對的，我想要妳們告訴我喝了藥之後有多久的效果！"
2000205-50 = "那真是太感激了，欠妳人情！"
2000205-51 = "只要有這個藥的話豬的背脂和馬卡龍，就可以盡情的吃了！"
2000205-52 = "真的好期待啊……"
2000205-56 = "哼—哼—哼—，就是說呢。真的是，很期待呢。"
2000205-58 = "沙耶的研究室"
2000205-64 = "哈啊，哈啊……終，終於找到了。妳，妳這個詐欺師……"
2000205-65 = "竟，竟敢給我們亂七八糟的藥啊……！"
2000205-66 = "啊咧？減肥的效果不怎麼樣嗎？給妳們更強的藥比較好嗎？"
2000205-67 = "不是！正相反！"
2000205-68 = "因為不管吃什麼都馬上被消化掉……#n所以不管怎麼吃肚子都不會飽……！"
2000205-69 = "這樣下去可能會餓死……"
2000205-70 = "但是減肥的效果是確實的吧？#n結果不會胖的話就算成功。哈—哈—哈！"
2000205-71 = "妳這個，不會放過妳的……！"
2000205-72 = "不行……沒力氣了……光是站著，就……"
2000205-76 = "嗯……下次，做個只是喝水就能變胖的藥來賣看看吧？"

[translation]
31140-1 = "Episode 14;Justice Task Force Vice President Part 1"
31140-2 = "The girls continued to study until evening."
31140-3 = "Question, Koharu."
31140-4 = "Wha...? Why me?"
31140-5 = "Because we're studying the same material. I have a question about this problem. "
31140-6 = "O-Okay. "
31140-7 = "Wait. I do know this one!"
31140-8 = "For this...you need to draw an auxiliary line from the bottom at a right angle. Like this!"
31140-9 = "Okay, so this triangle and this triangle are proportional to each other, right? Look here, see?"
31140-10 = "Oh. Now I get it."
31140-11 = "Thank you for the help. I'd expect nothing less of one of the Justice Task Force's elite."
31140-12 = "...?!"
31140-13 = "R-Right! I'm glad you agree."
31140-14 = "Feel free to ask for my help anytime you come across something you don't know. I'd be happy to help you."
31140-15 = "Sure. I owe you."
31140-19 = "Well, well."
31140-20 = "They're getting along nicely, aren't they? It must be because they grew so close after getting to know each other intimately. ♥"
31140-21 = "Wh-What did you just say?! That has nothing to do with it!"
31140-22 = "I didn't mean to seem biased. I can help you wash as well, Hanako."
31140-23 = "U-Um..."
31140-27 = "Oh. There was another question I wanted to ask you, Koharu."
31140-29 = "Is it this one? This problem is a little..."
31140-30 = "Do you not know the solution either?"
31140-31 = "H-Huh?! No! But I'm sure I saw this in the reference book."
31140-32 = "Wait here."
31140-33 = "*rummages* Where did it go? I know it's in here somewhere... "
31140-37 = "Here!"
31140-44 = "This textbook has the answer?"
31140-45 = "Yeah, this is the one!"
31140-46 = "Huh?"
31140-47 = "That's some tasty-looking smut you're hauling around."
31140-52 = "Aaahhh! Wh-Why is that here?!"
31140-53 = "I didn't know you read this kind of stuff. No use hiding it, little missy. It says \"Adult Only\" right there on the cover."
31140-54 = "Th-This isn't what it looks like! It's not mine! It's not mine!!!"
31140-58 = "Who do you think you're fooling? I know erotica when I see it—especially the kind that's a little...harder than usual. "
31140-59 = "This is the good stuff! The kind you can't find at Trinity—rare throughout all of Kivotos! The kind of steamy, raunchy, titillating goodness that leaves you screaming and throwing your rationality right out the window!"
31140-60 = "Why do you of all people have something like this in your possession? Surely it's against school rules, yes?"
31140-61 = "N-No... I mean yes! I told you it's d-definitely not mine..."
31140-62 = "But it was in your bag, wasn't it? And you brought it allllll the way to boot camp. Seems like you couldn't leave home without it."
31140-63 = "Who would have guessed that the stubborn and prudish Koharu could be so naughty?"
31140-68 = "Actually, now that I think about it, I don't blame you."
31140-69 = "We are going to be at boot camp for quite a while. ♥"
31140-73 = "IT'S NOT LIKE THAT!!!"
31140-74 = "...?"
31140-75 = "Hanako... I think you've teased her enough."
31140-76 = "I may have gone a little too far. I was just so excited to have someone I could relate to."
31140-81 = "*sniffle* *sniffle*"
31140-83 = "..."
31140-84 = "So, Koharu..."
31140-85 = "You're saying you accidentally brought a book you confiscated while you were doing your Justice Task Force work? Is that right?"
31140-86 = "*sniffle* Yes. Managing confiscated goods is part of my duties."
31140-87 = "So that's what happened. I have heard rumors that the basement of the old library is filled with stacks of forbidden books. No doubt that some of it was confiscated by the Justice Task Force."
31140-88 = "Still, isn't this a conundrum? You could get in serious trouble for carrying this around now that you're a member of the Make-Up Work Club."
31140-89 = "*sniffle* It was an honest mistake. I forgot to turn it over..."
31140-90 = "Maybe you should return it before anyone notices it's missing."
31140-91 = "Can't you sneak back into the Justice Task Force headquarters?"
31140-92 = "Now?"
31140-93 = "[s] \"I'll go with you.\""
31140-94 = "Are you serious, Sensei?"
31140-95 = "That sounds like a wonderful idea. You're a lot less likely to get on Hasumi's bad side if Sensei's with you."
31140-96 = "Hey, Koharu. Try not to \"accidentally\" sneak away the sequel on your way back."
31140-101 = "I WON'T!"
31140-103 = "Koharu and I then left for the Justice Task Force club room."
31140-105 = "Next Episode;Justice Task Force Vice President Part 2"

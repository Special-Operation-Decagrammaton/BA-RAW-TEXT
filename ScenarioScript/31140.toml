[translation]
31140-1 = "ตอนที่ 14;รองหัวหน้าชมรมทวงความยุติธรรม 1"
31140-2 = "(หลังจากนั้นก็มีคาบเรียนอิสระจนถึงช่วงเย็น)"
31140-3 = "โคฮารุ ฉันมีคำถามน่ะ"
31140-4 = "หืม? ถามฉันเหรอ?!"
31140-5 = "ใช่ ก็เราเรียนเรื่องเดียวกันอยู่ไง โจทย์ข้อนี้น่ะ... "
31140-6 = "อะ...อื้อ"
31140-7 = "อ้อ...! ข้อนี้! ข้อนี้ฉันรู้!"
31140-8 = "ต้องทำแบบนี้ แล้วก็ลากเส้นทำมุม 90 องศากับฐานของสามเหลี่ยม!"
31140-9 = "ทีนี้รูปสามเหลี่ยมทั้งสองก็จะมีสัดส่วนเท่ากันแล้ว เห็นไหม?"
31140-10 = "อ่อ... แบบนี้เอง"
31140-11 = "เข้าใจแล้วล่ะ สมแล้วที่เป็นหัวกะทิจากชมรมทวงความยุติธรรม"
31140-12 = "...?!"
31140-13 = "อะแฮ่ม! เข้าใจโจทย์แล้วเนอะ?"
31140-14 = "ถ้าสงสัยตรงไหนอีกก็มาถามได้ตลอดนะ กับอาซึสะฉันจะอธิบายอย่างดีเลย"
31140-15 = "อื้ม ขอบใจนะ แล้วฉันจะตอบแทน"
31140-19 = "โอ๊ะ..."
31140-20 = "ดูเข้ากันดีจังเลยนะคะ การอาบน้ำด้วยกันมันดีอย่างนี้เอง ♡"
31140-21 = "พะ... พูดอะไรน่ะ? แล้วการอาบน้ำมันเกี่ยวอะไรด้วย!!"
31140-22 = "ฉันไม่ติดอะไรหรอกนะ ถ้าฮานาโกะอยากให้ช่วยอาบน้ำให้ก็บอกได้"
31140-23 = "อ่า... เอ่อ..."
31140-27 = "ขอเป็นหนี้บุญคุณอีกอย่างสิโคฮารุ"
31140-29 = "หืม...? ข้อนี้เหรอ...?"
31140-30 = "โคฮารุก็ไม่รู้วิธีทำโจทย์นี้เหรอ?"
31140-31 = "หะ... หืม?!  ไม่ใช่อย่างนั้นนะ! ข้อนี้เหมือนเห็นมาจากหนังสืออ้างอิงเลย..."
31140-32 = "ขะ... ขอเวลาหน่อยนะ"
31140-33 = "(ค้นของ) หนังสืออ้างอิง... ที่ฉันใส่กระเป๋าไว้... "
31140-37 = "นี่ไง!"
31140-44 = "นี่คือ... หนังสืออ้างอิงเหรอ?"
31140-45 = "อื้ม ใช่แล้ว"
31140-46 = "หืม...?"
31140-47 = "หนังสือแบบนั้นของพวกผู้ใหญ่สินะคะ"
31140-52 = "อ๊าาาาากก!! ทะ... ทำไมถึง?!"
31140-53 = "โคฮารุจัง มันคือหนังสือผู้ใหญ่ใช่ไหมคะ? จะปิดบังไปตอนนี้ก็ไม่มีประโยชน์แล้วล่ะค่ะ#nฉันเห็นแล้วว่ามีโลโก้ R18 อยู่บนปกด้วยค่ะ"
31140-54 = "มะ.. ไม่ใช่นะ! ดูผิดแล้ว!  ไม่ใช่อย่างนั้นนะ! ไม่ใช่อย่างที่คิดหรอก! ไม่ใช่เด็ดขาด!!"
31140-58 = "อย่าหลอกกันเลยค่ะ ก็เห็นอยู่ชัดๆ ว่าเป็นหนังสือติดเรท เรท 18+ HARD ไปเลย... "
31140-59 = "ระดับนี้มันหาได้ยากในทรีนิตี้... ไม่สิ หายากในคิโวทอสเลยนะคะ! แถมยังเต็มไปด้วยรูปที่ใส่น้อยชิ้น#nแล้วก็มีเสียงกรีดร้องดังกึกก้อง อ่านแล้วสติเตลิดไปหมดเลยนี่คะ!"
31140-60 = "ทำไมถึงมีหนังสือแบบนี้กับตัวล่ะคะ? แบบนี้น่าจะเป็นการละเมิดกฎของโรงเรียนนะ?"
31140-61 = "ปะ... เปล่านะ... คือว่า... มันไม่ใช่ของฉันนะ... คือว่า... ไม่ใช่ของฉัน..."
31140-62 = "แต่มันออกมาจากกระเป๋าของโคฮารุจังนี่คะ? ถ้าเอาติดตัวมาถึงแคมป์ฝึกฝนล่ะก็...#nแปลว่าเป็นของที่หวงแหนมากเลยไม่ใช่เหรอคะ?"
31140-63 = "ไม่อยากเชื่อเลยว่าโคฮารุจังที่สมบูรณ์แบบจะมีหนังสือติดเรทแบบนี้..."
31140-68 = "อ้อ... จริงด้วยค่ะ มาคิดๆ ดูแล้วมันก็คือของจำเป็นนะคะ"
31140-69 = "เตรียมเข้าแคมป์ฝึกฝนมาอย่างดีเลยนะคะโคฮารุจัง♡"
31140-73 = "ไม่ใช่น้าาาาาา!!"
31140-74 = "!!"
31140-75 = " อ่า... อ่า คือว่า... ฮานาโกะจัง... เลิกล้อได้แล้ว..."
31140-76 = "อุ๊ยตาย หรือฉันพูดแรงไป..."
31140-81 = "ฮือ..."
31140-83 = "…"
31140-84 = "เอ่อ... โคฮารุจัง"
31140-85 = "เอาของที่ยึดได้ระหว่างทำงานในชมรมทวงความยุติธรรมมาโดยไม่รู้ตัว... ใช่ไหมคะ?"
31140-86 = "อะ... อะ... อื้ม ฉันมีหน้าที่ดูแลของที่ยึดมาได้น่ะ..."
31140-87 = "นั่นสินะคะ มีข่าวลือว่าชั้นใต้ดินของห้องสมุดเต็มไปด้วยหนังสือต้องห้าม#nอย่างน้อยก็น่าจะมีหนังสือที่ชมรมทวงความยุติธรรมยึดมาได้บ้างสินะคะ"
31140-88 = "แต่นี่ก็เป็นเรื่องใหญ่นะคะ ตอนนี้โคฮารุจังมาสังกัดชมรมชั้นเรียนเสริมแล้ว#nถ้ามีหนังสือแบบนี้ติดตัวล่ะก็เป็นเรื่องแน่..."
31140-89 = "ฉะ... ฉันลืมเอาไปเก็บน่ะ..."
31140-90 = "หรือว่าเราต้องเอาไปคืนก่อนที่ทางนั้นจะรู้ว่ามีของที่ยึดมาหายไป..."
31140-91 = "แอบไปชมรมทวงความยุติธรรมแล้วก็เอาไปคืนก็ได้นี่คะ? "
31140-92 = "อะ... อืม..."
31140-93 = "[s] \"ไปกับครูก็ได้ โคฮารุ\""
31140-94 = "หืม? คะ... คุณครู?"
31140-95 = "อื้ม... นั่นสินะคะ ถ้ามีคุณครูไปด้วย ถึงจะโดนจับได้ขึ้นมาคุณฮาสุมิก็คงไม่กล้าดุแรง..."
31140-96 = "ถ้าไปแล้วช่วยหยิบเล่มถัดไปมาให้ด้วยได้ไหมคะโคฮารุจัง?"
31140-101 = "จะ... จะบ้ารึไง!! "
31140-103 = "(แล้วคุณครูกับโคฮารุก็มุ่งหน้าไปยังชมรมทวงความยุติธรรมของทรีนิตี้ด้วยกัน)"
31140-105 = "ตอนต่อไป;รองหัวหน้าชมรมทวงความยุติธรรม 2"

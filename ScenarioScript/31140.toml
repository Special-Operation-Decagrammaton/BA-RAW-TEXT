[translation]
31140-1 = "第14話;實現正義部的副部長（１）"
31140-2 = "（之後，到傍晚前是自主學習時間）"
31140-3 = "小春，我有個問題。"
31140-4 = "咦？問，問我？"
31140-5 = "嗯，我們應該在學同一個地方才對。#n我想問的是這個問題……"
31140-6 = "唔，嗯……"
31140-7 = "……啊，這個我知道！"
31140-8 = "我記得是這樣……畫一條跟底邊呈直角的輔助線就行了！"
31140-9 = "這樣這兩個三角形的比例就會相等……對吧？"
31140-10 = "……原來如此，是這樣啊。"
31140-11 = "謝謝你幫忙。不愧是實現正義部的菁英。"
31140-12 = "……！？"
31140-13 = "嘿，嘿嘿！知道就好。"
31140-14 = "如果又有哪邊不懂的話，隨時可以問我沒關係。#n我可以特別教你。"
31140-15 = "嗯，謝謝，之後再拜託你了。"
31140-19 = "哎呀……"
31140-20 = "該說不愧有過裸體的交流嗎，氣氛真不錯呢♡"
31140-21 = "你，你在說什麼啊！？才不是那種關係！？"
31140-22 = "我其實不介意哦，如果花子需要幫忙洗澡的話就跟我說。"
31140-23 = "啊，啊嗚……"
31140-27 = "我還有一個題目想問你，小春。"
31140-29 = "嗯？這個問題是，那個……"
31140-30 = "是小春也不知道答案的題目嗎？"
31140-31 = "唔嗯，我記得好像有在參考書裡看過……"
31140-32 = "等，等我一下。"
31140-33 = "應該有放在包包裡才對……"
31140-37 = "找到了！"
31140-44 = "這是……參考書？"
31140-45 = "嗯，就是這本參考──"
31140-46 = "……咦？"
31140-47 = "是色色的書呢。"
31140-52 = "嗚哇啊啊啊啊！？為，為什麼！？"
31140-53 = "小春醬，那是色色的書吧？#n藏起來也沒用，上面清楚地寫著「R18」唷？"
31140-54 = "不，不是！是你看錯了！總之不是啦！絕對不是！！"
31140-58 = "請別想騙過我的眼睛，那毫無疑問是色色的書！#n而且還是相當硬派的R18……"
31140-59 = "就算在三一，不，就算在奇普托斯也難得一見的那種……！#n肯定是肉色交纏、嬌喘交錯、會讓人失去理性的內容對吧！"
31140-60 = "你為什麼會有那樣的書呢？#n校規應該明確禁止了才對呀……？"
31140-61 = "不，不是，那個……這，這其實不是我的……"
31140-62 = "不過那確實是從小春醬的包包裡拿出來的吧？#n而且竟然還帶來合宿處……是你珍藏的寶貝嗎？"
31140-63 = "那麼認真的小春醬居然會帶著色色的書……"
31140-68 = "……原來如此，仔細想想那確實能算是必需品呢。"
31140-69 = "你準備的真周到，小春醬♡"
31140-73 = "真的不是啦！！！！！"
31140-74 = "？"
31140-75 = "啊，啊嗚嗚……花子醬……請別再欺負小春醬了……"
31140-76 = "哎呀呀，好像說的太過頭了……"
31140-81 = "嗚嗚嗚嗚……"
31140-83 = "……"
31140-84 = "那個，小春醬……"
31140-85 = "所以你是不小心把實現正義部活動中扣押的物品帶過來了……沒錯吧？"
31140-86 = "嗚嗚嗚……嗯……因為我負責管理扣押的東西……"
31140-87 = "原來如此。我聽說三一古書館的地下似乎堆積了許多禁書……#n實現正義部扣押的數量想必也不在少數吧。"
31140-88 = "不過這下糟糕了呢。#n小春醬現在是補課部的成員，要是繼續拿著這種東西可能會引發麻煩……"
31140-89 = "嗚嗚……都忘記我還帶著這種東西了……"
31140-90 = "我認為在被其他人發現扣押品數量有誤之前，盡早把那本書還回去比較好……"
31140-91 = "只要悄悄地到實現正義部，把它放回去應該就沒問題了吧？"
31140-92 = "咦，是嗎？"
31140-93 = "[s]「我也陪你一起去吧，小春。」"
31140-94 = "嗯？老師也一起……？"
31140-95 = "……說的也是。#n如果老師也在的話，就算萬一被蓮實同學發現，應該也不會太生氣才對……"
31140-96 = "話說小春醬，可以幫我把下一集帶來嗎？"
31140-101 = "才，才不要咧！！"
31140-103 = "（於是便和小春一起前往實現正義部的部室）"
31140-105 = "下一話;實現正義部的副部長（２）"

[translation]
31140-1 = "第14話;正義実現委員会の副委員長（１）"
31140-2 = "その後、夜遅くまで勉強は続いた。"
31140-3 = "コハル、質問。"
31140-4 = "うん、え？私？私に！？"
31140-5 = "そう、コハルに。今同じところを勉強しているはずだ。この問題なんだけど……"
31140-6 = "う、うん……。"
31140-7 = "……あ、これ知ってる！"
31140-8 = "これはたしかこうやって、下のところと90度になるように、線を引いて……"
31140-9 = "そうすると、この三角形とこの三角形が一緒。分かった？"
31140-10 = "……なるほど、そういうことか。"
31140-11 = "助かった。これは確かに、正義実現委員会のエリートというのも頷ける。"
31140-12 = "……！？"
31140-13 = "そ、そうよ！エリートだもの！！"
31140-14 = "……も、もし何かまた分からなかったら、私に聞いても良いから。アズサはその、特別に。"
31140-15 = "ありがとう、助かる。"
31140-19 = "あらあら……。"
31140-20 = "さすが裸の付き合いをしただけはあると言いますか、もう深いところまで入った仲なのですね……♡"
31140-21 = "ちょっ、何言ってんの！？そういうアレじゃないから！？"
31140-22 = "うん？ハナコも身体を洗ってほしいのか？"
31140-23 = "あ、あの、うぅ……。"
31140-27 = "あ、コハル。もう一つ聞きたい。"
31140-29 = "ん？この問題は、えっと……"
31140-30 = "コハルも知らない問題か？"
31140-31 = "うーんと、これ、たしか参考書で見たような……。"
31140-32 = "ちょ、ちょっと待って。"
31140-33 = "確か持ってきてたはず……。"
31140-37 = "んしょっ。"
31140-44 = "この参考書に載ってるのか？"
31140-45 = "うん、この参考――"
31140-46 = "……あれ？"
31140-47 = "エッチな本ですねぇ。"
31140-52 = "うわあぁぁぁっ！？な、なんでっ！？"
31140-53 = "コハルちゃん、それエッチな本ですよね？まあある意味参考書かもしれませんが。隠しても無駄です、「R18」ってバッチリ書いてありましたよ？"
31140-54 = "ち、違う！見間違い！とにかく違うから！絶対に違う！！"
31140-58 = "私の目は誤魔化せませんよ、確実にアレなことをする本でした。それも結構ハードな……"
31140-59 = "トリニティでも、いえ、キヴォトスでもなかなか見ることができないレベルの内容とお見受けしました。きっと肌と肌とがこすれ合い、敏感な部分を擦り合わせ、嬌声が飛び交い理性が飛び去るような……！"
31140-60 = "どうしてそのような本を持ってるのですか？確か校則でも禁止されていたと思いますが……？"
31140-61 = "い、いや、そのっ……こ、これはほんとに私のじゃなくて、えっと……。"
31140-62 = "でもそれ、コハルちゃんのカバンから出てきましたよね？それに合宿所まで持ってくるなんて……お気に入りなのですか？"
31140-63 = "そうですか、あの真面目なコハルちゃんが、エッチな本を……"
31140-68 = "……いえ。なるほど、そうですね。考えてみたらそんなに変なことでもありませんね？"
31140-69 = "予行演習もバッチリ……つまり、合宿のために必要なものなんですよね、コハルちゃん♡"
31140-73 = "こっ、これは違うんだってばああぁぁぁぁっ！！"
31140-74 = "？"
31140-75 = "そ、その、ハナコちゃん……その辺りで……。"
31140-76 = "やり過ぎてしまったかもしれませんね、本当にごめんなさい……お話が合うかと思ったのですが……。"
31140-81 = "うぅ、うぅぅっ……。"
31140-83 = "（……すん、すん）"
31140-84 = "えっと、コハルちゃん……。"
31140-85 = "その、正義実現委員会としての活動中に差し押さえた品を、つい入れたままにしてしまった……とか、そういう感じなんですよね？"
31140-86 = "……うん。私、押収品の管理とか、してたから……これは、本当にその時のやつで……。"
31140-87 = "なるほど。そういえば、トリニティの古書館の地下には何やら、禁書がたくさん積まれているという噂も聞きましたし……正義実現委員会がそういったものも含めて、色々と差し押さえているとしても何も不思議ではありませんね。"
31140-88 = "うーん……であれば、押収品ってできるだけ早く返してしまった方が良い気がするのですが、どうしましょう？"
31140-89 = "た、確かに……ずっと忘れてたけど……。"
31140-90 = "数が合わなくて騒ぎになる前に、返しに行った方が良いかもしれませんね……。"
31140-91 = "今のうちにこっそり行って、バレないように正義実現委員会のところに戻してくれば大丈夫じゃないですか？"
31140-92 = "え、今？"
31140-93 = "[s] \"それならコハル、一緒に行く？\""
31140-94 = "せ、先生が……？"
31140-95 = "……そうですね。先生が一緒であれば、万が一ハスミさん辺りにバレたとしてもそこまで怒られないでしょうし……。"
31140-96 = "ところでコハルちゃん、それはそれとして、もし他にもお勧めがあればぜひ♡"
31140-101 = "う、うるさいっ、バカっ！！"
31140-103 = "そしてコハルと一緒に、正義実現委員会の部室へと向かうことになった。"
31140-105 = "次回;正義実現委員会の副委員長（２）"

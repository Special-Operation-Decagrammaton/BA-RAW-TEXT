[translation]
1010703-1 = "Secretary's Interview"
1010703-2 = "Not long after getting Chiaki's message..."
1010703-7 = "Yahoo! Hello, Sensei!"
1010703-8 = "I brought my subscription gift, like I mentioned!"
1010703-9 = "How is it? Super-super-super-exciting, right?"
1010703-10 = "[s] \"Hellooo, Chiaki...\""
1010703-11 = "Huh?! How come you look so tired, Sensei?"
1010703-12 = "You're not sick or anything, are you?"
1010703-16 = "Did you...stay up all night doing work, maybe?"
1010703-17 = "In that case...great!"
1010703-18 = "[s] \"H-Huh?\""
1010703-19 = "The thing is... Tada! \"Weekly Pandemonium Society\", Subscription Gift for Sensei!"
1010703-20 = "Take a look inside the envelope. You'll see!"
1010703-21 = "Yup! Here you go, open it!"
1010703-22 = "[s] Open the envelope."
1010703-24 = "[ns] \"Isn't this...?\""
1010703-25 = "Yup! It's a free dessert buffet voucher. For two!"
1010703-26 = "Nothing feels better than sweet dessert when you're tired."
1010703-27 = "I know when I'm out of energy from editing \"Weekly Pandemonium Society,\" I always go out for sweets!"
1010703-28 = "So it looks like the perfect gift for you right now!"
1010703-29 = "[s] \"Chiaki... I'm so moved!\""
1010703-30 = "Heehee, don't mention it."
1010703-31 = "Work is important, but so is getting enough rest."
1010703-32 = "So...why don't you use it now?"
1010703-33 = "[s] \"But I still have work to do...\""
1010703-34 = "Well, you'll have an easier time with it if you have more energy, right?"
1010703-35 = "\"One step back, two steps forward,\" right?"
1010703-36 = "Lose yourself in those super-super-super-sweet desserts, just for a little while!"
1010703-37 = "[s] \"Sh-Should I?\""
1010703-38 = "Of course!"
1010703-39 = "Follow me. I'll guide you!"
1010703-41 = "Whoa! This place is just full of that sweet scent! Makes your mouth water, doesn't it, Sensei?"
1010703-42 = "I want to hurry up and dig in!"
1010703-43 = "Welcome! Table for two?"
1010703-44 = "Yuuup!"
1010703-46 = "[ns] \"Here's the voucher.\""
1010703-47 = "Got it!"
1010703-48 = "I'll take you to your seats."
1010703-51 = "...And that's it for the explanation. Any questions?"
1010703-52 = "No, we're goo— Ah!"
1010703-53 = "Could I do a report on this place and write an article?"
1010703-54 = "It's got such a cozy atmosphere, and there's all different kinds of desserts. It's totally my kind of place!"
1010703-55 = "It could even help with advertisement, if this place gets a spot in \"Weekly Pandemonium Society\"!"
1010703-56 = "Ah, if that's the case, please feel free!"
1010703-57 = "Yay! Great! Thank you!"
1010703-58 = "Okay then, enjoy your dessert."
1010703-62 = "Now I'm fully prepared for the next issue's feature article!"
1010703-63 = "And to think it came out of a dessert cafe I happened to visit. That was a brilliant moment of instinct from a secretary-who's-also-a-reporter-editor-publisher!"
1010703-64 = "It says they have over 100 different types of desserts here! If I write a review for each one..."
1010703-65 = "...\"Weekly Pandemonium Society\" could become a bestseller!"
1010703-66 = "[s] \"Do you think you can handle all 100 desserts in one sitting?\""
1010703-70 = "Huh?! I didn't think of that! My limit is like 5 macarons!"
1010703-71 = "Ugh... Well, that's not going to work out..."
1010703-72 = "Ahaha... Um, Sensei... I hate to ask this of you, since it's your subscription gift, but..."
1010703-73 = "[s1] \"I'll help you.\"\n[s2] \"I just have to taste everything and tell you what I think, right?\""
1010703-76 = "Ughh, yes, thank you..."
1010703-77 = "Let's separate them out, so they don't overlap..."
1010703-80 = "...Okay, next, let's take a photo of this mango tart, and..."
1010703-84 = "Say aah, Sensei!"
1010703-85 = "[ns3] Open your mouth and say aah.\n[ns4] Take the tart from Chiaki by hand."
1010703-88 = "Yup, great job!"
1010703-89 = "Now, tell me about that tart..."
1010703-96 = "How is it? How is it?"
1010703-97 = "[s] \"Um... It's sweet and...\""
1010703-98 = "And?"
1010703-99 = "[s] \"Sweet and delicious?\""
1010703-100 = "That's pretty much the same thing you said about that cherry cookie, though!"
1010703-101 = "We're only on our tenth one..."
1010703-102 = "Hmm, did we bite off more than we can chew here...?"
1010703-103 = "[s] \"It is kind of physically demanding...\""
1010703-104 = "Aw, but I want to do a big feature about this..."
1010703-108 = "...Aha!"
1010703-109 = "We can ask the other customers to help, then!"
1010703-110 = "Lots of people would want to taste these other desserts!"
1010703-111 = "[s] \"That's one way to do it.\""
1010703-115 = "Look, there's a party of two, just like us!"
1010703-120 = "[ns] \"Are we sure this is a good idea?\""
1010703-123 = "Well, we want to cover as many desserts as we can, right?"
1010703-124 = "I'm sure if I ask, they won't mind helping!"
1010703-129 = "Hello!"
1010703-130 = "Huh?"
1010703-131 = "I'm doing a report for \"Weekly Pandemonium Society.\" Can I ask you a few questions?"
1010703-132 = "Can't you see we're eating?"
1010703-133 = "Yes! I can! Which is why I'm asking YOU!"
1010703-134 = "H-Huh?"
1010703-135 = "Would you mind telling me what this parfait tastes like?"
1010703-136 = "W-Well, it's sweet, obviously."
1010703-137 = "Sweet! Great!"
1010703-138 = "Is it sweet like chocolate? Or sweet like pineapple?"
1010703-139 = "H-Huh? Are those two different?"
1010703-140 = "Of course they are! Chocolate melts in your mouth. Pineapple POPS in your mouth!"
1010703-141 = "Um, maybe not the word I'd use, but sure, I get it."
1010703-142 = "Of course you do! 'Cause you know your tastes!"
1010703-143 = "Now, let's talk about that cookie."
1010703-144 = "Do you want a piece?"
1010703-145 = "Absolutely! I'll just take a little bite and..."
1010703-150 = "Augh! It's spicy!"
1010703-151 = "Ahaha! Yeah, they put hot sauce in those. It got us real bad the first time too."
1010703-152 = "Here, you want some milk?"
1010703-156 = "Ugh... Well...that was a fresh experience! Something to write about, anyway!"
1010703-157 = "You should try these macarons. They're really good."
1010703-161 = "[ns] \"(She made friends in no time...)\""
1010703-167 = "...Wow, time flies! Too bad we couldn't get through all 100 today!"
1010703-168 = "But my stomach is totally full! I don't think I've ever had this many desserts before..."
1010703-169 = "Well, this is going to be a great story, thanks to you and everybody else!"
1010703-170 = "I wouldn't have even gotten through a quarter of those snacks on my own!"
1010703-171 = "Now, I can make \"Weekly Pandemonium Society\" even sweeter!"
1010703-172 = "And above all, it's always nice to make new friends!"
1010703-173 = "[s] \"You mean the students who helped with your taste tests?\""
1010703-174 = "Yup!"
1010703-175 = "They both said they'd subscribe!"
1010703-176 = "And I took photos with them too!"
1010703-177 = "If you look at the camera here..."
1010703-181 = "H-Huh?"
1010703-182 = "[s] \"The photos are all...blurry.\""
1010703-183 = "Y-Yeah, you're right... Not just the photos I took with them, but even the photos of the desserts I was going to put up on the cover...!"
1010703-184 = "What should I do...?"
1010703-185 = "...Well, it is what it is!"
1010703-186 = "Guess I'm just going to have to start all over!"
1010703-187 = "[s] \"S-Start over?!\""
1010703-188 = "That's right! For \"Weekly Pandemonium Society\"! For eye-popping journalism!"
1010703-189 = "Thankfully I have a few more subscription gift vouchers, so no problem there!"
1010703-190 = "I'll be on my way, then!"

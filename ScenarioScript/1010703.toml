[translation]
1010703-1 = "การเก็บข้อมูลของเลขา"
1010703-2 = "(ไม่นานหลังจากได้รับข้อความจากจิอากิ...)"
1010703-7 = "ยะฮู้ว! สบายดีมั้ยคะคุณครู~!"
1010703-8 = "ฉันเอาของขวัญสมนาคุณมาให้ตามที่เคยบอกไว้ค่ะ!"
1010703-9 = "เป็นยังไงคะ? ตื่นเต้นมากเลยใช่มั้ยคะ~?"
1010703-10 = "[s] \"สวัส... ดี... จิอากิ...\""
1010703-11 = "เอ๋?! ทำไมหน้าตาดูเหนื่อยล้าขนาดนี้ล่ะคะ?!"
1010703-12 = "ไม่สบายตรงไหนหรือเปล่าคะ?"
1010703-16 = "ที่เป็นอย่างนี้เพราะมีงานเอกสารมากเกินไปงั้นเหรอคะ...? เมื่อคืนก็ไม่ได้นอนด้วย?"
1010703-17 = "ถ้าอย่างนั้นก็... ถือว่าดีเลยค่ะ!"
1010703-18 = "[s] \"หะ... หืม?\""
1010703-19 = "นั่นก็เพราะฉันมากับ~ แต่นแต๊น! ของขวัญสมนาคุณจากการสมัครรับ#n<แพนเดโมเนียม โซไซตี้รายสัปดาห์> ของคุณครู!"
1010703-20 = "เปิดซองดูก็จะรู้ค่ะ!"
1010703-21 = "ค่ะ! เอาละ เปิดดูด้วยตัวเองได้เลยค่ะ!"
1010703-22 = "[s] เปิดซองที่จิอากิให้"
1010703-24 = "[ns] \"นี่มัน...?\""
1010703-25 = "ใช่แล้วค่ะ! ของขวัญที่ว่าก็คือ บัตรกำนัลบุฟเฟต์ของหวานสำหรับ 2 ท่าน!"
1010703-26 = "ตอนเราเหนื่อยๆ ก็ต้องกินของหวานนี่ละค่ะ~"
1010703-27 = "เวลาฉันทำเล่ม <แพนเดโมเนียม โซไซตี้รายสัปดาห์> แล้วรู้สึกว่าเหนื่อย ฉันก็กินอะไรหวานๆ ตลอดค่ะ!"
1010703-28 = "นี่น่าจะเป็นของขวัญที่เหมาะกับคุณครูในตอนนี้เลยนะคะ!"
1010703-29 = "[s] \"จิอากิ... ขอบใจนะ ครูซึ้งใจมากเลย!\""
1010703-30 = "ฮิฮิ ขอบจงขอบใจอะไรกันล่ะคะ~"
1010703-31 = "ถึงงานจะสำคัญ แต่การพักผ่อนก็สำคัญไม่แพ้กันค่ะ..."
1010703-32 = "เพราะงั้นคุณครูก็ไปใช้บัตรกำนัลตอนนี้เลยมั้ยคะ?"
1010703-33 = "[s] \"แต่ว่าครูยังมีงานเหลืออยู่...\""
1010703-34 = "ไม่เอาน่า เราต้องพักผ่อนและเติมพลังไปด้วย จะได้ทำงานชิ้นต่อไปได้อย่างราบรื่นไม่ใช่เหรอคะ~?"
1010703-35 = "ถอยหลังหนึ่งก้าว เพื่อเดินหน้าอีกสองก้าวไงคะ!"
1010703-36 = "ไปฝากร่างกายที่เหนื่อยล้าให้ขนมหวานๆ ดูแลกันเถอะค่ะ~!"
1010703-37 = "[s] \"อะ... เอาอย่างนั้นเหรอ?\""
1010703-38 = "เอาอย่างนั้นละค่ะ~!"
1010703-39 = "เอาละๆ งั้นฉันจะพาไปนะคะ~!"
1010703-41 = "ว้าว! กลิ่นหอมหวานเตะจมูกมากเลย! น้ำลายไหลเลยใช่มั้ยคะคุณครู?"
1010703-42 = "อยากรีบชิมแล้วสิ~!"
1010703-43 = "เชิญครับ! สองท่านใช่มั้ยครับ?"
1010703-44 = "ค่า~!"
1010703-46 = "[ns] \"ใช้บัตรกำนัลนี้ได้มั้ย?\""
1010703-47 = "ครับ ใช้ได้เลยครับ!"
1010703-48 = "ผมจะพาไปนั่งที่โต๊ะทางนี้นะครับ"
1010703-51 = "และทั้งหมดที่ว่าไปก็คือคำแนะนำการใช้บัตรกำนัลครับ มีข้อสงสัยอะไรเพิ่มเติมมั้ยครับ...?"
1010703-52 = "ไม่มีค่ะ ไม่... อ๊ะ!"
1010703-53 = "ไม่ทราบว่าฉันจะเก็บข้อมูลของร้านนี้ไปทำข่าวได้มั้ยคะ?"
1010703-54 = "ที่นี่บรรยากาศก็ดี แถมของหวานก็มีหลายประเภทอีก ถูกใจฉันสุดๆ เลยค่ะ!"
1010703-55 = "ถ้าได้ลงนิตยสาร <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ก็จะเป็นการโปรโมตร้านไปในตัวด้วยนะคะ"
1010703-56 = "อ๊ะ ถ้าอย่างนั้นผมก็ยินดีเลยครับ! เชิญถ่ายภาพเก็บข้อมูลให้เต็มที่เลยครับ!"
1010703-57 = "ว้าว! งั้นก็ดีเลยค่ะ! ขอบคุณนะคะ!"
1010703-58 = "ทานขนมและเก็บข้อมูลให้สนุกนะครับ"
1010703-62 = "ได้ข้อมูลไปเขียนสกู๊ปข่าวพิเศษของฉบับถัดไปแล้วค่ะ!"
1010703-63 = "คิดไม่ถึงเลยนะคะว่าจะได้สกู๊ปข่าวพิเศษจากคาเฟ่ของหวานที่แวะมากินพอดี นี่ละค่ะสัญชาตญาณที่#nปราดเปรื่องของเลขานุการ นักข่าว บรรณาธิการ และผู้ตีพิมพ์!"
1010703-64 = "ได้ยินว่าที่นี่มีของหวานให้เลือกเป็นร้อยอย่างเลยนะคะ! ถ้าจดบันทึกรสชาติและความรู้สึกที่ได้กิน#nของแต่ละอย่างแล้วเอาไปรีวิวละก็...!"
1010703-65 = "วันที่ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> จะได้เป็นนิตยสารอันดับหนึ่งก็คงอยู่อีกไม่ไกลแล้วค่ะ~"
1010703-66 = "[s] \"จะกินหมดร้อยอย่างเลยเหรอ?\""
1010703-70 = "เอ๋?! นั่นน่ะสิคะ ลืมคิดไปเลย ฉันน่ะ แค่กินมาการองห้าชิ้นก็อิ่มแล้วค่ะ!"
1010703-71 = "อึก... ทำพลาดแบบนี้ได้ไง..."
1010703-72 = "แหะๆๆ... เอ่อ คุณครูคะ... คุณครูอุตส่าห์ได้ของขวัญสมนาคุณจากฉันทั้งที จะให้พูดอย่างนี้ก็..."
1010703-73 = "[s1] \"ไม่เป็นไร เดี๋ยวครูช่วยอีกแรง\"\n[s2] \"ให้กินขนมแล้วคอมเมนต์ใช่มั้ย?\""
1010703-76 = "ฮือ ขอบคุณค่ะ..."
1010703-77 = "งั้นเรามากินกันทีละอย่างสองอย่างให้ไม่ซ้ำกันนะคะ..."
1010703-80 = "เอาละ ขอถ่ายรูปทาร์ตมะม่วงตรงนี้ก่อน..."
1010703-84 = "คุณครูคะ~ อ้ามม~!"
1010703-85 = "[ns3] \"อ้าม~\"\n[ns4] เอามือรับทาร์ตที่จิอากิยื่นให้มากิน"
1010703-88 = "อื้อ ดีมากค่ะ!"
1010703-89 = "เอาละ คอมเมนต์ทาร์ตมะม่วงได้เลยค่ะ~"
1010703-96 = "เป็นยังไงคะ? อร่อยมั้ย?"
1010703-97 = "[s] \"อืม... หวาน แล้วก็...\""
1010703-98 = "หวาน แล้วก็...?"
1010703-99 = "[s] \"หวานแล้วก็อร่อยด้วย\""
1010703-100 = "เมื่อกี้ตอนกินคุกกี้เชอร์รีก็คอมเมนต์แบบนี้ไปแล้วนี่คะ?!"
1010703-101 = "เราเพิ่งกินได้แค่สิบอย่างเอง..."
1010703-102 = "หรือว่าการรีวิวขนมร้อยอย่างมันจะเป็นงานที่หนักเกินไปคะ...?"
1010703-103 = "[s] \"ครูว่าท้องเราก็ไม่น่าจะกินไหวด้วยนะ...\""
1010703-104 = "ฮือ... ความฝันในการเขียนสกู๊ปข่าวสุดพิเศษของฉัน..."
1010703-108 = "อ๊ะ...!"
1010703-109 = "ถ้างั้นเราก็ขอความร่วมมือจากลูกค้าท่านอื่นก็ได้นี่คะ!"
1010703-110 = "ยังไงก็ต้องมีคนที่กินของหวานชิ้นที่เราไม่ได้กินแน่นอนค่ะ!"
1010703-111 = "[s] \"นั่นก็น่าจะเป็นวิธีที่ดีนะ\""
1010703-115 = "อ๊ะ ตรงโน้นมีคนที่มาสองคนเหมือนพวกเราด้วยค่ะ!"
1010703-120 = "[ns] \"จะไม่เป็นไรเหรอ...?\""
1010703-123 = "แต่ฉันอยากเก็บข้อมูลรีวิวขนมให้ได้มากที่สุดนะคะ"
1010703-124 = "ถ้าไปขอร้อง พวกเธอต้องช่วยอยู่แล้วละค่ะ!"
1010703-129 = "สวัสดีค่ะ~"
1010703-130 = "อะไรเนี่ย?"
1010703-131 = "ฉันกำลังเก็บข้อมูลสำหรับ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> อยู่น่ะค่ะ ขอสัมภาษณ์หน่อยได้มั้ยคะ?"
1010703-132 = "ไม่เห็นเหรอว่าพวกเรากำลังกินขนมอยู่น่ะ?"
1010703-133 = "ค่ะ! เห็นค่ะ! เพราะเห็นก็เลยมายังไงล่ะคะ~!"
1010703-134 = "หะ... หืม?!"
1010703-135 = "ช่วยคอมเมนต์หน่อยได้มั้ยคะว่าพาร์เฟต์ชิ้นนี้มีรสชาติยังไงบ้าง?"
1010703-136 = "กะ... ก็มีรสหวานน่ะสิ"
1010703-137 = "รสหวาน! ดีเลยค่ะ!"
1010703-138 = "เป็นรสหวานแบบช็อกโกแลตมั้ยคะ? หรือว่ารสหวานแบบสับปะรด?"
1010703-139 = "หะ... หืม? ไม่เหมือนกันหรอกเหรอ?"
1010703-140 = "ไม่เหมือนสิคะ! ช็อกโกแลตจะหวานแบบค่อยๆ ส่วนสับปะรดจะหวานทันทีจนขึ้นตาเลย!"
1010703-141 = "คะ... คำอธิบายมันออกจะแปลกๆ นะ แต่ก็เหมือนจะเข้าใจด้วย?"
1010703-142 = "ใช่มั้ยล่ะคะ~! ฉันมาหาถูกคนจริงๆ นะเนี่ย!"
1010703-143 = "แล้วคุกกี้ชิ้นนี้ล่ะคะมีรสชาติยังไง?"
1010703-144 = "ลองกินดูสักคำมั้ยล่ะ?"
1010703-145 = "อะ... เอางั้นเหรอคะ~? ไหนขอชิมหน่อย..."
1010703-150 = "ว้าก! ทำไมเผ็ดล่ะคะ คุกกี้อันนี้!"
1010703-151 = "อะฮ่าฮ่า! เห็นว่าเป็นคุกกี้ที่ทำจากซอสเผ็ดน่ะ ตอนพวกเรากินก็เผ็ดเหมือนกัน"
1010703-152 = "เอ้านี่ เอานมไปกินให้หายเผ็ดสิ"
1010703-156 = "อึก... แต่ยังไงก็เป็นประสบการณ์ใหม่เลยนะคะ! อาจจะใช้เป็นสกู๊ปข่าวดีๆ เลยก็ได้~!"
1010703-157 = "มาการองอันนี้อร่อยมากเลยละ ฉันแนะนำเลย"
1010703-161 = "[ns] (สนิทกันได้เฉยเลยแฮะ...)"
1010703-167 = "โห~ เวลาผ่านไปขนาดนี้เลยเหรอคะเนี่ย~ ถึงจะน่าเสียดายที่กินขนมไม่ครบร้อยอย่างก็เถอะนะ~!"
1010703-168 = "แต่ว่าฉันอิ่มจนท้องจะแตกแล้วค่ะ! นี่น่าจะเป็นครั้งแรกเลยที่ฉันกินแต่ของหวานจนอิ่มแปล้แบบนี้~"
1010703-169 = "ต้องขอบคุณคุณครูกับลูกค้าคนอื่นด้วยค่ะที่ทำให้การเก็บข้อมูลสำเร็จได้ด้วยดี!"
1010703-170 = "ถ้าฉันมาคนเดียว ฉันคงกินได้แค่หนึ่งในสี่ของขนมทั้งหมดที่รีวิววันนี้ค่ะ"
1010703-171 = "แบบนี้ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ต้องหวานขึ้นกว่าเดิมแน่นอนเลยค่ะ!"
1010703-172 = "และเหนือสิ่งอื่นใด การได้ผูกมิตรกับเพื่อนใหม่ทำให้ฉันอารมณ์ดีที่สุดเลยค่ะ~!"
1010703-173 = "[s] \"หมายถึงนักเรียนที่ช่วยคอมเมนต์ขนมเมื่อกี้เหรอ?\""
1010703-174 = "ใช่ค่ะ~!"
1010703-175 = "พวกเธอก็สมัครรับ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> กันไปด้วยนะคะ!"
1010703-176 = "แล้วก็ถ่ายรูปกันฉันไว้ด้วยค่ะ!"
1010703-177 = "ลองดูรูปจากในกล้องสิคะ~"
1010703-181 = "เอะ... เอ๋?"
1010703-182 = "[s] \"รูปออกมา... สั่นหมดเลยแฮะ\""
1010703-183 = "นะ... นั่นสินะคะ... ไม่ได้สั่นแค่รูปที่ถ่ายด้วยกัน แต่รูปของหวานที่จะเอาไปเขียนข่าวก็ด้วย...!"
1010703-184 = "ทำไมเป็นแบบนี้ไปได้ล่ะ..."
1010703-185 = "ช่วยไม่ได้นะคะ...!"
1010703-186 = "งั้นคงต้องเก็บข้อมูลใหม่ตั้งแต่แรกเลย!"
1010703-187 = "[s] \"ตะ... ตั้งแต่แรกเลยเหรอ?!\""
1010703-188 = "ใช่ค่ะ! เพื่อสกู๊ปข่าวที่สดใหม่และ <แพนเดโมเนียม โซไซตี้รายสัปดาห์>!"
1010703-189 = "เราอยู่ที่นี่ต่อได้ค่ะ เพราะฉันยังมีบัตรกำนัลสมนาคุณที่ยังไม่ได้แจกใครอีกหลายใบค่ะ!"
1010703-190 = "งั้นฉันขอตัวไปถ่ายรูปก่อนนะคะ~!"

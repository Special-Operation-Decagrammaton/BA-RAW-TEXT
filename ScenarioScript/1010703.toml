[translation]
1010703-1 = "書記的採訪生活"
1010703-2 = "（在收到千秋的訊息不久之後……）"
1010703-7 = "呀齁！老師好呀～！"
1010703-8 = "就像剛才說的一樣，我帶訂閱的感謝禮物過來囉！"
1010703-9 = "怎麼樣？是不是超期待的～？"
1010703-10 = "[s]「你好啊……千秋……」"
1010703-11 = "唔咦！？老師，你的臉色怎麼糟成這樣！？"
1010703-12 = "是哪裡不舒服嗎？"
1010703-16 = "是因為工作太多……所以昨晚也熬夜了？"
1010703-17 = "這樣的話……真是太好了！"
1010703-18 = "[s]「太，太好了？」"
1010703-19 = "因為～鏘！是給老師的《週刊萬魔殿》訂閱禮物！"
1010703-20 = "看過這封信之後就會明白了！"
1010703-21 = "來！請收下。快打開來看看吧！"
1010703-22 = "[s] 打開千秋遞過來的信封"
1010703-24 = "[ns]「這是……？」"
1010703-25 = "沒錯！是甜點吃到飽的雙人餐券！"
1010703-26 = "疲憊的時候，果然就是要吃甜點～"
1010703-27 = "我在編輯《週刊萬魔殿》的時候，如果覺得體力不支也會去吃點甜食哦！"
1010703-28 = "對現在的老師來說，這應該是最適合的禮物了～對吧？"
1010703-29 = "[s]「千秋……我好感動！」"
1010703-30 = "嘿嘿，不用客氣～"
1010703-31 = "工作固然重要，但也不能缺乏休息……"
1010703-32 = "既然如此，不如我們現在就去把它用了怎麼樣？"
1010703-33 = "[s]「可是我還有工作沒做完……」"
1010703-34 = "哎呀，就是要休息一下補充體力，接下來的工作才會更順利嘛～？"
1010703-35 = "這是為了前進兩步而後退的一步！"
1010703-36 = "暫時把身體交給甜蜜可口的甜點吧～！"
1010703-37 = "[s]「是，是嗎？」"
1010703-38 = "沒錯～！"
1010703-39 = "來來來，我幫老師帶路吧～！"
1010703-41 = "哇！到處都是甜甜的香味！#n是不是口水都快流下來了呀，老師？"
1010703-42 = "真想趕快吃到～！"
1010703-43 = "歡迎光臨！請問是兩位嗎？"
1010703-44 = "對～！"
1010703-46 = "[ns]「這是我們的餐券。」"
1010703-47 = "好的，已確認完畢！"
1010703-48 = "那麼我來幫兩位帶位。"
1010703-51 = "……以上就是本店的用餐說明，請問是否有其他疑問呢？"
1010703-52 = "沒有……啊，對了！"
1010703-53 = "那個……想請問一下，我可以採訪你們店裡並寫成報導嗎？"
1010703-54 = "這裡的氣氛非常溫馨，甜點種類又多，完全是我喜歡的類型！"
1010703-55 = "如果刊登在《週刊萬魔殿》上，應該也會有廣告效果吧？"
1010703-56 = "啊，我們當然歡迎！可以隨意採訪沒關係！"
1010703-57 = "哇！太好了！謝謝你們！"
1010703-58 = "那麼，祝兩位用餐愉快。"
1010703-62 = "這樣下一期的特別報導也準備好了！"
1010703-63 = "哎呀～沒想到居然能在偶然光顧的甜點咖啡廳，想出特別報導的題材！#n真不愧是身兼書記、記者、編輯長和發行人的我……那閃亮耀眼的第六感！"
1010703-64 = "據說這裡有超過100種甜點哦！#n如果能把每種的味道和感想都寫成評論的話……！"
1010703-65 = "《週刊萬魔殿》成為暢銷刊物的日子也許就不遠了～"
1010703-66 = "[s]「100種能全部吃完嗎？」"
1010703-70 = "咦！？我沒想到這點耶！？#n其實我吃五個馬卡龍就是極限了說！？"
1010703-71 = "嗚嗚……竟然會犯下這種錯……"
1010703-72 = "啊哈哈……那個，老師啊……#n雖然這是送給你的禮物，說這種話有點不好意思……"
1010703-73 = "[s1]「沒關係，我也來幫你吧。」\n[s2]「吃完再告訴你感想就可以了吧？」"
1010703-76 = "嗚嗚，真是太謝謝你了……"
1010703-77 = "那我們就各自品嚐不同的甜點吧……"
1010703-80 = "好，先把這個芒果塔的照片拍起來……"
1010703-84 = "老師來，啊～！"
1010703-85 = "[ns3]「啊～」\n[ns4] 用手接過千秋遞過來的芒果塔"
1010703-88 = "嗯，做得好！"
1010703-89 = "來，是芒果塔唷～"
1010703-96 = "怎麼樣？怎麼樣？"
1010703-97 = "[s]「唔嗯……甜甜的……」"
1010703-98 = "甜甜的？"
1010703-99 = "[s]「又甜又好吃？」"
1010703-100 = "這跟剛才對櫻桃餅乾的感想是不是重複了！？"
1010703-101 = "現在才吃到第十種而已……"
1010703-102 = "看來要評論全部100種甜點，果然還是不可能的吧……？"
1010703-103 = "[s]「我怎麼想都覺得，這在物理層面就辦不到……」"
1010703-104 = "嗚嗚……我那獨家報導的夢想……"
1010703-108 = "……啊！"
1010703-109 = "既然如此，請店裡的其他客人幫忙也可以呀！"
1010703-110 = "一定會有人吃過我們沒吃過的甜點的！"
1010703-111 = "[s]「這也是一種方法呢。」"
1010703-115 = "啊，剛好那邊有跟我們一樣兩個人一起來的客人！"
1010703-120 = "[ns]「沒問題嗎……？」"
1010703-123 = "我還是希望，可以盡可能蒐集到更多的甜點評論！"
1010703-124 = "只要拜託他們的話，我相信他們一定會幫忙的！"
1010703-129 = "你們好～！"
1010703-130 = "有什麼事？"
1010703-131 = "我正在進行《週刊萬魔殿》的採訪，想請教你們幾個問題！"
1010703-132 = "沒看到我們正吃點心吃到一半嗎？"
1010703-133 = "是！就是因為看到才會來找你們的～！"
1010703-134 = "啊，啊！？"
1010703-135 = "能麻煩你描述一下這個聖代的滋味如何嗎？"
1010703-136 = "當，當然是甜味啊。"
1010703-137 = "甜味是嗎！很好！"
1010703-138 = "是類似巧克力那樣的甜味嗎？還是像鳳梨那樣的甜味呢？"
1010703-139 = "咦？有差嗎？"
1010703-140 = "當然有囉！#n巧克力的是「絲滑～」的甜味，而鳳梨是「砰砰！」的甜味呀！"
1010703-141 = "雖，雖然你的解釋很詭異，但好像莫名能夠理解？"
1010703-142 = "對吧對吧～！你果然很懂呢！"
1010703-143 = "那麼這塊餅乾又是什麼味道呢？"
1010703-144 = "要吃一塊看看嗎？"
1010703-145 = "啊，可以嗎～？#n那我就來嚐嚐……"
1010703-150 = "哇！好辣！"
1010703-151 = "啊哈哈！這好像是用辣醬做的餅乾。#n我們剛才也被嚇了一跳呢。"
1010703-152 = "來，牛奶給你。"
1010703-156 = "嗚嗚……不過這也是個新鮮的體驗！說不定能成為不錯的報導哦～！"
1010703-157 = "這個馬卡龍很好吃哦，推薦給你。"
1010703-161 = "[ns]（不知不覺就變熟了……）"
1010703-167 = "哎呀～都已經這麼晚了啊～#n可惜還是沒把100種甜點全都吃完～！"
1010703-168 = "肚子好飽哦！#n這可能是我第一次只吃甜點吃得這麼飽呢～"
1010703-169 = "多虧有老師和大家的幫忙，採訪也順利完成了！"
1010703-170 = "如果只有我一個人的話，恐怕連四分之一都吃不了吧。"
1010703-171 = "這樣《週刊萬魔殿》就能變得更加甜蜜了！"
1010703-172 = "而且居然還交到了新朋友，真讓人開心～！"
1010703-173 = "[s]「你指的是剛才幫忙採訪的學生們嗎？」"
1010703-174 = "沒錯～！"
1010703-175 = "他們兩位剛才也都說要訂閱《週刊萬魔殿》了！"
1010703-176 = "我還跟他們一起拍了照哦！"
1010703-177 = "你看，都在相機裡面～"
1010703-181 = "咦，咦？"
1010703-182 = "[s]「照片……都晃到了耶。」"
1010703-183 = "就，就是說啊……#n不只是剛才的合照，就連要刊登在報導上的甜點照都……！"
1010703-184 = "該怎麼辦好呢……"
1010703-185 = "……沒辦法了！"
1010703-186 = "只能現在重新開始採訪了！"
1010703-187 = "[s]「你說要重新開始！？」"
1010703-188 = "沒錯！為了生動的報導和我的《週刊萬魔殿》！"
1010703-189 = "幸好我還有幾張要拿來當訂閱謝禮的餐券！"
1010703-190 = "那我去去就回～！"

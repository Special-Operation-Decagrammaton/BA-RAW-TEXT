[translation]
1007003-1 = "The Recorder"
1007003-5 = "*scuttle*"
1007003-12 = "There's nowhere left to run! Now come along quietly!"
1007003-13 = "Tsk...!"
1007003-17 = "[ns1] \"Mina, now!\"\n[ns2] \"We've got them where we want them!\""
1007003-20 = "At that moment, the sound of a recorder pierced the air."
1007003-21 = "It was the most awful performance I'd ever heard in my life, and I was trying to be nice about it."
1007003-22 = "What the—?"
1007003-28 = "[ns] \"Um... Mina? What's with the recorder?\""
1007003-29 = "... *fweet fweet fweet*"
1007003-31 = "What's she trying to do? Torture us? ...Well, it's working..."
1007003-33 = "... *fweet fweet fweet*"
1007003-43 = "Stop... Just stop! My ears are bleeding!"
1007003-45 = "..."
1007003-46 = "Of course a lowlife like you has no appreciation for the arts!"
1007003-48 = "The only music you deserve to hear is a funeral march!"
1007003-55 = "Mina, in a state of bizarre rage, made short work of her foe."
1007003-57 = "*sigh* Bittersweet victory... Here's a toast to the fallen."
1007003-62 = "[ns] \"That's a juice box you're drinking...\""
1007003-63 = "Heh."
1007003-64 = "[s3] \"Mina, about that music...\"\n[s4] \"What's with the recorder?\""
1007003-67 = "Oh, this old thing?"
1007003-68 = "I had a feeling you'd notice."
1007003-69 = "I saw it in this movie, right?"
1007003-70 = "The opening credits scroll... Glasses clink... Our hero downs a cocktail in a single gulp... and then plays the clarinet."
1007003-71 = "It's what they do whenever a treasured comrade dies. Toast and play the clarinet in their memory..."
1007003-72 = "And so, I've decided..."
1007003-73 = "From now on, whenever I'm about to take down an opponent, I'll play a funeral dirge for them."
1007003-74 = "[s] \"You are aware that you have a recorder, and not a clarinet, right...?\" "
1007003-75 = "..."
1007003-76 = "Know this, Sensei. "
1007003-77 = "The clarinet...is a difficult instrument to master."
1007003-78 = "[s] \"So you picked up a school recorder instead?\""
1007003-79 = "Heh."
1007003-80 = "[s] \"...\""
1007003-81 = "Penny for your thoughts."
1007003-82 = "[s] \"Can I be honest?\""
1007003-83 = "Of course."
1007003-84 = "[s] \"It wasn't exactly...intimidating.\""
1007003-85 = "Ah... Is that so?"
1007003-86 = "It doesn't matter how it sounds in the present. It's the future that matters."
1007003-87 = "My hard work in the present will open a path to that future."
1007003-88 = "[s] \"So you're going to keep practicing?\""
1007003-89 = "Heh."
1007003-90 = "I knew you'd get it. "
1007003-92 = "Mina continued to play the recorder for weeks."
1007003-98 = "Huh? Is that...a recorder?"
1007003-99 = "Ugh! It's like a bunch of little kids at music practice, but worse!"
1007003-106 = "Heh."
1007003-119 = "The recorder... I hear the recorder!"
1007003-120 = "That sound... I can't move...!"
1007003-128 = "Heh."
1007003-133 = "Genryumon is on a roll lately, Sensei."
1007003-134 = "Deliquency is down. Safety is up."
1007003-135 = "*sigh* There's something to be said for fulfilling your duties."
1007003-136 = "[s5] \"I've heard an interesting rumor about one member of Genryumon...\"\n[s6] \"They say the sound of a recorder haunts the streets.\""
1007003-139 = "Oh, I've heard the same."
1007003-140 = "I'd say that's evidence that my skills are improving at a steady rate."
1007003-141 = "It feels like all my hard work is paying off."
1007003-142 = "[s] \"As long as you're happy, Mina...\""
1007003-144 = "Rumors of the fiendish recorder surrounded Shanhaijing."
1007003-145 = "But the rumors were helping keep the peace, so all's well that ends well...?"

[translation]
1007003-1 = "ฝึกเล่นรีคอร์เดอร์"
1007003-5 = "(ฟึ่บ!)"
1007003-12 = "หนีไปไหนไม่รอดแล้ว! ยอมให้คุมตัวซะดีๆ!"
1007003-13 = "ชิ...!"
1007003-17 = "[ns1] \"ตอนนี้แหละ มินะ!\"\n[ns2] \"ครูต้อนเข้าทางตันแล้ว เธอปิดฉากได้เลย!\""
1007003-20 = "(ทันใดนั้นก็มีเสียงรีคอร์เดอร์ดังมาจากที่ไหนสักแห่ง)"
1007003-21 = "(ไม่ว่าจะพยายามฟังแค่ไหน... มันก็เป็นเสียงรีคอร์เดอร์ที่ฟังไม่รู้เรื่อง... ไม่สามารถบอกได้เลยว่าคนเป่า#nมีฝีมือที่ดี)"
1007003-22 = "อะ... อะไรกัน...?"
1007003-28 = "[ns] \"มินะ รีคอร์เดอร์นั่นมันยังไงเหรอ...?\" "
1007003-29 = "(เป่าต่อ...)"
1007003-31 = "อะไรกันเนี่ย... ตั้งใจจะกวนประสาทกันรึไง? ถ้าเป็นแบบนั้นจริงๆ ก็ยิ่งกว่าประสบความสำเร็จแล้วนะ..."
1007003-33 = "(เป่าต่อไป...)"
1007003-43 = "เลิก... เลิกเป่าซะที! ล้อกันเล่นหรือไง? เจ็บหูไปหมดแล้วเนี่ย!"
1007003-45 = "..."
1007003-46 = "พวกวายร้ายไร้รสนิยม...!"
1007003-48 = "คนอย่างเธอน่ะ เป่าเพลงอำลาให้ฟังยังรู้สึกเสียดายเลย!"
1007003-55 = "(จากนั้นมินะก็ปราบเด็กเกเรอย่างง่ายดายเพราะหัวร้อนขึ้นโดยไม่ทราบสาเหตุ...)"
1007003-57 = "ฮู่ว... เหล้าฉลองชัยชนะของวันนี้รสขมกว่าทุกวันเลยจริงๆ"
1007003-62 = "[ns] \"เดี๋ยวนะ นั่นมันกล่องน้ำผลไม้นี่นา...\""
1007003-63 = "ฮึ..."
1007003-64 = "[s3] \"ว่าแต่มินะ...\"\n[s4] \"รีคอร์เดอร์นั่นมันคืออะไรเหรอ\""
1007003-67 = "อ๋อ รีคอร์เดอร์นี่สินะ"
1007003-68 = "ฉันเชื่อว่าถ้าเป็นคุณครูละก็ ต้องสังเกตเห็นได้อย่างแน่นอน"
1007003-69 = "สมัยก่อนฉันเคยเห็นในหนังน่ะ"
1007003-70 = "เสียงแก้วเหล้าที่กระทบกันฉลองชัย พร้อมกับโอเพนนิ่งเครดิตของหนัง แล้วจากนั้นก็จะเป็นฉาก#nตัวละครเอกเป่าแคลริเน็ต..."
1007003-71 = "และหลังจากนั้นเวลามีพวกพ้องจากไป ตัวละครเอกก็มักจะเป่าแครลิเน็ตเพื่อเป็นการอำลา..."
1007003-72 = "เพราะงั้นฉันเลยตัดสินใจเหมือนกันว่า"
1007003-73 = "ตั้งแต่นี้ไป เวลาที่จะจัดการคู่ต่อสู้ ฉันก็จะเล่นเพลงอำลาเป็นการสวดส่งพวกนั้น!"
1007003-74 = "[s] \"มันไม่ใช่แคลริเน็ต แต่เป็นรีคอร์เดอร์ไม่ใช่เหรอ...?\" "
1007003-75 = "..."
1007003-76 = "รู้ไว้นะ คุณครู "
1007003-77 = "แคลริเน็ต... เป็นเครื่องดนตรีที่เล่นยากมาก"
1007003-78 = "[s] \"เพราะงั้นเลยเปลี่ยนเป็นรีคอร์เดอร์ของโรงเรียนแทนเหรอ?\""
1007003-79 = "ฮึ..."
1007003-80 = "[s] \"......\""
1007003-81 = "ฟังแล้วเป็นยังไงบ้างล่ะ คุณครู?"
1007003-82 = "[s] \"อันนี้พูดตรงๆ ได้มั้ย...?\""
1007003-83 = "ตามสบายเลย"
1007003-84 = "[s] \"ครูว่าเธอเล่นได้ไม่เกรงขามเลยอะ...\""
1007003-85 = "อย่างนั้นเหรอ อย่างนั้นเองเหรอ..."
1007003-86 = "สิ่งสำคัญไม่ใช่ปัจจุบัน แต่เป็นอนาคตหลังจากนี้ต่างหาก"
1007003-87 = "การฝึกฝนที่หยาดเหงื่อแทบไหลรินเป็นเลือดในตอนนี้ จะต้องผลิดอกออกผลที่งดงามในอนาคตอย่าง#nแน่นอน"
1007003-88 = "[s] \"จะสื่อว่าถ้าหมั่นฝึกฝน ฝีมือการเล่นรีคอร์เดอร์ก็จะดีขึ้นใช่มั้ย...?\""
1007003-89 = "ฮึ..."
1007003-90 = "คุยกันรู้ภาษา สมกับเป็นคุณครูจริงๆ"
1007003-92 = "(หลังจากวันนั้นเป็นต้นมามินะก็เล่นรีคอร์เดอร์ต่อมาอีกหลายอาทิตย์)"
1007003-98 = "อะ... อะไรกัน? เสียงรีคอร์เดอร์นี้มัน...?"
1007003-99 = "เสียงมันบาดหูกว่าการฝึกเป่าลูกบอลปีศาจของพวกเด็กๆ อีกนะ...?!"
1007003-106 = "ฮึ..."
1007003-119 = "รีคอร์เดอร์... ฉันได้ยินเสียงรีคอร์เดอร์ด้วยละ...!"
1007003-120 = "เสียงรีคอร์เดอร์ที่ทำให้โสตประสาทต้องสั่นสะท้านจนตัวชานี้มันอะไรกันเนี่ย...!"
1007003-128 = "ฮุฮุ"
1007003-133 = "การปราบคนร้ายของมังกรดำล่าสุดนี้เป็นที่น่าพอใจนะ คุณครู"
1007003-134 = "พวกเด็กเกเรก่อวีรกรรมน้อยลง ความสงบก็กลับมาอีกครั้ง"
1007003-135 = "ฮู่ว... การมุ่งมั่นทุ่มเทต่อหน้าที่ของตนเอง เป็นงานที่ทำให้รู้สึกเติมเต็มดีมากเลยเนอะ"
1007003-136 = "[s5] \"ฝีมือการเล่นรีคอร์เดอร์นี่... เกินบรรยายจริงๆ\"\n[s6] \"มีข่าวลือเกี่ยวกับเจ้าหน้าที่ของมังกรดำที่ไล่ล่านักเลงด้วยนะ...\""
1007003-139 = "อ๋อ ข่าวลือนั้นน่ะเหรอ ฉันก็ได้ยินมาเหมือนกัน"
1007003-140 = "แบบนั้นก็เป็นหลักฐานว่าฉันเล่นเพลงอำลาได้สมบูรณ์แบบไม่ใช่เหรอ?"
1007003-141 = "คุ้มค่าจริงๆ เป็นงานที่คุ้มค่ามากจริงๆ"
1007003-142 = "[s] \"โอเค... ขอแค่มินะพอใจก็พอ\""
1007003-144 = "(ข่าวลือเกี่ยวกับเจ้าหน้าที่ที่เล่นรีคอร์เดอร์ได้สุดสยองยังคงแพร่สะพัดไปทั่วซานไห่จิง)"
1007003-145 = "(แต่สุดท้ายข่าวลือนั่นก็เหมือนจะมีประโยชน์ต่อการรักษาความสงบของซานไห่จิง อาจเรียกได้ว่าจบ#nสวย... หรือเปล่านะ?)"

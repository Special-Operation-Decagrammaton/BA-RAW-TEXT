[translation]
1007003-1 = "直笛練習"
1007003-5 = "（咻！）"
1007003-12 = "你已經無處可逃了。#n老實投降的話，不會讓你吃苦的。"
1007003-13 = "嘖……！"
1007003-17 = "[ns1]「趁現在，美奈！」\n[ns2]「把他逼進死路吧！」"
1007003-20 = "（下個瞬間，從某處傳來了一陣直笛的聲音……）"
1007003-21 = "（那是難以形容的奇妙音色）"
1007003-22 = "這，這是什麼聲音……？"
1007003-28 = "[ns]「美，美奈同學，那把直笛是……？」"
1007003-29 = "……（演奏中）"
1007003-31 = "到底在搞什麼啊……可惡，直到最後都要虐待我嗎？"
1007003-33 = "……（演奏中）"
1007003-43 = "放……放過我吧！再聽下去耳朵就要……！！#n我投降！拜託饒了我吧！！"
1007003-45 = "……"
1007003-46 = "惡人無法理解這富含風情的音色嗎……！"
1007003-48 = "已經沒有為你們獻上鎮魂曲的價值了！"
1007003-55 = "（隨後，不知為何勃然大怒的美奈制服了不良學生……）"
1007003-57 = "呼……今天的慶功酒真是格外苦澀。"
1007003-62 = "[ns]「那是果汁吧……」"
1007003-63 = "呵。"
1007003-64 = "[s3]「話說回來，美奈同學……」\n[s4]「那把直笛是怎麼回事？」"
1007003-67 = "啊啊，你說直笛啊。"
1007003-68 = "我相信老師一定能理解的。"
1007003-69 = "我曾經在電影裡看過。"
1007003-70 = "酒杯的聲音與片頭同時響起──將雞尾酒一口飲盡後……#n開始吹奏單簧管的主角。"
1007003-71 = "他……每當有同伴去世時都一定會演奏單簧管。"
1007003-72 = "因此，我也下定了決心。"
1007003-73 = "在制服對手之前， 一定要獻上鎮魂曲。"
1007003-74 = "[s]「但是美奈吹的是直笛吧……？」 "
1007003-75 = "……"
1007003-76 = "你知道嗎，老師。"
1007003-77 = "單簧管……是一種很困難的樂器。"
1007003-78 = "[s]「所以才用在學校學過的直笛代替？」"
1007003-79 = "呵。"
1007003-80 = "[s]「……」"
1007003-81 = "那麼，老師……你覺得演奏的如何呢？"
1007003-82 = "[s]「……我可以實話實說嗎？」"
1007003-83 = "啊啊，那當然。"
1007003-84 = "[s]「聽起來好像不太像鎮魂曲……」"
1007003-85 = "是，是嗎……"
1007003-86 = "不過，比「過去」更重要的是「未來」。"
1007003-87 = "不斷重複的「現在」，終究會成為通往「未來」的道路。"
1007003-88 = "[s]「……你指的是直笛的練習，對吧？」"
1007003-89 = "呵。"
1007003-90 = "老師果然一說就通。"
1007003-92 = "（在那之後，美奈的演奏依舊持續）"
1007003-98 = "什，什麼？這個直笛聲是……？"
1007003-99 = "難以形容……這到底是什麼聲音！？"
1007003-106 = "呵。"
1007003-119 = "噫噫！#n聽見直笛聲了……！"
1007003-120 = "這會影響聽力的聲音，究竟是什麼……！"
1007003-128 = "……呵。"
1007003-133 = "最近玄龍門的治安變穩定了。"
1007003-134 = "不良學生引起的騷動也有減少，身為玄龍門的一員，沒有比這更令人高興的事了。"
1007003-135 = "呼……自己的工作有了回報果然是件令人心情愉悅的事。"
1007003-136 = "[s5]「與此同時，有個會一邊演奏直笛一邊取締不良學生的……」\n[s6]「玄龍門幹部的傳言似乎也傳開了……」"
1007003-139 = "啊啊，你說那個傳言嗎。我也時有耳聞。"
1007003-140 = "我演奏的鎮魂曲的美妙終於被大家發現了對吧？#n這也是我的演奏能力上升的證據吧。"
1007003-141 = "呵呵，這就是獲得回報嗎。真是件美妙的事。"
1007003-142 = "[s]「嗯嗯……」"
1007003-144 = "（與恐怖的直笛聲一同出現的玄龍門幹部的傳言，轉眼間就傳遍了整個山海經）"
1007003-145 = "（從結果來說似乎對山海經的治安維持有所幫助，#n　可喜可賀，可喜可賀……？）"

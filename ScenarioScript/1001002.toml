[translation]
1001002-1 = "รันนิ่ง แมชชีน"
1001002-2 = "ถนนในคิโวทอส"
1001002-3 = "(ยืนรอชิโรโกะอยู่ที่สนามซ้อมวิ่งตอนเช้าของชิโรโกะ)"
1001002-5 = "อืม"
1001002-6 = "คุณครู รอนานไหม?"
1001002-7 = "[s] \"ไม่หรอก เพิ่งมาถึงเมื่อกี้เอง\""
1001002-8 = "งั้นเหรอ..."
1001002-9 = "พอเจอคุณครูข้างนอกแบบนี้เลยรู้สึกแปลกไป"
1001002-10 = "จู่ๆ ก็นึกถึงตอนที่เจอคุณครูครั้งแรกเลย....\n"
1001002-11 = "ฉันรู้สึกว่าเวลาที่ออกกำลังกายมักจะมีเรื่องดีๆ เกิดขึ้น"
1001002-12 = "[s] \"ชิโรโกะชอบออกกำลังกายสินะ?\""
1001002-13 = "อื้อ..."
1001002-14 = "ถ้าได้เสียเหงื่อตอนเช้าสักหน่อยก็จะทำให้รู้สึกดีนะ\n"
1001002-15 = "....."
1001002-16 = "อ่า... แน่นอนว่าต้องไปอาบน้ำที่โรงเรียน\n"
1001002-17 = "อืม"
1001002-18 = "ถ้าโอเค... คุณครูมาวิ่งตอนเช้ากับฉันไหม?"
1001002-19 = "[s1] \"ครูไม่น่าจะออกมาวิ่งไหว...\"\n[s2] \"ขอผ่านแล้วกันนะ เพราะเดี๋ยวจะเปลี้ยไปทั้งวันน่ะ\""
1001002-20 = "อืม... นั่นสิ วันนี้เป็นวันที่ต้องไปซื้อของที่ซูเปอร์... ไว้ค่อยออกกำลังกายแล้วกัน"
1001002-21 = "อืม... นั่นสิ วันนี้เป็นวันที่ต้องไปซื้อของที่ซูเปอร์... ไว้ค่อยออกกำลังกายแล้วกัน"
1001002-22 = "อ่า... ซูเปอร์อยู่ทางโน้น"
1001002-23 = "ไม่ไกลหรอก เราวิ่งเหยาะๆ ไปกันดีไหม"
1001002-25 = "[s] วิ่งตามชิโรโกะไป"
1001002-27 = "(1 ชั่วโมงต่อมา)"
1001002-32 = "......"
1001002-33 = "[s] \"แฮ่ก...แฮ่ก...แฮ่ก...\""
1001002-34 = "อืม..."
1001002-35 = "รอตั้งนาน เห็นคุณครูไม่ตามมาสักที..."
1001002-36 = "ฉันวิ่งเร็วไปเหรอ... โทษที"
1001002-37 = "คนอื่นชอบบ่นบ่อยๆ ว่าฉันมองแต่ข้างหน้า ไม่มองรอบๆ ตัวเวลาวิ่ง..."
1001002-38 = "[s3] \"ซะ...ซูเปอร์อยู่ตรงไหนเหรอ?\"\n[s4] \"วะ...วิ่งมาตั้งหนึ่งชั่วโมงแล้วนะ...\""
1001002-39 = "อ่า......"
1001002-40 = "อ่า......"
1001002-41 = "เหลืออีกครึ่งทาง...มั้ง?"
1001002-42 = "[s] \"ครึ่งทางเลยเรอะ?!\""
1001002-43 = "วิ่งไปอีกชั่วโมงนึงก็ถึงแล้ว เดี๋ยวจะวิ่งให้ช้าลงแล้วกัน วิ่งไปด้วยกันนะคุณครู"
1001002-45 = "[s] \"ระ...รอด้วย!\""
1001002-47 = "(คุณครูตัดสินใจหยุดชิโรโกะไว้ แล้วขอให้เดินไปด้วยกันแทน)"
1001002-48 = "(หลังจากนั้นทั้งสองคนก็เดินไปด้วยกันประมาณสองชั่วโมง)"
1001002-50 = "ถึงแล้วล่ะ นี่ไงซูเปอร์ที่บอกน่ะ"
1001002-51 = "หือ...?"
1001002-52 = "คุณครู...เป็นอะไรรึเปล่า? สีหน้าดูไม่ดีเลย..."
1001002-53 = "[s] \"ซูเปอร์นี่อยู่ห่างจากที่ที่เรานัดเจอกันมากแค่ไหนน่ะ?\""
1001002-54 = "อืม... 15 กิโลมั้ง...?"
1001002-55 = "เป็นที่ที่เหมาะสำหรับจะแวะพักระหว่างทางกลับจากวิ่งตอนเช้ามากนะ"
1001002-56 = "ตอนแรกฉันคิดว่าจะไปร้านสะดวกซื้อที่อยู่ไกลออกไปหน่อย แต่วันนี้คุณครูมาด้วย เลยเลือกร้านที่#nอยู่ใกล้บ้านแทนจะได้ไม่ยุ่งยาก"
1001002-57 = "ถ้าใกล้ๆ แบบนี้ก็เดินมาได้ใช่ไหมล่ะ?"
1001002-58 = "อ่า... นอนหมดแรงแบบนั้นไม่ได้นะคุณครู ต้องเดินกลับอีก 15 กิโลเลยนะ..."
1001002-59 = "[s] \"ฆ่ากันเลยดีกว่า...\""
1001002-60 = "อะ...อื้อ...\n"

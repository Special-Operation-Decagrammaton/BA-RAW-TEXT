[translation]
1001002-1 = "跑步機"
1001002-2 = "奇普托斯．街道"
1001002-3 = "（在白子的晨跑路線上等待白子）"
1001002-5 = "嗯。"
1001002-6 = "老師，等很久了嗎？"
1001002-7 = "[s] 「沒有，我正好剛剛才到。」"
1001002-8 = "……是嗎。"
1001002-9 = "像這樣在路上和老師見面，感覺很奇怪呢。"
1001002-10 = "不知不覺想起和老師初次見面的事情……"
1001002-11 = "運動的時候，感覺常常發生好事。"
1001002-12 = "[s] 「白子很喜歡運動呢？」"
1001002-13 = "嗯……"
1001002-14 = "因為早上流點汗再開始新的一天心情會很好呀。"
1001002-15 = "……"
1001002-16 = "啊，我運動之後，當然會在學校淋浴……"
1001002-17 = "那個……"
1001002-18 = "可以的話，老師要不要，也從明天和我一起晨跑？"
1001002-19 = "[s1] 「一大早就跑步有點……」\n[s2] 「感覺會筋疲力盡一整天我就不用了……」"
1001002-20 = "嗯──，嘛也對。運動的事之後再考慮吧。……那麼，今天是要去超市購物的日子呢。"
1001002-21 = "嗯──，嘛也對。運動的事之後再考慮吧。……那麼，今天是要去超市購物的日子呢。"
1001002-22 = "啊，超市在那個方向。"
1001002-23 = "很快就到了，雖然不到慢跑的程度，不過稍微跑一下吧。"
1001002-25 = "[s] 追上白子"
1001002-27 = "（1小時後）"
1001002-32 = "……"
1001002-33 = "[s] 「哈啊……哈啊……哈啊……」"
1001002-34 = "呼呣……"
1001002-35 = "還想說回頭看卻看不見身影稍微等了一下……"
1001002-36 = "我有點太快了呢……抱歉。"
1001002-37 = "常常被別人說我不顧周遭，只管往前看……"
1001002-38 = "[s3] 「……超市在哪裡？」\n[s4] 「我跑了1小時耶……」"
1001002-39 = "嗯……"
1001002-40 = "嗯……"
1001002-41 = "現在大概一半左右？"
1001002-42 = "[s] 「一半！？」"
1001002-43 = "再跑1小時左右就到了。這次我會稍微跑慢一點，一起走吧，老師。"
1001002-45 = "[s] 「等，等等！」"
1001002-47 = "（阻止了跑出去的白子，決定一起用走的）"
1001002-48 = "（那之後，走了約2個小時）"
1001002-50 = "終於到了。這裡就是我說的那個超市唷。"
1001002-51 = "……嗯？ "
1001002-52 = "老師……沒事吧？臉色看起來不太好……"
1001002-53 = "[s] 「這裡，離約定地點有多遠啊？」"
1001002-54 = "嗯……15km左右……？"
1001002-55 = "早晨慢跑完順路去逛逛，是個很適合的距離呢。"
1001002-56 = "本來想去遠一點的便利商店，不過今天老師也在所以選了近一點的。"
1001002-57 = "這種程度的話就算沒有交通工具也行吧？"
1001002-58 = "啊……現在還不能躺下，老師。回去的路上還要再走15km才行……"
1001002-59 = "[s] 「乾脆殺了我吧……」"
1001002-60 = "唔，嗯……"

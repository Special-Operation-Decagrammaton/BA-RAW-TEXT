[translation]
90002050-1 = "第5話;前進基地"
90002050-4 = "這是最後一台筆電了。莉央會長。要放在這裡嗎？"
90002050-5 = "沒錯，那裡就行。 "
90002050-11 = "話說回來，這裡的景色真是……"
90002050-12 = "某種意義上，好像還能帶來設計靈感……"
90002050-13 = "[s]「果然是「鋼鐵」的「大陸」呢。」"
90002050-15 = "也對……那些孩子在直觀命名這方面，也是挺有天份的。"
90002050-16 = "（有……？）"
90002050-17 = "（天份……？）"
90002050-18 = "那，那個……為什麼要特地到外面來做這種……準備之類的事呢……？"
90002050-19 = "那是因為鋼鐵大陸的區域特殊性。"
90002050-20 = "特殊性…嗎？"
90002050-21 = "是的，依我分析，此時此刻我們……所在位置與其他資訊正在被即時奪取。"
90002050-23 = "嗯？這是什麼個資外洩駭客事件嗎！？到底是誰！？"
90002050-24 = "那當然是…"
90002050-25 = "鋼鐵大陸本身。"
90002050-26 = "鋼鐵大陸正在取得我們的資訊……？"
90002050-27 = "鋼鐵大陸的地面本質上……雖然不知道能不能稱之為地面，總之…"
90002050-28 = "整個地面本身幾乎等同於巨大的金屬基底電路、機械裝置與電腦系統。"
90002050-29 = "正因如此，我們的一舉一動現在幾乎等同於被即時監控。"
90002050-30 = "呃……所以……這個地板、那面牆，還有那些看起來像建築的東西全都在監視我們？"
90002050-31 = "是的，算是吧。"
90002050-32 = "沒有其他方法嗎，Kei……？"
90002050-33 = "怎麼可能沒有。剛好陽葵和莉央正在實時應對。"
90002050-39 = "簡單來說的話，我們現在開始要「確保」這個地方。"
90002050-40 = "也就是將這片區域的主導權，從那些孩子手中以電子形式暫時借來。"
90002050-41 = "可以說是一種半永久性的權限轉移。"
90002050-42 = "[s]「要花多久時間？」"
90002050-44 = "目前要等操作後才知道。"
90002050-45 = "但在區域佔領完成前，必須將運輸船的資源轉換為運算裝置，因此在佔領期間，我們無法隨意移動位置。"
90002050-46 = "也就是說，現在我們並不是將敵方區域轉換為我方區域。"
90002050-47 = "這也可以說是我們自己主動限制了行動吧。"
90002050-48 = "雖然是個令人難受的結論，但事實如此。季。"
90002050-53 = "我明白了，莉央會長。那麼我將進入最高警戒狀態，守住這裡。"
90002050-54 = "好的！愛麗絲也要一起！"
90002050-55 = "太感謝了。大家都很可靠呢。"
90002050-56 = "那我去巡視一下周遭。說不定會有十字神名的兵力或勞工機器人過來。"
90002050-57 = "沒錯，但不要走太遠。因為這樣戰力會被分散。"
90002050-58 = "我知道了，會長。"
90002050-61 = "耶索德……被突破了呢。"
90002050-68 = "……有先預測了這種情況，要往那個方向前進嗎？"
90002050-69 = "……Soph？"
90002050-79 = "你好啊，Soph。這次只有你一個人嗎？"
90002050-80 = "……"
90002050-81 = "你看來是有話想說。對吧，Soph？"
90002050-82 = "姐姐大人……"
90002050-83 = "雖然大家都知道了，但想再確認一次。"
90002050-84 = "耶索德，現在是什麼情況？"
90002050-85 = "……！！！"
90002050-86 = "沒關係，Soph。"
90002050-87 = "但，但是……我們…… ！"
90002050-88 = "沒關係，大家都沒事。"
90002050-89 = "我……全都是我的錯……"
90002050-95 = "姐，姐姐大人！？呼，呼吸有點……"
90002050-96 = "噓。就這樣…安靜地。"
90002050-97 = "呃……呃呃……！"
90002050-98 = "嗯，很好。Soph。暫時先維持這樣。"
90002050-101 = "稍微冷靜一點了嗎？"
90002050-102 = "嗯……"
90002050-103 = "那就進入下一個話題。"
90002050-104 = "Soph，有什麼我能做的事嗎？"
90002050-105 = "……！"
90002050-106 = "別那麼驚訝。"
90002050-107 = "我知道Soph想要什麼。可能是因為我是他的姐姐。"
90002050-108 = "我也明白為什麼Soph現在一句話都說不出來。因為Soph是我的妹妹。"
90002050-109 = "所以說，沒關係的。我也會去做自己力所能及的事。"
90002050-115 = "……！我們只是不想失去姐姐大人！"
90002050-120 = "只是…… 不想失去姐姐大人。"
90002050-121 = "是的，我們也很清楚。"
90002050-122 = "所以Ain、Soph和Aur才會把我送來佐哈爾基地吧。"
90002050-123 = "即便我已經不再需要任何維護了。"
90002050-124 = "呃呃……！"
90002050-125 = "善良的Soph。不要太難過。"
90002050-126 = "我明白的。我也知道該怎麼做才是「次選方案」。"
90002050-127 = "所以不用擔心。一切都會順利的。"
90002050-128 = "會儘快結束後馬上回來。"
90002050-129 = "姐姐大人……"
90002050-131 = "可是……那樣真的可以嗎？"
90002050-132 = "！？"
90002050-133 = "……"
90002050-138 = "……是怎麼知道的啊？"
90002050-139 = "事到如今才……。反正我們要去的地方早已註定了。"
90002050-140 = "只是把剩下的機率與變數全部推算一次。然後選出其中可能性最高的地方。"
90002050-141 = "這麼一說想起來了。還記得最先如何約定的嗎？"
90002050-142 = "不是說好無論發生什麼事，在「那個時候」到來之前， 都絕對不能讓姐姐大人走到外面去的嗎？"
90002050-143 = "……"
90002050-144 = "而且我們原本也是為了避免「那個時候」的到來才做這些的。"
90002050-145 = "……"
90002050-146 = "試想一下。假設這個情報讓其他預言者知道，到時候打算怎麼辯解？"
90002050-150 = "……對不起。全部都是我的錯。我無從辯解。"
90002050-151 = "但是，必須阻止。我們…… 必須阻止那些人。"
90002050-152 = "耶索德被突破，意味著的就是那件事。你應該多少明白了吧？"
90002050-153 = "……沒錯。Ain甚至昏厥了。"
90002050-154 = "你說的沒錯。我們不該向姐姐大人求助。可是如果現在不採取行動……"
90002050-155 = "最終，我們只會不得不麻煩姐姐大人更多。那樣的話……"
90002050-156 = "我們就再也無法阻止「那個時候」的到來了……"
90002050-157 = "……"
90002050-159 = "Aur。Soph──"
90002050-161 = "沒關係，我說過我沒事吧？我知道。我並不是來質問你的。 "
90002050-162 = "其實我只是想稍微捉弄一下Soph而已！"
90002050-163 = "喂。"
90002050-165 = "是的，果然如此。"
90002050-167 = "大膽！把手放下！而且我也是為了談工程上重要的事情才來。"
90002050-168 = "……要是再亂說話，真的會挨揍……"
90002050-169 = "聽我說。即便撇開其他條件，這件事本質上就不簡單。"
90002050-170 = "首先我們必須對其他預言者隱瞞姐姐大人出擊的這件事。這是最首要的。"
90002050-171 = "嗯……沒錯。"
90002050-172 = "但同時我們必須將鋼鐵大陸的全部能源，暫時都集中到姐姐大人身上。 "
90002050-173 = "這兩個條件卻相互矛盾。你應該也知道。"
90002050-174 = "………沒錯。"
90002050-175 = "也就是說，這件事一定會存在著時間限制。能理解嗎？"
90002050-176 = "時間限制……沒錯，到那裡為止是必然的結果。所以呢？"
90002050-177 = "就是輪到我出場的時候了！"
90002050-178 = "有方法？"
90002050-179 = "其他預言者那邊……就交給我來實施「障眼法」吧。這種事情本來不就是我拿手的嗎？"
90002050-180 = "所以…… 也就是說……打算蒙騙自己人 ！？"
90002050-181 = "算是吧。Soph熟悉的人類諺語中不是有個類似的嗎？"
90002050-182 = "還真的有。「要能欺騙別人，就要先欺騙自己人。」類似這種。"
90002050-183 = "果然有吧！但是時間一定要精準掌控。如果超過的話，我也無能為力。"
90002050-184 = "超過一定程度就無法再壓下來了，欺瞞終究是有極限的。"
90002050-186 = "就是這樣。Soph，現在可以了嗎？"
90002050-191 = "……謝謝"
90002050-197 = "這……是什麼？為什麼對我伸手……？"
90002050-198 = "握住這隻手，上下搖晃就行了。這就是握手。聽說人類在做重要約定或下定決心時會這麼做。"
90002050-199 = "……又是人類一些不知所以的習慣呢……唔，好吧。也沒什麼不好的。"
90002050-200 = "那麼也和我一起吧？所謂的握手。"
90002050-201 = "哦，哦……？呃，呃嗯……"
90002050-202 = "很好。Soph和Aur好像變得更加親近了。 "
90002050-207 = "那，那個，話說……涅察赫醬……鋼鐵大陸本身該怎麼處理呢……？"
90002050-208 = "嗯！？"
90002050-209 = "Ain！？"
90002050-210 = "身體沒事吧，Ain？"
90002050-215 = "耶嘿嘿。好的！對不起，我暫時有點頭暈目眩……現在已經沒事了……！"
90002050-216 = "比起這個，就算能對其他人……隱瞞姐姐大人的出擊……卻很難不被涅察赫醬發現。"
90002050-217 = "因為涅察赫醬……現在就是鋼鐵大陸……自己身上發生什麼事，不可能……不知道吧。"
90002050-219 = "呃，說得也是……"
90002050-220 = "連那個都瞞不住嗎……"
90002050-221 = "從現實面想想吧。你覺得可行嗎？"
90002050-222 = "呃，這次還真的無話反駁……"
90002050-224 = "嘿嘿嘿……不過沒關係的！涅察赫醬……說這一次會睜一隻眼閉一隻眼。"
90002050-225 = "咦？真的嗎？"
90002050-226 = "好的！雖然他也說下次……恐怕就不行了……"
90002050-227 = "至少有一次機會。而且……一次就已足夠了。對吧，Soph？"
90002050-229 = "……！"
90002050-230 = "沒錯，一次就夠了。嗯！"
90002050-232 = "那麼Ain、Soph、Aur。"
90002050-236 = "我的初次出擊就拜託你們了。"
90002050-239 = "是的！"
90002050-241 = "下一話;馬爾庫斯"

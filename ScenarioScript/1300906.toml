[translation]
1300906-1 = "สถานที่ที่เหมาะกับการฝึกฝนด้วยกัน"
1300906-3 = "(คุณครูมาถึงสถานที่นัดพบหลังจากได้รับข้อความใน MOMOTALK แต่ก็ยังไม่เจอสึบากิ)"
1300906-4 = "[s] \"อืม สึบากิอยู่ไหนนะ?\""
1300906-5 = "ง่ำๆ... คุณครู ตรงนั้นไม่ได้นะ..."
1300906-6 = "ถ้าเดินตามกระต่ายที่เดินช้าแบบนั้นไปเรื่อยๆ ก็จะไปโผล่ที่ประเทศแปลกๆ ได้นะ..."
1300906-7 = "(หืม?)"
1300906-8 = "(คุณครูได้ยินเสียงเดินตามมาจากที่สักแห่ง จึงเดินเข้าไปดูในพุ่มไม้)"
1300906-11 = "― คุณครู…มาแล้วเหรอ…[wa:4540] "
1300906-14 = "― อื้อ… ตอนนี้ฉันกำลัง...ฝึกทำสมาธิอยู่...[wa:7790] "
1300906-17 = "― ดูเหมือนง่วงนอนอยู่งั้นเหรอ…?[wa:2800] "
1300906-20 = "― เปล่าสักหน่อย… นี่เป็น...ขั้นตอนหนึ่งของการฝึกต่างหากล่ะ…[wa:5640] "
1300906-23 = "― ไม่คิดเลยว่าแถวนี้จะมีที่ที่เหมาะกับการฝึกฝน…[wa:3120] "
1300906-26 = "― มีความสุขจัง รู้สึกเหมือน... กำลังฝันอยู่เลย...[wa:3700] "
1300906-29 = "― ความสุขทั้งหมดนี้ เป็นเพราะคุณครูรึเปล่านะ…?[wa:4950] "
1300906-32 = "― อืม...คือ... คุณครูเองก็อย่ามัวแต่ยืนอยู่อย่างนั้นสิ...[wa:5880] "
1300906-34 = "― มานอนฝึก… ด้วยกันตรงนี้ไหม…?[wa:2320] "
1300906-37 = "(สึบากิลุกขึ้นมาจูงมือคุณครูไป......)"
1300906-38 = "(หลังจากนั้นคุณครูก็นอนหลับอยู่ข้างๆ สึบากิ... ฝึกฝนอยู่ข้างๆ สึบากิตลอดทั้งวัน)"

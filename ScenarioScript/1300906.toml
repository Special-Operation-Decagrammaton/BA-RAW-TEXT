[translation]
1300906-1 = "The Best Place to Train with You"
1300906-3 = "I arrived at the meeting place after getting a message on MomoTalk, but Tsubaki wasn't there."
1300906-4 = "[s] \"Hmm, I wonder where Tsubaki is.\""
1300906-5 = "Zzz... No, not that way, Sensei... "
1300906-6 = "If you follow that bunny who is constantly saying he's late, you're gonna end up in a strange place..."
1300906-7 = "Huh?"
1300906-8 = "I heard a voice and checked behind a nearby bush."
1300906-11 = "― Sensei. You're here...[wa:4380] "
1300906-14 = "― Yup. It's training. I was meditating...[wa:7830] "
1300906-17 = "― You think I was just dozing off...?[wa:2560] "
1300906-20 = "― Not at all. This is all part of my training...[wa:6080] "
1300906-23 = "― I didn't expect to find such a good training spot nearby.[wa:2640] "
1300906-26 = "― I'm so happy. It feels like a dream...[wa:4060] "
1300906-29 = "― Am I this happy thanks to you, Sensei?[wa:5190] "
1300906-32 = "― Mmm! Don't just stand there, Sensei.[wa:6640] "
1300906-34 = "― Let's lie down and...nap together.[wa:2080] "
1300906-37 = "Tsubaki took me by the hand, so I had no choice..."
1300906-38 = "I had to lie beside Tsubaki and nap...or train...for the entire day."

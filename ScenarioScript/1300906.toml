1300906-5 = "#na;츠바키;음냐음냐……. 선생님, 거긴 안 돼……."
1300906-6 = "#na;츠바키;연신 바쁘다고 말하는 토끼를 따라가면 이상한 나라로 가게 돼버려……."
1300906-7 = "#na;(응?)"

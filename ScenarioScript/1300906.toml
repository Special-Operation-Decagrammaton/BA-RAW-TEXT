[translation]
1300906-1 = "適合和你修行的"
1300906-3 = "（收到MomoTalk訊息後來到了約定地點，但卻遲遲找不到椿）"
1300906-4 = "[s] 「唔──嗯，椿跑到哪去了？」"
1300906-5 = "咕噥咕噥……老師，那裡不行……"
1300906-6 = "追著說著「很忙」的兔子走的話，會跑去奇怪的國家喔……"
1300906-7 = "（什麼東西？）"
1300906-8 = "（循著不知從何處傳來的聲音，穿過了灌木叢）"
1300906-11 = "― 老師……來了啊……[wa:4900] "
1300906-14 = "― 嗯，現在正在修行中…正在坐禪…[wa:8790] "
1300906-17 = "― 你問我是不是在打瞌睡…？[wa:3480] "
1300906-20 = "― 不是唷…這也是修行的一環…[wa:7400] "
1300906-23 = "― 沒想到附近有這麼適合修行的好地方…[wa:4240] "
1300906-26 = "― 好幸福。好像在做夢…[wa:5180] "
1300906-29 = "― 這份幸福，也是託老師的福嗎…？[wa:6110] "
1300906-32 = "― 嗯…好了，那個…老師也別愣在那裡。[wa:7400] "
1300906-34 = "― 和我一起……睡吧？[wa:3080] "
1300906-37 = "（就這樣被椿拉著手，躺在她身邊……）"
1300906-38 = "（那天就這樣陪在椿身旁睡覺……不對，是修行）"

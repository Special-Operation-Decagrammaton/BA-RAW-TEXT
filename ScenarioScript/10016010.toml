[translation]
10016010-1 = "第1話;燃燒的實行委員會"
10016010-2 = "晄輪大祭實行委員會．辦公室"
10016010-10 = "……感謝大家百忙之中齊聚一堂。"
10016010-11 = "開幕式已經順利結束，接下來我會就之後的安排和注意事項進行簡短的說明。"
10016010-12 = "雖然開幕式上確實發生了一點「小」問題……"
10016010-13 = "哎呀……原來對千年來說，開幕式的那場事故只是小問題嗎？"
10016010-14 = "那，那個，那是因為……"
10016010-15 = "三一的選手代表在公開場合發表了有損晄輪大祭權威的言論，#n這件事可不能就這麼算了。"
10016010-16 = "我認為此事必須向三一綜合學園追究責任。"
10016010-17 = "……"
10016010-18 = "真，真是非常抱歉……"
10016010-19 = "我們修女會也沒想到會發生這種事……"
10016010-20 = "啊，不！其實並不是完全沒想過……#n只是沒料到他竟然會做到這種地步……"
10016010-21 = "唉……原來不算預料之外啊。"
10016010-22 = "呵呵……三一要不要乾脆負起責任，退出這次的實行委員會呢？"
10016010-23 = "人員不足的部分，就由我們風紀委員會補上。"
10016010-24 = "──追加格黑娜的學生人數嗎？"
10016010-25 = "行政官難不成打算搞砸這次的晄輪大祭嗎？"
10016010-26 = "早就被某個學園搞砸了吧？"
10016010-27 = "那，那個……請，請大家冷靜一點！"
10016010-28 = "晄輪大祭是不分學園，大家攜手競技的慶典。"
10016010-29 = "如果在比賽開始前，被其他學生知道實行委員會像這樣子爭執不下的話……"
10016010-30 = "一定會很難過的……"
10016010-31 = "……我明白了。"
10016010-32 = "大多數的學生就算知道實行委員會內部正在發生爭執，恐怕也只會幸災樂禍吧……"
10016010-36 = "謝謝你幫忙勸架。#n──我記得是伊落同學，對吧？"
10016010-37 = "不，不會……反倒是我們給您添麻煩了，真是抱歉……"
10016010-38 = "還有，請叫我瑪麗就可以了。"
10016010-39 = "（……我大概明白三一為何選這兩人擔任實行委員了）"
10016010-45 = "……基於上述原因，下列比賽項目進行了部分修改。#n考慮到準備所需的時間，已將調整後的順序以及間隔時間印了出來，請過目。"
10016010-46 = "雖說是臨時的調整，但參加學校都沒有異議。"
10016010-47 = "還有什麼問題嗎？"
10016010-48 = "[s]「我能問件事嗎？」"
10016010-49 = "夏萊的[USERNAME]老師，請說。"
10016010-50 = "對哪個部分有疑問嗎？"
10016010-51 = "[s1]「據我所知，這次的晄輪大祭是由千年主辦……」\n[s2]「但其他學校的學生也能擔任實行委員嗎？」"
10016010-52 = "是的。為了讓比賽不偏袒任一學園或集團，需要以公平公正的方式營運晄輪大祭。"
10016010-53 = "是的。為了讓比賽不偏袒任一學園或集團，需要以公平公正的方式營運晄輪大祭。"
10016010-54 = "如果全權交由主辦學校來營運和管理的話，#n容易發生不正當的行為，引起學生們的不滿情緒。#n因此，實行委員會將由主辦方及多所學校共同分擔責任。"
10016010-55 = "再加上聚集了各個學園的各種學生，學生間發生衝突的可能性也會提高。#n這時候如果各學園都有實行委員，便能迅速地應對狀況。"
10016010-56 = "照慣例，本來應該是由各個學園的學生會幹部擔任實行委員……"
10016010-58 = "……為什[ruby=Pandemonium Society]麼「萬魔殿」和[/ruby][ruby=Tea Party]「茶會」[/ruby]卻都沒有出席呢？"
10016010-59 = "就是說啊……我們風紀委員會也為此抗議過。"
10016010-60 = "「萬魔殿」的老狐狸……不對，真琴議長是這麼說的。"
10016010-62 = "居然要身為格黑娜頂點的萬魔殿擔任實行委員，照料那些平凡的學生？"
10016010-63 = "……我真琴大人才不做那種麻煩事！拒絕！"
10016010-64 = "作為代替，就由你們風紀委員會負起全部責任吧！咯咯咯！"
10016010-66 = "……那茶會呢？"
10016010-67 = "現擔任茶會主席的渚大人發來了以下賀電。"
10016010-69 = "本次由於公務纏身而無法親自參加「晄輪大祭」，本人對此深感遺憾。"
10016010-70 = "為了表示歉意，我準備了美味的紅茶並請蓮實同學代為轉交。"
10016010-71 = "……在此誠心祝福「晄輪大祭」圓滿成功。"
10016010-73 = "……結論就是嫌麻煩所以不來吧。"
10016010-74 = "──這麼說真是失禮啊。#n茶會可是一肩扛起了校園內外的各種重責。"
10016010-75 = "渚大人他……肯定是壓抑了想親身參與的心情，不得已才將任務託付給我。"
10016010-76 = "啊啊，要這麼說的話，萬魔殿也是──"
10016010-77 = "唉……要我擁護那群老狐狸，我可說不出口。"
10016010-78 = "總是把麻煩的工作推給陽奈委員長，在背地裡玩一些無聊的小手段。"
10016010-79 = "話說回來，這杯紅茶，莫非……#n就是剛才茶會所提到的嗎？"
10016010-80 = "……之後不會發帳單來敲竹槓吧？"
10016010-81 = "──這大可放心。#n招待格黑娜的紅茶是從便利商店買來的便宜貨。"
10016010-82 = "哎呀，那還真是……得心懷感激呢，至少不是自來水。"
10016010-83 = "那，那個……大家有話好說……"
10016010-87 = "……我能了解兩校的學生會之所以無法參加的理由。"
10016010-88 = "但就算是這樣……"
10016010-89 = "前來參加的人難道不該是風紀委員會或實現正義部的部長嗎！？"
10016010-90 = "光用眼神就能壓制住不良學生的，也就只有他們了吧……"
10016010-91 = "那個……因為還有其他事要拜託陽奈委員長……"
10016010-92 = "其他事……？"
10016010-93 = "該說「殺雞焉用牛刀」嗎……#n每個人都有適合自己的位置。"
10016010-94 = "弦生雖然是實現正義部的部長，但像這類的對外業務，一般都是由我來負責。"
10016010-95 = "況且，如果由弦生擔任實行委員的話，能參加的比賽數就會……"
10016010-96 = "啊……"
10016010-97 = "換句話說……"
10016010-98 = "為了保留學園的戰力，所以就把「運動白癡」派來了嗎……？"
10016010-100 = "唔，說是「運動白癡」也太過分了吧！"
10016010-101 = "我的運動神經雖然不算好……但身為實現正義部的副部長，至少有最低限度的體力。"
10016010-102 = "格黑娜有許多優秀的選手，所以我本來就沒有打算參加比賽。"
10016010-103 = "我也持相同意見。#n盡可能地讓優秀的選手參賽，有助於學園取得總冠軍。"
10016010-107 = "……這會不會有點太過份了！？"
10016010-108 = "取得總冠軍固然重要，但排序上也不該優先於實行委員會的工作吧！？#n不能只替自己的學校著想啊！"
10016010-109 = "別以為[ruby=千年]我們[/ruby]會甘願屈居幕後……#n我們可沒有放棄奪冠喔！？"
10016010-111 = "……千年自古就對體育活動不感興趣吧？"
10016010-112 = "我也是這麼聽說的。不僅總是擠不進能參加校際棒球賽的名次，#n其怪異的行徑還比賽場中的表現更為出名……"
10016010-114 = "是，是那樣沒錯……"
10016010-115 = "但畢竟這次的晄輪大祭是由我們千年舉辦……"
10016010-116 = "透過千年科學學園引以為傲的科技進行分析和訓練，#n今年勢必會取得總冠軍的！"
10016010-124 = "怎麼辦……感覺氣氛變得更糟了呢……"
10016010-125 = "我聽說這是能為奇普托斯祈求和平的慶典，#n所以才高高興興地參加……沒想到會演變成這樣……"
10016010-126 = "[s3]「大家都活力滿滿也不是件壞事吧？」\n[s4]「只是因為比賽將近，所以有點緊張而已。」"
10016010-127 = "既然老師都這麼說了，我想應該是沒問題吧……"
10016010-128 = "既然老師都這麼說了，我想應該是沒問題吧……"
10016010-132 = "那種強調胸部的穿法是怎麼回事？#n三一連體育服都穿不好嗎？"
10016010-133 = "這，這個是因為……拉鍊卡住了……"
10016010-134 = "再說了，你有資格指責別人的穿著嗎？"
10016010-135 = "希望晄輪大祭能圓滿落幕……"

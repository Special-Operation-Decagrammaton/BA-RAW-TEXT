[translation]
10016010-1 = "Episode 1; An Executive Committee in Flames"
10016010-2 = "The Kivotos Halo Festival Executive Office"
10016010-10 = "...Thank you for helping with the Kivotos Halo Festival despite your busy schedules, everyone."
10016010-11 = "With the opening ceremony concluded, let's go through the day's schedule, as well as some key points to keep in mind."
10016010-12 = "Although the opening ceremony had some slight hiccups..."
10016010-13 = "Interesting. What would be a train wreck to Gehenna is just a \"slight hiccup\" by Millennium standards?"
10016010-14 = "W-Well..."
10016010-15 = "I, personally, don't think we should overlook that the representative hand-picked by Trinity made public statements undermining the authority and importance of the revered Halo Festival."
10016010-16 = "Trinity General School should be held accountable."
10016010-17 = "..."
10016010-18 = "Oh, oh dear...! I'm so sorry."
10016010-19 = "It's of little comfort, but none of us at the Sisterhood would have ever, in any universe, thought she would make such disgusting and brazen comments!"
10016010-20 = "W-Well, I guess in one universe or two...we could have expected it... But... We thought we could trust her to read off a piece of paper!"
10016010-21 = "So it wasn't a zero-probability situation..."
10016010-22 = "Heehee. You heard the sister. Considering such negligence, I'd like to suggest that Trinity recuse themselves from the Executive Committee immediately."
10016010-23 = "The Prefect Team would be more than happy to volunteer our manpower to fill the, I'm sure, very large hole Trinity will leave behind."
10016010-24 = "Excuse me?! You're trying to create a Gehenna majority here!"
10016010-25 = "The way I see it, you're the one undermining the integrity of this festival, Senior Administrator!"
10016010-26 = "Its integrity, Vice President, was shredded to pieces thanks to YOUR school's impropriety to begin with!"
10016010-27 = "E-Everyone! Please! Let's all calm down!"
10016010-28 = "The Kivotos Halo Festival is supposed to be a celebration of peace. A neutral place for students from all walks of life to participate in friendly competition to foster relationships between the schools."
10016010-29 = "Please take a moment to imagine how the general student body would feel if they knew its executives were squabbling with each other like schoolchildren on a playground!"
10016010-30 = "They would feel betrayed and crushed!"
10016010-31 = "...I understand, Mari."
10016010-32 = "Hmph. If the students knew we were all fighting, they'd probably be thrilled."
10016010-36 = "Iochi Mari, correct? You deescalated that situation well. I'd expect nothing less of a member of the Sisterhood."
10016010-37 = "Oh no, you give us too much credit. We do bear the brunt of the responsibility for this situation."
10016010-38 = "And there's no need to be so formal. We've all gathered here in good faith. Please, call me Mari!"
10016010-39 = "(I'm beginning to understand why Trinity selected her to be a member of this Executive Committee...)"
10016010-45 = "...And that is why we have made changes to the specified events. We had to shuffle around the schedule a little bit as well, to account for the extra preparation time needed to accommodate the changes."
10016010-46 = "We acknowledge these were last minute changes, but we maintained transparent communication with the participating academies throughout this process and they've voiced no complaints."
10016010-47 = "Do any students have any other questions or concerns?"
10016010-48 = "[s] \"Can I ask something?\""
10016010-49 = "Technically you're not a student, but I'll make an exception for you, [USERNAME] Sensei."
10016010-50 = "What's your question?"
10016010-51 = "[s1] \"Millennium is hosting this Halo Festival, so why...?\" \n[s2] \"Are students from other academies allowed to serve on the Executive Committee?\""
10016010-52 = "Why are there students from other schools present? It's to ensure that the Kivotos Halo Festival is operated in a fair and unbiased manner, and so no one academy can have too much power."
10016010-53 = "Yes. It's to ensure that the Kivotos Halo Festival is operated in a fair and unbiased manner, and so no one academy can have too much power."
10016010-54 = "If only the host academy participated in the Executive Committee, there'd be no checks and balances to ensure fair practices are maintained. Having members from all different schools allows the students to feel confident in the event's integrity."
10016010-55 = "There's also security issues. An event this large naturally attracts troublemakers. If any students threatening the festival's safety crop up, the respective academy's Executive Committee members can respond much more effectively and quickly."
10016010-56 = "That's why it's not only allowed for individual academies to send representatives to serve on the Executive Committee, it's an important tradition of the Halo Festival we should be honored to uphold."
10016010-58 = "Which actually brings me to my own question... Considering the Executive Committee's importance, why did both the Pandemonium Society and Tea Party fail to show up today?"
10016010-59 = "You're telling me. As a member of the Prefect Team, I have half a mind to lodge a complaint myself."
10016010-60 = "That raccoon of the Pandemonium Society... Ahem. I mean, Chair Makoto declined to participate for the following reason:"
10016010-62 = "You want the Pandemonium Society, the top brass of Gehenna, to serve on the Executive Committee to clean up after a bunch of boring, ordinary students?"
10016010-63 = "I, the Great Makoto, would never stoop so low as to do something as stupid and annoying as that! Hard pass!"
10016010-64 = "Even better, the Prefect Team can bear all responsibilities for the committee! Bahahaha!"
10016010-66 = "...And what about the Tea Party?"
10016010-67 = "Nagisa, the current host of the Tea Party, sent us as representatives with a message from her."
10016010-69 = "Regrettably, I'm unable to directly participate in the Kivotos Halo Festival due to my many and varied social engagements."
10016010-70 = "By way of Hasumi, please accept my sincere apology along with some very high quality tea."
10016010-71 = "I shall sincerely root for the successful hosting of the Kivotos Halo Festival from afar."
10016010-73 = "That's a very political way of saying, \"I really couldn't care less.\""
10016010-74 = "Don't speak on things you don't know! The Tea Party host's responsibilities are immeasurable."
10016010-75 = "I'm sure that Nagisa grappled hard with the decision before regretfully declining to participate in the Kivotos Halo Festival."
10016010-76 = "If that's how you're presenting it, then the Pandemonium Society is probably plenty busy as well..."
10016010-77 = "...Ugh. No, I just can't bring myself to stick up for that gang of raccoons."
10016010-78 = "They're just leaving all of the difficult, important tasks to President Hina while they're cooking up another useless scheme."
10016010-79 = "By the way, is this tea we're drinking the same tea that Nagisa sent?"
10016010-80 = "We had better not be charged some ludicrous price for this later!"
10016010-81 = "There's no need to worry about that. The tea chosen for you Gehenna students was specially acquired from the bottom shelf of a convenience store."
10016010-82 = "Wow, how kind of you. I'm just grateful it's not tap water, although I could hardly taste the difference."
10016010-83 = "E-Excuse me... I don't think this barely-veiled hostility is helpful for effective communication..."
10016010-87 = "Yes, let's settle down. I have a grasp of the situation."
10016010-88 = "However..."
10016010-89 = "Could the president of the Prefect Team or the Justice Task Force not deign themselves to be here either?! At the very least?"
10016010-90 = "There's no better pair for intimidating delinquent students and troublemakers. Their mere presence would've been enough."
10016010-91 = "W-Well... President Hina's attentions were required elsewhere..."
10016010-92 = "Elsewhere? What do you mean?"
10016010-93 = "She's applying her talents in a position more suited to her. Asking someone of her caliber to fulfill this role would be like...using a grenade launcher to kill a fly."
10016010-94 = "While Tsurugi is the official president of the Justice Task Force, external affairs like the Executive Committee have always been under my purview."
10016010-95 = "And if Tsurugi were to serve on the Executive Committee, the number of games Trinity could participate in would drop significantly..."
10016010-96 = "Ah."
10016010-97 = "Let me clarify..."
10016010-98 = "Are both of your presidents participating in the games? Did each academy scheme to send their most unathletic, uncoordinated klutzes to serve on the Executive Committee? All just so that you could...win?"
10016010-100 = "Calling us uncoordinated klutzes is a bit uncalled for! My talents lie in less...brutish activities."
10016010-101 = "I agree. I may be a teeny tiny bit lacking in the reflexes department, but I have good stamina at least!"
10016010-102 = "And, regardless, Gehenna has so many exceptional athletes to choose from!"
10016010-103 = "Yes, yes. It makes sense for each academy to send the best athletes they can, regardless of position. You need to exhibit excellence across all the events if you want to win the overall championship."
10016010-107 = "Are you two kidding me right now?!"
10016010-108 = "From an academy's perspective, fine! I understand how important winning the festival is. But this event is supposed to overcome school boundaries! You're putting your own personal wants before our actual duty: the field day operations!"
10016010-109 = "It's not as if Millennium wouldn't love to bring home the win!"
10016010-111 = "Is that so? I thought Millennium students traditionally shunned sports and insisted on the superiority of science and technology."
10016010-112 = "That is true. They've never even placed within the rankings of the Interhigh Baseball Championship. Millennium has always been more known for their oddball antics rather than their sporting performances..."
10016010-114 = "Th-That's true, but...!"
10016010-115 = "But we're going to work just as hard on the field as we did behind the scenes to make this festival happen!"
10016010-116 = "Millennium Science School will use state-of-the-art scientific analyses and sports training to win the overall championship! You'll see!"
10016010-124 = "I don't think they heard my advice about productive communication earlier..."
10016010-125 = "I volunteered of my own accord, excited at the prospect of participating in a festival that represents Kivotos' peace. Perhaps I should've known better."
10016010-126 = "[s3] \"Doesn't everyone look so energetic?\"\n[s4] \"People can get a bit tense before a match, can't they?\""
10016010-127 = "Yes, I suppose so..."
10016010-128 = "Yes, I suppose so..."
10016010-132 = "And why does your track suit emphasize your chest so much?! Do Trinity students not even know how to dress properly?"
10016010-133 = "My jacket wouldn't zip up all the way... I did try..."
10016010-134 = "Anyway, who're you to be criticizing my outfit?! Take a look in the mirror!"
10016010-135 = "I do hope everything goes smoothly today."

[translation]
1003915-1 = "RABBIT 4 Remembers"
1003915-2 = "A building rooftop near Kousagi Town"
1003915-3 = "I went to the specified building rooftop to help out Miyu with her mission."
1003915-7 = "It was still early in the morning, so the cold wind on the rooftop chilled me to the bone."
1003915-8 = "Current time is 0830. Temperature, seven degrees Celsius. Wind speed is 20 knots, from the southwest..."
1003915-9 = "No sightings of the target, Tango Charlie, yet..."
1003915-10 = "[s1] \"I hate to bug when you're so focused...\"\n[s2] \"...But what kind of animal are you looking for?\""
1003915-13 = "Oh, S-Sensei."
1003915-14 = "Y-You see..."
1003915-15 = "We received a request from locals to eliminate a crow that's been going through trash cans in the area."
1003915-16 = "[s] \"A crow?\""
1003915-17 = "Y-Yes. They said that a crow in the area has been ripping up trash bags in search of shiny things to steal."
1003915-18 = "The problem is, crows are r-really smart. They're hard to get."
1003915-19 = "They know to hide from guns and even what times areas are less crowded and safe to pillage."
1003915-20 = "S-So, I'm going to hide on this rooftop with this tranquilizer gun all day, and try to catch the crow alive."
1003915-21 = "Given all that... Do you really want to wait with me, Sensei?"
1003915-22 = "Sniper missions tend to be a lot of waiting... We have no idea when the target will appear."
1003915-23 = "[s3] \"Don't worry about me, I'm fine.\"\n[s4] \"Sitting around is my secret talent.\""
1003915-26 = "Well, that's a relief, if you mean it..."
1003915-27 = "I-In that case, I'll continue my surveillance."
1003915-33 = "...But the cold only got worse, and it was getting unbearable."
1003915-36 = "[ns] \"Ugh...\""
1003915-37 = "S-Sensei... Are you cold?"
1003915-38 = "You've been shivering this entire time."
1003915-39 = "[s5] \"I-I'm fine...\"\n[s6] \"Are you NOT cold, Miyu?\""
1003915-42 = "I-I've always been more sensitive to high temperatures rather than the cold..."
1003915-43 = "My ghillie suit is p-pretty thick as well, so that helps too."
1003915-44 = "[s7] \"I need to move around to warm up.\"\n[s8] \"I'll go grab a warm drink at the convenience store.\""
1003915-47 = "A warm drink..."
1003915-48 = "W-Wait, Sensei. Just a moment... I have it... Right here! You can have this."
1003915-54 = "It's hot cocoa. Please, help yourself."
1003915-55 = "We've been up here for a while, but I think the thermos should've kept it warm..."
1003915-59 = "[ns9] \"Mmm. It's nice and toasty.\"\n[ns10] \"That saved me. Thank you.\""
1003915-63 = "O-Of course. I'm really happy I could do something for you, Sensei."
1003915-64 = "[s11] \"You always bring this thermos on missions.\"\n[s12] \"Is it to keep you hydrated?\""
1003915-67 = "Actually, snipers avoid drinking liquids during missions as much as possible."
1003915-68 = "It'd be a problem if we lost the target because we had to go to the bathroom."
1003915-69 = "So, we hold off on drinking anything until the end of the operation, no matter how thirsty we are."
1003915-70 = "[s] \"Then what's the purpose of the thermos?\""
1003915-71 = "That's... My squad members made this hot cocoa."
1003915-72 = "Whenever we have a mission during cold weather, they make me some hot cocoa or tea to help keep me warm."
1003915-73 = "So, I use the thermos to warm my hands throughout the mission."
1003915-74 = "It's nice, because it's almost as if my squad members are right here with me, even though I'm by myself."
1003915-75 = "[s] \"You really treasure your squad members.\""
1003915-76 = "...Of course."
1003915-77 = "After all, together, we all make up the RABBIT Squad!"
1003915-79 = "For the remainder of the mission, we passed the thermos of hot cocoa back and forth, courtesy of the RABBIT squad's warm love."

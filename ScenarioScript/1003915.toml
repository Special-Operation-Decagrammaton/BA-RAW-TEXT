[translation]
1003915-1 = "RABBIT 4 จำได้ค่ะ"
1003915-2 = "ดาดฟ้าอาคารใกล้ๆ โคะอุซางิ ทาวน์"
1003915-3 = "(คุณครูขึ้นมาบนดาดฟ้าอาคารที่อยู่ใกล้ๆ โคะอุซางิ ทาวน์เพื่อช่วยมิยุทำ 'ภารกิจ')"
1003915-7 = "(เนื่องจากเป็นตอนเช้าตรู่ จึงรู้สึกว่าลมบนดาดฟ้าเย็นยะเยือกมากกว่าปกติ)"
1003915-8 = "ขณะนี้เวลา 08.30 น. อุณหภูมิ 7 องศาเซลเซียส ลมพัดจากทางทิศตะวันตกเฉียงใต้ความเร็ว 20 นอร์ต... "
1003915-9 = "ไม่พบร่องรอยของแทงโก้ ชาร์ลีที่เป็นเป้าหมาย... "
1003915-10 = "[s1] \"ครูขอโทษนะที่มาขัดตอนกำลังใช้สมาธิ...\"\n[s2] \"กำลังดูตัวอะไรอยู่เหรอ?\""
1003915-13 = "อ๊ะ คุณครู"
1003915-14 = "เอ่อ คือว่าเรื่องนั้น..."
1003915-15 = "พอดีว่าพวกชาวเมืองที่อยู่ใกล้ๆ นี้ขอให้มาช่วยไล่เจ้าอีกาตัวแสบที่ชอบมารื้อถังขยะจนเลอะเทอะ#nน่ะค่ะ..."
1003915-16 = "[s] \"อีกา...?\""
1003915-17 = "ค่ะ อีกาตัวหนึ่งที่อยู่แถวๆ นี้ชอบมาฉีกรื้อถุงขยะ หรือไม่ก็ขโมยของที่เป็นประกายไปบ่อยๆ จนทุกคนปวดหัวไปตามๆ กันเลย..."
1003915-18 = "อีกาเป็นสัตว์ที่ฉลาดมากๆ เพราะงั้นเลยจับตัวยากน่ะค่ะ"
1003915-19 = "เวลาเห็นนักเรียนที่ถือปืนเดินผ่านไปมา มันก็จะหนีไปแอบ และในตอนที่คนพลุกพล่านมันก็#nจะไม่ยอมโผล่มาเลย..."
1003915-20 = "ที่วันนี้ขึ้นมาซุ่มดักรอบนดาดฟ้าแบบนี้ ก็เผื่อว่าถ้าเจ้าอีกาโผล่มา ฉันก็จะใช้กระสุนยาสลบยิง#nทันทีค่ะ"
1003915-21 = "ยังไงก็เถอะค่ะ... คุณครูมาอยู่ที่นี่กับฉันจะไม่เป็นไรจริงๆ เหรอคะ?"
1003915-22 = "เงื่อนไขพิเศษของภารกิจซุ่มยิงคราวนี้คืออาจต้องเสียเวลารออย่างไร้จุดหมาย เพราะไม่รู้ว่า#nเป้าหมายจะโผล่ออกมาตอนไหน..."
1003915-23 = "[s3] \"ครูโอเค ไม่ต้องกังวลไปนะ\"\n[s4] \"ถ้าให้นั่งรอเฉยๆ ละก็ ครูชินแล้วละ\""
1003915-26 = "ได้ยินแบบนั้นก็ค่อยโล่งใจหน่อยค่ะ..."
1003915-27 = "ถะ... ถ้างั้นฉันขอกลับไปสังเกตการณ์เป้าหมายก่อนนะคะ"
1003915-33 = "(...เวลาผ่านไปพร้อมกับลมหนาวที่พัดมาเรื่อยๆ จนเริ่มทนไม่ไหว)"
1003915-36 = "[ns] \"บรื้อ...\""
1003915-37 = "คะ... คุณครู หนาวมากเลยใช่มั้ยคะ?"
1003915-38 = "เหมือนจะตัวสั่นหงึกๆ มาตั้งแต่เมื่อก่อนหน้านี้แล้วด้วย..."
1003915-39 = "[s5] \"ครู...ครูยังไหว...\"\n[s6] \"ว่าแต่ว่ามิยุไม่หนาวเหรอ?\""
1003915-42 = "อืม ถ้าเทียบกันแล้วฉันทนอากาศหนาวได้มากกว่าอากาศร้อนน่ะค่ะ..."
1003915-43 = "แถมตอนนี้ก็ใส่ชุดกิลลี่สูทหนาๆ อยู่ด้วย ก็เลยช่วยทนหนาวได้ระดับหนึ่ง..."
1003915-44 = "[s7] \"พออยู่เฉยๆ แบบนี้ก็ยิ่งหนาวใหญ่เลย...\"\n[s8] \"เดี๋ยวครูไปซื้อเครื่องดื่มอุ่นๆ ที่ร้านสะดวกซื้อนะ\""
1003915-47 = "เครื่องดื่มอุ่นๆ..."
1003915-48 = "อ๊ะ รอก่อนค่ะคุณครู ฉันมีของอุ่นๆ อยู่ด้วยค่ะ"
1003915-54 = "นี่ค่ะ รับไว้สิคะ โกโก้ค่ะ"
1003915-55 = "หลังจากเริ่มทำภารกิจเวลาก็ผ่านไประยะหนึ่งแล้วก็จริง... แต่ฉันเก็บไว้ในขวดเก็บอุณหภูมิ มันก็เลยยังอุ่นอยู่ค่ะ"
1003915-59 = "[ns9] \"จริงด้วย ยังอุ่นอยู่เลย ช่วยได้เยอะเลยนะ...\"\n[ns10] \"ช่วยได้เยอะเลย ขอบใจนะ\""
1003915-63 = "ไม่เป็นไรเลยค่ะ ฉันดีใจที่พอจะช่วยคุณครูได้นะคะ"
1003915-64 = "[s11] \"พอนึกดูแล้ว มิยุพกกระบอกเก็บอุณหภูมินี่ไปทุกครั้งเลยนะ\"\n[s12] \"ที่พกกระบอกน้ำตลอด เอาไว้สำหรับแก้กระหายน้ำเหรอ?\""
1003915-67 = "เปล่าค่ะ ระหว่างที่ทำภารกิจซุ่มยิง ฉันจะไม่ค่อยดื่มน้ำหรอกค่ะ"
1003915-68 = "ถ้าเกิดเป้าหมายปรากฏตัวขึ้นมา แต่ดันปวดห้องน้ำขึ้นมามันจะแย่เอาน่ะค่ะ...."
1003915-69 = "ต่อให้หิวน้ำแค่ไหน แต่จะต้องอดทนรอจนกว่าจะปฏิบัติการเสร็จค่ะ"
1003915-70 = "[s] \"แล้วทำไมถึงพกไปด้วยทุกครั้งที่ออกปฏิบัติการล่ะ?\""
1003915-71 = "เรื่องนั้น... ฉันเตรียมโกโก้ร้อนให้สมาชิกคนอื่นค่ะ"
1003915-72 = "ทุกครั้งที่ต้องออกไปทำภารกิจในอากาศหนาวๆ ฉันก็จะชงโกโก้ร้อนหรือชาร้อนไปด้วย..."
1003915-73 = "แล้วอีกอย่าง ถ้าพกกระบอกน้ำที่ใส่เครื่องดื่มอุ่นๆ ไปแล้วเอามาถือไว้ระหว่างทำภารกิจ ก็จะรู้สึกอุ่นขึ้นด้วย..."
1003915-74 = "ถึงจะอยู่ไกลกันกับสมาชิกคนอื่นๆ แต่ก็จะรู้สึกเหมือนอยู่ใกล้ๆ กับทุกคนด้วยค่ะ"
1003915-75 = "[s] \"มิยุให้ความสำคัญกับสมาชิกคนอื่นๆ มากเลยนะ\""
1003915-76 = "ค่ะ..."
1003915-77 = "ก็พวกเราคือสมาชิกของกองทหาร RABBIT นี่คะ!"
1003915-79 = "(หลังจากนั้นคุณครูกับมิยุก็แบ่งโกโก้ร้อนดื่มกัน แล้วก็กลับไปทำภารกิจต่อ)"

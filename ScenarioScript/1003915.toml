[translation]
1003915-1 = "#title;RABBIT 4, 추억합니다."
1003915-2 = "#place;코우사기 타운 근교 빌딩 옥상"
1003915-3 = "#na;(미유의 '임무'를 돕기 위해 코우사기 타운 근처에 있는 빌딩 옥상에 올랐다.)"
1003915-4 = "#st;[0,0];instant;1;"
1003915-5 = "#clearST"
1003915-6 = "#wait;3000"
1003915-7 = "#na;(……이른 아침이라 그런지 옥상위로 부는 바람은 평소보다 더욱 차갑게 느껴졌다.)"
1003915-8 = "3;미유;05;현재 시각은 0830시. 기온은 섭씨 7도. 바람은 서남서 방향에서 20노트……\n#3;a\n#3;em;…"
1003915-9 = "3;미유;05;목표, 탱고 찰리의 동향은 확인되지 않음……"
1003915-10 = "[s1] \"저기, 집중 중에 방해해서 미안한데……\"\n[s2] \"……어떤 동물을 노리고 있는 거야?\""
1003915-11 = "#wait;100"
1003915-12 = "#wait;100"
1003915-13 = "3;미유;02;아, 선생님.\n#3;em;[반응]"
1003915-14 = "3;미유;01;그게 그러니까……"
1003915-15 = "3;미유;00;이 근처에 사시는 주민분들이 쓰레기장을 엉망으로 만드는 까마귀를 퇴치해달라고 부탁을 하셔서요……"
1003915-16 = "[s] \"까마귀?\""
1003915-17 = "3;미유;02;네. 이 주변에 나타나는 까마귀 한 마리가 쓰레기봉투를 찢어 놓거나 반짝이는 물건을 훔쳐 가서 골칫거리가 되는 모양인데……"
1003915-18 = "3;미유;01;까마귀는 생각보다 영리한 생물이라 쉽게 잡기가 어렵거든요."
1003915-19 = "3;미유;99;총을 든 학생이 모습을 보이면 숨어 버리기도 하고, 사람이 오가는 시간대를 기억해 두었다가 인적이 드문 때 나타나기도 해서……\n#3;em;…"
1003915-20 = "3;미유;01;오늘은 이렇게 옥상에 숨어서 기다리다가 까마귀가 나타나면 마취탄을 써서 사로잡으려고요."
1003915-21 = "3;미유;02;그나저나…… 선생님은 저랑 같이 이곳에 있으셔도 괜찮으시겠어요?\n#3;em;[?]"
1003915-22 = "3;미유;04;저격 임무의 특성상 이번에도 언제 나타날지 모르는 목표를 이 자리에서 하염없이 기다려야 하는데……"
1003915-23 = "[s3] \"난 괜찮으니 신경 쓰지 마.\"\n[s4] \"앉아서 기다리는 일이라면 익숙하거든.\""
1003915-24 = "#wait;100"
1003915-25 = "#wait;100"
1003915-26 = "3;미유;02;그렇다면 다행이지만……"
1003915-27 = "3;미유;05;그럼 저는 다시 목표 지점을 관측하고 있겠습니다."
1003915-28 = "#all;hide"
1003915-29 = "#wait;1000"
1003915-30 = "#wait;1000"
1003915-31 = "#wait;1000"
1003915-32 = "#wait;1000"
1003915-33 = "#na;(……하지만 시간이 지나도 추위는 계속되어, 서서히 견디기 어려워졌다.)"
1003915-34 = "#all;hide"
1003915-35 = "#wait;3000"
1003915-36 = "[ns] \"으으……\""
1003915-37 = "3;미유;02;서, 선생님. 혹시 많이 추우신가요?\n#3;a\n#3;em;[반응]"
1003915-38 = "3;미유;01;아까 전부터 계속 떨림이 멈추지 않는 것처럼 보이시는데……"
1003915-39 = "[s5] \"나, 나는 괜찮아……\"\n[s6] \"그보다 미유는 춥지 않아?\""
1003915-40 = "#wait;100"
1003915-41 = "#wait;100"
1003915-42 = "3;미유;02;네. 저는 원래부터 추위보다는 더위에 더 약한 편이었고……"
1003915-43 = "3;미유;03;지금은 두꺼운 길리슈트도 뒤집어쓰고 있으니 어느 정도 방한 대책이 되어서요……"
1003915-44 = "[s7] \"역시 가만히 있으니 추위가 파고드는 것 같네……\"\n[s8] \"잠깐 따듯한 음료를 사러 편의점에 다녀올게.\""
1003915-45 = "#wait;100"
1003915-46 = "#wait;100"
1003915-47 = "3;미유;01;따듯한 음료라면……"
1003915-48 = "3;미유;02;아, 선생님. 잠시만 기다려 주세요. 마침 따듯한 걸 가지고 있었거든요.\n#3;em;[반응]"
1003915-49 = "#st;[0,0];instant;1;"
1003915-50 = "#clearST"
1003915-51 = "3;미유;02\n#3;d\n#wait;1000"
1003915-52 = "#wait;1500"
1003915-53 = "#wait;2500"
1003915-54 = "5;미유;01;자, 받아주세요. 코코아예요.\n#5;a"
1003915-55 = "5;미유;02;임무를 시작한 후로 시간은 꽤 지났지만… 보온병에 담아두었으니 아직도 따듯할 거예요."
1003915-56 = "#all;hide"
1003915-57 = "#wait;1000"
1003915-58 = "#wait;1000"
1003915-59 = "[ns9] \"정말이다. 아직 따듯해……\"\n[ns10] \"덕분에 살았어. 고마워.\""
1003915-60 = "#wait;10"
1003915-61 = "#wait;10"
1003915-62 = "3;미유;02\n#3;a"
1003915-63 = "3;미유;03;아녜요. 오히려 선생님께 도움이 될 수 있어서 제가 더 기쁜걸요."
1003915-64 = "[s11] \"그러고 보니 이 보온병은 작전 때마다 늘 갖고 다니는 것 같네.\"\n[s12] \"역시 수분 보충 용도로 가지고 다니는 거야?\""
1003915-65 = "#wait;100"
1003915-66 = "#wait;100"
1003915-67 = "3;미유;02;아뇨. 오히려 저격수는 작전 중에는 물을 거의 마시지 않아요."
1003915-68 = "3;미유;01;목표가 나타났는데 물 때문에 화장실에 가고 싶어진다면 곤란하니까요……"
1003915-69 = "3;미유;05;아무리 목이 말라도 수분 보충은 작전이 끝날 때까지 참는 편이랍니다."
1003915-70 = "[s] \"그럼 어째서 작전 때마다 일부러 보온병을 들고 다니는 거야?\""
1003915-71 = "3;미유;02;그게…… 이 코코아는 다른 소대원들이 타 준 거거든요.\n#3;em;…"
1003915-72 = "3;미유;01;추운 날 멀리 작전을 나갈 때면 춥지 않도록 따듯한 코코아나 차를 한가득 끓여주는데……"
1003915-73 = "3;미유;99;보온병 가득 음료를 담아 두고 임무 중에 가끔씩 만져보면 따듯한 온기가 느껴져서……\n#3;em;[///]\n#3;stiff"
1003915-74 = "3;미유;03;작전 중에 떨어져 있더라도 다른 소대원들과 함께 있는 느낌이 들어서 좋아요."
1003915-75 = "[s] \"소대원들을 소중히 여기고 있구나.\""
1003915-76 = "3;미유;03;……네."
1003915-77 = "3;미유;11;저희는 다 같은 RABBIT 소대의 일원이니까요!\n#3;em;[반짝]"
1003915-78 = "#all;hide"
1003915-79 = "#na;(이후, 미유와 함께 소대원들의 따듯한 정성이 담긴 코코아를 나누어 마시며 임무를 계속했다.)"

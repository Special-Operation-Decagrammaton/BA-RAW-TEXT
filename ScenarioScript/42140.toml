[translation]
42140-1 = "第14話;囚徒困境"
42140-2 = "（收拾完行李，從兔寶寶公園回來的時候已經很晚了……）"
42140-7 = "夏萊大樓．天使24便利商店"
42140-10 = "（看向便當的陳列架時……）"
42140-14 = "[ns]「咦？連一個便當都沒有……？」"
42140-15 = "不，不好意思……今天便當都賣光了。"
42140-16 = "[s1]「本來還想說今天晚餐要吃便利商店便當的……」\n[s2]「也就是說，連過期便當都沒有……？」"
42140-19 = "是的……就連總是被報廢的豆芽菜便當也……"
42140-20 = "此外，只有我們分店不知為何從昨天開始被禁止進貨便當……"
42140-21 = "即使詢問原因，對方也只說是最新的行政命令……#n就連已經預訂的便當也全都被取消了……"
42140-22 = "現在店裡就只剩下礦泉水而已了……"
42140-23 = "[s]「連麵包跟飲料也沒有……？」"
42140-24 = "是的。不只是麵包，就連各種飲料也都無法進貨……"
42140-25 = "今天幾乎是半停業狀態。#n造成麻煩真是非常抱歉……"
42140-26 = "[s3]「沒關係，這不是空的錯。」\n[s4]（報復方式還真是比想像中更加微妙……）"
42140-33 = "老，老師……那個，關於最近D.U.發生的事，#n老師知道些什麼嗎？"
42140-34 = "自從前天市區發生騷動以後，人潮就突然消失了……#n總公司的氣氛也有點詭異……"
42140-35 = "凱薩保全送來了一本厚厚的指南，說是服務業的新規則……#n還派了一些凶神惡煞的人到店裡來，說是要確認有沒有遵守行政命令……"
42140-36 = "我還聽見「天使24」可能會關門大吉，由「凱薩26」取而代之的傳聞……#n該怎麼辦才好呢？"
42140-37 = "「凱薩26」的工作環境似乎糟糕到一天工作26小時也不夠的程度……#n在那種地方工作的話，我一定會過勞死的……"
42140-38 = "[ns5]「原來26是這個意思啊……」\n[ns6]「一天工作26小時是不可能的吧……？」"
42140-43 = "[ns]「空有吃過晚餐了嗎？」"
42140-44 = "嗯。我有帶便當來所以沒問題。"
42140-45 = "昨天不小心做了太多馬鈴薯燉肉──"
42140-50 = "啊，那個……"
42140-51 = "如果……不介意的話……"
42140-52 = "[ns]「沒，沒關係！不用擔心我！」"
42140-57 = "（再怎麼說也不能收下空的便當，於是慌忙回到了夏萊的辦公室）"
42140-59 = "夏萊．辦公室"
42140-63 = "[ns]「肚子好餓……」"
42140-69 = "「『FOX EATS』到囉！」"
42140-70 = "「[USERNAME]客人，您有點外送便當對吧？」"
42140-74 = "[ns]「呃，我沒有點外送啊……」"
42140-75 = "「真奇怪……我們有接到送一人份的豆皮壽司到這裡的訂單呀」"
42140-76 = "「為了進行確認，可以請您開門一下嗎？」"
42140-80 = "[ns7] 開門\n[ns8] 不開門"
42140-85 = "「……非常感謝」"
42140-91 = "[ns9]「你們是那時候的……？」"
42140-92 = "你好，老師。很高興能再見到你。"
42140-93 = "嗨！"
42140-94 = "唉……想不到居然還會再見到你……"
42140-98 = "老師吃過晚飯了嗎？"
42140-99 = "「……真沒辦法，也不能就這麼回去……」"
42140-104 = "「……設置完成，準備引爆。」"
42140-105 = "[s10]「……在做什麼？」"
42140-110 = "「3……2……1……」"
42140-114 = "[ns11]「等等，我現在就開門──」"
42140-125 = "哎呀，威力比想像中還大呢。"
42140-126 = "御伽！你在破門的時候到底用了多少炸藥啊？#n連門帶框都被你炸飛了不是嗎！"
42140-127 = "抱歉抱歉，畢竟我是狙擊手，所以不太習[ruby=限制空間戰鬥]慣CQB嘛[/ruby]。"
42140-128 = "啊哈哈……不好意思，老師。#n我們會馬上把門修好的……"
42140-129 = "[s12]「你們是那時候的……？」"
42140-133 = "你好……雖然是讓人有點哭笑不得的情況……#n很高興能再見到你，老師。"
42140-134 = "老師吃過晚飯了嗎？"
42140-137 = "[ns]「還沒有哦。」"
42140-138 = "……果然如此。"
42140-139 = "因為這次行政命令的關係，似乎影響到了便利商店的物流……"
42140-141 = "說什麼影響，不過就是有人因為不對他言聽計從就故意搗亂吧。"
42140-142 = "又不是小學生……竟然做出這種事，真像個笨蛋。"
42140-143 = "不過，在敵人野營時切斷對方的兵糧也是一種戰略。"
42140-144 = "無論有著多麼堅強的意志，肚子餓了也是無法戰鬥的。"
42140-146 = "我覺得老師應該也不是在夏萊野營吧……"
42140-150 = "那個，總之我們FOX EATS……#n不對，FOX小隊準備了一些簡單的餐點。"
42140-151 = "[ns]「這是……豆皮壽司？」"
42140-152 = "是的。老師之前也吃過我做的豆皮壽司對吧？"
42140-153 = "看你吃得好像挺開心的……所以就做了跟當時作法相同的豆皮壽司過來。"
42140-154 = "我準備了很多，請盡量吃吧。"
42140-156 = "嘛，我想他大概也不敢吃我們帶來的食物吧──"
42140-160 = "[ns] 吃下豆皮壽司"
42140-167 = "……這麼輕易就吃了？"
42140-168 = "咦……？真假……？#n這傢伙不妙啊……沒有警戒心嗎……？"
42140-170 = "那個，沒問題嗎……？"
42140-171 = "[s13]「沒問題，很好吃哦。」\n[s14]「不只相當入味，飯也軟硬適中，真是太好吃了！」"
42140-174 = "不，我不是那個意思……"
42140-179 = "雖然好像不該由我們這麼問……#n老師都不會懷疑裡面有沒有下毒嗎？"
42140-180 = "[s]「……嗯？這個豆皮壽司有毒嗎？」"
42140-181 = "不，這倒是沒有……"
42140-185 = "我說，你好像誤會了什麼……我們現在可是敵對關係哦。"
42140-186 = "既然是夏萊的老師，應該已經知道了吧？#n我們FOX小隊為了讓SRT特殊學園復活，已經跟香耶聯邦學生會長代理聯手了。"
42140-187 = "明明拒絕了香耶聯邦學生會長代理的提議，#n卻認為與他聯手的我們會不帶任何企圖地帶食物來給你嗎？"
42140-188 = "人就算再怎麼好也該有個限度吧……"
42140-189 = "雖然也有「贈鹽予敵」這類的故事沒錯，但通常不碰敵人送的東西才是明智之舉吧？"
42140-190 = "在戰場上，有時也會考量被敵人奪走的情況而故意帶著品質不良的子彈……"
42140-191 = "在SRT也被多次強調「在敵陣中除了自己帶來的食物外連水都不要喝」這句話……"
42140-192 = "[ns]「我不是你們的敵人。」"
42140-196 = "[ns]「……只是老師而已。」"
42140-200 = "唔嗯……"
42140-201 = "……看來是個跟傳聞中一樣的人啊。"
42140-203 = "就算不是敵人，輕易相信別人的話之後可是會吃到苦頭的哦。"
42140-204 = "要是太容易相信他人會給人不成熟的印象……很容易在交涉中吃虧的。"
42140-205 = "在社會裡，最好時刻對他人保持懷疑……#n若是沒有多加提防就會遭受損失……"
42140-206 = "……老師也是大人，這點道理應該懂吧？"
42140-207 = "[s]「因信任而獲得的東西，往往比因懷疑而失去的東西來得多。」"
42140-209 = "……哼。"
42140-210 = "老師沒聽過「囚徒困境」嗎？"
42140-211 = "就是在雙方都做出有利於對方的選擇就沒有人會蒙受損失，#n但一旦對方背叛自己就會被加重罪刑的狀況下──#n討論什麼樣的選擇最為「合理」的理論……"
42140-212 = "也就是說──無論對方的選擇為何，都因為背叛較為有利而永遠會選擇背叛。"
42140-213 = "實際上，我們也面對過無數的「囚徒」……#n然而從來沒有任何一個人做出有利於對方的選擇。"
42140-214 = "……大人口中的「信任」，在本質上也是一樣的。"
42140-215 = "[s15]「聽起來有點複雜……不過挺有趣的呢。」\n[s16]「……真不愧是SRT的菁英！」"
42140-218 = "哼，就算不是菁英，知道這種程度的事也是理所──"
42140-222 = "不對，現在不是稱讚別人的時候吧……！"
42140-223 = "真好搞定……"
42140-224 = "[s]「不過，現實還是多少有點不同吧？」"
42140-225 = "當然，如果要套用在現實情況的話，就必須再增加各式各樣的變數才行。"
42140-226 = "像是這個選擇所帶來的結果，會對未來造成什麼樣的影響之類的……"
42140-227 = "……但是老師，這個遊戲也可以一局定勝負。"
42140-228 = "在敗者永遠無法回來的野生社會中，#n最有效的就是「永遠背叛對方，使其抱持恐懼」──All-Defect戰略"
42140-230 = "……等這次的事情結束後，我們也許再也不會回來了。"
42140-231 = "而且我們是武器，並不會記得老師所做的選擇。"
42140-232 = "這個選擇也不會影響到其他學生。"
42140-233 = "即便如此，你還是相信我們……相信學生嗎？"
42140-234 = "[s]「相信。」"
42140-236 = "只是嘴上說說當然──"
42140-237 = "……冷靜點，胡桃。"
42140-239 = "大家明明連今天的事都無法承諾，老師卻願意把希望賭在明天的可能性上呢。"
42140-240 = "[ns]「當然。」"
42140-245 = "[ns17]「因為我是老師。」\n[ns18]「引導明天就可能成為大人的孩子們就是我的職責。」"
42140-253 = "……怪人。"
42140-254 = "……真的跟傳聞中一模一樣。"
42140-255 = "[s]「況且，你們不也向我證明了『信任』的強大之處嗎？」"
42140-257 = "[ns19]「我聽說FOX小隊是對小隊長相當信任的隊伍。」\n[ns20]「我認為FOX小隊的強大，正是來自隊員間的信任關係哦。」"
42140-260 = "你是說雪乃醬嗎……"
42140-261 = "……嘛，是沒錯啦。"
42140-262 = "……畢竟是小隊長嘛。"
42140-266 = "[ns]「……怎麼了嗎？」"
42140-272 = "不，沒什麼……"
42140-273 = "FOX小隊的羈絆比什麼都堅固。"
42140-275 = "至少絕對不會因為像狸貓的老師的一句話就動搖。"
42140-276 = "……畢竟在他成為小隊長以前，我們就已經是好友了啊。"
42140-278 = "謝謝你。那麼既然已經了解老師的真實想法……"
42140-283 = "而且便當也已經送到，我們差不多該回去了。"
42140-284 = "這麼晚來打擾真是非常抱歉。#n突然向老師提問也有點過意不去……"
42140-285 = "雖然可能算不上是補償，老師有沒有問題想問我們的呢？"
42140-286 = "[s21]「我聽說RABBIT小隊和你們會合了……」\n[s22]「RABBIT小隊的大家過得還好嗎？」"
42140-289 = "RABBIT小隊現在……"
42140-290 = "小隊的位置姑且算是機密，不太方便告訴老師呢……"
42140-299 = "……從夏萊前的公車站搭乘開往新木呂尾的十號公車並在終點站下車，#n之後沿著乾涸的溪谷往東走1km左右就能看見一座地圖上沒有標示的設施。"
42140-300 = "雖然看起來像是座廢棄的露營場，#n不過那裡其實是聯邦學生會長在失蹤前為SRT學生的訓練和作戰建造的軍事設施。"
42140-301 = "……RABBIT小隊就在那個地方。"
42140-302 = "那些孩子們是否安好，就請[USERNAME]老師親自確認吧。"
42140-304 = "等等，仁子！為什麼要說出來啊？"
42140-305 = "他們所在的營地位置可是二級機密哦？"
42140-306 = "沒關係，只是問問是否安好不會出問題的。"
42140-307 = "不過如果被抓包的話會被罵的……你們要跟雪乃醬保密哦。"
42140-308 = "你真的是……！"
42140-309 = "唉……發生什麼事我可不管喔。"
42140-311 = "畢竟是副小隊長的命令，我們還能說不嗎？"
42140-312 = "呵呵，謝謝。"
42140-313 = "如果[USERNAME]老師能讓那些孩子改變的話，說不定我們總有一天也……"
42140-318 = "那麼，後會有期……"
42140-319 = "不，請保重──老師。"
42140-326 = "（FOX小隊離開後，一邊吃著剩下的豆皮壽司，一邊思考著未來的方向）"
42140-330 = "（……仁子帶來的豆皮壽司，味道似乎比之前重了一些）"
42140-332 = "下一話;SRT的正義"

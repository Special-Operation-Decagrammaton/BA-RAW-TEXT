[translation]
42140-1 = "Episode 14; Prisoner's Dilemma"
42140-2 = "By the time I left Kousagi Park and returned to Schale, it was already late into the evening..."
42140-7 = "Schale Building, Angel 24 Convenience Store"
42140-10 = "I approached the counter to pick up a bento, but..."
42140-14 = "[ns] \"Huh? There's none left?\""
42140-15 = "I'm sorry, Sensei. We ran out today."
42140-16 = "[s1] \"I just needed something to eat...\" \n[s2] \"Is there anything else? Some expired ones?\""
42140-19 = "No, sorry... We ran out of every single bento in stock..."
42140-20 = "For some reason, only this Angel 24, located in Schale, didn't get any of the bentos since yesterday."
42140-21 = "I tried to find out why but was told it's due to a new order and that even the scheduled bentos were canceled..."
42140-22 = "All we have left for sale is water..."
42140-23 = "[s] \"So there's no bread or any other kind of drinks...?\""
42140-24 = "Yeah... Basically anything to eat or drink..."
42140-25 = "I know I'm still here, but we've pretty much just been closed today. I'm sorry for the inconvenience..."
42140-26 = "[s3] \"It's okay. It's not your fault, Sora.\"\n[s4] \"(This is a much pettier method of revenge than I expected...)\""
42140-33 = "Um, Sensei? Do you know anything about what's been going on in D.U.?"
42140-34 = "After the coup and stuff, it's been completely dead here. I haven't heard anything from the store's main branch."
42140-35 = "They gave us these new manuals to memorize, but there were so many regulations! And then these scary Kaiser guards come in sometimes to make sure we're following all their rules..."
42140-36 = "People are saying that all the Angel 24 shops are gonna close and be replaced with Kaiser 26 shops... My job..."
42140-37 = "I've heard really scary things about the Kaiser 26 shops. I heard they have to work a full twenty-six hours in a day, Sensei! I don't think I could last..."
42140-38 = "[ns5] \"I was wondering where the 26 came from...\"\n[ns6] \"...It's impossible to work 26 hours a day...\""
42140-43 = "[ns] \"Were you able to eat despite all that?\""
42140-44 = "Yes. Luckily, I packed myself lunch today."
42140-45 = "I made too much meat and potato stew yesterday, so I just brought the leftovers for dinner..."
42140-50 = "Oh, um..."
42140-51 = "If you want, you can have mine."
42140-52 = "[ns] \"N-No! It's okay, really!\""
42140-57 = "I couldn't bring myself to take Sora's dinner so I politely refused and headed back to the Schale Executive Office."
42140-59 = "Schale Executive Office"
42140-63 = "[ns] \"I'm starving...\""
42140-69 = "Hey, FOX EATS delivery here!"
42140-70 = "I've got a food delivery for someone named... [USERNAME]?"
42140-74 = "[ns] \"Uh... I didn't order any food, though.\""
42140-75 = "Odd... I have an order for an inarizushi bento, supposed to be delivered right here to the Schale Executive Office."
42140-76 = "If you open the door, I can verify the details for you!"
42140-80 = "[ns7] Open the door.\n[ns8] Don't open the door."
42140-85 = "...Thank you."
42140-91 = "[ns9] \"You guys...?\""
42140-92 = "Good evening, Sensei. It's been a while."
42140-93 = "Hey, hey."
42140-94 = "I can't believe we came all this way just to see you..."
42140-98 = "It's rather late. Have you had dinner yet?"
42140-99 = "What else do you want me to do? We can't just leave without giving them the food!"
42140-104 = "Adhesive explosives secure. Everyone, take cover"
42140-105 = "[s10] \"Hold on! What's going on here?\""
42140-110 = "Three... two... one..."
42140-114 = "[ns11] \"Wait, wait, wait! I can just–!\""
42140-125 = "Wow, that did a little more than I expected."
42140-126 = "Otogi, how much did you put on that charge? The door's completely blown off!"
42140-127 = "Oops, my bad. I'm a sniper, don't blame me for not knowing how explosives work."
42140-128 = "Hahaha... So sorry, Sensei. We'll get that door fixed right up for you, scout's honor."
42140-129 = "[s12] \"You guys...?\""
42140-133 = "I'd say good evening, but given the circumstances... Still, we're genuinely glad to see you again, Sensei."
42140-134 = "It's rather late. Have you had dinner yet?"
42140-137 = "[ns] \"Not yet.\""
42140-138 = "We had a feeling you hadn't."
42140-139 = "I heard there were...some unexpected hiccups in the supply chain as we transitioned power, and Schale's store was somehow...missed..."
42140-141 = "You really tried there, Niko. We all know it's just someone throwing a petty fit."
42140-142 = "Messing with food supplies, really? That's just childish."
42140-143 = "But pretty tactical, if you think about it."
42140-144 = "An empty stomach is going to win out over your ideals every time."
42140-146 = "It's not as if Sensei is staging a sit-in at Schale's executive office though. It's...a little bit immature."
42140-150 = "Well, for now, we from FOX EATS... I mean, the FOX Squad will provide supplies where we can."
42140-151 = "[ns] \"Is this inarizushi?\""
42140-152 = "Yep. Do you remember the ones from last time?"
42140-153 = "You seemed to enjoy them, so I made more for you this time."
42140-154 = "Go ahead and enjoy."
42140-156 = "Though I understand and wouldn't be offended if you're a bit wary, given the current situation..."
42140-160 = "[ns] Eat Niko's inarizushi."
42140-167 = "...They're already eating, Niko."
42140-168 = "Wait... Did you just...eat it? Just like that?"
42140-170 = "Are you, well, not in your right state of mind perhaps?"
42140-171 = "[s13] \"I was so hungry... This is so good. I'm great, actually.\" \n[s14] \"The fried tofu is smooth and the rice is just the right texture!\""
42140-174 = "That's not what I meant..."
42140-179 = "I know it sounds odd for me to suggest it, but...did it ever cross your mind that we might have tampered with it?"
42140-180 = "[s] \"...Huh? Like, poison? Is this...?\""
42140-181 = "Well, no, but..."
42140-185 = "Sensei, I think you're missing the point. We're kind of on opposite sides right now."
42140-186 = "I'm sure you're well aware that we've allied with Acting President Kaya so that she'll support the revival of SRT."
42140-187 = "Shortly after rejecting Kaya to her face, people who work for her come offering food, and you don't suspect any ulterior motives?"
42140-188 = "Are you naive or are you stupid?"
42140-189 = "I know they say to keep your enemies close, but not so close you would eat their food!"
42140-190 = "You know, on the battlefield, sometimes we leave behind faulty ammunition for enemies to loot. It's a similar concept!"
42140-191 = "That's why SRT Academy teaches its students to never touch the food and water rations that belong to the enemy."
42140-192 = "[ns] \"But I'm not your enemy.\""
42140-196 = "[ns] \"...I'm just your teacher.\""
42140-200 = "Hmm..."
42140-201 = "You truly do live up to your reputation."
42140-203 = "Nothing good comes from such unconditional trust, even with allies or friends."
42140-204 = "If people see you as overly trusting, they might think you're naive and unreliable, which can hinder negotiations."
42140-205 = "Those who aren't wary or skeptical of others' motives tend to get the short end of the stick in life."
42140-206 = "Knowing this, why do you continue the way you do?"
42140-207 = "[s] \"I've learned that trust yields more benefits than suspicion ever could.\""
42140-209 = "...Philosophies and ideals."
42140-210 = "Do you know about the Prisoner's Dilemma, Sensei?"
42140-211 = "It's a psychological theory. Two prisoners are separated and given two options. If neither betrays the other, both prisoners are free to go. But if one chooses to cooperate and the other doesn't, only the betrayer goes free."
42140-212 = "In summary, two prisoners can either cooperate for mutual benefit or betray each other for personal gain. Typically, they end up betraying one another because it's the optimal choice."
42140-213 = "While it's just a theory, it emphasizes the need for self-preservation. We've dealt with all kinds of criminals, and I've never once seen someone sacrifice their well-being for someone else's benefit."
42140-214 = "...The so-called trust that adults brag about is no different."
42140-215 = "[s15] \"It's complicated, but your perspective is interesting!\"\n[s16] \"You really are SRT's elite force!\""
42140-218 = "It's basic game theory. You hardly need specialized training to..."
42140-222 = "What... D-D-D-Did you just compliment us?!"
42140-223 = "Oh, no. You've found her weak spot. All fear the compliment!"
42140-224 = "[s] \"But your theory... I think reality will often surprise you.\""
42140-225 = "Real life is more nuanced than some simple game theories, true."
42140-226 = "What effects will your decisions have on the future? Will the results of this game affect the next?"
42140-227 = "...But Sensei, this game isn't really about winning this round, or losing that one."
42140-228 = "The most effective method in winning anything is to make sure the loser can't return. Plant so much fear in your opponent, so much distrust and betrayal, they'll never oppose you again."
42140-230 = "Sensei, you'll likely never see us again when everything is said and done."
42140-231 = "We probably won't even remember your answer to this game, Sensei. We're weapons who can only point forward."
42140-232 = "It's an insignificant decision that no one'll care about at the end of the day."
42140-233 = "Given that, do you still trust us?"
42140-234 = "[s] \"I do.\""
42140-236 = "If you're not going to take us seriously, then–"
42140-237 = "Kurumi. Chill out."
42140-239 = "Even if we say we'll walk out of here today and forget all of this happened, you'll hang your hat on tomorrow's potential?"
42140-240 = "[ns] \"Of course.\""
42140-245 = "[ns17] \"My job is to teach you how to get to tomorrow, in whatever way you want.\" \n[ns18] \"That's the whole point. For my students to become tomorrow's adults.\""
42140-253 = "...You're quite the character, Sensei."
42140-254 = "...Just as weird as they say."
42140-255 = "[s] \"You know, your squad, the FOX Squad, is a testament to the power of trust.\""
42140-257 = "[ns19] \"I've seen how much trust the FOX Squad has in their leader.\"\n[ns20] \"The trust you have in Yukino is the core of your strength.\""
42140-260 = "Our trust in Yukino..."
42140-261 = "...Well, you're not wrong."
42140-262 = "She is our squad leader, after all."
42140-266 = "[ns] \"...Is there something wrong with that?\""
42140-272 = "No, not at all."
42140-273 = "The FOX Squad's bonds have always been unbreakable."
42140-275 = "So you can stop trying to slide your way in with your pretty words."
42140-276 = "She's our friend. She always has been, since before she became our squad leader."
42140-278 = "Well, this has certainly been an illuminating night."
42140-283 = "We've delivered your food, so our mission here is complete."
42140-284 = "It appears we dropped by unannounced, attacked you with a barrage of questions, and are now unceremoniously leaving. My apologies."
42140-285 = "To make up for it, did you want to ask us anything?"
42140-286 = "[s21] \"Is the RABBIT Squad happy with their decision?\" \n[s22] \"How are the RABBITs? Are they adjusting well? \""
42140-289 = "The RABBIT Squad is..."
42140-290 = "Our team locations are classified, so we can't divulge that..."
42140-299 = "...Take the 10 bus headed towards Shinkirou from the station in front of Schale, get off the final stop and walk 1 km east following the dried up valley, and you'll find a facility that's not on the map."
42140-300 = "It'll look like a deserted camp, but it's actually a fully operational training facility for SRT students, active since before the General Student Council President disappeared."
42140-301 = "The RABBIT Squad is stationed there right now."
42140-302 = "You can ask how they're doing yourself."
42140-304 = "Niko! You can't just tell them that!"
42140-305 = "The location of SRT squads is second class confidential information!"
42140-306 = "It's fine. They're not in prison, and they should be able to have visitors."
42140-307 = "But, um, if you could keep this under wraps, especially from Yukino..."
42140-308 = "I just can't with you."
42140-309 = "Whatever. I have no thoughts on this anymore."
42140-311 = "I'm technically outranked here, Deputy Squad Leader."
42140-312 = "Heehee. Thanks both of you."
42140-313 = "If Sensei can get through to those girls, maybe there's hope for us too..."
42140-318 = "Until next–"
42140-319 = "...Take care of yourself, Sensei."
42140-326 = "After they took off, I savored the remaining inarizushi as I wondered what to do next."
42140-330 = "...For some reason, Niko's inarizushi was even more delicious than last time."
42140-332 = "Next Episode; SRT's Justice"

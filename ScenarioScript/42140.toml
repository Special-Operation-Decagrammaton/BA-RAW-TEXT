[translation]
42140-1 = "ตอนที่ 14;สถานการณ์ลำบากของผู้ทำผิด"
42140-2 = "(กว่าจะเก็บของในโคะอุซางิ การ์เด้นเสร็จและกลับมาถึงชาเล่ต์ ก็เป็นเวลาค่ำแล้ว...)"
42140-7 = "ร้านสะดวกซื้อเอ็นเจล 24 ณ อาคารชาเล่ต์"
42140-10 = "(คุณครูเดินไปที่ชั้นวางสินค้าเพื่อซื้อข้าวกล่อง...)"
42140-14 = "[ns] \"เอ๋? ไม่มีข้าวกล่องเหลือเลยเหรอ?\""
42140-15 = "ขะ... ขอโทษค่ะคุณครู... วันนี้ไม่มีข้าวกล่องค่ะ"
42140-16 = "[s1] \"มื้อเย็นวันนี้กะจะฝากท้องไว้กับข้าวกล่องร้านสะดวกซื้อแท้ๆ...\"\n[s2] \"ที่ใกล้หมดอายุจนจะโละทิ้งแล้วก็ไม่มีเหรอ?\""
42140-19 = "ค่ะ แม้แต่ข้าวกล่องที่ขายไม่ค่อยดีจนเหลือทิ้งทุกวันก็ไม่มีค่ะ..."
42140-20 = "คือว่าจากนี้ร้านเอ็นเจล 24 ถูกสั่งห้ามไม่ให้ขายข้าวกล่องแล้วค่ะ แล้วก็เป็นเฉพาะที่สาขาชาเล่ต์เท่านั้น#nด้วย..."
42140-21 = "ฉันถามเหตุผลจากต้นทางแล้วนะคะ แต่ทางนั้นก็บอกว่าเป็นเพราะคำสั่งบริหารฉบับใหม่ และข้าวกล่อง#nที่สั่งไปทั้งหมดก็ถูกยกเลิกไปค่ะ..."
42140-22 = "ตอนนี้ของที่เหลือในร้านสะดวกซื้อมีแต่น้ำเปล่าค่ะ..."
42140-23 = "[s] \"ขนมปังหรือเครื่องดื่มก็ไม่มีเหรอ...?\""
42140-24 = "ค่ะ ทั้งขนมปังและเครื่องดื่มก็ถูกสั่งห้ามเหมือนกันค่ะ..."
42140-25 = "วันนี้ไม่ต่างกับปิดร้านเลยละค่ะ ขอโทษที่วันนี้เป็นร้านไม่สะดวกซื้อนะคะ..."
42140-26 = "[s3] \"ไม่เป็นไร ไม่ใช่ความผิดโซระสักหน่อย\"\n[s4] (นี่เป็นการแก้แค้นที่รุนแรงกว่าที่คิดไว้อีกแฮะ...)"
42140-33 = "เอ่อ คุณครู... คุณครูจะพอทราบเรื่องที่เกิดขึ้นอยู่ใน D.U. ไหมคะ?"
42140-34 = "หลังจากเกิดความวุ่นวายในเมืองเมื่อวานซืน ผู้คนก็เลยไม่ค่อยสัญจรกันเท่าไร บรรยากาศในสำนักงาน#nใหญ่ก็เลยไม่ปกติค่ะ"
42140-35 = "ฉันได้สมุดคู่มือเล่มหนาที่เป็นกฎใหม่ที่เอาไว้ใช้ในการต้อนรับลูกค้า แถมการ์ดน่ากลัวๆ จากไคเซอร์ ซิเคียวริตี้ก็เทียวมาลาดตระเวนที่ร้านและดูว่าเราทำตามคำสั่งบริหารอยู่หรือเปล่า..."
42140-36 = "นอกจากนั้นยังมีข่าวลือว่า ร้านสาขาของ <เอ็นเจล 24> จะถูกปิดทั้งหมดเร็วๆ นี้ และอาจจะมีร้าน <ไคเซอร์ 26> เข้ามาแทนค่ะ... ทำยังไงดีคะ?"
42140-37 = "ได้ยินมาว่าสภาพแวดล้อมในการทำงานของ <ไคเซอร์ 26> แย่มากจนเหมือนต้องทำงาน 26 ชั่วโมง ต่อวันเลย ถ้าฉันต้องทำงานในที่แบบนั้น มีหวังคงได้เป็นลมไปแน่ๆ เลยค่ะ..."
42140-38 = "[ns5] \"เลข 26 หมายถึงแบบนี้สินะ...\"\n[ns6] \"แต่วันหนึ่งเราจะทำงาน 26 ชั่วโมงไม่ได้อยู่แล้วนี่...?\""
42140-43 = "[ns] \"แล้วนี่โซระกินข้าวเย็นแล้วยังน่ะ?\""
42140-44 = "ค่ะ ฉันห่อข้าวมากินแล้วละค่ะ"
42140-45 = "เมื่อวานตอนเย็นฉันทำมันฝรั่งต้มไว้เยอะเลย ก็เลยเอามาเป็นกับข้าวมื้อเย็นของวันนี้ค่ะ..."
42140-50 = "อ่า เอ่อ..."
42140-51 = "ถ้าเกิดว่าคุณครูอยากได้ข้าวกล่องของฉันละก็..."
42140-52 = "[ns] \"มะ... ไม่เป็นไร! ไม่ต้องห่วงครูหรอก!\""
42140-57 = "(คุณครูไม่สามารถรับข้าวกล่องจากโซระได้ จึงปฏิเสธและกลับมาที่สำนักงานชาเล่ต์)"
42140-59 = "สำนักงานชาเล่ต์"
42140-63 = "[ns] \"หิวจัง...\""
42140-69 = "<สวัสดีค่ะ นี่คือ 'FOX EATS' ค่ะ!>"
42140-70 = "<คุณลูกค้า [USERNAME] สั่งข้าวกล่องไว้ใช่ไหมคะ?>"
42140-74 = "[ns] \"... ไม่ได้สั่งอะไรนะ?\""
42140-75 = "<แปลกจังเลยนะคะ... พอดีว่าทางเราได้รับออเดอร์ข้าวกล่องซูชิเต้าหู้หวาน 1 ที่ ให้มาส่งที่สำนักงาน#nชาเล่ต์น่ะค่ะ>"
42140-76 = "<ช่วยเปิดประตูเพื่อเป็นการยืนยันหน่อยได้ไหมคะ?>"
42140-80 = "[ns7] เปิดประตู\n[ns8] ไม่เปิดประตูให้"
42140-85 = "<... ขอบคุณนะคะ>"
42140-91 = "[ns9] \"นี่พวกเธอ...?\""
42140-92 = "สวัสดีตอนค่ำค่ะคุณครู ดีใจที่ได้มาเจอกันอีกนะคะ"
42140-93 = "ว่าไงๆ!"
42140-94 = "ไม่คิดเลยแฮะว่าจะได้มาเจอผู้ใหญ่คนนี้อีก..."
42140-98 = "นี่ก็ค่ำแล้ว รับประทานอาหารเย็นไปหรือยังคะ?"
42140-99 = "<... งั้นก็ช่วยไม่ได้นะคะ มาถึงที่นี่แล้ว จะให้กลับไปเลยก็คงเสียเที่ยวแย่...>"
42140-104 = "<... ติดตั้งดินระเบิดสุดเหนียวเรียบร้อย เริ่มจุดระเบิด>"
42140-105 = "[s10] \"... จะทำอะไรน่ะ?\""
42140-110 = "<3... 2... 1...>"
42140-114 = "[ns11] \"รอเดี๋ยวๆ ครูไปเปิดให้เดี๋ยวนี้แหละ...!\""
42140-125 = "แย่ละ พังมากกว่าที่คิดไว้อีกแฮะ"
42140-126 = "โอโทกิ ใช้ดินระเบิดไปเท่าไรกันเนี่ย? ประตูพังไปทั้งบานแล้วนะ!"
42140-127 = "ขอโทษที ก็สไนเปอร์อย่างฉันไม่ถนัดงาน CQB นี่นา"
42140-128 = "แหะๆๆ... ขอโทษนะคะคุณครู พวกฉันจะรีบซ่อมประตูที่พังให้เลยค่ะ..."
42140-129 = "[s12] \"นี่พวกเธอ...?\""
42140-133 = "ถึงพวกฉันจะไม่มีหน้ามาพูดว่า 'สวัสดีตอนค่ำ' แต่ยังไงก็... ยินดีที่ได้พบกันอีกครั้งนะคะ คุณครู"
42140-134 = "นี่ก็ค่ำแล้ว คุณครูรับประทานอาหารเย็นไปหรือยังคะ?"
42140-137 = "[ns] \"ยังเลย\""
42140-138 = "พวกฉันคิดไว้แล้วละค่ะว่าคุณครูน่าจะยังไม่ได้ทานข้าว"
42140-139 = "คำสั่งบริหารฉบับใหม่นี้น่าจะทำให้การขนส่งสินค้าในร้านสะดวกซื้อสาขาชาเล่ต์ผิดพลาดน่ะค่ะ..."
42140-141 = "คลาดคงคลาดเคลื่อนอะไรกันล่ะ ทางนั้นเอาแต่ใจตัวเองที่คนอื่นไม่ยอมฟังคำสั่งต่างหาก"
42140-142 = "ไม่ใช่เด็กประถมแล้วสักหน่อย ยังเอาเรื่องของกินมาล้อเล่นกันอยู่ได้... คนอะไรไม่รู้จักโต"
42140-143 = "แต่การปิดกั้นการขนส่งเพื่อรับมือกับศัตรูที่กำลังประท้วงอยู่ก็ถือเป็นกลยุทธ์ที่ดีเลยนะ"
42140-144 = "ต่อให้เป็นผู้มีอุดมการณ์แรงกล้าขนาดไหน ถ้าท้องหิวก็คงไม่มีแรงจะยืนหยัดต่อสู้หรอก"
42140-146 = "ถึงคุณครูจะไม่ได้ประท้วงอยู่ที่สำนักงานของชาเล่ต์ด้วยก็เถอะ..."
42140-150 = "แต่ FOX EATS... ไม่สิ กองทหาร FOX ของเราก็เตรียมอาหารง่ายๆ มาให้คุณครูแล้วละค่ะ"
42140-151 = "[ns] \"...ซูชิเต้าหู้หวานเหรอ?\""
42140-152 = "ค่ะ คุณครูเคยทานซูชิเต้าหู้หวานที่ฉันทำให้มาครั้งหนึ่งแล้วใช่ไหมคะ?"
42140-153 = "ฉันเห็นว่ามันน่าจะถูกปากคุณครูน่ะค่ะ ครั้งนี้ก็เลยเตรียมซูชิเต้าหู้หวานแบบเดียวกันมาให้ค่ะ"
42140-154 = "ฉันเตรียมมาให้เยอะเลย คุณครูทานให้เต็มอิ่มเลยนะคะ"
42140-156 = "ฉันรู้ดีว่าตอนนี้คุณครูคงจะไม่อยากกินอาหารที่พวกเราเตรียมมาให้ แต่ยังไงก็..."
42140-160 = "[ns] กินซูชิเต้าหู้หวานที่นิโกะเอามาให้"
42140-167 = "... กินไปแล้วแฮะ?"
42140-168 = "เอ๋...? หยิบไปกินโดยที่ไม่สงสัยอะไรเลยงั้นเหรอ...? ถามจริง...?"
42140-170 = "มะ...ไม่เป็นไรจริงๆ เหรอคะ?"
42140-171 = "[s13] \"อื้ม อร่อยออก\"\n[s14] \"เต้าหู้ก็นุ่ม ข้าวก็สุกร่วนดี เยี่ยมไปเลยละ!\""
42140-174 = "ไม่ค่ะ ฉันไม่ได้หมายถึงรสชาติ..."
42140-179 = "มันออกจะแปลกที่ฉันจะพูดอย่างนี้... แต่คุณครูไม่สงสัยเลยเหรอคะว่าข้าวกล่องนี้อาจจะมียาพิษก็ได้?"
42140-180 = "[s] \"...หืม? มียาพิษในซูชิเต้าหู้หวานนี้เหรอ?\""
42140-181 = "ไม่มีค่ะ ไม่ใช่อย่างนั้นหรอก..."
42140-185 = "นี่ ฉันว่าเราน่าจะมีการเข้าใจผิดอะไรบางอย่าง... ตอนนี้พวกเราคือศัตรูกันนะ"
42140-186 = "คุณครูชาเล่ต์ก็น่าจะรู้ไม่ใช่เหรอว่าตอนนี้กองทหาร FOX กำลังจับมือกับรักษาการฯ คายะเพื่อฟื้นฟู#nสถาบัน SRT อยู่"
42140-187 = "แต่คนที่ปฏิเสธข้อเสนอของคายะอย่างเฉียบขาด กลับคิดว่าอาหารที่ผู้สมคบคิดเตรียมมาให้จะไม่มีพิษ#nภัยอะไรเลยงั้นเหรอ?"
42140-188 = "ถึงจะเป็นคนดีแค่ไหนก็เถอะ ยังไงก็ต้องมีขีดจำกัดบ้างสิ..."
42140-189 = "แต่ก็นะ ถึงจะมีคำกล่าวที่ว่า 'ส่งเกลือไปให้ศัตรู' แต่ปกติแล้วการไม่แตะต้องของที่ศัตรูส่งมาให้น่าจะ#nเป็นความคิดที่ฉลาดกว่า"
42140-190 = "และในระหว่างการปฏิบัติการ บางครั้งก็มีการผสมกระสุนที่มีตำหนิไว้ในสัมภาระเพื่อเตรียมพร้อมเวลา#nถูกศัตรูจับไปด้วย"
42140-191 = "เพราะแบบนี้สถาบัน SRT ถึงได้ย้ำนักย้ำหนาว่า 'เพื่อความปลอดภัยในการทำปฏิบัติการ ห้ามกินอะไร#nนอกจากอาหารที่ห่อมาเองเท่านั้น ต่อให้เป็นแค่น้ำเปล่าก็ไม่ได้'"
42140-192 = "[ns] \"ครูไม่ใช่ศัตรูของพวกเธอนี่นา\""
42140-196 = "[ns] \"... ครูเป็นแค่คุณครูของนักเรียนก็เท่านั้นเอง\""
42140-200 = "อืม..."
42140-201 = "... เป็นคนอย่างที่ได้ยินมาเลย"
42140-203 = "แต่ถึงจะไม่ใช่ศัตรู ก็ไม่ควรเชื่อใจคนอื่นง่ายเกินไปนะคะ"
42140-204 = "ถ้าเราดูเป็นคนเชื่อคนง่าย คนอื่นจะรู้สึกว่าเรายังไม่โตและโอนอ่อนไปเรื่อย และแบบนี้จะเสียเปรียบใน#nการเจรจาค่ะ"
42140-205 = "ในสังคมเราน่ะ ถ้าเจอคนแปลกหน้าแล้วยิ่งต้องสงสัย ไม่เชื่อใจ และระวังตัวไว้ค่ะ"
42140-206 = "... คุณครูเองก็เป็นผู้ใหญ่ น่าจะรู้เรื่องแบบนี้ดีไม่ใช่เหรอคะ? "
42140-207 = "[s] \"พอเชื่อใจแล้วได้อะไรกลับมา มีให้เห็นกว่าระแวงแล้วสูญเสียอะไรไปนะ\""
42140-209 = "... คารมคมคายไม่เบาเลยนะ"
42140-210 = "คุณครูรู้จักเกมของผู้ใหญ่ที่ชื่อ <สถานการณ์ลำบากของผู้ทำผิด> หรือเปล่า?"
42140-211 = "ถ้าต่างฝ่ายต่างเลือกสิ่งดีๆ ให้ฝ่ายตรงข้าม ก็จะไม่เสียหายอะไร แต่หากฝ่ายตรงข้ามทรยศเราจนอยู่ใน#nสถานการณ์ที่ต้องรับความผิด ก็จะถกเถียงกันว่าทางเลือกไหนที่ 'เหมาะสม' ที่สุด"
42140-212 = "ตามทฤษฎีนี้แล้ว คนผิดมักจะเลือกที่จะทรยศเสมอไม่ว่าอีกฝ่ายจะเลือกอะไร เพราะตัวเองจะคำนึงถึง#nแต่ผลประโยชน์ที่ตัวเองจะได้รับ"
42140-213 = "อันที่จริงเราก็จัดการกับ <คนผิด> มาตั้งเยอะ และในนั้นก็ไม่มีใครเลยที่เลือกในสิ่งที่เป็นประโยชน์กับ#nฝ่ายตรงข้าม"
42140-214 = "... ความเชื่อใจที่ผู้ใหญ่พูดถึง สุดท้ายก็ไม่ได้ต่างไปจากนี้หรอก"
42140-215 = "[s15] \"ดูเป็นทฤษฎีที่ยาก... แต่ก็น่าสนใจดีนะ\"\n[s16] \"... สมกับเป็นนักเรียนหัวกะทิของ SRT เลยนะ!\""
42140-218 = "ถึงจะไม่ใช่เด็กหัวกะทิ แต่ทฤษฎีเกมแค่นี้ใครๆ ก็ควรจะรู้..."
42140-222 = "ไม่สิ นี่ไม่ใช่เวลามาชมกันสักหน่อย...!"
42140-223 = "เอะอะก็เอาแต่ชม..."
42140-224 = "[s] \"แต่ในความเป็นจริง มันก็น่าจะแตกต่างกันนะ?\""
42140-225 = "ก็จริงอยู่ว่าถ้าจะเอาทฤษฎีจากเกมมาใช้ในชีวิตจริง เราก็ต้องเอาตัวแปรต่างๆ มาคิดด้วย"
42140-226 = "เช่นต้องพิจารณาว่าผลจากการเลือกนี้จะส่งผลกระทบอะไรต่อเกมถัดไป..."
42140-227 = "... แต่เกมนี้ก็จบด้วยการแข่งขันรอบเดียวได้นะคุณครู"

52180-118 = "3;슈로;09;하지만 이를 어쩌죠? 울부짖고 소리쳐 부정해도 현실은 조금도 바뀌지 않는데."
52180-119 = "3;슈로;14;네 녀석들이 아무리 노력한다 해도 아야메의 발끝도 따라가지 못하는 실패작이라는 사실은 바뀌지가 않는데."

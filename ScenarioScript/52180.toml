[translation]
52180-1 = "第18話;同床異夢"
52180-3 = "哼，哼啊啊……"
52180-4 = "只要再一點……再拉一點點就……"
52180-8 = "桔梗，你有空在那邊看的話，不如過來幫忙拉開這些鐵欄杆吧！"
52180-9 = "只要再拉開一點……就能弄出可以讓一個人出去的縫隙了……！"
52180-10 = "與其在這種無謂的嘗試上浪費力氣，不如把體力留著應付接下來的狀況吧？"
52180-11 = "對方既然敢不留人看守，就代表這個鐵欄杆沒有脆弱到光憑蠻力就能打開。"
52180-12 = "所以你打算就這樣乖乖被關著嗎？#n能做的事就該試試看吧！"
52180-13 = "我這不是也在想辦法脫身嗎？#n不是每個人都像你一樣，依靠氣勢和幹勁來解決問題。"
52180-14 = "要是當初聽我的話懷疑菖蒲，事情也不會鬧到這個地步了。"
52180-15 = "是，是沒錯啦……"
52180-16 = "那你有什麼能脫身的辦法嗎？#n有的話就快說吧，時間不多了。"
52180-17 = "敢不敢閉上嘴讓我好好想想？"
52180-18 = "你，你說什麼！？"
52180-19 = "桔，桔梗前輩、蓮華前輩，請先冷靜下來！"
52180-20 = "現在不是內鬥的時候──"
52180-26 = "[ns1]「好像有點吵呢……」\n[ns2]「……我睡了多久？」"
52180-29 = "[USERNAME]老師！"
52180-30 = "……師父！"
52180-31 = "老師，你身體還好嗎？有沒有受傷？"
52180-32 = "[s3]「嗯，雖然頭有點痛，但應該沒受傷。」\n[s4]「你們也沒事吧？」"
52180-37 = "嗯，只是擦傷而已，沒什麼大礙。"
52180-38 = "強健的體魄可是百花繚亂部員的基本素養呢！"
52180-40 = "[ns]「話說這裡是……？」"
52180-41 = "這裡是「彼岸邸」的地下牢房。"
52180-42 = "我們在和花鳥風月部的戰鬥中落敗之後，就被帶到了這裡。"
52180-43 = "勘解由小路家的地下也有類似的倉庫……沒想到會被用在這種地方。"
52180-44 = "可惡，要是能給那些傢伙來幾發子彈，我們也不會這麼輕易被抓了……"
52180-45 = "[s5]「花鳥風月部……？」\n[s6]「這段時間到底發生了什麼？」"
52180-48 = "簡單來說──"
52180-49 = "我們在北方自治區遇到的一切，幾乎都是假的。"
52180-51 = "（從桔梗口中聽說了昏迷期間發生的事）"
52180-59 = "[ns]「……沒想到土生薊竟然是花鳥風月部的成員。」"
52180-60 = "就是說啊。那麼親切的會長居然是花鳥風月部的敵人，真是太[ruby=Shock]震～驚[/ruby]了……"
52180-61 = "他肯定從一開始就打算欺騙我們。#n藏在那張笑臉背後的陰謀，光是想像就讓人反胃。"
52180-62 = "所以惠比壽分校周邊的自治區，還有我們遇到的居民也全都是假的嗎？#n我都要起雞皮疙瘩了……"
52180-63 = "不，惠比壽分校的居民應該是真的。"
52180-64 = "再怎麼說，百物語也不太可能連祭典用的惠比壽山食材都偽造出來。"
52180-65 = "而且也有部分居民從一開始就對薊抱有戒心。"
52180-66 = "[s]「那麼……就連菖蒲也是假的嗎？」"
52180-67 = "這個嘛，其實……"
52180-68 = "我們也很在意這點，所以問過最後和菖蒲前輩在一起的名草前輩。"
52180-69 = "但前輩從剛才就一直處於這個狀態……"
52180-74 = "[ns7]「……你還好嗎，名草？」\n[ns8]「有沒有哪裡受傷？」"
52180-77 = "……我沒事。"
52180-78 = "只是……我無法原諒因為自己的無能，而讓大家遭遇了危險。"
52180-79 = "前輩又沒有做錯什麼！#n這一切都是花鳥風月部那群傢伙的錯！"
52180-80 = "是啊，名草前輩已經為了保護大家拚盡全力了。"
52180-81 = "名草前輩，現在情況雖然混亂，不過請別搞錯該責怪的人。"
52180-82 = "應該整頓事態的責任，並不在委員長代理的你……而是在委員長菖蒲前輩身上。"
52180-83 = "……不，這不是菖蒲的錯。#n菖蒲他沒有錯。"
52180-84 = "……前輩！"
52180-85 = "這一切的根源，終究是因為我沒能理解菖蒲──"
52180-86 = "……明明沒有能力，卻只憑自己的願望去相信別人。#n我說的對吧，名草醬～？"
52180-92 = "箭吹棕櫚……！"
52180-93 = "啊哈哈，啊哈哈哈！"
52180-94 = "這副可悲的模樣是怎麼回事？"
52180-95 = "當初的氣勢跟決心跑哪去了？#n現在怎麼哭得這麼難看啊，名草醬。"
52180-96 = "你說沒發現那個菖蒲是假的？只是誤認了連在夢裡都忘不了的朋友？"
52180-100 = "……騙人。"
52180-101 = "你只是不想承認罷了。"
52180-102 = "所以我們遇到的菖蒲根本不是真的？"
52180-103 = "當然不是。"
52180-104 = "會在危急時刻像早就等著一樣現身救你，還說好聽的話減輕你罪惡感的朋友？#n這種毫無建設性的幻想也該有個限度吧。"
52180-105 = "那個菖蒲……#n不，那「東西」只是從怪書《稻亭物怪錄》的神祕中誕生的──名草醬的恐懼而已！"
52180-106 = "恐懼？但是那個菖蒲前輩一點也不可怕啊……"
52180-107 = "你還是一樣什麼都不懂呢，勘解由小路家的巫女小姐。"
52180-108 = "雖然恐懼能以令人毛骨悚然的樣貌出現，有時卻也會偽裝成幸福的模樣。"
52180-109 = "那種在心底一直否定、絕不可能實現的虛幻幸福──#n還有什麼比它真的出現在眼前時更可怕的呢？"
52180-113 = "越是凝視那虛假的幸福……現實的殘酷就會滲得越深。"
52180-114 = "唔……"
52180-115 = "所以你永遠不可能取代菖蒲啊，名草醬。"
52180-116 = "你憑什麼隨便評論名草前輩！？"
52180-117 = "啊哈哈哈！你只是想用吼叫來否認吧？"
52180-118 = "但這又有什麼用呢？#n就算你在這裡哭喊，現實也不會改變。"
52180-119 = "無論你們再怎麼努力，都追不上菖蒲的腳步。"
52180-120 = "總有一天會被當成沒用的廢物捨棄──"
52180-121 = "[s]「棕櫚，我有個問題。」"
52180-122 = "又怎麼了，夏萊的老師。"
52180-123 = "如果還想用詭辯動搖我的話，勸你還是省省吧。"
52180-124 = "況且輸家的挑釁，根本不可能影響我嘛？"
52180-125 = "[s9]「如果棕櫚從一開始就知道一切……」\n[s10]「那當初被假菖蒲抓住也是演出來的嗎？」"
52180-131 = "…………啊？"
52180-132 = "那還用說嗎？"
52180-133 = "一切的一切……當然都是為了抓住你和百花繚亂的計畫啊。"
52180-134 = "被假菖蒲抓住、把你引到彼岸邸──"
52180-138 = "……咦？"
52180-139 = "……夏萊的老師？"
52180-142 = "就連把你當成盾牌……"
52180-143 = "……也是為了雛罌粟大人而演的戲啦！"
52180-146 = "[ns11]「雖然現在被抓了，不過我還是想說……」\n[ns12]「就像我之前說過的一樣……」"
52180-149 = "[ns13]「扮演自己沒有的東西並不奇怪。」\n[ns14]「這是任何人都會做的平凡的事。」"
52180-152 = "[ns]「所以，希望你不要逃避自己做過的事。」"
52180-154 = "[ns]「棕櫚只是做了棕櫚應該做的事而已。」"
52180-155 = "哈，哈哈……還以為你要說什麼呢。"
52180-156 = "以為我會被這種蒼白的詭辯給動搖嗎？"
52180-157 = "覺得當時救了我……我就會背叛雛罌粟大人幫助你嗎？"
52180-158 = "那還真是……異想天開啊。"
52180-159 = "如此幼稚的幻想──"
52180-160 = "沒錯，就跟你們相信的那個傳說中的葛葉一樣，只是荒唐的幻想而已！"
52180-164 = "……葛葉。"
52180-165 = "要是當時葛葉讓我死在大雪原就好了。"
52180-166 = "為何不願意拯救菖蒲，卻偏偏救了我呢？#n他明明可以把我丟在那裡不管的……"
52180-167 = "這話是什麼意思，名草醬？"
52180-168 = "說得好像你真的見過葛葉一樣。"
52180-169 = "[s15]「葛葉並不是只存在於傳說中的虛構人物。」\n[s16]「我曾經從名草手中收到過葛葉的信。」"
52180-172 = "葛葉他……真的存在？"
52180-173 = "所有怪書的原持有者、百花繚亂的初代委員長……那位大預言者葛葉？"
52180-174 = "如果你只是想戲弄我──"
52180-181 = "仔細想想，疑點確實不少。"
52180-182 = "雛罌粟大人曾說，名草那時被丟在偏僻的大雪原中央……但他最終卻活著回來了。"
52180-183 = "在那種連野獸都很罕見的雪原中央，有人會碰巧發現他的機率微乎其微。"
52180-184 = "而且夏萊的老師雖然會巧妙包裝事實，卻從來不會說謊……"
52180-185 = "如果大預言者葛葉，真的存在於大雪原某處的黃昏寺院──"
52180-186 = "或許就能製作出……足以取代失去的《稻生物怪錄》的新怪書也說不定。"
52180-192 = "真遺憾呢，名草醬。#n被信任的朋友拋棄，除了自責以外什麼都做不了。"
52180-193 = "實在是可憐到讓人看不下去。"
52180-194 = "看在名草醬這麼可憐的份上，我就給你一次機會吧？"
52180-195 = "……機會？"
52180-196 = "沒錯。就算一切都被你毀了……#n不是還有個能夠挽回墜入黃昏的人、修復斷裂羈絆的存在嗎？"
52180-201 = "……那就是葛葉大人。"
52180-203 = "下一話;彼岸的記憶"

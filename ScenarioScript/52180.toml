52180-59 = "[ns] \"……설마 아자미 양이 화조풍월부의 부원이었을 줄이야.\""
52180-60 = "3;유카리;04;그러니까요. 그렇게나 친절해 보였던 부장님이 실은 저희를 적대하는 화조풍월부의 부원이었다니, 정말 쇼-쿠였사와요……\n#3;a\n#3;em;[세로선]"
52180-61 = "3;유카리;04\n2;키쿄;10;분명 처음부터 우릴 속일 생각으로 접근했었겠지. 그 웃는 낯으로 무슨 생각을 하고 있었을지, 떠올리는 것만으로도 구역질이 나.\n#2;a\n#3;m4"
52180-62 = "3;유카리;04\n5;렌게;04;그럼 이 에비스 분교 주변의 자치구도, 이곳에서 만난 주민들도 모두 가짜였던 거야? 그렇게 생각하니 조금 소름 끼치는데……\n#2;m1\n#3;m3\n#5;a\n#5;stiff\n#5;em;[땀]"
52180-63 = "3;유카리;04\n2;키쿄;99;아니, 에비스 분교의 주민들은 백물어와 상관없는 진짜였을 거야."
52180-64 = "3;유카리;04\n2;키쿄;02;아무리 백물어가 강력한 힘을 지니고 있다고 해도 축제에 쓰이는 에비스산 식재료까지 가짜로 만들어 낼 수는 없으니까."
52180-65 = "3;유카리;04\n2;키쿄;05;애초에 일부 주민들은 처음부터 아자미를 낯설어하는 눈치이기도 했었고."

[translation]
52180-1 = "Episode 18;On a Different Page"
52180-3 = "Ughhh... Nnngh..."
52180-4 = "Just a little more... Just a little more and..."
52180-8 = "Don't just stand there and watch, Kikyou! Come help me pull these bars apart!"
52180-9 = "I'm almost there! Just a little bit more, and the gap will be big enough to squeeze through!"
52180-10 = "Or perhaps we should save what little strength we have for what awaits us, rather than squandering it on fruitless endeavors."
52180-11 = "Look around. Not a single guard is posted outside our cell. They're confident that escape is an impossibility, let alone...ripping apart iron bars."
52180-12 = "So what?! You want me to just sit here and do nothing?"
52180-13 = "I. Am. Thinking. Try to consider that brute force and sheer will power is not always the solution."
52180-14 = "If you had simply trusted my doubts about President Ayame, we wouldn't be in this situation to begin with."
52180-15 = "I guess I've got no leg to stand on there..."
52180-16 = "Well, fine! Then what's the clever way out of here your clever brain's thought of, huh?! C'mon!"
52180-17 = "This \"clever\" brain of mine would find it much easier to think without your incessant yapping!"
52180-18 = "What did you just say?!"
52180-19 = "K-Kikyou, Renge! Please calm down!"
52180-20 = "This is no time for us to be arguing..."
52180-26 = "[ns1] \"What's all the commotion...?\" \n[ns2] \"...How long was I asleep for?\""
52180-29 = "[USERNAME] Sensei!"
52180-30 = "...Mentor!"
52180-31 = "How are you, Sensei? Are you injured anywhere?"
52180-32 = "[s3] \"My head hurts a bit, but I'm fine.\" \n[s4] \"Are all of you okay?\""
52180-37 = "A few scrapes, but nothing of concern."
52180-38 = "Being a member of the Hyakkaryouran means being sturdy in both body and mind! This is par for the course!"
52180-40 = "[ns] \"That's good...but where are we?\""
52180-41 = "This is the underground jail in the Mansion of the Beyond."
52180-42 = "It would appear Nature's Beauty imprisoned us here after defeating us."
52180-43 = "The Kadenokouji family has a similar underground warehouse...but I never even thought it could be used as a jail..."
52180-44 = "Damn it. If only our bullets worked on those guys...!"
52180-45 = "[s5] \"Nature's Beauty...?\" \n[s6] \"What happened while I was asleep?\""
52180-48 = "To put it simply..."
52180-49 = "Our entire experience in the northern district was illusion upon illusion."
52180-51 = "Kikyou explained everything that happened after I had fallen unconscious."
52180-59 = "[ns] \"...I can't believe Azami was a member of Nature's Beauty.\""
52180-60 = "Truly! I am still reeling in shock! How could such a kind president have actually been a member of Nature's Beauty, plotting against us?"
52180-61 = "From the very beginning, we played into their scheme. The trickery simmering behind her false smile... Tsk. I'm nauseated at the mere thought of it."
52180-62 = "Wait. Does that mean the district around the Ebisu branch and all the residents we met were fakes too? That gives me the creeps..."
52180-63 = "No. They had nothing to do with the Hundred Ghost Stories. They were real."
52180-64 = "The Hundred Ghost Stories are not powerful enough to conjure fake crops for the festival."
52180-65 = "And if you recall, even some of the residents were unfamiliar with Azami."
52180-66 = "[s] \"Then...was Ayame a fake too?\""
52180-67 = "About that..."
52180-68 = "We arrived at the same conclusion as you, and Nagusa was the last one to see President Ayame before our capture."
52180-69 = "But she's been...a bit quiet since we awoke."
52180-74 = "[ns7] \"...Are you all right, Nagusa?\" \n[ns8] \"Are you hurt anywhere?\""
52180-77 = "...I'm fine."
52180-78 = "I just... My inadequacy has endangered everyone...again. There's no apology that could absolve me."
52180-79 = "None of this was your fault! Those Nature's Beauty freaks are the ones who did this!"
52180-80 = "She is correct, Nagusa! You did your utmost to protect us all!"
52180-81 = "Nagusa. You are upset, but the blame does not lie with yourself."
52180-82 = "There is only one person to whom we can point fingers. President Ayame must right her wrongs."
52180-83 = "...No. It's not. Ayame did nothing wrong."
52180-84 = "...Nagusa!"
52180-85 = "If I had only taken the time to understand her properly... Ayame..."
52180-86 = "That's right. It's your fault for clinging to a convenient dream and believing what you wanted to believe.#nIsn't it, Nagusa?"
52180-92 = "Yabuki Shuro...!"
52180-93 = "Ahaha, AHAHAHA!"
52180-94 = "That pathetic expression suits you nicely."
52180-95 = "What happened to all your bravado and resolve? I guess, in the end, you'll always just be sniveling, groveling Nagusa."
52180-96 = "You reeeally want us to believe that you didn't realize that Ayame was a fake? That you couldn't recognize the friend that haunts all your dreams?"
52180-100 = "...Lies."
52180-101 = "You shunned an inconvenient reality in favor of your pathetic desires."
52180-102 = "Then we were correct? That President Ayame was a fake?"
52180-103 = "Of course it was."
52180-104 = "A friend who swoops in just as you're in danger, saves your life, and says exactly what you want to hear? That kind of stuff only happens in children's books!"
52180-105 = "That Ayame...or rather, that thing that looked like her was actually Nagusa's fear, born from the magic of the cursed tome, Toutei's Phantom Illustrations!"
52180-106 = "Nagusa's...fear? But she wasn't frightening at all..."
52180-107 = "As clueless as ever, aren't you, Kadenokouji?"
52180-108 = "Sure, fear can be some nightmarish ghoul, but some people... Some people are scared of happiness."
52180-109 = "An unrealistic fantasy! A happiness you long for, but deep, deep down you know is impossible to reach for ingrates like you! Isn't it terrifying when something you think you don't deserve pops up into arm's reach?"
52180-113 = "The more you indulge that fantastical happiness, the more the harshness of reality gets you."
52180-114 = "Ugh..."
52180-115 = "And that's why Goryou Nagusa will never measure up to Nanakado Ayame."
52180-116 = "You don't know anything about Nagusa!"
52180-117 = "Ahahaha! Deny, deny, deny. Try all you want."
52180-118 = "You can try, but no matter how much you wail and scream and cry, reality will still be waiting to welcome you."
52180-119 = "No matter what you do, you'll never be able to hold a candle to Ayame."
52180-120 = "Disposable. That's what you are. Trash, waiting to be thrown away once you lose your usefulness."
52180-121 = "[s] \"Shuro, there's something I'm curious about.\""
52180-122 = "What is it, Schale's Sensei?"
52180-123 = "If you're trying to get under my skin with your pedantic nonsense, save your breath."
52180-124 = "You've been captured! You're the loser! I won't be fazed by a LOSER!"
52180-125 = "[s9] \"Shuro, you knew everything from the start, didn't you?\" \n[s10] \"Was getting shot by the fake Ayame all a part of the act?\""
52180-131 = "...Huh?"
52180-132 = "That's seriously your question?"
52180-133 = "Duhhh. Every single scene was perfectly staged and choreographed to lead us to the big finale: capturing you and the Hyakkaryouran."
52180-134 = "Getting caught by that fake Ayame, luring you to the Mansion of the Beyond..."
52180-138 = "...Huh?"
52180-139 = "...Schale's Sensei?"
52180-142 = "Even at the end, when I used you as a shield..."
52180-143 = "...all of it was an act to grant Kokuriko's wishes!"
52180-146 = "[ns11] \"You may not want to hear this from a prisoner.\" \n[ns12] \"And maybe you're sick of me telling you this again and again...\""
52180-149 = "[ns13] \"...but it's okay to pretend to be something you're not.\" \n[ns14] \"After all, everyone does it, in one way or another.\""
52180-152 = "[ns] \"But in return...you should never turn a blind eye to your actions.\""
52180-154 = "[ns] \"You did what you thought you needed to, Shuro.\""
52180-155 = "Hah! Hahaha! Here I thought you were going to actually say something interesting for once."
52180-156 = "Did you think you could enchant me with your pretty words?"
52180-157 = "Is that why you saved me back then? To try to convince me to betray Kokuriko and help YOU?"
52180-158 = "Seriously. You and your ridiculous fantasies."
52180-159 = "You're like a little kid playing pretend."
52180-160 = "Just like that Kuzunoha you all believe in. You live in your delusions."
52180-164 = "...Kuzunoha."
52180-165 = "If only...Kuzunoha had abandoned me to perish in the Great Snowfield."
52180-166 = "Why did she save me...and not Ayame? The world would have been better for it if she had."
52180-167 = "What nonsense are you spouting now, Nagusa?"
52180-168 = "Are you trying to pretend like you actually met Kuzunoha now?"
52180-169 = "[s15] \"Kuzunoha isn't just a figure from a legend.\" \n[s16] \"In fact, Nagusa hand-delivered me a letter from Kuzunoha herself.\""
52180-172 = "You're seriously saying that...Kuzunoha is real?"
52180-173 = "The Great Prophet Kuzunoha, origin of all the cursed tomes and the first president of the Hyakkaryouran...?"
52180-174 = "If you're still trying to mess with me—"
52180-181 = "If I think about it, there are things that don't add up."
52180-182 = "Kokuriko told me that she left Nagusa stranded in the middle of the Great Snowfield, with no civilization in sight. So how's she alive?"
52180-183 = "Not even animals are willing to go to that area. No one could've just happened upon her."
52180-184 = "Besides, that Schale's Sensei...as much as they bend things, they've never lied..."
52180-185 = "If the Great Prophet Kuzunoha really does exist, hidden away in the Twilight Temple, somewhere out in the Great Snowfield..."
52180-186 = "...We could forge a new tome to replace the lost Inou's Phantom Records!"
52180-192 = "How absolutely pitiful you are, Nagusa. Abandoned by your friend, wracked with guilt and self-loathing..."
52180-193 = "In fact I pity you so much..."
52180-194 = "...that maybe I should give you one last chance, Nagusa."
52180-195 = "...A chance?"
52180-196 = "Exactly. After all, even though you've ruined everything, you're still holding on to that little glimmer of hope that you can save your friend, aren't you?"
52180-201 = "...Then find me, Kuzunoha."
52180-203 = "Next Episode;Memories from the Beyond"

52180-8 = "4;렌게;02;키쿄, 거기서 그렇게 쳐다보기만 할 거면 같이 와서 철창 당기는 것 좀 도와줘!\n#4;em;[반응]"
52180-9 = "4;렌게;08;조금만, 조금만 더 당기면…… 한 사람 정도 나갈 수 있는 틈이 생길 것 같은데……!"
52180-10 = "2;키쿄;02;지금은 그런 쓸데없는 시도에 힘을 낭비하는 것보다, 이후의 상황을 대비해 체력을 아껴두는 편이 낫지 않을까?"
52180-11 = "2;키쿄;99;어차피 감시도 세워두지 않고 자리를 비웠을 정도니, 그 철창이 힘으로 뜯어낼 수 있을 만큼 허술하지는 않을 거라 생각해."
52180-12 = "4;렌게;08;그렇다고 이대로 가만히 갇혀 있기만 할 거야? 할 수 있는 건 뭐든 해 봐야지!"
52180-13 = "2;키쿄;09;그래서 이곳을 빠져나갈 수 있는 방법을 궁리하고 있잖아. 모두가 너처럼 기합과 의욕만으로 문제를 해결하려 들진 않거든?"
52180-14 = "2;키쿄;10;애초에 내가 처음에 말했던 것처럼 아야메 부장을 의심했더라면, 이렇게까지 문제가 커지진 않았을 텐데."
52180-15 = "4;렌게;04;그, 그건 그렇지만……\n#4;stiff\n#4;em;[땀]"
52180-16 = "4;렌게;08;그럼 이곳을 빠져나갈 다른 대책이 있다면, 빨리 말해 보라고. 시간이 없으니까."

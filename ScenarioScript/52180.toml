[translation]
52180-1 = "ตอนที่ 18;ความฝันที่แตกต่าง"
52180-3 = "ฮึบ... ฮึบบ..."
52180-4 = "อีกนิดเดียว... ดึงอีกแค่นิดเดียวเท่านั้น..."
52180-8 = "คิเคียว ถ้าจะเอาแต่ยืนมองอย่างนั้นก็มาช่วยดึงกรงเหล็กนี่ดีกว่านะ!"
52180-9 = "ถ้าดึงเพิ่มอีกนิด... ก็น่าจะเกิดช่องให้คนคนหนึ่งแทรกตัวออกไปได้...!"
52180-10 = "ทำเรื่องไร้ประโยชน์แบบนั้นน่ะเสียเวลาเปล่าๆ ฉันว่าเราเก็บพลังไว้รับมือกับสถานการณ์หลังจากนี้ไป#nไม่ดีกว่าเหรอ?"
52180-11 = "ถ้าคนพวกนั้นออกไปโดยที่ไม่ได้สั่งให้ใครเฝ้าระวังเรา ก็หมายความว่าลูกกรงเหล็กนี่มันไม่ได้อ่อนแอ#nพอจะใช้กำลังดึงออกได้หรอก"
52180-12 = "แล้วจะยอมติดอยู่แบบนี้งั้นเหรอ? ทำอะไรได้ก็ควรทำสิ!"
52180-13 = "ฉันก็พยายามหาวิธีออกไปจากที่นี่อยู่ไง ทุกคนไม่ได้แก้ปัญหาด้วยแรงกายแรงใจเหมือนกันกับเธอ#nไปหมดหรอกนะ"
52180-14 = "ถ้าสงสัยในตัวหัวหน้าอายาเมะกันตั้งแต่แรกอย่างที่ฉันบอก เรื่องก็คงไม่แย่ขนาดนี้หรอก"
52180-15 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ..."
52180-16 = "งั้นถ้ามีวิธีที่จะออกจากที่นี่ได้ก็รีบบอกฉันมาสิ เราไม่มีเวลากันหรอกนะ"
52180-17 = "งั้นก็หยุดพูดพล่ามเสียทีสิ ฉันจะได้มีสมาธิคิดไง!"
52180-18 = "นี่ ตกลงจะช่วยหรือชวนทะเลาะกันแน่?!"
52180-19 = "ระ... รุ่นพี่คิเคียว รุ่นพี่เรนเกะ ใจเย็นๆ กันก่อนเถอะเจ้าค่ะ!"
52180-20 = "ตอนนี้ไม่ใช่เวลาที่เราจะมาทะเลาะกัน..."
52180-26 = "[ns1] \"มีเรื่องอะไรกันน่ะ...\"\n[ns2] \"นี่ครูหลับไปนานแค่ไหนเหรอ...?\""
52180-29 = "ท่านอาจารย์ [USERNAME]!"
52180-30 = "ท่านอาจารย์...!"
52180-31 = "คุณครู เป็นยังไงบ้าง? บาดเจ็บตรงไหนหรือเปล่า?"
52180-32 = "[s3] \"ครูแค่ปวดหัวนิดหน่อยน่ะ แล้วทุกคนล่ะ?\"\n[s4] \"ครูไม่เป็นไรมากหรอก แล้วทุกคนล่ะ?\""
52180-37 = "พวกเราได้แผลถลอกกันแค่นิดหน่อยน่ะ ไม่ได้รุนแรงอะไรหรอก"
52180-38 = "ร่างกายที่แข็งแรงคือคุณสมบัติที่สมาชิกเฮียกกะเรียวรันต้องมีอยู่แล้วเจ้าค่ะ!"
52180-40 = "[ns] \"ว่าแต่ที่นี่คือ...?\""
52180-41 = "ที่นี่คือคุกใต้ดินใน <คฤหาสน์นิพพาน> น่ะ"
52180-42 = "พวกเราแพ้จากการต่อสู้กับพวกชมรมความงามของธรรมชาติ ก็เลยถูกคุมตัวไว้ในนี้"
52180-43 = "ชั้นใต้ดินของตระกูลคาเดโนะโคจิก็มีโกดังคล้ายๆ กัน... แต่ข้าคิดไม่ถึงเลยเจ้าค่ะว่าจะถูกใช้เป็น#nที่กักขังคนแบบนี้"
52180-44 = "บ้าจริง ถ้ายิงเจ้าพวกนั้นได้ละก็ พวกเราคงไม่โดนจับมาอย่างไร้ค่าแบบนี้หรอก..."
52180-45 = "[s5] \"ชมรมความงามของธรรมชาติ...? นี่มันเรื่องอะไรกัน?\"\n[s6] \"ระหว่างที่ครูหมดสติไป เกิดเรื่องอะไรขึ้นเหรอ?\""
52180-48 = "ถ้าจะให้พูดสรุปเลยละก็"
52180-49 = "ทุกอย่างที่เราเจอในเขตปกครองตนเองทางเหนือ มันเป็นของปลอมแทบทั้งหมดเลยน่ะ"
52180-51 = "(คุณครูฟังคิเคียวอธิบายเรื่องที่เกิดขึ้นในระหว่างที่หมดสติไป)"
52180-59 = "[ns] \"อาซามิคือสมาชิกชมรมความงามของธรรมชาติเหรอเนี่ย...\""
52180-60 = "นั่นน่ะสิเจ้าคะ ประธานคณะกรรมการที่ดูเป็นมิตร จริงๆ แล้วกลับเป็นสมาชิกของชมรมความงามของ#nธรรมชาติที่เป็นปรปักษ์กับพวกเรา ข้าเองก็ชก~กุเหมือนกันเจ้าค่ะ..."
52180-61 = "จะตกใจก็ไม่ใช่เรื่องแปลกหรอก ยัยนั่นคงเข้าหาเราเพราะตั้งใจจะหลอกตั้งแต่แรกอยู่แล้ว แค่คิดว่าใบหน้าที่ยิ้มแย้มแบบนั้นซ่อนความคิดอะไรไว้ ฉันก็อยากสำรอกแล้วละ"
52180-62 = "งั้นเขตปกครองตนเองรอบๆ โรงเรียนสาขาเอบิสและชาวเมืองที่เราเจอในที่แห่งนี้คือของปลอมทั้งหมด#nเลยงั้นเหรอ? พอคิดแบบนั้นก็ขนลุกขึ้นมาเลยแฮะ..."
52180-63 = "ไม่หรอก ชาวเมืองในโรงเรียนสาขาเอบิสุคือตัวจริง พวกเขาไม่เกี่ยวข้องกับตำนานร้อยเรื่องราวนั่น"
52180-64 = "ต่อให้ตำนานร้อยเรื่องราวจะมีพลังมหาศาลมากแค่ไหน แต่ก็ปลอมแปลงวัตถุดิบจากเอบิสุที่ใช้ในงาน#nเทศกาลไม่ได้หรอก"
52180-65 = "ชาวเมืองบางคนก็ดูไม่คุ้นหน้าอาซามิตั้งแต่แรกแล้วด้วย"
52180-66 = "[s] \"ถ้างั้น... อายาเมะก็เป็นตัวปลอมเหรอ?\""
52180-67 = "เรื่องนั้นน่ะ ที่จริงแล้ว..."
52180-68 = "พวกเราก็ตะหงิดใจเกี่ยวกับเรื่องนั้น ก็เลยไปถามจากรุ่นพี่นางุสะที่อยู่กับอายาเมะมาตลอดจนกระทั่งเกิด#nเรื่องขึ้น"
52180-69 = "แต่ไม่รู้เพราะอะไร รุ่นพี่ถึงอยู่ในสภาพนั้นตลอดเลยเจ้าค่ะ..."
52180-74 = "[ns7] \"นางุสะ เป็นยังไงบ้าง...?\"\n[ns8] \"นางุสะ บาดเจ็บตรงไหนหรือเปล่า?\""
52180-77 = "ฉันไม่เป็นไร..."
52180-78 = "ฉันแค่... ทนไม่ได้ที่ความอ่อนประสบการณ์ของฉันทำให้ทุกคนต้องตกอยู่ในอันตราย"
52180-79 = "รุ่นพี่ทำอะไรผิดงั้นเหรอ? ที่สถานการณ์เป็นแบบนี้น่ะ มันเป็นเพราะพวกชมรมความงามของธรรมชาติ#nต่างหาก!"
52180-80 = "ใช่เจ้าค่ะ รุ่นพี่นางุสะพยายามเต็มที่เพื่อปกป้องพวกเราแล้วเจ้าค่ะ"
52180-81 = "รุ่นพี่นางุสะ ฉันรู้ว่าตอนนี้รุ่นพี่สับสน แต่อย่าเข้าใจผิดจนตำหนิคนผิดเลย"
52180-82 = "คนที่ต้องรับมือและรับผิดชอบสถานการณ์ในตอนนี้ไม่ใช่คุณที่เป็นรักษาการหัวหน้า... แต่เป็นรุ่นพี่อายาเมะที่เป็นหัวหน้าต่างหาก"
52180-83 = "ไม่หรอก... นี่ไม่ใช่ความรับผิดชอบของอายาเมะ อายาเมะไม่ได้ทำอะไรผิด"
52180-84 = "รุ่นพี่...!"
52180-85 = "สุดท้ายแล้วสาเหตุของเหตุการณ์ทั้งหมดก็มาจากฉันที่ไม่เข้าใจอายาเมะ..."
52180-86 = "ใช่ค่ะ มาจากคุณที่ไร้ความสามารถ... และเลือกที่จะเชื่ออีกฝ่ายตามที่ตัวเองอยากเชื่อยังไงล่ะ ใช่มั้ยคะ นางุสะจัง~?"
52180-92 = "ยาบูกิ ชูโระ...!"
52180-93 = "อะฮะฮ่า อะฮ่าฮ่าฮ่า!"
52180-94 = "อะไรกันคะเนี่ย สภาพที่น่าสมเพชแบบนี้?"
52180-95 = "เอาแรงกายแรงใจและความตั้งใจในตอนนั้นไปไว้ไหนกันหมดแล้ว? ทำไมถึงอยู่ในสภาพที่ดูไม่ได้เลยล่ะคะ นางุสะจัง?"
52180-96 = "ไม่รู้งั้นเหรอคะว่าอายาเมะที่จู่ๆ ก็ปรากฏตัวต่อหน้าพวกคุณคืออายาเมะตัวปลอมน่ะ? เข้าใจผิดว่านั่นคือเพื่อนที่ลืมไม่ได้แม้แต่ในความฝันอย่างงั้นเหรอคะ?"
52180-100 = "โกหก..."
52180-101 = "เธอแค่ไม่อยากจะเชื่อมันต่างหาก"
52180-102 = "หมายความว่าหัวหน้าอายาเมะที่พวกเราเจอไม่ใช่ตัวจริงงั้นเหรอ?"
52180-103 = "ก็ใช่น่ะสิคะ"
52180-104 = "เพื่อนที่ปรากฏตัวมาช่วยชีวิตในยามวิกฤตราวกับกำลังรอเวลานี้อยู่ แล้วก็ช่วยพูดดีๆ เพื่อคลายความรู้สึกผิดน่ะเหรอ จะเพ้อฝันอะไรก็เอาให้มันพอดีๆ หน่อยเถอะ"
52180-105 = "อายาเมะคนนั้นน่ะ... ไม่สิ 'สิ่งนั้น' ที่ปลอมตัวเป็นอายาเมะน่ะ ที่จริงแล้วก็คือความกลัวของนางุสะจัง#nที่เกิดจากความลึกลับของ <โทเท บุคไค โรคุ> ต่างหากล่ะคะ!"
52180-106 = "ความกลัวเหรอเจ้าคะ? แต่รุ่นพี่อายาเมะที่พวกเราเห็นก็ไม่ได้น่ากลัวเลยสักนิดนะ..."
52180-107 = "พูดเหมือนไม่รู้ความเป็นจริงทางโลกเลยนะคะ คุณมิโกะแห่งตระกูลคาเดโนะโคจิ"
52180-108 = "ส่วนมากแล้วความกลัวอยู่ในรูปแบบของสิ่งที่เข้าใจง่ายอย่างสิ่งที่น่าขนลุกหรือน่าหวาดกลัว แต่บางครั้งมันก็อยู่ในรูปแบบของความสุขค่ะ"
52180-109 = "ความสุขที่ใจปฏิเสธมาตลอด ความสุขที่ฟุ้งซ่านและไม่มีวันเป็นจริงได้ ไม่มีอะไรน่ากลัวไปกว่าการ#nเห็นความสุขนั่นอยู่ตรงหน้าแล้วละค่ะ"
52180-113 = "นั่นก็เพราะ... ยิ่งมองดูความสุขในมโนภาพนั่นมากเท่าไร ความโหดร้ายของความเป็นจริง ก็จะยิ่งเสียดแทงใจมากเท่านั้น"
52180-114 = "อึก..."
52180-115 = "คุณน่ะแทนที่อายาเมะไม่ได้หรอกค่ะ นางุสะจัง"
52180-116 = "เธอรู้จักรุ่นพี่นางุสะหรือไง ถึงได้มาพูดเรื่องไร้สาระแบบนี้?!"
52180-117 = "อะฮะฮะฮ่า! อยากปฏิเสธจนต้องโวยวายขนาดนั้นเลยเหรอคะ?"
52180-118 = "แต่จะทำยังไงดีล่ะคะ? ไม่ว่าจะคร่ำครวญและร้องตะโกนปฏิเสธแค่ไหน ความจริงก็ไม่เปลี่ยนแปลงไป#nแม้แต่น้อยค่ะ "
52180-119 = "ไม่ว่าจะพยายามมากแค่ไหน ความจริงที่ว่าพวกเธอคือกลุ่มคนล้มเหลวที่เทียบชั้นกับอายาเมะไม่ได้#nก็ไม่เปลี่ยนไปหรอก"
52180-120 = "เมื่อไม่มีประโยชน์อีกต่อไป สักวันหนึ่งก็คงถูกทิ้งขว้างเหมือนของที่ใช้งานไม่ได้แล้ว..."
52180-121 = "[s] \"ชูโระ ครูสงสัยอย่างหนึ่ง\""
52180-122 = "อะไรเหรอคะ คุณครูจากชาเล่ต์"
52180-123 = "ถ้าคิดจะทำให้ฉันหวั่นไหวด้วยการใช้คารม ฉันว่าหยุดดีกว่าค่ะ"
52180-124 = "คำยั่วยุจากผู้แพ้ที่ถูกจับตัวไว้น่ะ ทำอะไรฉันไม่ได้หรอก"
52180-125 = "[s9] \"ตอนโดนอายาเมะตัวปลอมเล่นงานก็เป็นการแสดงเหรอ?\"\n[s10] \"ตอนโดนอายาเมะตัวปลอมเล่นงานก็เป็นการตบตาเหรอ?\""
52180-131 = "หืม...?"
52180-132 = "นั่นเรียกว่าคำถามเหรอคะ?"
52180-133 = "ถามอะไรไม่เห็นจะเข้าท่า... ทุกอย่างถูกวางแผนเอาไว้ตั้งแต่แรกแล้วเพื่อจับตัวคุณกับเฮียกกะเรียวรัน#nยังไงล่ะคะ"
52180-134 = "ทั้งการโดนอายาเมะตัวปลอมจับตัว ทั้งการพาคุณไปที่คฤหาสน์นิพพาน..."
52180-138 = "หืม...?"
52180-139 = "คุณครูจากชาเล่ต์...?"
52180-142 = "ตลอดจนการใช้คุณเป็นโล่ในตอนท้ายด้วย..."
52180-143 = "ทั้งหมดนั่นเป็นการแสดงเพื่อท่านโคคุริโกะ...!"
52180-146 = "[ns11] \"นี่ไม่ใช่คำที่คนที่ถูกจับตัวไว้จะพูดหรอกนะ แต่ว่า...\"\n[ns12] \"ก่อนหน้านี้ครูก็เคยบอกไปแล้วครั้งหนึ่งแล้วนี่...\""
52180-149 = "[ns13] \"การแสดงในสิ่งที่ไม่ใช่ตัวเองไม่ใช่เรื่องแปลกหรอก\"\n[ns14] \"ใครๆ ก็เล่นละครเป็นสิ่งที่ไม่ใช่ตัวเองกันทั้งนั้นนั่นแหละ\""
52180-152 = "[ns] \"เพราะงั้นอย่าเพิกเฉยต่อสิ่งที่ตัวเองก่อไว้เลย\""
52180-154 = "[ns] \"ชูโระแค่ต้องทำในสิ่งที่ชูโระต้องทำ\""
52180-155 = "ฮะ... ฮ่าฮ่า... ก็สงสัยอยู่เชียวว่าจะพูดอะไร"
52180-156 = "คิดว่าจะเปลี่ยนใจฉันได้ด้วยการใช้คารมกระจอกๆ แบบนี้เหรอคะ?"
52180-157 = "คิดว่าพอช่วยฉันไว้ในตอนนั้น... แล้วฉันจะหักหลังท่านโคคุริโกะแล้วมาช่วยคุณงั้นเหรอ?"
52180-158 = "จริงๆ เลยนะ... นั่นเป็นความเข้าใจผิดแบบเต็มเปาเลยค่ะ"
52180-159 = "ความเข้าใจผิดที่มีแต่เด็กๆ เท่านั้นที่คิดกัน..."
52180-160 = "ใช่ ก็เหมือนกับคุซึโนฮะในตำนานที่พวกคุณเชื่อกัน นั่นเป็นผลจากความหลงผิดที่ไร้สาระทั้งนั้น!"
52180-164 = "คุซึโนฮะ..."
52180-165 = "จริงสิ ถ้าตอนนั้นคุซึโนฮะทิ้งฉันให้ตายอยู่ในทุ่งหิมะใหญ่ไปเลยก็คงจะดี"
52180-166 = "ทำไมถึงมาช่วยฉันแทนที่จะไปช่วยอายาเมะ ทำไมไม่ปล่อยให้ฉันนอนหนาวตายอยู่ตรงนั้นไปเลย"
52180-167 = "พูดเรื่องอะไรคะ นางุสะจัง"
52180-168 = "พูดเหมือนคุณได้เจอกับคุซึโนฮะตัวจริงมาแล้วอย่างนั้นละ"
52180-169 = "[s15] \"คุซึโนฮะไม่ใช่ตัวละครสมมติที่มีอยู่แต่ในตำนานหรอกนะ\"\n[s16] \"ครูก็เคยได้รับจดหมายของคุซึโนฮะจากนางุสะเหมือนกัน\""
52180-172 = "จะบอกว่าคุซึโนฮะ... มีตัวตนอยู่ในโลกแห่งความจริงงั้นเหรอ?"
52180-173 = "ผู้พยากรณ์ใหญ่คุซึโนฮะที่เป็นเจ้าของเดิมของหนังสือลึกลับทุกเล่ม และเป็นหัวหน้าคนแรกของ#nเฮียกกะเรียวรันน่ะเหรอ...?"
52180-174 = "ถ้าคิดจะทำให้ฉันตกใจด้วยวิธีนี้ละก็..."
52180-181 = "แต่จะว่าไปก็มีจุดที่แปลกๆ อยู่นะ"
52180-182 = "ท่านโคคุริโกะบอกว่าตอนนั้นนางุสะถูกทิ้งไว้กลางทุ่งหิมะใหญ่ที่อยู่ห่างไกลกับหมู่บ้านแท้ๆ แต่เธอก็กลับมาได้อย่างปลอดภัย"
52180-183 = "ท่ามกลางทุ่งหิมะที่แทบจะไม่มีผู้คนหรือสัตว์ผ่านไปมา แทบจะเป็นไปไม่ได้เลยที่จะมีใครบังเอิญมาเจอ#nนางุสะเข้า"
52180-184 = "และต่อให้ครูจากชาเล่ต์จะเป็นคนที่ใช้วาทศิลป์ในการพูดบอกความจริงอย่างหลักแหลม แต่ก็ไม่น่าจะเป็นคนที่พูดโกหก..."
52180-185 = "ถ้าผู้พยากรณ์ใหญ่คุซึโนฮะมีตัวตนอยู่จริง และถ้าท่านอยู่ในวิหารอัสดงในทุ่งหิมะใหญ่..."
52180-186 = "งั้นก็สร้างหนังสือลึกลับเล่มใหม่เพื่อทดแทน <อิโนะ โมโนโนเคะ โรคุ> ที่หายไปคราวก่อนได้น่ะสิ"
52180-192 = "น่าเสียใจนะคะ นางุสะจัง โดนทิ้งจากเพื่อนที่ไว้ใจยังไม่พอ ซ้ำยังต้องมาอยู่ในสถานการณ์ที่ทำอะไร#nไม่ได้นอกจากโทษตัวเองอยู่แบบนี้อีก"
52180-193 = "น่าทุกข์ใจที่ฉันต้องเฝ้ามองด้วยความสงสารและสมเพชนะคะ"
52180-194 = "งั้นฉันให้โอกาสนางุสะจังสักครั้งดีมั้ยคะ?"
52180-195 = "โอกาสเหรอ...?"
52180-196 = "ค่ะ ถึงคุณจะทำทุกอย่างพังไม่เป็นท่าหมดแล้ว แต่ในห้วงอัสดงก็ยังมีคนที่คุณช่วยได้และยังสานต่อ#nความสัมพันธ์ได้อยู่ไม่ใช่เหรอคะ?"
52180-201 = "ถ้างั้นก็ไปหาท่านคุซึโนฮะอีกครั้งสิคะ..."
52180-203 = "ตอนต่อไป;ความทรงจำแห่งนิพพาน"

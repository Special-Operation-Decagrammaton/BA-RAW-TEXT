52180-104 = "3;슈로;09;위기에 처하자마자 기다리고 있었던 것처럼 등장해 목숨을 구해주고, 듣기 좋은 소리로 죄책감을 덜어주는 친구라니. 편의주의적인 망상도 정도가 있지."
52180-105 = "3;슈로;14;그 아야메는…… 아니. 아야메의 모습을 한 '그것'은 사실, 괴서 <토테이붓카이로쿠>의 신비에서 태어난 나구사 쨩의 두려움이었답니다!"
52180-106 = "3;유카리;04;두려움이요? 하지만 그 아야메 선배의 모습은 조금도 무서워 보이지 않았는데……\n#3;em;[?]"
52180-107 = "3;슈로;01;역시 세상 물정 모르시는 말씀이시네요, 카데노코지의 무녀님.\n#3;em;[음표]"
52180-108 = "3;슈로;13;두려움이란 알기 쉬운 소름 끼치거나 두려운 형태를 하고 있기도 하지만, 가끔은 도리어 행복을 의태 하기도 하지요."
52180-109 = "3;슈로;15;마음속으로 줄곧 부정해 오던, 절대로 현실이 될 수 없는 허황된 행복. 그 행복이 눈앞에 나타나는 것만큼이나 두려운 일도 없잖아요?\n#3;em;[재잘]"

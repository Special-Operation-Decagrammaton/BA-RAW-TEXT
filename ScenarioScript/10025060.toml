[translation]
10025060-1 = "ตอนที่ 6;เมื่อหมอกจางลง"
10025060-2 = "(เช้าวันรุ่งขึ้น...)"
10025060-12 = "...วันนี้ก็เปล่าประโยชน์อีกแล้วสินะ"
10025060-13 = "เอาละๆ ถ้าทอดสมอเรือแล้วก็ช่วยกันผูกเชือกแล้ววางตาข่ายไว้ด้วยล่ะ"
10025060-14 = "เราต้องรีบไปจัดการลานตากปลาที่ยุ่งเหยิงก่อนที่แดดจะร้อนไปมากกว่านี้"
10025060-15 = "คือว่า... ผู้อาวุโส ลานตากปลามันถูกทำความสะอาดเอาไว้เรียบร้อยแล้วน่ะครับ"
10025060-16 = "...ว่าไงนะ? ระหว่างนี้มีแมวขโมยตัวอื่นแวะมางั้นเหรอ?"
10025060-17 = "ระหว่างที่พวกเราไปทำงาน เหมือนว่าจะมีใครไม่รู้เข้ามาทำความสะอาดลานตากปลาไว้น่ะครับ"
10025060-18 = "ไม่ใช่แค่ทำความสะอาดนะ เพราะเหมือนจะซ่อมเครื่องมือและอุปกรณ์ความปลอดภัยที่พังแล้วให้หมด#nเลยด้วย..."
10025060-23 = "...ฝีมือใครกัน?"
10025060-29 = "...เท่านี้ก็คงไม่มีปัญหาแล้วละ"
10025060-30 = "โมเอะ เช็กแผงวงจรไฟฟ้าข้างใต้อีกครั้งซิ ถ้าเชื่อมต่อถูกต้อง ตอนนี้ไฟน่าจะเข้าแล้วละ"
10025060-31 = "ได้เลย"
10025060-44 = "ยะ.. หยุดนะ! ไปทำอะไรกันอยู่ข้างบนนั้นคะ?"
10025060-45 = "สายไฟที่เชื่อมกับเสาไฟต้นนั้นมีกระแสไฟฟ้าไหลผ่านเป็นหมื่นโวลต์เลยนะคะ!"
10025060-46 = "มันอันตรายนะคะ รีบลงมาเถอะค่ะ...!"
10025060-47 = "ไม่ต้องห่วงหรอก ก่อนทำงาน ฉันเช็กล่วงหน้าแล้วว่าไม่มีไฟฟ้าไหลผ่านตรงนี้หรอกน่ะ"
10025060-48 = "ทำงาน...?"
10025060-49 = "เสร็จหมดแล้วละ จะรีบลงไปเดี๋ยวนี้เลย"
10025060-59 = "โมเอะ เอาเบรกเกอร์ขึ้นอีกครั้งได้เลย"
10025060-65 = "ยืนยันการทำงานปกติ... ที่เบรกเกอร์มันลงมาเพราะไฟฟ้าลัดวงจรจริงด้วย"
10025060-66 = "สายไฟที่โดนลมทะเลมันเสื่อมสภาพได้ง่ายน่ะ ถ้ามันเจอกับกระแสไฟฟ้าแรงดันสูงนิดหน่อย ความร้อนก็จะมากไปจนเบรกเกอร์ตัดลงมาได้"
10025060-67 = "ฉันเปลี่ยนสายไฟเป็นเส้นใหม่ไว้ แล้วก็เช็ดสนิมที่แผงจ่ายไฟไว้แล้วด้วย"
10025060-68 = "หลังจากนี้คงต้องให้ผู้เชี่ยวชาญเข้ามาดูอีกครั้ง แต่อย่างน้อยตอนนี้เราก็น่าจะทำงานได้จนถึงเช้ามืด#nได้แบบไร้ปัญหา"
10025060-70 = "......ซะ... ซ่อมได้ยังไงเหรอคะ?"
10025060-72 = "หืม? ก็แค่ซ่อมแผงจ่ายไฟเอง มันไม่ได้ต่างจากการติดตั้งสายไฟฟ้าหรือสายสื่อสารในการต่อสู้กลาง#nแจ้งสักเท่าไรนี่?"
10025060-73 = "นึกว่านักเรียนคิโวทอสจะเดินสายไฟกันเป็นหมดทุกคนซะอีก..."
10025060-74 = "คนที่มีความรู้เรื่องพวกนั้นขนาดนี้น่ะ ใน SRT ก็มีแค่เธอเท่านั้นแหละ..."
10025060-76 = "S... อะไรนะคะ?"
10025060-78 = "มะ... ไม่มีอะไร ไม่มีๆ...!"
10025060-79 = "ท่าเทียบเรือนี้ดูอันตรายมากเลยนะ ราวจับก็ไม่มี ราวเหล็กกันถนนก็ไม่มีอีก... มันปล่อยปละละเลยกัน#nแบบนี้ได้เหรอ?"
10025060-81 = "ก่อนหน้านี้ก็มีอุบัติเหตุคนตกลงไปในน้ำอยู่บ่อยๆ พวกฉันก็เลยว่าจะติดตั้งรั้วกั้นเพื่อความปลอดภัยอยู่#nค่ะ..."
10025060-82 = "แต่ทางนั้นก็บอกว่าจะเป็นปัญหาเวลาเอาเรือมาจอดเทียบท่าและขนส่งปลาที่จับมาได้ค่ะ"
10025060-83 = "ถึงพวกฉันจะพยายามทำหลายๆ ทางแล้ว แต่ก็ยังไม่เป็นผลค่ะ"
10025060-85 = "อืม... แต่อย่างน้อยก็ควรจะมีป้ายเตือนที่สะดุดตาหน่อยนะ"
10025060-86 = "อ้อ โมเอะ เรามีสีน้ำมันเรืองแสงหรือเปล่า?"
10025060-87 = "อื้ม เรายังเหลือสีสะท้อนแสงที่ใช้ในการต่อสู้ตอนกลางคืนอยู่..... ทำไมเหรอ?"
10025060-88 = "ก็ถ้าทาสีสะท้อนแสงเคลือบไว้ตามราวจับ ก็จะสังเกตเห็นได้แม้ในตอนกลางคืนไงล่ะ แบบนี้ก็คงลด#nอุบัติเหตุคนเดินตกน้ำได้อยู่นะ"
10025060-89 = "ไปทาสีจากท่าเทียบเรือตรงนั้นมาจนถึงเสาจอดเรือตรงนี้กันเถอะ"
10025060-90 = "ชิ แต่สีนี้มันไม่ใช่ถูกๆ เลยนะ..."
10025060-91 = "อย่ามาทำเป็นขี้ตืดไปหน่อยเลยน่า อาวุธที่เธอซื้อตุนไว้อย่างไม่คิดหน้าคิดหลังมันแพงกว่านั้นเป็นเท่า#nตัวอีกนะ..."
10025060-92 = "งั้นพวกฉันขอไปเอาสีมาก่อนนะ"
10025060-94 = "จริงสิ ไฟถนนยังไม่ได้ต่อสายดินเลย ฝากดูอย่าให้ชาวเมืองเข้าไปใกล้ๆ เสาไฟด้วยนะ!"
10025060-96 = "ได้ค่ะ..."
10025060-105 = "อ่า..."
10025060-106 = "สวัสดีค่ะ วันนี้อากาศดีจังเลยนะคะ"
10025060-107 = "...มาปรับปรุงทั้งหมู่บ้านไว้ตามอำเภอใจเลยนะ"
10025060-108 = "ตั้งแต่เสาลานตากปลาไปยันไฟถนนที่พังเลย..."
10025060-109 = "เปลี่ยนเป็นของใหม่เสียทั้งหมดจนไม่รู้สึกถึงความสอดคล้องเลย"
10025060-110 = "ขะ... ขอโทษค่ะ พวกฉันแค่มองว่าสิ่งปลูกสร้างเก่าๆ มันอันตรายก็เท่านั้น..."
10025060-111 = "ไม่ทราบว่าไปรบกวนอะไรหรือเปล่าคะ?"
10025060-112 = "ไม่หรอก ไม่รบกวนอะไรทั้งนั้น ชาวบ้านคนอื่นดูชอบกันเสียด้วยซ้ำ..."
10025060-113 = "คนที่ไม่ชอบการเปลี่ยนแปลงและพอใจกับของเก่าๆ ก็มีแต่คนแก่ที่นี่เท่านั้นแหละ"
10025060-117 = "คือว่าฉัน... ขอโทษสำหรับเรื่องเมื่อวานด้วยนะคะ"
10025060-118 = "ถึงจะกลัวจนทำอะไรไม่ถูก แต่ฉันก็ไม่ควรพูดอะไรที่เสียมารยาทกับคนในหมู่บ้านเลยค่ะ"
10025060-119 = "ฉันควรจะต้องฟังความคิดเห็นของทุกคนที่นี่อย่างสุขุมแท้ๆ......"
10025060-120 = "ช่างเถอะ ถ้าคนเราควบคุมทุกอย่างได้ โลกนี้ก็คงไม่มีสิ่งที่เรียกว่าความกลัวหรอก"
10025060-121 = "ยิ่งไปกว่านั้น... การที่จะบอกว่าหมู่บ้านนี้น่าสงสัยก็ไม่ใช่ความคิดที่ผิดอะไรหรอก"
10025060-122 = "พวกฉันตั้งใจให้มันออกมาเป็นอย่างนั้นอยู่แล้วน่ะ"
10025060-123 = "คำพูดแบบนั้นมัน..."
10025060-124 = "... ฉันไม่ได้จะพูดถึงเรื่อง <ตัวตนแห่งห้วงลึก> หรอก"
10025060-125 = "เพราะพวกคนต่างถิ่นที่เข้ามากันน่ะ แค่ได้ฟังเรื่องเก่าๆ ที่ไม่เคยรู้มาก่อนแค่นิดเดียวก็กลัวจนออกจาก#nหมู่บ้านกันแล้ว"
10025060-126 = "พอไม่มีคนนอกเข้ามา หมู่บ้านก็ชะงัก การเปลี่ยนแปลงก็เลยไม่เกิด เราก็เลยไม่จำเป็นต้องปฏิเสธสิ่งที่#nทำมาตลอดชีวิตยังไงล่ะ"
10025060-127 = "โดยที่เราเองก็ไม่รู้เลยว่าความกลัวนั้นมันค่อยๆ กัดกินหมู่บ้านไปทีละนิด"
10025060-128 = "...แต่เท่าที่ฉันเห็น หมู่บ้านนี้ยังสวยงามเหมือนเคยเลยนะคะ"
10025060-129 = "อย่ามาแกล้งพูดให้รู้สึกดีเลยน่า"
10025060-130 = "จะว่าไป... พวกเธอกำลังทำอะไรกันอยู่น่ะ?"
10025060-131 = "กำลังผูกเงื่อนเชือกอยู่ค่ะ"
10025060-132 = "พอดีเชือกสำหรับโยนมันสึกแล้ว ก็เลยดูไม่ค่อยมีน้ำหนักค่ะ..."
10025060-133 = "ฝีมือดีอยู่นี่ ไปเรียนจากไหนมาเหรอ?"
10025060-134 = "อ้อ เรื่องผูกเงื่อนแบบนี้ ฉันเรียนตอนเป็นหน่วยรบ..."
10025060-136 = "...หน่วยรบ?"
10025060-137 = "อ๊ะ ไม่ใช่ค่ะ คือว่า... ตอนอยู่ในหน่วยเนตรนารีน่ะค่ะ"
10025060-139 = "ในหน่วยเนตรนารีมีสอนผูกเงื่อนยากๆ แบบนี้ด้วยเหรอ?"
10025060-143 = "แต่ก็นะ... ถึงจะเข้าใจเด็กสมัยใหม่ได้ยาก แต่เราก็คงไม่อาจเข้าใจทุกสิ่งทุกอย่างในโลกได้ในพริบตา#nเดียวหรอก"
10025060-144 = "...เหมือนกับหมู่บ้านนี้ใช่ไหมคะ?"
10025060-148 = "อยากให้กลับมาจับกุ้งได้เยอะๆ เหมือนเดิมจังเลยค่ะ"
10025060-149 = "...นั่นน่ะสิ"
10025060-157 = "เบ็ดตกปลาขนาดความยาว 7 ฟุตกับรอกหมุนขนาดเล็ก..."
10025060-158 = "ส่วนสายเบ็ดก็ใช้เป็นสายไนลอนเบอร์ 0.8 ก็น่าจะพอ..."
10025060-159 = "สุดท้ายก็ใช้เหยื่อโลหะปลอมที่ทำมาจากปลอกกระสุน..."
10025060-167 = "นี่ๆ..."
10025060-169 = "วะ... ว้ายย?! มะ... มาตั้งแต่ตอนไหนกันคะเนี่ย?"
10025060-170 = "มาอยู่ตั้งแต่เมื่อกี้แล้วนะ..."
10025060-171 = "ขะ... ขอโทษค่ะ ปกติคนอื่นจะไม่เห็นว่าฉันมีตัวตนเสียมากกว่า และก็ถือว่ามันแทบจะไม่มีกรณีที่เจอ#nตรงกันข้ามเลย..."
10025060-172 = "ไม่หรอก เธอน่าจะกำลังตั้งใจทำอะไรอยู่ ขอโทษนะ"
10025060-173 = "มะ... ไม่เป็นไรค่ะ..."
10025060-175 = "(คนนี้คือนักตกปลาที่สวดคาถาอะไรแปลกๆ ที่ชายหาดเมื่อวานนี่นา...)"
10025060-176 = "(แถมยังชวนคุยก่อนที่จะเข้าไปถึงด้วย ในฐานะของสมาชิก SRT แล้ว เราต้องไม่พลาดโอกาสนี้และหา#nข้อมูลให้ได้!)"
10025060-177 = "(แต่ว่าในหัวยังเอาแต่นึกถึงเรื่องเมื่อวานอยู่เรื่อยเลย... กลัวจนไม่กล้าไปชวนคุยก่อนเลย...)"
10025060-179 = "มาตกปลาอะไรอยู่ตรงนี้เหรอ?"
10025060-180 = "ฉะ... ฉันกำลังตกปลาอาจิอยู่ค่ะ"
10025060-181 = "ฉันว่าจะจับปลามาทำอาหารเย็นในระหว่างที่สมาชิกคนอื่นไปดูแลหมู่บ้านอยู่น่ะค่ะ"
10025060-182 = "จริงๆ ให้กินข้าวกล่องเหลือทิ้งเหมือนทุกวันก็ได้อยู่หรอกค่ะ แต่ว่าหมู่บ้านนี้ไม่เห็นมีร้านสะดวกซื้อเลย ..."
10025060-183 = "สมาชิก...? ข้าวกล่องเหลือทิ้ง...?"
10025060-184 = "เอ่อ คือว่า... เรื่องนั้น..."
10025060-189 = "อ๊ะ... เดี๋ยวนะคะ เมื่อกี้ทุ่นมันขยับค่ะ"
10025060-190 = "ปลาอาจิอ่อนไหวต่อเสียงรบกวน ช่วยลดเสียงลงสักครู่นะคะ"
10025060-191 = "อะ... อื้ม..."
10025060-192 = "ต้องค่อยๆ ดึงสายขึ้นมา... ตะขอจะได้ไม่หลุด..."
10025060-198 = "...จับได้แล้ว!"
10025060-199 = "โห ตัวใหญ่มากเลยนะนั่น... น่าจะยาวเกิน 30 ซม. เลยนะ!"
10025060-201 = "ชมกันเกินไปแล้วค่ะ ฉันว่าจะน่าได้แค่ 20 ซม. นะคะ..."
10025060-202 = "ถ้าตกตัวประมาณนี้ได้อีกสัก 3 ตัว ก็น่าจะเพียงพอสำหรับอาหารเย็นวันนี้แล้วค่ะ"
10025060-203 = "จะตกให้ได้อีก 3 ตัวเหรอ? ตัวใหญ่แบบนี้เนี่ยนะ...?"
10025060-204 = "ค่ะ ปกติแล้วพวกฉันจับปลาอาจิกันได้ครั้งละห้าหกตัวเลยค่ะ..."
10025060-205 = "มะ... มีปัญหาอะไรหรือเปล่าคะ?"
10025060-209 = "เอ่อ... ฉันรู้สึกผิดที่สร้างความเดือดร้อนให้ตั้งแต่เมื่อวานน่ะ แต่ว่า..."
10025060-210 = "ช่วยสอนฉันตกปลาหน่อยได้ไหม?"
10025060-212 = "คะ... คะ......?!"

[translation]
10025060-1 = "Episode 6;When the Fog Clears"
10025060-2 = "The next morning..."
10025060-12 = "...Another day wasted."
10025060-13 = "Okay, that'll do for the anchor. Reel in the line and tie the rat stoppers."
10025060-14 = "We gotta clean up this mess before the heat of the day sets in."
10025060-15 = "Um, sir...? Someone already cleaned up the drying workshop."
10025060-16 = "Huh? Were we robbed, after all?"
10025060-17 = "Nothing's missing. Looks like someone tidied up while we were out on the water."
10025060-18 = "They even fixed up all the damage from last night's ruckus..."
10025060-23 = "Who'd do a thing like that...?"
10025060-29 = "This should do it."
10025060-30 = "Moe, run a check on the panel board. It should be lighting up now."
10025060-31 = "Okie-doke!"
10025060-44 = "Hey, you! What do you think you're doing?"
10025060-45 = "There're thousands of volts running through those wires!"
10025060-46 = "Come down before you get yourself hurt!"
10025060-47 = "Don't worry. We shut off the power before we started work."
10025060-48 = "Um... Work?"
10025060-49 = "I'm almost done up here, then I'll be right down!"
10025060-59 = "Moe, go ahead and raise the breaker again."
10025060-65 = "And...we're good. It was just a short circuit, after all."
10025060-66 = "The wires exposed to the ocean winds were badly deteriorated. A little extra voltage is all it took to trip the breaker."
10025060-67 = "We replaced the damaged wires with new ones and cleaned the rust off the panel board."
10025060-68 = "You'll want a professional to check our work later, but for now, at least the fishermen won't be stumbling around in the dark."
10025060-70 = "You fixed this... Just the two of you?"
10025060-72 = "It's nothing. Repairing a panel board isn't very different from laying power or communication lines in the field, really."
10025060-73 = "Surely any student in Kivotos can lay down temporary wiring..."
10025060-74 = "Pft. You're the only student I know who could do that, even in SRT—"
10025060-76 = "S... What did you say?"
10025060-78 = "N-Nothing!"
10025060-79 = "Say! I noticed your dock here doesn't have any guardrails... Isn't that a hazard?"
10025060-81 = "Every once in a while, someone takes a spill into the water. We tried putting up safety railing once..."
10025060-82 = "The fishermen complained 'cause it got in the way. They couldn't moor their boats or haul their catches ashore."
10025060-83 = "It just didn't work out in the end..."
10025060-85 = "Hmm... I'd still like to see some sort of precaution here."
10025060-86 = "Moe, do you have any of that luminous paint left?"
10025060-87 = "Yeah, I've got some left over from last night's operation... Why?"
10025060-88 = "If we paint along the edge of the dock here, it'll be easier to see at night. I imagine fewer people will fall in."
10025060-89 = "Please paint a line from the edge over there all the way to that mooring post."
10025060-90 = "Tch... Military paints aren't cheap, you know..."
10025060-91 = "Oh, so now you care about the cost? How much have you spent on munitions this month?"
10025060-92 = "We'll be right back with the paint."
10025060-94 = "Oh! I haven't grounded the streetlights yet, so please make sure nobody gets too close to the utility poles!"
10025060-96 = "...Sure."
10025060-105 = "...Ah."
10025060-106 = "Hello, sir. The weather is nice today."
10025060-107 = "I see you've made yourselves right at home, making changes left and right."
10025060-108 = "Those old supports you replaced, the broken streetlights..."
10025060-109 = "Your repairs look too new. Don't fit in with the village."
10025060-110 = "S-Sorry. We were trying to help make the town a little safer."
10025060-111 = "I hope we haven't overstepped..."
10025060-112 = "Aw, hell. The other villagers actually like what you've done, for some reason."
10025060-113 = "The only folks who don't like what you've done are old sticks in the mud who're afraid of change."
10025060-117 = "...I owe you an apology for what happened yesterday."
10025060-118 = "I was too frightened to think straight, but that's no excuse. I was very rude."
10025060-119 = "I should have remained calm and listened carefully to what you and everyone else were saying..."
10025060-120 = "Can't be helped. We all lose control sometimes, especially when we're scared."
10025060-121 = "And I'd be lying if I said we hadn't given you plenty reason to feel scared."
10025060-122 = "I hate to admit it, but this place ain't exactly welcoming by design."
10025060-123 = "You don't mean..."
10025060-124 = "No, this ain't about the Deep Ones or nothing like that."
10025060-125 = "Some of us like the peace and quiet of our little village, and spooky ghost stories do a good job of scaring off the tourists."
10025060-126 = "A village that doesn't welcome outsiders doesn't have to change. Doesn't have to take in new ideas from the outside."
10025060-127 = "But that fear was eating us up from the inside, too."
10025060-128 = "...I still think it's a pretty village."
10025060-129 = "You're just saying that."
10025060-130 = "What're you working on there, anyway?"
10025060-131 = "Oh, this? It's a monkey's paw knot."
10025060-132 = "This heaving line looks like it's getting old, and I was worried the weight might slip off..."
10025060-133 = "You know your way around a knot. Where'd you learn that?"
10025060-134 = "Oh, this kind of knotting was part of my training for special—"
10025060-136 = "Special...?"
10025060-137 = "Uh... Special handicrafts club."
10025060-139 = "They teach monkey's paw knots in handicrafts club?"
10025060-143 = "Well... You know... This world is full of mysteries."
10025060-144 = "Ha. Like this village, right?"
10025060-148 = "I hope you have better luck catching shrimp soon."
10025060-149 = "So do I."
10025060-157 = "Small spinning reel, 7-foot lure rod..."
10025060-158 = "And this 0.8 nylon line should be sufficient..."
10025060-159 = "Finally, I made this metal jig from a bullet casing..."
10025060-167 = "Um..."
10025060-169 = "Wh-Whoa! Where did you come from?"
10025060-170 = "I've been here the whole time..."
10025060-171 = "S-Sorry. I'm used to people not noticing me, but it's rare for the opposite to happen..."
10025060-172 = "Don't sweat it. It looks like you were deep in thought. Sorry for interrupting."
10025060-173 = "N-No... It's okay..."
10025060-175 = "(This is the same fisherman who was chanting that weird spell yesterday...)"
10025060-176 = "(It looks like he's willing to talk. As a member of SRT, I have a duty to get all the information I can from him!)"
10025060-177 = "(B-But... I'm still scared 'cause of everything that happened yesterday...)"
10025060-179 = "So... What're you fishing for?"
10025060-180 = "M-Mackerel..."
10025060-181 = "The rest of my squad's busy cleaning up the village, so I decided to catch some fish for dinner."
10025060-182 = "I wish we could just scavenge some discarded bentos as usual, but there's no convenience store in town..."
10025060-183 = "Squad? Discarded bento...?"
10025060-184 = "I-I mean... Um..."
10025060-189 = "Oh... The float moved."
10025060-190 = "Mackerels are sensitive to noise, so please keep your voice down."
10025060-191 = "O-Okay..."
10025060-192 = "Don't let the hook slip... Pull the line slowly..."
10025060-198 = "Got it!"
10025060-199 = "Whoa, it's huge! At least 30 cm!"
10025060-201 = "N-No, it's probably just...20 cm..."
10025060-202 = "If I can catch about 3 more of this size, that should be enough for dinner..."
10025060-203 = "Three more? That are this big?"
10025060-204 = "Yes. You can usually catch half a dozen mackerel at a time, give or take... "
10025060-205 = "I-Is something wrong...?"
10025060-209 = "I'm sorry. I know I've been bugging you since yesterday, but..."
10025060-210 = "Please teach me how to fish!"
10025060-212 = "Wh-What?!"

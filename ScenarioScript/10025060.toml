[translation]
10025060-1 = "第6話;迷霧消散的天空"
10025060-2 = "（隔天早上……）"
10025060-12 = "……今天也沒收穫啊。"
10025060-13 = "好了，船停好的話就來收魚網吧。"
10025060-14 = "得在太陽升起前整理好亂成一團的曬魚場才行啊。"
10025060-15 = "那個，關於這點……曬魚場已經整理乾淨了哦。"
10025060-16 = "是熊谷他們整理的嗎？"
10025060-17 = "這個嘛，剛才熊谷先生在無線電中也說他不清楚……"
10025060-18 = "除此之外，故障的機器好像也全都修好了。"
10025060-23 = "……究竟是誰做的。"
10025060-29 = "這樣應該就……沒問題了吧。"
10025060-30 = "萌，再檢查一次配電箱吧。#n有成功接好的話，這樣應該就會通電了。"
10025060-31 = "OK～"
10025060-44 = "等等……你在那裡做什麼！？"
10025060-45 = "那些電線裡的電可是有數萬伏特哦！？"
10025060-46 = "很危險的，請趕快下來！"
10025060-47 = "沒事沒事。#n在作業前已經確認過沒有通電了。"
10025060-48 = "咦……？"
10025060-49 = "再一會就能完成了，稍等一下吧。"
10025060-59 = "萌，把斷路器的開關打開試試吧。"
10025060-65 = "……OK～#n哦，果然只是短路了而已呢。"
10025060-66 = "畢竟暴露在海風中的電線很容易老化。只要電壓稍高就會因為過載導致斷路器跳閘。"
10025060-67 = "我把老化的電線換新，也幫配電箱除過鏽了。"
10025060-68 = "這樣應急措施應該已經夠完善了。#n啊，不過之後別忘了還是要請專門的業者來看看哦。"
10025060-70 = "……是，是怎麼修好的？"
10025060-72 = "嗯？修理配電箱跟在臨時據點設立通訊設備沒什麼差別吧。"
10025060-73 = "我想只要是奇普托斯的學生，多少都碰過配電箱吧……"
10025060-74 = "連那種知識都知道的，就算是SRT裡也只有你吧？"
10025060-76 = "嗯……？#nSR……？"
10025060-78 = "沒，沒什麼！"
10025060-79 = "話說回來，這個碼頭連護欄跟扶手都沒有，這樣真的沒問題嗎？"
10025060-81 = "過去曾經發生過意外，所以也有試著設置護欄之類的設施……"
10025060-82 = "不過似乎會妨礙到船隻的停泊……"
10025060-83 = "我們已經嘗試過所有可能的手段……卻還是行不通。"
10025060-85 = "唔嗯……如果有晚上也能看清楚的記號，應該多少能起到預防的作用吧。"
10025060-86 = "對了，萌。#n你有帶夜光塗料來嗎？"
10025060-87 = "是有準備夜戰用的……怎麼了嗎？"
10025060-88 = "塗在系纜柱上的話應該會很顯眼吧。#n這樣意外落海的人應該會減少才對。"
10025060-89 = "從這裡一路到那裡……順便把那邊也塗一塗吧！"
10025060-90 = "咦～軍用品可不便宜啊……"
10025060-91 = "別當鐵公雞了。#n你不是常買更貴的武器嗎。"
10025060-92 = "那我們去把塗料拿過來。"
10025060-94 = "……對了，路燈的接地工程還沒結束，#n請幫我們注意一下，別讓其他居民們靠近！"
10025060-96 = "……好，好的。"
10025060-105 = "……啊。"
10025060-106 = "您好。今天天氣真不錯呢。"
10025060-107 = "……虧你們敢擅自對老夫們的村子為所欲為啊。"
10025060-108 = "不管是曬魚場的設備還是故障的路燈……"
10025060-109 = "看起來實在不習慣，有種違和感。"
10025060-110 = "非，非常抱歉……#n那個，我們只是覺得老舊的設備有些危險和不便……"
10025060-111 = "是否多管閒事了呢……？"
10025060-112 = "不……我並沒有這麼說吧。#n村裡人看起來也都很高興。"
10025060-113 = "會拒絕變化、執著於過去的也就只有老人家了吧。"
10025060-117 = "那個……再次向您道歉。"
10025060-118 = "就算是出於害怕，也不該在沒有確切證據的情況下對各位做出無禮的舉動……"
10025060-119 = "應該保持冷靜，聽取各位的意見才是。"
10025060-120 = "……恐懼若是能夠抑制就不算是恐懼了吧。別在意。"
10025060-121 = "何況……要說這個村子不可疑反而才奇怪。"
10025060-122 = "畢竟這正是我們所期望的狀況啊。"
10025060-123 = "莫非是因為……"
10025060-124 = "這跟「深處的存在」無關。"
10025060-125 = "至今為止造訪這裡的人們，一聽見村裡的傳言就會逃也似地離開。"
10025060-126 = "無人來訪的村子將會停滯。#n由於沒有變化，自然也不會有否定過往作法的人。"
10025060-127 = "卻不清楚那樣的[ruby= ・     ・ ]恐懼[/ruby]……會侵蝕整座村子的氣氛。"
10025060-128 = "……不過，我仍然認為這裡是個很棒的村子。"
10025060-129 = "哼，說的倒挺好聽。"
10025060-130 = "嗯……話說你在做什麼？"
10025060-131 = "啊，因為纜繩的前端似乎有點鬆了……"
10025060-132 = "所以我想重新把猴拳結繫好。"
10025060-133 = "手藝還挺不錯。是別人教你的嗎？"
10025060-134 = "啊，這個繩結是在特殊──"
10025060-136 = "……特殊？"
10025060-137 = "啊，沒，沒什麼，那個……是，是在手工藝社學過的。"
10025060-139 = "手工藝社會教猴拳結的綁法……？"
10025060-143 = "雖然難以相信……不過也是。#n真相是無法輕易理解的啊。"
10025060-144 = "……呵呵。#n就像這個村子一樣，對吧？"
10025060-148 = "……希望很快就能像以前一樣捕到許多蝦子。"
10025060-149 = "……就是說啊。"
10025060-157 = "7ft的路亞竿加上小型捲線器……"
10025060-158 = "配合0.8號的尼龍線……"
10025060-159 = "之後再用這個由彈殼改造而成的金屬假餌來──"
10025060-167 = "那個……"
10025060-169 = "噫噫！？#n你，你什麼時候來的……？"
10025060-170 = "我從剛剛就一直在搭話了……"
10025060-171 = "對，對不起……！#n我雖然常常沒被注意到……居然會有我沒注意到別人的時候……"
10025060-172 = "不不不，抱歉在你專心的時候打擾你。"
10025060-173 = "不，不會……不要緊的……"
10025060-175 = "（我記得他就是昨天……在吟唱奇怪咒語的那個人……）"
10025060-176 = "（居然會被對方主動搭話……身為SRT的隊員，絕不能錯過這個機會……！#n　得想辦法問出一點情報才行！）"
10025060-177 = "（可，可是……我還是沒辦法忘記昨天那件恐怖的事。該怎麼辦……）"
10025060-179 = "你也在這裡釣魚嗎？"
10025060-180 = "是，是的。#n我在……釣竹莢魚。"
10025060-181 = "在其他隊員調查村子的期間……由我負責收集糧食……"
10025060-182 = "雖然像平時一樣吃報廢便當也可以……但這個村子沒有便利商店……"
10025060-183 = "隊員……？#n報廢便當……？"
10025060-184 = "啊，那個……"
10025060-189 = "啊……請等一下。#n剛剛浮標動了。"
10025060-190 = "竹莢魚對聲音很敏感，請稍微安靜一下……"
10025060-191 = "哦，哦……！"
10025060-192 = "確認上鉤之後……慢慢地將釣線收回……"
10025060-198 = "……釣到了！"
10025060-199 = "嗚哇！尺寸還真大，應該有30cm吧！"
10025060-201 = "啊，啊哈哈……我想大概只有20cm左右……"
10025060-202 = "再釣3隻左右的話，今天的量應該就沒問題了。"
10025060-203 = "再釣3隻……這麼大的獵物……？"
10025060-204 = "是的。#n竹莢魚的話，我平時大概會釣5、6隻…… "
10025060-205 = "……有，有什麼問題嗎？"
10025060-209 = "抱歉昨天給你添麻煩了……"
10025060-210 = "可以請你教我釣魚嗎！！"
10025060-212 = "咦，咦……！？"

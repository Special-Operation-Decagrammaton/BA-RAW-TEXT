[translation]
10038095-4 = "อ๊าาา! กำลังกังวลอยู่เลยว่าจะถูกขังไปอีกนานแค่ไหน! ขอบคุณนะประมุข..."
10038095-6 = "ยังดูแข็งแรงดีนะ ซายะ เราไม่มีเวลาแล้ว รีบไปกันเถอะ"
10038095-7 = "รีบไปไหนเหรอ...?"
10038095-8 = "ก็ชมรมวิจัยศาสตร์การปรุงยาน่ะสิ"
10038095-12 = "แต่ประมุขกำลังหักโหมมากเกินไปหรือเปล่า...!?"
10038095-16 = "ไม่เป็นไรใช่มั้ย? ร่างกายของประมุขน่ะ..."
10038095-17 = "ฮุฮุ... เธอกังวลเกี่ยวกับเรื่องนั้นอยู่หรือ?"
10038095-18 = "ตอนนี้มีเรื่องอื่นสำคัญกว่าเรื่องสุขภาพของเรานะ เราต้องเอาชมรมวิจัยศาสตร์การปรุงยากลับมาก่อน"
10038095-22 = "เราจะนำไปเอง ทุกคนตามเรามา"
10038095-28 = "ปะ... ประมุข?! ประมุข!?"
10038095-33 = "เกิดเรื่องอะไรกับท่านประมุขเหรอคะ?"
10038095-34 = "ท่านก็จะไปเอาชมรมวิจัยศาสตร์การปรุงยากลับมาน่ะสิ ต้องตกใจถึงขนาดนั้นด้วยหรือไง?"
10038095-39 = "ระ... เรื่องนั้น...!"
10038095-40 = "เปล่าหรอก! ไม่มีเรื่องอะไรทั้งนั้นแหละ!"
10038095-45 = "(ถึงจะกังวลเรื่องสภาพร่างกายของประมุข...)"
10038095-46 = "(แต่เราก็ต้องได้ชมรมวิจัยศาสตร์การปรุงยาคืนมาก่อน ถึงจะทำยาให้ประมุขได้...)"

[translation]
10038095-4 = "Gah! I thought I was going to be down here forever! Thank you, Madam..."
10038095-6 = "You look well. Now come, we need to move quickly."
10038095-7 = "Move? To where?"
10038095-8 = "To the Eastern Alchemy Society, of course."
10038095-12 = "Isn't that dangerous for you? Madam..."
10038095-16 = "Are you going to be okay? Your health, I mean..."
10038095-17 = "Fufu... Is that what you're worried about?"
10038095-18 = "Focus on what's most important here in this moment. We must reclaim your Eastern Alchemy Society."
10038095-22 = "I will lead the way. Follow me."
10038095-28 = "M-Madam? Madam?!"
10038095-33 = "Is something going on with her?"
10038095-34 = "She said she'll reclaim the Society for you. Why are you so flustered?"
10038095-39 = "I-It's just because...!"
10038095-40 = "No, never mind, it's nothing!"
10038095-45 = "(Her health, though...)"
10038095-46 = "(On the other hand, if I get the Society back, I can start making elixirs again.)"

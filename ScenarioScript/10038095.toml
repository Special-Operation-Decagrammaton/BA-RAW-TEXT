[translation]
10038095-4 = "哇啊啊！我本來還在擔心要被關到什麼時候咧！#n太感謝你了，門主……"
10038095-6 = "汝看起來倒還挺健康的。#n現在時間有限，趕緊動身吧。"
10038095-7 = "趕緊……？#n要去哪裡？"
10038095-8 = "那自然是鍊丹術研究會了。"
10038095-12 = "這樣不會太勉強嗎？門主……"
10038095-16 = "門主你的身體……沒問題嗎？"
10038095-17 = "呵呵……汝擔心的是這個啊。"
10038095-18 = "現在有更重要的事要辦。#n得先奪回汝的鍊丹術研究會才行。"
10038095-22 = "妾身先走一步。趕緊跟上吧。"
10038095-28 = "門，門主！？門主！？"
10038095-33 = "門主大人怎麼了嗎？"
10038095-34 = "門主大人只是說要奪回鍊丹術研究會而已，沒必要這麼慌張吧？"
10038095-39 = "那，那個……！"
10038095-40 = "沒事，沒什麼！"
10038095-45 = "（雖然擔心門主大人的身體狀況……）"
10038095-46 = "（不過確實也必須先奪回鍊丹術研究會，才有辦法製作丹藥……）"

[translation]
2600605-1 = "A Place to Watch the Meteors"
2600605-2 = "Red Winter Academy Former Institute"
2600605-5 = "Oh, Sensei. You're here."
2600605-6 = "Why am I so down?"
2600605-7 = "I-It's nothing."
2600605-8 = "[s] \"Cheer up. You'll be able to watch the meteor shower this weekend.\""
2600605-9 = "The thing is...I don't think we'll be able to see the meteors this year."
2600605-10 = "According to the weather forecast, Kivotos is going to be cloudy all day."
2600605-11 = "You can only see the Leonids meteor shower once every thirty years..."
2600605-12 = "It's so upsetting to lose an opportunity like this. It only comes two or three times a lifetime."
2600605-13 = "I was going to make a wish... A wish that you make on shooting stars is supposed to come true, you know."
2600605-14 = "But I guess a wish is a wish...because it doesn't always come true."
2600605-15 = "[s1] \"It's too early to give up.\"\n[s2] \"Let's find another way.\""
2600605-16 = "Huh? But even with the best telescope, if the clouds are thick, you won't be able to see the meteors."
2600605-17 = "Huh? But even with the best telescope, if the clouds are thick, you won't be able to see the meteors."
2600605-18 = "So if the clouds are covering the meteors...we should go above the clouds?"
2600605-19 = "[s] \"Yeah! Let's watch the meteor shower from a building that's above the clouds.\""
2600605-20 = "But a building like that in Kivotos..."
2600605-21 = "Are you referring to the building where the Schale Executive Office is located?"
2600605-22 = "That's a great idea! The roof of the Schale building goes above the clouds, so we can definitely watch the meteor shower from there!"
2600605-23 = "But if you want to enter the Schale building outside of business hours, you'll have to get permission from that scary Rin from the Student Council..."
2600605-24 = "W-Would it be okay..."
2600605-25 = "[s3] \"It's okay. Leave it to me.\"\n[s4] \"I'm used to dealing with Rin.\""
2600605-26 = "Haha... I'm glad to hear that."
2600605-27 = "Haha... I'm glad to hear that."
2600605-29 = "We were allowed entry with the permission of the General Student Council."

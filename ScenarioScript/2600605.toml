[translation]
2600605-1 = "สถานที่ที่จะดูฝนดาวตกได้"
2600605-2 = "อาคารเรียนเก่าในสหภาพเรดวินเทอร์"
2600605-5 = "อ๊ะ... คุณครู มาแล้วเหรอคะ"
2600605-6 = "ทำไมฉันถึงดูซึมๆ เหรอคะ?"
2600605-7 = "มะ...ไม่มีอะไรหรอกค่ะ!"
2600605-8 = "[s] \"ร่าเริงหน่อยสิ สุดสัปดาห์นี้จะได้ดูฝนดาวตกแล้วนะ\""
2600605-9 = "คือว่า... ฉันคิดว่าปีนี้คงไม่ได้เห็นฝนดาวตกแล้วล่ะค่ะ"
2600605-10 = "พยากรณ์อากาศบอกว่า วันนี้ในคิโวทอสจะมีเมฆมากตลอดทั้งวันค่ะ"
2600605-11 = "ฝนดาวตกลีโอนิดส์จะเห็นได้ครั้งเดียวในรอบ 30 ปีแท้ๆ..."
2600605-12 = "ต้องพลาดโอกาสที่มีครั้งเดียวในชีวิตไปแบบนี้ มันน่าเสียดายมากเลยค่ะ"
2600605-13 = "คิดว่าจะได้ขอพรตอนเห็นฝนดาวตกแล้วแท้ๆ... ได้ยินว่าขอพรตอนดูฝนดาวตกพรจะกลายเป็นจริงน่ะค่ะ..."
2600605-14 = "การขอพรก็คงเป็นแค่การขอพรเท่านั้นสินะคะ... คงเป็นจริงไม่ได้"
2600605-15 = "[s1] \"ยังเร็วไปที่จะยอมแพ้นะ\"\n[s2] \"มาลองวิธีอื่นกันดีกว่า\""
2600605-16 = "คะ? แต่จะใช้กล้องส่องทางไกลคุณภาพแค่ไหน#nแต่ถ้ามีเมฆหนาเราก็จะมองไม่เห็นฝนดาวตกอยู่ดีค่ะ"
2600605-17 = "คะ? แต่จะใช้กล้องส่องทางไกลคุณภาพแค่ไหน#nแต่ถ้ามีเมฆหนาเราก็จะมองไม่เห็นฝนดาวตกอยู่ดีค่ะ"
2600605-18 = "ถ้าเมฆบังฝนดาวตกล่ะก็... พวกเราควรขึ้นไปด้านบนเหนือเมฆงั้นเหรอคะ?"
2600605-19 = "[s] \"งั้นเราไปดูฝนดาวตกบนอาคารที่สูงเหนือเมฆกันเถอะ\""
2600605-20 = "แต่ว่าอาคารที่สูงกว่าเมฆในคิโวทอส..."
2600605-21 = "คุณครูหมายถึงอาคารที่ตั้งของสำนักงานชาเล่ต์เหรอคะ?"
2600605-22 = "ฉันมีความคิดดีๆ แล้วค่ะ! ถ้าเป็นดาดฟ้าอาคารของชาเล่ต์ที่อยู่สูงเหนือเมฆ#nก็น่าจะเห็นฝนดาวตกได้แน่นอนค่ะ!"
2600605-23 = "แต่ว่าถ้าจะเข้าไปในอาคารชาเล่ต์นอกเวลาทำการ จะต้องได้รับการอนุญาต#nจากสมาชิกบริหารขององค์การนักเรียนชื่อริน ที่ดูน่ากลัวๆ ก่อนนะคะ"
2600605-24 = "มะ...มันจะไม่เป็นอะไรใช่ไหมคะ..."
2600605-25 = "[s3] \"ไม่เป็นไร ไว้ใจครูได้เลย\" \n[s4] \"ครูรับมือกับรินจนชินแล้วล่ะ\""
2600605-26 = "ฮ่าฮ่า... ได้ยินแบบนั้นค่อยโล่งอกหน่อยค่ะ"
2600605-27 = "ฮาฮ่า... ถ้าอย่างงั้นก็ค่อยยังชั่วค่ะ"
2600605-29 = "คุณครูและโนโดกะได้รับอนุญาตให้เข้าออกภายในอาคารนอกเวลาทำการได้"

[translation]
2600605-1 = "#title;유성우를 볼 수 있는 곳"
2600605-2 = "#place;붉은겨울 학원의 구교사."
2600605-3 = "2;노도카;06\n#2;a\n#2;em;[...]\n#wait;2000"
2600605-4 = "2;노도카;02\n#2;em;[반응]\n#wait;1500"
2600605-5 = "2;노도카;06;아…… 선생님. 오셨군요.\n#2;m3"
2600605-6 = "#2;hide\n3;노도카;02;왜 그렇게 풀이 죽어 있냐고요?\n#3;em;[?]"
2600605-7 = "#2;hide\n3;노도카;04;아, 아무것도 아니에요."
2600605-8 = "[s] \"기운 내. 이번 주말에는 유성우를 볼 수 있잖아?\""
2600605-9 = "3;노도카;06;그게…… 아마도 올해는 유성우를 보기 어려울 것 같아서요."
2600605-10 = "3;노도카;05;일기 예보를 보니 유성우가 오는 날의 키보토스는 하루 종일 흐릴 예정이라지 뭐예요.\n#3;hophop"
2600605-11 = "3;노도카;04;사자자리 유성우는 30년에 한 번밖에 볼 수 없다는데……\n#3;em;[땀]"
2600605-12 = "3;노도카;06;일생일대의 기회를 이렇게 날려버리다니, 너무 속상해요.\n#3;stiff"
2600605-13 = "3;노도카;06;유성우를 보고 소원을 빌면 꼭 이루어진다고 해서 소원도 빌어보려고 했는데……"
2600605-14 = "3;노도카;06;역시 소원이란 이루어지지 않기 때문에 소원인가 봐요.\n#3;em;[속상함]"
2600605-15 = "[s1] \"아직 포기하기는 일러.\"\n[s2] \"다른 방법을 찾아보자.\""
2600605-16 = "3;노도카;02;네? 하지만 아무리 좋은 망원경을 가져온다 하더라도 구름이 짙으면 지상에서는 유성이 지나가는 걸 볼 수 없는걸요."
2600605-17 = "3;노도카;02;네? 하지만 아무리 좋은 망원경을 가져온다 하더라도 구름이 짙으면 지상에서는 유성이 지나가는 걸 볼 수 없는걸요."
2600605-18 = "3;노도카;04;구름이 유성을 가리면…… 구름 위로 올라가면 된다고요?\n#3;em;[?]"
2600605-19 = "[s] \"그래. 구름보다 높은 건물 위에서 유성우를 관측하자.\""
2600605-20 = "3;노도카;99;하지만 키보토스에서 구름보다 높은 건물이라면……"
2600605-21 = "3;노도카;02;혹시 샬레의 집무실이 있는 건물을 말씀하시는 건가요?\n#3;em;[반응]"
2600605-22 = "3;노도카;03;좋은 생각이에요! #n샬레의 건물 옥상은 구름보다 높은 곳에 있으니, 분명 그곳에서라면 유성우를 볼 수 있을 거예요!\n#3;hophop\n#3;em;[반짝]"
2600605-23 = "3;노도카;04;……하지만 업무 시간 외에 샬레 건물에 출입하려면 학생회의 그 무서운 린이라는 분에게 허락을 받아야 할 텐데……"
2600605-24 = "3;노도카;06;괘, 괜찮을까요……\n#3;em;[속상함]\n#3;stiff"
2600605-25 = "[s3] \"괜찮아. 맡겨줘.\"\n[s4] \"린에게 매도당하는 건 익숙해.\""
2600605-26 = "3;노도카;01;하하…… 그렇다면 다행이지만요."
2600605-27 = "3;노도카;04;하하…… 그렇다면 다행이지만요.\n#3;em;[땀]"
2600605-28 = "#all;hide"
2600605-29 = "#na;총학생회의 허락을 받아, 무사히 출입을 허가받았다."

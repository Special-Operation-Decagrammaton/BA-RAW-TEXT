[translation]
2600605-1 = "看得到流星雨的地方"
2600605-2 = "赤冬聯邦學園．舊校舍"
2600605-5 = "啊……老師，歡迎回來。"
2600605-6 = "你問我為什麼這麼消沉嗎？"
2600605-7 = "沒，沒什麼。"
2600605-8 = "[s]「這個週末不是能看到，你期待很久的流星雨嗎？」"
2600605-9 = "因為……今年的流星雨大概很難看到了。"
2600605-10 = "根據天氣預報，流星雨來的那天，奇普托斯可能整天都是陰天。"
2600605-11 = "偏偏獅子座的流星雨每30年才會出現一次……"
2600605-12 = "一生難得幾次的機會就這樣沒了，太傷心了。"
2600605-13 = "而且也聽說只要對流星許願願望一定會實現，原本還想趁機許願的……"
2600605-14 = "果然所謂的願望，就是因為無法實現才叫願望吧。"
2600605-15 = "[s1]「現在放棄還太早了。」\n[s2]「想想其他辦法吧。」"
2600605-16 = "咦？可是就算望遠鏡再好，只要雲層太厚，就還是無法從地表觀測到流星啊。"
2600605-17 = "咦？可是就算望遠鏡再好，只要雲層太厚，就還是無法從地表觀測到流星啊。"
2600605-18 = "你說如果流星被雲遮住……那跑到雲端上不就好了？"
2600605-19 = "[s]「嗯，在比雲還高的建築物上看流星吧。」"
2600605-20 = "不過奇普托斯境內，比雲層還高的建築物……"
2600605-21 = "你是說老師辦公室所在的，夏萊大樓嗎？"
2600605-22 = "真，真是個好主意！#n夏萊大樓的屋頂確實比雲還高，在那裡一定能看到流星！"
2600605-23 = "啊……但是要在下班之後進出夏萊，我記得必須向學生會那個可怕的「琳」取得許可才行……"
2600605-24 = "沒，沒問題嗎……"
2600605-25 = "[s3]「沒問題，包在我身上。」\n[s4]「我已經習慣被琳罵了。」"
2600605-26 = "啊哈哈……那就好。"
2600605-27 = "啊哈哈……那就好。"
2600605-29 = "（經過聯邦學生會批准，我們成功獲得出入許可）"

[translation]
10016160-1 = "後日談;實行委員會篇"
10016160-6 = "呼……喝了熱茶後，身體似乎放鬆了一點。"
10016160-7 = "感覺一天的疲勞都被這杯茶沖走了……"
10016160-8 = "這真的是……非常美味的紅茶。#n這種帶有異國風味，嘗起來如此甜蜜的紅茶，我好像是第一次喝到。"
10016160-9 = "而且水溫不會太高或太低，撲鼻而來的只有好聞的香氣，一點澀味都沒有。"
10016160-10 = "我之前泡茶時，從來沒有泡出過這麼濃郁的香氣……#n真是太厲害了，蓮實同學。"
10016160-14 = "呵呵，這都多虧了茶會送來的優質茶葉。"
10016160-15 = "茶葉還很足夠，還想喝的話請跟我說。"
10016160-19 = "哎呀，茶杯空了呢。要再來一杯嗎？"
10016160-20 = "好的，麻煩你了。"
10016160-29 = "……看來三一實現正義部的副部長對泡茶很講究的傳聞是真的呢。"
10016160-30 = "沒想到用人手泡出來的茶能有這麼精緻洗鍊的味道。"
10016160-31 = "謝謝你給了我這麼寶貴的經驗。"
10016160-32 = "能聽見你喜歡我泡的茶，反而是我更高興呢。"
10016160-36 = "那個……是生塩乃愛同學，對吧……？"
10016160-37 = "我記得有在路上遇過幾次，但在實行委員會辦公室見面好像還是第一次。"
10016160-38 = "是啊。仔細想想，這似乎是我們第一次正式打招呼呢。#n我經常聽優香醬說起你的事。"
10016160-39 = "因為我在這次的「晄輪大祭」中主要負責現場管理的工作，#n所以和負責辦公的蓮實同學幾乎沒有交集。"
10016160-40 = "原來如此。遲遲未向你問候，失禮了。"
10016160-41 = "這次蓮實同學除了最後的接力賽之外，並沒有參加其他比賽對吧？"
10016160-43 = "我認為有不少能發揮蓮實同學特長的比賽，比如射擊或投球等等……"
10016160-44 = "為什麼不參加比賽呢？"
10016160-45 = "那個……"
10016160-46 = "老實說，身為慶典安全的負責人，我認為沉浸在快樂的氣氛中是踰矩的行為。"
10016160-47 = "儘管我很喜歡慶典，卻也擔心同時犧牲了別人……#n所以才刻意視而不見，專注於自己應盡的本分。"
10016160-48 = "……但結果還是沒能做到。"
10016160-49 = "在準備這次的晄輪大祭時，我聽到了好幾次這樣的意見。"
10016160-50 = "「別人的快樂是建立在我的痛苦之上。」"
10016160-51 = "「打造所有人都能享受的慶典，不過是假象罷了。」"
10016160-52 = "然而，根據努力的程度，這世界什麼事都有可能發生。"
10016160-54 = "雖然優香醬經常抱怨說不合理……#n但我真的真的很喜歡這種不合理。"
10016160-55 = "……"
10016160-56 = "蓮實同學覺得如何？有在這場不合理的慶典裡玩得盡興嗎？"
10016160-57 = "嗯。真的是一場非常愉快的慶典。"
10016160-58 = "呵呵，能聽到你這麼說，也不枉費我熬夜準備「晄輪大祭」了。"
10016160-59 = "能像這樣和其他學園的學生一起喝茶，結束一天也不錯。"
10016160-61 = "即便不是這種慶典，也該經常創造這樣的場合。"
10016160-65 = "對了，蓮實同學，你知道這句話嗎？"
10016160-67 = "……「直到真正結束前，都還不算結束」。"
10016160-68 = "……嗯？那是什麼意思？"
10016160-69 = "正如我剛才說的……根據努力的程度，這世界什麼事都有可能發生。"
10016160-70 = "有句話叫「世事難料」對吧？#n或許某些精力充沛的學生會在「後夜祭」用意想不到的方式搗亂也說不定……"
10016160-71 = "回想今天一整天發生的事，我很能理解你的擔憂。"
10016160-72 = "但再怎麼說，應該都沒有人會選在各學園學生會幹部齊聚一堂的地方鬧事才──"
10016160-77 = "蓮實同學，大事不好了！"
10016160-78 = "格黑娜的一些學生嚷嚷著說要在「後夜祭」的營火旁烤肉，和安全人員發生了爭執！"
10016160-79 = "此外，還有部分學生說不喜歡火焰的顏色，想往營火內投入金屬粉末……"
10016160-80 = "………"
10016160-81 = "哎呀……出事了呢。"
10016160-82 = "請立即呼叫現在能聯繫上的實現正義部成員。"
10016160-83 = "還有，請準備好安裝在運動場內的滅火設備，以便能隨時使用。"
10016160-84 = "……格黑娜的行政官去哪裡了？"
10016160-85 = "那，那個……亞子行政官說要去找陽奈委員長，所以稍早前就離開了……"
10016160-86 = "我還聽說運動場內的滅火設備已經被格黑娜的某個社團全數帶走，#n說是要拿去「開發溫泉」……"
10016160-87 = "…………"
10016160-92 = "不好了！#n有疑似從格黑娜供給室逃出來的奇怪生命體混入人群中了！"
10016160-93 = "哇啊──#n鬆餅不但活著還會飛啊！"
10016160-98 = "絕對……"
10016160-99 = "絕對無法原諒，格黑娜──！"

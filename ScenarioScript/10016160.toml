[translation]
10016160-1 = "Afterword; Executive Committee Episode"
10016160-6 = "Aaah... I can feel the relaxation flowing through me."
10016160-7 = "It's as though all the day's fatigue is being washed away by this one cup of hot tea..."
10016160-8 = "This is...really delicious. I don't think I've ever had black tea with such an exotic and sweet aroma."
10016160-9 = "And the water isn't too hot, but it's also not lukewarm, so the flavor really comes through without any bitterness."
10016160-10 = "When I make tea, it doesn't have anything even close to this rich flavor... You're amazing, Hasumi."
10016160-14 = "Haha. It's all thanks to the Tea Party for sending me such great tea leaves."
10016160-15 = "I have more than enough of what they sent me, so if you want more, just let me know."
10016160-19 = "Speaking of which, your cup is empty. Would you like more?"
10016160-20 = "Yes, please."
10016160-29 = "I had heard that the Vice President of Trinity's Justice Task Force was quite strict about tea etiquette. It looks like the rumors were true."
10016160-30 = "I had no idea that tea brewed by human hands could have such a sophisticated and refined flavor."
10016160-31 = "Thank you for providing us with such a rare experience."
10016160-32 = "I'm more than happy to hear that you're enjoying the tea I made."
10016160-36 = "You're Ushio Noa, right?"
10016160-37 = "I remember seeing you in passing a few times, but I don't think I ever spotted you in the Executive Committee office."
10016160-38 = "Yes, now that I think about it, this is the first time we've formally met. But I've heard a lot about you from Yuuka."
10016160-39 = "I was doing a lot of field management work for this year's Halo Festival, while you were mostly in the office, so we've barely had any contact."
10016160-40 = "I see. I apologize for not introducing myself earlier."
10016160-41 = "Hasumi, you didn't participate in any of the events except for the relay, right?"
10016160-43 = "There were quite a few events you could have excelled at, such as shooting or shot put."
10016160-44 = "Why didn't you participate in any of them?"
10016160-45 = "Well, uh..."
10016160-46 = "To be honest, as someone responsible for the safety of the festival, it would have been improper for me to soak up the atmosphere and have fun."
10016160-47 = "The more I enjoyed the festival, the more I worried that someone else would have to make up for that, so I turned a blind eye to the fun around me and tried to focus on my duties."
10016160-48 = "...Though it turned out I wasn't able to do even that."
10016160-49 = "I heard things like that quite a lot as we prepared for this year's Halo Festival."
10016160-50 = "That people felt like the festival was a zero-sum game of happiness."
10016160-51 = "That the idea of a day enjoyed by all in equal measure was just an illusion."
10016160-52 = "But I believe that anything can happen at anytime as long as you try hard enough."
10016160-54 = "Yuuka often complains about how unreasonable that is, but I, personally, prefer the irrationality of it all."
10016160-55 = "..."
10016160-56 = "What about you, Hasumi? Did you enjoy this unreasonable festival?"
10016160-57 = "Yes. It really was a fun time."
10016160-58 = "Hearing you say that makes all those late nights staying up preparing for the Halo Festival worth it."
10016160-59 = "It's not a bad way to end the day, sitting down for some tea with students from other academies."
10016160-61 = "Even if it's not for a festival, I should organize something similar from time to time."
10016160-65 = "By the way, Hasumi, have you ever heard this saying?"
10016160-67 = "It's not over till it's over."
10016160-68 = "What about it?"
10016160-69 = "I told you already, anything can happen at anytime as long as you try hard enough."
10016160-70 = "Who knows? Maybe some particularly passionate students might conjure up a last bit of trouble at the After-Party, for example."
10016160-71 = "Given everything that's happened today, I certainly understand your concern."
10016160-72 = "But I truly believe that there's no way anybody would be enough of an idiot to cause trouble while student council officers from each academy are—"
10016160-77 = "Hasumi, we have a problem!"
10016160-78 = "Students from Gehenna are getting into a scuffle with security because they want to use the After-Party bonfire as a barbecue!"
10016160-79 = "Also, some students are trying to throw metal powder into the campfire because they're don't like the color of the fire!"
10016160-80 = "..."
10016160-81 = "Oh my, how dastardly."
10016160-82 = "Please call in any members of the Justice Task Force you can reach right now."
10016160-83 = "And tell them to have the Athletic Stadium's fire extinguishing system at the ready."
10016160-84 = "Where's Gehenna's senior administrator?"
10016160-85 = "Well, as for that... Administrator Ako said that she needed to find President Hina, so she's been gone for a while..."
10016160-86 = "Also, the stadium's fire extinguishing system is, um, gone. Apparently one of Gehenna's clubs dragged everything away to develop a hot spring?"
10016160-87 = "..."
10016160-92 = "My god! Monstrous creatures from Gehenna's cafeteria have escaped! They're going for the crowd!"
10016160-93 = "No! No! Not the flying pancakes!"
10016160-98 = "I'll never..."
10016160-99 = "I'll never forgive Gehenna!"

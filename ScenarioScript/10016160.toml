[translation]
10016160-1 = "ย้อนวันวาน; คณะกรรมการจัดงาน"
10016160-6 = "ฮู่ว... ได้ดื่มชาร้อนๆ แบบนี้ รู้สึกผ่อนคลายดีจัง"
10016160-7 = "ความเหนื่อยล้าที่สะสมมาตลอดทั้งวัน หายเป็นปลิดทิ้งเลย..."
10016160-8 = "ชานี่... รสชาติดีจริงๆ เลยนะคะ ฉันไม่เคยดื่มชาดำที่หวานและมีกลิ่นหอมแบบนี้มาก่อนเลยค่ะ"
10016160-9 = "แถมยังชงด้วยอุณหภูมิที่พอเหมาะ ไม่ร้อนและไม่เย็นจนเกินไป รสชาติกลมกล่อม ไม่มีรสฝาดเลยด้วยค่ะ"
10016160-10 = "ฉันเองก็เคยชงชามาบ้าง แต่ก็ไม่เคยชงชาได้มีกลิ่นหอมขนาดนี้เลยค่ะ คุณฮาสุมินี่สุดยอดจริงๆ เลยนะคะ"
10016160-14 = "ฮิฮิ เรื่องนั้นคงต้องขอบคุณทางสภาน้ำชาที่ส่งใบชาดีๆ มาให้ค่ะ"
10016160-15 = "ยังมีใบชาอยู่อีกเยอะเลย ถ้าจะรับชาเพิ่มก็บอกได้เลยนะคะ"
10016160-19 = "ตายจริง ดื่มหมดแล้วเหรอคะ รับเพิ่มอีกแก้วมั้ยคะ?"
10016160-20 = "ค่ะ ขอรบกวนด้วยค่ะ"
10016160-29 = "...ฉันเคยได้ยินมาว่ารองหัวหน้าชมรมทวงความยุติธรรมของทรีนิตี้เข้มงวดเรื่องการชงชามากๆ ดูเหมือนข่าวลือนั่นจะเป็นเรื่องจริงสินะคะ"
10016160-30 = "ไม่คิดมาก่อนเลยว่าชาที่ชงขึ้นมาด้วยมือของมนุษย์เราจะมีรสชาติละเอียดอ่อนได้ขนาดนี้ค่ะ"
10016160-31 = "ขอบคุณที่ทำให้ฉันได้สัมผัสประสบการณ์ล้ำค่าแบบนี้ด้วยนะคะ"
10016160-32 = "ฉันต่างหากที่เป็นฝ่ายต้องขอบคุณที่กรุณาชอบชาที่ฉันชงให้ค่ะ"
10016160-36 = "เอ่อ... คุณอุชิโอะ โนอา... ใช่มั้ยคะ...?"
10016160-37 = "จำได้ว่าเคยเจอคุณมาก่อนหน้านี้ แต่เพิ่งเคยเจอคุณที่ห้องคณะกรรมการจัดงานเป็นครั้งแรกเลยค่ะ"
10016160-38 = "ค่ะ พอมาคิดดูแล้ว นี่เป็นครั้งแรกที่เราได้พบกันอย่างเป็นทางการเลยนะคะ ที่ผ่านมาฉันได้ยินเรื่อง#nของคุณจากยูกะจังมาเยอะเลยค่ะ"
10016160-39 = "ฉันคอยดูแลจัดการงานสนามในงาน <ฮาโลเฟสติวัล> เป็นส่วนใหญ่ เลยอาจทำให้ไม่ค่อยได้พบกับ#nคุณที่คอยดูแลงานด้านเอกสารที่สำนักงานค่ะ"
10016160-40 = "อย่างนี้นี่เอง ขอโทษที่มาแนะนำตัวช้านะคะ"
10016160-41 = "คุณฮาสุมิ นอกจากรายการแข่งวิ่งผลัดแล้ว คุณไม่ได้ลงแข่งรายการอื่นเลยใช่มั้ยคะ?"
10016160-43 = "ทั้งๆ ที่มีรายการอื่นๆ อีกตั้งหลายอย่างที่คุณฮาสุมิน่าจะทำคะแนนได้ดีแท้ๆ อย่างพวกแข่งแม่นปืน หรือแข่งขว้างบอล..."
10016160-44 = "ทำไมถึงไม่เข้าร่วมรายการแข่งพวกนั้นเลยล่ะคะ?"
10016160-45 = "เรื่องนั้น..."
10016160-46 = "ขอบอกตามตรงนะคะ ในฐานะผู้ที่รับผิดชอบความปลอดภัยของงานเทศกาลแล้ว ถ้าฉันมัวสนุกไปกับ#nงานเทศกาลคงจะไม่เหมาะสมสักเท่าไรน่ะค่ะ"
10016160-47 = "ฉันกังวลว่าถ้ามัวสนุกกับงานเทศกาลมากเกินไป คนอื่นอาจต้องมาทำงานหนักชดเชยในส่วนของฉัน เพราะแบบนั้นฉันก็เลยมุ่งมั่นกับการดูแลงานที่รับผิดชอบแทนค่ะ"
10016160-48 = "...ก็เลยปล่อยให้ตัวเองสนุกกับงานเทศกาลเต็มที่ไม่ได้น่ะค่ะ"
10016160-49 = "ตอนระหว่างเตรียมงานเทศกาล ฉันได้ยินคำพูดแบบนี้บ่อยมากเลยค่ะ"
10016160-50 = "อย่างเช่นว่า \"งานเทศกาลครั้งนี้เป็นงานที่สร้างความสุขให้คนอื่นๆ แต่สร้างความทุกข์ให้กับตัวเอง\""
10016160-51 = "\"งานเทศกาลที่ทุกคนจะสนุกร่วมกันได้น่ะไม่มีอยู่จริงหรอก เป็นเพียงภาพเพ้อฝันทั้งนั้น\""
10016160-52 = "แต่ฉันเชื่อนะคะว่าทุกอย่างจะเกิดขึ้นจริงได้ ขอแค่เรามีความพยายาม"
10016160-54 = "ยูกะจังมักจะบ่นฉันบ่อยๆ ว่ามันฟังดูไม่ค่อยมีเหตุผล แต่ว่า... ส่วนตัวแล้ว ฉันมักจะสนุกกับเรื่องที่ดู#nไม่มีความสมเหตุสมผลแบบนี้น่ะค่ะ"
10016160-55 = "..."
10016160-56 = "แล้วคุณฮาสุมิล่ะคะ? สนุกกับงานเทศกาลที่ไม่สมเหตุสมผลแบบนี้รึเปล่าคะ?"
10016160-57 = "ค่ะ ฉันเองก็คิดว่ามันสนุกมากเลยค่ะ "
10016160-58 = "ฮุฮุ ได้ยินคุณพูดแบบนั้นแล้ว รู้สึกคุ้มค่าที่อยู่โต้รุ่งเพื่อเตรียมงาน <ฮาโลเฟสติวัล> เลยค่ะ"
10016160-59 = "การได้มานั่งดื่มชาและพูดคุยกับนักเรียนโรงเรียนอื่นหลังจากทำงานมาทั้งวันแบบนี้แล้ว ก็ไม่ใช่เรื่อง#nที่แย่เท่าไรเลยค่ะ"
10016160-61 = "หลังจากนี้ ถึงจะไม่ได้มีงานเทศกาลพิเศษอะไร ก็คงต้องหาเวลาจัดงานดื่มชาแบบนี้ขึ้นมา เป็นครั้งคราวบ้างแล้วละค่ะ"
10016160-65 = "ว่าแต่ว่าคุณฮาสุมิคะ... เคยได้ยินคำพูดแบบนี้บ้างหรือเปล่าคะ?"
10016160-67 = "คำพูดที่ว่า \"สงครามยังไม่จบ อย่าเพิ่งนับศพทหาร\" น่ะค่ะ..."
10016160-68 = "คะ...? หมายความว่ายังไงเหรอคะ?"
10016160-69 = "อย่างที่ฉันพูดไปก่อนหน้านี้ค่ะว่า \"ทุกสิ่งทุกอย่างเกิดขึ้นได้เสมอ หากเรามีความพยายาม\""
10016160-70 = "ใครจะรู้ล่ะคะ? พวกนักเรียนที่สนุกสุดเหวี่ยงในงานเลี้ยง <อาฟเตอร์ปาร์ตี้> อาจก่อเรื่องอะไรที่คาด#nไม่ถึงขึ้นก็ได้..."
10016160-71 = "ดูจากเรื่องวุ่นวายที่เกิดขึ้นตลอดทั้งวัน ฉันก็ไม่แปลกใจที่คุณจะรู้สึกกังวล..."
10016160-72 = "แต่ถึงอย่างนั้น ฉันคิดว่าคงไม่มีใครงี่เง่าพอที่จะก่อเรื่องวุ่นวายขึ้นในสถานที่ที่คณะกรรมการนักเรียน#nของแต่ละโรงเรียนมารวมตัวกัน..."
10016160-77 = "คุณฮาสุมิคะ! เกิดเรื่องใหญ่แล้วค่ะ!"
10016160-78 = "มีนักเรียนกลุ่มหนึ่งของเกเฮนน่าบอกว่าจะเข้ามาทำบาร์บีคิวที่แคมป์ไฟในงานอาฟเตอร์ปาร์ตี้ และตอนนี้กำลังปะทะกับกลุ่มรักษาความปลอดภัยอยู่ค่ะ!"
10016160-79 = "แล้วก็มีนักเรียนอีกกลุ่มที่พยายามโยนผงโลหะเข้าไปในแคมป์ไฟ เพราะไม่ชอบสีของไฟ..."
10016160-80 = "..."
10016160-81 = "ตายจริง... วุ่นวายกันใหญ่เลยนะคะ"
10016160-82 = "ติดต่อไปหาสมาชิกชมรมทวงความยุติธรรมทุกคนโดยด่วนเลยค่ะ"
10016160-83 = "แล้วบอกให้ทุกคนเตรียมอุปกรณ์ดับเพลิงที่ติดตั้งอยู่ในสนามกีฬาให้พร้อมใช้งานทันทีด้วยค่ะ"
10016160-84 = "...แล้วคุณกรรมการจากเกเฮนน่าอยู่ที่ไหนเหรอคะ?"
10016160-85 = "เอ่อ คือว่า... คุณอาโกะบอกว่าต้องรีบไปตามหาท่านประธานฮินะ แล้วก็รีบออกไปตั้งแต่เมื่อครู่นี้แล้ว..."
10016160-86 = "แล้วก็เอ่อ... ตอนนี้อุปกรณ์ดับเพลิงที่ติดตั้งอยู่ที่สนามกีฬาก็... ถูกนักเรียนชมรมอะไรสักอย่างของ#nเกเฮนน่าเอาไปใช้เตรียมบ่อออนเซ็นหมดแล้วค่ะ..."
10016160-87 = "......"
10016160-92 = "เกิดเรื่องใหญ่แล้ว! สัตว์ประหลาดขนาดมหึมาที่หลุดออกมาจากโรงอาหารของเกเฮนน่ากำลังวิ่งเข้าไป#nทางฝูงชนแล้ว!"
10016160-93 = "ว้าววว! นั่นมันแพนเค้กบินได้นี่นา!"
10016160-98 = "ฉัน..."
10016160-99 = "ฉันจะไม่มีวันยกโทษให้พวกเกเฮนน่าเด็ดขาดเลยค่ะ...!"

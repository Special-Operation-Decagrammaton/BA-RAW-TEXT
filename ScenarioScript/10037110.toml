[translation]
10037110-1 = "#title;에필로그;이에 헤어짐이 있어 벗을 그리워하노라."
10037110-2 = "3;체리노 치파오;99;어느새 시간이 이렇게 빨리 흘러갔구나……. 벌써 교류회가 마지막이라니.\n#3;em;…\n#3;a"
10037110-3 = "5;토모에 치파오;07;우후후. 이번 교류회가 상당히 마음에 드셨던 것 같네요. 체리노 서기장님.\n#5;al\n#3;m1"
10037110-4 = "#all;hide"
10037110-5 = "3;키사키;02;남는 것이 있었다면 다행이구나. 우리들의 산해경은…… 어떠하였는가?\n#3;em;[?]\n#3;a"
10037110-6 = "#st;[0,0];instant;1;"
10037110-7 = "#clearST"
10037110-8 = "3;체리노 치파오;02\n#3;em;[반응]\n#wait;800"
10037110-9 = "3;체리노 치파오;99;음, 산해경은…….\n#3;stiff"
10037110-10 = "#st;[0,0];instant;1;"
10037110-11 = "#clearST"

10037110-102 = "3;미나;02;아무래도 좋아. 단도직입적으로 묻겠다. 왜 이런 일을 꾸몄지?"
10037110-103 = "5;카구야;12;……."
10037110-104 = "5;카구야;05;다만, 충의(忠義)를 위해 행하였다. 그것이 전부다.\n#5;em;[반응]"
10037110-105 = "3;미나;13;붉은겨울의 방문단과 현룡문이 모인 자리에서 그런 경극을 공연한 것도 모자라, 문주님을 감히 해하려 한 것이 충의(忠義)와 무슨 관련이 있다는 거냐!\n#3;stiff"
10037110-106 = "3;미나;13;생각 같아서는 지금 당장 퇴학 처분을 내려도 성에 차지 않을 지경인데!"
10037110-107 = "5;카구야;17;여전히 아둔한 충신이구나. 미나 집행부장.\n#5;em;…"
10037110-108 = "5;카구야;13;문주께서 잘못된 판단을 내릴 때에는, 모든 것을 걸고서라도 반대하는 것이 충의(忠義)의 자세일 텐데!\n#5;stiff"
10037110-109 = "3;미나;00;……문주님의 잘못된 판단이라는 게, 붉은겨울의 방문단을 초청한 걸 의미하는 것인가?"
10037110-110 = "3;미나;02;정작 거기에서 문제를 일으킨 것은 경극부였지 않나."
10037110-111 = "5;카구야;11;문주님의 행동이, 천하의 도리에 합당하지 않는데도 충성하는 것은, 결코 올바른 충성이 될 수 없다.\n#5;m3\n#3;dl"
10037110-112 = "5;카구야;17;문주님께서는 분명 영민하고 현명하시지만…… 자의적으로 일을 해결하는 경향이 있으시니까 말이지."

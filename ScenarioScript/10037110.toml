10037110-151 = "3;카구야;16;적절한 절차를 따르지 않고 즉결 추방한 것도 모자라, 그 기록을 완전히 말소시켜, 카이에 대해 아는 사람이 극히 드물게 되기도 했지!"
10037110-152 = "1;미나;13;아무리 그래도 모방 범죄는 막아야 하잖아!\n#1;em;[반응]\n#1;ar\n#3;m5"
10037110-153 = "1;미나;13;거기에, 그 퇴학 절차를 하나하나 따랐다가는, 신타니 카이의 퇴학은 1년도 더 걸렸을 거고!"
10037110-154 = "1;미나;13;그 시간 동안 얼마나 많은 피해자가 생겼을지 생각해 보란 말이다!\n#1;em;[!]\n#fontsize;80"

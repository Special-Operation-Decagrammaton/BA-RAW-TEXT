10037110-14 = "3;체리노 치파오;03;대모험이었다!\n#3;closeup\n#fontsize;80"
10037110-15 = "3;체리노 치파오;03;신기한 풍경, 처음 먹어 보지만 맛있는 음식, 게으른 판다, 그리고 경극까지…… 무엇 하나 버릴 것이 없었어! 대단해!\n#3;em;[반짝]\n#3;hophop\n#3;closeup"
10037110-16 = "#all;hide"
10037110-17 = "3;키사키;08;경극부의 일로 고초를 겪게 한 것 같아 면목이 없구나."
10037110-18 = "1;체리노 치파오;99;그것참, 키사키 문주는 몇 번이나 같은 말을 반복하게 하는 사람이군. \n#1;em;[한숨]\n#1;ar\n#3;m5"
10037110-19 = "1;체리노 치파오;01;겸손이나 사과도 지나치면 역효과를 불러일으키는 법이야. 다시 말하지만!"
10037110-20 = "1;체리노 치파오;00;나, 붉은겨울의 서기장은 그런 하찮은 것에 연연하지 않는 몸인 것이야!\n#1;hophop"
10037110-21 = "3;키사키;00;……그러한가."
10037110-22 = "#all;hide"
10037110-23 = "3;마리나 치파오;11;그렇습니다. 문주님. 체리노 회장님께서는 관대하시니까요!\n#3;em;[반응]\n#3;a\n#3;hophop"
10037110-24 = "3;마리나 치파오;03;어차피 카구야와 경극부원들도, 화장실 청소 2~3주 정도 하고 돌아올 수 있을 테니, 그것으로 된 것 아니겠습니까?"
10037110-25 = "#st;[0,0];instant;1;"

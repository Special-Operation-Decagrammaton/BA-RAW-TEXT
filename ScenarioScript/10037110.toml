10037110-126 = "3;카이;03;먼 길에 고생 많았다. 연단방과 산해경의 사정은…… 아니, 지금의 너에게는 물어보았자 무의미한가.\n#3;a"
10037110-127 = "1;연단방 모브 부원;05;……연단방 내부의 수사망이 계속해서 좁혀져 오고 있습니다.\n#1;ar\n#3;m5"
10037110-128 = "1;연단방 모브 부원;05;저는 어쩔 수 없이 연단방에서 잠적해야 했고요."
10037110-129 = "3;카이;02;이 시기에 잠적해 버리면, 네가 범인인 것으로 확정이 될 텐데?\n#3;em;[?]"
10037110-130 = "1;연단방 모브 부원;02;어쩔 수 없는 일이었습니다. 어차피 지금의 연단방에서 기대할 것은 없기도 했고요."
10037110-131 = "3;카이;07;쿡쿡쿡쿡……. 카구야도 그렇고 너도 그렇고, 참으로 올곧고 우직한 사람들만 만나게 되는군."
10037110-132 = "1;연단방 모브 부원;05;이야기가 나왔으니 여쭙는 것입니다만, 그날 밤, 경극부장과의 대화에서 무슨 말씀을 나누셨습니까?"
10037110-133 = "3;카이;03;뭐, 그렇게 대단한 이야기는 없었다.\n#3;em;…"
10037110-134 = "#all;hide"
10037110-135 = "#na;카이;그저, 카구야가 나를 연단방으로 복권시켜 주겠다는 말을 꺼낸 것 정도였지."

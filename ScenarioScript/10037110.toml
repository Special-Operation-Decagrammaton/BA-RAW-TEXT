10037110-44 = "1;체리노 치파오;02;이것은…… 판다?\n#1;em;…\n#1;a"
10037110-45 = "5;키사키;00;백옥과 흑옥, 녹옥으로 만든 판다 모형이지. 약소한 것이지만, 산해경을 기억해 주었으면 해서 말이다.\n#5;a"
10037110-46 = "1;마리나 치파오;02;어, 엄청나군요, 문주님! 판다의 검고 흰 모양이 이렇게 완벽하게 구현되어 있고, 그 둥실둥실한 몸집이라든가 게을러 보이는 눈빛이라든가……!\n#1;em;[///]"
10037110-47 = "1;마리나 치파오;11;지금이라도 살아나서 움직일 것 같은 모습입니다!\n#1;hophop"
10037110-48 = "5;키사키;03;후후. 마리나 위원장이 특히 마음에 든 모양이구나."
10037110-49 = "#all;hide"
10037110-50 = "3;체리노 치파오;03;감사를 표하도록 하지! 이 몸의 집무실에 고이 보관해 두겠다! 다음에 언젠가 기회가 된다면, 꼭 문주를 우리 붉은겨울에 초대하고 싶군!\n#3;em;[반짝]\n#3;greeting"
10037110-51 = "3;키사키;03;그리 해 준다면야, 사양할 이유가 없지. 기대하고 있겠노라. 체리노 서기장."

[translation]
10037110-1 = "Epilogue;When Companions Separate"
10037110-2 = "Time goes by so fast... The exchange meeting is already ending."
10037110-3 = "Heeheehee! It seems you really enjoyed this exchange meeting, Great Leader Cherino."
10037110-5 = "I'm relieved. What's the one thing about Shanhaijing that you can take away from all this?"
10037110-9 = "Hmm, Shanhaijing has been..."
10037110-14 = "...a great adventure for us!"
10037110-15 = "Interesting views, delicious new food to try, lazy pandas, and a Peking opera... Everything was great! Amazing!"
10037110-17 = "I hope you can forgive that trouble with the Peking Opera Club."
10037110-18 = "Ha! It seems Madam Kisaki needs me to repeat myself. "
10037110-19 = "I'll say it again! Excessive humility and apology can be counterproductive!"
10037110-20 = "I am the Great Leader of Red Winter! Such insignificant things could never threaten my power!"
10037110-21 = "...I see."
10037110-23 = "That's right! President Cherino is a very magnanimous person!"
10037110-24 = "Kaguya and the Peking Opera Club members will return after 2 or 3 weeks of bathroom cleaning anyway. That should be enough, don't you think?"
10037110-30 = "(Once again, I see a huge difference between Shanhaijing's customs and Red Winter's school regulations.)"
10037110-31 = "President Kisaki, the way you naturally inspire people was especially impressive."
10037110-32 = "This is great inspiration for my own propaganda—I mean, the way I persuade others."
10037110-33 = "Hmm, is that so? That's something I didn't expect at all."
10037110-35 = "But you look upset, President Kisaki. Is something wrong?"
10037110-36 = "I do? Oh. No, I'm totally fine."
10037110-37 = "Really...?"
10037110-38 = "More importantly... I prepared a small, commemorative gift. I hope you'll accept it."
10037110-44 = "Is this...a panda?!"
10037110-45 = "It's a model panda, made from white, black, and green jade. It's not much, but I hope you'll enjoy this as a memento of your trip to Shanhaijing."
10037110-46 = "This is amazing, Madam! The black and white of the panda are portrayed so perfectly. So are its chubby shape and sleepy-looking eyes...!"
10037110-47 = "It looks like it could come to life and start moving any moment!"
10037110-48 = "Fufu! I see Chairman Marina especially likes it."
10037110-50 = "Thank you! I'll keep this safe in my Executive Office! As soon as we can, I'd love to invite you to our Red Winter!"
10037110-51 = "How could I refuse? In fact, I look forward to it, Great Leader Cherino!"
10037110-60 = "Phew... I just barely got back."
10037110-61 = "Regarding the farewell, I left everything to the PR manager. I'm sure they'll take care of it."
10037110-65 = "..."
10037110-66 = "I'm worried."
10037110-74 = "Is it possible everything the Peking Opera Club did could spark a different kind of change in Shanhaijing?"
10037110-75 = "I'm sure Kaguya isn't the only problem. I mean, I'm the one who started everything, after all."
10037110-78 = "That's how it was before. No matter what happened in Shanhaijing..."
10037110-79 = "The flowers falling, floods, lightning strikes... Everything is my fault. That is my role."
10037110-80 = "It means bearing all of the responsibility without making excuses. That is what the position of Shanhaijing President entails."
10037110-85 = "But for now..."
10037110-87 = "I should try getting some rest."
10037110-95 = "...How've you been, President Kaguya?"
10037110-96 = "I've never been more at ease, thanks to you, Executive Officer Mina."
10037110-97 = "It doesn't look like it... Did you mean what you said...?"
10037110-98 = "It's not polite to point out lies, even if they are obvious..."
10037110-102 = "Then I'll ask you bluntly. Why did you plot such a thing?"
10037110-103 = "..."
10037110-104 = "It was for the sake of loyalty. That is all."
10037110-105 = "You performed that Peking opera in front of the Red Winter visitors and Genryumon on top of daring to hurt the president! What does that have to do with loyalty!"
10037110-106 = "If I could, I would expel you, and even that wouldn't feel like enough!"
10037110-107 = "I see you are still a dim-witted loyalist, Executive Officer Mina."
10037110-108 = "Real loyalty is doing anything to oppose the president when she makes the wrong decision!"
10037110-109 = "...By \"wrong decision,\" do you mean inviting the visitors from Red Winter?"
10037110-110 = "Wasn't the Peking Opera Club the one who raised concerns at that point?"
10037110-111 = "Being loyal to a president whose actions do not align with the ways of the world can never be proper loyalty."
10037110-112 = "The president is certainly intelligent and wise... But she is arbitrary about the issues she chooses to resolve."
10037110-114 = "What?!"
10037110-115 = "Don't you know? I'm talking about Shintani Kai's expulsion."
10037110-120 = "Where are you going with this...?"
10037110-126 = "Thanks for coming all the way over here. About what's going on with Eastern Alchemy Society and Shanhaijing... No, it's no use asking you now."
10037110-127 = "...The internal police investigation of the Eastern Alchemy Society is narrowing things down."
10037110-128 = "I had no choice but to ditch the Eastern Alchemy Society."
10037110-129 = "But if you disappear now, wouldn't that make you look guilty?"
10037110-130 = "It was my only option. And they can't do anything now anyway."
10037110-131 = "Keheheh... I sure do meet a lot of goody-two-shoes like you and Kaguya, don't I?"
10037110-132 = "Speaking of, what did you talk about with the president of the Peking Opera Club that night?"
10037110-133 = "Nothing remarkable."
10037110-135 = "I'm just asking because Kaguya mentioned she would reinstate me with the Eastern Alchemy Society."
10037110-139 = "Excuse me?!"
10037110-142 = "What are you talking about? Shintani Kai reinstated to the Eastern Alchemy Society?"
10037110-143 = "Nonsense!"
10037110-145 = "No, that itself is the way of nature and the proper path!"
10037110-146 = "Don't you agree that the process through which the president expelled Kai was excessively radical and abnormal!"
10037110-150 = "...!"
10037110-151 = "On top of bypassing the appropriate process and executing a prompt expulsion, those records were completely erased, and there is hardly anyone who knows about Kai!"
10037110-152 = "Still, copycat crimes have to be prevented!"
10037110-153 = "What's more, if she had followed every single step of the process, Shintani Kai's expulsion could have taken over a year!"
10037110-154 = "Think about how many victims there could have been during that time!"
10037110-155 = "Regardless, everything must happen by the book."
10037110-156 = "Even if it's the president, Shanhaijing's school regulations cannot be violated arbitrarily! "
10037110-157 = "If we don't respect the school's regulations, then we're undermining the very institution that gave the president her power over Shanhaijing!"
10037110-160 = "We didn't discuss anything particularly remarkable, but it was definitely amusing. "
10037110-161 = "She mentioned that once I'd been reinstated to the Eastern Alchemy Society, I would then be re-expelled according to proper procedure."
10037110-162 = "Then she said those records and the truth behind them would be widely distributed to ensure I became an example."
10037110-163 = "...That sure sounds like something the Peking Opera Club president would say."
10037110-164 = "Did you...intend to accept that offer?"
10037110-165 = "At first, I was amused by her talk of reinstating me in the Eastern Alchemy Society. "
10037110-166 = "It's why I suggested that Kaguya write a new Peking opera."
10037110-170 = "That's why you wanted to reinstate Kai and re-expel her?!"
10037110-174 = "Dummy! Do you really think that would be possible—that Kai would even accept that offer?!"
10037110-175 = "Kai is a student of Shanhaijing. She has no reason to refuse! That's how it should be!"
10037110-176 = "Everyone is so closed-minded!"
10037110-178 = "If by some small chance Kai doesn't accept, I'll make her!"
10037110-179 = "What does the authority and power of Genryumon's president exist for! "
10037110-180 = "Why does Genryumon's president seem to have more power than other academies' student council presidents?"
10037110-181 = "Shouldn't everything be done for the sake of following Shanhaijing's customs?!"
10037110-187 = "(...People tell me I'm stubborn a lot...)"
10037110-188 = "(But this punk is on another level...)"
10037110-192 = "What about after I returned to the Eastern Alchemy Society? I probably would have ignored all of Kaguya's ideas."
10037110-193 = "Reinstatement, then re-expulsion just so I can follow the proper process? Do you really think I would do that?"
10037110-194 = "But...isn't that also a kind of betrayal?"
10037110-195 = "At this point, do you think I care?"
10037110-196 = "..."
10037110-197 = "I've worked a long time for this. I even had to suffer the humiliation of being imprisoned by the Corrections Bureau."
10037110-198 = "But still, I gathered my strength and waited for the right time. And that time is now."
10037110-199 = "I will take back what is mine, and no one will stand in my way."
10037110-204 = "Go tell them."
10037110-207 = "I'm back."
10037110-208 = "Radiant Moon, Raucous Dream"

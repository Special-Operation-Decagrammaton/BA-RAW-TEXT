10037110-74 = "#na;키사키;이번 경극부 일로, 산해경에 또 다른 의미의 '변화'가 시작되는 것은 아닐지……."
10037110-75 = "#na;키사키;카구야만이 원인이라고 볼 수는 없다. 어떤 의미로 모든 것을 시작한 것은 나 자신이니."

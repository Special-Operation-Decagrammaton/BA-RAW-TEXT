10037110-142 = "3;미나;02;그게, 무슨 소리지? 신타니 카이를 연단방으로 복권시켜야 한다고?\n#3;em;[?]\n#3;a"
10037110-143 = "3;미나;13;도대체 무슨 말 같지도 않은 소리를 하는 거냐!\n#3;stiff"
10037110-144 = "#all;hide"
10037110-145 = "3;카구야;16;아니, 그것이야말로 순리이고 정도다!\n#3;closeup\n#fontsize;80"
10037110-146 = "3;카구야;13;애초에 문주님께서 카이를 퇴학시킨 과정이, 지나치게 급진적이었고 정상적이지 않았다는 것은 그대 역시 인정하는 바가 아닌가!\n#3;closeup"

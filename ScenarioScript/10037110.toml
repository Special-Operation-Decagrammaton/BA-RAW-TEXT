[translation]
10037110-1 = "บทส่งท้าย;ถึงคราต้องลาจากมิตร"
10037110-2 = "เวลาล่วงเลยมาขนาดนี้แล้วเหรอเนี่ย... งานแลกเปลี่ยนจะจบลงแล้วสินะ"
10037110-3 = "ฮุฮุฮุ ดูเหมือนจะถูกใจงานแลกเปลี่ยนครั้งนี้มากเลยนะคะ ท่านเลขาธิการเชริโน่"
10037110-5 = "โล่งอกไปทีนะที่คิดแบบนี้ ซานไห่จิงของพวกเรา... เป็นอย่างไรบ้างเล่า?"
10037110-9 = "อืม... ซานไห่จิง..."
10037110-14 = "คือการผจญภัยที่ยิ่งใหญ่เลยละ!"
10037110-15 = "ทั้งทัศนียภาพที่น่าตื่นตาตื่นใจ อาหารรสเลิศที่ได้ลองกินเป็นครั้งแรก แพนด้าจอมเชื่องช้า และการแสดงงิ้วด้วย... เราจะจดจำไปทุกอย่างเลย! สุดยอดเลยละ!"
10037110-17 = "เรารู้สึกละอายใจที่ทำให้ทุกคนลำบากกับเรื่องชมรมการแสดงงิ้วเหลือเกิน"
10037110-18 = "เอาเถอะน่า ประมุขคิซากินี่เป็นคนชอบพูดอะไรซ้ำไปซ้ำมาเสียจริง "
10037110-19 = "ถ้าเป็นคนอ่อนน้อมถ่อมตนหรือรู้สึกผิดมากเกินไป มันอาจส่งผลเสียกับตัวเองได้นะ เราจะบอกอีกครั้งก็แล้วกัน!"
10037110-20 = "เลขาธิการจากเรดวินเทอร์อย่างเราไม่ติดค้างกับเรื่องขี้ปะติ๋วแบบนั้นหรอก!"
10037110-21 = "เช่นนั้นหรือ...?"
10037110-23 = "ใช่แล้วค่ะ ท่านประมุข ก็ท่านประธานเชริโน่ของเราเป็นคนใจกว้างนี่คะ!"
10037110-24 = "ยังไงคางุยะกับสมาชิกชมรมการแสดงงิ้วก็ต้องทำความสะอาดห้องน้ำ 2-3 สัปดาห์ก่อนถึงจะกลับมา#nได้นี่คะ แค่นี้ก็เพียงพอแล้วละค่ะ"
10037110-30 = "(กฎระเบียบของซานไห่จิงกับข้อบังคับของเรดวินเทอร์... ช่างมีความแตกต่างกันมากเลยนะ)"
10037110-31 = "ฉันประทับใจที่ท่านประมุขคิซากิจูงใจผู้คนได้อย่างเป็นธรรมชาติค่ะ"
10037110-32 = "แล้วฉันจะเอาไปปรับใช้ในการโฆษณาชวนเชื่อ... ไม่สิ การโน้มน้าวผู้คนของพวกเราค่ะ"
10037110-33 = "อะ... อืม... เช่นนั้นหรือ? นั่นเป็นเรื่องที่เราคาดไม่ถึงเลยนะ..."
10037110-35 = "จะว่าไป ทำไมถึงหน้าหมองแบบนั้นล่ะ ประมุขคิซากิ มีเรื่องอะไรหรือเปล่า?"
10037110-36 = "เห็นเป็นเช่นนั้นงั้นหรือ? แต่ว่าเราไม่ได้เป็นอะไรนะ?"
10037110-37 = "งั้นเหรอ...?"
10037110-38 = "เราเตรียมของขวัญเล็กๆ น้อยๆ เอาไว้เป็นที่ระลึกน่ะ หวังว่าทุกคนจะรับไปนะ"
10037110-44 = "นี่มัน... แพนด้างั้นเหรอ?"
10037110-45 = "นี่คือหุ่นจำลองแพนด้าที่ทำจากหยกขาว หยกดำ และหยกเขียว ถึงจะเป็นของเล็กๆ น้อยๆ แต่เราก็อยากให้เห็นสิ่งนี้แล้วนึกถึงซานไห่จิงน่ะ"
10037110-46 = "ไม่เล็กน้อยเลยค่ะ ท่านประมุข! โมเดลนี้ถอดแบบแพนด้าออกมาได้อย่างสมบูรณ์แบบ ลายขาวๆ ดำๆ ก็เหมือนจริงมาก ไหนจะลำตัวอ้วนกลม และแววตาที่ดูขี้เกียจและเชื่องช้านั่นอีก...!"
10037110-47 = "ดูเหมือนมันมีชีวิตจริงๆ เลยนะคะ เหมือนกำลังขยับตัวอยู่เลย!"
10037110-48 = "ฮุฮุ ดูเหมือนจะถูกใจหัวหน้าคณะฯ มารินะเป็นพิเศษเลยนะ"
10037110-50 = "ขอบใจมากนะ! เราจะตั้งโชว์ไว้ในห้องทำงานของตัวเองเลย! ต่อไปถ้ามีโอกาส เราก็อยากเชิญประมุข#nไปเยือนเรดวินเทอร์บ้างเหมือนกันนะ!"
10037110-51 = "ถ้าเชิญเราไป เราจะไม่ปฏิเสธเลยละ แล้วเราจะตั้งตารอนะ เลขาธิการเชริโน่"
10037110-60 = "ฮู่ว... ในที่สุดก็กลับมาได้อย่างราบรื่นสินะ"
10037110-61 = "เราฝากเรื่องการส่งแขกกับหัวหน้าฝ่ายประชาสัมพันธ์ไว้แล้ว ทางนั้นคงช่วยจัดการเป็นอย่างดีละนะ"
10037110-65 = "..."
10037110-66 = "น่ากังวลยิ่งนัก"
10037110-74 = "เรื่องของชมรมการแสดงงิ้วในครั้งนี้มันอาจจะนำมาถึง 'การเปลี่ยนแปลง' ของซานไห่จิงในความหมาย#nอื่นก็เป็นได้..."
10037110-75 = "เราจะมองว่าคางุยะเป็นต้นตอของเรื่องนี้แค่คนเดียวไม่ได้ เพราะในทางหนึ่ง ทุกสิ่งที่เกิดขึ้น#nล้วนแล้วแต่เริ่มมาจากตัวเรา"
10037110-78 = "และก่อนหน้านั้น... ใช่แล้วละ ไม่ว่าจะเกิดเรื่องอะไรในซานไห่จิง"
10037110-79 = "ไม่ว่าบุปผาจะร่วงโรย วารีพิโรธ หรือนภาคำรามก้อง เราก็ต้องเป็นคนรับผิดชอบ เพราะนั่นคือหน้าที่ของประมุข"
10037110-80 = "รับผิดชอบทุกอย่างโดยไม่มีข้อแก้ตัวใดๆ นี่ละตำแหน่งของประมุขแห่งซานไห่จิง"
10037110-85 = "ทว่าตอนนี้..."
10037110-87 = "เราควรต้องพักผ่อนสักหน่อยแล้วละ"
10037110-95 = "เป็นยังไงบ้าง หัวหน้าคางุยะ..."
10037110-96 = "ขอบคุณที่เป็นห่วงนะ ฉันสบายดี หัวหน้าคณะกรรมการมินะ"
10037110-97 = "แต่ดูไม่เป็นอย่างนั้นเลยนะ..."
10037110-98 = "เมื่อเห็นว่าคนจงใจพูดโกหก บางครั้งก็เป็นการสุภาพที่เราจะไม่ไปจี้จุดมันนะ..."
10037110-102 = "จะยังไงก็เถอะ ฉันขอถามเธอตรงๆ เลยแล้วกัน ทำไมเธอถึงคิดทำเรื่องแบบนี้?"
10037110-103 = "..."
10037110-104 = "ทั้งหมดที่ทำไป... ฉันทำไปเพราะความภักดี"
10037110-105 = "แค่ทำการแสดงงิ้วแบบนั้นต่อหน้าคณะผู้มาเยือนจากเรดวินเทอร์กับมังกรดำยังไม่พอ แต่ยังคิดร้ายกับ#nท่านประมุขอีก นี่มันคือความภักดีตรงไหนกันไม่ทราบ!"
10037110-106 = "สำหรับฉันแล้ว ต่อให้ไล่เธอออกตอนนี้ก็ยังไม่สาแก่ใจฉันเลย!"
10037110-107 = "ยังเป็นลูกน้องผู้ซื่อสัตย์เหมือนเดิมเลยสินะ หัวหน้าคณะกรรมการมินะ"
10037110-108 = "เมื่อประมุขตัดสินใจอะไรผิด การลุกขึ้นมาต่อต้านแม้จะต้องเดิมพันด้วยทุกอย่างก็คือการกระทำที่ภักดี!"
10037110-109 = "การตัดสินใจผิดของท่านประมุข... หมายถึงการเชิญคณะผู้มาเยือนจากเรดวินเทอร์มาอย่างนั้นเหรอ?"
10037110-110 = "จริงๆ แล้วฝ่ายที่ทำให้เกิดปัญหาจากเรื่องนั้นคือชมรมการแสดงงิ้วไม่ใช่หรือไง?"
10037110-111 = "การซื่อสัตย์ต่อประมุขที่กระทำการที่ขัดกับวิถีของสวรรค์ไม่อาจเรียกว่าเป็นความซื่อสัตย์ได้หรอกนะ"
10037110-112 = "ท่านประมุขเป็นคนที่เฉลียวฉลาดและหลักแหลมก็จริง... แต่ท่านก็เป็นคนที่มักจะแก้ไขเรื่องต่างๆ ตามอำเภอใจ"
10037110-114 = "เธอว่ายังไงนะ?!"
10037110-115 = "เธอเองก็รู้ดีไม่ใช่เหรอ? เรื่องการไล่ชินทานิ ไค ออกจากโรงเรียนน่ะ"
10037110-120 = "นี่เธออยากพูดเรื่องอะไรกันแน่...?"
10037110-126 = "คงเดินทางมาอย่างยากลำบากน่าดูเลยนะ สถานการณ์ของชมรมวิจัยศาสตร์การปรุงยากับซานไห่จิง#nเป็นยังไงบ้าง... ไม่สิ ต่อให้ถามจากเธอตอนนี้ก็ไม่มีความหมายแล้วละ"
10037110-127 = "ตอนนี้เริ่มมีการสอบสวนภายในชมรมวิจัยศาสตร์การปรุงยาแล้วค่ะ"
10037110-128 = "ฉันก็เลยต้องหลบหนีจากชมรมวิจัยศาสตร์การปรุงยาอย่างหลีกเลี่ยงไม่ได้ค่ะ"
10037110-129 = "ถ้าหายตัวไปในเวลานี้ ก็จะถูกมองว่าเป็นคนร้ายได้นะ?"
10037110-130 = "ช่วยไม่ได้ค่ะ ยังไงตอนนี้ฉันก็หมดหวังในชมรมวิจัยศาสตร์การปรุงยาแล้วด้วยค่ะ"
10037110-131 = "หึหึหึหึ... โชคดีที่ฉันได้เจอแต่คนที่ซื่อสัตย์และไร้เล่ห์เหลี่ยมสินะ ทั้งคางุยะและเธอเลย"
10037110-132 = "ไหนๆ ก็พูดเรื่องนี้แล้ว ฉันขอถามได้มั้ยคะว่าคืนวันนั้นท่านคุยอะไรกับหัวหน้าชมรมการแสดงงิ้วบ้าง?"
10037110-133 = "ไม่ได้คุยเรื่องอะไรใหญ่โตหรอก"
10037110-135 = "แค่คางุยะบอกฉันว่าจะทำให้ฉันกลับคืนสู่ชมรมวิจัยศาสตร์การปรุงยาได้น่ะ"
10037110-139 = "คะ...?!"
10037110-142 = "หมายความว่ายังไง? จะให้ชินทานิ ไค กลับคืนสู่ชมรมวิจัยศาสตร์การปรุงยาอย่างนั้นเหรอ?"
10037110-143 = "นี่เธอกำลังพูดเรื่องเหลวไหลอะไร?"
10037110-145 = "ไม่หรอก นี่คือเรื่องที่ชอบด้วยเหตุผลต่างหาก!"
10037110-146 = "เธอเองก็ยอมรับไม่ใช่เหรอว่าการไล่ไคออกจากโรงเรียนของท่านประมุขน่ะ มันทั้งรุนแรงและมันก็ไม่#nถูกต้องตามธรรมเนียมตั้งแต่แรกน่ะ!"
10037110-150 = "...!"
10037110-151 = "ท่านประมุขไม่ทำตามขั้นตอนที่เหมาะสม และไล่ไคออกอย่างกะทันหัน แค่นั้นยังไม่พอ ยังสั่งลบระเบียนประวัติของไคไปทั้งหมดจนแทบจะไม่มีใครรู้จักตัวตนของไคเลย!"
10037110-152 = "นั่นมันก็เพราะเราต้องป้องกันไม่ให้เกิดอาชญากรรมเลียนแบบยังไงล่ะ!"
10037110-153 = "และถ้าจะทำตามขั้นตอนการไล่นักเรียนออกทีละขั้นๆ ก็คงใช้เวลาเป็นปีๆ เลยด้วย!"
10037110-154 = "ลองคิดดูสิว่าระหว่างนั้นจะมีเหยื่อเพิ่มอีกกี่คน!"
10037110-155 = "แต่ถึงอย่างนั้น ทุกอย่างก็ต้องเป็นไปตามขั้นตอนสิ!"
10037110-156 = "แม้จะเป็นถึงประมุข แต่ก็จะละเมิดระเบียบของโรงเรียนซานไห่จิงตามอำเภอใจไม่ได้หรอกนะ! "
10037110-157 = "หากระเบียบของโรงเรียนถึงคราสั่นคลอน ท่านประมุขก็ไม่มีความชอบธรรมในการปกครองซานไห่จิง#nอีกต่อไป!"
10037110-160 = "ถึงจะไม่ใช่เรื่องใหญ่โตนัก แต่มันก็น่าสนุกดีนะ"
10037110-161 = "จะให้ฉันกลับสู่ชมรมวิจัยศาสตร์การปรุงยา แล้วไล่ฉันออกอีกครั้งตามขั้นตอนที่ถูกต้อง"
10037110-162 = "แล้วยังบอกอีกว่าจะประกาศให้ทุกคนรู้เกี่ยวกับบันทึกและข้อเท็จจริงที่เกิดขึ้นเพื่อให้เป็นคดีตัวอย่าง "
10037110-163 = "สมกับที่เป็นหัวหน้าชมรมการแสดงงิ้วเลยนะคะ..."
10037110-164 = "ว่าแต่... ท่านจะยอมรับข้อเสนอนั้นเหรอคะ?"
10037110-165 = "ฉันก็สนใจกับเรื่องที่บอกว่าจะทำให้ฉันกลับสู่ชมรมวิจัยศาสตร์การปรุงยาอยู่หรอกนะ "
10037110-166 = "ฉันก็เลยให้ไอเดียเรื่องการแสดงงิ้วชุดใหม่กับคางุยะไปน่ะสิ"
10037110-170 = "จะทำให้ไคกลับมา แล้วไล่ออกอีกครั้งด้วยเหตุผลแบบนั้นน่ะเหรอ...?"
10037110-174 = "เธอบ้าไปแล้วหรือไง! คิดว่าเรื่องแบบนั้นจะเป็นไปได้งั้นเหรอ?! แล้วคิดเหรอว่าไคจะยอมรับข้อเสนอแบบนั้นน่ะ!"
10037110-175 = "ไคเป็นนักเรียนของซานไห่จิง เธอไม่มีเหตุผลที่จะไม่ยอมรับหรอก! มันต้องเป็นอย่างนั้น!"
10037110-176 = "เธอคิดตามอำเภอใจมากไปแล้วนะ!"
10037110-178 = "ถ้าไคไม่ยอมรับขึ้นมา ฉันก็ต้องทำให้เธอยอมรับให้ได้!"
10037110-179 = "อำนาจและพลังของประมุขแห่งมังกรดำมีไว้เพื่ออะไรกันล่ะ! "
10037110-180 = "ทำไมประมุขแห่งมังกรดำถึงมีสิทธิ์มากกว่าประธานนักเรียนของโรงเรียนอื่นนักหนาล่ะ!"
10037110-181 = "นั่นก็เพื่อให้ปกครองซานไห่จิงตามธรรมเนียมปฏิบัติไม่ใช่เหรอ!"
10037110-187 = "(ฉันก็ได้ยินจากคนรอบข้างมาบ้างว่าคางุยะเป็นคนแน่วแน่...)"
10037110-188 = "(แต่ไม่คิดเลยนะว่าจะเป็นถึงขนาดนี้...)"
10037110-192 = "หลังจากกลับมาที่ชมรมวิจัยศาสตร์การปรุงยาแล้วจะยังไงต่อน่ะเหรอ? แน่นอนว่าฉันไม่สนใจความคิด#nเห็นของคางุยะหรอก"
10037110-193 = "อุตส่าห์ให้กลับเข้ามาได้ทั้งที แต่จะไล่ฉันออกอีกครั้งอย่างถูกต้องอย่างนั้นหรือ? คิดว่าฉันจะยอมให้#nมันเกิดขึ้นหรือไง?"
10037110-194 = "แต่ว่าถ้าเป็นอย่างนั้น... จะถือว่าเป็นการหักหลังหรือเปล่าคะ...?"
10037110-195 = "ตอนนี้เรื่องแบบนั้นไม่มีความหมายสำหรับฉันแล้วละ"
10037110-196 = "..."
10037110-197 = "นี่ก็นานมากแล้ว ที่ผ่านมาฉันต้องถูกเหยียดหยามด้วยการให้ไปอยู่ห้องคุมขัง"
10037110-198 = "แต่ฉันก็รอเวลานี้ให้มาถึง และระหว่างนั้นก็รวบรวมกำลังได้แล้ว ในที่สุดก็ถึงเวลาแล้วละ"
10037110-199 = "ฉันจะมาทวงของของฉันคืน และจะไม่ยอมให้ใครขวางทางทั้งนั้น"
10037110-204 = "เธอจงกลับไปบอกข่าวซะ"
10037110-207 = "ว่าฉันกลับมาแล้ว"
10037110-208 = "จันทร์ฉายวายฝัน"

[translation]
10037110-1 = "尾聲;離別常在，思念常在"
10037110-2 = "沒想到時間過得這麼快……交流會竟然已經要結束了。"
10037110-3 = "呵呵呵，看來您似乎很滿意這次的交流會呢，潔莉諾書記長。"
10037110-5 = "希望能讓汝留下不錯的印象。#n在汝看來……山海經是個怎樣的地方呢？"
10037110-9 = "唔呣，這次來山海經……"
10037110-14 = "簡直就是場大冒險！"
10037110-15 = "不可思議的風景、從沒吃過的美食、懶惰的熊貓，還有京劇……#n每一樣都讓咱念念不忘！真是太厲害了！"
10037110-17 = "因京劇部一事讓汝遭遇險境，對此妾身實在感到愧疚。"
10037110-18 = "真是的，這句話都不知道聽妃姬門主說過幾次了。"
10037110-19 = "過度的謙虛和道歉都只會帶來反效果，咱不是跟你說過了嗎！"
10037110-20 = "像咱這麼偉大的會長，才不會拘泥於那種小事！"
10037110-21 = "……是嗎。"
10037110-23 = "是的，門主大人。#n我們潔莉諾會長的心胸就是如此寬厚！"
10037110-24 = "反正輝夜和京劇部的成員只要去打掃廁所兩、三週就能回來，這樣不就沒事了嗎！"
10037110-30 = "（妾身再次感受到山海經的律法與赤冬的校規之間……真是存在巨大的鴻溝啊）"
10037110-31 = "妃姬門主感化他人的方式非常令我印象深刻。"
10037110-32 = "往後在宣傳……更正，在說服別人的時候也會多多參考的。"
10037110-33 = "唔，唔嗯，是嗎？#n這倒是令妾身有些意外……"
10037110-35 = "話說你的臉色好像不太好啊，妃姬門主。#n發生了什麼事嗎？"
10037110-36 = "是嗎？妾身倒覺得一如既往？"
10037110-37 = "真的嗎……？"
10037110-38 = "話說回來……為了紀念此日，妾身準備了一些薄禮。#n希望各位能夠收下。"
10037110-44 = "這是……熊貓？"
10037110-45 = "是以白玉、黑玉和綠玉打造而成的熊貓模型。#n儘管並非貴重之物，期望這份禮物能讓各位記住山海經。"
10037110-46 = "這，這真是太棒了，門主大人！#n竟然能如此完美地重現熊貓的黑白紋路，以及牠們圓滾滾的身材和慵懶的神情……！"
10037110-47 = "簡直可說是栩栩如生啊！"
10037110-48 = "呵呵，看來瑪麗娜委員長對這份禮物相當中意。"
10037110-50 = "感激不盡！咱會將它放在辦公室裡珍藏的！#n假如有機會的話，真想邀請門主來咱們赤冬作客啊！"
10037110-51 = "屆時妾身自然不會推辭。#n妾身會期待著那天到來的，潔莉諾書記長。"
10037110-60 = "呼……能堅持至此實在不容易。"
10037110-61 = "送別的相關事宜已交由香主……宣傳部長接手，他想必能妥善處理才是。"
10037110-65 = "……"
10037110-66 = "真教人擔心。"
10037110-74 = "不知此次京劇部的事件，是否會為山海經帶來另一種意義上的「變化」……"
10037110-75 = "不能將一切都歸咎於輝夜。#n從某種層面上來看，一切皆因妾身而起。"
10037110-78 = "在那之前……沒錯，無論山海經之中發生任何事。"
10037110-79 = "哪怕是花朵散落、洪水氾濫或天打雷劈，妾身都必須負起責任。#n──這才是門主存在的意義。"
10037110-80 = "欲戴王冠必承其重──此乃身為山海經門主的義務。"
10037110-85 = "不過，至少現在……"
10037110-87 = "就讓妾身稍微闔個眼吧。"
10037110-95 = "……過得還好嗎，輝夜部長？"
10037110-96 = "多虧有你的關心，我沒辦法過得比現在更好了，美奈執行部長。"
10037110-97 = "不是我要說，就算剛才那只是客套話，你也未免太敷衍了吧……"
10037110-98 = "假如一個人說出顯而易見的謊言，不執意揭穿才是待人處世的道理才對……"
10037110-102 = "隨你怎麼說吧。#n總之我就開門見山地問了──你為什麼要策劃這起事件？"
10037110-103 = "……"
10037110-104 = "只是為了履行忠義罷了。不存在其他的理由。"
10037110-105 = "你不只在赤冬訪問團和玄龍門都在場的時候演出那種京劇，#n甚至還企圖加害於門主大人──這樣的所作所為哪裡和忠義沾得上邊了！"
10037110-106 = "在我看來，你所犯下的罪行哪怕立刻遭到退學都不奇怪啊！"
10037110-107 = "你依舊是個愚昧的忠臣呢，美奈執行部長。"
10037110-108 = "當門主做出錯誤的決斷時，即便賭上一切也要挺身反對才是忠義的表現！"
10037110-109 = "……你口中的錯誤決斷，指的該不會是門主邀請赤冬訪問團來山海經的事吧？"
10037110-110 = "搞砸交流會的人，難道不是你們京劇部嗎？"
10037110-111 = "即便門主的行為違背天理依舊向其效忠，這才不是真正的忠誠。"
10037110-112 = "我不否認門主的確相當賢明……但他做事實在太恣意妄為了。"
10037110-114 = "你說什麼！？"
10037110-115 = "你自己不也知道嗎？申谷誡退學的來龍去脈。"
10037110-120 = "你到底想說什麼……？"
10037110-126 = "辛苦你遠道而來。#n鍊丹術研究會和山海經的事……不，現在就算問你這些也沒用了吧。"
10037110-127 = "……鍊丹術研究會內部的調查範圍一直在縮減。"
10037110-128 = "所以我不得不脫離鍊丹術研究會。"
10037110-129 = "你在這個時間點離開，不就等於承認自己就是犯人了嗎？"
10037110-130 = "這也沒辦法。#n反正我對如今的鍊丹術研究會也不抱任何期待了。"
10037110-131 = "咯咯咯咯……#n輝夜也好，你也罷……我最近總是遇到一些耿直又憨厚的人呢。"
10037110-132 = "既然提到此事，我有件事想向您請教。#n那天晚上，您究竟和京劇部長聊了些什麼？"
10037110-133 = "其實也不是什麼大不了的事。"
10037110-135 = "輝夜只是提議要讓我回歸鍊丹術研究會而已。"
10037110-139 = "什麼……！？"
10037110-142 = "這話是什麼意思？#n要讓申谷誡回歸鍊丹術研究會？"
10037110-143 = "你明白自己剛才說的有多荒謬嗎！"
10037110-145 = "不，那才是符合天理的正道！"
10037110-146 = "你不也同意門主當時命令誡退學的決定，過於草率且不合情理嗎！"
10037110-150 = "……！"
10037110-151 = "不僅沒有按照正常的程序就直接加以放逐，甚至還徹底抹去了相關的紀錄……#n所以才會導致現在連知道申谷誡存在的人都寥寥無幾！"
10037110-152 = "那也是為了避免有模仿犯出現啊！"
10037110-153 = "要是遵循正常的退學程序，申谷誡至少得多留在學園一年以上！"
10037110-154 = "你自己想想看，如果讓他多待那麼長的時間將會出現多少受害者！"
10037110-155 = "即便如此，我還是認為一切都該按程序進行！"
10037110-156 = "就算身為門主，也不能恣意違反山海經的校規！"
10037110-157 = "一旦校規的權威受到威脅，門主治理山海經的正當性又談何存在！"
10037110-160 = "雖然無足輕重，不過那次的談話相當有趣。"
10037110-161 = "他說要先讓我回歸鍊丹術研究會，然後再按照正當程序重新將我退學。"
10037110-162 = "同時還要將當年的紀錄和真相公諸於世，讓眾人以我為戒。"
10037110-163 = "……那的確很像會從京劇部長口中說出來的話。"
10037110-164 = "那您打算……接受他的提議嗎？"
10037110-165 = "首先，我對於他說要讓我回歸鍊丹術研究會這件事很感興趣。"
10037110-166 = "所以才會為他提供新京劇的點子。"
10037110-170 = "就因為這種理由而要讓誡回歸，然後再重新將他退學……？"
10037110-174 = "笨蛋！你該不會真以為他會乖乖聽話吧！？#n你自己想想，誡怎麼可能會老實接受這個提議！"
10037110-175 = "誡終究也是山海經的學生，所以肯定會接受的！#n他本來就應該如此！"
10037110-176 = "你未免也想得太天真了吧！"
10037110-178 = "就算誡不同意，我也會想辦法讓他接受！"
10037110-179 = "不然玄龍門門主的權力與力量又是為何而存在！"
10037110-180 = "玄龍門門主的權限，又是為何比其他學園的學生會長更大呢！"
10037110-181 = "這一切不都是為了讓門主能夠按照律法治理山海經嗎！"
10037110-187 = "（雖然常聽別人說他是個死腦筋的人……）"
10037110-188 = "（沒想到症狀竟然這麼嚴重……）"
10037110-192 = "回歸鍊丹術研究會之後？#n等我回去之後，輝夜說的話就不必理會了。"
10037110-193 = "先讓我回歸，然後再按照正常程序重新退學？#n他真以為我會乖乖照做嗎？"
10037110-194 = "但是這樣……不算是言而無信嗎……？"
10037110-195 = "信用對我而言還有任何意義嗎？"
10037110-196 = "……"
10037110-197 = "我已經等了太久太久。#n即便經歷被關押進矯正局這樣的恥辱……"
10037110-198 = "我仍舊努力壯大自己的勢力，默默等待機會到來。#n如今時機終於成熟……"
10037110-199 = "這次一定要奪回屬於我的東西，不會讓任何人有機可乘。"
10037110-204 = "去詔告天下吧。"
10037110-207 = "──就說我回來了。"
10037110-208 = "月華夢騷"

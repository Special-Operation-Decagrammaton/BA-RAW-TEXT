10037110-29 = "3;키사키;02\n#3;em;…\n#3;h\n#3;a\n#wait;2500"
10037110-30 = "3;키사키;10;(……새삼 느끼는 것이다만, 산해경의 법도와 붉은겨울의 학칙 사이에는…… 참으로, 크나큰 차이가 있는 것 같구나.)\n#3;stiff"
10037110-31 = "5;토모에 치파오;03;키사키 문주님께서 사람을 자연스럽게 감화시키는 방법이 참으로 인상적이었지요.\n#5;al\n#3;m1"
10037110-32 = "5;토모에 치파오;07;저의 프로파간다…… 실례. 사람을 설득하는 방법에도, 많은 참고가 될 것 같습니다.\n#5;em;[반짝]\n#5;greeting"
10037110-33 = "3;키사키;99;으, 으음. 그러한가? 그것은 전혀 예상하지 못했던 이야기로구나……."
10037110-34 = "#all;hide"
10037110-35 = "3;체리노 치파오;02;그런데, 뭔가 표정이 어둡구나. 키사키 문주. 무슨 일이라도 있는가?\n#3;em;[?]"
10037110-36 = "3;키사키;00;그렇게 보였는가? 정작 나는 아무렇지도 않다만?"
10037110-37 = "1;체리노 치파오;02;그래……?\n#1;ar\n#3;m5"
10037110-38 = "3;키사키;08;그보다…… 이 자리를 기념하여, 작은 선물을 준비했다. 받아 주었으면 하는구나."

10037110-97 = "3;미나;00;아니, 빈말로라도 그렇게는 보이지 않는데……."
10037110-98 = "5;카구야;05;사람이 뻔히 드러나 보이는 거짓말을 할 때에는, 구태여 지적하지 않는 것이 예의인 법이다……."

[translation]
10023055-2 = "啊啊，雖然身穿奇裝異服還挺有兩下子──真不錯呢。"
10023055-3 = "謝謝你，[ruby= ・     ・     ・     ・ ]小偷閣下[/ruby]。#n這樣是否合適呢？"
10023055-4 = "──是[ruby= ・     ・ ]怪盜[/ruby]才對哦，這位小姐。"
10023055-18 = "！？這種地方居然有陷阱……？"
10023055-26 = "從下次起，最好多注意一下腳底哦。#n否則難得的舞蹈就要白費了。"
10023055-30 = "！？"
10023055-31 = "──別想逃！"
10023055-32 = "……我們也來幫忙！"
10023055-34 = "哎呀，是可愛的女僕們呢。"
10023055-36 = "他，他說我可愛耶！#n耶嘿嘿……"
10023055-37 = "姐姐！現在不是高興的時候吧！？"
10023055-38 = "我們會在這裡……阻止你的！"
10023055-39 = "呵呵……這份志氣也同樣美麗。#n……不過，很遺憾。"
10023055-45 = "……你們應該在第一擊就擊倒我的。"
10023055-46 = "無謀的勇氣可是離美學最遙遠的存在哦，小姐。#n──畢竟你相當弱啊。"
10023055-48 = "或許，是這樣沒錯……！"
10023055-50 = "但你的對手，可不只有我們！"
10023055-51 = "……？"
10023055-55 = "光呀！"
10023055-60 = "唔……！？"
10023055-61 = "謝謝你，愛麗絲！"
10023055-62 = "那個……周圍沒有任何損害吧？"
10023055-63 = "是！今天的愛麗絲是光屬性的單體輸出！#n所以會將全部的火力集中在一個目標上！"
10023055-65 = "……！"
10023055-66 = "……看來還能行動呢。"
10023055-75 = "──我，我要開槍了……！"
10023055-76 = "唔！？"
10023055-82 = "就是現在！快抓住他！"
10023055-83 = "嗯，姐姐！"
10023055-91 = "唔哇！"
10023055-92 = "呀啊！"
10023055-93 = "怎，怎麼回事！？"
10023055-94 = "快看天花板！"
10023055-96 = "──呼呣。我就收回前面說過的話吧。"
10023055-97 = "小姐們──似乎具有一定的實力呢。#n你們叫什麼名字？"
10023055-99 = "我是C&C所屬代號Zero Four。飛鳥馬季。"
10023055-104 = "呼呣──那個C&C居然會協助銅田……"
10023055-105 = "究竟是為什麼呢？"
10023055-107 = "想要用委託的酬勞……買新的PrayStation Pro7……"
10023055-108 = "……嗯？"
10023055-109 = "姐姐！你真的打算買嗎！？"
10023055-110 = "不對！不是那樣的……！我們是要從怪盜手中──"
10023055-111 = "──保護藝術品！"
10023055-115 = "……"
10023055-116 = "[ns]「為什麼會想竊取藝術品呢……？」"
10023055-117 = "你是……"
10023055-118 = "啊啊──雖然已沉澱在記憶的深處，不過這張臉我有印象。"
10023055-119 = "──是夏萊的「老師」，對吧？"
10023055-120 = "那一天──我們七罪人自矯正局獲得解放的值得紀念的一天，踏入奇普托斯的──"
10023055-121 = "原來如此……是這樣啊。"
10023055-122 = "可惡的「慈愛的怪盜」！#n既然你潛入了這座宅邸，就別想輕易逃脫！"
10023055-129 = "等，等等！那樣無差別地展開攻擊地話，連我們也會……！"
10023055-130 = "啊……！？"
10023055-134 = "綠！？"
10023055-137 = "（咦……！？）"
10023055-138 = "（我正在墜落……？）"
10023055-140 = "呵呵，沒有受傷吧？這位小姐。"
10023055-146 = "……！#n「慈愛的怪盜」救了綠！"
10023055-147 = "綠，沒受傷吧！？"
10023055-148 = "嗯，嗯……我沒事。#n不過為什麼「慈愛的怪盜」會……？"
10023055-149 = "（為什麼呢……？）"
10023055-153 = "原來如此，看來今宵的舞台會變得十分有趣呢──"
10023055-154 = "我就給小姐們一個忠告吧。#n拘泥於事物的表象的話，想看清本質可是癡人說夢哦。"
10023055-155 = "──那麼我就先告辭了。#n……在不遠的將來，我們想必還會再次相會吧。#n祝各位在那之前都能做個好夢。Bye！"
10023055-159 = "逃走了！"
10023055-160 = "姐姐，你看這個！"
10023055-161 = "上面寫著「預告尚未執行」。"
10023055-162 = "哼，明明差點就被抓住了！"
10023055-163 = "這次沒有解謎要素呢……#n話說，他隨時都帶著各式各樣的預告信嗎……"
10023055-167 = "各位……可以請你們說明一下嗎？"
10023055-168 = "哇！？這，這個是……！"
10023055-169 = "[s]「全部都是我們計畫的聲東擊西作戰。」"
10023055-170 = "老師！"
10023055-171 = "哦……方便詳細告訴我嗎？"
10023055-173 = "原來如此……是讓第五名成員稍後會合的計畫啊。"
10023055-174 = "並且作戰差點就要成功了。"
10023055-175 = "[s]「很抱歉，明明就差一步……」"
10023055-176 = "請別道歉，畢竟也不是有東西被盜走了……#n況且，能將那個「慈愛的怪盜」逼到這種程度的手段，不得不讓人佩服。"
10023055-177 = "雖然確實被他逃走了沒錯……但應該也讓怪盜了解各位的實力了才是。#n或許不會再出現了也說不定。"
10023055-178 = "我，我想應該不至於吧……"
10023055-180 = "那個，明太郎先生。這到底是怎麼回事？"
10023055-181 = "沒想到「慈愛的怪盜」居然會現身。#n早知道會這樣的話我就拒絕出席了……"
10023055-182 = "好了好了，各位請冷靜。#n「慈愛的怪盜」雖然出現了，不過有造成任何問題嗎？"
10023055-183 = "如各位所見，我們擊退了怪盜。#n沒錯吧？"
10023055-184 = "這也是當然的。#n畢竟負責這座宅邸警備工作的可是大名鼎鼎的C&C啊！"
10023055-186 = "C&C……我有聽說過。#n……好像是千年最強的特務組織之類的。"
10023055-187 = "如果真的是的話，能夠擊退怪盜也不奇怪。"
10023055-189 = "感謝各位的諒解。"
10023055-190 = "看來今天的派對就先到此為止比較好呢。#n我們會引導各位到房間去，請跟我來……"
10023055-194 = "那麼，C&C的各位想必也累了，今天還請好好休息。#n今後的計畫待休息之後再進行也無妨。"
10023055-197 = "……（怎，怎麼了，為什麼一直盯著我看！？）"
10023055-198 = "……"
10023055-199 = "（老師……季同學從剛才開始就一直盯著我們……）"
10023055-200 = "[ns]「那個……季，你先冷靜一下……」"
10023055-201 = "就，就算你那樣盯著我看，我也一點都不怕哦！"
10023055-202 = "再說，我們剛才也幫了你……你也該說句感謝的話吧！"
10023055-207 = "……說的也是。"
10023055-208 = "非常感謝，遊戲開發部的各位。"
10023055-209 = "咦，咦？咦咦？"
10023055-210 = "咦……！"
10023055-214 = "不，我受到幫助是事實……#n很抱歉我這麼晚才道謝。"
10023055-215 = "那，那……為什麼要盯著我們看呢！？"
10023055-216 = "因為我還不太習慣這種狀況……#n不清楚該如何開啟話題……"
10023055-217 = "也就是說，季同學是因為不知道該說什麼，才會一直盯著我們的是嗎……？"
10023055-218 = "是的。謝謝你主動開口，桃井。"
10023055-219 = "那麼，關於今後該做的事──"
10023055-221 = "這樣啊。原來季的任務是阻止「慈愛的怪盜」……"
10023055-222 = "是的，雖然同時還進行著另一個任務。"
10023055-223 = "那個……你應該不會跟寧瑠前輩說……#n我們妨礙了任務之類的吧？"
10023055-224 = "不，我不會做那種事。#n不如該說遊戲開發部的各位都盡了最大的努力。"
10023055-225 = "……嗯。#n就把這當成是C&C和遊戲開發部的聯合作戰……如何呢？"
10023055-226 = "那個……這樣真的可以嗎？"
10023055-227 = "沒問題的。反正前輩們也不在。"
10023055-228 = "是那個問題嗎？"
10023055-230 = "沒錯，就是那個問題。"
10023055-231 = "也就是說，能和季成為夥伴對嗎？"
10023055-232 = "……？"
10023055-233 = "愛麗絲想和季組隊。#n想和季一起解決這項任務！"
10023055-234 = "夥，夥伴……是嗎？"
10023055-235 = "果然不行嗎……？"
10023055-236 = "雖然並非如此……#n但……畢竟我先前曾一度拒絕……"
10023055-237 = "沒問題的。夥伴並不可怕！#n那麼從現在開始，季跟遊戲開發部就是夥伴了！"
10023055-238 = "謝，謝謝你。#n願意對我這麼說……"
10023055-239 = "乓啪喀乓！季加入隊伍了！"
10023055-244 = "呀！？"
10023055-245 = "突，突然抱過來了……？"
10023055-249 = "……（摸摸）"
10023055-250 = "（頭正好處在很好摸的位置呢……總覺得心情變平靜了……）"
10023055-255 = "……沒關係嗎。"
10023055-256 = "愛麗絲都這麼說了，不用擔心的。"
10023055-258 = "太好了呢，愛麗絲醬。季同學也是……"
10023055-260 = "（就這樣，季和遊戲開發部成為了夥伴）"
10023055-261 = "（可喜可賀，可喜可……）"
10023055-263 = "（下集待續！）"

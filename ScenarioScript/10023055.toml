[translation]
10023055-2 = "ไม่ธรรมดาเลยนะคะ คุณนิรนาม"
10023055-3 = "ค่ะ คุณจอมโจร คราวนี้ฉันเรียกชื่อถูกต้องแล้ว หวังว่าจะไม่ทำให้คุณอารมณ์เสียนะคะ"
10023055-4 = "ฮุฮุ... จะเล่นไม้นี้เหรอคะ?"
10023055-18 = "?! มีกับดักในที่แบบนี้ด้วย...?"
10023055-26 = "ต่อไปหวังว่าจะสังเกตข้างใต้พื้นรอบๆ ตัวให้รอบคอบกว่านี้นะคะ"
10023055-30 = "?!"
10023055-31 = "คิดว่าฉันจะยอมปล่อยให้ทำแบบนั้นเหรอ?"
10023055-32 = "ถึงจะใช้เวลาขึ้นมานานไปหน่อย... แต่พวกฉันก็จะไม่ยอมอยู่เฉยๆ หรอกนะคะ!"
10023055-34 = "ตายจริง มีกำลังเสริมเป็นเมดที่น่ารักๆ เหรอคะ? "
10023055-36 = "นะ... น่ารักงั้นเหรอ?!  อ่า แหะๆๆ"
10023055-37 = "พี่! มันใช่เวลามาบ้ายออยู่มั้ยเนี่ย?!"
10023055-38 = "พวกฉันมาขัดขวางคุณค่ะ!"
10023055-39 = "ฮุฮุ... ถือว่ากล้ามากเลยนะคะ แต่จะขวางได้เหรอคะ?"
10023055-45 = "พวกคุณควรจะเคลียร์ภารกิจให้ได้ตั้งแต่การโจมตีครั้งแรกไปแล้วค่ะ"
10023055-46 = "ถึงความกล้าหาญของพวกคุณจะสวยงาม แต่การเคลื่อนไหวยังขาดสุนทรียศาสตร์อยู่ค่ะ ทั้งชักช้า แล้วก็อืดอาด"
10023055-48 = "ถึงพวกเราจะมาช้าอย่างที่เธอว่าก็เถอะ...!"
10023055-50 = "แต่คนที่จะจัดการคุณไม่ใช่พวกเราหรอกค่ะ!"
10023055-51 = "......?"
10023055-55 = "ลำแสงทำลายล้าง!"
10023055-60 = "อึ้ก......?!"
10023055-61 = "ดีมาก อาริสึ!"
10023055-62 = "ถะ... แถวนี้ไม่มีอะไรเสียหายใช่ไหม?"
10023055-63 = "ค่ะ! อาริสึในตอนนี้คือนักแม่นปืนที่มีชื่อเสียง! อาริสึมีแค่เป้าหมายเดียว และจะโถมกำลังทั้งหมดไปที่#nเป้าหมายนั้นค่ะ!"
10023055-65 = "......!"
10023055-66 = "ยังขยับได้อยู่สินะคะ ถ้าอย่างนั้นก็...!"
10023055-75 = "... ขอยิงเลยนะคะ...!"
10023055-76 = "อึก?!"
10023055-82 = "ตอนนี้แหละ! จับตัวไว้!"
10023055-83 = "อื้ม พี่โมโมอิ!"
10023055-91 = "วะ... ว้าย?!"
10023055-92 = "อ๊ายยย!"
10023055-93 = "กะ... เกิดอะไรขึ้นกันเนี่ย?!"
10023055-94 = "ดูโน่นสิ ที่เพดาน!"
10023055-96 = "ฉันขอแก้ไขในสิ่งที่ฉันพูดก่อนหน้านี้ค่ะ"
10023055-97 = "พวกคุณมีความสามารถกันพอตัวเลยนะคะ ถึงจะมาถามเอาป่านนี้ก็เถอะ พวกคุณคือใครกันเหรอคะ?"
10023055-99 = "เจ้าของรหัสประจำตัวซีโร่โฟร์ สังกัด C&C อาซุมะ โทคิค่ะ"
10023055-104 = "C&C ที่มาช่วย...?"
10023055-105 = "C&C ช่วยคุณเมทาโร่งั้นเหรอคะ? ช่วยทำไมคะ?"
10023055-107 = "ส่วนพวกฉันก็ได้รับภารกิจมา... และว่าจะเอาเงินค่าจ้าง... ไปซื้อไพล์สเตชันใหม่..."
10023055-108 = "...... คะ?"
10023055-109 = "พี่! นี่คิดแบบนั้นอยู่หรอกเหรอ?!"
10023055-110 = "ไม่ใช่! ไม่ใช่อย่างนั้นสักหน่อย...! พวกเราแค่มาจับจอมโจร..."
10023055-111 = "เราแค่จะมาจับโจรเท่านั้นนะคะ!"
10023055-115 = "......"
10023055-116 = "[ns] \"ทำไมถึงจะขโมยงานศิลปะไปล่ะ?\""
10023055-117 = "คุณคือ...?"
10023055-118 = "อ้อ หน้าคุ้นๆ ฉันเคยเจอคุณมาก่อนสินะคะ"
10023055-119 = "ตอนนั้นบอกว่าเป็น... คุณครูของชาเล่ต์ใช่ไหมคะ?"
10023055-120 = "คนใหม่ที่มาเยือนคิโวทอสในวันที่เจ็ดอาชญากรหลบออกมาจากห้องคุมขัง..."
10023055-121 = "เป็นอย่างนี้เองสินะคะ..."
10023055-122 = "จอมโจรแห่งความเสน่หา! ถ้าเข้ามาที่นี่แล้ว ไม่มีทางออกไปได้ง่ายๆ แน่!"
10023055-129 = "ดะ... เดี๋ยวก่อน! มายิงใส่กันไม่เลือกหน้าแบบนี้ เดี๋ยวพวกฉันก็...!"
10023055-130 = "อ๊าย?!!"
10023055-134 = "มิโดริ?!"
10023055-137 = "(อ๊ะ...?)"
10023055-138 = "(ฉันกำลังร่วงลงมาเหรอ...?)"
10023055-140 = "ฮุฮุ"
10023055-146 = "อ๊ะ! จอมโจรแห่งความเสน่หาช่วยมิโดริไว้ได้ค่ะ!"
10023055-147 = "มิโดริ เป็นยังไงบ้าง?!"
10023055-148 = "อะ... อืม ไม่เป็นไร แต่ทำไมจอมโจรแห่งความเสน่หาถึงช่วยฉันไว้ล่ะ...?"
10023055-149 = "(ทำไมกัน...?)"
10023055-153 = "ฉันพอจะเข้าใจสถานการณ์แล้วละค่ะ น่าสนุกขึ้นเยอะเลยนะคะเนี่ย"
10023055-154 = "จะขอพูดอะไรสักอย่างนะคะ ถ้าเราเอาแต่สนใจภายนอกมากเกินไป ก็จะไม่พบความงามที่อยู่ภายในค่ะ"
10023055-155 = "วันนี้ฉันขอกลับก่อนแล้วกันค่ะ แต่อีกเดี๋ยวเราคงได้เจอกันอีก"
10023055-159 = "หนีไปแล้ว!"
10023055-160 = "มีกระดาษอะไรหล่นออกมาด้วย..."
10023055-161 = "จดหมายเตือนเหรอ? ในนี้เขียนไว้ว่า <การเตือนยังมีผลอยู่> ?"
10023055-162 = "อะไรเนี่ย โดนเล่นงานแล้วก็หนีไปซะงั้น!"
10023055-163 = "ครั้งนี้ไม่ทิ้งปริศนาอะไรไว้เลยแฮะ... ว่าแต่เธอพกจดหมายเตือนแบบนี้ติดตัวตลอดเลยเหรอเนี่ย?"
10023055-167 = "ทุกคนครับ... นี่มันอะไรกันครับเนี่ย?"
10023055-168 = "เฮือก?! คะ... คือว่า...!"
10023055-169 = "[s] \"ที่จริงแล้ว ทั้งหมดนี้คือปฏิบัติการโจมตีแบบกลลวงน่ะ\""
10023055-170 = "คุณครู!"
10023055-171 = "ฮืม... ช่วยอธิบายเพิ่มหน่อยได้ไหมครับ?"
10023055-173 = "อืม... มีสมาชิกคนที่ 5 เข้ามาผนึกกำลังเหตุผลเชิงกลยุทธ์"
10023055-174 = "แล้วปฏิบัติการนั้นก็เกือบสำเร็จได้งั้นสินะครับ"
10023055-175 = "[s] \"ต้องขอโทษด้วยนะ เราเกือบจะจับโจรได้แล้วแท้ๆ เชียว...\""
10023055-176 = "ไม่หรอกครับ แค่ทำให้จอมโจรแห่งความเสน่หานั่นเข้าตาจนได้ก็ถือเป็นความสำเร็จยิ่งใหญ่แล้วครับ"
10023055-177 = "ใครจะไปรู้กันล่ะครับ? บางทีจอมโจรอาจจะกลัวพวกคุณจนไม่กล้าโผล่มาอีกครั้งก็ได้ครับ"
10023055-178 = "อืม... ไม่น่าจะขนาดนั้นนะคะ"
10023055-180 = "คุณเมทาโร่ ทั้งหมดนี่มันอะไรกันครับ?"
10023055-181 = "<จอมโจรแห่งความเสน่หา> งั้นเหรอ? ถ้ารู้ว่าจะมีเรื่องแบบนี้ ไม่น่ามาที่นี่ตั้งแต่แรกแล้วเลย..."
10023055-182 = "ดะ... เดี๋ยวก่อนครับ ทุกคนใจเย็นๆ นะครับ ต่อไปจะไม่มีปัญหาอะไรทั้งนั้นครับ"
10023055-183 = "อย่างที่ทุกคนเห็นว่าเราไล่จอมโจรแห่งความเสน่หาไปได้อย่างยอดเยี่ยมแล้วครับ ใช่ไหมครับ?"
10023055-184 = "ผู้ที่มาดูแลความปลอดภัยในคฤหาสน์แห่งนี้ก็คือองค์กรลับ C&C ที่โด่งดังยังไงล่ะครับ!"
10023055-186 = "C&C งั้นเหรอ? องค์กรของเจ้าหน้าที่ลับที่มีชื่อเสียงนั่นน่ะเหรอ...?"
10023055-187 = "จะว่าไป การขับไล่จอมโจรไปได้อย่างง่ายๆ เมื่อกี้ก็ไม่ใช่เรื่องเล่นๆ เลยนะ"
10023055-189 = "ต้องขอขอบคุณอีกครั้งนะครับทุกคน"
10023055-190 = "แต่ผมว่าเราจบปาร์ตี้กันตรงนี้น่าจะดีกว่านะครับ ผมจะนำทางแขกทุกคนไปที่พักให้ครับ"
10023055-194 = "แล้วก็... ช่วยวางแผนปฏิบัติการหลังจากนี้กันด้วยนะครับ"
10023055-197 = "... (อะ... อะไรเนี่ย ใช้งานคุ้มเลยนะ?!)"
10023055-198 = "......"
10023055-199 = "(คุณโทคิเค้า... เอาแต่จ้องมาทางนี้แบบไม่พูดไม่จาอะไรเลยมาตั้งแต่เมื่อกี้แล้วนะคะ คุณครู...)"
10023055-200 = "[ns] \"นี่...โทคิ ใจเย็นๆ ก่อนนะ...\""
10023055-201 = "อะ... อะไรของเธอ! ถึงจะจ้องกันแบบนั้นฉันก็ไม่กลัวหรอกนะ!"
10023055-202 = "พวกเราเป็นฝ่ายมาช่วยแท้ๆ อย่างน้อยก็ควรพูดขอบคุณบ้างไม่ใช่รึไง!"
10023055-207 = "...... อย่างนั้นเหรอคะ"
10023055-208 = "ขอบคุณค่ะ ชมรมพัฒนาเกมทุกคน"
10023055-209 = "เอะ... เอ๋...? เอ๋?"
10023055-210 = "อะ... อะไรกันน่ะ...!"
10023055-214 = "ไม่หรอกค่ะ ยังไงฉันก็ได้รับความช่วยเหลือจากพวกคุณจริงๆ ก็ต้องกล่าวขอบคุณสิคะ"
10023055-215 = "ละ... แล้วทำไมถึงเอาแต่จ้องกันแบบไม่พูดไม่จาเลยล่ะ!"
10023055-216 = "ฉันทำ... อย่างนั้นสินะคะ พอเกิดเหตุการณ์แบบนี้ก็เลยไม่รู้ว่าควรจะพูดอะไรออกมาค่ะ มันเป็นนิสัยไป#nแล้วน่ะค่ะ"
10023055-217 = "แปลว่าที่คุณโทคิจ้องเราอยู่เฉยๆ ก็เพราะว่าไม่รู้ว่าจะพูดอะไรงั้นเหรอ...?"
10023055-218 = "ใช่ค่ะ ขอบคุณที่ชวนคุยก่อนนะคะ โมโมอิ"
10023055-219 = "แต่ว่า... ดูเหมือนสถานการณ์จะซับซ้อนขึ้นนะคะ"
10023055-221 = "อย่างนี้นี่เอง ภารกิจของคุณโทคิก็คือการขัดขวาง <จอมโจรแห่งความเสน่หา> สินะคะ..."
10023055-222 = "ใช่ค่ะ ถึงจะมีภารกิจอื่นด้วยก็เถอะค่ะ"
10023055-223 = "ถะ... ถ้าพวกเรารบกวนการทำภารกิจหรือทำอะไรทำนองนั้น จะเอาไปฟ้องรุ่นพี่เนรุใช่ไหม?"
10023055-224 = "ไม่หรอกค่ะ ฉันไม่คิดจะทำแบบนั้นหรอกค่ะ ชมรมพัฒนาเกมทุกคนไม่ได้รบกวนฉัน แต่ทำงานเต็มที่กันต่างหากค่ะ"
10023055-225 = "งั้นก็... เรียกว่านี่คือยุทธศาสตร์ร่วมระหว่าง C&C และชมรมพัฒนาเกมกันเถอะค่ะ"
10023055-226 = "แบบนั้นจะไม่เป็นไรเหรอคะ?"
10023055-227 = "ไม่เป็นไรหรอกค่ะ พวกรุ่นพี่ก็ไม่ได้อยู่ที่นี่อยู่แล้ว"
10023055-228 = "กลัวจะเป็นปัญหาเรื่องนั้นเหรอ?"
10023055-230 = "ค่ะ ปัญหาแบบนั้นแหละค่ะ"
10023055-231 = "ถ้างั้นพวกอาริสึกับโทคิก็เป็นสหายกันสินะคะ?"
10023055-232 = "......?"
10023055-233 = "อาริสึอยากตั้งปาร์ตี้กับโทคิค่ะ และก็อยากทำเควสนี้ให้ผ่านกับโทคิด้วยค่ะ"
10023055-234 = "คะ? ระ... เรื่องนั้น..."
10023055-235 = "ไม่ได้เหรอคะ...?"
10023055-236 = "ไม่ค่ะ ไม่หรอกค่ะ... จะว่าไป ครั้งที่แล้วฉันก็ปฏิเสธไป... ค่ะ"
10023055-237 = "ว้าว! ถ้างั้นจากนี้ไป อาริสึคือสหายของโทคิค่ะ! ชมรมพัฒนาเกมก็ด้วยค่ะ!"
10023055-238 = "ขอบคุณนะคะที่ช่วยพูดแบบนั้น"
10023055-239 = "ปาปัม ปาปัม ป๊าม! มีสมาชิกปาร์ตี้เพิ่มแล้วค่ะ!"
10023055-244 = "ว้าย?!!"
10023055-245 = "จะ... จู่ๆ ก็ดึงฉันไปกอดเลยเหรอคะ...?"
10023055-249 = "... (มอง)"
10023055-250 = "(ตัวสูงพอจะลูบหัวได้เลยแฮะ รู้สึก... เบาใจยังไงไม่รู้)"
10023055-255 = "... จะไม่เป็นไรเหรอพี่โมโมอิ?"
10023055-256 = "ก็นะ... ไม่มีใครกล้าว่าอาริสึหรอก"
10023055-258 = "ดีจังเลยนะ อาริสึจัง คุณโทคิก็ด้วย..."
10023055-260 = "(จากนั้นโทคิกับชมรมพัฒนาเกมก็ได้เป็นสหายในการทำภารกิจด้วยกัน)"
10023055-261 = "(ดูเหมือนจะแฮปปี้เอนดิ้ง...)"
10023055-263 = "(แต่ว่า!)"

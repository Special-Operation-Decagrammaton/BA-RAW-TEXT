[translation]
10023055-2 = "I'm impressed, stranger."
10023055-3 = "Thank you, Lady Thief. I hope the addition of the honorific curtails your anger."
10023055-4 = "Heehee... You think you have me in your grasp, do you?"
10023055-18 = "?! A trap?"
10023055-26 = "Rabbits should pay attention to their surroundings, or they'll be caught by a predator."
10023055-30 = "?!"
10023055-31 = "Did you think you'd gotten rid of us?!"
10023055-32 = "We're a lot stronger than we look! Although we are a little late..."
10023055-34 = "Oh, my. The adorable maids are your reinforcements?"
10023055-36 = "Adorable? I mean... Heeheehee!"
10023055-37 = "Momoi! Don't let the enemy sweet talk you!"
10023055-38 = "You're not leaving this estate with anything!"
10023055-39 = "Your courage is impressive, I will say. But how far can you go on simply courage?"
10023055-45 = "You lost your chance the moment you lost the element of surprise."
10023055-46 = "While your courage shines beautifully, your movements leave much to be desired. Directionless. Reactive."
10023055-48 = "That might be true about us..."
10023055-50 = "But it's a good thing we're not your opponent!"
10023055-51 = "...?"
10023055-55 = "Blinding Light!"
10023055-60 = "Ugh!"
10023055-61 = "Way to go, Aris!"
10023055-62 = "Oops... Uh... We didn't blow the mansion up, did we?"
10023055-63 = "Nope! I am a light-attribute, single-target DPS! My Blinding Light super-focuses on just the target!"
10023055-65 = "...!"
10023055-66 = "So, they can still move. In that case..."
10023055-75 = "I can't miss from here...!"
10023055-76 = "Huh?!"
10023055-82 = "Now! Grab her!"
10023055-83 = "Go, Momoi!"
10023055-91 = "What?!"
10023055-92 = "EEK!"
10023055-93 = "Wh-What happened?"
10023055-94 = "Look up! She went through the ceiling!"
10023055-96 = "Allow me to amend my initial judgment."
10023055-97 = "All of you are very impressive. I apologize for the late introductions, but who are you?"
10023055-99 = "I am call sign Zero-Four of C&C. Asuma Toki."
10023055-104 = "It couldn't be... C&C? In the flesh? "
10023055-105 = "What reason could you have to be helping Meitaro?"
10023055-107 = "W-Well... We got a request...and the compensation was so big...wanted...FlyStations..."
10023055-108 = "...Excuse me?"
10023055-109 = "Momoi! You were thinking about FlyStations this entire time?"
10023055-110 = "Don't listen to her! We just..."
10023055-111 = "We just wanted to stop the thief!"
10023055-115 = "..."
10023055-116 = "[ns] \"And you? Why are you stealing art?\""
10023055-117 = "And who might this be?"
10023055-118 = "Ah, you needn't say. Your face isn't unfamiliar to me..."
10023055-119 = "You are Schale's Sensei, are you not?"
10023055-120 = "Your arrival at Kivotos happened to coincide with the escape of the Seven Prisoners from the Corrections Bureau."
10023055-121 = "Yes... I see."
10023055-122 = "Don't think you'll get away with this, Benevolent Thief! There's no escape for you this time!"
10023055-129 = "W-W-Wait! Don't shoot! We're right here!"
10023055-130 = "Ack?!"
10023055-134 = "Midori?!"
10023055-137 = "(Huh...?)"
10023055-138 = "(Am I... falling...?)"
10023055-140 = "Heehee!"
10023055-146 = "Wow! The Benevolent Thief saved Midori!"
10023055-147 = "Midori! Midori! Are you okay?!"
10023055-148 = "Y-Yeah, thanks. But why would she save me? "
10023055-149 = "(What reason could she have...)"
10023055-153 = "I've a grasp on the situation now. How absolutely thrilling!"
10023055-154 = "Allow me to leave you with some parting words. Oftentimes, you must look past the superficial to delve into the beauty within."
10023055-155 = "I look forward to our next meeting, C&C."
10023055-159 = "How'd she get away so fast?!"
10023055-160 = "Is that a note on the ground?"
10023055-161 = "It's a calling card...saying that the previous card will still be fulfilled."
10023055-162 = "Big words for someone who just ran away!"
10023055-163 = "That's all it says. Also... When did she write this? Does she just run around with stacks of these cards all the time?!"
10023055-167 = "I've found you at last. What in the world were you all doing?"
10023055-168 = "Huh?! Well, uh..."
10023055-169 = "[s] \"All of this was actually part of a secret, feint operation.\""
10023055-170 = "Sensei!"
10023055-171 = "Hm... I believe I'm owed a bit more detail than that."
10023055-173 = "I see... So, your fifth member joined at a later time, just as you had planned in advance."
10023055-174 = "You say it was nearly a success as well?"
10023055-175 = "[s] \"I apologize. She got away at the last minute.\""
10023055-176 = "There's no need to apologize. I'm impressed you were able to force the Benevolent Thief into a retreat."
10023055-177 = "If we're lucky, perhaps you scared her off for good, and we can put this all behind us."
10023055-178 = "I wouldn't be so sure about that..."
10023055-180 = "Meitaro, what is the meaning of this?"
10023055-181 = "Explain yourself! If I had known the Benevolent Thief, of all criminals, planned to attack, I would have never attended."
10023055-182 = "Now, now. Please calm yourselves. Everything has already been sorted out."
10023055-183 = "Look around you. We were able to repel the scoundrel with no problems, were we not?"
10023055-184 = "I felt no need to concern you, seeing as our backs were being safely guarded by the best of the best, C&C!"
10023055-186 = "C&C? That famous, secret organization with top-ranking agents?"
10023055-187 = "I suppose that explains how they dealt with the thief so quickly..."
10023055-189 = "Thank you again for your hard work."
10023055-190 = "I'll need to excuse myself to help guide the guests to their rooms. I think there's been quite enough excitement for one night."
10023055-194 = "Please feel free to take this time to formulate a security plan for the next few days. Good night."
10023055-197 = "(She hasn't stopped glaring at us this whole time...!)"
10023055-198 = "..."
10023055-199 = "(S-Sensei... Do you think Toki's mad at us...?)"
10023055-200 = "[ns] \"Hey there, Toki, let's take a deep breath together...\""
10023055-201 = "Forget it! You can give me menacing looks all you want! I-I'm not scared!"
10023055-202 = "B-But also, thank you! You really helped us out, so I just thought I'd say thanks!"
10023055-207 = "...I understand now."
10023055-208 = "Thank you, Game Development Department."
10023055-209 = "Huh? What?"
10023055-210 = "What the...?"
10023055-214 = "I received your help, so I am thanking you. Just as you did."
10023055-215 = "But if you just wanted to thank us, why were you giving us the stink eye?!"
10023055-216 = "Well... I didn't know what I was supposed to say in a situation like this one."
10023055-217 = "You weren't glaring at us? You were just trying to figure out how to thank us?"
10023055-218 = "Yes. I must thank you again, Momoi. You put it into words for me."
10023055-219 = "With that handled, we should address the current situation. It's become more complicated than originally thought."
10023055-221 = "I get it now. So you received a mission to stop the Benevolent Thief too."
10023055-222 = "Yes. Although that was not the only mission I received."
10023055-223 = "A-Are you gonna tell Neru we messed up your mission?"
10023055-224 = "No. In fact, I have considered your efforts to be helpful so far."
10023055-225 = "Moving forward, we will be conducting a joint operation between C&C and the Game Development Department. "
10023055-226 = "Is that really okay?"
10023055-227 = "Yes. The other members aren't here to dispute it, anyways."
10023055-228 = "Why does this feel like a recurring theme?!"
10023055-230 = "Because it is."
10023055-231 = "Does this mean we are friends, Toki?"
10023055-232 = "...?"
10023055-233 = "Please join my party! I would like for us to complete this quest together, as party members!"
10023055-234 = "What? I don't..."
10023055-235 = "Oh... Is that not allowed?"
10023055-236 = "No... Well, yes. I did say next time, so... Yes. I'll join your party. "
10023055-237 = "Yay! Now we are friends, Toki. And the Game Development Department too!"
10023055-238 = "Thank you for saying so."
10023055-239 = "Bum bum bum! A new player has joined the party!"
10023055-244 = "*gasp*"
10023055-245 = "P-Please don't hug me! And without warning...!"
10023055-249 = "(pat) (pat)"
10023055-250 = "(Her head is the perfect height to pat. It's strangely...nice.)"
10023055-255 = "You really think this is gonna be okay, Momoi?"
10023055-256 = "Well... We're talking about Aris, you know..."
10023055-258 = "I'm happy Aris got through to her. For both Aris and Toki's sakes."
10023055-260 = "Toki became an honorary party member and official friend of the Game Development Department."
10023055-261 = "And all was good and well for these newly-met friends."
10023055-263 = "...Or maybe not."

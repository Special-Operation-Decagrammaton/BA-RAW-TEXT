[translation]
1601102-1 = "เติบโตอย่างไม่หยุดยั้ง"
1601102-7 = "(คุณครูมาที่ห้องเรียนที่ว่างอยู่ตามที่ฮาสุมิส่งตำแหน่งที่อยู่มา)"
1601102-8 = "(อาจจะเพราะค่อนข้างดึกแล้ว เลยไม่มีนักเรียนอยู่เลย)"
1601102-12 = "อ๊ะ มาแล้วเหรอคะคุณครู ทางนี้ค่ะ"
1601102-13 = "สักครู่นะคะ ขอฉันใส่... ชุดพละตัวนี้... ก่อน..."
1601102-18 = "[ns1] \"ฮาสุมิ...?\"\n[ns2] \"หืม? เมื่อกี้เสียงอะไรน่ะ...?\""
1601102-21 = "ดะ...เดี๋ยวก็เสร็จแล้วค่ะ ตะ...ตอนนี้เกือบได้แล้ว...!"
1601102-31 = "[ns3] \"ฮะ...ฮาสุมิ...!?\"\n[ns4] \"อะ...อะไรน่ะ...!?\""
1601102-35 = "ฉันไม่ได้ใส่เสื้อตัวนี้มานานแล้ว... ไม่ว่าจะดึงยังไงมันก็...!"
1601102-41 = "― อะ...อื้อ ฮึบ... อื้อ... ฮึก...![wa:6060] "
1601102-44 = "― ว่าแล้วเชียว...[wa:1570] "
1601102-46 = "― ยังไงก็ไม่ไหวสินะคะ[wa:10] "
1601102-49 = "― คุณครู... ขอโทษด้วยนะคะ...[wa:680] "
1601102-52 = "― อย่างที่เห็น..."
1601102-54 = "― สถานการณ์กลายเป็นแบบนี้ไปแล้ว...[wa:10] "
1601102-57 = "― ทั้งๆ ที่... คุณครูงานยุ่งมากแท้ๆ[wa:1300] "
1601102-60 = "― ดูเหมือนฉันจะทำให้คุณครูลำบากโดยเปล่าประโยชน์ซะแล้ว[wa:10] "
1601102-62 = "― ขอโทษด้วยนะคะ"
1601102-65 = "― เมื่อปีที่แล้วยังใส่ได้พอดีอยู่เลยแท้ๆ...[wa:780] "
1601102-67 = "― ไม่รู้ทำไม... แค่ 1 ปีถึงได้เป็นแบบนี้...[wa:790] "
1601102-70 = "[ns5] \"เมื่อปีที่แล้วงั้นเหรอ...?\"\n[ns6] \"ในช่วง 1 ปีนี่เกิดอะไรขึ้นเนี่ย...\""
1601102-71 = "― ชะ... ใช่ค่ะ มันไม่น่าจะต่างกันเยอะขนาดนี้...[wa:1810] "
1601102-72 = "― มะ... ไม่นะคะ แต่มันก็ไม่น่าจะต่างกันเยอะขนาดนี้...[wa:1570] "
1601102-75 = "― คือว่า... น้ำหนัก...[wa:1220] "
1601102-77 = "― ก็ไม่น่าจะเปลี่ยนไป...เยอะขนาดนั้น[wa:1740] "
1601102-80 = "― คะ... คิดว่านะคะ[wa:1100] "
1601102-84 = "แปลกจังเลยนะคะ... ผ่านไปหนึ่งปี เราก็เติบโตขึ้น ตะ...แต่ก็ไม่น่าจะขนาดนี้..."
1601102-85 = "หรือว่าในช่วง 1 ปีนี้ ชุดมันหดลงคะ? อืม..."
1601102-89 = "[ns7] \"คือ... ครูคิดว่าอาจไม่ใช่แบบนั้นหรอก\"\n[ns8] \"เติบโต... คำว่าเติบโตนี่มัน...\""
1601102-92 = "มะ... ไม่รู้ทำไม รู้สึกเหมือนฉันกำลังแก้ตัวอยู่เลย..."
1601102-93 = "ยังไงก็เถอะ มันไม่ใช่เรื่องสำคัญอะไร... เรามาเริ่มตรวจสอบเอกสารกันดีกว่าค่ะ"
1601102-94 = "ขอโทษด้วยนะคะ... ที่ให้คุณครูได้เห็นมุมที่ไม่เรียบร้อยแบบนี้..."
1601102-95 = "[s9] \"แบบนั้นโอเคแล้วสินะ แต่ถ้าฮาสุมิโอเค ครูก็โอเค\"\n[s10] \"อ่า... ครูไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\""
1601102-98 = "ฮุฮุฮุ..."
1601102-105 = "นี่ค่ะ อันนี้คือเอกสารรายละเอียดงานของคณะกรรมการจัดงานค่ะ"
1601102-109 = "คุณครู...?"
1601102-113 = "[ns11] \"อะ...อื้อ ครู... ดูอยู่...\"\n[ns12] (หาจุดโฟกัสไม่ได้...)"
1601102-116 = "...ขอโทษค่ะ คงเพราะชุดนี้สินะคะ..."
1601102-117 = "รองหัวหน้าชมรมทวงความยุติธรรมที่ต้องปฏิบัติตัวให้เป็นตัวอย่างแท้ๆ แต่กลับใส่เสื้อให้เหมาะสมก็ยัง#nทำไม่ได้... ฉันละอายใจมากเลยค่ะ"
1601102-118 = "ฉันควรหาเสื้อตัวใหม่มาดีมั้ยคะ? ถึงการคิดว่าจะหาเสื้อใหม่ตอนนี้จะสายไปสักหน่อยแล้วก็เถอะค่ะ..."
1601102-119 = "[s13] \"มันก็กระชั้นชิดจริงๆ นั่นแหละ\"\n[s14] \"ถ้ามันไม่ได้ทำให้ขยับตัวไม่สะดวก ก็ไม่ต้องหรอกมั้ง?\""
1601102-122 = "อืม... อย่างนั้นเหรอคะ"
1601102-123 = "อา... ฉันพูดออกนอกเรื่องอีกแล้วสินะคะ"
1601102-124 = "มาตรวจสอบเอกสารกันต่อเถอะค่ะ"
1601102-128 = "ต่อจากตรงนี้ได้เลยค่ะ..."
1601102-132 = "[ns] (...ตั้งสมาธิไม่ได้...)"
1601102-134 = "(หลังจากนั้นคุณครูก็นั่งตรวจสอบเอกสารรายละเอียดงานฮาโลเฟสติวัลของทางคณะกรรมการจัดงาน#nกับฮาสุมิต่อ หลังจากเสร็จงานแล้ว คุณครูก็มาส่งฮาสุมิที่ห้อง)"
1601102-135 = "(จนกระทั่งตอนที่แยกกัน ซิปของชุดพละของฮาสุมิก็ยังคงมีสภาพเดิม...)"

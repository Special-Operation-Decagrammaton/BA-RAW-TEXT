[translation]
1601102-1 = "持續成長的身體"
1601102-7 = "（蓮實所說的地點是三一的某間空教室）"
1601102-8 = "（因為已經很晚了，所以教室裡空空如也）"
1601102-12 = "啊，恭候多時了，老師。我在這裡。"
1601102-13 = "請稍等一下。#n我先穿上這件……運動服……"
1601102-18 = "[ns1]「……蓮實？」\n[ns2]「那是什麼聲音……？」"
1601102-21 = "就……就快好了。#n就差一點點了……！"
1601102-31 = "[ns3]「蓮，蓮實……！？」\n[ns4]「怎，怎麼了……！？」"
1601102-35 = "雖然很久沒穿這件衣服了……不過應該可以才對……！"
1601102-41 = "― 唔嗯……嗚……咕……呼……！[wa:6780] "
1601102-44 = "― 雖然已經預料到了……[wa:1770] "
1601102-46 = "― 看來還是有點困難呢。[wa:370] "
1601102-49 = "― 老師，不好意思……[wa:1360] "
1601102-52 = "― 如您所見，"
1601102-54 = "― 變成這種狀況了……[wa:800] "
1601102-57 = "― 儘管不是這樣，您也很忙碌的……[wa:2020] "
1601102-60 = "― 還給您添了更多麻煩，[wa:1110] "
1601102-62 = "― 真的非常抱歉。"
1601102-65 = "― 到去年為止明明還很常穿這件衣服的……[wa:1700] "
1601102-67 = "― 怎麼才過了一年就變成這樣……[wa:1870] "
1601102-70 = "[ns5]「去年為止都還沒問題嗎？」\n[ns6]「這一年究竟發生了什麼……」"
1601102-71 = "― 不，不，其實也沒差那麼多……[wa:3050] "
1601102-72 = "― 不，不，其實也沒差那麼多……[wa:3050] "
1601102-75 = "― 那個……其實，[wa:1740] "
1601102-77 = "― 體重應該沒什麼改變……才對。[wa:2540] "
1601102-80 = "― 大，大概……[wa:1500] "
1601102-84 = "真奇怪……雖然是有所成長，沒想到竟然會變成這樣……"
1601102-85 = "是衣服被洗到縮水了嗎……唔嗯……"
1601102-89 = "[ns7]「我想應該……不是那樣，吧。」\n[ns8]「成長……究竟是……」"
1601102-92 = "不，不知為何，好像變成在找藉口了……"
1601102-93 = "總之，開始我拜託您的作業吧。"
1601102-94 = "那個……得用這副模樣進行作業……非常抱歉。"
1601102-95 = "[s9]「蓮實沒關係的話……」\n[s10]「那個……我，我沒關係的。別在意。」"
1601102-98 = "呵呵……"
1601102-105 = "──那麼，資料就是這些。"
1601102-109 = "……老師？"
1601102-113 = "[ns11]「嗯，嗯……我有在看……」\n[ns12]（眼睛不知道該看哪裡……）"
1601102-116 = "……對不起。#n這副模樣果然會讓人很在意吧……"
1601102-117 = "應該成為模範的實現正義部副部長，居然會連衣服都穿不好……真是沒臉見人。"
1601102-118 = "果然應該買件新的嗎……雖然現在重買或許也太遲了……"
1601102-119 = "[s13]「現在下訂的話趕得上運動會嗎……？」\n[s14]「趕不上的話好像也沒必要重買一件……？」"
1601102-122 = "唔嗯，果然是這樣嗎……"
1601102-123 = "……啊，話題又扯遠了，真是不好意思。"
1601102-124 = "專心進行作業吧。"
1601102-128 = "關於這點……"
1601102-132 = "[ns]（……無法專心……）"
1601102-134 = "（之後，和蓮實一起討論著大運動會相關的資料……#n　並在工作結束後將蓮實送回了宿舍）"
1601102-135 = "（直到分別的瞬間，外套的拉鍊仍然保持原樣）"

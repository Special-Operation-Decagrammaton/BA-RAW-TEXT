[translation]
1007905-1 = "เข้าใจกันดี"
1007905-2 = "(คุณครูรีบออกไปหามิซากะที่ร้านเกมทันที)"
1007905-3 = "(มิซากะยืนดูตุ๊กตาอยู่หน้าชั้นวางที่มีตุ๊กตาสมนาคุณจากร้านเกมวางอยู่เรียงราย)"
1007905-10 = "นะ... นี่มัน... อะไรกัน..."
1007905-11 = "[s1] \"...มิซากะ?\"\n[s2] \"กำลังดูอะไรอยู่น่ะ?\""
1007905-14 = "นี่มัน... อะไรกัน..."
1007905-15 = "...ตัวละครอะไรเนี่ย...? หรือว่าเป็นของไม่ผ่าน QC?"
1007905-16 = "ทำไมถึงทอดทิ้ง... ไม่สิ ทำไมถึงถูกเอามาตั้งโชว์ไว้แบบนี้..."
1007905-21 = "[ns3] \"อ่า...\"\n[ns4] \"อืม ตอนเห็นครั้งแรกก็ทำหน้ากันแบบนี้ทั้งนั้นแหละ\""
1007905-24 = "หะ... หืม?"
1007905-25 = "ปะ... ปกติหน้าตามันเป็นแบบนี้อยู่แล้วงั้นเหรอ? นี่คือตุ๊กตาทำสำเร็จแล้ว? ถามจริง?"
1007905-26 = "ทำไมดีไซน์มัน... น่าตกใจ... ในหลายๆ ด้านเลย..."
1007905-27 = "... หืม? มีแบบอื่นด้วยงั้นเหรอ? ตะ... ตัวนี้เนี่ยนะ...?"
1007905-28 = "ไหนดูซิ..."
1007905-35 = "วะ... ว้าว... มีจริงด้วย... ฮะฮะ... ฮะฮะฮ่า..."
1007905-36 = "...หืม? ว่าไงนะ?"
1007905-37 = "ไม่ได้มีแค่ที่นี่ด้วยเหรอ? มีขายทั่วไปในย่านการค้าเลยเหรอ...?"
1007905-38 = "นี่เป็นตัวละครที่เป็นที่รู้จักกันอย่างแพร่หลายที่นี่...!! นี่น่ะเหรอ!! ล้อกันเล่นรึเปล่า!?"
1007905-39 = "ยะ... อย่างนั้นเองเหรอ... อืม..."
1007905-40 = "...คุณครู"
1007905-41 = "ที่นี่คงจะเป็นอีกโลกหนึ่งจริงๆ สินะ นี่เป็นครั้งแรกเลยที่ฉันรู้สึกจริงๆ ว่านี่คือโลกอื่น"
1007905-42 = "[s5] \"ทำหน้าตกใจที่สุดตั้งแต่มาที่นี่เลยแฮะ\"\n[s6] \"ตะ... ต้องตกใจแรงเบอร์นั้นเลยเหรอ...\""
1007905-45 = "อะไรกันเล่า... ไม่สิ ช่างเถอะ ไม่ว่าจะโลกไหนก็มีสุนทรียศาสตร์ต่างกันอยู่แล้ว..."
1007905-46 = "และที่นี่ก็คงมีมุมมองของตัวเองเหมือนกัน จะให้คนนอกอย่างฉันมาตัดสินก็คงไม่เข้าท่า..."
1007905-47 = "หืม? ไม่ใช่อย่างนั้นหรอกเหรอ?"
1007905-48 = "...อ่า นี่เป็นตัวละครที่มีทั้งคนชอบและไม่ชอบเหรอ?"
1007905-49 = "งั้นเหรอ..."
1007905-50 = "[s7] \"บางทีก็ถูกมองว่าออกจะเพี้ยนๆ ด้วย\"\n[s8] \"ตัวนี้มีคนที่ไม่ชอบเยอะ เลยถูกล้อเยอะเลย\""
1007905-53 = "งะ... งั้นเหรอ เพี้ยนๆ ... แถมยังถูกล้ออีก..."
1007905-54 = "อืม..."
1007905-58 = "[ns9] \"มิซากะ...?\"\n[ns10] \"ทำไมเหมือนเปลี่ยนใจแล้วละ?\""
1007905-61 = "มะ... ไม่ใช่นะ ก็แค่..."
1007905-62 = "อืม... รู้สึกเดจาวูขึ้นมาน่ะ..."
1007905-63 = "อ่า..."
1007905-64 = "...เกโคตะ"
1007905-65 = "[s11] \"เกโคตะ?\"\n[s12] \"ชื่อนี้ไม่เคยได้ยินเลยแฮะ\""
1007905-68 = "อย่างนั้นสินะ..."
1007905-69 = "เป็นแบบนี้นี่เอง"
1007905-70 = "คุณครู เมื่อกี้บางที... ฉันอาจจะเกือบจะทำผิดพลาดครั้งใหญ่ไปแล้ว"
1007905-71 = "ตัวละครพวกนี้น่ะ... ต่อให้ตอนนี้ฉันจะไม่ได้มองว่ามันน่ารัก แต่มันอาจเป็นตุ๊กตาที่น่ารักและคุณค่า#nสำหรับคนอื่นก็ได้"
1007905-72 = "มาคิดๆ ดูแล้ว ฉันเองก็เคยต้องอดทนกับสายตาที่มองมาด้วยความไม่เข้าใจในเมืองแห่งการศึกษา#nเหมือนกัน..."
1007905-73 = "บางทีเจ้าตัวนี้... น้องชื่ออะไรนะ?"
1007905-74 = "เพโรโร่? MOMO FRIENDS?"
1007905-75 = "บางทีเจ้าเพโรโร่จาก MOMO FRIENDS นี่ก็... อาจจะเป็นเหมือนเกโคตะของโลกนี้ก็ได้"
1007905-76 = "...อืม"
1007905-77 = "...พอคิดแบบนี้แล้ว น้องก็ดูน่ารักอยู่นะเนี่ย"
1007905-78 = "[s13] \"เปลี่ยนใจง่ายแบบนี้เลย!?\"\n[s14] \"ตกลงว่าน่ารักหรือว่าแค่เห็นใจกันแน่!?\""
1007905-81 = "จะอะไรก็ช่างเถอะ! ถ้ามันดีก็ว่าดีเถอะน่า!"
1007905-82 = "ฉันตัดสินใจแล้ว ไหนๆ ก็มาถึงที่นี่แล้วด้วย นี่อาจจะเป็นโชคชะตาก็ได้"
1007905-83 = "คงต้องแสดงน้ำใจด้วยการซื้อไว้สักตัว เพื่อเป็นการแสดงความนับถือในแบบฉบับของฉันแล้วละ"
1007905-84 = "นอกจากอันที่เป็นของแถมแล้ว... ยังมีอันที่วางขายอยู่ข้างๆ ต่างหากด้วยแฮะ"
1007905-88 = "อืม... ใช่ เอาตัวนี้ละ คุณครู! ต้องไปจ่ายเงินที่ไหนเหรอ?"
1007905-89 = "...จะซื้อให้งั้นเหรอ? ซะ... ซื้อของให้แบบนี้ก็ได้ด้วย...?"
1007905-90 = "หืม? ...ไม่เป็นไรเหรอ?"
1007905-91 = "...ฉันโอเคกับตัวนี้จริงๆ หรือเปล่างั้นเหรอ?"
1007905-95 = "อะ... อืม... นั่นสิ..."
1007905-96 = "ถะ... ถ้าพกติดตัวไว้ก็คงจะชอบมันขึ้นมาเองแหละน่า ฉันจะพยายามเป็นเพื่อนกับเจ้านี่ให้ได้เลย!"
1007905-97 = "[s15] \"ต้องถึงกับ 'พยายาม' เลยเหรอ...\"\n[s16] \"ต้องเป็นคู่หูที่เหนียวแน่นแน่เลย\""
1007905-100 = "ดีละ..."
1007905-101 = "จะ... จากนี้ไปก็มาอยู่ด้วยกันนะ เพโรโร่!!"
1007905-104 = "― [log=미사카]อืมมมม~~~[/log][wa:500] "
1007905-107 = "― [log=미사카]พอดูไปนานๆ เข้า[/log][wa:60] "
1007905-109 = "― [log=미사카]น้องก็น่ารักอยู่เหมือนกันนะเนี่ย...[/log][wa:2020] "
1007905-112 = "― [log=미사카]ตกลงว่าน้องเป็นหมูเหรอ...?[/log][wa:990] "
1007905-114 = "― [log=미사카]หรือว่าฮิปโป?[/log]"
1007905-117 = "― [log=미사카]...ว่าไงนะ!? นกเหรอ!? ล้อกันเล่นรึเปล่า!?[/log][wa:50] "
1007905-120 = "[ns17] \"ดูให้ดีๆ สิ เหมือนนกจะตายไป...\"\n[ns18] \"มีทั้งจะงอยปาก ทั้งปีกเลยด้วย\""
1007905-124 = "― [log=미사카]มะ... มันก็จริงอยู่หรอก...[/log][wa:540] "
1007905-126 = "― [log=미사카]ฮะฮะฮ่า... เอาเถอะ จะยังไงก็ได้แหละ[/log][wa:1550] "
1007905-129 = "― [log=미사카]จะว่ายังไงดีนะ พอมาคิดดูดีๆ แล้ว... [/log][wa:1040] "
1007905-131 = "― [log=미사카]นี่เป็นของขวัญที่คุณครูให้มานี่นา[/log][wa:1020] "
1007905-134 = "― [log=미사카]...ฉันจะรักษาอย่างดีเลย[/log][wa:940] "
1007905-136 = "― [log=미사카]ขอบคุณนะ คุณครู[/log][wa:200] "
1007905-139 = "(จากนั้นคุณครูก็นำตุ๊กตาที่มิซากะเลือกไปจ่ายเงิน)"
1007905-140 = "(หลังจากออกมาจากร้านเกม มิซากะก็ยังมองดูของอื่นๆ ด้วยสีหน้าประหลาดใจ)"

[translation]
1007905-1 = "From the Same Cloth"
1007905-2 = "Misaka asked me to meet her at a large arcade near where she was staying."
1007905-3 = "When I arrived, she was standing in front of the prize shelf, where a line of dolls were on display."
1007905-10 = "Wh-What is... What is this...?"
1007905-11 = "[s1] \"Misaka?\"\n[s2] \"What are you looking at?\""
1007905-14 = "Just what...is..."
1007905-15 = "What kind of character is this? Does it look like that on...purpose...?"
1007905-16 = "For it to make it out to the arcade... No, for them to even display it proudly..."
1007905-21 = "[ns3] \"Ah.\"\n[ns4] \"I think that's a pretty normal reaction to this character.\""
1007905-24 = "Wh-What?"
1007905-25 = "I-It's really supposed to be like this? This is the finished product? Really?"
1007905-26 = "It's a bit... I guess you could call it an amazing design. In many ways..."
1007905-27 = "...Hm? There are more like this? R-Really...?"
1007905-28 = "Let's see..."
1007905-35 = "W-Wow... It's true... Ha... Haha..."
1007905-36 = "...Huh? What was that?"
1007905-37 = "This isn't the only place that has these? There's even more in the shopping district...?"
1007905-38 = "Is this character really that famous...? This thing?! You're kidding!"
1007905-39 = "I-I see... Hm..."
1007905-40 = "...Sensei."
1007905-41 = "This truly is a whole different world. For the first time, it's really sinking in."
1007905-42 = "[s5] \"This is the most surprised you've looked since getting here.\"\n[s6] \"I-It's that shocking...?\""
1007905-45 = "W-Well... It's fine. I guess every world would have its own aesthetic..."
1007905-46 = "This world has its own rules. Who am I to be so judgmental...?"
1007905-47 = "Huh? It's not like that?"
1007905-48 = "So... This character is pretty controversial here, is it?"
1007905-49 = "I see..."
1007905-50 = "[s7] \"It's not a common taste.\"\n[s8] \"There are some people who will tease you just for liking it.\""
1007905-53 = "I see... An odd taste... And you'd get teased..."
1007905-54 = "Hm..."
1007905-58 = "[ns9] \"Um, Misaka?\"\n[ns10] \"I feel like your mood changed...\""
1007905-61 = "It's just..."
1007905-62 = "I'm feeling a kind of déjà vu..."
1007905-63 = "Oh."
1007905-64 = "Gekota..."
1007905-65 = "[s11] \"Gekota?\"\n[s12] \"Who's that?\""
1007905-68 = "Of course..."
1007905-69 = "Right. That's how it is."
1007905-70 = "Sensei, I almost made a terrible mistake."
1007905-71 = "This character... Even if I don't understand him yet, he's precious to someone."
1007905-72 = "There are times when I've had to endure the disapproving gaze of my fellow students in Academy City..."
1007905-73 = "Maybe... What did you say his name is?"
1007905-74 = "...Peroro? From the Momo Friends?"
1007905-75 = "This guy, Peroro from the Momo Friends... Maybe he's the Gekota of this world."
1007905-76 = "Hmm."
1007905-77 = "If I think about it like that, I guess he's a little cute..."
1007905-78 = "[s13] \"What a sudden change!\"\n[s14] \"Do you feel sorry for him...?!\""
1007905-81 = "Wh-Who cares! Cute is cute!"
1007905-82 = "I've made up my mind. Besides, I've crossed worlds to get here, so maybe it's fate."
1007905-83 = "I should pay my respects by buying one for myself."
1007905-84 = "These are prizes... Ah, but these ones here are for sale."
1007905-88 = "Umm... Okay. I choose this one. Sensei! Where do I pay?"
1007905-89 = "...You'll buy it for me? Are you sure you're okay with that...?"
1007905-90 = "You are..."
1007905-91 = "...But am I okay with that?"
1007905-95 = "Well... I don't know..."
1007905-96 = "If I carry him around for a bit, maybe I'll start to really like it... I'll try my best so we can become friends!"
1007905-97 = "[s15] \"You'll try your best, huh?\"\n[s16] \"This feels like the beginning of a great friendship.\""
1007905-100 = "Okay..."
1007905-101 = "L-Let's be friends, Peroro!"
1007905-104 = "― [log=미사카]Mmmm...[/log][wa:580] "
1007905-107 = "― [log=미사카]When I look at it closely,[/log][wa:10] "
1007905-109 = "― [log=미사카]I guess it does look a bit cute...[/log][wa:2060] "
1007905-112 = "― [log=미사카]So, this is a pig...?[/log][wa:1190] "
1007905-114 = "― [log=미사카]Or maybe a hippo?[/log]"
1007905-117 = "― [log=미사카]...What?! A bird?! You're kidding![/log][wa:330] "
1007905-120 = "[ns17] \"If you look closely, it is roughly bird-shaped...\"\n[ns18] \"It does have a beak and wings.\""
1007905-124 = "― [log=미사카]I-I suppose, but...[/log][wa:820] "
1007905-126 = "― [log=미사카]Haha... Well, I guess it's all right. [/log][wa:1430] "
1007905-129 = "― [log=미사카]You know, if I think about it... [/log][wa:1160] "
1007905-131 = "― [log=미사카]This is a gift from Sensei.[/log][wa:1260] "
1007905-134 = "― [log=미사카]...I'll be sure to treasure it.[/log][wa:620] "
1007905-136 = "― [log=미사카]Thank you, Sensei.[/log][wa:80] "
1007905-139 = "Afterwards, I paid for the plush that Misaka had picked out."
1007905-140 = "As we left the game center, she continued to look at it with a curious expression."

[translation]
1007905-1 = "以心傳心"
1007905-2 = "（為了與似乎有些著急的御坂見面，前往了附近的大型遊戲中心）"
1007905-3 = "（御坂在羅列著贈品娃娃的遊戲中心架子前盯著娃娃）"
1007905-10 = "這……這到底是……"
1007905-11 = "[s1]「……御坂？」\n[s2]「你在盯著什麼？」"
1007905-14 = "這到底……是什麼……？"
1007905-15 = "是什麼樣的角色……？難道是瑕疵品？"
1007905-16 = "居然把這種東西丟……不對，展示在這裡……"
1007905-21 = "[ns3]「……啊。」\n[ns4]「嗯，第一次看到的時候通常都會是這種反應。」"
1007905-24 = "呃，嗯？"
1007905-25 = "本，本來就長這樣？這是完成品？真的嗎？"
1007905-26 = "這設計……還真厲害呢，各種意義上來說……"
1007905-27 = "……嗯？這東西……還有其他種類？"
1007905-28 = "我看看……"
1007905-35 = "哇，哇啊……真的耶……哈，哈哈……"
1007905-36 = "……嗯？什麼？"
1007905-37 = "不只這裡有，去商店街可以看到更多……？"
1007905-38 = "它在這裡是頗有知名度的角色……！？你說這個角色！？真的嗎！？"
1007905-39 = "這，這樣啊……唔……"
1007905-40 = "……老師。"
1007905-41 = "我第一次真切地感受到……這裡果然是異世界啊。"
1007905-42 = "[s5]「你這麼驚訝的表情，我也是第一次看到。」\n[s6]「有，有這麼誇張嗎……」"
1007905-45 = "唔嗯……不，這也不奇怪。#n畢竟每個世界都有各自獨特的美學……"
1007905-46 = "這裡也有這裡的標準對吧。#n由我來評論這裡的事物也有點奇怪……"
1007905-47 = "嗯？沒這回事？"
1007905-48 = "……啊，原來它在這裡也是喜惡參半的角色？"
1007905-49 = "原來如此……"
1007905-50 = "[s7]「有人會把喜歡它的人當成怪人。」\n[s8]「因為討厭它的人也不少，所以會因此承受異樣的眼光。」"
1007905-53 = "這，這樣啊……被當成怪人……承受異樣的眼光……"
1007905-54 = "嗯…………"
1007905-58 = "[ns9]「……御坂？」\n[ns10]「氛圍好像變了？」"
1007905-61 = "……沒，沒有啦。只是……"
1007905-62 = "嗯……覺得有點似曾相識……"
1007905-63 = "……啊。"
1007905-64 = "……呱太。"
1007905-65 = "[s11]「呱太？」\n[s12]「出現了另一個名字。」"
1007905-68 = "這樣啊……"
1007905-69 = "果然沒錯。"
1007905-70 = "老師，我剛才差點犯下了天大的錯誤。"
1007905-71 = "這些角色……雖然我現在還無法理解，#n但對某些人來說，一定是非常重視又可愛的設計吧。"
1007905-72 = "回頭想想，我也曾經在學園都市忍受過不被理解的眼光……"
1007905-73 = "也許這傢伙……它叫什麼名字來著？"
1007905-74 = "……佩洛洛？是Momo好友的角色之一？"
1007905-75 = "也許這個Momo好友的佩洛洛……就像異世界的呱太一樣。"
1007905-76 = "……嗯。"
1007905-77 = "……這麼一想，突然覺得它好像有點可愛。"
1007905-78 = "[s13]「這麼突然！？」\n[s14]「與其說可愛，更像是同病相憐吧！？」"
1007905-81 = "那，那有什麼關係！喜歡就是喜歡嘛！"
1007905-82 = "我決定了。既然都來到這裡了，這或許也是種命運。"
1007905-83 = "我要買一個以示尊重。"
1007905-84 = "除了獎品之外……旁邊也有單獨販售的呢。"
1007905-88 = "唔……好，就選這個吧！#n老師，該到哪裡結帳？"
1007905-89 = "……你要買給我？這，這樣好嗎……？"
1007905-90 = "嗯？……沒關係？"
1007905-91 = "……問我是不是真的要買這個？"
1007905-95 = "唔嗯……這個嘛……"
1007905-96 = "總，總之先隨身帶著，之後多少會產生感情的吧？#n我會努力喜歡上它的！"
1007905-97 = "[s15]「居然是『努力』喜歡上啊。」\n[s16]「有種建立了深厚夥伴關係的感覺。」"
1007905-100 = "好……"
1007905-101 = "之，之後請多指教囉！佩洛洛！！"
1007905-104 = "― [log=미사카]唔～～～嗯。[/log][wa:620] "
1007905-107 = "― [log=미사카]其實看久了，[/log][wa:420] "
1007905-109 = "― [log=미사카]好像開始覺得有點可愛……[/log][wa:2940] "
1007905-112 = "― [log=미사카]話說，這是豬嗎……？[/log][wa:1630] "
1007905-114 = "― [log=미사카]還是河馬？[/log]"
1007905-117 = "― [log=미사카]……咦，鳥！？騙人的吧！？[/log][wa:1170] "
1007905-120 = "[ns17]「不是，硬要說的話也應該是鳥吧……」\n[ns18]「畢竟有鳥喙和翅膀。」"
1007905-124 = "― [log=미사카]是，是沒錯啦……[/log][wa:1260] "
1007905-126 = "― [log=미사카]啊哈哈……算了，是什麼都無所謂。[/log][wa:2310] "
1007905-129 = "― [log=미사카]話說回來，仔細想想……[/log][wa:2040] "
1007905-131 = "― [log=미사카]這個，是老師送我的禮物對吧。[/log][wa:1780] "
1007905-134 = "― [log=미사카]……我會好好珍惜的。[/log][wa:1460] "
1007905-136 = "― [log=미사카]謝謝你，老師。[/log][wa:520] "
1007905-139 = "（於是替御坂付了他所挑選的商品的錢）"
1007905-140 = "（在離開遊戲中心時，御坂也滿臉神奇地東張西望）"

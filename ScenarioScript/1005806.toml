[translation]
1005806-1 = "「救護」的形式"
1005806-6 = "（在美禰的協助下，迅速處理完了工作）"
1005806-7 = "這樣今天的作業就告一段落了呢。"
1005806-8 = "[s]「美禰很擅長處理文書作業呢。」"
1005806-9 = "不，您過獎了。"
1005806-10 = "或許是因為我身為救護騎士團的負責人，所以處理這些文件的機會也不在少數的關係吧。"
1005806-11 = "是意外獲得的技能之一。"
1005806-12 = "[s]「今天美禰的『救護』幫了大忙唷。」"
1005806-16 = "……！"
1005806-17 = "原來如此，這也是一種「救護」的形式……！"
1005806-18 = "非常感謝您，老師。我受益良多。"
1005806-19 = "[s]（我其實只想開個玩笑……）"
1005806-23 = "……失禮了，是我的電話。"
1005806-24 = "[s]「可以接起來沒關係的唷。」"
1005806-25 = "好的，謝謝您。"
1005806-30 = "這裡是救護騎士團。您需要救護嗎？"
1005806-36 = "救，救救我！我迷路了……！"
1005806-37 = "在那個森林……在「奇普托斯的樹海」！"
1005806-38 = "是「奇普托斯的樹海」對嗎？"
1005806-39 = "能請您說明一下更詳細的狀況嗎？"
1005806-40 = "我不知道……"
1005806-41 = "周圍太暗了看不了多遠，樹木全都長得一模一樣……"
1005806-45 = "……而……又……"
1005806-50 = "喂喂……能聽見我說話嗎！？"
1005806-54 = "電話掛斷了……"
1005806-58 = "老師，情況非常緊急。"
1005806-59 = "[s]「發生什麼事了……！？」"
1005806-60 = "「奇普托斯的樹海」裡，有人正在尋求救護！"
1005806-61 = "得立刻前去救護才行！"
1005806-62 = "[s]「『奇普托斯的樹海』……？」"
1005806-63 = "是的，您沒聽說過嗎？"
1005806-64 = "「奇普托斯的樹海」是以一旦進入就無法離開聞名的地點……"
1005806-65 = "只要進入那座森林，GPS就無法正常運作，指南針也會出現異常……"
1005806-66 = "以一旦迷路就走不出來的地點被大家害怕著。"
1005806-67 = "[s]「那應該要禁止進入比較好吧……！？」"
1005806-68 = "雖然已經藉由設立告示牌之類的措施，警告他人不要隨意進入……"
1005806-69 = "但正因為受到禁止，反而使感興趣的人絡繹不絕……"
1005806-70 = "目的因人而異。比如為了投稿到社群網站、當作試膽大會等等，也有單純因為好奇而進入「奇普托斯的樹海」的人。"
1005806-71 = "剛才向我打電話的人，想必也在其中之一吧。"
1005806-72 = "老師，今天很謝謝您。"
1005806-73 = "我趕時間，先告辭了。"
1005806-83 = "[ns]「先等一下……！」"
1005806-97 = "不過，沒必要連老師也一起到「奇普托斯的樹海」……"
1005806-98 = "[s1]「今天受到了美禰的幫助，就當作是禮尚往來吧。」\n[s2]「美禰也是我重要的學生，不能讓你獨自前往那麼危險的地方唷。」"
1005806-101 = "重要的，學生……"
1005806-102 = "呵呵，這樣啊。我完全忘記自己的身分了。"
1005806-103 = "也就是要和我一起負責「救護」活動，您是這個意思對吧。"
1005806-104 = "果然就算是從現在開始也沒關係，您要不要成為救護騎士團的臨時顧問呢？"
1005806-105 = "[s]「這麼說來你以前也說過類似的話呢……」"
1005806-106 = "是的。"
1005806-107 = "再次提醒您，我認為老師擁有相當優秀的「救護」才能與精神。"
1005806-111 = "總之，現在趕緊出發吧。"
1005806-112 = "……其實我也是第一次踏進「奇普托斯的樹海」。"
1005806-113 = "比我想像中更加緊張……"
1005806-114 = "[s]「就算是美禰也會緊張呀。」"
1005806-115 = "……或許是因為，老師說我也是您「重要的」學生吧。"
1005806-116 = "不好意思，這種時候不該說這種話呢。不用那麼慌張也沒關係的哦。"
1005806-117 = "那麼，出發吧！"
1005806-122 = "老師，請注意腳邊的樹木！"
1005806-127 = "這樣就沒問題了。"
1005806-128 = "多節省一點資源……？"
1005806-132 = "確實，您說的有道理。"
1005806-136 = "注意腳邊，繼續前進吧。"
1005806-139 = "離開步道後已經走了一段時間……然而並沒有發現人來過的痕跡呢。"
1005806-140 = "……雖然有些不安，不過向我們尋求救護的學生想必也抱持著相同的心情吧。"
1005806-147 = "老師您還好嗎？"
1005806-151 = "雖然有樹蔭能抵擋陽光，不過路面的情況並不好，還請您別勉強自己。"
1005806-155 = "來到相當深的地方了呢……"
1005806-156 = "看來GPS無法正常運作果然只是單純的謠言呢。"
1005806-160 = "話雖如此，電量已所剩無幾……"
1005806-161 = "當時應該把備用的電池也帶過來的。"
1005806-162 = "……謝謝您。也對，在緊急出動的情況下，準備有些許不完善也是很正常的。現在就盡己所能吧。"
1005806-164 = "（結果一直到了晚上也沒能找到任何線索……）"
1005806-166 = "……"
1005806-167 = "已經這麼晚了呢。"
1005806-168 = "非常抱歉，老師。一提到救護，我似乎就會無法顧慮其他事情……"
1005806-169 = "果然，不該順勢將老師牽連進來的。"
1005806-170 = "[s3]「沒關係，是我自己跟上來的，你不用在意。」\n[s4]「這股率直的心意是美禰的優點唷。」"
1005806-176 = "……謝謝您，老師。"
1005806-181 = "那裡似乎有能夠休息的地方。"
1005806-182 = "要不要休息一會呢？離開夏萊之後，一直都沒有停下來休息呢。"
1005806-189 = "老師請坐在這邊的樹樁……"
1005806-190 = "落葉我已經稍作清理了，您請坐。"
1005806-195 = "― 老師？您還好嗎？[wa:1860] "
1005806-197 = "― 有沒有哪裡受傷？[wa:1010] "
1005806-200 = "― 夜晚的空氣 真舒服呢。[wa:2370] "
1005806-203 = "― 草的香氣與潺潺流水……[wa:1400] "
1005806-205 = "― 能讓內心平靜下來。[wa:140] "
1005806-208 = "― ……您怎麼了？[wa:430] "
1005806-210 = "― 很耀眼……是嗎……？[wa:1400] "
1005806-213 = "― 呵呵，或許真的是那樣呢。[wa:3330] "
1005806-216 = "― 如果覺得靜不下來，要倚靠著我，[wa:2340] "
1005806-218 = "― 或是在我的膝蓋上休息也沒關係唷。[wa:1440] "
1005806-221 = "― 請別擔心。[wa:760] "
1005806-224 = "― 不管發生什麼事，"
1005806-226 = "― 我都一定會保護老師的。[wa:1520] "
1005806-229 = "（借用美禰的膝蓋，稍微休息了一會）"
1005806-235 = "總算是回到入口了呢……"
1005806-239 = "電量應該也還撐得住……"
1005806-240 = "[s]「美禰會不會累？」"
1005806-241 = "我沒事。不如說是讓老師做了不習慣的事……"
1005806-242 = "某天真的成為「顧問」的話，這種情況或許也會增加吧……呵呵。"
1005806-247 = "難道，是那位學生打來的……？"
1005806-251 = "救，救救我！我在森林裡迷路了……！"
1005806-252 = "在「奇普托斯的樹海」！"
1005806-253 = "再次請問您，可以稍微詳細地說明一下情況嗎？"
1005806-254 = "但是，我什麼都搞不清楚……"
1005806-255 = "只知道，有很多樹而已……"
1005806-256 = "我現在就在「奇普托斯的樹海」，能請您給我一些線索嗎？"
1005806-260 = "咦，騙人的吧！？"
1005806-261 = "居然真的去了哦，真的假的啦！"
1005806-266 = "打惡作劇電話就能讓救護騎士團行動，要是我有早點想到就好了！"
1005806-267 = "哈哈，迷路了很久對吧？"
1005806-268 = "再說就算是真的，要在那裡找人也是不可能的吧！"
1005806-273 = "……"
1005806-274 = "[ns]「那個……美禰？」"
1005806-275 = "這些人犯下了三個錯誤。"
1005806-276 = "第一點，就算是我，遇到兩次相同的電話也會考慮各種可能性。"
1005806-277 = "第二點，他們失言說出了這是惡作劇電話。"
1005806-278 = "第三點，雖然這種方法不應該胡亂使用……"
1005806-279 = "儘管有幾個條件，但「救護騎士團擁有反向追查的權限」，他們並不知道。"
1005806-280 = "老師。"
1005806-281 = "現在，我將前往需要「救護」的人們身邊。"
1005806-282 = "當有人偏離正軌之時……"
1005806-283 = "告知他們正確的道路，也是我們該進行的「救護」！"
1005806-284 = "老師，您不這麼覺得嗎？"
1005806-288 = "[ns5]「那個……別做得太過分哦？」\n[ns6]「記得手下留情……」"
1005806-291 = "感謝您的理解。"
1005806-292 = "那麼雖然抱歉，我就先告辭了。日後再見。"
1005806-293 = "救護騎士團，出動！#n「哪裡要救護，我就在哪裡」！"
1005806-299 = "（之後，美禰以飛快的速度消失得無影無蹤）"
1005806-303 = "（至於撥打惡作劇電話的犯人們的下場，或許，只有美禰自己知道……）"

[translation]
1005806-1 = "Where Aid Is Needed"
1005806-6 = "With Mine's help, I took care of administrative tasks quickly."
1005806-7 = "That seems to be the end of today's tasks."
1005806-8 = "[s] \"You're great at documentation as well, Mine...\""
1005806-9 = "I'm flattered."
1005806-10 = "You have to become proficient in many things when you are managing an organization."
1005806-11 = "I guess it's like a skill or talent that I didn't intend to acquire."
1005806-12 = "[s] \"But still, your aid was a big help, Mine.\""
1005806-16 = "...!"
1005806-17 = "I see. This is, in some way, an extension of aid...!"
1005806-18 = "Thank you. Sensei. I've learned a lot."
1005806-19 = "[s] \"(Was that something to take so seriously?)\""
1005806-23 = "A phone call...?"
1005806-24 = "[s] \"Go on, answer.\""
1005806-25 = "I will, Sensei."
1005806-30 = "Hello. You have reached the Remedial Knights. Are you in need of aid?"
1005806-36 = "H-Help me! I'm lost..."
1005806-37 = "In the forest... In the Forest of Kivotos!"
1005806-38 = "Hm? In the Forest of Kivotos?!"
1005806-39 = "Could you provide more details about your situation?"
1005806-40 = "I don't know!"
1005806-41 = "The surroundings are so dark, and all these trees look the same..."
1005806-45 = "It's also.. And...!"
1005806-50 = "Hello? Hello??"
1005806-54 = "The call cut off..."
1005806-58 = "Sensei. I can't waste a single moment."
1005806-59 = "[s] \"Wh-What's going on?\""
1005806-60 = "Someone is requesting aid from the Forest of Kivotos!"
1005806-61 = "I will head there right away!"
1005806-62 = "[s] \"The Forest of Kivotos...?\""
1005806-63 = "Oh, don't you know?"
1005806-64 = "The Forest of Kivotos is famous for being very dense..."
1005806-65 = "Strangely, they say that your GPS won't function in that forest, and that even your compass malfunctions once you enter."
1005806-66 = "They also say that you won't be able to find your way out if you become lost."
1005806-67 = "[s] \"Shouldn't a place like that be designated as off-limits?!\""
1005806-68 = "They have already taken similar measures, but..."
1005806-69 = "As you well know, making something forbidden will always tempt some people into doing it."
1005806-70 = "Whether as a test of courage, for the sake of a social media video, or just pure curiosity, it's not uncommon for people to brave the Forest of Kivotos from time to time."
1005806-71 = "That distress call I just received must have come from such a person."
1005806-72 = "Anyways, thank you for today!"
1005806-73 = "Then I'll be on my way!"
1005806-83 = "[ns] \"Hold on a second!\""
1005806-97 = "You don't have to come with me to the Forest of Kivotos, Sensei..."
1005806-98 = "[s1] \"Even though it may have been a distress call...\"\n[s2] \"I can't let my student go to a dangerous place alone...\""
1005806-101 = "Me, your...?"
1005806-102 = "Huhu, I see. I've forgotten my own status."
1005806-103 = "Then I'll take it as fact that you are also a part of the 'aid' of the Remedial Knights for the moment, Sensei."
1005806-104 = "Now how about we make you an honorary advisor of the Remedial Knights, at least for the time being?"
1005806-105 = "[s] \"That thing about becoming an advisor... You didn't forget.\""
1005806-106 = "Of course not."
1005806-107 = "I'll say it again, but you have an excellent spirit and talent of aid."
1005806-111 = "Then let's go, Sensei."
1005806-112 = "It's actually my first time stepping foot in the Forest of Kivotos myself."
1005806-113 = "I'm quite nervous."
1005806-114 = "[s] \"I didn't think you got nervous, Mine.\""
1005806-115 = "...Didn't you say that I was also one of your students?"
1005806-116 = "Heehee. I'm just kidding. You don't have to get that nervous."
1005806-117 = "Then, let's go. Remedial Knights are on the way!"
1005806-122 = "Careful, Sensei! Watch out for those vines."
1005806-127 = "With this, we'll make a clearer path to tread."
1005806-128 = "Huh? You think that it'd be best to conserve our resources when possible?"
1005806-132 = "That's true, too."
1005806-136 = "Let's take a bit more care with where we step as we go forward."
1005806-139 = "We seem to have made it fairly far in, but there isn't a trace of anyone."
1005806-140 = "I'm worried. I'm sure the students who need our aid must be feeling the same."
1005806-147 = "Are you doing all right, Sensei?"
1005806-151 = "Thankfully, the forest is so thickly wooded that it provides shade against the heat. No worries there."
1005806-155 = "It seems that quite a lot of time has passed..."
1005806-156 = "The rumors that GPS doesn't work here seem to have been just that. Rumors."
1005806-160 = "My phone battery, on the other hand..."
1005806-161 = "This is my oversight. I should have prepared ample spare batteries."
1005806-162 = "We had to rush here so suddenly it couldn't be helped? Huhu, I'm grateful that's how you see it."
1005806-164 = "In the end, we couldn't find any traces or clues in the Forest of Kivotos even by the time night fell..."
1005806-166 = "..."
1005806-167 = "It's nighttime."
1005806-168 = "I'm sorry, Sensei. I... When I get into a situation like this, I seem to get a bad case of tunnel vision."
1005806-169 = "I caused you inconvenience, simply because of my stubbornness."
1005806-170 = "[s3] \"It's all right.\"\n[s4] \"You were just trying to help someone, right?\""
1005806-176 = "...Thank you. For thinking of it like that."
1005806-181 = "Over there... That seems to be a natural clearing."
1005806-182 = "Would you like to take a short rest? It seems the two of us have both exhausted all our energy."
1005806-189 = "I think you could sit on this wooden stump here, Sensei."
1005806-190 = "I've addressed most of the dirty stuff, so I'll start sanitizing now."
1005806-195 = "― Sensei, is everything okay?[wa:1100] "
1005806-197 = "― Are you hurt anywhere at all?[wa:170] "
1005806-200 = "― Ah, the night air is lovely![wa:1690] "
1005806-203 = "― The sweet smell of the grass, the soft sounds of the river...[wa:10] "
1005806-205 = "― It's such a calming atmosphere.[wa:10] "
1005806-208 = "― ...What's wrong?[wa:70] "
1005806-210 = "― It's blinding?[wa:1240] "
1005806-213 = "― I understand. Heehee.[wa:2970] "
1005806-216 = "― If you're nervous, you can lean on me![wa:1420] "
1005806-218 = "― Or, if you'd like to close your eyes, you can put your head on my lap.[wa:10] "
1005806-221 = "― Don't worry, Sensei.[wa:160] "
1005806-224 = "― No matter what happens,"
1005806-226 = "― I'll be here to protect you.[wa:840] "
1005806-229 = "Thanks to Mine, the night in the forest passed safely."
1005806-235 = "We were finally able to make it back to the forest's entrance..."
1005806-239 = "Perhaps it's a small price to pay, but my battery only has about 15% charge left."
1005806-240 = "[s] \"Good job, Captain Mine...\""
1005806-241 = "It was all thanks to you, who went through a much harder time as our temporary advisor, Sensei."
1005806-242 = "Huhu... I hope that we can remove the 'temporary' from that title."
1005806-247 = "Another call...?"
1005806-251 = "H-Help...! I'm lost..."
1005806-252 = "In the forest... In the Forest of Kivotos!"
1005806-253 = "...Could you provide me with additional details?"
1005806-254 = "I don't know!"
1005806-255 = "The surroundings are so dark, and all these trees look the same..."
1005806-256 = "...We're already in the Forest of Kivotos. Where are you?"
1005806-260 = "You're already here...?!"
1005806-261 = "Wow, really? They actually came? That's crazy!"
1005806-266 = "To think we could actually prank call the Remedial Knights! This is great!"
1005806-267 = "They must've wandered around in there for a long time, right?"
1005806-268 = "Finding someone in this forest is like looking for a needle in a haystack, so we'll never get caught!"
1005806-273 = "..."
1005806-274 = "[ns] \"Um... Mine?\""
1005806-275 = "These people have made three mistakes."
1005806-276 = "First, that even I won't fall for the same trick twice."
1005806-277 = "Second, this time they didn't end the call quickly enough."
1005806-278 = "Lastly, though I didn't want to use something like this..."
1005806-279 = "Lastly is that when I use the name of the Remedial Knights, tracking someone's location is very simple...!"
1005806-280 = "Sensei."
1005806-281 = "From now on, I will go and deliver some true 'aid' to those who really need it."
1005806-282 = "If someone is walking the wrong path..."
1005806-283 = "...It is 'aid' to personally go and make sure that they return to the right one!"
1005806-284 = "You think so too, right, Sensei?!"
1005806-288 = "[ns5] \"Yeah... Go easy on them...?\"\n[ns6] \"Don't go too hard on them...?\""
1005806-291 = "Thank you for understanding."
1005806-292 = "Excuse me, but I'll head out first."
1005806-293 = "Medicine knows no borders!"
1005806-299 = "Mine disappeared somewhere very quickly."
1005806-303 = "...The fate of the students who made the prank call, is to this day only known by Mine..."

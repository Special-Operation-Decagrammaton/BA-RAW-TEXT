[translation]
1005806-1 = "คนที่ต้องการให้ช่วยบรรเทาทุกข์"
1005806-6 = "(ด้วยความช่วยเหลือของมิเนะ คุณครูเลยจัดการงานที่ได้รับมอบหมายเสร็จได้อย่างรวดเร็ว)"
1005806-7 = "ดูเหมือนงานของวันนี้จะเสร็จเรียบร้อยแล้วค่ะ"
1005806-8 = "[s] \"มิเนะนี่จัดการเอกสารเก่งจัง...\""
1005806-9 = "ชมเกินไปแล้วค่ะ"
1005806-10 = "พอลองได้ทำงานเป็นผู้รับผิดชอบชมรม ก็จะทำงานด้านการจัดการเก่งขึ้นค่ะ..."
1005806-11 = "เรียกว่าเป็นทักษะหนึ่งอย่างที่ได้มา... โดยไม่คาดคิดเลยค่ะ"
1005806-12 = "[s] \"แต่ครูก็ได้ 'การบรรเทาทุกข์' ของมิเนะช่วยไว้ได้เยอะเลยนะ\""
1005806-16 = "...!"
1005806-17 = "อย่างนี้นี่เอง... นี่ก็เป็นการบรรเทาทุกข์อย่างหนึ่งสินะคะ...!"
1005806-18 = "ขอบคุณค่ะคุณครู ฉันได้เรียนรู้เยอะเลยค่ะ"
1005806-19 = "[s] (ต้องตอบรับจริงจังเบอร์นี้เลยเหรอ...?)"
1005806-23 = "มีโทรศัพท์เข้ามา...?"
1005806-24 = "[s] \"รับสายก่อนเถอะ\""
1005806-25 = "ค่ะ คุณครู"
1005806-30 = "สวัสดีค่ะ ชมรมอัศวินบรรเทาทุกข์ค่ะ ต้องการความช่วยเหลืออะไรรึเปล่าคะ?"
1005806-36 = "ชะ... ช่วยด้วย! ฉันหลงทาง..."
1005806-37 = "ในป่า... ตรง... <พื้นที่น้ำท่วมของคิโวทอส>!"
1005806-38 = "คะ? <พื้นที่น้ำท่วมของคิโวทอส> งั้นเหรอคะ?"
1005806-39 = "ช่วยอธิบายสถานการณ์ให้ละเอียดหน่อยได้มั้ยคะ?"
1005806-40 = "ฉะ... ฉันไม่รู้!"
1005806-41 = "ข้างนอกมืดไปหมด... ต้นไม้มันก็ดูเหมือนๆ กัน..."
1005806-45 = "และ... ที่..."
1005806-50 = "ฮะ...ฮัลโหล?? "
1005806-54 = "สายหลุดไปแล้วค่ะ..."
1005806-58 = "คุณครูคะ จะรอช้าอยู่ไม่ได้แล้วนะคะ"
1005806-59 = "[s] \"กะ...เกิดอะไรขึ้นงั้นเหรอ?\""
1005806-60 = "มีคนต้องการความช่วยเหลือใน <พื้นที่น้ำท่วมของคิโวทอส> ค่ะ!"
1005806-61 = "ฉันต้องรีบไปที่ <พื้นที่น้ำท่วมของคิโวทอส> แล้วค่ะ!"
1005806-62 = "[s] \"<พื้นที่น้ำท่วมของคิโวทอส>...?\""
1005806-63 = "อ๊ะ คุณครูไม่รู้จักเหรอคะ?"
1005806-64 = "<พื้นที่น้ำท่วมของคิโวทอส> เป็นป่าทึบชื่อดังในคิโวทอส..."
1005806-65 = "และเป็นเรื่องที่แปลกมากๆ เลยค่ะ เวลาเข้าไปในป่านั้น GPS จะใช้งานไม่ได้ แม้กระทั่งเข็มทิศ#nก็จับทิศทางไม่ได้เลยค่ะ"
1005806-66 = "ถ้าหลงทางในนั้นก็จะออกมาไม่ได้ เป็นป่าที่น่ากลัวมากค่ะ"
1005806-67 = "[s] \"พื้นที่นั้นไม่ได้เป็นเขตห้ามเข้าหรอกเหรอ?!\""
1005806-68 = "มีประกาศใช้งานมาตราการห้ามเข้าแล้วค่ะ..."
1005806-69 = "แต่อย่างที่คุณครูทราบดี ถึงจะห้ามยังไง พวกคนที่อยากลองของก็เข้าไปอยู่ดีค่ะ"
1005806-70 = "มักจะมีคนชอบไปทดสอบความกล้า หรือถ่ายวิดีโอลงโซเชียล แล้วก็มักเกิดเหตุที่พวกคนอยากรู้#nอยากลองพวกนี้ หลงทางในป่าเสมอๆ เลยค่ะ"
1005806-71 = "บางทีคนที่โทรเข้ามาขอความช่วยเหลือคราวนี้ ก็คงเป็นหนึ่งในนั้นค่ะ"
1005806-72 = "ยังไงก็เถอะค่ะ วันนี้ขอบคุณมากนะคะคุณครู!"
1005806-73 = "ฉันขอตัวก่อนนะคะ!"
1005806-83 = "[ns] \"เดี๋ยวสิ รอครูด้วย!\""
1005806-97 = "คุณครูไม่ต้องมาที่ <พื้นที่น้ำท่วมของคิโวทอส> ก็ได้นี่คะ..."
1005806-98 = "[s1] \"ถึงจะมีคนขอความช่วยเหลือเข้ามา แต่จะให้มาคนเดียวได้ยังไง...\"\n[s2] \"มิเนะเป็นนักเรียนของครูนะ จะปล่อยให้มาที่ที่อันตรายคนเดียวได้ยังไง\""
1005806-101 = "ฉันเป็น... ของคุณครู...?"
1005806-102 = "ฮุฮุ งั้นเหรอคะ ฉันลืมเรื่องนั้นไปซะสนิทเลยค่ะ"
1005806-103 = "ถ้าอย่างนั้น ฉันจะเข้าใจว่าตั้งแต่นี้ไป คุณครูก็จะออกปฏิบัติการ \"บรรเทาทุกข์\" ของชมรมอัศวิน#nบรรเทาทุกข์ด้วยกันนะคะ"
1005806-104 = "ไม่สิ... ถึงจะเพียงชั่วคราว แต่คุณครูสนใจจะรับตำแหน่งที่ปรึกษากิตติมศักดิ์ของชมรมอัศวินบรรเทา#nทุกข์มั้ยคะ?"
1005806-105 = "[s] \"เรื่องที่ปรึกษานั่น... ยังไม่ลืมสินะ\""
1005806-106 = "แน่นอนค่ะ"
1005806-107 = "ฉันเคยบอกไปแล้วนี่คะ ว่าคุณครูมีพรสวรรค์ที่ยอดเยี่ยมในการ \"บรรเทาทุกข์\" อยู่ค่ะ"
1005806-111 = "ถ้าอย่างนั้นคุณครูคะ... เราออกเดินทางกันเลยดีมั้ยคะ?"
1005806-112 = "อันที่จริง ฉันเองก็เพิ่งเคยมาที่ <พื้นที่น้ำท่วมของคิโวทอส> เป็นครั้งแรกเหมือนกันค่ะ"
1005806-113 = "เลยรู้สึกกังวลเหมือนกันค่ะ"
1005806-114 = "[s] \"ไม่นึกเลยว่ามิเนะก็เพิ่งเคยมา\""
1005806-115 = "คุณครูเพิ่งบอกว่าฉันเองก็เป็นนักเรียนของคุณครูไม่ใช่เหรอคะ?"
1005806-116 = "ฮุฮุ ฉันแค่พูดเฉยๆ เองนะคะ ไม่เห็นต้องตกใจขนาดนั้นเลยค่ะ"
1005806-117 = "ถ้าอย่างนั้นก็ไปกันเถอะค่ะ ชมรมอัศวินบรรเทาทุกข์ออกปฏิบัติการได้!"
1005806-122 = "ระวังนะคะคุณครู เถาวัลย์ค่ะ"
1005806-127 = "ถ้าทำแบบนี้ สิ่งกีดขวางทางเดินก็จะหมดไปค่ะ"
1005806-128 = "คะ? คุณครูคิดว่าควรออมแรงไว้ก่อนจะดีกว่างั้นเหรอคะ?"
1005806-132 = "ที่คุณครูพูดมาก็มีเหตุผลค่ะ"
1005806-136 = "ถ้าอย่างนั้นตอนเดินก็ระวังด้วยนะคะ"
1005806-139 = "ตอนนี้เราก็เข้ามาลึกพอสมควรแล้วนะคะ แต่ว่ายังไม่เห็นคนเลยค่ะ"
1005806-140 = "น่าเป็นห่วงจัง เด็กที่ขอความช่วยเหลือเข้ามา ตอนนี้ก็คงรู้สึกกังวลอยู่แน่ๆ เลยค่ะ"
1005806-147 = "คุณครู เป็นอะไรรึเปล่าคะ?"
1005806-151 = "โชคดีที่ที่นี่เป็นป่าทึบ เลยไม่ต้องห่วงเรื่องอากาศร้อนค่ะ"
1005806-155 = "เวลาก็ผ่านไปพอสมควรแล้วนะคะ..."
1005806-156 = "ข่าวลือเรื่องที่ GPS ใช้งานไม่ได้ ดูเหมือนจะเป็นเรื่องที่พูดเกินจริงไปหน่อยสินะคะ"
1005806-160 = "แต่ว่าตอนนี้แบตโทรศัพท์มัน..."
1005806-161 = "เป็นความผิดของฉันเองค่ะ ควรจะต้องเตรียมชาร์จแบตมาให้พร้อมล่วงหน้าแท้ๆ..."
1005806-162 = "เรื่องนั้นมันเป็นเรื่องที่ช่วยไม่ได้ เพราะว่าต้องออกปฏิบัติการกะทันหันงั้นเหรอคะ? ฮุฮุ ขอบคุณที่#nปลอบใจฉันนะคะ"
1005806-164 = "(คุณครูกับมิเนะออกตามหาคนที่หลงทางจนถึงกลางดึก แต่ก็ไม่พบร่องรอยของใครเลย...)"
1005806-166 = "..."
1005806-167 = "มืดซะแล้วค่ะ"
1005806-168 = "ขอโทษนะคะคุณครู ฉัน... พอมืดแบบนี้แล้ว ฉันแยกไม่ออกเลยว่าทางไหนเป็นทางไหนค่ะ"
1005806-169 = "คุณครูต้องมาลำบากเพราะความดื้อรั้นของฉันซะแล้ว..."
1005806-170 = "[s3] \"ไม่เป็นไรหรอก\"\n[s4] \"มิเนะแค่อยากมาช่วยคนนี่นา?\""
1005806-176 = "ขอบคุณนะคะที่คิดแบบนั้น..."
1005806-181 = "ตรงนั้นดูเหมือนจะมีลานว่างอยู่ด้วยนะคะ"
1005806-182 = "เราไปนั่งพักตรงนั้นกันสักหน่อยมั้ยคะ? ดูเหมือนตอนนี้พวกเราจะหมดแรงซะแล้วละค่ะ"
1005806-189 = "คุณครูคะ นั่งตรงตอไม้ตรงนี้ก็ได้ค่ะ "
1005806-190 = "ฉันปัดฝุ่นสกปรกออกไปแล้ว ขอทำความสะอาด ฆ่าเชื้อสักครู่นะคะ"
1005806-195 = "― คุณครู... เป็นอะไรรึเปล่าคะ?[wa:1060] "
1005806-197 = "― บาดเจ็บตรงไหนรึเปล่าคะ?[wa:410] "
1005806-200 = "― อากาศตอนกลางคืนนี่... ทำให้รู้สึกดีจังเลยนะคะ[wa:1010] "
1005806-203 = "― กลิ่นของต้นหญ้า...เสียงน้ำไหล...[wa:560] "
1005806-205 = "― ช่วยทำให้จิตใจสงบมากเลยค่ะ[wa:10] "
1005806-208 = "― ...เป็นอะไรเหรอคะ?[wa:10] "
1005806-210 = "― เจิดจ้า...เกินไปงั้นเหรอคะ?[wa:720] "
1005806-213 = "― ฮุฮุ... อาจจะเป็นอย่างนั้นก็ได้ค่ะ[wa:2450] "
1005806-216 = "― ถ้าคุณครูรู้สึกไม่สบายตัวจะเอนมาซบไหล่ฉัน[wa:1300] "
1005806-218 = "― หรือว่าจะนอนหนุนตักฉัน... ก็ได้นะคะ[wa:680] "
1005806-221 = "― ไม่ต้องกังวลนะคะ[wa:320] "
1005806-224 = "― ไม่ว่าจะเกิดเรื่องอะไรขึ้น"
1005806-226 = "― ฉันก็จะปกป้องคุณครูเองค่ะ[wa:960] "
1005806-229 = "(ด้วยความช่วยเหลือจากมิเนะ ทำให้คุณครูได้ใช้ค่ำคืนที่สงบสุขในป่า)"
1005806-235 = "ในที่สุดก็กลับออกมาถึงปากทางเข้าป่าทึบแล้วค่ะ..."
1005806-239 = "แต่ว่าตอนนี้แบตโทรศัพท์เหลืออยู่แค่ 15 เปอร์เซ็นต์เองค่ะ"
1005806-240 = "[s] \"เหนื่อยน่าดูเลยนะ หัวหน้ามิเนะ...\""
1005806-241 = "ไม่เป็นไรเลยค่ะ คุณครูที่ปรึกษา \"ชั่วคราว\" ของเราต่างหากที่ลำบากกว่าอีกค่ะ"
1005806-242 = "ฮุฮุ... ถ้าสักวันหนึ่งเอาคำว่า \"ชั่วคราว\" ออกได้ก็คงดีนะคะ"
1005806-247 = "มีโทรศัพท์เข้ามาอีกแล้ว...?"
1005806-251 = "ชะ... ช่วยด้วย! ฉันหลงทาง..."
1005806-252 = "ในป่า... ตรง... <พื้นที่น้ำท่วมของคิโวทอส>!"
1005806-253 = "ช่วยอธิบายสถานการณ์ให้ละเอียดกว่านี้หน่อยได้มั้ยคะ?"
1005806-254 = "มะ... ไม่รู้!"
1005806-255 = "ข้างนอกมืดไปหมด... ต้นไม้มันก็ดูเหมือนๆ กัน..."
1005806-256 = "ตอนนี้พวกเราเข้ามาที่พื้นที่น้ำท่วมของคิโวทอสแล้วค่ะ คุณอยู่ตรงไหนเหรอคะ?"
1005806-260 = "มาแล้วงั้นเหรอ...?!"
1005806-261 = "ว้าว! พูดจริงดิ? ไปที่ป่านั่นจริงๆ เหรอ? สุดยอด!"
1005806-266 = "โทรหลอกหัวหน้าชมรมอัศวินบรรเทาทุกข์ได้ด้วยแฮะ สุดยอดเลย!"
1005806-267 = "คงเดินหลงอยู่พักใหญ่เลยสิท่า!"
1005806-268 = "การค้นหาคนในป่านั่นน่ะ มันก็เหมือนงมเข็มในมหาสมุทรเลย ไม่มีทางหาเจอหรอกน่า! "
1005806-273 = "..."
1005806-274 = "[ns] \"นี่... มิเนะ?\""
1005806-275 = "พวกเขาทำพลาด 3 เรื่องค่ะ"
1005806-276 = "เรื่องแรก พวกเขาคงไม่รู้ว่าฉันเป็นคนประเภทที่ไม่ให้ใครมาล้อเล่นแบบเดิมเป็นครั้งที่สอง"
1005806-277 = "เรื่องที่สอง วันนี้พวกเขาตัดสายโทรศัพท์ช้ากว่าเมื่อวาน..."
1005806-278 = "เรื่องที่สาม ฉันไม่ได้อยากใช้ของพวกนี้เลยก็จริง..."
1005806-279 = "แต่ขอเอาชื่อชมรมอัศวินบรรเทาทุกข์เป็นประกันเลยค่ะ แค่ตามหาพิกัดคนโทรน่ะ ฉันทำได้อยู่แล้ว#nละค่ะ...!"
1005806-280 = "คุณครูคะ"
1005806-281 = "ตั้งแต่นี้ไปฉันจะไปหาคนที่ต้องการให้ \"บรรเทาทุกข์\" อย่างแท้จริงค่ะ"
1005806-282 = "หากเราพบใครที่กำลังเดินบนเส้นทางที่ผิดละก็..."
1005806-283 = "การสั่งสอนให้พวกเขากลับมาเดินบนเส้นทางที่ถูกต้องก็เป็นการบรรเทาทุกข์#nอย่างหนึ่งค่ะ!"
1005806-284 = "คุณครูก็คิดแบบนั้นใช่มั้ยคะ?!"
1005806-288 = "[ns5] \"เอ่อ... เบาๆ มือหน่อยล่ะ...\"\n[ns6] \"อย่าสั่งสอนแรงเกินไปล่ะ...\""
1005806-291 = "ขอบคุณที่เข้าใจนะคะ"
1005806-292 = "ขอโทษที่เสียมารยาทค่ะ แต่ฉันต้องขอตัวก่อนนะคะคุณครู"
1005806-293 = "『ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!!』"
1005806-299 = "(มิเนะวิ่งหายไปด้วยความเร็วสูง...)"
1005806-303 = "(...ส่วนชะตาชีวิตของเด็กที่โทรศัพท์มากลั่นแกล้ง คงมีแค่มิเนะเท่านั้นที่รู้...)"

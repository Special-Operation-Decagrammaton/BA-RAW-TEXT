33100-17 = "3;세이아;01;……."
33100-18 = "3;세이아;02;지금 벌어진 사건 또한, 말하자면 그런 것입니다."
33100-19 = "3;세이아;99;에덴조약 자체는 학원과 학원 간에 체결되는 일반적인 협정이지만……."

[translation]
33100-1 = "ตอนที่ 10;คำโกหกแสนหวาน"
33100-3 = "คุณครู คุณเป็นคนนอกของคิโวทอส เพราะงั้นสัญญา การทำข้อตกลง... คุณคงจะทราบดีถึงความสำคัญของสัญญาพวกนั้นสินะคะ"
33100-4 = "....เคยได้ยินคำพูดว่า \"ทำสัญญากับปีศาจ\" มาบ้างหรือเปล่าคะ?"
33100-5 = "มีเรื่องราวมากมายที่ตัวตนของสิ่งที่อยู่เหนือคำอธิบายที่ถูกบังคับให้พ่ายแพ้และสูญสลายไป เพราะคำสัญญาเพียงหนึ่งคำ"
33100-6 = "ซึ่งแบบนั้น..."
33100-7 = "ถึงจะเป็นเพียงแค่กระดาษบางๆ แผ่นเดียวแต่ <สัญญา> จะเป็นสิ่งที่กำหนด บังคับ และผูกมัดเราได้"
33100-8 = "บรรทัดฐาน สัญญา... สิ่งเหล่านี้ก็เป็นแนวคิดที่สำคัญในคิโวทอสเช่นเดียวกับในเรื่องเล่าโบร่ำโบราณค่ะ"
33100-9 = "ตัวอย่างเช่น ในพระคัมภีร์ของทรีนิตี้ บัญญัติ 10 ประการและบัญญัติแห่งการกำเนิดโลกครั้งแรก#nถือเป็นสิ่งสำคัญ"
33100-10 = "มีเรื่องเล่าว่าที่พวกเราถูกขับไล่ออกจากสวรรค์ก็เพราะว่าเราผิด <สัญญา> พวกนั้นค่ะ"
33100-12 = "... ที่จริงแล้วคุณเองก็น่าจะคุ้นชินกับอำนาจของคำสัญญานะคะ เพราะคุณเองก็ได้ใช้มันเพื่อช่วยใครบางคนเอาไว้"
33100-14 = "<สัญญา> ที่ <เกมาเทรีย> เสนอให้แก่นักเรียนของ <อะบิดอส>…"
33100-15 = "เมื่อไม่สามารถเจรจาสัญญาได้สำเร็จ เกมาเทรียจึงต้องล่าถอยไปอย่างช่วยไม่ได้..."
33100-17 = "..."
33100-18 = "สิ่งที่เกิดขึ้นในตอนนี้ก็เป็นเช่นเดียวกันค่ะ"
33100-19 = "สนธิสัญญาเอเดนเป็นข้อตกลงระหว่างโรงเรียนหนึ่งกับโรงเรียนหนึ่งก็จริง... "
33100-20 = "แต่เมื่อพิจารณาถึงสถานที่พิเศษที่ใช้จัดพิธีลงนาม"
33100-21 = "เหล่าตัวแทนที่มารวมกันเพื่อลงนาม..."
33100-22 = "สควอดของอาเรียสได้ใช้สิ่งเหล่านี้บิดเบือนสนธิสัญญาเอเดนเพื่อสร้างเงื่อนไขให้เกิด <การประชุมสภา>  ขึ้นอีกครั้งค่ะ"
33100-23 = "และ <สาวกยูสตาร์> ที่เป็นผู้ดูแลบรรทัดฐานที่ลงนามได้ถูกพามายังสถานที่แห่งนี้ด้วยวิธีพิเศษ"
33100-24 = "หรือกล่าวอีกนัยหนึ่งก็คือ พวกเขาบิดเบือนสัญญาเพื่อให้ได้ผลลัพธ์ตามที่ตั้งใจเอาไว้..."
33100-25 = "หรือวิธีนี้จะเป็น <วิธีการของผู้ใหญ่> ที่เกมาเทรียพูดถึงหรือเปล่าคะ?"
33100-26 = "..."
33100-27 = "อา... ค่ะ ฉันได้สังเกตพวกเขาผ่านทางความฝันของคุณเท่านั้น "
33100-28 = "เพราะตัวตนที่ยากจะหยั่งถึงอย่างพวกเขา อยู่เหนือขอบเขตความเข้าใจของฉันค่ะ"
33100-29 = "ใช่ค่ะ ผู้ที่อยู่ฉากหลังการลงมือของอาเรียสก็คือ <เกมาเทรีย> "
33100-30 = "ตอนนี้อาเรียสได้กองกำลังที่ไม่มีวันตาย และไม่มีวันล้มล้างได้ไปอยู่ในกำมือแล้ว"
33100-32 = "ซึ่งก็ได้มาจากสนธิสัญญาที่มีนามแห่งสรวงสรรค์ที่เราถูกขับไล่มา... สนธิสัญญาเอเดน"
33100-35 = "อ๊ะ---!!!"
33100-44 = "..."
33100-45 = "อืม..."
33100-46 = "อา... คงเจ็บมากเลยสินะคะ..."
33100-51 = "อ่อนหัดจริงๆ "
33100-52 = "โจมตีโดยไร้การวางแผนงั้นเหรอ ยังสติดีอยู่รึเปล่า อาซึสะ?"
33100-53 = "ความสามารถพิเศษของเธอคือการต่อสู้แบบซุ่มโจมตีคู่ต่อสู้ไม่ใช่รึไง มาสู้กันซึ่งๆ หน้ากับฉันแบบนี้ คิดว่าจะชนะฉันได้งั้นเหรอ?"
33100-57 = "อะ...อึ่ก..."
33100-58 = "อะ...เธอ... ทำอะไรลงไป... ซาโอริ..."
33100-59 = "... เหลือเวลาเท่าไร?"
33100-60 = "อีกประมาณห้านาที จากนั้นกองกำลังเสริมของทั้งสองโรงเรียนก็จะมาถึงที่นี่ และปะทะกันที่นี่"
33100-61 = "แค่นั้นก็เพียงพอแล้วล่ะ ลุกขึ้นมาซะ"
33100-68 = "มาหาฉันเองถึงที่นี่ ช่วยให้เรื่องมันง่ายขึ้นเยอะเลยนะ อาซึสะ"
33100-69 = "..."
33100-70 = "ถึงเรื่องที่เธอทรยศจะทำให้แผนของเราต้องเปลี่ยนไปนิดหน่อย... แต่ที่จริงมันก็ไม่ได้แตกต่างจากเดิมเท่าไรหรอก"
33100-71 = "เดิมทีมิกะควรจะต้องมาที่นี่... แต่ช่างเถอะ ยังไงซะยัยโง่นั่นก็หมดประโยชน์แล้ว"
33100-72 = "ตัวอันตรายแท้จริงก็คือนางิสะมากกว่า... แต่โชคดีที่เธอเข้าร่วมพิธีลงนามไปโดยไม่ถูกสงสัยอะไร"
33100-73 = "ส่วนเรื่องที่จัดการชมรมซิสเตอร์ได้ถือว่าเป็นผลพลอยได้ที่เหนือความคาดหมาย..."
33100-74 = "จริงสิ... อยากรู้ใช่มั้ยว่าฉันทำอะไรไป ก็ได้ ฉันจะบอกให้ก็แล้วกัน"
33100-75 = "พวกเรา... ชิงสนธิสัญญาเอเดนมาแล้ว"
33100-76 = "..."
33100-77 = "แค่เอามิสไซล์นำวิถียิงไปที่วิหารโบราณที่ใช้ลงนามสนธิสัญญา และกำจัดตัวเกะกะ จากนั้น... พวกเราก็เข้าไปแก้ไข บิดเบือนเนื้อหาสนธิสัญญา"
33100-81 = "ทำหน้าเหมือนไม่เข้าใจเลยนะ"
33100-82 = "ลืมแล้วเหรอ อาซึสะ พวกเราเองก็มีสิทธิ์ในการเป็นตัวแทนของทรีนิตี้"
33100-83 = "..."
33100-84 = "จะมองว่าสนธิสัญญานี่เป็นการเปิดประชุมสภาครั้งที่ 1 ใหม่ก็ได้ เพราะครั้งนั้นอาเรียสไม่ได้เข้าร่วมการประชุมสภาทั้งที่ทุกกลุ่มในทรีนิตี้เข้าร่วมด้วย"
33100-85 = "เพราะงั้นเลยมองได้ว่าพวกเรายังมีสิทธิ์อยู่"
33100-86 = "ในข้อความที่ระบุไว้ว่า <เมื่อมีข้อพิพาทเกิดขึ้นระหว่างเกเฮนน่าและทรีนิตี้ ข้อพิพาทนั้น#nจะต้องได้รับการแก้ไขผ่านองค์การสนธิสัญญาเอเดนเท่านั้น>... "
33100-87 = "ฉันก็แค่เพิ่มข้อความว่า <อย่างไรก็ตามองค์การสนธิสัญญาเอเดนนั้นจะอยู่ภายใต้การดูแลของ#nทางอาเรียส> เข้าไปก็แค่นั้นเอง"
33100-88 = "คะ...แค่นั้นอาจจะไม่มีความหมายอะไรก็จริง ตะ...แต่ว่า... ความจริงของบรรทัดฐานนั่น..."
33100-99 = "<สาวกยูสตาร์>"
33100-100 = "ผู้ปกป้องบรรทัดฐาน กลุ่มกองกำลังในตำนานของทรีนิตี้"
33100-101 = "ถ้าให้พูดเจาะจงละก็ พวกมิเมซิสนั่น... ก็คือผู้ที่ช่วยเหลือพวกเราและเป็นผู้ที่ปกป้องบรรทัดฐานนั่นด้วย"
33100-102 = "ความเป็นปรปักษ์ต่อกันระหว่างทรีนิตี้และเกเฮนน่าจะถูกตัดสินว่าเป็นการละเมิดบรรทัดฐาน#nโดยไม่มีการละเว้น"
33100-104 = "เข้าใจแล้ว..."
33100-105 = "การโจมตีนี้ไม่แค่เพื่อกำจัดผู้นำของแต่ละโรงเรียนและสร้างสถานการณ์ความวุ่นวาย"
33100-106 = "แต่เพื่อรื้อสนธิสัญญาเอเดน... และขยายกองกำลังลึกลับนั่น..."
33100-107 = "(ภาษามือ)"
33100-108 = "ไม่... แบบนั้นไม่ได้หรอก อาสึโกะ ฉันจะไม่กลับไปแล้วล่ะ"
33100-109 = "เลิกคิดเถอะองค์หญิง มันไม่มีประโยชน์หรอก ยัยนั่นหัวรั้นแบบนี้มาตั้งแต่ไหนแต่ไรแล้วนี่"
33100-110 = "จริงสิ... พอมาคิดๆ ดูแล้ว คงจะมีผู้ใหญ่ที่คอยสปอยเด็กหัวรั้นแบบนี้อยู่ด้วยสินะ"
33100-111 = "ผู้ใหญ่ชั่วร้ายที่คอยพร่ำสอนคำโกหก และบิดเบือนความเป็นจริงของโลกใบนี้"
33100-112 = "ฉันกำจัดครูแบบนั้นไปแล้ว เพราะงั้นตอนนี้ค่อยๆ สอนใหม่ตั้งแต่ต้นก็ได้"
33100-113 = "คุณครู...!!"
33100-114 = "นั่นสิ... เธอดูสนุกมากเลยนะ ตอนอยู่ที่ทรีนิตี้นั่นน่ะ"
33100-115 = "ชีวิตแบบนั้นสนุกมากนักรึไง? เพราะมีคนที่ถูกใจอยู่ด้วยงั้นเหรอ? หรือเพราะมีคนที่เข้าใจเธออยู่ด้วยกันล่ะ?"
33100-116 = "ไร้สาระสิ้นดี"
33100-117 = "คนที่ยอมรับและเข้าใจเธออย่างแท้จริงน่ะ มีแค่พวกเราเท่านั้นล่ะ เพราะที่นี่คือที่ที่เธอสมควรอยู่ยังไงล่ะ"
33100-118 = "เธอหันหลังให้กับความจริงเรื่องนี้ และไปเชื่อคำโกหกแสนหวานพวกนั้น ความอ่อนแอของเธอนั่นล่ะ ที่ทำให้เธอพ่ายแพ้"
33100-119 = "อยากขัดขวางพวกเรานักใช่มั้ย?"
33100-120 = "ก็ได้ ถ้าอย่างนั้นก็ทำลายฮาโลของฉันให้ได้ซะสิ อาซึสะ..."
33100-121 = "...!!"
33100-122 = "ตราบใดที่พวกเรายังเป็นส่วนสำคัญของสนธิสัญญา บรรทัดฐานนี้ก็จะคงอยู่ตลอดไป"
33100-123 = "ไม่มีวิธีอื่นที่จะหยุดพวกเราได้หรอก..."
33100-124 = "แต่ว่าเธอจะทำได้รึไง? ทั้งที่ทิ้งภารกิจเรื่องยัยเซอานั่นมา"
33100-125 = "...!!"
33100-126 = "ตลบหลังพวกเราแล้วคิดจะอยู่ที่นั่นอย่างหน้าชื่นตาบานเหรอ ไม่ไหวหรอกนะ"
33100-127 = "ตอนนี้ก็ขึ้นอยู่กับเวลาแล้ว พวกเราจะไปหายัยเซอา แล้วสานต่อภารกิจที่เธอทำล้มเหลวเอง"
33100-132 = "ตุ๊กตา...?"
33100-138 = "!!"
33100-142 = "อาซึสะ!! คิดจะหนีอีกแล้วงั้นเหรอ!!"
33100-143 = "หัวหน้า การจู่โจมสนับสนุนจากกองกำลังของสภาน้ำชา พวกนั้นตอบโต้เร็วกว่าที่คิดไว้"
33100-148 = "แถมยังมีปืนครกขนาด 50 มม. ยิงสนับสนุนมาจากฝ่ายตรงข้ามด้วย หน่วยสนับสนุนของคณะกรรมการวินัย พลขว้างระเบิดเริ่มตอบโต้แล้ว"
33100-149 = "ตอบโต้ไวกว่าที่คิดอีกแฮะ ทั้งที่ฮินะคนนั้นไม่อยู่แท้ๆ แต่ยังทำได้ขนาดนี้..."
33100-153 = "เกเฮนน่าบุกทะลวงเข้ามาจากด้านหลังได้แล้ว!! กำจัดเจ้าพวกนั้นซะ แล้วรีบช่วยผู้บาดเจ็บเร็วเข้า!!"
33100-154 = "เริ่มมองเห็นชัดขึ้นแล้วค่ะ!!"
33100-155 = "...!! มองเห็นแล้วค่ะ! หน่วยพลขว้างระเบิดของเกเฮนน่าอยู่ที่ด้านหน้านี้ค่ะ!!"
33100-157 = "กล้าดียังไงถึงทำกับท่านประธานแบบนั้น...!! ยกโทษให้ไม่ได้เด็ดขาด!! กำจัดพวกทรีนิตี้ และไปช่วยท่านประธาน เร็วเข้าค่ะ!!"
33100-158 = "หน่วยกองหลังคนอื่นๆ รีบค้นหาผู้บาดเจ็บเร็วเข้าค่ะ! "
33100-159 = "เจ้าหน้าที่อาวุโส... แผลนั่น..."
33100-161 = "แผลแค่นี้ไม่เท่าไรหรอกค่ะ รีบไปเร็ว!! รีบหาท่านประธานให้เจอเร็วเข้าเถอะค่ะ!"
33100-169 = "ยะ...ยืนยันแล้วว่ากองกำลังเสริมของเกเฮนน่าและกองกำลังของสภาน้ำชาที่รออยู่ด้านนอกวิหาร#nโบราณเริ่มเคลื่อนไหวแล้วค่ะ!"
33100-170 = "อีกไม่นานกองพลรถถังของทั้งสองโรงเรียนก็จะมาถึงที่นี่ค่ะ"
33100-171 = "อาซึสะ..."
33100-172 = "เอาไว้ค่อยคิดเรื่องอาซึสะเถอะ หัวหน้า ตอนนี้จะเอายังไงต่อ?"
33100-173 = "..."
33100-174 = "ควบคุมสภาและสาวกได้แล้ว"
33100-175 = "ภารกิจต่อไปก็คือการใช้เส้นทางใต้ดินแทรกซึมเข้าไปทางด้านหลังของเขตปกครองตนเอง และจัดการทรีนิตี้ให้ราบคาบ"
33100-177 = "ที่ที่ชิราสึ อาซึสะอยากใช้ชีวิตอยู่... ฉันจะไม่ปล่อยให้มีที่แบบนั้นเด็ดขาด ทำลายทุกอย่างให้ย่อยยับ แม้แต่อิฐสักก้อน ต้นไม้สักต้น... ก็อย่าให้เหลือ"
33100-178 = "ฮะ...เฮือก... นี่เป็นราคาของการทรยศงั้นเหรอคะ..."
33100-179 = "..."
33100-180 = "... เกเฮนน่าที่ไม่มีฮินะ... คือเป้าหมายต่อไปงั้นเหรอ ได้อยู่แล้ว หัวหน้า"
33100-181 = "เราเคยลอบเข้าไปในทรีนิตี้หลายครั้งแล้วตอนที่บุกโจมตีนางิสะกับเซอา ส่วนเกเฮนน่าที่ไม่มีฮินะ...ก็คงจะยุ่งเหยิงไม่น้อย"
33100-182 = "ถ้างั้น... จนกว่าจะแน่ใจได้เรื่อง <อาวุธยุทธวิธี> ตามที่เจ้าตุ๊กตาไม้นั่นสัญญาเอาไว้ เราก็รออยู่ที่นี่แล้วก็จัดการกับกองกำลังเสริมของทั้งสองโรงเรียนนั่นก็พอแล้วนี่นา"
33100-187 = "อา... ใช่แล้ว ถ้างั้นลงไปทักทายกันหน่อยดีมั้ย"
33100-188 = "พวกทรีนิตี้ที่ทำให้อาเรียสต้องเจ็บปวดทรมาน กับเจ้าพวกเกเฮนน่าที่น่ารังเกียจ..."
33100-189 = "คะ?! จะ...จะต่อสู้กันเหรอคะ? ที่นี่เหรอคะ?"
33100-190 = "ค่ะ... ตะ...ต้องเจ็บแน่ๆ เลยค่ะ... คงต้องเจ็บมากแน่ๆ เลย... แต่ก็ช่วยไม่ได้นะคะ... ฮิฮิฮิ"
33100-200 = "เอาล่ะ... <เหล่าสาวก> เอ๋ย... ทำตามคำสั่งของ ETO และกำจัด <ผู้ก่อข้อพิพาท> เหล่านั้นซะ!"
33100-207 = "นะ...นั่นมันอะไรน่ะ!!"
33100-208 = "อ๊าาา-!! วะ...วิญญาณ?!"

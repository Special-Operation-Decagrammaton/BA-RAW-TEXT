[translation]
33100-1 = "Episode 10;Sweet Lies"
33100-3 = "Sensei, you're an outsider to Kivotos, so surely you understand the importance of promises such as contracts, deals...and other similar bindings, correct?"
33100-4 = "Have you ever heard the phrase, \"making a deal with the devil\"?"
33100-5 = "History is full of tales of transcendental entities being defeated by the very promises they made."
33100-6 = "It makes you think, doesn't it?"
33100-7 = "A promise can bind you, control you—even define you. Whether it's spoken or even on a scrap of paper."
33100-8 = "Contracts, commandments, promises... These are fundamentally important to the foundation of Kivotos, just like in tales of old."
33100-9 = "For example, Trinity's scriptures tell of the ten commandments our ancestors promised to keep with the divine."
33100-10 = "The text also tells us that, long ago, we were expelled from paradise for breaking that promise."
33100-12 = "But you're already familiar with the power of a promise.#nYou used it to save someone."
33100-14 = "Recall what Gematria required of the Abydos students—a contract..."
33100-15 = "But once that contract was rendered invalid, Gematria had no choice but to retreat."
33100-17 = "..."
33100-18 = "This incident is similar. "
33100-19 = "At its core, the Eden Treaty is an agreement between two academies. "
33100-20 = "However, consider the special site in which it was to be held. "
33100-21 = "Also evaluate the authority held by the representatives gathered to finalize the treaty."
33100-22 = "The Arius Squad used these elements to twist the Eden Treaty into recreating the conditions of the First Council."
33100-23 = "Even the guardians of the original commandments, the Saint Justina Council, were brought forth via Mimesis."
33100-24 = "In other words, they've twisted the contract and manipulated its outcome for their own gain."
33100-25 = "Much like how Gematria said adults should act, isn't that right?"
33100-26 = "..."
33100-27 = "Let me be clear. I know of that because I've been observing them through your dreams. "
33100-28 = "They're beyond my understanding, I'm afraid. Incomprehensible."
33100-29 = "But, yes. Gematria are the ones backing Arius. "
33100-30 = "Now Arius has a formidable army at their disposal that will not relent and cannot die."
33100-32 = "And they've done it under the name of the same paradise from which we were expelled: Eden."
33100-35 = "AHHHHHH!"
33100-44 = "..."
33100-45 = "..."
33100-46 = "Oof. That looked like it hurt."
33100-51 = "So naive. "
33100-52 = "Attacking without thinking. Have you lost your touch, Azusa?"
33100-53 = "Guerrilla warfare is your specialty. Outwit and attack the enemy when they're at their most vulnerable. Are you foolish enough to think you had a chance attacking me head on?"
33100-57 = "G-Gahhh..."
33100-58 = "Saori... What have you done? What are you hoping to...accomplish...?"
33100-59 = "How much time do we have?"
33100-60 = "About five minutes. Both academies' reserve forces will have grasped the situation and arrived by then."
33100-61 = "That should be enough. Stand her up."
33100-68 = "You saved me the trouble of finding you, Azusa."
33100-69 = "..."
33100-70 = "Your betrayal caused us to change our plans somewhat, but in the end, it was nothing we couldn't account for."
33100-71 = "I expected Mika to join us today, but we have no use for that foolish girl anymore regardless."
33100-72 = "Nagisa was a threat, but even she didn't suspect what would happen by simply attending the signing ceremony."
33100-73 = "Even the Sisterhood has been disposed of—an added bonus."
33100-74 = "So allow me to answer your questions."
33100-75 = "We've stolen the Eden Treaty."
33100-76 = "..."
33100-77 = "We dropped a cruise missile on the cathedral playing host to the ceremony, wiped out the zealots, and captured the treaty for ourselves."
33100-81 = "You seem confused."
33100-82 = "Did you forget, Azusa? We're entitled to represent Trinity."
33100-83 = "..."
33100-84 = "Consider this treaty the revival of the First Council—the time where all factions that would make up Trinity gathered. All except Arius."
33100-85 = "By reenacting that day, we still have authority."
33100-86 = "The Treaty reads, \"When a dispute arises between Trinity and Gehenna, the dispute shall be resolved through the Eden Treaty Organization...\" "
33100-87 = "All we did was add to that clause. It continues to say, \"...and Arius Satellite School's Squad shall act as said Eden Treaty Organization.\""
33100-88 = "Th-That by itself wouldn't mean much. Well, if not for the commandments that is."
33100-99 = "The Saint Justina Council."
33100-100 = "The guardians of the commandments and Trinity's legendary armed forces."
33100-101 = "To be exact, the ones before are just Mimesises, but they'll carry out their sacred duty all the same. "
33100-102 = "Any hostilities between Trinity and Gehenna will be considered a violation of the divine commandments and will be handled accordingly."
33100-104 = "Now I understand."
33100-105 = "This attack wasn't about eliminating the leaders of both academies or causing chaos."
33100-106 = "This was about revising the Eden Treaty and securing those mysterious soldiers."
33100-107 = "(sign language)"
33100-108 = "No, Atsuko. I can't go back."
33100-109 = "It's useless to try to win her over, Hime. This one's will is too stubborn to be broken so easily."
33100-110 = "That's right. There's been someone by her side encouraging that stubbornness, hasn't there?"
33100-111 = "A wicked adult that distorts the truth of this world and has filled your head with lies."
33100-112 = "But now they've been dealt with. We can begin re-educating you slowly, from the very beginning. There's no rush."
33100-113 = "What have you done to Sensei?!"
33100-114 = "You seemed to be enjoying yourself at Trinity."
33100-115 = "Were you having fun? Did you take a liking to those people and think that they understood you?"
33100-116 = "How futile."
33100-117 = "We're the only ones who could ever understand you. We're the only ones who would accept the real you. This is where you belong."
33100-118 = "You've averted your eyes from the truth and been blinded by nothing but sweet lies. Your weakness is to blame for your defeat."
33100-119 = "Do you wish to stop us?"
33100-120 = "Then destroy my halo, Azusa."
33100-121 = "...!"
33100-122 = "The commandments will last for eternity so long as we, the arbiters of this treaty, still exist."
33100-123 = "There's no other way to stop us."
33100-124 = "But ask yourself: Are you truly capable of that? You failed your mission to destroy Seia's halo."
33100-125 = "...!"
33100-126 = "You did your best to wash your hands of the matter. You even tried to deceive us. But in the end, you don't have what it takes."
33100-127 = "It's only a matter of time before we find Seia again and finish what you couldn't."
33100-132 = "What is this? A stuffed animal?"
33100-138 = "...!"
33100-142 = "Azusa! Still trying to run away?!"
33100-143 = "That was one of the Tea Party's support unit's artillery, Leader. They responded quicker than expected."
33100-148 = "We're taking fire from 50 millimeter mortars in the other direction as well. Those must be Prefect Team grenadiers."
33100-149 = "They also responded quicker than expected, even with Hina indisposed."
33100-153 = "Gehenna has betrayed us! Defeat them, and save the wounded!"
33100-154 = "Visibility improving!"
33100-155 = "Gehenna grenadiers spotted up ahead!"
33100-157 = "How dare they lay a finger on the head prefect. They must pay for this. Wipe out Trinity's forces and save the president!"
33100-158 = "Support units, seek out and aid the wounded! "
33100-159 = "What about you, Senior Administrator? You're wounded."
33100-161 = "Never mind me! All that matters is finding and securing the head prefect!"
33100-169 = "I-I've confirmed Gehenna and the Tea Party's reserve forces standing outside the cathedral have also begun to move!"
33100-170 = "Both academies' armored divisions will be here soon."
33100-171 = "Azusa..."
33100-172 = "We can deal with her later, Leader. What are your orders?"
33100-173 = "..."
33100-174 = "We've secured the Council."
33100-175 = "Next is Trinity. We'll use the underground passageways to infiltrate their campus."
33100-177 = "Even if it was just for a time, Azusa came to call that place her home. She sought to replace where she came from with those delusions. So I'll erase it—there won't be a single trace left."
33100-178 = "Th-That's what she gets for her treachery, huh?"
33100-179 = "..."
33100-180 = "We've infiltrated Trinity's inner grounds before during the attacks on Seia and Nagisa. This should be simple enough."
33100-181 = "As for Gehenna, they can be dealt with at a later time. They're no threat without Hina. I have no objections, Leader."
33100-182 = "I suggest we wait here until that wooden doll secures the tactical weapon we were promised. We can deal with the tanks and reserve forces in the meantime."
33100-187 = "I suppose that would be for the best. Let's show them just who they're dealing with."
33100-188 = "Welcome, Trinity—the originators of our suffering—and the contemptible recreants from the pits of Gehenna!"
33100-189 = "Wh-Wha...?! We're gonna fight them here after all?"
33100-190 = "Oh. Th-That's gonna be tough—really tough...but I guess there's no getting around that, huh? Heh..."
33100-200 = "Hear my words, Council! Follow the orders of the ETO and eliminate these heretics!"
33100-207 = "Wh-Who are they?!"
33100-208 = "A-Are these ghosts?! Ahhhhh!"
33100-216 = "Next Episode;Aggravated Confusion Part 1"

33100-1 = "#title;제10화;달콤한 거짓"
33100-2 = "3;세이아;01\n#3;a\n#wait;1500"
33100-3 = "3;세이아;02;선생님. 당신은 키보토스의 외부에서 오신 분이니까 계약, 거래…… 그런 약속들이 가지는 중요성을 잘 알고 계실 겁니다."
33100-4 = "3;세이아;01;……악마와의 계약, 이라는 관용구를 들어보셨나요?"
33100-5 = "3;세이아;01;초월적인 존재가 자신이 한 약속 때문에 어쩔 수 없이 패배하고 사라진다는 옛이야기는 흔히들 있어 왔죠.\n#3;em;…"
33100-6 = "3;세이아;99;그런 식으로……"
33100-7 = "3;세이아;02;단순한 종잇조각에 불과할지라도, <약속>은 어떤 존재를 제약하고 구속하고 정의하기도 합니다."
33100-8 = "3;세이아;01;계약, 계율, 약속…… 옛이야기와 마찬가지로 그런 것들 또한 이 키보토스에서 중요한 개념입니다."
33100-9 = "3;세이아;01;가령, 트리니티의 경전에는 태초의 신성과 체결된 10개의 계명이 중요하게 묘사되어 있기도 하고,"
33100-10 = "3;세이아;99;우리들이 그 <약속>을 어겼기에 낙원에서 추방되었다고도 전해지죠."
33100-11 = "#all;hide"
33100-12 = "#na;세이아;……실제로 당신은 그런 부분을 이용해서 누군가를 구한 적도 있었습니다."
33100-13 = "#all;hide"
33100-14 = "#na;세이아;<게마트리아>가 아비도스의 학생에게 요구한 것도 결국은 <계약>이었으니……."
33100-15 = "#na;세이아;계약 자체가 성립되지 못하게 되자, 게마트리아는 물러날 수밖에 없었겠죠."

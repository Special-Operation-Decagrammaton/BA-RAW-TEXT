33100-21 = "3;세이아;02;조약을 체결하기 위해 모인 대표자들의 자격……."
33100-22 = "3;세이아;01;그런 요소들을 이용해서, 아리우스 스쿼드는 에덴조약을 계율이 체결되는 <공의회>로 여겨지도록 왜곡시킨 것입니다."
33100-23 = "3;세이아;01;그리고, 체결된 계율을 수호하는 <유스티나 성도회>를 그들의 [ruby=미메시스]특수한 방법[/ruby]으로 이곳에 현현시킨 것이죠."
33100-24 = "3;세이아;99;즉, 계약을 곡해하고 왜곡해서 자기들의 의도대로 결과를 조작한 것……이라고 볼 수 있겠죠.\n#3;em;…"
33100-25 = "3;세이아;02;그게 바로 게마트리아가 말하는 <어른의 방식>인 걸까요."
33100-26 = "3;세이아;01;……."
33100-27 = "3;세이아;99;……아아. 네. 저는 그들을 당신의 꿈을 통해서만 관측했을 뿐입니다."
33100-28 = "3;세이아;08;그들 같은 불가해한 존재는 제 이해의 범위를 넘어서니까요."
33100-29 = "3;세이아;01;……결국 아리우스의 배후에는 <게마트리아>가 있었고,"
33100-30 = "3;세이아;02;아리우스는 이제, 죽지도 않고 사라지지 않는 거대한 군대를 손에 넣게 된 것입니다."

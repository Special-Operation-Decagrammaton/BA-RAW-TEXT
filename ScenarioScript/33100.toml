[translation]
33100-1 = "第10話;甘い嘘"
33100-3 = "先生、君はキヴォトスの外部から来た者であり大人だ。となれば、契約、取引……そういった「約束事」の持つ重要性について、よく知っていることだろう。"
33100-4 = "たとえば「悪魔と契約する」、という言い回しがあるだろう？"
33100-5 = "昔話においても「驚異的な存在が何か不注意な約束をしてしまったがために敗北する」、あるいは逆に「そういった約束によって打ち勝つ」というお話は幾つもある。"
33100-6 = "そこからは、こうも読み取れないかい？"
33100-7 = "単純な紙切れ、或いは口約束に過ぎないとしても……「約束」というものは時に何かを強く拘束し、定義付けることもある。"
33100-8 = "契約、戒律、約束……こういったものはそれら昔話と同様に、キヴォトスにおいても重要な概念だ。"
33100-9 = "例えばトリニティの経典には太古の始まりの「神性」、そしてそれとの間に締結された10の戒命が描かれている。"
33100-10 = "その他にも、私たちは原初において「約束」を破ったから楽園から追放されたのだ……そのようなことも書き伝えられている。"
33100-12 = "……今さらな話かな。なにせ実際に君は、そういった概念を利用して誰かを救ったことがあったはずだ。"
33100-14 = "思い出してほしい。「ゲマトリア」はアビドスの生徒に何かを強いることはできず、ただ「契約」を要求していた。"
33100-15 = "その契約が成立しないとなれば、ゲマトリアは退くしかなかっただろう。"
33100-17 = "……。"
33100-18 = "この事件もまた、つまりはそういうこと。"
33100-19 = "「エデン条約」、これ自体が学園間で行われる約束事であることは確かだ。"
33100-20 = "しかし、この条約が行われる「特別な場所」……"
33100-21 = "そして条約締結のために集まった、代表者たちの資格。"
33100-22 = "こういった要素により、これは大きな意味を持つ「約束」となった。歪曲されつつも、これは明らかに「公会議」の再現。"
33100-23 = "そしてその約束である「戒律」を守護するユスティナ聖徒会を、特殊な方法で「[ruby=ミメシス]複製[/ruby]」として顕現させた。"
33100-24 = "つまるところ、契約を曲解し、歪曲し、自分たちの望む結果を捏造した……そうまとめても良いだろう。"
33100-25 = "これがゲマトリアの言う、「大人のやり方」……。"
33100-26 = "……。"
33100-27 = "……ああ。念のために言っておくが、私はこれらのことを事前に全て知っていたわけではないよ。あくまで君の夢を通じて、観測しただけだ。"
33100-28 = "あれらは私の基本的な理解を超えた、不可解な存在だからね。"
33100-29 = "形式的な話から離れると、つまるところ……アリウスの背後には「ゲマトリア」がいて。"
33100-30 = "アリウスは倒れることも死ぬことも無い、強大な軍隊を手に入れた。これが現在の状況にして事実。"
33100-32 = "私たちがかつて追放された楽園……「エデン」、その名を冠する条約のもとに。"
33100-35 = "あああぁぁぁぁぁっ！！"
33100-44 = "ふぅ……。"
33100-45 = "……。"
33100-46 = "あ、あぁ……い、痛そうですねぇ……。"
33100-51 = "……相変わらず未熟だ。"
33100-52 = "何も考えずに突撃とは、正気かアズサ？"
33100-53 = "お前の特技はゲリラ戦、その中で相手の隙を突くことだ。それは自覚しているだろうに、私と正面から戦って勝てるとでも思ったのか？"
33100-57 = "ぐっ、うぅっ……！"
33100-58 = "サオリ……この状況、何が目的だ……。"
33100-59 = "……ミサキ、残りの時間は？"
33100-60 = "あと5分ぐらい。そろそろ状況を把握して、両学園の予備兵力が到達する頃だと思う。"
33100-61 = "十分だな……起こせ。"
33100-68 = "お前がわざわざ来てくれて、手間が省けた。"
33100-69 = "……。"
33100-70 = "お前の裏切りによって、多少計画にズレは生じたが……まあ誤差の範疇だ。"
33100-71 = "本来ならこの場に来るのは、ミカだと読んでいた。しかしあのバカはもう使えない。"
33100-72 = "となると危険分子はナギサだったが、幸いにも何の疑いも無く調印式に参加した。"
33100-73 = "シスターフッドまで一気に処理できたことは、まあ予想外の成果だったな。"
33100-74 = "……何が起きているのか、教えてやろう。"
33100-75 = "私たちは、「エデン条約」を奪い去った。"
33100-76 = "……。"
33100-77 = "条約が締結される古聖堂に巡航ミサイルをねじ込み、邪魔者たちを片付けた、そして条約の内容をねじ曲げたのさ。"
33100-81 = "「理解できない」、という顔だな。"
33100-82 = "……アズサ、忘れた？私たちには「トリニティ」としての資格がある。"
33100-83 = "……。"
33100-84 = "この条約は「第一回公会議」の再現。あの時までは各派閥がそれぞれ権力を持っていた。そして公会議当日、全ての派閥が集まって新たなトリニティとなった……ただし、私たち「アリウス」を除いて。"
33100-85 = "だから私たちは何も変わっていない。まだ形式としては、権限を持っている。"
33100-86 = "「トリニティとゲヘナの間で紛争が起きた時、[ruby=Eden Treaty Organization]「エデン条約機構」[/ruby]がそこに介入し、紛争を解決する」……"
33100-87 = "これがエデン条約。ただそこに、「[ruby=Eden Treaty Organization]エデン条約機構[/ruby]はアリウススクワッドが担う」と書き添えた。ただそれだけ。"
33100-88 = "そ、それだけでは大して、意味が無いようにも思えますが……戒律は本物なので、[ruby=ミメシス]複製[/ruby]できれば……。"
33100-99 = "「ユスティナ聖徒会」。"
33100-100 = "戒律の守護者にして、トリニティの伝説的な武力集団。"
33100-101 = "正確にはその[ruby=ミメシス]複製[/ruby]だが、戒律を守護する存在だ。すなわち、私たち「ETO」を助けることになる。"
33100-102 = "トリニティとゲヘナの敵対行為は、神聖なる戒律への違反行為。つまり紛争の原因であり、鎮圧対象だ。"
33100-104 = "……ようやく理解した。"
33100-105 = "この襲撃は単に各学園の首脳部を狙ったものでもなければ、事態を混乱させるためのものでもない。"
33100-106 = "エデン条約の書き換え……それによって、あの不可思議な兵力を確保することが目的だったのか……。"
33100-107 = "（スッ、ススッ、スーッ……）"
33100-108 = "……アツコ、それはできない。"
33100-109 = "やめておけ、姫。今は無駄だ。あいつの意地を折るのはそう簡単じゃない……前々からそうだろう？"
33100-110 = "……その意地を、思いを、すぐ傍で煽る存在がいたんだろうな。"
33100-111 = "この世界の真実を隠し、事実を歪めて、嘘を教える……そんな悪い大人が。"
33100-112 = "まあ、その先生も既に片付けた。だから後はもうゆっくり教え直せば良い。"
33100-113 = "……っ！！"
33100-114 = "……トリニティでは楽しそうだったな。"
33100-115 = "あの生活は楽しかったか？好きな人たちと一緒にいること、お前を理解してくれる人たちと一緒にいることは。"
33100-116 = "……虚しいな。"
33100-117 = "思い出せ。お前を理解して受け入れてくれるのは、私たちだけだ。ここがお前の居場所だ。"
33100-118 = "お前はその真実から目をそらし、甘い嘘に目がくらんだ。そしてその弱さが、お前をこうして敗北させている。"
33100-119 = "……私たちを止めたいか？"
33100-120 = "ならば私のヘイローを破壊してみろ、[ruby=しらす]白洲[/ruby]アズサ。"
33100-121 = "……！"
33100-122 = "条約の主体である私たちが存在する限り、この戒律は永続していくだろう。"
33100-123 = "ヘイローを壊しでもしない限りはな。"
33100-124 = "今のお前に足りないのは殺意だ……しかし、お前にそんなことができるか？あのセイアの任務からも逃げたお前が。"
33100-125 = "……っ！？"
33100-126 = "私たちを騙そうとしてまで、綺麗な場所に残ろうとする……そんなお前には無理だよ。"
33100-127 = "……セイアもこの後、すぐに見つけ出す。お前の後始末はこっちでしてやろう。"
33100-132 = "……ぬいぐるみ？"
33100-138 = "っ！？"
33100-142 = "また逃げる気か、アズサ！！"
33100-143 = "リーダー、ティーパーティー傘下の砲撃部隊みたい。予想より早かった。"
33100-148 = "反対側からは50mm迫撃砲……風紀委員会の予備部隊かな。"
33100-149 = "こっちも想像以上に早い、あのヒナがいない状況でも……。"
33100-153 = "先ほどゲヘナに後ろから刺されたという報告が！彼女たちを一刻も早く、始末せねば……！！"
33100-154 = "調印式会場にミサイルを打ってくるだなんて、ゲヘナの連中はどこまでも……！"
33100-155 = "……！前方にゲヘナの擲弾兵部隊を発見！"
33100-157 = "よくも、よくも委員長を……っ！絶対に許しません！トリニティを蹴散らして、一刻も早く委員長を見つけねば……！"
33100-158 = "後方部隊は、他の負傷者の捜索と救助を！私はすぐに……！"
33100-159 = "行政官、傷口が……。"
33100-161 = "私の傷なんて今はどうだって良いんです！早く見つけに行くんです！！早くっ！！"
33100-169 = "こ、古聖堂の外部に待機していた、ゲヘナとティーパーティーの予備兵力も動き出しを確認……！"
33100-170 = "もうすぐ両学園の制式戦車部隊が、この辺りを通るかと……。"
33100-171 = "アズサ……。"
33100-172 = "リーダー、アズサのことは一旦後で。これからどうする？"
33100-173 = "……。"
33100-174 = "「ユスティナ聖徒会」は確保できた。"
33100-175 = "次はトリニティだ。地下通路からトリニティ自治区の背後に回り込み、そこから蹴散らしていく。"
33100-177 = "あいつが少しでも身を置いていた場所……木の一本、枝の一つすら残さずに消し去ってやる……。"
33100-178 = "う、裏切りの代償、ですか……。"
33100-179 = "……。"
33100-180 = "……まあ、ヒナのいないゲヘナは後でも良いか。異論は無いよ、リーダー。"
33100-181 = "トリニティは、セイアとナギサの襲撃時に何度も侵入してる。風紀委員長を失ったゲヘナは、ただの寄せ集めに過ぎない。"
33100-182 = "……となると、あの木の人形が約束した「戦術兵器」を確保するまではひとまず待機。ここで適度に、両学園の戦車やら予備兵力を相手にすれば良さそうかな。"
33100-187 = "……そうだな。まあ、ここまで来た奴らに挨拶でもかましてやろう。"
33100-188 = "私たちを苦痛の果てに追いやった、憎きトリニティとゲヘナに……。"
33100-189 = "で、では、やっぱり戦うのですね？"
33100-190 = "つ、辛そうですね……すごく辛そうですが、し、仕方ないですよね……へへ。"
33100-200 = "さあ、「ユスティナ聖徒会」。私たち[ruby=Eden Treaty Organization]「エデン条約機構」[/ruby]を助け、「鎮圧対象」を制圧せよ。"
33100-207 = "あ、あれは何だ……！？"
33100-208 = "うわあぁぁっ！？ゆ、幽霊！？"
33100-216 = "次回;加速する混乱（１）"

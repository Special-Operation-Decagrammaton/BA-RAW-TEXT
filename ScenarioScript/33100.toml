[translation]
33100-1 = "第10話;甜蜜的謊言"
33100-3 = "老師，你是從奇普托斯外部來的大人。那樣的話，契約、交易……這些「承諾」所代表的重要性，你很清楚吧。"
33100-4 = "比如說，也有「和惡魔締結契約」這種說法對吧？"
33100-5 = "在傳說裡也有幾個「驚異的存在因為一時疏忽做了約定而敗北」，或者相反的「因為那種約定而勝利」這樣的故事。"
33100-6 = "從那之中，也可以這麼解讀吧？"
33100-7 = "單純的紙張，或者就算只是口頭上的承諾……「約定」這種東西有時會對某些事物施加強力的束縛，或是為其添上定義。"
33100-8 = "契約、戒律、約定……這些東西和傳說一樣，在奇普托斯也是重要的概念。"
33100-9 = "例如三一的聖典有著太古初始的「神性」，還有寫著和那之間締結的十的誡命。"
33100-10 = "除此之外，我們因為在原初打破了「約定」所以被樂園給流放……也寫著這樣的事。"
33100-12 = "……現在說或許太晚了吧。畢竟實際上，你應該已經拯救過利用這種概念的某個人了吧。"
33100-14 = "希望你回想起來。「蓋瑪特利亞」無法強迫阿拜多斯的學生做些什麼，只能向其要求「契約」。"
33100-15 = "那個契約不成立的話，蓋瑪特利亞也只能收手了吧。"
33100-17 = "……"
33100-18 = "這個事件說到底，也和那件事情一樣。"
33100-19 = "「伊甸園條約」本身確實是學園間進行的承諾。"
33100-20 = "不過，進行這項條約的「特別的場所」……"
33100-21 = "以及為了締結條約齊聚一堂的，代表者們的資格。"
33100-22 = "由於這些要素，它變成了擁有重大意義的「約定」。就算受到扭曲，這依然明顯是「公會議」的再現。"
33100-23 = "接著守護那項約定之「戒律」的優斯提娜聖徒會，被特殊的方法以「[ruby=Mimesis]複製[/ruby]」的方式顯現了。"
33100-24 = "也就是說，把契約曲解、扭曲，捏造成了自己期望的結果……可以這麼總結吧。"
33100-25 = "這就是蓋瑪特利亞說的，「大人的做法」……"
33100-26 = "……"
33100-27 = "……啊啊。以防萬一我先說，我並不是事前就知道這些事唷。終究只是透過你的夢境，進行了觀測而已。"
33100-28 = "因為那些是超越了我基本上的理解，無解的存在呢。"
33100-29 = "從形式上脫離的話，也就是說……奧利斯的背後有著「蓋瑪特利亞」。"
33100-30 = "奧利斯獲得了不會倒下也不會死亡的強大軍隊，這就是現在的狀況也是事實。"
33100-32 = "依據冠有過去我們受到流放的樂園……「伊甸園」之名的條約。"
33100-35 = "啊啊啊啊啊啊啊啊！！"
33100-44 = "呼……"
33100-45 = "……"
33100-46 = "啊，啊……很，很痛吧……"
33100-51 = "……還是一樣不成熟。"
33100-52 = "什麼都不思考進行突擊，瘋了嗎梓？"
33100-53 = "妳的特技是游擊戰，在其中攻擊對手的空檔。這點你明明有自覺，卻還認為能正面贏得了我嗎？"
33100-57 = "咕，唔唔……！"
33100-58 = "沙織……這個狀況，有什麼目的……"
33100-59 = "……美咲，剩下多少時間？"
33100-60 = "還有5分鐘左右。我想差不多是兩所學園掌握狀況、後備兵力抵達的時候了。"
33100-61 = "足夠了呢……架起來。"
33100-68 = "妳特地跑過來，省了我的麻煩。"
33100-69 = "……"
33100-70 = "雖然因為妳的背叛，讓計劃多少產生了一點差錯……不過只是誤差的範疇罷了。"
33100-71 = "原本認為來這裡的會是彌香。不過那個笨蛋已經沒用了。"
33100-72 = "那樣的話危險因子原本是渚，不過幸運的是，他毫不懷疑地參加了簽約儀式。"
33100-73 = "能夠連修女會也一起處理，這倒是意料之外的成果呢。"
33100-74 = "……發生了什麼，就由我來告訴妳吧。"
33100-75 = "我們奪走了「伊甸園條約」。"
33100-76 = "……"
33100-77 = "對締結條約的古教堂投入巡航導彈，清除了礙事者，接著扭曲了條約內容。"
33100-81 = "一副「無法理解」的表情呢。"
33100-82 = "……梓，你忘了嗎？我們有著身為「三一」的資格。"
33100-83 = "……"
33100-84 = "這項條約是「第一次公會議」的再現。在那之前各派系各自持有權力。然後公會議當天，全部派系聚集在一起成為了新的三一……只不過，我們「奧利斯」被排除在外。"
33100-85 = "所以我們什麼都沒有改變。只是在形式上，還持有著權限。"
33100-86 = "「三一和格黑娜之間發生紛爭時，[ruby=Eden Treaty Organization]『伊甸園條約機構』[/ruby]將介入，解決紛爭」……"
33100-87 = "這就是伊甸園條約。不過在這裡，加上了「[ruby=Eden Treaty Organization]伊甸園條約機構[/ruby]由奧利斯小隊擔任」。僅此而已。"
33100-88 = "雖，雖然妳可能會認為這樣並沒有，什麼意義……不過因為戒律是真的，只要能[ruby=Mimesis]複製[/ruby]的話……"
33100-99 = "「優斯提娜聖徒會」。"
33100-100 = "戒律的守護者，也就是三一傳說般的武力集團。"
33100-101 = "雖然正確來說是它的[ruby=Mimesis]複製[/ruby]，不過依然是守護戒律的存在。也就是說，會幫助我們「ETO」。"
33100-102 = "三一和格黑娜的敵對，是違背神聖戒律的行為。也就是紛爭的原因，同時也是鎮壓對象。"
33100-104 = "……終於理解了。"
33100-105 = "這個襲擊不單是瞄準各學園的高層部，也不是為了讓事態變得混亂。"
33100-106 = "伊甸園條約的篡改……藉此確保那個不可思議的兵力才是目的嗎……"
33100-107 = "（嘶，嘶嘶，嘶──……）"
33100-108 = "……敦子，那個我做不到。"
33100-109 = "放棄吧，公主。現在沒用的。那傢伙的固執沒那麼簡單就改變……從以前就是那樣吧？"
33100-110 = "……那份固執、思想，有個在身邊煽動的存在吧。"
33100-111 = "隱藏這個世界的真相，扭曲事實，傳授謊言……那樣邪惡的大人。"
33100-112 = "嘛，那個老師也清除了。所以之後再慢慢重新告訴妳就好。"
33100-113 = "……！！"
33100-114 = "……在三一很開心嘛。"
33100-115 = "那樣的生活開心嗎？和喜歡的人們在一起，和理解妳的人們在一起。"
33100-116 = "……真是徒勞呢。"
33100-117 = "想起來吧。理解妳並接納妳的，只有我們而已。這裡就是妳的容身之處。"
33100-118 = "妳將目光從真相移開，被甜美的謊言所蒙蔽。而那份懦弱，讓妳像這樣敗北了。"
33100-119 = "……想阻止我們嗎？"
33100-120 = "那就破壞我的光環吧，白洲梓。"
33100-121 = "……！"
33100-122 = "只要身為條約主體的我們還存在，這項戒律就會永遠持續下去吧。"
33100-123 = "除非光環遭到破壞。"
33100-124 = "現在的妳缺乏的是殺意……不過，妳能做到那種事嗎？那個連聖亞的任務也逃走的妳。"
33100-125 = "……！？"
33100-126 = "不惜欺騙我們，也想留在乾淨的地方……那樣的妳是沒辦法的。"
33100-127 = "……在這之後，我們也會馬上把聖亞找出來。妳的善後工作就由我們來做吧。"
33100-132 = "……玩偶？"
33100-138 = "！？"
33100-142 = "又想逃嗎，梓！！"
33100-143 = "隊長，似乎是茶會旗下的砲擊部隊。比預期的還快。"
33100-148 = "來自反方向的50mm迫擊砲……應該是風紀委員會的後備部隊。"
33100-149 = "這裡也比預期的還快，即使是那個陽奈不在的狀況也……"
33100-153 = "方才收到了被格黑娜從後方攻擊的報告！必須盡快把她們，處理掉……！！"
33100-154 = "竟然向簽訂儀式會場發射導彈，格黑娜的人真的是……！"
33100-155 = "……！前方發現格黑娜的擲彈兵部隊！"
33100-157 = "竟敢，竟敢把委員長……！絕對不可原諒！把三一驅除，必須盡快找到委員長……！"
33100-158 = "後方部隊，負責其他傷員的搜索和救助！我馬上……！"
33100-159 = "行政官，傷口……"
33100-161 = "我的傷現在怎麼樣都無所謂！快點去找！！立刻！！"
33100-169 = "也，也確認到在古教堂外部待機，格黑娜和茶會的後備兵力的出動……！"
33100-170 = "我想兩學園的制式戰車部隊，馬上就會經過這邊……"
33100-171 = "梓……"
33100-172 = "隊長，梓的事之後再說。接下來怎麼辦？"
33100-173 = "……"
33100-174 = "「優斯提娜聖徒會」已經確保了。"
33100-175 = "下一個是三一了。從地下通道繞到三一自治區的背後，從那邊開始驅逐。"
33100-177 = "只要是那傢伙有稍微待過的地方……一棵樹，就連一根樹枝也不留地抹消……"
33100-178 = "背，背叛的代價，是嗎……"
33100-179 = "……"
33100-180 = "……嘛，沒有陽奈的格黑娜之後再說也可以吧。我沒有異議唷，隊長。"
33100-181 = "三一在襲擊聖亞和渚時已經入侵好幾次了。失去風紀委員長的格黑娜，只是烏合之眾。"
33100-182 = "……這樣的話，在那個木製人偶確保約定的「戰術兵器」之前暫時待機。這裡就適度的，和兩學園的戰車和後備兵力當對手比較好吧。"
33100-187 = "……是啊。嘛，和來到這裡的傢伙打個招呼吧。"
33100-188 = "向把我們逼退到苦痛盡頭的，可恨的三一和格黑娜……"
33100-189 = "那，那麼，果然要戰鬥嗎？"
33100-190 = "很，很難受呢……雖然很難受，不，不過也沒辦法呢……嘿嘿。"
33100-200 = "來吧，「優斯提娜聖徒會」。幫助我們[ruby=Eden Treaty Organization]「伊甸園條約機構」[/ruby]，壓制「鎮壓對象」。"
33100-207 = "那，那是什麼……！？"
33100-208 = "唔哇啊啊啊！？幽，幽靈！？"
33100-216 = "下一話;加速的混亂（１）"

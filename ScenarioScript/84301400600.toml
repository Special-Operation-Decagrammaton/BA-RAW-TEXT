[translation]
84301400600-5 = "是我。"
84301400600-6 = "電腦或機器零件……像現在這種情況，我認為需要人手幫忙。"
84301400600-7 = "你的判斷是正確的，莉央。我正好需要協助。"
84301400600-8 = "可以幫我確認這是什麼嗎？"
84301400600-9 = "當然。"
84301400600-14 = "那是個可疑的零件。#n請馬上把它拿到這裡來吧。"
84301400600-15 = "嗯……不過這麼一來，工程師部的人該如何證明自己的清白呢……"
84301400600-16 = "我會在前衛君身上植入適當的惡意程式，並將其隱藏到連工程師部也無可奈何。"
84301400600-17 = "如果起因是那個晶片的事實被公開，將會影響到博覽會本身。#n為了實現我們的目標，不能讓別人看到那個晶片。"
84301400600-18 = "那種做法……不會讓你受到指責嗎？"
84301400600-22 = "那並不是現在的重點。"
84301400600-23 = "總之先隱密地回來一趟吧。#n詳細情形到時候再說。通訊到此為止。"
84301400600-27 = "看來得先想好藉口瞞過花凛同學和明日奈同學。"
84301400600-28 = "……"
84301400600-29 = "話說回來，莉央……"
84301400600-30 = "你這個人真是……"

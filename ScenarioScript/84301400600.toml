[translation]
84301400600-5 = "It's me."
84301400600-6 = "If you're dealing with software and hardware, you might need a hand identifying everything."
84301400600-7 = "Good call, Rio. I just happen to need exactly that."
84301400600-8 = "Can you tell me what this is?"
84301400600-9 = "Of course."
84301400600-14 = "It's very suspicious, that's what. I want you to bring it here immediately."
84301400600-15 = "Hm...but then there'd be no way for the Engineering Department to prove their innocence..."
84301400600-16 = "I'll handle that. I'll plant some appropriate malware in the Avant Guard unit. And I'll hide it well enough that they won't blame the Engineering Department for missing it."
84301400600-17 = "If they learn it's because of the chip, that could jeopardize the entire Expo. For our purposes, that chip has to stay under wraps."
84301400600-18 = "When they dig up the malware, they might accuse you of putting it there."
84301400600-22 = "That's not important right now."
84301400600-23 = "In any case, make your way back here, quietly. I'll tell you more once you get here. Rio out."
84301400600-27 = "I'll have to think of an excuse for Karin and Asuna."
84301400600-28 = "..."
84301400600-29 = "And as for you, Rio..."
84301400600-30 = "You really are..."

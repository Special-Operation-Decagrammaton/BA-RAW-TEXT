[translation]
84301400600-5 = "นี่ฉันเอง"
84301400600-6 = "ถ้าเป็นเรื่องคอมพิวเตอร์หรือชิ้นส่วนเครื่องจักรน่ะ... ในสถานการณ์นี้ ฉันว่าต้องมีคนที่ช่วยตรวจสอบ#nให้แล้วละ"
84301400600-7 = "เป็นการตัดสินใจที่ดีเลยค่ะ ริโอะ ฉันกำลังต้องการความช่วยเหลืออยู่พอดีเลย"
84301400600-8 = "ช่วยตรวจสอบให้ได้มั้ยคะว่าของชิ้นนี้คืออะไร?"
84301400600-9 = "ได้อยู่แล้ว"
84301400600-14 = "จากการวินิจฉัยของฉัน นั่นคือชิ้นส่วนที่น่าสงสัย ช่วยเอาชิ้นส่วนนั้นมาให้ฉันที่นี่หน่อยสิ"
84301400600-15 = "อืม... แต่ถ้าทำแบบนั้น แล้วจะพิสูจน์ความบริสุทธิ์ของชมรมวิศวกรรมได้เหรอคะ?"
84301400600-16 = "ฉันจะใส่ไวรัสไว้ในหุ่นรบล้ำยุคเอง ถ้าทำให้เหมือนว่าโชคร้ายติดไวรัส ก็จะไม่มีใครมองว่าตั้งใจทำผิด#nหรอก"
84301400600-17 = "เพราะถ้ามีการเปิดเผยว่าเป็นเพราะชิปอันนั้น มันจะเป็นอุปสรรคต่องานเอ็กซ์โปทั้งงานแน่ๆ เราจะให้คนอื่นเห็นชิปอันนั้นไม่ได้ อย่างน้อยก็เพื่อเป้าหมายของเรา"
84301400600-18 = "การรับมือแบบนั้น... มันจะทำให้คุณถูกตำหนิแทนหรือเปล่าคะ?"
84301400600-22 = "ตอนนี้เรื่องนั้นมันไม่สำคัญหรอก"
84301400600-23 = "ยังไงก็ช่วยกลับมาโดยไม่ให้โดนจับได้นะ แล้วเราค่อยมาคุยรายละเอียดกันต่อที่นี่ แค่นี้ละ"
84301400600-27 = "คงต้องคิดหาข้อแก้ตัวกับคุณคารินและคุณอาสึนะแล้วสิ"
84301400600-28 = "..."
84301400600-29 = "จะว่าไป ริโอะ..."
84301400600-30 = "คุณนี่จริงๆ เลยเชียว..."

[translation]
84301400200-5 = "這……"
84301400200-6 = "是說了「一定沒問題」的我錯了嗎……"
84301400200-7 = "這次的規模確實有點大。#n多虧了兩位的幫忙才能平安無事，謝謝你們。"
84301400200-8 = "不用放在心上！有趣就好～！#n不覺得有種驚喜活動的感覺嗎？"
84301400200-9 = "不，前輩。驚喜活動才不是這樣的……"
84301400200-11 = "為什麼……前衛君怎麼會……！？"
84301400200-12 = "我沒有輸入過這種模式啊……"
84301400200-18 = "聯絡的一定是……"
84301400200-23 = "這到底是怎麼回事！！！！！"
84301400200-27 = "不出所料……"
84301400200-28 = "工程師部……！！你們居然還是闖禍了！"
84301400200-29 = "我昨天都特地過來一起檢查了，你們是不是又趁機加了什麼東西！？"
84301400200-30 = "不不不，我們什麼都沒做。"
84301400200-31 = "什麼都沒做會昨天好好的今天卻失控！？這像話嗎！？"
84301400200-32 = "雖然不像話但這是事實。我們真的什麼都沒碰。"
84301400200-33 = "想偷偷放進去的東西……之前早就放了。"
84301400200-34 = "你說什麼……？"
84301400200-35 = "……啊，不小心說溜嘴了。"
84301400200-37 = "（真是不會撒謊呢）"
84301400200-39 = "不過這次的情況我真的無法理解。#n我很抱歉釀成騷動，不過可以給我們一點時間調查跟收拾善後嗎？"
84301400200-43 = "……真的不是故意的嗎？"
84301400200-44 = "唔嗯……詠葉前輩應該不會撒謊才對……"
84301400200-45 = "但我也不是這方面的專家，所以很難確認……#n這種時候，要是會長也在的話……"
84301400200-46 = "要是莉央也在的話，確實可以立刻證明呢……實在令人遺憾。"
84301400200-48 = "（莉央……雖然有所預期，但他在技術方面真是深受信賴呢）"
84301400200-50 = "知道了。我就先給你們時間調查吧。但是你們必須找出確切的原因。"
84301400200-51 = "謝謝。"
84301400200-57 = "（總覺得……這個情況不太對勁）"
84301400200-58 = "（稍微確認一下吧）"

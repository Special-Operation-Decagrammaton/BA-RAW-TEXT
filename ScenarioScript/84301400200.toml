[translation]
84301400200-5 = "ที่บอกว่า... ไม่น่ามีเรื่องอะไร..."
84301400200-6 = "ฉันผิดเองละที่บอกว่า \"ไม่น่ามีเรื่องอะไรหรอก\"..."
84301400200-7 = "เรื่องนี้เป็นเรื่องที่สเกลค่อนข้างใหญ่เลยนะคะ ยังไงก็ขอบคุณทั้งสองคนนะคะที่ทำให้ฉันปลอดภัย ขอบคุณค่ะ"
84301400200-8 = "ไม่ต้องคิดมากนะ! ถ้ามันสนุกก็ไม่เป็นไรหรอก~! แถมเรารู้สึกเหมือนมีเหตุการณ์เซอร์ไพรส์ด้วยนี่นา?"
84301400200-9 = "ไม่สิ รุ่นพี่ เหตุการณ์เซอร์ไพรส์มันต้องเป็นเรื่องที่ดีสิ..."
84301400200-11 = "ทำไมกันนะ... ทำไมหุ่นรบล้ำยุคถึงได้...!?"
84301400200-12 = "ฉันไม่เคยใช้โค้ดแบบนี้นี่นา..."
84301400200-18 = "คนที่โทรมาต้องเป็น..."
84301400200-23 = "นี่มันเรื่องอะไรกัน!!!!"
84301400200-27 = "ตามคาดเลยแฮะ..."
84301400200-28 = "ชมรมวิศวกรรม...!! ก่อเรื่องจนได้สินะ!"
84301400200-29 = "เมื่อวานฉันก็ตรวจสอบไปแล้วแท้ๆ นี่ผ่านไปไม่กี่ชั่วโมงเอง ระหว่างนั้นไปเพิ่มฟังก์ชันอะไรเข้าไปน่ะ!?"
84301400200-30 = "ปะ... เปล่านะ พวกเราไม่ได้ทำอะไรเลย"
84301400200-31 = "ไม่ได้ทำอะไรเลย แล้วทำไมหุ่นรบที่เมื่อวานยังปกติดีอยู่ถึงได้ก่อเรื่องวุ่นวายขึ้นได้ล่ะ!? มันฟังขึ้นหรือไง!?"
84301400200-32 = "ฉันรู้ว่ามันฟังไม่ขึ้น แต่ฉันพูดจริงนะ พวกเราไม่ได้ไปแตะต้องอะไรเลย"
84301400200-33 = "ส่วนฟังก์ชันที่จะแอบใส่ไปน่ะ... ฉันใส่ไปตั้งแต่ก่อนหน้านั้นแล้ว"
84301400200-34 = "ว่าไงนะ...?"
84301400200-35 = "อึก... หรือว่าไม่ควรพูดนะ"
84301400200-37 = "(เป็นคนที่พูดโกหกไม่เป็นสินะ)"
84301400200-39 = "แต่ครั้งนี้เป็นสถานการณ์ที่ฉันไม่เข้าใจเลยจริงๆ นะ พวกเราต้องขอโทษที่ทำให้เกิดเรื่องวุ่นวาย ขอเวลาให้เราได้ตรวจสอบเพื่อจัดการเรื่องนี้ด้วยตัวเองได้มั้ย?"
84301400200-43 = "จะบอกว่าไม่ได้ตั้งใจให้เกิดแบบนี้จริงๆ งั้นเหรอ...?"
84301400200-44 = "เฮ้อ... แต่รุ่นพี่อุทาฮะก็ไม่ใช่คนที่จะโกหกอยู่แล้วนี่เนอะ..."
84301400200-45 = "ฉันเองก็ไม่ใช่ผู้เชี่ยวชาญด้านนี้ งั้นก็คงจะเข้าไปตรวจสอบเองไม่ได้... เวลาแบบนี้ถ้าประธานอยู่ด้วย#nก็ดีน่ะสิ..."
84301400200-46 = "ถ้าริโอะอยู่ ก็น่าจะพิสูจน์เรื่องนี้ได้ทันทีแท้ๆ น่าเสียดายจัง"
84301400200-48 = "(ริโอะ... เป็นคนที่ได้รับความเชื่อถือทางด้านเทคโนโลยีอย่างที่คาดไว้เลย)"
84301400200-50 = "ก็ได้ ฉันจะให้เวลาตรวจสอบกันด้วยตัวเองก่อน แต่ต้องหาสาเหตุที่แน่ชัดให้ได้นะ"
84301400200-51 = "ขอบใจนะ"
84301400200-57 = "(รู้สึกได้ถึง... ลางสังหรณ์แปลกๆ จากสถานการณ์นี้)"
84301400200-58 = "(ลองสืบหาอีกหน่อยดีกว่า)"

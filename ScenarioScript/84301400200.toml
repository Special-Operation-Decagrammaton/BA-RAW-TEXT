[translation]
84301400200-5 = "\"Fine,\" huh?"
84301400200-6 = "This might be my fault. I think I might have jinxed it."
84301400200-7 = "Well, that was quite an incident, but I'm all right, thanks to you two."
84301400200-8 = "Happy to help! As long as you enjoyed it, right? Call it a surprise event!"
84301400200-9 = "I will NOT call it a \"surprise event\"..."
84301400200-11 = "Why...? Why is the Avant Guard...?!"
84301400200-12 = "Wait a minute, this pattern..."
84301400200-18 = "And this timing..."
84301400200-23 = "What is this?!"
84301400200-27 = "As expected..."
84301400200-28 = "Engineering Department...!! You've really done it this time!"
84301400200-29 = "I inspected everything YESTERDAY, and you found a way to screw it all up in one day?!"
84301400200-30 = "N-No. We didn't do anything."
84301400200-31 = "You didn't do anything, but the thing that was fine yesterday suddenly went on a rampage? Am I supposed to believe that?!"
84301400200-32 = "I know it's hard to believe, but it's true. None of us touched it since then."
84301400200-33 = "All the secret stuff we wanted to do was already done."
84301400200-34 = "What did you say...?"
84301400200-35 = "...Ugh. Forget I said that."
84301400200-37 = "(She's not a good liar.)"
84301400200-39 = "I have to admit, though, I'm still baffled here. I'm sorry it's such a mess, but could you give us some time to investigate, so we can sort it out ourselves?"
84301400200-43 = "...You really didn't plan this?"
84301400200-44 = "*sigh* Well, Utaha, you're a lot of things, but you're not a liar."
84301400200-45 = "And I'm no expert, so I can't make much of a ruling on this. If only the president were here."
84301400200-46 = "Yeah. If Rio were here, she'd have this settled on the spot. It's a shame."
84301400200-48 = "(Rio... They trust her in matters of technology.)"
84301400200-50 = "All right. I'll give you some time to figure it out. But that means you HAVE to figure it out, understand?"
84301400200-51 = "Thank you."
84301400200-57 = "(This...seems suspicious.)"
84301400200-58 = "(I should investigate a bit further.)"

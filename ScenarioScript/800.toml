[translation]
800-1 = "碧的登場"
800-4 = "我正等著你呢，老師。"
800-5 = "[s]「……………」"
800-6 = "……有什麼問題嗎？"
800-7 = "[s1]「你是哪位……？」\n[s2]「聯邦學生會，財務室的碧……？」"
800-8 = "什麼哪位……我是聯邦學生會的財務室長，扇喜碧。#n你該不會忘了吧？"
800-9 = "[s3]「好像記得，又好像不記得……」"
800-10 = "……唉，是嗎。#n會出現這種反應，也是無可奈何的事……"
800-11 = "……我本來也沒打算以這種形式露面。"
800-12 = "但公事的話就另當別論了吧？#n所以，這次得和我一起處理了。"
800-13 = "[s]「『這次』指的是……？」"
800-17 = "各種待解決的事件、問題、文件以及雜務的處理……希望你能和我一起處理。"
800-18 = "原本是琳前輩……不，是琳行政官的工作，但他總是很忙碌……"
800-19 = "找他商量的話，絕對會把事情都攬在自己身上……所以，我決定出手協助。"
800-20 = "為了不讓他操勞過度，也只能這樣了吧？"
800-21 = "[s]「碧和我兩人一起做，是吧？」"
800-22 = "對，沒錯。老師和我。"
800-23 = "[s]「我知道了。為了琳醬和碧，我會竭盡全力的。」"
800-24 = "……謝謝你，老師。"
800-25 = "──啊，還有一件事。"
800-31 = "幫忙琳行政官這件事，希望可以保密。"
800-32 = "因為這些事，本來不該由財務室出面處理。所以，要對琳前輩……"
800-33 = "[s]「嗯。放心交給我吧。」"
800-34 = "……好。那就別浪費時間，馬上開始吧。"

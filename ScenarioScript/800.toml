[translation]
800-1 = "Aoi's Appearance"
800-4 = "I've been waiting for you, Sensei."
800-5 = "[s] \"Uh...\""
800-6 = "Hello? Did you hear me, Sensei?"
800-7 = "[s1] \"...Who are you?\"\n[s2] \"You're the...treasurer...?\""
800-8 = "You don't remember who I am...? I am Oki Aoi, Chief of Finance for the General Student Council. "
800-9 = "[s3] \"Th-That rings a bell...\""
800-10 = "*sigh* It isn't my place to lecture you on the hierarchical structure of the Council. Do as you please."
800-11 = "...I would have rather had the opportunity to make a better impression on you."
800-12 = "Unfortunately, I'm not one to mix business and pleasure. I'm here as the Chief of Finance, not Aoi, for today."
800-13 = "[s] \"For today...?\""
800-17 = "Yes. For today, we're strictly business. Let's see, we need documents verified, public complaints processed... "
800-18 = "These usually fall under Rin... I mean, the Chief Officer's purview, but she hardly has a spare moment in her schedule. "
800-19 = "If she knew about these tasks, she would work herself straight into a trip to the Trinity's Remedial Knights emergency room. So this is our only option."
800-20 = "I'm going to help her."
800-21 = "[s] \"And I'm going to help you?\""
800-22 = "Yes. You will help me, help her."
800-23 = "[s] \"Okay. Who's going to help me, help you, help her?\""
800-24 = "Haha. Thank you, Sensei. "
800-25 = "One last thing. "
800-31 = "Let's keep this our secret. Okay? "
800-32 = "This isn't the Treasury's usual work, and Rin would undoubtedly find some way to feel guilty about it. So, please..."
800-33 = "[s] \"My lips are sealed.\""
800-34 = "Then, we have no time to waste."

[translation]
800-1 = "อาโออิปรากฏตัว"
800-4 = "กำลังรออยู่เลย คุณครู"
800-5 = "[s] \"......\""
800-6 = "...มีปัญหาอะไรรึเปล่าคะ คุณครู?"
800-7 = "[s1] \"ใครน่ะ?\"\n[s2] \"อาโออิ ฝ่ายการเงินขององค์การนักเรียน...?\""
800-8 = "ใครงั้นเหรอ? อาโออิ หัวหน้าฝ่ายการเงินขององค์การนักเรียนไงล่ะ อย่าบอกนะว่าลืมไปแล้วน่ะ? "
800-9 = "[s3] \"เหมือนจะจำได้ แต่ก็จำไม่ได้...\""
800-10 = "...เฮ้อ นั่นสินะ ถ้าพูดแบบนี้ ฉันเองก็หมดคำจะพูดแล้วละ เข้าใจสถานการณ์ฉันบ้างสิ"
800-11 = "...ก็นะ ฉันเองก็ไม่ได้อยากจะแบกหน้ามาหาคุณครูแบบนี้นักหรอก"
800-12 = "แต่ว่าเรื่องงานก็คือเรื่องงาน เรื่องส่วนตัวก็คือเรื่องส่วนตัว เพราะงั้นมันก็ช่วยไม่ได้ที่คราวนี้คุณครูต้อง#nมาทำงานร่วมกันกับฉันละนะ"
800-13 = "[s] \"คราวนี้งั้นเหรอ...?\""
800-17 = "ก็พวกงานที่ต้องจัดการร่วมกัน พวกรายงาน พวกเอกสารต่างๆ... อะไรประมาณนั้นน่ะ "
800-18 = "ถ้าตามปกติแล้วละก็ รุ่นพี่ริน... ไม่สิ อันที่จริงนี่เป็นงานที่ทางหัวหน้าฝ่ายบริหารเป็นคนดูแลอยู่ แต่ว่าเธอก็มีงานล้นมือแล้วน่ะ... "
800-19 = "ถ้าขืนส่งงานนี้ไปให้เธออีกละก็ เธอคงจะฝืนทำทั้งๆ ที่งานก็ล้นมือเต็มไปหมด... การห้ามไม่ให้เธอ#nทำงานก็เป็นเรื่องที่เป็นไปไม่ได้อีกด้วย มันเลยไม่มีวิธีอื่นแล้วนอกจากวิธีนี้"
800-20 = "ฉันก็เลยว่าจะช่วยจัดการให้เองน่ะ"
800-21 = "[s] \"ร่วมด้วยช่วยกันกับครูสินะ?\""
800-22 = "ใช่แล้ว ร่วมมือกับคุณครู"
800-23 = "[s] \"ก็ถ้าเป็นแบบนั้นมันก็คงช่วยไม่ได้นะ ครูจะทำให้เต็มที่เลย\""
800-24 = "...ขอบคุณนะ คุณครู "
800-25 = "อ๋อ แล้วก็อีกเรื่องหนึ่ง "
800-31 = "เรื่องที่ฉันกับคุณครูช่วยงานของหัวหน้าฝ่ายบริหารน่ะ ช่วยเก็บเป็นความลับไว้ด้วยนะ "
800-32 = "พอดีงานนี้มันไม่ใช่งานที่ทางฝ่ายการเงินจะเข้ามาเกี่ยวข้องด้วยน่ะ เพราะงั้น... รุ่นพี่ริน..."
800-33 = "[s] \"ครูเข้าใจแล้วละ\""
800-34 = "ดี ถ้างั้นก็อย่ามัวเสียเวลากันอยู่เลย มาเริ่มงานกันเลยดีกว่า"

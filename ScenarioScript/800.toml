[translation]
800-1 = "#title;아오이의 등장"
800-2 = "#wait;1800"
800-3 = "3;아오이;00\n#3;a\n#wait;1500"
800-4 = "3;아오이;02;기다리고 있었어, 선생님.\n#3;em;[반응]"
800-5 = "[s] \"…………….\""
800-6 = "3;아오이;00;……선생님? 무슨 문제라도 있어?"
800-7 = "[s1] \"누구세요?\"\n[s2] \"총학생회 재무실의 아오이……?\""
800-8 = "3;아오이;05;누구냐니, 총학생회 재무실장 오키 아오이야. 설마 잊어버린 거야? \n#3;em;[빠직]"
800-9 = "[s3] \"기억날 것 같기도 하고 아닌 것 같기도 하고…….\""
800-10 = "3;아오이;06;……하아. 그래. 선생님이 그런 반응을 해도 나는 할 말이 없겠지. 내 입장도 잘 알고 있어.\n#3;em;[속상함]"
800-11 = "3;아오이;06;……그래. 뭐, 나도 이렇게 뻔뻔하게 얼굴을 비출 생각은 없었지만 말야.\n#3;em;[속상함]"
800-12 = "3;아오이;02;하지만 공은 공이고 사는 사니까. 이번에는 어쩔 수 없이 이런 나와 같이 일을 처리해야만 해."
800-13 = "[s] \"이번에는……?\""
800-14 = "#st;[0,0];instant;1;"
800-15 = "#clearST"
800-16 = "3;아오이;01\n#3;greeting\n#wait;1500"
800-17 = "3;아오이;99;처리해야 할 다양한 일들, 사건들, 서류들…… 뭐 그런 것들이지."
800-18 = "3;아오이;01;원래 같으면 린 선배…… 아니, 수석행정관이 떠안아야 할 잡무지만, 그녀는 언제나 바쁘니까. \n#3;em;…"
800-19 = "3;아오이;02;수석행정관에게 일을 넘겨봤자, 그녀는 미련하게 자신이 다 떠안으려고 할 테고…… 그런 그녀를 말리는 것도 불가능하다면, 이런 방법밖엔 없겠지."
800-20 = "3;아오이;01;그러니까 내가 도와주기로 한 거야."
800-21 = "[s] \"나와 함께 말이지?\""
800-22 = "3;아오이;99;물론 선생님과 함께."
800-23 = "[s] \"뭐 그런 거라면 어쩔 수 없겠네. 힘닿는 데까지 도울게.\""
800-24 = "3;아오이;01;……고마워. 선생님."
800-25 = "3;아오이;02;아, 그리고 한 가지 더. \n#3;em;[반응]"
800-26 = "#st;[0,0];instant;1;"
800-27 = "#clearST"
800-28 = "3;아오이;01\n#3;d\n#wait;1500"
800-29 = "#all;hide"
800-30 = "3;아오이;01\n#3;a\n#3;closeup\n#wait;1500"
800-31 = "3;아오이;02;나와 선생님이 수석행정관의 일을 도왔다는 건 비밀로 해두었으면 해. \n#3;closeup"
800-32 = "3;아오이;06;이건 원래같으면 재무실에서 나설 일이 아니거든. 그러니까…… 린 선배에겐…….\n#3;em;[///]\n#3;closeup"
800-33 = "[s] \"알겠어.\""
800-34 = "3;아오이;03;좋아. 그럼 시간 낭비할 것 없이 바로 시작해 보자고.\n#3;em;[반응]\n#3;closeup"

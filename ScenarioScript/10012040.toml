[translation]
10012040-1 = "第4話;我來幫忙老師了"
10012040-2 = "喂，怎麼回事？這和說好的不一樣啊！！"
10012040-4 = "很強的傳言難道是騙人的嗎？"
10012040-5 = "為什麼不說話啊！"
10012040-11 = "好像沒聽見哦……"
10012040-12 = "呃，我們得照顧他嗎……？"
10012040-16 = "……"
10012040-17 = "老師……閣下為什麼會在這裡……？"
10012040-18 = "我明明聽說這裡是……為了獲得所有權，各式各樣的集團競爭的場所……"
10012040-19 = "喂，你有在聽嗎？我說若藻！！"
10012040-20 = "老師不可能參與這種低劣的派系鬥爭……也就是說……"
10012040-21 = "難道……老師他……被誘拐了嗎……？"
10012040-23 = "喂！一個人在自言自語什麼啊……有聽到人家在說話嗎！？"
10012040-25 = "……！！！"
10012040-26 = "……對，沒錯！老師是如此善良。#n肯定是被心懷不軌的狐狸精們給騙了……！"
10012040-27 = "……若藻！！"
10012040-28 = "……得去……"
10012040-29 = "……嗯？什麼？"
10012040-30 = "……我得去才行……把老師……"
10012040-31 = "救出來才行……！！"
10012040-33 = "……在說什麼？老師是指……"
10012040-34 = "剛才在那邊看到的大人嗎？"
10012040-35 = "吶，怎麼回事……那傢伙是敵人吧？為什麼要去救他啊？"
10012040-37 = "……你剛才說什麼？"
10012040-38 = "你說……誰是敵人？"
10012040-39 = "難不成是……在說老師……是嗎？"
10012040-40 = "那是當然的吧？不然還有誰？"
10012040-46 = "等一下。不覺得氣氛怪怪的嗎……？"
10012040-47 = "總，總覺得和之前感覺到的天差地遠……"
10012040-48 = "你是什麼意思？"
10012040-49 = "……喂，你那是什麼眼神啊……"
10012040-51 = "呵呵，呵呵呵……"
10012040-52 = "把老師……說成那樣……"
10012040-53 = "看來……有必要教育一下呢。"
10012040-55 = "……教育？"
10012040-56 = "教育是指，什麼？"
10012040-58 = "唔呵呵……"
10012040-62 = "現在開始，就由我來……"
10012040-72 = "打進你那可憐的小腦袋裡。"
10012040-85 = "（唰──！！）"
10012040-91 = "……呼，我抓來囉。#n有海螺和鮑魚……還有海帶。"
10012040-92 = "好，好驚人的量……"
10012040-93 = "辛苦了前輩。捕獲的東西請放在這裡。"
10012040-94 = "嗯……謝謝。"
10012040-99 = "……我們又回到這裡了呢。"
10012040-100 = "明明剛剛才發生那種事情的說……"
10012040-102 = "沒想到除了我們還有其他人……"
10012040-103 = "不如說，就是因為發生了那種事，大家這次才一起來啊。#n要是又被襲擊的話就危險了。"
10012040-104 = "要是沒有那些傢伙的話就可以各自行動了……"
10012040-105 = "直升機墜機、復原渡假勝地……現在是打架。"
10012040-106 = "真虧壞事能一個接著一個發生呢……"
10012040-108 = "…………"
10012040-109 = "……沒問題嗎？若藻同學……看起來不像是普通人。"
10012040-110 = "我覺得不用太在意。沒必要特地改變行動。"
10012040-111 = "如果又來的話，只要再處理他就行了。"
10012040-112 = "那，那樣就可以了嗎……"
10012040-113 = "……那，我再去一趟。"
10012040-122 = "……啊，已經潛下去了。"
10012040-123 = "……沒辦法。#n幹勁十足的白子前輩是攔不住的，你也知道吧。"
10012040-124 = "[s1] 「……看來是認為我們沒有必要躲避呢。」\n[s2] 「雖然說很符合白子的作風……」"
10012040-127 = "嘛，像年輕人很好啊。"
10012040-128 = "沒有釣竿就潛水下去捕撈……到底是哪來的體力……"
10012040-129 = "多虧了白子醬，不用煩惱糧食了呢！#n我們已經有魚跟鮑魚……"
10012040-130 = "而且，就算又來襲擊，只要溝通一下總會有辦法吧？"
10012040-131 = "渡假勝地這麼大！大家可以融洽地分開使用之類的……！"
10012040-132 = "都已經打過兩次了，事到如今好好溝通還能有什麼發展嗎……"
10012040-133 = "這，這個，倒也不是完全不可能……"
10012040-134 = "就算……和睦相處很困難，還是可以決定好各自的區域，之類的。"
10012040-135 = "雖然有點在意若藻同學的事……"
10012040-136 = "[s3] 「有點在意？」\n[s4] 「有什麼擔心的事嗎？」"
10012040-137 = "不，總覺得，只是……可能是我的錯覺……"
10012040-138 = "不，總覺得，只是……可能是我的錯覺……"
10012040-139 = "感覺最好不要讓白子前輩和那個人碰面比較好……"
10012040-140 = "你們在這裡啊！！"
10012040-141 = "……啊。"
10012040-142 = "[s5] 「來得還真是時候呢。」\n[s6] 「說曹操曹操就到……」"
10012040-143 = "咦，什麼，真的又來了嗎？"
10012040-144 = "咦，什麼，真的又來了嗎？"
10012040-145 = "……那個人就是若藻嗎？"
10012040-146 = "老師，您可以放心了！若藻我，來救閣下了！！"
10012040-147 = "……啊，是的。就是他！"
10012040-148 = "……呃，咦？"
10012040-149 = "他剛才……是不是說了什麼奇怪的話……？"
10012040-150 = "……？#n好像是說「來救老師了」……？"
10012040-156 = "被來歷不明的壞蛋抓住，還被帶到這麼遠的地方來……"
10012040-157 = "要是若藻我有在您身邊的話，就不會變成這樣了！"
10012040-158 = "我來遲了，非常抱歉……"
10012040-159 = "若藻我……"
10012040-160 = "這就把老師拯救出來。"
10012040-168 = "……嗯？"
10012040-169 = "……啊～是不是誤會我們綁架了老師呀？"
10012040-170 = "唔嘿～大叔我都不知道呢。"
10012040-171 = "嗯嗯！我們，其實是綁架犯唷～☆"
10012040-172 = "為什麼要同意啊！會讓人誤會的吧！？"
10012040-174 = "請，請等一下！各位，在戰鬥之前，還是先溝通一下……！"
10012040-175 = "渡假勝地這麼大，只要大家在各自的地方享受的話……"
10012040-177 = "……溝通？"
10012040-178 = "唔呵呵，溝通……聽起來不錯呢……"
10012040-179 = "所有人開始攻擊！老師就由我親自拯救！！！"
10012040-180 = "……等等！說好的溝通呢！？"
10012040-182 = "攻，攻擊！攻擊──！！"
10012040-183 = "攻，攻擊……！"
10012040-184 = "我們什麼時候變成這樣的啊，隊長～～！"
10012040-185 = "別，別問我啊！"
10012040-186 = "總之先照他說的做吧！開始攻擊！"

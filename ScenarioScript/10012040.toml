[translation]
10012040-1 = "ตอนที่ 4;ฉันมาช่วยคุณครูค่ะ"
10012040-2 = "นี่มันเกิดอะไรขึ้น? ทำไมไม่เหมือนที่คุยกันไว้เลย!!"
10012040-4 = "บอกข้ออ้างอะไรมาสักหน่อยสิ! ทำไมไม่พูดอะไรเลยล่ะ?"
10012040-5 = "ข่าวที่ว่าเธอเก่งนักเก่งหนาเป็นแค่ข่าวลือรึไง? ที่จริงเป็นแค่นักต้มตุ๋นใช่ไหม? หืม?"
10012040-11 = "เหมือนเธอจะไม่ได้ฟังเราอยู่เลยนะคะ..."
10012040-12 = "ดูจากสภาพแล้ว... เราน่าจะต้องดูแลเธอก่อนด้วย..."
10012040-16 = "....."
10012040-17 = "คุณครู... ทำไมถึงมาอยู่ตรงนี้ได้ล่ะคะ...?"
10012040-18 = "ที่นี่มัน... คือที่ที่มีกลุ่มโน้นกลุ่มนี้มารวมตัวกันเพื่อครอบครองกรรมสิทธิ์ไม่ใช่เหรอ..."
10012040-19 = "นี่! ฟังฉันพูดอยู่หรือเปล่า? ฟังอยู่หรือเปล่าห้ะ! วาคาโมะ!!"
10012040-20 = "เป็นไปไม่ได้ที่คุณครูจะมีส่วนเกี่ยวข้องกับเรื่องแบบนั้น... และถ้าเป็นอย่างนั้น..."
10012040-21 = "อย่าบอกนะว่า... คุณครู... ถูกลักพาตัวมาอย่างนั้นเหรอคะ...?"
10012040-23 = "นี่! ยังจะมาพูดพึมพำอะไรคนเดียวอีก!"
10012040-25 = "......!!"
10012040-26 = "เป็นไปได้ค่ะ... เป็นไปได้ที่คุณครูที่แสนดีจะถูกพวกสุนัขจิ้งจอกชั่วร้ายหลอก...!"
10012040-27 = "วาคาโมะ?!"
10012040-28 = "ฉัน... ต้อง..."
10012040-29 = "หืม...? ว่าไงนะ?"
10012040-30 = "ต้องไป... ค่ะ... ต้องไป..."
10012040-31 = "ช่วยคุณครูค่ะ...!!"
10012040-33 = "......? พูดอะไรของเค้า? คุณครูเหรอ? คุณครู... งั้นเหรอ..."
10012040-34 = "หมายถึงผู้ใหญ่ที่เจอกันเมื่อกี๊หรือเปล่า?"
10012040-35 = "พูดอะไรของเธอน่ะ! คนนั้นคือศัตรูของเรานะ! จะไปช่วยทำไม?"
10012040-37 = "......? คะ?"
10012040-38 = "เมื่อกี๊พูดว่าอะไรนะคะ? ใครคือ... ศัตรูเหรอคะ?"
10012040-39 = "หรือว่าหมายถึง... คุณครู... เหรอคะ?"
10012040-40 = "หืม?? ก็ใช่น่ะสิ จะเป็นคนอื่นไปได้ไง?"
10012040-46 = "นี่ เดี๋ยวก่อน บรรยากาศมันแปลกๆ ไปนะ ว่าไหม...?"
10012040-47 = "นั่นสิ มันต่างจากเมื่อกี๊ที่เธอยังดูเซ่อๆ ทึ่มๆ อยู่..."
10012040-48 = "หมายความว่ายังไงกันน่ะ?"
10012040-49 = "เอ๋...? ทำไมจู่ๆ ก็มองฉันด้วยสายตาแบบนั้น..."
10012040-51 = "หึหึ... หึหึหึ..."
10012040-52 = "การพูดถึงคุณครู... แบบนั้น..."
10012040-53 = "ฉันว่า... ต้องมีการสั่งสอนสักหน่อยแล้วค่ะ"
10012040-55 = "หืม...? สั่งสอน?"
10012040-56 = "หมายความว่ายังไงน่ะ?"
10012040-58 = "หึหึ..."
10012040-62 = "จากนี้ฉันจะ..."
10012040-72 = "ฉันจะสั่งสอนใส่สมองขี้เลื่อยที่น่าเวทนานี้ให้เองค่ะ"
10012040-85 = "ปังๆๆๆๆๆๆๆ!"
10012040-91 = "ฮู่วว... ฉันไปหาพวกนี้มาได้ หอยตลับกับหอยเป๋าฮื้อ... สาหร่ายก็มีนะ"
10012040-92 = "หะ... หามาได้เพียบเลย... รุ่นพี่ชิโรโกะถนัดงานแบบนี้เองเหรอเนี่ย สุดยอดไปเลย"
10012040-93 = "เยี่ยมเลยค่ะรุ่นพี่ นี่คือกล่องสำหรับใส่ของที่เก็บมาค่ะ"
10012040-94 = "อืม... ขอบใจนะ"
10012040-99 = "จะว่าไป... พวกเราได้กลับมาที่นี่อีกรอบแล้วนะคะ"
10012040-100 = "ถึงก่อนหน้านี้จะเคยมาแล้วก็เถอะ..."
10012040-102 = "นั่นสิคะ ไม่นึกเลยค่ะว่าจะมีคนอื่นนอกจากพวกเรา..."
10012040-103 = "แต่พอเกิดเรื่องแบบนั้นก็ทำให้เราได้มาด้วยกันนี่นะ ถ้าโดนจู่โจมขึ้นมาอีกครั้งคงได้ช่วยกันทั้งหมด#nนี่แหละ"
10012040-104 = "แต่หากไม่มีเจ้าพวกนั้น เราคงได้แบ่งทีมเป็นทีมห้องควบคุมไฟฟ้ากับทีมหาเสบียงอาหารไปแล้ว..."
10012040-105 = "ไม่อยากจะเชื่อเลย ทั้งเฮลิคอปเตอร์ตก ฟื้นฟูรีสอร์ต ไหนจะการต่อสู้อีก หนีเสือปะจระเข้ชัดๆ"
10012040-106 = "แล้วเราก็ต้อง 'มาที่นี่' อีกรอบอีก..."
10012040-108 = "...."
10012040-109 = "แบบนี้เราจะเป็นอะไรไหมคะ? คนที่ชื่อวาคาโมะคนนั้น ดูทรงแล้วไม่น่าจะใช่คนธรรมดาๆ เลยนะคะ..."
10012040-110 = "ไม่เป็นไรหรอก ก็ทำตามแพลนเที่ยวเดิมของเรานั่นแหละ ไม่ต้องเปลี่ยนอะไรหรอก"
10012040-111 = "ถ้าหากเข้ามาอีก ก็แค่เผชิญหน้ากลับไป ก็แค่นั้น"
10012040-112 = "ระ... เรื่องมันอาจจะไม่ง่ายอย่างนั้นไปตลอดก็ได้..."
10012040-113 = "เดี๋ยวฉันกลับมาใหม่นะ..."
10012040-122 = "อืม..."
10012040-123 = "คงทำอะไรไม่ได้หรอก... รุ่นพี่เขาไปถึงขนาดนั้นแล้ว คงห้ามไม่ได้ง่ายๆ หรอก"
10012040-124 = "[s1] \"คงจะคิดว่าหากหลีกเลี่ยงก็คือแพ้เลยสินะ\"\n[s2] \"สมแล้วที่เป็นชิโรโกะ...\""
10012040-127 = "ก็แล้วยังไงล่ะ~ ตอนหนุ่มสาวก็เป็นแบบนี้กันทั้งนั้นแหละ บางครั้งเราก็ตั้งใจเลือกทางที่ยากลำบากเอง"
10012040-128 = "คงจะคิดว่าหากไม่มีเบ็ดตกปลา ก็ดำน้ำจับมาก็ได้... ละสินะคะ"
10012040-129 = "แต่ยังไงชิโรโกะจังก็หามาได้เยอะขนาดนี้เลยนะคะ ทั้งปลา ทั้งหอย ได้มาเพียบเลย..."
10012040-130 = "ส่วนเรื่องคนพวกนั้น ฉันว่าบางทีเราอาจจะแก้สถานการณ์ได้ด้วยการพูดคุยนะคะ"
10012040-131 = "ก็รีสอร์ตนี้ออกจะกว้างใหญ่นี่คะ! มาญาติดีกัน แล้วแบ่งกันใช้ก็ได้นี่...?"
10012040-132 = "แต่เราก็ทะเลาะใหญ่โตกับพวกนั้นมาตั้งสองครั้งแล้ว ฉันไม่คิดว่าแบบนั้นจะได้ผลหรอก"
10012040-133 = "แต่ก็ไม่ใช่ว่าจะเป็นไปไม่ได้นะ..."
10012040-134 = "ถึงจะให้อยู่แบบญาติดีไม่ได้... แต่อยู่แบบให้ต่างฝ่ายต่างเลือกพื้นที่ของตนก็น่าจะไหวค่ะ"
10012040-135 = "แต่ฉันมีเรื่องที่ยังติดใจอยู่... คนที่ชื่อวาคาโมะนั่นน่ะค่ะ..."
10012040-136 = "[s3] \"ติดใจเรื่องอะไรเหรอ?\"\n[s4] \"มีอะไรต้องเป็นห่วงเหรอ?\""
10012040-137 = "ไม่หรอกค่ะ บางทีฉันอาจจะ... แค่คิดไปเองก็ได้ค่ะ..."
10012040-138 = "ไม่หรอกค่ะ บางทีฉันอาจจะ... แค่คิดไปเองก็ได้ค่ะ..."
10012040-139 = "การที่รุ่นพี่ชิโรโกะต้องเผชิญหน้ากับคนคนนั้น อาจจะไม่ใช่เรื่องดีก็ได้นะคะ..."
10012040-140 = "อยู่ที่นี่เองสินะ! เจอตัวจนได้!!"
10012040-141 = "อ่า..."
10012040-142 = "[s5] \"ใครปล่อยหลุดคิวมาเนี่ย\"\n[s6] \"พูดถึงก็มาเลยแฮะ...\""
10012040-143 = "อะไรเนี่ย กลับมาอีกจริงๆ เหรอ? ไม่เบื่อกันบ้างเลยรึไงนะ"
10012040-144 = "อะไรเนี่ย กลับมาอีกจริงๆ เหรอ? ไม่เบื่อกันบ้างเลยรึไงนะ"
10012040-145 = "คนนั้นเหรอ? ที่ชื่อวาคาโมะ..."
10012040-146 = "จากนี้ไม่ต้องกังวลนะคะคุณครู! วาคาโมะผู้นี้... มาช่วยคุณท่านแล้วค่ะ!!"
10012040-147 = "อื้ม... คนนั้นแหละ"
10012040-148 = "เอ๋..."
10012040-149 = "แต่ว่าที่เธอพูดเมื่อกี๊... มันออกจะแปลกๆ... นะ?"
10012040-150 = "......? นั่นสิ มา 'ช่วย' คุณครูงั้นเหรอ...?"
10012040-156 = "ไม่อยากเชื่อเลยว่าจะโดนคนร้ายที่ไหนก็ไม่รู้จับมาเป็นตัวประกันถึงที่นี่..."
10012040-157 = "ถ้าหากคุณท่านอยู่ข้างกายวาคาโมะผู้นี้ตั้งแต่แรก ก็คงไม่เจอเรื่องแบบนี้หรอกค่ะ!"
10012040-158 = "ขออภัยที่ฉันมาช้านะคะ"
10012040-159 = "แต่ในเมื่อมาแล้ว"
10012040-160 = "ฉันก็จะช่วยคุณครูไว้เองค่ะ"
10012040-168 = "หา...?"
10012040-169 = "อ้อ... เป็นงี้เองเหรอ? พวกเราคือแก๊งลักพาตัวสินะ?"
10012040-170 = "แหะๆ~ ลุงคนนี้ไม่รู้อะไรเลย"
10012040-171 = "ใช่แล้วค่ะ~ ที่จริงพวกเราเป็นคนน่ากลัวนะคะ~☆"
10012040-172 = "ทำไมถึงตามน้ำไปเรื่อยล่ะเนี่ย!? หยุดพูดอะไรไร้สาระได้แล้ว!! แบบนี้ก็ยิ่งเข้าใจผิดกันไปใหญ่น่ะสิ!!"
10012040-174 = "ดะ... เดี๋ยวก่อนสิคะ! ทุกคน! ก่อนจะลงมือต่อสู้กัน เราลองมาคุยกันดีๆ..."
10012040-175 = "ใช่ค่ะ! รีสอร์ตนี้ก็ออกจะกว้างขวาง กว้างพอที่เราจะใช้ด้วยกันได้เลย..."
10012040-177 = "คุยเหรอ...?"
10012040-178 = "ฮุฮุฮุ... คุยงั้นเหรอ... ก็ดีค่ะ มาคุยกัน... คุยกัน..."
10012040-179 = "ทุกคนโจมตีเลยค่ะ!!  ส่วนคุณครู ฉันจะเป็นคนช่วยเองค่ะ!!!"
10012040-180 = "ไหนว่าจะคุยกันไงเล่า!?"
10012040-182 = "ยะ... ย้าก...! จะ... โจมตี! โจมตีเลยยยย!"
10012040-183 = "จะ... โจมตี...!"
10012040-184 = "ทำไมพวกเราถึงได้กลายมาเป็นลูกน้องเจ๊นี่ล่ะหัวหน้า...?"
10012040-185 = "มะ... ไม่รู้... เงียบๆ ไปเหอะน่า...! ทำตามที่สั่งก่อนแล้วกัน!"
10012040-186 = "โจมตี! บุกเข้าไปเลย!!!!!!"

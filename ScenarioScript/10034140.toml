[translation]
10034140-1 = "#st;[-1230,490];smooth;100;5일 전: 포지션 교체"
10034140-2 = "#all;hide\n#clearST"
10034140-3 = "3;나츠 밴드;99;……음음. 좋아. 일단 여기까지.\n#3;a\n#3;em;…"
10034140-4 = "3;나츠 밴드;99\n4;요시미 밴드;08;뭔가 좀 느는 거 같기도 하고……. 아닌 거 같기도 하고…….\n#4;a\n#3;m2"
10034140-5 = "3;나츠 밴드;08;후후. 원래 지속되고 있는 성장을 겪는 본인은, 막상 그 변화를 체감하기 어려운 법이지."
10034140-6 = "3;나츠 밴드;99;걱정할 필요 없어. 나의 완벽한 관리감독 하에 너는 확실히 능숙해지고 있다."
10034140-7 = "#all;hide"
10034140-8 = "3;나츠 밴드;05;이젠 나와 동등하거나……. 아니, 때론 그 이상일 때도 있을 정도로 말이지.\n#3;closeup\n#3;em;[반짝]"
10034140-9 = "3;요시미 밴드;04;……분명 칭찬일 텐데 묘하게 열 받네. 진짜 저것도 재주다, 재주.\n#3;em;[땀]"
10034140-10 = "3;요시미 밴드;02;누가 보면 본인은 아주 그냥 전문가 다 되신 줄 알겠어."
10034140-11 = "3;나츠 밴드;05;하……! 대체 무슨 말을 하는 거지?"
10034140-12 = "3;나츠 밴드;08;이쪽은 매 순간 능숙해지고 있다고. 다음번엔 깜짝 놀라게 될 거야.\n#3;em;[반짝]"
10034140-13 = "3;요시미 밴드;08;예이, 예이. 알겠습니다요-. 하나하나 신경 쓰는 내가 바보였네.\n#3;em;[속상함]"
10034140-14 = "2;아이리 밴드;01\n4;카즈사 밴드;99\n#3;hide\n#2;h\n#4;h"
10034140-15 = "4;카즈사 밴드;01;……라고 하는데.\n#4;em;…"
10034140-16 = "4;카즈사 밴드;02;뭔가, 그러고 보니 이쪽도 계속 아이리만 날 봐주는 것 같은 게……."
10034140-17 = "4;카즈사 밴드;99;……음……."
10034140-18 = "4;카즈사 밴드;03;……우리도 교체할까?\n#4;em;[반응]"
10034140-19 = "2;아이리 밴드;99;후후. 신경 쓰였구나, 카즈사 쨩."
10034140-20 = "2;아이리 밴드;03;그럼 부탁할게!\n#2;em;[음표]"
10034140-21 = "4;카즈사 밴드;02;……어, 어어. 응……."

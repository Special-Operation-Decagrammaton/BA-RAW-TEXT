[translation]
10034140-1 = "[D-5]: เปลี่ยนตำแหน่ง"
10034140-3 = "อืม... ดีละ งั้นพอแค่นี้ก่อน"
10034140-4 = "เหมือนว่าเราจะพัฒนากันแล้ว... แต่ก็เหมือนจะไม่ใช่..."
10034140-5 = "ฮุฮุ คนที่เติบโตอยู่เรื่อยๆ ย่อมไม่สังเกตเห็นการเปลี่ยนแปลงของตัวเองหรอก"
10034140-6 = "ไม่ต้องห่วงนะ ภายใต้การควบคุมวงที่สมบูรณ์แบบของฉัน เราทุกคนกำลังพัฒนาอยู่อย่างแน่นอน"
10034140-8 = "ตอนนี้ความสามารถทุกคนเทียบกับฉันได้... ไม่สิ บางทีก็เก่งกว่าอีกนะ"
10034140-9 = "นี่เป็นการชมแท้ๆ แต่ทำไมถึงหัวร้อนขึ้นมานะ เรื่องการทำให้หงุดหงิดเป็นพรสวรรค์ของยัยนี่จริงๆ"
10034140-10 = "ถ้าใครมาได้ยินเข้าคงเข้าใจว่าเป็นนักดนตรีผู้เชี่ยวชาญเลยมั้ง"
10034140-11 = "เฮอะ...! หมายความว่าอะไรของเธอน่ะ?"
10034140-12 = "ฉันกำลังเก่งขึ้นอยู่ทุกวันนะ ไว้ครั้งหน้าฉันจะทำให้อึ้งเลย"
10034140-13 = "จ้า จ้า รู้แล้วจ้า ฉันบ้าเองแหละที่ใส่ใจทุกเรื่องที่เธอพูดน่ะ"
10034140-15 = "พูดเก่งเหลือเกินนะ..."
10034140-16 = "แต่จะว่าไป เหมือนจะมีแต่ไอริคนเดียวนะที่ช่วยดูฉันอยู่..."
10034140-17 = "อืม..."
10034140-18 = "งั้นเราก็เปลี่ยนตำแหน่งกันบ้างมั้ย?"
10034140-19 = "ฮุฮุ ขอบใจนะ คาซึสะจัง"
10034140-20 = "งั้นก็รบกวนด้วยนะ"
10034140-21 = "อะ... อ่า... อื้ม..."

[translation]
10034140-1 = "5天前：交換位置"
10034140-3 = "……嗯嗯。好，先到此為止吧。"
10034140-4 = "總覺得有進步……又好像沒有……"
10034140-5 = "呵呵，持續成長中的人，往往難以察覺自己的變化。"
10034140-6 = "不用擔心，在我完美的監督之下，你確實有在進步。"
10034140-8 = "你現在已經跟我不相上下……不，有時甚至還超越我了。"
10034140-9 = "……能把稱讚的話說得讓人火大也是一種本事。"
10034140-10 = "而且你為什麼把自己說得像專家一樣啊。"
10034140-11 = "哈……！那還用問嗎？"
10034140-12 = "我可是每分每秒都在進步啊。下次肯定會讓你大吃一驚的。"
10034140-13 = "是是是，隨便你愛怎麼說。#n我就不該問這個問題的。"
10034140-15 = "……話說回來。"
10034140-16 = "感覺一直都是愛莉在幫我檢查呢……"
10034140-17 = "嗯……"
10034140-18 = "……我們也交換一下吧？"
10034140-19 = "呵呵，千紗醬也有點在意吧。"
10034140-20 = "那就拜託你了！"
10034140-21 = "……哦，哦哦，嗯……"

[translation]
13170-1 = "第17話;追擊"
13170-5 = "……好吧，我承認攻守交替了。"
13170-6 = "現在輪到[USERNAME]老師的回合。"
13170-7 = "攻擊和防禦本來就該交替進行……才能算是公平的遊戲。"
13170-8 = "當然我並不打算採取公平的手段就是了。#n嘻嘻嘻……"
13170-9 = "這場活動只不過是尋求構圖的過程……既不是實驗，也不是儀式或研究。#n所以不需要公平，也不必拘泥於規則。"
13170-10 = "攻略方法其三──「內心無法預測也無法控制」。"
13170-11 = "人類的內心……其慾望、罪惡、恐懼與執著、悲嘆，四處衝突、抵銷、發散、消失，描繪出無法解釋的原始混沌…… "
13170-12 = "那……將會出現在你的眼前。"
13170-16 = "你的攻略方法究竟為何……我拭目以待。"
13170-19 = "[log]本作中出現的所有法律解釋純屬虛構，#n與現實一概無關。[/log]"
13170-24 = "[ns]「確定野乃美的位置了。」"
13170-25 = "在哪裡呢！？"
13170-26 = "[ns]「就在阿拜多斯中央車站的區政廳大樓裡。」"
13170-27 = "那個地方不就是……"
13170-28 = "嗯，就是召開債權團大會的大樓。"
13170-29 = "本來還以為必須兵分兩路的……幸好還沒分開。"
13170-30 = "謝謝你，老師。#n多虧老師的幫忙，計畫變得更簡單了。"
13170-31 = "這樣就能同時阻止星野前輩、維持契約、解救野乃美了。"
13170-33 = "坦白講，每次看到都覺得大人的力量真不是蓋的呢。"
13170-34 = "嗯，以前茜香被頭盔團綁架的時候，老師也是這樣幫忙的。"
13170-35 = "那都是多久之前的事了！！沒必要再提起了吧？"
13170-36 = "……因為我那時候真的很擔心。"
13170-37 = "是，是嗎……？#n突然做出那種反應，害我也有點不好意思……"
13170-39 = "啊哈哈……那時候茜香醬突然下落不明，大家都嚇了一跳……"
13170-40 = "嗯，尤其星野前輩特別著急。"
13170-41 = "他一個人坐立不安，說要拜託老師就自己跑出去了。"
13170-42 = "星野前輩？真的嗎？"
13170-43 = "[ns1]「那時候星野低頭拜託我幫忙找茜香。」\n[ns2]「只是我沒把這件事告訴大家而已。」"
13170-48 = "撥過電話了嗎？"
13170-49 = "……嗯，不過從幾個小時前就一直打不通……"
13170-50 = "拉麵店說他有準時下班。#n所以在那之後就沒有回家嗎……"
13170-51 = "以前他從來沒有這麼晚回來過吧……？"
13170-52 = "難道是……頭盔團那些傢伙？"
13170-53 = "咦！？頭盔團綁走了茜香醬……！？ "
13170-54 = "還是先等一下吧，星野前輩和老師已經去調查了。"
13170-55 = "……"
13170-57 = "（喀嚓）"
13170-58 = "大家，久等了。"
13170-59 = "星野前輩！老師！"
13170-60 = "[s] 「我們回來了。」"
13170-61 = "前輩，怎麼樣？"
13170-62 = "我們利用老師的權限，連上了聯邦學生會管理的中央通訊網。"
13170-63 = "中央通訊網……#n原來老師連那種權限都有……"
13170-64 = "唔嘿～不過當然是偷偷借來用就是了。#n要是被抓到的話就得寫悔過書了吧～？"
13170-67 = "這樣啊……原來發生過那種事……"
13170-68 = "嗯，只是用「唔嘿～」裝作若無其事而已。"
13170-69 = "啊哈哈……確實有這麼一回事。#n感覺已經過了很久了呢。"
13170-70 = "嗯，雖然其實沒過多久。"
13170-71 = "當時謝謝你救了我，老師。"
13170-73 = "[ns]「這是我應該做的。」"
13170-78 = "AM 08:5X"
13170-80 = "我來說明一下情況！"
13170-84 = "從現在起，我們要參加阿拜多斯中央車站的區政廳大樓頂層舉辦的債權團大會！#n時限是正午12點！"
13170-85 = "必須救出被關在大樓裡的野乃美前輩。"
13170-86 = "同時要阻止星野前輩否定「阿拜多斯學生會」，並宣告「對策委員會」的正當性！"
13170-87 = "嗯，知道了。綾音學生會長。"
13170-88 = "……"
13170-89 = "怎，怎麼了嗎，綾音醬？不是需要適應嗎？"
13170-90 = "這……畢竟是……確保我們的權利和資格的方法……"
13170-91 = "[s3]「請所有人服從綾音學生會長的命令。」\n[s4]「你要堂堂正正地宣告才行哦，綾音學生會長。」"
13170-94 = "……由於本次作戰需要在現場進行公證，所以我也會和大家一起出動。"
13170-96 = "真是含糊其詞。"
13170-97 = "逃避了。"
13170-99 = "接下來進行作戰簡報！"
13170-100 = "目前和阿拜多斯中央車站相連的東西南北4條路線，#n全都遭到了「私募基金」的封鎖。"
13170-102 = "中央車站區政廳大樓．東側地區"
13170-103 = "東邊是高利貸勞動會長僱用的軟綿綿頭盔團。"
13170-104 = "雖然戰力看似相對薄弱，但數量卻是最多的！#n由於這場戰鬥，基本上是必須在12點前抵達目標地點的限時戰……"
13170-105 = "如果要突破這條路線的話，勢必會花費不少時間。"
13170-107 = "中央車站區政廳大樓．西側通道"
13170-111 = "西邊是由扣押品拍賣公會長帶來的市場守衛看守！"
13170-112 = "雖然人數較少，但畢竟是市場守衛，有戰鬥直升機和戰車這類強力的重型武器！#n除了訓練等級高之外，指揮體系也較為完善。"
13170-113 = "儘管缺少地形方面的優勢，但對方擁有最強大的火力。#n如果沒有特別的戰略優勢，我認為避開這條路線比較好！"
13170-115 = "中央車站區政廳大樓．南側空地"
13170-117 = "南邊路線是由當舖聯盟長僱用的暴力集團黑龜組看守！"
13170-118 = "雖然數量少而且指揮體系雜亂，但擁有大量無人砲塔。#n最重要的是地形開闊，如果沒有特別的應對策略，最好不要貿然靠近！"
13170-120 = "中央車站區政廳大樓．北側通道"
13170-123 = "最後的北邊路線，被雜魚興業僱用傭兵搭建的特殊路障阻攔著。"
13170-124 = "也就是說，這條路線比起戰鬥更著重於防守。#n雖然火力和戰鬥力較為平凡，但沒有重裝備應該很難突破這裡！"
13170-127 = "嗯……該選哪條路線好呢？"
13170-128 = "跟著星野前輩選的路線走不就行了嗎？"
13170-129 = "既然如此，試著站在星野前輩的立場上思考吧……"
13170-130 = "沒必要想得那麼複雜吧？#n我們這裡不是有星野專家在嗎？"
13170-132 = "嗯……"
13170-133 = "嗯，那麼星野專家……白子前輩覺得該走哪條路線呢？"
13170-134 = "嗯……星野前輩的強大之處在於純粹的戰鬥能力，也就是白兵戰。"
13170-135 = "雖然現在這種感覺少了很多，但我聽說前輩以前主要使用的戰術是捨身攻擊。"
13170-136 = "星野前輩他，應該從很久以前就習慣單打獨鬥了。"
13170-137 = "所以……"
13170-142 = "中央車站的區政廳大樓西側通道"
13170-146 = "是誰！！"
13170-154 = "那，那是……！！"
13170-155 = "開，開槍！！是小鳥遊星野！"
13170-164 = "跑，跑哪去了！？"
13170-188 = "……我想應該是西邊。"
13170-189 = "好，那就相信星野專家說的，出發吧！"
13170-196 = "把所有兵力集中在星野那裡！#n讓戰鬥直升機和戰車全部出動！"
13170-197 = "現在這裡馬上就要召開債權團大會了！絕對別讓入侵者闖進來！"
13170-199 = "是，是！"
13170-204 = "嘿～又是直升機啊？"
13170-207 = "正在確認目標位置！"
13170-208 = "6點鐘方向！！"
13170-213 = "探索完成。確認目標鎖定──"
13170-219 = "鎖定完畢！AGM-114空對地飛彈，發射──！"
13170-226 = "命中目標！"
13170-231 = "什，什麼──！？"
13170-239 = "正在向這裡靠近……！？"
13170-240 = "說什麼傻話！#n靠近飛在空中的直升機……？"
13170-248 = "在，在哪裡！？"
13170-249 = "在，在底下！吊在直升機的下面……！？"
13170-255 = "呃，呃啊啊啊──！？"
13170-264 = "現，現在是什麼情況！"
13170-269 = "唔……"
13170-274 = "看來似乎不太順利呢。"
13170-276 = "閉嘴，奈芙蒂斯！！"
13170-288 = "這是在做什麼？為何要拿槍指著我？"
13170-289 = "哼，我已經知道你們在策劃什麼了。"
13170-290 = "我們？你指的是什麼呢？"
13170-291 = "你想背叛我們私募基金！"
13170-304 = "凱，凱薩PMC！？"
13170-310 = "說話最好小心點。#n這怎麼能說是背叛呢？列車砲打從一開始就是我們的。"
13170-311 = "那可不是像你們這種三流暴力集團能覬覦的東西。"
13170-317 = "動，動手！！"
13170-331 = "這，這個聲音是……？"
13170-333 = "…… "
13170-338 = "中央車站區政廳大樓．西側通道"
13170-348 = "抓，抓住他！！"
13170-357 = "AM 09:4X"
13170-360 = "這裡已經亂成一團了……！？#n代表我們答對了吧？"
13170-361 = "星野前輩在哪裡？"
13170-366 = "……找到了！在前方約600m的地方。"
13170-367 = "700m，750m……越離越遠了！！"
13170-369 = "也，也太快了吧……！"
13170-370 = "快追上去。"

[translation]
13170-1 = "Episode 17;Pursuit"
13170-5 = "...You may have your win. I shall admit, the tides of battle have shifted. "
13170-6 = "It appears the next turn is yours, [USERNAME] Sensei."
13170-7 = "Offense and defense, back and forth. Such is the rule of a fair game. "
13170-8 = "Of course, fairness is not my objective. Heeheehee..."
13170-9 = "An experiment, ritual, or even research, this campaign is not. All is part of my grand design! There is no such thing as equity, no need to be bound by petty things like rules. "
13170-10 = "Now, my third strategy will commence. \"The heart cannot be predicted nor controlled.\""
13170-11 = "In the human heart...desires, sins, fears, and obsessions collide to cancel, erupt, and dissolve into one another...creating an indecipherable, primordial chaos... "
13170-12 = "That...that is what shall appear before you."
13170-16 = "Now then, satisfy my curiosity...how will you confront chaos itself?"
13170-19 = "[log]All legal interpretations that appear in this work#nare purely fictional and bear no relation to real legal statutes.[/log]"
13170-24 = "[ns] \"I found Nonomi.\""
13170-25 = "Where is she?!"
13170-26 = "[ns] \"She's being held in the Abydos Central Station District Office building.\" "
13170-27 = "That's..."
13170-28 = "Yeah. They're holding the general creditors' meeting there. "
13170-29 = "That's a stroke of luck. I was concerned we'd have to split into two teams."
13170-30 = "Thanks, Sensei. Having your intel simplifies things for us. "
13170-31 = "We can stop Hoshino, certify the contract, and rescue Nonomi all at once."
13170-33 = "Adult-power always amazes me."
13170-34 = "Mm. It reminds me of when Serika was kidnapped by the Helmet Gang, and Sensei helped us."
13170-35 = "Th-That's ancient history! Why're you bringing up stuff like that right now?"
13170-36 = "...We were all really worried when it happened."
13170-37 = "R-Really...? S-Stop embarrassing me!"
13170-39 = "Hahaha... We all went into shock when we realized you were missing, Serika... "
13170-40 = "Mhm. Especially Hoshino."
13170-41 = "At first, she was just pacing around the room anxiously. Then she ran off by herself to go get Sensei's help."
13170-42 = "Hoshino? Really? "
13170-43 = "[ns1] \"Hoshino bowed her head, asking for help to save you.\"\n[ns2] \"I didn't tell anyone about it, though.\""
13170-48 = "What about her phone?"
13170-49 = "It's been turned off for a few hours now..."
13170-50 = "Her boss said she clocked out and left like everything was normal. Did she never make it home?"
13170-51 = "Nothing like this has ever happened before. She always gets home safely..."
13170-52 = "You don't think...it was the Helmet Gang?"
13170-53 = "What? The Helmet Gang?! "
13170-54 = "Could be, but let's not jump to conclusions. Hoshino and Sensei are still investigating."
13170-55 = "..."
13170-57 = "(opens door)"
13170-58 = "Sorry to keep you waiting. "
13170-59 = "Hoshino! Sensei!"
13170-60 = "[s] \"We're back.\""
13170-61 = "Did you find out what happened?"
13170-62 = "Sensei was able to log in to the General Student Council's central communication network. "
13170-63 = "You were able to get into their network? Wow. Sensei's the real deal..."
13170-64 = "It's a secret, though. We're in big trouble if they catch us."
13170-67 = "Ah... So that's what happened... "
13170-68 = "Yeah. And then she played it off like it was nothing. "
13170-69 = "Hahaha... I remember that. It feels as if so long has passed."
13170-70 = "Yeah. It hasn't been all that long though."
13170-71 = "Well, thanks for rescuing me back then, Sensei."
13170-73 = "[ns] \"That's my job.\""
13170-78 = "Current Time 8:5X AM."
13170-80 = "I will brief everyone on the current situation!"
13170-84 = "Our mission is to reach the top floor of the Abydos Central Station District Office and attend the general creditors' meeting! Our deadline is noon."
13170-85 = "There, we'll rescue Nonomi, who's being held captive at that location. "
13170-86 = "Lastly, we'll stop Hoshino from denying the legitimacy of the Abydos Student Council and declare the Foreclosure Task Force's intent to uphold the contract!"
13170-87 = "Okay, understood, Student Council President Ayane."
13170-88 = "..."
13170-89 = "Why're you getting all embarrassed, Ayane? You gotta get used to this."
13170-90 = "Well...all of this is just to assert our authority...for the contract..."
13170-91 = "[s3] \"Make them all kneel before your orders.\"\n[s4] \"Declare yourself boldly, Student Council President Ayane!\""
13170-94 = "...This operation needs someone to certify both the contract and our legitimacy, so I'll be coming along. "
13170-96 = "She avoided it."
13170-97 = "Dodged it."
13170-99 = "Ahem! Next is the operations briefing! "
13170-100 = "Currently, the private equity fund forces are blocking all four routes connecting to the Abydos Central Station: the east, west, south, and north routes!"
13170-102 = "Central Station District Office East"
13170-103 = "The eastern route is being blocked by the Puffy Puffy Helmet Gangsters, hired by the Debt Labor Union Leader. "
13170-104 = "Their forces seem the weakest, but they have the greatest numbers! This battle is under a tight deadline, as we need to arrive at the targeted location before noon. "
13170-105 = "Therefore, this route is expected to be the most difficult to break through!"
13170-107 = "Central Station District Office West Access Road"
13170-111 = "The west is being guarded by the Market Guards, hired by the Foreclosure Auction Guild Leader! "
13170-112 = "They may be small in number, but these are the Market Guards we're talking about! They're equipped with top-of-the-line heavy weaponry, the best combat helicopters and tanks you can find.  They're trained to be lethal and know how to move as a well-organized unit."
13170-113 = "This area has no geographical advantage or disadvantage, but since the enemy has the strongest firepower here, we have to avoid this route unless we've gained a significant strategic edge!"
13170-115 = "Central Station District Office South Open Field"
13170-117 = "The Pawnbroker Union Leader hired the violent Kurokame Gang to guard the southern route! "
13170-118 = "They are few in number, and their command structure is a mess, but they own a large number of turrets. To make matters worse, the area is all open terrain. We shouldn't attempt to approach without proper preparation."
13170-120 = "Central Station District Office North Access Road"
13170-123 = "Lastly, the northern route is fortified with barricades set up by mercenaries that ZYAKO industries hired."
13170-124 = "In other words, this route is much more focused on defense than offense. There might be nothing special about their firepower or combat strength, but it'll likely be impossible to break through without heavy equipment!"
13170-127 = "Hm... Which route, then?"
13170-128 = "We should just go whichever way Hoshino did, right?"
13170-129 = "Let's try to view the options from Hoshino's perspective..."
13170-130 = "Aren't we overthinking this? We have a Hoshino expert right here!"
13170-132 = "Hm..."
13170-133 = "Yes, Hoshino-expert Shiroko, what do you think?"
13170-134 = "Well... Hoshino's strength lies in pure combat ability, especially close-quarters combat."
13170-135 = "She might not seem like it now, but Hoshino was known for an aggressive style that had no regard for her own safety."
13170-136 = "Hoshino's probably been fighting alone for a very long time."
13170-137 = "So..."
13170-142 = "Central Station District Office West Access Road"
13170-146 = "Who are you?!"
13170-154 = "Th-That's...!"
13170-155 = "F-Fire! Fire! It's Takanashi Hoshino!"
13170-164 = "Wh-Where did she go?!"
13170-188 = "...I think it's the western route."
13170-189 = "Okay, let's trust the Hoshino expert, and head over there! "
13170-196 = "Concentrate forces on Hoshino! Deploy all available combat helicopters and tanks to her location!"
13170-197 = "The general creditors' meeting is about to begin! Do not allow her to break through! "
13170-199 = "Yes, sir!"
13170-204 = "Heh, another helicopter?"
13170-207 = "Confirming target location!"
13170-208 = "6 o'clock! Target at 6 o'clock! "
13170-213 = "Understood! Target confirmed. Locked on!"
13170-219 = "Got her! Fire all AGM-114 air-to-ground missiles!"
13170-226 = "Direct hit confirmed! Missiles have hit the target! "
13170-231 = "Wh-What in the...?! "
13170-239 = "She's running towards us...?! "
13170-240 = "This is ridiculous! She's going to charge a helicopter in the air?!"
13170-248 = "Wh-Where is she?!"
13170-249 = "B-Below us! She's hanging onto the helicopter?!"
13170-255 = "A-AAAH?!"
13170-264 = "Is this real life?! How is this possible?!"
13170-269 = "Ugh..."
13170-274 = "It appears things are not proceeding as planned."
13170-276 = "Shut up, Nephthys! "
13170-288 = "What is this? Why are you pointing your gun at me?"
13170-289 = "Hmph. We know of your scheme."
13170-290 = "Me? Scheme? What do you mean?"
13170-291 = "We know of your plot to betray the private equity fund!"
13170-304 = "K-Kaiser PMC?! "
13170-310 = "Watch that insolent mouth. Betrayal? The Train Cannon has always belonged to Nephthys."
13170-311 = "This pathetic menagerie of thugs is at fault for reaching above their station. Coveting what's not yours."
13170-317 = "A-Attack!!"
13170-331 = "Wh-What's that sound...?"
13170-333 = "... "
13170-338 = "Central Station District Office West Access Road"
13170-348 = "S-Someone get her!"
13170-357 = "Current Time 09:4X AM."
13170-360 = "Whoa! This place is trashed! That means we're in the right place, right?"
13170-361 = "Where's Hoshino?"
13170-366 = "...I found her! She's about 600 meters ahead of us."
13170-367 = "...700 meters, 750 meters... Sh-She's getting away!"
13170-369 = "A-Augh! She's so fast."
13170-370 = "We'll chase her down."

[translation]
102090-1 = "Episode 9; Second Sanctum - Millennium Ruins District"
102090-2 = "Beginning the second sanctum conquest. Is the defense unit ready?"
102090-3 = "Ready."
102090-4 = "I'm the rear support for Tsurugi, although I think she'd be fine by herself. But sure, I'm ready."
102090-8 = "Good... How about the drop unit? Is infiltration complete?"
102090-10 = "Yes. We've just entered the vent. "
102090-11 = "We're making our way towards the central area of the munitions factory."
102090-12 = "Hahaha! It's been a while since we've used parachutes! Wasn't that fun?"
102090-14 = "No time to dilly-dally. Let's get rolling!"
102090-15 = "Okay. The drop unit will attack the center of the munitions factory while the defense unit blocks troop advancement."
102090-16 = "Once the enemy's defenses are thrown off, the defense unit will enter the building."
102090-17 = "Let's begin the operation! We'll meet again before Chesed."

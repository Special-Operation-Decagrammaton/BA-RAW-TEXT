[translation]
102090-1 = "ตอนที่ 9;ปฏิบัติการบุกยึดหอคอยแห่งที่ 2 - เขตพื้นที่รกร้างมิลเลเนียม"
102090-2 = "เริ่มโจมตีหอคอยแห่งที่ 2 ได้ค่ะ กองกำลังป้องกัน พร้อมกันไหมคะ?"
102090-3 = "พร้อมแล้ว"
102090-4 = "ฉันคือหน่วยสนับสนุนในแนวหลังของรุ่นพี่ซึรุกิสินะคะ จริงๆ ฉันว่ารุ่นพี่คนเดียวก็น่าจะเพียงพอแล้ว... แต่ก็เอาเถอะค่ะ ฉันพร้อมแล้วค่ะ"
102090-8 = "อื้ม ขอเช็กกองกำลังโดดร่มด้วยนะ เป็นยังไงกันบ้าง? แทรกซึมสำเร็จไหม?"
102090-10 = "ค่ะ พวกฉันเพิ่งลักลอบผ่านช่องระบายอากาศเข้ามาเมื่อสักครู่เลยค่ะ "
102090-11 = "ตอนนี้เรากำลังมุ่งหน้าไปยังส่วนกลางของโรงงานอาวุธ"
102090-12 = "แหะๆๆ ไม่ได้โดดร่มมานานเลยนะ~ สนุกไหม?"
102090-14 = "อย่าชักช้าอืดอาดสิ รีบๆ เริ่มกันเถอะน่า!"
102090-15 = "อื้ม แผนการของเราคือ ระหว่างที่กองกำลังป้องกันคุ้มกันอยู่ด้านนอก กองกำลังโดดร่มก็จะโจมตี#nส่วนกลางของโรงงานอาวุธไปพร้อมๆ กัน"
102090-16 = "แบบนั้นระบบป้องกันของศัตรูก็จะสับสน และกองกำลังป้องกันก็จะเข้าไปข้างในได้"
102090-17 = "งั้นก็เริ่มปฏิบัติการกันเลย! ไว้เจอกันอีกครั้งตรงหน้าเชเซ็ดนะ"

[translation]
102090-1 = "第9話;第2聖所「千年郊外的封鎖地區」"
102090-2 = "第2聖所的攻略，要開始囉。#n防衛部隊，準備好了嗎？"
102090-3 = "準備完成。"
102090-4 = "我會從後方支援弦生前輩。#n雖然前輩自己一個人好像也沒問題就是了……準備OK的說。"
102090-8 = "OK。空降部隊怎麼樣了呢？"
102090-10 = "是，我們剛剛已經潛入了通風口。"
102090-11 = "目前正在前往軍需工廠的中心區域。"
102090-12 = "啊哈哈！好久沒玩降落傘了呢～！"
102090-14 = "這裡隨時都可以開始行動。來，趕快開始吧！"
102090-15 = "嗯。再次確認作戰內容──在防衛部隊抵擋敵人前進的期間，空降部隊負責對軍需工廠的中心發起進攻。"
102090-16 = "我想這樣一來，就能使受到奇襲的敵方防衛體制陷入混亂……#n在那之後，防衛部隊也會入侵工廠內部。"
102090-17 = "那麼……作戰開始！#n各位，在赫賽德面前再會吧。"

[translation]
1002803-1 = "兔子的生態"
1002803-2 = "（同時進行多項工作，最近已經到了極限的狀態……）"
1002803-3 = "（為了暫時喘口氣，我來到了附近的河邊）"
1002803-6 = "哦？是主人耶？"
1002803-7 = "[s1] 「……嗯？」\n[s2] 「這聲音是……」"
1002803-13 = "呀呼──！主人！竟然在這種地方遇到，真巧欸？"
1002803-14 = "該不會是？是來和明日奈一起觀察兔子的生態……？"
1002803-15 = "[s] 「……明日奈，怎麼穿成這樣？」"
1002803-16 = "嗯？"
1002803-17 = "……服裝？本來就要穿衣服呀？"
1002803-18 = "我剛剛不是說了嗎？這是為了觀察兔子的生態呀！"
1002803-19 = "我想說，為了了解兔子，首先要變成兔子！怎麼樣，這點子不錯吧？"
1002803-20 = "你看，這裡有這麼多草！是很適合兔子生活的地方！"
1002803-21 = "……嗯？"
1002803-22 = "其他人都在看……？嗯，對啊。那又怎麼樣？"
1002803-23 = "你想想看嘛。在外面看到兔子的話，主人也會多看幾眼吧？這是很正常很普通的事情呀！"
1002803-24 = "不是那個意思……？"
1002803-25 = "是嗎？"
1002803-29 = "嗯──……"
1002803-30 = "啊，難道說……"
1002803-31 = "主人，也想成為兔子嗎？"
1002803-32 = "[s3] 「？？？」\n[s4] 「抱歉，大概是我跟不上明日奈的邏輯。」"
1002803-33 = "如果是這樣的話，我可以幫主人找一件跟我同款，適合你的尺寸的衣服！"
1002803-34 = "如果是這樣的話，我可以幫主人找一件跟我同款，適合你的尺寸的衣服！"
1002803-35 = "……嗯？沒關係？是嗎？"
1002803-36 = "真可惜──"
1002803-37 = "為什麼那麼慌張？真是難以捉模的主人，明明肯定很合適的！"
1002803-38 = "話說，那主人要當什麼？"
1002803-39 = "……啊。"
1002803-40 = "主人畢竟還是主人，但你今天不是女僕的主人，讓你當兔子的主人好啦！"
1002803-41 = "嗯！這樣不錯！"
1002803-42 = "原來如此……"
1002803-48 = "好！主人！請摸摸明日奈兔子！"
1002803-49 = "[s5] 「在大庭廣眾之下，這有點……」\n[s6] 「抱歉，我果然完全跟不上明日奈的思考邏輯……」"
1002803-50 = "好啦，快點快點──！"
1002803-51 = "好啦，快點快點──！"
1002803-52 = "來，摸摸！摸摸！"
1002803-56 = "真是的，為什麼不摸摸我呢！？老在看著別處，那邊有什麼好玩的嗎？"
1002803-57 = "不能讓兔子感到寂寞的！兔子寂寞的話會死掉喔！"
1002803-58 = "所以主人，為了不讓明日奈感到寂寞，得好好疼愛我！"
1002803-62 = "呣～～～～……"
1002803-63 = "……既然這樣沒辦法了！如果主人不摸我的話……"
1002803-64 = "只好明日奈自己去蹭主人了！"
1002803-69 = "哦，哦哦？主人居然以沒見過的速度逃跑了！？"
1002803-70 = "等等！等等──！主人～！！"
1002803-75 = "別逃走啊～～～～！！"

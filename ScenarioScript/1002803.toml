[translation]
1002803-1 = "การใช้ชีวิตของกระต่าย"
1002803-2 = "(คุณครูรู้สึกล้าจากการทำงานอย่างหนักต่อเนื่อง จนทำงานต่อไม่ไหว)"
1002803-3 = "(คุณครูจึงออกมาเดินเล่นเพื่อเปลี่ยนบรรยากาศที่บริเวณใกล้ๆ แม่น้ำ)"
1002803-6 = "เอ๊ะ? นายท่านนี่นา?"
1002803-7 = "[s1] \"...?\"\n[s2] \"เสียงนี้มัน...\""
1002803-13 = "ยะฮู้ว~! นายท่าน! มาทำอะไรที่นี่เหรอ?"
1002803-14 = "หรือว่ามาเพราะเรื่องนั้น? นายท่านเองก็มาดูการใช้ชีวิตของกระต่ายเหรอ...?"
1002803-15 = "[s] \"อาสึนะ...?\""
1002803-16 = "หืม? ฉันทำไมเหรอ?"
1002803-17 = "ทำไมฉันถึงมาอยู่ที่นี่เหรอ? แล้วชุดของฉันมันทำไมเหรอ?"
1002803-18 = "ฮ่าฮ่าฮ่า! อะไรล่ะ? ฉันเพิ่งบอกไปเองนะว่าจะมาดูการใช้ชีวิตของกระต่าย"
1002803-19 = "เพื่อที่จะเข้าใจเรื่องของกระต่ายให้มากขึ้น ฉันก็เลยลองเป็นกระต่ายดูน่ะ#nเป็นยังไงล่ะ? ฉลาดสุดๆ เลยใช่มะ?"
1002803-20 = "ดูสิ นายท่าน! ตรงนี้มีต้นโคลเวอร์สีขาวอยู่ด้วย! แถวนี้เหมาะกับการอยู่อาศัยของกระต่ายมากเลย!"
1002803-21 = "หืม...?"
1002803-22 = "คนอื่นๆ กำลังมองอยู่งั้นเหรอ? แล้วยังไงล่ะ?"
1002803-23 = "ก็แน่อยู่แล้วไม่ใช่เหรอนายท่าน ถ้าตรงนี้มีกระต่ายอยู่ นายท่านก็ต้องเห็นเหมือนกันไม่ใช่เหรอ"
1002803-24 = "ไม่ได้หมายถึงเรื่องนั้นงั้นเหรอ?"
1002803-25 = "หืม...? หมายความว่ายังไงน่ะ?"
1002803-29 = "อืม~ งั้นเหรอ..."
1002803-30 = "หรือว่า..."
1002803-31 = "นายท่านอยากลองเป็นกระต่ายดูเหมือนกันใช่มั้ย?"
1002803-32 = "[s3] \"ทำไมถึงเข้าใจไปโน่นได้นะ?\"\n[s4] \"ที่พูดไปเมื่อกี้มีตรงไหนทำให้เข้าใจแบบนั้นนะ...\""
1002803-33 = "ถ้าอยากได้ชุดล่ะก็บอกฉันได้เลยนะ ฉันจะหาไซซ์ที่พอดีกับนายท่านมาให้เอง!"
1002803-34 = "ถ้าอยากได้ชุดล่ะก็บอกฉันได้เลยนะ ฉันจะหาไซซ์ที่พอดีกับนายท่านมาให้เอง!"
1002803-35 = "หืม...? ไม่เป็นไรงั้นเหรอ?"
1002803-36 = "นายท่านไม่ต้องเป็นกระต่ายก็ได้งั้นเหรอ?"
1002803-37 = "ฮ่ะฮ่ะฮ่ะฮ่าา!! ทำไมถึงทำหน้าตกใจแบบนั้นล่ะ? ว่าแล้วเชียวนายท่านนี่เป็นคนที่ลึกซึ้งเข้าถึง#nยากจริงๆ"
1002803-38 = "อืม~ ถ้าไม่เป็นกระต่าย แล้วนายท่านจะเป็นอะไรล่ะ? จริงสิ... นายท่านก็เป็นนายท่านยังไงล่ะ"
1002803-39 = "เดี๋ยวสิ"
1002803-40 = "ถ้างั้นตอนนี้นายท่านก็ไม่ใช่เจ้านายของเมดแล้ว แต่เป็นเจ้าของกระต่ายสินะ?"
1002803-41 = "แบบนี้นี่เอง! เจ้าของกระต่ายนี่เอง!"
1002803-42 = "อื้อ จริงด้วย! ฉันเองก็สงสัยอยู่เหมือนกัน เพราะกระต่ายป่ากับกระต่ายบ้านก็ไม่เหมือนกัน..."
1002803-48 = "นายท่าน! ช่วยลูบหัวกระต่ายอาสึนะหน่อยสิ!"
1002803-49 = "[s5] \"จู่ๆ ก็ขอเรื่องเกินเบอร์แบบนี้อีกแล้ว\"\n[s6] \"ไม่ยอมฟังที่ครูพูดเลยจริงๆ\""
1002803-50 = "เร็วสิๆ เร็วๆ สิค้านายท่าน~!"
1002803-51 = "เร็วสิๆ เร็วๆ สิค้านายท่าน~!"
1002803-52 = "ลูบให้หน่อยน้า! เร็วเข้า~!"
1002803-56 = "ทำไมนายท่านไม่ลูบล่ะ? แล้วทำไมต้องหันหน้าไปทางอื่นแบบนั้นด้วย?"
1002803-57 = "เขาบอกกันว่าห้ามปล่อยให้กระต่ายรู้สึกเหงานะ! ถ้าเป็นแบบนั้นมันอาจตายก็ได้!"
1002803-58 = "นายท่านก็ห้ามปล่อยให้อาสึนะเหงาเด็ดขาดเลยนะ"
1002803-62 = "ฮึ่มมม~~"
1002803-63 = "ถ้างั้นก็ช่วยไม่ได้ล่ะนะ!"
1002803-64 = "ถ้านายท่านไม่ยอมลูบ อาสึนะจะเอาตัวไปถูนายท่านเอง!"
1002803-69 = "เอ๋...? นายท่านจะไปไหนล่ะ?"
1002803-70 = "นายท่าน! อย่าหนีสิ! นายท่าน~!!"
1002803-75 = "นายท่าน~~~!!"

[translation]
1002803-1 = "Life of Rabbits"
1002803-2 = "The fatigue I felt from my never-ending work made it impossible for me to proceed with my tasks any longer."
1002803-3 = "What I really needed was some air, so I went to the nearby riverside."
1002803-6 = "Oh? It's you, Master?"
1002803-7 = "[s1] \"...?\"\n[s2] \"That voice sounds like...\""
1002803-13 = "Yoohoo! Fancy seeing you here, Master!"
1002803-14 = "Are you also here to learn about the lives of rabbits?"
1002803-15 = "[s] \"Asuna?\""
1002803-16 = "Me? What about me?"
1002803-17 = "Why am I here? What's wrong with my outfit?"
1002803-18 = "Hahaha! Weren't you listening? I came here to see how the rabbits live!"
1002803-19 = "In order to understand the rabbits, I must become the rabbit! What do you think? Smart, huh?"
1002803-20 = "Now watch, Master! This place has white clovers! It's the perfect habitat for rabbits!"
1002803-21 = "Huh?"
1002803-22 = "Other people are watching? So what?"
1002803-23 = "It's so obvious, Master! If there was a rabbit here, you'd be watching too."
1002803-24 = "That isn't what you meant?"
1002803-25 = "Then what do you mean?"
1002803-29 = "Is that so...?"
1002803-30 = "By any chance..."
1002803-31 = "Did you want to become a rabbit too, Sensei?"
1002803-32 = "[s3] \"...How did you come to that conclusion?\"\n[s4] \"What part of our conversation made you think that?\""
1002803-33 = "Just say the word, Master! I'll find an outfit that fits you perfectly!"
1002803-34 = "Just say the word, Master! I'll find an outfit that fits you perfectly!"
1002803-35 = "You're fine?"
1002803-36 = "You're fine with not being a rabbit?"
1002803-37 = "Hahaha! Why do you look so flustered? I'll never understand you, Master!"
1002803-38 = "What could you be if not a rabbit? I guess you can't be anything except a master..."
1002803-39 = "Wait."
1002803-40 = "That makes you a rabbit's master instead of a maid's master, doesn't it?"
1002803-41 = "That's right! You're a rabbit's master!"
1002803-42 = "Hmm, you're right! I bet rabbits in the wild are different from rabbits with masters."
1002803-48 = "Master! I'm your rabbit, so you should pet me right now!"
1002803-49 = "[s5] \"You're making outrageous demands again.\"\n[s6] \"You're not listening to me at all.\""
1002803-50 = "Hurry, Master. Hurry!"
1002803-51 = "Hurry, Master. Hurry!"
1002803-52 = "Pet me! Right now!"
1002803-56 = "Why aren't you petting me? Don't look away!"
1002803-57 = "They say rabbits can die if they're lonely! Do you want me to die?!"
1002803-58 = "Then you have to make sure I don't feel lonely! Isn't that right?"
1002803-62 = "Hmm."
1002803-63 = "Then I have no choice!"
1002803-64 = "If you won't pet me, then I'll just rub my head against you!"
1002803-69 = "Master! Where are you going?"
1002803-70 = "Master! Don't run away! Master!"
1002803-75 = "Master!"

[translation]
22030-1 = "Episode 3; Aris Goes on an Adventure!"
22030-2 = "After that, I started brainstorming with the members of the Game Development Department about ideas for a new game."
22030-3 = "As I said before, we are going with an innovative, brand-new idea for our next project."
22030-8 = "\"A therapeutic dungeon strategy RPG where you accept quests, go fishing, farm, and develop your character.\""
22030-9 = "For this genre, the most important thing is, of course, the dungeons!"
22030-10 = "Yes. Depending on how the dungeons are structured, the game's content can be changed in so many different ways."
22030-11 = "We can make dungeons with specific settings...or maybe mix it up with roguelike elements..."
22030-12 = "I would prefer roguelike elements."
22030-15 = "[ns] \"What do you enjoy about roguelike games, Aris?\""
22030-16 = "They are very exciting! I am always anticipating what kind of monsters I will see and what new rare equipment I will get every time the dungeon's structure changes."
22030-17 = "In the roguelike game that everyone made together last time, we designed a unique item named after you."
22030-18 = "[s] \"...You did?\""
22030-19 = "Yes. It is called Sensei's Praise Sticker."
22030-20 = "I was overjoyed whenever I got that item in the game. My character became very strong just by obtaining it!"
22030-21 = "[s] \"...R-Really? It's an honor to be featured in a game!\""
22030-22 = "Th-Th-That...! We were j-just trying to add a little spice into the game!"
22030-23 = "W-We wanted to make the game more e-ex..."
22030-24 = "A little more e-ex...extreme! You know!"
22030-25 = "Are you nervous? I think you mean \"exciting.\""
22030-27 = "I would like to see more Sensei items in the next game!"
22030-28 = "[s] \"What if I were a party member, rather than an item?\""
22030-29 = "Th-That's a g-good idea! Ahem! Anyway! If we're gonna make roguelike dungeons, what should they look like?"
22030-30 = "Underground ruins...? That's the most basic form when it comes to dungeons."
22030-31 = "Hmm, isn't that too predictable?"
22030-32 = "This game needs to be groundbreaking! Unique and amazing!"
22030-34 = "What if we did something like climbing a tower?"
22030-35 = "We could have the difficulty increase with each floor you reach."
22030-36 = "Walking up stairs is too boring! There's no innovation!"
22030-37 = "Hmph. You sure talk big, but I don't hear you giving any ideas!"
22030-38 = "Underground ruins...and a tower...rather than walking up stairs..."
22030-39 = "An elevator! How about an elevator?"
22030-41 = "Like taking an elevator down into some underground ruins?"
22030-42 = "I played a game like that before!"
22030-54 = "You are a spy who travels through the floors in an apartment elevator and defeats enemies."
22030-55 = "Oh, right. That's a pretty popular retro game."
22030-56 = "That doesn't exactly have the \"groundbreaking\" factor you were talking about."
22030-58 = "W-Well, I'm not done! You're right, it's lacking! There's no surprise element!"
22030-59 = "What do you mean?"
22030-60 = "In this era, games need flashy visuals and a mind-bending twist!"
22030-61 = "So instead of going down to some underground ruins, you go up a tower in an elevator!"
22030-62 = "A tower?"
22030-67 = "Not only that...you keep going up..."
22030-73 = "And when you reach the rooftop, there's a huge explosion!"
22030-74 = "A huge spectacle!"
22030-76 = "Wait, so how do you clear the dungeon?"
22030-77 = "Let's just focus on the flashy visuals first..."
22030-78 = "You say that every time!"
22030-80 = "Wh-What?! What do you mean, Midori?"
22030-81 = "I've heard you say this before."
22030-82 = "\"To express the awesomeness of a dungeon, we need to create a lot of cool art! Monsters, dungeon traps, et cetera!\" Because of you, we spent all day drawing the inside of a dark dungeon!"
22030-83 = "W-Well...! That's...!"
22030-84 = "I remember that! I drew lots of different things that day too!"
22030-85 = "Sensei, can I show you what I drew?"
22030-86 = "Especially my masterpiece... The Sensei Guardian, the strongest guard in the dungeon!"
22030-87 = "I named it after you, because you always guide us."
22030-88 = "[s] \"I'm a little scared for some reason!\""
22030-89 = "See? Everyone did it by choice! It was necessary for the process."
22030-90 = "I don't have a problem with making video game art!"
22030-91 = "But we worked so hard on it, and for what? We didn't actually use any of those assets in-game!"
22030-92 = "We didn't have a plan, so we wasted so much time! We should be a little more realistic!"
22030-93 = "Th-That's closed-minded! We're going to redefine the very meaning of video games! We have to overcome those kinds of limitations to do that!"
22030-102 = "[ns] \"Um, you guys, please calm down...\""
22030-103 = "Ugh! You're right, arguing won't help."
22030-104 = "What do you think, Sensei?"
22030-105 = "Yes! We need your opinion, Sensei! What do you think we should do?"
22030-106 = "[s] \"Um, that wasn't supposed to be my role here...\""
22030-108 = "It should be as flashy as possible!"
22030-109 = "But we have to do what's realistic!"
22030-112 = "Right? Sensei?!"
22030-116 = "[ns] \"(It's gonna be bad no matter what side I choose...)\""
22030-118 = "W-Wait! Everyone, stop!"
22030-119 = "You're putting Sensei in a very uncomfortable position!"
22030-121 = "Ah!"
22030-122 = "I-I'm sorry."
22030-123 = "A never-ending argument like this won't help anyone!"
22030-124 = "Yes. I think we should decide using a method that's been passed down for generations in the Game Development Department."
22030-126 = "Indeed, Yuzu! That is it!"
22030-127 = "[s] \"A method that's been passed down for generations?\""
22030-128 = "Yes... W-Well... You see..."
22030-129 = "More often than not...there are times when we can't come to an agreement."
22030-130 = "[s] \"I guess this happens pretty frequently.\""
22030-131 = "When we don't agree with each other's opinions, we have a special fight and the loser follows the winner's opinion."
22030-132 = "[s] \"That's a pretty drastic method!\""
22030-133 = "F-Fine. If Yuzu says so..."
22030-134 = "I accept the challenge!"
22030-135 = "Midori! I'm not gonna take it easy on you!"
22030-136 = "That's what I was gonna say!"
22030-137 = "[s1] \"B-But what are you planning to do?!\"\n[s2] \"I understand what you're saying, but you shouldn't fight...\""
22030-144 = "The only option is Fruitjelly War!"
22030-146 = "[s] \"...Oh, you meant you're going to fight with a game.\""
22030-148 = "Yes, we're the Game Development Department, after all."
22030-150 = "All right! Don't be a chicken, Midori!"
22030-151 = "Hmph! Likewise!"
22030-160 = "The two began their intense match against each other."
22030-162 = "Momoi and Midori are playing the game now."
22030-163 = "Then what should I do?"
22030-164 = "Aris... How about you try to come up with new ideas?"
22030-165 = "Go on an adventure with Sensei. You might find some inspiration."
22030-166 = "[s] \"The president of the Game Development Department is so mature...\""
22030-167 = "O-Oh...! I-I didn't mean to sound like... I just thought..."
22030-168 = "I understand! It is a quest to help advance my character!"
22030-169 = "Yes! I will do as you say, Yuzu!"
22030-170 = "Bum bum bum! Quest accepted!"
22030-171 = "Sensei! We will go on an adventure to collect ideas!"
22030-178 = "We began by exploring the Millennium campus."
22030-179 = "Bum bum bum! Aris and Sensei are out exploring the town!"
22030-180 = "From now on, Apprentice Hero Aris and Sensei's adventure begins!"
22030-181 = "[s] \"Huh? You're starting out as an apprentice hero?\""
22030-182 = "Yes! You and I are both level one apprentice heroes!"
22030-183 = "When I began the adventure last time, I started as a legendary hero..."
22030-184 = "But then... Momoi..."
22030-185 = "[s] \"What did Momoi say?\""
22030-186 = "She said you cannot start an adventure as a legendary hero, because at level one you are only killing snails and slimes."
22030-187 = "So I said then we should place legendary dragons around the starting town."
22030-188 = "But Midori and Yuzu said that is not how game progression is done."
22030-191 = "It is very hard to sell that kind of game, they said."
22030-192 = "We have to make sure not to make that mistake, because only a very small number of players would like such a game."
22030-193 = "[s] \"That's a very mature thing to say!\""
22030-196 = "I did not understand all of it, but..."
22030-197 = "I think that since we are beginning a brand new adventure, we should start from level one."
22030-198 = "We will defeat monsters one by one and solve quests! Then we can level up and become legendary heroes, Sensei!"
22030-199 = "[s] \"Quest accepted.\""
22030-200 = "Yes! But I would like to voice a concern about this adventure."
22030-201 = "What steps do we need to take to clear Yuzu's quest?"
22030-202 = "[s] \"We should begin by moving forward.\""
22030-203 = "What does that mean?"
22030-204 = "[s] \"You said before that a hero's adventure begins by moving forward.\""
22030-205 = "...!"
22030-206 = "Yes! Battling, leveling up, clearing quests...it all begins by moving forward!"
22030-207 = "You have excellent knowledge befitting a member of a hero's party, Sensei!"
22030-208 = "[s] \"I learned all of it from you, Aris.\""
22030-209 = "Okay, Sensei! Let us go forward!"
22030-211 = "And thus, my epic adventure with Aris began."
22030-213 = "Next Episode; Guided by Aris 1"

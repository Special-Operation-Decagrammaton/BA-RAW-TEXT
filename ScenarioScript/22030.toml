[translation]
22030-1 = "ตอนที่ 3;อาริสึจะเริ่มการผจญภัยแล้วค่ะ!~"
22030-2 = "(จากนั้นคุณครูและสมาชิกชมรมพัฒนาเกมก็เริ่มพูดคุยเกี่ยวกับไอเดียที่สามารถนำไปใส่ในเกมใหม่ได้)"
22030-3 = "จากที่เราหารือกัน บทสรุปของผลงานชิ้นต่อไปของเราก็คือ"
22030-8 = "<เกม RPG ลงดันเจี้ยนที่ดีต่อใจ ที่ให้ตัวละครได้ทำเควสและสนุกสนานไปกับการปลูกผัก ตกปลา>..."
22030-9 = "และถ้าเป็นเกมประเภทนั้น สิ่งที่สำคัญที่สุดก็คงจะเป็นดันเจี้ยน!"
22030-10 = "อืม... เนื้อหาของเกมสามารถเปลี่ยนได้หลายแบบ ขึ้นอยู่กับว่าเราจะสร้างดันเจี้ยนให้ออกมาเป็นยังไง..."
22030-11 = "ก็อย่างเช่น เราจะให้บุกดันเจี้ยนตามเกณฑ์ที่กำหนดไว้... หรือเป็นแนวโรกไลก์ที่เน้นการสุ่มเป็นสำคัญ..."
22030-12 = "อาริสึชอบแบบโรกไลก์ค่ะ"
22030-15 = "[ns] \"อาริสึชอบเกมแนวโรกไลก์เหรอ?\""
22030-16 = "ใช่ค่ะ! ทุกครั้งที่โครงสร้างของดันเจี้ยนเปลี่ยนไป อาริสึจะใจเต้นตึกตัก และลุ้นว่าจะได้เจอกับมอนสเตอร์#nแบบไหน และจะได้รับอุปกรณ์อะไรใหม่ๆ หรือเปล่าน่ะค่ะ"
22030-17 = "ในเกมโรกไลก์ที่พวกเราช่วยกันสร้างขึ้นคราวก่อน มีไอเทมพิเศษที่ใช้ชื่อของคุณครูด้วยนะคะ"
22030-18 = "[s] \"หืม...?\""
22030-19 = "ชื่อของมันก็คือ <สติกเกอร์คำชมจากคุณครู> ค่ะ"
22030-20 = "เวลาเล่นเกมและได้ไอเทมนี้ อาริสึจะดีใจมากเลยค่ะ เพราะแค่ได้รับ <สติกเกอร์คำชมจากคุณครู> ตัวละครของอาริสึก็จะเก่งขึ้นได้ยังไงล่ะคะ! "
22030-21 = "[s] \"งะ... งั้นเหรอ...? เป็นเกียรติจังที่ได้อยู่ในเกม!\""
22030-22 = "อ๊ะ... คะ... คือว่ามัน! เรียกว่าใส่เข้าไปเพิ่มอรรถรสก็แล้วกัน"
22030-23 = "อยากให้เกมมัน... เอ็กซ์... เอ็กซ์..."
22030-24 = "เอ็กซ์ตรีมขึ้นน่ะ เราก็เลยใส่ไอเทมชิ้นนั้นไป!"
22030-25 = "เอ็กซ์ไซติ้งต่างหากพี่! ที่แปลว่าน่าตื่นเต้นไง!"
22030-27 = "อาริสึอยากให้คุณครูอยู่ในเกมใหม่ของเราเยอะขึ้นจังเลยค่ะ!"
22030-28 = "[s] \"ได้ยินอย่างนั้นครูก็ดีใจ แต่ขอเป็นเพื่อนร่วมทีมได้ไหม ไม่ใช่ไอเทม...!\""
22030-29 = "เรื่องนั้นเก็บไว้ก่อนเถอะ! ถ้าเราจะทำดันเจี้ยนโรกไลก์ เราจะทำให้ออกมาในรูปแบบไหนดีล่ะ?"
22030-30 = "ถ้าเป็นรูปแบบพื้นฐานที่สุดของดันเจี้ยน... ก็คงเป็นอารยธรรมโบราณใต้ดิน...?"
22030-31 = "อืม~ มันจะไม่ธรรมดาไปเหรอ~?"
22030-32 = "ไหนๆ ก็จะทำแล้ว ฉันอยากให้มันเป็นอะไรที่พิเศษและยอดเยี่ยมหน่อย..."
22030-34 = "หรือว่าให้ขึ้นหอคอยไปเรื่อยๆ ดี?"
22030-35 = "แบบนี้ผู้เล่นจะรับรู้ได้ตามสัญชาตญาณว่าระดับความยากจะเพิ่มขึ้นไปเรื่อยๆ ตามขั้นบันไดที่ตัวละคร#nขึ้นไปนะ..."
22030-36 = "ไม่เห็นจะตื่นเต้นเลย! บันไดมันธรรมดาเกินไป!"
22030-37 = "อย่าเอาแต่พูดขัดสิ ถ้างั้นพี่มีไอเดียอะไรไหมล่ะ?"
22030-38 = "อะไรที่ไม่ใช่อารยธรรมโบราณ... ไม่ใช่หอคอย... ไม่ใช้บันได..."
22030-39 = "ลิฟต์ไง! ลิฟต์! เป็นยังไงล่ะ?"
22030-41 = "ให้ลงลิฟต์ไปอารยธรรมโบราณเหรอ?"
22030-42 = "จะว่าไป เกมที่อาริสึเคยเล่นก่อนหน้านี้ มีเกมที่คล้ายๆ กันอยู่นะคะ"
22030-54 = "ตัวละครเป็นสายลับ แล้วโดยสารขึ้นลงด้วยลิฟต์ของคอนโดเพื่อโค่นศัตรูค่ะ"
22030-55 = "อ้อ อืม... เป็นเกมที่ค่อนข้างฮิตในหมู่เกมเรโทรเลยละ..."
22030-56 = "อืม~ ไอเดียของพี่ก็ใช้ได้..."
22030-58 = "ไม่หรอก! แค่นั้นยังไม่พอ! ยังขาดอะไรอีกเยอะเลย! ยังไม่เห็นจะมีอะไรน่าตื่นเต้นเลย!"
22030-59 = "หืม......?"
22030-60 = "สมัยนี้ต้องเป็นเกมที่มีภาพที่ดูสีสันตระการตา แล้วก็ต้องมีการพลิกล็อกด้วย!"
22030-61 = "เพราะฉะนั้นเราจะไม่ลงมาที่อารยธรรมโบราณ แต่จะให้ขึ้นหอคอยไปแทน! ขึ้นลิฟต์ไปหอคอย!"
22030-62 = "หอคอย?"
22030-67 = "ไม่ใช่แค่นี้นะ... พอขึ้นไปเรื่อยๆ..."
22030-73 = "ขึ้นไปเรื่อยๆ จนถึงชั้นดาดฟ้า ก็จะเกิดการระเบิดครั้งใหญ่...!"
22030-74 = "เอาให้ยิ่งใหญ่ตระการตาเลย!"
22030-76 = "เดี๋ยวก่อน แล้วจะบุกดันเจี้ยนยังไงนะ?"
22030-77 = "เราต้องใส่ใจเรื่องภาพกราฟิกที่หรูหราก่อนสิ..."
22030-78 = "พี่ก็พูดอย่างนี้อยู่เรื่อย!"
22030-80 = "หืม?! มะ... มิโดริ...?"
22030-81 = "คราวที่แล้วพี่ก็พูดอย่างนี้ไม่ใช่เหรอ?"
22030-82 = "\"เพื่อสื่อถึงความยิ่งใหญ่ของดันเจี้ยนนี้ เราต้องวาดรายละเอียดดันเจี้ยนให้ละเอียดทุกอณู ทั้งมอนสเตอร์#nและกับดักในนั้น!\" เพราะแบบนี้พวกเราทุกคนเลยต้องมานั่งวาดดันเจี้ยนมืดๆ กันหลังขดหลังแข็ง!"
22030-83 = "อึก! นะ... นั่นมัน!"
22030-84 = "อื้อ! อาริสึก็จำได้ว่าวาดไปเพียบเลยค่ะ! สนุกมากเลยที่ได้วาดอะไรหลายๆ แบบค่ะ!"
22030-85 = "อาริสึเอารูปที่วาดให้ดูไหมคะคุณครู?"
22030-86 = "ผลงานนี้ของอาริสึก็คือ... <คุณครูผู้พิทักษ์> ผู้พิทักษ์ดันเจี้ยนสุดแข็งแกร่ง!"
22030-87 = "อาริสึตั้งชื่อภาพจากภาพลักษณ์ของคุณครูที่คอยนำทางอาริสึอยู่เสมอค่ะ!"
22030-88 = "[s] \"ใจหนึ่งก็อยากดู อีกใจก็บอกว่าอย่าดูเลยดีกว่า!\""
22030-89 = "ก็เราต้องวาดดันเจี้ยนกันอย่างประณีต... กะ... ก็เลยไม่มีทางเลือก... นอกจากให้ทุกคนมาช่วยกัน..."
22030-90 = "ก็ไม่ได้อะไรกับเรื่องการวาดหรอกนะ"
22030-91 = "แต่ปัญหาก็คือ เราช่วยกันวาดออกมาอย่างยากลำบาก... แต่พอถึงเวลาก็แทบไม่ได้เอาไปใช้ในเกมเลย"
22030-92 = "อย่าสั่งให้ทำอะไรที่ไม่จำเป็นสิ... เราควรคุยเรื่องที่เป็นไปได้ก่อนไม่ใช่รึไง?"
22030-93 = "ตะ... แต่ว่า! เราต้องก้าวข้ามขีดจำกัด! เพื่อออกไปแตะขอบฟ้า!!"
22030-102 = "[ns] \"คือว่า ครูว่าทั้งคู่ต้องใจเย็นๆ ก่อน...\""
22030-103 = "อ้อ! จริงสิ!"
22030-104 = "แล้วคุณครูล่ะ มีความคิดเห็นยังไง?!"
22030-105 = "ใช่ค่ะ! ในเวลาแบบนี้เรายิ่งต้องการความคิดเห็นของคุณครูค่ะ! คุณครูคิดว่าแบบไหนถูกต้องคะ?"
22030-106 = "[s] \"นี่มันไม่ใช่เหตุผลที่ชวนครูมาตั้งแต่แรกหรอกใช่ไหม...?\""
22030-108 = "ความหรูหราต้องมาก่อนใช่ไหมล่ะ?!"
22030-109 = "แต่เราต้องมองความเป็นจริงก่อนสิคะ?"
22030-112 = "ว่าไงคะ?! คุณครู!"
22030-116 = "[ns] (แล้วครูเลือกอะไรได้ไหม เลือกให้ปล่อยครูไปได้หรือเปล่า...)"
22030-118 = "ดะ... เดี๋ยวก่อน! ทุกคนหยุด!"
22030-119 = "แบบนี้คุณครูจะยิ่งลำบากใจนะ...!"
22030-121 = "เอ่อ..."
22030-122 = "ขะ... ขอโทษนะ..."
22030-123 = "ถ้าเอาแต่โต้เถียงในสิ่งที่ยังสรุปกันไม่ได้ ก็จะมีแต่สร้างความเดือดร้อนให้เปล่าๆ"
22030-124 = "ฉันเลยคิดว่าเราต้องตัดสินใจด้วยวิธีของชมรมพัฒนาเกมที่ส่งต่อกันมารุ่นสู่รุ่น"
22030-126 = "อ้อ! ใช้วิธีนั้นเองเหรอคะ ยูสึ!"
22030-127 = "[s] \"วิธีที่ส่งต่อกันมารุ่นสู่รุ่นเหรอ...?\""
22030-128 = "ค่ะ เพราะบางที... ไม่สิ..."
22030-129 = "พอมาคิดๆ ดูแล้วก็หลายครั้งเลยละค่ะ... ที่ความคิดเห็นของพวกเรา... วิ่งเป็นเส้นขนานกัน..."
22030-130 = "[s] \"คงจะเกิดขึ้นบ่อยเลยสินะ...\""
22030-131 = "เมื่อความคิดเห็นของเราไม่ตรงกัน เราก็จะตัดสินแพ้ชนะด้วยวิธีพิเศษ และผู้แพ้ก็ต้องทำตามความคิด#nเห็นของผู้ชนะค่ะ"
22030-132 = "[s] \"ชมรมพัฒนาเกมนี่ชอบการต่อสู้มากกว่าที่คิดแฮะ!\""
22030-133 = "ดีละ... ถ้ายูสึเสนอวิธีนั้นมาละก็..."
22030-134 = "ฉันจะยอมรับการแข่งขัน!"
22030-135 = "มิโดริ! ถึงจะใช้มุกบีบน้ำตา แต่พี่ก็ไม่ยอมให้หรอกนะ!"
22030-136 = "ฉันต่างหากที่ต้องพูดกับพี่แบบนั้น!"
22030-137 = "[s1] \"ตะ... แต่ว่าจะแข่งขันกันแบบไหนเหรอ?\"\n[s2] \"หวังว่าจะไม่ได้ต่อสู้กัน... จริงๆ หรอกนะ...\""
22030-144 = "เราจะแข่งกันด้วยเกม <ฟุรุเจลลี่>!"
22030-146 = "[s] \"อ้อ... ตัดสินแพ้ชนะด้วยเกมนั้นสินะ\""
22030-148 = "ใช่ค่ะ ก็เราคือชมรมพัฒนาเกมนี่คะ"
22030-150 = "เอาละ! ไม่ต้องอ่อนข้อให้พี่นะมิโดริ!"
22030-151 = "ฮึ่ม! พี่นั่นแหละ!"
22030-160 = "(ในระหว่างที่โมโมอิกับมิโดริเริ่มแข่งขันกัน...)"
22030-162 = "โมโมอิ! มิโดริ! ทั้งสองเริ่มเล่นเกมกันแล้วเหรอคะเนี่ย"
22030-163 = "อืม งั้นอาริสึควรไปทำอะไรดีล่ะคะ?"
22030-164 = "อาริสึจังก็... ลองไปหาไอเดียจากแถวๆ นี้ดูไหม?"
22030-165 = "ถ้าได้ออกไปเดินเล่นกับคุณครู ก็อาจจะได้แรงบันดาลใจพิเศษๆ กลับมาก็ได้นะ"
22030-166 = "[s] \"รู้สึกได้ถึงศักดิ์ศรีของหัวหน้าชมรมพัฒนาเกมเลย...\""
22030-167 = "คะ? เอ่อ... มะ... มะ... ไม่ขนาดนั้นหรอกค่ะ...!"
22030-168 = "อ๊ะ! นั่นสิคะ! นี่คือเควสที่อาริสึได้รับ... เพื่อสร้างเกมให้สนุกขึ้น..."
22030-169 = "รับทราบค่ะยูสึ! "
22030-170 = "ปาปัม ปาปัม ป๊าม! อาริสึรับเควสแล้วค่ะ!"
22030-171 = "ไปผจญภัยกับอาริสึ เพื่อรวบรวมไอเดียกันเถอะค่ะคุณครู!"
22030-178 = "(คุณครูและอาริสึออกจากห้องชมรมมาอยู่ในบริเวณโรงเรียนมิลเลเนียม)"
22030-179 = "ปาปัม ปาปัม ป๊าม! ปาร์ตี้ของอาริสึกับคุณครูออกมานอกหมู่บ้านแล้วค่ะ!"
22030-180 = "การผจญภัยของผู้กล้าฝึกหัดจะเริ่มขึ้น ณ บัดนี้ค่ะ!"
22030-181 = "[s] \"หืม? ครั้งนี้เริ่มด้วยการเป็นผู้กล้าฝึกหัดเหรออาริสึ?\""
22030-182 = "ใช่ค่ะ! ครั้งนี้ทั้งอาริสึและคุณครูจะเริ่มจากผู้กล้าฝึกหัด เลเวล 1 ค่ะ!"
22030-183 = "ถึงตอนที่ไปผจญภัยครั้งที่แล้ว เราจะเริ่มจากผู้กล้าในตำนานก็เถอะ..."
22030-184 = "ตอนนั้นโมโมอิพูดเอาไว้แบบนี้น่ะค่ะ"
22030-185 = "[s] \"โมโมอิเหรอ?\""
22030-186 = "ค่ะ โมโมอิบอกว่า \"ถ้าเริ่มการผจญภัยด้วยผู้กล้าในตำนาน แล้วเริ่มด้วยการจัดการหอยทากเลเวล 1 มันจะไม่ดูแปลกๆ เหรอ?\""
22030-187 = "จากนั้นก็บอกว่าจะวางมังกรในตำนานไว้แถวๆ หมู่บ้านที่เริ่มผจญภัยด้วยค่ะ"
22030-188 = "มิโดริกับยูสึก็เลยช่วยกันห้าม เพราะถ้าทำแบบนั้นจะเล่นเกมไม่ได้ค่ะ"
22030-191 = "และเกมประเภทนั้นมันก็ขายยากด้วย...?"
22030-192 = "และถึงจะขายได้ แต่ก็คงมีผู้เล่นเฉพาะกลุ่ม...? สรุปก็คือต้องระวังให้มากๆ จะได้ไม่ทำออกมาคล้ายเกม#nแบบนั้นน่ะค่ะ"
22030-193 = "[s] \"พูดอะไรได้เหมือนกับผู้ใหญ่เลยนะ...!\""
22030-196 = "ถึงอาริสึจะเข้าใจที่ทุกคนพูดได้ไม่หมด..."
22030-197 = "แต่วันนี้ก็จะเริ่มการผจญภัยกับคุณครูด้วยผู้กล้าเลเวล 1 ค่ะ"
22030-198 = "ค่อยๆ ทำเควสและจัดการมอนสเตอร์ไปเรื่อยๆ! แล้วก็อัปเลเวลจนได้เป็นผู้กล้าในตำนาน แบบนี้ไงคะ คุณครู!"
22030-199 = "[s] \"อื้ม\""
22030-200 = "ฮึ่ม! แต่พอได้มาเริ่มผจญภัยกับคุณครูแบบนี้ อาริสึก็รู้สึกกังวลขึ้นมาค่ะ"
22030-201 = "เราต้องทำยังไง ถึงจะเคลียร์เควสของยูสึได้นะ..."
22030-202 = "[s] \"งั้นเราไปข้างหน้ากันก่อนไหม?\""
22030-203 = "คะ?"
22030-204 = "[s] \"อาริสึเคยพูดไว้นี่ว่าการผจญภัยของผู้กล้าจะเริ่มด้วยการเดินไปข้างหน้า\""
22030-205 = "......!"
22030-206 = "ใช่ค่ะ! ทั้งการพบกัน! การต่อสู้ การอัปเลเวล และการเคลียร์เควสด้วย! ทุกอย่างเริ่มจากการเดินไป#nข้างหน้า!"
22030-207 = "ในฐานะของสมาชิกปาร์ตี้ผู้กล้า คุณครูเองก็พกความรู้มาเต็มเปี่ยมเลยนะคะเนี่ย!"
22030-208 = "[s] \"ครูเรียนรู้มาจากอาริสึทั้งหมดเลยน่ะ\""
22030-209 = "ค่ะ! ถ้างั้นเราก็มุ่งไปข้างหน้าเลยค่ะคุณครู!"
22030-211 = "(และทั้งสองก็เริ่มการผจญภัยด้วยกัน)"

[translation]
22030-1 = "第3話;～愛麗絲，冒險開始！～"
22030-2 = "（在那之後，和遊戲開發部的成員們一起討論著新遊戲的點子）"
22030-3 = "剛才也說了，我們的新作是──"
22030-8 = "「輕鬆慢活系地城探索RPG」！"
22030-9 = "果然，最重要的是作為核心內容的地下城吧！"
22030-10 = "嗯……根據地城的設計方式，遊戲的內容也會有所改變……"
22030-11 = "要設計成固定的地城呢……還是要做成Rougelike呢……"
22030-12 = "愛麗絲喜歡Rougelike！"
22030-15 = "[ns]「愛麗絲喜歡Rougelike嗎？」"
22030-16 = "是的！因為每次地城的構造都會改變，#n這次會遇到什麼樣的怪物和稀有裝備呢，真是讓人興奮！"
22030-17 = "特別是在上次大家一起做的Rougelike遊戲中，#n用老師的名字做了專屬的道具。"
22030-18 = "[s]「……嗯？」"
22030-19 = "名為「老師的花丸貼紙」！"
22030-20 = "每次獲得貼紙的時候，愛麗絲都非常開心。#n拿來使用的話，角色就會變得非常強！"
22030-21 = "[s]「……花丸貼紙的效果，真厲害呢！」"
22030-22 = "啊，那，那個是！#n該說是一點小小的玩心嗎。"
22030-23 = "想要讓遊戲更，呃，Ex……ex……"
22030-24 = "Extreme一點！"
22030-25 = "妳想說的是Exciting吧？"
22030-27 = "在這次的遊戲裡，愛麗絲也想蒐集很多「花丸貼紙」！"
22030-28 = "[s]「雖然愛麗絲這麼說我很開心，但有機會的話還是想成為隊伍的成員呢……！」"
22030-29 = "那，如果要做成Rougelike，要用怎麼樣的形式呢？"
22030-30 = "地下遺跡……之類的？#n畢竟是地下城最基本的形式……"
22030-31 = "唔嗯～會不會太普通了？"
22030-32 = "既然要做的話……希望能做得更特別、更宏大……"
22030-34 = "做成爬上高塔的形式呢？"
22030-35 = "每爬上一層階梯就提高一點難度，這樣也很符合直覺吧。"
22030-36 = "那樣不就沒有意外性了嗎！階梯什麼的太普通了啦！"
22030-37 = "只會抱怨……#n那，姐姐妳的想法呢？"
22030-38 = "地下遺跡……塔……#n那就，不要爬樓梯……"
22030-39 = "電梯！#n搭電梯怎麼樣？"
22030-41 = "搭電梯去地下遺跡嗎？"
22030-42 = "這麼說來，以前玩過的遊戲裡也有類似的情節。"
22030-54 = "是化身為間諜，在大樓的電梯裡打倒敵人的遊戲！"
22030-55 = "啊，是懷舊遊戲裡很有名的那款對吧。"
22030-56 = "唔嗯～姐姐的點子還是有點……"
22030-58 = "是吧！果然這樣還不夠！太缺乏意外性了！"
22030-59 = "嗯……？"
22030-60 = "我們需要的是華麗的視覺效果！還有宏大的劇情跟意外性！"
22030-61 = "所以不是搭去地下遺跡，而是搭上塔去怎麼樣！#n搭著電梯！"
22030-62 = "塔？"
22030-67 = "搭電梯上去……"
22030-73 = "然後最後要在屋頂上爆炸！"
22030-74 = "這才能稱的上壯觀啊！"
22030-76 = "等等。#n那要怎麼攻略地城啊？"
22030-77 = "先注重華麗的視覺效果……"
22030-78 = "姐姐每次都這麼說！"
22030-80 = "嗚哇！？綠，綠……？"
22030-81 = "之前也說過一樣的話。"
22030-82 = "說什麼「為了展現這個地城，需要仔細地描繪內部的細節！」之類的話，害大家整天都在畫地城！"
22030-83 = "唔！那，那是因為……！"
22030-84 = "愛麗絲也畫了很多！可以畫各種東西真開心呢！"
22030-85 = "老師請看！這是愛麗絲畫的插圖！"
22030-86 = "愛麗絲最有自信的作品……就是地城中最強的守門人「老師守衛」！#n是用一直引導著愛麗絲與夥伴們的老師的形象命名的！"
22030-87 = "是非常強的無敵守衛！"
22030-88 = "[s]「真是讓人有點想看……又不是很想看！」"
22030-89 = "那，那個……華麗的特效，#n只，只不過是……有必要時的，選擇……而已嘛。"
22030-90 = "我並不是說不喜歡畫這件事情唷。"
22030-91 = "問題是，大家明明畫得那麼辛苦……#n遊戲裡面卻幾乎沒有用到。"
22030-92 = "別做那些沒有意義的事了。#n先討論有可能實現的事情吧。"
22030-93 = "可，可是！那樣就看不到地平線的景色了唷！#n不能突破極限了唷！"
22030-102 = "[ns]「妳們兩個都冷靜一點……」"
22030-103 = "對了！"
22030-104 = "老師你的意見呢！？"
22030-105 = "對呀。這種時候就需要老師的意見！#n老師覺得哪邊是對的？"
22030-106 = "[s]「先等一下，找我來的理由是不是變了……？」"
22030-108 = "果然是喜歡華麗一點吧！？"
22030-109 = "有必要向現實妥協吧？"
22030-112 = "對吧！？老師！"
22030-116 = "[ns]（不管選哪一邊，好像都會立起BadEnd的Flag……）"
22030-118 = "等，等等！大家等一下！"
22030-119 = "會，會讓老師困擾的……！"
22030-121 = "啊……"
22030-122 = "抱，抱歉……"
22030-123 = "就算繼續爭論，也只會給老師添麻煩而已唷。"
22030-124 = "所以……我認為這種時候就要用遊戲開發部代代相傳的「那個」來決定比較好。"
22030-126 = "原來如此！是「那個」對吧，柚子！"
22030-127 = "[s]「代代相傳的『那個』……？」"
22030-128 = "是的，那個……偶爾……"
22030-129 = "有時候……經常，會出現彼此的意見跟平行線一樣的狀況。"
22030-130 = "[s]「經常出現啊……」"
22030-131 = "所以，就規定無法同意彼此的意見時，要一決勝負。#n「贏家的意見是絕對的」就是這樣的規則。"
22030-132 = "[s]「遊戲開發部比想像中還接近武鬥派呀……」"
22030-133 = "可以呀……既然柚子都這麼說了……"
22030-134 = "這場比賽！我接受了！"
22030-135 = "綠！妳就算哭我也不會放水的！"
22030-136 = "那是我要說的台詞，姐姐！"
22030-137 = "[s1]「雖，雖然說要一決勝負……究竟要做什麼呢？」\n[s2]「我覺得為了這個打架不太好……」"
22030-144 = "要用《Full Jelly》一決勝負唷！"
22030-146 = "[s]「……啊，是用遊戲一決勝負啊。」"
22030-148 = "對，畢竟我們是遊戲開發部。"
22030-150 = "來！妳已經沒有退路了哦！綠！"
22030-151 = "哼！姐姐妳才是！"
22030-160 = "（於是，在桃井和綠開始對戰的時候……）"
22030-162 = "兩個人都開始玩遊戲了……"
22030-163 = "愛麗絲該做什麼好呢？"
22030-164 = "嗯……愛麗絲醬可以去找找看有沒有新的點子嗎？"
22030-165 = "和老師一起的話，說不定能獲得一些特別的靈感。"
22030-166 = "[s]「感受到遊戲開發部部長的威嚴了……」"
22030-167 = "咦？啊，我，我，我覺得沒有那種東西……！"
22030-168 = "原來如此……這是為了做出有趣遊戲的任務對吧！"
22030-169 = "好的！我知道了，柚子！"
22030-170 = "乓啪喀乓！#n愛麗絲接受了任務！"
22030-171 = "走吧，老師！和愛麗絲一起去冒險吧！"
22030-178 = "（於是，和愛麗絲一起探索起了千年的校園）"
22030-179 = "乓啪喀乓！#n愛麗絲和老師，成功離開村莊了！"
22030-180 = "見習勇者愛麗絲和老師的冒險就此展開！"
22030-181 = "[s]「愛麗絲，今天是見習勇者嗎？」"
22030-182 = "是的！今天愛麗絲和老師都是1級的見習勇者！"
22030-183 = "在此之前，有時會以傳說勇者的身份開始冒險……"
22030-184 = "那個時候，桃井是這麼說的。"
22030-185 = "[s]「桃井？」"
22030-186 = "是的。「傳說勇者打倒1級蝸牛的冒險不是很奇怪嗎？」。"
22030-187 = "「所以，就在冒險開始的村莊附近配置傳說之龍吧！」。#n雖然桃井這麼說……"
22030-188 = "不過綠和柚子說這樣遊戲會進行不下去所以死命地阻止了。"
22030-191 = "說那種遊戲很難賣出去……？"
22030-192 = "還有就算賣得出去，也只能在消費者很有限的圈子裡……？#n有可能成為這種遊戲之類的！"
22030-193 = "[s]「原來如此。是大人的苦衷呢……」"
22030-196 = "那個時候，雖然無法完全理解大家說的話……"
22030-197 = "但是……今天難得跟老師一起冒險，所以就從1級開始。"
22030-198 = "一步一步打倒怪物，並提升等級……#n以成為傳說勇者為目標吧，老師！"
22030-199 = "[s] 「嗯，一起加油吧。」"
22030-200 = "……不過，雖然一起開始了冒險，#n愛麗絲卻很煩惱。"
22030-201 = "要怎麼完成柚子的任務呢……？"
22030-202 = "[s]「唔嗯……總之先前進看看吧？」"
22030-203 = "前進？"
22030-204 = "[s]「愛麗絲也說過吧。勇者的冒險都是從前進開始的。」"
22030-205 = "……！"
22030-206 = "沒錯！相遇也是、戰鬥也是……升級和完成任務也一樣！#n都是從前進開始的！"
22030-207 = "老師有著非常棒的知識呢！"
22030-208 = "[s]「這全都是愛麗絲教我的唷。」"
22030-209 = "耶嘿嘿，嗯！那麼，老師！我們走吧！前進！"
22030-211 = "（就這樣，與愛麗絲的冒險開始了）"
22030-213 = "下一話;～愛麗絲和被引導的人們～（１）"

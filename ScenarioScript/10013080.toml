[translation]
10013080-1 = "Episode 8;Helmet Gangsters! The Final Showdown!"
10013080-6 = "We're here!"
10013080-7 = "We've finally arrived! This resort belongs to the Helmet Gangsters, the biggest faction in the archipelago of the Lost Paradise Resort!"
10013080-8 = "But, Shizuko..."
10013080-9 = "It's kinda creepy here!"
10013080-13 = "[ns] \"It's empty for some reason...?\""
10013080-15 = "Oh..."
10013080-16 = "[s] \"Chise?\""
10013080-17 = "Sparkly ladybug!"
10013080-18 = "Huh? Chise, what ladybug? I don't see one!"
10013080-24 = "...Who's the ladybug with a perfect balance of red and black?!"
10013080-25 = "[s] \"You understood right away! Amazing!\""
10013080-27 = "You're a Helmet Gangster officer?"
10013080-28 = "They surrounded us too quickly. They were prepared."
10013080-29 = "Did we walk straight into their trap?!"
10013080-31 = "Haha! Yeah, you did! This place was always meant to be your grave! And you dug it yourself by coming here!"
10013080-32 = "[s] \"But how did you know we were coming?\""
10013080-34 = "We take care of our customers."
10013080-35 = "That's a motto of the Kaiser Corporation."
10013080-41 = "[ns] \"I thought this might be the case, but you...\""
10013080-42 = "Long time no see, Schale Sensei."
10013080-43 = "[s1] \"Kaiser Director!\"\n[s2] \"I assume you're here on vacation?\""
10013080-46 = "Oh! You're one of the employees from the Octopus Bank!"
10013080-47 = "Good to see you!"
10013080-48 = "[s] \"Are you the one who gave them this contract?\""
10013080-49 = "I was the one who introduced and proposed the great Lost Paradise Resort offer to those kids."
10013080-50 = "My plans in Abydos failed, thanks to you. I had to resign as a director."
10013080-51 = "Now I'm in charge of on-site sales with the Octopus Bank!"
10013080-52 = "[s] \"That's what happened to you afterwards.\""
10013080-53 = "But what are you doing over here?"
10013080-58 = "I'd expect running a resort to be a full-time job."
10013080-59 = "How dare you! We're here to retrieve the illegal contract you arbitrarily handed out!"
10013080-60 = "We know what you did! Putting a loophole in the contract was reprehensible!"
10013080-61 = "What are you talking about? All I did was suggest a good product when you showed up at the bank."
10013080-62 = "I didn't force you to do anything. You were the ones who bought the product hoping to make money!"
10013080-63 = "That's...!"
10013080-64 = "But what you're doing right now is unacceptable. You can't take other resorts' contracts."
10013080-65 = "I can't let you overstep our authority. So, I had to come all the way out here. To handle this nonsense."
10013080-66 = "I even brought a bodyguard."
10013080-68 = "Hahaha!"
10013080-69 = "This is nonsense. You were the one who misled Shizuko from the beginning."
10013080-71 = "[ns] \"Your target was always Momoyodou, wasn't it? \""
10013080-72 = "The Festival Operations Department is useful. They have the right to hold festivals at the Hyakkiyako Academy. I can't let that go to waste."
10013080-76 = "Our goal was to tarnish Momoyodou's reputation."
10013080-82 = "To achieve this, we lured all kinds of shady characters to this archipelago."
10013080-88 = "After this incident ruins Hyakkiyako's reputation, Momoyodou will have no choice but to sell."
10013080-89 = "A genius plan, I know."
10013080-91 = "But here you are again, Schale Sensei. Ruining my plans."
10013080-92 = "[s] \"I ruined your plans?\""
10013080-93 = "What did you do this time?"
10013080-94 = "Did you become a pillar of strength for Momoyodou? Did you tell them to never give up? What kind of sweet words did you encourage them with?"
10013080-95 = "It doesn't matter. I'll make you an offer you can't refuse."
10013080-96 = "What do you mean?"
10013080-97 = "I'll make a deal with you. I'll invest in your little business."
10013080-98 = "I-Invest? The Octopus Bank, I mean, Kaiser Corporation wants to invest in us?"
10013080-99 = "Yes. Seeing as you've come this far, you must be better than I thought."
10013080-100 = "On the way here, I heard you signed franchise contracts with various people. We'll get our hands on those too."
10013080-101 = "Of course, the Festival Operations Department's reputation is a bit damaged since contracts were distributed under its name."
10013080-102 = "But that's nothing money can't solve."
10013080-103 = "We'll invest. This is your chance to make a lot of money."
10013080-104 = "No lies this time."
10013080-105 = "The Festival Operations Department will run the Lost Paradise Resort and make a massive profit."
10013080-106 = "You'd be stupid to turn down this opportunity!"
10013080-111 = "Boss..."
10013080-112 = "Shizuko."
10013080-113 = "..."
10013080-114 = "That's very tempting."
10013080-115 = "Shizuko..."
10013080-116 = "However."
10013080-120 = "I guess I'm just stupid. I reject!"
10013080-121 = "What?! This is the offer of a lifetime."
10013080-124 = "You know what Niya said to me?"
10013080-125 = "When we found out we got scammed, Niya told me to just come back home."
10013080-126 = "She said she would take revenge on the perpetrators for playing so dirty. That she would handle everything."
10013080-128 = "But I knew I had to stay."
10013080-129 = "I had to protect Hyakkiyako's brand."
10013080-130 = "But there was one more reason."
10013080-131 = "I can't forgive people who disrespect festivals!"
10013080-135 = "What nonsense are you saying right now?"
10013080-136 = "The Hot Springs Department students..."
10013080-142 = "They were working so hard toward their dream."
10013080-143 = "That's why I suggested we make a deal."
10013080-149 = "Those students held the Mushiqueen competition because they loved the game, just like a big festival."
10013080-150 = "I liked their passion, so I suggested a contract."
10013080-155 = "But you guys are different. You're just like Date Meowru."
10013080-156 = "Even right now, guests are suffering because of this \"Resort Hunt\" happening all over the archipelago."
10013080-158 = "The most enjoyable part of summer is being ruined by the Kaiser Corporation's greed!"
10013080-162 = "I can't let that happen!"
10013080-163 = "And I'll never forgive Kaiser Corporation for creating this situation in the first place!"
10013080-164 = "So I only have one answer to your stupid proposal!"
10013080-165 = "No! Absolutely NOT! Never ever!"
10013080-167 = "Boss!"
10013080-168 = "Shizuko!"
10013080-170 = "What a truly stupid, idealistic reason to turn down a chance to make money."
10013080-171 = "[s] \"It's not stupid at all. It's Shizuko's reason.\""
10013080-172 = "Schale Sensei..."
10013080-173 = "[s3] \"I haven't done anything, honestly. Everything was Shizuko's decision.\"\n[s4] \"I've just been chaperoning. I trusted and followed Shizuko's decisions.\""
10013080-176 = "Your foolishness knows no bounds! Who cares about some beliefs?"
10013080-177 = "Well, I guess that's that. There's no point in getting mad."
10013080-178 = "If that's your response, the Helmet Gangsters will just have to join the Resort Hunt!"
10013080-179 = "Rabu, call everyone!"
10013080-180 = "Hahaha! I've been waiting for this!"
10013080-195 = "Everyone, assemble!"
10013080-201 = "Wh-Whoa! There are so many of them! Wh-What should we do, my lord?!"
10013080-202 = "Ooh. Is it time to party?"
10013080-203 = "I do love myself a good party. Boss! What's your call?"
10013080-205 = "There's too many! We need to find an escape route!"
10013080-206 = "Ha! You're not going anywhere! Hey, rookie Helmet Gangsters! Block the rear!"
10013080-210 = "[ns] \"No go on the escape route. We're surrounded.\""
10013080-212 = "We've recruited some new Helmet Gangster members with outstanding skills! Now, finish them!"
10013080-214 = "Heh! I told you it would work!"
10013080-216 = "You never said that! You said, \"Well, let's try!\" or something else stupid!"
10013080-218 = "But look! We tried, and it was a success. ☆"
10013080-223 = "The \"disguise as Helmet Gangsters and infiltrate the enemy camp\" strategy, complete."
10013080-224 = "[s] \"...\""
10013080-225 = "H-Huhhh?!"
10013080-226 = "What's wrong, new recruits?! Block their route and finish them!"
10013080-227 = "[s] \"Um... So...\""
10013080-228 = "Wait, Rabu. Could it be...?"
10013080-229 = "Those new, skilled Helmet Gangster recruits you mentioned on the way over..."
10013080-230 = "Hey! What's wrong with you guys?"
10013080-237 = "D-Don't I know you?"
10013080-242 = "...Am I losing it?"
10013080-243 = "Ugh! Forget it! New Helmet Gangster recruits! Get ready for battle!"
10013080-248 = "Heh. Heh."
10013080-249 = "H-Huhhh?! I do know you!"
10013080-250 = "..."
10013080-251 = "...Oh, my."
10013080-252 = "Oh, Sensei. Butterfly—"
10013080-253 = "What is Abydos doing here? Rabu! What happened?!"
10013080-254 = "I-I did think they were a bit strange, but their helmets were so cool and hip!"
10013080-255 = "Even though it was a bit unconventional, Sensei was right to trust them... I guess..."
10013080-256 = "[s] \"I mean, I didn't think this was what they were thinking...\""
10013080-257 = "We came all the way here because of your bogus prize! You were behind all of this! Again!"
10013080-258 = "And again, we've figured you out, Kaiser Director!"
10013080-259 = "Wait, no way. I made sure to only sell the contracts to troublemakers who would cause a commotion."
10013080-261 = "...You won it?! How?!"
10013080-262 = "[s] \"We never did hear where Serika won it from.\""
10013080-263 = "Huh? Oh..."
10013080-264 = "I just won a bingo game hosted by the owner of the Shiba Seki ramen shop..."
10013080-268 = "[ns] \"That makes more sense... I think.\""
10013080-269 = "And it's still thanks to Serika we all got to be here together."
10013080-271 = "Agreed! I'm glad we all met!"
10013080-276 = "[ns] \"Let's start the Hyakkiyako-Abydos joint operation!\""

[translation]
10013080-1 = "第8話;頭盔團！最後的決戰！"
10013080-6 = "就是這裡呢！"
10013080-7 = "終於到了！這就是「失樂園渡假勝地」裡被稱為最大勢力的頭盔團的渡假勝地！"
10013080-8 = "但是，這裡……"
10013080-9 = "和之前看過的渡假勝地，氣氛好像不太一樣呢……"
10013080-13 = "[ns] 「一個人都沒有……？」"
10013080-15 = "啊……"
10013080-16 = "[s] 「怎麼了嗎，知世？」"
10013080-17 = "閃閃發光的瓢蟲先生。"
10013080-18 = "嗯？瓢蟲……？"
10013080-24 = "你說誰是紅和黑完美調和的瓢蟲啊！！！！"
10013080-25 = "[s] 「居然立刻就明白意思了！？太厲害了吧！？」"
10013080-27 = "你就是傳說中的頭盔團幹部？"
10013080-28 = "簡直像是在等我們過來一樣包圍住我們了，也就是說……"
10013080-29 = "這，這是敵人的圈套嗎！？"
10013080-31 = "正是如此！打從一開始這裡就注定是你們的墳場了。#n真沒想到你們居然會自投羅網啊！"
10013080-32 = "[s] 「但是，你們怎麼會知道我們會過來呢？」"
10013080-34 = "對顧客要確實做好售後服務的責任。"
10013080-35 = "這可是我們凱薩公司的公司守則啊。"
10013080-41 = "[ns] 「雖然早就隱約感覺到了……」"
10013080-42 = "好久不見啊，夏萊的老師。"
10013080-43 = "[s1] 「凱薩董事……！」\n[s2] 「你還真享受啊！？」"
10013080-46 = "你，你是……！在章魚銀行裡看過的職員！"
10013080-47 = "又見面了呢！"
10013080-48 = "[s] 「你還是負責人啊！？」"
10013080-49 = "沒錯，告訴他們這個「失樂園渡假勝地」裡有好商品，向他們提出交易的就是我。"
10013080-50 = "之前因為和你跟阿拜多斯的傢伙們扯上關係，導致公司遭受巨大損失之後，#n我就被撤離了董事的職位──"
10013080-51 = "現在我只是「章魚銀行」的職員而已！！"
10013080-52 = "[s] 「原來如此，還發生了這種事啊……不對！」"
10013080-53 = "但是……你們為什麼在這裡？"
10013080-58 = "現在正是該努力經營渡假勝地的時候不是嗎？"
10013080-59 = "還問為什麼……？當然是為了回收你擅自四處散布的契約書啊！"
10013080-60 = "就是說啊！都說要把使用權賣給我們了，竟然還計畫這種簡直是詐欺的事情！"
10013080-61 = "什麼？我只是在你們到銀行來的時候介紹了好的商品給你們而已啊。"
10013080-62 = "當時可既沒強迫也沒逼你們簽約。#n一心想著賺錢而買了那個商品的是你們吧。"
10013080-63 = "那是……！"
10013080-64 = "不過還真困擾呢。竟然隨便到其他的渡假勝地去回收使用權……"
10013080-65 = "這種越權行為可不能當作沒看見。#n所以作為售後服務的一環，我們只好來一趟了。"
10013080-66 = "──和這些保鑣一起。"
10013080-68 = "呿！"
10013080-69 = "……真是強詞奪理呢。明明先欺騙靜子醬他們的就是你……"
10013080-71 = "[ns] 「你打從一開始就盯上百夜堂了，對吧？」"
10013080-72 = "節慶營運管理部可是個好商品啊。#n能夠在百鬼夜行聯合學園舉辦祭典的權利，就這樣放著太可惜了。"
10013080-76 = "所以要靠這件事一口氣讓百夜堂的名譽掃地。"
10013080-82 = "就是為了這個才叫各式各樣的人來這個群島。"
10013080-88 = "接著在百鬼夜行的名聲跌到谷底的時候，趁機收購滿身瘡痍的百夜堂。"
10013080-89 = "──怎麼樣，很完美的計畫吧？"
10013080-91 = "……但是，這個計畫又被你妨礙了呢，夏萊的老師。"
10013080-92 = "[s] 「被我妨礙了？」"
10013080-93 = "這次又用了什麼手段？"
10013080-94 = "成為了百夜堂的支柱嗎？#n還是又說了不能放棄、要戰鬥下去這種天真的話？"
10013080-95 = "那都是沒有意義的。比起那種東西，我提供一個更實際的方案吧。"
10013080-96 = "……什麼意思？"
10013080-97 = "跟我簽下契約吧。由我來投資你們。"
10013080-98 = "投，投資？#n章魚銀行對我們……不，凱薩公司對我們嗎？"
10013080-99 = "沒錯。你們既然能走到這一步，想必也不是泛泛之輩。"
10013080-100 = "在到達這裡之前，你們和各種人都簽下了加盟合約對吧？#n那我們也助你們一臂之力。"
10013080-101 = "當然，由於我們以節慶營運管理部的名義發送合約，或多或少損害了你們的名譽。"
10013080-102 = "但那都是用錢就能解決的問題。"
10013080-103 = "來吧，接受我們的投資吧。"
10013080-104 = "這可是能賺更多錢的機會。這次是基於正式的契約關係──"
10013080-105 = "節慶營運管理部將會在這裡，透過「失樂園渡假勝地」的營運賺取龐大的利益。"
10013080-106 = "……我想只要不是笨到某個程度，應該都不需要考慮吧？"
10013080-111 = "社長……"
10013080-112 = "靜子醬……"
10013080-113 = "…………"
10013080-114 = "確實是個很有吸引力的提案。"
10013080-115 = "靜子閣下……"
10013080-116 = "但是……"
10013080-120 = "我拒絕。"
10013080-121 = "你說什麼……？你是認真的嗎？"
10013080-124 = "仁耶他這麼說過。"
10013080-125 = "如果是被凱薩公司騙了的話，現在就趕快回去。"
10013080-126 = "對方要使用骯髒的手段的話，我們也這麼做就好。#n沒有必要留在這裡。"
10013080-128 = "但我還是選擇留了下來。"
10013080-129 = "當然，也有著想要保護百鬼夜行──維護百夜堂「品牌價值」的理由……"
10013080-130 = "但除此之外……"
10013080-131 = "看不起慶典的傢伙，絕對不能視而不見！#n所以我才會來到這裡！"
10013080-135 = "在說什麼蠢話……"
10013080-136 = "之所以和溫泉開發部簽約，"
10013080-142 = "是因為他們單純只是向著自己想找尋的東西，"
10013080-143 = "在努力而已──"
10013080-149 = "和甲蟲皇后大會的孩子們簽約，也是因為「有趣所以舉辦」……"
10013080-150 = "這種像是慶典餘興的理由。"
10013080-155 = "但是，你和他們不同。就像喵天丸一樣……"
10013080-156 = "這段期間裡，在各個島上進行「渡假勝地狩獵」，讓很多客人都受到了損害……"
10013080-158 = "本該最開心的夏日時光──就因為你們的自私自利而被破壞了！"
10013080-162 = "這種事絕對不可饒恕！"
10013080-163 = "製造出這種狀況的凱薩公司也是同罪。所以──"
10013080-164 = "這就是我的回答！"
10013080-165 = "不用討論！完全拒絕！絕對不要！"
10013080-167 = "社長……！"
10013080-168 = "靜子醬！"
10013080-170 = "……就因為這種無聊的理由要放棄這個機會嗎？#n那是多麼愚蠢的選擇，你真的有理解嗎？"
10013080-171 = "[s] 「才不是愚蠢的選擇，這是靜子的決定。」"
10013080-172 = "你這傢伙……"
10013080-173 = "[s3] 「我從一開始就什麼都沒做，全部都是靜子決定的。」\n[s4] 「我只不過是相信我的學生，跟在他們身旁而已。」"
10013080-176 = "不可能……！這種信念究竟是怎麼回事！"
10013080-177 = "……算了。現在生氣也只會顯得可笑而已。"
10013080-178 = "那麼，我們也只好以頭盔團之名進行「渡假勝地狩獵」了。"
10013080-179 = "良舞，集合所有人！"
10013080-180 = "啊哈哈！就等你這句話呢！"
10013080-195 = "全員集合！"
10013080-201 = "啊哇哇哇哇！好好，好可怕的數量啊！？怎麼辦啊主公！？"
10013080-202 = "大家要一起辦慶典嗎？"
10013080-203 = "這個嘛，說是慶典的話也算是吧……怎麼辦呢？社長。"
10013080-205 = "總，總之先後退再想想怎麼逃跑……！"
10013080-206 = "哈，難道你覺得能逃掉嗎？看看後面吧！"
10013080-210 = "[ns] 「糟糕，被包圍……了？」"
10013080-212 = "這次我可是特別選了很能幹的成員！來吧，讓他們看看你們的實力！"
10013080-214 = "好～作戰成功。"
10013080-216 = "成功了嗎！？話說這樣竟然真的能成功！？"
10013080-218 = "畢竟是這麼厲害的作戰計畫嘛～☆"
10013080-223 = "嗯。「偽裝成頭盔團不被懷疑潛入作戰」大成功。"
10013080-224 = "[s] 「……」"
10013080-225 = "……………………咦？咦咦咦咦咦！？"
10013080-226 = "……喂！你們在幹嘛？#n還不趕快封住他們的退路！"
10013080-227 = "[s] 「呃，那個……」"
10013080-228 = "……等等，良舞。"
10013080-229 = "你之前提到的優秀新人，難道是……"
10013080-230 = "新人怎麼了嗎？"
10013080-237 = "你，你是……！那時候的！"
10013080-242 = "咦？是錯覺嗎？"
10013080-243 = "總，總之！準備戰鬥！"
10013080-248 = "唔嘿～"
10013080-249 = "咦……咦咦咦咦咦咦！？你，你是！！"
10013080-250 = "…………"
10013080-251 = "……哎呀哎呀。"
10013080-252 = "啊，老師。有蝴蝶……"
10013080-253 = "竟，竟然是阿拜多斯……！你們這些傢伙怎麼會在這裡！？#n良舞，這到底怎麼回事！？"
10013080-254 = "等，等一下！我只覺得他們是戴著有點奇怪但很酷又很有個性的頭盔的傢伙而已！！"
10013080-255 = "確實，和老師說的一樣，是很厲害的方法呢……"
10013080-256 = "[s] 「就算是我也想不到會是這樣呢……」"
10013080-257 = "我們也是因為抽中了你們準備的渡假勝地使用權才來的唷！"
10013080-258 = "這次的事件……凱薩董事！全都是你做的好事對吧！"
10013080-259 = "不，不應該會這樣啊……#n我應該只有把使用權給那些會惹事的問題兒童才對……"
10013080-261 = "等等。你剛剛說「抽中了」對吧。那是怎麼回事？"
10013080-262 = "[s] 「這麼說來，我還沒有問過茜香是在哪裡抽中的呢。」"
10013080-263 = "咦？你問在哪……"
10013080-264 = "是在柴關拉麵店的老闆舉辦的抽籤活動……"
10013080-268 = "[ns] 「原來是這樣啊。」"
10013080-269 = "嘛，也是因為這樣大家才能聚在一起嘛。"
10013080-271 = "嗯！真是讓人放心！"
10013080-276 = "[ns] 「那麼，百鬼夜行和阿拜多斯的聯合作戰，開始！」"

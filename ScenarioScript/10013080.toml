[translation]
10013080-1 = "ตอนที่ 8;ศึกตัดสินกับแก๊งหมวกกันน็อก!"
10013080-6 = "ที่นี่ค่ะ!"
10013080-7 = "มาถึงจนได้นะ! ที่นี่คือรีสอร์ตของแก๊งหมวกกันน็อกที่มีอำนาจมหาศาลที่สุดในหมู่เกาะ <ลอสต์ พาราไดซ์ รีสอร์ต>...!"
10013080-8 = "ว่าแต่ ชิซุโกะจัง..."
10013080-9 = "บรรยากาศที่นี่มันแตกต่างจากรีสอร์ตที่เคยเห็นมาเลยค่ะ...!"
10013080-13 = "[ns] \"ทำไมไม่มีคนเลยล่ะ...?\""
10013080-15 = "อ่า..."
10013080-16 = "[s] \"ชิเซะ?\""
10013080-17 = "คุณแมลงเต่าทองวิบวับ..."
10013080-18 = "คะ? ท่านชิเซะ แมลงเต่าทอง..."
10013080-24 = "ใครบอกว่าสีแดงกับสีดำเป็นสีแห่งแมลงเต่าทองห้ะ!!"
10013080-25 = "[s] \"แสดงว่าฟังแล้วเข้าใจเลยแฮะ?! สุดยอดเลย!\""
10013080-27 = "คุณสินะ ผู้บริหารแก๊งหมวกกันน็อก?"
10013080-28 = "พวกคุณมาล้อมพวกเราไว้เหมือนกำลังรอให้เรามาถึงอย่างนั้นแหละ..."
10013080-29 = "ทั้งหมดนี้เป็นกับดักตั้งแต่แรกเหรอคะ?!"
10013080-31 = "ฮึ่ม! ใช่! นี่คือสถานที่ที่จะเป็นหลุมฝังศพของพวกเธอ! เข้ามารนหาที่ตายด้วยตัวเองเลยนะ!"
10013080-32 = "[s] \"ว่าแต่รู้ได้ยังไงว่าเราจะมา...\""
10013080-34 = "การดูแลหลังการขายคือความรับผิดชอบที่ต้องมีต่อลูกค้าไง"
10013080-35 = "นี่แหละคำขวัญของไคเซอร์ คอร์เปอเรชั่น!"
10013080-41 = "[ns] \"ทำไมคุ้นๆ แฮะ... อย่าบอกนะว่าคุณเป็น...\""
10013080-42 = "ไม่ได้เจอกันนานเลยนะ ครูของชาเล่ต์"
10013080-43 = "[s1] \"ผู้อำนวยการของไคเซอร์...!\"\n[s2] \"ดูเหมือนตั้งใจมาพักผ่อนเลยนะ\""
10013080-46 = "อ๊ะ...! คุณคือพนักงานธนาคารทาโกะที่เจอกันวันนั้น!"
10013080-47 = "ได้เจอกันที่นี่ด้วยนะคะ!"
10013080-48 = "[s] \"ตกอับมาเป็นพนักงานเลยเหรอ?!\""
10013080-49 = "ใช่ ฉันคือคนที่เสนอขายสินค้าดีๆ ของ <ลอสต์ พาราไดซ์ รีสอร์ต> ให้กับเด็กๆ ของคุณยังไงล่ะ"
10013080-50 = "ครูชาเล่ต์ คราวก่อนที่ฉันไปเกี่ยวพันกับครูและนักเรียนอะบิดอส ทำให้ฉันต้องลาออกจากตำแหน่ง#nผู้อำนวยการ"
10013080-51 = "และต้องมาเป็นพนักงานขายของ <ธนาคารทาโกะ> อยู่ในตอนนี้ไง!"
10013080-52 = "[s] \"เป็นอย่างนี้เองเหรอ...\""
10013080-53 = "ว่าแต่... พวกเธอมาทำอะไรที่นี่กันล่ะ?"
10013080-58 = "ตอนนี้พวกเธอควรจะไปบริหารรีสอร์ตอยู่ไม่ใช่รึไง?"
10013080-59 = "ถามมาได้ว่าพวกฉันมาทำอะไร ก็มาเรียกคืนสัญญาผิดกฎหมายที่คุณเที่ยวเอาไปขายตามใจน่ะสิ!"
10013080-60 = "ใช่ค่ะ! มาขายตั๋วใช้งานให้พวกฉัน แล้วใช้ช่องโหว่ของสัญญาก่อเรื่องแบบนี้ได้ยังไงกัน!"
10013080-61 = "พะ... พูดอะไรของเธอ? ตอนที่พวกเธอมาธนาคาร ฉันก็แค่แนะนำสินค้าดีๆ ให้เท่านั้นเอง"
10013080-62 = "ฉันไม่ได้บังคับหรือกดดันอะไรเลยด้วย คนที่ซื้อสินค้านั้นไปเพราะอยากหาเงินคือพวกเธอเองนี่?"
10013080-63 = "เรื่องนั้น...!"
10013080-64 = "แต่ถ้าจะมาเอาสัญญาคืนคงยาก ได้ข่าวว่าพวกเธอไปที่รีสอร์ตอื่นเพื่อเรียกคืนสิทธิ์กันด้วยไม่ใช่รึ"
10013080-65 = "ฉันยอมให้พวกเธอใช้อำนาจโดยมิชอบไม่ได้หรอกนะ ก็เลยออกหน้ามาเพื่อบริการหลังการขายไง"
10013080-66 = "มาพร้อมบอดี้การ์ดแบบนี้"
10013080-68 = "เหอะ!"
10013080-69 = "ล้อกันเล่นใช่มั้ยคะ คนที่หลอกพวกชิซุโกะจังคือพวกคุณแท้ๆ..."
10013080-71 = "[ns] \"ทำแบบนี้เพราะตั้งใจจะเล่นงานร้านเฮียกคิยาโคตั้งแต่แรกใช่มั้ย?\""
10013080-72 = "ก็ชมรมจัดงานเทศกาลเป็นตัวเลือกที่ดีนี่ เป็นผู้ถือสิทธิ์ในการจัดงานเทศกาลในสหพันธ์เฮียกคิยาโค"
10013080-76 = "ฉันตั้งใจทำให้ร้านเฮียกคิยาโคต้องเสียชื่อเสียงด้วยเรื่องนี้"
10013080-82 = "และเพื่อจะทำอย่างนั้นให้ได้ ฉันเลยต้องดึงดูดผู้คนจำนวนมากมาที่หมู่เกาะแห่งนี้"
10013080-88 = "หากเฮียกคิยาโคเสื่อมเสียชื่อเสียงจากเหตุการณ์ที่เกิดนี้จนได้แผลยับเยิน ฉันก็จะเข้าซื้อร้านเฮียกคิยาโคซะ"
10013080-89 = "เป็นแผนที่สมบูรณ์แบบใช่มั้ยล่ะ?"
10013080-91 = "แต่ครั้งนี้ก็มีคนมาขวางอีกแล้วนะ ครูของชาเล่ต์"
10013080-92 = "[s] \"ฉันน่ะเหรอมาขวางไว้?\""
10013080-93 = "ครั้งนี้จะมาไม้ไหนอีกล่ะ?"
10013080-94 = "มาเป็นไม้ค้ำจุนให้ร้านเฮียกคิยาโค? มาบอกให้เด็กพวกนั้นไม่ยอมแพ้และสู้ต่อไปหรือเปล่า? หรือว่ามาพูดกระซิบหวานๆ ใส่หู?"
10013080-95 = "ไร้ความหมายสิ้นดี ฉันจะให้ข้อเสนอที่เป็นจริงมากกว่าการช่วยเหลือของครูนั่น"
10013080-96 = "หมายความว่ายังไงน่ะ...?"
10013080-97 = "มาทำสัญญากันสิ ฉันจะลงทุนกับพวกเธอ"
10013080-98 = "ละ... ลงทุน? กับพวกฉันเหรอ? ในนามของธนาคารทาโกะ ไม่สิ ไคเซอร์ คอร์เปอเรชั่นน่ะเหรอคะ?"
10013080-99 = "ใช่ ดูจากการที่มาถึงตรงนี้ได้ ฉันว่าพวกเธอเป็นเด็กที่ไม่ธรรมดาเลย "
10013080-100 = "ได้ยินว่าระหว่างมาที่นี่ พวกเธอก็ได้ทำสัญญาแฟรนไชส์กับหลายกลุ่มเลยเหรอ? ให้พวกฉันได้เข้าไปช่วยเหลือด้วยสิ"
10013080-101 = "แน่นอนว่าการโปรยขายสัญญาภายใต้ชื่อชมรมจัดงานเทศกาลทำให้ชื่อของพวกเธอเกิดความเสียหาย#nจนถึงตอนนี้อยู่ไม่น้อย"
10013080-102 = "แต่มันก็เป็นปัญหาที่แก้ไขได้ด้วยเงินนะ"
10013080-103 = "เอาละ พวกฉันจะลงทุนให้เอง นี่เป็นโอกาสที่พวกเธอจะได้เงินมากขึ้นเลยนะ"
10013080-104 = "ครั้งนี้ทั้งสองฝ่ายจะคงความสัมพันธ์กันด้วยสัญญาที่ถูกต้อง"
10013080-105 = "ชมรมจัดงานเทศกาลก็บริหาร <ลอสต์ พาราไดซ์ รีสอร์ต> แห่งนี้เพื่อหาผลกำไรมหาศาล"
10013080-106 = "คนฉลาดอย่างพวกเธอคงไม่ทิ้งโอกาสดีๆ แบบนี้หรอก ใช่มั้ย?"
10013080-111 = "ท่านประธาน..."
10013080-112 = "ชิซุโกะจัง"
10013080-113 = "...."
10013080-114 = "มันช่างเป็น... ข้อเสนอที่น่าสนใจจริงๆ"
10013080-115 = "ท่านชิซุโกะ..."
10013080-116 = "แต่ถึงอย่างนั้น..."
10013080-120 = "ฉันก็จะขอปฏิเสธอยู่ดี"
10013080-121 = "ว่าไงนะ? พูดจริงเหรอ?"
10013080-124 = "ครั้งหนึ่งนิยะเคยพูดไว้"
10013080-125 = "ว่าหากถูกไคเซอร์ คอร์เปอเรชั่นหลอก ก็ให้กลับไปได้เลย"
10013080-126 = "และถ้าฝั่งนั้นใช้เล่ห์เหลี่ยมสกปรก ทางเราก็ต้องชดเชยด้วยสิ่งเดียวกัน เราเลยไม่จำเป็นต้องอยู่ที่นี่ต่อ"
10013080-128 = "แต่ฉันก็ตัดสินใจว่าจะอยู่ต่อ"
10013080-129 = "แน่นอนว่าเหตุผลเป็นเพราะ <มูลค่าของแบรนด์> เฮียกคิยาโคที่ฉันบอกไปก่อนหน้านี้... แต่ยังมีอีกเหตุผลหนึ่ง"
10013080-130 = "ฉันยังอยู่ที่นี่ก็เพราะว่า..."
10013080-131 = "ฉันยกโทษให้คนที่ดูถูกงานเทศกาลไม่ได้ยังไงล่ะ!"
10013080-135 = "พูดอะไรไร้สาระ..."
10013080-136 = "พวกชมรมพัฒนาออนเซ็นน่ะ"
10013080-142 = "ก็แค่นักเรียนที่พยายามค้นหาสิ่งที่พวกเธอต้องการก็เท่านั้น"
10013080-143 = "ฉันก็เลยชวนทำสัญญาด้วย"
10013080-149 = "ส่วนการแข่งขันมูชิควีน การแข่งขันนั้นเป็นเหมือนกับเทศกาล ทุกคนที่นั่นก็สนุกกันมาก"
10013080-150 = "ฉันก็เลยชวนทำสัญญาเพราะอยากให้คนที่มาได้สนุกสนานกัน"
10013080-155 = "แต่กับพวกคุณ มันไม่ใช่อย่างนั้น มันเหมือนกับเนียนเต็นมารุ"
10013080-156 = "ในขณะที่เราเถียงกันนี้ <การล่ารีสอร์ต> ก็ยังคงเกิดขึ้นอยู่บนหมู่เกาะ และแขกที่มาพักผ่อนก็ยังคง#nได้รับความเสียหายกันอยู่"
10013080-158 = "ฤดูร้อนที่น่ารื่นรมย์ที่สุดต้องมาพังด้วยความโลภจากไคเซอร์ คอร์เปอเรชั่นแบบนี้!"
10013080-162 = "ฉันยอมไม่ได้เด็ดขาด!"
10013080-163 = "และฉันก็ให้อภัยไคเซอร์ คอร์เปอเรชั่นที่ทำให้เกิดสถานการณ์แบบนี้ที่นี่ไม่ได้!"
10013080-164 = "ดังนั้นคำตอบสำหรับข้อเสนอที่ไม่ตลกเลยก็คือ!"
10013080-165 = "ขอปฏิเสธ! อื้ม! ปฏิเสธอย่างสิ้นเชิง! NO ล้วนๆ ไม่มีอย่างอื่นผสม!"
10013080-167 = "ท่านประธาน!"
10013080-168 = "ชิซุโกะจัง!"
10013080-170 = "นี่เธอ... ทิ้งโอกาสทำเงินด้วยเหตุผลเพียงแค่นั้นน่ะเหรอ? จะเลือกอะไรโง่ๆ ใช่มั้ย?"
10013080-171 = "[s] \"นี่ไม่ใช่การเลือกโง่ๆ นะ เป็นการตัดสินใจของชิซุโกะต่างหาก\""
10013080-172 = "ครูของชาเล่ต์..."
10013080-173 = "[s3] \"ฉันไม่ได้ช่วยอะไรเลยตั้งแต่แรก ทุกอย่างเป็นการตัดสินใจของชิซุโกะ\"\n[s4] \"คนเป็นครูอย่างฉันแค่เชื่อใจนักเรียนเท่านั้น\""
10013080-176 = "โง่เง่าสิ้นดี... ไปเอาความเชื่อมั่นแบบนี้มาจากไหน!"
10013080-177 = "แต่ก็ไม่เป็นไรหรอก เพราะถึงจะทุ่มเทแค่ไหน ก็คงมีแต่เรื่องให้น่าหัวเราะเปล่าๆ"
10013080-178 = "ถ้าตัดสินใจอย่างนั้น ฉันก็แค่ต้อง <ล่ารีสอร์ต> ในฐานะแก๊งหมวกกันน็อกเพื่อแย่งทุกอย่างมา!"
10013080-179 = "ราบุ เรียกระดมพล!"
10013080-180 = "ฮ่าฮ่าฮ่า! นี่แหละที่อยากได้ยิน!"
10013080-195 = "ระดมพล!"
10013080-201 = "หะ... โห! ทะ... ทำไมมีเยอะแบบนี้คะ! ระ... เราจะทำยังไงดีคะนายท่าน?!"
10013080-202 = "อืม~ มาจัดงานเทศกาลด้วยกันเหรอ~?"
10013080-203 = "อื้ม! ดูจากจำนวนคนแล้ว มันก็พอจะเป็นงานเทศกาลแบบที่คุณชิเซะว่าได้อยู่ค่ะ ท่านประธาน!! เอายังไงดีคะ?!"
10013080-205 = "ถ้าเราถอยออกมาก่อน! แล้วถ้าหาทางหนีได้...!"
10013080-206 = "เหอะ! คิดว่าจะหนีไปได้งั้นเรอะ! นี่ พวกเด็กใหม่แก๊งหมวกกันน็อก! ไปขวางข้างหลังไว้!"
10013080-210 = "[ns] \"ไม่นะ! มีแก๊งหมวกกันน็อกจากทางข้างหลังด้วย...?\""
10013080-212 = "ก็พวกฉันเปิดรับสมัครสมาชิกแก๊งหมวกกันน็อกหน้าใหม่ที่มีฝีมือไว้ไงล่ะ! เอ้า! แสดงฝีมือออกมาเลย!"
10013080-214 = "แหะๆ~ แบบนี้ก็ถือว่าปฏิบัติการสำเร็จ~"
10013080-216 = "เดี๋ยวก่อน นี่มันสำเร็จจริงๆ เหรอ?!  แบบนี้ก็ได้ด้วยเหรอ?!"
10013080-218 = "ก็มันเป็นแผนการที่สุดยอดไปเลยยังไงล่ะคะ~☆"
10013080-223 = "อื้ม <ปฏิบัติการแฝงตัวเป็นแก๊งหมวกกันน็อกแล้วเข้าไปในค่ายศัตรูโดยไม่ถูกสงสัย> ประสบความสำเร็จอย่างงดงาม"
10013080-224 = "[s] \"......\""
10013080-225 = "เอะ... เอะ... เอ๋?!"
10013080-226 = "หืม? เป็นอะไร? พวกเด็กใหม่! ไปปิดทางหนีไว้สิ! จัดการพวกนั้นเลย!"
10013080-227 = "[s] \"ไม่นะ... นั่นมัน...\""
10013080-228 = "เดี๋ยวก่อน ราบุ... อย่าบอกนะว่าพวกนั้น"
10013080-229 = "เด็กใหม่แก๊งหมวกกันน็อกที่เธอบอกว่าเป็นพวกมีฝีมือ..."
10013080-230 = "หืม? ทำไมทุกคนเป็นแบบนี้ล่ะ?"
10013080-237 = "อ๊ะ?! นี่เธอ! พวกเด็กเมื่อตอนนั้นนี่!!"
10013080-242 = "หืม?! หรือว่าจะมองผิดคน?!"
10013080-243 = "ฮึ่ย! อย่าไปคิดให้ปวดหัวเลย! เด็กใหม่แก๊งหมวกกันน็อก! ทุกคนเตรียมต่อสู้...!"
10013080-248 = "แหะๆ~"
10013080-249 = "ดะ... เดี๋ยวนะ?! เธอคือ...?!"
10013080-250 = ".........."
10013080-251 = "ตายจริง..."
10013080-252 = "อ๊ะ คุณครู นั่นผีเสื้อ..."
10013080-253 = "อะ... อะบิดอส...! ทำไมพวกเธอถึงมาอยู่ที่นี่ได้?! ราบุ นี่มันเรื่องอะไรกัน!?!"
10013080-254 = "ดะ... เดี๋ยวก่อน! ฉันก็แค่! ถึงจะดูแปลกไปสักหน่อย ก็แค่คิดว่าเด็กพวกนี้เป็นพวกใส่หมวกกันน็อกฮิปๆ คูลๆ!!"
10013080-255 = "และนี่คือการแก้ปัญหาด้วยวิธีที่ไม่ธรรมดา... อย่างที่คุณครูเคยพูด"
10013080-256 = "[s] \"ไม่สิ... ครูก็ไม่ได้คิดว่าจะมาไม้นี้...\""
10013080-257 = "พวกเรามาที่นี่เพราะถูกรางวัลตั๋วใช้งานรีสอร์ตจากแผนการชั่วร้ายที่พวกคุณทำไงล่ะ!"
10013080-258 = "เป็นฝีมือของคุณอีกแล้วเหรอคะ! ผู้อำนวยการของไคเซอร์!"
10013080-259 = "เดี๋ยวก่อน มันจะเป็นไปได้ยังไง ฉันแค่ขายตั๋วให้พวกเด็กเจ้าปัญหาที่ชอบก่อเรื่องเท่านั้น..."
10013080-261 = "เดี๋ยวนะ... เมื่อกี๊บอกว่าถูกรางวัลมาเหรอ? ถูกได้ยังไง?"
10013080-262 = "[s] \"จะว่าไป เรายังไม่รู้เลยนี่นาว่าเซริกะถูกรางวัลมาได้ยังไงตั้งแต่แรก\""
10013080-263 = "หืม? ฉะ... ฉันน่ะเหรอ?"
10013080-264 = "ก็คือ... คือว่า... ฉัน... ชนะการแข่งขันบิงโกสเปเชียลที่หัวหน้าร้านชิบะเซกิจัดขึ้นมา..."
10013080-268 = "[ns] \"เป็นอย่างนี้เองสินะ\""
10013080-269 = "แต่ก็ทำให้เราได้พักจากงานและมารวมตัวกันที่นี่นะ ใช่มั้ยล่ะ?"
10013080-271 = "อื้ม! ทำให้ฉันแข็งแกร่งขึ้นมากด้วย!"
10013080-276 = "[ns] \"ถ้างั้นก็เริ่มปฏิบัติการร่วมระหว่างเฮียกคิยาโคกับอะบิดอสได้!\""

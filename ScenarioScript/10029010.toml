[translation]
10029010-1 = "ตอนที่ 1;นักสร้างปัญหา(?)"
10029010-2 = "(คุณครูได้รับโทรศัพท์จากเอมิจึงมุ่งหน้าไปที่มิลเลเนียม)"
10029010-3 = "...อ่า คุณครู ทางนี้"
10029010-4 = "มาตรงเวลาพอดีเลยนะ ดีจังที่ฉันไม่ต้องเสียเวลารอ"
10029010-5 = "ข้างในนี้คือห้องผู้ป่วยที่หัวหน้าจัดหาไว้ให้น่ะ แล้วก็เป็นที่ที่ฉันพาพวกผู้ประสบภัยที่เจอมาด้วย"
10029010-6 = "...ตอนนี้เหมือนจะมีปัญหานิดหน่อยด้วยแหละ"
10029010-7 = "[s1] \"...มีปัญหานิดหน่อยเหรอ?\"\n[s2] \"มีเรื่องอะไรหรือเปล่า?\""
10029010-10 = "อื้ม หลังจากวางสายจากคุณครู ฉันก็มาตรวจสอบอีกครั้งน่ะ"
10029010-11 = "แต่เรื่องแบบนี้น่ะ ให้คุณครูได้เห็นกับตาน่าจะชัดเจนกว่าเนอะ"
10029010-18 = "[ns3] \"หืม? ที่นี่...?\"\n[ns4] \"ไม่เห็นมีใครเลยนี่...?\""
10029010-21 = "...นี่แหละคือปัญหา"
10029010-22 = "พอฉันคุยกับคุณครูเสร็จแล้วกลับมาดู ก็ไม่มีใครอยู่อย่างที่เห็นเลย"
10029010-23 = "หืม? มีเรื่องอะไรน่ะเหรอ?"
10029010-24 = "ก็ตามที่บอกเลย เมื่อกี้สามคนนั้นยังนอนหลับกันอยู่ แต่พอมาดูอีกทีก็ไม่รู้ว่าหายไปอยู่ที่ไหนกันแล้ว"
10029010-25 = "อาจจะตื่นแล้วออกไปข้างนอกก็ได้..."
10029010-26 = "ฉันบอกหัวหน้าแล้วหรือยังน่ะเหรอ? ก็ต้องบอกแล้วสิ หัวหน้าบอกว่าจะพยายามไม่ให้จิตใจกระสับ#nกระส่ายด้วย"
10029010-27 = "...\"นี่อาจจะไม่เป็นเรื่องอะไรก็ได้ แต่ก็อาจจะเป็นเรื่องใหญ่ได้เหมือนกัน\""
10029010-28 = "หัวหน้าบอกไว้ว่าอย่างนั้นน่ะ ยังไงพวกเขาก็มีตัวตนไม่ชัดเจนอยู่แล้ว"
10029010-29 = "แล้วหัวหน้าก็บอกด้วยว่าในเมื่อคุณครูจะมาที่นี่แล้ว ถ้าได้เจอกันก็ให้ออกไปตามหาทั้งสามคนนั้น#nกลับมาทันที"
10029010-30 = "เพราะงั้นถ้าคุณครูไม่ว่าอะไร ฉันก็อยากขอความช่วยเหลือหน่อย พอจะช่วยได้ไหมล่ะ?"
10029010-31 = "[s5] \"ได้แน่นอน รีบไปกันเถอะ\"\n[s6] \"คนพวกนั้นมีลักษณะพิเศษอะไรบ้างไหม?\""
10029010-34 = "ฉันละชอบจริงๆ ที่คุยกับคุณครูง่ายแบบนี้ "
10029010-35 = "อย่างที่ฉันบอกไปว่ามีสามคน และพวกเขาก็ไม่ได้ใส่ชุดนักเรียนของโรงเรียนในคิโวทอสด้วย และสามคนนั้นก็ไม่มีใครพกปืนติดตัวเลย"
10029010-36 = "และจากที่ฉันตรวจสอบมา ระหว่างที่ส่งตัวพวกเขามา หนึ่งในสามคนนั้น ถึงจะ..."
10029010-37 = "หมดสติ แต่ก็..."
10029010-42 = "...ปล่อยไฟฟ้าออกมาได้"
10029010-46 = "อืม เสียงเหมือนที่เราได้ยินเมื่อกี้เลย"
10029010-47 = "[s7] \"งะ... งั้นก็ไปตามเสียงนั้นก่อน! เร็วเข้า!!\"\n[s8] \"ทำไมเอาสิ่งที่สำคัญที่สุดมาพูดตอนท้ายล่ะ!!\""
10029010-53 = "(คุณครูกับเอมิรีบวิ่งไปยังจุดที่เกิดเสียงระเบิด)"
10029010-54 = "เสียงน่าจะมาจากรอบๆ นี้นี่นา..."
10029010-58 = "...อยู่ตรงนั้นไง คุณครู"
10029010-62 = "...เฮ้อ"
10029010-63 = "นี่มันที่แบบไหนกัน ทำไมไม่ว่าจะไปไหนก็เกิดเรื่องอยู่เรื่อยเลยนะ แล้วทำไมทุกคนถึงถือปืนกัน#nเหมือนเป็นเรื่องปกติเลยล่ะ..."
10029010-64 = "...หืม?"
10029010-65 = "อะไรกัน ทำไมบรรยากาศเหมือนกับว่าคุณมีธุระอะไรจะคุยกับฉันเลย"
10029010-66 = "แล้วก็... อีกคนหนึ่งก็คลับคล้ายคลับคลาว่าเคยเจอมาก่อน"
10029010-67 = "ถูกต้องทั้งสองอย่างเลย ฉันมีธุระจะคุยด้วยก็เลยมาหาน่ะ แล้วเราก็เคยเจอกันมาก่อนแล้ว แต่ก็ไม่รู้#nหรอกนะว่าจะจำได้หรือเปล่า"
10029010-68 = "ฉันคือคนที่ไปเจอพวกเธอในพื้นที่รกร้างแล้วพาออกมา แต่ว่าตอนนั้นสลบกันอยู่..."
10029010-69 = "ไม่คิดเลยนะว่าพอฟื้นกันแล้วก็จะออกมาก่อเรื่องกันแบบนี้เลย"
10029010-70 = "...?!"
10029010-71 = "พูดอะไรแบบนั้น? ก่อเรื่องงั้นเหรอ ใครมาเห็นเข้าคงคิดว่าฉันไปสร้างปัญหาอะไรไว้มั้ง!"
10029010-72 = "ฉันก็แค่ป้องกันตัวเองนะ!? พวกเธอนี่ จู่ๆ ก็มากล่าวหาอะไรกันก็ไม่รู้..."
10029010-73 = "อึก... อึกกก... มะ... เมื่อกี้มันอะไรกัน..."
10029010-74 = "เหมือนมีเสียง เปรี๊ยะๆ... แล้วก็เกิดแรงอัดจนตัวลอย..."
10029010-75 = "[s9] \"...พอจะเดาอะไรได้แล้ว\"\n[s10] \"ดีแล้วละที่ไม่เกิดเรื่องอะไร\""
10029010-79 = "... งั้นเหรอ พอเป็นนักเรียนที่เดินเตร็ดเตร่ตามถนนโดยไม่มีปืน เลยอาจดูแปลกๆ ตาได้สินะ"
10029010-80 = "พูดอะไรอยู่คนเดียวตั้งแต่เมื่อกี้แล้ว... ใครจะไปฟังรู้เรื่องกันล่ะ"
10029010-81 = "เอาเถอะ ดูจากที่เธอก็ถืออาวุธอะไรคล้ายๆ กันแล้ว แบบนี้ไม่น่าจะเข้ามาแค่เจรจาสินะ..."
10029010-82 = "ถ้าเข้ามาทำอะไรละก็ ได้เจอดีแบบพวกนั้น..."
10029010-87 = "...หืม?"
10029010-88 = "อะไรกัน ทำไมไฟฟ้าถึง..."
10029010-89 = "น่าจะเป็นเธอมากกว่านะที่เอาแต่คิดว่าจะต้องต่อสู้กันน่ะ"
10029010-90 = "[s11] \"พวกเราไม่ได้จะมาต่อสู้หรอกนะ\"\n[s12] \"ครูว่าเราต้องคุยกันหลายๆ เรื่องเลยละ\""
10029010-93 = "หะ... หืม......?"
10029010-94 = "อืม... งะ... งั้นเหรอ...? ถ้างั้นพวกคุณคือ...?"
10029010-95 = "ไม่สิ แล้วที่นี่มันที่ไหน? ฉันไม่เคยเห็นสถานที่แบบนี้ในเมืองแห่งการศึกษามาก่อนเลย"
10029010-96 = "ทำไมทุกคน... ถึงพกอาวุธที่คล้ายปืนติดตัว แล้วก็ยังมีอะไรแปลกๆ ลอยอยู่บนหัวอีก..."
10029010-97 = "นี่เป็นอะไรของอินเดียนโปกเกอร์..."
10029010-98 = "ไม่สิ ไม่เหมือนกัน ถ้าเป็นอินเดียนโปกเกอร์ ตอนนี้ฉันคงไม่เป็นฉันแบบนี้ อะไรหลายๆ อย่างมันดูไม่#nเข้ากันเลย"
10029010-99 = "นี่มันอะไรกัน...? มันไม่ใช่ความฝันจริงๆ เหรอเนี่ย? ถ้าไม่ใช่ความฝัน แล้วงั้น..."
10029010-100 = "[s13] \"อินเดียนโปกเกอร์...?\"\n[s14] \"พูดอะไรอยู่คนเดียวน่ะ...\""
10029010-103 = "การพูดวกไปวนมาคนเดียวเป็นลักษณะพิเศษของคนที่มีความผิดปกติทางใจอยู่แล้ว"
10029010-104 = "ถ้าไม่ใช่อย่างนั้นละก็... คุณครู เหมือนว่าที่หัวหน้าพูดจะถูกจริงๆ นะ"
10029010-105 = "[s15] \"รู้สึกเหมือนกับหลงทางมาเลย\"\n[s16] \"...ไม่ใช่ชาวคิโวทอสสินะ\""
10029010-108 = "...หืม?"
10029010-109 = "... คุณครู... งั้นเหรอ?"
10029010-110 = "ผู้ใหญ่คนนั้น..."
10029010-111 = "เป็นคุณครูงั้นเหรอ?"
10029010-112 = "คุณ... เป็นครูหรอกเหรอ?"
10029010-113 = "แล้วคนข้างๆ คนนั้นล่ะ...?"
10029010-114 = "อิซุมิโมโตะ เอมิ ชั้นปีที่ 1 จากชมรมปรากฏการณ์ลี้ลับแห่งโรงเรียนวิทย์มิลเลเนียม"
10029010-115 = "... เป็น... นักเรียน??"
10029010-119 = "ใส่ชุดนี้เนี้ยนะ... เป็นนักเรียน... งั้นเหรอ?"
10029010-120 = "...?"
10029010-121 = "[s17] \"...เฮือก\"\n[s18] \"อย่าบอกนะว่าที่ 'ถาม' อยู่...\""
10029010-127 = "...คนเป็นครูไปไหนมาไหนกับนักเรียนที่ใส่ 'ชุดแบบนี้' งั้นเหรอ!?"
10029010-129 = "(...คุณครูเจอคำถามที่ลำบากใจจะตอบ แต่ก็ได้เจอกับหนึ่งในสามคนที่หายไปแล้ว)"
10029010-131 = "... งั้นเหรอ"
10029010-132 = "พอจะเข้าใจสถานการณ์คร่าวๆ แล้วละค่ะ มันยากที่จะอธิบายเรื่องหลักการ แต่ก็คงหลีกเลี่ยงไม่ได้ค่ะ"
10029010-133 = "สถานที่ที่เรียกว่าพื้นที่รกร้างของมิลเลเนียม เป็นที่ที่ทำให้เกิดเรื่องราวต่างๆ ที่ซับซ้อนและไม่ธรรมดา"
10029010-134 = "มัน 'ย้าย' ผู้คนจากโลกอื่นมายังโลกนี้..."
10029010-135 = "บางทีเครื่องมือหรืออุปกรณ์บางอย่างที่อยู่ที่นั่นที่พวกฉันยังหาไม่เจอ มันน่าจะมีปฏิกิริยาทางพลังงาน#nน่ะค่ะ"
10029010-136 = "ถึงจะพูดด้วยสีหน้านิ่งๆ ก็เถอะ แต่นี่มันเรื่องใหญ่มากเลยไม่ใช่เหรอ?"
10029010-137 = "ย้ายมายังโลกนี้? จากโลกอื่นเนี่ยนะ...? จะให้ฉันเชื่อเรื่องแบบนั้นได้ยังไง?"
10029010-138 = "พูดตามตรงนะ ฉันว่ามันค่อนข้างไร้สาระ น่าจะเป็นเรื่องที่แต่งมาเองมากกว่า"
10029010-139 = "ต่อให้ฉันจะยังไม่ค่อยเข้าใจสถานการณ์ตอนนี้ก็เถอะ แต่ก็..."
10029010-140 = "ตายจริง นี่คุณสงสัยในตัวฉันเหรอคะ? ฉันคือแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสเลยนะ..."
10029010-141 = "มันก็เข้าใจได้อยู่หรอกที่คำพูดหรือพฤติกรรมของหัวหน้าจะทำให้ฝ่ายตรงข้ามคิดแบบนั้น แต่น่าเสียดายที่ตอนนี้ไม่ใช่ เพราะฉันก็เห็นด้วยเหมือนกัน"
10029010-142 = "เอมิ...!?"
10029010-143 = "นอกจากเรื่องในครั้งนี้แล้ว ที่ผ่านมาชมรมปรากฏการณ์ลี้ลับของเราได้เจอกับ 'ปรากฏการณ์แปลกๆ' มาแล้วหลายรูปแบบ"
10029010-144 = "ต่อให้มีมาเพิ่มอีกเรื่องหนึ่งตอนนี้ พวกเราก็ไม่ได้มองว่ามันเป็นสถานการณ์ที่น่าเหลือเชื่อหรอก"
10029010-145 = "ในทางกลับกัน สิ่งที่พิเศษไปกว่านั้น น่าจะเป็นคุณ..."
10029010-147 = "...มิซากะ มิโคโตะ"
10029010-148 = "...การที่มิโคโตะเป็น 'ผู้ใช้พลังจิต' ที่ใช้ไฟฟ้าได้เป็นเรื่องที่น่าตกใจกว่าเสียอีก"
10029010-149 = "ฉันบอกชื่อนามสกุลเต็มไปเลยนะ แต่เรียกฉันง่ายๆ ด้วยชื่อ ไม่ใช่นามสกุลงั้นเหรอ..."
10029010-150 = "แต่ก็นะ คงไม่เป็นอะไรหรอก"
10029010-151 = "เอาเถอะ สรุปว่ามีสถานที่สองแห่งที่คล้ายกัน แต่เป็นคนละเมืองแห่งการศึกษางั้นเหรอ"
10029010-152 = "ถ้าอย่างนั้นที่นี่ก็ไม่มีผู้ใช้พลังจิต? แล้วก็ไม่มีศูนย์วิจัยหรือสถาบันที่พัฒนาอะไรแบบนั้นด้วย?"
10029010-153 = "อย่างน้อยก็ไม่มีอะไรที่คล้ายกับที่พูดนะคะ การวิจัยสร้างผู้ใช้พลังจิตงั้นเหรอคะ พูดตามตรงเรื่องนี้#nมันน่าจะเกิดขึ้นได้ในจินตนาการมากกว่า"
10029010-154 = "ฉันไม่ได้คิดจะไม่ยอมรับหรอกนะ แต่การที่นักเรียนทุกคนมีอะไรแปลกๆ ลอยอยู่บนหัว และพกปืนกันทั่วก็ไม่ใช่เรื่องปกติหรือเปล่า"
10029010-155 = "ตายจริง คิดแบบนั้นได้ยังไงกัน? การที่นักเรียนมีปืนมันเป็นเรื่องพื้นฐานอยู่แล้วไม่ใช่เหรอคะ? ว่าไหมคะ เอมิ?"
10029010-157 = "อืม ใช่สิ ไปถามคนอื่นก็ต้องพูดแบบนี้กันหมด"
10029010-158 = "......????????????"
10029010-159 = "อะไรเนี่ย...? สรุปแล้วคนที่แปลกก็คือฉันงั้นเหรอ...???"
10029010-160 = "และเรื่องที่พวกเรามีฮาโลลอยอยู่บนหัวน่ะ... ตอนนี้คุณมิโคโตะก็มีเหมือนกันนะคะ"
10029010-161 = "...หืม?"
10029010-162 = "หะ... หา!?  อะไรกัน มีจริงๆ ด้วย...!?  ฉันมีอะไรแบบนี้ตั้งแต่ตอนไหนเนี่ย!?"
10029010-163 = "[s19] \"จะว่าไป! เห็นว่ายังมีอีกสองคนใช่ไหม?\"\n[s20] \"พอรู้ไหมว่าเพื่อนที่เหลือไปอยู่ไหน?\""
10029010-166 = "......?? เพื่อนที่เหลือ...? ไปอยู่ไหน?"
10029010-167 = "...อืม ไม่รู้สิ... ฉันพอจะจำได้รางๆ น่ะ"
10029010-168 = "ก่อนอื่นเลย สิ่งสุดท้ายที่ฉันจำได้ก่อนจะมาที่นี่ก็คือ ฉันใช้ 'อินเดียนโปกเกอร์' และตอนที่ใช้ ฉันก็อยู่คนเดียว"
10029010-169 = "อินเดียนโปกเกอร์...?"
10029010-170 = "อ่า อืม นั่นน่ะสินะ คนทางนี้คงไม่เคยได้ยินอะไรแบบนั้น"
10029010-171 = "ถ้าสิ่งที่เรียกว่าอินเดียนโปกเกอร์น่ะ ฉันรู้อยู่ แต่ว่าสำหรับที่นี่แล้ว มันเป็นแค่ประเภทเกมธรรมดาๆ เท่านั้น"
10029010-172 = "สำหรับพวกฉัน โดยพื้นฐานแล้วมันก็คล้ายๆ กันอยู่..."
10029010-173 = "แต่แก่นสำคัญก็คือ พวกฉันมีเทคโนโลยีเฉพาะที่ทำขึ้นตามสิ่งนั้น และถ้าใช้เทคโนโลยีนั้น ก็จะสามารถเห็นความฝันที่คนอื่นเก็บเอาไว้ได้"
10029010-174 = "เพราะแบบนี้ ตอนแรกฉันเลยคิดว่าที่นี่คือความฝันของใครสักคนน่ะ"
10029010-175 = "ส่วนอีกสองคน... ฉันไม่รู้หรอกนะว่าเป็นใคร ต่างคนก็คงต่างไปร่ายอินเดียนโปกเกอร์จากคนละที่กัน#nจนเจอเรื่องคล้ายๆ แบบฉันน่ะ"
10029010-176 = "และผลที่เกิดจากสิ่งที่เรียกว่าอินเดียนโปกเกอร์ ก็เชื่อมต่อกับเครื่องมือเฉพาะบางอย่างในพื้นที่รกร้าง#nของมิลเลเนียม..."
10029010-177 = "อย่างนี้เองสินะ นี่เป็นเรื่องที่น่าสนุกไม่เบาเลยนะคะ? ฉันต้องศึกษาหาคำตอบอย่างจริงจังแล้วละค่ะ"
10029010-178 = "น่าสนุกงั้นเหรอ นี่ฉันกำลังพัวพันกับเรื่องใหญ่เลยนะ"
10029010-179 = "แต่ก็เอาเถอะ ยังไงก็ไม่จำเป็นต้องเป็นศัตรูกัน และต่อไปก็น่าจะต้องมาหาคำตอบด้วยกันว่า 'เครื่องมือ' อันนั้นคืออะไร ฉันจะได้กลับไปโลกของฉันได้..."
10029010-180 = "คิดว่าเราลงเรือลำเดียวกันแล้วกันเนอะ? งั้นให้ฉันทำอะไรดีล่ะ? ไปหาอีกสองคนที่เหลือเหรอ? งั้นฉันไปพื้นที่รกร้างมิลเลเนียมนะ?"
10029010-181 = "มันก็ดีหรอกนะคะที่คุณกระตือรือร้น แต่เรื่องเครื่องมือเอาไว้ก่อนก็ได้ค่ะ พื้นที่รกร้างของมิลเลเนียม#nนั้นกว้างใหญ่มาก ถ้าบุ่มบ่ามเข้าไปก็อาจจะประสบภัยอีกครั้งก็ได้ค่ะ"
10029010-182 = "เรื่องการตามหาอีกสองคนที่เหลือน่ะ... จริงด้วยนะคะ ถ้าฉันตั้งใจ ก็ไม่มีอะไรยากหรอกค่ะ"
10029010-183 = "ในทางกลับกัน เรื่องด่วนที่เราต้องทำก่อนน่ะ..."
10029010-184 = "... เอมิ"
10029010-185 = "อืม เข้าใจแล้ว"
10029010-186 = "เราได้คุยกันไว้ล่วงหน้าแล้ว ฉันว่าถ้าไปหาตอนนี้ก็น่าจะรับมาได้เลยค่ะ"
10029010-188 = "คุยเรื่องอะไรที่รู้กันเองอีกแล้วนะ เรื่องด่วนงั้นเหรอ? แล้วต้องไปรับอะไรด้วย นี่มันเรื่องอะไรกัน?"
10029010-189 = "ตามฉันมาก่อนเถอะ แล้วฉันจะอธิบายให้ฟังระหว่างเดินทาง"
10029010-190 = "แต่ก่อนที่จะไป ต่อให้เธอเป็นคนที่มาจากโลกอื่นก็เถอะ..."
10029010-191 = "แต่การเป็นจุดสนใจหรือทำตัวให้คนอื่นสนใจแบบนั้นทุกครั้งมันไม่ดีหรอกนะ เธอคงไม่อยากเป็นแบบนั้นใช่มั้ย?"
10029010-192 = "ถ้าจะอยู่ในคิโวทอส ก่อนอื่นเธอก็ต้องทำตัวเป็นธรรมชาติให้เหมือนกับชาวคิโวทอส"
10029010-193 = "[s21] \"... อ้อ อืม เข้าใจแล้ว\"\n[s22] \"เข้าเมืองตาหลิ่ว ต้องหลิ่วตาตาม... อะไรแบบนี้สินะ\""
10029010-196 = "......??  หมายความว่ายังไง..."
10029010-197 = "ตอนนี้มิโคโตะยังไม่มีสิ่งนั้น ก็เลยยังดูแปลกและน่าสะดุดตา ก็เลยเจอสถานการณ์แบบเมื่อกี้ไง"
10029010-198 = "และเพื่อแก้ไขเรื่องนั้น..."
10029010-200 = "... เราก็เลยต้องไปเอา 'ของพื้นๆ' ของคิโวทอสมาน่ะ"

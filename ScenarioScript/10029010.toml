[translation]
10029010-1 = "第1話;麻煩製造者？"
10029010-2 = "（接到英美的聯絡，於是前往了千年）"
10029010-3 = "……啊，老師，請往這邊。"
10029010-4 = "老師來的真準時。#n不必花費多餘的時間真是件好事。"
10029010-5 = "這裡面就是部長準備的病房，也是讓帶回來的遇難者暫時停留的場所。"
10029010-6 = "……但是現在出了一點問題。"
10029010-7 = "[s1]「……一點問題？」\n[s2]「發生了什麼事嗎？」"
10029010-10 = "嗯，我聯絡老師之後進行了一次確認……"
10029010-11 = "果然還是直接讓老師看看比較快吧。"
10029010-18 = "[ns3]「嗯，這裡是……？」\n[ns4]「一個人都沒有啊……？」"
10029010-21 = "……這就是問題所在。"
10029010-22 = "聯絡老師之後回來一看，就發現這裡像老師現在看到的一樣空無一人。"
10029010-23 = "嗯？還是不太明白？"
10029010-24 = "就是字面上的意思。#n本來應該睡在這裡的三個人全都不知去向了。"
10029010-25 = "或許是醒來之後到外頭去了吧……"
10029010-26 = "問我有沒有告訴部長？當然有。#n不過從部長的聲音可以明顯聽出他很努力在維持冷靜。"
10029010-27 = "「可能什麼事都沒有，但也可能發生大事。」──"
10029010-28 = "──部長是這麼說的。#n簡單來說，他們都是來歷不明的人。"
10029010-29 = "所以部長要我跟老師會合後趕緊把那三個人都帶回來。"
10029010-30 = "如果老師願意的話，能請老師幫忙嗎？"
10029010-31 = "[s5]「當然可以。以防萬一，我們趕緊行動吧。」\n[s6]「那些人有什麼特徵嗎？」"
10029010-34 = "跟老師溝通果然很有效率，真好。"
10029010-35 = "就如我之前所說，他們一共有三個人。#n身穿非奇普托斯學園的制服，並且三人手上都沒有槍。"
10029010-36 = "此外據我所知，三人當中的一人在移送過程中曾經無意識地……"
10029010-37 = "釋放出了……"
10029010-42 = "……電力。"
10029010-46 = "嗯，就像剛才聽到的一樣。"
10029010-47 = "[s7]「先，先往聲音傳來的方向走吧！動作快！！」\n[s8]「最重要的事怎麼最後才說！！」"
10029010-53 = "（急忙和英美一起跑向傳出爆炸聲的地點）"
10029010-54 = "聲音確實是從這附近……"
10029010-58 = "……在那裡，老師。"
10029010-62 = "……唉。"
10029010-63 = "這裡到底是什麼地方，為什麼走到哪裡都有人來挑釁……#n而且所有人都理所當然地拿著槍……"
10029010-64 = "……嗯？"
10029010-65 = "怎麼了？找我有事嗎？"
10029010-66 = "其中一個人……是不是在哪裡見過？"
10029010-67 = "兩個都對。我們的確有事找你，而且也確實見過面。#n沒想到你居然會有印象。"
10029010-68 = "在廢墟發現並把你們帶來這裡的人就是我。#n不過當時你們都沒有意識……"
10029010-69 = "想不到才剛醒來就這樣惹事。"
10029010-70 = "……！？"
10029010-71 = "話不是這麼說的吧？要是別人聽到一定會誤以為是我造成的！！"
10029010-72 = "這明顯是正當防衛好嗎！？#n還不是這些傢伙突然就……"
10029010-73 = "呃，唔……剛，剛剛是怎麼回事……"
10029010-74 = "好像聽見滋滋滋的聲音……而且還……砰了一聲……"
10029010-75 = "[s9]「……好像能想像那個情境。」\n[s10]「幸好大家都沒什麼大礙。」"
10029010-79 = "……確實。沒帶槍就走在路上的學生，看起來的確很顯眼。"
10029010-80 = "為什麼從剛才就一直自言自語……我完全聽不清楚你在說什麼。"
10029010-81 = "不過看你手上拿著那個東西，應該不是來聊天的吧……"
10029010-82 = "就像剛才那些傢伙一樣……"
10029010-87 = "……嗯？"
10029010-88 = "搞什麼，為什麼能力……"
10029010-89 = "突然就想動手的好像是你吧……"
10029010-90 = "[s11]「我們不是來打架的。」\n[s12]「我們可能需要好好談談。」"
10029010-93 = "呃，嗯……？"
10029010-94 = "是，是嗎……？#n那……你們是誰？"
10029010-95 = "或者說，這裡到底是哪裡？#n我在學園都市從沒看過這種地方。"
10029010-96 = "大家好像……都拿著槍，頭上還飄著怪怪的東西……"
10029010-97 = "難道這也是印地安撲克的……"
10029010-98 = "不，應該不是。#n如果是印地安撲克的話，現在的我不應該存在才對，真搞不懂。"
10029010-99 = "到底是怎麼回事……？#n果然是夢嗎？如果不是的話究竟……"
10029010-100 = "[s13]「印地安撲克……？」\n[s14]「好像在自言自語……」"
10029010-103 = "語無倫次地自言自語是精神異常者的特徵。"
10029010-104 = "否則……#n老師，部長說的果然沒錯。"
10029010-105 = "[s15]「確實有種迷路的感覺。」\n[s16]「……這代表他們不是奇普托斯的人。」"
10029010-108 = "……嗯？"
10029010-109 = "他是……老師……？"
10029010-110 = "那個大人……"
10029010-111 = "是老師？"
10029010-112 = "你……是老師嗎？"
10029010-113 = "那在你旁邊的是……？"
10029010-114 = "我是千年科學學園1年級，特異現象搜查部的和泉元英美。"
10029010-115 = "……學……生？？"
10029010-119 = "穿成這樣……卻說是……學生？"
10029010-120 = "……？"
10029010-121 = "[s17]「……呃。」\n[s18]「難道你現在想問的是『那個問題』……！？」"
10029010-127 = "……老師怎麼會跟「穿成這樣」的學生走在一起！？"
10029010-129 = "（……被問了很難回答的問題，但總之先見到了三人中的其中一人）"
10029010-131 = "……原來如此。"
10029010-132 = "情況我大致明白了。#n雖然要說明原理很困難，不過這也沒辦法。"
10029010-133 = "因為千年的廢墟……無論發生多麼不可思議的現象都不足為奇。"
10029010-134 = "話雖如此，居然讓其他世界的人「轉移」到了這個世界……"
10029010-135 = "或許是該處的某個我們尚未發現的設施產生了能量反應。"
10029010-136 = "雖然你一臉淡定，不過說的內容也太可怕了吧？"
10029010-137 = "別的世界？異世界轉移……？是要我相信那種話嗎？"
10029010-138 = "坦白講，你剛才所說的話……簡直荒謬到讓我覺得是不是隨口編出來的。"
10029010-139 = "雖然現在的狀況的確讓我摸不著頭緒就是了……"
10029010-140 = "哎呀，你在質疑我這個超天才病弱美少女駭客所說的話嗎……？"
10029010-141 = "部長的語氣和行為的確會讓人產生那種感覺。#n不過遺憾的是，那並不適用於現在的情況，因為我也同意部長的看法。"
10029010-142 = "英美……！？"
10029010-143 = "除了這次事件之外，我們特異現象搜查部至今已經接觸過無數的「異常現象」。"
10029010-144 = "因此就算再碰到什麼新的異常現象，對我們來說也不是難以接受的事。"
10029010-145 = "硬要說的話，我反而覺得你，那個……"
10029010-147 = "……我叫御坂美琴。"
10029010-148 = "……你是能操控電力的「超能力者」這件事，反而更讓我驚訝，美琴。"
10029010-149 = "雖然名字是我告訴你的沒錯，直接用名字稱呼別人會不會有點……"
10029010-150 = "算了，無所謂。"
10029010-151 = "總之……你們的意思是這裡雖然長得很像學園都市，實際上卻是另一個世界嗎？"
10029010-152 = "所以這裡沒有任何能力者？也沒有開發這類能力的研究團體或機關？"
10029010-153 = "至少就我所知，並沒有聽過類似的案例。#n而且你說開發超能力的實驗？老實說，這種事對我而言只存在於科幻故事當中。"
10029010-154 = "我沒有要否定的意思……不過像你們這種每個學生頭上都漂浮著奇怪的光環，#n還會沒事拿槍互相攻擊的世界，應該也沒普通到哪裡去吧？"
10029010-155 = "哎呀，怎麼會呢？學生拿槍保護自己不是理所當然的事嗎？#n你說對吧，英美？"
10029010-157 = "嗯，沒錯。不管你問誰，答案都是一樣的。"
10029010-158 = "……？？？？？？？？？？？？"
10029010-159 = "什……麼？難道真正奇怪的人……是我？？？"
10029010-160 = "而且你雖然說頭上有光環這件事很奇怪……你現在頭上不也有光環嗎，美琴同學。"
10029010-161 = "……嗯？"
10029010-162 = "咦咦！？還，還真的有……！？#n這東西是什麼時候冒出來的！？"
10029010-163 = "[s19]「話說還有兩個人對吧？」\n[s20]「你對其他兩人的去向有沒有什麼頭緒？」"
10029010-166 = "……其他兩人？#n……頭緒？"
10029010-167 = "這個嘛……我的記憶並不是很清楚。"
10029010-168 = "只記得在來到這裡之前正在玩一種叫「印地安撲克」的東西……#n不過當時身邊並沒有其他人。"
10029010-169 = "印地安撲克……？"
10029010-170 = "啊，也對，你們應該不知道吧？"
10029010-171 = "印地安撲克本身我們是知道，不過那在我們這裡只是一種普通的撲克牌遊戲。"
10029010-172 = "這點在我們那邊也是一樣的……"
10029010-173 = "但我們最近研發出了一種類似的新技術。#n只要利用它，我們就可以窺探別人預先儲存的夢。"
10029010-174 = "所以一開始我才會以為這裡應該也只是某個人的夢境──之類的地方。"
10029010-175 = "至於其他兩人……雖然不知道是誰，假如他們和我的情況一樣的話，#n我想他們本來應該也在某個地方玩印地安撲克吧。"
10029010-176 = "然而那名為印地安撲克的東西，卻和千年廢墟裡的某個設施產生了相互影響……"
10029010-177 = "原來如此，真是有趣。#n看來我們有必要認真找找那個設施了。"
10029010-178 = "有趣？我現在可是被捲入了一起不得了的事件裡耶。"
10029010-179 = "不過無論如何，既然我們沒有互相為敵的理由，#n而且就算是為了回到原本的世界，我也必須查清楚那個「設施」究竟是什麼……"
10029010-180 = "也就是說，我們現在應該可以算是同一艘船上的夥伴吧？#n那我該做什麼好呢？找到其他兩個人？還是要先去一趟那個叫做千年廢墟的地方？"
10029010-181 = "雖然態度積極是好事，不過設施那邊的事暫時還不要緊。#n況且千年廢墟腹地遼闊，要是貿然前往的話很可能會迷路的。"
10029010-182 = "至於尋找其他兩人的事……只要我有心要找並不會很困難。"
10029010-183 = "所以眼下更重要的事情是……"
10029010-184 = "……英美。"
10029010-185 = "嗯，知道了。"
10029010-186 = "我已經事先通知過，現在過去應該就能拿到東西了才對。"
10029010-188 = "又在說一些我聽不懂的話了。#n重要的到底是什麼事啊？要去拿的東西又是什麼？"
10029010-189 = "總之先跟我們來吧。#n路上應該有足夠的時間跟你說明。"
10029010-190 = "不過在那之前，就算你是別的世界的訪客……"
10029010-191 = "要是像剛才一樣持續引起旁人注意的話，會大幅降低我們辦事的效率。#n我想美琴應該也不樂見發生這種情況吧？"
10029010-192 = "所以如果你想要在奇普托斯自由地活動，就必須打扮得像奇普托斯的人一樣。"
10029010-193 = "[s21]「……啊哈，原來如此，我明白了。」\n[s22]「奇普托斯有奇普托斯的法則……是這個意思吧？」"
10029010-196 = "什麼意思……？？"
10029010-197 = "就是因為你身上缺少了那個東西，大家才會覺得你很奇怪、突兀，#n進而導致你被捲入剛才那樣的事件。"
10029010-198 = "為了解決這個問題……"
10029010-200 = "……我們要去取得奇普托斯的「常識」。"

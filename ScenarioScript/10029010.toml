[translation]
10029010-1 = "Episode 1;Troublemaker?"
10029010-2 = "I headed to Millennium at Eimi's request."
10029010-3 = "Ah. Sensei. This way."
10029010-4 = "Your timing is ideal. We must take immediate action."
10029010-5 = "The president arranged this hospital room for us. It's where I brought the strangers I found in the ruins."
10029010-6 = "...Unfortunately, we've had some trouble."
10029010-7 = "[s1] \"What kind of trouble?\"\n[s2] \"Did something happen?\""
10029010-10 = "I came back here shortly after I contacted you."
10029010-11 = "Perhaps it would be better if I show you."
10029010-18 = "[ns3] \"Hm? That's strange...\"\n[ns4] \"There's no one here.\""
10029010-21 = "And that is the problem."
10029010-22 = "When I returned, as you can see, no one was here."
10029010-23 = "Hm? Is my explanation insufficient?"
10029010-24 = "It's just as I've said. Three people were sleeping here, and now they are gone."
10029010-25 = "Maybe they woke up and went outside, or..."
10029010-26 = "I informed the president. The inflection of her voice indicated that she was trying to suppress her agitation at the situation."
10029010-27 = "...\"It may be nothing, or it may be a matter of enormous proportions.\""
10029010-28 = "That's what she told me. We just don't know enough about those strangers."
10029010-29 = "Since you were already on your way, she advised me that we should wait for you and look for them together."
10029010-30 = "You're here now. Would you mind helping me?"
10029010-31 = "[s5] \"Sure. We should begin our search right away.\"\n[s6] \"Can you describe them for me?\""
10029010-34 = "As expected of Sensei, you're quick and to the point. "
10029010-35 = "There were three of them. Their uniforms don't belong to any academy I know of in Kivotos. Oh, and none of them were carrying guns."
10029010-36 = "Finally, in the process of being transported here, one of them... While still unconscious..."
10029010-37 = "...discharged..."
10029010-42 = "...a burst of electricity."
10029010-46 = "Oh. It sounded just like that."
10029010-47 = "[s7] \"Follow that sound! Quickly!\"\n[s8] \"You saved the most important info for last!\""
10029010-53 = "Eimi and I hurried to the source of the explosion."
10029010-54 = "The sound definitely came from somewhere nearby..."
10029010-58 = "Over there, Sensei."
10029010-62 = "*sigh*"
10029010-63 = "Where am I? Why is everyone picking a fight with me? Wait, more importantly, why are they all walking around with guns...?"
10029010-64 = "...Oh?"
10029010-65 = "The way you're looking at me makes me think you have business with me, too."
10029010-66 = "Hm... You seem familiar somehow."
10029010-67 = "You're right on both counts. I have business with you, and we've met. I didn't think you'd remember."
10029010-68 = "I'm the one who found you in the ruins. You were unconscious at the time..."
10029010-69 = "I didn't expect you to cause an incident like this as soon as you woke up."
10029010-70 = "...?!"
10029010-71 = "You say I'm causing an incident? The way you're talking, you'd think I'd done something wrong!"
10029010-72 = "I'm just defending myself! These girls here..."
10029010-73 = "Ugh... What the heck was that...?"
10029010-74 = "There was a zap...and something exploded...and then..."
10029010-75 = "[s9] \"I'm getting a picture of what happened.\"\n[s10] \"Thank goodness we got here before it got serious.\""
10029010-79 = "Indeed. A student walking in public unarmed is sure to draw unwanted attention."
10029010-80 = "What are you two muttering about...? I don't understand a thing you're saying."
10029010-81 = "Anyway, seeing as you're strutting around with some heavy firepower, I'm guessing you're not exactly here to talk..."
10029010-82 = "Just like those guys over there..."
10029010-87 = "...Huh?"
10029010-88 = "What the...? My power..."
10029010-89 = "It appears to be you who are not interested in talking."
10029010-90 = "[s11] \"We're not here to fight.\"\n[s12] \"Why don't we hash this out like civilized people?\""
10029010-93 = "Um..."
10029010-94 = "Well, sure then, let's talk. So, what's your deal...?"
10029010-95 = "Actually, first off, where am I? This isn't any part of Academy City I've ever seen."
10029010-96 = "You've all got...guns or something, and you have these weird things floating over your heads..."
10029010-97 = "Is this all part of Indian Poker's...?"
10029010-98 = "No, that can't be. I wouldn't be myself if it was Indian Poker, for starters."
10029010-99 = "What's going on here...? If this isn't a dream, then what's..."
10029010-100 = "[s13] \"Indian Poker...?\"\n[s14] \"She's talking to herself...\""
10029010-103 = "Mumbling nonsensically to oneself is a hallmark of mental illness."
10029010-104 = "But if we discount such illness... Sensei, I believe the president was correct after all."
10029010-105 = "[s15] \"She definitely seems lost.\"\n[s16] \"...She's not from Kivotos.\""
10029010-108 = "...Huh?"
10029010-109 = "Sensei...?"
10029010-110 = "So this adult..."
10029010-111 = "...is a teacher?"
10029010-112 = "So if you're a teacher..."
10029010-113 = "Then the person next to you is...?"
10029010-114 = "Izumimoto Eimi, first-year at Millennium Science School and member of the Super Phenomenon Task Force."
10029010-115 = "...A...first-year...?!"
10029010-119 = "You're a...student...in that outfit?"
10029010-120 = "...?"
10029010-121 = "[s17] \"...Oof.\"\n[s18] \"She asked it. She actually asked it...\""
10029010-127 = "You teach at a school where students dress like THIS?!"
10029010-129 = "Though she asked some difficult questions, I met the first of the three castaways..."
10029010-131 = "...I see."
10029010-132 = "I understand the general situation. I don't know how this happened, but I guess that part can't be helped."
10029010-133 = "The ruins of Millennium are a place where all sorts of esoteric and unorthodox things are possible."
10029010-134 = "For people from another world to have been transported to ours..."
10029010-135 = "My suspicion is that some undiscovered machinery deep in the ruins had a sort of energy reaction."
10029010-136 = "You're saying it very casually, but you realize how crazy this all sounds, right?"
10029010-137 = "Travel to another world? Energy reactions...? You really expect me to believe that?"
10029010-138 = "Honestly, it's all pretty farfetched. I have to wonder if you're just making it up."
10029010-139 = "Admittedly, I don't exactly have any theories of my own, but..."
10029010-140 = "Oh my. You're questioning me, of all people? The delicate-yet-beautiful super genius hacker..."
10029010-141 = "I understand how the president talks and behaves comes across, but unfortunately, in this case, I agree with her."
10029010-142 = "Eimi...?!"
10029010-143 = "Besides, this isn't the first time that the Super Phenomenon Task Force has encountered an anomaly."
10029010-144 = "One more mysterious occurrence isn't that hard to believe."
10029010-145 = "If anything, the most unusual thing here..."
10029010-147 = "...is you, Misaka Mikoto."
10029010-148 = "To think that Mikoto is an \"esper\" who can manipulate electricity..."
10029010-149 = "I guess I'm the one who filled you in, but to call me by my given name immediately..."
10029010-150 = "Well, fine. That's fine."
10029010-151 = "Anyway... The short version is, although they look similar, there are two different Academy Cities."
10029010-152 = "And this one doesn't have any espers, or any organizations or institutions working on researching them?"
10029010-153 = "I don't know of any cases like the one you're describing. The idea of an experiment creating an esper is, frankly, something I couldn't even imagine."
10029010-154 = "That's fair. But then again, I couldn't have imagined a place where all the students have glowing shapes over their heads or shoot guns everywhere."
10029010-155 = "Oh, my. But it's common sense for a student to carry a firearm, isn't it, Eimi?"
10029010-157 = "Yes. Nobody would argue with that."
10029010-158 = "...???"
10029010-159 = "What...? And you think I'm weird...?!"
10029010-160 = "And about the halo floating above my head... You have one too, Mikoto."
10029010-161 = "...Huh?"
10029010-162 = "H-Huh?! I really do...! Where did this come from?!"
10029010-163 = "[s19] \"Come to think of it, Eimi said there were two others with you.\"\n[s20] \"Can you tell us anything about the rest of your group?\""
10029010-166 = "...? My...group...?"
10029010-167 = "Hm. Well... I don't remember much."
10029010-168 = "The last thing I remember before coming here is that I used an Indian Poker. I was the only one around when I used it."
10029010-169 = "What do you mean by Indian Poker?"
10029010-170 = "Oh, of course. You must not have that here."
10029010-171 = "Indian Poker... It's a card game. At least, that's all it is in this world."
10029010-172 = "Well, sure, it's also the name of a card game where I'm from, but..."
10029010-173 = "The short version is that it's something you can use to see other people's dreams."
10029010-174 = "That's what I thought this was at first. Somebody else's dream."
10029010-175 = "The other two... I don't know who they are, but if they appeared when I did, I'd guess they were probably also using Indian Poker themselves."
10029010-176 = "And the effect of this so-called \"Indian Poker,\" coupled with certain machinery in the Millennium ruins, is what..."
10029010-177 = "I see. It's an interesting theory. I'll have to look into it."
10029010-178 = "\"Interesting?\" This isn't some game!"
10029010-179 = "Well, there's no need for us to be enemies. I guess I should help you find that machinery so I can go home..."
10029010-180 = "I think it's safe to say we're on the same side, right? So what should I do? Find the other two? Go back to those ruins?"
10029010-181 = "I'm glad you're motivated, but I still need to look into that machinery. The ruins are so vast that you'll only get lost if you wander about aimlessly."
10029010-182 = "As for finding the other two... Hm. It shouldn't be too hard if I put my mind to it."
10029010-183 = "There's a much more pressing matter..."
10029010-184 = "Eimi."
10029010-185 = "Indeed."
10029010-186 = "I've already sent word. If we go now, we'll be able to get one for her."
10029010-188 = "You're talking nonsense again. What am I getting?"
10029010-189 = "Follow me. I'll explain on the way."
10029010-190 = "Even if you are from another world..."
10029010-191 = "If you keep attracting attention, it'll make our job very inefficient. You don't want that, do you?"
10029010-192 = "If you want to walk around in Kivotos, you first have to look like you belong here."
10029010-193 = "[s21] \"...Aha. I get it.\"\n[s22] \"When in Kivotos...\""
10029010-196 = "...? What are you..."
10029010-197 = "It's because you didn't have one that you stood out earlier, leading to that...situation."
10029010-198 = "To solve this..."
10029010-200 = "...we'll introduce you to the \"customs\" of Kivotos."

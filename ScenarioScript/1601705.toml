[translation]
1601705-1 = "I Hate Being Alone "
1601705-4 = "Not long after the MomoTalk with Aoba..."
1601705-10 = "*pant* *pant* S-Sensei..."
1601705-11 = "[s1] \"You're here so early, Aoba!\"\n[s2] \"Are you okay?! Drink this and take a breather!\""
1601705-14 = "*pant* *pant* Th-Thank you..."
1601705-18 = "Phew..."
1601705-19 = "N-Now then... Where's the patient...I mean, the broken machine...?"
1601705-20 = "[s3] \"It's the coffee maker here.\"\n[s4] \"It stopped working a while ago.\""
1601705-23 = "R-Right...I'll take a look...!"
1601705-27 = "Hmm...it looks fine from the outside."
1601705-28 = "As for the inside..."
1601705-35 = "[ns5] \"A-Aoba...!\"\n[ns6] \"Are you sure you want to hit it...?\""
1601705-38 = "Hitting it usually works!"
1601705-39 = "So don't worry too much...!"
1601705-40 = "[s] \"O-Okay!\""
1601705-41 = "I worried quite a bit, but I decided to trust her."
1601705-51 = "...I-It's still not working..."
1601705-52 = "(Just a little dent. It'll be okay, right?)"
1601705-53 = "O-Okay. I'm gonna have to take it all apart and put it back together!"
1601705-57 = "(Did she say this was her first time working with a coffee maker?)"
1601705-58 = "I figured I might as well keep trusting her at that point..."
1601705-66 = "...Okay, it's all back together now!"
1601705-67 = "Heehee... Let's try turning it on..."
1601705-76 = "[ns] \"It's really shaking...!!!\""
1601705-77 = "I-It's not supposed to do that, is it?"
1601705-78 = "[s] \"I don't think so...!\""
1601705-79 = "I-I'm sorry...I guess that didn't work."
1601705-80 = "Okay then, let me try something else."
1601705-90 = "Right, THIS time...!"
1601705-99 = "[ns7] \"How'd you crank the water pressure up that high?!\"\n[ns8] \"It split the table?!\""
1601705-104 = "Th-That's...not it either!"
1601705-113 = "After a few more tries..."
1601705-117 = "I-I'm sorry this is taking so long..."
1601705-118 = "I'm sure it'll work this time..."
1601705-119 = "[s] \"Let's see...!\""
1601705-129 = "[ns9] \"I-It worked!!\"\n[ns10] \"You did it, Aoba!\""
1601705-134 = "W-Woo!! I did it!"
1601705-135 = "R-Repair complete! Woo hoo!"
1601705-136 = "Fufu, fufufu... I guess that sort of counts as paying you back..."
1601705-140 = "N-Now then...since that's done, I think I'm going to go."
1601705-141 = "Sorry again for taking so long, Sensei..."
1601705-145 = "[ns] \"What do you mean, Aoba?\""
1601705-149 = "H-Huh?"
1601705-150 = "Did I say something wrong?"
1601705-155 = "[ns11] \"You worked so hard, let me get you dinner at least.\"\n[ns12] \"Let's go grab a bite to eat.\""
1601705-160 = "A-Augh..."
1601705-161 = "...Waah..."
1601705-162 = "Waaah!!"
1601705-163 = "[s] \"A-Are you crying?! I-I'm sorry...! Forget what I...\""
1601705-164 = "Th-That's not it..."
1601705-165 = "...I-It's been a while since someone invited me out to eat..."
1601705-166 = "A-After work, I always just eat...convenience store bento, in the night duty room..."
1601705-167 = "And now, all of a sudden, you... *hiccup*"
1601705-171 = "[ns] \"Let's make it an amazing dinner, then.\""
1601705-175 = "W-Waaah..."
1601705-184 = "Aoba and I enjoyed a delicious dinner at a fancy restaurant."
1601705-187 = "For some reason, the food tasted better than usual."

[translation]
1601705-1 = "I hate being alone "
1601705-4 = "（才和青葉用MomoTalk聊完沒多久……）"
1601705-10 = "哈，哈啊……老，老師……"
1601705-11 = "[s1]「你動作還真快啊，青葉！」\n[s2]「你沒事吧！？快喝點這個喘口氣！」"
1601705-14 = "哈，哈啊……謝，謝謝老師……"
1601705-18 = "呼……"
1601705-19 = "那，那麼請問病人……啊不對，是壞掉的機器在哪裡呢……？"
1601705-20 = "[s3]「就是這個咖啡壺。」\n[s4]「從幾天前開始就不能用了。」"
1601705-23 = "好，好的……請讓我看看……！"
1601705-27 = "唔嗯……外觀上沒有問題……"
1601705-28 = "內部……"
1601705-35 = "[ns5]「青，青葉……！」\n[ns6]「用敲的沒問題嗎……！？」"
1601705-38 = "大，大部分的問題，只要敲幾下就能解決……！"
1601705-39 = "不用太擔心的……！"
1601705-40 = "[s]「呃，嗯！」"
1601705-41 = "（雖然有點擔心，但還是決定相信青葉）"
1601705-51 = "還，還是沒有動靜……"
1601705-52 = "（咖啡機的一角出現了些微的凹陷……真的沒問題嗎？）"
1601705-53 = "既，既然如此……就全部拆開來重新組裝吧……！"
1601705-57 = "（他剛才說過是自己是第一次修咖啡機……）"
1601705-58 = "（雖然擔心，但還是決定相信他）"
1601705-66 = "組，組裝完成！"
1601705-67 = "嘿嘿……試著打開看看吧……"
1601705-76 = "[ns]「咦，振動變得超強的……！！」"
1601705-77 = "這，這台機器原本是這樣的嗎！？"
1601705-78 = "[s]「好像不是……！」"
1601705-79 = "對，對不起……可能是有哪裡弄錯了……"
1601705-80 = "我，我再挑戰一次……！"
1601705-90 = "好了，這次一定……！"
1601705-99 = "[ns7]「水壓超強的……！！」\n[ns8]「桌子竟然裂開了！？」"
1601705-104 = "這，這樣也不對嗎～！！！"
1601705-113 = "（就這樣反覆嘗試了幾次之後……）"
1601705-117 = "對，對不起，沒想到花了這麼久的時間……"
1601705-118 = "這次肯定……會正常啟動的……"
1601705-119 = "[s]「究竟會怎麼樣呢……！」"
1601705-129 = "[ns9]「成，成功了！！」\n[ns10]「你做到了，青葉！」"
1601705-134 = "哇，哇啊！！我做到了！"
1601705-135 = "修，修理完成！哇啊～！！"
1601705-136 = "呵呵，呵呵呵……總算有稍微報答老師了……"
1601705-140 = "那，那麼……既然維修已經結束，我就先告辭了。"
1601705-141 = "拖到這麼晚真的很抱歉，老師……"
1601705-145 = "[ns]「你在說什麼？青葉。」"
1601705-149 = "咦咦！？"
1601705-150 = "還，還有哪裡有問題嗎……？"
1601705-155 = "[ns11]「你修理得這麼辛苦，至少讓我請你吃頓晚餐吧。」\n[ns12]「一起吃頓飯再走吧。」"
1601705-160 = "啊，啊嗚……"
1601705-161 = "嗚嗚……"
1601705-162 = "嗚哇啊啊──！！"
1601705-163 = "[s]「你，你怎麼哭了！？抱，抱歉！都怪我說了奇怪的話……」"
1601705-164 = "不，不是那樣的……"
1601705-165 = "是，是因為已經很久，沒有人找我一起吃飯了……"
1601705-166 = "我，我每天都是在下班之後……去便利商店買便當……一個人在值班室吃……"
1601705-167 = "所，所以突然聽到有人跟我說這種話……才會……"
1601705-171 = "[ns]「今天一起吃頓超棒的晚餐吧！」"
1601705-175 = "嗚，嗚哇啊啊……"
1601705-184 = "（和青葉一起，在高級餐廳享用了美味的晚餐）"
1601705-187 = "（不知為何，感覺比平時更加美味）"

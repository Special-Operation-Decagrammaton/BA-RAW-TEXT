[translation]
1601705-1 = "I hate being alone"
1601705-4 = "(ไม่นานนักหลังจากคุณครูได้คุย MOMOTALK กับอาโอบะ...)"
1601705-10 = "ฮะ... แฮ่ก... คะ... คุณครู..."
1601705-11 = "[s1] \"มาถึงเร็วจังเลย อาโอบะ! ดื่มนี่ก่อนนะ\"\n[s2] \"ไหวหรือเปล่า?! ดื่มนี่แล้วพักหายใจหน่อยนะ!\""
1601705-14 = "ฮะ... แฮ่ก... ขะ... ขอบคุณค่ะ..."
1601705-18 = "ฮู่ว..."
1601705-19 = "ถะ... ถ้างั้นคนไข้... ไม่สิ เครื่องใช้ไฟฟ้าที่เสียอยู่ตรงไหนคะ...?"
1601705-20 = "[s3] \"เครื่องทำกาแฟตรงนี้น่ะ มันเสียมาสักพักแล้ว\"\n[s4] \"เครื่องทำกาแฟอันนี้น่ะ มันใช้ไม่ได้มาสักพักแล้ว\""
1601705-23 = "ค่ะ ค่ะ... ฉันจะดูให้เองค่ะ...!"
1601705-27 = "อืม... ดูจากภายนอกแล้วก็ไม่มีปัญหาอะไร..."
1601705-28 = "ส่วนข้างใน..."
1601705-35 = "[ns5] \"อะ... อาโอบะ...! ทุบเลยเหรอ...!\"\n[ns6] \"เดี๋ยวก่อน จะทุบแบบนั้นเลยเหรอ...!\""
1601705-38 = "อาการส่วนใหญ่จะดีขึ้นจากการใช้กำลังแบบนี้ละค่ะ...!"
1601705-39 = "ไม่ต้องกังวลให้มากไปนะคะ...!"
1601705-40 = "[s] \"อะ... อื้อ!\""
1601705-41 = "(ถึงจะเป็นกังวล แต่คุณครูก็ตัดสินใจว่าจะเชื่อใจอาโอบะดูก่อน)"
1601705-51 = "ยะ... ยังใช้ไม่ได้เลยค่ะ..."
1601705-52 = "(คุณครูเห็นเครื่องทำกาแฟบุบไปหน่อยหนึ่งแล้ว... และคิดว่าจะไม่เป็นไรใช่มั้ยนะ?)"
1601705-53 = "นะ... ในเมื่อเป็นแบบนี้... งั้นฉันจะลองแยกชิ้นส่วนแล้วประกอบเข้าไปใหม่ค่ะ...!"
1601705-57 = "(คุณครูนึกถึงที่อาโอบะบอกเมื่อกี้ว่าไม่เคยซ่อมเครื่องทำกาแฟมาก่อน...)"
1601705-58 = "(ถึงคุณครูจะกังวล แต่ก็จะลองเชื่อดูอีกครั้ง)"
1601705-66 = "ปะ... ประกอบเสร็จแล้วค่ะ!"
1601705-67 = "แหะๆ... ฉันจะลองเปิดใช้งานดูนะคะ..."
1601705-76 = "[ns] \"คะ... เครื่องสั่นใหญ่เลย...!!\""
1601705-77 = "ปะ... ปกติมันไม่ได้สั่นแบบนี้ใช่มั้ยคะ?!"
1601705-78 = "[s] \"ไม่น่าจะนะ...!\""
1601705-79 = "ขะ... ขอโทษด้วยนะคะ... สงสัยจะยังแก้ไม่ได้..."
1601705-80 = "งั้นฉันขอลองอีกครั้ง...!"
1601705-90 = "เอาละ ครั้งนี้เห็นทีต้อง...!"
1601705-99 = "[ns7] \"แรงดันน้ำแรงมากเลย...!!\"\n[ns8] \"โต๊ะหักแล้วเลยนะ?!\""
1601705-104 = "วะ... วิธีนี้ก็ไม่ได้ผลสินะคะ~!!!"
1601705-113 = "(แล้วอาโอบะก็ลองซ่อมอยู่อีกหลายครั้ง...)"
1601705-117 = "ขะ... ขอโทษที่ฉันใช้เวลานานนะคะ..."
1601705-118 = "ครั้งนี้จะต้อง... ใช้งานได้แน่นอนค่ะ..."
1601705-119 = "[s] \"จริงนะ...!\""
1601705-129 = "[ns9] \"ดะ... ได้จริงๆ ด้วย!!\"\n[ns10] \"สำเร็จแล้วนะ อาโอบะ!\""
1601705-134 = "วะ... ว้าว!! ฉันทำได้แล้วค่ะ!"
1601705-135 = "ซะ... ซ่อมสำเร็จแล้วค่ะ! ว้าว~!!"
1601705-136 = "ฮุฮุ... ฮุฮุฮุ... ในที่สุดฉันก็ได้ตอบแทนบุญคุณบ้างแล้วนะคะ..."
1601705-140 = "ถะ... ถ้างั้น... ในเมื่อซ่อมเสร็จแล้ว งั้นฉันขอตัวก่อนค่ะ"
1601705-141 = "ต้องขอโทษอีกครั้งที่ใช้เวลาซ่อมนานขนาดนี้นะคะ คุณครู..."
1601705-145 = "[ns] \"พูดอะไรแบบนั้นน่ะ อาโอบะ?\""
1601705-149 = "คะ... คะ?!"
1601705-150 = "ฉะ... ฉันทำอะไรผิดไปงั้นเหรอคะ...?"
1601705-155 = "[ns11] \"เหนื่อยซ่อมให้ขนาดนี้ ให้ครูเลี้ยงข้าวเย็นเถอะนะ\"\n[ns12] \"กินข้าวด้วยกันก่อนแล้วค่อยกลับนะ\""
1601705-160 = "อะ... เอ่อ..."
1601705-161 = "ฮือ..."
1601705-162 = "แงงง!!"
1601705-163 = "[s] \"ระ... ร้องไห้เหรอ?! ขอโทษที...! ครูไม่ควรชวนเหรอ...\""
1601705-164 = "มะ... ไม่ใช่อย่างนั้นหรอกค่ะ..."
1601705-165 = "มะ... ไม่มีใครชวนฉันกินข้าวด้วยกันมานานแล้วน่ะค่ะ..."
1601705-166 = "ปะ... ปกติพอทำงานเสร็จ... ฉันก็มักจะไปซื้อข้าวกล่องในร้านสะดวกซื้อ... แล้วก็เอามากินคนเดียวใน#nห้องอยู่เวร..."
1601705-167 = "จะ... จู่ๆ ฉันมาพูดอะไรแบบนี้ทำไมนะ... (สะอึก)..."
1601705-171 = "[ns] \"งั้นวันนี้มากินอาหารเย็นอร่อยๆ กันนะ!\""
1601705-175 = "งะ... แงงงง..."
1601705-184 = "(แล้วคุณครูก็พาอาโอบะไปกินอาหารเย็นแสนอร่อยในร้านอาหารดีๆ)"
1601705-187 = "(และรู้สึกว่าอาหารวันนี้จะอร่อยกว่าปกติ)"

[translation]
80000092-1 = "Special Remedial Supplies"
80000092-2 = "I was summoned to Mine's room on Valentine's Day."
80000092-6 = "Please come in, Sensei."
80000092-13 = "It's a bit cramped, but please make yourself at home."
80000092-17 = "[ns] \"Is this...chocolate? You're collecting chocolate, too?\""
80000092-18 = "Oh, that. Yes, it's chocolate."
80000092-19 = "I started collecting them a short while ago. Through my research, I came to realize that chocolate could be a kind of medical supply."
80000092-20 = "[s] \"Chocolate...is a medical supply?\""
80000092-21 = "Yes. I've discovered that chocolate can be a perfect remedy in many situations."
80000092-22 = "In fact, it's got a number of properties that make it perfect for use in the field in Kivotos."
80000092-23 = "If someone is experiencing hypoglycemic shock, it's not a bad source of sugar."
80000092-24 = "Of course, the best option is juice, but juice is much more difficult to carry."
80000092-25 = "There's even a chocolate-based product with high caffeine potency, for temporary alertness. It looks not unlike shoe polish."
80000092-26 = "It's often added to oatmeal. The results taste barely more palatable than the aforementioned shoe polish, so it's not exactly anyone's first choice."
80000092-27 = "But it's unmatched in restoring energy and replenishing calories."
80000092-28 = "For that reason, I believe chocolate is well-suited to being a remedy or a medical supply."
80000092-29 = "So, about a week ago, I began my chocolate collection."
80000092-30 = "[s1] \"Chocolate as remedy... I guess I can see what you mean.\"\n[s2] \"But in that case, why do you have so many with fancy or cute wrappers?\""
80000092-33 = "?!"
80000092-34 = "I-I had no choice!"
80000092-35 = "The majority of commercially available chocolate is packaged like that, you know! So that's why..."
80000092-36 = "[s3] \"Oh, I've seen this egg-shaped one before.\"\n[s4] \"This one has a cute toy inside, right?\""
80000092-39 = "...!"
80000092-40 = "Th-Th-Th-That! Was! Research! It's for research purposes. Uh. Because!"
80000092-41 = "Don't you think children could choke on the toy if they tried to swallow the chocolate whole?"
80000092-46 = "[ns5] \"Oh, this one's chick-shaped! Is it lemon-flavored white chocolate?\"\n[ns6] \"I didn't know you were a cute animal stan!\""
80000092-51 = "..."
80000092-52 = "Yes I am! Am I not supposed to be?"
80000092-53 = "It's true! I like things that are cute and pretty."
80000092-54 = "Is it not acceptable for me to want them or collect them? Is it not all right for someone like me?"
80000092-58 = "Even you think that it doesn't suit me, right, Sensei? You think I'm too blunt and annoying to like cute things, right?"
80000092-59 = "I know. I know it's weird, okay? But... But..."
80000092-60 = "[s7] \"It's okay, Mine. It definitely suits you.\"\n[s8] \"Cuteness is life!\""
80000092-65 = "...Really?"
80000092-66 = "[s] \"Yes, really.\""
80000092-67 = "..."
80000092-68 = "I... think I owe you an apology. I showed you a side of me that I'm not proud of."
80000092-69 = "It's not often that someone teases me like that... And you may have hit a sore spot."
80000092-70 = "But, as my apology...!"
80000092-82 = "I didn't realize that my mouth was open in surprise until something got shoved in it."
80000092-86 = "It was sweet and flavorful, with a hint of bitterness."
80000092-88 = "Happy Valentine's Day!"
80000092-94 = "With those words, Mine fled the room."
80000092-95 = "I stayed in Mine's room, savoring the chocolate that she gave me, until she returned."

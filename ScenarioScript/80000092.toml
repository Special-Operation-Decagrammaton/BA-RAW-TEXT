[translation]
80000092-1 = "อุปกรณ์บรรเทาทุกข์แบบพิเศษ"
80000092-2 = "(วันวาเลนไทน์ คุณครูก็ได้รับเชิญไปที่ห้องของมิเนะ ด้วยเหตุผลบางอย่าง...)"
80000092-6 = "เชิญเลยค่ะคุณครู"
80000092-13 = "อาจจะคับแคบไปสักหน่อยนะคะ"
80000092-17 = "[ns] \"นี่มัน...ช็อกโกแลตนี่นา? มิเนะสะสมช็อกโกแลตด้วยเหรอ?\""
80000092-18 = "อา... ช็อกโกแลตเหรอคะ...?"
80000092-19 = "ค่ะ ฉันเพิ่งเริ่มสะสมช็อกโกแลตเมื่อไม่นานมานี้ และศึกษาจนพบว่าช็อกโกแลตสามารถใช้เป็น#nเวชภัณฑ์อย่างหนึ่งได้ค่ะ"
80000092-20 = "[s] \"ช็อกโกแลตใช้เป็นเวชภัณฑ์ได้ด้วยเหรอ?\""
80000092-21 = "ค่ะ ฉันค้นพบว่าช็อกโกแลตเองก็เป็นอุปกรณ์ช่วยเหลือที่ยอดเยี่ยมชนิดหนึ่งค่ะ"
80000092-22 = "ความจริง มีหลายๆ ครั้งที่ใช้ช็อกโกแลตเป็นอุปกรณ์บรรเทาทุกข์ด้วยค่ะ"
80000092-23 = "ใช้เป็นอาหารเสริมตอนที่เกิดอาการช็อกเพราะขาดน้ำตาลได้ด้วยค่ะ"
80000092-24 = "แน่นอนว่าอาหารเสริมน้ำตาลที่ดีที่สุดก็คือน้ำผลไม้ค่ะ แต่ว่าน้ำผลไม้น่ะพกพาไม่สะดวกเท่าไหร่"
80000092-25 = "แล้วก็มีผลิตภัณฑ์อาหารที่มีสีดำสนิทเหมือนยาขัดรองเท้า เพราะผสมคาเฟอีนเข้มข้นเข้าไปด้วย"
80000092-26 = "แล้วก็ยังมีผลิตภัณฑ์อาหารที่ผสมข้าวโอ๊ตลงไป... ให้มีรสชาติอร่อยกว่ามันฝรั่งต้มนิดหน่อย"
80000092-27 = "ในฐานะอาหารแล้ว ผลิตภัณฑ์พวกนี้ไม่ค่อยโดดเด่นเท่าไหร่ แต่เป็นผลิตภัณฑ์อาหารที่ช่วยเสริม#nพลังงานและฟื้นฟูร่างกายได้อย่างดีเลยค่ะ"
80000092-28 = "เพราะงั้น ฉันเลยคิดว่าช็อกโกแลตก็นับว่าเป็นอุปกรณ์ช่วยเหลือที่ดีชนิดหนึ่ง..."
80000092-29 = "ก็เลยเริ่มสะสมช็อกโกแลตมาตั้งแต่อาทิตย์ก่อนแล้วค่ะ"
80000092-30 = "[s1] \"ช็อกโกแลตเป็นเวชภัณฑ์ชนิดหนึ่ง... จะคิดแบบนั้นก็ได้นี่เนอะ\"\n[s2] \"ถึงจะพูดแบบนั้น แต่ดูเหมือนมีช็อกโกแลตกล่องหรูๆ เยอะเลยนะ?\""
80000092-33 = "!?"
80000092-34 = "ระ...เรื่องนั้นมัน...!"
80000092-35 = "คะ...ครึ่งหนึ่งเป็นช็อกโกแลตที่วางขายในท้องตลาด และ... มะ...มันก็ช่วยไม่ได้ที่ต้องซื้อเตรียมไว้...!"
80000092-36 = "[s3] \"อ๊ะ ช็อกโกแลตรูปไข่ อันนี้ครูรู้จักนะ\"\n[s4] \"ช็อกโกแลตรูปไข่นี่ ข้างในมีของเล่นน่ารักๆ อยู่ด้วยใช่มั้ย?\""
80000092-39 = "!!!"
80000092-40 = "ระระระระเรื่องนั้น...! มะ...มันเป็นส่วนหนึ่งของการเก็บข้อมูลค่ะ!"
80000092-41 = "อะ...อาจมีพวกเด็กๆ ที่เผลอเคี้ยวของเล่นเข้าไประหว่างกินช็อกโกแลต จนสำลักก็ได้นะคะ?!"
80000092-46 = "[ns5] \"มีช็อกโกแลตลูกเจี๊ยบด้วย? ไวท์ช็อกโกแลตผสมกลิ่นเลมอนเหรอ?\"\n[ns6] \"มิเนะคลั่งรักลูกเจี๊ยบเรอะ?!\""
80000092-51 = "..."
80000092-52 = "ใช่แล้วค่ะ! ไม่ได้เหรอคะ? "
80000092-53 = "ฉันชอบของสวยๆ น่ารักๆ ค่ะ!"
80000092-54 = "ฉันอยากได้ แล้วก็อยากเก็บสะสมค่ะ! ไม่ได้เหรอคะ? ว่าไงคะ?"
80000092-58 = "คุณครูเองก็คิดว่าไม่เหมาะกับฉันสินะคะ? คงไม่มีใครชอบคนที่โผงผาง แข็งกระด้าง และน่ารำคาญ#nจนอยากตีตัวออกห่างเลยใช่มั้ยล่ะคะ..."
80000092-59 = "เรื่องนั้นฉันก็รู้ค่ะ ฉันรู้ดีเลยค่ะ! แต่ว่า...!"
80000092-60 = "[s7] \"ใจเย็นๆ ก่อนมิเนะ ครูว่าก็เหมาะดีนะ\"\n[s8] \"ที่จริงมันน่ารักมากเลยแหละ!\""
80000092-65 = "...จริงเหรอคะ?"
80000092-66 = "[s] \"อื้อ จริงสิ\""
80000092-67 = "..."
80000092-68 = "ดันเผลอให้คุณครู...เห็นด้านที่ไม่น่าชื่นชมซะแล้ว... ขอโทษด้วยค่ะ"
80000092-69 = "คนที่แกล้งฉันจนน็อตหลุดขนาดนี้ได้... เพิ่งมีคุณครูคนแรกเลยค่ะ"
80000092-70 = "เพราะงั้น...!"
80000092-82 = "(จู่ๆ ก็โดนมิเนะยัดบางอย่างเข้ามาในปาก)"
80000092-86 = "(บางอย่างที่มีรสหวานปนขม... ที่เข้ากันอย่างดี)"
80000092-88 = "แฮปปี้ วาเลนไทน์ค่ะ!"
80000092-94 = "(มิเนะพูดทิ้งท้ายเอาไว้แบบนั้นแล้วรีบวิ่งหนีออกไปที่ไหนสักแห่ง)"
80000092-95 = "(หลังจากนั้นคุณครูก็นั่งชิมช็อกโกแลตที่มิเนะให้อยู่ในห้องอย่างสงบ และรอจนมิเนะกลับมา...)"

80000092-40 = "3;미네;04;그, 그그그그그건! 어디까지나! 자료 조사라고 말씀드려야 할지, 그, 보세요! \n#3;stiff"
80000092-41 = "3;미네;09;아이들이 그런 초콜릿을 한 입에 삼키다가 숨이 막힐 수도 있지 않을까요?!\n#3;em;[반응]"

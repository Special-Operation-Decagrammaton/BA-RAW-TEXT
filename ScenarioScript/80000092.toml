80000092-17 = "[ns] \"이건…… 초콜릿? 초콜릿도 모으는 거야?\""
80000092-18 = "3;미네;02;아…… 초콜릿 말씀이십니까……?\n#3;em;[반응]"
80000092-19 = "3;미네;99;예. 얼마 전부터…… 약간, 심경의 변화로, 의료 용품의 일종으로 모으기 시작했습니다."
80000092-20 = "[s] \"초콜릿이, 의료 용품?\""
80000092-21 = "3;미네;02;네. 초콜릿은 의외로 훌륭한 구호용품이 될 수 있다는 것이 제 판단이었습니다."
80000092-22 = "3;미네;03;실제로 초콜릿은 그 특성으로 인해 키보토스에서 현장 구호 물품으로 사용되기도 하죠."
80000092-23 = "3;미네;02;저혈당 쇼크 상황에도 나쁘지 않은 당 공급원이 되어 주기도 하고요."
80000092-24 = "3;미네;01;물론 가장 좋은 것은 주스입니다만, 주스는 휴대가 조금 불편하니까요."
80000092-25 = "3;미네;99;고함량의 카페인을 첨가하여 일시적인 각성 효과를 유도한, 구두약처럼 생긴 제품도 있고.\n#3;em;…"
80000092-26 = "3;미네;02;오트밀을 첨가하여…… 대강 삶은 감자보다는 조금 맛있게 만든 특수한 제품은."
80000092-27 = "3;미네;01;기호품으로써는 선호되지 않지만, 기력 회복과 열량 보충에 특화되어 있죠."
80000092-28 = "3;미네;99;그렇기에 저는, 초콜릿 정도면 훌륭한 구호용품 혹은 의료 용품이 아닐까, 하는 생각이 들어……"
80000092-29 = "3;미네;03;일주일 정도 전부터, 초콜릿을 모으기 시작했답니다.\n#3;em;[반짝]\n#3;greeting"
80000092-30 = "[s1] \"초콜릿이 의료 용품이라…… 그렇게 볼 수도 있겠네.\"\n[s2] \"그런 것 치고는 뭔가, 묘하게 고급인 데다 귀여운 포장인 것들이 많은데?\""
80000092-31 = "#wait;10"
80000092-32 = "#wait;10"
80000092-33 = "3;미네;04;!?\n#3;shake\n#3;em;[?!]"
80000092-34 = "3;미네;04;그, 그것은!\n#3;stiff"
80000092-35 = "3;미네;06;시판되는 초콜릿들의 태반이, 저기, 그런 것들로 준비되어 있어서 어쩔 수 없었다고나 할지……!\n#3;em;[///]"
80000092-36 = "[s3] \"아, 계란 모양 초콜릿. 이거 알아.\"\n[s4] \"초콜릿 계란 안에 귀여운 장난감이 들어 있지?"

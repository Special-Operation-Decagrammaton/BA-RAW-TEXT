[translation]
80000092-1 = "有點特別的救護用品"
80000092-2 = "（情人節當天，突然被叫去了美禰的房間）"
80000092-6 = "老師，恭候多時了。"
80000092-13 = "請進，雖然有點狹窄。"
80000092-17 = "[ns]（不知為何有超級多的巧克力……）"
80000092-18 = "啊……那個，讓您很在意嗎？"
80000092-19 = "其實從以前開始，我就把巧克力當成醫療用品來收集。"
80000092-20 = "[s]「巧克力是，醫療用品……？」"
80000092-21 = "是的。巧克力意外的能算是相當不錯的救護用品唷。"
80000092-22 = "實際上，巧克力在奇普托斯各處都被活用為救援物資。"
80000092-23 = "首先，在血糖過低時攝取，能夠補充一定的糖分。"
80000092-24 = "雖然含糖飲料之類的東西能更快產生效果……不過仍有難以攜帶的問題。"
80000092-25 = "而且高濃度的咖啡因有短暫的提神效果，也存在外觀像鞋油的產品。"
80000092-26 = "此外，也能做成至少比煮過馬鈴薯還好的麥片產品。"
80000092-27 = "要說它是嗜好品可能有點困難，不過很適合用於補充熱量回復體力。"
80000092-28 = "既然是這麼優秀的東西，我便思考它是否能用於醫療和救護……"
80000092-29 = "於是從大約一週前，我開始收集巧克力。"
80000092-30 = "[s1]「原來如此，聽你這麼一說好像有點道理……」\n[s2]「雖然是救護用品，包裝卻很可愛呢。」"
80000092-33 = "！"
80000092-34 = "那，那是因為……！"
80000092-35 = "那個，該說市面上賣的零食幾乎都包裝成這樣嗎……！"
80000092-36 = "[s3]「啊，是雞蛋造型的巧克力。」\n[s4]「這個裡面有可愛的玩具對吧？」"
80000092-39 = "！！！"
80000092-40 = "或，或許是吧，那個……！"
80000092-41 = "沒錯，這不過是市場調查罷了！#n要確認如果把這麼大的巧克力送給孩子們，會不會因為一口吞下而噎住……！"
80000092-46 = "[ns5]「這個也很可愛。是在白巧克力上用檸檬裝飾嗎？」\n[ns6]「美禰，難道你喜歡可愛的東西嗎？」"
80000092-51 = "……"
80000092-52 = "那，那又如何，有什麼問題嗎！？"
80000092-53 = "就算是我也喜歡漂亮又可愛的東西！"
80000092-54 = "也會想要收集一大堆……！不能有這種想法嗎！？"
80000092-58 = "老師果然也覺得不適合我嗎？明明平常總是一副正經到不行的樣子，卻像這樣……"
80000092-59 = "我，我也很清楚！但是我……！"
80000092-60 = "[s7]「冷靜點，美禰。並沒有不適合你唷。」\n[s8]「可愛就是正義啊！」"
80000092-65 = "……真的嗎？"
80000092-66 = "[s]「嗯，當然囉。」"
80000092-67 = "……"
80000092-68 = "非常抱歉，讓您看見了難以見人的模樣……"
80000092-69 = "……看見我這副模樣的人，老師還是第一個。"
80000092-70 = "既然如此……！"
80000092-82 = "（突然，嘴裡被塞進了某個東西）"
80000092-86 = "（甜味、苦味與香氣一同擴散開來）"
80000092-88 = "情人節快樂！"
80000092-94 = "（美禰留下這句話後，像是逃跑一般不知去向）"
80000092-95 = "（於是便待在房間品嚐著收到的巧克力，等待美禰回來……）"

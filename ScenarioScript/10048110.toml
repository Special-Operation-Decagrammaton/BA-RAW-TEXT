[translation]
10048110-1 = "Epilogue;One-Phrase Clue"
10048110-2 = "Dessert Cafe"
10048110-5 = "Mm...!"
10048110-6 = "Delicious...!"
10048110-7 = "You said it!"
10048110-8 = "[s] \"Fufu, I told you it tasted even better at the cafe!\""
10048110-9 = "Exactly! There's a certain freshness that can't be replicated with takeout."
10048110-10 = "The aroma and aesthetics... The taste is quite multi-faceted."
10048110-11 = "It's unashamedly sweet, but not overwhelming..."
10048110-12 = "Prez, don't you think it's rather selfish for us to be out here enjoying this?"
10048110-13 = "Just think of all the poor Wildhunt girls who can't even have a crumb of this cake?"
10048110-14 = "I think we should consider...adding these items to our offerings."
10048110-15 = "...How can you think of smuggling right now?!"
10048110-16 = "[s] \"She's a true Sales Manager...\""
10048110-17 = "So, Miyo... Does this mean that we can leave Wildhunt as long as we're with Sensei?"
10048110-18 = "Yes. Sensei's taken us on an approved outing, so even the Prefectural Council has to stand down."
10048110-19 = "That's also why Wildhunt Student Reps are allowed to visit Schale."
10048110-20 = "I-In that sense... Thank you, Sensei."
10048110-21 = "We entangled you in our nonsense, and now you've taken us on a field trip to eat dessert..."
10048110-22 = "[s1] \"Since you worked so hard, it's the least I could do!\"\n[s2] \"Sweets solve a lot of things...like low blood sugar!\""
10048110-25 = "Ah, yes. And Miyo is feeling much better now, right?"
10048110-26 = "Nevertheless, I've checked our books, and the total proceeds of this operation are looking very round. As in \"0.\""
10048110-27 = "Don't be silly, Fuyu. Our profits aren't \"0.\" They're negative, considering all our labor, the smoke bombs, the shovel we left somewhere..."
10048110-28 = "Tch..."
10048110-29 = "I thought it was fun! And it was so cool the way Miyo negotiated with the Thiefster!"
10048110-30 = "C-Cool...? M-Me?!"
10048110-31 = "To be honest, I was surprised and impressed."
10048110-32 = "To think that cruel, final trap came out of your sweet little head."
10048110-33 = "Your client tricked us first. They deserved it."
10048110-34 = "It was only right that we paid them back."
10048110-35 = "That's my girl!"
10048110-36 = "Eye for an eye, tooth for a tooth!"
10048110-37 = "See? You're a natural! Miyo's got a real knack for this, right?"
10048110-38 = "Sh-Shut up...!"
10048110-40 = "But Miyo, how did you know it would work? Why didn't people go to the fake one?"
10048110-41 = "That's all because of you, Ritsu."
10048110-42 = "Hmm? Me?"
10048110-43 = "When we first saw the fake version of \"The Love of Purple and Blue Light,\" what did you say?"
10048110-44 = "Uh..."
10048110-46 = "Whoa..."
10048110-47 = "It's pretty."
10048110-49 = "The first thing you said, completely naturally, was \"It's pretty.\""
10048110-50 = "And it was. But the term \"pretty\" is usually reserved for a nice accessory or decoration."
10048110-51 = "It's not what one would normally say when reacting to a masterpiece."
10048110-52 = "...In other words, your inherent eye for aesthetics recognized that the painting was fake."
10048110-53 = "...!"
10048110-54 = "Really?!"
10048110-55 = "So I thought that perhaps other people would have that unconscious discernment, a purity of sight."
10048110-56 = "Additionally, I leveraged that if we hung the forged piece right next to the real one..."
10048110-57 = "...the comparison would make the differences all the more obvious."
10048110-58 = "Like how a stale cookie tastes even worse if you have it with a freshly baked one."
10048110-59 = "That's why I thought to display the two pieces together."
10048110-60 = "To think you plotted all that just from hearing Ritsu say one sentence."
10048110-61 = "I've always said that Lit students have a freaky, sick, perverted side."
10048110-62 = "How is that your conclusion?!"
10048110-63 = "I suppose it's fair for us to celebrate our middling success."
10048110-64 = "...But ultimately, we did all that work for no payment."
10048110-65 = "Ugh... My Cutey Berry 87..."
10048110-66 = "It would be mine, lit perfectly on my desk, if only your client paid us..."
10048110-67 = "Don't fret, Miyo."
10048110-68 = "It's still on the market. And I have a feeling it's not going anywhere."
10048110-69 = "...Honestly, it'll probably be there for years. Who else would buy it?"
10048110-70 = "What...?!"
10048110-71 = "Do not insult my precious Cutey Berry 87...!"
10048110-72 = "It's only available because the world doesn't understand the aesthetics of typewriters yet!"
10048110-73 = "But one day... One day, when people come to understand its beauty, its art, its function...!"
10048110-74 = "...Everyone will regret not snatching it up right now!"
10048110-78 = "[ns] \"...This sounds familiar...\""
10048110-79 = "Yeah! Yeah! I think so too!"
10048110-80 = "So, Fuyu, what's the next job?"
10048110-81 = "I must procure the Cutey Berry 87 while I still can!"
10048110-82 = "And...then, and only then, can the Free Trade Cartel finally disba..."
10048110-83 = "Careful. The kid might hear."
10048110-84 = "Huh? What're we whispering for?"
10048110-86 = "And so, the Free Trade Cartel resumed its important business."
10048110-87 = "To Whom Art Belongs: The Fate of Forgeries and Aesthetics"

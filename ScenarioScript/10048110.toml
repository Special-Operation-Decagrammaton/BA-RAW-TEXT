10048110-12 = "3;후유;10;부장님, 이런 맛을 저희만 즐기는 것은 너무 이기적인 처사 아니겠습니까?\n#3;greeting"
10048110-13 = "3;후유;99;와일드헌트 안의 불쌍한 아이들에게도 이 맛을 즐길 권리가 있어요."
10048110-14 = "3;후유;13;그러니까 이 아이템도 한 번 교역 품목으로 고려해 보시죠?\n#3;em;[음표]"

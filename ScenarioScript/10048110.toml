10048110-56 = "3;미요;03;거기다 위작을 단독으로 걸어 놓는 게 아니라 진품과 함께 걸어 놓으면……\n#3;em;…"
10048110-57 = "3;미요;07;둘 사이의 대비에서 오는 차이점을 발견하기도 훨씬 용이해질 것이다, 라고도 생각했고요."

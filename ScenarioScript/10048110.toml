10048110-16 = "[s] \"과연 타고난 영업 실장님…….\""
10048110-17 = "3;리츠;19;그런데 미요 쨩, 선생님이랑 같이 다니면 이렇게 자유롭게 학원 밖으로도 나올 수 있는 거야?\n#3;em;[?]"
10048110-18 = "3;미요;03;예. 선생님께서 신원 보증을 해주시는 거니까…… 사감대에서도 막지 못해요."
10048110-19 = "3;미요;07;그래서 샬레로 당번 가는 학생들이 나가는 것도 막지 않는 거고요."
10048110-20 = "3;미요;08;그, 그런 의미에서, 감사합니다, 선생님."
10048110-21 = "3;미요;23;저희 때문에 고생하셨는데, 이렇게 데리고 나와서 맛있는 디저트까지 사 주시고…….\n#3;em;[땀]"
10048110-22 = "[s1] \"고생했으니, 당분을 챙기는 게 맞지.\"\n[s2] \"당분은 많은 것을 해결해 준다고!\""

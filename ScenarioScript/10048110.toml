[translation]
10048110-1 = "บทส่งท้าย;เบาะแสเพียงคำเดียว"
10048110-2 = "คาเฟ่ขนมหวาน"
10048110-5 = "อืม...!"
10048110-6 = "อร่อยจัง...!"
10048110-7 = "ฮืมมม...!"
10048110-8 = "[s] \"ฮุฮุ บอกแล้วว่ามากินที่ร้านแล้วอร่อยกว่าเยอะเลย\""
10048110-9 = "ใช่ค่ะ พอได้มากินที่ร้านเองแบบนี้ ถึงได้รู้นะคะว่าอร่อยกว่าตอนที่คุณครูซื้อมาฝากคราวก่อนอีก...!"
10048110-10 = "รสชาติไม่ธรรมดา เรียกว่าซับซ้อนหลายชั้นค่ะ"
10048110-11 = "และถึงปริมาณน้ำตาลจะค่อนข้างสูง แต่ก็ไม่รู้สึกหนักใจหรือรู้สึกผิดกับร่างกายเลย..."
10048110-12 = "หัวหน้า ถ้ามีแต่พวกเราที่ได้ลิ้มรสของอร่อยแบบนี้ มันจะดูเห็นแก่ตัวไปหน่อยหรือเปล่าคะ?"
10048110-13 = "เด็กๆ ที่น่าสงสารในไวลด์ฮันต์ก็มีสิทธิได้ชิมขนมอร่อยๆ จากร้านนี้นะคะ"
10048110-14 = "หัวหน้าลองพิจารณาเพิ่มสินค้านี่ในรายการของเราดูมั้ยคะ?"
10048110-15 = "ในเวลาแบบนี้ยังคิดถึงเรื่องการทำธุรกิจอยู่อีกสินะคะ..."
10048110-16 = "[s] \"เกิดมาเพื่อเป็นหัวหน้าฝ่ายธุรกิจจริงๆ เลยนะ...\""
10048110-17 = "แต่มิโยะจัง ขอแค่เราอยู่กับคุณครู เราก็ออกมานอกโรงเรียนอย่างอิสระแบบนี้ได้เลยเหรอ?"
10048110-18 = "ค่ะ ก็คุณครูจะช่วยรับรองตัวตนของเราให้... ฝ่ายดูแลหอพักก็เลยขวางไว้ไม่ได้น่ะค่ะ"
10048110-19 = "เพราะงั้นนักเรียนที่ไปเข้าเวรที่ชาเล่ต์ก็จะได้รับอนุญาตให้ออกไปได้ค่ะ"
10048110-20 = "ตะ... ต้องขอบคุณด้วยนะคะ คุณครู"
10048110-21 = "คุณครูต้องลำบากเพราะพวกฉันแท้ๆ แล้วยังพาพวกฉันออกมาเลี้ยงขนมอร่อยๆ แบบนี้อีก..."
10048110-22 = "[s1] \"เจอเรื่องยากๆ แล้วก็ต้องเติมของหวานนี่ละ ถูกต้องแล้ว\"\n[s2] \"น้ำตาลช่วยแก้ปัญหาลำบากๆ ได้เยอะเลยนะ!\""
10048110-25 = "ถึงจะลำบากทำงานกัน..."
10048110-26 = "แต่งานนี้ก็ไม่ได้ค่าจ้างเลยสักเยนสินะ"
10048110-27 = "นอกจากไม่ได้แล้วยังติดลบด้วยค่ะ ต้องคิดถึงค่าแรงและค่าระเบิดควันที่เราใช้ไปด้วยสิคะ"
10048110-28 = "อึก..."
10048110-29 = "แต่ฉันก็สนุกกับงานนี้นะ! ตอนมิโยะจังเจรจากับจอมโจรจังในตอนท้ายน่ะ เท่ระเบิดไปเลย!"
10048110-30 = "ทะ... เท่ระเบิดอะไรกัน... ล่ะคะ..."
10048110-31 = "แต่บอกตามตรงว่าฉันประหลาดใจนิดหน่อยนะ"
10048110-32 = "ไม่คิดเลยว่าจะได้ยินคำว่า 'หลอกลูกค้า' จากปากของเธอ"
10048110-33 = "ก็ลูกค้าหลอกพวกเราก่อนนี่คะ"
10048110-34 = "งั้นพวกเราก็ต้องเอาคืนอยู่แล้วสิ"
10048110-35 = "โอ้โห~"
10048110-36 = "หลอกมา หลอกกลับ ไม่โกง!"
10048110-37 = "เห็นมั้ยล่ะ บอกแล้วว่าเธอมีพรสวรรค์ในด้านนี้จริงๆ"
10048110-38 = "งะ... เงียบไปเลยนะคะ...!"
10048110-40 = "ว่าแต่ มิโยะจัง เธอรู้ได้ยังไงเหรอว่าจะมีคนมายืนดูภาพจริงเยอะกว่าภาพปลอมน่ะ?"
10048110-41 = "เรื่องนี้ต้องยกความดีความชอบให้ริตสึจังค่ะ"
10048110-42 = "เอ๋? ฉันเหรอ?"
10048110-43 = "ตอนเห็นภาพปลอมของ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> เป็นครั้งแรก ตอนนั้นริตสึจังพูดว่ายังไง จำได้มั้ยคะ?"
10048110-44 = "อ่า..."
10048110-46 = "โอ้..."
10048110-47 = "สวยอยู่นะ"
10048110-49 = "ริตสึจังเห็นรูปนั้นแล้วพูดว่า 'สวยอยู่นะ' โดยไม่รู้ตัวเลยค่ะ"
10048110-50 = "ถ้าบอกว่า 'สวยอยู่' โดยทั่วไปแล้วจะไม่ได้หมายความว่ามันสวยจริงๆ หรอกค่ะ..."
10048110-51 = "แล้วคำนั้นก็ไม่เหมาะที่จะใช้อธิบายความประทับใจที่มีต่อผลงานอันยิ่งใหญ่ด้วย"
10048110-52 = "สรุปก็คือ... ริตสึจังรับรู้ได้โดยจิตใต้สำนึกว่าภาพที่เห็นในตอนนั้นไม่ใช่ภาพจริง แต่เป็นภาพที่ปลอมแปลงมาค่ะ"
10048110-53 = "...!"
10048110-54 = "งั้นเหรอ?!"
10048110-55 = "ฉันก็เลยลองคิดดูค่ะ ว่าบางทีคนอื่นก็... น่าจะมีความสามารถในการแยกแยะระหว่างของจริง#nกับของปลอมโดยไม่รู้ตัวเหมือนกัน"
10048110-56 = "แล้วถ้าเรายิ่งแขวนภาพปลอมไว้กับภาพจริงละก็..."
10048110-57 = "ฉันว่าน่าจะเปรียบเทียบความแตกต่างของภาพทั้งสองได้ง่ายขึ้นด้วยค่ะ"
10048110-58 = "ก็เหมือนกับอาหารที่ไม่อร่อย พอเอาไปกินพร้อมกับอาหารอร่อยๆ แล้ว กลับยิ่งรู้สึกว่าไม่อร่อยเข้าไปใหญ่เลยน่ะค่ะ"
10048110-59 = "เพราะงั้นฉันก็เลยเสนอให้จัดแสดงภาพทั้งสองไว้ข้างๆ กันค่ะ"
10048110-60 = "คิดไม่ถึงเลยว่าข้อเสนอนี้จะมาจากคำพูดที่ไม่ได้คิดอะไรมากของริตสึจัง..."
10048110-61 = "เด็กเอกวรรณกรรมนี่มีพรสวรรค์แปลกๆ เรื่องการใช้คำจริงๆ ด้วยนะ"
10048110-62 = "นั่นเป็นคำชมหรือเปล่าคะ?!"
10048110-63 = "เอาเถอะค่ะ ถึงตอนจบของเรื่องจะออกมาไม่เลว..."
10048110-64 = "แต่สุดท้ายแล้วเราก็เหนื่อยเปล่า แล้วก็ไม่ได้ค่าจ้างเลยสักเยนเดียวค่ะ"
10048110-65 = "ฮืออ... คิวท์ตี้เบอร์รี่ 87 ของฉัน..."
10048110-66 = "ถ้าเราได้ค่าจ้าง ป่านนี้มันคงมาอยู่บนโต๊ะของฉันแล้ว..."
10048110-67 = "ไม่เป็นไรนะ มิโยะ"
10048110-68 = "ฉันยังเห็นว่ามีวางขายอยู่น่ะ"
10048110-69 = "บอกตามตรง... ฉันว่ามันไม่ขาดตลาดหรอก ใครจะไปซื้อของพรรค์นั้นกัน"
10048110-70 = "ว่าไงนะ...?!"
10048110-71 = "อย่ามาดูถูกคิวท์ตี้เบอร์รี่ 87 ของฉันนะคะ...!"
10048110-72 = "ที่เป็นอย่างนั้น เพราะคนอื่นยังเข้าไม่ถึงสุนทรียศาสตร์ของเครื่องพิมพ์ดีดต่างหากค่ะ!"
10048110-73 = "สักวันหนึ่ง... ถ้าผู้คนสัมผัสถึงความงดงามนั้นได้ละก็!"
10048110-74 = "วันนั้นทุกคนจะเสียดายที่ไม่ได้ซื้อเครื่องพิมพ์ดีดนั้นไว้ค่ะ!"
10048110-78 = "[ns] \"เหมือนครูเพิ่งเจอคนที่พูดอะไรคล้ายๆ แบบนี้มาเลย\""
10048110-79 = "ฉันด้วยๆ! เหมือนเจอคนแบบนี้มาแล้วเลย!"
10048110-80 = "เพราะงั้นก็รีบหาลูกค้าคนใหม่มาเดี๋ยวนี้เลยค่ะ!"
10048110-81 = "ไม่ว่ายังไง ฉันก็ต้องเป็นเจ้าของคิวท์ตี้เบอร์รี่ 87 ให้ได้!"
10048110-82 = "แล้วหลังจากนั้นค่อยยุบชมรมการค้าพิเศษ..."
10048110-83 = "เดี๋ยวเหอะ ริตสึฟังอยู่นะ"
10048110-84 = "หืม? พูดถึงเรื่องอะไรกันเหรอ?"
10048110-86 = "(แล้วชีวิตประจำวันของชมรมการค้าพิเศษก็ดำเนินต่อไป)"
10048110-87 = "ศิลปะเพื่อใครบางคน ~ร่องรอยของงานศิลป์เลียนแบบและสุนทรียศาสตร์~"

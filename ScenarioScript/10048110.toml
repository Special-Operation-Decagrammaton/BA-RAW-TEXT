[translation]
10048110-1 = "尾聲;一句話的線索"
10048110-2 = "甜點咖啡廳"
10048110-5 = "嗯～～！"
10048110-6 = "好好初哦……！"
10048110-7 = "啊嗯……！"
10048110-8 = "[s]「呵呵，果然還是直接來店裡比較好吃吧？」"
10048110-9 = "是啊，確實比上次老師帶回來給我們的好吃很多……！"
10048110-10 = "味道豐富又具有層次感。"
10048110-11 = "明明甜度很高卻一點也不膩……"
10048110-12 = "部長，這麼好吃的東西只有我們能享受的話，不是很自私嗎？"
10048110-13 = "狂獵裡可憐的孩子們，也有享受美味的權利。"
10048110-14 = "所以我們也把這個納入交易的品項吧？"
10048110-15 = "……怎麼連這種時候都在想走私的事啊。"
10048110-16 = "[s]「不愧是天生的營業室長……」"
10048110-17 = "話說美代醬，只要跟老師一起就能自由地到校外來嗎？"
10048110-18 = "嗯。因為有老師做身分的擔保……就連舍監隊也無法阻止。"
10048110-19 = "那些去夏萊值班的學生，也是因為這樣才得以外出。"
10048110-20 = "所以……非常謝謝你，老師。"
10048110-21 = "我們明明讓老師這麼辛苦，老師卻還招待我們出來吃好吃的東西……"
10048110-22 = "[s1]「既然覺得辛苦就該補充點糖分。」\n[s2]「糖分能解決很多問題哦！」"
10048110-25 = "辛苦啊……"
10048110-26 = "撇開辛不辛苦不談，這次作戰的總收益變成0元了呢。"
10048110-27 = "什麼0元，根本是負數吧。#n我們的人力成本和煙霧彈的費用都不用算嗎？"
10048110-28 = "嗚……"
10048110-29 = "不過我還是玩得很開心唷！#n美代醬最後跟怪盜醬談判的樣子超帥的！"
10048110-30 = "哪，哪有帥啦……"
10048110-31 = "不過我確實嚇了一跳哦。"
10048110-32 = "我萬萬沒想到，居能能從你嘴裡聽見「欺騙委託人」這種話。"
10048110-33 = "誰叫那個委託人要先欺騙我們。"
10048110-34 = "我們當然也要還以顏色才行。"
10048110-35 = "哦哦～"
10048110-36 = "以牙還牙，以眼還眼！"
10048110-37 = "你看，我就說你很有這方面的才能吧？"
10048110-38 = "你，你少囉嗦……！"
10048110-40 = "不過美代醬，你是怎麼知道人們會聚集到真跡前面的啊？"
10048110-41 = "這都是託律醬的福哦。"
10048110-42 = "咦？我？"
10048110-43 = "還記得第一次看見《誰會喜愛紫與藍》的贗品時，律醬你說了什麼嗎？"
10048110-44 = "唔嗯……"
10048110-46 = "哦哦……"
10048110-47 = "好漂亮。"
10048110-49 = "律醬在看見那幅畫的時候，不經意地說出了「好漂亮」這句話。"
10048110-50 = "而「漂亮」這個詞，通常是用來形容飾品或裝飾物……"
10048110-51 = "不過作為親眼看見偉大作品時的感想，其實並不是很恰當。"
10048110-52 = "……也就是說，律醬你已經在無意間察覺到那幅畫是贗品了。"
10048110-53 = "……！"
10048110-54 = "是這樣嗎！？"
10048110-55 = "所以我就在想……或許其他人也有在無意間分辨真跡和贗品的能力。"
10048110-56 = "而且如果不是單獨掛上贗品，而是將其與真跡並排展出……"
10048110-57 = "藉由兩者之間的對比，察覺差異的難度就會大幅降低。"
10048110-58 = "就像難吃的食物要是跟好吃的食物一起吃，就會顯得更難吃一樣。"
10048110-59 = "所以我才會提議要把兩幅畫一起掛上。"
10048110-60 = "居然能從律醬隨口說出的一句話聯想得這麼遠……"
10048110-61 = "果然文學少女都有變態的一面啊。"
10048110-62 = "為什麼會得出這種結論啊！？"
10048110-63 = "總之，雖然結果不算太差……"
10048110-64 = "……可是明明辛苦了那麼久，卻連一毛委託費都拿不到。"
10048110-65 = "嗚嗚嗚……我的CutieBerry87……"
10048110-66 = "要是拿到委託費的話，現在應該早就擺在我桌上了……"
10048110-67 = "你不用擔心啦，美代。"
10048110-68 = "那東西現在還有庫存。"
10048110-69 = "……老實說這也是理所當然的事。#n到底誰會買那種東西啊。"
10048110-70 = "你說什麼……！？"
10048110-71 = "請不要侮辱我的CutieBerry87好嗎……！"
10048110-72 = "人們只是還無法理解打字機的美學而已！"
10048110-73 = "總有一天……總有一天，人們一定會理解它的美麗之處！"
10048110-74 = "到時候沒買的人肯定都會後悔的知道嗎！？"
10048110-78 = "[ns]「……總覺得好像不久前才聽人說過類似的話。」"
10048110-79 = "我也是我也是！好像在哪裡聽過的樣子！"
10048110-80 = "所以快把下一個走私的案子帶回來吧！"
10048110-81 = "我無論如何都要把CutieBerry87弄到手！"
10048110-82 = "然後在那之後就把特殊交易部給解散……"
10048110-83 = "喂喂喂，會被律醬聽到的啦。"
10048110-84 = "嗯？聽到什麼？"
10048110-86 = "（就這樣，特殊交易部的日常再次開始運轉）"
10048110-87 = "為了誰而存在的藝術～偽畫與美學的去向～"

90100105-49 = "1;오토기;99\n5;쿠루미;01\n#na;오토기;그렇게 총알을 쏟아부었는데도 탄흔 하나 없이 멀쩡한 현장을 보고 있으니, 정말 허깨비에게 홀린 기분이네.\n#1;h\n#4;hide"

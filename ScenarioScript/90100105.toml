[translation]
90100105-5 = "Aサイト、クリア。"
90100105-11 = "Bサイト、クリア。"
90100105-17 = "ターゲットの無力化を確認……「草原」も、もう見えなくなったみたい。"
90100105-21 = "確認。作戦終了。現時刻をもって灯火管制を解除する。"
90100105-27 = "[ns] \"みんな、無事？\""
90100105-28 = "はい、全員どこも怪我なく無事です。先生も大丈夫でしたか？"
90100105-29 = "[s1] \"私はちょっと離れて指揮してたから。\"\n[s2] \"かすり傷ひとつないよ。\""
90100105-37 = "それにしても、先生の戦闘支援を受けるの初めてだったけど……流石だね。"
90100105-38 = "分かる。偵察ドローン……いや、もっと高いところから見守られてるみたいだった。"
90100105-39 = "おかげで、いつもより早く状況をまとめられた気がします。ありがとうございます。"
90100105-40 = "生徒の才能を誰より早く見抜いて、適材適所に配置する――#n先生の噂は誇張ではなかったようですね。"
90100105-41 = "後輩が先生の指揮を信頼する理由を、改めて実感しました。"
90100105-42 = "[s] \"SRTのベテランにそう言われると照れるな……。\""
90100105-46 = "[ns] \"これで、くねくねは消えたのかな？\""
90100105-47 = "おそらくは。陽炎の観測を続けていますが、もう何の反応もありません。"
90100105-48 = "これで[ruby=ロア]特異現象[/ruby]が完全に消えてくれたならいいんですが……。"
90100105-49 = "にしてもやっぱり、弾痕ひとつ残ってないんだねぇ。#nあれだけ撃ったのに……ほんと、幻に踊らされた気分。"
90100105-50 = "でも、思いっきり撃ちまくったら、ちょっとスッキリしたかも。#n実体があるかどうかもわからない相手に、体力だけ消費するのが一番最悪。"
90100105-51 = "帳簿に載ってない実弾が武器庫から出てきた時みたいに？"
90100105-52 = "そうそう。あの時は、どう処理するか本気で悩んで――"
90100105-53 = "2人とも、それ何の話？"
90100105-54 = "な、なんでもない！"
90100105-55 = "え、えっと、例え話だよ……あはは！"
90100105-61 = "それはそうとして――あそこの床に散らばってるガラス片は、どこから落ちてきたんだ？"
90100105-62 = "たしかに。この近くにガラスの構造物なんてないのに。"
90100105-63 = "も、もしかして、くねくねからこぼれ落ちたとか……？"
90100105-64 = "どれどれ――"
90100105-68 = "ちょっと！FOX4！！"
90100105-70 = "うわ……なにこれ。中で変な色の光が揺れてるんだけど。"
90100105-71 = "ちょ、気をつけてって言ったでしょ！？#nそんなの拾って、惑わされたらどうすんの！"
90100105-72 = "ごめんごめん。"
90100105-73 = "でもクルミが見ててくれるなら大丈夫かなって、つい。"
90100105-74 = "ずっと見張ってられるわけじゃないんだけど！？"
90100105-75 = "これ……映ってるの、どこかの景色じゃないかな？"
90100105-76 = "言われてみれば、なんか見覚えあるような……。"
90100105-78 = "あ、「くねくね」がいた草原だ。"
90100105-79 = "これは見ても平気っぽいね。"
90100105-80 = "ほんとかしら？どっちみち、ずっと見てたいものじゃないわよ。色も気持ち悪いし、揺れてるし。"
90100105-81 = "別世界の景色を映すガラス片、か。"
90100105-82 = "[ruby=オ     ー     パ     ー     ツ]理論上は存在しえない物[/ruby]に近しい物なのかもしれないな。"
90100105-83 = "そういえば、連邦生徒会長がこういう物を集めてたよね。"
90100105-84 = "じゃあこれも持ってく？"
90100105-85 = "[s] \"この破片は……。\""
90100105-86 = "何か、心当たりでも？"
90100105-88 = "この世界は昨夜、唐突に変貌しました。[ruby=黒い羽]矛盾[/ruby]はまだ世界の各地に散らばっています。"
90100105-89 = "調査し、収集し、記録してください。"
90100105-91 = "[ns3] （まさか、このガラスの欠片が……）\n[ns4] （……オーウェルが言っていた矛盾の証拠……？）"
90100105-95 = "このガラスの欠片は、先生に預かっていただきたいです。"
90100105-96 = "[s] \"会長に報告しなくて大丈夫？\""
90100105-97 = "……ええ。今は、まだ。"
90100105-98 = "小骨が喉に刺さったような違和感も……情報を集めていけば、#nいずれは正体に辿り着く日が来るはずです。"
90100105-99 = "それまでは先生に判断を委ねたいのです。"
90100105-100 = "[s] \"分かった。預かっておくね。\""
90100105-101 = "はい。では、これで――"
90100105-106 = "……失礼いたしました。"
90100105-107 = "あー、私も緊張してたせいか、急にお腹すいた～"
90100105-108 = "そうだね。いなり寿司を包んでくればよかった。"
90100105-109 = "えー、この暑さじゃすぐ傷むでしょ？"
90100105-110 = "近くで適当に食べて帰ろうよ。"
90100105-111 = "でも持ち合わせが……現金は無いし、SRTの時のIDカードも使えないし……。"
90100105-113 = "[ns] \"ここは大人の出番かな？\""
90100105-115 = "[ns] \"私がなんでもご馳走してあげよう！\""
90100105-116 = "それなら、私は駅前のきつねうどんを――"
90100105-117 = "せっかくのチャンスなのよ？あそこのうどん、500円くらいでしょ？"
90100105-118 = "こういう時は高いもの……そう、ダブルカツ丼定食とか！"
90100105-119 = "高いもので思い浮かぶのがダブルカツ丼って。"
90100105-120 = "先生、前に連れてってくれた焼肉屋でもいいの？"
90100105-121 = "この前は食べ損ねたシマチョウがずっと気になっててさ。"
90100105-122 = "[s] \"もちろん！\""
90100105-127 = "あ、あの、そこまでしていただかなくても……。"
90100105-128 = "[s5] \"迷惑だなんて思わなくていいよ。\"\n[s6] \"子どもをちゃんと食べさせるのは大人の義務だから。\""
90100105-135 = "……やはり、生徒の扱いがお上手ですね。"
90100105-136 = "では今回も、よろしくお願いします。"
90100105-138 = "（その後、あの焼肉屋での打ち上げは、楽しい時間になった）"
90100105-140 = "次回;不可解"

201010-4 = "3;통신아오이;01\n#3;a\n#wait;1500"
201010-5 = "3;통신아오이;02;선생님, 오랜만이야."
201010-6 = "3;통신아오이;99;아니…… 오랜만은 아닌가. 어제도 총학생회에 보고할 잡무를 확인하기 위해 샬레에 찾아왔으니."
201010-7 = "[s1] “오랜만이야, 아오이 쨩!”\n[s2] \"아오이 님의 연락을 기다리며 정좌대기 중이었습니다.\""
201010-8 = "#wait;10"
201010-9 = "#wait;10"
201010-10 = "#st;[0,0];instant;1;"
201010-11 = "#clearST"
201010-12 = "3;통신아오이;02\n#3;em;[...]\n#wait;2500"
201010-13 = "3;통신아오이;07;……선생님은 정말 학생들을 대하는 데 스스럼이 없구나. 아니면 주변의 시선을 신경 쓰지 않는다고 해야 할지."
201010-14 = "3;통신아오이;01;여하튼 오늘 연락을 한 이유는 총학생회의 일 때문은 아니야."
201010-15 = "3;통신아오이;02;굳이 따지자면 사적인 부탁에 가깝긴 한데……"
201010-16 = "3;통신아오이;02;거두절미하고, 이번 주말에 시간 괜찮아?\n#3;em;[?]"
201010-17 = "[s] \"그거 설마…… 데이트 신청?\""
201010-18 = "3;통신아오이;05;………."
201010-19 = "3;통신아오이;05;………."
201010-20 = "3;통신아오이;06;……….\n#3;stiff"
201010-21 = "3;통신아오이;06;……실례. 역시 다른 사람을 찾아보는 게 나을 것 같네.\n#3;em;[한숨]"
201010-22 = "[s3] \"자, 잠깐만 기다려줘!\"\n[s4] \"무슨 일인지는 말해줘도 괜찮잖아?\""
201010-23 = "#wait;10"
201010-24 = "#wait;10"
201010-25 = "3;통신아오이;05;하아…… 이번 만이니까. 진지하게 들어줘.\n#3;em;[속상함]"
201010-26 = "3;통신아오이;02;린 선배…… 아니, 수석행정관 말이야."
201010-27 = "3;통신아오이;02;최근 조금 무리하고 있는 것 같아."
201010-28 = "3;통신아오이;01;물론 총학생회장이 실종된 이후로 수석행정관은 계속 격무에 시달리긴 했지만, 그래도 요즘은 정신적으로 더 지친 것 같아.\n#3;em;[반응]"
201010-29 = "3;통신아오이;02;평소라면 하지 않았을 보고서의 양식 누락도 잦아졌고, 피부도 눈에 띄게 거칠어진 것 같아."
201010-30 = "3;통신아오이;01;건강 문제는 차치하더라도 총학생회의 원활한 운영을 위해서라도 그녀를 내버려 둘 수는 없어서."
201010-31 = "[s] \"최근 총학생회에 일감이 많은 편이야?\""
201010-32 = "3;통신아오이;07;아니, 총학생회의 업무는 오히려 전보다 줄어든 편이야."
201010-33 = "3;통신아오이;05;재무지표상으로는 총학생회장이 있었을 때의 70%까지 지표를 회복하였으니까.\n#3;em;[...]"
201010-34 = "3;통신아오이;06;……다만, 행정관은 그것 만으로는 만족할 수 없었나봐."
201010-35 = "3;통신아오이;07;지난 쿠데타 이후로 [ruby=초인]총학생회장[/ruby]에 버금가는 성과를 보여주지 못하면 언제든 다시 위기가 닥칠 수 있다고 생각했는지, 좀처럼 쉬려고 하질 않아서 말이야."
201010-36 = "3;통신아오이;07;벌써 몇주째 휴일에도 계속 집무실에 나와 일을 처리하고, 다른 임원들이 쉬라고 해도 좀처럼 듣질 않더라고."
201010-37 = "3;통신아오이;05;그러니 [USERNAME] 선생님께 부탁할게.\n#3;greeting"
201010-38 = "3;통신아오이;02;샬레의 직권을 써서라도 이번 주말은 선배를 어딘가 좀 쉴만한 장소로 데려가줘."
201010-39 = "#all;hide"
201010-40 = "#all;hide"
201010-41 = "#place;총학생회 수석행정관 집무실"
201010-42 = "[ns5] \"그런 의미에서……\"\n[ns6] \"휴식이야, 린 쨩!\""
201010-43 = "3;린;02;휴식…… 말입니까?\n#3;em;[?]\n#3;a"
201010-44 = "3;린;06;누가 린 쨩입니까.\n#3;em;[한숨]\n#3;a"
201010-45 = "3;린;01;그보다 휴식…… 말입니까."
201010-46 = "3;린;02;휴식이라면 괜찮습니다. 수면도 6시간 이상 취하고 있고, 식사도 거르지 않고 있으니까요."
201010-47 = "3;린;01;업무에 지장이 없도록 건강 관리에는 만전을 다하고 있으니, 제 일정에 대해서는 걱정하실 필요가 없습니다."
201010-48 = "#st;[0,0];instant;1;"
201010-49 = "#clearST"
201010-50 = "3;린;01\n#3;d\n#wait;1000"
201010-51 = "3;아오이;07;하지만 실제로 업무에 지장이 생기고 있는 걸.\n#3;a\n#3;em;[반응]"
201010-52 = "3;아오이;07;어제 수석행정관이 공유한 사후 안전관리 보고서만 보더라도, 목차 순서의 반괄호가 양괄호 다음에 오게 정리되어 있어."
201010-53 = "3;아오이;05;평소라면 놓치지 않았을 실수라고 생각하는데…… 컨디션이 나빠진 거 아냐?"
201010-54 = "[s] \"……그게 그렇게 큰 문제야?\""
201010-55 = "3;아오이;02;물론이야. 목차의 양식이 뒤바뀌면 범주의 정의도 달라질 수 있으니까."
201010-56 = "3;아오이;01;어떤 형태든 양식을 준수하는 건 공문서 작성의 기본이야."
201010-57 = "1;린;06;……죄송합니다. 문서를 공유하기 전에 미처 확인하지 못한 것 같네요.\n#1;em;[땀]\n#1;a\n#3;m5"
201010-58 = "1;린;01;다음번에는 이런 일이 없도록 더 면밀히 보고서를 검토하겠습니다."
201010-59 = "3;아오이;05;아니, 행정관에게 지금 필요한 건 휴식이야.\n#3;m4"
201010-60 = "3;아오이;07;벌써 한달 가까이 휴일 없이 업무에만 몰두하고 있잖아. 매일 같은 업무만 반복하고 있으니 집중력이 떨어질 만도 하지."
201010-61 = "3;아오이;07;이번 분기 재무보고서의 제출 기한은 다음주까지 미루어줄테니, 이번 주말은 푹 쉬도록 해."
201010-62 = "1;린;01;……아까도 말씀드렸지만, 제게 휴식은 필요없습니다.\n#1;em;[반응]"
201010-63 = "3;아오이;07\n1;린;99;모두가 밤낮으로 노력해 준 덕분에 파괴된 기반 시설들도 대부분 복구되었지만, 여전히 많은 시민들이 총학생회의 행정력에 의심의 눈초리를 보내고 있습니다.\n#1;m3\n#3;d"
201010-64 = "1;린;01;이런 시기에 조금이라도 여유를 부렸다가는, 사회의 혼란을 획책하는 자들이 그 허점을 파고들지도 모릅니다."
201010-65 = "[s] \"하지만 린이 그 모든 일을 떠맡을 필요는 없어.\""
201010-66 = "1;린;05;……총학생회장이라면 그랬을 겁니다.\n#1;em;[...]"
201010-67 = "1;린;02;저는 수석행정관이기 이전에 총학생회장의 권한을 위임 받은 대행. 그녀의 부재하에서 벌어지는 모든 문제는 제 책임입니다."
201010-68 = "1;린;01;하지만 저는 특별한 재주를 갖추지 못한 범재. 범재가[ruby=총학생회장] 천재를[/ruby] 따라갈 수 있는 방법은 꾸준하고 성실한 노력뿐입니다.\n#3;hide"
201010-69 = "3;아오이;07;선배……\n#1;hide"
201010-70 = "3;린;99;게다가 이번 주말에는 선약이 있습니다. 트리니티 자치구에서 티파티의 주요 임원들과 미팅이—"
201010-71 = "3;린;99\n#na;아유무;그, 그 건은 제게 맡겨주세요!"
201010-72 = "#st;[0,0];instant;1;"
201010-73 = "#clearST"
201010-74 = "3;린;02\n#3;em;[?]\n#3;h\n#wait;1300"
201010-75 = "3;린;02;아유무……?"
201010-76 = "#st;[0,0];instant;1;"
201010-77 = "#clearST"
201010-78 = "#wait;1700"
201010-79 = "3;린;02\n5;아유무;02\n#5;a\n#3;m1\n#3;h\n#5;h\n#wait;1000"
201010-80 = "5;아유무;01;안 그래도 이번 주 주말에는 조정실의 업무 차 트리니티 자치구에 다녀올 계획이었거든요.\n#5;em;[반응]"
201010-81 = "5;아유무;02;그…… 이번 미팅의 주요 안건은 트리니티 자치구 내에서 체포된 게헨나 학생들의 신병 처리에 관한 문제였었죠?"
201010-82 = "5;아유무;10;이 문제에 대해서는 게헨나 선도부장으로부터 권한을 위임 받았으니, 선배는 안심하고 휴일을 즐겨주세요!\n#5;jump"
201010-83 = "3;린;99;그렇다면 트리니티 자치구에 다녀올 필요는 없겠지만……"
201010-84 = "3;린;02;그 외에도 처리해야 하는 업무는 또 있습니다. 카네사키 향으로 향하는 물류가 병목되어 소비재 운송에 문제가—"
201010-85 = "#all;hide"
201010-86 = "3;모모카;01;그거, 사흘 전에 있었던 열차 탈선 사고 때문에 생긴 문제지? 그 문제는 내가 열차 다이어를 조정해서 해결했으니까 신경쓰지 않아도 괜찮아.\n#3;em;[?]"
201010-87 = "3;모모카;08;이번 주 토요일에는 새로운 맛의 감자칩이 발매될 예정이라는데…… 주중에 처리하지 못한 일 때문에 휴일 근무를 할 수는 없지.\n#3;stiff"
201010-88 = "#st;[0,0];instant;1;"
201010-89 = "#clearST"
201010-90 = "3;린;09\n#3;em;[한숨]\n#wait;1500"
201010-91 = "3;린;08;……다들, 정말 약속이라도 하신 것처럼 동시에 일을 덜어가 주셨군요."
201010-92 = "3;린;99;그렇게 신경을 써 주시는데 쉬지 않는 것도 마음에 걸리니……"
201010-93 = "3;린;01;알겠습니다. 이번 주말은 느긋하게 휴일을 보내도록 하지요.\n#3;greeting"
201010-94 = "5;아유무;08;하지만…… 지난 번에도 그렇게 말씀하시고선, 숙소에서 서류 업무를 하셨었잖아요?\n#5;a\n#5;em;[땀]"
201010-95 = "1;아오이;07;모처럼의 휴일을 그렇게 낭비하도록 두고 볼 수는 없지.\n#1;a"
201010-96 = "1;아오이;07\n3;린;01\n5;아유무;08\n#1;h\n#3;h\n#5;h"
201010-97 = "[ns] \"그러니까 이번 주말은 함께 데이트야, 린 쨩!\""
201010-98 = "1;아오이;07\n3;린;10\n5;아유무;08\n#na;린;누가 린 쨩입니까. 그리고 뭐가 데이틋—\n#3;h\n#3;shake\n#1;dl\n#5;dr"
201010-99 = "#st;[0,0];instant;1;"
201010-100 = "#clearST"
201010-101 = "3;린;31\n#3;shake\n#3;em;[?!]\n#wait;1300"
201010-102 = "3;린;28;……실례. 한 번에 두 가지를 동시에 지적하려다 보니 혀가 꼬이고 말았군요.\n#3;em;[///]"
201010-103 = "3;린;26;정말이지, [USERNAME] 선생님께서는 그런 남사스러운 말을 눈 하나 깜짝 안 하고 하시는군요. "
201010-104 = "3;린;25;설마 다른 학생들에게도 그렇게 말씀하고 다니시는 건 아니시겠지요."
201010-105 = "[s7] \"학생마다 대하는 방법은 조금씩 다르지만……\"\n[s8] \"린은 좀 더 어깨에 들어간 힘을 푸는 게 좋을 것 같아서.\""

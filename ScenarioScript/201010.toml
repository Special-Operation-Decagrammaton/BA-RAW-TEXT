201010-112 = "3;린;01;알겠습니다. 그럼 이번 휴일은 선생님과 동행하도록 하지요."
201010-113 = "3;린;02;안 그래도 선생님께서 휴일에 어떻게 여가를 보내시는 지 확인해보려던 참이어서."
201010-114 = "[s] \"내 여가생활……?\""
201010-115 = "3;린;12;들리는 소문에 의하면 휴일에 자판기 밑을 뒤지거나, 길 한복판에 누워 볕을 쬐고 있는 선생님의 모습을 본 학생들이 있다고 합니다만……"
201010-116 = "3;린;12;뭔가 짚이는 점은 없으신지요."
201010-117 = "[s9] \"그, 글쎄……\"\n[s10] \"부풀려진 소문에 불과하지 않을까……\""
201010-118 = "#wait;10"
201010-119 = "#wait;10"
201010-120 = "3;린;05;그렇다면 다행입니다만……"
201010-121 = "3;린;99;여하튼 선생님께서도 일정이 없으시다면, 이번주 토요일 아침. 총학생회 건물 앞에서 뵙겠습니다."

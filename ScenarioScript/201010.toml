[translation]
201010-1 = "第1話;首席行政官の休日（１）"
201010-5 = "久しぶりね、先生。"
201010-6 = "……いえ、昨日シャーレで会ったばかりだったわね。"
201010-7 = "[s1] \"久しぶり！アオイちゃん！\"\n[s2] \"アオイ様のご連絡を心よりお待ちしておりました。\""
201010-13 = "……先生の態度には毎度驚かされるわね。#n周囲の目は気にならないのかしら？"
201010-14 = "まぁいいわ。#n今日連絡したのは連邦生徒会としてではなく――"
201010-15 = "そうね……プライベートなお願い、と思ってもらって構わないわ。"
201010-16 = "今週末、少し時間を頂けないかしら？"
201010-17 = "[s] \"もしかして……デートのお誘い？\""
201010-18 = "……。"
201010-19 = "……。"
201010-20 = "………………。"
201010-21 = "……他を当たるわ。"
201010-22 = "[s3] \"ちょっ、ちょっと待って！\"\n[s4] \"話くらい聞かせてよ！\""
201010-25 = "……次はないわ。"
201010-26 = "リン先輩……いえ、リン行政官のことなのだけど。"
201010-27 = "少し無理がたたっているみたいなの。"
201010-28 = "以前からその兆候は見えていたけど……最近は特に酷いわ。"
201010-29 = "普段なら絶対しないようなミスも増えて、肌も荒れていってボロボロ……。"
201010-30 = "生徒会の円滑な運営のためにも、そんな状態の彼女を放っておくわけにはいかないの。"
201010-31 = "[s] \"仕事が増えてるの？\""
201010-32 = "いえ、これでも減ったほうよ。"
201010-33 = "それに、リン行政官のおかげで財政状況も全盛期の7割程度まで戻ってきたわ。"
201010-34 = "……でも、あの人はそれでは満足できなかったみたい。"
201010-35 = "クーデターがあってから、なかなか休もうとしないのよ。#nおおかた、[ruby=超人]連邦生徒会長[/ruby]のようにならなければとでも思っているのでしょう。"
201010-36 = "もう数週間も働きっぱなしで……#n他の役員が言っても聞かないのよ。"
201010-37 = "だから[USERNAME]先生にお願い――"
201010-38 = "どんな手段を使っても構わないわ。#n今週末こそ先輩に仕事をさせないで。"
201010-41 = "連邦生徒会・首相行政官の執務室"
201010-42 = "[ns5] \"やったね！一緒にお休みだよ！\"\n[ns6] \"リンちゃん、リンちゃん！お休みだって！\""
201010-43 = "お休み……ですか？"
201010-44 = "誰が「リンちゃん」ですか。"
201010-45 = "ところで、お休み……といいましたか？"
201010-46 = "私には必要ありません。#n睡眠も食事も足りています。"
201010-47 = "業務に支障をきたさないよう、健康には細心の注意を払っています。#n心配されるようなことはないかと。"
201010-51 = "そう思っているのはあなただけよ。"
201010-52 = "昨日の書類、半角と全角が混ざっていたわ。"
201010-53 = "疲れているのではなくて？#nあなた、普段こんなこと絶対しないでしょう？"
201010-54 = "[s] \"……それってそんなに大事なの？\""
201010-55 = "ええ、もちろん。"
201010-56 = "例外を認めてはいけないわ。#nそれが公文書というものよ。"
201010-57 = "……申し訳ありません。提出前に確認すべきでした。"
201010-58 = "再発防止のために今後はより一層気を引き締めて――"
201010-59 = "いえ、いま行政官に必要なのは休息よ。"
201010-60 = "もう1ヶ月近く休まず働いているでしょう？#n集中力が落ちるのも仕方ないわ。"
201010-61 = "今期の財務報告書の締切は来週まで延ばすから、今週末はゆっくり休んで。"
201010-62 = "……先程も申し上げた通り、休息は不要です。"
201010-63 = "皆さんの尽力のおかげで、施設はほとんど復旧しました。#nですが、連邦生徒会に対する市民の不信感はいまだ拭いきれていません。"
201010-64 = "そんな中、少しでも隙を見せてしまえば、そこを突こうとする輩が現れるでしょう。"
201010-65 = "[s] \"でも、リンがすべての業務を担う必要はないんじゃない？\""
201010-66 = "……連邦生徒会長ならこうしていたはずです。"
201010-67 = "私は行政官である以前に、連邦生徒会長から権限を委任された代行。#n彼女が不在の間に起きたすべての責任は、私にあります。"
201010-68 = "ですが……私は凡人です。[ruby=天才]連邦生徒会長[/ruby]との溝を埋めるには、絶えず努力をするしかありません。"
201010-69 = "先輩……。"
201010-70 = "それに今週末は先約があります。#nトリニティ自治区でティーパーティーの主要メンバーとミーティングが――"
201010-71 = "そ、その件は私に任せてください！"
201010-75 = "アユム……？"
201010-80 = "その……今回のミーティングは、トリニティ自治区内で逮捕されたゲヘナ生の身柄をどう取り扱うか、ですよね？"
201010-81 = "この件に関して、ゲヘナ風紀委員長から委任を受けています。"
201010-82 = "も、もともと調停室の仕事でトリニティを訪れる予定でしたので。#n私に任せて、先輩は休日を楽しんでください！"
201010-83 = "それであればトリニティを訪れる必要はなくなりますが……。"
201010-84 = "やるべきことは他にもあります。#n鐘崎港の物流が滞っていて、輸送に問題が――"
201010-86 = "それ、3日前にあった脱線事故のせいでしょ？#n私が列車のダイヤを調整して解決しておいたから、気にしなくていいよ。"
201010-87 = "限定ポテチが週末に出るからさ～#n休日出勤したくないんだよね。"
201010-91 = "皆さん……。"
201010-92 = "……これで休まない、というわけにはいかなくなりましたね。"
201010-93 = "分かりました。今週末は休養に充てましょう。"
201010-94 = "ですが……この前もそう言って、寮で事務仕事をされていましたよね？"
201010-95 = "あなたにはしっかりと休んでもらわないといけないの。"
201010-97 = "[ns] \"だから今週末は一緒にデートだよ、リンちゃん！\""
201010-98 = "誰がデートで――"
201010-102 = "……失礼。誰がリンちゃんですか。それに、何がデートですか。"
201010-103 = "軽々しく口にして恥ずかしくないのですか？"
201010-104 = "それとも、他の生徒にも同じように接しているのですか……？"
201010-105 = "[s7] \"生徒によってまちまちだけど……。\"\n[s8] \"リンには、肩の力を抜いてほしいから。\""
201010-111 = "……はぁ。"
201010-112 = "分かりました。では、今週末は先生と過ごしましょう。"
201010-113 = "先生の休日の過ごし方を確認したいとも思っていましたので。"
201010-114 = "[s] \"え、どうして……？\""
201010-115 = "自販機の下を漁っている。道の真ん中で日向ぼっこをしている……と。#n噂になっていまして。"
201010-116 = "何か心当たりはありませんか？"
201010-117 = "[s9] \"さ、さあ……。\"\n[s10] \"あくまで噂だからね……。\""
201010-120 = "そうですか……であれば良いのですが。"
201010-121 = "では、土曜日の朝、連邦生徒会の建物の前で待ち合わせでお願いします。"
201010-126 = "それと最後に――"
201010-127 = "デートではありませんからね。"
201010-129 = "次回;首席行政官の休日（２）"

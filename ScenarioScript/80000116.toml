80000116-101 = "3;마코토 드레스;15;……이게 대체…… 어째서? 배터리 과열로 인한 머신의 폭주……? \n#3;a\n#3;stiff\n#3;em;[속상함]"
80000116-102 = "3;마코토 드레스;14;선생이 오기 전에 5시간이나 넘게 리허설을 했던 것이 문제인가?"
80000116-103 = "3;마코토 드레스;06;아니면…… 나의 위엄을 알리기 위해, 기존 머신의 출력을 내 마음대로 5배 정도 업그레이드한 쪽이……?"
80000116-104 = "[s5] \"폭주하는 것도 당연해 보이는 이유들이네!\"\n[s6] \"그보다 마코토…… 괜찮아?!\""

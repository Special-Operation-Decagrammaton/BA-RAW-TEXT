80000116-106 = "#wait;100"
80000116-107 = "3;마코토 드레스;16;크, 크큭…… 크큭……"
80000116-108 = "3;마코토 드레스;03;아아, 이건 아무것도 아니야."
80000116-109 = "3;마코토 드레스;10;초콜릿 방울이 조금 튄 것 정도로 호들갑 떨 필요는 없다."
80000116-110 = "[s] \"조금 정도가 아니긴 한데…… 드레스 밑단까지 흠뻑 젖었고.\""
80000116-111 = "3;마코토 드레스;05;아니! 괜찮고말고! 이 마코토 님이 고작 초콜릿 분수를 뒤집어쓴 것 정도로 타격을 받을 리 있겠나!\n#3;jump\n#3;em;[!]"
80000116-112 = "3;마코토 드레스;00;오히려 방금 초콜릿을 뒤집어쓰는 것으로 확실해진 게 하나 있을 정도지!"

[translation]
80000116-1 = "ของขวัญที่สมฐานะ"
80000116-2 = "(คุณครูได้รับการติดต่อจากมาโคโตะในเช้าของวันวาเลนไทน์) "
80000116-7 = "หึหึหึ วันนี้เป็นวันวาเลนไทน์..."
80000116-8 = "วันแห่งการมอบช็อกโกแลตสื่อรักของเหล่าเพื่อน คนรัก และคนรู้จัก..."
80000116-9 = "ถึงจะมีประเด็นว่าทั้งหมดนั่นเป็นแผนการตลาดของบริษัทขนมก็เถอะ"
80000116-10 = "หึหึหึ! แต่ท่ามกลางกระแสของยุคสมัย ความบันเทิงชั่วขณะ และกิจกรรมแห่งความหลักแหลมแล้ว ถ้าไม่อยากสนุกกับสิ่งรอบตัวก็จะไม่เหลือความสนุกสนานในชีวิตมนุษย์หรอก"
80000116-11 = "เราต้องเอาใจใส่ความบันเทิงแบบนี้ด้วย ถึงจะได้ชื่อว่าเป็นผู้นำและหัวหน้าองค์กรที่ยอดเยี่ยม"
80000116-12 = "เมื่อถึงวันวาเลนไทน์ แพนเดโมเนียม โซไซตี้ของเราเองก็ออกไปข้างนอกเพื่อแจกจ่ายช็อกโกแลต#nในนามของแพนเดโมเนียม โซไซตี้เพื่อเป็นส่วนหนึ่งของกิจกรรมประจำปีด้วย"
80000116-13 = "ว่าแต่วันนี้ครูมีเวลาหรือเปล่า?"
80000116-14 = "วันนี้เราอยากมอบช็อกโกแลตที่ดีที่สุดให้ครูน่ะ"
80000116-15 = "[s] \"อืม ครูมีเวลาให้อยู่แล้ว\""
80000116-16 = "หึหึหึหึ งั้นเหรอ? งั้นก็ค่อยยังชั่วหน่อย"
80000116-17 = "ถ้างั้นเราจะบอกว่าเราเตรียมของขวัญไว้ที่ไหน แล้วเราจะรออยู่ที่นั่นนะครู!"
80000116-24 = "[ns] \"ก็มาตามสถานที่ที่มาโคโตะบอกแล้วนี่นา...\""
80000116-29 = "หึหึหึหึ มาแล้วเหรอครู?"
80000116-30 = "[s1] \"สวัสดี มาโคโตะ ว่าแต่... ทำไมถึงใส่ชุดเดรสเหรอ...?\"\n[s2] \"ทำไมถึงให้มาเจอที่ฮอลล์จัดปาร์ตี้ด้วยล่ะ...?\""
80000116-33 = "อ้อ ทั้งหมดนี้เราเตรียมไว้ให้ครูน่ะ"
80000116-34 = "หืม...? เตรียมอะไรไว้น่ะเหรอ?"
80000116-35 = "หึหึหึหึ จะเป็นอะไรอื่นไปได้ล่ะ "
80000116-36 = "ก็ต้องเป็นการเตรียมสำหรับวันวาเลนไทน์น่ะสิ!"
80000116-37 = "วันวาเลนไทน์... ถึงใครจะบอกว่าเป็นวันสำหรับมอบช็อกโกแลตเป็นของขวัญให้กับคนที่รัก... แต่เรากลับคิดอีกอย่าง"
80000116-38 = "วันวาเลนไทน์ทั้งที ถ้าจะให้แค่ช็อกโกแลตแล้วก็จบ..."
80000116-39 = "พูดตามตรงแล้วมันไม่ค่อยสนุกเท่าไรเลยนี่?"
80000116-40 = "ไม่สิ ถึงตัดเรื่องความสนุกออกไป แต่การแค่ให้ของขวัญที่รู้อยู่แล้วว่าเป็นอะไรมันไม่เห็นจะเซอร์ไพรส์#nตรงไหนเลย อีกอย่าง..."
80000116-41 = "ของขวัญที่ให้... มันก็ธรรมดาเกินไปด้วย...!"
80000116-42 = "[s] \"ของที่ธรรมดาๆ ก็เพียงพอแล้วไม่ใช่เหรอ?\""
80000116-43 = "ไม่หรอก! มันจะไปเพียงพออะไร!"
80000116-44 = "เราก็เลยไปคิดมาว่าของขวัญวันวาเลนไทน์ที่สมฐานะของท่านมาโคโตะผู้นี้คืออะไร "
80000116-45 = "ต้องเลือกของขวัญแบบไหนถึงจะถือว่าเป็นของสุดพิเศษที่แตกต่างกับคนทั่วไปได้!"
80000116-46 = "และจากการคิดพิจารณาอย่างรอบคอบแล้ว..."
80000116-47 = "หึหึหึหึ! เราก็ได้คำตอบที่ต้องการ!"
80000116-48 = "อืม คนอย่างเราไม่ควรจะแค่มอบช็อกโกแลตเป็นของขวัญในวันวาเลนไทน์แล้วก็ลากัน ก็เลยจัดเตรียม#nฮอลล์ปาร์ตี้พิเศษของเกเฮนน่ามาเพื่อครู..."
80000116-49 = "แล้วให้ของขวัญเป็นกิจกรรมรับวันวาเลนไทน์เสียเลย!"
80000116-50 = "[s] \"ขอบใจนะที่เตรียมให้ถึงขนาดนี้ แต่ครูก็เขินเป็นนะ!\""
80000116-51 = "หึหึ! ไม่ต้องปฏิเสธหรอก"
80000116-52 = "อีกอย่าง เรายังไม่ได้แนะนำตัวละครสำคัญของวันวาเลนไทน์นี้เลย... ดูโน่นสิ!"
80000116-57 = "[ns] \"นี่มัน... น้ำพุที่ทำจากช็อกโกแลต...?\""
80000116-58 = "อื้อ ใช่แล้วละ อย่างที่ครูว่าเลย"
80000116-59 = "ต้องเล่นใหญ่ขนาดนี้แหละถึงจะเรียกได้ว่าเป็นของขวัญที่สมฐานะของท่านมาโคโตะผู้นี้"
80000116-60 = "หึหึหึ... เป็นยังไงล่ะครู จะตกใจและดีใจไปพร้อมๆ กันก็ได้นะ"
80000116-61 = "นี่คือน้ำพุจากช็อกโกแลตแท้ๆ ที่ทำจากโกโก้คุณภาพดีที่สุดของเกเฮนน่า... ที่มีเพียงอันเดียวใน#nเกเฮนน่า... ไม่สิ ต้องมีอันเดียวในคิโวทอสแน่นอน!"
80000116-62 = "[s3] \"อะ... อื้ม จะบอกว่าตกใจหรือเกินคาดดีละเนี่ย\"\n[s4] \"สมฐานะมาโคโตะจริงด้วยนะ! ถึงจะน่าตกใจอยู่ก็เถอะ\""
80000116-65 = "[ns] \"แต่ยังไงก็เป็นของขวัญที่มาโคโตะเตรียมมาให้ ครูดีใจมากนะ\""
80000116-66 = "หืม?!"
80000116-67 = "[s] \"หืม...? มาโคโตะ? เป็นอะไรไปเหรอ?\""
80000116-68 = "ไม่หรอก เราก็แค่... พอได้ยินครูพูดแบบนั้น... ก็รู้สึกแปลกๆ ที่มุมหนึ่งของหัวใจ..."
80000116-69 = "หึหึหึ นี่คงจะเป็น..."
80000116-70 = "ความเหนื่อยสะสมระหว่างเตรียมของขวัญวันวาเลนไทน์ให้ครูน่ะ!"
80000116-71 = "ไหนๆ ก็เป็นของขวัญวันวาเลนไทน์ที่เราตั้งใจเตรียมให้ทั้งที จะไม่ไปเล่นสนุกด้วยหน่อย มันก็น่าเสียดาย#nของแย่สิ"
80000116-72 = "[s] \"แต่ว่าเราทำอะไรกับน้ำพุช็อกโกแลตได้บ้างเหรอ...\""
80000116-73 = "หึ ไม่รู้ว่าจะต้องทำยังไงงั้นเหรอครู?"
80000116-74 = "คิกคิกคิก ดีละ ถ้างั้นเราจะทำให้ดูว่าจะสนุกกับน้ำพุช็อกโกแลตยังไงได้บ้าง"
80000116-79 = "ก่อนอื่นเราก็ต้องเลือกขนมที่ชอบ... อ้อ ส่วนมากจะแนะนำเป็นมาร์ชเมลโลน่ะ ถ้ายังเป็นมือใหม่ก็เลือก#nตามที่แนะนำก็ได้"
80000116-80 = "จากนั้นก็เอามาร์ชเมลโลไปจุ่มในช็อกโกแลตที่ไหลอยู่ช้าๆ..."
80000116-85 = "หืม...?"
80000116-86 = "[s] \"อ๊ะ! มาโคโตะ... ระวัง...!\""
80000116-87 = "ว้ายยยย!!!"
80000116-88 = "ฮะ... เฮือกกก?! อะ... อะไรน่ะ?!  เกิดอะไรขึ้นน่ะ?!"
80000116-89 = "ดะ... เดี๋ยวก่อน! รอ...!"
80000116-93 = "อึกกกก...!"
80000116-101 = "นี่มัน... อะไรกัน... ทำไมถึง? เครื่องทำงานผิดพลาดเพราะเครื่องร้อนเกินเหรอ...? "
80000116-102 = "เพราะเราซ้อมเปิดน้ำพุตั้งแต่ก่อนที่ครูจะมาตั้ง 5 ชั่วโมงหรือเปล่านะ?"
80000116-103 = "หรือว่า... เป็นเพราะเราเพิ่มการจ่ายไฟของเครื่องอีก 5 เท่าเพราะอยากประกาศเกียรติของเรา...?"
80000116-104 = "[s5] \"งั้นก็ไม่แปลกแล้วละที่เครื่องจะร้อนแบบนี้!'\n[s6] \"ว่าแต่มาโคโตะ... เป็นอะไรรึเปล่า?!\""
80000116-107 = "หึ... หึหึ... หึหึ..."
80000116-108 = "ไม่หรอก เราไม่เป็นอะไร "
80000116-109 = "ก็แค่โดนช็อกโกแลตลวกนิดหน่อยเอง ไม่ต้องตกอกตกใจไปหรอก"
80000116-110 = "[s] \"ไม่น่าจะนิดหน่อยนะ... เปียกไปถึงชายกระโปรงแล้ว\""
80000116-111 = "ฮึ่ม! ไม่เป็นไรหรอกน่า! แค่โดนเคลือบด้วยช็อกโกแลตจากน้ำพุเอง ของแค่นี้ทำอะไรท่านมาโคโตะผู้นี้#nไม่ได้หรอก!"
80000116-112 = "แต่การที่เราโดนช็อกโกแลตเล่นงานเมื่อกี้ก็ถือว่าได้รู้อะไรชัดเจนอยู่อย่างหนึ่งแล้วละ!"
80000116-113 = "[s] \"ได้รู้อะไรอย่างชัดเจนงั้นเหรอ...?\""
80000116-117 = "สมกับที่เป็นน้ำพุช็อกโกแลตที่เราเตรียมมาจริงๆ"
80000116-118 = "เพราะใช้ช็อกโกแลตคุณภาพดีที่สุดนี่เอง มันถึงทั้งหวานและอร่อยอย่างไม่ต้องสงสัย!"
80000116-119 = "[s] \"มองโลกในแง่บวกสุดๆ สมกับเป็นมาโคโตะ!\""
80000116-120 = "เอาละ อย่าเสียเวลาอยู่เลย มานี่ๆ ครูจากชาเล่ต์"
80000116-121 = "ไม่ลองเลียนิ้วชี้ที่มือขวาของเราหน่อยเหรอ?"
80000116-122 = "เมื่อกี้เราจะเอามาร์ชเมลโลลงไปจุ่ม แต่กลายเป็นว่าเอามือลงไปจุ่มแทนซะได้ ถ้าลองชิมดูก็จะเข้าใจ#nได้เลยละว่าเมื่อกี้เราพูดถึงอะไร!"
80000116-123 = "เอาละ! เลียนิ้วชี้ของเราดูสิ! ครูจากชาเล่ต์เอ๋ย!"
80000116-124 = "[s] \"ไม่ๆ ไม่เป็นไร ขอครูกินแบบธรรมดาเถอะนะ!\""
80000116-125 = "หืม...? เอางั้นเหรอ?"
80000116-126 = "ไม่จำเป็นต้องปฏิเสธ... ถึงขนาดนั้นเลยก็ได้นี่นา...? แบบนี้เราเจ็บปวดนะ"
80000116-127 = "แต่ก็เอาเถอะ... วันวาเลนไทน์ยังไม่จบลงแค่นี้สักหน่อย!"
80000116-128 = "น้ำพุช็อกโกแลตเป็นแค่ส่วนหนึ่งของกิจกรรมวันวาเลนไทน์ที่เราเตรียมไว้! กิจกรรมวันวาเลนไทน์#nที่แท้จริงจะเริ่มตั้งแต่ตอนนี้ต่างหาก!"
80000116-129 = "ขอเราไปเปลี่ยนชุดก่อนนะครู! "
80000116-130 = "หึหึหึหึ! ในเมื่อเป็นอย่างนี้แล้ว... วันนี้เราจะทำให้ครูสนุกกับกิจกรรมวันวาเลนไทน์สุดพิเศษที่เราเตรียม#nไว้ให้อย่างเต็มที่เลย!"
80000116-131 = "ถ้ายังไม่กลับบ้าน กิจกรรมวันวาเลนไทน์ก็ยังไม่จบ!"
80000116-135 = "[ns] \"อื้ม ไหนๆ ก็วันวาเลนไทน์ทั้งที\""
80000116-137 = "[ns] \"ครูจะตั้งตารอกิจกรรมที่มาโคโตะเตรียมไว้ให้นะ\""
80000116-142 = "(ถึงคุณครูจะตกใจกับเรื่องที่คาดไม่ถึงอยู่นิดหน่อย แต่ก็ได้ชิมช็อกโกแลตที่มาโคโตะเตรียมไว้ให้ และได้มีช่วงเวลาที่แสนสนุกด้วยกัน)"

[translation]
80000116-1 = "相稱的禮物"
80000116-2 = "（情人節當天早上，收到了真琴的聯絡）"
80000116-7 = "嘰嘻嘻，今天是情人節……"
80000116-8 = "朋友、戀人、熟人……#n讓這些交織著複雜人際關係的對象，互相贈送巧克力來表達親愛之情的日子。"
80000116-9 = "雖然也有人指責，那些全都是甜點公司的陰謀……"
80000116-10 = "嘻嘻嘻！如果不知該如何享受這些時代的潮流、片刻的歡樂、有趣的活動……#n很容易落得乏味之人的評價。"
80000116-11 = "只有連這樣的娛樂活動也能完美兼顧，才能稱得上是優秀的領導者。"
80000116-12 = "事實上我們萬魔殿的例行活動，#n其中就包含在情人節時期，以萬魔殿的名義向各處贈送巧克力。"
80000116-13 = "所以老師，今天的時間還方便嗎？"
80000116-14 = "我想在今天，將最棒的巧克力送給你。"
80000116-15 = "[s]「嗯，我有空。」"
80000116-16 = "嘰嘻嘻嘻，是嗎？那真是太好了。"
80000116-17 = "我會再把準備好禮物的地點告訴你，就在那個地方見吧！老師！"
80000116-24 = "[ns]「雖然來到了真琴給的地點……」"
80000116-29 = "嘰嘻嘻嘻，老師你來啦。"
80000116-30 = "[s1]「嗨，真琴。不過……為什麼穿著禮服……？」\n[s2]「而且這裡是宴會廳……對吧？」"
80000116-33 = "啊啊，這些全都是為了老師準備的。"
80000116-34 = "嗯……？問我為什麼準備？"
80000116-35 = "咯嘻嘻嘻，這應該不必我多說了吧。"
80000116-36 = "當然是為了情人節！"
80000116-37 = "情人節……一般認為是向喜愛的對象送巧克力的日子……但是我有不同的想法。"
80000116-38 = "就算是情人節，如果只送巧克力就結束……"
80000116-39 = "──實在有點無趣吧？"
80000116-40 = "不，即使拋開樂趣不談，只是送禮難以帶來驚喜感，也沒有什麼衝擊力。#n而且最重要的是……"
80000116-41 = "這樣……不是會顯得我的器量很狹小嗎！"
80000116-42 = "[s]「……普通地送禮物不行嗎？」"
80000116-43 = "不行！完全不行！"
80000116-44 = "所以我思考過了！#n能凸顯我的不凡，與我真琴大人相配的情人節禮物究竟是什麼。"
80000116-45 = "要挑選什麼樣的禮物，才能展現與凡人的截然不同呢！"
80000116-46 = "在苦惱、深思、琢磨、深究之後──"
80000116-47 = "嘰嘻嘻嘻！我終於想到了！"
80000116-48 = "以我的身分，情人節不應該僅止於送巧克力，而是該直接在格黑娜的派對會場……"
80000116-49 = "舉辦一場專屬於老師的情人節活動送給你！"
80000116-50 = "[s]「很感謝你的心意，但這樣好像讓人有點負擔……！」"
80000116-51 = "嘻嘻！老師不必客氣。"
80000116-52 = "更何況，我都還沒介紹到這次活動的重頭戲呢……看看那個！"
80000116-57 = "[ns]「這是……巧克力噴泉……？」"
80000116-58 = "啊啊，正是如此。"
80000116-59 = "至少要達到這種程度，才能勉強算得上是跟我真琴大人相稱的禮物。"
80000116-60 = "嘰嘻嘻……感想如何啊老師？#n表現得更驚訝或高興也沒關係哦？"
80000116-61 = "畢竟這可是使用了格黑娜最高級的可可……#n是格黑娜……不，是整個奇普托斯唯一且真正的巧克力噴泉！"
80000116-62 = "[s3]「該說我有點驚訝，還是完全沒有預料到呢……」\n[s4]「雖然有點驚訝，不過這真的非常有真琴的風格。」"
80000116-65 = "[ns]「但不管怎麼說，能收到真琴為我準備的禮物真的很開心。」"
80000116-66 = "呃唔！？"
80000116-67 = "[s]「……嗯？真琴？怎麼了嗎？」"
80000116-68 = "沒有，只是突然……在聽見老師的話之後……#n內心深處湧出了有一股……不可思議的感覺……"
80000116-69 = "嘰嘻嘻。#n我明白了，這股感覺就是……"
80000116-70 = "……為了準備情人節派對而積累的疲勞吧！"
80000116-71 = "不過這是我特別準備的情人節禮物，不親自享受一下就太可惜了。"
80000116-72 = "[s]「話說居然是巧克力噴泉，這該從何吃起呢……」"
80000116-73 = "呼，你居然不知道嗎？老師。"
80000116-74 = "嘻嘻，我明白了。#n那我就為你示範一下，我平時是怎麼享受巧克力噴泉的吧。"
80000116-79 = "首先挑選自己想吃的東西……啊，一般來說，如果是新手的話最推薦棉花糖。"
80000116-80 = "然後像這樣，把棉花糖放進流動的巧克力噴泉裡，慢慢地沾取……"
80000116-85 = "……嗯？"
80000116-86 = "[s]「啊！真琴……小心……！」"
80000116-87 = "噗唰────！！！"
80000116-88 = "呃啊啊啊！？這，這是怎麼回事！？"
80000116-89 = "等，等等！先等一下……！"
80000116-93 = "呃啊啊啊啊！？"
80000116-101 = "……這究竟是為什麼？#n難道是因為電池過熱，導致機器失常了嗎……？"
80000116-102 = "是因為我在老師來之前，彩排了超過5個小時的關係嗎？"
80000116-103 = "還是說……是因為我為了展現威嚴，將機器的輸出擅自升級成5倍造成的……？"
80000116-104 = "[s5]「聽你這麼說，感覺機器失常也是合情又合理！」\n[s6]「比起這個，真琴……你沒事吧！？」"
80000116-107 = "咳，咳咳……咳咳……"
80000116-108 = "啊啊，我沒事。"
80000116-109 = "只是沾到了一些巧克力而已，沒必要大驚小怪。"
80000116-110 = "[s]「才不是一些吧……連禮服的裙襬都髒掉了。」"
80000116-111 = "這不算什麼！我真琴大人，可不會因為區區巧克力噴泉的故障就受到打擊！"
80000116-112 = "我反而還因此確定了一件事！"
80000116-113 = "[s]「確定了一件事……？」"
80000116-117 = "不愧是我準備的巧克力噴泉。"
80000116-118 = "可能是因為用了業界最頂級的巧克力，甜美程度簡直無庸置疑！"
80000116-119 = "[s]「多麼正向的心態！雖然也很真琴就是了！」"
80000116-120 = "啊，現在不是說這些的時候了。#n這裡，過來我這邊吧，夏萊的老師。"
80000116-121 = "要不要舔一舔我右手的食指啊？"
80000116-122 = "正好剛才因為想用棉花糖沾巧克力的關係，現在手上沾滿了巧克力。#n這樣你應該就能更準確地理解我剛剛說的話了！"
80000116-123 = "來！舔我的手指吧！夏萊的老師！"
80000116-124 = "[s]「不用不用，沒關係。我正常吃就可以了！」"
80000116-125 = "……嗯？是嗎？"
80000116-126 = "不過也不需要……排斥到這種程度吧……？#n讓人有點受傷呢。"
80000116-127 = "總之……情人節還沒結束！"
80000116-128 = "巧克力噴泉只是我準備的冰山一角而已，真正的情人節活動現在才要開始！"
80000116-129 = "我先去換套衣服再回來！"
80000116-130 = "嘰嘻嘻！既然如此……今天一整天，#n我會讓你盡情享受我真琴大人準備的特別情人節活動！"
80000116-131 = "直到回家之前都是情人節！"
80000116-135 = "[ns]「嗯……畢竟是特別的情人節。」"
80000116-137 = "[ns]「我很期待真琴會準備什麼哦。」"
80000116-142 = "（雖然因為預料之外的事情受了一點驚嚇，#n　但還是享受著真琴準備的巧克力，度過了一段愉快的時光）"

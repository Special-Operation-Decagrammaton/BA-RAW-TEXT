[translation]
80000116-1 = "A Gift Befitting the Class"
80000116-2 = "I received a call from Makoto on the morning of Valentine's Day."
80000116-7 = "Kihehe. Today is Valentine's Day..."
80000116-8 = "A special day where friends, couples, acquaintances...those entangled in countless relationships share chocolates to prove their sincerity to each other."
80000116-9 = "Some slander it as a money-making scheme by snack corporations..."
80000116-10 = "Kihehehe! But what are such complaints in the face of the flow of time? Of momentary amusement? Nay-saying such an entertaining event is the mark of a boring individual!"
80000116-11 = "A leader worth their salt must be able to celebrate with those who celebrate!"
80000116-12 = "It's why the Pandemonium Society sends out chocolates all over Gehenna every year, after all."
80000116-13 = "That said, are you free today, Sensei?"
80000116-14 = "I would like to grant you the best chocolate you've ever had."
80000116-15 = "[s] \"Yeah, I can make time for that.\""
80000116-16 = "Kihehehe. Is that so? Good to hear."
80000116-17 = "I'll let you know where to receive your gift. I'll be waiting, Sensei!"
80000116-24 = "[ns] \"This is the spot that Makoto mentioned...\""
80000116-29 = "Kihehehe. So you've arrived, Sensei."
80000116-30 = "[s1] \"Hi, Makoto... Why are you in a dress?\"\n[s2] \"And why are we at the party hall?\""
80000116-33 = "I prepared all of this for you, Sensei."
80000116-34 = "Hm? What preparations, you ask?"
80000116-35 = "Kihehehe. Better that you see it, than hear about it."
80000116-36 = "They're Valentine's Day preparations, of course!"
80000116-37 = "Most people treat today as a time to gift chocolates to those they hold dear... But I had something else in mind."
80000116-38 = "I get that it's a Valentine's Day tradition, but to just hand out chocolates and call it a day..."
80000116-39 = "Don't you think that's boring?!"
80000116-40 = "Well, aside from the lack of entertainment, there's no element of surprise nor impact. It's also..."
80000116-41 = "Too darn small!"
80000116-42 = "[s] \"...What if I like things to be small in scope?\""
80000116-43 = "No! You have to go big or go home!"
80000116-44 = "With that in mind, I thought about it. What would be a Valentine's Day gift that exceeded expectations, one befitting of the Great Makoto?"
80000116-45 = "What kind of gift should I choose that will distinguish me from all the others?!"
80000116-46 = "After much thinking and wondering and pondering and musing─"
80000116-47 = "Kihehehe! I finally found my answer!"
80000116-48 = "Yes. Someone of my level shouldn't just gift you a piece of chocolate and call it a day. Instead, I have used the Gehenna special party hall to prepare..."
80000116-49 = "A Valentine's Day event just for Sensei!"
80000116-50 = "[s] \"I'm really thankful that you did all this, but it's a bit much!\""
80000116-51 = "Kihehe! No need to be so modest."
80000116-52 = "I still haven't even introduced you to the centerpiece of this Valentine's Day event... Behold!"
80000116-57 = "[ns] \"Is that a chocolate fountain?\""
80000116-58 = "Yes. Exactly as you say."
80000116-59 = "Only the Great Makoto could provide you with a gift of this magnitude."
80000116-60 = "Kihehe... What do you think, Sensei? Shocked? Surprised? Overjoyed?"
80000116-61 = "This is the one and only chocolate fountain in Gehenna... No! In all of Kivotos! Made with Gehenna's finest cacao!"
80000116-62 = "[s3] \"...Y-Yes. I'm very surprised. I never expected something like this.\"\n[s4] \"I should be shocked, but this sort of thing is very you, Makoto.\""
80000116-65 = "[ns] \"But I'm very grateful to have this gift you prepared for me, Makoto.\""
80000116-66 = "Hmmm?!"
80000116-67 = "[s] \"...Huh? Makoto? What's wrong?\""
80000116-68 = "Nothing, I just... After hearing those words... The left side of my chest kind of hurts..."
80000116-69 = "Kihehe. I see. This must be..."
80000116-70 = "...A heart murmur! From all my fatigue preparing this Valentine's Day celebration!"
80000116-71 = "In any case, it would be a shame to not enjoy this Valentine's Day gift after all that chest-tightening labor."
80000116-72 = "[s] \"What am I going to do with a chocolate fountain?\""
80000116-73 = "You seem at a loss, Sensei..."
80000116-74 = "Kihehe. Then let me show you how to enjoy a chocolate fountain properly."
80000116-79 = "Pick any snack you like... Ah, yes. Marshmallows are a great option for beginners."
80000116-80 = "Then slowly dip your marshmallow into the fountain..."
80000116-85 = "...Huh?"
80000116-86 = "[s] \"Ah! Makoto! Watch out!\""
80000116-87 = "Pwaaaaaah!!!"
80000116-88 = "Ughhh?! Wh-What?! What's happening?!"
80000116-89 = "W-Wait! Hold on!"
80000116-93 = "Puuuuuugh?!"
80000116-101 = "What is—? The machine's gone out of control from the battery overheating? How?! "
80000116-102 = "Could it be because I let it run for five hours during my dress rehearsal before Sensei arrived?"
80000116-103 = "Or was it because I upgraded the original machine to increase its output by 500% to make it even more glorious?!"
80000116-104 = "[s5] \"It's out of control, because you're out of control!\"\n[s6] \"Forget all that... Are you okay, Makoto?!\""
80000116-107 = "Ki, kihe... Kihe..."
80000116-108 = "This is nothing."
80000116-109 = "There's no need to make a fuss over getting splashed with a few drops of chocolate."
80000116-110 = "[s] \"I wouldn't call that a few drops... You're soaked from your head to your shoes.\""
80000116-111 = "No! It's completely fine! There's no way the Great Makoto can be defeated by mere chocolate from a fountain!"
80000116-112 = "In fact, being covered in chocolate made me realize something!"
80000116-113 = "[s] \"And that is?\""
80000116-117 = "As expected of a chocolate fountain prepared by me..."
80000116-118 = "I used the best chocolate in the industry, so it tastes sweet and delicious!"
80000116-119 = "[s] \"Such an optimistic mindset! That's very Makoto-like as well!\""
80000116-120 = "Well, no use wasting it. Here, Schale's Sensei."
80000116-121 = "Try licking it off my finger."
80000116-122 = "My finger is not a marshmallow, but the chocolate should be no less sweet!"
80000116-123 = "Lick my index finger, Schale's Sensei! Now!"
80000116-124 = "[s] \"Uh... I'm good. I'll just have some the normal way!\""
80000116-125 = "...Hm? Is that so?"
80000116-126 = "You didn't have to be so blunt about it. Now my chest hurts even more..."
80000116-127 = "Fortunately, Valentine's Day isn't over yet!"
80000116-128 = "My chocolate fountain was only the tip of the iceberg. The main event starts now!"
80000116-129 = "I'll be back after changing, Sensei!"
80000116-130 = "Kihehehe! Despite this minor setback... I'll make you fully enjoy my special Valentine's Day event, prepared by none other than the Great Makoto!"
80000116-131 = "It'll be nothing but Valentine's Day until it's time to go home!"
80000116-135 = "[ns] \"Well... 'Tis the season, after all.\""
80000116-137 = "[ns] \"I look forward to everything you've got prepared.\""
80000116-142 = "While I was surprised by the other set pieces she had in store, the chocolates Makoto prepared were all delicious. I had a lovely time."

80000116-115 = "#clearST"
80000116-116 = "3;마코토 드레스;03\n#3;greeting\n#wait;1000"
80000116-117 = "3;마코토 드레스;03;역시 이 몸이 준비한 초콜릿 분수야.\n#3;em;[반짝]"
80000116-118 = "3;마코토 드레스;16;업계 최고의 초콜릿을 써서 그런지, 두말할 것 없이 달콤하고 맛있군!"
80000116-119 = "[s] \"엄청나게 긍정적인 마인드! 아니, 그게 또 마코토다운 부분이지만!\""
80000116-120 = "3;마코토 드레스;16;자, 이럴 게 아니라. 여기, 여기다. 샬레의 선생."
80000116-121 = "3;마코토 드레스;03;이 오른손, 검지를 핥아보지 않겠나.\n#3;greeting"
80000116-122 = "3;마코토 드레스;03;마침 마시멜로를 찍으려다가 손을 초콜릿에 푹 담가버린 참이다. 이거라면 내 말이 무슨 뜻인지 확실하게 알 수 있을 테지!"
80000116-123 = "3;마코토 드레스;03;자아! 나의 검지를 핥는 거다! 샬레의 선생이여!\n#3;closeup"
80000116-124 = "[s] \"아니아니, 괜찮아. 평범하게 먹게 해줘!\""
80000116-125 = "3;마코토 드레스;04;……음? 그래?"
80000116-126 = "3;마코토 드레스;14;그렇게까지 거절할 필요는…… 그, 없지 않나……? 살짝 상처가 될 정도다만.\n#3;em;[땀]"
80000116-127 = "3;마코토 드레스;06;어쨌거나…… 아직 발렌타인 데이는 끝나지 않았다!"
80000116-128 = "3;마코토 드레스;99;초콜릿 분수는 내가 준비한 이벤트의 일각일 뿐. 진정한 발렌타인 이벤트는 지금부터가 시작이니까!"
80000116-129 = "3;마코토 드레스;01;바로 옷을 갈아입고 오도록 하마! 선생!"
80000116-130 = "3;마코토 드레스;10;키시시싯! 이렇게 된 거…… 오늘 하루, 이 마코토 님이 준비한 특별 발렌타인 데이 이벤트를 잔뜩 만끽하게 해주마!\n#3;em;[재잘]"
80000116-131 = "3;마코토 드레스;13;집으로 돌아가기 전까지가 발렌타인 데이다!\n#3;closeup\n#bgshake"

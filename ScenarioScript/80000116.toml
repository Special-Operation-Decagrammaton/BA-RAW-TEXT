[translation]
80000116-1 = "#title;격에 어울리는 선물"
80000116-2 = "#na;(발렌타인 데이 당일날 아침, 마코토로부터 연락이 도착했다.)"
80000116-3 = "#st;[0,0];instant;1;"
80000116-4 = "#clearST"
80000116-5 = "#wait;3500"
80000116-6 = "#wait;1500"
80000116-7 = "3;마코토;01;키시싯. 오늘은 발렌타인 데이…….\n#3;a\n#3;sig"
80000116-8 = "3;마코토;03;친구, 연인, 지인 등등…… 수많은 인간관계로 얽혀 있는 이들끼리 친애의 의미를 담아 초콜릿을 주고받는 기념일이다.\n#3;sig"
80000116-9 = "3;마코토;00;그런 거 전부 제과 회사의 음모 아냐? 라는 지적도 있긴 하다만은.\n#3;sig"
80000116-10 = "3;마코토;03;크크큭! 시대의 흐름, 잠깐의 여흥, 재치 있는 이벤트를 두고 그런 소리를 지껄여 봐야 즐길 줄도 모르는 재미없는 인간이란 평가를 받기 십상이다.\n#3;sig\n#3;em;[재잘]"
80000116-11 = "3;마코토;99;이런 여흥마저 빈틈없이 챙길 줄 알아야, 비로소 우수한 리더, 참된 조직의 장이라 할 수 있겠지.\n#3;sig"
80000116-12 = "3;마코토;01;뭐어, 실제로 우리 만마전에서도 연례행사의 일환으로 발렌타인 데이가 되면 외부 곳곳에 만마전의 이름으로 초콜릿을 선물하고는 하니까 말이야.\n#3;sig"
80000116-13 = "3;마코토;02;그래서 말이다만, 선생. 오늘 시간은 있나?\n#3;sig"
80000116-14 = "3;마코토;01;오늘 하루 당신에게 최고의 초콜릿을 선물하고자 한다만.\n#3;sig"
80000116-15 = "[s] \"응. 시간이라면 괜찮아.\""
80000116-16 = "3;마코토;03;키시시싯. 그런가? 그렇다면 다행이군.\n#3;sig\n#3;em;[재잘]"
80000116-17 = "3;마코토;10;그럼 선물을 준비한 장소를 알려주도록 하지. 그곳에서 기다리고 있겠다! 선생이여!\n#3;closeup\n#3;sig"
80000116-18 = "#st;[0,0];instant;1;"
80000116-19 = "#clearST"
80000116-20 = "3;마코토;10\n#3;d\n#3;closeup\n#3;sig\n#wait;1500"
80000116-21 = "#all;hide"
80000116-22 = "#wait;2000"
80000116-23 = "#all;hide"
80000116-24 = "[ns] \"그래서 마코토가 준 주소에 적힌 장소로 오긴 했는데…….\""
80000116-25 = "#st;[0,0];instant;1;"
80000116-26 = "#clearST"
80000116-27 = "#wait;2500"
80000116-28 = "3;마코토 드레스;01\n#3;a\n#wait;1000"
80000116-29 = "3;마코토 드레스;03;키시시싯. 왔는가. 선생.\n#3;hophop\n#3;em;[재잘]"
80000116-30 = "[s1] \"안녕. 마코토. 그런데…… 어째서 드레스 차림이야……?\"\n[s2] \"더군다나 이곳은 파티홀……이지?\""
80000116-31 = "#wait;100"
80000116-32 = "#wait;100"
80000116-33 = "3;마코토 드레스;03;아아, 이건 전부 선생을 위해 준비한 것들이다.\n#3;jump"
80000116-34 = "3;마코토 드레스;02;응……? 무슨 준비냐고?"
80000116-35 = "3;마코토 드레스;16;키시시싯. 입 아프게 두말해서 무엇하겠나."
80000116-36 = "3;마코토 드레스;03;당연히 발렌타인 데이를 위한 준비인 게 당연하지!\n#3;jump\n#3;em;[!]"
80000116-37 = "3;마코토 드레스;99;발렌타인 데이…… 흔히들 보통은 친애의 대상에게 초콜릿을 선물하는 날……이라고는 하지만, 이 몸은 생각했다."
80000116-38 = "3;마코토 드레스;99;발렌타인 데이라고는 해도 그냥 그렇게 초콜릿만 선물하고 끝내기에는…….\n#3;em;…"
80000116-39 = "3;마코토 드레스;05;──솔직히 별로 재미없지 않나?"
80000116-40 = "3;마코토 드레스;05;아니, 재미를 떠나서라도 선물만 주고 마는 건 전혀 서프라이즈하지도 않고, 임팩트도 없고. 또한……"
80000116-41 = "3;마코토 드레스;03;너무나도…… 배포가 작은 것 아닌가……! 라고 말이지!\n#3;jump\n#3;em;[!]"
80000116-42 = "[s] \"……평범한 거면 충분하지 않아?\""
80000116-43 = "3;마코토 드레스;05;전혀! 부족할 뿐이다!\n#3;hophop"
80000116-44 = "3;마코토 드레스;01;그래서 생각했지. 그런 평범한 것을 뛰어넘어, 이 마코토 님에게 어울리는 발렌타인 데이 선물이란 무엇일까."
80000116-45 = "3;마코토 드레스;10;어떠한 선물을 택해야, 범인들과 비교되는 이 몸만의 스페셜한 선물을 준비할 수 있을 것인가!"
80000116-46 = "3;마코토 드레스;99;고민하고 생각하고 궁리하고 궁구한 끝에──"
80000116-47 = "3;마코토 드레스;16;키시시싯! 마침내 이 몸은 떠올려 내고야 만 것이다!\n#3;em;[재잘]"
80000116-48 = "3;마코토 드레스;16;그래. 이 몸쯤 된다면 발렌타인 데이엔 단순히 초콜릿만 선물하고 끝날 게 아니라, 아예 게헨나 특제 파티홀을 준비하여 선생만을 위한……."
80000116-49 = "3;마코토 드레스;03;발렌타인 데이 이벤트. 그 자체를 선물하자고!\n#3;jump"
80000116-50 = "[s] \"그렇게 준비해 준 건 엄청 고맙긴 한데. 살짝 부담스러워!\""
80000116-51 = "3;마코토 드레스;16;키킥! 사양할 거 없다.\n#3;m2"
80000116-52 = "3;마코토 드레스;03;게다가, 아직 이번 발렌타인 데이의 주역은 소개조차 하지 않았지 않느냐…… 저것을 봐라!\n#3;m1"
80000116-53 = "#st;[0,0];instant;1;"
80000116-54 = "#clearST"
80000116-55 = "#wait;1000"
80000116-56 = "#wait;3500\n#bgshake"
80000116-57 = "[ns] \"이건…… 초콜릿으로 만든 분수……?\""
80000116-58 = "3;마코토 드레스;01;아아, 그래. 그 말대로다.\n#3;greeting"
80000116-59 = "3;마코토 드레스;02;이 정도 레벨은 되어야 조금은 이 마코토 님에게 어울리는 규모의 선물이라 할 수 있지.\n#3;m2"
80000116-60 = "3;마코토 드레스;03;크크큭…… 어떤가. 선생. 진심으로 놀라고 기뻐해도 좋다고?\n#3;m3"
80000116-61 = "3;마코토 드레스;16;무려 게헨나 최고급 카카오를 사용해 만든…… 게헨나…… 아니, 이 키보토스에 단 하나밖에 없는 진짜배기 초콜릿 분수니까!\n#3;em;[재잘]"
80000116-62 = "[s3] \"……으응. 솔직히 깜짝 놀랐다고 할까. 전혀 예상외라고 할까.\"\n[s4] \"진짜 마코토답네! 하고 충격을 받은 점도 적잖이 있지만.\""
80000116-63 = "#wait;1000"
80000116-64 = "#wait;1000"
80000116-65 = "[ns] \"그래도 마코토가 날 위해 준비해 준 선물이라니. 엄청 기뻐.\""
80000116-66 = "3;마코토 드레스;04;으으음?!\n#3;shake\n#3;em;[?!]"
80000116-67 = "[s] \"……응? 마코토? 왜 그래?\""
80000116-68 = "3;마코토 드레스;06;아니, 순간…… 선생의 말을 듣고 나니…… 가슴 한쪽에 불가사의한…… 그런 느낌이 드는 게……"
80000116-69 = "3;마코토 드레스;16;키시싯. 그런가. 이것은………"
80000116-70 = "3;마코토 드레스;03;……아무래도 이번 발렌타인 데이를 준비하며 쌓인 피로 때문인 모양이야!\n#3;jump"
80000116-71 = "3;마코토 드레스;02;하여간 모처럼 준비한 발렌타인 데이 선물이니, 직접 즐기지 않으면 손해겠지."
80000116-72 = "[s] \"근데 초콜릿 분수라니, 어디서부터 뭘 어떻게 해야 할지…….\""
80000116-73 = "3;마코토 드레스;16;훗, 뭔가. 어찌해야 할 줄 모르는 것인가. 선생."
80000116-74 = "3;마코토 드레스;03;키키킥. 좋아. 그럼 여기에선 이 몸이 초콜릿 분수를 어떻게 즐기면 좋을지 시범을 보이도록 해볼까.\n#3;hophop\n#3;em;[재잘]"
80000116-75 = "#st;[0,0];instant;1;"
80000116-76 = "#clearST"
80000116-77 = "3;마코토 드레스;03\n#3;m4\n#wait;1500"
80000116-78 = "3;마코토 드레스;03\n#3;m5\n#wait;1500"
80000116-79 = "3;마코토 드레스;02;우선 내가 먹고 싶은 과자 종류를 골라서…… 아, 보통은 마시멜로를 가장 추천하니, 초심자라면 이것부터 고르는 게 좋을 테지."
80000116-80 = "3;마코토 드레스;01;그래서 이렇게 손에 든 마시멜로를 흐르는 초콜릿 분수에 맞춰, 천천히 찍으면…….\n#3;greeting"

[translation]
10030010-1 = "Episode 1;An Unexpected Camp"
10030010-2 = "Central Plaza, Millennium Study Center"
10030010-5 = "Ugh... Waking up early on the weekend is the worst..."
10030010-7 = "I concur. Spending a precious day off tramping around the countryside...especially with all the holiday sounds I could be recording on the last day of the year... It's like using premium currency to buy a common drop..."
10030010-8 = "I would normally be asleep right now... Rising this early makes my head hurt..."
10030010-14 = "[ns] \"...But at least you all showed up on time.\""
10030010-18 = "Huh? [USERNAME] Sensei?"
10030010-19 = "What brings you to Millennium so early?"
10030010-20 = "[s1] \"Chihiro told me you were taking a hiking trip.\"\n[s2] \"I thought you might want a chaperone in the wilderness.\""
10030010-23 = "[ns] \"I hope I'm not intruding.\""
10030010-24 = "Not at all! You're always welcome, Sensei!"
10030010-26 = "Perhaps the day isn't a waste after all, if I get to listen to [USERNAME] Sensei's voice all day..."
10030010-27 = "I didn't pay attention to my clothing because I thought this was just a club trip... I should have worn something nicer."
10030010-29 = "Yeah. I would've worn something way more colorful if I knew Sensei was going to be here."
10030010-30 = "...As a member of Veritas, I surely should have been informed of this mission-critical information."
10030010-31 = "[s3] \"I think your winter wear looks great!\"\n[s4] \"You're dressed for success!\""
10030010-34 = "I guess, if Sensei says so..."
10030010-35 = "But where's Chihiro? She's the one who called us here."
10030010-36 = "If she arrives in a meticulous outfit despite telling us to dress casually—"
10030010-44 = "Thank goodness, everyone is here. I don't have to search for any of you."
10030010-49 = "Chihiro... That's some outfit..."
10030010-50 = "...It's meticulous in a different way."
10030010-51 = "Haha! What are you wearing? You look like you're going camping!"
10030010-53 = "But we are. Going camping, I mean."
10030010-54 = "...Didn't I tell you?"
10030010-59 = "Camping?!"
10030010-61 = "I wouldn't have told everyone to arrive this morning to see tomorrow's sunrise."
10030010-64 = "We're traveling to the Higashi Alps today, which are located at the outskirts of the Millennium district."
10030010-65 = "The highest peak faces east and it's famous for the view you get at sunrise. But to reach the foot of the mountain you need to cross a huge plain and a churning river, so it doesn't get many campers."
10030010-68 = "We're going to set up camp at the foot of the mountain, spend the night, and start climbing before dawn so we can watch the sunrise from the peak."
10030010-69 = "After spending time away from the trappings of civilization, you might realize that there are plenty of things beyond your screens that you can enjoy."
10030010-75 = "Ah! I forgot, I actually have an urgent appointment!"
10030010-76 = "Oh no, my chronic caffeine deficiency has struck me again..."
10030010-77 = "I just received an emergency signal from a critical wiretap I set up earlier—"
10030010-79 = "No. As I said before, this is an order from the vice president, and I will not permit any excuses."
10030010-80 = "I received permission from Himari as well. So you all need to listen to me today."
10030010-83 = "N-No fair! You devil! You dictator!"
10030010-84 = "We're witnessing the birth of a new Big Sister of Millennium..."
10030010-85 = "Sensei...help..."
10030010-86 = "[s] \"Even if you look at me like that...\""
10030010-90 = "[ns5] \"This experience will be good for you.\"\n[ns6] \"I'll be with you, so just do your best.\""
10030010-95 = "If Sensei says so..."
10030010-96 = "I'll make it work somehow, if it's just for a day."
10030010-97 = "I'll go anywhere so long as I can record Sensei's voice."
10030010-99 = "Now, before we depart..."
10030010-104 = "We need to check your bags."
10030010-108 = "Check our bags? What's wrong with our bags?!"
10030010-109 = "We're not in elementary school... You're not going to say that we're only allowed to bring snacks up to 500 yen...right?"
10030010-111 = "Snacks are fine, but any electronic devices unrelated to camping are strictly forbidden."
10030010-112 = "So if any electronic devices just happened to find their way into your bags, you'll need to leave them at the academy before we head out."
10030010-113 = "Why?!"
10030010-114 = "I told you—the goal of this camping trip is to spend time in nature, away from civilization."
10030010-115 = "If you bring a bunch of portable electronics, you're just going to wind up doing the same things in a different place."
10030010-116 = "So only bring the gear you need for this trip!"
10030010-117 = "Um... Do I have to leave my phone as well?"
10030010-118 = "It's fine to bring your cell phone for emergency situations, but it won't be that useful."
10030010-119 = "I don't expect much of a signal while camping in the mountains."
10030010-120 = "Ugh..."
10030010-121 = "Now, starting with Maki. Give me your bag."
10030010-125 = "Let's see. This is..."
10030010-129 = "...A solar power station?"
10030010-131 = "Um, this is..."
10030010-132 = "I-It would be a huge problem if my phone was out of battery when I needed to place an emergency call!"
10030010-133 = "If we have a power station that runs on solar power, we could charge our phones whenever we want!"
10030010-134 = "...A portable battery would suffice. And weigh far less."
10030010-135 = "We don't need a power station for the equipment we'll be using."
10030010-139 = "And this is..."
10030010-140 = "...A portable parabola antenna?"
10030010-141 = "I-It's to send a distress signal in the event we were stranded."
10030010-142 = "A regular antenna would be unable to receive signals in such a remote area..."
10030010-143 = "We won't be so remote that we'd need to use a directional antenna! And I've already shared our hiking route, so any search party would know where to look for us!"
10030010-144 = "No matter how you present it, this is an antenna for setting up an internet connection!"
10030010-145 = "And over here..."
10030010-149 = "...An NAS Cloud Server Machine?"
10030010-154 = "Do you really plan on setting up a temporary communications hub at our campsite?!"
10030010-159 = "It's just... Are we really going to give up our internet connection for over a day?"
10030010-160 = "You know, nowadays it's even possible to live the lifestyle of a digital nomad..."
10030010-161 = "Can we at least bring a few devices that have an internet connection?"
10030010-163 = "Absolutely not. Leave the electronic devices you brought in the club room. Every single one."
10030010-164 = "As I said, this trip is an extreme measure to mitigate your internet addiction—"
10030010-165 = "Forget about everything happening outside of our campsite and enjoy your break."
10030010-168 = "Enjoying time off without the internet is absurd..."
10030010-169 = "This must be what a castaway stranded on a deserted island feels like..."
10030010-170 = "How can you forbid my high-definition recording devices when I finally have an opportunity to spend a day with Sensei..."
10030010-173 = "We brought all our cooking equipment, supplies, winter gear, and our group tent..."
10030010-174 = "I think we have everything we need to go camping!"
10030010-179 = "So let's cheer up and get moving!"
10030010-180 = "[s] \"Yay—\""
10030010-183 = "Boo..."

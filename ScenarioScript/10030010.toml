[translation]
10030010-1 = "ตอนที่ 1;แคมป์ปิ้งแบบคาดไม่ถึง"
10030010-2 = "จัตุรัสกลาง วิทยาเขตมิลเลเนียม"
10030010-5 = "วะ... วันหยุดทั้งที แต่ต้องมาตื่นในเวลานี้... แบบนี้มันเกินไปแล้วนะ..."
10030010-7 = "ฉันเห็นด้วยค่ะ นี่มันวันหยุดที่มีค่าเลยนะคะ... วันสุดท้ายของปีแบบนี้มีแต่เสียงสนุกสนานให้ได้ฟัง แต่เราต้องไปยังชานเมืองเงียบๆ แทน... นี่เป็นความสูญเสียอย่างใหญ่หลวงเลยค่ะ"
10030010-8 = "ปกติเวลานี้ฉันยังนอนอยู่เลย... พอรีบตื่นออกมาแบบนี้แล้วปวดหัวชะมัด..."
10030010-14 = "[ns] \"ทุกคนมากันตรงเวลาเลยนะ\""
10030010-18 = "เอ๋? คุณครู [USERNAME]?"
10030010-19 = "มาทำอะไรที่โรงเรียนวิทย์มิลเลเนียมตั้งแต่เช้า..."
10030010-20 = "[s1] \"จิฮิโระบอกครูว่าจะไปเที่ยวแถวชานเมืองน่ะ\"\n[s2] \"ครูมาด้วยเผื่อมีอะไรให้ผู้ใหญ่อย่างครูช่วยน่ะ\""
10030010-23 = "[ns] \"นี่ครูมารบกวนทุกคนรึเปล่า?\""
10030010-24 = "ไม่รบกวนหรอก! คุณครูเป็นที่ต้อนรับเสมอแหละ!"
10030010-26 = "ถ้าได้อยู่ข้างๆ และฟังเสียงของคุณครู [USERNAME] ทั้งวันละก็ อาจจะไม่ใช่ความสูญเสียอย่างใหญ่หลวงก็ได้..."
10030010-27 = "แต่ฉันนึกว่าวันนี้จะมีแค่พวกเราที่ไปเที่ยวด้วยกัน ก็เลยแต่งตัวมาแบบชิลๆ... ชักกังวลเรื่องชุดแล้วสิ"
10030010-29 = "นั่นน่ะสิ ถ้ารู้ว่าวันนี้คุณครูจะมาด้วย ก็คงเลือกใส่เสื้อผ้าสีสันสดใสกว่านี้ออกมาแล้วละ"
10030010-30 = "พลาดข้อมูลสำคัญแบบนี้ไปได้ยังไงกัน นี่ถือเป็นความสะเพร่าอย่างรุนแรงของสมาชิกเวอริทัสเลยค่ะ"
10030010-31 = "[s3] \"แต่ครูคิดว่าทุกคนแต่งตัวมากันสวยมากเลยนะ\"\n[s4] \"ทุกคนเหมาะกับชุดฤดูหนาวกันมากเลย!\""
10030010-34 = "ถ้าคุณครูว่าอย่างนั้นก็ช่วยไม่ได้..."
10030010-35 = "จะว่าไป รุ่นพี่จิฮิโระที่เป็นตัวตั้งตัวตีที่ชวนพวกเราออกมาอยู่ไหนน่ะ?"
10030010-36 = "อย่าบอกนะว่าบอกให้พวกเราแต่งตัวมาแบบชิลๆ แล้วตัวเองแต่งตัวจัดเต็มมาคนเดียว..."
10030010-44 = "ทุกคนมากันตรงเวลาเลยนะ โล่งอกไปทีที่ไม่ต้องไปปลุกจากเตียง"
10030010-49 = "รุ่นพี่จิฮิโระ ดูแต่งตัวมาสิ..."
10030010-50 = "เป็นชุดที่... ใส่แล้วดูมีพลังล้นเหลือเลยนะคะ"
10030010-51 = "ฮ่าฮ่า! แต่งตัวอะไรมาน่ะรุ่นพี่! เหมือนจะไปออกแคมป์อะไรที่ไหนงั้นแหละ"
10030010-53 = "อื้ม ใช่แล้ว ไปออกแคมป์"
10030010-54 = "ฉันยังไม่ได้บอกไปหรอกเหรอ?"
10030010-59 = "ไปออกแคมป์?!"
10030010-61 = "ใช่ ก็ถ้าจะออกไปดูพระอาทิตย์ขึ้นข้างนอกเฉยๆ ฉันคงไม่เรียกพวกเธอมาล่วงหน้าตั้งแต่เช้าของอีกวัน#nหรอก"
10030010-64 = "ที่ที่เราจะไปวันนี้คือเทือกเขาฮิงาชิที่อยู่ชายขอบเขตปกครองตนเองมิลเลเนียม"
10030010-65 = "ยอดเขาที่ขึ้นสูงตระหง่านทางทิศตะวันออกที่มีชื่อเสียงในฐานะจุดชมวิวพระอาทิตย์ขึ้น แต่ก็เป็นที่รู้จัก#nกันดีด้วยว่าเป็นจุดตั้งแคมป์ลับเพราะอยู่บนที่ราบกว้างและมีแม่น้ำที่ปากทางขึ้นภูเขา"
10030010-68 = "เราจะกางเต็นท์ที่ปากทางขึ้นภูเขากันหนึ่งคืน และวันรุ่งขึ้นก็จะรีบตื่นแล้วปีนเขาไปดูพระอาทิตย์ขึ้น#nด้วยกัน"
10030010-69 = "ถ้าได้ออกจากโลกไอทีและได้ใช้เวลาอย่างมีประโยชน์ต่อสุขภาพท่ามกลางธรรมชาติสักวัน พวกเธอก็จะรู้ว่ายังมีอะไรน่าสนุกอยู่ข้างนอกตั้งเยอะตั้งแยะเลย"
10030010-75 = "อ๊ะ รุ่นพี่! ฉันเพิ่งนึกได้ว่ามีนัดด่วนน่ะ!"
10030010-76 = "จู่ๆ โรคขาดคาเฟอีนของฉันก็กำเริบขึ้นมา..."
10030010-77 = "มีคำขอความช่วยเหลือเร่งด่วนเข้ามาจากอุปกรณ์ดักฟังที่ฉันติดตั้งไว้..."
10030010-79 = "ไม่ได้ ฉันบอกไปแล้วไม่ใช่เหรอว่านี่เป็นคำสั่งของรองหัวหน้า ต้องทำตามสิ"
10030010-80 = "ฉันได้รับอนุญาตล่วงหน้าจากฮิมาริแล้ว วันนี้พวกเธอต้องเชื่อฟังคำสั่งของฉันแต่โดยดี"
10030010-83 = "อะไรกัน! มีแบบนี้ด้วยเหรอ?! ใจดำ! จอมเผด็จการ!"
10030010-84 = "จะมีบิ๊กซิสเตอร์คนใหม่ถือกำเนิดขึ้นในมิลเลเนียมเหรอเนี่ย..."
10030010-85 = "คุณครู ช่วยหน่อยสิ..."
10030010-86 = "[s] \"ต่อให้ทำตาแป๋วแบบนั้นก็เถอะ...\""
10030010-90 = "[ns5] \"แต่การได้ลองทำจริงๆ มันจะสนุกมากเลยนะ\"\n[ns6] \"ถ้ามีเรื่องอะไรครูจะช่วยเอง มาลองพยายามด้วยกันสักวันนะ\""
10030010-95 = "ถ้าคุณครูพูดอย่างนั้น..."
10030010-96 = "ฉันก็น่าจะอดทนได้อยู่ แต่แค่วันเดียวนะ"
10030010-97 = "ถ้าได้บันทึกเสียงของคุณครูละก็ ไม่ว่าจะสถานที่ไหนฉันก็ไม่เกี่ยงค่ะ"
10030010-99 = "เอาละ งั้นก่อนที่พวกเราจะออกเดินทาง..."
10030010-104 = "ฉันจะขอตรวจสัมภาระก่อนก็แล้วกัน"
10030010-108 = "ตรวจสัมภาระเหรอ? ทำไมจู่ๆ ถึงจะตรวจสัมภาระล่ะ?!"
10030010-109 = "เราไม่ใช่เด็กประถมสักหน่อย อย่าบอกนะว่าจะมีกฎให้เอาของว่างไปได้ไม่เกิน 500 เยนหรืออะไร#nพรรค์นั้นด้วย"
10030010-111 = "ของว่างน่ะจะเอาไปเท่าไรก็ได้ แต่ว่าอุปกรณ์อิเล็กทรอนิกส์ที่ไม่เกี่ยวกับการแคมป์ปิ้งน่ะไม่ได้"
10030010-112 = "ถ้ามีใครพกอุปกรณ์อิเล็กทรอนิกส์อะไรมา ก็ให้เอาไปเก็บไว้ที่โรงเรียนก่อน"
10030010-113 = "ทำไมกันล่ะ?!"
10030010-114 = "ฉันก็บอกไปก่อนหน้านี้แล้วว่าแคมป์ปิ้งครั้งนี้มีเป้าหมายเพื่อหลุดออกจากโลกไอที แล้วมาใช้เวลาใน#nธรรมชาติอย่างมีประโยชน์ต่อสุขภาพน่ะ"
10030010-115 = "ถ้าเอาอุปกรณ์อิเล็กทรอนิกส์ไปด้วย มันก็จะเหมือนแค่การเปลี่ยนที่นอน แต่สิ่งที่ทำก็จะเหมือนเดิมใช่#nไหมล่ะ?"
10030010-116 = "เพราะงั้นการไปออกแคมป์ครั้งนี้ เราจะเอาไปแค่อุปกรณ์ที่จำเป็นเท่านั้น"
10030010-117 = "เอ่อ... โทรศัพท์มือถือก็ห้ามเอาไปด้วยมั้ย?"
10030010-118 = "ถ้าจะเอาโทรศัพท์มือถือไปเผื่อกรณีฉุกเฉินก็ไม่เป็นไร แต่ก็คงไม่ได้ใช้ประโยชน์อะไรมากหรอก"
10030010-119 = "ยังไงซะสถานที่ตั้งแคมป์ที่พวกเราจะไปมันก็อยู่ท่ามกลางภูเขาที่ไม่มีสัญญาณโทรศัพท์อยู่แล้ว"
10030010-120 = "อึก..."
10030010-121 = "เอาละ เริ่มจากมากิก่อน ส่งกระเป๋ามาทางนี้"
10030010-125 = "ไหนดูซิ นี่มัน..."
10030010-129 = "เครื่องกำเนิดไฟฟ้าพลังแสงอาทิตย์...?"
10030010-131 = "เอ่อ คือว่า..."
10030010-132 = "กะ... ก็เผื่อว่ามีเรื่องด่วนที่ต้องใช้โทรศัพท์แล้วโทรศัพท์แบตหมดน่ะ!"
10030010-133 = "ถ้าเราเตรียมอุปกรณ์ที่ผลิตไฟฟ้าด้วยพลังแสงอาทิตย์ไปด้วย ก็จะชาร์จแบตโทรศัพท์ได้ยังไงล่ะ"
10030010-134 = "ถ้าจะชาร์จโทรศัพท์ แค่พาวเวอร์แบงก์ก็พอแล้ว"
10030010-135 = "เราไม่ได้จะใช้ตู้เย็นกลางแจ้งกันสักหน่อย ไม่จำเป็นต้องมีเครื่องกำเนิดไฟฟ้าพลังแสงอาทิตย์หรอก"
10030010-139 = "ส่วนอันนี้..."
10030010-140 = "เสาอากาศทรงพาราโบลาแบบพกพา?"
10030010-141 = "ผะ... เผื่อเราต้องส่งสัญญาณขอความช่วยเหลือตอนเกิดภัยพิบัติน่ะค่ะ"
10030010-142 = "ในพื้นที่ที่ไม่มีคลื่นสัญญาณ เราไม่สามารถรับสัญญาณจากเสาอากาศธรรมดาได้..."
10030010-143 = "เราไม่ได้จะไปพื้นที่ทุรกันดารขนาดที่ต้องใช้เสาอากาศแบบนี้หรอกนะ"
10030010-144 = "ดูเอาก็รู้แล้วว่าเป็นเสาอากาศสำหรับสัญญาณอินเทอร์เน็ต!"
10030010-145 = "ไหนจะอันนี้อีก..."
10030010-149 = "เครื่องคลาวด์สำหรับติดตั้งเซิร์ฟเวอร์ NAS...?"
10030010-154 = "นี่พวกเธอจะไปตั้งสถานีสื่อสารชั่วคราวในสถานที่ตั้งแคมป์เหรอ?!"
10030010-159 = "ก็พอคิดว่าจะใช้อินเทอร์เน็ตไม่ได้หนึ่งวัน ใจฉันมันก็ว้าวุ้นขึ้นมา..."
10030010-160 = "เห็นว่าล่าสุดมีคำศัพท์ว่า <ดิจิทัล โนแมด> ด้วยนี่คะ"
10030010-161 = "ถึงอย่างอื่นจะไม่ได้ แต่อย่างน้อยก็ขอเอาอุปกรณ์ที่เชื่อมต่ออินเทอร์เน็ตได้ไปด้วยไม่ได้เหรอ?"
10030010-163 = "ไม่ได้ เอาอุปกรณ์อิเล็กทรอนิกส์ไปเก็บไว้ในห้องชมรมให้หมดเลย"
10030010-164 = "ฉันจะบอกให้อีกครั้งนะ การไปเที่ยวครั้งนี้เป็นมาตรการพิเศษเพื่อบรรเทาอาการติดอินเทอร์เน็ตของ#nพวกเธอ..."
10030010-165 = "วันนี้ให้พวกเธอลืมสิ่งที่เกิดขึ้นในโลกภายนอกสถานที่ตั้งแคมป์ แล้วสนุกกับการพักผ่อนให้เต็มที่"
10030010-168 = "ให้สนุกกับการพักผ่อนแบบไม่มีอินเทอร์เน็ตเนี่ยนะ ไร้เหตุผลชะมัด..."
10030010-169 = "ความรู้สึกของนักโทษที่ถูกกีดกันออกจากสังคมมันเป็นอย่างนี้เองสินะ..."
10030010-170 = "เป็นโอกาสที่จะได้ใช้เวลากับคุณครูทั้งวันแล้วเชียว แต่ก็เอาอุปกรณ์บันทึกเสียงคุณภาพสูงไปไม่ได้..."
10030010-173 = "ฉันเตรียมเต็นท์ อุปกรณ์ทำอาหาร วัตถุดิบอาหารกับอุปกรณ์กันหนาวมาหมดแล้ว..."
10030010-174 = "แค่นี้ก็ถือว่ามีทุกอย่างที่จำเป็นสำหรับการตั้งแคมป์แล้วละ"
10030010-179 = "งั้นทุกคนก็ทำตัวให้กระฉับกระเฉง แล้วไปสถานที่ตั้งแคมป์ด้วยกันเลย!"
10030010-180 = "[s] \"ไปกันเลย...\""
10030010-183 = "ฮือออ..."

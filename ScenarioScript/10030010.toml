[translation]
10030010-1 = "第1話;意料之外的露營"
10030010-2 = "千年研究區域．中央廣場"
10030010-5 = "嗚嗚……假日還要這麼早起，太過分了……"
10030010-7 = "就是說啊。居然要在珍貴的假日……#n還是「一年最後一天」這種充滿有趣聲音的日子去安靜的野外……真是損失慘重。"
10030010-8 = "平常這個時間我還在睡覺呢……硬著頭皮起床害我頭好痛……"
10030010-14 = "[ns]「……不過大家都準時來集合了呢。」"
10030010-18 = "咦？[USERNAME]老師？"
10030010-19 = "怎麼一大早就來千年學園呢……？"
10030010-20 = "[s1]「我聽千尋說要去很遠的地方旅行。」\n[s2]「所以覺得你們應該會需要大人的幫助。」"
10030010-23 = "[ns] 「……突然過來是不是妨礙到你們了？」"
10030010-24 = "不會不會！我們隨時歡迎老師來！"
10030010-26 = "如果一整天都能聽到[USERNAME]老師的聲音，損失或許也不是不能接受……"
10030010-27 = "只是我以為今天只有我們會去，所以穿得很隨便……早知道就多打扮一下了。"
10030010-29 = "就是說啊。#n要是知道老師會來，我就穿顏色更漂亮的衣服來了。"
10030010-30 = "居然會遺漏這麼貴重的情報……身為貝里塔斯的成員，這真是天大的失誤。"
10030010-31 = "[s3]「可是我覺得很漂亮啊？」\n[s4]「大家的冬天便服，真的都很適合哦！」"
10030010-34 = "既然老師都這麼說了，好吧……"
10030010-35 = "話說叫我們過來的千尋前輩人呢？"
10030010-36 = "該不會叫我們隨便穿穿，自己卻卯起來打扮──"
10030010-44 = "大家都準時來集合了呢。#n不必再去找人真是太好了。"
10030010-49 = "千尋前輩，你那身打扮是……？"
10030010-50 = "……從別的意義上來說，確實是卯起來打扮呢。"
10030010-51 = "哈哈！你怎麼穿成那樣啊，前輩！#n現在是要去哪裡露營嗎？"
10030010-53 = "嗯，對啊。"
10030010-54 = "……難道我沒說過嗎？"
10030010-59 = "露營！？"
10030010-61 = "沒錯。如果只是單純到外面看個日出，我就不會在前一天早上把你們叫來集合了吧。"
10030010-64 = "今天我們要去的地方是千年自治區外圍的「東阿爾卑斯」。"
10030010-65 = "向東聳立的莊麗高峰是著名的日出名勝，#n不過由於山口有寬廣的平地和河流，所以也是廣為人知的露營聖地。"
10030010-68 = "我們會在山口搭帳篷露營一夜，隔天一早上山看日出。"
10030010-69 = "脫離文明世界，在自然中度過健康的一天──#n這樣你們應該就能稍微明白螢幕外也充滿很多歡樂了吧。"
10030010-75 = "啊，對了前輩！我突然想到有急事！"
10030010-76 = "我的咖啡因缺乏症突然復發……"
10030010-77 = "剛才裝好的竊聽器傳來了緊急求救訊號──"
10030010-79 = "不行，我之前不是說過了嗎？#n這是副部長命令，所有人都得參加。"
10030010-80 = "而且我也事先得到陽葵的允許了。#n今天就老實聽我指示吧。"
10030010-83 = "嗚嗚──太卑鄙了！惡魔！獨裁者！"
10030010-84 = "千年的新大姐頭就這樣誕生了嗎……"
10030010-85 = "老師，幫幫我們……"
10030010-86 = "[s]「就算你用那種眼神盯著我看也……」"
10030010-90 = "[ns5]「實際體驗起來會比想像中還有趣的哦。」\n[ns6]「如果遇到困難的話我也會幫忙，就努力一天吧。」"
10030010-95 = "既然老師這麼說……"
10030010-96 = "只有一天的話，我會想辦法忍耐的。"
10030010-97 = "只要能錄下老師的聲音，去哪裡都無所謂。"
10030010-99 = "那麼在出發之前……"
10030010-104 = "我要先檢查你們的行李。"
10030010-108 = "檢查行李？為什麼突然要檢查！？"
10030010-109 = "我們又不是小學生，應該沒有只能帶500元零食──之類的規則吧……？"
10030010-111 = "零食要帶多少都行，不過不能帶和露營無關的電子裝備。"
10030010-112 = "如果有帶的話就全部放回部室裡吧。"
10030010-113 = "為什麼！？"
10030010-114 = "我剛才也說過，這次露營的目的是脫離文明，在大自然中度過健康的一天。"
10030010-115 = "要是帶著一大堆尖端電子設備去露營，那也只是換個地方做一樣的事而已不是嗎？"
10030010-116 = "所以這次的旅行只能帶必要裝備。"
10030010-117 = "連手機都不能帶嗎？"
10030010-118 = "手機可以帶著以備不時之需，但我想應該派不上什麼用場。"
10030010-119 = "因為我們要去的露營地點是接收不到電波的山裡。"
10030010-120 = "唔……"
10030010-121 = "來，從真紀開始吧。把背包給我。"
10030010-125 = "我看看，這是……"
10030010-129 = "……太陽能發電裝置？"
10030010-131 = "那個，該怎麼說呢……"
10030010-132 = "萬一需要緊急聯絡的時候手機沒電就糟糕了！"
10030010-133 = "如果先把能進行太陽能發電的裝置準備好，就能隨時隨地幫手機充電，不是嗎？"
10030010-134 = "……想幫手機充電的話，有行動電源就綽綽有餘了。"
10030010-135 = "又不是要在野外使用冰箱，沒必要帶發電裝置吧？"
10030010-139 = "還有這是……"
10030010-140 = "……攜帶型衛星天線？"
10030010-141 = "這，這是為了在遇難時發送求救訊號。"
10030010-142 = "既然要去沒有訊號的偏僻地點，用普通天線會收不到電波……"
10030010-143 = "我們又不是要去必須使用這種定向天線的地方……"
10030010-144 = "而且這怎麼看都是網路設備用的天線！"
10030010-145 = "還有這個是……"
10030010-149 = "……設立NAS伺服器專用的雲端電腦？"
10030010-154 = "你們是想在露營場架設簡易通訊站嗎！？"
10030010-159 = "因為想到超過一天不能上網我就會很焦慮……"
10030010-160 = "而且最近也有數位遊牧民這個概念出現呢。"
10030010-161 = "別的就算了，能不能帶可以上網的設備去？"
10030010-163 = "不行，把帶來的電子設備全部放回部室裡。"
10030010-164 = "我再說一次，這次旅行是為了稍微緩解你們網路成癮的特別措施──"
10030010-165 = "這兩天就忘了露營場以外的事，好好休息吧。"
10030010-168 = "要我們在沒有網路的情況下休息，實在太強人所難了……"
10030010-169 = "這就是被社會隔離的囚犯的所感受到的心情嗎……"
10030010-170 = "難得有機會能在老師身邊待一天，居然不能帶高音質錄音裝備……"
10030010-173 = "廚具、帳篷、食材、禦寒工具都準備就緒……"
10030010-174 = "這樣露營需要準備的物品應該就帶齊了。"
10030010-179 = "那麼大家打起精神，一起去露營場吧！"
10030010-180 = "[s]「哦～！」"
10030010-183 = "嗚嗚嗚……"

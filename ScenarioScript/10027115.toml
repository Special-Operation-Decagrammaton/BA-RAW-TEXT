[translation]
10027115-14 = "เซอร์เคิล"
10027115-16 = "......"
10027115-17 = "สุดท้าย <ชมรมแนวร่วมปลดปล่อยความรู้> ก็ทำเวลาไม่ทันสินะ"
10027115-18 = "แต่ฉันก็เดาไว้แล้วละว่าต้องเป็นแบบนี้ ปาฏิหาริย์มันเป็นสิ่งที่ไม่เกิดขึ้น ก็เลยถูกเรียกว่าปาฎิหาริย์#nหรือเปล่านะ"
10027115-19 = "งั้นก็ช่วยไม่ได้ ฉันเองก็มีข้อยึดถือในการรักษาความยุติธรรมในฐานะของนักวิจารณ์และประธานชมรม#nอย่างเป็นทางการ"
10027115-20 = "หวังว่าครั้งหน้าเราจะมีโอกาสได้เจอกันในรูปแบบอื่นนะ งั้นครั้งนี้ก็คงแค่นี้..."
10027115-25 = "รอก่อน!!!"
10027115-26 = "<ชมรมแนวร่วมปลดปล่อยความรู้> มาถึงพอดีเลยค่ะ!"
10027115-28 = "โกหกน่า... ทำต้นฉบับเสร็จสมบูรณ์ได้ในเวลาแค่นี้จริงๆ เหรอคะ?!"
10027115-30 = "ใช่แล้ว... เอาไปเลย!"
10027115-35 = "นี่มัน... เล่มจบจริงด้วย...!"
10027115-44 = "ยืนยันการส่งต้นฉบับและการรับคำร้องเรียบร้อยแล้วค่ะ"
10027115-45 = "พูดตามตรง ฉันแทบไม่อยากเชื่อในบางเรื่องเลยนะคะ... พวกคุณไม่ได้ใช้วิธีผิดกฎหมายอะไร#nกลางคันใช่ไหมคะ?"
10027115-47 = "นี่เห็นพวกเราเป็นตัวอะไรกันเนี่ย..."
10027115-53 = "[ns] \"ทุกคน... ตั้งใจ... ทำขึ้นมา... จริงๆ นะ...\""
10027115-54 = "คะ... คุณครู?! ถ้าเป็นลมล้มพับไปตรงนี้ละก็...!"
10027115-55 = "[s] \"ไม่เป็นไร ครูยังไหว! ครูทนมาขนาดนี้แล้ว!\""
10027115-56 = "...ไม่เป็นไรแน่นะคะ?"
10027115-58 = "แต่ถ้าพวกเราไม่ได้คุณครูช่วยไว้... ก็คงทำงานนี้ไม่สำเร็จแน่ๆ ค่ะ"
10027115-59 = "...กว่าจะมาถึงที่นี่ได้ก็ว่าทรหดแล้ว แต่ไหนจะต้องเจอกับสำนักเลขาธิการกับชมรมผู้รับจ้างอีก... เฮ้อ..."
10027115-61 = "ฉันไม่รู้หรอกนะว่าทำไมพวกคุณถึงเอ่ยถึงสำนักเลขาธิการกับชมรมผู้รับจ้าง แต่ยังไงก็เข้าใจแล้วค่ะ"
10027115-62 = "จะว่าไป ทั้งสองคนเหมือนจะคืนดีกันแล้วสินะคะ?"
10027115-64 = "เราไม่ได้ทะเลาะอะไรกันรุนแรงตั้งแต่แรกอยู่แล้ว เรื่องแค่นั้นน่ะเรื่องธรรมดาๆ!"
10027115-65 = "...รุ่นพี่เมรุ?"
10027115-66 = "...ไม่สิ อืม ขอโทษนะ ก็พวกเราขอโทษต่อกันอย่างจริงใจและคืนดีกันแล้ว..."
10027115-68 = "เข้าใจแล้วค่ะ ก่อนอื่นฉันต้องขอแสดงความยินดีด้วยนะคะ ส่วนเรื่องเนื้อหาและคุณภาพของต้นฉบับน่ะ..."
10027115-69 = "......"
10027115-70 = "ถึงจะไม่ได้เปิดดู แต่ดูจากพวกคุณทั้งสองก็พอเดาได้แล้วค่ะ"
10027115-72 = "เหอะ! ไม่ตรงไปตรงมาอีกแล้วนะ รู้ไว้ด้วยว่าทีตอนแบบนี้น่ะเธอไม่เนียนเอาซะเลย ที่จริงเธอคิดว่า#nคุณเมรุจะทำไม่ได้ใช่ไหม? แต่พอทำได้ก็ทั้งตกใจและประทับใจเลยละสิท่า?"
10027115-73 = "สมแล้วที่เป็นคุณเมรูริ... คนที่ทั้งลึกซึ้งและยอดเยี่ยม คนที่ไม่สามารถเข้าใจได้ด้วยบรรทัดฐานแคบๆ และบิดเบี้ยวของฉัน! เธอกำลังคิดแบบนี้ในใจล่ะสิ?!"
10027115-74 = "คนอย่างคุณนี่มัน...!"
10027115-79 = "ตกใจหมดเลย!! จะเอาถึงขนาดนี้เลยเหรอ!"
10027115-80 = "คุณเองก็ด้วยค่ะ มาถึงขนาดนี้แล้วยังไม่เปลี่ยนเลยนะ!"
10027115-81 = "ฉันต่างหากที่ต้องพูดแบบนั้น!"
10027115-83 = "ถ้าเจอเรื่องแบบนั้นมาได้แล้ว ก็ลองทำตัวให้โตขึ้นดูสักหน่อยเถอะค่ะ!"
10027115-84 = "เธอคงไม่รู้อะไรสินะ ฉันน่ะก็โตขึ้นๆ ทุกวันนั่นแหละ!"
10027115-89 = "[ns1] \"เอาละๆ พวกเราทำต้นฉบับมาเสร็จแล้ว\"\n[ns2] \"ที่เหลือก็แค่ให้ทาคาเนะช่วยดูต้นฉบับให้\""
10027115-93 = "...ฉันคิดไว้อยู่แล้วละค่ะว่านับตั้งแต่ทั้งสองคนนี้คืนดีกัน เรื่องที่ออกมาก็น่าจะเปลี่ยนไป..."
10027115-94 = "แต่ยังไงขั้นตอนก็ต้องเป็นขั้นตอน และบทวิจารณ์ในฐานะนักวิจารณ์ก็คือบทวิจารณ์ค่ะ"
10027115-95 = "งั้นก็ดีค่ะ คุณเมรูริ ฉันจะอ่านต้นฉบับของคุณให้ค่ะ"
10027115-103 = "เอาละๆๆ พักนอกเวลากันแป๊บหนึ่งค่ะ"
10027115-105 = "หืม? ใครน่ะ...?"
10027115-106 = "อุ๊ย?"
10027115-112 = "ทำได้จริงด้วยสินะคะ เมรุ ฉันคิดไว้แล้วค่ะว่าต้องเป็นอย่างนี้"
10027115-114 = "ยาคุโมะ?!"
10027115-115 = "คะ... คุณบรรณาธิการ? ไม่สิ หัวหน้า??"

[translation]
10027115-14 = "Fanfic Convention"
10027115-16 = "..."
10027115-17 = "So... After all that, the Knowledge Liberation Front still missed its deadline."
10027115-18 = "I can't say I'm surprised. It would have taken a miracle for them to pull that off."
10027115-19 = "It's too bad I can't help. But as a critic and club president, I must remain impartial."
10027115-20 = "Perhaps our paths will cross in another, more meaningful way in the future. So long..."
10027115-25 = "Wait!!"
10027115-26 = "The Knowledge Liberation Front is here and ready to submit our entry!"
10027115-28 = "You finished your manuscript?!"
10027115-30 = "That's right! Here!"
10027115-35 = "Well, you certainly know how to make an entrance."
10027115-44 = "Consider your manuscript received."
10027115-45 = "Though I still can't believe it. You didn't do anything illegal, did you?"
10027115-47 = "Who do you take us for?!"
10027115-53 = "[ns] \"We all worked really hard on it...\""
10027115-54 = "S-Sensei?! You look like you're going to collapse!"
10027115-55 = "[s] \"It's okay. I haven't dropped yet!\""
10027115-56 = "Hm... If you're sure..."
10027115-58 = "We definitely couldn't have done it without your help, Sensei..."
10027115-59 = "...Just getting here was a battle. First the Secretariat Office, then the Labor Party... Phew!"
10027115-61 = "I'm not sure what the Secretariat Office and Labor Party have to do with your entry."
10027115-62 = "But I'm glad to see you two have made up."
10027115-64 = "Oh, that was just a minor disagreement. Nothing, really, in the grand scheme of things—"
10027115-65 = "Uh, Meru?"
10027115-66 = "Sorry. Yes, we apologized to each other and made up..."
10027115-68 = "Then you have my congratulations. Regarding the content and quality of the manuscript..."
10027115-69 = "..."
10027115-70 = "I don't need to read it to know what to expect. Judging by the state of you two—"
10027115-72 = "Hmph! You're putting on the old disingenuous act again, which means... You're actually surprised that I pulled it off, aren't you? And is that a hint of...admiration?!"
10027115-73 = "You're probably thinking, \"Classic Meruri... She's so brilliant and awesome that my limited mind just can't understand her!\""
10027115-74 = "Augh! Who do you think you are?!"
10027115-79 = "Ah, there's the Takane we all know and loathe!"
10027115-80 = "You're one to talk! You haven't changed one bit!"
10027115-81 = "You took the words right out of my mouth!"
10027115-83 = "After all you've been through, I thought you'd have grown up a bit."
10027115-84 = "I'm always growing up! In fact, I'm as grown up as it gets!"
10027115-89 = "[ns1] \"Now, now. We've finally finished the manuscript.\"\n[ns2] \"We just need to stay civil long enough for Takane to review it.\""
10027115-93 = "Hm... Now that you two have reconciled, it seems the tables have turned."
10027115-94 = "Anyway, procedure is procedure, and a critic must remain impartial."
10027115-95 = "All right, Meruri. I'll review your manuscript now."
10027115-103 = "Whoa, whoa! Time out!"
10027115-105 = "Huh? Who...?"
10027115-106 = "Oh?"
10027115-112 = "Wow! I knew you could do it, Meru."
10027115-114 = "Yakumo?!"
10027115-115 = "Is that...the President?!"

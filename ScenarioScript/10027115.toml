[translation]
10027115-14 = "同人會場"
10027115-16 = "……"
10027115-17 = "結果還是沒能趕上呢……「知識解放戰線」。"
10027115-18 = "不過某種程度上也在意料之內──奇蹟就是因為不會發生才叫做奇蹟啊。"
10027115-19 = "沒辦法。#n身為評論家和後援會會長，我必須保持公平公正的態度。"
10027115-20 = "希望之後還有機會和緣分，這次就……"
10027115-25 = "等等！！！"
10027115-26 = "「知識解放戰線」抵達了！"
10027115-28 = "……怎麼可能。#n你們真的在四天的時間內完成了同人誌嗎！？"
10027115-30 = "沒錯……拿去吧！"
10027115-35 = "這個的確是……！"
10027115-44 = "你們的作品我確實收到了。"
10027115-45 = "不過老實說，我仍然無法相信……#n你們該不會偷偷用了什麼違法的手段吧？"
10027115-47 = "你把我們當成什麼人了啊……"
10027115-53 = "[ns]「這都是……大家……拚命得來的……成果……」"
10027115-54 = "老，老師！？要是現在突然昏倒的話……！"
10027115-55 = "[s]「沒事！我撐住了！」"
10027115-56 = "……老師真的沒事吧？"
10027115-58 = "要是沒有老師的協助……我們肯定無法完成這部作品。"
10027115-59 = "光是來這裡的路上就遇到了事務局、工務部，還有……唉……"
10027115-61 = "雖然不清楚這件事跟事務局和工務部有什麼關係，總之我明白了。"
10027115-62 = "這麼說來……你們兩位似乎已經和好了呢。"
10027115-64 = "其實我們本來就沒有吵得多兇，這種程度嚴格來說──"
10027115-65 = "……愛瑠前輩？"
10027115-66 = "……不，沒什麼，抱歉。#n我們已經道過歉也和好了……"
10027115-68 = "我明白了。總之先恭喜你們吧。#n至於同人誌的內容和品質……"
10027115-69 = "……"
10027115-70 = "光看各位的表情就大概猜得出來了。"
10027115-72 = "哼，又拐彎抹角的，你這就叫做欲蓋彌彰。#n你本來覺得辦不到的事，我愛瑠大人卻辦到了。你很驚訝對吧？很佩服對吧？"
10027115-73 = "「Meruri老師……果然是我那狹隘又偏頗的眼界無法評價的那種高深莫測的人！」#n……你現在一定是這麼想的對吧！？"
10027115-74 = "你這個人真的是……！"
10027115-79 = "嚇死我了！？為什麼還是毫無長進啊！"
10027115-80 = "你才毫無長進！"
10027115-81 = "那是我要說的台詞！"
10027115-83 = "經歷這麼多事之後，多少該要有些成長才對吧！"
10027115-84 = "我看你好像不太明白，但我可是隨時隨地都在成長！"
10027115-89 = "[ns1]「好了好了，既然我們已經完成同人誌。」\n[ns2]「接下來就只剩讓貴音評鑑了。」"
10027115-93 = "從你們兩位和好的時間點開始，情況似乎就有所改變了呢……"
10027115-94 = "不過該走的程序還是要走，身為一名評論家的評論也一樣要給。"
10027115-95 = "那麼Meruri同學，就讓我來看看你的同人誌吧。"
10027115-103 = "暫停暫停，中場休息時間到囉。"
10027115-105 = "嗯？是誰……？"
10027115-106 = "哎呀？"
10027115-112 = "哎呀～你真的辦到了呢，愛瑠。#n我果然沒有看錯人。"
10027115-114 = "八雲！？"
10027115-115 = "主，主編？不對，部長！？"

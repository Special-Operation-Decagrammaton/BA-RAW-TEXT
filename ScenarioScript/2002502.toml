[translation]
2002502-1 = "製作門松"
2002502-2 = "（新年到來，決定去找遙香）"
2002502-4 = "（……卻因為下雪而迷路了）"
2002502-5 = "[ns] 「…………」"
2002502-8 = "唔嗯……這樣可以嗎……"
2002502-9 = "……不行，應該還有其他更適合的才對……"
2002502-10 = "[s1]「……遙香的聲音？」\n[s2] 朝著聲音傳來的方向走去"
2002502-18 = "唔……這樣下去的話……"
2002502-19 = "明明沒有時間了……該怎麼辦……"
2002502-20 = "[s3]「遙香，你好呀。」\n[s4]「在找什麼嗎？」"
2002502-21 = "……？"
2002502-22 = "……？"
2002502-23 = "……咦……？"
2002502-24 = "……！？！？老，老老老老老老師！？"
2002502-25 = "為，為為，為什麼會來這種地方……！？"
2002502-26 = "該，該不會，是我又誤傳了什麼訊息給老師……！？"
2002502-27 = "……果，果然是這樣吧！？"
2002502-28 = "對不起對不起對不起對不起對不起對不起……"
2002502-29 = "──我會以死謝罪！！"
2002502-30 = "……咦？#n新，新年的問候……？"
2002502-31 = "怎怎，怎麼會！#n為什麼要對我這種人……！？"
2002502-32 = "……？"
2002502-33 = "啊，那個，我剛才……"
2002502-34 = "在找……竹子。#n用來製作，「門松」的那種……"
2002502-35 = "那個，因為新年到了……想幫事務所的大家和老師……"
2002502-36 = "當，當然我很清楚，我這種人就算關心這種事也沒有意義……！"
2002502-37 = "可是為了慶祝新年，門松又是必要的……！"
2002502-38 = "啊……不，不過，我這種人做的門松……"
2002502-39 = "說不定根本沒用……？"
2002502-40 = "我，我果然又做了多餘的事……！！"
2002502-41 = "[s5]「別這麼說。我覺得那是個很好的想法。」\n[s6]「我可以跟你一起找嗎？」"
2002502-42 = "咦？一，一起……！？"
2002502-43 = "咦？一，一起……！？"
2002502-44 = "這，這這，這種事情……！！我一個人就夠了……！#n您不必特地幫忙也……！"
2002502-45 = "……啊，可是，拒絕老師的好意好像也不對……"
2002502-46 = "嗚……嗚嗚嗚……究竟該怎麼做才好……"
2002502-50 = "……我，我知道了。#n那麼……就，就拜託您了！我會拚命去找的！！"
2002502-52 = "（之後，和遙香一起找著適合的竹子）"
2002502-53 = "（……然而找了接近1個小時卻完全找不到）"
2002502-55 = "…………"
2002502-56 = "老，老師……那個……"
2002502-57 = "對，對不起……#n我該怎麼向您賠罪才好……"
2002502-58 = "[s7]「沒關係，別在意。」\n[s8]「明天再繼續找就可以囉。」"
2002502-59 = "可，可是……！不僅佔用了老師的時間，還拿不出任何成果……！"
2002502-60 = "可，可是……！不僅佔用了老師的時間，還拿不出任何成果……！"
2002502-61 = "這種事……果然只能用死來償還……！"
2002502-62 = "……咦……？"
2002502-63 = "您，您的意思是……？"
2002502-64 = "[s9]「重要的是遙香的心意哦。」\n[s10]「為大家著想的心情才是最重要的。」"
2002502-65 = "……"
2002502-66 = "……"
2002502-67 = "是……這樣嗎……？"
2002502-68 = "啊，沒什麼！一定是這樣沒錯！#n老師說的話不可能會錯的！"
2002502-72 = "那，那麼……不能再繼續佔用老師的時間了……"
2002502-73 = "今，今天就……先到這邊……"
2002502-75 = "（一邊鼓勵遙香一邊送他離開，之後回到了夏萊）"
2002502-77 = "（隔天，再次來找遙香）"
2002502-81 = "這樣……沒問題嗎……？"
2002502-86 = "真的對嗎……？#n果然還是有點奇怪……"
2002502-92 = "[ns11] 往發出聲音的方向走\n[ns12] 「遙香，你在嗎……？」"
2002502-93 = "……？剛才好像有什麼聲音……？"
2002502-94 = "……？剛才好像有什麼聲音……？"
2002502-95 = "……！？"
2002502-96 = "噫，噫噫噫噫噫噫！？"
2002502-99 = "― 噫，噫噫……！？[wa:1040] "
2002502-101 = "― 啊，啊……老師……！？您，您什麼時候……！？[wa:4200] "
2002502-104 = "― 不，不是！那個，[wa:1400] "
2002502-106 = "― 我沒有要特別計較這種事的意思！！真的！！[wa:3480] "
2002502-109 = "― 咦，總覺得以前也發生過……[wa:4140] "
2002502-111 = "― 類似的事情……"
2002502-114 = "― 什，什麼……？這個嗎？[wa:3540] "
2002502-116 = "― 這是……門松……[wa:1660] "
2002502-119 = "― 老，老師說這種東西看重的是心意，[wa:4280] "
2002502-121 = "― 所以……"
2002502-124 = "― 這樣的話，我想我一路栽培的[wa:1000] "
2002502-126 = "― 這孩子應該不錯……[wa:1960] "
2002502-129 = "― 難，難道，[wa:990] "
2002502-131 = "― 我又做了多餘的事了嗎……！？[wa:960] "
2002502-134 = "― 對不起對不起對不起對不起對不起……[wa:740] "
2002502-137 = "[ns13]「別這麼說，我覺得很棒。」\n[ns14]「真漂亮呢，遙香真厲害。」"
2002502-138 = "― 咦，嗯……！？什麼……？[wa:4050] "
2002502-139 = "― 咦，嗯……！？什麼……？[wa:4050] "
2002502-141 = "― 真，真的……嗎……？[wa:2960] "
2002502-144 = "― 沒問題……嗎……？[wa:1640] "
2002502-147 = "― ……嘿……"
2002502-149 = "― ……嘿嘿……"
2002502-152 = "（之後和遙香一人各拿一個門松，前往了事務所）"

[translation]
2002502-1 = "Making Kadomatsu"
2002502-2 = "I went to visit Haruka's place for New Year's. I thought I knew where to go, but..."
2002502-4 = "I got lost. It snowed overnight, and I couldn't find the path."
2002502-5 = "[ns] \"...\""
2002502-8 = "Hmm... Would this work?"
2002502-9 = "No, t-this isn't good enough! I need something...something that compliments them..."
2002502-10 = "[s1] \"Is that...Haruka?\"\n[s2] Look for the source of the voice."
2002502-18 = "Uh oh, If things keep on like this..."
2002502-19 = "I'm going to run out of time... How do I..."
2002502-20 = "[s3] \"Hello, Haruka.\"\n[s4] \"Are you looking for something?\""
2002502-21 = "...Huh?"
2002502-22 = "...Huh?"
2002502-23 = "Um..."
2002502-24 = "Eeeeek! S-Sensei?!"
2002502-25 = "Wh-What are you doing here?"
2002502-26 = "Is it my fault? D-Did I pocket dial you again?"
2002502-27 = "Oh no. Oh no oh no that must be it!"
2002502-28 = "Sorry. SorryI'msorryI'msorryI'msorryI'msorry..."
2002502-29 = "There's no way...no way I can make it up to you this time... I wanna die..."
2002502-30 = "Huh? Wh-What do you mean, it's nothing like that?"
2002502-31 = "Why...would you come all this way...j-just to say hello to someone like me?!"
2002502-32 = "...What?"
2002502-33 = "You wanna know...what I was doing here? Oh, um..."
2002502-34 = "Just...looking for a tree...to make kadomatsu with..."
2002502-35 = "It's New Year's, and I just...just wanted to take care of e-everyone in the office...and you too, Sensei."
2002502-36 = "B-But someone like me could never! Could never even hope to help all of you! I know that."
2002502-37 = "So I thought, maybe, I...I could make you kadomatsu instead... And then, it would be the kadomatsu making the wishes, not me, so it would be okay..."
2002502-38 = "H-Hmm...? You...think it's the same?"
2002502-39 = "Oh. I... I see... Since I'm the one making the kadomatsu...then of course they would be worthless, after all."
2002502-40 = "Of course, I'm just... I'm just wasting time like always..."
2002502-41 = "[s5] \"It's a good idea. Let me help.\"\n[s6] \"Can I look with you?\""
2002502-42 = "H-Huh? Y-You...you want to do that, Sensei? Together?"
2002502-43 = "H-Huh? Y-You...you want to do that, Sensei? Together?"
2002502-44 = "No! Why? Th-That doesn't make sense, Sensei! This is something I need to do, so... So you shouldn't pay any attention to it!"
2002502-45 = "B-But, oh no... If I refuse the favor, that's even more t-terrible..."
2002502-46 = "What...what do I do... I don't..."
2002502-50 = "Um, okay! I'll accept your help then! And...I'll spend the rest of my life trying to thank you!"
2002502-52 = "Haruka and I spent some time looking for good trees, but..."
2002502-53 = "Even after an hour tromping around in the snow, we couldn't find any bamboo or pines."
2002502-55 = "Uh... Um... Uh..."
2002502-56 = "Sensei...um..."
2002502-57 = "Now...after this...even my whole life won't be enough to repay you..."
2002502-58 = "[s7] \"Don't worry about it, Haruka.\"\n[s8] \"It's fine. You can look again tomorrow.\""
2002502-59 = "B-But! I wasted your time! W-We didn't even find anything!"
2002502-60 = "B-But! I wasted your time! W-We didn't even find anything!"
2002502-61 = "It's unforgivable...absolutely unforgivable...to take up your time w-with nothing to show for it... There's absolutely no way to m-make it right..."
2002502-62 = "...Huh?"
2002502-63 = "You're saying it doesn't even have to be a bamboo or a pine tree? H-How could that be?"
2002502-64 = "[s9] \"What's most important is your intent, not details like that.\"\n[s10] \"Your wish to help everyone... I know it'll make the God of the New Year happy.\""
2002502-65 = "Huh? Is... that so?"
2002502-66 = "Huh? Is... that so?"
2002502-67 = "So then..."
2002502-68 = "W-Wait! No! Not \"is that so.\" Y-You said it, Sensei, so it must be true! Absolutely! Completely! I can't doubt that!"
2002502-72 = "B-But for now... For today... N-No matter what, I really, really can't take up any of your time... So... I'll be going..."
2002502-73 = "O-Okay."
2002502-75 = "Haruka and I went our separate ways, and I returned to Schale to finish up some work."
2002502-77 = "The next morning, I visited Haruka again."
2002502-81 = "Hmm... Is this really okay?"
2002502-86 = "It maybe...actually looks a little weird, but..."
2002502-92 = "[ns11] Head to the source of the voice.\n[ns12] Wave and call to Haruka."
2002502-93 = "...? Uh... A-A sound?"
2002502-94 = "...? Uh... A-A sound?"
2002502-95 = "...?!"
2002502-96 = "Ahhhhhh!"
2002502-99 = "― E-Eek![wa:1120] "
2002502-101 = "― A-Ah... Sensei?! Since when have you been...!?[wa:3240] "
2002502-104 = "― No! It's not like that![wa:800] "
2002502-106 = "― I'm really, really, really not complaining! Really![wa:2240] "
2002502-109 = "― Um...does this seem...[wa:3780] "
2002502-111 = "― familiar maybe?"
2002502-114 = "― H-Huh...? You mean this?[wa:3020] "
2002502-116 = "― It's...my kadomatsu...[wa:1100] "
2002502-119 = "― You said... Y-You told me that intentions are most important for[wa:2360] "
2002502-121 = "― this kind of thing..."
2002502-124 = "― So I thought...[wa:920] "
2002502-126 = "― I thought something I-I spent a long time raising might be good...[wa:10] "
2002502-129 = "― B-But maybe I[wa:670] "
2002502-131 = "― did something useless, yet again...[wa:120] "
2002502-134 = "― I'msorryI'msorryI'msorryI'msorryI'msorry![wa:10] "
2002502-137 = "[ns13] \"No. That's an incredible kadomatsu!\"\n[ns14] \"You made something amazing. You're amazing, Haruka!\""
2002502-138 = "― Uh...huh?![wa:4130] "
2002502-139 = "― Uh...huh?![wa:4130] "
2002502-141 = "― What? ...R-Really?[wa:2640] "
2002502-144 = "― It's...really okay?[wa:1240] "
2002502-147 = "― ...Hee..."
2002502-149 = "― Heehee..."
2002502-152 = "Haruka and I walked to the office together, each carrying a kadomatsu."

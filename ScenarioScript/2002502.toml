[translation]
2002502-1 = "ทำคาโดมัตสึ"
2002502-2 = "(คุณครูไปที่ฐานลับของฮารุกะในช่วงปีใหม่โดยที่คิดว่าจำเส้นทางไปได้อย่างแม่นยำ...)"
2002502-4 = "(สุดท้ายคุณครูก็หลงทาง เพราะถึงจะจำเส้นทางได้ แต่หิมะที่ตกหนักทั้งคืนจนหิมะกองสูง ทำให้#nคุณครูหาเส้นทางไม่เจอ)"
2002502-5 = "[ns] \"...\""
2002502-8 = "อืม... เอาอันนี้ได้มั้ยนะ..."
2002502-9 = "หรือไม่เหมาะนะ... คิดแล้วเชียวว่าอันนี้คงไม่ดีพอ... มันควรจะต้อง... เป็นของที่เหมาะกับพวกเขามาก#nกว่านี้หน่อย..."
2002502-10 = "[s1] \"เสียงฮารุกะ...?\"\n[s2] เดินไปตามทางที่ได้ยินเสียง"
2002502-18 = "อืม... ขืนเป็นแบบนี้..."
2002502-19 = "ไม่มีเวลาแล้วด้วย ทำยังไงดี..."
2002502-20 = "[s3] \"ว่าไง ฮารุกะ\"\n[s4] \"หาอะไรอยู่เหรอ?\""
2002502-21 = "หือ...?"
2002502-22 = "หือ...?"
2002502-23 = "เอ่อ..."
2002502-24 = "อะ...เอ๋~?!! คะ... คุณครู?!"
2002502-25 = "คะ... คุณครูมาที่แบบนี้ทำไมเหรอคะ...!?"
2002502-26 = "ระ... หรือว่าฉันทำอะไรผิดอีกแล้ว.... หรือว่าฉันเผลอส่งข้อความผิดไปหาคุณครูอีกแล้วงั้นเหรอคะ!!"
2002502-27 = "คะ...คงเป็นแบบนั้นใช่มั้ยล่ะคะ?!"
2002502-28 = "ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ..."
2002502-29 = "ฉันจะชดใช้ความผิดด้วยความตาย... เดี๋ยวนี้เลยค่ะ!!"
2002502-30 = "คะ?...ไม่ใช่อย่างนั้นเหรอคะ?"
2002502-31 = "คะ...แค่แวะมาทักทายอย่างนั้นเหรอคะ? ทะ...ทำไมกัน ทำไมคุณครูถึงคิดจะมาทักทายคนอย่างฉัน#nกันล่ะคะ...?!"
2002502-32 = "คะ...?"
2002502-33 = "ฉันมาทำอะไรอยู่ตรงนี้งั้นเหรอคะ? เอ่อ... คือว่าฉัน... ก็แค่จะ.... เอ่อ..."
2002502-34 = "ฉันกำลังหา... ต้นไม้อยู่ค่ะ... ใช่ค่ะ... ต้นไม้สำหรับทำ <คาโดมัตสึ> ค่ะ..."
2002502-35 = "ตอนนี้ก็ขึ้นปีใหม่แล้ว ฉันก็แค่... แค่อยากทำเพื่อทุกคนในสำนักงานและคุณครู..."
2002502-36 = "นะ...แน่นอนว่าถึงคนอย่างฉันจะทำแบบนี้ไปมันก็คงไม่ได้มีความหมาย หรือช่วยทุกๆ คนได้เท่าไหร่...#nฉันรู้ดีค่ะ"
2002502-37 = "แต่คาโดมัตสึมันไม่เหมือนกันนะคะ! มันคือสิ่งที่จะอวยพรแก่ทุกคน ไม่ใช่ตัวฉัน เพราะงั้นฉันเลยคิดว่า#nมันน่าจะไม่เป็นไร..."
2002502-38 = "คะ...คะ? คะ...คุณครูคิดว่ายังไงมันก็เหมือนกันงั้นเหรอคะ?"
2002502-39 = "งะ...งั้นเหรอคะ... จริงสินะ คาโดมัตสึที่ฉันเป็นคนทำ มันอาจกลายเป็นคาโดมัตสึที่ไร้ประโยชน์ก็ได้..."
2002502-40 = "ฉะ...ฉันทำอะไรไม่เข้าเรื่องอีกแล้วสินะคะ...!!"
2002502-41 = "[s5] \"แต่ครูว่ามันเป็นเรื่องดีนะ เดี๋ยวครูช่วยเอง\"\n[s6] \"ให้ครูช่วยหาดีมั้ย?\""
2002502-42 = "คะ...!? คุณครูจะช่วยหา... ด้วยกันเหรอคะ...!?"
2002502-43 = "คะ...!? คุณครูจะช่วยหา... ด้วยกันเหรอคะ...!?"
2002502-44 = "แต่จะให้คุณครูทำแบบนั้นได้ยังไง!! เรื่องแบบนี้ให้ฉันจัดการเองเถอะค่ะ! อย่าใส่ใจเลยนะคะ...!!"
2002502-45 = "มะ...ไม่สิ ฉันไม่ควรปฏิเสธน้ำใจของคุณครูแบบนี้..."
2002502-46 = "อะ... อืม... ถ้างั้นฉันควรทำยังไงดี..."
2002502-50 = "ถะ...ถ้างั้นก็ขอรบกวนด้วยนะคะ!! ฉะ...ฉันจะใช้เวลาที่เหลืออยู่ในชีวิตนี้สำนึกบุญคุณคุณครูค่ะ!"
2002502-52 = "(คุณครูกับฮารุกะใช้เวลาช่วยกันหาต้นไม้ดีๆ ในบริเวณนั้น...)"
2002502-53 = "(ถึงจะใช้เวลาหาต้นไผ่กับต้นสนมาเกือบชั่วโมงแล้วแต่ก็ยังหาไม่เจอ...)"
2002502-55 = "เอ่อ อืม... คือว่า..."
2002502-56 = "คุณครู... คือว่า..."
2002502-57 = "ในเมื่อมันเป็นแบบนี้ไปแล้ว... ตะ...ตอนนี้ใช้ทั้งชีวิตตอบแทนคุณครูก็คงไม่พอแล้วละค่ะ..."
2002502-58 = "[s7] \"ไม่เป็นไรหรอก ไม่ต้องกังวลนะ ฮารุกะ\"\n[s8] \"ไม่เป็นไร พรุ่งนี้ค่อยหาใหม่ก็ได้นี่นา\""
2002502-59 = "ตะ... แต่ว่า! ฉันรบกวนเวลาของคุณครู...!! ฉันคงหาของไม่ละเอียดเองค่ะ!!"
2002502-60 = "ตะ... แต่ว่า! ฉันรบกวนเวลาของคุณครู...!! ฉันคงหาของไม่ละเอียดเองค่ะ!!"
2002502-61 = "ขนาดรบกวนเวลาอันมีค่าของคุณครูแล้วแต่ก็ยังหาไม่เจอ แบบนี้ฉันต้องชดใช้ด้วยความตายสถาน#nเดียวแล้วค่ะ...!!"
2002502-62 = "คะ...?"
2002502-63 = "สิ่งสำคัญคือความรู้สึก ไม่ใช่วัตถุ... เพราะงั้นไม่จำเป็นต้องใช้ต้นไผ่หรือต้นสนก็ได้เหรอคะ? มะ...หมาย#nความว่ายังไงคะ..."
2002502-64 = "[s9] \"สิ่งสำคัญคือความหวังดีของฮารุกะที่มีต่อทุกคนไงล่ะ\"\n[s10] \"ครูมั่นใจว่าเทพเจ้าจะต้องรับรู้ถึงความรู้สึกนั้นแน่นอน\""
2002502-65 = "หืม...? ยะ... อย่างนั้นเหรอคะ...?"
2002502-66 = "หืม...? ยะ... อย่างนั้นเหรอคะ...?"
2002502-67 = "อย่างนั้นเหรอ..."
2002502-68 = "มะ... ไม่สิ! ไม่ใช่ 'อย่างนั้นเหรอคะ' สิ ถ้าคุณครูพูดแบบนั้นก็คงจะต้องเป็นแบบนั้นแน่ๆ ถะ...ถ้าไม่ใช่ละก็#nฉันจะรับผิดชอบโดยการปลิดชีวิตตัวเองค่ะ!!"
2002502-72 = "ถะ... ถ้างั้น... วันนี้... ฉันขอรบกวนเวลาคุณครูเพียงเท่านี้ดีกว่าค่ะ ถะ...ถ้างั้นฉันขอตัวก่อน..."
2002502-73 = "คะ...ค่ะ..."
2002502-75 = "(คุณครูไปส่งฮารุกะพร้อมกับปลอบใจเธอ จากนั้นก็กลับมาทำงานที่ค้างอยู่ต่อ...)"
2002502-77 = "(วันต่อมา... คุณครูก็มาที่ฐานลับของฮารุกะตั้งแต่เช้าตรู่)"
2002502-81 = "อืม... อันนี้... พอจะได้มั้ยนะ?"
2002502-86 = "ชะ... ใช่หรือเปล่านะคะ? แต่มันก็ยังดูแปลกๆ อยู่ดี..."
2002502-92 = "[ns11] เดินไปตามทางที่ได้ยินเสียง\n[ns12] โบกมือเรียกฮารุกะ"
2002502-93 = "...? เอ่อ... เมื่อกี้ได้ยินเสียงบางอย่างด้วย..."
2002502-94 = "หืม...? เมื่อกี้เสียงอะไรน่ะ..."
2002502-95 = "...!?"
2002502-96 = "อะ...เอ๋~~~~!?!"
2002502-99 = "― อะ...เอ๋~~...!?[wa:760] "
2002502-101 = "― อะ... เอ่อ... คุณครู...!? มะ... มาตั้งแต่เมื่อไรคะ!?[wa:3000] "
2002502-104 = "― เปล่านะคะ! คือว่า...[wa:920] "
2002502-106 = "― ฉันไม่ได้บ่นอะไรเลยนะคะ!! จริงๆ นะคะ!![wa:2760] "
2002502-109 = "― เอ๋... เหมือนเคยเกิดเหตุการณ์...[wa:3380] "
2002502-111 = "― คล้ายๆ กันมาก่อนเลย..."
2002502-114 = "― คะ... คะ...? อันนี้เหรอคะ?[wa:2940] "
2002502-116 = "― มันคือ... คาโดมัตสึค่ะ...[wa:980] "
2002502-119 = "― คุณ... คุณครูบอกเองว่าสิ่งสำคัญคือความรู้สึก...[wa:3040] "
2002502-121 = "― คะ...คุณครูพูดแบบนั้น..."
2002502-124 = "― ฉันเลย... คิดว่า...[wa:760] "
2002502-126 = "― ถ้าเป็นเด็กคนนี้ที่ฉันดูแลมานาน...ก็น่าจะใช้ได้...[wa:320] "
2002502-129 = "― ระ... หรือว่า...[wa:550] "
2002502-131 = "― ฉันทำอะไรไม่เข้าเรื่องอีกแล้วรึเปล่าคะ...!?[wa:10] "
2002502-134 = "― ขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะขอโทษค่ะ...[wa:10] "
2002502-137 = "[ns13] \"เปล่าหรอก คาโดมัตสึนี่สุดยอดเลยนะ!\"\n[ns14] \"สุดยอดเลย! ฮารุกะเก่งจังเลยน้า\""
2002502-138 = "― คะ...!? คะ...?[wa:3970] "
2002502-139 = "― คะ...!? คะ...?[wa:3970] "
2002502-141 = "― คือว่า... พูดจริง... เหรอคะ...?[wa:2120] "
2002502-144 = "― มัน...ไม่เป็นไรจริงๆ ใช่มั้ยคะ?[wa:760] "
2002502-147 = "― แหะๆ..."
2002502-149 = "― แหะๆ..."
2002502-152 = "(จากนั้นคุณครูกับฮารุกะก็ช่วยกันถือคาโดมัตสึกลับมาที่สำนักงาน)"

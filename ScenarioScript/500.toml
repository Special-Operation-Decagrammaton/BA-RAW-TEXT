[translation]
500-1 = "คราฟต์แชมเบอร์คืออะไร?"
500-2 = "คราฟต์แชมเบอร์"
500-3 = "งานที่ได้รับมอบหมายราบรื่นดีไหมคะ คุณครู"
500-4 = "ค่ะ ฉันเองค่ะ แบบนั้น... คือสีหน้าดีใจใช่ไหมคะ? เนอะ?"
500-5 = "...จะยังไงก็เถอะค่ะ"
500-6 = "ฉันจะพาไปดูรอบๆ อาคารของชาเล่ต์เองค่ะ"
500-7 = "ชั้นใต้ดินของอาคารชาเล่ต์ นี่เป็นอีกสิ่งหนึ่งที่ประธานองค์การนักเรียนทิ้งเอาไว้ให้คุณครูค่ะ\n"
500-8 = "จะเรียกว่าสิ่งของได้ไหมนะ.... ควรเรียกว่าอุปกรณ์อำนวยความสะดวกซะมากกว่าค่ะ"
500-10 = "<คราฟต์แชมเบอร์> "
500-11 = "ถ้าจะให้สรุปแล้วล่ะก็ มันคือเครื่องสร้างวัตถุชนิดหนึ่งที่มีแค่ผู้ดูแลกล่องแห่งซิสดิมเท่านั้นที่เปิดได้"
500-12 = "มันเหมือน...เครื่องพิมพ์หรือเปล่าคะ? ถึงจะไม่รู้วิธีใช้ก็เถอะ"
500-13 = "ฉันคิดว่ามันเป็นวัตถุหลงยุคที่มีแต่คุณเท่านั้นที่จะใช้ได้ค่ะ"
500-14 = "พวกเราไม่ค่อยสนใจของพวกของเล่นของประธานองค์การนักเรียนหรอกค่ะ..."
500-15 = "จะยังไงก็เถอะค่ะ"
500-16 = "ฉันแจ้งทุกอย่างไว้ชัดเจนแล้ว "
500-17 = "ถ้างั้นไว้เจอกันใหม่นะคะ"

[translation]
500-1 = "何謂工藝室"
500-2 = "工藝室"
500-3 = "工作還順利嗎，老師。"
500-4 = "是的，又是我。#n……這應該是很高興見到我的表情，對吧？"
500-5 = "……先不說那些了。"
500-6 = "我是來向您說明位於夏萊地下的「某個東西」的。"
500-7 = "夏萊的地下有某個聯邦學生會長留給老師的東西。"
500-8 = "該說是東西嗎……準確來說，或許該稱之為設施比較好。"
500-10 = "「工藝室」……"
500-11 = "簡單來說，這是只有「希迪姆的箱子」的管理者才能連接和操作的，能夠生產各種物質的機械。 "
500-12 = "類似大型的3D列印機……該這麼說嗎？我也不理解它的運作原理和構造。"
500-13 = "現在是只有老師才能啟動的歐帕茲，大概就是這麼回事。"
500-14 = "因為我們對這種聯邦學生會長的玩具沒什麼興趣……"
500-15 = "算了，先別討論不在的人了。"
500-16 = "我只是來說明而已。"
500-17 = "那麼，下次再見。"

[translation]
52130-1 = "ตอนที่ 13;ในปากงู"
52130-2 = "นี่ไม่ใช่เวลามาอยู่อย่างนี้..."
52130-3 = "ยูคาริ ตอนนี้ยูคาริอยู่ที่ไหน?"
52130-7 = "ยูคาริได้ไปสำรวจห้องหนังสือไม่ใช่เหรอ?"
52130-8 = "ว่าแต่ทำไมจู่ๆ เธอถึงรีบร้อนขึ้นมาล่ะ? หรือว่าสังเกตเห็นอะไรแปลกๆ เข้า?"
52130-9 = "ถ้าฉันเดาไม่ผิดละก็ คฤหาสน์หลังนี้คือกับดัก เราต้องรีบพาคนอื่นออกไปจากที่นี่..."
52130-13 = "ไม่สิ ตอนนี้ต้องรีบไปหาคุณครู [USERNAME] ก่อนเลย!"
52130-14 = "ท่านอาจารย์เหรอ? แต่เธอควรอธิบายก่อนนะ..."
52130-24 = "เจ้าพวกนี้... ปีศาจที่เจอเมื่อครั้งก่อนนี่นา!"
52130-25 = "ทำไมถึงมีเยอะขนาดนี้..."
52130-26 = "เรนเกะ ยังจำวิธีจัดการเจ้าพวกนี้ได้ใช่มั้ย?"
52130-27 = "กระสุนธรรมดาใช้กับพวกมันไม่ได้ แต่ยังไงเจ้าพวกนี้ก็หนีกฎฟิสิกส์ไม่พ้น เล็งที่พื้นแล้วปราบพวกมันเลย"
52130-28 = "วางใจฉันได้เลย!"

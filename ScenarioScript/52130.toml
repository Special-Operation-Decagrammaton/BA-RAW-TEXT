[translation]
52130-1 = "第13話;蛇之咽喉中"
52130-2 = "……現在不是發呆的時候。"
52130-3 = "紫呢……紫現在在哪裡？"
52130-7 = "紫不是去書齋那邊搜索了嗎？"
52130-8 = "話說你怎麼突然這麼著急？#n發現什麼異常了嗎？"
52130-9 = "如果我的預感沒錯的話，這座宅邸是個陷阱。#n必須立刻帶著大家撤離……"
52130-13 = "不，得馬上去找[USERNAME]老師才行！"
52130-14 = "要去找師父？#n就算要去也得先把原因說明清楚──"
52130-24 = "這些傢伙，是上次那些怪物！"
52130-25 = "什麼時候聚集了這麼多……"
52130-26 = "蓮華，還記得怎麼對付它們吧？"
52130-27 = "雖然普通子彈不管用，但它們也無法違反物理法則。#n只要瞄準地面就能壓制它們。"
52130-28 = "交給我吧！"

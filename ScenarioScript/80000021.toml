[translation]
80000021-1 = "เครื่องดื่มชูกำลังสูตรพิเศษ"
80000021-2 = "(คุณครูมาที่ห้องชมรมเวอริทัสเพื่อขอให้ฮาเระช่วยเหลืองานของชาเล่ต์)"
80000021-3 = "(เวลาผ่านไปประมาณ 5 ชั่วโมงหลังจากที่ฮาเระเริ่มลงมือทำงาน...)"
80000021-5 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
80000021-8 = "พอลองติดตามบันทึกการขายอาวุธผิดกฎหมายของพวกแยงกี้ดูแล้ว... ฉันเจอว่ามีโหนดที่ถูกใช้งาน#nอยู่ใกล้ๆ ด้วยนะ..."
80000021-9 = "หืม? เป็นอะไรเหรอ คุณครู?"
80000021-10 = "สีหน้าดูเหนื่อยๆ นะ"
80000021-11 = "[s] \"โทษที จู่ๆ ครูก็รู้สึกเหนื่อยๆ น่ะ\""
80000021-12 = "อา... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย"
80000021-13 = "แฮ็กเกอร์อย่างพวกเราทำงานสลับกลางวันกลางคืนกันนี่นะ เลยลืมไปสนิทเลยว่าตอนนี้น่าจะถึง#nเวลานอนของคุณครูแล้ว โทษทีนะ"
80000021-14 = "[s] \"ไม่เป็นไร ไม่ต้องคิดมากหรอก\""
80000021-18 = "[ns] \"มีเครื่องดื่มอะไรที่ช่วยให้หายง่วงบ้างมั้ย?\""
80000021-19 = "เครื่องดื่มที่ช่วยให้หายง่วงเหรอ? ตอนนี้กาแฟก็หมดแล้ว..."
80000021-23 = "อ๊ะ จริงด้วยสิ มีไอ้นั่นอยู่นี่นา"
80000021-30 = "เอ้า ดื่ม <มอนสเตอร์แม็กซ์> สักกระป๋องสิ คุณครู"
80000021-31 = "เครื่องดื่มชูกำลังที่มีคาเฟอีน ดื่มสักกระป๋องก็น่าจะหายง่วงแล้วล่ะ"
80000021-32 = "[s] \"ดูเหมือนดีไซน์จะแตกต่างจากที่เคยเห็นนิดหน่อยนะ\""
80000021-33 = "อื้อ มอนสเตอร์แม็กซ์รสช็อกโกแลตที่ผลิตออกมาเฉพาะเทศกาลวาเลนไทน์น่ะ"
80000021-34 = "มันลิมิเต็ดสุดๆ เลยหายากมาก ฉันเลยค่อนข้างหวงนิดหน่อย..."
80000021-35 = "แต่ถ้าเป็นคุณครูละก็ ฉันยินดีแบ่งให้แบบไม่หวงเลยนะ ถ้าอยากดื่มตอนไหนก็บอกได้ตลอดเลย"
80000021-41 = "(คุณครูรู้สึกหวั่นๆ กับมอนสเตอร์แม็กซ์รสช็อกโกแลตที่ฮาเระส่งมาให้ แต่พอได้ลองดื่มแล้วก็#nตาสว่างขึ้นมาทันที)"

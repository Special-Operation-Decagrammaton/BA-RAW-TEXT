[translation]
80000021-1 = "特別的能量飲料"
80000021-2 = "（為了委託晴幫忙夏萊業務的相關工作，來到了貝里塔斯的部室）"
80000021-3 = "（晴開始幫忙之後過了約五個小時……）"
80000021-5 = "貝里塔斯．社辦"
80000021-8 = "是這個節點吧。嗯，有不良學生販賣非法武器的交易紀錄……"
80000021-9 = "咦，你還好嗎？老師？"
80000021-10 = "總覺得你看起來非常累。"
80000021-11 = "[s]「抱歉，明明是我請你幫忙……」"
80000021-12 = "……啊，不過確實，已經這麼晚了啊。"
80000021-13 = "不好意思，我總是日夜顛倒……完全沒注意到。"
80000021-14 = "[s]「沒關係，別在意。」"
80000021-18 = "[ns]「有沒有什麼可以提神的飲料……？」"
80000021-19 = "提神的飲料……咖啡已經喝光了……"
80000021-23 = "啊，這麼說來。"
80000021-30 = "來，給你一罐「妖怪MAX」。"
80000021-31 = "裡面含有非常多咖啡因，我想喝完後很快就會清醒了。"
80000021-32 = "[s]「謝謝。咦，這個設計還是第一次看到呢。」"
80000021-33 = "嗯。這是今年情人節限定的「妖怪MAX」。"
80000021-34 = "因為是限定版的關係，可能已經買不到了……"
80000021-35 = "不過給老師喝的話完全沒問題。"
80000021-41 = "（晴給的巧克力口味「妖怪MAX」雖然味道相當刺激，不過確實讓人醒了過來）"

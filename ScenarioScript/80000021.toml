[translation]
80000021-1 = "Special Energy Drink"
80000021-2 = "I went to the Veritas club room to ask Hare for help on a problem."
80000021-3 = "About five hours later..."
80000021-5 = "Veritas Hackers' Lounge"
80000021-8 = "I tracked the transaction records for these illegal weapons sales.#nThey're using a nearby node."
80000021-9 = "Hmm? Are you okay?"
80000021-10 = "You look beat."
80000021-11 = "[s] \"Sorry. I got tired all of a sudden.\""
80000021-12 = "I didn't realize how late it was."
80000021-13 = "Sorry, I forgot normal people sleep around this time.#nHackers tend to be a bit nocturnal."
80000021-14 = "[s] \"I'll be okay. Don't worry about it.\""
80000021-18 = "[ns] \"Is there something I can drink to wake me up?\""
80000021-19 = "Hmm. We ran out of coffee yesterday."
80000021-23 = "Oh, I've got it."
80000021-30 = "Here, Sensei. It's an energy drink. Frenzy MAX."
80000021-31 = "You'll be wide awake in no time."
80000021-32 = "[s] \"It looks a little different from the other ones.\""
80000021-33 = "Yeah. This one's chocolate flavored for Valentine's Day."
80000021-34 = "I was gonna save it since it's a limited edition..."
80000021-35 = " ...but you can have it, Sensei. I don't mind letting go of it if it's for you."
80000021-41 = "The chocolate flavored Frenzy MAX from Hare tasted terrible, but she was right about it waking me up..."

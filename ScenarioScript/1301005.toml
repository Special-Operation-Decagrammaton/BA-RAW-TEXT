[translation]
1301005-1 = "#title;인간 계산기"
1301005-2 = "#place;샬레 선생님 집무실"
1301005-3 = "3;유우카;07;선생님, 소식 들었어요. 지난주에 불량배들의 무기고를 급습해서 많은 양의 비품을 되찾으셨다면서요?\n#3;em;[음표]\n#3;a"
1301005-4 = "3;유우카;03;무기고를 통째로 빼앗겼으니 불량배들도 당분간은 날뛰지 못하겠지요. 수고 많으셨어요.\n#3;greeting"
1301005-5 = "3;유우카;02;그런데 왜 그렇게 표정이 안 좋으신가요? 노획한 비품에 무슨 문제라도 있었나요?\n#3;em;[?]"
1301005-6 = "3;유우카;02;네? 비품에는 문제가 없지만 재고 목록에 문제가 있었다고요? 그게 무슨 말씀이신가요?\n#3;stiff"
1301005-7 = "[s] 노획한 비품 재고 목록을 유우카에게 건넨다."
1301005-8 = "3;유우카;01;어디 보자. 전차용 휘발유 200 갤런, TNT 600 파운드, 0.3인치 탄환……\n#3;em;…"
1301005-9 = "3;유우카;01;낡은 무기들이라서 그런지 대부분이 트리니티 학원의 옛날 단위계로 정리되어 있네요."
1301005-10 = "3;유우카;02;노획한 비품의 단위가 공용 단위와 일치하지 않아서 장부를 정리하기가 어렵다고요?"
1301005-11 = "3;유우카;02;게다가 재고 목록이 수기로 작성되어 있어서 컴퓨터로도 처리할 수가 없다고요?\n#3;em;[?]\n#3;stiff"
1301005-12 = "3;유우카;07;뭐야, 단순한 계산 문제잖아요. 이런 건 암산으로도 금방 끝낼 수 있다고요."
1301005-13 = "3;유우카;01;이 정도 양이면 30분 정도면 다 끝낼 수 있을 것 같은데…….\n#3;em;…"
1301005-14 = "3;유우카;02;믿기지 않으신다면 제가 한 번 정리해 볼까요?"
1301005-15 = "3;유우카;07;그럼 잠깐만 기다려주세요.\n#3;greeting\n#3;em;[음표]"
1301005-16 = "#all;hide"
1301005-17 = "3;유우카;03;다 끝났어요. 표준 규격에 맞추어 재고 목록을 다시 정리했어요.\n#3;em;[반짝]\n#3;jump"
1301005-18 = "3;유우카;07;정확하게 나누어 떨어지지 않는 단위의 경우에는 오차 범위 이내에서 반올림했으니 아래 달아 놓은 주석을 참고해주세요."
1301005-19 = "[s] \"정말 30분만에 그 긴 목록을 다 정리했잖아?\""
1301005-20 = "3;유우카;07;후후, 이제 저의 진가를 알아보시겠나요?"
1301005-21 = "3;유우카;07;아무리 복잡한 서식이라도 밀레니엄의 회계인 제 손에 들어오면 순식간에 처리해 낼 수 있답니다.\n#3;em;[음표]\n#3;greeting"
1301005-22 = "[s] \"그럼 혹시 이것도 정리해줄 수 있을까?\""
1301005-23 = "3;유우카;02;이 문서는…… 혹시……?\n#3;stiff"
1301005-24 = "3;유우카;05;선~생~님! 이 문서는 총학생회에 제출할 샬레의 정기 보고서잖아요!\n#3;hophop\n#3;em;[빠직]"
1301005-25 = "3;유우카;05;심지어 3개월 치나 밀려있어!"
1301005-26 = "3;유우카;05;아무리 제가 계산을 잘한다고 해도, 하기 귀찮은 일을 다른 사람에게 미루는 건 안 돼요! 이건 선생님 손으로 처리하세요!\n#3;em;[!]"
1301005-27 = "3;유우카;05\n#wait;2000\n#3;em;…\n#3;h"
1301005-28 = "3;유우카;06;……그런 눈으로 쳐다 보셔도 안된다니까요!\n#3;stiff"
1301005-29 = "3;유우카;06\n#wait;2000\n#3;em;…\n#3;h"
1301005-30 = "3;유우카;04;…….\n#3;em;[땀]"
1301005-31 = "3;유우카;99;(한숨) 어휴, 할 수 없지요. #n그럼 조금만 도와드리는 거예요?\n#3;greeting"
1301005-32 = "3;유우카;06;선생님의 어리광을 자꾸 받아주면 안되는데……."
1301005-33 = "3;유우카;05;선생님도 놀지 말고 다른 문서부터 정리해주세요. 펜이 멈춰 있잖아요!\n#3;hophop\n#3;closeup"
1301005-34 = "#all;hide"
1301005-35 = "#na;이후, 유우카와 사이 좋게 장부를 정리했다."

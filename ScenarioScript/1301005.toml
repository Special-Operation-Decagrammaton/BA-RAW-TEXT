[translation]
1301005-1 = "The Human Calculator"
1301005-2 = "Schale Sensei's Executive Office"
1301005-3 = "I heard something interesting, Sensei! Is it true that you recovered a ton of equipment after raiding those hoodlums' armory?"
1301005-4 = "That should put them out of commission for a while. Good work!"
1301005-5 = "You don't look very happy, though. Is there something wrong with the equipment?"
1301005-6 = "You're saying the equipment is fine but something's wrong with the inventory? What do you mean?"
1301005-7 = "[s] Hand the equipment inventory to Yuuka."
1301005-8 = "Let's see here...200 gallons of tank fuel, 600 pounds of TNT, 0.3 caliber cartridges..."
1301005-9 = "It might be due to their age, but most of these measurement units are from Trinity's old system."
1301005-10 = "So you're having a hard time organizing the ledger because you're unfamiliar with these units?"
1301005-11 = "Since it's handwritten, you wouldn't be able to easily convert it with a computer either."
1301005-12 = "The calculation shouldn't be too difficult. All this will take is a little mental math."
1301005-13 = "I should have this done in about 30 minutes or so."
1301005-14 = "What? Don't believe me? Just you watch."
1301005-15 = "Give me a little time."
1301005-17 = "All done. I've reorganized the inventory according to customary units."
1301005-18 = "I rounded some of the units up or down that couldn't be calculated exactly, so make sure to read my footnotes."
1301005-19 = "[s] \"Did you really do all that in 30 minutes?\""
1301005-20 = "Heh heh. What did I tell you?"
1301005-21 = "This was nothing. I wouldn't be Millennium's treasurer if I couldn't handle something as simple as that."
1301005-22 = "[s] \"Then can you do this for me too?\""
1301005-23 = "A document? Is this a...?"
1301005-24 = "Sensei! This is a regular report from Schale meant for the General Student Council!"
1301005-25 = "This bill is three months overdue!"
1301005-26 = "I know I'm great with numbers, but you can't hand things over to other people just because you're lazy! Do it yourself!"
1301005-28 = "...And don't look at me like that!"
1301005-30 = "..."
1301005-31 = "*sigh* Fine. I'll just help you out a little bit."
1301005-32 = "I have to stop being such a pushover..."
1301005-33 = "Why are you just sitting there? Those other papers have YOUR name on them, so keep your pen moving!"
1301005-35 = "After that, Yuuka and I organized the ledger in peace."

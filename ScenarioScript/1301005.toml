[translation]
1301005-1 = "人體計算機"
1301005-2 = "夏萊．辦公室"
1301005-3 = "老師，我聽說了。你們上週鎮壓了不良分子們的武器庫，回收了很多備品？"
1301005-4 = "整個武器庫都被搶走，不良分子們暫時也猖獗不起來了。辛苦了。"
1301005-5 = "……表情為什麼那麼陰沉？回收的備品有什麼問題嗎？"
1301005-6 = "耶？備品沒有問題，但庫存清單有問題嗎？那是怎麼回事？"
1301005-7 = "[s] 將回收的備品庫存清單交給優香"
1301005-8 = "我瞧瞧……戰車用汽油200加侖、TNT600磅、0.3吋的子彈……"
1301005-9 = "可能因為都是舊武器，大部分都是像三一綜合學園過去在使用的那樣，以舊的單位記載。"
1301005-10 = "因為回收的備品的單位和現在的單位不一致，所以沒辦法整理帳簿……？"
1301005-11 = "而且，因為庫存清單是手寫的，所以無法用電腦處理……是嗎？"
1301005-12 = "什麼啊，不就只是單純的計算工作嗎。才這點東西，就算用心算也花不了多少時間。"
1301005-13 = "如果只是這些量，30分鐘就能結束了……"
1301005-14 = "嗯？如果不相信的話，不然我做一次給你看？"
1301005-15 = "那麼，請稍等一下。"
1301005-17 = "結束了。庫存清單全部按照現在的標準規格單位重新整理好了。"
1301005-18 = "無法整除的情況，則在誤差範圍內進行了四捨五入，請見下方的備註。"
1301005-19 = "[s] 「真的只花了30分鐘就把那一長串的清單……」"
1301005-20 = "呵呵。終於明白我的實力了嗎？"
1301005-21 = "無論是多麼複雜的公式，只要在我千年的會計的手中，瞬間就能處理掉。"
1301005-22 = "[s] 「那麼，這個也可以整理一下嗎？」"
1301005-23 = "這份文件……難道是……！？"
1301005-24 = "老師！！這份文件不是必須提交給聯邦學生會的夏萊定期報告嗎！"
1301005-25 = "而且還累積了3個月的量！"
1301005-26 = "不管我再怎麼擅長計算，也不能把不想做的麻煩工作推給別人！這個請老師自己處理！"
1301005-28 = "……就算用那種眼神看我，不行就是不行！"
1301005-30 = "……"
1301005-31 = "……哈啊，真是沒辦法。 #n真的只能稍微幫點忙唷？"
1301005-32 = "不能每次都像這樣把老師寵壞……"
1301005-33 = "老師也不要閒著，請快去整理其他文件。……喂，筆停下來了！"
1301005-35 = "（在那之後，和優香融洽地整理了帳簿）"

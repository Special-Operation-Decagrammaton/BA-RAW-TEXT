[translation]
1301005-1 = "มนุษย์เครื่องคิดเลข"
1301005-2 = "ห้องทำงานคุณครู สำนักงานชาเล่ต์"
1301005-3 = "คุณครู ฉันเพิ่งได้ข่าวมาค่ะ! จริงหรือเปล่าคะที่ยึดอุปกรณ์จำนวนมากคืนมาได้ หลังบุกค้นคลัง#nอาวุธของพวกนักเลงเมื่ออาทิตย์ก่อน?"
1301005-4 = "ตอนนี้พวกนักเลงถูกยึดคลังอาวุธมาหมดแล้ว คงจะเคลื่อนไหวไม่ได้อีกพักใหญ่#nคุณครูเก่งมากเลยค่ะ"
1301005-5 = "ทำไมคุณครูถึงดูไม่ค่อยดีใจเลยล่ะคะ? อุปกรณ์ที่ยึดคืนมาได้มีปัญหาอะไรรึเปล่าคะ?"
1301005-6 = "คะ? อุปกรณ์ไม่มีปัญหา แต่มีปัญหาเรื่องรายการอุปกรณ์เหรอคะ? หมายความว่ายังไงคะ?"
1301005-7 = "[s] ส่งรายการอุปกรณ์ที่ยึดมาให้กับยูกะ"
1301005-8 = "ขอดูหน่อยนะคะ น้ำมันรถถัง 200 แกลลอน ระเบิด TNT 600 ปอนด์ กระสุนขนาด 7.62 มม...."
1301005-9 = "อาจเพราะเป็นอาวุธชนิดเก่า แต่ว่าส่วนใหญ่เป็นอาวุธที่ใช้หน่วยการนับในระบบเก่าของสถาบันทรีนิตี้"
1301005-10 = "หน่วยการนับที่ใช้มันแตกต่างจากปัจจุบัน เพราะงั้นเลยมีปัญหาในการจัดเรียงบัญชีแยกประเภท#nของอุปกรณ์สินะคะ?"
1301005-11 = "อีกทั้งรายการอุปกรณ์ยังเขียนด้วยมือ เพราะงั้นเลยเอามาคำนวณในคอมพิวเตอร์ไม่ได้?"
1301005-12 = "อะไรกัน เรื่องง่ายๆ แค่นี้เองนะคะ แค่แป๊ปเดียวก็จัดการได้แล้วค่ะ"
1301005-13 = "เรื่องแค่นี้ใช้เวลา 30 นาทีก็จัดการเสร็จเรียบร้อยได้แล้วค่ะ..."
1301005-14 = "ถ้าคุณครูไม่เชื่อ เดี๋ยวฉันจะจัดการให้ดูเองค่ะ"
1301005-15 = "รอสักครู่นะคะ"
1301005-17 = "เสร็จเรียบร้อยแล้วค่ะ ฉันจัดการแปลงหน่วยของรายการอุปกรณ์ให้เป็นหน่วยที่ใช้ในปัจจุบันแล้วค่ะ"
1301005-18 = "ฉันคำนวณโดยปัดเศษของหน่วยที่ไม่สามารถคำนวณได้เอาไว้แล้วด้วย ยังไงรบกวนดูจาก#nเอกสารเพิ่มเติมตรงนี้แล้วกันนะคะ"
1301005-19 = "[s] \"จัดการได้ภายใน 30 นาทีจริงๆ งั้นเหรอ?\""
1301005-20 = "หึหึ ฉันบอกแล้วไม่ใช่เหรอคะ?"
1301005-21 = "ไม่ว่าจะเป็นการคำนวณที่ซับซ้อนแค่ไหน ในฐานะของนักบัญชีของมิลเลเนียมแล้ว ฉันก็คำนวณ#nได้ในพริบตาค่ะ"
1301005-22 = "[s] \"ถ้างั้นช่วยจัดการเอกสารนี่ให้ด้วยได้มั้ย?\""
1301005-23 = "เอกสารนี่มัน... หรือว่า...?"
1301005-24 = "คุณ~ครู~คะ! นี่มันรายงานประจำของทางชาเล่ต์ที่จะต้องส่งให้กับองค์การนักเรียนไม่ใช่เหรอคะ!"
1301005-25 = "แถมยังเกินกำหนดมาสามเดือนแล้วด้วย!"
1301005-26 = "ถึงฉันจะเก่งคำนวณแค่ไหน แต่การโยนงานให้คนอื่นทำเพราะขี้เกียจแบบนี้มันไม่ถูกต้องนะคะ!#nคุณครูต้องทำเองสิคะ!"
1301005-28 = "...ไม่ต้องมามองฉันด้วยสายตาแบบนั้นเลยค่ะ!"
1301005-30 = "......"
1301005-31 = "(ถอนหายใจ) เฮ้อ ช่วยไม่ได้นะคะ ถ้างั้นฉันจะช่วยแค่นิดเดียวนะคะ"
1301005-32 = "ฉันจะใจอ่อนง่ายๆ แบบนี้ไม่ได้แท้ๆ..."
1301005-33 = "คุณครูเองก็ห้ามไปเล่นที่ไหนนะคะ ช่วยจัดการเอกสารอื่นแทนด้วยค่ะ เลิกกดปากกาเล่นด้วยค่ะ!"
1301005-35 = "หลังจากนั้นคุณครูกับยูกะก็ช่วยกันทำบัญชีอย่างสงบ"

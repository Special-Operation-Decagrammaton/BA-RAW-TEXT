[translation]
102120-1 = "第12話;第3聖所「廢墟化的遊樂園」"
102120-9 = "我們也開始吧。準備好了嗎？"
102120-14 = "是！大家，在頭目前再會吧！"
102120-18 = "嗯，嗯……要小心點哦，愛麗絲醬……"
102120-19 = "只靠那兩個人真的沒問題嗎……？"
102120-20 = "……是。我想應該沒問題。"
102120-22 = "那，那麼……"
102120-23 = "前衛君……出動！"
102120-31 = "那是什麼！？"
102120-32 = "出現了！是之前成為同伴的前衛君！！"
102120-38 = "哦哦！輪到前衛君Mk.3登場了嗎！"
102120-39 = "順帶一提，Mk.1是由莉央會長原創，Mk.2是由貝里塔斯改造，而這部Mk.3居然～#n是柚子專用的機體哦！"
102120-40 = "說到前衛君Mk.3的特徵！那就是可以使用「配合能以幀為單位輸入指令的柚子的動態視力特製的搖桿」來進行操作哦！"
102120-41 = "沒錯！這就是最強玩家「UZQueen」的專用機！"
102120-42 = "呃……"
102120-43 = "嗚嗚……壓力好大……"
102120-52 = "亞都梨！別再說明了……快分析這邊的資料！"
102120-56 = "簡直像格鬥遊戲一樣的操作手感以及──啊，看來又有人需要我的說明了呢！那我先告辭了！祝你武運昌隆唷，UZQueen！"
102120-61 = "……那麼，開始吧。"
102120-62 = "好，好的……！"
102120-67 = "第3聖所的攻略……"
102120-76 = "開始……！！"

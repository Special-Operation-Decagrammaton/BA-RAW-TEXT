[translation]
102120-1 = "ตอนที่ 12;ปฏิบัติการบุกยึดหอคอยแห่งที่ 3 - สวนสนุกที่ถูกทิ้งร้าง"
102120-9 = "เราก็เริ่มกันบ้างเถอะ เตรียมตัวให้พร้อม"
102120-14 = "ค่ะ! แล้วเจอกันหน้าบอสนะคะทุกคน!"
102120-18 = "อะ... อื้ม ระวังด้วยนะ อาริสึจัง..."
102120-19 = "ว่าแต่ แค่สองคนจะไหวเหรอ...?"
102120-20 = "...... ค่ะ ไม่มีปัญหาหรอกค่ะ"
102120-22 = "ถะ... ถ้างั้น..."
102120-23 = "หุ่นรบล้ำยุค... ระดมกำลัง!"
102120-31 = "นั่นมันอะไรน่ะ?!"
102120-32 = "ออกมาแล้วค่ะ! หุ่นรบล้ำยุคที่มาเป็นสหายของอาริสึค่ะ!!"
102120-38 = "โห! ในที่สุดก็ถึงเวลาของหุ่นรบล้ำยุค Ver.3 เหรอคะเนี่ย?"
102120-39 = "ลืมบอกไปเลยค่ะ Ver.1 คือรุ่นออริจินอลของประธานริโอะ ส่วน Ver.2 คือรุ่นที่เวอริทัสปรับปรุงใหม่#nคราวก่อน และ Ver.3 คือหุ่นรบส่วนตัวของยูสึค่ะ!"
102120-40 = "ส่วนจุดเด่นของหุ่นรบล้ำยุค Ver.3 ก็คือควบคุมด้วยคอนโทรลเลอร์ที่ออกแบบมาเป็นพิเศษ เพื่อให้เข้ากับสายตาของยูสึสามารถป้อนข้อมูลได้ในแต่ละเฟรมค่ะ!"
102120-41 = "ใช่แล้วค่ะ! นี่คือหุ่นรบส่วนตัวของ UZQueen ค่ะ!"
102120-42 = "อืม..."
102120-43 = "ยะ... อย่าเล่นใหญ่สิ..."
102120-52 = "โคโทริ! เลิกอธิบายอะไรยืดยาว แล้วมาช่วยตีความข้อมูลทางนี้หน่อยสิ!"
102120-56 = "อ๊ะ! มีคนต้องการการอธิบายจากฉันอีกแล้วสินะคะ! งั้นฉันขอตัวก่อนนะคะ! โชคดีค่ะ UZQueen!"
102120-61 = "...... งั้นก็เริ่มกันเลย"
102120-62 = "ค่ะ ได้ค่ะ...!"
102120-67 = "เริ่มปฏิบัติการโจมตี..."
102120-76 = "หอคอยแห่งที่ 3 ค่ะ...!!"

[translation]
34090-1 = "Episode 9; To the Arius District 1"
34090-3 = "[ns] \"Ninety minutes left until what?\""
34090-4 = "We have to go through the underground catacombs to get to the Arius district. "
34090-5 = "There have so far been about 300 entrances discovered in the catacombs. But only some of them are real entrances."
34090-6 = "You'll be lost in the catacombs until you starve if you choose the wrong entrance."
34090-7 = "So we've been receiving and deciphering code for the internal route that leads from the real entrance to the catacomb to the Arius district."
34090-8 = "The insides of the catacombs shift periodically, you see."
34090-9 = "[s] \"The tunnels themselves move?\""
34090-10 = "More or less. Paths previously open will be suddenly blocked. It's easy to lose your sense of direction."
34090-11 = "I don't understand the mechanics behind the structure, but it's essentially an ever-changing maze."
34090-16 = "Seeing how the real entrance changes so much, we can't find it without them telling us."
34090-17 = "There's no reason to show a runaway hound the way home."
34090-18 = "B-But we've figured out one valid entrance. That's our ticket in."
34090-19 = "It'll change at midnight tonight, hence the 90 minutes.  "
34090-20 = "If it closes, we have no way of returning to Arius."
34090-21 = "Even if we were to find a way, it wouldn't be in time to save Hime."
34090-22 = "We gotta hurry..."
34090-26 = "?!"
34090-27 = "It's Squad!"
34090-28 = "I knew it! They're here! Get ready to battle!"
34090-29 = "...They must have been thinking the same thing."
34090-30 = "Commencing assault. "
34090-31 = "Oh geez, life really is suffering."
34090-32 = "...Troublesome."
34090-34 = "Show them how sharp our fangs are!  "

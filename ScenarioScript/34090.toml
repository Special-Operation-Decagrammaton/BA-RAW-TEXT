[translation]
34090-1 = "#title;제9화;아리우스 자치구로 1"
34090-2 = "#all;hide"
34090-3 = "[ns] \"90분 남았다니, 그건 무슨 얘기야?\""
34090-4 = "3;미사키;S2_02;아리우스 자치구로 가기 위해선 트리니티 지하의 카타콤을 통과해야 해. \n#3;a\n#3;em;[반응]"
34090-5 = "3;미사키;S2_99;트리니티에 분포하는 카타콤 입구는 밝혀진 것만 약 300개 정도. 그중에서 진짜 입구는 정해져 있고 나머지는 가짜."
34090-6 = "5;사오리;01;잘못된 입구로 들어가면 카타콤에서 길을 잃게 된다.\n#5;a\n#3;m1"
34090-7 = "5;사오리;05;그래서 우리는 진짜 입구와, 그곳으로부터 아리우스 자치구로 통하는 카타콤의 내부 루트를 음어로 전달받아 해석해서 사용하고 있지."
34090-8 = "3;미사키;S2_01;……카타콤의 내부는 일정 주기로 변화하거든."
34090-9 = "[s] \"내부가 변한다고?\""
34090-10 = "3;미사키;S2_99;그래. 예전에 갔던 길이 이번엔 막혀있다거나…… 혹은 방향감각을 잃는다거나…… 그런 식으로."
34090-11 = "3;미사키;S2_02;어떤 구조인지는 모르지만…… 카타콤은 정체가 밝혀지지 않은 미궁이니까. 그래서 매번 정확한 루트와 입구가 바뀌는 형태야.\n#3;em;[반응]"
34090-12 = "#st;[0,0];instant;1;"
34090-13 = "#clearST"
34090-14 = "5;사오리;05\n3;미사키;S2_02\n#3;d\n#5;d\n#wait;1000"
34090-15 = "#all;hide"
34090-16 = "3;히요리;04;지금 우리는 어디가 진짜 입구인지 알 수 없는 상태예요…… 우리에겐 이제 더 이상 정보가 공유되지 않고 있거든요.\n#3;a\n#3;em;…"
34090-17 = "3;사오리;05;도망친 사냥개에게 집으로 돌아가는 길을 알려줄 이유는 없겠지."
34090-18 = "3;사오리;05\n5;히요리;03;하, 하지만…… 딱 한 곳만은…… 아직도 유효한 입구가 남아 있어요. 거기가 바로 저희의 목적지예요.\n#5;al\n#5;em;[반응]"
34090-19 = "5;히요리;03\n3;사오리;05\n1;미사키;S2_01;그것도 오늘 자정까지야. 이제 한 시간 뒤면 그 입구도 사용할 수 없게 될 거야. 그렇게 된다면……. \n#1;ar"
34090-20 = "5;히요리;01\n1;미사키;S2_01\n3;사오리;99;아리우스 자치구로 돌아가지 못하게 되겠지."
34090-21 = "5;히요리;01\n1;미사키;S2_01\n3;사오리;01;아니, 어떻게든 방법은 찾을 수 있다해도…… 아츠코를 구할 수 없게 될 거야.\n#3;em;[반응]"
34090-22 = "1;미사키;S2_01\n3;사오리;01\n5;히요리;05;그러니 서둘러야……."
34090-23 = "#st;[0,0];instant;1;"
34090-24 = "#clearST"
34090-25 = "#all;hide\n#wait;1500\n#bgshake"
34090-26 = "3;히요리;10;?!\n#3;shake\n#3;closeup\n#3;em;[?!]"
34090-27 = "#all;hide\n#na;아리우스 학생 A;<스쿼드>다!"
34090-28 = "#na;아리우스 학생 B;역시 여기로 올 줄 알았어! 전투 준비해!"
34090-29 = "1;미사키;S2_05;……저들도 똑같은 생각을 하고 있었나 보네.\n#1;em;…\n#1;a"
34090-30 = "1;미사키;S2_05\n3;사오리;08;전투 준비. \n#3;a\n#3;greeting"
34090-31 = "1;미사키;S2_05\n3;사오리;08\n5;히요리;10;네, 네!\n#5;a\n#5;stiff"
34090-32 = "5;히요리;10\n3;사오리;08\n1;미사키;S2_01;……뭐, 이런 흐름이겠지."
34090-33 = "#all;hide"
34090-34 = "3;사오리;09;좋아. 버림받은 들개가 마음을 먹으면 어떻게 되는지 보여주지. \n#3;closeup\n#3;em;[!]"

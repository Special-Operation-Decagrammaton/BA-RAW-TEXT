[translation]
34090-1 = "第9話;アリウス自治区へ（１）"
34090-3 = "[ns] \"さっき言ってた「あと90分」って、どういうこと？\""
34090-4 = "アリウス自治区に行くには、トリニティ地下のカタコンベを通過しないといけない。"
34090-5 = "カタコンベの入り口は、判明しているだけでも約300か所。その中の「本当の入り口」は限られていて、残りはすべて偽物。"
34090-6 = "入口を間違えれば、カタコンベで迷い続ける羽目になる。"
34090-7 = "だから私たちは正しい入り口と、そこからアリウス自治区に通じるカタコンベの内部ルートを暗号で伝えている。"
34090-8 = "……カタコンベの内部は一定周期で変化するからね。"
34090-9 = "[s] \"内部が変化する……？\""
34090-10 = "そう。この前通った道が行き止まりになっていたり……あるいは方向を見失ったり……そんな感じになる。"
34090-11 = "どんな仕組みかは分からないけど……カタコンベは全容が明らかになってない迷宮。足を踏み入れるたびにルートと入り口が変わってしまうから。"
34090-16 = "今の私たちでは、どこが正しい入り口か分からないんです……もう暗号を教えてもらっていないので。"
34090-17 = "逃げ出した猟犬に、帰り道を教える必要はないからな。"
34090-18 = "で、でも……たった1つだけ、まだ使える入り口が残ってます。"
34090-19 = "それも今日の日付変更線までしか使えない。あと1時間後には、そこも閉ざされてしまう……そうなったらもう……。"
34090-20 = "アリウス自治区には戻れなくなるだろう。"
34090-21 = "なんとか戻れたとしても、アツコを助けることはできない。"
34090-22 = "だから急がなければ……。"
34090-26 = "！？"
34090-27 = "「スクワッド」だ！"
34090-28 = "やはりここに来たな！総員、戦闘準備！"
34090-29 = "……あっちも同じことを考えていたみたいだね。"
34090-30 = "戦闘準備。"
34090-31 = "は、はい！"
34090-32 = "……まあ、こうなるよね。"
34090-34 = "いいだろう……手負いの猟犬の意地、見せてやろうじゃないか。"

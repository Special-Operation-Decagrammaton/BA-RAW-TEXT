[translation]
34090-1 = "第9話;前往奧利斯自治區（１）"
34090-3 = "[ns] 「剛才說『還剩90分鐘』是什麼意思？」"
34090-4 = "要進入奧利斯自治區就必須要經過三一的地下墓穴才行。"
34090-5 = "而地下墓穴的入口，光是已經確定的就有約300個。其中「真正的入口」非常稀少，其他的全都是偽裝。"
34090-6 = "如果弄錯入口的話，就會落的在地下墓穴裡迷路的下場了。"
34090-7 = "所以我們會把正確的入口以及通往奧利斯自治區的內部路線用暗號來傳達。"
34090-8 = "……因為地下墓穴的內部有著周期性的變化。"
34090-9 = "[s] 「內部會變化……？」"
34090-10 = "沒錯。像是之前能通過的路變成死路……或者是迷失方向之類的……那種感覺。"
34090-11 = "雖然不知道背後的原理是什麼……地下墓穴是個未知的迷宮。在進入的瞬間，路線和入口就會發生變化。"
34090-16 = "現在的我們不知道正確的入口在哪裡……因為已經沒有人告訴我們暗號了。"
34090-17 = "逃走的獵犬沒有必要知道回家的路。"
34090-18 = "但，但是……還有一個，還能用的入口。"
34090-19 = "那也只能用到今天為止。一個小時後，那裡也會關閉……那樣的話我們就……"
34090-20 = "再也無法回到奧利斯自治區了吧。"
34090-21 = "就算有辦法回去，也救不了敦子了。"
34090-22 = "所以得趕快才行……"
34090-26 = "！？"
34090-27 = "是「小隊」！"
34090-28 = "果然會來這裡啊！所有人，準備戰鬥！"
34090-29 = "……看來他們和我們想得一樣呢。"
34090-30 = "準備戰鬥。"
34090-31 = "是，是的！"
34090-32 = "……嘛，果然會這樣呢。"
34090-34 = "這樣也好……就讓你們看看負傷獵犬的志氣吧。"

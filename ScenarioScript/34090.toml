[translation]
34090-1 = "ตอนที่ 9;ไปยังเขตปกครองตนเองอาเรียส 1"
34090-3 = "[ns] \"เหลือ 90 นาทีงั้นเหรอ? หมายความว่ายังไง\""
34090-4 = "ถ้าจะไปเขตปกครองตนเองอาเรียส เราต้องผ่านสุสานใต้ดินของทรีนิตี้เข้าไป "
34090-5 = "เท่าที่รู้ตอนนี้ ทางเข้าสุสานใต้ดินที่กระจายในทรีนิตี้มีประมาณ 300 ทาง ในนั้นมีทางเข้าจริงๆ และทางเข้าหลอก"
34090-6 = "หากเข้าไปด้วยทางเข้าหลอก ก็จะหลงทางอยู่ในสุสานใต้ดิน"
34090-7 = "เพราะฉะนั้นที่ผ่านมาเราเลยได้รับคำสั่งเป็นรหัสลับที่บอกทางเข้าจริง และบอกเส้นทางในสุสานใต้ดิน#nที่เชื่อมไปยังเขตปกครองตนเองอาเรียสเอาไว้"
34090-8 = "ข้างในสุสานใต้ดินจะเปลี่ยนไปเรื่อยๆ น่ะ..."
34090-9 = "[s] \"ข้างใน... เปลี่ยนได้เหรอ?\""
34090-10 = "ใช่ เส้นทางที่เคยเข้าไปครั้งก่อนจะถูกปิดกั้นในครั้งนี้... หรือไม่ก็เปลี่ยนทางจนทำให้หลงทิศ..."
34090-11 = "ไม่มีใครรู้โครงสร้างด้านใน... และสุสานใต้ดินเป็นเขาวงกตที่ไม่เคยถูกเปิดเผย ที่เรารู้คือทางเข้า#nและเส้นทางที่ถูกต้องจะเปลี่ยนไปในทุกครั้ง"
34090-16 = "ตอนนี้เราไม่รู้เลยค่ะว่าทางไหนคือทางเข้าที่ถูกต้อง... เพราะทางนั้นไม่แชร์ข้อมูลอะไรให้เรารู้อีกเลย"
34090-17 = "ไม่มีเหตุผลที่จะต้องบอกทางกลับบ้านให้กับหมาล่าเนื้อที่หนีออกมาหรอก"
34090-18 = "ตะ... แต่ว่า... ยังมีอยู่ทางเข้าทางหนึ่ง... ที่ยังใช้งานได้นะคะ จุดหมายปลายทางของพวกเราไงคะ"
34090-19 = "ถ้าจะไปที่นั่นก็ต้องไปให้ถึงก่อนเที่ยงคืน เพราะทางเข้านั้นจะใช้ไม่ได้ในหนึ่งชั่วโมงจากนี้ และถ้าเป็นอย่างนั้น... "
34090-20 = "เราก็จะเข้าไปในเขตปกครองตนเองอาเรียสไม่ได้ยังไงล่ะ"
34090-21 = "ไม่สิ ถึงจะหาหนทางนั้นได้... แต่เราก็คงจะช่วยอาสึโกะไว้ไม่ได้"
34090-22 = "เพราะงั้นเราต้องรีบ..."
34090-26 = "?!"
34090-27 = "พวก <สควอด>!"
34090-28 = "กะไว้แล้วว่าต้องมาที่นี่! เตรียมต่อสู้!"
34090-29 = "พวกนั้นก็คงคิดเหมือนกันกับเราสินะ"
34090-30 = "เตรียมตัวต่อสู้ "
34090-31 = "คะ... ค่ะ!"
34090-32 = "ก็นะ คงต้องเป็นแบบนี้แหละ..."
34090-34 = "ดีละ ฉันจะแสดงให้เห็นถึงพลังของสุนัขที่ถูกทอดทิ้งเอง"

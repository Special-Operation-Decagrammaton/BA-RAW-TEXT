101020-112 = "#na;골콩트;제 부족함에 먼저 사과를 드리죠. 검은 양복, 그 <무명사제>라는 것은 정확히 무엇인가요?"
101020-113 = "#na;골콩트;베아트리체에게 제공한 로열블러드 보호 기술, 고성당을 파괴했던 순항 미사일…… 그것들이 무명사제들의 기술로 알고 있습니다."
101020-114 = "#na;골콩트;현존하는 기술을 능가하는 초과학……의 무언가로 이해하고 있는데요."
101020-115 = "#na;마에스트로;간단히 말하자면, 키보토스 이전에 존재했던 이 세계의 주인들이다."

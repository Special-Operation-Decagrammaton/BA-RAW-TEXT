101020-117 = "#all;hide"
101020-118 = "3;검은 양복;01;키보토스의 신비 아래에 퇴적되어 흔적만 남아 있어야 할 계몽 이전의 숭고…… <이름 없는 신>과 그들을 숭배하는 무명사제들…….\n#3;a"
101020-119 = "3;검은 양복;01;거대한 돌, 나무, 태풍과 번개 같은…… 말하자면 태초의 신비와 공포랄까요. 그렇기에 그들은 자연을 모사한 형태로 현현하는 것으로 보입니다."
101020-120 = "3;검은 양복;01;그리고 그들을 숭배하는 무명사제들은…… 그들이 무슨 짓을 꾸미는지는 알 수 없지만, 적어도 이 키보토스에 우호적인 입장은 아니겠죠."
101020-121 = "3;검은 양복;01;그들은 모습을 감췄지만, 그들의 기술 자체는 아직 이 땅에 남아 있습니다. 그리고 저는 그들의 유산에는 흥미가 많습니다."
101020-122 = "3;검은 양복;01;비싸게 거래되기 때문이죠. 큭큭큭……\n#3;em;…\n#3;closeup\n#1;hide\n#5;hide"
101020-123 = "3;골콩트;01;…….\n#3;closeup"
101020-124 = "#all;hide\n#na;검은 양복;하지만 최근에 관측된 것은 그런 작은 소일거리 같은 게 아니었습니다."
101020-125 = "3;골콩트;01;<방주>가 관측되었죠. 한순간이긴 했지만."
101020-126 = "5;마에스트로;01;관측이라고? 그것은 관측되는 개념인가? 물체가 아니라 현상이라는 건가?\n#5;a\n#3;m1\n#5;stiff"
101020-127 = "3;골콩트;01;그건……."
101020-128 = "1;검은 양복;01;흥미로운 질문입니다. 저 역시 <방주>라는 것은 실존하는 물체라고 생각했는데…… 아무래도 그런 것이 아니었던 모양입니다. \n#3;hide"
101020-129 = "1;검은 양복;01;카이저 그룹을 이용해 아비도스 사막을 파헤치고 있었던 것도…… 아무래도 헛수고였던 것 같습니다. 저는 단단히 착각하고 있었던 거죠."
101020-130 = "1;검은 양복;01;만약 <방주>라는 것이 모든 신비를 총체적으로 아우르는 추상적 관념이라면……. \n#1;m3\n#5;dr"
101020-131 = "#5;hide\n1;검은 양복;01;……아니, 이건 논의를 너무 벗어나는군요. 다시 본론입니다."
101020-132 = "1;검은 양복;01;사라졌어야 할 <무명사제>의 병력들과 유산이 다시 관측되기 시작하는 것…… 이것은 확실히 저희가 상정한 것에서 벗어났습니다."
101020-133 = "1;검은 양복;01;샬레의 출현, 키보토스 최고 신비의 확보 실패, 유일했던 아리우스 영지 박탈, 데카그라마톤의 죽음…….\n#1;em;…"
101020-134 = "1;검은 양복;01;그리고 이제 무명사제들의 유산인 <방주>의 관측까지……."
101020-135 = "#1;hide\n3;검은 양복;01;원래 계획대로였다면 지금은 아니었을 겁니다. 훨씬 더 미래…… 어쩌면 영원히 오지 않을 미래였을지도 모릅니다.\n#3;closeup"
101020-136 = "3;검은 양복;01;하지만 그 사이 통제할 수 없는 변수들이 발생했고, 지금 우리가 맞이한 현재는 우리의 계획과는 너무나 멀리 벗어나 버렸습니다.\n#3;closeup"

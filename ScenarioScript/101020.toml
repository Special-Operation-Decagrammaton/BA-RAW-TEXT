101020-138 = "#all;hide"
101020-139 = "#na;마에스트로;그래. 색채가 이곳을 발견했다. 베아트리체, 귀하가 벌인 그 의식 때문에."
101020-140 = "#na;베아트리체;……."
101020-141 = "#all;hide"
101020-142 = "3;마에스트로;01;귀하가 행한 의식, 그건 <색채>와 접촉하는 것이었다. 그것이 초래할 위험은 인지하고 있었나? \n#3;a"
101020-143 = "1;골콩트;01;정확히는 접촉하는 게 아니라, 색채의 힘을 이용하려는 것이었죠. 마담은 그걸 불러오려 한 것은 아니었습니다.\n#1;a\n#3;m5"
101020-144 = "5;마에스트로;01;그래! 색채의 힘을 이용해 자신이 더 위대해지려 했지! 고작 그런 저열한 목적을 위해 그 불가해한 개념을…….\n#5;stiff\n#3;hide"
101020-145 = "#all;hide"
101020-146 = "3;베아트리체;01;말조심하세요, 나무 인형.\n#3;a\n#3;em;[반응]\n#3;closeup"

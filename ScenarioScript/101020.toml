[translation]
101020-1 = "Episode 2; Catastrophe"
101020-3 = "Somewhere in a Dream"
101020-5 = "..."
101020-6 = "..."
101020-7 = "Aren't you...? What is this place?"
101020-8 = "More importantly, your body..."
101020-12 = "You've encountered the Chroma, have you not?"
101020-16 = "How peculiar... Your consciousness appears to be more or less alert despite contact."
101020-17 = "The Chroma...?"
101020-18 = "The Chroma is best described as an incomprehensible...force lurking outside of Kivotos."
101020-19 = "Is it sentient? Does it have personality? Free will? I still know little of its true nature."
101020-20 = "But what I do know is that it's a deadly poison to Kivotos' inhabitants."
101020-21 = "Become exposed to the Chroma, and you will never be yourself again. Your spirit will be shattered into pieces and your body distorted into a new form."
101020-22 = "You may not die, but any Kivotos resident who comes into contact with it will no longer know themselves. They become distorted into a new being entirely."
101020-23 = "Fear not, the Chroma will not find Kivotos."
101020-24 = "For the Chroma to infiltrate our city, it would be like finding a needle in a haystack. It would be both a miracle and a disaster."
101020-25 = "I don't believe you came into full contact with the Chroma, seeing as you still retain your consciousness. Pray tell, what happened to you?"
101020-26 = "Well..."
101020-27 = "Please, allow me to see myself. Don't move."
101020-36 = "Now then. Excuse me, Prophet of Trinity."
101020-37 = "..."
101020-42 = "You're trapped in my web with no way out. Are you scared, Seia? Afraid of the power outside of Kivotos you can't tear your eyes away from?"
101020-43 = "Your very existence attracted it like a moth to a flame."
101020-46 = "...That thing."
101020-47 = "You ventured a step too far into powers you didn't understand. And now they've dominated you."
101020-49 = "...I see. Someone attempted to manipulate the power of the Chroma for their own benefits."
101020-50 = "They performed a ritual to summon the Chroma to Kivotos. It's fortunate for us all that the ritual was incomplete."
101020-51 = "Which explains your current state. You did not directly encounter the Chroma."
101020-52 = "What you saw was a distant image through a window, a landscape barely discernible through the haze of your dreams."
101020-53 = "If you had reached through that window, you would not have been able to walk away as you did."
101020-54 = "..."
101020-55 = "Although, you did not walk away without injury. Your mind may be safe here in this space with you and me, but your body is likely disintegrating as we speak. "
101020-56 = "That can't be! I can't! There are things out there only I can do, and I must fulfill my duty. And my friend...my friend is... "
101020-57 = "There must be a way to stop it."
101020-58 = "There is not."
101020-62 = "Would ordinarily be the answer."
101020-63 = "However, you are fortunate to have encountered me, Kuzunoha, the Great Prophet of Hyakkiyako."
101020-64 = "...Kuzunoha."
101020-65 = "I will send you back to your body, safely. Of course, you cannot gain without equal loss."
101020-66 = "Equal loss?"
101020-67 = "Yes, a payment of sorts. For your safe return, you must sacrifice one of the essences of your soul. You must leave behind your ability to see the future."
101020-68 = "The Chroma distorts these essences I speak of. Or perhaps it simply draws forth what bubbles beneath the surface. Regardless, allow these infected essences to fester, and you will lose who you are to the Chroma."
101020-69 = "But let it go, extract the poison before its creeping fingers can grasp your soul, and you will be free of the Chroma's erosion."
101020-70 = "What say you? Will you sacrifice the skill you are so proud of so that you may fulfill your proclaimed \"duty,\" Prophet of Trinity?"
101020-76 = "Yes. I will!"
101020-77 = "Said with much conviction and no hesitation. Is this for the sake of your friends? How admirable. Wonderful, wonderful. "
101020-79 = "Farewell then, Seia. Know that you cannot find me back in your world. I do not exist there."
101020-83 = "...?!"
101020-84 = "Ah. Prophetic dreams may still flit about your periphery, like a kaleidoscope outside your window. Good luck."
101020-87 = "Ahhhh!"
101020-97 = "Gematria Conference Room"
101020-100 = "My apologies for my tardiness. I had a matter to take care of."
101020-104 = "..."
101020-105 = "..."
101020-106 = "..."
101020-107 = "We're all here."
101020-109 = "Let's begin."
101020-110 = "We recently discovered the legacy of the nameless priests."
101020-111 = "..."
101020-112 = "Silly me for even asking, but who exactly are these nameless priests, Black Suit?"
101020-113 = "Even I understand the basics. Beatrice's ability to protect royal blood, the cruise missile strong enough to destroy the cathedral, they are all gifts from these nameless priests, no?"
101020-114 = "So putting my heads together, I have gleaned their technology makes that of Kivotos' look like a little child playing in mud."
101020-115 = "You're correct. The nameless priests were once masters of a world predating Kivotos."
101020-116 = "Oho?"
101020-118 = "Exactly. Before the world as we know it today, we had the Nameless Gods, the sublimes of their time. Only the faintest wisps of their existence can be identified in the largely mysterious annals of Kivotos."
101020-119 = "What we do know of these gods is how they manifested themselves: typhoons, cliffsides and trees, lightning, the list goes on. They appeared as crude forms of nature, but in reality embodied the mystery and terror of genesis itself."
101020-120 = "There's very little I can say of the nameless priests who worshiped them, except that they harbor no kind feelings towards Kivotos and its residents."
101020-121 = "And while we've seen neither hide nor tail of the priests themselves, their technology remains littered throughout these lands. Therein is where my interests lie."
101020-122 = "Because, as we've already seen, their technology fetches a high, high price on the black market. Heh."
101020-123 = "..."
101020-124 = "But Golconde has informed me the situation has changed, and we have much greater concerns than price tags at the moment."
101020-125 = "Ah, yes! It may have passed with the blink of an eye, but we observed the Ark, that we did."
101020-126 = "What do you mean by observed? This implies the Ark is not an object to be seen, but a phenomenon that was observed."
101020-127 = "Well..."
101020-128 = "Haha! Fascinating! All this time I was looking for a physical Ark, but you suggest it to be intangible. "
101020-129 = "Which also suggests that using the Kaiser Group to dig up the Abydos Desert was in vain. It seems I've made a...mistake, so to speak."
101020-130 = "Yes, yes. Fascinating. If that is the case, the Ark could reasonably be seen as a manifested concept, a menagerie of swirling mysteries. "
101020-131 = "Hm. Well, speculation serves no one. Let's resume."
101020-132 = "The nameless priests and their troops, believed to be extinct, have made themselves known once again. The situation has taken an unexpected turn."
101020-133 = "Schale's appearance, a failure to secure Kivotos' greatest mystery, losing our only territory in Arius, Decagrammaton's death..."
101020-134 = "And now we have the nameless priests' legacy, the appearance of the Ark..."
101020-135 = "Things have gone awry. Well, this outcome wasn't impossible, I suppose."
101020-136 = "But the facts of our current reality is that unpredicted and uncontrollable variables have rudely introduced themselves into our plans. We've lost control of the situation."
101020-137 = "To make matters worse..."
101020-139 = "You mean to say, Beatrice has made matters worse. The Chroma would have never discovered the existence of Kivotos if not for her ritual."
101020-140 = "..."
101020-142 = "Your garish ritual allowed the Chroma to come into contact with Kivotos. Did you know the risks when you pursued your desires? "
101020-143 = "No, no. Contacting the Chroma was never her goal, but rather to possess its power! Madame's motives were not to expose us to it."
101020-144 = "Even worse! She sought personal gain with the Chroma's power! The audacity, the barbarianism it requires to attempt to take advantage of something so iridescently incomprehensible for a purpose so laughable!"
101020-146 = "Tread much more carefully, little puppet."
101020-147 = "..."
101020-148 = "You \"artists\" suggest the sublime in your own work, and then turn and scoff at that of others. Is that arrogance simply a requirement for tortured, inconsequential artists?"
101020-149 = "Deep breaths, Madame!"
101020-150 = "I don't want to hear anything from you. Decalcomania."
101020-151 = "..."
101020-152 = "You and your silly little ventriloquism with some framed photo isn't the philosophical metaphor of the push and pull of fantasy and reality you believe it to be. All I see is two clowns performing at a circus."
101020-153 = "But of course—!!"
101020-154 = "I understand, Decalcomania, but calm your fury. We must be understanding of Beatrice's injuries she is still nursing."
101020-156 = "Now, now. Let's all behave like the mature adults we are. We were all curious of how Beatrice's ambitions would play out, and she had no intention of bringing the Chroma to Kivotos."
101020-157 = "Regardless, we haven't confirmed the Chroma has actually discovered us. It peeked in through a window in a dream. It may remain just that, a distant dream."
101020-158 = "You're correct. And that window was only opened because of Schale's [USERNAME] Sensei. I have said time and time again, Sensei's existence is the cause for all these distortions."
101020-159 = "..."
101020-160 = "..."
101020-161 = "...Madame."
101020-162 = "I stand by my words. We should have eliminated Sensei the moment they reared their ugly head."
101020-163 = "As long as we exist under the concept of Academy City, [USERNAME] Sensei's existence will surpass ours before we draw our next breath."
101020-164 = "That's how the dice rolls in this story! Stay right here like the sitting ducks we are, and we're subject to the rules and laws of this world."
101020-165 = "Take your rules straight to hell!"
101020-166 = "..."
101020-168 = "I understand. The situation is desperate. Allow me to offer this motley crew its salvation. My solution will handle the nameless priests, Schale, and the Ark in one fell swoop."
101020-169 = "...What?!"
101020-170 = "In fact, the Chroma is fully aware of Kivotos' existence. "
101020-171 = "...!"
101020-172 = "?!"
101020-173 = "!"
101020-177 = "To be frank, I intentionally informed the Chroma of our location. It is coming."
101020-178 = "..."
101020-194 = "Sensei can be protected no longer."
101020-196 = "Sensei [USERNAME]."
101020-197 = "With this..."
101020-198 = "With this...everything will be over."
101020-199 = "[ns] \"Sh...Shiroko?\""
101020-203 = "...Sensei!"
101020-205 = "Arona's Classroom"
101020-206 = "Sensei! Are you okay?"
101020-207 = "What happened? Did you have that dream again?"
101020-208 = "[ns1] Check Arona.\n[ns2] Make sure Arona isn't hurt."
101020-211 = "S-Sensei...?!"
101020-212 = "Why are you examining me? Huh?!"
101020-213 = "What? Did I get shot?"
101020-214 = "Wh-Whoa! I'm okay, Sensei! I don't have bullet holes anywhere, right? Look!"
101020-215 = "There's nothing wrong with me, so calm down!"
101020-216 = "[s] \"...Good. You're safe.\""
101020-218 = "[ns] \"Thank goodness you're not hurt.\""
101020-219 = "..."
101020-220 = "You don't have to worry. I'm fine, Sensei. "
101020-221 = "It was just a bad dream. Everything's okay."
101020-224 = "That dream... A world devoid of color..."
101020-225 = "The girl pointing a gun at you... Her halo...it was distorted."
101020-226 = "The details are blurry, but I saw you die there."
101020-227 = "[s3] \"...\"\n[s4] \"That's worse than a bad dream.\""
101020-230 = "..."
101020-231 = "I can't explain how you and I experienced the same prophetic dream."
101020-232 = "Perhaps our past encounters within our dreams had some sort of influence..."
101020-233 = "[s] \"Do you... Do you know what it means?\""
101020-234 = "I wish I could give you a better answer. But I can only see fragmented visions since I gave up my abilities."
101020-235 = "All I can say with certainty is that all of this must be related to the vision of Kivotos' destruction I saw before."
101020-236 = "[s] \"The destruction of Kivotos...\""
101020-240 = "Six enormous towers descend from the sky, turning the world red."
101020-241 = "They scatter throughout the six regions of Kivotos... Until the Kivotos we know today is nothing but a vague memory."
101020-243 = "[ns] \"...\""
101020-244 = "Don't worry, Sensei. No matter what happens, I'll protect you!"
101020-245 = "[s5] \"Yeah, I'll be counting on you, Arona.\"\n[s6] \"I'm always thankful for you.\""
101020-248 = "Heeheehee. That's right! I deserve some recognition around here."
101020-249 = "All right! What's the agenda today, Sensei?"
101020-250 = "[s] Explain your plans."
101020-251 = "...Rin of the General Student Council?"
101020-252 = "B-But...will Rin believe that?"
101020-253 = "[s7] \"I'm sure Rin will believe me.\"\n[s8] \"Rin is nothing if not diligent.\""
101020-256 = "...Well, if you say so, Sensei."
101020-257 = "I think Rin's a little scary, but... I support you, Sensei!"
101020-262 = "*sigh*"
101020-268 = "..."
101020-269 = "Heh..."
101020-274 = "General Student Council Room"
101020-277 = "..."
101020-278 = "Did you say...destruction?"
101020-279 = "[s] \"Why do you sound so skeptical?!\""
101020-280 = "...You saw this in a dream?"
101020-281 = "[s] \"Well, y-yes but...\""
101020-282 = "You had a dream about Kivotos' destruction."
101020-283 = "But you don't know how or when, and you have no proof in...reality?"
101020-284 = "Interesting... Destruction..."
101020-285 = "[s] \"I-I just thought it was important for you to know, Rinny...\""
101020-286 = "...I'm going to ask you politely to not call me that again."
101020-287 = "[s] \"I-I'm sorry.\""
101020-290 = "..."
101020-291 = "Very well, Sensei."
101020-292 = "I'll look over some old data and the General Student Council's records to see if I can find any precedent."
101020-293 = "[s] \"...Huh?\""
101020-294 = "It would be beneficial to check the Hyakkiyako Allied Academy records as well... It's a rather mysterious organization, so the student database is by no means comprehensive. I may be able to unveil a clue or two though."
101020-295 = "[s] \"Are you saying...you believe me?\""
101020-296 = "My beliefs hold no weight here. Even you seem uncertain about whether or not it was real."
101020-297 = "But still...it must have discomforted you enough to come all this way to report it to me. Your intentions are entirely serious."
101020-298 = "The General Student Council president chose you to fill her space in her absence, so it's my job to help you."
101020-299 = "To honor the president's wishes."
101020-300 = "[s] \"Rinny! I knew I could count on you!!\""
101020-301 = "I'll do what I can on my own, but you'll need more than a vague hunch to get the other General Student Council members on board. If you can get their approval, we'll have more avenues to investigate, Sensei."
101020-302 = "As it stands, I can't allocate too many resources to this, but I'll gather the necessary evidence."
101020-303 = "I'll contact you when I know something."
101020-304 = "Until next time, then."
101020-306 = "Next Episode; A Fissure in Everyday Life 1"

[translation]
101020-1 = "第2話;破局"
101020-3 = "白日夢之中"
101020-5 = "……"
101020-6 = "……"
101020-7 = "你是……不，這裡是……？"
101020-8 = "且慢，汝的身體……"
101020-12 = "──遭遇了「色彩」嗎。"
101020-16 = "妙哉……遭遇色彩之人，竟尚能保持此等程度的意識。"
101020-17 = "色彩……？"
101020-18 = "其乃自奇普托斯外部到來，引起曠古災禍之存在。"
101020-19 = "無從得知其本身是否具備人格或意志。"
101020-20 = "重要的是，對奇普托斯的居民來說，那是致命的劇毒。"
101020-21 = "暴露於色彩之人的肉體將被扭曲──精神亦將遭到侵蝕。"
101020-22 = "對奇普托斯的居民來說，這種程度尚不足以致死……然而，其個體將遭到扭曲，最終成為異物──究竟是否尚能稱之為相同的存在，就另當別論了。"
101020-23 = "但是，色彩要找到奇普托斯近乎等同於不可能。"
101020-24 = "就如同要在沙漠中找到一粒沙子……要被祂所觸及，可說是經歷了相當曲折離奇的命運吧。"
101020-25 = "然而……汝的身體，似乎並非直接接觸了色彩……#n發生了什麼？但說無妨。"
101020-26 = "那是……"
101020-27 = "呼呣……讓妾身來診斷吧。"
101020-36 = "失禮了。"
101020-37 = "……"
101020-42 = "你被「儀式」給捲進去了呢。#n就像是將頭探出了通往奇普托斯外部的窗戶一樣。"
101020-43 = "沒錯……你的存在簡直就像黑暗中的燈火一樣引人注目。"
101020-46 = "……對「那個」來說，呢。"
101020-47 = "暴露在「那個」面前的你的[ruby=mystery]神祕[/ruby]將轉化為[ruby=terror]恐怖[/ruby]──內側的原理將開始支配你。"
101020-49 = "原來如此……有人企圖利用色彩讓身體產生變化啊。#n真是愚蠢……"
101020-50 = "儘管進行了呼喚色彩的儀式……所幸儀式遭到了中斷。"
101020-51 = "……這樣啊。汝並非直接遭遇了色彩。"
101020-52 = "只是藉由「白晝之夢」，透過名為「儀式」的窗口窺見了那個──"
101020-53 = "因而得以平安無事。"
101020-54 = "……"
101020-55 = "然而，那也無法維持多久吧。#n汝之精神雖在此處，肉體卻僅有崩壞一途。"
101020-56 = "怎麼會……我不能，在這種時候倒下……"
101020-57 = "……沒有挽救的方法嗎？"
101020-58 = "沒有。"
101020-62 = "……本應如此。"
101020-63 = "然而汝亦有幸運的遭遇。#n即遇見了妾身──百鬼夜行的預言者，葛葉。"
101020-64 = "……葛葉。"
101020-65 = "就由妾身來引導汝吧。但是，這將伴隨著代價。"
101020-66 = "代價……？"
101020-67 = "必須捨棄組成汝的其中一項本質。#n──以汝的情況來說，那就是「未來視」吧。"
101020-68 = "色彩會扭曲我等的本質。說的更準確一點──應該稱之為反轉我等的根源。無論如何，我等依然將不再是現在的自己。"
101020-69 = "然而，只要支付代價，汝便能脫離色彩的侵蝕。"
101020-70 = "汝意下如何？#n──三一的預言者啊。"
101020-76 = "沒什麼好猶豫的吧？"
101020-77 = "呼呣，竟毫無迷惘做出了抉擇……是為了友人嗎……？#n──值得敬佩。"
101020-79 = "……那麼，就此道別吧，聖亞。#n回到現世後可別嘗試尋找妾身哦？妾身已經不在該處了。"
101020-83 = "……！？"
101020-84 = "啊啊，對了。#n最後，在喪失本質的過程也許會發動最後的預知吧。#n其為無可避免的痛楚──撐住吧。"
101020-87 = "啊啊啊啊啊……！！"
101020-97 = "蓋瑪特利亞．會議室"
101020-100 = "失禮了，稍微來遲了一些。"
101020-104 = "……"
101020-105 = "……"
101020-106 = "……"
101020-107 = "……大家似乎都到齊了。"
101020-109 = "那麼，開始會議吧。"
101020-110 = "不久之前，我觀測到了「無名祭司」的遺產。"
101020-111 = "……"
101020-112 = "我為自己的孤陋寡聞道歉，「無名祭司」具體來說意味著什麼呢？"
101020-113 = "貝雅特里榭所擁有的保護皇家血統的技術，以及破壞古教堂的巡航導彈──這些都是無名祭司的技術，我是這麼解釋的。"
101020-114 = "凌駕於現有技術的超科學──這一類的東西，我這麼解釋是否正確呢？"
101020-115 = "這個嘛……簡單來說，是過去存在於奇普托斯的[ruby= ・    ・    ・    ・    ・    ・    ・ ]這個世界的主人[/ruby]。"
101020-116 = "呼呣……？"
101020-118 = "「無名之神」與崇拜祂們的「無名祭司」──#n他們是在奇普托斯的神祕下堆積而成，本應只留下痕跡的存在……"
101020-119 = "「無名之神」──即大地、海洋、天災等等……#n所謂太古的「神祕」與「恐怖」──可以這麼說吧。#n祂們是以模仿大自然的形態顯現出來的。"
101020-120 = "至於崇拜祂們的「無名祭司」，雖然不清楚他們為何製造出了巡航導彈之類的歐帕茲──不過遭到淘汰的過去之人，對現代的奇普托斯想必不會抱持著友好的立場吧。"
101020-121 = "雖然他們已不知去向，其技術依舊留在這塊土地上。#n沒錯……而我──對他們的遺產非常感興趣。"
101020-122 = "畢竟，在交易上的價值相當高呢。咯咯咯……"
101020-123 = "……"
101020-124 = "然而，最近觀測到的並非那種凡庸的東西。"
101020-125 = "「方舟」被觀測到了。雖然只有一瞬間。"
101020-126 = "……「觀測」？那是能夠認知到的概念嗎？#n不是物體，而是現象？"
101020-127 = "這……"
101020-128 = "真是有趣的問題呢。我本來也認為「方舟」是實際存在的物質……#n看來似乎並非如此。"
101020-129 = "利用凱薩集團在阿拜多斯沙漠進行的調查……全都是白忙一場。#n……因為我有所誤會。"
101020-130 = "如果「方舟」是兼具所有神祕的抽象概念──"
101020-131 = "──不，似乎離題了呢。#n言歸正傳吧。"
101020-132 = "再次觀測到本應消失的「無名祭司」的兵力與遺產……#n這確實已經超出了我們的預期。"
101020-133 = "夏萊的出現、奇普托斯最高神祕的確保失敗、#n唯一剩下的奧利斯領地的剝奪、十字神名的死──"
101020-134 = "以及「無名祭司」的遺產「方舟」的觀測。"
101020-135 = "依照計畫本應不該發生的事態。#n就連在遙遠的未來也不應──不，也許是永遠都不會發生的現象。"
101020-136 = "然而由於無法控制的變數，此刻我們所面對的現在……和原本的計畫實在相去甚遠。"
101020-137 = "不僅如此──"
101020-139 = "「色彩」已經發現了這裡。#n貝雅特里榭，因為你所進行的儀式。"
101020-140 = "……"
101020-142 = "儀式的進行是為了接觸「色彩」。#n祂會招來的混亂你也很清楚吧？"
101020-143 = "正確來說並不是接觸，而是打算利用色彩的力量。#n夫人並非想要呼喚祂。"
101020-144 = "說得沒錯！她打算利用「色彩」的力量讓自己成為偉大之人……#n就為了那種低俗的目的，把那個──！"
101020-146 = "注意你的口氣，木人偶。"
101020-147 = "……"
101020-148 = "所謂的藝術家明明希望自己的作品變得偉大，卻會鄙視他人的願望呢。啊啊──那股傲慢才是藝術家的本質嗎？"
101020-149 = "夫人，請冷靜一點。"
101020-150 = "轉印，你也是一樣哦。"
101020-151 = "……"
101020-152 = "你那對虛像與非存在的隱喻……表現出來的就是讓繪畫說話嗎？在我看來，那就和馬戲團的小丑沒有兩樣。"
101020-153 = "沒錯！！"
101020-154 = "……轉印，請你也別那麼激動。#n我們也該理解她所受到的侮辱。"
101020-156 = "各位，成熟一點吧。貝雅特里榭只是想利用色彩而已，並沒有想把祂呼喚到奇普托斯的意圖才對。"
101020-157 = "還不能斷定色彩已經發現這裡。#n據我所知，那是在夢中發生的事。"
101020-158 = "沒錯。這一切都是夏萊的[USERNAME]老師出現後發生的事。#n那個存在才是一切的元凶，各位也很清楚吧？"
101020-159 = "……"
101020-160 = "……"
101020-161 = "……夫人。"
101020-162 = "我已經說過好幾次了，那個人必須要盡快除掉。"
101020-163 = "……只要這裡是以學園都市這個概念存在，[USERNAME]老師的存在會凌駕我們也是理所當然的。"
101020-164 = "那就是這個故事的類型……換句話說，就是這個世界的法則。#n只要我們還留在這個世界，想要違抗法則──"
101020-165 = "故事的做法什麼的，怎樣都無所謂吧！！"
101020-166 = "……"
101020-168 = "我知道了。就由我來向各位揭示解答吧。#n不管是「無名祭司」、「夏萊」還是「方舟」──全部都能一口氣解決的終極解答。"
101020-169 = "哦……？"
101020-170 = "「色彩」已經發現這裡了。"
101020-171 = "……！？"
101020-172 = "！？"
101020-173 = "！！"
101020-177 = "沒錯，說得更準確一點，是我告訴祂的。#n「色彩」正在接近奇普托斯。"
101020-178 = "……"
101020-194 = "已經，沒有保護老師的方法了。"
101020-196 = "[USERNAME]老師。"
101020-197 = "這樣……"
101020-198 = "這樣就能……結束一切了。"
101020-199 = "[ns]「白子……？」"
101020-203 = "──老師！"
101020-205 = "彩奈的教室"
101020-206 = "老師？你還好嗎？"
101020-207 = "怎麼了嗎？難道──又做了那個夢嗎？"
101020-208 = "[ns1]觀察彩奈\n[ns2]確認彩奈是否有受傷"
101020-211 = "咦，咦咦……？"
101020-212 = "你，你說什麼？身體檢查是嗎？#n啊哇，啊哇哇哇……？"
101020-213 = "咦？被槍擊中……？我嗎？"
101020-214 = "彩，彩奈沒事的！什麼事也沒有發生唷！#n沒問題的唷，老師！"
101020-215 = "我很有精神！#n非常非～常健康哦！"
101020-216 = "[ns]「……嗯，說的也對。」"
101020-218 = "[ns]「彩奈沒有受傷，真是太好了。」"
101020-219 = "……"
101020-220 = "老師，請別擔心。我沒事的。"
101020-221 = "……那只是惡夢而已。#n所以，沒問題的。"
101020-224 = "所有顏色都褪去的世界。"
101020-225 = "在那樣，籠罩著黑白的世界裡……一名帶著扭曲光環的少女，將槍指向了老師。"
101020-226 = "雖然我的視野並不明瞭……不過有件事可以確定，#n[ruby= ・     ・     ・     ・     ・     ・     ・     ・     ・     ・]老師在那時結束了生命[/ruby]。"
101020-227 = "[s3]「…………」\n[s4]「真是可怕的故事呢。」"
101020-230 = "……"
101020-231 = "雖然不清楚老師為何會看見與我相同的預知夢──"
101020-232 = "老師在夢中與我邂逅了無數次……#n也許因此受到了影響。"
101020-233 = "[s]「能知道那個未來何時會發生嗎？」"
101020-234 = "不。我已經喪失了未來視的能力。#n現在只能看見如同碎片一般的幻象……"
101020-235 = "但是，那和我先前告知的「奇普托斯的終焉」有所關聯是確定的。"
101020-236 = "[s]「終焉……」"
101020-240 = "巨大的塔從天而降，虛空被染上緋紅──"
101020-241 = "不祥之塔如悲鳴般地鳴動……將這個世界一點一點地削去……#n接著，黑色的光從天而降……世界傾向了終焉……"
101020-243 = "[ns]「……」"
101020-244 = "請別擔心，老師。#n不管發生什麼事，彩奈都會保護老師的！"
101020-245 = "[s5]「說的也對……」\n[s6]「一直都很謝謝你，彩奈。」"
101020-248 = "哼哼……要更加，更～加感謝我也沒問題唷！"
101020-249 = "啊，老師。今天打算進行什麼工作呢？"
101020-250 = "[s]說出今天的計畫"
101020-251 = "……聯邦學生會的琳同學是嗎？"
101020-252 = "但，但是……琳同學會相信這些話嗎？"
101020-253 = "[s7]「嗯，琳一定會相信我的。」\n[s8]「因為琳是個認真的人。」"
101020-256 = "……我知道了。既然老師都這麼說了。"
101020-257 = "雖然琳同學有點可怕……我會幫你加油的，老師！"
101020-262 = "呼……"
101020-268 = "……"
101020-269 = "呵呵……"
101020-274 = "聯邦學生會．接待室"
101020-277 = "……"
101020-278 = "「終焉」……是嗎？"
101020-279 = "[s]「你完全沒相信吧！？」"
101020-280 = "您說……是預知夢，對吧？"
101020-281 = "[s]「是，是的……」"
101020-282 = "老師所看見的，夢中發生的事。#n這樣啊……奇普托斯迎來了終焉……"
101020-283 = "沒有相關的證據，也不確定何時會發生……？"
101020-284 = "……「終焉」……呼呣。"
101020-285 = "[s]「我想應該讓琳醬知道比較好……」"
101020-286 = "……誰是「琳醬」。"
101020-287 = "[s]「對，對不起。」"
101020-290 = "……"
101020-291 = "我知道了，老師。"
101020-292 = "我會去確認聯邦學生會的資料和紀錄。#n試著尋找是否有類似的例子。"
101020-293 = "[s] 「……咦？」"
101020-294 = "我也會確認百鬼夜行自治區的學生名簿。雖然那裡的資料庫並不是非常準確，要是多少能掌握到一些線索就再好不過了吧。"
101020-295 = "[s]「你相信我說的這些話嗎？」"
101020-296 = "……與其說我信或不信，我想就連老師也並不清楚自己所說的是否會成真吧。"
101020-297 = "但是，既然您願意為了向我傳達這些內容而特地跑來找我……#n至少老師自己是相信著這個預知夢的沒錯吧？"
101020-298 = "……您是聯邦學生會長所指名的人。#n既然如此，我該做的就只有進行準備和採取應對措施而已。"
101020-299 = "這也是對聯邦學生會長應盡的禮節。"
101020-300 = "[s]「謝謝你，琳醬！」"
101020-301 = "……但是，要說服其他學生會的學生就需要相應的證據。#n如果能找到證據，事情就會進行得更加順利。"
101020-302 = "雖然無法對這件事花費太多時間……#n但我會試著盡己所能。"
101020-303 = "近期會再與您聯絡。"
101020-304 = "那麼，我還有其他事，先告辭了。"
101020-306 = "下一話;日常的龜裂（１）"

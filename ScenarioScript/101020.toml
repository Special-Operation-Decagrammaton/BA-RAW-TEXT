[translation]
101020-1 = "ตอนที่ 2;แตกสลาย"
101020-3 = "ที่แห่งหนึ่งในความฝัน"
101020-5 = "......"
101020-6 = "......"
101020-7 = "ทำไมคุณถึงได้... ที่นี่มันคือที่ไหนกัน... "
101020-8 = "เดี๋ยวนะ ร่างของเจ้า..."
101020-12 = "เจ้าพบกับ <สีสัน> มาแล้วสินะ?"
101020-16 = "แปลกจัง... ได้พบกับสีสันแล้ว แต่ยังคงสภาพจิตสำนึกเอาไว้ได้ขนาดนี้เชียว..."
101020-17 = "สีสันอย่างนั้นเหรอ..."
101020-18 = "สิ่งนั้นคือพลังที่ไม่อาจเข้าใจได้ที่ได้รับเข้ามาจากภายนอกคิโวทอส"
101020-19 = "เราไม่อาจรู้ได้ว่ามันมีความเป็นมนุษย์หรือเจตจำนงหรือเปล่า..."
101020-20 = "แต่สิ่งที่สำคัญคือ มันเป็นพิษร้ายแรงต่อชาวคิโวทอส"
101020-21 = "เห็นว่าร่างกายของคนที่ได้รับสีสันจะบิดเบี้ยว จิตวิญญาณจะแตกออกเป็นเสี่ยงๆ"
101020-22 = "นับว่าโชคดีที่หากเป็นชาวคิโวทอสก็จะไม่ตาย... แต่หลังจากนั้นการดำรงอยู่ก็จะบิดเบือนและกลายเป็น#nสิ่งที่แตกต่างโดยสิ้นเชิง"
101020-23 = "แต่มันแทบจะเป็นไปไม่ได้เลยที่สีสันจะค้นพบคิโวทอสได้"
101020-24 = "นี่อาจเรียกว่าการหาเม็ดเกลือบนหาดทรายยังได้เลย ปาฏิหาริย์... ใช่ ราวกับปาฏิหาริย์ที่เลวร้ายด้วย"
101020-25 = "ดูจากสภาพร่างกายของเจ้าแล้ว ข้าไม่คิดว่าเจ้าได้สัมผัสกับสีสันนั้นอย่างสมบูรณ์ด้วย... นี่มันเรื่องอะไรกันน่ะ?"
101020-26 = "คือว่า..."
101020-27 = "เธออยู่นิ่งๆ ก่อน ฉันจะตรวจสอบเอง"
101020-36 = "ไหนดูซิ... ขอเสียมารยาทหน่อยนะ นักพยากรณ์แห่งทรีนิตี้"
101020-37 = "......"
101020-42 = "ก็คุณตกหลุมพรางของ <พิธี> นี่คะ คงไม่ต่างจากการยื่นหน้าออกไปนอกหน้าต่างที่เปิดไปสู่ภายนอก#nของคิโวทอสหรอกค่ะ"
101020-43 = "การดำรงอยู่ของคุณจะสะดุดตาราวกับแสงไฟในความมืดเลยละ"
101020-46 = "สะดุดตาสำหรับ <สิ่งนั้น> ยังไงล่ะคะ..."
101020-47 = "[ruby=Mystery]ความลึกลับ[/ruby]ของคุณที่ประจักษ์ต่อ <สิ่งนั้น> กลับกลายเป็น[ruby=Terror]ความกลัว[/ruby] และหลักการเบื้องหลังนั้นก็เริ่ม#nครอบงำคุณค่ะ"
101020-49 = "...... มีใครบางคนพยายามเปลี่ยนแปลงตัวเองโดยการใช้สีสันสินะ"
101020-50 = "มีคนทำพิธีเรียกสีสันมายังที่นี่ แต่พิธียังไม่สมบูรณ์... และโชคดีที่พิธีถูกยกเลิกไปเสียก่อน"
101020-51 = "เป็นอย่างนี้นี่เอง... เจ้าไม่ได้พบกับสีสันโดยตรง"
101020-52 = "เจ้าเพียงแค่แอบดูสิ่งนั้นใน <ความฝัน> ผ่านทางหน้าต่างที่เรียกว่า <พิธี>"
101020-53 = "เพราะแบบนั้นเจ้าก็เลยยังปลอดภัยอยู่นี่เอง"
101020-54 = "......"
101020-55 = "แต่นั่นก็เป็นเรื่องของเวลา แม้ตอนนี้จิตวิญญาณของเจ้าจะอยู่ที่นี่ แต่ร่างกายของเจ้าอาจจะกำลัง#nพังทลายอยู่ก็เป็นได้"
101020-56 = "มะ.. ไม่ได้นะ...! ฉันมีเรื่องสำคัญต้องทำนะคะ! ตอนนี้เพื่อนของฉัน... แล้วก็... "
101020-57 = "มะ.. มีวิธีหยุดเรื่องนี้ไหมคะ?"
101020-58 = "ไม่มีหรอก"
101020-62 = "เดิมทีแล้วมันไม่มี..."
101020-63 = "แต่ตอนนี้เจ้ายังโชคดีอยู่ เพราะเจ้าได้มาพบกับคุซึโนฮะ ผู้พยากรณ์ใหญ่แห่งเฮียกคิยาโคผู้นี้"
101020-64 = "คุซึโนฮะ..."
101020-65 = "ข้าจะพาเจ้ากลับไปอย่างปลอดภัย แต่มันก็มีราคาที่ต้องจ่ายอยู่นะ"
101020-66 = "ราคาที่ต้องจ่าย...?"
101020-67 = "เจ้าต้องทิ้งหนึ่งอย่างที่ประกอบขึ้นเป็นตัวเจ้า ใช่แล้ว สำหรับเจ้ามันคือพลังในการมองเห็นอนาคต"
101020-68 = "สีสันเข้ามาบิดเบือนวิสัยของเรา ไม่สิ หรือต้องบอกว่ามันหยิบเอาสิ่งที่อยู่ในการหลับไหลออกมาดีล่ะ? แต่ไม่ว่าจะยังไงก็เหมือนว่าเจ้าไม่เป็นตัวของตัวเองอยู่ดี"
101020-69 = "หากทำเช่นนั้น เจ้าก็จะหลุดพ้นจากการกัดกร่อนของสีสันได้"
101020-70 = "ว่าไงล่ะ? จะตอบรับข้อแลกเปลี่ยนนี้ไหม? นักพยากรณ์แห่งทรีนิตี้"
101020-76 = "ฉันจะทำค่ะ"
101020-77 = "ไม่ลังเลเลยสินะ เป็นเพราะอยากไปช่วยเพื่อนงั้นเหรอ ดีจังเลยนะ ดีจริงๆ "
101020-79 = "ถ้างั้นก็ลาก่อนนะ เซอา อ้อ กลับไปแล้วก็อย่าพยายามตามหาข้าล่ะ เพราะข้าจะไม่อยู่ตรงนี้อีกต่อไปแล้ว"
101020-83 = "......!?"
101020-84 = "จริงสิ สุดท้ายแล้วการฝันบอกเหตุนี้อาจผ่านไปอย่างรวดเร็วก็ได้ อดทนหน่อยนะ"
101020-87 = "อ๊ายยยยยย......!!"
101020-97 = "ห้องประชุมเกมาเทรีย"
101020-100 = "ขออภัย พอดีผมมีธุระต้องทำก็เลยมาช้าไปหน่อยน่ะครับ"
101020-104 = "......"
101020-105 = "......"
101020-106 = "......"
101020-107 = "......มากันครบหมดแล้วสินะ"
101020-109 = "งั้นก็เริ่มประชุมเลยครับ"
101020-110 = "มรดกของนักบวชนิรนามถูกค้นพบเมื่อไม่นานมานี้ครับ"
101020-111 = "......"
101020-112 = "กระผมต้องขออภัยในความผิดพลาดนี้ด้วยครับ สูทดำ ที่เรียกว่า <นักบวชนิรนาม> นั่นมันคืออะไรกัน#nแน่เหรอครับ?"
101020-113 = "เทคโนโลยีป้องกันสายเลือดของราชวงศ์ที่เบียทริซเป็นเจ้าของ ขีปนาวุธร่อนที่เคยทำลายวิหารโบราณ ... ของพวกนี้คือเทคโนโลยีของเหล่านักบวชนิรนามครับ"
101020-114 = "ที่ผมเข้าใจคือ สิ่งนี้เป็นวิทยาศาสตร์บางอย่างที่เหนือเทคโนโลยีที่มีอยู่ครับ"
101020-115 = "ถ้าจะให้พูดง่ายๆ พวกเขาก็คือเจ้าของโลกใบนี้ก่อนที่จะมีคิโวทอสครับ"
101020-116 = "หืม...?"
101020-118 = "ความสูงส่งที่จะต้องเหลือไว้แค่ร่องรอยเท่านั้นภายใต้ความลึกลับของคิโวทอส... เหล่านักบวชนิรนาม#nที่ศรัทธาในพวกเขาและ <เทพไร้นาม>..."
101020-119 = "ต้องเรียกว่าความลึกลับและความกลัวที่มีมาตั้งแต่ยุคดึกดำบรรพ์ ราวกับหินก้อนใหญ่ ต้นไม้ พายุ ฟ้าผ่า...  เพราะฉะนั้น พวกเขาจึงปรากฏให้เห็นในรูปแบบของการถอดแบบธรรมชาติครับ"
101020-120 = "ส่วนเหล่านักบวชนิรนามที่ศรัทธาในตัวพวกเขา... เราไม่อาจรู้ได้ว่าพวกนั้นวางแผนจะทำอะไร แต่อย่างน้อยก็ไม่น่าจะใช่เรื่องดีสำหรับคิโวทอสนะครับ"
101020-121 = "ถึงพวกเขาจะซ่อนตัว แต่เทคโนโลยีของพวกเขาก็ยังหลงเหลืออยู่บนผืนดินนี้ และผมก็สนใจมรดก#nของพวกเขามากครับ"
101020-122 = "เพราะมันซื้อขายกันในราคาแพงยังไงล่ะครับ หึหึหึ..."
101020-123 = "......"
101020-124 = "แต่ที่ผมทำนายได้มาเมื่อไม่นานมานี้คือ นั่นไม่ใช่แค่สิ่งที่ทำเพียงเล่นๆ เลยละครับ"
101020-125 = "มันคือ <เรือ> ครับ แม้จะแค่พริบตาเดียวก็เถอะ"
101020-126 = "ทำนาย? มันเป็นสิ่งที่ทำนายได้งั้นเหรอ? มันไม่ใช่วัตถุที่เห็นได้ แต่เป็นปรากฏการณ์เหรอ?"
101020-127 = "เรื่องนั้น..."
101020-128 = "เป็นคำถามที่น่าสนใจครับ ตอนแรกผมเองก็คิดว่า <เรือหลบภัย> นั้นเป็นวัตถุที่มีตัวตน... แต่ก็ดูเหมือนว่าจะไม่ใช่เช่นนั้นครับ "
101020-129 = "การใช้ประโยชน์จากไคเซอร์กรุ๊ปในการขุดค้นทะเลทรายอะบิดอสนั่นก็ด้วย... ผมว่ามันน่าจะเป็นความ#nพยายามที่สูญเปล่านะครับ ผมเข้าใจผิดอย่างแรงเลยละครับ"
101020-130 = "หากว่า <เรือ> นั่นเป็นแนวคิดนามธรรมที่ครอบคลุมความลึกลับทั้งหมดละก็... "
101020-131 = "...ไม่สิ นี่มันออกทะเลเกินไปแล้วครับ กลับมาที่ประเด็นหลักครับ"
101020-132 = "การที่กองกำลังและมรดกของ <นักบวชนิรนาม> ที่จะต้องหายไปกลับมาเป็นสิ่งที่ทำนายได้อีก... สิ่งนี้มันอยู่นอกเหนือจากที่พวกผมคาดไว้ครับ"
101020-133 = "การปรากฏตัวของชาเล่ต์ ความล้มเหลวในการรักษาความลึกลับสูงสุดในคิโวทอส การถอดถอนดินแดนอาเรียสที่มีเพียงหนึ่ง ความตายของเดคาแกรมมาทอน..."
101020-134 = "ตลอดจนการรับรู้เรื่อง <เรือ> ที่เป็นมรดกของเหล่านักบวชนิรนาม..."
101020-135 = "ถ้าเป็นดังแผนตามเดิม ก็ต้องไม่ใช่ตอนนี้ครับ อาจเป็นอนาคตอันไกลมาก... หรือบางทีอาจจะเป็น#nอนาคตที่ไม่มีวันมาถึงก็ได้ครับ"
101020-136 = "แต่ระหว่างนั้นก็เกิดตัวแปรที่ควบคุมไม่ได้ ปัจจุบันที่เรากำลังเผชิญอยู่มันผิดไปจากที่เราวางแผนไว้#nไปมากครับ"
101020-137 = "ไม่เพียงเท่านั้น..."
101020-139 = "ใช่ <สีสัน> ค้นพบสถานที่แห่งนี้ เป็นเพราะพิธีที่ท่านเบียทริซจัดขึ้นมา "
101020-140 = "......"
101020-142 = "พิธีที่ทำมันเป็นการติดต่อกับ <สีสัน> คุณไม่ได้ตระหนักถึงความเสี่ยงที่จะเกิดขึ้นเหรอ? "
101020-143 = "มันไม่ได้เป็นการติดต่อโดยตรง แต่เป็นการใช้ประโยชน์จากพลังของสีสัน มาดามไม่ได้ตั้งใจจะเรียก#nสิ่งนั้นออกมาครับ"
101020-144 = "ใช่! ใช้ประโยชน์จากพลังของสีสัน เพื่อสร้างให้ตัวเองเป็นผู้ยิ่งใหญ่! เพื่อจุดประสงค์ที่ต่ำต้อยเช่นนี้..."
101020-146 = "ระวังคำพูดด้วยค่ะ หุ่นตุ๊กตาไม้"
101020-147 = "......"
101020-148 = "แม้ศิลปินจะหวังให้ผลงานของตัวเองยิ่งใหญ่กว่าตัวเอง แต่ก็ยังมาประเมินเป้าหมายของคนอื่นต่ำๆ ได้นะคะ ความอวดดีนั่นคือแก่นแท้ของศิลปินเหรอคะ?"
101020-149 = "ใจเย็นเถอะครับมาดาม"
101020-150 = "นายเองก็เหมือนกัน เดคาโคมาเนีย"
101020-151 = "......"
101020-152 = "การคุยกับกรอบรูปนี้เป็นการอุปมาภาพลวงตาและความไม่มีอยู่จริงของคุณหรือเปล่า? ฉันคิดว่ามันไม่#nต่างอะไรกับตัวตลกในคณะละครสัตว์เลยนะ"
101020-153 = "ใช่แล้ว!!"
101020-154 = "......อย่าโกรธเลยครับ เดคาโคมาเนีย เราต้องเข้าใจคำดูถูกที่ผู้หญิงคนนั้นประสบครับ"
101020-156 = "เอาละๆ ทำตัวเป็นผู้ใหญ่กันหน่อยครับ เบียทริซเพียงแค่ตั้งใจจะใช้สีสัน และนั่นไม่ใช่แผนการที่จะ#nเรียกมันมายังคิโวทอสครับ"
101020-157 = "เรายังตัดสินชี้ขาดไม่ได้ว่าสีสันได้ค้นพบที่แห่งนี้แล้วครับ เท่าที่ผมรู้คือมันเป็นเหตุการณ์ที่เกิดขึ้นใน#nความฝัน"
101020-158 = "ใช่ค่ะ ทุกอย่างเกิดขึ้นหลังจากที่ครู [USERNAME] แห่งชาเล่ต์ปรากฏตัวค่ะ ทุกคนไม่รู้หรอกเหรอคะว่าการมีอยู่ของคนคนนั้นเป็นจุดเริ่มต้นของความบิดเบี้ยวทั้งหมดนี้?"
101020-159 = "......"
101020-160 = "......"
101020-161 = "......มาดาม"
101020-162 = "อย่างที่ฉันบอกไปแล้วหลายครั้ง เราต้องกำจัดคนคนนั้นโดยเร็วที่สุดค่ะ"
101020-163 = "......ตราบใดที่ที่แห่งนี้คือเมืองแห่งการศึกษา การมีอยู่ของคุณครู [USERNAME] ก็ย่อมอยู่เหนือพวกเราอย่างหลีกเลี่ยงไม่ได้ครับ"
101020-164 = "นั่นคือประเภทของเรื่องนี้... ไม่สิ ถ้าจะพูดง่ายๆ ต้องบอกว่ามันคือกฎของโลกใบนี้ครับ ตราบใดที่พวกกระผมยังอยู่ในโลกใบนี้ กฎนั้นก็ไม่สามารถ..."
101020-165 = "ฉันไม่สนใจศาสตร์การแต่งเรื่องแบบนั้นหรอกค่ะ!!"
101020-166 = "......"

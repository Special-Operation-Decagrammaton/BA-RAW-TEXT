[translation]
1011503-1 = "Special Training 2"
1011503-3 = "...And that's why I want to practice pitching!"
1011503-4 = "[ns1] \"Wait, wait, wait.\"\n[ns2] \"Let's back up a step...\""
1011503-7 = "Hm? Do I normally play pitcher?"
1011503-8 = "Well, no. There are a few really great players who can pitch AND hit..."
1011503-9 = "Two-way players, they call them."
1011503-10 = "But I am in no way on that level. Not yet, at least."
1011503-11 = "I hope I can be someday!"
1011503-12 = "But if I can look at the batter from the pitcher's perspective, that might make me a better hitter."
1011503-13 = "And it could make it easier to guess the next pitch."
1011503-14 = "Eventually, if I can start predicting their pitches, I can swing based on that."
1011503-15 = "They call it \"guess hitting.\""
1011503-16 = "That would naturally increase my hit rate, AND my slugging percentage, and THEN..."
1011503-17 = "Then I could hit a home run, right?!"
1011503-18 = "[s] \"Now that you've said it, yeah that sounds right!\""
1011503-19 = "Right? So that's how it's gonna be!"
1011503-20 = "I'll start pitcher practice today!"
1011503-22 = "And so, again, Rei marched right onto the field, but..."
1011503-28 = "Hit by pitch! Batter, advance!"
1011503-29 = "Ugh...! Okay, I focused too much on speed. Too much force on my shoulders."
1011503-30 = "Next time for sure!"
1011503-35 = "Base on ball! Batter, advance!"
1011503-36 = "No way, I'm SURE I aimed right down the middle!"
1011503-41 = "...Hey, no. A pitcher has to be calm... Gotta breathe and come back to my senses!"
1011503-48 = "Clean hit! Home run!"
1011503-49 = "Great, I can't HIT home runs, but I can give them up?!"
1011503-50 = "I think my pitches are too focused. I shouldn't drag the count!"
1011503-58 = "Hit by pitch. And the batter training robot's left arm has been damaged."
1011503-59 = "Ugh..."
1011503-64 = "Hit by pitch. And the batter training robot's abdomen has been damaged."
1011503-65 = "Please...!"
1011503-69 = "Hit by pitch. The batter training robot has been hit in the head. Not to worry. Only the main camera is broken."
1011503-78 = "...There are no available batter training robots remaining. Would you like to end today's training?"
1011503-79 = "Eek...!"
1011503-84 = "Why can't I do this?!"
1011503-85 = "[ns] \"C-Calm down, Rei! You weren't used to pitching in the first place!\""
1011503-86 = "...*sniff*"
1011503-87 = "Sensei? You've got a good idea for training, right? Don't you?"
1011503-88 = "I can't think of anything, so whatever you can come up with..."
1011503-89 = "[ns] \"Mm... What do you think a pitcher needs?\""
1011503-90 = "Well, ball control, of course."
1011503-91 = "They say, \"Throw strikes, because home plate doesn't move.\""
1011503-92 = "They also say you should learn curve balls after you master controlling fastballs."
1011503-93 = "[s3] \"Ball control, ball control...\"\n[s4] \"All right, let's practice ball control!\""
1011503-96 = "What?!"
1011503-97 = "H-How, though...?"
1011503-101 = "We're back at the arcade again?!"
1011503-102 = "I don't think more timing practice is going to help..."
1011503-103 = "Huh? There's other stuff here? Like what?"
1011503-108 = "These are...darts? Is that what you call them?"
1011503-109 = "Aha. So these are the darts, and I throw them into the dart board, and try to get the highest score?"
1011503-110 = "Well, that could help my concentration, and maybe improve control of my hand. Sure, I'll give it a shot, then!"
1011503-112 = "Hiyah!"
1011503-113 = "Another bullseye! That's five in a row! One dart left."
1011503-114 = "I really feel like I'm concentrating here. Okay, last one... "
1011503-116 = "Hey, look! She just landed five bullseyes in a row!"
1011503-117 = "Does she even have any SPACE left for another bullseye now?"
1011503-118 = "*inhale*"
1011503-119 = "Hiya!"
1011503-123 = "Perfect bullseyes all around! Congrats! You broke our record for the day!"
1011503-127 = "[ns5] \"That's amazing, Rei!\"\n[ns6] \"Maybe you're just naturally gifted with micro-control.\""
1011503-130 = "..."
1011503-131 = "No, this isn't it!"
1011503-132 = "[s] \"Wh-What do you mean?\""
1011503-133 = "These darts are too light compared to baseballs!"
1011503-135 = "For ball control practice, what I'm going to need is..."
1011503-136 = "...Hmm, something moderately heavy, difficult to throw, but not impossible..."
1011503-137 = "!"
1011503-138 = "Sensei, I got it!"
1011503-139 = "[s] \"Yeah! What?\""
1011503-140 = "What we need is a frisbee!"
1011503-141 = "[s] \"Huh...?\""
1011503-144 = "I'm gonna throw it so it comes back in a big circle!"
1011503-148 = "[ns] \"Are we talking about a frisbee or a boomerang?\""
1011503-151 = "It IS possible with a frisbee, if you've got enough control!"
1011503-153 = "You've gotta throw it so it catches the air just right!"
1011503-157 = "[ns] \"This sounds more like a magic ball from some old manga...\""
1011503-159 = "No, trust me! If you've got the control, you can do it!"
1011503-168 = "You could do it too, Sensei!"
1011503-169 = "Huh? You're asking why you'd need to join in? Well, listen..."
1011503-170 = "This practice we're doing here could open a lot of doors. It even counts as fielder practice!"
1011503-171 = "I gave in to Rei's push and threw a frisbee."
1011503-175 = "Okay! I'll go catch it!"
1011503-179 = "Hiyaaa!!"
1011503-183 = "I caught it, Sensei! But no... No, you need to throw it higher!"
1011503-184 = "[s] \"Like, over your head?\""
1011503-185 = "That's how fly balls go! Now, come on!"
1011503-190 = "Thanks! Now what next...? Hmm..."
1011503-194 = "Hiyah!"
1011503-195 = "Did you see that? I jumped up and caught it! Okay, THIS time..."
1011503-196 = "...throw it as far as you can, in a slightly different direction!"
1011503-197 = "[s] \"You might not be able to catch it then, you know.\""
1011503-198 = "Balls don't always fly the way you want them to! Now, come on!"
1011503-202 = "Okay, I'm on it...!"
1011503-206 = "Hey, look over there. Is Schale's Sensei treating a student like a dog?"
1011503-207 = "Throwing a frisbee, making her catch it, throwing it the other way and making her run around for it..."
1011503-208 = "I mean, you hear stories about Sensei, but this... Wow."
1011503-212 = "[ns] \"How am I ever going to fix my reputation...?\""
1011503-214 = "Hm? What'd you say, Sensei?"

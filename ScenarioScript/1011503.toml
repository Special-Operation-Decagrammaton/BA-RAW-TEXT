[translation]
1011503-1 = "การฝึกซ้อมพิเศษ 2"
1011503-3 = "ครั้งนี้ฉันก็เลยจะลองฝึกขว้างลูกดูค่ะ!!!"
1011503-4 = "[ns1] \"เดี๋ยวๆๆ มันยังไงนะ?\"\n[ns2] \"ช่วยอธิบายให้ครูเข้าใจหน่อยสิ\""
1011503-7 = "คะ? ถามว่าฉันก็เป็นพิชเชอร์ด้วยหรือเปล่าเหรอคะ?"
1011503-8 = "ไม่หรอกค่ะ ในบรรดาผู้เล่นเก่งๆ ก็มีทั้งคนที่เล่นได้ทั้งเกมรุกและเกมรับ"
1011503-9 = "หรือก็คือเล่นได้ทั้งตำแหน่งพิชเชอร์และแบตเตอร์เลยค่ะ..."
1011503-10 = "แต่สำหรับฉันแล้ว ฉันไม่ได้เก่งถึงขนาดนั้นค่ะ..."
1011503-11 = "ถึงฉันจะคิดว่าฉันก็อยากเป็นแบบนั้นให้ได้ในสักวันก็เถอะ!"
1011503-12 = "แต่ถ้าจะตีลูกให้ได้ดี ฉันคิดว่าเราต้องมองแบตเตอร์จากมุมมองของพิชเชอร์ด้วยค่ะ"
1011503-13 = "แบบนั้นจะทำให้คาดเดาได้ง่ายขึ้นว่าพิชเชอร์จะขว้างลูกแบบไหนมา"
1011503-14 = "และถ้าฝึกแบบนั้นบ่อยเข้าๆ แบตเตอร์ก็จะจับทางได้ว่าจะได้เจอกับลูกในลักษณะไหน จะได้หวดลูก#nได้ถูกต้อง..."
1011503-15 = "แล้วก็จะชำนาญในการเดาทางของลูกได้มากกว่าเดิมด้วยค่ะ!"
1011503-16 = "นั่นจะทำให้เปอร์เซ็นต์การตีลูกโดนเพิ่มขึ้น และเปอร์เซ็นต์การตีลูกไกลก็จะเพิ่มขึ้นอีก แล้วถ้าเป็นอย่างนั้นไปเรื่อยๆ..."
1011503-17 = "ก็ต้องตีลูกโฮมรันได้แน่นอนค่ะ!!"
1011503-18 = "[s] \"ฟังดูแล้วก็น่าจะเป็นอย่างนั้นนะ!\""
1011503-19 = "ใช่มั้ยคะ? นั่นละค่ะแผนของฉัน!"
1011503-20 = "เพราะงั้นวันนี้ฉันจะเริ่มฝึกขว้างลูกค่ะ!"
1011503-22 = "(แล้วเรย์ก็วิ่งเข้าสนามด้วยพละกำลังที่เต็มเปี่ยมเหมือนเคย...)"
1011503-28 = "<เดดบอล! ไปที่เบสต่อไป!>"
1011503-29 = "อึก...! ใส่ใจเรื่องความเร็วของลูกมากเกินไป ก็เลยออกแรงที่ไหล่มากไปหรือเปล่านะ?"
1011503-30 = "แต่ครั้งต่อไปฉันไม่พลาดหรอก!"
1011503-35 = "<โฟร์บอล! ไปที่เบสแรก!>"
1011503-36 = "ตั้งใจจะขว้างไปตรงกลางแท้ๆ เชียว!"
1011503-41 = "ไม่สิ ห้ามสติแตก เป็นพิชเชอร์ต้องใจเย็นเข้าไว้... ตั้งสติให้ได้!"
1011503-48 = "<คลีน ฮิต! โฮมรัน!>"
1011503-49 = "โฮมรันเลยเหรอ? ฉันยังไม่เคยตีได้เลยนะ!?"
1011503-50 = "ฉันขว้างเข้าไม้เองน่ะแหละ... ต่อไปต้องรอบคอบให้มากกว่านี้แล้ว!"
1011503-58 = "<เดดบอล หุ่นยนต์แบตเตอร์ฝึกซ้อม แขนซ้ายหักครับ>"
1011503-59 = "อึก...!"
1011503-64 = "<เดดบอล หุ่นยนต์แบตเตอร์ฝึกซ้อม ช่วงท้องพังครับ>"
1011503-65 = "โธ่เอ๊ย...!"
1011503-69 = "<เดดบอล หุ่นยนต์แบตเตอร์ฝึกซ้อม โดนปาหัวเข้าเต็มๆ แต่ไม่เป็นไรครับ ก็แค่กล้องตัวหลักพังเท่านั้น#nเอง>"
1011503-78 = "<ไม่เหลือหุ่นยนต์แบตเตอร์ฝึกซ้อมให้ใช้แล้วครับ หยุดการฝึกของวันนี้ก่อนมั้ยครับ?>"
1011503-79 = "เฮือก...!"
1011503-84 = "ทำไมถึงขว้างไม่ได้เรื่องเลยนะ?!"
1011503-85 = "[ns] \"จะ... ใจเย็นก่อนนะเรย์ ก็เราไม่คุ้นเคยกับการขว้างลูกนี่นา!\""
1011503-86 = "(สะอื้น...)"
1011503-87 = "คุณครู มีไอเดียดีๆ สำหรับการฝึกซ้อมบ้างมั้ยคะ...?"
1011503-88 = "ตอนนี้ฉันคิดอะไรไม่ออกเลย ก็เลยอยากได้ไอเดียอะไรจากคุณครูค่ะ..."
1011503-89 = "[ns] \"อืม... คิดว่าอะไรคือสิ่งสำคัญของพิชเชอร์เหรอ?\""
1011503-90 = "ก็ต้องเป็นการควบคุมลูกบอลอยู่แล้วค่ะ"
1011503-91 = "มีคำที่บอกว่าโฮมเพลตขยับไม่ได้ ดังนั้นจึงต้องขว้างลูกสไตรค์"
1011503-92 = "แล้วก็มีคำที่บอกว่าให้ควบคุมลูกให้เป็นก่อน แล้วถึงค่อยเรียนรู้เรื่องลูกโค้งด้วยค่ะ"
1011503-93 = "[s3] \"ควบคุมลูก... งั้นก็ต้องโฟกัสเรื่องนี้ก่อนสิ!\"\n[s4] \"งั้นก็มาฝึกการควบคุมลูกกัน!\""
1011503-96 = "คะ?!"
1011503-97 = "คะ... ครั้งนี้มันอะไรอีกคะเนี่ย...?"
1011503-101 = "มาร้านเกมอีกแล้วนี่คะ!?"
1011503-102 = "เราฝึกเรื่องจังหวะกันไปแล้วนี่..."
1011503-103 = "คะ? นอกจากฝึกจังหวะแล้ว ที่นี่ยังใช้ฝึกเรื่องอื่นๆ ได้ด้วยงั้นเหรอคะ? หมายถึงเรื่องอะไรน่ะ..."
1011503-108 = "นี่มัน... เกมปาลูกดอกงั้นเหรอคะ?"
1011503-109 = "อ้อ เป็นเกมที่ต้องขว้างลูกดอกที่เป็นรูปลูกศรให้ไปปักที่กระดานให้ได้คะแนนสูงๆ สินะคะ"
1011503-110 = "เหมือนเกมนี้จะ... ช่วยเรื่องการฝึกสมาธิ รวมถึงการขว้างและควบคุมลูกได้เลยนะคะ! งั้นฉันจะลองเล่นดูค่ะ!"
1011503-112 = "เยส!"
1011503-113 = "ปาเข้าตรงกลางติดต่อกัน 5 ครั้งเลยครับ! เหลือลูกดอกอีกอันเดียวเท่านั้น!"
1011503-114 = "รู้สึกเหมือน... มีสมาธิจดจ่อได้จริงๆ เลยค่ะ เอาละ เหลืออีกลูกเดียว...! "
1011503-116 = "ดูทางโน้นสิ! นักเรียนคนโน้นปาลูกดอกเข้ากลางกระดาน 5 ลูกติดเลย!"
1011503-117 = "แบบนั้นก็ไม่มีที่ตรงกลางเหลืออีกแล้วหรือเปล่า...?"
1011503-118 = "ฮู่ว..."
1011503-119 = "ย้า!"
1011503-123 = "เข้าตรงกลางอีกแล้ว! ยินดีด้วยครับ! ทำคะแนนได้สูงสุดของวันนี้เลยครับ!"
1011503-127 = "[ns5] \"เยี่ยมไปเลย เรย์!\"\n[ns6] \"มีพรสวรรค์ในการขว้างลูกเหมือนกันนะเนี่ย\""
1011503-130 = "..."
1011503-131 = "ไม่หรอกค่ะ แค่นี้ยังไม่พอหรอก!"
1011503-132 = "[s] \"ทะ... ทำไมล่ะ...?\""
1011503-133 = "อย่างแรกเลยนะคะ ลูกดอกมันเบากว่าลูกเบสบอลมากค่ะ!"
1011503-135 = "สิ่งที่จำเป็นในการฝึกขว้างลูก... ปัจจัยสำคัญในการควบคุมลูก..."
1011503-136 = "ต้องเป็นสิ่งที่มีน้ำหนักพอเหมาะ โยนได้ยาก แต่ก็ยังสามารถควบคุมได้..."
1011503-137 = "!"
1011503-138 = "คุณครู ฉันคิดออกแล้วค่ะ!"
1011503-139 = "[s] \"อื้อ! อะไรเหรอ?\""
1011503-140 = "จานร่อนค่ะ เราต้องใช้จานร่อน!"
1011503-141 = "[s] \"หืม..?\""
1011503-144 = "วาดเส้นโค้งใหญ่ๆ และขว้างออกไปให้จานหมุนกลับมา!"
1011503-148 = "[ns] \"แบบนั้นมันบูมเมอแรงไม่ใช่เหรอ?!\""
1011503-151 = "ทำได้ค่ะ! ขอแค่มีแรงขว้างและควบคุมได้ก็พอ!"
1011503-153 = "ทำท่าเหมือนจะขว้างออกไปเป็นเส้นตรง แล้วก็โยนขึ้นไปข้างบนเอาดื้อๆ เลย!"
1011503-157 = "[ns] \"ขว้างหลอกเหมือนในการ์ตูนสมัยก่อนเหรอ!?\""
1011503-159 = "ทำได้ค่ะ! ขอแค่มีแรงขว้างและควบคุมได้ก็พอ!"
1011503-168 = "เอาละ คุณครูก็มาฝึกด้วยกันค่ะ!"
1011503-169 = "คะ? ทำไมคุณครูต้องมาฝึกด้วยน่ะเหรอคะ? ไม่รู้อะไรเสียแล้ว คุณครูคะ การฝึกแบบนี้น่ะ..."
1011503-170 = "มันจะเป็นประโยชน์ต่อการฝึกของผู้เล่นฝ่ายรับไปด้วยนะคะ!"
1011503-171 = "(แล้วคุณครูก็ต้านทานความมุ่งมั่นของเรย์ไม่ได้ จนต้องมาขว้างจานร่อนด้วยกัน)"
1011503-175 = "เอาละ! ฉันจะคว้าให้อยู่เลย!"
1011503-179 = "ย้าาาาาห์!!!"
1011503-183 = "รับได้แล้วค่ะ คุณครู! แต่แค่นี้ยังไม่พอค่ะ... ขว้างมาให้สูงกว่านี้หน่อยค่ะ!"
1011503-184 = "[s] \"งั้นมันน่าจะเลยหัวเลยนะ?\""
1011503-185 = "ไม่เป็นไรค่ะ! ปกติลูกฟลายบอลก็เป็นอย่างนั้นค่ะ!"
1011503-190 = "ขอบคุณค่ะ! เอาละ... เข้ามาเลย..."
1011503-194 = "เยส!"
1011503-195 = "ดูสิคะ คุณครู! ฉันกระโดดคว้าไว้ได้เลยค่ะ! ถ้างั้นต่อไปก็..."
1011503-196 = "เปลี่ยนทิศทางนิดหน่อย แล้วขว้างให้ไกลที่สุดเลยค่ะ!"
1011503-197 = "[s] \"แบบนั้นอาจจะคว้าไม่ได้ก็ได้นะ?!\""
1011503-198 = "ปกติลูกจะไม่มาตามที่ฉันคิดหรอกค่ะ! เอาละ รีบๆ เข้าค่ะ!!!"
1011503-202 = "เอาละ ครั้งนี้ก็จะคว้าไว้ให้ได้เลย!!!"
1011503-206 = "ดูนั่นสิคะ... คุณครูของชาเล่ต์ทำกับนักเรียนเหมือนเป็นหมาน้อยอย่างนั้นละ?"
1011503-207 = "ขว้างจานร่อนออกไปแล้วให้ไปเก็บมา บางครั้งก็ตั้งใจขว้างไปทางอื่นให้ต้องวิ่งจนเหนื่อยอีก..."
1011503-208 = "ฉันได้ยินข่าวลือเกี่ยวกับคุณครูคนนี้มาก็เยอะ แต่ไม่คิดเลยนะว่าจะมาทำเรื่องแบบนี้ด้วย..."
1011503-212 = "[ns] \"เมื่อไรครูจะกอบกู้ชื่อเสียงของตัวเองได้เนี่ย...?\""
1011503-214 = "คะ? หมายความว่ายังไงเหรอคะ คุณครู?"

[translation]
1011503-1 = "特別訓練（２）"
1011503-3 = "所以這次我要來做投球訓練！！！"
1011503-4 = "[ns1]「你你你先等一下。」\n[ns2]「我還沒跟上你的話題。」"
1011503-7 = "咦？問我是不是也擔任投手？"
1011503-8 = "不，雖然真正厲害的球員中，的確有投打都能勝任的……"
1011503-9 = "也就是所謂的「二刀流」球員……"
1011503-10 = "但我無論怎麼看都還不到那個水準……"
1011503-11 = "當然我也希望，自己有一天也能成為那樣的選手！"
1011503-12 = "不過想要把球打好的話，我認為從投手的角度觀察打者也是必要的。"
1011503-13 = "這樣也更容易推測對方接下來會投什麼樣的球。"
1011503-14 = "進而讓事先預測投手的球種，藉此決定揮棒路徑的打法──"
1011503-15 = "也就是所謂的「預測打擊」變得更加熟練。"
1011503-16 = "如此一來打擊率自然也會上升，長打率也會提高，那麼最終……"
1011503-17 = "當然也能打出全壘打了對吧！？"
1011503-18 = "[s]「聽起來真的有可能！」"
1011503-19 = "對吧？總之就是這樣！"
1011503-20 = "所以我今天要進行投手訓練！"
1011503-22 = "（於是莉今天也精神振奮地踏進了訓練場……）"
1011503-28 = "「觸身球！跑者進壘！」"
1011503-29 = "唔……！因為太在意球速，肩膀用力過度了嗎？"
1011503-30 = "不過下一球才是關鍵！"
1011503-35 = "「保送！跑者進壘！」"
1011503-36 = "我明明是瞄準中央投的啊！"
1011503-41 = "不行，不能慌。#n冷靜可是投手的重中之重……振作一點！"
1011503-48 = "「長打！全壘打！」"
1011503-49 = "連我都還沒打過全壘打耶──！？"
1011503-50 = "球的位置太集中了……不該拖長球數的！"
1011503-58 = "「觸身球。打者訓練機器人左臂損壞。」"
1011503-59 = "唔……！"
1011503-64 = "「觸身球。打者訓練機器人腹部損壞。」"
1011503-65 = "拜託……！"
1011503-69 = "「觸身球。擊中打者訓練機器人頭部。#n　無須擔心，僅為主攝影機故障。」"
1011503-78 = "「已無可使用的打者訓練機器人。#n　要結束今天的訓練嗎？」"
1011503-79 = "真是……！"
1011503-84 = "為什麼老是投不好啊──！？"
1011503-85 = "[ns]「冷，冷靜點，莉！投球本來就不是你擅長的領域啊！」"
1011503-86 = "……"
1011503-87 = "老師，你有沒有什麼不錯的訓練方法……？"
1011503-88 = "以我現在的腦袋實在想不到，希望能請老師幫我轉換一下思緒……"
1011503-89 = "[ns]「唔嗯……你覺得對投手來說最重要的是什麼？」"
1011503-90 = "那當然是控球力。"
1011503-91 = "畢竟有人說過「既然本壘板不會動，投出好球是理所當然的」。"
1011503-92 = "也有人說「學會掌控直球之前別想學曲球」。"
1011503-93 = "[s3]「控球力啊……」\n[s4]「那我們就來訓練控球力吧！」"
1011503-96 = "咦！？"
1011503-97 = "這，這次又要去哪裡……？"
1011503-101 = "怎麼還是遊戲中心！？"
1011503-102 = "時機訓練之前明明已經……"
1011503-103 = "咦？這裡除了時機訓練之外，還能做其他訓練？#n那到底……"
1011503-108 = "這是……叫做飛鏢的遊戲嗎？"
1011503-109 = "哦哦，是要丟這個長得像箭頭的飛鏢，透過命中飛鏢盤來取得分數嗎。"
1011503-110 = "感覺對專注力和控球力……還有鍛練手感很有幫助！#n我來試試看吧！"
1011503-112 = "嘿！"
1011503-113 = "再次命中紅心！已連續命中五次！#n剩下一支飛鏢！"
1011503-114 = "這個……真的的會讓人有專注的感覺呢。#n再來一次……！"
1011503-116 = "快看那邊！那個學生已經連續命中中心五次了！"
1011503-117 = "靶子上已經沒位置了吧……？"
1011503-118 = "呼……"
1011503-119 = "嘿！"
1011503-123 = "再次命中紅心！#n恭喜獲得今天的最高分！"
1011503-127 = "[ns5]「太厲害了，莉！」\n[ns6]「難道你在微操方面有驚人的天賦？」"
1011503-130 = "……"
1011503-131 = "不，光是這樣是不夠的！"
1011503-132 = "[s]「咦，為什麼……？」"
1011503-133 = "再怎麼說，飛鏢都比棒球輕太多了！"
1011503-135 = "控球訓練……所需的要素是……"
1011503-136 = "有適當重量且不易投擲，但還是有可控性的東西……"
1011503-137 = "！"
1011503-138 = "老師，我知道了！"
1011503-139 = "[s]「嗯！是什麼呢？」"
1011503-140 = "我們需要的是飛盤！"
1011503-141 = "[s] 「咦……？」"
1011503-144 = "要練習來回畫出大圓的投法！"
1011503-148 = "[ns]「這又不是回力鏢！？」"
1011503-151 = "沒問題的！只要有控球力就能辦到！"
1011503-153 = "接著練習「先直線飛行後突然向上竄」的投法！"
1011503-157 = "[ns]「那不是古早漫畫裡的魔球嗎！？」"
1011503-159 = "可以啦！只要有控球力就能辦到！"
1011503-168 = "來，老師也練習看看吧！"
1011503-169 = "咦？老師覺得沒必要這麼做？#n怎麼這麼說呢。根據我的觀察……"
1011503-170 = "這個練習也可以延伸為野手訓練的一部分。"
1011503-171 = "（禁不住莉的要求，試著丟出了飛盤）"
1011503-175 = "嗯！那我去接回來！"
1011503-179 = "呀啊啊啊啊啊啊啊──！！！"
1011503-183 = "接到了，老師！#n不過這樣還不夠……請丟得更高一點！"
1011503-184 = "[s]「再高不會飛過頭頂嗎？」"
1011503-185 = "沒關係！飛球本來就是這樣的！"
1011503-190 = "謝謝你！#n那麼……來吧……"
1011503-194 = "嘿！"
1011503-195 = "你看，老師！我跳起來接到了！#n那麼這次……"
1011503-196 = "稍微改變方向，盡可能丟遠一點給我吧！"
1011503-197 = "[s]「那樣可能會接不到喔！」"
1011503-198 = "反正打者擊出的球也不會乖乖按照我的想法飛過來嘛！#n來，快丟吧！！！"
1011503-202 = "好，這次也一定要接到──！！！"
1011503-206 = "你看那邊……夏萊的老師怎麼把學生當小狗對待啊？"
1011503-207 = "不只丟飛盤逼學生撿回來，還故意丟得很遠，讓人家跑得氣喘吁吁……"
1011503-208 = "雖然跟老師有關的傳言本來就不少，沒想到他竟然還會做這種事……"
1011503-212 = "[ns]「我的名譽究竟什麼時候才可能恢復呢……？」"
1011503-214 = "咦？老師你說什麼？"

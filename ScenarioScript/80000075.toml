80000075-49 = "3;히요리;03\n#3;greeting\n#wait;1500"
80000075-50 = "3;히요리;10;어, 선생님? 왜 갑자기 제 머리를 쓰다듬으시는 거죠……?\n#3;em;[?]"
80000075-51 = "3;히요리;10;선생님? 선생님……? 그렇게 웃으시지만 말고 뭔가 대답을 해 주셔야……?"
80000075-52 = "3;히요리;10;으으으으…… 뭔가, 기분 좋기도 한데 그러면서도 엄청나게 부끄러운데요오……?\n#3;em;[///]\n#3;stiff"

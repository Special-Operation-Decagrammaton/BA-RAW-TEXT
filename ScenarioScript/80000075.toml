[translation]
80000075-1 = "แลกเปลี่ยนทุกอย่างกัน"
80000075-2 = "โรงแรมที่ถูกทิ้งร้างมานาน"
80000075-3 = "(หลังได้รับข้อความว่าจากฮิโยริว่าเธอค้นพบบางอย่างที่ยิ่งใหญ่ คุณครูรีบมาหาทันที)"
80000075-4 = "คะ... คุณครู?"
80000075-5 = "แหะๆ... มาจริงๆ ด้วยสินะคะ"
80000075-6 = "คะ? ถ้าฉันเรียกละก็ คุณครูจะมาหาเสมองั้นเหรอคะ?"
80000075-7 = "จะ...จะบอกว่ารู้สึกดีใจ หรือว่ารู้สึกปลอดภัยดีนะ..."
80000075-8 = "คะ? ถ้าไม่มาก็จะรู้สึกกังวลแล้วก็เป็นห่วง เลยต้องมาหางั้นเหรอคะ?"
80000075-9 = "นั่นสินะคะ... ก็คงเป็นแบบนั้นแหละค่ะ... ชีวิตที่มืดมนเหมือนโทรศัพท์บุโรทั่งของฉัน... จะไปยิ่งใหญ่หรือสำคัญอะไรกัน..."
80000075-10 = "[s1] \"เอาละๆ ตอนนี้ไม่เป็นไรแล้วนะ\"\n[s2] \"ไหนบอกว่าเจอของยิ่งใหญ่ไง? อะไรเหรอ?\""
80000075-11 = "อ๊ะ จริงด้วยค่ะ ฉันเจอของยิ่งใหญ่อันหนึ่งด้วย มันคือ..."
80000075-12 = "อ๊ะ จริงด้วยค่ะ มันคือ..."
80000075-13 = "นี่ค่ะ ช่วยรับไว้ด้วยนะคะ!"
80000075-18 = "[ns] \"นี่มัน... ช็อกโกแลต?\""
80000075-19 = "แหะๆ... วันนี้เป็นวันวาเลนไทน์นี่คะ?"
80000075-20 = "ได้ยินว่าเป็นวันที่นำช็อกโกแลตไปตอบแทนให้กับคนที่มีบุญคุณต่อเรา..."
80000075-21 = "ตะ...แต่ว่า ถ้าแค่นี้ยังไม่พอ ฉันจะหาวิธีอื่นตอบแทน... ไม่ว่าจะด้วยร่างกาย หรือหัวใจ หรือยิ่งกว่านั้น...!"
80000075-22 = "ตะ...แต่ว่าถ้าแค่นี้ยังไม่พอจริงๆ จะทำยังไงดีคะ? ตอนนี้ฉันมีแค่โทรศัพท์เก่าๆ อยู่เครื่องเดียวเอง..."
80000075-23 = "แย่แน่ๆ... แย่แล้วค่ะ! วันวาเลนไทน์... เป็นวันที่น่ากลัวแบบนี้เองสินะคะ?"
80000075-24 = "เรื่องการตอบแทนคนที่ช่วยเหลือเรา คงเป็นเพียงเรื่องบังหน้า แต่ที่แท้จริงคือเป็นวันแห่งความ#nทุกข์ระทมเพื่อการทำโน่นทำนี่ตามอำเภอใจสินะคะ!"
80000075-25 = "ทำไมชีวิตฉันถึงกลายเป็นแบบนี้ไปได้คะ? พังหมดแล้ว...! ชีวิตฉันพังย่อยยับหมดแล้วค่ะ! มุแงงงงง~~!"
80000075-26 = "[s3] \"ใจเย็นๆ ก่อนนะฮิโยริ! มันไม่ใช่แบบนั้น!\"\n[s4] \"วันวาเลนไทน์ไม่ใช่วันแบบนั้นสักหน่อย!\""
80000075-27 = "คะ...คะ?"
80000075-28 = "คะ...คะ?"
80000075-29 = "แต่ว่า... แค่ช็อกโกแลตกล่องเล็กๆ นี่ คงทำให้คุณครูพอใจไม่ได้สินะคะ เพราะคุณครูเป็นผู้ใหญ่นี่นา..."
80000075-30 = "[s5] \"ถ้าเป็นของที่ฮิโยริให้ ครูชอบทุกอย่างแหละ...\"\n[s6] \"ได้รับของขวัญจากฮิโยริแบบนี้ ก็เป็นประสบการณ์ใหม่ๆ ดีนะ\""
80000075-31 = "อย่างนั้น...เหรอคะ? ค่อยยังชั่วหน่อย โล่งอกไปทีค่ะ แหะๆๆ..."
80000075-32 = "อย่างนั้น...เหรอคะ? ค่อยยังชั่วหน่อย โล่งอกไปทีค่ะ แหะๆๆ..."
80000075-33 = "[s] \"แต่ว่า... ไปเอาช็อกโกแลตมาจากไหนเหรอ?\""
80000075-34 = "นั่นน่ะเหรอคะ? ที่จริง... ฉันเอานิตยสารที่สะสมไว้ไปชั่งกิโลขาย แล้วก็ซื้อมาค่ะ แหะๆ..."
80000075-35 = "[s7] \"นิตยสารของฮิโยริน่ะนะ?!\"\n[s8] \"นิตยสารพวกนั้นเป็นทุกสิ่งทุกอย่างของฮิโยริเลยนะ?!\""
80000075-36 = "ค่ะ! แต่ว่านิตยสารน่ะ... ฉันค่อยๆ หามาสะสมใหม่ได้... ถึงจะแอบเสียดายอยู่นิดหน่อยก็เถอะค่ะ..."
80000075-37 = "ค่ะ แต่ว่านิตยสารน่ะ... ฉันค่อยๆ หามาสะสมใหม่ได้... ถึงจะแอบเสียดายอยู่นิดหน่อยก็เถอะค่ะ..."
80000075-38 = "แต่ยังไง วันพิเศษแบบวันนี้น่ะ... อย่างน้อยฉันก็อยากให้ของขวัญคุณครูสักครั้งค่ะ..."
80000075-39 = "วะ...ว่าแล้วเชียวว่าไม่ได้สินะคะ? ฉันสร้างภาระให้ใช่รึเปล่าคะ? ฉันทำอะไรเกินตัวไปจริงๆ สินะคะ?"
80000075-40 = "ใช่มั้ยคะ... ใช่สินะคะ? ขอโทษด้วยค่ะ คนอย่างฉันนี่ทำอะไรไม่ได้เลยสินะคะ ตั้งแต่แรกแล้ว เรื่องที่ฉันทำน่ะ... มุแงงงง!!"
80000075-41 = "[s] \"ก็บอกว่าไม่ใช่แบบนั้นไง! อย่าร้องไห้สิ!\""
80000075-42 = "ฮึก... คุณครูแค่กังวลว่าจะรับของที่มีค่าแบบนั้นไว้ได้รึเปล่า...งั้นเหรอคะ?"
80000075-43 = "ไม่เป็นไรหรอกค่ะ... กลับกันซะอีกค่ะ คุณครูควรได้รับของดีๆ แบบนี้... ที่สุดเลยค่ะ"
80000075-44 = "ถึงฉันจะเตรียมได้แค่ของเล็กน้อย... แต่ฉันก็อยากมอบมันให้คุณครูค่ะ..."
80000075-45 = "[s] \"ขอบใจนะฮิโยริ ครูจะกินให้อร่อยเลย\""
80000075-46 = "ค่ะ แหะๆๆ... ได้ยินแบบนั้นก็ดีใจแล้วค่ะ"
80000075-50 = "เอ่อ คุณครู? ทำไมจู่ๆ ถึงมาลูบหัวฉันล่ะคะ...?"
80000075-51 = "คุณครู? คุณครู...? อย่ามัวแต่ยิ้มสิคะ ตอบคำถามฉันก่อน...?"
80000075-52 = "งื้อออ... แบบนี้รู้สึกดีมากๆ ก็จริง แต่ก็รู้สึกอายอย่างบอกไม่ถูกเลยค่ะ~....?"

[translation]
80000075-1 = "#title;모든 것과 맞바꿔서"
80000075-2 = "#place;오래전에 폐쇄된 호텔"
80000075-3 = "#na;(히요리에게서 뭔가 대단한 게 있다는 연락을 받고, 서둘러 나왔다.)"
80000075-4 = "3;히요리;10;서, 선생님?\n#3;em;[반응]\n#3;a"
80000075-5 = "3;히요리;03;헤헤…… 정말로 와 주셨군요."
80000075-6 = "3;히요리;03;네? 선생님은 제가 부르면 언제든 와 줄 수 있다고요?"
80000075-7 = "3;히요리;03;그, 그건 나름대로 기쁘다고 할까 안심된다고 할까……\n#3;em;[///]"
80000075-8 = "3;히요리;10;네에? 안 가보면 뭔가 불안하고 걱정돼서 어쩔 수 없으니까?"
80000075-9 = "3;히요리;04;그렇죠…… 그런 거네요…… 고물 휴대폰 같은 제 인생…… 뭐 그렇게 대단할 게 있다고……\n#3;em;[세로선]\n#3;stiff"
80000075-10 = "[s1] \"자, 자. 이제 괜찮으니까.\"\n[s2] \"뭔가 대단한 게 있다면서? 뭐야?\""
80000075-11 = "3;히요리;03;아, 그렇죠. 그거……"
80000075-12 = "3;히요리;03;아, 그렇죠. 그거……"
80000075-13 = "3;히요리;08;이거, 받아 주세요!\n#3;em;[!]"
80000075-14 = "#st;[0,0];instant;1;"
80000075-15 = "#clearST"
80000075-16 = "3;히요리;08\n#3;m5\n#wait;1000"
80000075-17 = "#wait;2500"
80000075-18 = "[ns] \"이건…… 초콜릿?\""
80000075-19 = "3;히요리;03;헤헤…… 오늘은 발렌타인 데이라는 날이라면서요?\n#3;m3"
80000075-20 = "3;히요리;03;평소 신세 졌던 사람들에게 초콜릿으로 그 신세를 갚는……\n#3;em;…"
80000075-21 = "3;히요리;03;그, 그렇지만. 그리고도 모자라면 다른 수단으로…… 몸이라던가, 마음이라던가, 그보다 더한 것이라던가……!\n#3;stiff"
80000075-22 = "3;히요리;10;그, 그러고 보니 모자라면 어떡하죠? 전 이제 고물 휴대폰 밖에는 가진 게 없는데……!\n#3;em;[?!]"
80000075-23 = "3;히요리;06;망했어요…… 망했어요! 발렌타인 데이라는 건 이렇게 무서운 거였군요?"
80000075-24 = "3;히요리;06;평소에 신세 진 걸 갚는다는 건 그저 표면뿐인 이야기였고, 그 실체는 그걸 빌미로 이런 짓이나 저런 짓을 마음대로 하기 위한 날이었다는 거네요!\n#3;stiff"
80000075-25 = "3;히요리;11;제 인생은 왜 이 모양 이 꼴이죠? 완전 엉망진창이에요! 완전 망했네요! 으아아아아아앙-!\n#3;em;[훌쩍]\n#3;hophop"
80000075-26 = "[s3] \"진정해, 히요리!\"\n[s4] \"발렌타인 데이는 그런 날이 아니야!\""
80000075-27 = "3;히요리;02;그, 그런가요……?\n#3;em;[땀]\n#3;stiff"
80000075-28 = "3;히요리;02;그, 그런가요……?\n#3;em;[땀]\n#3;stiff"
80000075-29 = "3;히요리;06;그렇지만 이렇게 작고 초라한 초콜릿, 선생님께서는 성에 차지 않으시겠죠. 어른이시니까……"
80000075-30 = "[s5] \"히요리가 주는 것이라면 뭐든 좋아……\"\n[s6] \"히요리에게서 뭔가를 받는다는 건 신선한 경험이기도 하고.\""
80000075-31 = "3;히요리;03;그런, 가요……? 다행이다. 다행이네요. 에헤헤……\n#3;em;[///]\n#3;stiff"
80000075-32 = "3;히요리;03;그런, 가요……? 다행이다. 다행이네요. 에헤헤……\n#3;em;[///]\n#3;stiff"
80000075-33 = "[s] \"그런데, 이 초콜릿은 어떻게 준비한 거야?\""
80000075-34 = "3;히요리;03;그거요? 실은…… 제가 모은 잡지를, 폐지로 팔아서 샀어요. 에헤헤……"
80000075-35 = "[s7] \"히요리의 잡지를?!\"\n[s8] \"그건 히요리의 모든 것이나 다름 없잖아?!\""
80000075-36 = "3;히요리;10;네?! 그렇지만 잡지는…… 또 모으면 어떻게든 되고…… 물론 아깝지 않은 건 아니었지만요…….\n#3;em;[?!]\n#3;shake"
80000075-37 = "3;히요리;10;네?! 그렇지만 잡지는…… 또 모으면 어떻게든 되고…… 물론 아깝지 않은 건 아니었지만요…….\n#3;em;[?!]\n#3;shake"
80000075-38 = "3;히요리;04;그래도, 이런 날이니까…… 한 번 정도는 선생님께 뭔가 드리고 싶었달까……"
80000075-39 = "3;히요리;06;여, 역시 안 되었나요? 민폐였나요? 제가 괜한 짓을 한 건가요?"
80000075-40 = "3;히요리;11;그렇군요? 그런 거군요? 죄송해요. 전 역시 뭘 하면 안 되나 봐요. 제가 하는 일이라곤 애초에…… 으아아앙!\n#3;em;[훌쩍]\n#3;hophop"
80000075-41 = "[s] \"그런 거 아니니까! 울지 말고!\""
80000075-42 = "3;히요리;06;훌쩍…… 그런 귀한 걸 함부로 받아도 되는 걸까 걱정이 드셨다고요……?\n#3;stiff"
80000075-43 = "3;히요리;09;괜찮아요…… 오히려 그러니까, 더더욱 선생님이 받아 주셨으면…… 했어요."
80000075-44 = "3;히요리;99;저는 이런 것 밖에는 준비하지 못하지만, 그래도 선생님께 드릴 수 있는 건 이게 전부니까……\n#3;em;…"
80000075-45 = "[s] \"고마워, 히요리. 맛있게 먹을게.\""
80000075-46 = "3;히요리;03;네. 에헤헤. 그러면 저도 기쁠 거예요.\n#3;em;[반짝]"

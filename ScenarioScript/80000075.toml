[translation]
80000075-1 = "用一切來交換？"
80000075-2 = "被封鎖的飯店"
80000075-3 = "（收到日和說發現驚人東西的聯絡後，匆匆忙忙地跑來了）"
80000075-4 = "……啊，老師？"
80000075-5 = "耶嘿嘿……你真的來了啊。"
80000075-6 = "咦？叫你的話隨時都會來……？"
80000075-7 = "這，這……該說是開心呢，還是讓人安心呢……"
80000075-8 = "……因為放任不管的話會很擔心？"
80000075-9 = "原來如此，是這樣啊……#n簡單來說，對待我就像對待一隻老舊的手機一樣呢……"
80000075-10 = "[s1]「沒，沒有那種事。」\n[s2]「話說，你說有什麼驚人的東西是嗎？」"
80000075-11 = "啊……沒，沒錯。"
80000075-12 = "啊……沒，沒錯。"
80000075-13 = "呃……請收下這個吧！"
80000075-18 = "[ns]「……巧克力？」"
80000075-19 = "耶嘿嘿……聽說今天好像是情人節對吧？"
80000075-20 = "向平時受照顧的對象，送巧克力的日子……"
80000075-21 = "但，但是……如果這樣還不夠，就要送其他東西對吧？#n像是身體、內心，或是更進一步的東西之類的……！"
80000075-22 = "……啊！這麼說來，如果不夠該怎麼辦呢……？#n我手上也只剩下老舊的手機而已……"
80000075-23 = "啊，啊啊……都結束了……！#n情人節，多麼可怕的日子呀……！"
80000075-24 = "「送巧克力給受照顧的人」只是表面上的說法……#n沒想到事實上卻是把它當成藉口，對對方隨心所欲的日子……！"
80000075-25 = "我的人生果然已經沒救了……#n終於走到盡頭了……嗚哇啊啊啊啊啊！"
80000075-26 = "[s3]「冷，冷靜點，日和！」\n[s4]「情人節不是那種日子唷！」"
80000075-27 = "是，是嗎……？"
80000075-28 = "是，是嗎……？"
80000075-29 = "可是……這麼小的巧克力是滿足不了老師的吧。#n畢竟你是大人……"
80000075-30 = "[s5]「不管日和給我什麼，我都很開心唷。」\n[s6]「日和送東西給我也是一種很新鮮的體驗。」"
80000075-31 = "是，是嗎……？那真是，太好了。耶嘿嘿……"
80000075-32 = "是，是嗎……？那真是，太好了。耶嘿嘿……"
80000075-33 = "[s]「話說回來，這個巧克力是怎麼準備的呢？」"
80000075-34 = "其，其實……是用賣掉收集的雜誌賺來的錢……"
80000075-35 = "[s7]「日和的雜誌！？」\n[s8]「那些說是『日和的一切』也不為過的雜誌！？」"
80000075-36 = "當，當然我也有猶豫過……#n不過雜誌的話，只要重新收集就好……"
80000075-37 = "當，當然我也有猶豫過……#n不過雜誌的話，只要重新收集就好……"
80000075-38 = "而且……那怕只有一次也好，我想送點東西給老師……"
80000075-39 = "不，不可以嗎？造成你的困擾了嗎？我又做了不該做的事嗎？#n你的表情，是這個意思嗎……？"
80000075-40 = "我果然還是什麼都別做比較好對吧。#n到頭來我這種人能做到的事……嗚哇啊啊！"
80000075-41 = "[s]「不，不是那樣的唷！別哭了，好嗎？」"
80000075-42 = "（啜泣）……既然如此，希望你可以收下……"
80000075-43 = "不如說你能收下的話，我會很感激的……"
80000075-44 = "這就是，我能送給老師的一切了……"
80000075-45 = "[s]「……那我就收下了。謝謝你，日和。」"
80000075-46 = "好，好的……！#n耶嘿嘿……你願意收下，我也很開心……"
80000075-50 = "……咦？老，老師？為何突然摸我的頭……"
80000075-51 = "那個，為什麼要一言不發還笑咪咪的……！？"
80000075-52 = "嗚，嗚嗚……這樣感覺，超害羞的……"

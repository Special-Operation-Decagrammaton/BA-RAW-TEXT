[translation]
80000075-1 = "Gift of the Mag"
80000075-2 = "A Long-Abandoned Hotel"
80000075-3 = "After getting an excited message from Hiyori, I rushed out to find her."
80000075-4 = "S-Sensei?"
80000075-5 = "Heehee... You actually came!"
80000075-6 = "Hmm? You're saying you'll always come when I call you, Sensei?"
80000075-7 = "Ah, hearing that, I feel so relieved and happy..."
80000075-8 = "Oh, because otherwise you'd worry... I see."
80000075-9 = "Yes, I see now... My life is like an old junk phone... Always causing problems..."
80000075-10 = "[s1] \"Things are okay right now, aren't they?\"\n[s2] \"You said you had something amazing. What is it?\""
80000075-11 = "Oh, right. That's..."
80000075-12 = "Oh, right. That's..."
80000075-13 = "This. For you."
80000075-18 = "[ns] \"Is this...chocolate?\""
80000075-19 = "Heehee... Today's Valentine's Day, right?"
80000075-20 = "You're supposed to pay people back for what you owe them by giving them chocolate."
80000075-21 = "B-But if the chocolate doesn't cover your debt... Then you have to give them other things, like your heart, or other organs..."
80000075-22 = "A-Actually, what if even that's not enough? All I have is this old junk phone!"
80000075-23 = "Oh no... This is bad! I never knew how scary Valentine's Day really is!"
80000075-24 = "Repaying debts is just a facade... P-People just use that as an excuse to do whatever they want!"
80000075-25 = "Wh-Why is my life...such a mess all the time... I'm just a f-failure. Everything's over! WAHHH!"
80000075-26 = "[s3] \"Calm down, Hiyori!\"\n[s4] \"That's not what Valentine's Day is about at all!\""
80000075-27 = "I-Is that so?"
80000075-28 = "I-Is that so?"
80000075-29 = "But you have so much, Sensei... Why would this tiny, shabby, no-good chocolate impress you...?"
80000075-30 = "[s5] \"I'd like anything you give me, Hiyori...\"\n[s6] \"It's a new experience to get a gift from you.\""
80000075-31 = "Is that right...? Okay. That's good. That's great! Heehee..."
80000075-32 = "Is that right...? Okay. That's good. That's great! Heehee..."
80000075-33 = "[s] \"But how did you get ahold of chocolate?\""
80000075-34 = "Oh! Heehee. I just sold my magazine collection to the recycling center."
80000075-35 = "[s7] \"Your magazines, Hiyori?!\"\n[s8] \"Aren't those your most prized possessions?!\""
80000075-36 = "Huh? But I'll be able to collect more at some point...somehow... Not that it was easy to let them go, but..."
80000075-37 = "Huh? But I'll be able to collect more at some point...somehow... Not that it was easy to let them go, but..."
80000075-38 = "It's a special day, and I wanted to give you something..."
80000075-39 = "Sh-Should I not have? Was this just...a waste of your time, or an inconvenience, or..."
80000075-40 = "It was, right? I knew it was. I'm so sorry. I shouldn't t-try to do anything. All I ever do is... WAHH!"
80000075-41 = "[s] \"That's not what I meant! Stop crying!\""
80000075-42 = "*sniffle* You were worried the gift was...too precious for you to take?"
80000075-43 = "It's fine... Actually, I wanted to give it to you because it's precious."
80000075-44 = "Even if it's only ever things like this, I want to give you what I can, Sensei."
80000075-45 = "[s] \"Thank you, Hiyori. I'll enjoy it.\""
80000075-46 = "You're welcome. Heeheehee! Please do. That makes me happy."
80000075-50 = "Huh, Sensei? Why are you patting my head now...?"
80000075-51 = "Sensei? Sensei...? Can you stop smiling like that and answer me?"
80000075-52 = "Uhhh... Not that it's not nice, but it's pretty embarrassing...!"

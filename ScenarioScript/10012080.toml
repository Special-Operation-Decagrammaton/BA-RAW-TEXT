[translation]
10012080-1 = "ตอนที่ 8;ของใหญ่เจอของหนัก"
10012080-4 = "แฮ่ก... แฮ่ก... คนพวกนั้นก็สุดยอดไปเลยนะ... นับถือเลือดนักสู้เลย"
10012080-5 = "มาพักผ่อนช่วงฤดูร้อนแท้ๆ... ไม่คิดเลยนะว่าจะมาเจองานหนักขนาดนี้แทนซะได้"
10012080-6 = "[s1] \"โฮชิโนะ...!\"\n[s2] \"เป็นยังไงบ้าง? บาดเจ็บตรงไหนรึเปล่า?\""
10012080-7 = "แหะๆ ครูเป็นห่วงฉันเหรอ? พอรู้ว่าครูเป็นห่วง ฉันก็ไม่เป็นไรแล้วละ..."
10012080-8 = "แหะๆ ครูเป็นห่วงฉันเหรอ? พอรู้ว่าครูเป็นห่วง ฉันก็ไม่เป็นไรแล้วละ..."
10012080-9 = "แต่ก็ไม่มีอะไรน่าเป็นห่วงหรอก ยังสบายอยู่..."
10012080-10 = "ยิ่งไปกว่านั้น..."
10012080-13 = "ฮุฮุฮุ... ในที่สุดก็มาช่วยได้แล้วนะคะ คุณครู..."
10012080-14 = "ช่วยรออีกหน่อยนะคะคุณครู ฉันเองก็ทุกข์ทรมานกับสถานการณ์นี้เหมือนกัน..."
10012080-15 = "แต่ฉันจะไปช่วยคุณครูจากพวกจิ้งจอกเจ้าเล่ห์ให้ได้เลยค่ะ!!"
10012080-16 = "ล่อลวงคุณครูที่อ่อนโยนมาใช้ประโยชน์ตามอำเภอใจแบบนี้ ฉันไม่ยกโทษให้เด็ดขาด!"
10012080-17 = "วาคาโมะผู้นี้จะสั่งสอนพวกนั้นให้ครบทุกคนเลยค่ะ!! "
10012080-20 = "เล่นใหญ่อะไรขนาดนี้เนี่ย..."
10012080-21 = "งั้นก็ช่วยไม่ได้ สงสัยฉันจะต้องช่วยออกแรงหน่อยแล้วมั้ง~ แหะๆ..."
10012080-22 = "หืม...?"
10012080-23 = "ว่าไงนะ?"
10012080-24 = "อ่า..."
10012080-25 = "ฉันยังดูชิลได้ในสถานการณ์แบบนี้งั้นเหรอ?"
10012080-26 = "ครู... ฉันไม่ได้คิดว่าฉันต้องจัดการคนพวกนั้นให้หมดหรอกนะ"
10012080-27 = "ถ้าเป็นเมื่อก่อนก็ไม่แน่..."
10012080-28 = "ตอนนี้น่ะ ฉันคิดแค่ว่าแค่ถ่วงเวลาไว้ก็เพียงพอแล้ว"
10012080-29 = "เดี๋ยวก็ใกล้จะถึงเวลาที่พวกนั้นจะมาแล้วละ..."
10012080-34 = "[ns3] \"เสียงเฮลิคอปเตอร์...\"\n[ns4] \"... มากันแล้วสินะ\""
10012080-35 = "จ๊ะเอ๋☆ ขออภัยที่มาสายค่า~!"
10012080-36 = "จ๊ะเอ๋☆ ขออภัยที่มาสายค่า~!"
10012080-37 = "ฮุฮุ..."
10012080-38 = "เห็นมั้ยล่ะ?"
10012080-39 = "[s5] \"อื้ม\"\n[s6] \"อย่างที่โฮชิโนะว่าเลย\""
10012080-45 = "โชคดีที่ยังไม่สายเกินไปนะคะ! มาได้จังหวะพอดีเลยค่ะ!"
10012080-48 = "ยกโทษให้ไม่ได้! หัวร้อนสุดๆ ไปเลย!!"
10012080-51 = "กำหนดเป้าหมายเรียบร้อย ไปกันเลย"
10012080-53 = "อื้ม! เด็กดื้อต้องโดนอะไรคะ!!"
10012080-61 = "โดนระเบิดไงล่ะ~☆"

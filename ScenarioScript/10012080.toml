[translation]
10012080-1 = "第8話;用重裝對付重裝"
10012080-4 = "哈啊，哈啊……那些傢伙也挺厲害的呢……真有毅力。"
10012080-5 = "這個假期……本來想悠悠哉哉的說……"
10012080-6 = "[s1] 「星野……！」\n[s2] 「還好嗎？有受傷嗎？」"
10012080-7 = "唔嘿，你在擔心我嗎老師？"
10012080-8 = "唔嘿，你在擔心我嗎老師？"
10012080-9 = "……不過不用擔心。還很從容呢。"
10012080-10 = "而且……"
10012080-13 = "唔呵呵……終於可以將您救出來了呢，老師……"
10012080-14 = "請再忍耐一下。我也對這個狀況，感到非常痛苦……"
10012080-15 = "我馬上就將您從那些狡猾的狐狸精手中救出來！！"
10012080-16 = "竟然誘惑、利用溫柔的老師，絕對不可原諒！"
10012080-17 = "若藻我，會親自對他們進行再教育的！！"
10012080-20 = "……已經是那種狀態了呢。"
10012080-21 = "唔嘿～真沒辦法呢～#n大叔就再稍微加油一下吧～？"
10012080-22 = "……嗯？"
10012080-23 = "什麼？"
10012080-24 = "……啊啊。"
10012080-25 = "大叔從容的理由？"
10012080-26 = "嗯……因為也不是一定要一個人戰鬥呀～"
10012080-27 = "如果是以前的我，也許不會那麼想……"
10012080-28 = "不過現在，我相信大家會來的。"
10012080-29 = "……應該差不多了吧？"
10012080-34 = "[ns3] 「直升機的聲音……」\n[ns4] 「……來了呢。」"
10012080-35 = "鏘──☆⁠久等了～！"
10012080-36 = "鏘──☆⁠久等了～！"
10012080-37 = "……呵呵。"
10012080-38 = "……大叔說的對吧？"
10012080-39 = "[s5] 「嗯。」\n[s6] 「就跟星野說的一樣呢。」"
10012080-45 = "有趕上真是太好了！馬上進行掩護！"
10012080-48 = "啊啊真是的！要礙事幾次才會滿足啊！！"
10012080-51 = "目標設定完畢，上吧。"
10012080-53 = "嗯嗯！處罰時間到囉～！！"
10012080-61 = "全彈發射～☆"

[translation]
84305100201-5 = "ให้ความร่วมมือกันดีกว่าที่คิด... ไม่สิ กว่าที่จินตนาการไว้อีกนะ ยูริโซโนะ เซอา"
84305100201-6 = "บอกตามตรงว่าฉันรู้สึกเหมือนเป็นหนี้บุญคุณเลยละ"
84305100201-7 = "อย่าคิดแบบนั้นเลยค่ะ ฉันกลับรู้สึกว่าคุณกำลังช่วยฉันอยู่มากกว่าค่ะ ริโอะ"
84305100201-8 = "ทำไมถึงเป็นอย่างนั้นล่ะ? ไม่เห็นเข้าใจเลย"
84305100201-9 = "ฮุฮุ นั่นสินะคะ สำหรับฉันมันก็อธิบายลำบากเหมือนกันค่ะ ฉันแค่รู้สึกอย่างนั้นน่ะ"
84305100201-10 = "แต่ตอนนี้นั่นไม่ใช่สิ่งสำคัญหรอกค่ะ ว่ามั้ยคะ เนรุ?"
84305100201-11 = "เฮอะ...!"
84305100201-12 = "ถ้ารู้อยู่แล้วก็รีบๆ เคลื่อนไหวเถอะน่า ป่านนี้น่าจะพอรู้ได้แล้วนะว่าฉันไม่ชอบให้เสียเวลาน่ะ"

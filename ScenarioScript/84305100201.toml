84305100201-5 = "3;리오;00;예상……아니, 상상했던 것보다 훨씬 더 협조적이네. 유리조노 세이아.\n#3;a"
84305100201-6 = "3;리오;99;솔직히 빚을 지는 느낌이야."
84305100201-7 = "3;세이아;02;그렇게 생각하지 말아 주세요. 오히려 저는 리오, 당신이 절 도와주고 있는 느낌이니까요."
84305100201-8 = "3;리오;04;어째서 그렇게 되는 거지? 이해할 수 없는데.\n#3;em;[?]"
84305100201-9 = "3;세이아;99;후후, 그러네요. 저도 정확히는 설명하기 어려워요. 그저 그런 느낌일 뿐."
84305100201-10 = "3;세이아;02;하지만 지금은 그게 중요한 건 아니죠. 그렇죠, 네루?"
84305100201-11 = "3;네루 교복;99;하…!\n#3;em;[한숨]"
84305100201-12 = "3;네루 교복;00;알고 있으면 빨리 움직이기나 하자고. 시간 끄는 건 취향 아닌 거, 슬슬 알지 않아?"
84305100201-13 = "#wait;100"

[translation]
84305100201-5 = "如我所……不對，是比我想像中還要配合呢。百合園聖亞。"
84305100201-6 = "老實說有種欠了人情的感覺。"
84305100201-7 = "你沒必要這麼想。我反而覺得是自己受了莉央的幫助。"
84305100201-8 = "這又是為什麼？我實在無法理解。"
84305100201-9 = "呵呵，就是說啊。#n我也有點難說明清楚，但就是有那種感覺。"
84305100201-10 = "不過現在的重點並不是那個。對吧，寧瑠？"
84305100201-11 = "唉……"
84305100201-12 = "知道的話就快點行動。#n你應該知道我不喜歡拖時間吧？"

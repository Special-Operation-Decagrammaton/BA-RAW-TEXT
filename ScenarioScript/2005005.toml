[translation]
2005005-1 = "ให้อยู่คนเดียวไม่ได้ค่ะ!"
2005005-2 = "ประตูหน้าชาเล่ต์"
2005005-3 = "คุณครู! ทางนี้!"
2005005-4 = "[s] \"สวัสดี ริตสึ!\""
2005005-5 = "ว่าแต่ คุณครูไม่ได้บอกว่างานยุ่งหรอกเหรอ?"
2005005-6 = "[s1] \"ผู้ใหญ่ก็ชอบโดดงานแบบนี้ละ ริตสึ\"\n[s2] \"ถ้ามีข้ออ้างให้หนีงาน ผู้ใหญ่จะไม่ลังเลเลยละ\""
2005005-9 = "หืม? แบบนั้นฉันก็รู้เหมือนกัน!"
2005005-10 = "ที่เรียกว่าผู้ใหญ่นิสัยไม่ดีไง!"
2005005-11 = "[s] \"ได้ยินแล้วเจ็บจังเลย!\""
2005005-12 = "แต่ยังไงก็จะมาเที่ยวเล่นกับฉันใช่มั้ยล่ะ?"
2005005-13 = "ถ้าทำอย่างนั้นละก็ ฉันจะยอมให้เป็นผู้ใหญ่นิสัยไม่ดีเลยละ!"
2005005-14 = "งั้นก็ไปกันเถอะ คุณครู! ฉันมีถนนที่อยากไปอยู่พอดีเลย!"
2005005-19 = "(แล้วริตสึก็จับมือคุณครูแล้วพาไปยังย่านการค้า)"
2005005-21 = "ย่านการค้าเสื้อผ้า"
2005005-22 = "ท้าดา~ ที่นี่ไงคะ คุณครู!"
2005005-23 = "ที่นี่มีตั้งแต่เสื้อผ้าที่เรียบง่าย ไปจนถึงเสื้อผ้าที่ใส่แล้วเตะตาคนอื่นเลยละ! ถนนสายนี้มีเสื้อผ้าให้เลือกหาทุกแบบเลย!"
2005005-24 = "[s] \"ครูเดินผ่านแถวนี้หลายรอบ แต่ไม่รู้เลยว่ามีถนนสายนี้ด้วย\""
2005005-25 = "นอกจากนี้ร้านตรงหัวมุมโน้นยังขายกระโปรงกับกางเกงโปร่งใสที่คุณครูชอบด้วยนะ!"
2005005-26 = "[s3] \"ครูไม่ได้ชอบอะไรแบบนั้น!\"\n[s4] \"มีคนซื้ออะไรแบบนั้นจริงๆ เหรอ?\""
2005005-29 = "อะฮะฮ่า! ถ้าไม่ชอบเสื้อผ้าแบบนั้น งั้นก็มาทางนี้เถอะ!"
2005005-30 = "มาเริ่มจากเสื้อผ้าราคาย่อมเยาและคุณภาพดีก่อนเลย!"
2005005-38 = "(คุณครูกับริตสึเดินดูเสื้อผ้าด้วยกัน)"
2005005-39 = "(บ่อยครั้งที่ริตสึคะยั้นคะยอให้เลือกเสื้อผ้าตามรสนิยมของเธอ...)"
2005005-40 = "(แต่คุณครูก็เลือกซื้อเสื้อผ้าที่เรียบง่ายได้หลายชิ้น...)"
2005005-42 = "ปากทางเข้าตลาดมืด"
2005005-43 = "อืม ฉันน่าจะซื้อเสื้อผ้าที่แมตช์กันได้พอประมาณแล้ว"
2005005-44 = "แล้วคุณครูล่ะ?"
2005005-45 = "[s] \"ตู้เสื้อผ้าแสนจำเจของครูน่าจะมีสีสันขึ้นมาแล้วละ\""
2005005-46 = "ฮิฮิ คุ้มค่าที่ได้ออกมาเลยนะ"
2005005-47 = "ถ้างั้นคุณครูช่วยรอฉันตรงนี้เดี๋ยวหนึ่งได้มั้ย?"
2005005-48 = "[s] \"จะไปเอาสินค้าที่ชมรมรับงานไว้สินะ?\""
2005005-52 = "สมกับที่เป็นคุณครูเลย! ถูกเผงเลยละ!"
2005005-53 = "งั้นเดี๋ยวฉันมานะ!"
2005005-58 = "[ns] (งั้นเราก็... เดินดูของรอแล้วกัน)"
2005005-60 = "[ns] (จะว่าไป ถนนเส้นนี้ดูบรรยากาศแปลกๆ...)"
2005005-62 = "หืม? เชิญเลยครับ คุณลูกค้า! หาสินค้าแบบไหนอยู่ครับ?"
2005005-63 = "[s] \"อ่า ว่าจะดูเสื้อคลุมสักหน่อย...\""
2005005-64 = "อ๊ะ! ถ้าเป็นเสื้อคลุมละก็ เราเพิ่งมีดีไซน์ใหม่ล่าสุดเข้ามาเลย!"
2005005-68 = "เอ้านี่! ลองใส่ดูได้เลย!"
2005005-69 = "[s] \"ขอเดินดูรอบๆ ก่อนดีกว่า...\""
2005005-70 = "อะไรกัน จะเดินดูให้เสียเวลาไปทำไม? เสื้อตัวนี้เหมาะกับคุณลูกค้าที่สุดแล้ว ไม่เชื่อผมแล้วเหรอ?"
2005005-71 = "[s] \"เราเพิ่งเคยเจอกันวันนี้เป็นครั้งแรกไม่ใช่เหรอ?\""
2005005-72 = "เอาเถอะน่า! บอกให้ลองใส่ดูก่อนไง?"
2005005-76 = "ว้าว~ ผมตาถึงจริงๆ ด้วย บอกแล้วไงว่าเหมาะกับคุณลูกค้าสุดๆ พอดีตัวเหมือนสูทสั่งตัดเลยนะเนี่ย"
2005005-77 = "[s] \"แต่ช่วงแขนมันยาวเกินไปนะ...\""
2005005-78 = "ไม่ต้องห่วงหรอก! แถวนี้มีร้านเย็บผ้าอยู่ เดี๋ยวผมเอาไปตัดแขนให้เอง~ รอเดี๋ยวนะ โอเคมั้ย?"
2005005-79 = "[s] \"ไม่เป็นไร ยังไม่ซื้อตอนนี้ดีกว่า\""
2005005-80 = "อะไรกัน มาลังเลแบบนี้อยู่ได้ยังไง ถ้ามารอบหน้า อาจไม่เจอเสื้อตัวนี้แล้วนะ?"
2005005-81 = "คุณครู ทำอะไรอยู่ตรงนั้นน่ะ?"
2005005-85 = "เฮือก! ละ... ลูกพี่?!"
2005005-86 = "ทำอะไรน่ะ? ลูกค้าบอกว่ายังไม่อยากซื้อ แต่ก็จะบังคับให้ซื้องั้นเหรอ?"
2005005-87 = "ปะ... เป็นไปไม่ได้หรอกครับ! ผะ... ผมแค่จะบอกว่าตอนนี้ยังไม่มีเสื้อที่เหมาะกับคุณลูกค้า รอบหน้าก็เลยจะหาเสื้อสวยๆ ไว้ให้ต่างหากครับ!"
2005005-88 = "ตกลงเป็นแบบนี้เนอะ? งั้นฉันจะพาตัวคุณครูไปเอง!"
2005005-89 = "ครับ! เชิญเลยครับ!"
2005005-94 = "คุณครูขาดฉันไม่ได้จริงๆ ด้วยนะ ว่ามั้ย?"
2005005-95 = "[s] \"มาถนนเส้นนี้บ่อยจนถูกเรียกว่าลูกพี่เลยเหรอ...\""
2005005-96 = "ฮิฮิ"
2005005-97 = "ต่อไปถ้าคุณครูจะไปถนนที่ยังไม่เคยไป ก็ต้องไปกับฉันนะ"
2005005-98 = "เข้าใจมั้ย?"

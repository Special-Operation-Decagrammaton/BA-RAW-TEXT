[translation]
2005005-1 = "不能一個人！"
2005005-2 = "夏萊正門"
2005005-3 = "老師！我在這邊！"
2005005-4 = "[s]「嗨，律！」"
2005005-5 = "不過老師，你剛才不是說你很忙嗎？"
2005005-6 = "[s1]「律，大人這種生物啊……」\n[s2]「一旦找到能逃離工作的藉口，絕對會二話不說馬上開溜哦。」"
2005005-9 = "哦！我知道我知道！"
2005005-10 = "這就是所謂的「薪水小偷」對吧！"
2005005-11 = "[s]「呃啊，真是一針見血！」"
2005005-12 = "不過，老師還是會陪我玩的對吧？"
2005005-13 = "這樣就算老師是薪水小偷我也喜歡！"
2005005-14 = "走吧，老師！#n正好有一區我很熟哦！"
2005005-19 = "（就這樣被律拉著手，前往了商店街）"
2005005-21 = "服裝商店街"
2005005-22 = "鏘鏘～就是這裡，老師！"
2005005-23 = "從日常的基本款到能夠驚豔全場的衣服，全部都能在這條街上找到！"
2005005-24 = "[s]「我有經過附近幾次，卻完全不知道這裡有這樣的商店街呢。」"
2005005-25 = "在角落那邊的店裡，還有賣老師喜歡的透明裙子或褲子哦！"
2005005-26 = "[s3]「我才沒有喜歡那種東西！」\n[s4]「而且真的有人需要那種衣服嗎？」"
2005005-29 = "啊哈哈！沒興趣的話就往這邊走吧！"
2005005-30 = "從價格適中的百搭款開始逛起～！"
2005005-38 = "（就這樣沿著街道邊走邊逛）"
2005005-39 = "（雖然有時會受到來自律的美學品味的強勢干涉……）"
2005005-40 = "（不過還是買到了不少百搭的好衣服）"
2005005-42 = "黑市入口"
2005005-43 = "唔嗯，這樣好搭的衣服應該買得差不多了。"
2005005-44 = "老師你呢？"
2005005-45 = "[s]「感覺我單調的衣櫃終於要有新氣象了。」"
2005005-46 = "嘿嘿，看來出來一趟是值得的呢。"
2005005-47 = "那麼老師，可以在這裡等我一下嗎？"
2005005-48 = "[s]「要去拿委託的交易品嗎？」"
2005005-52 = "真不愧是老師！一下就明白我的意思了！"
2005005-53 = "那我去去就回！"
2005005-58 = "[ns]（既然如此……就自己再隨意逛逛吧）"
2005005-60 = "[ns]（話說這邊街道的氣氛，好像跟剛才有點不一樣……）"
2005005-62 = "嗯？歡迎光臨，這位客人！在找什麼嗎？"
2005005-63 = "[s]「啊，我想找外套……」"
2005005-64 = "啊！在找外套啊！#n我們店裡剛好進了超讚的新品哦！"
2005005-68 = "來！這件你拿去試穿看看！"
2005005-69 = "[s]「那個，我想先逛一下……」"
2005005-70 = "哎呀，不用浪費時間逛了啦！這件就是最適合你的那款！#n看看我的眼睛，你難道信不過我嗎？"
2005005-71 = "[s]「我們是第一次見面吧？」"
2005005-72 = "哎～反正先試穿看看嘛？"
2005005-76 = "哇～我的眼光果然沒錯。#n簡直就像為客人量身訂做的一樣對吧？"
2005005-77 = "[s]「……袖子的部分太長了。」"
2005005-78 = "不用擔心！裁縫店就在附近，我馬～上去幫你裁好。#n客人你在這等我一下！"
2005005-79 = "[s]「不是，我還沒有決定要買……」"
2005005-80 = "聽我說，碰到這種機會的時候千萬不能猶豫啊。#n下次再來可就買不到了哦？"
2005005-81 = "老師，你在那裡做什麼？"
2005005-85 = "啊！大，大姐頭！？"
2005005-86 = "怎麼？你又在強迫推銷衣服了啊？"
2005005-87 = "怎，怎麼會呢！#n我，我只是在跟客人說現在剛好沒有適合他的衣服，下次一定奉上獨家好貨而已！"
2005005-88 = "是嗎？#n那老師我就帶走囉！"
2005005-89 = "好的好的！您慢走！"
2005005-94 = "老師果然不能沒有我，對吧？"
2005005-95 = "[s]「你在這條街上到底有什麼豐功偉業……」"
2005005-96 = "嘿嘿。"
2005005-97 = "之後如果要去陌生的地方，記得一定要跟我一起去哦？"
2005005-98 = "知道了嗎？"

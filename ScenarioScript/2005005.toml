[translation]
2005005-1 = "I Can't Do It Alone!"
2005005-2 = "Schale Main Entrance"
2005005-3 = "Sensei! Over here!"
2005005-4 = "[s]\"Hi, Ritsu!\""
2005005-5 = "Sensei, I thought you said you were busy!"
2005005-6 = "[s1]\"Ritsu. The thing about adults is...\"\n[s2]\"...we'll take any reason to escape from work.\""
2005005-9 = "Oh! I know what you are!"
2005005-10 = "You're a \"lost cause.\""
2005005-11 = "[s]\"You're right, but it hurts hearing it!\""
2005005-12 = "But what matters is that you'll hang with me, right?"
2005005-13 = "In that case, I'm fine with you being a \"lost cause.\""
2005005-14 = "Let's go, Sensei! I know this street up and down."
2005005-19 = "Ritsu dragged me to the shopping district."
2005005-21 = "Clothing Shopping District"
2005005-22 = "Tada! We're here, Sensei!"
2005005-23 = "We have casual, business casual, formal, you name it! It's all here on one street!"
2005005-24 = "[s]\"I've passed by here, but never looked in!\""
2005005-25 = "See! They even have those transparent skirts and pants you like! Right around the corner!"
2005005-26 = "[s3] \"I didn't say I like that!\"\n[s4] \"People actually buy those?\""
2005005-29 = "If you don't like that, then follow me. Over here!"
2005005-30 = "Let's start with reasonable clothes at reasonable prices, right?"
2005005-38 = "We shopped for clothes."
2005005-39 = "While some of them seemed more suited to Ritsu's aesthetics..."
2005005-40 = "...we found a few decent items."
2005005-42 = "Black Market Entrance"
2005005-43 = "Hm, I think we bought a good assortment."
2005005-44 = "What do you think, Sensei?"
2005005-45 = "[s] \"I feel like my wardrobe has been refreshed!\""
2005005-46 = "Heehee! I'm glad we ventured out, then."
2005005-47 = "Sensei, can you just wait here a minute?"
2005005-48 = "[s]\"Off to pick up something to smuggle?\""
2005005-52 = "Right on. You always know what's up."
2005005-53 = "I'll be right back."
2005005-58 = "[ns]\"(Well... I might as well look around.)\""
2005005-60 = "[ns]\"(This street seems a little different...)\""
2005005-62 = "Hm? Welcome, bud! What're you looking for?"
2005005-63 = "[s]\"Ah, perhaps some outerwear?\""
2005005-64 = "That's great! We got some fresh arrivals!"
2005005-68 = "Here! Put this on! It'll look great!"
2005005-69 = "[s] \"I was going to take a look around...\""
2005005-70 = "Nah, that's a waste of time. This is made for you! Look in my eyes and tell me you don't trust my taste!"
2005005-71 = "[s]\"I can't...see your eyes?\""
2005005-72 = "I'm telling you to try it on. Here!"
2005005-76 = "Wow! I knew it! It's perfect. Don't you think so?"
2005005-77 = "[s]\"...The sleeves are a bit long.\""
2005005-78 = "Don't worry! There's a tailor nearby. They're amazing. We'll shorten them. Just wait a minute, will you?"
2005005-79 = "[s]\"No. I don't think I want this.\""
2005005-80 = "You know, it's foolish to hesitate. This is a rare find. It'll be gone in a day. "
2005005-81 = "Sensei, what's going on over here?"
2005005-85 = "Oh! B-Big sis?!"
2005005-86 = "What are you doing? You weren't...giving them the \"hard sell\" again, were you?"
2005005-87 = "No! I was....just offering to help them find options that may be better suited for their figure....next time!"
2005005-88 = "That's what I thought. Cool! I'll be taking Sensei, then."
2005005-89 = "Love it! Be well!"
2005005-94 = "It seems you really need me around, huh, Sensei?"
2005005-95 = "[s]\"Just what do you do out here?\""
2005005-96 = "Heehee."
2005005-97 = "All I think is...if you need to go somewhere new, you should bring me with you."
2005005-98 = "Does that sound good?"

[translation]
10046270-3 = "Excuse us."
10046270-5 = "Oh, Tea Party members!"
10046270-6 = "Do you need some help?"
10046270-8 = "On the contrary. We were hoping that we could assist you."
10046270-9 = "It seems as if you have far too much on your plate."
10046270-11 = "Haha... It's so kind of you to offer."
10046270-13 = "She clearly needs more people."
10046270-14 = "I'm sure Nagisa has her reasons."
10046270-15 = "Perhaps Nagisa is too far from the field..."
10046270-16 = "That's, well..."
10046270-17 = "Don't you think so, Ichika?"
10046270-19 = "M-Me?! Think what?"
10046270-21 = "That Nagisa's lost touch with the commoners, meaning honest black-collar workers like you!"
10046270-22 = "Do you feel that the Tea Party understands the Task Force's needs?"
10046270-24 = "Ahahaha..."
10046270-26 = "Well, we didn't come here just to bicker..."
10046270-27 = "Right. We're kindly offering our humble services."
10046270-29 = "Wow... Well, I can't turn down an offer like that. Thank you."
10046270-30 = "Now, let's get to work!"

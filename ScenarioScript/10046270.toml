[translation]
10046270-3 = "ขอโทษนะคะ"
10046270-5 = "อ๊ะ พวกคุณคือสมาชิกสภาน้ำชาไม่ใช่เหรอคะ?"
10046270-6 = "ต้องการความช่วยเหลืออะไรหรือเปล่าคะ?"
10046270-8 = "อ่า... ตรงกันข้ามเลยค่ะ! มีอะไรที่พวกฉันพอจะช่วยเหลือได้บ้างหรือเปล่าคะ?"
10046270-9 = "คุณดูจะทำงานหนักอยู่คนเดียวน่ะค่ะ"
10046270-11 = "แหะๆ... แค่ใส่ใจกันอย่างนั้นฉันก็ขอบคุณแล้วค่ะ"
10046270-13 = "กำลังคนไม่พอจริงๆ ใช่มั้ยล่ะ?"
10046270-14 = "นี่เป็นงานของคุณนางิสะ คุณนางิสะก็ต้องมีเหตุผลที่สั่งงานละค่ะ"
10046270-15 = "มันก็จริงอยู่หรอก แต่คุณนางิสะไม่ค่อยรู้นี่นาว่าหน้างานมันเป็นยังไง..."
10046270-16 = "มันก็จริงอยู่หรอกนะ..."
10046270-17 = "คุณไม่คิดอย่างนั้นเหรอคะ?"
10046270-19 = "ฉะ... ฉันเหรอคะ?!"
10046270-21 = "คุณนางิสะไม่รู้หรอกค่ะว่าหน้างานน่ะลำบากขนาดไหน~"
10046270-22 = "พวกฉันไม่ได้อยู่ในตำแหน่งที่ต้องกังวลไปเสียทุกเรื่องก็จริง แต่ถึงจะยังงั้นก็เถอะค่ะ~"
10046270-24 = "แหะๆๆๆ..."
10046270-26 = "แต่การบ่นแบบนี้คงไม่ทำให้ทุกอย่างดีขึ้น"
10046270-27 = "เพราะงั้นพวกฉันก็เลยมาช่วยคุณค่ะ"
10046270-29 = "จริงเหรอคะ... ฉันกำลังว้าเหว่อยู่พอดีเลย ต้องขอบคุณมากเลยค่ะ"
10046270-30 = "งั้นก็ต้องรบกวนด้วยนะคะ!"

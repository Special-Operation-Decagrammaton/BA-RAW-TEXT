[translation]
10046270-3 = "不好意思，打擾了。"
10046270-5 = "啊，這不是茶會的幹部們嗎？"
10046270-6 = "有什麼需要幫忙的嗎？"
10046270-8 = "啊，其實正好相反。#n我們想請教一下，是否有什麼我們能幫上忙的事呢？"
10046270-9 = "總覺得您一個人太辛苦了。"
10046270-11 = "哈哈……光是聽見各位這麼說，我就很感激了。"
10046270-13 = "人手果然不夠充分對吧？"
10046270-14 = "畢竟是渚大人的安排，應該有他的考量吧。"
10046270-15 = "雖然是這樣沒錯，但渚大人肯定不清楚現場的狀況……"
10046270-16 = "這個嘛……"
10046270-17 = "你也這麼覺得吧？"
10046270-19 = "我，我嗎！？"
10046270-21 = "渚大人實在太不了解第一線人員的辛苦了～"
10046270-22 = "雖然他的職位不可能事事親力親為，還是希望他能多留意呢～"
10046270-24 = "啊哈哈哈……"
10046270-26 = "不過光是抱怨也不會讓事情有所進展。"
10046270-27 = "所以請讓我們來幫忙吧。"
10046270-29 = "哎呀……正好我也感覺有點無助，真是太感謝了。"
10046270-30 = "那就麻煩各位了！"

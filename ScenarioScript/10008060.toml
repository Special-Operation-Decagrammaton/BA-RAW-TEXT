[translation]
10008060-1 = "第6話;想取回的理由"
10008060-3 = "[ns]「總之先整理一下狀況吧？」"
10008060-4 = "嗯。首先，圍繞賽錢箱引發的一連串的事件，是犯罪組織「黑龜組」的大規模詐欺。"
10008060-5 = "而，而凱坦澤打著伸張正義的名號，偷走了賽錢箱……"
10008060-6 = "然後其他的問題兒童跟風紀委員會也來大集合了～！"
10008060-7 = "到處都陷入亂七八糟又手忙腳亂的比賽裡了呢，啊哈！"
10008060-8 = "……才剛過年就亂哄哄的，真受不了。"
10008060-14 = "呵呵……"
10008060-15 = "這樣也好！真是太好了太好了！"
10008060-16 = "……社長？"
10008060-17 = "哼嗯～？亞瑠醬，有股放心了啊～的感覺呢？"
10008060-18 = "才，才沒有……！？"
10008060-19 = "咯呵呵，難道……是因為知道亞瑠醬許的願望不會「反噬」嗎？"
10008060-20 = "！？"
10008060-21 = "該不會……你一直追著賽錢箱的理由就是這個……？"
10008060-25 = "才，才不是！"
10008060-26 = "只，只是稍微，有點在意而已……"
10008060-27 = "你，你們想想！大家都不想用不好的心情開始新的一年不是嗎！？"
10008060-28 = "啊哈哈！"
10008060-29 = "可是亞瑠醬，你當時許了很迫切的願望對吧！"
10008060-30 = "沒，沒有……那是因為……！"
10008060-32 = "唉……無月，你就放過他吧。"
10008060-33 = "我，我也能明白亞瑠大人的心情！是！"
10008060-34 = "啊哈哈哈！"
10008060-35 = "嘛，我們也了解不少事情了……#n嗯～全都是詐欺的話，要回去了嗎？"
10008060-36 = "還是說既然是騙局，把賽錢箱裡的錢全都搶走好像也行？"
10008060-43 = "社長，你打算怎麼做？"
10008060-44 = "……該做的事沒有改變。#n拿回賽錢箱並放回原位，僅此而已。"
10008060-45 = "咦？"
10008060-46 = "大家都許過願了不是嗎？"
10008060-47 = "雖然很理所當然，但正是因為希望能夠實現才會許願。"
10008060-48 = "沒錯吧？"
10008060-49 = "有人為了許願，不惜克制自己的興趣……"
10008060-51 = "……"
10008060-53 = "也有人投入了在工地辛苦賺來的錢……！"
10008060-54 = "亞瑠大人……"
10008060-55 = "（雖然遙香好像不怎麼在乎就是了……）"
10008060-56 = "（我投進去的是玩具錢耶……）"
10008060-58 = "以目前的狀況來看，我們確實只是被犯罪組織和怪人們耍得團團轉也說不定。#n但即便如此……"
10008060-59 = "那些願望也是真實的……！"
10008060-60 = "我不能讓它們被玷汙！"
10008060-65 = "……亞，亞瑠大人！您居然這麼重視我們……！"
10008060-66 = "唔嗯～亞瑠醬不愧是亞瑠醬呢～"
10008060-67 = "……偶爾就會像這樣感動我們一下。"
10008060-72 = "就是說啊，偶爾還是會說點好話的嘛……？"
10008060-73 = "[s]「不愧是亞瑠社長。」"
10008060-74 = "也就是說，我們的目標沒有改變！"
10008060-75 = "不管背後有什麼原因，總之就是要拿回賽錢箱。這就是我的決定！"
10008060-76 = "來，請你們配合一下吧？"
10008060-78 = "……嘛，這也沒辦法。"
10008060-79 = "咯呵呵，反正那樣好像也很有趣！可以唷！"
10008060-80 = "是，是！"
10008060-82 = "知道了知道了。"
10008060-83 = "[s]「那我們走吧。」"
10008060-87 = "話說回來……凱坦澤到哪裡去了？"
10008060-88 = "啊哈！"
10008060-89 = "脫線這一點也是亞瑠醬的一部分呢～"
10008060-90 = "……嘛。"
10008060-91 = "我有線索。"
10008060-92 = "佳世子！不愧是我們便利屋68可靠的課長……！"
10008060-93 = "說的太誇張了……"
10008060-94 = "總之，從剛才風紀委員會說的洗錢、賽錢箱和凱坦澤的企圖來看……"
10008060-95 = "應該……"
10008060-97 = "黑市．後巷"
10008060-100 = "呼……"
10008060-101 = "逃到這裡的話，再怎麼說都甩掉──"
10008060-108 = "找到了唷！"
10008060-109 = "什麼！？"
10008060-110 = "為什麼我們的位置會……！？"
10008060-112 = "哇～哦，完全正確！不愧是佳世子親！"
10008060-113 = "這不是什麼困難的事。#n如果事前就知道是違法的東西才搶走……"
10008060-114 = "想要處理自然也需要非法途徑。也就是說，他們只能利用黑市。"
10008060-115 = "不過這種程度的事，我想風紀委員會也很快就會察覺了吧。"
10008060-117 = "即便如此還是比風紀委員會快了一步呢！#n光是這樣就很了不起了唷，佳世子！"
10008060-121 = "來，乖乖把賽錢箱還來吧！"
10008060-122 = "哈哈，說什麼傻話！"
10008060-123 = "傻，傻話……！？"
10008060-124 = "從搶到它的那一刻起，這個賽錢箱就已經是我們的東西，是凱坦澤的資金！#n哪有還給你們的道理！"
10008060-125 = "[s]「完全是反派的台詞……」"
10008060-126 = "你說什麼！我們就是正義！#n如果在字典裡查「正義」這個詞，上面寫著的就是我們的名字！"
10008060-127 = "事到如今只好發動總攻擊了！一切都是為了我們的夢想……！"
10008060-133 = "大家都在說一樣的話呢？夢想還是什麼之類的。"
10008060-134 = "唉……"
10008060-136 = "你們要那麼做的話，我們也只好動用武力了……！"
10008060-137 = "我們上！"

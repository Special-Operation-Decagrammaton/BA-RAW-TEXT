[translation]
10008060-1 = "ตอนที่ 6;เหตุผลที่ต้องเอาคืน"
10008060-3 = "[ns] \"มาลองสรุปสถานการณ์กันดีมั้ย?\""
10008060-4 = "อืม เรื่องตู้บริจาคเป็นละครลวงโลกฉากใหญ่ของกลุ่มอาชญากรแก๊งคุโรคาเมะ"
10008060-5 = "ละ...แล้วพวกไคเทนเจอร์ก็ขโมยตู้บริจาคไปพะ...เพื่อความยุติธรรมค่ะ"
10008060-6 = "คิคิคิ เพราะงั้นพวกเด็กเจ้าปัญหากลุ่มอื่นๆ รวมทั้งคณะกรรมการวินัยก็โผล่มา~! สร้างความวุ่นวาย#nโน่นนี่นั่นเต็มไปหมด!"
10008060-7 = "อ่ะฮ่า~! สนุกจุงเบย~!"
10008060-8 = "ทำไมถึงเกิดเรื่องวุ่นวายแบบนี้ขึ้นตั้งแต่วันแรกของปีกันนะ... จริงๆ เลย"
10008060-14 = "ฮุฮุฮุ"
10008060-15 = "อื้อ! ก็ดี! โล่งอกไปที"
10008060-16 = "ประธาน...?"
10008060-17 = "หืมมม~ อารุจัง...? โล่งใจแล้วเหรอ?"
10008060-18 = "หะ... หืม?!"
10008060-19 = "คิคิคิ... เพราะพรปลอมๆ ที่อารุจังขอไปจะไม่ย้อนกลับใช่ม้า?"
10008060-20 = "?!"
10008060-21 = "ประธาน หรือว่าที่เราไล่ตามตู้บริจาคมาถึงตอนนี้... เพราะเรื่องนั้นงั้นเหรอ...?"
10008060-25 = "มะ...ไม่ใช่สักหน่อย!"
10008060-26 = "มะ...มันก็แค่ทำให้ฉันรำคาญใจก็แค่นั้นน่ะ..."
10008060-27 = "ที่มีเรื่องแบบนี้เกิดขึ้นตั้งแต่เริ่มวันใหม่ของปี..."
10008060-28 = "ฮ่ะฮ่ะฮ่า!"
10008060-29 = "แต่ว่าอารุจังน่ะ ตั้งใจขอพรมากเลยนะ!"
10008060-30 = "ปะ... เปล่านะ... ไม่ใช่แบบนั้นนะ..."
10008060-32 = "เฮ้อ... มุสึกิ"
10008060-33 = "ฉะ...ฉันเข้าใจท่านอารุนะคะ!"
10008060-34 = "อ่ะฮะฮะฮ่า!"
10008060-35 = "เฮ้อ~ แต่ว่าตอนนี้มันไม่สำคัญแล้ว... พวกเราก็กลับบ้านกันได้แล้วใช่ม้า?"
10008060-36 = "ก็มันเป็นเรื่องหลอกลวงตั้งแต่แรกแล้วนี่นา หรือพวกเราชิงเงินในตู้บริจาคมาเลยดีไหมล่ะ?"
10008060-43 = "ไม่ว่าแบบไหน ฉันก็ไม่มีความเห็น ประธานตัดสินใจเลย"
10008060-44 = "ยังไงเราก็จะไล่ตามเจ้าพวกนั้นกันต่อไป"
10008060-45 = "หืม?"
10008060-46 = "ทุกคนก็ขอพรกันหมดไม่ใช่รึไง?"
10008060-47 = "คงเป็นสิ่งที่อยากให้สมหวังในปีนี้... หรือสิ่งที่อยากได้ใช่มั้ยล่ะ "
10008060-48 = "อืม ทุกคนขอพรเพราะอยากให้สมหวังกันนี่นา"
10008060-49 = "บางคนต้องเสียสละเงินที่เก็บออมมาไว้สำหรับงานอดิเรก..."
10008060-51 = "..."
10008060-53 = "และบางคนก็ใช้เงินที่ไปทำงานใช้แรงงานที่ไซต์งานก่อสร้างมาขอพร...!!"
10008060-54 = "ท่านอารุ..."
10008060-55 = "(ถึงฮารุกะจะดูไม่ใส่ใจเท่าไรก็เถอะ...)"
10008060-56 = "(แต่ฉันเอาแบงก์ปลอมใส่ลงไปนะ...?)"
10008060-58 = "แต่สุดท้ายกลับมาถูกพวกอาชญากรกับพวกตัวประหลาดปั่นหัวแล้วก็ขโมยเงินไปแบบนี้..."
10008060-59 = "ใครจะว่ายังไงก็ตาม แต่พรที่เราขอไปคือเรื่องจริง!"
10008060-60 = "จะให้ทำเหมือนไม่มีอะไรเกิดขึ้นไม่ได้หรอก!!"
10008060-65 = "ทะ...ท่านอารุใส่ใจพวกเราถึงขนาดนี้เลย...!"
10008060-66 = "หืมมม~ จะว่ายังไงดีล่ะ~"
10008060-67 = "เฮ้อ... จู่ๆ ก็พูดอะไรขึ้นมาแบบนี้"
10008060-72 = "แต่ก็นะ... ที่ประธานของพวกเธอพูดก็ถูกแล้วไม่ใช่รึไง?"
10008060-73 = "[s] \"อื้อ สมกับเป็นอารุจริงๆ เลย\""
10008060-74 = "ฮึ่ม! เป้าหมายของพวกเราไม่ได้เปลี่ยนไป"
10008060-75 = "เราจะไปเอาตู้บริจาคคืนมาและเอากลับไปไว้ที่เดิม นี่ละ การตัดสินใจของฉัน!"
10008060-76 = "เอาละ ถ้าเป็นแบบนี้จะยังร่วมมือกับฉันอยู่อีกหรือเปล่าล่ะ?"
10008060-78 = "ก็ช่วยไม่ได้นะ..."
10008060-79 = "หืมมม~ แบบนั้นก็ดูน่าจะสนุกกว่านะ!"
10008060-80 = "ใช่แล้วละค่ะ!"
10008060-82 = "เฮ้อ... ก็ได้ เข้าใจแล้ว"
10008060-83 = "[s] \"ไปด้วยกันเถอะ! ทุกคนเลย!\""
10008060-87 = "เอ่อ... คือว่า... แล้วจะต้องไปทางไหนต่อล่ะ?"
10008060-88 = "อ่ะฮะฮะฮ่า!!"
10008060-89 = "มาถามเรื่องนั้นตอนนี้ได้ยังไง อารุจัง!"
10008060-90 = "เฮ้อ..."
10008060-91 = "ก็นะ... มันก็พอจะมีเบาะแสอยู่หรอก"
10008060-92 = "คะ...คาโยโกะ! สมกับเป็นหัวหน้าฝ่ายของหน่วยรับจ้างสารพัดที่น่าเชื่อถือจริงๆ...!"
10008060-93 = "พูดอะไรของเธอน่ะ..."
10008060-94 = "ถ้าลองคิดถึงเรื่องฟอกเงินผิดกฎหมายของแก๊งคุโรคาเมะที่พวกคณะกรรมการวินัยพูดถึง... กับเรื่องจุดประสงค์การขโมยเงินของพวกไคเทนเจอร์"
10008060-95 = "บางทีตอนนี้เจ้าพวกนั้น..."
10008060-97 = "ตรอกหลังตลาดมืด"
10008060-100 = "ฮู่ว..."
10008060-101 = "มาไกลขนาดนี้แล้ว น่าจะสลัดพวกที่ไล่ตามเรามาได้..."
10008060-108 = "นี่! หยุดเดี๋ยวนี้น้าาาาาา!!"
10008060-109 = "เอ๋?!"
10008060-110 = "ทำไมถึงรู้พิกัดของพวกเราได้ล่ะ?! เส้นทางหลบหนีของเราสมบูรณ์แบบมากแล้วนะ?!\n"
10008060-112 = "โอ๊ะ~! อยู่ที่นี่จริงๆ ด้วยล่ะ คาโยโกะจัง! สุดยอดไปเลย"
10008060-113 = "คำตอบมันก็ง่ายจะตายไป ขโมยของที่ไม่ถูกต้องตามกฎหมายมา ซึ่งพวกไคเทนเจอร์ก็คงรู้เรื่องนี้อยู่แล้ว"
10008060-114 = "เส้นทางที่ใช้สำหรับจัดการของที่ไม่ถูกต้องตามกฎหมาย... ก็มีแค่ตลาดมืดเท่านั้นล่ะ"
10008060-115 = "ถ้าแค่นี้ละก็พวกคณะกรรมการวินัยก็คงจะคิดออกทันทีเหมือนกัน"
10008060-117 = "คาโยโกะ! แค่มาถึงได้ก่อนพวกคณะกรรมการวินัยก็ยอดเยี่ยมแล้วละนะ!"
10008060-121 = "เอาล่ะ! เจ้าพวกวายร้าย! คืนตู้บริจาคมาซะ! คืนมาซะดีๆ!"
10008060-122 = "ฮ่าฮ่า! นึกว่าจะพูดอะไร ที่แท้ก็มาพูดอะไรไร้สาระนี่เอง!"
10008060-123 = "ว่ายังไงนะ?!"
10008060-124 = "ตู้บริจาคนี่เป็นของพวกเราตั้งแต่วินาทีที่เราขโมยมาได้แล้ว! เงินนี่เป็นของพวกเราไคเทนเจอร์! พวกเราไม่คืนเด็ดขาด"
10008060-125 = "[s] \"ดูแล้วไม่เหมือนคำพูดของพวกฮีโร่เลย\""
10008060-126 = "เป็นไปไม่ได้-! พวกเราคือความยุติธรรม! ความยุติธรรมก็คือพวกเรา!"
10008060-127 = "ถ้าเป็นแบบนี้ก็ต้องทุ่มพลังทั้งหมดโจมตีก่อนที่จะถูกจับได้แล้วล่ะ! ทั้งหมดก็เพื่อความฝันที่ยิ่งใหญ่ของเรา...!"
10008060-133 = "ทำไมเจ้าพวกที่คิดขโมยตู้บริจาคถึงได้พูดเหมือนกันหมดเลยนะ~ หรือเป็นเอฟเฟกต์จากตู้บริจาคกันนะ~?"
10008060-134 = "เฮ้อ..."
10008060-136 = "ถ้าพูดกันดีๆ แล้วไม่เข้าใจ... ทางนี้ก็คงไม่มีทางเลือกนอกจากใช้กำลังแล้ว...!"
10008060-137 = "ลุยเลย!"

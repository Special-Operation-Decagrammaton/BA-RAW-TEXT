[translation]
10008060-1 = "Episode 6;Reason to Reclaim"
10008060-3 = "[ns] \"What do you say we go over the situation again?\""
10008060-4 = "Sure. The incident started with the Kaitengers stealing Daikichiden's offering box in the name of justice."
10008060-5 = "Wh-Which led to other factions and the Prefect Team getting involved."
10008060-6 = "And now we know the New Year's event and offering box were part of a large-scale scam by the Kurokame Gang crime syndicate!"
10008060-7 = "Haha! What a strange turn of events!"
10008060-8 = "*sigh* Why did I have to get caught up in something like this on New Year's?"
10008060-14 = "Heh."
10008060-15 = "I, for one, couldn't be happier!"
10008060-16 = "Boss?"
10008060-17 = "What's got you so happy, Aru?"
10008060-18 = "W-Well, it's just that I..."
10008060-19 = "Oh, I get it. You're relieved that your wish won't be reversed."
10008060-20 = "...?!"
10008060-21 = "Don't tell me. Boss, is that the reason we've been chasing after the offering box this whole time?"
10008060-25 = "N-No!"
10008060-26 = "I-I just didn't want the new year to start off on a bad foot..."
10008060-27 = "The last thing anyone wants is a bad omen to begin the year!"
10008060-28 = "Ahahaha!"
10008060-29 = "No wonder you were concentrating so hard when you made your wish!"
10008060-30 = "Th-That? N-No, I was just, uh..."
10008060-32 = "*sigh* Mutsuki."
10008060-33 = "B-But it's easy to understand how Aru feels."
10008060-34 = "Hahaha!"
10008060-35 = "Phew... So what do we do now? If it's a scam, shouldn't we just call it quits?"
10008060-36 = "Or better yet, why don't we keep what's inside the box now that we know the truth?"
10008060-43 = "Well, Boss? It's your call."
10008060-44 = "We'll continue the chase."
10008060-45 = "Huh?"
10008060-46 = "You all made wishes too, didn't you?"
10008060-47 = "There must be something you each wish to achieve this year. "
10008060-48 = "And you each spent your precious offering hoping it would come true.#nIsn't that right?"
10008060-49 = "One of you sacrificed the budget for your hobby to do so."
10008060-51 = "..."
10008060-53 = "Another of you gave away your disposable income from working overnight at a construction site!"
10008060-54 = "Aru..."
10008060-55 = "(Haruka doesn't seem that beaten up over it though.)"
10008060-56 = "(And I put in play money anyway.)"
10008060-58 = "So what if we played right into some crime syndicate's scam and were made fools of by a gang of costumed weirdos?"
10008060-59 = "The wishes we made were still genuine!"
10008060-60 = "I won't allow them to be in vain!"
10008060-65 = "A-Aru! You're so considerate!"
10008060-66 = "Heh. That's just like her, isn't it?"
10008060-67 = "*sigh* Always full of surprises."
10008060-72 = "Your boss does make some good points, you know."
10008060-73 = "[s] \"Yep. That's the Aru I know.\""
10008060-74 = "Hmph! Our goal remains the same."
10008060-75 = "We'll reclaim the offering box and take it back to the shrine."
10008060-76 = "Any objections?"
10008060-78 = "There's no other choice as far as I'm concerned."
10008060-79 = "Sounds like fun, so I'm in!"
10008060-80 = "Yes!"
10008060-82 = "Okay, okay. You don't have to make it sound like an ultimatum."
10008060-83 = "[s] \"Let's go, everyone!\""
10008060-87 = "By the way... Does anyone know which way the Kaitengers went?"
10008060-88 = "Hahaha!"
10008060-89 = "It's just like you to ask an empty-headed question after all that!"
10008060-90 = "*sigh*"
10008060-91 = "Well, there are clues at least."
10008060-92 = "Good work, Kayoko! This is why you're my reliable department head!"
10008060-93 = "Okay, just calm down."
10008060-94 = "Based on what we learned from the Prefect Team about the Kurokame Gang's money laundering, I have an idea where the Kaitengers are going with the offering box."
10008060-95 = "Only one place comes to mind..."
10008060-97 = "Black Market Back Alley"
10008060-100 = "*pant* *pant*..."
10008060-101 = "We must have thrown them off our trail by now."
10008060-108 = "Stop right there!"
10008060-109 = "What?!"
10008060-110 = "How did you find us?! Our escape route was perfect!"
10008060-112 = "Wow! Kayoko was right on the money!"
10008060-113 = "Like I said, only one place came to mind. The Kaitengers knew they were making off with dirty money from the start."
10008060-114 = "The best place to take something that shady is somewhere just as illicit, such as the Black Market."
10008060-115 = "I'm sure the Prefect Team will figure that out before long. "
10008060-117 = "And yet we still beat them to the punch thanks to you. Well done, Kayoko. "
10008060-121 = "Back to business. Hand over that offering box. Now!"
10008060-122 = "Haha! I thought you might say that. In your dreams!"
10008060-123 = "What?!"
10008060-124 = "We stole the offering box fair and square. That means it's Kaitenger money, and you can't have it!"
10008060-125 = "[s] \"I don't think that's what heroes of justice would say...\""
10008060-126 = "Of course it is. We're heroes, and we said it. Therefore it IS justice!"
10008060-127 = "It's come to this! Fight them with everything you have for the sake of our dream!"
10008060-133 = "Dreams this, future that. Everyone tonight sounds like a broken record."
10008060-134 = "*sigh*"
10008060-136 = "If a fight is what you want, then a fight is what you'll get!"
10008060-137 = "Let's go!"

[translation]
1003903-1 = "RABBIT4，要出動了"
1003903-2 = "（和往常一樣在處理夏萊堆積的工作時……）"
1003903-6 = "啊，老師……"
1003903-10 = "啊嗚……"
1003903-16 = "嗚……"
1003903-20 = "[ns1] 「……啊，美優。」\n[ns2] 「抱歉，你什麼時候來的……」"
1003903-21 = "啊，是，我剛剛才來……"
1003903-22 = "啊，是，我剛剛才來……"
1003903-23 = "居然就連老師都要花時間才能注意到我……"
1003903-24 = "我，存在感又更低了嗎……？"
1003903-25 = "感情好的朋友們也越來越注意不到我了……"
1003903-26 = "就算後來有人注意到我，幾乎也都是分完組之後了，總覺得有點抱歉……"
1003903-27 = "……果然我會就這麼不遺留在任何人的記憶中，一個人孤獨的死去吧。"
1003903-28 = "[s] 「抱歉，下次會早一點注意到的。話說……」"
1003903-29 = "……你說腳步聲嗎？"
1003903-30 = "啊，那大概是因為……我本來就有躡手躡腳的習慣。"
1003903-31 = "就算沒有在進行潛入任務，也習慣性地會……"
1003903-32 = "即使刻意想發出腳步聲，我也做不太到。"
1003903-33 = "或許這也是我存在感越來越低的原因……"
1003903-34 = "不過已經變成習慣了，想改也改不太掉……"
1003903-35 = "[s] 「為了能在走路的時候發出聲音，戴一個鈴鐺在身上怎麼樣？」"
1003903-36 = "……戴著鈴鐺，是嗎？"
1003903-37 = "確，確實……如果每次移動都會發出聲音的話，周圍的人說不定就能注意到了……"
1003903-38 = "咦，這麼說來包包裡好像……"
1003903-42 = "[ns] 「美優，等等。那個是……」"
1003903-44 = "嗯……？"
1003903-45 = "是之前養的貓戴過的項圈……怎麼了嗎？"
1003903-46 = "當時換了新的項圈之後，就把舊的帶在身上了……這樣就沒問題了，嘿咻。"
1003903-47 = "像這樣當成項鍊戴著的話，就會被注意到了嗎……！"
1003903-48 = "[s] 「呃，確實是有這種可能，那個……」"
1003903-49 = "呵呵……總覺得已經期待起來了。"
1003903-50 = "老師，我這就去試試看……！"
1003903-54 = "[ns] 「美優，等等啊！！！」"
1003903-58 = "……你看，那孩子是不是戴著寵物用的項圈？"
1003903-59 = "跟在後面的是，夏萊的老師……？"
1003903-60 = "這麼說來我有聽說過，#n「被指派為夏萊值日生的學生不管有什麼事都得立刻過去」之類的……"
1003903-61 = "……難道「值日生」指的是這個意思嗎？"
1003903-62 = "真過分……大家真可憐……"
1003903-63 = "老，老師，請看……！大家都在注意我這邊……！"
1003903-64 = "誰也沒有無視我……！"
1003903-65 = "跟老師說的一樣，多虧有鈴鐺所以存在感也……！"
1003903-66 = "[s] 「快把項圈脫下來吧……」"
1003903-67 = "要，要脫掉嗎？為，為什麼……？"
1003903-68 = "好不容易沒有被無視的……"
1003903-69 = "老師希望我被無視嗎……？"
1003903-70 = "吶，剛才那個孩子說了「脫掉」……"
1003903-71 = "現在看起來還快要哭了，怎麼辦……？"
1003903-72 = "原來「老師」是個糟糕的人啊……"
1003903-73 = "[s] 「算我求你了……！」"
1003903-75 = "（和美優說明之後請他脫下了項圈）"
1003903-76 = "（之後一段時間，每當外出的時候都會感受到冰冷的視線……）"

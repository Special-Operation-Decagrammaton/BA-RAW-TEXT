[translation]
1003903-1 = "RABBIT 4, Mobilize"
1003903-2 = "As usual, I was trying to catch up on some Schale work in the office."
1003903-6 = "Um, S-Sensei..."
1003903-10 = "Uhhh..."
1003903-16 = "Ugh..."
1003903-20 = "[ns1] \"M-Miyu?\"\n[ns2] \"When did you get here?!\""
1003903-21 = "I-I've been here..."
1003903-22 = "I-I've been here..."
1003903-23 = "Even S-Sensei didn't see me..."
1003903-24 = "My presence is fading even more..."
1003903-25 = "Do my friends remember me?"
1003903-26 = "S-Sometimes we would team up and my friends would forget me... I want to h-hide every time I th-think about them s-saying, \"Oh, r-right. Miyu's here.\""
1003903-27 = "I-I might die from loneliness..."
1003903-28 = "[s] \"I promise, it's really not like that.\""
1003903-29 = "Y-You didn't hear me?"
1003903-30 = "I'm a pretty quiet walker..."
1003903-31 = "I-I learned it for missions, but I got really used to it..."
1003903-32 = "Now I just never make noise..."
1003903-33 = "I wonder if that's why people don't notice me."
1003903-34 = "I d-don't think I can change the way I walk though..."
1003903-35 = "[s] \"How about you wear a bell or something?\""
1003903-36 = "Wear a bell?"
1003903-37 = "Th-Then people would hear me walk!"
1003903-38 = "Oh. I have a bell."
1003903-42 = "[ns] \"Wait, Miyu. That's for cats.\""
1003903-44 = "And?"
1003903-45 = "It used to be my cat's."
1003903-46 = "But it got old, so I gave my cat a new collar."
1003903-47 = "If I put a bell on like this, people will f-finally notice me!"
1003903-48 = "[s] \"I'm certain they'll notice you.\""
1003903-49 = "Heehee. I'm e-excited."
1003903-50 = "Sensei, let's go test it out!"
1003903-54 = "[s] \"Miyu, wait a minute!\""
1003903-58 = "What's up with that girl? She's wearing a pet collar."
1003903-59 = "Is that the Schale Sensei next to her?"
1003903-60 = "I've heard rumors that if Sensei calls, you have to run to the Schale office immediately, no exceptions."
1003903-61 = "They're doing that to students on duty?"
1003903-62 = "How terrible... Those poor students."
1003903-63 = "S-Sensei! I think they notice me."
1003903-64 = "Th-They're...They're staring right at me! They see me!"
1003903-65 = "The bell's really working."
1003903-66 = "[s] \"Please take that necklace off.\""
1003903-67 = "T-Take it off?"
1003903-68 = "But I don't wanna go back to being i-i-ignored."
1003903-69 = "Y-You're so mean."
1003903-70 = "Did Sensei just say \"take it off\" to her?"
1003903-71 = "That dear, little student. She's crying!"
1003903-72 = "How did such a mean person become a teacher?"
1003903-73 = "[s] \"Please, take it off! Please!\""
1003903-75 = "I begged her to never wear the necklace again and she finally agreed."
1003903-76 = "But I got dirty looks from citizens for quite some time after..."

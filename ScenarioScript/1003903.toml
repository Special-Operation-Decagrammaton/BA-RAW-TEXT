1003903-57 = "5;미유ND;03\n#5;m4\n#wait;1000"
1003903-58 = "1;행인 A;00;……저 여자아이 뭐야? 애완동물용 목걸이를 차고 있어.\n#1;em;[?]"
1003903-59 = "2;행인 B;00;그 옆에 있는 사람은 샬레의 선생님 같은데……\n#2;em;…"
1003903-60 = "1;행인 A;00;그러고 보니 전에 소문을 들은 적이 있어. 샬레의 선생님이 당번으로 지정한 학생은 아무리 높은 사람이라도 샬레의 사무실로 즉시 달려와야 한다고…….\n#1;em;[반응]"
1003903-61 = "2;행인 B;00;……설마 그동안 당번 활동이라며 학생들에게 저런 짓을 하고 있었던 거야?\n#2;em;[?!]\n#2;shake"
1003903-62 = "2;행인 B;00;너무해…… 학생들이 불쌍해…….\n#2;stiff\n#2;em;[속상함]"
1003903-63 = "1;행인 A;00\n2;행인 B;00\n5;미유ND;03;서, 선생님, 보세요……! 사람들이 저를 주목하고 있어요……!\n#5;em;[반응]\n#1;dl\n#2;dl\n#5;m3"
1003903-64 = "5;미유ND;11;아무도 저를 무시하지 않고, 모두가 저를 열심히 쳐다보고 있어요."
1003903-65 = "5;미유ND;03;선생님의 말씀처럼 방울이 존재감을 드러내는 데 효과가 있었나 봐요."
1003903-66 = "[s] \"그 목걸이는 그만 벗어줘…….\""
1003903-67 = "5;미유ND;02;……네? 벗으라고요?\n#5;em;[?]"
1003903-68 = "5;미유ND;08;모처럼 사람들로부터 주목을 받고 있는데, 예전의 저로 돌아가라니……."
1003903-69 = "5;미유ND;06;어째서 그런 심한 말씀을…….\n#5;em;[속상함]\n#5;stiff"
1003903-70 = "#na;행인 A;……방금 그 소리 들었어? 이런 밖에서 학생에게 벗으라고 말하다니……"

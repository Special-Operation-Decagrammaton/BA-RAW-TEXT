[translation]
1003903-1 = "RABBIT 4 ออกปฏิบัติการค่ะ"
1003903-2 = "(คุณครูกำลังทำงานที่กองเป็นภูเขาอยู่ที่ชาเล่ต์เหมือนอย่างทุกวัน...)"
1003903-6 = "อ๊ะ คุณครู..."
1003903-10 = "อ่า..."
1003903-16 = "ฮือ..."
1003903-20 = "[ns1] \"มะ...มิยุ?\"\n[ns2] \"มะ...มาตั้งแต่เมื่อไรน่ะ?\""
1003903-21 = "ฉันมาถึงตั้งแต่เมื่อกี้นี้แล้วค่ะ..."
1003903-22 = "ฉันมาถึงตั้งแต่เมื่อกี้นี้แล้วค่ะ..."
1003903-23 = "คิดแล้วเชียวว่าคุณครูเองก็มองไม่เห็นฉันแล้วสินะคะ..."
1003903-24 = "ตัวตนของฉันค่อยๆ จืดจางไปเรื่อยๆ แล้วค่ะ"
1003903-25 = "แม้แต่เพื่อนสนิทของฉันก็ไม่เห็นฉันกันแล้วค่ะ..."
1003903-26 = "ตอนที่อยู่สถาบัน เวลาแบ่งกลุ่ม เพื่อนๆ มักจะสังเกตเห็นฉันช้า แล้วพูดกันว่า \"อ๋อ จริงด้วย มิยุก็อยู่#nกลุ่มเรานี่\" แล้วทำสีหน้าแปลกๆ ฉันรู้สึกอยากหนีไปไกลๆ มากเลยค่ะ..."
1003903-27 = "สุดท้ายฉันก็คงจะต้องตายไปอย่างโดดเดี่ยว ทั้งที่ไม่มีใครจำได้เลยสินะคะ..."
1003903-28 = "[s] \"ไม่ใช่แบบนั้นหรอก ที่จริงแล้วน่ะ...\""
1003903-29 = "คะ...? คุณครูไม่ได้ยินเสียงฝีเท้าของฉันตอนเข้ามางั้นเหรอคะ?"
1003903-30 = "อา... ระ...เรื่องนั้น บางทีอาจเป็นเพราะฉันเคยชินกับการเดินเบาๆ มาตั้งแต่เมื่อก่อนแล้วค่ะ"
1003903-31 = "มันเป็นประโยชน์มากตอนที่ทำภารกิจแฝงตัว แต่ทำไปทำมากลับกลายเป็นนิสัยที่เคยชินไปแล้ว..."
1003903-32 = "จนตอนนี้การเดินให้มีเสียงกลายเป็นเรื่องยากไปแล้วค่ะ"
1003903-33 = "และพอนึกๆ ดูแล้ว การที่ฉันกลายเป็นมนุษย์จืดจางก็อาจเป็นเพราะนิสัยพวกนี้ด้วยก็ได้มั้งคะ..."
1003903-34 = "แต่ว่าจะให้มาแก้ความเคยชินในการเดินตอนนี้ก็คงจะยากสักหน่อย..."
1003903-35 = "[s] \"แขวนกระดิ่งไว้ที่ตัวดีมั้ย?\""
1003903-36 = "กระดิ่ง...เหรอคะ?"
1003903-37 = "เป็นวิธีที่ไม่เลวเลยนะคะ... ถ้าแขวนกระดิ่งที่ส่งเสียงกรุ๊งกริ๊งไว้บนตัวละก็ คนรอบข้างก็คงจะสังเกต#nเห็นฉันได้จากเสียงกระดิ่ง..."
1003903-38 = "ในกระเป๋าฉันมีกระดิ่งที่น่าจะใช้ได้อยู่อันนึงค่ะ..."
1003903-42 = "[ns] \"เดี๋ยวก่อน มิยุ กระดิ่งนั่นน่ะ...\""
1003903-44 = "คะ?"
1003903-45 = "นี่เป็นกระดิ่งที่ฉันร้อยติดปลอกคอแมวที่เคยเลี้ยงไว้เมื่อก่อนค่ะ มีอะไรเหรอคะ คุณครู?"
1003903-46 = "ปลอกคออันเก่ามันเก่ามากแล้ว ฉันเลยเปลี่ยนอันใหม่ให้และเก็บอันเก่าเอาไว้ค่ะ"
1003903-47 = "ถ้าใส่ปลอกคอที่มีกระดิ่งติดแบบนี้ ตอนเคลื่อนไหวก็จะไม่ลำบาก และคนรอบข้างก็จะสังเกตเห็นฉัน#nแน่นอนค่ะ!"
1003903-48 = "[s] \"คนอื่นคงมองเห็นแน่ๆ แต่ว่า...\""
1003903-49 = "ฮิฮิ ฉันตื่นเต้นที่คนอื่นจะมองเห็นฉันแล้วค่ะ..."
1003903-50 = "คุณครูคะ ออกไปทดสอบดูกันเถอะค่ะ!"
1003903-54 = "[ns] \"มิยุ รอเดี๋ยวก่อน!\""
1003903-58 = "เด็กคนนั้นทำอะไรน่ะ? ใส่ปลอกคอสัตว์เลี้ยงอยู่ด้วย"
1003903-59 = "คนที่อยู่ข้างๆ นั่น... คุณครูจากชาเล่ต์ไม่ใช่เหรอ?"
1003903-60 = "พอมานึกๆ ดูแล้ว เมื่อก่อนเคยได้ยินข่าวลือมาด้วยนะว่านักเรียนทุกคน ไม่ว่าจะตำแหน่งสูงแค่ไหน ก็ต้องไปเข้าเวรช่วยงานคุณครูที่ชาเล่ต์น่ะ..."
1003903-61 = "หรือว่า... คุณครูจะทำอะไรแปลกๆ กับนักเรียนตอนที่ไปเข้าเวร?"
1003903-62 = "เกินไปแล้ว... น่าสงสารพวกเด็กนักเรียนที่สุดเลย..."
1003903-63 = "คะ... คุณครู ดูสิคะ...! ทุกคนให้ความสนใจฉันใหญ่เลยค่ะ...!"
1003903-64 = "ไม่มีใครมองผ่านฉันไปเลย ทุกคนกำลังจ้องฉันใหญ่เลยค่ะ"
1003903-65 = "สงสัยกระดิ่งนี่จะช่วยทำให้คนอื่นๆ สังเกตเห็นฉันตามที่คุณครูบอกจริงๆ ด้วยค่ะ"
1003903-66 = "[s] \"ช่วยถอดปลอกคอนั่นออกได้มั้ย...\""
1003903-67 = "คะ...? ให้ถอดออกเหรอคะ?"
1003903-68 = "คนอื่นๆ สังเกตเห็นฉันแล้วแท้ๆ แต่จะให้ถอดออกแล้วกลับไปเป็นมนุษย์จืดจางเหมือนเมื่อก่อน#nอย่างนั้นเหรอคะ..."
1003903-69 = "ทำไมคุณครูถึงพูดอะไรใจร้ายแบบนี้..."
1003903-70 = "ได้ยินที่พูดเมื่อกี้รึเปล่า? อยู่ข้างนอกที่สาธารณะแบบนี้แท้ๆ แต่ยังสั่งให้นักเรียนถอดออกอีก..."
1003903-71 = "ดูสีหน้าของเด็กที่น่าสงสารคนนั้นสิ... น่าสงสารมากเลย"
1003903-72 = "ทำไมคนร้ายกาจแบบนั้นถึงมาเป็นคุณครูได้กันนะ?"
1003903-73 = "[s] \"ครูไหว้ละ ช่วยถอดมันออกทีเถอะ...!\""
1003903-75 = "(หลังจากนั้นคุณครูก็ขอร้อง และกำชับมิยุให้เลิกใส่ปลอกคออันนั้น...)"
1003903-76 = "(แต่ทว่าคนรอบข้างก็มองคุณครูด้วยสายตาแปลกๆ ไปอีกพักใหญ่...)"

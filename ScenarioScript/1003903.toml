1003903-20 = "[ns1] \"미, 미유?\"\n[ns2] \"어, 언제부터 와 있었던 거야?\""
1003903-21 = "5;미유ND;08;아까 전부터 와 있었는데…….\n#5;stiff"
1003903-22 = "5;미유ND;08;아까 전부터 와 있었는데…….\n#5;stiff"
1003903-23 = "5;미유ND;07;……역시 선생님도 제 존재를 알아차리지 못하게 되셨군요.\n#5;em;[속상함]"
1003903-24 = "5;미유ND;04;제 존재감은 계속 희미해져 가고 있어요……."
1003903-25 = "5;미유ND;08;사이좋은 친구들도, 점차 저를 알아차리지 못하게 되어버리고…….\n#5;em;…"
1003903-26 = "5;미유ND;07;학교에서도 조를 짤 때도 친구들이 뒤늦게 제 존재를 알아차려서, '아, 맞다. 미유도 있었지—' 같은 어색한 표정을 짓는 걸 지켜보고 있으면, 오히려 이쪽이 도망치고 싶어져서……."
1003903-27 = "5;미유ND;06;……결국 저는 아무에게도 기억되지 못하는 외톨이인 채로 쓸쓸히 죽어버릴 거예요.\n#5;em;[속상함]"
1003903-28 = "[s] \"그런 게 아니라 사실은…….\""
1003903-29 = "5;미유ND;02;……네? 제가 들어 오는 발소리를 듣지 못하셨다고요?\n#5;m3\n#5;em;[?]"
1003903-30 = "5;미유ND;01;아…… 그, 그건 아마도 제가 원래부터 살금살금 걷는 버릇이 있어서 그럴 거예요.\n#5;stiff"
1003903-31 = "5;미유ND;02;잠입 임무를 할 때는 좋지만, 평상시에도 버릇이 들어버려서……."
1003903-32 = "5;미유ND;04;……이제는 일부러 발소리를 내면서 움직이려고 해도 힘들어요.\n#5;em;[땀]"
1003903-33 = "5;미유ND;07;……그러고 보면 제 존재감이 희박한 이유도 이런 버릇 때문이 아닐까요."
1003903-34 = "5;미유ND;08;하지만 지금에 와서 걷는 버릇을 고치는 것도 어렵고…….\n#5;em;[속상함]"
1003903-35 = "[s] \"몸에 방울 같은 건 달아보는 게 어떨까?\""
1003903-36 = "5;미유ND;01;……방울, 이요?\n#5;em;[?]"
1003903-37 = "5;미유ND;03;……나쁘지 않은 방법이네요. 몸에 소리 나는 방울을 달아 둔다면 주변 사람들도 소리로 제 존재를 알아차릴 수 있을 테니까요."
1003903-38 = "5;미유ND;02;그러고 보니 가방 속에 쓸 만한 방울이 하나 있었는데…….\n#5;m5\n#5;em;…"
1003903-39 = "#st;[0,0];instant;1;"
1003903-40 = "#clearST"
1003903-41 = "5;미유ND;01\n#5;greeting\n#wait;1500"
1003903-42 = "[ns] \"잠깐, 미유. 그 방울은…….\""
1003903-43 = "#wait;1500"
1003903-44 = "5;미유ND;02;네?\n#5;em;[?]"
1003903-45 = "5;미유ND;01;이건 전에 돌보던 고양이에게 쓰던 방울 달린 목걸이인데요…… 무슨 문제라도 있나요?"
1003903-46 = "5;미유ND;01;전에 쓰던 것이 너무 낡아버려서 새 목걸이를 주고 남은 것을 마침 갖고 있었거든요."
1003903-47 = "5;미유ND;03;이렇게 방울이 달린 목걸이를 착용한다면, 움직이는 데 불편하지도 않고, 주변 사람들도 확실하게 제 존재를 알아차릴 거예요!\n#5;em;[음표]"
1003903-48 = "[s] \"분명 확실하게 알아차리겠지만…….\""
1003903-49 = "5;미유ND;03;후후. 다른 사람들이 제 존재를 알아차려 줄지 벌써 기대가 되네요…….\n#5;m3"

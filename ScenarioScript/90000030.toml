[translation]
90000030-1 = "第4話;蒐集情報(3)PMC挖掘區域"
90000030-2 = "千年自治區・外圍地區"
90000030-4 = "你好，老師。我正在等你。"
90000030-5 = "新的部室總算準備好了。"
90000030-6 = "[s] 「新部室？」"
90000030-7 = "嗯。你還記得之前作戰時使用的地方，被十字神名入侵了吧？"
90000030-8 = "除了位置已經暴露，差點遭到駭入之外，當時的設備也全都損壞，沒辦法再用了。"
90000030-9 = "所以陽葵部長下定決心，準備了新的地點。"
90000030-10 = "雖然部長說那裡是整個奇普托斯，面對十字神名最安全的地方……"
90000030-11 = "詳細情形還是直接聽部長說明比較好吧。"
90000030-15 = "因為是個對外保密的區域，接下來請跟緊我哦。"
90000030-16 = "[s] 「麻煩你了。」"
90000030-23 = "（跟在英美後面進入迷宮般的小巷、轉乘無數次電梯、通過無數個隱藏門之後……#n　總算抵達了那個地方）"
90000030-28 = "特異現象搜查部・部室"
90000030-30 = "[ns]「這裡是……」"
90000030-31 = "部長，我把老師帶來了。#n……部長？"
90000030-37 = "……部長？陽葵部長？"
90000030-38 = "莫非……！？"
90000030-49 = "[ns] 「陽葵……！？」"
90000030-50 = "部長……"
90000030-58 = "呀啊啊啊──！？"
90000030-62 = "怎，怎麼了？發生什麼事了！？#n咦，英美……！？"
90000030-63 = "……我把老師帶來了哦，部長。"
90000030-64 = "[s] 「……早安，陽葵。」"
90000030-65 = "啊，嗯……"
90000030-66 = "……您好，老師。恭候多時了。"
90000030-67 = "終於能向老師介紹了呢……我們「特異現象搜查部」的新部室。"
90000030-68 = "這裡被我所發明的特殊防火牆系統保護，是奇普托斯面對十字神名最安全的地方。"
90000030-69 = "目前為止只有我、英美和老師知道這個地點，是連存在本身都極度機密的空間。"
90000030-70 = "呵呵呵……感覺如何呢？簡直就像神祕邪教組織的據點對吧？#n順帶一提，剛才我並沒有在睡覺。"
90000030-71 = "部長，你嘴邊還有口水。"
90000030-72 = "……"
90000030-73 = "就算用那種表情看我也沒用啊……#n是不是因為把房間溫度調得這麼高才會想睡？"
90000030-74 = "室內舒服的溫度大約是12度左右，而且環境涼快一點的話應該也會比較清醒吧。"
90000030-80 = "不對，這數字顯然有問題吧？#n為了讓我在最佳狀態下工作，室溫必須是由「3」開頭的數字才對。"
90000030-85 = "3度？"
90000030-90 = "這裡對你來說難道是冰箱嗎？當然是二位數囉。"
90000030-95 = "[ns] 「那個……兩位……」"
90000030-99 = "[ns3] 「一邊狂開冷氣……」\n[ns4] 「一邊狂開暖氣……」"
90000030-100 = "快放棄吧部長。這樣很浪費電費的哦？"
90000030-101 = "快放棄吧部長。這樣很浪費電費的哦？"
90000030-102 = "英美才應該放棄吧。#n順帶一提，電費預計會向莉央申請，所以不用擔心。"
90000030-103 = "真頑固。那剩下的手段就只有……"
90000030-107 = "嗯？什麼？"
90000030-108 = "……不不不，你為什麼又得出了那個結論呢？#n這種時候難道不該像個文明人，好好坐下來用對話解決問題嗎？"
90000030-109 = "[s] 關掉冷氣和暖氣的電源"
90000030-115 = "[ns] 「我調整成折衷的溫度了，麻煩你們兩位稍微忍耐一下吧。」"
90000030-116 = "……好吧。#n雖然熱，不過也沒到無法忍受的程度。"
90000030-117 = "……沒辦法了。#n這種程度的寒冷，或許也有助於維持頭腦清醒吧。"
90000030-118 = "[s] 「……謝謝你們。」"
90000030-121 = "部長，下一次的作戰計畫是什麼呢？"
90000030-122 = "……我們的目標是找出十字神名的真面目。"
90000030-123 = "雖然為此蒐集了不少情報……結果卻反而被十字神名發現了我們的存在。"
90000030-124 = "儘管是因為一時大意，居然受到了這種恥辱……#n我身為千年最強駭客，以及美少女的名譽受到了巨大的傷害。"
90000030-125 = "（跟美少女沒關係吧……？）"
90000030-126 = "對方已經對我們有所察覺，而我們卻完全不清楚對方的身分……#n如今的狀況對我們並不樂觀。"
90000030-127 = "不先設法扭轉這個情況的話，這場戰鬥只會永遠被對方的節奏牽著走……"
90000030-128 = "因此，我打算對目標進行修正，將找出十字神名的「預言者」列為最優先的事項。"
90000030-129 = "預言者……我懂了。#n跟直接找出十字神名相比，這的確可能是捷徑呢。"
90000030-130 = "沒錯。而且如果將十字神名定義為「情報生命體」，#n那麼「預言者」這個概念就有顯得有些違和了。"
90000030-131 = "並非自身的「克隆」，也不是執行命令的「部下」──#n而是獨立做出判斷與行動的「追隨者」……甚至還用上了「預言者」這個詞。"
90000030-132 = "……雖然如此命名的原因，目前也還不得而知就是了。"
90000030-134 = "不過藉由對預言者進行調查，我們想必可以更了解那個身分不明的AI吧。"
90000030-135 = "目前為止觀測到的預言者一共有三名。"
90000030-136 = "「薇娜」、「赫賽德」……或許就連「霍德」也是。"
90000030-137 = "從這些名字與老師的證言來看，#n我推測它們與名為「生命之樹」的古代密儀有所關聯。"
90000030-138 = "生命之樹……？"
90000030-142 = "這就是「生命之樹」。#n是現今的奇普托斯幾乎無從得知、被人遺忘的密儀之一。"
90000030-143 = "幾乎無從得知……？#n那陽葵前輩為什麼知道呢？"
90000030-144 = "哎呀，「幾乎」無從得知，並不代表那是「絕對」不可能的呀。#n英美，你知道我的別名嗎？"
90000030-145 = "……漂浮在化糞池的一朵花？"
90000030-146 = "不不不，你只說對了一半。#n前半部分是莉央的別名才對。把別名隨便混在一起是不行的，英美。#n這是奇普托斯的常識，也是身為學生的本分。"
90000030-147 = "……有那種常識嗎？"
90000030-148 = "對於身為天才，擁有無所不知的「全知」學位的我而言，這種程度根本不算什麼。"
90000030-149 = "……嗯。"
90000030-150 = "這麼說來，我以前就很好奇了。#n千年真的有那個學位嗎？"
90000030-151 = "我一直都只在傳聞裡聽過，但不曉得實際上到底有沒有那個學位。#n無所不知……想想還真是誇張的名字呢。"
90000030-152 = "唔呵呵……這世上有很多營造形象的重要時刻唷，英美。"
90000030-153 = "……"
90000030-154 = "[s] 「那個……兩位，我們是不是該進入正題了？」"
90000030-155 = "啊，嗯……"
90000030-156 = "抱歉，老師。#n又被部長的節奏帶著走了。"
90000030-157 = "不不不，被帶走節奏的是我才對。"
90000030-158 = "那麼……"
90000030-159 = "我們言歸正傳吧。來，請看這邊。"
90000030-163 = "這個「生命之樹」之中，一共存在10個名為「質點」的屬性。#n而十字神名的預言者們，則被冠上了這些質點之名。"
90000030-164 = "「薇娜」、「赫賽德」、「霍德」……全都是出自質點的名字。"
90000030-165 = "所以我們不知道的預言者還有七個是嗎？#n居然這麼多啊……"
90000030-166 = "生命之樹似乎象徵著「通往神之天理的道路」。#n經由10個質點成為神……這和十字神名的主張是一致的。"
90000030-167 = "雖然這已經是令人不明所以的神祕學的領域……#n但既然我們已親眼確認其存在的事實，就無法對這個情報視而不見。"
90000030-168 = "「生命之樹」、「質點」、「通往神之天理的道路」……#n想得知它們所代表的意義，就必須掌握這10個「預言者」的情報。"
90000030-169 = "掌握情報……？#n該怎麼做呢？"
90000030-173 = "直接與它們進行接觸。"
90000030-176 = "嗯……我想也是。#n但是目前掌握的預言者只有兩個，而「霍德」甚至還只是推測而已。"
90000030-177 = "確實如此，不過……現在也只能從能做的事開始著手了。#n或許在過程中可以找到其他方法也說不定。"
90000030-178 = "[s] 「說的也是。那就趕緊開始吧。」"
90000030-179 = "嗯，我沒有異議。"
90000030-180 = "好的，那麼下一個任務就是找出「薇娜」和「赫賽德」，並確保它們的資料……"
90000030-184 = "「特異現象搜查部」的十字神名分析作戰，再次啟動。"
90000030-188 = "所以下一個目標又是阿拜多斯砂漠嗎，部長？"
90000030-189 = "之前在沙漠蒐集到的情報……都在為了阻止駭入而破壞電腦的時候消失了對吧？"
90000030-190 = "是的，不過那種程度要復原不成問題。"
90000030-191 = "與其說是這個原因……應該說有件事讓我有點在意。"
90000030-192 = "是什麼事？"
90000030-193 = "那就是凱薩PMC。"
90000030-194 = "我記得他們正在阿拜多斯砂漠試圖挖掘出某樣東西。#n雖然完全不清楚那究竟是什麼，也不明白這麼做的目的……"
90000030-195 = "然而在薇娜出現的地點做那種事情本身就相當可疑。"
90000030-196 = "或許他們會和十字神名有關聯。#n所以我想再對那附近進行一次搜索。"
90000030-197 = "嗯，聽起來確實挺有道理的。"
90000030-198 = "所以我們是要入侵凱薩的資料庫囉？#n部長，這麼做沒問題嗎？"
90000030-199 = "你忘記我是什麼人了嗎，英美？"
90000030-200 = "我可是「貝里塔斯」的前部長，也是千年最優秀的病弱美少女陽葵。#n要不留痕跡地出入私人企業的資料庫，對我而言根本是易如反掌。"
90000030-201 = "……病弱美少女的部分跟這件事有關係嗎？"
90000030-202 = "對方也不是凱薩總公司而是PMC，安全等級只會更低……"
90000030-203 = "即便失敗也不會有損失，我認為非常值得一試。"
90000030-204 = "嗯……好吧。既然部長都這麼說了。"
90000030-208 = "那麼再次出發吧。#n目標是凱薩PMC所擁有的「情報」。"
90000030-209 = "[s] 「好，出發。」"

90000030-121 = "3;에이미;02;부장. 그러면 우리의 다음 작전 계획은 뭐야?\n#3;em;[?]\n#3;a"
90000030-122 = "5;히마리;99;……우리의 목표는 데카그라마톤이라는 존재의 정체를 밝히는 것이었죠.\n#5;al\n#3;m1"
90000030-123 = "5;히마리;01;그것을 위해 정보 수집을 진행하다가…… 오히려 데카그라마톤에게 우리들의 존재가 발각되는 사태가 벌어졌습니다."
90000030-124 = "5;히마리;06;아무리 방심하고 있었다지만 이런 굴욕을 당하다니……. 밀레니엄의 최강의 해커이자 미소녀인 제 명예에 흠집이 나버렸네요.\n#5;em;[속상함]"
90000030-125 = "3;에이미;04;(미소녀는 관계 없지 않아?)"
90000030-126 = "5;히마리;07;저쪽은 우리를 인지하고 있지만, 우리는 저쪽의 정체를 전혀 모른다……. 지금 우리에게 유리한 상황은 아닌 거죠."
90000030-127 = "5;히마리;08;지금 이 상황을 뒤집지 않는 이상, 이 싸움은 계속 저쪽의 흐름에 끌려가게 될 거예요."
90000030-128 = "5;히마리;03;그러니 지금부터는 목표를 수정해서, 데카그라마톤의 <예언자>를 찾아내는 것을 최우선 목표로 삼겠습니다."
90000030-129 = "3;에이미;00;예언자…… 말이지. 이해했어. 직접 찾는 것보다는 그쪽이 확실히 지름길이겠네."
90000030-130 = "5;히마리;99;네. 데카그라마톤을 정보생명체라고 정의한다면 확실히 예언자라는 개념은 이상하죠. \n#5;m3\n#3;dl"
90000030-131 = "5;히마리;03;자신의 <클론>도 아니고, 명령을 수행하는 <부하>도 아닌, 독립적으로 판단하고 행동하는 <추종자>……. 그중에서도 <예언자>라는 표현을 쓰다니."
90000030-132 = "5;히마리;09;……뭐, 그렇게 명명한 이유는 아직 모르겠지만.\n#5;em;…"
90000030-133 = "#all;hide"
90000030-134 = "3;히마리;07;이 예언자의 정보를 수집하고 분석하면 우리는 조금 더 저 정체불명의 AI에 대해 알 수 있게 될 거예요."
90000030-135 = "3;히마리;01;지금까지 확인된 예언자는 모두 셋."
90000030-136 = "3;히마리;03;<비나>, <헤세드>, 그리고 아마도…… <호드>까지."
90000030-137 = "3;히마리;07;이들의 이름, 그리고 선생님이 증언한 것을 기반으로 추측해보건대, 이들은 모두 <생명의 나무>라고 불리는 고대의 비의와 관계가 있는 것 같아요."

90000030-142 = "#na;히마리;이것이 바로 <생명의 나무>입니다. 현재 키보토스에서는 알아내는 것이 거의 불가능한, 잊혀진 비의 중 하나예요."
90000030-143 = "#na;에이미;불가능……? 그럼 히마리 선배는 어떻게 알고 있는 거야?"
90000030-144 = "#na;히마리;어머? 거의 불가능한 것이지, 절대 불가능한 것은 아니니까요. 에이미? 제 별칭이 뭔지 아세요?"
90000030-145 = "#na;에이미;어. ……정화조에 둥둥 떠 있는 한 떨기 꽃……?"
90000030-146 = "3;히마리;10;아뇨아뇨. 절반만 맞았어요. 게다가 앞에 건 리오의 별명이잖아요. 이상하게 섞으면 안되죠. 에이미. 키보토스의 상식이잖아요. 학생의 본분이잖아요.\n#3;em;[반응]\n#3;a"
90000030-147 = "1;에이미;04;……. 상식이었나.\n#1;ar\n#3;m5"
90000030-148 = "3;히마리;07;천재. 뭐든지 다 알고 있는 <전지> 학위의 소유자라고 불린다고요. 저에게 이정도야 식은 죽 먹기예요."
90000030-149 = "1;에이미;04;……응."
90000030-150 = "1;에이미;02;그런데 전부터 궁금했는데, 그런 학위가 밀레니엄에 진짜 있어? \n#1;em;[?]"
90000030-151 = "1;에이미;01;소문은 들었지만 진짜 그런 학위가 있다는 건 들어보질 못했는데. 무엇이든지 안다니, 너무 굉장한 이름이잖아."
90000030-152 = "3;히마리;12;후후후……. 이 세상에선 때로 이미지 메이킹을 위한 포퓰리즘이 필요한 상황도 있는 법이에요, 에이미.\n#3;em;[반짝]"
90000030-153 = "1;에이미;04;……."
90000030-154 = "[s] \"어…… 저기. 여러분. 슬슬 다시 본론으로 돌아갔으면 하는데.\""
90000030-155 = "3;히마리;02;아, 네……. \n#3;em;[땀]"
90000030-156 = "1;에이미;02;미안. 선생님. 또 부장에게 휘말려버렸어."
90000030-157 = "3;히마리;11;아뇨아뇨. 휘말린 건 제쪽이라고요.\n#3;em;[반응]\n#3;m4"
90000030-158 = "3;히마리;99;……아무튼. \n#3;m3\n#1;dl"
90000030-159 = "3;히마리;01;다시 본론으로 넘어갈게요. 자, 이걸 보시면……."

90000030-68 = "3;히마리;99;특별히 제가 발명한 특수 방화벽 시스템으로 철저하게 보호되고 있는…… 말하자면 키보토스에서 데카그라마톤으로부터 가장 안전한 장소."
90000030-69 = "3;히마리;08;지금 시점에서는 저와 에이미, 그리고 선생님만이 존재를 알고 있는, 존재 자체가 극비인 공간이죠."
90000030-70 = "3;히마리;03;후후후……. 어떠신가요? 마치 비밀 컬트 집단의 아지트 같은 느낌이지 않나요? 참고로 자고 있었던 건 아니에요.\n#3;em;[반짝]"

[translation]
10037090-1 = "Episode 9;After You Race Up the Mountain"
10037090-4 = "In the name of Shanhaijing and its traditions, I denounce Ryuuge Kisaki, president of Genryumon!"
10037090-13 = "...!"
10037090-23 = "H-huh?! Why us...?!"
10037090-24 = "Cherino. Get behind us...!"
10037090-25 = "Y-Yeah! Look, we're just visitors! What are you trying to do?"
10037090-31 = "...I've been surrounded quite effectively, Kaguya. What will you do now?"
10037090-36 = "Madam President?!"
10037090-38 = "Wait, Genryumon! And ask yourselves!"
10037090-39 = "What you're trying to protect—is it Madam Kisaki or Shanhaijing?!"
10037090-41 = "What are you trying to say, President Kaguya...?"
10037090-43 = "If you all have eyes and ears, then you should know! Genryumon are first and foremost an organization that protects the traditions and values of Shanhaijing!"
10037090-44 = "But is Madam Kisaki, the head of Genryumon, truly someone who protects the traditions and values of Shanhaijing?"
10037090-45 = "She may have been in the past! Back then, Madam Kisaki was someone deserving of everyone's respect and loyalty!"
10037090-46 = "But how is she now? Are the Madam Kisaki of the past and that of the present the same?"
10037090-47 = "I don't believe so. Look! Look at the change Madam Kisaki has brought to Shanhaijing!"
10037090-52 = "Huh? U-us...?!"
10037090-54 = "I agree... Personally inviting the students of Red Winter to Shanhaijing was..."
10037090-55 = "But it's the president..."
10037090-56 = "That's true. But if the president of Genryumon doesn't protect Shanhaijing...?"
10037090-58 = "I knew it. Genryumon aren't being proactive."
10037090-59 = "I knew the chances of them adamantly supporting the president's removal were slim, but..."
10037090-61 = "No, this is enough. "
10037090-62 = "Above all, our goal is to steer the president, who's going down the wrong road, back onto the right path."
10037090-63 = "We'll give her our earnest advice and opinions, and guide her back through our determination."
10037090-64 = "Don't forget! Our people do not plot treason, but rather we demonstrate unflagging loyalty."
10037090-65 = "Madam! You must escape! This place is dangerous!"
10037090-67 = "Thank you for your concern, Saya. "
10037090-68 = "However...where could I possibly go from here? Fufu."
10037090-69 = "The head of an organization is like an offering to the heavens."
10037090-75 = "...\"What you're trying to protect—is it Madam Kisaki or Shanhaijing?!\" Huh..."
10037090-76 = "Heh. I've known what to do from the very beginning. Anyone who wants to harm the Madam President..."
10037090-87 = "Will do it over my dead body!"
10037090-92 = "Mina...? You should escape too!"
10037090-93 = "Ha... I would never be so shameful as to abandon the president."
10037090-97 = "Even if I must fight the entirety of Shanhaijing, I will protect the president."
10037090-102 = "Hm, I like your style, Executive Officer Mina."
10037090-108 = "What was that?"
10037090-113 = "I had no intention of meddling in the problems of other academies, but..."
10037090-114 = "I can't let Executive Officer Mina hog all the glory!"
10037090-115 = "...Is that what you meant, Chairman Marina?"
10037090-116 = "I owe the president a lot."
10037090-117 = "A pancake served to a guest must be returned with butter soup!"

[translation]
10037090-1 = "ตอนที่ 9;ปีนเขาในรวดเดียว"
10037090-4 = "ในนามของซานไห่จิงและประเพณีของซานไห่จิง เราขอประณามประมุขคนปัจจุบันของมังกรดำ ริวเกะ คิซากิ!"
10037090-13 = "...!"
10037090-23 = "เอะ... เอ๋?! ทำไมถึง...?!"
10037090-24 = "เชริโน่จัง พวกเราถอยออกมาก่อนเถอะ...!"
10037090-25 = "นะ... นั่นสิ! นี่! พวกเราเป็นแขกของที่นี่นะ! คิดจะทำอะไรของพวกเธอน่ะ!"
10037090-31 = "ล้อมเราไว้อย่างสมบูรณ์แบบเลยสินะ... คางุยะ คิดจะทำอะไรต่อไปเล่า?"
10037090-36 = "ท่านประมุข?!"
10037090-38 = "รอก่อนเถอะ มังกรดำ! อีกอย่าง พวกเธอถามตัวเองกันเถอะ!"
10037090-39 = "ถามตัวเองว่าสิ่งที่พวกเธอพยายามปกป้อง คือประมุขคิซากิหรือซานไห่จิงกันแน่!"
10037090-41 = "หมายความว่าอะไรกันแน่ หัวหน้าคางุยะ...?"
10037090-43 = "ตราบใดที่พวกเธอมีหูมีตาเดี๋ยวก็รู้! มังกรดำเป็นองค์กรที่ปกป้องประเพณีและคุณค่าของซานไห่จิงมา#nตั้งแต่ไหนแต่ไร"
10037090-44 = "แต่คนเป็นหัวหน้ามังกรดำอย่างประมุขคิซากิคือคนที่คิดจะปกป้องประเพณีและคุณค่าของซานไห่จิง#nหรือเปล่าล่ะ?"
10037090-45 = "ในอดีตก็อาจจะเป็นเช่นนั้น! ในตอนนั้นประมุขคิซากิเป็นคนที่สมควรได้รับความเคารพและความภักดี#nจากทุกคน!"
10037090-46 = "แต่แล้วตอนนี้ล่ะ? ประมุขคิซากิในอดีตกับประมุขคิซากิในปัจจุบันคือคนเดียวกันหรือเปล่า?"
10037090-47 = "ฉันไม่คิดแบบนั้นหรอก ดูสิ! ดู 'การเปลี่ยนแปลง' ที่เกิดขึ้นในซานไห่จิงจากน้ำมือของประมุขคิซากิ!"
10037090-52 = "เอ๋? มะ... หมายถึงพวกเรางั้นเหรอ...?!"
10037090-54 = "ที่เชิญนักเรียนจากเรดวินเทอร์... มาที่ซานไห่จิงด้วยตัวเองน่ะ..."
10037090-55 = "แต่ท่านเป็นท่านประมุขนะ...?"
10037090-56 = "แต่ถ้าประมุขแห่งมังกรดำไม่คิดจะปกป้องซานไห่จิงละก็...?"
10037090-58 = "สมาชิกมังกรดำไม่เคลื่อนไหวอย่างกระตือรือร้นอย่างที่คิดเลยนะคะ"
10037090-59 = "พวกฉันอุตส่าห์คาดหวัง เพราะคิดว่าจะเห็นด้วยกับการประณามประมุขเสียอีก..."
10037090-61 = "ไม่หรอก แค่นี้ก็เพียงพอแล้วละ "
10037090-62 = "เหนือสิ่งอื่นใด จุดประสงค์ของเราก็คือการทำให้ท่านประมุขที่หลงทางได้กลับเข้าสู่เส้นทางที่ถูกต้อง"
10037090-63 = "เพราะพวกเรามีเจตจำนงดี เราถึงต้องใช้วิธีนี้ในการแสดงคำตักเตือนจากใจจริง..."
10037090-64 = "จงอย่าลืมข้อเท็จจริงว่าพวกเราไม่ใช่กบฏที่คิดล้มล้างอำนาจการปกครอง หากแต่เป็นคนที่จะแสดงความภักดี"
10037090-65 = "ประมุข! ต้องออกไปจากตรงนี้แล้วละ! ที่นี่อันตราย!"
10037090-67 = "ขอบใจที่เป็นห่วงเรานะ ซายะ "
10037090-68 = "ทว่า... หากออกไปจากตรงนี้ เราจะไปที่ไหนได้เล่า? ฮุฮุ"
10037090-69 = "เดิมทีแล้วคนเป็นหัวหน้าก็ไม่ต่างจากเครื่องสังเวยที่ถวายให้แก่สรวงสรรค์หรอก"
10037090-75 = "ให้ถามตัวเองว่าสิ่งที่พยายามปกป้องคือประมุขคิซากิหรือซานไห่จิง... อย่างนั้นเหรอ..."
10037090-76 = "ฮุฮุ คำตอบของฉันถูกกำหนดไว้ตั้งแต่ต้นแล้วละ ใครหน้าไหนที่คิดจะเข้ามาใกล้ท่านประมุข..."
10037090-87 = "ก็ต้องข้ามศพฉันไปก่อน!"
10037090-92 = "มินะ...? เธอเองก็ควรต้องหลบหนีไปก่อนนะ..."
10037090-93 = "ฮู่ว... จะให้ทอดทิ้งท่านประมุขแล้วหนีไปอย่างนั้นเหรอคะ เป็นคำแนะนำที่เชยมากเลยละค่ะ"
10037090-97 = "ต่อให้ฉันต้องเป็นศัตรูกับซานไห่จิง ฉันก็จะปกป้องท่านประมุขค่ะ"
10037090-102 = "อืม ใช้คำพูดได้ดีเลยนะ หัวหน้าคณะกรรมการมินะ"
10037090-108 = "อะไรน่ะ...?"
10037090-113 = "ฉันไม่มีเจตนาที่จะแทรกแซงสถานการณ์ของโรงเรียนอื่นหรอกนะ..."
10037090-114 = "แต่จะให้หัวหน้าคณะกรรมการมินะได้บทเท่ๆ คนเดียวไปได้ยังไงล่ะ!"
10037090-115 = "นั่นเป็นเหตุผลที่ดีหรือเปล่านะ หัวหน้าคณะฯ มารินะ...?"
10037090-116 = "ฉันเป็นหนี้บุญคุณท่านประมุขอยู่หลายเรื่องเลยน่ะ"
10037090-117 = "ถ้าได้รับแพนเค้กมา ก็ย่อมต้องตอบแทนพร้อมกับซุปครีมสิ!"

10037090-35 = "4;현룡문 부원 B;04\n2;현룡문 부원 A;04\n#2;em;[?!]\n#4;em;[?!]\n#2;shake\n#4;shake\n#2;h\n#4;h\n#wait;800"
10037090-36 = "2;현룡문 부원 A;04;문주님?!\n#2;stiff"
10037090-37 = "#all;hide"
10037090-38 = "3;카구야;16;기다려라, 현룡문! 그리고 스스로에게 물어보아라!\n#3;em;[반응]\n#3;a"
10037090-39 = "3;카구야;05;너희들이 지키려는 것이, 키사키 문주인가, 산해경인가!"
10037090-40 = "#all;hide"
10037090-41 = "2;현룡문 부원 A;02\n4;현룡문 부원 B;02;무슨 말을 하고 싶은 것인가. 카구야 부장……?\n#4;stiff"
10037090-42 = "#all;hide"
10037090-43 = "3;카구야;13;너희들도 눈이 있고 귀가 있다면 알 수 있을 터! 현룡문은 본디 산해경의 전통과 가치를 수호하는 조직이다!\n#3;em;[!]"
10037090-44 = "3;카구야;05;그러나 그 현룡문의 수장인 키사키 문주가, 과연 산해경의 전통과 가치를 수호하는 자인가?"
10037090-45 = "3;카구야;17;과거에는 분명 그러했을지도 모른다! 그때의 키사키 문주는 모두의 존경과 충성을 받아 마땅한 자였다!"
10037090-46 = "3;카구야;13;그러나 지금은 어떠한가? 과거의 키사키 문주와, 지금의 키사키 문주가 과연 동일인인가?\n#3;stiff"
10037090-47 = "3;카구야;16;나는 그렇게 생각하지 않는다. 보아라! 키사키 문주가, 지금의 산해경에 불러일으킨 '변화'를!\n#3;em;[!]\n#3;closeup"

[translation]
10037090-1 = "第9話;一鼓作氣，登上山峰"
10037090-4 = "──我以山海經及其傳統之名，論劾現在的玄龍門門主龍華妃姬！"
10037090-13 = "……！"
10037090-23 = "咦，咦咦！？為什麼連咱們也……！？"
10037090-24 = "潔莉諾醬，我們先後退吧……！"
10037090-25 = "是，是啊！#n喂！我們可是訪問團耶！你們想做什麼！"
10037090-31 = "……竟然將妾身團團包圍了啊，輝夜。#n然後呢，汝現在打算怎麼做？"
10037090-36 = "門主大人！？"
10037090-38 = "慢著，玄龍門！#n諸位先捫心自問吧！"
10037090-39 = "自己應當守護的究竟是妃姬門主，還是山海經！"
10037090-41 = "你想說什麼，輝夜部長……？"
10037090-43 = "你們自己也有眼睛、有耳朵才對！#n你們應該清楚玄龍門的職責，是守護山海經的傳統和理念！"
10037090-44 = "但是現在的玄龍門之首──妃姬門主真的有意守護山海經的傳統和理念嗎？"
10037090-45 = "以前的他確實恪守著本分！因此當時的門主值得所有人的尊敬和效忠！"
10037090-46 = "但是現在又如何呢？#n現在的他依舊是過去的那個門主嗎？"
10037090-47 = "我並不這麼認為。#n看吧！這就是妃姬門主為現在的山海經帶來的「變化」！"
10037090-52 = "咦？是，是指咱們嗎……！？"
10037090-54 = "的確……邀請赤冬的學生們來到山海經的人……"
10037090-55 = "可是他再怎麼說都是門主大人啊……？"
10037090-56 = "即便如此，如果玄龍門的門主無意守護山海經的話呢……？"
10037090-58 = "果然跟我們想的一樣，玄龍門的成員們沒有那麼好煽動。"
10037090-59 = "雖然我也曾暗自期盼他們會積極參與對門主的圍剿，但是現在看來……"
10037090-61 = "不，這樣就夠了。"
10037090-62 = "畢竟我們最大的目標，是將走上歪路的門主導回正途。"
10037090-63 = "所以才會選擇用這麼極端的方法，將信念……化為逆耳的忠言。"
10037090-64 = "這點可別忘了。#n我們並非試圖謀反的逆臣，而是坦露赤誠的忠臣。"
10037090-65 = "門主！請趕快離開吧！這裡很危險！"
10037090-67 = "謝謝汝為妾身著想，沙耶。"
10037090-68 = "但是……即便離開了這裡，妾身又能到什麼地方去呢？"
10037090-69 = "組織之首，本就如獻給上天的祭品一般。"
10037090-75 = "應當守護的究竟是門主還是山海經啊……"
10037090-76 = "哼，我的答案自始至終都不曾改變。#n你們想接近門主大人的話……"
10037090-87 = "就先想辦法踏過我的屍體吧！"
10037090-92 = "美奈……？#n汝應當趕緊離開才是……"
10037090-93 = "呵……要我丟下門主大人自己逃跑，這實在太荒謬了。"
10037090-97 = "即便要與整個山海經為敵，我也會誓死守護門主大人。"
10037090-102 = "嗯，你的表情挺不賴的嘛，美奈執行部長。"
10037090-108 = "什麼……？"
10037090-113 = "雖然我並不打算干涉其他學園的內政……"
10037090-114 = "但這麼帥氣的角色，我怎麼能讓美奈執行部長一個人搶走呢！"
10037090-115 = "……這樣的理由就足夠了嗎，瑪麗娜委員長？"
10037090-116 = "我們先前也受了門主大人不少照顧。"
10037090-117 = "既然被招待了鬆餅──我們就該將這份人情，連同奶油濃湯一併報答才對！"

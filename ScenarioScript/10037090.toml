10037090-54 = "3;현룡문 부원 C;02;확실히…… 붉은겨울의 학생들을 산해경에 직접 초대하신 것은…….\n#3;stiff\n#3;a"
10037090-55 = "5;현룡문 부원 D;04;하지만 문주님인데……?\n#5;em;[땀]\n#5;al\n#3;m1"
10037090-56 = "3;현룡문 부원 C;04;그렇지만 현룡문의 문주가 산해경을 지키려 하지 않는다면……?"
10037090-57 = "#all;hide"
10037090-58 = "4;경극부원 정정 B;00\n2;경극부원 소생 A;00;역시, 생각만큼 현룡문 부원들이 적극적으로 움직여 주지는 않는군요.\n#2;em;…\n#2;a\n#4;a\n#fontsize;50"
10037090-59 = "4;경극부원 정정 B;00;만에 하나 문주의 논핵에 적극적으로 나서 주지 않을까, 하는 기대를 해 보기도 했습니다만…….\n#fontsize;50"
10037090-60 = "#all;hide"
10037090-61 = "3;카구야;05;아니. 이 정도면 충분하다. \n#3;em;[반응]"
10037090-62 = "3;카구야;11;무엇보다 우리의 목적은 길을 엇나가고 계신 문주님을 올바른 길로 되돌리는 것이고."
10037090-63 = "3;카구야;12;이런 방법을 사용하면서까지 우리의 의지로…… 충언과 고언을 전해드리는 것이다."
10037090-64 = "3;카구야;16;그 사실을 잊지 않도록 해라. 우리는 반역을 꾀하는 자들이 아니라, 충심을 보이려는 자들이라는 것을.\n#3;stiff"
10037090-65 = "5;사야;07;문주! 몸을 피해야 하는 것이다! 이곳은 위험한 것이다!\n#5;hophop\n#5;al\n#3;m1"

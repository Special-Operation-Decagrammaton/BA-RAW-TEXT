[translation]
80000028-1 = "Chocolate-Flavored Elixir"
80000028-2 = "Saya's Lab"
80000028-3 = "I came to Saya's lab like she requested."
80000028-4 = "Welcome, Sensei!"
80000028-5 = "I've asked you here today to try out my latest concoction."
80000028-6 = "Today, I have...a chocolate immortality elixir!"
80000028-7 = "They were having a sale on this stuff, so I thought, why not try to make an elixir of it?"
80000028-8 = "[s] Run away."
80000028-9 = "S-Sensei?! Where are you going?!"
80000028-10 = "I need you to help support the advancement of alchemy!"
80000028-11 = "[s] \"How is chocolate supposed to make someone immortal?\""
80000028-12 = "Easy! Chocolate is—no pun intended—chock-full of antioxidants!"
80000028-13 = "I figured I could extract the antioxidants, create a concentrate,#nand mix them with other ingredients!"
80000028-18 = "And thus, create the perfect elixir to combat aging!"
80000028-19 = "So Sensei, don't worry about a thing and drink up!#nIt's yummy and chocolate-flavored!"
80000028-20 = "[s] Drink Saya's elixir."
80000028-26 = "How is it? Do you feel any younger?"
80000028-27 = "[s] \"Not really...\""
80000028-28 = "That's weird... Even if you're not immortal, you should at least have a golden sheen or be experiencing some hair growth."
80000028-29 = "[s] \"What did you make me drink?!\""
80000028-30 = "Let me analyze the chemical formula with my analysis kit..."
80000028-31 = "Hmm... I see. I mixed all kinds of ingredients, but somehow it's still just ordinary chocolate!"
80000028-32 = "I suppose all I did was make chocolate with several additives."
80000028-37 = "Here, Sensei. Take this failed product."
80000028-38 = "I don't like chocolate much, and I have no use for it."
80000028-39 = "B-Besides if I give it to someone else, they might get the wrong idea."
80000028-40 = "Oh, don't pretend like you don't know what day it is."
80000028-41 = "..."
80000028-42 = "Maybe you're experiencing serious side effects. Should I be worried?"

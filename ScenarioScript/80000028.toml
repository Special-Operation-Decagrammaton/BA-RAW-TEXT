[translation]
80000028-1 = "#title;초콜릿 맛 비약"
80000028-2 = "#place;사야의 연구실"
80000028-3 = "#na;(사야의 호출을 받고 사야의 연구실을 찾았다.)"
80000028-4 = "3;사야;03;나님의 연구실에 어서 오는 것이다, 선생!\n#3;em;[반짝]\n#3;hophop\n#3;a"
80000028-5 = "3;사야;01;오늘은 선생에게 시험해보고 싶은 약이 있어서 특별히 부른 것이다."
80000028-6 = "3;사야;02;오늘 준비한 약은…… 초콜릿으로 만든 불로불사의 영약이야!\n#3;em;[!]\n#3;closeup"
80000028-7 = "3;사야;03;밖에 나가보니 초콜릿을 염가에 잔뜩 팔고 있기에, 특별히 오늘은 초콜릿으로 영약을 만들어 본 것이다.\n#3;greeting\n#3;closeup"
80000028-8 = "[s] 도망친다."
80000028-9 = "3;사야;07;도망치지 마, 선생!\n#3;em;[?!]\n#3;stiff"
80000028-10 = "3;사야;05;이것도 다 연단술의 발전을 위해 필요한 일이라고!\n#3;hophop"
80000028-11 = "[s] \"초콜릿으로 어떻게 불로불사의 약을 만든 건데?\""
80000028-12 = "3;사야;01;그야 초콜릿에는 항산화 성분이 잔뜩 포함되어 있으니까.\n#3;em;[반응]"
80000028-13 = "3;사야;02;이 성분을 잔뜩 뽑아내서 농축하고, 다른 비약의 재료와 섞으면 몸의 나이를 되돌릴 수 있는 것이다!"
80000028-14 = "#st;[0,0];instant;1;"
80000028-15 = "#clearST"
80000028-16 = "3;사야;02\n#3;m5\n#wait;1000"
80000028-17 = "3;사야;02\n#3;greeting\n#wait;1500"
80000028-18 = "3;사야;99;그렇게 준비한 게 바로 이 약이란 말씀.\n#3;em;[반짝]"
80000028-19 = "3;사야;03;자, 선생. 걱정하지 말고 쭉— 마시는 것이다. 베이스는 초콜릿이니까 맛도 그리 나쁘지 않을 것이다.\n#3;m3"
80000028-20 = "[s] 사야가 건넨 약을 마신다."
80000028-21 = "#st;[0,0];instant;1;"
80000028-22 = "#clearST"
80000028-23 = "#wait;1000"
80000028-24 = "#wait;1000"
80000028-25 = "#wait;1000"
80000028-26 = "3;사야;07;어때, 효과가 있어? 젊음이 느껴지는 것이냐?\n#3;em;[?]\n#3;hophop"
80000028-27 = "[s] \"잘 모르겠는데…….\""
80000028-28 = "3;사야;04;그럴 리가 없는데…… 최소한 젊어지지 않더라도 몸이 황금색으로 빛나거나, 털이 돋아나야 정상인데…….\n#3;em;[땀]\n#3;stiff"
80000028-29 = "[s] \"너는 나한테 그런 걸 먹인 거야?!\""
80000028-30 = "3;사야;05;우선 간이 분석 키트로 화학식을 분석해보면…….\n#3;em;[...]"
80000028-31 = "3;사야;99;으음…… 그렇군. 그렇게 많은 재료를 섞었는데, 결과물의 성분은 어째서인지 평범한 시판 초콜릿에 가까워진 것이다.\n#3;greeting"
80000028-32 = "3;사야;07;결국 내가 만든 건 재료만 잔뜩 들어간 초콜릿인 건가…….\n#3;em;[속상함]\n#3;stiff"
80000028-33 = "#st;[0,0];instant;1;"
80000028-34 = "#clearST"
80000028-35 = "3;사야;07\n#3;d\n#wait;1000"
80000028-36 = "#wait;2000"
80000028-37 = "1;사야;02;자, 선생. 받는 것이다. 이번에 쓰고 남은 실패작이다.\n#1;em;[반응]\n#1;a"
80000028-38 = "1;사야;03;어차피 이 약은 다 초콜릿이 되어 버렸으니 다른 곳에 쓰기도 어려울 테고. 애초에 나는 초콜릿 같은 건 좋아하지도 않으니까.\n#1;hophop\n#1;m3"
80000028-39 = "1;사야;04;게다가 오늘 같은 날 다른 사람에게 초콜릿을 떠넘겨 봤자 이상한 오해를 살 것 같고…….\n#fontsize;55\n#1;stiff"
80000028-40 = "1;사야;07;오, 오늘이 무슨 날이냐고……? 선생, 정말로 몰라서 묻는 것이냐?\n#1;em;[?!]"
80000028-41 = "1;사야;05;…….\n#1;em;[...]"
80000028-42 = "1;사야;05;역시 심각한 부작용이 남아있을지도. 검사를 해봐야 하나?\n#1;closeup"
80000028-43 = "#wait;1000"

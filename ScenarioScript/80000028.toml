[translation]
80000028-1 = "巧克力口味的秘藥"
80000028-2 = "沙耶的研究室"
80000028-3 = "（收到沙耶的聯絡後，來到了沙耶的研究室）"
80000028-4 = "歡迎來到我的研究室，老師！"
80000028-5 = "今天請老師來是有個藥想請老師試試。"
80000028-6 = "那就是……用巧克力製作的長生不老靈藥！"
80000028-7 = "外面滿街都是便宜賣的巧克力，所以就試著用巧克力來製作靈藥了。"
80000028-8 = "[s] 逃跑"
80000028-9 = "等一下，為什麼要逃跑啊老師！"
80000028-10 = "這一切都是煉丹術的發展必要的事呀！"
80000028-11 = "[s]「巧克力要怎麼做成長生不老藥……？」"
80000028-12 = "巧克力富含抗氧化的成分。"
80000028-13 = "老師不覺得只要萃取這種成分加以濃縮，再混合其他材料就能讓身體回春嗎？"
80000028-18 = "於是完成的就是這個藥。"
80000028-19 = "來吧，老師。別擔心，一口乾掉吧。畢竟用上了巧克力，不會難喝到哪裡去的。"
80000028-20 = "[s]做好心理準備後喝下沙耶給的藥"
80000028-26 = "效果怎麼樣？回春了嗎？"
80000028-27 = "[s]「我也不太清楚……」"
80000028-28 = "是嗎……？唔嗯，就算沒有變年輕，#n應該也會有全身發出金光，或是冒出毛髮的效果才對啊……"
80000028-29 = "[s]「都知道有那種副作用還給我喝啊……」"
80000028-30 = "哎呀哎呀，總之先分析一下成分吧……"
80000028-31 = "唔嗯，原來如此啊……明明加入了這麼多種材料，#n結果成品的成分居然幾乎就是普通的巧克力……是被中和了嗎？"
80000028-32 = "我最後做出來的只是普通的巧克力啊……"
80000028-37 = "這也沒辦法。雖然是失敗品有點抱歉，但這些就給老師吧。"
80000028-38 = "反正只是巧克力而已，況且我本來就沒那麼喜歡巧克力。"
80000028-39 = "如果在今天正常地送給老師，感覺又有點奇怪……"
80000028-40 = "咦，今天……？老師，你這個問題是認真的嗎？"
80000028-41 = "……"
80000028-42 = "看來藥的副作用可能有點嚴重。要不要留下來檢查一下？"

[translation]
80000028-1 = "ยารสช็อกโกแลต"
80000028-2 = "ห้องทดลองของซายะ"
80000028-3 = "(คุณครูได้รับข้อความจากซายะเลยมาที่ห้องทดลองของเธอ)"
80000028-4 = "ยินดีต้อนรับสู่ห้องทดลองของ 'ท่านซายะ' นะคุณครู!"
80000028-5 = "วันนี้ฉันมียาที่อยากให้คุณครูทดลอง ก็เลยเรียกมาเป็นกรณีพิเศษน่ะ"
80000028-6 = "ยาที่ฉันเตรียมเอาไว้วันนี้... ยาอายุวัฒนะที่ทำมาจากช็อกโกแลตไงล่ะ!"
80000028-7 = "ตอนออกไปข้างนอก ฉันเห็นว่ามีช็อกโกแลตวางขายราคาถูกอยู่เต็มไปหมด วันนี้เลยคิดจะทำยา#nสูตรพิเศษที่ทำจากช็อกโกแลตน่ะ"
80000028-8 = "[s] วิ่งหนี"
80000028-9 = "อย่าหนีนะ คุณครู!"
80000028-10 = "นี่เป็นสิ่งจำเป็นต่อความก้าวหน้าของงานวิจัยนะ!"
80000028-11 = "[s] \"ทำยาอายุวัฒนะจากช็อกโกแลตได้ยังไงน่ะ?\""
80000028-12 = "เพราะในช็อกโกแลตมันมีสารต้านอนุมูลอิสระอยู่น่ะ"
80000028-13 = "ถ้าสกัดสารนี้ออกมาทำให้เข้มข้น แล้วเอาไปผสมกับวัตถุดิบยาอื่นๆ ก็จะช่วยย้อนวัยของร่ายกาย#nได้ยังไงล่ะ!"
80000028-18 = "แล้วมันก็คือยาตัวนี้นั่นเอง"
80000028-19 = "เอ้า คุณครู ไม่ต้องห่วงนะ ดื่มรวดเดียวให้หมดเลย มันทำมาจากช็อกโกแลตเพราะงั้นรสชาติก็คง#nไม่แย่เท่าไรหรอก"
80000028-20 = "[s] ดื่มยาที่ซายะส่งให้"
80000028-26 = "รู้สึกยังไงบ้าง? รู้สึกว่าอ่อนวัยลงมั้ย?"
80000028-27 = "[s] \"อืม ครูก็ไม่แน่ใจ...\""
80000028-28 = "เป็นไปไม่ได้... อย่างน้อยถ้าไม่เด็กลง ร่างกายก็น่าจะเปล่งแสงสีทอง หรือไม่ก็มีขนงอกออกมา..."
80000028-29 = "[s] \"นี่เอาของแบบนั้นให้ครูกินเรอะ?!\""
80000028-30 = "ถ้าลองวิเคราะห์สูตรเคมีด้วยอุปกรณ์วิเคราะห์อย่างง่ายดูก่อนละก็..."
80000028-31 = "อืม แบบนี้เอง ใส่วัตถุดิบลงไปเยอะขนาดนั้นแล้วแท้ๆ แต่ทำไมส่วนประกอบของตัวยาถึงใกล้เคียง#nกับช็อกโกแลตที่ขายตามท้องตลาดไปได้นะ"
80000028-32 = "สุดท้ายยาที่ฉันทำขึ้นก็เป็นแค่ช็อกโกแลตที่ใส่ส่วนผสมเยอะแยะลงไปสินะ..."
80000028-37 = "เอ้า คุณครู รับไปสิ ผลงานล้มเหลวที่เหลือน่ะ"
80000028-38 = "ยังไงยาอันนี้ก็กลายเป็นช็อกโกแลตไปแล้ว จะเอาไปใช้ที่อื่นก็คงไม่ได้ ฉันเองก็ไม่ได้ชอบพวก#nช็อกโกแลตอยู่แล้วด้วย"
80000028-39 = "อีกอย่างถ้าเอาช็อกโกแลตไปให้คนอื่นในวันแบบนี้ก็อาจถูกเข้าใจผิดก็ได้..."
80000028-40 = "วะ...วันนี้เป็นวันอะไรน่ะเหรอ...? นี่คุณครูถามเพราะไม่รู้จริงๆ เหรอน่ะ?"
80000028-41 = "..."
80000028-42 = "อาจเป็นผลข้างเคียงของยาก็ได้ ต้องตรวจร่างกายดูรึเปล่านะ...?"

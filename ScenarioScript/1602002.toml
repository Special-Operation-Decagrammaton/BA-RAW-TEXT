1602002-90 = "3;오토기;06;물론 좀처럼 타인과 어울리지 않고 외로움에 익숙한 론리 울프 스타일의 학생이 저격 임무에 능숙한 경우가 많지만……\n#3;em;[한숨]"
1602002-91 = "3;오토기;00;저격수도 엄연한 부대의 일원이니까. 다른 대원들과 원활히 작전을 수행하기 위해서는, 어느정도는 사교성을 기르는 편이 좋지."

1602002-24 = "3;오토기;00\n#3;a\n#wait;1000"
1602002-25 = "3;오토기;02;어라,  [USERNAME] 선생님?\n#3;em;[반응]"
1602002-26 = "3;오토기;03;선생님도 이 카페, 후루링크에서 보고 왔어? 요새 SNS에서 아주 핫하던데."
1602002-27 = "[s3] \"오토기!\"\n[s4] \"마침 잘 됐다. 나 좀 도와줘……\""

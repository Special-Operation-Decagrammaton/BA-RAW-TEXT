1602002-108 = "3;오토기;02;아니? 전혀 몰랐어."
1602002-109 = "4;게헨나 학생 노말;03;잘 됐다…… 그럼 이거, 받아주세요. 작가님의 신간이에요.\n#4;em;[음표]"

1602002-104 = "4;게헨나 학생 노말;03;네, 맞아요! 전에 출간 기념 이벤트로 받은 한정 책갈피에요!\n#4;hophop"
1602002-105 = "4;게헨나 학생 노말;02;이걸 한 번에 알아보시다니…… 혹시 그 쪽도 작가님의 팬이신가요?"
1602002-106 = "3;오토기;02;팬이라고 자처할 만큼은 아니지만, 이 작가의 책은 좋아하는 편이야. 신간이 나오면 꼬박꼬박 사 읽고 있거든."

1602002-44 = "2;오토기;00;이 원두 설명에 있는 워시드와 내추럴은 무슨 뜻이야?\n#2;h"
1602002-45 = "4;점원;03;아, 워시드는 커피 열매를 수확한 뒤 커피 원두만 따로 세척하여 건조한 것이고, 내추럴은 과육과 함께 발효한 원두를 의미합니다.\n#4;greeting"
1602002-46 = "4;점원;00;깔끔한 맛을 선호하신다면 워시드 커피를 추천드리지만, 과일 같은 달콤한 풍미를 느끼고 싶다면 내추럴 커피를 추천드려요.\n#2;h"
1602002-47 = "2;오토기;03;오, 커피에서 과일차 같은 향이 난다고? 신기하네.\n#2;hophop"
1602002-48 = "2;오토기;02;나는 개인적으로 유자차를 엄청 좋아하는데, 혹시 유자차 같은 향이 나는 커피도 있으려나?"
1602002-49 = "4;점원;03;네. 오늘 들어 온 이 내추럴 발효 방식의 버번 원두는 시트러스 계열의 달콤한 풍미가 있어서 유자 향이 특징입니다.\n#4;em;[재잘]"
1602002-50 = "4;점원;00;그럼 이 원두로 드릴까요? 추출은 어떤 방법을 희망하시나요?"
1602002-51 = "2;오토기;00;음…… 나는 커피는 잘 모르니까 제일 잘 어울리는 것으로 부탁할게."
1602002-52 = "4;점원;03;네, 그럼 핸드 드립으로 내려서 드리겠습니다.\n#4;greeting"
1602002-53 = "4;점원;00;그리고 그 쪽의 손님은……"
1602002-54 = "[s] \"저, 저도 같은 것으로 부탁드릴게요!\""
1602002-55 = "4;점원;03;네. 그럼 금방 준비해드리겠습니다.\n#4;greeting"

1602002-61 = "#wait;100"
1602002-62 = "2;오토기;02;확실히 요새는 손님의 취향에 맞추어 다양한 대응을 하는 가게들이 인기인 것 같아."
1602002-63 = "2;오토기;03;나는 주문을 하면서 점원들과 가볍게 수다도 떨 수 있어서 좋은데.\n#2;em;[재잘]"
1602002-64 = "2;오토기;00;소심한 사람은 주문을 하다가 질문이 길어지면, 겁을 먹고 도망치는 경우도 종종 있나 봐."
1602002-65 = "2;오토기;06;아무리 주문이 많다고 해도 손님을 잡아먹는 요릿집은 현실에 존재하지 않는 데 말이지.\n#2;em;[한숨]"

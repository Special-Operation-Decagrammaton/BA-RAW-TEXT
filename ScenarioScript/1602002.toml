1602002-10 = "3;점원;00;어서오세요, 주문하시겠습니까?\n#3;greeting"
1602002-11 = "[s] \"네. 블랙 커피 한 잔 부탁드립니다.\""
1602002-12 = "3;점원;00;아, 손님. 저희 카페는 처음이신가 보군요.\n#3;em;[반응]"
1602002-13 = "3;점원;03;저희 카페에서는 다양한 커피 원두와 기기를 갖추고 있기 때문에 손님의 취향에 맞춘 최적의 한 잔을 제공해드리고 있습니다."
1602002-14 = "3;점원;00;원두는 어떤 것으로 드릴까요? 워시드와 내추럴 중 어느 쪽을 선호하시나요? 로스팅 단계는?\n#3;em;[재잘]"
1602002-15 = "[s] \"워, 원두는 어떤 종류가 있죠……?\""
1602002-16 = "3;점원;02;버번, 티피카, 게이샤, 카투아이 등 다양하게 갖추고 있습니다."
1602002-17 = "3;점원;03;로스팅 또한 단계별로 주문하실 수 있습니다만, 산미가 높은 원두는 향을 보존하기 위해 대부분 라이트 로스팅으로만 준비하였습니다.\n#3;em;[반짝]"

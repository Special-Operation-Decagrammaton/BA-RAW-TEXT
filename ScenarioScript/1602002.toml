1602002-67 = "#wait;1000"
1602002-68 = "5;점원;00;……주문하신 커피 나왔습니다.\n#5;a"
1602002-69 = "2;오토기;02;아, 왔다. 왔어.\n#2;em;[반응]"
1602002-70 = "2;오토기;03;음, 좋은 향기…… 정말 커피에서 감귤 특유의 새콤한 향이 나네.\n#2;stiff"
1602002-71 = "2;오토기;00;뭔가 차갑게 해서 마시면 아이스티 같은 느낌이 날지도.\n#2;em;[전구]"
1602002-72 = "5;점원;03;아이스 커피는 대부분의 향이 가라앉기 때문에 추천드리지 않지만, 필요하시다면 얼음을 가져다 드리겠습니다.\n#5;m4\n#2;m2"
1602002-73 = "2;오토기;13;아니. 모처럼 추천을 부탁했으니 오늘은 이 향에 집중해 볼게."
1602002-74 = "2;오토기;03;대신 아이스 커피에 어울리는 원두를 알려줄 수 있을까? 다음에는 그쪽을 시도해보게."
1602002-75 = "5;점원;00;괜찮으시다면 비교해 보실 수 있도록 다른 콜드브루 샘플을 드릴까요?\n#5;em;[음표]"

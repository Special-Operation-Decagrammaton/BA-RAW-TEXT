10047050-186 = "Watcher of dawn, following the guidance of the Arcana."
10047050-187 = "Fate that longs for tomorrow, relying on the path of the light."
10047050-188 = "Gather all wishes and summon the forbidden flame. Heed my call and manifest on this land!"

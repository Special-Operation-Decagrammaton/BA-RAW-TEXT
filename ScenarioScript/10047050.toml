[translation]
10047050-1 = "第5話;禁忌之物出現了"
10047050-2 = "（結束參觀後，回到了宿舍）"
10047050-4 = "在開始召喚之前，先來營造一下氣氛吧。"
10047050-9 = "[ns]「我，我怎麼覺得已經夠有氣氛了……」"
10047050-10 = "老師，您喜歡宿舍怪談嗎？"
10047050-11 = "其實這間宿舍，有幾條外界所不知道的祕密守則。"
10047050-12 = "我打算讀幾則給您聽，可以嗎？"
10047050-13 = "[ns] 點頭"
10047050-14 = "呵呵，那麼我就開始了。"
10047050-18 = "宿舍特別守則第13號。"
10047050-19 = "「本手冊與其他規則相同──#n　是為了確保學院學生健康、安全的宿舍生活而制定的第13份文件」。"
10047050-20 = "「由於是針對特殊情況的文件，學生必須遵守以下守則」。"
10047050-26 = "「第1條：使用一樓大廳的紅色電話時，絕對不能連續按下數字6」。"
10047050-27 = "「狂獵校內的所有電話號碼，皆不會連續出現數字6」。"
10047050-28 = "「若不慎連續按下了6，請立刻跑到閣樓蜷縮身體並躲藏10分鐘」。"
10047050-29 = "「即便被人呼喚，也絕對不要回答」。"
10047050-33 = "「因為對方……絕對不是你認識的人」。"
10047050-34 = "[ns]「哦哦……」"
10047050-35 = "第2條換我來讀吧！"
10047050-39 = "「本宿舍的中央樓梯為舍監隊專用，請一般學生避免使用」。"
10047050-40 = "「此規則旨在確保學生的順暢通行，請所有學生務必配合」。"
10047050-41 = "「若其他條目與本條目互相矛盾，請絕對不要遵從」。"
10047050-42 = "[s]「這又是什麼意思？」"
10047050-43 = "妞呵呵，誰知道呢？"
10047050-44 = "不用太認真啦，那只是隨便亂寫的東西而已。"
10047050-45 = "咿嘻……那第3條就由玲奈醬來讀吧……？"
10047050-50 = "為，為什麼是我？"
10047050-51 = "你不是說那只是隨便亂寫的嗎……？#n唸出來也無所謂吧……？"
10047050-52 = "哼，又想捉弄我是吧？"
10047050-53 = "好啊，念就念誰怕誰啊！#n神秘學什麼的都是騙人的！"
10047050-58 = "「第3條：本宿舍每年會進行一次緊急避難演練」。"
10047050-59 = "「由於演練時會假設發生緊急狀況，宿舍內的部分樓梯將被封鎖」。"
10047050-60 = "「因此宿舍生必須使用中央樓梯」……咦？"
10047050-61 = "[s1]「可是第2條裡……」\n[s2]「不是說禁止使用中央樓梯嗎……？」"
10047050-66 = "玲奈醬……你剛入學的時候，不是做過緊急避難演練嗎？"
10047050-67 = "好像有吧……？"
10047050-68 = "那時你走的樓梯是……？"
10047050-69 = "好像是中央樓梯沒錯……"
10047050-74 = "咿嘻，玲奈醬違反了第2條的規定呢……"
10047050-75 = "啊……莫非今天之所以會聽到亡靈的聲音，就是因為這個……？"
10047050-76 = "那，那怎麼可能！？不要說這種奇怪的話！"
10047050-77 = "而且走過中央樓梯的又不只有我一個人！#n其他人都沒聽到也太奇怪了吧！"
10047050-78 = "咿嘻……"
10047050-79 = "那麼，最後一條就由我來讀吧……"
10047050-83 = "「第4條……也是最後一項──」"
10047050-84 = "「如果已經確認完所有條目……請務必將本文件焚毀處理」。"
10047050-85 = "「若不方便焚毀……請使用一樓大廳的紅色電話並按下666號」。"
10047050-86 = "「屆時會有專家前來協助文件的銷毀……」"
10047050-87 = "[s3]「不是說狂獵沒有連續6的號碼嗎？」\n[s4]「那究竟是誰會來呢……？」"
10047050-92 = "根，根本全部都在胡扯嘛！"
10047050-93 = "這種詭異的文件是從哪裡弄來的啊？趕快丟掉啦！"
10047050-94 = "要是隨便丟掉的話，可能會發生不祥的事情。"
10047050-95 = "沒錯……所以……就把它燒掉吧……"
10047050-96 = "順便進行特別的儀式……"
10047050-100 = "你們一開始就是這麼打算的吧！！"
10047050-102 = "妞呵呵，看來氣氛已經完全到位了。"
10047050-103 = "那麼，現在開始進行惡魔召喚儀式！"
10047050-104 = "御者！你也會幫忙的吧？"
10047050-108 = "拒絕權……並不存在。咿嘻！"
10047050-109 = "[ns5]「這就是所謂的……」\n[ns6]「來都來了嗎……」"
10047050-112 = "來，開始繪製召喚的魔法陣吧！"
10047050-113 = "[s]「你打算畫在哪裡？」"
10047050-114 = "御者，你對數字「4」有什麼感覺？"
10047050-115 = "是不是覺得不太吉祥或有點不舒服？"
10047050-116 = "而擁有最多4的宿舍……"
10047050-117 = "沒錯，就是第4宿的404號室。"
10047050-118 = "[s]「沒有第6宿606號室嗎……？」"
10047050-119 = "很可惜確實沒有。如果有的話就更有趣了呢。"
10047050-120 = "總之正因如此……這裡就是最適合召喚惡魔的房間。"
10047050-121 = "除了這裡，根本不可能考慮其他地方！"
10047050-122 = "什麼？要在我們宿舍的地板上畫那種東西！？"
10047050-123 = "妞呵呵，不用擔心。#n我用的是調配過的安全顏料，不會發生危險的。"
10047050-124 = "頂多就是會發出「砰」的一聲，然後冒點煙而已。"
10047050-125 = "那不就是會爆炸嗎！！"
10047050-126 = "呵呵，玲奈醬也很好奇吧？#n在這種地方畫出召喚惡魔的魔法陣會發生什麼事。"
10047050-127 = "一點都不好奇！"
10047050-128 = "可是……我很好奇……"
10047050-132 = "真的……不能試試看嗎……？"
10047050-133 = "嘎啊……"
10047050-134 = "喵嗚嗚……"
10047050-135 = "連牠們都垂頭喪氣了！？"
10047050-136 = "玲奈醬……"
10047050-137 = "唔，唔唔唔唔……！！"
10047050-142 = "啊～知道了啦！#n要做就做吧，只要別牽連到我就好！"
10047050-143 = "要是弄壞我的東西，我一定會要求賠償！"
10047050-144 = "妞呵呵，謝謝！不愧是玲奈醬！"
10047050-146 = "（於是儀式的準備作業就這樣開始了……）"
10047050-150 = "哦……這個魔法陣我還是第一次見到呢……？#n你是在哪裡學的……？"
10047050-151 = "是我參考古代的[ruby=Isopsephy]數秘術[/ruby]之後，自己原創的魔法陣。"
10047050-152 = "咿嘻，挺厲害的嘛……？"
10047050-153 = "哇，就連我這種外行人也覺得超酷的！"
10047050-154 = "別一直在旁邊煽風點火啦！！"
10047050-156 = "（不久之後……）"
10047050-159 = "好，魔法陣完成了。"
10047050-160 = "接下來就唸出咒語，完成儀式吧。"
10047050-166 = "[ruby=Ph'nglui]芙恩戈魯依[/ruby]……[ruby=Mglw'nafh]穆戈魯納芙[/ruby]……#n（在拉萊耶的……宅邸中……）"
10047050-167 = "等等！停下來！#n再唸下去感覺會很危險，快住手！"
10047050-168 = "不行嗎？那麼……"
10047050-173 = "天靈靈，地靈靈……！"
10047050-174 = "那個能召喚惡魔嗎！？"
10047050-175 = "玲奈醬……沒想到你知道的咒語還挺多的呢……"
10047050-176 = "表面上裝作不在意的樣子，結果其實很認真呢。"
10047050-181 = "少，少囉嗦！#n跟前輩們待在一起，就算不想知道也會知道啦！"
10047050-182 = "唔嗯，那就不用那些知名的咒語，改唸我的原創咒語吧。"
10047050-186 = "遵循阿爾克那的指引，凝視黎明之人啊。"
10047050-187 = "行於光之旅途，渴求明日的命運啊。"
10047050-188 = "將那願望匯聚，召喚禁忌的火焰──回應吾之呼喚現身於此吧！"
10047050-193 = "覺醒吧，爆裂的種子──！！"
10047050-194 = "等等，爆裂！？那不是……！"
10047050-198 = "哦哦……原本以為只會冒點煙出來，沒想到居然爆炸了……？"
10047050-199 = "這就是每天訓練的成果嗎……！？"
10047050-211 = "你們這些傢伙！在這裡搞什麼！！"
10047050-213 = "啊啊啊……！禁忌之物真的出現了……！"
10047050-214 = "[s]「……原來『禁忌之物』指的是舍監隊嗎？」"
10047050-215 = "我們最大的……宿敵。"
10047050-216 = "呵呵，成功之前總是存在著試煉。"
10047050-217 = "不過不可以放棄。#n因為勇於挑戰的──"
10047050-222 = "──「精神」。"
10047050-223 = "……是很重要的。"
10047050-224 = "快點給我放棄啦！"
10047050-225 = "啊～完了完了，一切都結束了……"
10047050-226 = "今天在美術館鬧事的也是你們吧？"
10047050-228 = "所有人聽令！把這些傢伙全都抓起來！！"
10047050-235 = "[ns]「咦，咦咦？連我也要嗎……？」"
10047050-236 = "無論是誰，在公權力之前都沒有例外！"
10047050-243 = "（就這樣和神秘研的大家一起被帶走了）"

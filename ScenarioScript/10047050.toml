[translation]
10047050-1 = "Episode 5;Something Accursed Appears"
10047050-2 = "After the tour, we returned to their dorm."
10047050-4 = "For a proper summon, we must first create the right...ambiance."
10047050-9 = "[ns] \"I-I think the ambiance is plenty already...\""
10047050-10 = "Sensei, do you enjoy a good schooltime ghost story?"
10047050-11 = "Because...we have a few secret rules in this dorm. Outsiders aren't allowed to know, but..."
10047050-12 = "I'm going to read a little. Would you like to listen?"
10047050-13 = "[ns] Nod."
10047050-14 = "Heh, then let's begin."
10047050-18 = "Dormitory Special Guidelines, Chapter #13"
10047050-19 = "Within this 13th chapter, you will find critical instructions. We created this section to ensure that every Wildhunt student lives in safety and health..."
10047050-20 = "Special circumstances have necessitated this chapter's addition. Students, please follow the following rules."
10047050-26 = "#1. When using the red phone in the 1st floor lobby, you may not press 6 consecutively."
10047050-27 = "No phone number within Wildhunt Academy shall have the number 6 appear in a row, so do not be tempted."
10047050-28 = "If you press 6 in succession, you must hurry to the attic, assume a duck-and-cover position, and hide as best you can for at least 10 minutes."
10047050-29 = "No matter who knocks, no matter who calls your name, you must not answer."
10047050-33 = "For that someone calling...is not someone you know."
10047050-34 = "[ns] \"Ah...\""
10047050-35 = "Let me read #2!"
10047050-39 = "The central stairs are for the Prefectural Council exclusively. All other students must avoid traversing these steps."
10047050-40 = "We ask for your continued cooperation, as this rule is to keep the traffic flow smooth."
10047050-41 = "Do not follow any contradictory instructions. Staying off the staircase is paramount."
10047050-42 = "[s] \"What's this one about?\""
10047050-43 = "Nyuhuhu, who knows?"
10047050-44 = "Don't take it seriously. She's making something out of nothing."
10047050-45 = "Heehee... Then, would you like to read #3, Rena...?"
10047050-50 = "Wh-Why me?"
10047050-51 = "You said it's...\"nothing,\" right? Then, you would have no problem reading it...?"
10047050-52 = "Tsk, you're just trying to tease me!"
10047050-53 = "Fine! I'll take the challenge! It's not like the occult is real or anything..."
10047050-58 = "#3. This dorm conducts emergency evacuation drills once a year."
10047050-59 = "The drill is designed for preparedness and, accordingly, some exits and staircases will be temporarily blocked in order to simulate an emergency."
10047050-60 = "Therefore, students are encouraged to use the central stai— ...Huh?"
10047050-61 = "[s1] \"Wait, what about...?\"\n[s2] \"I thought you couldn't use those stairs...\""
10047050-66 = "Rena... You had an emergency evacuation drill when you started here, right?"
10047050-67 = "I did..."
10047050-68 = "Which stairs did you use...?"
10047050-69 = "I think it was the central stairs..."
10047050-74 = "Heehee, Rena broke the 2nd rule..."
10047050-75 = "Ah... Then could it be...? Perhaps that is why the ghost sought you out! You're cursed!"
10047050-76 = "N-No way! Don't be ridiculous!"
10047050-77 = "Besides! I wasn't the only one on those stairs! And the others never heard anything..."
10047050-78 = "Heehee..."
10047050-79 = "Then, let me read the final rule..."
10047050-83 = "#4... Lastly―"
10047050-84 = "Once you have read all the rules up to this one...please dispose of this chapter by burning it."
10047050-85 = "If you are unable to fulfill this task...use the red telephone on the 1st floor lobby and call Ext. 666."
10047050-86 = "An expert will arrive shortly to assist with disposal."
10047050-87 = "[s3] \"But Wildhunt doesn't use consecutive 6 numbers?\"\n[s4] \"Then who's coming, and from where??\""
10047050-92 = "Th-This is nonsense!"
10047050-93 = "Where did you find such a weird thing? Just toss it!"
10047050-94 = "Well, if we throw it in the trash, who knows what will happen?"
10047050-95 = "Yes... That's why...we should burn it...."
10047050-96 = "And conduct a special ritual..."
10047050-100 = "So that was your plan all along!"
10047050-102 = "Nyuhuhu, it seems we've achieved optimal ambiance."
10047050-103 = "So, we shall now properly begin the demon summoning ritual!"
10047050-104 = "Master! You'll help, won't you?"
10047050-108 = "You cannot say no... Heehee!"
10047050-109 = "[ns5] \"You invited me in...\"\n[ns6] \"But you won't let me leave...?\""
10047050-112 = "Now, I'll draw the magic circle for the summoning!"
10047050-113 = "[s] \"Where are you going to draw it?\""
10047050-114 = "Master. What do you think about the number 4?"
10047050-115 = "Don't you find it ominous and eerie? Spooky?"
10047050-116 = "We have the most 4s in the whole campus."
10047050-117 = "So we will summon here, in Building 4, Unit 404."

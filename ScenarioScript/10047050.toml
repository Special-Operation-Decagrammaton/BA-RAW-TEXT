[translation]
10047050-1 = "ตอนที่ 5;สิ่งเลวร้ายปรากฏ"
10047050-2 = "(หลังจากทัวร์โรงเรียนเสร็จ คุณครูกับทุกคนก็กลับมาที่หอพัก)"
10047050-4 = "ก่อนจะทำพิธีอัญเชิญอย่างจริงจัง ฉันว่าเรามาสร้างบรรยากาศให้เหมาะสมกันก่อนดีกว่าค่ะ"
10047050-9 = "[ns] \"คะ... ครูว่าบรรยากาศเท่านี้ก็เพียงพอแล้วนะ...\""
10047050-10 = "คุณครู ชอบฟังเรื่องผีในหอพักมั้ยคะ?"
10047050-11 = "ที่จริงแล้วหอพักของเรามีกฎระเบียบลับๆ บางอย่างที่คนภายนอกไม่รู้ค่ะ"
10047050-12 = "ฉันจะอ่านกฎลับบางข้อให้ฟัง คุณครูอยากฟังมั้ยคะ?"
10047050-13 = "[s] พยักหน้า"
10047050-14 = "ฮุฮุ งั้นฉันจะเริ่มเลยนะคะ"
10047050-18 = "กฎพิเศษของหอพัก ฉบับที่ 13"
10047050-19 = "เอกสารฉบับที่ 13 นี้เขียนขึ้นเพื่อการใช้ชีวิตในหอพักที่สงบสุขและปลอดภัยของนักเรียน เฉกเช่นเดียวกับกฎระเบียบอื่นๆ"
10047050-20 = "เอกสารนี้มีไว้เพื่อเตรียมพร้อมรับสถานการณ์พิเศษ นักเรียนจึงต้องปฏิบัติตามกฎต่อไปนี้อย่างเคร่งครัด"
10047050-26 = "ข้อ 1. เมื่อใช้โทรศัพท์เครื่องสีแดงในล็อบบี้ชั้น 1 ห้ามกดเลข 6 ติดกัน"
10047050-27 = "หมายเลขภายในสถาบันศิลปะไวลด์ฮันต์ทุกหมายเลขไม่มีเลข 6 ติดกัน"
10047050-28 = "หากกดเลข 6 ติดต่อกัน ให้รีบขึ้นไปบนห้องใต้หลังคา แล้วหมอบลงเป็นเวลา 10 นาที"
10047050-29 = "หากมีใครเรียก ห้ามขานตอบเด็ดขาด"
10047050-33 = "เพราะใครคนนั้น... ไม่ใช่คนที่คุณรู้จักแน่นอน"
10047050-34 = "[ns] \"โอ้...\""
10047050-35 = "ฉันจะอ่านข้อที่ 2 ให้เองค่ะ!"
10047050-39 = "บันไดกลางหอพักมีไว้สำหรับฝ่ายดูแลหอพักเท่านั้น ขอให้นักเรียนทั่วไปงดใช้งาน"
10047050-40 = "เพื่อให้การสัญจรของนักเรียนเป็นไปอย่างราบรื่น เราขอความร่วมมือจากนักเรียนทุกคน"
10047050-41 = "หากมีกฎข้ออื่นที่ขัดแย้งกับกฎข้อนี้ จงละเลยเสีย"
10047050-42 = "[s] \"นี่มันอะไรกันเนี่ย?\""
10047050-43 = "อุฮุฮุ นั่นน่ะสิคะ"
10047050-44 = "ไม่ต้องฟังจริงจังหรอก พวกรุ่นพี่ก็แค่อ่านไปอย่างนั้นละ"
10047050-45 = "ฮิฮิ... งั้นเรนะจังลองอ่านข้อ 3 ดูมั้ยล่ะ...?"
10047050-50 = "ทะ... ทำไมฉันต้องอ่านด้วยล่ะ?"
10047050-51 = "ไหนว่าแค่อ่านไปอย่างนั้นไง...? ถ้างั้นอ่านไปก็ไม่มีปัญหาอะไรไม่ใช่เหรอ...?"
10047050-52 = "ชิ... จะแกล้งฉันอีกแล้วล่ะสิ?"
10047050-53 = "ก็ได้ ฉันไม่กลัวหรอกนะ! โลกนี้ไม่มีรหัสยศาสตร์อะไรพวกนั้นหรอก!"
10047050-58 = "ข้อ 3 หอพักนี้มีการฝึกซ้อมอพยพฉุกเฉินปีละ 1 ครั้ง"
10047050-59 = "การฝึกซ้อมเป็นการจำลองสถานการณ์ฉุกเฉิน ดังนั้นบันไดบางส่วนในหอพักจะถูกปิดการใช้งาน"
10047050-60 = "ขอให้นักเรียนในหอพักใช้บันไดกลางหอพัก... เอ๋?"
10047050-61 = "[s1] \"แต่กฎข้อ 2 บอกว่า...\"\n[s2] \"ไหนว่าห้ามใช้บันไดกลางหอไง...?\""
10047050-66 = "เรนะจัง... เข้ามาเรียนที่นี่ไม่เท่าไรก็ได้เข้าร่วมการซ้อมอพยพฉุกเฉินเลยใช่มั้ย?"
10047050-67 = "ก็ใช่...?"
10047050-68 = "แล้วตอนนั้นใช้บันไดไหนเหรอ...?"
10047050-69 = "ก็บันไดกลางหอน่ะสิ..."
10047050-74 = "ฮิฮิ เรนะจังละเมิดกฎข้อ 2 สินะ..."
10047050-75 = "อ๊ะ... ถ้างั้นเสียงวิญญาณที่ได้ยินวันนี้... เป็นเพราะ...?"
10047050-76 = "จะ... จะเป็นแบบนั้นไปได้ยังไง?! อย่าพูดอะไรเหลวไหลนะ!"
10047050-77 = "ฉันไม่ใช่คนเดียวที่ใช้บันไดกลางสักหน่อย!#nไม่คิดว่ามันแปลกเหรอที่เด็กคนอื่นไม่ได้ยินเสียงไปด้วยน่ะ!"
10047050-78 = "ฮิฮิ..."
10047050-79 = "งั้นฉันจะอ่านกฎข้อสุดท้ายละนะ..."
10047050-83 = "ข้อ 4... ข้อสุดท้าย"
10047050-84 = "หากอ่านมาถึงข้อนี้แล้ว... ให้เผาทำลายเอกสารฉบับนี้เสีย"
10047050-85 = "กรณีที่ไม่สามารถทำลายเอกสารฉบับนี้ได้... ให้ใช้โทรศัพท์เครื่องสีแดงที่ล็อบบี้ชั้น 1 แล้วกดหมายเลข 666"
10047050-86 = "แล้วผู้เชี่ยวชาญจะเข้าไปช่วยทำลายเอกสารนี้เอง..."
10047050-87 = "[s3] \"ไหนว่าที่นี่ไม่มีหมายเลขภายในที่มีเลข 6 ติดกันไง?\"\n[s4] \"กดหมายเลขนั้นแล้วใครจะมางั้นเหรอ...?\""
10047050-92 = "ละ... เหลวไหลชะมัดเลย!"
10047050-93 = "ไปเอาเอกสารแปลกๆ แบบนี้มาจากไหนเนี่ย? เอาไปทิ้งเดี๋ยวนี้เลยนะ!"
10047050-94 = "ถ้าเอาไปทิ้งทั้งอย่างนี้ อาจเกิดเรื่องร้ายขึ้นก็ได้นะคะ"
10047050-95 = "ใช่... เพราะงั้น... เรามาเผาทำลายกันเถอะ..."
10047050-96 = "แล้วก็ประกอบพิธีพิเศษไปพร้อมกันเลย..."
10047050-100 = "นั่นคือจุดประสงค์ตั้งแต่แรกงั้นเหรอ!!"
10047050-102 = "อุฮุฮุ เท่านี้ก็เริ่มได้บรรยากาศแล้วละค่ะ"
10047050-103 = "ถ้างั้นฉันจะเริ่มพิธีอัญเชิญปีศาจอย่างจริงจังเลยนะคะ!"
10047050-104 = "มาสเตอร์! จะช่วยพวกเราใช่มั้ยคะ?"
10047050-108 = "ไม่มีสิทธิ์... ปฏิเสธหรอกนะ ฮิฮิ!"
10047050-109 = "[ns5] \"ห้องนี้เข้ามาแล้วออกไม่ได้งั้นเหรอ...\"\n[ns6] \"ครูถอนตัวไม่ทันแล้วสินะ...\""
10047050-112 = "เอาละ ฉันจะเริ่มวาดวงเวทเพื่ออัญเชิญปีศาจเลยนะคะ!"
10047050-113 = "[s] \"จะวาดตรงไหนเหรอ?\""
10047050-114 = "มาสเตอร์ มาสเตอร์คิดยังไงกับเลข 4 เหรอคะ?"
10047050-115 = "คิดว่าเป็นลางร้ายหรือรู้สึกไม่สบายใจบ้างมั้ยคะ?"
10047050-116 = "ห้องพักที่มีเลข 4 มากที่สุด..."
10047050-117 = "ใช่แล้วค่ะ ห้อง 404 หอ 4 ห้องนี้นี่ละค่ะ"
10047050-118 = "[s] \"ไม่มีห้อง 606 หอ 6 เหรอ...?\""
10047050-119 = "น่าเสียดายที่ไม่มีค่ะ ถ้ามีก็น่าจะสนุกไปแล้ว"
10047050-120 = "เอาเถอะค่ะ... เอาเป็นว่าห้องนี้เป็นสถานที่ที่เหมาะสมที่สุดในการอัญเชิญปีศาจ"
10047050-121 = "ฉันนึกไม่ออกเลยค่ะว่าจะมีที่ไหนอีกนอกจากที่นี่!"
10047050-122 = "ว่าไงนะ? จะวาดของแบบนั้นที่พื้นห้องของเรางั้นเหรอ?!"
10047050-123 = "อุฮุฮุ ไม่ต้องกังวลนะคะ นี่เป็นสีที่ผสมอย่างปลอดภัย ไม่เป็นอันตรายหรอกค่ะ"
10047050-124 = "ถ้าจะเกิดอะไรขึ้น ก็น่าจะมีแค่เสียงระเบิดเบาๆ และควันพุ่งออกมาเท่านั้นค่ะ"
10047050-125 = "แต่มันก็เป็นการระเบิดไม่ใช่เหรอ!!"
10047050-126 = "ฮุฮุ เรนะจังไม่อยากรู้เหรอคะ? ว่าถ้าเราวาดวงเวทอัญเชิญปีศาจในที่แบบนี้ แล้วจะเกิดเหตุการณ์อะไรขึ้นน่ะ "
10047050-127 = "ไม่เห็นจะอยากรู้เลยสักนิดเดียว!"
10047050-128 = "แต่ฉัน... อยากรู้นะ..."
10047050-132 = "ลองทำ... ไม่ได้เหรอ...?"
10047050-133 = "กาา..."
10047050-134 = "เมี้ยวว..."
10047050-135 = "เด็กๆ พวกนี้ก็ด้วยเหรอเนี่ย?!"
10047050-136 = "เรนะจัง..."
10047050-137 = "อะ... อึกกก...!!"
10047050-142 = "กะ... ก็ได้! จะทำอะไรก็เชิญเลย แต่อย่าให้เดือดร้อนฉันก็พอ!"
10047050-143 = "ถ้าข้าวของของฉันพัง ฉันจะเรียกค่าเสียหายให้หมดเลย!"
10047050-144 = "อุฮุฮุ ขอบคุณค่ะ! นี่ละเรนะจังของพวกเรา!"
10047050-146 = "(แล้วการวาดวงเวทก็เริ่มขึ้น...)"
10047050-150 = "โอ้... วงเวทแบบนี้ ฉันไม่เคยเห็นมาก่อนเลย...? ไปศึกษามาจากที่ไหนเหรอ...?"
10047050-151 = "นี่เป็นวงเวทเฉพาะที่ฉันอ้างอิงมาจาก <ศาสตร์แห่งตัวเลข> โบราณค่ะ"
10047050-152 = "ฮิฮิ ลึกลับสุดๆ ไปเลย..."
10047050-153 = "ว้าว ขนาดฉันไม่มีความรู้ ยังเห็นแล้วขนลุกเลยค่ะ!"
10047050-154 = "เลิกพูดโน้มน้าวให้ฉันเชื่อได้แล้ว ฉันไม่เชื่อด้วยหรอก!!"
10047050-156 = "(หลังจากนั้นไม่นาน...)"
10047050-159 = "เอาละ วงเวทเสร็จสมบูรณ์แล้วค่ะ"
10047050-160 = "ทีนี้ก็มาท่องคาถาและทำพิธีกรรมที่เหลือกันเลย"
10047050-166 = "Ph'nglui... Mglw'nafh..."
10047050-167 = "เดี๋ยวก่อน! สต็อป! ถ้าท่องคาถานั้นมากกว่านี้ ฉันว่าน่าจะเกิดเรื่องอันตรายหลายอย่างเลย พอเถอะ!"
10047050-168 = "ไม่ได้เหรอคะ? ถ้างั้นก็..."
10047050-173 = "อะนันตะปัดชะเย...!"
10047050-174 = "คาถานั้นใช้เรียกปีศาจได้ด้วยเหรอ?!"
10047050-175 = "เรนะจัง... รู้จักคาถามากกว่าที่ฉันคิดไว้อีกนะเนี่ย..."
10047050-176 = "แกล้งทำเป็นไม่เชื่อ แต่ก็มีความรู้เรื่องรหัสยศาสตร์แน่นเลยนะคะ"
10047050-181 = "งะ... เงียบไปเลย! พออยู่กับพวกรุ่นพี่นานๆ เข้า มันก็ซึมซับเข้าสมองไปเองทั้งที่ไม่อยากต่างหากล่ะ!"
10047050-182 = "อืม งั้นแทนที่จะท่องคาถาชื่อดัง เรามาท่องคาถาดั้งเดิมของฉันกันดีกว่าค่ะ"
10047050-186 = "เหล่าผู้ที่มองรุ่งอรุณ ภายใต้การชี้นำของอาร์คาน่า"
10047050-187 = "โชคชะตาที่พึ่งพาเส้นทางแห่งแสงสว่างเพื่อวันพรุ่งนี้"
10047050-188 = "ฉันจะรวบรวมความปรารถนาเหล่านั้น และอัญเชิญเปลวไฟต้องห้าม จงสดับฟังเสียงเรียกของฉัน และปรากฏตัวบนดินแดนแห่งนี้!"
10047050-193 = "ตื่นขึ้นเถิด เมล็ดพันธุ์แห่งการระเบิด!!"
10047050-194 = "ระ... ระเบิด?! นั่นมัน...!"
10047050-198 = "โอ๊ะ... คิดว่าจะมีแค่ควันจางๆ เสียอีก แต่เป็นระเบิดเลยเหรอ...?"
10047050-199 = "นี่คงเป็นผลลัพธ์จากการฝึกซ้อมในทุกวันสินะคะ...?!"
10047050-211 = "เด็กพวกนี้! ทำอะไรกันอยู่น่ะ!!"
10047050-213 = "ว้ายยย...! ในที่สุด <สิ่งเลวร้าย> ก็ปรากฏตัวงั้นเหรอ...!"
10047050-214 = "[s] \"สิ่งเลวร้ายที่ว่าคือฝ่ายดูแลหอพักเหรอ...?\""
10047050-215 = "คนพวกนี้คือ... ศัตรูตัวฉกาจของพวกเราเลยละ"
10047050-216 = "ฮุฮุ ก่อนจะประสบความสำเร็จ ย่อมต้องประสบความยากลำบากก่อน"
10047050-217 = "แต่ก็อย่าล้มเลิกความตั้งใจกันนะคะ เพราะสิ่งที่สำคัญก็คือ..."
10047050-222 = "'จิตวิญญาณ'"
10047050-223 = "ยังไงล่ะคะ..."
10047050-224 = "ล้มเลิกไปเถอะน่า!"
10047050-225 = "เฮ้อ... จบแล้ว จบเห่หมดแล้ว..."
10047050-226 = "คนที่ก่อเรื่องวุ่นวายในพิพิธภัณฑ์ศิลปะวันนี้คือพวกเธอใช่มั้ย?"
10047050-228 = "ทุกคน! จับพวกนี้ไปให้หมด!!"
10047050-235 = "[ns] \"หะ... หืม? ครูก็ด้วยเหรอ...?\""
10047050-236 = "ไม่ว่าคุณจะเป็นใคร ก็ไม่ได้รับข้อยกเว้นในการบังคับใช้อำนาจของพวกเราค่ะ!"
10047050-243 = "(แล้วคุณครูก็ถูกพาตัวไปพร้อมกับชมรมวิจัยรหัสยศาสตร์ทุกคน)"

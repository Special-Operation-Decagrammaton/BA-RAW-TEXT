[translation]
70008020-1 = "โหดระห่ำ! ค่ำคืนของปีศาจ! 2"
70008020-4 = "อ๊ะ"
70008020-5 = "แอ่ก"
70008020-6 = "ทำไมพอออกมาก็โดนคนที่อันตรายที่สุดเจอตัวล่ะเนี่ย!!"
70008020-7 = "......"
70008020-8 = "เฮ้อ..."
70008020-9 = "ท่าทางแบบนั้นมันอะไรกัน!!"
70008020-10 = "คราวนี้ไปก่อเรื่องอะไรมาอีกล่ะ?"
70008020-11 = "ยังไม่ได้ทำอะไรเลยสักหน่อย!!"
70008020-12 = "\"ยัง\" งั้นเหรอ...?"
70008020-13 = "ฮึ่ย! เวลาคุยกับยัยนี่ทีไรรู้สึกเหมือนจะโดนห้ามทุกที เกลียดเรื่องแบบนี้จริงๆ เลยเชียว..."
70008020-14 = "เดี๋ยวก่อน ขอถามอะไรหน่อย"
70008020-15 = "อ๊ะ ฉันไม่มีเวลาสำหรับเรื่องพรรค์นั้นหรอกนะ...!"
70008020-19 = "เอ๋ นั่นอาราตะไม่ใช่เหรอ~?"
70008020-21 = "จริงด้วย อาราตะกับเพื่อนๆ มากันแล้วสินะ"
70008020-22 = "วันนี้ไม่มีงานอะไรให้พวกเธอช่วยเลย ทำยังไงดีล่ะ"
70008020-27 = "คนรู้จักเหรอ...?"
70008020-28 = "ก็แค่คนที่เคยไปช่วยงานนิดๆ หน่อยๆ ตอนหารายได้พิเศษน่ะ"
70008020-29 = "ตอนไปเที่ยวเล่นในงานเทศกาลมันใช้เงินเยอะนี่นา..."
70008020-31 = "เข้ามากินขนมก่อนมั้ย? มีวากาชิด้วยนะ"
70008020-32 = "โอ้ว จริงเหรอคะ?! ว่าไงดีล่ะหัวหน้า?"
70008020-34 = "เจ้าบ้า! ลืมเป้าหมายของพวกเราไปได้ยังไงห้ะ!"
70008020-36 = "อ่า~ จริงด้วย~ ขอโทษค่า~ วันนี้เรามีนัดกับหัวหน้าแล้ว~"
70008020-37 = "ไม่เป็นไร~ ถ้าตอนขากลับรู้สึกหิวก็แวะมาแล้วกันนะ~"
70008020-42 = "ถึงจะชอบก่อเรื่อง แล้วก็ปากไม่ตรงกับใจไปบ้างแต่ก็เป็นเด็กที่ใช้ได้นะ"
70008020-43 = "อ้อ ค่ะ"
70008020-44 = "ไหนๆ ก็เป็นนักเรียนของเฮียกคิยาโคเหมือนกัน สนิทๆ กันเข้าไว้ล่ะ"
70008020-46 = "อ๊ากกกก!!! ไปกันหมดแล้ว!!!"
70008020-48 = "แหมๆ~ ไม่ตะโกนเสียงดังใส่ผู้ใหญ่สิ เจ้าหนู~"
70008020-49 = "ฮ่าฮ่า โมโหควันออกหูเลยนะ~ ไปกันเถอะ~"
70008020-53 = "ฮึ่ม..."
70008020-58 = "จะสนิทกันได้มั้ยนะ?"
70008020-59 = "เสียสติไปแล้วเรอะ!!!"
70008020-60 = "ฉันไม่มีทางสนิทกับพวกเฮียกกะเรียวรันเด็ดขาด!!"
70008020-65 = "หัวหน้า~ ค่อยๆ ไปสิคะ~!"
70008020-72 = "แฮ่ก... แฮ่ก... หนีพ้นแล้วหรือยังนะ..."
70008020-73 = "ไม่สิ... นึกดูแล้วก็ไม่มีเหตุผลที่จะต้องตามมานี่นา..."
70008020-78 = "แฮ่กๆ... หัวหน้าวิ่งเร็วขึ้นรึเปล่าเนี่ย?"
70008020-79 = "คงเพราะช่วงนี้มีเรื่องให้ต้องวิ่งหนีบ่อยๆ ละมั้ง..."
70008020-80 = "นะ... หนวกหูน่า! ถ้าฉันวิ่งเร็วขึ้นก็เป็นเรื่องดีสิ! ทำไมต้องหาด้วยล่ะว่าเพราะอะไร!"
70008020-81 = "แต่ถ้าลองคิดดูดีๆ เรื่องเมื่อกี้ก็ถือเป็นเรื่องดีไม่ใช่เหรอคะ?"
70008020-82 = "พูดเรื่องอะไรน่ะ?"
70008020-83 = "เรื่องที่จะสนิทกับพวกเฮียกกะเรียวรันไงคะ ถ้าสนิทกับพวกเฮียกกะเรียวรัน พวกเราก็ไม่ต้องวิ่งหนี#nทุกวันแบบนี้แล้วนะคะ"
70008020-84 = "โอ๊ะ นั่นสินะ อีกอย่างเฮียกกะเรียวรันมีแต่พวกระดับสูงทั้งนั้นไม่ใช่รึไง? อาจไปขอคูปองงานเทศกาล#nได้ด้วยนะ?"
70008020-85 = "พูดบ้าอะไรของพวกเธอ!!!"
70008020-87 = "ทำไมต้องโมโหด้วยล่ะคะ..."
70008020-88 = "แก๊งปีศาจจะไม่มีวันสนิทกันกับพวกเฮียกกะเรียวรันเด็ดขาด!! มันถูกกำหนดให้เป็นแบบนี้#nมาตั้งแต่สมัยก่อนแล้ว!!"
70008020-90 = "ตั้งแต่สมัยก่อน? สมัยไหนเหรอคะ? แล้วใครเป็นคนกำหนดคะ?"
70008020-91 = "เรื่องนั้น... ก็ตั้งแต่แรกเลยน่ะสิ!! จะถามทำไม!! ส่วนเรื่องใครเป็นคนกำหนดน่ะ..."
70008020-92 = "......"
70008020-93 = "ยังไงก็เถอะอย่าพูดอะไรที่มันน่าขนลุกแบบนั้นอีกล่ะ!!"
70008020-95 = "เดาว่าหัวหน้าก็ไม่รู้เหมือนกันสินะ?"
70008020-96 = "อย่าถามให้โมโหเลยดีกว่า"
70008020-98 = "เพราะยัยตาขีดเดียวของเฮียกกะเรียวรันนั่นแท้ๆ ทำให้แผนเดินดูหน้ากากในตลาดพังหมดเลย..."
70008020-99 = "แต่ถึงจะไปเดินดูในตลาดก็คงจะเจอแต่หน้ากากทั่วไปที่คล้ายๆ กันสินะ ฉันอยากได้อะไรที่มันพิเศษๆ สักหน่อย... หน้ากากพิเศษที่ดึงดูดความสนใจได้ในแว๊บแรก..."
70008020-100 = "เอ๋~? ที่นี่ไม่ใช่สถานที่ท่องเที่ยวนี่นา"
70008020-101 = "เฮ้อ คนเค้าอุตส่าห์มาเที่ยวทั้งทีแต่ดันมาหลงทางซะได้ ซวยจริงๆ เลยนะ..."
70008020-105 = "นั่นไง..."
70008020-106 = "ตรงนั้นไง...!!"
70008020-112 = "หืม?"
70008020-113 = "เอ๊ะ... เอ๋?! อะไรเนี่ย อะไรกันเนี่ย?!"

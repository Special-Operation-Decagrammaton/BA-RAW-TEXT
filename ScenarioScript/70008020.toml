[translation]
70008020-1 = "Fierce! Mouryo Night! 2"
70008020-4 = "Ah."
70008020-5 = "Eh."
70008020-6 = "We ran into the worst possible, most dangerous scenario as soon as we got here!!"
70008020-7 = "..."
70008020-8 = "*sigh*"
70008020-9 = "What's with that reaction?!"
70008020-10 = "So, what trouble have you stirred up this time?"
70008020-11 = "We haven't done nothin' yet!!"
70008020-12 = "Yet...?"
70008020-13 = "Gah! You always mess me up with the way you talk!"
70008020-14 = "Stay here. I will investigate."
70008020-15 = "Hey! We don't have time for—"
70008020-19 = "Oh my, is that you, Arata?"
70008020-21 = "It is! Along with her little friends!"
70008020-22 = "I don't need a hand with anything today. What should we do?"
70008020-27 = "...Are you acquainted?"
70008020-28 = "I run errands for them sometimes, for pocket money..."
70008020-29 = "Because it's hard to have fun at festivals unless your pockets are full..."
70008020-31 = "Well, can I offer you some snacks? We have yokan."
70008020-32 = "Really?! Leader, what do you say?"
70008020-34 = "You idiot! Did you already forget why we're here?"
70008020-36 = "Ah, right. Sorry, we promised Leader we'd do stuff today."
70008020-37 = "That's okay! If you get hungry, just drop by on your way back."
70008020-42 = "She causes trouble and can tell a white lie here and there, but she's a good girl."
70008020-43 = "Ah, I see."
70008020-44 = "You're all Hyakkiyako students, after all! I hope you can get along."
70008020-46 = "GAAAH!! Everyone just GET LOST!!!"
70008020-48 = "Ai-yah. What have we told you, kiddo? You shouldn't raise your voice to your elders."
70008020-49 = "Hahaha, we've made her quite angry. We'll be on our way."
70008020-53 = "...Hm."
70008020-58 = "Should we be friends?"
70008020-59 = "Are you out of your mind?!"
70008020-60 = "There's no way I'd ever be friends with someone from the Hyakkaryouran!!"
70008020-65 = "Leader! Wait for us!"
70008020-72 = "*pant* *pant* Did we lose her...?"
70008020-73 = "Wait... We didn't even do anything. Why did I run...?"
70008020-78 = "*huff* *huff* ...Leader, have you gotten faster?"
70008020-79 = "Maybe...it's because all our plans end in us runnin' away these days..."
70008020-80 = "Sh-Shut up! It's a good thing I've gotten faster! Stop making it weird!"
70008020-81 = "But, um, wasn't that actually a good thing?"
70008020-82 = "What thing?"
70008020-83 = "Well, we wouldn't have to do all this running if we were friends with the Hyakkaryouran, right?"
70008020-84 = "Huh. That's a good point. They're, like, the elite of the elite. Maybe they'd even give us some festival coupons..."
70008020-85 = "Stop it! Stop it right now!!"
70008020-87 = "Why're you so mad about that...?"
70008020-88 = "Mouryo and Hyakkaryouran can never, ever, EVER be friends! It's set in stone!"
70008020-90 = "Set in stone? Since when? By who?"
70008020-91 = "That's... From the beginnin' of time! You can't argue with that! And the person who did it was obviously..."
70008020-92 = "Obviously..."
70008020-93 = "Moving on!! I don't ever want to hear you sayin' somethin' cringy like that ever again!"
70008020-95 = "Leader doesn't know, huh?"
70008020-96 = "Sometimes you've just got to read the room and let it go."
70008020-98 = "Because of that pointy Hyakkaryouran person, our plan to take our time looking for a mask at the market..."
70008020-99 = "The market would only have borin', ordinary masks anyway! We're lookin' for a mask so special it'll command the attention of any room!"
70008020-100 = "Aah? So, this ain't a tourist spot?"
70008020-101 = "Gah, we've been looking forward to this trip forever, and now we're lost? We're just on a run of bad luck."
70008020-105 = "...That's it."
70008020-106 = "That's it!!"
70008020-112 = "Huh?"
70008020-113 = "H-Huh?! Wh-What's \"it\"?!"

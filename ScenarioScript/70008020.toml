[translation]
70008020-1 = "何にも縛られぬ者たち（２）"
70008020-4 = "あ。"
70008020-5 = "ひっ。"
70008020-6 = "なんでこんなときにまで……！"
70008020-7 = "……。"
70008020-8 = "はぁ……。"
70008020-9 = "な、何だよ、その反応は！"
70008020-10 = "今度は何をやらかしたの？"
70008020-11 = "まだ何もしてない！！"
70008020-12 = "まだ……？"
70008020-13 = "ゆっ、誘導尋問だ！"
70008020-14 = "……ちょっと調べさせて。"
70008020-15 = "いや、今日は本当に何もしてない……ってか、急いでて――"
70008020-19 = "その声は……アラタだね？"
70008020-21 = "おや本当だ。友達も連れてきてくれたのかい？"
70008020-22 = "すまないねぇ、今日は頼むことがないんだ。"
70008020-27 = "……知り合い？"
70008020-28 = "小遣いのために、お使いしただけ。"
70008020-29 = "お祭りにはお金がいるからな……。"
70008020-31 = "まぁまぁ、寄っていきなぁ。羊羹があるんだよ。お茶も用意しようねぇ。"
70008020-32 = "いいんですか！？リーダー、どうします？"
70008020-34 = "ばか！あほ！どうしたもこうしたもねぇ！"
70008020-36 = "あ、そうだった……ごめん、今日はちょっと急いでて……。"
70008020-37 = "そうかいそうかい。お腹がすいたら、いつでも来るんだよ。"
70008020-42 = "やんちゃなところもあるけど、本当は良い子たちなんだ。"
70008020-43 = "あ……はい。"
70008020-44 = "百鬼夜行同士なんだから、みんな仲良くしなね。"
70008020-46 = "しっ！しっ！！早く行っちまえ！！"
70008020-48 = "アラタ、照れ隠しもほどほどに――"
70008020-49 = "ささ、後は若い者に任せて。私たちは退散するとしよう。"
70008020-53 = "ふ～ん？"
70008020-58 = "仲良くする？"
70008020-59 = "するかよ！！"
70008020-60 = "百花繚乱と仲良くなんて、まっぴらごめんだね！！"
70008020-65 = "リーダー！置いてかないでくださいよ～！"
70008020-72 = "はぁ、はぁ、撒いたか……？"
70008020-73 = "あれっ？#n今日は別に、逃げなくてもよかったんじゃ……。"
70008020-78 = "はぁ、はぁ……リーダー、足速くなったよね……。"
70008020-79 = "逃げ回ってばっかだもんね……。"
70008020-80 = "うるさい！速くなるのはいいことだろうが！"
70008020-81 = "でも……さっきの話、よかったんじゃないですか？"
70008020-82 = "なにが？"
70008020-83 = "百花繚乱と仲良くする、って。そうすれば、逃げる必要なくなりますよね？"
70008020-84 = "たしかに。百花繚乱はエリートだし、お祭りの金券とかもらえるかも？"
70008020-85 = "それ、本気で言ってんのか……！？"
70008020-87 = "そこまで怒らなくても……。"
70008020-88 = "いいか？魑魅一座と百花繚乱は何があっても仲良くできない。そう決まってるんだ！"
70008020-90 = "え……そんなの、誰が決めたんです……？"
70008020-91 = "そ、それは……最初からだよ！！そう決めた人はな……！"
70008020-92 = "……。"
70008020-93 = "ともかく！そんな間抜けな話は二度とするなよな！！"
70008020-95 = "……リーダーもよく知らないっぽいね？"
70008020-96 = "あんま聞かないであげよう。"
70008020-98 = "はぁ……あいつのせいで無駄な時間を食っちまったな。"
70008020-99 = "商店街は地味なのばっかだし……目を引く、特別なお面はねぇのか……？"
70008020-100 = "百鬼夜行って、全部が観光地なんじゃないの？"
70008020-101 = "こんなことなら下調べしてくるんだったわね……。"
70008020-105 = "……あれだ！"
70008020-106 = "見つけたぞ！！"
70008020-112 = "ん？"
70008020-113 = "えっ……えっ！？なに！？"

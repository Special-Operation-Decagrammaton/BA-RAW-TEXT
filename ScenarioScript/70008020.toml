[translation]
70008020-1 = "驚險！妖怪劇團之夜！（２）"
70008020-4 = "啊。"
70008020-5 = "呃。"
70008020-6 = "怎麼一出來就碰上了最危險的傢伙！！"
70008020-7 = "……"
70008020-8 = "唉……"
70008020-9 = "那個反應是什麼意思啦！！"
70008020-10 = "你這次又闖了什麼禍？"
70008020-11 = "我什麼都還沒做好不好！！"
70008020-12 = "還沒做……？"
70008020-13 = "糟了！跟這傢伙聊下去好像只會被牽著走，感覺真討厭……"
70008020-14 = "讓我調查一下。"
70008020-15 = "哎，我現在趕時間耶……！"
70008020-19 = "咦，這不是新嗎～？"
70008020-21 = "真的耶，新帶朋友來啦？"
70008020-22 = "不過今天沒什麼事情能請你幫忙，該怎麼辦好呢……"
70008020-27 = "……是你認識的人嗎？"
70008020-28 = "只是為了賺零用錢，所以接了點工作而已。"
70008020-29 = "畢竟想在祭典上玩樂可是很花錢的啊……"
70008020-31 = "要不要進來吃點心？有羊羹可以吃哦。"
70008020-32 = "哦，真的嗎！？#n隊長你覺得咧？"
70008020-34 = "笨蛋！別忘了我們出來的目的！"
70008020-36 = "啊，對哦～#n抱歉啦，今天已經跟隊長有約了～"
70008020-37 = "沒關係～#n回家路上肚子餓再來也可以～"
70008020-42 = "雖然有點愛惹事又不太坦率，但他們其實是群好孩子。"
70008020-43 = "啊，是。"
70008020-44 = "大家都是百鬼夜行的學生，要好好相處哦。"
70008020-46 = "唔哇啊啊！！！全部給我走開！！！"
70008020-48 = "哎呀～不能對大人吼叫哦～"
70008020-49 = "哈哈，完全氣炸了呢～我們走吧～"
70008020-53 = "哼嗯……"
70008020-58 = "要好好相處嗎？"
70008020-59 = "你瘋啦！！！"
70008020-60 = "我怎麼可能跟百花繚亂好好相處！！"
70008020-65 = "隊長～你走慢一點啦～！"
70008020-72 = "哈啊～哈啊～甩掉他了嗎……"
70008020-73 = "不對……仔細想想，今天根本沒理由被追吧……"
70008020-78 = "呼啊，呼啊……隊長，你好像跑得更快了耶？"
70008020-79 = "可能是因為……最近老是在逃跑的關係吧……"
70008020-80 = "少，少囉嗦！腳程變快是好事，哪需要什麼理由！"
70008020-81 = "不過話說回來……剛才那個提議感覺不錯耶？"
70008020-82 = "什麼提議？"
70008020-83 = "就是跟百花繚亂搞好關係啊？這樣我們就不用一直逃了。"
70008020-84 = "哦～對耶。而且百花繚亂不是菁英嗎？#n搞不好祭典的時候還能拿到優惠券哦？"
70008020-85 = "你們到底在說什麼蠢話！！！"
70008020-87 = "為什麼要這麼生氣……"
70008020-88 = "妖怪劇團跟百花繚亂絕對絕～對不可能搞好關係！！#n這是很久以前就決定的事！！"
70008020-90 = "很久以前……？#n所以是什麼時候啊？是誰決定的？"
70008020-91 = "呃……當然是從一開始啊，這還用問嗎！！#n至於是誰決定的嘛……"
70008020-92 = "……"
70008020-93 = "總之以後別再說這種肉麻的話就對了！！"
70008020-95 = "看來隊長自己也不知道吧？"
70008020-96 = "還是別再問下去比較好。"
70008020-98 = "都怪百花繚亂那個尖酸刻薄的傢伙，害我悠哉逛市場挑面具的計畫泡湯了……"
70008020-99 = "不過就算去市場，最後也只能找到普通的面具吧。#n我需要的……是能一眼就吸引住目光的特別面具……"
70008020-100 = "唉～所以說，這裡根本不是什麼觀光景點嘛。"
70008020-101 = "真是的，難得來旅行居然會迷路……實在有夠倒楣。"
70008020-105 = "……就是這個。"
70008020-106 = "我要找的就是這個！！"
70008020-112 = "嗯？"
70008020-113 = "咦，咦咦！？什，什麼情況！？"

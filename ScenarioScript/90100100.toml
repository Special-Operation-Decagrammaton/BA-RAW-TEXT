[translation]
90100100-1 = "第10話;闇の中へ"
90100100-4 = "[ns1] \"暑い……。\"\n[ns2] \"暗い……。\""
90100100-8 = "ご不便をおかけして申し訳ありません。"
90100100-9 = "今回の作戦は灯火管制を維持する必要があるため、照明を制限しています。"
90100100-10 = "暗視装置に余剰があればお貸ししたかったのですが、予備すらもなく……。"
90100100-11 = "[s3] \"大丈夫だよ。うっすらとは見えてるから。\"\n[s4] \"それで……ここはどこ？\""
90100100-14 = "シロウナギ駅の空調室と繋がっている地下道です。"
90100100-15 = "地下施設の熱が抜けるので蒸し暑いですが、[ruby=ターゲット]くねくね[/ruby]を誘い出すには最適の場所です。#nどうかご了承ください。"
90100100-16 = "[s] \"大丈夫だよ。大変なのはみんなのほうなんだから。\""
90100100-20 = "[ns5] \"それにしても、こんな場所でもくねくねが出るの？\"\n[ns6] \"晴れた日にしか観測されないんじゃなかったっけ？\""
90100100-23 = "これまではそう考えていました。"
90100100-24 = "ですが今回の事件記録を精査した結果、天候はそこまで重要な要因ではない可能性が浮上したんです。"
90100100-25 = "前回の作戦でFOX4はくねくねを認知して影響を受けましたが、#n陽炎を見ていないFOX3は無事でした。"
90100100-26 = "くねくねの元になった怪談が、熱中症を戒める[ruby=ポールドニツァ]正午の悪魔[/ruby]に由来するのなら……#n蒸し暑くて陽炎が立つ環境であれば、地下だろうとくねくねを認知できるはずです。"
90100100-27 = "何よりこの場所なら、市民が作戦に巻き込まれることもないですから。"
90100100-28 = "[s] \"それはたしかに良いと思うけど……。\""
90100100-32 = "[ns7] \"気のせいかもしれないんだけどさ。\"\n[ns8] \"意識的に、市民と関わるのを避けてない？\""
90100100-35 = "……どうでしょう。"
90100100-36 = "市民を危険にさらすことについての話であれば、#nそれを可能な限り回避しようとするのはSRTの者として当然のことです。"
90100100-40 = "作戦には、いつだって副次的な被害がつきものだ。"
90100100-44 = "私たちはSRT――キヴォトス市民の安全を担う特殊部隊です。"
90100100-45 = "市民の安全を担保できない作戦に意味はありません。"
90100100-49 = "今そいつを逃がせば、後でもっと大きな被害が出るぞ！"
90100100-50 = "その判断……責任を取れるのか？"
90100100-54 = "かつて私たちは市民に大きな迷惑をかけました。同じ轍を踏むわけにはいきません。"
90100100-58 = "自分で責任も負う覚悟もないくせに、なにを偉そうに。"
90100100-60 = "どんな大義名分があろうとも――"
90100100-64 = "[ns] （なぜか、妙な幻聴が重なって聞こえた……）"
90100100-66 = "[ns9] \"……分かった。\"\n[ns10] \"でも、何があってもみんなの安全が最優先だよ。\""
90100100-69 = "肝に銘じます。"
90100100-73 = "こちらFOX2。ポイントチャーリーに到達。"
90100100-74 = "現在気温は摂氏34度……暗くて見えづらいけど、空調配管の上に陽炎が立ってるはず。"
90100100-75 = "確認。全員、装備を着けるまでは陽炎を肉眼で見ないよう注意しろ。"
90100100-76 = "[s] \"もしかして昨日言ってた装備って……。\""
90100100-80 = "そう、暗視ゴーグル！"
90100100-81 = "くねくねがどうやって惑わせてくるのかは分からないけど、視神経に干渉してるなら、#n私のフラッシュシールドと原理は近いのかなって思ってさ。"
90100100-85 = "閃光弾を食らったらダメになるのは同じでしょ？"
90100100-86 = "でも最低限、目がやられるのは防げる。"
90100100-87 = "暗視ゴーグルは、光に反応したセンサーが、電子信号に再構成した映像を映すの。#nだから、目に有害なレベルの光量が入ると自動で遮断されるってわけ。"
90100100-88 = "これで本当に大丈夫だといいんだけど……。#nゴーグル越しでもくねくねに惑わされない保証はないよね……。"
90100100-89 = "でも私たちがやらなかったら、別の誰かが試すことになるんだし。"
90100100-90 = "だったら、いま試した方がマシ。"
90100100-91 = "こうなるなら分隊名をキツネじゃなくてカナリアにしとけばよかった。"
90100100-92 = "なにそれ。FOX4、ビビっちゃったの？まだ試してもないのに。"
90100100-93 = "嬉しいんだよ……！さあ、命令ちょうだい、今すぐ！"
90100100-99 = "では、こちらも突入の準備をしよう。"
90100100-100 = "FOX4、ターゲットの座標確認を頼む。"
90100100-101 = "OK、任せて！"
90100100-108 = "ポイントロメオから方位0-8-5の位置に熱源を確認。"
90100100-112 = "空調配管上で発生している陽炎を確認。座標は――"
90100100-113 = "あれ？ 距離倍率が変。像を結んでる位置が、見えてる距離よりずっと遠い。"
90100100-119 = "やっぱり……。"
90100100-123 = "……FOX3、待機。"
90100100-126 = "この空調室にあるはずのない草原が見える。それに、その向こうに不規則に揺れて――"
90100100-135 = "「白いかかし」の発生を確認。"
90100100-137 = "FOX4！聞こえてる！？私が誰か分かる！？"
90100100-138 = "うわ、びっくりした。そんな大声出さなくても分かるってば。"
90100100-139 = "だったらちゃんと返事しなさいよ！"
90100100-140 = "FOX1、この子やっぱり正気じゃないって！作戦は失敗だよ！"
90100100-142 = "意識を失わずにターゲットの位置を確認できたなら上出来だ。"
90100100-143 = "全員、暗視装置を装着。IRモードに切り替え、焦点を確認。"
90100100-154 = "現時刻をもって、[ruby=FOX]キツネ[/ruby]が闇を制圧する。"

[translation]
1000302-1 = "New Merch!"
1000302-2 = "Trinity Classroom"
1000302-3 = "Oh, Sensei! You're here!"
1000302-4 = "You saw my MomoTalk, right? I got some new merch."
1000302-5 = "Look! Ta-da!"
1000302-6 = "It's a fluffy neck pillow in the shape of Wavecat!"
1000302-7 = "Any place is a good place for a nap now!"
1000302-8 = "[s] \"...Wavecat?\""
1000302-9 = "Huh...? You've never heard of Wavecat, Sensei?"
1000302-10 = "He's a cat with a long body that appears in Momo Friends. He and Peroro are besties!"
1000302-11 = "Wavecat isn't as good of a dancer, but his moves are really charming and Momo Friends fans love him."
1000302-12 = "Also, this tiny owl on top of Wavecat is named Big Brother!"
1000302-13 = "Big Brother's eyes get so big that he can see anything and everything—every truth! That's why students like to bring his merch to exams as a good luck charm."
1000302-14 = "And this quokka here is Mr. Nicholai..."
1000302-15 = "Oops. Sorry for rambling on you like that!"
1000302-16 = "I always get carried away when I talk about Momo Friends..."
1000302-17 = "[s] \"Don't worry about it. I feel you.\""
1000302-18 = "Thanks for making me feel better..."
1000302-19 = "...but a lot of my friends give me a hard time when I talk about Momo Friends."
1000302-20 = "They poke fun at the characters for being weird and quirky..."
1000302-21 = "That's part of what makes them appealing, though. Characters that are a little different are more fun."
1000302-22 = "I've always been so ordinary...so I admire these characters for being different."
1000302-23 = "[s] \"I like weird characters too.\""
1000302-24 = "H-Haha... Really? It's a little embarrassing to hear we have that in common."
1000302-25 = "Oh, Sensei. Did you wanna try out my Wavecat pillow?"
1000302-26 = "It's so fluffy and nice!"
1000302-30 = "Haha. It looks great on you! You look like a new Momo Friends character!"
1000302-31 = "What do you think? Feel like lying down and taking a nap?"
1000302-32 = "Sorry, but I'll have to ask for it back. It was tough to get my hands on!"
1000302-34 = "But if you wanna borrow it sometime...I'd be okay with that."

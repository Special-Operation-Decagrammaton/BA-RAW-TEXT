[translation]
1000302-1 = "สินค้าใหม่!"
1000302-2 = "ห้องเรียน สถาบันทรีนิตี้"
1000302-3 = "อ๊ะ คุณครู! มาแล้วเหรอคะ"
1000302-4 = "ฮิฮิ อย่างที่ฉันบอกไปใน MOMOTALK ค่ะ ฉันได้กู้ดอันใหม่มาแล้วค่ะ"
1000302-5 = "ดูสิคะ! แต่นแต๊น~"
1000302-6 = "หมอนรองคอขนปุยรูปคุณ <เวฟแคท> ค่ะ!"
1000302-7 = "ถ้ามีหมอนอันนี้ คุณครูก็จะนอนกลางวันได้ทุกที่เลยนะคะ!"
1000302-8 = "[s] \"...เวฟแคท?\""
1000302-9 = "เอ๋...? รึว่าคุณครูไม่รู้จักคุณเวฟแคทเหรอคะ?"
1000302-10 = "คุณเวฟแคทเป็นน้องแมวตัวยาวที่เป็นเพื่อนสนิทของท่านเพโรโร่ใน MOMO FRIENDS ค่ะ!"
1000302-11 = "ถึงจะไม่ได้เต้นเก่งอย่างท่านเพโรโร่ แต่เวฟแคทก็ดังมากในหมู่แฟนๆ ของ MOMO FRIENDS เพราะลีลาการเต้นก็น่ารักมากๆ ไม่แพ้กันเลยค่ะ"
1000302-12 = "แล้วก็นกฮูกตัวเล็กๆ ที่เกาะอยู่บนหัวของเวฟแคทมีชื่อว่า \"บิ๊กบราเธอร์\" ค่ะ!"
1000302-13 = "บิ๊กบราเธอร์สามารถใช้สายตาอันเฉียบคมอ่านความคิดของอีกฝ่ายได้#nเพราะงั้นเลยค่อนข้างเป็นที่นิยมของเด็กที่กำลังเตรียมสอบค่ะ"
1000302-14 = "แล้วควอกก้าที่อยู่ข้างๆ ก็คือคุณลุงนิโคไล..."
1000302-15 = "อ๊ะ ฉันนี่พูดไปเรื่อยเลย... ขอโทษด้วยนะคะ!"
1000302-16 = "พอได้พูดเรื่องของ MOMO FRIENDS ฉันมักจะตื่นเต้นจนพูดไม่หยุดเลย..."
1000302-17 = "[s] \"ไม่เป็นไร สนุกดีนะ\""
1000302-18 = "คุณครูพูดแบบนี้แล้วก็ค่อยยังชั่วหน่อยค่ะ..."
1000302-19 = "เพื่อนๆ ฉันหลายคนไม่ค่อยชอบเวลาที่ฉันพูดถึง MOMO FRIENDS"
1000302-20 = "พวกเขาบอกว่าตัวละครใน MOMO FRIENDS ดูแปลกๆ ทั้งหมดเลย..."
1000302-21 = "แต่ฉันกลับคิดว่านั่นเป็นข้อดีนะคะ ฉันคิดว่าการที่ตัวละครมีบุคลิกที่แปลกๆ ดูไม่ธรรมดา#nกลับเป็นเรื่องที่ดีซะอีกค่ะ"
1000302-22 = "เพราะตัวฉันเองค่อนข้างธรรมดาแล้วก็ดูจืดชืด... ฉันเลยชอบพวกตัวละครที่ดูพิเศษค่ะ..."
1000302-23 = "[s] \"ครูก็ชอบอะไรที่ดูธรรมดานะ\""
1000302-24 = "ฮะ...ฮะๆ... งั้นเหรอคะ? พอคุณครูพูดแบบนี้ ฉันรู้สึกเขินจัง..."
1000302-25 = "อ๊ะ จริงสิคะคุณครู คุณครูอยากลองหมอนเวฟแคทมั้ยคะ?"
1000302-26 = "มันนุ่มฟูน่าหนุนมากๆ เลยนะคะ~"
1000302-30 = "ฮิฮิ เหมาะกับคุณครูดีนะคะ! คุณครูดูเหมือนตัวละครใหม่ของ MOMO FRIENDS เลยค่ะ!\n\n"
1000302-31 = "เป็นยังไงบ้างคะ? แค่เอาไปสวมไว้ที่คอก็รู้สึกง่วงนอนแล้วใช่มั้ยล่ะคะ?"
1000302-32 = "...แต่ว่า...ฉันคงให้หมอนใบนี้คุณครูไม่ได้หรอกนะคะ กว่าจะหามาได้แทบแย่เลยค่ะ!"
1000302-34 = "แต่ถ้าคุณครูจำเป็นต้องใช้ละก็... ฉันจะให้ยืมก็ได้ค่ะ"

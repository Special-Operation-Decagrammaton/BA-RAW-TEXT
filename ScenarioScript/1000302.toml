[translation]
1000302-1 = "新作周邊！"
1000302-2 = "三一綜合學園．教室"
1000302-3 = "啊，老師！您好！"
1000302-4 = "耶嘿嘿，就像在MomoTalk裡說的一樣，我獲得了新的周邊唷。"
1000302-5 = "請看！鏘──！"
1000302-6 = "這是以「波浪貓」為原形的蓬鬆脖枕哦！"
1000302-7 = "只要有了這個，不管在哪都能夠舒服地睡午覺了！"
1000302-8 = "[s] 「……波浪貓？」"
1000302-9 = "咦……？老師，難道你不知道波浪貓嗎？"
1000302-10 = "波浪貓就是在Momo好友裡有著長長身體的貓，是佩洛洛大人獨一無二的摯友唷！"
1000302-11 = "雖然比不上佩洛洛大人的佩洛洛舞，但也一直跳著很棒的舞喔，在Momo好友粉絲間是很有人氣的角色。"
1000302-12 = "然後在波浪貓身上的小貓頭鷹叫做老大哥喔！"
1000302-13 = "老大哥只要盯著對方就能知道一切，所以作為守護考生的角色也有很高的人氣唷。"
1000302-14 = "還有在那旁邊的短尾袋鼠叫做Mr.尼科萊……"
1000302-15 = "啊，抱歉我一直說個不停！"
1000302-16 = "一說到Momo好友的話題不小心就太開心了……"
1000302-17 = "[s] 「沒關係，我也很開心。」"
1000302-18 = "老師也開心的話就太好了。可是……"
1000302-19 = "當我提到Momo好友的時候，不喜歡的朋友也不少……"
1000302-20 = "說Momo好友的角色都歪七扭八的，而且都是些奇怪的角色……"
1000302-21 = "但是，我覺得那才是它們吸引人的地方。有著跟普通人和其他角色不一樣的個性這一點特別棒。"
1000302-22 = "因為我是個沒什麼特色的平凡的人……所以看到那樣的角色，總覺得有點憧憬它們……"
1000302-23 = "[s] 「我喜歡平凡的東西唷。」"
1000302-24 = "啊，啊哈哈……是這樣嗎？聽你這麼說總覺得好像有點害羞……"
1000302-25 = "對了，老師。這個波浪貓的脖枕，要不要用用看呀？"
1000302-26 = "鬆鬆軟軟的很舒服的唷。"
1000302-30 = "啊哈，很適合老師！簡直就像是Momo好友的新角色一樣！"
1000302-31 = "怎麼樣啊？有沒有覺得光是圍在脖子上就快要睡著了？"
1000302-32 = "……但是這個脖枕不能給你，畢竟我也是花了不少心力才拿到的！"
1000302-34 = "不過，如果有需要的話……到時候會借給老師的。"

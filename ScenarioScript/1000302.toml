[translation]
1000302-1 = "#title;신상 굿즈!"
1000302-2 = "#place;트리니티 학원 교실"
1000302-3 = "3;히후미;03;앗, 선생님! 오셨군요!\n#3;em;[반응]\n#3;a"
1000302-4 = "3;히후미;00;헤헤, 모모톡에서 말씀드린 대로 새로운 굿즈를 손에 넣은 참이에요."
1000302-5 = "3;히후미;03;보세요! 짠~\n#3;greeting"
1000302-6 = "3;히후미;00;<웨이브캣> 씨 모양을 한 푹신한 목베개에요!\n#3;hophop\n#3;em;[반짝]"
1000302-7 = "3;히후미;03;이것만 있으면 어디서든 안락하게 낮잠을 잘 수 있답니다!"
1000302-8 = "[s] \"……웨이브캣?\""
1000302-9 = "3;히후미;02;어라……? 선생님, 혹시 웨이브캣 씨를 모르시나요?\n#3;stiff\n#3;em;[?]"
1000302-10 = "3;히후미;03;웨이브캣 씨는 모모프렌즈에 등장하는 긴 몸통을 가진 고양이로 페로로 님의 둘도 없는 친구예요!\n#3;hophop\n#3;em;[반짝]"
1000302-11 = "3;히후미;00;페로로 님의 페로로 댄스 만큼은 아니지만 언제나 매력적인 춤을 추고 있기 때문에 모모프렌즈 매니아들 사이에서는 인기가 많은 편이랍니다."
1000302-12 = "3;히후미;00;그리고 웨이브캣 위에 올라타고 있는 이 조그마한 부엉이는 빅브라더 님이라고 해요!\n#3;m2\n#3;em;[재잘]"
1000302-13 = "3;히후미;03;빅브라더 님은 상대를 지긋이 쳐다보는 것만으로도 모든 진실을 알아낼 수 있기 때문에 수험생들의 부적 캐릭터로 인기가 많답니다.\n#3;m3"
1000302-14 = "3;히후미;02;그리고 이 옆에 있는 쿼카는 Mr.니콜라이 씨로…….\n#3;m4"
1000302-15 = "3;히후미;04;아차차, 저만 계속 얘기를 했네요. 죄송해요!\n#3;stiff\n#3;em;[땀]"
1000302-16 = "3;히후미;01;모모프렌즈 이야기를 하다보면 저도 모르게 신이 나서…….\n#3;m3"
1000302-17 = "[s] \"괜찮아. 재미있는걸.\""
1000302-18 = "3;히후미;99;선생님께서 재미있으셨다면 다행이지만…….\n#3;em;…"
1000302-19 = "3;히후미;01;제가 모모프렌즈의 이야기를 하는 걸 싫어하는 친구들도 많거든요."
1000302-20 = "3;히후미;04;모모프렌즈의 캐릭터들은 모두 어딘가 비뚤어지고 특이한 캐릭터 밖에 없다고…….\n#3;stiff"
1000302-21 = "3;히후미;02;하지만 그 점이 매력적이지 않나요? 평범하지 않고 다른 캐릭터들이 가지고 있지 않은 개성을 갖는다는 건 참 멋진 일인 것 같아요.\n#3;em;[?]"
1000302-22 = "3;히후미;01;저는 특별한 점 하나없이 평범하기만해서…… 이런 캐릭터들을 보면 어쩐지 동경하게 되어버려요……."
1000302-23 = "[s] \"평범한 것도 나는 좋아해.\""
1000302-24 = "3;히후미;04;하, 하하…… 그런가요? 그렇게 말씀해 주시니 어쩐지 부끄럽네요…….\n#3;em;[땀]"
1000302-25 = "3;히후미;02;참, 선생님. 이 웨이브캣 씨 목베개를 한 번 써 보시겠어요?"
1000302-26 = "3;히후미;03;폭신폭신해서 기분 좋다고요~\n#3;em;[반짝]"
1000302-27 = "3;히후미;01\n#3;d\n#wait;1500"
1000302-28 = "3;히후미;01\n#3;a\n#wait;1000\n#3;closeup"
1000302-29 = "3;히후미;01\n#3;h\n#wait;1500\n#3;closeup\n#3;greeting"
1000302-30 = "3;히후미;03;하하, 잘 어울리시네요! 마치 모모프렌즈의 새로운 캐릭터같아요!\n#3;closeup\n#3;em;[재잘]"
1000302-31 = "3;히후미;00;어떤가요? 목에 걸치고 있는 것 만으로도 잠이 솔솔 오지요?\n#3;closeup"
1000302-32 = "3;히후미;04;……하지만 이 목베개는 드릴 수 없어요. 저도 어렵게 얻은 물건이란 말이에요!\n#3;closeup"
1000302-33 = "3;히후미;99\n#3;em;…\n#3;closeup\n#wait;2500"
1000302-34 = "3;히후미;01;그래도 필요하시다면…… 가끔은 빌려드릴게요. \n#3;em;[///]\n#3;closeup\n#3;stiff"

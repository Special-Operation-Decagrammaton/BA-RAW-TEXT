[translation]
84312101305-6 = "聯絡方式？#n呃……可以嗎？"
84312101305-7 = "啊，我沒有不願意的意思。#n只是我第一次遇到有人向我開口要聯絡方式……"
84312101305-8 = "嗯？是嗎？我有點意外。#n因為你長得又酷又帥，我還以為你一定很受歡迎呢。"
84312101305-12 = "受，受歡迎！？你說我嗎！？"
84312101305-13 = "不是，先等一下！為什麼你說出那種話之後……還能一副若無其事的樣子啊！？"
84312101305-14 = "……？#n怎麼了？有什麼問題嗎？"
84312101305-20 = "（原來如此……我好像懂了。#n　看來這裡的學生之間的氛圍，跟我們有點不太一樣）"
84312101305-21 = "（這也是值得學習的一面呢……）"

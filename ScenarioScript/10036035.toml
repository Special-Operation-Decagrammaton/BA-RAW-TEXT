[translation]
10036035-13 = "Who's next?"
10036035-14 = "The festival is under our protection."
10036035-16 = "W-Who ARE they? How's their teamwork so perfect?"
10036035-17 = "I don't think we can do this. We've gotta pull back!"
10036035-18 = "Without the DJ?!"
10036035-20 = "YES, without the DJ!"
10036035-22 = "Damn it...! Retreat for now!"
10036035-26 = "Wait for us!"
10036035-31 = "...Phew, that takes care of that."
10036035-36 = "Yep, they're all gone."
10036035-37 = "[s] \"So what was their revenge about?\""
10036035-38 = "Don't know, but at least they had the sense to run."
10036035-44 = "And they didn't get this guy."
10036035-45 = "Hnnngh! Hngh! Hngh!"
10036035-46 = "Pardon us, Mister DJ B.o.B. We didn't mean to keep you waiting."
10036035-50 = "*gasp*"
10036035-51 = "Let's pick up where we left off. "
10036035-52 = "W-Wait. Why did you save me?"
10036035-53 = "Weren't you going to rough me up or something?"
10036035-54 = "That was never our intention...though things did happen, I suppose."
10036035-55 = "The point is, we didn't care for your conduct at the concert venue."
10036035-56 = "Overbearing, self-centered, harassing that poor part-timer."
10036035-62 = "Y-Yeah... So if you could please stop acting like a third-rate villain..."
10036035-63 = "It's fine to give her tasks, of course, but be reasonable and kind about it."
10036035-64 = "Yeah...?"
10036035-65 = "Okay."
10036035-66 = "Yeah, I guess I did let it go to my head a little bit. Especially since I hadn't been to the beach for a while."
10036035-67 = "[s] \"You're taking this surprisingly well...\""
10036035-68 = "Well, this whole little...walk here has kind of put things in perspective for me. Reminded me why I became a DJ in the first place."
10036035-69 = "Though doing it for thirty-six hours a day... Forget that."
10036035-70 = "Splendid. Be on your way, then."
10036035-71 = "Atsuko? You sure?"
10036035-72 = "If he's a liar, he's quite a convincing one. I choose to trust him."
10036035-73 = "Besides, we are all here for Saori, not to cause unnecessary trouble. "
10036035-74 = "...Hime has spoken."
10036035-75 = "Okay, yeah! And, um, thanks, I guess!"
10036035-80 = "...Not quite how I expected that to go, but it will do."
10036035-81 = "For all his faults, he struck me as a very...genuine person. I believe he'll keep his promise."
10036035-84 = "*pant* *pant*..."
10036035-85 = "All right, now to set up the turntable."
10036035-89 = " Part-timer! Um, Miss Part-timer!"
10036035-90 = "Ah, there you are. I moved all the equipment back, just like you told me, and all the stage decorations are exactly where you wanted them. Not a scratch on anything."
10036035-91 = "Good, good. I'm sure you did a great job."
10036035-92 = "In fact, you've done plenty. You should go ahead and take a break."
10036035-93 = "Um...a break? Well, thank you, but..."
10036035-94 = "Are you sure that's all right? I know you have a certain way you want things..."
10036035-95 = "Did something happen while you were out there?"
10036035-96 = "I, um, realized what's important in my life..."
10036035-97 = "See, I was out on a trail, and—"
10036035-101 = "[ns] \"Hold it!\""
10036035-102 = "*gasp* You! You were one of them!"
10036035-103 = "[s] \"Listen, Mister B.o.B, why not take a break in the shade over there? I'll lend a hand while you're doing that.\""
10036035-104 = "I-If you say so. I'll...be back then, I guess!"
10036035-108 = "S-Sensei?"
10036035-109 = "Did you, like, run all the way here or something? You're out of breath..."
10036035-110 = "[s3] \"I, uh, I was excited to see you, Saori.\"\n[s4] \"(Made it just in time...)\""
10036035-113 = "Don't get me wrong, it's good to see you, I just wasn't expecting you all of a sudden."
10036035-114 = "Did anything happen to the others? Atsuko, Misaki, Hiyori?"
10036035-115 = "[s] \"No, they're all enjoying the festival.\""
10036035-116 = "Oh, all right. Good."
10036035-117 = "I've been here, prepping the concert stage."
10036035-118 = "That DJ's hosting the main event, so look forward to that."
10036035-119 = "[s] \"Let me give you a hand.\""
10036035-120 = "Oh, no, this is my job, not yours..."
10036035-124 = "Whoa, that's heavy! At least let me lift it WITH you!"

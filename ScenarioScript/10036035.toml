[translation]
10036035-13 = "下一個。"
10036035-14 = "想破壞慶典的人，一個也不能放過。"
10036035-16 = "可，可惡！這些傢伙是從哪裡冒出來的，怎麼配合得這麼有默契……！"
10036035-17 = "光靠我們幾個搞不定，不如先溜了吧？"
10036035-18 = "可是得把DJ帶走才行啊……！"
10036035-20 = "你們以為有辦法輕易得逞嗎？"
10036035-22 = "可惡……！暫時撤退！"
10036035-26 = "等等我們啊！"
10036035-31 = "……呼，暫時擊退了。"
10036035-36 = "是，已經確認他們完全撤退了……"
10036035-37 = "[s]「為什麼會有太妹出現……？」"
10036035-38 = "雖然不清楚原因，但他們已經暫時撤退了。"
10036035-44 = "而且最重要的是，他們沒能帶走這個傢伙。"
10036035-45 = "唔唔唔！"
10036035-46 = "不好意思，DJ B.o.B先生。讓你久等了。"
10036035-50 = "噗哈！"
10036035-51 = "那麼，我們繼續剛才的話題吧。"
10036035-52 = "先，先等等。#n在那之前……為什麼要幫我？"
10036035-53 = "你們不是想對我不利嗎？"
10036035-54 = "我們從來沒有打算傷害你。#n雖然剛才確實稍微教訓了你一下……"
10036035-55 = "但之所以那麼做，只是因為看不慣你在準備表演時的行為罷了。"
10036035-56 = "不僅高高在上還自以為是，更別提欺負工讀生了。"
10036035-62 = "沒，沒錯……請不要再做那些三流反派的行為了……"
10036035-63 = "請人替你做事並沒有問題，不過提出不合理的要求或口出惡言是不對的。"
10036035-64 = "這樣啊……"
10036035-65 = "我明白了。"
10036035-66 = "咳哼，可能是我太久沒在夏天的海邊表演，所以一時有點昏頭了。"
10036035-67 = "[s]「竟然這麼簡單就聽進去了……？」"
10036035-68 = "嗯……經歷剛才那場危機之後，我突然想起了自己成為DJ的理由……"
10036035-69 = "居然要我一天不停刷碟36小時……#n光聽就覺得毛骨悚然……呃唔……"
10036035-70 = "嗯，很好。那你可以走了。"
10036035-71 = "敦子？這樣真的好嗎？"
10036035-72 = "嗯，既然他本人都這麼說了，我打算相信他一次。"
10036035-73 = "而且我們是為了幫助沙醬而來，並不是為了打架，對吧？"
10036035-74 = "……既然敦子都這麼說了，那好吧。"
10036035-75 = "那，那我就先走了。#n謝謝你們救我……！"
10036035-80 = "雖然事情的發展有點出乎意料，幸好最後還是圓滿落幕了。"
10036035-81 = "相信那個人一定會遵守承諾的。"
10036035-84 = "呼，呼……"
10036035-85 = "接下來是……擺放唱盤吧。"
10036035-89 = "打工仔！啊不是，工讀生小姐！"
10036035-90 = "啊，你回來啦。#n我已經按照指示，把所有的器材擺放到正確的位置，舞台裝飾也有重新調整。#n當然在移動器材的時候，我都有盡可能小心──"
10036035-91 = "很好很好。你做得很好。"
10036035-92 = "這樣就行了。去稍微休息一下吧。"
10036035-93 = "唔嗯……謝謝你的好意……不過這樣讓我有點受寵若驚。"
10036035-94 = "真的已經沒問題了嗎？#n我記得你之前說過，對這方面的要求很嚴格……"
10036035-95 = "剛才發生了什麼事嗎？"
10036035-96 = "該怎麼說呢……#n你就當成我體悟到了自己的人生有多麼寶貴吧……"
10036035-97 = "其實我剛才去散步的時候──"
10036035-101 = "[ns]「停停停！到此為止！」"
10036035-102 = "啊！你是剛才的……！"
10036035-103 = "[s]「B.o.B先生，你要不要去陰涼處休息一下？剩下的就讓我來幫忙吧！」"
10036035-104 = "那，那我就先失陪了！"
10036035-108 = "老，老師……！"
10036035-109 = "你是一路跑過來的嗎？#n怎麼喘成這樣……"
10036035-110 = "[s3]「我，我是因為看到沙織太開心了才情不自禁……」\n[s4]（真是好險……！）"
10036035-113 = "讓我有點驚訝。沒想到老師居然會突然出現在這裡。"
10036035-114 = "難道是敦子、美咲跟日和出了什麼事嗎？"
10036035-115 = "[s]「沒事沒事，他們在慶典上玩得很開心。」"
10036035-116 = "是嗎？那就好。"
10036035-117 = "我剛才也在認真地準備舞台。"
10036035-118 = "畢竟DJ表演是這場慶典的重頭戲，還請拭目以待。"
10036035-119 = "[s]「我也來幫忙吧。」"
10036035-120 = "沒，沒關係。#n讓老師幫忙的話，我會很不好意思的……！"
10036035-124 = "啊！那東西很重！我們一起抬吧！"

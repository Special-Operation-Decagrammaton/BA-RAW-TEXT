[translation]
10036035-13 = "สเต็ปต่อไป"
10036035-14 = "ฉันไม่ให้อภัยคนที่คิดจะทำลายงานเทศกาลหรอก"
10036035-16 = "นะ... หน็อย! พวกเธอเป็นใครมาจากไหน ทำไมถึงทำงานเป็นทีมได้ดีอย่างนี้...?"
10036035-17 = "ลำพังแค่พวกเราไม่น่าจะสู้ไหวนะ ยอมแพ้แล้วหนีกันเถอะ"
10036035-18 = "แต่เราต้องเอาตัวดีเจไปนะ...!"
10036035-20 = "คิดว่าฉันจะปล่อยให้พวกเธอทำอย่างนั้นเหรอ?"
10036035-22 = "เวรแล้ว...! ใส่เกียร์หมาก่อนแล้วกัน!"
10036035-26 = "อย่าทิ้งกันเซ่!"
10036035-31 = "ฮู่ว... ไล่พวกนั้นไปได้แล้ว"
10036035-36 = "ค่ะ พวกนั้นล่าถอยไปแล้วค่ะ..."
10036035-37 = "[s] \"ว่าแต่ทำไมพวกแยงกี้ถึงได้...?\""
10036035-38 = "ฉันก็ไม่รู้สาเหตุเหมือนกัน แต่ทางนั้นน่าจะยอมรับความพ่ายแพ้และล่าถอยไปแล้วละ"
10036035-44 = "สิ่งที่สำคัญกว่านั้นคือดีเจที่พวกนั้นเอาตัวไปไม่ได้ต่างหาก"
10036035-45 = "อุ๊บบ!!"
10036035-46 = "ขอโทษนะดีเจ B.o.B รอนานเลยใช่มั้ย?"
10036035-50 = "เฮือก!"
10036035-51 = "งั้นมาคุยเรื่องของเราต่อกันดีกว่า"
10036035-52 = "ดะ... เดี๋ยวก่อน... ก่อนจะคุยอะไร ฉันอยากรู้ว่าทำไมพวกเธอถึงช่วยฉันไว้?"
10036035-53 = "ไม่ได้จะทำร้ายฉันหรอกเหรอ?"
10036035-54 = "ฉันไม่คิดจะทำร้ายหรอก ถึงจะลงไม้ลงมือไปบ้างแล้วก็เถอะ..."
10036035-55 = "พวกเราแค่ไม่ชอบพฤติกรรมของคุณระหว่างเตรียมการแสดงดนตรีน่ะ"
10036035-56 = "ทั้งหยิ่งยโสและเอาแต่ใจตัวเอง แล้วก็หยุดรังแกเด็กพาร์ทไทม์ได้แล้ว"
10036035-62 = "ชะ... ใช่ค่ะ... เลิกทำตัวเป็นวายร้ายชั้นต่ำเถอะค่ะ..."
10036035-63 = "ฉันไม่ว่าอะไรเรื่องการสั่งงานหรอกนะ แต่อย่าร้องขออะไรที่มันดูไม่สมเหตุสมผล แล้วก็อย่าพูดจา#nรุนแรงด้วย"
10036035-64 = "งั้นเหรอ..."
10036035-65 = "เข้าใจแล้ว"
10036035-66 = "ฮึ่ม ฉันไม่ได้มาเที่ยวทะเลนานแล้ว สงสัยฉันจะทำตัวโอเวอร์มากไปหน่อยสินะ"
10036035-67 = "[s] \"แปลกจัง ยอมรับแต่โดยดีเลยแฮะ...?\""
10036035-68 = "ก็... พอได้ผ่านวิกฤตเมื่อกี้มา ฉันก็ได้ย้อนกลับไปคิดถึงเหตุผลที่มาเป็นดีเจอีกครั้งน่ะ..."
10036035-69 = "ถ้าให้ไปสแครชแผ่นวันละ 36 ชั่วโมง... ฉันไม่เอาด้วยหรอก... ใครจะไปทำไหว..."
10036035-70 = "อื้ม ดีแล้วละ งั้นก็ไปได้แล้ว "
10036035-71 = "อาสึโกะ? ปล่อยไปแบบนี้จะไม่เป็นอะไรเหรอ?"
10036035-72 = "ถ้าเจ้าตัวถึงกับพูดแบบนั้น ฉันก็อยากจะเชื่อดูน่ะ"
10036035-73 = "พวกเราไม่ได้จะมาต่อสู้ แต่เรามาช่วยซัตจังกันไม่ใช่เหรอ?"
10036035-74 = "ถ้าอาสึโกะว่าอย่างนั้นละก็..."
10036035-75 = "อะ... อื้ม ขอบใจที่ช่วยนะ...!"
10036035-80 = "ถึงจะต่างจากที่คิดไปนิดหน่อย แต่ก็ถือว่าคลี่คลายได้แล้วมั้ยนะ"
10036035-81 = "ถ้าเขาพูดถึงขนาดนั้น เขาก็น่าจะรักษาสัญญานั่นละ"
10036035-84 = "แฮ่ก... แฮ่ก..."
10036035-85 = "ต่อไปก็ต้อง... เอาเครื่องเล่นแผ่นเสียงไปวางสินะ"
10036035-89 = "เด็กพาร์ทไทม์! ไม่สิ น้องพาร์ทไทม์!"
10036035-90 = "อ้อ กลับมาแล้วสินะ ฉันจัดอุปกรณ์ทั้งหมดเข้าที่แล้ว ส่วนพร็อพบนเวทีก็ย้ายไปตามที่สั่งแล้ว แน่นอนว่าฉันระมัดระวังกับการยกของทุกชิ้น..."
10036035-91 = "เยี่ยมเลย ฉันรู้อยู่แล้วละว่าเธอจะทำได้ดี"
10036035-92 = "ทำแค่นี้ก็พอแล้วละ ไปพักผ่อนเถอะ"
10036035-93 = "อะ... อืม... ขอบใจนะ... แต่ทำไมจู่ๆ ถึงเป็นแบบนี้ล่ะ"
10036035-94 = "ทุกอย่างบนเวทีใช้ได้แล้วเหรอ? ไหนว่าจะเข้มงวดกับเรื่องนี้ไง..."
10036035-95 = "ไปเจอเรื่องอะไรมาหรือเปล่า?"
10036035-96 = "ต้องบอกยังไงดีล่ะ... ฉันตระหนักได้ถึงคุณค่าของชีวิตตัวเองน่ะ..."
10036035-97 = "เมื่อกี้ฉันไปเดินเล่นมา..."
10036035-101 = "[ns] \"สต็อป! หยุดเล่า!\""
10036035-102 = "เฮือก! คุณคือ! คนที่เจอเมื่อกี้!"
10036035-103 = "[s] \"คุณ B.o.B เข้าร่มไปพักตรงนั้นสักหน่อยเถอะ ฉันจะช่วยเอง!\""
10036035-104 = "ถะ... ถ้างั้นก็รบกวนด้วยนะ!"
10036035-108 = "คะ... ครู...!"
10036035-109 = "รีบวิ่งมาเหรอ? หอบแฮ่กๆ มาเลย..."
10036035-110 = "[s3] \"คะ... ครูดีใจที่เจอซาโอริน่ะ\"\n[s4] (เกือบไปแล้วมั้ยล่ะ...!)"
10036035-113 = "จู่ๆ ก็โผล่มาแบบนี้ ฉันตกใจนะ"
10036035-114 = "หรือว่าเกิดเรื่องอะไรกับอาสึโกะ มิซากิ และฮิโยริเหรอ?"
10036035-115 = "[s] \"ไม่หรอก ทุกคนกำลังสนุกกับงาน ไม่มีปัญหาอะไรเลย\""
10036035-116 = "งั้นเหรอ ถ้างั้นก็ดีแล้วละ"
10036035-117 = "ฉันเองก็กำลังตั้งใจเตรียมเวทีสำหรับการแสดงดนตรีอยู่พอดี"
10036035-118 = "โชว์จากดีเจเป็นอีเวนต์หลักของงานนี้เลยละ ตั้งตารอได้เลย"
10036035-119 = "[s] \"ครูก็จะช่วยอีกแรงนะ\""
10036035-120 = "มะ... ไม่ต้องหรอก ฉันไม่กล้าสั่งงานครูหรอกนะ...!"
10036035-124 = "อ๊ะ! อันนั้นมันหนักนะ! เดี๋ยวฉันช่วยยกเอง!"

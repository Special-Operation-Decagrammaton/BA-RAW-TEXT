[translation]
1301106-1 = "Peachy Stamp Rally"
1301106-2 = "Millennium Electronics Market Haru Habara"
1301106-6 = "Ugh, I wish I had known earlier!"
1301106-7 = "[s] \"Momoi, what's the matter?\""
1301106-8 = "There's a stamp rally going on for the Ultra Marine Sisters' fortieth anniversary..."
1301106-9 = "This event is truly worthy of a fortieth anniversary celebration. There are forty stamp locations all over Haru Habara, and if you collect them all, you can exchange them all for an exclusive reward."
1301106-10 = "But the deadline is at 2 PM today..."
1301106-12 = "What do I do, Sensei? There are less than two hours left!"
1301106-13 = "It's been a while since I've been to an event that was offering a prize I really wanted!"
1301106-14 = "[s] \"Momoi.\""
1301106-15 = "Huh...?"
1301106-16 = "[s] \"It's too early to give up! You never know until you try.\""
1301106-17 = "B-But, Sensei, what are you saying?"
1301106-18 = "[s1] \"There's two of us here, Momoi.\"\n[s2] \"So, it's time to bust out your specialty.\""
1301106-19 = "What's that?"
1301106-21 = "What's that?"
1301106-23 = "Oh... You mean two-player co-op!"
1301106-24 = "You're absolutely right, Sensei!"
1301106-25 = "There is no such thing...as an impossible quest!"
1301106-26 = "Okay, Sensei! Let's split up here!"
1301106-27 = "Let's each take half of the targets and collect all the stamps!"
1301106-28 = "I'm counting on you, Sensei."
1301106-29 = "[s] \"Right.\""
1301106-31 = "(After a great deal of effort, I filled my quota of twenty stamps just in time.)"
1301106-33 = "[ns] \"I was able to get all the stamps, but I don't know where Momoi is...\""
1301106-34 = "Oh, Sensei, here. Over here."
1301106-37 = "― Look, Sensei! I filled out this stamp card![wa:2400] "
1301106-39 = "― Now this quest is cleared! Yay![wa:2140] "
1301106-42 = "― I wasn't sure how it was going to go at first...[wa:300] "
1301106-44 = "― But you and I...we make a great team, Sensei![wa:730] "
1301106-47 = "― Wooow! Sensei...[wa:2460] "
1301106-49 = "― You're so sweaty! Are you okay?[wa:870] "
1301106-52 = "― Hahaha! I'm glad you said it's okay.[wa:450] "
1301106-54 = "― I had lots of fun today thanks to you, Sensei![wa:910] "
1301106-57 = "― If there's ever another event like this...[wa:670] "
1301106-59 = "― ...we should go together again, Sensei![wa:1920] "
1301106-62 = "We're...on time! Come on, let's go to the exchange center."
1301106-63 = "Let's go nab our hard-earned spoils!"
1301106-64 = "As thanks, I'll buy you a drink on the way back!"
1301106-66 = "(So, sipping on the drinks Momoi bought, we leisurely headed to the exchange center to trade in the stamps.)"

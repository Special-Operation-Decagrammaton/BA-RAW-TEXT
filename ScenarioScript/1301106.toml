[translation]
1301106-1 = "แสตมป์แรลลี่สีพีช"
1301106-2 = "ฮารุฮาบะระ ย่านร้านเครื่องใช้ไฟฟ้าในมิลเลเนียม"
1301106-6 = "ถะ... ถ้ารู้เร็วกว่านี้ก็ดีสิ!"
1301106-7 = "[s] \"มีอะไรเหรอ โมโมอิ?\""
1301106-8 = "แสตมป์แรลลี่ของอัลตร้า มารีน ซิสเตอร์..."
1301106-9 = "สมกับเป็นกิจกรรมครบรอบ 40 ปีจริงๆ มันเป็นกิจกรรมที่เมื่อสะสมแสตมป์ในย่านฮารุฮาบะระ#nลงในกระดาษครบ 40 ดวงก็จะนำไปแลกรางวัลพิเศษได้น่ะ"
1301106-10 = "แต่กำหนดก็คือภายในบ่ายสองวันนี้..."
1301106-12 = "ทำยังไงดีคุณครู เหลือเวลาอีกไม่ถึงสองชั่วโมงแล้ว!"
1301106-13 = "ฉันอยากได้รางวัลของอีเวนต์นี้จริงๆ นะ!"
1301106-14 = "[s] \"โมโมอิ\""
1301106-15 = "หืม...?"
1301106-16 = "[s] \"ยังเร็วไปที่จะยอมแพ้! เรายังไม่รู้จนกว่าจะได้ลองทำดูหรอกนะ\""
1301106-17 = "ตะ... แต่ว่าคุณครู เราจะทำได้ยังไงกันล่ะ...?"
1301106-18 = "[s1] \"โมโมอิ เรามีตั้งสองคนนะ\" \n[s2] \"ถึงตาโมโมอิแสดงความสามารถแล้ว\""
1301106-19 = "อะไรเหรอ?"
1301106-21 = "อะไรเหรอ?"
1301106-23 = "อ๋อ... หมายถึงผู้เล่นคู่! 1P กับ 2P สินะ!"
1301106-24 = "คุณครูพูดถูกแล้วล่ะ!"
1301106-25 = "เควสที่เป็นไปไม่ได้น่ะ... ไม่มีอยู่หรอก!#nไม่ลองก็ไม่รู้สินะ!"
1301106-26 = "เอาละ ถ้างั้นเราแยกกันตรงนี้เลย!"
1301106-27 = "แยกกันไปตามจุดต่างๆ เพื่อเก็บแสตมป์ให้ครบ!"
1301106-28 = "ฝากด้วยนะ! คุณครู!"
1301106-29 = "[s] \"อื้ม\""
1301106-31 = "(หลังจากทุ่มสุดตัว คุณครูกับโมโมอิก็เก็บแสตมป์คนละ 20 ดวงได้ทันเวลา)"
1301106-33 = "[ns] \"ทางนี้ครบแล้ว โมโมอิจะเก็บครบรึยังนะ...\""
1301106-34 = "อ๊ะ คุณครู! ทางนี้ๆ!"
1301106-37 = "― ดูนี่สิ! คุณครู! ฉันเก็บแสตมป์ได้ครบแล้วล่ะ![wa:2360] "
1301106-39 = "― อ่ะแฮ่ม! เควสเคลียร์![wa:2540] "
1301106-42 = "― ตอนแรกคิดว่าจะทำเควสไม่ผ่านซะแล้ว[wa:900] "
1301106-44 = "― อื้ม! ว่าแล้วเชียว ฉันกับคุณครู เราเป็นทีมที่ลงตัวจริงๆ![wa:290] "
1301106-47 = "― อ๊ะ! คุณครู![wa:2620] "
1301106-49 = "― ทำไมเหงื่อโชกหน้าขนาดนั้นล่ะ?! เป็นอะไรรึเปล่า?[wa:230] "
1301106-52 = "― อะฮ่ะฮ่า! ค่อยยังชั่วหน่อยที่บอกว่าไม่เป็นไร[wa:130] "
1301106-54 = "― วันนี้ฉันสนุกมากๆ เลยล่ะ เพราะมีคุณครูอยู่ด้วยไง[wa:830] "
1301106-57 = "― เอาไว้คราวหน้า... ถ้ามีอีเวนต์แบบนี้อีกละก็...[wa:510] "
1301106-59 = "― ไว้เราสองคนมา... มาเล่นด้วยกันแบบวันนี้กันนะ! คุณครู![wa:1360] "
1301106-62 = "ทันเวลาพอดี... ไปจุดแลกรางวัลกันเถอะ!"
1301106-63 = "มาดูของรางวัลจากการรวมพลังของฉันกับคุณครูกันเถอะ!"
1301106-64 = "เพื่อเป็นการขอบคุณ ฉันจะเลี้ยงเครื่องดื่มให้ระหว่างทางกลับเอง!"
1301106-66 = "(คุณครูจิบเครื่องดื่มที่โมโมอิซื้อให้ และมุ่งหน้าไปยังจุดแลกของรางวัลเพื่อนำแสตมป์ไปแลก)"

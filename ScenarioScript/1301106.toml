[translation]
1301106-1 = "桃色集章活動"
1301106-2 = "千年電器街．春葉原"
1301106-6 = "嗚，要是早點注意到就好了……！"
1301106-7 = "[s] 「怎麼了嗎？」"
1301106-8 = "這個《究極瑪琳姊妹》的集章活動……"
1301106-9 = "因為是40周年的活動，所以要在春葉原全區蒐集完40個印章才能交換限定商品，"
1301106-10 = "仔細一看是有時間限制的，而且只到下午2點……"
1301106-12 = "怎麼辦呀老師，只剩下2小時了！"
1301106-13 = "我超級想要那個限定商品的……這樣下去的話……！"
1301106-14 = "[s] 「冷靜點，桃井。」"
1301106-15 = "老師……？"
1301106-16 = "[s] 「我覺得要絕望還太早了唷？」"
1301106-17 = "可，可是老師，現在才開始的話要怎麼……"
1301106-18 = "[s1] 「桃井不是一個人，對吧？」\n[s2] 「輪到桃井展現特技的時候囉。」"
1301106-19 = "那是什麼意思……？"
1301106-21 = "那是什麼意思……？"
1301106-23 = "啊……！是1P和2P的合作模式！"
1301106-24 = "確實是這樣呢！"
1301106-25 = "在開始挑戰之前，究竟是不是不可能的任務還不知道……！"
1301106-26 = "好，老師！我們開始分頭行動吧！"
1301106-27 = "只要各自都能集到一半的印章的話……！"
1301106-28 = "那邊就交給你了！老師！"
1301106-29 = "[s] 「了解！」"
1301106-31 = "（努力衝刺的結果，總算在時限之內集到了20個印章）"
1301106-33 = "[ns] 「總算是收集完我這邊的了……」"
1301106-34 = "啊，老師！這裡這裡！"
1301106-37 = "― 老師你看！我這邊的印章全都集滿了唷！[wa:3400] "
1301106-39 = "― 這樣一來就是任務完成了，對吧！太好了！[wa:2620] "
1301106-42 = "― 一開始還想說不知道會怎麼樣呢……[wa:1580] "
1301106-44 = "― 老師果然和我很合拍呢！[wa:2090] "
1301106-47 = "― 呃，哇啊！？老師！？[wa:2700] "
1301106-49 = "― 都滿身大汗了！還好嗎！？[wa:1630] "
1301106-52 = "― 啊哈，沒事真是太好了。[wa:1450] "
1301106-54 = "― 今天也託老師的福，過得非常開心唷！[wa:2070] "
1301106-57 = "― 如果以後還有這種活動的話，[wa:1830] "
1301106-59 = "― 那個時候，我們再一起參加吧！老師！[wa:2800] "
1301106-62 = "時間也……沒問題呢。那麼我們就去交換所吧！"
1301106-63 = "證明我和老師一起努力過的戰利品，得要確實拿到才行！"
1301106-64 = "啊，作為感謝，我請老師喝飲料！"
1301106-66 = "（慢慢喝著桃井買來的飲料，兩人一起悠哉地走向交換所）"

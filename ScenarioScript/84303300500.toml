[translation]
84303300500-5 = "สวัสดีค่ะ เอ่อ..."
84303300500-6 = "ทะ... ทำไมกัน... ทำไมถึงเป็นแบบนี้..."
84303300500-7 = "...??"
84303300500-8 = "(อะ... อะไรน่ะ บรรยากาศมันแปลกๆ นะ...?)"
84303300500-9 = "เป็นไปไม่ได้ ไม่มีทางเป็นแบบนี้สิ...! เมื่อวานยังปกติอยู่เลยนี่นา...?!"
84303300500-10 = "เป็นอะไรไปคะ...? มีเรื่องอะไรเกิดขึ้นหรือเปล่า...?"
84303300500-11 = "อ่า... อ่า...!"
84303300500-12 = "ขอโทษค่ะ ขอโทษด้วยค่ะ! พวกฉันไม่ได้ตั้งใจ... ไม่สิ ไม่ได้ทำให้เป็นแบบนี้ตั้งแต่แรกด้วย...!"
84303300500-13 = "ใจเย็นๆ ก่อนนะคะ ฉันไม่ได้มาเพื่อตำหนิพวกคุณหรอกค่ะ"
84303300500-14 = "แต่คุณช่วยเล่าสถานการณ์ให้ฉันฟังได้มั้ยคะ? ฉันรู้สึกเหมือน..."
84303300500-19 = "ข้างนอกจะมี... เรื่องวุ่นวายเกิดขึ้นน่ะค่ะ..."
84303300500-20 = "ตะ... ตอนนี้มีการต่อสู้ครั้งใหญ่เกิดขึ้นข้างนอกค่ะ"
84303300500-21 = "ฉันเองก็ไม่รู้เหตุผลที่แน่ชัด... แต่คนที่เล่นเกมของพวกฉันน่าจะไปสู้กันน่ะค่ะ"
84303300500-22 = "คนที่เล่นเกม... จู่ๆ ก็ไปสู้กันเหรอคะ?"
84303300500-23 = "น่าแปลกนะคะ นั่นไม่เหมือนที่เราทำมานี่นา... ไม่สิ เกมของพวกเราเป็นแนวนั้นก็จริง แต่ไม่ได้ทำมาให้คนทะเลาะกันนะ...! "
84303300500-24 = "ถะ... ถึงจะฟังดูแปลก แต่มันเป็นเรื่องจริงนะคะ! นี่ไม่ใช่ความตั้งใจของพวกเรานะคะ...!"
84303300500-25 = "ฉันเข้าใจแล้วค่ะ พวกคุณพักกันตรงนี้ก่อนเถอะค่ะ ไม่ต้องกังวลนะคะ"
84303300500-26 = "ฉันจะไปดูสถานการณ์ให้เองค่ะ"

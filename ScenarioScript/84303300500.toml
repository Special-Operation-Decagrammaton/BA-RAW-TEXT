[translation]
84303300500-5 = "你好。那個……"
84303300500-6 = "怎，怎麼會……為什麼會變成這樣……"
84303300500-7 = "……？？"
84303300500-8 = "（怎，怎麼了？氣氛好像怪怪的……？）"
84303300500-9 = "怎麼可能，這不可能啊……！#n明明昨天還不是這樣的……！？"
84303300500-10 = "你沒事吧……？請問發生什麼事了……"
84303300500-11 = "啊，啊啊……！"
84303300500-12 = "對不起，對不起！#n我們絕對沒有那個意思……真的不是為了這個而製作的……！"
84303300500-13 = "請先冷靜下來。我不是來責怪你們的。"
84303300500-14 = "可以告訴我現在是什麼情況嗎？外面好像……"
84303300500-19 = "發生了……某種騷動……"
84303300500-20 = "現，現在外面有人在吵架。"
84303300500-21 = "確切的理由目前還不清楚……但應該是玩過我們遊戲的人吵起來了。"
84303300500-22 = "玩過遊戲之後……突然打了起來？"
84303300500-23 = "太奇怪了。這和我們製作的……#n不對，雖然我們是那樣製作沒錯，但沒有要讓大家打起來的意思……！"
84303300500-24 = "我，我知道聽起來很奇怪，但我是說真的！這不是我們的本意……！"
84303300500-25 = "你先在這裡好好休息吧。不用太擔心。"
84303300500-26 = "我去看看情況。"

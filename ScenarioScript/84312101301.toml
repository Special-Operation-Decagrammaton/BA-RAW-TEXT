[translation]
84312101301-5 = "Come to think of it, we haven't really said a proper farewell."
84312101301-6 = "A farewell? I don't really feel like it..."
84312101301-7 = "Besides, I'm sure you can infiltrate my room whenever you want."
84312101301-8 = "Whoa, is that an invitation? Can a Tea Party member do that?"
84312101301-9 = "Of course not. That's why I said \"infiltrate.\" If you get caught, I don't know anything about it."
84312101301-10 = "That being said, I have faith that the mighty C&C president would never get caught."
84312101301-11 = "Ha... You are going to wear me out."
84312101301-12 = "You're audacious, but I don't dislike that about you."
84312101301-13 = "Thanks for the compliment."
84312101301-14 = "It's not a compliment."
84312101301-15 = "Anyway, yeah. Call me if you need anything. Like you said, it won't take much for me to sneak in."
84312101301-16 = "...Fufu. Wonderful."
84312101301-17 = "Just what I wanted to hear."

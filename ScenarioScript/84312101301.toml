[translation]
84312101301-5 = "จะว่าไป เราสองคนก็ยังไม่ได้บอกลากันจริงๆ จังๆ เลยนะ"
84312101301-6 = "การกล่าวลาครั้งสุดท้ายของเราเหรอคะ? แต่ฉันไม่อยากทำอย่างนั้นเลย..."
84312101301-7 = "และถ้าเป็นคุณแล้วน่ะ เนรุ ฉันว่าคุณน่าจะลอบเข้าห้องของฉันได้ทุกเมื่อเลยค่ะ"
84312101301-8 = "อะไรกัน เชื้อเชิญกันดื้อๆ แบบนี้เลย? สมาชิกสภาน้ำชาทำแบบนี้ได้ด้วยเหรอ?"
84312101301-9 = "ไม่ได้อยู่แล้วค่ะ ฉันก็เลยตั้งใจใช้คำว่า \"ลอบเข้ามา\" ยังไงล่ะคะ แต่ถ้าโดนจับได้ ฉันจะทำเป็นไม่รู้เรื่องนะคะ"
84312101301-10 = "ที่ฉันพูดแบบนั้นก็เพราะ... ฉันรู้ว่าหัวหน้า C&C คนเก่งคงไม่ถูกใครจับได้หรอกค่ะ"
84312101301-11 = "เฮ้อ... จริงๆ เลย เธอเป็นคนประเภทที่ทำให้คนอื่นเค้าเหนื่อยใจจริงๆ เลยนะ"
84312101301-12 = "เธอพูดจาขวานผ่าซากแบบนี้ แต่ทำไมฉันถึงได้ยังชอบอยู่นะ?"
84312101301-13 = "ขอบคุณที่ชมค่ะ"
84312101301-14 = "ไม่ได้ชมสักหน่อย!"
84312101301-15 = "เอาเถอะ ถ้าอยากให้ช่วยอะไรก็เรียกแล้วกัน ให้ลอบเข้าไปมันก็ไม่ใช่เรื่องยากสำหรับฉัน อย่างที่เธอว่านั่นแหละ"
84312101301-16 = "ฮุฮุ... ค่ะ"
84312101301-17 = "ฉันอยากได้ยินคำตอบนี้ละค่ะ"

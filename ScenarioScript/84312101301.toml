[translation]
84312101301-5 = "這麼說來，我們之間還沒有好好打過招呼耶。"
84312101301-6 = "你是指道別嗎？#n我倒不是很想這麼做……"
84312101301-7 = "而且如果寧瑠有那個意思，應該隨時都能潛入我的房間吧。"
84312101301-8 = "怎麼，這是在允許我那麼做嗎？#n茶會的高層說這種話沒問題嗎？"
84312101301-9 = "當然不行。所以我才會用「潛入」這個詞啊。#n要是你被抓到的話，我也會裝作不認識的。"
84312101301-10 = "雖然……我並不認為天下第一的C&C隊長會被抓到就是了。"
84312101301-11 = "哈……受不了，跟你相處真的很累耶。"
84312101301-12 = "明明這麼失禮，卻討厭不起來的那種感覺？"
84312101301-13 = "謝謝你的讚美。"
84312101301-14 = "這才不是讚美咧。"
84312101301-15 = "總之就先這樣吧。有需要的話就跟我說一聲。#n畢竟就像你說的一樣，要潛進去找你根本不算什麼。"
84312101301-16 = "……呵呵。我明白了。"
84312101301-17 = "那正是我想聽到的回答。"

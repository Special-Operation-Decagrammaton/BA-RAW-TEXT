83300100500-6 = "3;히나;16;잠깐, 괜찮을까?"
83300100500-7 = "3;선도부원;04;앗, 아아앗!\n#3;em;[?!]\n#3;shake\n#3;a"
83300100500-8 = "3;선도부원;02;넵! 부장님! 뭐든지 명령만 내려주십시오!\n#3;jump"
83300100500-9 = "3;히나;14;아니, 명령할 생각으로 온 건 아니야.\n#3;em;[땀]"
83300100500-10 = "3;히나;14;다른 게 아니라, 지금 게헨나 내부 분위기가 다소 어수선한 느낌인 것 같은데."
83300100500-11 = "3;선도부원;06;죄, 죄, 죄송합니다! 시정하겠습니다!\n#3;greeting"
83300100500-12 = "3;히나;04;응? 시정……?"
83300100500-13 = "3;선도부원;06;이제 막 혹한기 훈련을 끝마치고 온 주제에, <게헨나 파티>가 열린다는 소식에 가슴 설레다니.\n#3;stiff"
83300100500-14 = "3;선도부원;06;역시 선도부 부원으로서 자각이 부족한 것이겠지요! 죄송합니다!\n#3;em;[!]\n#3;jump"
83300100500-15 = "3;히나;05;게헨나 파티……?\n#3;em;[?]"
83300100500-16 = "1;아코;04;아, 부장님……!\n#1;ar\n#3;m5"
83300100500-17 = "3;히나;01;아코? 왜 그래?\n#3;em;[?]"
83300100500-18 = "1;아코;04;주변에서 탐문을 해보니 아무래도 저희가 혹한기 훈련으로 자리를 비운 사이에……\n#1;stiff"
83300100500-19 = "1;아코;05;학원 내에서 발렌타인 데이 기념 <게헨나 파티>가 열린다는 이야기가 나온 모양이에요!\n#1;em;[!]\n#1;jump"
83300100500-20 = "3;히나;01;……그 이야기라면 나도 들었어."
83300100500-21 = "3;히나;99;그러고 보면 매년 이맘때 게헨나에서 파티가 열리곤 했었지. 슬슬 그럴 시기가 왔나.\n#3;m3\n#1;dl"
83300100500-22 = "3;히나;02;하지만 이번엔 뭔가 여느 때보다 좀 더 분위기가 어수선한 느낌인데. 좀 더 자세한 정보를 얻을 수 없을까."
83300100500-23 = "3;선도부원;02;아, 넵! 그거라면 마침 <게헨나 파티>를 위해 선제적으로 급양부가 대응하고 있다는 이야기를 들었습니다!\n#3;jump"
83300100500-24 = "3;히나;02;급양부에서……?\n#3;em;[반응]"
83300100500-25 = "3;히나;99;좋아. 그럼 나는 급양부로 향해볼게."
83300100500-26 = "3;히나;01;아코는 이 주변에서 좀 더 정보를 수집해 줘."
83300100500-27 = "3;아코;05;네! 맡겨만 주세요!\n#3;em;[!]"
83300100500-28 = "#wait;100"

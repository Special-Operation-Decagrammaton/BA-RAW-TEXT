[translation]
83300100500-6 = "可以打擾一下嗎？"
83300100500-7 = "啊啊啊！"
83300100500-8 = "是！委員長！任何事都請儘管吩咐！"
83300100500-9 = "不，我不是來下達命令的。"
83300100500-10 = "只是覺得格黑娜內部的氣氛有點混亂。"
83300100500-11 = "非，非，非常抱歉！我立刻更正！"
83300100500-12 = "嗯？更正……？"
83300100500-13 = "耐寒訓練明明才剛結束，竟然就因為要舉辦「格黑娜派對」的消息而心浮氣躁……"
83300100500-14 = "是我身為風紀委員的自覺不足！實在很抱歉！"
83300100500-15 = "格黑娜派對……？"
83300100500-16 = "啊，委員長……！"
83300100500-17 = "亞子？怎麼了？"
83300100500-18 = "詢問周圍後發現，似乎在我們進行耐寒訓練離開的期間……"
83300100500-19 = "學園裡似乎傳出要舉辦紀念情人節的「格黑娜派對」的消息！"
83300100500-20 = "……我也聽說了。"
83300100500-21 = "這麼說來，每年這個時期都會舉辦派對吧。#n原來已經到這個時候了嗎？"
83300100500-22 = "不過總覺得這次的氣氛比平常還要混亂。#n能取得更詳細的情報嗎？"
83300100500-23 = "啊，是！我正巧打聽到供給部已經提前為「格黑娜派對」採取了應對措施！"
83300100500-24 = "供給部……？"
83300100500-25 = "知道了，那我去供給部一趟。"
83300100500-26 = "亞子就在附近多收集一些情報吧。"
83300100500-27 = "是！儘管交給我吧！"

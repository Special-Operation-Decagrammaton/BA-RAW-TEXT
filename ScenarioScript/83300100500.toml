[translation]
83300100500-6 = "พอจะมีเวลาสักครู่ไหม?"
83300100500-7 = "อ๊ะ!"
83300100500-8 = "ค่ะ! ท่านประธาน! ออกคำสั่งมาได้เลยค่ะ!"
83300100500-9 = "ไม่ใช่ ฉันไม่ได้มาที่นี่เพื่อจะออกคำสั่งอะไรหรอก"
83300100500-10 = "ที่มาก็เพราะตอนนี้บรรยากาศภายในเกเฮนน่ามันดูวุ่นวายนิดหน่อยน่ะ"
83300100500-11 = "ขะ... ขะ... ขออภัยด้วยค่ะ! ฉันจะปรับปรุงค่ะ!"
83300100500-12 = "หืม? ปรับปรุงเหรอ...?"
83300100500-13 = "เมื่อวานหลังจากกลับมาจากการฝึกฤดูหนาว ฉันก็ตื่นเต้นกับข่าวที่ว่าจะมีการจัด <ปาร์ตี้แห่งเกเฮนน่า>"
83300100500-14 = "ในฐานะของคณะกรรมการวินัยแล้ว แบบนี้ถือว่ายังบกพร่องค่ะ! ต้องขอโทษด้วยค่ะ!"
83300100500-15 = "ปาร์ตี้เกเฮนน่า...?"
83300100500-16 = "อ๊ะ ท่านประธาน...!"
83300100500-17 = "อาโกะ? มีอะไรเหรอ?"
83300100500-18 = "จากการสืบหาข่าวในบริเวณรอบๆ ดูเหมือนว่าระหว่างที่พวกเราไปฝึกฤดูหนาวกัน..."
83300100500-19 = "ในโรงเรียนก็มีการพูดถึง <ปาร์ตี้เกเฮนน่า> ที่จะจัดขึ้นเพื่อรับวันวาเลนไทน์น่ะค่ะ!"
83300100500-20 = "ถ้าเป็นเรื่องนั้นฉันก็ได้ยินมาเหมือนกัน"
83300100500-21 = "จะว่าไป ปกติในช่วงนี้ของทุกปีก็จะมีการจัดปาร์ตี้ในเกเฮนน่า เวลานั้นใกล้จะมาถึงอีกแล้วเหรอ"
83300100500-22 = "แต่ฉันว่าครั้งนี้บรรยากาศค่อนข้างวุ่นวายมากกว่าปีก่อนๆ เราจะหาข้อมูลอะไรเพิ่มเติมอีกได้ไหมนะ?"
83300100500-23 = "อ๊ะ... ค่ะ! ถ้าเป็นเรื่องข้อมูลละก็ ฉันได้ยินมาว่าตอนนี้ชมรมโภชนาการกำลังรับมือกับการเตรียม <ปาร์ตี้เกเฮนน่า> อยู่อย่างแข็งขันเลยค่ะ"
83300100500-24 = "ชมรมโภชนาการเหรอ...?"
83300100500-25 = "ได้ ถ้างั้นฉันจะไปที่ชมรมโภชนาการเอง"
83300100500-26 = "ส่วนอาโกะก็ช่วยหาข้อมูลจากรอบๆ เพิ่มให้ทีนะ"
83300100500-27 = "ค่ะ! วางใจฉันได้เลยค่ะ!"

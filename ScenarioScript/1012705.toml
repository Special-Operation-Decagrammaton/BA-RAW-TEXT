[translation]
1012705-1 = "I Can't?"
1012705-2 = "I arrived and waited for Miyo."
1012705-4 = "Vintage Shopping District"
1012705-6 = "[ns] \"Fufu, finally! I've been waiting forever!\""
1012705-7 = "What's that supposed to mean?"
1012705-8 = "Excuse me. I am exactly on time. Just who do you think I am?"
1012705-9 = "[s] \"Umm... The queen of crime novels?\""
1012705-10 = "That is...fundamentally incorrect!"
1012705-11 = "Although...I agree...that I understand certain tropes."
1012705-12 = "[s] \"Anyway, why did you call me here?\""
1012705-13 = "I have a real job. There's a certain \"something\" I need to procure for a client. It's at this vintage shop."
1012705-14 = "....And, frankly, I could use another pair of eyes. It'd be nice to wrap this up quickly."
1012705-15 = "[s1] \"Same as always, President Miyo...\"\n[s2] \"You can't resist a good crime.\""
1012705-18 = "...Just one more job. Then I'm done. I'll go legit, I swear."
1012705-19 = "[s] \"Sure!\""
1012705-20 = "Ugh...!"
1012705-21 = "Spare me the sarcasm! "
1012705-22 = "[s3] \"Um, by the way...\"\n[s4] \"How did you get permission to come out today?\""
1012705-25 = "Ah... Permission... About that."
1012705-26 = "Well, the thing is..."
1012705-27 = "...I didn't."
1012705-28 = "[s] \"...What?\""
1012705-29 = "Wildhunt has a Free Outing Club. Unofficial, of course."
1012705-30 = "They helped me sneak out."
1012705-31 = "[s] \"...I really wonder what kind of academy Wildhunt is.\""
1012705-32 = "Well... It's an art school. Isn't that obvious?"
1012705-33 = "So, artists can be quirky. Everyone is a little...insane, to be honest."
1012705-34 = "[s]\"And that includes you?\""
1012705-35 = "Well, time to get to work!"
1012705-36 = "[s] \"You ignored me...!\""
1012705-40 = "Look at this typewriter, Sensei! It's the MilkySweet 42 model! Check out that chassis!"
1012705-41 = "[s] \"It has such a cute design.\""
1012705-42 = "Yes. But it's unfortunate, really. It never caught on in the market."
1012705-43 = "[s] \"I wonder why...\""
1012705-44 = "See the letters? This keyboard has a custom layout. They claimed it was uniquely ergonomic!"
1012705-45 = "The only problem was that...well, people didn't want to relearn how to type. It's hard being an innovator."
1012705-46 = "The model was retired after the initial batch of a million typewriters."
1012705-47 = "[s5]\"One million typewriters for a debut...?\"\n[s6]\"Just how confident were they...?\""
1012705-50 = "Well, that's why I have one in my collection. So I should be grateful for their ambition!"
1012705-51 = "Huh? Oh! Look, Sensei! A Demington model, and in great condition. Ah! And the matching fountain pen!"
1012705-53 = "We continued window shopping at the antique store, stopping at every typewriter."
1012705-54 = "Suddenly, Miyo stopped in front of an inconspicuous shop."
1012705-57 = "One second, Sensei!"
1012705-62 = "Miyo left the store with a new bundle in her hands."
1012705-64 = "That's it! Let's go, Sensei."
1012705-65 = "[s] \"What's with the bundle...?\""
1012705-66 = "Ah, it's the...certain \"something\" I promised the Free Outing Club."
1012705-67 = "[s] \"Free Outing Club?\""
1012705-68 = "Yes. This is in exchange for them sneaking me out and..."
1012705-69 = "...Ah."
1012705-70 = "[s7] \"So, you weren't here for business...\"\n[s8] \"You just wanted to have an outing!\""
1012705-73 = "Uh, ah, u-um..."
1012705-77 = "...I'm not allowed?"
1012705-78 = "[s9] \"Of course you're allowed.\"\n[s10] \"Everyone deserves a little freedom sometimes...\""
1012705-81 = "And am I allowed to sneak out if it means seeing you?"
1012705-85 = "[ns] \"Eh?\""
1012705-87 = "[ns] \"Me?!\""
1012705-88 = "L-Last time you said that you wanted to see me too, didn't you?"
1012705-89 = "You said you truly, deeply desired to see me. In MomoTalk!"
1012705-90 = "[s] \"Not quite with those words, but...!\""
1012705-91 = "D-Do you understand it now? You're the bad one, Sensei. You're the corrupting influence."
1012705-92 = "So just stop talking about it. Let's go!"
1012705-93 = "We still have many typewriters...and so little time."
1012705-95 = "I continued browsing the market with Miyo."

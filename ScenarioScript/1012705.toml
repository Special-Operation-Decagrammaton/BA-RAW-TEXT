[translation]
1012705-1 = "ไม่ได้เหรอคะ?"
1012705-2 = "(คุณครูออกมาเจอมิโยะตามสถานที่ที่นัดกันไว้)"
1012705-4 = "ร้านขายของวินเทจ ย่านการค้า "
1012705-6 = "[ns] \"ฮุฮุ มาถึงจนได้สินะ กำลังรออยู่เลย\""
1012705-7 = "อะ... อะไรกัน"
1012705-8 = "นี่คุณครูคิดว่าฉันเป็นคนยังไงคะ?"
1012705-9 = "[s] \"เป็น... ราชินีแห่งนิยายอาชญากรรม?\""
1012705-10 = "เรื่องแบบนั้นฉันไม่เขียนหรอกค่ะ...!"
1012705-11 = "ถึงจะ... เขียนได้ดีก็เถอะ!"
1012705-12 = "[s] \"ว่าแต่ที่เรียกให้ครูมา มีเรื่องอะไรเหรอ?\""
1012705-13 = "มะ... มีสินค้าผิดกฎโรงเรียนที่ฉันต้องซื้อจากย่านขายของวินเทจนี้น่ะค่ะ"
1012705-14 = "แต่ถ้ามีคนมาช่วยกันหา ก็น่าจะไวกว่าฉันหาคนเดียว... ก็เลย..."
1012705-15 = "[s1] \"สมกับที่เป็นหัวหน้าชมรมการค้าพิเศษเลย\"\n[s2] \"มาเพราะเรื่องสินค้าผิดกฎนี่เอง...\""
1012705-18 = "จบงานนี้ฉันก็จะวางมือแล้วค่ะ..."
1012705-19 = "[s] \"อ้อ เป็นอย่างนี้นี่เอง!\""
1012705-20 = "อึกก...!"
1012705-21 = "ยะ... อย่ามาเหน็บแนมกันสิคะ! "
1012705-22 = "[s3] \"ว่าแต่ทำยังไงถึงออกมาได้เหรอ...?\"\n[s4] \"ว่าแต่ขออนุญาตออกมาข้างนอกได้ยังไงเหรอ? \""
1012705-25 = "อ่า... เรื่องขออนุญาตออกมาข้างนอก..."
1012705-26 = "อืม ถ้าจะให้ตอบละก็..."
1012705-27 = "ฉันไม่ได้ขออนุญาตค่ะ..."
1012705-28 = "[s] \"หืม...?\""
1012705-29 = "คะ... คือว่า ที่ไวลด์ฮันต์มีชมรมที่ชื่อว่า 'ชมรมเสรีสัญจร' อยู่น่ะค่ะ"
1012705-30 = "วันนี้ฉันได้รับการช่วยเหลือจากสมาชิกชมรมนั้นให้ออกมาข้างนอกค่ะ"
1012705-31 = "[s] \"ไวลด์ฮันต์เป็นโรงเรียนแบบไหนกันเนี่ย...\""
1012705-32 = "ก็... เป็นศูนย์รวมของนักเรียนที่ต้องหาเลี้ยงชีพด้วยศิลปะเท่านั้นนี่คะ..."
1012705-33 = "คะ... คงมีนักเรียนที่สติสมประกอบอยู่ไม่เยอะหรอกค่ะ..."
1012705-34 = "[s] \"แต่มิโยะก็เป็นนักเรียนของโรงเรียนนั้นไม่ใช่เหรอ...\""
1012705-35 = "เอาละ งั้นเราไปกันเลยมั้ยคะ?"
1012705-36 = "[s] \"เมินคำพูดของครูเฉยเลย...!\""
1012705-40 = "ดูเครื่องพิมพ์ดีดของร้านนี้สิคะ คุณครู! นี่คือรุ่นมิลกี้สวีท 42 ค่ะ!"
1012705-41 = "[s] \"ดีไซน์สวยเลยนะ\""
1012705-42 = "ใช่ค่ะ แต่น่าเสียดายที่รุ่นนี้ไม่เป็นที่นิยมในตลาด ก็เลยเลิกผลิตไปแล้วค่ะ"
1012705-43 = "[s] \"ทำไมถึงไม่เป็นที่นิยมนะ...\""
1012705-44 = "พิมพ์ดีดรุ่นนี้ใช้การเรียงลำดับแป้นพิมพ์ที่ตัวเองพัฒนาขึ้นโดยคำนึงถึงหลักสรีรศาสตร์น่ะค่ะ"
1012705-45 = "แต่มันต่างกับแป้นพิมพ์มาตรฐานมากเกินไป ก็เลยไม่มีใครซื้อไปใช้"
1012705-46 = "หลังจากผลิตล็อตแรกครบ 1 ล้านเครื่อง รุ่นนี้ก็หายไปจากหน้าประวัติศาสตร์เลยค่ะ"
1012705-47 = "[s5] \"ล็อตแรกผลิตถึง 1 ล้านเครื่องเลยเหรอ?\"\n[s6] \"ต้องมั่นใจมากเลยนะถึงผลิต 1 ล้านเครื่องเลย...\""
1012705-50 = "ฉันก็ได้ 1 ในล้านเครื่องนั้นมาครอบครองด้วยค่ะ"
1012705-51 = "หืม? ดูนี่สิคะ คุณครู! มีเครื่องพิมพ์ดีดของบริษัทเดมินตันวางขายคู่กับปากกาหมึกซึมด้วยค่ะ!"
1012705-53 = "(แล้วคุณครูกับมิโยะก็เดินดูเครื่องพิมพ์ดีดและสินค้าวินเทจอื่นๆ ด้วยกัน)"
1012705-54 = "(ระหว่างนั้นเอง มิโยะก็หยุดกะทันหันที่หน้าร้านแห่งหนึ่ง)"
1012705-57 = "รอฉันแป๊ปหนึ่งนะคะ คุณครู!"
1012705-62 = "(ไม่นานนัก มิโยะก็ถือห่อของบางอย่างออกมาจากร้าน)"
1012705-64 = "เอาละ ไปกันค่ะ คุณครู!"
1012705-65 = "[s] \"นั่นห่อของอะไรเหรอ...?\""
1012705-66 = "อ้อ นี่เป็นสินค้าที่ฉันต้องเอาไปให้ชมรมเสรีสัญจรค่ะ"
1012705-67 = "[s] \"ให้ชมรมเสรีสัญจรเหรอ?\""
1012705-68 = "ค่ะ นี่เป็นของตอบแทนที่ชมรมเสรีสัญจรช่วยให้ฉันออกมาข้างนอกน่ะค่ะ..."
1012705-69 = "อ่า..."
1012705-70 = "[s7] \"งั้นก็ไม่ได้ออกมาเพื่องานของชมรมตัวเองสินะ...\"\n[s8] \"งั้นก็แค่อยากออกมาข้างนอกเองสินะ!\""
1012705-73 = "อะ... เอ่อ... คะ... คะ... คือว่า..."
1012705-77 = "ไม่ได้เหรอคะ...?"
1012705-78 = "[s9] \"ได้สิ\"\n[s10] \"ทุกคนต้องมีวันที่อยากออกไปข้างนอกกันอยู่แล้ว...\""
1012705-81 = "แล้วถ้าฉันออกมาเพราะอยากเจอคุณครู แบบนี้ได้มั้ยคะ?"
1012705-85 = "[ns] \"หืม?\""
1012705-87 = "[ns] \"อยากเจอครูเหรอ?!\""
1012705-88 = "กะ... ก็ตอนนั้นคุณครูบอกเองว่าอยากเจอฉันนี่คะ!"
1012705-89 = "ไหนบอกทาง MOMOTALK ว่าอยากเจอมากๆ เลยไง!"
1012705-90 = "[s] \"ก็จริงอยู่หรอกนะ...!\""
1012705-91 = "ทะ... ทีนี้รู้แล้วใช่มั้ยคะ? คะ... คุณครูนั่นละค่ะที่ผิด!"
1012705-92 = "พะ.. เพราะงั้นก็ตามฉันมาเสียดีๆ ค่ะ!"
1012705-93 = "ฉันยังมีเครื่องพิมพ์ดีดอีกหลายเครื่องที่ต้องไปดู... ค่ะ"
1012705-95 = "(แล้วคุณครูก็เดินดูของกับมิโยะต่ออีกสักพัก)"

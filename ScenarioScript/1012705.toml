[translation]
1012705-1 = "不行嗎？"
1012705-2 = "（來到與美代約好的見面地點）"
1012705-4 = "復古商店街"
1012705-6 = "[ns]「呵呵，小的恭候多時了。」"
1012705-7 = "這，這是什麼意思……"
1012705-8 = "老師究竟把我當成什麼人了？"
1012705-9 = "[s]「呃……犯罪小說的女王？」"
1012705-10 = "我才不寫那種東西呢……！"
1012705-11 = "雖然……寫得還不錯就是了！"
1012705-12 = "[s]「話說找我來有什麼事嗎？」"
1012705-13 = "啊，因為這條復古商店街上，有幾樣我要找的走私品。"
1012705-14 = "兩個人一起找又比一個人有效率……所以就……"
1012705-15 = "[s1]「不愧是特殊交易部的部長……」\n[s2]「居然親自帶頭進行走私啊。」"
1012705-18 = "……做完這筆就會收手了。"
1012705-19 = "[s]「哦哦，這樣啊！」"
1012705-20 = "嗚嗚嗚……！"
1012705-21 = "請，請別取笑我了！"
1012705-22 = "[s3]「不過話又說回來……」\n[s4]「今天的外出許可是怎麼拿到的？」"
1012705-25 = "啊……外出許可啊……"
1012705-26 = "唔嗯，怎麼說呢……"
1012705-27 = "……我沒有拿到。"
1012705-28 = "[s]「……嗯？」"
1012705-29 = "其，其實狂獵有一個叫做自由外出部的社團。"
1012705-30 = "今天就是在他們的幫忙之下才能外出的。"
1012705-31 = "[s]「……狂獵到底是什麼地方啊。」"
1012705-32 = "唔嗯……畢竟那裡聚集的都是想靠藝術吃飯的學生……"
1012705-33 = "正，正常的學生當然也不會多到哪裡去……"
1012705-34 = "[s]「你不也是那所學院的一員嗎……」"
1012705-35 = "好，那我們出發吧？"
1012705-36 = "[s]「被無視了……！」"
1012705-40 = "老師，快看這台打字機！#n是MilkySweet42型！"
1012705-41 = "[s]「設計真漂亮呢。」"
1012705-42 = "就是說啊。#n可惜它是個不受市場歡迎，只能被迫停產的悲劇型號。"
1012705-43 = "[s]「為什麼會不受歡迎呢……？」"
1012705-44 = "為了符合人體工學，它採用了自行開發的鍵盤排列。"
1012705-45 = "結果因為跟既有排列差異太大的關係，被市場所拋棄……"
1012705-46 = "就這樣在生產了首批的一百萬台後，從歷史上消失了。"
1012705-47 = "[s5]「首批就生產一百萬台……」\n[s6]「到底多有自信啊……」"
1012705-50 = "不過也是因為這樣，我才能有機會擁有一台吧。"
1012705-51 = "咦？老師快看這邊！#n是Deminton公司的打字機和鋼筆耶！"
1012705-53 = "（就這樣跟美代一起逛了許多包含打字機在內的復古商品）"
1012705-54 = "（途中，美代突然在某間店的門口停了下來）"
1012705-57 = "請稍等一下，老師！"
1012705-62 = "（美代提著一個包包，從店裡走了出來）"
1012705-64 = "走吧，老師！"
1012705-65 = "[s]「那個包包是……？」"
1012705-66 = "啊，是要交給自由外出部的走私品。"
1012705-67 = "[s]「自由外出部？」"
1012705-68 = "是的。我就是以將這些交給他們，作為幫我拿到外出許可的代……"
1012705-69 = "……啊。"
1012705-70 = "[s7]「所以你不是為了走私而外出……」\n[s8]「只是單純想外出而已啊！」"
1012705-73 = "咦，啊，那，那個……"
1012705-77 = "……難道不行嗎？"
1012705-78 = "[s9]「不會啊。」\n[s10]「每個人都會有想隨便出去走走的日子嘛……」"
1012705-81 = "為了見老師而外出，難道不行嗎？"
1012705-85 = "[ns]「咦。」"
1012705-87 = "[ns]「我！？」"
1012705-88 = "老師之前也說過想見我吧！"
1012705-89 = "還說非常非常想見我！在MomoTalk上！"
1012705-90 = "[s]「我確實說過……！」"
1012705-91 = "這，這樣你知道了吧？#n有錯的人是老師才對！"
1012705-92 = "所，所以請乖乖跟，跟我走吧！"
1012705-93 = "還有很多打字機要看呢……"
1012705-95 = "（就這樣繼續和美代在市場巷弄裡逛了一陣子）"

[translation]
1000903-1 = "A Tale of Delicious Pudding"
1000903-3 = "Wow, there's food here too!"
1000903-4 = "This place is full of delectable snacks! Sensei, is this place heaven or what?!"
1000903-5 = "Wow, what should I eat first? Everything looks so great."
1000903-6 = "[s] \"Didn't you say you wanted to eat pudding?\""
1000903-7 = "Oh! Right! My pudding!"
1000903-8 = "All the food here looks so delicious..."
1000903-9 = "The pudding at today's festival is so rare most people don't ever get to try it..."
1000903-10 = "[s] \"Is it really that rare?\""
1000903-11 = "Yup! And the store is far away from Kivotos, so it's really difficult to get there on your own."
1000903-12 = "AND it's really famous, so it's always sold out whenever I go there after school!"
1000903-13 = "That's why I can't let this opportunity go to waste!"
1000903-14 = "[s] \"You really want to eat it, don't you?\""
1000903-15 = "Mmm... There are a lot of things I want to eat."
1000903-16 = "[s] \"I knew it.\""
1000903-17 = "I want you to taste it too."
1000903-18 = "Anything that's tasty is tastier when you share it with someone, right?"
1000903-19 = "[s] \"Izumi, you're the best!\""
1000903-20 = "Hahaha! So, uh, I think that's the line over there. Let's go!"
1000903-23 = "[ns] \"The line is already really long.\""
1000903-24 = "What to do... The pudding at this store is limited, so we might not get anything if we're too late."
1000903-25 = "Ugh, I just wanted to eat pudding with you..."
1000903-26 = "[s] \"Izumi, look at that announcement.\""
1000903-28 = "They're only selling two per person. That means..."
1000903-29 = "[s] \"The line is long, but we might get our share.\""
1000903-30 = "Really? That's great!"
1000903-37 = "Ugh, please... Please let there be some pudding left."
1000903-38 = "[s] \"The line is getting shorter, little by little.\""
1000903-39 = "Hey you."
1000903-41 = "Stop looking around. You two, in the pudding line."
1000903-42 = "Huh? Me?"
1000903-43 = "Yes, you. If it's all right with you, can we trade places?"
1000903-44 = "If you let me take your place, I'll give you something nice in return."
1000903-45 = "Here, a pass for a year's worth of Kivotos ramen. This should be worth it. How about it?"
1000903-46 = "(shocked)"
1000903-47 = "[s] \"Izumi?\""
1000903-48 = "It's not what you think, Sensei! I won't falter...!"
1000903-49 = "Here, how about a coupon for six months' worth of anmitsu from the famous Kivotos wagashi shop?"
1000903-50 = "Please give me your place in line!"
1000903-51 = "Hey you! I was here first!"
1000903-52 = "The first to trade is the winner!"
1000903-53 = "Uhhh, yesh. Ramen... Anmitsu..."
1000903-54 = "Oh! Trade with me! I've been wanting to eat this pudding for a year!"
1000903-55 = "If you trade with me, I promise five years' worth of our exotic chocolate cookies!"
1000903-57 = "U-Ugh! Everybody is trying to tempt me..."
1000903-58 = "Sensei... What should I do?!"
1000903-59 = "[s1] \"Izumi, it's your decision.\"\n[s2] \"Whatever you choose, I'm with you.\""
1000903-60 = "I, I'm... I'm here to eat pudding with Sensei!"
1000903-61 = "I, I'm... I'm here to eat pudding with Sensei!"
1000903-62 = "I refuse you all! I won't give in to your temptations!"
1000903-64 = "Phew... I almost fell for it."
1000903-65 = "But all I could think about was how much I wanted to eat pudding with you, Sensei..."
1000903-66 = "[s3] \"Well done, Izumi.\"\n[s4] \"I'm looking forward to this.\""
1000903-67 = "Next customer! Here's your pudding!"
1000903-68 = "Next customer! Here's your pudding!"
1000903-69 = "Look, it's our turn!"
1000903-72 = "Sensei! I've finally got it! Limited edition eel jelly pudding! "
1000903-73 = "[s] \"...Wait, the what now?\""
1000903-74 = "The limited edition eel jelly pudding!"
1000903-75 = "Look, Sensei. The black gloss and the indescribably savory smell... Ahhh, here, have a whiff."
1000903-76 = "Such a unique taste!"
1000903-77 = "[s] \"W-Wait. Izumi, I thought we were here for pudding. Not eel...\""
1000903-78 = "The pudding is made from eel! You've just gotta taste this!"
1000903-80 = "Here, Sensei! Have a spoonful!"
1000903-82 = "[s] \"Erk?! What a bizarre taste!\""
1000903-83 = "Isn't it delicious?! A spoon for me too. Yummy! "
1000903-85 = "Eat more, Sensei! There's still plenty! Heeheehee!"
1000903-86 = "[s] \"W-Wait. Izumi, wait! I-I give up!\""
1000903-88 = "(Izumi insisted on feeding me with such vigor that I had no choice but to eat all of the eel jelly pudding.)"

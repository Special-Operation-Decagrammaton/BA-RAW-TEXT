[translation]
1000903-1 = "美味的布丁"
1000903-3 = "哇啊～！那裡也這裡也都是食物……！"
1000903-4 = "放眼望去都是食物唷，老師！難道這裡是天國嗎！？"
1000903-5 = "唔哇啊，要從哪個開始吃呢？……咻嚕。"
1000903-6 = "[s]「不是說要吃布丁來著？」"
1000903-7 = "啊！對了！布丁！"
1000903-8 = "嗯……雖然其他的東西看起來都很好吃……"
1000903-9 = "但是今天的祭典出品的布丁，是平常不太能吃到非常貴重的東西……"
1000903-10 = "[s]「有那麼厲害啊？」"
1000903-11 = "嗯！因為店鋪本身在奇普托斯的邊境，首先要到達店鋪的地方就很辛苦，"
1000903-12 = "因為也是有名的店，放學後再去買也是每次都賣光！"
1000903-13 = "所以今天的機會絕對不能放過！"
1000903-14 = "[s]「非常的期待呢。」"
1000903-15 = "嗯，雖然也有一直想吃的心情，不過果然……"
1000903-16 = "[s]「果然？」"
1000903-17 = "想像這樣，和老師一起吃。"
1000903-18 = "好吃的東西，一起吃的話會變得更美味吧？"
1000903-19 = "[s]「泉，真是好孩子……！」"
1000903-20 = "啊哈哈。啊，好像在那裡排隊。老師，走吧！"
1000903-23 = "[ns]「已經大排長龍了呢。」"
1000903-24 = "唔哇，怎麼辦……這個布丁的店有決定好的販賣數，也許已經吃不到了……"
1000903-25 = "嗚嗚，好不容易和老師一起吃的計劃……"
1000903-26 = "[s]「泉，妳看，那個看板。」"
1000903-28 = "「一個人限定兩個的限定販賣」？啊，這樣的話……"
1000903-29 = "[s]「雖然隊伍很長，不過應該沒問題。」"
1000903-30 = "太好了！"
1000903-37 = "嗚嗚……拜託了，布丁留下吧～……！"
1000903-38 = "[s]「還差一點呢。」"
1000903-39 = "等等，妳。"
1000903-41 = "四處張望的妳，沒錯，就是在排限定布丁的隊伍的妳啊。"
1000903-42 = "咦？我？"
1000903-43 = "沒錯。如果可以的話可以把位置讓給吾輩嗎？"
1000903-44 = "如果讓給我的話，吾輩作為回禮，就向妳獻上貴重的東西吧。"
1000903-45 = "妳看，是奇普托斯拉麵的加麵優惠券一年份。我認為絕不是吃虧的交易，如何呢？"
1000903-46 = "（咦！？）"
1000903-47 = "[s]「泉……？」"
1000903-48 = "不，不是啦老師！我才不會被那種東西上鉤……！"
1000903-49 = "那樣的話，這是可以在奇普托斯有名的和菓子店使用的「餡蜜6個月免費券」如何？"
1000903-50 = "可以把位置讓給我嗎？"
1000903-51 = "你！她正在和吾輩說話！"
1000903-52 = "決定的是她吧？"
1000903-53 = "啊，啊嗚嗚……加麵……餡蜜……"
1000903-54 = "啊啦，如果覺得兩邊都微妙的話，可以讓給我嗎？這個布丁，我一直想著要吃！"
1000903-55 = "如果願意讓給我的話，我的公司製作的點心「香菇和竹筍」5年份……！"
1000903-57 = "啊，啊嗚嗚……！大，大家都在妨礙我……！"
1000903-58 = "老師，怎麼辦……！？"
1000903-59 = "[s1]「泉決定就好了唷。」\n[s2]「不管做出什麼選擇我都不會責備妳的。」"
1000903-60 = "我，我是……！為了和老師一起吃布丁而來的！"
1000903-61 = "我，我是……！為了和老師一起吃布丁而來的！"
1000903-62 = "全都不行！才，才不會輸給誘惑的！！"
1000903-64 = "呼……真是危險……"
1000903-65 = "不過我一直，想和老師吃這個布丁……"
1000903-66 = "[s3]「泉，辛苦妳了。」\n[s4]「泉都那麼說了，更加讓人期待呢。」"
1000903-67 = "久等了，下一位客人！"
1000903-68 = "久等了，下一位客人！"
1000903-69 = "啊，輪到我們了！"
1000903-72 = "……終於買到了，限定的鰻魚果凍布丁！"
1000903-73 = "[s]「……咦？果凍……布丁？」"
1000903-74 = "是鰻魚果凍的布丁唷？"
1000903-75 = "來老師，你看你看。這個黑色的光澤，還有撲鼻而來難以形容的氣味……（吸──……）"
1000903-76 = "嗯，很獨特呢！"
1000903-77 = "[s]「等，等等泉，我聽說是布丁，鰻魚……？」"
1000903-78 = "嗯，鰻魚！一直很想吃──！"
1000903-80 = "來，老師！請先嚐一口！"
1000903-82 = "[s]「唔咕……！？這個，在口中散開的……怪味！？」"
1000903-83 = "好吃！？我也開動了──，啊呣！嗯，好吃！"
1000903-85 = "可以再吃唷，老師！還有很多！欸嘿嘿！"
1000903-86 = "[s]「等，泉，等等……！已，已經沒關係了！」"
1000903-88 = "（沒辦法拒絕以開心表情遞出的泉，結果拚死的把鰻魚果凍布丁吃完了）"

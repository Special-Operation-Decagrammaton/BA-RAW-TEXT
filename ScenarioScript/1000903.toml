1000903-35 = "1;이즈미;07\n#1;em;[반응]\n#wait;1500"
1000903-36 = "1;이즈미;05\n#1;m2\n#1;greeting\n#wait;1500"
1000903-37 = "1;이즈미;04;으으, 푸딩, 남아있어라~ 제발 남아있어라~\n#1;stiff"
1000903-38 = "[s] \"그래도 조금씩 착실하게 줄은 줄어들고 있으니까.\""
1000903-39 = "#na;지나가던 미식가;거기, 자네들."
1000903-40 = "1;이즈미;07\n#1;em;[반응]\n#1;stiff\n#wait;1500"
1000903-41 = "#na;지나가던 미식가;두리번거리지 말고. 한정판 푸딩 판매 줄에 서 있는 자네들 말일세."
1000903-42 = "1;이즈미;07;응? 나?\n#1;em;[?]"
1000903-43 = "#na;지나가던 미식가;그래, 자네. 혹시 괜찮다면 내게 줄을 양보해주지 않겠나?"
1000903-44 = "#na;지나가던 미식가;양보해준다면, 내 자네에게 귀중한 물건으로 보답함세."
1000903-45 = "#na;지나가던 미식가;여기, 키보토스 라멘 사리 추가 쿠폰 1년치라네. 이거라면 자네에게도 손해가 아닐 터. 어떤가?"
1000903-46 = "1;이즈미;09;(움찔!)\n#1;shake\n#1;em;[반응]"
1000903-47 = "[s] \"이즈미?\""
1000903-48 = "1;이즈미;08;아, 아니야. 선생님! 난 저런 거에 흔들리지 않……!\n#1;stiff"
1000903-49 = "#na;푸딩탐험가;그럼 여기, 키보토스 유명 화과자 점의 안미츠 6개월 무료 이용권은 어때?"
1000903-50 = "#na;푸딩탐험가;부디 줄을 양보해줘!"
1000903-51 = "#na;지나가던 미식가;어허! 여긴 내가 먼저 왔네!"
1000903-52 = "#na;푸딩탐험가;먼저 거래한 쪽이 장땡이지!"
1000903-53 = "1;이즈미;04;아, 아으으. 라멘 사리……. 안미츠 이용권…….\n#1;stiff\n#1;em;[속상함]"
1000903-54 = "#na;푸딩좋아아가씨;어머! 그렇다면 제게 양보해주시지 않겠나요! 전 이 푸딩이 1년 전부터 먹고 싶었답니다!"
1000903-55 = "#na;푸딩좋아아가씨;제게 양보해주신다면, 저희 기업에서 제작하는 초콜릿 과자 <버섯과 죽순>을 5년 치 제공해드리겠다고 약속……!"
1000903-56 = "#wait;1500"
1000903-57 = "1;이즈미;08;아, 아으으……! 모, 모두 날 방해하려고……!\n#1;shake\n#1;em;[?!]"
1000903-58 = "1;이즈미;04;선생님……! 어떡해?!\n#1;jump"
1000903-59 = "[s1] \"이즈미가 결정하면 될 일이야.\"\n[s2] \"어떤 선택을 하든 따를게.\""
1000903-60 = "1;이즈미;05;나, 나는……! 선생님과 같이 푸딩을 먹으려고 온 거야!\n#1;stiff"
1000903-61 = "1;이즈미;05;나, 나는……! 선생님과 같이 푸딩을 먹으려고 온 거야!\n#1;stiff"
1000903-62 = "#1;hide\n3;이즈미;08;전부 거절하겠어! 유, 유혹에는 지지 않을 거야!!\n#3;closeup\n#3;em;[!]"
1000903-63 = "#all;hide"
1000903-64 = "3;이즈미;04;후우우우……. 하마터면 넘어갈 뻔 했어.\n#3;a\n#3;stiff\n#3;em;[속상함]"
1000903-65 = "3;이즈미;01;하지만, 나 줄곧 선생님과 여기 푸딩을 먹고 싶다고 생각해왔으니까…….\n#3;greeting"
1000903-66 = "[s3] \"이즈미, 고생했어.\"\n[s4] \"이즈미가 그렇게까지 말하니까 기대되네.\""
1000903-67 = "#na;종업원;다음 손님! 기다리신 푸딩입니다!"
1000903-68 = "#na;종업원;다음 손님! 기다리신 푸딩입니다!"
1000903-69 = "3;이즈미;09;자, 우리 차례야!\n#3;em;[반응]"
1000903-70 = "3;이즈미;01\n#3;m5\n#3;hophop\n#wait;1000"
1000903-71 = "3;이즈미;01\n#3;greeting\n#wait;2000"
1000903-72 = "3;이즈미;03;선생님! 드디어 샀어! 이 가게의 유명한 한정판 장어 젤리 푸딩! \n#3;hophop\n#3;em;[반짝]\n#3;m3"
1000903-73 = "[s] \"……뭐? 무슨, 푸딩?\""
1000903-74 = "3;이즈미;07;한정판 장어 젤리 푸딩! 이라고 했는데?"
1000903-75 = "3;이즈미;04;봐봐, 선생님. 이 검은 광택과 코를 찌르는 구수하고 말로 표현하기 어려운……. 습-하. 후웁, 하아.\n#3;stiff\n#3;em;[하트]"
1000903-76 = "3;이즈미;03;이 독특한 풍미!\n#3;jump"
1000903-77 = "[s] \"자, 잠깐. 이즈미 나는 푸딩이라고 들었지. 장어라고는…….\""
1000903-78 = "3;이즈미;00;바로 그 장어로 만든 푸딩인데? 선생님에게 꼭 맛 보여주고 싶었어!"
1000903-79 = "3;이즈미;01\n#3;greeting\n#wait;400"
1000903-80 = "3;이즈미;03;자아, 선생님! 먼저 한입 먹어!\n#3;closeup\n#3;em;[반응]"
1000903-81 = "#wait;1500"
1000903-82 = "[s] \"흐읍?! 입안으로 퍼져가는 기묘한…… 풍미가?!\""
1000903-83 = "3;이즈미;09;맛있지?! 나도 한입. 냠! \n#3;greeting"
1000903-84 = "3;이즈미;01\n#3;greeting\n#wait;400"
1000903-85 = "3;이즈미;03;더 먹어, 선생님! 아직 많이 있으니까! 에헤헷!\n#3;em;[반짝]\n#3;closeup"
1000903-86 = "[s] \"자, 잠깐. 이즈미. 기다려……! 하, 항보옥!\""
1000903-87 = "#all;hide"
1000903-88 = "#na;(적극적으로 먹여주는 이즈미에게 못 이겨, 결국 장어 젤리 푸딩은 전부 먹어 치울 수밖에 없었다.)"

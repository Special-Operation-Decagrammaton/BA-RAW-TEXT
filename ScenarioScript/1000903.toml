[translation]
1000903-1 = "#title;맛있는 푸딩 이야기"
1000903-2 = "#wait;1500"
1000903-3 = "3;이즈미;00;와아~ 여기도 먹을 거, 먹을 거.\n#3;a\n#3;hophop\n#3;em;[반짝]"
1000903-4 = "3;이즈미;03;온통 맛있는 것들이 천지야! 선생님, 선생님! 혹시 여긴 천국이야?!"
1000903-5 = "3;이즈미;09;우와아아, 뭐부터 먹지? 츄릅.\n#3;stiff"
1000903-6 = "[s] \"푸딩을 먹는다고 하지 않았어?\""
1000903-7 = "3;이즈미;08;헉! 맞다! 푸딩!\n#3;shake\n#3;em;[?!]"
1000903-8 = "3;이즈미;06;으음, 여기 있는 음식들 전부 맛있어 보이지만……."
1000903-9 = "3;이즈미;05;오늘 페스티벌에 출품된 푸딩은 평소에는 도통 먹어볼 기회가 없는 엄청 희귀한 거다 보니까…….\n#3;em;[반응]"
1000903-10 = "[s] \"그 정도로 굉장해?\""
1000903-11 = "3;이즈미;03;응! 가게 자체가 키보토스에서도 엄청나게 외진 곳에 있어서 찾아가기가 무지 어려운 데다가.\n#3;jump"
1000903-12 = "3;이즈미;01;또 엄청난 별미로 유명해서, 수업이 끝나고 뒤늦게 찾아가려면 맨날 매진이고!"
1000903-13 = "3;이즈미;05;그러니까 오늘 같은 기회를 절대로 놓칠 순 없어!\n#3;greeting\n#3;em;[반응]"
1000903-14 = "[s] \"엄청 먹고 싶은가 보네.\""
1000903-15 = "3;이즈미;99;으음~ 내가 먹고 싶은 것도 있지만. 역시."
1000903-16 = "[s] \"역시?\""
1000903-17 = "3;이즈미;01;선생님에게도 맛보여주고 싶어서 그래.\n#3;em;[반짝]"
1000903-18 = "3;이즈미;03;맛있는 건, 나눠 먹으면 더 맛있어지는 법이잖아?\n#3;hophop"
1000903-19 = "[s] \"이, 이즈미! 요 기특한 아이!\""
1000903-20 = "3;이즈미;00;에헤헷, 아, 저기가 줄인가 봐. 선생님! 가자!\n#3;em;[재잘]"
1000903-21 = "#all;hide"
1000903-22 = "#wait;1000"
1000903-23 = "[ns] \"이미 제법 줄을 길게 서 있네.\""
1000903-24 = "3;이즈미;08;우왓, 어쩌지……. 이 푸딩 가게는 한정 판매라, 늦으면 못 먹을 수도 있을 텐데.\n#3;em;[땀]"
1000903-25 = "3;이즈미;04;으으, 모처럼 선생님과 같이 먹으려고 한 계획이…….\n#3;stiff"
1000903-26 = "[s] \"이즈미, 저기 간판 좀 봐.\""
1000903-27 = "3;이즈미;07\n#3;em;[반응]\n#wait;1500"
1000903-28 = "3;이즈미;00;개인당 2개만 판매합니다? 아, 그러면……."
1000903-29 = "[s] \"줄은 길지만, 먹을 수 있을지도 몰라.\""
1000903-30 = "3;이즈미;03;그래? 다행이다!\n#3;hophop\n#3;em;[반짝]"
1000903-31 = "#all;hide"
1000903-32 = "#wait;1500"
1000903-33 = "1;이즈미;05\n#1;ar\n#1;greeting\n#wait;2500"

[translation]
1000903-1 = "เรื่องราวของพุดดิ้งแสนอร่อย"
1000903-3 = "ว้าว~ ที่นี่มีของกินเยอะแยะเลย"
1000903-4 = "ที่นี่มีขนมเต็มไปหมดเลยคุณครู! ที่นี่คือสวรรค์งั้นเหรอ?!"
1000903-5 = "ว้าว กินอะไรก่อนดีน้า? ทุกอย่างดูน่ากินไปหมดเลย"
1000903-6 = "[s] \"เห็นบอกว่าอยากกินพุดดิ้งไม่ใช่เหรอ?\""
1000903-7 = "อ๊ะ! ใช่แล้ว พุดดิ้ง!"
1000903-8 = "อืม... ของกินที่นี่ดูน่าอร่อยทุกอย่างเลย..."
1000903-9 = "พุดดิ้งในงานเทศกาลวันนี้หายากมาก คนส่วนใหญ่ยังไม่มีโอกาสได้ลองชิมกันเลย..."
1000903-10 = "[s] \"หายากขนาดนั้นเลยเหรอ?\""
1000903-11 = "อื้อ! แล้วร้านก็อยู่ไกลจากตัวเมืองคิโวทอสด้วย เดินทางไปยากสุดๆ เลยล่ะ"
1000903-12 = "ที่สำคัญร้านนั้นดังมากๆ พอไปตอนเลิกเรียนก็จะหมดก่อนทุกทีเลย!"
1000903-13 = "ถ้าอย่างนั้นฉันจะพลาดโอกาสในครั้งนี้ไปไม่ได้!"
1000903-14 = "[s] \"อยากกินมันมากๆ เลยใช่ไหม?\""
1000903-15 = "หืม~ มีหลายอย่างที่ฉันอยากกินเลยล่ะ"
1000903-16 = "[s] \"กะแล้วเชียว\""
1000903-17 = "ฉันอยากให้คุณครูลองชิมด้วยเหมือนกัน"
1000903-18 = "ของอร่อยจะยิ่งอร่อยขึ้นถ้าเรากินด้วยกันใช่ไหมล่ะ?"
1000903-19 = "[s] \"อิซุมิ เธอยอดเยี่ยมที่สุดเลย!\""
1000903-20 = "ฮ่าฮ่าฮ่า! อ๊ะ ดูเหมือนแถวจะอยู่ตรงนั้นนะ ไปกันเถอะ!"
1000903-23 = "[ns] \"ตอนนี้แถวยาวมากเลย\""
1000903-24 = "ว้าว เอายังไงดีล่ะ... พุดดิ้งของร้านนี้ก็มีจำกัดด้วย ถ้าช้าไปเราอาจจะไม่ได้อะไรเลย"
1000903-25 = "ฉะ.. ฉันแค่อยากกินพุดดิ้งกับคุณครูแค่นั้นเอง..."
1000903-26 = "[s] \"อิซุมิ ดูประกาศสิ\""
1000903-28 = "ซื้อได้ 2 ชิ้นต่อคนเท่านั้น ถ้างั้นก็..."
1000903-29 = "[s] \"แถวยาวก็จริง แต่เราอาจจะได้ก็ได้\""
1000903-30 = "จริงเหรอ? โล่งอกไปที!"
1000903-37 = "ดะ... ได้โปรด... ขอให้มีพุดดิ้งเหลือด้วย~ ขอให้มีพุดดิ้งเหลือด้วยเถอะนะ~"
1000903-38 = "[s] \"แถวเริ่มสั้นลงทีละนิดทีละนิด\""
1000903-39 = "นี่ พวกเธอน่ะ"
1000903-41 = "พวกเธอสองคนที่ต่อแถวพุดดิ้งอยู่นั่นแหละ"
1000903-42 = "หือ? ฉันเหรอ?"
1000903-43 = "คือว่า... ถ้าไม่ว่าอะไร ช่วยแลกคิวต่อแถวกับฉันหน่อยได้ไหม?"
1000903-44 = "ถ้าเธอยอมแลกคิวกับฉัน ฉันจะให้ของดีๆ เป็นการตอบแทน"
1000903-45 = "นี่ บัตรกินราเม็งคิโวทอสตลอดปี สนใจแลกคิวกับฉันไหมล่ะ?"
1000903-46 = "(นี่มัน!)"
1000903-47 = "[s] \"อิซุมิ?\""
1000903-48 = "ยะ...อย่าเข้าใจผิดนะ คุณครู! ฉันไม่หวั่นไหวหรอก...!"
1000903-49 = "หรือสนใจเป็นคูปองกินขนมอันมิสึฟรี 6 เดือนที่ร้านขนมหวานชื่อดังในคิโวทอสไหมล่ะ?"
1000903-50 = "ช่วยแลกคิวกับฉันเถอะนะ"
1000903-51 = "นี่เธอ! ฉันมาก่อนนะ!"
1000903-52 = "ใครแลกได้ก่อนก็ได้ไปสิ!"
1000903-53 = "อ่า อะ... อ่าาาา คูปอง... ราเม็ง... อันมิสึ..."
1000903-54 = "แลกกับฉันเถอะนะ! ฉันอยากกินพุดดิ้งร้านนี้มาเป็นปีแล้ว!"
1000903-55 = "ถ้าเธอยอมแลกคิว ฉันสัญญาว่าจะให้เธอกิน <คุกกี้เห็ดและหน่อไม้>#nคุกกี้ช็อกโกแลตสุดพิเศษฟรีตลอด 5 ปีเลย!"
1000903-57 = "อะ... อ่า...! ทะ... ทุกคนพยายามทำให้ฉันหวั่นไหว...!"
1000903-58 = "คุณครู... ฉันจะทำยังไงดี?!"
1000903-59 = "[s1] \"อิซุมิ เธอตัดสินใจเลย\"\n[s2] \"ไม่ว่าจะเลือกอะไร ครูก็จะอยู่ข้างๆ นะ\""
1000903-60 = "ฉะ.. ฉัน... ฉันมาที่นี่เพื่อซื้อพุดดิ้งกับคุณครู!"
1000903-61 = "ฉะ.. ฉัน... ฉันมาที่นี่เพื่อซื้อพุดดิ้งกับคุณครู!"
1000903-62 = "ฉันขอปฏิเสธทั้งหมด! ฉันจะไม่ยอมแพ้ง่ายๆ หรอก!"
1000903-64 = "ฮู่ว... ฉันเกือบจะไม่รอดแล้ว..."
1000903-65 = "ฉันคิดแค่ว่าอยากกินพุดดิ้งกับคุณครูมากๆ ก็เท่านั้น..."
1000903-66 = "[s3] \"ดีมาก อิซุมิ\"\n[s4] \"ครูจะตั้งตารอเลยล่ะ\""
1000903-67 = "ลูกค้าคนต่อไป! พุดดิ้งที่สั่งได้แล้วครับ!"
1000903-68 = "ลูกค้าคนต่อไป! พุดดิ้งที่สั่งได้แล้วครับ!"
1000903-69 = "อ๊ะ คิวเราแล้ว!"
1000903-72 = "คุณครู! ในที่สุดก็ได้แล้ว! พุดดิ้งเจลลี่ปลาไหลลิมิเต็ดเอดิชั่น!"
1000903-73 = "[s] \"...เดี๋ยว พุดดิ้งอะไรนะ?\""
1000903-74 = "พุดดิ้งเจลลี่ปลาไหลลิมิเต็ดเอดิชั่น!"
1000903-75 = "ดูสิคุณครู ผิวสีดำที่ดูมันวาวและกลิ่นคาวที่ยากจะบรรยาย... อ้าาา ลองดมดูสิ"
1000903-76 = "เป็นรสชาติที่พิเศษจัง!"
1000903-77 = "[s] \"ดะ.. เดี๋ยว อิซุมิ ครูนึกว่าเรามาซื้อพุดดิ้ง ไม่ใช่ปลาไหล...\""
1000903-78 = "ก็เป็นพุดดิ้งที่ทำจากปลาไหลไง! คุณครูลองดูสิ!"
1000903-80 = "เอาล่ะ คุณครู! ลองกินดูสักคำนะ!"
1000903-82 = "[s] \"หื้ม?! เป็นรสชาติที่แปลกประหลาด!\""
1000903-83 = "อร่อยใช่ไหมล่ะ?! ฉันขอหนึ่งคำด้วย อ้ำ อร่อยมาก!"
1000903-85 = "กินอีกสิ คุณครู! ยังเหลืออีกเยอะเลย! ฮ่าฮ่าฮ่า!"
1000903-86 = "[s] \"ดะ... เดี๋ยว อิซุมิ เดี๋ยวก่อน...! มะ... ไม่เอาแล้ว!\""
1000903-88 = "(อิซุมิยังคงกระตือรือร้นที่จะป้อนให้จนคุณครูไม่มีทางเลือกนอกจากจะกิน#nพุดดิ้งเจลลี่ปลาไหลจนหมด)"

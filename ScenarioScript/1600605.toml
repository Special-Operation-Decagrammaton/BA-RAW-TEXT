[translation]
1600605-1 = "The Girl Fights with the Ocean"
1600605-2 = "I spent the day going to five famous beach restaurants with Izumi."
1600605-3 = "Wow, that was so good!"
1600605-4 = "Right, Sensei?!"
1600605-5 = "[s1] \"I guess it was all right.\"\n[s2] \"It was definitely tasty, but...\""
1600605-6 = "Why so unsure? You didn't think it was good, Sensei?!"
1600605-7 = "Why so unsure? You didn't think it was good, Sensei?!"
1600605-8 = "Or maybe you just had trouble picking a favorite."
1600605-9 = "Was it the Tonkotsu ramen-flavored shaved ice?"
1600605-10 = "Or maybe the melon-flavored stir-fry noodles?!"
1600605-11 = "[s3] \"The melon-flavored stir-fry noodles weren't very...\"\n[s4] \"Never mind, that's besides the point.\""
1600605-14 = "[s] \"We're at the beach, Izumi. Do you want to go swimming?\""
1600605-15 = "Swimming?"
1600605-16 = "Huh. I guess it's true all we've done at the beach is eat."
1600605-17 = "There's no rule that says you have to go swimming just because you're at the beach, right?"
1600605-18 = "[s] \"Sure, but don't you feel like you're missing out?\""
1600605-19 = "Missing out on what? Not putting my swimsuit to good use?"
1600605-20 = "Hmmm... "
1600605-21 = "Might as well. If you insist, Sensei!"
1600605-22 = "I'm a little full right now, but I heard it's natural to get hungry again after you go swimming."
1600605-23 = "I wanna see if that's true! Let's try!"
1600605-24 = "To the water!"
1600605-25 = "[s] \"That's the only reason you want to swim?!\""
1600605-31 = "Wow, the water is so pretty!"
1600605-32 = "The beach is great!"
1600605-33 = "Wooo!"
1600605-38 = "Ahhh! That wave was so big!"
1600605-39 = "Haha. Check it out, Sensei!"
1600605-40 = "Everything before us is all ocean!"
1600605-41 = "[s] \"Right.\""
1600605-42 = "The seawater stretches as far as the eye can see."
1600605-43 = "And seawater is salty, right?"
1600605-44 = "Who doesn't like salty things, am I right?"
1600605-45 = "Like shoyu ramen and shio ramen!"
1600605-47 = "*slurp*"
1600605-48 = "[s] \"You're not supposed to drink seawater, Izumi!\""
1600605-49 = "Oh, come on—I'm not that dumb. I'd never drink seawater."
1600605-50 = "It just reminded me of ramen, that's all!"
1600605-54 = "Ahhh! It's so cold."
1600605-55 = "Hey, Sensei, come over here. This way!"
1600605-56 = "[s] \"You look like you're having fun, Izumi.\""
1600605-57 = "I sure am!"
1600605-58 = "I thought coming here wouldn't be enjoyable at all..."
1600605-59 = "...but I'm having so much fun now that I'm here."
1600605-61 = "Hmm. Why is that?"
1600605-62 = "That's..."
1600605-63 = "Hmmm. I think I know..."
1600605-64 = "Heehee. ♪"
1600605-66 = "*squeeze*"
1600605-67 = "Huh?"
1600605-69 = "*squeeze*"
1600605-70 = "What the...?!"
1600605-71 = "[s] \"Izumi? What's wrong?\""
1600605-72 = "Uh, uhhh..."
1600605-73 = "Ahhh! There's something weird on me, Sensei!"
1600605-74 = "[s] \"Izumi?!\""
1600605-77 = "― S-Sensei. Help...[wa:1430] "
1600605-80 = "[ns] \"Are you all right, Izumi?!\""
1600605-81 = "― This feels weird.[wa:810] "
1600605-83 = "― It's wet and sticky...[wa:1720] "
1600605-86 = "[ns] \"I'll help you!\""
1600605-87 = "― Go away![wa:560] "
1600605-89 = "― You can't eat me![wa:580] "
1600605-92 = "― There's still so much food I have to try![wa:440] "
1600605-95 = "― Ugh...[wa:720] "
1600605-97 = "― I can't just be like this...![wa:50] "
1600605-100 = "[ns] \"......Izumi?\""
1600605-101 = "― *gasp*[wa:980] "

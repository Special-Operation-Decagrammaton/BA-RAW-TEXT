[translation]
1600605-1 = "การต่อสู้ของเด็กสาวที่ทะเล"
1600605-2 = "(วันนี้ก็มาตะลุยร้านเด็ดชื่อดังแถวๆ ชายทะเลกับอิซุมิถึง 5 ร้าน)"
1600605-3 = "ฮื้มมม อร่อยมากเลย!"
1600605-4 = "คุณครูก็อร่อยเหมือนกันเนอะ?!"
1600605-5 = "[s1] \"อร่อย... ก็ได้\"\n[s2] \"อร่อยดีนะ แต่ก็...\""
1600605-6 = "ทำไมล่ะ? ไม่ถูกปากเหรอ?"
1600605-7 = "ทำไมล่ะ? ไม่ถูกปากเหรอ?"
1600605-8 = "อืมม ตรงไหนที่มันไม่ถูกปากนะ ฉันว่ามันก็อร่อยทุกตรงนะ~"
1600605-9 = "อ๊ะ! ที่บอกว่าไม่ถูกปาก อย่าบอกนะว่าเป็นบิงซูรสทงคตสึราเม็ง?"
1600605-10 = "หรือว่าก๋วยเตี๋ยวผัดรสเมล่อน?!"
1600605-11 = "[s3] \"ถ้าให้เลือกก็คงเป็นก๋วยเตี๋ยวผัดรสเมล่อน...\"\n[s4] \"ไม่สิ... ไม่สำคัญหรอก\""
1600605-14 = "[s] \"มาทะเลทั้งที อิซุมิไม่ว่ายน้ำเหรอ?\""
1600605-15 = "ว่ายน้ามมม~?"
1600605-16 = "อืม...เอาจริงๆ ตั้งแต่มาถึงทะเลก็เอาแต่กินอย่างเดียวเลย..."
1600605-17 = "แต่เราจำเป็นต้องมาทะเลเพื่อว่ายน้ำด้วยเหรอ~?"
1600605-18 = "[s] \"ไม่ใช่อย่างนั้นหรอก ก็แค่สงสัยว่าไม่เสียดายเหรอ...\""
1600605-19 = "คิดว่าฉันเสียดายเพราะไหนๆ ก็ใส่ชุดว่ายน้ำมาแล้วเหรอ~?"
1600605-20 = "อืมมม~~ "
1600605-21 = "ก็ได้! ถ้าคุณครูพูดขนาดนี้แล้ว~"
1600605-22 = "ตอนนี้ก็อิ่มท้องอยู่ด้วย อีกอย่าง ว่ากันว่าถ้าตั้งใจว่ายน้ำก็จะหิวขึ้นมา"
1600605-23 = "งั้นฉันจะลองพิสูจน์ดูแล้วกัน! ลองกันสักตั้งไปเลย!"
1600605-24 = "ไปว่ายน้ำในทะเลกัน!"
1600605-25 = "[s] \"สุดท้ายเป้าหมายก็เพื่อกินอยู่ดีเหรอ?\""
1600605-31 = "โอ้ว! นี่สินะทะเล!"
1600605-32 = "ว้าวว! ทะเล~"
1600605-33 = "อ๊ายยยย~"
1600605-38 = "ว้าวว!!! คลื่นซัดมาแล้ว~"
1600605-39 = "ฮ่ะฮ่ะฮ่าา!! ว้าวว!  คุณครูดูนี่สิ!"
1600605-40 = "ที่แหละที่เรียกว่าทะเล! แล้วนี่ก็น้ำทะเล!"
1600605-41 = "[s] \"อื้ม\""
1600605-42 = "ทะเลมันกว้างใหญ่สุดลูกหูลูกตาเลย~"
1600605-43 = "แถมน้ำทะเลทั้งหมดก็มีรสเค็มด้วย!"
1600605-44 = "รสเค็ม~ อืม... รสเค็มๆ นี่มัน~ อร่อยดีนะ~"
1600605-45 = "ทั้งโชยุราเม็ง~ ชิโอะราเม็ง~"
1600605-47 = "(กลืนน้ำลาย)"
1600605-48 = "[s] \"อิซุมิ...?! จะกินน้ำทะเลไม่ได้นะ!\""
1600605-49 = "คุณครูล่ะก็ ฉันไม่กินน้ำทะเลหรอกน่า~!"
1600605-50 = "ก็แค่นึกถึงราเม็งเท่านั้นเอง~!"
1600605-54 = "อ๊ะ เย็นจัง"
1600605-55 = "ฮิฮิ เย็นสดชื่น! คุณครู! คุณครูก็มาทางนี้ด้วยสิ มาเลย!"
1600605-56 = "[s] \"อิซุมิสนุกเข้าแล้วสินะ\""
1600605-57 = "อื้ม! นั่นสิ!"
1600605-58 = "ก่อนหน้านี้ขี้เกียจจะว่ายน้ำแท้ๆ"
1600605-59 = "แต่พอได้มาทำจริงๆ ก็ได้รู้ว่ามันสนุกสุดๆ ไปเลย..."
1600605-61 = "ทำไมกันน้าา~?"
1600605-62 = "หรือว่า..."
1600605-63 = "อืมม~ ก็อาจจะใช่นะ..."
1600605-64 = "ฮิฮิ~♪"
1600605-66 = "(หมับ!)"
1600605-67 = "หืม...?"
1600605-69 = "(หมับ!)"
1600605-70 = "เอ๋...?"
1600605-71 = "[s] \"อิซุมิ...? เป็นอะไรเหรอ?\""
1600605-72 = "เอ๋~!"
1600605-73 = "หืมมมม?! มีอะไรแปลกๆ ล่ะคุณครู!!"
1600605-74 = "[s] \"อิซุมิ...?!\""
1600605-77 = "― คะ... คุณครู ช่วยฉันด้วย...[wa:1030] "
1600605-80 = "[ns] \"เป็นอะไรหรือเปล่าอิซุมิ?!\""
1600605-81 = "― ฉันรู้สึก... ว่ามันแปลกๆ นะ...[wa:290] "
1600605-83 = "― มันเปียกๆ... แล้วก็เหนียวๆ... กรี๊ดดดด~~![wa:960] "
1600605-86 = "[ns] \"ครูจะช่วยเดี๋ยวนี้แหละ!\""
1600605-87 = "― อย่าเข้ามาน๊า~![wa:280] "
1600605-89 = "― ฉันไม่ใช่อาหารของแกนะ~![wa:340] "
1600605-92 = "― แล้วฉันก็มีอาหารที่ยังไม่เคยกินเยอะแยะเลยด้วย~![wa:200] "
1600605-95 = "― ย้า?! อึ่ก...[wa:440] "
1600605-97 = "― ฉันจะยอม... ถูกเล่นงานฝ่ายเดียวไม่ได้…![wa:10] "
1600605-100 = "[ns] \"...อิซุมิ?\""
1600605-101 = "― อึ่ก! [wa:980] "
1600605-103 = "― ก่อนที่จะโดนเจ้าหมึกยักษ์กิน...  ฉันจะต้องกินมันก่อน…![wa:880] "
1600605-106 = "― ฉันจะกินมันก่อนเลยดีกว่า![wa:730] "
1600605-109 = "อื้ม! ใช่แล้ว!"
1600605-110 = "ต้องกินมันก่อนที่เราจะถูกกิน!!"
1600605-114 = "นี่แน่ะ!!"
1600605-115 = "[s] \"อิซุมิ...? มันไม่สะอาดนะ หยุดเถอะ!\""
1600605-117 = "(ดึงปลาหมึกยักษ์ออกจากอิซุมิได้อย่างหวุดหวิดแล้วก็ปล่อยกลับทะเลไป)"

[translation]
1600605-1 = "泉與夏季的魔物"
1600605-2 = "（今天也和泉一起去了五間附近知名的餐廳）"
1600605-3 = "呼──"
1600605-4 = "真好吃──！"
1600605-5 = "[s1] 「我吃的好飽喔……」\n[s2] 「確實是很好吃……」"
1600605-6 = "怎麼了？老師覺得不怎麼樣嗎？"
1600605-7 = "怎麼了？老師覺得不怎麼樣嗎？"
1600605-8 = "我覺得都還挺好吃的耶……"
1600605-9 = "難道是，「豚骨拉麵口味刨冰」嗎？"
1600605-10 = "還是「甜瓜湯溫泉蛋烏龍麵」呢？"
1600605-11 = "[s3] 「嚴格說起來，應該是前者……」\n[s4] 「……啊，話說回來」"
1600605-14 = "[s] 「難得來海邊，泉妳不游泳嗎？」"
1600605-15 = "咦──，可是～……"
1600605-16 = "唔──嗯，我也不是討厭游泳啦，可是畢竟還有這麼多好吃的……"
1600605-17 = "而且就算來到海邊，也沒有規定一定要游泳吧？"
1600605-18 = "[s] 「是啦。但不會覺得可惜嗎。」"
1600605-19 = "嗯──……確實，難得都穿泳裝了……"
1600605-20 = "唔──嗯……"
1600605-21 = "好吧，既然老師都這麼說了！"
1600605-22 = "反正剛好肚子也有點飽。游個泳一定能有助消化再吃更多。"
1600605-23 = "既然這樣，為了吃到好吃的料理！"
1600605-24 = "我們來去游泳吧──！"
1600605-25 = "[s] 「倒頭來還是為了吃……」"
1600605-31 = "哦哦……！"
1600605-32 = "是大海！這幾天都在看的大海！"
1600605-33 = "哦──────咿！！"
1600605-38 = "啊哇哇！！！海浪打來了……！"
1600605-39 = "哇──！啊哈哈哈！老師！快來這邊！"
1600605-40 = "好驚人喔！這些全都是海耶！"
1600605-41 = "[s]「這是當然……？」"
1600605-42 = "直到地平線的另一端也都是海水對不對，好驚人喔！"
1600605-43 = "而且海水很鹹對不對，感覺可以用在料理上面。"
1600605-44 = "而且夏天吃重鹹的料理會更好吃──"
1600605-45 = "像是鹽漬檸檬～、鹽味拉麵～、醬油拉麵～……"
1600605-47 = "……咻嚕。"
1600605-48 = "[s] 「泉！？海水不能直接喝喔！？」"
1600605-49 = "討厭啦老師！不管怎麼樣我都不至於會喝海水啦！"
1600605-50 = "我只是想到拉麵而已！而且喝這麼多的水會太撐的！"
1600605-54 = "啊哈，好冰──！"
1600605-55 = "但好涼爽喔！快點，老師也過來吧！"
1600605-56 = "[s] 「泉，妳看起來很開心耶。」"
1600605-57 = "嗯！很開心唷！"
1600605-58 = "下水之前我本來還覺得很麻煩呢……"
1600605-59 = "真的下水之後，沒想到會這麼愉快！"
1600605-61 = "為什麼呢？雖然大海確實讓人很開心啦……"
1600605-62 = "是因為……"
1600605-63 = "……"
1600605-64 = "呵呵♪"
1600605-66 = "（爬爬爬爬爬……）"
1600605-67 = "……嗯？"
1600605-69 = "（爬爬爬爬爬……）"
1600605-70 = "咦耶……？"
1600605-71 = "[s] 「泉？怎麼了？」"
1600605-72 = "哇啊啊，咦，咦？！"
1600605-73 = "咦耶耶耶！老師，有東西在我的腳上！！"
1600605-74 = "[s] 「腳……？！」"
1600605-77 = "― 老，老師幫幫我～……！[wa:1670] "
1600605-80 = "[ns] 「泉！？怎麼了！？」"
1600605-81 = "― 呃呃，感覺好奇怪……[wa:1090] "
1600605-83 = "― 濕濕黏黏的，嗚哇……！[wa:2160] "
1600605-86 = "[ns] 「等，等一下！我馬上過去……！」"
1600605-87 = "― 不，不行～！[wa:640] "
1600605-89 = "― 我還不能被吃掉──！[wa:860] "
1600605-92 = "― 還有很多東西沒吃過啊啊──！！[wa:1480] "
1600605-95 = "― 咿！？唔唔，[wa:720] "
1600605-97 = "― 不能就這樣束手就擒……！[wa:730] "
1600605-100 = "[ns] 「……泉？」"
1600605-101 = "― 啊！還是說，[wa:980] "
1600605-103 = "― 與其就這樣被章魚吞下肚，不如在那之前……！[wa:2200] "
1600605-106 = "― 我就先把牠吃了！？[wa:1370] "
1600605-109 = "這然這樣，好……！"
1600605-110 = "只要我先吃掉對方，就是我贏了！！"
1600605-114 = "我開動啦！！！"
1600605-115 = "[s] 「泉！這在各種意義上都很危險啊！」"
1600605-117 = "（好不容易把章魚和泉分開，並在泉略顯失望的神情中，讓章魚平安回到大海了）"

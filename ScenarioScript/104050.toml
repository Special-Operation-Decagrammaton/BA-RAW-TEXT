[translation]
104050-1 = "第5話;簡單的解法"
104050-2 = "成功解除與「方舟」的連結。#n這樣一來，短時間內應該不會再被駭入才對。"
104050-3 = "是的。生命守護者停擺的系統也都恢復正常了！"
104050-4 = "這樣的話……！陽葵前輩，拜託你了！！"
104050-8 = "沒問題。接下來要重新設定安全系統。#n修復「生命守護者本艦」的控制權。"
104050-9 = "得取回「方舟」的控制權才行呢……#n莉央，命令季撤退吧！"
104050-10 = "……季，那座聖所很快就會被消滅。"
104050-15 = "沒錯，所以，在那之前──"
104050-16 = "──已經不用再戰鬥了。#n季，趕快撤退吧。"
104050-22 = "……非常抱歉，莉央大人。#n撤退……可能有困難。"
104050-26 = "季！？"
104050-27 = "我的身體……已經動彈不得了……明明還有敵人……"
104050-28 = "季，季……請至少移動到安全的地方吧。#n我已經要求支援了，很快就──"
104050-29 = "……不，不必了。#n我很清楚，救援是不會來的……"
104050-33 = "考量到千年與這裡的距離……#n要立刻到達……是不可能的。"
104050-39 = "……非常抱歉，莉央大人。"
104050-41 = "！？"
104050-42 = "還有，雖然時間並不長……能與您共事是我的榮幸，陽葵部長。"
104050-43 = "季……你在，說什麼……"
104050-44 = "我……其實……"
104050-45 = "……也想和「夏萊」一起戰鬥。"
104050-46 = "……和C&C的前輩們，一起。"
104050-49 = "……莉央大人。#n最後，請告訴我「Abi-Eshuh」的自爆密碼。"
104050-50 = "……！？"
104050-51 = "是莉央大人的話，一定有準備對吧……為了應對，我背叛的情況。"
104050-55 = "利用這個「武裝」的能量，應該就能破壞聖所才對。"
104050-56 = "……不，那種東西並不存在。我怎麼會，對你──"
104050-59 = "……您說過「電車難題」對吧。#n我一個人的性命，與奇普托斯的存亡──該如何選擇，答案非常明顯。"
104050-60 = "當時莉央大人說過，必須有人去拉動操作桿──"
104050-61 = "不是的，季。#n那是……那個問題……"
104050-62 = "……它的前提本身就是錯誤的。"
104050-63 = "……？"
104050-64 = "都是因為我沒有去尋找能夠幫忙的人……"
104050-65 = "……"
104050-67 = "如果，答案有那麼簡單就好了呢……"
104050-69 = "那是──"
104050-73 = "確認對象。已鎖定目標。"
104050-78 = "……！？"
104050-79 = "這，這是……？"
104050-90 = "前，前輩們……？"
104050-91 = "呀齁～季醬！我們來幫忙囉♪"
104050-92 = "沒錯，總算是趕上了呢。"
104050-93 = "就是啊，真是驚險。"
104050-97 = "喂，那邊的新人。"
104050-100 = "那種台詞──不准你在[ruby=・]前[/ruby][ruby=・]輩[/ruby]面前說第二次。"
104050-101 = "是，是怎麼趕到這裡的……"
104050-103 = "呼……幸好趕上了呢。"
104050-104 = "乃，乃愛……！？你究竟是怎麼……！"
104050-105 = "除非能預知未來，不然這種事──"
104050-106 = "C&C的各位在情況變成這樣之前就出發了唷。#n──搭乘千年速度最快的直升機。"
104050-107 = "這，這究竟是……"
104050-109 = "……是我拜託他的。"
104050-110 = "……！！"
104050-111 = "稱不上「預知夢」──卻無比接近的能力……還是該說是「直覺」呢……"
104050-112 = "只是有這種預感而已……所以我也有點難解釋。"
104050-113 = "並沒有完全確定──但是，乃愛相信了我。"
104050-114 = "呵呵，這不算什麼。#n大家都非常努力，我也只是做了能力所及的事情而已。"
104050-115 = "我的身邊也有「直覺」非～常好的後輩……#n而且──我也有類似的預感。"
104050-117 = "那麼C&C的各位。#n季同學就交給你們了唷。"
104050-121 = "……"
104050-122 = "事情就是這樣，莉央會長……"
104050-123 = "偶爾有這麼簡單的解法不也是件好事嗎？#n……對於能知曉未來而被迫承受痛苦的人來說，更是如此。"
104050-124 = "……"
104050-129 = "……總之，開始進行「掃除」吧！"
104050-130 = "啊啊，處理殘黨吧。"
104050-131 = "很好！上吧！"
104050-133 = "It's show time！"
104050-136 = "會長？請振作一點！"
104050-140 = "要是有話想說，等回到千年再說吧！#n現在不是發呆的時候吧！"
104050-141 = "……說的沒錯。#n我知道了，優香。"
104050-142 = "真是的……會長之前是這種角色嗎……？"
104050-146 = "唉呀，你不知道嗎？#n別看大姐頭那樣，其實內心和淨化槽裡的汙水一樣唷。"
104050-150 = "……那個比喻我完全聽不懂啊？"
104050-156 = "我這邊的作業也結束了。#n我要利用「生命守護者」的演算裝置，重新啟動「方舟」的「自爆程式」。#n請大家做好準備。"
104050-157 = "但是……"
104050-158 = "嗯……這樣一來，這艘船就必須留在這裡，和「方舟」一起爆炸。"
104050-159 = "那，那我們……？"
104050-160 = "……要用我準備的「逃出程式」返回地面。"
104050-162 = "下一話;同等的條件"

[translation]
104050-1 = "Episode 5; A Convenient Choice"
104050-2 = "I disconnected the Ark. Now it won't be able to hack Utnapishtim for a while, at least."
104050-3 = "Utnapishtim's systems are starting to recover!"
104050-4 = "In that case, Himari, it's all you!"
104050-8 = "I'm resetting the barrier now. I'll have control of Utnapishtim soon!"
104050-9 = "We must quickly regain control of the Ark's captured computational device! Rio! Order Toki to retreat!"
104050-10 = "...Toki! We can eliminate the sanctum on our end!"
104050-15 = "Yes, I can handle it. So please, get out of there!"
104050-16 = "Don't worry about it! Retreat for now!"
104050-22 = "I'm sorry... Rio... That's a second order... I must disobey today."
104050-26 = "Toki?!"
104050-27 = "It seems I can't move anymore... But I have to stop it..."
104050-28 = "Toki, w-wait. I've requested support, so..."
104050-29 = "No, I know that support is impossible..."
104050-33 = "I'm too far out for reinforcements..."
104050-39 = "...I'm sorry, Rio."
104050-41 = "?!"
104050-42 = "It may have been brief, but it was an honor to work with you, President Himari."
104050-43 = "Th-That's..."
104050-44 = "I know it's too late to confess, but I..."
104050-45 = "...I wanted to fight on the same side as Schale..."
104050-46 = "And...with the C&C upperclassmen..."
104050-49 = "...Rio. Please tell me how to self-destruct Abi-Eshuh."
104050-50 = "Huh?!"
104050-51 = "I figured you'd prepare something like that...just in case I betrayed you."
104050-55 = "I can destroy this sanctum using the weapon's energy."
104050-56 = "...No, Toki. There's no such function. Why would I do that to you...?"
104050-59 = "You talked about the trolley problem... My life and the destruction of Kivotos... Isn't it obvious what the choice is?"
104050-60 = "You said someone has to pull the lever..."
104050-61 = "No, Toki. That's..."
104050-62 = "I realized, the premise of that problem was wrong."
104050-63 = "...What?"
104050-64 = "There's another option. To look for someone around who can help save everyone. "
104050-65 = "..."
104050-67 = "That would be a convenient choice, but..."
104050-69 = "That's..."
104050-73 = "Target confirmed."
104050-78 = "...?!"
104050-79 = "What's happening...?"
104050-90 = "A-All of you...?"
104050-91 = "Hi, Toki! We came to help!"
104050-92 = "C&C, reporting in. We just barely made it."
104050-93 = "We've arrived. I'm relieved it was on time."
104050-97 = "Hey, Toki."
104050-100 = "You shouldn't steal the spotlight from your upperclassmen, you know!"
104050-101 = "H-How did you..."
104050-103 = "*sigh* We're all safe. "
104050-104 = "N-Noa...? H-How...?"
104050-105 = "How could you have known...? You would have to be able to see the future to have..."
104050-106 = "Are you curious how they got there so quickly, President? They were already riding Millennium's fastest helicopter to this location before the situation even began."
104050-107 = "How is that possible? "
104050-109 = "It was my request, actually."
104050-110 = "...!"
104050-111 = "I may no longer have my prophetic powers, but I've retained some of my senses."
104050-112 = "I had an ominous feeling, which I now know was warning me of the False Sanctum that appeared here."
104050-113 = "It was just a hunch, but thankfully Noa of Seminar took me at my word."
104050-114 = "Heehee. Not at all. Everyone's been doing their best. It was the least I could do."
104050-115 = "I have an underclassman with very good intuition that I trust, so I assumed this would be similar."
104050-117 = "Now then, if you wouldn't mind bringing Toki safely home, C&C."
104050-121 = "..."
104050-122 = "That's how it happened, President Rio."
104050-123 = "It's nice to have convenient choices at times, especially for people who've suffered from glimpsing the future."
104050-124 = "..."
104050-129 = "Now then, we can discuss the details later. For now, it's time to clean up."
104050-130 = "There are some leftovers that need to be disposed of."
104050-131 = "Sounds good to me. Let's do it in style."
104050-133 = "It's show time!"
104050-136 = "Come to your senses, President!"
104050-140 = "You can thank me when we get back to the academy! Right now, none of us can afford to let our guards down!"
104050-141 = "Sorry, Yuuka. You're right."
104050-142 = "Seriously, I've never seen the president like this before. Or was she always like this deep down?"
104050-146 = "Don't you know? Big Sister might act haughty and superior on the outside, but she's just a septic tank on the inside."
104050-150 = "That... That didn't really clear anything up for me."
104050-156 = "Okay, I've regained control of the ship. Using Utnapishtim's computational device, I'll run the Ark of Atrahasis' self-destruct sequence again. Get ready, everyone."
104050-157 = "Wouldn't that mean...? "
104050-158 = "Yes. The ship will have to remain here and explode with the Ark."
104050-159 = "And we're just supposed to, what, blow up with it?"
104050-160 = "...I'll evacuate the rest of you back to land with the evacuation sequence I created."
104050-162 = "Next Episode; All Things Being Equal"

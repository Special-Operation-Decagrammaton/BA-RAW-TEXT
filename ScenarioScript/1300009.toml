[translation]
1300009-1 = "迎接耀眼的午後"
1300009-2 = "夏萊．辦公室"
1300009-4 = "……"
1300009-5 = "…………"
1300009-8 = "哎呀，主人。竟然能在這裡遇見您，真是太巧了對吧？"
1300009-9 = "[s1] 「到剛才為止你都還在使喚我吧！？」\n[s2] 「是朱音你叫我來的，不能說是巧合吧。」"
1300009-10 = "呵呵，就別在意這些小細節了。"
1300009-11 = "呵呵，就別在意這些小細節了。"
1300009-12 = "就像您說的，這次見面並不是巧合。"
1300009-13 = "而是命中注定。"
1300009-14 = "……"
1300009-15 = "呵呵，您不用這麼疑惑。"
1300009-16 = "正好之……之前您幫忙完成任務的回禮已經準備好了，那麼我們走吧？"
1300009-20 = "某間住宅"
1300009-25 = "呵呵，比想像中還乾淨呢。"
1300009-26 = "您說這個房間？這是我準備好的房間。"
1300009-27 = "請在這邊，稍微等我一下。"
1300009-28 = "請您記得，在我喊您之前，絕對不可以從房間裡出來喔？"
1300009-29 = "啊，讓您幫忙了一整天，應該很累了吧。您要稍微躺一下也沒關係的喔。"
1300009-31 = "……"
1300009-34 = "主人。"
1300009-35 = "主人，請起來。"
1300009-38 = "[ns3] 起床，然後到外頭看看。\n[ns4] 再睡一下……"
1300009-40 = "……"
1300009-41 = "（唰……）"
1300009-42 = "……？"
1300009-43 = "（有股好聞的香氣）"
1300009-44 = "……"
1300009-45 = "（唰唰……）"
1300009-46 = "……？"
1300009-47 = "（有股好聞的香氣）"
1300009-48 = "（咻）"
1300009-50 = "您醒了呀。"
1300009-51 = "呵呵。居然真的睡著了，看來您真的累了呢。"
1300009-52 = "那我們就開始吧？女僕與主人的，雖然老套但也是最棒的時間。"
1300009-55 = "― 哎呀。歡迎回來。[wa:1120] "
1300009-57 = "― 今天一天過得怎麼樣呢？[wa:1280] "
1300009-60 = "― 啊，主人。正巧，用最高級茶葉泡的茶已經泡好了唷。[wa:3580] "
1300009-62 = "― 讓我為您準備一杯如何呢？[wa:1920] "
1300009-65 = "― 哎？這裡不是我們家？[wa:2940] "
1300009-68 = "― 呵呵。不用在意。就算這不是我們家，[wa:3780] "
1300009-70 = "― 但我們現在，就在一起呀。"
1300009-73 = "呵呵，我為您準備的禮物，您還滿意嗎？這一直是，我夢寐以求的。"
1300009-74 = "C&C的朱音。未來也將誠心誠意地，為您服務。"

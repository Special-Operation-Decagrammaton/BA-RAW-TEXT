1300009-44 = "......"
1300009-45 = "(...ย่างเท้าเดิน...)"
1300009-46 = "......?"
1300009-47 = "(ได้กลิ่นหอม)"
1300009-48 = "(พรึ่บ)"
1300009-50 = "ตื่นแล้วเหรอคะ?"
1300009-51 = "ฮุฮุ ไม่คิดว่าจะหลับไปจริงๆ นะเนี่ย"
1300009-52 = "งั้นเรามาเริ่มกันเลยมั้ยคะ?"
1300009-55 = "― อุ๊ย กลับมาแล้วเหรอคะ[wa:600] "
1300009-57 = "― วันนี้เป็นยังไงบ้างคะ?[wa:840] "
1300009-60 = "― จริงสิ นายท่านคะ ฉันเพิ่งได้ใบชาชั้นดีมาค่ะ[wa:2820] "
1300009-62 = "― ฉันเตรียมชาให้ดีมั้ยคะ?[wa:1480] "
1300009-65 = "― คะ? ที่นี่ไม่ใช่บ้านของเรางั้นเหรอคะ?[wa:1860] "
1300009-68 = "― ฮุฮุ ไม่เป็นไรหรอกค่ะ ถึงจะไม่ใช่บ้านของเรา[wa:2740] "
1300009-70 = "― แต่ว่าตอนนี้เราก็อยู่ด้วยกันนี่คะ"
1300009-73 = "ถูกใจของขวัญที่ฉันเตรียมมามั้ยคะ?"
1300009-74 = "อาคาเนะจาก C&C จะรับใช้นายท่านอย่างจริงใจค่ะ"

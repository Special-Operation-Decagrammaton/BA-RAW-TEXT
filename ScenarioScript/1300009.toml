1300009-8 = "โอ๊ะ! นายท่าน! บังเอิญจังเลย!"
1300009-9 = "[s1] \"ใช้งานทั้งวันเลย!\"\n[s2] \"บังเอิญอะไรล่ะ เรียกครูมาเองไม่ใช่เหรอ?\""
1300009-10 = "ไม่ต้องสนใจเรื่องเล็กๆ น้อยๆ หรอกค่ะ"
1300009-11 = "ไม่ต้องสนใจเรื่องเล็กๆ น้อยๆ หรอกค่ะ"
1300009-12 = "แต่ก็จริงอย่างที่นายท่านว่า นี่ไม่ใช่เรื่องบังเอิญหรอกค่ะ"
1300009-13 = "เป็นพรหมลิขิตมากกว่า"
1300009-14 = "......"
1300009-15 = "ฮุฮุ อย่าตกใจขนาดนั้นสิคะ"
1300009-16 = "ฉันมีอะไรตอบแทนที่นายท่านเคยช่วยฉันไว้ครั้งก่อนด้วยค่ะ"
1300009-20 = "บ้านหลังหนึ่ง"
1300009-25 = "อืม ดูสะอาดกว่าที่คิดไว้เลยนะ"
1300009-26 = "บ้านหลังนี้น่ะเหรอคะ? ก็ที่ที่ฉันเตรียมไว้ให้ยังไงล่ะคะ"
1300009-27 = "นายท่านรอในห้องนี้ก่อนนะคะ"
1300009-28 = "ถ้าฉันยังไม่เรียก ก็อย่าเพิ่งออกมานะคะ ห้ามเด็ดขาดเลย!"
1300009-29 = "เพิ่งเลิกงานมาแบบนี้คงจะเหนื่อยน่าดู นอนอยู่ตรงนี้ก่อนสิคะ"
1300009-31 = "......"
1300009-34 = "นายท่าน"
1300009-35 = "นายท่าน ตื่นได้แล้วค่ะ"
1300009-38 = "[ns3] ตื่นแล้วลุกออกไปข้างนอก\n[ns4] นอนต่ออีกหน่อย..."

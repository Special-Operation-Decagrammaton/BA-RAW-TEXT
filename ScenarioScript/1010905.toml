[translation]
1010905-1 = "無味"
1010905-2 = "夏萊．休息室"
1010905-4 = "（隔天，躺在休息室的床上補眠……）"
1010905-11 = "打擾了～"
1010905-12 = "老師好。就像昨天說的一樣，我來探病了。"
1010905-13 = "身體狀況還好嗎？"
1010905-14 = "[s1]「……你來啦，乃愛。」\n[s2]「抱歉沒辦法起來迎接你。」"
1010905-17 = "別這麼說，老師是因為身體不好才這樣，不用放在心上。"
1010905-21 = "桌子上的飲料和空便當盒，我可以清掉嗎？"
1010905-22 = "啊，垃圾桶好像也滿了，整理的時候我會一起倒掉的。"
1010905-26 = "壓在書下面的這份文件是……這個月的辦公室水電費明細。"
1010905-27 = "繳交期限沒剩多久了，這個我也會處理好的。"
1010905-28 = "[s]「你不用什麼都幫我處理沒關係……」"
1010905-29 = "不用客氣，畢竟這也不是什麼麻煩的事。"
1010905-30 = "今天就請老師拋開雜務，好好休息吧。"
1010905-31 = "只要當成是值日生工作的延伸，由我負責處理也是理所當然的──"
1010905-32 = "[s3]「但今天不是乃愛當值日生的日子吧……？」\n[s4]「不然至少換上舒服一點的衣服吧。」"
1010905-35 = "舒服一點的衣服……"
1010905-40 = "那麼，我可以借用一下更衣室嗎？"
1010905-41 = "[s]「嗯，儘管用吧。」"
1010905-42 = "呵呵，那就不好意思了。"
1010905-47 = "（不久後……）"
1010905-50 = "我回來了。"
1010905-51 = "[s]「乃愛，你這身打扮是……？」"
1010905-52 = "嗯？有哪裡奇怪嗎？"
1010905-53 = "老師剛才要我換上舒服一點的衣服，所以我就換了睡衣呀？"
1010905-54 = "[s]「要是被其他學生看到的話，可能會引發誤會……」"
1010905-55 = "不過我記得在今天的行程中，沒有學生會拜訪夏萊。"
1010905-56 = "而且勸我換上舒適服裝的人不是老師嗎？"
1010905-57 = "還是老師希望我換上其他衣服呢？"
1010905-61 = "[ns]「……沒關係，就穿這套吧。」"
1010905-62 = "好的，那麼在我整理好之前，老師就在床上好好休息吧。"
1010905-67 = "這樣好像都整理完了……"
1010905-68 = "話說回來，老師吃過午飯了嗎？"
1010905-69 = "[s]「我沒胃口，所以還沒吃……」"
1010905-70 = "不行哦，就算沒胃口也要按時吃飯，這樣才能快點好起來。"
1010905-71 = "……這麼說來，上次老師來探病的時候為我煮了雞蛋粥對吧？"
1010905-72 = "不介意的話，這次換我做菜給老師吃吧？"
1010905-73 = "[s]「乃愛為我做的菜……好期待。」"
1010905-74 = "雖然我其實做不出什麼厲害的食物……"
1010905-75 = "麻煩老師稍等一下囉。"
1010905-84 = "久等了。"
1010905-85 = "冰箱有蝦子和秋葵，所以我煮了蝦子清湯和蒸蛋。"
1010905-86 = "我是按照平常自己的口味來做……不知道合不合老師的胃口。"
1010905-87 = "[s5]「只要是乃愛做的，肯定會很好吃！」\n[s6]「我會好好享用的，乃愛。」"
1010905-90 = "好的，還請趁冷掉之前慢慢享用。"
1010905-95 = "那個……料理不合你的胃口嗎？"
1010905-96 = "[s]「不會，真的很好吃！」"
1010905-97 = "但是老師剛才吃了第一口之後，露出了訝異的表情。"
1010905-98 = "[s7]「因為我平常主要都吃重口味的食物。」\n[s8]「所以一時忘了這是口味清淡的病人餐。」"
1010905-101 = "啊……"
1010905-102 = "不好意思，其實我並沒有刻意做的特別清淡。"
1010905-103 = "我忽略了這是要給老師吃的食物，因此是按照自己平常的方式進行調味。"
1010905-104 = "我自己吃飯的時候，幾乎不會在食物中加調味料，所以不知不覺就習慣了。"
1010905-105 = "[s]「乃愛不喜歡為食物調味嗎？」"
1010905-106 = "嗯，畢竟調味多少會掩蓋食材原本的味道。"
1010905-107 = "我認為不干擾周遭色彩、毫無個性的品味，#n對於我記錄他人生活的使命有所幫助，所以一直以來從未做出改變……"
1010905-108 = "結果卻因為這樣的個性，就連要拿出能讓老師滿意的料理也做不到。"
1010905-112 = "[ns] 一口氣吃光乃愛做的料理"
1010905-115 = "老，老師？#n小心燙，請慢慢吃──"
1010905-116 = "[s]「抱歉，因為太好吃了，我實在忍不住。」"
1010905-118 = "[ns]「還有，我想再拜託乃愛一件事。」"
1010905-119 = "拜託我？"
1010905-120 = "[s]「嗯，這件事只能拜託乃愛！」"
1010905-121 = "只有我能做的事……？"
1010905-132 = "― [log=노아 파자마]「閃閃發亮的繁星，宛如羊群般靜靜地流淌……」 [/log][wa:8330] "
1010905-135 = "― [log=노아 파자마]老師你，還真特別呢。[/log][wa:2190] "
1010905-137 = "― [log=노아 파자마]居然會想聽著我那毫無特色的朗讀入睡。[/log][wa:3730] "
1010905-140 = "[ns]「因為乃愛的朗讀，聽起來最能讓人沉浸其中。」"
1010905-142 = "― [log=노아 파자마]……這是為什麼呢？[/log][wa:3270] "
1010905-144 = "― [log=노아 파자마]因為聲音既通透又悅耳，所以能想像到文字裡的意境……？[/log][wa:4810] "
1010905-147 = "― [log=노아 파자마]……謝謝你，老師。[/log][wa:4770] "
1010905-149 = "― [log=노아 파자마]讓我也重新審視了自己。[/log][wa:3160] "
1010905-152 = "― [log=노아 파자마]……老師？已經睡著了嗎？[/log][wa:3800] "
1010905-155 = "― [log=노아 파자마]其中閃耀得最美的星辰……[/log][wa:4980] "
1010905-157 = "― [log=노아 파자마]也許是因為迷失了方向，在我的腳邊進入了夢鄉。[/log][wa:5720] "
1010905-160 = "（乃愛幾乎無色無味的溫柔嗓音，逐漸滲入了疲累的身體）"
1010905-161 = "（……拜其所賜，久違地睡了個好覺）"

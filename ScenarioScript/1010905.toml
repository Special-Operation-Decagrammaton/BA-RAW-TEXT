[translation]
1010905-1 = "Tasteless"
1010905-2 = "Schale Lounge"
1010905-4 = "The next day, I was resting on the bed in Schale's lounge."
1010905-11 = "Pardon me!"
1010905-12 = "Hello, Sensei. As promised, I've come to visit."
1010905-13 = "How are you feeling?"
1010905-14 = "[s1] \"...Noa, you really came.\"\n[s2] \"I'm sorry I can't get up to greet you.\""
1010905-17 = "Don't push yourself. I know you're not feeling well."
1010905-21 = "Do you mind if I clear off the drinks and empty lunch box on the table?"
1010905-22 = "Ah! The trash needs to be taken out. I'll do that as well."
1010905-26 = "What's underneath this book...? It looks like this month's utility bill."
1010905-27 = "And it's due soon. I can take care of it."
1010905-28 = "[s] \"You really don't have to do all this for me...\""
1010905-29 = "No, no. This much is nothing."
1010905-30 = "Your only job is to rest and not think about work."
1010905-31 = "These tasks are all part of the Student Rep's responsibilities regardless."
1010905-32 = "[s3] \"But you're not even on duty today...\"\n[s4] \"Why don't you at least get more comfortable?\""
1010905-35 = "Something more comfortable...?"
1010905-40 = "In that case, may I have permission to use the changing room?"
1010905-41 = "[s] \"Of course. Go ahead.\""
1010905-42 = "Heehee. Just a moment, then."
1010905-47 = "A short time later..."
1010905-50 = "I'm back."
1010905-51 = "[s] \"Noa, your outfit...\""
1010905-52 = "Yes? Is there a problem?"
1010905-53 = "You did say to dress comfortably. I thought my pajamas would do."
1010905-54 = "[s] \"Other students might misunderstand...\""
1010905-55 = "There aren't any students scheduled to visit today."
1010905-56 = "And you're the one who told me to get comfortable."
1010905-57 = "Is there a different type of outfit you'd like to make me wear?"
1010905-61 = "[ns] \"...Dress in whatever makes you comfortable.\""
1010905-62 = "Okay, then please just lay back and relax while I finish up here."
1010905-67 = "That should be it..."
1010905-68 = "Sensei, have you had lunch yet?"
1010905-69 = "[s] \"No, I don't have much of an appetite...\""
1010905-70 = "Even if you don't feel like it, it's essential for you to eat well if you want to recover quickly!"
1010905-71 = "...If I recall, you made me egg porridge when you visited me, didn't you?"
1010905-72 = "So this time, I'll make something for you."
1010905-73 = "[s] \"Food made by you? I want some.\""
1010905-74 = "It won't be anything fancy, but..."
1010905-75 = "Well, please wait for just a moment."
1010905-84 = "Thank you for waiting!"
1010905-85 = "I made some shrimp soup with the shrimp and okra I found in the refrigerator and some steamed egg on the side."
1010905-86 = "I prepared it the way I normally like it. I hope you enjoy."
1010905-87 = "[s5] \"I'd enjoy anything you made me!\"\n[s6] \"Thank you, Noa.\""
1010905-90 = "Yes, please enjoy it before it gets cold."
1010905-95 = "Um... Is it not to your taste?"
1010905-96 = "[s] \"No, it's really delicious!\""
1010905-97 = "You looked...confused after the first sip."
1010905-98 = "[s7] \"Well, I usually eat food that is heavily seasoned.\"\n[s8] \"I just forgot that it was a low-sodium diet for patients.\""
1010905-101 = "Oh..."
1010905-102 = "I'm sorry. That's not why I made it bland."
1010905-103 = "I actually just made it the way I usually eat it. I should've considered your preferences."
1010905-104 = "When eating alone, I don't season my food with many spices or salt. I suppose it's become a habit without me realizing."
1010905-105 = "[s] \"You don't like seasoning your food?\""
1010905-106 = "Yes, too much seasoning can hide the true taste of the ingredients."
1010905-107 = "My mission to live in a neutral way that doesn't affect my environment, so I may impartially document others' lives..."
1010905-108 = "...seems to has negatively affected my mission to make you a delicious meal."
1010905-112 = "[ns] Quickly finish Noa's food."
1010905-115 = "S-Sensei, it's hot, please eat slowly—"
1010905-116 = "[s] \"I'm sorry. It was just so good, I couldn't stop myself.\""
1010905-118 = "[ns] \"Noa, can I ask you for one more favor?\""
1010905-119 = "A favor from me?"
1010905-120 = "[s] \"Yes, this is something only you can do!\""
1010905-121 = "Something only I can do...?"
1010905-132 = "― [log=노아 파자마]\"The twinkling stars were shining, quietly and obediently, like a large herd of sheep...\" [/log][wa:5650] "
1010905-135 = "― [log=노아 파자마]You can be such an unpredictable person, Sensei.[/log][wa:670] "
1010905-137 = "― [log=노아 파자마]I can't believe you want to fall asleep listening to my boring reading.[/log][wa:1610] "
1010905-140 = "[ns] \"Hearing you read it gets me really immersed in the story.\""
1010905-142 = "― [log=노아 파자마]...I wonder why. [/log][wa:2950] "
1010905-144 = "― [log=노아 파자마]Does my monotonous voice convey the meaning more clearly...?[/log][wa:3450] "
1010905-147 = "― [log=노아 파자마]Thank you, Sensei.[/log][wa:4410] "
1010905-149 = "― [log=노아 파자마]Thanks to you, I have been able to embrace myself more fully.[/log][wa:1160] "
1010905-152 = "― [log=노아 파자마]...Sensei? Are you asleep? [/log][wa:3200] "
1010905-155 = "― [log=노아 파자마]Among those countless stars, there is a single one, most bright and delicate. [/log][wa:2340] "
1010905-157 = "― [log=노아 파자마]It has lost its way and quietly fallen asleep.[/log][wa:4760] "
1010905-160 = "Noa's soft, monotonous voice gradually seeped into my aching body."
1010905-161 = "...Thanks to her, I was able to get a deep sleep for the first time in a while."

1010905-102 = "3;노아 파자마;09;죄송해요. 사실 일부러 간을 약하게 한 건 아니에요."
1010905-103 = "3;노아 파자마;07;제가 선생님께 드릴 음식이라는 걸 간과하고 평소에 먹던 대로 만들어 버려서 간이 약해진 모양이에요.\n#3;em;[세로선]"

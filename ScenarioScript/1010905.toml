[translation]
1010905-1 = "ไร้รส"
1010905-2 = "ห้องพักผ่อนชาเล่ต์"
1010905-4 = "(วันต่อมา ในระหว่างที่คุณครูนอนลงบนเตียงในห้องพักผ่อนเพื่อชดเชยที่ไม่ได้พักผ่อนมาหลายวัน...)"
1010905-11 = "ขอเสียมารยาทนะคะ~"
1010905-12 = "สวัสดีค่ะ คุณครู ฉันแวะมาเยี่ยมตามที่บอกไปเมื่อวานค่ะ"
1010905-13 = "ร่างกายเป็นยังไงบ้างคะ?"
1010905-14 = "[s1] \"โนอาเหรอ... ครูลุกไม่ไหวเลย ขอโทษนะ\"\n[s2] \"ขอโทษที่ออกไปต้อนรับไม่ไหวนะ\""
1010905-17 = "ไม่เป็นไรเลยค่ะ ก็คุณครูไม่สบายอยู่นี่คะ ไม่ต้องรู้สึกผิดนะคะ"
1010905-21 = "เครื่องดื่มกับข้าวกล่องที่กินไว้บนโต๊ะ ให้ฉันช่วยเก็บไปทิ้งให้มั้ยคะ?"
1010905-22 = "อ๊ะ ดูเหมือนถังขยะจะเต็มแล้วด้วย งั้นฉันจะเอาขยะไปทิ้งให้แล้วกลับมานะคะ"
1010905-26 = "เอกสารที่อยู่ใต้หนังสือตรงนี้... คือรายละเอียดค่าสาธารณูปโภคของสำนักงานประจำเดือนนี้สินะคะ"
1010905-27 = "เหมือนว่าจะใกล้ถึงกำหนดส่งแล้วด้วย งั้นเดี๋ยวงานนี้ฉันจัดการให้ค่ะ"
1010905-28 = "[s] \"ไม่ต้องทำให้ครูถึงขนาดนั้นก็ได้นะ...\""
1010905-29 = "ไม่เป็นไรเลยค่ะ นี่เป็นงานที่ฉันถนัดอยู่แล้วค่ะ"
1010905-30 = "คุณครูไม่ต้องกังวลเรื่องงานนะคะ วันนี้พักผ่อนให้เต็มที่เลยค่ะ"
1010905-31 = "ฉันจะคิดว่าอยู่เวรต่ออีกหน่อย ดังนั้นมันก็เป็นงานที่ฉันควรต้องทำค่ะ"
1010905-32 = "[s3] \"แต่วันนี้ไม่ใช่เวรโนอานี่นา ไปใส่เสื้อผ้าสบายๆ เถอะ\"\n[s4] \"ไปแต่งตัวให้สบายๆ แล้วนั่งพักผ่อนรอครูเถอะนะ\""
1010905-35 = "ให้แต่งตัวให้สบายๆ..."
1010905-40 = "งั้นฉันขอยืมใช้ห้องเปลี่ยนเสื้อผ้าหน่อยได้มั้ยคะ?"
1010905-41 = "[s] \"อื้อ ใช้ได้ตามสบายเลย\""
1010905-42 = "ฮุฮุ งั้นฉันขอเสียมารยาทหน่อยนะคะ"
1010905-47 = "(ครู่ต่อมา...)"
1010905-50 = "กลับมาแล้วค่ะ"
1010905-51 = "[s] \"โนอา ชุดนี้มัน...?\""
1010905-52 = "คะ? มีอะไรแปลกเหรอคะ?"
1010905-53 = "คุณครูบอกให้ฉันแต่งตัวสบายๆ ฉันก็เลยเปลี่ยนมาใส่ชุดนอนให้ไงล่ะคะ?"
1010905-54 = "[s] \"แต่ถ้านักเรียนคนอื่นมาเห็น อาจจะเข้าใจผิดได้...\""
1010905-55 = "แต่ฉันแน่ใจว่าวันนี้ไม่น่ามีนักเรียนที่มีนัดกับชาเล่ต์นะคะ"
1010905-56 = "นอกจากนี้ คนที่ขอให้ฉันไปเปลี่ยนเป็นชุดสบายๆ มาก็คือคุณครูไม่ใช่เหรอคะ?"
1010905-57 = "หรือว่ามีชุดอะไรในใจที่อยากให้ฉันใส่เหรอคะ?"
1010905-61 = "[ns] \"ครูฝากตัวด้วยนะวันนี้...\""
1010905-62 = "ค่ะ ถ้างั้นก็นอนพักผ่อนให้สบายจนกว่าฉันจะทำงานและเก็บกวาดห้องเสร็จนะคะ"
1010905-67 = "เท่านี้ก็น่าจะเรียบร้อยแล้วนะ..."
1010905-68 = "ว่าจะไป คุณครูรับประทานข้าวกลางวันหรือยังคะ?"
1010905-69 = "[s] \"ยังเลย ครูไม่อยากอาหารน่ะ...\""
1010905-70 = "ไม่ได้ค่ะ ต่อให้ไม่อยากอาหาร แต่ก็ต้องทานข้าวให้ตรงเวลา จะได้หายไวๆ ไงคะ"
1010905-71 = "จริงสิ... ตอนคุณครูไปเยี่ยมฉันครั้งที่แล้ว คุณครูทำโจ๊กไข่ให้ฉันด้วยนี่นา"
1010905-72 = "งั้นวันนี้ให้ฉันทำอะไรให้ทานดีมั้ยคะ?"
1010905-73 = "[s] \"อาหารที่โนอาทำเหรอ... อยากกินแล้วสิ\""
1010905-74 = "แต่ฉันทำเมนูอะไรยากๆ ไม่เป็นหรอกนะคะ"
1010905-75 = "งั้นช่วยรอสักครู่นะคะ เดี๋ยวฉันไปทำมาให้ค่ะ"
1010905-84 = "รอนานมั้ยคะ?"
1010905-85 = "ฉันเห็นกุ้งกับกระเจี๊ยบในตู้เย็น ก็เลยทำซุปกุ้งน้ำใสมาให้ แล้วก็ทำไข่ตุ๋นมาให้ด้วยค่ะ"
1010905-86 = "ฉันทำตามสูตรที่ทำกินปกติเป็นประจำ... ไม่รู้ว่าจะถูกปากคุณครูหรือเปล่านะคะ"
1010905-87 = "[s5] \"ถ้าเป็นอาหารจากโนอา ไม่ว่าอะไรก็ต้องอร่อยอยู่แล้ว!\"\n[s6] \"ต้องถูกปากครูอยู่แล้วละ จะกินให้อร่อยเลยนะ\""
1010905-90 = "ค่ะ รีบทานก่อนจะอาหารจะเย็นหมดนะคะ"
1010905-95 = "เอ่อ... อาหารเป็นยังไงบ้างคะ อร่อยมั้ยคะ?"
1010905-96 = "[s] \"อร่อยมากๆ เลย!\""
1010905-97 = "แต่ตอนทานคำแรก คุณครูเหมือนทำหน้าแปลกๆ เลย"
1010905-98 = "[s7] \"ปกติครูจะกินอาหารรสเค็มๆ เป็นส่วนใหญ่น่ะ\"\n[s8] \"ครูลืมไปว่านี่คืออาหารรสอ่อนๆ สำหรับคนป่วยน่ะ\""
1010905-101 = "อ่า..."
1010905-102 = "ขอโทษค่ะ ที่จริงฉันไม่ได้ตั้งใจปรุงให้มีรสอ่อนๆ หรอกค่ะ"
1010905-103 = "พอทำเมนูที่ฉันทำกินเองบ่อยๆ ฉันก็ลืมไปว่านี่คืออาหารที่ทำให้คุณครู ก็เลยปรุงรสแบบที่ตัวเองกิน#nตามปกติน่ะค่ะ"
1010905-104 = "เวลาฉันกินข้าวคนเดียว ฉันแทบจะไม่ใส่เครื่องปรุงรสลงไปในอาหารเลย สงสัยมันจะติดเป็นนิสัยไป#nแล้วค่ะ"
1010905-105 = "[s] \"โนอาไม่ชอบอาหารที่ปรุงรสเยอะๆ เหรอ?\""
1010905-106 = "ค่ะ ถ้าฉันทำอาหารกินเอง ฉันชอบให้อาหารมีรสชาติเดิมของวัตถุดิบน่ะค่ะ"
1010905-107 = "ฉันคิดว่าการมีรสนิยมที่ไร้เอกลักษณ์เฉพาะตนและไม่ล่วงล้ำเอกลักษณ์ของสภาพแวดล้อมจะมีส่วน#nช่วยในหน้าที่ของฉันที่ต้องจดบันทึกเรื่องราวชีวิตของคนอื่น แล้วมันก็ติดเป็นนิสัยมาจนถึงทุกวันนี้..."
1010905-108 = "สุดท้ายแล้วนิสัยที่จืดชืดของฉันก็ทำให้คุณครูไม่ได้ทานอาหารที่ต้องการสินะคะ"
1010905-112 = "[ns] กินอาหารที่โนอาทำมาให้จนหมดในพริบตา"
1010905-115 = "คะ... คุณครู? มันร้อนนะคะ ค่อยๆ ทานก็ได้..."
1010905-116 = "[s] \"ขอโทษที มันอร่อยจนครูหยุดกินไม่ได้เลยน่ะ\""
1010905-118 = "[ns] \"จริงสิ ครูมีเรื่องอยากขอให้โนอาช่วยอยู่อย่างหนึ่ง\""
1010905-119 = "มีเรื่องให้ฉันช่วยเหรอคะ?"
1010905-120 = "[s] \"อื้อ เรื่องนี้ครูขอได้แต่กับโนอาเท่านั้นน่ะ!\""
1010905-121 = "เป็นเรื่องที่มีแต่ฉันที่ทำได้เหรอ...?"
1010905-132 = "― [log=노아 파자마]<ดวงดาวน้อยใหญ่ที่แพรวพราวกำลังค่อยๆ เคลื่อนที่ไปเงียบๆ ราวกับฝูงแกะเหลือคณานับ...>[/log][wa:5930] "
1010905-135 = "― [log=노아 파자마]คุณครูนี่ก็เป็นคนนิสัยแปลกจริงๆ นะคะ[/log][wa:1150] "
1010905-137 = "― [log=노아 파자마]ไม่อยากเชื่อเลยว่าอยากนอนฟังฉันอ่านหนังสือที่ไม่ได้พิเศษ และมีเสน่ห์อะไรเลย[/log][wa:1450] "
1010905-140 = "[ns] \"แต่การอ่านของโนอาทำให้ครูจดจ่อกับเรื่องที่ฟังมากขึ้นนะ\""
1010905-142 = "― [log=노아 파자마]...เป็นเพราะอะไรกันเหรอคะ [/log][wa:2590] "
1010905-144 = "― [log=노아 파자마]เพราะน้ำเสียงที่จืดชืดของฉันทำให้ความหมายของเรื่องถูกส่งต่ออย่างแจ่มชัด หรือเปล่าคะ...?[/log][wa:2370] "
1010905-147 = "― [log=노아 파자마]ขอบคุณนะคะ คุณครู[/log][wa:4450] "
1010905-149 = "― [log=노아 파자마]คุณครูทำให้ฉันเผชิญหน้ากับตัวเองได้มากขึ้นค่ะ[/log][wa:1800] "
1010905-152 = "― [log=노아 파자마]คุณครูคะ...? หลับแล้วเหรอคะ? [/log][wa:3120] "
1010905-155 = "― [log=노아 파자마]ในบรรดาดวงดาราเหล่านั้น มีดาวดวงหนึ่งที่ดวงเล็ก และเปล่งประกายที่สุด [/log][wa:2700] "
1010905-157 = "― [log=노아 파자마]มันหลงทางและหลับใหลอยู่ใกล้ๆ ฉันค่ะ[/log][wa:5200] "
1010905-160 = "(น้ำเสียงที่จืดชืดแต่อบอุ่นของโนอาค่อยๆ แทรกซึมเข้าสู่ร่างกายที่เจ็บป่วยของคุณครู)"
1010905-161 = "(แล้วคุณครูก็ได้นอนหลับลึกหลังจากที่ไม่ได้พักผ่อนมานาน...)"

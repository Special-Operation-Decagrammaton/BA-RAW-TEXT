1010905-14 = "[s1] \"……노아 왔구나.\"\n[s2] \"일어나서 맞아주지 못해서 미안하네.\""
1010905-15 = "#wait;100"
1010905-16 = "#wait;100"
1010905-17 = "3;노아;01;아녜요. 몸이 안 좋으셔서 그런 것이니 신경 쓰지 마세요.\n#3;em;[반응]"

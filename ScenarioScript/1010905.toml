1010905-24 = "#clearST"
1010905-25 = "3;노아;02\n#3;m3\n#wait;1000"
1010905-26 = "3;노아;05;책 밑에 깔려 있는 이 서류는…… 집무실의 이번 달 공과금 내역서네요.\n#3;greeting"
1010905-27 = "3;노아;03;제출 기한이 얼마 남지 않은 것 같으니 이것도 제가 처리해 두겠습니다.\n#3;em;[재잘]"
1010905-28 = "[s] \"그렇게 모두 처리해 주지 않아도 괜찮은데……\""
1010905-29 = "3;노아;01;아녜요. 그렇게 손이 많이 가는 일도 아닌걸요.\n#3;em;[반응]"
1010905-30 = "3;노아;03;잡무는 신경 쓰지 마시고 오늘은 푹 쉬세요."
1010905-31 = "3;노아;07;어차피 당번 업무의 연장이라고 생각하면, 당연히 제가 처리할 업무고—"
1010905-32 = "[s3] \"하지만 오늘은 노아의 당번 일이 아니잖아……?\"\n[s4] \"최소한 차림만이라도 편하게 하고 진행하도록 해.\""

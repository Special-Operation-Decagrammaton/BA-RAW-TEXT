1010905-106 = "3;노아 파자마;04;네, 아무래도 간을 하면 식재료 본연의 맛이 다소 감춰지니까요."
1010905-107 = "3;노아 파자마;09;주변의 색을 침범하지 않는 몰개성한 취향을 갖고 있는 것이 타인의 삶을 기록하는 제 사명에는 도움이 될거라 생각해서, 고치지 않고 여태까지 유지해 왔었는데……"
1010905-108 = "3;노아 파자마;07;결국 이 성격 때문에 선생님께 만족스러운 한 끼를 대접하지도 못했네요.\n#3;em;[한숨]\n#fontsize;50"

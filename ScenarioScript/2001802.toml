[translation]
2001802-1 = "Collateral Damage"
2001802-2 = "เข้าใจแล้ว เจ้าหัวขโมยที่มีเครื่องรบกวนสัญญาณวิทยุหนีเข้าไปที่ตลาดมืด เลยติดตามพิกัดต่อไม่ได้"
2001802-3 = "ที่ตลาดมืดมีช่วงตึกและถนนที่ซับซ้อน ถึงจะดึงภาพจากกล้องวงจรปิดมาดูได้ก็จริง แต่การไล่ตาม#nอีกฝ่ายที่มีเครื่องรบกวนสัญญาณวิทยุน่ะ ไม่ใช่เรื่องง่ายๆ เลยนะ"
2001802-4 = "สถานการณ์แบบนี้ ควรใช้โดรนตรวจจับความร้อนของ SRT สำหรับรับมือเจ้าเครื่องรบกวนสัญญาณนี่#nคิดถูกแล้วแหละที่มาขอให้ฉันช่วย ฮิฮิฮิ..."
2001802-5 = "ว่าแต่ให้ฉันช่วยไม่เป็นไรจริงๆ เหรอคุณครู...?"
2001802-6 = "[s1] \"หมายความว่ายังไงงั้นเหรอ...?\"\n[s2] \"มีปัญหาอะไรรึเปล่า?\""
2001802-7 = "เปล่า ไม่มีอะไรหรอก เตรียมพร้อมแล้วละ ให้ปล่อยโดรนออกติดตามผู้ต้องสงสัยตอนนี้เลยก็ได้"
2001802-8 = "เปล่า เรื่องปฏิบัติการเตรียมพร้อมแล้ว ให้ปล่อยโดรนออกติดตามผู้ต้องสงสัยตอนนี้เลยก็ได้"
2001802-9 = "แต่มันนานมากแล้ว ที่ไม่ได้รับอนุญาตให้ใช้อาวุธเต็มกำลังแบบนี้น่ะ เลยตื่นเต้นจนสะท้านไปทั้งตัว..."
2001802-10 = "[s] \"ครูไม่ได้บอกให้ใช้อาวุธเต็มกำลังซะหน่อย...\""
2001802-11 = "โธ่ คุณครู... ข้ามเรื่องเล็กๆ น้อยๆ แบบนั้นไปเถอะน่า"
2001802-12 = "ถ้างั้นมาเริ่มกันเลยมั้ย?"
2001802-16 = "แฮ่กๆ... มาถึงที่นี่แล้วก็คงหนีพ้นแล้วละมั้ง?"
2001802-17 = "ถึงเจ้าเครื่องรบกวนสัญญาณวิทยุนี่จะราคาแพงจนร้องขอชีวิตก็เถอะ แต่ถือว่าดีเลยที่ตัดสินใจซื้อมา..."
2001802-18 = "ขอแค่มีเครื่องรบกวนสัญญาณเครื่องนี้ก็จะหลบกล้อง CCTV ได้ แม้แต่โดรนก็ยังตรวจจับฉันไม่ได้#nต่อไปก็ไม่ต้องกังวลว่าจะถูกจับได้เวลาไปขโมยอะไรแล้ว"
2001802-19 = "ถ้าเป็นแบบนี้ ไม่นานก็ได้ทุนค่าเจ้าเครื่องนี่คืนแล้วละ—"
2001802-23 = "วะ... ว้าก?! อะไรกันเนี่ย โดรนพวกนี้มันอะไรกันเนี่ย?!"
2001802-24 = "ทำไมเครื่องรบกวนสัญญาณวิทยุของฉันถึงไม่ได้ผลล่ะเนี่ย?"
2001802-28 = "อ๊ะ เจ็บนะ เจ็บนะว้อย! ปะ...ไปให้พ้นนะเฟ้ย!"
2001802-32 = "ฮี่ๆ... หนีไปก็ไม่มีประโยชน์หรอก ถ้าไม่ขุดรูแล้วหนีลงดินไปก็หนีโดรนของฉันไม่ได้หรอก"
2001802-33 = "แต่ว่าถ้าจับได้ทันทีเลยมันก็จะธรรมดาไปหน่อย เพราะงั้นช่วยตั้งใจหนีกว่านี้หน่อยแล้วกันนะ หึหึ~"
2001802-34 = "[s3] \"คือว่าโมเอะ...?\"\n[s4] \"ครูว่าไม่ต้องจัดหนักมากก็ได้นะ...\""
2001802-35 = "โธ่เอ๊ย คุณครู ฉันกำลังปฏิบัติภารกิจอย่างจริงจังอยู่นะ"
2001802-36 = "เปล่าซะหน่อย ฉันก็แค่กำลังปฏิบัติภารกิจอย่างจริงจังอยู่เท่านั้นเอง"
2001802-37 = "แต่ว่าตอนนี้น่ะ มันยังไม่ถึงเวลาปิดฉากก็เท่านั้นเอง ฮิฮิฮิ..."
2001802-38 = "[s] \"ยังไม่ถึงเวลาปิดฉากเรอะ...?!\""
2001802-39 = "อ๊ะ... เหมือนจะจับสัญญาณได้จากทางนั้นอีกแล้ว"
2001802-40 = "คุณครู รอเดี๋ยวนะ ฉันจะสาดกระสุนยิ่งใหญ่อลังการให้ดูเลย...!"
2001802-47 = "อ๊ะ เจ็บนะ โอ๊ยยย บอกว่าเจ็บไงเล่า! พอซะที!"
2001802-48 = "ฮือ... ทนไม่ไหวแล้ว ขอยอมแพ้!"
2001802-49 = "หืม...? แค่นี้ก็ยอมแพ้แล้วเหรอ?"
2001802-50 = "ถึงจะหนีไปซ่อนตัวที่ไหน เจ้าโดรนนี่ก็ตามมาเหมือนวิญญาณอาฆาต แถมยิงไม่เลือกหน้าแบบนี้#nฉันจะทนไหวได้ยังไงเล่า!"
2001802-51 = "ฉันจะคืนของทั้งหมดที่ขโมยให้ เพราะงั้นตอนนี้เลิกยิงได้แล้ว!"
2001802-52 = "[s5] \"เก่งมากเลย โมเอะ\"\n[s6] \"งั้นเรียกโดรนกลับมาได้แล้วล่ะ\""
2001802-53 = "..."
2001802-54 = "..."
2001802-56 = "ฉันยังไม่ได้ยิงมิสไซล์เลยนะ...?"
2001802-57 = "[s] \"แค่จับขโมยเอง ไม่ต้องยิงมิสไซล์ก็ได้\""
2001802-59 = "[ns7] \"อีกอย่างแถวนี้มีวัตถุไวไฟอยู่เยอะด้วย เดี๋ยวก็ระเบิดหรอก...\"\n[ns8] \"ถ้าพวกวัตถุไวไฟแถวนี้เกิดระเบิดขึ้นมาจะแย่เอานะ...\""
2001802-60 = "ถ้าเกิดระเบิดแถวนี้ เราจะเจอปัญหากันเหรอ...?"
2001802-61 = "ถ้าเกิดระเบิดแถวนี้ จะเกิดปัญหาเหรอ...?"
2001802-62 = "หมายความว่าถ้าฉันกดปุ่มยิงมิสไซล์ตอนนี้... จะทำให้เกิดผลลัพธ์เลวร้ายที่เปลี่ยนแปลงไม่ได้งั้นเหรอ"
2001802-63 = "เห็นได้ชัดเลยนะ ว่าผลลัพธ์ที่ยิ่งใหญ่จะมาพร้อมกับความรับผิดชอบที่ใหญ่ยิ่ง..."
2001802-64 = "และผลลัพธ์ที่ยิ่งใหญ่จะมาพร้อมกับความพึงพอใจที่ใหญ่ยิ่ง..."
2001802-65 = "แฮ่ก.. แฮ่ก..."
2001802-66 = "[s] \"เอ่อ คุณโมเอะ...?\""
2001802-67 = "โอ๊ยยยย ฉันทนไม่ไหวแล้ว!!"
2001802-71 = "ดะ... เดี๋ยวสิ โดรนนั่นปล่อยแสงแปลกๆ ออกมาแล้ว...!"
2001802-72 = "นะ...นั่นมันมิสไซล์เรอะ!? เธอคิดจะยิงมิสไซล์ที่นี่งั้นเหรอ?!"
2001802-73 = "ถ้ายิงมิสไซล์มาตรงนี้ละก็ เมืองจะราบเป็นหน้ากลองเลยนะ!"
2001802-74 = "เมืองจะราบเป็นหน้ากลองงั้นเหรอ..."
2001802-75 = "มะ...ไม่ไหวแล้ว มะ... เหมือนฝันเลย แฮ่กๆ..."
2001802-79 = "เดี๋ยวสิ! ฉันบอกว่ายอมแพ้แล้วไงเล่า!"
2001802-80 = "ไม่นะ~~~!!"
2001802-84 = "(หลังจากนั้นคุณครูก็จับตัวหัวขโมยที่หมดสติส่งตำรวจ และต้องเหนื่อยกับการเก็บกวาดบริเวณ#nที่ถูกมิสไซล์ระเบิดเสียหายอยู่พักใหญ่...)"
2001802-86 = "..."
2001802-87 = "ทำไมมองฉันแบบนั้นล่ะ"
2001802-88 = "[s] \"ควบคุมสถานการณ์ได้แล้ว ทำไมถึงยิงมิสไซล์อีกล่ะ\""
2001802-89 = "อืม... คือว่าเรื่องนั้น..."
2001802-90 = "ก็ปุ่มกดยิงมันอยู่ตรงหน้าเลยนี่นา?!"
2001802-91 = "[s] \"ตอบแบบนั้นได้ด้วยเหรอ...\""
2001802-92 = "ฉันรู้อยู่แล้วแหละ ว่าตอนนั้นถ้าไม่ยิงมิสไซล์ สถานการณ์ก็จะจบลงได้แบบสงบเรียบร้อยมากกว่า"
2001802-93 = "แต่พอฉันเห็นปุ่มสีแดงปุ่มใหญ่ๆ ที่แปะป้ายไว้ว่าห้ามกดอยู่ตรงหน้า..."
2001802-94 = "พอเห็นแบบนั้น ความชั่งใจของฉันก็จะลดลง แล้วก็... อดใจไม่ไหวน่ะ แฮ่ก... แฮ่ก..."
2001802-95 = "[s] \"เข้าใจยากจัง...\""
2001802-96 = "คุณครู เคยเห็นการเรียงแถวโดมิโนรึเปล่า?"
2001802-97 = "เกมโดมิโนเป็นเกมที่ต้องใช้สมาธิและความพยายามอย่างมาก เพราะการนำบล็อกสี่เหลี่ยมเล็กๆ#nมาวางต่อแบบชิดๆ กัน มันจะล้มง่ายมากๆ"
2001802-98 = "ถ้าเกิดทำพลาดแค่ครั้งเดียวแล้วทำแถวโดมิโน่ล้มละก็ ความพยายามที่ทำมาตลอดก็จะสูญสลาย#nกลายเป็นฝุ่นผงไปในพริบตา"
2001802-99 = "แต่ว่าเวลาเราเห็นแถวโดมิโน่ที่เรียงต่อกันเป็นระเบียบแบบนั้น บางครั้งเราก็จะรู้สึกว่าอยากจะปัด#nให้มันล้มๆ ไปเลยใช่มั้ยล่ะ"
2001802-100 = "พอได้เห็นผลงานที่ทุ่มเทเวลาและความพยายามสร้างขึ้นมาพังทลายลงไปในชั่วพริบตาน่ะ...#nมันรู้สึกเหมือนได้ปลดปล่อยอารมณ์ขั้นสุด... แบบบรรยายไม่ถูกเลย แฮ่กๆ... แฮ่กๆ..."
2001802-101 = "[s] \"ไม่ค่อยเข้าใจ แต่ก็พอนึกภาพออก\""
2001802-102 = "ใช่แล้ว! สิ่งที่ฉันต้องการก็คือความรู้สึกแบบตอนกองโดมิโน่ล้มนั่นแหละ!"
2001802-103 = "พอได้มาทำหน้าที่เป็นโอเปอเรเตอร์ของกองทหาร ฉันต้องกดปุ่มต่างๆ หลายปุ่มอยู่ตลอดเวลา"
2001802-104 = "และในบรรดาปุ่มพวกนั้น ก็จะมีบางปุ่มที่เป็นปุ่มที่ \"ห้ามกด\" เด็ดขาด ยกเว้นแค่ในกรณีฉุกเฉินเท่านั้น"
2001802-105 = "ตอนที่งานยุ่ง ฉันก็ไม่ค่อยได้สังเกตพวกมันเท่าไรหรอก... แต่ก็มีบางครั้งที่แอบจินตนาการไปไกล#nว่าจะเกิดอะไรขึ้นบ้าง ถ้ากดปุ่มต้องห้ามพวกนั้นไปน่ะ"
2001802-106 = "พอคิดว่าพอกดปุ่มนั่นแล้วจะปล่อยระเบิดไปกี่ลูกกัน..."
2001802-107 = "พอคิดแบบนั้น... มันก็อดใจไม่ไหว บังคับมือตัวเองไม่ได้จริงๆ"
2001802-108 = "เกิดเรื่องวุ่นวาย เรื่องโกลาหลครั้งใหญ่...! เมืองพังพินาศจากการกดปุ่มแค่ปุ่มเดียว..."
2001802-109 = "พอจินตนาการไปแบบนั้นแล้วฉันก็... ฉันก็...!"
2001802-110 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
2001802-111 = "[s] \"เอ่อ ใจเย็นๆ ก่อนนะ...\""
2001802-113 = "[ns9] \"เอาเป็นว่าขอบคุณที่มาช่วยงานวันนี้นะ\"\n[ns10] \"เดี๋ยวครูเลี้ยงเครื่องดื่มกระป๋องนะ\""
2001802-114 = "อ๊ะ ขอบคุณนะ คุณครูจะเลี้ยงเครื่องดื่มกระป๋องเหรอ พอดีเลย ตอนนี้ร้อนจนคอแห้งไปหมดแล้ว"
2001802-115 = "อ๊ะ... ขอบคุณนะ พอดีเลย ตอนนี้ร้อนจนคอแห้งไปหมดแล้ว"
2001802-116 = "งั้นฉันขอเป็นสปอร์ต ดริ้งค์ เย็นๆ นะ..."
2001802-117 = "เอ๋? กระป๋องนี้มันอะไรน่ะ? เพิ่งเคยเห็นครั้งแรกเลย..."
2001802-118 = "<ซุปถั่วแดงหวาน ก็อด บอมบ์> เหรอ...?"
2001802-119 = "[s11] \"ซุปถั่วแดงหวานกระป๋องแบบอุ่นร้อนนี่นา\"\n[s12]  \"กินของร้อนๆ ในวันที่อากาศร้อนแบบนี้ คงไม่ดีเท่าไร...\""
2001802-120 = "ถ้ากินซุปร้อนๆ ในวันที่อากาศร้อนแบบนี้ อาจทำให้เหงื่อออกเยอะจนขาดน้ำก็ได้นะ"
2001802-121 = "นั่นสินะ ถ้ากินซุปร้อนๆ ในวันที่อากาศร้อนแบบนี้ อาจทำให้เหงื่อออกเยอะจนขาดน้ำก็ได้นะ"
2001802-122 = "ในบรรดาตัวเลือกทั้งหมด ถ้าเลือกกินซุปถั่วแดงหวานก็เหมือนกับวางบอมบ์ให้ตัวเองเลย"
2001802-126 = "แต่คิดอีกที ซุปถั่วแดงหวานนี่ก็เป็นตัวเลือกเดียวที่จะนำไปสู่ความพังพินาศได้"
2001802-127 = "พอคิดว่าถ้าใช้นิ้วกดปุ่มนี้แล้ว จะทำให้เกิดผลลัพธ์ที่คาดไม่ถึงอีกขึ้นมา... ฉันก็... แฮ่กๆ... แฮ่กๆ..."
2001802-128 = "[s] \"เดี๋ยวก่อน โมเอะ รอก่อน—\""
2001802-133 = "แฮ่ก... แฮ่ก กดออกมาซะแล้ว..."
2001802-134 = "สัมผัสที่อุ่นร้อนและเหนียวหนืดแบบนี้... ถ้ากินเข้าไปตอนอากาศร้อนๆ จะเป็นยังไงนะ? ฮิฮิฮิ..."
2001802-135 = "[s] \"เดี๋ยวครูซื้อให้ใหม่ก็ได้ ไม่ต้องฝืนกินหรอก\""
2001802-136 = "ไม่ต้องทำแบบนั้นหรอก"
2001802-137 = "หนทางแห่งหายนะที่ฉันเลือกมากับมือ... ถ้าฉันไม่รับผิดชอบด้วยตัวเอง มันก็ไร้ความหมายสิ"
2001802-138 = "ฉันจะรับผิดชอบโดยการดื่มมันเอง!"
2001802-142 = "หวา~ ร้อนจัง!"
2001802-143 = "รสสัมผัสของซุปถั่วแดงหวานเหนียวๆ ข้นๆ ที่ไหลลงไปตามลำคอทำให้ร่างกายรู้สึกร้อนวาบ..."
2001802-144 = "ตอนนี้แค่ยกกระป๋องจ่อไว้ที่ปาก ก็พอจะทำให้เหงื่อออกได้แล้ว..."
2001802-145 = "[s] \"ไม่เป็นอะไรแน่นะ...?\""
2001802-146 = "ไม่เป็นไร... ไม่สิ "
2001802-147 = "แบบนี้แหละดีแล้ว!"
2001802-148 = "ที่ผ่านมาฉันเคยแต่จะกดปุ่มที่สร้างความพินาศให้กับคนอื่นๆ มาตลอด แต่ไม่เคยสัมผัสความรู้สึก#nความพินาศที่เกิดขึ้นกับตัวเอง..."
2001802-149 = "มันเร้าใจมากเลยล่ะ! แฮ่ก... แฮ่ก...♥"
2001802-151 = "(ถึงโมเอะจะเอาแต่บ่นว่าร้อน แต่ก็ไม่ยอมวางกระป๋องซุปถั่วแดงเลย...)"

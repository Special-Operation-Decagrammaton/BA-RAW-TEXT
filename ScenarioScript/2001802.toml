2001802-1 = "#title;Collateral Damage"
2001802-2 = "3;모에;16;……그렇군. [ruby=ECM]전파교란장치[/ruby]를 가지고 있는 좀도둑이 블랙마켓으로 도망치는 바람에 추적이 어렵게 되었다는 건가……\n#3;a\n#3;em;…"
2001802-3 = "3;모에;15;확실히, 이 일대는 길도 복잡하고 CCTV 영상에 의존해야 하는 구간도 많으니까. 교란장치를 갖고 있는 상대라면 추적이 어렵겠지."
2001802-4 = "3;모에;07;이런 상황이라면 [ruby=전파교란방지]ECCM[/ruby] 대책이 완비된 SRT의 열추적 드론을 쓰는 게 제일이긴 해. 나에게 도움을 요청한 건 좋은 판단이었어. 쿠히히……\n#3;em;[재잘]"
2001802-5 = "3;모에;09;그런데 정말 괜찮겠어, 선생님? 내 도움을 받아도……?"
2001802-6 = "[s1] \"무슨 뜻인지는 모르겠는데……\"\n[s2] \"작전에 무슨 문제라도 있어?\""
2001802-7 = "3;모에;12;아니, 작전 준비는 완벽해. 지금이라도 바로 드론을 전개해서 용의자를 추적할 수 있어."

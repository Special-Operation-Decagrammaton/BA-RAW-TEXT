[translation]
2001802-1 = "Collateral Damage"
2001802-2 = "I get it now. I couldn't track it because the thief scampered to the Black Market with an electronic jamming device."
2001802-3 = "The area itself is like a maze of alleys, some places are hard to see even with security footage. A jamming device is pretty effective."
2001802-4 = "No sweat! I'll fire up SRT's heat-seeking drone, complete with ECCM countermeasures. You came to the right person for help. Heeheehee."
2001802-5 = "But did you really think this one through, Sensei?"
2001802-6 = "[s1] \"I'm not sure what you mean...\"\n[s2] \"Is there a problem with the operation?\""
2001802-7 = "No, the operation is perfect. I can find the suspect with a click of a button at this point."
2001802-8 = "No, the operation is perfect. I can find the suspect with a click of a button at this point."
2001802-9 = "But having permission to use a whole bunch of explosives and guns after so long...! Am I drooling?"
2001802-10 = "[s] \"I said you could use exactly as much as is necessary, to clarify.\""
2001802-11 = "Oh, Sensei. Always huffing and puffing about the trivial details."
2001802-12 = "Let's get this show started. Mister Criminal, meet heat drone~"
2001802-16 = "*pant* *pant* ...Did I finally lose them?"
2001802-17 = "I guess this jamming device thing was worth the price tag."
2001802-18 = "Not even drones can get a read on me with this thing! I can steal anything I want!"
2001802-19 = "I can keep this going forever!"
2001802-23 = "H-How did these drones find me?!"
2001802-24 = "Why isn't this stupid device working?"
2001802-28 = "Ow! That hurts! Ugh! Get away from me!"
2001802-32 = "Heeheehee! Unless you can tunnel underground, there's nowhere my drone can't find you! Is that what it is? Are you a mole, Mister Criminal?"
2001802-33 = "Oh, wait! I haven't been in the field in ages! Don't get caught too fast, okay? Run, run, run as fast as you can!"
2001802-34 = "[s3] \"Hey... Moe? Let's reel it back a little.\"\n[s4] \"I think you're being a bit...cruel.\""
2001802-35 = "Shhh, Sensei. I'm taking this operation very seriously, I promise."
2001802-36 = "Shhh, Sensei. I'm taking this operation very seriously, I promise."
2001802-37 = "For now, at least. Heehee."
2001802-38 = "[s] \"For now...?!\""
2001802-39 = "Ah! I got another read on him heading north."
2001802-40 = "Save that thought, Sensei! Time for a bullet hailstorm!"
2001802-47 = "Ow! Ow! OUCH! Stop it! Stop it!"
2001802-48 = "Ugh! No more! I give up!"
2001802-49 = "Already...? That's...that's it?"
2001802-50 = "Yeah, that's it! What do you expect?! I can't hide from your drones or your bullets anywhere!"
2001802-51 = "I'll give everything back, so just please stop shooting me!"
2001802-52 = "[s5] \"Good job, Moe. The job's done.\"\n[s6] \"You can pull back the drones now, Moe.\""
2001802-53 = "..."
2001802-54 = "..."
2001802-56 = "...But I haven't fired any missiles yet."
2001802-57 = "[s] \"Consider that a good thing.\""
2001802-59 = "[ns7] \"There's way too many flammable items around here.\" \n[ns8] \"We'd be in trouble if you used missiles somewhere like this.\""
2001802-60 = "I guess we'd get in trouble if I set fire to the whole area..."
2001802-61 = "We would be in trouble? If I made everything go ka-boom?"
2001802-62 = "So, you're telling me, that pressing this launch button will incur horrible and irreversible consequences?"
2001802-63 = "Obviously, great consequences come with great responsibility..."
2001802-64 = "And with great responsibility comes great, great pleasure..."
2001802-65 = "*huff* *puff*"
2001802-66 = "[s] \"M-Moe...? You doing okay there?\""
2001802-67 = "I'm antsy! I can't keep it in!"
2001802-71 = "W-Wait... The drone is shining a weird color..."
2001802-72 = "I-Is she about to shoot a missile at me?! Is she insane?"
2001802-73 = "She'll wreck the entire city if she shoots one here!"
2001802-74 = "The entire city, you say?"
2001802-75 = "This is like a fever dream! *pant* *pant*"
2001802-79 = "Wait! Please! I already surrendered!"
2001802-80 = "Noooooooo!"
2001802-84 = "After that, the petty thief was taken down and handed over to the police. But there was a lot of clean up to do because of a certain, bomb-crazed agent."
2001802-86 = "........."
2001802-87 = "...Why are you looking at me like that?"
2001802-88 = "[s] \"Why did you shoot the missile? It was already over.\""
2001802-89 = "Hm... Because..."
2001802-90 = "Oh! I know! The button was right in front of me!"
2001802-91 = "[s] \"That's really not even an excuse.\""
2001802-92 = "Because I don't have one! Look, obviously it'd be the sane, rational thing to not press the button."
2001802-93 = "But when I see a big, red button in front of me that I absolutely shouldn't press, I go insane!"
2001802-94 = "My frontal lobe shuts down and my id takes over! *pant* *pant*"
2001802-95 = "[s] \"I'm trying really hard to understand, Moe.\""
2001802-96 = "Sensei. Have you ever seen dominoes being placed?"
2001802-97 = "In dominoes, the rectangular blocks fall very easily because they're closely stacked. So setting them up requires a high level of patience."
2001802-98 = "Knock over one, and say bye-bye to all your hard work. Boo-hoo, so sad."
2001802-99 = "But when you see those precarious dominoes painstakingly lined up piece by piece, don't you feel the urge to knock them down?"
2001802-100 = "When I see someone's long, hard work collapse with a single touch...it's an indescribable, tingling catharsis... *pant* *pant*"
2001802-101 = "[s] \"I can't exactly relate, but I think I get it.\""
2001802-102 = "Good! So now, understand this. The one and only thing I want out of life, is to experience the pleasure you derive from knocking down those dominoes!"
2001802-103 = "Being the team's operator and communications whiz, I use a lot of buttons all the time."
2001802-104 = "And there are a lot of buttons I should never touch unless it's an emergency."
2001802-105 = "In my free time, I just imagine what would happen if I pressed those buttons."
2001802-106 = "How much firepower would I detonate...from just one push?"
2001802-107 = "The thought overcomes me! My hands moves of its own accord...!"
2001802-108 = "If I just press it, everything around me will be destroyed! Buildings, bridges, everything reduced to rubble with my single touch!"
2001802-109 = "Just imagining it makes me feel... I... I...!"
2001802-110 = "*huff* *puff*"
2001802-111 = "[s] \"C-Calm down. I understand now.\""
2001802-113 = "[ns9] \"Well, thanks for your help today.\"\n[ns10] \"Do you want something from the vending machine to-go?\""
2001802-114 = "It was my pleasure. Can we grab something from the vending machine first?"
2001802-115 = "Oh, thanks. Today was pretty hot, so I'm thirsty."
2001802-116 = "I'd like a cool sports drink..."
2001802-117 = "Oh, what's this can? I've never seen this before..."
2001802-118 = "...Ultra Explosive Red Bean Soup?"
2001802-119 = "[s11] \"It's a warm can of red bean soup.\"\n[s12] \"It's too warm today for soup.\""
2001802-120 = "...If I eat hot red bean soup, I might end up sweating profusely and get dehydrated."
2001802-121 = "...If I eat hot red bean soup, I might end up sweating profusely and get dehydrated."
2001802-122 = "Choosing red bean soup while I have all these other options would be a destructive choice."
2001802-126 = "...But the red bean soup button is the only option that leads to destruction."
2001802-127 = "If I lift my finger and press this button, I'll reach the point of no return... *pant* *pant*"
2001802-128 = "[s] \"Wait, Moe. Hold on!\""
2001802-133 = "*pant* *pant* ...I really did it..."
2001802-134 = "This warm and heavy feeling... If I eat something like this on a hot day, what'll happen? Heeheehee."
2001802-135 = "[s] \"I'll get you something else. Don't force yourself.\""
2001802-136 = "No, that ruins the purpose."
2001802-137 = "I chose this path. If I don't take responsibility, it's all meaningless!"
2001802-138 = "Bottoms up, Sensei!"
2001802-142 = "...Whoa! It's hot!"
2001802-143 = "Thick red bean soup is going down my throat, stimulating my whole body with heat..."
2001802-144 = "Now just holding the can to my mouth is enough to make me sweat..."
2001802-145 = "[s] \"Are you sure you're okay...?\""
2001802-146 = "I-I'm good... I'm...  "
2001802-147 = "I feel alive!"
2001802-148 = "Until now, I've only been destroying my surroundings. This self-destructive behavior is..."
2001802-149 = "...it's exhilarating!"
2001802-151 = "Despite my many protests, Moe continued to scarf down the rest of the red bean soup while going red in the face."

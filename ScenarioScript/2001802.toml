[translation]
2001802-1 = "Collateral Damage"
2001802-2 = "……原來如此，小偷帶著[ruby=ECM]電波干擾裝置[/ruby]逃進黑市，所以很難追蹤行蹤……"
2001802-3 = "這一帶的道路的確相當複雜，也有很多地方必須仰賴監視器。#n要是對方有干擾裝置的話，想找到人可說是難上加難。"
2001802-4 = "這種時候，只要使用搭載[ruby=反電波干擾]ECCM[/ruby]功能的SRT熱成像自動追蹤無人機就行了。#n找我協助是正確的決定，嘻嘻嘻……"
2001802-5 = "不過老師，真的確定要找我幫忙嗎……？"
2001802-6 = "[s1] 「這，這是什麼意思……？」\n[s2] 「有什麼問題嗎？」"
2001802-7 = "沒有……作戰準備一切順利，我可以立刻派出無人機追蹤嫌犯。"
2001802-8 = "沒有……作戰準備一切順利，我可以立刻派出無人機追蹤嫌犯。"
2001802-9 = "只不過……好久沒有獲得允許可以盡情使用槍械……讓我全身心癢難耐……"
2001802-10 = "[s] 「我沒說過你可以盡情使用……」"
2001802-11 = "沒事沒事。不要在意那種小細節。"
2001802-12 = "……那麼，馬上開始吧。"
2001802-16 = "哈啊，哈啊……都跑到這裡來了，應該不會再追過來了吧？"
2001802-17 = "雖然這個電波干擾裝置有點貴，不過還真是買對了。"
2001802-18 = "只要有這東西就不會被監視器拍到，無人機也偵測不到我。#n可以盡情偷東西，不用擔心被發現了。"
2001802-19 = "繼續這樣下去，很快就能把錢賺回來──"
2001802-23 = "唔，唔哇！？搞什麼啊這些無人機！？"
2001802-24 = "為什麼不受電波干擾裝置的影響！？"
2001802-28 = "啊，好痛！痛死了！我，我看我還是先逃吧！"
2001802-32 = "咯嘻嘻……逃也沒有用的。除非你鑽進地底，不然就絕對逃不過我操縱的無人機。"
2001802-33 = "不過要是太快就被抓到，我也會很無聊的，所以拜託你多努力點吧～"
2001802-34 = "[s3] 「那個……萌？」\n[s4] 「還是不要太過火吧……」"
2001802-35 = "沒問題，沒問題。別看我這樣，我也是很認真的。"
2001802-36 = "沒問題，沒問題。別看我這樣，我也是很認真的。"
2001802-37 = "至少目前為止是這樣……咯嘻嘻。"
2001802-38 = "[s] 「目前為止……！？」"
2001802-39 = "啊！那個方向好像又收到訊號了。"
2001802-40 = "老師，請再等我一下。再玩一次就好……"
2001802-47 = "啊，好痛！好痛！快住手！"
2001802-48 = "嗚嗚……我受不了了！我投降！"
2001802-49 = "……咦～？這麼快就投降啦？"
2001802-50 = "不管躲到哪裡都會被那些無人機找到，叫人怎麼受得了！"
2001802-51 = "我會把偷來的東西全部還回去！拜託放過我吧！"
2001802-52 = "[s5] 「辛苦你了，萌。」\n[s6] 「可以撤回無人機了唷。」"
2001802-53 = "……"
2001802-54 = "……"
2001802-56 = "……可是我連導彈都還沒發射耶？"
2001802-57 = "[s] 「……只是抓小偷而已，不需要用到導彈吧。」"
2001802-59 = "[ns7] 「而且，這附近有很多可燃物……」\n[ns8] 「要是爆炸的話就麻煩了。」"
2001802-60 = "……咦～現在發射導彈會讓老師困擾啊？"
2001802-61 = "……咦～現在發射導彈會讓老師困擾啊？"
2001802-62 = "……原來如此。要是我現在按下這顆按鈕，會發生無法挽回的後果嗎……"
2001802-63 = "我想，肯定必須負起相當大的責任吧……"
2001802-64 = "越大的責任……會伴隨著無比的快樂……！"
2001802-65 = "哈啊……哈啊，哈啊……"
2001802-66 = "[s] 「那個，萌同學……？」"
2001802-67 = "……我果然還是忍不住！！"
2001802-71 = "喂，喂……無人機怎麼發出了奇怪的光芒啊……"
2001802-72 = "該，該不會是導彈吧？不可能打算在這裡發射吧……？"
2001802-73 = "現在發射導彈的話，這一帶會被炸得亂七八糟耶！"
2001802-74 = "不負責任地把東西全部摧毀……"
2001802-75 = "這下我更忍不住了！……哈啊，哈啊。"
2001802-79 = "等等！我不是說我投降了嗎！"
2001802-80 = "住手啊啊啊啊啊啊！"
2001802-84 = "（……後來，雖然順利把昏倒在地的小偷交給了警方，#n　卻也費了好一番功夫清理被導彈炸得亂七八糟的街道）"
2001802-86 = "……"
2001802-87 = "……老師，你幹嘛用那種眼神看我？"
2001802-88 = "[s] 「為什麼犯人都投降了，你還要發射導彈……」"
2001802-89 = "那是因為……"
2001802-90 = "因為按鈕就在那裡啊？"
2001802-91 = "[s] 「就算你套用某登山家的名言也一樣……」"
2001802-92 = "我知道啦……在那種情況下，不發射導彈才是最理性最冷靜的判斷。"
2001802-93 = "但怎麼說呢……不管理性不理性……如果有個絕對不能按的按鈕擺在我的眼前……"
2001802-94 = "我就會理性當機……無法壓抑自己……哈啊，哈啊……"
2001802-95 = "[s] 「這真是個問題呢……」"
2001802-96 = "……老師，你有排過骨牌嗎？"
2001802-97 = "把容易倒下的四方形塊狀物緊密排列的那個遊戲。需要高度的耐心和集中力。"
2001802-98 = "要是不小心失手弄倒骨牌，就可能讓之前付出的努力全部化為泡影。"
2001802-99 = "但另一方面，看著那些精密排列的骨牌，不是也會有想把它們弄倒的時候嗎？"
2001802-100 = "一個小小的舉動……就能瞬間讓耗費無數心力的成品毀於一旦……#n那種光景，具有一種難以形容的酥麻快感……哈，哈……"
2001802-101 = "[s] 「我好像能夠明白你在說些什麼……」"
2001802-102 = "沒錯！我想要的就是那種推倒骨牌時的快感！"
2001802-103 = "報務員在工作的時候會面對無數按鈕。"
2001802-104 = "其中也有很多非到緊急情況絕對不能按下去的按鈕。"
2001802-105 = "忙碌的時候不會想到……但我有時候就是會去想像按下那些按鈕的後果。"
2001802-106 = "按下去之後，到底會發生什麼事呢……"
2001802-107 = "只要一想到這點……我就會無法控制自己……"
2001802-108 = "所有東西都會灰飛煙滅吧……會被摧毀殆盡吧……！#n一定會導致難以收拾的局面吧……"
2001802-109 = "光是想到這些，我就……！"
2001802-110 = "哈啊……哈啊，哈啊……"
2001802-111 = "[s] 「冷，冷靜下來……！」"
2001802-113 = "[ns9] 「總之今天很謝謝你幫忙。」\n[ns10] 「我請你喝點東西吧？」"
2001802-114 = "謝謝～我也正覺得渴呢。"
2001802-115 = "謝謝～我也正覺得渴呢。"
2001802-116 = "可以的話，我想喝冰涼的運動飲料……"
2001802-117 = "咦？這是什麼？第一次看到……"
2001802-118 = "……「爆裂・神之紅豆湯」？"
2001802-119 = "[s11] 「是熱紅豆湯呢。」\n[s12] 「但今天這麼熱……」"
2001802-120 = "就是啊……如果天氣這麼熱還吃熱騰騰的紅豆湯，#n不僅無法補充水分，還可能會爆汗脫水吧。"
2001802-121 = "就是啊……如果天氣這麼熱還吃熱騰騰的紅豆湯，#n不僅無法補充水分，還可能會爆汗脫水吧。"
2001802-122 = "在這麼多飲料之中選擇紅豆湯──根本就是自取滅亡呢。"
2001802-126 = "……但是換句話說，這個「紅豆湯的按鈕」正是通往滅亡的選項。"
2001802-127 = "光是想到只要伸手按下這個按鈕，就能引發無法挽回的後果……哈，哈……！"
2001802-128 = "[s] 「等等，萌！等一──」"
2001802-133 = "哈啊，哈啊……我真的按下去了……！"
2001802-134 = "這炙熱又沉重的觸感……在這種天氣吃這種東西……絕對會很不妙的吧？咯嘻嘻……"
2001802-135 = "[s] 「我再買一個飲料給你，你不用勉強自己喝下去。」"
2001802-136 = "不，我要喝！"
2001802-137 = "這是我親手選擇的滅亡，要是我不好好承受後果就沒有意義了。"
2001802-138 = "所以我要負起責任把這東西喝光！"
2001802-142 = "……哇，好熱！"
2001802-143 = "濃稠的紅豆湯順著喉嚨流下，全身就像是要著火一樣……"
2001802-144 = "現在……光是將罐子湊到嘴邊，汗水就會流個不停……"
2001802-145 = "[s] 「真的沒問題嗎……？」"
2001802-146 = "沒問題……"
2001802-147 = "不如說這樣才好！"
2001802-148 = "一直以來我接觸的都只有讓周遭滅亡的按鈕，#n卻完全沒發現……讓自己滅亡的按鈕竟然會如此……"
2001802-149 = "從各方面來說……都令人相當興奮……哈啊，哈啊……♥"
2001802-151 = "（……於是萌一邊面露痛苦，卻仍將熱騰騰的紅豆湯喝了個精光）"

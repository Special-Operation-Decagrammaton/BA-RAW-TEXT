10019080-58 = "วะฮะฮ่า! จริงๆ เลยน้า ในเมื่อมันเป็นแบบนี้เห็นทีก็คงจะช่วยไม่ได้ละนะ! พวกเราจะจัดการให้เอง!"
10019080-59 = "อย่างนั้นเองเหรอคะ! ถ้าเป็นเรื่องนั้นละก็ พวกเราจะเซอร์วิสให้ฟรีไม่คิดค่าแรงเลยค่ะ!"
10019080-60 = "คงต้องลุยอย่างเดียวสินะ?"
10019080-61 = "ดีละ-! ถ้างั้นก็ฝากประโยคเด็ดของพวกเราด้วยนะ!! ครู!!"

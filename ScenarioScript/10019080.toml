[translation]
10019080-2 = "已確認5個聖所全都被消滅……！！"
10019080-3 = "但是，第6聖所的能量逐漸變大了……！#n到底會發生什麼？"
10019080-4 = "這是……能量正從所有聖所向一處集中。"
10019080-5 = "唔咦！？什麼意思！？"
10019080-6 = "所有聖所的力量合而為一──#n生成了「最後的聖所」。"
10019080-8 = "原來如此……知道了。感謝說明。"
10019080-9 = "老師……這也許將會是最後的戰鬥。請做好準備。"
10019080-17 = "呵呵……差不多該拿出我的祕密武器了呢。"
10019080-18 = "部長，你有祕密武器？一直藏到現在是嗎？"
10019080-19 = "與其說藏起來，正確來說……是現在才完成。"
10019080-20 = "千醬，準備好了嗎？"
10019080-21 = "是準備好了……但沒辦法做出任何保證。"
10019080-22 = "我知道。就像平常一樣，先試了再說對吧。#n我今天的運氣不錯，應該不會有問題的。"
10019080-23 = "那個祕密武器是什麼呢？"
10019080-24 = "啊……說明起來有點困難……"
10019080-25 = "利用聖所的能量，也許能引起超越物理法則的現象。雖然有一定的限制就是了。"
10019080-26 = "超越物理法則……？"
10019080-28 = "沒錯。簡單來說──"
10019080-29 = "就是「物質的巨大化」。"
10019080-34 = "嘿……原來如此……？"
10019080-35 = "唉……雖然聽起來像在開玩笑，不過現在奇普托斯發生的現象也像玩笑一樣啊。"
10019080-36 = "……所以希望各位別追究細節。其實我也不是很清楚。"
10019080-38 = "是呢……只要視為是一種[ruby=・     ・     ・     ・]特異現象[/ruby]就可以了。"
10019080-39 = "呃，也就是說，為了與那個巨大怪獸戰鬥，要讓某個東西「巨大化」對吧？"
10019080-40 = "沒錯。理論上，這個「虛假的聖所」在奇普托斯活性化的約3分鐘期間內，能夠維持巨大化的狀態。"
10019080-41 = "3分鐘……比想像中還短呢。"
10019080-42 = "特異現象就是這樣的東西。"
10019080-43 = "那麼就來尋找巨大化的對象吧。"
10019080-44 = "呼呣……要和巨大怪獸戰鬥的話……戰車、直升機……似乎都不錯呢……"
10019080-45 = "[s]「既然如此……」"
10019080-46 = "哦，老師。您有什麼想法嗎？"
10019080-47 = "[s]「如果是這種事，我有個非常適合的人選哦。」"
10019080-48 = "……嗯？是什麼呢？"
10019080-55 = "哈哈哈哈哈哈！"
10019080-56 = "無限迴轉壽司戰隊．凱坦澤！再次！登場！"
10019080-57 = "最適合巨大化的存在！沒錯，那就是我們！"
10019080-58 = "哼，真是的。如果是這樣就沒辦法了。全力以赴吧。"
10019080-59 = "知道了。我就特別免費服務吧！"
10019080-60 = "只好這麼做了呢。"
10019080-61 = "很好！那麼，那句台詞就拜託你了，老師！！"
10019080-63 = "[ns1]「要上囉！！無限迴轉壽司戰隊．凱坦澤FX [ruby=Infinity]Mk.∞！！[/ruby]」\n[ns2]「克拉肯──！！！」\n[ns3]「奧肯藍帕──！！！」"
10019080-65 = "原來如此。0和∞是表裏一體的存在……所以才會叫那個名字啊。"
10019080-67 = "……什麼？那到底是什麼意思……"
10019080-68 = "[s]「……難得有這種機會，實在是很想說說看……」"
10019080-70 = "……什麼？那到底是什麼……"
10019080-71 = "[s]「……難得有這種機會，實在是很想說說看……」"
10019080-72 = "那個……"
10019080-73 = "話說這樣的發展沒問題嗎……？"
10019080-74 = "[s]「很帥所以沒關係。」"
10019080-79 = "那個是……！！"
10019080-80 = "是之前在電影裡看過的場面，日步美！"
10019080-81 = "這，這是什麼啊……！？"
10019080-83 = "要上囉！！無限迴轉壽司戰隊．凱坦澤的究極超級機器人！！"
10019080-88 = "凱坦澤FX [ruby=Infinity]Mk.∞，出[/ruby]擊！！"
10019080-101 = "唔，唔哇啊啊啊啊！？"
10019080-102 = "好厲害～！！是壽司機器人！！"
10019080-104 = "呵呵……這真是讓人摸不著頭緒呢……"
10019080-105 = "總之就是要咚鏘咖鏘★對吧？#n很淺顯易懂真不錯呢！"

[translation]
10019080-2 = "ยืนยัน หอคอยทั้ง 5 แห่งถูกทำลายแล้ว...!!"
10019080-3 = "แต่ว่าพลังงานของหอคอยแห่งที่ 6 กำลังเพิ่มขึ้นเรื่อยๆ...! มันเกิดอะไรขึ้นกันแน่เนี่ย?"
10019080-4 = "ดูเหมือนว่าหอคอยทั้งหมดกำลังรวมพลังเฮือกสุดท้ายไปรวมไว้ที่เดียวเลยนะคะ"
10019080-5 = "หืม?!"
10019080-6 = "สถานการณ์ตอนนี้... ดูเหมือนพลังงานของหอคอยทั้ง 6 แห่งมาร่วมกัน และก่อตัวขึ้นเป็น <หอคอยแห่งสุดท้าย> แล้วค่ะ "
10019080-8 = "อย่างนั้นเองเหรอคะ... เข้าใจแล้วค่ะ"
10019080-9 = "คุณครูคะ กรุณาเตรียมตัวสำหรับการเผด็จศึกด้วยค่ะ"
10019080-17 = "ฮุฮุฮุ... ถ้างั้นคงถึงเวลานำอาวุธลับของฉันออกมาแล้วสินะคะ"
10019080-18 = "อาวุธลับ? มีของแบบนั้นด้วยเหรอ? นี่ซ่อนของแบบนั้นเอาไว้จนถึงตอนนี้เลยเหรอ?"
10019080-19 = "ไม่ได้ซ่อนเอาไว้สักหน่อยค่ะ... พูดให้ถูกคือเพิ่งเสร็จสมบูรณ์มากกว่าค่ะ"
10019080-20 = "จี้จัง เตรียมพร้อมรึยังคะ?"
10019080-21 = "เตรียมพร้อมแล้วละ แต่ก็รับปากอะไรไม่ได้หรอกนะ"
10019080-22 = "ดีมากค่ะ ก็แค่ลองทำดูก่อนแบบทุกครั้งแหละค่ะ ดวงวันนี้ก็ไม่ได้แย่ด้วยนะคะ"
10019080-23 = "อาวุธที่พูดถึงคืออะไรกันแน่น่ะ?"
10019080-24 = "ด้วยข้อมูลที่ได้จากการวิเคราะห์องค์ประกอบของหอคอย... อืม ซับซ้อนเกินจะอธิบายแฮะ..."
10019080-25 = "ยังไงก็เถอะ ดูเหมือนพลังงานของหอคอยมันจะทำให้เกิดปรากฏการณ์เหนือกฎธรรมชาติขึ้นได้..."
10019080-26 = "ปรากฏการณ์เหนือกฎธรรมชาติ...?"
10019080-28 = "ค่ะ พูดง่ายๆ ก็คือ..."
10019080-29 = "<การขยายตัว> ของวัตถุค่ะ"
10019080-34 = "อืม... อืมมมม...."
10019080-35 = "ฟังดูเหมือนเป็นเรื่องล้อเล่นยังไงก็ไม่รู้... แต่เอาเถอะ ยังไงเหตุการณ์ที่เกิดขึ้นในคิโวทอสตอนนี้มันก็ดู#nเหมือนเรื่องล้อเล่นอยู่แล้วนี่นะ"
10019080-36 = "...เพราะงั้น อย่าถามรายละเอียดจะดีกว่า ที่จริง ฉันเองก็ไม่ค่อยเข้าใจเท่าไรหรอก"
10019080-38 = "ก็นะ... คิดซะว่าเป็นงานอย่างหนึ่งของชมรมปรากฏการณ์ลี้ลับก็ได้นี่คะ?"
10019080-39 = "หมายความว่าจะทำให้อะไรบางอย่าง <ขยายใหญ่ขึ้น> เพื่อที่จะสู้กับตัวมหึมานั่นสินะ?"
10019080-40 = "ใช่แล้ว ตามทฤษฎีแล้วคิดว่าจะคงสภาพไว้ได้ประมาณ 3 นาทีในตอนที่ <หอคอยแห่งคำลวง> พวกนี้ปรากฏขึ้นในคิโวทอสละนะ"
10019080-41 = "3 นาที... ระยะเวลาสั้นกว่าที่คิดอีกแฮะ"
10019080-42 = "ฮุฮุ... ก็มันเป็นปรากฏการณ์ลี้ลับนี่คะ"
10019080-43 = "ถ้างั้น ตอนนี้ก็ต้องเลือกเป้าหมายที่จะขยายใหญ่ก่อนสินะคะ"
10019080-44 = "อืม... ต้องสู้กับสัตว์ประหลาดตัวมหึมาแบบนี้... รถถังก็ดูเข้าท่า... เฮลิคอปเตอร์ก็น่าจะดี น่าจะใช้ได้ทุก#nอย่างเลย..."
10019080-45 = "[s] \"ถ้าเรื่องนั้นละก็...!!\""
10019080-46 = "คะ คุณครู? มีข้อเสนออะไรงั้นเหรอคะ?"

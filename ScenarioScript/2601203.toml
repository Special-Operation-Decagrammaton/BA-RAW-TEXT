2601203-4 = "#clearST"
2601203-5 = "3;키리노 수영복;01\n#3;a\n#wait;1000"
2601203-6 = "3;키리노 수영복;00;안녕하세요, 선생님!\n#3;em;[반응]"
2601203-7 = "3;키리노 수영복;03;말씀드린 대로, 오늘은 물에 들어가지 않고 바깥에서 훈련을 진행할 예정입니다!"
2601203-8 = "3;키리노 수영복;12;네! 물에는 들어가지 않습니다!\n#3;em;[!]\n#3;jump"
2601203-9 = "[s] (두 번 말했다…….)"
2601203-10 = "3;키리노 수영복;01;라이프가드가 하는 응급조치의 꽃은 역시 심폐소생술이겠지요."
2601203-11 = "3;키리노 수영복;00;물에 빠져 목숨이 위험한 익수자의 생명을 지키는 아주 중요한 기술입니다."
2601203-12 = "3;키리노 수영복;05;심장 압박을 통해 혈액을 인위적으로 순환시켜 뇌 손상을 막는 것이니까요."
2601203-13 = "3;키리노 수영복;08;통계에 따르면, 심폐소생술을 시행하면 하지 않았을 때와 비교해 생존율이 2.4배나 올라간다고 합니다!\n#3;jump"
2601203-14 = "[s1] \"대단한데? 열심히 공부했구나?\"\n[s2] \"이 정도면 전문가나 다름없는걸?\""
2601203-15 = "#wait;100"
2601203-16 = "#wait;100"

[translation]
2601203-1 = "為因應緊急狀況做準備"
2601203-2 = "（為了幫助桐乃進行訓練，前往了女武神警察學園的游泳訓練場）"
2601203-6 = "您好，老師！"
2601203-7 = "如同先前所說，今天我不會下水，預計將在水邊進行訓練。"
2601203-8 = "沒錯！我不會下水！"
2601203-9 = "[s] （說了兩次……）"
2601203-10 = "說到急救措施的核心，那想必會是心肺復甦術吧。"
2601203-11 = "它能保護溺水者的生命，是個非常重要的技能。"
2601203-12 = "透過人工按壓心臟的方式讓血液循環，藉此防止腦部受損。"
2601203-13 = "根據統計，施行心肺復甦術與不施行心肺復甦術相比，生存率能提高2.4倍哦！"
2601203-14 = "[s1]「真厲害，你學得很認真耶？」\n[s2]「簡直跟專家沒兩樣了呢。」"
2601203-17 = "……這本《新手女武神救生員指南》上是這樣寫的！"
2601203-18 = "[s]「……參考書也是很重要的。」"
2601203-19 = "那麼就正式開始吧！#n好，首先要準備訓練用的模型──"
2601203-23 = "咦？"
2601203-24 = "[s3]「這裡什麼都沒有啊？」\n[s4]「所以那個訓練模型呢……？」"
2601203-27 = "好，好像忘記從備品室把模型帶過來了……"
2601203-28 = "這下該怎麼辦才好？#n備品室在學校對面，要趕快過去拿來嗎……？"
2601203-29 = "但，但是這麼一來，游泳池的使用時間可能會結束……"
2601203-30 = "[s5]「沒辦法。」\n[s6]「我來當訓練模型吧。」"
2601203-33 = "咦？老師您嗎？"
2601203-34 = "有人直接擔任溺水者，確實會讓訓練更加真實……"
2601203-35 = "真的可以嗎？"
2601203-36 = "[s]「反正我是來協助桐乃做訓練的。」"
2601203-37 = "那，那就拜託您了！"
2601203-38 = "既然老師願意幫忙，我也會全力以赴！"
2601203-41 = "（於是便閉上眼睛，躺下來扮演溺水者）"
2601203-42 = "啊！老師！請振作一點！#n位於出入口的那位，請馬上叫救護車！本官會趁這段時間進行急救措施！"
2601203-43 = "先，先確認脈搏和呼吸……！"
2601203-44 = "[s] （用手測量脈搏並確認呼吸……跟指南一樣做得很好）"
2601203-45 = "接著保持呼吸道暢通！"
2601203-46 = "[s] （抬起下巴，保持呼吸道呈一直線，這一步也做得很好）"
2601203-47 = "那個，接下來是……"
2601203-51 = "[ns] （嗯嗯……？）"
2601203-52 = "[ruby=自動體外去顫器]使用AED！　[/ruby]"
2601203-56 = "[ns]「！？！？！？」"
2601203-58 = "[ns7]「你，你想做什麼！」\n[ns8]「這樣很危險耶！」"
2601203-61 = "咦？可是指南上寫說要對心跳停止的患者使用除顫器啊？"
2601203-62 = "發現心跳停止的患者時，如果想提高生存率，這一步是必須的！"
2601203-63 = "[s]「哎呀，現在是訓練，你假裝一下就好了嘛！」"
2601203-64 = "不過指南上也寫著，要藉由和實戰相同的訓練成為水戰的勝利者。"
2601203-65 = "所以請您趕快躺下！訓練模型是不能動的！"
2601203-66 = "[s9]「太，太執著於指南也不是好事！」\n[s10]「什麼水戰啦，你是在跟誰戰鬥！」"
2601203-69 = "唔嗯，既然老師都這麼說了，就先跳過這個步驟吧。"
2601203-70 = "根據指南，用完除顫器的下一步是……"
2601203-75 = "果，果然如老師所說，執著於指南好像不是個好選擇。"
2601203-76 = "因為只能在緊急狀況下做的事，沒辦法在訓練時完全照做！"
2601203-77 = "和老師……雖，雖然我不排斥……但是還太早了……！"
2601203-78 = "[s]「對吧？」"
2601203-79 = "是，是的！那當然！"
2601203-80 = "那我趕緊去備品室把訓練模型拿過來！"
2601203-81 = "謝謝老師暫時當我的訓練模型！"
2601203-85 = "[ns11]「……」\n[ns12] 翻開桐乃留下的指南"
2601203-91 = "（寫在心臟除顫器後面的內容……是實施人工呼吸）"

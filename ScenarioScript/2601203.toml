[translation]
2601203-1 = "การเตรียมพร้อมสำหรับเหตุฉุกเฉิน"
2601203-2 = "(คุณครูมุ่งหน้าไปยังสระฝึกว่ายน้ำของสถาบันฝึกตำรวจวัลคิรี่เพื่อช่วยคิริโนะในการฝึกซ้อม)"
2601203-6 = "สวัสดีค่ะคุณครู!"
2601203-7 = "อย่างที่ฉันบอกไปว่าวันนี้ฉันจะไม่ลงน้ำ แต่จะฝึกซ้อมอยู่นอกสระค่ะ!"
2601203-8 = "ค่ะ! ฉันจะไม่ลงน้ำค่ะ!"
2601203-9 = "[s] (ย้ำ 2 รอบแล้ว...)"
2601203-10 = "หัวใจสำคัญของการปฐมพยาบาลของไลฟ์การ์ดก็คือการปั๊มหัวใจค่ะ"
2601203-11 = "นับเป็นทักษะสำคัญมากในการช่วยชีวิตผู้ที่จมน้ำค่ะ"
2601203-12 = "เป็นการกระตุ้นการทำงานของหัวใจให้เลือดไหลเวียนเพื่อป้องกันไม่ให้สมองเกิดความเสียหายค่ะ"
2601203-13 = "ตามสถิติแล้ว คนที่ได้รับการปั๊มหัวใจจะมีอัตราการรอดชีวิตมากกว่าคนที่ไม่ได้รับการปั๊มหัวใจถึง 2.4 เท่าเลยค่ะ!"
2601203-14 = "[s1] \"ยอดไปเลย ศึกษามาอย่างดีเลยนะเนี่ย?\"\n[s2] \"ข้อมูลแน่นอย่างกับผู้เชี่ยวชาญเลย\""
2601203-17 = "พอดีมันมีเขียนอยู่ใน <คู่มือไลฟ์การ์ดฝึกหัดเพื่อชาววัลคิรี่> น่ะค่ะ!"
2601203-18 = "[s] \"อื้ม การอ้างอิงจากหนังสือก็เป็นสิ่งสำคัญเหมือนกัน\""
2601203-19 = "ถ้างั้นฉันจะขอเริ่มอย่างจริงจังนะคะ! เอาละ ก่อนอื่นก็เอาหุ่นจำลองสำหรับฝึกซ้อมออกมา..."
2601203-23 = "เอ๋?"
2601203-24 = "[s3] \"ไม่เห็นมีอะไรเลย?\"\n[s4] \"ไหนเหรอหุ่นที่ว่า...?\""
2601203-27 = "ฉะ... ฉันน่าจะลืมเอาหุ่นจำลองสำหรับฝึกซ้อมออกมาจากห้องเก็บของน่ะค่ะ..."
2601203-28 = "ทำยังไงดีล่ะคะ? ห้องเก็บของอยู่ฝั่งตรงข้ามกับโรงเรียน ฉันรีบไปเอามาดีมั้ยคะ?"
2601203-29 = "ตะ... แต่ว่าถ้าทำแบบนั้น กว่าจะกลับมาคงหมดเวลาใช้สระว่ายน้ำพอดี..."
2601203-30 = "[s5] \"งั้นก็ช่วยไม่ได้\"\n[s6] \"ครูจะเป็นคนจมน้ำให้เอง\""
2601203-33 = "คะ? คุณครูน่ะเหรอคะ?"
2601203-34 = "การใช้คนจริงแทนหุ่นจำลองในสถานการณ์ช่วยชีวิตน่าจะดีกว่าอยู่หรอก..."
2601203-35 = "แต่คุณครูจะไม่เป็นอะไรจริงๆ เหรอคะ?"
2601203-36 = "[s] \"ก็ครูมาช่วยการฝึกซ้อมของคิริโนะนี่นา\""
2601203-37 = "งะ... งั้นก็ขอรบกวนหน่อยนะคะ!"
2601203-38 = "ฉันจะทำให้เต็มที่ ให้ไม่เสียแรงคุณครูเลยค่ะ!"
2601203-41 = "(คุณครูนอนหลับตาแล้วรับบทคนจมน้ำ)"
2601203-42 = "อ๊ะ! คุณครู! ทำใจดีๆ ไว้ค่ะ! คนที่อยู่ตรงประตูด้านโน้นน่ะ ช่วยเรียกรถพยาบาลทีค่ะ! ระหว่างนี้ฉันจะช่วย#nปฐมพยาบาลให้ค่ะ!"
2601203-43 = "กะ... ก่อนอื่นต้องตรวจชีพจรและการหายใจ...!"
2601203-44 = "[s] (ใช้มือวัดชีพจรแล้วเช็กการหายใจ... ทำถูกต้องตามคู่มือเลยนะเนี่ย)"
2601203-45 = "ต่อไปก็หลอดลม!"
2601203-46 = "[s] (ยกคางขึ้นให้หลอดลมเป็นเส้นตรงตามคู่มือถูกต้องเลย)"
2601203-47 = "เอ่อ... ต่อไปก็..."
2601203-51 = "[ns] \"หืม...?\""
2601203-52 = "ฉันจะช็อกไฟฟ้าด้วยเครื่องกระตุกไฟฟ้าหัวใจนะคะ!"
2601203-56 = "[ns] \"?!?!?!?!\""
2601203-58 = "[ns7] \"ทะ... ทำอะไรน่ะ!\"\n[ns8] \"มันอันตรายนะ!\""
2601203-61 = "คะ? แต่ในคู่มือบอกไว้ว่าให้ฉันใช้เครื่องกระตุกไฟฟ้าหัวใจกับคนที่หัวใจหยุดเต้นนะคะ"
2601203-62 = "นี่เป็นขั้นตอนที่จำเป็นเพื่อเพิ่มอัตราการรอดชีวิตให้คนที่หัวใจหยุดเต้นกะทันหันค่ะ!"
2601203-63 = "[s] \"แต่นี่เป็นแค่การซ้อมนะ แค่ทำแกล้งๆ ก็พอแล้วไม่ใช่เหรอ!\""
2601203-64 = "ในหนังสือคู่มือบอกไว้ว่าให้ฝึกซ้อมเหมือนปฏิบัติจริง จะได้เป็นผู้ชนะในสงครามสระน้ำค่ะ"
2601203-65 = "เพราะงั้นก็รีบลงไปนอนอีกรอบเถอะค่ะ! คุณครูจมน้ำมานะคะ ถ้าขยับตัวก็ผิดบทสิคะ!"
2601203-66 = "[s9] \"ยะ... ยึดติดกับคู่มือมากไปมันไม่ดีนะ!\"\n[s10] \"สงครามสระน้ำอะไรกัน สู้กับใครอยู่เหรอ?\""
2601203-69 = "อืม... ถ้าคุณครูว่าอย่างนั้น ฉันก็คงต้องข้ามไปที่ขั้นตอนถัดไปค่ะ"
2601203-70 = "ตามคู่มือ หลังจากใช้เครื่องกระตุกไฟฟ้าหัวใจแล้ว..."
2601203-75 = "ยะ... อย่างที่คุณครูว่าเลยค่ะ การยึดติดกับคู่มือคงไม่ใช่ทางเลือกที่ดีสักเท่าไร..."
2601203-76 = "พะ... เพราะสิ่งที่ต้องทำเฉพาะเมื่อเกิดเหตุฉุกเฉิน คงเอามาทำตอนฝึกซ้อมไม่ได้!"
2601203-77 = "ใช่ว่าฉัน... ไม่อยาก... กับคุณครูหรอกนะคะ... แต่ว่ามันยังเร็วเกินไป...!"
2601203-78 = "[s] \"คงอย่างนั้นเนอะ?\""
2601203-79 = "ค่ะ ค่ะ! ใช่ค่ะ!"
2601203-80 = "งั้นฉันจะรีบไปเอาหุ่นจำลองจากห้องเก็บของมาค่ะ!"
2601203-81 = "ขอบคุณที่มาช่วยรับบทคนจมน้ำให้นะคะ!"
2601203-85 = "[ns11] \"...\"\n[ns12] หยิบคู่มือที่คิริโนะวางไว้มาดู"
2601203-91 = "(หัวข้อต่อจากเครื่องกระตุกไฟฟ้าหัวใจอัตโนมัติก็คือการผายปอด)"

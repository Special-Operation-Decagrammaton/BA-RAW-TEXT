[translation]
10046240-3 = "รุ่นพี่อิจิกะ"
10046240-4 = "ฉันมาช่วยงานค่ะ"
10046240-5 = "มาชิโระ? มาชิโระออกเวรแล้วไม่ใช่เหรอคะ?"
10046240-6 = "ใช่ค่ะ แต่ฉันรู้สึกได้ว่าความช่วยเหลือจากความยุติธรรมกำลังเป็นที่ต้องการที่นี่ ฉันก็เลยตามมาช่วยงานรุ่นพี่ค่ะ"
10046240-7 = "แหะๆ... จะว่าไปมาชิโระก็ชอบทำอะไรแบบนี้จริงๆ เลยนะคะ"
10046240-8 = "แต่ว่ามาชิโระไปทำงานมาถึงเมื่อวานเลยไม่ใช่เหรอคะ?"
10046240-9 = "วันนี้กลับไปพักผ่อนเถอะค่ะ อย่าหักโหมเลย"
10046240-10 = "อืม... ที่จริงแล้วหมู่นี้ฉันรู้สึกถึงขีดจำกัดของตัวเองอยู่น่ะค่ะ"
10046240-11 = "จะว่ายังไงดีล่ะ ฉันรู้สึกเหมือนตัวเองไม่ได้โชว์ฝีมือในที่ที่มีใครมองเห็น แล้วก็รู้สึกไม่มีตัวตนด้วยค่ะ..."
10046240-12 = "หืม? มาชิโระเป็นสไนเปอร์ งั้นก็ต้องไม่จำเป็นต้องเตะตาก็ได้นี่คะ?"
10046240-13 = "มาชิโระเห็นคุณค่าในตนเองน้อยไปหรือเปล่าคะ?"
10046240-14 = "ไม่ใช่อย่างนั้นค่ะ! การเห็นคุณค่าของตัวเองเป็นสิ่งสำคัญของสไนเปอร์อยู่แล้วค่ะ!"
10046240-15 = "ว่ากันว่าสไนเปอร์ที่เก่งกาจจะกำจัดศัตรู 3 คนได้ด้วยกระสุนเพียงนัดเดียว... รุ่นพี่ฮาสุมิก็เป็นตัวอย่าง#nของคำพูดนี้เลยค่ะ!"
10046240-16 = "อืม... ถ้าเป็นรุ่นพี่ฮาสุมิก็คงชอบที่ตัวเองกำจัดศัตรู 3 คนได้ในรวดเดียวนะคะ แหะๆ..."
10046240-20 = "(ชิสึยามะ มาชิโระ... เป็นรุ่นน้องปี 1 ที่มีฝีมือโดดเด่น...)"
10046240-21 = "(แต่เด็กคนนี้ก็ขยันและมีแพชชันสูงเหลือเกิน... ในฐานะรุ่นพี่แล้วฉันก็อยากบอกให้เพลาๆ ลงหน่อย คนอื่นจะได้ตามทันบ้าง)"
10046240-22 = "(แต่บอกตามตรงว่าเธอดูไม่เข้ากับฉันสักเท่าไร...)"
10046240-28 = "อีกอย่าง... ฉันได้ยินมาว่ารุ่นพี่อิจิกะเดินลาดตระเวนอยู่คนเดียวด้วยค่ะ"
10046240-29 = "คะ? อ่า... อ้อ จู่ๆ ฉันก็ได้รับมอบหมายงานมาน่ะค่ะ"
10046240-30 = "อยู่คนเดียวไม่เหงาเหรอคะ?"
10046240-31 = "อย่าบอกนะคะว่านั่นคือเหตุผลที่มาช่วยน่ะ?"
10046240-32 = "......"
10046240-33 = "ตายจริง... น่าอายจังเลยนะคะ ฉันทำให้รุ่นน้องต้องเป็นห่วงจนได้..."
10046240-34 = "ฮ่าฮ่า! เห็นทีว่ารุ่นพี่คนนี้ต้องรบกวนรุ่นน้องแล้วละค่ะ"
10046240-35 = "ถ้างั้นก็ฝากด้วยนะคะ ฉันไม่ได้อยู่ในสถานะที่จะขอความช่วยเหลือก่อนได้น่ะค่ะ"
10046240-39 = "ค่ะ! วางใจฉันได้เลยค่ะ!"

10046240-5 = "3;이치카 수영복;02;마시로? 마시로는 비번 아니었나요?\n#3;em;[?]"
10046240-6 = "3;마시로 수영복ND;05;예, 하지만 지금 여기서 정의의 도움이 필요하다는 직감을 따라왔습니다.\n#3;greeting"
10046240-7 = "3;이치카 수영복;99;하하…… 그러고 보니, 마시로는 그런 거 정말 좋아했죠."
10046240-8 = "3;이치카 수영복;20;하지만 마시로는 어제까지 작전하지 않았슴까."
10046240-9 = "3;이치카 수영복;04;오늘은 무리하지 말고, 돌아가서 쉬시죠."
10046240-10 = "3;마시로 수영복ND;06;으음…… 사실, 최근 저 스스로 한계를 느끼고 있어서요.\n#3;stiff"
10046240-11 = "3;마시로 수영복ND;06;뭔가, 요즘 눈에 띄는 활약을 하지 못하고 있는 듯하다고 할까, 존재감이 없다고 할까……."
10046240-12 = "3;이치카 수영복;02;음? 마시로는 저격수니까, 굳이 눈에 띌 필요는 없지 않을까요?"
10046240-13 = "3;이치카 수영복;05;오히려 존재감이 낮은 편이 좋지 않슴까?"
10046240-14 = "3;마시로 수영복ND;05;그렇지 않습니다! 저격수에 존재감은 필수적입니다!\n#3;jump\n#3;em;[!]"
10046240-15 = "3;마시로 수영복ND;05;뛰어난 저격수는 한 발의 총알로 3명의 적을 무력화한다고 하듯이…… 하스미 선배만 해도 엄청난 존재감을 갖고 계시지 않습니까!"
10046240-16 = "3;이치카 수영복;04;음…… 하스미 선배의 존재감은, 어느 쪽인가 하면, 3명의 적을 전부 해치워 버린다는 느낌이지만요, 하하…….\n#3;em;[땀]"

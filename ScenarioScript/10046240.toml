[translation]
10046240-3 = "Ichika."
10046240-4 = "I have answered the call."
10046240-5 = "Mashiro? Aren't you off duty today?"
10046240-6 = "Justice takes no holidays."
10046240-7 = "Haha... Yeah, you're telling me."
10046240-8 = "But Mashiro, you just finished a long mission yesterday."
10046240-9 = "You should rest before you overexert yourself."
10046240-10 = "Um... Frankly, I have been feeling a bit...limited."
10046240-11 = "I could always improve my presence. I feel like no one has noticed my recent work."
10046240-12 = "Hm? But since you're a sniper, isn't it good that you don't stand out?"
10046240-13 = "I think it's beneficial that you're able to blend in!"
10046240-14 = "Untrue! Snipers need a powerful presence."
10046240-15 = "Hasumi is said to have hit three targets with one bullet. That kind of reputation creates presence, even if the enemy never saw her coming."
10046240-16 = "Well... Hasumi's presence is a LOT more than a good shot..."
10046240-20 = "(Shizuyama Mashiro... Her achievements are exceptional, but...)"
10046240-21 = "(She's very...diligent. Passionate? I know she's young, but she should learn to pace herself.)"
10046240-22 = "(We never really hit it off...)"
10046240-28 = "...I heard you were patrolling by yourself."
10046240-29 = "Huh? Um...yeah, I suppose."
10046240-30 = "Do you not get lonely?"
10046240-31 = "Um... In general?!"
10046240-32 = "..."
10046240-33 = "...Oh! You were worried about me? As a junior, you shouldn't have to do that."
10046240-34 = "Haha! I guess I should set a better example."
10046240-35 = "Then yes, I'd love to have your help!"
10046240-39 = "Absolutely! Leave it to me!"

[translation]
10046240-3 = "一花前輩。"
10046240-4 = "我來幫忙了。"
10046240-5 = "麻白？你今天不是休假嗎？"
10046240-6 = "是的，不過直覺告訴我這裡需要正義的幫助，於是就過來了。"
10046240-7 = "哈哈……這麼說來，麻白一直都很喜歡這種事呢。"
10046240-8 = "不過你昨天不是才參加完作戰嗎？"
10046240-9 = "今天還是別勉強，回去休息吧。"
10046240-10 = "唔嗯……老實說，我最近開始有點力不從心的感覺。"
10046240-11 = "好像沒什麼突出的表現，存在感也變得很低……"
10046240-12 = "嗯？但麻白是狙擊手，那樣不是很好嗎？"
10046240-13 = "存在感低一點反而才是好事吧？"
10046240-14 = "不是那樣的！狙擊手必須有存在感才行！"
10046240-15 = "就像優秀的狙擊手能用一發子彈制伏三名敵人一樣……#n蓮實前輩不也擁有強烈的存在感嗎！"
10046240-16 = "唔嗯……要說蓮實前輩的話，感覺比起「制伏」更像直接「打倒」吧，哈哈……"
10046240-20 = "（靜山麻白……確實是一年級中相當優秀的後輩……）"
10046240-21 = "（不過該說是非常認真，還是充滿熱情……#n　站在前輩的立場，希望他能學會張弛有度呢……）"
10046240-22 = "（老實說，跟我好像不太合拍……）"
10046240-28 = "而且……我聽說一花前輩自己一個人在巡邏。"
10046240-29 = "嗯？啊，啊啊。不知不覺就變成這樣了。"
10046240-30 = "一個人巡邏，不會覺得有點寂寞嗎？"
10046240-31 = "難道你是因為這樣才來的？"
10046240-32 = "……"
10046240-33 = "……哎呀，真讓人慚愧。#n居然讓後輩擔心了……"
10046240-34 = "哈哈！我果然還不算是個好前輩呢。"
10046240-35 = "那就拜託你支援囉。#n我現在也不是該糾結這糾結那的時候了。"
10046240-39 = "是！請交給我吧！"

[translation]
34010-1 = "ตอนที่ 1;บทเริ่มต้น"
34010-4 = "ทางโน้น!!"
34010-5 = "ตามไป!!"
34010-10 = "ผะ... ผิดทางแล้วละ ทางนี้เป็นทางตัน..."
34010-11 = "ฝั่งตรงข้ามก็ด้วย ถูกล้อมเอาไว้อย่างสมบูรณ์แบบเลย"
34010-12 = "อึก..."
34010-19 = "ยอมแพ้ซะเถอะสควอด พวกเธอหนีไปต่อไม่ได้แล้วละ"
34010-23 = "......"
34010-24 = "ฮะ... เฮือก!"
34010-25 = "(ภาษามือ)"
34010-26 = "กระสุนของเราแทบจะไม่เหลือแล้ว พวกเราไม่ได้กินข้าวแล้วก็ไม่ได้นอนมาเกิน 80 ชั่วโมงแล้วด้วย ร่างกายฉันไม่ไหวแล้ว..."
34010-27 = "แถมหัวหน้าก็ยังบาดเจ็บหนัก อย่าว่าแต่เรื่องหนีเลย แค่อยู่เฉยๆ ชีวิตของหัวหน้ายังดูน่าอันตรายเลย"
34010-33 = "ไม่หรอก เรายังมีอีกหนึ่งทางออกสุดท้าย ถ้าใช้วิธีนี้ละก็..."
34010-34 = "คะ?!  ยะ... อย่าบอกนะว่า"
34010-35 = "ระเบิดที่ทำลายฮาโลได้..."
34010-36 = "มิซากิ ฮิโยริ ระหว่างที่ฉันยื้อเวลาไว้ พวกเธอพาตัวองค์หญิง... ออกไปจากที่นี่ซะ"
34010-37 = "ซาโอริ..."
34010-38 = "ออกจากที่นี่ไป... แล้วก็... แล้วก็..."
34010-39 = "แล้ว... แล้วก็........."
34010-40 = "ซาโอริ"
34010-41 = "......?!"
34010-46 = "พอได้แล้วละ เราพยายามกันมามากพอแล้ว"
34010-47 = "......"
34010-48 = "องค์หญิง..."
34010-53 = "สิ่งที่ <ผู้หญิงคนนั้น> ต้องการคือตัวฉัน ถูกไหมล่ะ? "
34010-54 = "ฉันจะเป็นคนไปเอง และเพราะแบบนั้น ทุกคนช่วยปล่อยให้ฉันไปเถอะ"
34010-55 = "......"
34010-57 = "อาสึโกะ! พูดอะไรของเธอ! ทำแบบนั้นไม่ได้นะ!!"
34010-59 = "...... พอเถอะ มันไม่มีความหมายอะไรหรอก ซาโอริ"
34010-60 = "ถ้าออกจากที่นี่ไปได้ แล้วต่อไปล่ะ? เธอมีแผนการต่อไปแล้วเหรอ? มีที่ที่จะให้หนีไปรึไง?"
34010-61 = "......"
34010-62 = "ทั้งทรีนิตี้ เกเฮนน่า และอาเรียสต่างก็ไล่ล่าเราอยู่นะ"
34010-63 = "ไม่มีที่ไหนในคิโวทอสให้เราหนีไปได้หรอก หรือถ้าจะหนีก็ต้องหนีไปจนกว่าจะตายนั่นแหละ"
34010-64 = "มาคิดๆ ดูแล้ว ทั้งซาโอริ มิซากิ และก็ฮิโยริ ทุกคนต้องมาตกอยู่ในสภาพนี้ก็เพราะฉัน"
34010-66 = "เพราะฉะนั้นฉันจะขอจบมันเอง"
34010-68 = "องค์หญิง..."
34010-69 = "องค์หญิง..."
34010-70 = "ไม่ได้นะ... อาสึโกะ เธอจะถูกฆ่านะ ถ้ากลับไปหาผู้หญิงคนนั้น เธอจะถูกฆ่าเอานะ... เธอก็รู้ดีไม่ใช่รึไง..."
34010-72 = "ที่ผ่านมาฉันไม่ได้ตัดสินใจอะไรเองเลย ฉันเลยอยากทำตามความตั้งใจของตัวเองเป็นครั้งแรก"
34010-76 = "สัญญากับฉันได้ไหม? สัญญาว่าจะปล่อยทุกคนให้เป็นอิสระ"
34010-77 = "......"
34010-78 = "...... รอก่อน ฉันต้องถามจากมาดาม"
34010-82 = "(ซ่า) หืม..."
34010-83 = "(ซ่า) อย่างนี้เองเหรอคะ เข้าใจแล้วค่ะ ฉันให้สัญญา"
34010-84 = "บอกชื่อของเธอมาทีสิ"
34010-85 = "(ซ่า) ชื่อเหรอ? จะเอาชื่อของฉันไปทำอะไร?"
34010-86 = "ให้เอาชื่อเป็นประกันในการรักษาสัญญาไงล่ะ"
34010-87 = "(ซ่า) ...... ฉันขอสัญญาในนามของ <เบียทริซ> จินตนาการของนักแสวงบุญทุกคน"
34010-88 = "...... อื้ม ถือว่าเราสัญญากันแล้ว"
34010-93 = "ใส่หน้ากากตามคำสั่งของมาดามเถอะค่ะองค์หญิง จะถอดหน้ากากตามอำเภอใจไม่ได้นะคะ"
34010-98 = "(ซ่า) พาตัวเธอมาที่นี่โดยไม่ให้มีรอยแผลใดๆ นะคะ ฉันจะเริ่มพิธีพรุ่งนี้ทันทีที่พระอาทิตย์ขึ้นค่ะ"
34010-100 = "...... รักษาตัวด้วยล่ะ ทั้งซาโอริ แล้วก็คนอื่นด้วย ลาก่อนนะ"
34010-101 = "องค์หญิง..."
34010-102 = "องค์หญิง..."
34010-107 = "ไม่ได้นะ... อาสึโกะ... "
34010-108 = "ถ้าฉัน... ยังปกป้องแม้แต่เธอไม่ได้อีกละก็..."
34010-109 = "ถ้าสิ่งที่ฉันเชื่อ... และสิ่งที่ฉันต้องปกป้อง... มันหายไปทั้งหมด..."
34010-110 = "ฉัน..."
34010-113 = "อาสึโกะ... ฉันน่ะ..."
34010-114 = "ที่ผ่านมาจนถึงตอนนี้... "
34010-118 = "ฉันใช้ชีวิต... เพื่ออะไรกัน...?"
34010-119 = "(ซ่า) ทำอย่างไรกับสควอดที่เหลือดีคะ?"
34010-120 = "(ซ่า) จัดการให้หมดเลยค่ะ"
34010-121 = "เข้าใจแล้วค่ะ"
34010-126 = "ยิงเลย"
34010-128 = "......"
34010-129 = "......"
34010-130 = "......"
34010-135 = "ตอนต่อไป;พิธีชงชาที่น่าอึดอัดใจ"

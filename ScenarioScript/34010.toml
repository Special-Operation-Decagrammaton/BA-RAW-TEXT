[translation]
34010-1 = "第1話;序幕"
34010-4 = "找到了！！"
34010-5 = "在那裡！快追！！"
34010-10 = "已，已經沒辦法了……這裡是條死路……"
34010-11 = "……另一邊也一樣，完全被包圍了。"
34010-12 = "……"
34010-19 = "放棄吧。#n你們已經逃不掉了。"
34010-23 = "……"
34010-24 = "噫，噫……"
34010-25 = "（嘶，嘶嘶……）"
34010-26 = "……子彈沒剩多少了，體力也到極限了……"
34010-27 = "隊長的傷勢也很重。再這樣下去的話別說逃走了，隊長會有生命危險的。"
34010-33 = "……我們還有最後的手段。用這個的話……"
34010-34 = "難，難道。"
34010-35 = "……破壞光環的炸彈。"
34010-36 = "美咲、日和。在我爭取時間的時候帶著公主……離開這裡。"
34010-37 = "……沙織。"
34010-38 = "離開這裡……然後……接下來……"
34010-39 = "接下來……"
34010-40 = "沙織。"
34010-41 = "……公主？"
34010-46 = "已經夠了。我們已經很努力了。"
34010-47 = "……"
34010-48 = "公，公主醬……怎麼了……？"
34010-53 = "「她」想要的是我……對吧？"
34010-54 = "我會跟你們走的。所以希望你們能放過其他人。"
34010-55 = "……"
34010-57 = "敦子！？……你想做什麼！？"
34010-59 = "……已經夠了，沙織。全都沒有意義的。"
34010-60 = "突破這裡之後呢？究竟該去哪裡呢？"
34010-61 = "……"
34010-62 = "三一、格黑娜──就連奧利斯都在追趕我們。"
34010-63 = "在奇普托斯已經沒有能夠讓我們安心的地方了。#n直到我們的生命消逝為止，都得過著躲躲藏藏的人生。"
34010-64 = "不過，這也是因為有我在的關係。沙織、美咲跟日和都是因為我才會變成這樣的……"
34010-66 = "所以，就由我來結束這一切吧。"
34010-68 = "公，公主醬……"
34010-69 = "……公主。"
34010-70 = "……不可以啊敦子，回去的話會被殺掉的……你知道的吧？"
34010-72 = "……至今為止，我什麼決定和判斷都沒有做過。所以，這次能讓我來決定嗎？"
34010-76 = "能答應我嗎？會放他們自由。"
34010-77 = "……"
34010-78 = "……稍等，我向夫人確認。"
34010-82 = "哦"
34010-83 = "……原來如此，我知道了。我就答應你吧。"
34010-84 = "用你的名字，發誓吧。"
34010-85 = "名字……？那有什麼意義？"
34010-86 = "希望你能夠遵守約定。"
34010-87 = "好吧……我以所有朝聖者的幻想「貝雅特里榭」之名發誓，會遵守跟你的約定。"
34010-88 = "……嗯，一言為定。"
34010-93 = "公主大人，請來這裡。這是夫人的指示，您隨意拿下面具的話我們會很困擾的。"
34010-98 = "小心對待他，可別讓他受傷了。儀式將在明天早上，和日出一起開始。"
34010-100 = "……要保重喔。沙織、大家──永別了。"
34010-101 = "公主……"
34010-102 = "公主醬……"
34010-107 = "不可以……敦子……"
34010-108 = "我……如果連你都保護不了……"
34010-109 = "信念……需要保護的東西……全都消失了的話……"
34010-110 = "我……"
34010-113 = "敦子，我……"
34010-114 = "我是為了什麼……"
34010-118 = "為了什麼……活到現在的呢……？"
34010-119 = "……剩下的小隊成員要怎麼處理呢？"
34010-120 = "全都處理掉。"
34010-121 = "我明白了。"
34010-126 = "開槍。"
34010-128 = "……"
34010-129 = "……"
34010-130 = "……"
34010-135 = "下一話;殘缺不全的茶會"

[translation]
34010-1 = "第1話;プロローグ"
34010-4 = "いたぞ！！"
34010-5 = "あっちだ！追え！！"
34010-10 = "も、もうおしまいです……ここは行き止まりですし……。"
34010-11 = "……反対側も。完全に包囲されてる。"
34010-12 = "くっ……。"
34010-19 = "諦めるんだな。#nこれ以上は逃げられないぞ。"
34010-23 = "……。"
34010-24 = "ひ、ひっ……。"
34010-25 = "（スッ、ススッ……）"
34010-26 = "……弾薬、ほとんど残ってないし、もう体力も限界……。"
34010-27 = "リーダーの傷も大きい。このままじゃ、逃げるどころかリーダーの命が危ないよ。"
34010-33 = "……最後の手段ならまだ残っている。これなら……。"
34010-34 = "ま、まさか。"
34010-35 = "……ヘイローを破壊する爆弾。"
34010-36 = "ミサキ、ヒヨリ。私が時間を稼ぐ間に姫を連れて……ここを離れるんだ。"
34010-37 = "……サオリ。"
34010-38 = "ここを離れて……そうしたら……その次は……。"
34010-39 = "その……次は……。"
34010-40 = "サオリ。"
34010-41 = "……姫？"
34010-46 = "もういいよ。私たちは頑張った。"
34010-47 = "……。"
34010-48 = "ひ、姫ちゃん……どうしたんですか……？"
34010-53 = "「彼女」が求めているのは私……そうでしょう？"
34010-54 = "私が行くよ。だから、他のメンバーは見逃してほしい。"
34010-55 = "……。"
34010-57 = "アツコ！？……一体何をっ！？"
34010-59 = "……もういいよ、サオリ。ぜんぶ、無意味だよ。"
34010-60 = "ここを切り抜けたその先は？一体どこに向かうの？"
34010-61 = "……。"
34010-62 = "トリニティにゲヘナ――そしてアリウスさえも私たちを追いかけてる。"
34010-63 = "このキヴォトスで私たちが安心できる場所はないよ。#n私達の命が尽きるまで、息を潜めて逃げ隠れる人生が続くだけ。"
34010-64 = "でも、それも私がいるからの話。サオリも、ミサキも、ヒヨリも。私のせいでこうなってしまったから……。"
34010-66 = "だから、私が終わらせる。"
34010-68 = "ひ、姫ちゃん……。"
34010-69 = "……姫。"
34010-70 = "……ダメだアツコ、戻ったら殺される……それくらい、分かってるだろう？"
34010-72 = "……今まで私は何の決定も判断もしなかった。だから、今回くらいは自分で決めたっていいでしょ？"
34010-76 = "約束してくれる？みんなを自由にしてくれるって。"
34010-77 = "……。"
34010-78 = "……少し待ってろ、マダムに確認を取る。"
34010-82 = "ほぉ"
34010-83 = "……なるほど、わかりました。お約束いたしましょう。"
34010-84 = "その名にかけて、誓って。"
34010-85 = "名前を……？それにどれほどの意味が？"
34010-86 = "必ず約束を守ってほしいから。"
34010-87 = "いいでしょう……すべての巡礼者の幻想である私「ベアトリーチェ」の名にかけて、お約束いたします。"
34010-88 = "……うん、約束だよ。"
34010-93 = "姫様、こちらを。マダムのご指示です。勝手にマスクを外されては困ります。"
34010-98 = "傷一つないよう、丁重に扱いなさい。儀式は明朝、日の出と共に始めます。"
34010-100 = "……元気でね。サオリ、みんな――さようなら。"
34010-101 = "姫……。"
34010-102 = "姫ちゃん……。"
34010-107 = "ダメだ……アツコ……。"
34010-108 = "私は……お前まで守れなかったら……"
34010-109 = "信念も……守るべきものも……全部なくなってしまったら……。"
34010-110 = "私は……。"
34010-113 = "アツコ、私は……。"
34010-114 = "私は一体何のために今まで……。"
34010-118 = "何のために……生きているんだ……？"
34010-119 = "……残りのスクワッドはどうしますか？"
34010-120 = "すべて始末なさい。"
34010-121 = "かしこまりました。"
34010-126 = "撃て。"
34010-128 = "……。"
34010-129 = "……。"
34010-130 = "……。"
34010-135 = "次回;不揃いなティーパーティー"

[translation]
1600106-1 = "壞掉的明日奈"
1600106-2 = "（總覺得她不尋常的樣子讓人有點擔心，於是決定去找明日奈）"
1600106-6 = "（不久就看見明日奈坐在遠處長椅上的身影)"
1600106-10 = "（呆滯……）"
1600106-11 = "[s] 「……明，明日奈？」"
1600106-12 = "嗯……"
1600106-16 = "啊！"
1600106-17 = "咦，什麼什麼？主人！？什麼時候來的！？"
1600106-18 = "[s1] 「還好嗎？發生什麼事了？」\n[s2] 「總覺得看起來不太對勁……」"
1600106-19 = "沒，沒事沒事。有時候就會這樣。"
1600106-20 = "沒，沒事沒事。有時候就會這樣。"
1600106-21 = "不，反而應該說就是因為沒什麼事嗎？"
1600106-22 = "像這樣一直沒事做的話就會變得遲鈍，該這麼說嗎……"
1600106-23 = "[s3]「動物般的直覺變遲鈍了，的感覺……？」\n[s4]「因為長時間沒有發揮那種直覺的時機……」\n[s5]「所以所有感覺都變遲鈍了，之類的？」"
1600106-24 = "唔嗯，是嗎？"
1600106-25 = "唔嗯，是嗎？"
1600106-26 = "唔嗯，是嗎？"
1600106-27 = "或許是吧……？"
1600106-28 = "總之，偶爾就會有這種無法專注的時候……"
1600106-29 = "……"
1600106-33 = "（呆滯……）"
1600106-34 = "……剛剛在說什麼？"
1600106-35 = "[s] 「真嚴重……」"
1600106-36 = "總，總之別擔心！過一段時間就會自己治好了！"
1600106-37 = "不過像現在這種情況，如果有人能幫我的話果然還是會很高興的吧。"
1600106-38 = "主人在真是幫大……"
1600106-42 = "……咦，主人？你什麼時候來的？"
1600106-44 = "（……總之先換個地方吧）"
1600106-57 = "（因為她連一個人走路似乎都有困難，只能一邊支撐著明日奈一邊前進）"
1600106-58 = "（儘管如此，為了配合時不時會突然停下腳步的明日奈）"
1600106-59 = "（僅僅數百公尺的距離，花了一個小時以上才抵達）"
1600106-63 = "唔……"
1600106-64 = "咦，這裡是……？"
1600106-65 = "[s6] 「就快到了唷。」\n[s7] 「就快到明日奈的宿舍了唷。」"
1600106-66 = "咦，為什麼我……還有，為什麼主人會……？"
1600106-67 = "咦，為什麼我……還有，為什麼主人會……？"
1600106-68 = "好好休息比較好……？"
1600106-69 = "唔嗯，那就這樣吧……？"
1600106-70 = "總覺得，明明應該不睏卻好睏……"
1600106-74 = "咦……"
1600106-75 = "樓梯，該怎麼爬來著……？"
1600106-79 = "……？"
1600106-80 = "[s8] 「明日奈！」\n[s9] 立刻伸出手接住她"
1600106-85 = "（哐咚！）"
1600106-88 = "……嗯？"
1600106-89 = "咦……？"
1600106-93 = "為什麼我會，在主人身上……？"
1600106-97 = "而且，胸口很溫暖……？"
1600106-98 = "……"
1600106-99 = "[s] 「……明日奈？」"
1600106-103 = "啊！？"
1600106-104 = "哇，怎麼了怎麼了！？"
1600106-105 = "為什麼我會在主人身上？"
1600106-106 = "啊，這麼說來我剛才，從樓梯上摔了下來……然後主人接住了我嗎？"
1600106-107 = "啊哈哈，接的真好！好厲害好厲害，這種事還是第一次呢！"
1600106-108 = "耶嘿嘿，明明是女僕，卻反而受到幫助了呢。哎呀真是嚇到我了……"
1600106-109 = "……話說回來，我不重嗎？"
1600106-110 = "[s10] 「一點也不重唷。」\n[s11] 「狀態似乎回復了真是太好了。」"
1600106-111 = "這樣啊，謝謝你，主人！"
1600106-112 = "這樣啊，謝謝你，主人！"
1600106-113 = "總覺得從剛才開始心裡就有點興奮！"
1600106-114 = "……啊。"
1600106-115 = "話說回來，感覺都恢復了！"
1600106-116 = "[s] 「真是太好了。」"
1600106-117 = "哇！"
1600106-121 = "能動了能動了！手腳都能隨心所欲了！"
1600106-128 = "你看，主人！！好像也能跳了唷！"
1600106-133 = "我跳！！"
1600106-134 = "（……？）"
1600106-135 = "（……！！）"
1600106-144 = "― ……呵呵，跳到主人身上了！[wa:1640] "
1600106-146 = " ― 嗯，身體好輕盈，感覺現在什麼都做的到！[wa:2200] "
1600106-149 = "[ns12]「怎，怎麼突然這樣！？」\n[ns13]「別吃掉我……」"
1600106-150 = "― 唔嗯，該怎麼形容呢？這種感覺……[wa:3060] "
1600106-151 = "― 唔嗯，該怎麼形容呢？這種感覺……[wa:3060] "
1600106-154 = "― ……算了，無所謂！"
1600106-156 = "― 鏘！平常的明日奈醬，復活！[wa:2010] "
1600106-159 = "― 這都是託主人的福唷，謝謝你！[wa:2190] "
1600106-162 = "― 呵呵。果然只要像這樣待在主人的身邊，[wa:1910] "
1600106-164 = "― 內心就會十分雀躍呢。"
1600106-167 = "― ……總覺得好像，有點上癮呢！[wa:1260] "
1600106-170 = "― 所以之後偶爾也要像這樣……可以嗎？[wa:3510] "
1600106-173 = "― 請多多指教，我的主人！[wa:920] "
1600106-176 = "（之後，目送恢復精神的明日奈離開，隻身回到了夏萊）"

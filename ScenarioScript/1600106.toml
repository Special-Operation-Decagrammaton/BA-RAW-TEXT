[translation]
1600106-1 = "อาสึนะเครื่องรวน"
1600106-2 = "(คุณครูรู้สึกเป็นห่วงอาสึนะที่ดูแปลกไปจากปกติ จึงไปยังบริเวณที่ที่เธออยู่)"
1600106-6 = "(ไม่ไกลนัก คุณครูก็เห็นอาสึนะนั่งอยู่ที่ม้านั่ง)"
1600106-10 = "(เหม่อ...)"
1600106-11 = "[s] \"อาสึนะ...?\""
1600106-12 = "หืม อื้อ..."
1600106-16 = "เฮือก!"
1600106-17 = "หืม? ว่าอะไรนะ? เอ๋~~ นายท่าน!? มาตั้งแต่เมื่อไรเนี่ย!?"
1600106-18 = "[s1] \"เป็นอะไรรึเปล่า? มีเรื่องอะไรเหรอ?\"\n[s2] \"วันนี้ดูแปลกๆ นะ\""
1600106-19 = "อะ...อะฮะฮะ... ไม่มีอะไรหรอก ก็แค่บางครั้งมันก็เป็นแบบนี้น่ะ"
1600106-20 = "อะ...อะฮะฮะ... ไม่มีอะไรหรอก ก็แค่บางครั้งมันก็เป็นแบบนี้น่ะ"
1600106-21 = "ไม่สิ หรือต้องบอกว่ามันราบเรียบ เงียบเกินไปดีนะ...? เพราะงั้นก็เลยเป็นแบบนั้น..."
1600106-22 = "เวลาที่มันไม่มีเรื่องอะไรเลยนานๆ ฉันก็มักจะนั่งเหม่อโดยไม่รู้ตัวละมั้ง..."
1600106-23 = "[s3] \"เพราะสัญชาตญาณสัตว์ป่ามักตื่นตัวเสมอน่ะเหรอ?\"\n[s4] \"ถ้าไม่มีอะไรมากระตุ้นต่อมนานๆ คงไม่ดีสินะ...\"\n[s5] \"ถ้าไม่ได้ใช้สัญชาตญาณนานๆ ความรู้สึกอื่นๆ ก็จะเฉื่อยลงด้วยสินะ?\""
1600106-24 = "อื้อ คิดว่าใช่นะ"
1600106-25 = "อื้อ คงงั้นแหละ"
1600106-26 = "อื้อ คงงั้นแหละ"
1600106-27 = "อาจจะเป็นแบบนั้นก็ได้นะ...?"
1600106-28 = "เอาเป็นว่าพอเป็นแบบนี้ทีไร ฉันก็จะคิดอะไรไม่ค่อยออก แล้วก็ไม่ค่อยมีสมาธิ..."
1600106-29 = "ด้วย..."
1600106-33 = "(เหม่อ...)"
1600106-34 = "...เมื่อกี้ฉันพูดว่าอะไรนะ?"
1600106-35 = "[s] \"คิดแล้วเชียวว่าขั้นวิกฤติจริงๆ\""
1600106-36 = "เอ๋~ ก็บอกว่าไม่เป็นไรไงเล่า เดี๋ยวมันก็หายเองแหละ ไม่ได้เป็นบ่อยๆ ซะหน่อย..."
1600106-37 = "แต่ว่าในเวลาแบบนี้ ก็คงต้องการความช่วยเหลือจากใครบางคนนั่นละ"
1600106-38 = "นายท่านมาช่วยฉันไว้เลยนะเนี่ย..."
1600106-42 = "หืม...? เมื่อกี้ฉันพูดอะไรไปนะ...? อ้าว นายท่านเหรอ? มาตั้งแต่เมื่อไรน่ะ?"
1600106-44 = "(คุณครูรู้สึกเป็นห่วงอาสึนะ จึงชวนเธอเปลี่ยนที่คุย...)"
1600106-57 = "(คุณครูเป็นห่วงอาสึนะที่ดูเดินเหมือนคนเหม่อๆ จึงขยับไปเดินใกล้ๆ และจับมือเธอเอาไว้)"
1600106-58 = "(แต่ถึงอย่างนั้นก็มีบางจังหวะที่อาสึนะจู่ๆ ก็หยุดเดินไปดื้อๆ...)"
1600106-59 = "(ทั้งสองคนใช้เวลาประมาณหนึ่งชั่วโมงในการเดินไปยังบริเวณที่อยู่ห่างเพียงไม่กี่ร้อยเมตร...)"
1600106-63 = "อื้อ... อืม... รู้สึกว่ามัน..."
1600106-64 = "เอ๋... ที่นี่คือ...?"
1600106-65 = "[s6] \"เกือบถึงแล้วละ\"\n[s7] \"หน้าหอพักของอาสึนะไง\""
1600106-66 = "เอ๋...? ที่นี่มัน... ทำไมฉัน... ถึง... มาอยู่ที่นี่ได้...? ทำไมนายท่านถึงมาอยู่ที่หน้าหอพักฉันล่ะ?"
1600106-67 = "เอ๋...? ทำไมฉัน... ถึง... มาอยู่ที่นี่ได้...? ทำไมนายท่านถึงมาอยู่ที่หน้าหอพักฉันล่ะ?"
1600106-68 = "หืม? ให้เข้าไปในห้องแล้วก็สูดหายใจลึกๆ ก่อนงั้นเหรอ?"
1600106-69 = "อื้อ เอางั้นก็ได้..."
1600106-70 = "รู้สึกไม่อยากนอนเลย แต่ก็ง่วงจัง..."
1600106-74 = "บันได..."
1600106-75 = "ต้องขึ้นบันไดยังไงนะ... แบบนี้เหรอ...?"
1600106-79 = "เอ๋...? อืม...?"
1600106-80 = "[s8] \"อาสึนะ!\"\n[s9] (รีบยื่นแขนเข้าไปรับ)"
1600106-85 = "(ตึกๆๆ โครม!)"
1600106-88 = "หืม...?"
1600106-89 = "นี่มัน... ทำไม...?"
1600106-93 = "ฉัน... ขึ้นมาอยู่ข้างบนนายท่านเฉยเลย...? ฮิฮิ..."
1600106-97 = "สัมผัสของนายท่าน... อุ่นดีจัง"
1600106-98 = "หืม...?"
1600106-99 = "[s] \"อาสึนะ...?\""
1600106-103 = "เฮือก!?"
1600106-104 = "อะ... อะไรกันเนี่ย!?"
1600106-105 = "ทำไมฉันถึงขึ้นมาคร่อมบนตัวนายท่านแบบนี้ล่ะ?"
1600106-106 = "อ๋อ จริงด้วย เมื่อกี้ฉันหกล้มบนบันไดนั่นสินะ? นายท่านเข้ามาช่วยรับฉันไว้เหรอ?"
1600106-107 = "อะฮะฮะฮะ!! รับได้สวยเลยน้า! เพิ่งเคยลองทำเรื่องแบบนี้เลยนะเนี่ย! สนุกจังเลย!!"
1600106-108 = "ฮิฮิฮิ... เป็นถึงสาวใช้ แต่ดันให้นายท่านช่วยไว้ซะแล้ว เมื่อก่อนนี้เคยมีครั้งหนึ่งที่ล้มหน้าคว่ำไปเลย..."
1600106-109 = "...ว่าแต่นายท่านไม่หนักเหรอน่ะ?"
1600106-110 = "[s10] \"ไม่เป็นไร ครูไม่หนักเลย\"\n[s11] \"ดีขึ้นแล้วสินะ อาสึนะ\""
1600106-111 = "จริงเหรอ? ขอบคุณนะนายท่าน!"
1600106-112 = "อื้อ ดีขึ้นนิดหน่อยแล้วละ ขอบคุณนะนายท่าน!"
1600106-113 = "ที่จริงเมื่อกี้นี้น่ะ ฉันคิดว่ามันสนุกมากเลยนะ"
1600106-114 = "...หืม? หลุดแล้ว?"
1600106-115 = "รู้สึกเหมือนกลับมาเต็มที่เหมือนเดิมแล้ว...!?"
1600106-116 = "[s] \"กลับมาเหมือนเดิมแล้วสินะ ค่อยยังชั่วหน่อย\""
1600106-117 = "โอ้...!"
1600106-121 = "หลุดแล้ว! หลุดแล้วนายท่าน! ตอนนี้ก็ขยับตัวได้แล้วละ! ทั้งแขนแล้วก็ขาด้วย!"
1600106-128 = "ดูสินายท่าน! กระโดดได้ด้วยละ! โดดดึ๋งๆ!!"
1600106-133 = "โดด-ดึ๋ง!!"
1600106-134 = "(...?)"
1600106-135 = "(...!!!)"
1600106-144 = "― ฮิฮิ... ขึ้นมาบนตัวนายท่านแล้วละ![wa:840] "
1600106-146 = "― อื้อ! รู้สึกตัวเบาๆ... ถ้าเป็นตอนนี้ละก็ รู้สึกว่าไม่ว่าอะไรก็ทำได้ทุกอย่างเลย![wa:10] "
1600106-149 = "[ns12] \"ละ... ล้อเล่นกันอีกแล้วเรอะ!?\"\n[ns13] \"อ๊าาา อย่าจับครูกินเลย~!\""
1600106-150 = "― อืม ว่ายังไงดีน้า~ ความรู้สึกแบบนี้...[wa:2180] "
1600106-151 = "― อืม ว่ายังไงดีน้า~ ความรู้สึกแบบนี้...[wa:2180] "
1600106-154 = "― ก็นะ... เป็นไงๆ!"
1600106-156 = "― แต่นแต๊น~! ฟื้นคืนชีพกลับมาเป็น... อาสึนะจังคนเดิมแล้ว![wa:330] "
1600106-159 = "― นี่ก็เป็นเพราะนายท่านช่วยเอาไว้สินะ ขอบคุณนะ![wa:950] "
1600106-162 = "― ฮิฮิ ว่าแล้วเชียว มีนายท่านอยู่ข้างๆ แบบนี้[wa:910] "
1600106-164 = "― ใจเต้นตึกตักๆ เลยละ"
1600106-167 = "― จะว่ายังไงดีนะ... คงติดเป็นนิสัยไปแล้วแน่ๆ![wa:100] "
1600106-170 = "― เพราะงั้นจากนี้ไป... ก็มาทำแบบนี้กันบ่อยๆ นะ... เข้าใจมั้ย?[wa:1830] "
1600106-173 = "― ฝากเนื้อฝากตัวด้วยนะ นายท่านของอาสึนะ![wa:10] "
1600106-176 = "(จากนั้น หลังจากไปส่งอาสึนะที่กลับมามีชีวิตชีวาแล้ว คุณครูก็กลับไปที่สำนักงาน)"

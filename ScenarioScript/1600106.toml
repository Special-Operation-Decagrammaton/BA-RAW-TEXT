[translation]
1600106-1 = "Asuna 404: Thought not Found"
1600106-2 = "Asuna seemed a bit off, so I wanted to check in on her."
1600106-6 = "It wasn't long before I spotted Asuna sitting on a bench in the distance."
1600106-10 = "(staaare)"
1600106-11 = "[s] \"...Asuna?\""
1600106-12 = "Oh... Uh..."
1600106-16 = "*gasp*"
1600106-17 = "Huh? What? Master?! Where did you come from?!"
1600106-18 = "[s1] \"Are you okay? Did something happen?\"\n[s2] \"You seem strange lately.\""
1600106-19 = "Oh, hahaha... It's no big deal. I'm just...like this sometimes."
1600106-20 = "Oh, hahaha... It's no big deal. I'm just...like this sometimes."
1600106-21 = "If anything, the strangest thing is that nothing's been going on..."
1600106-22 = "And when nothing's going on... Well, it's hard for me to focus on nothing."
1600106-23 = "[s3] \"Is it because of your animalistic instincts?\"\n[s4] \"If you stay unstimulated for too long...\"\n[s5] \"Your instincts get dulled, right?\""
1600106-24 = "Hmm. You think so?"
1600106-25 = "Hmm. You think so?"
1600106-26 = "Hmm. You think so?"
1600106-27 = "Sounds good enough to me... I think?"
1600106-28 = "Anyway, whenever I have nothing to think about, I just...don't think, I guess."
1600106-29 = "For example..."
1600106-33 = "(staaare)"
1600106-34 = "...Wait, what was I giving an example of?"
1600106-35 = "[s] \"Isn't this a bit dangerous?\""
1600106-36 = "Come on, don't worry so much. I'll be okay in no time. This barely ever happens..."
1600106-37 = "But when it does, I do need someone else's help."
1600106-38 = "Thankfully you came by, Master..."
1600106-42 = "Oh, Master?! Since when did you get here?"
1600106-44 = "...I was worried and suggested a change of scenery."
1600106-57 = "She was walking so unsteadily that I had to hold her hand to keep her from falling."
1600106-58 = "Even with that, Asuna kept stopping mid-walk,"
1600106-59 = "so it took almost an hour to walk only a few hundred meters."
1600106-63 = "Hmm... Um... I'm starting to feel...kind of..."
1600106-64 = "Oh... Where am I...?"
1600106-65 = "[s6] \"You are almost there.\"\n[s7] \"You are in front of your dorm.\""
1600106-66 = "I am...? Wait, you are? Master, why did you swing by...?"
1600106-67 = "I am...? Wait, you are? Master, why did you swing by...?"
1600106-68 = "Huh...? Are you suggesting I get some rest?"
1600106-69 = "Hmm...Seems like it..."
1600106-70 = "I'm not that tired, but..."
1600106-74 = "...Stairs?"
1600106-75 = "How do stairs work again? Like this...?"
1600106-79 = "Oh...? Huh...?"
1600106-80 = "[s8] \"Asuna!\"\n[s9] Catch her."
1600106-85 = "*thump*"
1600106-88 = "...Huh?"
1600106-89 = "What's going on..?"
1600106-93 = "I'm...on top of Master? Heehee..."
1600106-97 = "Master is...a very warm pillow..."
1600106-98 = "...Huh?"
1600106-99 = "[s] \"...Asuna?\""
1600106-103 = "Huh?!"
1600106-104 = "Wh-What?!"
1600106-105 = "Why am I on top of Master?"
1600106-106 = "...Oh, right. I fell? While on the stairs? And you caught me?"
1600106-107 = "...Hahaha! Nice catch! This is a first for me! How fun!"
1600106-108 = "Haha... Not very maid-like to be helped so much. If not for you, I would have fallen on the ground instead of on you."
1600106-109 = "...I'm not too heavy, right?"
1600106-110 = "[s10] \"Not at all.\"\n[s11] \"Good to see that you're feeling better, Asuna.\""
1600106-111 = "Really? Thank you, Master!"
1600106-112 = "Really? Thank you, Master!"
1600106-113 = "Falling is surprisingly fun when it's on someone else."
1600106-114 = "...Hmm."
1600106-115 = "I'm totally fine now!"
1600106-116 = "[s] \"You're back to the usual Asuna. I'm glad.\""
1600106-117 = "Ah!"
1600106-121 = "I am back! Completely back! Master! Look how smoothly I move! Look at my arms! My legs!"
1600106-128 = "Look! I can even jump! Like a frog! Or some other jumping thing!"
1600106-133 = "Jump powers, go!"
1600106-134 = "\"(...?)\""
1600106-135 = "\"(...!!!)\""
1600106-144 = "― Heehee, I got on top of Master![wa:920] "
1600106-146 = "― My body! It feels so light! Anything is possible![wa:1040] "
1600106-149 = "[ns12] \"A-Are you broken again?!\"\n[ns13] \"Ah! Don't eat me!\""
1600106-150 = "― Hmm... This feeling...?[wa:2780] "
1600106-151 = "― Hmm... This feeling...?[wa:2780] "
1600106-154 = "― Oh well, who cares!"
1600106-156 = "― Ta-da! Asuna is back and ready for action![wa:850] "
1600106-159 = "― This is all thanks to you, Master! Thank you![wa:950] "
1600106-162 = "― Haha, having Master by my side makes my heart go[wa:710] "
1600106-164 = "― wild!"
1600106-167 = "― I could really get used to this![wa:540] "
1600106-170 = "― So...let's just keep it up, okay?[wa:2870] "
1600106-173 = "― Best of luck to us both, my master![wa:10] "

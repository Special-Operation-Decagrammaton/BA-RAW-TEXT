[translation]
2600703-1 = "棉被裡的綾音"
2600703-2 = "（因為實在放不下心，而來到綾音的房間）"
2600703-9 = "（沒有任何回應）"
2600703-13 = "唔～嗯……茜香醬……？"
2600703-14 = "是前輩們要你來的嗎……？"
2600703-15 = "……抱歉……讓我再睡五分鐘……"
2600703-19 = "（………）"
2600703-23 = "……我不是說……讓我再睡五分鐘嗎～"
2600703-24 = "就算是茜香醬來叫我也沒用。我今天已經下定決心了。"
2600703-28 = "茜香醬……你今天有點難纏喔。"
2600703-29 = "我今天絕對不出去……茜香醬還是趕快放棄……"
2600703-33 = "[ns] 「……」"
2600703-35 = "[ns] 打開門走進去"
2600703-42 = "（進到房間，馬上看到床上有某種「物體」）"
2600703-48 = "[ns] 「…………」"
2600703-49 = "茜香醬……？"
2600703-50 = "就算是茜香醬……也沒辦法讓我從被窩裡出來……"
2600703-51 = "我要在裡頭睡個過癮……"
2600703-52 = "……這是屬於我的祕密基地。"
2600703-53 = "[s] 「…………」"
2600703-55 = "[ns] 搖晃整坨棉被"
2600703-59 = "呣呣……雖然搖得比平常溫柔，卻又有點大力……"
2600703-60 = "但這種程度可撼動不了我的基地……我就是要再睡一下……！"
2600703-61 = "[s] 更大力地搖晃棉被"
2600703-65 = "茜香醬……"
2600703-66 = "你今天就放棄吧……"
2600703-67 = "就算我脾氣再好……忍耐還是有極限的……"
2600703-68 = "[s] 用力搖晃棉被"
2600703-73 = "……"
2600703-74 = "茜……香……醬……！！"
2600703-75 = "夠了……！"
2600703-79 = "真是的，好好把人家說的話……！！"
2600703-82 = "……聽……進去……"
2600703-86 = "……啦…………？"
2600703-87 = "[s1] 「……綾音早安。」\n[s2] 「抱歉呢，我不是茜香醬。」"
2600703-88 = "咦……？"
2600703-89 = "咦……？"
2600703-90 = "咦……"
2600703-91 = "早，早安，老師……那個……老師為什麼會在這裡……"
2600703-92 = "咦……MomoTalk？"
2600703-96 = "……啊。"
2600703-97 = "那個……看來是我睡昏頭不小心按到了……"
2600703-101 = "那個……老師……"
2600703-102 = "所以說……這個……"
2600703-103 = "[s3] 「……差不多該出發囉。大家都在等著呢。」\n[s4] 「早餐已經弄好了，快去吃吧。」"
2600703-108 = "……好的。"

[translation]
2300402-1 = "職人之魂"
2300402-2 = "工程師部．作業室"
2300402-4 = "（為了領取拜託詠葉製作的筆筒，來到了工程師部）"
2300402-6 = "不對呢……這樣下去不行……"
2300402-7 = "[s1]「我來了唷，詠葉。」\n[s2]「筆筒如何？」"
2300402-8 = "啊啊，老師。歡迎。#n可以再等一下嗎？似乎會比想像的還要花時間……"
2300402-9 = "啊啊，老師。歡迎。#n可以再等一下嗎？似乎會比想像的還要花時間……"
2300402-10 = "稍微發生了點預料外的問題。"
2300402-11 = "[s]「沒關係，慢慢來就可以了唷。」"
2300402-12 = "謝謝。……雖然平常不會發生這種事，今天感覺機械的心情似乎不太好。"
2300402-13 = "我想應該不會2次都失敗……"
2300402-15 = "（一段時間後……）"
2300402-17 = "（輸出完成，請確認）"
2300402-19 = "……"
2300402-20 = "[s]「好厲害，比想像的做得還要漂亮呢。那就心懷感激的……」"
2300402-21 = "不行……！"
2300402-22 = "[s]「怎，怎麼了……？」"
2300402-23 = "我想做的筆筒才不是這種東西。"
2300402-24 = "請看這裡。切割處理得很隨便，層板的部分也沒有依照設計圖確實重現。"
2300402-25 = "而且，耐久性也沒有想像中好。這樣的話，肯定連22口徑的子彈都沒辦法彈開……"
2300402-26 = "[s3]「我，我認為沒問題啊……」\n[s4]「筆筒應該不需要防彈功能吧……？」"
2300402-27 = "不，即使老師那麼認為，我也沒辦法接受。#n這種半吊子和不良品沒兩樣。"
2300402-28 = "不，即使老師那麼認為，我也沒辦法接受。#n這種半吊子和不良品沒兩樣。"
2300402-29 = "而且，把這種不良品送給老師當禮物的事實讓其他學生知道的話，我就會羞恥的沒辦法在千年中走動……！"
2300402-30 = "[s]「是，是那樣嗎……」"
2300402-31 = "不過老師，請安心。我一定會製作出完美的筆筒給你看的──"
2300402-32 = "賭上工程師部的名義！"
2300402-34 = "（不過這之後也重覆失敗（？），即使如此詠葉也毫不妥協，繼續製作）"
2300402-36 = "（輸出完成，請確認）"
2300402-37 = "不行……！"
2300402-38 = "[s]「這次是哪裡不行？」"
2300402-39 = "這裡。表面有著細微的傷痕。"
2300402-40 = "果然光靠熔融沉積成型法有極限嗎……"
2300402-41 = "重做，再一次從製作方法開始重新思考吧。"
2300402-42 = "[s]「那樣就好了差不多想要筆筒了呢……」"
2300402-45 = "（這之後，再經過了10個以上的反覆試驗的結果，終於做出詠葉滿足的東西了）"

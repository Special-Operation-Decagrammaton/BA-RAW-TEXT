[translation]
2300402-1 = "#title;장인 정신"
2300402-2 = "#place;엔지니어 동아리 작업실"
2300402-3 = "#wait;2000"
2300402-4 = "#na;우타하에게 제작을 부탁한 연필꽂이를 받으러 엔지니어부에 찾아갔다."
2300402-5 = "#wait;1500"
2300402-6 = "3;우타하;04;아니야…… 이대로는 안 돼…….\n#3;a\n#3;stiff\n#3;em;[속상함]"
2300402-7 = "[s1] \"나 왔어, 우타하.\"\n[s2] \"연필꽂이는 완성됐어?\""
2300402-8 = "3;우타하;02;아, 선생님 왔구나. #n잠시만 기다려줘. 조금 더 시간이 걸릴 것 같아.\n#3;em;[반응]"
2300402-9 = "3;우타하;02;아, 선생님 왔구나. #n잠시만 기다려줘. 조금 더 시간이 걸릴 것 같아.\n#3;em;[반응]"
2300402-10 = "3;우타하;04;예상하지 못했던 약간의 문제가 발견되었거든."
2300402-11 = "[s] \"괜찮아. 천천히 해.\""
2300402-12 = "3;우타하;99;……응. 평소에는 이런 일이 없었는데, 오늘따라 기계의 상태가 나쁜 것 같아.\n#3;em;…"
2300402-13 = "3;우타하;06;설마 두 번이나 실수를 하지는 않겠지……?"
2300402-14 = "#all;hide"
2300402-15 = "#na;잠시 후……."
2300402-16 = "#wait;2000"
2300402-17 = "#na;출력이 완료되었습니다. 제품을 확인해 주십시오."
2300402-18 = "#wait;1500"
2300402-19 = "3;우타하;01;…….\n#3;a\n#3;em;…"
2300402-20 = "[s] \"오, 생각보다 깔끔하고 예쁘게 잘 나왔네. 이만하면…….\""
2300402-21 = "3;우타하;05;이게 아니야!\n#3;shake\n#bgshake"
2300402-22 = "[s] \"가, 갑자기 왜 그래?\""
2300402-23 = "3;우타하;05;내가 만들려고 했던 연필꽂이는 이게 아니야!\n#3;jump"
2300402-24 = "3;우타하;05;이 연필꽂이 좀 봐. 마감처리도 엉성하고, 적층된 소재가 도면상의 곡면을 제대로 구현하지도 못했잖아!\n#3;m4"
2300402-25 = "3;우타하;05;게다가 내구성이 생각했던 것보다 훨씬 약해! 이 정도의 내구성으로는 22구경 탄환도 제대로 튕겨내지 못할 거라고!\n#3;em;[!]\n#3;hophop"
2300402-26 = "[s3] \"나는 괜찮다고 생각하는데…….\"\n[s4] \"연필꽂이에 방탄 기능까지는 필요 없는데…….\""
2300402-27 = "3;우타하;05;아니. 선생님이 용납해도 내가 용납못해. #n이런 어중간한 물건은 불량품이나 마찬가지야!\n#3;m3\n#3;em;[반응]"
2300402-28 = "3;우타하;05;아니. 선생님이 용납해도 내가 용납못해. #n이런 어중간한 물건은 불량품이나 마찬가지야!\n#3;m3\n#3;em;[반응]"
2300402-29 = "3;우타하;06;그리고 이런 불량품을 선생님께 선물했다는 사실이 다른 학생들에게 알려진다면, 나는 부끄러워서 고개도 들지 못하게 되겠지…….\n#3;stiff"
2300402-30 = "[s] \"나는 정말 괜찮은데…….\""
2300402-31 = "3;우타하;99;걱정 마, 선생님. 엔지니어부의 명예를 걸고 이번에야말로 진짜 완벽한 연필꽂이를 만들어낼 테니까—.\n#3;greeting"
2300402-32 = "3;우타하;05;조금만 더 기다려 줘!\n#3;em;[반응]\n#3;jump"
2300402-33 = "#all;hide"
2300402-34 = "#na;하지만 이후로도 우타하의 엄격한 평가는 계속되었다."
2300402-35 = "#all;hide"
2300402-36 = "#na;출력이 완료되었습니다. 제품을 확인해 주십시오."
2300402-37 = "3;우타하;05;이것도 아니야!\n#3;shake"
2300402-38 = "[s] \"……이번에는 또 왜?\""
2300402-39 = "3;우타하;05;이것 좀 봐! 지지대를 제거하는 과정에서 표면에 미세한 흠집이 생겼잖아!\n#3;m4"
2300402-40 = "3;우타하;99;역시 압출식 프린터로는 한계가 있는 건가……."
2300402-41 = "3;우타하;05;다시! 처음부터 다시 출력하는 거야!\n#3;m3\n#3;em;[!]"
2300402-42 = "[s] \"불량품이라도 상관없으니까 이제 제발 끝내줘…….\""
2300402-43 = "#wait;100"

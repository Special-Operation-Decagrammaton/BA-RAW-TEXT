[translation]
2300402-1 = "Craftsmanship"
2300402-2 = "Engineering Department Workshop"
2300402-4 = "I went to the Engineering Department to pick up the pencil holder I asked Utaha to make."
2300402-6 = "No... This won't do..."
2300402-7 = "[s1] \"I'm here, Utaha.\"\n[s2] \"Is the pencil holder ready?\""
2300402-8 = "Ah, Sensei, you're here. Please wait, I need a little more time."
2300402-9 = "Ah, Sensei, you're here. Please wait, I need a little more time."
2300402-10 = "I've come across a small, unanticipated problem."
2300402-11 = "[s] \"It's fine. Take your time.\""
2300402-12 = "...Sure. Normally this doesn't happen, but the machine seems to be in poor condition today."
2300402-13 = "I hope we don't have the same issue..."
2300402-15 = "Soon after..."
2300402-17 = "It's complete. Please inspect the finished product."
2300402-19 = "..."
2300402-20 = "[s] \"Wow, it's better than I expected. This should...\""
2300402-21 = "That's not it!"
2300402-22 = "[s] \"What's the matter?\""
2300402-23 = "That's not the pencil holder I was trying to make!"
2300402-24 = "Look at it. The finish is sloppy, and the lamination isn't curved like on the blueprint!"
2300402-25 = "And the durability is too weak! This wouldn't even be able to deflect a .22 caliber!"
2300402-26 = "[s3] \"I think it's fine...\"\n[s4] \"I don't need a pencil holder to be bulletproof...\""
2300402-27 = "No. Even if it's fine with you, it's not fine with me. This is a defective product!"
2300402-28 = "No. Even if it's fine with you, it's not fine with me. This is a defective product!"
2300402-29 = "I'd be so embarrassed if all the other students found out I gave you a defective gift..."
2300402-30 = "[s] \"Really, it's okay...\""
2300402-31 = "Don't worry, Sensei. I'll create a truly perfect pencil holder for the honor of the Engineering Department."
2300402-32 = "Please wait just a little longer!"
2300402-34 = "But with Utaha's strict standards..."
2300402-36 = "It's complete. Please inspect the finished product."
2300402-37 = "This isn't any good either!"
2300402-38 = "[s] \"...Now what?\""
2300402-39 = "Look at this! There's a mark where we removed the support!"
2300402-40 = "I guess there's a limit to extrusion printers..."
2300402-41 = "Again! We'll print it again!"
2300402-42 = "[s] \"I don't care if it's defective. Please stop this...\""
2300402-45 = "After that, it took another ten pencil holders before Utaha was satisfied."

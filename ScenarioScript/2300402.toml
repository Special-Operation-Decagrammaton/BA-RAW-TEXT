[translation]
2300402-1 = "จิตวิญญาณของช่างฝีมือ"
2300402-2 = "ห้องปฏิบัติการชมรมวิศวกรรม"
2300402-4 = "ไปที่ชมรมวิศวกรรมเพื่อไปรับที่ใส่ดินสอที่ขอให้อุทาฮะทำให้"
2300402-6 = "ไม่ได้... แบบนี้ไม่ได้..."
2300402-7 = "[s1] \"ครูมาแล้วอุทาฮะ\"\n[s2] \"ทำที่ใส่ดินสอเสร็จมั้ย?\""
2300402-8 = "อ่า คุณครูมาแล้วสินะ#nช่วยรอก่อนนะ ฉันขอเวลาอีกนิดนึง"
2300402-9 = "อ่า คุณครูมาแล้วสินะ#nช่วยรอก่อนนะ ฉันขอเวลาอีกนิดนึง"
2300402-10 = "ฉันเจอกับปัญหาที่ไม่ได้คิดไว้นิดหน่อยน่ะ"
2300402-11 = "[s] \"ไม่เป็นไรหรอก ไม่ต้องรีบนะ\""
2300402-12 = "...อืม ปกติแล้วจะไม่ค่อยเกิดเรื่องแบบนี้ขึ้นนะ แต่วันนี้ดูเหมือนว่าเครื่องจักรจะไม่อยู่#nในสภาพที่พร้อมใช้งานสักเท่าไหร่เลย"
2300402-13 = "ฉันหวังว่าปัญหาเดิมจะไม่เกิดขึ้นอีกนะ..."
2300402-15 = "หลังจากนั้นไม่นาน..."
2300402-17 = "การทำที่ใส่ดินสอเสร็จสิ้นแล้ว โปรดตรวจสอบสินค้า"
2300402-19 = "......."
2300402-20 = "[s] \"โอ๊ะ มันดูดีกว่าที่ครูคิดไว้อีกนะ นี่น่าจะ...\""
2300402-21 = "แบบนี้ไม่ได้!"
2300402-22 = "[s] \"กะ.. เกิดอะไรขึ้นเหรอ?\""
2300402-23 = "นี่ไม่ใช่ที่ใส่ดินสอที่ฉันต้องการจะสร้างออกมา!"
2300402-24 = "ดูที่ใส่ดินสอนี่สิ งานออกมาชุ่ยสุดๆ วัสดุที่เคลือบก็ไม่โค้งเหมือนกับในพิมพ์เขียวด้วย!"
2300402-25 = "และความทนทานก็แย่กว่าที่ฉันคิดไว้อีก! แบบนี้มันใช้สะท้อนกระสุนขนาด .22 ไม่ได้ด้วยซ้ำ!"
2300402-26 = "[s3] \"ครูคิดว่าไม่เป็นไรหรอกนะ...\"\n[s4] \"ครูไม่ได้ต้องการให้ที่ใส่ดินสอเป็นที่กันกระสุนน่ะ...\""
2300402-27 = "ไม่ได้ ถึงคุณครูจะบอกว่าไม่เป็นอะไร แต่สำหรับฉันแล้วมันไม่โอเคเลย นี่คือสิ่งของที่ใช้งานไม่ได้!"
2300402-28 = "ไม่ได้ ถึงคุณครูจะบอกว่าไม่เป็นอะไร แต่สำหรับฉันแล้วมันไม่โอเคเลย นี่คือสิ่งของที่ใช้งานไม่ได้!"
2300402-29 = "ฉันคงรู้สึกอับอายมาก ถ้านักเรียนคนอื่นรู้ว่าฉันให้ของขวัญที่มีตำหนิกับคุณครู..."
2300402-30 = "[s] \"ครูไม่มีปัญหาอะไรจริงๆ นะ...\""
2300402-31 = "ไม่ต้องห่วงคุณครู ฉันจะสร้างที่ใส่ดินสอที่สมบูรณ์แบบเพื่อเป็นเกียรติยศให้กับชมรมวิศวกรรม"
2300402-32 = "ช่วยรอสักครู่ก่อนนะ!"
2300402-34 = "แต่ด้วยมาตรฐานสุดเข้มงวดของอุทาฮะแล้ว..."
2300402-36 = "การทำที่ใส่ดินสอเสร็จสิ้นแล้ว โปรดตรวจสอบสินค้า"
2300402-37 = "นี่มันก็ใช้ไม่ได้เหมือนกัน!"
2300402-38 = "[s] \"คราวนี้อะไรอีกเหรอ...?\""
2300402-39 = "ดูนี่สิ! มีรอยขีดข่วนในจุดที่เราเอาส่วนรองรับออกไปด้วย!"
2300402-40 = "เครื่องพิมพ์แบบหัวฉีดนี่คงมีข้อจำกัดจริงๆ..."
2300402-41 = "เอาใหม่! ฉันจะลองดูอีกที!"
2300402-42 = "[s] \"มันจะมีตำหนิครูก็ไม่ว่าหรอก แต่ช่วยหยุดทีเถอะ...\""
2300402-45 = "หลังจากนั้น อุทาฮะก็ได้ทำที่ใส่ดินสอขึ้นมาอีกสิบชิ้นจนกว่าเธอจะพอใจ"

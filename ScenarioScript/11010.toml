[translation]
11010-1 = "Episode 1;Welcome to the Foreclosure Task Force!"
11010-2 = "Schale Executive Office"
11010-3 = "Good morning, Sensei!"
11010-4 = "A lot of people are starting to talk about Schale, and we've received letters from other students asking for help."
11010-5 = "That's a great sign! It means there's a lot of work for us to do!"
11010-6 = "Um, but...there's this one letter we got."
11010-7 = "I think you should take a look."
11010-8 = "[s] Read the letter."
11010-11 = "To the advisor of the Federal Investigation Club:"
11010-13 = "Hello. My name is Okusora Ayane, and I'm a student at Abydos High School."
11010-15 = "I'm writing this letter because I want to ask for your help."
11010-17 = "Our academy is being harassed."
11010-19 = "One of the local gangs has been tormenting us."
11010-21 = "Read the next page."
11010-23 = "It's a long story, but we think..."
11010-25 = "...this gang is after the school building itself."
11010-27 = "We are doing our best to stop them."
11010-29 = "But it's only a matter of time before we run out of ammunition and supplies."
11010-31 = "At this rate, the school will fall to them."
11010-33 = "Read the last page."
11010-35 = "That's why I'm writing to ask for your help."
11010-37 = "Can you please help us, Sensei?"
11010-40 = "Hmm... Abydos High School, huh?"
11010-41 = "It used to have a large, thriving district, but it fell on hard times due to climate change."
11010-42 = "The district was so big that people would even get lost in the middle of town!"
11010-43 = "Heehee. That must sound ridiculous. How does someone get lost in the middle of modern civilization?"
11010-44 = "I'm sure it's just an exaggeration."
11010-45 = "Anyway, I can't believe the academy is being bullied by a gang. It sounds pretty serious..."
11010-46 = "I wonder what brought this on."
11010-47 = "[s] \"I need to go to Abydos.\""
11010-48 = "You want to head there right away? So, this is what a true adult is like!"
11010-49 = "All right, then! Good luck!"
11010-51 = "I eventually arrived in Abydos..."
11010-52 = "...but got lost in the middle of the district. It took days to find the school."
11010-54 = "Next Episode;First Day at Abydos"

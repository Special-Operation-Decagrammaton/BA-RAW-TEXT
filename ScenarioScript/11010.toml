[translation]
11010-1 = "第1話;対策委員会へようこそ！"
11010-2 = "シャーレ・執務室"
11010-3 = "おはようございます、先生！"
11010-4 = "ここ数日間、シャーレに関する噂もたくさん広まってるみたいですし、他の生徒達から助けを求める手紙も届いています。"
11010-5 = "良い兆候です！私たちの活躍が始まるということですから！"
11010-6 = "ですがその中に……ちょっと不穏な、こんな手紙がありまして。"
11010-7 = "これは先生に一度読んでもらった方が良いかなと。"
11010-8 = "[s] 手紙を読む。"
11010-11 = "連邦捜査部の先生へ"
11010-13 = "こんにちは。私はアビドス高等学校の[ruby=おくそら]奥空[/ruby]アヤネと申します。"
11010-15 = "今回どうしても先生にお願いしたいことがありまして、#nこうしてお手紙を書きました。"
11010-17 = "単刀直入に言いますと、今、私たちの学校は追い詰められています。"
11010-19 = "それも、地域の暴力組織によってです。"
11010-21 = "（2枚目を読む）"
11010-23 = "こうなってしまった事情は、かなり複雑ですが……。"
11010-25 = "どうやら、私たちの学校の校舎が狙われているようです。"
11010-27 = "今はどうにか食い止めていますが、"
11010-29 = "そろそろ弾薬などの補給が底を突いてしまいます……。"
11010-31 = "このままでは、暴力組織に学校を占領されてしまいそうな状況です。"
11010-33 = "（3枚目を読む）"
11010-35 = "それで、今回先生にお願いできればと思いました。"
11010-37 = "先生、どうか私たちの力になっていただけませんか？"
11010-40 = "うーん……アビドス高等学校ですか……。"
11010-41 = "昔はとても大きい自治区でしたけど、気候の変化で街が厳しい状況になっていると聞きました。"
11010-42 = "どれほど大きいかというと、街のど真ん中で道に迷って遭難する人がいるぐらいだそうです！"
11010-43 = "あはは、まさか、そんなことあるんでしょうか……？いくらなんでも街のど真ん中で遭難だなんて……。"
11010-44 = "さすがにちょっとした誇張だと思いますが……。"
11010-45 = "それより学校が暴力組織に攻撃されているなんて……ただ事ではなさそうですが……。"
11010-46 = "何があったんでしょうか？"
11010-47 = "[s] アビドスに出張する。"
11010-48 = "すぐに出発ですか！？さすが、大人の行動力！"
11010-49 = "かしこまりました！すぐに出発しましょう！"
11010-51 = "（そしてアビドスの自治区に着いたものの、）"
11010-52 = "（学校が見つからず何日も迷い続け、街のど真ん中で道に迷って遭難してしまった）"
11010-54 = "次回;アビドスでの初日"

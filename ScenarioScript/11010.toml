[translation]
11010-1 = "第1話;歡迎來到對策委員會！"
11010-2 = "夏萊．辦公室"
11010-3 = "早安，老師！"
11010-4 = "這幾天，夏萊的傳聞似乎傳得滿天飛了，還有些學生寄求助信過來。"
11010-5 = "這真是好兆頭呢！這就代表我們的活躍要開始了！"
11010-6 = "不過其中也有……像這種有點不尋常的信。"
11010-7 = "這請老師先讀過一遍比較好。"
11010-8 = "[s] 讀信"
11010-11 = "給聯邦搜查部的顧問老師："
11010-13 = "您好，我是「阿拜多斯高中」的奥空綾音。"
11010-15 = "有件事無論如何都想拜託老師，所以寫了這封信。"
11010-17 = "單刀直入地說，現在我們的學園被逼到了絕境。"
11010-19 = "對方是當地的暴力組織。"
11010-21 = "（閱讀第二頁）"
11010-23 = "雖然變成這樣的原因很複雜……"
11010-25 = "但對方似乎盯上了我們學校的校舍。"
11010-27 = "儘管目前設法阻止了對方的攻勢，"
11010-29 = "然而彈藥等等的補給品都即將見底……"
11010-31 = "再這樣下去，學校很可能會被暴力組織占領。"
11010-33 = "（閱讀第三頁）"
11010-35 = "因此，希望能請求老師的協助。"
11010-37 = "老師，可以請您助我們一臂之力嗎？"
11010-40 = "嗯……阿拜多斯高中嗎……"
11010-41 = "聽說那裡本來是個很大的自治區，#n可是因為氣候變化的緣故，城鎮的狀況變得相當嚴峻。"
11010-42 = "要說有多大的話，好像大到有人會在城鎮正中央迷路喔！"
11010-43 = "啊哈哈，這真的有可能嗎……？#n再怎麼說在城鎮正中央迷路也有點……"
11010-44 = "我認為這多少有點誇張……"
11010-45 = "不過學校居然會被暴力組織攻擊……聽起來似乎不太單純……"
11010-46 = "究竟發生了什麼事呢？"
11010-47 = "[s] 到阿拜多斯出差"
11010-48 = "我們要立刻出發嗎！？不愧是大人的行動力！ "
11010-49 = "我明白了！立刻出發！"
11010-51 = "（雖然抵達了阿拜多斯自治區……）"
11010-52 = "（但徘徊好幾天都找不到學校，在城鎮正中央迷路了）"
11010-54 = "下一話;在阿拜多斯的第一天"

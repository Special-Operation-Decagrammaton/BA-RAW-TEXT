[translation]
11010-1 = "ตอนที่ 1;ขอต้อนรับสู่คณะกรรมการแผนงาน!"
11010-2 = "สำนักงานชาเล่ต์"
11010-3 = "อรุณสวัสดิ์ค่ะคุณครู!"
11010-4 = "ในช่วงสองสามวันนี้มีข่าวลือเกี่ยวกับชาเล่ต์แพร่ออกไปมากเลยค่ะ แล้วก็ยังมีจดหมายขอความช่วย#nเหลือจากนักเรียนคนอื่นมาด้วย"
11010-5 = "นี่ถือเป็นสัญญาณที่ดีเลยค่ะ แสดงว่างานที่เราจะต้องทำเยอะแยะมากมายได้เริ่มขึ้นแล้วค่ะ!"
11010-6 = "อืม... แต่ว่าจากจดหมายทั้งหมดที่เราได้รับมา มีจดหมายแบบนี้มาด้วยค่ะ"
11010-7 = "หนูว่าคุณครูควรลองอ่านดูนะคะ"
11010-8 = "[s] อ่านจดหมาย"
11010-11 = "ถึงคุณครูที่ปรึกษาฝ่ายสอบสวน"
11010-13 = "สวัสดีค่ะ ฉันคือโอคุโซระ อายาเนะ จาก <โรงเรียนมัธยมอะบิดอส>"
11010-15 = "ถึงฉันจะรู้สึกละอายใจที่ต้องส่งจดหมายถึงคุณครู แต่ฉันมีเรื่องอยากขอความช่วยเหลือค่ะ"
11010-17 = "ฉันขอเข้าเรื่องเลยนะคะ ตอนนี้โรงเรียนของฉันกำลังถูกรังแกอยู่ค่ะ"
11010-19 = "กลุ่มอันธพาลในพื้นที่กำลังรังแกพวกเราอยู่ค่ะ"
11010-21 = "(อ่านหน้าต่อไป)"
11010-23 = "จริงๆ สถานการณ์ค่อนข้างซับซ้อน..."
11010-25 = "แต่ฉันคิดว่ากลุ่มอันธพาลพวกนี้กำลังจะยึดอาคารเรียนของเราค่ะ"
11010-27 = "ตอนนี้พวกเราพยายามที่จะขัดขวางเอาไว้"
11010-29 = "แต่กระสุนและเสบียงของเราก็เหลือน้อยลงทุกที..."
11010-31 = "ขืนปล่อยไว้แบบนี้ กลุ่มอันธพาลต้องมายึดโรงเรียนของเราไปได้แน่ค่ะ"
11010-33 = "(อ่านหน้าสุดท้าย)"
11010-35 = "ฉันก็เลยเขียนมาขอความช่วยเหลือแบบนี้ค่ะ"
11010-37 = "คุณครูคะ คุณครูช่วยพวกเราหน่อยได้มั้ยคะ?"
11010-40 = "อืม... โรงเรียนมัธยมอะบิดอส..."
11010-41 = "หนูเคยได้ยินมาว่าเดิมทีอะบิดอสเคยเป็นเขตปกครองตัวเองขนาดใหญ่ แต่ก็ต้องประสบเรื่องยาก#nลำบากเพราะการเปลี่ยนแปลงของสภาพภูมิอากาศค่ะ"
11010-42 = "เขตนั้นกว้างใหญ่ขนาดที่มีคนหลงทางและเกิดอุบัติเหตุในใจกลางเมืองได้เลยนะคะ!"
11010-43 = "ฮิฮิ แต่หนูก็ไม่รู้หรอกค่ะว่าจะมีคนหลงทางในใจกลางเมืองได้แบบนั้นจริงๆ หรือเปล่า... "
11010-44 = "หรืออาจจะเป็นแค่เรื่องที่เอาไว้โอ้อวดเขตอื่นก็ได้?"
11010-45 = "แต่ถ้าโรงเรียนถูกกลุ่มอันธพาลมารังแกแบบนี้... ไม่น่าใช่เรื่องธรรมดาแล้วนะคะ"
11010-46 = "เกิดเรื่องอะไรขึ้นกันแน่นะ?"
11010-47 = "[s] ไปที่อะบิดอส"
11010-48 = "คุณครูจะไปที่นั่นเลยเหรอคะ?! นี่สินะพลังของผู้ใหญ่!"
11010-49 = "เข้าใจแล้วค่ะ รีบออกเดินทางกันเถอะค่ะ!"
11010-51 = "(มาถึงเขตปกครองอะบิดอสแล้ว)"
11010-52 = "(ผ่านไปสองสามวันแล้ว... แต่คุณครูก็ยังหาโรงเรียนไม่เจอ และหลงทางอยู่กลางเมือง)"
11010-54 = "ตอนต่อไป;วันแรกในอะบิดอส"

1011706-41 = "― [log=히카리]Here, here... [/log][wa:1900] "
1011706-44 = "[ns] \"Wh-Where...? Towards the back?\""
1011706-46 = "― [log=히카리]Yes... Inside... [/log][wa:1900] "
1011706-47 = "― [log=히카리]Teeth...hurt...[/log][wa:4090] "
1011706-50 = "― [log=히카리]Can you see, Sensei?  [/log][wa:960] "

[translation]
1011706-1 = "Girl in Pain"
1011706-3 = "ฮิคาริมาแล้ว"
1011706-4 = "[s] \"วันนี้ดูสดใสเลยนะ ฮิคาริ\""
1011706-5 = "อื้อ รู้สึกดีสุดๆ ไปเลย"
1011706-6 = "ฮิคาริอยากเล่นกับคุณครู"
1011706-7 = "ยุ่งอยู่หรือเปล่า? งานเยอะมั้ย?"
1011706-8 = "[s] \"เยอะ~ มาก~~\""
1011706-9 = "ง่า"
1011706-10 = "[s] \"แต่ครูรู้ว่าจะมา ก็เลยทำงานวันนี้เสร็จแล้ว\""
1011706-11 = "ว้าว"
1011706-12 = "คุณครูเก่งชะมัด ลูบหัว ลูบหัว"
1011706-13 = "งั้นไปซื้อขนมกินกันเถอะ ฮิคาริมีเงินเพียบเลย"
1011706-14 = "[s] \"เอางั้นเหรอ? ถือว่าไปสูดอากาศด้วยละกัน\""
1011706-16 = "(แล้วคุณครูก็ออกไปข้างนอกกับฮิคาริ)"
1011706-19 = "นี่ไงๆ ดังโงะไอศกรีม"
1011706-23 = "ว้าว ลูกอมป๊อปป๊อปรสใหม่ ชื่อรสอะไรมาทายกัน"
1011706-25 = "(คุณครูกินขนมกับฮิคาริ พอกลับมาพระอาทิตย์ก็ตกแล้ว)"
1011706-29 = "โอย กินไปเยอะมากเลย"
1011706-30 = "ท้องจะแตกแล้ว ในปากก็ยังหวานอยู่ด้วย"
1011706-31 = "[s] \"วันนี้กินอะไรหวานๆ ไปไม่น้อยเลยนะ...\""
1011706-32 = "โอ๊ย"
1011706-33 = "[s] \"เป็นอะไรน่ะ ฮิคาริ?\""
1011706-34 = "..."
1011706-35 = "แง... ปวดฟัน..."
1011706-36 = "ปวดสาหัส... ปวดแบบคาดไม่ถึง..."
1011706-37 = "[s] \"วะ... ไหวหรือเปล่า?\""
1011706-38 = "คุณครู มาดูให้หน่อย"
1011706-41 = "― [log=히카리]ตรงนี้ ตรงนี้ [/log][wa:1900] "
1011706-44 = "[ns] \"นะ... ไหน...? ข้างในเหรอ?\""
1011706-46 = "― [log=히카리]อื้อ~...... ปวดฟัน[/log][wa:1860] "
1011706-47 = "― [log=히카리]ซี่ข้างใน[/log][wa:4330] "
1011706-50 = "― [log=히카리]คุณครู เห็นหรือเปล่า?  [/log][wa:920] "
1011706-53 = "[ns] \"ดูภายนอกก็ปกตินะ...\""
1011706-55 = "― [log=히카리]ฟันกรามทางขวาน่ะ[/log][wa:3410] "
1011706-58 = "― [log=히카리]ฮือ ตรงนั้นมัน... ปวดจี๊ดๆ [/log][wa:2670] "
1011706-61 = "[ns1] \"อ๊ะ... อย่าไปจับนะ...!\"\n[ns2] \"ถ้าไปแตะในปากอย่างไม่ระวัง อาจติดเชื้อได้...\""
1011706-64 = "― [log=히카리]แง ทำยังไงดี ฮิคาริต้องยกธงขาวเหรอ?[/log][wa:4360] "
1011706-65 = "― [log=히카리]ช่วยด้วย คุณครู [/log][wa:5460] "
1011706-71 = "[ns] \"น่าจะเพราะกินขนมหวานๆ มากเกินไปนะ...\""
1011706-72 = "ง่า... โดนความโลภเล่นงานเข้าให้แล้ว..."
1011706-73 = "ความสุขที่แลกมาด้วยชีวิต สำนึกผิดแล้ว..."
1011706-74 = "[s] \"ก่อนนอนแปรงฟันให้สะอาด แล้วตอนเช้าก็ไปหาหมอฟันนะ\""
1011706-75 = "หมอฟัน เวรี่ เวรี่ แดนเจอรัส"
1011706-76 = "ฮิคาริไม่อยากไปหาหมอฟัน"
1011706-77 = "[s3] \"งั้นจะทนปวดฟันไปตลอดเหรอ?\"\n[s4] \"ถ้าอยากหายปวดก็ต้องไปหาหมอฟันสิ!\""
1011706-80 = "ฮือ..."
1011706-81 = "ฮือออ..."
1011706-82 = "ฮิคาริขออยู่ไปนานๆ ดีกว่า..."
1011706-83 = "อยากอยู่เล่นสนุกกับคุณครูอีก"
1011706-84 = "ยอมไปหาหมอฟันก็ได้"
1011706-85 = "[s] \"ดีมากเลย ฮิคาริ\""
1011706-87 = "(วันต่อมาคุณครูพาฮิคาริไปหาหมอฟันและได้รับการดูแลจนหายดี)"
1011706-88 = "(ระหว่างทำฟัน คุณครูก็ช่วยจับมือฮิคาริไว้แน่น)"

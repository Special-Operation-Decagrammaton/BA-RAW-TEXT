1011706-16 = "And so, I headed out with Hikari."
1011706-19 = "Oh, here-here. Dango ice cream."
1011706-23 = "Whoa. New Pop-Pop Candy. Gotta try it."
1011706-25 = "By the time we got back from our snack safari, the sun was almost down."
1011706-29 = "Ugh. Too many sweets."

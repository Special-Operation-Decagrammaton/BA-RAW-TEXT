[translation]
1011706-1 = "Girl in Pain"
1011706-3 = "光登場～"
1011706-4 = "[s]「你看起來氣色很好呢，光。」"
1011706-5 = "嗯～狀態絕佳～"
1011706-6 = "光想跟老師玩～"
1011706-7 = "你在忙嗎～？工作多不多～？"
1011706-8 = "[s]「超～多～的～」"
1011706-9 = "嗚嗚～"
1011706-10 = "[s]「開玩笑的！今天的工作已經提早完成了哦。」"
1011706-11 = "哇～"
1011706-12 = "老師好棒～幫你拍拍～"
1011706-13 = "那去買點心吃吧～光的錢包很厚～"
1011706-14 = "[s]「好啊，順便去透透氣吧。」"
1011706-16 = "（於是便和光一起出門）"
1011706-19 = "這個這個～糰子冰淇淋～"
1011706-23 = "哦～是跳跳糖的新口味，超好奇～"
1011706-25 = "（就這樣和光盡情買了一堆點心，回來的時候太陽已經快下山了）"
1011706-29 = "嗚嗚～吃太多了～"
1011706-30 = "肚子好飽，嘴巴好甜～"
1011706-31 = "[s]「的確吃了很多甜食呢……」"
1011706-32 = "啊～"
1011706-33 = "[s]「怎麼了，光？」"
1011706-34 = "……"
1011706-35 = "嗚嗚……牙痛發作了……"
1011706-36 = "是致命傷……被痛苦突襲了～"
1011706-37 = "[s]「你，你沒事吧？」"
1011706-38 = "老師你看～"
1011706-41 = "― [log=히카리]這裡，這裡～[/log][wa:2220] "
1011706-44 = "[ns]「哪，哪裡……？是裡面嗎？」"
1011706-46 = "― [log=히카리]沒錯～裡面～[/log][wa:2340] "
1011706-47 = "― [log=히카리]牙齒好痛～[/log][wa:4490] "
1011706-50 = "― [log=히카리]老師～有看到嗎～？[/log][wa:1480] "
1011706-53 = "[ns] 「外觀看起來沒有問題……」"
1011706-55 = "― [log=히카리]右邊的臼齒～在痛～[/log][wa:3690] "
1011706-58 = "― [log=히카리]嗚嗚，那裡……刺刺的～[/log][wa:3310] "
1011706-61 = "[ns1]「啊……我突然想到……！」\n[ns2]「隨便碰口腔內側會有感染的風險……」"
1011706-64 = "― [log=히카리]咦～那怎麼辦～是光的死亡Flag嗎～？[/log][wa:5000] "
1011706-65 = "― [log=히카리]幫幫我～老師～[/log][wa:5820] "
1011706-71 = "[ns]「可能是吃太多甜食的關係……」"
1011706-72 = "嗚嗚～輸給慾望了……"
1011706-73 = "用生命換來的快樂～好後悔……"
1011706-74 = "[s]「今天睡覺之前好好刷牙，天亮後再去看牙醫吧。」"
1011706-75 = "牙醫～VERY VERY DANGEROUS～"
1011706-76 = "光討厭牙醫～"
1011706-77 = "[s3]「那樣會繼續痛下去哦？」\n[s4]「給牙醫看一下很快就能解決了！」"
1011706-80 = "嗚嗚～"
1011706-81 = "嗚嗚嗚……"
1011706-82 = "光想活久一點……"
1011706-83 = "還想跟老師玩～"
1011706-84 = "去看牙醫吧～"
1011706-85 = "[s]「這樣想就對了，光。」"
1011706-87 = "（於是隔天便和光一起去牙醫診所接受治療）"
1011706-88 = "（並且在光接受治療的期間，緊緊握住了他的手）"

[translation]
102050-1 = "ตอนที่ 5;เตรียมปฏิบัติการ 3"
102050-2 = "ตรวจสอบการสแตนด์บายที่หอคอยทุกแห่งแล้ว "
102050-3 = "ฉันขอสรุปภาพรวมของปฏิบัติการ <ปฏิบัติการบุกยึดหอคอยแห่งคำลวง> อีกครั้งค่ะ "
102050-4 = "อย่างแรก กองกำลังโจมตีหอคอยจะเข้าไปในระยะที่สามารถโจมตีผู้พิทักษ์ของแต่ละที่ได้ค่ะ"
102050-5 = "นั่นคือ เราต้องหาเส้นทางโจมตีตั้งแต่หอคอยที่ 1 ไปจนถึงหอคอยที่ 6 และในเส้นทางนั้น ก็จะมีการ#nปะทะเพื่อเจาะแนวป้องกันของศัตรูค่ะ"
102050-6 = "...... ค่ะ! อย่างที่สอง กองกำลังป้องกันในแต่ละเขตปกครองตนเองจะคอยคุ้มกันเขตปกครองตนเอง#nจนกว่าการทำลายหอคอยจะเสร็จสิ้นค่ะ"
102050-7 = "ในขณะที่เราเริ่มบุก ศัตรูที่ออกมาจากหอคอยทั่วคิโวทอสก็น่าจะเริ่มจู่โจมเราเหมือนกันค่ะ"
102050-8 = "กองกำลังป้องกันต้องเตรียมพร้อมสำหรับการโจมตีจากทุกทิศทาง... ไม่ว่าจะในเกเฮนน่า มิลเลเนียม เฮียกคิยาโค เรดวินเทอร์ ซานไห่จิง ทรีนิตี้ หรือ D.U. ค่ะ"
102050-9 = "ถ้าการคุ้มกันในแต่ละเขตปกครองตนเองประสบความสำเร็จ และเราได้เส้นทางโจมตีมา เราก็จะเริ่ม#nนับถอยหลังเพื่อโจมตีผู้พิทักษ์ด้วยกำลังคนทั้งหมดในคราวเดียว "
102050-10 = "ถ้าได้ยินว่า \"เตรียมตัว~ ลุย!\" ก็แปลว่าให้ทุกคนโจมตีผู้พิทักษ์ได้ เรื่องจังหวะสำคัญมากนะ"
102050-11 = "ถ้าเราจัดการหอคอยทั้ง 5 แห่งได้หมด เราจะมาผนึกกำลังกันจัดการหอคอยแห่งที่ 6 ที่แข็งแกร่งที่สุด#nด้วยกันค่ะ......!"
102050-12 = "แล้วหอคอยแห่งคำลวงทั้ง 6 แห่งที่ปรากฏในคิโวทอสก็จะหมดไปค่ะ และนี่คือทั้งหมดของแผน <ปฏิบัติการบุกยึดหอคอยแห่งคำลวง> ค่ะ"
102050-13 = "จากนี้ไป เราต้องการความช่วยเหลือจากชาเล่ต์ค่ะ... คุณครูจะต้องช่วยสั่งการทั้งในปฏิบัติการโจมตี#nและปฏิบัติการป้องกันผ่านโอเปอเรเตอร์แต่ละคนค่ะ..."
102050-14 = "ต่อให้ฉันแยกร่างได้เป็นสิบๆ ร่าง... แต่ถ้าปฏิบัติการนี้ไม่มีครู พวกฉันก็คงทำไม่สำเร็จหรอก ยังไงก็ฝากด้วยนะครู"
102050-15 = "เอาละค่ะคุณครู มีคำถามตรงไหนหรือเปล่าคะ?"
102050-16 = "[s] \"ไม่มี ขอบใจที่ช่วยตระเตรียมให้อย่างดีนะ ริน โมโมกะ อายูมุ\""
102050-17 = "ไม่หรอกค่ะ จากนี้ไปคือของจริงแล้วละค่ะ"
102050-18 = "[ns] \"เอาละ กองทัพชาเล่ต์... พร้อมกันแล้วใช่ไหม?\""
102050-36 = "พร้อมแล้ว!"
102050-38 = "[ns] \"ดีมาก งั้นมาเริ่มกันเลย\""
102050-40 = "[ns] \"เริ่ม <ปฏิบัติการบุกยึดหอคอยแห่งคำลวง> ได้!\""
102050-43 = "ตอนต่อไป;ปฏิบัติการบุกยึดหอคอยแห่งที่ 1 - เขตทะเลทรายอะบิดอส"

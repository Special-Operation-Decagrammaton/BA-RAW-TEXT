[translation]
102050-1 = "Episode 5; Planning an Operation 3"
102050-2 = "All sanctum teams are now standing by. "
102050-3 = "I'll now summarize the Operational Plan: Nisir's Summit."
102050-4 = "First, the units assaulting the sanctums will approach each guardian until within direct attack range."
102050-5 = "In other words, secure a total of six attack routes, one for each sanctum. Small, swift skirmishes will be used to break through the enemy's defenses. Do not over-engage."
102050-6 = "Yes! Next, each district's defense unit must defend the district until the sanctum is captured."
102050-7 = "As soon as the assault begins, the sanctums will call enemies to begin attacking us all over Kivotos."
102050-8 = "The defense units of Gehenna, Millennium, Hyakkiyako, Red Winter, Shanhaijing, Trinity, and D.U. must prepare for attacks from all sides."
102050-9 = "If the defense of each district is successful and the attack routes of all sanctums are secured, then the countdown for an all-out attack on the guardians will begin."
102050-10 = "When we give the word, all teams will attack all the guardians at the same time. Timing is the most important part, everyone!"
102050-11 = "Once the first five sanctums are clear, we'll attack the sixth, and most powerful, sanctum together!"
102050-12 = "That's how we'll destroy all six False Sanctums in Kivotos. Operational Plan: Nisir's Summit will then be considered a success."
102050-13 = "From now on, we'll need Schale to take on a more active role... Sensei, you must direct all defensive and offensive movement through each operator..."
102050-14 = "It's gonna be a whole ton of work, but none of this is possible without you. So, you got this, Sensei!"
102050-15 = "Do you have any questions, Sensei?"
102050-16 = "[s] \"No. Thank you for your hard work, Rin, Momoka, and Ayumu.\""
102050-17 = "This is only the beginning."
102050-18 = "[ns] \"Now, everyone at Schale... Are you ready?\""
102050-36 = "We're ready!"
102050-38 = "[ns] \"In that case...\""
102050-40 = "[ns] \"Let's begin the Operational Plan: Nisir's Summit!\""
102050-43 = "Next Episode; The First Sanctum - Abydos Desert District"

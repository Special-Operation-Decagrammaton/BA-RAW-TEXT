[translation]
102050-1 = "第5話;作戰準備（３）"
102050-2 = "第1聖所到第6聖所全都準備就緒了。"
102050-3 = "再次說明「虛假的聖所攻略戰」的作戰概要。"
102050-4 = "攻略部隊請接近到能夠攻擊各守護者的距離。"
102050-5 = "預計將會在途中與敵人防線進行交戰。#n接著確保總計6條的攻擊路線。"
102050-6 = "此外，防衛部隊在聖所的攻略結束之前，必須守護各個自治區。"
102050-7 = "在攻略開始的同時，聖所召喚敵人攻擊整個奇普托斯的可能性很高。"
102050-8 = "格黑娜、千年、三一、百鬼夜行、赤冬、山海經、D.U.等等──#n請防衛部隊做好應對全方位襲擊的準備。"
102050-9 = "在成功防衛各個自治區，並且確保所有聖所的攻擊路線後，#n守護者集中攻擊的倒數就會開始唷～"
102050-10 = "在倒數結束的同時，請大家一起攻擊守護者。#n時機很重要唷～"
102050-11 = "如果能將5個聖所各個擊破，所有人就可以一起進攻第6聖所……！"
102050-12 = "以上就是「虛假的聖所攻略戰」的全貌。"
102050-13 = "從現在起，夏萊的力量是必要的……防衛與攻擊──#n所有戰鬥的指揮就交給老師了……！"
102050-14 = "嗚哇……老實說，就算有十個身體也不夠用……#n不過，這場作戰少了老師就無法成立了呢。拜託你囉～"
102050-15 = "老師有任何問題嗎？"
102050-16 = "[s]「不，沒問題。琳、桃香、步，謝謝你們做的準備。」"
102050-17 = "不……事情還沒有結束。接下來才是關鍵時刻。"
102050-18 = "[ns]「那麼各位……準備好了嗎？」"
102050-36 = "是，老師！"
102050-38 = "[ns]「嗯……那麼，出發吧。」"
102050-40 = "[ns]「『虛假的聖所攻略戰』開戰囉！」"
102050-43 = "下一話;第1聖所「阿拜多斯沙漠」"

[translation]
102050-1 = "#title;제5화;작전 준비 3"
102050-2 = "3;린;S2_01;제1 성소부터 제6 성소까지 모두 스탠바이 완료 확인. \n#3;a\n#3;em;[반응]"
102050-3 = "3;린;S2_02;<거짓된 성소 공략전>의 작전 개요를 한 번 더 브리핑합니다. "
102050-4 = "3;린;S2_01;첫 번째, 성소 공략 부대는 각 수호자를 직접 공격할 수 있는 거리까지 접근합니다."
102050-5 = "3;린;S2_01;즉, 제1 성소부터 제6 성소까지, 총 6개의 공격 루트를 확보합니다. 이 과정에서 적들의 방어 라인을 뚫기 위한 교전이 발생할 겁니다."
102050-6 = "5;아유무;05;……네! 두 번째는, 각 자치구의 방어 부대는 성소 공략이 완료될 때까지 자치구를 방어해야 합니다.\n#5;a\n#5;em;[!]"
102050-7 = "5;아유무;07;공략 시작과 동시에 키보토스 전역에서 성소가 불러낸 적들의 습격이 시작될 거예요."
102050-8 = "5;아유무;05;게헨나, 밀레니엄, 백귀야행, 붉은겨울, 산해경, 트리니티, D.U.…… 등 방어 부대는 전방위적인 습격에 대비해야만 합니다.\n#5;em;…"
102050-9 = "1;모모카;20;각 자치구의 방어가 성공적이고, 모든 성소의 공격루트를 확보했다면, 그럼 그때부터 수호자 총공격을 위한 카운트다운을 시작할 거야. \n#1;a"
102050-10 = "1;모모카;19;준비~ 시작! 하면 모두 동시에 수호자를 공격하는 거지. 타이밍이 중요해.\n#1;em;[재잘]"
102050-11 = "5;아유무;05;그렇게 5개의 성소를 모두 처리하면, 마지막으로 가장 강력한 제6 성소를 함께 공략할 거예요……!"
102050-12 = "3;린;S2_02;그렇게 키보토스에 도래한 6개의 거짓된 성소를 파괴합니다. 이것이 바로 <거짓된 성소 공략전> 작전 계획의 모든 것입니다."
102050-13 = "5;아유무;01;지금부터 샬레의 활약이 필요합니다…… 모든 방어 작전과 공격 작전에 각 오퍼레이터들을 통해 선생님이 지휘를 해주셔야 해요…….\n#5;em;…"
102050-14 = "1;모모카;12;몸이 열 개라도 부족할 것 같지만…… 그래도 이 작전은 선생이 없으면 성립되지 않으니까, 잘 부탁할게.\n#1;em;[음표]"
102050-15 = "3;린;S2_01;그럼, 선생님, 질문 있으신가요?\n#3;em;[반응]"
102050-16 = "[s] \"아니. 준비한다고 수고했어. 린. 모모카, 아유무.\""
102050-17 = "3;린;S2_99;아뇨, 이제부터 시작이죠."
102050-18 = "[ns] \"자, 그럼 샬레의 모두들…… 준비는 다 됐지?\""

[translation]
83302400200-6 = "Oh my. To think that the head prefect would make time in her busy schedule to come all the way to my prison cell."
83302400200-7 = "Heh. I'm honored."
83302400200-15 = "Haruna. I'm sure I already know, but I'd like to hear it in your own words."
83302400200-16 = "Why did you abduct Fuuka?"
83302400200-17 = "Heh. Surely it's obvious."
83302400200-18 = "The party food that Fuuka's preparing for the Gehenna Party..."
83302400200-19 = "Why should the Pandemonium Society be allowed to horde it all for themselves? It'd be wasted on their uncultured palates!"
83302400200-20 = "As the president of Gehenna's Gourmet Research Society, I have a solemn duty!"
83302400200-21 = "When it comes to new and specialty foods, our club should be the first to taste it!"
83302400200-22 = "...There really was no need to ask. You always go on a rampage for the same reason."
83302400200-23 = "Your club never changes, no matter how many times we imprison you."
83302400200-24 = "We wouldn't be the Gourmet Research Society if we weren't willing to risk it all for delicious food!"
83302400200-25 = "...Fine. That was all I required. Spend some time in your cell and reconsider your philosophy."
83302400200-32 = "Heh, whatever you say. I look forward to our next meeting, Hina."

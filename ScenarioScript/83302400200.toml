[translation]
83302400200-6 = "哎呀，陽奈同學。#n像你這種大忙人竟然親自來探監。"
83302400200-7 = "真是讓人無地自容，呵呵。"
83302400200-15 = "羽留奈。雖然我覺得這麼問的意義不大，但姑且還是問你一下。"
83302400200-16 = "為什麼要綁架風華？"
83302400200-17 = "呵呵，那還用說嗎？"
83302400200-18 = "這次風華同學受萬魔殿委託準備的派對餐點……"
83302400200-19 = "你不認為……只有萬魔殿的人能品嘗實在太可惜了嗎？"
83302400200-20 = "身為格黑娜美食研究會的會長……"
83302400200-21 = "我認為那些食物應該先由我們品嘗！"
83302400200-22 = "是嗎……果然沒必要問啊。#n理由還是跟往常一樣。"
83302400200-23 = "就算被關進監獄好幾次，你們還是一點都沒變。"
83302400200-24 = "為了美食不惜一切就是我們美食研究會的理念。#n這是理所當然的。"
83302400200-25 = "我知道了，那就說到這吧。#n短時間內就待在裡面反省吧。"
83302400200-32 = "呵呵，是～#n我很期待下次的見面哦，陽奈同學。"

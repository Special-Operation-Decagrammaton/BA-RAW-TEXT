83302400200-14 = "3;히나;99\n#3;a\n#wait;1000"
83302400200-15 = "3;히나;99;하루나. 딱히 물어볼 필요도 없다고는 생각하지만, 만약을 위해 묻겠어."
83302400200-16 = "3;히나;02;후우카는 왜 납치했던 거야?"
83302400200-17 = "3;하루나;02;후훗, 그야 뻔한 이야기이지요."
83302400200-18 = "3;하루나;01;후우카 씨가 이번에 만마전의 발주를 받아 만들고 있다는 파티 음식들……"
83302400200-19 = "3;하루나;05;그것을 단지 만마전의 분들만 맛보는 건 너무나도 아쉽다고 생각하지 않으신가요?"
83302400200-20 = "3;하루나;06;다른 누구도 아닌 게헨나의 미식연구회의 부장으로서!\n#3;closeup\n#fontsize;80"
83302400200-21 = "3;하루나;06;그런 음식이 있다면 저희가 먼저 맛을 보는 것이 정당하다고 생각했을 뿐이랍니다!\n#3;closeup\n#fontsize;80"
83302400200-22 = "3;히나;01;그래…… 역시나 물어볼 필요도 없이, 평소와 같은 이유로 난동을 피웠단 거네."
83302400200-23 = "3;히나;16;몇 번이나 감옥에 연행되더라도 변함이 없구나. 너희들은."
83302400200-24 = "3;하루나;02;그야 맛있는 음식을 위해서라면 어떠한 일도 마다하지 않는 것이 저희 미식연구회이기에. 당연한 일이랍니다."
83302400200-25 = "3;히나;99;좋아. 이야기는 여기까지. 그럼 당분간 얌전히 그 안에서 반성하고 있도록 해."

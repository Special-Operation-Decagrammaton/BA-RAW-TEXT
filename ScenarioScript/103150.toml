[translation]
103150-1 = "ตอนที่ 15;ปฏิบัติการยึดเรืออะทราฮาซิส"
103150-2 = "ขับไล่ศัตรูเรียบร้อย!! เรากันไว้ได้แล้วค่ะ!"
103150-3 = "ทำได้ดีมากเลยคุณครู"
103150-4 = "รอบๆ นี้ก็ไม่พบร่องรอยการเคลื่อนไหวที่น่าสงสัยแล้วด้วย..."
103150-10 = "วะ... เหวอออ?! อะ... อะไรกันน่ะ?! ระเบิดเหรอ!?"
103150-11 = "ระ... ระเบิดเหรอคะ? จะ... จากไหนคะ......?"
103150-21 = "!!"
103150-22 = "อะ... อ๊า......?!  ขะ... เข้ามาตั้งแต่ตอนไหนกัน......!?"
103150-26 = "[ns] \"ชิโรโกะ......?!\""
103150-27 = "...... จริงด้วยแฮะ อื้ม ในที่สุดก็มากันถึงที่นี่เลยสินะ"
103150-31 = "ฉันเตือนแล้วไม่ใช่เหรอ แล้วทำไมถึง......?"
103150-32 = "สิ่งที่จะได้ไปจากที่นี่น่าจะมีแต่ความตายเท่านั้นนะ"
103150-33 = "รุ่นพี่ชิโรโกะ!!!"
103150-43 = "หยุดนะ!!"
103150-44 = "ชิโรโกะจัง......!?"
103150-45 = "ระ... รุ่นพี่ชิโรโกะ? ใช่ไหม?"
103150-54 = "ไม่ได้นะคะ! ดะ... เดี๋ยวก่อนค่ะ ชิโรโกะจัง!?"
103150-57 = "รอด้วยสิ ชิโรโกะ!!!"
103150-66 = "ระ... ระเบิดมือเหรอ?!"
103150-75 = "[ns] \"โฮชิโนะ......!!\""
103150-78 = "แค่กๆ แค่กๆ......"
103150-79 = "เป็นอะไรหรือเปล่าครู?"
103150-80 = "[s] \"อ่า......\""
103150-81 = "แค่กๆ รุ่นพี่ชิโรโกะล่ะ?"
103150-82 = "หายไปแล้วค่ะ......"
103150-83 = "ชิโรโกะจัง...... อยู่ที่นี่จริงด้วยสินะ......"
103150-84 = "...... แต่ว่า...... ทำไมถึง......"
103150-86 = "......"
103150-90 = "ฮืม...... ระเบิดเมื่อกี้น่าจะทำให้สภาพเรือแย่ลงนะ"
103150-91 = "ชมรมวิศวกรรม? ได้ยินรึเปล่า? ช่วยเช็กสภาพเรือรบอุตนาพิชทิมให้หน่อยได้ไหม?"
103150-93 = "เฮ้อ... แค่ทุกคนไม่บาดเจ็บก็ถือว่าโชคดีแล้วละ"
103150-94 = "กำลังเช็กสภาพของเรือรบให้นะ......"
103150-95 = "ฮึ่ม แทบไม่เหลือชิ้นดีเลย"
103150-96 = "ตอนชนกับเรือนี้ เรือรบของเราก็เกิดปัญหาไม่ใช่น้อยๆ เลย ที่ระเบิดเมื่อกี้ก็ด้วย"
103150-97 = "เดี๋ยวจะวินิจฉัยระบบและวิเคราะห์ความเสียหายเดี๋ยวนี้เลยค่ะ แต่ยังไงก็อย่ากังวลจนเกินไปนะคะ"
103150-98 = "ถึงจะซ่อมแซมขั้นพื้นฐานไม่ได้ แต่ยังไงก็ยังเปิดใช้งานใหม่ได้อยู่ค่ะ"
103150-99 = "อื้ม เราต้องฟื้นฟูเรือ ทุกคนจะได้กลับไปยังพื้นดินได้อย่างปลอดภัย ยังไงฉันก็จะพยายามดูนะ"
103150-100 = "แต่แค่พวกฉันน่าจะใช้เวลานานเลย สงสัยจะต้องขอความช่วยเหลือจากโอเปอเรเตอร์ทางนั้นแล้วละ"
103150-102 = "มีใครพอจะช่วยได้บ้างไหม?"
103150-104 = "ฉันช่วยเอง ต้องการอะไรบอกมาเลย"
103150-105 = "โอ้ ได้ค่ะ! ขอบคุณมากค่ะ!"
103150-106 = "ค่ะ ถ้างั้นก็รบกวนด้วยนะคะ"
103150-110 = "...... ฮิมาริ"
103150-111 = "การเทเลพอร์ตที่ชิโรโกะทำให้เห็นเมื่อกี้ บางทีมันอาจจะมาจากความสามารถในการประมวลผลของ#nเรือลำนี้ก็ได้นะ"
103150-112 = "... อืม ค่ะ อาจจะเป็นอย่างนั้นก็ได้นะคะ"
103150-113 = "โดยพื้นฐานแล้ว เรืออะทราฮาซิสลำนี้เป็นอุปกรณ์ในการคำนวณสถานะของมิติ และด้วยสิ่งนั้น ก็เลยน่าจะสามารถเคลื่อนย้ายมวลสารได้น่ะ"
103150-114 = "ชิโรโกะคนนั้นคงคุ้นเคยกับการใช้เรือลำนี้สินะ"
103150-115 = "แล้วยังไงเหรอคะ ริโอะ?"
103150-116 = "หากเราได้ความสามารถในการประมวลผลของเรือมา บางทีเราอาจจะสร้างวงจรก้าวกระโดดเชิงพื้นที่#nได้เหมือนสิ่งนั้นก็ได้"
103150-117 = "วงจรก้าวกระโดดเชิงพื้นที่......?"
103150-118 = "ฉันรู้เรื่องเทคโนโลยีของ <ทวยเทพไร้นาม> มากที่สุดในคิโวทอส ถึงแม้การคาดการณ์อนาคตจะถูก#nจำกัด แต่ยังไงฉันก็เคยทำให้เห็นจริงขึ้นมาแล้ว"
103150-119 = "ถ้าเราใช้สิ่งนี้ละก็ เราทุกคนที่นี่ก็จะเคลื่อนย้ายกลับไปยังพื้นดินได้ แต่มันต้องเกิดขึ้นในครั้งเดียว"
103150-120 = "อืม...... อย่างนั้นสินะ"
103150-121 = "ริโอะ คุณคิดว่าชมรมวิศวกรรมจะซ่อมเรือไม่ได้งั้นสินะคะ?"
103150-122 = "...... ฉันไม่ได้ไม่เชื่อใจชมรมวิศวกรรมหรอกนะ......"
103150-123 = "...... ค่ะ ก็คงจะอย่างนั้นแหละค่ะ ก็คุณเป็นบิ๊กซิสเตอร์นี่คะ"
103150-124 = "คุณที่รู้ทุกสิ่งทุกอย่าง และเพราะรู้ ก็เลยกังวลกับทุกสิ่งทุกอย่างเช่นกัน..."
103150-126 = "เหมือนกับกษัตริย์ที่ฟังคำพยากรณ์ได้"
103150-127 = "......?"
103150-128 = "ความวิตกกังวลกับการบีบบังคับของคุณก่อให้เกิดปัญหาแย่ๆ เกือบทั้งนั้นค่ะ"
103150-129 = "คุณไม่ไว้ใจเพื่อนร่วมงาน และหลงเชื่อว่าตัวเองเป็นฝ่ายถูกอยู่คนเดียว"
103150-130 = "...... ใช่ ฉันเป็นคนแบบนั้นแหละ ฮิมาริ"
103150-131 = "นิสัยแบบนั้นคงเปลี่ยนไปไม่ได้ตลอดชั่วนิรันดร์ เธอจะรังเกียจฉันก็ได้"
103150-132 = "แต่นั่นเป็นวิธีเดียวที่จะช่วยชีวิตเธอ คุณครู และทุกคนที่อยู่ที่นี่ได้นะ"
103150-133 = "เพราะงั้นเราควรเตรียมตัวเผื่อไว้ในกรณีที่ปฏิบัติการไม่สำเร็จ ถึงแม้จะมีความเสี่ยงในการล้มเหลวน้อย#nมากก็เถอะ"
103150-134 = "ในสถานการณ์แบบนี้ ฉัน......"
103150-135 = "ฉันไม่รังเกียจคุณหรอกค่ะ ริโอะ ก็แค่ไม่ชอบเฉยๆ น่ะ"
103150-136 = "ไม่ชอบกับรังเกียจมันคนละเลเวลกันนะคะ"
103150-140 = "... ขอบคุณที่เป็นห่วงกันนะคะ ริโอะ"
103150-141 = "...... ว่าไงนะ?"
103150-142 = "ชมรมวิศวกรรมก็ต้องรู้สึกขอบคุณเหมือนกันค่ะ"
103150-143 = "ที่คุณช่วยรองรับความล้มเหลวของพวกเธอเอาไว้น่ะค่ะ"
103150-144 = "...... งั้นเหรอ"
103150-145 = "วิธีที่พวกเราจะกลับมาได้อย่างปลอดภัยแม้จะไม่เหลือเรือรบอุตนาพิชทิม... หากมีวิธีแบบนั้นก็คงจะดี#nไม่น้อยเลยนะคะ"
103150-146 = "ต้องขอรบกวนด้วยนะคะ ริโอะ"
103150-147 = "เข้าใจแล้ว ขอเวลาฉันหน่อยนะ ฉันจะเตรียมตัวอยู่ทางนี้ในระหว่างที่พวกเธอออกไปต่อสู้"
103150-148 = "ขอตัวก่อนนะ"
103150-152 = "......"
103150-155 = "เราบุกเข้ามาในเรืออะทราฮาซิส สำเร็จจนได้ค่ะ......"
103150-156 = "แต่ว่าตอนนี้เราอยู่กลางศูนย์บัญชาการของศัตรู...... จึงคาดเดาไม่ได้เลยว่าพวกศัตรูจะโผล่ออกมา#nจู่โจมตอนไหน"
103150-157 = "การจู่โจมแบบเมื่อสักครู่อาจเกิดขึ้นอีกซ้ำๆ ก็ได้ค่ะ"
103150-158 = "ถึงเราจะต้องตั้งรับ แต่การป้องกันเรือรบอุตนาพิชทิมก็เป็นเรื่องที่เราต้องให้ความสำคัญด้วยค่ะ......"
103150-162 = "ระหว่างที่ชมรมวิศวกรรมทำการฟื้นฟูเรือรบอุตนาพิชทิมลำนี้"
103150-170 = "ชมรมพัฒนาเกม คณะกรรมการแผนงาน และชมรมชิมอาหาร รบกวนช่วยคุ้มกันเรือจากการบุกโจมตี#nของพวกศัตรูด้วยนะคะ"
103150-172 = "ในระหว่างนั้น โอเปอเรเตอร์คนอื่นที่เหลือกับ <ชาเล่ต์> จะเข้าสู่ขั้นต่อไปของปฏิบัติการค่ะ"
103150-173 = "ขั้นต่อไป......"
103150-174 = "ทีนี้ก็จะเริ่มของจริงกันแล้วสินะ......"
103150-175 = "ค่ะ จากนี้ไป พวกเราจะ"
103150-181 = "เข้ายึดและแย่งชิงเรืออะทราฮาซิสมาค่ะ"

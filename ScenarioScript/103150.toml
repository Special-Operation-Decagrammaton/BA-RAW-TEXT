[translation]
103150-1 = "Episode 15;The Ark of Atrahasis Conquest"
103150-2 = "Enemy eliminated! The defense was successful!"
103150-3 = "Good job, Sensei."
103150-4 = "I'm not detecting anymore suspicious—"
103150-10 = "Wh-Whoa?! Wh-What?! An explosion?!"
103150-11 = "Where did that come from?!"
103150-21 = "!"
103150-22 = "Ack! How did she get inside so easily?!"
103150-26 = "[ns] \"Shiroko...?!\""
103150-27 = "I see... In the end, the future is predetermined."
103150-31 = "Did I not warn you? Why do you insist on forging onward?"
103150-32 = "Only death awaits you here."
103150-33 = "Shiroko!!!"
103150-43 = "Stop right there!"
103150-44 = "Shiroko...?!"
103150-45 = "Sh-Shiroko?! Is that you?"
103150-54 = "No! W-Wait, Shiroko?!"
103150-57 = "Wait, Shiroko!!!"
103150-66 = "A grenade?!"
103150-75 = "[ns] \"Hoshino...!\""
103150-78 = "*cough cough*"
103150-79 = "Are you okay, Sensei?"
103150-80 = "[s] \"A-Argh...\""
103150-81 = "*cough* Where did she go?!"
103150-82 = "She ran off."
103150-83 = "We were right. Shiroko's aboard the Ark."
103150-84 = "But...why did she...?"
103150-86 = "..."
103150-90 = "The ship's condition went from bad to worse after that explosion."
103150-91 = "Engineering Department, can you hear me? Can you check Utnapishtim's status?"
103150-93 = "*sigh* My heart... I'm glad you're all safe."
103150-94 = "Checking the ship..."
103150-95 = "Ugh. Messed up is an understatement."
103150-96 = "Various operating systems and programs were damaged in both the collision and the explosion."
103150-97 = "We're beginning a system diagnosis to see the extent of the damage. It'll be okay though."
103150-98 = "Fundamental repairs might be impossible from all the way up here, but we'll restart its systems somehow! No matter what!"
103150-99 = "Exactly as she said. We'll restore it and get you all safely back on ground. I stake it on my pride as an engineer."
103150-100 = "It'll be much harder if it's just us working remotely, so we'll need assistance from some of the operators."
103150-102 = "Is anyone available to assist?"
103150-104 = "I've got it. Just lemme know what to do."
103150-105 = "Oh, yes! Thank you!"
103150-106 = "Thank you. Please get the ship back into shape to the best of your abilities."
103150-110 = "...Himari."
103150-111 = "The spatial movement Shiroko escaped through just now seems to have utilized the calculation abilities of this ark."
103150-112 = "Hm. You may be right. It's definitely possible."
103150-113 = "The Ark of Atrahasis is basically a computational device that calculates dimensional phases. If you know how, you can use it to move through spaces as she did."
103150-114 = "Shiroko seems well-versed in using the Ark."
103150-115 = "What are you implying, Rio?"
103150-116 = "If we can utilize the Ark's computational abilities as she does, we can probably create physical space-leap sequences similar to hers."
103150-117 = "Space-leap sequences...?"
103150-118 = "I do mean it when I say I know the technology of Nameless Gods better than anyone else in Kivotos. Though my foresight is limited, it's been right before."
103150-119 = "If we can calculate it correctly, we should be able to move everyone back down to the ground. We'll have just one chance at it."
103150-120 = "Hmm... I see."
103150-121 = "Rio... You don't believe the Engineering Department can repair this ship?"
103150-122 = "...Don't do that. I'm not trying to say I don't trust them."
103150-123 = "Right, of course. But you're Big Sister."
103150-124 = "You know everything, so you operate off anxiety and distrust."
103150-126 = "Like the king who believes in prophecies."
103150-127 = "...?"
103150-128 = "Your anxiety and compulsions have caused more problems than solved them."
103150-129 = "You don't trust your colleagues, and you fall into self-righteousness, always believing you're the only one that's right."
103150-130 = "...Yes, that's how I am, Himari."
103150-131 = "That'll probably never change. You can hate me for it if you want."
103150-132 = "But right now, this ship is the only hope for saving your life, Sensei's life, and the lives of everyone else here."
103150-133 = "We need to prepare for the possibility of the current plan to fail, no matter how small those odds may be."
103150-134 = "In these kinds of situations, I..."
103150-135 = "You know, Rio... I've never hated you. I simply dislike you."
103150-136 = "There is a rather important distinction between the two."
103150-140 = "Thank you for your concern, Rio."
103150-141 = "Do you mean...?"
103150-142 = "The Engineering Department will surely be thankful as well."
103150-143 = "Because they have something to fall back upon in the event something goes wrong."
103150-144 = "...I see."
103150-145 = "If there's a way for us to return safely without Utnapishtim, it'll be beneficial for us all."
103150-146 = "I'll trust in you, Rio."
103150-147 = "...Thank you. Just give me some time, and I'll make the needed preparations as you carry out your mission."
103150-148 = "Now then."
103150-152 = "..."
103150-155 = "We've entered the Ark of Atrahasis, if only by the skin of our teeth."
103150-156 = "But now we're in the middle of the enemy stronghold... Stay alert for enemy attacks."
103150-157 = "We don't know when they'll strike again."
103150-158 = "Defending Utnapishtim's Ship is of utmost priority as well."
103150-162 = "While the Engineering Department works on restoring the ship..."
103150-170 = "I'd like the Game Development Department, Foreclosure Task Force, and Gourmet Research Society to defend it from any enemy attacks."
103150-172 = "Meanwhile, the rest of the operators along with Schale need to move on to the next stage."
103150-173 = "The next stage..."
103150-174 = "We're only just getting started..."
103150-175 = "From this point onward..."
103150-181 = "We will infiltrate and take control of the Ark of Atrahasis!"

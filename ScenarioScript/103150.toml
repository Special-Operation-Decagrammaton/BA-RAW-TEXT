[translation]
103150-1 = "第15話;阿特拉哈西斯的方舟占領戰"
103150-2 = "確認擊退敵人！防衛順利成功了！！"
103150-3 = "老師，辛苦啦～"
103150-4 = "似乎也沒有其他可疑的動向──"
103150-10 = "怎怎怎，怎麼了！！？#n爆，爆炸！！？"
103150-11 = "是，是爆炸嗎……？在，在什麼地方……！？"
103150-21 = "！！"
103150-22 = "啊，啊啊……什，什麼時候跑進來的……！？"
103150-26 = "[ns]「白子……！？」"
103150-27 = "這樣啊……嗯。#n結果還是跑來這裡了啊。"
103150-31 = "我明明警告過你了，為什麼……？"
103150-32 = "……明明在這裡，就只有死路一條而已。"
103150-33 = "白子前輩！！！"
103150-43 = "──停下來！！"
103150-44 = "白子，醬……！？"
103150-45 = "是，是白子前輩，沒錯吧……！？"
103150-54 = "不可以！白，白子醬……！"
103150-57 = "等等，白子醬──！！"
103150-66 = "手，手榴彈……！？"
103150-75 = "[ns]「星野！！」"
103150-78 = "咳咳，咳咳……！"
103150-79 = "老師，你沒事吧？"
103150-80 = "[s]「嗯。」"
103150-81 = "咳咳……白子前輩呢？"
103150-82 = "消失了……"
103150-83 = "果然……白子醬他就在這裡啊。"
103150-84 = "但是……為何會……"
103150-86 = "……"
103150-90 = "哈啊……剛剛的爆炸讓狀況變得更嚴重了。"
103150-91 = "工程師部，聽得見嗎？#n能請你們確認一下船的狀況嗎？"
103150-93 = "呼……幸虧大家似乎都沒受傷。"
103150-94 = "目前正在確認戰艦的狀況……"
103150-95 = "情況不太樂觀。"
103150-96 = "與方舟的碰撞似乎讓許多部分都發生問題了呢。#n而且剛才的爆炸……又讓狀況更加惡化。"
103150-97 = "我們會立刻進行系統診斷與傷害分析！#n請別太擔心。"
103150-98 = "就算無法完全修好，只是要重新啟動的話應該是沒問題的。"
103150-99 = "嗯。不修好它的話，你們就沒辦法回到地面。#n我們會全力以赴的。"
103150-100 = "但是，只靠我們的話會花費很多時間，所以也希望你們能幫忙……"
103150-102 = "有誰現在有空的呢？"
103150-104 = "……我來吧。有什麼需要就告訴我。"
103150-105 = "哦哦，我知道了！感謝幫忙！"
103150-106 = "好的。那就拜託了。"
103150-110 = "……陽葵。"
103150-111 = "剛剛白子的空間移動──也許是利用方舟的演算能力實現的。"
103150-112 = "嗯……這是有可能的。"
103150-113 = "這個「阿特拉哈西斯的方舟」是計算次元的演算裝置……#n利用這一點，就能做到空間的移動吧。"
103150-114 = "而他──似乎已經很習慣使用方舟的能力了呢。"
103150-115 = "……你的意思是？"
103150-116 = "也就是說，只要能保住方舟的演算能力……#n或許就能製作出同等的物理性空間跳躍程式。"
103150-117 = "空間跳躍程式……？"
103150-118 = "我自認是奇普托斯最了解「無名之神」技術的人。#n對未來的預知也曾部分實現過。"
103150-119 = "雖然可能只有一次機會──#n但只要能完成空間跳躍程式，應該就能讓艦內的所有人回到地面。"
103150-120 = "呼呣……這樣啊。"
103150-121 = "也就是說……莉央，你認為工程師部無法修復這艘船對吧？"
103150-122 = "我不是因為不信任工程師部才這麼說的──"
103150-123 = "沒錯……因為你是「大姐頭」。"
103150-124 = "正因為精通一切，而對一切抱持著懷疑──"
103150-126 = "就像收到神諭的國王一樣……"
103150-127 = "……？"
103150-128 = "你的不安與執念……這絕大部分的感情，引發了各種問題。"
103150-129 = "無法信賴夥伴、認為自己才是對的，就因為你沉溺於這種獨善的思考──"
103150-130 = "是呢……我並不否認。我就是這種人，陽葵。"
103150-131 = "就是這些要素形塑了我。我想今後一定也不會有所改變吧──就算被鄙視也無所謂。"
103150-132 = "但是，這艘船──是攸關著你、攸關著老師、攸關著這裡所有人性命的存在。"
103150-133 = "既然如此，就必須為計畫失敗的情況有所準備不是嗎？#n哪怕是絕對不會發生的機率，也該有應對的手段……"
103150-134 = "正因如此，我──"
103150-135 = "我並沒有鄙視你，莉央。我只是討厭你而已──"
103150-136 = "這之中的差別可是相當大的哦？"
103150-140 = "……謝謝你擔心我，莉央。"
103150-141 = "你剛才，說什麼──"
103150-142 = "工程師部的大家也會感謝你吧。"
103150-143 = "因為有個強力的存在，願意在失敗的時候成為自己的後盾。"
103150-144 = "……"
103150-145 = "沒有「生命守護者本艦」也能從這裡生還……#n如果那種方法真的存在，想必會成為巨大的鼓勵吧。"
103150-146 = "所以──拜託你了，莉央。"
103150-147 = "我知道了。給我一點時間。#n你們進行占領戰的期間，我會去確認的。"
103150-148 = "那麼告辭──"
103150-152 = "……"
103150-155 = "雖然成功進入了「阿特拉哈西斯的方舟」……"
103150-156 = "不過現在的我們正位於敵人的大本營。#n攻擊何時開始都不奇怪。"
103150-157 = "像剛才那樣的襲擊也有可能會持續──"
103150-158 = "所以，我們也必須在占領的同時進行船隻的防衛。"
103150-162 = "在工程師部進行修復作業的這段時間，"
103150-170 = "請遊戲開發部、對策委員會、美食研究會的各位負責防禦船隻，抵禦敵人的襲擊。"
103150-172 = "至於操作員和夏萊，請執行下一個作戰。"
103150-173 = "下一個作戰……"
103150-174 = "現在才是真正的開始……"
103150-175 = "是的。接下來，我們將要──"
103150-181 = "占領並奪取「阿特拉哈西斯的方舟」。"

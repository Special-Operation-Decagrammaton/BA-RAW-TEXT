10007050-59 = "1;노도카 온천 온천장ND;09;네, 부디 가르쳐 주셨으면 하네요."
10007050-60 = "3;미노리;01;우리가 갖고 있는 불만은……"
10007050-61 = "#all;hide"
10007050-62 = "3;미노리;05;이 온천장 그 자체다!\n#3;em;[!]\n#3;closeup\n#fontsize;100"
10007050-63 = "#all;hide"
10007050-64 = "5;미노리;05\n1;노도카 온천 온천장ND;04;네에? 그게 무슨 억지인가요?!\n#1;em;[?!]\n#1;shake"
10007050-65 = "1;노도카 온천 온천장ND;12;저희가 온천장을 운영하면서 용역부에게 무슨 피해를 주기라도 했나요?"
10007050-66 = "5;미노리;09;시치미 떼지 마! 우리는 모두 지켜보고 있었다!\n#5;hophop"
10007050-67 = "5;미노리;05;사악한 게헨나의 온천개발부 부원들이 이곳에 온천장을 짓고 가는 모습을……!"
10007050-68 = "1;노도카 온천 온천장ND;19;……그게 무슨 문제라도 되나요?\n#1;stiff\n#1;em;[땀]"
10007050-69 = "5;미노리;02;당연히 문제가 된다!\n#5;em;[반응]"
10007050-70 = "5;미노리;99;온천개발부 녀석들은 우리 붉은겨울 학원의, 붉은겨울 학원 소속이 아닌……"
10007050-71 = "#all;hide"
10007050-72 = "3;미노리;05;외부 용역이잖아!\n#3;closeup\n#fontsize;100\n#bgshake"
10007050-73 = "[s] \"……외부 용역?\""
10007050-74 = "3;미노리;01;그동안 우리 용역부는 붉은겨울 학원에서 대규모 토목공사가 벌어질 때마다 궂은일을 가리지 않고 앞장서서 성실히 노동해왔었다.\n#3;em;[반응]"
10007050-75 = "3;미노리;99;거칠고 고된 노동환경이었지만…… 붉은겨울 학원의 모든 건물들은 우리 손으로 지어진다는 자부심 하나로 버틸 수 있었다."
10007050-76 = "3;미노리;06;그런데 새로 생긴 온천장이, 붉은겨울 제일의 관광명소가 우리 용역부가 아닌 외부 용역에 의해 건설되었다니……!\n#3;stiff"
10007050-77 = "3;미노리;05;이는 용역부원들의 자존심에 크나큰 상처를 입혔다!\n#3;em;[!]"
10007050-78 = "1;용역알바 붉은겨울;00;상처 입었어! 자존심 상해!\n#1;hophop\n#1;a\n#1;em;[재잘]"
10007050-79 = "3;미노리;00;우리 용역부는 <227호 온천장>의 이러한 횡포에 대해 엄중히 항의하는 바이다!"
10007050-80 = "5;용역알바 붉은겨울;00;항의한다, 항의한다!\n#5;a\n#5;hophop\n#5;em;[재잘]"
10007050-81 = "#all;hide"
10007050-82 = "3;노도카 온천 온천장ND;04;자, 잠깐만요. 그게 그러니까 이 온천장은 저희가 원해서 세운 게 아니라, 온천부원들이 멋대로 만든…….\n#3;em;[땀]\n#3;stiff"
10007050-83 = "3;노도카 온천 온천장ND;14;잠깐, 선생님도 보고 계시지만 마시고 같이 한 마디 거들어주세요!"
10007050-84 = "[s1] \"맞아! 노도카도 온천개발부의 피해자라고!\"\n[s2] \"노도카도 사실 이런 온천장은 바라지 않았을 거야.\""
10007050-85 = "5;미노리;02;……특별반 학생들 또한 온천개발부의 피해자라고?\n#5;em;[?]\n#5;al\n#3;m1"
10007050-86 = "5;미노리;01;흠. 그런 생각은 하지 못했었는데."
10007050-87 = "3;노도카 온천 온천장ND;13;마, 맞아요! 저희도 따지자면 온천개발부의 개발로 구교사를 잃은 피해자라고요!\n#3;em;[땀]\n#3;stiff"
10007050-88 = "5;미노리;99;……확실히, 거주지에 원치도 않은 불법 구조물이 세워진다면 곤란하겠지."
10007050-89 = "5;미노리;08;자, 노도카 동지. 그럼 지금부터 우리와 함께 이 사악한 온천장을 철거하는 게다!\n#5;em;[반짝]"
10007050-90 = "3;노도카 온천 온천장ND;13;마, 맞아요. 저희도 처음부터 이런 온천장을 건설할 생각은 없었다고요!\n#3;stiff"
10007050-91 = "5;미노리;01;호오, 그럼 용역부와의 상의 없이 건설된 이 '불법 구조물'은 철거해버려도 괜찮은 건가?\n#5;em;[?]\n#5;al\n#3;m1"
10007050-92 = "3;노도카 온천 온천장ND;04;네에?!\n#3;shake\n#3;em;[?!]"
10007050-93 = "3;노도카 온천 온천장ND;14;모처럼 얻은 일확천금의 기회를 제 발로 걷어찰 리가 없잖아요!\n#3;hophop"
10007050-94 = "5;미노리;02;역시 사악한 본색은 숨기지 못하는군, 이 꼬맹이 부르주아 녀석!\n#5;em;[반응]"
10007050-95 = "3;노도카 온천 온천장ND;05;우으, 정말 보자보자 하니까…… 사람을 무어로 보시는 건가요?\n#3;stiff"
10007050-96 = "3;노도카 온천 온천장ND;14;더 이상의 폭언은 참을 수 없어요! <용역부>는 강제로 퇴거시키겠습니다!\n#3;em;[빠직]"
10007050-97 = "5;미노리;01;흥, 그렇게 나올 줄 알고 있었지. 아무리 갑자기 벼락부자가 되었다지만 특별반의 정학생들 따윈 조금도 두렵지 않다!"
10007050-98 = "5;미노리;02;동지들! 우리 용역부의 자존심과 노동권, 그리고……\n#5;em;[!]\n#5;m3\n#3;dl"
10007050-99 = "5;미노리;99;어, 또 이것저것 중요한 것들을 위하여……"

10007050-56 = "1;노도카 온천 온천장ND;13\n#1;m3\n#wait;1500"
10007050-57 = "1;노도카 온천 온천장ND;03;……진정하시고 어째서 시위를 하고 계시는지부터 알려주세요, 미노리 씨. 다른 손님들이 곤란해하시잖아요.\n#1;greeting\n#1;em;[음표]"

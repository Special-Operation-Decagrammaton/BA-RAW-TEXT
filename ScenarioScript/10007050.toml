[translation]
10007050-1 = "Episode 5;Labor for the Labor Party!"
10007050-4 = "Our Hot Springs Resort No. 227 not only has excellent hot springs facilities, but also a wonderful garden for guests to stroll through."
10007050-5 = "Of course, it's pretty hard to maintain a green garden since it snows all year round at Red Winter Academy, so instead..."
10007050-6 = "Our Hot Springs Resort No. 227 has a dry garden made from the rocks and sand of the ruins of the Former Institute."
10007050-7 = "[s] \"A dry garden?\""
10007050-8 = "Yes! A dry garden is a traditional garden made with only rocks, sand, and moss."
10007050-9 = "Like the Zen Buddhism teaching that all gardening styles eventually return to soil, it stands out for its restraint, created by faithfully following minimalism without relying on splendor."
10007050-10 = "When I look at this garden, I feel calm enough to believe the troubles of the world don't matter at all..."
10007050-14 = "Denounce! Denounce!"
10007050-15 = "A c-calm mind..."
10007050-16 = "Be gone! Be gone!"
10007050-17 = "Ugh. Who is it now?! I was enjoying one-on-one time with Sensei!"
10007050-18 = "I can't believe they're causing such a ruckus in a resort meant for relaxation. Even if it's a guest, I'll give them a piece of my mind!"
10007050-23 = "Hot Springs Resort No. 227 Entrance"
10007050-25 = "Be gone, Hot Springs Resort No. 227 that oppresses the rights of workers!"
10007050-26 = "Be gone! Be gone!"
10007050-27 = "Hot Springs Resort No. 227 needs to compensate for the Labor Party's losses."
10007050-28 = "Compensate! Compensate!"
10007050-30 = "I'm telling you, it's all a misunderstanding!"
10007050-34 = "Wh-What's with all this ruckus? Why is the Labor Party here?!"
10007050-35 = "There's been some kind of misunderstanding."
10007050-37 = "Hmph, you finally showed up."
10007050-38 = "Nodoka, you vicious, bourgeois manager!"
10007050-39 = "A vicious, bourgeois manager? Th-That's verbal abuse!"
10007050-40 = "I haven't even been able to enjoy a life of luxury because I've been so busy running the business!"
10007050-44 = "A-Ahem."
10007050-48 = "What brings the Labor Party to our Hot Springs Resort No. 227?"
10007050-49 = "L-Look at that face!"
10007050-50 = "Comrades! Look at the smile of that vicious, capitalism-soaked bourgeois!"
10007050-51 = "I can't believe I didn't realize it before, when we suffered through life together in the cold and harsh lands..."
10007050-52 = "But now, after gaining wealth, you finally show your true nature, you turncoat!"
10007050-53 = "Wait! When did we ever suffer through life together?! And don't give me weird nicknames!"
10007050-57 = "Take a deep breath and explain why you're protesting, Minori. You're being a public nuisance."
10007050-58 = "Hmph, you still haven't realized the problem with this hot springs resort."
10007050-59 = "So, please enlighten me."
10007050-60 = "Our complaint is..."
10007050-62 = "This hot springs resort itself!"
10007050-64 = "What?! What kind of nonsense is that?!"
10007050-65 = "Did we do something to the Labor Party?! We haven't even talked to you!"
10007050-66 = "Don't feign ignorance! We've been watching the entire time!"
10007050-67 = "We watched as the evil Hot Springs Department of Gehenna built a hot springs resort here!"
10007050-68 = "...Is that a problem?"
10007050-69 = "I-Is that a problem?!"
10007050-70 = "I can't believe you even asked that! The Hot Springs Department is not affiliated with Red Winter Academy in any way. They are..."
10007050-72 = "An outside labor source!"
10007050-73 = "[s] \"...An outside labor source?\""
10007050-74 = "Whenever there were large-scale public works happening at Red Winter Academy, we, the Labor Party, were the ones who completed them, no matter how difficult or unpleasant the work was."
10007050-75 = "It was a rough and arduous working environment, but...we were able to endure because we had pride that all the buildings of Red Winter Academy were built with our own hands."
10007050-76 = "But the fact that the new hot springs resort, the best tourist attraction of Red Winter, was built by an outside labor source and not by the Labor Party..."
10007050-77 = "It seriously hurt the pride of the Labor Party members!"
10007050-78 = "We've been hurt! Our pride is hurt!"
10007050-79 = "The Labor Party is strictly protesting against the tyranny of the Hot Springs Resort No. 227!"
10007050-80 = "Protesting! Protesting!"
10007050-82 = "W-Wait a minute. So, this hot springs resort wasn't built because we wanted it to be built! The Hot Springs Department members gave us no choice!"
10007050-83 = "Wait, don't just stand there, Sensei. Say something!"
10007050-84 = "[s1] \"That's right! Nodoka is also a victim of the Hot Springs Department!\"\n[s2] \"Nodoka probably originally didn't want a hot springs resort like this.\""
10007050-85 = "The Spec Ops students are also victims of the Hot Springs Department?"
10007050-86 = "Hmm, I hadn't thought of that."
10007050-87 = "Th-That's right! If you look at it, we are also victims who lost the Former Institute because of the development project of the Hot Springs Department!"
10007050-88 = "True, it would be difficult if an unwanted, illegal structure was erected in one's residential area."
10007050-89 = "Well then, Comrade Nodoka. As a fellow victim, let us join hands against this evil!"
10007050-90 = "Th-That's right. We didn't want this hot springs resort either!"
10007050-91 = "Oh, then is it okay to demolish this illegal structure, built without approval of the Labor Party?"
10007050-92 = "Whaaat?!"
10007050-93 = "There's no way we would kick away this rare, get-rich-quick opportunity with our own feet!"
10007050-94 = "I knew it! You can't hide your evil nature, you little bourgeois!"
10007050-95 = "Hmph, I've been too kind! Do I look like a pushover to you?"
10007050-96 = "I will not stand any more of your verbal abuse! We are forcing you out, Labor Party!"
10007050-97 = "I knew it would come down to this. We for one are not afraid of the suspended students of Spec Ops!"
10007050-98 = "Comrades! For the pride and labor rights of the Labor Party, and..."
10007050-99 = "Uh, for other important things here and there..."
10007050-100 = "Let's fight!"

[translation]
10007050-1 = "第5話;給工務部工作！"
10007050-4 = "我們「227號溫泉浴場」不只有很棒的溫泉，#n為了讓客人們能開心地散步，還準備了很棒的庭園哦！"
10007050-5 = "當然，由於赤冬全年都會降雪的特性，要打造花草茂密的庭園有點困難……"
10007050-6 = "但我們用石頭和沙子作為代替，打造了枯山水的庭園。"
10007050-7 = "[s]「枯山水？」"
10007050-8 = "是的。老師或許也聽過，是利用石頭和沙子來表現自然的庭園。"
10007050-9 = "這種不用水來表現自然的庭園樣式，彷彿訴說著節制的重要一般，我覺得很棒。"
10007050-10 = "只要看著這個庭園，就會產生小事都無所謂了的那種，平靜又沉穩──"
10007050-14 = "那種事情無法饒恕！強力譴責！"
10007050-15 = "沉穩的心……"
10007050-16 = "沒錯沒錯，誰能接受啊！強力譴責！"
10007050-17 = "啊啊真是的又怎麼了！難得能和老師兩個人聊很有意義的話題！"
10007050-18 = "竟敢在這種地方引起騷動，就算是客人也不能原諒！"
10007050-23 = "227號溫泉浴場．入口"
10007050-25 = "我們對「227號溫泉浴場」提出強烈抗議！"
10007050-26 = "沒錯沒錯！"
10007050-27 = "「227號溫泉浴場」必須補償工務部的損失！"
10007050-28 = "補償補償！"
10007050-30 = "都說了那是你們的誤會……"
10007050-34 = "這，這是什麼情況！工務部為什麼會來這裡！？"
10007050-35 = "啊啊，和香。那個，呃……"
10007050-37 = "哼，終於現身了啊。"
10007050-38 = "揮霍無度的布爾喬亞缺德經理，和香！"
10007050-39 = "誰，誰是「揮霍無度的布爾喬亞缺德經理」啊！？"
10007050-40 = "奢侈的生活只有一開始而已，最近我們為了經營可是忙到沒辦法休假唷！"
10007050-44 = "……咳，咳咳。"
10007050-48 = "那個，請問來「227號溫泉浴場」有什麼事嗎，工務部的各位貴賓？"
10007050-49 = "看，看看他的表情！"
10007050-50 = "那個染上資本主義的邪惡布爾喬亞笑容！"
10007050-51 = "過去一起同甘共苦的時候還沒注意到……"
10007050-52 = "獲得財富之後，就漸漸露出本性了啊，這個叛徒！"
10007050-53 = "從剛才開始就一直在胡說八道呢！？"
10007050-57 = "咳咳……實里同學，先冷靜下來，請告訴我為何在這裡示威抗議。#n否則其他客人也會很困擾的……"
10007050-58 = "哼，你們還不明白這個溫泉浴場的問題啊。"
10007050-59 = "那個……是的，可以請您告訴我們嗎？"
10007050-60 = "我們的不滿就是……"
10007050-62 = "這個溫泉浴場本身！"
10007050-64 = "那，那是什麼意思……？"
10007050-65 = "我們經營溫泉浴場這件事，對工務部造成了什麼損失嗎？"
10007050-66 = "事到如今還想裝傻嗎！我們可是全都看到了！"
10007050-67 = "邪惡格黑娜的溫泉開發部成員們，在這裡建設完溫泉浴場後颯爽離開的模樣……！"
10007050-68 = "……那有什麼問題嗎？"
10007050-69 = "當然有問題！"
10007050-70 = "溫泉開發部那些傢伙並不是我們赤冬聯邦學園的學生……"
10007050-72 = "所以這不就是外包嗎！"
10007050-73 = "[s]「……外包？」"
10007050-74 = "一直以來我們工務部，每當赤冬聯邦學園有需要進行大型土木工程的時候，#n無論是多麼艱難的工作都會率先誠實地奉獻勞力。"
10007050-75 = "雖然勞動環境相當嚴峻，但我們抱持著#n「學園的所有建築都是由我們親手建造的」的榮譽感，一直努力到了現在！"
10007050-76 = "然而新落成的溫泉浴場，現今赤冬聯邦學園最熱門的觀光聖地……#n竟然不是由我們工務部，而是由外包的社團建造的……！"
10007050-77 = "這是關乎到我們工務部尊嚴的重大問題！"
10007050-78 = "受傷了！自尊心受傷了！"
10007050-79 = "我們工務部對「227號溫泉浴場」的蠻橫提出嚴正的抗議！"
10007050-80 = "抗議，抗議！"
10007050-82 = "請，請等一下。與其說這個溫泉浴場是我們請他們修建，#n不如說是那個溫泉開發部擅自建造出來的……"
10007050-83 = "請，請老師也幫我說幾句話吧……！"
10007050-84 = "[s1]「我覺得和香某種意義上也是溫泉開發部的受害者唷？」\n[s2]「這個情況也不全都是和香希望發生的事唷。」"
10007050-85 = "……什麼，受害者？"
10007050-86 = "原來如此。我確實沒想過這種可能性……"
10007050-87 = "沒，沒錯！硬要說的話，我們也是因為溫泉開發部而「失去了舊校舍」的受害者！"
10007050-88 = "這樣啊，原來是無視你們的意願強行建造出來的啊……"
10007050-89 = "那麼和香同志……現在就和我們一起拆除這個溫泉浴場吧！"
10007050-90 = "就，就是啊。我們也不是一開始就想著要建造溫泉浴場才建造的！"
10007050-91 = "原來如此……？那麼沒有和工務部事先討論過就建造的這個「違法建築物」，#n就算拆除也沒有問題吧？"
10007050-92 = "什麼！？"
10007050-93 = "該，該說那是兩回事嗎……#n好，好不容易得到一攫千金的機會，怎麼可能自己放棄！"
10007050-94 = "什麼……！果然本性十分邪惡啊，你這個布爾喬亞矮子！"
10007050-95 = "矮，矮子……！？你到底想怎麼樣！"
10007050-96 = "我再也聽不下去了！我要強制請你們回去！"
10007050-97 = "哼，隨你高興。#n就算突然一夜致富，區區特別班的學生我們一點也不怕！"
10007050-98 = "來吧！為了我們工務部的尊嚴和勞動的權利，以及……！"
10007050-99 = "呃，唔嗯……以及許許多多，重要的事物！"
10007050-100 = "起身戰鬥吧！"

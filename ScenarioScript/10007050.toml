[translation]
10007050-1 = "ตอนที่ 5;ภารกิจสำหรับชมรมผู้รับจ้าง!"
10007050-4 = "ที่ <ออนเซ็น No.227> ของเราไม่ได้มีแค่ออนเซ็นที่ยอดเยี่ยมเท่านั้นนะคะ พวกเราน่ะยังมีสวนสวยๆ ให้ลูกค้าทุกท่านได้เดินชมด้วยค่ะ!"
10007050-5 = "แน่นอนว่าเนื่องจากที่สหภาพเรดวินเทอร์มีหิมะตกตลอดทั้งปีการตกแต่งสวนให้มีสีเขียวร่มรื่น#nเลยเป็นเรื่องยาก..."
10007050-6 = "ดังนั้นที่ <ออนเซ็น No.227> ของเราจึงใช้ทรายและหินจากซากปรักหักพังของอาคารเรียนเก่า#nมาตกแต่งเป็นธีมสวนน้ำตกจากเทือกเขาแทนค่ะ"
10007050-7 = "[s] \"สวนน้ำตกจากเทือกเขาสูงเหรอ?\""
10007050-8 = "ใช่ค่ะ สวนน้ำตกจากเทือกเขาเป็นสวนแบบดั้งเดิมที่สร้างด้วยหิน ทราย และพืชประเภทตะไคร่เท่านั้นค่ะ"
10007050-9 = "รูปแบบของสวนทั้งหมดตามคำสอนโบราณที่บอกว่าสุดท้ายแล้วทุกอย่างก็จะต้องกลับคืนสู่ดิน#nทั้งเป็นสวนที่มีความโดดเด่นด้านความงามไม่เป็นรองใครที่ไหน และสร้างขึ้นบนพื้นฐานของการ#nไม่พึ่งพาความงดงามเพียงอย่างเดียวค่ะ"
10007050-10 = "ถ้าได้ชมสวนนี้ละก็จะทำให้จิตใจสงบจนรู้สึกเหมือนการมีชีวิตอยู่บนโลกไม่ใช่แก่นสารที่สำคัญ..."
10007050-14 = "ขอประณาม! ขอประณาม!"
10007050-15 = "จะ...จิตใจที่สงบ..."
10007050-16 = "ออกไปซะ! ออกไปซะ!"
10007050-17 = "อึ่ก... คราวนี้ใครกันอีกล่ะเนี่ย?! ฉันกำลังคุยกับคุณครูสนุกๆ อยู่แท้ๆ!"
10007050-18 = "มาส่งเสียงเอะอะสร้างความวุ่นวายในรีสอร์ตที่ทุกคนกำลังพักผ่อนอยู่แบบนี้ ถึงจะเป็นลูกค้าก็เถอะ แต่ก็คงจะต้องดุสักหน่อยแล้วค่ะ!"
10007050-23 = "ทางเข้าออนเซ็น No.227"
10007050-25 = "<ออนเซ็น No.227> ที่กดขี่สิทธิของกลุ่มผู้รับจ้าง ออกไปซะ!"
10007050-26 = "ออกไปซะ! ออกไปซะ!"
10007050-27 = "<ออนเซ็น No.227> จงชดเชยค่าเสียหายให้กับชมรมผู้รับจ้างซะ!"
10007050-28 = "จ่ายค่าชดเชยมา! จ่ายค่าชดเชยมา!"
10007050-30 = "ก็บอกแล้วไงว่าเป็นเรื่องเข้าใจผิด..."
10007050-34 = "นะ...นี่มันเกิดเรื่องวุ่นวายอะไรขึ้นกันคะ? ทำไมชมรมผู้รับจ้างถึงมาอยู่ที่นี่ล่ะ?!"
10007050-35 = "คือว่า... ดูเหมือนจะมีเรื่องเข้าใจผิดอยู่น่ะ"
10007050-37 = "ฮึ่ม ในที่สุดก็โผล่มาจนได้สินะ"
10007050-38 = "ผู้จัดการที่แสนชั่วร้ายจอมเอาเปรียบ โนโดกะ!"
10007050-39 = "ผู้จัดการที่แสนชั่วร้ายจอมเอาเปรียบงั้นเหรอคะ ทำไมกล่าวหากันแบบนั้นล่ะคะ?"
10007050-40 = "ตอนนี้ที่ออนเซ็นมีลูกค้ามาใช้บริการแน่นขนัด ฉันเองก็ทำงานไม่ได้พักเลยนะคะ!"
10007050-44 = "ฮึ่ม ฮึ่ม...!"
10007050-48 = "เกิดเรื่องอะไรขึ้นที่ <ออนเซ็น No.227> ของเรากันแน่คะ?"
10007050-49 = "ดะ...ดูทำหน้าเข้าสิ!"
10007050-50 = "เหล่าสหาย! ดูรอยยิ้มแสนชั่วร้ายที่มีแต่ความหิวเงินนั่นสิ!"
10007050-51 = "ตอนที่อดทนผ่านความโหดร้ายในดินแดนหนาวเหน็บที่กว้างใหญ่ เราอาจไม่เคยสังเกต..."
10007050-52 = "แต่พอมั่งคั่งขึ้นมาก็เผยธาตุแท้ของตัวเองออกมาแล้วสินะ คนทรยศ!"
10007050-53 = "เดี๋ยวก่อน! พวกเราไปผ่านความโหดร้ายด้วยกันมาตอนไหนคะ?! แล้วก็อย่ามาตั้งชื่อแปลกๆ#nตามอำเภอใจแบบนี้สิคะ!"
10007050-57 = "ใจเย็นๆ แล้วช่วยบอกสาเหตุที่คุณประท้วงให้ทราบก่อนได้ไหมคะ คุณมิโนริ#nทำแบบนี้มันลำบากลูกค้าคนอื่นๆ นะคะ"
10007050-58 = "ฮึ่ม ยังไม่รู้ถึงปัญหาของออนเซ็นแห่งนี้อีกงั้นเหรอ"
10007050-59 = "ค่ะ ถ้าอย่างนั้นก็ช่วยบอกมาเถอะค่ะ"
10007050-60 = "เรื่องที่พวกเราไม่พอใจ..."
10007050-62 = "ทุกอย่างของออนเซ็นนี่นั่นแหละ!"
10007050-64 = "คะ? พูดอะไรเอาแต่ใจแบบนั้นคะ?!"
10007050-65 = "การที่เราเปิดให้บริการออนเซ็นนี้ สร้างความเสียหายให้กับทางชมรมผู้รับจ้างเหรอคะ?"
10007050-66 = "อย่ามาทำเป็นไม่รู้หน่อยเลย! พวกเราจับตาดูเธออยู่ตลอด!"
10007050-67 = "ตั้งแต่ตอนที่พวกชมรมพัฒนาออนเซ็นของเกเฮนน่าที่ชั่วร้ายมาสร้างออนเซ็นนี้...!"
10007050-68 = "แล้วมันมีปัญหาตรงไหนเหรอคะ?"
10007050-69 = "แน่นอนว่าต้องมีปัญหาสิ!"
10007050-70 = "พวกชมรมพัฒนาออนเซ็นไม่ใช่เด็กนักเรียนของสหภาพเรดวินเทอร์สักหน่อย..."
10007050-72 = "นั่นน่ะเป็นแรงงานจากภายนอกนะ!"
10007050-73 = "[s] \"แรงงานจากภายนอก...?\""
10007050-74 = "จนถึงตอนนี้ ชมรมผู้รับจ้างของเราเป็นผู้รับผิดชอบงานวิศวกรรมโยธาขนาดใหญ่ของทาง#nสหภาพเรดวินเทอร์ทั้งหมด และทำงานอย่างซื่อสัตย์มาโดยตลอด"
10007050-75 = "ถึงสภาพแวดล้อมการทำงานจะโหดร้ายและลำบาก... แต่พวกเราก็ภูมิใจที่สิ่งก่อสร้างทุกชนิด#nในสหภาพเรดวินเทอร์เป็นผลงานจากน้ำพักน้ำแรงของพวกเรา"
10007050-76 = "แต่แล้วออนเซ็นที่เป็นสถานที่ท่องเที่ยวยอดฮิตแห่งใหม่ของสหภาพเรดวินเทอร์กลับสร้างโดย#nแรงงานจากภายนอกแบบนี้...!"
10007050-77 = "เพราะแบบนี้เหล่าสหายในชมรมผู้รับจ้างถึงเสียความรู้สึกกันยังไงล่ะ!"
10007050-78 = "เสียความรู้สึกสุดๆ! เสียศักดิ์ศรี!"
10007050-79 = "เพราะงั้นชมรมผู้รับจ้างของเราเลยมาประท้วงให้เห็นถึงความโหดร้ายของ <ออนเซ็น No.227> ยังไงล่ะ!"
10007050-80 = "ขอประท้วง ขอประท้วง!"
10007050-82 = "ดะ...เดี๋ยวก่อนค่ะ พวกเราไม่ได้ตั้งใจที่จะสร้างออนเซ็นแห่งนี้ขึ้นมาสักหน่อย#nพวกชมรมออนเซ็นนั่นมาก่อสร้างตามอำเภอใจ..."
10007050-83 = "เดี๋ยวสิ คุณครูก็อย่าเอาแต่ยืนดูสิคะ ช่วยพูดอะไรสักอย่างสิคะ!"
10007050-84 = "[s1] \"ใช่แล้ว! โนโดกะเองก็เป็นผู้เสียหายจากทางชมรมพัฒนาออนเซ็นนะ\"\n[s2] \"ที่จริงแล้วโนโดกะก็ไม่คิดที่จะสร้างออนเซ็นแบบนี้ขึ้นมาหรอก\""
10007050-85 = "พวกเด็กนักเรียนห้องเรียนพิเศษก็เป็นผู้เสียหายจากชมรมพัฒนาออนเซ็นงั้นเหรอ?"
10007050-86 = "ฮึ่ม คิดไม่ถึงเลยนะ"
10007050-87 = "ชะ...ใช่แล้วค่ะ พวกเราเองก็เสียอาคารเรียนเก่าไปเพราะการพัฒนาของพวกชมรมพัฒนาออนเซ็น เหมือนกันนะคะ!"
10007050-88 = "ถ้ามีสิ่งก่อสร้างผิดกฎหมายถูกสร้างขึ้นในพื้นที่ที่ดูแลอยู่ คงเป็นเรื่องที่ทำใจยากมากสินะ..."
10007050-89 = "เอาละ สหายโนโดกะ ถ้างั้นตั้งแต่นี้ไปก็มาร่วมมือกับพวกเรารื้อถอนออนเซ็นแห่งนี้เถอะ!"
10007050-90 = "ชะ...ใช่แล้วค่ะ พวกเราไม่เคยคิดที่จะสร้างออนเซ็นแบบนี้ขึ้นมาเลยนะคะ!"
10007050-91 = "โฮ่... ถ้างั้นพวกเราจะรื้อถอน \"สิ่งปลูกสร้างผิดกฎหมาย\" นี่ไปก็ไม่เป็นไรสินะ?"
10007050-92 = "คะ?!"
10007050-93 = "ฉันไม่มีทางที่จะปล่อยโอกาสหายากแบบนี้ให้หลุดมือไปหรอกนะคะ!"
10007050-94 = "คิดไว้แล้วเชียวว่าเธอคงจะซ่อนตัวตนที่แท้จริงที่ร้ายกาจเอาไว้ไม่ได้... ยัยเด็กชั่วร้ายจอมเอาเปรียบ!"
10007050-95 = "อึ่ก... เพิ่งจะเจอกันแท้ๆ... เห็นคนอื่นเป็นยังไงกันแน่คะเนี่ย?"
10007050-96 = "ฉันจะไม่ยอมถูกต่อว่าเฉยๆ อีกแล้วค่ะ! ขอยื่นคำขาดให้ทาง <ชมรมผู้รับจ้าง> ออกไปจากที่นี่ทันทีค่ะ!"
10007050-97 = "ฮึ่ม คิดแล้วว่าจะต้องพูดแบบนั้น พอจู่ๆ ก็ร่ำรวยขึ้นมา เจ้าเด็กห้องพิเศษที่ถูกพักการเรียนนี่ก็เลยไม่กลัวอะไรเลยสินะ"
10007050-98 = "เหล่าสหาย! เพื่อศักดิ์ศรี สิทธิของผู้ใช้แรงงานอย่างชมรมผู้รับจ้างของเรา..."
10007050-99 = "และเพื่อสิ่งสำคัญอีกนานานับประการ..."
10007050-100 = "พวกเรา... ลุยยยย!"

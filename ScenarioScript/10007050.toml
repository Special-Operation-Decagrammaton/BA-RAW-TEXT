10007050-16 = "#na;???;물러가라! 물러가라!"
10007050-17 = "3;노도카 온천 온천장ND;05;으읏, 이번에는 또 누구인가요?! 모처럼 선생님과 좋은 이야기를 하고 있었는데!\n#3;stiff"
10007050-18 = "3;노도카 온천 온천장ND;14;모두가 느긋하게 휴식을 즐기고 있는 휴양지에서 이런 소란을 피우다니. 손님이라도 따끔히 한 마디 해야겠어요!\n#3;em;[빠직]"

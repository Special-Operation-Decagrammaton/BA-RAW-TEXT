10007050-3 = "3;노도카 온천 온천장ND;00\n#3;a\n#wait;1500"
10007050-4 = "3;노도카 온천 온천장ND;08;저희 <227호 온천장>에는 훌륭한 온천 시설뿐만 아니라, 손님 여러분의 산책을 보조하기 위한 훌륭한 정원도 갖추어져 있답니다!\n#3;greeting\n#3;em;[반짝]"
10007050-5 = "3;노도카 온천 온천장ND;99;물론 연중 내내 눈이 내리는 붉은겨울 학원의 특성상 꽃과 나무가 우거진 초록빛 정원을 꾸미는 건 어렵지만……."
10007050-6 = "3;노도카 온천 온천장ND;01;대신 저희 <227호 온천장>에는 구교사 폐허의 돌과 모래를 모아 만든 고산수식 정원이 있답니다."
10007050-7 = "[s] \"고산수식 정원?\""
10007050-8 = "3;노도카 온천 온천장ND;03;네, 고산수식 정원은 바위와 모래, 이끼만을 모아 만든 전통 정원이에요.\n#3;em;[반응]"
10007050-9 = "3;노도카 온천 온천장ND;01;모든 정원의 양식은 결국 흙으로 돌아간다는 선종의 가르침처럼 화려함에 의지하지 않고 기본을 충실하게 지켜 만든, 절제미가 돋보이는 정원이죠.."
10007050-10 = "3;노도카 온천 온천장ND;07;이 정원을 보고 있노라면, 세상사는 아무래도 상관없게 느껴질 정도의 차분한 마음이……."

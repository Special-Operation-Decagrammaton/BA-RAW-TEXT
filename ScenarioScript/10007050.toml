10007050-51 = "3;미노리;99;춥고 거친 곳에서 고락을 함께 할 때는 몰랐었는데……"
10007050-52 = "3;미노리;01;부를 거머쥐고 나니 드디어 본색을 드러냈구나, 이 변절자!"
10007050-53 = "1;노도카 온천 온천장ND;18;잠깐! 저희가 언제 고락을 함께 했었나요?! 그리고 멋대로 이상한 호칭을 붙이지 마세요!\n#1;stiff"

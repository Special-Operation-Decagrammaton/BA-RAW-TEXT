80000104-17 = "3;미노리;05;부르주아들이 만든, 자본주의의 상술과도 같은 이 날을 기념할 거라고 생각한 건 아니겠지?!"
80000104-18 = "[s] \"하지만 하루 정도라면 기념해도……\""
80000104-19 = "3;미노리;05;절대로 안 돼!\n#3;em;[!]\n#3;hophop"
80000104-20 = "3;미노리;01;오히려 그 하루이기 때문에 소비자들은 초콜릿이 비싼 가격에 팔리더라도 울며 겨자 먹기로 초콜릿을 사게 되는 거라고!"
80000104-21 = "3;미노리;01;심지어 발렌타인 초콜릿은 대체로 화려한 포장지로 덮혀있지만 그 안을 뜯어보면, 평소에도 살 수 있는 헐값의 초콜릿이 들어있지!"
80000104-22 = "3;미노리;05;이는 연인들의 애틋한 마음을 돈벌이로 취급하는…… 거대 기업의 만행이나 다름없다고!\n#3;em;…"
80000104-23 = "3;미노리;09;절대로 용납할 수 없어. 할 수만 있다면 달력에서 이 날을 지워버리고 싶을 정도야!\n#3;em;[빠직]"
80000104-24 = "[s5] \"그렇게 말하는 사람이 또 있었던 것 같지만……\"\n[s6] \"그럼 발렌타인 데이가 아니라면 무슨 용건으로……?\""

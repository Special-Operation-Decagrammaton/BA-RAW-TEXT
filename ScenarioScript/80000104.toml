[translation]
80000104-1 = "絕不容許"
80000104-2 = "啊，老師！這邊這邊！"
80000104-3 = "我在等你哦，哈哈！#n老師應該知道今天是什麼日子吧？"
80000104-4 = "……嗯？不知道？#n好吧，畢竟只是之前隨口提過一次的事，會忘記也很合情合理。"
80000104-5 = "其實今天……"
80000104-6 = "[s1]「……啊！情人節！」\n[s2]「其實我知道，是情人節對吧？」"
80000104-9 = "……？"
80000104-10 = "……老師？"
80000104-11 = "你剛才說什麼……"
80000104-12 = "[s3]「嗯？氣氛怎麼……」\n[s4]「是，是我搞錯了嗎……？」"
80000104-15 = "……老師。"
80000104-16 = "你難道認為身為工務部部長的我……"
80000104-17 = "會慶祝這種由[ruby=資產階級]布爾喬亞[/ruby]所創造、跟資本主義的詭計沒兩樣的日子嗎？"
80000104-18 = "[s]「慶祝一天應該還好吧……」"
80000104-19 = "絕對不行！"
80000104-20 = "就是因為只有一天的關係，即使巧克力賣得很貴，消費者還是會願意買單！"
80000104-21 = "更別說情人節的巧克力雖然包裝華麗，#n但打開來之後就會發現，裡頭裝的不過就是平常就能買到的便宜巧克力而已！"
80000104-22 = "這種將情侶們的深情當作賺錢工具的行為……根本就是巨大企業的惡行！"
80000104-23 = "絕對不能容許！#n如果可以的話，我甚至想把這天從日曆上抹除！"
80000104-24 = "[s5]「雖然感覺好像有人也這麼說過……」\n[s6]「如果不是情人節的話，今天找我又是為了什麼事呢……？」"
80000104-27 = "老師真的不記得了嗎……"
80000104-28 = "我們之前不是約好，今天要介紹好吃的炸豬排店給你嗎？"
80000104-29 = "快走吧。我已經打聽好這附近厲害的餐廳了。"
80000104-30 = "隨時都可能會開始排隊，趕緊出發吧！"
80000104-35 = "（隨後就和實里一起，在附近的餐廳裡用了餐）"
80000104-36 = "（確實如自信滿滿的實里所說，是一間物美價廉的餐廳）"
80000104-38 = "啊～真是太棒了。#n雖然只是用普通材料製作的平凡料理，但我真的很喜歡這種樸實的味道！"
80000104-39 = "啊，話說老師應該很忙吧？#n我記得你之後還有其他行程。"
80000104-40 = "那麼在你離開之前，請把這個……"
80000104-45 = "[ns7]「……嗯？是要給我的嗎？」\n[ns8]「你不是說你不慶祝情人節的嗎？」"
80000104-48 = "那，那個，怎麼說呢……"
80000104-49 = "我無法容許的是企業的欺壓，送巧克力的行為本身並沒有問題……"
80000104-50 = "這是我們平常工作時也喜歡吃的巧克力棒。#n雖然外表可能不怎麼樣，但口感和營養比外面賣的那些繁雜的東西好多了。"
80000104-51 = "所以……"
80000104-55 = "為，為什麼要盯著我看？#n那樣會害我很難為情的！！"
80000104-56 = "我，我先走了！！祝老師能度過美好的一天！！"
80000104-57 = "……下次見！！"
80000104-64 = "（……的確很好吃）"

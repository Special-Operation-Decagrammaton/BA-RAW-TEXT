[translation]
80000104-1 = "ถึงจะติดตามไปไม่ได้..."
80000104-2 = "ทางนี้ ทางนี้!"
80000104-3 = "กำลังรออยู่เลย ฮ่าฮ่า! รู้ใช่ไหมว่าวันนี้เป็นวันอะไร?"
80000104-4 = "หืม...? ไม่รู้งั้นเหรอ อะไรกัน ฉันเคยเล่าไปแล้วรอบหนึ่งนะ แค่นี้ก็ลืมแล้วเหรอ"
80000104-5 = "วันนี้น่ะ..."
80000104-6 = "[s1] \"อ้อ...! วันวาเลนไทน์นี่นา!\"\n[s2] \"ครูรู้อยู่แล้วแหละน่า วันวาเลนไทน์ใช่ไหมล่ะ?\""
80000104-9 = "...?"
80000104-10 = "ครู...?"
80000104-11 = "เมื่อกี้ว่ายังไงนะ..."
80000104-12 = "[s3] \"หืม? ทำไมบรรยากาศมัน...\"\n[s4] \"ผะ...ผิดเหรอ? ไม่ถูกเหรอ...?\""
80000104-15 = "ครู..."
80000104-16 = "คงไม่ได้คิดว่าหัวหน้าชมรมผู้รับจ้างอย่างฉัน..."
80000104-17 = "จะฉลองวันที่ระลึกที่พวกชนชั้นนายทุนก่อตั้งขึ้นและเป็นกลยุทธ์ทุนนิยมแบบนี้ใช่ไหม?!"
80000104-18 = "[s] \"แค่วันเดียวคงไม่เป็นไรหรอก...\""
80000104-19 = "ไม่ได้เด็ดขาด!"
80000104-20 = "ในวันแบบนี้น่ะ ต่อให้ขายช็อกโกแลตราคาแพงแค่ไหน ลูกค้าก็ได้แต่ปาดน้ำตาแล้วควักเงินออกมา#nซื้ออยู่ดี!"
80000104-21 = "นอกจากนี้ถึงจะห่อด้วยวัสดุที่ดูหรูหรายังไง แต่พอแกะออกมา มันก็เป็นช็อกโกแลตราคาถูกที่หาซื้อได้#nทั่วไปอยู่ดีนั่นแหละ!"
80000104-22 = "การหาเงินจากความจริงใจของพวกคู่รักแบบนี้... ไม่ต่างจากการกระทำที่โหดร้ายของพวกบริษัท#nนายทุนยักษ์ใหญ่เลย!"
80000104-23 = "ยกโทษให้ไม่ได้เด็ดขาด ถ้าทำได้ละก็ ฉันคงจะลบวันแบบนี้ออกไปจากปฏิทินแล้ว!"
80000104-24 = "[s5] \"ถึงเธอจะพูดแบบนั้นก็เถอะ...\"\n[s6] \"ถ้าไม่ใช่เพราะเรื่องวันวาเลนไทน์ แล้วเรียกครูออกมาทำไมน่ะ...?\""
80000104-27 = "จำไม่ได้จริงๆ งั้นเหรอ..."
80000104-28 = "วันนี้เป็นวันที่ฉันบอกว่าจะพาคุณครูไปร้านข้าวหน้าหมูทอดเจ้าดังที่อร่อยๆ ไงล่ะ"
80000104-29 = "รีบไปกันเถอะ ฉันหาร้านอร่อยๆ แถวนี้ไว้แล้ว"
80000104-30 = "ถ้าไม่รีบไปเดี๋ยวคนจะไปรอคิวกันเยอะ เพราะงั้นรีบตามมา อย่ามัวชักช้าสิ!"
80000104-35 = "(หลังจากนั้นคุณครูก็ไปกินข้าวที่ร้านอาหารใกล้ๆ กับมิโนริ)"
80000104-36 = "(อาหารที่ร้านอร่อยและให้เยอะอย่างที่มิโนริบอกเอาไว้)"
80000104-38 = "อ่า~ ดีจัง ถึงเป็นอาหารธรรมดาที่ปรุงจากวัตถุดิบทั่วไป แต่ฉันก็ชอบรสชาติที่อร่อยและเรียบง่ายแบบนี้#nที่สุด!"
80000104-39 = "อ้อ แต่พอคิดดูแล้ว คุณครูยุ่งอยู่ใช่ไหม? วันแบบนี้คงมีตารางงานแน่นขนัดเลยสินะ"
80000104-40 = "ถ้างั้นก็รับนี่ไปก่อนจะกลับไปทำงานแล้วกัน..."
80000104-45 = "[ns7] \"หืม...? ให้ครูเหรอ?\"\n[ns8] \"ไหนว่าไม่ฉลองวันวาเลนไทน์ไง?\""
80000104-48 = "ระ... เรื่องนั้นคือว่า..."
80000104-49 = "ฉันบอกว่าจะไม่เข้าไปยุ่งเกี่ยวกับพวกนายทุนหน้าเลือดเฉยๆ นะ ส่วนการให้ช็อกโกแลตแบบนี้ ถือว่าไม่มีปัญหา..."
80000104-50 = "นี่เป็นช็อกโกแลตบาร์ที่เราเอาไว้กินเวลาทำงานกัน หน้าตามันอาจดูไม่น่ากินสักหน่อย แต่มันก็อุดมไป#nด้วยสารอาหารและคุณค่าทางโภชนาการ มากกว่าของที่ดีแต่เปลือกที่วางขายกันเกลื่อนนะ"
80000104-51 = "เพราะงั้น..."
80000104-55 = "ทะ... ทำไมมองกันแบบนั้นล่ะ? มองแบบนั้นมันน่าอายนะ!!"
80000104-56 = "ถะ... ถ้างั้นฉันกลับก่อนละ!! โชคดีนะคุณครู!!"
80000104-57 = "ไว้เจอกัน...!!"
80000104-64 = "(...แล้วมันก็อร่อยอย่างที่ว่าเอาไว้จริงๆ)"

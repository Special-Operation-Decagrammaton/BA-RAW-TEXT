[translation]
80000104-1 = "I Can't Follow But..."
80000104-2 = "Ah, Sensei! This way, this way!"
80000104-3 = "I've been waiting for you, haha! You know the significance of today, right?"
80000104-4 = "...Hm? You don't? Well, I suppose we've only ever discussed the day in passing, so it's natural that you forgot."
80000104-5 = "Today is..."
80000104-6 = "[s1] \"...Oh right! Valentine's Day!\"\n[s2] \"I know. It's Valentine's Day.\""
80000104-9 = "...?"
80000104-10 = "...Sensei?"
80000104-11 = "What did you just say...?"
80000104-12 = "[s3] \"Huh? Did I step on a nerve?\"\n[s4] \"A-Am I wrong? It is Valentine's—?\""
80000104-15 = "...Sensei."
80000104-16 = "You don't think that I, the President of the Labor Party..."
80000104-17 = "...would celebrate a holiday created by the bourgeoisie to worship at the altar of capitalism?!"
80000104-18 = "[s] \"A single day can't be that ba—\""
80000104-19 = "It absolutely is!"
80000104-20 = "It's precisely because it's a single day that consumers must choke down their tears and purchase chocolates at gouged prices!"
80000104-21 = "On top of that, Valentine chocolates may be gilded in fancy wrappers, but all you find inside are cheap chocolates you could buy any other day!"
80000104-22 = "It is a celebration that leers at the tenderhearted believers in love and snares them for a payday! Yet another evil upon us unleashed by the corporate oligarchs!"
80000104-23 = "I will never forgive Valentine's Day! If I could, I would erase this cursed day from every calendar!"
80000104-24 = "[s5] \"Right, this whole conversation sounds pretty familiar...\"\n[s6] \"Well, if it's not about Valentine's Day, what did you want to talk about?\""
80000104-27 = "Do you really not remember?"
80000104-28 = "I wanted to introduce you to a great katsudon place today."
80000104-29 = "Let's hurry! The restaurant is nearby and very delicious..."
80000104-30 = "A crowd will gather very quickly if we dawdle. Come on!"
80000104-35 = "And so, I enjoyed a meal with Minori at a local katsudon spot."
80000104-36 = "Minori's confidence was well placed. The food was delicious and the servings were generous."
80000104-38 = "Ah! That was great. Delicious everyday food made with ordinary ingredients! This humble taste beats fine cuisine every time!"
80000104-39 = "Though, I imagine you're very busy today, right? I can only imagine you have other business to attend to..."
80000104-40 = "In that case, before you depart..."
80000104-45 = "[ns7] \"...Hm? Is this for me?\"\n[ns8] \"I thought you didn't celebrate Valentine's Day?\""
80000104-48 = "W-Well, you see..."
80000104-49 = "I said that I wouldn't be exploited by some vile corporations. I have no issue with giving out chocolates..."
80000104-50 = "This is the chocolate bar that we enjoy when we work. It's nothing fancy, but the spirit of worker solidarity makes it far more delicious and nutritious than whatever's being sold right now."
80000104-51 = "So..."
80000104-55 = "Wh-What are you looking at me like that for? Cease! It's embarrassing!"
80000104-56 = "In any case, I must depart!! Have a great day, Sensei!!"
80000104-57 = "...I'll see you later!"
80000104-64 = "...At the very least, my proletariat chocolate was certainly delicious."

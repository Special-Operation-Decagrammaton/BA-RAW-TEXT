[translation]
2002406-1 = "Let Them Eat..."
2002406-2 = "After taking care of business on the outskirts of campus, I headed to a nearby shopping district to get a late lunch."
2002406-4 = "Trinity District Outskirts Shopping Complex"
2002406-5 = "[ns] \"One chocosora bread, please.\""
2002406-6 = "Oh dear, this is unfortunate..."
2002406-7 = "We had such a big lunch rush today that we sold out of all the bread we have baked."
2002406-8 = "I'm afraid we don't have any left. I'm very sorry..."
2002406-9 = "[s] \"Are there any other bakeries around here?\""
2002406-10 = "I'm afraid there aren't. We're the only store in this neighborhood that sells bread... Hence why we frequently sell out at mealtimes."
2002406-11 = "I'm very sorry. Can I interest you in any other baked goods...?"
2002406-12 = "[ns] \"I was really in the mood for bread...\""
2002406-17 = "Oh, Sensei! Hello!"
2002406-18 = "What a surprise to see you all the way out here!"
2002406-19 = "What brings you to this remote shopping complex this afternoon?"
2002406-20 = "Oh, dear. You were visiting a bakery for lunch, but they were sold out?"
2002406-21 = "[s] \"Yeah. And I really wanted some bread, too...\""
2002406-22 = "Heehee... Luckily, that's a simple problem to solve!"
2002406-23 = "If there's no bread, you can eat cake."
2002406-24 = "[s] \"That sounds a bit...despotic.\""
2002406-25 = "Heehee, don't misunderstand me. I meant it literally!"
2002406-26 = "Cake is a baked mixture of flour, liquid, leavener, and other ingredients, so in form and texture it's a fairly good substitute for bread."
2002406-27 = "And it can be quite filling. I've often found that after a tea party that serves cake, I have no need for another meal."
2002406-28 = "And it just so happens that there's a made-to-order sweet shop in the neighborhood that's quite underrated. I've just picked up a whole cake from them."
2002406-29 = "And, even more coincidentally... The tea party I scheduled for this afternoon was canceled due to unforeseen circumstances, so I was left wondering who I could share this huge cake with..."
2002406-30 = "If you'd like, please split this cake with me."
2002406-32 = "Nagisa and I had a pleasant tea party and enjoyed the cake together."

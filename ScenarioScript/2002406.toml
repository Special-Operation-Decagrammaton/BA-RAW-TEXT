[translation]
2002406-1 = "สิ่งที่ใช้แทนขนมปัง"
2002406-2 = "(หลังจากเสร็จงานนอกโรงเรียน คุณครูก็มาที่ร้านค้าใกล้ๆ เพื่อซื้ออาหารกลางวันรับประทาน)"
2002406-4 = "ย่านการค้านอกโรงเรียน เขตปกครองตนเองทรีนิตี้"
2002406-5 = "[ns] \"ขอขนมปังช็อกโกแลตอันหนึ่ง\""
2002406-6 = "...ตายแล้ว ทำยังไงดีล่ะครับเนี่ย?"
2002406-7 = "กลางวันนี้มีลูกค้าเข้ามามากเป็นพิเศษ ขนมปังที่เตรียมไว้ก็เลยขายหมดแล้วน่ะครับ"
2002406-8 = "ตอนนี้ไม่มีขนมปังเหลือเลยครับ ขอโทษด้วยนะครับคุณลูกค้า"
2002406-9 = "[s] \"แถวนี้มีร้านขนมปังอื่นมั้ย?\""
2002406-10 = "ไม่มีครับ แถวนี้มีแค่ร้านของผมที่ขายขนมปัง..."
2002406-11 = "ขอโทษนะครับ แต่คุณลูกค้าคงต้องหาอย่างอื่นทานแล้วละครับ"
2002406-12 = "[ns] \"วันนี้อุตส่าห์อยากกินขนมปังแท้ๆ...\""
2002406-17 = "โอ๊ะ คุณครูคะ"
2002406-18 = "เราได้เจอกันในที่แบบนี้ด้วยเหรอคะเนี่ย บังเอิญจังเลยนะคะ"
2002406-19 = "จะว่าไป คุณครูมาหาซื้ออะไรย่านการค้าที่อยู่นอกโรงเรียนแบบนี้เหรอคะ?"
2002406-20 = "...เพิ่งทำงานแถวนี้เสร็จก็เลยจะมาซื้อขนมปังทานเป็นมื้อกลางวัน แต่ขนมปังดันขายหมดแล้วอย่างงั้น#nเหรอคะ?"
2002406-21 = "[s] \"อื้ม วันนี้ครูอยากกินขนมปังแท้ๆ เชียว...\""
2002406-22 = "ฮุฮุ... ถ้าเป็นเรื่องนั้น ฉันมีวิธีแก้ปัญหาง่ายๆ ให้ค่ะ"
2002406-23 = "ถ้าไม่มีขนมปังก็ทานเค้กสิคะ"
2002406-24 = "[s] \"พูดเหมือนเผด็จการเลย...\""
2002406-25 = "ฮุฮุ ฉันไม่ได้พูดพล่อยๆ นะคะ ฉันหมายความอย่างนั้นจริงๆ ค่ะ"
2002406-26 = "เค้กเป็นขนมอบที่มีส่วนผสมของแป้งสาลีและวัตถุดิบอื่นๆ ก็เลยทานเพื่อทดแทนขนมปังได้ค่ะ"
2002406-27 = "บางครั้งถ้าฉันได้อยู่ในพิธีชงชาที่มีเค้กด้วย ฉันก็จะทานพออิ่ม และก็ข้ามมื้ออาหารด้วยค่ะ"
2002406-28 = "...ที่จริงแล้วแถวนี้มีร้านขนมหวานลับตามสั่งอยู่ค่ะ ไม่กี่วันก่อนฉันไปสั่งเค้กก้อนใหญ่เอาไว้ วันนี้ก็เลยแวะมารับ แล้วก็ได้เจอคุณครูนี่แหละค่ะ"
2002406-29 = "บังเอิญคูณสองไปเลยนะคะ พอดีพิธีชงชาที่กำหนดไว้ตอนช่วงบ่ายถูกยกเลิกไป ฉันก็กำลังคิดอยู่ว่าจะ#nแบ่งเค้กชิ้นใหญ่นี้กินกับใครดีน่ะค่ะ..."
2002406-30 = "ถ้าคุณครูไม่ติดอะไร มาทานเค้กด้วยกันกับฉันมั้ยคะ?"
2002406-32 = "(หลังจากนั้นคุณครูกับนางิสะก็แบ่งเค้กก้อนใหญ่กันทาน และจัดพิธีชงชาอย่างสนุกสนานด้วยกัน)"

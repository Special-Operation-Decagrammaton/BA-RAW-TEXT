[translation]
2002406-1 = "#title;빵의 대용품"
2002406-2 = "#na;(학원 교외에서 업무를 처리한 뒤, 조금 늦은 점심을 해결하기 위해 가까운 상가로 향했다.)"
2002406-3 = "#all;hide"
2002406-4 = "#place;트리니티 자치구 교외 상가"
2002406-5 = "[ns] \"초코소라빵 하나 주세요.\""
2002406-6 = "3;제빵사;04;……어이쿠, 이를 어쩌죠?\n#3;a\n#3;em;[땀]"
2002406-7 = "3;제빵사;04;오늘따라 점심에 손님이 몰려드는 바람에 준비된 빵이 모두 매진되고 말았습니다."
2002406-8 = "3;제빵사;04;지금은 남아있는 빵이 없네요. 죄송합니다, 손님."
2002406-9 = "[s] \"이 근처에 다른 빵집은 없나요?\""
2002406-10 = "3;제빵사;09;네. 이 근처에서 식사용 빵을 판매하는 가게는 저희 가게뿐이라…….\n#3;em;…"
2002406-11 = "3;제빵사;09;죄송하지만 다른 가게를 찾아보셔야 할 것 같습니다."
2002406-12 = "[ns] \"빵이 먹고 싶은 기분이었는데…….\""
2002406-13 = "3;제빵사;09\n#3;d\n#wait;1000"
2002406-14 = "#all;hide\n#wait;1000"
2002406-15 = "#all;hide"
2002406-16 = "3;나기사 스탠딩;01\n#3;a\n#wait;1000"
2002406-17 = "3;나기사 스탠딩;02;어머나, 선생님.\n#3;em;[반응]"
2002406-18 = "3;나기사 스탠딩;03;이런 장소에서 뵙게 되다니, 기연이네요."
2002406-19 = "3;나기사 스탠딩;01;그보다 이런 외진 교외의 상가에는 무슨 일로 방문하신 건가요?\n#3;em;[?]"
2002406-20 = "3;나기사 스탠딩;02;……근처에서 업무를 마친 뒤 식사를 해결하기 위해 빵집을 방문했는데, 모두 매진이었다고요?"
2002406-21 = "[s] \"응. 오늘은 빵이 먹고 싶었는데…….\""
2002406-22 = "3;나기사 스탠딩;99;후후…… 그런 문제라면 간단히 해결할 수 있지요."
2002406-23 = "3;나기사 스탠딩;01;빵이 없으면 케이크를 드시면 됩니다.\n#3;em;[반짝]"
2002406-24 = "[s] \"어딘가의 폭군 같은 대사를…….\""
2002406-25 = "3;나기사 스탠딩;03;후후, 궤변을 늘어놓으려는 것이 아니라, 말 그대로의 의미였습니다.\n#3;em;[반응]"
2002406-26 = "3;나기사 스탠딩;01;케이크는 밀가루와 부재료를 섞어 구워낸 음식으로, 충분히 빵의 대체품이 될 수 있으니까요."
2002406-27 = "3;나기사 스탠딩;02;저도 종종 케이크가 포함된 다과회를 즐길 때는 배가 충분히 불러서 끼니를 거르기도 한답니다."
2002406-28 = "3;나기사 스탠딩;01;……사실 이 근처에 잘 알려지지 않은 오더 메이드 스위츠 가게가 있어서, 전에 주문했던 홀 케이크를 하나 받아 돌아오는 길이었답니다.\n#3;em;…"
2002406-29 = "3;나기사 스탠딩;02;공교롭게도 오후에 예정된 다과회가 취소되어서 이 커다란 케이크를 누구와 나누어 먹어야 할지 고민하던 참이었는데……."
2002406-30 = "3;나기사 스탠딩;03;괜찮으시다면 함께 케이크를 나누어 드시지 않겠어요?\n#3;em;[음표]"
2002406-31 = "#all;hide"
2002406-32 = "#na;(이후, 나기사와 커다란 케이크를 나누어 먹으며 즐거운 다과회를 즐겼다.)"

[translation]
10033065-2 = "วะ... ว้ายยยยยย...!"
10033065-3 = "โดนเชือดไปแล้วใช่มั้ย?!"
10033065-4 = "[ns] \"ถามแบบนั้นมัน...\""
10033065-5 = "คำถามของรุ่นพี่มาโคโตะอาจจะไม่ผิดหรอกค่ะ"
10033065-6 = "แต่พวกนั้นดูไม่เป็นอะไรเลยนะคะ"
10033065-7 = "ถ้าเป็นแบบนี้ละก็ ต่อให้มีความเป็นไปได้ที่จะเกิดความขัดแย้งทางการเมืองกับเฮียกคิยาโค แต่ฉันก็ต้องใช้วิธีที่หนักแน่นมากขึ้น...!"
10033065-8 = "ว้าย! อิโรฮะจัง! รุนแรงไปแล้วนะ! ใช้วิธีนี้จะไม่เป็นอะไรจริงๆ เหรอ?!"
10033065-9 = "ขะ... ขอให้แพนเดโมเนียม โซไซตี้ทุกคนออกจากพื้นที่นี้ก่อนนะคะ! พีน่า รบกวนด้วยค่ะ!"
10033065-10 = "อุมิกะคิดจะทำอะไรเหรอคะ?!"
10033065-11 = "ฉัน...!"
10033065-15 = "โอ้ นั่นมันอะไรน่ะ? ดูเป็นอะไรที่สุดยอดเลยนะ?"
10033065-16 = "มีคนอื่นออกมาอีกเหรอ?!"
10033065-20 = "เอ๋...? เห็นว่าได้เวลาแล้ว ฉันก็เลยพามาน่ะค่ะ... ว่าแต่นั่นมันอะไรน่ะ?!"
10033065-22 = "อืม คิราระ ฉันว่า..."
10033065-23 = "อืม~ สงสัยจะเกิดเรื่องวุ่นอีกแล้วละนะ"
10033065-28 = "ว้าย~ ทำไมหน้าตาเป็นแบบนั้นน่ะ เห็นแล้วไม่ชอบใจเลย~!"
10033065-32 = "นั่นน่ะสิ คงไม่ใช่ผีธรรมดาๆ ละมั้ง"
10033065-34 = "หืม? อะไรเหรอ? ผี? สัตว์ประหลาด? ไม่สิ... ที่นี่คือเฮียกคิยาโค งั้นก็ต้องเป็นปีศาจ?"
10033065-35 = "ตัวอะไรก็ไม่รู้ ขอยิงก่อนแล้วกัน"
10033065-40 = "นี่ หยิบอันนั้นออกมาสิ อันนั้นน่ะ!"
10033065-41 = "เธอก็คิดเหมือนกันสินะ? งั้นฉันยิงเลยนะ?"
10033065-45 = "อ๊ะ แสบนะ! โอ๊ย เจ็บ! อะไรกันน่ะ พวกเด็กเกเฮนน่า! ไม่กลัวกันเลยเหรอ?!"
10033065-47 = "โอ้ว ดูเหมือนจะได้ผลนะ สะดุ้งโหยงเลย!"
10033065-49 = "ไม่หรอก แค่นี้ยังไม่พอ ต้องจัดหนักกว่านี้!"
10033065-50 = "อื้อ! กระสุนที่เอามาด้วยยังใช้ไม่ถึงครึ่งเลย!"
10033065-52 = "ปีศาจที่เข้ามาล่อลวงมนุษย์และเอาข้าวของเครื่องใช้ไป จะต้องเจอปืนใหญ่พิฆาต! วะฮะฮ่าฮ่า!"
10033065-53 = "แบบนี้ละงานเลี้ยง! ปาร์ตี้! งานเทศกาล!"
10033065-58 = "งานเทศกาล?!"
10033065-59 = "งานเทศกาล...?"
10033065-60 = "[s] \"อื้ม... อิบูกิ! นี่คืองานเทศกาล! ไม่ต้องกลัวไปหรอกนะ!\""
10033065-61 = "!!"
10033065-62 = "กะแล้วเชียว... ค่ะ อิบูกิ นี่คืองานเทศกาลค่ะ!"
10033065-63 = "ปะ... เป็นอย่างนี้เองสินะ! งานเทศกาลงั้นเหรอ...!"
10033065-64 = "อื้ม ถ้าเป็นงานเทศกาลก็ช่วยไม่ได้นะ...! การสะกดจิตของฉันอาจไม่ได้ผลก็ได้!"
10033065-65 = "อิบูกิจัง! ถ้าไม่สนุกไปกับงานเทศกาล เราจะมาเสียเที่ยวเอานะ~!"
10033065-70 = "คะ... คนพวกนี้พูดอะไรไม่เห็นจะเข้าใจเลย...!"
10033065-71 = "ถอนกำลังก่อน!"
10033065-75 = "พวกนั้นหนีไปแล้ว ถึงจะไม่รู้ว่าคืออะไรก็เถอะ! หยุดตรงนั้นเลยนะ! พวกฉันยังยิงไม่หนำใจเลย!"
10033065-77 = "อย่าหนีสิ เจ้าพวกขี้ขลาด! แน่จริงก็มาสู้กันเลย!"
10033065-78 = "พวกเราตามไปเลยดีมั้ย?"
10033065-83 = "เอาละๆ ตามมาทางนี้ ฉันจะนำทางต่อเอง"
10033065-84 = "โธ่ ยังอยากเล่นสนุกอีกหน่อยอยู่เลย"
10033065-88 = "ทุกคนจากเกเฮนน่า ฉันต้องขอบคุณมากๆ เลยนะคะ เพราะทุกคนช่วยไว้ เราเลยกลับมาทัศนศึกษา#nตามกำหนดการได้ค่ะ"
10033065-89 = "ฮะฮ่า! ตาเฉียบมาก! นี่ละศักยภาพของเกเฮนน่า! ไม่สิ ต้องบอกว่าเป็นศักยภาพของท่านมาโคโตะผู้นี้#nต่างหาก!"
10033065-90 = "ก็นะ... ถือว่ายังดีที่ผ่านมาได้ค่ะ"
10033065-91 = "อื้ม! สนุกสุดๆ ไปเลย~!"
10033065-92 = "หวังว่าทุกคนจะสนุกกับการทดสอบความกล้าที่เหลือจนจบด้วยนะคะ แหะๆๆ..."
10033065-94 = "อ๊ะ ถ้างั้นฉันขอถ่ายรูปหน่อยได้มั้ย? ฉันอยากถ่ายรูปกับผีน่ะ!"
10033065-95 = "อืม... งั้นก็ต้องให้ผีออกมาก่อนสิ"
10033065-100 = "อะฮ่าฮ่าฮ่า ออกมาได้ตรงจังหวะเลยนะ!"
10033065-101 = "เฮ้อ... งั้นก็ช่วยไม่ได้นะ"
10033065-102 = "เอาละ ถ้างั้นผีจังก็ยิ้มด้วยนะ! หนึ่ง สอง สาม!"
10033065-109 = "(......)"
10033065-110 = "(ตารางวันนี้เกือบจะเสร็จแล้ว...)"
10033065-111 = "(แต่ก็ถือว่า... เละตุ้มเป๊ะเลย)"
10033065-112 = "(แล้วตารางที่เหลือ... ฉันจะทำได้ดีไหมนะ...?)"

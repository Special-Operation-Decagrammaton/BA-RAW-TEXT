[translation]
10033065-2 = "唔哇……！"
10033065-3 = "解決掉了嗎！？"
10033065-4 = "[ns]「這句台詞不管怎麼想都很糟糕！」"
10033065-5 = "……嗯，不過好像也不能把一切都歸咎於真琴前輩的那句台詞。"
10033065-6 = "對方的狀況還是很好呢。"
10033065-7 = "事到如今，即使要承受與百鬼夜行的政治摩擦，也必須採取更強硬的手段……！"
10033065-8 = "哇！伊呂波醬！那樣會不會太激進了！真的沒問題嗎！？"
10033065-9 = "總，總之請萬魔殿的各位先離開這裡吧！菲娜，拜託你了！"
10033065-10 = "海花打算怎麼辦！？"
10033065-11 = "我……！"
10033065-15 = "哦，那是什麼？好像有很厲害的東西耶？"
10033065-16 = "又有其他人來了！？"
10033065-20 = "哦……？因為時間到了，我就把人帶過來了……？#n那是什麼啊！？"
10033065-22 = "唔嗯，綺羅羅，這麼看來……"
10033065-23 = "又出狀況了呢～那麼……"
10033065-28 = "呀啊～看起來好噁心哦～！"
10033065-32 = "就是說啊，看起來不像是普通的幽靈。"
10033065-34 = "嗯？現在是怎樣？幽靈？怪物？#n不對……這裡是百鬼夜行，所以是妖怪嗎？"
10033065-35 = "我也不知道，總之先開槍吧。"
10033065-40 = "喂，把那個拿出來吧。那個。"
10033065-41 = "你也在想這個啊？那我就發射囉？"
10033065-45 = "痛痛痛！搞什麼啊，那些格黑娜的傢伙都不會害怕的嗎！？"
10033065-47 = "哦，好像有效哦！？他在發抖了！"
10033065-49 = "不，這個程度還不夠！"
10033065-50 = "就是啊！都還沒把帶來的彈藥打完一半呢！"
10033065-52 = "妖怪在肆虐，物品在移動，人們有困擾，以火砲將其擊退！哇哈哈哈！"
10033065-53 = "是宴會！是派對！是慶典！"
10033065-58 = "慶典！？"
10033065-59 = "…………慶典？"
10033065-60 = "[s]「啊，嗯……伊吹！這是慶典！所以不用害怕哦！」"
10033065-61 = "！！"
10033065-62 = "原來如此……沒錯，伊吹。這是慶典！"
10033065-63 = "這，這樣啊！原來是慶典嗎……！"
10033065-64 = "嗯，是慶典的話就沒辦法了……！我的催眠術不管用的事也一樣！"
10033065-65 = "伊吹醬！不享受慶典就太可惜囉～！"
10033065-70 = "這……這些傢伙到底是怎麼回事……！"
10033065-71 = "暫時撤退！"
10033065-75 = "啊，那個不知道是什麼的東西逃走了！#n站住！我們還沒射夠啊！"
10033065-77 = "別跑，卑鄙的傢伙！過來決鬥啊！"
10033065-78 = "要不要直接追上去？"
10033065-83 = "接下來請往這邊哦。我繼續為各位導覽。"
10033065-84 = "哎呀，都還沒玩夠的說。"
10033065-88 = "格黑娜學園的各位，真的很感謝你們。#n多虧有你們的幫忙……我們才能夠順利地繼續進行行程。"
10033065-89 = "嘻嘻嘻！明白了嗎！這就是我們格黑娜的實力……！#n不，要說是我真琴大人的實力也不為過！"
10033065-90 = "……我倒覺得只是碰巧而已。"
10033065-91 = "嗯！真有趣～！"
10033065-92 = "雖然有種……現在才說好像有點晚了的感覺，#n希望大家都能繼續享受後續的試膽大會。啊哈哈……"
10033065-94 = "啊，那我們可以拍照嗎？我想和幽靈拍照耶！"
10033065-95 = "呃……那也要幽靈先出來吧？"
10033065-100 = "啊哈哈哈。出現的時機剛剛好！"
10033065-101 = "……唉。嗯，那也沒辦法了。"
10033065-102 = "來，幽靈同學也一起看這邊！一、二、三！"
10033065-109 = "（……）"
10033065-110 = "（雖然一天的行程就快要結束了……）"
10033065-111 = "（……不過情況真是亂七八糟的）"
10033065-112 = "（接下來……真的會順利嗎……？）"

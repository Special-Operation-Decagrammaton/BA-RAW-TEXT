[translation]
80000017-1 = "甜蜜的加班"
80000017-2 = "夏萊．入口"
80000017-9 = "呼……終於完成伺服器維護了……"
80000017-10 = "明明只是單純的定期維護，怎麼一換日就忽然有超大量的訊息湧進來……"
80000017-11 = "害我只好不停採取應對措施，避免伺服器無法負荷，#n結果一整天都待在機房裡盯著伺服器，真是累人……"
80000017-12 = "[s]「工作到這麼晚真的辛苦你了。」"
80000017-16 = "謝謝。不過對駭客來說，這個時間還不能算晚。"
80000017-17 = "……雖然我不否認身體很疲勞。"
80000017-18 = "老師，如果可以的話，能請你買杯咖啡給我喝嗎？"
80000017-19 = "自動販賣機賣的罐裝咖啡也可以，我想快點補充咖啡因……"
80000017-24 = "[ns]把罐裝咖啡遞給千尋"
80000017-30 = "……呼，好像活過來了。"
80000017-31 = "話說回來，為什麼今天會突然有那麼多發給老師的訊息……"
80000017-32 = "而且不過才在機房待了一個晚上而已，街上的風景好像全都變了……"
80000017-33 = "……情人節？"
80000017-34 = "啊啊，原來如此。"
80000017-35 = "所以夏萊才會有DDoS攻擊等級的通知……"
80000017-36 = "……雖然已經略知一二，你果然很受歡迎呢，老師。"
80000017-37 = "[s]「總覺得有點抱歉……」"
80000017-38 = "沒關係。這也不是老師的錯。"
80000017-39 = "比起那個……結果整天都忙著維護伺服器，沒辦法準備巧克力……"
80000017-40 = "這個時間也沒有店還開著……"
80000017-41 = "唔嗯，沒辦法了。"
80000017-48 = "來，老師。這個給你。"
80000017-49 = "[s]「這是……？」"
80000017-50 = "這是我送你的情人節禮物。"
80000017-51 = "雖然嚴格來說可能不能算是「巧克力」……老師願意收下吧？"
80000017-52 = "我很喜歡這個飲料。"
80000017-53 = "是深夜想補充糖分跟咖啡因時為數不多的選擇。"
80000017-54 = "平時不太會注意到，但需要的時候非常可靠。簡直就像我的……"
80000017-58 = "……再說下去會讓你難以收下吧？"
80000017-59 = "情人節快樂。來，放輕鬆喝吧。"

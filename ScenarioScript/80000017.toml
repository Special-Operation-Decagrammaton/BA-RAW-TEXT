80000017-17 = "5;치히로;04;……다만 몸이 피로하다는 사실은 부인할 수 없겠네.\n#5;stiff"
80000017-18 = "5;치히로;02;선생님, 괜찮다면 커피 한 잔만 사주지 않을래?"
80000017-19 = "5;치히로;01;자판기에서 파는 캔 커피라도 괜찮으니까, 빨리 카페인을 보충하고 싶어…….\n#5;em;[속상함]"

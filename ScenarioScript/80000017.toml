[translation]
80000017-1 = "เติมน้ำตาลยามดึก"
80000017-2 = "ทางเข้าอาคารชาเล่ต์ตอนกลางดึก"
80000017-9 = "เฮ้อ... ซ่อมบำรุงเซิร์ฟเวอร์เสร็จสักทีนะ"
80000017-10 = "ตอนที่รับคำว่าจ้างมามันแค่งานซ่อมบำรุงทั่วไปแท้ๆ... แต่พอเปลี่ยนวันก็ดันมีเมลสอบถามส่งเข้า#nมาเยอะเต็มไปหมด..."
80000017-11 = "ต้องคอยจัดการไม่ให้ตัวเซิร์ฟเวอร์ทำงานหนักเกินไป เลยไม่ได้ออกจากห้องเซิร์ฟเวอร์ทั้งวันเลย..."
80000017-12 = "[s] \"อยู่ทำงานหนักจนดึกเลยนะ\""
80000017-16 = "ไม่หรอก สำหรับแฮ็กเกอร์แล้ว แบบนี้ยังไม่เรียกว่าดึกหรอกนะ"
80000017-17 = "แต่ก็ปฏิเสธไม่ได้หรอกว่าที่ทำอยู่แบบนี้มันเหนื่อยจริงๆ ..."
80000017-18 = "ถ้าคุณครูไม่ว่าอะไร... ช่วยซื้อกาแฟให้ฉันสักแก้วได้หรือเปล่าล่ะ?"
80000017-19 = "กาแฟกระป๋องจากตู้หยอดเหรียญก็ได้ ฉันแค่อยากเติมคาเฟอีนสักหน่อย..."
80000017-24 = "[ns] ยื่นแก้วกาแฟให้จิฮิโระ"
80000017-30 = "ฮู่ว... พอได้คาเฟอีนแล้วรู้สึกดีขึ้นมาเลย"
80000017-31 = "แต่ว่าทำไมวันนี้จู่ๆ คุณครูถึงได้เมลเยอะขนาดนี้ล่ะ?"
80000017-32 = "พอได้ออกมาทำงานข้างนอกตอนกลางคืนแบบนี้ วิวก็ดูเปลี่ยนไปเลยนะ..."
80000017-33 = "งานฉลอง <วันวาเลนไทน์> เหรอ?"
80000017-34 = "อ๋อ... วันนี้เป็นวันวาเลนไทน์นี่เอง"
80000017-35 = "เพราะงั้นชาเล่ต์เลยถูกกระหน่ำด้วยจดหมายรักแบบนี้สินะ..."
80000017-36 = "เฮ้อ... เนื้อหอมจริงๆ เลยนะ คุณครู"
80000017-37 = "[s] \"ขอโทษนะ...\""
80000017-38 = "ไม่หรอก ไม่ใช่ความผิดของคุณครูสักหน่อย"
80000017-39 = "ว่าแต่ทำยังไงดีล่ะ? ฉันมัวแต่ซ่อมบำรุงเซิร์ฟเวอร์ทั้งวันเลยไม่ได้เตรียมช็อกโกแลตให้คุณครูเลย"
80000017-40 = "ตอนนี้ร้านค้าก็คงจะปิดไปหมดแล้ว..."
80000017-41 = "อืม ช่วยไม่ได้นะ"
80000017-48 = "เอ้า คุณครู รับไปสิ"
80000017-49 = "[s] \"อะไรน่ะ...?\""
80000017-50 = "ช็อกโกแลตวาเลนไทน์จากฉันไงล่ะ หวังว่าคุณครูจะรับไว้นะ"
80000017-51 = "ถึงมันจะไม่ใช่ \"ช็อกโกแลต\" ก็เถอะ... คงไม่ปฏิเสธหรอกใช่มั้ย?"
80000017-52 = "ฉันชอบเครื่องดื่มรสช็อกโกแลตนี่มากๆ เลย"
80000017-53 = "เป็นหนึ่งในตัวเลือกไม่กี่ตัวเวลาที่อยากดื่มคาเฟอีนและของหวานๆ พร้อมกันตอนกลางคืนน่ะ"
80000017-54 = "ไม่ว่าเมื่อไรเจ้าเครื่องนั่นก็ทำหน้าที่ของตัวเองอย่างเงียบๆ อยู่ที่ตรงนั้น..."
80000017-58 = "เพราะงั้น... สิ่งที่ฉันจะมอบให้ได้ก็มีเพียงเท่านี้"
80000017-59 = "ขอให้คุณครูมีความสุขในวันวาเลนไทน์นะ"

80000017-50 = "3;치히로;02;내가 주는 발렌타인 초콜릿이야. 받아주었으면 좋겠어.\n#3;greeting"
80000017-51 = "3;치히로;05;엄밀히 말하면 '초콜릿'도 아니지만…… 그렇다고 해서 설마 거절하지는 않겠지?\n#3;em;[땀]"

80000017-9 = "5;치히로;06;하아…… 드디어 서버 점검이 끝났네…….\n#5;em;[속상함]\n#5;stiff"
80000017-10 = "5;치히로;04;분명 의뢰받은 내용은 단순한 정기 점검 업무뿐이었는데. 날짜가 바뀌자마자 갑자기 엄청난 양의 메일이 쏟아지기 시작해서……."
80000017-11 = "5;치히로;06;과부하가 일어나지 않도록 계속 대응하느라, 하루종일 서버실에서 나갈 수가 없었어…….\n#5;em;[땀]\n#5;greeting"

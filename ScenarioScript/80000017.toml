80000017-30 = "3;치히로;03;……하, 카페인이 들어가니 조금은 살 것 같네.\n#3;em;[반짝]\n#3;greeting\n#3;a"
80000017-31 = "3;치히로;01;그나저나 어째서 오늘따라 갑자기 선생님에게 대량의 메일이 쏟아진 거지?"
80000017-32 = "3;치히로;01;게다가 철야를 하고 나오니 뭔가 거리의 풍경도 바뀐 것 같고……."
80000017-33 = "3;치히로;02;……<발렌타인 데이>, 기념행사?\n#3;em;[...]"
80000017-34 = "3;치히로;03;아아, 오늘이 발렌타인 데이였구나."
80000017-35 = "3;치히로;04;그래서 샬레에 디도스 공격이 연상될 정도의 무수한 러브레터가 쏟아진 건가…….\n#3;em;[땀]\n#3;stiff"
80000017-36 = "3;치히로;03;……헤에. 인기 많구나, 선생님."
80000017-37 = "[s] \"……미안해.\""
80000017-38 = "3;치히로;01;아니야. 선생님의 잘못도 아닌걸.\n#3;em;[반응]"
80000017-39 = "3;치히로;06;그나저나 이를 어쩌지? 나는 하루종일 서버를 점검하느라 선생님에게 줄 초콜릿을 준비하지 못했는데."

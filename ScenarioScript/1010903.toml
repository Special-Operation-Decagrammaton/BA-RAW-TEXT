[translation]
1010903-1 = "ไร้กลิ่น"
1010903-2 = "ห้องโนอาในหอพักมิลเลเนียม"
1010903-4 = "เชิญค่ะคุณครู ฉันกำลังรออยู่เลยค่ะ"
1010903-5 = "พอได้เจอคุณครูหลายๆ ครั้งติดต่อกันในห้องของฉัน มันก็รู้สึกแปลกๆ นะคะ"
1010903-6 = "[s1] \"สบายดีมั้ย หายป่วยหรือยัง?\"\n[s2] \"ร่างกายเป็นยังไงบ้าง?\""
1010903-9 = "ฉันดีขึ้นมากแล้ว ต้องขอบคุณคุณครูด้วยนะคะ ถึงจะยังมีไข้อ่อนๆ แต่ฉันก็ทำอะไรเล็กๆ น้อยๆ ได้ ไม่เป็นปัญหาค่ะ"
1010903-10 = "แต่ว่ายูกะจังบอกว่าให้พักผ่อนจนกว่าจะหายดี และระหว่างนี้ก็ไม่ต้องลงมาทำงานของเซมิน่า"
1010903-11 = "แต่พอฉันเอาแต่นั่งอ่านหนังสืออยู่ในห้อง ก็รู้สึกเหมือนร่างกายมันซมๆ ค่ะ"
1010903-12 = "ฉันก็เลยเชิญให้คุณครูมาหาเพราะเรื่องส่วนตัว ทั้งๆ ที่คุณครูไม่ได้มีวันหยุดมานานแล้วแท้ๆ ต้องขอโทษด้วยนะคะ"
1010903-13 = "ฉันอายที่เหมือนจะเอาเรื่องเจ็บป่วยของตัวเองมาอ้าง ครั้งนี้คุณครูจะ... ยกโทษให้กับการทำตัว#nเหมือนเด็กของฉันได้มั้ยคะ?"
1010903-14 = "[s3] \"เรื่องนั้นไม่ต้องกังวลนะ\"\n[s4] \"ต่อให้ไม่มีเรื่องอะไรก็เรียกหาครูได้ตลอดเลย\""
1010903-17 = "ฮุฮุ... ฉันกะไว้แล้วค่ะว่าคุณครูจะพูดอย่างนี้"
1010903-18 = "งั้นเรามาเริ่มจัดห้องกันเลยมั้ยคะ?"
1010903-19 = "ปากบอกว่าจัดห้องก็จริง... แต่ในห้องนี้มันก็ไม่มีของอะไรให้จัดเลยค่ะ"
1010903-20 = "ฉันควรจะเติมเต็มห้องว่างๆ นี้ด้วยอะไรดี ถึงจะไม่รบกวนและทำให้จิตใจผ่อนคลายได้คะ?"
1010903-21 = "[s] \"ครูรู้ว่าจะเป็นแบบนี้ เลยเตรียมของตกแต่งมาให้ด้วย\""
1010903-27 = "นี่มัน... ถ้วยรางวัลเหรอคะ?"
1010903-28 = "[s] \"ครูแวะไปที่เซมิน่า แล้วเอาถ้วยรางวัลที่โนอาเคยได้มาน่ะ\""
1010903-29 = "ถ้วยรางวัลทั้งหมดนี้เป็นของฉันงั้นเหรอคะ?"
1010903-30 = "พออ่านดูดีๆ ก็จริงด้วยนะคะ อันนี้คือถ้วยรางวัลที่ฉันประกวดเขียนคำขวัญตอนปีหนึ่ง ส่วนอันนี้ก็ได้มา#nจากการประกวดงานเขียนในโรงเรียน..."
1010903-31 = "และถ้วยรางวัลนี้คือรางวัลใหญ่ที่ได้จากมิลเลเนียมไพรซ์คราวก่อนค่ะ คิดถึงตอนนั้นจัง... ฮุฮุ"
1010903-32 = "ฉันไม่รู้เลยค่ะว่าตัวเองเคยได้รางวัลมากมายขนาดนี้ ปกติฉันไม่ได้ไปรับรางวัลด้วยตัวเอง และจะเก็บไว้ที่เซมิน่าค่ะ"
1010903-33 = "จะว่าไป ถ้วยรางวัลพวกนี้มันเกี่ยวอะไรกับการแต่งห้องของฉันเหรอคะ?"
1010903-34 = "[s] \"ครูจะเอาวางตกแต่งไว้ทั่วห้องเลย!\""
1010903-35 = "อย่างนี้สินะ ถ้าเราเก็บรางวัลที่เคยได้ไว้ในที่ที่มองเห็นได้ชัดเจน นอกจากเรื่องสุนทรียภาพแล้ว มันยังช่วยให้เรานึกถึงความทรงจำดีๆ ที่เกี่ยวข้องกับความสำเร็จนั้นด้วย..."
1010903-36 = "เป็นข้อเสนอที่ไม่เลวเลยนะคะ"
1010903-37 = "งั้นลองเอามาวางตกแต่งห้องดูมั้ยคะ?"
1010903-39 = "(ครู่ต่อมา...)"
1010903-41 = "อืม..."
1010903-42 = "[s] \"อืม...\""
1010903-43 = "ฉันว่ามัน... ออกจะ..."
1010903-44 = "[s] \"ก็จริงนะ มันออกจะ...\""
1010903-45 = "นอกจากจำนวนที่เยอะกว่าที่คิดแล้ว ฉันว่าถ้วยรางวัลที่วางเรียงกันบนพื้นจะทำให้เดินในห้องไม่สะดวก#nเท่าไร..."
1010903-46 = "ฉันว่าถ้วยรางวัลที่วางไว้เต็มห้องมันกระตุ้นจิตวิญญาณการแข่งขันของฉันด้วยค่ะ แค่เห็นพวกมันฉันก็#nรู้สึกเหนื่อยแล้ว"
1010903-47 = "[s5] \"ไม่เป็นไรนะ ครูเอาอย่างอื่นมาด้วย นี่ไง\"\n[s6] \"งั้นเปลี่ยนมาตกแต่งด้วยอันนี้แทนแล้วกัน!\""
1010903-54 = "นี่มัน... หนังสือนี่คะ?"
1010903-55 = "[s7] \"อื้อ ก็โนอาชอบหนังสือไม่ใช่เหรอ?\"\n[s8] \"ถ้ามีกองดองในห้อง ห้องก็อาจจะมีชีวิตชีวาก็ได้นะ\""
1010903-58 = "ถ้าฉันไปที่ชั้นหนังสือหรือร้านหนังสือมือสองแล้วมองดูผนังที่เต็มไปด้วยหนังสือ ฉันก็จะรู้สึกสบายใจค่ะ"
1010903-59 = "แล้วถ้ามีหนังสือวางไว้ใกล้ตัว การอ่านหนังสือก็จะสะดวกสบายขึ้นด้วย..."
1010903-60 = "งั้นลองแต่งห้องด้วยหนังสือตามที่คุณครูแนะนำดูมั้ยคะ?"
1010903-62 = "(ครู่ต่อมา...)"
1010903-64 = "ฉันว่า..."
1010903-65 = "[s] \"ไม่โอเค... ใช่มั้ย?\""
1010903-66 = "ค่ะ... ฉันว่าถ้าจัดไว้แบบนี้ ก็น่าจะเดินไปเดินมาในห้องได้ไม่สะดวกค่ะ"
1010903-67 = "มันน่าจะเป็นประโยชน์ตอนต่อสู้แล้วต้องหาที่กำบัง แต่ว่าฉันไม่มีเรื่องให้ต่อสู้ในห้องค่ะ"
1010903-68 = "ขอโทษด้วยนะคะ แต่ฉันคงแต่งห้องแบบนี้ไม่ได้ค่ะ"
1010903-69 = "[s] \"มะ... ไม่เป็นไร ครูยังมีของอย่างอื่นเหลืออยู่!\""
1010903-71 = "(หลังจากนั้นคุณครูก็ตกแต่งห้องของโนอาด้วยของที่เตรียมมา...)"
1010903-73 = "อืม... ตุ๊กตาเพโรโร่ตัวใหญ่นี้ก็ช่วยสร้างบรรยากาศได้อยู่..."
1010903-74 = "แต่พอคิดว่ามีสายตาแปลกๆ จ้องมองฉันอยู่ ก็รู้สึกว่าจะนอนฝันร้ายเลยค่ะ..."
1010903-77 = "สระน้ำพกพานี้ก็ช่วยให้สดชื่น แต่มันน่าจะทำให้ห้องชื้นเกินไปหรือเปล่าคะ?"
1010903-78 = "ฉันกังวลเรื่องน้ำท่วมห้องตอนเติมน้ำจนเต็มสระด้วยค่ะ"
1010903-80 = "(แต่ก็ถูกปฏิเสธทุกชิ้น...)"
1010903-82 = "นี่ไม่ใช่งานง่ายๆ เลยนะคะ..."
1010903-83 = "ขอโทษค่ะ คุณครูอุตส่าห์หาของมาตกแต่งห้องให้ฉัน แต่ฉันก็เอาแต่ปฏิเสธ"
1010903-84 = "[s] \"ไม่หรอก ครูมากกว่าที่ต้องขอโทษที่ช่วยอะไรไม่ได้\""
1010903-88 = "ฉันว่าสำหรับฉันแล้ว พื้นที่ที่ไม่มีเอกลักษณ์ส่วนตัวน่าจะเหมาะกับฉันที่สุดแล้วค่ะ"
1010903-89 = "ทุกคนล้วนมีสถานที่ที่เหมาะสมกับตัวเอง ถ้าฝืนใจเปลี่ยนสถานที่นั้นก็จะมีแต่ทำให้เราฝืนใจอยู่ในที่#nตรงนั้นด้วย..."
1010903-90 = "วันนี้แค่ได้ทำตัวเหมือนเด็กอย่างนี้กับคุณครู ฉันก็พอใจแล้วค่ะ ฮุฮุ"
1010903-91 = "[s9] \"จริงๆ มีอีกอย่างหนึ่งที่ครูยังไม่ได้เอาออกมา...\"\n[s10] \"ถ้าไม่ว่าอะไร รับสิ่งนี้จากครูไว้ได้มั้ย?\""
1010903-98 = "นี่มัน... เครื่องหอมนี่คะ?"
1010903-99 = "ฉันว่าน่าจะเอาไว้ในห้องได้นะคะ ว่าแต่ทำไม...?"
1010903-100 = "[s] \"เพราะอารมณ์ของคนก็ได้รับอิทธิพลจากสิ่งที่มองไม่เห็นเหมือนกัน\""
1010903-102 = "[ns11] \"ถ้าให้ห้องมีกลิ่นหอมๆ ก็น่าจะช่วยให้ผ่อนคลายได้บ้างนะ\"\n[ns12] \"ต่อให้ไม่มีอะไรตกแต่ง แต่ถ้ามีกลิ่นหอมก็น่าจะอารมณ์ดีขึ้นได้นะ\""
1010903-106 = "จริงด้วยนะคะ... เป็นความคิดที่ดีเลยค่ะ"
1010903-107 = "เอกลักษณ์ที่สำคัญที่สุดของเราอาจเป็นสิ่งที่มองไม่เห็นได้ด้วยตาอย่างที่คุณครูว่าเลยค่ะ"
1010903-111 = "เครื่องหอมที่คุณครูเอามา... มีกลิ่นหอมอ่อนๆ เหมือนดอกลิลลี่ที่เปียกฝนเลย"
1010903-112 = "คุณครูเฝ้าดูฉันและเลือกกลิ่นนี้มาโดยเฉพาะเหรอคะ?"
1010903-113 = "[s] \"ที่จริงครูก็ไม่ได้คิดแบบนั้นตอนเลือกหรอกนะ...\""
1010903-114 = "ฮุฮุ ไม่ต้องแก้ตัวก็ได้ค่ะ"
1010903-115 = "เพราะเรื่องนั้นน่ะ... ฉันล้อเล่นค่ะ"

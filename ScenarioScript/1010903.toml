[translation]
1010903-1 = "#title;무취"
1010903-2 = "#place;밀레니엄 기숙사 내 노아의 방"
1010903-3 = "3;노아 파자마;03\n#3;a\n#wait;1000"
1010903-4 = "3;노아 파자마;03;어서 오세요, 선생님. 기다리고 있었답니다.\n#3;em;[음표]"
1010903-5 = "3;노아 파자마;01;뭔가 제 방에서 선생님을 연달아 뵙게 되니 묘한 기분이네요."
1010903-6 = "[s1] \"잘 지냈어, 노아?\"\n[s2] \"몸은 좀 어때?\""
1010903-7 = "#wait;100"
1010903-8 = "#wait;100"
1010903-9 = "3;노아 파자마;03;덕분에 많이 좋아졌어요. 약간의 열이 남아 있긴 하지만, 가벼운 일 정도는 무리 없이 수행할 수 있을 정도랍니다."
1010903-10 = "3;노아 파자마;07;다만 유우카 쨩은 완전히 나을 때까지 세미나에 나오지 말고 쉬라고 해서……\n#3;em;…"
1010903-11 = "3;노아 파자마;02;계속 방 안에 앉아서 독서만 하다 보니 조금은 좀이 쑤시는 것 같아서요."
1010903-12 = "3;노아 파자마;01;그래서 죄송스럽게도 모처럼의 휴일에 선생님을 제 개인적인 일에 모시고 말았네요."
1010903-13 = "3;노아 파자마;03;아픈 걸 핑계 삼는 것 같아 부끄럽지만, 이번만큼은 제 어리광을…… 용서해 주시겠어요?\n#3;em;[하트]"
1010903-14 = "[s3] \"신경 쓰지 마.\"\n[s4] \"큰 일이 없더라도 언제든지 불러줘.\""
1010903-15 = "#wait;100"
1010903-16 = "#wait;100"
1010903-17 = "3;노아 파자마;01;후후…… 선생님이시라면 그렇게 말씀해 주실 줄 알았어요.\n#3;em;[재잘]"
1010903-18 = "3;노아 파자마;05;그럼 바로 방 정리를 시작해 볼까요?"
1010903-19 = "3;노아 파자마;07;……정리라고 하기에는 애초에 방에 진열한 물건도 없지만요.\n#3;em;…"
1010903-20 = "3;노아 파자마;01;이 빈방을 무어로 채워야 거슬리지 않으면서도 마음에 여유를 가져다줄 수 있을까요?"
1010903-21 = "[s] \"그럴 줄 알고 몇 가지 물건을 챙겨 왔어.\""
1010903-22 = "#st;[0,0];instant;1;"
1010903-23 = "#clearST"
1010903-24 = "#wait;1500"
1010903-25 = "#wait;1000"
1010903-26 = "3;노아 파자마;02\n#3;em;…\n#wait;2500"
1010903-27 = "3;노아 파자마;04;이건…… 트로피?\n#3;em;[?]"
1010903-28 = "[s] \"오는 길에 세미나에 들려 노아가 그동안 받았던 트로피를 모두 가져왔어.\""
1010903-29 = "3;노아 파자마;04;이 트로피들이 모두 제가 받은 거라고요?"
1010903-30 = "3;노아 파자마;02;자세히보니 그렇네요. 이건 1학년 때 참가한 슬로건 공모전에서 받은 트로피고, 이건 교내 백일장 때 받은 트로피고……"
1010903-31 = "3;노아 파자마;01;이건 지난 밀레니엄 프라이스에서 받은 대상 트로피네요. 그리워라…… 후후.\n#3;em;[재잘]"
1010903-32 = "3;노아 파자마;02;보통 이런 트로피는 수령하지 않고 세미나에 그대로 보관해서 몰랐었는데, 이렇게 보니 꽤 양이 상당하네요."
1010903-33 = "3;노아 파자마;08;그런데 이 트로피가 방 인테리어와 무슨 상관이 있나요?\n#3;em;[?]"
1010903-34 = "[s] \"이 트로피를 방 곳곳에 배치하는 거야!\""
1010903-35 = "3;노아 파자마;05;과연. 과거의 수상 기록을 눈에 잘 뜨이는 곳에 둔다면, 심미적으로도 나쁘지 않고, 성공과 관련된 좋은 기억도 계속해서 떠올릴 수 있을 테니……\n#3;em;…"
1010903-36 = "3;노아 파자마;03;나쁘지 않은 제안인 것 같네요."
1010903-37 = "3;노아 파자마;01;그럼 바로 배치해 볼까요?\n#3;em;[반짝]"
1010903-38 = "#all;hide"
1010903-39 = "#na;(잠시 후……)"
1010903-40 = "3;노아 파자마;02"
1010903-41 = "3;노아 파자마;02;으음……\n#3;em;…"
1010903-42 = "[s] \"으음……\""
1010903-43 = "3;노아 파자마;04;역시…… 조금 그렇죠?"
1010903-44 = "[s] \"역시 조금 그렇네……\""
1010903-45 = "3;노아 파자마;04;숫자가 생각보다 많았던 것은 둘째치더라도, 바닥에 트로피를 그대로 진열하니 동선을 방해할뿐더러……"
1010903-46 = "3;노아 파자마;09;방을 가득 메운 트로피가 묘하게 승부욕을 자극하는 것 같아서, 어쩐지 보고 있노라면 더 피곤해지는 기분이네요.\n#3;em;[세로선]"
1010903-47 = "[s5] \"괜찮아. 혹시 몰라서 다른 물건도 가져왔으니까.\"\n[s6] \"이번 인테리어의 주제는…… 이거야!\""

1010903-98 = "3;노아 파자마;02;이건…… 방향제인가요?\n#3;em;[반응]"
1010903-99 = "3;노아 파자마;08;방향제를 방에 두는 것은 상관없지만, 어째서……?"
1010903-100 = "[s] \"사람의 기분은 눈에 보이지 않는 요소에도 크게 좌우되니까.\""
1010903-101 = "#wait;1000"
1010903-102 = "[ns11] \"시각적으로는 쓸쓸해 보이는 공간이라도—\"\n[ns12] \"좋은 냄새로 기억된다면 기분만큼은 풍성할 거야.\""
1010903-103 = "#wait;100"
1010903-104 = "#wait;100"
1010903-105 = "3;노아 파자마;02\n#3;em;…\n#wait;2500"
1010903-106 = "3;노아 파자마;03;……네, 좋은 생각이네요.\n#3;em;[음표]"
1010903-107 = "3;노아 파자마;01;선생님의 말씀처럼 가장 중요한 개성은 눈에 드러나지 않는 법이니까요."
1010903-108 = "#st;[0,0];instant;1;"
1010903-109 = "#clearST"
1010903-110 = "3;노아 파자마;01\n#3;m2\n#wait;1500"
1010903-111 = "3;노아 파자마;99;어디, 선생님께서 가져오신 방향제는…… 비에 젖은 백합 같은 아늑하고 달콤한 향이 나네요.\n#3;greeting"
1010903-112 = "3;노아 파자마;01;혹시 그동안 저를 보면서 이런 향을 떠올리신 건가요?\n#3;em;[하트]"
1010903-113 = "[s] \"그런 생각으로 향을 고른 건 아니지만……\""
1010903-114 = "3;노아 파자마;01;후후, 변명하지 않으셔도 괜찮아요.\n#3;em;[재잘]\n#3;m3"
1010903-115 = "3;노아 파자마;99;이건 어디까지나…… 농담이니까요."

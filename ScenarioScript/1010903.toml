1010903-54 = "3;노아 파자마;02;이건…… 책인가요?\n#3;em;[반응]"
1010903-55 = "[s7] \"응. 노아는 책 읽는 걸 좋아하잖아?\"\n[s8] \"책을 방 곳곳에 쌓아두면 분위기가 살아날 거야.\""
1010903-56 = "#wait;100"
1010903-57 = "#wait;100"
1010903-58 = "3;노아 파자마;05;확실히, 서가나 고서점에 갔을 때 벽 가득히 쌓여 있는 책을 보고 있노라면 마음이 편해지곤 했었죠."
1010903-59 = "3;노아 파자마;02;게다가 손이 닿기 편한 곳에 언제나 책이 있다면 독서를 할 때도 편할 것 같고……"
1010903-60 = "3;노아 파자마;03;한 번 선생님의 말씀대로 정리해 볼까요?\n#3;em;[반짝]"
1010903-61 = "#all;hide"
1010903-62 = "#na;(잠시 후……)"
1010903-63 = "3;노아 파자마;04"
1010903-64 = "3;노아 파자마;04;역시……\n#3;em;…"
1010903-65 = "[s] \"조금 그렇지……?\""
1010903-66 = "3;노아 파자마;07;네…… 이 구성도 마찬가지로 동선에 방해가 될 것 같네요."
1010903-67 = "3;노아 파자마;09;전투 중 엄폐를 할 때는 도움이 될 것 같지만, 방 안에서 전투를 할 일은 거의 없으니까요."
1010903-68 = "3;노아 파자마;07;죄송하지만 이 인테리어도 쓰기 어려울 것 같네요."
1010903-69 = "[s] \"괘, 괜찮아. 아직 다른 물건들이 남아 있으니까!\""
1010903-70 = "#all;hide"
1010903-71 = "#na;(이후, 가져온 다른 물건들로 인테리어를 제안해 보았지만……)"
1010903-72 = "3;노아 파자마;04"
1010903-73 = "3;노아 파자마;04;으음…… 이 거대한 페로로 인형은 살풍경한 분위기를 해소하는 데에는 도움이 되겠지만……\n#3;em;…"
1010903-74 = "3;노아 파자마;07;묘한 시선이 부담스러워서 방 안에 두면 뭔가 악몽을 꿀 것 같네요……"
1010903-75 = "#all;hide"
1010903-76 = "3;노아 파자마;04"
1010903-77 = "3;노아 파자마;04;이 간이 풀장은 산뜻하긴 하지만, 기숙사 방 안에 두기에는 너무 습하지 않을까요?\n#3;em;…"
1010903-78 = "3;노아 파자마;07;물을 채웠을 때의 하중이 걱정되기도 하고요."
1010903-79 = "#all;hide"
1010903-80 = "#na;(……모두 기각되고 말았다.)"
1010903-81 = "3;노아 파자마;09"
1010903-82 = "3;노아 파자마;09;……역시 쉽지 않은 작업이네요.\n#3;em;[한숨]"
1010903-83 = "3;노아 파자마;07;죄송해요. 모처럼 이것저것 권해주셨는데 거절밖에 하지 못해서."
1010903-84 = "[s] \"아냐, 오히려 도움을 주지 못해서 내가 더 미안해.\""
1010903-85 = "#st;[0,0];instant;1;"
1010903-86 = "#clearST"
1010903-87 = "3;노아 파자마;99\n#3;em;…\n#wait;2500"
1010903-88 = "3;노아 파자마;01;역시 제게는 이 개성 없는 공간이 제일인 것 같네요."
1010903-89 = "3;노아 파자마;02;사람에게는 저마다 어울리는 장소가 있는 법인데, 무리하게 스스로를 바꾸어봤자 금세 탈만 날 뿐이니……"
1010903-90 = "3;노아 파자마;03;오늘은 선생님께 이 정도의 어리광을 부린 것만으로도 분에 넘치게 즐거웠답니다. 후후.\n#3;em;[음표]"
1010903-91 = "[s9] \"사실 아직 시험해 보지 않은 것이 하나 더 있는데……\"\n[s10] \"괜찮다면 이것만이라도 받아주지 않을래?\""

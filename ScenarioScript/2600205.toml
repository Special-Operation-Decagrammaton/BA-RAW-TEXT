[translation]
2600205-1 = "想克服的心"
2600205-2 = "（前往學生餐廳之前，事先討論要做什麼料理，決定菜單）"
2600205-3 = "（今天的菜單是豬肉味噌湯）"
2600205-4 = "呼……"
2600205-5 = "[s]「緊張嗎？」"
2600205-6 = "可能吧……雖然我每次料理失敗時，都會努力檢討原因……"
2600205-7 = "但都是自己一個人手忙腳亂，#n都沒像這樣思考過一個確切的流程。"
2600205-8 = "可是，如果和老師一起的話……"
2600205-9 = "說不定我就可以找出原因，之後做料理都不會失敗了！"
2600205-11 = "總之我們先來處理材料……"
2600205-12 = "[s]「等等！在正式料理之前先確認好。」"
2600205-13 = "咦？確認？"
2600205-14 = "[s]「嗯，至少今天……」"
2600205-16 = "[s1]「不要用食譜上沒寫的工具。」\n[s2]「不要用食譜上沒寫的材料。」\n[s3]「不要嘗試食譜上沒寫的方法，OK？」"
2600205-17 = "我，我知道了……"
2600205-18 = "我，我知道了……"
2600205-19 = "我，我知道了……"
2600205-20 = "老師的意思是要我先別管效率，先集中在實驗上面囉。"
2600205-21 = "[s]「原來平常都是考慮到效率才變成那樣嗎……」"
2600205-22 = "既然這次決定要聽老師的話了。"
2600205-23 = "那我會乖乖照著食譜做的！"
2600205-25 = "（就這樣，和茱莉一起試著做了豬肉味噌湯……）"
2600205-28 = "完成了！老師！"
2600205-29 = "[s]「好，辛苦了。那快來嚐嚐吧。」"
2600205-30 = "……咕嚕！"
2600205-38 = "[ns]「這，這是……？！」"
2600205-39 = "怎、怎麼樣？"
2600205-40 = "[s4]「又酸，又鹹，又甜，又辣……？」\n[s5]「從沒嚐過這樣的豬肉味噌湯……」"
2600205-41 = "咦？！"
2600205-42 = "咦？！"
2600205-43 = "怎、怎麼會？！"
2600205-44 = "[s]「嗯……！前提要件換一下吧！」"
2600205-45 = "（這次決定不用茱莉帶來的材料，而是用新準備的材料來製作）"
2600205-46 = "問題可能出在我帶來的食材上，"
2600205-47 = "我這次就用老師買來的材料試試吧……"
2600205-48 = "那麼……"
2600205-49 = "重做一遍！"
2600205-52 = "完，完成了！"
2600205-53 = "[s]「那麼，我開動了……」"
2600205-60 = "怎、怎麼樣？！"
2600205-61 = "[s]「辣辣甜甜，鹹鹹酸酸……！」"
2600205-62 = "怎，怎麼會……？！"
2600205-63 = "[s]「再來！換做法試試吧！」"
2600205-64 = "這，這次要怎麼做呢……？！"
2600205-65 = "（這次試著邊煮邊試味道，慢慢進行微調）"
2600205-66 = "[s]「用這個方法的話……！」"
2600205-70 = "[ns]「這次超鹹！？」"
2600205-71 = "（打擊！）"
2600205-72 = "[s]「再來……！」"
2600205-73 = "（這次換我先做到一半，最後交給茱莉收尾）"
2600205-78 = "[ns]「以下……皆同！」"
2600205-80 = "（在那之後又挑戰了數次，但茱莉每次製作的料理，味道都很奇怪）"
2600205-81 = "（甚至全照食譜做好，最後只讓茱莉把湯勺放進去，還是會讓味道變得很詭異）"
2600205-82 = "[s]「……難道這是神蹟？」"
2600205-83 = "嗚……"
2600205-84 = "嗚啊啊啊～！這什麼神蹟！一點也高興不起來！"
2600205-85 = "我，我……"
2600205-86 = "我只是想要好好完成一道料理而已～！"
2600205-87 = "[s]「嗯嗯……」"
2600205-88 = "難得……"
2600205-89 = "難得老師都特地來幫我了，結果我卻……"
2600205-90 = "雖然失敗對我來說是家常便飯。"
2600205-91 = "但今天有老師陪我……"
2600205-92 = "我還下定決心一定要找出原因，"
2600205-93 = "今天一定要讓老師看到我成功做出料理……"
2600205-94 = "嗚嗚……對不起……老師……"
2600205-95 = "[s]「沒事。」"
2600205-97 = "[s]「現在放棄還太早了。」"
2600205-98 = "……老師？"
2600205-99 = "[s]「從頭再來一次，一步一步慢慢嘗試吧。」"
2600205-100 = "……？"
2600205-101 = "[s]「別在意，失敗的話再重做就好。」"
2600205-103 = "[s6]「如果有錯，就再嘗試別的方法。」\n[s7]「我很清楚，茱莉一直以來都是這麼努力的。」"
2600205-104 = "老師……"
2600205-105 = "老師……"
2600205-106 = "……"
2600205-107 = "老師……！"
2600205-108 = "[s]「嗯？怎麼了？」"
2600205-109 = "沒錯，老師說得對……！"
2600205-110 = "我不禁說出喪氣話了。"
2600205-111 = "我可是供給部成員，而且我努力了這麼久，不能就這麼輕易放棄了。"
2600205-112 = "也是為了老師……！我還可以繼續努力，我可以的！"
2600205-115 = "[s]「啊……茱莉？」"
2600205-116 = "老師的手，跟我想得一樣……"
2600205-117 = "好溫暖。"
2600205-118 = "老師，你可以像這樣握著我的手嗎？再一下就好。"
2600205-119 = "幫我加油打氣，讓我重新來過……這次我想從菜刀的握法開始，好好從頭來過。"
2600205-120 = "麻煩老師，再陪我任性一下了！"
2600205-122 = "（之後也繼續和茱莉一起挑戰了好幾次料理）"

[translation]
2600205-1 = "A Girl's Determination"
2600205-2 = "(Juri and I decided what to cook right before meeting up at the student dining hall.)"
2600205-3 = "(Miso soup will be today's dish.)"
2600205-4 = "*inhale* *exhale*"
2600205-5 = "[s] \"Are you nervous?\""
2600205-6 = "Yes. I try to figure out what went wrong every time I fail."
2600205-7 = "Cooking is always a struggle, let alone when I try something new like this."
2600205-8 = "But if we can figure out what I've been doing wrong thus far..."
2600205-9 = "...then I'll be able to focus on cooking without making any mistakes!"
2600205-11 = "Let's start by prepping the ingredients."
2600205-12 = "[s] \"Wait! Promise me something before we start cooking.\""
2600205-13 = "You want me to make a promise?"
2600205-14 = "[s] \"Yes. Promise me that this time...\""
2600205-16 = "[s1] \"...you won't use any instrument the recipe doesn't call for.\"\n[s2] \"...you won't use an ingredient not in the original recipe.\"\n[s3] \"...you won't do ANYTHING that's not from the recipe.\""
2600205-17 = "O-Oh. Right..."
2600205-18 = "O-Oh. Right..."
2600205-19 = "O-Oh. Right..."
2600205-20 = "So you're saying that we should only focus on the cooking and not efficiency."
2600205-21 = "[s] \"Have you really been doing all of that in the name of efficiency...?\""
2600205-22 = "Anyway, sure! I understand."
2600205-23 = "This time, I'll only do what the recipe says!"
2600205-25 = "(Step by step, Juri and I worked together to finish the miso soup.)"
2600205-28 = "It's done, Sensei!"
2600205-29 = "[s] \"Okay. I'll taste-test what you have.\""
2600205-30 = "*gulp*"
2600205-38 = "[ns] \"Th-This flavor...!\""
2600205-39 = "H-How is it?"
2600205-40 = "[s4] \"Sour, salty, sweet, spicy...\"\n[s5] \"This doesn't taste anything like miso soup!\""
2600205-41 = "Wh-What?!"
2600205-42 = "Wh-What?!"
2600205-43 = "Why?!"
2600205-44 = "[s] \"Then...let's start over from scratch!\""
2600205-45 = "(We decided to start over with new ingredients and not the ones that Juri brought.)"
2600205-46 = "You're right. Maybe the ingredients were the problem."
2600205-47 = "So if we use the ones you brought instead..."
2600205-48 = "All right. I can do this."
2600205-49 = "I'll try the recipe again!"
2600205-52 = "I-It's done!"
2600205-53 = "[s] \"Well... Here we go again!\""
2600205-60 = "H-How is it?!"
2600205-61 = "[s] \"Salty. Sweet. Spicy. Sour...!\""
2600205-62 = "What?! How can that be?!"
2600205-63 = "[s] \"Again! From scratch again!\""
2600205-64 = "What should we do this time?!"
2600205-65 = "(This time, we decided to each cook our own dish, trade halfway through, and finish what we receive.)"
2600205-66 = "[s] \"This has gotta work!\""
2600205-70 = "[ns] \"It's just salty this time!\""
2600205-71 = "*shock*"
2600205-72 = "[s] \"In that case...!\""
2600205-73 = "(We switched tactics again. This time, I did most of the cooking, and Juri finished the dish by boiling it.)"
2600205-78 = "[ns] \"It tastes exactly the same!\""
2600205-80 = "(We tried again and again, but everything Juri touched ended up having a strange flavor.)"
2600205-81 = "(The soup's flavor would inexplicably transform from Juri merely dipping a ladle into the soup after I cooked everything according to the recipe.)"
2600205-82 = "[s] \"Is this a curse or something?\""
2600205-83 = "..."
2600205-84 = "What in the world is going on?!"
2600205-85 = "I... "
2600205-86 = "I just wanted to make a dish without screwing it up!"
2600205-87 = "[s] \"Well...\""
2600205-88 = "I still couldn't..."
2600205-89 = "I still couldn't do it, even with you here."
2600205-90 = "I'm used to failing in the kitchen."
2600205-91 = "But since you were with me today..."
2600205-92 = "...I had hoped that we could get it right together."
2600205-93 = "Then I could show you that I'm capable of making good food."
2600205-94 = "*sniffle* I'm sorry, Sensei... *sob*"
2600205-95 = "[s] \"No.\""
2600205-97 = "[s] \"It's too early to give up.\""
2600205-98 = "Sensei?"
2600205-99 = "[s] \"Let's try again. We'll go step by step from the beginning.\""
2600205-100 = "What?"
2600205-101 = "[s] \"It's okay. If at first you don't succeed, try, try again.\""
2600205-103 = "[s6] \"If this method doesn't work, then we'll try another one.\"\n[s7] \"I know better than anyone how hard you're trying.\""
2600205-104 = "You know how much this means to me...?"
2600205-105 = "You know how much this means to me...?"
2600205-106 = "..."
2600205-107 = "Oh, Sensei!"
2600205-108 = "[s] \"Is something wrong?\""
2600205-109 = "No! I mean, you're absolutely right!"
2600205-110 = "I...let myself get discouraged."
2600205-111 = "I'm the School Lunch Club's Ushimaki Juri, and I won't go down that easily."
2600205-112 = "I'll keep on fighting. For you, Sensei!"
2600205-115 = "[s] \"Juri, are you okay?\""
2600205-116 = "I knew it. Your hands, Sensei."
2600205-117 = "They're warm."
2600205-118 = "Sensei, I want you to stand behind me and guide my hands."
2600205-119 = "We'll take it from the very top. First, I'll start with chopping the ingredients."
2600205-120 = "I don't want you to go anywhere until I get this right!"
2600205-122 = "(And so, Juri and I spent the rest of the day together cooking.)"

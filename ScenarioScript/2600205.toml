[translation]
2600205-1 = "เด็กสาวผู้ต้องการเอาชนะ"
2600205-2 = "(ก่อนจะมาเจอจูริที่โรงอาหาร ได้ตกลงกันไว้แล้วว่าวันนี้จะทำเมนูอะไร)"
2600205-3 = "(และเมนูนั้นคือซุปมิโสะ)"
2600205-4 = "เฮ้อ....."
2600205-5 = "[s] \"รู้สึกประหม่าเหรอ?\""
2600205-6 = "ใช่ค่ะ ฉันพยายามหาสาเหตุที่ทำอาหารผิดพลาดในทุกครั้ง แต่ก็..."
2600205-7 = "ปกติเป็นฉันเองที่ลุกลี้ลุกลนอยู่คนเดียว#nพอจะลองทำอะไรก็ทำอยู่คนเดียวค่ะ"
2600205-8 = "หากฉันได้มาคิดหาสาเหตุกับคุณครูล่ะก็..."
2600205-9 = "ต่อไปฉันอาจจะพัฒนาฝีมือทำอาหารจนไม่ผิดพลาดเลยก็ได้ ฉันมั่นใจเต็มร้อยเลยค่ะ!"
2600205-11 = "ถ้างั้นก็มาเตรียมหั่นวัตถุดิบก่อน..."
2600205-12 = "[s] \"เรามาสัญญาอะไรกันก่อนทำอาหารดีกว่า\""
2600205-13 = "คะ? สัญญา... เหรอคะ?"
2600205-14 = "[s] \"ใช่ ในการทำอาหารครั้งนี้...\""
2600205-16 = "[s1] \"เราจะไม่ใช้อุปกรณ์ที่ไม่ได้อยู่ในสูตรอาหาร\"\n[s2] \"เราจะไม่ใช้วัตถุดิบที่ไม่ได้อยู่ในสูตรอาหาร\"\n[s3] \"เราจะไม่ใช้วิธีอื่นที่ไม่ได้อยู่ในสูตรอาหาร\""
2600205-17 = "บะ... แบบนี้นี่เอง..."
2600205-18 = "บะ... แบบนี้นี่เอง..."
2600205-19 = "บะ... แบบนี้นี่เอง..."
2600205-20 = "คุณครูจะบอกว่าเราควรเน้นที่การทำอาหารตามสูตร มากกว่าประสิทธิภาพใช่ไหมคะ?"
2600205-21 = "[s] \"ปกติแล้วจูริคิดถึงแค่เรื่องประสิทธิภาพสินะ...\""
2600205-22 = "จะยังไงก็เถอะค่ะ! ฉันเข้าใจที่คุณครูจะสื่อแล้วค่ะ"
2600205-23 = "ครั้งนี้ฉันจะลองทำตามในสูตรอาหารเป๊ะๆ เลยค่ะ!"
2600205-25 = "(เป็นผู้ช่วยของจูริและทำซุปมิโสะจนเสร็จ)"
2600205-28 = "เสร็จแล้วค่ะคุณครู!"
2600205-29 = "[s] \"ดีมาก งั้นมาชิมอาหารของจูริกัน...\""
2600205-30 = "(ซดน้ำซุป)"
2600205-38 = "[ns] \"รสชาตินี้มัน...?!\""
2600205-39 = "ปะ... เป็นยังไงบ้างคะ?"
2600205-40 = "[s4] \"เปรี้ยว เค็ม หวาน แล้วก็เผ็ด...\"\n[s5] \"ได้รสชาติของทุกอย่างยกเว้นซุปมิโสะ...\""
2600205-41 = "คะ... คะ?!"
2600205-42 = "คะ... คะ?!"
2600205-43 = "ทะ... ทำไมล่ะคะ?!"
2600205-44 = "[s] \"อืม... มาลองเปลี่ยนวิธีกัน\""
2600205-45 = "(กลับไปตั้งแต่แรกใหม่ แต่ครั้งนี้ไม่ใช้วัตถุดิบของจูริ แต่ใช้วัตถุดิบใหม่ที่เตรียมมาแทน)"
2600205-46 = "หรือว่ามันเป็นปัญหาตั้งแต่วัตถุดิบที่ฉันเตรียมมาคะ...?"
2600205-47 = "งั้นครั้งนี้เราใช้ของที่คุณครูเตรียมมาแล้วกัน..."
2600205-48 = "ก็ได้ค่ะ!"
2600205-49 = "ฉันจะลองทำดูอีกรอบค่ะ!"
2600205-52 = "สะ... เสร็จแล้วค่ะ!"
2600205-53 = "[s] \"งั้นมาชิมกัน!\""
2600205-60 = "ปะ... เป็นยังไงบ้างคะ?!"
2600205-61 = "[s] \"เค็ม หวาน เผ็ด แล้วก็เปรี้ยว...!\""
2600205-62 = "เอ๋?! ทะ... ทำไมกันล่ะ...?!"
2600205-63 = "[s] \"อืม! งั้นมาเปลี่ยนวิธีอีกรอบ!\""
2600205-64 = "จะ... จะใช้วิธีไหนอีกเหรอคะ?!"
2600205-65 = "(ครั้งนี้เราตัดสินใจแยกกันทำอาหาร แล้วก็สลับหน้าที่กันครึ่งทางจนทำเสร็จ)"
2600205-66 = "[s] \"ถ้าเป็นวิธีนี้ล่ะก็...!\""
2600205-70 = "[ns] \"รอบนี้ได้แค่รสเค็มเท่านั้น!\""
2600205-71 = "(ตุ้บ!)"
2600205-72 = "[s] \"ถ้างั้นรอบนี้...!\""
2600205-73 = "(เราเปลี่ยนวิธีทำอาหารใหม่ โดยเตรียมวัตถุดิบและปรุงเองทั้งหมด ส่วนจูริช่วยแค่คนน้ำซุปเท่านั้น)"
2600205-78 = "[ns] \"เหมือนเดิมเลย...!\""
2600205-80 = "(หลังจากนั้นก็ลองทำดูอยู่หลายครั้ง แต่อาหารที่จูริแตะก็มีรสชาติแปลกๆ เหมือนเคย)"
2600205-81 = "(แม้จะทำซุปเองทั้งหมดตามสูตรอาหาร และให้จูริช่วยตักมาใส่ในถ้วยอย่างเดียว#nก็ยังมีรสชาติแปลกๆ ไม่เหมือนซุปมิโสะอยู่ดี)"
2600205-82 = "[s] \"...เกิดอะไรขึ้นเนี่ย?\""
2600205-83 = "......"
2600205-84 = "ฮือออ~! ทำไมถึงเป็นแบบนี้ไปได้ล่ะคะ?"
2600205-85 = "ฉันก็แค่..."
2600205-86 = "แค่อยากทำอาหารโดยไม่ผิดพลาดก็เท่านั้น~!"
2600205-87 = "[s] \"อืม...\""
2600205-88 = "นี่ขนาดได้..."
2600205-89 = "ขนาดได้คุณครูมาช่วยแล้วทั้งที แต่ก็ยัง..."
2600205-90 = "ถึงฉันจะทำอาหารผิดพลาดจนชินแล้วก็เถอะค่ะ..."
2600205-91 = "แต่วันนี้ไหนๆ คุณครูก็มาอยู่ด้วยแล้ว"
2600205-92 = "ฉันอุตส่าห์อยากหาสาเหตุว่าทำไมอาหารของฉันออกมาไม่ดี..."
2600205-93 = "แล้วก็ให้คุณครูได้เห็นว่าฉันเองก็ทำอาหารได้..."
2600205-94 = "ฮือ... ขอโทษนะคะ... คุณครู… (สะอื้น)"
2600205-95 = "[s] \"ไม่เป็นไรหรอก\""
2600205-97 = "[s] \"นี่มันเร็วเกินไปที่จะยอมแพ้นะ\""
2600205-98 = "คุณครู...?"
2600205-99 = "[s] \"มาเริ่มกันใหม่ทีละขั้นๆ ตั้งแต่แรกดีกว่า\""
2600205-100 = "คะ...?"
2600205-101 = "[s] \"ไม่เป็นหรอก ถ้าล้มเหลวก็ทำใหม่ไง\""
2600205-103 = "[s6] \"ถ้าวิธีนี้ไม่ได้ผล ก็ลองวิธีใหม่ก็ได้\"\n[s7] \"ครูรู้ดีว่าที่ผ่านมาจูริพยายามมามากแค่ไหน\""
2600205-104 = "คุณครูรู้เหรอคะว่าฉันพยายามมากแค่ไหน...?"
2600205-105 = "คุณครูรู้เหรอคะว่าฉันพยายามมากแค่ไหน...?"
2600205-106 = "......"
2600205-107 = "คุณครูคะ....!"
2600205-108 = "[s] \"หืม? ทำไมเหรอ?\""
2600205-109 = "ใช่ค่ะ คุณครูพูดถูกแล้วล่ะค่ะ..."
2600205-110 = "ฉัน... ปล่อยให้ตัวเองท้อแท้เองค่ะ"
2600205-111 = "จูริแห่งชมรมโภชนาการของเกเฮนน่า! จะไม่ยอมแพ้ง่ายๆ อีก!"
2600205-112 = "ฉันจะพยายามต่อไปเพื่อคุณครูด้วยค่ะ...!"
2600205-115 = "[s] \"หืม? จูริ?\""
2600205-116 = "มือของคุณครู... เป็นเหมือนที่คิดไว้เลยค่ะ..."
2600205-117 = "อบอุ่นจังเลย..."
2600205-118 = "คุณครูคะ... อยู่ข้างๆ แล้วคอยกุมมือฉันไว้ได้ไหมคะ?"
2600205-119 = "ฉันจะเริ่มใหม่ตั้งแต่แรกค่ะ... ครั้งนี้จะเริ่มตั้งแต่การจับมีดเลยค่ะ"
2600205-120 = "ถ้าฉันเผลอทำผิดวิธีก็บอกกันด้วยนะคะ!"
2600205-122 = "(จากนั้นคุณครูก็ได้ใช้เวลาทั้งวันอยู่กับจูริ แล้วทำอาหารด้วยวิธีต่างๆ อยู่หลายครั้ง)"

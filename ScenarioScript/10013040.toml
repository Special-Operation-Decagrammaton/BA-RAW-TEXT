[translation]
10013040-1 = "Episode 4;To the Next Destination"
10013040-5 = "[ns] \"...That's one island down.\""
10013040-6 = "Heh! \"Franchise contract\" has a nice ring to it."
10013040-7 = "It was just a smart business decision!"
10013040-8 = "[s] \"How's it going over there?\""
10013040-9 = "Heehee! Swimmingly! ☆ We punished some criminals causing trouble! ☆"
10013040-10 = "We've incapacitated most of the gangsters here."
10013040-12 = "And we're gonna keep beating up every last one of them!"
10013040-13 = "In other words, we have it under control here too. Keep up the good work!"
10013040-14 = "[s] \"Thanks. Good job, all of you.\""
10013040-18 = "..."
10013040-19 = "[s] \"Shizuko? You seem down.\""
10013040-20 = "It's not a big deal. It's just..."
10013040-21 = "I feel like Momoyodou just dumped all our problems on innocent students from another school."
10013040-22 = "[s] \"Don't worry. They volunteered because they wanted to help.\""
10013040-23 = "You really think so?"
10013040-24 = "[s1] \"Yeah, and the Abydos students are strong.\"\n[s2] \"The Abydos students are resilient, if nothing else.\""
10013040-27 = "Okay, well... If you say so, Sensei."
10013040-28 = "I'll trust them!"
10013040-29 = "[s] \"So, do you know where we're going next?\""
10013040-30 = "I've already figured it out!"
10013040-35 = "With the Sulfer Miners dealt with, next up is..."
10013040-36 = "...here!"

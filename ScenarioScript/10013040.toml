[translation]
10013040-1 = "ตอนที่ 4;มุ่งหน้าไปยังจุดหมายถัดไป"
10013040-5 = "[ns] \"จัดการสำเร็จไปหนึ่งที่แล้ว...\""
10013040-6 = "แหะๆ~ ได้ทำสัญญาแฟรนไชส์เลยเหรอ~ เป็นวิธีที่ยอดเยี่ยมเลย~"
10013040-7 = "แต่ก็... ปะ... เป็นแค่การตัดสินใจทางธุรกิจน่ะ!"
10013040-8 = "[s] \"แล้วทางนั้นเป็นยังไงกันบ้าง?\""
10013040-9 = "ฮุฮุฮุ~☆ พวกฉันเพิ่งไปสั่งสอนเด็กดื้อที่เอาแต่ก่อเรื่องไม่น่ารักมาค่ะ~☆"
10013040-10 = "เราปราบนักเลงชุดว่ายน้ำที่เป็นตัวปัญหาที่สุดในพื้นที่นี้แล้วน่ะ"
10013040-12 = "และเราจะไม่หยุดแค่นี้ด้วย!"
10013040-13 = "งั้นก็มารวมพลังกัน แล้วไปสู้กันต่อนะคะ!"
10013040-14 = "[s] \"อื้ม พยายามเข้านะ\""
10013040-18 = "เฮ้อ..."
10013040-19 = "[s] \"เป็นอะไรเหรอชิซุโกะ? ทำไมสีหน้าไม่ดีเลย\" "
10013040-20 = "ปะ... เปล่าค่ะ ไม่มีอะไรหรอกค่ะ..."
10013040-21 = "แค่รู้สึกเหมือนฉันไปส่งต่อปัญหาที่ร้านเฮียกคิยาโคเจอให้กับนักเรียนโรงเรียนอื่นน่ะค่ะ..."
10013040-22 = "[s] \"ถ้าเรื่องนั้นไม่ต้องห่วงหรอก ที่ทุกคนมาก็เพราะอยากช่วยนะ\""
10013040-23 = "เป็นอย่างนั้น... เหรอคะ?"
10013040-24 = "[s1] \"อื้ม แถมเพื่อนๆ อะบิดอสก็เก่งกันมาก\"\n[s2] \"ไม่ว่าจะเจอปัญหาอะไรก็จะใส่ให้สุดพลังแล้วช่วยแก้ปัญหาให้\""
10013040-27 = "ค่ะ ถ้าคุณครูพูดถึงขนาดนั้นแล้วแบบนี้ละก็..."
10013040-28 = "ฉันก็จะเชื่อมั่นค่ะ!"
10013040-29 = "[s] \"งั้นต่อไปเราต้องไปที่ไหนล่ะ?\""
10013040-30 = "ค่า ฉันกำหนดเส้นทางไว้ล่วงหน้าแล้วค่ะ"
10013040-35 = "หลังจากจัดการกับ <คนงานเหมืองกำมะถัน ผู้ใฝ่ฝันในปฐพีร้อนระอุ> ได้ ที่ต่อไปของเราก็คือ..."
10013040-36 = "ที่นี่ค่ะ!"

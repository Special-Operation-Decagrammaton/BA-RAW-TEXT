[translation]
10013040-1 = "第4話;向著下一個目的地"
10013040-5 = "[ns] 「──就是這樣，我們剛解決一個地點。」"
10013040-6 = "唔嘿～加盟契約啊……是個好方法呢。"
10013040-7 = "其，其實也不過是事業上的考量就是了！"
10013040-8 = "[s] 「那麼，你們那邊如何呢？」"
10013040-9 = "呵呵。我們剛教訓完搗蛋的壞孩子們喔☆"
10013040-10 = "嗯。成功解決了這片區域最麻煩的泳裝太妹。"
10013040-12 = "我們也會按照這個感覺繼續前進的！"
10013040-13 = "彼此都繼續加油吧！"
10013040-14 = "[s] 「辛苦了。繼續加油吧。」"
10013040-18 = "呼……"
10013040-19 = "[s] 「臉色不太好呢，怎麼了嗎？」"
10013040-20 = "啊，不是……那個……"
10013040-21 = "只是在想……我們是不是把自己的問題推給其他學校的學生處理了……"
10013040-22 = "[s] 「不用擔心的喔。大家都是自願來幫忙的。」"
10013040-23 = "是，是這樣嗎？"
10013040-24 = "[s1] 「嗯，而且阿拜多斯的大家很強。」\n[s2] 「所以一定可以解決問題的。」"
10013040-27 = "嗯，既然老師都這麼說了，再煩惱下去反而很失禮吧。"
10013040-28 = "那就相信大家，交給他們了。"
10013040-29 = "[s] 「那麼，下一個地點是？」"
10013040-30 = "啊，那個的話已經決定好了。"
10013040-35 = "既然已經解決了「尋找夢幻溫泉的硫磺礦工們」，我們接下來該去的地方就是──"
10013040-36 = "這裡！"

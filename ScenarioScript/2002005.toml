[translation]
2002005-1 = "การโต้แย้งของแฮ็กเกอร์อัจฉริยะ"
2002005-9 = "(หลังได้รับข้อความ คุณครูก็รีบมายังที่ซ่อนของฮิมาริทันที)"
2002005-15 = "[ns] \"ฮิมาริ! เป็นอะไรรึเปล่า?!\""
2002005-17 = "อ๊ะ คุณครู มาแล้วเหรอคะ"
2002005-21 = "[ns1] \"เอ่อ เธอ... ดูปกติดีนะ...?\"\n[ns2] \"คือว่า... ไหนบอกว่าเกิดเรื่องใหญ่ไม่ใช่เหรอ?\""
2002005-24 = "ใช่แล้วค่ะ"
2002005-25 = "คุณครู เกิดเรื่องใหญ่ขึ้นจริงๆ นะคะ"
2002005-26 = "แค่ภายนอกฉันดูสงบนิ่งก็เท่านั้น..."
2002005-27 = "ค่ะ เพราะฉันคือสาวน้อยอัจฉริยะแห่งมิลเลเนียม และเป็นแฮ็กเกอร์สาวผู้บอบบางที่ปั้นสีหน้าเก่งยัง#nไงล่ะคะ"
2002005-28 = "สาวน้อยผู้เก่งกาจที่เก็บซ่อนความรู้สึกแท้จริงเอาไว้ในใจลึกๆ..."
2002005-29 = "ช่างน่าเศร้าเกินบรรยายเลยนะคะ...."
2002005-33 = "[ns3] \"มองจากดาวอังคารยังรู้เลยว่าเธอสบายดีสุดๆ!\"\n[ns4] \"แล้วนี่... ฮิมาริมีเรื่องอะไรเหรอ?\""
2002005-36 = "ระหว่างที่ฉันกำลังใช้เวลาว่างอย่างสง่างามไปกับการชื่นชมวัฒนธรรมที่หรูหราสมกับภาพลักษณ์#nของฉัน... แต่จู่ๆ ฉันก็ค้นพบสิ่งที่น่าตกใจมากๆ ค่ะ"
2002005-37 = "ดูนี่สิคะคุณครู"
2002005-41 = "(สิ่งที่ฮิมาริยื่นให้ดูก็คือนิตยสารเจาะลึกของชมรมข่าวโครโนสที่เคยเห็นคราวก่อน)"
2002005-42 = "[s] \"เอ๋? ไหนบอกว่าเป็นการใช้เวลาที่หรูหราสมฐานะไม่ใช่เหรอ?!\""
2002005-43 = "อย่าใส่ใจเรื่องเล็กๆ น้อยๆ นั่นเลยค่ะ... ปัญหาก็คือนี่ค่ะ ตรงนี้ค่ะ พอเห็นแบบนี้แล้วฉันปวดใจ#nมากเลยค่ะ"
2002005-47 = "(ฮิมาริชี้ไปที่คอลัมน์บทความพิเศษในนิตยสารซุบซิบ และหัวข้อที่เขียนอยู่ก็คือ...)"
2002005-48 = "[ns5] \"<สุดช็อก! ตัวจริงของหัวหน้าเวอริทัส ชมรมแฮ็กเกอร์แห่งมิลเลเนียมคือ...>\"\n[ns6] \"<สกู๊ปพิเศษ! หัวหน้าของเวอริทัส เด็กเจ้าปัญหานิสัยร้ายกาจ!>...?\""
2002005-51 = "[ns] \"สกู๊ปนี่มีอะไรเหรอ?\""
2002005-52 = "ฮุฮุฮุ ไม่รู้ว่าพวกเธอใช้อะไรคิดกันแน่นะคะ ถึงได้คิดว่าฉันเป็นเด็กเจ้าปัญหานิสัยร้ายกาจไปได้น่ะคะ"
2002005-53 = "ฉันออกจะดูเป็นสาวน้อยน่ารักที่แสนบอบบาง... คุณครูก็คิดแบบนั้นใช่มั้ยคะ?"
2002005-54 = "[s] \"อ่า... อื้ม...\""
2002005-55 = "เอ๋? ทำไมตอบเสียงอ่อยแบบนั้นล่ะคะ?"
2002005-56 = "อ๋อ... ฉันเข้าใจแล้วค่ะ"
2002005-57 = "เวลาที่เราเก็บของมีค่าเอาไว้ข้างตัวเองตลอด สุดท้ายเราก็จะหลงลืมมันไปโดยไม่ได้ตระหนักถึง#nคุณค่าของมัน..."
2002005-58 = "นี่คงเหมือนกับโศกนาฎกรรม <ปัญหาปริศนารถราง> ที่ฉันเคยได้ยินมาสินะคะ"
2002005-59 = "[s] \"ขอโทษนะ แต่ครูไม่เข้าใจที่เธอพูดเลย...\""
2002005-60 = "เรื่องนั้นเอาไว้ทีหลังก็ได้ค่ะ อย่างไรก็ตาม ข้อความที่เขียนอยู่ในนี้เป็นข้อความที่เขียนใส่ร้ายฉันค่ะ"
2002005-61 = "พวกเขาไม่ได้เขียนเกี่ยวกับตัวตนที่แท้จริงของฉันเลย แถมยังเขียนเอาไว้ว่าฉันกำลังปกปิดตัวตน#nอยู่ด้วยค่ะ"
2002005-62 = "[s] \"ก็ปกปิดตัวตนจริงๆ ไม่ใช่รึไง\""
2002005-63 = "ถ้างั้น... เป็นเพราะฉันปกปิดตัวจริงอยู่ เลยมีข่าวแบบนี้ออกมางั้นเหรอคะ?"
2002005-64 = "ถ้าอย่างนั้น..."
2002005-65 = "ก็คงเป็นเรื่องที่ช่วยไม่ได้ ที่จะไม่มีใครรู้ตัวตนที่แท้จริงของฉัน และไม่รู้ว่าเรื่องต่างๆ ที่เขียนอยู่#nในนิตยสารนี่เป็นเรื่องไม่จริง..."
2002005-66 = "เฮ้อ เป็นจุดบอดที่คาดไม่ถึงเลยนะคะ..."
2002005-67 = "[s7] \"นิตยสารซุบซิบพวกนี้น่ะ ยิ่งปิดบังตัวจริงเท่าไรยิ่งโดนขุดเท่านั้นนะ\"\n[s8] \"กังวลว่าจะถูกเปิดเผยตัวจริงเหรอ?\""
2002005-70 = "คะ?"
2002005-71 = "ไม่หรอกค่ะ... ต่อให้พวกเธอขุดคุ้ยยังไงก็เปล่าประโยชน์ค่ะ ฉันมั่นใจในความสามารถในการ#nปกปิดข้อมูลของฉันค่ะ"
2002005-72 = "[s] \"เอ๋...? แล้วปัญหาคืออะไรล่ะ?\""
2002005-76 = "ปัญหาคือเรื่องที่พวกเธอคาดเดาเกี่ยวกับหัวหน้าของเวอริทัสและเขียนเรื่องพฤติกรรมที่ร้ายกาจค่ะ"
2002005-80 = "(คุณครูอ่านหัวข้อ และไล่อ่านเนื้อหาการคาดเดาและข้อสงสัยในทางไม่ดีต่างๆ)"
2002005-81 = "(อย่างเช่น หัวหน้าของเวอริทัสใช้อำนาจของตัวเองเพื่อยักยอกเงินชมรม...)"
2002005-82 = "ฉันแบ่งเงินของชมรมให้สมาชิกทุกคนอย่างยุติธรรมเสมอเลยนะคะ"
2002005-86 = "(เรื่องที่เกี่ยวข้องกับอาชญากรรมไซเบอร์มากมายที่เกิดขึ้นในมิลเลเนียม...)"
2002005-87 = "ช่างเป็นข่าวลือไร้สาระจริงๆ เลยค่ะ เป็นเพราะมีฉันอยู่ต่างหาก เลยหยุดอาชญากรรมไซเบอร์ได้ตั้ง#nเยอะนะคะ"
2002005-88 = "กี่ครั้งงั้นเหรอคะ?"
2002005-89 = "อืม..."
2002005-90 = "ฉันจำไม่ได้ว่ากี่ครั้งค่ะ... พอถูกถามกะทันหันแบบนี้ก็นึกไม่ออกเลยค่ะ แย่จังเลยนะคะ..."
2002005-94 = "(ไม่ยอมทิ้งยาสีฟันที่ใช้หมดหลอดแล้ว แต่กลับใช้กรรไกรตัดจุกออก แล้วรีดยาสีฟันออกมาใช้หมด#nจนหยดสุดท้าย...)"
2002005-95 = "เอ๋... ทุกคนก็ทำแบบนี้กันไม่ใช่เหรอคะ?"
2002005-96 = "การออกไปซื้อยาสีฟันหลอดใหม่น่ะเรื่องใหญ่มากเลยนะคะ"
2002005-97 = "[s] \"อ๋อ เรื่องนั้นครูก็พอเข้าใจอยู่\""
2002005-101 = "(นอกจากนี้ยังมี <แผนการหายตัวในเดือนพฤษภาคม> ที่เกิดขึ้น ทำให้เกิดความวุ่นวายต่างๆ ขึ้น#nในโรงเรียนมิลเลเนียม)"
2002005-102 = "เรื่องนั้นเป็นเรื่องที่น่าอับอายจริงๆ ค่ะ"
2002005-103 = "อันที่จริงเหตุการณ์ตอนนั้น ฉันเล่นมากไปหน่อย จนโดนจิฮิโระจังบ่นชุดใหญ่เหมือนกันค่ะ"
2002005-104 = "[s] \"ไม่ค่อยเข้าใจเท่าไร แต่เธอก็ก่อเรื่องจริงๆ สินะ!\""
2002005-105 = "เฮ้อ แต่เรื่องที่เขียนในนี้ ฉันสรุปได้ว่าส่วนใหญ่เป็นข้อมูลเท็จและมีแนวโน้มว่าเป็นการใส่ร้ายค่ะ"
2002005-106 = "และฉันไม่อาจทนกับข้อมูลเท็จ และคำว่าร้ายต่างๆ เกี่ยวกับฉันได้หรอกค่ะ"
2002005-107 = "มันไม่ได้แค่ทำให้ฉันรู้สึกเจ็บปวดเท่านั้นนะคะ"
2002005-108 = "แต่มันยังเกี่ยวข้องกับความน่าเชื่อถือของทางเวอริทัส และยังทำให้ชมรมเสื่อมเสียชื่อเสียงด้วยค่ะ#nเพราะงั้นเราจำเป็นต้องเปิดเผยความจริงค่ะ"
2002005-109 = "[s] \"อ๋อ... แล้วจะทำยังไงล่ะ? จะเรียกร้องให้เขียนข่าวที่ถูกต้องเหรอ?\""
2002005-110 = "คะ? ไม่ใช่แบบนั้นหรอกค่ะ"
2002005-111 = "ถ้าเป็นชมรมข่าวโครโนสที่มีชื่อเสียงนั่นละก็ คงจะไม่สนใจข้อเรียกร้องอะไรแบบนั้นหรอกค่ะ"
2002005-118 = "ฮุฮุฮุ เพราะงั้นเราต้องใช้วิธีอื่นค่ะ"
2002005-123 = "(และเพราะเหตุนั้น ทั้งสองคนก็เริ่มอัดวิดีโอ <ความจริงที่ถูกต้องของหัวหน้าของเวอริทัส> ด้วยกัน)"
2002005-127 = "[ns] \"เอางั้นเหรอ... ไม่เป็นไรแน่เหรอ?!\""
2002005-128 = "ไม่เป็นไรหรอกค่ะ"
2002005-129 = "เพื่อการถ่ายทอดความจริงที่ถูกต้อง เราต้องชิงเคลื่อนไหวก่อนที่คนอื่นจะลงมือ..."
2002005-130 = "และด้วยวิดีโอนี้ ฉัน... อาเกโบชิ ฮิมาริ จะแสดงให้เห็นว่าฉันเป็นหัวหน้าชมรมปรากฏการณ์ลี้ลับและ#nหัวหน้าของเวอริทัสที่ยอดเยี่ยมแค่ไหน"
2002005-131 = "อีกทั้งยังเป็นสาวน้อยแฮ็กเกอร์อัจฉริยะที่โดดเด่นไม่ว่าในสถานการณ์ใดๆ และยังเป็นคนที่น่าเชื่อถือ และสง่างาม"
2002005-132 = "ฉันเอาจริงเรื่องถ่ายวิดีโอเพื่อแนะนำตัวเองรึเปล่างั้นเหรอคะ?"
2002005-133 = "[s] \"เรื่องพวกนี้ไม่ควรพูดเองในวิดีโอแนะนำตัวรึเปล่า...\""
2002005-135 = "[ns] \"ว่าแต่ถ่ายวิดีโอในที่ซ่อนทั้งๆ ที่เธอกำลังปกปิดตัวตนอยู่ได้จริงเหรอ?\""
2002005-136 = "อืม... เรื่องนี้ก็อาจเป็นปัญหาที่ชวนปวดหัวนิดหน่อยค่ะ"
2002005-137 = "เพราะงั้นฉันเลยขอให้คุณครูมาที่นี่ค่ะ "
2002005-138 = "ฉันก็คิดว่าควรระดมสมองเพื่อหาวิธีที่ดีที่สุดในการถ่ายข้อมูลเกี่ยวกับตัวของฉัน โดยไม่ให้ใครรู้#nถึงตัวตนแท้จริงของฉันค่ะ"
2002005-139 = "[s] \"ระดมสมองเหรอ... แล้วมีไอเดียอะไรดีๆ มั้ย?\""
2002005-140 = "วิธีนี้เป็นยังไงคะ?"
2002005-141 = "ใช้การโมเสก และแปลงเสียงเพื่อไม่ให้ใครระบุตัวตนได้ค่ะ"
2002005-142 = "[s] \"เอ่อ... ถ้าทำแบบนั้น...\""
2002005-143 = "เอาละค่ะ มาเริ่มถ่ายวิดีโอกันเถอะค่ะ"
2002005-146 = "(ฮิมาริดูกระตือรือร้นอย่างมาก คุณครูเลยทำตาม และเริ่มลงมือถ่ายวิดีโอ)"
2002005-153 = "(และหลังจากตรวจดูวิดีโอที่ถ่ายออกมาครั้งแรก...)"
2002005-156 = "[ns] \"พอโมเสกและแปลงเสียงทั้งวิดีโอแบบนี้...\""
2002005-160 = "ฉันไม่ได้รู้สึกไปเองใช่มั้ยคะ ว่ามันเหมือนเป็นวิดีโอยอมรับข้อสงสัยทั้งหมดที่เกิดขึ้นเลย แถมยัง#nดูเหมือนเป็นวิดีโอรับสารภาพผิดของคนร้ายเลยน่ะค่ะ?"
2002005-161 = "[s] \"มะ...มาลองใหม่เถอะ! มาหาวิธีใหม่กันเถอะ!\""
2002005-164 = "(หลังจากนั้นคุณครูก็เริ่มทดลองวิธีต่างๆ ตามที่ฮิมาริคิดขึ้นมา)"
2002005-167 = "ฉันอยากปิดบังใบหน้าเอาไว้ เพื่อปกปิดตัวตนของฉันค่ะ..."
2002005-168 = "แต่ฉันก็อยากจะเปิดเผยความสง่างามของหัวหน้ากลุ่มเวอริทัสให้ทุกคนได้เห็นเหมือนกันค่ะ"
2002005-169 = "[s] \"ถ้าปกปิดตัวตน มันก็จะไม่เห็นความสง่างามอะไรพวกนั้นสิ?\""
2002005-170 = "อ๊ะ ถ้างั้นแบบนี้เป็นยังไงคะ?"
2002005-171 = "ใช้เส้นสีดำคาดปิดตรงตาแบบนี้ เพื่อไม่ให้ระบุตัวตนได้ดีมั้ยคะ?"
2002005-172 = "คะ? แบบนี้ไม่โอเคเหรอคะ? ไม่ได้เหรอคะ?"
2002005-173 = "อืม... ยากจังเลยนะคะ"
2002005-174 = "ถ้างั้นปิดตาด้วยวิธีอื่น..."
2002005-175 = "อ๊ะ ใช้ผ้าปิดตาดีมั้ยคะ?"
2002005-176 = "นึกดูแล้ว ฉันมีผ้าปิดตารูปเจ้าฮิปโปตัวขาวๆ อ้วนๆ อยู่อันหนึ่งด้วยค่ะ..."
2002005-177 = "คะ? คุณเพโรโร่ไม่ใช่ฮิปโปงั้นเหรอคะ? แล้วก็ไม่เอาวิธีนี้ด้วยเหรอคะ? "
2002005-178 = "...ถึงจะดูเป็นคนสบายๆ แต่คุณครูก็เป็นคนที่ 'เยอะ' เหมือนกันนะคะเนี่ย"
2002005-179 = "[s9] \"ต้องเป็นครูรึเปล่าที่พูดแบบนั้นน่ะ?\"\n[s10] \"ที่จริงครูคิดว่าแค่ปิดตาคงไม่พอหรอกนะ...\""
2002005-182 = "อืม... พอลองทำดูแล้ว มันยากกว่าที่คิดเลยนะคะ~ "
2002005-183 = "ต้องปล่อยมือจากสิ่งหนึ่ง เพื่อให้ได้อีกสิ่งหนึ่งที่ต้องการมา... "
2002005-184 = "เหมือนกับชีวิตของคนเราเลยนะคะ..."
2002005-185 = "[s] \"ต้องตีหน้าโศกเบอร์นั้นเลยเรอะ?!\""
2002005-186 = "วิธีที่จะให้ข้อมูลที่ถูกต้องและปกปิดตัวตนของฉันเอาไว้ แต่ก็แสดงออกถึงความสง่างามในฐานะ#nหัวหน้าของเวอริทัสได้..."
2002005-187 = "และถ้าเป็นไปได้ ฉันก็อยากให้ภาพของฉันในกล้องออกมาแบบดูดีสุดๆ..."
2002005-188 = "[s] \"...เรื่องนั้นมันไม่จำเป็นไม่ใช่รึไง?\""
2002005-192 = "อ่า..."
2002005-193 = "ฮุฮุฮุ..."
2002005-194 = "ฉันคิดไอเดียดีๆ ออกแล้วค่ะ"
2002005-196 = "รูปเป็นอีกหนึ่งวิธีที่จะแสดงความสง่างามออกมา แต่ในเมื่อไม่สามารถเปิดเผยใบหน้าได้ เลยต้อง#nใช้วิธีแต่งรูปแบบนี้ค่ะ..."
2002005-197 = "แต่ว่าถ้าไม่แสดงอะไรบนหน้าจอเลย หน้าจอมันก็จะโล่งๆ เพราะงั้นฉันจะใส่เงาลงไป..."
2002005-198 = "ส่วนชื่อก็ใช้เป็นอักษรย่อดีมั้ยคะ?"
2002005-199 = "ฮุฮุฮุ ดีมากเลยค่ะ ไอเดียผุดขึ้นมาเรื่อยๆ เลยละค่ะ"
2002005-209 = "(หลังผ่านการทดสอบ และแก้ไขข้อผิดพลาดต่างๆ มากมาย สุดท้ายก็ทำวิดีโอแนะนำตัวเสร็จ)"
2002005-214 = "ค่ะ เท่านี้ก็เสร็จสมบูรณ์แล้วนะคะ"
2002005-218 = "[ns] \"ถ่ายเสร็จแล้ว แต่เราจะส่งไปให้ยังไงล่ะ ส่งเมลเหรอ?\""
2002005-219 = "อา... ฉันเคยส่งเมลร้องเรียนไป แต่ก็ถูกเพิกเฉยตลอดเลยค่ะ ดูเหมือนเมลของฉันจะถูกจัดไว้ใน#nหมวดหมู่อีเมลขยะค่ะ เพราะงั้นแค่ส่งเมลคงไม่พอหรอกค่ะ"
2002005-220 = "[s] \"ถ้างั้นจะทำยังไงดีล่ะ...?\""
2002005-221 = "ถ้างั้นเรามาลองวิธีที่พวกเขาจะเพิกเฉยเมลของฉันไม่ได้กันเถอะค่ะ"
2002005-227 = "ฉันจะแฮ็กเข้าไปยึดฐานข้อมูลของโรงเรียนโครโนส และอัปโหลดไฟล์เข้าไปโดยตรงค่ะ"
2002005-231 = "[ns] \"เดี๋ยวๆๆ ทำแบบนั้นได้เหรอ นั่นมันอาชญากรรมไซเบอร์นะ?!\""
2002005-232 = "อา... แต่ฉันแฮ็กระบบและอัปโหลดวิดีโอไปเรียบร้อยแล้วค่ะ"
2002005-233 = "ตอนนี้เป็นชั่วโมงข่าวของทางโรงเรียนโครโนสพอดี เรามารอดูกันดีมั้ยคะว่าพวกเธอจะทำยังไง?"
2002005-239 = "ข่าวล่ามาแรงแซงทางโค้งค่ะ!"
2002005-240 = "เมื่อประมาณ 5 นาทีก่อน พบว่ามีแฮ็กเกอร์ลึกลับแฮ็กเข้าเครือข่ายของโรงเรียนโครโนสค่ะ!"
2002005-241 = "ถึงจะไม่รู้ว่าเป็นฝีมือใคร แต่เหตุการณ์ครั้งนี้ถือว่าเป็นอันตรายครั้งใหญ่สำหรับโรงเรียนโครโนส...!"
2002005-245 = "คะ? แฮ็กเกอร์ลึกลับโพสต์ตัวอย่างวิดีโอคำสารภาพอาชญากรรมไซเบอร์ที่ก่อไว้เหรอคะ?"
2002005-246 = "ค่ะ! เรามาดูวิดีโอไปพร้อมๆ กันเลยค่ะ!"
2002005-252 = "สวัสดีค่ะ นักเรียนโรงเรียนโครโนสทุกท่าน"
2002005-253 = "ฉันขอแนะนำตัวก่อนนะคะ ฉันคือแฮ็กเกอร์อัจฉริยะแห่งโรงเรียนมิลเลเนียม สาวน้อยน่ารักผู้แสนบอบ#nบาง งดงามราวดอกไม้ป่า..."
2002005-255 = "คะ? พูดแบบนี้ไม่ได้งั้นเหรอคะ? แต่ว่าฉันต้องแนะนำตัวให้ชัดเจนนะคะ..."
2002005-256 = "คะ? ต้องพูดชื่อด้วยเหรอคะ? อ๋อ จริงด้วยนะคะ"
2002005-257 = "อ๋อ... จริงสิ โค้ดเน้มที่เลือกเอาไว้..."
2002005-262 = "ค่ะ ฉันคือเอช โค้ดเนม เอชค่ะ"
2002005-263 = "เหตุผลที่ฉันส่งคลิปวิดีโอนี้มา เพราะฉันทนไม่ได้กับความอยุติธรรมของโรงเรียนโครโนส และเพื่อ#nเปิดเผยความจริง..."
2002005-266 = "ค่ะ! อย่างที่ทุกท่านได้เห็น! แฮ็กเกอร์ลึกลับโค้ดเนม เอช ได้ส่งคลิปวิดีโอมาที่ชมรมข่าวโครโนสค่ะ!"
2002005-267 = "จากคลิปดังกล่าวทำให้ทางโรงเรียนโครโนสสรุปได้ว่านี่เป็นสถานการณ์ร้ายแรง! ขณะนี้กำลัง#nตรวจสอบ และวิเคราะห์คลิปวิดีโอดังกล่าวอยู่ค่ะ!"
2002005-268 = "แต่ขอให้ทุกท่านวางใจได้ค่ะ!"
2002005-269 = "ชมรมข่าวโครโนสของเราจะไม่มีวันยอมแพ้ต่อแรงกดดันภายนอกอย่างเด็ดขาดค่ะ!"
2002005-270 = "เพื่อการรายงานข่าวที่แม่นยำมากขึ้น...! แล้วพบกันใหม่ค่ะ!"
2002005-276 = "[ns] \"ฮิมาริ... ดูท่าว่าแบบนี้มัน...\""
2002005-278 = "อืม..."
2002005-279 = "ฉันคงจะใช้ความคิดมากไป ตอนนี้เลยรู้สึกเหนื่อยๆ แล้วค่ะ "
2002005-283 = "ฮุฮุฮุ คุณครูคะ เราไปดื่มกาแฟกันสักหน่อยดีมั้ยคะ?"
2002005-284 = "[ns] \"แกล้งทำเป็นไม่เห็นว่าตัวเองกำลังเสียเปรียบเรอะ?!\""
2002005-286 = "(หลังจากนั้นคุณครูก็เทศนาฮิมาริชุดใหญ่ ทั้งเรื่องที่ก่อความวุ่นวายที่โรงเรียนโครโนส กับเรื่อง#nข่าวลือแปลกๆ ที่เกิดขึ้นทั่วคิโวทอส)"

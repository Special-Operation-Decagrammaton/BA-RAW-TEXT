2002005-4 = "#wait;200"
2002005-5 = "#wait;200"
2002005-6 = "#wait;200"
2002005-7 = "#wait;200"
2002005-8 = "#wait;1000"
2002005-9 = "#na;(히마리의 급박한 연락을 듣고 한치의 망설일 틈도 없이, 곧장 히마리의 은신처로 향하게 되었다.)"
2002005-10 = "#st;[0,0];instant;1;"
2002005-11 = "#clearST"
2002005-12 = "#wait;1500"
2002005-13 = "#all;hide"
2002005-14 = "#wait;500"
2002005-15 = "[ns] \"히마리! 괜찮아?!\""
2002005-16 = "4;히마리;02\n#4;em;[반응]\n#4;a\n#wait;1200"
2002005-17 = "4;히마리;01;아, 선생님. 오셨군요.\n#4;m3"
2002005-18 = "#st;[0,0];instant;1;"
2002005-19 = "#clearST"
2002005-20 = "#wait;1500"
2002005-21 = "[ns1] \"어, 음. 괘, 괜찮아 보이네……?\"\n[ns2] \"저기, 뭔가 큰일이 났다고 하지 않았어……?\""
2002005-22 = "#wait;10"
2002005-23 = "#wait;10"
2002005-24 = "4;히마리;03;물론이에요.\n#4;em;[음표]"
2002005-25 = "4;히마리;99;선생님. 정말 큰일이 나버렸답니다."
2002005-26 = "4;히마리;07;다만 제가 겉으로 이렇게나 침착해 보이는 건……."
2002005-27 = "4;히마리;01;네, 평소 밀레니엄의 천재 미소녀이자, 병약한 천재 해커로 통하는 제가 포커페이스에 통달해버린 탓이 아닐까요?\n#4;em;[반짝]"
2002005-28 = "4;히마리;09;아아, 너무 우수한 나머지, 마음 깊은 곳의 감정마저 숨기게 되어버린 비운의 미소녀……."
2002005-29 = "4;히마리;08;이 얼마나 안타까운 이야기인 걸까요……."
2002005-30 = "#st;[0,0];instant;1;"
2002005-31 = "#clearST"
2002005-32 = "#wait;2500"
2002005-33 = "[ns3] \"아니, 아무리 봐도 괜찮아 보이는 거 맞네!\"\n[ns4] \"그래서 히마리, 무슨 일이야……?\""
2002005-34 = "#wait;10"
2002005-35 = "#wait;10"
2002005-36 = "4;히마리;01;다름이 아니라, 저, 평소처럼 제 이미지에 맞게, 교양을 즐기며 우아하게 여가 시간을 보내던 중……. 정말 충격적인 발견을 하고야 말았답니다."
2002005-37 = "4;히마리;03;이걸 봐주세요.\n#4;em;[반응]"
2002005-38 = "#st;[0,0];instant;1;"
2002005-39 = "#clearST"
2002005-40 = "#wait;1500"
2002005-41 = "#na;(그런 말과 함께 히마리가 보여준 건, 이전에도 본 적 있는 크로노스 보도부에서 발간하고 있는 가십 잡지였다.)"
2002005-42 = "[s] \"어?! 분명 교양 있고 우아한 여가 시간이라고 하지 않았어?!\""
2002005-43 = "4;히마리;07;사소한 건 됐답니다. 문제는 바로 여기, 이것이에요. 이걸 보고, 저 어찌나 상처를 받았는지.\n#4;em;[반응]"
2002005-44 = "#st;[0,0];instant;1;"
2002005-45 = "#clearST"
2002005-46 = "#wait;1500"
2002005-47 = "#na;(히마리가 가리킨 부분은 가십 잡지의 특집 기사가 실린 페이지였다. 거기에 적혀 있는 타이틀의 제목은 무려…….)"
2002005-48 = "[ns5] \"<충격! 밀레니엄의 해커 동아리 베리타스를 이끄는 부장의 정체는……\"\n[ns6] \"지독한 구두쇠에 성격 나쁜 문제아였다?! 특집편!>……?\""
2002005-49 = "#wait;1500"
2002005-50 = "#wait;1500"
2002005-51 = "[ns] \"……이게 왜?\""
2002005-52 = "4;히마리;01;후후후, 대체 저의 어딜 봐서 지독한 구두쇠에, 성격 나쁜 문제아란 건지 모르겠네요.\n#4;em;…"
2002005-53 = "4;히마리;03;저, 엄청 청초하고 가련한 미소녀잖아요? 그렇게 생각하시지 않나요?"
2002005-54 = "[s] \"아, 응…….\""
2002005-55 = "4;히마리;02;어라? 반응이 너무 약하신데요?\n#4;em;[땀]"
2002005-56 = "4;히마리;05;아, 과연, 그런 것이로군요……"
2002005-57 = "4;히마리;05;귀중한 것을 늘 곁에 두고 있다 보면, 미처 그 소중함을 깨닫지 못한 채 자기도 모르게 귀중한 것 자체를 무시하게 되고야 만다는……"
2002005-58 = "4;히마리;06;이것이 바로 세간에서 말하는 <파랑새의 딜레마>…… 비극이네요.\n#4;em;[속상함]"
2002005-59 = "[s] \"미안, 무슨 소리인지 모르겠어…….\""
2002005-60 = "4;히마리;01;어쨌거나 중요한 건, 여기에 적힌 것이 전부 중상모략이라는 사실이에요."
2002005-61 = "4;히마리;03;대체 이 특집 기사 어디에 저의 정체가 있다는 건가요? 심지어, 저, 정체 숨기는 중이라고요?\n#4;em;[?]"
2002005-62 = "[s] \"맞다, 그랬었지.\""
2002005-63 = "4;히마리;02;하지만 오히려…… 제가 정체를 숨기고 있었기에 이런 기사가 나온 게 아닌가? 라는 말씀이신가요?"
2002005-64 = "4;히마리;05;과연……\n#4;em;…"
2002005-65 = "4;히마리;05;관점을 바꾸면 그러한 접근법도 충분히……"
2002005-66 = "4;히마리;06;하아, 이건 예상치 못한 맹점이었네요…….\n#4;em;[속상함]"
2002005-67 = "[s7] \"이런 가십 잡지는 숨기려고 할수록 파고들려고 하니까.\"\n[s8] \"굳이 정체를 숨기고 있는데 파헤치는 건 역시 곤란하지?\""
2002005-68 = "#wait;10"
2002005-69 = "#wait;10"
2002005-70 = "4;히마리;02;네?\n#4;em;[?]"
2002005-71 = "4;히마리;01;아뇨……. 파고드는 것 자체는 상관없는데요. 저, 정보를 은폐하는 것쯤은 자신 있고."
2002005-72 = "[s] \"어……? 그럼 뭐가 문제야……?\""
2002005-73 = "#st;[0,0];instant;1;"
2002005-74 = "#clearST"
2002005-75 = "#wait;1500"
2002005-76 = "4;히마리;05;바로 여기, 이 부분이에요. 제 정체를 추측하면서, 베리타스의 부장이 저지른 악행들에 대해 쓴 부분이 말이죠.\n#4;em;[반응]"
2002005-77 = "#st;[0,0];instant;1;"
2002005-78 = "#clearST"
2002005-79 = "#wait;1500"
2002005-80 = "#na;(타이틀에 이어, 히마리가 가리킨 기사의 내용은 정말 여러 가지 억측과 의혹으로 가득했다.)"
2002005-81 = "#na;(베리타스의 부장은 자신만의 권력을 이용해서 베리타스의 활동비를 착복, 횡령하고 있다든가…….)"
2002005-82 = "4;히마리;11;저는 어디까지나 공정하고 공평하게, 부원들과 나눠 쓰고 있다고요?\n#4;em;[?]"
2002005-83 = "#st;[0,0];instant;1;"
2002005-84 = "#clearST"
2002005-85 = "#wait;1500"
2002005-86 = "#na;(밀레니엄에서 벌어지는 수많은 사이버 범죄에 영향력을 행사하고 있다든가…….)"
2002005-87 = "4;히마리;10;말도 안 되는 헛소문이네요. 오히려 제 덕에 얼마나 많은 사이버 범죄를 조기에 차단하고 있다고 생각하는 건가요?"
2002005-88 = "4;히마리;02;구체적으로 몇 번 정도냐고요?"
2002005-89 = "4;히마리;99;으음.\n#4;em;…"
2002005-90 = "4;히마리;01;……돌이켜 보니 몇 번이었을까요? 또 이럴 때 막상 떠올리려고 하면 생각이 안 난단 말이죠? 곤란해라."
2002005-91 = "#st;[0,0];instant;1;"
2002005-92 = "#clearST"
2002005-93 = "#wait;1500"
2002005-94 = "#na;(다 쓴 치약통도 그냥 버리는 법 없이, 일일이 가위로 잘라 마지막 남은 것까지 싹싹 다 쓴다든가…….)"
2002005-95 = "4;히마리;02;……어? 다들 그 정도는 하고 있지 않나요?\n#4;em;[?]"
2002005-96 = "4;히마리;03;새로 치약을 사러 가는 것도 큰일이라고요?"
2002005-97 = "[s] \"아, 그런 건 확실히 공감되는걸.\""
2002005-98 = "#st;[0,0];instant;1;"
2002005-99 = "#clearST"
2002005-100 = "#wait;1500"
2002005-101 = "#na;(또한 <5월 실종 계획>을 일으켜, 밀레니엄에 커다란 혼란을 불러온 적이 있다든가.)"
2002005-102 = "4;히마리;11;그것참 실례되는 이야기네요.\n#4;em;[빠직]"
2002005-103 = "4;히마리;05;……확실히 그때 그 사건에서는 조금 과하게 손을 쓴 탓에, 치쨩에게도 혼이 나버렸지만."
2002005-104 = "[s] \"잘 모르겠지만 저지르긴 저질렀다는 거네!\""
2002005-105 = "4;히마리;99;후우, 어쨌거나 여기에 쓰인 기사 내용은, 네. 대부분이 허위에 가짜, 음해에 가깝다는 게 제 결론이에요."
2002005-106 = "4;히마리;01;이런 식으로 저에 대해 불필요한 의혹만 증폭시키는 거짓 정보를 두고만 볼 수는 없지요.\n#4;em;…"
2002005-107 = "4;히마리;03;단지 저에게 피해가 되기 때문만이 아니에요."
2002005-108 = "4;히마리;07;이는 베리타스의 신뢰도와 직결된 문제, 나아가 진실을 더럽히는 행위이니까요. 올바른 진실을 알릴 필요가 있답니다."
2002005-109 = "[s] \"아, 확실히……. 그럼 어떻게 하려고? 정정 기사를 요구한다든가?\""
2002005-110 = "4;히마리;02;네? 아뇨?\n#4;em;[?]"
2002005-111 = "4;히마리;99;그 유명한 크로노스 보도부라면 그런 미적지근한 클레임엔 반응조차 하지 않을 테죠."
2002005-112 = "#st;[0,0];instant;1;"
2002005-113 = "#clearST"
2002005-114 = "4;히마리;99\n#4;d\n#wait;1000"
2002005-115 = "#all;hide"
2002005-116 = "3;히마리;99\n#3;a\n#3;closeup\n#wait;1500"
2002005-117 = "#wait;1000"
2002005-118 = "3;히마리;03;후훗, 그러니 여기선 생각의 전환이 필요하답니다.\n#3;em;[반짝]\n#3;closeup"
2002005-119 = "#st;[0,0];instant;1;"
2002005-120 = "#clearST"
2002005-121 = "#wait;1500"
2002005-122 = "#all;hide"
2002005-123 = "#na;(그렇게 되어…… 우리는 <베리타스의 부장에 대해 올바른 진실을 전하기 위한 자기소개 동영상>을 찍게 되었다.)"
2002005-124 = "#all;hide"
2002005-125 = "#wait;500"
2002005-126 = "#wait;2500"
2002005-127 = "#bgshake\n[ns] \"……라니, 정말 괜찮은 거 맞아?!\""
2002005-128 = "3;히마리;03;물론 괜찮고 말고요.\n#3;em;[반응]\n#3;a"
2002005-129 = "3;히마리;07;보다 올바른 진실을 전달하기 위해선, 남이 움직여주기를 기다리기보다 스스로 먼저 움직여야 하는 법……."
2002005-130 = "3;히마리;08;이번 영상을 통해 저, 아케보시 히마리가 얼마나 우수한 초현상특무부 겸 베리타스의 부장인지."
2002005-131 = "3;히마리;01;또한 얼마나 뛰어난 천재 미소녀 해커이며, 평소 어떤 선행을 쌓고 있고, 또 주변에 얼마나 신임을 받으며 공덕을 쌓고 있는지 등등."
2002005-132 = "3;히마리;03;제 입으로 직접 설명하는 영상을 찍는 게 확실하잖아요?\n#3;em;[?]"
2002005-133 = "[s] \"가장 자기 입으로 소개하면 안 될 부류의 이야기가 아닐까…….\""
2002005-134 = "#wait;1500"
2002005-135 = "[ns] \"근데 히마리, 정체를 숨긴다면서 자기소개 영상을 찍는 건 괜찮아?\""
2002005-136 = "3;히마리;99;으음, 확실히 그 부분이 조금 맹점이지요."
2002005-137 = "3;히마리;03;그래서 오늘 이렇게 선생님을 모신 거랍니다. \n#3;em;[반짝]"
2002005-138 = "3;히마리;09;정체를 숨기면서도, 저에 대한 올바른 정보를 전달하려면 어찌해야 할지, 브레인스토밍을 할까 해서."
2002005-139 = "[s] \"브레인스토밍이라……. 뭔가, 좋은 아이디어라도 있어?\""
2002005-140 = "3;히마리;03;우선 이건 어떨까요?\n#3;em;[?]"
2002005-141 = "3;히마리;08;정체를 숨기는 걸 우선해서, 영상은 모자이크로, 목소리로도 정체를 특정할 수 없게 음성변조를 하는 거예요."
2002005-142 = "[s] \"어…… 그렇게 하면 아무래도…….\""
2002005-143 = "3;히마리;00;자, 찍어보도록 하죠.\n#3;em;[반응]\n#3;closeup"
2002005-144 = "#all;hide"
2002005-145 = "#wait;500"
2002005-146 = "#na;(히마리의 적극적인 행동을 따라 우선 프로토타입 영상을 찍게 되었다.)"
2002005-147 = "#st;[0,0];instant;1;"
2002005-148 = "#clearST"
2002005-149 = "#wait;1500"
2002005-150 = "#wait;1500"
2002005-151 = "#wait;1500"
2002005-152 = "#wait;3000"
2002005-153 = "#na;(그렇게 해서 나온 첫 번째 결과물을 확인해본 결과…….)"
2002005-154 = "#all;hide"
2002005-155 = "#wait;1000"
2002005-156 = "[ns] \"영상 전체를 모자이크하고, 음성 변조까지 하니까. 이거…….\""
2002005-157 = "#st;[0,0];instant;1;"
2002005-158 = "#clearST"
2002005-159 = "3;히마리;02\n#3;em;…\n#3;a\n#wait;2500"
2002005-160 = "3;히마리;05;마치 저를 향한 모든 의혹을 인정하고, 범인임을 고백하는 듯한 영상처럼 보이는 건, 제 기분 탓이 아니지요?\n#3;em;[?]"
2002005-161 = "[s] \"다, 다음! 응! 다른 방법을 생각해보자!\""
2002005-162 = "#all;hide"
2002005-163 = "#wait;500"
2002005-164 = "#na;(그 뒤로도 히마리가 적극적으로 꺼내 드는 다양한 아이디어들을 실험해보게 되었다.)"
2002005-165 = "#all;hide"
2002005-166 = "#wait;500"
2002005-167 = "3;히마리;03;역시 외모를 가린다면, 정체를 특정할 수 없는 수준에서 최소한도로 하고 싶어요.\n#3;em;[음표]\n#3;a"
2002005-168 = "3;히마리;08;아무래도 겉모습으로 보이는 베리타스 부장의 위엄을 전하고 싶으니까요."
2002005-169 = "[s] \"숨기려는 시점에서 위엄도 뭣도 없는 게 아닐까……?\""
2002005-170 = "3;히마리;02;아, 이런 건 어떨까요?\n#3;em;[반응]"
2002005-171 = "3;히마리;03;프라이버시 보호를 위해, 이렇게 검은색 선으로 눈만 가리는 거예요."
2002005-172 = "3;히마리;02;네? 그것만으로는 뭔가 불온하니까. 안돼?"
2002005-173 = "3;히마리;06;으음, 어려운 일이네요…….\n#3;em;[속상함]"
2002005-174 = "3;히마리;05;그럼 다른 방식으로 눈을 가리면……."

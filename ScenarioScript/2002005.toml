[translation]
2002005-1 = "天才駭客的異議"
2002005-9 = "（接到了不像平常的陽葵的聯絡後，趕忙來到了藏身地）"
2002005-15 = "[ns]「陽葵！你沒事吧！？」"
2002005-17 = "哎呀，老師。您來了啊。"
2002005-21 = "[ns1]「嗯。咦……不是出事了嗎？」\n[ns2]「你不是說發生了嚴重的事……？」"
2002005-24 = "沒錯。"
2002005-25 = "嚴重這點是真的，老師。"
2002005-26 = "我之所以看起來很冷靜……"
2002005-27 = "是因為我被稱為是千年最棒的天才清楚系病弱美少女駭客，#n所以已經習慣擺出撲克臉了吧？"
2002005-28 = "啊啊，這也是因為我太優秀了呢。#n就連感情都必須隱藏在內心深處，悲劇的美少女……"
2002005-29 = "多麼令人悲傷……"
2002005-33 = "[ns3]「不管怎麼看都沒事吧！」\n[ns4]「不是想和我說什麼嗎……？」"
2002005-36 = "今天也和老師想像的一樣，在一邊提升教養一邊優雅地休息的時候……#n我有了一個相當衝擊性的發現。"
2002005-37 = "請看這個。"
2002005-41 = "（陽葵說完後，翻開了克洛盧斯新聞部發行的、熟悉的八卦雜誌）"
2002005-42 = "[s]「八卦雜誌！？你剛才不是說教養還是什麼的嗎！？」"
2002005-43 = "不可以在意那種小事。#n問題就在這裡。看了這些之後，我感到非常受傷。"
2002005-47 = "（陽葵指的是八卦雜誌的特輯頁面，上面寫的內容是……）"
2002005-48 = "[ns5]「＜震驚！率領千年駭客集團．貝里塔斯的神祕人物──」\n[ns6]「竟然是吝嗇難搞的問題兒童！？＞……？」"
2002005-51 = "[ns]「……這篇文章怎麼了嗎？」"
2002005-52 = "呵呵呵……我到底哪裡是「吝嗇」又「難搞」的「問題兒童」。"
2002005-53 = "無論怎麼看都是清純又惹人憐愛的病弱美少女吧？"
2002005-54 = "[s]「啊，嗯……」"
2002005-55 = "哎呀，反應好像有點冷淡呢。您累了嗎？"
2002005-56 = "……原來如此，是這麼回事吧。"
2002005-57 = "是因為重要的存在隨時都在身邊，反而在不知不覺間逐漸忽略了是嗎……"
2002005-58 = "請不要忘記幸福的天才美少女……"
2002005-59 = "[s]「抱歉，我聽不懂你在說什麼……」"
2002005-60 = "請您聽好囉？#n重要的是，這上面寫的內容全都是誹謗中傷。"
2002005-61 = "真虧他們敢寫出這種報導呢。#n以為這麼輕易就能找出我的真實身分嗎？"
2002005-62 = "[s]「這不就是原因嗎？」"
2002005-63 = "他們這麼做是因為我隱藏了自己的身分……您是這個意思嗎？"
2002005-64 = "呼呣……"
2002005-65 = "也就是說，只要換個角度思考就可以了對吧。"
2002005-66 = "唉，就算是我這個天才美少女，也會有盲點啊。"
2002005-67 = "[s7]「對八卦雜誌來說，越想隱藏他們就越想知道。」\n[s8]「明明隱藏著自己的身分，被發現的話會很困擾吧。」"
2002005-70 = "啊，不……想打探我是無所謂……"
2002005-71 = "就算有什麼萬一，我也很擅長隱蔽工作。"
2002005-72 = "[s]「那樣的話問題出在哪裡……？」"
2002005-76 = "請看這裡。上面寫著貝里塔斯部長的惡行惡狀。"
2002005-80 = "（陽葵所指的地方寫著各式各樣的揣測和懷疑）"
2002005-81 = "（貝里塔斯的部長濫用權力，擅自挪用和私吞社團經費……）"
2002005-82 = "社團經費一直都是公平公正地和社員們一起使用哦？"
2002005-86 = "（與千年發生的各種科技犯罪皆有相關……）"
2002005-87 = "真是荒謬的謠言。也不想想有多少科技犯罪是多虧了我才平定的？"
2002005-88 = "……您問具體的數量……？"
2002005-89 = "這個嘛……"
2002005-90 = "做了多少功德沒有記在腦袋裡的必要唷。"
2002005-94 = "（擠不出牙膏的時候還會用剪刀剪開，用到一點也不剩……）"
2002005-95 = "……哎呀？雖然這件事是真的，不過大家都會這麼做吧？"
2002005-96 = "畢竟去買新的牙膏也要花時間嘛。"
2002005-97 = "[s]「嗯，這是陽葵的優點呢。」"
2002005-101 = "（與「5月失蹤計畫」有所關聯，在千年引發了巨大的混亂……）"
2002005-102 = "真是失禮呢。"
2002005-103 = "……雖然在那個事件裡，確實是因為做得有點過頭而被千醬罵了一頓。"
2002005-104 = "[s]「所以是真的啊！？」"
2002005-105 = "總之，那裡寫的內容幾乎都無憑無據，只是陰險地在找碴而已。#n這就是我的結論。"
2002005-106 = "這可是有損我名譽的質疑，可不能視而不見。"
2002005-107 = "況且這也不只是我一個人的問題。"
2002005-108 = "這件事與貝里塔斯的信任息息相關，且毫無疑問是對真相的褻瀆。#n由我來向大家傳達事情的真相吧。"
2002005-109 = "[s]「有道理……要讓他們撤下這篇報導嗎？」"
2002005-110 = "嗯？不是這樣的。"
2002005-111 = "畢竟是鼎鼎大名的克洛盧斯新聞部，想必不會理會閒雜人等的意見吧。"
2002005-118 = "呵呵，所以要換個角度思考。"
2002005-123 = "（為了傳達貝里塔斯的真相，決定要拍攝一部介紹影片）"
2002005-127 = "[ns]「……真的可以嗎？」"
2002005-128 = "嗯，那是當然。"
2002005-129 = "為了傳達真相，不應該等待他人的行動，必須主動出擊才行。"
2002005-130 = "擔任貝里塔斯和特異現象搜查部部長的我，明星陽葵是多麼的優秀……"
2002005-131 = "以及，我這個優秀的天才美少女駭客是多麼地圓滑和受人愛戴……"
2002005-132 = "想要正確地傳達這些真相，由我本人親口說明是最適合的吧？"
2002005-133 = "[s]「那種事該由本人說明嗎……」"
2002005-135 = "[ns]「但是你明明隱藏著身分，拍影片沒問題嗎？」"
2002005-136 = "這確實是個問題呢。"
2002005-137 = "所以我才會請老師過來。"
2002005-138 = "為了在隱藏真實身分的情況下傳達出我正確的情報，想請您一起腦力激盪。"
2002005-139 = "[s]「腦力激盪……那陽葵的想法是？」"
2002005-140 = "您看這樣如何。"
2002005-141 = "首先為了盡可能隱藏身分，在加上馬賽克的同時調整一下聲音的音調和共振峰吧。"
2002005-142 = "[s]「那樣的話或許……」"
2002005-143 = "那麼，開始拍攝吧。"
2002005-146 = "（配合積極的陽葵開始了拍攝）"
2002005-153 = "（完成的第一部影片……）"
2002005-156 = "[ns]「臉因為馬賽克的關係無法辨別，聲音也被改的乾癟癟的，所以……」"
2002005-160 = "簡直像是承認所有的指控，坦白自己犯行的影片一樣。老師也這麼覺得吧。"
2002005-161 = "[s]「下，下一個！嗯！想想別的辦法吧！」"
2002005-164 = "（之後也和陽葵嘗試了幾個想法）"
2002005-167 = "果然就算要隱藏外表，還是想維持在無法判別真實身分的範圍內的最低限度呢。"
2002005-168 = "首先要透過外表傳達貝里塔斯部長的威嚴。"
2002005-169 = "[s]「要兼顧這兩點會不會有點困難……？」"
2002005-170 = "啊，這會不會是個好主意？"
2002005-171 = "像這樣用黑色的線把眼睛的部分遮住如何。"
2002005-172 = "咦？這樣就違背原本的宗旨了……？"
2002005-173 = "唔嗯，真是困難呢……"
2002005-174 = "這樣的話，想想其他的方法吧。"
2002005-175 = "對了，帶眼罩如何？"
2002005-176 = "雖然這個房間裡只有像河馬一樣的奇怪眼罩……"
2002005-177 = "嗯？這不是河馬嗎？#n要我收回河馬的發言……？原來如此，是叫佩洛洛大人啊。"
2002005-178 = "……呵呵。沒想到老師這麼講究呢。"
2002005-179 = "[s9]「居然會被陽葵這麼說……」\n[s10]「我覺得只遮住眼睛是不夠的。」"
2002005-182 = "呼呣……實際思考起來，相當有難度呢。"
2002005-183 = "為了獲得想要的東西而不得不放棄另一樣東西的這種困境。"
2002005-184 = "……簡直就像我們的人生一樣。"
2002005-185 = "[s]「剛才的話題有那麼宏大嗎！？」"
2002005-186 = "在隱藏真實身分與展現貝里塔斯部長威嚴的同時，傳達正確的情報……"
2002005-187 = "然後可以的話，加上能樹立自己視覺形象的演出……"
2002005-188 = "[s]「……要求是不是變多了！？」"
2002005-192 = "啊……"
2002005-193 = "呵呵。"
2002005-194 = "我想到一個好點子了。"
2002005-196 = "既然不能把臉露出來，就在背景營造出能展現威嚴的氣氛吧。"
2002005-197 = "話雖如此，畫面上如果看不到我的話會有點空虛，所以準備一個剪影……"
2002005-198 = "對了，畢竟機會難得，就用代號自稱吧。"
2002005-199 = "呵呵，越來越有趣了。嗯，想法不斷湧現出來。"
2002005-209 = "（歷經無數次嘗試後，總算是完成了一部影片）"
2002005-214 = "好，這樣就完成了。"
2002005-218 = "[ns]「要怎麼傳送這部影片呢？」"
2002005-219 = "我已經用郵件連同抗議的內容一起寄出了，不過似乎被無視了呢。#n是被當成騷擾郵件了嗎……"
2002005-220 = "[s]「原來已經送出了啊……還有其他方法嗎？」"
2002005-221 = "這次為了讓他們無法無視，我打算用更確實的方式進攻。"
2002005-227 = "那就是進入克洛盧斯學園的資料庫，直接上傳影片。"
2002005-231 = "[ns]「等等，那樣不是犯罪嗎！？」"
2002005-232 = "……上傳完成了唷。"
2002005-233 = "這個時間克洛盧斯應該正在撥放新聞，來看看他們的反應吧。"
2002005-239 = "緊急速報！就在剛才，傳來了一則最新情報！"
2002005-240 = "約莫5分鐘之前，克洛盧斯學園的網路出現了遭不明人士駭入的痕跡！"
2002005-241 = "雖然目前尚未掌握入侵者的蹤跡，不過克洛盧斯學園將其視為相當重大的事件──"
2002005-245 = "什麼？有犯人留下來的影片？"
2002005-246 = "看來是追加的情報！請看這部影片！"
2002005-252 = "啊，啊，克洛盧斯學園的各位，大家好。"
2002005-253 = "我是千年最棒的天才清楚系病弱美少女駭客，是雲朵上綻放的一朵花──"
2002005-255 = "嗯？不能說那種話……？#n不，可是自我介紹就應該要……"
2002005-256 = "是呢。首先先報上名字吧。"
2002005-257 = "啊……那個，是代號對吧。"
2002005-262 = "咳咳……我是H，代號是H。"
2002005-263 = "我之所以會傳送這部影片，是因為無法忍受日前克洛盧斯新聞部不適當的報導，#n所以要傳達事情的真相──"
2002005-266 = "各位觀眾都看到了嗎？#n剛才克洛盧斯新聞部收到了自稱代號「H」的不明人士寄來的影片！"
2002005-267 = "面對簡直是重大犯罪預告的內容，克洛盧斯學園已經將本案判斷為極其重大的事件！將立即嘗試對影片進行分析！"
2002005-268 = "但是請各位安心！"
2002005-269 = "克洛盧斯新聞部不管面對怎樣的外部壓力都不會屈服的！"
2002005-270 = "為了持續將正確的報導傳達給各位──"
2002005-276 = "[ns]「陽，陽葵……？」"
2002005-278 = "……"
2002005-279 = "是因為太久沒動腦了嗎，我好像有點累了。"
2002005-283 = "……呵呵。老師，要不要一起去喝杯咖啡？"
2002005-284 = "[ns]「當作沒看到沒問題嗎！？」"
2002005-286 = "（之後對以克洛盧斯學園為起點，#n　在整個奇普托斯引起了一場小風波的陽葵一邊嘆氣一邊說教）"

[translation]
2002005-1 = "The Argument of a Genius Hacker"
2002005-9 = "After getting an urgent call from Himari, I went straight to her hideout."
2002005-15 = "[ns] \"Himari! Is everything okay?!\""
2002005-17 = "Oh, Sensei. You're here."
2002005-21 = "[ns1] \"You, uh, you seem fine.\"\n[ns2] \"You made it sound urgent...?\""
2002005-24 = "Of course."
2002005-25 = "Despite my cool demeanor, I am in a big trouble, Sensei."
2002005-26 = "The reason I appear to be so calm and collected is, of course..."
2002005-27 = "That I, the beautiful super genius hacker of Millennium admired by all as a delicate flower, have mastered the art of the poker face."
2002005-28 = "Oh, the humanity! The beauty, so tragically talented and looked up to, forced to hide the tangled inner workings of her heart..."
2002005-29 = "What a sad yet inescapable tale..."
2002005-33 = "[ns3] \"You're totally fine!\"\n[ns4] \"So, Himari, what happened...?\""
2002005-36 = "As usual, I was gracefully spending my time appreciating the finer points of culture...when I stumbled upon a shocking discovery."
2002005-37 = "Please, take a look at this."
2002005-41 = "Himari pulled out the Kronos School of Journalism's gossip magazine that I had seen earlier."
2002005-42 = "[s] \"Where are the finer points of culture you were appreciating?!\""
2002005-43 = "Don't let yourself get distracted. The problem is right here in front of us. I got so hurt when I saw this."
2002005-47 = "Himari pointed to the feature article. The title of was..."
2002005-48 = "[ns5] \"Shocking! You Won't Believe Who Leads the Veritas Hacker Collective...\"\n[ns6] \"A Miser and Troublemaker with an Awful Personality! Special Edition!\""
2002005-51 = "[ns] \"...What am I even looking at?\""
2002005-52 = "I have no idea where they got the idea that I'm a miser and a troublemaker with an awful personality from."
2002005-53 = "I mean, look at me. The first thought that pops into your head is, \"delicate, beautiful flower,\" right?"
2002005-54 = "[s] \"S-Sure...\""
2002005-55 = "Excuse me? What kind of a response is that?"
2002005-56 = "Oh, I get it..."
2002005-57 = "When something valuable to you is always by your side, you don't appreciate what you have until you lose it..."
2002005-58 = "This must be the \"Blue Bird Syndrome\" I've heard so much about. What a tragedy."
2002005-59 = "[s] \"I don't follow...\""
2002005-60 = "Don't worry, we'll fix that later. What's important now is that everything written on here is slander. Or libel. Whatever."
2002005-61 = "They don't even reveal my identity! They just say I'm hiding it!"
2002005-62 = "[s] \"Aren't you?\""
2002005-63 = "But, I mean... Wait, are you saying this happened because I hide my identity?"
2002005-64 = "Well..."
2002005-65 = "I guess it makes sense that if no one knows my identity, no one can know if something is being made up about me..."
2002005-66 = "*sigh* What an unexpected blind spot..."
2002005-67 = "[s7] \"The more you hide, the deeper these gossip magazines will dig.\"\n[s8] \"Are you worried they'll discover your hidden identity?\""
2002005-70 = "Hm?"
2002005-71 = "Oh, no...I'm not worried about that. I'm more than confident in my ability to keep information concealed."
2002005-72 = "[s] \"So...what's the issue?\""
2002005-76 = "If anything, what annoys me are the baseless accusations about my identity and so-called evil deeds."
2002005-80 = "As expected based on the title, the article Himari pointed out was full of speculation and vague suspicions."
2002005-81 = "Such as that the president was embezzling club funds from Veritas..."
2002005-82 = "I have only ever embezzled things fairly, and I even share with the other members!"
2002005-86 = "That she's the root of numerous cybercrimes that have taken place in Millennium..."
2002005-87 = "Nonsense! Do they have any idea how many cybercrimes I've stopped?"
2002005-88 = "Do you even have any idea?"
2002005-89 = "I... Um..."
2002005-90 = "Well, you know how, when you're put on the spot, you suddenly become unable to think of the answer you knew seconds early? That's what's going on now..."
2002005-94 = "She keeps the toothpaste tube till the very end, even cutting it open with scissors so she can use literally every last drop..."
2002005-95 = "Huh? Doesn't everyone do that? It's just good sense."
2002005-96 = "Besides, going out to get more toothpaste is a big deal for me."
2002005-97 = "[s] \"Yeah, I can see that.\""
2002005-101 = "She came up with the May Disappearance Plan, which wreaked havoc throughout Millennium."
2002005-102 = "Absolutely shameless of them."
2002005-103 = "...I mean, granted, that one maybe got a little out of hand, and Chi even scolded me about it..."
2002005-104 = "[s] \"You're not even denying that you were responsible for it!\""
2002005-105 = "Why are you always trying to focus on things that don't matter? The point is that it's overflowing with false information and slander. Or libel. Whatever."
2002005-106 = "I can't let these nonsensical rumors swirl around me, hidden identity or not."
2002005-107 = "Not just because it's damaging to me."
2002005-108 = "But because it tarnishes the reputation of Veritas. Furthermore, it's an affront to the truth. And if there's anything I hold dear, it's clear, unabated, pure truth."
2002005-109 = "[s] \"Right... So what will you do? Demand that they correct the article?\""
2002005-110 = "Huh? Why would I do that?"
2002005-111 = "The infamous Kronos School of Journalism isn't going to give in to such meek attempts."
2002005-118 = "We need to shake things up. Heh heh heh."
2002005-123 = "And apparently, shaking things up meant filming the \"Truth-Filled Self-Introduction of the Verified Veritas President\" video."
2002005-127 = "[s] \"Are you sure that you're sure about this?!\""
2002005-128 = "Absolutely."
2002005-129 = "The truth waits for no one, but people often wait for the truth. So, we need to take the initiative and give the people the truth they've been waiting for..."
2002005-130 = "In this video, I, Akeboshi Himari, will explain the sheer excellence of the Super Phenomenon Task Force and the Veritas president."
2002005-131 = "I'll even let them know the good deeds this beautiful super genius hacker does as part of her daily routine, and how trusted and respected she is by those around her."
2002005-132 = "And who better to say all that than myself?"
2002005-133 = "[s] \"Anybody, actually. Those aren't really things you should say about yourself...\""
2002005-135 = "[ns] \"Himari, is a self-introduction video really the best idea while you're hiding your identity?\""
2002005-136 = "Admittedly, on the surface, that might seem like an insurmountable problem."
2002005-137 = "Which is exactly why I asked you to be here today. "
2002005-138 = "We need to brainstorm a way to deliver unadulterated truth while also not letting anyone know my actual identity."
2002005-139 = "[s] \"Brainstorm... Do you have any good ideas to start off with?\""
2002005-140 = "How about this?"
2002005-141 = "We blur the video and change my voice until I'm completely unrecognizable."
2002005-142 = "[s] \"I guess that could work...\""
2002005-143 = "Okay, let's try it out."
2002005-146 = "Following Himari's enthusiastic instructions, we filmed a test video."
2002005-153 = "When we checked the outcome..."
2002005-156 = "[ns] \"The entire video is blurred out, and the voice is very obviously distorted, so...\""
2002005-160 = "It just makes me look exactly like the suspicious criminal they are trying to paint me as, doesn't it?"
2002005-161 = "[s] \"N-Next! Let's move on to the next idea!\""
2002005-164 = "After that, we tried out the various ideas Himari came up with."
2002005-167 = "I want to conceal my appearance enough to hide my identity..."
2002005-168 = "But also leave enough of my appearance in so that my innate dignity as the president of Veritas shines through."
2002005-169 = "[s] \"...Is anyone going to be convinced of the dignity of someone hiding their identity?\""
2002005-170 = "Hmm... What about this?"
2002005-171 = "Just put a black strip over my eyes."
2002005-172 = "Not enough?"
2002005-173 = "Hmm, this is tough..."
2002005-174 = "Oh, how about we hide my eyes in a different way?"
2002005-175 = "Like...an eye patch?"
2002005-176 = "I do have an eye patch that looks like a shifty hippo..."
2002005-177 = "What? Peroro isn't a hippo? Take it back? "
2002005-178 = "You're more...passionate about these things than I thought, Sensei."
2002005-179 = "[s9] \"Isn't that my line?\"\n[s10] \"And I don't think just hiding your eyes is going to be enough...\""
2002005-182 = "Hmm, this is unexpectedly difficult. "
2002005-183 = "All happiness requires sacrifice..."
2002005-184 = "Truly the core of the human experience."
2002005-185 = "[s] \"When did things get so somber?!\""
2002005-186 = "All I want is to tell the whole truth while hiding my identity while also allowing the full force of my dignity to come across in the video."
2002005-187 = "And, now that I think about it, isn't it important to make sure the visual quality and camera angle complement the material?"
2002005-188 = "[s] \"Really? You're adding conditions now?\""
2002005-192 = "Ah"
2002005-193 = "Heh heh heh."
2002005-194 = "I have an amazing idea."
2002005-196 = "We can hide my identity without comprising my dignity by having an image on the screen instead of my face..."
2002005-197 = "Or perhaps we'll take a minimalist approach and have nothing on the screen but my silhouette..."
2002005-198 = "Oh, and my initials."
2002005-199 = "Yes, yes. I like it. More and more new, innovative ideas are coming to me."
2002005-209 = "After much trial and error, we finally completed a video."
2002005-214 = "Yes, it's all coming together now."
2002005-218 = "[ns] \"Now that we have a video, how are you gonna deliver it? Email?\""
2002005-219 = "Oh, I've sent complaint emails before, but those are always ignored. I think they go straight to junk mail. That's not gonna work."
2002005-220 = "[s] \"So... What's the plan?\""
2002005-221 = "The most effective method of communication is one that can't be ignored..."
2002005-227 = "I'm going to take direct control of the Kronos School database and upload it directly."
2002005-231 = "[ns] \"No, no, no, no, no. Don't you know that's a crime?!\""
2002005-232 = "I already uploaded the video."
2002005-233 = "The Kronos School news is about to air. Let's see them spin this!"
2002005-239 = "Breaking news!"
2002005-240 = "About five minutes ago, a security breach was detected on the Kronos School's network!"
2002005-241 = "We don't know who the perpetrator is, but we do know that it's a serious risk!"
2002005-245 = "What? That intruder uploaded a video that appears to be a confession?"
2002005-246 = "Oh! Well...let's take a look!"
2002005-252 = "Testing, testing. Hello, Kronos School."
2002005-253 = "Allow me to introduce myself. I am the super genius hacker of Millennium, the ephemerally beautiful, delicate, ever-blooming petite flower..."
2002005-255 = "Huh? I shouldn't start off like that? It's a self-introduction. I have to introduce myself..."
2002005-256 = "What? The name? Oh, right."
2002005-257 = "Yeah, don't worry, I remember it... It's, uh... Oh! Right."
2002005-262 = "My name is H. Codename H."
2002005-263 = "The purpose of this video is to stand against the injustices of the Kronos School of Journalism, to deliver the truth to the people, to—"
2002005-266 = "Wow! As you can see, a dangerous threat in the form of a suspicious video from some hidden figure referring to themselves as Codename H has been directed at the Kronos School of Journalism!"
2002005-267 = "With this material clearly being an admission of guilt, the Kronos School has determined the situation to be serious enough to warrant a detailed analysis of the video!"
2002005-268 = "However, we'd like our viewers to know one thing!"
2002005-269 = "The Kronos School of Journalism does not negotiate with people who complain!"
2002005-270 = "For more accurate reporting, tune in next time...!"
2002005-276 = "[ns] \"Himari... So, um...\""
2002005-278 = "Hmm..."
2002005-279 = "I'm tired, my brain is tired, and my body is tired. "
2002005-283 = "Hahaha. Sensei, want to go out for a cup of coffee?"
2002005-284 = "[ns] \"Are you just going to stick your head in the sand?!\""
2002005-286 = "After much sighing, I lectured the girl whose trouble had rippled beyond the Kronos School, spreading throughout Kivotos."

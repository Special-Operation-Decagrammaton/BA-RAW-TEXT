[translation]
21030-1 = "ตอนที่ 3;ไปยังพื้นที่รกร้าง"
21030-2 = "พื้นที่รกร้าง"
21030-5 = "......"
21030-6 = "......"
21030-7 = "นี่ พี่โมโมอิ..."
21030-8 = "เราต้องอยู่แบบนี้อีกนานแค่ไหนเหรอ?"
21030-9 = "ชู่ว อย่าส่งเสียง อ๊ะ คุณครู! บอกให้ก้มหัวไว้ไง!"
21030-16 = "..."
21030-17 = "... ■■■ ■■■■...."
21030-20 = "... ■■■"
21030-21 = "■■■■ ■■"
21030-27 = "เฮ้อ... ไปแล้วยังนะ?"
21030-28 = "เอาล่ะ ไปกันเลย"
21030-29 = "ไม่เอา!"
21030-30 = "ที่นี่มันอะไรกันเนี่ย! มีหุ่นยนต์อะไรก็ไม่รู้เดินวนเวียนอยู่เต็มไปหมด!"
21030-31 = "จะสงสัยอะไรอีก ก็บอกไปตั้งแต่ตอนเข้ามาแล้วไง"
21030-34 = "นี่คือ 'พื้นที่รกร้าง'"
21030-36 = "คิดว่าจะมีอันตรายเพราะเป็นเขตห้ามเข้าซะอีก..."
21030-37 = "พวกหุ่นยนต์นั่นคืออะไรเหรอ...?"
21030-38 = "ไม่สิ 'พื้นที่รกร้าง' ที่มีพวกหุ่นยนต์เดินเตร็ดเตร่กันแบบนี้คือที่แบบไหนกันน่ะ?"
21030-39 = "อืม... ฉันก็ไม่ได้รู้มากไปกว่าที่ได้ยินมาจากเวอริทัสหรอกนะ..."
21030-40 = "แต่เคยบอกคุณครูไปแล้วใช่ไหม~ ว่าเดิมทีแล้วที่นี่เป็นพื้นที่ที่ควบคุมอย่างเข้มงวด?"
21030-41 = "[s1] \"เหมือนจะ... เคยบอก... นะ...\"\n[s2] \"เคยเหรอ? จำไม่ได้เลย...?\""
21030-42 = "ไหนๆ ก็มาที่นี่แล้ว ฉันจะอธิบายให้ฟังอีกรอบ นี่เป็นเขตหวงห้ามที่ซ่อนบางอย่างไว้..."
21030-43 = "ไหนๆ ก็มาที่นี่แล้ว ฉันจะอธิบายให้ฟังอีกรอบ นี่เป็นเขตหวงห้ามที่ซ่อนบางอย่างไว้..."
21030-44 = "ประธานองค์การนักเรียนนั่นไงล่ะ"
21030-45 = "ประธานองค์การนักเรียน? คนที่สูงที่สุดของเหล่าประธานสภานักเรียนคิโวทอส...#nที่หายตัวไปอย่างกะทันหันใช่ไหม?"
21030-46 = "ใช่แล้วล่ะ หลังจากเธอหายตัวไป กองกำลังขององค์การนักเรียนก็ถอนทัพออก แล้วก็ปล่อยทิ้งที่นี่ไว้"
21030-47 = "ยังโชคดีที่เราเข้ามาที่นี่ได้... แต่ก็เถอะนะ!"
21030-48 = "พอการปิดบังและการคุ้มกันขององค์การนักเรียนหายไปแล้ว เราก็สามารถเข้ามาที่นี่ได้ผ่านเวอริทัส..."
21030-49 = "รุ่นพี่ฮิมาริเคยบอกไว้ว่า..."
21030-50 = "'ที่นี่อาจจะเป็นทางระบายน้ำเสียในยุคหนึ่งที่มีของที่หายไปจนถูกลืมเลือนในคิโวทอส'"
21030-51 = "รุ่นพี่ฮิมาริ... หมายถึงรุ่นพี่คนสวยของเวอริทัสที่นั่งวีลแชร์ใช่ไหม?"
21030-52 = "หากคนฉลาดหลักแหลมด้านเกม RPG ที่เคยพูดว่า 'ฉันรู้หมดทุกอย่าง' อย่างรุ่นพี่ฮิมาริ#nพูดว่า 'อาจจะ' แบบนี้... หมายความว่าที่นี่คือโลกปริศนาจริงๆ..."
21030-53 = "แล้วที่นี่มันเกี่ยวอะไร... กับ G.Bible ล่ะ?"
21030-54 = "อย่าบอกนะว่าเหตุผลที่คิดว่าที่นี่มี G.Bible เพราะคำพูดที่ว่า 'มีของที่หายไปจนถูกลืมเลือน'?!"
21030-55 = "ไม่ใช่อย่างนั้นหรอก ตอนที่เราขอให้เวอริทัสค้นหา G.Bible เราได้พิกัดของสถานที่สุดท้าย#nที่ G.Bible ทำงานมา"
21030-56 = "และที่อยู่ของที่นั่นก็คือ 'เขตที่ไม่ปรากฏ'"
21030-57 = "งั้นก็แสดงว่า...?!"
21030-58 = "ใช่"
21030-59 = "G.Bible อยู่ที่พื้นที่รกร้างแห่งนี้"
21030-60 = "[s] \"G.Bible คืออะไรเหรอ?\""
21030-61 = "ฉันจะอธิบายตั้งแต่เมื่อวานแล้ว แต่ยูกะก็มาหาก่อน ฮึ่ม!"
21030-62 = "ถ้าให้พูดง่ายๆ ในมิลเลเนียมในอดีต... ไม่สิ ในคิโวทอส..."
21030-63 = "เคยมีนักพัฒนาเกมในตำนานอยู่"
21030-64 = "และ G.Bible ก็คือสิ่งที่คนนั้นเขียนขึ้นมาในระหว่างที่เรียนอยู่ในมิลเลเนียม"
21030-65 = "ฉันก็ไม่รู้รายละเอียดมากนักหรอก..."
21030-66 = "แต่ว่ากันว่ามี 'เคล็ดลับการสร้างเกมที่ดีที่สุด' เขียนอยู่ในนั้น"
21030-67 = "มาคิดๆ ดูแล้ว... มันเหมือนโฆษณาชวนเชื่อของโรงเรียนเกมมากกว่านะ"
21030-68 = "ไม่ใช่นะ! G.Bible มีอยู่จริง! คัมภีร์แห่งเกมที่ช่วยให้เราสร้างเกมที่ดีที่สุดได้มันมีอยู่จริงๆ นะ!"
21030-69 = "เราจะสร้างสุดยอดเกมจาก G.Bible และเกมนั้นก็คือ... <เทลส์ ซาก้า โครนิเคิล 2> ยังไงล่ะ!"
21030-70 = "ถ้าเราตามพิกัดที่เวอริทัสให้มา เราก็จะหา G.Bible..."
21030-72 = "(พรึ่บ) ..."
21030-73 = "...■■■ ■■■■!"
21030-74 = "ยะ... แย่ล่ะสิ!"
21030-75 = "อ๊ะ! หุ่นยนต์?!"
21030-83 = "หุ่นยนต์พวกนี้ดูไม่เป็นมิตรเลย! กำลังมาทางนี้อยู่หรอกเหรอ!?!"
21030-84 = "แบบนี้เราต้องโดนล้อมแน่เลย!"
21030-85 = "เอาไงดี... ทำยังไงดีล่ะ?!"
21030-86 = "[s] \"มีโรงงานอยู่ทางนั้น!\""
21030-87 = "หืม? ไปให้ทางโรงงานเหรอ?"
21030-88 = "โอ๊ะ! ดีเลยคุณครู! รีบไปกันเถอะ! โจมตีพวกหุ่นยนต์แล้วไปที่โรงงานกัน!"
21030-89 = "คุณครู! ช่วยสั่งการต่อสู้หน่อยค่ะ!"

[translation]
21030-1 = "第3話;前往廢墟"
21030-2 = "廢墟"
21030-5 = "……"
21030-6 = "……"
21030-7 = "……我說，姐姐。"
21030-8 = "我們要這個樣子到什麼時候？"
21030-9 = "小聲一點。啊，老師，頭再低一點……！"
21030-16 = "……"
21030-17 = "…… ■■■ ■■■■……"
21030-20 = "…… ■■■。"
21030-21 = "■■■■ ■■。"
21030-27 = "……呼──已經走掉了吧？"
21030-28 = "好，那我們走吧。"
21030-29 = "好，個頭啊！"
21030-30 = "這裡到底是怎麼回事啊！？數不清的神祕機器人在到處走來走去！"
21030-31 = "你說這裡……我不是說很多次了嗎。"
21030-34 = "是「廢墟」唷。"
21030-36 = "雖然說畢竟是禁止進入的區域，我也做好會遇到一定程度危險的心理準備了……#n哎呀，還是有點可怕呢……"
21030-37 = "那個機器人，到底是什麼呢……？"
21030-38 = "不，比起這個，那樣的機器人們徘徊著的這個「廢墟」……到底是什麼呢？"
21030-39 = "唔嗯，我也只有從貝里塔斯那裡聽到一點點而已，其實也是一頭霧水……"
21030-40 = "本來，這裡是嚴禁人員出入的，我也跟老師說過了吧？"
21030-41 = "[s1] 「嗯，有聽你說過。」\n[s2] 「這是哪……我是誰……？」"
21030-42 = "既然都到這裡來了，我就再說明一次。#n限制這裡的人員進出，就連這裡的存在都想盡可能隱藏的就是……"
21030-43 = "畢竟老師還處在混亂狀態，我就再說明一次。#n限制這裡的人員進出，就連這裡的存在都想盡可能隱藏的就是……"
21030-44 = "聯邦學生會長。"
21030-45 = "聯邦學生會長是……位於奇普托斯所有學生會長們的頂點，突然消失的那個人嗎？"
21030-46 = "沒錯，從那之後聯邦學生會就將兵力撤離了這裡，就這麼棄置不管了的樣子。"
21030-47 = "多虧如此我們才能像這樣混進來……總之！"
21030-48 = "就是因為沒有了聯邦學生會的警備，#n再加上獲得貝里塔斯的幫助，我們才能成功到達這裡。"
21030-49 = "根據陽葵前輩所說，這裡是……"
21030-50 = "「聚集了從奇普托斯被消去且遺忘的東西、類似時代的下水道一樣的地方也說不定」……"
21030-51 = "陽葵前輩……你說的是貝里塔斯的那個，坐在輪椅上的那個美女陽葵前輩嗎？"
21030-52 = "總是給人RPG遊戲裡賢者的那種「我什麼都知道唷」的感覺的陽葵前輩，#n竟然會用「也說不定」還真少見呢……也就是說，這裡就是這麼充滿未知的世界吧。"
21030-53 = "但是，為什麼G.Bible會在這種地方……咦？等等！？"
21030-54 = "雖然覺得不太可能……難道姐姐之所以說「G.Bible就在這裡」只是因為聽說這裡#n\n「聚集了從奇普托斯被消去且遺忘的東西」而已！？#n就，就因為這個理由跑到這種地方！？"
21030-55 = "不只是因為這樣唷。#n我委託貝里塔斯進行G.Bible的搜索，他們告訴了我這個座標。\n這個「最後確認到G.Bible運作的座標」。"
21030-56 = "而這個座標所指向的，是「普通的地圖上不存在的地方」。"
21030-57 = "也就是說……！？"
21030-58 = "沒錯。"
21030-59 = "結合這兩個線索來看，G.Bible肯定在這個……一直被隱藏著存在的「廢墟」裡。"
21030-60 = "[s] 「話說回來……G.Bible到底是什麼？」"
21030-61 = "這麼說來，上次只說到一半而已呢。"
21030-62 = "簡單來說在以前的千年，不，以前的奇普托斯裡……"
21030-63 = "有個傳說級的遊戲製作人。"
21030-64 = "那個人在千年就讀時所做的就是「G.Bible」。"
21030-65 = "雖然我也不知道詳細的內容……"
21030-66 = "聽說在那裡面，有著「能做出最棒遊戲的祕密方法」。"
21030-67 = "……那個，不會是某個遊戲製作學校的廣告吧？"
21030-68 = "才不是咧！G.Bible是真實存在的！#n只要讀了就能夠做出最棒遊戲的「遊戲聖經」肯定是存在的！"
21030-69 = "只要讀了G.Bible，就能做出最棒的遊戲……《故事．傳說．編年史２》了！"
21030-70 = "只要朝著從貝里塔斯拿來的這個座標前進的話，G.Bible肯定就在前方……"
21030-72 = "……"
21030-73 = "……■■■ ■■■■！"
21030-74 = "那，那個是！"
21030-75 = "機器人！？"
21030-83 = "總，總覺得好像完全被盯上了！？全部都朝我們這邊聚集過來了！？"
21030-84 = "再這樣下去的話會被包圍的！"
21030-85 = "嗚哇哇哇，怎，怎麼辦才好！？"
21030-86 = "[s] 「那裡！能看到一個像工廠一樣的地方！」"
21030-87 = "咦？工，工廠！？"
21030-88 = "哇喔，Nice老師！快！我們趕快突破這些機器人，然後逃進那個工廠吧！"
21030-89 = "老師，戰鬥的指揮就拜託你了！"

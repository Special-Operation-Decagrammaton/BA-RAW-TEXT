21030-1 = "Episode 3;To the Ruins"
21030-2 = "The Ruins"
21030-5 = "..."
21030-6 = "..."
21030-7 = "Hey, Momoi?"
21030-8 = "How much longer do we have to stay like this?"
21030-9 = "Shh, don't make a sound. Keep your head down, Sensei!"
21030-16 = "..."
21030-17 = "■■■ ■■■■..."
21030-20 = "...■■■."
21030-21 = "■■■■ ■■."
21030-27 = "Phew. Are they gone?"
21030-28 = "Good. Let's go."
21030-29 = "This isn't good at all!"
21030-30 = "What is this place? It's crawling with weird robots!"
21030-31 = "What do you mean? I told you before we came here."
21030-34 = "These are the ruins."
21030-36 = "But I get what you mean. I knew this place was supposedly dangerous. But still..."
21030-37 = "Why are all of these robots here?"
21030-38 = "What reason would they have to be guarding these ruins?"
21030-39 = "I don't know much other than what I heard from Veritas..."
21030-40 = "I already told you that access to this location was heavily restricted, right?"
21030-41 = "[s1] \"You mentioned it a few times.\"\n[s2] \"How did I get here? What's going on?\""
21030-42 = "Well, now that we're here, I'll explain it again. The one who restricted access to this place and tried to hide its very existence was none other than..."
21030-43 = "Well, now that we're here, I'll explain it again. The one who restricted access to this place and tried to hide its very existence was none other than..."
21030-44 = "...the General Student Council President."
21030-45 = "Do you mean the president who presides over all others? The one who suddenly disappeared?"
21030-46 = "One and the same. The General Student Council also had troops stationed here, but they withdrew after she went missing."
21030-47 = "We wouldn't have gotten this far in otherwise. In any case!"
21030-48 = "Since the General Student Council has given up on trying to hide or watch this place, Veritas was able to slip us in."
21030-49 = "According to what Himari told me..."
21030-50 = "...these ruins might hold all sorts of long lost things from Kivotos' past."
21030-51 = "Himari? Do you mean that pretty upperclassman from Veritas that uses a wheelchair?"
21030-52 = "She gives me the all-knowing RPG sage vibes. If even she has uncertainties...then this place really is mysterious."
21030-53 = "But what makes you think the G.BIBLE is here? ...Wait a second!"
21030-54 = "Don't tell me that you jumped to the conclusion that the G.BIBLE is here just because of what Himari said!"
21030-55 = "That's not it. When I asked Veritas to search for the G.BIBLE, they also looked into the last place it was activated."
21030-56 = "But the result came back as \"area redacted.\""
21030-57 = "That means...?!"
21030-58 = "Exactly."
21030-59 = "The G.BIBLE is somewhere in these ruins."
21030-60 = "[s] \"What IS this G.BIBLE thing you two are talking about?\""
21030-61 = "I was gonna tell you yesterday before Yuuka interrupted us."
21030-62 = "Back in Millennium's early days—well, all of Kivotos' early days, really..."
21030-63 = "There was a legendary game developer."
21030-64 = "That person created the G.BIBLE while they were attending Millennium."
21030-65 = "The exact details aren't known..."
21030-66 = "...but it supposedly contains the secrets to making a perfect game."
21030-67 = "That sounds like a marketing tactic for a game development school or something."
21030-68 = "No! The G.BIBLE is real! I know the bible for creating the perfect game is out there somewhere!"
21030-69 = "If we were to get our hands on the G.BIBLE, Tales Saga Chronicle 2 would become perfect!"
21030-70 = "All we have to do is follow the coordinates Veritas gave us and we'll finally have it."
21030-72 = "*sneaking*"
21030-73 = "■■■ ■■■■!"
21030-74 = "Ah... Uh... Uh-oh."
21030-75 = "Ah! Robots?!"
21030-83 = "Th-They're so aggressive! How many of these robots are there?!"
21030-84 = "W-We'll be surrounded at this rate!"
21030-85 = "Ugh. What do we do?!"
21030-86 = "[s] \"Looks like there's a factory over there!\""
21030-87 = "Huh? A factory?"
21030-88 = "Ooh! Good thinking, Sensei! Hurry and break through the robots! We're going to the factory!"
21030-89 = "Sensei! Please lead us into battle!"

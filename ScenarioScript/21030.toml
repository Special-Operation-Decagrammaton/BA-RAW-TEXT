[translation]
21030-1 = "第3話;廃墟へ"
21030-2 = "廃墟"
21030-5 = "……"
21030-6 = "……。"
21030-7 = "……ねえ、お姉ちゃん。"
21030-8 = "一体いつまでこうしてればいいの？"
21030-9 = "静かに。あっ先生、もうちょっと頭下げて……！"
21030-16 = "……。"
21030-17 = "…… ■■■ ■■■■……。"
21030-20 = "…… ■■■。"
21030-21 = "■■■■ ■■。"
21030-27 = "……ひゅー、もう行ったかな？"
21030-28 = "よし、じゃあ行こう。"
21030-29 = "よし、じゃない！"
21030-30 = "いったいここは何！？あんな謎のロボットが、数え切れないぐらい動き回ってるし！"
21030-31 = "何って……もう何回も言ってるじゃん。"
21030-34 = "「廃墟」だよ。"
21030-36 = "出入り禁止の区域っていうからまあ、ある程度の危険は覚悟してたけど。いやあ、冷や冷やするね……。"
21030-37 = "あのロボット、いったい何なんだろ……？"
21030-38 = "ううん、それより、あんなのが幾つも徘徊してるこの「廃墟」って……一体なんなの？"
21030-39 = "うーん、私もヴェリタスからちょっと聞いただけだから、分からないことだらけだけど……"
21030-40 = "本来、ここの出入りは厳しく制限されてた、ってとこまでは先生にも言ったよね？"
21030-41 = "[s1] \"うん、そこまでは聞いた。\"\n[s2] \"ここはどこ……私は誰……？\""
21030-42 = "実際にここまで来たことだし、もう一回説明しよっか。ここの出入りを制限して、存在自体をできるだけ隠そうとしてたのは……"
21030-43 = "先生のステータスが混乱状態だし、もう一回説明しよっか。ここの出入りを制限して、存在自体をできるだけ隠そうとしてたのは……"
21030-44 = "連邦生徒会長だったの。"
21030-45 = "連邦生徒会長って……あの、キヴォトスの生徒会長たちの頂点にいたのに、突然いなくなっちゃった人？"
21030-46 = "そう。あの人がいなくなってから連邦生徒会の兵力も撤収しちゃって、そのまま放置されてるみたい。"
21030-47 = "そのおかげでこうして入り込めたんだけど……とにかく！"
21030-48 = "連邦生徒会の警備がいなくなって、ヴェリタスの助けも得てこの場所に来られたわけだけど。"
21030-49 = "ヒマリ先輩によると、ここは、"
21030-50 = "「キヴォトスから消えて忘れ去られたものが集まる、時代の下水道みたいな場所なのかもしれない」……って。"
21030-51 = "ヒマリ先輩って……ヴェリタスのあの、車椅子に乗った美人のヒマリ先輩？"
21030-52 = "いつもRPGの賢者みたいに「私は何でも知ってますよ」って感じのヒマリ先輩が、「かもしれない」って言葉を使うのも珍しいね……それくらい、未知の世界なんだ。"
21030-53 = "でも、なんでこんなところにG.Bibleが……あれ、ちょっと待って！？"
21030-54 = "まさかとは思うけど……お姉ちゃんが「ここにG.Bibleがある」って言ったのは、「キヴォトスから消えて忘れ去られたものが集まる」って聞いたから！？そ、それだけの理由でこんなところに！？"
21030-55 = "それだけじゃないよ。ヴェリタスにG.Bibleの捜索を依頼したら、座標を教えてくれたの。「最後にG.Bibleの稼働が確認された座標」をね。"
21030-56 = "その座標が指してたのは、「普通の地図には存在しない場所」だった。"
21030-57 = "っていうことは……！？"
21030-58 = "そう。"
21030-59 = "その二つを合わせて考えると、G.Bibleはきっとここ……ずっと存在が隠されていた、「廃墟」にあるはず。"
21030-60 = "[s] \"G.Bible……って、結局何なんだっけ？\""
21030-61 = "そういえば、それも説明の途中だったね。"
21030-62 = "簡単に言うと昔のミレニアムには、ううん、昔のキヴォトスにはね……"
21030-63 = "伝説的な、ゲームクリエイターがいたの。"
21030-64 = "その人がミレニアム在学中に作ったのが、「G.Bible」。"
21030-65 = "詳しい内容は分からないんだけど……"
21030-66 = "その中には、「最高のゲームを作れる秘密の方法」が入っているんだって。"
21030-67 = "……それ、どこかのゲームクリエイター学校の広告じゃなくて？"
21030-68 = "違うよ！G.Bibleはあるって！読めば最高のゲームを作れるようになる「ゲームの聖書」は、絶対にある！"
21030-69 = "そのG.Bibleを読めば、最高のゲーム……『テイルズ・サガ・クロニクル２』が作れるはず！"
21030-70 = "ヴェリタスから貰ったこの座標に向かって行けば、そこにきっとG.Bibleが……"
21030-72 = "……。"
21030-73 = "……■■■ ■■■■！"
21030-74 = "あ、あれって！"
21030-75 = "ロボット！？"
21030-83 = "な、何だかすごい狙われてない！？こっちの方に集まってきてるし！？"
21030-84 = "こ、このままじゃ包囲されちゃう！"
21030-85 = "うわわわ、ど、どうしよう！？"
21030-86 = "[s] \"あっち！工場みたいなのが見える！\""
21030-87 = "え？こ、工場！？"
21030-88 = "お、先生ナイス！急いで！ロボットたちを突破して、あの工場に逃げ込もう！"
21030-89 = "先生、戦闘の指揮をお願いします！"

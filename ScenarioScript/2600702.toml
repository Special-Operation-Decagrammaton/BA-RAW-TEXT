[translation]
2600702-1 = "玩樂的意思"
2600702-3 = "啊，老師，在這裡！"
2600702-4 = "抱歉，讓老師跑這一趟……"
2600702-5 = "[s1] 「沒關係，別介意。」\n[s2] 「這裡是哪裡……？」"
2600702-6 = "謝謝你……"
2600702-7 = "……老師問這個地方嗎？"
2600702-8 = "這裡是渡假勝地後面的一個小倉庫……"
2600702-9 = "這裡是渡假勝地後面的一個小倉庫……"
2600702-10 = "我原本是來找一些直升機維修工具和打掃用具，卻意外挖到寶……"
2600702-11 = "看到很多值錢的東西都被完好地丟在這裡，就不知不覺在意了起來……啊哈哈……"
2600702-12 = "[s3] 「就算來渡假也還是老樣子呢。」\n[s4] 「……綾音還真是始終如一。」"
2600702-15 = "我，我這樣果然不太對勁嗎？對不起……"
2600702-16 = "我也覺得自己的個性有些奇怪……但實在改不了。"
2600702-17 = "難得來渡假……我也明白應該盡可能把阿拜多斯的事拋在腦後……"
2600702-18 = "唔──嗯……一開始我也想說來到渡假勝地就應該好好玩，結果卻還是在翻倉庫……"
2600702-19 = "仔細想想果然很不對勁對吧。再這樣下去，連玩樂的時間都沒有了。"
2600702-20 = "……什麼？"
2600702-21 = "你說我看起來已經玩得很開心了？……我嗎？"
2600702-22 = "但我只是窩在倉庫裡面……看起來有開心嗎？啊哈哈……"
2600702-23 = "[s5] 「所謂的『玩樂』，不就是做自己想做的事情嗎？」\n[s6] 「不覺得就像是在倉庫裡『尋寶』嗎。」"
2600702-24 = "……！！"
2600702-25 = "……！！"
2600702-26 = "是，是這樣嗎？"
2600702-27 = "聽到老師這樣說，就寬心了不少……！"
2600702-33 = "其，其實……我在翻倉庫的時候也一直很在意。"
2600702-34 = "就是……都來到渡假勝地了，應該還有其他事情可以做才對……"
2600702-35 = "例如，既然來到海邊就應該要去游泳；既然住進渡假勝地就該盡情使用裡頭的設施……"
2600702-36 = "既然是渡假就應該要做哪些事，"
2600702-37 = "這類的念頭一直揮之不去……"
2600702-38 = "[s7] 「嗯。我就知道你會這麼想。」\n[s8] 「沒關係的。所以我才會過來找你。」"
2600702-39 = "……啊。"
2600702-40 = "……啊。"
2600702-41 = "老師果然在收到我傳的MomoTalk時，就一直把它放在心上了呢。"
2600702-42 = "我竟然讓老師這麼費心……啊哈哈……"
2600702-43 = "……咦？"
2600702-44 = "老師也是為了玩……才來這邊的？"
2600702-45 = "那是什麼意思……"
2600702-46 = "……比起自己一個人玩，兩個人玩感覺更有趣……？"
2600702-50 = "老師……"
2600702-51 = "那個，我不太會說話……不知道該怎麼表達……"
2600702-52 = "那個……"
2600702-53 = "……"
2600702-54 = "……非常感謝。我很開心。"
2600702-58 = "好！那來都來了，我們現在就一起在倉庫挖寶吧？"
2600702-59 = "我們來比賽，看誰找到的東西更有用吧！"
2600702-60 = "[s9] 「我接受你的挑戰！」\n[s10] 「每回合限制時間五分鐘唷。」"
2600702-61 = "呵呵，請老師別小看我喔！對策委員會可是靠我撐起來的呢！"
2600702-62 = "呵呵，請老師別小看我喔！對策委員會可是靠我撐起來的呢！"
2600702-63 = "那麼，準～備……"
2600702-67 = "……開始！！"
2600702-72 = "（之後我和綾音在倉庫裡四處翻找）"
2600702-73 = "（比賽開始之後，我們兩人滿頭大汗挖出了各種東西……）"
2600702-74 = "（但找到的東西，幾乎都大到沒辦法搬上直升機……）"

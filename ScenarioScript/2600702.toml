[translation]
2600702-1 = "The Meaning of Enjoyment"
2600702-3 = "Oh, Sensei. Over here!"
2600702-4 = "I'm sorry to make you come all the way here."
2600702-5 = "[s1] \"It's okay, no worries.\"\n[s2] \"What is this place?\""
2600702-6 = "Thank you, Sensei."
2600702-7 = "...Huh? This place?"
2600702-8 = "It's the back of the resort, where there's a small supply storage room."
2600702-9 = "It's the back of the resort, where there's a small supply storage room."
2600702-10 = "I opened it to get some cleaning and maintenance tools, but found much more than that..."
2600702-11 = "I found a bunch of abandoned equipment...and I couldn't let it go. Hahaha..."
2600702-12 = "[s3] \"You're working hard, even here.\"\n[s4] \"...You're very consistent.\""
2600702-15 = "I-It's random though, right? I'm sorry..."
2600702-16 = "I know I'm kind of weird, but it's hard to change. "
2600702-17 = "I really should forget a little about Abydos business in a place like this..."
2600702-18 = "I really was determined to enjoy my time at the resort...but I just ended up rummaging through the storage."
2600702-19 = "Now that I think about it, that's no good. I won't have any time to actually enjoy myself."
2600702-20 = "Hm?"
2600702-21 = "You think I am enjoying myself? ...Really?"
2600702-22 = "Oh...but all I've been doing is going through the storage room in my free time..."
2600702-23 = "[s5] \"Enjoyment means doing something you want to do.\"\n[s6] \"I think this is like a treasure hunt for you.\""
2600702-24 = "……!!"
2600702-25 = "……!!"
2600702-26 = "R-Really? I guess that's true!"
2600702-27 = "It's a relief to hear that, especially from you!"
2600702-33 = "I-I was worried...going through the storage room."
2600702-34 = "I felt like I should be doing something else, you know?"
2600702-35 = "Now that we're at the beach, I should be swimming and taking advantage of the resort facilities..."
2600702-36 = "I felt like I was doing something wrong unless I did those things."
2600702-37 = "Which is why I felt weird about digging around in boxes..."
2600702-38 = "[s7] \"Yeah, that was my guess.\"\n[s8] \"It's all right. That's why I came here.\""
2600702-39 = "Ah!"
2600702-40 = "Ah!"
2600702-41 = "You've been thinking about this since I sent you that MomoTalk message."
2600702-42 = "I feel like I accidentally asked you for help again... Ahaha..."
2600702-43 = "Hm?"
2600702-44 = "You came here to hang out with me?"
2600702-45 = "But...why?"
2600702-46 = "You think it would be more fun for me to do this with someone else?"
2600702-50 = "Sensei..."
2600702-51 = "Hmm, I don't know what to say. I'm not very good with words..."
2600702-52 = "So...um..."
2600702-53 = "..."
2600702-54 = "...Thank you."
2600702-58 = "Okay! So, let's begin the treasure hunt!"
2600702-59 = "It's a showdown! Let's compete to see who finds the better item!"
2600702-60 = "[s9] \"Challenge accepted.\"\n[s10] \"Time limit is five minutes per round.\""
2600702-61 = "Heehee! It's not gonna be easy for you! I have experience leading the Foreclosure Task Force!"
2600702-62 = "Heehee! It's not gonna be easy for you! I have experience leading the Foreclosure Task Force!"
2600702-63 = "Ready..."
2600702-67 = "...Go!"
2600702-72 = "Ayane and I started to dig through the boxes."
2600702-73 = "We found all kinds of things. We were tired and sweating, and then we realized."
2600702-74 = "Most of the stuff was too big to put inside the helicopter."

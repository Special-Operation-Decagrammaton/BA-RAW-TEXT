[translation]
2600702-1 = "ความหมายของการเล่นสนุก"
2600702-3 = "อ๊ะ คุณครู ทางนี้ค่ะ!"
2600702-4 = "ขอโทษด้วยค่ะ ฉันไม่ได้ตั้งใจให้คุณครูออกมาแบบนี้เลยแท้ๆ..."
2600702-5 = "[s1] \"ไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\"\n[s2] \"ที่นี่ที่ไหนน่ะ?\""
2600702-6 = "ขอบคุณค่ะ..."
2600702-7 = "คะ...? ที่นี่เหรอคะ?"
2600702-8 = "ด้านหลังของรีสอร์ตค่ะ ที่นี่มีคลังเก็บของเล็กๆ อยู่ด้วยค่ะ"
2600702-9 = "ด้านหลังของรีสอร์ตค่ะ ที่นี่มีคลังเก็บของเล็กๆ อยู่ด้วยค่ะ"
2600702-10 = "ตอนแรกฉันกะไว้ว่าจะมาหาอุปกรณ์ทำความสะอาดหรืออุปกรณ์ซ่อมบำรุงเฉยๆ แต่กลับเจอของดีกว่าที่คิดไว้ค่ะ..."
2600702-11 = "พอเห็นของราคาแพงโดนทอดทิ้งไว้แบบนี้ จู่ๆ ก็รู้สึกกังวลขึ้นมาโดยไม่รู้ตัวเลยค่ะ อะฮ่ะฮ่า..."
2600702-12 = "[s3] \"มาพักผ่อนก็ยังขยันอยู่อีกนะ\"\n[s4] \"อายาเนะนี่เหมือนเดิมเลยนะ\""
2600702-15 = "วะ...ว่าแล้วเชียวฉันทำเกินไปสินะคะ ขอโทษด้วยค่ะ"
2600702-16 = "ขนาดตัวฉันเองยังคิดว่าตัวเองแปลกเลย แต่ว่ามันก็แก้ไม่หายสักทีค่ะ "
2600702-17 = "ที่จริงถ้ามาที่นี่แล้ว ควรจะลืมเรื่องงานที่อะบิดอสไปบ้างแล้วแท้ๆ..."
2600702-18 = "อืม... ตั้งใจว่าจะมาพักผ่อนที่รีสอร์ตแท้ๆ แต่พอมาถึงก็เอาแต่มาหมกตัวอยู่ที่คลังเก็บของอยู่แบบนี้#nซะจนได้..."
2600702-19 = "ถึงจะเป็นเรื่องเล็กน้อย แต่ก็ดูเหมือนจะเสียเวลาพักผ่อนไปเลยนะคะ"
2600702-20 = "คะ...?"
2600702-21 = "เหมือนฉันกำลังพักผ่อนอยู่งั้นเหรอคะ...? จริงเหรอคะ?"
2600702-22 = "อ่า... ถึงจะมีเวลาพักผ่อน แต่ฉันก็ยังเอาแต่หมกตัวหาของอยู่ในคลังเก็บของแบบนี้..."
2600702-23 = "[s5] \"การพักผ่อนก็หมายถึงได้ทำในสิ่งที่อยากทำไงล่ะ\"\n[s6] \"ครูคิดว่าเป็นการเล่นหาสมบัติที่ดีมากเลยนะ\""
2600702-24 = "...!!"
2600702-25 = "...!!"
2600702-26 = "งะ...งั้นเหรอคะ? เป็นแบบนั้นเองสินะคะ?"
2600702-27 = "พอคุณครูพูดแบบนี้ก็ค่อยโล่งใจหน่อยค่ะ...!"
2600702-33 = "ฉัน...ฉัน... อันที่จริงมีบางอย่างที่กวนใจฉันอยู่ค่ะ"
2600702-34 = "คือว่า... ฉันรู้สึกว่ามีบางอย่างที่ควรจะทำที่นี่...?"
2600702-35 = "มาถึงทะเลแล้วก็ควรจะต้องว่ายน้ำ มาถึงรีสอร์ตแล้วก็ควรใช้เครื่องอำนวยความสะดวกให้เหมาะสม..."
2600702-36 = "ถ้าไม่ทำอย่างนั้นละก็จะรู้สึกเหมือนทำอะไรผิดไป..."
2600702-37 = "เพราะงั้น...!"
2600702-38 = "[s7] \"อื้อ ครูก็คิดแล้วว่าน่าจะเป็นแบบนั้น\"\n[s8] \"ไม่เป็นไร เพราะงั้นครูถึงมาที่นี่ไง\""
2600702-39 = "อ่า..."
2600702-40 = "อ่า..."
2600702-41 = "คิดแล้วเชียวว่าคุณครูต้องคิดแบบนั้นตั้งแต่ฉันส่ง MOMOTALK ไปหาแน่ๆ เลยละค่ะ"
2600702-42 = "รู้สึกเหมือนได้คุณครูช่วยไว้อีกเลยนะคะ ฮะฮะฮะ..."
2600702-43 = "คะ...?"
2600702-44 = "ไม่ใช่แบบนั้น คุณครูแค่มาเที่ยวเล่นด้วยเฉยๆ งั้นเหรอคะ?"
2600702-45 = "หมายถึง..."
2600702-46 = "ไปเที่ยวเล่นกันสองคนน่าจะสนุกกว่าไปคนเดียว...?"
2600702-50 = "คุณครู..."
2600702-51 = "อืม... ฉันไม่รู้ว่าจะพูดกับคุณครูยังไงดีเลยค่ะ ที่จริงแล้วฉันพูดไม่ค่อยเก่งเท่าไร..."
2600702-52 = "เอ่อ... คือ..."
2600702-53 = "..."
2600702-54 = "ขอบคุณนะคะ..."
2600702-58 = "ดีละ! ไหนๆ ก็เป็นแบบนี้แล้ว เรามาเริ่มล่าสมบัติกันต่อดีมั้ยคะ?"
2600702-59 = "นี่คือการแข่งขันค่ะ! แข่งกันว่าใครจะหาของที่มีประโยชน์ได้มากกว่ากันค่ะ!"
2600702-60 = "[s9] \"ยินดีรับคำท้าเสมอ\"\n[s10] \"แข่งกันรอบละ 5 นาทีนะ\""
2600702-61 = "ฮุฮุ อย่าประมาทฉันนะคะ! เห็นแบบนี้ฉันก็มีประสบการณ์มาเยอะในฐานะคณะกรรมการแผนงานนะคะ!"
2600702-62 = "ฮุฮุ อย่าประมาทฉันนะคะ! เห็นแบบนี้ฉันก็มีประสบการณ์มาเยอะในฐานะคณะกรรมการแผนงานนะคะ!"
2600702-63 = "ถ้างั้นก็เตรียมตัว~"
2600702-67 = "ลุย...!!"
2600702-72 = "(หลังจากนั้นคุณครูกับอายาเนะก็เริ่มรื้อบริเวณรอบๆ)"
2600702-73 = "(หลังจากเริ่มแข่ง ร่างกายทั้งสองคนก็เต็มไปด้วยเหงื่อขณะที่ค้นหาของต่างๆ...)"
2600702-74 = "(และเป็นอย่างที่คิด ของที่หาเจอส่วนใหญ่ก็เป็นของที่มีขนาดใหญ่เกินกว่าจะใส่ไว้ในเฮลิคอปเตอร์ได้)"

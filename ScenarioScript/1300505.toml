[translation]
1300505-1 = "Rock Spirits"
1300505-2 = "奇普托斯．街道"
1300505-4 = "（在街上看到低頭專注於某樣東西的佳世子）"
1300505-5 = "…………"
1300505-6 = "[s] 「佳世子！」"
1300505-7 = "…………"
1300505-8 = "…………♫"
1300505-9 = "[s] 「佳世子……？」"
1300505-11 = "……嗯？老師？"
1300505-12 = "抱歉，我在聽音樂所以沒注意到。"
1300505-13 = "你問我在聽什麼音樂？"
1300505-14 = "呵呵，我最喜歡的樂團出了新歌。"
1300505-15 = "實在是太好聽了，我最近上學放學路上都會聽。"
1300505-16 = "不介意的話，老師要不要也聽聽看？"
1300505-17 = "[s] 從佳世子手中接下耳機，戴上"
1300505-23 = "「我所渴望的是死亡！你不需要的是生存！」"
1300505-24 = "「扯出敵人的心臟，暢飲敵人的鮮血吧──────！」"
1300505-25 = "……"
1300505-27 = "[ns]「這，這是什麼歌？」"
1300505-28 = "歌詞很棒吧？這是我喜歡的重金屬樂團「Black Death Poison」的新歌。"
1300505-29 = "他們很久沒有出新歌，甚至還謠傳他們已經解散了，害我擔心了好一陣子……"
1300505-30 = "但他們這次帶著神曲回來了。"
1300505-31 = "你說歌詞聽起來對教育有負面影響？"
1300505-32 = "沒這回事，雖然「Black Death Poison」的歌詞聽起來有點偏激，#n卻隱含了人生不可或缺、富有啟發性的正面哲理。"
1300505-33 = "老師只要聽過「Black Death Poison」的首張專輯，一定會改觀的。"
1300505-34 = "來，你聽看看。"
1300505-40 = "「這世道就是垃圾！聽著這音樂的你也是垃圾！」"
1300505-41 = "「全部分門別類，把世界打掃乾淨────！」"
1300505-42 = "……"
1300505-43 = "（之後，一直聽著佳世子推薦的音樂聽到耳朵長繭……）"

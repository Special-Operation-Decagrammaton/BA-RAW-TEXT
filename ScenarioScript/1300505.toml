[translation]
1300505-1 = "จิตวิญญาณชาวร็อค"
1300505-2 = "ถนนในคิโวทอส"
1300505-4 = "คุณครูบังเอิญไปเจอคาโยโกะที่กำลังเดินก้มหน้าและครุ่นคิดอะไรบางอย่างอยู่"
1300505-5 = "..."
1300505-6 = "[s] \"คาโยโกะ!\""
1300505-7 = "..."
1300505-8 = "... ♫"
1300505-9 = "[s] \"คาโยโกะ.....?\""
1300505-11 = "หืม? ครูเหรอ?"
1300505-12 = "โทษที เมื่อกี้ฉันฟังเพลงอยู่น่ะ#nเลยไม่ได้ยินครูเรียก"
1300505-13 = "อยากรู้ว่าฉันฟังเพลงอะไรเหรอ?"
1300505-14 = "หึหึ วงดนตรีที่ฉันชอบเพิ่งปล่อยเพลงใหม่น่ะ"
1300505-15 = "เพลงนี้ดีมากเลยนะ ฉันฟังตลอดทั้งตอนเดินไปและกลับโรงเรียนเลยล่ะ"
1300505-16 = "ครูลองฟังดูหน่อยไหมล่ะ?"
1300505-17 = "[s] คาโยโกะหยิบหูฟังมาใส่ให้"
1300505-23 = "\"ฉันปรารถนาเพียงความตาย! การมีชีวิตต่อไปคือสิ่งที่ไม่ขอฝันถึง!\""
1300505-24 = "\"ฉีกกระชากหัวใจศัตรู นำมาดื่มเพื่อฉลองด้วยความยินดี...!\""
1300505-25 = "......."
1300505-27 = "[ns] \"นะ...นี่มันเพลงอะไรเนี่ย?\""
1300505-28 = "เนื้อเพลงดีมากเลยใช่ไหม? เพลงใหม่ของวงดนตรีเฮฟวี่เมทัล วงแบล็ก เดธ พอยซั่นน่ะ"
1300505-29 = "พวกเขาไม่ได้ปล่อยเพลงใหม่มาตั้งนาน แถมมีข่าวลือเรื่องยุบวงด้วย ฉันก็เลยกังวลอยู่เหมือนกัน...."
1300505-30 = "แต่คราวนี้พวกเขาก็คัมแบ็กพร้อมกับปล่อยเพลงใหม่ที่สุดยอดอีกเหมือนเดิม"
1300505-31 = "เนื้อเพลงดูไม่ค่อยเหมาะกับการเรียนรู้เท่าไหร่งั้นเหรอ?"
1300505-32 = "พูดอะไรน่ะ! เพลงของแบล็ก เดธ พอยซั่นอาจดูรุนแรงไปบ้าง#nแต่ก็แฝงคติสอนใจอะไรหลายๆ อย่างไว้เยอะมากเลยนะ"
1300505-33 = "ถ้าได้ลองฟังเพลงในอัลบั้มแรกของพวกเขา ครูจะต้องเปลี่ยนความคิดแน่ๆ"
1300505-34 = "อ่ะ ลองฟังดูสิ"
1300505-40 = "\"โลกนี้เหมือนกองขยะ! ตัวคุณที่ฟังเพลงเพลงนี้ก็ไม่ต่างจากขยะ!\""
1300505-41 = "\"ฉันจะทำให้เหมือนคุณได้เกิดใหม่และชำระล้างโลกใบนี้....!\""
1300505-42 = "......."
1300505-43 = "จากนั้นคุณครูก็ฟังเพลงที่คาโยโกะแนะนำให้จนรู้สึกหูอื้อ...."

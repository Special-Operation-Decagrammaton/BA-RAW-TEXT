[translation]
1300505-1 = "Heavy Metal Spirit"
1300505-2 = "Kivotos Streets"
1300505-4 = "I came across Kayoko walking down the street, lost in thought with her head down."
1300505-5 = "..."
1300505-6 = "[s] \"Kayoko!\""
1300505-7 = "..."
1300505-8 = "... ♫"
1300505-9 = "[s] \"Kayoko...?\""
1300505-11 = "...Hmm? Sensei?"
1300505-12 = "Sorry, I was listening to music. I couldn't even hear you calling to me."
1300505-13 = "What am I listening to?"
1300505-14 = "Heh. My favorite band's newest single."
1300505-15 = "It's awesome! I put it on loop when I'm walking to and from school."
1300505-16 = "You wanna listen too?"
1300505-17 = "[s] Put on Kayoko's headphones."
1300505-23 = "\"Death's release is all I need! Survival is a pointless plea!\""
1300505-24 = "\"Rip out the heart of your enemy, drink their blood in ecstasy!"
1300505-25 = "..."
1300505-27 = "[ns] \"Wh-What kind of song IS this?\""
1300505-28 = "Catchy, right? It's a new song from a heavy metal band called Black Death Poison."
1300505-29 = "They were on hiatus for a while. I started getting worried when I heard rumors about them breaking up."
1300505-30 = "But they're back, and they released another absolute banger."
1300505-31 = "Heh. I guess you think the lyrics aren't educational or whatever."
1300505-32 = "That's where you're wrong! Black Death Poison's songs might sound violent, but they draw on all kinds of important life lessons."
1300505-33 = "Listen to their debut album and you'll see what I mean."
1300505-34 = "Here, give it a listen."
1300505-40 = "\"This earth is trash and so are you!\""
1300505-41 = "\"I'll recycle it all to begin anew!\""
1300505-42 = "..."
1300505-43 = "I listened to Kayoko's recommendations until my ears went numb."

[translation]
10036050-1 = "第5話;頭盔團水槍大賽"
10036050-3 = "我吃完午餐回來了。"
10036050-4 = "啊，工讀生小姐！"
10036050-5 = "承蒙你的好意，我有好好休息過了。"
10036050-6 = "請問接下來該做什麼呢？"
10036050-7 = "現在沒什麼事情可以做，你就繼續休息吧！"
10036050-11 = "[ns]（剛才的事好像讓他嚇得不輕……）"
10036050-12 = "不，我不能領了報酬卻什麼事都不做。"
10036050-13 = "不然要我去打掃舞台附近也行……"
10036050-17 = "喂，那邊那位同學！你現在有空是嗎？"
10036050-23 = "太好了！我正好在煩惱人手不夠呢！"
10036050-24 = "如果對射擊有自信的話，要不要來參加？"
10036050-26 = "射擊？雖然不知道你有什麼事，但我現在的任務是擔任DJ B.o.B的助手兼保鏢。"
10036050-27 = "所以我不能離開崗位。"
10036050-28 = "沒關係沒關係！離開一下不會怎樣的！"
10036050-29 = "可是……"
10036050-31 = "去吧去吧，不用客氣！"
10036050-32 = "哦，哦……"
10036050-33 = "水槍大賽肯定會很好玩的哦！"
10036050-38 = "[ns]「既然人家都開口了，不如就跟去看看吧？」"
10036050-39 = "我，我知道了。#n既然老師都這麼說了……"
10036050-40 = "那麼待會見，老師。"
10036050-44 = "[ns]（去看看敦子、美咲跟日和他們吧……）"
10036050-47 = "啊，是老師！"
10036050-48 = "你剛才去哪裡了，老師？#n我們本來還想跟你一起吃午餐的說。"
10036050-49 = "[s1]「那個……剛才發生了一些事情。」\n[s2]「我剛才臨時有點事情……」"
10036050-52 = "真，真可惜……我們剛才還因為中獎……免費大吃了一頓呢，耶嘿嘿。"
10036050-53 = "要是老師也在的話就好了……"
10036050-54 = "[s]「沒關係，我剛才也吃過午餐了。」"
10036050-55 = "既然大家都吃過飯了，我們要不要一起去看看沙醬的情況？"
10036050-56 = "反正八成還在準備舞台吧。"
10036050-61 = "啊～啊～頭盔團廣播！"
10036050-62 = "稍後將在海灘的競技場，舉辦能選出各分部最強之人的水槍大賽！"
10036050-63 = "這場比賽將攸關各分部的榮譽與獎品，歡迎大家踴躍參與！"
10036050-64 = "廣播結束！"
10036050-68 = "[ns]（原來沙織是被帶去那種地方啊……）"
10036050-69 = "水槍大賽……？#n總感覺頭盔團的人會在水槍裡裝實彈。"
10036050-70 = "不過既然是慶典，應該不會有人受傷吧。"
10036050-71 = "[s]「怎麼樣？我們要不要也去湊個熱鬧？」"
10036050-72 = "可是不是要去找沙織姐嗎？"
10036050-73 = "就這樣跑去看水槍大會好嗎……？"
10036050-74 = "[s]「照顧沙織固然重要，但大家也該享受慶典才行哦。」"
10036050-75 = "參加慶典的人好像都往那邊聚集了呢。"
10036050-76 = "說不定沙醬也會在比賽場地附近。"
10036050-79 = "所有聚集在「不法者海灘」的頭盔團和其他不良分子！歡迎你們！"
10036050-80 = "在這個慶典如正午的太陽般熱烈的時刻！"
10036050-81 = "為了讓慶典的熱情更加沸騰！能一口氣消除暑氣的水槍大賽已經準備就緒！"
10036050-82 = "平時頭盔團各分部只能互相觀察、試探彼此的實力……"
10036050-83 = "但是現在！這場頭盔團聯歡會，就是選出最強之人的戰場！"
10036050-84 = "我在此宣布，分部對抗水槍大賽……正式開始！"
10036050-91 = "喂，我們分部的人都注意我這邊。"
10036050-92 = "我們啪答啪答頭盔團不需要強出頭。#n志在參加就好，不需要太認真。"
10036050-93 = "懂我的意思吧？"
10036050-98 = "嗯～隨便玩玩就好～"
10036050-99 = "（唔嗯……怎麼會變成這樣……）"
10036050-104 = "反正這場大賽的命運……或者說結果，早就已經決定了嘛～"
10036050-105 = "結果早就決定了……？"
10036050-106 = "哎呀，這可不能讓別人聽到。#n話就說到這裡吧。"
10036050-107 = "那邊的臨時成員，有聽懂吧？"
10036050-108 = "………………"
10036050-109 = "啊啊，我明白了。"
10036050-110 = "雖然並非出於本意，但既然已經來到這個戰場就該盡己所能。"
10036050-111 = "我會全力應戰，毫無保留。"
10036050-112 = "……啊！？你真的有聽懂嗎！？"
10036050-114 = "規則很簡單！"
10036050-115 = "雖然這東西看起來很像真槍，但其實就只是把水槍而已！#n我知道可能有人會懷疑，但真的就是水槍！不管怎麼看都是水槍！"
10036050-116 = "用這把槍盡情射擊，能存活到最後的分部就是贏家！"
10036050-117 = "那麼請各分部就定位！"
10036050-120 = "哇……根本看不到……人實在太多了……！"
10036050-121 = "除了觀眾以外，參賽者也很多呢。#n一，二，三……頭盔團原來有這麼多分部嗎？"
10036050-122 = "看來不少人都興奮地跑來了吧。"
10036050-123 = "我，我想爬高一點……#n老師，可以幫我一下嗎……？"
10036050-124 = "[s3]「好，我來揹你吧。」\n[s4]「嘿咻……！」"
10036050-132 = "耶，耶嘿嘿，既然老師願意揹我的話，能不能讓我坐在你的肩膀上……？"
10036050-133 = "[s5]「……好吧。」\n[s6] 讓日和坐在肩膀上"
10036050-139 = "耶嘿嘿，這個位置剛剛好……簡直就是特等席呢！"
10036050-140 = "希望不要因為太引人注目而被趕出去……"
10036050-141 = "……咦？"
10036050-143 = "怎麼了，日和？"
10036050-149 = "你們看海灘那面「啪答啪答頭盔團」的旗子！"
10036050-150 = "沙織姐就站在旗子底下……！"
10036050-155 = "……真的耶。"
10036050-156 = "總是會在意想不到的地方發現他啊……"
10036050-157 = "噫噫……他的眼神超級可怕……完全進入超嚴肅隊長模式了……！"
10036050-158 = "雖然不清楚原因，但沙醬好像參加了比賽。"
10036050-159 = "嗯，看來他也在享受慶典呢，真是太好了。"
10036050-160 = "那樣算是……享受嗎？"
10036050-161 = "沙織姐會贏嗎？"
10036050-162 = "頭盔團的實力也就那樣而已，應該沒必要太擔心……"
10036050-163 = "問題就只有人數了吧。"
10036050-164 = "反正也沒有一定要贏……"
10036050-165 = "只要沙醬能樂在其中不就行了嗎？"
10036050-168 = "大家都一副鬥志滿滿的樣子啊。#n雖然其實沒什麼意義就是了。"
10036050-169 = "這樣才能炒熱氣氛嘛。#n畢竟最後的贏家早就已經決定好了。"
10036050-170 = "話說是哪個分部來著？好像是「毛毛躁躁頭盔團」對吧？#n總之雖然說是比賽，其實就只是走個流程而已。"
10036050-171 = "這點大家也都心知肚明。"
10036050-172 = "不過等等八成還是會打得一團亂吧。#n那也沒什麼不好。"
10036050-176 = "[ns]「他們是在……打假賽嗎？」"
10036050-181 = "……不能就這樣袖手旁觀。"
10036050-182 = "沙，沙織姐明明那麼努力，這樣太過分了！"
10036050-183 = "……無論如何，我們不能讓隊長淪為假賽中的一顆棋子。"
10036050-189 = "耶，耶嘿嘿……#n老師，看來得再麻煩你一下了……"
10036050-192 = "預備！！"
10036050-194 = "開始！！"
10036050-195 = "呼！"
10036050-199 = "哇！好快！"
10036050-200 = "怎，怎麼才剛開始就……！？"
10036050-210 = "接下來是哪裡？"
10036050-211 = "看我這邊！"
10036050-216 = "躲，躲開了！？"
10036050-221 = "唔啊！"
10036050-227 = "哦～！#n原本不被看好的啪答啪答頭盔團之中，竟然有名成員正猛烈地剿滅其他參賽者！"
10036050-228 = "那傢伙是誰啊？搞什麼，這跟說好的不一樣啊！"
10036050-229 = "啊？你也不知道他是誰？"
10036050-231 = "可惡！這下之前說好的劇本要怎麼辦！？"
10036050-232 = "呿！沒辦法了！#n先搞定那傢伙再想辦法凹回來吧！"
10036050-233 = "雖然有點明顯，但現在也只能這樣了！"
10036050-234 = "包圍他！用人數優勢包圍他！"
10036050-236 = "打算聯合起來制服我嗎？#n雖然在戰略層面是個正確的判斷……"
10036050-237 = "但這場大賽不是分部對抗賽嗎？"
10036050-244 = "先淘汰那傢伙！"
10036050-251 = "咦？"

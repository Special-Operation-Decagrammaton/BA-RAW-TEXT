[translation]
10036050-1 = "ตอนที่ 5;การแข่งปืนฉีดน้ำของแก๊งหมวกกันน็อก"
10036050-3 = "ฉันกลับมาจากพักกลางวันแล้ว"
10036050-4 = "อ๊ะ น้องพาร์ทไทม์!"
10036050-5 = "ฉันได้ไปพักผ่อนมาเต็มที่เลย ขอบคุณที่อนุญาตนะ"
10036050-6 = "ให้ฉันทำงานอะไรต่อดีล่ะ?"
10036050-7 = "ไม่มีงานอะไรเป็นพิเศษหรอก ไปนั่งพักให้สบายเถอะ!"
10036050-11 = "[ns] (เหตุการณ์เมื่อกี้ทำให้เปลี่ยนเป็นคนละคนจริงๆ ด้วย...)"
10036050-12 = "ไม่ได้หรอก ฉันจะรับเงินค่าจ้างโดยไม่ทำงานอะไรไม่ได้หรอกนะ"
10036050-13 = "งั้นฉันไปทำความสะอาดรอบๆ เวทีให้แล้วกัน..."
10036050-17 = "นี่ เธอน่ะ! เมื่อกี้บอกว่าไม่มีงานทำใช่มั้ย?"
10036050-23 = "งั้นก็ดีเลย ฉันกำลังกังวลเพราะคนไม่พออยู่เลย!"
10036050-24 = "ถ้ามั่นใจว่าแม่นปืน ก็มาเข้าแข่งขันด้วยกันมั้ยล่ะ?"
10036050-26 = "แม่นปืน? ฉันไม่รู้หรอกนะว่าเธอพูดถึงเรื่องอะไร แต่งานของฉันคือการเป็นผู้ช่วยและผู้คุ้มกันดีเจ B.o.B"
10036050-27 = "ฉันไปทำอย่างอื่นไม่ได้หรอก"
10036050-28 = "ไม่เป็นไรหรอก! ไม่เป็นไร! ฉันให้เธอไปได้!"
10036050-29 = "แต่ว่า..."
10036050-31 = "ไปเถอะๆ ไม่ต้องปฏิเสธหรอกน่า!"
10036050-32 = "อ่า... อื้ม..."
10036050-33 = "แข่งปืนฉีดน้ำต้องสนุกแน่ๆ!"
10036050-38 = "[ns] \"ฟังดูน่าสนุกนะ ไม่ลองไปเล่นเหรอ?\""
10036050-39 = "กะ... ก็ได้ ถ้าครูว่าอย่างนั้นละก็..."
10036050-40 = "งั้นเดี๋ยวฉันกลับมานะครู"
10036050-44 = "[ns] (งั้นเราก็ไปหาอาสึโกะ มิซากิ แล้วก็ฮิโยริดีกว่า...)"
10036050-47 = "อ๊ะ คุณครูนี่นา!"
10036050-48 = "ไปไหนมาเหรอคุณครู? ฉันอยากกินข้าวเที่ยงกับคุณครูแท้ๆ..."
10036050-49 = "[s1] \"คือว่า... ครูไปเจอเรื่องมานิดหน่อยน่ะ\"\n[s2] \"ครูมีธุระต้องไปทำนิดหน่อยน่ะ...\""
10036050-52 = "อ่า น่าเสียดายนะคะ... พวกฉันถูกรางวัลของที่นี่... ก็เลยได้กินอาหารกันจนอิ่มแปล้เลยค่ะ แหะๆ"
10036050-53 = "ถ้าคุณครูได้มากินด้วยกันก็น่าจะดีเนอะ..."
10036050-54 = "[s] \"ไม่เป็นไรหรอก ครูก็กินมาแล้วน่ะ\""
10036050-55 = "ในเมื่อกินกันเสร็จแล้ว งั้นก็ไปดูซัตจังกันต่อเถอะว่ากำลังทำอะไรอยู่ ว่าไงล่ะทุกคน?"
10036050-56 = "เดาเอาก็รู้ว่าคงเตรียมงานบนเวทีอยู่"
10036050-61 = "อ่า อ่า... ประกาศจากแก๊งหมวกกันน็อก!"
10036050-62 = "อีกสักครู่จะมีการแข่งปืนฉีดน้ำที่สนามกีฬา เพื่อค้นหาแก๊งที่แข็งแกร่งที่สุดจากแต่ละเขต!"
10036050-63 = "การแข่งขันนี้เดิมพันด้วยชื่อเสียงของแต่ละแก๊ง และเรามีของรางวัลให้แก๊งที่ชนะด้วย มาร่วมแข่งขันกันเยอะๆ เลย!"
10036050-64 = "จบการประกาศเพียงเท่านี้!"
10036050-68 = "[ns] (การแข่งขันนี้สินะที่ซาโอริถูกลากตัวไปด้วย...)"
10036050-69 = "การแข่งขันปืนฉีดน้ำเหรอ...? พวกแก๊งหมวกกันน็อกต้องใช้กระสุนจริงกันแน่เลย"
10036050-70 = "แต่ยังไงนี่ก็เป็นงานเทศกาล พวกนั้นคงไม่อยากมาเจ็บตัวกันหรอก"
10036050-71 = "[s] \"พวกเราก็ไปดูการแข่งขันกันมั้ย?\""
10036050-72 = "แต่เราตกลงกันว่าจะไปดูพี่ซาโอริทำงานไม่ใช่เหรอคะ?"
10036050-73 = "จะไปดูการแข่งขันปืนฉีดน้ำได้เหรอคะ...?"
10036050-74 = "[s] \"เป็นห่วงซาโอริก็ดีอยู่หรอกนะ แต่เราควรสนุกกับงานเทศกาลด้วยสิ\""
10036050-75 = "เหมือนว่าคนที่มาเที่ยวงานเทศกาลจะมารวมตัวกันที่นี่หมดเลยนะ"
10036050-76 = "บางทีซัตจังอาจจะอยู่แถวๆ สนามแข่งก็ได้"
10036050-79 = "ขอต้อนรับแก๊งหมวกกันน็อกและเด็กเกเรทุกคนที่มารวมตัวกันที่ <ชายหาดนอกกฎหมาย> แห่งนี้!"
10036050-80 = "ตอนนี้บรรยากาศในงานของเรากำลังร้อนแรงเหมือนดวงอาทิตย์ตอนเที่ยงวัน!"
10036050-81 = "เผลอๆ จะร้อนแรงกว่านั้นด้วยซ้ำ! เราก็เลยเตรียมการแข่งขันปืนฉีดน้ำมาให้ทุกคนได้คลายร้อนกัน!"
10036050-82 = "ปกติแล้วแก๊งหมวกกันน็อกจากแต่ละเขตจะได้แต่หยั่งเชิงและประเมินความสามารถของอีกฝ่าย!"
10036050-83 = "แต่ไม่ต้องหยั่งเชิงกันอีกต่อไปแล้ว! วันนี้งานสหพันธ์แก๊งหมวกกันน็อกจะกลายเป็นสนามที่เฟ้นหา#nแก๊งที่แข็งแกร่งที่สุด!"
10036050-84 = "ขอเปิดการแข่งขันปืนฉีดน้ำของแต่ละเขต ณ บัดนี้!"
10036050-91 = "เอาละ ทุกคนจากเขตของเรา ฟังให้ดีนะ"
10036050-92 = "แก๊งหมวกกันน็อกพั่บพั่บของเราไม่ต้องเป็นที่ 1 ก็ได้ พวกเราเน้นเข้าร่วม ไม่เน้นเข้ารอบ ไม่ต้องตั้งใจกันมากหรอก"
10036050-93 = "เข้าใจมั้ย?"
10036050-98 = "อืม อืม~ เอาแต่พอดีแล้วกัน~"
10036050-99 = "(หืม... นี่มันสถานการณ์อะไรกันเนี่ย...)"
10036050-104 = "แค่ไหลไปตามน้ำก็พอ เพราะผู้ชนะถูกกำหนดเอาไว้แล้วยังไงล่ะ~"
10036050-105 = "ผลการแข่งขันถูกกำหนดเอาไว้แล้วเหรอ...?"
10036050-106 = "เอาละๆ พูดไปให้คนอื่นได้ยินก็คงจะไม่ดี ฉันขอปลุกใจแก๊งเราเท่านี้แล้วกัน"
10036050-107 = "นี่ คนที่มาเสริมตรงนั้นน่ะ เข้าใจแล้วใช่มั้ย?"
10036050-108 = "......"
10036050-109 = "อืม เข้าใจแล้ว"
10036050-110 = "ถึงฉันจะไม่ได้มาด้วยเจตนาของตัวเอง แต่ในเมื่อได้รับหน้าที่ในการต่อสู้แล้ว ฉันก็จะทำให้เต็มที่ที่สุด#nตามที่ร้องขอ"
10036050-111 = "ฉันจะทุ่มสุดพลัง ไม่มีคำว่าปรานี!"
10036050-112 = "หืม...?! เหมือนจะไม่ได้เข้าใจตรงกันนะ?!"
10036050-114 = "กติกาก็ง่ายๆ ครับ!"
10036050-115 = "ถึงปืนนี้จะดูเหมือนปืนจริง แต่มันก็เป็นปืนฉีดน้ำ! ปากบอกว่าเป็นปืนฉีดน้ำ แต่เห็นแล้วก็ต้องสงสัยว่า#nเป็นปืนจริงๆ หรือเปล่า! เอาเถอะครับ ชื่อของปืนนี้คือปืนฉีดน้ำ!"
10036050-116 = "ใช้อาวุธปืนนี้ยิงกระหน่ำให้ฉ่ำใจ! แก๊งที่อยู่รอดเป็นแก๊งสุดท้ายจะเป็นผู้ชนะ!"
10036050-117 = "เอาละ แต่ละแก๊งไปประจำที่!"
10036050-120 = "ว้าว... คนเยอะจนมองไม่เห็นเลยค่ะ...!"
10036050-121 = "คนที่มาดูก็ว่าเยอะแล้ว แต่ผู้เข้าแข่งขันก็มีไม่น้อยเลยนะ หนึ่ง สอง สาม... แก๊งหมวกกันน็อกมีกันเยอะ#nขนาดนี้เลยเหรอ?"
10036050-122 = "แต่ละแก๊งคงมางานนี้ด้วยความตื่นเต้นกันน่ะ"
10036050-123 = "ฉะ... ฉันขอดูจากที่สูงๆ แล้วกันค่ะ... คุณครูคะ พอจะช่วยฉันหน่อยได้มั้ยคะ..."
10036050-124 = "[s3] \"ได้สิ มาขี่หลังครูเลย\"\n[s4] \"มาขี่หลังครูได้เลย ฮึบ...!\""
10036050-132 = "แหะ... แหะๆ ไหนๆ ก็ไหนๆ แล้ว ฉันขอขี่คอเลยได้มั้ยคะ...?"
10036050-133 = "[s5] \"ได้สิ...\"\n[s6] ให้ฮิโยริขี่คอ"
10036050-139 = "แหะ... แหะๆ สูงระดับนี้กำลังดีเลยค่ะ... นี่มันที่นั่ง VIP เลยนะคะ...!"
10036050-140 = "แต่ก็กลัวว่าจะโดนไล่เพราะไปบังคนอื่นเอาด้วยค่ะ..."
10036050-141 = "เอ๋...?"
10036050-143 = "ทำไมเหรอ ฮิโยริ?"
10036050-149 = "ดูธงของ 'แก๊งหมวกกันน็อกพั่บพั่บ' ที่อยู่ตรงชายหาดสิคะ!"
10036050-150 = "พี่ซาโอริยืนอยู่ใต้ธงนั่น...!"
10036050-155 = "จริงด้วยแฮะ..."
10036050-156 = "ทำไมเหมือนได้เจอแต่ในสถานที่ที่คาดไม่ถึงตลอดเลยนะ..."
10036050-157 = "เฮือก... แววตาพี่ซาโอริน่ากลัวสุดๆ ไปเลยค่ะ... เหมือนอยู่ในโหมดหัวหน้าของแท้ยังไงยังงั้นเลย...!"
10036050-158 = "คงจะไปเข้าร่วมการแข่งขันสินะ ถึงจะไม่รู้ว่าไปเข้าร่วมทำไมก็เถอะ"
10036050-159 = "แต่ก็ดีแล้วละนะที่ซัตจังดูจะเพลิดเพลินกับงานเทศกาลอยู่"
10036050-160 = "เพลิดเพลิน... จริงหรือเปล่านะ?"
10036050-161 = "พี่ซาโอริจะเอาชนะได้มั้ยนะคะ?"
10036050-162 = "ถ้าคู่ต่อสู้เป็นแก๊งหมวกกันน็อก เรื่องฝีมือก็คงไม่มีอะไรให้กังวลหรอก แต่ว่า..."
10036050-163 = "ปัญหาก็คือจำนวนคนนี่น่ะสิ"
10036050-164 = "แต่ก็นะ ใช่ว่าต้องชนะเท่านั้นนี่นา"
10036050-165 = "แค่ซัตจังได้สนุกกับการแข่งขันก็พอแล้วละ"
10036050-168 = "ทุกคนดูฮึกเหิมกันจังเลยนะ ถึงจะไม่มีประโยชน์ก็เถอะ"
10036050-169 = "พวกนั้นคงจะแค่สร้างบรรยากาศน่ะ ยังไงแก๊งที่จะชนะก็ถูกกำหนดไว้แล้วนี่"
10036050-170 = "เมื่อกี้บอกว่าแก๊งไหนนะ? แก๊งหมวกกันน็อกแข็งโป๊กหรือเปล่า? ช่างมันเถอะน่า ยังไงสำหรับพวกเราแล้ว การแข่งขันก็คงเป็นการละเล่นที่เตี๊ยมกันมาน่ะ"
10036050-171 = "อีกอย่าง ไม่มีใครไม่รู้เรื่องนั้นหรอก"
10036050-172 = "แต่ยังไงในสนามก็น่าจะเกิดความวุ่นวายไม่ใช่เล่นเลยนะ เราต้องได้เห็นอะไรสนุกๆ แน่เลย"
10036050-176 = "[ns] \"วางตัวผู้ชนะไว้แล้ว... งั้นเหรอ?\""
10036050-181 = "ได้ยินแบบนี้ ฉันคงอยู่เฉยๆ ไม่ได้หรอก"
10036050-182 = "พะ... พี่ซาโอริอุตส่าห์พยายามถึงขนาดนั้นเลยนะคะ! ทำเกินไปแล้วค่ะ!"
10036050-183 = "ถึงจะอยากให้สนุกกับงาน แต่เราจะให้หัวหน้าถูกหลอกใช้ในการแข่งขันจอมปลอมนั่นไม่ได้หรอก"
10036050-189 = "แหะ แหะๆ... คุณครูคะ สงสัยฉันต้องขอขี่คอนานกว่านี้หน่อยแล้วค่ะ..."
10036050-192 = "เตรียมตัว!!"
10036050-194 = "เริ่มด้ายยยย!!"
10036050-195 = "ฮึ่ม!"
10036050-199 = "ว้าก! เร็วชะมัด!"
10036050-200 = "โดนยิงตั้งแต่เริ่มเลยเหรอ?!"
10036050-210 = "ต่อไปก็..."
10036050-211 = "ทางนี้!"
10036050-216 = "ละ... หลบได้เหรอ?!"
10036050-221 = "ว้าก!"
10036050-227 = "เอาละครับ! สมาชิกแก๊งหมวกกันน็อกพั่บพั่บที่เป็นทีมม้ามืดกำลังต้อนให้ทุกคนจนมุมอยู่ครับ!"
10036050-228 = "อะไรของยัยคนนั้นน่ะ? ไม่เหมือนที่คุยกันไว้นี่นา! ทำอะไรของเธอเนี่ย!"
10036050-229 = "หืม? ไม่รู้ว่ายัยนั่นเป็นใครงั้นเหรอ?"
10036050-231 = "อะไรกัน! ทำไมไม่เล่นอย่างที่เตี๊ยมกันไว้ล่ะ?!"
10036050-232 = "ชิ! งั้นก็ช่วยไม่ได้! ยิงยัยนั่นให้ร่วงก่อนแล้วค่อยทำตามแผนเดิมแล้วกัน!"
10036050-233 = "ถึงจะดูออกว่าเตี๊ยมกันมา แต่ก็ช่วยไม่ได้ละนะ!"
10036050-234 = "เอาจำนวนคนเข้าสู้! ล้อมยัยนั่นไว้ก่อน!"
10036050-236 = "ทุกคนร่วมมือกันเพื่อเล่นงานฉันคนเดียวงั้นเหรอ? ในเชิงกลยุทธ์แล้ว ถือว่าตัดสินใจได้ดีอยู่หรอก..."
10036050-237 = "แต่นี่เป็นการแข่งขันระหว่างแก๊งไม่ใช่หรอกเหรอ?"
10036050-244 = "สอยให้ยัยนั่นตกรอบไปก่อนเลย!"
10036050-251 = "เอ๋?"

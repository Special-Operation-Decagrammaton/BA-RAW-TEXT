[translation]
84312101000-6 = "莉央……！！莉央……！！！"
84312101000-7 = "我已經清楚掌握狀況了。得立刻行動才行。"
84312101000-8 = "真的假的啊……都到最後的最後了居然還……"
84312101000-9 = "你感覺到的就是這個嗎？"
84312101000-10 = "似乎是呢。"
84312101000-11 = "它在昨晚之前，都沒有出現在博覽會展示場和校園附近。#n代表它是去了很遠的地方後又回來了吧。"
84312101000-12 = "從它的巨大身軀來看……能辦到的路徑只有一條。"
84312101000-13 = "……地下道。"
84312101000-14 = "是我們初次見面的地方呢。"
84312101000-16 = "這種首尾呼應大可不必好嗎……"
84312101000-17 = "沒時間了。要是錯過這次機會，不知道它什麼時候才會再回來。#n或是也可能轉移到其他學園，實在難以預測。"
84312101000-18 = "追上去抓住它吧。這次一定要成功。"
84312101000-19 = "呵呵，看來這是最後的驚喜禮物了呢。"
84312101000-20 = "說什麼禮物……"
84312101000-21 = "哈……！好吧，算了。#n老實說我也有點類似的感覺，這樣正好。"
84312101000-22 = "這次我也會進行遠程支援。#n考慮到現在的情況，戰鬥方面勢必也需要協助吧。"
84312101000-27 = "那麼走吧！這是最終決戰了！！"
84312101000-28 = "出發吧！"

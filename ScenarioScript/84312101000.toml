[translation]
84312101000-6 = "ริโอะ...!! ริโอะ...!!!"
84312101000-7 = "ฉันวิเคราะห์สถานการณ์ไว้แล้ว เราต้องเคลื่อนไหวตอนนี้เลย"
84312101000-8 = "จริงเหรอเนี่ย... ต้องทำงานจนถึงวันสุดท้ายเลยเหรอ..."
84312101000-9 = "ลางสังหรณ์ที่เธอว่าก็คืองานนี้สินะ?"
84312101000-10 = "น่าจะใช่นะคะ"
84312101000-11 = "จนถึงเมื่อวานตอนเย็น มันไม่ได้อยู่ในห้องสาธิตของงานเอ็กซ์โปหรือในเขตโรงเรียน งั้นก็แสดงว่ามันเพิ่งจะเข้ามา"
84312101000-12 = "ถ้าตัวใหญ่ขนาดนั้น... คงมีเส้นทางเดียวที่จะเข้ามาได้"
84312101000-13 = "ทางใต้ดิน..."
84312101000-14 = "ที่ที่เราเจอกันครั้งแรกสินะคะ"
84312101000-16 = "ฉันไม่ชอบเรื่องที่เกี่ยวโยงกันแบบนี้เลย"
84312101000-17 = "เราไม่มีเวลาแล้ว ถ้าเราจับมันตรงนี้ไม่ได้ เราก็คงคาดเดาได้ยากว่ามันจะกลับมาอีกเมื่อไร หรือว่าจะโผล่ไปโรงเรียนไหนหรือเปล่า"
84312101000-18 = "ไล่ตามไปจับมันกันเถอะ"
84312101000-19 = "ฮุฮุ เหมือนได้รับของขวัญเซอร์ไพรส์ชิ้นสุดท้ายเลยนะคะ"
84312101000-20 = "ของขวัญงั้นเหรอ..."
84312101000-21 = "เฮอะ...! เอาเถอะ จริงๆ แล้วฉันก็มีลางสังหรณ์ไม่ดีอยู่เหมือนกัน งั้นก็ดีเลย"
84312101000-22 = "ครั้งนี้ฉันจะสนับสนุนจากระยะไกลให้ ในเมื่อสถานการณ์เป็นแบบนี้ ฉันคิดว่าต้องมีการสนับสนุน#nในการต่อสู้ด้วย และฉันจะทำให้เอง"
84312101000-27 = "ไปกันเลย! สู่การต่อสู้ครั้งสุดท้าย!!"
84312101000-28 = "ค่ะ!"

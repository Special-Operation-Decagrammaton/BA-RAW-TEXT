[translation]
1012006-1 = "เสียงกลองยามรุ่งอรุณ"
1012006-2 = "(ระหว่างที่นั่งจัดการงานที่กองสูงอยู่จนไม่ได้นอน...)"
1012006-3 = "(คุณครูรู้สึกว่าถ้าขืนยังฝืนนั่งทำต่อไปอาจจะผล็อยหลับได้ เลยลุกเดินออกไปสูดอากาศให้หายง่วง)"
1012006-11 = "(ขณะเดินเล่นริมน้ำให้หายง่วง...)"
1012006-12 = "หืม? คุณครู?"
1012006-16 = "ออกมาทำอะไรที่ริมแม่น้ำในเวลาแบบนี้น่ะ?"
1012006-17 = "ว่าไงนะ? ทำงานเอกสารจนยังไม่ได้นอนทั้งคืนเลยเหรอ?"
1012006-18 = "คิดแล้วเชียวว่าการเป็นผู้ใหญ่เนี่ยไม่ใช่เรื่องง่ายๆ เลยนะ"
1012006-19 = "[s] \"ว่าแต่ว่านัตสึออกมาทำอะไรเหรอ?\""
1012006-20 = "ฉันกำลังวิ่งจ็อกกิ้งอยู่น่ะสิ"
1012006-21 = "ตั้งแต่เริ่มฟอร์มวงดนตรีฉันก็ออกมาวิ่งตอนเช้าตรู่ทุกวัน"
1012006-22 = "การซ้อมตีกลองมันใช้พลังกายมากกว่าที่คิดอีกน่ะ"
1012006-23 = "เพราะงั้นเลยต้องออกกำลังกายแบบนี้เพื่อเพิ่มสมรรถนะให้ร่างกาย"
1012006-24 = "สรุปก็คือ... ออกมาวิ่งใช้พลังงานเพื่อจะทุ่มสุดตัวได้บนเวทีไงล่ะ"
1012006-25 = "[s] \"นัตสึเป็นพวกพยายามสุดๆ เลยสินะ\""
1012006-26 = "ฮุฮุ..."
1012006-27 = "ขอบคุณที่ชมนะ คุณครู"
1012006-28 = "[s1] \"งั้นต้องมีรางวัลให้นักเรียนคนเก่งด้วยสิ...\"\n[s2] \"งั้นต้องมีรางวัลให้นักเรียนที่พยายามสุดๆ แล้ว\""
1012006-36 = "(คุณครูเดินไปที่ตู้ขายน้ำอัตโนมัติที่อยู่ใกล้ๆ แล้วกดกาแฟดำมาสองกระป๋อง และยื่นให้นัตสึไป 1 กระป๋อง)"
1012006-38 = "โอ้ ขอบคุณนะคุณครู"
1012006-39 = "กาแฟดำไร้แคลอรี่ถือเป็นของหวานอย่างดีหลังออกกำลังกายเลย"
1012006-40 = "(คุณครูกับนัตสึเดินมานั่งที่ม้านั่ง)"
1012006-44 = "ตอนซ้อมจู่ๆ ฉันก็รู้สึกขึ้นมาน่ะว่ากลองเป็นเครื่องดนตรีที่เหมาะกับคำว่า \"ความขัดแย้ง\" มากเลยนะ"
1012006-45 = "ตอนอยู่บนเวที กลองเป็นเครื่องดนตรีที่วางอยู่ด้านหลังสุด และไม่โดดเด่นที่สุด"
1012006-46 = "แต่สิ่งที่ขับเคลื่อนการแสดงให้โดดเด่นที่สุดก็คือเสียงกลอง"
1012006-47 = "เพราะเครื่องดนตรีทุกอย่างจะต้องฟังเสียงจังหวะจากกลอง"
1012006-48 = "เพราะงั้นต่อให้สมาชิกคนอื่นๆ จะตื่นเต้นและเร้าจังหวะไป แต่กลองจะทำแบบนั้นไม่ได้"
1012006-49 = "กลองจะต้องรักษาจังหวะเอาไว้ให้ได้อย่างใจเย็น"
1012006-50 = "ถึงจะเป็นเครื่องดนตรีที่เสียงดังที่สุด แต่ก็ต้องเล่นด้วยจิตใจที่สงบเยือกเย็นที่สุด"
1012006-51 = "แต่ก็ไม่ได้หมายความว่ากลองจะมีอภิสิทธิ์อะไรเหนือเครื่องดนตรีอื่นหรอกนะ"
1012006-52 = "แค่บทบาทของเครื่องดนตรีแต่ละประเภทมันก็ต่างกันไปก็เท่านั้น"
1012006-53 = "เพราะงั้นเลยทำให้ภูมิใจมากเลยละ"
1012006-54 = "ดังนั้น..."
1012006-61 = "(ระหว่างที่ฟังนัตสึอยู่...)"
1012006-62 = "(คุณครูก็เกิดง่วงขึ้นมาขนาดฤทธิ์ของคาเฟอีนยังต้านไม่อยู่)"
1012006-72 = "(คุณครูรู้สึกเปลือกตาทั้งสองข้างเริ่มหนักอึ้ง จนสุดท้ายก็ผล็อยหลับไป...)"
1012006-76 = "คะ... คุณครู...?"
1012006-77 = "ไหล่ฉะ... ฉัน..."
1012006-78 = "..."
1012006-79 = "......!"
1012006-80 = "ตึง ตึง ตึง ตึง"
1012006-81 = "คือว่า..."
1012006-82 = "คุณครู...?"
1012006-83 = "งือ..."
1012006-84 = "......"
1012006-85 = "แบบนี้ไม่ได้สิ..."
1012006-86 = "มันไม่ควรจะ... จังหวะเร็วแบบนี้สิ..."
1012006-93 = "(พอคุณครูลืมตาขึ้นในอีกไม่กี่นาทีต่อมา นัตสึก็ช่วยเดินมาส่งถึงที่ชาเล่ต์)"
1012006-94 = "(หลังจากนั้นนัตสึก็หายตัวไปในความมืดของรุ่งอรุณอย่างรวดเร็ว)"

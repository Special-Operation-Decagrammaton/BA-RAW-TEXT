[translation]
1012006-1 = "黎明的鼓聲"
1012006-2 = "（熬夜處理積壓的工作直到清晨……）"
1012006-3 = "（感覺再這樣下去會直接睡著，於是決定到河邊吹吹風）"
1012006-11 = "（在河邊徘徊，試圖讓自己清醒時……）"
1012006-12 = "嗯？老師？"
1012006-16 = "你怎麼這個時間跑來河邊？"
1012006-17 = "咦？熬夜處理文書工作？"
1012006-18 = "……大人果然很辛苦呢。"
1012006-19 = "[s]「那夏又怎麼會在這裡？」"
1012006-20 = "我正在慢跑。"
1012006-21 = "自從開始樂團練習後，我每天清晨都會來河邊跑步。"
1012006-22 = "因為打鼓其實比看起來更需要體力。"
1012006-23 = "所以我才會為了培養體力而運動。"
1012006-24 = "換句話說……為了在舞台上全力以赴，舞台下就必須先放鬆。"
1012006-25 = "[s]「夏真是個努力家啊。」"
1012006-26 = "……呵呵。"
1012006-27 = "謝謝你的稱讚，老師。"
1012006-28 = "[s1]「那麼，對於努力的學生……」\n[s2]「當然要給予獎勵才行。」 "
1012006-36 = "（走到附近的自動販賣機買了兩罐黑咖啡，並將其中一罐遞給了夏）"
1012006-38 = "哦哦，謝啦老師。"
1012006-39 = "零卡路里的咖啡，當成運動後的甜點再適合不過了。"
1012006-40 = "（和夏一起坐到了長椅上）"
1012006-44 = "我在練習的時候發現，鼓真的是一種充滿矛盾的樂器呢。"
1012006-45 = "明明是在舞台最後方、最不顯眼的位置。"
1012006-46 = "然而引領整場演奏的，卻是鼓的聲音。"
1012006-47 = "所有樂器都會跟著鼓的節奏走。"
1012006-48 = "所以即使其他成員因為興奮而加快節奏，鼓也不能跟著亂掉。"
1012006-49 = "必須冷靜地保持自己的拍子才行。"
1012006-50 = "雖然是聲音最大的樂器，卻要用最沉著的心態去演奏。"
1012006-51 = "當然這並不代表鼓比其他樂器優越。"
1012006-52 = "只是各自的角色不同而已。"
1012006-53 = "總之，這真的是種讓人很有成就感的樂器。"
1012006-54 = "所以說……"
1012006-61 = "（就在聽著夏說話的同時……）"
1012006-62 = "（連咖啡都擋不住的睡意再次襲來）"
1012006-72 = "（眼皮越來越沉，意識逐漸遠去……）"
1012006-76 = "老，老師……？"
1012006-77 = "肩膀，呃……"
1012006-78 = "…………"
1012006-79 = "………………！"
1012006-80 = "咚，咚，咚，咚。"
1012006-81 = "那個……"
1012006-82 = "老師……？"
1012006-83 = "嗚……"
1012006-84 = "……"
1012006-85 = "不行……"
1012006-86 = "節奏變得這麼快……是不行的啊……"
1012006-93 = "（等幾分鐘後再次睜開眼時，已經被夏送回了夏萊）"
1012006-94 = "（……接著夏一句話也沒說，便以驚人的速度消失在了黎明的微光中）"

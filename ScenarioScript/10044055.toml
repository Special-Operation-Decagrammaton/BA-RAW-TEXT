[translation]
10044055-2 = "อึก... อะไรกัน...!"
10044055-3 = "ไม่คิดเลยว่าต้องมาแพ้ให้พวกแฝดรถไฟตัวจ้อยพวกนี้..."
10044055-4 = "ตะ... แต่ก็อย่าคิดว่ามันจะจบแค่นี้ล่ะ...! หัวหน้าของพวกเราจะต้อง..."
10044055-13 = "วะฮะฮ่า! คุณครู สั่งการได้ยอดเยี่ยมเลยนะ!"
10044055-14 = "นี่สินะการสั่งการของคุณครูที่เขาร่ำลือกัน... สุดยอดเลยค่ะ..."
10044055-15 = "อ๊ะ แต่ว่ามันแปลกๆ อยู่หน่อยหรือเปล่าคะ?"
10044055-16 = "จู่ๆ คนพวกนี้ก็โผล่มา... เป็นนักซิ่งบนถนนแท้ๆ แต่ทำไมถึงมาทำอะไรในสถานีรถไฟล่ะคะ...?"
10044055-17 = "ไปปลุกมาถามดีมั้ย?"
10044055-18 = "ไม่มีอะไรมากหรอกน่า ปกติโลกของเราก็มีเรื่องแปลกๆ อยู่แล้ว"
10044055-19 = "อึก... รู้สึกว่าเรื่องนี้จะไม่จบแค่นี้ยังไงไม่รู้..."
10044055-21 = "ฉะ... ฉันว่าพวกคุณรีบไปขึ้นรถไฟแล้วออกตัวไปดีกว่านะคะ...!"
10044055-22 = "พวกเด็กมีปัญหาที่เห็นข่าวน่าจะแห่กันมาที่นี่อยู่นะคะ"
10044055-23 = "อ๊ะ นั่นสินะ นี่มันก็ช้าแล้วด้วย"
10044055-24 = "ออกรถ ออล ไรท์"
10044055-25 = "นะ... นั่นสิคะ เรารีบออกรถกันเถอะค่ะ...!!"

[translation]
90001050-1 = "第5話;變數"
90001050-10 = "咦，有警報？"
90001050-11 = "葛夫拉又聯絡我們了……咦咦？"
90001050-12 = "葛，葛夫拉醬輸了！？"
90001050-13 = "哼嗯，看來該開始執行B計畫了？"
90001050-14 = "我沒有異議。就來執行B計畫吧。#n畢竟還是得尊重葛夫拉的意願。"
90001050-15 = "終，終究還是得把他們引誘到那裡去嗎……"
90001050-16 = "葛夫拉似乎在最後設下了陷阱，想盡可能讓敵人按照自己的計畫行動。"
90001050-17 = "不愧是心思縝密又認真努力的葛夫拉！#n雖然還是有點衝動就是了！"
90001050-18 = "那我接著分析後續的日誌。#n咦？等等，好像多了個新的變數……"
90001050-19 = "名字……是這樣唸嗎？#n調月莉央……？"
90001050-20 = "調，調月莉央……！？"
90001050-21 = "看來……出現棘手的敵人了呢。#n不，或許這是我們早該預料到的情況嗎？"
90001050-22 = "他為什麼現在才現身呢？#n不，這是個沒有任何意義的問題吧。"
90001050-23 = "當，當時……最先察覺那位大人的存在，還敢嘗試展開追蹤的就是這個人吧……"
90001050-24 = "看來我們得想想面對這個情況的對策才行。"
90001050-25 = "必須考量新變數的出現、試圖引誘他們前往的地點，以及我們手中掌握的工具……"
90001050-26 = "簡單來說，問題只有一個。#n現在我們眼前出現了難以忽視的新變數，究竟是否要按原定計畫進行呢？"
90001050-27 = "該，該怎麼辦好呢，Soph……？"
90001050-28 = "嗯，是時候該做決定了。"
90001050-33 = "還是按照原定計畫進行吧。"
90001050-35 = "……果然還是這樣嗎？#n雖然我早就猜到了。"
90001050-36 = "這，這這這這，這樣真的好嗎！？#n那個調月莉央……！"
90001050-37 = "那個女人是個重大變數，這點確實不可否認。#n然而……"
90001050-38 = "然，然而……？"
90001050-39 = "我相信那孩子肯定辦得到的！#n你不這麼覺得嗎，Ain？"
90001050-40 = "咦，咦咦？要問我嗎？"
90001050-41 = "畢竟那孩子是無敵的，對吧？"
90001050-42 = "……！"
90001050-43 = "沒，沒錯！那孩子是無敵的！"
90001050-44 = "而且一旦進入了那個區域，調月莉央這個變數就會自然被排除在外了吧？"
90001050-45 = "啊……！對耶！#n畢竟調月莉央只能透過遠距離通訊跟他們溝通！"
90001050-46 = "沒錯。除此之外，我認為現在有必要觀察這個新的強敵將會帶來多大的變數。"
90001050-47 = "……調月莉央。#n那個不知天高地厚，試圖接近那被禁止的技術的人。"
90001050-48 = "雖，雖然有掌握了一些關於他的情報……"
90001050-49 = "成立「特異現象搜查部」這個社團，企圖打擾那位大人的安寧。#n雖然實際的執行者是明星陽葵就是了。"
90001050-50 = "接著又在這裡現身……#n明明之前竭盡一切隱瞞自己的行蹤，只敢躲在暗地裡行動。"
90001050-51 = "那種人現，現，現在才現身就表示……"
90001050-52 = "嗯，或許他從一開始就在等待和那個老師會合的時機。"
90001050-53 = "不過～這些～全都只是Soph的推測而已～"
90001050-54 = "你少囉嗦……"
90001050-55 = "總之我們必須觀察那個調月莉央，究竟是與「老師」同等的重大變數──"
90001050-56 = "抑或者是影響力不如老師，小到可以忽略的變數。"
90001050-60 = "所以Soph的意思是……"
90001050-61 = "要一邊觀察新變數帶來的影響，一邊利用那孩子清除所有敵人？"
90001050-63 = "沒錯，就是這樣。"
90001050-64 = "可，可是這樣……真的好嗎……？#n就算是那些人，一旦碰上了那孩子……"
90001050-65 = "肯定還是會死的吧……？"
90001050-66 = "嗯……這個問題倒是有點複雜。"
90001050-67 = "雖然我們從來沒有傷害過任何人，也沒有類似的想法……"
90001050-71 = "老實說，我現在其實還是有點……"
90001050-72 = "……"
90001050-73 = "Ain、Soph。我認為我們別無選擇。"
90001050-75 = "嗯！？"
90001050-76 = "……"
90001050-78 = "難道不是嗎？#n假如我們沒有這樣的覺悟，打從一開始就不會把那些人引誘來冰海了。"
90001050-79 = "何況我們也的確說過「去死吧」這種話。"
90001050-80 = "那，那那那那，那不是我們一時激動才脫口而出的嗎！？"
90001050-81 = "啊，嗯。其實我也這麼認為……"
90001050-82 = "你們兩個可不能動搖哦。因為我們還得保護姐姐大人。"
90001050-87 = "可是……"
90001050-88 = "我知道了，Ain。我明白你的意思。#n之所以制定這個計畫……本來就是為了避免那種情況發生。"
90001050-89 = "而且換個角度來想，是老師那群人擅自踏入我們的地盤的吧？"
90001050-90 = "……"
90001050-91 = "嗯，我知道了……"
90001050-92 = "我也，不會輸的。#n我會……做好覺悟……"
90001050-93 = "……"
90001050-98 = "別擔心，一切都會順利的。"
90001050-99 = "嗯，嗯……！"
90001050-101 = "唉唷～居然毫無根據就跟人家說一切都會順利，世界上沒有比這更不負責任的話了～"
90001050-102 = "噫，噫噫噫噫噫噫！？！？"
90001050-103 = "Aur！"
90001050-104 = "抱歉抱歉。因為Ain的反應實在很豐富，害我不禁想拿各種變數來測試一下。"
90001050-105 = "哦……正好我也想測試一下你邏輯閘的耐久度呢。就讓我試試看吧？"
90001050-111 = "那種沒效率的實驗你不必親自測……哎唷喂！反對暴力！"
90001050-116 = "S，Soph……我沒事，所以沒必要那樣……"
90001050-120 = "就跟我先前提過的一樣……我一直在追蹤無名之神的力量遺留的痕跡。"
90001050-121 = "結果卻意外在過程中，發現了十字神名的第5名預言者葛夫拉。"
90001050-126 = "哦……？"
90001050-127 = "嘿……"
90001050-132 = "那跟我們在冰海發現的奇怪痕跡有什麼關聯嗎？"
90001050-133 = "根據我們這段時間的觀察，十字神名和無名之神的力量應該沒有特別的關聯才對呀？"
90001050-134 = "你說的沒錯，英美。#n雖然我們也能嘗試從中推論出某些事實……"
90001050-135 = "不過現在還是優先就已知事實進行討論吧。"
90001050-136 = "我掌握了一項情報──目前有一名並非葛夫拉的預言者，正在冰海一帶開採資源。"
90001050-137 = "開採資源……是嗎？"
90001050-138 = "目前推測那名預言者的外型，應該近似於工作船或破冰船這類的大型船艦。"
90001050-139 = "原來如此。#n如果是那種類型的船隻，會在冰海上留下那些痕跡也就說得通了。"
90001050-140 = "而冰海這個地方……除了不受人類的管轄之外，普遍也被認為蘊含豐富的自然資源。"
90001050-141 = "至於同樣潛伏在冰海地帶的葛夫拉，其職責或許是偵察周圍地形與警戒……"
90001050-142 = "或者根本就是另一名預言者的保鏢……也不無可能。"
90001050-143 = "[s]「唔嗯，原來如此……聽起來很有道理。」"
90001050-144 = "那您調查出那名船艦型預言者的真實身份了嗎？"
90001050-145 = "……這點我還沒能做到。#n因為那名預言者幾乎不會對外發送信號。"
90001050-146 = "光是避開十字神名兵力的監視，#n派遣以高速偵察機改造的AMAS拍下現場情況就已經是極限了。"
90001050-147 = "原來如此。#n我們會將你的意見列入目前的假設當中，進一步加以完善。"
90001050-148 = "是什麼樣的假設？"
90001050-149 = "如果我們想的沒錯，十字神名的工程師們正在調查「無名之神的力量」的情報……"
90001050-150 = "在最糟的情況下，或許那東西已經落入了他們手中……假設的內容大致如此。"
90001050-151 = "嗯，這的確不無可能。"
90001050-152 = "我們推測，十字神名的工程師們為了驗證無名之神的資料……"
90001050-153 = "正在觀察季的Abi-Eshuh，並監測其戰鬥情報……"
90001050-154 = "如果再結合你剛才提到的情報，#n也就是有另一名船艦型預言者正在冰海一帶挖掘資源的話……"
90001050-155 = "那麼我們可以合理地推測……#n冰海上巨大的移動痕跡是由那名預言者所留下，而它已經脫離冰海一帶了。"
90001050-156 = "如此一來便出現了一個疑問。"
90001050-158 = "疑問？"
90001050-159 = "根據目前所知的情報，#n我們推測葛夫拉是負責偵察和警戒，並以蒐集資料為目的和我們戰鬥……"
90001050-160 = "那莉央所說的那名預言者，又是為了什麼而開採資源呢？"
90001050-161 = "這……"
90001050-162 = "[s]「那名預言者的目的會不會跟葛夫拉不一樣？」"
90001050-167 = "嗯，那似乎就是我們目前所能得到的結論了。"
90001050-168 = "不過無論如何，剛才說的這些都還僅僅只是推測和假設。"
90001050-169 = "為了得到答案，我認為應該繼續追查這道痕跡。"
90001050-170 = "畢竟莉央大人所說的那名預言者，很有可能就在這道痕跡的盡頭等著我們。"
90001050-174 = "……？#n請等一下，我有事情要報告。"
90001050-175 = "在我們說話的期間，周圍的地形似乎有所改變。"
90001050-176 = "我將降低直升機的高度，請各位留意機身晃動。"
90001050-184 = "……"
90001050-188 = "？"
90001050-189 = "……？"
90001050-194 = "部長，怎麼了嗎？"
90001050-195 = "什麼跟什麼啊！？#n我還以為終於能脫離冰海了，結果居然跑到了凍原？"
90001050-196 = "根本還是一樣冷嘛！？#n我到底什麼時候才能脫掉防寒衣啊！這樣行動起來很不方便耶！"
90001050-197 = "嗯，這裡也很涼爽呢。我喜歡。"
90001050-206 = "[ns]「不過這裡至少比冰海好一點吧……？」"
90001050-207 = "可以的話，我希望能解決問題的根源！"
90001050-208 = "其實嚴格來說，環境確實發生了些許變化。#n這裡的平均氣溫比冰海高了三度以上。"
90001050-209 = "如果這裡有海的話，海面應該不會那麼容易結冰才對。"
90001050-210 = "你是因為這裡沒有海才這麼說的吧！？"
90001050-212 = "話說回來，你們大家看那邊。#n是不是有什麼奇怪的東西？"
90001050-216 = "[ns]「那是什麼……？」"
90001050-217 = "看起來……似乎是某個物體的移動痕跡。"
90001050-218 = "看來情況已經很清楚了。#n既然我們是追著痕跡來到這裡的，那麼只要繼續跟著痕跡走就行了吧？"
90001050-219 = "可是這裡的痕跡……？"
90001050-220 = "好像每隔一定間隔就會出現一個巨大的坑洞呢。"
90001050-221 = "這也是船隻留下的嗎？"
90001050-222 = "[s]「雖然我知道聽起來很不像話，但這……」"
90001050-223 = "……是啊，沒想到我竟然會有說出這種話的一天。"
90001050-224 = "就像老師所說，那道痕跡簡直……"
90001050-225 = "簡直……"
90001050-226 = "……"
90001050-227 = "就像巨大怪獸的腳印一樣？"
90001050-228 = "竟然能把大家只敢在腦中想像的東西說出來……某個角度來說也挺厲害的呢。"
90001050-229 = "難道最近的船都會走路嗎？"
90001050-230 = "不對，你在說什麼啊，英美？船怎麼可能會走路呢？#n那種設計實在太不合理也太沒效率了。"
90001050-231 = "可是部長不就喜歡那類的東西嗎？#n例如占星術和數字命理學之類的……不是嗎？"
90001050-232 = "呵呵，這你就有所不知了，英美。#n占星術的基礎，是從古代流傳至今的天體相關統計和紀錄……"
90001050-233 = "並透過哲學、數學和物理學，來探討決定命運的究竟是常數還是變數……#n可說是由世界上的所有理論堆疊而成的一門學問哦？"
90001050-234 = "相較之下，科學的領域裡根本不可能出現巨大怪獸這種……沒錯，科幻的產物。#n那種東西怎麼可能出現在世界上嘛。英美你也真是的。"
90001050-236 = "（事到如今才說這種話……）"
90001050-241 = "該怎麼做好呢……？"
90001050-242 = "雖然現在似乎找不到其他線索……"
90001050-243 = "但是就這樣打道回府，似乎也沒有太大的意義。"
90001050-244 = "[s]「我也是這麼想的。謝謝你幫我們整理情況，季。」"
90001050-245 = "謝謝您，老師。#n順帶一提，有句話說「稱讚能使鯨魚起舞」──雖然我並不是鯨魚，而是飛鳥馬季。"
90001050-247 = "你在做什麼，老師。#n季又開始說那些奇怪的話了。"
90001050-248 = "[s]「這是我的錯嗎……？是嗎是嗎……？」"
90001050-249 = "我明白了。那我們就繼續追查下去吧。#n莉央，麻煩你繼續為我們提供環境情報。"
90001050-250 = "了解。"
90001050-251 = "季，不好意思，能麻煩你維持警戒狀態嗎？#n我希望能避免任何可預期的危險發生。"
90001050-252 = "我明白了，陽葵部長。"
90001050-260 = "下一話;火花"

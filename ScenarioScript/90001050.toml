[translation]
90001050-1 = "Episode 5;Variable"
90001050-10 = "The alarm's going off?"
90001050-11 = "Another message from Geburah... Oh?"
90001050-12 = "D-Darling Geburah lost?!"
90001050-13 = "Ho-hum. I see. Shall we commence plan B?"
90001050-14 = "No objections here. We'll respect Geburah's wishes to the very end."
90001050-15 = "S-So we will have to draw them...to that place."
90001050-16 = "Geburah sure worked hard to lure the enemies in the right direction, though."
90001050-17 = "That's our Geburah! Meticulous! Diligent! Not to mention, hot-headed!"
90001050-18 = "Let us analyze the logs... Oh? Dear. An unexpected variable."
90001050-19 = "The name... Am I reading this right? Tsukatsuki Rio...?"
90001050-20 = "Ts-Tsukatsuki Rio?!"
90001050-21 = "Annoying! An annoying opponent. Ugh. Perhaps we should've anticipated this."
90001050-22 = "But why now? ...Another useless line of questioning."
90001050-23 = "A-After all...she was the first one to notice the master's presence...and the first one with the audacity to investigate its traces."
90001050-24 = "Regardless, we'll need to prepare a method to handle this variable."
90001050-25 = "Even factoring her in, if we consider where they're being lured, and what we have prepared..."
90001050-26 = "Here's the question. A variable has factored itself into the equation that we cannot simply ignore. Do we still proceed with our previous methodology?"
90001050-27 = "Wh-What do you think we should do, Sof?"
90001050-28 = "Decisions...decisions... We have to be decisive."
90001050-33 = "Yes. Yeah. We'll proceed with the plan, using the same methodology."
90001050-35 = "...As expected. In fact, I suspected as such."
90001050-36 = "A-A-Are you sure? This is Tsukatsuki Rio!"
90001050-37 = "Yes. Yeah. I'll acknowledge that she's a formidable foe. But, on the other hand..."
90001050-38 = "O-On the other hand...?"
90001050-39 = "That kid is just as formidable! Don't you think, Ein?"
90001050-40 = "H-Huh? What do I think?"
90001050-41 = "Our kids are invincible, right?"
90001050-42 = "...!"
90001050-43 = "Y-Yes! You're correct! That baby is invincible!"
90001050-44 = "Regardless, one step into that place, and Tsukatsuki Rio will be rendered utterly useless."
90001050-45 = "Ah...! Yes! Since Tsukatsuki Rio is only here wirelessly!"
90001050-46 = "Absolutely correct. Lastly, we need to correctly evaluate just what level of threat this new variable poses. "
90001050-47 = "...Tsukatsuki Rio. One with the audacity to grasp at forbidden technology, which lies well beyond her station. "
90001050-48 = "I-I knew her data."
90001050-49 = "Additionally, she founded the Super Phenomenon Task Force, which dared to meddle with the master's operations. I suppose Akeboshi Himari was at the helm of that sabotage, however."
90001050-50 = "She obscured her location and operated from the darkest shadows, until now. What would cause her to suddenly reveal herself?"
90001050-51 = "For her to suddenly step onto the front lines..."
90001050-52 = "Right. For one reason or another, she was waiting for that teacher of theirs to join."
90001050-53 = "This, that, all of it is Sof's seedy speculation!"
90001050-54 = "Shut it, you."
90001050-55 = "Anyway, whether Tsukatsuki Rio is as dangerous a variable as Sensei..."
90001050-56 = "...or simply one we can write out of the equation, we'll have to see."
90001050-60 = "The conclusion Sof has come to, then..."
90001050-61 = "You intend to evaluate the significance of the new variable, alongside the utter decimation of all other enemies, using the child?"
90001050-63 = "Do I need to say it again?"
90001050-64 = "B-But... Is that really all right...? If they encounter that child, even those people..."
90001050-65 = "...would surely die?"
90001050-66 = "Yes... An issue of great complication."
90001050-67 = "We have yet to harm a human, have held no desire to do so, never even thought of it..."
90001050-71 = "If honesty were to compel me, I'd admit that even I feel..."
90001050-72 = "..."
90001050-73 = "Ein, Sof. My thoughts are...that this burden is one we must carry."
90001050-75 = "Huh?!"
90001050-76 = "..."
90001050-78 = "I speak truly, do I not? In luring the humans out to the Glacial Sea, we have already pronounced our resolve in that regard."
90001050-79 = "Did we not already tell them, \"Please, die\"?"
90001050-80 = "W-W-Wasn't that just for dramatic effect?"
90001050-81 = "Ah. Yes. Yeah. I thought that was the case as well..."
90001050-82 = "Listen, both of you. Strengthen your spirit. For the sake of the Elder Sister."
90001050-87 = "But..."
90001050-88 = "I know, Ein. I know. We never planned... Our ultimate goal was to avoid this solution to the equation."
90001050-89 = "But who came to our turf first? Sensei and the other humans invaded, without permission, I might add."
90001050-90 = "..."
90001050-91 = "Yes. I...understand."
90001050-92 = "I must strengthen my resolve, so I don't fall behind."
90001050-93 = "..."
90001050-98 = "Yes. All will be as it should be."
90001050-99 = "Y-Yes...!"
90001050-101 = "Although, making such a statement is the very epitome of irresponsibility."
90001050-102 = "WAAAH?!"
90001050-103 = "Ohr!"
90001050-104 = "Apologies, truly. Ein exhibits such a wide array of responses. The temptation to experiment with different variables is simply too strong!"
90001050-105 = "Oho? I was sorely tempted to experiment with your logic circuit's durability as well! Care to be my test subject?"
90001050-111 = "Rather than you being the one to conduct such an intriguing experiment— Ow! Enough violence!"
90001050-116 = "S-Sof... It's fine, you don't have to..."
90001050-120 = "As I stated previously, I've been investigating the traces the Nameless Gods' power left behind."
90001050-121 = "And, in that process, I unexpectedly encountered Geburah, the fifth prophet of Decagrammaton."
90001050-126 = "Hmm."
90001050-127 = "Hm..."
90001050-132 = "Does that create a connection to the trail we found at the Glacial Sea?"
90001050-133 = "But we've been unable to draw a line from Decagrammaton and the Nameless Gods. At least until now."
90001050-134 = "That is correct, Eimi. I'm sure there are some truths to be uncovered in that alone. "
90001050-135 = "For now, we'll review what we're absolutely certain is fact."
90001050-136 = "I've also gathered information on the other prophet that inhabits the Glacial Sea. It appears to be mining resources here."
90001050-137 = "Mining resources?"
90001050-138 = "I suspect this prophet has taken the form of a ship of some kind. An icebreaker or tactical ship."
90001050-139 = "I see. That hypothesis would align with the traces that we discovered."
90001050-140 = "The Glacial Sea... Very few humans travel here, but it's known to have a wealth of resources."
90001050-141 = "Knowing that, we can surmise that Geburah's role here is to patrol the nearby terrain for potential enemies..."
90001050-142 = "...and act as a guard for the other prophet."
90001050-143 = "[s] \"Hm... That actually does make sense.\""
90001050-144 = "Did you find out the identity of the ship-shaped prophet?"
90001050-145 = "...Not as of yet. It strangely emits almost no readable signals."
90001050-146 = "I've attempted to take pictures of the scenes with an AMAS I converted into a high-speed reconnaissance aircraft. But there's only so much that can be done while avoiding detection."
90001050-147 = "I see. We'll incorporate your data into the hypothesis we've been developing."
90001050-148 = "What hypothesis is that?"
90001050-149 = "Based on our observations, the Decagrammaton engineers are not only aware of the Nameless Gods' power..."
90001050-150 = "...but also have likely acquired it."
90001050-151 = "Yes. That seems like a likely conclusion."
90001050-152 = "We realized during our battle that the engineers were recording data from Toki's Abi-Eshuh."
90001050-153 = "We can only conclude that it was to validate whatever data they have collected of the Nameless Gods' power."
90001050-154 = "On top of that, according to your information, there's another prophet, shaped like a ship, mining resources in the Glacial Sea..."
90001050-155 = "And, as it left the area, it left a massive trail behind."
90001050-156 = "Which begs the question..."
90001050-158 = "What kind of question?"
90001050-159 = "We've more or less determined Geburah's purpose: patrolling and data collection."
90001050-160 = "But for what reason is this mystery prophet mining resources?"
90001050-161 = "That's..."
90001050-162 = "[s] \"Do you think it has a different motive from Geburah?\""
90001050-167 = "I believe so."
90001050-168 = "Though that's just my belief. Again, this is all speculation and hypothesis."
90001050-169 = "We'll only find answers on the field, at the end of the trail we've been tracking."
90001050-170 = "According to my calculations, there is a high likelihood that the ship prophet is waiting there."
90001050-174 = "...? Wait. I have a report."
90001050-175 = "While we've been speaking, it seems the terrain below us has changed."
90001050-176 = "I will decrease our altitude. Please buckle your seatbelts, and beware of turbulence."
90001050-184 = "..."
90001050-188 = "?"
90001050-189 = "...?"
90001050-194 = "What's wrong, President?"
90001050-195 = "What IS this?! I'd foolishly believed we had finally escaped the clutches of the Glacial Sea, only to enter a frozen tundra? "
90001050-196 = "There's nothing warm about a tundra! I can't take off my insulated suit! It's difficult to move!"
90001050-197 = "Yes. It's cold. I like it."
90001050-206 = "[ns] \"Maybe it's a teeny, tiny bit better than the Glacial Sea?\""
90001050-207 = "I don't want a teeny, tiny bit! I would like for the fundamental problem to be solved!"
90001050-208 = "However, it is warmer here. On average, the temperature has risen around 3 degrees Celsius. "
90001050-209 = "In fact, the sea will not freeze as easily here."
90001050-210 = "I would like to emphasize that there is no sea here!"
90001050-212 = "On to more important matters. I've identified something strange."
90001050-216 = "[ns] \"What...is that?\""
90001050-217 = "It appears to be a trace left behind from something capable of...moving."
90001050-218 = "From certain perspectives, it is actually quite normal. We came this far following a wisp of a trace, so why should we not continue to follow a trace?"
90001050-219 = "But this one is...well...?"
90001050-220 = "They look like giant pits, perfectly spaced out."
90001050-221 = "Does a ship leave behind such traces?"
90001050-222 = "[s] \"I know this sounds ridiculous, but...\""
90001050-223 = "...Yes. I don't quite know how to say it."
90001050-224 = "However, as Sensei said, it appears to be..."
90001050-225 = "Something like..."
90001050-226 = "..."
90001050-227 = "The footprints of a huuuge monster?"
90001050-228 = "The way you can say aloud what everyone else is afraid to...is quite commendable, at times."
90001050-229 = "Are modern ships capable of walking?"
90001050-230 = "No. Do you hear yourself? Ships cannot walk. What purpose would it serve to attach legs to a ship? There's no one in existence who operates with such irrationality and inefficiency."
90001050-231 = "But you enjoy irrational and inefficient things, President. Like astrology. And numerology. And—"
90001050-232 = "Heehee. You simply cannot understand my genius, Eimi. Astrology is one giant science, combining the studies of many different disciplines..."
90001050-233 = "...including celestial statistics and events, philosophy surrounding the malleability of fate, mathematics, and physics!"
90001050-234 = "But giant monsters are a realm that cannot be explained by science... A complete figment of imagination. There's no way they exist. Come now, Eimi."
90001050-236 = "(You say that now...)"
90001050-241 = "How do we approach this...?"
90001050-242 = "We have been unable to acquire any other leads."
90001050-243 = "It would be inefficient to simply turn back now."
90001050-244 = "[s] \"I think so, too. Thanks for the summary, Toki.\""
90001050-245 = "Thank you, Sensei. And while you're at it, they say compliments make the world go round. I am not the world, but I am Asuma Toki."
90001050-247 = "What did you do, Sensei? Toki is saying weird things again."
90001050-248 = "[s] \"So it's my fault, is it...?\""
90001050-249 = "I've taken stock of the situation. Please alert us of any updates, Rio."
90001050-250 = "Understood."
90001050-251 = "Can you stand guard, Toki? We need to be prepared for any possible threats."
90001050-252 = "Understood, President Himari. "
90001050-260 = "Next Episode;Flame"

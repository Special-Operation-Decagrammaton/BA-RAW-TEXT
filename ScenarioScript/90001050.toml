[translation]
90001050-1 = "ตอนที่ 5;ตัวแปร"
90001050-10 = "อะไรกันน่ะ เสียงสัญญาณเตือนภัยเหรอ?"
90001050-11 = "เกวูราห์ติดต่อมาอีกอย่างนั้นเหรอ... เอ๋?"
90001050-12 = "กะ... เกวูราห์จังแพ้อย่างนั้นเหรอคะ?!"
90001050-13 = "ฮืม ขั้นต่อไปก็คงต้องเป็นแผน B สินะ?"
90001050-14 = "ใช่ ฉันเห็นด้วย ทำตามแผน B กันเถอะ อย่างน้อยก็เพื่อเป็นการเคารพความตั้งใจของเกวูราห์น่ะ"
90001050-15 = "สะ... สุดท้ายก็ต้องหลอกล่อไปยังที่นั่นเหรอคะ..."
90001050-16 = "ดูเหมือนว่าเกวูราห์ขุดหลุมพรางเอาไว้หลอกล่อให้ศัตรูไปในทิศทางที่ตัวเองต้องการน่ะ"
90001050-17 = "เกวูราห์ทั้งรอบคอบและทุ่มเทจริงๆ เลย! ถึงมันจะรุนแรงไปหน่อยก็เถอะ!"
90001050-18 = "มาวิเคราะห์ข้อมูลกันต่อเถอะค่ะ เอ๋? เดี๋ยวนะคะ เหมือนว่าจะมีตัวแปรใหม่เกิดขึ้นเลย..."
90001050-19 = "ชื่อว่า... อ่านอย่างนี้หรือเปล่านะ? สึคัตสึกิ ริโอะ...?"
90001050-20 = "สะ... สึคัตสึกิ ริโอะ?!"
90001050-21 = "เจอฝ่ายตรงข้ามตัวปัญหาจนได้... นี่คือสิ่งที่เราต้องคาดหวังไว้ตั้งแต่แรกหรือเปล่านะ"
90001050-22 = "ทำไมถึงมาปรากฏตัวเอาตอนนี้ล่ะคะ? ไม่ค่ะ ไม่สิๆ นั่นคงเป็นคำถามที่ไม่มีความหมายหรอกค่ะ"
90001050-23 = "ชะ... ใช่ค่ะ คนที่รับรู้ถึงตัวตนของท่านผู้นั้นตั้งแต่แรก และกล้าดีมาไล่ตามท่านผู้นั้นก็คือคนคนนี้ละค่ะ"
90001050-24 = "ฉันว่าเราต้องคิดหาแผนรับมือสำหรับสถานการณ์นี้นะ"
90001050-25 = "การมาสมทบกันของตัวแปรใหม่ สถานที่ที่พวกเราจะหลอกล่อพวกนั้นไป และสิ่งที่พวกเรารู้มา... ถ้าพิจารณาจากปัจจัยเหล่านี้แล้วละก็..."
90001050-26 = "ก็น่าจะสรุปได้ว่า <ต่อให้เกิดตัวแปรใหม่ที่ละเลยไม่ได้ เราก็จะยังทำตามแผนการเดิมอยู่มั้ย?>"
90001050-27 = "อะ... เอายังไงดีคะ ซอฟ...?"
90001050-28 = "ใช่ ถึงเวลาที่ต้องตัดสินใจแล้วสินะ เข้าใจแล้ว"
90001050-33 = "ทำตามแผนการเดิมกันเถอะ"
90001050-35 = "เป็นอย่างนี้สินะคะ... ตะ... แต่ฉันก็คาดเอาไว้แล้วละค่ะ"
90001050-36 = "ตะ... ตะตะตะตะ... แต่เราจะไม่เป็นอะไรเหรอคะ?! ก็คนที่ชื่อสึคัตสึกิ ริโอะน่ะ...!"
90001050-37 = "อืม ผู้หญิงคนนั้นเป็นตัวแปรที่สำคัญเลยละ เรื่องนั้นเราต้องยอมรับ แต่ในขณะเดียวกัน..."
90001050-38 = "นะ... ในขณะเดียวกัน...?"
90001050-39 = "ฉันว่าเด็กคนนั้นต้องทำได้แน่นอนค่ะ! ว่ามั้ยคะ ไอน์?"
90001050-40 = "คะ... คะ? ฉันเหรอคะ?"
90001050-41 = "ก็เด็กคนนั้นเป็นอมตะไง ใช่มั้ยล่ะ?"
90001050-42 = "...!"
90001050-43 = "ชะ... ใช่ค่ะ! ถูกต้องค่ะ! เด็กคนนั้นเป็นอมตะอย่างที่ว่าค่ะ!"
90001050-44 = "และถ้าได้เข้าไปในพื้นที่นั้น สึคัตสึกิ ริโอะก็จะต้องถูกกำจัดไปตามธรรมชาติด้วยค่ะ"
90001050-45 = "อ๊ะ...! นั่นสินะคะ! เพราะสึคัตสึกิ ริโอะจะสื่อสารผ่านระบบสื่อสารระยะไกลเท่านั้น!"
90001050-46 = "ใช่ อีกอย่างนะ ฉันคิดว่าตอนนี้เราต้องสังเกตตัวแปรที่เป็นศัตรูตัวฉกาจคนใหม่ด้วย "
90001050-47 = "สึคัตสึกิ ริโอะ... คนที่เคยพยายามจะแตะต้องเทคโนโลยีต้องห้ามทั้งๆ ที่ไม่รู้ขอบเขตของมัน"
90001050-48 = "ตะ... ตามข้อมูลแล้ว เธอก็รู้อยู่ค่ะ..."
90001050-49 = "แถมยังก่อตั้ง <ชมรมปรากฏการณ์ลี้ลับ> ขึ้นมาเพื่อกวนใจท่านผู้นั้นด้วยค่ะ ถึงแม้คนที่คอยทำงานจะ#nเป็นอาเกโบชิ ฮิมาริก็เถอะค่ะ"
90001050-50 = "และตอนนี้ก็มาปรากฏตัวที่นี่ ทั้งๆ ที่ที่ผ่านมาไม่เคยเปิดเผยตำแหน่งของตัวเอง และเคลื่อนไหวอยู่ใน#nเงามืดมาตลอด"
90001050-51 = "กะ... การที่คนแบบนั้นมาปรากฏตัวในแนวหน้าแบบนี้..."
90001050-52 = "อืม บางครั้งผู้หญิงคนนั้นอาจจะตั้งใจมาสมทบกับคุณครูคนนั้นอยู่แล้วก็ได้"
90001050-53 = "แต่ว่า~ ทุกอย่างก็เป็นแค่การคาดเดาของซอฟเท่านั้นนะคะ~"
90001050-54 = "อยู่เฉยๆ ไปเลย..."
90001050-55 = "เอาเถอะ ฉันมองว่าพวกเราต้องสังเกตอย่างใกล้ชิดว่าสึคัตสึกิ ริโอะเป็นตัวแปรที่เทียบเท่ากับ 'คุณครู' คนนั้น"
90001050-56 = "หรือว่าเป็นตัวแปรที่มีอิทธิพลน้อยกว่าและสามารถมองข้ามได้กันแน่"
90001050-60 = "ที่ซอฟพูดมา หมายความว่า..."
90001050-61 = "แผนการของเราตอนนี้ก็คือการประเมินตัวแปรใหม่ และระหว่างนั้นก็ใช้เด็กคนนั้นในการกำจัดศัตรู#nทั้งหมดไปด้วยสินะคะ?"
90001050-63 = "ใช่ แบบนั้นละ"
90001050-64 = "ตะ... แต่ว่า... จะไม่เป็นไรจริงๆ เหรอคะ...? ถ้าได้เจอกับเด็กคนนั้นละก็ ต่อให้เป็นคนพวกนั้น..."
90001050-65 = "ก็น่าจะ... ตายกันหมดนะคะ...?"
90001050-66 = "อืม... นั่นเป็นปัญหาที่ซับซ้อนเลยละ"
90001050-67 = "เพราะเรายังไม่เคยทำร้ายใคร เราไม่อยากทำร้ายใคร และเราก็ไม่เคยคิดว่าจะทำอย่างนั้นด้วย..."
90001050-71 = "ถ้าพูดตามตรง ฉันยัง..."
90001050-72 = "..."
90001050-73 = "ไอน์ ซอฟ ฉันคิดว่าเราต้องยอมรับเรื่องนั้นนะคะ"
90001050-75 = "หา?!"
90001050-76 = "..."
90001050-78 = "หรือว่าไม่ใช่คะ? ถ้าไม่เตรียมใจแบบนั้นไว้ ฉันก็คงไม่หลอกล่อคนพวกนั้นให้มาถึงธารน้ำแข็งหรอกค่ะ"
90001050-79 = "แล้วเราก็พูดไปแล้วด้วยว่า 'เชิญตายได้เลยค่ะ'"
90001050-80 = "มะ... มะมะมะมะ... ไม่ได้พูดคำนั้นไปตามอารมณ์เฉยๆ หรอกเหรอคะ?!"
90001050-81 = "อืม นั่นสิ ฉันก็คิดแบบนั้นเหมือนกัน..."
90001050-82 = "ทั้งคู่ต้องตั้งสติให้เด็ดเดี่ยวสิคะ เราต้องปกป้องพี่สาวของเรานะคะ"
90001050-87 = "แต่ว่า..."
90001050-88 = "ฉันรู้น่า ไอน์ ฉันก็รู้ดี ที่เราวางแผนเรื่องนี้ไว้... ก็เพื่อป้องกันไม่ให้เกิดเรื่องแบบนั้น"
90001050-89 = "แต่ถ้ามาลองคิดๆ ดูแล้ว ฝ่ายที่ก้าวเท้าเข้ามาในพื้นที่ของพวกเราตามอำเภอใจก่อนก็คือคุณครูกับคน#nพวกนั้นไม่ใช่เหรอ?"
90001050-90 = "..."
90001050-91 = "ค่ะ เข้าใจ... แล้วค่ะ..."
90001050-92 = "ฉันคงต้อง... เตรียมตัว... เพื่อไม่ให้แพ้... แล้วสินะคะ..."
90001050-93 = "..."
90001050-98 = "ไม่เป็นไรหรอก ทุกอย่างจะดีเอง"
90001050-99 = "ค่ะ ค่ะ...!"
90001050-101 = "ก็นะ~ ไม่มีคำไหนที่จะขาดความรับผิดชอบไปกว่าคำที่ว่า \"ทุกอย่างจะดีเอง\" สุดคลุมเครือนี้หรอกค่ะ~"
90001050-102 = "ฮะ... เฮือกกกก?!?!"
90001050-103 = "ออร์!"
90001050-104 = "ขอโทษค่ะ ขอโทษ ก็ไอน์มีปฏิกิริยาตอบสนองหลายอย่าง ฉันก็เลยอยากทดสอบหลายๆ ตัวแปรดูน่ะค่ะ"
90001050-105 = "โอ้... ฉันเองก็อยากทดสอบความคงทนของวงจรตรรกะของเธออยู่พอดีเลย ขอลองทดสอบดูสักครั้ง#nได้มั้ยล่ะ?"
90001050-111 = "ไม่ต้องทดสอบอะไรที่ไร้ประสิทธิภาพแบบนั้นด้วยตัวเองหรอก... โอ๊ยยย! อย่าใช้ความรุนแรงสิ!"
90001050-116 = "ซะ... ซอฟ... ฉันไม่เป็นไรค่ะ ไม่ต้องทำแบบนั้นหรอก..."
90001050-120 = "อย่างที่ฉันบอกไปก่อนหน้าว่า... ตอนนี้ฉันกำลังติดตามร่องรอยที่พลังของทวยเทพไร้นามทิ้งไว้"
90001050-121 = "และระหว่างนั้นก็ตรวจจับเกวูราห์ ผู้เลื่อมใสตนที่ 5 ของเดคาแกรมมาทอนได้"
90001050-126 = "โอ้"
90001050-127 = "อืม..."
90001050-132 = "มันเกี่ยวข้องกับร่องรอยบางอย่างในธารน้ำแข็งที่พวกฉันค้นพบหรือเปล่าคะ?"
90001050-133 = "เดคาแกรมมาทอนกับพลังของทวยเทพไร้นามไม่มีส่วนเกี่ยวข้องกันนี่นา? ฉันหมายถึงที่ผ่านมาน่ะ"
90001050-134 = "ใช่แล้วละ เอมิ ถึงจะมีข้อเท็จจริงบางอย่างที่อนุมานได้จากตรงนั้นอยู่ก็เถอะ"
90001050-135 = "แต่ตอนนี้ฉันจะพูดถึงเฉพาะข้อเท็จจริงที่แน่นอนก่อน"
90001050-136 = "ข้อมูลอื่นๆ ที่ฉันวิเคราะห์ได้ก็คือ ผู้เลื่อมใสตนอื่นที่ไม่ใช่เกวูราห์กำลังเก็บรวบรวมทรัพยากรในธารน้ำ#nแข็งอยู่"
90001050-137 = "เก็บรวบรวมทรัพยากรอย่างนั้นเหรอคะ?"
90001050-138 = "ฉันสันนิษฐานว่าผู้เลื่อมใสตนนี้มีรูปร่างเหมือนเรือขนาดใหญ่ ประมาณว่าเป็นเรือสอดแนมหรือเรือตัด#nน้ำแข็งน่ะ"
90001050-139 = "อย่างนั้นสินะคะ ถ้าดูจากร่องรอยที่เหลือในธารน้ำแข็ง การคิดว่าเป็นเรือประเภทนั้นก็สมเหตุสมผลค่ะ"
90001050-140 = "ธารน้ำแข็ง... เป็นสถานที่ที่มือของมนุษย์แตะไม่ถึง และว่ากันว่าเป็นที่ที่อุดมไปด้วยทรัพยากรที่เป็น#nของขวัญจากธรรมชาติค่ะ"
90001050-141 = "และบางทีบทบาทของเกวูราห์ที่อยู่ในธารน้ำแข็งนี้ก็คือการลาดตระเวนและเฝ้าระวังพื้นที่โดยรอบ..."
90001050-142 = "และอาจจะมีบทบาทในการ... คุ้มกันผู้เลื่อมใสตนอื่นก็ได้"
90001050-143 = "[s] \"อืม... ฟังดูมีเหตุผลนะ\""
90001050-144 = "วิเคราะห์ตัวตนของผู้เลื่อมใสในรูปร่างเรือแล้วหรือยังคะ?"
90001050-145 = "เรื่องนั้นยังทำไม่ได้น่ะ... ผู้เลื่อมใสตนนั้นแทบจะไม่ส่งสัญญาณออกมาภายนอกเลย"
90001050-146 = "ที่ฉันทำได้ก็แค่หลีกเลี่ยงสายตาของกองกำลังเดคาแกรมมาทอน และถ่ายภาพสถานที่จริงด้วย AMAS ที่ปรับปรุงใหม่ให้เป็นเครื่องบินสอดแนมความเร็วสูง"
90001050-147 = "อย่างนั้นสินะคะ ฉันคงต้องใส่ความคิดเห็นจากคุณในสมมติฐานที่เราตั้งไว้แล้วละค่ะ"
90001050-148 = "สมมติฐานอะไรเหรอ?"
90001050-149 = "ตามที่เราคาดไว้ ตอนนี้เหล่าวิศวกรของเดคาแกรมมาทอนกำลังทำความเข้าใจ <พลังของทวยเทพไร้นาม> อยู่..."
90001050-150 = "และเราก็สันนิษฐานว่าวิศวกรพวกนั้นอาจจะได้มันมาครองแล้วด้วยค่ะ"
90001050-151 = "อืม สมมติฐานนั้นก็สมเหตุสมผลเหมือนกัน"
90001050-152 = "พวกฉันคาดว่าเหล่าวิศวกรของเดคาแกรมมาทอนต้องการพิสูจน์ข้อมูลของทวยเทพไร้นาม"
90001050-153 = "พวกนั้นก็เลยเฝ้าสังเกตอาบี เอชูห์ของโทคิ โดยเฉพาะข้อมูลการต่อสู้ของอาบี เอชูห์ค่ะ..."
90001050-154 = "และถ้าอ้างอิงตามข้อมูลจากคุณด้วยแล้ว ในธารน้ำแข็งแห่งนี้ก็มีผู้เลื่อมใสตนอื่นในรูปร่างเรือที่กำลัง#nเก็บสะสมทรัพยากรอยู่"
90001050-155 = "และผู้เลื่อมใสตนนั้นออกจากเขตธารน้ำแข็งไปโดยทิ้งร่องรอยการเคลื่อนไหวขนาดมหึมาไว้... ตอนนี้เราน่าจะสรุปได้แบบนี้ค่ะ"
90001050-156 = "ถ้าเป็นอย่างนั้น ฉันก็มีเรื่องสงสัยอยู่อย่างหนึ่งค่ะ"
90001050-158 = "เรื่องที่สงสัยเหรอ?"
90001050-159 = "จากข้อมูลที่ได้มา เราสันนิษฐานได้ว่าเกวูราห์ลาดตระเวนและเฝ้าระวังอยู่ในธารน้ำแข็ง และทำการต่อสู้เพื่อการรวบรวมข้อมูลด้วย"
90001050-160 = "แต่ผู้เลื่อมใสตนใหม่ที่ริโอะพูดถึงนั้นเก็บรวบรวมทรัพยากรไปเพื่ออะไรเหรอคะ?"
90001050-161 = "เรื่องนั้นน่ะ..."
90001050-162 = "[s] \"ผู้เลื่อมใสตนนั้นมีวัตถุประสงค์ที่ต่างจากเกวูราห์หรือเปล่านะ?\""
90001050-167 = "ค่ะ ในตอนนี้เราพอสรุปแบบนั้นได้ค่ะ"
90001050-168 = "แต่ทุกอย่างก็ยังอยู่ในขั้นของการคาดเดาและสมมติฐานเท่านั้นค่ะ"
90001050-169 = "ถ้าจะหาคำตอบ เราก็คงไม่มีทางเลือกอื่นนอกจากติดตามร่องรอยนี้ต่อไปเรื่อยๆ สินะ"
90001050-170 = "ผู้เลื่อมใสตนอื่นที่ท่านริโอะพูดถึงอาจจะไปรออยู่ในตอนสุดท้ายก็ได้นะคะ"
90001050-174 = "เดี๋ยวนะคะ ฉันมีเรื่องจะรายงานค่ะ"
90001050-175 = "ระหว่างที่เราคุยกัน ภูมิประเทศก็ดูเหมือนจะเปลี่ยนไปค่ะ"
90001050-176 = "ฉันจะลดระดับความสูงค่ะ ระวังเครื่องสั่นนะคะ"
90001050-184 = "..."
90001050-188 = "?"
90001050-189 = "...?"
90001050-194 = "เป็นอะไรไปเหรอหัวหน้า?"
90001050-195 = "อะไรกันคะ?! คิดว่าพ้นจากธารน้ำแข็งมาได้แล้วทั้งที แต่ต้องมาเจอทุ่งทุนดราเหรอคะเนี่ย? "
90001050-196 = "ยังต้องเจออากาศหนาวเหมือนเดิมสินะคะ?! จะถอดชุดสูทปล่อยความร้อนให้กระฉับกระเฉงหน่อยก็#nทำไม่ได้ด้วย?"
90001050-197 = "อืม ฉันชอบนะที่ยังเย็นสบายอยู่เหมือนเดิม"
90001050-206 = "[ns] \"แต่มันก็น่าจะดีกว่าธารน้ำแข็งนะ...?\""
90001050-207 = "ถ้าเป็นไปได้ ฉันก็อยากแก้ปัญหาที่ต้นเหตุเลยค่ะ!"
90001050-208 = "ถ้าให้พูดตามจริงแล้วละก็ ใช่ว่าจะไม่มีการเปลี่ยนแปลงหรอกค่ะ อุณหภูมิเฉลี่ยเพิ่มขึ้นมาประมาณ 3 องศาค่ะ "
90001050-209 = "ถ้าที่นี่มีทะเล ต่อให้เป็นทะเลก็ไม่น่าจะแข็งตัวง่ายๆ นะคะ"
90001050-210 = "ที่พูดเพราะที่นี่ไม่มีทะเลใช่มั้ยล่ะคะ?!"
90001050-212 = "ทุกคน ดูทางโน้นสิ เหมือนมีอะไรแปลกๆ เลยนะ"
90001050-216 = "[ns] \"นั่นมัน... อะไรน่ะ?\""
90001050-217 = "เหมือนเป็น... ร่องรอยการเคลื่อนที่ของบางอย่าง"
90001050-218 = "ในอีกแง่หนึ่ง ฉันว่ามันง่ายและชัดเจนขึ้นมาแล้วค่ะ ในเมื่อเราไล่ตามร่องรอยมาถึงที่นี่แล้ว เราก็แค่ติดตามต่อไปก็ได้นี่คะ?"
90001050-219 = "แต่ว่าร่องรอยตรงนี้มัน...?"
90001050-220 = "เหมือนเป็นหลุมขนาดยักษ์ที่เชื่อมต่อกันเป็นระยะๆ เลย"
90001050-221 = "นั่นก็เป็นร่องรอยการเคลื่อนที่ของเรือเหรอคะ?"
90001050-222 = "[s] \"ครูรู้ว่าคำพูดแบบนี้มันไม่น่าฟังเท่าไร แต่ว่านี่มัน...\""
90001050-223 = "ใช่... ไม่คิดเลยนะว่าฉันจะต้องพูดคำนี้ด้วยปากตัวเอง"
90001050-224 = "แต่ก็อย่างที่ครูว่า ร่องรอยนั้นมันเหมือนกับ..."
90001050-225 = "เหมือนกับ..."
90001050-226 = "..."
90001050-227 = "รอยเท้าของสัตว์ประหลาดขนาดยักษ์?"
90001050-228 = "พูดในสิ่งที่ทุกคนกำลังคิดออกมาได้เลยเหรอคะเนี่ย น่าทึ่งจังเลยนะคะ"
90001050-229 = "เรือเดินเล่นได้หรือเปล่านะ?"
90001050-230 = "ไม่หรอกค่ะ พูดอะไรออกมาคะ เอมิ เรือจะเดินได้ยังไงคะ เรือไม่มีขาสักหน่อย นั่นเป็นเรื่องไร้เหตุผล และดูไม่มีประสิทธิภาพเลยค่ะ"
90001050-231 = "แต่หัวหน้าก็ชอบอะไรแปลกๆ แบบนั้นไม่ใช่เหรอ? เรื่องโหราศาสตร์หรือศาสตร์แห่งตัวเลขอะไรนั่นน่ะ"
90001050-232 = "ฮุฮุ ไม่รู้อะไรเสียแล้วนะคะ เอมิ โหราศาสตร์คือสาขาวิชาเกี่ยวกับสถิติและเหตุการณ์บนฟากฟ้าที่มีมา#nตั้งแต่สมัยโบราณ..."
90001050-233 = "และเป็นศาสตร์ที่เกี่ยวข้องกับปรัชญา คณิตศาสตร์ และฟิสิกส์... เพื่อศึกษาตัวแปรที่จะที่กำหนด#nโชคชะตานะคะ"
90001050-234 = "แต่เมื่อเทียบกันแล้ว สัตว์ประหลาดขนาดยักษ์นั่นเป็นสิ่งที่อธิบายไม่ได้ในทางวิทยาศาสตร์... ใช่แล้วละค่ะ สิ่งที่อยู่ในจินตนาการไม่มีทางมีอยู่จริงหรอกค่ะ เอมินี่ละก็จริงๆ เลย"
90001050-236 = "(ต่อให้จะพูดอะไรแบบนั้นเอาป่านนี้ก็เถอะ...)"
90001050-241 = "ทำยังไงกันดีล่ะ...?"
90001050-242 = "ตอนนี้เราไม่น่าจะหาเบาะแสอื่นได้ค่ะ"
90001050-243 = "และต่อให้เราล้มเลิกและเดินทางกลับไป ฉันก็ไม่คิดว่าจะมีความหมายด้วยค่ะ"
90001050-244 = "[s] \"ครูก็คิดแบบนั้น ขอบใจที่ช่วยสรุปนะ โทคิ\""
90001050-245 = "ขอบคุณค่ะ คุณครู ว่ากันว่าคำชมคำเดียวก็ทำให้วาฬดีใจจนเต้นได้เชียวนะคะ แต่ฉันไม่ใช่วาฬ แต่เป็นอะซุมะ โทคิค่ะ"
90001050-247 = "ทำอะไรของคุณครูน่ะ โทคิพูดอะไรไร้สาระอีกแล้วนะ"
90001050-248 = "[s] \"กลายเป็นว่า... เป็นความผิดของครูเหรอ...\""
90001050-249 = "เอาละ เข้าใจแล้วค่ะ ถ้าอย่างนั้นเราก็มาติดตามกันต่อเลยค่ะ ริโอะ ช่วยอัปเดตสถานการณ์เรื่อยๆ ด้วย#nนะคะ"
90001050-250 = "เข้าใจแล้ว"
90001050-251 = "ขอโทษนะโทคิ ช่วยอยู่ในสถานะเฝ้าระวังต่อได้มั้ยคะ? ฉันอยากให้เราเตรียมพร้อมรับมือกับพวกความ#nเสี่ยงที่อาจเกิดขึ้นได้น่ะค่ะ"
90001050-252 = "เข้าใจแล้วค่ะ หัวหน้าฮิมาริ "
90001050-260 = "ตอนต่อไป;เปลวไฟ"

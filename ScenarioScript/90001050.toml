90001050-35 = "3;오르;09;……역시 그렇게 되는군요. 뭐, 알고 있었지만요.\n#3;em;[재잘]"
90001050-36 = "3;아인;07;괘, 괘괘괘괘, 괜찮을, 까요?! 그, 츠카츠키 리오는……!\n#3;jump"
90001050-37 = "3;소프;08;맞아. 그 여자는 상당한 변수지. 그 점은 인정해야 해. 그렇지만 동시에……."
90001050-38 = "3;아인;02;도, 동시에……?"
90001050-39 = "3;오르;02;그 아이라면, 분명 할 수 있을 거예요! 그렇지 않나요, 아인?\n#3;closeup\n#3;em;[!]\n#3;jump"
90001050-40 = "3;아인;10;네, 네에? 저요?\n#3;stiff"
90001050-41 = "3;소프;07;왜냐하면, 그 아이는 무적이니까. 그렇지?"
90001050-42 = "3;아인;09;……!\n#3;em;[!]"
90001050-43 = "3;아인;05;그, 그래요! 맞아요! 그 아이는 말 그대로 무적이니까요!\n#3;jump"
90001050-44 = "3;아인;05\n2;오르;03;거기에 그 지역으로 진입하게 되면, 츠카츠키 리오는 자연적으로 배제될 테고 말이죠?\n#3;m4\n#2;ar"
90001050-45 = "3;아인;03;아……! 그렇네요! 츠카츠키 리오는 원격 통신으로만 소통하고 있으니까요!"
90001050-46 = "3;아인;03\n2;오르;03\n1;소프;02;그래. 그리고 나는 한 가지 더, 이 시점에서 우리가 새로운 난적이라는 변수의 진폭을 관찰해야 한다고 생각해. \n#3;m5\n#2;m3\n#1;ar"
90001050-47 = "1;소프;08;……츠카츠키 리오. 이전, 그 금지된 기술에 분수를 모르고 손을 대려 했던 자였지. \n#1;em;…"
90001050-48 = "3;아인;02;저, 정보로는, 알고 있었지만…….\n#3;stiff"
90001050-49 = "2;오르;03;거기에 그 <초현상특무부>라는 동아리까지 만들어서, 그분을 귀찮게 하려 했죠. 뭐, 실행한 것은 아케보시 히마리 쪽이었지만요."
90001050-50 = "1;소프;11;그리고 이제 와서, 여기에 모습을 드러냈다 이거고. 지금까지 철저하리만치 자신의 위치를 노출하지 않고, 그늘 속에서 움직이고 있었는데."
90001050-51 = "3;아인;02;그런 사람이, 이, 이제 와서 전면으로 나섰다는, 것은……."
90001050-52 = "1;소프;07;응. 어쩌면 저 선생님과의 합류를, 어느 순간부터 노리고 있었던 것일 수도 있지."
90001050-53 = "2;오르;12;이것도~ 저것도~ 모두 소프의 추측일 뿐이지만요~\n#2;em;[한숨]"
90001050-54 = "1;소프;04;조용히 좀 해라…….\n#1;em;[땀]"
90001050-55 = "1;소프;03;아무튼, 우리는 츠카츠키 리오라는 변수가 저 '선생님'에 준하는 변수일지."
90001050-56 = "1;소프;07;아니면 그보다는 영향력이 적은, 간과할 수 있을 변수일지를 면밀히 관찰해야 한다고 봐."

90001050-132 = "3;토키 모드 1;02;그건 저희가 발견한, 빙해에 남겨진 어떤 흔적과도 연관이 있는 것인가요?\n#3;em;[?]"
90001050-133 = "3;에이미 수영복ND;00;데카그라마톤과 이름 없는 신들의 힘 사이에는 별다른 상관관계가 없었잖아? 그동안은 말이야."
90001050-134 = "3;리오;00;그 말이 맞아. 에이미. 거기에서 유추를 시도해 볼 수 있는 사실도 물론 있겠지만. \n#3;sig"
90001050-135 = "3;리오;02;여기에서는 확실한 사실들만 가지고 이야기하도록 할게.\n#3;sig"
90001050-136 = "3;리오;05;내가 파악하고 있는 또 다른 정보는, 게부라가 아닌 또 다른 예언자가, 빙해에서 자원을 채취하고 있다는 것이었어.\n#3;sig"
90001050-137 = "3;히마리 방한복;02;자원 채취, 라고요?\n#3;em;[?]"
90001050-138 = "3;리오;02;그 예언자는 아마도, 커다란 배의 형상을 하고 있을 것으로 추정돼. 공작선이나 쇄빙선 같은 형태로 말이지.\n#3;sig"
90001050-139 = "3;히마리 방한복;01;그렇군요. 빙해에 남겨진 흔적이, 그런 종류의 선박이 남긴 것이라고 생각하면 앞뒤는 맞아요."
90001050-140 = "3;히마리 방한복;05;빙해란…… 사람의 손이 닿지 않는 장소로, 보통 천혜의 자원이 모여 있다고 알려져 있으니까요."
90001050-141 = "3;리오;01;그리고 아마도 함께 이곳 빙해에 존재하는 게부라의 역할은, 빙해 근방 지형에 대한 정찰 및 초계…….\n#3;sig"

90001050-9 = "5;아인;01\n1;소프;01\n3;오르;01\n#1;h\n#3;h\n#5;h\n#1;a\n#3;a\n#5;a\n#wait;1000"
90001050-10 = "1;소프;02;뭐야, 경보음?\n#1;em;[?]"
90001050-11 = "3;오르;11;게부라에게서 다시 연락…… 어라라?"
90001050-12 = "5;아인;07;게, 게부라 쨩이 패배했다고요?!\n#5;em;[?!]\n#5;shake"
90001050-13 = "3;오르;12;흐으음. 다음 절차는 역시, 플랜 B로?\n#3;em;[한숨]"
90001050-14 = "1;소프;11;그래. 이견 없어. 플랜 B로 이행하자. 게부라의 의사를 존중하는 의미에서라도."
90001050-15 = "5;아인;04;겨, 결국 그곳으로 유인해야 하는 건가요…….\n#5;em;…"
90001050-16 = "1;소프;07;그래도 게부라는 마지막까지 적들을 원하는 방향으로 유도할 수 있도록 구멍을 파둔 모양이야."
90001050-17 = "1;소프;03;역시 게부라는 치밀하고 성실하네! 근본적으로는 뜨겁지만!\n#1;jump\n#1;em;[!]"
90001050-18 = "3;오르;11;나머지 로그를 마저 분석해 보죠. 어라? 잠시만요. 뭔가 새로운 변수가 나타난 것 같은데……"
90001050-19 = "3;오르;12;이름이……. 이렇게 읽는 거 맞나? 츠카츠키 리오……?"
90001050-20 = "5;아인;07;츠, 츠카츠키 리오?!\n#5;em;[?!]\n#5;shake"
90001050-21 = "1;소프;09;이건 조금…… 귀찮은 상대가 나타났네. 아니, 예상하고 있어야 했던 일이었으려나."
90001050-22 = "3;오르;02;왜 이제 와서 모습을 드러낸 걸까요? 아뇨, 아뇨, 아뇨. 그것도 어떻게 보면 무의미한 질문이겠군요."
90001050-23 = "5;아인;05;그, 그래요……. 애초에 그분의 존재를 처음 인지하고, 감히 그 뒤를 쫓으려 했던 것은 이 사람이었죠…….\n#5;stiff"
90001050-24 = "1;소프;08;그렇지만 이 사태에는 조금, 대비책을 생각해 둬야 할 것 같아."
90001050-25 = "3;오르;12;새로운 변수의 합류, 우리가 그들을 유인하려는 곳, 그리고 우리가 확보 중인 것들을 고려해 보면…….\n#3;em;…"
90001050-26 = "1;소프;02;이야기를 축약하자면 이런 거지. 무시하기 힘든 새로운 변수가 나타났고, 그럼에도 작전대로 진행할 것인가? 하는 거."
90001050-27 = "5;아인;02;어, 어떻게 하죠. 소프……?\n#5;em;[땀]\n#5;stiff"
90001050-28 = "1;소프;02;그래. 결정해야 할 시간인 거네. 알겠어."
90001050-29 = "#st;[0,0];instant;1;"

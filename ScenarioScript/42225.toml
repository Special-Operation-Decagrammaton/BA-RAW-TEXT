[translation]
42225-6 = "Ugh..."
42225-10 = "(The shock wave... the detonator...)"
42225-16 = "[ns1] \"I got it! The detonator!\"\n[ns2] \"I secured the detonator!\""
42225-19 = "Great job, Sensei!"
42225-20 = "Don't lose focus on the battlefield, Tsukiyuki!"
42225-22 = "I'm right here!"
42225-37 = "Augh!"
42225-41 = "You're always full of openings. If I were grading you, that would've been a fail."
42225-45 = "Luckily, you don't get to test me in real life..."
42225-46 = "You're the one who taught me how different reality is from our books!"
42225-47 = "And I've learned that in reality, justice will win as long as you have the resolve to fight for it."
42225-48 = "Justice will win? Resolve?"
42225-49 = "Sometimes it feels as if you're willfully refusing to grow up. If 'reality' played by your idealistic little rules, we wouldn't be here in the first place."
42225-50 = "Let me teach you your next lesson then. Reality has a habit of destroying people's dreams."
42225-55 = "Foxtrot."
42225-60 = "(That sounds like a flashbang...)"
42225-62 = "...Gotcha!"
42225-71 = "You were right about one thing."
42225-72 = "By headbutting instead of using my hands, I sped up my response time by half a second."
42225-76 = "Stand down, FOX 1."
42225-77 = "*sigh*"
42225-78 = "For someone who usually does exactly as she's told, why did you stop listening to me?"
42225-79 = "What do you mean?"
42225-85 = "I told you I would trigger the warhead if you set foot in the control room."
42225-86 = "I wasn't bluffing."
42225-87 = "I was fully prepared to give my life for this mission."
42225-88 = "So why... Why did you press on without a second thought?"
42225-93 = "It never even crossed my mind that you'd really risk all of our lives like that."
42225-94 = "You told me before that all of this, the crimes, the suffering, was for the future students of SRT."
42225-95 = "Someone that invested in tomorrow..."
42225-96 = "...just didn't seem like she would just let the people who look up to her most die."
42225-101 = "...I showed you the world's harsh truths."
42225-102 = "I drilled into you that it’s better to play dirty and win than play fair and lose."
42225-103 = "And still, you trust me?"
42225-104 = "You once said something else."
42225-107 = "That no matter the obstacle, SRT's justice never wavers."
42225-108 = "Even if it starts to dim under the world's darkness, it'll always shine through at the end."
42225-111 = "It was your beliefs that gave me the strength to stand up for my own."
42225-112 = "It was our dream to be like the FOX Squad."
42225-115 = "Why would we ever have walked down such a treacherous path if we didn't believe in the future it led to."
42225-117 = "So, don't walk out on us now."
42225-122 = "...We've strayed from our path."
42225-123 = "We were given immense power but lacked guidance."
42225-124 = "After the General Student Council President vanished, we searched for direction. Someone else who could shoulder our responsibilities."
42225-125 = "But we didn't find someone like that. Instead of relinquishing the power like we should have, we clung to it, desperate."
42225-126 = "And now, at the end of the road, I’m faced with a ghost from the past. How ironic."
42225-130 = "Squad Leader Tsukiyuki, this warhead needs to go off."
42225-131 = "It's time I close this chapter and face the consequences of my actions."
42225-132 = "So, please. Just...get out of here."
42225-134 = "Yukino...!"
42225-139 = "[ns] \"It's hard to take responsibility. I can understand that.\""
42225-141 = "[ns] \"But what you're doing right now is running away from it. I can't let you do that.\""
42225-144 = "...[USERNAME] Sensei."
42225-145 = "It might be hard for you to relate."
42225-146 = "You've always balanced power with responsibility so well."
42225-147 = "But if you were in our shoes..."
42225-148 = "What would you do?"
42225-152 = "[ns] \"...I'd go to sleep. Then, tomorrow would come.\""
42225-153 = "...Tomorrow?"
42225-154 = "How would that make a difference?"
42225-155 = "History would just repeat itself."
42225-156 = "Obsolete weapons should be scrapped, not saved for the next day."
42225-157 = "[ns3] \"But you're not a tool. You've never been a tool.\" \n[ns4] \"The great thing about people is, they can always do better next time.\""
42225-160 = "Next time...?"
42225-161 = "After everything we've done... Is there even a remote possibility of a second chance?"
42225-162 = "[s] \"Always.\""
42225-167 = "[ns5] \"If you don't know something, you learn about it...\" \n[ns6] \"If you feel stuck, you ask for help getting out...\" \n[ns7] \"If you're struggling, you lean on those around you...\""
42225-171 = "[ns8] \"Until you become an adult and can take full responsibility...\"\n[ns9] \"The people around you will help shoulder it.\""
42225-175 = "Until I do..."
42225-179 = "...We still have a lot of growing up to do, don't we?"
42225-187 = "Ugh, Saki got me again! That was definitely on purpose!"
42225-188 = "That's why I told you to add another layer of ballistic plating on your chest."
42225-189 = "But it’s hard to breathe with that extra layer, especially in combat..."
42225-190 = "...Not like there’s much there to protect anyway."
42225-191 = "Sh-Shut up!"
42225-196 = "...So you failed, FOX 1."
42225-197 = "I did."
42225-198 = "Is Sensei as weird as they say?"
42225-199 = "As weird as they come."
42225-205 = "But I think with an adult like Sensei around, we might be okay."
42225-213 = "This is our loss, Squad Leader Tsukiyuki."
42225-214 = "FOX Squad is officially waving the white flag."
42225-215 = "We're putting our faith in you..."
42225-217 = "Prove to us we didn't make the wrong decision in choosing tomorrow."
42225-219 = "Next Episode; Failed Coup"

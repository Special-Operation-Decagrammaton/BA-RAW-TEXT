[translation]
42225-6 = "くっ……"
42225-10 = "（爆発の衝撃で起爆装置が……）"
42225-16 = "[ns1] \"……捕まえた。\"\n[ns2] \"起爆装置は私が確保した！\""
42225-19 = "了解！"
42225-20 = "どこを見ている、[ruby=つきゆき]月雪[/ruby]小隊長？"
42225-22 = "相手はこっちだ！"
42225-37 = "うっ……！"
42225-41 = "相変わらず隙だらけだな。#nSRTの試験だったら、今のは減点対象だ。"
42225-45 = "……試験だったら、そうでしょうね。"
42225-46 = "でも、ここは試験場ではない現実で……"
42225-47 = "現実では――どんな時でも、正義が勝つものですから！"
42225-48 = "現実では、どんな時でも正義が勝つ……？"
42225-49 = "そんなに世の中の道理が単純だったら、問題がここまで大きくなることはなかった。"
42225-50 = "現実はいつだって……期待を裏切っていく。"
42225-55 = "FOXTROT……"
42225-60 = "（この音、まさか閃光弾を――）"
42225-62 = "……はぁっ！"
42225-71 = "……先輩の言う通りですね。"
42225-72 = "手を引く前に頭で突き飛ばしたら、反応速度を0.5秒早められました。"
42225-76 = "武装解除をお願いします、FOX1。"
42225-77 = "はぁ……。"
42225-78 = "あんなに良い後輩だったのに、どうして今回は私の言葉を信じてくれないのか。"
42225-79 = "……どういうことですか？"
42225-85 = "オペレーションルームに入ったら弾頭を起爆させるという脅し。"
42225-86 = "それはただのブラフではない。"
42225-87 = "私は、本当に命を捨てる覚悟でここに残っていたというのに……"
42225-88 = "貴官は一体、何を考えて作戦を強行したんだ？"
42225-93 = "先輩が、私たちを見捨てる選択をするはずがないと信じていました。"
42225-94 = "自らの手を汚してまでSRT特殊学園を復活させようとするのは、後輩のためだと――以前、先輩が言ったんですよ。"
42225-95 = "現実に諦観を持ち、未来にすべてを賭けて――自らの命さえも投げ打てるような人が……"
42225-96 = "SRTの明日を担う後輩を見捨てるとは思えませんから。"
42225-101 = "……私は、君たちが見る甘い夢を覚まし、社会の闇を教えた。"
42225-102 = "名誉ある敗北より、卑劣な勝利の方が良いのだと、そう何度も強調してきた。"
42225-103 = "それなのに――私を信じるのか？"
42225-104 = "先輩は、前に言いましたよね。"
42225-107 = "SRTの正義は、いかなる状況でも決して揺らがない、と――"
42225-108 = "陰鬱な現実の埃を被って、自ら放っていた光を失うことになったとしても……"
42225-111 = "正義が抱いている、本来の価値や意味まで色褪せることは決してありません。"
42225-112 = "先輩たちは私たちの夢、そして未来でした。"
42225-115 = "[ruby=FOX小隊]未来[/ruby]を信じられなかったら……この道を選ぶこともなかったでしょう。"
42225-117 = "ですから……逃げずに私たちの前を歩いてください。#n――ユキノ先輩。"
42225-122 = "私は……あまりにも遠回りをしすぎた。"
42225-123 = "私たちは、元から自分たちの背負える責任よりも大きな力を振るうように設計された組織だった。"
42225-124 = "連邦生徒会長が行方不明になって以来、ずっとこの力の責任を負う人を探してきた。"
42225-125 = "そのまま手放せば、何もかもが解決されるのに……私たちは他人から受け継いだ権威の名を惜しみ、その力を手放せなかった。"
42225-126 = "挙げ句の果てに向き合ったのが、過去の影とは……運命とは皮肉なものだ。"
42225-130 = "月雪小隊長。残念ながら――この弾頭はここで起爆しなければならない。"
42225-131 = "過去の責任を、過去のSRTと共に。#nこの[ruby=アビス]深淵[/ruby]に埋めてしまうために――"
42225-132 = "だから……お願いだ、ここから離れてくれ。"
42225-134 = "先輩……！"
42225-139 = "[ns] \"……大人にも、責任を受け入れ難い瞬間というのはあるよ。\""
42225-141 = "[ns] \"でも、責任から逃げてはいけない。\""
42225-144 = "……[USERNAME]先生。"
42225-145 = "先生は、私たちの事など理解できないでしょう。"
42225-146 = "先生はご自身の力も、責任も――すべて背負える[ruby=・   ・]大人[/ruby]なのですから。"
42225-147 = "もし先生が、私たちのように背負いきれない責任と直面したら……"
42225-148 = "その時は、どのような選択をされますか？"
42225-152 = "[ns] \"……明日を待つよ。\""
42225-153 = "……明日？"
42225-154 = "明日が来たとして……それで一体何が変わるのでしょうか？"
42225-155 = "過ちは繰り返され、結果は何も変わりません。"
42225-156 = "一度用を成さなくなった武器は、廃棄されて当然なのです。"
42225-157 = "[ns3] \"でも君たちは武器じゃない、生徒だよ。\"\n[ns4] \"だから、次はもっと上手くできる。\""
42225-160 = "次……？"
42225-161 = "先生は、私たちに次があると思っているのですか？"
42225-162 = "[s] \"もちろん。\""
42225-167 = "[ns5] \"分からない所があれば、学べばいい……\"\n[ns6] \"困ったことがあったら、手を伸ばして……\"\n[ns7] \"辛い時は支え合って……\""
42225-171 = "[ns8] \"そうやって成長して、大人になったら。\"\n[ns9] \"その時に改めて、責任を負えばいい。\""
42225-175 = "大人に、なったら……"
42225-179 = "……私たちは……大人じゃ、なかったんだな。"
42225-187 = "いたたっ……サキ、あいつまたお腹に撃ったわね！#n今回は絶対わざとよ！もう！"
42225-188 = "だから胸に防弾板1個くらい当てておけって言ったじゃん。"
42225-189 = "でも、作戦中に防弾板を着けたら、胸が圧迫されて呼吸が苦しくなるの……"
42225-190 = "……そんなに大したことないくせに。"
42225-191 = "うるさいっ！"
42225-196 = "……結局失敗したんだね、FOX1。"
42225-197 = "……ああ、失敗した。"
42225-198 = "……噂通り、変な大人だったね。"
42225-199 = "そうだな。本当に、変な大人……"
42225-205 = "……だが、こんな大人がいるのなら……#n安心して「今日」を終えることができそうだ。"
42225-213 = "私たちの負けだ、月雪小隊長。"
42225-214 = "FOX小隊は、降参する。"
42225-215 = "……昨日の私たちが間違った選択をしなかったと――"
42225-217 = "――どうか、君たちの手で証明してくれ。"
42225-219 = "次回;失敗したクーデター"

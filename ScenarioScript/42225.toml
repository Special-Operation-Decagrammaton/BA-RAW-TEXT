[translation]
42225-6 = "อึก..."
42225-10 = "(แรงกระแทกทำให้อุปกรณ์จุดระเบิด..)"
42225-16 = "[ns1] \"...คว้าไว้ได้แล้ว!\"\n[ns2] \"ครูได้อุปกรณ์จุดระเบิดมาแล้ว!\""
42225-19 = "รับทราบ!"
42225-20 = "มัวหันไปทางไหนน่ะ หัวหน้ากองสึคิยูกิ?"
42225-22 = "ฝ่ายตรงข้ามอยู่ทางนี้นะ!"
42225-37 = "อึก..."
42225-41 = "ยังมีช่องโหว่เหมือนเดิมเลยสินะ ถ้าเป็นการสอบของ SRT คงโดนหักคะแนนไปแล้ว"
42225-45 = "...ถ้าเป็นการสอบ ก็คงอย่างนั้นค่ะ"
42225-46 = "แต่ที่นี่ไม่ใช่สนามสอบ แต่เป็นสนามต่อสู้แห่งความเป็นจริง..."
42225-47 = "และในความเป็นจริง ความยุติธรรมก็เอาชนะได้ทุกเมื่อค่ะ!"
42225-48 = "ในความเป็นจริง ความยุติธรรมเอาชนะได้ทุกเมื่องั้นเหรอ...?"
42225-49 = "ถ้าตรรกะในโลกมันเรียบง่ายขนาดนั้น มันคงไม่เกิดปัญหามาถึงตรงจุดๆ นี้หรอก"
42225-50 = "แท้จริงแล้วความเป็นจริงน่ะ... ทรยศความคาดหวังเสมอต่างหาก"
42225-55 = "ฟ็อกซ์ทรอต..."
42225-60 = "(เสียงนี้มัน หรือว่าจะเป็นระเบิดแสง...!)"
42225-62 = "... แล้วก็อีกอย่าง!"
42225-71 = "... รุ่นพี่พูดถูกด้วยละค่ะ"
42225-72 = "เพราะเมื่อใช้หัวกระแทกก่อนที่จะดึงมือออก ก็ลดความเร็วตอบสนองได้ 0.5 วินาทีเลยค่ะ"
42225-76 = "ช่วยปลดอาวุธด้วยค่ะ FOX 1"
42225-77 = "เฮ้อ..."
42225-78 = "ปกติเธอเป็นรุ่นน้องที่เชื่อฟังรุ่นพี่มาตลอด แล้วทำไมครั้งนี้ถึงไม่ยอมฟังกันนะ"
42225-79 = "... หมายความว่ายังไงเหรอคะ?"
42225-85 = "ที่ฉันบอกว่าถ้าเข้ามาในห้องปฏิบัติการแล้วฉันจะระเบิดหัวรบไง"
42225-86 = "ฉันไม่ได้พูดขู่ไปเรื่อยหรอกนะ"
42225-87 = "ที่ฉันยังอยู่ตรงนี้ เพราะฉันเตรียมใจไว้แล้วว่าจะสละชีวิต..."
42225-88 = "นี่เธอคิดอะไรอยู่กันแน่ ถึงได้คิดทำปฏิบัติการนี้?"
42225-93 = "ก็เพราะว่าฉันไม่คิดว่าพวกรุ่นพี่จะทำให้พวกฉันตายจริงๆ ยังไงล่ะคะ"
42225-94 = "รุ่นพี่เคยบอกไว้นี่คะ ว่าต่อให้มือของตัวเองต้องแปดเปื้อน แต่การฟื้นฟูสถาบัน SRT กลับมาก็เป็น#nการทำเพื่อเด็กๆ รุ่นหลัง"
42225-95 = "รุ่นพี่ที่ล้มเลิกความตั้งใจในความเป็นจริง ฝากทุกความคาดหวังไว้กับอนาคตและสละชีวิตของตัวเอง..."
42225-96 = "ฉันไม่เชื่อว่ารุ่นพี่คนนี้จะสังหารรุ่นน้องที่เป็นอนาคตของ SRT ได้ลงคอหรอกค่ะ"
42225-101 = "... ฉันเป็นคนสาดความขมลงบนความฝันที่แสนหวานของพวกเธอ และสอนให้เห็นความมืดมนของ#nสังคมแท้ๆ"
42225-102 = "แล้วก็ย้ำครั้งแล้วครั้งเล่าว่าชัยชนะที่สกปรกยังดีกว่าความพ่ายแพ้ที่มีเกียรติ"
42225-103 = "แต่ถึงอย่างนั้น... เธอก็ยังเชื่อใจฉันเหรอ?"
42225-104 = "รุ่นพี่เคยบอกไว้นี่คะ"
42225-107 = "ว่าความยุติธรรมของ SRT จะไม่เปลี่ยนแปลงไปไม่ว่าจะในสถานการณ์ไหนก็ตาม"
42225-108 = "ถึงแม้จะถูกปกคลุมด้วยฝุ่นละอองจากลมมรสุมแห่งความวุ่นวายของโลก และสูญเสียแสงที่เปล่งออกมา..."
42225-111 = "แต่คุณค่าและความหมายเดิมของความยุติธรรมจะไม่จางหายไปค่ะ"
42225-112 = "พวกรุ่นพี่เป็นทั้งความฝันและอนาคตของพวกฉันนะคะ"
42225-115 = "หากพวกฉันไม่เชื่อใน[ruby=กองทหาร FOX]อนาคต[/ruby]... พวกฉันก็คงไม่เลือกเส้นทางนี้ตั้งแต่แรกหรอกค่ะ"
42225-117 = "เพราะฉะนั้น... ขออย่าได้หนีไปต่อหน้าพวกฉันเลยนะคะ รุ่นพี่ยูกิโนะ"
42225-122 = "... เรามากันไกลมากแล้ว"
42225-123 = "พวกเราเป็นกลุ่มที่ถูกตั้งขึ้นมาให้ใช้พลังมากกว่าที่จะรับผิดชอบตัวเอง"
42225-124 = "หลังจากประธานองค์การนักเรียนหายไป พวกเราก็เอาแต่หาคนที่จะมารับผิดชอบพลังนี้"
42225-125 = "ถ้าปล่อยไว้อย่างนั้น ทุกอย่างก็คงจะคลี่คลายไปแล้ว... แต่เราก็เสียดายชื่อแห่งอำนาจที่ได้รับมาจาก#nคนอื่น จนไม่สามารถละทิ้งพลังนี้ได้"
42225-126 = "สุดท้ายแล้วสิ่งที่เราเจอก็คือเงาในอดีต... โชคชะตาเล่นตลกกับเราจริงๆ"
42225-130 = "หัวหน้ากองสึคิยูกิ ฉันเสียใจด้วยนะ แต่ฉันต้องระเบิดหัวรบนี้ที่นี่"
42225-131 = "นั่นก็เพื่อฝังความรับผิดชอบในอดีตลงในห้วงลึกนี้ไปพร้อมกับ SRT ในอดีต"
42225-132 = "เพราะฉะนั้น... พวกเธอออกไปจากที่นี่เถอะ ขอร้องละ"
42225-134 = "รุ่นพี่...!"
42225-139 = "[ns] \"... บางครั้งผู้ใหญ่ก็มีช่วงเวลาที่ยอมรับความรับผิดชอบกันลำบากอยู่นะ\""
42225-141 = "[ns] \"แต่ยังไงก็ไม่ควรวิ่งหนีความรับผิดชอบเด็ดขาด\""
42225-144 = "... คุณครู [USERNAME]"
42225-145 = "คุณครูคงไม่เข้าใจพวกฉันหรอกค่ะ"
42225-146 = "คุณครูคือผู้ใหญ่ที่จัดการอำนาจและความรับผิดชอบทั้งหมดของตัวเองได้นี่คะ"
42225-147 = "ถ้าคุณครูต้องเผชิญกับความรับผิดชอบที่เกินจะรับไหวเหมือนที่พวกฉันเจอละก็..."
42225-148 = "คุณครูจะเลือกทางไหนเหรอคะ?"
42225-152 = "[ns] \"...ครูเลือกที่จะนอน แล้วปล่อยให้มันเป็นเรื่องของวันพรุ่งนี้\""
42225-153 = "... วันพรุ่งนี้?"
42225-154 = "ถึงจะมีวันพรุ่งนี้ แล้วจะต่างออกไปยังไงเหรอคะ?"
42225-155 = "ความผิดพลาดยังคงเกิดขึ้นซ้ำแล้วซ้ำเล่า และผลลัพธ์ก็ไม่ได้เปลี่ยนแปลงไปด้วยค่ะ"
42225-156 = "อาวุธที่ไร้ประโยชน์ก็ต้องถูกทิ้งสิคะ"
42225-157 = "[ns3] \"แต่พวกเธอไม่ใช่อาวุธ พวกเธอคือนักเรียน\"\n[ns4] \"ต่อไปจะต้องทำได้ดีแน่นอน\""
42225-160 = "ต่อไปเหรอคะ...?"
42225-161 = "คุณครูคิดว่าพวกฉันยังมีโอกาสครั้งต่อไปอีกเหรอคะ?"
42225-162 = "[s] \"แน่นอนอยู่แล้ว\""
42225-167 = "[ns5] \"ถ้าไม่รู้อะไร ก็แค่เรียนรู้ใหม่...\"\n[ns6] \"ถ้ามีเรื่องยากๆ ก็ยื่นมือให้แก่กัน...\"\n[ns7] \"ในตอนที่ยากลำบาก ก็พึ่งพาซึ่งกันและกัน...\""
42225-171 = "[ns8] \"และเมื่อโตขึ้นมาเป็นผู้ใหญ่\"\n[ns9] \"ถึงตอนนั้นก็ค่อยรับผิดชอบก็ได้\""
42225-175 = "และเมื่อโตขึ้นเป็นผู้ใหญ่..."
42225-179 = "... ตอนนี้เรายังไม่ใช่ผู้ใหญ่สินะ"
42225-187 = "โอย... ยัยซากิตัวดียิงท้องฉันอีกแล้ว! รู้นะว่าคราวนี้ตั้งใจน่ะ!"
42225-188 = "ก็บอกแล้วไงว่าให้ใส่เกราะกันกระสุนที่หน้าอกไว้"
42225-189 = "แต่ถ้าสวมเกราะกันกระสุนระหว่างปฏิบัติการ มันจะกดหน้าอกจนหายใจลำบากนะ..."
42225-190 = "... ก็ไม่เห็นจะกดอะไรเลยนี่นา"
42225-191 = "หนวกหูน่า!"
42225-196 = "... สุดท้ายก็ล้มเหลวสินะ FOX 1"
42225-197 = "... ใช่ ฉันทำไม่สำเร็จ"
42225-198 = "... เป็นผู้ใหญ่ที่แปลกสมคำร่ำลือเลยใช่ไหมล่ะ?"
42225-199 = "นั่นสินะ แปลกคนจริงๆ..."
42225-205 = "... แต่ถ้ามีผู้ใหญ่แบบนี้ ก็น่าจะปิดงานของ 'วันนี้' ได้อย่างสบายใจแหละเนอะ"
42225-213 = "เราแพ้แล้ว หัวหน้ากองสึคิยูกิ"
42225-214 = "กองทหาร FOX ยอมจำนน"
42225-215 = "... ช่วยพิสูจน์ด้วยมือของพวกเธอให้ทีนะ"
42225-217 = "ว่าพวกเราในวันวานไม่ได้เลือกทางที่ผิด"
42225-219 = "ตอนต่อไป;การยึดอำนาจที่ล้มเหลว"

[translation]
42225-6 = "唔……"
42225-10 = "（自爆裝置因為爆炸的衝擊……）"
42225-16 = "[ns1]「……抓到了！」\n[ns2]「我拿到引爆裝置了！」"
42225-19 = "了解！"
42225-20 = "你在看哪裡，月雪小隊長？"
42225-22 = "你的對手是我！"
42225-37 = "唔……！"
42225-41 = "你還是一樣破綻百出啊。#n如果這是SRT的考試，剛才那樣會被扣分的。"
42225-45 = "……如果是考試的話可能會吧。"
42225-46 = "不過這裡不是測驗場，而是現實……"
42225-47 = "在現實中──正義永遠都會戰勝邪惡！"
42225-48 = "在現實中，正義永遠都會戰勝邪惡……？"
42225-49 = "要是世上的道理真的這麼單純的話，問題就不會演變到這個地步了。"
42225-50 = "現實永遠……只會背叛人們的期待。"
42225-55 = "FOXTROT……"
42225-60 = "（這個聲音，難道是閃光彈──）"
42225-62 = "……哈啊！"
42225-71 = "……前輩說的沒錯呢。"
42225-72 = "如果在拉手之前先用頭撞的話，反應速度可以減少0.5秒。"
42225-76 = "請你解除武裝，FOX1。"
42225-77 = "唉……"
42225-78 = "你明明是那麼優秀的後輩，為什麼這次卻不願意相信我呢？"
42225-79 = "……你指的是什麼意思？"
42225-85 = "剛才說你們要是踏進控制室就要引爆彈頭的威脅。"
42225-86 = "可不只是在虛張聲勢。"
42225-87 = "我是真的做好了犧牲性命的覺悟才留在這裡的……"
42225-88 = "你為什麼執意要強行完成這次的作戰呢？"
42225-93 = "因為我相信前輩不可能做出捨棄我們的選擇。"
42225-94 = "不惜弄髒自己的雙手也要讓SRT特殊學園復活的原因，是為了後輩們──#n前輩曾經這麼說過。"
42225-95 = "一個對現實不抱希望，將一切連同自己的性命賭在明天之上的人……"
42225-96 = "我實在不認為他會捨棄承擔SRT明天的後輩。"
42225-101 = "……我一直在打醒你們所做的白日夢，教導你們社會的黑暗。"
42225-102 = "還不停強調卑鄙的勝利比光榮的失敗來得好。"
42225-103 = "即便如此──你們還是相信我嗎？"
42225-104 = "前輩曾經這麼說過。"
42225-107 = "SRT的正義，面對任何情況都絕對不會動搖──"
42225-108 = "即使因為憂鬱的現實蒙上了灰，失去了自身綻放的光彩……"
42225-111 = "正義本身所代表的價值和意義也絕對不會褪色。"
42225-112 = "前輩既是我們的夢想，也是我們的未來。"
42225-115 = "如果不相信[ruby=FOX小隊]未來[/ruby]的話……我們一開始就不會踏上這條路了。"
42225-117 = "所以……請不要逃走，繼續走在我們的前方吧。#n──雪乃前輩。"
42225-122 = "我……實在繞得太遠了。"
42225-123 = "我們打從一開始，就是為了施展比能背負的責任更大的力量而被設計出來的組織。"
42225-124 = "自從聯邦學生會長下落不明之後，就一直在尋找能夠背負這份力量的責任的人。"
42225-125 = "明明只要就這麼放手，一切都會迎刃而解……#n我們卻貪戀這從他人手中得來的權威之名，沒能放棄這股力量。"
42225-126 = "沒想到我們最終要面對的，竟是過去的陰影……命運還真是諷刺啊。"
42225-130 = "月雪小隊長。#n很遺憾──這枚彈頭必須在這裡引爆。"
42225-131 = "為了將過去的責任和過去的SRT一同埋葬在這個[ruby=Abyss]深淵[/ruby]──"
42225-132 = "所以……拜託你們離開這裡吧。"
42225-134 = "前輩……！"
42225-139 = "[ns]「……就算是大人，也會有不想承擔責任的時候。」"
42225-141 = "[ns]「但是，不可以逃避責任。」"
42225-144 = "……[USERNAME]老師。"
42225-145 = "老師是無法體會我們的心情的吧。"
42225-146 = "因為老師是能夠背負自己的力量與責任──背負一切的[ruby= ・     ・ ]大人[/ruby]。"
42225-147 = "如果老師也像我們一樣面對難以承擔的責任……"
42225-148 = "那個時候，你會做出什麼選擇呢？"
42225-152 = "[ns]「……我會等待明天的到來。」"
42225-153 = "……明天？"
42225-154 = "就算到了明天……究竟又會有什麼改變呢？"
42225-155 = "只會不斷重複相同的錯誤，迎接相同的結果。"
42225-156 = "武器一旦沒達成任務，遭到廢棄也是當然的。"
42225-157 = "[ns3]「可是你們並不是武器，而是學生。」\n[ns4]「所以下次一定會做得更好的。」"
42225-160 = "下次……？"
42225-161 = "老師認為我們還有下次機會嗎？"
42225-162 = "[s]「那當然。」"
42225-167 = "[ns5]「如果有不會的東西，只要去學就行了……」\n[ns6]「假如遇到了困難，就伸手求助……」\n[ns7]「痛苦的時候就互相支持……」"
42225-171 = "[ns8]「像這樣逐漸成長，直到成為大人。」\n[ns9]「到時候再來背負責任就行了。」"
42225-175 = "直到，成為大人……"
42225-179 = "……我們……還不算是大人啊。"
42225-187 = "痛痛痛……咲希那傢伙又朝我的肚子開槍！#n這次絕對是故意的吧！"
42225-188 = "所以我不是跟你說過至少要在胸前塞一塊防彈板嗎？"
42225-189 = "可是在作戰時穿著防彈板的話，胸部會受到壓迫導致呼吸困難……"
42225-190 = "……明明也沒多大吧。"
42225-191 = "吵死了！"
42225-196 = "……結果還是失敗了呢，FOX1。"
42225-197 = "……啊啊，我們失敗了。"
42225-198 = "……跟傳聞一樣，是個奇怪的大人呢。"
42225-199 = "就是啊。#n真的是個奇怪的大人……"
42225-205 = "……不過，如果有這種大人在的話……#n我們似乎就能安心地結束「今天」了。"
42225-213 = "是我們輸了，月雪小隊長。"
42225-214 = "FOX小隊在此投降。"
42225-215 = "……昨天的我們沒有做出錯誤的選擇──"
42225-217 = "──就由你們親手證明吧。"
42225-219 = "下一話;失敗的政變"

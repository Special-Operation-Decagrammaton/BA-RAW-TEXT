[translation]
52190-1 = "第19話;彼岸的記憶"
52190-5 = "沿著這個方向走，真的能到達黃昏寺院嗎？"
52190-6 = "……嗯，沒錯。"
52190-7 = "即使是這片不具色彩、彷彿一切都被凍結的雪原之中，仍然存在能作為路標的指引。"
52190-8 = "過度生長的灌木、結冰的河流，以及更遠處的丘陵……"
52190-9 = "沒錯，這些就是我回程途中曾經看見的痕跡。"
52190-10 = "名草醬那過度敏銳的記憶力，在這種時候還算有點用處呢。"
52190-11 = "那就趕快前往黃昏寺院吧？"
52190-18 = "……這傢伙是吃錯藥了嗎？"
52190-19 = "不只突然把我們放了，還做出這種莫名其妙的舉動。"
52190-20 = "雖然不清楚他在打什麼主意，但花鳥風月部的行動絕對不能信任。"
52190-21 = "無論表面上看起來如何，他心裡肯定還是盤算著該如何玩弄我們。"
52190-22 = "小女子也有同感。#n明明之前對名草前輩說了那麼多難聽的話，現在卻說要幫忙……我實在無法信任。"
52190-23 = "不過……從他的語氣聽來，#n這次行動似乎是棕櫚他瞞著其他花鳥風月部成員擅自做的決定。"
52190-24 = "或許我們能趁機擺脫花鳥風月部的監視也說不定。"
52190-25 = "咦～？難道你們打算趁機逃跑嗎～？"
52190-26 = "還是別打這種歪主意了吧。#n就算你們的腳程再快，也不可能甩開我的視線。"
52190-27 = "而且，只要你們露出一點可疑的舉動……#n這把槍的槍口會瞄準老師的哪個部位，我可不敢保證哦？"
52190-28 = "這種根本不成立的威脅……"
52190-30 = "[ns]「咦，原來我是人質嗎？」"
52190-31 = "……啊？那還用問嗎？"
52190-32 = "明明擁有能憑一句話就讓奇普托斯的學生們行動的強大力量，#n身體卻脆弱到連一顆子彈都承受不了……誰不會把你當成目標呢？"
52190-33 = "然而你卻還是為了學生的事，像飛蛾撲火一樣衝進危險之中，真是無謀至極……"
52190-46 = "……實在讓人無法理解。"
52190-47 = "[s]「要不要保護別人，與自身的強弱無關。」"
52190-48 = "唉，又是這種詭辯……這兩件事怎麼可能無關呢。"
52190-49 = "連自己都保護不了的弱者，在強者面前究竟能得到什麼？#n自以為能保護強者卻只能狼狽倒下的話，不就什麼都不剩了嗎？"
52190-50 = "你的行為不只缺乏合理性，根本違反常識了好嗎？"
52190-51 = "[s1]「我之前也說過，在看到陷入危險的孩子時，身體就會先動起來。」\n[s2]「根本不必考慮是否合理、是否合乎常識。」\n[s3]「這是身而為人理所當然的事。」"
52190-55 = "……理所當然？"
52190-56 = "那種事……"
52190-57 = "怎麼可能會理所當然！"
52190-61 = "哈啊，哈啊……"
52190-62 = "在無謂的話題上浪費太多時間了。"
52190-63 = "快點前往黃昏寺院吧。#n我再強調一次，你們可絕對不要有想逃跑的主意啊？"

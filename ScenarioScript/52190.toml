52190-47 = "[s] \"사람을 지키는 데 자신의 강함은 상관없어.\""
52190-48 = "3;슈로;23;하아, 또 궤변인가요. 상관없을 리가 없잖아요.\n#3;em;[한숨]"
52190-49 = "3;슈로;05;자신의 몸도 지키지 못하는 약자가 강자 앞에 나서서 무엇을 얻을 수 있죠? 오히려 강자를 지킨답시고 나섰다가, 꼴사납게 무너지면 아무것도 남지 않을 텐데요."
52190-50 = "3;슈로;06;당신의 행동에는 핍진성이 결여되어 있어요. 상식적으로 말이 안 되는 행동이라고요."
52190-51 = "[s1] \"전에도 이야기했지만, 위험에 처한 아이를 보고 몸이 움직이는 건.\"\n[s2] \"합리적인지, 상식적인지, 생각하기 이전에.\"\n[s3] \"사람으로서 당연히 해야 하는 일이야.\""

[translation]
52190-1 = "ตอนที่ 19;ความทรงจำแห่งนิพพาน"
52190-5 = "สรุปว่าถ้าเดินไปทางนี้ ก็จะถึงวิหารอัสดงได้จริงเหรอคะ?"
52190-6 = "อื้อ... ไม่ผิดแน่นอน"
52190-7 = "ต่อให้พวกเราอยู่ในทุ่งหิมะขาวโพลนที่ทุกๆ อย่างเป็นน้ำแข็งไปหมด แต่ว่ามันก็ยังมีจุดสังเกตที่ใช้#nเป็นสิ่งนำทางได้"
52190-8 = "ทั้งพุ่มไม้หนา แม่น้ำที่เป็นน้ำแข็ง และเนินเขาที่อยู่ข้างหลัง..."
52190-9 = "ใช่แล้วละ นี่คือร่องรอยที่ฉันพบเจอระหว่างทางเมื่อครั้งนั้น"
52190-10 = "ถึงจะเป็นคนที่มีความสามารถในการจำอย่างละเอียดแต่ไร้ประโยชน์ พอในเวลาแบบนี้แล้วมันก็ช่วยได้อยู่บ้างนะคะ"
52190-11 = "เอาละ งั้นเรารีบไปวิหารอัสดงกันเลยค่ะ"
52190-18 = "ยัยนั่นกินอะไรผิดไปหรือเปล่า...?"
52190-19 = "จู่ๆ ก็ปล่อยพวกเราไปและเริ่มทำอะไรแปลกๆ"
52190-20 = "ฉันก็ไม่รู้ว่ายัยนั่นมีแผนอะไร แต่การกระทำของชมรมความงามของธรรมชาติน่ะเชื่อถือไม่ได้อยู่แล้ว"
52190-21 = "ต่อให้ภายนอกดูใสซื่อ แต่ที่จริงยัยนั่นต้องวางแผนให้พวกเราเจอปัญหาอะไรอยู่แน่"
52190-22 = "ข้าก็เห็นด้วยเจ้าค่ะ ที่ผ่านมาเอาแต่พูดจาไม่ดีกับรุ่นพี่นางุสะ แต่ตอนนี้กลับมาช่วยกันเฉยเลย จู่ๆ เปลี่ยนจากหน้ามือเป็นหลังมือแบบนี้ เชื่อถือไม่ได้หรอกเจ้าค่ะ"
52190-23 = "แต่ดูจากการพูดแล้ว... ดูเหมือนว่าครั้งนี้ชูโระตั้งใจไม่บอกสมาชิกชมรมความงามของธรรมชาติ#nแล้วคิดทำเรื่องนี้เองคนเดียวนะ"
52190-24 = "บางทีเธออาจใช้โอกาสนี้เพื่อหลบเลี่ยงการจับตาดูของชมรมความงามของธรรมชาติก็ได้"
52190-25 = "เอ๋~? คิดจะใช้โอกาสที่ได้ออกมาข้างนอกแล้ววางแผนหนีฉันเหรอคะ?"
52190-26 = "อย่าคิดทำอะไรเหลวไหลเลยค่ะ เพราะต่อให้ฝีเท้าของพวกคุณจะเร็วแค่ไหน แต่ก็หลุดพ้นจากสายตา#nของฉันไม่ได้หรอกค่ะ"
52190-27 = "ถ้าฉันสังเกตได้ว่าพวกคุณคิดทำอะไรแปลกๆ ฉันอาจจะเล็งปืนไปที่คุณครูก็ได้นะคะ"
52190-28 = "อย่ามาข่มขู่อะไรไร้สาระไปหน่อยเลย..."
52190-30 = "[ns] \"เอ๋ ตกลงครูเป็นตัวประกันเหรอ?\""
52190-31 = "ก็ใช่น่ะสิคะ ถามมาได้...?"
52190-32 = "ต่อให้คุณครูมีพลังมหาศาลขนาดที่สั่งการนักเรียนในคิโวทอสได้ด้วยคำเพียงคำเดียว แต่ร่างกายกลับ#nอ่อนแอมากเสียจนทนกระสุนนัดเดียวไม่ได้ แบบนี้ไม่ว่าใครก็อยากได้คุณเป็นเป้าหมายทั้งนั้นละค่ะ"
52190-33 = "เป็นคนที่แค่โดนยิงนัดเดียวก็ร่วงแท้ๆ แต่ถ้าเป็นเรื่องของนักเรียนก็ยอมเสี่ยงอันตราย เหมือนผีเสื้อกลางคืนที่กล้าบินเข้ากองไฟ..."
52190-46 = "ฉันละไม่เข้าใจเลยจริงๆ..."
52190-47 = "[s] \"ขีดจำกัดของคนเราน่ะมันไม่สำคัญหรอกนะถ้าเราอยากจะปกป้องใคร\""
52190-48 = "เฮ้อ คารมคมคายอีกแล้ว มันจะไม่เกี่ยวกันได้ยังไงล่ะคะ"
52190-49 = "คนที่อ่อนแอจนปกป้องตัวเองไม่ได้จะไปปกป้องคนอื่นที่แข็งแกร่งกว่าได้เหรอคะ? ตัวเองต่างหากที่จะล้มลงอย่างน่าสมเพชต่อหน้าคนที่ตัวเองอยากปกป้องน่ะ"
52190-50 = "การกระทำของคุณมันไม่สมเหตุสมผลค่ะ ใช้ตรรกะอะไรมาคิดก็ไม่รู้"
52190-51 = "[s1] \"การเห็นเด็กที่ตกอยู่ในอันตรายแล้วเข้าไปช่วยทันทีน่ะ\"\n[s2] \"คนคนนั้นไม่คิดหรอกว่ามันสมเหตุสมผลหรือเปล่า\"\n[s3] \"เพราะการเข้าไปช่วยเป็นสิ่งแรกที่มนุษย์ควรทำอยู่แล้ว\""
52190-55 = "งั้นเหรอ...? ควรทำอยู่แล้วงั้นเหรอ...?"
52190-56 = "เรื่องนั้น... เรื่องแบบนั้นน่ะ..."
52190-57 = "มันจะเป็นแบบนั้นไปได้ยังไง!"
52190-61 = "แฮ่ก... แฮ่ก..."
52190-62 = "พูดเรื่องไร้สาระจนทำฉันเสียเวลาไปมากพอแล้วค่ะ"
52190-63 = "รีบไปวิหารอัสดงกันเถอะ ขอย้ำอีกครั้งนะคะว่าอย่าคิดหนีจะดีกว่า"

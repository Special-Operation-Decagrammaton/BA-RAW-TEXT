52190-4 = "3;나구사ND;12\n#3;a\n#wait;1200"
52190-5 = "2;슈로;01;그래서, 이 방향으로 가면 황혼의 사원에 도달할 수 있다는 게 정말이죠?\n#2;a\n#3;m4\n#2;em;[음표]"
52190-6 = "3;나구사ND;12;……응. 틀림없어."
52190-7 = "3;나구사ND;02;특별한 색 하나 없이 모든 것이 얼어붙은 듯한 설원 속에도, 길잡이가 될 수 있는 지표는 존재하니까."
52190-8 = "3;나구사ND;01;이 웃자란 관목과 얼어붙은 강, 그리고 그 너머로 보이는 언덕……"
52190-9 = "3;나구사ND;12;맞아. 분명 그때 돌아가는 길에 마주한 흔적들이야."
52190-10 = "2;슈로;13;쓸데없이 예민하기만 한 나구사의 기억력도 이럴 때만큼은 도움이 되네요.\n#2;em;[재잘]\n#fontsize;50"
52190-11 = "2;슈로;14;자, 그럼 어서 황혼의 사원으로 가 볼까요?"
52190-12 = "#st;[0,0];instant;1;"
52190-13 = "#clearST"
52190-14 = "3;나구사ND;12\n2;슈로;14\n#2;d\n#3;d\n#2;h\n#3;h\n#wait;1000"
52190-15 = "#wait;500"
52190-16 = "#wait;2500"
52190-17 = "5;유카리;05\n1;키쿄;05\n3;렌게;05\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h\n#wait;1000"
52190-18 = "5;유카리;05\n1;키쿄;05\n3;렌게;13;……저 녀석, 갑자기 뭘 잘못 먹었나?\n#3;stiff\n#3;em;[땀]"
52190-19 = "5;유카리;05\n1;키쿄;05\n3;렌게;08;갑자기 우리를 풀어주더니, 영문 모를 행동이나 하고."
52190-20 = "1;키쿄;09;무슨 꿍꿍이인지는 알 수 없지만, 화조풍월부의 행동은 신뢰할 수 없어."
52190-21 = "1;키쿄;10;저렇게 보여도 머릿속으로는 우리를 골탕 먹일 생각으로 가득할 게 분명해."
52190-22 = "5;유카리;05;소녀도 동감이어요. 그렇게 나구사 선배에게 나쁜 말을 해왔으면서, 이제 와서 돕겠다니. 신뢰할 수 없사와요.\n#5;em;[!]"
52190-23 = "1;키쿄;02;다만…… 말투를 보아하니 이번 일은 슈로가 다른 화조풍월부 부원들에게 알리지 않고 독단으로 저지른 일처럼 보이는데."
52190-24 = "1;키쿄;05;어쩌면 기회를 노려 화조풍월부의 감시에서 도망칠 수 있을지도 몰라."
52190-25 = "3;슈로;09;어라~? 설마, 밖에 나온 틈을 타 도망칠 계획이라도 꾸미고 계신가요~?\n#3;em;[재잘]\n#1;hide\n#5;hide"
52190-26 = "3;슈로;10;허튼수작은 관두시길. 여러분의 발이 아무리 빠르다 하더라도 제 눈을 따돌릴 수는 없을 테니까요."
52190-27 = "3;슈로;20;게다가 여러분이 수상한 낌새를 보이는 순간, 제 총구가 선생님의 어디를 노릴지 모른다고요?"
52190-28 = "1;키쿄;09;그런 되지도 않는 헙박을……\n#1;em;[빠직]\n#1;ar\n#3;m5"
52190-29 = "1;키쿄;09\n3;슈로;20\n#1;h\n#3;h"
52190-30 = "[ns] \"어라, 내가 인질이었던 거야?\""
52190-31 = "3;슈로;05;……하아? 당연하잖아요.\n#1;dl\n#3;m3\n#3;em;[?]"
52190-32 = "3;슈로;10;키보토스의 학생들을 말 한 마디로 부릴 수 있을 정도로 강력한 힘을 지니고 있으면서도, 몸은 총알 하나도 이겨내지 못할 정도로 나약하니. 누구라도 당신을 목표로 삼으려 하겠죠."
52190-33 = "3;슈로;09;그렇게 나약하면서도 학생의 일이라면 불나방처럼 위험한 곳에 두려운 줄 모르고 머리를 들이미니 무모하기 짝이 없어서—"

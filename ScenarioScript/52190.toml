[translation]
52190-1 = "Episode 19;Memories from the Beyond"
52190-5 = "So, if we keep going this way, we'll really reach the Twilight Temple?"
52190-6 = "...Yes. There's no mistaking it."
52190-7 = "Even in this frozen wasteland, these landmarks are burned into my memory."
52190-8 = "The snow‑laden trees, the frozen river, and that hill beyond..."
52190-9 = "Yes. It's all identical to back then."
52190-10 = "Your weirdly good memory actually does come in handy sometimes!"
52190-11 = "All right, then hurry up! Let's get to the Twilight Temple."
52190-18 = "...What's with her? What's gotten into her?"
52190-19 = "She lets us go out of the blue and then pulls this? What's she scheming?"
52190-20 = "While I can't discern her ulterior motives, I harbor no trust for Nature's Beauty."
52190-21 = "Do not let her fool you. We are but toys in her ridiculous game."
52190-22 = "I agree. We cannot trust her after the way she spoke of Nagusa! Her outstretched hand can only be trickery."
52190-23 = "However...from what I've gleaned, it would be safe to assume that she is currently acting of her own accord."
52190-24 = "Which may open the door to our escape."
52190-25 = "Oho? Are you planning something stupid because we're outside now?"
52190-26 = "Don't even think about it. No matter how fast you think you are, I'll catch you."
52190-27 = "If you so much as have a suspicious thought, Sensei's head is going to look like a real nice place to bury a bullet."
52190-28 = "You quite enjoy spouting empty threats..."
52190-30 = "[ns] \"Oh, I was the hostage?\""
52190-31 = "...Huh? Obviously."
52190-32 = "Sure, you can command Kivotos students with a single word, but it'd take just one shot to kill you. Where else would I aim?"
52190-33 = "You're so fragile...and yet you'll dive into danger for your students' sakes like it's instinct. How absurd."
52190-46 = "...I just don't get you."
52190-47 = "[s] \"Personal limitations don't matter when it comes to protecting someone.\""
52190-48 = "*sigh*... There you go again. Of course they do."
52190-49 = "You can't even protect yourself. What do you hope to achieve, throwing yourself in front of someone stronger than you? What can you do if you're dead?"
52190-50 = "It's totally illogical. Your actions make no sense."
52190-51 = "[s1] \"Like I said, it's instinct when you see a child in danger.\" \n[s2] \"Rationality or sensibility play no role here.\" \n[s3] \"It's just what people do.\""
52190-55 = "...Why do you say that like it's obvious?"
52190-56 = "That... That's..."
52190-57 = "That's NOT OBVIOUS AT ALL!!"
52190-61 = "*huff* *puff*"
52190-62 = "We've wasted too much time on this pointless conversation."
52190-63 = "Let's get to the Twilight Temple already. And don't forget, even one thought about running and...BANG."

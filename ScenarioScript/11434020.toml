[translation]
11434020-1 = "隱藏結局;「很開心！但是……」"
11434020-12 = "……往這邊！"
11434020-13 = "哈啊……哈啊，哈啊……！哈啊……！"
11434020-14 = "呼，呼……呼……怎，怎麼會……變成這樣……"
11434020-15 = "還有力氣說話就給我跑起來！！呼，呼……！！"
11434020-21 = "哈啊，哈啊……到這裡應該就行了。"
11434020-22 = "……大家都沒事吧？有沒有人脫隊？"
11434020-26 = "這到底是什麼情況……#n雖然就結果而言是不錯……可是這也太……"
11434020-27 = "雖，雖然很開心……但是……"
11434020-28 = "這已經……超過搖滾的範疇了……"
11434020-30 = "真是的……"
11434020-36 = "……唔！！"
11434020-37 = "「你們在這裡啊！請問可以問幾個問題嗎！？」"
11434020-39 = "「能接受採訪嗎……！！」"
11434020-40 = "「請問你們樂團的名字是……！或者經紀公司的名稱也行！！」"
11434020-41 = "「你們這麼有實力，為何至今為止都不曾公開表演過呢！？大家都很好奇！」"
11434020-43 = "哇啊啊啊啊啊啊──！？"
11434020-45 = "這，這是……！"
11434020-46 = "什麼跟什麼啊……！"
11434020-47 = "肯定是有什麼誤會吧！？我們根本沒想過會變成這樣！"
11434020-48 = "那，那個！？我們真的不是什麼專業樂團！會彈的就只有這一首歌啊！？"
11434020-49 = "呵……又要寫下歷史了嗎，在試鏡當天橫空出世的天才們……"
11434020-50 = "別再說那些會害人家誤會的話了！！"
11434020-56 = "（……後來經過一番解釋之後，禮貌地回絕並返回了部室）"

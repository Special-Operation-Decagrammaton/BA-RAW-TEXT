[translation]
11434020-1 = "ตอนจบที่ซ่อนไว้;\"ก็น่าดีใจอยู่หรอก แต่ว่า...\""
11434020-12 = "ทางนี้...!"
11434020-13 = "แฮ่ก... แฮ่ก... แฮ่ก...! แฮ่ก...!"
11434020-14 = "แฮ่ก... แฮ่ก...! แฮ่ก... บะ... แบบนี้มัน... มัน..."
11434020-15 = "ถ้ามีเวลาพูดอยู่ก็เอาเวลามาวิ่งเถอะ!! แฮ่ก... แฮ่ก...!!"
11434020-21 = "แฮ่ก... แฮ่ก... แค่นี้ก็น่าจะพอแล้วนะ"
11434020-22 = "ทุกคนปลอดภัยมั้ย? ยังอยู่กันครบเนอะ?"
11434020-26 = "นี่มันเรื่องอะไรเนี่ย... นะ... นี่ก็เป็นเรื่องดีหรอกนะ... แต่แบบนี้มัน..."
11434020-27 = "กะ... ก็น่าดีใจอยู่หรอกนะ แต่ว่า..."
11434020-28 = "นี่มัน... ข้ามลิมิตความร็อกไปแล้ว..."
11434020-30 = "จริงๆ เลย..."
11434020-36 = "เฮือก...!!"
11434020-37 = "\"อยู่ตรงนี้กันนี่เอง! ขอถามอะไรหน่อยได้มั้ยคะ!?\""
11434020-39 = "\"ขอสัมภาษณ์หน่อยนะคะ...!!\""
11434020-40 = "\"ขอทราบชื่อวง...! หรือค่ายที่สังกัดก็ได้ค่ะ!!\""
11434020-41 = "\"วงดนตรีเพชรในตมจริงๆ เลย ที่ผ่านมาไปซ่อนอยู่ไหนคะเนี่ย!? ทุกคนสงสัยกันมากเลยนะคะ!\""
11434020-43 = "อ๊ายยยยย!?"
11434020-45 = "นะ.... นี่มันอะไรกัน...!"
11434020-46 = "ต้องถึงกับสัมภาษณ์เลยเหรอ...!"
11434020-47 = "ฉันว่าน่าจะมีการเข้าใจผิดอย่างรุนแรงเลยนะ! พวกเราทำถึงกันขนาดนั้นเลยเหรอ!?"
11434020-48 = "ดะ... เดี๋ยวก่อนสิ! ? พวกเราไม่ใช่วงดนตรีอาชีพหรอกนะ! แล้วก็เล่นเป็นแค่ 1-2 เพลงเท่านั้นเองด้วย!"
11434020-49 = "เฮ้อ... เราเขียนประวัติศาสตร์หน้าใหม่กันอีกแล้วสินะ เหมือนอัจฉริยะที่ฟ้าประทานมาให้ทรีนิตี้เลย..."
11434020-50 = "อย่าพูดอะไรให้ใครเข้าใจผิดอีกสิ!!"
11434020-56 = "(ทุกคนอธิบายเหตุผลพร้อมกับปฏิเสธการสัมภาษณ์อย่างอ่อนน้อม จากนั้นก็กลับมาที่ชมรมด้วยกัน)"

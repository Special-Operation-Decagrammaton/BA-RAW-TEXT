[translation]
80000099-1 = "ไข่ออนเซ็น"
80000099-2 = "(คุณครูมาถึงสถานที่ที่เมกุเรียกมาพบ นั่นก็คือบริเวณตรอกที่อยู่ไกลจากย่านที่ผู้คนพลุกพล่าน)"
80000099-3 = "ฮึ~ มาแล้วเหรอ คุณครู? ถึงยังไงฉันก็มารออยู่ก่อนแล้วละ"
80000099-4 = "[s1] \"เมกุ?\"\n[s2] \"มาทำอะไรในที่แบบนี้น่ะ?\""
80000099-9 = "ฮุฮุ~ คิดแล้วว่าจะต้องถามคำถามนี้!"
80000099-10 = "คุณครูรู้รึเปล่า? วันนี้น่ะ เป็นวันที่พิเศษมากๆ เลยนะ!"
80000099-11 = "เดี๋ยวก่อน คุณครูคงจะรู้อยู่แล้วใช่ไหม? ก็คุณครูเป็นคนฉลาดไม่เหมือนฉันนี่นา!"
80000099-12 = "แต่นั่นก็ไม่ใช่เหตุผลซะหน่อย! ปกติฉันก็ได้รับความช่วยเหลือจากคุณครูอยู่ตลอด เพราะงั้นในวันแบบนี้#nก็เลยอยากให้อะไรบ้างน่ะ!"
80000099-13 = "แต่ว่าฉันไม่มีความรู้เรื่องอื่นเลยนอกจากเรื่องการทำงาน..."
80000099-14 = "ทั้งเรื่องการขุดบ่อ ถล่ม พัง หรือไม่ก็จุดไฟเผา..."
80000099-15 = "อ่า แน่นอนว่าพวกงานก่อสร้างก็ทำได้อยู่หรอก แต่ว่ามันก็ไม่เกี่ยวกับเรื่องวันนี้อยู่ดี!"
80000099-16 = "เพราะงั้นพอมาคิดว่าจะทำยังไงดี แล้วก็คิดถึงสิ่งที่ฉันจะทำให้ได้ในขีดความสามารถของฉัน"
80000099-17 = "ข้อสรุปที่ได้ก็คือ...!"
80000099-21 = "ตึกตัก ตึกตัก~!!"
80000099-26 = "[ns3] \"นี่มันไข่ออนเซ็นไม่ใช่เหรอ?\"\n[ns4] \"ไข่รมควัน... งั้นเหรอ?\""
80000099-29 = "แหะๆ นั่นสินะ... มันคือไข่ออนเซ็นหรือไข่รมควันกันแน่นะ?"
80000099-30 = "ถ้าคิดว่าใช่ก็คงใช่ ถ้าคิดว่าไม่ใช่ก็คงไม่ใช่นั่นแหละ"
80000099-31 = "แต่อันที่จริง ที่ฉันทำเป็นก็มีแค่ไข่ออนเซ็นเท่านั้นแหละ"
80000099-32 = "ไข่ออนเซ็นวันนี้ดูต่างจากไข่ออนเซ็นทั่วไปเหรอ? มีเสียงดังกุกกักๆ จากข้างในด้วยงั้นเหรอ?"
80000099-33 = "เอาละ คุณครู! ลองแกะดูสิ! ฉันเองก็อยากดูเหมือนกันว่ามันทำออกมาได้สมบูรณ์ดีหรือเปล่าน่ะ!"
80000099-34 = "อืม~ ทำเอาฉันตื่นเต้นไปด้วยเลยแฮะ!"
80000099-35 = "[ns] ลองแกะไข่ออนเซ็นดู"
80000099-38 = "[ns5] \"ข้างในมีช็อกโกแลตด้วย...!\"\n[ns6] \"ไม่ใช่ใข่ต้มหรอกเหรอ!? ช็อกโกแลตรูปไข่เหรอเนี่ย!?\""
80000099-41 = "ท้าดาาาาา~!!!"
80000099-42 = "ช็อกโกแลตออนเซ็นที่ทำด้วยวิธีทำไข่ออนเซ็นยังไงล่ะ~!!!"
80000099-43 = "ว้าว~!! แปะๆๆ~!!"
80000099-44 = "คุณครู! ลองกินดูสิ ลองดู! เร็วๆ! รีบชิมดูสิว่ารสชาติเป็นยังไง!!"
80000099-45 = "เร็วเข้า~!! หม่ำๆ~!!"
80000099-50 = "[ns7] \"โอ้ว หวานตัดขา\"\n[ns8] \"อร่อยจัง\""
80000099-53 = "...!"
80000099-54 = "...!!!"
80000099-55 = "โอ๊สสสส~!!! สำเร็จแล้ว~!!"
80000099-56 = "ฮิฮิ ฉันกังวลอยู่เลยทีเดียวว่าถ้ามันออกมาหน้าตาประหลาดจะทำยังไง... ค่อยยังชั่วหน่อย"
80000099-57 = "หืม...? ฉันไม่ได้ทดลองทำดูก่อนเลยงั้นเหรอ?"
80000099-58 = "อื้อ เพิ่งเคยทำครั้งแรกเลยละ"
80000099-59 = "เอ๋..."
80000099-60 = "...!! จริงด้วย! ทำไว้ล่วงหน้าก่อนจะดีกว่าสินะ!!"
80000099-61 = "คิดแล้วเชียวว่าคุณครูนี่ฉลาดจริงๆ ด้วย!! ฮิฮิ..."
80000099-65 = "เอาละ ถ้างั้น..."
80000099-66 = "ก็ลองทำออกมาเยอะๆ แล้วมาชิมดูว่ารสชาติเป็นยังไงกันดีไหม?"
80000099-68 = "(หลังจากนั้นคุณครูกับเมกุก็ช่วยกันทำ 'ช็อกโกแลตไข่ออนเซ็น' ออกมาเป็นจำนวนมาก)"
80000099-69 = "(คุณครูได้รับไข่ออนเซ็นเป็นของขวัญกลับมาเยอะมาก เลยนำไปแช่ไว้ในตู้เย็นที่ชาเล่ต์)"

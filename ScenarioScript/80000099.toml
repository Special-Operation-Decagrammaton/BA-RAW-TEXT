[translation]
80000099-1 = "溫泉蛋"
80000099-2 = "（跟惠約好見面的地方，是一條遠離鬧區的小巷子）"
80000099-3 = "哼哼～你來啦，老師。#n我在等你哦。"
80000099-4 = "[s1]「惠？」\n[s2]「你在這種地方做什麼？」"
80000099-9 = "呵呵～就知道老師會這麼問！"
80000099-10 = "你知道嗎？今天是個很特別的日子！"
80000099-11 = "不對，老師當然知道吧？#n因為老師跟我不一樣，是很聰明的人！"
80000099-12 = "總之就是因為這個！#n我平常也受到老師很多幫助，所以至少在今天這樣的日子裡，我想要做點事來報答！"
80000099-13 = "但我擅長的，就只有跟開發溫泉有關的工作而已。"
80000099-14 = "像是挖掘、剷除、爆破、燒毀之類的……"
80000099-15 = "啊，雖然建造東西也辦的到，但那跟今天的事沒什麼關聯就先不說了！"
80000099-16 = "總之我煩惱了很久，最後決定要把我能力範圍內能送的東西送給你。"
80000099-17 = "事情就是這樣！所以……！"
80000099-21 = "撲通撲通～！！"
80000099-26 = "[ns3]「這是溫泉蛋？」\n[ns4]「是煙燻蛋……嗎？」"
80000099-29 = "嘿嘿～這個嘛？你覺得呢？"
80000099-30 = "不算對但也不完全錯！"
80000099-31 = "其實我稱得上會做的食物，就只有溫泉蛋而已。"
80000099-32 = "不過今天的溫泉蛋有點不一樣哦！應該會比平常更甜才對！"
80000099-33 = "好了，老師！你剝開來看看吧！#n我也想確認一下有沒有成功！"
80000099-34 = "唔唔～連我也好期待！"
80000099-35 = "[ns] 剝開收到的雞蛋"
80000099-38 = "[ns5]「裡面有巧克力……！」\n[ns6]「這不是雞蛋！？是長得像雞蛋的巧克力！？」"
80000099-41 = "鏘鏘～！！！"
80000099-42 = "是我用溫泉蛋的做法，製作出來的溫泉巧克力～！！！"
80000099-43 = "哇～！！啪啪啪啪～！！"
80000099-44 = "老師！你快吃吃看吧！確認一下味道怎麼樣！！"
80000099-45 = "快點～！！"
80000099-50 = "[ns7]「哦，好甜。」\n[ns8]「這真好吃。」"
80000099-53 = "……！"
80000099-54 = "……！！！！"
80000099-55 = "哦哦哦哦哦哦哦哦～！！！大成功～！！"
80000099-56 = "嘻嘻。其實我本來還很擔心成品會很奇怪的……幸好很成功。"
80000099-57 = "……嗯？問我有沒有試做過？"
80000099-58 = "那就是我第一次做出來的成品呀？"
80000099-59 = "……咦？"
80000099-60 = "……！！對耶！要是提前試做，說不定會更好！！"
80000099-61 = "老師果然很聰明呢！！嘻嘻……"
80000099-65 = "那麼……"
80000099-66 = "……要不要多做一些，自己也來試一下味道呢？"
80000099-68 = "（之後與惠一起做了非常多的「溫泉蛋巧克力」）"
80000099-69 = "（接著又收到了數量驚人的巧克力當作禮物，只好把它們都放在夏萊的冰箱裡）"

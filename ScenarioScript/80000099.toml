[translation]
80000099-1 = "Hot Springs Egg"
80000099-2 = "I went to the location Megu gave me, an alley that was quite far from main street."
80000099-3 = "Heehee. So you showed up, Sensei? I was waiting for you."
80000099-4 = "[s1] \"Megu?\"\n[s2] \"What are you doing in a place like this?\""
80000099-9 = "Heehee. I knew you'd ask me that!"
80000099-10 = "Do you know what today is, Sensei? It's a special one!"
80000099-11 = "No, I'm sure you already know. You're pretty smart, after all! Unlike me."
80000099-12 = "Anyway! You're always helping me out, so today I wanted to do something for you! Even if it's only for today!"
80000099-13 = "Problem is, all I know how to do is work, you know?"
80000099-14 = "Digging, demolition, explosions, or controlled burns..."
80000099-15 = "Oh. I do construction work too, but listen, none of that has to do with today!"
80000099-16 = "So, I was wondering what to do, then I realized I should give you something related to what I'm good at!"
80000099-17 = "And so, I came up with...this!"
80000099-21 = "*drum roll*"
80000099-26 = "[ns3] \"Are those hot springs eggs?\"\n[ns4] \"Smoked...eggs?\""
80000099-29 = "Heehee. Is that your guess? I wonder what it could be?!"
80000099-30 = "You could be both wrong and right!"
80000099-31 = "The only thing I knew how to make for today was hot springs eggs."
80000099-32 = "But these hot springs eggs are special, you know? They might be a little sweeter than usual."
80000099-33 = "Now, Sensei! Please peel one! I want to see if I made it right!"
80000099-34 = "Phew. I'm excited to see the results!"
80000099-35 = "[ns] Peel the egg."
80000099-38 = "[ns5] \"There's chocolate inside!\"\n[ns6] \"Oh, it's not an egg? Just chocolate that looks like an egg?!\""
80000099-41 = "Ta-da!!"
80000099-42 = "It's a hot springs chocolate. I made it the same way I make my hot springs eggs!!"
80000099-43 = "It's amazing! *applause*!"
80000099-44 = "Come on, Sensei! You need to know how good this tastes!!"
80000099-45 = "Hurry!!"
80000099-50 = "[ns7] \"Oh! It's sweet.\"\n[ns8] \"It's really good!\""
80000099-53 = "*gasp*"
80000099-54 = "...!!!"
80000099-55 = "Wooooo! Mission accomplished!!"
80000099-56 = "Heehee. I was really worried they would come out weird... So I'm glad everything worked out."
80000099-57 = "Hm? Did I do any test runs?"
80000099-58 = "Nope! That was the first time I ever made any."
80000099-59 = "...Oh."
80000099-60 = "...! Aw geez! I should've made some practice ones! What if the ones I gave you had tasted bad?!"
80000099-61 = "You're always so wise, Sensei!! Heehee..."
80000099-65 = "Now then..."
80000099-66 = "...I'm going to make a whole batch just for me!"
80000099-68 = "We made a whole bunch of Hot Springs Egg Chocolates afterwards."
80000099-69 = "Despite her earlier claim, Megu gave me a whole bunch of eggs. I put them in the fridge at Schale for a sweet treat later."

[translation]
10010105-1 = "ตอนที่ 10;เรื่องราวที่ยังไม่สิ้นสุด 2"
10010105-11 = "(คุณครูลืมตาตื่นขึ้นมาหลังหายจากอาการเหนื่อยแล้ว)"
10010105-12 = "อ๊ะ... ตื่นแล้วเหรอคะคุณครู?"
10010105-19 = "ตื่นเร็วกว่าที่คิดอีกนะคะ... ไม่ได้ตื่นเพราะเสียงรบกวนจากฉันใช่ไหมคะ...?"
10010105-20 = "ส่วนคุณคนข้างๆ... นอนหลับสบายจนละเมอออกมาเลยละค่ะ"
10010105-22 = "งือออ... แบบนั้นจั๊กจี้นะคะ... งื้อ"
10010105-23 = "เห็นเป็นแบบนี้มาสักพักแล้วละค่ะ..."
10010105-24 = "นอนฝันอะไรหรือเปล่าคะ... ไม่กี่ชั่วโมงก่อนก็ดูเหนื่อยจนสีหน้าแทบจะไม่มีวิญญาณเลย..."
10010105-25 = "[s1] \"อุยเองก็เหนื่อยน่าดูเลยนะ...\" \n[s2] \"การฟื้นฟูหนังสือราบรื่นดีไหม?\""
10010105-28 = "อืม... ก็ประมาณหนึ่งค่ะ"
10010105-29 = "แต่ฉันก็เป็นคนรับปากเองนี่คะว่าจะทำให้ ก็เลยตั้งใจทำให้อยู่นี่ไงคะ"
10010105-30 = "ที่จริงแล้วน่ะ... มันเกือบจะเสร็จแล้วค่ะ... คิดว่าใช้เวลาไม่ถึงชั่วโมงก็เสร็จแล้วค่ะ"
10010105-31 = "[s3] \"จะเสร็จแล้วเหรอ? พูดจริงเหรอเนี่ย...?\"\n[s4] \"ไม่แปลกใจเลยว่าทำไมถึงได้ฉายาจอมเวท\""
10010105-34 = "ไม่ต้องชมกันขนาดนั้นหรอกค่ะ"
10010105-35 = "ถึงฉันจะไม่ได้ไม่ชอบฟังคำชมก็เถอะ... แต่ก็... ไม่ค่อยได้ฟังคำอะไรแบบนี้หรอกค่ะ"
10010105-36 = "เอาเป็นว่า... อืม... ขอบคุณนะคะ"
10010105-37 = "......"
10010105-38 = "เอ่อ... อืม... คือว่า..."
10010105-39 = "ระหว่างที่ฉันกำลังทำงาน... ถ้ามันเงียบเกินไปฉันจะเบื่อเอาได้ เพราะงั้นช่วยฟังฉันพูดอะไรเรื่อยเปื่อย หน่อยนะคะ"
10010105-40 = "ที่จริงเรื่องเค้กน่ะ... เป็นการเอาแต่ใจของฉันเองค่ะ คุณครูเองก็อาจจะทราบอยู่แล้ว..."
10010105-41 = "จู่ๆ ก็พรวดเข้ามาและขอร้องในเรื่องที่ไม่ง่ายแบบนั้น... ฉันก็เลยพูดออกไปด้วยความโมโหน่ะค่ะ"
10010105-42 = "ถ้าจะให้พูดตรงๆ ละก็ ฉันไม่คาดหวังด้วยค่ะว่าจะหามาให้ได้"
10010105-43 = "แต่ก็หามาให้ได้จริงๆ... ทั้งเค้ก ทั้งวัตถุดิบฟื้นฟูหนังสือ..."
10010105-44 = "นี่ฉันไม่ได้แกล้งชมเหมือนว่าจู่ๆ ก็อยากจะพยายามมองคนอื่นในทางที่ดีหรอกนะคะ..."
10010105-45 = "อืม..."
10010105-46 = "[s5] \"อุยก็พยายามอยู่นี่นา\"\n[s6] \"ใจกว้างแบบนี้เพราะฮินาตะเหรอ?\""
10010105-47 = "นั่นสิคะ... ใช่หรือเปล่านะ? ก็ไม่รู้สิคะ..."
10010105-48 = "นั่นสิคะ... ใช่หรือเปล่านะ? ก็ไม่รู้สิคะ..."
10010105-49 = "ทำไมนะ? ฉันก็ไม่ได้สนิทกับคุณฮินาตะในทันทีสักหน่อย..."
10010105-51 = "แต่ว่า... อืม... ถ้าเป็นเมื่อก่อน ฉันคงไม่บอกให้ใครนอนพักด้วยซ้ำค่ะ"
10010105-52 = "ฉันเองยังแปลกใจเลยค่ะที่จู่ๆ ก็พูดแบบนั้นออกไป"
10010105-56 = "แถมนี่ก็ดึกแล้วด้วย..."
10010105-57 = "ปกติฉันไม่เคยคุยกับคนอื่นในเวลานี้เลยค่ะ..."
10010105-59 = "บางทีฉันอาจจะมีด้านที่อ่อนโยนที่แม้แต่ตัวเองก็ยังไม่เคยรู้มาก่อนก็ได้ค่ะ..."
10010105-60 = "เพราะงั้น... บางที..."
10010105-61 = "ถ้าฉันลองจริงจังกับด้านที่อ่อนโยนของฉันดู... "
10010105-62 = "ต่อไปในอนาคตก็คง... ได้..."
10010105-63 = "ฮ้าาาาววววว..."
10010105-65 = "......"
10010105-69 = "เอ๋... ทำไมฉันมาตื่นเอาตรงนี้ล่ะคะ?"
10010105-70 = "อ้อ จริงด้วย งานฟื้นฟูหนังสือ... ฉันมาช่วยทำงาน... ก็เลยมาอยู่ตรงนี้ใช่ไหมคะ... แหะๆๆ..."
10010105-71 = "เอ่อ... จะว่าไป... นี่มันก็กลางคืนแล้วนี่คะ...?"
10010105-72 = "อ๊ะ... ป่านนี้ที่หอพักก็คง... เลยเวลาเช็กชื่อไปแล้วด้วย..."
10010105-73 = "...? เวลาเช็กชื่อหอพัก...?"
10010105-74 = "คุณฮินาตะ หลับสบายดีสินะคะ... "
10010105-76 = "...เวลาเช็กชื่อ!?"
10010105-77 = "ตกใจหมดเลย..."
10010105-78 = "[ns7] \"ฮินาตะ...?\"\n[ns8] \"เกิดเรื่องอะไรเหรอ?\""
10010105-79 = "ระ... ระ... เรื่องใหญ่เลยละค่ะคุณครู! ชะ... เช็กชื่อ! เลยเวลาเช็กชื่อแล้วค่ะ!"
10010105-80 = "ระ... ระ... เรื่องใหญ่เลยละค่ะคุณครู! ชะ... เช็กชื่อ! เลยเวลาเช็กชื่อแล้วค่ะ!"
10010105-81 = "นี่มันเลยไปแค่ไหนแล้วคะเนี่ย...? นะ... นาฬิกา...!"
10010105-82 = "คือว่า... คุณฮินาตะคะ ฉันกำลังทำงานอยู่ ช่วยเบาเสียง..."
10010105-83 = "สะ... สองชั่วโมง...!! ถ้าสองชั่วโมงน่าจะเช็กไปหมดแล้ว!! ทุกคนคงรู้กันหมดแล้วค่ะว่าฉันหายไป!"
10010105-84 = "เดี๋ยวนะคะ แค่เช็กชื่อหอเอง ไม่ต้องตื่นตูมขนาดนี้หรอกค่ะ อีกอย่างฉันก็กำลังใช้สมาธิทำงานอยู่ ช่วยเงียบๆ..."
10010105-85 = "ตะ... แต่ว่า...! ฉันไม่ได้มีธุระที่ไหน แถมไม่ได้ไปเช็กชื่อ! ซิสเตอร์คนอื่นอาจจะตำหนิเอาก็ได้ค่ะ...!"
10010105-86 = "แต่ฉันไม่จำเป็นต้องรู้เรื่องชมรมซิสเตอร์หรอกค่ะ... เอาเป็นว่าช่วยเบาเสียงหน่อย..."
10010105-88 = "......"
10010105-90 = "ฉะ... ฉันควรติดต่อคนดูแลหอพักก่อน..."
10010105-91 = "ก็บอกว่าให้เงียบๆ ไงเล่า!!"
10010105-92 = "เฮือกกก!!"
10010105-93 = "[s9] \"อืม หัวร้อนจนระเบิดแล้ว\"\n[s10] \"ทนไม่ไหวแล้วสินะ\""
10010105-94 = "ต้องให้บอกอีกกี่ครั้งคะว่าห้ามส่งเสียงดังในห้องสมุด!! ฮะ!?"
10010105-95 = "ต้องให้บอกอีกกี่ครั้งคะว่าห้ามส่งเสียงดังในห้องสมุด!? ฮะ!?"
10010105-96 = "คะ... คุณอุย...!? เอ่อ... ฉันไม่ได้ตั้งใจ..."
10010105-97 = "ขะ... ขอโทษค่ะ"
10010105-102 = "เปลี่ยนการแจ้งเตือนในโทรศัพท์เป็นแบบสั่นด้วยค่ะ!!!"
10010105-103 = "ค่ะ ค่ะ! ฉันจะเปลี่ยนตอนนี้เลยค่ะ เดี๋ยวนี้เลย...!!"
10010105-104 = "ตอนนี้..."
10010105-108 = "เอ๋...?"
10010105-110 = "อะไรอีกล่ะคะทีนี้...?"
10010105-111 = "อ๊ะ..."
10010105-112 = "เดี๋ยวก่อนนะคะ คือว่า... ข้อความที่ฉันได้รับ... เมื่อสักครู่น่ะค่ะ..."
10010105-113 = "เป็นข้อความจากทางวิหาร ขอฉันอ่านดูหน่อยนะคะ"
10010105-114 = "...? วิหาร...?"
10010105-115 = "\"ขอแจ้งให้ทราบว่า งานเผยแพร่และอ่านพระคัมภีร์... ที่มีกำหนดเดิมในวันพรุ่งนี้เช้า...\""
10010105-116 = "......"
10010105-117 = "[s11] \"ฮินาตะ...?\"\n[s12] \"งาน... ทำไมเหรอ?\""
10010105-118 = "ได้รับความคิดเห็นจากองค์ประชุมเป็นเอกฉันท์ว่า... ให้เลื่อนเวลาเข้ามาจัดในคืนนี้"
10010105-119 = "ได้รับความคิดเห็นจากองค์ประชุมเป็นเอกฉันท์ว่า... ให้เลื่อนเวลาเข้ามาจัดในคืนนี้"
10010105-120 = "\"เวลาจัดงานคือเที่ยงคืนของวันนี้\" ..."
10010105-121 = "...เที่ยงคืนของวันนี้เหรอ?"
10010105-122 = "เที่ยงคืนของวันนี้น่ะ..."
10010105-124 = "เที่ยงคืนของวันนี้..."
10010105-131 = "อีกแค่ชั่วโมงเดียวค่ะ..."

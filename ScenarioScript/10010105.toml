[translation]
10010105-1 = "第10話;為了不讓它結束（２）"
10010105-11 = "（……或許因為疲勞得到緩解，自然地醒了過來）"
10010105-12 = "……你，你醒了啊，老師。"
10010105-19 = "比，比想像中還早呢……難道是作業的聲音吵到你了嗎……？"
10010105-20 = "至於另一位……睡得很香，甚至還在說夢話……"
10010105-22 = "唔唔……好癢哦，呵呵……"
10010105-23 = "……從，從剛才開始就一直是這樣。"
10010105-24 = "究竟做了什麼夢呢……明明到剛才都還是一副非常累的樣子……"
10010105-25 = "[s1]「……憂也辛苦了，謝謝你。」\n[s2]「作業還順利嗎？」"
10010105-28 = "算，算是吧……"
10010105-29 = "畢竟都說過交給我了，總，總不能說辦不到……"
10010105-30 = "只要……大約再一個小時，應該就能完成。"
10010105-31 = "[s3]「動作真快呢，明明都碎成那樣了……」\n[s4]「不愧是魔術師。」"
10010105-34 = "就，就算稱讚我，也不會有好處的哦……"
10010105-35 = "雖然不討厭……但我本來就很少被稱讚……"
10010105-36 = "總，總之……嗯，謝謝……"
10010105-37 = "……"
10010105-38 = "請，請把這些……"
10010105-39 = "當成是我在……作業中的自言自語吧。"
10010105-40 = "其，其實要你們去買蛋糕……該說有點類似在找碴嗎。"
10010105-41 = "因，因為你們突然帶來這種荒唐的案件，所以我也提一些無理的要求……#n於是就脫口而出了。"
10010105-42 = "但老實說，我並沒有抱什麼期待……"
10010105-43 = "不過日向同學和老師不只真的買來……還解決了問題……#n日向同學為了把事情做好，也一直很努力……"
10010105-44 = "雖，雖然這麼說，也不代表能馬上改變我的看法……"
10010105-45 = "那個……"
10010105-46 = "[s5]「也是因為這個原因，憂才會這麼努力對吧。」\n[s6]「……有什麼感觸嗎？」"
10010105-47 = "也許吧……"
10010105-48 = "也許吧……"
10010105-49 = "我，我沒有隨便說出「感情變好了」的打算……但是……"
10010105-51 = "如果是以前……請在這裡睡覺這種話，我是絕對不會說的吧……大概。"
10010105-52 = "連，連我自己，也覺得不可思議……"
10010105-56 = "而且，在，在這麼晚的時間……"
10010105-57 = "像這樣，和，和別人說話什麼的，那個，是種不可思議的感覺……"
10010105-59 = "也許……真的只是「也許」而已……"
10010105-60 = "如果我也能……"
10010105-61 = "更，更認真面對的話……"
10010105-62 = "那個……"
10010105-63 = "呼啊……！睡得真好。"
10010105-65 = "……"
10010105-69 = "……咦，咦咦？這裡是……"
10010105-70 = "對，對了。為了復原經典……"
10010105-71 = "呃，現在幾點……？"
10010105-72 = "啊，宿舍點名的時間已經過了……"
10010105-73 = "……點名，時間？"
10010105-74 = "日向同學，你終於醒──"
10010105-76 = "點名時間！？"
10010105-77 = "……怎，怎麼突然叫這麼大聲。"
10010105-78 = "[ns7]「日向……？」\n[ns8]「怎麼了嗎？」"
10010105-79 = "不，不不不不不不得了了老師！點名，點名時間過了……！？"
10010105-80 = "不，不不不不不不得了了老師！點名，點名時間過了……！？"
10010105-81 = "不知不覺都這麼晚了……！該，該怎麼辦才好……！？"
10010105-82 = "……還以為是什麼大事。#n請不要為了宿舍的點名就這樣吵吵鬧鬧的，而且我還在作業當中……"
10010105-83 = "可可可，可是！這樣會被罵的！#n要是因為睡著而錯過點名這件事被其他修女知道，不知道會被罵得多慘……！"
10010105-84 = "修，修女會還真嚴格啊……雖然不清楚內情，不過也算是符合形象吧。#n話說，請安靜一點……"
10010105-85 = "怎，怎麼辦！？該，該怎麼說明才好……！？這樣下去的話我就……！"
10010105-86 = "安靜一點……"
10010105-88 = "……"
10010105-90 = "總，總之先跟宿舍聯絡……！"
10010105-91 = "請你安靜一點！！！！"
10010105-92 = "噫噫噫！？"
10010105-93 = "[s9]「啊……」\n[s10]「這也沒辦法……」"
10010105-94 = "要我說幾次安靜才聽的懂啊！？啊！？"
10010105-95 = "要我說幾次安靜才聽的懂啊！？啊！？"
10010105-96 = "對，對不起……！？但，但是那個……！"
10010105-97 = "嗚，我很抱歉……"
10010105-102 = "手機給我調成震動！！"
10010105-103 = "是，我馬上就調……！"
10010105-104 = "……？"
10010105-108 = "……咦？"
10010105-110 = "……這次又怎麼了。"
10010105-111 = "那個……"
10010105-112 = "咦，騙人的吧？剛才的，訊息……"
10010105-113 = "是全體聯絡……"
10010105-114 = "……全體聯絡？"
10010105-115 = "那個，「告知所有人，關於預計在明天舉行的經典公開暨朗讀典禮……」"
10010105-116 = "……"
10010105-117 = "[s11]「日向……？」\n[s12]「後續是……？」"
10010105-118 = "「經與會貴賓一致同意，決定提前舉行。」"
10010105-119 = "「經與會貴賓一致同意，決定提前舉行。」"
10010105-120 = "「典禮的舉行時間改為今晚12點。」……"
10010105-121 = "……12點？"
10010105-122 = "……"
10010105-124 = "今晚12點……"
10010105-131 = "就是一個小時之後呢……"

[translation]
10010105-1 = "Episode 10;Unfinished Story Part 2"
10010105-11 = "I slowly opened my eyes after some much-needed sleep."
10010105-12 = "Oh. You're awake, Sensei."
10010105-19 = "I didn't expect you to be up so early. I hope I didn't wake you."
10010105-20 = "A certain someone is still fast asleep, however. To think she even mumbles in her sleep..."
10010105-22 = "Heehee... That tickles... Heehee..."
10010105-23 = "She's been like that all night."
10010105-24 = "I can only imagine what she must be dreaming of. She seems much more at peace than before she fell asleep, at least."
10010105-25 = "[s1] \"You've really been working hard, huh?\"\n[s2] \"So how are things going? Well?\""
10010105-28 = "Yes, I suppose so..."
10010105-29 = "I told you I could take it from here. I intend to keep my word..."
10010105-30 = "Actually, I'm almost done. It should be another hour or so."
10010105-31 = "[s3] \"How did you pull that off so quickly?\"\n[s4] \"I guess that's why people call you a magician.\""
10010105-34 = "P-Please. Flattering me isn't going to make me work any faster."
10010105-35 = "Well, it's not that I don't like compliments. In fact, I don't receive them very often..."
10010105-36 = "Anyway...thank you."
10010105-37 = "..."
10010105-38 = "Um, so..."
10010105-39 = "F-Forget what I just said. I was talking to myself, that's all.#nIt gets boring being alone with my thoughts."
10010105-40 = "T-To tell you the truth, I was being unreasonable when I requested you to retrieve that cake yesterday."
10010105-41 = "I thought your request was absurd, so I...made an equally demanding request as payback. Perhaps you figured that out already."
10010105-42 = "I did not honestly expect you to retrieve it."
10010105-43 = "Yet you both managed to return with everything—the materials and even the cake."
10010105-44 = "Not that I'm going to change my opinion about some things so suddenly,#nbut still..."
10010105-45 = "Hmm."
10010105-46 = "[s5] \"That's okay. One step at a time, Ui.\"\n[s6] \"So you see Hinata a little differently now?\""
10010105-47 = "Is that what you think? Hmm. I'm not so sure."
10010105-48 = "Is that what you think? Hmm. I'm not so sure."
10010105-49 = "It isn't as though she and I are particularly close all of a sudden."
10010105-51 = "Still... The old me wouldn't have agreed to allowing the two of you to sleep here."
10010105-52 = "It's strange for me to be so accommodating."
10010105-56 = "I also never imagined that I..."
10010105-57 = "...would be having a friendly conversation with someone at such a late hour."
10010105-59 = "Maybe I discovered a soft spot I never knew I had."
10010105-60 = "And maybe..."
10010105-61 = "...if we got to know each other better..."
10010105-62 = "...we could..."
10010105-63 = "*yaaaaaawn*"
10010105-65 = "..."
10010105-69 = "Wh-Where am I...?"
10010105-70 = "Oh, right. We were retrieving materials to restore the book. That's why..."
10010105-71 = "What time is it?"
10010105-72 = "Oh, I've already missed lights out back at the dorm. And the roll call..."
10010105-73 = "The roll call...? Hmm..."
10010105-74 = "Did you sleep well, Hinata? "
10010105-76 = "THE ROLL CALL!"
10010105-77 = "Wh-What...?"
10010105-78 = "[ns7] \"What are you talking about?\"\n[ns8] \"What's wrong?\""
10010105-79 = "Th-This is bad, Sensei! The roll call! I missed it!"
10010105-80 = "Th-This is bad, Sensei! The roll call! I missed it!"
10010105-81 = "How did it get so late?! What time is it?!"
10010105-82 = "Um, Hinata. I'm still working. Can you keep it down?"
10010105-83 = "B-But I must have missed it by now! They know I'm not there!"
10010105-84 = "Is something so trivial worth making a fuss over? I'll never understand the inner workings of the Sisterhood. Anyway, I need you to stay quiet."
10010105-85 = "B-But...! I can't afford to miss a roll call! What if the other Sisters find out I was late because I fell asleep?"
10010105-86 = "Please be quiet..."
10010105-88 = "..."
10010105-90 = "I-I'll have to contact the dorm superintendent, and...!"
10010105-91 = "I SAID BE QUIET!"
10010105-92 = "Ahhh!"
10010105-93 = "[s9] \"You set her off.\"\n[s10] \"I'm surprised it took THAT long.\""
10010105-94 = "How many times must I ask you to be quiet?! This is still a library!#nShhhhhh!"
10010105-95 = "How many times must I ask you to be quiet?! This is still a library!#nShhhhhh!"
10010105-96 = "I-I'm sorry, Ui. I didn't realize..."
10010105-97 = "I'm sorry!"
10010105-102 = "And put your phone on silent!"
10010105-103 = "I-I will! I'll do that right away!"
10010105-104 = "...?"
10010105-108 = "Huh?"
10010105-110 = "What is it now?"
10010105-111 = "Um..."
10010105-112 = "I-I got a message just now. This can't be right..."
10010105-113 = "It's from the cathedral. Let me read."
10010105-114 = "The cathedral?"
10010105-115 = "\"Update on the scripture reveal and reading event that was scheduled for tomorrow...\""
10010105-116 = "..."
10010105-117 = "[s11] \"What's it say, Hinata?\"\n[s12] \"What happened to the event?\""
10010105-118 = "\"All parties have agreed to hold the event as soon as possible.\""
10010105-119 = "\"All parties have agreed to hold the event as soon as possible.\""
10010105-120 = "\"The event will take place tonight at midnight.\""
10010105-121 = "Midnight...tonight?"
10010105-122 = "Midnight..."
10010105-124 = "Midnight."
10010105-131 = "That's one hour from now."

[translation]
1004705-1 = "閃亮的所在之處"
1004705-2 = "（MomoTalk上的訊息令人有點在意……）"
1004705-3 = "（於是決定動身去找知世）"
1004705-10 = "咦，老師……？"
1004705-11 = "[s] 「啊，知世。那個啊──」"
1004705-12 = "不，不行。"
1004705-13 = "老師不可以靠近我。"
1004705-14 = "[s] 「為，為什麼……？」"
1004705-15 = "要是靠近我……"
1004705-16 = "老師也會受到詛咒，變得不幸……"
1004705-17 = "[s] 「詛咒……？」"
1004705-21 = "[ns] 「………」"
1004705-23 = "[ns] 靠近知世"
1004705-31 = "[ns] 更加靠近知世"
1004705-37 = "不，不行。"
1004705-38 = "[s] 靠近知世並溫柔地抓住他的手"
1004705-44 = "啊……老師……？"
1004705-45 = "[s1] 「如果可以的話，請告訴我……發生什麼事了？」\n[s2] 「如果有煩惱的話，我想成為你的力量。」"
1004705-48 = "但是……"
1004705-49 = "[s] 「……是怎麼都說不出口的事嗎？」"
1004705-53 = "我知道了。"
1004705-54 = "老師，其實……"
1004705-56 = "（從知世口中聽說了事情的來龍去脈）"
1004705-58 = "我今天早上為了尋找閃亮……"
1004705-59 = "在海邊徘徊的時候──"
1004705-60 = "[s] 「找到了瓶中信？」"
1004705-61 = "嗯，就是這個。"
1004705-66 = "（知世遲疑了一會之後，拿出了一個玻璃瓶，和原本應該裝在裡面的信）"
1004705-67 = "（信上的內容寫到……）"
1004705-68 = "[ns] 「看來這封信最初源自於三一學園……」"
1004705-69 = "（「收到此信的人必須在三天內，將同樣內容的信件轉寄給七個人」）"
1004705-70 = "（「要是沒照做的話將會受到詛咒，遭遇超乎想像的不幸」）"
1004705-71 = "（「如果不想被詛咒……知道該怎麼做吧」）"
1004705-72 = "（「祝你好運！GoodLuck！」）"
1004705-74 = "（這東西……）"
1004705-75 = "[s] 「這不是詛咒信嗎？真懷念……」"
1004705-76 = "老師，怎麼辦～？"
1004705-77 = "再這樣下去，三天之後我就會受到詛咒，變得不幸……"
1004705-78 = "[s] 「那個……知世，你先冷靜。這只是個惡作劇。」"
1004705-79 = "惡作劇……？"
1004705-83 = "（見知世一臉不解的歪著頭，於是便向他解釋這是一種名為「詛咒信」的東西）"
1004705-84 = "（只是一種惡作劇，所以不需要放在心上）"
1004705-85 = "惡作劇……為什麼會有人寫這種東西呢？"
1004705-86 = "（真是個理所當然的疑問）"
1004705-87 = "[s] 「為什麼呢……」"
1004705-88 = "如果「會遭遇不幸」這件事是騙人的……"
1004705-89 = "那為什麼要做這種事情呢？"
1004705-90 = "老師，為什麼？"
1004705-91 = "[s3] 「那個，應該沒有什麼特別的意義吧……」\n[s4] 「該說是單純想惡作劇嗎……」"
1004705-94 = "……好奇怪。"
1004705-95 = "可是，假如這不是惡作劇……"
1004705-96 = "如果真的會被詛咒，該怎麼辦？"
1004705-97 = "如果是真的……那現在站在我旁邊的老師也會一起被詛咒……"
1004705-98 = "然後變得不幸……"
1004705-99 = "……我不要。"
1004705-100 = "這樣不行。"
1004705-101 = "如果我因此離開了……"
1004705-102 = "老師能代替我，成為戰車嗎？"
1004705-103 = "[s] 「這，這難度有點高啊……」"
1004705-105 = "（只見知世含著淚，表情非常的認真）"
1004705-106 = "（真是傷腦筋呢……）"
1004705-108 = "[ns] 「好，那不然這樣吧。」"
1004705-109 = "……？"
1004705-110 = "[s] 「在不幸降臨前還有三天，我們都待在一起吧。」"
1004705-111 = "可是，這樣的話老師就……"
1004705-112 = "[s5] 「如果知世真的遇到危險，我也會想辦法解決。」\n[s6] 「是不是真的會受到詛咒，我們來驗證一下吧？」"
1004705-115 = "老師……"
1004705-119 = "……嗯。"
1004705-120 = "我知道了。"
1004705-121 = "（微笑）"
1004705-123 = "（於是便決定和知世一起度過接下來的三天）"
1004705-141 = "（有時，幾乎一整天都在夏日的沙灘上散步）"
1004705-159 = "（有時，會在海之家吃著冰棒或刨冰）"
1004705-181 = "（有時，則會在海邊和突然跑來挑釁的不良分子們進行榴彈競賽（？））"
1004705-188 = "（一起回到渡假村之後，聊著當天發生的事情……）"
1004705-190 = "（就這樣和知世度過了每一天）"
1004705-191 = "（最終，迎來了撿到信之後的第三天）"
1004705-196 = "[ns] 「下午十一點五十三分……時間快到了呢。」"
1004705-197 = "嗯，今天就是第三天了……"
1004705-198 = "老師，我──"
1004705-199 = "[s] 「放心，有我在。」"
1004705-203 = "……嗯。"
1004705-204 = "（指針緩緩地，一步一步前進……）"
1004705-213 = "（於是……）"
1004705-218 = "老師，時間……"
1004705-226 = "（零點過了五分鐘左右，周圍依然什麼也沒發生）"
1004705-230 = "什麼事都沒發生……？"
1004705-231 = "[s] 「嗯，果然是那種老套的『詛咒信』惡作劇。」"
1004705-232 = "原來真的是這樣啊……"
1004705-233 = "[s] 「那既然知道沒事了，我就──」"
1004705-234 = "等，等等。"
1004705-239 = "[ns] 「知世？」"
1004705-240 = "那個，我……"
1004705-246 = "怎，怎麼了！？"
1004705-247 = "突然停電了！？"
1004705-253 = "[ns] 「難道這是信上所說的……！？」"
1004705-255 = "[ns] 「知世！很危險，快抓住我的手！」"
1004705-256 = "咦……？"
1004705-265 = "（老師的臉好近……）"
1004705-266 = "（啊，這是……）"
1004705-270 = "……是閃亮。"
1004705-281 = "唉呦，嚇死人了……"
1004705-282 = "真是的，剛剛是怎樣啊……"
1004705-284 = "[ns] 「……看來只是一時故障吧？」"
1004705-285 = "老師，好重。"
1004705-286 = "[s] 「抱，抱歉，知世！」"
1004705-290 = "[ns7] 「雖然事出突然，但這太不應該了，對不起……」\n[ns8] 「還好吧？有沒有哪裡受傷？」"
1004705-293 = "嗯，我沒事。"
1004705-294 = "…………"
1004705-295 = "老師，我找到閃亮了。"
1004705-296 = "[s] 「閃亮……是說剛才電燈一閃一閃的嗎？」"
1004705-297 = "不是。"
1004705-298 = "我至今一直尋找的閃亮，瞬間出現我眼前……"
1004705-299 = "……"
1004705-300 = "原來是這樣。"
1004705-301 = "閃亮，一直都在……"
1004705-302 = "[s] 「嗯？」"
1004705-303 = "詛咒信……確實是騙人的沒錯。"
1004705-304 = "因為它反而是封幸福信呢♪"
1004705-305 = "[s] 「……什麼意思？」"
1004705-306 = "呵呵。"
1004705-307 = "是不能對老師說的祕密唷。"
1004705-309 = "（雖然到頭來還是不知道是什麼意思……）"
1004705-313 = "（但總之知世看起來相當開心，之後一起閒聊著各種話題直到早上）"

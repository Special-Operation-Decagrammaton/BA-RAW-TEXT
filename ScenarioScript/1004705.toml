[translation]
1004705-1 = "ที่ที่มีแสงระยิบระยับ..."
1004705-2 = "(คุณครูรู้สึกกังวลนิดหน่อย หลังจากได้อ่านข้อความ MOMOTALK ที่ชิเซะส่งมา)"
1004705-3 = "(เลยไปยังที่พักของชิเซะเพราะสงสัยว่าเกิดอะไรขึ้น)"
1004705-10 = "เอ๋...? คุณครู...?"
1004705-11 = "[s] \"ชิเซะ MOMOTALK ที่ส่งมาเมื่อกี้น่ะ...\""
1004705-12 = "อ๊ะ ไม่นะ"
1004705-13 = "อย่าเข้ามาใกล้นะ คุณครู~"
1004705-14 = "[s] \"หืม...? เป็นอะไรรึเปล่า?\""
1004705-15 = "ถ้าเข้ามาใกล้ฉัน"
1004705-16 = "คุณครูก็จะถูกสาปแล้วก็ต้องพบเจอโชคร้าย..."
1004705-17 = "[s] \"ถูกสาปให้เจอโชคร้ายเหรอ?\""
1004705-21 = "[ns] “...”"
1004705-23 = "[ns] เดินเข้าไปหาชิเซะ"
1004705-31 = "[ns] เข้าไปใกล้ชิเซะอีก"
1004705-37 = "มะ... ไม่ได้นะ"
1004705-38 = "[s] เข้าไปใกล้ชิเซะและจับตัวเอาไว้"
1004705-44 = "อ๊ะ... คุณครู...?"
1004705-45 = "[s1] \"บอกครูหน่อยสิ เกิดอะไรขึ้นเหรอ?\"\n[s2] \"ถ้าชิเซะกำลังลำบากครูก็อยากช่วยนะ มันเป็นหน้าที่ของครูนี่นา\""
1004705-48 = "แต่ว่า..."
1004705-49 = "[s] \"ครูจะรออยู่ตรงนี้... จนกว่าชิเซะจะเล่าให้ฟัง\""
1004705-53 = "อืม เข้าใจแล้ว"
1004705-54 = "คุณครู คือว่า...."
1004705-56 = "(จากนั้นชิเซะก็เล่าเรื่องราวทั้งหมดที่เกิดขึ้นให้ฟัง)"
1004705-58 = "เมื่อเช้า ฉันจะออกไปตามหาแสงระยิบระยับ~"
1004705-59 = "ก็เลยเดินออกไปแถวๆ ทะเล"
1004705-60 = "[s] \"แล้วก็เจอขวดที่ใส่จดหมายไว้ที่ริมชายหาดเหรอ?\""
1004705-61 = "อืม อันนี้น่ะ"
1004705-66 = "(ชิเซะหยิบขวดแก้วและจดหมายฉบับหนึ่งส่งให้คุณครูอย่างลังเล...)"
1004705-67 = "(เนื้อหาในจดหมายที่ได้รับมาเขียนเอาไว้ว่า...)"
1004705-68 = "[ns] \"<จดหมายฉบับนี้เริ่มต้นที่ทรีนิตี้…>\""
1004705-69 = "(<ผู้ที่ได้รับจดหมายจะต้องส่งจดหมายที่มีเนื้อหาเดียวกันนี้ไปให้คนอื่นอีก 7 คน ภายในเวลา 3 วัน>)"
1004705-70 = "(<หากไม่ทำตามคำสั่งภายในเวลา 3 วัน จะถูกสาปให้ต้องพบแต่โชคร้ายอันน่าสยดสยอง>)"
1004705-71 = "(<เพราะฉะนั้นกรุณาคิดทบทวนให้ถี่ถ้วนและทำตามคำเตือน>)"
1004705-72 = "(<ขออวยพรให้คุณโชคดี กู๊ด ลัค>)"
1004705-74 = "(เนื้อหาแบบนี้ก็หมายความว่า จดหมายนี้...)"
1004705-75 = "[s] \"สมัยนี้ยังมีจดหมายลูกโซ่อีกเหรอ?!\""
1004705-76 = "ทำยังไงดีล่ะคุณครู?"
1004705-77 = "ถ้าปล่อยไว้แบบนี้แล้วผ่านไป 3 วันก็จะถูกสาป แล้วก็พบเจอแต่โชคร้ายนะ"
1004705-78 = "[s] \"เดี๋ยวก่อน จดหมายนี้เป็นแค่เรื่องโกหกน่ะ\""
1004705-79 = "หืม~? ของปลอมเหรอ? เป็นแค่เรื่องโกหกเหรอ?"
1004705-83 = "(อธิบายให้ชิเซะที่ทำท่างุนงงอยู่ฟัง ว่าจดหมายลักษณะนี้เรียกว่า <จดหมายลูกโซ่>)"
1004705-84 = "(เป็นการล้อเล่นประเภทหนึ่งของคนที่มีเจตนาไม่ดี เพราะงั้นไม่ต้องไปเชื่อก็ได้)"
1004705-85 = "ถ้านี่เป็นของปลอม ทำไมต้องทำอะไรแบบนี้ด้วยล่ะ~?"
1004705-86 = "(คิดไว้แล้วว่าต้องถามแบบนี้...)"
1004705-87 = "[s] \"อืม...?\""
1004705-88 = "ถ้าคำที่บอกว่าคนอื่นจะต้องพบกับโชคร้ายเป็นแค่เรื่องโกหกละก็..."
1004705-89 = "ทำไมถึงต้องทำเรื่องล้อเล่นไร้ความหมายแบบนี้ด้วยนะ?"
1004705-90 = "หืม? ทำไมกันล่ะ คุณครู~?"
1004705-91 = "[s3] \"จะบอกว่าไร้ความหมายได้มั้ยนะ\"\n[s4] \"บางคนบนโลกนี้ก็ทำเรื่องแบบนี้เพื่อแกล้งกันเล่นน่ะ\""
1004705-94 = "แปลกจัง..."
1004705-95 = "แต่ว่านะ สมมุติว่านี่ไม่ใช่เรื่องล้อเล่นล่ะ"
1004705-96 = "ถ้าเกิดว่าถูกสาปจริงๆ จะทำยังไงดี?"
1004705-97 = "ถ้างั้นคุณครูที่อยู่กับฉันล่ะ"
1004705-98 = "คุณครูจะต้องพบเจอโชคร้ายเพราะคำสาปด้วย..."
1004705-99 = "แบบนั้นไม่เอานะ..."
1004705-100 = "ไม่ได้นะ~ คุณครู~"
1004705-101 = "ถ้าฉันจะต้องหายไปเพราะโชคร้าย..."
1004705-102 = "คุณครูช่วยเติบโตให้เท่ารถถังแทนฉันด้วยนะ"
1004705-103 = "[s] \"เดี๋ยวสิๆ คำขอแบบนั้นมันยากสุดๆ เลยไม่ใช่เหรอ?!\""
1004705-105 = "(คุณครูรู้สึกกระวนกระวายเล็กน้อย เมื่อชิเซะเริ่มสะอื้นเบาๆ)"
1004705-106 = "(คุณครูใช้ความคิดอย่างหนักเพื่อหาวิธีปลอบชิเซะ...)"
1004705-108 = "[ns] \"ถ้างั้นเอาอย่างนี้แล้วกัน\""
1004705-109 = "หืม...?"
1004705-110 = "[s] \"ครูจะอยู่กับชิเซะตลอด 3 วันจนกว่าโชคร้ายจะมาถึงเลย\""
1004705-111 = "แต่ถ้าทำอย่างนั้น คุณครูก็..."
1004705-112 = "[s5] \"ถ้าชิเซะตกอยู่ในอันตรายครูก็ไม่มีทางนิ่งเฉยอยู่แล้ว\"\n[s6] \"ครูจะอยู่ด้วยเพื่อพิสูจน์ให้เห็นว่ามันเป็นของปลอม\""
1004705-115 = "คุณครูจะอยู่ด้วย..."
1004705-119 = "อะ... อื้อ..."
1004705-120 = "ก็ได้..."
1004705-121 = "(ยิ้ม)"
1004705-123 = "(จากนั้นกลายเป็นว่าคุณครูได้ใช้เวลา 3 วันอยู่กับชิเซะในช่วงวันหยุดฤดูร้อน)"
1004705-141 = "(ในแต่ละวัน ทั้งสองคนก็ไปเดินเล่นที่ริมทะเลด้วยกัน)"
1004705-159 = "(อีกวันก็ใช้เวลาอยู่ที่บ้านริมทะเล ทานไอศกรีมและน้ำแข็งไสด้วยกัน)"
1004705-181 = "(ส่วนอีกวันขณะเดินอยู่ริมชายหาดก็เจอกับพวกนักเลงที่กำลังต่อสู้กันจนเกิดเป็นการแข่งขัน#nขว้างระเบิด)"
1004705-188 = "(เมื่อกลับมาถึงที่พัก... ก็พูดคุยกันเล็กน้อยเกี่ยวกับเรื่องที่เกิดขึ้นในวันนั้น)"
1004705-190 = "(วันเวลาที่ใช้ร่วมกับชิเซะค่อยๆ ผ่านพ้นไป...)"
1004705-191 = "(สุดท้ายก็ครบ 3 วันหลังจากที่เก็บจดหมายได้)"
1004705-196 = "[ns] \"ตอนนี้เวลา 5 ทุ่ม 53 นาที เกือบหมดวันแล้ว\""
1004705-197 = "อื้อ... วันนี้ก็จะครบ 3 วันแล้ว"
1004705-198 = "คุณครู... ฉัน..."
1004705-199 = "[s] \"ไม่ต้องกลัวนะ ครูอยู่ตรงนี้\""
1004705-203 = "อื้อ..."
1004705-204 = "(นาฬิกาเดินไปอย่างเชื่องช้า...)"
1004705-213 = "(และจากนั้น)"
1004705-218 = "คุณครู เวลามัน..."
1004705-226 = "(ตามคาดถึงเวลาจะผ่านเที่ยงคืนไป 5 นาทีแล้ว แต่ก็ยังไม่มีอะไรเกิดขึ้น)"
1004705-230 = "ไม่มีอะไรเกิดขึ้นเลย...?"
1004705-231 = "[s] \"ใช่แล้ว จดหมายลูกโซ่ก็เป็นของแบบนี้ละ\""
1004705-232 = "อื้อ แบบนี้เองสินะ..."
1004705-233 = "[s] \"ดึกแล้ว ครูกลับก่อนนะ...\""
1004705-234 = "อ๊ะ คุณครู... เดี๋ยวก่อน"
1004705-239 = "[ns] \"หืม? มีอะไรเหรอ?\""
1004705-240 = "คือว่า..."
1004705-246 = "อะ... อะไรกันเนี่ย?!"
1004705-247 = "ทำไมจู่ๆ ไฟก็ดับล่ะ?!"
1004705-253 = "[ns] \"อย่าบอกนะว่า นี่เป็นเพราะจดหมาย...?!\""
1004705-255 = "[ns] \"ชิเซะ! อันตรายนะ จับมือครูไว้แน่นๆ!\""
1004705-256 = "เอ๊ะ...?"
1004705-265 = "(หน้าของคุณครู... อยู่ใกล้จัง)"
1004705-266 = "(อ๊ะ... นี่มัน...)"
1004705-270 = "...แสงระยิบระยับ"
1004705-281 = "ฮู่ว ตกใจหมดเลยนะ"
1004705-282 = "นั่นสิ เกิดอะไรขึ้นกันแน่?"
1004705-284 = "[ns] \"น่าจะเกิดเรื่องขัดข้องนิดหน่อย ตอนนี้คงไม่เป็นอะไรแล้วละ...\""
1004705-285 = "คุณครู หนักจัง..."
1004705-286 = "[s] \"อ๊ะ ขะ... ขอโทษนะ!\""
1004705-290 = "[ns7] \"พอเกิดเรื่องก็เลยทำไปโดยไม่รู้ตัว ขอโทษนะชิเซะ\"\n[ns8] \"ไม่ได้เจ็บตรงไหนใช่มั้ย? เป็นอะไรรึเปล่า?\""
1004705-293 = "อื้อ... ไม่เป็นอะไร"
1004705-294 = "...."
1004705-295 = "แต่ว่านะ คุณครู ฉันเจอแสงระยิบระยับด้วยละ"
1004705-296 = "[s] \"แสงระยิบระยับ? คงเพราะเมื่อกี้ไฟกระพริบน่ะ\""
1004705-297 = "หืม- ไม่ใช่อย่างนั้นนะคุณครู"
1004705-298 = "แสงระยิบระยับที่ฉันตามหามาตลอด... มันปรากฏขึ้นตรงหน้าเลย"
1004705-299 = "อ๊ะ..."
1004705-300 = "เป็นอย่างนี้เองสินะ"
1004705-301 = "แสงระยิบระยับ ไม่ได้อยู่ที่อื่น ไม่ได้อยู่ที่ไหนไกล..."
1004705-302 = "[s] \"หืม?\""
1004705-303 = "จดหมายลูกโซ่... เป็นอย่างที่คุณครูบอก เป็นแค่เรื่องโกหก..."
1004705-304 = "แต่ก็ไม่ถือว่าเป็นเรื่องโกหกทั้งหมดหรอกนะ~ ♪"
1004705-305 = "[s] \"หืม? หมายความว่ายังไงเหรอ?\""
1004705-306 = "ฮุฮุ~"
1004705-307 = "ความลับน่ะ ไม่บอกคุณครูหรอก~"
1004705-309 = "(ถึงแม้จะไม่ค่อยเข้าใจเรื่องทั้งหมด)"
1004705-313 = "(แต่คุณครูก็รู้สึกได้ว่าชิเซะอารมณ์ดีขึ้นแล้ว และนั่งคุยกับเธอต่อจนถึงเช้า)"

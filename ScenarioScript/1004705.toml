[translation]
1004705-1 = "Where the Sparkles Are"
1004705-2 = "I was surprised by Chise's MomoTalk message."
1004705-3 = "I was worried something happened, so I went to Chise's dorm."
1004705-10 = "Huh? Sensei...?"
1004705-11 = "[s] \"Oh, Chise. I wanted to check in after your message.\""
1004705-12 = "Oh, no!"
1004705-13 = "Don't approach me, Sensei!"
1004705-14 = "[s] \"H-Huh? What's wrong, Chise?\""
1004705-15 = "You cannot come close to me."
1004705-16 = "Or you'll be cursed. And very, very unhappy."
1004705-17 = "[s] \"...Cursed? Unhappy?\""
1004705-21 = "[ns] \"...\""
1004705-23 = "[ns] Approach Chise."
1004705-31 = "[ns] Get closer to Chise."
1004705-37 = "N-No!"
1004705-38 = "[s] Approach Chise and hold her."
1004705-44 = "Oh... Sensei...?"
1004705-45 = "[s1] \"Tell me, Chise. What happened?\"\n[s2] \"If you're in trouble, I want to help. That's my job.\""
1004705-48 = "B-But..."
1004705-49 = "[s] \"...I'm gonna wait here until you tell me.\""
1004705-53 = "Okay. I'll tell you."
1004705-54 = "Sensei, um."
1004705-56 = "Then I heard the full story of what happened from Chise."
1004705-58 = "I've been wandering the beach since this morning."
1004705-59 = "I was looking for sparkles."
1004705-60 = "[s] \"And you found a message in a bottle on the beach?\""
1004705-61 = "Yes, this."
1004705-66 = "Chise hesitantly held out a glass bottle with a letter inside of it."
1004705-67 = "I read the letter aloud."
1004705-68 = "[ns] \"This letter started in Trinity...\""
1004705-69 = "\"The person who receives this letter must send the same letter to 7 people within 3 days.\""
1004705-70 = "\"If you don't do so within 3 days, you'll be cursed and become terribly unhappy.\""
1004705-71 = "\"Don't ignore this warning.\""
1004705-72 = "\"Good luck.\""
1004705-74 = "This letter is just..."
1004705-75 = "[s] \"There are still chain letters these days?!\""
1004705-76 = "What should I do, Sensei?!"
1004705-77 = "In three days, I'll be cursed and be unhappy forever..."
1004705-78 = "[s] \"Wait, Chise. This letter is fake. It's a lie.\""
1004705-79 = "Huh? Fake...? A lie...?"
1004705-83 = "Puzzled, Chise was tilting her head as I explained what a chain letter was."
1004705-84 = "I explained that it was just a malicious joke and that she didn't have to believe it."
1004705-85 = "Why would someone make a mean, fake thing like that?"
1004705-86 = "I knew she would ask that."
1004705-87 = "[s] \"What do you mean?\""
1004705-88 = "If the curse is a lie..."
1004705-89 = "Why would someone make such a meaningless joke?"
1004705-90 = "Why? Why, Sensei?"
1004705-91 = "[s3] \"I guess...some people just do meaningless things.\"\n[s4] \"Some people simply like to play pranks on others...\""
1004705-94 = "How strange..."
1004705-95 = "But what if it's not fake?"
1004705-96 = "What if I really get cursed?"
1004705-97 = "Then, since you're with me...you'll get cursed too..."
1004705-98 = "Sensei will become unhappy Sensei!"
1004705-99 = "...I would hate that."
1004705-100 = "I can't let that happen to you."
1004705-101 = "If I disappear because of this curse..."
1004705-102 = "Please, become as big as a tank on my behalf!"
1004705-103 = "[s] \"Wow, that's a huge expectation!\""
1004705-105 = "Chise started to sob and I didn't know what to do."
1004705-106 = "I was thinking about how to comfort her, and..."
1004705-108 = "[ns] \"Okay, let's do this then, Chise.\""
1004705-109 = "Huh?"
1004705-110 = "[s] \"The letter said you'd become unhappy in three days, so I'll stay with you until then.\""
1004705-111 = "But, then you'll..."
1004705-112 = "[s5] \"When you're in danger, I'll always be there for you.\"\n[s6] \"I'll stay by your side to prove the curse is fake.\""
1004705-115 = "You'll stay with me..."
1004705-119 = "Hmm."
1004705-120 = "Okay."
1004705-121 = "(smile)"
1004705-123 = "That was how I ended up spending three days with Chise during summer break."
1004705-141 = "One day, we wandered around the sandy beach all day."
1004705-159 = "Another day, we went to the Beach Shack and shared ice cream and shaved ice."
1004705-181 = "And one day, while walking on the beach, a group of thugs picked a fight with us, and a sudden grenade-lobbing confrontation occurred."
1004705-188 = "Then we returned to the resort and laughed about what happened."
1004705-190 = "That was how Chise and I passed our time together."
1004705-191 = "The third day since she'd read the letter had finally arrived."
1004705-196 = "[ns] \"It's 11:53 PM... The day is almost here.\""
1004705-197 = "Yes... Today is the third day."
1004705-198 = "S-Sensei, I..."
1004705-199 = "[s] \"It's okay, Chise. I'm here with you.\""
1004705-203 = "...Yes. You are."
1004705-204 = "The clock hands kept moving toward the dreaded time."
1004705-213 = "And..."
1004705-218 = "Sensei, the time..."
1004705-226 = "As expected, it was five minutes past midnight, but nothing happened."
1004705-230 = "Nothing...happened...?"
1004705-231 = "[s] \"Yeah, Chise. That's a chain letter for you.\""
1004705-232 = "Yeah... I see..."
1004705-233 = "[s] \"It's late... I should go back.\""
1004705-234 = "Sensei, wait."
1004705-239 = "[s] \"Is something wrong?\""
1004705-240 = "So, um..."
1004705-246 = "Wh-What?!"
1004705-247 = "A b-blackout all of a sudden?!"
1004705-253 = "[ns] \"Could this be...because of the letter...?!\""
1004705-255 = "[ns] \"Chise! It's dangerous. Hold my hand!\""
1004705-256 = "Huh?"
1004705-265 = "(Sensei's face...is way too close...)"
1004705-266 = "(Oh, this is...)"
1004705-270 = "...The sparkles."
1004705-281 = "That was scary."
1004705-282 = "What happened?"
1004705-284 = "[ns] \"It was probably just a small outage.\""
1004705-285 = "Sensei, you're heavy..."
1004705-286 = "[s] \"Oh! S-Sorry, Chise!\""
1004705-290 = "[ns7] \"I'm sorry I acted like that. I was flustered.\"\n[ns8] \"Did you get hurt anywhere? You okay?\""
1004705-293 = "It's okay."
1004705-294 = "I'm okay."
1004705-295 = "But, Sensei. I found my sparkles."
1004705-296 = "[s] \"Sparkles? Oh, I did see lights flicker.\""
1004705-297 = "No, no. Not that."
1004705-298 = "The sparkles I've been looking for showed up right in front of me."
1004705-299 = "Ah!"
1004705-300 = "And then I realized..."
1004705-301 = "Real sparkles aren't so far away..."
1004705-302 = "[s] \"Huh?\""
1004705-303 = "The chain letter was fake, like you said, but..."
1004705-304 = "Maybe not everything was a lie."
1004705-305 = "[s] \"What do you mean, Chise?\""
1004705-306 = "Heehee."
1004705-307 = "It's a secret, Sensei!"
1004705-309 = "Chise could be hard to understand at times."
1004705-313 = "But she seemed to be feeling better, and we stayed up all night and talked until sunrise."

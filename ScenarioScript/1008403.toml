1008403-12 = "2;코타마 캠핑;07;아.\n#2;stiff"
1008403-13 = "2;코타마 캠핑;04;그게 그러니까…… 오해입니다.\n#2;em;[땀]\n#2;m3"
1008403-14 = "[s] \"……또 사람들의 목소리를 녹음하러 온 거야?\""
1008403-15 = "2;코타마 캠핑;07;그렇지 않습니다! 오늘만큼은 그런 목적으로 산에 온 게 아닙니다……!\n#2;hophop"
1008403-16 = "[s] \"하지만 손에 또 녹음기가 들려 있는 걸……\""
1008403-17 = "2;코타마 캠핑;04;이건 그러니까……\n#2;em;…"
1008403-18 = "2;코타마 캠핑;05;사람들의 목소리가 아닌, 자연의 소리를 녹음하기 위해 가져온 것입니다."
1008403-19 = "[s] \"……자연의 소리?\""
1008403-20 = "2;코타마 캠핑;02;네. 산에서는 새 울음소리나 물 흐르는 소리, 바람 소리처럼 심신을 안정시키는 데 도움이 되는 자연의 소리를 다양하게 들을 수 있으니까요.\n#2;em;[반응]"
1008403-21 = "2;코타마 캠핑;01;제가 즐겨 듣는 ASMR 음원에도 이런 환경음이 제법 수록되어 있답니다."
1008403-22 = "2;코타마 캠핑;06;하지만 이런 환경음들은 보통 직접 녹음하기가 어렵기 때문에, 웹 상에 공유되는 무료 에셋을 가져다 쓰는 경우가 많아서……\n#2;em;[속상함]\n#2;stiff"
1008403-23 = "2;코타마 캠핑;00;새로운 자극을 얻기 위해 직접 환경음을 녹음하러 산을 찾아왔습니다."
1008403-24 = "[s1] \"그건 좋은 생각이네.\"\n[s2] \"코타마 답지 않게 건전한 발상인걸……\""
1008403-25 = "#wait;1000"
1008403-26 = "2;코타마 캠핑;07;무, 무슨 말씀을 하시는지 잘 모르겠습니다만……\n#2;em;[땀]"
1008403-27 = "[s] \"그래서 오늘은 어떤 소리를 녹음하러 온 거야?\""
1008403-28 = "2;코타마 캠핑;04;요즈음 같은 겨울 산에서 들을 수 있는 소리라면, 겨울 산새 소리나 눈 밟는 소리도 나쁘지 않지만……"
1008403-29 = "2;코타마 캠핑;99;역시 추운 겨울의 정취를 살리기 위해서라면 모닥불이 타오르는 소리를 빼놓을 수 없지요.\n#2;em;…"
1008403-30 = "2;코타마 캠핑;01;따듯한 담요를 두른 채 모닥불이 타오르는 소리를 듣고 있노라면, 벽난로 앞에 앉아 있는 느낌이 들어 잠도 솔솔 잘 오니까요."
1008403-31 = "2;코타마 캠핑;03;오늘은 이곳에서 작은 모닥불을 피운 다음, 그 소리를 녹음하려 합니다.\n#2;greeting"
1008403-32 = "[s] \"이곳에서 불을 피워도 괜찮은 거야?\""
1008403-33 = "2;코타마 캠핑;02;네, 근처의 시설에 미리 문의하고 왔습니다. 야영장과 이어진 이 주변에서는 불을 피워도 괜찮다고 하는군요.\n#2;em;[반응]"
1008403-34 = "2;코타마 캠핑;00;그리고 혹시 모를 사태를 대비해 소화 장비도 함께 챙겨 왔습니다."
1008403-35 = "[s] \"준비성이 철저하네.\""
1008403-36 = "2;코타마 캠핑;99;……괜한 소란으로 음원에 잡음이 섞여 들어가는 건 원치 않으니까요."

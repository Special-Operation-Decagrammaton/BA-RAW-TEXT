[translation]
1008403-1 = "天籟之音（１）"
1008403-4 = "（又到了週末，打算再去附近的山上爬山……）"
1008403-7 = "（……沒想到竟然又碰上了小玉）"
1008403-8 = "[s]「小玉……」"
1008403-12 = "啊。"
1008403-13 = "你聽我說……這是誤會。"
1008403-14 = "[s]「……這次也是跑來偷錄別人對話的嗎？」"
1008403-15 = "才不是！我今天真的不是為了那個才來山上……！"
1008403-16 = "[s]「可是你今天也帶了錄音機……」"
1008403-17 = "帶這個來……"
1008403-18 = "不是想錄別人的對話，而是大自然的聲音。"
1008403-19 = "[s]「……大自然的聲音？」"
1008403-20 = "沒錯，像是鳥叫聲、水流聲和風聲等等……#n山裡面有各式各樣能夠撫慰身心靈的自然雜音。"
1008403-21 = "我平時聽的ASMR音樂裡也收錄了很多類似的環境音。"
1008403-22 = "但是這種環境音很難自己錄製，所以我通常都是使用網路上分享的免費檔案……"
1008403-23 = "不過為了尋找新的刺激，我決定親自來山裡進行錄製。"
1008403-24 = "[s1]「這個點子聽起來不錯。」\n[s2]「這麼正常的點子還真不像是你想出來的……」"
1008403-26 = "我，我聽不懂老師的意思……"
1008403-27 = "[s]「所以你今天想錄什麼樣的聲音呢？」"
1008403-28 = "以冬季來說，山間的鳥叫聲和人們的踩雪聲都不錯……"
1008403-29 = "但如果想要增添寒冬的氛圍，那就少不了營火燃燒時劈哩啪啦的聲音。"
1008403-30 = "蓋著溫暖的毛毯，一邊聽著營火燃燒的聲音……#n就會感覺自己彷彿坐在壁爐前，睡意也會慢慢湧現。"
1008403-31 = "因此我今天打算在這裡搭一個小篝火，然後錄下它燃燒時的聲音。"
1008403-32 = "[s]「在這裡生火沒關係嗎？」"
1008403-33 = "嗯，我已經事先到附近的設施問過了。#n他們說營地旁邊的這塊空地可以生火。"
1008403-34 = "而且為了預防意外，我也帶了滅火裝備過來。"
1008403-35 = "[s]「你準備得很齊全呢。」"
1008403-36 = "……因為我不想引發不必要的騷動，導致錄音檔裡出現雜音。"
1008403-40 = "好，那我們就趕快去收集乾樹枝，正式開始生火吧。"
1008403-43 = "收集好容易點燃的乾樹葉和乾樹枝之後，把它們堆成三角形……"
1008403-47 = "接著在固定的木板上直直擺上一根細棍……"
1008403-48 = "然後用雙手迅速地摩擦……"
1008403-53 = "[ns]「你先等等。」"
1008403-57 = "怎麼了，老師？"
1008403-58 = "等等開始錄音之後，我就沒辦法回答你了。#n假如你有任何問題的話，請你盡快提出。"
1008403-59 = "[s3]「其實也不是什麼問題啦……」\n[s4]「只是如果要生火的話，用火柴或打火機不是更方便嗎？」"
1008403-62 = "只是要生火的話，用那些工具的確更有效率……"
1008403-63 = "但如果想要完整錄下零星火苗逐漸演變成熊熊烈火的過程，#n那麼摩擦生火是最好的方法。"
1008403-64 = "而且很多ASMR愛好者，都喜歡用指甲抓樹木之類粗糙材質的表面所發出的聲音，#n所以如果省略這個過程的話，肯定會讓人覺得可惜。"
1008403-65 = "[s]「既然你都這麼說了，我也不會阻止你……」"
1008403-69 = "好，那就重新集中精神來生火吧。"
1008403-71 = "（約莫三十分鐘後……）"
1008403-78 = "唔……呃呃呃……"
1008403-82 = "為什麼不只沒看到火苗，甚至連一點煙都沒有呢……"
1008403-83 = "我的手臂都開始麻了……"
1008403-84 = "[s]「小玉，你發出聲音了。」"
1008403-88 = "……啊。"
1008403-89 = "糟糕，這部分之後得剪掉才行……"
1008403-90 = "[s]「要不要放棄原本的計畫，改用火柴來生火？」"
1008403-95 = "不行！"
1008403-96 = "用那種人工方式生火是錄不到大自然最原始的聲音的！"
1008403-97 = "而且要是現在放棄的話……我們至今為止的努力就全部白費了。"
1008403-98 = "只……只要再努力一下下……！"
1008403-100 = "（……然而又過了一個多小時，小玉還是沒能成功生出火來）"
1008403-104 = "……"
1008403-105 = "…………"
1008403-106 = "[s5]「好像越來越冷了……」\n[s6]「要，要我幫你點火嗎？」"
1008403-113 = "嗯……麻煩你了。"
1008403-119 = "……真溫暖呢。"
1008403-120 = "[s]「真溫暖呢……」"
1008403-121 = "沒想到藉助文明的力量就能輕易獲得的溫暖，在野外環境下竟然這麼難取得……"
1008403-122 = "看來現實的大自然是很殘酷的呢……"
1008403-124 = "（之後和小玉一邊感受著大自然的殘酷，一邊坐在火邊烤火）"

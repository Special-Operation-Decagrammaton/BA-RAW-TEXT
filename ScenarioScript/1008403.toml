[translation]
1008403-1 = "The Sound of Nature 1"
1008403-4 = "The next weekend, I returned to the mountain for another easy hike."
1008403-7 = "Kotama was there as well."
1008403-8 = "[s] \"Kotama...\""
1008403-12 = "Ah."
1008403-13 = "Uh, it's not what it looks like."
1008403-14 = "[s] \"Looks like you're recording people's voices again.\""
1008403-15 = "Absolutely not! I would never return to the mountain to do such a thing!"
1008403-16 = "[s] \"So that voice recorder is for capturing bird songs then?\""
1008403-17 = "Yes. You see..."
1008403-18 = "...Today I'm here to capture the sounds of nature! Birds, squirrels, everything!"
1008403-19 = "[s] \"The sounds of nature, huh?\""
1008403-20 = "Yes. People have always used the sounds of birds chirping, water flowing, or the wind blowing to calm themselves."
1008403-21 = "Even my favorite ASMR soundtracks have some outdoor ambience mixed in."
1008403-22 = "But those kinds of ambient noises are hard to find. Normally I just get them from sound libraries uploaded to the internet, but those can sound kind of fake..."
1008403-23 = "That's why I came to this mountain. To record the sounds of nature that inspire me!"
1008403-24 = "[s1] \"DIY nature sounds, huh? Makes sense.\"\n[s2] \"How very wholesome of you.\""
1008403-26 = "You don't sound convinced."
1008403-27 = "[s] \"So what sounds do you plan on recording today?\""
1008403-28 = "I'm putting together a wintry mountain track, so the song of mountain birds or footsteps on snow would be lovely."
1008403-29 = "Oooh, maybe throw in the crackle of a campfire to mark a contrast against the cold of winter."
1008403-30 = "Listening to a roaring fire under a cozy blanket makes you feel like you're at a real campsite, ready to nap."
1008403-31 = "Which is why I plan to start a fire, then record those sounds as well."
1008403-32 = "[s] \"Are you sure it's okay to start a fire here?\""
1008403-33 = "Yes, I already got permission from the authorities. They said as long as it's at a campsite, it's all right."
1008403-34 = "I even brought a fire extinguisher in case things get out of hand."
1008403-35 = "[s] \"Safety first, huh?\""
1008403-36 = "It's more...I don't want the sound of people panicking to ruin my recording."
1008403-40 = "Now, wanna grab some twigs and get this fire started?"
1008403-43 = "First, place the dry leaves and twigs in a cone shape."
1008403-47 = "Hold one stick perpendicular to a fixed wooden board."
1008403-48 = "Then I'll rub my hands together with the stick between them."
1008403-53 = "[ns] \"Oh no.\""
1008403-57 = "What's the matter, Sensei?"
1008403-58 = "We can't talk once I start recording, so if there's a problem we need to fix it now."
1008403-59 = "[s3] \"This will take a while, do you have any matches?\"\n[s4] \"I can lend you my lighter if you'd like.\""
1008403-62 = "That would be the most efficient way to start a fire..."
1008403-63 = "But friction-based ignition is more pleasing audibly, as we'll get to hear an ember blossom into a raging flame."
1008403-64 = "Many ASMR enthusiasts also enjoy the sound of scratchy material. My people would be disappointed if I skipped this part of the process."
1008403-65 = "[s] \"If you say so...\""
1008403-69 = "Now then, let's make some sparks."
1008403-71 = "About thirty minutes later..."
1008403-78 = "*huff* Ugh."
1008403-82 = "Forget sparks. I'm not even getting any smoke."
1008403-83 = "And my arms are going numb."
1008403-84 = "[s] \"Kotama, you're still recording right now.\""
1008403-88 = "...Oh."
1008403-89 = "My mistake. I'll fix it in post."
1008403-90 = "[s] \"How about we just use a match?\""
1008403-95 = "Absolutely not!"
1008403-96 = "You can't make an artificial fire then call that the sound of nature!"
1008403-97 = "Besides, if we give up here...all my efforts so far will be meaningless."
1008403-98 = "Just a little more!"
1008403-100 = "An hour passed and Kotama still hadn't started a fire."
1008403-104 = "..."
1008403-105 = "..."
1008403-106 = "[s5] \"It's getting pretty cold out here...\"\n[s6] \"Do you want me to light it for you?\""
1008403-113 = "Go ahead."
1008403-119 = "...It's warm."
1008403-120 = "[s] \"Very.\""
1008403-121 = "It's so easy to make a fire back home, but a nightmare out in the wild. Who'd have thunk..."
1008403-122 = "I guess what they say is true. Nature is ruthless..."
1008403-124 = "Kotama and I basked in the fire's glow, pondering the harshness of the natural world."

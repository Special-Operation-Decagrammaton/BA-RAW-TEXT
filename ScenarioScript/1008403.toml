[translation]
1008403-1 = "เสียงของธรรมชาติ 1"
1008403-4 = "(สุดสัปดาห์ต่อมา คุณครูก็ไปที่ภูเขาใกล้ๆ เพื่อปีนเขาอีกครั้งหนึ่ง...)"
1008403-7 = "(และได้เจอโคทามะอีกรอบ)"
1008403-8 = "[s] \"โคทามะ...\""
1008403-12 = "อ๊ะ"
1008403-13 = "ไม่ใช่นะคะ... เข้าใจผิดแล้วค่ะ"
1008403-14 = "[s] \"มาบันทึกเสียงคนอื่นอีกแล้วเหรอ?\""
1008403-15 = "ไม่ใช่ค่ะ! วันนี้ฉันไม่ได้มาด้วยจุดประสงค์นั้นค่ะ...!"
1008403-16 = "[s] \"แต่ว่าอันที่อยู่ในมือคือเครื่องบันทึกเสียงนะ...\""
1008403-17 = "เอ่อ คือว่า..."
1008403-18 = "ฉันไม่ได้เอามาบันทึกเสียงคนคุยกัน แต่เอามาเพื่อบันทึกเสียงธรรมชาติค่ะ"
1008403-19 = "[s] \"เสียงธรรมชาติ?\""
1008403-20 = "ใช่ค่ะ ก็พออยู่ในภูเขา เราจะได้ยินเสียงนกร้อง เสียงน้ำไหล เสียงลมพัด และเสียงอื่นๆ ของธรรมชาติ#nที่ช่วยให้ร่างกายและจิตใจสงบได้นี่คะ"
1008403-21 = "เสียง ASMR ที่ฉันชอบฟังก็มีเสียงแบบนี้อยู่เหมือนกันค่ะ"
1008403-22 = "แต่ปกติแล้วเสียงของธรรมชาติแบบนี้จะหาบันทึกได้ยาก ส่วนใหญ่ก็เลยจะไปดูดไฟล์ฟรี#nบนอินเทอร์เน็ตกัน..."
1008403-23 = "ฉันก็เลยมาที่ภูเขาเพื่อบันทึกเสียงธรรมชาติด้วยตัวเอง เพื่อเป็นการหาสิ่งเร้าใหม่น่ะค่ะ"
1008403-24 = "[s1] \"เป็นความคิดที่ดีเลยนะ\"\n[s2] \"เป็นความคิดสร้างสรรค์ที่ดูไม่ค่อยเป็นโคทามะเลย...\""
1008403-26 = "มะ... ไม่เห็นเข้าใจเลยค่ะว่าคุณครูพูดถึงอะไร..."
1008403-27 = "[s] \"แล้ววันนี้มาบันทึกเสียงอะไรเหรอ?\""
1008403-28 = "เสียงที่ได้ยินบนภูเขาในฤดูหนาวแบบนี้ก็คงจะเป็นเสียงนกร้อง หรือไม่ก็เสียงเวลาเดินเหยียบหิมะ..."
1008403-29 = "แต่ถ้าจะชูกลิ่นอายของฤดูหนาวที่อากาศหนาวเย็นแล้ว เสียงของกองไฟเป็นอะไรที่ขาดไม่ได้เลยค่ะ"
1008403-30 = "ถ้าได้เอาผ้าอุ่นๆ คลุมตัวไว้แล้วนั่งฟังเสียงกองไฟ ก็จะให้ความรู้สึกเหมือนได้นั่งอยู่หน้าเตาผิงติดผนัง แล้วก็จะเคลิ้มหลับได้ง่าย"
1008403-31 = "วันนี้ฉันก็เลยจะก่อกองไฟเล็กๆ ที่นี่ แล้วบันทึกเสียงจากกองไฟดูค่ะ"
1008403-32 = "[s] \"ก่อกองไฟที่นี่ได้เหรอ?\""
1008403-33 = "ค่ะ ฉันไปถามมาแล้วค่ะ ถ้าอยู่รอบๆ ลานตั้งแคมป์ เราสามารถก่อกองไฟได้ค่ะ"
1008403-34 = "แต่ฉันก็เตรียมอุปกรณ์ดับเพลิงมาเผื่อเกิดสถานการณ์ไม่คาดคิดด้วยนะคะ"
1008403-35 = "[s] \"เตรียมตัวมาดีเชียวนะ\""
1008403-36 = "ฉันไม่อยากให้เกิดความวุ่นวายจนมีเสียงอื่นแทรกเข้าไปน่ะค่ะ"
1008403-40 = "งั้นเราไปรวบรวมกิ่งไม้แห้งมาจุดไฟกันเลยดีมั้ยคะ?"
1008403-43 = "เอาใบไม้กับกิ่งไม้แห้งที่ติดไฟง่ายมาก่อเป็นทรงสามเหลี่ยม..."
1008403-47 = "จากนั้นก็วางท่อนไม้ให้ตั้งฉากกับแผ่นไม้..."
1008403-48 = "แล้วก็ใช้มือทั้งสองข้างถูกันเร็วๆ..."
1008403-53 = "[ns] \"เดี๋ยวๆ\""
1008403-57 = "มีอะไรเหรอคะ คุณครู?"
1008403-58 = "ถ้าเริ่มบันทึกเสียงแล้วฉันจะพูดตอบอะไรไม่ได้ ถ้ามีปัญหาอะไรก็ขอให้รีบบอกเลยนะคะ"
1008403-59 = "[s3] \"ก็ใช่ว่าจะเป็นปัญหาหรอกนะ...\"\n[s4] \"แต่ถ้าจะจุดไฟ เราใช้ไม้ขีดไฟหรือไฟแช็กไม่ดีกว่าเหรอ?\""
1008403-62 = "แน่นอนว่านั่นเป็นวิธีที่มีประสิทธิภาพที่สุดในการก่อกองไฟค่ะ..."
1008403-63 = "แต่เพื่อบันทึกเสียงประกายไฟขนาดเล็กที่ค่อยๆ ลุกลามไปเป็นกองไฟขนาดใหญ่ ฉันว่าการจุดไฟด้วย#nการเสียดสีจะเหมาะสมที่สุดค่ะ"
1008403-64 = "นอกจากนี้ในหมู่คนที่ชอบเสียง ASMR มีหลายคนที่ชอบเสียงขูดวัสดุหยาบๆ เช่น เสียงขูดไม้อยู่ด้วย ถ้าเราตัดขั้นตอนนี้ไป ก็จะมีคนจำนวนมากที่เสียดายที่ไม่ได้ฟังค่ะ"
1008403-65 = "[s] \"ถ้าโคทามะคิดอย่างนั้น ครูก็ไม่อยากขัดหรอกนะ...\""
1008403-69 = "ถ้างั้นฉันจะไปจดจ่อกับการจุดไฟอีกครั้งนะคะ"
1008403-71 = "(30 นาทีต่อมา...)"
1008403-78 = "อะ... โอยย..."
1008403-82 = "อย่าว่าแต่ประกายไฟเลยค่ะ แค่ควันยังไม่มีให้เห็นเลย..."
1008403-83 = "ฉันว่าแขนฉันเริ่มชาแล้วค่ะ..."
1008403-84 = "[s] \"โคทามะ พูดแทรกเข้ามาแล้วนะ\""
1008403-88 = "อ๊ะ..."
1008403-89 = "พลาดจนได้ ไว้ต้องไปตัดต่อเสียงพูดตรงนี้ออก..."
1008403-90 = "[s] \"ครูว่าเรายอมแพ้ แล้วมาใช้ไม้ขีดไฟกันดีกว่ามั้ย?\""
1008403-95 = "ไม่ได้ค่ะ!"
1008403-96 = "ถ้าจุดไฟด้วยวิธีที่มนุษย์คิดค้นขึ้น ก็จะไม่ใช่การบันทึกเสียงของธรรมชาติสิคะ!"
1008403-97 = "และถ้ามายอมแพ้ตอนนี้... ความพยายามที่ผ่านมาของเราก็จะไม่มีความหมายค่ะ"
1008403-98 = "อีกนิดเดียวค่ะ... ออกแรงเพิ่มอีกนิดเดียว...!"
1008403-100 = "(แต่โคทามะก็ยังจุดไฟไม่ติดอยู่อีกเป็นชั่วโมง...)"
1008403-104 = "..."
1008403-105 = "......"
1008403-106 = "[s5] \"แต่อากาศเริ่มเย็นลงเรื่อยๆ แล้วนะ...\"\n[s6] \"ให้ครูช่วยจุดให้มั้ย?\""
1008403-113 = "ค่ะ รบกวนด้วยค่ะ..."
1008403-119 = "อุ่นจังเลยค่ะ..."
1008403-120 = "[s] \"อุ่นดีจัง...\""
1008403-121 = "ความอบอุ่นที่ใช้ประโยชน์จากอารยธรรมนี่ได้มาอย่างง่ายดาย แต่ความอบอุ่นที่สร้างด้วยมือของ#nตัวเอง มันช่างยากเย็น..."
1008403-122 = "ธรรมชาติในความเป็นจริง... ไม่ใจดีกับเราเลยนะคะ"
1008403-124 = "(หลังจากนั้นคุณครูกับโคทามะก็พูดคุยเรื่องธรรมชาติและนั่งผิงไฟด้วยกัน)"

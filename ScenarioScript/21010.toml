[translation]
21010-1 = "ตอนที่ 1;จุดเริ่มต้นการผจญภัย"
21010-2 = "......"
21010-4 = "ได้ยินไหมคะ? ได้ยินเสียงของฉันไหม?"
21010-6 = "อยู่ที่นั่นเหรอคะ? จะช่วยโลกนี้..."
21010-11 = "ท่านผู้กล้า"
21010-12 = "ฉันกำลังรอคุณอยู่เลย"
21010-13 = "ยามที่โลกกำเนิดขึ้นครั้งแรก มีเผ่าฟ้าและเผ่าปีศาจ..."
21010-14 = "......"
21010-15 = "คัท คัท!"
21010-16 = "ไม่ได้สิ! แบบนี้มันเก่าคร่ำครึไปหน่อย! ขืนเป็นแบบนี้ได้เจ๊งตั้งแต่เปิดตัวแน่!"
21010-17 = "ถ้าฉันเป็นผู้เล่น คงอยากจะลบเกมนี้ตั้งแต่ได้เห็นข้อความนี้แล้ว"
21010-18 = "เอาใหม่ คิดใหม่! ฮึ่ม..."
21010-20 = "ท่านผู้กล้า ฉันกำลังรอคุณอยู่เลย"
21010-21 = "ชื่อของฉันก็คือ เทพธิดา 'โมโมเรีย'"
21010-23 = "ตอนนี้โลก 'มิลเลเนียมแลนด์' ของเราตกอยู่ในวิกฤตที่ไม่เคยมีมาก่อน"
21010-24 = "ผู้ที่จะฝ่าวิกฤตนี้ไปได้ และช่วยชมรมพัฒนาเกม ไม่สิ.. ช่วยมิลเลเนียมแลนด์จากคำสั่งปิด#nของสภานักเรียน... มีแค่คุณคนเดียวเท่านั้น"
21010-25 = "นี่อาจจะดูเป็นชะตากรรมที่โหดร้าย แต่ฉันจำเป็นที่จะต้องขอร้องคุณ"
21010-27 = "ตอนนี้เราไม่รู้เลยว่า..."
21010-28 = "จะมีความยากลำบากอะไรรอคุณอยู่ในการผจญภัยที่จะเริ่มขึ้น"
21010-29 = "แต่ถึงอย่างนั้นก็ตาม... ได้โปรดอย่าละทิ้งความกล้าหาญของคุณ"
21010-30 = "เพราะยังมีเด็กสาวมากมายที่จะร่วมทางไปกับท่านผู้กล้า"
21010-32 = "แต่ในโลกใบใหม่ คุณจะไม่ใช่ 'ผู้กล้า' ของเด็กสาวเหล่านี้..."
21010-34 = "คุณจะถูกเรียกด้วยชื่อใหม่ที่พิเศษยิ่งกว่า"
21010-36 = "และชื่อที่ยิ่งใหญ่นั้นก็คือ..."
21010-39 = "คุณครู!"
21010-41 = "???"
21010-42 = "......"
21010-43 = "[s1] \"ไม่เคยเห็นเพดานนี้เลย...\"\n[s2] \"ที่นี่ที่ไหน...?\""
21010-44 = "ว้าว! คุณครูลืมตาแล้ว!"
21010-45 = "ว้าว! คุณครูลืมตาแล้ว!"
21010-46 = "ได้สติแล้วเหรอ? นี่ถือว่าโชคดีนะเนี่ย!"
21010-48 = "อย่าพูดอะไรเพ้อเจ้อเลยน่า คุณครูตกใจหมดแล้ว"
21010-49 = "ฮิฮิ ก็ฉันดีใจนี่นา~ คุณครูไม่เป็นอะไรใช่ไหม? นึกว่าจะนอนสลบไสลไปแล้วซะอีก"
21010-50 = "โล่งอกไปทีค่ะ ตอนที่เห็นพี่โมโมอิขว้างเครื่องเล่นไพล์สเตชั่นทะลุหน้าต่างไปโดนหัวคุณครูเข้าแบบนั้น#nฉันนึกว่าพี่จะต้องเป็นผู้ต้องสงสัยในคดีฆาตกรรมแล้วล่ะค่ะ"
21010-51 = "ฉันต้องขอโทษแทนพี่ด้วยนะคะ"
21010-52 = "ฮึ่ม! แต่ตอนที่ฉันบอกว่า \"ฉันน่าจะปาไปโดนคุณครูที่เดินผ่านไปนะ\" เธอเองไม่ใช่เหรอที่ถามกลับ#nมาว่า \"เครื่องเล่นไพล์สเตชั่นเป็นอะไรหรือเปล่า?\""
21010-53 = "ก็... ก็นั่นมันเป็นสมบัติอันดับ 1 ของชมรมพัฒนาเกมของเรานี่นา ฉันก็เลยถามไปอย่างอัตโนมัติ..."
21010-54 = "อะ... เอาเถอะน่า!!"
21010-55 = "คุณครูมาจากชาเล่ต์ใช่ไหมคะ?"
21010-56 = "ว้าว! จริงเหรอเนี่ย?! แสดงว่าอ่านจดหมายของเราใช่มั้ย? นึกว่าจะแค่อ่านไปเฉยๆ ซะอีก#nไม่อยากเชื่อเลยว่าจะมาหากันถึงที่นี่ด้วย!"
21010-57 = "[s] \"จดหมาย…?\""
21010-59 = "สำนักงานชาเล่ต์"
21010-60 = "มีคำขอมาจากมิลเลเนียมค่ะ"
21010-61 = "ส่งมาจาก... ชมรมพัฒนาเกมมิลเลเนียม? แหะๆ หนูจะลองอ่านดูนะคะ"
21010-62 = "\"ตอนนี้ชมรมพัฒนาเกมตกอยู่ในวิกฤตอันใหญ่หลวงค่ะ พวกเรากำลังจะถูกทำลายด้วยคำสั่งปิด#nจากสภานักเรียน มีเพียงคุณเท่านั้นที่เราจะขอความช่วยเหลือได้ ท่านผู้กล้า ได้โปรดช่วยเหลือ#nพวกเราด้วยนะคะ!\""
21010-63 = "อะฮ่ะฮ่า... นี่เป็นทั้งจดหมายที่เร่งด่วนและน่าสนุกที่สุดเท่าที่ได้รับมาเลยนะคะ"
21010-64 = "จริงสิ คุณครูรู้เกี่ยวกับโรงเรียนวิทย์มิลเลเนียม... ไหมคะ?"
21010-65 = "[s3] \"รู้สิ\"\n[s4] \"ไม่รู้หรอก\""
21010-66 = "จริงๆ คุณครูก็อาจจะรู้อยู่แล้ว..."
21010-67 = "ทรีนิตี้ เกเฮนน่า และมิลเลเนียมคือ 3 โรงเรียนขนาดใหญ่ของคิโวทอส"
21010-68 = "โรงเรียนมิลเลเนียมถูกเรียกว่าเป็นโรงเรียนวิทย์ฯ เพราะพวกเขาให้ความสำคัญกับตรรกะ#nและเทคโนโลยีมากกว่าโรงเรียนอื่น"
21010-69 = "เรียกได้ว่าเป็นโรงเรียนของนักเรียนสายวิทยาศาสตร์และวิศวกรรมศาสตร์ที่โดดเด่น#nในด้านวิทยาศาสตร์และการวิจัยเลยล่ะค่ะ"
21010-70 = "เมื่อเทียบกับอีก 2 โรงเรียนดั้งเดิมแล้ว มิลเลเนียมถือเป็นโรงเรียนที่มีประวัติศาสตร์ไม่ยาวนาน#nแต่ก็มีอิทธิพลมากเลยล่ะค่ะ"
21010-71 = "เพราะเทคโนโลยีที่ใหม่และล้ำสมัยของคิโวทอสก็พัฒนามาจากมิลเลเนียมเป็นเสียส่วนใหญ่"
21010-72 = "อยากรู้จังเลยค่ะว่านักเรียนที่นั่นกำลังเจอเข้ากับปัญหาอะไรกันนะคะ?"
21010-73 = "ทรีนิตี้ เกเฮนน่า และมิลเลเนียมคือ 3 โรงเรียนขนาดใหญ่ของคิโวทอส"
21010-74 = "โรงเรียนมิลเลเนียมถูกเรียกว่าเป็นโรงเรียนวิทย์ฯ เพราะพวกเขาให้ความสำคัญกับตรรกะ#nและเทคโนโลยีมากกว่าโรงเรียนอื่น"
21010-75 = "เรียกได้ว่าเป็นโรงเรียนของนักเรียนสายวิทยาศาสตร์และวิศวกรรมศาสตร์ที่โดดเด่น#nในด้านวิทยาศาสตร์และการวิจัยเลยล่ะค่ะ"
21010-76 = "เมื่อเทียบกับอีก 2 โรงเรียนดั้งเดิมแล้ว มิลเลเนียมถือเป็นโรงเรียนที่มีประวัติศาสตร์ไม่ยาวนาน#nแต่ก็มีอิทธิพลมากเลยล่ะค่ะ"
21010-77 = "เพราะเทคโนโลยีที่ใหม่และล้ำสมัยของคิโวทอสก็พัฒนามาจากมิลเลเนียมเป็นเสียส่วนใหญ่"
21010-78 = "ถ้าสงสัยว่าเกิดอะไรขึ้นที่นั่นก็ลองไปดูหน่อยไหมคะ?"
21010-79 = "......"
21010-81 = "ชมรมพัฒนาเกมมิลเลเนียม"
21010-82 = "คุณครู! ยินดีต้อนรับสู่ชมรมพัฒนาเกมนะ!"
21010-83 = "ดีใจจังเลยค่ะที่คุณครูมาที่นี่"
21010-84 = "ฉันคือโมโมอิ! เป็นนักเขียนบทของชมรมพัฒนาเกม!"
21010-85 = "ส่วนฉันคือมิโดริ เป็นนักออกแบบและรับผิดชอบเรื่องกราฟิกของเกมค่ะ"
21010-86 = "แล้วเราก็มีหัวหน้ายูสึที่เป็นแพลนเนอร์อีกคนหนึ่ง ถึงจะไม่อยู่ก็เถอะ..."
21010-87 = "นี่แหละชมรมพัฒนาเกมของเรา!"
21010-88 = "วะฮ่ะฮ่า! คุณครูอยู่ที่นี่แล้ว เราคงไปที่ 'พื้นที่รกร้าง' ได้แล้วล่ะ!"
21010-89 = "[s5] \"พื้นที่รกร้าง…?\"\n[s6] \"อธิบายสถานการณ์หน่อยสิ\""
21010-90 = "จริงสิ ฉันควรอธิบายสถานการณ์ก่อน"
21010-91 = "อื้ม!"
21010-92 = "ชมรมพัฒนาเกมของเราพัฒนาเกม 16 บิตอยู่อย่างสงบมาโดยตลอด"
21010-93 = "แต่อยู่มาวันหนึ่ง! เราก็ถูกสภานักเรียนบุกเข้ามา!"
21010-94 = "ไม่กี่วันมานี้ 'ยูกะ' ที่เป็น 1 ใน 4 จตุรเทพแห่งสภานักเรียนได้เข้ามายื่นคำขาดครั้งสุดท้ายกับพวกเรา"
21010-95 = "[s] \"ยื่นคำขาดครั้งสุดท้าย?\""
21010-96 = "ตรงนี้ฉันจะเป็นคนอธิบายเองค่ะ"
21010-97 = "สะ... เสียงนี้มัน?!"
21010-99 = "ตอนต่อไป;นักบัญชีแห่งเซมิน่า ยูกะ"

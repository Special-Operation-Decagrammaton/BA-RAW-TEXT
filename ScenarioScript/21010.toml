21010-2 = "..."
21010-4 = "Can you hear my voice?"
21010-6 = "Are you there? You are the hero who will..."
21010-11 = "...save the world."
21010-12 = "I've been waiting for you."
21010-13 = "In the beginning, the Celestials and Demons..."
21010-14 = "..."
21010-15 = "Cut! Cut!"
21010-16 = "This is way too cliche! It's so lame right off the bat!"
21010-17 = "If I bought a game that started this lame, I'd be returning it before I even got an hour in!"
21010-18 = "Let's go again! Ahem."
21010-20 = "I've been waiting for you, hero."
21010-21 = "I am the goddess known as Momoria."
21010-23 = "Our world, Millenneapolis, is now on the brink of an unprecedented crisis."
21010-24 = "You are the only one who can overcome this crisis and save the Game Development Department...I mean, Millenneapolis."
21010-25 = "This may be a difficult truth to accept, but I beg of you."
21010-27 = "The adventure ahead will be difficult."
21010-28 = "You may face untold trials and hardship..."
21010-29 = "...but, please, don't lose courage."
21010-30 = "Your maidens will always be by your side."
21010-32 = "You are more than just a hero to the young ladies of this new world."
21010-34 = "They will call you by a title even more special."
21010-36 = "That great title is..."
21010-39 = "Sensei!"
21010-41 = "???"
21010-42 = "..."
21010-43 = "[s1] \"An unfamiliar ceiling...\"\n[s2] \"Where am I?\""
21010-44 = "Wow! Sensei's eyes are open!"
21010-45 = "Wow! Sensei's eyes are open!"
21010-46 = "Are you awake? You got lucky!"
21010-48 = "Don't say weird stuff like that. You're embarrassing Sensei."
21010-49 = "I'm just happy is all. Are you okay, Sensei? I was afraid you'd never wake up."
21010-50 = "Thank goodness. I thought I was an accessory to murder after that FlyStation she threw out the window hit you on the head."
21010-51 = "Let me apologize on her behalf."
21010-52 = "Hmph. Don't act so high and mighty, Midori. When I said, \"I think I hit Sensei!\" the first thing you asked me was, \"Is the FlyStation okay?\""
21010-53 = "Th-That's simply because it's the Game Development Department's most valuable asset. I blurted that out without thinking."
21010-54 = "Um, anyway!"
21010-55 = "So, Sensei. You represent Schale, right?"
21010-56 = "You do?! You must have read our letter! I didn't think you'd really come!"
21010-57 = "[s] \"Letter...?\""
21010-59 = "Schale Executive Office"
21010-60 = "We've received a request from Millennium."
21010-61 = "The sender is...the Millennium Game Development Department? Hmm. I'll read it."
21010-62 = "\"The Game Development Department is fighting for its survival. The Student Council has us cornered, and you're our only hope. Please, hero, save us!\""
21010-63 = "Heehee. This is the most urgent yet funniest request I've ever received."
21010-64 = "Oh. Are you familiar with Millennium Science School, Sensei?"
21010-65 = "[s3] \"Sure am.\"\n[s4] \"Not in the slightest.\""
21010-66 = "You must be."
21010-67 = "It's one of the three biggest academies in Kivotos alongside Trinity and Gehenna."
21010-68 = "Millennium School. They value rationality and technology more than any other school in Kivotos."
21010-69 = "It's a place where students that specialize in science and engineering can gather in the name of research."
21010-70 = "They don't have the long history of the two more traditional academies, but their influence over Kivotos is just as great."
21010-71 = "Millennium is also where the latest and most cutting-edge technologies in Kivotos typically get their start."
21010-72 = "I wonder what would cause the students to request our help."
21010-73 = "It's one of the three biggest academies in Kivotos alongside Trinity and Gehenna."
21010-74 = "Millennium School. They value rationality and technology more than any other school in Kivotos."
21010-75 = "It's a place where students that specialize in science and engineering can gather in the name of research."
21010-76 = "They don't have the long history of the two more traditional academies, but their influence over Kivotos is just as great."
21010-77 = "Millennium is also where the latest and most cutting-edge technologies in Kivotos typically get their start."
21010-78 = "Why not visit and see for yourself?"
21010-79 = "..."
21010-81 = "Millennium Game Development Department"
21010-82 = "Welcome to the Game Development Department, Sensei!"
21010-83 = "We're glad you came."
21010-84 = "I'm Momoi: the department's scenario writer!"
21010-85 = "And I'm Midori: illustrator and the one in charge of all game visuals."
21010-86 = "There's also our president, Yuzu, but she's not here at the moment..."
21010-87 = "Together we make up the Millennium Game Development Department!"
21010-88 = "We can finally explore the ruins now that you're here, Sensei."
21010-89 = "[s5] \"Ruins...?\"\n[s6] \"I'm going to need a summary of what's going on.\""
21010-90 = "Oh, let me explain the situation first."
21010-91 = "Okay!"
21010-92 = "Until recently, the Game Development Department had been creating a 16-bit game in peace."
21010-93 = "Then one day, the Student Council launched its attack!"
21010-94 = "Two days ago, Yuuka, one of the Student Council's Four Divine Beasts, appeared and gave us an ultimatum."
21010-95 = "[s] \"An ultimatum?\""
21010-96 = "Allow me to explain it to you myself."
21010-97 = "I-I know that voice!"
21010-99 = "Next Episode;Seminar Treasurer Yuuka"

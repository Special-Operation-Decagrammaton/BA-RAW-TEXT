[translation]
21010-1 = "第1話;冒險的開始"
21010-2 = "……"
21010-4 = "能聽見，我的聲音嗎……"
21010-6 = "你在那裡嗎？拯救這個世界的──"
21010-11 = "──勇者啊。"
21010-12 = "我一直在等待著，你的到來。"
21010-13 = "現在，我就將一切都告訴你吧。太古，天族和魔族……"
21010-14 = "……"
21010-15 = "卡！卡！卡──！"
21010-16 = "不行不行，太老套了！這樣感覺一發售就要完蛋了！"
21010-17 = "我如果是玩家的話，#n在序章看到這段文字的瞬間就會覺得「啊，還是不要玩好了」的唷！"
21010-18 = "重新再來！唔嗯……"
21010-20 = "……勇者啊，我一直在等著你。"
21010-21 = "我是女神「茉茉莉雅」。"
21010-23 = "我們的世界「千年國度」現在正面臨著前所未有的危機。"
21010-24 = "能夠克服這個危機，從學生會的廢社命令中解救遊戲開發部……#n不對，千年國度的，只有你了。"
21010-25 = "雖然可能會是一段殘酷的道路……儘管如此，還是拜託你了。"
21010-27 = "在你即將開始的，那段冒險的前方……"
21010-28 = "究竟有著什麼樣的試煉和逆境在等著你呢？目前還不清楚。"
21010-29 = "但是……請堅持下去，直到最後也不要失去勇氣。"
21010-30 = "因為在勇者大人的身邊，會有一起共度旅程的少女們陪伴著。"
21010-32 = "在新的世界裡，你將不再被那些少女們稱為「勇者」……"
21010-34 = "而是會有著更加特別、更加合適的稱呼吧。"
21010-36 = "那個名字就是──"
21010-39 = "老師！！"
21010-41 = "？？？"
21010-42 = "……"
21010-43 = "[s1] 「是陌生的天花板……」\n[s2] 「這裡是，哪裡……？」"
21010-44 = "啊，你醒了嗎！？"
21010-45 = "啊，你醒了嗎！？"
21010-46 = "醒過來了嗎？你的運氣還真好啊！"
21010-48 = "不要用奇怪的語氣說話，老師會覺得很困擾的吧。"
21010-49 = "嘿嘿，因為太高興了所以不小心就……#n老師，你還好嗎？我還以為你再也醒不過來了。"
21010-50 = "還真是太好了。姐姐剛才丟到窗外的PrayStation，#n雖然說是巧合但竟然會砸到老師的頭……我還以為要被當成殺人事件的嫌犯了呢。"
21010-51 = "我代替姐姐向你道歉。對不起，老師。"
21010-52 = "哼～綠你還敢說，剛剛我說「好像不小心砸到老師了！？」的時候，#n你是先問「PrayStation還好嗎！？」的對吧。"
21010-53 = "那，那是因為，這是我們遊戲開發部的資產列表第1號，所以才……"
21010-54 = "總，總之！！"
21010-55 = "老師，你是從那個夏萊過來的對吧？"
21010-56 = "哇，真的嗎！？那也就是說你有看到我們寄的信了吧！#n我還以為老師就算看了信也不會過來的呢！"
21010-57 = "[s] 「你說信，是指……」"
21010-59 = "夏萊．辦公室"
21010-60 = "老師，我收到了來自千年科學學園的請求。"
21010-61 = "寄件人是……千年的遊戲開發部？的樣子。我唸出來唷。"
21010-62 = "「遊戲開發部，現在正陷入存亡危機。#n　由於學生會發來了廢部命令，社團的毀滅已經近在眼前了。#n　現在我們能求助的對象只有你了。勇者啊，請救救我們吧！」"
21010-63 = "原來如此，雖然說寫的很有趣……#n不過那份被逼到絕境的感覺很清楚的傳達過來了呢……"
21010-64 = "啊，老師知道千年科學學園的事嗎？"
21010-65 = "[s3] 「嗯，知道一些。」\n[s4] 「有點不太清楚……」"
21010-66 = "這樣啊，千年科學學園就像老師知道的一樣──"
21010-67 = "是和三一、格黑娜並稱為奇普托斯三大學園的大型學校。"
21010-68 = "俗稱為千年。和其他所有學校比起來都更加重視合理跟技術。"
21010-69 = "因為特別擅長科學研究而聚集了很多理科生是一大特點。"
21010-70 = "雖然跟其他兩間傳統名校──三一和格黑娜比起來歷史並不長，#n但影響力可是不會輸給它們的。"
21010-71 = "就算說在奇普托斯能被稱為「最新銳」或「最先進」的東西，#n幾乎都是出自千年學園之手也不為過。"
21010-72 = "在這樣的學校竟然……究竟發生什麼事了呢？"
21010-73 = "那我跟老師說明一下。#n千年科學學園是和三一、格黑娜並稱為奇普托斯三大學園的大型學校。"
21010-74 = "俗稱為千年。和其他所有學校比起來都更加重視合理跟技術。"
21010-75 = "因為特別擅長科學研究而聚集了很多理科生是一大特點。"
21010-76 = "雖然跟其他兩間傳統名校──三一和格黑娜比起來歷史並不長，#n但影響力可是不會輸給它們的。"
21010-77 = "就算說在奇普托斯能被稱為「最新銳」或「最先進」的東西，#n幾乎都是出自千年學園之手也不為過。"
21010-78 = "您認為怎麼樣呢？要去看看嗎？"
21010-79 = "……"
21010-81 = "千年．遊戲開發部"
21010-82 = "重來一次……歡迎來到遊戲開發部，老師！"
21010-83 = "老師光是能過來一趟，我就很開心了。"
21010-84 = "我是遊戲開發部擔任劇本作家的桃井。"
21010-85 = "我是綠，擔任繪師。負責遊戲的整體美術設計。"
21010-86 = "加上現在不在這裡的，擔任企劃的部長柚子……"
21010-87 = "我們就是，千年科學學園的遊戲開發部唷！"
21010-88 = "好的！既然老師都來了，我們就去「廢墟」一趟吧！"
21010-89 = "[s5] 「廢墟……？」\n[s6] 「那個，能再把情況說明的詳細一點嗎？」"
21010-90 = "啊，那就從頭開始說明吧。"
21010-91 = "啊，嗯！"
21010-92 = "是這樣的，首先我們遊戲開發部至今為止都和平地待在這裡，#n製作著16bit遊戲之類的東西。"
21010-93 = "直到有一天……突然被學生會給襲擊了！"
21010-94 = "就在前天，學生會四天王之一的優香對我們下達了最終警告。"
21010-95 = "[s] 「最終警告？」"
21010-96 = "關於這個，就由我來直接說明吧？"
21010-97 = "這，這個聲音是！？"
21010-99 = "下一話;研討會的會計．優香"

[translation]
10036100-1 = "ตอนที่ 10;Yo DJ! Pump This Party!"
10036100-2 = "เปลี่ยนอุปกรณ์บนเวทีแล้วเรียบร้อย"
10036100-3 = "โล่งอกไปทีนะที่เครื่องเล่นแผ่นเสียงของดีเจไม่ได้โดนลูกหลงไปด้วย"
10036100-4 = "ตะ... ตรงที่นั่งผู้ชมก็เรียบร้อยแล้วค่ะ...!"
10036100-8 = "ไม่ต้องมาช่วยกันถึงขนาดนี้ก็ได้..."
10036100-9 = "นี่เป็นงานเทศกาลที่ต้องสนุกด้วยกันนะ อีกอย่าง ยิ่งมีคนช่วยเยอะก็ยิ่งดีไม่ใช่เหรอ?"
10036100-13 = "ส่วนอื่นก็พร้อมแล้ว!"
10036100-14 = "ถึงจะยังค้างคาใจที่จับตัวแขกที่ไม่ได้รับเชิญไม่ได้..."
10036100-15 = "แต่ยังไงคนที่มาก่อกวนในงานก็หนีไปแล้ว จากนี้เรามาสนุกกับงานเทศกาลจริงๆ กันสักทีเถอะ!"
10036100-16 = "อ่า... คือว่า..."
10036100-17 = "ฉันว่าเราต้องเปลี่ยนการแสดงดนตรีของดีเจเป็นอย่างอื่นแทนแล้วละ"
10036100-22 = "ทำไมล่ะ...?"
10036100-24 = "คือว่า... ดีเจ B.o.B เผ่นแน่บไปแล้วตอนที่มีการดวลปืนเมื่อกี้น่ะ"
10036100-25 = "ระหว่างนี้ก็พูดไปด้วยว่า 'แม่จ๋า หนูไม่อยากถูกลักพาตัว~' "
10036100-26 = "ฉันเองก็ยุ่งจนมือเป็นระวิง ก็เลยรั้งเขาไว้ไม่ทัน"
10036100-27 = "แต่โชว์ของดีเจเป็นอีเวนต์หลักที่ทุกคนตั้งตารอเลยนะ!"
10036100-28 = "จบเห่กันแล้วละค่ะ...!"
10036100-29 = "ความทรงจำยามค่ำคืนในฤดูร้อนคงเป็นเรื่องที่เกินตัวพวกเราจริงๆ ด้วยค่ะ!"
10036100-30 = "สุดท้ายเราก็ต้องนอนตัวเหนียวเหนอะ แล้วฟังเสียงคลื่นเศร้าๆ แทนดนตรีสนุกๆ จากดีเจสินะคะ..."
10036100-31 = "แล้วพอน้ำทะเลขึ้น เราก็คงลอยทะเลไปติดที่เกาะร้างที่ไม่มีใครรู้จักด้วยค่ะ...!"
10036100-32 = "รู้แบบนี้ฉันอ่านคอลัมภ์ 'ไอเทมที่ต้องเตรียมไปติดเกาะร้าง' ในนิตยสารฉบับก่อนหน้าไว้ก็ดีสิคะ!"
10036100-33 = "[s] \"เอาละๆ ใจเย็นๆ ก่อน\""
10036100-38 = "คุณคือ... ครูจากชาเล่ต์เหรอ?"
10036100-39 = "พอจะคิดวิธีอะไรดีๆ ได้มั้ย?"
10036100-40 = "[s] \"เราไม่จำเป็นต้องยกเลิกการแสดงของดีเจก็ได้นะ\""
10036100-41 = "มันก็จริงอยู่หรอก ถ้าเราปล่อยเครื่องเล่นแผ่นเสียง ลำโพงกับอุปกรณ์อื่นๆ ไว้เปล่าๆ ก็คงน่าเสียดายแย่"
10036100-42 = "แต่เราก็ไม่มีดีเจที่ใช้งานของพวกนั้นเป็นด้วยนี่?"
10036100-43 = "[s] \"ฮุฮุ เรื่องนั้นไม่ต้องห่วง!\""
10036100-47 = "คะ... ครู? ทำไมถึงผลักฉันมาข้างหน้าล่ะ?"
10036100-48 = "[s] \"นี่ไงล่ะ! ศิษย์เอกดีเจ B.o.B!\""
10036100-49 = "หมายความว่ายังไงน่ะครู?!"
10036100-50 = "จะ... จะให้ฉันไปแสดงดนตรีงั้นเหรอ...?!"
10036100-55 = "[ns1] ขยิบตาให้อีก 3 คน\n[ns2] (ส่งสายตาวิ้งๆ)"
10036100-58 = "...!"
10036100-59 = "อื้ม นั่นสินะ~ อยากเห็นซัตจังเป็นดีเจจังเลย"
10036100-60 = "ชะ... ใช่ค่ะ! ฉันอุตส่าห์ตั้งตารอ ถ้าจะยกเลิกการแสดงดนตรีก็น่าเสียดายนะคะ... แหะๆ"
10036100-61 = "ฉันก็ต้องทำเป็นเนียนตามไปด้วยสินะ...?"
10036100-62 = "[s] \"หืม?! ว่าไงนะ? มิซากิก็อยากดูโชว์จากดีเจงั้นเหรอ?\""
10036100-63 = "ฉันไม่ได้พูดแบบนั้นสักหน่อย!"
10036100-64 = "กะ.... ก็ได้... เราจะยกเลิกอีเวนต์หลักของงานเทศกาลไม่ได้นี่เนอะ"
10036100-66 = "แต่ฉันไม่ใช่ดีเจนะ"
10036100-67 = "ฉันไม่มีความสามารถพอจะทำให้ทุกคนสนุกกันหรอก..."
10036100-68 = "[s] \"ความสามารถไม่สำคัญหรอก ที่สำคัญคืออยากทำหรือเปล่าต่างหากล่ะ\""
10036100-69 = "..."
10036100-70 = "จะมาไม้นี้งั้นเหรอครู?"
10036100-71 = "สิ่งที่ฉันอยากทำ... ก็คือ... ฉัน..."
10036100-75 = "ฉันก็ไม่รู้เหมือนกัน"
10036100-76 = "[s] \"น่าจะรู้นะ?!\""
10036100-77 = "แต่ฉันรู้อยู่หนึ่งอย่าง"
10036100-78 = "สิ่งที่ฉันอยากทำตอนนี้..."
10036100-79 = "อยากสัมผัสความรู้สึกนั้นอีกครั้ง... ความรู้สึกตอนที่ฉันขึ้นไปอยู่บนเวทีเมื่อกี้น่ะ..."
10036100-80 = "ครู ฉันจะลองทำดู"
10036100-81 = "ไม่สิ ฉันอยากลองทำดูน่ะ"
10036100-83 = "เมื่อกี้ฉันช่วยเออออไปด้วยเพราะถูกคุณครูโน้มน้าว แต่ก็ไม่คิดเลยนะว่าหัวหน้าจะมาเป็นดีเจให้จริงๆ"
10036100-84 = "พี่ซาโอริกับดนตรีงั้นเหรอ..."
10036100-85 = "ไม่ใช่ว่าสแครชแผ่นไปเรื่อยๆ แล้วโมโหจนทำแผ่นเป็นรูหรอกนะคะ...?"
10036100-86 = "ซัตจังต้องทำได้ดีแน่ๆ"
10036100-88 = "อย่างน้อยก็เป็นสิ่งที่อยากทำนี่เนอะ"
10036100-92 = "เอาละๆ อย่าดันคนข้างหน้านะครับ! อย่าดันกันสิครับ!"
10036100-93 = "ในเมื่อความโกลาหลก็จบลงไปแล้ว จากนี้ไปเรามาสนุกสุดเหวี่ยงให้ <ชายหาดนอกกฎหมาย> ลุกเป็นไฟกันเถอะครับ!"
10036100-94 = "มาโยกไปพร้อมๆ กันเลย ระวังหมวกกันน็อกหลุดกันด้วยล่ะ!"
10036100-95 = "Music! Start!"

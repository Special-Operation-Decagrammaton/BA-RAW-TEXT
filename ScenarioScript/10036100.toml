[translation]
10036100-1 = "第10話;Yo DJ Pump This Party"
10036100-2 = "舞台已經用完好的備用零件更換完畢了。"
10036100-3 = "DJ設備似乎都沒被子彈打中，真幸運呢。"
10036100-4 = "觀，觀眾席也準備好了……！"
10036100-8 = "你們其實沒必要特地幫忙的……"
10036100-9 = "這是大家一起享受的慶典嘛。#n而且人多力量大，不是嗎？"
10036100-13 = "其他地方也準備好了！"
10036100-14 = "雖然讓那些不速之客跑了，還是讓人有點不爽……"
10036100-15 = "但既然礙事的傢伙都走了，現在總算可以盡情享受慶典之夜了！"
10036100-16 = "呃……關於這點……"
10036100-17 = "DJ表演可能得更換成其他活動了。"
10036100-22 = "為什麼……？"
10036100-24 = "因為……DJ B.o.B在剛才的槍戰中逃跑了。"
10036100-25 = "一邊逃還一邊喊著「我不要被綁架～」……"
10036100-26 = "我當時也沒能來得及抓住他。"
10036100-27 = "可是DJ表演明明是大家都很期待的重頭戲……！"
10036100-28 = "……果然還是遭到報應了！"
10036100-29 = "對我們來說，夏夜的回憶終究只是奢望！"
10036100-30 = "等著我們的不是DJ表演，而是只能聽著陰沉的海浪聲睡在沙灘上的夜晚……"
10036100-31 = "接著還會被潮水沖走，漂流到沒人知道的荒島上……！"
10036100-32 = "早知道就認真看上期時尚雜誌的「荒島必備品」特輯了！"
10036100-33 = "[s]「沒事沒事，大家先冷靜。」"
10036100-38 = "你是……夏萊的老師？"
10036100-39 = "老師有什麼好辦法嗎？"
10036100-40 = "[s]「我覺得呢，其實沒必要取消DJ表演。」"
10036100-41 = "嗯……畢竟表演用的唱盤、音箱和音源都在，取消確實很可惜……"
10036100-42 = "但沒有DJ能用它們來表演啊？"
10036100-43 = "[s]「哼哼，這點不用擔心！」"
10036100-47 = "老，老師？為什麼要把我推出來？"
10036100-48 = "[s]「因為DJ B.o.B的頭號徒弟就在這裡！」"
10036100-49 = "老師，這是什麼意思！？"
10036100-50 = "該，該不會是要我去表演吧……！？"
10036100-55 = "[ns1] 向三人使個眼色\n[ns2] 擠眉弄眼"
10036100-58 = "……！"
10036100-59 = "嗯，就是說呀～#n我也想看沙醬當DJ的樣子呢。"
10036100-60 = "沒，沒錯！我們一直很期待這場表演，要是真的取消的話會很難過的……耶嘿嘿。"
10036100-61 = "……我也得說嗎？"
10036100-62 = "[s]「嗯！？什麼？美咲你也超期待DJ表演的嗎？」"
10036100-63 = "我才沒說那種話！"
10036100-64 = "總，總之……突然取消慶典的重頭戲是不行的。"
10036100-66 = "但我不是一名DJ……"
10036100-67 = "我並沒有能讓大家開心的能力……"
10036100-68 = "[s]「能力並不是重點，重點有沒有想做的心意哦。」"
10036100-69 = "……"
10036100-70 = "老師，聽了你的這番話之後……"
10036100-71 = "我想做的事……那個……好像……"
10036100-75 = "還是不太清楚。"
10036100-76 = "[s]「這不是應該有所領悟的時候嗎！？」"
10036100-77 = "不過有件事我很清楚。"
10036100-78 = "我現在唯一想做的……"
10036100-79 = "就只有再次感受……剛才在舞台上湧現的那種陌生的感覺……這件事而已。"
10036100-80 = "我會試試看的，老師。"
10036100-81 = "不，我希望能試試看。"
10036100-83 = "雖然因為老師而參與了慫恿……但擔任DJ的隊長，實在讓人難以想像啊。"
10036100-84 = "沙織姐要表演音樂……"
10036100-85 = "如果不順利的話，唱盤上會不會多出幾個彈孔啊……？"
10036100-86 = "沙醬一定沒問題的。"
10036100-88 = "因為他似乎已經找到了一些答案。"
10036100-92 = "好了好了，請大家不要推擠！不要推擠！"
10036100-93 = "現在騷動已經結束，是時候讓慶典的熱情再次充滿「不法者海灘」了！"
10036100-94 = "大家，一起嗨起來吧！"
10036100-95 = "音樂！開始！"

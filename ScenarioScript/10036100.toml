[translation]
10036100-1 = "Episode 10;Yo DJ Pump This Party"
10036100-2 = "Well, the stage has been fixed up with all the spare equipment."
10036100-3 = "Truly miraculous that none of those bullets hit the DJ's turntables."
10036100-4 = "Th-The seats are ready too!"
10036100-8 = "You seriously didn't have to help me..."
10036100-9 = "But then again, this is for everyone, and I suppose more help is always welcome."
10036100-13 = "The rest of the festival's all fixed up too!"
10036100-14 = "I only wish we could have caught the intruders."
10036100-15 = "But in any case, let's finish this night up right!"
10036100-16 = "Uh, about that..."
10036100-17 = "...I think we're gonna have to come up with a new finale."
10036100-22 = "Why...?"
10036100-24 = "Well...during the shootout, I saw DJ B.o.B run off."
10036100-25 = "I think he said he didn't want to be kidnapped."
10036100-26 = "I'd have grabbed him, but I didn't have a chance."
10036100-27 = "But the DJ concert is what everyone's been waiting for!"
10036100-28 = "And now it's shot, no pun intended."
10036100-29 = "I guess a nice summer evening was too much to ask for."
10036100-30 = "Well, guess we're sleeping on the sand tonight. No DJ music, but we've got waves, right?"
10036100-31 = "And then those waves'll probably sweep us away to some deserted island..."
10036100-32 = "It's funny, the magazine I read HAD a \"things to take to a deserted island\" article this month, and I skipped right over it!"
10036100-33 = "[s] \"Hey now, calm down.\""
10036100-38 = "Oh, are you...Schale's Sensei?"
10036100-39 = "You have any good ideas here?"
10036100-40 = "[s] \"I don't think we need to cancel the DJ concert.\""
10036100-41 = "I mean, it's not like we WANT to. We've got all the equipment right here..."
10036100-42 = "...but we don't have a DJ who can use it, do we?"
10036100-43 = "[s] \"Haha, don't you worry!\""
10036100-47 = "S-Sensei, why are you looking at me?"
10036100-48 = "[s] \"We have DJ B.o.B's best student right here!\""
10036100-49 = "Sensei, what are you—?!"
10036100-50 = "Y-You want ME to do the concert...?!"
10036100-55 = "[ns1] Give the three a soft nudge.\n[ns2] Wink."
10036100-58 = "Wait..."
10036100-59 = "Yes! Yes, I'd certainly love to see Sao-Sao DJ."
10036100-60 = "R-Right? We've been waiting so long for the concert. It'd be a shame if it got cancelled... Heehee."
10036100-61 = "...You need me in on this too?"
10036100-62 = "[s] \"What was that, Misaki? You want the concert to go on too, don't you?\""
10036100-63 = "Yeah, I do, but..."
10036100-64 = "I-It's just... Ah, whatever, the show must go on."
10036100-66 = "But I'm not a DJ."
10036100-67 = "I don't have the skills to make everyone get up and dance."
10036100-68 = "[s] \"Skill isn't relevant here. The question is, do you want to do it or not?\""
10036100-69 = "..."
10036100-70 = "So that's what you're saying, Sensei."
10036100-71 = "What I want to do... What I need to do is..."
10036100-75 = "...I don't know."
10036100-76 = "[s] \"Aw, it sounded like you almost had an epiphany there.\""
10036100-77 = "All right, I do know this."
10036100-78 = "What I want..."
10036100-79 = "...is to feel that unfamiliar emotion I felt on the stage. One more time. That's all."
10036100-80 = "I'll try it, Sensei."
10036100-81 = "No, not just that. I WANT to try it."
10036100-83 = "You know, Sensei, I just spoke up because you said I should, but now that I think about Leader actually DJ'ing..."
10036100-84 = "What if it..."
10036100-85 = "...doesn't go well, and she ends up leaving bullet holes in the turntable or something?"
10036100-86 = "Oh, Sao-Sao would be fine."
10036100-88 = "It seems she found her answer, at least."
10036100-92 = "Hey, no pushing, no pushing!"
10036100-93 = "The trouble's over. Outlaw Beach is ours again, and the party's back on!"
10036100-94 = "Everybody, let's rock tonight!"
10036100-95 = "Cue the music!"

[translation]
209-1 = "การพูดคุยเกี่ยวกับความเป็นนิรันดร์"
209-10 = "...ได้พบกันอีกครั้งแล้วสินะ คุณครูเอ๋ย"
209-11 = "อ้อ... รูปลักษณ์นี่น่ะหรือ? "
209-12 = "เดิมทีรูปลักษณ์เดิมก็ไม่ค่อยน่าชื่นชมเท่าไรอยู่แล้ว กระผมต้องขออภัยด้วยที่ครั้งนี้ปรากฏตัวมาใน#nรูปลักษณ์ที่ไม่น่าอภิรมย์กว่าเดิมเสียอีก"
209-16 = "...ใช่แล้ว สิ่งมีชีวิตที่มีเลือดเนื้อ มีชะตากรรมที่ต้องตายจากกันไปในสักวัน "
209-17 = "ทุกสิ่งทุกอย่างจะหายไป ความตายและการดับสลาย... คือชะตากรรมที่ผู้คนจำต้องยอมรับ..."
209-18 = "สุดท้ายสิ่งที่จะสูญสลายก็คงจะเป็นสิ่งที่ไร้ความหมายไป"
209-22 = "แต่ว่า... ศิลปะจะยังคงอยู่"
209-23 = "ต่อให้ผู้ที่มีเลือดเนื้อตายจากและหายไป แต่ศิลปะจะยังคงหลงเหลืออยู่บนโลกนี้"
209-25 = "ทว่าต่อให้ตายจากและตัวตนได้สูญสลายไปแล้วก็ตาม ศิลปะจะยังคงอยู่เพื่อเป็นข้อพิสูจน์ถึงตัวตน คุณค่า และเอกลักษณ์ไว้"
209-26 = "นั่นเป็นหนทางเดียวที่สิ่งมีชีวิตที่มีเลือดเนื้อจะใฝ่ฝันถึงความเป็นนิรันดร์ได้ เส้นทางที่สิ่งที่มีขีดจำกัด#nสามารถไล่ตามสิ่งที่ไร้ขีดจำกัดได้"
209-28 = "......."
209-29 = "เพราะฉะนั้นแล้ว คุณครูเอ๋ย กระผมจะขอแนะนำให้คุณได้รู้จัก..."
209-30 = "เทวทูตประดิษฐ์ที่พวกเราสรรค์สร้างขึ้น เรื่องราวบทใหม่ของ [ruby=Communio Sanctorum]<ความเป็นหนึ่งเดียวของผู้ศักดิ์สิทธิ์ทั้งมวล>[/ruby] หนึ่งในผลงานศิลปะของกระผม"
209-31 = "เกรกอเรียส"
209-32 = "ขอจงปรบมือและโห่ร้องชื่นชมให้กับกระผมอีกครั้งด้วยเถอะ คุณครูเอ๋ย"
209-34 = "ม่านเวทีการแสดงของเรากำลังจะเริ่มเปิดออกในไม่ช้า ขอจงปรบมือให้ดังยิ่งกว่าที่เคย..."

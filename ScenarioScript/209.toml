209-15 = "3;마에스트로 부상;00\n#3;em;…\n#3;h\n#wait;2500"
209-16 = "3;마에스트로 부상;00;……그래, 육신이 있는 존재는 언젠가 죽을 수밖에 없는 운명이지."
209-17 = "3;마에스트로 부상;00;모든 것은 사라진다. 죽음과 소멸…… 그것은 존재하는 자가 마땅히 받아들여야 할 숙명.\n#3;stiff"
209-18 = "3;마에스트로 부상;00;결국 사라져 버릴 것에게 의미 같은 건 없겠지."

[translation]
209-1 = "關於不朽"
209-10 = "……沒想到還能再見面啊，老師。"
209-11 = "──啊啊，我的樣子是嗎？"
209-12 = "本來就不是多好看的外表，沒想到這次還以更加醜陋的樣子現身。#n但這也是沒辦法的事，這部分還請老師見諒。"
209-16 = "……肉體這個牢籠，注定會腐朽，這就是命運。"
209-17 = "萬物都會衰亡……#n死與消滅──是所有生者都該接受的宿命。"
209-18 = "終將消亡的東西，不存在任何意義。"
209-22 = "但是藝術──是永恆的。"
209-23 = "即使作者的肉體腐敗，藝術仍會留存於這個世界──"
209-25 = "藝術會繼續證明它的價值、它的境界。"
209-26 = "這是從肉體的牢籠解放，觸及「不朽」的唯一方法──#n也是「有限」接近「無限」的軌跡。"
209-28 = "……"
209-29 = "我來向老師介紹一下吧。"
209-30 = "由我們所創造，教義的人造天使系列[ruby=Communio Sanctorum]「諸聖相通」[/ruby]。#n我的藝術作品──"
209-31 = "──葛利果。"
209-32 = "那麼，老師……這一次，希望也能聽到您的喝采。"
209-34 = "舞台的布幕馬上就要升起了──還請您給予最激昂、最熱烈的喝采！"

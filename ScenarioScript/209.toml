[translation]
209-1 = "Discourse on Immortality"
209-10 = "...Fate seems to enjoy twisting our strings together, Sensei."
209-11 = "Ah, my appearance? "
209-12 = "I do apologize for the unsightly display. I could hardly say whether this form or the last was more horrendous."
209-16 = "But what is a form? A body? It is but a vessel, destined to expire. "
209-17 = "A fate all mortal beings are forced to face. Death. Destruction. Eradication."
209-18 = "The lifespan of our physical forms is but a moment in this wide universe. Brief and forgettable."
209-22 = "But art perseveres!"
209-23 = "The container for the soul, the physical body, may crumble to dust and atoms, but the art it produces remains."
209-25 = "Only art transcends death! Only art can validate the existence and value of our souls after our bodies have been long forgotten."
209-26 = "For us beings tethered to our physical form, this is our only path. The only way a mortal can achieve immortality."
209-28 = "..."
209-29 = "So, allow me to introduce you to my own immortality, Sensei."
209-30 = "I have achieved my final masterpiece. I've developed a new series of Communio Sanctorum... These are the artificial angels of our new doctrines."
209-31 = "Gregorius."
209-32 = "Yes, yes! Thank you! One more round of applause, my dear Sensei."
209-34 = "With passion! With gusto! And thus, the show shall begin!"

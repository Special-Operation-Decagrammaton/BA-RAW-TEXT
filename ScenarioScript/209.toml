209-10 = "3;마에스트로 부상;00;……. 다시 만나게 되었군. 선생이여."
209-11 = "3;마에스트로 부상;00;아아, 이 모습 말인가?"
209-12 = "3;마에스트로 부상;00;원래도 그다지 보기 좋은 모습은 아니었지만, 이번에는 이런 심한 꼴로 앞에 나타나게 되었군. 그 부분은 양해를 구하지.\n#3;stiff"

209-25 = "#na;마에스트로 부상;죽음 이후에도, 존재의 소멸 이후에도 예술은 남아서 그 존재를, 그 가치를, 그 경지를 끝없이 증거하겠지."
209-26 = "#na;마에스트로 부상;그것이야말로 육신을 가진 존재가 불멸을 꿈꿀 수 있는 단 하나의 방법. 유한이 무한을 추구하는 통로."

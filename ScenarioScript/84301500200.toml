[translation]
84301500200-5 = "...A mysterious chip, found in an Avant Guard unit."
84301500200-6 = "According to the data, it was likely put there within the last day or so, and most likely NOT by the Engineering Department or Seminar."
84301500200-7 = "Whoever did it, they did so intentionally, to ruin the demonstration and cause trouble for both those groups."
84301500200-8 = "But why? To what advantage? Attention? Diversion? Something related to short selling?"
84301500200-9 = "We don't have enough to go on yet. However, if I cross-reference the chip with some other similar data, I may be able to find the manufacturer. ...Though that will take time."
84301500200-10 = "Was I helpful?"
84301500200-11 = "Very."
84301500200-12 = "Depending on the situation, this might be a crucial piece of evidence."
84301500200-13 = "Great! *ahem* I mean, that's a relief."
84301500200-17 = "Sorry, the things I say don't always match what's going on."
84301500200-18 = "Don't worry about it. Whatever your personal business is, it's clearly quite serious."
84301500200-19 = "If collaborating with us helps you in some way, that's good for me too."
84301500200-20 = "...It seems you're more than your reputation suggests, Tsukatsuki Rio."
84301500200-21 = "I could say the same to you, Yurizono Seia."
84301500200-22 = "Neru will be back soon. Let's wait a little while."

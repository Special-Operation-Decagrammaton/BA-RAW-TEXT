[translation]
84301500200-5 = "在前衛君身上發現的可疑晶片……"
84301500200-6 = "這個東西不像是工程師部或研討會植入的。#n從晶片的資料來看，應該是在昨天到今天之間加上去的才對。"
84301500200-7 = "一定是故意的。#n這麼做單純是為了搞砸演示，讓工程師部和研討會傷腦筋。"
84301500200-8 = "可是為什麼呢？那麼做有什麼好處？#n是為了轉移視線嗎？還是與賣空有關的詐欺手法……？"
84301500200-9 = "光憑這個還無法得知。雖然得花費一些時間……#n但只要能找到晶片的出處和類似資料，應該就能找到製造者。"
84301500200-10 = "有幫上忙嗎？"
84301500200-11 = "相當有幫助。"
84301500200-12 = "根據情況，它也有可能成為「關鍵線索」。"
84301500200-13 = "那真是太開心……不，是太好了。"
84301500200-17 = "抱歉，我一直說出不合時宜的話。"
84301500200-18 = "不必在意。#n雖然我不清楚你說的「私事」是什麼，但我認為那肯定也不是什麼輕鬆的事。"
84301500200-19 = "如果我們現在的行動與合作能對你有所幫助，對我而言也不是件壞事。"
84301500200-20 = "……本來以為你還是一如既往，看來你的某些地方似乎有所改變了呢，調月莉央。"
84301500200-21 = "彼此彼此，百合園聖亞。"
84301500200-22 = "寧瑠等等就會到了。我們再稍等一下吧。"

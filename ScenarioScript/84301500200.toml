[translation]
84301500200-5 = "ชิปน่าสงสัยที่พบในหุ่นรบล้ำยุค"
84301500200-6 = "ยากที่จะตัดสินได้ว่าถูกติดตั้งโดยชมรมวิศวกรรมหรือเซมิน่า และเมื่อดูจากข้อมูลแล้ว มันน่าจะถูกใส่เข้าไปในหุ่นรบในระหว่างเมื่อวานจนถึงวันนี้"
84301500200-7 = "ต้องเป็นการกระทำที่จงใจอย่างแน่นอน เป้าหมายของคนพวกนี้คือการทำลายการสาธิตเทคโนโลยี แล้วโยนความเสียหายให้ชมรมวิศวกรรมกับเซมิน่า"
84301500200-8 = "แต่ทำไมกันล่ะ ทำแบบนั้นแล้วจะได้ประโยชน์อะไร? เพื่อดึงดูดความสนใจมาทางนี้เหรอ? หรือนี่เป็นวิธีการหลอกลวงที่เกี่ยวกับการซื้อขายของในงาน...?"
84301500200-9 = "แค่นี้คงยังฟันธงไม่ได้ แต่ถึงยังไง เราก็อาจสืบหาที่มาและข้อมูลที่คล้ายกันของชิปนี้ รวมถึงบริษัทผู้ผลิตได้ แต่ส่วนนั้นน่าจะใช้เวลาไม่น้อยเลยละ"
84301500200-10 = "ชิปที่ฉันเอามา มันพอเป็นประโยชน์หรือเปล่าคะ?"
84301500200-11 = "เป็นประโยชน์มากเลยละ"
84301500200-12 = "บางทีมันอาจจะเป็น 'เบาะแสสำคัญ' เลยก็ได้ "
84301500200-13 = "ดีใจจังเลยค่ะ ไม่สิ... ค่อยยังชั่วหน่อยค่ะ"
84301500200-17 = "ขอโทษค่ะ ฉันเอาแต่พูดอะไรที่ขัดต่อบรรยากาศนะคะ"
84301500200-18 = "ไม่ต้องกังวลไปหรอก ถึงฉันจะไม่รู้ว่า 'เหตุผลส่วนตัว' ของคุณคืออะไร แต่ฉันก็ไม่คิดว่ามันคือเรื่อง#nเล็กน้อยหรอกนะ"
84301500200-19 = "ถ้าการร่วมมือกันของเราในปฏิบัติการนี้เป็นประโยชน์กับคุณ มันก็ไม่ใช่เรื่องเลวร้ายของฉันเหมือนกัน"
84301500200-20 = "ฉันคิดว่าคุณจะเป็นเหมือนเดิมเสียอีก แต่รู้สึกว่าคุณมีบางอย่างเปลี่ยนไปนะคะ สึคัตสึกิ ริโอะ..."
84301500200-21 = "คุณเองก็เหมือนกันนั่นละ ยูริโซโนะ เซอา"
84301500200-22 = "อีกไม่นานเนรุก็มาถึงแล้วละ ช่วยรออีกหน่อยนะ"

84301500200-5 = "3;리오;99;아방가르드군에서 발견된 의문의 칩.\n#3;a\n#3;em;…"
84301500200-6 = "3;리오;01;엔지니어부나 세미나가 심었다고는 판단하기 어려운 물건이고, 데이터를 보아하니 어제와 오늘 사이에 부착된 것 같네."
84301500200-7 = "3;리오;05;확실히 의도적이야. 순수하게 시연을 망치고, 엔지니어부와 세미나를 곤란하게 만드는 것을 목적으로 하고 있어."
84301500200-8 = "3;리오;07;하지만 왜일까. 그렇다고 해서 생기는 이점이 있나? 눈을 돌리기 위해? 역시 공매도 관련의 사기 수법……?"
84301500200-9 = "3;리오;00;이것만으로는 알 수 없어. 알 수 없지만, 이 칩의 출처와 유사 데이터를 찾아 제조자를 찾을 수는 있을지도. 그 부분은 시간이 조금 걸리겠네.\n#3;stiff"
84301500200-10 = "3;세이아;02;도움이 된 건가요?"
84301500200-11 = "3;리오;01;굉장히 많이."
84301500200-12 = "3;리오;99;경우에 따라서는 '결정적인 단서'가 될 수도 있어."
84301500200-13 = "3;세이아;02;그건 기쁘네요. ……아니, 다행이네요."
84301500200-14 = "#st;[0,0];instant;1;"
84301500200-15 = "#clearST"
84301500200-16 = "3;세이아;04\n#3;em;[반응]\n#wait;1000"
84301500200-17 = "3;세이아;06;미안해요. 계속해서 분위기에 안 맞는 말이 나오네요.\n#3;stiff"
84301500200-18 = "3;리오;02;신경 쓸 거 없어. 네가 말한 '개인적인 사정'이 뭔지는 모르지만, 나는 그 일 또한 결코 가벼운 일은 아닐 거라고 생각하니까."
84301500200-19 = "3;리오;01;지금 우리의 작전, 이 협조가 당신에게 도움이 된다면 그 또한 나에게 있어서도 나쁘지 않은 일이지."
84301500200-20 = "3;세이아;01;……그대로일 거라 생각했는데, 어딘가는 조금 변한 느낌이군요, 츠카츠키 리오.\n#3;em;…"
84301500200-21 = "3;리오;01;당신도 마찬가지야, 유리조노 세이아."
84301500200-22 = "3;리오;01;네루도 곧 있으면 도착할 거야. 조금만 기다리도록 하지."
84301500200-23 = "#wait;100"

[translation]
1001103-1 = "กินอาหารแล้วต้องแปรงฟันให้สะอาด"
1001103-2 = "สวนต้นบ๊วย ซานไห่จิง"
1001103-3 = "ทุกคน~ กินมื้อกลางวันเสร็จกันรึยังคะ?"
1001103-4 = "ค่า~!"
1001103-5 = "ฮุฮุ เก่งมากเลยค่ะ ถ้าอย่างนั้น หลังรับประทานอาหารแล้วควรแปรงฟันใช่ไหมคะ?"
1001103-6 = "ค่า~"
1001103-7 = "แต่ว่าช่วงนี้มีคนที่ยังแปรงฟันไม่ถูกวิธีอยู่ ดังนั้นฉันกับคุณครูจะแสดงละครสาธิตให้เห็นนะคะ ว่าถ้า#nแปรงฟันไม่ถูกวิธีจะเกิดอะไรขึ้นบ้าง"
1001103-8 = "เอาล่ะทุกคน ตั้งใจดูกันนะคะ~"
1001103-9 = "หลังจากทานของหวานเสร็จแล้ว ที่ฟันอาจมีเศษน้ำตาลชิ้นเล็กๆ ติดอยู่ที่ซอกฟันได้ และถ้าเป็น#nแบบนั้นจะมีเจ้าแบคทีเรียน่ากลัวตามกลิ่นของเศษน้ำตาลมาค่ะ"
1001103-10 = "เอาละค่ะ คุณครู ถึงตาคุณครูแล้วค่ะ แสดงเป็นแบคทีเรียได้เลยค่ะ"
1001103-12 = "[s] \"ก๊าซซซ กิกิกิกิ...\""
1001103-13 = "นะ...น่ากลัวจัง..."
1001103-14 = "น่ากลัวใช่ไหม? ถ้าไม่แปรงฟันให้สะอาดก็จะมีเจ้าแบคทีเรียแบบนี้มาหาได้นะคะ"
1001103-15 = "แต่ว่าถ้าทุกคนแปรงฟันให้สะอาด เจ้าแบคทีเรียพวกนี้ก็จะทำร้ายเราไม่ได้ค่ะ\n"
1001103-16 = "เอาละค่ะคุณครู แสดงต่อได้เลยค่ะ"
1001103-18 = "[s] \"อะ... อึ่ก แปรงฟันแล้วเหรอ... อึ่ก...\""
1001103-21 = "ว้าว! เจ้าแบคทีเรียตายไปแล้ว!"
1001103-22 = "ทุกคนเห็นแล้วใช่ไหมคะ? เพราะงั้นทุกคนจะต้องแปรงฟันให้สะอาด เจ้าแบคทีเรียจะได้ไม่มา#nทำร้ายฟันของทุกคน เข้าใจไหมคะ?"
1001103-23 = "ค่า...!"
1001103-25 = "ขอบคุณที่มาช่วยแสดงละครวันนี้นะคะ คุณครูแสดงเก่งมากๆ เลยค่ะ!"
1001103-26 = "[s] \"รู้สึกเขินหน่อยๆ แฮะ...\""
1001103-27 = "ไม่ต้องเขินหรอกค่ะ พวกเด็กๆ ชอบกันมากเลยนะคะ"
1001103-28 = "ต้องขอบคุณคุณครูเลยนะคะ ต่อไปเด็กๆ คงจะตั้งใจแปรงฟันให้ถูกวิธีกันมากขึ้นแล้วละค่ะ ฮุฮุ..."
1001103-29 = "แล้วหลังทานอาหารคุณครูแปรงฟันถูกวิธีรึเปล่าคะ?"
1001103-30 = "[s] \"แน่นอนอยู่แล้ว\""
1001103-31 = "อืม... ถ้าแค่พูดเฉยๆ คงจะเชื่อได้ยาก ไหนลองอ้าปากสิคะ"
1001103-33 = "ไม่ต้องอายหรอกค่ะ อ้าปากกว้างๆ สิคะ~~"
1001103-34 = "[s] อ้าปากกว้างๆ ตามที่ชุนบอก"
1001103-36 = "อุ้ย ดูเหมือนคุณครูดูแลสุขภาพฟันได้ดีมากเลยนะคะ สะอาดมากเลยค่ะ"
1001103-37 = "ถ้าเป็นแบบนี้ คุณครูก็ไม่ต้องห่วงเรื่องแบคทีเรียกินฟันแล้วละค่ะ ฮุฮุ...."
1001103-38 = "เอ๋ คุณครูอยากพูดอะไรรึเปล่าคะ?"
1001103-39 = "หน้าฉันอยู่ใกล้เกินไป เลยอยากให้ถอยไปหน่อยเหรอคะ?"
1001103-40 = "ฮุฮุ ไม่ได้หรอกค่ะ ฉันจะไม่ยอมถอยออกไป จนกว่าจะตรวจสุขภาพช่องปากของคุณครูเสร็จค่ะ"
1001103-41 = "เอาละค่ะ ไม่ต้องอายนะคะ อ้าปากกว้างๆ อีกรอบนะคะ อ๊า~"

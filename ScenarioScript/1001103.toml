[translation]
1001103-1 = "Brush After Every Meal"
1001103-2 = "Shanhaijing Plum Blossom Garden"
1001103-3 = "Did everyone finish their lunch?"
1001103-4 = "Yes, ma'am!"
1001103-5 = "Haha. This reminds me. Surely I've told you that you should brush your teeth after every meal."
1001103-6 = "Yes, ma'am!"
1001103-7 = "Some of the students don't brush properly, so I'm going to put together a puppet show to teach them what happens when you ignore dental hygiene. And you, Sensei, are going to help."
1001103-8 = "Now, please watch carefully."
1001103-9 = "Sweets leave a sticky residue on your teeth, you know. Terrifying bacteria can't resist it once they smell it."
1001103-10 = "Now it's your turn, Sensei. You will be playing the part of the bacteria."
1001103-12 = "[s] \"A-Arrrggghhh...\""
1001103-13 = "M-My, how terrifying..."
1001103-14 = "See? Scary, right? The terrifying bacteria will come for you if you don't brush your teeth."
1001103-15 = "But if you brush your teeth, the bacteria will be powerless."
1001103-16 = "You take over from here, Sensei."
1001103-18 = "[s] \"Gahhhhh. The minty freshness of tooth paste! How DARE you?!\""
1001103-21 = "Wow, the big bad bacteria is dead!"
1001103-22 = "I hope you've all learned a valuable lesson. I want you all to promise that you'll brush your teeth to fight off the evil bacteria, okay?"
1001103-23 = "We will!"
1001103-25 = "Thanks for all your help with the puppet show.#nIt was a hit with the kids!"
1001103-26 = "[s] \"And a little humiliating...\""
1001103-27 = "Don't say that. The kids loved it."
1001103-28 = "Think of all the healthy Plum Blossom smiles there will be thanks to you."
1001103-29 = "And I hope you remembered to brush your teeth after eating too."
1001103-30 = "[s] \"Of course.\""
1001103-31 = "Hmm. I'll be the judge of that. Open your mouth and let me have a look-see."
1001103-33 = "Don't be shy, now. Open wide..."
1001103-34 = "[s] Reluctantly open your mouth."
1001103-36 = "Oh my, Sensei. Your teeth are so clean. You've done a wonderful job of taking care of them."
1001103-37 = "You don't have to worry about the big bad bacteria coming after you. Heehee..."
1001103-38 = "Hmm? Is something bothering you?"
1001103-39 = "I'm standing too close?"
1001103-40 = "Haha. No can do, Sensei. I'm still not done giving you your inspection."
1001103-41 = "Don't get shy on me now. Open back up."

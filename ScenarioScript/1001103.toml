[translation]
1001103-1 = "用餐之後，要把牙齒刷乾淨"
1001103-2 = "山海經．梅花園"
1001103-3 = "各位同學～大家有沒有把午餐吃光光啊？ "
1001103-4 = "有～！"
1001103-5 = "呵呵，大家好棒喔。還有，大家吃完飯都有刷牙嗎？"
1001103-6 = "有～"
1001103-7 = "可是呀，我發現最近有些小朋友都不乖乖刷牙。所以我請老師來跟我一起演人偶劇，讓大家看看不刷牙的話會發生什麼事。"
1001103-8 = "來，大家要專心看清楚哦～"
1001103-9 = "大家吃完甜食之後，甜食的渣渣會像這樣殘留在牙齒上。 #n此時可怕的蛀牙菌，會聞到這股味道找上門來。"
1001103-10 = "來，老師，就是現在。請你幫我演蛀牙菌。"
1001103-12 = "[s] 「呀，呀喔喔喔──」"
1001103-13 = "好，好可怕……"
1001103-14 = "請看，很可怕對吧？不好好刷牙的話，這麼可怕的蛀牙菌就會來找你喔。"
1001103-15 = "可是只要好好刷牙，就能讓蛀牙菌無法作亂了。"
1001103-16 = "來，老師，請接著演下去。"
1001103-18 = "[s] 「唔……竟然在刷牙……好痛苦啊──」"
1001103-21 = "哇，蛀牙菌被打倒了！"
1001103-22 = "來，大家都看到了吧？ #n為了打倒可怕的蛀牙菌，大家都要好好刷牙唷！"
1001103-23 = "好～！"
1001103-25 = "謝謝老師幫忙今天的人偶劇。老師的演技真的很棒呢！"
1001103-26 = "[s]「總覺得很難為情……」"
1001103-27 = "不過孩子們都很捧場呢！"
1001103-28 = "託你的福，梅花園的孩子們以後應該會乖乖刷牙了。呵呵…"
1001103-29 = "對了，老師今天吃完飯，應該也有好好刷牙吧？"
1001103-30 = "[s]「當然。」"
1001103-31 = "唔嗯，光用說的我不信。請老師「啊～」一下。"
1001103-33 = "來嘛，不要害羞，啊～"
1001103-34 = "[s] 不得已張開口"
1001103-36 = "老師好棒喔。看來你平常就有乖乖刷牙呢，牙齒很乾淨唷。"
1001103-37 = "這樣的話，就不用擔心可怕的蛀牙菌找上門了。呵呵……"
1001103-38 = "咦，老師怎麼了嗎？"
1001103-39 = "你說我的臉太靠近了，要我離遠一點？"
1001103-40 = "呵呵，不行。在仔細檢查完嘴巴每個角落之前，我是不會讓開的。"
1001103-41 = "來，不用害羞，再把嘴巴張開一次。啊～"

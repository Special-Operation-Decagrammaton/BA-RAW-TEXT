[translation]
1001103-1 = "#title;식사 후에는 깨끗이 양치를"
1001103-2 = "#place;산해경 매화원"
1001103-3 = "3;슌;03;여러분~ 다들 점심 남기지 않고 잘 먹었나요? \n#3;greeting\n#3;em;[반짝]\n#3;a"
1001103-4 = "#na;매화원 학생들;네~!\n#fontsize;90"
1001103-5 = "3;슌;01;후후, 참 잘했어요. 그리고 밥을 먹은 뒤에는 이를 꼭 닦으라고도 이야기 했었지요?\n#3;m2"
1001103-6 = "#na;매화원 학생들;네~.\n#fontsize;90"
1001103-7 = "3;슌;06;그런데 요즘 제대로 이를 닦지 않는 학생들이 있어서, 선생님과 함께 인형극으로 이를 닦지 않으면 어떤 일이 생기는지 보여주려고 해요.\n#3;m4"
1001103-8 = "3;슌;03;자, 집중해서 잘 봐주세요~.\n#3;m3\n#3;em;[반응]"
1001103-9 = "3;슌;01;여러분이 달콤한 음식을 먹고 나면 이빨에 이렇게 달착지근한 찌꺼기가 남아있게 돼요. #n그럼 무서운 충치균이 이 냄새를 맡고 찾아온답니다.\n#3;greeting"
1001103-10 = "3;슌;05;자, 선생님. 지금이에요. 충치균을 연기해주세요.\n#3;closeup\n#3;em;[반응]"
1001103-11 = "3;슌;05\n#3;closeup\n#3;d\n#wait;1000"
1001103-12 = "#all;hide\n[s] \"갸, 갸오오오— \""
1001103-13 = "#na;매화원 학생들;무, 무서워……\n#fontsize;90"
1001103-14 = "3;슌;06;보세요, 무섭죠? 이를 제대로 닦지 않으면 이런 무서운 충치균이 찾아오는 거예요.\n#3;em;[반응]\n#3;a"
1001103-15 = "3;슌;01;하지만 이를 제대로 닦으면 충치균도 힘을 쓰지 못해요.\n#3;em;[음표]"
1001103-16 = "3;슌;05;자, 선생님. 계속해서 연기해주세요.\n#3;closeup"
1001103-17 = "3;슌;05\n#3;closeup\n#3;d\n#wait;1000"
1001103-18 = "#all;hide\n[s] \"으윽— 이를 닦다니…… 분하다—\""
1001103-19 = "#st;[0,0];instant;1;"
1001103-20 = "#clearST\n#bgshake\n#wait;1500"
1001103-21 = "#na;매화원 학생들;와, 충치균이 쓰러졌다!\n#fontsize;90"
1001103-22 = "3;슌;03;자, 다들 잘 보셨죠? #n그러니까 여러분도 무서운 충치균을 제대로 물리칠 수 있도록 앞으로는 열심히 이를 닦는 거예요?\n#3;greeting\n#3;em;[반짝]\n#3;a"
1001103-23 = "#na;매화원 학생들;네—!\n#fontsize;90"
1001103-24 = "#all;hide"
1001103-25 = "3;슌;01;오늘 인형극 도와 주셔서 감사합니다. 정말 멋진 연기였어요!\n#3;em;[반응]\n#3;a"
1001103-26 = "[s] \"어쩐지 부끄러워……\""
1001103-27 = "3;슌;03;하지만 학생들에게는 효과만점이었는걸요?\n#3;em;[반짝]"
1001103-28 = "3;슌;01;덕분에 매화원 아이들도 앞으로는 이를 열심히 닦을 것 같아요. 후후……\n#3;greeting"
1001103-29 = "3;슌;02;참, 선생님도 오늘 식사 후에 제대로 이를 닦으셨겠죠?\n#3;em;[반응]"
1001103-30 = "[s] \"물론이야.\""
1001103-31 = "3;슌;01;으음, 말만으로는 믿을 수 없어요. 아— 해보세요."
1001103-32 = "3;슌;01\n#3;d\n#wait;1000"
1001103-33 = "3;슌;07;부끄러워하지 마시고, 아—\n#3;closeup\n#3;a"
1001103-34 = "[s] 마지못해 입을 벌린다."
1001103-35 = "3;슌;01\n#3;closeup\n#3;em;[음표]\n#wait;1500"
1001103-36 = "3;슌;02;어머나, 선생님. 평소에도 이를 잘 닦으시는 모양이네요. 이가 아주 깨끗해요.\n#3;closeup"
1001103-37 = "3;슌;03;이만하면 무시무시한 충치균이 찾아올까 겁내실 필요는 없겠어요. 후후……\n#3;em;[반짝]\n#3;closeup"
1001103-38 = "3;슌;02;어라, 뭔가 하고 싶은 말이 있으신가요?\n#3;closeup"
1001103-39 = "3;슌;02;얼굴이 너무 가까우니, 떨어져 달라고요?\n#3;closeup\n#3;em;[?]"
1001103-40 = "3;슌;01;후후, 안 돼요. 입 속 구석구석 검사하기 전까지는 떨어지지 않을테니까요.\n#3;closeup"
1001103-41 = "3;슌;07;자, 부끄러워 마시고 다시 한 번 입을 벌려주세요. 아—.\n#3;closeup\n#3;em;[///]"

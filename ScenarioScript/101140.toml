101140-20 = "3;골콩트;01;키보토스의 수많은 신비가 사라지게 되겠군요.\n#3;closeup\n#3;em;…"
101140-21 = "3;검은 양복;01;……그 명멸 또한 저희의 탐구로 삼도록 하죠."

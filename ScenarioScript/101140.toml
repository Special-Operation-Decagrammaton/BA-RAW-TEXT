[translation]
101140-1 = "ตอนที่ 14;ปฏิบัติการยึดคืนชาเล่ต์ 2"
101140-3 = "...... ถ้างั้น ก้อนพลังงานทั้ง 6 ที่สังเกตได้ตอนนี้ก็คือ <สีสัน> งั้นเหรอ?"
101140-4 = "ตอนนี้ยังไม่ทราบครับ แต่อีกเดี๋ยวก็คงจะรู้แล้วละครับ"
101140-5 = "ถึงไคเซอร์จะเข้าใจเรื่องนั้นได้ช้าไปหน่อย เพราะเอาแต่ทำตามอำเภอใจก็เถอะ..."
101140-6 = "เดิมทีแล้วเรื่องลึกลับไม่ใช่เรื่องที่ผมสนใจ... จนกระทั่งมีเรื่อง <เรือ> เข้ามา ความคิดของผมก็เลยต่าง#nไปครับ"
101140-7 = "จะให้วัตถุหลงยุคชิ้นนั้นที่อยู่ใต้ทะเลทรายอะบิดอสตกอยู่ในมือของไคเซอร์ได้เหรอครับ? "
101140-8 = "ไม่ต้องกังวลเกินไปหรอกครับ ยังไงประธานใหญ่ก็ไม่สามารถครอบงำมันได้ ไม่ว่าจะใช้วิธีใดก็ตาม"
101140-9 = "นอกจากนั้น ถ้ามันไม่ใช่เรื่อง <เรือ> เราก็ไม่ต้องไปให้ความสนใจเป็นพิเศษหรอกครับ"
101140-10 = "เราจะทำตามแผนการของพวกเราครับ"
101140-12 = "สหพันธ์นักบุญรุ่นที่ 1 เสร็จสมบูรณ์ด้วยมิเมซิส... อัมโบรสล้มเหลว ส่วนเกรกอเรียสยังเตรียมพร้อมไม่#nสมบูรณ์"
101140-13 = "ห้องสมุดอนันต์แห่งเรื่องลึกลับเพิ่งจะได้เริ่มต้น ส่วนนักมายากลแห่งสวนสนุกน่าจะต้องใช้เวลาอีก#nสักหน่อยนะครับ"
101140-14 = "ส่วนผู้เลื่อมใสเดคาแกรมมาทอน... ได้รับกำลังจาก[ruby=บีนาห์]ผู้ที่เข้าใจ[/ruby] [ruby=เชเซ็ด]ผู้พิพากษา[/ruby] และ[ruby=HOD]เกียรติภูมิ[/ruby]ครับ"
101140-15 = "...... เดคาแกรมมาทอนทิ้งเหล่าผู้เลื่อมใสของตัวเองไว้และเลือกความตายด้วยตัวเอง ดังนั้นนี่จึงเป็น#nสิ่งที่ดีที่สุดแล้วในตอนนี้ครับ"
101140-16 = "ผมอยากจะตรวจสอบว่านี่เป็นการทำให้เห็นถึง[ruby=พารูเซีย]การกลับมาของเทพ[/ruby]อีกครั้งหรือเปล่า... แต่น่าเสียดายที่เวลาไม่พอนะครับ"
101140-17 = "<สีสัน> กำลังมาถึง <นักบวชนิรนาม> ก็กำลังฟื้นคืนชีพ... ไม่ว่าจะเรื่องไหนก็ต้องเตรียมพร้อมเอาไว้#nนะครับ"
101140-18 = "......"
101140-19 = "......"
101140-20 = "ความลึกลับมากมายในคิโวทอสจะหายไปสินะครับ"
101140-21 = "ผมจะค้นคว้าการเลือนหายนั้นเองครับ"
101140-22 = "......"

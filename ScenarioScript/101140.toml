101140-42 = "SOF รายงานสถานการณ์ซิ"
101140-44 = "ออสการ์ 1 สแตนด์บายอยู่ในตำแหน่งเดิม"
101140-46 = "ออสการ์ 2 สแตนด์บาย"
101140-48 = "ออสการ์ 3 ได้ตำแหน่งลอบยิง กำลังรอคำสั่ง"
101140-50 = "เข้าไปในอาคารชาเล่ต์เลยค่ะ "
101140-51 = "ไปกันเถอะค่ะ!"

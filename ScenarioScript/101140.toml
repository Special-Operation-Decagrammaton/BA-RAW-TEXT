101140-1 = "#title;제14화;샬레 탈환 작전 2"
101140-2 = "#all;hide"
101140-3 = "3;마에스트로;01;……그렇다면 지금 관측된 저 6개의 에너지들은 <색채>인 것인가?\n#3;stiff\n#3;a"
101140-4 = "5;검은 양복;01;지금으로선 알 수 없습니다. 하지만 곧 알게 되겠죠.\n#5;a\n#3;m1"
101140-5 = "5;검은 양복;01;카이저가 멋대로 행동해버려서 저것의 파악은 좀 더 늦어지겠지만……."
101140-6 = "5;검은 양복;01;괴력난신은 원래라면 저의 관심사가 아니었습니다만……. <방주>까지 관측된 지금은 이야기가 다르죠.\n#5;em;…"
101140-7 = "#3;hide\n1;골콩트;01;아비도스 사막 아래의 그 오파츠는 카이저의 손에 넘어가도 괜찮은 건가요? \n#1;a\n#1;em;[반응]"
101140-8 = "5;검은 양복;01;그쪽은 별로 걱정할 필요는 없습니다. 어차피 프레지던트는 무슨 수를 써도 그걸 통제하지 못할 겁니다."
101140-9 = "5;검은 양복;01;게다가 그것이 <방주>가 아닌 이상, 딱히 우리가 관심을 가질만한 사항은 아니게 되었습니다."
101140-10 = "5;검은 양복;01;우리는 우리의 계획을 진행합니다.\n#5;m3\n#1;dl"
101140-11 = "#all;hide"
101140-12 = "3;마에스트로;01;……미메시스로 완성시킨 콤뮤니오 상토룸은 1기. 암브로시우스는 실패했고 그레고리오는 아직 준비가 덜 끝났다.\n#3;stiff"
101140-13 = "3;골콩트;01;괴담의 무한도서관은 이제 시작했을 뿐이고, 그 어뮤즈파크의 마술사는 아직 시간이 필요할 것 같네요."
101140-14 = "3;검은 양복;01;데카그라마톤의 예언자 쪽은…… [ruby=비나]이해자[/ruby]와 [ruby=헤세드]심판자[/ruby], 그리고 [ruby=호드]영광[/ruby]의 힘을 확보했습니다."
101140-15 = "3;검은 양복;01;……데카그라마톤은 그의 예언자들을 남겨두고 스스로 죽음을 택했기에 현재로선 이 정도가 최선이겠군요.\n#3;em;…"
101140-16 = "3;검은 양복;01;이것이 [ruby=파루시아]신성의 재림[/ruby]을 재현하는 것인지 확인하고 싶었지만……. 안타깝게도 시간이 없겠군요."
101140-17 = "3;검은 양복;01;도래하고 있는 <색채>, 부활하고 있는 <무명사제>…… 어느 쪽이든 준비해두지 않으면 안 됩니다.\n#3;closeup"

[translation]
101140-1 = "第14話;[ruby=S.C.H.]夏萊[/ruby]奪還作戰（２）"
101140-3 = "……那麼，現在觀測到的那6個能量是「色彩」嗎？"
101140-4 = "目前還不清楚。不過很快就會揭曉了吧。"
101140-5 = "由於凱薩的獨斷行動，#n我想似乎還需要一些時間加以確認……"
101140-6 = "本來，不可思議並非我感興趣的對象……#n但是連「方舟」都被觀測到的現在就另當別論了。"
101140-7 = "阿拜多斯沙漠地下的歐帕茲，落入凱薩手中也沒關係嗎？"
101140-8 = "沒錯，不需過度擔心。#n畢竟無論總裁使用什麼手段，終究是無法控制那個東西的。"
101140-9 = "況且既然那不是「方舟」，就不再是我們需要感興趣的對象了。"
101140-10 = "我們就進行我們的計劃吧。"
101140-12 = "……利用[ruby=Mimesis]複製[/ruby]完成的諸聖相通還在第一階段。#n安普羅西斯失敗了，而葛利果還沒準備好。"
101140-13 = "怪談的無限圖書館才剛開始……而遊樂園的魔術師……看來還需要一點時間呢。"
101140-14 = "至於十字神名的預言者，理解者「薇娜」和審判者「赫賽德」……#n以及榮耀「霍德」的力量已經順利取得。"
101140-15 = "……十字神名留下預言者，選擇了死亡。#n以現狀來看，可以說是最好的情況了吧。"
101140-16 = "雖然很想確認這是否是神聖再臨「Parousia」的重現……遺憾的是，我們沒有時間了呢。"
101140-17 = "悄然到來的「色彩」、即將復活的「無名祭司」……#n無論哪方，都必須做好準備。"
101140-18 = "……"
101140-19 = "……"
101140-20 = "奇普托斯中的無數神祕都將消失吧。"
101140-21 = "……將他們的明滅，也視為我們的探求吧。"
101140-22 = "……"
101140-23 = "……"
101140-28 = "……嗯？"
101140-42 = "SOF，報告狀況。"
101140-44 = "OSCAR1，正在目前位置待命。"
101140-46 = "OSCAR2，待命中。"
101140-48 = "OSCAR3，已確保狙擊位置。正等待命令。"
101140-50 = "那麼，開始突入夏萊大樓。"
101140-51 = "……上吧！"

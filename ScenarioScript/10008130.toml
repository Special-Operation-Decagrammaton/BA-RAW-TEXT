[translation]
10008130-1 = "Episode 13;New Year Wishes"
10008130-2 = "Things finally began to calm down after the commotion on New Year's Day."
10008130-6 = "Our top story of the day! Scandal at the Daikichiden event!"
10008130-7 = "And the shocking truth behind the Kurokame Gang's involvement!"
10008130-8 = "To learn the truth, I have with me one of the members of Gehenna's Prefect Team that has been working overnight to solve the New Year's chaos!"
10008130-12 = "Could you describe in detail what you know about this incident?"
10008130-13 = "Huh? Are you trying to interview me?"
10008130-14 = "All I want to do is go home and get some sleep..."
10008130-16 = "It wasn't before long that the Kurokame Gang's criminal activity was exposed by the Kronos School of Journalism."
10008130-17 = "The Kurokame Gang's boss and most of their forces were captured thanks to the Prefect Team. It will be hard for them to ever make a comeback. "
10008130-18 = "All in all, things were mostly back to normal."
10008130-22 = "No! It can't end like this!"
10008130-23 = "You said it! We're supposed to just forget about that offering box scam and move on?!"
10008130-24 = "I was going to use that money to buy myself a new helmet! Was that too much to ask for?!"
10008130-28 = "You've got to be kidding me. This isn't what I signed up for!"
10008130-29 = "[s] \"Sorry. I'll lend a hand.\""
10008130-33 = "Fine! So be it!"

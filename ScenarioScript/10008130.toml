[translation]
10008130-1 = "第13話;在新年許下心願"
10008130-2 = "（新年發生的大騷動漸漸平息了下來……）"
10008130-6 = "新年第一個大事件，大吉殿的真相！"
10008130-7 = "以及黑龜組究竟是什麼！"
10008130-8 = "為了發掘真相，#n讓我們來聽聽從元旦開始就非常有活力地工作著的格黑娜風紀委員們怎麼說吧！"
10008130-12 = "對於這次的事件，可以請您分享您所知道的消息嗎？"
10008130-13 = "……咦，採訪？"
10008130-14 = "不是，我現在只想趕快回去睡覺……"
10008130-16 = "（由於克洛盧斯新聞部的報導，黑龜組犯罪的真相立刻被攤在了陽光下）"
10008130-17 = "（也多虧格黑娜風紀委員會的活躍，#n　黑龜組的老大和成員大多都遭到逮捕，組織幾乎處於毀滅的狀況）"
10008130-18 = "（於是事情大致上都成功解決，然而……）"
10008130-22 = "不不不，我可沒辦法接受啊！？"
10008130-23 = "賽錢箱的事居然是騙人的！誰能接受啊！"
10008130-24 = "好不容易打算要買新頭盔的說！把我們微薄的夢想還來！"
10008130-28 = "……這個跟巫女的打工好像沒關係吧。"
10008130-29 = "[s]「抱歉，一起加油吧……」"
10008130-33 = "啊啊真是的，也只能這樣了！"

[translation]
1009402-1 = "女僕的感覺！"
1009402-2 = "（桃井雖然說得信誓旦旦……）"
1009402-3 = "（不過聽他這麼說反而湧現了一股不安，於是比平常更匆忙地抵達夏萊）"
1009402-8 = "[ns]「桃井？我到了哦……」"
1009402-12 = "― [log=모모이 메이드]唔嘿嘿……餅乾，真好吃……[/log][wa:4450] "
1009402-13 = "― [log=모모이 메이드]陽光很溫暖……沙發也軟綿綿的……[/log][wa:6340] "
1009402-16 = "[ns]「桃井同學？不是說要打掃嗎？」"
1009402-17 = "― [log=모모이 메이드]唔唔……打掃……？[/log][wa:2260] "
1009402-18 = "― [log=모모이 메이드]我會打掃啦……等我吃完這個……再休息一下之後……[/log][wa:7490] "
1009402-21 = "― [log=모모이 메이드]咦？老師？[/log][wa:2970] "
1009402-22 = "― [log=모모이 메이드]原來如此。這，還是在夢裡對吧。[/log][wa:5800] "
1009402-25 = "― [log=모모이 메이드]居然連夢裡都能見到老師……真是場好夢呢……[/log][wa:5210] "
1009402-26 = "― [log=모모이 메이드]今天搞不好，會發生開心的事……唔嘿嘿……[/log][wa:8000] "
1009402-29 = "― [log=모모이 메이드]呣喵呣喵……啊，是額外的生命值……[/log][wa:5120] "
1009402-32 = "[ns] 「真是的……」"
1009402-33 = "（就在打算搖醒桃井時……）"
1009402-34 = "（莫名想鬧鬧他，於是決定彈一下他的額頭！）"
1009402-40 = "嗚哇啊！？"
1009402-41 = "你做什麼啦，老師！"
1009402-45 = "啊，老師……？"
1009402-46 = "[ns]「你～不～是～說～要～幫～我～打～掃～嗎～」"
1009402-47 = "啊不是，那個，你先聽我解釋！"
1009402-48 = "這是無可奈何的，不管誰來都一定會變成這樣！"
1009402-54 = "你聽我說哦，老師。#n我本來是想先整理沙發的。"
1009402-55 = "但奇怪的是，正當我打算動手的時候，突然就餓了起來！"
1009402-56 = "於是我就看了看周圍，結果發現附近正好有餅乾！"
1009402-57 = "本來想說吃完餅乾就要認真打掃，可是吃著吃著就開始想睡了。"
1009402-58 = "就在這時，眼前正好有個還沒整理好，可是看起來很鬆軟的沙發！"
1009402-59 = "假如老師站在相同的立場，難道不會想要先躺一躺嗎？"
1009402-60 = "[ns]「你繼續說沒關係～」"
1009402-61 = "果然還是老師好溝通！#n所以，所以……"
1009402-65 = "我本來真的只是想躺一下而已哦？都怪沙發實在太柔軟了！"
1009402-66 = "所以是沙發……還有老師的錯！"
1009402-67 = "[s]「不是，這跟我有什麼關係……」"
1009402-68 = "因為這個鬆軟的沙發是老師準備來誘惑我的！"
1009402-69 = "鬆軟的沙發和溫暖的床，根本就是同等級的魔獸！是魔物！"
1009402-70 = "人早上之所以很難從床上爬起來，就是因為這個原因。#n還有被沙發黏住一直玩手機也是。"
1009402-71 = "所，所以這是一起意外！#n這種情況叫什麼來著……對了，是「不可思議」！"
1009402-72 = "[s]「你想說的是『不可抗力』吧……」"
1009402-73 = "總之……！"
1009402-75 = "（之後桃井又繼續拚命說明(?)了好一陣子……）"
1009402-77 = "[ns]「想說的都說完了嗎？」"
1009402-78 = "嗯……"
1009402-79 = "抱歉，老師……"
1009402-80 = "[s1]「沒事沒事……」\n[s2]「那接下來就一起打掃吧。」"
1009402-83 = "嗯？真的要打掃嗎？"
1009402-84 = "打從一開始就是我說要幫忙打掃？#n仔細想想好像是耶？"
1009402-85 = "但是……如果老師平常有好好打掃的話，應該就不需要我來打掃了吧。"
1009402-86 = "問我要耍賴到什麼時候？#n我，我也沒辦法嘛！"
1009402-87 = "[s3]「最根本的問題！」\n[s4]「會不會是因為我們兩個都不喜歡打掃！」"
1009402-90 = "說的真好！不愧是老師，你這不是很懂嗎！"
1009402-97 = "要，要我別逃走，乖乖拿起掃把……？嗚嗚……！"
1009402-100 = "知道了！我知道了啦！打掃就打掃嘛！#n嗚嗚，這就是女僕的心情嗎！？"
1009402-102 = "（於是和桃井的「夏萊打掃大作戰」就這樣開始了……）"
1009402-118 = "完成了！"
1009402-119 = "哎呀～只要想做還是能做好的嘛！對吧，老師？"
1009402-120 = "你說我辛苦了？呵呵～怎麼這麼說呢！#n對我來說，現在實戰才剛剛開始哦！"
1009402-121 = "[s]「突然有股不祥的預感。」"
1009402-122 = "哼哼哼……老師的直覺也變強了啊。"
1009402-123 = "你想想看！女僕不就是被僱用的人嗎？"
1009402-124 = "是為人完成家務和各種雜事，藉此收取報酬的職業。"
1009402-125 = "[s]「是這樣沒錯……？」"
1009402-126 = "所以老師身為僱主，應該支付報酬給我這個女僕！"
1009402-127 = "[s]「怎麼這樣！我明明也有一起打掃啊！」"
1009402-128 = "不管不管！自己住的地方本來就該自己打掃！"
1009402-129 = "[s]「從桃井口中聽到這句話，簡直是三倍的委屈！」"
1009402-130 = "總而言之！老師有義務支付我的薪水！"
1009402-131 = "問我要怎麼支付？"
1009402-132 = "哼哼哼……那就是……！"
1009402-136 = "陪我玩一整天的遊戲！"
1009402-137 = "問我這樣就夠了？你不知道該玩什麼才好？#n我早就知道你會這麼說，所以已經事先……"
1009402-138 = "鏘～！帶了很多遊戲機來哦！"
1009402-140 = "（於是就在清理乾淨的房間裡，和桃井開心地玩著遊戲）"
1009402-141 = "（因為桃井老是想坐在膝蓋上物理擋住視線，所以被迫更換了好幾個姿勢）"
1009402-142 = "（結果後來……）"
1009402-144 = "你聽說了嗎？我是指夏萊的老師。"
1009402-145 = "當然囉。#n聽說他不只要求學生穿女僕裝，而且還要學生做這個做那個的……"
1009402-147 = "（總覺得夏萊的名聲已經朝著奇怪的方向一去不復返了……）"

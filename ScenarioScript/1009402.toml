[translation]
1009402-1 = "A Maid's Feelings!"
1009402-2 = "Momoi sounded confident when she called me, but..."
1009402-3 = "...her words left me feeling a little anxious, so I arrived at Schale a little earlier than usual."
1009402-8 = "[ns] \"Momoi? I'm here...\""
1009402-12 = "― [log=모모이 메이드]Heehee... The snacks taste great...[/log][wa:3570] "
1009402-13 = "― [log=모모이 메이드]The sunlight is warm...and the sofa is so soft...[/log][wa:5020] "
1009402-16 = "[ns] \"Momoi? Weren't you supposed to be cleaning?\""
1009402-17 = "― [log=모모이 메이드]Hmm... Cleaning...?[/log][wa:1860] "
1009402-18 = "― [log=모모이 메이드]I'll do it...after I eat this...and take a short break...[/log][wa:6170] "
1009402-21 = "― [log=모모이 메이드]Huh? Sensei?[/log][wa:2690] "
1009402-22 = "― [log=모모이 메이드]Ah, I see. This...is still a dream.[/log][wa:5000] "
1009402-25 = "― [log=모모이 메이드]Wow, I can meet you in my dreams too... That's so nice...[/log][wa:3770] "
1009402-26 = "― [log=모모이 메이드]Maybe something exciting will happen today... Heehee...[/log][wa:6600] "
1009402-29 = "― [log=모모이 메이드]*yawn*... Yay... I got a bonus life...[/log][wa:4280] "
1009402-32 = "[ns] \"Ugh...\""
1009402-33 = "I tried waking Momoi by shaking her..."
1009402-34 = "...but then I felt like playing a joke, so I opted to give her a light flick instead."
1009402-40 = "Uh, what?"
1009402-41 = "What are you doing, Sensei?"
1009402-45 = "Huh...?"
1009402-46 = "[ns] \"I...thought you were going to clean up.\""
1009402-47 = "No, that's... this is... Okay, so...!"
1009402-48 = "Th-This could have happened to anybody. Let me say that first."
1009402-54 = "I was going to start by straightening up the sofa."
1009402-55 = "But just as I started doing that, I got a little hungry."
1009402-56 = "So I looked around, and I spotted some snacks."
1009402-57 = "I was gonna have a quick snack and then get back to work, but as I kept eating, I started getting sleepy."
1009402-58 = "And I knew I had to finish work, but there was this soft, inviting sofa just sitting there! "
1009402-59 = "Tell me you wouldn't have been tempted to lie down for a minute in that situation."
1009402-60 = "[ns] \"Keep going, I'm listening.\""
1009402-61 = "Right? You get it! So, like I was saying..."
1009402-65 = "I only meant to lie down for a minute, but the sofa was just so incredibly soft!"
1009402-66 = "So it's the sofa's fault! And yours too, Sensei!"
1009402-67 = "[s] \"Wait, why are you dragging me into this?\""
1009402-68 = "You set up this incredibly comfy sofa, and you totally lured me in! And you know..."
1009402-69 = "A soft sofa is like a magical beast, like a warm bed...but the bed's all tempting, like a demon!"
1009402-70 = "That's why it's so hard to get up in the morning. And it's also why we all keep getting glued to the sofa, just scrolling through our phones."
1009402-71 = "S-So, it was kind of an accident! Just a...mysterious, uncontrollable accident!"
1009402-72 = "[s] \"I guess it was bound to happen.\""
1009402-73 = "Anyway!"
1009402-75 = "Momoi's desperate \"explanation\" carried on for quite a while after that."
1009402-77 = "[ns] \"Are you all done with your story?\""
1009402-78 = "Yeah."
1009402-79 = "And...I'm sorry, Sensei..."
1009402-80 = "[s1] \"All right, all right...\"\n[s2] \"Well, let's both clean up, then.\""
1009402-83 = "Wait, you want to clean with me? Really?"
1009402-84 = "Isn't that what I came here to help you with? It was, wasn't it?"
1009402-85 = "But...you know, if you'd kept things nice and neat in the first place, we wouldn't have to clean it all, would we?"
1009402-86 = "I know, shameless. I can't help it. I don't even know where I'm going with this."
1009402-87 = "[s3] \"Of course, you know the real issue here.\"\n[s4] \"Neither of us likes cleaning!\""
1009402-90 = "True! Spot on, Sensei!"
1009402-97 = "...Y-You want me to stay and grab a broom? Ugh...!"
1009402-100 = "Okay, okay, I'll do it. Ugh, is this what being a maid feels like?"
1009402-102 = "And so, Momoi and I began the Great Schale Cleaning Mission..."
1009402-118 = "...We did it!"
1009402-119 = "Wow! So this is how it's done! Right, Sensei?"
1009402-120 = "I did a good job? Heehee, well, the real challenge starts now, though."
1009402-121 = "[s] \"That's...kind of unnerving.\""
1009402-122 = "Heeheehee... Your intuition has improved, Sensei."
1009402-123 = "If you think about it, a maid is just a hired worker, right?"
1009402-124 = "It's a job where you take care of household chores and tasks for others, and they pay you, right?"
1009402-125 = "[s] \"Right...\""
1009402-126 = "So, as my employer, you're now obligated to pay your employee, me!"
1009402-127 = "[s] \"That's not fair! I helped with the cleaning too!\""
1009402-128 = "Yeah, but it's your place! You're SUPPOSED to clean it!"
1009402-129 = "[s] \"You know, coming from you, Momoi, this feels about three times as unfair!\""
1009402-130 = "Regardless, you have an obligation to pay me my daily compensation!"
1009402-131 = "Now, you're wondering what kind of payment I accept."
1009402-132 = "Heeheehee... Well, that's simple..."
1009402-136 = "Just hang out with me all day!"
1009402-137 = "Are you wondering if that's enough? Maybe you're not sure what to do for fun? I thought you might have trouble with that..."
1009402-138 = "...so I brought a bunch of game consoles with me!"
1009402-140 = "In the end, with the room freshly cleaned, Momoi and I had a blast playing games."
1009402-141 = "Momoi kept sitting on my lap, trying to block my view, so I had to keep changing positions."
1009402-142 = "But then later..."
1009402-144 = "Did you hear? The rumor about Schale's Sensei...? "
1009402-145 = "Yes, my goodness. I've heard that Sensei dresses students up in maid outfits! Then they make the students do chores for them!"
1009402-147 = "I knew this would NOT be good for my reputation..."

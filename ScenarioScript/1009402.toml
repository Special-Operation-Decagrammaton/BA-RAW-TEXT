[translation]
1009402-1 = "ความรู้สึกของเมด!"
1009402-2 = "(ถึงโมโมอิจะพูดอย่างมั่นอกมั่นใจ...)"
1009402-3 = "(แต่พอได้ฟังคำพูดของโมโมอิ คุณครูก็ไม่สบายใจและรีบมาที่ชาเล่ต์)"
1009402-8 = "[ns] \"โมโมอิ? ครูมาแล้ว...\""
1009402-12 = "― [log=모모이 메이드]แหะๆๆ... ขนมอร่อยจัง...[/log][wa:4050] "
1009402-13 = "― [log=모모이 메이드]แสงแดดก็อบอุ่น... โซฟาก็นุ่มนิ่ม...[/log][wa:5580] "
1009402-16 = "[ns] \"คุณโมโมอิ? ไหนว่าจะทำความสะอาดน่ะ?\""
1009402-17 = "― [log=모모이 메이드]งืม... ทำความสะอาดเหรอ...?[/log][wa:1580] "
1009402-18 = "― [log=모모이 메이드]เดี๋ยวค่อยทำ... ขอกินอันนี้... แล้วก็พักอีกหน่อยก่อน...[/log][wa:6250] "
1009402-21 = "― [log=모모이 메이드]เอ๋? คุณครู?[/log][wa:2690] "
1009402-22 = "― [log=모모이 메이드]อ่า เป็นอย่างนี้นี่เอง นี่ยังเป็นความฝันอยู่สินะ[/log][wa:4480] "
1009402-25 = "― [log=모모이 메이드]ได้เจอคุณครูในความฝันด้วยเหรอเนี่ย... นี่คือฝันดีสินะ...[/log][wa:3810] "
1009402-26 = "― [log=모모이 메이드]วันนี้อาจจะมีเรื่องอะไรสนุกๆ เกิดขึ้นก็ได้...แหะๆๆ...[/log][wa:6680] "
1009402-29 = "― [log=모모이 메이드]งืม งืม... อ๊ะ ได้โบนัสพลังชีวิตเพิ่มแฮะ...[/log][wa:4080] "
1009402-32 = "[ns] \"เฮ้อ...\""
1009402-33 = "(คุณครูเขย่าตัวโมโมอิเพื่อปลุก)"
1009402-34 = "(แต่จู่ๆ ก็อยากแกล้งขึ้นมา เลยใช้นิ้วดีดหน้าผากเบาๆ!)"
1009402-40 = "โอ๊ย!!"
1009402-41 = "ทำอะไรน่ะคุณครู!"
1009402-45 = "เอ๋? คุณครู...?"
1009402-46 = "[ns] \"ไหน~ ว่า~ จะ~ ทำ~ ความ~ สะอาด~ ให้~ ไง~\""
1009402-47 = "เดี๋ยวสิ คือว่า เอ่อ... แบบว่า!"
1009402-48 = "ต้องบอกว่าการหลับเป็นเรื่องที่ช่วยไม่ได้ หรือต้องบอกว่าทุกคนต้องมีชะตากรรมแบบนี้ดีนะ!"
1009402-54 = "แต่คุณครูต้องเชื่อฉันนะ เมื่อกี้นี้ฉันจัดตรงโซฟาไปแล้วด้วย"
1009402-55 = "แต่พอลงมือทำไปเรื่อยๆ ท้องมันก็หิวขึ้นมาแปลกๆ น่ะ!"
1009402-56 = "แล้วพอกวาดสายตามองไปรอบๆ ก็เห็นว่ามีขนมอยู่พอดี"
1009402-57 = "เลยคิดว่างั้นกินขนมนี่เสร็จแล้วค่อยมาตั้งใจทำความสะอาดละกัน แต่พอกินไปเรื่อยๆ ฉันก็ดันง่วงขึ้นมานี่สิ"
1009402-58 = "ถึงจะยังทำงานไม่เสร็จดี แต่โซฟานุ่มๆ ก็เรียกหาฉันซะงั้น! "
1009402-59 = "ถ้าคุณครูเป็นฉัน ก็น่าจะคิดเหมือนกันหรือเปล่าว่าควรลงไปนอนดูสักหน่อย?"
1009402-60 = "[ns] \"เชิญเล่าไปเรื่อยๆ ได้เลย~\""
1009402-61 = "กะไว้แล้วเชียวว่าคุณครูต้องเข้าใจฉัน! ก็เพราะแบบนั้นน่ะแหละ..."
1009402-65 = "ฉันตั้งใจจะนอนแค่แป๊บเดียวจริงๆ นะ แต่โซฟามันนุ่มมาก!"
1009402-66 = "คนที่ผิดก็คือโซฟานั่นละ! คุณครูก็ด้วย!"
1009402-67 = "[s] \"อ้าว ครูไปเกี่ยวอะไรด้วย\""
1009402-68 = "ก็คุณครูหลอกล่อฉันด้วยโซฟานุ่มๆ นั่นไง! เอาเถอะ"
1009402-69 = "โซฟานุ่มๆ น่ะถือเป็นกับดักที่อันตรายพอๆ กับเตียงอุ่นๆ เลยนะ"
1009402-70 = "ที่เราลุกออกจากเตียงยากหลังตื่นนอนตอนเช้า และที่เราถูกโซฟาดูดแล้วเอาแต่ไถโทรศัพท์ก็เป็น เพราะปีศาจที่อยู่ในกับดักนั้นไงล่ะ"
1009402-71 = "พะ... เพราะงั้นเท่ากับฉันถูกปีศาจเล่นงาน นี่เป็นอุบัติเหตุนะ! ต้องเรียกว่ายังไงดี เรื่องน่าพิศวงไง ใช่! เรื่องน่าพิศวง!"
1009402-72 = "[s] \"เขาเรียกว่าเหตุสุดวิสัยน่ะ...\""
1009402-73 = "จะยังไงก็เถอะ!"
1009402-75 = "(แล้วโมโมอิก็อธิบายต่ออย่างเอาเป็นเอาตายอยู่อีกพักใหญ่...)"
1009402-77 = "[ns] \"เล่าจบหรือยัง?\""
1009402-78 = "อืม..."
1009402-79 = "ขอโทษนะคุณครู..."
1009402-80 = "[s1] \"อืม ไม่เป็นไรหรอก...\"\n[s2] \"งั้นจากนี้ก็มาทำความสะอาดด้วยกันเถอะ\""
1009402-83 = "หืม? ทำความสะอาดเหรอ?"
1009402-84 = "ฉันมาที่นี่เพราะบอกว่าจะมาทำความสะอาดให้งั้นเหรอ? พอคิดดูแล้วก็จริงแฮะ"
1009402-85 = "แต่ว่า... ถ้าปกติคุณครูรักษาความสะอาดของที่นี่ ฉันก็ไม่จำเป็นต้องมาทำความสะอาดไม่ใช่เหรอ?"
1009402-86 = "ฉะ... ฉันจะหาข้ออ้างไปถึงเมื่อไรงั้นเหรอ? กะ... ก็มันช่วยไม่ได้นี่นา!"
1009402-87 = "[s3] \"ครูว่าปัญหาที่แท้จริงก็คือความขี้เกียจ!\"\n[s4] \"เราต่างก็ขี้เกียจทำความสะอาดด้วยกันทั้งคู่นี่นะ!\""
1009402-90 = "ใช่แล้ว! พูดอีกก็ถูกอีก!"
1009402-97 = "ยะ... อย่าคิดจะหนี แล้วให้ไปหยิบไม้กวาดมางั้นเหรอ...? อึก...!"
1009402-100 = "ก็ได้! รู้แล้วน่า! แค่ทำให้เสร็จก็พอแล้วนี่นา! ฮึ่ย... นี่สินะความรู้สึกของเมดน่ะ?!"
1009402-102 = "(หลังจากนั้นคุณครูกับโมโมอิก็เริ่ม <ปฏิบัติการทำความสะอาดชาเล่ต์> ด้วยกัน...)"
1009402-118 = "สำเร็จ!"
1009402-119 = "เฮ้อ~ ถ้าตั้งใจก็ทำได้นี่นา! ใช่มั้ย คุณครู?"
1009402-120 = "ฉันทำได้ดีงั้นเหรอ? ฮุฮุ~ ไม่ต้องชมกันหรอก! การเป็นเมดของฉันเพิ่งจะเริ่มขึ้นต่างหาก!"
1009402-121 = "[s] \"จู่ๆ ก็เริ่มรู้สึกถึงลางไม่ดีเลยแฮะ\""
1009402-122 = "ฮุฮุฮุ... ลางสังหรณ์คุณครูก็แม่นขึ้นเรื่อยๆ เลยนะ"
1009402-123 = "ลองคิดดูนะ คนที่เป็นเมด สุดท้ายแล้วก็คือคนที่ถูกจ้างงานมาใช่มั้ย?"
1009402-124 = "เมดคืออาชีพที่ทำงานบ้านหรือจัดการเรื่องต่างๆ ให้คนอื่นแล้วก็ได้รับค่าตอบแทนใช่มั้ยล่ะ?"
1009402-125 = "[s] \"ก็ใช่นะ...\""
1009402-126 = "เพราะงั้นผู้ว่าจ้างอย่างคุณครูก็ต้องจ่ายค่าเหนื่อยให้เมดอย่างฉันด้วย!"
1009402-127 = "[s] \"ไหงเป็นงั้น! ครูก็ช่วยทำความสะอาดนะ!\""
1009402-128 = "เดี๋ยวเหอะ! ปกติคนเราต้องทำความสะอาดพื้นที่ที่เราอยู่ด้วยตัวเองสิ!"
1009402-129 = "[s] \"ยิ่งได้ฟังคำแบบนั้นจากโมโมอิ ครูยิ่งเจ็บใจนะ\""
1009402-130 = "เอาเถอะ เอาเป็นว่าตอนนี้คุณครูติดค่าจ้างฉันอยู่"
1009402-131 = "จะให้จ่ายด้วยอะไรงั้นเหรอ?"
1009402-132 = "ฮุฮุฮุ... จ่ายด้วย..."
1009402-136 = "ให้มาเล่นสนุกกับฉันทั้งวันยังไงล่ะ!"
1009402-137 = "ใช่ แค่นั้นก็เพียงพอแล้วละ ว่าไงนะ? ไม่รู้ว่าจะชวนเล่นอะไรงั้นเหรอ? ฉันรู้อยู่แล้วละว่าคุณครูจะคิดไม่#nออกน่ะ..."
1009402-138 = "ฉันก็เลยหอบเครื่องเล่นเกมมาด้วยแหละ! นี่ไง เอามาเพียบเลย!"
1009402-140 = "(สุดท้ายคุณครูกับโมโมอิก็เล่นเกมด้วยกันอย่างสนุกสนานในห้องที่สะอาดขึ้นมาบ้างแล้ว)"
1009402-141 = "(โมโมอิขึ้นมานั่งตักคุณครูอยู่บ่อยๆ เพื่อแกล้งให้เสียสมาธิ คุณครูจึงต้องเขยิบและเปลี่ยนท่านั่งอยู่#nหลายครั้ง)"
1009402-142 = "(และแล้ว...)"
1009402-144 = "ได้ยินเรื่องนั้นมาหรือยังครับ? เรื่องคุณครูจากชาเล่ต์น่ะครับ"
1009402-145 = "ได้ยินมาอยู่ครับ ให้นักเรียนสวมชุดเมดไม่พอ แต่ยังสั่งให้ทำงานอะไรต่อมิอะไรด้วย ไม่อยากจะเชื่อเลยนะครับ..."
1009402-147 = "(รู้สึกว่าชื่อเสียงของชาเล่ต์จะกลายเป็นชื่อเสียเข้าให้ซะแล้ว...)"

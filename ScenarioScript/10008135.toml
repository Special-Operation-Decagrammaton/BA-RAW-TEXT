[translation]
10008135-2 = "I'm really not going to be paid after all."
10008135-3 = "[s] \"I mean, the Prefect Team did arrest your boss...\""
10008135-4 = "Geez. Yeah, I don't know what I expected."
10008135-5 = "This kind of thing happens all the time when you make a living taking on part-time jobs."
10008135-6 = "[s] \"It does?!\""
10008135-10 = "Besides, I'm not the only one left a little disappointed."
10008135-15 = "Ha...haha. It's over. It's all over..."
10008135-16 = "Oh, u-um..."
10008135-17 = "*sigh* I'm exhausted."
10008135-18 = "How could we have wasted our New Year's like this?"
10008135-19 = "W-Well, uh..."
10008135-21 = "Are you still beating yourself up over that, Aru?"
10008135-22 = "[s] \"Mutsuki?\""
10008135-23 = "What's done is done. And maybe it's just me, but I had fun. I don't think it was a waste."
10008135-24 = "We made a bunch of good memories! Talk about a fun night!"
10008135-25 = "But our wishes..."
10008135-26 = "Speaking of which, you never got to make yours, did you, Mutsuki?"
10008135-27 = "Huh. I guess not."
10008135-28 = "Why not do it now? The offering box is right there."
10008135-29 = "Hmm!"
10008135-30 = "I have an idea! "
10008135-31 = "Why don't we make it together?"
10008135-32 = "Here! I have enough play money to go around!"
10008135-33 = "H-Huh?"
10008135-34 = "A-Are you sure it'll work with this?"
10008135-36 = "I'm sure it'll be fine."
10008135-44 = "Here, Sensei. You take some too."
10008135-45 = "Let's all make a New Year's wish."
10008135-46 = "Oh, but different from the first one you made!"
10008135-47 = "A new wish, new year, new you! Okay?"
10008135-53 = "Well, okay..."
10008135-54 = "That sounds good."
10008135-55 = "[s] \"I'm in.\""
10008135-57 = "Okay. Here goes nothing!"
10008135-66 = "Aaaaaand done!"
10008135-67 = "[s] \"That was quick.\""
10008135-70 = "Heehee. If you're not first, you're last, Sensei."
10008135-71 = "I don't recall reading that rule anywhere at the shrine."
10008135-72 = "By the by, Sensei. What was your wish?"
10008135-73 = "[s] \"Oh, right. I never shared.\""
10008135-74 = "Aru! It won't come true if you share it with everyone!"
10008135-75 = "You don't want that to happen, do you?"
10008135-76 = "I suppose not..."
10008135-77 = "We've been on our feet this entire time. Is anyone else feeling...?"
10008135-81 = "S-Sorry! That was my stomach! I haven't eaten since yesterday!"
10008135-82 = "Haha! You're right! We're all pretty hungry, huh? "
10008135-83 = "Sensei? Won't you be a dear and treat us all to breakfast?"
10008135-84 = "A wonderful idea. I concur."
10008135-85 = "Sure. If Sensei's good with it."
10008135-86 = "Uh...can I tag along too? It doesn't make up for missing a paycheck, but if Sensei's buying, I'm in."
10008135-87 = "[s] \"I don't have much of a choice in this, do I?\""
10008135-89 = "You wouldn't turn us down, would you? I'd say we all earned it after last night."
10008135-90 = "Yeah! Let's go!"
10008135-91 = "Okay, but where to?"
10008135-93 = "Haha."
10008135-94 = "I-I have a suggestion! Ramen is always the best with Aru!"
10008135-97 = "And that's how a new year began in Kivotos."
10008135-102 = "[ns] \"(The New Year's wish I made, huh?)\""
10008135-107 = "[ns] Silently make a wish for the new year."
10008135-108 = "New Year's Rhapsody No. 68"

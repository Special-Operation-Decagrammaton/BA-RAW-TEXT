[translation]
10008135-2 = "嗚嗚……結果還是沒領到打工費……"
10008135-3 = "[s]「畢竟身為雇主的負責人被抓走了……」"
10008135-4 = "算了，這也沒辦法……"
10008135-5 = "打工的時候就會常常碰到這種事……"
10008135-6 = "[s]「常常碰到嗎！？」"
10008135-10 = "雖然我也沒多好，不過他們好像非常失望的樣子……"
10008135-15 = "呵呵……啊哈哈……全都，全都結束了……"
10008135-16 = "呃，那，那個……"
10008135-17 = "……唉，真累人。"
10008135-18 = "結果……我們新年第一天到底做了什麼……？"
10008135-19 = "這，這個……"
10008135-21 = "哎呀～煩惱已經過去的事也沒意義嘛！"
10008135-22 = "[s]「無月？」"
10008135-23 = "咯呵呵～反正我也還挺開心的？也不會覺得空虛之類的。"
10008135-24 = "發生了各種有趣的事，真的很開心！"
10008135-25 = "但，但是願望都……嗚嗚……"
10008135-26 = "這麼說來，無月還沒許願對吧？"
10008135-27 = "啊，你這麼一說好像是呢？"
10008135-28 = "要不要現在許個願？雖然地點有點奇怪，姑且還是有個賽錢箱。"
10008135-29 = "嗯！"
10008135-30 = "說的也是！"
10008135-31 = "那大家一起許願吧！"
10008135-32 = "來，玩具錢正好可以分給每個人哦！"
10008135-33 = "咦，咦？"
10008135-34 = "用，用這個許願不會有問題嗎……？"
10008135-36 = "沒事沒事！"
10008135-44 = "來，老師也有！"
10008135-45 = "大家一起許願吧！"
10008135-46 = "啊，當然要許跟剛才不一樣的哦！"
10008135-47 = "用新的心情，許新的願望！知道了嗎？"
10008135-53 = "嗯，嗯……"
10008135-54 = "……嗯，說的也是。"
10008135-55 = "[s]「我覺得這樣很好。」"
10008135-57 = "那麼，預備！"
10008135-66 = "好，許完了！"
10008135-67 = "[s]「還真快……」"
10008135-70 = "咯呵呵，這種事就是先做先贏哦？"
10008135-71 = "……嗯，許好了。#n話說我覺得這應該沒什麼勝負之分吧。"
10008135-72 = "對了，老師，你許了什麼樣的願望呢？"
10008135-73 = "[s]「啊，這麼說來被中斷了呢。」"
10008135-74 = "亞瑠醬，不可以問那種問題哦！#n把願望跟別人說的話就沒有效果了。"
10008135-75 = "亞瑠醬也不希望那樣吧？"
10008135-76 = "是，是沒錯啦……"
10008135-77 = "唉。#n都怪今天到處跑來跑去的，總感覺……"
10008135-81 = "對，對不起對不起！我的肚子擅自就……真的很抱歉……！？"
10008135-82 = "啊哈！不過確實是餓了呢。"
10008135-83 = "那就叫老師請我們吃點好吃的吧！"
10008135-84 = "也對，就這麼辦吧。"
10008135-85 = "嗯，老師願意的話我也贊成。"
10008135-86 = "……那個，我也可以去嗎？#n難得老師要請客……"
10008135-87 = "[s]「突然就變成既定事項了……！」"
10008135-89 = "呵呵，老師應該不會拒絕吧？大家都這麼努力了。"
10008135-90 = "那我們出發吧！快點快點！"
10008135-91 = "話說要吃什麼？"
10008135-93 = "……呵呵，這裡也很熱鬧呢。"
10008135-94 = "我，我也可以提意見嗎……！？#n那，那個，要和亞瑠大人一起的話還是想吃拉麵之類的……！"
10008135-97 = "（就這樣，奇普托斯新的一年開始了）"
10008135-102 = "[ns] （許願……）"
10008135-107 = "[ns] 默默且真誠地在心中許願"
10008135-108 = "新春狂想曲第68號"

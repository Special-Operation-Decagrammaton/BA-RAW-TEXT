[translation]
10008135-2 = "สุดท้ายแล้วก็ไม่ได้เงินค่าทำงานพาร์ทไทม์สินะ..."
10008135-3 = "[s] \"ผู้ดูแลงานถูกคณะกรรมการวินัยจับตัวไปแล้วนี่นะ...\""
10008135-4 = "อึก...! เฮ้อ... ช่วยไม่ได้นะ..."
10008135-5 = "ทำงานพาร์ทไทม์ไปนานๆ เรื่องแบบนี้มันก็เกิดขึ้นได้บ่อยๆ น่ะ..."
10008135-6 = "[s] \"เกิดขึ้นบ่อยๆ เหรอ?!\""
10008135-10 = "แน่นอนฉันเองก็ผิดหวัง แต่เจ้าพวกนั้นเองก็คงผิดหวังมากน่าดูเหมือนกัน"
10008135-15 = "ฮะ...ฮะฮะ... ฮุฮุ... ทุกอย่าง... ทุกอย่างพังทลายไปหมดแล้ว..."
10008135-16 = "เอ่อ... คะ... คือว่า"
10008135-17 = "เฮ้อ... วุ่นวายใหญ่โตเลยนะ"
10008135-18 = "สุดท้ายแล้วพวกเรา... มาทำอะไรในวันปีใหม่กันนะ...?"
10008135-19 = "คะ...คือว่าเรื่องนั้นมัน..."
10008135-21 = "เรื่องนั้นช่างมันเถอะน่า อารุจัง!"
10008135-22 = "[s] \"มะ...มุสึกิ?\""
10008135-23 = "ฮุฮุฮุ~ ฉันก็สนุกในแบบของฉันนั่นละ มันก็ไม่ได้เปล่าประโยชน์ไปซะทีเดียวหรอก~"
10008135-24 = "เพราะเรื่องนี้คงเป็นเรื่องที่จะจดจำไปอีกนานเลยละ~ สนุกสุดๆ ไปเลย!"
10008135-25 = "ตะ...แต่ว่าพรที่ขอไป..."
10008135-26 = "มันก็แค่การขอพรน่ะ ว่าแต่มุสึกิ เธอยังไม่ได้ขอพรไม่ใช่เหรอ?"
10008135-27 = "เอ๊ะ? ใช่แล้ว จริงด้วยสิน้า~"
10008135-28 = "ถ้างั้นไปขอพรตอนนี้เลยเป็นไง? ตรงนี้มีตู้บริจาคอยู่พอดีเลย"
10008135-29 = "อื้อออ~!"
10008135-30 = "ถ้างั้น...! ดีละ! "
10008135-31 = "ไหนๆ ก็เป็นแบบนี้แล้ว! มาขอพรด้วยกันเถอะ!"
10008135-32 = "นี่ไง! ฉันมีแบงก์ปลอมพอดีกับทุกคนเลยนะ!"
10008135-33 = "หะ...หืม?"
10008135-34 = "เอ่อ... ทำแบบนี้ได้จริงๆ เหรอคะ?"
10008135-36 = "ไม่เป็นไรหรอก ไม่เป็นไร"
10008135-44 = "เอาละ! เอ้า! นี่ของคุณครู!"
10008135-45 = "ใช้เงินนี่ขอพรกันเถอะ~!"
10008135-46 = "อ๊ะ! ต้องขอพรใหม่ ห้ามเหมือนกับเมื่อกี้นะ!"
10008135-47 = "ขอพรใหม่! ด้วยความรู้สึกใหม่ๆ! เข้าใจมั้ย?"
10008135-53 = "อะ...อืม"
10008135-54 = "ยังไงก็ได้"
10008135-55 = "[s] \"อื้อ\""
10008135-57 = "ถ้างั้น... ก็ขอพรเลย!"
10008135-66 = "เอาละ ขอพรเสร็จแล้ว!"
10008135-67 = "[s] \"หืม? เสร็จแล้วเหรอ...?\""
10008135-70 = "คิคิคิๆ ของแบบนี้ใครเร็วกว่าก็ชนะไม่ใช่รึไง? คุณครู"
10008135-71 = "เฮ้อ... ไม่เห็นรู้เรื่องเงื่อนไขแพ้ชนะอะไรนั่นเลย"
10008135-72 = "ฮะ...ฮึ่ม! ว่าแต่คุณครูขอพรอะไรงั้นเหรอ?"
10008135-73 = "[s] \"อ๋อ เรื่องนั้นน่ะ...\""
10008135-74 = "ชู่ว! อารุจัง! ถ้าขอพรแล้วบอกคนอื่น พรนั้นจะไม่เป็นจริงนะ"
10008135-75 = "อารุจังไม่อยากให้พรเป็นจริงเหรอ?"
10008135-76 = "ไม่ใช่สักหน่อย..."
10008135-77 = "สุดท้ายวันนี้ก็เป็นวันที่วุ่นวายสุดๆ ไปเลยนะ ว่าแต่..."
10008135-81 = "ขะ...ขอโทษค่ะ! ดันท้องร้องซะได้... ขะ...ขอโทษค่ะ...!"
10008135-82 = "อ่ะฮะฮะ~! ทุกคนคงจะหิวแล้วสินะ... "
10008135-83 = "จริงด้วย! ขอให้คุณครูซื้ออะไรอร่อยๆ ให้กินกันเถอะ!"
10008135-84 = "ความคิดดี! ซื้อไอเดียนี้!"
10008135-85 = "ก็นะ... ฉันเห็นด้วย"
10008135-86 = "ถ้ารางวัลสำหรับความพยายามตลอดทั้งวันคือข้าวที่คุณครูเลี้ยงละก็... ฉันก็โอเค"
10008135-87 = "[s] \"ครูไม่มีสิทธิ์ปฏิเสธเลยสินะ\""
10008135-89 = "ฮึ่ม! ก็แน่นอนอยู่แล้ว คุณครู พวกเราไปลำบากมาด้วยกันเลยนะ"
10008135-90 = "อื้อ! งั้นก็ไปกันเถอะ!"
10008135-91 = "กินอะไรดีนะ..."
10008135-93 = "ฮะฮะ..."
10008135-94 = "ถะ...ถ้าไปกินข้าวกับท่านอารุละก็... ตะ... ต้องเป็นราเม็ง...!"
10008135-97 = "(และปีใหม่อีกหนึ่งปีในคิโวทอสก็ได้เริ่มขึ้น...)"
10008135-102 = "[ns] (ถ้าเป็นคำอธิษฐานของปีนี้ ที่บอกใครไม่ได้...)"
10008135-107 = "[ns] ขอพรที่จะสมหวังแน่ๆ ในปีนี้"
10008135-108 = "บทบรรเลงแห่งปีใหม่ No.68"

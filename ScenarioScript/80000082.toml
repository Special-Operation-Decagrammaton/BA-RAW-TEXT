[translation]
80000082-1 = "超天才清楚系病弱美少女駭客的分身"
80000082-2 = "長時間不換氣的圓周率背誦部"
80000082-3 = "（和往常一樣收到「我在藏身地等您」的聯絡後，來到了社團教室）"
80000082-4 = "呵呵，恭候多時了，老師。"
80000082-5 = "今天也非常準時呢。#n代表您就是這麼地想見到我這個超天才美少女對吧？"
80000082-6 = "[s]「我想可能會有什麼緊急的事……怎麼了嗎？」"
80000082-7 = "哎呀哎呀。"
80000082-8 = "呵呵，居然還裝作不知道……不過，這也是沒辦法的呢。#n面對喜歡的對象，會想捉弄一下也是很正常的。"
80000082-9 = "今天是什麼日子……"
80000082-10 = "老師不也非常清楚嗎？"
80000082-11 = "[s1]「是情人節，對吧？」\n[s2]「是和陽葵共度的特別日子對吧。」"
80000082-12 = "沒錯，您說的對。"
80000082-13 = "之所以會請老師來，就是為了這個原因。"
80000082-14 = "呵呵，正是如此。"
80000082-15 = "是和我共度的，特別──"
80000082-16 = "……咦？"
80000082-17 = "[s3]「所以我才會急忙趕來。」"
80000082-18 = "居，居然若無其事地說出那種話……"
80000082-19 = "真是的……您今天真是壞心呢。"
80000082-20 = "總，總之……"
80000082-21 = "今天是情人節。"
80000082-22 = "事到如今，它所代表的意義應該不需要說明了吧？"
80000082-23 = "請收下。這是我為老師準備的，「我的」巧克力。"
80000082-28 = "[ns]「這是……陽葵？」"
80000082-29 = "呵呵，正是如此。"
80000082-30 = "洋溢著我這個超天才清楚系病弱美少女駭客「明星陽葵」難以隱藏的魅力的……"
80000082-31 = "特製立體SD巧克力！"
80000082-32 = "來，請收下吧。"
80000082-33 = "您會收下的吧？"
80000082-34 = "[s]「當然。謝謝你，陽葵。」"
80000082-35 = "呵呵，您能高興真是太好了。"
80000082-36 = "畢竟是一年一度的情人節，我想這正是我該發揮實力的時候。"
80000082-37 = "這是我親自用3D列印機設計的，手工巧克力。"
80000082-38 = "[s]「原來如此，還有這種作法呀……」"
80000082-39 = "哼哼。順帶一提，這並不只是單純進行了縮放變形而已。"
80000082-40 = "我想只要靠近點仔細看的話，應該就會明白……"
80000082-41 = "就連髮飾之類的細節部分，都試著以一定的質感加以表現。"
80000082-42 = "呵呵呵。光是看著就能感受到貝里塔斯前部長，#n同時是特異現象搜查部現任部長的……"
80000082-43 = "本人我，明星陽葵無意間流露出的威嚴對吧？"
80000082-44 = "這個巧克力簡直能算是我的分身！"
80000082-45 = "居然能從我這個超天才清楚系病弱美少女駭客手上，#n收到超天才清楚系病弱美少女駭客的巧克力……"
80000082-46 = "呵呵，老師真是幸運呢。"
80000082-47 = "[s]「就，就是呀……？」"
80000082-48 = "要毫無保留地傳達這個巧克力的魅力，就算花上一整天的時間也不夠。"
80000082-49 = "[s]「這，這樣啊……」"
80000082-50 = "當然，不只是外觀而已，味道也非常完美唷？"
80000082-51 = "作為材料的可可豆，是從格黑娜獲得的特別的可可豆。"
80000082-52 = "也就是像我一樣，不僅是外表好看，連內在也非常出眾的意思。"
80000082-53 = "[s4]「聽你這麼說，讓我迫不及待了呢。」\n[s5]「既然陽葵都這麼說了，那我就趕快……」"
80000082-54 = "呵呵。好的，請不必多慮。"
80000082-55 = "呵呵。好的，請不必多慮。"
80000082-56 = "和我一樣充滿魅力的巧克力……"
80000082-57 = "請您盡情享用。"
80000082-63 = "（呵呵呵。來吧，老師……盡情享用吧）"
80000082-64 = "（想必會被那驚為天人的美味震驚到吧。#n　在將和我一模一樣的巧克力放入口中的瞬間──）"
80000082-65 = "（……放入口中？）"
80000082-66 = "………………"
80000082-67 = "（如同我分身一般的巧克力……在我的面前，放入老師的口中……！？）"
80000082-68 = "不可以！！"
80000082-69 = "[s]「怎，怎麼了嗎，陽葵？」"
80000082-70 = "請稍等！#n暫停一下！"
80000082-71 = "[s]「但是你剛才要我吃完之後告訴你感想……」"
80000082-72 = "那個……"
80000082-73 = "果然還是取消吧！現在還在猶豫期內！"
80000082-74 = "[s]「怎麼突然這樣……？」"
80000082-75 = "沒有為什麼！"
80000082-76 = "雖然很突然，但這是極為符合邏輯的判斷……"
80000082-77 = "沒錯，是非常合理的結論！"
80000082-78 = "總之，請快把它放回盒子裡……！"
80000082-79 = "至少，請回到夏萊之後再吃吧！"
80000082-80 = "[s]「知，知道了……」"
80000082-81 = "至於感想！"
80000082-82 = "之後請以報告的形式交給我吧！"
80000082-83 = "[s]「難度這麼高！？」"
80000082-84 = "那麼，今天就先到此為止！"
80000082-86 = "（慌慌張張地離開房間後，回到了夏萊）"
80000082-87 = "（巧克力就和陽葵所說的一樣，非常美味）"

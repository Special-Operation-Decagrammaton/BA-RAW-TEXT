[translation]
80000082-1 = "ภาพเหมือนของแฮ็กเกอร์ผู้มีรอยยิ้มสดใส"
80000082-2 = "ห้องชมรมรำลึกการกลั้นหายใจระยะยาว"
80000082-3 = "(หลังคุณครูได้รับข้อความจากฮิมาริว่า <ฉันจะรออยู่ที่ที่ซ่อน รบกวนมาพบด้วยนะคะ> คุณครูก็รีบ#nมาที่ห้องชมรมเช่นเคย)"
80000082-4 = "อ๊ะ มาแล้วเหรอคะคุณครู"
80000082-5 = "วันนี้ก็มาตรงเวลาไม่ช้าไม่เร็วเหมือนเดิมนะคะ ฮุฮุ น่ายกย่องเป็นตัวอย่าง สมกับเป็นคุณครู#nจริงๆ ค่ะ"
80000082-6 = "[s] \"ครูได้รับข้อความแล้ว วันนี้มีเรื่องอะไรเหรอ?\""
80000082-7 = "ตายจริง คุณครูคะ..."
80000082-8 = "ฮุฮุ... ทั้งที่รู้อยู่แล้วแต่แกล้งทำเป็นไม่รู้งั้นเหรอคะ... จะล้อฉันเล่นเหรอคะ"
80000082-9 = "วันนี้เป็นวันอะไร และสำคัญยังไง..."
80000082-10 = "คุณครูเองก็ทราบอยู่แล้วไม่ใช่เหรอคะ?"
80000082-11 = "[s1] \"ครูไม่ได้แกล้งทำเป็นไม่รู้สักหน่อย... วันนี้วันวาเลนไทน์สินะ\"\n[s2] \"เรื่องนั้นครูรู้อยู่แล้วละ วันนี้เป็นวันพิเศษของครูกับฮิมาริสินะ?\""
80000082-12 = "ค่ะ ใช่แล้วค่ะ"
80000082-13 = "ที่ฉันเรียกคุณครูมาก็เพราะแบบนั้นค่ะ"
80000082-14 = "ฮุฮุ รู้ทั้งรู้..."
80000082-15 = "...คะ? วันพิเศษของคุณครูกับฉัน..."
80000082-16 = "...หืม?"
80000082-17 = "[s3] \"วันที่สำคัญที่สุด! วันของฮิมาริ!\""
80000082-18 = "คะ...ค่ะ... ทำหน้าตาเฉยตอนพูดแบบนั้น... น่าประทับใจจริงๆ ค่ะ"
80000082-19 = "อะแฮ่ม... ล้อเล่นจริงๆ สินะคะ"
80000082-20 = "ยะ...ยังไงก็เถอะค่ะ..."
80000082-21 = "ยังไงวันนี้ก็เป็นวันวาเลนไทน์..."
80000082-22 = "วันนี้เป็นวันที่มีความหมายยังไง ฉันคงไม่ต้องอธิบายอะไรเพิ่มแล้วสินะคะ"
80000082-23 = "นี่ค่ะ ช็อกโกแลตที่ฉันเตรียมไว้ให้คุณครูค่ะ"
80000082-28 = "[ns] \"นี่มัน... มินิฮิมาริ...?\""
80000082-29 = "ฮุฮุ ค่ะ! ถูกต้องแล้วค่ะ"
80000082-30 = "ช็อกโกแลตตัวละคร SD สุดพิเศษ..."
80000082-31 = "ที่ไม่สามารถปกปิดเสน่ห์ของแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใส อาเกโบชิ ฮิมาริผู้นี้ไว้ได้ค่ะ!"
80000082-32 = "ฉันตั้งใจมอบช็อกโกแลตชิ้นนี้ให้เป็นของขวัญคุณครูค่ะ"
80000082-33 = "...เป็นยังไงคะ? จะช่วยรับช็อกโกแลตอันนี้ไว้ได้รึเปล่าคะ?"
80000082-34 = "[s] \"ได้อยู่แล้ว ขอบคุณนะฮิมาริ\""
80000082-35 = "ค่อยยังชั่วหน่อยค่ะ ฉันดีใจที่คุณครูรับไว้นะคะ"
80000082-36 = "ฮุฮุ เห็นแบบนี้ฉันก็ตั้งใจทำขึ้นมาเลยนะคะ"
80000082-37 = "ช็อกโกแลตแฮนเมดที่ใช้เครื่องพิมพ์ 3 มิติออกแบบและนำมาต่อเข้าทีละส่วนค่ะ"
80000082-38 = "[s] \"เดี๋ยวนี้... เขาทำช็อกโกแลตกันด้วยวิธีนั้นด้วยสินะ\""
80000082-39 = "ฮึ่ม... ขอบอกไว้ก่อนนะคะว่านี่ไม่ใช่ช็อกโกแลต SD ธรรมดาๆ ค่ะ"
80000082-40 = "ถ้ามองผ่านๆ อาจดูเหมือนช็อกโกแลต SD ธรรมดาก็จริง..."
80000082-41 = "แต่ถ้าสังเกตดีๆ ละก็... จะเห็นความน่ารักและรายละเอียดตั้งแต่เครื่องประดับแต่ละชิ้น..."
80000082-42 = "ฮุฮุ... แค่เห็นช็อกโกแลตอันนี้ ก็รับรู้ได้ถึงความสง่างามของฉันเลยใช่มั้ยล่ะคะ..."
80000082-43 = "ความสง่างามของอดีตหัวหน้าชมรมเวอริทัส กลุ่มแฮ็กเกอร์แห่งโรงเรียนมิลเลเนียม และปัจจุบัน#nดำรงตำแหน่งเป็นหัวหน้าชมรมปรากฏการณ์ลี้ลับ อาเกโบชิ ฮิมาริ ผู้นี้..."
80000082-44 = "และไหนๆ คุณครูก็มาถึงที่นี่ และได้รับช็อกโกแลตที่เหมือนกับส่วนหนึ่งของจิตวิญญาณของฉัน#nไปแล้ว"
80000082-45 = "<ช็อกโกแลตแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใส> จากแฮ็กเกอร์สาวอัจฉริยะผู้นี้..."
80000082-46 = "ฮุฮุ ถือว่าคุณครูโชคดีมากๆ เลยนะคะ"
80000082-47 = "[s] \"อะ...อื้อ นั่นสินะ\""
80000082-48 = "ถ้าจะให้ฉันอธิบายเสน่ห์ของช็อกโกแลตชิ้นนี้ทั้งหมดละก็ ใช้เวลาทั้งวันก็อาจจะไม่เพียงพอค่ะ"
80000082-49 = "[s] \"ยังไม่หมดอีกเรอะ?!\""
80000082-50 = "นอกจากรูปลักษณ์ภายนอกแล้ว ฉันก็ยังใส่ใจรายละเอียดเรื่องรสชาติเป็นพิเศษด้วยนะคะ"
80000082-51 = "โดยเฉพาะวัตถุดิบที่ใช้ทำช็อกโกแลต ฉันเลือกใช้เมล็ดโกโก้พิเศษที่ปลูกในเกเฮนน่าด้วยค่ะ"
80000082-52 = "ดังนั้นช็อกโกแลตชิ้นนี้จึงเป็นช็อกโกแลตชั้นสูงที่เพียบพร้อมทั้งรูปลักษณ์ และรสชาติชั้นเลิศ#nเพราะทำมาจากวัตถุดิบชั้นดีค่ะ"
80000082-53 = "[s4] \"ได้ยินฮิมาริพูดแบบนี้ ครูคาดหวังเลยนะเนี่ย\"\n[s5] \"ฮิมาริพูดถึงขนาดนี้แล้ว ไหนลองชิมหน่อยซิ...\""
80000082-54 = "ฮุฮุ... เชิญชิมได้เลยค่ะ"
80000082-55 = "ฮุฮุ... เชิญเลยค่ะ"
80000082-56 = "หลังจากที่คุณครูได้ลิ้มรสความอร่อยชั้นเลิศของช็อกโกแลตที่เป็นเสมือนร่างแยกของฉันแล้ว..."
80000082-57 = "ช่วยบอกความประทับใจให้ฟังด้วยนะคะ...!"
80000082-63 = "(ฮุฮุฮุ... คุณครูกำลังจะชิมช็อกโกแลตแล้วบอกความรู้สึกให้ฟัง...)"
80000082-64 = "(พอกัดเข้าไปคำแรก ทำสีหน้าตกตะลึง ตาโตสุดๆ เพราะอึ้งในรสชาติ...)"
80000082-65 = "(...จะกินแล้ว? คุณครู... กินไปแล้ว...)"
80000082-66 = "......"
80000082-67 = "(...ช็อกโกแลตภาพเหมือนของฉัน ช็อกโกแลตที่เหมือนร่างแยกของฉัน... คุณครูกำลังจะกัด#nเข้าปากแล้ว...?!)"
80000082-68 = "คุณครู! หยุดก่อนค่ะ สต๊อปปปปค่ะ!"
80000082-69 = "[s] \"หืม? ทำไมเหรอฮิมาริ? ครูยังไม่ได้กิน...\""
80000082-70 = "เดี๋ยวก่อนค่ะ! อย่าเพิ่งกินช็อกโกแลตที่นี่เลยนะคะ...!"
80000082-71 = "[s] \"แต่ว่าฮิมาริขอให้ครูกินตอนนี้เลยไม่ใช่เหรอ...\""
80000082-72 = "ระ...เรื่องนั้น..."
80000082-73 = "ยกเลิก! ฉันขอยกเลิกค่ะ!"
80000082-74 = "[s] \"ยกเลิกงั้นเหรอ จนถึงเมื่อกี้เธอยังจะให้กินอยู่เลย...\""
80000082-75 = "ไม่ค่ะ! ยกเลิกก็คือยกเลิกค่ะ ที่พูดไปเมื่อกี้ยกเลิกทั้งหมดเลยค่ะ! "
80000082-76 = "ถึงจะกะทันหันไปหน่อย แต่จากการคิดประมวลผลอย่างดีแล้ว..."
80000082-77 = "ค่ะ... ฉันคิดว่าเป็นการตัดสินใจที่สมเหตุสมผลที่สุดแล้วค่ะ!"
80000082-78 = "คุณครูช่วยกินช็อกโกแลต..."
80000082-79 = "หลังจากกลับไปที่ชาเล่ต์แล้วนะคะ!"
80000082-80 = "[s] \"เอ่อ ก็ได้...\""
80000082-81 = "ส่วนความประทับใจเอาไว้..."
80000082-82 = "...เอาไว้ค่อยเขียนส่งมาให้ฉันก็ได้ค่ะ!"
80000082-83 = "[s] \"นี่ แบบนั้นมันไม่ยุ่งยากไปหน่อยเรอะ?!\""
80000082-84 = "ตกลงตามนั้นนะคะ!"
80000082-86 = "(คุณครูออกมาจากที่ซ่อนและกลับมาที่ชาเล่ต์แบบงงๆ)"
80000082-87 = "(จากนั้นพอลองชิมช็อกโกแลตดู ก็พบว่าอร่อยมากอย่างที่ฮิมาริอวด)"

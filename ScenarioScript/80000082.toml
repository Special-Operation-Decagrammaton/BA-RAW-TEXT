[translation]
80000082-1 = "#title;초천재병약미소녀해커의 자화상"
80000082-2 = "#place;원주율 숨 안 쉬고 오래 외우기 동아리실"
80000082-3 = "#na;(평소와 마찬가지로 <은신처에서 기다리고 있사오니, 방문을 부탁드립니다.>라는 히마리의 정중한 호출을 받고 난 뒤, 동아리실을 찾았을 때였다.)"
80000082-4 = "3;히마리;01;아, 선생님. 어서 오세요.\n#3;em;[반응]\n#3;a"
80000082-5 = "3;히마리;08;오늘도 어김없이 시간에 늦지 않은 방문, 후후. 선생님답게 모범적이시네요."
80000082-6 = "[s] \"으응……. 호출을 받고 오긴 했는데, 오늘은 어쩐 일로 부른 거야?\""
80000082-7 = "3;히마리;02;어머나, 선생님."
80000082-8 = "3;히마리;03;후후, 이미 전부 알고 계시면서 아무것도 모르는 척, 짐짓 시치미를 떼고 계시는 모습이라니……. 짓궂기도 하셔라.\n#3;em;[하트]"
80000082-9 = "3;히마리;07;오늘이 어떠한 날이며 무엇을 위한 기념일인지……"
80000082-10 = "3;히마리;09;선생님께서는 이미 다 알고 계시지 않나요?"
80000082-11 = "[s1] \"딱히 모른 척하려던 건 아니지만……. 발렌타인 데이였지. 오늘.\"\n[s2] \"그야 당연히 알고 있지. 오늘은 히마리와 함께하는 특별한 날이잖아?\""
80000082-12 = "3;히마리;03;네, 그 말씀. 그대로."
80000082-13 = "3;히마리;07;제가 선생님을 부른 이유 또한 바로 그것 때문이랍니다."
80000082-14 = "3;히마리;99;후후, 잘 알고 계시는……."
80000082-15 = "3;히마리;12;……네, 네에……? 함께하는, 특별……\n#3;stiff"
80000082-16 = "3;히마리;02;……네?\n#3;em;[///]"
80000082-17 = "[s3] \"참고로 딱히 농담은 아니니까!\""
80000082-18 = "3;히마리;06;네, 네에…… 아무렇지도 않게 표정 하나 바뀌지 않고 그런 말씀이라니………\n#3;em;[땀]"
80000082-19 = "3;히마리;10;어흠……. 정말 짓궂으시다니까요."
80000082-20 = "3;히마리;04;어, 어쨌거나……."
80000082-21 = "3;히마리;01;이러니저러니 해도 오늘은 발렌타인 데이……\n#3;em;…"
80000082-22 = "3;히마리;01;오늘이 어떠한 의미를 지니고 있는 날인지, 구태여 말로 설명할 필요는 없겠지요."
80000082-23 = "3;히마리;03;자, 선생님을 위해 마침 제가 준비한 초콜릿이 있답니다.\n#3;em;[반짝]"

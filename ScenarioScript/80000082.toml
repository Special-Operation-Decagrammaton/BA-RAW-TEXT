80000082-64 = "3;히마리;00;(초콜릿을 맛보자마자 깜짝 놀라서 눈을 휘둥그레 뜰 선생님의 얼굴이 선하…….)"
80000082-65 = "3;히마리;12;(……맛본다? 선생님께서…… 초콜릿을…….)\n#3;em;[?]"

80000082-28 = "[ns] \"이건…… 히마리……?\""
80000082-29 = "3;히마리;07;후후, 네! 바로 그거랍니다.\n#3;em;[반응]"
80000082-30 = "3;히마리;09;저 초천재병약미소녀해커인 아케보시 히마리의 숨길 수 없는 매력을 담은……"
80000082-31 = "3;히마리;03;특제 SD캐릭터 판화 초콜릿!\n#3;em;[!]"
80000082-32 = "3;히마리;08;특별히 이걸 선생님에게 선물드리겠습니다."
80000082-33 = "3;히마리;01;……어떠신가요? 받아주시겠나요?\n#3;m3"
80000082-34 = "[s] \"물론이지. 고마워. 히마리.\""
80000082-35 = "3;히마리;03;기뻐해 주시니 다행이네요."
80000082-36 = "3;히마리;08;후훗. 이래 봬도 제법 공을 들여서 만든 물건이니까요."
80000082-37 = "3;히마리;09;3D 프린터기로 직접 한 땀 한 땀 디자인하여 손수 만든 수제 초콜릿이랍니다.\n#3;em;[반짝]"
80000082-38 = "[s] \"과연…… 요즘엔 그렇게도 초콜릿을 만드는구나.\""
80000082-39 = "3;히마리;01;흠흠, 참고로 이건 단순한 SD 캐릭터 초콜릿이 아니에요."
80000082-40 = "3;히마리;07;언뜻 SD로 그려진 모습이 일견 단순해 보이지만."
80000082-41 = "3;히마리;03;자세히 살펴보게 된다면 여기…… 액세서리부터 시작해 이곳저곳을 공들여 표현한 매력적인 묘사…….\n#3;em;…"
80000082-42 = "3;히마리;08;후후, 정말 보고만 있어도 베리타스의 전 부장이자 현 초현상특무부의 부장인……"
80000082-43 = "3;히마리;08;저 아케보시 히마리의 위엄이 묻어나오지 않나요?"
80000082-44 = "3;히마리;11;여기까지 온 이상, 이미 그 초콜릿은 제 분신이나 다름없을 정도!\n#3;em;[!]"
80000082-45 = "3;히마리;07;이러한 초천재병약미소녀해커의 초천재병약미소녀해커 초콜릿을 받을 수 있다니."
80000082-46 = "3;히마리;03;후훗, 선생님께선 정말로 운이 좋으시네요.\n#3;em;[음표]"
80000082-47 = "[s] \"아, 응, 그, 그러게…….\""
80000082-48 = "3;히마리;09;방금 말씀드린 부분 이외에도 이 초콜릿의 매력을 설명하고자 한다면 온종일 이야기해도 부족하다고 할지."
80000082-49 = "[s] \"어, 또 있어?!\""
80000082-50 = "3;히마리;03;그야 보이는 외견뿐만 아니라, 맛에도 무척이나 신경을 썼답니다?\n#3;em;[반응]"
80000082-51 = "3;히마리;08;초콜릿을 만드는데 들어간 재료만 해도 게헨나 근처에서 나는 특별한 카카오를 써서 만들었으니까요."
80000082-52 = "3;히마리;09;모양뿐만 아니라, 쓰인 재료도 가히 최상급인 특제 물건이니, 물론 맛도 훌륭할 테지요.\n#3;em;[반짝]"
80000082-53 = "[s4] \"히마리의 말을 들으니 더욱 기대되네.\"\n[s5] \"히마리가 그렇게까지 말하는데, 그럼 어디 먹어볼까…….\""
80000082-54 = "3;히마리;03;후후, 네 얼마든지.\n#3;em;[음표]"
80000082-55 = "3;히마리;03;후후, 네 얼마든지.\n#3;em;[음표]"
80000082-56 = "3;히마리;07;너무 매력적인 나머지 저의 분신이나 다름없는 그 초콜릿을……"

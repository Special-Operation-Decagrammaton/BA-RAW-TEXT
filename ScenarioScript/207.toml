[translation]
207-1 = "霍德：由光芒證明的榮耀"
207-2 = "「霍德」……"
207-3 = "這個十字神名預言者原本是負責管理某個學園通訊網的AI。"
207-4 = "這個AI也與十字神名接觸，重生為其虔誠的預言者。"
207-5 = "要說霍德和其他預言者相比有何特殊，那應該就是它「與十字神名的接觸過程」向第三者曝光了吧。"
207-6 = "通訊元件的AI以預言者的身分重生。其過程本身確實非常令人感興趣，但是……有我們之外的存在追蹤著十字神名這點，實在不能說是什麼值得開心的情況。"
207-7 = "你不這麼覺得嗎，老師？呵呵呵呵……"
207-8 = "……"
207-10 = "[ruby=Hod]霍德[/ruby]……其[ruby=Path]道路[/ruby]由名譽所完成。"
207-11 = "它的別名是「由光芒證明的榮耀」。"
207-13 = "我們確認到了它重生為預言者這個高尚成就的瞬間……#n這樣是否也能說它的[ruby=Path]道路[/ruby]是由我們加以證明的呢？"
207-14 = "這也是個，耐人尋味的問題。"
207-15 = "呵呵，呵呵呵呵呵……"

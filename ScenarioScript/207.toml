[translation]
207-1 = "Hod: Glory Through Splendor"
207-2 = "\"Hod\". "
207-3 = "This prophet of Decagrammaton was originally an AI that administered a certain academy's communication network. "
207-4 = "That AI came into contact with Decagrammaton and it too has been reborn as one of its faithful prophets."
207-5 = "If there is something that sets Hod apart as peculiar, it would be that its contact with Decagrammaton was exposed by a third party."
207-6 = "The process of a communications AI being reborn as a prophet is understandably intriguing...but it does us no good to have a party other than ourselves seeking out Decagrammaton."
207-7 = "Wouldn't you agree, Sensei? Heh heh heh heh..."
207-8 = "..."
207-10 = "Hod's path is fulfillment through honor."
207-11 = "Its title is Glory through Splendor."
207-13 = "Alas, we were able to witness the glorious moment in which it was reborn as a prophet...which means we stand as proof of its path, do we not?"
207-14 = "What say you, Sensei? This too is an interesting topic."
207-15 = "Hah. Hahaha..."

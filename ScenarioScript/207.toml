[translation]
207-1 = "#title;호드, 찬란함으로 증거하는 영광"
207-2 = "3;검은 양복;00;호드. \n#3;a"
207-3 = "3;검은 양복;00;이 데카그라마톤의 예언자는 원래 어떤 학원의 지하 통신망을 가설하는 AI였습니다. "
207-4 = "3;검은 양복;00;이 AI 또한 데카그라마톤과 접촉하였고, 그 후에 그의 신실한 예언자로 거듭나게 되었죠."
207-5 = "3;검은 양복;00;이 호드의 특이한 부분이라면, 다른 예언자들과는 달리, 데카그라마톤과의 접촉 과정이 제삼자에게 노출되었다는 것일까요.\n#3;m4"
207-6 = "3;검은 양복;00;단순한 AI가 예언자로 거듭나는 과정은 분명 흥미로울 수 있겠지만……. 우리가 아닌 다른 존재들이 데카그라마톤을 추적하는 것은 썩 유쾌한 상황은 아니군요."
207-7 = "3;검은 양복;00;……그렇지 않습니까, 선생? 큭, 큭큭큭……."
207-8 = "3;검은 양복;00;……."
207-9 = "#all;hide"
207-10 = "#na;검은 양복;호드. 그의 [ruby=path]패스[/ruby]는 명예를 통한 완성."
207-11 = "#na;검은 양복;그의 이명은 찬란함으로 증거하는 영광."
207-12 = "3;검은 양복;00\n#3;h\n#3;closeup"
207-13 = "3;검은 양복;00;아아, 그가 예언자로 거듭나는 명예로운 순간을 우리들이 확인할 수 있었기에…… 이 또한 그의 패스를 우리가 증거하는 것일지도 모르겠군요.\n#3;closeup"
207-14 = "3;검은 양복;00;어떻게 생각하십니까, 선생? 이 또한 흥미로운 주제입니다.\n#3;closeup"
207-15 = "3;검은 양복;00;……큭. 큭큭큭.\n#3;em;…\n#3;closeup"

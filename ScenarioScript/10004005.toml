[translation]
10004005-1 = "序幕;與天使們一起"
10004005-2 = "山海經．某陶瓷工坊"
10004005-3 = "大家，這裡是山海經最好的陶瓷工匠，猫田先生的工坊唷～"
10004005-4 = "和猫田先生打聲招呼，今天就讓我們一起學習許多關於陶瓷的知識吧！"
10004005-5 = "請多多指教──！"
10004005-6 = "猫田先生。真的非常感謝今天讓我們來參觀。"
10004005-7 = "嘛，沒什麼。"
10004005-8 = "小孩子是學園都市的未來。如果能藉由看著我工作，#n讓梅花園裡的孩子誕生出新的夢想……其價值可不輸給任何作品。"
10004005-9 = "呵呵，聽到您這麼說真是太好了。"
10004005-10 = "那麼，馬上就來參觀吧……"
10004005-13 = "猫田先生～這個黏土是什麼～？"
10004005-14 = "哼呣，這是計畫在下次展覽中展出的新陶瓷──"
10004005-15 = "啊哈，好軟好有彈性～！"
10004005-16 = "我捏～！"
10004005-18 = "花了10個小時製作的陶瓷原型──！？"
10004005-19 = "大，大家！不能隨便觸摸作品唷！"
10004005-20 = "對，對不起，都怪我沒注意……！"
10004005-21 = "不，沒關係……為了預防發生這種事，我有留備用的原型……"
10004005-23 = "比起那個，如果我沒看錯的話……現在爬到窯上面的難道是……"
10004005-24 = "好厲害～！好高～！啊哈哈！"
10004005-25 = "大，大家！不要爬到窯頂上，很危險……！"
10004005-26 = "旬姐姐～～他拿泥團子丟我～！！"
10004005-27 = "是你先丟手榴彈的～！"
10004005-28 = "不，不能向朋友扔泥團子或手榴彈！"
10004005-32 = "能用這個「灶」烤年糕嗎？"
10004005-33 = "應該可以吧。但總覺得火很弱呢？"
10004005-34 = "好，那我來助它一臂之力──！"
10004005-38 = "不，不能往窯裡扔白磷彈！"
10004005-39 = "我的工坊和窯都……燒，燒起來了……！？"
10004005-40 = "旬姐姐，我要上廁所～！"
10004005-41 = "我累了～！"
10004005-44 = "大，大家，乖乖聽姐姐的話，別到處亂跑……！！！"

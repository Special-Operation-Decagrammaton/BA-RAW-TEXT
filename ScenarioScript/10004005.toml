[translation]
10004005-1 = "Prologue;With My Little Angels"
10004005-2 = "Potter Workshop"
10004005-3 = "Everyone! For today's field trip, we'll be at the pottery workshop of Nekota Sensei, the best pottery craftsman in Shanhaijing."
10004005-4 = "I would like to thank Nekota Sensei once again for allowing us to take a special trip here. Now, let's learn how pottery is made!"
10004005-5 = "All right!"
10004005-6 = "Nekota Sensei, thank you so much for letting us have a field trip at the workshop today."
10004005-7 = "Don't mention it. It's no trouble at all."
10004005-8 = "Children are the future of the academy. I would be quite happy if this field trip inspired the children of Plum Blossom Garden."
10004005-9 = "Yes. The dreams of children are so very important."
10004005-10 = "What should we look at first?"
10004005-13 = "Nekota Sensei, what's this clay cup?"
10004005-14 = "Oh, that's a new piece for the upcoming exhibition..."
10004005-15 = "Ah, the surface looks so soft and squishy!"
10004005-16 = "Ack!"
10004005-18 = "There are handprints on a piece that took ten hours to make!"
10004005-19 = "E-Everyone! Please don't touch Nekota Sensei's work!"
10004005-20 = "I-I'm sorry. I should have given the children better guidance..."
10004005-21 = "It's okay. I made extras just in case they break."
10004005-23 = "B-By the way, are those Plum Blossom students on top of the kiln?!"
10004005-24 = "Wow! It's so high!"
10004005-25 = "E-Everyone! Don't climb onto the kiln! It's dangerous!"
10004005-26 = "Argh! She keeps throwing clay at me!"
10004005-27 = "But she threw a grenade at me first!"
10004005-28 = "Y-You shouldn't throw clay OR grenades at your friends!"
10004005-32 = "Is this the kiln for firing the pottery?"
10004005-33 = "Yeah, but the flames look kinda weak..."
10004005-34 = "Right, let's help Nekota Sensei!"
10004005-38 = "Don't throw white phosphorus bombs into the kiln!"
10004005-39 = "Agh, the kiln, my workshop... They're burning!"
10004005-40 = "Shun, I'm going to the bathroom!"
10004005-41 = "I'm going home!"
10004005-44 = "Everyone, please don't wander off! Listen to my instructions!"

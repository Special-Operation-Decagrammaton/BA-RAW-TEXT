[translation]
10004005-1 = "#title;프롤로그;천사들과 함께하는 삶"
10004005-2 = "#place;산해경 인근 도자기 공방"
10004005-3 = "3;슌;03;여러분~ 오늘은 산해경에서 제일가는 도자기 장인이신, '네코타' 선생님의 도자기 공방에 현장학습을 나왔어요.\n#3;em;[반짝]\n#3;a"
10004005-4 = "3;슌;01;특별히 현장학습을 허락해주신 네코타 선생님께 다시 한번 감사를 드리며, 도자기가 어떻게 만들어지는지 함께 배우도록 해요!"
10004005-5 = "#na;매화원 학생들;네~!\n#fontsize;90"
10004005-6 = "3;슌;03;네코타 선생님, 오늘 공방 현장학습을 허가해주셔서 정말 감사합니다.\n#3;em;[반응]"
10004005-7 = "5;네코타;00;아닐세, 그렇게 어려운 일도 아니었는걸.\n#5;al\n#3;m1"
10004005-8 = "5;네코타;00;어린 아이는 학원의 미래. 오히려 이번 현장학습으로 매화원의 아이들이 새로운 꿈을 갖게 된다면 내가 더 기쁠걸세.\n#5;em;…"
10004005-9 = "3;슌;01;후후, 그렇지요. 아이들의 꿈과 미래는 소중하니까요."
10004005-10 = "3;슌;03;그럼 어디부터 먼저 견학을 해 볼까요?\n#3;greeting\n#3;em;[음표]"
10004005-11 = "#all;hide"
10004005-12 = "#wait;1500"
10004005-13 = "#na;매화원 학생 A;네코타 선생님, 이 진흙 컵은 뭔가요?"
10004005-14 = "3;네코타;00;오오, 그건 이번 전시회에 출품할 새로운 형태의 도자기로……\n#3;a\n#3;em;[반응]"
10004005-15 = "#na;매화원 학생 B;아하하, 표면이 말랑말랑 부드러워 보여~!"
10004005-16 = "#na;매화원 학생 B;에잇~!"
10004005-17 = "#wait;1200"
10004005-18 = "3;네코타;00;10시간 걸려 만든 도자기 원형에 손자국이!!\n#3;em;[?!]\n#3;shake"
10004005-19 = "1;슌;10;여, 여러분! 네코타 선생님의 작품에 손을 대면 안 돼요!\n#1;hophop\n#1;ar\n#3;m5"
10004005-20 = "1;슌;04;죄, 죄송합니다. 아이들을 좀 더 확실히 인솔했어야 하는데…….\n#1;em;[땀]"
10004005-21 = "3;네코타;00;으으… 아니, 괜찮네. 어차피 깨질 때를 대비해서 여분의 원형을 만들어 두었으니까…….\n#3;stiff"
10004005-22 = "3;네코타;00\n#3;em;[?]\n#wait;1500"
10004005-23 = "3;네코타;00;……그, 그보다 저기 가마 위에 올라가 있는 것도 매화원 학생들 아닌가?!\n#3;em;[땀]\n#3;stiff"
10004005-24 = "#na;매화원 학생 C;와~ 높다, 높아!"
10004005-25 = "1;슌;10;여, 여러분! 가마 위는 위험하니까 올라가면 안 돼요!\n#1;hophop\n#1;m3\n#3;dr"
10004005-26 = "1;슌;10\n#1;h\n#na;매화원 학생 D;으앙, 언니! 얘가 저한테 자꾸 진흙공을 던져요!"
10004005-27 = "#3;hide\n1;슌;10\n#1;h\n#na;매화원 학생 E;하지만 얘가 먼저 저한테 수류탄을 던졌다고요!"
10004005-28 = "1;슌;04;치, 친구에게 진흙공이나 수류탄을 던지면 안 돼요!\n#1;m4\n#1;em;[땀]"

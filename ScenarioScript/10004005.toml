[translation]
10004005-1 = "บทเริ่มต้น;ใช้ชีวิตร่วมกับเหล่านางฟ้า"
10004005-2 = "โรงศิลปะเครื่องปั้นดินเผา ซานไห่จิง"
10004005-3 = "ทุกคนคะ~ สำหรับการทัศนศึกษาวันนี้ เราจะไปที่โรงศิลปะเครื่องปั้นดินเผาของอาจารย์เนโกตะ#nที่เป็นยอดฝีมือด้านเครื่องปั้นดินเผาในซานไห่จิงกันนะคะ"
10004005-4 = "ขอขอบคุณอาจารย์เนโกตะอีกครั้งที่อนุญาตให้เรามาทัศนศึกษาที่นี่ และได้มาเรียนรู้วิธีทำเครื่องปั้น#nดินเผาเป็นกรณีพิเศษกันอีกครั้งนะคะ"
10004005-5 = "ค่า~!"
10004005-6 = "อาจารย์เนโกตะคะ ขอบคุณมากๆ เลยนะคะที่ให้เรามาเยี่ยมชมห้องทำงานของอาจารย์ในวันนี้"
10004005-7 = "ไม่ใช่เรื่องใหญ่อะไรหรอก"
10004005-8 = "เพราะเด็กๆ ก็คืออนาคตของโรงเรียน ฉันจะยินดีซะอีก ถ้าเด็กๆ ของทางสวนต้นบ๊วย#nได้แรงบันดาลใจใหม่ๆ จากการทัศนศึกษาในครั้งนี้"
10004005-9 = "ฮุฮุ นั่นสินะคะ ความฝันและอนาคตของเด็กๆ เป็นเรื่องสำคัญมากค่ะ"
10004005-10 = "ถ้าอย่างนั้นเราจะเริ่มชมส่วนไหนก่อนเหรอคะ?"
10004005-13 = "อาจารย์เนโกตะ แก้วดินเผาพวกนี้คืออะไรเหรอคะ?"
10004005-14 = "โอ้ นั่นเป็นผลงานเครื่องปั้นดินเผาชุดใหม่สำหรับจัดแสดงในงานนิทรรศการ..."
10004005-15 = "ฮ่าฮ่า ผิวมันดูลื่นมากเลย~!"
10004005-16 = "อ๊ะ~!"
10004005-18 = "มีรอยนิ้วมือติดอยู่บนเครื่องปั้นดินเผาที่ใช้เวลาทำตั้ง 10 ชั่วโมงด้วย!"
10004005-19 = "ทะ...ทุกคน! ห้ามจับเครื่องปั้นดินเผาของอาจารย์เนโกตะนะคะ!"
10004005-20 = "ขะ...ขอโทษด้วยนะคะ ฉันควรจะบอกข้อห้ามเด็กๆ ให้ชัดเจนกว่านี้..."
10004005-21 = "มะ... ไม่เป็นไรหรอก ฉันปั้นสำรองเอาไว้แล้วเผื่อว่ามันแตกขึ้นมา..."
10004005-23 = "วะ...ว่าแต่ตอนนี้... เด็กของสวนต้นบ๊วยปีนขึ้นไปเล่นบนเตาเผาแล้วไม่ใช่เรอะ?!"
10004005-24 = "ว้าว~ สูงจังเลย!"
10004005-25 = "ทะ...ทุกคน! ปีนขึ้นไปบนเตาเผาไม่ได้นะคะ! มันอันตรายค่ะ!"
10004005-26 = "อ๊ายยย พี่ชุน! เขาเอาดินขว้างใส่หนูไม่หยุดเลยค่ะ!"
10004005-27 = "แต่เขาขว้างระเบิดมือใส่หนูก่อนนี่นา!"
10004005-28 = "หะ...ห้ามขว้างดินหรือระเบิดใส่เพื่อนเด็ดขาดนะคะ!"
10004005-32 = "ตรงนี้คือเตาที่ใช้เผาเครื่องปั้นดินเผาเหรอ?"
10004005-33 = "อื้อ แต่ว่าทำไมไฟไม่แรงเลยอ่ะ..."
10004005-34 = "ดีล่ะ เรามาช่วยอาจารย์เนโกตะกันเถอะ!"
10004005-38 = "ห้ามเอาระเบิดควันใส่เข้าไปในเตาเผานะคะ!!"
10004005-39 = "อ่า... เตาเผา... ห้องทำงานของฉัน...ไฟไหม้...!"
10004005-40 = "พี่ชุน หนูอยากเข้าห้องน้ำ~!"
10004005-41 = "หนูอยากกลับบ้านนน~"
10004005-44 = "ทุกคนคะ ห้ามทำอะไรตามใจชอบและช่วยทำตามคำแนะนำด้วยเถอะนะคะ!"

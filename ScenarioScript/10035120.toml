[translation]
10035120-1 = "後日談;千年工程師部的失誤（１）"
10035120-5 = "好熱……"
10035120-7 = "好熱啊……"
10035120-8 = "真熱呢……"
10035120-9 = "畢竟是夏天，會熱也是理所當然的……"
10035120-14 = "夏天？櫻花不是才剛開沒多久嗎？"
10035120-15 = "就是說啊。"
10035120-16 = "才開始改造這台插花用機器人沒幾天耶。"
10035120-18 = "才不是沒幾天！現在已經是盛夏了唷！？"
10035120-20 = "咦！？"
10035120-21 = "我們該不會連換季了都沒發現吧？"
10035120-22 = "一旦投入工作就不知今夕是何年呢……"
10035120-23 = "唔嗯，雖然錯過了制定暑假計劃的機會，#n不過這台插花用機器人應該能改造得很完美，也算是得到了一點安慰吧。"
10035120-29 = "嗯？"
10035120-37 = "大家注意，有委託來了。"
10035120-41 = "委託？"
10035120-42 = "是誰的委託？"
10035120-44 = "是海洋生物研究部。#n他們請我們製作一個能在暑假使用的海洋休閒用機器人。"
10035120-48 = "至於截止日期……就在下週。"
10035120-51 = "要在下週前研發出新作品，時間方面實在不是很寬裕呢。"
10035120-52 = "而且還有程式設計的問題要解決。"
10035120-54 = "不過身為巨匠，拒絕委託可是大忌。"
10035120-60 = "那不如這樣吧？"
10035120-61 = "直接拿這台正在開發中的插花機器人來沿用。"
10035120-62 = "原來如此！"
10035120-63 = "會變成一台兼具插花和海洋休閒功能的機器人呢！"
10035120-65 = "好，立刻開始著手插花兼海洋休閒用機器人的製作專案吧！"
10035120-70 = "根據網路搜尋的結果，海洋休閒包含以下這些項目！"
10035120-71 = "潛水、釣魚、香蕉船！"
10035120-72 = "順帶說明一下，所謂的潛水，指的是穿戴潛水裝備深入海底的活動──"
10035120-78 = "嗯，謝謝你，亞都梨。#n不過說明的部分還是晚點再聽你講吧……"
10035120-79 = "根據訂單中標註的條件，他們希望打造一台能享受多種海洋休閒活動的機器人。"
10035120-80 = "而且還要符合海洋生物研究部的風格，擁有與自然環境相符的外型。"
10035120-82 = "也就是說……要打造一台既能確保潛水點，又能支援釣魚，還能夠拖船的機器人。"
10035120-83 = "難度挺高的呢。"
10035120-85 = "在場有人有潛水、釣魚或香蕉船的經驗嗎？"
10035120-91 = "我也都沒有體驗過。"
10035120-93 = "但是……"
10035120-98 = "只要開始動工，一切都會好起來的！"
10035120-106 = "（於是經歷了數天艱辛的日子……）"
10035120-110 = "終於。"
10035120-111 = "總算。"
10035120-113 = "完成了！"
10035120-119 = "工程師部的雄心之作，海洋休閒用機械鱷魚！"
10035120-121 = "能開拓潛水點的鋼鐵四肢、可提升水溫以吸引魚群的火焰噴射功能……#n再加上不輸拖船的速度和力量，完全是集攻防於一體的最終兵器！"
10035120-122 = "同時還具備能融入自然環境，與灣鱷如出一輒的外型與本能演算法。"
10035120-123 = "果然……過程雖然辛苦，但看到成品時的悸動是無可比擬的。"
10035120-125 = "嗯，雖然主體已經完成，但程式的部分還不夠完善。"
10035120-126 = "不過現在時間也晚了，運行測試就留到明天再進行吧。"
10035120-127 = "今天先回去好好休息！大家辛苦了！"
10035120-130 = "辛苦了！"

[translation]
10035120-1 = "Afterword;The Engineering Department's Mistake 1"
10035120-5 = "It's hot..."
10035120-7 = "Too hot..."
10035120-8 = "It really is..."
10035120-9 = "Then again, it's summer, so that's more or less to be expected..."
10035120-14 = "Summer. And yet it seems the cherry blossoms bloomed but yesterday."
10035120-15 = "I know, right?"
10035120-16 = "That was when I started tweaking the florist robot. So it couldn't have been more than a couple of days ago."
10035120-18 = "A couple of days?! It's the middle of summer!"
10035120-20 = "Unbelievable."
10035120-21 = "Did we simply not notice the change of the seasons?"
10035120-22 = "Well, you know me. Once I get going, I lose track of time..."
10035120-23 = "Hmm... A pity I seem to have missed the chance for a summer vacation. Nonetheless, at least our mechanical florist will be ready soon."
10035120-29 = "...Oh?"
10035120-37 = "Attention, everyone. We have received a new commission."
10035120-41 = "What kind of commission?"
10035120-42 = "And from who?"
10035120-44 = "From the Marine Biology Research Club. They've asked us to create a marine leisure robot for summer recreation."
10035120-48 = "The deadline is...next week."
10035120-51 = "They want us to bang out a whole new project by next WEEK?"
10035120-52 = "Programming's going to be an issue, that's for sure."
10035120-54 = "Still, a meister who refused a commission would be hardly worthy of the name."
10035120-60 = "...All right, how about this?"
10035120-61 = "We use the Florist Robot as a basis for the new one."
10035120-62 = "Ooh, that's good!"
10035120-63 = "Then we'll have a water toy that also arranges flowers."
10035120-65 = "Very well! Our combination leisure-and-floristry robot shall begin development at once!"
10035120-70 = "I looked up marine leisure activities online, and it looks like these are the top three..."
10035120-71 = "Scuba diving, fishing, and banana boats."
10035120-72 = "So let me explain all that. See, in scuba diving, you put on diving equipment and go into the ocean—"
10035120-78 = "Thank you, Kotori, but let us...postpone the explanation for now."
10035120-79 = "Our client requires that this machine be capable of multiple marine leisure activities."
10035120-80 = "And, as befits the Marine Biology Research Club, they wish for the appearance to blend in well with the natural environment."
10035120-82 = "So basically, we need to make a robot that can secure diving points, help with fishing, and tow boats."
10035120-83 = "That's quite a challenge."
10035120-85 = "Have any of us ever tried our hand at scuba diving? Or fishing? Or...banana boats?"
10035120-91 = "I myself have not."
10035120-93 = "Regardless..."
10035120-98 = "We build the thing and make it work!"
10035120-106 = "After a few days of hard, persistent work..."
10035120-110 = "At last."
10035120-111 = "Finally."
10035120-113 = "We're done!"
10035120-119 = "The Engineering Department's ambition made manifest: the Leisure Mechagator!"
10035120-121 = "Yeah! It's the ultimate all-in-one weapon, equipped with steel limbs to secure diving points, a flamethrower to raise water temperature and lure fish, and enough horsepower to tow a mid-sized boat!"
10035120-122 = "It looks just like an alligator, and with the right behavioral algorithms, it'll act like one too. It'll blend into natural environments easily!"
10035120-123 = "It wasn't easy...but the feeling of seeing the finished product? I wouldn't trade that for anything."
10035120-125 = "Hmm, the body is certainly ready, but the programming may still need some work."
10035120-126 = "That said, it's rather late. The test run can wait until tomorrow."
10035120-127 = "For now, let us rest. Fantastic work, everyone!"
10035120-130 = "Yeah, great work!"

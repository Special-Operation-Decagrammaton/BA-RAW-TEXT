[translation]
10035120-1 = "ย้อนวันวาน;ความผิดพลาดของชมรมวิศวกรรม มิลเลเนียม 1"
10035120-5 = "ร้อนจัง..."
10035120-7 = "ร้อน..."
10035120-8 = "ร้อนจังเลยนะคะ..."
10035120-9 = "มันก็แน่นอนอยู่แล้วนี่คะ ก็นี่มันฤดูร้อนนี่นา..."
10035120-14 = "ฤดูร้อนงั้นเหรอ? ดอกซากุระเพิ่งจะบานไปเองนะ?"
10035120-15 = "นั่นน่ะสิ"
10035120-16 = "ตอนนั้นเราเริ่มสร้างหุ่นยนต์จัดดอกไม้กัน และเหมือนจะเพิ่งผ่านมาไม่นานเลยนี่"
10035120-18 = "ไม่นานอะไรกันคะ! นี่มันกลางฤดูร้อนแล้วค่ะ!"
10035120-20 = "หะ... หืม?!"
10035120-21 = "นี่พวกเราอยู่แต่ในห้องชมรมจนไม่รู้ตัวกันเลยเหรอว่าเปลี่ยนฤดูแล้วน่ะ?"
10035120-22 = "ก็ถ้าได้เริ่มทำงานอะไร เราก็ทำจนลืมวันลืมคืนกันเลยนี่นา"
10035120-23 = "อืม ถึงปีนี้จะพลาดโอกาสวางแผนวันหยุดฤดูร้อน แต่หุ่นยนต์จัดดอกไม้ก็น่าจะเสร็จสมบูรณ์ดีแล้ว ถือว่าปลอบใจด้วยเรื่องนี้แล้วกัน"
10035120-29 = "หืม?"
10035120-37 = "ทุกคนฟังทางนี้แป๊บหนึ่ง มีการว่าจ้างเข้ามาน่ะ"
10035120-41 = "ว่าจ้างเหรอคะ?"
10035120-42 = "จากใครน่ะ?"
10035120-44 = "จากชมรมวิจัยสิ่งมีชีวิตทางทะเล ทางนั้นขอให้พวกเราสร้างหุ่นยนต์เพื่อการสันทนาการทางน้ำให้"
10035120-48 = "และขอให้แล้วเสร็จใน... สัปดาห์หน้า"
10035120-51 = "สร้างของชิ้นใหม่ขึ้นมาภายในสัปดาห์หน้ามันไม่ใช่เรื่องง่ายๆ เลยนะ"
10035120-52 = "แถมยังมีปัญหาในการเขียนโปรแกรมด้วย"
10035120-54 = "แต่ในฐานะไมสเตอร์แล้ว เราจะปฏิเสธงานที่เข้ามาไม่ได้หรอก"
10035120-60 = "งั้นเอาอย่างนี้มั้ย?"
10035120-61 = "เราจะใช้หุ่นยนต์จัดดอกไม้ที่กำลังพัฒนาอยู่"
10035120-62 = "อย่างนี้นี่เอง!"
10035120-63 = "งั้นก็จะเป็นหุ่นยนต์เพื่อการสันทนาการทางน้ำที่จัดดอกไม้ได้สินะคะ!"
10035120-65 = "ดีละ งั้นเราจะเริ่มทำโปรเจกต์หุ่นยนต์เพื่อการสันทนาการทางน้ำที่จัดดอกไม้ได้กัน!"
10035120-70 = "จากการหาข้อมูลในอินเทอร์เน็ต การสันทนาการทางน้ำก็คือ!"
10035120-71 = "ดำน้ำลึก ตกปลา บานาน่าโบ๊ท!"
10035120-72 = "อธิบายเพิ่มเติมก็คือ การดำน้ำลึกคือการดำน้ำลงไปใต้น้ำพร้อมอุปกรณ์ดำน้ำ..."
10035120-78 = "อืม ขอบใจนะโคโทริ แต่เอาไว้อธิบายทีหลังดีกว่า..."
10035120-79 = "ในใบสั่งงานระบุเงื่อนไขไว้ว่าอยากให้สนุกสนานกับกิจกรรมทางน้ำอย่างครบครันได้ด้วยหุ่นยนต์เพียง#nตัวเดียว"
10035120-80 = "และอยากให้มีรูปลักษณ์ภายนอกที่เหมาะกับสภาพแวดล้อมทางธรรมชาติ ให้สมกับเป็นของจากชมรม#nวิจัยสิ่งมีชีวิตทางทะเล"
10035120-82 = "หมายความว่า... เราต้องสร้างหุ่นยนต์ที่สามารถหาจุดดำน้ำได้ หาจุดตกปลาได้ และต้องมีพละกำลัง#nที่สามารถลากเรือได้สินะคะ"
10035120-83 = "ยากไม่ใช่เล่นเลยนะ"
10035120-85 = "ดำน้ำลึก ตกปลา บานาน่าโบ๊ท... มีใครเคยลองเล่นอะไรมาบ้างมั้ย?"
10035120-91 = "อืม ฉันก็ไม่เคยเลยเหมือนกัน"
10035120-93 = "แต่ว่า..."
10035120-98 = "ทำๆ ไปเดี๋ยวก็ได้แหละนะ!"
10035120-106 = "(หลังจากผ่านช่วงเวลาแห่งความอดทนและเพียรพยายามมาหลายวัน...)"
10035120-110 = "และแล้ว"
10035120-111 = "ในที่สุด"
10035120-113 = "ก็เสร็จสมบูรณ์แล้วค่ะ!"
10035120-119 = "จระเข้จักรกลสำหรับสันทนาการทางน้ำ ผลงานแห่งความพยายามของชมรมวิศวกรรม!"
10035120-121 = "สุดยอดอาวุธที่มีทั้งระบบโจมตีและป้องกัน มีขาที่แข็งแกร่งเพื่อการบุกเบิกหาจุดดำน้ำ พร้อมฟังก์ชัน#nแผ่รังสีเปลวไฟเพื่อเพิ่มอุณหภูมิน้ำให้ปลามารวมตัวกัน พ่วงด้วยความเร็วและพลังในการลากเรือ!"
10035120-122 = "รูปลักษณ์ภายนอกคล้ายจระเข้น้ำเค็มที่กลมกลืนกับสภาพแวดล้อมทางธรรมชาติ และมีอัลกอริทึม#nสัญชาตญาณพื้นฐานของจระเข้!"
10035120-123 = "กะแล้วเชียว... ถึงจะเหนื่อยอยู่หลายวัน แต่ความรู้สึกตอนที่ได้เห็นผลงานที่เสร็จสมบูรณ์แล้วมันช่าง#nหอมหวานเหลือเกิน"
10035120-125 = "อืม ถึงตัวหุ่นยนต์จะเสร็จสมบูรณ์แล้ว แต่เรื่องโปรแกรมยังไม่สมบูรณ์นะ"
10035120-126 = "แต่นี่ก็ดึกแล้ว เรื่องทดสอบระบบเอาไว้ทำพรุ่งนี้แล้วกัน"
10035120-127 = "วันนี้กลับไปพักผ่อนกันก่อน! ทุกคนทำได้ดีมาก!"
10035120-130 = "ทำได้ดีมากค่ะ!"

[translation]
1009505-1 = "請別忘記女僕，老師"
1009505-2 = "大事不好了！"
1009505-3 = "[s]「突然怎麼了，綠！？」"
1009505-4 = "我之所以說要當老師的專屬女僕，是為了構想以女僕為主角的遊戲原畫對吧？"
1009505-5 = "可是現在回頭想想……"
1009505-17 = "到現在為止，我好像一直都在跟老師玩！"
1009505-18 = "[s1]「沒關係沒關係……」\n[s2]「學生本來就是邊玩邊長大……」"
1009505-21 = "可是讀書不是學生的本分嗎？"
1009505-22 = "[s3]「啊啊，綠居然會說這種話……」\n[s4]「老師好感動，眼淚都快流下來了……」"
1009505-28 = "總之，這樣下去不行！"
1009505-29 = "就算只有今天也要做好女僕的工作！"
1009505-30 = "老師！你現在要回夏萊對吧？我們一起走吧！"
1009505-31 = "[s]「綠？別拉我啊！綠～！？！？」"
1009505-34 = "對了，老師知道女僕的種類嗎？"
1009505-35 = "[s]「好像完全沒概念……？」"
1009505-36 = "這樣啊……！"
1009505-37 = "首先……聽說受到最高待遇的是「侍女」這個職務。"
1009505-38 = "侍女的主要任務是管理衣物和飾品，協助穿衣化妝等等。"
1009505-39 = "據說是由家中的女主人親自僱用並另行管理。"
1009505-40 = "受到類似待遇的是女管家。"
1009505-41 = "準確來說，女管家不屬於女僕，而是更接近掌管家務的管理職位。"
1009505-42 = "也就是負責管理女僕及其他傭人的最高管理職，同時也是人事負責人。"
1009505-43 = "[s]「哦哦……學到了一課……！」"
1009505-44 = "接著在女管家底下的就是家務女僕。"
1009505-45 = "主要負責房間的整理，以及打掃這類維持整潔的工作。"
1009505-46 = "此外還有照顧小孩的保姆女僕、輔助廚房事務的廚房女僕……"
1009505-47 = "以及負責洗衣服的洗衣女僕、包攬一般雜務的女服務生等等。"
1009505-48 = "雖然女僕的種類聽起來相當多……"
1009505-49 = "但當中最常見的，其實是人稱「Maid of All Works」的──"
1009505-50 = "身兼所有工作的一人女僕。"
1009505-51 = "原因似乎是因為大多數的人……經濟狀況並沒有富裕到能僱用一名以上的女僕。"
1009505-52 = "[s]「綠真了解呢。」"
1009505-53 = "嗯，我在準備插畫的同時也做了各種調查。"
1009505-60 = "所以我！就算只有今天也要做個稱職的女僕！"
1009505-61 = "夏萊的雜務就全部交給我吧！"
1009505-63 = "（於是活力充沛的綠的一日女僕實習(?)就這樣開始了……！）"
1009505-65 = "說到女僕的基本功，首先想到的應該是打掃吧！"
1009505-69 = "辦公室角落的灰塵真多……"
1009505-70 = "通常這種地方不會仔細清理，所以會有灰塵堆積。"
1009505-71 = "其實我們遊戲開發部也一樣……"
1009505-72 = "不過請不必擔心，老師！#n我會打掃得乾淨到一不小心就會滑倒的！"
1009505-73 = "[s]「讓人滑倒不好吧！？」"
1009505-76 = "接下來是輔助用餐！"
1009505-77 = "雖然這麼說，其實只是外送食物的善後處理……"
1009505-78 = "話說外送食物的容器……堆積得……有點多耶。"
1009505-79 = "我先來分類好了。"
1009505-80 = "[s]「我很慚愧……」"
1009505-81 = "沒關係的，畢竟我是老師的女僕。"
1009505-84 = "輔助打扮也是女僕的責任吧？"
1009505-85 = "[s5]「那個，綠？綠同學……？」\n[s6]「感覺你的氣勢很不尋常……？」"
1009505-88 = "不用擔心，老師。#n請把身心全都交給我吧。"
1009505-95 = "這邊的衣服有點凌亂哦。我來幫你好好整理。"
1009505-100 = "嗯，感覺好多了。要幫你拿鏡子嗎？"
1009505-103 = "洗碗也是女僕的重要工作！"
1009505-107 = "馬克杯居然堆了5層……好像有點……"
1009505-108 = "[s]「我很抱歉……」"
1009505-109 = "沒關係的，畢竟我是老師的女僕。"
1009505-110 = "[s]「那句話不是說過了嗎……？」"
1009505-111 = "是啊，希望不要太常說這句話。"
1009505-120 = "總覺得今天似乎充滿意義呢！"
1009505-121 = "甚至覺得就這樣一直……當老師的女僕也不錯……"
1009505-122 = "[s]「唔嗯……那好像有點困難……」"
1009505-124 = "[ns]「為了開發遊戲而進行的女僕體驗，你覺得還順利嗎？」"
1009505-125 = "嗯……？"
1009505-129 = "啊……！"
1009505-130 = "我完全忘了……"
1009505-131 = "咦？全心投入女僕的工作，結果忘了女僕體驗這回事……反而會是很確實的經驗？"
1009505-132 = "謝謝老師的安慰……"
1009505-133 = "那，那麼最後！"
1009505-134 = "我想拜託老師一件事……"
1009505-135 = "[s]「拜託？是什麼事呢？」"
1009505-136 = "那，那個，該怎麼說呢……！"
1009505-137 = "……"
1009505-138 = "雖然還不確定會不會用在封面上……"
1009505-139 = "但我想留下自己作為女僕的概念照……"
1009505-140 = "所以……如果老師不介意的話……"
1009505-141 = "希望老師能幫我拍攝……！"
1009505-146 = "（聽綠說完有關概念照的設定和情境後，試著在夏萊尋找適合的地方）"
1009505-147 = "（至於綠說明的概念則是……！）"
1009505-151 = "― [log=미도리 메이드]非，非常抱歉。主人！[/log][wa:3950] "
1009505-152 = "― [log=미도리 메이드]我，又不小心搞錯，跌倒了……[/log][wa:5860] "
1009505-155 = "― [log=미도리 메이드]沒關係……的。如果是主人的指責……[/log][wa:4610] "
1009505-156 = "― [log=미도리 메이드]無論什麼……我都願意接受……[/log][wa:4950] "
1009505-159 = "― [log=미도리 메이드]……感，感覺怎麼樣？[/log][wa:2070] "
1009505-162 = "[ns]「總覺得好像在做什麼不該做的事！」"
1009505-163 = "― [log=미도리 메이드]可，可是這就是那種情境呀！[/log][wa:2660] "
1009505-164 = "― [log=미도리 메이드]請你幫我拍照的人，也是我……[/log][wa:6700] "
1009505-167 = "― [log=미도리 메이드]那個，老師？[/log][wa:3370] "
1009505-168 = "― [log=미도리 메이드]今天的女僕綠，您還滿意嗎？[/log][wa:5540] "
1009505-171 = "呼啊……感覺很舒暢。"
1009505-172 = "謝謝你，老師，辛苦了。"
1009505-176 = "咦，為什麼露出那種表情？"
1009505-177 = "[s]「沒事，我只是在數質數而已。」"
1009505-178 = "是……嗎？"
1009505-179 = "……呵呵。"
1009505-180 = "老師，這次的插畫，我會全力以赴的。"
1009505-181 = "還有，如果可以的話……"
1009505-182 = "我想第一個把完成品給你看，可以嗎？"
1009505-183 = "[s]「嗯，我很期待哦。」"
1009505-184 = "是！"

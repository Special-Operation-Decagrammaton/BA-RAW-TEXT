[translation]
1009505-1 = "Please Remember the Maid, Sensei"
1009505-2 = "Now that I think about it, this is a big problem!"
1009505-3 = "[s] \"What is it all of a sudden, Midori?!\""
1009505-4 = "The reason I agreed to be your personal maid was to help with creating the concept art for a game about a maid, right?"
1009505-5 = "But come to think of it..."
1009505-17 = "It seems like I've just been having fun with you this whole time!"
1009505-18 = "[s1] \"It's okay, it's okay...\"\n[s2] \"Students are supposed to have fun while they're growing up...\""
1009505-21 = "Yeah, but students are also supposed to study!"
1009505-22 = "[s3] \"Wow, to hear you say that...\"\n[s4] \"I'm so proud, it almost brings me to tears...\""
1009505-28 = "Anyway, this can't go on."
1009505-29 = "Even if it's just for today, I need to properly perform my duties as a maid!"
1009505-30 = "Sensei! You're heading to Schale now, right? Take me with you!"
1009505-31 = "[s] \"Midori? Stop pulling me like that! Midori?!\""
1009505-34 = "By the way, Sensei, are you familiar with the different types of maids?"
1009505-35 = "[s] \"Not at all.\""
1009505-36 = "I see!"
1009505-37 = "Hm, hmm... First off, the most respected position was the lady's maid."
1009505-38 = "The primary duties were managing the wardrobe and accessories, as well as assisting with dressing and makeup."
1009505-39 = "The lady of the house would hire them directly, and they were managed separately."
1009505-40 = "The housekeeper was also held in high regard."
1009505-41 = "To be precise, the housekeeper wasn't classified as a maid. Their role was more like a management position, supervising household affairs."
1009505-42 = "They were the highest-ranking manager, overseeing other servants, including maids, and also handling personnel matters."
1009505-43 = "[s] \"Oh! I'm learning so much...!\""
1009505-44 = "The position just below that was the housemaid."
1009505-45 = "They were mainly in charge of cleaning tasks and managing the rooms."
1009505-46 = "Then there was the nursery maid, who cared for the children, and the kitchen maid, who, obviously, assisted in the kitchen."
1009505-47 = " Also, there was the laundry maid, in charge of washing clothes, and the chamber maid, who handled more general tasks."
1009505-48 = "So there were lots of distinct maid roles, but..."
1009505-49 = "...the most common position was the \"maid-of-all-work.\""
1009505-50 = "A single maid who managed all tasks on her own."
1009505-51 = "Most households couldn't afford more than one maid."
1009505-52 = "[s] \"You really know your stuff!\""
1009505-53 = "I do! I always do my research when I start illustrations."
1009505-60 = "So again, even if it's just for one day, I'm determined to be a proper maid!"
1009505-61 = "Leave all of Schale's tasks to me!"
1009505-63 = "And with that, Midori's energetic one-day maid experience began..."
1009505-65 = "A maid's most basic duty is cleaning, of course!"
1009505-69 = "There's a ton of dust in the corner of this office..."
1009505-70 = "Dust tends to accumulate in spots like this because they usually aren't cleaned thoroughly enough."
1009505-71 = "To be honest, the Game Development Department club room is usually the same way..."
1009505-72 = "Don't worry, Sensei! I'll clean it so thoroughly that you'll have to watch your step so you don't slip!"
1009505-73 = "[s] \"Shouldn't we keep the place safe, though?\""
1009505-76 = "The next task is meal assistance!"
1009505-77 = "Which in this case, is honestly mostly just cleaning up the mess from the take-out food..."
1009505-78 = "And on that note, look at all these old containers."
1009505-79 = "Let me take care of the recycling first."
1009505-80 = "[s] \"Now I'm embarrassed...\""
1009505-81 = "It's all right. After all, I am a maid."
1009505-84 = "...I suppose helping you get dressed is part of a maid's duties too, right?"
1009505-85 = "[s5] \"Umm... Midori? Miss Midori...?\"\n[s6] \"Something feels a bit unusual about your energy...?\""
1009505-88 = "It's okay, Sensei. Leave everything to me, both physically and mentally."
1009505-95 = "Your outfit looks a bit messy. Let me straighten it out for you."
1009505-100 = "There, it's all set. Shall I bring a mirror for you as well?"
1009505-103 = "Dishwashing is another important task for a maid!"
1009505-107 = "...Which brings us to this mountain of piled-up mugs."
1009505-108 = "[s] \"I'm just...sorry, really sorry...\""
1009505-109 = "It's all right. After all, I am a maid."
1009505-110 = "[s] \"Didn't you already say that...?\""
1009505-111 = "Yes. And I wish I didn't have to say it so often."
1009505-120 = "This has been a very rewarding day!"
1009505-121 = "I almost feel like...I could stay as your maid forever..."
1009505-122 = "[s] \"Um, hmm... No, that might be a little difficult...\""
1009505-124 = "[ns] \"Did you get enough maid experience for your game?\""
1009505-125 = "Huh?"
1009505-129 = "Oh!"
1009505-130 = "I completely forgot..."
1009505-131 = "I was so focused on all my duties that I wasn't even thinking about that... Do you think it was a valuable experience?"
1009505-132 = "I'm thankful for your support, but..."
1009505-133 = "W-Well, then! As a final request..."
1009505-134 = "...may I ask you for one...favor?"
1009505-135 = "[s] \"What kind of favor?\""
1009505-136 = "Um, so the thing is...!"
1009505-137 = "..."
1009505-138 = "I'm not sure if I'll ever use it, but..."
1009505-139 = "I want to capture a concept shot of myself as a maid..."
1009505-140 = "So...if it's okay with you..."
1009505-141 = "I was hoping you could take the picture for me...!"
1009505-146 = "After discussing the setup and context for the concept shot with Midori, I searched Schale for a suitable location."
1009505-147 = "Midori's idea for the concept was..."
1009505-151 = "― [log=미도리 메이드]I'm...sorry...Master![/log][wa:3510] "
1009505-152 = "― [log=미도리 메이드]I...I made another mistake and...fell over...[/log][wa:4620] "
1009505-155 = "― [log=미도리 메이드]But...don't worry about me. Reprimand me as you will, Master...[/log][wa:2770] "
1009505-156 = "― [log=미도리 메이드]No matter what... I'll accept it...[/log][wa:4110] "
1009505-159 = "― [log=미도리 메이드]What...do you think?[/log][wa:1670] "
1009505-162 = "[ns] \"I think we really shouldn't be doing this!\""
1009505-163 = "― [log=미도리 메이드]B-But...this is the scenario we're in![/log][wa:1660] "
1009505-164 = "― [log=미도리 메이드]I'm the one who asked you to...do this...[/log][wa:5620] "
1009505-167 = "― [log=미도리 메이드]Umm, Sensei?[/log][wa:3130] "
1009505-168 = "― [log=미도리 메이드]Did you find today's maid experience with Midori...satisfying?[/log][wa:3580] "
1009505-171 = "*sigh* I feel...oddly invigorated."
1009505-172 = "Thank you, Sensei. You've worked hard."
1009505-176 = "Huh? What's with that look?"
1009505-177 = "[s] \"It's nothing. I was just counting prime numbers.\""
1009505-178 = "Is that so...?"
1009505-179 = "...Heehee."
1009505-180 = "Sensei, I'll give this illustration my best efforts."
1009505-181 = "And if you don't mind..."
1009505-182 = "I'd love to show you the finished piece before anyone else. Would that be okay?"
1009505-183 = "[s] \"Of course. I can't wait to see it.\""
1009505-184 = "Yes, sir!"

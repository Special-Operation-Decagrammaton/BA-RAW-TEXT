[translation]
90002070-1 = "第7話;Kei"
90002070-2 = "Kei？Kei！？Kei沒事吧！？拜託了！愛麗絲……請不要留下愛麗絲一個人！"
90002070-3 = "Kei！！！！！"
90002070-8 = "愛麗絲，"
90002070-12 = "是，是！什，什麼啊？只要是Kei的話，我什麼都會聽的……！"
90002070-13 = "對不起。腦袋裡嗡嗡叫的，聲音稍微小聲點。"
90002070-14 = "咦……？"
90002070-15 = "呃啊啊……要死了……"
90002070-16 = "沒關係……嗎？Kei……？"
90002070-17 = "沒事啦，沒事。愛麗絲，完全沒問題。只是全身上下都在嘎吱作響而已。"
90002070-20 = "我來看看。愛麗絲，等等。"
90002070-21 = "是，是的！莉央前輩……！"
90002070-24 = "目前看來沒事，愛麗絲。Kei的意識……沒有生命危險。"
90002070-25 = "真的嗎？謝謝你，莉央前輩！"
90002070-26 = "不過硬要說的話，Kei這副身體幾乎已經到極限了。"
90002070-27 = "真，真的嗎？該怎麼辦呢，陽葵前輩……？"
90002070-28 = "不困難。因為是整體重新整修的問題。"
90002070-29 = "所以說出問題的只是機能與運作性的物理部分而已。"
90002070-30 = "是，是啊。太好了……Kei醬……"
90002070-31 = "等等。結論就是把這副身體整修後繼續使用，對吧？"
90002070-32 = "可是？當然是要分解到零件並且檢查後再重新組裝，所以會花點時間……有什麼問題嗎？"
90002070-36 = "……"
90002070-37 = "只是個建議而已。"
90002070-38 = "……趁這個機會，不能換一個不同的身體嗎？"
90002070-39 = "不同的身體？可是好像沒有剛好合適的素體？"
90002070-40 = "合適素體那邊不是就有一個嗎？那裡！"
90002070-41 = "那邊……！"
90002070-43 = "你說的素體，是指這個？"
90002070-44 = "但這應該是十字神名那邊製造的……？"
90002070-45 = "我們把這個幾乎分析完了呢！也確認過沒有問題呢！"
90002070-46 = "冷靜點，Kei。那只是指在可動性方面沒問題。"
90002070-47 = "是。我們說過只要移植意識迴路就能立即啟動……"
90002070-48 = "所以說！讓我！派上用場！"
90002070-49 = "我無法贊成。會出現什麼變數都無法預測。簡單來說就是……太危險了。"
90002070-50 = "再加上是否能突破素體內部的安全系統都沒有把握。"
90002070-51 = "那個，我來試試看。我不是說過，只要給我時間和預算就能辦到了嗎？"
90002070-52 = "[s]「但我們現在不是時間和預算都沒有嗎！？」"
90002070-53 = "呃，呃嗯…雖然不是完全沒有可能性，但考慮風險的話……"
90002070-57 = "為什麼大家只會一直說做不到呢！"
90002070-58 = "卻不打算直接試試看！"
90002070-59 = "哦。氣勢復活了呢，Kei。"
90002070-60 = "來，請看？那個，不是用鋼鐵大陸的素材製作的嗎？對吧？"
90002070-61 = "所以只要好好運用的話…嗯？我過去連接看看？說不定能找到什麼線索不是嗎？"
90002070-62 = "但是如果失敗的話……"
90002070-64 = "幹嘛一直說這些喪氣的話啊！這樣本來能成功的事情也會失敗的！"
90002070-65 = "先試試看吧！嗯？如果行不通的話！嗯？到時候再想別的方法就可以了啊！"
90002070-66 = "Kei今天怎麼特別像哪裡來的死板上司一樣啊……"
90002070-67 = "拜託了。我不是已經做過一次意識系統轉移了嗎？我本來就是住在鑰匙圈裡的！大家都是知道的！"
90002070-73 = "好的！愛麗絲還當作紀念品保存呢！"
90002070-74 = "啊，好。太感謝了。愛麗絲，總之我想說的是…"
90002070-75 = "有過一次的成功，就不代表第二次會失敗啊！"
90002070-76 = "雖然說過很多次了，失敗就再找別的方法啊！"
90002070-77 = "……那麼討厭現在的身體……？"
90002070-78 = "拜託！我拜託你們。嗯？不進行轉移的話──"
90002070-79 = "──我會躺在這裡耍賴直到答應為止哦~~~！！！"
90002070-88 = "Kei！？"
90002070-89 = "呃啊……虛弱的身軀太激動了……"
90002070-91 = "[ns]「……照Kei說的試試看？」"
90002070-92 = "可，可是，老師……"
90002070-93 = "也不是完全行不通吧？那倒也……不是。不過……也伴隨著危險性。"
90002070-94 = "如果可以的話，我盡量不想在這裡增加更多變數……"
90002070-95 = "[s]「照Kei所說的，成功的話也是有所收穫吧？」"
90002070-96 = "如果一切順利的話，是沒錯。反正那個素體很有可能是十字神名那幾個孩子製造的。"
90002070-97 = "既然確認到某些區域受到特定安全系統保護，只要能解析出來對作戰一定會有幫助。"
90002070-98 = "而且那套安全系統和Kei確實存在著某種關聯，也可以為了防範失敗而加裝輔助記憶裝置。"
90002070-99 = "Kei的意識保存本身上，看起來風險不算大……"
90002070-100 = "沒錯，不過如果失敗的話，會耗費很多時間。"
90002070-101 = "既要修復Kei原本的身體，又要花時間把意識移植到新素體。"
90002070-102 = "再加上解析所需的時間。"
90002070-103 = "[s]「……」"
90002070-107 = "[ns]「那麼，先試試看吧！」"
90002070-108 = "認，認真？老師！？"
90002070-109 = "確定成功的話會有很大的回報？然後就算失敗也不會失去Kei？話雖如此……"
90002070-110 = "時間、整備等等問題一定會接踵而來……"
90002070-111 = "嗯？就當滿足一次心願吧？"
90002070-112 = "……"
90002070-116 = "好啦……老師。就試試看囉。"
90002070-117 = "呼……既然老師都開口，那就沒辦法了。也是可愛後輩的請求。"
90002070-118 = "太好了，Kei！大家都願意幫忙！"
90002070-119 = "嗚嗚，嗚嗚……果然真心與……充滿靈魂的說服……是能打動所有人的……"
90002070-120 = "原來如此！從Kei身上學到了。我下次也要這樣說服優香！"
90002070-121 = "……我們大概行不通吧，姐姐……"
90002070-123 = "同時對三處進行輸入，陽葵！一，二──"
90002070-124 = "──三！"
90002070-131 = "Kei。"
90002070-132 = "我也是！我也要看！哇啊……"
90002070-136 = "確認這個素體成功啟動了。還有……"
90002070-137 = "能認出我們嗎？"
90002070-140 = "[ns]「……Kei？」"
90002070-143 = "老師，還有……"
90002070-144 = "愛麗絲？"
90002070-146 = "Kei──！！！"
90002070-152 = "不愧是Kei！愛麗絲一直都相信你可以的！"
90002070-153 = "……我不是說了嗎。什麼事也不會發生的。大家都過於大驚小怪……"
90002070-154 = "[s]「這種情況本來就會顧慮很多的。」"
90002070-155 = "就是說啊。如果大家都很冷靜，反而會有點失落吧？"
90002070-156 = "沒辦法了。這種時候就由我來保持冷靜吧。Kei。"
90002070-157 = "不用啦，沒事的……"
90002070-159 = "呃……嗯……那麼再一次，大家好。我是Kei。"
90002070-160 = "是Kei！"
90002070-161 = "哦，現在真的有種機械少女風格的感覺了！"
90002070-162 = "就是說啊。設計上也很有感。"
90002070-163 = "太，太好了……Kei醬。"
90002070-164 = "（……原本的設計也沒那麼差吧……）"
90002070-169 = "……現在我能走路了。不是靠喇叭，而是透過喉嚨說話。"
90002070-170 = "頭髮，手和手指頭都有……雖然在某種意義上以前也算有，總之呢！"
90002070-174 = "……（聞聞）"
90002070-175 = "恭喜。Kei。那就進入下一個階段。有從那副身體裡發現什麼嗎？"
90002070-176 = "當然就算沒有任何發現，只要Kei滿意的話，我也很開心。"
90002070-180 = "嗯……有的。如果毫無成果，我反而會不好意思呢。"
90002070-181 = "我就直接從結論開始說吧。也就是說……代表我要說的事情很多。"
90002070-182 = "讓我們回到運輸船吧。"
90002070-184 = "下一話;Level Up"

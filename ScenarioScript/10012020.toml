[translation]
10012020-1 = "ตอนที่ 2;ข้อแก้ตัวที่พอฟังขึ้น"
10012020-5 = "หืม...!?  อะไรน่ะ? นั่นมันเสียงอะไร?"
10012020-6 = "เสียงเหมือนอะไรตกลงมาเลย... เฮลิคอปเตอร์? หรือจะเป็นเครื่องบิน?"
10012020-7 = "แบบนี้ไม่น่าจะใช่เสียงที่เกิดจากธรรมชาติเลยนะ..."
10012020-8 = "แสดงว่าต้องเป็นฝีมือของมนุษย์"
10012020-9 = "......! หัวหน้าราบุ...!?"
10012020-11 = "หึหึหึ... งานนี้ชักจะสนุกขึ้นแล้วสินะ"
10012020-12 = "นึกว่าที่นี่จะเป็นจุดที่ยังไม่เคยมีใครหาเจอซะอีก... แต่ดันมามีคู่แข่งซะได้"
10012020-13 = "ยังไงก็เถอะ <การล่ารีสอร์ต> ของเราในครั้งนี้... คงต้องตื่นเต้นมากแน่ๆ"
10012020-14 = "กล้าดียังไงถึงเข้ามาถึงเป้าหมายของแก๊งหมวกกันน็อกป๋อมแป๋มของเราแบบนี้"
10012020-15 = "คงไม่มีทางเลือกอื่นแล้วสินะ..."
10012020-16 = "นอกจากจะต้องให้ได้ลิ้มลองรสชาติแห่งความเจ็บปวด!"
10012020-18 = "อึก... ไม่น่าเผลอเลยเรา..."
10012020-19 = "เผลอแป๊บเดียวหายไปได้ยังไง..."
10012020-20 = "[s1] \"เซริกะ...?\"\n[s2] \"ตามหาใครอยู่เหรอ?\""
10012020-21 = "......! อ๊ะ คุณครู! มาได้จังหวะพอดีเลย! เห็นรุ่นพี่โฮชิโนะบ้างไหม?"
10012020-22 = "......! อ๊ะ คุณครู! มาได้จังหวะพอดีเลย! เห็นรุ่นพี่โฮชิโนะบ้างไหม?"
10012020-23 = "ระหว่างที่อายาเนะกับรุ่นพี่คนอื่นไปเอาของที่เตรียมมาออกจากเฮลิคอปเตอร์ ฉันว่าจะเก็บกวาดตรงนี้กับพี่เขาสักหน่อยน่ะ..."
10012020-24 = "[s3] \"อย่างนี้นี่เอง... หนีไปเล่นซ่อนแอบอีกแล้วสินะ?\"\n[s4] \"เข้าใจแล้ว ให้ไปตามหาโฮชิโนะมาใช่ไหม?\""
10012020-25 = "ทำไมพูดเหมือนดูน่าสนุกนักเลยล่ะนั่นน่ะ..."
10012020-26 = "อืม รบกวนหน่อยนะคุณครู ฉันคงต้องทำความสะอาดตรงนี้ต่อก่อน"
10012020-27 = "พี่เค้าน่าจะยังไม่ไปไหนไกล บางทีอาจจะอยู่ในอาคารนี้ก็ได้"
10012020-28 = "และถ้าหาเจอแล้วก็ติดต่อมาบอกฉันด้วยนะ เข้าใจไหม?"
10012020-29 = "ก็คุณครูน่ะใจดีเกินไป ถ้ารุ่นพี่โฮชิโนะขอให้มาเก็บกวาดแทนก็คงมาทำให้แน่ๆ"
10012020-30 = "เข้าใจใช่ไหม? ไม่ต้องปลุกพี่เค้า แต่ให้ติดต่อฉันมาก่อน! สัญญานะ?!"
10012020-32 = "(จากนั้นคุณครูก็เดินหาโฮชิโนะไปทั่วทั้งรีสอร์ต)"
10012020-33 = "(ถึงจะเป็นที่ที่เพิ่งเคยมาครั้งแรกแต่ก็ไม่หลงทาง)"
10012020-40 = "(...?)"
10012020-41 = "......? เอ๋... ครูเหรอ? มาทำอะไรที่นี่น่ะ?"
10012020-42 = "[s5] \"โฮชิโนะ...?\"\n[s6] \"ก็มาตามหาโฮชิโนะน่ะสิ\""
10012020-43 = "หืม?... มาตามหาลุงเหรอ?"
10012020-44 = "หาอยู่พักใหญ่เลยเหรอ? หาทำไมล่ะ...?"
10012020-45 = "อ้อ... ลืมบอกเซริกะไปเลยแฮะ โทษทีนะ โทษทีๆ"
10012020-46 = "แบบนี้ใจร้ายไปหน่อยนะ... เห็นอย่างนี้ฉันก็ตั้งใจหาอุปกรณ์ทำความสะอาดอยู่พักหนึ่งเลยนะ..."
10012020-47 = "พอหาตัวไม่เจอก็คิดว่าไปแอบหลับอยู่ที่ไหนงั้นเหรอ... แบบนี้ลุงน้อยใจนะ"
10012020-48 = "เซริกะจังตั้งใจทำงานคนเดียวอยู่ขนาดนั้น จะให้ฉันแอบมานอนสบายใจเฉิบได้ยังไงล่ะ?"
10012020-49 = "ปกติก็เป็นงี้... งั้นเหรอ?"
10012020-50 = "แหะๆๆ... ก็นะ... จะปฏิเสธยังไงดี..."
10012020-54 = "หืม...?"
10012020-55 = "ว่าไงนะ? อยากรู้ว่าฉันดูอะไรอยู่งั้นเหรอ?"
10012020-56 = "ครูเนี่ย ยังตาดีเหมือนเดิมเลยนะ"
10012020-57 = "แต่ก็เอาเถอะ ไหนๆ ที่นี่ก็ไม่มีรุ่นน้องอยู่... ส่วนครูก็ไม่น่าจะเป็นอะไรมั้ง..."
10012020-58 = "ฉันก็แค่... มีอะไรกวนใจนิดหน่อยน่ะ"
10012020-62 = "[ns7] \"นี่มัน... โปสเตอร์งานเทศกาลที่นานมาแล้ว\"\n[ns8] \"จะว่าไป ที่อะบิดอสก็เคยมีงานที่คล้ายๆ กันมาก่อน\""
10012020-63 = "แหะๆ..."
10012020-64 = "แหะๆ..."
10012020-65 = "[s] \"... โฮชิโนะ ...\""
10012020-66 = "มันก็แค่การย้อนความหลังที่น่าขายหน้าของลุงน่ะ ครูอย่าไปบอกเรื่องนี้กับคนอื่นนะ"
10012020-67 = "เด็กพวกนั้นอ่อนไหวมากกว่าที่เห็น ถ้ามีอะไรมากวนใจ พักร้อนนี้ก็คงจะหมดสนุกพอดี"
10012020-68 = "ไหนๆ ก็มาถึงที่นี่แล้ว จะมาทำให้เสียเรื่องก็ไม่ได้เนอะ ใช่ไหมล่ะ?"
10012020-69 = "[s] \"......\""
10012020-70 = "เพราะงั้นก็เลิกทำหน้าแบบนั้นได้แล้ว..."
10012020-71 = "ไม่เป็นไรหรอก ไม่เป็นไร ฉันรู้ว่าครูกังวลเรื่องอะไร แต่มันไม่ได้สำคัญอะไรขนาดนั้น เข้าใจใช่ไหม?"
10012020-72 = "[s9] \"เอาเป็นว่า มาเก็บกวาดกันก่อนเถอะ\"\n[s10] \"งั้นไหนๆ ก็มาที่นี่แล้ว มาเก็บกวาดตรงนี้กันด้วยเลย\""
10012020-73 = "แหะๆ..."
10012020-74 = "แหะๆ..."
10012020-75 = "ขอบคุณที่พูดอย่างนั้นนะ แต่ไม่ต้องทำถึงขนาดนั้นก็ได้"
10012020-76 = "ยังไงห้องนี้มันก็อยู่ไกลออกมา... ถ้าจะช่วยเก็บกวาด ครูไปที่ที่เซริกะจังอยู่ดีกว่า..."
10012020-80 = ".........."
10012020-81 = "ฮึ่ม... ก็ได้ๆ ไปด้วยกันก็ได้ เฮ้อ"
10012020-82 = "ลุงละใจไม่ค่อยดีเลยเวลาครูเอาแต่จ้องแล้วก็ไม่พูดอะไรแบบนี้"
10012020-83 = "งั้นขอให้ช่วยไปเอาอุปกรณ์ทำความสะอาดมาหน่อยได้ไหมล่ะ~? ฉันจะเก็บกวาดอยู่ทางนี้ก่อน"
10012020-84 = "ไม่ต้องเป็นห่วงหรอกน่า ฉันไม่หนีไปไหนหรอก..."
10012020-85 = "[s] ถืออุปกรณ์ทำความสะอาดกลับมา"
10012020-90 = "(จากนั้นก็ช่วยโฮชิโนะเก็บกวาดบริเวณรอบๆ จนสะอาด)"
10012020-92 = "(บรรยากาศภายในรีสอร์ตดูดีราวกับเป็นวันเปิดทำการวันแรก)"
10012020-93 = "ว้าว... ตอนแรกฉันก็แอบคิดว่าแค่สองคนจะเก็บกวาดยังไงไหว... ทำไปทำมาก็ได้อยู่แฮะ"
10012020-94 = "ทำดีมากเลยครู โดนพวกเราลากมาลำบากถึงที่นี่เลยนะเนี่ย~"
10012020-95 = "[s11] \"ไม่เป็นไรหรอก ไม่ใช่เรื่องใหญ่อะไร\"\n[s12] \"โฮชิโนะทำมากกว่าครูอีก\""
10012020-96 = "... ถ้าเอาแต่พูดแบบนี้อยู่เรื่อย เดี๋ยวก็ขอให้ช่วยงานไปตลอดเลยนะ?"
10012020-97 = "... ถ้าเอาแต่พูดแบบนี้อยู่เรื่อย เดี๋ยวก็ขอให้ช่วยงานไปตลอดเลยนะ?"
10012020-98 = "แต่ก็... นั่นสินะ พอเห็นทุกอย่างเป็นระเบียบเรียบร้อย ก็รู้สึกสดชื่นขึ้นมาเลย"
10012020-99 = "อืม..."
10012020-100 = "ไม่เหมือนกับบางที่เลย ที่ถึงจะเก็บกวาดเท่าไรก็ไม่สะอาด..."
10012020-101 = "เจอตัวแล้ว!! มาอยู่ตรงนี้เองสินะรุ่นพี่!!"
10012020-102 = "หืม...?"
10012020-103 = "มันเป็นยังไงกันนะ แค่เผลอแป๊บเดียวเป็นต้องหนีมา!"
10012020-104 = "ฉันเหนื่อยมากนะที่ต้องเก็บกวาดคนเดียวและต้องตามหารุ่นพี่อีก! บางทีรุ่นพี่เองก็น่าจะ..."
10012020-105 = "ทำความ... สะอาด...?"
10012020-106 = "เอ๋...?"
10012020-107 = "อะ... อะไรเนี่ย? ที่นี่... ทำไมถึงได้สะอาดแบบนี้ล่ะ? นี่เป็นห้องเดียวของรีสอร์ตที่ยังสะอาดอยู่เหรอ...?"
10012020-108 = "[s13] \"โฮชิโนะเก็บกวาดให้เกือบหมดเลย\"\n[s14] \"ครูแค่ช่วยเหลือนิดหน่อยเอง\""
10012020-109 = "จะ... จริงเหรอ? ทำไมรุ่นพี่โฮชิโนะ... ถึงทำได้สะอาดขนาดนี้ล่ะ...?"
10012020-110 = "จะ... จริงเหรอ? ทำไมรุ่นพี่โฮชิโนะ... ถึงทำได้สะอาดขนาดนี้ล่ะ...?"
10012020-111 = "ฮึ่ม~ เซริกะจัง ขนาดทำหน้าตกใจยังน่ารักเลย~"
10012020-112 = "รุ่นพี่โฮชิโนะ..."
10012020-113 = "อะไรกัน.... ถ้าดีใจขนาดนั้นลุงก็เขินแย่น่ะสิ"
10012020-114 = "เป็นไงล่ะเซริกะจัง... มองลุงเป็นคนใหม่แล้วใช่ไหม?"
10012020-115 = "รุ่นพี่... นี่รุ่นพี่..."
10012020-116 = "ถ้าทำความสะอาดได้ดีขนาดนี้... ที่ผ่านมาทำไมห้องชมรมของเราถึงได้...?"
10012020-118 = "ที่ผ่านมา... ทำไมถึงไม่เก็บกวาดให้เป็นระเบียบล่ะ...?"
10012020-120 = "......? อ้าว?"
10012020-121 = "อ่า... เอ่อ..."
10012020-122 = "เดี๋ยวนะ... ครู... ครูคิดยังไงกับเรื่องนี้น่ะ~? ตอนนี้ลุงกำลังตกอยู่ในวิกฤตหรือเปล่า...?"
10012020-123 = "[s15] \"อาจจะโดนกรรมตามสนองอยู่...\"\n[s16] \"ครูไม่น่าจะช่วยอะไรได้นะแบบนี้\""
10012020-124 = "เย้ยยยย~ ครู...! นี่ครูหักหลังฉันเหรอ!? ตอนเก็บกวาดห้องเราอยู่ทีมเดียวกันไม่ใช่เหรอ??"
10012020-125 = "เย้ยยยย~ ครู...! นี่ครูหักหลังฉันเหรอ!? ตอนเก็บกวาดห้องเราอยู่ทีมเดียวกันไม่ใช่เหรอ??"
10012020-126 = "ทำไมถึงไปโทษคุณครูล่ะ!?"
10012020-127 = "มานี่เลย! เรื่องนี้ต้องคุยกับฉันให้มันจริงๆ จังๆ หน่อยแล้ว!!"
10012020-131 = "หืม...? เสียงเปิดประตูเหรอ?"
10012020-132 = "เอ๋... ใครมาน่ะ?"
10012020-133 = "น่าจะเป็นพวกรุ่นพี่นะ งั้นก็ดีเลย!"
10012020-134 = "ทุกคนฟังให้ดีนะ ที่จริงแล้วรุ่นพี่โฮชิโนะ...!?"
10012020-140 = "......? หืม? อะไรเนี่ย? มีคนอยู่เหรอ...!?"
10012020-141 = " อ๊ะ...!"
10012020-143 = "......? หืม?"
10012020-144 = "ตรงนี้ ตรงนี้! ตัวแสบพวกนั้นอยู่ตรงนี้!!"
10012020-145 = "ตรงนี้ค่ะหัวหน้า! หาตัวเจอแล้วค่ะ!!"
10012020-146 = "วะ... ว่าไงนะ!? ตัวแสบงั้นเหรอ? พูดอะไรของพวกเธอ? ตามหาพวกเรางั้นเหรอ...?"
10012020-148 = "อยู่ที่นี่จริงด้วยแฮะ นึกไม่ถึงเลยว่าจะหารีสอร์ตนี้เจอก่อนพวกเรา... ฝีมือไม่ธรรมดาเลยนะ"
10012020-149 = "ฮุฮุฮุ..."
10012020-150 = "บอกมาซะดีๆ พวกเธอก็เป็น <นักล่ารีสอร์ต> เหมือนกันใช่ไหม? ดูจากสายตานั่นแล้ว... ฉันว่าต้องใช่แน่ๆ"
10012020-151 = "......?"
10012020-152 = "ว่าไงนะ...?"
10012020-153 = "สายตาอะไร...?"
10012020-154 = "ยังจะมาทำเป็นไม่รู้เรื่องอีก หรือว่าไม่อยากเปิดเผยตัวตนกันแน่?"
10012020-155 = "แต่ก็ไม่เป็นไรหรอก เพราะถ้ามีคู่แข่ง..."
10012020-156 = "ก็แค่ต้องใช้กำลังขับไล่และยึดเอามาให้ได้... นี่แหละกฎของที่นี่"
10012020-157 = "ทุกคน!! หยิบอาวุธ!!"
10012020-159 = "เตรียมตัวต่อสู้!!"
10012020-160 = "สั่งสอนเด็กพวกนี้มันหน่อย!!"
10012020-168 = "......? หืม???"
10012020-169 = "อะ... อะไรเนี่ย!?  จะสั่งสอนอะไรของพวกแก!? โผล่มาจากไหนก็ไม่รู้ แล้วก็เอาปืนมาจ่อกันเฉยเลย?!"
10012020-174 = "ถึงจะไม่รู้ต้นเหตุ แต่ก็คงยากที่จะหลีกเลี่ยงการปะทะนะ"
10012020-175 = "ถ้างั้น... ก็ช่วยไม่ได้..."

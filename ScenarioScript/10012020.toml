[translation]
10012020-1 = "第2話;再合適一點的藉口"
10012020-5 = "……咦！？什，什麼聲音？"
10012020-6 = "聽起來像有東西墜落的聲音……直升機？飛機？"
10012020-7 = "……總之，不是自然的聲音呢。"
10012020-8 = "發出人為的聲音，就代表有人在哦。"
10012020-9 = "……良舞隊長！？"
10012020-11 = "唔呵呵……事情變有趣了呢。"
10012020-12 = "還以為是沒有任何人發現的地點……沒想到會有競爭對手。"
10012020-13 = "這次的「渡假勝地狩獵」……感覺會很有趣。"
10012020-14 = "接近我們嘩啦嘩啦頭盔團的目標的老鼠……"
10012020-15 = "如字面上的意思……"
10012020-16 = "就讓你們吃不完兜著走！"
10012020-18 = "嗚嗚……太大意了……"
10012020-19 = "稍微一分心竟然就不見了……"
10012020-20 = "[s1] 「……茜香？」\n[s2] 「你在找人嗎？」"
10012020-21 = "啊，老師！你來得正好。有看到星野前輩嗎？"
10012020-22 = "啊，老師！你來得正好。有看到星野前輩嗎？"
10012020-23 = "我們兩個想趁綾音醬和其他前輩們去直升機上拿東西的時候，#n稍微把這附近整理一下的……"
10012020-24 = "[s3] 「在玩捉迷藏嗎。」\n[s4] 「找到星野就行了吧，交給我！」"
10012020-25 = "為什麼你看起來有點開心啊……"
10012020-26 = "嗯。就拜託你了，老師。我還得繼續把這裡整理完。"
10012020-27 = "應該還沒走遠才對……說不定在這座建築裡的某個地方。"
10012020-28 = "啊！還有，要是找到前輩的話一定要聯絡我唷。"
10012020-29 = "不要因為星野前輩拜託就代替他整理哦！"
10012020-30 = "知道了嗎？找到星野前輩就聯絡我！約好了哦！！"
10012020-32 = "（那之後，為了找星野在建築物內繞了一圈）"
10012020-33 = "（因為已經有走過一遍，所以沒怎麼迷路）"
10012020-40 = "（……？）"
10012020-41 = "……哎呀，老師？你怎麼會來這裡呢？"
10012020-42 = "[s5] 「……星野？」\n[s6] 「正在找星野呢。」"
10012020-43 = "咦……在找大叔我嗎？"
10012020-44 = "找大叔有什麼事嗎？"
10012020-45 = "啊……我什麼都沒和茜香醬說呢，抱歉抱歉。"
10012020-46 = "唔嘿～大叔我只是在找打掃工具，找著找著就來到這裡了。"
10012020-47 = "只因為在看不到的地方，就被認為是在偷懶……大叔有點受傷呢。"
10012020-48 = "而且茜香醬那麼努力，大叔我會一個人在這邊偷懶嗎？"
10012020-49 = "平常的行為……？"
10012020-50 = "唔嘿……那部份就先說到這裡，之類的……吶？"
10012020-54 = "……嗯？"
10012020-55 = "啊啊，剛才在看的東西？"
10012020-56 = "……老師還是那麼敏銳呢。"
10012020-57 = "嘛，後輩們也不在這……而且是老師你，應該無所謂吧。"
10012020-58 = "有件事讓我有點在意呢。"
10012020-62 = "[ns7] 「是以前的祭典海報……呢。」\n[ns8] 「阿拜多斯也有過類似的東西呢。」"
10012020-63 = "……唔嘿。"
10012020-64 = "……唔嘿。"
10012020-65 = "[s] 「……星野。」"
10012020-66 = "……不要告訴大家唷。"
10012020-67 = "難得的休假，如果在意起多餘的事情的話，就不能好好享受了。"
10012020-68 = "都來到這裡了卻不能享受，這樣不是很可惜嗎。#n這種事只有大叔知道就行了。"
10012020-69 = "[s] 「……」"
10012020-70 = "……所以說，不要露出那種表情嘛。"
10012020-71 = "沒問題的……就儘管交給大叔吧。吶？"
10012020-72 = "[s9] 「……總之先一起整理吧。」\n[s10] 「機會難得，這裡也打掃一下吧。」"
10012020-73 = "唔嘿……"
10012020-74 = "唔嘿……"
10012020-75 = "雖然很高興，但也不需要特地做到這種程度呀。"
10012020-76 = "況且這裡是角落的房間，要整理的話就選茜香醬那邊吧。"
10012020-80 = "……………………"
10012020-81 = "唔唔……知道了啦老師。可以哦，一起整理吧。"
10012020-82 = "真是的～最讓大叔我困擾的就是被老師那樣盯著了～"
10012020-83 = "那就幫我拿打掃工具過來吧。我先開始整理。"
10012020-84 = "……不會逃跑的，不用擔心。"
10012020-85 = "[s] 去拿打掃工具過來"
10012020-90 = "（那之後，和星野一起打掃了周圍）"
10012020-92 = "（室內變得非常乾淨，就像是渡假勝地還在營運一樣）"
10012020-93 = "嘿……就算是這麼大的地方，兩個人也能打掃得這麼乾淨呢。"
10012020-94 = "老師也辛苦了。謝謝你幫忙唷～"
10012020-95 = "[s11] 「不用放在心上。這不是什麼大事。」\n[s12] 「星野很會打掃呢。」"
10012020-96 = "……總是這麼說的話，會一直想拜託你的唷？"
10012020-97 = "……總是這麼說的話，會一直想拜託你的唷？"
10012020-98 = "唔嘿……不過，總覺得心情變得很好。"
10012020-99 = "……嗯，是啊。"
10012020-100 = "和阿拜多斯不一樣，只要整理一下就……"
10012020-101 = "找到了！！原來在這裡啊，前輩！！"
10012020-102 = "……唔，嗯？"
10012020-103 = "趁人家不注意的時候跑來這種地方！"
10012020-104 = "你知道我一個人邊整理邊找你有多辛苦嗎……！前輩偶爾也……"
10012020-105 = "打掃……一下……呃。"
10012020-106 = "……咦？"
10012020-107 = "掃得這麼乾淨……？"
10012020-108 = "[s13] 「幾乎都是星野做的唷。」\n[s14] 「我只不過稍微幫了點忙。」"
10012020-109 = "真，真的嗎……？星野前輩他……？"
10012020-110 = "真，真的嗎……？星野前輩他……？"
10012020-111 = "哼哼哼。茜香醬驚訝的臉也很可愛呢～"
10012020-112 = "星野前輩……"
10012020-113 = "唔嘿嘿……你居然會這麼開心……有點害羞呢。"
10012020-114 = "怎麼樣，茜香醬……對大叔另眼相看了嗎？"
10012020-115 = "前輩……我還以為你不擅長打掃……"
10012020-116 = "竟然能做得這麼好的話……為什麼……"
10012020-118 = "為什麼……至今為止，都沒有認真做呢……？"
10012020-120 = "……咦？"
10012020-121 = "咦咦……"
10012020-122 = "等一下……老師……難道大叔我現在有危險了嗎……？"
10012020-123 = "[s15] 「……可能是是自作自受。」\n[s16] 「加油喔，星野。」"
10012020-124 = "咦咦！事到如今竟然要背叛大叔……！？"
10012020-125 = "咦咦！事到如今竟然要背叛大叔……！？"
10012020-126 = "這是你自作自受哦，星野前輩。"
10012020-127 = "稍微過來這邊聊一聊吧！"
10012020-131 = "……咦？"
10012020-132 = "……哎呀，誰來了嗎？"
10012020-133 = "是前輩們嗎。來得正好！"
10012020-134 = "大家聽我說，星野前輩他……"
10012020-140 = "咦？什麼，有人……！？"
10012020-141 = "……啊！"
10012020-143 = "……咦？"
10012020-144 = "在這裡！他們在這裡！！"
10012020-145 = "隊長，在這裡！找到他們了！！"
10012020-146 = "什，什麼！？怎麼回事！？"
10012020-148 = "沒想到比我們還更早找到這裡……"
10012020-149 = "……呵呵。"
10012020-150 = "……你們也是「渡假勝地獵人」吧？#n那個眼神……一看就知道了。"
10012020-151 = "……？"
10012020-152 = "……什麼？"
10012020-153 = "…………什麼眼神？"
10012020-154 = "怎麼，是深藏不露型的啊？"
10012020-155 = "嘛，無所謂。有競爭對手的話……"
10012020-156 = "……就用力量驅趕和奪取，這就是這個地方的規矩！"
10012020-157 = "大伙兒！！拿武器！！"
10012020-159 = "全員，準備戰鬥！！"
10012020-160 = "給他們一點教訓！！"
10012020-168 = "……咦？"
10012020-169 = "什，什麼！？這些傢伙是怎樣！？"
10012020-174 = "……雖然不知道發生什麼事，但看起來不是聊個幾句就能解決的呢～"
10012020-175 = "那麼……沒辦法了，首先……"
10012020-176 = "……嘿咻。"
10012020-177 = "拜託你囉，老師。"

[translation]
2300302-1 = "ภาพลักษณ์ของแฮ็กเกอร์"
2300302-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
2300302-3 = "คุณครูแวะที่ห้องชมรมเวอริทัสในระหว่างที่กลับมาจากจัดการธุระของสถาบันมิลเลเนียม#nที่ชมรมเซมิน่า"
2300302-4 = "หืม..."
2300302-9 = "อ่า มาแล้วสินะคุณครู"
2300302-10 = "อืม ฉันเพิ่งกลับมาจากไปดู <เอลิมิเนเตอร์ 4> ที่โรงหนังมา"
2300302-11 = "แต่ว่ามันมีบางอย่างที่..."
2300302-12 = "[s] \"ท่าทางแบบนั้นหมายความว่ายังไง? หนังไม่สนุกเหรอ?\""
2300302-13 = "ไม่ใช่ว่าหนังไม่สนุกหรอก ใช้คำว่ามันมีส่วนที่ฉันไม่ชอบมากกว่า"
2300302-14 = "ตัวหนังก็โอเค สเปเชียลเอฟเฟกต์ก็ดูน่าตื่นเต้น ตัวละครก็โดดเด่น และคนดูก็สนุกไปกับหนัง"
2300302-15 = "อืม มันก็โอเคเกือบทั้งหมด ยกเว้นแต่..."
2300302-16 = "วิธีการแสดงภาพลักษณ์ของแฮ็กเกอร์ในหนังนั้นแย่เกินบรรยายเลย!"
2300302-17 = "[s] \"มันมีปัญหาตรงไหนเหรอ?\""
2300302-18 = "เกือบจะทุกตรงเลย! แต่ถ้าจะให้ชี้ออกมาเป็นจุดๆ ล่ะก็... เริ่มด้วยคอสตูมดีไซน์ก็แล้วกัน"
2300302-19 = "แฮ็กเกอร์อย่างเราชอบใส่เสื้อสบายๆ ก็จริง แต่เสื้อฮู้ดตัวโคร่งๆ ที่แฮ็กเกอร์ใส่ในหนัง#nนั่นมันอะไรกัน? ทำเหมือนกับว่าแฮ็กเกอร์ทุกคนเป็นเนิร์ดคอมพิวเตอร์ที่แต่งตัวไม่เป็นเลย"
2300302-20 = "อีกอย่าง ฉากแฮ็กในหนังนั้นก็ดูไม่ถูกต้อง"
2300302-21 = "มันไม่สมเหตุสมผลเลยที่ระบบความปลอดภัยขององค์กรใหญ่ที่มีโปรแกรมป้องกันทุกรูปแบบ#n\nจะถูกเจาะระบบได้ง่ายๆ ในครั้งเดียวด้วยแฮ็กเกอร์แค่คนเดียว ขนาดแฮ็กเกอร์ที่เก่งที่สุดก็ยังมี#nข้อจำกัดเลย"
2300302-22 = "นอกจากนี้ ใครจะไปทิ้งรูปหัวกะโหลก ASCII ไว้หลังจากแฮ็กกันล่ะ? มันดูเชยมากเลยนะ"
2300302-23 = "ไม่อยากเชื่อเลยว่าหนังในจักรวาลของ <เอลิมิเนเตอร์> ชื่อดังจะทำเรื่องผิดพลาด#nไม่สมกับเป็นมืออาชีพแบบนี้"
2300302-24 = "[s] \"...มันสำคัญขนาดนั้นเลยเหรอ?\""
2300302-25 = "นี่เป็นปัญหาใหญ่มาก มันเกี่ยวกับความเป็นอยู่ของ <เวอริทัส> เลยนะ"
2300302-26 = "หนังดังที่แสดงภาพลักษณ์ของแฮ็กเกอร์ได้ไม่ตรงความจริงแบบนี้ เป็นเหตุผลที่ทำให้#nภาพลักษณ์ของแฮ็กเกอร์หมวกขาวอย่างเราตกต่ำลง"
2300302-27 = "เราไม่ได้แฮ็กเพราะโกรธแค้นหรือเรื่องผลประโยชน์ส่วนตัว สมาชิกเวอริทัสทุกคนต้องการที่#nจะค้นหาความจริงและอิสรภาพเท่านั้น"
2300302-28 = "แต่พวกเขาถ่ายทอดแฮ็กเกอร์ออกมาได้เหมือนกับให้เด็กฝึกงานเขียนสคริปต์ให้ คงเพราะว่า#nแสดงในหนังได้ง่ายกว่า ยกโทษให้ไม่ได้...!"
2300302-29 = "[s] \"ครูตามไม่ทันแล้ว...\""
2300302-31 = "ช่างมันเถอะ ฉันควรส่งคำเตือนตรงๆ ไปให้กับบริษัทที่ผลิต <เอลิมิเนเตอร์> แล้ว"
2300302-32 = "หือ? ฉันไม่ได้จะติดต่อกับบริษัทโปรดักชั่นตรงๆ หรอก ง่ายๆ เลยก็แค่แฮ็กเข้าไปในเซิร์ฟเวอร์#nของพวกเขา"
2300302-33 = "ฉันจะใช้โอกาสนี้แสดงให้พวกเขารู้ว่าแฮ็กเกอร์ในชีวิตจริงต่างยังไงกับในหนังของพวกเขา"
2300302-34 = "เอาล่ะ แอดเดรสของโฮมเพจของพวกเขาคือ..."
2300302-37 = "ตามที่คิดไว้เลย มันถูกป้องกันด้วยโปรแกรมความปลอดภัยอย่างแน่นหนา แต่อย่าคิดว่าจะ#nหยุดฉันได้"
2300302-41 = "...เจาะเข้าไปได้แล้ว จะเปลี่ยนอะไรก่อนดีนะ?"
2300302-42 = "เริ่มจากลดคะแนนรีวิวหนังให้เหลือแค่ 1 ดาว แล้วล็อกไม่ให้พวกเขาแก้ไขอะไรเพิ่มได้..."
2300302-45 = "แก้ข้อความใหม่ทั้งหมดเพื่อเตือนเกี่ยวกับการแสดงภาพลักษณ์ของแฮ็กเกอร์ที่ไม่ตรงกับความจริง..."
2300302-48 = "แล้วค่อยใส่โลโก้เวอริทัสเวอร์ชั่น ASCII เข้าไปเป็นอย่างสุดท้าย... เรียบร้อย"
2300302-49 = "[s] \".....\""
2300302-50 = "หืม? เป็นอะไรไปน่ะคุณครู?"
2300302-51 = "...คิดว่าที่ฉันทำอยู่ตอนนี้มันไม่ได้ต่างกับสิ่งที่แฮ็กเกอร์ทำให้หนังอย่างนั้นเหรอ?"
2300302-52 = "พูดอะไรน่ะ ฉันไม่ได้แฮ็กเพื่อประโยชน์ส่วนตัว หรือใช้ภาพสไตล์ ASCII เหมือนในหนังหรอก..."
2300302-54 = "...อาจจะใช่ก็ได้แต่ว่า"
2300302-55 = "ฉันขอย้ำอีกครั้งนะว่าไม่ใช่แฮ็กเกอร์ทุกคนจะทำแบบนี้!"
2300302-57 = "หลังจากนั้นคุณครูก็พยายามโน้มน้าวให้ฮาเระทำให้โฮมเพจที่เธอแฮ็กกลับมาเป็นเหมือนเดิม"

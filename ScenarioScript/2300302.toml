[translation]
2300302-1 = "#title;해커의 이미지"
2300302-2 = "#place;베리타스 해커 휴게실"
2300302-3 = "#na;<세미나>에서 밀레니엄 학원과 관련된 서무를 처리하고 오는 길에 베리타스의 부실에 들렸다."
2300302-4 = "3;하레;99;으으음…….\n#3;a"
2300302-5 = "3;하레;99\n#3;m2\n#wait;1000"
2300302-6 = "3;하레;99\n#3;m3\n#wait;1000"
2300302-7 = "3;하레;99\n#3;m4\n#wait;1500"
2300302-8 = "3;하레;02\n#3;em;[반응]\n#wait;1500"
2300302-9 = "3;하레;01;아, 선생님. 왔구나.\n#3;m3"
2300302-10 = "3;하레;01;응. 방금 영화관에 가서 <엘리미네이터 4>를 보고 돌아오는 길이야.\n#3;greeting"
2300302-11 = "3;하레;04;그런데 그게…… 좀…….\n#3;em;…\n#3;stiff"
2300302-12 = "[s] \"표정이 왜 그래? 영화가 별로였어?\""
2300302-13 = "3;하레;04;영화가 재미가 없었다고 해야 하나, 마음에 안 드는 부분이 있었다고 해야 하나."
2300302-14 = "3;하레;01;영화 자체는 그럭저럭 재미있었어. #n특수효과도 화려했고, 캐릭터도 개성 있었고, 관객평도 나쁘지 않았으니까.\n#3;greeting"
2300302-15 = "3;하레;04;그래…… 다 좋았는데…….\n#3;stiff"
2300302-16 = "3;하레;05;영화에 나오는 해커의 묘사가 너무 형편없었어!\n#3;em;[!]\n#3;jump"
2300302-17 = "[s] \"어떤 점이 문제였는데?\""
2300302-18 = "3;하레;05;대부분 문제였지만, 그 중에도 한 가지를 꼽으라면…… 우선, 패션."
2300302-19 = "3;하레;06;아무리 해커들이 편한 옷을 좋아한다고는 하지만, 작중의 해커가 입고 나온 그 후줄근한 후드는 뭐람? 마치 해커들은 컴퓨터만 잡고 살아서 옷을 고르는 법도 모른다는 것처럼 보이잖아.\n#3;stiff\n#3;em;[속상함]"
2300302-20 = "3;하레;05;게다가 작중에서 묘사된 해킹 장면도 너무 작위적이었어."
2300302-21 = "3;하레;04;온갖 보안 프로그램으로 무장한 대기업의 보안 시스템이 일개 해커의 공작 한 번으로 뚫린다는 게 말이나 돼? 아무리 해커가 천재라도 한계가 있지, 말도 안 돼.\n#3;em;[땀]"
2300302-22 = "3;하레;05;게다가 해킹에 성공하자 마자 상대방의 컴퓨터 화면에 아스키 아트로 해골을 띄우는 연출은 또 어떻고? 정말 유치하다니까."
2300302-23 = "3;하레;04;<엘리미네이터> 시리즈처럼 유명한 영화에서 이런 초보적인 실수를 하다니, 믿을 수가 없네.\n#3;em;[땀]"
2300302-24 = "[s] \"……그게 그렇게 심각한 문제야?\""
2300302-25 = "3;하레;05;심각한 문제이고 말고. 이건 우리 <베리타스>의 존속과도 관련된 문제니까.\n#3;em;[반응]"
2300302-26 = "3;하레;99;대중 영화에서부터 이렇게 편견에 가득 찬 시선으로 해커를 묘사하니, 우리 같은 화이트 해커들의 이미지도 덩달아 나빠지는 거야.\n#3;em;…"
2300302-27 = "3;하레;02;우리는 사적인 원한이나 욕망 때문에 해킹을 시도하지 않아. 베리타스가 추구하는 건 진리와 자유 뿐이라고."
2300302-28 = "3;하레;05;그런데 영화에 써먹기 좋다는 이유 하나만으로 우리 해커들을 삼류 스크립트 키디처럼 묘사하다니. 용납할 수 없어……!\n#3;em;[빠직]\n#3;stiff"
2300302-29 = "[s] \"무슨 소리를 하는지 전혀 모르겠네…….\""
2300302-30 = "3;하레;99\n#3;em;…\n#wait;2000"
2300302-31 = "3;하레;05;……역시 안 되겠어. #n이 건에 대해서는 <엘리미네이터>의 제작사에게 엄중히 경고를 해 두는 편이 좋겠어.\n#3;em;[반응]"
2300302-32 = "3;하레;02;응? 제작사에게 따로 연락할 방법이 있냐고? #n그야 간단하지. 영화사의 서버를 해킹 하면 되잖아."
2300302-33 = "3;하레;05;이 참에 영화 속의 해커와 진짜 해커가 어떻게 다른 지 똑똑히 보여주는 거야."
2300302-34 = "3;하레;01;어디 보자. 제작사의 홈페이지 주소가…….\n#3;m4"
2300302-35 = "3;하레;01\n#3;greeting\n#wait;1000"
2300302-36 = "3;하레;01\n#3;greeting\n#wait;1000"
2300302-37 = "3;하레;05;역시 강력한 보안 프로그램이 설치되어 있네. #n하지만 이 정도의 보안으로는 어림도 없지."
2300302-38 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-39 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-40 = "#wait;1500"
2300302-41 = "3;하레;03;……됐다. 그럼 어디부터 수정해볼까?\n#3;em;[반응]"
2300302-42 = "3;하레;05;우선 영화의 평점을 모두 1점으로 내려놓은 다음, 수정을 하지 못하게 권한을 탈취하고……."
2300302-43 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-44 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-45 = "3;하레;05;스크립트 속에 <해커를 무시하지 마라>는 텍스트를 가득 채워 넣은 다음…….\n#3;em;…"
2300302-46 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-47 = "3;하레;05\n#3;greeting\n#wait;1000"
2300302-48 = "3;하레;03;그 위에 아스키 아트로 만든 베리타스의 로고를 띄워 놓으면…… 완벽해.\n#3;em;[반짝]"
2300302-49 = "[s] \"………….\""
2300302-50 = "3;하레;02;응? 선생님, 무슨 문제라도 있어?\n#3;em;[반응]"
2300302-51 = "3;하레;02;……내가 하는 행동도 영화 속의 해커와 크게 다르지 않아 보인다고?\n#3;stiff"
2300302-52 = "3;하레;05;그게 무슨 소리야. 나는 영화와는 다르게 사적인 목적의 해킹도, 아스키 아트도…….\n#3;em;[!]\n#3;jump"
2300302-53 = "3;하레;05\n#3;em;…\n#wait;2000"
2300302-54 = "3;하레;04;……하긴 했지만.\n#3;em;[땀]\n#3;stiff"
2300302-55 = "3;하레;05;다시 한 번 강조하지만 모든 해커가 이러는 건 아니니까!\n#3;hophop\n#3;m3"
2300302-56 = "#all;hide"
2300302-57 = "#na;이후, 하레를 설득해 장난을 친 홈페이지는 원상복구 시켜 놓았다."

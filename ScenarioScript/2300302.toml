[translation]
2300302-1 = "駭客的形象"
2300302-2 = "貝里塔斯．駭客休息室"
2300302-3 = "（在「研討會」處理好千年科學學園的事務，回程時順道去了貝里塔斯的社辦）"
2300302-4 = "呃呃呃……"
2300302-9 = "啊，老師。你來了啊。"
2300302-10 = "嗯，我剛去電影院看了《魔鬼殲滅者4》，正好剛回來。"
2300302-11 = "但感覺有點……"
2300302-12 = "[s]「看你的表情……難道電影不好看嗎？」"
2300302-13 = "不是不好看，只是有一些在意的地方。"
2300302-14 = "電影本身還算有趣。#n視覺效果很華麗，角色個性也很鮮明，觀眾的評價也不差。"
2300302-15 = "嗯……這些部分都很不錯……"
2300302-16 = "只是電影關於駭客的那些描寫實在讓人不以為然！"
2300302-17 = "[s]「問題出在哪裡？」"
2300302-18 = "幾乎都是問題，不過我最在意的……是穿著。"
2300302-19 = "雖說駭客都喜歡穿舒適的衣服，但電影中那種又舊又鬆的帽T是怎麼回事？搞得好像駭客只知道整天抱著電腦，完全不會挑衣服。"
2300302-20 = "而且，電影中駭客犯案的場面也太假了。"
2300302-21 = "被各種防火牆保護的大企業電腦系統，怎麼可能光靠一個駭客一次就能突破？就算那個駭客再天才也是有極限的，現實中根本不可能。"
2300302-22 = "甚至，駭客一成功駭入，對方電腦畫面還立刻出現骷髏圖案的ASCII文字圖，這又是怎樣？幼稚也該有個限度。"
2300302-23 = "像《魔鬼殲滅者4》這麼知名的系列電影，竟然用這種充滿偏見的描寫手法，真是讓人無法置信。"
2300302-24 = "[s]「……那是那麼嚴重的問題嗎？」"
2300302-25 = "當然很嚴重。這也關乎到我們「貝里塔斯」的形象，當然非常有關係。"
2300302-26 = "如果這些知名電影，都用這樣帶有偏見的角度來描述駭客，我們白帽駭客的形象將很有可能跟著變差。"
2300302-27 = "我們不會為了私人恩怨或欲望而進行駭客行為。貝里塔斯追求的只有真理與自由。"
2300302-28 = "然而，怎麼可以因為簡單易懂又輕鬆，就把我們駭客描寫成那種三流的腳本屁孩。我不能接受……！"
2300302-29 = "[s]「那個……我完全不懂你在說什麼……」"
2300302-31 = "……果然不能這麼算了。#n關於這次的電影，我還是要向《魔鬼殲滅者4》的製作公司鄭重提出抗議。"
2300302-32 = "嗯？你問我有沒有片商的聯絡方式？#n這簡單，只要駭入片商的伺服器不就行了？"
2300302-33 = "也能趁機讓他們見識一下，電影中的駭客和現實中的駭客有多大的差距。"
2300302-34 = "我看看。片商的官網網址是……"
2300302-37 = "果然設有強大的防火牆呢。#n不過這種程度不成問題。"
2300302-41 = "……行了。那麼，要從哪裡開始修改呢？"
2300302-42 = "首先，把電影的評分全部降到1分，然後奪走權限讓他們無法更改……"
2300302-45 = "在程式中嵌入滿滿的「不要小看駭客」字串……"
2300302-48 = "最後押上貝里塔斯標誌的ASCII文字圖……這樣就完美了。"
2300302-49 = "[s]「…………」"
2300302-50 = "嗯？老師，有什麼問題嗎？"
2300302-51 = "……你說我做的事，跟電影裡的駭客沒有兩樣？"
2300302-52 = "才不一樣，我沒有像電影演的那樣，因為私人目的而駭入程式或用ASCII文字圖……"
2300302-54 = "……好啦，我有放圖。"
2300302-55 = "但我要再強調一次，不是所有的駭客都是這樣的！"
2300302-57 = "（之後，說服晴復原了被惡搞的官網）"

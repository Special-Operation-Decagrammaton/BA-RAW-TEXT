[translation]
102190-1 = "ตอนที่ 19;ปฏิบัติการป้องกันเขตปกครองตนเอง - เขตชิราโทริ D.U."
102190-5 = "ต่อไปคือหอคอยแห่งที่ 6... แต่เรายังไม่พบ <ผู้พิทักษ์> ของที่นี่เลยค่ะ"
102190-6 = "แต่ดูจากพลังงานที่ตรวจพบได้แล้ว... <ผู้พิทักษ์> คนนี้น่าจะอันตรายกว่าผู้พิทักษ์ทุกคนรวมกันอีกค่ะ"
102190-7 = "ถ้าเรารีบโจมตีหอคอยเกินไป ก็อาจคาดเดาไม่ได้เลยว่าจะเกิดอะไรขึ้น... ก่อนอื่นเพิ่มการคุ้มกันรอบๆ D.U. และเฝ้าระวังเพิ่มให้หน่อยนะคะ"
102190-8 = "ระหว่างนี้ฉันจะหาวิธีป้องกันภัยคุกคามจากหอคอยแห่งที่ 6 ให้ค่ะ"
102190-9 = "วิธี? มันจะมีอะไรแบบนั้นด้วยเหรอหัวหน้า?"
102190-10 = "มีสิคะ เอมิ ตอนนี้ฉันก็กำลังรวบรวมข้อมูลอยู่นะคะ ถามอย่างนี้ แสดงว่าไม่รู้ละสิคะว่าฉันเป็นใคร?"
102190-11 = "อืม... ทางระบายน้ำเสีย..."
102190-12 = "แค่เริ่มก็ผิดแล้วค่ะ ถ้าเริ่มด้วยคำแบบนั้น ยังไงก็ไม่ได้คำตอบที่ถูกต้องหรอกค่ะ เดี๋ยวนี้แกล้งฉันบ่อย#nนะคะ ตั้งใจใช่ไหมคะ?"
102190-13 = "......"
102190-19 = "ดีละ! ตรวจสอบเสร็จสิ้น! เรื่องนั้นให้เป็นหน้าที่ของพวกฉันเถอะ!"
102190-20 = "ใช่ค่ะ พวกฉันจะช่วยในปฏิบัติการป้องกันเขตชิราโทริใน D.U. เองค่ะ"
102190-22 = "ถึงมันจะรบกวนเวลาไปอควาเรียมก็เถอะ★"
102190-23 = "อื้ม! ไปจัดการให้ไวเลย!"
102190-24 = "ทั้งสองคนจากชมรมชั้นเรียนเสริมก็ไปด้วยกันสิคะ"
102190-26 = "คะ... คะ?!  พะ... พวกฉันด้วยเหรอคะ?!"
102190-27 = "อื้ม รบกวนด้วยนะ ชมรมชิมอาหาร"
102190-29 = "โอ๊ะ~ ไม่ได้เจอกันมานานแค่ไหนแล้วคะเนี่ย"
102190-30 = "เอาละๆ! ไปกันเลย!"
102190-39 = "เส้นทางแห่งชีวิตที่ไม่สิ้นสุดนี้จะพาไปสู่อนาคตของความยุติธรรมในที่สุด!"
102190-43 = "ขบวนการซูชิจุใจ ไคเทนเจอร์ ปรากฏตัว!!!"
102190-44 = "ฮ่าฮ่าฮ่า! ยามเมื่อโลกมาถึงจุดวิกฤต แล้วพวกเราจะไม่ยื่นมือเข้ามาช่วยได้อย่างไรกัน!"
102190-45 = "ใช่! ถึงเวลาที่ไคเทนเจอร์แห่งความยุติธรรมจะได้ปรากฏตัวอย่างเฉิดฉาย!!"
102190-46 = "ว่าแต่ นี่มันเหมือนวิกฤตของจริงเลยนะ? เราจะไหวกันเหรอ?"
102190-47 = "เรด! งานวันนี้มีเบี้ยเลี้ยงพิเศษให้ด้วยนะคะ ฉันเตือนไว้ เผื่อจะลืมน่ะค่ะ"
102190-48 = "วะฮ่าฮ่า! ถ้าอย่างนั้นก็ไม่มีเหตุผลที่ต้องปฏิเสธสินะ!"
102190-49 = "ไปกันเลย!!  ขบวนการซูจิจุใจ ไคเทนเจอร์ ออกโจมตี!!"
102190-55 = "เอ๊ะ เอ๋...? เมื่อกี้เหมือนเห็นคนแปลกๆ นะ... !"
102190-56 = "ใช่!! ฉันก็เห็นเหมือนกัน!! เห็นซูชิด้วยละ!"
102190-57 = "ว่าไงนะ? ซูชิเหรอ? ที่ไหนๆ?"
102190-58 = "ซูชิ... ช่วงนี้ไม่ได้หากินได้ง่ายๆ นะ คราวก่อนฉันจะสั่งมากิน แต่ร้านก็บอกว่าดอกเบี้ยไตรมาสนี้สูง ก็เลยมาส่งให้ไม่ได้..."
102190-59 = "พูดอะไรน่ะ? ซูชิกับดอกเบี้ยมันเกี่ยวอะไรกัน!?"
102190-61 = "ฮุฮุฮุ... ดีเลยค่ะ บรรยากาศเริ่มคุกรุ่นขึ้นมาแล้ว มาเพิ่มความสนุกสนานกันอีกหน่อยดีไหมคะ"
102190-62 = "ไปกันเลยค่ะ!"

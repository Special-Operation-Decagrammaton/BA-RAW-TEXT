[translation]
10014015-2 = "Stop, Kyoyama Kazusa! Why are you running away?!"
10014015-3 = "For the millionth time, just leave me alone!!!"
10014015-20 = "*pant* *pant*"
10014015-21 = "*pant* I'm sweating..."
10014015-22 = "Did we get away? The coast seems clear."
10014015-23 = "I can't do this anymore... This is already the third time today."
10014015-24 = "I'm sorry, Sensei. Are you good? That was a lot of running."
10014015-25 = "Okay, nice. I'd feel really bad if you got hurt helping me."
10014015-26 = "Hm?"
10014015-27 = "Oh... It's honestly not that hard to get away from her."
10014015-28 = "She's really bad at climbing, so I just lead her to a dead end and jump over it."
10014015-32 = "...Why're you looking at me like that?"
10014015-33 = "[s1] \"You can jump over walls?\"\n[s2] \"You make it sound really easy...\""
10014015-34 = "...Oh."
10014015-35 = "...Oh."
10014015-36 = "W-Well...! About that...!"
10014015-37 = "There is...a reason. Any chance we can leave it at that?"
10014015-41 = "*sigh*"
10014015-42 = "Okay, fine. You agreed to help, so you deserve to hear the details."
10014015-43 = "I'm not hiding it from you or anything... It's just something I don't like to talk about."
10014015-44 = "But I guess you kinda need to know the whole story."
10014015-45 = "Geez... Where do I even start?"
10014015-46 = "...Sensei, you know the thugs around this area?"
10014015-47 = "I'm sure you've run into them. They're...bad students."
10014015-48 = "They always wear masks, modified their school uniforms by lengthening the skirts, wrap themselves in bandages..."
10014015-49 = "I'm sure you've encountered them once or twice."
10014015-50 = "The little details don't matter. The point is..."
10014015-51 = "Reisa, that fool you just saw, has been fighting those thugs since she was in middle school."
10014015-52 = "She was a self-proclaimed \"Apostle of Justice\" or something dumb like that."
10014015-53 = "And now, she's still doing it under the name of the \"Vigilante Crew\"... She hasn't changed a bit."
10014015-54 = "Ugh! I seriously hate drama. And the stupid idiots who cause it!"
10014015-58 = "Sorry, I'm getting off-topic. Look at this."
10014015-63 = "[ns3] \"A photo? Isn't that...?\"\n[ns4] \"...Is this a photo of the thugs?\""
10014015-64 = "To be clear, I don't hold onto this because of the memories or anything. I just thought you should see it."
10014015-65 = "To be clear, I don't hold onto this because of the memories or anything. I just thought you should see it."
10014015-66 = "I thought...you might not believe me if I just told you."
10014015-67 = "Hm?"
10014015-68 = "Yes... You're correct. You get it now, yeah?"
10014015-69 = "That's..."
10014015-70 = "...me."
10014015-71 = "I mean, that's me when I was in middle school."
10014015-72 = "I..."
10014015-73 = "............"
10014015-78 = "...was a thug."

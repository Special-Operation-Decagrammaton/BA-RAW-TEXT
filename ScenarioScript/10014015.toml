[translation]
10014015-2 = "หยุดเดี๋ยวนี้นะคะ เคียวยามะ คาซึสะ!! ทำไมต้องหนีด้วยล่ะคะ!!!"
10014015-3 = "ย้าาาา ไปเลยนะ บอกว่าไม่ต้องตามมาไงเล่า!!"
10014015-20 = "แฮ่ก... แฮ่ก..."
10014015-21 = "เฮ้อ... เหนื่อยชะมัด..."
10014015-22 = "หนีมาขนาดนี้คงไม่เป็นไรแล้วมั้ง...? ไม่เห็นอุซาวะตามมาแล้วด้วย..."
10014015-23 = "เหนื่อยจะตายอยู่แล้ว... ให้ตายสิ... แค่วันนี้ก็สามรอบแล้วนะ..."
10014015-24 = "ขอโทษนะคุณครู... ต้องมาเจอเรื่องวุ่นวายจนได้ ฉันตั้งใจว่าจะออกมาให้ห่างจากคุณครูก่อนแท้ๆ..."
10014015-25 = "อ่า ไม่เป็นไรงั้นเหรอ? แบบนั้นก็ดีแล้วละนะ..."
10014015-26 = "หืม...?"
10014015-27 = "ว่าแต่ทำไมถึงได้ทิ้งระยะห่างมาได้ไกลขนาดนี้น่ะเหรอ? อืมม... ก็ไม่มีอะไรมากหรอก"
10014015-28 = "ก็แค่ยัยนั่นปีนกำแพงช้าน่ะ ขอแค่วิ่งเข้าไปหลบในซอยแล้วก็กระโดดข้ามกำแพงหนีไปก็พอแล้ว"
10014015-32 = "...? อะไรกัน ทำไมทำหน้าแบบนั้นล่ะ?"
10014015-33 = "[s1] \"คาซึสะกระโดดกำแพงได้ด้วยงั้นเหรอ?\"\n[s2] \"พูดอย่างกับเป็นเรื่องง่ายเลยนะนั่น?\""
10014015-34 = "อา..."
10014015-35 = "อา..."
10014015-36 = "แย่ละสิ... คะ... คือว่าเรื่องนั้นก็..."
10014015-37 = "จะว่าฉันมีเหตุผลที่ต้องทำแบบนั้น หรือจะบอกว่ามีเรื่องให้ต้องฝึกเยอะดีนะ... เอาเป็นว่ามันก็ประมาณนั้นน่ะ..."
10014015-41 = "เฮ้อ..."
10014015-42 = "เข้าใจแล้วละ คงจะเสียมารยาทถ้ามาขอร้องให้คุณครูช่วยแต่ไม่ยอมอธิบายเรื่องราวให้ฟัง ต้องขอโทษด้วยจริงๆ"
10014015-43 = "ที่จริงฉันก็ไม่อยากเที่ยวไปพูดถึงเรื่องนี้หรอก ก็มันไม่ใช่เรื่องดีๆ ที่น่าพูดถึงนี่นา..."
10014015-44 = "แต่ว่า... ก็นั่นแหละ ถ้าไม่เล่าให้ละเอียดๆ ก็คงจะรับคำปรึกษาเรื่องนี้ได้ไม่เต็มที่สินะ"
10014015-45 = "อืม... จะเริ่มจากตรงไหนก่อนดี"
10014015-46 = "คุณครูรู้จัก <แยงกี้สาว> มั้ย...?"
10014015-47 = "พูดง่ายๆ ก็คือเป็นพวกนักเรียนเกเรน่ะ ในกลุ่มพวกนั้นก็จะมีพวกเด็กที่แค่มองก็รู้เลยว่าเกเรอยู่ใช่มั้ยล่ะ"
10014015-48 = "แบบว่า... พวกที่สวมอะไรปิดหน้าปิดตาตลอดเวลา ตัดแต่งชุดนักเรียนตามใจชอบ ใส่กระโปรงสั้นๆ แล้วก็มีผ้าพันแผลพันที่หน้าอกน่ะ..."
10014015-49 = "เอาเถอะ เป็นถึงคุณครูเลยนี่นา อาจจะรู้จักอยู่แล้วก็ได้..."
10014015-50 = "เอาเป็นว่าฉันจะไม่เล่ารายละเอียดที่ไม่จำเป็นก็แล้วกัน แต่ที่พูดถึงเรื่องนี้ขึ้นมาก็เพราะว่า..."
10014015-51 = "เมื่อก่อนยัยเด็กที่ชื่ออุซาวะน่ะ เป็นคนหัวร้อนมาตั้งแต่สมัยมัธยมต้น แค่ได้ยินคำว่าแยงกี้สาวก็พุ่งเข้าใส่แบบไม่สนอะไรเลย"
10014015-52 = "จนได้ฉายาว่า 'ผู้พิทักษ์ความยุติธรรม' มาน่ะ..."
10014015-53 = "ถึงจะอยู่ใน 'กลุ่มรักษาความสงบ' แล้วแต่ก็เหมือนว่ายัยนั่นจะยังทำเรื่องแบบเดิมอยู่อีก... ไม่เปลี่ยนไปจากเดิมเลยสักนิดเดียว"
10014015-54 = "เฮ้อ... เชื่อเขาเลย เพราะแบบนี้ฉันถึงไม่ชอบพวกที่พูดมากแล้วก็เสียงดังน่ะ"
10014015-58 = "...อ่า โทษที เกือบออกนอกเรื่องอีกแล้ว ที่พูดมาทั้งหมดก็เป็นเพราะเรื่องนี้แหละ"
10014015-63 = "[ns3] \"รูปนี้คือ...\"\n[ns4] \"เอ๊ะ... แยงกี้สาวเหรอ?\""
10014015-64 = "ไม่ได้หยิบขึ้นมาเพราะชอบรูปนี้หรอกนะ แค่คิดว่าต้องเอามาให้คุณครูดูน่ะ"
10014015-65 = "ไม่ได้หยิบขึ้นมาเพราะชอบรูปนี้หรอกนะ แค่คิดว่าต้องเอามาให้คุณครูดูน่ะ"
10014015-66 = "ฉันเอามาเผื่อไว้ เผื่อว่าคุณครูจะไม่เชื่อเรื่องที่ฉันพูดหรือคิดว่าฉันแค่ล้อเล่นขึ้นมา"
10014015-67 = "หืม...?"
10014015-68 = "อื้อ ใช่แล้ว พอได้เห็นรูปก็เข้าใจแล้วใช่มั้ย? นี่แหละคือสาเหตุ"
10014015-69 = "นั่นน่ะ..."
10014015-70 = "...คือฉันเอง"
10014015-71 = "ไม่สิ ถ้าจะให้ถูกก็คือไม่ใช่ฉันในตอนนี้หรอก แต่เป็นฉันสมัยม.ต้นต่างหาก"
10014015-72 = "...ฉันน่ะ..."
10014015-73 = "........."
10014015-78 = "...เคยเป็น 'แยงกี้สาว' มาก่อน"

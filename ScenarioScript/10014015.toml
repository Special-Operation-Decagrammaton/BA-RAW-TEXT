10014015-21 = "5;카즈사;10;하아…… 땀 나…….\n#5;m3\n#5;em;[땀]"
10014015-22 = "5;카즈사;10;이쯤이면 됐겠지……? 우자와 녀석도 이젠 안 보이고……."
10014015-23 = "5;카즈사;12;힘들어 죽겠다……. 진짜……. 오늘만 벌써 세 번째야…….\n#5;em;[속상함]\n#5;stiff"
10014015-24 = "5;카즈사;01;미안, 선생님……. 혹시 휘말리진 않았어? 일단 바로 선생님한테서 멀어지긴 했는데……."
10014015-25 = "5;카즈사;02;아아. 괜찮다고? 그럼 다행이지만……."
10014015-26 = "5;카즈사;01;……응?\n#5;em;[?]"
10014015-27 = "5;카즈사;02;그나저나 어떻게 이렇게 빨리 따돌리고 온 거냐고? 음……. 뭐, 별 건 아닌데."
10014015-28 = "5;카즈사;03;저 녀석, 벽 넘는 건 느리니까 말이야. 대충 막다른 골목으로 유도한 뒤 벽을 뛰어넘어 도망치면 돼.\n#5;em;[재잘]"

[translation]
10014015-2 = "停下來！杏山千紗！！#n為什麼要逃走啊！！"
10014015-3 = "啊啊真是的！走開！走開啦！！"
10014015-20 = "哈啊，哈啊，哈啊……"
10014015-21 = "累死我了……"
10014015-22 = "已經可以了吧……？甩掉他了吧……"
10014015-23 = "真是有夠煩人……這已經是今天的第三次了……"
10014015-24 = "雖然馬上遠離了老師……沒有被捲進來吧？#n還好嗎？"
10014015-25 = "嗯，那就好……"
10014015-26 = "……嗯？"
10014015-27 = "啊啊。那傢伙翻牆很慢的，所以我就稍微誘導了一下。"
10014015-28 = "所以才能這麼快就回來……"
10014015-32 = "……？#n怎麼露出這種表情。"
10014015-33 = "[s1] 「千紗會翻牆嗎？」\n[s2] 「聽你說得好像很簡單呢……？」"
10014015-34 = "……啊。"
10014015-35 = "……啊。"
10014015-36 = "啊……那個……"
10014015-37 = "嘛……因為某些原因有機會練習。#n請就當作是這樣吧。"
10014015-41 = "……唉。"
10014015-42 = "是呢……畢竟是我這邊需要幫助，不好好說明的話也不公平吧。#n不好意思。"
10014015-43 = "那個，雖然不是很想說出來……"
10014015-44 = "不過……為了說明情況這也是必須的吧。#n沒辦法了。"
10014015-45 = "唔嗯……話是這麼說，該從哪說起好呢。"
10014015-46 = "……老師，你知道「太妹」嗎？"
10014015-47 = "雖然說都是不良學生。#n但在那之中也有特別好辨認的人對吧。"
10014015-48 = "戴著口罩、裙子很長還會穿著束胸……的那種。"
10014015-49 = "我想老師應該知道吧……"
10014015-50 = "那麼……至於為什麼會說到太妹呢。"
10014015-51 = "剛才那位宇沢，從國中的時候開始就是個只要一聽到有很強的太妹，#n就會像那樣衝過去的熱血笨蛋。"
10014015-52 = "好像自稱是「正義的使者」……的樣子？"
10014015-53 = "現在似乎也在「三一自衛隊」裡做著一樣的事……"
10014015-54 = "真是的……所以我才討厭那種熱血又煩人的笨蛋。"
10014015-58 = "……啊，抱歉。話題扯遠了。#n接下來才是重點。"
10014015-63 = "[ns3] 「這張照片是……？」\n[ns4] 「……太妹？」"
10014015-64 = "我可不是喜歡才一直帶在身上的。#n──只是覺得需要讓老師看才行。"
10014015-65 = "我可不是喜歡才一直帶在身上的。#n──只是覺得需要讓老師看才行。"
10014015-66 = "雖然我覺得老師會相信我，不過保險起見還是帶著。"
10014015-67 = "……咦？"
10014015-68 = "……嗯，沒錯唷。"
10014015-69 = "那個人……"
10014015-70 = "…………是我沒錯。"
10014015-71 = "嘛，準確來說不是現在的我而是國中時期的我就是了。"
10014015-72 = "……我。"
10014015-73 = "…………"
10014015-78 = "──曾經是個「太妹」。"

10014015-42 = "5;카즈사;01;알았어. 상담을 부탁한 주제에 제대로 설명도 안 해주는 건 예의가 아니겠지. 죄송합니다."
10014015-43 = "5;카즈사;02;사실 웬만하면 떠벌리고 다니지 않고 싶었거든. 뭐 딱히 좋은 일도 아니고 해서……."
10014015-44 = "5;카즈사;01;그렇지만……. 그러네. 그걸 말하지 않고선 이 상황에 대한 상담도 제대로 받을 수 없겠지.\n#5;em;[땀]"
10014015-45 = "5;카즈사;99;음……. 어디서부터 말해야 하나."
10014015-46 = "5;카즈사;02;……선생님. <스케반>이라고 알아?\n#5;em;[반응]"
10014015-47 = "5;카즈사;02;뭐, 간단하게 말하자면 불량 학생인데, 그 중에서도 좀 딱 보면 느낌이 오는 애들 있잖아."
10014015-48 = "5;카즈사;01;그, 왜……. 항상 마스크 쓰고, 교복 마음대로 개조해서 치마 길이 늘이고, 가슴팍에 붕대 같은 걸 두르고…….\n#5;em;[땀]"
10014015-49 = "5;카즈사;99;뭐, 선생님이니까 어쩌면 이미 알고 있을 수도 있겠지만……."
10014015-50 = "5;카즈사;04;아무튼 자세한 이야기는 사족이니 패스하고, 그래서 왜 이 이야기를 하냐면…….\n#5;em;…"
10014015-51 = "5;카즈사;02;조금 전의 그 우자와라는 녀석, 중학생 때부터 강한 스케반이라고만 하면 앞뒤 안 가리고 달려드는 열혈 바보였거든."
10014015-52 = "5;카즈사;01;자칭 '정의의 사도'……라는 거지.\n#5;em;[속상함]"
10014015-53 = "5;카즈사;04;보니까 지금도 '자경단'이니 뭐니 하면서 비슷한 짓을 계속하고 있던 것 같은데……. 달라진 게 하나도 없달까."
10014015-54 = "5;카즈사;11;후……. 정말이지, 이래서 말 많고 시끄러운 녀석들은 싫다니까.\n#5;stiff"

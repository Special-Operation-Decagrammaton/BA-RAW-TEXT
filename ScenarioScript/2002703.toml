[translation]
2002703-1 = "ปรับความเร็วการวิ่ง"
2002703-3 = "(คุณครูกับชิโรโกะที่ดูตื่นเต้นเป็นพิเศษออกไปเที่ยวชมทะเล เนินเขา ป่า และหลายๆ ที่ด้วยกัน)"
2002703-9 = "อืม ทางนี้ก็ดูสวยจัง..."
2002703-13 = "ต่อไป... ไปทางนั้นกันเถอะคุณครู"
2002703-24 = "(...ทั้งสองคนใช้เวลาเดินไปยังที่ต่างๆ ด้วยกันอยู่หลายชั่วโมง)"
2002703-30 = "(...แน่นอนว่าคนที่ต้องวิ่งตามความเร็วในการวิ่งของชิโรโกะให้ทันอย่างคุณครู ก็เป็นฝ่ายหมดแรง#nจนล้มตึงไปก่อน)"
2002703-31 = "คุณครู...!?"
2002703-32 = "คุณครูเป็นอะไรรึเปล่า? เป็นอะไรน่ะ? เจ็บตรงไหนรึเปล่า...?"
2002703-33 = "ไปโดนหญ้าพิษมารึไง...? หรือโดนแมลงมีพิษกัด...? หรือว่าไปโดนอะไรที่ชายหาดเมื่อกี้..."
2002703-34 = "...หืม? ไม่ใช่แบบนั้นเหรอ?"
2002703-35 = "คุณครูไม่ได้เจ็บตรงไหนเหรอ? แล้วเป็นอะไรล่ะ...?"
2002703-36 = "[s1] \"นั่งพักสักหน่อยก็ดีขึ้นแล้วละ\"\n[s2] \"แค่หักโหมไปหน่อยน่ะ ไม่ต้องกังวลหรอก\""
2002703-42 = "อ่า..."
2002703-43 = "ขอโทษนะคุณครู..."
2002703-44 = "พอมาคิดดูแล้ว พวกเราก็รีบร้อนวิ่งไปมาหลายที่เกินไปจริงๆ..."
2002703-45 = "ฉันไม่ได้คิดที่จะทำให้คุณครูลำบากเลย..."
2002703-46 = "แต่ดูเหมือนฉันจะตื่นเต้นเกินไปจริงๆ นั่นแหละ"
2002703-47 = "แถมยังไม่ได้สังเกตเลยว่าคุณครูกำลังลำบาก..."
2002703-48 = "...ฉันผิดเอง"
2002703-49 = "......"
2002703-50 = "[s3] \"ไม่เป็นไรหรอก แค่นั่งพักหน่อยก็หายแล้วละ\"\n[s4] \"ไม่ต้องคิดมากนะ ครูก็สนุกเหมือนกัน\""
2002703-53 = "...อืม"
2002703-54 = "ถ้างั้นมานั่งพักกันก่อนดีกว่า แถมตรงนี้แดดไม่ค่อยร้อน และลมพัดเย็นสบายดีด้วย..."
2002703-55 = "เหมาะกับเป็นสถานที่นั่งพักมากเลย"
2002703-56 = "[s5] \"ชิโรโกะล่ะ? ไม่เหนื่อยเหรอ?\"\n[s6] \"ชิโรโกะไม่นั่งพักหน่อยเหรอ?\""
2002703-59 = "แค่นี้สบายมาก วิ่งหนักกว่านี้สองเท่าก็เคยมาแล้ว"
2002703-60 = "แต่ว่า..."
2002703-67 = "ถึงที่นี่จะดูไม่มีอันตรายอะไร แต่ถ้าพักงีบสองคนพร้อมกันเลย มันค่อนข้างน่ากังวลน่ะ ฉันจะอยู่เฝ้าให้#nก่อนแล้วกัน"
2002703-68 = "คุณครู... ไม่ต้องห่วงฉันหรอก ตอนนี้พักงีบให้หายเหนื่อยก่อนเถอะ"
2002703-69 = "ถ้าคุณครูทำแบบนั้น ฉัน... ก็จะสบายใจขึ้นน่ะ"
2002703-70 = "ก็อย่างนั้นแหละ"
2002703-71 = "เพราะงั้น..."
2002703-78 = "ฝันดีนะ คุณครู"
2002703-87 = "(พอหลับตาลง คุณครูก็ผล็อยหลับไปทันที)"
2002703-88 = "(หลังได้พักงีบหลายชั่วโมง ก็รู้สึกว่าร่างกายคลายความเมื่อยล้าไปมาก)"
2002703-91 = "(...พอลืมตาขึ้นมา คุณครูก็พบว่าตัวเองโดนพามาอยู่ที่ริมชายหาดแทนแล้ว)"
2002703-97 = "[ns7] \"หืม...? ทะเล?\"\n[ns8] \"ก่อนที่จะหลับไป เราอยู่ตรงนี้งั้นเหรอ?\""
2002703-100 = "อ่า..."
2002703-101 = "ตื่นแล้วเหรอคุณครู"
2002703-105 = "เห็นคุณครูหลับสนิท ฉันเลยอุ้มมาทั้งๆ ที่หลับอยู่น่ะ"
2002703-106 = "พอดูรอบๆ แล้วคิดว่าเราอยู่ในป่าลึกเกินไป ฉันเลยกังวลว่ามันอาจมีพวกแมลงมีพิษอยู่น่ะ"
2002703-107 = "ตอนนี้เป็นยังไงบ้าง...? ถ้ายังเหนื่อยอยู่จะนอนต่อก็ได้นะ"
2002703-108 = "หืม...? ฉันเหรอ...?"
2002703-109 = "ดูเหมือนฉันยังมีอีกหลายที่ที่อยากไปอยู่เลยงั้นเหรอ?"
2002703-110 = "...ไม่หรอก ไม่เป็นไร"
2002703-111 = "ฉันก็แค่อยากจะทำเรื่องที่ทำได้แค่ตอนอยู่ที่นี่ก็เท่านั้นเองน่ะ"
2002703-112 = "ทั้งเรื่องที่... จะได้อยู่ข้างๆ คุณครูแบบนี้ด้วย..."
2002703-113 = "......"
2002703-114 = "...อืม"
2002703-115 = "ฉันคิดว่ามันเป็นเรื่องที่ทำได้แค่ตอนอยู่ที่เกาะนี้เท่านั้น เพราะงั้นเลยรู้สึกว่ามันสนุกมากเลยละ"
2002703-116 = "เพราะงั้นคุณครูเองก็ไม่ต้องฝืนตัวเองจนเกินไปหรอก"
2002703-117 = "ฉันไม่อยากให้มีแค่ตัวเอง... ที่สนุกอยู่คนเดียวน่ะ"
2002703-118 = "หลังจากนี้... ฉันจะทำอะไรให้ช้าลงนะ"
2002703-119 = "...เรามาค่อยๆ เดินไปด้วยกันในความเร็วที่คุณครูไหวกันเถอะ"
2002703-120 = "ถ้าทำแบบนั้น เราก็คงจะสนุกไปด้วยกันได้"
2002703-121 = "...อืม ตอนนี้ก็เย็นแล้ว งั้นวันนี้พอแค่นี้แล้วกัน"
2002703-122 = "กลับกันเถอะคุณครู"
2002703-123 = "แต่ถ้ายังเหนื่อยละก็... ให้ฉันอุ้มกลับไปมั้ย?"
2002703-130 = "[ns9] รีบลุกขึ้นอย่างว่องไว\n[ns10] \"ไม่เป็นไร ครูโอเคแล้ว ไม่ต้องห่วงนะ\""
2002703-134 = "......"
2002703-135 = "...อืม"

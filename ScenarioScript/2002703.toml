[translation]
2002703-1 = "調整節奏"
2002703-3 = "（今天的白子，看起來從早上就很興奮）"
2002703-9 = "嗯。"
2002703-13 = "老師，那邊也要。"
2002703-24 = "（配合白子的節奏，在海邊、山丘、森林等等島上的各個地方漫步了數小時後……）"
2002703-30 = "（……因為體力透支倒下了）"
2002703-31 = "老師……！？"
2002703-32 = "怎麼了，你沒事吧？"
2002703-33 = "起疹子了？#n是被蟲……不，難不成是在海邊──"
2002703-34 = "──嗯？不是？"
2002703-35 = "那個，不然是……"
2002703-36 = "[s1]「只要休息一下就沒事了。」\n[s2]「可能是走太久了，體力有點……」"
2002703-42 = "……啊。"
2002703-43 = "抱歉，老師……"
2002703-44 = "從早上開始就沒有休息呢。"
2002703-45 = "我不是有意這麼做的……"
2002703-46 = "自己一個人……玩得很興奮。"
2002703-47 = "就連老師已經累了都沒注意到……"
2002703-48 = "……對不起。"
2002703-49 = "…………"
2002703-50 = "[s3]「我馬上就會復活的……沒關係。」\n[s4]「我也玩得很投入很開心，不用在意哦。」"
2002703-53 = "……嗯。"
2002703-54 = "稍微躺一下可能會好一點。#n正好這裡不熱，風也很涼爽。"
2002703-55 = "很適合休息，所以……"
2002703-56 = "[s5]「白子不會累嗎？」\n[s6]「你也一直走個不停吧？」"
2002703-59 = "沒問題的，就算再走一遍也很輕鬆。"
2002703-60 = "而且……"
2002703-67 = "兩個人都睡著就毫無防備了……我還是醒著吧。"
2002703-68 = "不用擔心我，老師好好休息吧。"
2002703-69 = "老師能恢復元氣的話……我的心情也會舒服一點。"
2002703-70 = "所以……"
2002703-71 = "嗯。"
2002703-78 = "晚安，老師。"
2002703-87 = "（感受著白子的視線，進入了夢鄉）"
2002703-88 = "（睡了一覺後，身體的疲勞一掃而空）"
2002703-91 = "（……睜開眼睛後，映入眼簾的是被夕陽染紅的大海）"
2002703-97 = "[ns7]「……咦，是海？」\n[ns8]「我是在這裡睡著的嗎……？」"
2002703-100 = "……啊。"
2002703-101 = "早啊，老師。"
2002703-105 = "你睡得很熟，我就把你背來這裡了。"
2002703-106 = "畢竟森林裡的蟲子很多。"
2002703-107 = "身體怎麼樣……？#n要繼續睡也可以哦。"
2002703-108 = "……嗯？我？"
2002703-109 = "其他還想去的地方……？"
2002703-110 = "……不，沒關係。"
2002703-111 = "我只是想做一些，在渡假村沒辦法做的事而已。"
2002703-112 = "不過，像這樣跟老師一起度過的時間……"
2002703-113 = "…………"
2002703-114 = "……嗯。"
2002703-115 = "……也很開心。"
2002703-116 = "但是，我不希望老師逞強。#n只有我自己開心……"
2002703-117 = "……我認為是不對的。"
2002703-118 = "之後……希望能兩人一起悠閒地度過。"
2002703-119 = "……所以，就按照老師的節奏前進吧。"
2002703-120 = "這樣的話，大家才能一起開心。"
2002703-121 = "……嗯。時間很晚了，今天就到此為止吧。"
2002703-122 = "回去吧，老師。"
2002703-123 = "如果你還累的話……要不要像過來的時候一樣，帶你回去？"
2002703-130 = "[ns9] 拍拍灰塵並起身\n[ns10]「不，我完全恢復了。別擔心。」"
2002703-134 = "…………"
2002703-135 = "……嗯。"

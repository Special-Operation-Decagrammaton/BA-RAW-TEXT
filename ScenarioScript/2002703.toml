[translation]
2002703-1 = "Pace Control"
2002703-3 = "On a particularly nice day, Shiroko and I wandered the beach, hills, and forests. She was more excited than usual..."
2002703-9 = "Oh. This side is good, too."
2002703-13 = "That way next, Sensei."
2002703-24 = "...We passed hours like that."
2002703-30 = "I did my best to keep up with Shiroko's pace, but eventually I collapsed from exhaustion."
2002703-31 = "Sensei...?!"
2002703-32 = "Are you okay? What's wrong? Are you hurt?"
2002703-33 = "Did you eat a poisonous plant? Did an insect sting you? Maybe something happened at the beach..."
2002703-34 = "Huh? It's not that?"
2002703-35 = "You're not hurt? Then..."
2002703-36 = "[s1] \"I just need to take a break.\"\n[s2] \"I'm not a young teacher anymore, and this is quite a hike!\""
2002703-42 = "...Oh."
2002703-43 = "I'm sorry, Sensei..."
2002703-44 = "We were rushing too much. I wanted to see everything before the day was over."
2002703-45 = "I didn't mean...to make it so hard on you..."
2002703-46 = "I get a little carried away sometimes, Sensei. I was just so excited..."
2002703-47 = "I didn't even notice you struggling..."
2002703-48 = "It's all my fault..."
2002703-49 = "..."
2002703-50 = "[s3] \"I'll be fine after a short rest.\"\n[s4] \"Don't sweat it. I was having fun, too!\""
2002703-53 = "Okay..."
2002703-54 = "We can take a break here. It's not too hot. And there's a cool breeze..."
2002703-55 = "A perfect place...for you to rest."
2002703-56 = "[s5] \"Surely you're feeling tired, too.\"\n[s6] \"Don't you need a break?\""
2002703-59 = "I'm fine. No problem. I could cover twice as much ground if I needed to."
2002703-60 = "But..."
2002703-67 = "I don't see any danger near. But I'm nervous if we both fall asleep...so I'll stay awake."
2002703-68 = "Don't worry about me, Sensei. Close your eyes. Get some rest."
2002703-69 = "I can relax...after I'm sure you're okay."
2002703-70 = "Yes. That's it."
2002703-71 = "So..."
2002703-78 = "Goodnight, Sensei."
2002703-87 = "I closed my eyes, and in an instant, my fatigue washed over me. I was out like a light."
2002703-88 = "I don't know how long I was out, but when I came to, I felt as if the exhaustion had been swept away."
2002703-91 = "I opened my eyes to the sight of the sun setting over the beach."
2002703-97 = "[ns7] \"Uh... The beach?\"\n[ns8] \"I could've sworn I fell asleep somewhere else...\""
2002703-100 = "...Oh."
2002703-101 = "You're awake."
2002703-105 = "You were in a deep sleep. So I brought you here."
2002703-106 = "I was thinking. You were sleeping in an unfamiliar forest. Maybe there were poisonous insects... I was worried."
2002703-107 = "How are you feeling? You can sleep more if you want."
2002703-108 = "Oh, me?"
2002703-109 = "Don't I want to explore more?"
2002703-110 = "No... It's okay."
2002703-111 = "The exploring wasn't...the point. But when I was exploring, I could do something special."
2002703-112 = "Like staying by your side...for the whole day..."
2002703-113 = "..."
2002703-114 = "Yes..."
2002703-115 = "I can't do that anywhere else. That's what I was enjoying."
2002703-116 = "So don't strain yourself, Sensei. I don't want to be the only one having a good time..."
2002703-117 = "Then it isn't fun anymore."
2002703-118 = "From now on...I'll slow down."
2002703-119 = "You can set the pace, Sensei."
2002703-120 = "That way, it's more enjoyable for both of us."
2002703-121 = "It's getting late..."
2002703-122 = "Let's head back, Sensei."
2002703-123 = "If you want... I can carry you back, just like how I brought you here."
2002703-130 = "[ns9] Brush yourself off and stand up.\n[ns10] \"I'm much better now, but thank you.\""
2002703-134 = "..."
2002703-135 = "Okay..."

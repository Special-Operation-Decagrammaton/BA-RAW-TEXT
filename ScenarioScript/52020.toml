[translation]
52020-1 = "第2話;新的怪談"
52020-8 = "……茶湯的蒸氣直上啊。"
52020-9 = "闊別多時，久未問候……是否有喜訊隨佳客而來？"
52020-14 = "許久未能向您請安，小女深感抱歉，雛罌粟大人。"
52020-18 = "……真是好久不見了啊。"
52020-19 = "呵呵，由於閉門創作新故事，遲遲沒能向您問安。"
52020-20 = "是嗎……你的故事完成得如何？#n是否已醞釀得深邃濃郁，光聽便能奪人心魄？"
52020-21 = "百聞不如一見。#n與其書寫需反覆咀嚼才能浮現意象的文字，繪出能一眼震撼視覺的畫作才更加有效。"
52020-22 = "……我早已深知你具備怪藝師的才能。"
52020-23 = "但是不要忘了──#n真正的風情無須眼見耳聞，而是如春日的草木一般自然綻放於人心。"
52020-27 = "……小女謹記在心。"
52020-28 = "話說先前雛罌粟大人給予的「種子」……#n如今已紮下根來恣意伸展枝葉，即將綻放出花朵了。"
52020-29 = "哦，時間竟過得如此之快啊。"
52020-30 = "是的。若能將那即將盛開的美麗花朵收錄於我的《稻亭物怪錄》，#n想必能夠成為讓世間燃起壯麗火焰……此般傳聞的基石吧。"
52020-31 = "有勞你了。#n距離完成我們的百物語，前往彼岸之日已不遠矣。"
52020-35 = "若有朝一日能抵達黃昏寺院舉辦宴會，必不會忘記為你預留最靠近的位置。"
52020-36 = "小女不勝榮幸，雛罌粟大人。"
52020-39 = "……話說棕櫚人在何處？"
52020-40 = "自上次祭典結束後，已許久不見其蹤影……我擔心他因憤懣而鬱結成疾。"
52020-41 = "您無須擔心，雛罌粟大人。#n棕櫚他一切安好。"
52020-42 = "現在他也正拚盡全力，為實現雛罌粟大人的夙願而奮鬥著呢。"
52020-43 = "包括棕櫚在內，花鳥風月部的所有人都正致力於完成新的百物語。#n雛罌粟大人所盼望的風雅，想必已指日可待。"
52020-44 = "很好。大家如此積極，我甚感欣慰。"
52020-45 = "見到棕櫚之時，請代我傳達鼓勵之詞。"
52020-46 = "是，謹遵大人吩咐。"
52020-55 = "名草──"
52020-56 = "名草醬──！"
52020-63 = "我好不容易才完成的故事，都被那個蠢女人給毀了！"
52020-64 = "如果按照原計畫進行，失去百蓮繼承者的百花繚亂應該只能無力逃竄……"
52020-65 = "反覆咀嚼自身的無力、上演絕望哀號的悲劇才對！"
52020-66 = "……究竟是從哪裡出了差錯？"
52020-67 = "是夏萊的老師胡亂詭辯的時候嗎？#n還是無貌形代的裂痕出現的時候？"
52020-68 = "可惡……都是那個蠢女人害的！#n就是那個完全不懂風雅的蠢女人毀掉了結局！"
52020-69 = "甚至連雛罌粟大人給我的[ruby=稻生物怪錄]珍貴怪書[/ruby]也弄丟了……"
52020-70 = "啊啊啊──#n我絕對不會原諒你的，名草醬──！！"
52020-75 = "原來你在這裡發洩啊，棕櫚醬。"
52020-76 = "雖然我不打算干涉你出氣的方式……#n不過要是你再繼續揮下去，這座祠堂恐怕就要被你給拆了呢。"
52020-80 = "……怎樣，你也是來取笑我的是不是？"
52020-81 = "怎麼會呢。#n我只是因為擔心，所以特地來看看你而已。"
52020-82 = "……順便幫雛罌粟大人帶個口信。"
52020-86 = "……雛罌粟大人？雛罌粟大人有事找我嗎？"
52020-87 = "雛罌粟大人需要我嗎？"
52020-88 = "經歷失敗之後，你的臉皮反倒變厚了呢，棕櫚醬。"
52020-89 = "明明犯下了那麼大的錯，還以為雛罌粟大人會把你放在眼裡嗎？"
52020-90 = "唔……！"
52020-91 = "你上次的失敗辜負了雛罌粟大人的信任。#n現在他已經開始懷疑你的能力了。"
52020-92 = "如果不能盡快創造出新的怪談……下次被拋入黃昏的人就是你。"
52020-97 = "這，這怎麼可能。#n雛罌粟大人一直都說會相信我的。"
52020-98 = "之前他也說過不必在意失敗──"
52020-99 = "不只毀掉了珍貴的怪書，甚至還狼狽地逃竄……#n如果連這都不在意的話，你的存在又有什麼價值呢？"
52020-100 = "不……也許他已經失望到你做什麼都無所謂了吧。"
52020-105 = "那種事……我絕對不要！"
52020-106 = "我該怎麼辦？#n要怎麼做才能重新獲得雛罌粟大人的信任？"
52020-107 = "不用擔心。#n我這不是來幫你了嗎？"
52020-111 = "棕櫚，我就給你一次將功折罪的機會吧。"
52020-118 = "這是……《稻亭物怪錄》？"
52020-119 = "沒錯。就是花鳥風月部僅存的最後一本怪書。"
52020-120 = "我們花鳥風月部，原先一共持有三本怪書。"
52020-123 = "二十年前，雛罌粟大人在大雪原遺失了一本。"
52020-124 = "你在百鬼夜行逃跑時毀掉了一本。"
52020-125 = "而我一直保管著的最後一本……就是這本《稻亭物怪錄》。"
52020-126 = "你的《稻生物怪錄》能將人類的欲望具現化，#n而這《稻亭物怪錄》則是能將人類的恐懼化為現實。"
52020-127 = "怎麼樣，棕櫚？"
52020-128 = "這次我就將這本[ruby=稻亭物怪錄]珍貴怪書[/ruby]的力量借給你。"
52020-136 = "用這本怪書喚起人們的恐懼，並以幻魎百物語將他們逼入絕境……"
52020-137 = "想對百花繚亂復仇也不是夢吧？"
52020-142 = "這樣的話……我也能做到。"
52020-143 = "只要有了怪書，我就能再次編寫出怪談。"
52020-147 = "用怪談讓他們體會永生難忘的強烈[ruby=百物語]惡夢[/ruby]！"
52020-148 = "很好，棕櫚醬。"
52020-152 = "這樣我們想必能夠完成吧。"
52020-154 = "你的百物語……以及我的百物語。"
52020-156 = "下一話;新的祭典"

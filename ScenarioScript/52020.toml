[translation]
52020-1 = "Episode 2;A New Ghost Story"
52020-8 = "...A good brew takes time."
52020-9 = "This silence has grown stale. Is that a little snake I hear slithering outside my walls?"
52020-14 = "You look exquisite as always, Miss Kokuriko."
52020-18 = "And you've been...quite absent."
52020-19 = "Well, I'm afraid I've been occupied. You see, my lady, I've been engrossed in composing a new story."
52020-20 = "Ah...how far along are you? Will this story build? Will it simmer and creep into the hearts of all who read it?"
52020-21 = "I'm aiming for something slightly...more impactful. While mere words require imagination and attention, I find that a well-crafted image instantly captures the mind."
52020-22 = "Ah, yes. I understand that you fancy yourself as quite the artist."
52020-23 = "But remember, truly elegant beauty blooms naturally at its own pace. Like the seasons, it cannot be forced."
52020-27 = "Indeed..."
52020-28 = "Speaking of that, I've heard that the flower you've planted is nearly ready to bloom."
52020-29 = "Is she? My, how time flies!"
52020-30 = "Lovely. I can hardly wait to press those elegant petals in the pages of Toutei's Phantom Illustrations. Now THAT would make a story for the ages."
52020-31 = "Well done. Soon, we shall finish our stories, and at last...find our home."
52020-35 = "And when we feast at the Twilight Temple, my dear, I will ensure you are seated at my side."
52020-36 = "I'd be honored, Miss Kokuriko."
52020-39 = "I know. But on to more practical matters: where is Shuro?"
52020-40 = "She disappeared after that fiery festival... I'm worried she's sulking somewhere."
52020-41 = "Worry not, Miss Kokuriko. Shuro is perfectly healthy...for her."
52020-42 = "She is still working tirelessly to grant your wish."
52020-43 = "As we all are. Nature's Beauty is committed to finishing the new Hundred Ghost Stories. Soon, the burning elegance you wished for will be complete."
52020-44 = "It's so pleasant having a diligent workforce."
52020-45 = "When you next see little Shuro, give her my best."
52020-46 = "As you wish."
52020-55 = "Nagusaa—"
52020-56 = "Nagusaaaaaa—"
52020-63 = "That useless, inspirational idiot ruined my story! It was perfect!"
52020-64 = "She was supposed to fall to pieces. And there'd be no Hyakkaryouran with no stupid Hundred Lotus and no hope against my beautiful, elegant, perfectly fired-up Katashiro!"
52020-65 = "It should have been a tragedy for the ages! It should have left them broken and drowning in their hopelessness!"
52020-66 = "...Where did the story go wrong?"
52020-67 = "Maybe it was that drippy Sensei with their power of friendship drivel? That's what cracked my creation. Ugh!"
52020-68 = "Grr... This is all that stupid girl's fault! She didn't understand elegance or narrative momentum, and the ending was ruined! Wasted!"
52020-69 = "And then, THEN, I lost the precious tome Miss Kokuriko gave me..."
52020-70 = "Ugh! I hate you, Nagusaaa—! You hear me?!"
52020-75 = "Monologuing again, dear Shuey?"
52020-76 = "I understand we all have our own ways of...coping, but if you keep swinging around like that, you'll destroy this shrine."
52020-80 = "...What? You want to tease me, too? You want to spit your venom?"
52020-81 = "Not at all. I'm merely here because I'm...casually concerned."
52020-82 = "...And to relay Miss Kokuriko's message."
52020-86 = "...Miss Kokuriko? She...she asked about me?"
52020-87 = "Miss Kokuriko wants me? NEEDS me?"
52020-88 = "I see failure hasn't humbled you, Shuey."
52020-89 = "To think Miss Kokuriko would still want you after such a failure. Tsk."
52020-90 = "Ugh...!"
52020-91 = "She's rightfully lost faith in you. She doubts your already limited abilities."
52020-92 = "She said that if you don't create a new ghost story soon, you're off to the spirit realm. At least you'll be quiet there."
52020-97 = "Th-That won't happen. Nuh-uh. Miss Kokuriko always has my back!"
52020-98 = "Even after last time, she said not to worry about—"
52020-99 = "If you're unburdened by worry even after marring a precious tome and fleeing...then I fear there is no hope for you."
52020-100 = "Or...perhaps Miss Kokuriko is so disappointed in your behavior that she no longer cares what you do."
52020-105 = "No... Anything but that!"
52020-106 = "What should I do? How can I regain her trust?"
52020-107 = "Fret not. I've come to help."
52020-111 = "Shuro, here's your second chance."
52020-118 = "This is...Toutei's Phantom Illustrations?"
52020-119 = "Yes. This is Nature's Beauty's last remaining tome. Lovely, isn't it?"
52020-120 = "Originally, Nature's Beauty possessed a trio."
52020-123 = "Miss Kokuriko lost one in the Great Snowfield 20 years ago."
52020-124 = "You, lest we forget, damaged one while flailing away from Hyakkiyako."
52020-125 = "And the Phantom Illustrations...is the last one. I've kept it safe for a very long time."
52020-126 = "While your Inou's Phantom Records focused on shaping mortal desire into reality, Toutei's Phantom Illustrations are more direct. They arouse fear."
52020-127 = "So how about it, Shuro?"
52020-128 = "If you're up to it, I'll be sweet and lend you my precious tome."
52020-136 = "Imagine the terror you can evoke. The Phantom Fables you can bring to life..."
52020-137 = "...the newly-revived council you can destroy...provided you don't botch it like last time."
52020-142 = "Yes. I can do all that..."
52020-143 = "As long as I have the tome, I can make ghost stories."
52020-147 = "I will craft an unforgettable nightmare of infinite horror!"
52020-148 = "That's the spirit, Shuey."
52020-152 = "Everything shall be complete."
52020-154 = "Your ghost story...as well as mine."
52020-156 = "Next Episode;A New Festival"

[translation]
52020-1 = "ตอนที่ 2;เรื่องลึกลับใหม่"
52020-8 = "ก้านชาตั้งตรงสินะ..."
52020-9 = "นี่ก็นานแล้วที่ไม่เกิดเหตุการณ์อะไรและข้าก็ไม่ได้รับรู้ข่าวสารอะไรเลย วันนี้จะมีใครมาเยี่ยมพร้อมกับ#nข่าวดีงั้นหรือ?"
52020-14 = "เด็กสาวผู้โง่เขลาอย่างฉันมาหาท่านโคคุริโกะแล้วค่ะ"
52020-18 = "ไม่ได้เจอกันนานเชียวนะ..."
52020-19 = "ฮุฮุ ฉันมาทักทายช้าไปหน่อยเพราะมัวแต่อยู่ในบ้านและเขียนเรื่องราวใหม่น่ะค่ะ"
52020-20 = "เช่นนั้นหรือ แล้วเรื่องราวของเจ้าสมบูรณ์ไปแค่ไหนแล้วเล่า? มันลึกซึ้งสุกงอมขนาดที่แค่ได้ฟังก็#nขโมยหัวใจได้หรือเปล่า?"
52020-21 = "ได้ฟังร้อยครั้งก็ไม่เท่าได้อ่านเพียงครั้งเดียวหรอกค่ะ ถ้าเทียบกับบทความที่ต้องคิดไตร่ตรองนานๆ ถึงจะเข้าใจความรู้สึกแล้ว ภาพวาดหนึ่งใบที่แค่ได้เห็นก็ให้ความรู้สึกท่วมท้นย่อมดีกว่าอยู่แล้วค่ะ"
52020-22 = "เช่นนั้นสินะ ข้าเข้าใจพรสวรรค์ของเจ้าในฐานะนักเล่าเรื่องพรั่นพรึงแล้วละ"
52020-23 = "แต่ถึงอย่างไรเจ้าก็ต้องจำไว้ว่าความสง่างามที่แท้จริงเป็นสิ่งที่ผลิบานตามธรรมชาติในใจของมนุษย์ เช่นเดียวกับพืชผลที่เติบโตบนภูเขาไร่นาในฤดูใบไม้ผลิ แม้จะไม่มีผู้ใดได้ยลโฉมก็ตาม"
52020-27 = "ฉันจะจำให้ขึ้นใจค่ะ..."
52020-28 = "จะว่าไป 'เมล็ดพันธุ์' ที่ท่านโคคุริโกะให้ฉันไว้ครั้งก่อน ตอนนี้มันหยั่งรากและแตกกิ่งก้านอย่างสันโดษ และพร้อมที่จะผลิดอกในเร็วๆ นี้แล้วค่ะ"
52020-29 = "โอ้ เวลาผ่านไปขนาดนั้นแล้วเชียวหรือ?"
52020-30 = "ค่ะ ถ้าฉันเก็บดอกไม้ที่บานสะพรั่งไว้ใน <โทเท บุคไค โรคุ> ที่ฉันมีได้ มันจะเป็นพื้นฐานของข่าวลือ#nที่จะจุดประกายให้โลกสวยงามได้อย่างแน่นอนค่ะ"
52020-31 = "เจ้าคงเหนื่อยแย่เลยนะ อีกไม่นานก็จะถึงวันที่ตำนานร้อยเรื่องราวจะสมบูรณ์ และพวกเราจะได้มุ่งหน้า#nไปยังอีกฝั่งของนิพพานกันแล้ว"
52020-35 = "หากข้าได้ไปถึงวิหารอัสดงแล้วจัดงานเลี้ยง ข้าจะเตรียมที่นั่งใกล้ๆ ไว้ให้เจ้าเลย"
52020-36 = "เป็นเกียรติอย่างยิ่งเลยค่ะ ท่านโคคุริโกะ"
52020-39 = "ว่าแต่ชูโระล่ะอยู่ที่ไหน...?"
52020-40 = "หลังจากจบงานเทศกาลครั้งก่อนข้าก็ไม่เห็นชูโระเลย... ข้าห่วงว่าชูโระจะกำลังโกรธเป็นฟืนเป็นไฟ#nจนไข้จับเอาน่ะสิ"
52020-41 = "ไม่ต้องกังวลหรอกค่ะท่านโคคุริโกะ ชูโระยังอยู่ดีและยังมีสุขภาพแข็งแรงค่ะ"
52020-42 = "ชูโระยังทำงานอย่างถวายหัวเพื่อเติมเต็มความปรารถนาของท่านโคคุริโกะอยู่ค่ะ"
52020-43 = "ตอนนี้ทั้งชูโระและทุกๆ คนในชมรมความงามของธรรมชาติต่างก็กำลังพยายามทำให้ตำนาน#nร้อยเรื่องราวลี้ลับใหม่สมบูรณ์ ความสง่างามที่ท่านโคคุริโกะเฝ้าหวังก็จะเสร็จสมบูรณ์ในเร็วๆ นี้ค่ะ"
52020-44 = "เช่นนั้นหรือ ข้าอิ่มใจเหลือเกินที่ทุกคนทำงานกันอย่างแข็งขัน"
52020-45 = "ต่อไปหากเจ้าเจอชูโระ ฝากส่งกำลังใจจากข้าให้ชูโระด้วยเล่า"
52020-46 = "ค่ะ ฉันจะทำอย่างนั้นให้ค่ะ"
52020-55 = "นางุสะะะ"
52020-56 = "นางุสะจังงงงง!"
52020-63 = "เรื่องราวที่เสร็จสมบูรณ์ได้กลับถูกทำลายเพราะยัยบื้อนั่นเสียได้!"
52020-64 = "ถ้าเป็นไปตามแผนเดิมละก็ เฮียกกะเรียวรันที่ไม่มีใครสืบทอดเฮียกกุเร็นก็คงเป็นแค่ชมรมที่ทำอะไร#nไม่ได้นอกจากหนีหัวซุกหัวซุนไปแล้ว..."
52020-65 = "มันควรเป็นโศกนาฏกรรมที่พวกนั้นต้องสิ้นหวังและคร่ำครวญให้ความอ่อนแอของตัวเองแท้ๆ!"
52020-66 = "เรื่องราวมันบิดเบี้ยวไปตั้งแต่ตอนไหนกันนะ...?"
52020-67 = "ตั้งแต่ครูจากชาเล่ต์ใช้วาทศิลป์ตามอำเภอใจ? หรือว่าตั้งแต่เริ่มขัดแย้งเรื่องคาตะชิโระไร้หน้า?"
52020-68 = "ฮึ่ย... ทั้งหมดเป็นเพราะยัยบื้อคนนั้นเลย! ยัยบื้อที่ไม่รู้สักนิดว่าความสง่างามคืออะไรมาทำให้ตอนจบ#nต้องพังไปหมด!"
52020-69 = "แถมหนังสือลึกลับเล่มสำคัญอย่าง <อิโนะ โมโนโนเคะ โรคุ> ที่ท่านโคคุริโกะให้มาก็หายไปอีก..."
52020-70 = "ฮึ่ยยย ยกโทษให้ไม่ได้ นางุสะจังงงง!!"
52020-75 = "ก็สงสัยว่าหายไปไหน มาระบายความโกรธอยู่ที่นี่เองสินะ ชูโระจัง"
52020-76 = "ฉันไม่อยากแทรกแซงวิธีระบายความโกรธของเธอหรอกนะ แต่ถ้าเธอกวัดแกว่งอาวุธไปมากกว่านี้ ศาลเจ้าแห่งนี้คงถล่มลงจนเหลือแค่กองไม้แน่ๆ"
52020-80 = "อะไรกัน... แม้แต่เธอก็ตามมาเยาะเย้ยฉันถึงที่นี่เหรอ?"
52020-81 = "จะเป็นแบบนั้นไปได้ยังไง ฉันมาหาเพราะเป็นห่วงเธอต่างหาก"
52020-82 = "แล้วก็มาส่งสารจากท่านโคคุริโกะด้วย..."
52020-86 = "ท่านโคคุริโกะ...? ท่านโคคุริโกะถามหาฉันเหรอ?"
52020-87 = "ท่านโคคุริโกะต้องการให้ฉันไปหางั้นเหรอ?"
52020-88 = "พอทำพลาดก็กลายเป็นคนไร้ยางอายขึ้นมาเลยสินะ ชูโระจัง"
52020-89 = "ทำผิดพลาดครั้งใหญ่ขนาดนั้นแล้วยังคิดว่าท่านโคคุริโกะจะเมตตาอยู่อีกสินะ"
52020-90 = "อึก...!"
52020-91 = "เธอทรยศต่อความไว้วางใจของท่านโคคุริโกะจากการทำผิดพลาดครั้งก่อน ท่านโคคุริโกะก็เลยตั้งคำถามกับความสามารถของเธออยู่น่ะ"
52020-92 = "ถ้าเธอเล่าเรื่องลึกลับใหม่ไม่ได้ในเร็ววันนี้ละก็ คนที่จะถูกโยนเข้าห้วงอัสดงเป็นคนต่อไปก็คือเธอนั่นละ"
52020-97 = "ปะ... เป็นแบบนั้นไม่ได้หรอกน่า ท่านโคคุริโกะพูดเสมอว่าท่านเชื่อใจฉัน"
52020-98 = "แล้วก็ไม่ต้องกังวลเรื่องที่ทำพลาดเมื่อคราวก่อนด้วย..."
52020-99 = "ถ้าถึงกับทำให้หนังสือลึกลับที่มีค่าเสียหายแล้วหนีไปอย่างน่าอับอายได้ แต่กลับยังไม่กังวลเรื่องที่#nตัวเองทำผิด... แล้วชีวิตของเธอจะเหลือคุณค่าอะไรอีก?"
52020-100 = "ไม่สิ... ใครจะไปรู้ล่ะ บางทีท่านโคคุริโกะอาจจะผิดหวังมากจนเลือกที่จะไม่กังวลแล้วว่าเธอจะไป#nก่อเรื่องอะไรก็ได้"
52020-105 = "แบบนั้น... แบบนั้นไม่เอาด้วยหรอกนะ ฉันไม่อยากให้เป็นแบบนั้น!"
52020-106 = "ฉันควรทำยังไงดี? ต้องทำยังไงถึงจะได้ความไว้วางใจจากท่านโคคุริโกะคืนมา?"
52020-107 = "ไม่ต้องห่วงหรอก ก็ฉันมาช่วยแล้วนี่ไง"
52020-111 = "ชูโระ ฉันจะให้โอกาสเธอแก้ตัว"
52020-118 = "นี่มัน... <โทเท บุคไค โรคุ> เหรอ?"
52020-119 = "ใช่ นี่คือหนังสือลึกลับเล่มสุดท้ายที่ชมรมความงามของธรรมชาติของเราเหลืออยู่"
52020-120 = "เดิมทีแล้วชมรมความงามของธรรมชาติมีหนังสือลึกลับทั้งหมด 3 เล่ม"
52020-123 = "ท่านโคคุริโกะทำหายไปในทุ่งหิมะใหญ่เมื่อ 20 ปีที่แล้ว 1 เล่ม"
52020-124 = "แล้วก็เสียหายไป 1 เล่มตอนที่เธอหนีออกมาจากเฮียกคิยาโค"
52020-125 = "ส่วนเล่มสุดท้ายที่เหลือ... ก็คือ <โทเท บุคไค โรคุ> ที่ฉันเก็บไว้นานแล้ว"
52020-126 = "ถ้า <อิโนะ โมโนโนเคะ โรคุ> ที่เธอเคยมีคือสิ่งที่ทำให้ความปรารถนาของมนุษย์กลายเป็นจริงละก็ <โทเท บุคไค โรคุ> เล่มนี้ก็คือหนังสือลึกลับที่ปลุกเร้าความกลัวของมนุษย์"
52020-127 = "ว่าไงล่ะ ชูโระ?"
52020-128 = "ครั้งนี้ฉันจะให้เธอยืมพลังของหนังสือลึกลับอันล้ำค่า <โทเท บุคไค โรคุ> เล่มนี้"
52020-136 = "ถ้าเธอใช้หนังสือลึกลับเล่มนี้ปลุกเร้าความกลัวของผู้คน แล้วขับไล่พวกเขาไปด้วยตำนานร้อยเรื่องราว#nวิญญาณลี้ลับได้ละก็..."
52020-137 = "มันก็น่าจะเป็นการแก้แค้นต่อเฮียกกะเรียวรันที่ทำให้เธอตกอยู่ในสภาพนี้ได้นะ?"
52020-142 = "ใช่ ถ้าเป็นเรื่องนั้นละก็... ฉันทำได้"
52020-143 = "ขอแค่มีหนังสือลึกลับ ฉันก็แต่งเรื่องลึกลับได้เท่าที่ต้องการเลยละ"
52020-147 = "ฉันจะมอบตำนานร้อยเรื่องราวที่จะเป็นฝันร้ายที่คนพวกนั้นไม่มีทางลืมได้ไปชั่วชีวิตเลย!"
52020-148 = "งั้นก็ดีเลยนะ ชูโระจัง"
52020-152 = "ฉันมั่นใจว่าหนังสือลึกลับเล่มนี้จะทำให้ทุกอย่างสมบูรณ์ได้"
52020-154 = "ทั้งตำนานร้อยเรื่องราวของเธอ... และของฉันด้วย"
52020-156 = "ตอนต่อไป;งานเทศกาลใหม่"

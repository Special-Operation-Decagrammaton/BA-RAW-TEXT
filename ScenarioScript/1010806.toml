[translation]
1010806-1 = "研討會的不眠之夜"
1010806-2 = "唉……真是忙碌的一天。"
1010806-10 = "房間也整理完了，接下來……"
1010806-11 = "糟糕，已經到廣播節目的時間了？#n幸好沒錯過。"
1010806-16 = "大家好，我是DJ梅莉。"
1010806-17 = "這幾天突然變冷了對吧？"
1010806-18 = "大家睡覺時記得要把棉被蓋好，小心不要因為反覆無常的天氣而感冒了哦。"
1010806-19 = "今天的節目內容是煩惱諮商室，#n所以會由我來念出聽眾寄來的故事，並回答聽眾的煩惱。"
1010806-20 = "今天收到的投稿……是來自千年科學學園的H同學。"
1010806-21 = "咦？這……不是我寄過去的故事嗎？"
1010806-22 = "我只是因為翻來覆去睡不著，所以哀怨地寫了幾句話寄出去而已，#n沒想到居然會被抽中……"
1010806-23 = "「您好，我是開心地收聽著DJ梅莉的音樂節目的一名學生。」"
1010806-24 = "「我最近在朋友的推薦下開始收聽DJ梅莉的這個節目。#n　因為貴節目常常播放有助於睡眠的輕柔古典樂，所以我都會在睡覺前收聽。」"
1010806-25 = "嗯，雖然DJ梅莉也喜歡激烈的搖滾樂，#n但我在這個時段的節目確實都是播輕柔的音樂呢。"
1010806-26 = "畢竟這檔節目播出的時段，大部分的人都在睡覺了……#n要是被抗議說「都是因為梅莉的節目害我沒睡好」可就糟了嘛？哈哈。"
1010806-28 = "「但是，最近我就算收聽DJ梅莉的節目也很難入睡。」"
1010806-29 = "「啊，不是因為選曲的關係哦。DJ梅莉每次的選曲我都很喜歡。#n　只是我在睡覺前的心情都會變得很複雜，所以很難專心聽音樂。」"
1010806-30 = "「如果為了入睡而躺在床上，盯著漆黑的天花板，我就會想起當天所發生的事。」"
1010806-31 = "「心想『今天本來可以做得更好』、『明天能不能做得比今天更好？』之類的。」"
1010806-32 = "「這些事情帶來的不安，總是會讓我難以入睡……我好像已經失眠快一個月了。」"
1010806-33 = "「DJ梅莉，請問有沒有什麼好方法能解決失眠的問題呢？」"
1010806-35 = "唔，因為是在睡覺前寫的，從別人口中聽到感覺好羞恥……"
1010806-36 = "唔嗯，這麼說來，DJ梅莉身邊飽受失眠所苦的人好像也挺多的。"
1010806-37 = "大家不是都說失眠是現代人的通病嗎？"
1010806-38 = "只是DJ梅莉是一碰到枕頭就能在五分鐘內入睡的人，所以好像無法回答這個煩惱。"
1010806-39 = "如果正在收聽節目的聽眾知道解決失眠問題的好方法，希望大家可以投稿告訴我們～"
1010806-40 = "雖然我本來就不抱期待，但果然沒有能解決失眠問題的祕訣呢。"
1010806-41 = "按照[USERNAME]老師所說，在睡覺之前別想太多似乎還算是個解答……"
1010806-42 = "不過要心滿意足地結束一天，實在不太容易。"
1010806-46 = "……這首歌真好聽。"
1010806-48 = "（過了一週……）"
1010806-53 = "嗨！大家都久等了吧？#n現在是＜DJ梅莉的音樂旅行＞時間。"
1010806-54 = "上週有某位千年的學生投稿說自己正為失眠而苦，對吧？#n許多學生似乎也有同樣的煩惱，因此電台收到了非常熱烈的回覆。"
1010806-55 = "咦……！？那個故事居然這麼受歡迎？"
1010806-56 = "唔唔，要是被發現那是我投稿的怎麼辦……"
1010806-57 = "大部分的人都表示有同樣的煩惱，所以很能體會。#n不過有幾則有助於解決失眠問題的投稿，接下來就由我來為各位介紹。"
1010806-58 = "這次的故事是……夏萊的S寄來的匿名投稿。"
1010806-59 = "都把所屬寫出來了，匿名還有意義嗎……？"
1010806-60 = "……夏萊？難不成是老師！？"
1010806-61 = "好像聽到收音機另一端傳來的騷動聲了呢。"
1010806-62 = "不過無論如何，我們終究還是個匿名投稿的節目，#n所以希望大家不要過度揣測，冷靜地聽我說。"
1010806-63 = "那麼我要開始唸投稿內容了。"
1010806-65 = "「許多人都對睡覺感到害怕。因為一旦睡著，明天就會到來。」"
1010806-66 = "「明天是尚未發生的未來，因此我們只能根據今天的生活來加以預測。」"
1010806-67 = "「或許在想到燦爛的白天時，會覺得眼前的黑暗陌生又可怕。但是請不用擔心。」"
1010806-68 = "「會害怕夜晚的到來，就代表白天的生活過得非常充實。」"
1010806-69 = "「相信腳踏實地的你，一定能表現得比今天更好。」"
1010806-72 = "……說得真好呢。#n希望千年的H同學能在聽到這份投稿後好好睡一覺。"
1010806-73 = "接下來將為各位撥放有助於睡眠的親柔古典樂，記得要聽到最後哦。"
1010806-74 = "……說的也是。"
1010806-80 = "明天我一定能做得更好的。"
1010806-82 = "（那天，優香似乎睡得比往常更熟了一點）"

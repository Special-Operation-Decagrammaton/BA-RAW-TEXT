[translation]
1010806-1 = "#title;세미나의 잠 못 이루는 밤"
1010806-2 = "3;유우카 파자마;99;하아…… 오늘도 정신없는 하루였네.\n#3;a\n#3;em;[한숨]"
1010806-3 = "#st;[0,0];instant;1;"
1010806-4 = "#clearST"
1010806-5 = "3;유우카 파자마;99\n#3;d\n#wait;1000"
1010806-6 = "#wait;450"
1010806-7 = "#wait;450"
1010806-8 = "#wait;1000"
1010806-9 = "#wait;1800"
1010806-10 = "3;유우카 파자마;01;방 정리도 끝났고 이제 남은 일은……\n#3;a"
1010806-11 = "3;유우카 파자마;02;아차, 라디오 방송이 시작될 시간이잖아? 하마터면 놓칠 뻔했네.\n#3;em;[반응]"
1010806-12 = "#st;[0,0];instant;1;"
1010806-13 = "#clearST"
1010806-14 = "3;유우카 파자마;01\n#3;greeting\n#wait;1000"
1010806-15 = "#wait;1500"
1010806-16 = "3;유우카 파자마;01\n#na;DJ 메리;안녕, DJ 메리야."
1010806-17 = "#na;DJ 메리;요 며칠 사이에 갑자기 날씨가 추워졌지?"
1010806-18 = "#na;DJ 메리;모두 변덕스러운 날씨 때문에 감기에 걸리지 않도록 이불은 꼭 덮고 자도록 해."
1010806-19 = "#na;DJ 메리;오늘 방송은 애청자들이 보내 준 사연을 읽고 고민에 답해주는 고민 상담 시간이야."
1010806-20 = "#na;DJ 메리;오늘 도착한 사연은…… 밀레니엄 사이언스 스쿨의 H 양으로부터 도착한 사연이네."
1010806-21 = "3;유우카 파자마;02;어라, 이건…… 내가 보낸 사연이잖아?\n#3;em;[?]"
1010806-22 = "3;유우카 파자마;15;전에 잠이 오지 않아서 뒤척이다 떠오른 말을 푸념하듯 써 보낸 것뿐이었는데, 설마 이 사연이 당첨되었을 줄이야……"
1010806-23 = "3;유우카 파자마;15\n#na;DJ 메리;<안녕하세요, DJ 메리의 음악 방송을 즐겁게 청취하고 있는 학생입니다.>"
1010806-24 = "#na;DJ 메리;<지인의 추천으로 듣기 시작했는데, 수면에 도움이 되는 잔잔한 클래식 곡을 많이 틀어주어서 요새는 자기 전에 DJ 메리의 방송을 꼭 틀어두고 있어요.>"
1010806-25 = "#na;DJ 메리;음, 사실 DJ 메리는 강렬한 록 음악도 좋아하지만 이 시간대의 방송에서는 잔잔한 음악만 틀긴 하지."
1010806-26 = "#na;DJ 메리;이 방송이 나가는 시간대는 대부분의 사람들이 자고 있을 때니까. 메리의 방송 때문에 잠을 설쳤다는 항의를 받기라도 하면 큰일이잖아? 하하."
1010806-27 = "#all;hide"
1010806-28 = "#na;DJ 메리;<하지만 최근에는 DJ 메리의 방송을 들어도 쉽게 잠을 이루지 못하는 것 같아요.>"
1010806-29 = "#na;DJ 메리;<아, 선곡 때문은 아녜요. DJ 메리의 선곡은 언제나 좋았지만, 자기 전에는 마음이 복잡해져서 어쩐지 음악에 집중하기가 어렵더라고요.>"
1010806-30 = "#na;DJ 메리;<잠을 자기 위해 침대에 누워 깜깜한 천장을 보고 있노라면, 그날 하루 종일 있었던 일이 떠올라요.>"
1010806-31 = "#na;DJ 메리;<오늘 하루도 더 잘할 수 있었을 텐데, 내일은 오늘보다 더 잘할 수 있을까.>"
1010806-32 = "#na;DJ 메리;<이런 생각을 하다 보면 어느새 피어오른 불안감에 잠이 달아나 버려서…… 벌써 한 달 가까이 불면증을 앓고 있는 것 같네요.>"
1010806-33 = "#na;DJ 메리;<DJ 메리, 뭔가 불면증을 해소할 수 있는 좋은 방법이 없을까요?>"
1010806-34 = "#all;hide"
1010806-35 = "3;유우카 파자마;20;으으. 자기 전에 쓴 글이라 그런지, 새삼 다른 사람의 입으로 들으려니 뭔가 부끄럽네……\n#3;a\n#3;em;[///]"
1010806-36 = "3;유우카 파자마;20\n#na;DJ 메리;음. 그러고 보면 DJ 메리의 주변 사람들 중에서도 불면증으로 고생하는 사람이 꽤 있는 것 같아."
1010806-37 = "#na;DJ 메리;흔히 불면증은 현대인의 고질병이라고 하잖아?"
1010806-38 = "#na;DJ 메리;하지만 안타깝게도 DJ 메리는 베개에 머리를 뉘이면 5분 내로 잠이 드는 성격이라. 이 고민에 대해서는 답변을 해주기가 어렵겠는걸."
1010806-39 = "#na;DJ 메리;혹시 이 방송을 듣고 있는 청취자 중에 불면증 해소에 좋은 방법을 알고 있다면 사연함을 통해 알려줬으면 좋겠네~"
1010806-40 = "3;유우카 파자마;12;큰 기대는 하지 않았지만, 역시 불면증을 해소할 수 있는 비장의 방법 같은 건 없는 모양이네.\n#3;em;[한숨]"
1010806-41 = "3;유우카 파자마;99;[USERNAME] 선생님께서 말씀하신 것처럼 자기 전에 생각을 너무 깊이 하지 않는 게 그나마 정답이겠지만……"
1010806-42 = "3;유우카 파자마;05;그래도 언제나 만족스럽게 하루를 마무리하는 건 쉽지 않은 일이니."
1010806-43 = "#st;[0,0];instant;1;"

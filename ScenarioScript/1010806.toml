[translation]
1010806-1 = "Seminar's Sleepless Night"
1010806-2 = "*sigh*... Today was another hectic day."
1010806-10 = "Room's all clean, so the only thing left is—"
1010806-11 = "Ah! The broadcast's about to start! I almost missed it."
1010806-16 = "Hello, this is DJ Mary!"
1010806-17 = "It's gotten pretty cold these days, huh?"
1010806-18 = "Make sure you get nice and snug with a warm blanket, so you don't catch a cold from the temperature changes!"
1010806-19 = "Today, I'll be reading stories sent in by our loyal listeners and answering their concerns."
1010806-20 = "The story I have for you today is from H at Millennium Science School."
1010806-21 = "Whoa...that's my story!"
1010806-22 = "I just wrote down whatever was on my mind one night because I couldn't sleep, but I didn't think they'd pick it."
1010806-23 = "\"Hello, I am a student who enjoys DJ Mary's music program.\""
1010806-24 = "\"I started listening on a friend's recommendation. You play a lot of calm classical pieces that help promote sleep, so these days I always have DJ Mary's program on before going to bed.\""
1010806-25 = "Well, I actually do like intense rock music, but during this time slot, I only play soft music."
1010806-26 = "This particular program airs at a time when most people are going to bed. I wouldn't want people to start losing sleep because of me! Haha."
1010806-28 = "\"However, my insomnia's gotten so bad that not even DJ Mary's program has been helping lately.\""
1010806-29 = "\"It has nothing to do with the song selections! DJ Mary always has a great playlist, but my mind is always so busy when I lay down to sleep, I find it hard to focus on the music at all.\""
1010806-30 = "\"When I lie in bed to sleep and look at the dark ceiling, the events of the day come to mind.\""
1010806-31 = "\"I think things like, 'I could've done better today. How can I improve tomorrow?'\""
1010806-32 = "\"When I start having these thoughts, the anxiety chases away any chance at sleep... I think I've been suffering from insomnia for almost a month now.\""
1010806-33 = "\"DJ Mary, is there a good way to relieve insomnia?\""
1010806-35 = "Err... Hearing it actually read out loud is kind of embarrassing..."
1010806-36 = "Hm... We have a lot of listeners who suffer from insomnia."
1010806-37 = "In fact, it's said that insomnia is a common, chronic disease in this modern age."
1010806-38 = "Unfortunately, I tend to fall asleep within five minutes of my head hitting the pillow, so I may not be the best person to answer this question!"
1010806-39 = "If any listeners tuning in to this program know of any good methods to relieve insomnia, please submit your answers!"
1010806-40 = "It's not like I had high hopes to begin with, but I guess there really is no easy fix."
1010806-41 = "I guess the only thing I can do is listen to [USERNAME] Sensei's advice and try not to think too hard about it..."
1010806-42 = "It's hard to just relax and feel satisfied at the end of the day, though..."
1010806-46 = "...At least the music's good."
1010806-48 = "One week later..."
1010806-53 = "Hello, everyone! It's once again time for \"DJ Mary's Music Journey.\""
1010806-54 = "Do y'all remember the Millennium student from last week that talked about their struggles with insomnia? Since then, we've been flooded with questions from students with similar problems!"
1010806-55 = "What...?! My story was that popular?"
1010806-56 = "Ugh, what if people find out that I sent that story in...?"
1010806-57 = "Most shared similar concerns and expressed empathy, but a few people sent in tips to help with insomnia. Let's talk about them!"
1010806-58 = "This entry comes from...an anonymous listener, named \"S from Schale.\""
1010806-59 = "It detracts from the anonymity of it all when you tell us where you're from, doesn't it...?"
1010806-60 = "...Schale? Could it be Sensei?!"
1010806-61 = "I can almost hear the loud reactions coming from across the radio."
1010806-62 = "In any case, we are sharing a story from an anonymous source, so please just listen and don't make any assumptions!"
1010806-63 = "I'll read the letter now!"
1010806-65 = "\"Many people are afraid of sleep. Because when you sleep, tomorrow comes.\""
1010806-66 = "\"Since tomorrow is a future that hasn't happened yet, we can only predict it in light of today.\""
1010806-67 = "\"When compared to the dazzling day, the darkness in front of you may feel strange and frightening. But don't worry.\""
1010806-68 = "\"The reason you fear the night is because you lived so fully during the day.\""
1010806-69 = "\"Having lived a diligent life today, you'll do even better tomorrow.\""
1010806-72 = "...That's a really good letter. I hope H from Millennium heard it and sleeps well tonight."
1010806-73 = "The following playlist features calm classical music that can help you sleep, so please listen until the end."
1010806-74 = "...That's right."
1010806-80 = "I'm sure I can do even better tomorrow."
1010806-82 = "That night, Yuuka was able to sleep a little deeper than usual."

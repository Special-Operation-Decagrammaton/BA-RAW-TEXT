1010806-46 = "3;유우카 파자마;07;……노래는 좋네."
1010806-47 = "#all;hide"
1010806-48 = "#na;(그로부터 1주일 뒤……)"
1010806-49 = "#all;hide"
1010806-50 = "3;유우카 파자마;01\n#3;a\n#wait;1500"
1010806-51 = "3;유우카 파자마;01\n#3;greeting\n#wait;1000"
1010806-52 = "3;유우카 파자마;01\n#wait;1200"
1010806-53 = "3;유우카 파자마;01\n#na;DJ 메리;안녕! 모두 오래 기다렸지? <DJ 메리의 음악 여행> 시간이야."
1010806-54 = "#na;DJ 메리;지난주에 밀레니엄의 한 학생이 불면증으로 고생하고 있다는 사연을 보냈었지? 그런데 그 이후로 같은 고민을 갖고 있는 학생이 많았는지, 방송국으로 고민에 대한 답변이 잔뜩 도착했어."
1010806-55 = "3;유우카 파자마;11;뭐라고……?! 그 사연이 그렇게 인기를 끌었단 말이야?\n#3;em;[?]"
1010806-56 = "3;유우카 파자마;20;으으, 혹시 내가 보낸 사연이라는 게 들키면 어쩌지……\n#3;stiff"
1010806-57 = "3;유우카 파자마;20\n#na;DJ 메리;대부분은 같은 고민을 갖고 있다며 공감한다는 내용이었지만, 불면증에 도움이 될 만한 사연이 몇 개 있어서 함께 소개해 보려고 해."
1010806-58 = "#na;DJ 메리;이번 사연은…… 샬레의 S라는 익명의 애청자가 보내준 사연이야."
1010806-59 = "#na;DJ 메리;그런데 소속을 이렇게 쓰면 기껏 익명으로 보낸 이유가 없지 않나……?\n#fontsize;50"
1010806-60 = "3;유우카 파자마;19;……샬레? 설마 선생님이?!!\n#3;em;[?!]\n#3;closeup\n#3;shake"
1010806-61 = "3;유우카 파자마;19\n#na;DJ 메리;뭔가 소란스러운 반응이 라디오 너머로 들리는 것 같은데.\n#3;closeup"
1010806-62 = "#na;DJ 메리;어디까지나 우리 방송에서 취급하고 있는 건 익명의 사연이니까, 과한 억측은 하지 말고 침착하게 들어주었으면 좋겠어."
1010806-63 = "#na;DJ 메리;그럼 사연 내용을 읽어줄게."
1010806-64 = "#all;hide"
1010806-65 = "#na;<많은 사람들이 자는 것을 두려워합니다. 잠을 자면 내일이 오기 때문이죠.>"
1010806-66 = "#na;<내일은 아직 일어나지 않은 미래이기 때문에 오늘의 삶에 비추어 예측할 수밖에 없습니다.>"
1010806-67 = "#na;<화려했던 낮을 떠올리면 눈앞의 어둠이 낯설고 두렵게 느껴질지도 모릅니다. 하지만 걱정 마세요.>"
1010806-68 = "#na;<밤이 두려운 이유는 그만큼 낮의 삶에 충실했다는 뜻이니까요.>"
1010806-69 = "#na;<언제나 성실한 당신은 오늘보다 더 잘할 수 있을 겁니다.>"
1010806-70 = "#all;hide"
1010806-71 = "3;유우카 파자마;99\n#3;a\n#3;closeup\n#wait;1000"
1010806-72 = "3;유우카 파자마;99\n#na;DJ 메리;……좋은 이야기네. 밀레니엄의 H양이 부디 이 사연으로 푹 잘 수 있었으면 좋겠어.\n#3;closeup"
1010806-73 = "3;유우카 파자마;99\n#na;DJ 메리;이어지는 선곡은 잠을 자는 데 도움이 될 수 있도록 차분한 클래식을 준비했으니, 부디 끝까지 함께 들어줘.\n#3;closeup"
1010806-74 = "3;유우카 파자마;99;……그렇네.\n#3;em;[반응]\n#3;closeup"
1010806-75 = "#st;[0,0];instant;1;"
1010806-76 = "#clearST"
1010806-77 = "3;유우카 파자마;99\n#3;em;[...]\n#wait;2500\n#3;closeup"
1010806-78 = "3;유우카 파자마;07\n#wait;1200\n#3;closeup"
1010806-79 = "3;유우카 파자마;03\n#3;em;[음표]\n#wait;1500\n#3;closeup"
1010806-80 = "3;유우카 파자마;03;분명 내일은 조금 더 잘할 수 있을 거야.\n#3;closeup"
1010806-81 = "#all;hide"
1010806-82 = "#na;(그날, 유우카는 평소보다 조금 더 깊은 잠을 청할 수 있었다.)"
